[translation]
1010302-1 = "#title;허풍과 진실"
1010302-2 = "3;마리나 치파오;08;아, 선생! 여기, 여기다!\n#3;a\n#3;em;[반응]"
1010302-3 = "[s1] \"조금 진정해, 마리나!\"\n[s2] \"왜 그렇게 안절부절못하고 있는 거야?\""
1010302-4 = "#wait;10"
1010302-5 = "#wait;10"
1010302-6 = "3;마리나 치파오;06;그게, 그러니까…….\n#3;stiff"
1010302-7 = "3;마리나 치파오;08;그, 여기 식당이 말이다……."
1010302-8 = "3;마리나 치파오;08\n5;현무상회 주방장;07;어서 오십시오! 일행이십니까? 같은 자리로 안내해 드리겠습니다! 이미 주문하신 요리가 충분하니, 마음껏 맛보시고 가세요!\n#5;al\n#3;m1\n#5;em;[재잘]"
1010302-9 = "3;마리나 치파오;06;……이런 느낌이어서…….\n#3;em;[땀]\n#3;stiff"
1010302-10 = "[s] \"조금 더 구체적으로?\""
1010302-11 = "5;현무상회 주방장;03\n3;마리나 치파오;04;으음, 그러니까…….\n#3;em;…\n#3;m3\n#5;dr"
1010302-12 = "3;마리나 치파오;10;현무상회의 이 식당이 맛있을 거라고 안내받아서 왔는데 말이지."
1010302-13 = "3;마리나 치파오;06;나는 그저 생각 없이, 주방장 추천 메뉴를 주문했는데, 뭔가 엄청난 음식들이 나와 버렸다."
1010302-14 = "3;마리나 치파오;01;그래서, 이런 대접을 받아도 되는지 확신이 들지 않아서 말이야.\n#3;em;[속상함]"
1010302-15 = "3;마리나 치파오;02;이 수프만 해도 그래. 이 오독오독한 것은 뭐지? 양념이 듬뿍 배어들어서 확실히 맛있기는 하지만……."
1010302-16 = "3;마리나 치파오;99;그리고 이 녹색 야채 볶음은 이상하리만치 감칠맛이 강해서, 그냥 야채인데도 계속 먹게 돼."
1010302-17 = "3;마리나 치파오;02;이건 새우 샌드위치…… 튀김인가? 거기에 고기를 갈아서 한 번 더 구운 것 같은 요리도 있고, 황금색 볶음밥까지…….\n#3;em;…"
1010302-18 = "3;마리나 치파오;01;일단, 산해경에서의 체류비는 현룡문 쪽에서 부담해 주기로 했다."
1010302-19 = "3;마리나 치파오;99;그렇지만 이렇게 엄청난…… 붉은겨울에서는 상상도 할 수 없는…… 이런 요리들을 먹게 되면 말이지."
1010302-20 = "3;마리나 치파오;08;현룡문에게 너무 부담을 안기는 것은 아닌가, 그 결과 붉은겨울의 이름을 더럽히게 되는 것은 아닐까, 하는 생각이 들어서…….\n#3;em;[땀]\n#3;stiff"
1010302-21 = "[ns] (확실히, 코스 요리의 양은 엄청나지만…….)"
1010302-22 = "#wait;1000"
1010302-23 = "[ns] (그렇게 비싼 재료는 안 들어간 것 같은데……?)"
1010302-24 = "3;마리나 치파오;08;서, 선생? 그렇게 가만히 있지만 말고 뭐라도 이야기를……."
1010302-25 = "3;마리나 치파오;12;아니면 역시 그건가? 내가 너무 말도 안 되는 대접을 받고 있는 게 맞는 건가?\n#3;em;[세로선]\n#3;stiff"
1010302-26 = "[s] \"이 정도는 받아도 될 테니까, 부담 갖지 마.\""
1010302-27 = "3;마리나 치파오;10;그런…… 가? 선생이 그렇게 말한다면, 조금은 안심이 되지만…….\n#3;em;[?]"
1010302-28 = "3;마리나 치파오;10\n5;현무상회 주방장;07;맛있게 드셨습니까? 후식으로 준비한 행인두부입니다! 새콤달콤한 것이 그만이랍니다!\n#3;m1\n#5;al\n#5;em;[음표]"
1010302-29 = "3;마리나 치파오;04;행인…… 두부? 두부의 일종인가? 그렇지만 탱글탱글하고 윤기가 흐르는 것이……."
1010302-30 = "5;현무상회 주방장;03\n3;마리나 치파오;11;그렇군! 말하자면 두부 푸딩 같은 것인가! 이거 대단하군! 푸딩을 두 개나 먹을 수 있어!\n#3;em;[재잘]\n#5;dr\n#3;m3"
1010302-31 = "[s] \"그래, 그래.\""
1010302-32 = "#all;hide"
1010302-33 = "3;마리나 치파오;06;……과식하고 말았어…….\n#3;em;[세로선]\n#3;stiff\n#3;a"
1010302-34 = "3;마리나 치파오;08;산해경에서는 조금 과하게 먹어 주는 게 예의라고? 그런가……. 다른 학교의 문화란, 참으로 신기하군."
1010302-35 = "3;마리나 치파오;02;그건 그렇고, 이렇게나 맛있는 요리를 만들려면 그에 맞는 재료가 필요할 텐데."
1010302-36 = "3;마리나 치파오;01;말하고 나니 궁금해지는군. 주방장? 오늘 요리에 사용된 재료들은 어디에서 구한 거지?\n#3;em;[반응]"
1010302-37 = "3;현무상회 주방장;03;하하하. 그건 아무래도 가게 비법이라, 알려드리기 곤란하군요. 옆 가게에 소문이라도 나면 곤란하니 말이지요.\n#3;em;[재잘]"
1010302-38 = "3;마리나 치파오;08;그렇게 말하니 더더욱 궁금해지잖나! 가령 그 수프만 해도 말이지. 그 오독오독한 것은 뭐지? 분명 아주 특별한 재료를 쓴 것 같은데……?\n#3;em;[!]"
1010302-39 = "3;마리나 치파오;05;채소볶음만 해도 그래. 결국은 녹색 야채일 뿐인데, 그렇게나 복잡한 맛이 난다는 건 분명 비법이 있을 거란 생각이 든다."
1010302-40 = "3;마리나 치파오;02;그, 아무에게도 말하지 않을 테니, 조용히 이야기해 줄 수는 없는 건가?"
1010302-41 = "3;현무상회 주방장;99;으음…… 그렇다면 어쩔 수 없겠군요! 좋습니다. 잘 들어주세요.\n#3;em;…"
1010302-42 = "3;현무상회 주방장;03;가령 첫 코스로 나간 요리는, 목이버섯 샥스핀 수프입니다."
1010302-43 = "3;현무상회 주방장;02;목이버섯 중 어떤 것은, 샥스핀과 식감이 유사해 훌륭한 대체 재료로 사용될 수 있죠.\n#3;em;…"
1010302-44 = "3;현무상회 주방장;99;그럼에도 뭔가 특별한 맛을 느끼셨다면…… 저희 가게에서만 사용하는, 특수한 백목이버섯을 드셨기 때문이 아닐까요?!"
1010302-45 = "3;현무상회 주방장;07;오백 년 묵은 나무 그루터기 그늘에서, 햇빛 하나 안 받고 자란 백목이버섯만이 샥스핀의 대용으로 사용될 수 있거든요! 하하하!\n#3;em;[재잘]\n#3;hophop"
1010302-46 = "3;마리나 치파오;08;그, 그런 거였나?!\n#3;em;[?!]\n#3;shake"
1010302-47 = "[s3] (아, 이거 산해경식 허풍이네.)\n[s4] (재미있으니까 그냥 보고 있어야지.)"
1010302-48 = "#wait;10"
1010302-49 = "#wait;10"
1010302-50 = "3;현무상회 주방장;03;청경채 볶음만 해도 그렇죠! 아침이슬 외에 다른 물을 먹지 않은, 정말로 깨끗하고 순수한 청경채만이 그런 맛을 낼 수 있으며!\n#3;em;[!]\n#3;m2\n#3;jump"
1010302-51 = "3;현무상회 주방장;99;너무 깊은 바다도 아니고 너무 얕은 바다도 아닌, 일 년 내내 수온이 변하지 않는 아주 한정된 해역에서만 잡히는 거대 새우를 갈아서 만든 멘보샤!\n#3;m4"
1010302-52 = "3;현무상회 주방장;07;천 년 동안 담아 온 씨간장으로 만든 소스! 그리고 봉황의 가슴살까지! 키보토스 어디에도 없는 재료만 엄선해서 만든 요리들이랍니다! 하하하하!\n#3;em;[재잘]\n#3;hophop\n#3;m3"
1010302-53 = "3;마리나 치파오;12;그, 그런 거였단 말인가?!?!\n#3;closeup\n#3;stiff"
1010302-54 = "#all;hide"
1010302-55 = "3;마리나 치파오;08;으으으으…… 어떡하지, 선생? 주방장은 귀한 손님이니 그 정도의 대접은 당연한 거였다며 기본 가격만 받았지만…….\n#3;stiff\n#3;em;[속상함]\n#3;a"
1010302-56 = "3;마리나 치파오;06;결과적으로 내가 현룡문과 붉은겨울에 너무 큰 피해를 줘 버린 것은 아닐까……."
1010302-57 = "[s5] \"어쩔 수 없군! 진실을 이야기해야겠어!\"\n[s6] \"그거 모두 허풍이니까, 너무 신경 쓰지 마.\""
1010302-58 = "#wait;10"
1010302-59 = "#wait;10"
1010302-60 = "3;마리나 치파오;12;허, 허풍?! 도대체 왜, 어째서……?\n#3;shake\n#3;em;[?!]"
1010302-61 = "3;마리나 치파오;04;아……. 일종의 산해경식 유머 같은 거라고? 진짜는 다들 평범한 재료들뿐이었다……?"
1010302-62 = "3;마리나 치파오;06;그 말을 들으니 안심이 되는군. 그렇지만 평범한 재료들에서 그 정도의 맛을 끌어내다니……."
1010302-63 = "3;마리나 치파오;02;아하. 그렇군. 재료에 얽힌 이야기는 허풍이지만, 요리사의 실력은 허풍이 아니었다는 것인가. \n#3;em;[반응]"
1010302-64 = "3;마리나 치파오;03;허풍으로 겉을 포장하더라도, 그 안에는 진실이 담겨야 한다…… 후훗. 좋아. 한 가지 배우게 된 것 같군."
1010302-65 = "3;마리나 치파오;05;좋아! 이렇게 된 이상 계속해서 음식 기행을 떠나도록 하겠다!\n#3;em;[!]"
1010302-66 = "3;마리나 치파오;11;음식점 한 곳에서 이 정도로 얻어가는 것이 있었다면, 더 많은 곳을 돌수록 더 많은 것을 알게 되겠지!"
1010302-67 = "3;마리나 치파오;03;물론 선생도 따라와 주겠지?"
1010302-68 = "[s] \"어……. 음……. 거부권은 없는 것이겠군요. 알겠습니다.\""
1010302-69 = "3;마리나 치파오;11;좋아! 다음은…… 저쪽 골목이다!\n#3;em;[!]"
1010302-70 = "#all;hide"
1010302-71 = "#wait;2500"
1010302-72 = "5;마리나 치파오;04;이, 이것은……?!\n#5;em;[반응]\n#5;a"
1010302-73 = "5;마리나 치파오;04\n#na;산해경 노점상;훗훗훗……. 이 골목에 들어오셨다는 것은 그만한 각오가 되어 있으시다는 뜻이겠지요……?"
1010302-74 = "5;마리나 치파오;04\n#na;산해경 노점상;잘 오셨습니다, 왕동성 거리에. 이 거리는 보시다시피…… 각종 벌레를 튀겨 낸 벌레 꼬치로 유명하답니다……!"
1010302-75 = "[s] \"마, 마리나! 괜찮겠어?!\""
1010302-76 = "5;마리나 치파오;12;…….\n#5;em;…\n#5;m3"
1010302-77 = "5;마리나 치파오;05;아니, 이미 패턴은 파악했다. 선생."
1010302-78 = "5;마리나 치파오;01;어차피 이것도 산해경식 허풍이겠지."
1010302-79 = "5;마리나 치파오;11;겉모양만 벌레처럼 생겼을 뿐이고, 그 안은 분명 온갖 맛있는 것들로 가득 차 있을 것이 분명해!"
1010302-80 = "[s] \"정말…… 그럴까……?\""
1010302-81 = "5;마리나 치파오;05;날 믿으라고, 선생! 좋아, 이렇게 된 이상 꼬치들을 하나씩 사서 먹어보도록 하지!\n#5;em;[음표]"
1010302-82 = "5;마리나 치파오;11;가겠다! 우라–!\n#5;hophop"
1010302-83 = "#all;hide"
1010302-84 = "3;마리나 치파오;04;이건…… 전갈 꼬치인가? 아니, 전갈 모양 고기 꼬치라고 해야겠군.\n#3;a\n#3;em;[?]"
1010302-85 = "3;마리나 치파오;08;그러면 어디 한 입……. 으음?!"
1010302-86 = "3;마리나 치파오;12;뭐, 뭐야. 이건?! 진짜 전갈이잖아?! 그, 그렇다면 정말로 벌레 꼬치들이었다는 건가?!?!\n#3;em;[?!]\n#3;shake"
1010302-87 = "3;마리나 치파오;04;그런데…… 의외로 먹을 만한데? 껍질이 조금 단단하기는 하지만, 바삭하고 고소해."
1010302-88 = "3;마리나 치파오;10;다, 다음은…… 불가사리 꼬치?! 이런 것도 튀겨서 파는 건가?!?!\n#3;stiff"
1010302-89 = "3;마리나 치파오;08;겉 부분의 돌기가 특히 신경 쓰이는데……. 이것도…… 한 입!"
1010302-90 = "#st;[0,0];instant;1;"
1010302-91 = "#clearST"
1010302-92 = "3;마리나 치파오;08\n#3;greeting\n#wait;1500"
1010302-93 = "3;마리나 치파오;10;……약간 탄 것 같은 맛이 나는군. 속살은 어딘가 생선 같은 맛이 나고…….\n#3;em;…"
1010302-94 = "#all;hide"
1010302-95 = "#na;(그 뒤로도 마리나는 매미 유충 꼬치, 애벌레 꼬치, 하늘소 꼬치, 지네 꼬치 등을 차례로 맛보았다…….)"
1010302-96 = "#na;(마리나가 그 꼬치들에게서 무엇을 배웠는지는…… 자세히 묻지 않기로 했다…….)"

[translation]
1010302-1 = "การโอ้อวดและความจริง"
1010302-2 = "อ๊ะ คุณครู! ทางนี้ ทางนี้!"
1010302-3 = "[s1] \"ใจเย็นๆ มารินะ!\"\n[s2] \"ทำไมถึงลุกลี้ลุกลนอะไรขนาดนั้นน่ะ?\""
1010302-6 = "คือว่าเรื่องนั้น..."
1010302-7 = "คือ... ร้านอาหารที่นี่น่ะ..."
1010302-8 = "เชิญเลย! มาด้วยกันเหรอคะ? ฉันจะพาไปที่โต๊ะเองค่ะ! คุณสั่งอาหารมาพอสมควรแล้ว ขอให้ทานให้อร่อยนะคะ!"
1010302-9 = "ฉันกำลังเจอปัญหาแบบนี้อยู่น่ะ..."
1010302-10 = "[s] \"อธิบายให้ละเอียดหน่อยได้มั้ย...?\""
1010302-11 = "อืม... คือว่า..."
1010302-12 = "ฉันมาที่ร้านอาหารในย่านการค้าเทพเต่าดำนี้เพราะได้ยินว่าอาหารที่นี่อร่อยน่ะ"
1010302-13 = "และฉันก็ดันสั่งเมนูที่หัวหน้าเชฟแนะนำไปโดยไม่ทันคิด เลยได้อาหารมาหลายอย่าง"
1010302-14 = "ฉันเลยเริ่มกังวลว่าจะรับการต้อนรับแบบนี้ได้รึเปล่าน่ะ"
1010302-15 = "ซุปนี่ก็เหมือนกัน ของกรุบกรอบนี่มันอะไรน่ะ? ถึงมันจะรสชาติดีเพราะชุ่มไปด้วยซอสก็เถอะ..."
1010302-16 = "และผัดผักใบเขียวจานนี้ ถึงจะเป็นแค่ผัดผักธรรมดา แต่ก็มีรสชาติเข้มข้นอร่อยอย่างบอกไม่ถูก ก็เลยกินได้เรื่อยๆ..."
1010302-17 = "ส่วนนี่คือแซนด์วิชกุ้งทอด... ใช่รึเปล่านะ? นอกจากนี้ก็มีอาหารที่นำเนื้อบดมาย่าง แล้วก็ข้าวผัด#nสีเหลืองน่ากิน..."
1010302-18 = "เรื่องค่าใช้จ่ายระหว่างที่พักอยู่ที่ซานไห่จิง ทางมังกรดำจะเป็นผู้รับผิดชอบให้น่ะ"
1010302-19 = "แต่ว่าการได้กินอาหารจำนวนมากแบบนี้... เป็นสิ่งที่ไม่คิดว่าจะเกิดขึ้นได้ในเรดวินเทอร์เลย..."
1010302-20 = "จนฉันแอบกังวลว่าจะทำให้ทางมังกรดำลำบากใจรึเปล่า... และการทำแบบนี้ก็อาจส่งผลให้#nเรดวินเทอร์เสียชื่อเสียงในภายหลังได้..."
1010302-21 = "[ns] (อาหารเป็นคอร์สมันก็ต้องเยอะอยู่แล้วละนะ...)"
1010302-23 = "[ns] (วัตถุดิบที่ใช้ไม่น่าแพงอะไรหรอกมั้ง...?)"
1010302-24 = "คะ... ครู? อย่าเอาแต่เงียบแบบนั้น พูดอะไรสักหน่อยสิ..."
1010302-25 = "หรือว่าเป็นอย่างนั้นจริงๆ นะ? ฉันได้รับการต้อนรับแบบเกินจริงอยู่ใช่มั้ย?"
1010302-26 = "[s] \"แค่นี้น่าจะรับไว้ได้นะ ไม่ต้องเครียดหรอก\""
1010302-27 = "อย่างนั้น... เหรอ? ถ้าครูพูดแบบนั้น ฉันก็สบายใจขึ้นหน่อย..."
1010302-28 = "ทานอาหารอร่อยรึเปล่าคะ? นี่เป็นเต้าหู้อัลมอนด์ที่เตรียมไว้เป็นของหวานค่ะ มีรสหวานอร่อยมากเลย#nนะคะ!"
1010302-29 = "เต้าหู้... อัลมอนด์? เป็นเต้าหู้ชนิดหนึ่งงั้นเหรอ? แต่มันดูเป็นมันวาวและนุ่มหนึบ..."
1010302-30 = "อย่างนี้นี่เอง! คงเหมือนกับพุดดิ้งเต้าหู้สินะ! สุดยอดจริงๆ เลย! กินพุดดิ้งได้สองอันเลยเหรอเนี่ย!"
1010302-31 = "[s] \"ใช่ๆ\""
1010302-33 = "ฉันกินเยอะเกินไปแล้ว..."
1010302-34 = "การกินเยอะๆ เป็นธรรมเนียมของซานไห่จิงงั้นเหรอ? อย่างนี้นี่เอง... วัฒนธรรมของโรงเรียนอื่นนี่น่าทึ่ง#nจริงๆ"
1010302-35 = "ยังไงก็ตาม ถ้าจะปรุงอาหารให้ได้อร่อยขนาดนี้ น่าจะต้องใช้วัตถุดิบที่เหมาะสมด้วย"
1010302-36 = "พูดแบบนี้แล้วก็ชักอยากรู้ขึ้นมาเลยนะ เชฟ? พวกวัตถุดิบที่ใช้ในอาหารวันนี้ได้มาจากที่ไหนน่ะ?"
1010302-37 = "ฮ่าฮ่าฮ่า เรื่องนั้นเป็นความลับของทางร้าน คงบอกไม่ได้หรอกค่ะ ถ้ามีข่าวลือรั่วไหลไปถึงร้านข้างๆ มันจะลำบากเอาน่ะค่ะ"
1010302-38 = "พูดแบบนี้ยิ่งอยากรู้ใหญ่เลย! อย่างน้อยบอกแค่เรื่องซุปนั่นมาก็ได้ ของกรุบกรอบนั่นคืออะไรน่ะ? ดูเหมือนจะเป็นวัตถุดิบที่พิเศษมากๆ เลยนะ...?"
1010302-39 = "ผัดผักนั่นก็เหมือนกัน ถึงจะเป็นแค่ผัดผัก แต่ฉันคิดว่าคงมีเคล็ดลับบางอย่างที่ทำให้มีรสอร่อยล้ำลึก#nแบบนั้นได้อย่างแน่นอน"
1010302-40 = "อืม... ฉันรับรองว่าจะไม่เอาไปบอกใครแน่ๆ เพราะงั้นแอบบอกฉันหน่อยได้มั้ย?"
1010302-41 = "อืม... ถ้างั้นก็ช่วยไม่ได้นะคะ! ก็ได้ค่ะ งั้นตั้งใจฟังนะคะ"
1010302-42 = "อาหารที่เสิร์ฟเป็นจานแรกในคอร์สก็คือซุปหูฉลามเห็ดหูหนูค่ะ"
1010302-43 = "เห็ดหูหนูบางชนิดจะให้รสสัมผัสคล้ายกับหูฉลาม เลยเป็นวัตถุดิบที่นำมาใช้แทนหูฉลามได้อย่างดีค่ะ"
1010302-44 = "ถ้าคุณรู้สึกได้ถึงรสสัมผัสที่พิเศษบางอย่าง... นั่นเป็นเพราะว่าคุณได้ลิ้มรสเห็ดหูหนูขาวพิเศษที่ใช้#nเฉพาะแค่ในร้านของเรายังไงล่ะคะ!"
1010302-45 = "สิ่งที่นำมาใช้ทดแทนหูฉลามได้มีเพียงเห็ดหูหนูขาวที่เติบโตบนตอไม้ที่ไม่โดนแดดและมีอายุกว่า 500 ปีเท่านั้นค่ะ! ฮ่าฮ่าฮ่า!"
1010302-46 = "งะ... งั้นเหรอ?!"
1010302-47 = "[s3] (วิ... วิธีโม้ตามแบบฉบับซานไห่จิงสินะ)\n[s4] (มันก็สนุกดีนะ คอยดูไปเฉยๆ แล้วกัน)"
1010302-50 = "ผัดผักกวางตุ้งก็เหมือนกันค่ะ! มีเพียงผักกวางตุ้งที่เพาะเลี้ยงโดยใช้น้ำค้างยามเช้าเท่านั้นถึงจะมี#nรสชาติอร่อยแบบนี้ได้!"
1010302-51 = "ส่วนขนมปังหน้ากุ้งทำจากกุ้งยักษ์ที่จับได้เฉพาะในทะเลพิเศษที่อุณหภูมิของน้ำไม่เปลี่ยนแปลง#nตลอดปี และเป็นบริเวณที่อยู่ไม่ลึกและก็ไม่ตื้นจนเกินไปด้วย!"
1010302-52 = "ซอสที่ทำมาจากซีอิ๊วหมักนานนับพันปี! ไปจนถึงเนื้ออกของนกฟีนิกซ์...! พวกนี้คืออาหารที่ปรุงขึ้น#nจากวัตถุดิบที่คัดสรรมาอย่างดี และหาไม่ได้จากพื้นที่อื่นในคิโวทอสค่ะ ฮ่าฮ่าฮ่าฮ่า!"
1010302-53 = "ปะ... เป็นอย่างนั้นเองเหรอ?!?!"
1010302-55 = "ทะ... ทะ... ทำยังไงดีล่ะ ครู? เชฟบอกว่าการต้อนรับแบบนี้เป็นเรื่องธรรมดาสำหรับแขกคนสำคัญ และก็คิดราคาตามปกติ..."
1010302-56 = "แต่ฉันกังวลว่าจะสร้างความเสียหายให้กับมังกรดำและเรดวินเทอร์รึเปล่าน่ะ..."
1010302-57 = "[s5] \"ช่วยไม่ได้นะ! ครูจะบอกความจริงให้เอง!\"\n[s6] \"ที่เชฟเล่าแค่โม้น่ะ อย่าเก็บไปใส่ใจเลย\""
1010302-60 = "มะ... โม้เหรอ?! เป็นไปได้ยังไง ทำไมถึง...?"
1010302-61 = "อ่า... เป็นวิธีตบมุกอย่างหนึ่งในซานไห่จิงอย่างนั้นเองหรอกเหรอ? และความจริงก็คือวัตถุดิบทั้งหมด#nเป็นแค่วัตถุดิบทั่วๆ ไป...?"
1010302-62 = "พอได้ยินแบบนี้ก็ค่อยโล่งใจขึ้นมาหน่อยนะ แต่ว่าการปรุงอาหารที่มีรสชาติอร่อยแบบนั้นจากวัตถุดิบ#nธรรมดาๆ ได้เนี่ย..."
1010302-63 = "อ้อ อย่างนี้นี่เอง ถึงเชฟจะโม้เรื่องวัตถุดิบ แต่ว่าฝีมือการปรุงอาหารของเธอคือเรื่องจริงสินะ "
1010302-64 = "ถึงภายนอกจะพูดโอ้อวดต่างๆ แต่ภายในกลับซ่อนความจริงยิ่งใหญ่ไว้... ฮุฮุ ดีเลย ฉันได้เรียนรู้อะไร#nเพิ่มอีกอย่างหนึ่งแล้ว"
1010302-65 = "เอาละ! ไหนๆ ก็เป็นแบบนี้แล้ว เราไปกันต่อที่ร้านต่อไปกันเถอะ!"
1010302-66 = "ถ้าแค่ร้านอาหารเพียงร้านเดียวยังเรียนรู้อะไรได้มากขนาดนี้ แสดงว่าถ้าไปเที่ยวชมร้านอื่นๆ ได้มากเท่าไร ก็จะเรียนรู้ได้มากขึ้นเท่านั้น!"
1010302-67 = "ครูก็จะไปด้วยใช่มั้ย?"
1010302-68 = "[s] \"เอ่อ... อืม... คงปฏิเสธไม่ได้สินะ ไปก็ไป\""
1010302-69 = "ดีละ! งั้นต่อไปก็... ไปที่ตรอกด้านโน้นกัน!"
1010302-72 = "นะ... นี่มัน...?!"
1010302-73 = "ฮุฮุฮุ... การที่เข้ามาในตรอกนี้หมายความว่าเตรียมตัวเตรียมใจพร้อมแล้วใช่มั้ยคะ...?"
1010302-74 = "ตัดสินใจถูกแล้วละค่ะ ยินดีต้อนรับสู่ย่านหวังตงเฉิง อย่างที่เห็นว่าที่ตรอกนี้... ขึ้นชื่อเรื่อง#nแมลงเสียบไม้ที่ทำมาจากแมลงทอดหลากหลายชนิดค่ะ...!"
1010302-75 = "[s] \"มะ... มารินะ! เป็นอะไรรึเปล่า?!\""
1010302-76 = "......"
1010302-77 = "ไม่เป็นไร ตอนนี้... ฉันเข้าใจรูปแบบแล้วละครู"
1010302-78 = "ยังไงนี่ก็คงเป็นเพียงการพูดโม้ของซานไห่จิงอีกสินะ"
1010302-79 = "ถึงรูปลักษณ์ภายนอกจะดูเหมือนแมลง แต่ข้างในจะต้องเต็มไปด้วยของอร่อยหลากชนิดแน่ๆ!"
1010302-80 = "[s] \"จะเป็นงั้น... จริงเหรอ...?\""
1010302-81 = "เชื่อฉันเถอะ ครู! ดีละ งั้นเราไปซื้อแมลงเสียบไม้มาลองชิมกันดีกว่า!"
1010302-82 = "จะลองชิมละนะ...!"
1010302-84 = "นี่มัน... แมงป่องเสียบไม้เหรอ? ไม่สิ คงจะเป็นเนื้อที่ทำเป็นแมงป่องเสียบไม้สินะ"
1010302-85 = "ไหนลองชิมดูหน่อยซิ... หืม?!"
1010302-86 = "อะ... อะไรน่ะ?! แมงป่องของจริงนี่นา?! ถะ... ถ้าอย่างงั้นก็หมายความว่านี่เป็นแมลงเสียบไม้ของจริง#nงั้นเรอะ?!?!"
1010302-87 = "แต่ว่า... มันก็ดูน่ากินแปลกๆ ดีนะ? ถึงเปลือกจะแข็งไปสักหน่อย แต่ก็กรอบและมีรสชาติเข้มข้นดี"
1010302-88 = "ตะ... ต่อไป... ปลาดาวเสียบไม้?! ของแบบนี้ก็เอามาทอดขายได้ด้วยเรอะ?!?!"
1010302-89 = "พวกตุ่มๆ ก้อนๆ บนผิวภายนอกดูแล้วก็ชวนหยึยๆ อยู่หรอก... งั้นก็ลอง... สักคำหนึ่ง!"
1010302-93 = "มีกลิ่นไหม้นิดๆ ด้วยนะ ส่วนเนื้อด้านในรสชาติเหมือนปลา..."
1010302-95 = "(หลังจากนั้นมารินะก็ลองชิมตัวอ่อนจั๊กจั่นเสียบไม้ รถด่วนเสียบไม้ ด้วงหนวดยาวเสียบไม้ ตะขาบเสียบไม้ และอื่นๆ...)"
1010302-96 = "(และคุณครูก็ตัดสินใจที่จะไม่ถามถึงสิ่งที่มารินะได้เรียนรู้จากการกินแมลงเสียบไม้พวกนั้น...)"

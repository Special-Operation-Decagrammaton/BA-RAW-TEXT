[translation]
1010302-1 = "謊言與真相"
1010302-2 = "啊，老師！這邊這邊！"
1010302-3 = "[s1]「你先冷靜，瑪麗娜！」\n[s2]「怎麼一副坐立難安的樣子？」"
1010302-6 = "那個，事情是這樣的……"
1010302-7 = "這裡的餐廳……"
1010302-8 = "歡迎光臨！兩位是一起的嗎？那我帶您到同一桌！#n另一位客人已經點了許多料理，請盡情品嚐！"
1010302-9 = "……大概就是這樣。"
1010302-10 = "[s]「可以說得更具體一點嗎？」"
1010302-11 = "唔嗯，該怎麼說呢……"
1010302-12 = "我聽說玄武商會的這間餐廳很好吃，所以就跑來品嘗看看。"
1010302-13 = "接著我隨意點了幾道主廚推薦的菜色，沒想到居然是這麼豐盛的料理。"
1010302-14 = "因此，我不確定自己能不能接受這種待遇。"
1010302-15 = "光是這碗湯似乎就大有來頭……裡面這些脆脆的東西究竟是什麼呢？#n雖然確實很入味很好吃沒錯……"
1010302-16 = "這盤炒青菜也是出奇的鮮美。#n明明是蔬菜卻讓人忍不住一口接一口。"
1010302-17 = "還有這份鮮蝦三明治……是用油炸過的嗎？#n此外還有像是把肉搗碎之後再烤過的料理，以及黃金蛋炒飯……"
1010302-18 = "由於在山海經停留期間的花費都是由玄龍門負擔……"
1010302-19 = "這些豐盛到在赤冬難以想像的料理，要是吃了的話……"
1010302-20 = "我擔心會造成玄龍門太大的負擔，進而敗壞赤冬的名譽……"
1010302-21 = "[ns]（套餐料理的量確實很多沒錯……）"
1010302-23 = "[ns]（不過好像也沒加入什麼名貴的材料啊……？）"
1010302-24 = "老，老師？#n你別愣在那邊什麼都不說嘛……"
1010302-25 = "還是說……我果然受到了與我身分不符的待遇嗎？"
1010302-26 = "[s]「這種程度沒問題的，你不必覺得有壓力哦。」"
1010302-27 = "是……嗎？#n聽老師這麼說，感覺稍微安心了一點……"
1010302-28 = "今天的餐點還滿意嗎？#n這是我準備的飯後甜點，杏仁豆腐！酸酸甜甜的滋味簡直棒極了哦！"
1010302-29 = "杏仁……豆腐？是豆腐的一種嗎？#n但是卻Q彈且閃耀著光澤……"
1010302-30 = "原來如此！是類似豆腐布丁的食物嗎！#n這可真厲害！我可以吃兩個布丁！"
1010302-31 = "[s]「很好很好。」"
1010302-33 = "吃太多了……"
1010302-34 = "在山海經這邊，盡可能多吃一點才是禮貌？#n這樣啊……其他學園的文化還真是不可思議。"
1010302-35 = "先不說這個了。#n要做出這麼美味的料理，相應的材料想必也是不可或缺的吧。"
1010302-36 = "說著說著就讓人越來越好奇了。#n主廚，請問今天料理的材料是從哪裡取得的呢？"
1010302-37 = "哈哈哈。那是本店的商業機密，所以不方便透露。#n要是傳到旁邊店家的耳裡可就傷腦筋了啊。"
1010302-38 = "這樣不是讓人更想知道了嗎！#n不然告訴我那道湯裡放的脆脆的東西是什麼吧！感覺用了非常特別的材料耶……？"
1010302-39 = "或者炒青菜也可以。#n明明只是綠色蔬菜卻有那麼複雜的味道，其中肯定有什麼祕訣。"
1010302-40 = "我不會跟任何人說的，可以偷偷地告訴我嗎？"
1010302-41 = "唔嗯……真拿你沒辦法！#n那好吧，你可要聽仔細囉。"
1010302-42 = "第一道料理是木耳魚翅湯。"
1010302-43 = "有些木耳的口感和魚翅很像，所以可以當成出色的替代材料。"
1010302-44 = "如果有感覺到特別的滋味……#n說不定是吃到只有我們店裡才會使用的特殊白木耳吧！？"
1010302-45 = "因為只有在樹樁的陰影下生長五百年，#n並且完全沒受過日曬的白木耳才能用來代替魚翅啊！哈哈哈！"
1010302-46 = "原，原來是這樣嗎！？"
1010302-47 = "[s3]（啊，是山海經的吹牛伎倆）\n[s4]（太有趣了，繼續看下去吧）"
1010302-50 = "炒青江菜也一樣哦！#n只有這種真正純淨、只喝晨露的青江菜才能有這種味道！"
1010302-51 = "此外還有以只能生長在深淺適中，#n同時水溫還必須常年不變的極少數海域的大蝦所製成的麵包蝦！"
1010302-52 = "當然還有精釀千年的醬油製作的醬料跟鳳凰的胸肉！#n這些全都是嚴選奇普托斯獨一無二的材料製作的料理哦！哈哈哈哈！"
1010302-53 = "是，是嗎！？！？"
1010302-55 = "唔唔……這下該怎麼辦，老師？#n雖然主廚說本來就該這樣招待貴賓，還只收了基本費……"
1010302-56 = "不過從結果來看，我是不是對玄龍門與赤冬都造成了慘重的損失……"
1010302-57 = "[s5]「沒辦法了！必須說實話才行！」\n[s6]「剛才那些全都是吹牛的，你別放在心上。」"
1010302-60 = "吹，吹牛！？為什麼呢……？"
1010302-61 = "啊……是山海經獨特的幽默嗎？#n所以那些其實都只是普通食材……？"
1010302-62 = "聽你這麼說我就放心了。#n不過居然能用普通的食材做出那種味道……"
1010302-63 = "啊哈，原來如此。#n雖然食材方面的故事被過分誇大，但廚師的手藝卻是貨真價實的呢。"
1010302-64 = "即便有了浮誇的包裝，也不能缺少內在的真功夫……#n呵呵，感覺又上了一課呢。"
1010302-65 = "好！既然如此，就繼續展開美食冒險之旅吧！"
1010302-66 = "一間餐廳就能獲得這麼多收穫，今天肯定能滿載而歸！"
1010302-67 = "老師也會跟我來吧？"
1010302-68 = "[s]「啊……嗯……我應該也無法拒絕吧。一起走吧。」"
1010302-69 = "好！接下來是……那條小巷！"
1010302-72 = "這，這是……！？"
1010302-73 = "哼哼哼……#n既然敢踏進這條小巷，想必已經做好相應的覺悟了吧……？"
1010302-74 = "歡迎來到王東城街。#n如兩位所見，這條街……以各種炸蟲串聞名……！"
1010302-75 = "[s]「瑪，瑪麗娜！這你可以接受嗎！？」"
1010302-76 = "……"
1010302-77 = "沒關係，我已經了解這裡的套路了，老師。"
1010302-78 = "這想必也是山海經的吹牛文化吧。"
1010302-79 = "只不過是外形長得像蟲而已，裡面一定裝滿了各種好吃的東西！"
1010302-80 = "[s]「真的……是這樣嗎……？」"
1010302-81 = "相信我吧，老師！#n各買一串來吃看看吧！"
1010302-82 = "要出發囉！烏拉～！"
1010302-84 = "這是……蠍子串嗎？#n不，應該說是蠍子造型的肉串才對。"
1010302-85 = "總之先來吃一口看看……嗯！？"
1010302-86 = "什，什麼……！？這不是真的蠍子嗎！？#n也，也就是說，這些真的是蟲串！？！？"
1010302-87 = "不過……出乎意料地好吃？#n殼雖然有點硬，但是卻又酥又香。"
1010302-88 = "接，接下來是……海星串！？這種東西也能炸來賣嗎！？！？"
1010302-89 = "外層突起的部分實在很讓人在意……#n這也……來一口吧！"
1010302-93 = "……好像有股燒焦的味道。#n裡面的肉則是跟魚的味道有點類似……"
1010302-95 = "（之後瑪麗娜依序品嚐了蟬若蟲串、毛毛蟲串、天牛串、蜈蚣串……）"
1010302-96 = "（瑪麗娜從那些蟲串中究竟學到了什麼，決定還是不加以過問……）"

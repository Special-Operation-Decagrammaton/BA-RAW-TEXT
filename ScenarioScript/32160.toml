[translation]
32160-1 = "第16話;激戦"
32160-2 = "合宿所"
32160-4 = "こちらです！ターゲットを連れたまま、この建物に入るのを確認しました！"
32160-5 = "なるほど……ここに陣地を築いたということか、白洲アズサめ。"
32160-6 = "中に通じる入口は二か所のみ！その内一か所はバリケードで塞がれています！"
32160-7 = "開いている入口は一つ……いや、そっちは罠だ。塞がれたバリケードを爆発させて、そちらから侵入せよ！"
32160-8 = "騒ぎになりそうですが、大丈夫でしょうか？"
32160-9 = "ああ、構わん。ちょうど「スクワッド」からも連絡が来た、すぐに増援部隊がトリニティ自治区に入ってくる。"
32160-10 = "こうなってはもはやトリニティとの全面抗争も想定した方が良い。しかしできる限りその前に、ターゲットを回収する！"
32160-12 = "行くぞ！"
32160-21 = "突入！"
32160-23 = "だと思った。"
32160-25 = "なぁっ！？"
32160-29 = "ぐあぁぁっ！？"
32160-30 = "くっ！退くな退くな！攻め入ってしまえば数がある以上、こちらが有利！"
32160-33 = "なっ、こっちも！？"
32160-36 = "く、クレイモアだと！？どわあぁっ！？"
32160-39 = "なんだ、ビニール袋……？い[ruby=即席爆発装置]や、IED！？[/ruby]ぎゃあぁぁっ！！"
32160-47 = "……手こずらせてくれたじゃないか、白洲アズサ。"
32160-48 = "……。"
32160-49 = "……なるほど、だいぶ減りましたね。さすがはアズサちゃん。"
32160-50 = "うん。"
32160-51 = "このまま行けば行き止まり、か……ターゲットはどこだ？"
32160-52 = "隠した。"
32160-53 = "……早めに吐いた方が良い。他の部隊がこちらに向かい、今にもこの建物を包囲しようとしている。逃げても抵抗しても、どちらにせよ無意味だ。"
32160-54 = "……増員？"
32160-55 = "ああ、それも部隊単位でな！"
32160-56 = "……「スクワッド」は？"
32160-57 = "「スクワッド」が来るまでも無いさ。それにどうやら、他にやることがあるみたいでね。"
32160-58 = "なら問題無い。"
32160-62 = "くっ、この期に及んで……！この先に体育館しか無いのは把握済みだ！"
32160-63 = "それに、これ以上トラップが無いこともな！逃がすか、追え！"
32160-68 = "……なるほど、逃げたのではなく待ち伏せだったと。"
32160-69 = "だが、それだけか？"
32160-70 = "たった四人で私たち相手に、何分耐えられると思っているのだ。こんな退路も無い場所で！"
32160-72 = "あうぅ……。"
32160-73 = "……っ。"
32160-74 = "その通り、もう退路はない。お前たちは逃げられない。"
32160-75 = "ですね、一先ず仕上げと行きましょうか♡"
32160-76 = "[s] \"待ってたよ。\""
32160-78 = "っ！"
32160-80 = "ご存じかは分かりませんが……補習授業部の担当であり、「シャーレ」の顧問の先生です♡"
32160-81 = "殲滅戦を始める。先生、指示を。"
32160-85 = "[ns] \"じゃあ補習授業部、行こう。\""

[translation]
32160-1 = "第16話;激戰"
32160-2 = "合宿宿舍"
32160-4 = "在這裡！已確認對方帶著目標進入了這棟建築！"
32160-5 = "原來如此……在這裡建立了陣地啊，可惡的白洲梓。"
32160-6 = "能夠進入的入口只有兩個！其中一個被路障擋住了！"
32160-7 = "開著的入口只有一個……不，這是陷阱。把路障炸開，我們從那裡攻擊！"
32160-8 = "可能會引起騷動，沒問題嗎？"
32160-9 = "無所謂。剛才「小隊」傳來了聯絡，馬上就會有增援部隊進入三一自治區。"
32160-10 = "事到如今，任務已經不再是暗殺，而應該視為和三一的全面戰爭。#n在那之前，我們必須盡可能回收目標！"
32160-12 = "走吧！"
32160-21 = "突入成功！"
32160-23 = "我就知道你們會來這裡。"
32160-25 = "什麼！？"
32160-29 = "咕啊──！？"
32160-30 = "可惡！別後退別後退！只要攻進去的話，我們人數比較有利！"
32160-33 = "什麼，這裡也有！？"
32160-36 = "竟然是闊刀地雷！？呃啊！？"
32160-39 = "這是什麼，塑膠袋……？#n不[ruby=簡易爆炸裝置]，是IED！？[/ruby]呀啊啊！！"
32160-47 = "……真會給我們添麻煩啊，白洲梓。"
32160-48 = "……"
32160-49 = "……原來如此，兵力少了很多呢。真不愧是梓醬。"
32160-50 = "嗯。"
32160-51 = "前面沒有路了嗎……目標在哪？"
32160-52 = "藏在這棟建築的某個地方。"
32160-53 = "其他部隊正趕往這裡，準備包圍這棟建築。#n勸你還是死了逃跑這條心吧。"
32160-54 = "增援……？有多少人？"
32160-55 = "你該問的不是有多少人，而是有多少部隊！"
32160-56 = "……看來已經不打算進行隱密作戰了啊。#n「小隊」似乎也沒有過來。"
32160-57 = "他們有其他任務要做。"
32160-58 = "那就沒問題了。"
32160-62 = "可惡，都到這種時候了還……！我已經知道前面只有體育館而已了！"
32160-63 = "而且你們已經沒有陷阱了！快追！"
32160-68 = "……！！#n原來如此，有埋伏啊……"
32160-69 = "但就只有這樣嗎？"
32160-70 = "你以為只靠區區四個人，能抵擋我們幾分鐘？而且還是在這種沒有退路的地方！"
32160-72 = "啊嗚……"
32160-73 = "……"
32160-74 = "說的沒錯，沒有退路了。你們已經無處可逃了。"
32160-75 = "就是呀，那麼就來收拾一下吧♡"
32160-76 = "[s] 「等你們好久了。」"
32160-78 = "！"
32160-80 = "這是補課部負責人……「夏萊」顧問老師的戰術指揮課程哦♡"
32160-81 = "開始殲滅戰。老師，請下指示。"
32160-85 = "[ns] 「那麼補課部，上吧。」"

[translation]
32160-1 = "ตอนที่ 16;การทะเลาะอย่างรุนแรง"
32160-2 = "แคมป์ฝึกฝน อาคารย่อย"
32160-4 = "ทางนี้ค่ะ! ฉันเห็นเป้าหมายถูกพาตัวเข้ามาที่อาคารนี้ค่ะ!"
32160-5 = "อาคารนี้เหรอ... ใช่ที่ที่สร้างค่ายเอาไว้หรือเปล่านะ ชิราสึ อาซึสะ"
32160-6 = "มีทางเข้าไปข้างในแค่ 2 ทาง แต่หนึ่งในนั้นถูกกั้นไว้อยู่ค่ะ!"
32160-7 = "มีทางเข้าเดียวที่เปิดอยู่... ฉลาดไม่เบาเลยนี่ ตั้งใจวางกับดักสินะ ระเบิดด่านกั้นของอีกทาง แล้วเข้าไปทางนั้นแทน!"
32160-8 = "แบบนี้จะเกิดความวุ่นวายนะคะ ไม่เป็นไรใช่ไหมคะ?"
32160-9 = "อืม <สควอด> ติดต่อเข้ามาแล้ว อีกไม่นานกองกำลังเสริมจะเข้ามายังเขตปกครองตนเองทรีนิตี้แล้วล่ะ"
32160-10 = "ตอนนี้ต้องสันนิษฐานว่าภารกิจนี้ไม่ใช่แค่การลอบสังหารบุคคลสำคัญ แต่เป็นสงครามกับทรีนิตี้ เราต้องได้ตัวเป้าหมายมาก่อน!"
32160-12 = "เอาล่ะ!"
32160-21 = "เริ่มได้!"
32160-23 = "แบบนั้นล่ะ คิดไว้แล้วว่าต้องมาทางนี้"
32160-25 = "กับดักเหรอ?!"
32160-29 = "ว้ากกกกกกก!!"
32160-30 = "อึ่ก! อย่าไปสนใจ เข้าไปเลย! เราจะไม่ล่าถอย ฝ่ายเรามีคนมากกว่า!"
32160-33 = "อ๊ากกกกก! ทางนี้ก็ด้วย...!"
32160-36 = "อ๊ากกก! ทุ่นระเบิดเคลย์มอร์?!"
32160-39 = "นี่ไม่ใช่ถุงพลาสติก แต่เป็นระเบิดแสวงเครื่องงั้นเหรอ...?! กรี๊ดดดดดด!!"
32160-47 = "เฮ้อ... พอได้แล้ว ชิราสึ อาซึสะ"
32160-48 = "......."
32160-49 = "ลดลงไปได้เยอะเลยนะคะอาซึสะจัง..."
32160-50 = "อืม"
32160-51 = "เจอทางตันแล้วสินะ เป้าหมายอยู่ที่ไหน?"
32160-52 = "ซ่อนอยู่สักที่ในอาคารนี้แหละ"
32160-53 = "ทีมอื่นกำลังเข้ามาล้อมอาคารนี้แล้ว อย่าคิดที่จะหนีดีกว่า"
32160-54 = "เสริมกองกำลังเหรอ? มากันกี่คน?"
32160-55 = "กี่คนงั้นเหรอ? ต้องถามว่ากี่กองร้อยมากกว่าล่ะมั้ง"
32160-56 = "นี่คงไม่ใช่ปฏิบัติการลับแล้วสินะ... แต่ <สควอด> ก็ยังไม่มาเลยนี่"
32160-57 = "พวกนั้นมีภารกิจอื่นน่ะ"
32160-58 = "ช่างเถอะ"
32160-62 = "ลูกไม้ตื้นๆ! ฉันรู้อยู่แล้วว่าทางนั้นคือโรงยิมที่ไม่มีทางออก!"
32160-63 = "ไม่มีกับดักแล้ว! ตามไปเลย!"
32160-68 = "......!!  ดักซุ่มงั้นเหรอ?"
32160-69 = "ที่นี่คือสนามรบที่พวกแกเลือกงั้นรึ?"
32160-70 = "คิดว่าพวกแก 4 คนจะต้านทานพวกเราได้กี่นาทีงั้นเรอะ! ที่นี่ไม่มีทางออกนะ!"
32160-72 = "อ่า แหะๆ..."
32160-73 = "......."
32160-74 = "ถูกต้อง ไม่มีทางออก งั้นพวกแกก็หนีไม่ได้เหมือนกัน"
32160-75 = "อื้ม นี่คือขั้นสุดท้ายแล้วล่ะ ฮุฮุฮุ♡"
32160-76 = "[s] \"กำลังรออยู่เลย\""
32160-78 = "!!"
32160-80 = "คลาสสั่งการทางยุทธวิธีจากคุณครูผู้ดูแลชมรมชั้นเรียนเสริมและที่ปรึกษา <ชาเล่ต์> ♡"
32160-81 = "เริ่มสงครามทำลายล้าง"
32160-85 = "[ns] \"ชมรมชั้นเรียนเสริม ลุยเลย!\""

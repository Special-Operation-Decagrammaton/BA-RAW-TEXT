[translation]
1004805-1 = "การตำหนิตัวเอง"
1004805-4 = "(หลังจากได้รับข้อความจากซาโอริ คุณครูก็สังหรณ์ใจไม่ดี จึงรีบไปตามหาซาโอริที่ตลาดมืด)"
1004805-12 = "[ns] \"สะ.. เสียงปืน?!\""
1004805-13 = "นี่! ไม่รู้ว่ามาแถวนี้ทำไม แต่ระวังตัวด้วยละ!"
1004805-14 = "[s] \"เกิดเรื่องอะไรขึ้นเหรอ?!\""
1004805-15 = "ได้ยินว่าในตลาดมืดตอนนี้พวกแก๊งโฮ่งๆ กับพวกแก๊งเหมียวหง่าวกำลังต่อสู้กันอย่างดุเดือดเลย!"
1004805-16 = "แต่ว่าทางพวกแก๊งโฮ่งๆ ดันมีทหารรับจ้างฝีมือดีมาด้วยน่ะ!"
1004805-17 = "เพราะงั้นแก๊งเหมียวหง่าวเลยได้รับความเสียหายอย่างหนักเลยละ"
1004805-18 = "แต่ฉันได้ยินมาว่าพวกแก๊งเหมียวหง่าว วางกับดักไว้และเอาชนะทหารรับจ้างคนนั้นได้...!"
1004805-19 = "[s] \"หรือว่าจะเป็นซาโอริ...?!\""
1004805-23 = "อ๊ะ?! ดะ... เดี๋ยวก่อน!"
1004805-24 = "ตอนนี้ทางด้านตะวันตกของตลาดมืดพวกแก๊งเหมียวหง่าวยึดไปแล้ว ถ้าไปที่นั่น อาจเป็นอันตรายได้นะ?!"
1004805-29 = "(หลังจากได้ยินเรื่องสถานการณ์ไม่ดีเหล่านั้น คุณครูก็รีบวิ่งไปตามถนนเพื่อตามหาซาโอริ)"
1004805-39 = "[ns] \"ซาโอริ...!\""
1004805-41 = "[ns] \"ซาโอริ! อยู่ที่ไหนน่ะ...!\" "
1004805-47 = "(คุณครูวิ่งไปตามตรอก และซอยในตลาดมืดเพื่อตามหาซาโอริ)"
1004805-50 = "แฮ่ก... แฮ่ก..."
1004805-51 = "[ns] \"เสียงนั่น...! ซาโอริ!\""
1004805-62 = "― คุณครู... ทำไมถึงมาอยู่ที่นี่ได้?[wa:1950] "
1004805-65 = "[ns] \"ซาโอริ เธอบาดเจ็บนี่...\""
1004805-66 = "― อึก... เฮ้อ...[wa:740] "
1004805-69 = "― ไม่ต้องห่วงหรอก เรื่องแบบนี้เกิดขึ้นบ่อยแล้ว[wa:620] "
1004805-72 = "― ฉันก็แค่ไม่ระวังตัวเอง...[wa:2390] "
1004805-74 = "― ไม่มีอะไรเปลี่ยนไปเลยแท้ๆ...[wa:10] "
1004805-77 = "― ฉันเข้าใจผิดไปเอง... [wa:60] "
1004805-80 = "― แค่กๆ แค่กๆ...[wa:510] "
1004805-82 = "― อย่าทำหน้าแบบนั้นสิ ฉันชินกับความเจ็บปวดแล้วละ[wa:1390] "
1004805-85 = "― มันก็เป็นแบบนี้มาตลอด ไม่ได้มีอะไรเปลี่ยน"
1004805-87 = "― ไม่ใช่เรื่องที่ต้องตกใจเลย"
1004805-90 = "― แค่นี้... ฉันไม่เป็นไรหรอก[wa:420] "
1004805-92 = "― ฉันขออยู่แบบนี้... อีกสักหน่อยนะ[wa:2300] "
1004805-96 = "[ns] \"เราย้ายที่กันก่อนเถอะ\""
1004805-98 = "หืม? คะ...คุณครู... เดี๋ยว--"
1004805-105 = "[ns] \"ถ้ามาถึงที่นี่แล้วคงวางใจได้ระดับหนึ่งแล้วละ\""
1004805-106 = "ฉันรบกวนคุณครูอีกแล้วสินะ"
1004805-107 = "[s] \"เกิดอะไรขึ้น ไหนว่าได้งานทำแล้วไง\""
1004805-108 = "เป็นคำสั่งของกลุ่มที่จ้างฉันน่ะ พวกเขาให้ไปที่นั่นเพื่อยุติการประท้วง..."
1004805-109 = "แต่ไม่นึกว่าจะโดนกับดักของกลุ่มฝ่ายตรงข้ามเล่นงาน..."
1004805-110 = "[s] \"คราวนี้ได้เซ็นสัญญามั้ย?\""
1004805-114 = "สัญญาเหรอ... อยู่นี่ไง?"
1004805-120 = "[ns] \"นี่ ซาโอริ รายละเอียดในสัญญานี่น่ะ...\""
1004805-122 = "[ns] \"มันเขียนไว้ว่าเธอต้องไปจัดการฝ่ายตรงข้ามด้วยตัวคนเดียว\""
1004805-123 = "..."
1004805-124 = "[s] \"หรือว่าตอนเซ็นสัญญา ไม่ได้อ่านก่อนเหรอ?\""
1004805-125 = "หนังสือสัญญาน่ะ... แค่เซ็นอย่างเดียวก็พอไม่ใช่เหรอ...?"
1004805-126 = "[s] \"เดี๋ยวสิๆ ถ้าเซ็นสัญญาโดยไม่อ่านจะเป็นเรื่องใหญ่นะ?!\""
1004805-127 = "หืม...?"
1004805-128 = "[ns] \"แต่รายละเอียดก็เขียนไว้ได้อย่างแยบยลทีเดียว\""
1004805-132 = "(ตามรายละเอียดที่เขียนไว้ในสัญญา หลังจากซาโอริไปถึงที่เกิดเหตุแล้ว ให้ดึงความสนใจการต่อสู้#nมายังพื้นที่ทางตะวันตก แล้วเก็บกวาดให้เรียบร้อย)"
1004805-133 = "[s] \"พอลองคิดดูแล้ว...\""
1004805-135 = "อ๊ะ?! ดะ... เดี๋ยวก่อน!"
1004805-136 = "ตอนนี้ทางด้านตะวันตกของตลาดมืดพวกแก๊งเหมียวหง่าวยึดไปแล้ว ถ้าไปที่นั่น อาจเป็นอันตรายได้นะ?!"
1004805-140 = "(ก่อนมาก็ได้ยินว่าทางตะวันตกเป็นฐานทัพหลักของพวกฝ่ายแก๊งเหมียวหง่าวนี่นา)"
1004805-141 = "(ตรงนี้อยู่ไกลจากเขตตะวันตกมาก แต่ถ้าซาโอริไปที่นั่นตามที่เขียนไว้ในสัญญาละก็...)"
1004805-142 = "[s3] \"อืม ถ้าอ่านสัญญาก่อนอาจเป็นเรื่องใหญ่กว่านี้ก็ได้\"\n[s4] \"คนที่จ้างอาจคิดไม่ถึงว่าซาโอริจะไม่อ่านสัญญาก็ได้\""
1004805-143 = "(คุณครูกำลังคิดถึงเรื่องต่างๆ และสถานการณ์ของซาโอริ...)"
1004805-144 = "(คุณครูกำลังคิดถึงเรื่องต่างๆ และสถานการณ์ของซาโอริ...)"
1004805-145 = "(ดูเหมือนว่าซาโอริจะเป็นหมากที่ทางแก๊งโฮ่งๆ คิดจะใช้แล้วทิ้งตั้งแต่แรกสินะ...)"
1004805-149 = "(แบบนี้ก็หมายความว่า...)"
1004805-150 = "[s] \"คราวนี้โชคดีนะ แต่คราวหน้าต้องอ่านให้ละเอียดนะ ซาโอริ\""
1004805-151 = "งั้นเหรอ... โดนหลอกอีกแล้วสินะ"
1004805-152 = "แต่ก็ไม่ใช่เรื่องน่าแปลกใจ เพราะนี่ก็ไม่ใช่ครั้งแรกที่โดนแบบนี้"
1004805-153 = "[s] \"อ๊ะ...\""
1004805-154 = "ใช่แล้ว... มันไม่ใช่เรื่องใหม่ ไม่ใช่เรื่องแปลกอะไร เพราะงั้นช่างมันเถอะ..."
1004805-155 = "[ns] \"ช่วยไม่ได้นะ เราไปหาอะไรกินดีมั้ย?\""
1004805-159 = "ของกินเหรอ? พูดอะไรน่ะ คุณครู...?"
1004805-160 = "[s5] \"ตอนนี้ซาโอริดูเหนื่อยมากนี่นา\"\n[s6] \"เรื่องที่ผ่านไปแล้วก็ช่างมันเถอะ ไปหาข้าวกินกันดีกว่า\""
1004805-161 = "ฉันดูเหนื่อย เลยชวนไปกินข้าวงั้นเหรอ...?"
1004805-162 = "ชวนไปกินข้าวงั้นเหรอ...?"
1004805-169 = "ดะ... เดี๋ยวก่อนสิ...!"
1004805-178 = "[ns] \"ราเม็งร้านนี้อร่อยนะ\""
1004805-179 = "..."
1004805-180 = "[s] \"พอกินเสร็จแล้ว ครูจะสอนวิธีอ่านสัญญาให้นะ\""
1004805-181 = "คือว่า... ฉัน... "
1004805-182 = "[s] \"มีนัดเหรอ?\""
1004805-186 = "..."
1004805-187 = "เข้าใจแล้ว"
1004805-188 = "ก็ได้... คุณครู เอางั้นก็ได้"
1004805-189 = "คือฉัน... ฉันยัง... อืม..."
1004805-190 = "ฉันยังต้องเรียนรู้อะไรอีกเยอะเลย..."
1004805-192 = "(หลังจากกินข้าวกับซาโอริเสร็จแล้ว)"
1004805-193 = "(ขณะที่ทั้งคู่เดินไปตามถนนที่มืดสลัว คุณครูก็พยายามสอนทุกอย่างที่จำเป็นให้กับซาโอริ...)"

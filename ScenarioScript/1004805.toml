[translation]
1004805-1 = "內疚"
1004805-4 = "（心中越想越擔心，於是便前往黑市找沙織）"
1004805-12 = "[ns] 「槍，槍聲！？」"
1004805-13 = "那邊那位！雖然不知道你來這裡做什麼，總之小心點！"
1004805-14 = "[s] 「這場騷動是怎麼回事！？」"
1004805-15 = "黑市最惡名昭彰的汪汪派和喵喵派今天正在火拼！"
1004805-16 = "不過汪汪派那邊雇了一個非常厲害的幫手！"
1004805-17 = "導致喵喵派現在傷亡慘重……"
1004805-18 = "不過我也聽說那個幫手中了喵喵派的陷阱，已經被打倒了……！"
1004805-19 = "[s] 「厲害的幫手……難道是沙織……！？」"
1004805-23 = "啊，等等啊！"
1004805-24 = "黑市西區現在已經被喵喵派佔領了！#n戰況相當激烈，現在過去會被捲進去的！！"
1004805-29 = "（明知當下情況非常危險，依然為了尋找沙織而跑遍整個黑市）"
1004805-39 = "[ns] 「沙織……！」"
1004805-41 = "[ns] 「沙織，你到底在哪裡……！」"
1004805-47 = "（在不絕於耳的槍聲與爆炸聲中，依然故我地尋找沙織好一陣子……）"
1004805-50 = "哈啊……哈啊……"
1004805-51 = "[ns] 「這個聲音是……沙織！？」"
1004805-62 = "― 老師， 你怎麼會在這裡……？[wa:2710] "
1004805-65 = "[ns] 「沙織，你受傷了……！」"
1004805-66 = "― 呃……哈啊……[wa:1020] "
1004805-69 = "― ……別擔心，這是常有的事。[wa:1860] "
1004805-72 = "― 我只是在最後關頭，鬆懈了……[wa:2830] "
1004805-74 = "― 明明什麼都沒改變……[wa:490] "
1004805-77 = "― 是我誤會了。[wa:660] "
1004805-80 = "― 咳咳，咳咳……！[wa:750] "
1004805-82 = "― 不需要露出那種表情，我已經習慣疼痛了。[wa:2470] "
1004805-85 = "― 和以往沒什麼不同。"
1004805-87 = "― 事到如今也不值一提了。"
1004805-90 = "― 現在這樣就行了……[wa:1100] "
1004805-92 = "― 再稍微，維持這樣……[wa:3180] "
1004805-96 = "[ns] 「……總之先換個地方吧。」"
1004805-98 = "不，我……呃……"
1004805-105 = "[ns] 「來到這附近應該沒問題了吧……」"
1004805-106 = "……又給你添麻煩了。"
1004805-107 = "[s] 「這到底是怎麼回事？我聽說你接了工作……」"
1004805-108 = "我接到工作，前往現場終止火拼。"
1004805-109 = "結果卻中了對方的陷阱……"
1004805-110 = "[s] 「……沙織，你合約有帶在身上嗎？」"
1004805-114 = "在這裡……"
1004805-120 = "[ns] 「這上面的內容……」"
1004805-122 = "[ns] 「這是要你獨自一人對上整個喵喵派……？」"
1004805-123 = "……"
1004805-124 = "[s] 「看你的表情，難道你沒有看過內容嗎……？」"
1004805-125 = "……我這次有確實簽合約啊？"
1004805-126 = "[s] 「不不不！怎麼可以沒看過內容就簽名呢！」"
1004805-127 = "是這樣嗎……？"
1004805-128 = "[ns] 「不過這份合約也是寫得很有技巧……」"
1004805-132 = "（合約整體寫得很拐彎抹角，但結論就是……沙織必須獨自收拾西地區的戰況）"
1004805-133 = "[s] 「這麼說來……」"
1004805-135 = "啊，等等啊！"
1004805-136 = "黑市西區現在已經被喵喵派佔領了！#n戰況相當激烈，現在過去會被捲進去的！！"
1004805-140 = "（在來這裡的路上，人家確實說西區已經被喵喵派佔領，情況相當危險……）"
1004805-141 = "（算是西區外圍的這裡都這麼慘烈了……#n　要是沙織真的按照合約上面寫的前往西區中心……）"
1004805-142 = "[s3] 「假如沙織有仔細看過合約，說不定情況會變得更糟……？」\n[s4] 「沒看合約反而撿回一命了……？」"
1004805-143 = "（根據眼下的狀況及沙織的處境）"
1004805-144 = "（根據眼下的狀況及沙織的處境）"
1004805-145 = "（恐怕汪汪派從一開始，就是把沙織雇來當棄子的吧）"
1004805-149 = "（這也就表示……）"
1004805-150 = "[s] 「雖然這次運氣好撿回一命，但下次一定要仔細閱讀過合約內容喔。」"
1004805-151 = "……這樣啊。我又被騙了嗎？"
1004805-152 = "……不過現在說這些也於事無補了。#n這是常有的事。"
1004805-153 = "[s] 「……」"
1004805-154 = "沒什麼好大驚小怪的……所以……"
1004805-155 = "[ns] 「……總之我們先去吃點好吃的吧。」"
1004805-159 = "怎麼突然說這些……？"
1004805-160 = "[s5] 「現在應該很累了吧？」\n[s6] 「反正過去的事情都已經過去了，先去補充營養再說吧。」"
1004805-161 = "就這樣去吃飯……？"
1004805-162 = "就這樣去吃飯……？"
1004805-169 = "等，等等……！"
1004805-178 = "[ns] 「這家的拉麵很好吃喔。」"
1004805-179 = "……"
1004805-180 = "[s] 「吃完飯後，再一起學習簽合約時要注意的事情吧。」"
1004805-181 = "我，怎麼能……"
1004805-182 = "[s] 「不管，約好了哦？」"
1004805-186 = "……"
1004805-187 = "……我知道了。"
1004805-188 = "說的也是……"
1004805-189 = "畢竟我現在……"
1004805-190 = "……還有很多必須學習的東西。"
1004805-192 = "（於是和沙織一起吃了拉麵）"
1004805-193 = "（然後為了接下來的學習，緩緩走進了黑暗的街道）"

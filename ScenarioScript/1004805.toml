[translation]
1004805-1 = "Blaming Yourself"
1004805-4 = "After getting Saori's message, I couldn't let go of my anxious thoughts, so I went to see her at the Black Market."
1004805-12 = "[ns] \"A g-gunshot?!\""
1004805-13 = "Hey! I don't know what you're doing here, but watch out!"
1004805-14 = "[s] \"What's this commotion about?\""
1004805-15 = "The Woof Woof Dog faction and the Meow Meow faction are going head-to-head at the Black Market!"
1004805-16 = "The Woof Woof Dogs showed up with some seriously strong mercenary."
1004805-17 = "The Meow Meow faction suffered a lot of casualties because of her."
1004805-18 = "But now they're setting up a trap to try to get her!"
1004805-19 = "[s] \"Could that be Saori...?!\""
1004805-23 = "Huh?! W-Wait!"
1004805-24 = "The western district of the Black Market is occupied by the main forces of the Meow Meow faction! It's dangerous there!"
1004805-29 = "Hearing that made me so nervous that I ran through the streets of the Black Market as fast as I could searching for Saori."
1004805-39 = "[ns] \"Saori...!\""
1004805-41 = "[ns] \"Saori, where are you?\""
1004805-47 = "I wandered the back alleys of the Black Market desperately searching for her."
1004805-50 = "*pant* *pant*"
1004805-51 = "[ns] \"That voice...! Saori!\""
1004805-62 = "― Sensei, what are you doing here...?[wa:1870] "
1004805-65 = "[ns] \"Saori, you're hurt...\""
1004805-66 = "― Ugh... *sigh*[wa:780] "
1004805-69 = "― Don't worry. It happens all the time.[wa:900] "
1004805-72 = "― I just wasn't careful...[wa:2430] "
1004805-74 = "― Nothing has changed...[wa:10] "
1004805-77 = "― I deluded myself. [wa:180] "
1004805-80 = "― *cough* *cough*[wa:470] "
1004805-82 = "― Don't make that face. I'm used to pain.[wa:1670] "
1004805-85 = "― It's always been this way."
1004805-87 = "― Really, this is nothing new."
1004805-90 = "― I'm  fine...[wa:980] "
1004805-92 = "― I just want to stay like this a bit...[wa:2060] "
1004805-96 = "[ns] \"Let's get out of here.\""
1004805-98 = "Huh? S-Sensei. Wait..."
1004805-105 = "[ns] \"We should be safe here.\""
1004805-106 = "I'm causing trouble for you...again."
1004805-107 = "[s] \"What happened? You told me you had work.\""
1004805-108 = "As directed by the organization that hired me, I went to quell some strife..."
1004805-109 = "I didn't know it was a trap set by an enemy organization..."
1004805-110 = "[s] \"Do you have a contract?\""
1004805-114 = "Here it is..."
1004805-120 = "[ns] \"...Um, Saori. According to this contract...\""
1004805-122 = "[ns] \"You must fight against the enemy organization, the Meow Meow faction, alone...?\""
1004805-123 = "..."
1004805-124 = "[s] \"Did you read the contract...?\""
1004805-125 = "I thought...I just had to sign it...?"
1004805-126 = "[s] \"Saori. Always read a contract before signing.\""
1004805-127 = "...Hmm?"
1004805-128 = "[ns] \"Contracts are written in tricky ways...\""
1004805-132 = "According to the contract, Saori was supposed to finish the western district after the initial strife."
1004805-133 = "[s] \"Come to think of it...\""
1004805-135 = "Huh?! W-Wait!"
1004805-136 = "The western district of the Black Market is occupied by the main forces of the Meow Meow faction! It's dangerous there!"
1004805-140 = "On my way here, I heard the western district was dangerous because it's being occupied by the Meow Meow faction's main forces."
1004805-141 = "This place is far away from the western district, but if Saori had went where the contract indicated..."
1004805-142 = "[s3] \"That means...it could have been worse if you had read the contract.\"\n[s4] \"The employer probably didn't expect you to not read the contract...\""
1004805-143 = "Judging by this situation and what Saori is dealing with..."
1004805-144 = "Judging by this situation and what Saori is dealing with..."
1004805-145 = "It seems Saori was only hired to be disposed of by the Woof Woof Dog faction, her employer."
1004805-149 = "That means..."
1004805-150 = "[s] \"You got lucky this time, but you have to read your contracts carefully, Saori.\""
1004805-151 = "Oh. I got tricked again?"
1004805-152 = "I'm not surprised. It isn't the first time."
1004805-153 = "[s] \"Saori...\""
1004805-154 = "Please don't make a fuss about it."
1004805-155 = "[ns] \"If that's what you want. Now, let's get some food in you.\""
1004805-159 = "Food? Wh-What are you saying?"
1004805-160 = "[s5] \"Your body is exhausted. It needs fuel.\" \n[s6] \"Leave it in the past. For now, you need a hot meal.\""
1004805-161 = "Just go eat...?"
1004805-162 = "Just go eat...?"
1004805-169 = "W-Wait...!"
1004805-178 = "[ns] \"The ramen here is pretty good.\""
1004805-179 = "..."
1004805-180 = "[s] \"After we eat, I'll teach you how to read contracts.\""
1004805-181 = "I...just..."
1004805-182 = "[s] \"Promise?\""
1004805-186 = "..."
1004805-187 = "Okay."
1004805-188 = "All right, Sensei. Let's do that..."
1004805-189 = "I'm... Sensei..."
1004805-190 = "I have a lot to learn still."
1004805-192 = "We ate a delicious bowl of ramen together."
1004805-193 = "And then as we walked the dark streets, I taught her everything I could."

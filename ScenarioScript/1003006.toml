[translation]
1003006-1 = "#Title;둘 만을 위한 노천탕"
1003006-2 = "3;치나츠 온천ND;02;아, 선생님. 오셨군요. 기다리고 있었습니다.\n#3;em;[반응]\n#3;a"
1003006-3 = "3;치나츠 온천ND;01;말씀드린 대로 이곳 료칸의 저녁 숙박권을 예약해 두었습니다."
1003006-4 = "3;치나츠 온천ND;99;이 료칸은 게헨나 학원에서도 손꼽히는 유서 깊은 료칸으로 키보토스 전역에서 손님들이 끊이지 않고 찾아오는지라, 평범한 방법으로는 예약하는 것조차 쉽지 않은 관광명소입니다."
1003006-5 = "3;치나츠 온천ND;03;하지만 다행히 선도부에게 주어지는 특권으로 하루 치의 숙박권을 어렵사리 구할 수 있었던지라, 이렇게 선생님을 모시게 되었습니다.\n#3;em;[반짝]\n#3;greeting"
1003006-6 = "[s1] \"그런 귀한 숙박권을 받아도 괜찮아?\"\n[s2] \"뭔가 부담스러운걸…….\""
1003006-7 = "3;치나츠 온천ND;02;아뇨, 선생님께서 그동안 제게 베풀어주셨던 은혜를 생각하면 오히려 하루로는 모자랄 정도입니다.\n#3;em;[반응]"
1003006-8 = "3;치나츠 온천ND;02;아뇨, 선생님께서 그동안 제게 베풀어주셨던 은혜를 생각하면 오히려 하루로는 모자랄 정도입니다.\n#3;em;[반응]"
1003006-9 = "3;치나츠 온천ND;01;하지만 선생님의 시간을 더 빼앗았다가는 일정에도 여러 가지 문제가 생길 테니, 부디 하루 치의 숙박권으로 만족해 주셨으면 합니다."
1003006-10 = "3;치나츠 온천ND;09;게다가 이 료칸은 2인 숙박이 기본 조건이었던지라……"
1003006-11 = "3;치나츠 온천ND;06;같이 갈 사람이 없어서 곤란하던 참이었거든요.\n#3;em;[땀]\n#3;stiff"
1003006-12 = "[s] \"그럼 치나츠의 성의를 받도록 할게.\""
1003006-13 = "3;치나츠 온천ND;01;네, 오늘은 제가 성심성의껏 선생님을 모시겠습니다."
1003006-14 = "#st;[0,0];instant;1;"
1003006-15 = "#clearST"
1003006-16 = "\n#wait;200"
1003006-17 = "#all;hide"
1003006-18 = "#wait;500"
1003006-19 = "3;지배인;03;어서 오십시오. 저희 료칸을 찾아주셔서 대단히 감사합니다.\n#3;em;[반짝]\n#3;greeting\n#3;a"
1003006-20 = "3;지배인;01;오늘 하루 숙박을 예약하신 히노미야 치나츠님이시지요?"
1003006-21 = "1;치나츠 온천ND;02;네, 두 사람분의 저녁 식사와 숙소를 예약했는데요.\n#1;em;[반응]\n#1;ar\n#3;m5"
1003006-22 = "3;지배인;02;네, 확인했습니다."
1003006-23 = "3;지배인;01;그나저나 손님, 지금 저희 료칸에서는 커플 손님에게 전세 노천탕 시설을 무료로 제공하고 있습니다."
1003006-24 = "3;지배인;03;호화로운 프라이빗 온천을 전세 낼 수 있는 모처럼의 기회이니, 한 번 이용해 보시는 게 어떠신가요?\n#3;greeting\n#3;em;[음표]"
1003006-25 = "1;치나츠 온천ND;04;네? 커, 커, 커플이요?!\n#1;shake\n#1;em;[?!]"
1003006-26 = "3;지배인;01;네. 여기 예약서에 커플전용 플랜을 선택하셨기에……"
1003006-27 = "3;지배인;02;혹시 예약서에 무슨 문제라도 있으신가요?\n#3;em;[?]"
1003006-28 = "1;치나츠 온천ND;06;(이런, 큰일이네요. 예약을 서두르느라 오기재를 하고 말았어요.)\n#1;stiff\n#1;em;[속상함]"
1003006-29 = "1;치나츠 온천ND;04;(학생과 선생이 커플이라니. 이런 부끄러운 실수를 한 걸 선생님께서 아신다면, 저를 어찌 생각하실지……)"
1003006-30 = "1;치나츠 온천ND;06;……저, 제가 실수를 한 것 같네요.\n#1;em;[...]"
1003006-31 = "3;지배인;04;네? 그럼 혹시 두 분은 커플이 아니신가요?\n#3;stiff\n#3;em;[땀]"
1003006-32 = "[s3] \"아뇨, 틀리지 않았습니다.\"\n[s4] \"아직 익숙하지 않은 것뿐이라…….\""

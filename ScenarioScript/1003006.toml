1003006-95 = "3;치나츠 온천ND;99;혼자서 탕을 즐기다가 더운물 때문에 현기증이라도 나면 큰일이니까요."
1003006-96 = "3;치나츠 온천ND;03;게헨나의 보건 담당이자, 일단은 서류상의 커플로서…… 선생님을 옆에서 계속 지켜봐 드리겠습니다.\n#3;em;[하트]\n#3;greeting"

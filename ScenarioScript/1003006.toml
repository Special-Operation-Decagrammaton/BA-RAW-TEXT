[translation]
1003006-1 = "An Open-Air Bath for Two"
1003006-2 = "Oh, you're here, Sensei. I was waiting for you."
1003006-3 = "As I said, I made a dinner reservation for the ryokan here."
1003006-4 = "This ryokan is one of the most historic ryokans at Gehenna Academy. It is a tourist attraction that guests from all over Kivotos flock to, so it's difficult to secure a reservation through ordinary means."
1003006-5 = "Fortunately, I procured a one-day voucher thanks to the special privilege given to Prefect Team members. So, I was able to invite you, Sensei."
1003006-6 = "[s1] \"Are you sure I can accept such a precious voucher?\"\n[s2] \"I feel bad...\""
1003006-7 = "No, considering all the kindness that you showed me, I feel like even this isn't enough."
1003006-8 = "No, considering all the kindness that you showed me, I feel like even this isn't enough."
1003006-9 = "However, I don't want to take too much of your time, so I hope you will be satisfied with a one-day voucher."
1003006-10 = "Besides, this ryokan requires two people to use, and..."
1003006-11 = "I was having trouble finding someone to go with."
1003006-12 = "[s] \"Then I accept your gift, Chinatsu.\""
1003006-13 = "Then, I will be at your service today, Sensei."
1003006-19 = "Welcome. Thank you very much for visiting our ryokan."
1003006-20 = "Are you the Miss Hinomiya Chinatsu who made a one-day reservation?"
1003006-21 = "Yes, I reserved dinner and a room for two people."
1003006-22 = "Wonderful, thank you for checking in."
1003006-23 = "Our ryokan is currently offering the open-air bath facilities free of charge to guests who register as a couple."
1003006-24 = "This is a rare opportunity to have our luxurious private hot springs to yourselves, if you would like."
1003006-25 = "What? C-Couple?!"
1003006-26 = "Yes, you chose the couple plan on the reservation here..."
1003006-27 = "Is that an issue?"
1003006-28 = "(Oh no. I made a typo because I was in such a hurry to make the reservation.)"
1003006-29 = "(How can a student and a teacher be a couple? What is Sensei going to think of me if they notice my blunder?)"
1003006-30 = "Uh, I think I made a mistake."
1003006-31 = "Excuse me? Are you not a couple then?"
1003006-32 = "[s3] \"No, we are.\"\n[s4] \"We're just still getting used to it...\""
1003006-35 = "S-S-Sensei?!"
1003006-36 = "Oh, I see."
1003006-37 = "Then, I will prepare the open-air bath as requested."
1003006-38 = "The bath is right in front of your rooms, so please feel free to use it whenever you'd like."
1003006-43 = "S-S-Sensei?! Why did you lie?"
1003006-44 = "You think it would be a waste to not enjoy a service provided by a luxurious ryokan?"
1003006-45 = "I suppose..."
1003006-46 = "But a reserved open-air bath means...we would be using the same bath..."
1003006-47 = "I didn't expect something like this..."
1003006-51 = "No, it's nothing."
1003006-52 = "Today I am repaying you for your kindness. I will not bother you about trivial things."
1003006-53 = "I believe dinner will not be ready for a while."
1003006-59 = "Shall we enjoy the open-air bath first?"
1003006-62 = "― I can't believe we are the only two using this luxurious hot bath.[wa:940] "
1003006-64 = "― I suppose you never really know what can happen in life.[wa:30] "
1003006-67 = "― Maybe someday... A future like this...[wa:3380] "
1003006-70 = "― N-N-No! It's nothing![wa:2310] "
1003006-73 = "― If it, somehow, were to really happen someday...[wa:4110] "
1003006-76 = "― I would be happy beyond[wa:2130] "
1003006-78 = "― what I deserve, but..."
1003006-81 = "― Even if we are just teacher and student,[wa:10] "
1003006-83 = "― right now, I'm really happy. Truly...[wa:3150] "
1003006-86 = "That was an amazing bath."
1003006-87 = "The fatigue of this day, or perhaps rather this entire semester, seems to have melted away."
1003006-88 = "So Sensei, what do you plan to do now?"
1003006-89 = "I believe there are many enjoyable facilities in this ryokan besides the hot springs..."
1003006-90 = "What? You want to enjoy the open-air bath again?"
1003006-94 = "...Then I will join you, Sensei."
1003006-95 = "It would be dangerous if you got dizzy from the hot water while enjoying the bath alone."
1003006-96 = "I suppose we are a couple—on paper, anyway. And I am the head of medical aid, so...allow me to look after you for a while."
1003006-98 = "(Afterwards, I enjoyed the bath with Chinatsu until I felt dizzy.)"

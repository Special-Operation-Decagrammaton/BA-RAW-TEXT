1003006-43 = "1;치나츠 온천ND;04;서, 서, 선생님?! 어째서 그런 거짓말을 하신 건가요?\n#1;em;[땀]"
1003006-44 = "1;치나츠 온천ND;08;네? 모처럼의 호화 료칸에서 제공하는 서비스인데, 받지 않으면 아깝다고요?"
1003006-45 = "1;치나츠 온천ND;09;그건 그렇습니다만……"
1003006-46 = "1;치나츠 온천ND;04;둘이서 전세 노천탕에 들어간다는 건 결국…… 선생님과 같은 탕에 들어가게 된다는 뜻……\n#1;em;[///]\n#1;stiff"
1003006-47 = "1;치나츠 온천ND;06;설마 이런 일이 될 줄이야……\n#fontsize;50"

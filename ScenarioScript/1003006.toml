1003006-51 = "1;치나츠 온천ND;07;……아니, 아무것도 아닙니다."
1003006-52 = "1;치나츠 온천ND;99;오늘은 선생님의 은혜에 보답하기 위한 자리니까요. 사소한 것 때문에 폐를 끼칠 수는 없습니다."

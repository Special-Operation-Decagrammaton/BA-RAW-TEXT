[translation]
1003006-1 = "บ่อออนเซ็นส่วนตัวของสองเรา"
1003006-2 = "อ๊ะ คุณครู มาแล้วเหรอคะ ฉันกำลังรออยู่เลยค่ะ"
1003006-3 = "ฉันจองห้องพักที่เรียวกังเอาไว้แล้วค่ะ"
1003006-4 = "เรียวกังนี้เป็นหนึ่งในเรียวกังที่เก่าแก่ที่สุดในสถาบันเกเฮนน่า และเนื่องจากเป็นเรียวกังที่มีชื่อเสียง#nเลยทำให้มีลูกค้าจากทั่วทั้งคิโวทอสมาใช้บริการจำนวนมาก ถ้าใช้วิธีจองแบบทั่วไปจะจองยากมากค่ะ"
1003006-5 = "ต้องขอบคุณทางคณะกรรมการวินัยที่ช่วยหาบัตรกำนัลหายากนี่มาให้ค่ะ#nวันนี้ฉันเลยชวนคุณครูมาที่นี่ได้"
1003006-6 = "[s1] \"ใช้บัตรหายากแบบนั้นกับครูจะดีเหรอ?\"\n[s2] \"รู้สึกเกรงใจจัง...\""
1003006-7 = "ไม่เป็นไรเลยค่ะ ถ้านึกถึงสิ่งที่คุณครูคอยช่วยเหลือฉันมาโดยตลอด ฉันรู้สึกว่าตอบแทนเท่านี้#nยังไม่พอเลยด้วยซ้ำค่ะ"
1003006-8 = "ไม่ต้องเกรงใจหรอกค่ะ ถ้านึกถึงสิ่งที่คุณครูคอยช่วยเหลือฉันมาโดยตลอด ฉันรู้สึกว่า#nตอบแทนเท่านี้ยังไม่พอเลยด้วยซ้ำค่ะ"
1003006-9 = "แต่ถ้าฉันใช้เวลากับคุณครูมากขึ้นก็อาจจะทำให้ตารางงานของคุณครูมีปัญหาได้#nเพราะงั้นฉันหวังว่าการมาพักที่นี่หนึ่งคืนจะทำให้คุณครูพอใจนะคะ"
1003006-10 = "อีกอย่าง เรียวกังนี้มีเงื่อนไขว่าจะต้องมาพักสองคนค่ะ"
1003006-11 = "ฉันกังวลอยู่นานมากเพราะกลัวว่าจะไม่มีคนมาด้วย"
1003006-12 = "[s] \"ถ้างั้นครูจะรับน้ำใจของชินัตสึไว้นะ\""
1003006-13 = "ค่ะ วันนี้ฉันจะดูแลคุณครูเองค่ะ"
1003006-19 = "ยินดีต้อนรับครับ ขอบพระคุณที่มาใช้บริการเรียวกังของพวกเรา"
1003006-20 = "คุณฮิโนมิยะ ชินัตสึที่จองที่พักไว้วันนี้รึเปล่าครับ?"
1003006-21 = "ค่ะ ฉันจองห้องพักพร้อมอาหารค่ำสำหรับสองคนไว้ค่ะ"
1003006-22 = "ครับ ขอตรวจสอบสักครู่นะครับ"
1003006-23 = "คุณลูกค้าครับ เรียวกังของเรามีบ่อออนเซ็นส่วนตัวสำหรับลูกค้าที่จองห้องพักแบบคู่รักด้วยนะครับ"
1003006-24 = "โอกาสที่จะได้พักในห้องพักสุดหรูที่มีบ่อออนเซ็นส่วนตัวแบบนี้หายากมากนะครับ#nสนใจเข้าพักห้องนี้มั้ยครับ?"
1003006-25 = "คะ...คู่รักเหรอคะ?!"
1003006-26 = "ครับ จากรายละเอียดในใบจองที่พัก ระบุว่าคุณลูกค้าทั้งสองท่านเป็นคู่รักกัน..."
1003006-27 = "หรือว่าข้อมูลในใบจองมีปัญหาอะไรรึเปล่าครับ?"
1003006-28 = "(แบบนี้เรื่องใหญ่แน่ เพราะรีบจองเลยกรอกข้อมูลผิดซะแล้ว)"
1003006-29 = "(ครูกับนักเรียนจะเป็นคู่รักกันได้ยังไง... ถ้าคุณครูรู้ว่าฉันทำพลาดร้ายแรงแบบนี้จะคิดยังไงกันนะ...)"
1003006-30 = "ดะ...ดูเหมือนฉันจะกรอกข้อมูลผิดค่ะ"
1003006-31 = "ครับ? ถ้างั้นพวกคุณก็ไม่ใช่คู่รักกันงั้นเหรอครับ?"
1003006-32 = "[s3] \"ถูกต้องแล้วละ\"\n[s4] \"เราแค่ยังไม่ชินน่ะ\""
1003006-35 = "คะ...คุณครูคะ?!"
1003006-36 = "อะฮ่า อย่างนี้นี่เองสินะครับ"
1003006-37 = "ถ้างั้นทางเราจะเตรียมห้องที่มีบ่อออนเซ็นส่วนตัวให้นะครับ"
1003006-38 = "บ่อออนเซ็นจะอยู่ด้านหน้าห้องพัก สามารถใช้ได้ตามสะดวกเลยนะครับ"
1003006-43 = "คะ...คุณครูคะ?! ทำไมถึงโกหกไปแบบนั้นล่ะคะ?"
1003006-44 = "คะ? ไหนๆ ก็เป็นบริการฟรีจากเรียวกังสุดหรู ถ้าไม่รับไว้ก็น่าเสียดายงั้นเหรอคะ?"
1003006-45 = "มันก็ใช่อยู่หรอกนะคะ..."
1003006-46 = "บ่อออนเซ็นส่วนตัว หมายถึงฉันจะได้ลงแช่น้ำกับคุณครูงั้นเหรอ..."
1003006-47 = "ไม่คิดเลยว่าจะเกิดอะไรแบบนี้..."
1003006-51 = "มะ... ไม่มีอะไรค่ะ"
1003006-52 = "วะ...วันนี้ฉันมาที่นี่ก็เพื่อตอบแทนคุณครูนี่คะ คงจะทำให้คุณครูลำบากใจเพราะเรื่องเล็กๆ น้อยๆ ไม่ได้หรอกค่ะ"
1003006-53 = "กว่าจะถึงเวลาอาหารเย็นก็อีกสักพักเลย..."
1003006-59 = "ถ้างั้น... พวกเราลงไปแช่ออนเซ็นกันก่อนมั้ยคะ?"
1003006-62 = "― ไม่คิดเลย... ว่าจะได้มาแช่ออนเซ็นสุดหรู ด้วยกันสองคนแบบนี้[wa:1260] "
1003006-64 = "― บางครั้ง เราก็ไม่รู้เลยนะคะ ว่าจะเกิดอะไรขึ้นในชีวิตบ้าง[wa:30] "
1003006-67 = "― สักวันหนึ่ง บางที... ในอนาคตก็อาจจะมีโอกาส...[wa:3100] "
1003006-70 = "― อ๊ะ เปล่าค่ะ ไม่มีอะไรค่ะ! ไม่ต้องใส่ใจหรอกค่ะ…![wa:1230] "
1003006-73 = "― แต่ถ้า... สักวันหนึ่ง มันจะเป็นจริงขึ้นมาละก็...[wa:4110] "
1003006-76 = "― ฉันคงรู้สึก... ดีใจมากจนคิดภาพไม่ออกเลยแน่ๆ ค่ะ[wa:1170] "
1003006-78 = "― แต่ว่า..."
1003006-81 = "― ฉันคิดว่าความสัมพันธ์ตอนนี้...[wa:90] "
1003006-83 = "― แบบคุณครูกับนักเรียนแบบนี้ ก็เพียงพอแล้วค่ะ จริงๆ นะคะ...[wa:2350] "
1003006-86 = "บ่อออนเซ็นนี่ดีจริงๆ ด้วยนะคะ"
1003006-87 = "รู้สึกเหมือนความเหนื่อยล้าที่สะสมมาทั้งวัน แล้วก็เกือบตลอดเทอม หายไปหมดเลยค่ะ"
1003006-88 = "ถ้างั้นคุณครูคะ... ตอนนี้จะทำอะไรต่อดีคะ?"
1003006-89 = "ที่เรียวกังนี่ นอกจากออนเซ็นแล้วก็ยังมีสิ่งอำนวยความสะดวกอื่นๆ อยู่เยอะมากเลยค่ะ"
1003006-90 = "คะ? อยากลงแช่ออนเซ็นอีกครั้งเหรอคะ?"
1003006-94 = "ถ้างั้นฉันก็จะลงไปแช่ออนเซ็นกับคุณครูด้วยค่ะ"
1003006-95 = "ถ้าเกิดเวียนหัวตอนแช่น้ำร้อนคนเดียวจะเป็นเรื่องใหญ่ได้ค่ะ"
1003006-96 = "ในฐานะผู้รับผิดชอบด้านสุขอนามัยของเกเฮนน่า และในฐานะ \"คู่รัก\" ตามที่ระบุในใบเข้าพักแล้ว...#nฉันจะคอยดูแลคุณครูอยู่ข้างๆ เองค่ะ"
1003006-98 = "(จากนั้นคุณครูก็ใช้เวลาสนุกสนานกับชินัตสึในบ่อออนเซ็นจนกระทั่งรู้สึกมึนหัว)"

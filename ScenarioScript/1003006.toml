[translation]
1003006-1 = "專屬於兩人的"
1003006-2 = "啊，老師，辛苦了。"
1003006-3 = "就是這間旅館。我已經預約好住宿了。"
1003006-4 = "這裡是格黑娜學園首屈一指的旅館，#n因為來自整個奇普托斯的客人絡繹不絕，一般來說是預約不到的。"
1003006-5 = "幸好，我拜託風紀委員會請他們稍微通融一下，總算是預約到了一個晚上的房間。"
1003006-6 = "[s1] 「這麼棒的地方，讓我來住沒關係嗎？」\n[s2] 「感覺緊張起來了……」"
1003006-7 = "考量到老師一直以來對我的照顧，我反而覺得這樣還不夠呢。"
1003006-8 = "考量到老師一直以來對我的照顧，我反而覺得這樣還不夠呢。"
1003006-9 = "不過也不能占用忙碌的老師好幾天的時間，所以這次就先住一天吧。"
1003006-10 = "而且這間旅館，似乎本來就不能一個人入住……"
1003006-11 = "如果要找人一起的話，果然還是，那個……"
1003006-12 = "[s] 「那就承蒙你的好意了。」"
1003006-13 = "好的，請務必這麼做。今天就讓我誠心誠意地招待老師吧。"
1003006-19 = "歡迎光臨，感謝貴賓蒞臨我們的旅館。"
1003006-20 = "是預約今天一晚的火宮千夏小姐對吧？"
1003006-21 = "是的，我預約了兩人份的晚餐和住宿。"
1003006-22 = "好的，我已確認完畢，感謝您。"
1003006-23 = "話說回來，客人。現在我們旅館正為情侶遊客免費提供包場的露天溫泉。"
1003006-24 = "是相當豪華的露天溫泉哦，您意下如何呢？"
1003006-25 = "情，情侶……！？"
1003006-26 = "是，是的。因為預約單上面選擇了情侶專屬方案，所以……"
1003006-27 = "還是預約出了什麼問題嗎……？"
1003006-28 = "（怎，怎麼會……因為趕時間就匆忙地預約了，所以沒有仔細確認方案……？）"
1003006-29 = "（竟，竟然和老師是情侶……老師會怎麼想呢……）"
1003006-30 = "呃，那個，其實是我搞錯了……"
1003006-31 = "咦，兩位不是情侶嗎……？"
1003006-32 = "[s3] 「不，我們是情侶沒錯。」\n[s4] 「不好意思，我們還不太習慣。」"
1003006-35 = "老，老老老老師！？"
1003006-36 = "原來如此，是這樣啊。"
1003006-37 = "兩位的感情真令人羨慕呢。#n那麼我就照剛才說的，為兩位安排包場露天溫泉了。"
1003006-38 = "露天溫泉就在前面而已，請自行選擇方便的時間使用。"
1003006-43 = "老，老師！？為什麼要這麼說呢……！？"
1003006-44 = "……咦？難得能免費享受豪華旅館的露天溫泉，不用就太可惜了？"
1003006-45 = "是，是這麼說沒錯啦……"
1003006-46 = "兩個人泡包場溫泉的話，也就是要跟老師一起泡湯……"
1003006-47 = "沒，沒想到會變成這樣……！"
1003006-51 = "啊……不，沒什麼，請別在意……"
1003006-52 = "今天是為了報答老師而來的，不能因為我的關係造成老師的困擾。"
1003006-53 = "離晚餐還有一點時間……"
1003006-59 = "如果老師願意的話，那個……要不要一起泡溫泉呢？"
1003006-62 = "― 這麼豪華的溫泉竟然可以兩個人獨自享受……[wa:2780] "
1003006-64 = "― 人生真是，難以預料會發生什麼呢。[wa:1630] "
1003006-67 = "― 有朝一日……也許，這樣的未來也……[wa:4220] "
1003006-70 = "― 啊，沒，沒什麼！請別在意……！[wa:2550] "
1003006-73 = "― 不那個，如果真的能夠成真的話……[wa:5390] "
1003006-76 = "― 那種美好的日子，也不是，[wa:2570] "
1003006-78 = "― 沒有想像過…………"
1003006-81 = "― 學生和老師，[wa:1050] "
1003006-83 = "― 現在，光是這樣就十分幸福了。真的……[wa:3910] "
1003006-86 = "呵呵，真是不錯的溫泉呢……"
1003006-87 = "總覺得最近的疲勞都一掃而空了。"
1003006-88 = "老師，接下來想做什麼呢？"
1003006-89 = "這個旅館除了溫泉以外，還有很多很有趣的設施……"
1003006-90 = "……咦？等等還想再泡一次溫泉嗎……？"
1003006-94 = "……那我也跟老師一起去吧。"
1003006-95 = "萬一老師逞強，結果泡到昏倒可就糟了呢。"
1003006-96 = "身為格黑娜的救護負責人……還有現在是情，情侶……我會保護老師的。"
1003006-98 = "（之後，直到泡昏頭的前一刻都和千夏一起享受著露天溫泉）"

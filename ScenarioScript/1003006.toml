1003006-87 = "3;치나츠 온천ND;01;하루의 피로는 물론이고, 학기 중에 쌓인 피로까지 모두 날아가는 느낌이었습니다."
1003006-88 = "3;치나츠 온천ND;02;그럼 선생님, 지금부터 무얼 하실 계획이신가요?\n#3;em;[반응]"

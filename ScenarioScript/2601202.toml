[translation]
2601202-1 = "ความพยายามเพื่อความปลอดภัยทางน้ำ"
2601202-2 = "(คุณครูได้รับคำขอความช่วยเหลือจากคิริโนะ ก็เลยมุ่งหน้าไปยังสระฝึกว่ายน้ำของสถาบันฝึกตำรวจ#nวัลคิรี่)"
2601202-6 = "อ๊ะ! คุณครู [USERNAME]! มาจริงๆ ด้วยนะคะ!"
2601202-7 = "ฉันต้องไปเริ่มภารกิจไลฟ์การ์ดในเร็วๆ นี้แล้ว ก็เลยไม่รู้จะไปขอให้ใครช่วยแล้วน่ะค่ะ..."
2601202-8 = "[s1] \"ไม่เป็นไรหรอก เรียกครูได้ตลอดเลย\"\n[s2] \"ไม่เป็นไรหรอก ครูชอบว่ายน้ำอยู่แล้ว\""
2601202-11 = "ค่ะ! ขอบคุณค่ะ!"
2601202-12 = "ฉันอบอุ่นร่างกายไปแล้วก่อนที่คุณครูจะมา งั้นเราก็เริ่มกันได้เลยค่ะ!"
2601202-13 = "[s] \"งั้นมาดูทักษะการว่ายน้ำก่อนดีมั้ย?\""
2601202-14 = "ค่ะ! งั้นฉันจะว่ายไปถึงฝั่งโน้นแล้วว่ายกลับมานะคะ!"
2601202-22 = "[ns3] (ท่าลูกหมาตกน้ำเหรอ...?)\n[ns4] (แต่ความสามารถก็ไม่เลวนะ...)"
2601202-26 = "แฮ่ก! กลับมาแล้วค่า!"
2601202-27 = "เป็นยังไงบ้างคะ ฉันว่ายน้ำเก่งมั้ยคะ?"
2601202-28 = "[s5] \"ค่อนข้างเก่งเลยละ\"\n[s6] \"ว่ายเร็วอยู่นะ\""
2601202-31 = "แหะๆ ขอบคุณค่ะ"
2601202-32 = "แต่ฉันได้ยินมาว่าเราต้องใช้เทคนิคว่ายน้ำแบบพิเศษสำหรับการช่วยชีวิตทางน้ำค่ะ"
2601202-33 = "แค่ว่ายไปข้างหน้าแบบเมื่อกี้ไม่น่าจะช่วยคนได้"
2601202-34 = "ฉันก็เลยไปค้นคว้ามาจากหลายๆ แหล่ง และได้ผลออกมาว่าต้องใช้... อันนี้ค่ะ!"
2601202-35 = "[s] \"นั่นมัน... ตุ้มน้ำหนัก?\""
2601202-36 = "ใช่แล้วค่ะ! เราต้องคิดว่าตุ้มน้ำหนักอันนี้คือคนที่จมน้ำ แล้วลากขึ้นมาด้วยแขนข้างเดียวให้ได้ค่ะ"
2601202-37 = "อืม... แต่มันหนักแค่ 5 กิโลเอง ถ้าจะใช้แทนคนจมน้ำ ก็น่าจะเบาไปหรือเปล่าคะ?"
2601202-38 = "[s] \"ไม่เป็นไรหรอก ตอนอยู่ในน้ำ แรงลอยตัวจะทำให้เราตัวเบาลงน่ะ\""
2601202-42 = "[ns] \"ครูเคยอ่านเจอว่าเวลาอยู่ในน้ำ เราจะหนักแค่ 10% ของน้ำหนักตัวเอง\""
2601202-43 = "อ่า อย่างนี้นี่เองสินะคะ!"
2601202-44 = "ถ้างั้นน้ำหนักของฉันเมื่ออยู่ในน้ำก็ราวๆ..."
2601202-48 = "เฮือก!! "
2601202-49 = "เมื่อกี้คุณครูพูดชี้นำฉันหรอกเหรอ ฉันเกือบจะเชื่อแล้วนะคะ!"
2601202-50 = "คุณครูเป็นคนน่ากลัวสินะคะ...!"
2601202-51 = "[s] \"หืม? หมายความว่ายังไงน่ะ?\""
2601202-52 = "มะ... ไม่มีอะไรค่ะ! ถ้างั้นก็มาเริ่มฝึกกันเถอะค่ะ!"
2601202-53 = "คุณครูช่วยโยนตุ้มน้ำหนักนี้ลงไปในสระว่ายน้ำหน่อยนะคะ แล้วฉันจะไปเอาขึ้นมาเองค่ะ"
2601202-54 = "[ns7] โยนตุ้มน้ำหนัก\n[ns8] โยนตุ้มน้ำหนักสุดแรง"
2601202-65 = "อ๊ะ เกิดเหตุด่วน! มีคนจมน้ำ! มีคนจมน้ำ!"
2601202-66 = "คุณครูช่วยเรียกรถพยาบาลก่อนเลยค่ะ แล้วก็ช่วยเตรียมเครื่องเออีดีที่ใช้กระตุกไฟฟ้าหัวใจอัตโนมัติ#nให้ด้วยนะคะ!"
2601202-67 = "[s] (เอาจริงขนาดนี้เลยสินะ...)"
2601202-68 = "เอาละ ฉันจะไปช่วยเดี๋ยวนี้!"
2601202-76 = "ฮึบ!"
2601202-83 = "[ns] \"...\""
2601202-87 = "[ns] \"คะ... คิริโนะ?\"!\""
2601202-88 = "แฮ่กก!"
2601202-89 = "นะ... หนักมากเลยค่ะ!"
2601202-90 = "แล้วฉันก็... แฮ่ก! มะ... หมดแรงแล้ว...!"
2601202-91 = "[s9] \"คิริโนะ! ตั้งสติแล้วจับอันนี้ไว้!\"\n[s10] \"คิริโนะ! ครูจะช่วยเอง!\""
2601202-100 = "หะ... ห่วงยางชูชีพ! จับไว้ได้แล้วค่ะ!"
2601202-101 = "[s] \"จับไว้ให้ดีนะ ครูจะดึงขึ้นมาเอง!\""
2601202-105 = "แค่ก แค่ก! แค่กๆ"
2601202-106 = "[s11] \"แฮ่ก... แฮ่ก...\"\n[s12] \"คิริโนะ เป็นยังไงบ้าง?\""
2601202-109 = "ถ้าไม่นับเรื่องที่หมดแรงก็ยังไหวค่ะ ขอบคุณนะคะคุณครู คุณครูต้องมาช่วยฉันจนได้..."
2601202-110 = "ฉันเป็นไลฟ์การ์ดแท้ๆ แต่กลับมาจมน้ำซะเอง น่าอายจังเลยค่ะ..."
2601202-111 = "ฉันน่าจะต้องฝึกว่ายน้ำให้มากกว่านี้แล้วละค่ะ..."
2601202-113 = "(หลังจากนั้นคุณครูกับคิริโนะก็ฝึกว่ายน้ำเพื่อช่วยชีวิตกันต่อ...)"

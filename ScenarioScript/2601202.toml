[translation]
2601202-1 = "為維繫水上安全而努力"
2601202-2 = "（受桐乃之託，前往了女武神警察學園的游泳訓練場）"
2601202-6 = "啊！[USERNAME]老師！歡迎您！"
2601202-7 = "距離任務開始沒剩下多少時間，我實在找不到其他能求助的人……"
2601202-8 = "[s1]「沒關係，隨時都可以找我。」\n[s2]「沒關係，我也很喜歡游泳池。」"
2601202-11 = "是！謝謝您！"
2601202-12 = "在老師來之前，我已經先做好熱身運動了，隨時可以開始！"
2601202-13 = "[s]「那就先讓我看看你的實力吧？」"
2601202-14 = "好的！那麼我先折返一趟！"
2601202-22 = "[ns3] （狗爬式……？）\n[ns4] （不過實力還挺不錯的……）"
2601202-26 = "噗哈！我回來了！"
2601202-27 = "本官的游泳實力，您覺得如何呢！"
2601202-28 = "[s5]「相當厲害。」\n[s6]「你游得很快。」"
2601202-31 = "呵呵，謝謝誇獎。"
2601202-32 = "但是本官聽說進行水上救援時，必須使用特別的泳法。"
2601202-33 = "因為像剛才那樣只往前游是沒辦法救人的。"
2601202-34 = "根據各方面的調查結果……嘿咻！"
2601202-35 = "[s]「那是……加重塊嗎？」"
2601202-36 = "沒錯！聽說必須把這個加重塊當作溺水的人，以單手抱著將其救出來。"
2601202-37 = "嗯……可是這只有5kg。#n用來代替溺水的人會不會太輕了？"
2601202-38 = "[s]「應該不會。因為有浮力的關係，體重也會變輕。」"
2601202-42 = "[ns] 「我在書上看過，人在水中時的重量只有原本體重的10%哦。」"
2601202-43 = "啊，原來如此！"
2601202-44 = "所以本官在水中的體重大約是……"
2601202-48 = "哈！？"
2601202-49 = "居然用這種方式進行誘導性提問，差點就上當了！"
2601202-50 = "老師，您果然不容小覷呢……！"
2601202-51 = "[s]「嗯？什麼意思？」"
2601202-52 = "沒，沒什麼！那我們就開始訓練吧！"
2601202-53 = "可以請老師把這個加重塊丟進游泳池嗎？本官會去救它的。"
2601202-54 = "[ns7] 丟加重塊\n[ns8] 用力丟加重塊"
2601202-65 = "發現有人溺水！緊急狀況！緊急狀況！"
2601202-66 = "請老師馬上叫救護車，為了預防萬一，也請您準[ruby=自動體外去顫器]備AED！[/ruby]"
2601202-67 = "[s] （原來要從這個步驟開始啊……）"
2601202-68 = "實施救援！嘿！"
2601202-76 = "呼！"
2601202-83 = "[ns]「……」"
2601202-87 = "[ns]「桐，桐乃！？」"
2601202-88 = "噗咳咳！"
2601202-89 = "太，太重了！"
2601202-90 = "而且……咳咳！快，快沒力氣了……！"
2601202-91 = "[s9]「桐乃！冷靜下來抓住這個！」\n[s10]「桐乃！我馬上來救你！」"
2601202-100 = "抓，抓到救生圈了！"
2601202-101 = "[s]「我會拉你上來，你抓緊了！」"
2601202-105 = "咳咳，咳咳！"
2601202-106 = "[s11]「哈啊，哈啊……」\n[s12]「桐乃，你沒事吧？」"
2601202-109 = "我沒事，只是有點累而已。#n謝謝您，老師。結果反而是老師救了我……"
2601202-110 = "身為救生員居然溺水，真是太丟臉了……"
2601202-111 = "看來我必須更努力練習……"
2601202-113 = "（之後和桐乃繼續進行救生訓練……）"

[translation]
2601202-1 = "Water Safety Endeavors"
2601202-2 = "At Kirino's request, I went to Valkyrie Police School's swim training facility."
2601202-6 = "Ah, [USERNAME] Sensei! You made it!"
2601202-7 = "Pardon the short notice. This mission's about to start, and there was no one else available to help."
2601202-8 = "[s1] \"No worries. Feel free to call me anytime.\"\n[s2] \"I'm always happy to go to the swimming pool.\""
2601202-11 = "I appreciate it. Thank you."
2601202-12 = "I've already finished warming up, so we can get right into it."
2601202-13 = "[s] \"You need me to help evaluate your skills?\""
2601202-14 = "That's right. To start with, I'll swim over to that wall over there and then come back."
2601202-22 = "[ns3] \"(She's dog paddling?)\"\n[ns4] \"(She IS pretty good at dog paddling...)\""
2601202-26 = "Phew! I'm back!"
2601202-27 = "So what's your evaluation?"
2601202-28 = "[s5] \"Your skills were notable.\"\n[s6] \"Impressively fast.\""
2601202-31 = "Heehee, thank you."
2601202-32 = "That being said, I understand that rescue swimming requires certain strokes."
2601202-33 = "You can't save a person just by swimming forward like that."
2601202-34 = "So, after looking into it thoroughly...ta-da!"
2601202-35 = "[s] \"Is that...a weight?\""
2601202-36 = "That's right! I'm using it to simulate a swimmer in distress. I should be able to lift them out with one arm."
2601202-37 = "Hmm...but it's a five-kilogram weight. Wouldn't a real person be heavier than that?"
2601202-38 = "[s] \"It should be okay. People feel lighter in the water, because of buoyancy and all.\""
2601202-42 = "[ns] \"I've read that in water, a person's weight feels like 10% of their actual weight.\""
2601202-43 = "Ah, I see!"
2601202-44 = "So, in the water, my weight would be roughly..."
2601202-48 = "Ooh...!"
2601202-49 = "I-I almost fell for that!"
2601202-50 = "Nice try, Sensei!"
2601202-51 = "[s] \"Huh? What do you mean?\""
2601202-52 = "Um, forget it. Let's just do the eval!"
2601202-53 = "You throw the weight into the pool, and I'll go bring it back."
2601202-54 = "[ns7] Throw the weight.\n[ns8] Throw the weight with all your might."
2601202-65 = "Oh no, someone's drowning! Emergency! Emergency!"
2601202-66 = "Sensei, I need you to call an ambulance right away. Get an AED ready, just in case."
2601202-67 = "[s] \"(So that's Step One...)\""
2601202-68 = "I'm on my way! Ack!"
2601202-76 = "Haaah!"
2601202-83 = "[ns] \"...\""
2601202-87 = "[ns] \"K-Kirino?!\""
2601202-88 = "Ugh!"
2601202-89 = "Th-This is way too heavy!"
2601202-90 = "Ugh... I don't think I can do this much longer...!"
2601202-91 = "[s9] \"Kirino! Stay calm and grab this!\"\n[s10] \"Kirino! I'll save you!\""
2601202-100 = "Life preserver, got it! I'm holding on!"
2601202-101 = "[s] \"Good, keep holding on! I'll pull you in!\""
2601202-105 = "*cough* *cough* *hack*"
2601202-106 = "[s11] \"*pant* *pant*\"\n[s12] \"Are you okay?\""
2601202-109 = "I'm fine, just a little exhausted. Thanks, Sensei. I really appreciate your help..."
2601202-110 = "A lifeguard falling into the water. How humiliating..."
2601202-111 = "I think I need to train harder..."
2601202-113 = "Afterward, Kirino and I continued her lifeguard training together."

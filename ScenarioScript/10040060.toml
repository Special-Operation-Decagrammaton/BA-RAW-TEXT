[translation]
10040060-1 = "第6話;請記住我！！"
10040060-4 = "到了嗎？這裡就是……"
10040060-5 = "沒錯，這裡是已經被棄置一段時間的地下通道之一。"
10040060-6 = "既沒有監視器，也沒有其他的偵測系統。#n雖然在名義上還是研討會的財產，但基本上已經可以視為在研討會大樓以外了。"
10040060-7 = "原，原來如此……唔唔……"
10040060-8 = "總覺得這裡的氣氛……有點可怕。#n好像完全沒有人類的蹤跡，而且還又黑又陰森……"
10040060-9 = "看來這裡真的很久沒人使用過了，沒想到這種地方竟然會有路……"
10040060-10 = "那不正是我們想要的嗎？#n而且這個區域也無法進行遠端操控。"
10040060-11 = "是，是沒錯啦……但我總覺得……"
10040060-15 = "唔嗯……算了，應該只是我的錯覺而已。"
10040060-17 = "……？"
10040060-18 = "時間所剩不多了。#n既然已經來到這裡，現在只要繼續前進，走到底就會看到出口。"
10040060-19 = "不過我其實有點擔心，如果繼續往深處走的話，恐怕就連我們也無法支援……"
10040060-20 = "[s1]「連你們兩個也是？」\n[s2]「會連電波都收不到嗎？」"
10040060-23 = "沒錯，我想只要你們再往前走一點，我們的通訊就會暫時中斷。"
10040060-24 = "雖然這條路確實有點複雜，但應該不至於會迷路才對。#n我們也會提前告訴你們該怎麼走，所以不用太擔心。"
10040060-25 = "等你們走到底會發現一條地下道，那裡會通往某條距離研討會有一段路程的巷子。"
10040060-26 = "我已經事先請真紀過去那裡，等跟他碰頭之後，應該就能順利逃出去了。"
10040060-28 = "話說這裡真是黑到完全看不見前面的路耶……我們應該不會走到跌倒吧？"
10040060-29 = "如果在路上被絆倒的話，後果不堪設想……難道就不能把燈打開嗎？"
10040060-30 = "你是想告訴全世界你們人在哪嗎……"
10040060-31 = "[s3]「不，再怎麼說都不能受傷。」\n[s4]「危險的要素要盡可能避開，還是幫我們開個燈吧。」"
10040060-34 = "……？#n竟然連老師也……？"
10040060-35 = "那裡本來就是條道路，所以當然有安裝照明系統……#n不過就像我剛才說的一樣，問題是後續會發生的事。"
10040060-36 = "一旦我們把燈打開，控制室就會察覺用電量的變化。#n也就是說你們肯定會被發現。"
10040060-37 = "雖然只要能在被抓到之前逃走就不會有問題……"
10040060-38 = "但這樣真的好嗎？#n老師真的覺得這麼做更好嗎？"
10040060-39 = "……嗯？你說對？"
10040060-40 = "再怎麼樣都不能讓小雪或正在追你們的那兩個人受傷……？"
10040060-44 = "……哼嗯，原來如此。"
10040060-45 = "的確像是老師會說的話呢。#n既然如此，那就沒辦法了。"
10040060-46 = "往右邊的牆壁拐過去，應該就能找到電源開關。#n打開之後，路上的燈應該就會全部點亮才對。"
10040060-47 = "不過正如同我剛才說的──#n開燈之後就會立刻被控制室察覺，所以請盡速逃離那裡。"
10040060-48 = "是～！我去開吧～！#n我看看，右邊牆壁～右邊牆壁的旁邊～"
10040060-49 = "嘿咻～是這個嗎……！"
10040060-54 = "……行了嗎？"
10040060-55 = "總覺得好像啟動了……"
10040060-61 = "什，什麼！？發生什麼事了！？這是什麼聲音……！？#n為什麼我只是開個燈就聽見這種聲音！？這也太誇張了吧！？"
10040060-62 = "我偵測到的聲音……"
10040060-63 = "……有敵方兵力正在接近！#n飛行設備……？是無人機嗎……？"
10040060-64 = "什麼──！？#n怎，怎麼會！？為什麼會有無人機！？！？"
10040060-65 = "[ns5]「該不會一開始就在這裡待命了吧！？」\n[ns6]「反應未免也太快了！？怎麼會這樣……！？」"
10040060-68 = "總，總之你們得盡早逃離那裡！#n不對，現在好像不能說是盡早了嗎……！"
10040060-69 = "反正快逃吧！！拚命向前跑就對了！！"

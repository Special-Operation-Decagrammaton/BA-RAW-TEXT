[translation]
10040060-1 = "Episode 6;Remember Me!!"
10040060-4 = "...This is it?"
10040060-5 = "Yes. This abandoned underground passage has likely been long forgotten."
10040060-6 = "With no security installed here, it's the closest you can get to being outdoors without actually leaving the premises."
10040060-7 = "Uwah... O-Okay..."
10040060-8 = "It's scary...and bleak...and dark...with no signs of life..."
10040060-9 = "It looks like it's gonna crumble at any second! I can't believe this even exists."
10040060-10 = "That's the whole point in coming here, you know. Seminar has no eyes here."
10040060-11 = "I-I get that, but..."
10040060-15 = "Ugh. Never mind. It's just my imagination."
10040060-17 = "...?"
10040060-18 = "We don't have time. We've come this far, so the only thing we can do is keep moving forward. You'll find an exit at the very end of this tunnel."
10040060-19 = "Just to warn you, we won't be able to help you once you get too deep inside."
10040060-20 = "[s1] \"You won't?\"\n[s2] \"Is there no signal down here?\""
10040060-23 = "That's right. We won't be able to contact you for a while."
10040060-24 = "The path might be a little confusing, but as long as you follow the directions we provided, you'll be okay."
10040060-25 = "The exit will lead to an alley in an underpass a little ways away from the Seminar building."
10040060-26 = "Maki will be there to meet you."
10040060-28 = "I can't see a single thing ahead! What if I trip and fall?"
10040060-29 = "It'd be a huuuge problem if we got hurt. Can't we turn on the light or something?"
10040060-30 = "Are you hoping to promulgate your escape route to the entire world?"
10040060-31 = "[s3] \"Still, we can't have anyone getting hurt.\"\n[s4] \"Let's turn on the lights to avoid the possibility.\""
10040060-34 = "...You too, Sensei?"
10040060-35 = "I mean, there is lighting throughout the pathway, but...that's not the problem."
10040060-36 = "The control room will notice power being routed to the passageway as soon as you turn on the lights. It'll take them seconds to realize what happened."
10040060-37 = "It'll basically be a race to see if you can escape before they get to you."
10040060-38 = "You really think you can beat them, Sensei?"
10040060-39 = "...Huh? Even then?"
10040060-40 = "...You don't want Koyuki or the two chasing after you to get hurt?"
10040060-44 = "...*sigh* That's seriously how we're doing this?"
10040060-45 = "I suppose that's just like you. There's no other choice, then."
10040060-46 = "Just around the right side, you'll find a power switch."
10040060-47 = "As soon as you turn it on, the lights will go on and the control room will detect your presence. So you'll need to run as quickly as possible."
10040060-48 = "Okie dokie! I've got this! The wall...around the right wall..."
10040060-49 = "Let's seeeeee. This?"
10040060-54 = "...Did that do it?"
10040060-55 = "The sound of...things running?"
10040060-61 = "H-Huh?! What?! That is NOT the sound lights make when they're turned on!"
10040060-62 = "The detected sound is..."
10040060-63 = "...approaching troops? Aircraft and drones...?!"
10040060-64 = "Whaaaat?! Wh-Why?! What do you mean DRONES?!"
10040060-65 = "[ns5] \"Were they waiting for us this whole time?!\"\n[ns6] \"H-How did they respond so quickly?!\""
10040060-68 = "Get out of there, now! I-Is it too late already?"
10040060-69 = "Just, run! Keep running forward, no matter what!"

[translation]
10040060-1 = "ตอนที่ 6;จดจำฉันไว้ด้วยล่ะ!!"
10040060-4 = "มาถึงแล้วสินะคะ ที่นี่ก็คือ..."
10040060-5 = "ใช่ค่ะ ที่นี่คือหนึ่งในทางเดินใต้ดินเก่าที่ไม่ได้ใช้งานมานานแล้วค่ะ"
10040060-6 = "ที่นี่ไม่มีทั้งกล้องวงจรปิดและระบบตรวจจับใดๆ ค่ะ ตรงนี้เป็นที่ดินของเซมิน่าก็จริง แต่จะมองว่าอยู่นอกอาคารแล้วก็ได้ค่ะ"
10040060-7 = "ยะ... อย่างนั้นสินะคะ... ฮือ..."
10040060-8 = "บรรยากาศมันน่ากลัวพิกลนะคะ ไม่มีสัญญาณว่ามีคนอยู่ มืดก็มืด ไม่สะอาดและก็น่าขนลุกด้วย"
10040060-9 = "ที่นี่ดูเก่าจริงๆ ด้วยค่ะ ไม่อยากเชื่อเลยว่ามีเส้นทางหนีในที่แบบนี้ด้วย..."
10040060-10 = "พวกเราก็อยากให้มาที่นี่ตั้งแต่แรกอยู่แล้ว เพราะทางนั้นจะควบคุมพื้นที่นี้จากระยะไกลไม่ได้น่ะ"
10040060-11 = "มะ... มันก็จริงอยู่หรอก... แต่ว่า..."
10040060-15 = "อืม ไม่มีอะไรค่ะ ฉันคงจะคิดไปเองค่ะ"
10040060-17 = "...?"
10040060-18 = "เรามีเวลาไม่มากแล้วค่ะ ในเมื่อมาถึงตรงนี้แล้ว จากนี้ก็ต้องก้าวต่อไปข้างหน้า ถ้าเดินไปจนสุดทางก็#nจะเจอทางออกค่ะ"
10040060-19 = "ต้องบอกตรงนี้ว่าจริงๆ แล้วฉันก็กังวลอยู่ค่ะ เพราะถ้าเข้าไปลึกๆ เข้า พวกฉันก็น่าจะให้การสนับสนุน#nได้ยากขึ้น..."
10040060-20 = "[s1] \"คลื่นวิทยุไม่ถึงเหรอ?\"\n[s2] \"คลื่นวิทยุจะหายไปเหรอ?\""
10040060-23 = "ใช่ค่ะ ถ้าเดินเข้าไปในนั้น ฉันว่าการสื่อสารของเราน่าจะถูกตัดอยู่สักพักค่ะ"
10040060-24 = "ถึงเส้นทางจะค่อนข้างซับซ้อน แต่ก็ไม่ถึงกับหลงทางหรอกค่ะ ฉันบอกเส้นทางไปล่วงหน้าแล้ว แบบนั้นก็ไม่น่าจะมีปัญหา"
10040060-25 = "พอไปถึงอีกฝั่งแล้วออกมา จะเจอกับทางใต้ดินในตรอกที่อยู่ห่างจากเซมิน่าไปเล็กน้อย"
10040060-26 = "ฉันติดต่อขอให้มากิไปรอตรงนั้นไว้แล้ว ถ้าเจอกันแล้วก็หนีออกมาได้เลย"
10040060-28 = "แต่ว่าในนี้มืดมากจนฉันมองอะไรไม่เห็นเลยค่ะ เดินๆ อยู่ฉันจะไม่สะดุดอะไรล้มใช่มั้ยคะ?"
10040060-29 = "ถ้าเกิดอุบัติเหตุคงเป็นเรื่องใหญ่แน่ๆ... ขอเปิดไฟไม่ได้เหรอคะ?"
10040060-30 = "อยากป่าวประกาศให้คนอื่นรู้เหรอคะว่าซ่อนตัวอยู่ที่นี่น่ะ..."
10040060-31 = "[s3] \"ไม่หรอก แต่ไม่บาดเจ็บเลยจะดีที่สุดนะ\"\n[s4] \"อย่าเสี่ยงอันตรายเลย เปิดไฟเถอะ\""
10040060-34 = "คุณครูก็เป็นไปกับเขาด้วยเหรอ...?"
10040060-35 = "ตรงนั้นเป็นเส้นทางที่ถูกสร้างขึ้นมา มันมีไฟให้เปิดอยู่แล้ว แต่ปัญหาจะอยู่หลังจากเปิดไฟแล้วน่ะสิ"
10040060-36 = "ถ้าเปิดไฟ ทางห้องควบคุมก็จะเห็นความเปลี่ยนแปลงของการใช้พลังงานได้ พูดอีกอย่างก็คือ เราจะโดนจับได้อย่างชัดเจนเลยละ"
10040060-37 = "แน่นอนว่าถ้าวิ่งหนีออกมาจากที่นั่นก่อนจะโดนจับได้ ก็อาจจะรอดก็ได้..."
10040060-38 = "แบบนั้นจะไม่เป็นไรเหรอ? คุณครูคิดว่าแบบไหนดีกว่ากันล่ะ?"
10040060-39 = "หืม...? ไม่อยากให้มีการไล่ล่ากันงั้นเหรอ?"
10040060-40 = "ถึงยังไงก็ไม่อยากให้สองคนนั้นที่ไล่ตามโคยูกิต้องบาดเจ็บเหมือนกัน...?"
10040060-44 = "เฮ้อ... จะเอาอย่างนั้นสินะ?"
10040060-45 = "ตอบสมกับที่เป็นคุณครูจังเลยนะคะ ถ้าอย่างนั้นก็คงช่วยไม่ได้ค่ะ"
10040060-46 = "ถ้าเดินย้อนไป จะเจอสวิตช์ไฟอยู่ตรงผนังด้านขวาค่ะ ถ้าเปิดสวิตช์อันนั้น ไฟก็จะสว่างทั้งพื้นที่เลยค่ะ"
10040060-47 = "แต่อย่างที่พวกฉันบอกไปว่าถ้าเปิดไฟตรงนั้น ทางห้องควบคุมจะสังเกตเห็นความเปลี่ยนแปลงของ#nการใช้พลังงานไฟฟ้า งั้นคุณครูก็ต้องรีบออกจากที่นั่นให้เร็วที่สุดค่ะ"
10040060-48 = "ค่ะ! ฉันไปเปิดให้เองค่ะ! เอาละ ผนังด้านขวา~ ผนังด้านขวา~"
10040060-49 = "ไหนดูซิ~ อันนี้ใช่มั้ยนะ...!"
10040060-54 = "ได้แล้วมั้ย...?"
10040060-55 = "เหมือนมีบางอย่างเริ่มทำงานเลย..."
10040060-61 = "อะ... อะไรกัน!? นี่มันอะไรกันคะ?! เสียงอะไรคะเนี่ย...!? ปกติตอนเปิดไฟจะมีเสียงแบบนี้เหรอคะ!? นี่มันไม่ปกติแล้วนะ!?"
10040060-62 = "เสียงที่ฉันจับได้..."
10040060-63 = "มีใครกำลังมาค่ะ...! เป็นกองกำลังค่ะ! แต่ว่าบินมา... หรือว่าเป็น... โดรนงั้นเหรอ?"
10040060-64 = "ว่าไงนะคะ!? ดะ... ได้ยังไง!? ทำไมถึงมีโดรนล่ะ!?!?"
10040060-65 = "[ns5] \"หรือว่าสแตนด์บายอยู่ตั้งแต่แรกอยู่แล้ว!?\"\n[ns6] \"ทำไมถึงตอบสนองรวดเร็วแบบนี้ล่ะ...?!\""
10040060-68 = "ต้องออกมาจากตรงนั้นก่อนเลย! ไม่สิ จะบอกว่าให้ออกมาเฉยๆ คงไม่ได้แล้ว...!"
10040060-69 = "รีบวิ่งเร็วเข้า ทั้งคู่เลย!! ไม่ว่ายังไงก็ต้องวิ่งไปข้างหน้าให้ได้!!"

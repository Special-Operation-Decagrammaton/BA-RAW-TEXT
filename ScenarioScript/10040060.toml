10040060-23 = "4;코타마 파자마;01;그렇습니다. 아마 저 앞으로 더 들어가시면 당분간 연락도 끊길 것입니다.\n#4;em;[반응]\n#4;sig"
10040060-24 = "4;코타마 파자마;02;길이 다소 복잡하긴 하지만 잃을 정도는 아니고, 미리 알려드렸으니 괜찮으실 겁니다.\n#4;sig"

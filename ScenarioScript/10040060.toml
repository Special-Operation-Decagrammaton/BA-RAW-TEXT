10040060-4 = "3;코유키 파자마;02;도착인가요. 여기가 바로…….\n#3;a\n#3;em;[...]"
10040060-5 = "3;코타마 파자마;01;네. 지금은 사용되지 않는, 버려진 지 오래된 지하 통로 중 하나입니다.\n#3;sig\n#3;a"
10040060-6 = "3;코타마 파자마;02;CCTV도 없고, 별도의 감지 시스템도 없습니다. 사실상 세미나 소유지일 뿐 건물 밖이라고 봐도 무방하죠.\n#3;sig"

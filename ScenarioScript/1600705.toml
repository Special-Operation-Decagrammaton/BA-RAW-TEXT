[translation]
1600705-1 = "#title;눈 속의 연설"
1600705-2 = "#wait;150"
1600705-3 = "#wait;1500"
1600705-4 = "#na;(순회 연설을 마치고 붉은겨울 사무국으로 돌아가는 길에…….)"
1600705-5 = "3;토모에;01;후후, 이번 연설도 효과적이었던 것 같네요.\n#3;em;[반짝]\n#3;a"
1600705-6 = "3;토모에;99;처음에는 회장님의 정통성을 의심하던 학생들도 연설이 끝날 즈음에는 환호하며 함께 구호를 외치고 있었으니……"
1600705-7 = "3;토모에;03;당분간 체리노 쨩이 바보 같은 실언을 하시더라도 안심…… 아니, 회장님의 위대함을 의심하는 학생은 나타나지 않겠지요."
1600705-8 = "[s1] \"정말 엄청난 웅변 능력이네.\"\n[s2] \"어찌나 뛰어난 연설이었는지 나도 속을뻔했어.\""
1600705-9 = "3;토모에;01;후후, 칭찬 감사합니다. 선생님.\n#3;em;[음표]"
1600705-10 = "3;토모에;05;속다니요? 체리노 회장님이 멋진 수염을 가진 위대한 학생회장이라는 사실은 틀림없는 진실입니다만.\n#3;em;[?]\n#3;stiff"
1600705-11 = "3;토모에;99;붉은겨울 학원의 부지는 워낙 넓기 때문에, 체리노 회장님을 직접 보지 못하고 소문으로만 접하는 학생들도 꽤 존재한답니다."
1600705-12 = "3;토모에;01;그렇기 때문에 무지한 다수의 학생이 그릇된 소문에 휘둘리지 않도록, 정기적으로 순회 연설을 해야 하는 것입니다.\n#3;em;[반응]"
1600705-13 = "[s] \"순회 연설은 이것으로 끝난 거야?\""
1600705-14 = "3;토모에;02;아뇨. 아직 구교사와 붉은겨울 도서관이 남아있습니다만…….\n#3;em;[...]"
1600705-15 = "3;토모에;02;하지만 오늘은 이만 순회 연설을 중단하고 사무국으로 돌아가도록 하죠."
1600705-16 = "3;토모에;06;조금 전의 일기예보를 확인해 보니 자치구에 거대한 눈구름이 다가오고 있는 모양이에요."
1600705-17 = "#wait;2000"
1600705-18 = "3;토모에;02\n#3;stiff"
1600705-19 = "3;토모에;02;어머나. 말이 씨가 되었네요. 게다가 바람도 이토록 거세니…….\n#3;em;[...]"
1600705-20 = "3;토모에;05;눈발이 더 거세지기 전에 서둘러 움직이죠!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
1600705-21 = "#all;hide"
1600705-22 = "#na;(수 시간 후…….)"
1600705-23 = "#wait;150"
1600705-24 = "#wait;500"
1600705-25 = "#all;hide"
1600705-26 = "3;토모에;04;어, 어라? 이상하네요. 분명 꽤 오랜 시간을 걸은 것 같은데…….\n#3;em;[땀]\n#3;a"
1600705-27 = "[s] \"눈 때문에 방향 감각을 잃어버린 것 같아.\""
1600705-28 = "3;토모에;06;그렇네요. 아무래도 조난을 당한 모양입니다.\n#3;em;[속상함]"
1600705-29 = "3;토모에;02;이 근처에 체온을 보존할 수 있을 만한 장소가 어디 없을까요?"
1600705-30 = "[s] \"저쪽에 나무 오두막 같은 게 있어.\""
1600705-31 = "3;토모에;01;저건…… 산길 보수를 위한 자재를 보관하는 창고로군요!\n#3;em;[!]"
1600705-32 = "3;토모에;03;훌륭하십니다, 선생님. 저곳이라면 눈을 피하며 몸을 녹일 수 있겠어요."
1600705-33 = "3;토모에;03;자. 어서 안으로 들어가 불을 피우고 몸을 녹이도록 하죠!\n#3;em;[음표]"

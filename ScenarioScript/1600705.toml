1600705-70 = "#clearST\n#all;hide"
1600705-71 = "#na;(이후, 눈이 그칠 때까지 토모에로부터 체리노 회장의 위대함에 대해 일방적으로 설교 당했다.)"
1600705-72 = "#all;hide"
1600705-73 = "3;토모에;01;후우, 이제야 겨우 눈이 그쳤네요. 생각보다 긴 눈보라였어요.\n#3;a"
1600705-74 = "3;토모에;02;그래도 선생님과 함께 체리노 회장님의 위대함에 대해 이야기를 나누다 보니 시간이 금세 지나간 것 같네요."
1600705-75 = "3;토모에;01;선생님도 그렇게 생각하지 않으신가요?\n#3;greeting\n#3;em;[?]"
1600705-76 = "[s] \"………….\""
1600705-77 = "3;토모에;02;어라? 그 표정은……\n#3;em;…"
1600705-78 = "3;토모에;03;체리노 회장님의 위대한 치적에 대해 아직 궁금한 게 잔뜩 있으신가 보군요!\n#fontsize;80\n#3;closeup"
1600705-79 = "3;토모에;99;괜찮습니다. 아직 시간은 충분하니까요.\n#3;em;[반짝]\n#3;closeup"
1600705-80 = "3;토모에;01;사무국에 돌아가면 아까 하던 이야기를 마저 하도록 하죠!\n#3;closeup"
1600705-81 = "[s] \"……죽여줘…….\""

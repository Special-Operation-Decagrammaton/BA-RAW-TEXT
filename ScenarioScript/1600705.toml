[translation]
1600705-1 = "คำปราศรัยท่ามกลางหิมะ"
1600705-4 = "(ระหว่างทางกลับไปยังสำนักเลขาธิการเรดวินเทอร์หลังเสร็จสิ้นการทัวร์ปราศรัย...) "
1600705-5 = "ฮุฮุ การปราศรัยครั้งนี้ประสบความสำเร็จอย่างยอดเยี่ยมค่ะ"
1600705-6 = "ในตอนแรกพวกนักเรียนมีความเคลือบแคลงในคุณสมบัติของท่านประธานอยู่ก็จริง#nแต่พอได้ฟังคำปราศรัยจบแล้วก็ส่งเสียงเชียร์กันอย่างครึกครื้นเลย..."
1600705-7 = "ถึงตอนแรกคุณครูจะทำพลาดเผลอพูดว่า \"เชริโน่จังเป็นเด็กอ๊องๆ\" ออกไปก็เถอะ...#nแต่ตอนนี้ฉันก็โล่งใจแล้วว่าคงไม่มีนักเรียนที่สงสัยในความยิ่งใหญ่ของท่านประธานอีกแล้วล่ะค่ะ"
1600705-8 = "[s1] \"เธอนี่มีวาทศิลป์ที่สุดยอดจริงๆ นะ\"\n[s2] \"พูดปราศรัยได้เก่งมากจนครูเกือบถูกหลอกเหมือนกัน\""
1600705-9 = "ฮุฮุ ขอบคุณที่ชมนะคะ คุณครู"
1600705-10 = "โดนหลอกงั้นเหรอคะ? เป็นเรื่องจริงแท้แน่นอนที่ท่านประธานเชริโน่คือประธานนักเรียนที่ยอดเยี่ยม#nและมีหนวดที่เท่ที่สุดค่ะ"
1600705-11 = "เนื่องจากสหภาพเรดวินเทอร์มีอาณาเขตที่ใหญ่มาก ทำให้มีนักเรียนจำนวนไม่น้อยที่รู้จัก#nท่านประธานเชริโน่แต่ในนาม แต่ไม่เคยได้เห็นท่านประธานตัวจริงค่ะ"
1600705-12 = "เพราะงั้นเราถึงจำเป็นจะต้องจัดทัวร์ปราศรัยขึ้นเป็นประจำ เพื่อไม่ให้นักเรียนที่อยู่ในที่ห่างไกล#nถูกข่าวลือไร้สาระครอบงำค่ะ"
1600705-13 = "[s] \"ทัวร์ปราศรัยจบแค่นี้เหรอ?\""
1600705-14 = "ยังหรอกค่ะ ยังเหลือที่อาคารเรียนเก่ากับที่ห้องสมุดเรดวินเทอร์อีกค่ะ..."
1600705-15 = "แต่ว่าวันนี้เราจะพอแค่นี้แล้วกลับไปที่สำนักเลขาธิการกันก่อนค่ะ"
1600705-16 = "เมื่อครู่ฉันตรวจสอบพยากรณ์อากาศดูแล้ว ดูเหมือนว่ากำลังจะมีพายุหิมะลูกใหญ่เคลื่อนเข้ามา#nในเขตพื้นที่นี้ค่ะ"
1600705-19 = "ตายจริง... พูดถึงก็มาเลย แถมลมพัดแรงอีกด้วย"
1600705-20 = "รีบไปกันก่อนที่หิมะจะตกหนักกว่านี้เถอะค่ะ!"
1600705-22 = "(หลายชั่วโมงต่อมา...)"
1600705-26 = "เอ๊ะ... เอ๋? แปลกจังเลยนะคะ เหมือนว่าเราจะเดินมาหลายชั่วโมงแล้วแท้ๆ..."
1600705-27 = "[s] \"ดูเหมือนเราจะหลงทางเพราะหิมะนี่แล้วล่ะ\""
1600705-28 = "นั่นน่ะสิคะ เหมือนจะเจอปัญหาใหญ่แล้วค่ะ"
1600705-29 = "แถวนี้มีที่ไหนที่อุ่นๆ ที่จะเข้าไปหลบพายุได้บ้างไหมนะ..."
1600705-30 = "[s] \"ทางโน้นเหมือนจะมีกระท่อมไม้อยู่นะ\""
1600705-31 = "นั่นมัน... โรงเก็บวัสดุสำหรับซ่อมแซมเส้นทางบนภูเขานี่คะ!"
1600705-32 = "สุดยอดเลยค่ะคุณครู ถ้าเป็นที่นั่นละก็คงจะไปพักหลบพายุหิมะได้แน่นอนค่ะ"
1600705-33 = "รีบเข้าไปข้างในแล้วผิงไฟให้ร่างกายอบอุ่นกันเถอะค่ะ!"
1600705-39 = "― เฮ้อ... ดูเหมือนว่า พายุหิมะรุนแรงมากเลยนะคะ[wa:2860] "
1600705-42 = "― คุณครู... รีบถอดเสื้อคลุมออกแล้วมาทางนี้สิคะ[wa:830] "
1600705-45 = "― ถ้าใส่เสื้อที่เปียกๆ แบบนั้น...[wa:10] "
1600705-47 = "― จะเป็นหวัดได้นะคะ"
1600705-50 = "― คุณครูคะ... ตั้งแต่เมื่อกี้แล้ว...[wa:1760] "
1600705-52 = "― ทำไมถึง... ดูกังวลขนาดนั้นล่ะคะ?[wa:460] "
1600705-55 = "― เอ่อ... สีหน้าแบบนั้นหรือว่า...[wa:2090] "
1600705-58 = "― คุณครูกำลังคิด..."
1600705-60 = "― อยากรู้เรื่องเกี่ยวกับ...  ความสำเร็จอันยิ่งใหญ่ของประธานเชริโน่เหรอคะ?[wa:10] "
1600705-63 = "― ฮุฮุ เวลาแบบนี้พอดีเลยนะคะ[wa:1720] "
1600705-65 = "― ถ้างั้นจนกว่าพายุหิมะจะสงบลง... เรามาพูดคุยกัน... [wa:1210] "
1600705-68 = "― ถึงความยิ่งใหญ่ของประธานเชริโน่กันเถอะค่ะ!"
1600705-71 = "(จากนั้นโทโมเอะก็ร่ายยาวเรื่องความสำเร็จอันยิ่งใหญ่ของเชริโน่อยู่ฝ่ายเดียว จนกระทั่งหิมะ#nหยุดตก...)"
1600705-73 = "ฮู่ว ตอนนี้หิมะก็หยุดตกแล้วนะคะ พายุหิมะรุนแรงกว่าที่คิดเอาไว้มากเลย"
1600705-74 = "แต่พอได้พูดคุยกับคุณครูถึงความยิ่งใหญ่ของท่านประธานเชริโน่แล้ว เวลาก็ผ่านไปเร็วมากเลยค่ะ"
1600705-75 = "คุณครูคิดแบบนั้นรึเปล่าคะ?"
1600705-76 = "[s] \"...\""
1600705-77 = "เอ๊ะ? สีหน้าแบบนั้น..."
1600705-78 = "คุณครูคงมีเรื่องที่อยากรู้เกี่ยวกับความสำเร็จอันยิ่งใหญ่ของท่านประธานสินะคะ!"
1600705-79 = "ไม่เป็นไรค่ะ เรายังมีเวลากันอีกเยอะเลยค่ะ"
1600705-80 = "พอกลับไปที่สำนักเลขาธิการแล้ว เรามาคุยต่อจากเมื่อครู่กันเถอะค่ะ!"
1600705-81 = "[s] \"ฆ่าครูทิ้งเลยก็ได้...\""

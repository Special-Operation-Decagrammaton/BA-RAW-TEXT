[translation]
1600705-1 = "於雪中"
1600705-4 = "（就這樣結束了在各地的演說，正要返回赤冬聯邦學園的事務局……）"
1600705-5 = "呵呵，這次的演說也順利地進行真是太好了。"
1600705-6 = "最初懷疑會長能力的學生們，也在演說結束的時候一起讚揚了會長……"
1600705-7 = "暫時就算潔莉諾醬失言也能安心……不對，不會出現懷疑會長偉大的學生吧。"
1600705-8 = "[s1] 「智惠真的很會說話呢。」\n[s2] 「連我也差點要相信了。」"
1600705-9 = "呵呵，謝謝您的稱讚。老師。"
1600705-10 = "啊啦……那種話真讓人失望呢。潔莉諾會長是很棒並且偉大的學生會長這件事，是貨真價實的事實唷？"
1600705-11 = "這個赤冬聯邦學園的自治區以非常廣闊為榮，很多時候沒辦法直接見到潔莉諾會長，完全聽信傳言的學生也很多。"
1600705-12 = "因此，為了不讓學生們被錯誤的傳言左右，必須像這樣定期地進行巡迴演說。"
1600705-13 = "[s] 「原來如此，話說巡迴這樣就結束了嗎？」"
1600705-14 = "那個，雖然還想去舊校舍的方向和圖書館附近……"
1600705-15 = "不過今天就先中斷，回去事務局吧。"
1600705-16 = "剛才確認了天氣預報，接下來這一帶的天氣似乎會很糟。"
1600705-19 = "啊啦，才剛說完……風就變得厲害了呢。"
1600705-20 = "趁雪勢變得更大以前，快點移動吧！"
1600705-22 = "（數小時後……）"
1600705-26 = "啊，啊啦？真奇怪呢，記得是這個方向沒錯……"
1600705-27 = "[s] 「雪遮擋了視野，讓方向感亂掉了嗎……？」"
1600705-28 = "是啊，說的沒錯呢……看來似乎遇難了。"
1600705-29 = "如果附近有可以休息的地方就好了……"
1600705-30 = "[s] 「有看見那邊像是小屋的東西嗎？」"
1600705-31 = "那是……倉庫呢！是為了補修山路，保管資材等等的地方。"
1600705-32 = "不愧是老師呢，真虧能找到。那裡的話，可以讓身體休息吧。"
1600705-33 = "那麼，趁視野變得更加惡劣以前……！"
1600705-39 = "― 呼，什麼都看不見的程度，很強的暴風雪呢……[wa:3780] "
1600705-42 = "― 老師也，把上衣脫掉如何呢？[wa:2070] "
1600705-45 = "― 就那樣一直穿著溼掉的衣服的話，[wa:530] "
1600705-47 = "― 會感冒的唷？"
1600705-50 = "― ……老師？怎麼了嗎，[wa:2720] "
1600705-52 = "― 有什麼在意的事情嗎？[wa:1340] "
1600705-55 = "― 那個表情，該不會……[wa:2930] "
1600705-58 = "― 光憑剛才的演說還不夠，"
1600705-60 = "― 想聽更多潔莉諾會長的事嗎？[wa:2060] "
1600705-63 = "― 反正是這種時機，正合適呢。[wa:2240] "
1600705-65 = "― 那麼在雪停之前，讓我們一起談論關於[wa:2530] "
1600705-68 = "― 潔莉諾會長的偉大吧♪"
1600705-71 = "（這之後，在雪停之前持續說著關於潔莉諾的偉大的話題）"
1600705-73 = "呼，雪終於停了呢……"
1600705-74 = "雖然是比想像中還要久的暴風雪……但因為談論了關於潔莉諾會長的偉大，感覺只是一瞬間呢？"
1600705-75 = "老師也那麼認為嗎？"
1600705-76 = "[s] 「那個，該怎麼說呢……」"
1600705-77 = "那個表情是……原來如此？"
1600705-78 = "意思是關於潔莉諾會長的事情，還有各種在意的事情呢！"
1600705-79 = "沒問題的，時間還有很多。"
1600705-80 = "回到事務局之後，繼續講剛才的後續吧！"
1600705-81 = "[s] 「今天也差不多吃撐了吧……」"

[translation]
2300505-1 = "綾音悲慘的修理劇"
2300505-2 = "阿拜多斯高中"
2300505-3 = "啊哈哈……明明是難得的休息日卻要來學校修東西。"
2300505-4 = "雖然我是不介意，不過老師沒關係嗎？"
2300505-5 = "[s1] 「沒問題唷。」\n[s2] 「反正我很閒。」"
2300505-6 = "老師明明很忙的……"
2300505-7 = "老師明明很忙的……"
2300505-8 = "那個，阿拜多斯的校舍很舊了，需要修理的並不是只有這一兩個地方。"
2300505-9 = "因為平常就算遇到故障，也都置之不理……"
2300505-10 = "但是也不能就這樣放任下去……只好找時間一點一點地修理和維護這些設備。"
2300505-11 = "[s] 「原來如此……嗯，那我們走吧。」"
2300505-14 = "操場．直飲台"
2300505-16 = "[ns] 「是直飲台啊。」"
2300505-17 = "是的。幾天前水龍頭就流不出水來了……"
2300505-18 = "我想應該是哪裡的管線出了問題……但因為社團太忙了，還沒有找出確切的原因。"
2300505-19 = "[s3] 「如果是管線問題的話問題就大了呢。」\n[s4] 「只靠我們能修好嗎？」"
2300505-20 = "我想應該是沒問題。以前我也修過好幾次了。"
2300505-21 = "我想應該是沒問題。以前我也修過好幾次了。"
2300505-22 = "[s] 「綾音自己修嗎？」"
2300505-23 = "沒錯。因為一開始請專門的師父來修理時，我一直很認真地觀察究竟是怎麼修好的。"
2300505-24 = "後來發現只有我一個人也可以修好，所以從那之後只要故障都是我來維修。"
2300505-25 = "[s] 「綾音真厲害呢。」"
2300505-26 = "啊哈哈……是因為我有看過修理手冊和管線相關的書……"
2300505-27 = "其實，也沒有什麼大不了的。"
2300505-28 = "嗯……那麼，現在的狀況是……"
2300505-30 = "（轉，轉）"
2300505-31 = "……"
2300505-32 = "[s] 「不管怎麼轉，水龍頭都沒有反應呢。」"
2300505-33 = "確實是這樣呢。我看看……嗯，如果是這種情況的話……要把底下的水表……"
2300505-36 = "（咻）"
2300505-37 = "應該是在這附近……"
2300505-38 = "（東翻西找……）"
2300505-39 = "……咦？"
2300505-40 = "[s] 「怎麼了嗎？」"
2300505-41 = "啊，就是那個──"
2300505-42 = "（咻）"
2300505-43 = "（咚！！！！）"
2300505-44 = "呀啊！？"
2300505-45 = "（綾音正要起身時，頭卻撞到了直飲台的水泥邊角，發出了好大的聲響）"
2300505-46 = "[s5] 「綾音，沒事吧！？」\n[s6] 「好大一聲！？」\n[s7] 「發出了奇怪的悲鳴！？」"
2300505-47 = "啊……嗚啊啊嗚嗚……"
2300505-48 = "啊……嗚啊啊嗚嗚……"
2300505-49 = "啊……嗚啊啊嗚嗚……"
2300505-50 = "……我，我沒事，嗚嗚……已，已經找到問題了……"
2300505-51 = "……"
2300505-52 = "[s8] 「……」\n[s9] 「…………」"
2300505-53 = "如，如果是漏水的話，水表應該要會動才對。可是……水表卻動也不動……"
2300505-54 = "如，如果是漏水的話，水表應該要會動才對。可是……水表卻動也不動……"
2300505-55 = "[s10] 「不，先不說那個了……」\n[s11] 「你的頭……」"
2300505-56 = "只是稍微撞到一下而已，沒事的……"
2300505-57 = "只是稍微撞到一下而已，沒事的……"
2300505-58 = "……"
2300505-59 = "不痛，我不痛……（淚眼汪汪）"
2300505-60 = "既然已經找到問題了……我們走吧……"
2300505-64 = "（雖然很想跟綾音說不用忍耐也沒關係）"
2300505-65 = "（但總覺得這樣會讓他更害羞，所以說不出口……）"
2300505-67 = "阿拜多斯高中．地下設備"
2300505-68 = "（叩嗚，叩嗚，叩嗚……）"
2300505-69 = "這裡就是學校裡所有管線都會經過的地方。"
2300505-70 = "除了必要的管線以外都已經關掉了……#n只有常用的淋浴室、廁所和茶水間才是開著的。"
2300505-71 = "當然運動場的管線也應該是開著的才對……"
2300505-72 = "[s] 「關著呢。」"
2300505-73 = "是啊，是有人把閥門給關上了吧。"
2300505-74 = "雖然只是我的推測，這應該不是為了針對我們而做的。#n如果是這樣的話，明明有其他更有效的手段，比方說關閉廁所的管線之類的。"
2300505-75 = "……"
2300505-76 = "[s] 「嗯……？抱歉，我剛才沒聽清楚，你剛剛說了什麼嗎？」"
2300505-77 = "……不，沒什麼。我想犯人應該是對策委員會的某個人。#n雖然不知道理由……"
2300505-78 = "總之，既然問題已經找到了……只要打開這個閥門就解決了。"
2300505-79 = "啊，要打開這個需要有12吋的扳手才行……"
2300505-80 = "我想想……應該放在是第3體育倉庫裡……"
2300505-81 = "[s] 「要不要我去幫你拿？」"
2300505-82 = "沒關係的，那個倉庫在有點遠的地方……我們一起去吧，老師。"
2300505-84 = "（嘰咿咿咿……）"
2300505-86 = "咳咳，咳咳。"
2300505-87 = "呼……都老舊到連門都很難打開了呢。"
2300505-88 = "第3倉庫是少數用鐵製門的倉庫……每次打開都是大工程呢。"
2300505-89 = "我想……或許原本是打算要把這裡當作防空洞吧。"
2300505-90 = "如果這麼重的門壞掉的話。#n從裡面應該是絕對打不開的，我看還是趁壞掉之前找一天來……"
2300505-91 = "（喀嚓！！）"
2300505-92 = "……。"
2300505-93 = "[s] 「總覺得，好像聽到了什麼不祥的聲音……」"
2300505-94 = "咦咦……！？"
2300505-96 = "（喀嚓喀嚓）門關起來了！？"
2300505-97 = "不，不行……！！"
2300505-98 = "打，打不開！怎怎怎，怎麼辦才好……！"
2300505-99 = "[s12] 「冷靜點，綾音。」\n[s13] 「不會馬上就死翹翹的啦！」"
2300505-100 = "當，當然是不會馬上就死翹翹……"
2300505-101 = "當，當然是不會馬上就死翹翹……"
2300505-102 = "只要打電話給對策委員會的大家，#n告訴他們我跟老師兩個人被關在第3體育倉庫，應該很快就會有人來救我們的……"
2300505-103 = "但如果被問到：「綾音醬，你為什麼會在這種四下無人的倉庫和老師兩人獨處呢？」該怎麼回答才好……"
2300505-104 = "[s] 「我覺得實話實說就好了吧！？」"
2300505-105 = "……"
2300505-106 = "果，果然是那樣對吧……他們一定能清楚理解的吧……？"
2300505-107 = "……"
2300505-108 = "一定會，理解的吧……？"
2300505-109 = "當，當然如果是老師的話……我是不討厭啦……不如說有點高興……但是……"
2300505-110 = "如果被說：「我一直以為綾音醬是個老實的好孩子，沒想到還真行。#n原來是深藏不露呀，竟然還有這麼厲害的一招。」之類的話，#n還被溫暖的眼神看著的話，我該怎麼辦才好……"
2300505-111 = "只能挖個洞鑽進去了……嗚啊……"
2300505-112 = "[s14] 「冷靜，綾音。」\n[s15] 「我找到出去的方法了。」"
2300505-113 = "……咦！？"
2300505-114 = "……咦！？"
2300505-115 = "[ns] 指向對面的牆壁"
2300505-118 = "啊……"
2300505-119 = "這麼說來，這裡還有窗戶啊。"
2300505-120 = "[s] 「太好了。」"
2300505-123 = "那裡看起來好像能讓一個人通過……可是實在有點高。"
2300505-124 = "[s16] 「你騎在我的肩膀上吧。」\n[s17] 「綾音你翻過去開門吧。」"
2300505-125 = "什麼！？"
2300505-126 = "什麼！？"
2300505-127 = "要我騎在老師的肩上！？"
2300505-128 = "那，那樣……！？"
2300505-129 = "[s] 「如果不這樣的話，那就只好聯絡對策委員會的大家……」"
2300505-130 = "……"
2300505-131 = "……就，就讓我騎在肩膀上吧！"
2300505-133 = "那，那就拜託您了，老師。"
2300505-134 = "（咻）"
2300505-135 = "不，不好意思老師，會不會很重……？"
2300505-136 = "嗚，嗚嗚……早知道會這樣的話，至少要穿個褲襪來……"
2300505-137 = "（喀啦）"
2300505-138 = "幸好窗戶沒有上鎖，那麼……"
2300505-139 = "嘿……咻！"
2300505-140 = "（唰）"
2300505-141 = "啊，呀啊！？"
2300505-142 = "（咚！碰噹！）"
2300505-143 = "[s] 「綾音，沒事吧！？」"
2300505-144 = "咳咳，咳咳……不，不小心摔了一下而已。#n嗚……泥土都跑到嘴裡了……"
2300505-145 = "還好順利出來了……"
2300505-146 = "我馬上去幫老師開門。"
2300505-150 = "（喀噠喀噠喀噠喀噠……）"
2300505-151 = "（喀嚓）"
2300505-152 = "（嘰咿咿……）"
2300505-154 = "……。"
2300505-155 = "[s18] 「成功了！」\n[s19] 「弄得渾身是泥了呢。」"
2300505-156 = "啊，啊哈哈……"
2300505-157 = "啊，啊哈哈……"
2300505-160 = "（在那之後順利找到了扳手，打開了閥門）"
2300505-162 = "……"
2300505-164 = "（轉轉）"
2300505-165 = "（嘩啦────）"
2300505-166 = "呼……順利讓水流出來了呢，老師。"
2300505-167 = "老師辛苦了，能修好真是太好了。"
2300505-168 = "[s] 「綾音也辛苦了。」"
2300505-169 = "呼……弄得全身髒兮兮的……口也好渴……已經筋疲力盡了……"
2300505-173 = "不好意思，老師。可以稍微等我一下嗎？"
2300505-176 = "― ……？……老師？您在那裡，對吧？[wa:4960] "
2300505-178 = "― 沒戴眼鏡的話……有點看不清楚。[wa:2340] "
2300505-181 = "[ns] 「好像還是第一次看到沒有戴眼鏡的綾音呢。」"
2300505-182 = "― 咦？啊，也對。我的確是幾乎一直戴著眼鏡呢。[wa:4440] "
2300505-184 = "― 啊，啊哈哈……再怎麼說，洗臉的時候還是會拿下來的。[wa:2900] "
2300505-187 = "― 總，總覺得，臉在發燙……[wa:2120] "
2300505-189 = "― 被老師，看到了很害羞的場面……[wa:1440] "
2300505-192 = "[ns20] 「慌亂的綾音，」\n[ns21] 「很可愛唷。」"
2300505-195 = "― 咦！？可，可愛什麼的……哪有……[wa:2880] "
2300505-197 = "― 啊，啊嗚……[wa:1020] "
2300505-200 = "― 那，那樣一直盯著我看的話……[wa:1040] "
2300505-202 = "― 好……好害羞……[wa:1120] "

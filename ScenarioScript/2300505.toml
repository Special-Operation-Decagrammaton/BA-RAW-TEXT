[translation]
2300505-1 = "Fixing the School of Hard Knocks"
2300505-2 = "Abydos School"
2300505-3 = "Oh, dear... Spending our day off making repairs at school..."
2300505-4 = "It's okay with me, but what about you, Sensei?"
2300505-5 = "[s1] \"It's okay.\"\n[s2] \"I didn't have anything to do anyway.\""
2300505-6 = "But I'm sure you must be busy... "
2300505-7 = "But I'm sure you must be busy... "
2300505-8 = "The school building is really old, so there are a ton of repairs to be made."
2300505-9 = "We usually just leave things as they are, but..."
2300505-10 = "...we can't keep neglecting it forever. So, we have to carve out some time to make these repairs."
2300505-11 = "[s] \"Okay, then! Let's go.\""
2300505-14 = "Playground Faucet"
2300505-16 = "[ns] \"It's a faucet.\""
2300505-17 = "It sure is! A few days ago, the water suddenly stopped flowing..."
2300505-18 = "I think it's a problem with the plumbing... I didn't get the chance to figure out the problem because of all my club activities."
2300505-19 = "[s3] \"A plumbing issue sounds pretty serious.\"\n[s4] \"Do you think we can we fix it on our own?\""
2300505-20 = "Well, I've already fixed it more than once."
2300505-21 = "Well, I've already fixed it more than once."
2300505-22 = "[s] \"You have?\""
2300505-23 = "Yes. The first time it broke, I called a repairman and I watched him closely."
2300505-24 = "I thought I'd be able to do it myself and I've been fixing it on my own ever since."
2300505-25 = "[s] \"That's amazing, Ayane.\""
2300505-26 = "Ahaha... Well, I didn't study the repair manual or any books on plumbing..."
2300505-27 = "It's not really that amazing."
2300505-28 = "Anyway, let's see what the damage is..."
2300505-30 = "*squeak* *squeak*"
2300505-31 = "..."
2300505-32 = "[s] \"Even when I turn the handle, no water comes out.\""
2300505-33 = "Hm... In cases like these, it's usually the pipe gauge at the bottom..."
2300505-36 = "(shuffle)"
2300505-37 = "Hm... It should be around here..."
2300505-38 = "(rummage)"
2300505-39 = "...Huh?"
2300505-40 = "[s] \"Uh, is there a problem?\""
2300505-41 = "Yeah, it looks like..."
2300505-42 = "(stands up)"
2300505-43 = "*WHAM*"
2300505-44 = "Gah!"
2300505-45 = "As Ayane tried to stand, she banged her head against the concrete corner of the faucet with a resounding crack."
2300505-46 = "[s5] \"Are you okay, Ayane?!\"\n[s6] \"What was that sound?!\"\n[s7] \"Why did you scream?!\""
2300505-47 = "Aaah... Ugh..."
2300505-48 = "Aaah... Ugh..."
2300505-49 = "Aaah... Ugh..."
2300505-50 = "...I-I'm okay... Agh... At least I know what the problem is now..."
2300505-51 = "*swish*"
2300505-52 = "[s8] \"...\"\n[s9] \"...\""
2300505-53 = "If... If there's a leak, the gauge would still be running. But it's not working at all..."
2300505-54 = "If... If there's a leak, the gauge would still be running. But it's not working at all..."
2300505-55 = "[s10] \"I think we should take care of you first...\"\n[s11] \"But your head...\""
2300505-56 = "I just bumped it a little. It's okay..."
2300505-57 = "I just bumped it a little. It's okay..."
2300505-58 = "..."
2300505-59 = "*sniff* It doesn't hurt..."
2300505-60 = "Okay. Now that we've figured it out...let's move on."
2300505-64 = "I wanted to tell Ayane that it was okay to cry..."
2300505-65 = "...but I didn't want to make her feel any worse."
2300505-67 = "Abydos School Basement"
2300505-68 = "*whirrr*"
2300505-69 = "Every pipe in the school building leads here."
2300505-70 = "I've blocked all the ones that we don't absolutely need... Only the pipes for the showers, bathrooms, and kitchen are still open."
2300505-71 = "And of course, the faucet on the playground is still on..."
2300505-72 = "[s] \"That's weird... It's closed.\""
2300505-73 = "Oh, really? Someone must have turned off the valve."
2300505-74 = "I'm sure it was an accident. If someone wanted to mess with us, the bathroom would have been a better choice... "
2300505-75 = "..."
2300505-76 = "[s] \"I didn't catch that. What did you say?\""
2300505-77 = "Um... I'm sure it was someone from the club, although I'm not sure why they would do something like that."
2300505-78 = "Anyway, now that we know what the problem is...all we need to do is open the valve."
2300505-79 = "I'm going to need a 12-inch wrench... "
2300505-80 = "Um... It's probably in the gym storage room."
2300505-81 = "[s] \"Do you want me to go?\""
2300505-82 = "No, that place is hard to find by yourself... I'll go with you, Sensei."
2300505-84 = "*creak*"
2300505-86 = "*cough* *cough*"
2300505-87 = "Ugh... It's been so long that the door doesn't even open properly. "
2300505-88 = "The storage room has a steel door, so it's always really hard to open."
2300505-89 = "I think it used to be an air-raid shelter."
2300505-90 = "If this door gets stuck, there's no way to open it from the inside. We'll eventually have to make sure someone fixes it before that happens..."
2300505-91 = "*clunk*"
2300505-92 = "..."
2300505-93 = "[s] \"That didn't sound good...\""
2300505-94 = "H-Huh...?!"
2300505-96 = "*thud* *thud* ...The door is locked?"
2300505-97 = "Oh, crap...!"
2300505-98 = "It won't open! Wh-What do we do?!"
2300505-99 = "[s12] \"It's okay. Calm down, Ayane.\"\n[s13] \"It's not a big deal. Don't worry!\""
2300505-100 = "N-No, you're right. We'll be okay..."
2300505-101 = "N-No, you're right. We'll be okay..."
2300505-102 = "If we just call the other club members and tell them that we are stuck in the storage room, I'm sure they'll have us out in no time..."
2300505-103 = "\"Ayane? What were you doing all alone in the storage room with Sensei?\" ...I don't know how I would answer..."
2300505-104 = "[s] \"Why not just tell them the truth?\""
2300505-105 = "..."
2300505-106 = "Th-That's true... I'm sure they would understand, right?"
2300505-107 = "..."
2300505-108 = "Would they, though? I mean...really?"
2300505-109 = "Yes! Of course...since it's you...and I'm fine with it... You're welcome, actually... But..."
2300505-110 = "What if they stare at me in awe and amazement? They probably never thought I was so bold... "
2300505-111 = "Ugh! I think I'd want to shrivel up and die..."
2300505-112 = "[s14] \"Ayane, calm down.\" \n[s15] \"I think I have a solution.\""
2300505-113 = "...Huh?!"
2300505-114 = "...Huh?!"
2300505-115 = "[ns] \"What's over there on the wall?\""
2300505-118 = "Oh..."
2300505-119 = "It's a window."
2300505-120 = "[s] \"Exactly.\""
2300505-123 = "It looks like one person might be able to squeeze through there...but it's pretty high!"
2300505-124 = "[s16] \"I can give you a boost.\"\n[s17] \"I think you should go through.\""
2300505-125 = "What?! "
2300505-126 = "What?! "
2300505-127 = "Do you mean I should stand on your shoulders?!"
2300505-128 = "B-But..."
2300505-129 = "[s] \"We could try calling the other club members instead.\""
2300505-130 = "..."
2300505-131 = "...Okay, I'll do it!"
2300505-133 = "All right, I'm counting on you."
2300505-134 = "*grunting*"
2300505-135 = "Sorry, Sensei. I'm a little heavy, aren't I?"
2300505-136 = "Ugh... I guess I should have worn stockings or something..."
2300505-137 = "*rattling*"
2300505-138 = "Oh, thank goodness the window is open..."
2300505-139 = "Here I go!"
2300505-140 = "*whoosh*"
2300505-141 = "Agh!"
2300505-142 = "*thump*"
2300505-143 = "[s] \"Are you okay, Ayane?\""
2300505-144 = "*cough* *cough* I... I just took a bit of a spill... And there's some dirt in my mouth... Ugh..."
2300505-145 = "But I made it out..."
2300505-146 = "I'll go and open the door."
2300505-150 = "*tap* *tap* *tap* *tap* *tap*"
2300505-151 = "*clank*"
2300505-152 = "*creak*"
2300505-154 = "..."
2300505-155 = "[s18] \"You did it, Ayane!\"\n[s19] \"Whoa! You're covered in dirt.\""
2300505-156 = "Ahaha..."
2300505-157 = "Ahaha..."
2300505-160 = "Afterwards, we found the wrench and returned to open the faucet valve."
2300505-162 = "..."
2300505-164 = "*squeak* *squeak*"
2300505-165 = "*drip* *drip* *drip*"
2300505-166 = "*sigh* The water's working, Sensei."
2300505-167 = "Good work. We fixed the faucet."
2300505-168 = "[s] \"You did a great job too.\""
2300505-169 = "*sigh* I'm covered in dirt...I'm thirsty...and everything is a mess..."
2300505-173 = "I think I'm going to need a moment to wash up a little, Sensei."
2300505-176 = "― Huh? Sensei? Are you there?[wa:4520] "
2300505-178 = "― I can hardly see... Everything is so blurry.[wa:1180] "
2300505-181 = "[ns] \"I've never seen you without your glasses before.\""
2300505-182 = "― Huh? Oh. Well, yeah. I normally don't have a reason to take them off.[wa:2520] "
2300505-184 = "― A-Ahaha... I pretty much only take them off in the shower.[wa:1580] "
2300505-187 = "― Great. I can tell I'm blushing...[wa:1280] "
2300505-189 = "― I just keep embarrassing myself in front of you...[wa:40] "
2300505-192 = "[ns20] \"I think it's cute.\"\n[ns21] \"It's cute seeing you so flustered.\""
2300505-195 = "― Huh?! Y-You think it's cute? I don't know what you're talking about...[wa:720] "
2300505-197 = "― U-Ugh...[wa:940] "
2300505-200 = "― P-Please don't look at me like that...[wa:80] "
2300505-202 = "― Y-You're embarrassing me...[wa:360] "

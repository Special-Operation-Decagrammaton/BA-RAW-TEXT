1013003-91 = "[ns] \"하지만 사람 마음이라는 건, 원래 단수가 아니란다.\""
1013003-92 = "3;니코 스바루;04;네? 그건 또……?\n#3;em;[?]"
1013003-93 = "3;니코 스바루;10;제가 이런 마음과 저런 마음, 여러 가지 느낌을 동시에 느끼는 건, 어떻게 보면 부자연스러운 일일 수 있지만."

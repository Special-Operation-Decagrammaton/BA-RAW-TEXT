1013003-82 = "[s] \"사춘기 여고생은 어렵구나아…….\""
1013003-83 = "3;니코 스바루;12;네. 진짜로 그래요. 이제 좀 후회가 되세요? 상담해 준다고 가볍게 이야기 꺼낸 거 말이죠.\n#3;em;[!]\n#3;jump"
1013003-84 = "3;니코 스바루;11;예? 오히려 솔직하게 짜증 내 줘서 고맙다고요? 저는 후배들 앞에서는 언제나 믿음직하게 웃고 있으니까?\n#3;stiff"

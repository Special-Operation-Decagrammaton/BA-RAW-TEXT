[translation]
1013003-1 = "第一步"
1013003-4 = "你好……老師？"
1013003-9 = "這，這是怎麼回事！？"
1013003-10 = "[ns]「是慶祝昴第一次來夏萊當值日生的紀念儀式哦！」"
1013003-11 = "……這多少有點小題大作了，老師。#n我實在不太擅長面對這種場合……"
1013003-12 = "而且老師對我有特別待遇，反而會讓我覺得有點難過。"
1013003-13 = "……啊，不過要是老師對我太冷淡的話，我可能又會覺得受傷哦？"
1013003-14 = "[s]「真難懂呢……」"
1013003-15 = "哈哈哈。人家不是常說「青春期的女高中生是世上最難搞的生物」嗎？"
1013003-16 = "那麼……老師。#n今天是我第一次擔任值日生，還請老師多多指教。"
1013003-31 = "呼……"
1013003-32 = "[s1]「要不要休息一下？」\n[s2]「來，這杯咖啡給你。」"
1013003-35 = "啊，謝謝你，老師。"
1013003-36 = "是咖啡啊……呵呵。"
1013003-37 = "老師你知道嗎？#n我們奧利斯也會喝類似咖啡或茶的東西哦。"
1013003-38 = "[s]「那還挺不錯的呢。」"
1013003-39 = "是啊。野生的菊苣或蒲公英、乾癟的蕪菁根、薊葉或苦蕒菜，#n還有做大鍋飯剩下的蔬菜殘渣……"
1013003-40 = "把那些東西烘烤磨碎之後，就能做出某種顏色接近咖啡的東西。"
1013003-41 = "然後在獎勵訓練成績優秀者一杯熱水的「Water Time」時，#n我們就會偷偷把那個粉末加在裡面喝。"
1013003-42 = "要是被發現的話，還會被罵說太奢侈了呢……"
1013003-43 = "[s3]「你還有什麼想喝的！？或者吃的也可以！」\n[s4]「老師什麼都買給你！要什麼儘管說！」"
1013003-46 = "就說老師太小題大作了啦！這樣我會很有壓力！"
1013003-48 = "（儘管嘴上這麼說，昴依舊一點一點品嚐著匆匆拿出來的各種飲料和點心）"
1013003-49 = "（從他嘴巴幾乎沒停過的樣子來看，似乎真的吃得很開心……）"
1013003-51 = "那個……老師？"
1013003-52 = "[s]「嗯？」"
1013003-53 = "老師之前說過……願意傾聽我的煩惱對吧？"
1013003-54 = "[s]「有什麼煩惱儘管跟我說！」"
1013003-55 = "這樣也讓人很有壓力！"
1013003-56 = "……"
1013003-57 = "外面的世界……真的很不一樣呢。"
1013003-58 = "……雖然這本來就是理所當然的事吧。"
1013003-59 = "不過，也許正是因為這樣……"
1013003-60 = "最近我的心情總是……該怎麼形容才好呢。"
1013003-61 = "是不安，動搖，還是沸騰？#n又或者……是這些全都混雜在一起的某種狀態？"
1013003-62 = "問我原因可能是什麼嗎？"
1013003-63 = "……"
1013003-64 = "我想，果然還是有些無法原諒的部分吧。"
1013003-65 = "無論是對三一還是奧利斯。"
1013003-66 = "或者進一步說……就連我自己也一樣。"
1013003-70 = "真複雜啊。嗯，真的好複雜。"
1013003-71 = "直到現在，我心裡的某個角落……依然盼望看見三一嘗到苦頭的樣子。"
1013003-72 = "但與此同時，我又希望奧利斯能在真正戰勝三一之前……"
1013003-73 = "能夠做到對一切視若無睹，孤高地昂然獨立。"
1013003-74 = "如果再把範圍細分到個別的三一學生就更是如此了。"
1013003-75 = "我希望包含我自己在內，所有奧利斯的學生都能過得比三一的孩子們更好。"
1013003-76 = "……然而在這個過程之中，我也不想看見大家涉及任何卑劣或違法的事情。"
1013003-77 = "什麼？你說這種心情一般被稱為「良性的競爭意識」？"
1013003-78 = "…………"
1013003-79 = "總覺得有點不高興……"
1013003-80 = "沒錯！我自己也知道！#n就是因為老師說的沒錯，所以才更讓人不高興！"
1013003-81 = "唉……"
1013003-82 = "[s]「青春期的女高中生真難懂啊……」"
1013003-83 = "就是說啊，我也真心這麼認為。#n輕易說出願意傾聽煩惱這種話，現在開始後悔了吧？"
1013003-84 = "我願意坦率地發脾氣，老師反而覺得很欣慰？#n因為我在後輩們面前總是保持著可靠的微笑……？"
1013003-85 = "……！"
1013003-86 = "老師還真壞呢……"
1013003-87 = "[s]「嗯……壞人就交給老師來當吧……」"
1013003-88 = "真的很過分……"
1013003-89 = "[ns]「沒錯……老師是壞心的大人……」"
1013003-91 = "[ns]「不過人的心情，本來就不是單一的。」"
1013003-92 = "嗯？這又是什麼意思……？"
1013003-93 = "同時懷抱著不同的心情或感覺，某方面而言或許很矛盾……"
1013003-94 = "不過這也是極其充滿人性的表現……是嗎？"
1013003-95 = "既然如此，究竟什麼才是正確的呢？"
1013003-96 = "[s5]「昴認為對的事？」\n[s6]「昴認為正確的事？」"
1013003-99 = "只要從中選出一兩個，其他的之後再自己慢慢思考梳理就行了？"
1013003-100 = "真正重要的，是要對由此衍生的一切負起責任……"
1013003-101 = "因為我還是學生，如果覺得自己實在無法負擔，隨時都可以聯絡老師……是嗎？"
1013003-102 = "啊哈哈，什麼意思嘛……這樣不是根本什麼都沒解決嗎。"
1013003-103 = "[s]「沒錯，但人生本來就是這樣的哦。」"
1013003-104 = "……真的嗎？"
1013003-105 = "[s] 「嗯。」"
1013003-106 = "所謂的人生，似乎比我想像中更加混亂呢。"
1013003-107 = "[s7]「就是說啊……」\n[s8]「大家都是像這樣努力活在當下的……」"
1013003-110 = "……"
1013003-111 = "看來人生也沒什麼大不了的嘛。"
1013003-112 = "[s9]「嗯，沒什麼大不了的。」\n[s10]「所以別被那些講得煞有其事的人給騙了哦！」"
1013003-115 = "這又是什麼意思！#n身為一名教育者，說這種話也太不負責任了吧！？"
1013003-116 = "老師你可真是個奇怪的人啊。"
1013003-120 = "嗯。"
1013003-121 = "真的……"
1013003-122 = "是個很奇怪的人……"
1013003-123 = "……嘿嘿。"
1013003-124 = "[s]「昴。」"
1013003-125 = "怎麼了？"
1013003-126 = "[s]「這段時間，真的辛苦你了。」"
1013003-127 = "什麼？"
1013003-128 = "咦，咦……？"
1013003-130 = "等，等一下！不可以看這邊！"
1013003-131 = "咦？面紙在桌上，慢慢來沒關係……？"
1013003-132 = "老師真的很討厭耶！！！"

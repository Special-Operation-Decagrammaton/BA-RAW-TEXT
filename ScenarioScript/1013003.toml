1013003-35 = "3;니코 스바루;02;아, 감사합니다. 선생님.\n#3;greeting"
1013003-36 = "3;니코 스바루;99;커피……. 군요. 후후."
1013003-37 = "3;니코 스바루;03;그거 아시나요, 선생님? 아리우스에서도 나름, 커피나 차 같은 걸 마시곤 했답니다.\n#3;em;[?]"
1013003-38 = "[s] \"그건 좋은 일이었네.\""
1013003-39 = "3;니코 스바루;27;네. 야생 꽃상추, 민들레나 말라비틀어진 순무 뿌리, 엉겅퀴나 씀바귀잎, 대량 배식 요리를 만들고 남은 야채 찌꺼기……."
1013003-40 = "3;니코 스바루;99;그런 것들을 로스팅하고 빻으면, 대충 커피색이 나는 무언가가 만들어지곤 했거든요……."
1013003-41 = "3;니코 스바루;00;워터 타임이라고, 훈련 우수자에게 따듯한 물을 한 컵씩 주곤 했는데, 거기에 몰래몰래 타서 마셨어요…….\n#3;em;[세로선]"
1013003-42 = "3;니코 스바루;03;그것도 들키면, 사치 부린다고 혼나곤 했거든요……."
1013003-43 = "[s3] \"뭐 더 마시고 싶은 거 없니?! 먹을 것도 좋고!\"\n[s4] \"뭐든지 다 사 줄게! 말만 해!\""

[translation]
1013003-1 = "First Step"
1013003-4 = "Hello, Sen...sei?"
1013003-9 = "Wh-What's all this?"
1013003-10 = "[ns] \"It's to celebrate you becoming a Schale Student Rep!\""
1013003-11 = "This is far too much. And honestly, this kind of thing makes me feel really uncomfortable... You should tone it down."
1013003-12 = "The fact that you're trying to treat me, to coddle my feelings... I think I actually feel worse."
1013003-13 = "Then again... I can't say that I want you to treat me coldly."
1013003-14 = "[s] \"This is tough...\""
1013003-15 = "Haha. There's nothing more unpredictable than a high school girl. Haven't you heard?"
1013003-16 = "Then, though this is my first time on Student Rep duty, I ask that you take the lead."
1013003-31 = "*sigh*"
1013003-32 = "[s1] \"Shall we rest for a bit?\"\n[s2] \"Here. It's coffee.\""
1013003-35 = "Oh, thank you, Sensei."
1013003-36 = "Coffee... Fufu."
1013003-37 = "Did you know this, Sensei? We used to drink something like coffee or tea back in Arius, too. It didn't taste the same, but it was a ritual."
1013003-38 = "[s] \"Tell me more.\""
1013003-39 = "Right. We'd take red leaf lettuce, dandelion, desiccated turnip roots, thistle leaves, and vegetable waste leftover from the commissary."
1013003-40 = "If you roast and grind those things enough, you end up with something slightly coffee-colored..."
1013003-41 = "We had something called \"water time.\" It was when a star trainee was awarded a warm cup of water, which could be used for a...beverage."
1013003-42 = "You had to mix it in secret. You couldn't let anyone accuse you of extravagance."
1013003-43 = "[s3] \"Is there anything else you'd like?\"\n[s4] \"Food? Drink? It's on me!\""
1013003-46 = "What did I just say? You're making too much of a fuss! I can't!"
1013003-48 = "Despite that, Subaru gradually sampled all of the drinks and snacks I placed in front of her."
1013003-49 = "While she stayed stone-faced, she SEEMED to be enjoying them."
1013003-51 = "Um, Sensei?"
1013003-52 = "[s] \"Hm?\""
1013003-53 = "You said...I can talk to you about things, right?"
1013003-54 = "[s] \"Of course, whatever it is!\""
1013003-55 = "Tone it down!"
1013003-56 = "..."
1013003-57 = "It's really different...being outside."
1013003-58 = "I mean, that's obvious, isn't it?"
1013003-59 = "But, maybe that's why..."
1013003-60 = "I feel like, most days...I don't know exactly how to say it."
1013003-61 = "Am I anxious? Shaky? Seething? Or maybe it's some sort of a mix of all three."
1013003-62 = "Hmm, the reason... If you must ask..."
1013003-63 = "..."
1013003-64 = "I suppose it's everything I can't forgive. I can't move on."
1013003-65 = "Whether the subject is Trinity, or Arius..."
1013003-66 = "...myself..."
1013003-70 = "It's complicated. Yes, very complicated..."
1013003-71 = "Part of me wants to see Trinity simply...suffer for once. Experience a single hardship, something to make it all feel fair."
1013003-72 = "...Then again, until Arius truly stands taller than Trinity..."
1013003-73 = "I'd like Trinity to be there, firm and solid, like nothing happened."
1013003-74 = "It's even worse when I think about the actual Trinity students. Their names, faces, promises..."
1013003-75 = "I want all of us Arius students to do better than them. I want it to be undeniable."
1013003-76 = "...But I'd rather not...resort to underhanded means again. I'm trying to keep it legal, even moral."
1013003-77 = "Huh? The phrase for that is \"friendly rivalry\"?"
1013003-78 = "..."
1013003-79 = "I...don't know if I like hearing that."
1013003-80 = "I know you're right...or right enough! And that makes me feel worse."
1013003-81 = "*sigh*"
1013003-82 = "[s] \"High school girls are indeed unpredictable...\""
1013003-83 = "Yes, we are. Now do you regret it? Trying to get close to me? Letting me tell you every muddled thought in my head?"
1013003-84 = "Huh? You appreciate my honesty? It's okay that I'm annoyed? Because you're sick of seeing me put on a smile for the other students?"
1013003-85 = "...!"
1013003-86 = "You are TRULY the worst, Sensei..."
1013003-87 = "[s] \"Yes, I am the worst person...\""
1013003-88 = "You're such a bad person..."
1013003-89 = "[ns] \"You're right. I'm a bad mentor...\""
1013003-91 = "[ns] \"But a person's heart is never simple, you know.\""
1013003-92 = "Huh? What do you mean...?"
1013003-93 = "Are you saying that my irresoluteness isn't a flaw..."
1013003-94 = "...but it's still what makes me a person?"
1013003-95 = "Can't you just tell me the right answer?"
1013003-96 = "[s5] \"What do you think is right?\"\n[s6] \"Listen to your heart.\""
1013003-99 = "So, you're saying not to take on so much at once? Think over my feelings little by little, like I'm sorting a junk drawer?"
1013003-100 = "...You're telling me to take responsibility for my next choice."
1013003-101 = "And if I can't take all the pressure, I should contact you. Anytime? Truly?"
1013003-102 = "Ahaha, what nonsense... You've solved nothing, Sensei."
1013003-103 = "[s] \"You're right. But that is the nature of life.\""
1013003-104 = "...Really?"
1013003-105 = "[s] \"Yes.\""
1013003-106 = "Honestly, life is such a mess, more than I ever imagined..."
1013003-107 = "[s7] \"Yep...\"\n[s8] \"We're all out here trying to survive one day at a time.\""
1013003-110 = "..."
1013003-111 = "I thought there'd be so much more to living."
1013003-112 = "[s9] \"You're right, it's nothing much.\"\n[s10] \"Don't let anyone tell you you're doing it wrong.\""
1013003-115 = "What are you saying? You're supposed to be an educator. How could you be so irresponsible and flighty?"
1013003-116 = "You are so strange, Sensei..."
1013003-120 = "Yes."
1013003-121 = "Really."
1013003-122 = "Strange. A weirdo. Freak."
1013003-123 = "...Heehee."
1013003-124 = "[s] \"Subaru.\""
1013003-125 = "What?"
1013003-126 = "[s] \"You've been working so hard.\""
1013003-127 = "What?"
1013003-128 = "...Wh-What?"
1013003-130 = "W-Wait! Don't look at me."
1013003-131 = "What? I can have the napkin...and take my time?"
1013003-132 = "I hate you, Sensei!"

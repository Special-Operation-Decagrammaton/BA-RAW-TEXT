1013003-79 = "3;니코 스바루;16;뭔가, 기분이 나빠졌어요…….\n#3;stiff\n#3;em;[세로선]"
1013003-80 = "3;니코 스바루;12;네! 알아요! 선생님 말씀이 틀린 게 아니라서 더 기분이 나쁜 거예요!\n#3;jump"

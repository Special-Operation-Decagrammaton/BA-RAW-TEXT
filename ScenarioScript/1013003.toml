1013003-56 = "3;니코 스바루;25;……."
1013003-57 = "3;니코 스바루;01;바깥은, 정말로 다르군요."
1013003-58 = "3;니코 스바루;99;네. 당연한 일이겠지만요.\n#3;em;[한숨]"
1013003-59 = "3;니코 스바루;17;그래서, 그것 때문인지."
1013003-60 = "3;니코 스바루;05;요즘 마음이…… 항상……. 뭐라고 표현해야 할까요."
1013003-61 = "3;니코 스바루;06;불안하다? 뒤흔들린다? 들끓는다? 아니면 그 모두가 전부 섞인, 어떤 상태인 느낌이네요."
1013003-62 = "3;니코 스바루;04;그 원인이 무엇일 것 같냐고요?"
1013003-63 = "3;니코 스바루;05;…….\n#3;em;[…]"
1013003-64 = "3;니코 스바루;06;역시 용서하지 못하는 부분, 이겠지요."
1013003-65 = "3;니코 스바루;13;그 대상이 트리니티든, 아리우스든."
1013003-66 = "3;니코 스바루;99;조금 더 나아가, 저 자신이든 간에요."

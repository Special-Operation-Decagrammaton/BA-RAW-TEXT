1013003-70 = "3;니코 스바루;06;복잡하네요. 네, 복잡해요."
1013003-71 = "3;니코 스바루;05;저는 아직도, 마음 한켠으로는, 트리니티가 좀 험한 꼴을 겪어 봤으면 해요."
1013003-72 = "3;니코 스바루;06;……그렇지만 그러면서도, 아리우스가 언젠가 트리니티를 정말로 이겨 줄 때까지."
1013003-73 = "3;니코 스바루;02;그 자리에 고고하게, 아무렇지도 않다는 듯 서 있었으면 하기도 하고요."
1013003-74 = "3;니코 스바루;99;트리니티 학생들이라는, 개별 사례로 내려가면 더욱 그렇죠.\n#3;em;[한숨]"
1013003-75 = "3;니코 스바루;02;저는 저 자신을 포함해서, 아리우스 학생들이 모두 트리니티 아이들보다 훨씬 잘 되었으면 하지만."
1013003-76 = "3;니코 스바루;05;……그 과정에서 뭔가, 치사하거나 불법적인 일이 끼어드는 것은, 그다지 보고 싶지 않기도 해요."
1013003-77 = "3;니코 스바루;10;네? 보통은 그런 걸 선의의 라이벌 의식이라고 한다고요?\n#3;em;[?]"

1013003-9 = "3;니코 스바루;12;뭐, 뭔가요. 이게?!\n#3;shake\n#3;em;[?!]"
1013003-10 = "[ns] \"스바루의 첫 샬레 당번 축하 기념식!\""
1013003-11 = "3;니코 스바루;25;……호들갑이 심하세요, 선생님. 그리고 전 이런 거 너무 부담스러워서 조금 그렇다고요…….\n#3;stiff"
1013003-12 = "3;니코 스바루;05;선생님이 너무 특별하게 저를 대하려고 하시는 것도, 오히려 약간 서운하답니다."
1013003-13 = "3;니코 스바루;18;………아, 그렇다고 또 너무 쌀쌀맞게 대하시면, 그 나름대로 상처받을 거지만요?\n#3;em;[음표]"
1013003-14 = "[s] \"어렵구나…….\""
1013003-15 = "3;니코 스바루;23;하하하. 사춘기 여고생은 세상에서 가장 까다로운 생물이라잖아요?\n#3;em;[재잘]"

[translation]
1013003-1 = "ก้าวแรก"
1013003-4 = "สวัสดีค่ะ คุณ... ครู...?"
1013003-9 = "นะ... นี่มันอะไรกันคะเนี่ย?!"
1013003-10 = "[ns] \"พิธีฉลองหน้าที่เวรที่ชาเล่ต์ครั้งแรกของสุบารุไง!\""
1013003-11 = "เว่อร์เกินไปแล้วค่ะคุณครู... แล้วฉันก็ลำบากใจกับเรื่องแบบนี้ด้วย..."
1013003-12 = "การที่คุณครูพยายามปฏิบัติกับฉันเป็นพิเศษเกินไปแบบนี้ กลับทำให้ฉันรู้สึกเศร้านิดหน่อยนะคะ"
1013003-13 = "อา... แต่ถ้าเย็นชากับฉันเกินไป ฉันก็คงจะเสียใจเหมือนกันนะคะ? "
1013003-14 = "[s] \"ยากจังเลยนะ...\""
1013003-15 = "ฮ่าฮ่าฮ่า เขาว่ากันว่าเด็กม.ปลายวัยต่อต้านน่ะเป็นสิ่งมีชีวิตที่เอาใจยากที่สุดในโลกเลยนี่คะ?"
1013003-16 = "ถ้าอย่างนั้นคุณครูคะ ถึงจะเป็นเวรครั้งแรกแต่ก็ขอฝากเนื้อฝากตัวด้วยนะคะ "
1013003-31 = "ฮู่ว..."
1013003-32 = "[s1] \"พักสักหน่อยดีมั้ย?\"\n[s2] \"เอ้า นี่กาแฟ\""
1013003-35 = "อา ขอบคุณค่ะคุณครู"
1013003-36 = "กาแฟ... สินะคะ ฮุฮุ"
1013003-37 = "คุณครูรู้มั้ยคะ? ที่อาเรียสพวกเราก็เคยได้ดื่มกาแฟหรือพวกน้ำชากันเหมือนกันนะคะ"
1013003-38 = "[s] \"เป็นเรื่องที่ดีเลยนะ\"  "
1013003-39 = "ค่ะ พวกเราเอาผักกาดป่า ดอกแดนดิไลออน หรือรากหัวไชเท้าแห้งๆ ใบของต้นทิสเซิลหรือต้นซอนชัส แล้วก็พวกเศษผักที่เหลือจากการทำอาหาร..."
1013003-40 = "พวกเราเอาของพวกนั้นมาคั่วแล้วก็บดจนได้อะไรบางอย่างที่มีสีคล้ายๆ กาแฟออกมาค่ะ..."
1013003-41 = "มันจะมีช่วงเวลาที่เรียกว่า 'วอเตอร์ไทม์' ที่เขาจะแจกน้ำอุ่นให้คนที่มีผลการฝึกดีเยี่ยมคนละแก้ว พวกเราก็จะแอบผสมเจ้านั่นลงไปดื่มกันค่ะ..."
1013003-42 = "แต่ถ้าถูกจับได้ก็จะโดนดุว่าใช้ชีวิตฟุ่มเฟือยน่ะค่ะ..."
1013003-43 = "[s3] \"มีอะไรที่อยากดื่มอีกมั้ย?! ของที่อยากกินก็ได้นะ!\"\n[s4] \"ขอแค่บอกมาครูจะซื้อให้ทุกอย่างเลย!\""
1013003-46 = "ก็บอกแล้วไงคะว่าคุณครูทำตัวเว่อร์เกินไปแล้ว! ฉันลำบากใจนะคะ!"
1013003-48 = "(ถึงจะพูดแบบนั้น แต่สุบารุก็ค่อยๆ ลิ้มลองเครื่องดื่มและขนมต่างๆ ที่คุณครูยกมาให้)"
1013003-49 = "(ดูจากการกินแซ่บขนาดนี้ แสดงว่าคงถูกปากไม่น้อย...)"
1013003-51 = "คือว่า คุณครูคะ?"
1013003-52 = "[s] \"หืม?\""
1013003-53 = "ที่เคยบอกว่า... จะให้คำปรึกษาน่ะค่ะ ยังจำได้มั้ยคะ?"
1013003-54 = "[s] \"บอกมาได้ทุกเรื่องเลย!\""
1013003-55 = "แบบนี้ฉันลำบากใจนะคะ!"
1013003-56 = "......"
1013003-57 = "โลกข้างนอกนี่แตกต่างจริงๆ เลยนะคะ"
1013003-58 = "ค่ะ... มันก็คงจะต้องเป็นอย่างนั้นอยู่แล้ว"
1013003-59 = "เพราะเรื่องนั้นหรือเปล่านะ"
1013003-60 = "ช่วงนี้หัวใจของฉันมัน... มักจะ... อืม จะว่ายังไงดีนะคะ"
1013003-61 = "กระวนกระวาย? สั่นคลอน? เดือดดาล? เหมือนทุกอย่างผสมปนเปกันไปหมดน่ะค่ะ"
1013003-62 = "คิดว่าสาเหตุเป็นเพราะอะไรเหรอคะ? "
1013003-63 = "......"
1013003-64 = "คงจะเป็นส่วนที่ \"ยกโทษให้ไม่ได้\" ละมั้งคะ"
1013003-65 = "ไม่ว่าจะเป็นพวกทรีนิตี้ หรืออาเรียสเอง"
1013003-66 = "หรือถ้ามองให้ไกลกว่านั้น คงเป็นตัวฉันเองด้วยค่ะ"
1013003-70 = "มันซับซ้อนจังเลยค่ะ ใช่ค่ะ ซับซ้อนมากๆ เลย"
1013003-71 = "ลึกๆ แล้วในใจฉันตอนนี้ ก็ยังอยากจะเห็นพวกทรีนิตี้ต้องเจอเรื่องลำบากลำบนบ้าง "
1013003-72 = "แต่ในขณะเดียวกัน ฉันก็อยากให้พวกเขายังคงยืนหยัดอยู่อย่างสง่างามเหมือนไม่มีอะไรเกิดขึ้น"
1013003-73 = "จนกว่าจะถึงวันที่อาเรียสจะสามารถเอาชนะทรีนิตี้ได้จริงๆ ในสักวันหนึ่งค่ะ"
1013003-74 = "ยิ่งถ้ามองลงไปถึงตัวนักเรียนทรีนิตี้แต่ละคน ก็ยิ่งเป็นแบบนั้นค่ะ"
1013003-75 = "ฉันอยากให้นักเรียนอาเรียสทุกคน รวมถึงตัวฉันเอง ประสบความสำเร็จยิ่งกว่าพวกเด็กทรีนิตี้..."
1013003-76 = "แต่กว่าจะถึงจุดนั้น ฉันก็ไม่อยากให้มีการโกงหรือเรื่องผิดกฎหมายเข้ามาเกี่ยวข้องสักเท่าไรค่ะ..."
1013003-77 = "คะ? ปกติเขาเรียกเรื่องแบบนั้นว่า 'สปิริตการเป็นคู่แข่งที่ดี' งั้นเหรอคะ?"
1013003-78 = "......"
1013003-79 = "จู่ๆ ก็รู้สึกอารมณ์เสียขึ้นมาเลยค่ะ..."
1013003-80 = "ค่ะ ฉันเองก็รู้ค่ะ! และที่หงุดหงิดก็เพราะที่คุณครูพูดมามันไม่ผิดเลยสักนิดค่ะ!"
1013003-81 = "เฮ้อ... "
1013003-82 = "[s] \"เด็กม.ปลายวัยต่อต้านนี่เข้าใจยากจังเลยน้า...\" "
1013003-83 = "ค่ะ เป็นแบบนั้นจริงๆ เริ่มรู้สึกเสียใจแล้วรึยังคะที่พูดออกมาง่ายๆ ว่าจะช่วยให้คำปรึกษาน่ะ"
1013003-84 = "คะ? รู้สึกขอบคุณที่กล้าหงุดหงิดให้เห็นเหรอคะ? เพราะปกติเวลาอยู่ต่อหน้าพวกรุ่นน้อง ฉันมักจะยิ้มแย้มอย่างน่าเชื่อถืออยู่เสมอ?"
1013003-85 = "......!"
1013003-86 = "คุณครูเนี่ย นิสัยไม่ดีจริงๆ เลยนะคะ..."
1013003-87 = "[s] \"นั่นสินะ... ครูยอมเป็นคนนิสัยไม่ดีก็ได้...\""
1013003-88 = "ใช้ไม่ได้สุดๆ เลยค่ะ..."
1013003-89 = "[ns] \"ใช่แล้ว... ครูเป็นผู้ใหญ่ที่ร้ายกาจคนหนึ่งเลยละ\" "
1013003-91 = "[ns] \"แต่ว่านะ คนเราน่ะเดิมทีมันไม่ได้มีแค่ด้านเดียวหรอก\""
1013003-92 = "คะ? นั่นมันหมายความว่ายังไงเหรอคะ?"
1013003-93 = "การที่ฉันรู้สึกแบบนั้นที แบบนี้ที หรือรู้สึกหลายๆ อย่างพร้อมกัน ถึงมันจะดูไม่เป็นธรรมชาติไปบ้าง"
1013003-94 = "แต่ถึงอย่างนั้นมันก็เป็นเรื่องที่ดู \"เป็นมนุษย์\" สุดๆ เลยงั้นเหรอคะ?"
1013003-95 = "ถ้าอย่างนั้นแบบไหนถึงจะถูกต้องกันล่ะคะ?"
1013003-96 = "[s5] \"สิ่งที่สุบารุคิดว่าถูกต้องน่ะ?\" \n[s6] \"สิ่งที่สุบารุคิดว่ามันถูกแล้วจริงๆ น่ะ?\" "
1013003-99 = "หมายความว่าให้เลือกมาสักอย่างสองอย่าง แล้วที่เหลือค่อยๆ ใช้ความคิดของตัวเองเรียบเรียงมันไป#nงั้นเหรอคะ?"
1013003-100 = "สิ่งที่สำคัญคือการรับผิดชอบต่อสิ่งที่ตามมาจากทางที่เลือกนั้น..."
1013003-101 = "และเพราะยังเป็นนักเรียนอยู่ ถ้าคิดว่ารับผิดชอบไม่ไหวก็ให้ติดต่อหาคุณครูได้ตลอดเวลา อย่างงั้นเหรอคะ...?"
1013003-102 = "อะฮ่าฮ่า อะไรกันคะ... สุดท้ายมันก็ไม่ได้แก้ไขอะไรสักอย่างเลยนี่คะ"
1013003-103 = "[s] \"ใช่ แต่ชีวิตมันก็เป็นแบบนั้นแหละ\""
1013003-104 = "จริงเหรอคะ...?"
1013003-105 = "[s] \"อื้อ\""
1013003-106 = "ชีวิตเนี่ย มันวุ่นวายกว่าที่คิดไว้อีกนะคะ"
1013003-107 = "[s7] \"ใช่เลยละ\"\n[s8] \"ทุกคนก็ใช้ชีวิตอยู่กับวันนี้ก่อนกันทั้งนั้นแหละ...\""
1013003-110 = "......"
1013003-111 = "ไม่มีอะไรพิเศษเลยนะคะ"
1013003-112 = "[s9] \"อื้อ มันไม่มีอะไรพิเศษหรอก\"\n[s10] \"อย่าไปหลงเชื่อพวกที่พูดเหมือนว่ามันมีอะไรพิเศษมากล่ะ\""
1013003-115 = "พูดอะไรกันคะ! เป็นถึงผู้สอนแต่พูดจาไร้ความรับผิดชอบแบบนั้นได้ด้วยเหรอคะ?!"
1013003-116 = "เป็นคนที่แปลกจริงๆ เลยนะคะ "
1013003-120 = "ค่ะ"
1013003-121 = "จริงๆ เลยเชียว"
1013003-122 = "เป็นคนที่... แปลกจริงๆ"
1013003-123 = "เฮอะๆ..."
1013003-124 = "[s] \"สุบารุ\""
1013003-125 = "คะ?"
1013003-126 = "[s] \"ที่ผ่านมาพยายามได้ดีมากเลยนะ\""
1013003-127 = "คะ?"
1013003-128 = "เอะ เอ๋...?"
1013003-130 = "ดะ... เดี๋ยวก่อนนะคะ! ห้ามหันมาทางนี้เด็ดขาดเลยนะคะ!"
1013003-131 = "คะ? ทิชชู่อยู่บนโต๊ะ ค่อยๆ เช็ดก็ได้งั้นเหรอคะ...?"
1013003-132 = "คุณครูใจร้ายที่สุดเลยค่ะ!!!"

[translation]
1002905-1 = "第三堂課「實習：挖掘」"
1002905-2 = "（來到的地方是在三一郊區的某個商店街）"
1002905-3 = "（不只有很多古老的建築，大概因為是偏遠的郊區，所以也有很多歇業的店家）"
1002905-4 = "哦～你來啦老師。真讓人開心。"
1002905-9 = "這裡這麼偏僻，雖然想過你會不會迷路……看來你很努力呢。厲害厲害。"
1002905-10 = "那麼今天的活動是「世界上最浪漫的事」之一……"
1002905-11 = "那就是「挖掘」！！"
1002905-12 = "[s1] 「挖掘……？」\n[s2] 「那是什麼……？」"
1002905-13 = "這是我柚鳥夏的人生中，搞不好沒有第二次的歷史性重大活動……#n所以想請老師來幫我見證。"
1002905-14 = "這是我柚鳥夏的人生中，搞不好沒有第二次的歷史性重大活動……#n所以想請老師來幫我見證。"
1002905-15 = "……嗯？想知道更多詳細的內容？"
1002905-16 = "別急別急～#n就算慢慢來，「他們」也不會跑掉的唷。"
1002905-17 = "畢竟都已經守護這個地方這麼久了。#n區區幾分鐘，對他們來說根本不算什麼吧。"
1002905-18 = "呵呵呵，沒有比這裡更適合用「寶物」來形容的地方了……"
1002905-19 = "因為這裡是……「被遺忘的零食店」！！"
1002905-20 = "[s3] 「被遺忘的零食店？」\n[s4] 「是指不知道在哪的店……那種嗎？」"
1002905-21 = "正是如此！#n所謂「被遺忘的零食店」……是在三一的學生之間自古流傳下來的都市傳說！"
1002905-22 = "正是如此！#n所謂「被遺忘的零食店」……是在三一的學生之間自古流傳下來的都市傳說！"
1002905-23 = "據說有個聚集了隨著學校悠久的歷史變遷，#n許多一度流行又遭人遺忘的點心們的傳說中的地方！"
1002905-24 = "然而這個傳聞也在不知不覺間逐漸遭到淡忘，沒有人試著去發現它，#n以至於如今反而維持著原有的樣子，變成了博物館一般的存在……也有這種說法！"
1002905-30 = "那樣夢幻的地方，終於……！"
1002905-31 = "被我「柚鳥夏」給找到了！#n正確來說是找到了前往那裡的線索！！"
1002905-32 = "……所以！想進──"
1002905-36 = "……"
1002905-37 = "……想進去看看，但是又有點害怕……畢竟這裡就像廢墟一樣。"
1002905-38 = "[s5] 「所以才想要我一起進去啊？」\n[s6] 「原來如此，終於理解了。」"
1002905-39 = "嘛～大概就是這樣。等一下進去能看到很棒的東西的！一起進去啦～好嗎？"
1002905-40 = "嘛～大概就是這樣。等一下進去能看到很棒的東西的！一起進去啦～好嗎？"
1002905-44 = "就在那個建築物裡面。怎麼樣呢，老師。#n不覺得看起來像是個會冒出什麼厲害東西的地方嗎？"
1002905-45 = "散發著那種氣氛，我想就連不良分子也不會把這裡當成基地吧～"
1002905-46 = "嘛，也多虧了這點，餅乾們才能長眠於此，被保存得如此完好吧。"
1002905-47 = "好了，我們進去吧，老師！出發，出發！！"
1002905-48 = "Let's Go！！"
1002905-50 = "（跟著夏進入了廢棄的建築物，裡面就如夏說的一樣相當老舊）"
1002905-51 = "（建築物內有些是現在的大樓已經不使用的構造和裝飾，證明的確是很古老的建築）"
1002905-56 = "……雖然氣勢洶洶地進來了，但進來後還是會感到害怕呢。"
1002905-57 = "不過就快到了。根據我的調查，目的地就在那個轉角過去……！"
1002905-58 = "……嗯？"
1002905-59 = "你說，如果去了遇到奇怪的東西，或發現跟想像中的不一樣的話……？"
1002905-60 = "……啊哈。"
1002905-61 = "嘛嘛，的確有可能。抱著期待去了卻發現那裡什麼都沒有，也是浪漫中免不了的事。"
1002905-62 = "不過，大概會有點失望吧，畢竟也是很努力才找到的。"
1002905-63 = "但是，老師……正是因為有愛才會失望，不覺得這才算真正的浪漫嗎？"
1002905-64 = "謝謝你為我擔心，我已經做好覺悟了，不用擔心──"
1002905-65 = "開心的覺悟，傷心的覺悟都有了。"
1002905-69 = "好了，那我們繼續往前走……"
1002905-71 = "如果傳聞是真的話，就在眼前。"
1002905-72 = "「被遺忘的零食店」……！"
1002905-76 = "……！！"
1002905-79 = "― 你看你看，老師！ 好厲害……！[wa:1910] "
1002905-81 = "― 有這麼多！！[wa:680] "
1002905-84 = "― 而且，每一個都沒有看過！！[wa:3010] "
1002905-86 = "― 全都是第一次見到的零食……！！[wa:980] "
1002905-89 = "― ……啊哈，抱歉抱歉。[wa:2020] "
1002905-91 = "― 突然放鬆了下來。[wa:1070] "
1002905-94 = "― 謝謝你，老師。[wa:2530] "
1002905-96 = "― 像這樣陪著我。[wa:610] "
1002905-99 = "― 真的很感謝你哦。[wa:2960] "
1002905-101 = "― 像這樣和老師待在一起，又開心又有趣。[wa:3220] "
1002905-104 = "……嗯？賞味期限？"
1002905-105 = "啊哈，說的也是呢～#n這種事我還是有事先預料到的。"
1002905-106 = "但還是很開心。"
1002905-107 = "我來這裡並不是為了尋找食物……"
1002905-108 = "而是為了發現歷史與浪漫啊！"
1002905-109 = "哎呀～真是個厲害的地方呀。#n我要拍一堆照片，然後發給大家看──"
1002905-115 = "那就送出……"
1002905-117 = "嗯……"
1002905-121 = "[ns7] 「……夏？」\n[ns8] 「不傳出去嗎？」"
1002905-122 = "……唔嗯。"
1002905-123 = "……唔嗯。"
1002905-124 = "還是算了。"
1002905-125 = "如果這個地方的存在不小心洩漏出去的話，想必會有很多好奇的人跑來這裡吧。"
1002905-126 = "那樣一來，這裡的樣貌又會再次改變。"
1002905-127 = "可能會有人想帶東西回去當紀念……或者就算沒有惡意，#n一旦有人來來去去，這裡的空氣和地板之類的也將會有所改變吧。"
1002905-128 = "那樣就有些缺乏浪漫了。#n我希望這個地方能繼續維持原樣。"
1002905-129 = "……嗯？#n嘛，也是呢。這樣就不能跟任何人說了。"
1002905-130 = "起初我的確是想找到這裡，"
1002905-131 = "讓更多人知道這個地方的。"
1002905-137 = "……但我改變想法了。"
1002905-138 = "嗯，這樣就夠了。"
1002905-139 = "即便如此，我跟老師來到這裡的事實也不會改變。"
1002905-140 = "現在我所看到的這個景色，是確實存在的。"
1002905-146 = "希望這個地方能一如既往……永遠都是個浪漫的地方。"

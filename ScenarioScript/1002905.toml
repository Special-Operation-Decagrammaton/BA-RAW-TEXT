[translation]
1002905-1 = "วิชาการปฏิบัติ: การค้นพบ"
1002905-2 = "(สถานที่ที่นัตสึบอกให้คุณครูมา คือย่านการค้าแห่งหนึ่งที่ชานเมืองทรีนิตี้)"
1002905-3 = "(ที่นั่นมีอาคารเก่าแก่อยู่มากมาย และอาจเป็นเพราะอยู่บริเวณชานเมืองทำให้ไม่มีผู้คนมากนัก และมี#nหลายร้านที่ปิดกิจการไปแล้ว)"
1002905-4 = "โอ้... คุณครู มาแล้วเหรอ ดีจังเลย"
1002905-9 = "ฉันคิดว่าคุณครูคงจะมาลำบากหน่อยเพราะที่นี่ค่อนข้างแคบ แต่ก็ยังมาตรงเวลาเหมือนเดิมนะ ฮ่ะฮ่ะฮ่ะ"
1002905-10 = "เหตุผลที่ฉันเรียกคุณครูมาวันนี้ก็เพื่อที่จะแบ่งปันวินาทีแห่ง \"การค้นพบ\" ที่โรแมนติกที่สุดในโลก..."
1002905-11 = "หนึ่งใน \"เรื่องที่โรแมนติกที่สุดในโลก\" ยังไงล่ะ!"
1002905-12 = "[s1] \"วินาทีแห่งการค้นพบ?\"\n[s2] \"การแบ่งปันเหรอ?\""
1002905-13 = "อื้อ... ฉันหวังว่าคุณครูจะอยู่เป็นผู้สังเกตการณ์เหตุการณ์สำคัญทางประวัติศาสตร์อันยิ่งใหญ่#nที่มันจะไม่เกิดขึ้นอีกในชีวิตของฉันนะ"
1002905-14 = "อื้อ... ฉันหวังว่าคุณครูจะอยู่เป็นผู้สังเกตการณ์เหตุการณ์สำคัญทางประวัติศาสตร์อันยิ่งใหญ่#nที่มันจะไม่เกิดขึ้นอีกในชีวิตของฉันนะ"
1002905-15 = "หืม...? เหตุการณ์อะไรน่ะเหรอ? การค้นพบอะไรน่ะเหรอ?"
1002905-16 = "ฮ่าฮ่า... อย่าเพิ่งรีบร้อนสิ เพราะยังไง \"พวกนั้น\" ก็ไม่หนีไปไหนหรอก"
1002905-17 = "พวกเขาคือผู้ที่อยู่ ณ ที่แห่งนั้นมานานหลายปีแล้ว ตอนนี้ถึงจะช้าไปอีกสักสองสามนาที พวกนั้นก็ไม่ได้#nสนใจอะไรหรอก"
1002905-18 = "ฮุฮุฮุ สถานที่ที่ไม่อาจใช้คำเรียกว่า \"ห้องเก็บสมบัติ\" ได้อีกต่อไป..."
1002905-19 = "นั่นก็คือ... <ร้านขนมที่ถูกลืม> ไงล่ะ!!"
1002905-20 = "[s3] \"ร้านขนมที่ถูกลืมงั้นเหรอ?\"\n[s4] \"หมายถึงร้านที่ปิดร้างงั้นเหรอ?\""
1002905-21 = "ก็ตามนั้นล่ะ! ร้านขนมที่ถูกลืมเป็นเรื่องเล่าต่อๆ กันมาในหมู่นักเรียนของทรีนิตี้เหมือนกับตำนานของ#nเมืองยังไงล่ะ"
1002905-22 = "ก็ตามนั้นล่ะ! ร้านขนมที่ถูกลืมเป็นเรื่องเล่าต่อๆ กันมาในหมู่นักเรียนของทรีนิตี้เหมือนกับตำนานของ#nเมืองยังไงล่ะ"
1002905-23 = "เช่นเดียวกับประวัติศาสตร์อันยาวนานของโรงเรียน ที่แห่งนี้คือสถานที่ที่รวบรวมขนมมากมายที่เกิดขึ้น#nและหายไปตามกาลเวลา!"
1002905-24 = "เพราะว่าเป็นร้านที่ถูกผู้คนลืมเลือน เลยทำให้คลังขนมมหัศจรรย์แห่งนี้เป็นเหมือนพิพิธภัณฑ์ที่ถูก#nอนุรักษ์ไว้!"
1002905-30 = "และที่แห่งนั้น... นัตสึผู้นี้...!"
1002905-31 = "ก็คือผู้ค้นพบสถานที่แห่งนั้นยังไงล่ะ! ทั้งเรื่องที่มีของสิ่งนั้นอยู่ที่สถานที่แห่งนี้! ทั้งเบาะแสทั้งหลายที่มี#nอยู่...!!"
1002905-32 = "และก็...!"
1002905-36 = "..."
1002905-37 = "ตอนนี้ฉันกำลังจะเข้าไปแล้ว แต่ไม่รู้ทำไมถึงได้รู้สึกกลัวนิดๆ ขึ้นมาอาจเพราะยังไงมันก็เป็นตึกร้าง..."
1002905-38 = "[s5] \"สุดท้ายก็คืออยากให้เข้าไปด้วยเพราะกลัวสินะ\"\n[s6] \"อ่า... ใจความอยู่ที่ประโยคสุดท้ายสินะ\""
1002905-39 = "ฮ่าฮ่าฮ่า อะไรกันเล่า เดี๋ยวฉันจะพาไปดูวิวสวยๆ แทนนะ เพราะงั้นเข้าไปด้วยกันเถอะ หืม?"
1002905-40 = "ฮ่าฮ่าฮ่า อะไรกันเล่า เดี๋ยวฉันจะพาไปดูวิวสวยๆ แทนนะ เพราะงั้นเข้าไปด้วยกันเถอะ หืม?"
1002905-44 = "อาคารตรงนั้นไงล่ะคุณครู ดูสิ แค่เห็นก็รู้สึกเหมือนจะมีตัวอะไรโผล่ออกมาแล้วใช่มั้ยล่ะ"
1002905-45 = "เพราะมันดูอึมครึมแบบนั้น แม้แต่พวกนักเลงก็ยังไม่เข้าไปใช้ตึกนั่นเป็นฐานทัพเลย"
1002905-46 = "ก็นะ... เพราะแบบนั้นร้านขนมที่ถูกลืมถึงได้คงสภาพได้อยู่แบบนี้"
1002905-47 = "เอาละ เข้าไปกันเถอะคุณครู! ไปกันเถอะ ไปกันเลย!!"
1002905-48 = "ไป-กัน-เลย!!"
1002905-50 = "(คุณครูเดินตามนัตสึเข้าไปในอาคารร้าง และก็พบว่าภายในค่อนข้างเก่าเหมือนที่นัตสึพูดไม่มีผิด)"
1002905-51 = "(ลักษณะภายในอาคารบางส่วนมีการตกแต่งและมีโครงสร้างที่ไม่ได้ใช้แล้วในปัจจุบันแสดงให้เห็นว่า#nเป็นสถานที่เก่ามากๆ)"
1002905-56 = "ถึงจะเข้ามาด้วยความรู้สึกฮึกเหิม แต่พอเข้ามาจริงๆ แล้วกลับรู้สึกว่ามันก็น่ากลัวอยู่นะ..."
1002905-57 = "แต่ก็ใกล้ถึงแล้วละ ตามที่ฉันหาข้อมูลมา ร้านขนมจะอยู่ที่ตรงหลังหัวมุมตรงนั้นน่ะ"
1002905-58 = "หืม? ว่ายังไงนะ"
1002905-59 = "อุตส่าห์มาถึงที่นี่แล้ว แต่ถ้าไปถึงแล้วไม่เจอก็อาจจะผิดหวังสุดๆ เลยงั้นเหรอ?"
1002905-60 = "ฮะฮะ..."
1002905-61 = "ก็นะ... ที่พูดมาก็ไม่ผิดหรอก อุตส่าห์ดั้นด้นไปถึงแล้ว แต่ถ้าไม่เจออะไรเลย เจอแต่ความว่างเปล่า...#nเรื่องแบบนั้นก็เกิดขึ้นบ่อยไป"
1002905-62 = "แน่นอนว่าก็คงผิดหวังอยู่บ้าง ก็เราพยายามมาถึงที่นี่ด้วยความหวังว่าจะได้เจอจริงๆ นี่นะ"
1002905-63 = "แต่ว่านะคุณครู... เราต้องหัดรู้จักรักความผิดหวังแบบนั้นบ้าง จะได้พูดออกมาได้ว่ารู้จักความโรแมนติก#nจริงๆ"
1002905-64 = "ไม่ต้องห่วงหรอก ฉันเตรียมใจมาแล้วละ"
1002905-65 = "เตรียมใจมาพร้อมรับทั้งความสุขและความเศร้าแล้วละ"
1002905-69 = "และถ้าเราผ่านตรงนี้ไป..."
1002905-71 = "ถ้ามาถึงตรงนี้แล้ว ตรงนั้นก็จะเป็น..."
1002905-72 = "ร้านขนมที่ถูกลืม..."
1002905-76 = "...!!"
1002905-79 = "― ดูนี่สิคุณครู...! สุดยอดเลย...[wa:1310] "
1002905-81 = "― มีอยู่เยอะแยะเลย![wa:240] "
1002905-84 = "― ขนมนี่ ฉันเพิ่งเคยเห็นครั้งแรก อันนั้นก็เพิ่งเคยเห็นเลย...[wa:1210] "
1002905-86 = "― มีแต่ขนมที่เพิ่งเคยเห็นทั้งนั้นเลย...!![wa:20] "
1002905-89 = "― อ๊ะ โทษที โทษที...[wa:1700] "
1002905-91 = "― จู่ๆ ฉันก็ตื่นเต้นจนลืมตัวไปหน่อย[wa:70] "
1002905-94 = "― ขอบคุณนะ คุณครู[wa:2210] "
1002905-96 = "― ที่มาเป็นเพื่อน... กับฉันแบบนี้[wa:10] "
1002905-99 = "― ฉันรู้สึก... ขอบคุณจริงๆ[wa:2320] "
1002905-101 = "― ได้อยู่กับคุณครูแบบนี้... มันสนุกมากเลยละ[wa:2300] "
1002905-104 = "หืม...? อะไรนะ? ขนมมันเก่ามากคงจะกินไม่ได้แล้วงั้นเหรอ?"
1002905-105 = "อะฮ่าฮ่าฮ่า! เรื่องนั้นฉันรู้อยู่แล้วละน่า มันก็เรื่องพื้นๆ ไม่ใช่หรือไงล่ะ?"
1002905-106 = "แต่ถึงอย่างนั้นฉันก็ดีใจงั้นเหรอ?"
1002905-107 = "แน่นอนอยู่แล้ว!"
1002905-108 = "ฉันไม่ได้จะมาหาของกินสักหน่อย มาค้นพบประวัติศาสตร์ต่างหาก!"
1002905-109 = "อ่า~ เป็นที่ที่สมบูรณ์แบบจริงๆ ต้องถ่ายรูปเอาไว้เยอะๆ แล้วเอาไปโพสต์ลงโซเชียลด้วย~!"
1002905-115 = "เลือกรูปต่างๆ ที่จะอัปโหลดแล้วก็....?"
1002905-117 = "อืม..."
1002905-121 = "[ns7] \"นัตสึ...?\"\n[ns8] \"ทำไมถึงหยุดอัปล่ะ?\""
1002905-122 = "เปล่า..."
1002905-123 = "เปล่า..."
1002905-124 = "ไม่เป็นไร ฉันไม่อัปแล้วดีกว่า ยกเลิกการอัปโหลด..."
1002905-125 = "ถ้าที่นี่ถูกเปิดเผยออกไปแล้วคนอื่นๆ รู้ว่าที่นี่มีอยู่จริงละก็ คงจะดึงดูดพวกที่อยากรู้อยากเห็น#nเข้ามาเต็มไปหมดแน่เลย"
1002905-126 = "และพอมาครั้งหนึ่งแล้วก็จะมีครั้งที่สองตามมา... จากสองครั้งจะกลายเป็นสิบครั้ง และถ้ามีคนแวะเวียน#nมาเรื่อยๆ สถานที่แห่งนี้ก็คงจะเปลี่ยนไปจากตอนนี้"
1002905-127 = "จะมีพวกที่ชอบหยิบอะไรติดไม้ติดมือเป็นของฝากไปด้วย และในตอนที่มีคนมา ฝุ่นที่จับตัวอยู่ที่พื้นก็จะ#nถูดพัดปลิวหายไป..."
1002905-128 = "ฉันไม่ชอบแบบนั้นเท่าไรเลย... ฉันอยากให้ที่แห่งนี้เป็นเหมือนตอนนี้ต่อไปมากกว่าน่ะ"
1002905-129 = "หืม? เพราะแบบนั้นเลยบอกใครไม่ได้น่ะเหรอ?"
1002905-130 = "ฉันมาที่นี่เพราะพิสูจน์ว่ามันมีอยู่จริงแล้วก็บอกทุกคนไม่ใช่งั้นเหรอ?"
1002905-131 = "ฮุฮุ ก็ใช่นะ ตอนแรกฉันก็คิดแบบนั้นนั่นละ"
1002905-137 = "แต่ตอนนี้เปลี่ยนใจแล้ว..."
1002905-138 = "อื้อ... ไม่เป็นไร"
1002905-139 = "แค่ไม่ได้บอกให้ใครรู้ มันก็ไม่ได้เปลี่ยนแปลงความจริงที่ว่าฉันกับคุณครูเคยมาที่นี่ด้วยกัน"
1002905-140 = "และมันก็ไม่ได้ทำให้ภาพงดงามที่ฉันเห็นอยู่เปลี่ยนแปลงไปด้วย"
1002905-146 = "ปล่อยให้ที่นี่เป็นไปอย่างที่เคยเป็นต่อไปนั่นละ..."

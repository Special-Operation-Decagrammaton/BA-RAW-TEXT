[translation]
1002905-1 = "Excavation and Discovery"
1002905-2 = "(I followed Natsu's instructions and arrived at a shopping district on the outskirts of Trinity.)"
1002905-3 = "(The outskirts were rundown with old, closed-down buildings and no people.)"
1002905-4 = "Sensei. You're here. It's good to see you."
1002905-9 = "I thought it'd be hard for you to get to such a remote place, but luckily, you even arrived on time."
1002905-10 = "I called you here because one of the most romantic things in the world..."
1002905-11 = "is to share a moment of discovery with someone else!"
1002905-12 = "[s1] \"Moment of discovery?\"\n[s2] \"Share with someone else?\""
1002905-13 = "Yeah. I wanted to share this grand, historic, once-in-a-lifetime event with you, Sensei."
1002905-14 = "Yeah. I wanted to share this grand, historic, once-in-a-lifetime event with you, Sensei."
1002905-15 = "What event? What discovery?"
1002905-16 = "Don't be so impatient. These things don't run away anyway."
1002905-17 = "There are things in this world that have stood for countless ages. They won't mind if I take a few more minutes."
1002905-18 = "Heeheehee. This is a place perfectly described as a treasure trove."
1002905-19 = "The Forgotten Sweet Shop!"
1002905-20 = "[s3] \"The Forgotten Sweet Shop?\"\n[s4] \"Does that mean it's an abandoned store?\""
1002905-21 = "Exactly! The Forgotten Sweet Shop is an urban legend passed down by the students of Trinity since time immemorial."
1002905-22 = "Exactly! The Forgotten Sweet Shop is an urban legend passed down by the students of Trinity since time immemorial."
1002905-23 = "It's a part of the long and storied history of the school. A place where countless snacks have appeared and disappeared throughout that history!"
1002905-24 = "A miraculous, museum-like warehouse perfectly preserved because it was forgotten, so no one ever visited!"
1002905-30 = "This is the place that I just so happened to find! Me! Natsu!"
1002905-31 = "I discovered the clues that lead to its existence! And its very location!"
1002905-32 = "And so!"
1002905-36 = "..."
1002905-37 = "I tried to go in, but I lost my nerve. I mean, it is an abandoned building, after all."
1002905-38 = "[s5] \"So you want us to go in together because you're scared.\"\n[s6] \"Ah. I like that you're taking initiative.\""
1002905-39 = "Hey! How mean. I'm giving you the chance to see something cool, so let's call it even, okay?"
1002905-40 = "Hey! How mean. I'm giving you the chance to see something cool, so let's call it even, okay?"
1002905-44 = "It's that building over there, Sensei. See, doesn't it look a little creepy? Doesn't it?"
1002905-45 = "It's so gloomy-looking that even bullies wouldn't use it as a hideout."
1002905-46 = "Well, at least that allowed the Forgotten Sweet Shop to stay preserved."
1002905-47 = "Now, let's go in, Sensei! Come on, come on!"
1002905-48 = "Let's! Go!"
1002905-50 = "(The building that I followed Natsu into was very old and derelict, just as Natsu said.)"
1002905-51 = "(Parts of the building were decorated or structured in ways you don't see on modern buildings. It was definitely an old place.)"
1002905-56 = "We were so confident coming in, but now it's a little scary now that we're inside."
1002905-57 = "But according to my investigations, the sweet shop should be just around that corner."
1002905-58 = "Hmm? What?"
1002905-59 = "You'll be very disappointed if we come all this way and don't find it?"
1002905-60 = "...Haha."
1002905-61 = "Well, you've got a point. To come this far and find nothing but an empty space... It's not impossible."
1002905-62 = "It would definitely be a huge disappointment. I worked so hard to find this place and put my faith in it."
1002905-63 = "But, Sensei, romance requires both triumphs and disappointments."
1002905-64 = "Don't worry. I'm prepared."
1002905-65 = "Prepared for victory or sadness."
1002905-69 = "Now, we just need to go past here and..."
1002905-71 = "If we stand here, then it should definitely be..."
1002905-72 = "The Forgotten Sweet Shop!"
1002905-76 = "...!"
1002905-79 = "― Look, Sensei! Amazing...[wa:1550] "
1002905-81 = "― It's filled to the brim![wa:10] "
1002905-84 = "― It's my first time seeing this! My first time seeing that![wa:1210] "
1002905-86 = "― So many snacks I've never laid eyes on before![wa:10] "
1002905-89 = "― Whew. Sorry about that.[wa:1500] "
1002905-91 = "― It feels like my legs are going to give out all of a sudden.[wa:10] "
1002905-94 = "― Thank you, Sensei.[wa:2090] "
1002905-96 = "― For coming with me.[wa:130] "
1002905-99 = "― I'm really thankful.[wa:2480] "
1002905-101 = "― I'm so happy I got to make this discovery with you.[wa:1900] "
1002905-104 = "What did you say? You don't think we can eat these because they're old?"
1002905-105 = "Ahahaha. I know that much. I mean, obviously!"
1002905-106 = "But am I happy regardless?"
1002905-107 = "Naturally."
1002905-108 = "I didn't come here to look for food. I came here to make a historical discovery!"
1002905-109 = "This place is perfect! I have to take lots of pictures and upload them to my social media accounts and share them with everyone!"
1002905-115 = "I'll select a bunch of these for upload and..."
1002905-117 = "Hmm."
1002905-121 = "[ns7] \"Natsu?\"\n[ns8] \"Why did you stop uploading?\""
1002905-122 = "...No."
1002905-123 = "...No."
1002905-124 = "Actually, I don't want to share these."
1002905-125 = "If I share these and people find out this place really exists, I'm sure curious people will come looking for it."
1002905-126 = "Soon, one visit becomes two, two visits become ten, and before you know it, this place will be totally changed."
1002905-127 = "Someone will probably pick off some of this stuff as souvenirs, and as people come and go, the magic will disappear."
1002905-128 = "I don't want that. I want this place to be preserved exactly as it is right now."
1002905-129 = "Are you wondering how I'll tell people then?"
1002905-130 = "Wasn't I hoping to prove its existence and share it with everyone?"
1002905-131 = "Heehee. You're right. That is what I wanted at first."
1002905-137 = "...But I've changed my mind."
1002905-138 = "I'm okay."
1002905-139 = "Not telling anyone doesn't change the fact that we were here."
1002905-140 = "It doesn't change the view of the story I'm enjoying right now."
1002905-146 = "I hope this place continues to survive just as it is. Forever."

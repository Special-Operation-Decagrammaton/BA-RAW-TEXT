[translation]
80000108-1 = "#title;최고, 최선, 그리고 궁극의……."
80000108-2 = "3;토키 모드 1;02;안녕하십니까. 선생님.\n#3;a\n#3;em;[반응]"
80000108-3 = "[s] \"미안, 토키. 많이 기다렸어?\""
80000108-4 = "3;토키 모드 1;99;아닙니다. 애초에 그런 것은 그다지 중요하지 않은 것이기도 하고요.\n#3;greeting"
80000108-5 = "3;토키 모드 1;01;그러면 선생님, 가실까요."
80000108-6 = "[s] \"그러니까, 토키의 오피스……였지?\""
80000108-7 = "3;토키 모드 1;01;그렇습니다. 어쩌면 이미 익숙해졌을 장소이기도 하실 것 같습니다만."
80000108-8 = "3;토키 모드 1;99;가시죠. 선생님. 제가 에스코트하겠습니다."
80000108-9 = "#all;hide"
80000108-10 = "#wait;250"
80000108-11 = "#wait;2500"
80000108-12 = "#all;hide"
80000108-13 = "3;토키 모드 1;99;어서 오십시오. 선생님. 자리는 저쪽입니다.\n#3;a"
80000108-14 = "#all;hide"
80000108-15 = "#na;(토키가 가리키는 곳으로 시선을 돌리자, 깔끔하게 정리된 테이블과 의자가 보였다…….)"
80000108-16 = "#st;[0,0];instant;1;"
80000108-17 = "#clearST"
80000108-18 = "#wait;1500"
80000108-19 = "#all;hide"
80000108-20 = "3;토키 모드 1;01\n#3;a\n#wait;1000"
80000108-21 = "[ns] \"그래서, 토키. 앉긴 했는데, 오늘은 어쩐 일로……?\""
80000108-22 = "3;토키 모드 1;01;예. 그러면 지금부터…….\n#3;greeting"
80000108-23 = "3;토키 모드 1;03;선생님만을 위한, 발렌타인 데이 초콜릿 코스를 대접하겠습니다.\n#3;em;[반짝]"
80000108-24 = "[s1] \"아, 발렌타인 데이! 그래서 일부러…….\"\n[s2] \"이런 자리까지 만든 거야?\""
80000108-25 = "#wait;100"
80000108-26 = "#wait;100"
80000108-27 = "3;토키 모드 1;99;그렇습니다.\n#3;greeting"
80000108-28 = "3;토키 모드 1;99;이런 날을 허투루 보낼 수는 없다고 생각했기에, 제 나름대로 어떻게 선생님께 보답할 수 있을지를 생각한 끝에 내놓은 결론."
80000108-29 = "3;토키 모드 1;01;그것은."
80000108-30 = "[s] \"그것은……?\""
80000108-31 = "3;토키 모드 1;05;최고, 최선, 그리고 궁극의 접대입니다.\n#3;jump"
80000108-32 = "3;토키 모드 1;02;……혹시 폐가 되었을까요?"
80000108-33 = "[s] \"그런 건 아니야. 오히려 엄청 기뻐.\""
80000108-34 = "3;토키 모드 1;99;그렇군요. 그렇다면 다행입니다."
80000108-35 = "3;토키 모드 1;01;그러면 지금부터 시작하겠습니다."
80000108-36 = "3;토키 모드 1;02;아, 초콜릿들은 모두 키보토스에서 가장 유명한 가게에서 공수한 특별, 특상품이므로 걱정하지 않으셔도 됩니다. \n#3;em;[반응]"
80000108-37 = "3;토키 모드 1;01\n#3;a"
80000108-38 = "3;토키 모드 1;01;첫 코스는 정석적인 밀크초콜릿입니다. 풍부한 우유의 풍미가 단맛과 조화되어, 입맛을 돋워 드릴 겁니다.\n#3;greeting"
80000108-39 = "#all;hide"
80000108-40 = "#wait;1500"
80000108-41 = "#wait;1500"
80000108-42 = "3;토키 모드 1;02\n#3;a"
80000108-43 = "3;토키 모드 1;02;다음으로는 화이트 초콜릿입니다. 카카오 메스와 카카오 파우더가 들어가지 않아, 지방 맛과 설탕의 단맛이 색다른 풍미를 제공해 드릴 겁니다. \n#3;greeting"
80000108-44 = "#all;hide"
80000108-45 = "#wait;1500"
80000108-46 = "3;토키 모드 1;99\n#3;a"
80000108-47 = "3;토키 모드 1;99;카카오의 함량이 높은 다크 초콜릿입니다. 지금까지 단 맛 위주였던 혀를 한 번 씻어내고 정리해 드릴 겁니다.\n#3;greeting"
80000108-48 = "#all;hide"
80000108-49 = "#wait;2500"
80000108-50 = "3;토키 모드 1;01\n#3;a"
80000108-51 = "3;토키 모드 1;01\n#3;greeting\n#wait;2500"
80000108-52 = "3;토키 모드 1;01;목이 마르실 테니 마실 것을 준비했습니다. 럼 향이 가미된 코코아입니다. 설탕은 테이블 위에 놓아 드릴 테니, 취향에 맞게 첨가해 주십시오.\n#3;greeting"
80000108-53 = "#all;hide"
80000108-54 = "#wait;2500"
80000108-55 = "3;토키 모드 1;03\n#3;a"
80000108-56 = "3;토키 모드 1;03;과일이 들어간 프루트 초콜릿입니다. 단맛과 쓴맛, 고소한 맛 위주였던 이전까지의 맛에, 상큼함과 신선함을 더해 줄 것입니다."
80000108-57 = "#all;hide"
80000108-58 = "#wait;2500"
80000108-59 = "3;토키 모드 1;01\n#3;a"
80000108-60 = "[ns3] \"처음에는 조금씩 초콜릿을 맛보는 거라고 생각했는데…….\"\n[ns4] \"정말, 초콜릿이란 엄청나게 다양하구나…….\""
80000108-61 = "#wait;100"
80000108-62 = "#wait;100"
80000108-63 = "3;토키 모드 1;02;어떠신가요. 입맛에 맞으셨나요."
80000108-64 = "3;토키 모드 1;01;만족하셨을지 모르겠습니다."
80000108-65 = "[s] \"응. 이미 충분히 만족스러웠…….\""
80000108-66 = "3;토키 모드 1;99;하지만, 아직 저의 접대는 끝이 아닙니다.\n#3;em;…"
80000108-67 = "[s5] \"더 큰 게 온다?!\"\n[s6] \"좋아……. 각오는 완료했다! 얼마든지 와 보라고!\""
80000108-68 = "#wait;100"
80000108-69 = "#wait;100"
80000108-70 = "3;토키 모드 1;99;과연, 그래야 저의 선생님이시죠."
80000108-71 = "3;토키 모드 1;05;그렇다면 저, 아스마 토키. 가겠습니다!\n#3;jump"
80000108-72 = "#st;[0,0];instant;1;"
80000108-73 = "#clearST"
80000108-74 = "3;토키 모드 1;02\n#3;m1\n#wait;1000"
80000108-75 = "#bgshake\n#wait;2500"
80000108-76 = "[ns] \"이것은……?!\""
80000108-77 = "3;토키 모드 1;99;보시는 대로, 제가 직접 만든 초콜릿케이크입니다. 이것을 오늘 초콜릿 코스의 마무리로 하겠습니다."
80000108-78 = "3;토키 모드 1;99;앞서 선보여 드린 그 최고급 코스들은, 전부 이 케이크를 위한 전초전."
80000108-79 = "3;토키 모드 1;01;키보토스의 유명 과자점들에 비한다고 해도, 저의 초콜릿이 절대로 뒤지지 않는다는 것을 증명해 드리겠습니다."
80000108-80 = "[s] \"아니, 거기까지 하지 않아도 토키의 초콜릿이라면 충분히…….\""
80000108-81 = "3;토키 모드 1;02;무릅니다. 물러요. 갓 만든 가나슈 초콜릿 표면만큼이나 무릅니다.\n#3;m3"
80000108-82 = "3;토키 모드 1;00;발렌타인 데이라는 건, 평소 특별한 마음이 있는 사람에게 초콜릿으로 그 마음을 표현하는 날이라고 들었습니다. 맞습니까?"
80000108-83 = "[s] \"넵. 정확합니다.\""
80000108-84 = "3;토키 모드 1;07;그렇다면, 특별한 마음이 있는 사람에게 주는 초콜릿이라면, 그에 어울릴 만큼의 특별한 방법으로 전달해야 하는 것이 아닐까요?"
80000108-85 = "3;토키 모드 1;05;다시 그렇다면, 그만큼이나 특별한 방법으로 전달하기 위해서는, 자신의 모든 것을 내던져서라도, 그 어떤 궁극에 도달해야 하는 것이 아닐까요?!\n#3;closeup"
80000108-86 = "[s] \"어떤 의미에서 틀린 말은 아닌 것 같긴 한데!\""
80000108-87 = "3;토키 모드 1;99;후우, 이런. 저답지 않게 조금 흥분해 버렸군요. 과연 발렌타인 데이. 만만치 않은 강적입니다. 이야기를 계속하죠.\n#3;greeting"
80000108-88 = "3;토키 모드 1;01;선생님을 제 오피스로 안내한 이유는, 이곳이 지금, 제가 모든 것을 다해 살아가고 있는 장소 중 하나이기 때문이었습니다."
80000108-89 = "3;토키 모드 1;01;이곳에서 선생님께 최고의 접대를 해 드리고 싶었으니까요."
80000108-90 = "[s] \"으, 응…….\""
80000108-91 = "3;토키 모드 1;01;그리고 바로 이 장소에서, 제가 엄선한 최고의 초콜릿들을 전달해 드리고 싶었습니다."
80000108-92 = "3;토키 모드 1;99;초콜릿들의 품질에 대해서는 걱정 마십시오. 인터넷의 시식 후기, 특히 트리니티 종합학원과 게헨나 미식연구회의 리뷰를 조금 더 중점적으로 참고하여."
80000108-93 = "3;토키 모드 1;00;가장 평균 점수가 높은 곳을 선정해, 제가 직접 맛본 후에 고르고 고른 것들이었으니까요."
80000108-94 = "#st;[0,0];instant;1;"
80000108-95 = "#clearST"
80000108-96 = "3;토키 모드 1;00\n#3;em;…\n#wait;2500"
80000108-97 = "3;토키 모드 1;04;저…… 선생님? 혹시 제 초콜릿 코스, 어딘가 부족하다거나 이상하다고 느끼지는 않으셨나요?"
80000108-98 = "[s] \"오히려 그런 대접을 받아도 되나 황송할 정도였는데…….\""
80000108-99 = "3;토키 모드 1;02;그렇습니까. 다행이군요."
80000108-100 = "3;토키 모드 1;01;그러나 그것들은 어디까지나 기성품. 남이 만든 것. 저의 진심을 담을 수는 있지만, 그 100퍼센트를 담을 수는 없는 것."
80000108-101 = "3;토키 모드 1;99;그러면 이제, 다음 과정으로 넘어가도록 할까요.\n#3;em;[음표]"
80000108-102 = "3;토키 모드 1;01;다음 과정이 무엇이냐고요? 그거야 당연히, 선생님께서 제 케이크를 맛보아 주시는 것입니다."
80000108-103 = "3;토키 모드 1;07;……혹시, 싫으신가요?"
80000108-104 = "[s7] \"그, 그럴 리가!\"\n[s8] \"오히려 그런 말을 들으니까 더 기대가 돼! 응!\""
80000108-105 = "#wait;100"
80000108-106 = "#wait;100"
80000108-107 = "3;토키 모드 1;99;그렇습니까. 잘 되었군요."
80000108-108 = "3;토키 모드 1;01;그러면 우유를 내어 오겠습니다. 선생님."
80000108-109 = "3;토키 모드 1;03;제가 마지막까지, 구체적으로는 선생님께서 제 케이크를 전부 드셔 주실 때까지 보좌하겠습니다.\n#3;em;[반짝]"
80000108-110 = "#all;hide"
80000108-111 = "#na;(그렇게 대접받은 토키의 케이크에서는.)"
80000108-112 = "#na;(이런 표현이 맞을지는 모르겠지만, 마음을 편안하게 해 주는 풍미가 느껴졌다…….)"

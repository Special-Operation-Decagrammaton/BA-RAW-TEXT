[translation]
80000108-1 = "最好、最棒、最終極的……"
80000108-2 = "您好，老師。"
80000108-3 = "[s]「抱歉，季。等很久了嗎？」"
80000108-4 = "不會，能等到老師比什麼都重要。"
80000108-5 = "那麼老師，我們走吧。"
80000108-6 = "[s]「是要去季的辦公室……對吧？」"
80000108-7 = "是的，雖然也許是個您已經能感到熟悉的場所……"
80000108-8 = "出發吧，老師。我來護送您。"
80000108-13 = "歡迎您，老師。請來這裡。"
80000108-15 = "（將視線轉向季所指的方向，看到了一對乾淨的桌椅……）"
80000108-21 = "[ns]「季，我已經坐好了，話說今天是因為什麼事……？」"
80000108-22 = "是。那麼接下來……"
80000108-23 = "我將用專屬於老師的情人節巧克力來款待您。"
80000108-24 = "[s1]「啊，情人節！所以才會特意……」\n[s2]「約我出來嗎？」"
80000108-27 = "是的，正是如此。"
80000108-28 = "因為覺得不能草率度過這個日子，我經過深思熟慮，想出了回報老師的方式……"
80000108-29 = "那就是……"
80000108-30 = "[s]「那就是……？」"
80000108-31 = "最好、最棒、最終極的款待。"
80000108-32 = "……這樣會造成您的困擾嗎？"
80000108-33 = "[s]「不會不會，我反而覺得很高興。」"
80000108-34 = "原來如此，那真是太好了。"
80000108-35 = "那麼現在就開始吧。"
80000108-36 = "啊，這些巧克力都是從奇普托斯最知名的店鋪中挑選的精品，所以請不用擔心。"
80000108-38 = "第一道是經典的牛奶巧克力。#n濃郁的奶香與甜味將會喚醒味蕾。"
80000108-43 = "接下來是白巧克力。#n由於沒有添加可可膏和可可粉，脂肪的風味和糖的甜味將帶來獨特的口感。"
80000108-47 = "這次是高可可含量的黑巧克力。#n將能為您重整受甜味刺激的味蕾。"
80000108-52 = "如果您覺得口渴的話，我也準備了飲料。#n這是帶有蘭姆香味的可可，請依照您的喜好，添加旁邊的砂糖一起享用。"
80000108-56 = "這是添加水果的水果巧克力。#n能在剛才品嘗過的甜、苦、香味的基礎上，增添清新和新鮮的味道。"
80000108-60 = "[ns3]「剛開始還以為只是吃一些巧克力而已……」\n[ns4]「原來巧克力有那麼多種類啊……」"
80000108-63 = "覺得如何？合您的胃口嗎？"
80000108-64 = "不知道能不能讓您滿意。"
80000108-65 = "[s]「嗯，我已經很滿足了……」"
80000108-66 = "但是，我的款待還沒結束。"
80000108-67 = "[s5]「還有更厲害的嗎！？」\n[s6]「好……我做好覺悟了！儘管來吧！」"
80000108-70 = "不愧是您，這才是我的老師。"
80000108-71 = "既然如此，我飛鳥馬季也會全力以赴！"
80000108-76 = "[ns]「這是……！？」"
80000108-77 = "如您所見，這是我親手製作的巧克力蛋糕。#n這就是今天巧克力饗宴的壓軸。"
80000108-78 = "先前呈上的豪華饗宴，充其量只是這個蛋糕的陪襯而已。"
80000108-79 = "我會向您證明，即使與奇普托斯著名的甜點店相比，我的巧克力也絕對不會遜色。"
80000108-80 = "[s]「不，就算不那麼做，只要是季的巧克力就……」"
80000108-81 = "太天真了，簡直像剛出爐的生巧克力一樣。"
80000108-82 = "我聽說情人節是向心意相投的人，以巧克力表達心意的日子──請問是否正確呢？"
80000108-83 = "[s]「嗯，是這樣沒錯。」"
80000108-84 = "如果要送給特別的人，不就該以特別的方式來表達嗎？"
80000108-85 = "並且，如果要以特別的方式表達，不就應該不遺餘力，力求達到最終目標嗎！？"
80000108-86 = "[s]「某種意義上好像也沒說錯！」"
80000108-87 = "呼，不好意思，剛才似乎有點太激動了……真不像我。#n情人節果然是個不容小覷的強敵……那我接著說吧。"
80000108-88 = "今天之所以帶老師到我的辦公室，#n是因為這裡已經是我生活的一部分，是我竭盡所能的地方。"
80000108-89 = "因此我希望能在這裡，以最好的方式款待您。"
80000108-90 = "[s]「嗯……」"
80000108-91 = "同時我也想在這裡，親手將我嚴選出最好的巧克力送給您。"
80000108-92 = "巧克力的品質不必擔心。#n這是我參考網路上的評論，尤其是三一綜合學園和格黑娜美食研究會的意見後──"
80000108-93 = "挑選平均評分最高的地方，再經過親自品嚐後挑選出來的巧克力。"
80000108-97 = "那個……老師？#n您覺得我的巧克力饗宴有什麼不足之處，或者奇怪的地方嗎？"
80000108-98 = "[s]「我反而有點懷疑自己夠不夠格接受這種款待……」"
80000108-99 = "這樣啊……那真是太好了。"
80000108-100 = "但那些也不過是市售的商品，是其他人做的東西。#n雖然可以表達誠意，但無法表現到100%。"
80000108-101 = "那麼，我們繼續進行下一步吧。"
80000108-102 = "您問下一步是什麼？#n當然是讓老師品嚐我做的蛋糕。"
80000108-103 = "……難道您不想吃嗎？"
80000108-104 = "[s7]「怎，怎麼可能！」\n[s8]「聽你這麼說之後反而更期待了！嗯！」"
80000108-107 = "那我就放心了。"
80000108-108 = "我去倒杯牛奶，老師。"
80000108-109 = "直到最後，也就是老師將我的蛋糕全部吃完之前，我會全程從旁協助。"
80000108-111 = "（在那樣的款待之下，季的蛋糕吃起來……）"
80000108-112 = "（雖然不知道這樣表達適不適合，但莫名讓人有種心靈祥和的感覺）"

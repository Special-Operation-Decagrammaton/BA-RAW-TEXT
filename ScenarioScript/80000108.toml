[translation]
80000108-1 = "The Be-All, End-All"
80000108-2 = "Hello, Sensei."
80000108-3 = "[s] \"Sorry, Toki. Did I make you wait long?\""
80000108-4 = "Not at all. Besides, my reason for meeting isn't that important in the first place."
80000108-5 = "Shall we depart, Sensei?"
80000108-6 = "[s] \"So, to Toki's Office... Right?\""
80000108-7 = "Correct. I'm sure you've gotten used to the place by now."
80000108-8 = "Come, Sensei. I'll lead you."
80000108-13 = "Welcome, Sensei. You can take a seat over there."
80000108-15 = "When I turned to the direction Toki pointed, I noticed a neatly arranged table and chair..."
80000108-21 = "[ns] \"So, Toki, I've taken a seat. What brings us here today?\""
80000108-22 = "Very well, starting now..."
80000108-23 = "...I shall serve a Valentine's Day chocolate course just for you, Sensei."
80000108-24 = "[s1] \"Oh, it's Valentine's Day! Is that why....\"\n[s2] \"...you went all out like this?\""
80000108-27 = "Correct."
80000108-28 = "I figured I shouldn't waste a day like this. After much thought, it seemed the best way to repay you for all you've done for me, Sensei."
80000108-29 = "That is..."
80000108-30 = "[s] \"That is...?\""
80000108-31 = "The be-all, end-all of service."
80000108-32 = "...You don't mind that, do you?"
80000108-33 = "[s] \"Not at all. In fact, I'm very excited to see it.\""
80000108-34 = "I see. I'm glad to hear that."
80000108-35 = "Now then, let's begin."
80000108-36 = "Rest assured, I've selected the best chocolates from the best store in Kivotos. "
80000108-38 = "Our first course is a standard milk chocolate. The rich flavor of milk will mix well with the chocolate's sweetness, building up your appetite."
80000108-43 = "Next, we have white chocolate. It doesn't contain cacao mass or cacao powder, so you should be able to taste the distinct flavor combo of fat and sugar. "
80000108-47 = "This is dark chocolate, made with high cacao content. It should help cleanse your palette of all the previous chocolates."
80000108-52 = "I also prepared a drink for you. It's rum scented cocoa. I will grab you some extra sugar. Make it as sweet as you like."
80000108-56 = "Here we have fruit chocolate. It should add a refreshing alternative to our pool of sweet, bitter, and savory chocolates."
80000108-60 = "[ns3] \"At first, I thought I'd be getting a chocolate sampler...\"\n[ns4] \"But turns out there's a whole world of chocolates...\""
80000108-63 = "Were the chocolates to your taste?"
80000108-64 = "I wonder if they were enough to satisfy you."
80000108-65 = "[s] \"Very much so—\""
80000108-66 = "But my service is not complete."
80000108-67 = "[s5] \"There's even more?!\"\n[s6] \"All right... Whatever the next one is, my belly is ready!\""
80000108-70 = "As expected of Sensei."
80000108-71 = "I shall begin!"
80000108-76 = "[ns] \"This is—?!\""
80000108-77 = "My homemade chocolate cake. We will complete today's chocolate course with this."
80000108-78 = "Every single chocolate from earlier was a prelude to this delicacy."
80000108-79 = "I shall prove to you that my chocolate rivals even the most famous pastries in Kivotos."
80000108-80 = "[s] \"Toki, you don't have to go that far. Your chocolate is already—\""
80000108-81 = "Hush now. You're far too soft, Sensei. Softer than the ganache I made for this cake."
80000108-82 = "It is said that people use Valentine's Day to express their inner feelings. Do they not?"
80000108-83 = "[s] \"Yes. That is correct.\""
80000108-84 = "In that case, wouldn't it make sense that special chocolates for special people must be delivered in a special way?"
80000108-85 = "Furthermore, could you call the chocolate special if you did not give it your everything?! If you did not go beyond your absolute limits to craft it?!"
80000108-86 = "[s] \"That's a lot to take in, but you're not wrong!\""
80000108-87 = "Phew. Pardon me, I got a bit carried away. It must be because of the holiday spirit. Valentine's Day is a worthy foe and not to be underestimated. Shall we continue?"
80000108-88 = "I brought you here to my office because this was the place where I put in all my effort."
80000108-89 = "It seemed the perfect setting for today's service."
80000108-90 = "[s] \"S-Sure...\""
80000108-91 = "What better a stage to offer up my selection of exquisite chocolates?"
80000108-92 = "And I do mean exquisite. I used internet reviews from Trinity and the Gehenna Gourmet Research Society for reference."
80000108-93 = "Then I picked the place with the best average rating and made my choices after a thorough taste test."
80000108-97 = "Hey... Sensei? You don't think this whole chocolate course was bad or weird, do you?"
80000108-98 = "[s] \"No. I thought it was an honor actually...\""
80000108-99 = "Is that so? I'm glad."
80000108-100 = "But those were all commercial products. They may be able to express some of my gratitude, but not all of it."
80000108-101 = "Anyway, are you ready for the next part?"
80000108-102 = "Why are you confused? It's the part where you taste my homemade cake, Sensei!"
80000108-103 = "Or...is it a bit too much?"
80000108-104 = "[s7] \"I-I would love to!\"\n[s8] \"E-Especially after hearing all about how much work you put into it!\""
80000108-107 = "Is that so? That's good to hear."
80000108-108 = "Let me go get you some milk."
80000108-109 = "Sensei, I vow to serve you until the end. Or at the very least, until you finish my cake."
80000108-111 = "Although I'm not sure if \"serve\" was quite the right word to use..."
80000108-112 = "...Toki's sincerity gave me the peace of mind and strength of body to finish every last bite of her cake."

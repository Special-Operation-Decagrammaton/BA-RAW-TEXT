[translation]
80000108-1 = "สุดยอด สุดปัง ขั้นสุด..."
80000108-2 = "สวัสดีค่ะ คุณครู"
80000108-3 = "[s] \"ขอโทษนะโทคิ รอครูนานมั้ย?\""
80000108-4 = "ไม่ค่ะ การรอไม่ใช่เรื่องสำคัญมากเท่าไรสำหรับฉันอยู่แล้วค่ะ"
80000108-5 = "งั้นไปกันเลยไหมคะคุณครู?"
80000108-6 = "[s] \"หมายถึงไปสำนักงานของโทคิ... ใช่มั้ย?\""
80000108-7 = "ใช่ค่ะ บางทีอาจจะเป็นสถานที่ที่คุณครูคุ้นเคยแล้วด้วยก็ได้ค่ะ"
80000108-8 = "ไปกันเถอะค่ะคุณครู ฉันจะคุ้มกันให้เองค่ะ"
80000108-13 = "เชิญค่ะ คุณครู นั่งตรงนั้นได้เลยนะคะ"
80000108-15 = "(คุณครูมองตามนิ้วที่โทคิชี้ไป และที่ตรงนั้นคือโต๊ะและเก้าอี้ที่จัดไว้อย่างเป็นระเบียบเรียบร้อย...)"
80000108-21 = "[ns] \"ว่าแต่ โทคิ... วันนี้มีธุระอะไรกับครูเหรอ...?\""
80000108-22 = "ค่ะ ถ้าอย่างนั้นจากนี้ไป..."
80000108-23 = "ฉันจะเสิร์ฟคอร์สช็อกโกแลตวันวาเลนไทน์สำหรับคุณครูโดยเฉพาะค่ะ"
80000108-24 = "[s1] \"อ้อ วันวาเลนไทน์! เพราะแบบนี้ก็เลย...\"\n[s2] \"เตรียมอะไรให้ครูถึงขนาดนี้เลยเหรอ?\""
80000108-27 = "ใช่ค่ะ"
80000108-28 = "ฉันคิดว่าเราไม่ควรปล่อยวันแบบนี้ผ่านไปเฉยๆ ก็เลยไปคิดทบทวนว่าจะตอบแทนคุณครูอย่างไรได้บ้าง"
80000108-29 = "จนได้ข้อสรุปว่า..."
80000108-30 = "[s] \"ว่า...?\""
80000108-31 = "ฉันต้องเลี้ยงต้อนรับคุณครูแบบสุดยอด สุดปัง ขั้นสุดค่ะ"
80000108-32 = "แบบนี้จะทำให้คุณครูเดือดร้อนไหมคะ?"
80000108-33 = "[s] \"ไม่หรอก ครูดีใจมากกว่า\""
80000108-34 = "อย่างนั้นเหรอคะ ถ้าอย่างนั้นก็ค่อยยังชั่วหน่อยค่ะ "
80000108-35 = "ถ้าอย่างนั้นฉันจะเริ่มเลยนะคะ! "
80000108-36 = "อ้อ ไม่ต้องห่วงเรื่องช็อกโกแลตนะคะ ช็อกโกแลตทั้งหมดเป็นสินค้าพิเศษจากร้านที่มีชื่อเสียงที่สุดใน#nคิโวทอสค่ะ ฉันสั่งให้ส่งมาทางอากาศโดยเฉพาะเลยค่ะ "
80000108-38 = "คอร์สแรกคือมิลก์ช็อกโกแลตแบบพื้นฐานค่ะ รสชาติของนมที่ผสมผสานกับรสหวานจะช่วยเพิ่มความ#nอยากอาหารของเราค่ะ"
80000108-43 = "ต่อไปเป็นไวท์ช็อกโกแลตค่ะ ไวท์ช็อกโกแลตไม่มีส่วนผสมของโกโก้แมสกับผงโกโก้ เราเลยจะได้ลิ้มรสหวานของน้ำตาลและรสของไขมันได้อีกแบบค่ะ "
80000108-47 = "ส่วนนี่คือดาร์กช็อกโกแลตที่มีโกโก้เป็นส่วนประกอบในปริมาณมากค่ะ คอร์สที่ผ่านมาเป็นช็อกโกแลต#nรสหวานเสียส่วนใหญ่ อันนี้ก็เลยเป็นการล้างปากได้อย่างดีเลยค่ะ"
80000108-52 = "คุณครูน่าจะคอแห้ง ฉันเลยเตรียมเครื่องดื่มไว้ให้ด้วยค่ะ นี่คือโกโก้ที่ปรุงรสด้วยเหล้ารัมค่ะ ฉันจะวางน้ำตาลไว้ให้บนโต๊ะนะคะ คุณครูเติมน้ำตาลได้ตามชอบเลยค่ะ"
80000108-56 = "คอร์สต่อไปคือฟรุตช็อกโกแลตที่มีส่วนประกอบของผลไม้ค่ะ นี่คือการเพิ่มความสดชื่นลงไปในรสหวาน รสขม และรสกลมกล่อมที่ได้ลิ้มรสไปเมื่อก่อนหน้าค่ะ"
80000108-60 = "[ns3] \"ตอนแรกครูคิดว่าจะได้ชิมช็อกโกแลตที่รู้จักแค่นิดหน่อย...\"\n[ns4] \"ช็อกโกแลตนี่มีมากมายหลายแบบเลยนะ...\""
80000108-63 = "เป็นยังไงบ้างคะ? ถูกปากคุณครูไหมคะ?"
80000108-64 = "ฉันไม่รู้ว่านี่จะทำให้คุณครูพึงพอใจหรือเปล่าค่ะ"
80000108-65 = "[s] \"อืม แค่นี้ครูก็พึงพอใจมากแล้วละ...\""
80000108-66 = "แต่ว่าการเลี้ยงต้อนรับของฉันยังไม่จบแค่นี้นะคะ"
80000108-67 = "[s5] \"มีอะไรที่มากกว่านี้อีกเหรอ?!\"\n[s6] \"ดีละ... ครูพร้อมแล้ว! เอาเข้ามาเลย!\""
80000108-70 = "ต้องแบบนี้สิคะคุณครูของฉัน"
80000108-71 = "ถ้าอย่างนั้น ฉัน อะซุมะ โทคิ จะยกมาเสิร์ฟเดี๋ยวนี้ค่ะ!"
80000108-76 = "[ns] \"นี่มัน...?!\""
80000108-77 = "เค้กช็อกโกแลตที่ฉันทำขึ้นมาเองค่ะ เป็นเมนูปิดท้ายคอร์สช็อกโกแลตในวันนี้ค่ะ"
80000108-78 = "คอร์สที่ฉันให้คุณครูได้ลิ้มลองทั้งหมดเมื่อสักครู่คือด่านหน้าสำหรับเค้กนี้"
80000108-79 = "ฉันจะพิสูจน์ให้เห็นว่าถ้าเทียบกับร้านขนมชื่อดังในคิโวทอสแล้ว ช็อกโกแลตของฉันไม่ด้อยกว่า#nอย่างแน่นอนค่ะ"
80000108-80 = "[s] \"ไม่หรอก แค่เป็นช็อกโกแลตจากโทคิก็เพียงพอแล้ว...\""
80000108-81 = "ตัวอ่อนยวบหมดแล้วค่ะ ฉันอ่อนยวบเหมือนช็อกโกแลตกานาชที่เพิ่งทำใหม่ๆ เลยค่ะ"
80000108-82 = "ฉันได้ยินมาว่าวันวาเลนไทน์คือวันที่เราใช้ช็อกโกแลตในการแสดงความรู้สึกให้กับคนที่เรารู้สึกพิเศษ#nด้วยค่ะ มันจริงไหมคะคุณครู?"
80000108-83 = "[s] \"อื้ม จริงแท้แน่นอนเลยละ\""
80000108-84 = "งั้นถ้าเป็นช็อกโกแลตที่มอบให้กับคนที่เรารู้สึกพิเศษด้วย ก็ต้องมอบให้ด้วยวิธีการพิเศษๆ ที่เหมาะกับ#nคนคนนั้นว่าไหมคะ?"
80000108-85 = "และเพื่อจะส่งต่อความรู้สึกนั้นด้วยวิธีที่พิเศษ เราก็เลยต้องทุ่มเททุกอย่างที่มีเพื่อให้บรรลุเป้าหมาย#nใช่ไหมล่ะคะ?!"
80000108-86 = "[s] \"จะว่าไปมันก็ถูกต้องอยู่หรอกนะ!\""
80000108-87 = "ฮุฮุ แย่แล้วละ ตอนนี้ฉันรู้สึกตื่นเต้นจนเหมือนไม่เป็นตัวเองเลยค่ะ วันวาเลนไทน์เป็นคู่ต่อสู้ที่แข็งแกร่ง#nจังค่ะ เอาละ ฉันจะพูดเรื่องของเราต่อนะคะ"
80000108-88 = "เหตุผลที่พาคุณครูมาที่สำนักงานก็เพราะว่าสำนักงานแห่งนี้เป็นหนึ่งในสถานที่ที่ฉันใช้ชีวิตอยู่ทุกวันนี้#nน่ะค่ะ"
80000108-89 = "ฉันอยากเลี้ยงต้อนรับคุณครูอย่างพิเศษสุดที่นี่น่ะค่ะ"
80000108-90 = "[s] \"อะ... อื้ม\""
80000108-91 = "และฉันก็อยากใช้ที่แห่งนี้ในการมอบช็อกโกแลตที่ดีที่สุดที่ฉันเลือกมาให้คุณครูด้วย "
80000108-92 = "คุณครูไม่ต้องห่วงเรื่องคุณภาพของช็อกโกแลตนะคะ ฉันไปหาข้อมูลอ้างอิงจากรีวิวในอินเทอร์เน็ต โดยเฉพาะรีวิวของชมรมชิมอาหารเกเฮนน่ากับโรงเรียนสามัญทรีนิตี้มาด้วย"
80000108-93 = "จากนั้นฉันก็เลือกร้านที่ได้คะแนนเฉลี่ยสูงสุด แล้วก็ลองไปชิมเองแล้วค่อยเลือกมาค่ะ"
80000108-97 = "คือ... คุณครูคะ? คุณครูว่าคอร์สช็อกโกแลตของฉันมีข้อบกพร่องหรือมีส่วนไหนที่แปลกบ้างไหมคะ?"
80000108-98 = "[s] \"ครูคิดว่าตัวเองสมควรได้รับการเลี้ยงต้อนรับขนาดนี้เลยเหรอมากกว่า...\""
80000108-99 = "อย่างนั้นเหรอคะ? ถ้างั้นก็ค่อยยังชั่วหน่อยนะคะ "
80000108-100 = "แต่ยังไงมันก็เป็นของสำเร็จรูปที่คนอื่นทำขึ้นมา ถึงจะใส่ความจริงใจของฉันลงไปได้ แต่ก็ใส่ได้ไม่ถึง 100% อย่างที่ตั้งใจค่ะ"
80000108-101 = "ถ้าอย่างนั้นฉันจะไปที่ขั้นตอนต่อไปนะคะ"
80000108-102 = "ขั้นตอนต่อไปคืออะไรน่ะเหรอคะ? แน่นอนว่าต้องเป็นการให้คุณครูชิมเค้กของฉันน่ะค่ะ"
80000108-103 = "หรือว่า... ครูไม่อยากชิมหรือเปล่าคะ?"
80000108-104 = "[s7] \"มะ... ไม่มีทางหรอก!\"\n[s8] \"พอได้ยินแบบนั้น ครูยิ่งคาดหวังกว่าเดิมอีกนะ!\""
80000108-107 = "อย่างนั้นเหรอคะ? งั้นก็ดีเลยค่ะ "
80000108-108 = "ถ้าอย่างนั้นฉันจะไปเอานมมาให้นะคะ คุณครู"
80000108-109 = "ฉันจะอยู่เป็นผู้ช่วยจนกว่าคุณครูจะรับประทานเค้กของฉันหมดเลยค่ะ"
80000108-111 = "(คุณครูได้ลิ้มรสเค้กที่โทคิทำมาให้)"
80000108-112 = "(และรู้สึกได้ถึงรสชาติที่ทำให้จิตใจผ่อนคลาย...)"

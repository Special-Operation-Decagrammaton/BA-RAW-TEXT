[translation]
80000015-1 = "ของว่างที่เน้นความคุ้มค่า"
80000015-2 = "อาคารเรียนหลัก มิลเลเนียม"
80000015-4 = "(คุณครูเห็นเอมิกำลังกินอะไรบางอย่างอยู่คนเดียวในสนามมิลเลเนียม)"
80000015-5 = "[s] \"หวัดดี เอมิ\""
80000015-6 = "อ๊ะ สวัสดี คุณครู"
80000015-7 = "บังเอิญจัง... ฉันเองก็เพิ่งกลับมาจากทำภารกิจน่ะ"
80000015-8 = "[s] \"กินอะไรอยู่เหรอ?\""
80000015-9 = "ช็อกโกแลตน่ะ"
80000015-10 = "ตอนทำภารกิจต้องใช้พลังงานไปเยอะมาก หลังทำภารกิจเสร็จการกินช็อกโกแลตที่มีส่วนผสม#nของน้ำตาลมันจะส่งผลดีต่อร่างกายน่ะ"
80000015-16 = "คุณครูจะกินสักชิ้นไหม?"
80000015-22 = "[ns] \"ทำไมช็อกโกแลตอันนี้...\""
80000015-23 = "ทำไมเหรอ? มีอะไรรึเปล่า?"
80000015-24 = "พอมาลองนึกๆ ดูแล้ว พวกนักเรียนที่ชอบของหวานๆ ก็ไม่ยอมกินช็อกโกแลตนี่เหมือนกัน..."
80000015-25 = "ทำไมกันนะ? ตอนไปที่ร้านก็มีแค่ช็อกโกแลตอันนี้ที่ลดราคาเยอะเป็นพิเศษด้วยล่ะ"
80000015-26 = "[s] \"ก็รูปร่างแบบนั้น มันเอ่อ...\""
80000015-27 = "หืม? ช็อกโกแลตก็มีไว้กินนี่นา รูปร่างของมันมีปัญหาอะไรเหรอ?"
80000015-28 = "ไม่ว่าช็อกโกแลตจะเป็นรูปอะไร ส่วนผสมมันก็เหมือนกันนั่นละ"
80000015-29 = "แต่ถ้าซื้อได้ถูกกว่าในปริมาณที่เท่ากัน มันก็เป็นทางเลือกที่มีประสิทธิภาพมากกว่านะ"
80000015-30 = "เอ้า คุณครู ฉันซื้อช็อกโกแลตมาเยอะเลย เพราะงั้นเดี๋ยวแบ่งให้คุณครูด้วยแล้วกัน"
80000015-32 = "(หลังจากรับช็อกโกแลตมาจากเอมิ ระหว่างทางที่กลับไปที่ชาเล่ต์ก็ถูกกลุ่มนักเรียนของวัลคิรี่#nเข้าใจผิดและต้องตอบคำถามมากมายอยู่พักใหญ่...)"

[translation]
80000015-1 = "效率主義者的零食"
80000015-2 = "千年科學學園"
80000015-4 = "（在千年校內看見了正獨自吃著什麼東西的英美）"
80000015-5 = "[s]「你好呀，英美。」"
80000015-6 = "啊，老師你好。"
80000015-7 = "我正好在完成任務回來的路上……真巧呢。"
80000015-8 = "[s]「你在吃什麼呢？」"
80000015-9 = "巧克力。"
80000015-10 = "任務中會消耗掉很多熱量……所以在任務結束後吃含糖量高的巧克力很有效率。"
80000015-16 = "老師要不要也吃一個？"
80000015-22 = "[ns]「這個巧克力怎麼……？」"
80000015-23 = "怎麼了？"
80000015-24 = "這麼說來，就算是喜歡甜食的學生，不知為何好像也會避開這款巧克力呢……"
80000015-25 = "或許是這個原因，每次去店裡時都只有這款巧克力明明折扣很高卻還剩一堆……"
80000015-26 = "[s]「那個，造型有點……」"
80000015-27 = "明明是拿來吃的巧克力，造型會是問題嗎？"
80000015-28 = "不管被做成什麼造型，裡面的成分幾乎都一樣唷。"
80000015-29 = "不如說因為打折的關係，選擇這個反而更有效率。"
80000015-30 = "來，老師。這個巧克力我買了很多，也分老師一點吧。"
80000015-32 = "（之後在拿著英美給的巧克力返回夏萊的途中，#n　被女武神的學生誤會而受到了質問……）"

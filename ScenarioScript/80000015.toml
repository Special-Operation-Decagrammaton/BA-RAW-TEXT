[translation]
80000015-1 = "#title;효율주의자의 간식"
80000015-2 = "#place;밀레니엄 교사 안"
80000015-3 = "5;에이미;01\n#5;a"
80000015-4 = "#na;(밀레니엄의 교내에서 혼자 무언가를 먹고 있는 에이미를 보았다.)"
80000015-5 = "[s] \"안녕, 에이미.\""
80000015-6 = "5;에이미;02;아, 안녕. 선생님.\n#5;em;[반응]"
80000015-7 = "5;에이미;01;마침 임무를 마치고 돌아오는 길이었는데…… 우연이네.\n#5;m3"
80000015-8 = "[s] \"무얼 먹고 있는 거야?\""
80000015-9 = "5;에이미;03;초콜릿.\n#5;greeting\n#5;em;[하트]"
80000015-10 = "5;에이미;03;임무 중에는 여러모로 열량을 많이 소모하게 되니까…… 임무가 끝난 뒤에는 당분이 잔뜩 들어간 초콜릿을 먹는 게 효율적이야."
80000015-11 = "#st;[0,0];instant;1;"
80000015-12 = "#clearST"
80000015-13 = "5;에이미;03\n#5;d\n#wait;1000"
80000015-14 = "#wait;500"
80000015-15 = "#wait;500"
80000015-16 = "3;에이미;01;선생님도 하나 먹을래?\n#3;closeup\n#3;a"
80000015-17 = "3;에이미;01;\n#3;closeup\n#3;greeting\n#wait;1500"
80000015-18 = "#st;[0,0];instant;1;"
80000015-19 = "#clearST"
80000015-20 = "#all;hide"
80000015-21 = "#wait;2500"
80000015-22 = "[ns] \"이 초콜릿은 도대체……?\""
80000015-23 = "3;에이미;02;왜? 무슨 문제라도 있어?\n#3;em;[?]\n#3;a"
80000015-24 = "3;에이미;02;그러고 보니 단 음식을 좋아하는 학생들도 어째서인지 이 초콜릿만큼은 꺼리던데…….\n#3;stiff"
80000015-25 = "3;에이미;03;그래서일까, 매점에 가보니 이 초콜릿만 특별 할인가로 잔뜩 쌓여 있더라고.\n#3;em;[반짝]"
80000015-26 = "[s] \"그게 모양이 조금…….\""
80000015-27 = "3;에이미;04;응? 초콜릿을 먹는데 모양이 무슨 문제라도 되는 거야?\n#3;em;[반응]"
80000015-28 = "3;에이미;05;초콜릿을 어떤 모양으로 조각하든 그 안에 들어 있는 성분은 똑같아."
80000015-29 = "3;에이미;01;오히려 같은 양을 더 저렴한 가격에 구입할 수 있다면, 그게 더 효율적인 선택이지."
80000015-30 = "3;에이미;03;자, 선생님. 이 초콜릿은 먹고 남을 만큼 충분히 구매했으니 선생님에게도 조금 나누어 줄게.\n#3;greeting\n#3;em;[하트]"
80000015-31 = "#all;hide"
80000015-32 = "#na;(이후, 에이미가 준 초콜릿을 들고 샬레로 돌아가다 발키리의 학생으로부터 오해를 사 한동안 질문 공세에 시달렸다…….)"

[translation]
51180-1 = "ตอนที่ 18;ปีศาจเดินขบวน 2"
51180-4 = "ข้าก็แค่... อยากกลับไปก็เท่านั้นเจ้าค่ะ..."
51180-5 = "ข้าก็แค่! อยากกลับไปตอนที่ทุกคนอยู่ด้วยกันก็เท่านั้น...!"
51180-8 = "ต่อให้พูดเพื่อคนอื่น แต่ถ้าไม่ใช่คำพูดจากใจ..."
51180-9 = "ก็จะมีแต่สร้างบาดแผลให้กันและกันเท่านั้น"
51180-10 = "...ต่อให้พูดแบบนั้นเพื่อยูคาริก็เถอะ"
51180-11 = "แต่สุดท้ายแล้ว คนที่เป็นทุกข์ที่สุด..."
51180-17 = "รุ่นพี่นางุสะ..."
51180-18 = "ทำไมตอนนั้นถึงได้..."
51180-22 = "หืม? ใครน่ะ...?"
51180-29 = "คิเคียว ไม่ได้เจอกันนานเลย"
51180-30 = "รุ่นพี่นางุสะ...?!"
51180-31 = "ไปอยู่ที่ไหนมา ทำไมถึงมาเอาป่านนี้...!"
51180-32 = "ไม่สิ เรื่องนั้นช่างมันเถอะ กลับมาก็ดีแล้วละ รุ่นพี่"
51180-33 = "สถานการณ์ในเฮียกกะเรียวรันตอนนี้น่ะ หลังจากที่หัวหน้าอายาเมะกับรุ่นพี่นางุสะหายตัวไป สมาชิกของเราก็ทยอยออกไปทีละคนสองคน"
51180-34 = "ขืนเป็นแบบนี้ไปเรื่อยๆ เฮียกกะเรียวรันอาจจะต้องถูกยุบก็ได้ ตอนนี้ยังไม่สายนะ ถ้ารุ่นพี่ออกหน้าไปคุยให้ละก็ ทุกคนต้อง...!"
51180-40 = "นี่ คิเคียว รับนี่ไปสิ"
51180-41 = "นี่มัน... <สิทธิ์> ของหัวหน้าเฮียกกะเรียวรัน...? ให้ฉันทำไม?"
51180-46 = "คิเคียว เธอน่ะเก่งมากนะ สมาชิกของเราเชื่อฟังเธอในฐานะที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน"
51180-47 = "...แถมไม่ใช่กับแค่สมาชิกด้วย ฉันเองก็เหมือนกัน"
51180-48 = "ฉันไปทบทวนมาแล้วน่ะ เธอคู่ควรกับตำแหน่งหัวหน้าเฮียกกะเรียวรันมากกว่าฉัน"
51180-49 = "เพราะงั้น... ฉันเลยจะ <คืน> สิทธิ์นี้"
51180-55 = "คิเคียว เธอรับหน้าที่นี้เถอะนะ"
51180-60 = "นี่คือคำตอบของคุณ... ที่กลับมาหลังจากหายตัวไปครึ่งปีเหรอ?"
51180-62 = "ใช่"
51180-63 = "ทำไมล่ะ...? ทำไมกัน?"
51180-68 = "...เพราะฉันไม่ใช่อายาเมะ"
51180-69 = "ฉันเป็นตัวแทนของอายาเมะไม่ได้"
51180-75 = "มันน่าโมโหมาก"
51180-76 = "มันไม่ใช่เพราะมาคืนสิทธิ์และคิดจะหนี"
51180-81 = "คุณเป็นคนที่พวกเรานับถือ"
51180-82 = "พวกเราชื่นชมความเป็นผู้นำของคุณ"
51180-83 = "แต่ว่า"
51180-85 = "เรื่องหัวหน้าอายาเมะน่ะ"
51180-86 = "พวกเราไม่เคย... ไม่เคยเลยแม้แต่ครั้งเดียว..."
51180-87 = "ที่จะคิดว่า... อยากให้คุณมาเป็นตัวแทน..."
51180-92 = "ฉันเลือกผิดเหรอ?"
51180-94 = "แล้วจะให้... ฉันทำยังไง..."
51180-99 = "เรื่องวุ่นวายที่เกิดบนท้องถนนตอนนี้..."
51180-105 = "(เกิดเพลิงไหม้ไปทั่วถนน สถานการณ์อยู่ในความสับสนวุ่นวาย)"
51180-115 = "วะ... ว้ากกกกกก?!"
51180-116 = "ชะ... ช่วยด้วยครับ! ปะ... ปีศาจ...!"
51180-124 = "ฮู่ว... เป็นยังไงบ้าง?"
51180-127 = "[ns] \"เราเคลียร์พื้นที่ทางนั้นไว้ให้แล้ว อพยพคนไปที่นั่นเลย!\""
51180-128 = "คะ... ครับ! ขะ... ขอบคุณครับ!"
51180-135 = "ขืนเป็นแบบนี้คงไม่จบไม่สิ้นแน่"
51180-136 = "[s] \"เรามาหากันก่อนเถอะว่ามีใครยังติดอยู่ทางนี้อีกบ้าง\""
51180-137 = "ว่าไงนะ? สถานการณ์เป็นแบบนี้แต่จะไม่หนี แถมยังจะไปช่วยคนอื่นอีกงั้นเหรอ?"
51180-138 = "คุณครูจากชาเล่ต์... นี่คือ... ใจจริงของคุณเหรอ?"
51180-139 = "คุณเองก็รู้ไม่ใช่เหรอว่าเหตุการณ์ที่เกิดขึ้นตอนนี้มันไม่ใช่เรื่องปกติ"
51180-140 = "ในเวลาแบบนี้ การหนีไปเงียบๆ คือวิธีที่ถูกต้องไม่ใช่เหรอ? แล้วทำไมถึง..."
51180-141 = "[s] \"ทุกคนตกอยู่ในอันตรายนะ\""
51180-142 = "...แล้วมันเกี่ยวอะไรด้วย ไม่ว่าจะเกิดอะไรขึ้นที่นี่ แต่สำหรับคุณแล้ว คนที่นี่ก็คือคนอื่น"
51180-143 = "คุณต้องให้ความสำคัญกับตัวเองเป็นคนแรกสิ... ของแบบนี้มันแน่อยู่แล้วไม่ใช่เหรอ?"
51180-144 = "แต่ทำไมคุณถึงพูดแบบนั้นออกมาได้โดยที่ไม่ลังเลอะไรเลย..."
51180-145 = "[s1] \"ไม่ใช่คนอื่นนะ มีนักเรียนของครูด้วย\"\n[s2] \"คนของเฮียกคิยาโคก็เป็นคนรู้จักของครู\""
51180-149 = "[ns3] \"ไม่สิ ต่อให้บอกว่าเป็นคนอื่น\"\n[ns4] \"แต่ถ้าตกอยู่ในอันตราย ก็ปล่อยไว้ไม่ได้\""
51180-152 = "ต่อให้พ่นอะไรออกมาง่ายๆ ด้วยท่าทีจอมปลอมแบบนั้นก็ไม่มีประโยชน์หรอก...!"
51180-153 = "[ns] \"แต่ตอนนี้นางุสะเองก็มุ่งไปข้างหน้ามากกว่าคิดที่จะหนีไม่ใช่เหรอ?\""
51180-157 = "[ns] \"นางุสะเองก็ปล่อยไปไม่ได้ใช่มั้ย? ครูก็แค่ทำเหมือนกันกับเธอก็เท่านั้นเอง\""
51180-158 = "......!!"
51180-159 = "เรื่องนั้น..."
51180-160 = "ฉันก็แค่..."
51180-161 = "[s5] \"นางุสะ บอกสาเหตุของความวุ่นวายนี้มาเถอะ\"\n[s6] \"รู้ใช่มั้ยว่าเจ้าพวกนั้นคืออะไร?\""
51180-164 = "...จะเซ้าซี้ให้ได้จนถึงที่สุด อย่างนั้นสินะ"
51180-165 = "......"
51180-172 = "ชื่อของพวกนั้นก็คือ <ซึคุโมะคามิ>"
51180-173 = "กาลครั้งหนึ่งนานมาแล้ว มีเรื่องเล่าว่าเฮียกกะเรียวรันกำจัดพวกนี้ได้ นี่เป็นส่วนหนึ่งของเรื่องลึกลับ และข่าวลือที่เล่าสืบต่อกันมา"
51180-174 = "โดยสรุปแล้ว... มันเป็นหนึ่งใน <เรื่องลี้ลับ> ที่ส่งต่อกันในยามอัสดง"
51180-175 = "[s] \"...เรื่องลี้ลับ?\""
51180-179 = "ทั้งเรื่องลี้ลับในสังคมชนบท เรื่องลี้ลับที่ไม่มีมูล เรื่องลี้ลับที่ส่งต่อกันปากต่อปาก และถ้าจะให้อธิบาย#nให้ได้อารมณ์มากขึ้น ก็ต้องบอกว่าเป็น..."
51180-182 = "ตำนานร้อยเรื่องราวที่เล่าขานกันมาตั้งแต่สมัยโบราณ"
51180-183 = "ว่ากันว่าพวกนั้นเป็น <ชมรมคนพาลที่ไม่ยอมรับความเป็นสหพันธ์ของเฮียกคิยาโค> แล้วก็เป็น <สารพัดผีที่หลอกผู้คนด้วยเรื่องลึกลับ> ด้วย... ไม่รู้จะเชื่อได้หรือเปล่านะ~"
51180-186 = "แต่ที่น่าแปลกก็คือ..."
51180-187 = "ทำไมพวกนั้นถึงมาปรากฏตัวที่นี่ได้?"
51180-188 = "พวกนั้นไม่น่าจะมาแสดงตัวในที่แบบนี้สิ ทำไมถึง..."
51180-189 = "[s] \"หรือเป็นเพราะชมรมความงามของธรรมชาติ...?\""
51180-193 = "ครูจากชาเล่ต์ ทำไมคุณถึงรู้จักชื่อนั้น...!"
51180-199 = "ข้างหลัง...!!"
51180-205 = "ว้ากกก! หยุดก่อน! หยุดก่อน! ใจร้อนชะมัดเลย! ฉันไม่ใช่ปีศาจนะ รอกันหน่อยสิ!"
51180-206 = "เสียงนี้มัน..."
51180-215 = "อ๊ะ! คุณครูนี่นา!"
51180-216 = "คุณครู!? เป็นอะไรหรือเปล่าคะ...?!"
51180-217 = "[s] \"ครูไม่เป็นไร... พวกเธอบาดเจ็บตรงไหนรึเปล่า?!\""
51180-219 = "พวกเราก็ไม่เป็นไร"
51180-220 = "แต่ว่า..."
51180-222 = "คุณครู!?"
51180-223 = "วันนี้ฉันเจออะไรแปลกๆ ที่ถนน... ฉันทั้งสู้กับมัน หนีมัน... แล้วก็หกล้มด้วย!"
51180-224 = "แง๊! ตัวอะไรก็ไม่รู้!"
51180-226 = "ไม่เป็นไรนะคะ คาเอเดะจัง พวกเราอยู่พร้อมหน้ากันตรงนี้ ไม่มีอะไรให้ต้องกลัวหรอกค่ะ!"
51180-227 = "ฮือ... รุ่นพี่มิโมริ...!"
51180-228 = "[s] \"โล่งอกไปทีที่ไม่มีใครบาดเจ็บนะ แล้วก็ชมรมฝึกฝนด้วย...\""
51180-236 = "รุ่นพี่นางุสะ อยู่ตรงนี้นี่เอง"
51180-237 = "เรนเกะ..."
51180-238 = "ฉันมีอะไรตั้งหลายอย่างที่อยากจะบอกและต่อว่ารุ่นพี่..."
51180-239 = "แต่ว่าตอนนี้...!"
51180-251 = "เราต้องจัดการพวกปีศาจที่มาก่อความวุ่นวายบนท้องถนนก่อน!"
51180-252 = "วุ่นวายอย่างที่เห็นเลย รุ่นพี่นางุสะก็จะมาช่วยอีกแรงใช่มั้ย?!"
51180-257 = "ฉัน..."
51180-263 = "สัตว์ประหลาดนี่..."
51180-264 = "เสียงร้องลากยาวแบบนี้... อย่าบอกนะว่า..."
51180-269 = "(ถนนลุกเป็นไฟ)"
51180-270 = "(เสียงร้องของผีที่ลากยาวและก้องกังวานดังขึ้น)"
51180-276 = "การที่ชมรมความงามของธรรมชาติมาที่นี่ หรือว่า..."
51180-278 = "ไม่ได้จบที่ซึคุโมะคามิเหรอ...?"
51180-280 = "เราต้องหนี"
51180-281 = "ว่าไงนะ?! เดี๋ยวก่อนสิ รุ่นพี่นางุสะ! ว่าไงนะ? พูดอะไรออกมา..."
51180-282 = "มาถึงที่นี่แล้ว แต่รุ่นพี่ก็ยังจะ... หนีไปอีกงั้นเหรอ?!"
51180-283 = "[s] \"เดี๋ยวก่อน เรนเกะ ใจเย็นก่อนนะ...\""
51180-284 = "นี่มันเรื่องที่ฉันควรใจเย็นเหรอ?! ก็คนคนนั้นกำลังจะ...!"
51180-285 = "ถ้าเป็นซึคุโมะคามิ... ก็ไม่เป็นไรหรอก ถ้าแค่นั้นละก็นะ..."
51180-290 = "พวกนั้นเป็นเพียงแค่ส่วนหนึ่งของตำนานร้อยเรื่องราว... เหมือนส่วนที่เกิดขึ้นเมื่อข่าวลือแพร่กระจาย#nออกไป"
51180-291 = "แต่ว่าถ้า <สิ่งนั้น> ปรากฏตัวขึ้นมาจริงๆ..."
51180-292 = "ถ้าตอนจบของเรื่อง... เป็นเรื่องน่ากลัวเกินกว่าเรื่องเล่าลือ... สิ่งที่จะปรากฏตัวต่อไปก็จะเป็น..."
51180-302 = "นั่นมัน... อะไรน่ะ?"
51180-303 = "แมวเหรอ...?"
51180-304 = "ว่าไงนะ?! มีแมวที่ตัวใหญ่ขนาดนั้นด้วยเหรอ?!"
51180-306 = "นั่นมัน..."
51180-307 = "ตำนานร้อยเรื่องราววิญญาณลี้ลับ... มาปรากฏตัวที่นี่เหรอ..."
51180-308 = "แบบนี้คงทำอะไรไม่ได้แล้ว ตำนานร้อยเรื่องราวกลายเป็นเรื่องผีไปแล้ว..."
51180-309 = "ถ้าไม่ใช่อายาเมะ ก็ไม่มีทาง..."
51180-314 = "[ns] \"ทุกคนระวังตัว! มันจะเข้ามาแล้ว...!\""

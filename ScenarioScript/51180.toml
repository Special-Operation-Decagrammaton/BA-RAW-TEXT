[translation]
51180-1 = "第18話;漫步街道的怪談（２）"
51180-4 = "我只是……想回到過去而已……"
51180-5 = "小女子只是！想回到大家在一起的那個時候……！"
51180-8 = "「以為別人好的理由說出違心之論……"
51180-9 = "只會傷害彼此而已哦……」──#n你是這麼說的吧……"
51180-10 = "……就算是為了紫而說出那種話。"
51180-11 = "到頭來最痛苦的人……"
51180-17 = "名草前輩……"
51180-18 = "為什麼當時你會……"
51180-22 = "嗯？是誰……？"
51180-29 = "桔梗，好久不見。"
51180-30 = "名草前輩……！？"
51180-31 = "這段時間你到底在哪裡，怎麼現在才……！"
51180-32 = "不，已經無所謂了。#n你回來得正好，前輩。"
51180-33 = "現在百花繚亂的情況很不像話。#n自從菖蒲委員長和名草前輩消失之後，成員們也接連離開了。"
51180-34 = "再這樣下去，說不定百花繚亂真的會被廢部。#n現在還不算太遲，如果前輩願意出面談談，大家……！"
51180-40 = "來，桔梗，這個給你。"
51180-41 = "百花繚亂委員長的「象徵」……？為什麼要給我？"
51180-46 = "桔梗，你很優秀。#n身為百花繚亂的作戰參謀，有很多學生都跟隨著你。"
51180-47 = "……不只是其他一般成員，連我也是。"
51180-48 = "所以我想過了。#n和我相比……你更適合擔任百花繚亂的委員長。"
51180-49 = "所以……我要「歸還」這個象徵。"
51180-55 = "桔梗，希望你能收下。"
51180-60 = "這就是你消失半年之後的……答案嗎？"
51180-62 = "沒錯。"
51180-63 = "為什麼……？到底為什麼？"
51180-68 = "……因為我不是菖蒲。"
51180-69 = "我沒辦法代替菖蒲。"
51180-75 = "真令人生氣。"
51180-76 = "不是因為你想歸還象徵後逃跑。"
51180-81 = "你曾是我們的憧憬。"
51180-82 = "我們喜歡你走在前方的樣子。"
51180-83 = "但是……"
51180-85 = "菖蒲委員長的事，不管怎樣都無所謂。"
51180-86 = "我們……從來沒有認為你是委員長的替代品…… "
51180-87 = "也從來……不希望你成為委員長的替代品。"
51180-92 = "我的選擇是錯的嗎？"
51180-94 = "……究竟該怎麼辦才好？"
51180-99 = "……街上有騷動。"
51180-105 = "（街上四處都是熊熊燃燒的火焰，已經混亂不堪）"
51180-115 = "嗚，嗚哇啊啊！？"
51180-116 = "救，救命啊！有，有怪物……！"
51180-124 = "呼……沒事吧？"
51180-127 = "[ns]「我們過來的方向已經清理過了。先到那裡躲一下吧！」"
51180-128 = "是，是！謝，謝謝你們！"
51180-135 = "……真是沒完沒了。"
51180-136 = "[s]「先找找有沒有來不及避難的人吧。」"
51180-137 = "什麼？這種情況居然不選擇逃跑，而是去裡面救人？"
51180-138 = "夏萊的老師……你是認真的嗎？"
51180-139 = "你應該也很清楚，現在發生的事非比尋常。"
51180-140 = "這種時候乖乖逃跑才是正確的選擇吧？為什麼要這麼做？"
51180-141 = "[s]「因為大家都有危險。」"
51180-142 = "……那也無所謂吧。#n不管這裡發生什麼事，那些都是與你無關的他人。"
51180-143 = "總是要以自己為優先……不是嗎？#n這是理所當然的。"
51180-144 = "為什麼你能夠毫不猶豫地說出那種……"
51180-145 = "[s1]「包含學生在內，大家都不是他人。」\n[s2]「因為百鬼夜行的學生都是認識已久的人。」"
51180-149 = "[ns3]「不，就算只是他人……」\n[ns4]「也不能眼睜睜看著他們陷入危機。」"
51180-152 = "就算擺出那種偽善的態度也無濟於事……！"
51180-153 = "[ns]「你不也一樣，比起逃跑更想往前走嗎？」"
51180-157 = "[ns]「沒辦法置之不理對吧？我也一樣。」"
51180-158 = "……！！"
51180-159 = "那是因為……"
51180-160 = "我只是……"
51180-161 = "[s5]「名草，希望你能告訴我騷動的原因。」\n[s6]「你知道那些傢伙是什麼來頭吧？」"
51180-164 = "……你沒打算回去是吧。"
51180-165 = "…………"
51180-172 = "祂們是……「幻魎．付喪神」。"
51180-173 = "部分傳聞指出，百花繚亂在很久很久以前驅逐了祂們。"
51180-174 = "總之……是來自「黃昏」的一種「怪談」。"
51180-175 = "[s]「……怪談？」"
51180-179 = "街談巷語、流言蜚語、街談巷說、無稽之談……#n如果要用更具風情的說法來形容的話……"
51180-182 = "自古口耳相傳的「[ruby=怪談]百物語[/ruby]」──可以這麼說吧。"
51180-183 = "有人認為它們是「不承認百鬼夜行聯合學園的刁蠻社團」、#n「利用怪書迷惑世人的魑魅魍魎」……卻也有人不這麼認為～"
51180-186 = "不過還是很奇怪……"
51180-187 = "為什麼會出現在這裡？"
51180-188 = "應該不可能出現在這裡才對，為什麼……"
51180-189 = "[s]「……這也是花鳥風月部的……？」"
51180-193 = "夏萊的老師。#n你怎麼會知道那個名字……！"
51180-199 = "背後……！？"
51180-205 = "哇啊啊啊！別開槍別開槍！#n真是急性子耶！我不是怪物，你先等一下啦！"
51180-206 = "這個聲音是……"
51180-215 = "啊，是老師！"
51180-216 = "老師！您沒事吧……！？"
51180-217 = "[s]「啊，嗯，我沒事……你們有沒有受傷！？」"
51180-219 = "……我們沒事。"
51180-220 = "不過……"
51180-222 = "老師！"
51180-223 = "我們一路上都在和奇怪的東西戰鬥……不斷逃跑……還有跌倒！"
51180-224 = "嗚啊啊！這到底是怎麼回事！"
51180-226 = "別擔心，楓醬。#n大家都在這裡，不必害怕！"
51180-227 = "嗚嗚……三森前輩……！"
51180-228 = "[s]「幸好沒有受傷。而且除了修行部……」"
51180-236 = "名草前輩，原來你在這裡啊。"
51180-237 = "蓮華……"
51180-238 = "我有很多事想告訴前輩，也有很多事想問……"
51180-239 = "不過在那之前──"
51180-251 = "得先把這些擾亂街道的怪物收拾掉才行！"
51180-252 = "如你所見，這裡亂成一團。#n名草前輩也會幫忙吧？"
51180-257 = "我……"
51180-263 = "野獸……"
51180-264 = "這長長的嚎叫聲……難道……"
51180-269 = "（大街在燃燒）"
51180-270 = "（另一側傳來了長長的咆哮聲）"
51180-276 = "花鳥風月部來到這裡就代表…… "
51180-278 = "付喪神還不是最後……嗎……？"
51180-280 = "得逃跑才行。"
51180-281 = "什麼！？等等，名草前輩！#n你說要逃跑？這是什麼意思……！"
51180-282 = "到了這種時候……前輩又打算逃跑嗎！？"
51180-283 = "[s]「等等，蓮華，先冷靜一點……」"
51180-284 = "這要我怎麼冷靜！？那個人又……！"
51180-285 = "付喪神……倒不成問題。#n──如果只是付喪神的話。"
51180-290 = "那些只不過是百物語的片斷……只是流傳時延伸的故事。"
51180-291 = "可是如果「那個」真的出現……"
51180-292 = "如果故事超越傳聞成為怪談……接著出現的就是──"
51180-302 = "那是……什麼？"
51180-303 = "……是貓？"
51180-304 = "什麼！？有那麼大的貓嗎？"
51180-306 = "那……真的是……"
51180-307 = "「幻魎百物語」竟然出現在這裡……"
51180-308 = "那是我們無法處理的敵人。#n已成為怪談的百物語…… "
51180-309 = "如果不是菖蒲，絕對……"
51180-314 = "[ns]「大家小心！要過來了……！」"

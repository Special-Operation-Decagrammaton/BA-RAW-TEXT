[translation]
51180-1 = "Episode 18;Rumors of the Streets 2"
51180-4 = "I just...wanted to go back..."
51180-5 = "I just wanted to go back to when we were together...!"
51180-8 = "Lying to protect someone is still lying..."
51180-9 = "What did they say again? ...All I did was hurt her?"
51180-10 = "We wave the flag of justifications, insisting it was for her sake."
51180-11 = "But our protection was a poison dagger..."
51180-17 = "Nagusa..."
51180-18 = "Why... Why did you—"
51180-22 = "Who is that?"
51180-29 = "How long has it been, Kikyou?"
51180-30 = "N-Nagusa?!"
51180-31 = "After all this time, you—"
51180-32 = "Never mind. Excuse me. Welcome back. "
51180-33 = "Yours and Ayame's disappearance was the catalyst for an exodus of members from the Hyakkaryouran."
51180-34 = "We are on the verge of losing everything. If you spoke to them..."
51180-40 = "I cannot. I only came to give you this, Kikyou."
51180-41 = "This has been passed down from president to president... What is your intention?"
51180-46 = "It's simple. Your work as the Hyakkaryouran's operations officer has garnered you both power and respect."
51180-47 = "Not just from the regular members, but from me as well."
51180-48 = "They will follow your leadership in earnest. And you will guide them with a steady hand. "
51180-49 = "So, this is my intention. For Kiryuu Kikyou to fill the role of president of the Hyakkaryouran."
51180-55 = "Take it, please."
51180-60 = "Two seasons have passed...and this is the solution you return with?"
51180-62 = "I see no other way."
51180-63 = "You... Why?!"
51180-68 = "Ayame's absence is like a black hole."
51180-69 = "I cannot fill it. It's beyond me."
51180-75 = "When you left...my resentment...the anger and bitterness..."
51180-76 = "Not for failing to fulfill your role as president... No..."
51180-81 = "We believed you hung the moon and the stars themselves in the sky."
51180-82 = "The Hyakkaryouran stood at the ready. Your path was our path. "
51180-83 = "And then you vanished."
51180-85 = "Ayame? Who spoke of Ayame?"
51180-86 = "To treat our admiration of you so lightly... "
51180-87 = "We were not looking towards Ayame's empty spot. We sought you and only you, Nagusa."
51180-92 = "Was I wrong? Were we all...wrong?"
51180-94 = "What was the correct path then? Could I have miscalculated?"
51180-99 = "...Chaos is descending upon Hyakkiyako."
51180-105 = "The world was on fire, with straggling festival-goers fleeing to safety."
51180-115 = "Waaaaaah!"
51180-116 = "There's so many monsters! H-Help!"
51180-124 = "Are you injured?"
51180-127 = "[ns] \"Everyone is evacuating in the direction we came from! You'll be safe there!\""
51180-128 = "Th-Thank you so much!"
51180-135 = "It's relentless."
51180-136 = "[s] \"There might be more people trapped. Let's go.\""
51180-137 = "You suggest we run towards the burning buildings?"
51180-138 = "Perhaps you're joking again..."
51180-139 = "I hardly need to explain to you how dire this situation is."
51180-140 = "Why do you insist on running towards unknown dangers?"
51180-141 = "[s] \"Not everyone has gotten out yet.\""
51180-142 = "Do the lives of unnamed citizens weigh on your conscience? They aren't your responsibility."
51180-143 = "Self-preservation is human nature. "
51180-144 = "How do you so deliberately defy your own instincts?"
51180-145 = "[s1] \"Every student's safety is my responsibility.\"\n[s2] \"I've gotten to know a lot of good people here at Hyakkiyako.\""
51180-149 = "[ns3] \"It doesn't matter who it is.\"\n[ns4] \"I can't ignore someone who needs help.\""
51180-152 = "Those idealistic answers—"
51180-153 = "[ns] \"That being said, you're running straight into the fire too, Nagusa.\""
51180-157 = "[ns] \"You can't abandon them. You and I are the same in that way.\""
51180-158 = "...!!"
51180-159 = "That's..."
51180-160 = "I just..."
51180-161 = "[s5] \"Nagusa, everyone needs your help.\"\n[s6] \"You know who caused this and what those are, right?\""
51180-164 = "...So that's your answer."
51180-165 = "...Fine."
51180-172 = "They are...Artifact Spirits."
51180-173 = "Artifact Spirits are everyday, utilitarian objects possessed by evil and come to life. The process takes over a hundred years. The Hyakkaryouran bested them once before, but they never truly die."
51180-174 = "The evil spirits are born from rumors and ghost stories, crossing over from the spirit realm into ours to inflict terror and pain."
51180-175 = "[s] \"...Ghost stories?\""
51180-179 = "They're gossip, hearsay, speculation. To describe them with even more sensational words..."
51180-182 = "They're the authors of the Hundred Ghost Stories passed down from generation to generation."
51180-183 = "Some call them a wicked club that rebelled against the Hyakkiyako alliance, while others say they're monsters who bewitch people with strange tomes..."
51180-186 = "That is the extent of my knowledge."
51180-187 = "Their presence here defies all logic."
51180-188 = "Them being here isn't simply unusual. It should be an impossibility."
51180-189 = "[s] \"...Could this be Nature's Beauty's doing?\""
51180-193 = "That name should not be known to you, Sensei."
51180-199 = "Behind you!"
51180-205 = "Wah! Cease fire! Please! We're friends! Friends!"
51180-206 = "Isn't that..."
51180-215 = "Sensei! We found you!"
51180-216 = "Are you injured anywhere?"
51180-217 = "[s] \"Don't worry about me. Is everyone all right?!\""
51180-219 = "...Yes. We're all fine."
51180-220 = "The situation though..."
51180-222 = "Sensei!"
51180-223 = "What's happening?! We were fighting this big scary thing and then I fell over and then..."
51180-224 = "WAAAH! This is so scary!"
51180-226 = "What matters is we're together and we're safe, Kaede! I won't let anything happen to you."
51180-227 = "*sniff* Mimori... You're the best."
51180-228 = "[s] \"I'm glad no one from the Inner Discipline Club was injured.\""
51180-236 = "Fancy meeting you here, Nagusa."
51180-237 = "Renge, I..."
51180-238 = "Nope. I'm the one who's angry. You're the one who has to hear me out."
51180-239 = "...Later, at least. Right now, I need you."
51180-251 = "There are monsters disrupting the peace in Hyakkiyako!"
51180-252 = "Protecting our home comes first. Right, Nagusa?!"
51180-257 = "I..."
51180-263 = "A beast..."
51180-264 = "A howl that rends through the air itself..."
51180-269 = "(Everything is aflame, as far as the eye can see.)"
51180-270 = "(This ghostly screech echoes from the streets.)"
51180-276 = "If Nature's Beauty has a hand in this... "
51180-278 = "This will not end with the Artifact Spirits."
51180-280 = "Run. Run and make haste."
51180-281 = "Are you serious, Nagusa?"
51180-282 = "Is that all you know how to do? Run away when things get hard?"
51180-283 = "[s] \"Renge, calm down for just a second.\""
51180-284 = "Calm down? CALM DOWN?!"
51180-285 = "Renge, listen. The Artifact Spirits are not my concern."
51180-290 = "They're mere fragments of the Hundred Ghost Stories. They have no true power on their own."
51180-291 = "But there's a beast of an entirely different nature..."
51180-292 = "This story can only end with a rumor transcending into a Phantom Fable... The being that will soon arise..."
51180-302 = "What the hell is that?"
51180-303 = "...A cat?"
51180-304 = "No way! That's the biggest cat I've ever seen."
51180-306 = "It's here..."
51180-307 = "A Phantom Fable has manifested."
51180-308 = "A ghost story evolved into a real nightmare... There is no fighting it. "
51180-309 = "Ayame could have..."
51180-314 = "[ns] \"Get out of the way! It's coming!\""

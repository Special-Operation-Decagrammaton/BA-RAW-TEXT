10041060-30 = "3;리오;07;이런 '죄'에 두 사람은 관계없으니까. 이건 온전히 내 죄에 대한 일이니까."
10041060-31 = "5;네루 교복;05;그걸 물은 게 아니잖아. 내가 돌아가면, 저건 누가 쓰는데?\n#5;em;[반응]\n#5;al\n#3;m1"

[translation]
10041060-1 = "ตอนที่ 6;ห้องของบิ๊กซิสเตอร์"
10041060-7 = "บิ๊กซิสเตอร์ อัลกอริทึมงั้นเหรอ..."
10041060-9 = "ในอีกแง่หนึ่ง... มันก็เหมือนความผิดพลาดของฉันน่ะ มันเป็นสิ่งที่ฉันไม่คิดจะใช้เลยตั้งแต่แรก"
10041060-10 = "ความผิดพลาด...?"
10041060-11 = "ไม่คิดเลยนะว่าเธอจะพูดคำว่า 'ความผิดพลาด' ออกมาจากปากตัวเอง"
10041060-12 = "ก็มันจริงนี่ นั่นเป็นสิ่งที่ฉันในตอนนี้จะไม่ทำเด็ดขาด แต่ว่าฉันในตอนนั้นไม่ลังเลเลย"
10041060-13 = "ถ้าฉันยังเป็นตัวฉันคนก่อนที่เอาแต่แสวงหาวิธีที่มีประสิทธิภาพ ก็คงไม่มาขอร้องเนรุให้ช่วยตั้งแต่แรก#nหรอก..."
10041060-14 = "คุณใช้ระบบตรวจตราของบิ๊กซิสเตอร์ อัลกอริทึม แล้วตรวจสอบข้อมูลส่วนบุคคลของทุกคนที่นี่โดยที่#nไม่ได้รับอนุญาตสินะคะ"
10041060-15 = "ตอนจากมิลเลเนียมไป... ฉันบล็อกระบบและแยกมันออกมาโดยสิ้นเชิง และไม่มีความคิดที่จะเปิดใช้มัน#nอีกเป็นครั้งที่สอง"
10041060-16 = "แต่ตอนนี้เราไม่มีวิธีอื่นแล้ว นี่เป็นวิธีเดียวที่จะแก้ไขปัญหานี้ ก่อนที่ทุกอย่างจะเลวร้ายจนไม่สามารถ#nควบคุมได้"
10041060-17 = "และการใช้มันอีกครั้ง ก็เป็นการตัดสินใจและเป็นความผิดของฉันคนเดียว"
10041060-22 = "ทั้งสองคนไม่ต้องสนเรื่องนี้หรอก หรือว่าจะกลับไปก็ได้ ฉันไม่ว่าอะไร"
10041060-27 = "ว่าไงนะ...?"
10041060-28 = "เดี๋ยวก่อนๆ ให้กลับไปงั้นเหรอ? พูดอะไรของเธอน่ะ?"
10041060-30 = "ทั้งสองคนไม่เกี่ยวข้องกับ 'ความผิด' ในครั้งนี้ นี่เป็นความผิดของฉันคนเดียว"
10041060-31 = "ฉันไม่ได้ถามเรื่องนั้นสักหน่อย ถ้าฉันกลับไป แล้วใครจะไปใช้ระบบนั้นล่ะ?"
10041060-32 = "จากนี้ไป ฉันจะ..."
10041060-33 = "เธอจะไปที่นั่นด้วยตัวเองงั้นเหรอ? จะเข้าไปข้างในศูนย์ข้อมูลน่ะนะ?"
10041060-37 = "ฉันศึกษาเส้นทางที่เธอไปมาแล้ว งานนี้ไม่น่าจะเป็นปัญหาหรอก"
10041060-38 = "อีกอย่าง ถ้าจะเข้าไปในห้องของบิ๊กซิสเตอร์ ก็ต้องใช้ข้อมูลไบโอเมตริกซ์ของฉันด้วย ถ้าจะให้คนอื่น#nเข้าไปในนั้นโดยไม่มีข้อมูลของฉัน งานมันก็จะซับซ้อนยิ่งขึ้น"
10041060-39 = "แน่นอนว่าถ้าฉันเข้าไปโดยมีการยืนยันตัวตน ก็จะมีการบันทึกข้อมูลการเข้าออกของฉัน... ตอนนี้ไม่ใช่เวลาที่จะคิดเรื่องนั้น"
10041060-44 = "นั่นหมายความว่าคุณอาจถูกมองว่าเป็นคนร้ายในเรื่องทั้งหมดนี้ก็ได้นะคะ ริโอะ"
10041060-45 = "ฉันเองก็รู้ดี แต่นั่นไม่สำคัญหรอก"
10041060-46 = "สำคัญค่ะ"
10041060-50 = "ทั้งเรื่องที่เกิดขึ้นในชมรมวิศวกรรมและชมรมพัฒนาเกม ตอนนี้คุณก็อยู่ในสถานการณ์ที่อาจถูกสงสัย#nแล้วนะคะ"
10041060-51 = "แต่นี่เป็นความผิดของฉันเอง..."
10041060-52 = "ฉันทำให้คนอื่นต้องเสี่ยงไปมากกว่านี้ไม่ได้แล้ว"
10041060-57 = "เหอะ"
10041060-62 = "เหอะ...?"
10041060-63 = "น่าผิดหวังจริงๆ เลยค่ะ คุณริโอะ"
10041060-64 = "ผิดหวังเหรอ...?"
10041060-65 = "ค่ะ คุณคิดจะผลักฉันออกด้วยคำพูดที่ไม่มีเหตุผลแบบนั้นเหรอคะ?"
10041060-66 = "ก่อนหน้านี้ก็บอกว่าไม่มีฉันจะดีเสียกว่า แล้วตอนนี้ก็พูดเหมือนฉันไม่มีส่วนเกี่ยวข้องอะไรด้วยเลย"
10041060-67 = "ถ้าตัดสินใจทำแบบนี้เพราะนึกถึงฉัน ฉันก็พอเข้าใจได้ครั้งหนึ่งค่ะ แต่ถ้าจะมีครั้งที่สองแบบนี้ ฉันก็อดที่จะผิดหวังไม่ได้"
10041060-68 = "พูดเรื่องอะไรน่ะ...!? ฉันไม่ได้มีเจตนาแบบนั้น..."
10041060-73 = "แต่ก่อนละสั่งงานคนอื่นตามใจ แต่มาตอนนี้กลับจะมาเป็นผู้เสียสละที่ยิ่งใหญ่คนเดียว เพราะอย่างนี้ละ คนอื่นถึงได้พูดว่าเธอเหลวไหลน่ะ"
10041060-77 = "ละ... เหลวไหล..."
10041060-79 = "ฉันว่าตอนนี้พวกเรามีความคิดเหมือนกันนะคะ"
10041060-80 = "อื้อ ตอนนี้คงคิดเป็นอย่างอื่นไปไม่ได้หรอก"
10041060-85 = "หมายความว่ายังไง? คิดเหมือนกันงั้นเหรอ?"
10041060-86 = "ถึงนี่อาจจะไม่ใช่สไตล์ของฉัน แต่ฉันจะขอพูดตรงๆ นะคะ"
10041060-92 = "ฉันไม่เชื่อในตัวคุณริโอะค่ะ"
10041060-96 = "...!?"
10041060-97 = "ไม่เชื่องั้นเหรอ...?"
10041060-98 = "เชื่อไม่ได้หรอก ใครจะไปเชื่อว่าจะเข้าไปได้ล่ะ"
10041060-99 = "จะเข้าไปโดยอ้างอิงจากเส้นทางที่ฉันใช้เหรอ? คิดว่าแค่จำเส้นทางได้ก็ไร้ปัญหาหรือไง?"
10041060-100 = "ขอพูดตรงๆ เลยนะ ถ้าจะให้เธอไปน่ะ ฉันว่าส่งคุณหนูคนนี้..."
10041060-101 = "เซอา ฉันชื่อยูริโซโนะ เซอาค่ะ"
10041060-102 = "ฉันว่าส่งเซอาไป น่าจะสำเร็จมากกว่าอีก"
10041060-104 = "ตะ... แต่ว่า..."
10041060-106 = "ริโอะ ฉันขอพูดแบบขวานผ่าซากอย่างตรงประเด็นสักหน่อยนะคะ"
10041060-107 = "ตอนนี้คุณใช้ความรู้สึกส่วนตัว แล้วพยายามทำลายปฏิบัติการของเราอยู่นะคะ ถ้าสิ่งที่ต้องทำตอนนี้คือ#nการแทรกซึมเข้าไปที่ไหนสักที่ ฉันว่างานนั้นเหมาะกับฉันมากกว่าคุณค่ะ"
10041060-108 = "ต่อให้บอกว่าอุปกรณ์นั้นเป็นผลงานของคุณ แต่มันก็ไม่สมเหตุสมผลที่จะใช้เหตุผลนั้นมากีดกันพวกเรา#nออกไปค่ะ นั่นไม่เกี่ยวอะไรกับปฏิบัติการเลยค่ะ"
10041060-109 = "อื้อ พูดได้ดีเลยละ นั่นละสิ่งที่ฉันอยากจะสื่อ"
10041060-110 = "พวกเราจะเป็นคนเข้าไปเอง เราจะเข้าไปหาตำแหน่งของคนพวกนั้น..."
10041060-111 = "แล้วก็จะไปกำจัดอุปกรณ์แย่ๆ ของเธอให้ได้ 'อย่างแน่นอน' เลย"
10041060-112 = "ถ้าทำอย่างนั้น ทั้งฉัน... และเซอา"
10041060-116 = "แล้วก็เธอ ก็น่าจะสบายใจกันทุกฝ่าย ว่ามั้ยล่ะ?"
10041060-121 = "...!!"
10041060-122 = "ต้องใช้วิธีนี้เท่านั้นค่ะ ถ้าไม่ใช่วิธีนี้แล้วละก็ คุณคงทำงานนี้ให้สำเร็จไม่ได้แม้ว่างานของคุณจะเสร็จ#nแล้วก็ตามค่ะ ริโอะ"
10041060-123 = "จากการคุยกันวันนี้ ฉันเสียใจที่ได้ข้อสรุปว่าคุณมีนิสัยที่น่าเหนื่อยใจมากๆ เลยค่ะ"
10041060-124 = "ฉันเองก็มองว่าตัวเองก็เป็นคนที่ทำให้คนอื่นเหนื่อยใจอยู่เหมือนกัน... แต่คุณน่ะยิ่งกว่าฉันอีกค่ะ"
10041060-126 = "ตาถึงใช้ได้เลยแฮะ"
10041060-127 = "ทั้งสองคน..."
10041060-128 = "นี่เป็นสถานการณ์เร่งด่วนค่ะ ไว้คุยรายละเอียดระหว่างไปที่นั่น หรือไม่ก็คุยหลังจากงานเสร็จดีกว่าค่ะ"
10041060-129 = "ตรงไปตรงมาดีนะ ปกติเธอเป็นคนแบบนี้หรอกเหรอ?"
10041060-130 = "น่าเสียดายที่ไม่ใช่ค่ะ ปกติแล้วฉันจะพูดอ้อมค้อมให้คนฟังอารมณ์เสียมากกว่าค่ะ"
10041060-131 = "ถ้าสงสัยละก็... ไว้หลังจากจบงานนี้ ฉันจะลองทำให้ดูนะคะ"
10041060-132 = "ฮ่าฮ่า! ตลกจัง เอาแค่พอดีๆ ก็พอละ อย่าให้ฉันต้องหัวร้อนแล้วกัน"
10041060-134 = "เป็นคน... อย่างนั้นสินะ..."
10041060-139 = "เอ้า มัวทำอะไรอยู่...???"
10041060-145 = "รีบๆ บอกทางมาได้แล้วน่า..."

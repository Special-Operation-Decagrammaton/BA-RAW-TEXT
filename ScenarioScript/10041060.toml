[translation]
10041060-1 = "Episode 6;Big Sister Room"
10041060-7 = "Big Sister Algorithm..."
10041060-9 = "Let's say...it was a mistake I made. Although I never planned on taking it any further."
10041060-10 = "\"Mistake\"...?"
10041060-11 = "Never thought I'd hear THAT word come out of your mouth."
10041060-12 = "It's a statement of fact. I would never repeat the mistake as I am now, but back then, I carried it out without hesitation."
10041060-13 = "My only concern at the time was for efficiency. The person I was...would never have consulted you."
10041060-14 = "Well, why consult anyone when you had the Big Sister Algorithm's radars on hand? All the personal information of every guest on campus, at your fingertips."
10041060-15 = "...All of which I blocked off and quarantined when I left Millennium, with no intention of ever touching again."
10041060-16 = "But now, there's no other way. We HAVE to resort to the algorithm, or else this will get out of hand."
10041060-17 = "And, of course, that's entirely on me."
10041060-22 = "You two don't have to worry about it. Feel free to leave now."
10041060-27 = "...? What?"
10041060-28 = "Wait, wait. Hold on. What do you mean by \"leave\"?"
10041060-30 = "I'm about to commit a crime. You two are unrelated to it, and I want you to stay that way."
10041060-31 = "That's not what I asked. If I leave, who's going in to boot the algorithm?"
10041060-32 = "Everything from here on out is up to me."
10041060-33 = "You, alone? You want to break back into the Data Center yourself?"
10041060-37 = "You proved it's possible, Neru. I'll follow your example, and copy your route."
10041060-38 = "I should mention that getting into that particular room requires my biometrics. Otherwise, it gets much more complicated."
10041060-39 = "Incidentally, the biometric scanner does keep records, somewhere in the data...but that'll have to be a \"later\" problem."
10041060-44 = "So, now or later, you could easily be caught."
10041060-45 = "I'm aware, but right now, that's not important."
10041060-46 = "It is important."
10041060-50 = "You might already be a suspect for the incidents with the Engineering Department and the Game Development Department."
10041060-51 = "...Even if I am, this is my responsibility."
10041060-52 = "I can't put other people at risk any further."
10041060-57 = "Huh."
10041060-62 = "Huh...?"
10041060-63 = "I'm very disappointed, Rio."
10041060-64 = "...Disappointed?"
10041060-65 = "In the way you continually brush me aside."
10041060-66 = "Last time, you told me \"it's better if I'm not there,\" and now I'm \"unrelated\" to everything."
10041060-67 = "I can understand you keeping me back to protect me once, but this is becoming a pattern, and I can't help but feel a bit hurt."
10041060-68 = "...?! What are you talking about? It's not my intention to—"
10041060-73 = "Oh, drop the martyr act. It's not like you're taking this all on yourself. For one thing, you've been making US do all the legwork. You know, this is part of why people say you're annoying."
10041060-77 = "\"A-Annoying\"...?"
10041060-79 = "Ah. Common ground at last."
10041060-80 = "...And that's all I have to say here."
10041060-85 = "What common ground? What do you mean?"
10041060-86 = "Well, I'm not known for brevity, but allow me to cut to the chase:"
10041060-92 = "Neither of us can trust you with this job, Rio."
10041060-96 = "*gasp*"
10041060-97 = "You can't trust me...?"
10041060-98 = "She's right. We can't. There's no way you could get in without getting caught."
10041060-99 = "You're just going to \"copy my route\"? You think that's all it takes?"
10041060-100 = "Honestly, I'd send the Tea Party girl here before I sent you."
10041060-101 = "Seia. My name is Yurizono Seia."
10041060-102 = "Right, Seia. Even she'd do better."
10041060-104 = "Th-That's..."
10041060-106 = "Rio, allow me to be direct."
10041060-107 = "Your personal feelings are jeopardizing the mission. Infiltration is our domain, not yours."
10041060-108 = "It may be your machine, but leaving us out because of that is not rational at all."
10041060-109 = "Well put. That's what I was going to say."
10041060-110 = "We'll be the ones going in. We'll find your machine, gather all the intel we need..."
10041060-111 = "...and then BREAK the machine before anyone else can use it."
10041060-112 = "That's a win-win-win, for you, me, and..."
10041060-116 = "...Seia, right. Make sense?"
10041060-121 = "*grumble*"
10041060-122 = "It's the only way we can do this. The only way we can put an end to it."
10041060-123 = "Now, I've come under the impression you can be very...exhausting to be around."
10041060-124 = "And I know many people could say the same of me, but I would contend you're even more so."
10041060-126 = "You are a GREAT judge of character."
10041060-127 = "Would you two...?"
10041060-128 = "Listen, time is short. Anything left to discuss, we can discuss on the way, or after we finish."
10041060-129 = "I LIKE when you're direct. Is this how you usually are?"
10041060-130 = "Unfortunately not. I'm told my usual manner of speech can be very irritating."
10041060-131 = "Maybe after all this is over, I can demonstrate for you."
10041060-132 = "Haha! All right, just don't irritate me in the meantime. I punch."
10041060-134 = "Th-That's..."
10041060-139 = "...Huh? Hey, what are you doing?"
10041060-145 = "...Hurry up and lead the way."

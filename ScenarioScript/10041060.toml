[translation]
10041060-1 = "第6話;Big Sister Room"
10041060-7 = "大姐頭演算法……"
10041060-9 = "真要說起來……這可以算是我的汙點吧。#n原本我是絕對不會使用這個東西的。"
10041060-10 = "汙點……？"
10041060-11 = "我還真沒想到能從你嘴裡聽到「汙點」這種話。"
10041060-12 = "畢竟那是事實。#n雖然現在的我絕對不會這麼做，但當時的我卻沒有任何猶豫。"
10041060-13 = "如果是以前那個只在乎效率的我，恐怕根本就不會拜託你……"
10041060-14 = "而是直接從大姐頭演算法的監視網裡尋找，並強行查看所有來訪者的身份資料了吧。"
10041060-15 = "……我在離開千年時，就對那個演算法進行了徹底地封鎖與隔離。#n並且我至今也從未想過要再次使用它。"
10041060-16 = "但是現在我們別無選擇。#n為了在事情完全失控之前將其解決，這是我們唯一的辦法。"
10041060-17 = "再次使用那個演算法完全是出於我個人的決定，是我的責任……"
10041060-22 = "所以你們兩位不用擔心。#n或者，你們也可以先行離開。"
10041060-27 = "……啊？"
10041060-28 = "不不不，離開？你在說什麼啊？"
10041060-30 = "畢竟這項「罪行」與你們兩人無關。#n一切的罪責都該由我承擔。"
10041060-31 = "我不是在問那個。#n我的意思是如果我走了的話，誰要負責使用那東西？"
10041060-32 = "接下來就由我……"
10041060-33 = "你要親自去那個地方？那可是在資料中心裡耶？"
10041060-37 = "如果你是擔心路徑的話，我已經複習過你的來往路線了。#n這並非完全不可能的事。"
10041060-38 = "而且想要進入大姐頭房間的話，需要有我的生物辨識資料。#n如果想跳過這道步驟進去那裡，事情會變得複雜許多。"
10041060-39 = "雖然如果透過驗證進去的話，資料庫裡也會留下關於我的紀錄……#n但現在不是考慮那些的時候了。"
10041060-44 = "也就是說，你有可能被當作這一切的幕後黑手吧，莉央？"
10041060-45 = "沒錯，但那並不重要。"
10041060-46 = "很重要。"
10041060-50 = "無論是工程師部還是遊戲開發部的時候，你都已經被人懷疑了。"
10041060-51 = "……但這終究還是我的問題。"
10041060-52 = "我不能再讓其他人冒任何風險了。"
10041060-57 = "真是的。"
10041060-62 = "真是的……？"
10041060-63 = "我對你真的很失望，莉央同學。"
10041060-64 = "……失望？"
10041060-65 = "沒錯，你又想用這種前後矛盾的言詞把我排除在外了嗎？"
10041060-66 = "一下說我不在會比較好，一下又把我當成局外人。"
10041060-67 = "第一次我還能視為是你對我的體貼，但第二次就只會讓我感到失望而已。"
10041060-68 = "……！？#n你在說什麼？我並不是那個意思……"
10041060-73 = "都已經叫我做了那麼多麻煩事，現在就別假裝自己是什麼偉大的犧牲者了吧？#n那些話在我聽來只覺得刺耳而已。"
10041060-77 = "刺，刺耳……"
10041060-79 = "看來我們兩個的想法似乎一致呢。"
10041060-80 = "是啊，這種時候怎麼可能會有別的想法呢。"
10041060-85 = "你們在說什麼？什麼叫想法一致？"
10041060-86 = "雖然這麼做有點不像我，不過我就開門見山地說了。"
10041060-92 = "我們不相信你，莉央同學。"
10041060-96 = "……！？"
10041060-97 = "不相信我……？"
10041060-98 = "那當然，怎麼可能相信呢。#n你能在不被發現的情況下進去那裡才怪。"
10041060-99 = "複習過我走的路線？#n你該不會以為只要把路線背下來就萬事OK了吧？"
10041060-100 = "老實說與其派你，我覺得還不如派這位小姐……"
10041060-101 = "聖亞，我叫做百合園聖亞。"
10041060-102 = "我覺得派聖亞去還比較有機會。"
10041060-104 = "這，這……"
10041060-106 = "莉央，我看我就為了你，說得再強硬或直白一點吧。"
10041060-107 = "你現在已經被自己私人的感情蒙蔽了雙眼，並且正在拖累我們的任務。#n如果現在該做的事是潛入，那也不應該是由你──而是由我們去才對。"
10041060-108 = "現在才搬出那個機器是你的作品這種理由，企圖將我們排除在外根本沒道理。#n因為那跟我們的任務沒有絲毫的關係。"
10041060-109 = "啊啊，你講得真好，我也正想這麼說。"
10041060-110 = "該負責潛入的人是我們才對。#n接著再想辦法找出那些傢伙的位置……"
10041060-111 = "並且「確實地」將你那台令人不爽的機器徹底報廢。"
10041060-112 = "這樣我和他……我和聖亞……"
10041060-116 = "還有你三個人才能安心……你說對吧？"
10041060-121 = "……！！"
10041060-122 = "現在只有這個辦法了。#n否則……莉央，即便這次的事情落幕，你還是會被困在其中無法逃脫。"
10041060-123 = "根據今天的對話內容，我可以得出一個令人遺憾的結論──你的個性相當令人疲累。"
10041060-124 = "雖然我自己也不惶多讓……你卻是有過之而無不及。"
10041060-126 = "你還挺有眼光的嘛。"
10041060-127 = "你們兩個……"
10041060-128 = "現在情況緊急。#n細節就等出發之後，或者事情通通告一段落之後再聊吧。"
10041060-129 = "真爽快，難道這才是你的本性嗎？"
10041060-130 = "雖然可惜，但是你猜錯了。#n其實我本來的語氣應該更容易讓人不爽才對。"
10041060-131 = "……如果你真的很好奇的話，等事情結束之後，我可以稍微讓你見識一下。"
10041060-132 = "哈哈！真有趣。#n那你記得要控制一下哦，不然我怕我會忍不住對你動粗。"
10041060-134 = "什，什麼……"
10041060-139 = "……？？？#n喂，你還楞著做什麼？"
10041060-145 = "……趕快帶路吧。"

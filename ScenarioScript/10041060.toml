10041060-38 = "3;리오;07;그리고 일반적으로 빅 시스터 룸에 들어가기 위해서는, 내 생체 인증 정보가 필요해. 그게 없이 들어가려면 일은 훨씬 더 복잡해져."
10041060-39 = "3;리오;02;물론 내 인증을 통해 들어간다면, 내가 다녀갔다는 기록이 데이터 어딘가에 남겠지만……. 지금은 그걸 생각할 때가 아니니까."

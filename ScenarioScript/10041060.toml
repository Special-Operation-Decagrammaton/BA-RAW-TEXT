10041060-9 = "3;리오;99;말하자면……. 나의 과오 같은 거지. 원래라면 절대 사용할 생각이 없는 물건이었지만.\n#3;a"
10041060-10 = "5;네루 교복;01;과오……?\n#5;em;[?]\n#5;al\n#3;m1"
10041060-11 = "5;네루 교복;00;네 입에서 스스로 '과오' 같은 말이 나올 줄은 몰랐는데."
10041060-12 = "3;리오;02;사실이니까. 지금의 나라면 절대로 하지 않을 행위지만, 그때의 나는 서슴지 않았지."
10041060-13 = "3;리오;07;효율적인 방법만을 좇던 이전의 나라면, 처음부터 네루에게 부탁하지도 않았을 테고……."
10041060-14 = "5;세이아;99;바로 빅 시스터 알고리즘의 감시망에서 찾았겠군요. 이곳에 온 모두의 신상 정보를 무단으로 확인해서.\n#5;em;…"
10041060-15 = "3;리오;02;……밀레니엄을 떠날 때 철저히 차단 후 격리시켰고, 이후로도 두 번 다시 열 생각은 없었어."
10041060-16 = "3;리오;01;하지만 지금은 방법이 없어. 일이 손을 완전히 떠나기 전에 해결하기 위해선, 그것만이 유일한 방법이야."
10041060-17 = "3;리오;99;그걸 다시 쓰는 일에 대한 건 전적으로 내 결정이고 내 탓이니……."

1002705-14 = "3;카린;02;……뭐? 왜 지금은 평소 같은 메이드 복장이냐고?"
1002705-15 = "3;카린;04;왜냐니……. 그야 오늘은 내가 아니라 선생님을 위한 날이니까 그렇지.\n#3;stiff\n#3;em;[땀]"
1002705-16 = "3;카린;02;내가 '그 옷'을 입고 있으면, 선생님이 입어 볼 수가 없잖아."
1002705-17 = "3;카린;03;정 부담이 된다면 방을 비워줄 수도 있어. 선생님이 원하는 만큼 충분히 입어보고 다시 날 불러도 좋아.\n#3;em;[음표]"

1002705-9 = "3;카린;99;선생님에게는 꽤 중요한 일인데……. 그런 일에도 이렇게 날 신뢰해서 부름에 응해주다니.\n#3;em;…"
1002705-10 = "[s1] \"……응.\"\n[s2] \"중요한 일이지. 중요하고 말고.\""
1002705-11 = "3;카린;02;그래. 그래서 말인데, 선생님……."

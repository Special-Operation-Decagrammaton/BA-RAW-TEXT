[translation]
1002705-1 = "ผลลัพธ์ที่คาดไม่ถึง"
1002705-2 = "(สถานที่ที่คุณครูมาถึงหลังจากเดินตามคารินที่นำทางมาก็คือห้องของคาริน และในห้องของเธอ#nก็ดูสะอาดเรียบร้อยมาก)"
1002705-3 = "(ถึงคารินจะดูเหมือนปกติ แต่คุณครูก็รู้สึกว่าสีหน้าของเธอดูมีความมุ่งมั่นขึ้นนิดๆ)"
1002705-6 = "[ns] \"ห้องสะอาดจังเลยนะ\""
1002705-7 = "อื้อ เชิญเลยคุณครู"
1002705-8 = "แล้วก็... ขอบคุณนะ"
1002705-9 = "ทั้งที่เป็นเรื่องที่สำคัญมากสำหรับคุณครู... แต่คุณครูก็ยังเชื่อใจฉัน และยอมรับคำขอร้องของฉัน#nอีกด้วย"
1002705-10 = "[s1] \"อื้อ...\"\n[s2] \"สำคัญสิ สำคัญมากๆ ด้วย\""
1002705-11 = "ใช่แล้วล่ะ เพราะงั้นคุณครู..."
1002705-12 = "ใช่แล้วล่ะ เพราะงั้นคุณครู..."
1002705-13 = "หืม...?"
1002705-14 = "หา...? ทำไมตอนนี้ฉันถึงใส่ชุดเมดเหมือนทุกวันงั้นเหรอ?"
1002705-15 = "ทำไมน่ะเหรอ... เพราะว่าวันนี้ไม่ใช่วันของฉัน แต่เป็นวันของคุณครูต่างหากล่ะ"
1002705-16 = "ถ้าฉันใส่ \"ชุดนั้น\" อยู่ล่ะก็ คุณครูก็จะไม่มีโอกาสได้ใส่ยังไงล่ะ"
1002705-17 = "แต่ถ้าคุณครูอึดอัดใจล่ะก็ ฉันจะออกไปรอข้างนอกห้องก็ได้นะ คุณครูลองใส่จนพอใจแล้วค่อยเรียก#nฉันเข้าไปก็ได้"
1002705-18 = "แล้วก็..."
1002705-24 = "แน่นอนว่าฉัน \"ไม่รู้\" เรื่องอะไรเลย แบบนี้คงโอเคใช่มั้ย?"
1002705-28 = "เอาล่ะ นี่"
1002705-29 = "ชุดที่คุณครูอยากใส่มาตลอด ลองใส่ได้ตามสบายเลย"
1002705-30 = "...?"
1002705-31 = "หืม...? ทำไมไม่รับไปล่ะ? มีอะไรเหรอ...?"
1002705-32 = "อา... หรือว่าคุณครูยังไม่เชื่อใจฉันพอเหรอ? แต่ว่า... คุณครูก็ยอมมาถึงที่นี่แล้วนี่นา"
1002705-33 = "[s3] \"ไม่ใช่แบบนั้นนะ\"\n[s4] \"ครูไม่ได้อยากใส่ชุดนั้นซะหน่อย\""
1002705-34 = "หืม...? ไม่ใช่แบบนั้นงั้นเหรอ?"
1002705-35 = "หา...? ไม่ได้อยากใส่งั้นเหรอ?"
1002705-36 = "เอ่อ... แล้วถ้างั้น...?"
1002705-37 = "[s] \"ครูหมายถึงคารินต่างหากล่ะ\""
1002705-41 = "อา..."
1002705-42 = "...?"
1002705-43 = "เอ่อ... อืม... ถ้างั้น..."
1002705-44 = "อืม..."
1002705-45 = "โทษที... เหมือนฉันคงเข้าใจอะไรผิดไปนิดหน่อย..."
1002705-46 = "เป็น...แบบนี้นี่เอง อืม... อืม คงเข้าใจผิดเอง..."
1002705-47 = "โทษที... ที่เข้าใจผิด"
1002705-48 = "แล้วถ้าอย่างนั้นทำไมตอนนั้นถึงถามแบบนั้นล่ะ...?"
1002705-49 = "[s5] \"ครูเห็นว่าคารินน่าจะชอบชุดนั้นน่ะสิ\"\n[s6] \"ครูแค่อยากรู้พวกเรื่องงานอดิเรกของคารินน่ะ\""
1002705-50 = "อา..."
1002705-51 = "อา..."
1002705-52 = "อ้อ... แบบนั้นเองเหรอ แบบนั้นเองสินะ... อื้อ... เข้าใจล่ะ"
1002705-53 = "คุณครู... คุณครูสนใจเรื่องของฉันนี่เอง ฉัน...ฉันไม่เคยรู้เลย..."
1002705-54 = "ที่จริงไม่ค่อยมีใครที่สนใจฉัน แล้วบอกว่าอยากรู้เรื่องของฉันสักเท่าไร..."
1002705-55 = "แต่ว่ามัน... อืม... แบบนี้เองสินะ ฉันคงใส่ชุดอื่นโดยไม่จำเป็นสินะ... นั่นสินะ"
1002705-56 = "พอมาคิดดูแล้ว เพราะแผนการปฏิบัติงาน เวลาปฏิบัติงานใน C&C เลยทำให้ใส่แต่ชุดเมดอยู่ตลอด..."
1002705-57 = "ฉันแทบไม่ได้ใส่ชุดนักเรียนเลยเหมือนกัน... เสื้อผ้าแบบอื่นๆ ก็ด้วย..."
1002705-58 = "ฮุฮุ นั่นสินะ นี่ฉันคงจะชอบชุดใหม่ไปโดยไม่รู้ตัวแล้วล่ะมั้ง"
1002705-59 = "น่าทึ่งจริงๆ เลยคุณครู สังเกตเห็นเรื่องพวกนี้ด้วยงั้นเหรอ เรื่องของฉันที่ตัวฉันเองยังไม่รู้เลยแท้ๆ..."
1002705-60 = "ขอถอนคำพูดที่เคยพูดไปเรื่องความไว้ใจแล้วกันนะ กลายเป็นว่าการที่ฉันพูดแบบนั้น ตอนนี้ยิ่งรู้สึก#nอับอายขึ้นไปใหญ่เลย"
1002705-61 = "เป็นคนที่ทำให้ฉันประหลาดใจได้ทุกครั้งเลยนะ สุดท้ายแล้วฉันก็เป็นคนที่ถูกช่วยเอาไว้ทุกครั้งเลย"
1002705-62 = "หืม...? ว่ายังไงนะ? มีเรื่องที่ฉันช่วยได้อยู่งั้นเหรอ? พูดจริงรึเปล่าน่ะ?"
1002705-63 = "อะไรนะ...? อยากดู... งั้นเหรอ?"
1002705-64 = "เฮ้อ... สุดท้ายก็เป็นคุณครูคนเดิมวันยังค่ำ"
1002705-65 = "ก็ได้... ถ้ามันจะทำให้คุณครูมีความสุขล่ะก็ ฉันก็จะยอมรับข้อเสนอนั้น"
1002705-66 = "ถ้างั้นช่วยออกไปข้างนอกก่อนได้มั้ย? ฉันจะเปลี่ยนชุดเดี๋ยวนี้แหละ"
1002705-67 = "[s] ออกมายืนรอด้านนอกห้องของคาริน"
1002705-77 = "เสร็จแล้วล่ะ... แบบนี้ใช้ได้มั้ย?"
1002705-78 = "อะ...อะไรน่ะ จะ...จ้องกันตาเยิ้มแบบนั้น มะ...มันน่าสงสัยนะ..."
1002705-79 = "วะ...ว่าแต่เป็นยังไงบ้าง...? คุณครูคิดว่ายังไงเหรอ...?"
1002705-80 = "หืม...?"
1002705-81 = "ถ้าได้สติแล้วก็บอกมาสิว่าคิดยังไง?"
1002705-82 = "ฮุฮุ... อา... แบบนั้นเองเหรอ... เข้าใจแล้ว"
1002705-87 = "อืม... แบบนี้เองสินะ"
1002705-88 = "ก็นะ... เหมือนที่คุณครูบอกจริงๆ ด้วย มันสนุกมากๆ เลยล่ะ"
1002705-90 = "อื้อ... ฉันรู้สึกแบบนั้นจริงๆ"

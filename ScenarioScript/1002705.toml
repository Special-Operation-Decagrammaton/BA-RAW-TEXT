1002705-51 = "3;카린;02;……아."
1002705-52 = "3;카린;01;……아아. 그런 거였나. 그렇군……. 응. 이해했다."
1002705-53 = "3;카린;99;선생님이……. 내 일에 대해 관심을 가져주고 있던 거였어. 나, 난 그런 줄도 모르고…….\n#3;em;…"
1002705-54 = "3;카린;01;사실은 누군가가 내게 관심을 가지고 내 일에 대해 말한 적은 별로 없었으니까……."
1002705-55 = "3;카린;99;그렇지만 음……. 그렇구나. 괜히 다른 옷을 입는 일이라……. 그렇네."
1002705-56 = "3;카린;01;생각해보면, 작전 때문에 계속 C&C에서 활동하느라 늘 이 메이드복만 입고 있었으니 말이지.\n#3;em;[반응]"
1002705-57 = "3;카린;02;학교 교복도 별로 입어본 적이 없고……. 다른 옷들도 거의 마찬가지였고……."
1002705-58 = "3;카린;03;……후훗. 그런가. 나도 모르게 무의식적으로 새 옷을 선호하고 있었던 건가.\n#3;em;[음표]"
1002705-59 = "3;카린;03;놀라운 걸, 선생님. 그런 걸 눈치 채고 있었던 건가. 나도 몰랐던 나에 대해서까지……."
1002705-60 = "3;카린;01;신뢰가 어쩌고 했던 말은 다 철회해야겠어. 오히려 그런 말을 했다는 사실들이 이제 와선 더 부끄러워졌다."
1002705-61 = "3;카린;99;정말 매번 놀라게 만드는 사람이야. 어떻게 해도 결국엔 내가 도움을 받는 형태로 끝나는군.\n#3;em;…"
1002705-62 = "3;카린;01;……음? 뭐라고? 아직 내쪽에서도 도와줄 수 있는 방법이 남아 있다고? 정말인가?"
1002705-63 = "3;카린;02;……뭐? ……보고 싶다고?\n#3;em;[?]"
1002705-64 = "3;카린;06;후……. 정말이지 끝까지 선생님다운 사람이로군, 선생님은.\n#3;stiff"
1002705-65 = "3;카린;03;……뭐, 좋아. 그걸로 선생님이 기쁘다면 나로서는 수락할 만한 제안이지.\n#3;em;[음표]"
1002705-66 = "3;카린;02;그럼 잠시만 자릴 좀 비워 주겠어? 금방 갈아입도록 할 테니."

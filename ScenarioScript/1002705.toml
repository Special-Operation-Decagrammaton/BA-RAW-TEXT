1002705-31 = "3;카린;02;음……? 받지 않는 거야? 왜지……?\n#3;closeup"
1002705-32 = "3;카린;06;아, 아직까지 내 신뢰가 그렇게까진 안 쌓인 건가? 그렇지만 이렇게 찾아오기까지 했으면서…….\n#3;stiff\n#3;em;[속상함]\n#3;closeup"

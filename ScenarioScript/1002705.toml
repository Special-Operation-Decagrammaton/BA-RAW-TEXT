1002705-1 = "#title;생각지 못한 결론"
1002705-2 = "#na;(카린의 안내를 받아 도착한 곳은 다름아닌 카린의 방이었다. 방 안은 굉장히 깔끔했다.)"
1002705-3 = "#na;(카린은 평소와 같은 모습이었지만, 어딘가 조금 더 비장한 얼굴을 하고 있었다.)"

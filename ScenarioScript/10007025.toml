10007025-56 = "1;노도카 온천 온천장ND;03;227호 온천장에 오신 것을 환영합니다, 체리노 회장님.\n#1;em;[반짝]\n#1;greeting"
10007025-57 = "1;노도카 온천 온천장ND;01;저희 227호 온천장에서 평소에 쌓였던 피로를 푸시고 즐겁게 돌아가시길 바랍니다."
10007025-58 = "3;체리노;05;말 돌리지 말고! 게다가 어느 틈에 동아리 이름을 227호 온천장으로 바꾼 거야?\n#3;hophop\n#1;m1"
10007025-59 = "1;노도카 온천 온천장ND;09;어차피 227호 특별반도 인가되지 않은 동아리니, 저희가 이름으로 무엇을 쓰는지는 상관없잖아요?\n#1;em;[빠직]"
10007025-60 = "1;노도카 온천 온천장ND;15;저희는 더 이상 패배주의에 젖은 특별반의 정학생이 아니에요!"

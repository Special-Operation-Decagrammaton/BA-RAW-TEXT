[translation]
10007025-1 = "第2話;歡迎光臨227號溫泉浴場！"
10007025-5 = "227號溫泉浴場．入口"
10007025-8 = "這，這是……"
10007025-9 = "這到底是……！？"
10007025-10 = "[s]「好厲害，真是豪華的溫泉浴場呢。」"
10007025-11 = "現，現在不是佩服的時候，同志！"
10007025-12 = "舊校舍別說是建造溫泉浴場的木材了，應該連當柴火的木頭都不夠才對……#n既然如此，是在什麼時候建造了如此豪華的溫泉浴場……"
10007025-19 = "哈啊……這裡的溫泉真是不錯呢。"
10007025-20 = "就是啊。而且店裡賣的奶茶味道也是一絕。#n果然裝在瓶子裡的味道感覺就是有點不一樣呢。都想請他們來三一賣了呢！"
10007025-21 = "對啊，讓人之後還想再來呢。"
10007025-26 = "沒想到赤冬竟然會有這麼棒的溫泉……老實說真是嚇到我了。"
10007025-27 = "在露天溫泉眺望雪景……這點在格黑娜果然還是做不到呢。"
10007025-31 = "這，這不是連其他學校的學生都來了嗎！"
10007025-32 = "居然把舊校舍變成觀光勝地吸引其他學校的學生，咱可不記得允許過這種事！？"
10007025-34 = "而且竟然還比咱嘔心瀝血建設的「白鬍子遊樂園」還有人氣……"
10007025-35 = "唔唔！特別班的傢伙們在哪裡？咱要肅清他們！"
10007025-40 = "真是的，從剛才開始就在吵什麼呢？#n聲音都傳遍整個溫泉浴場了，這樣我們會很困擾的。"
10007025-41 = "就算是客人，如果要妨礙營業的話……"
10007025-45 = "呃，老師！？還有潔莉諾會長！？"
10007025-46 = "為，為什麼會來這裡？"
10007025-47 = "[s1]「啊，和香。和服很適合你哦。」\n[s2]「聽說這裡有新的溫泉能泡。」"
10007025-48 = "等等！「為什麼」是咱的台詞吧！"
10007025-49 = "等等！「為什麼」是咱的台詞吧！"
10007025-50 = "這個溫泉浴場是怎麼回事！舊校舍到哪去了！？"
10007025-51 = "呃，那個嘛……"
10007025-56 = "……咳咳。潔莉諾會長，歡迎您大駕光臨227號溫泉浴場。"
10007025-57 = "請務必在我們227號溫泉浴場洗淨您日日累積下來的疲勞哦。"
10007025-58 = "不要轉移話題！而且這裡什麼時候變成「227號溫泉浴場」了！#n這種事咱可沒聽說過哦！"
10007025-59 = "反，反正「227號特別」班也不是什麼正式的組織嘛！"
10007025-60 = "不管我們想怎麼改變，又想在這裡做什麼，基本上都是我們的自由吧！"
10007025-61 = "我們已經不再只是一味受到虐待的存在了……#n自從經營起這座溫泉浴場後，我們有了巨大的改變。"
10007025-62 = "多虧從奇普托斯各地特地前來光顧的客人，我們總算脫離了困苦的生活。"
10007025-63 = "別說是布丁了，就連麵包的數量都必須擔心……#n對現在的我們來說，那已經是遙遠的往事了……！"
10007025-64 = "因為現在的我，富裕到每餐之後都能吃兩個布丁！"
10007025-65 = "什……居，居然能吃兩個布丁！？"
10007025-66 = "[s]「呃……那是很厲害的事嗎？」"
10007025-67 = "當然囉。在赤冬聯邦學園裡，每餐能吃兩個布丁的一直都只有潔莉諾會長而已。"
10007025-68 = "而且為了能觀測更美麗的星空和各種美好的事物，#n我還買了很多望遠鏡的新型鏡頭！"
10007025-69 = "除此之外……還做了什麼呢……"
10007025-70 = "因為錢實在太多了，老實說已經記不清楚花到哪去了……#n反而有點困擾呢。呵呵……"
10007025-75 = "唔唔……不可原諒……"
10007025-76 = "咱是為了讓你們反省才送你們去舊校舍，竟敢在這裡享受跟咱一樣豪華的生活……！"
10007025-77 = "肅清！我現在就用「肅清君1號」把這座溫泉浴場撤除！"
10007025-78 = "請，請等一下！請您千萬別這麼做！"
10007025-79 = "我們好不容易才苦盡甘來，不用再過著有一餐沒一餐的生活……#n只因為羨慕就要撤除我們的溫泉浴場，這樣太過分了！"
10007025-80 = "而且真要說起來，就算讓我們經營溫泉浴場，#n也不會對潔莉諾會長和事務局造成任何困擾不是嗎？"
10007025-81 = "是，是那樣沒錯啦……"
10007025-82 = "但是不行就是不行！就算沒有造成實際的損害，#n一介普通學生竟然享受著這麼奢華的生活，#n要是認同的話咱這個書記長的面子要往哪裡擺！"
10007025-83 = "唔……既然如此，雖然我本來不想用這招的……"
10007025-88 = "時雨醬，把「那個」拿過……把那個拿來！"
10007025-90 = "什，什麼？想對咱做什麼過分的事嗎！？"
10007025-96 = "來。這是為潔莉諾會長特別準備的特製「鬍子溫泉饅頭」唷。"
10007025-97 = "嗯？什麼嘛，想賄賂啊……？"
10007025-98 = "雖然畫了鬍子，也不過就是普通的溫泉饅頭而已。#n居然想用這種東西收買咱，真是太天真了。"
10007025-99 = "別那麼說，先吃吃看吧。說不定想法會有所改變唷？"
10007025-100 = "哼。怎麼可能會因為區區的溫泉饅頭就改變想法……"
10007025-108 = "好好吃！？"
10007025-109 = "鬆軟又有嚼勁的麵皮配上溼潤又滑順的內餡……兩者取得了巧妙的平衡……！#n這種饅頭咱從來沒吃過！"
10007025-110 = "因為溫泉帶來的利潤讓我們購買了許多高級食材，所以才能做出最高級的饅頭。"
10007025-111 = "這個饅頭之前也獲得了其他學校美食家們的認同。"
10007025-112 = "您意下如何啊，潔莉諾會長？ "
10007025-113 = "如果您願意對溫泉浴場的經營睜一隻眼閉一隻眼，#n除了免費入場外，還能盡情享用這個「鬍子溫泉饅頭」唷？"
10007025-114 = "……那，那就沒辦法了。偉大的最高領導者就該聽取學生們的願望……#n既然你們都這麼說了，這次就特別放過你們吧！"
10007025-115 = "但是，絕對不是因為想吃溫泉饅頭才這麼做哦！"
10007025-117 = "請等一下。就算潔莉諾會長願意睜一隻眼閉一隻眼，#n這個溫泉浴場的建築依舊違反了規定。"
10007025-118 = "沒錯。為了赤冬聯邦學園的風紀以及事務局的權威著想，#n這種違法建築物就應該立刻──"
10007025-123 = "智惠同學。其實我們這裡有個可以大家一起泡湯的溫泉。"
10007025-124 = "請勞累的智惠同學務必和潔莉諾會長一起享受……怎麼樣啊？"
10007025-125 = "什麼……！和潔莉諾會長一起泡溫泉……？"
10007025-126 = "啊啊，這麼說來對面的露天溫泉常常會有熊跑過來。"
10007025-127 = "如果能和毛茸茸的熊一起泡露天溫泉的話，一定會很開心吧……"
10007025-128 = "你，你說毛茸茸的熊……！？"
10007025-129 = "呼呣……真，真沒辦法呢。仔細想想，#n赤冬聯邦學園裡有個溫泉浴場好像也不是件壞事……"
10007025-130 = "就，就是啊。為了保安委員們的士氣著想，有個入浴設施也不錯嘛。"
10007025-131 = "……絕對不是因為想和熊一起泡露天溫泉！"
10007025-132 = "好的！那麼請招待赤冬聯邦學園事務局的3位貴賓！"
10007025-133 = "更衣室在這裡唷～"
10007025-137 = "呼……總算是成功說服那些奧客了。"
10007025-138 = "啊，我的意思不是說老師是奧客！"
10007025-139 = "不如說老師能來我們很高興！"
10007025-140 = "[s3]「話說回來，真是個厲害的地方呢。」\n[s4]「來了很多學生，非常熱鬧呢。」"
10007025-141 = "是的，雖然因此忙碌了起來……不過和先前相比，能做的事也增加了。"
10007025-142 = "是的，雖然因此忙碌了起來……不過和先前相比，能做的事也增加了。"
10007025-143 = "像是吃很多高級的零食、更新望遠鏡的老舊鏡頭……"
10007025-144 = "還能以管理溫泉的名義，偷看到各種東西……#n接下來甚至還能清楚的看到老師的 ……"
10007025-145 = "……啊！"
10007025-146 = "剛，剛才說的請當作沒聽見！"
10007025-147 = "[s]「……總覺得開始擔心起來了。」"
10007025-148 = "不不不，請放一百二十個心！227號溫泉浴場會全力為您服務的！"
10007025-157 = "來，請用這套浴衣。"
10007025-158 = "我用經理的權限為老師特別準備了專用的露天溫泉。"
10007025-159 = "請您優～哉地、慢～慢地享受溫泉吧！"
10007025-160 = "……呵呵，老師的入浴畫面……哈啊，哈啊……"
10007025-167 = "（一邊承受著和香詭異的視線一邊走向了露天溫泉……）"

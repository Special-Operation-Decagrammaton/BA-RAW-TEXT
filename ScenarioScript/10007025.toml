10007025-122 = "1;노도카 온천 온천장ND;01\n5;시구레 온천 온천장ND;01\n4;마리나;02\n2;토모에;05\n#4;stiff\n#2;stiff\n#4;h\n#2;h\n#wait;1500"
10007025-123 = "1;노도카 온천 온천장ND;03;토모에 님. 저희 온천장에는 여러 사람이 함께 들어갈 수 있는 대형 욕탕도 있답니다.\n#1;hophop\n#1;em;[음표]"

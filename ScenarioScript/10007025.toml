[translation]
10007025-1 = "Episode 2;Welcome to Hot Springs Resort No. 227!"
10007025-5 = "Hot Springs Resort Entrance"
10007025-8 = "Wh-Wh-Wh-"
10007025-9 = "What is this monstrosity?!"
10007025-10 = "[s] \"It's a rather impressive resort. They've done great.\""
10007025-11 = "How dare you admire illegal activity, Comrade!"
10007025-12 = "The Spec Ops students should be living as I desired, miserable with not even a twig for a campfire. Not lavishing in luxurious resorts..."
10007025-19 = "*sigh* That was an amazing bath."
10007025-20 = "Did you try the bottled milk tea from the store? It was so yummy!"
10007025-21 = "Let's visit again next winter."
10007025-26 = "Honestly, my expectations weren't high but I'm really surprised."
10007025-27 = "With all the snowy scenery, it might even beat out Gehenna's hot springs."
10007025-31 = "Are those students from other schools?!"
10007025-32 = "You mean to tell me an illegal building the Secretariat has not sanctioned, one that I learned the existence of only today..."
10007025-34 = "...has become a tourist attraction more popular than my White Mustache Theme Park?"
10007025-35 = "Even my mustache feels my fury! I will purge every last student involved with this atrocity!"
10007025-40 = "Who is causing a ruckus in front of our establishment?"
10007025-41 = "Even if you're a guest, if you're disrupting our business, we have no choice but to..."
10007025-45 = "President Cherino? And Sensei as well?!"
10007025-46 = "Wh-Wh-What brings you here?"
10007025-47 = "[s1] \"Hello, Nodoka. I like your kimono.\"\n[s2] \"I wanted to take a bath.\""
10007025-48 = "I'm the one asking questions here!"
10007025-49 = "I'm the one asking questions here!"
10007025-50 = "If you don't wish to be purged in the next 7.34 seconds, explain yourself and your illegal activities immediately!"
10007025-51 = "Uh, so... Ummm..."
10007025-56 = "Hello and welcome to the Hot Springs Resort No. 227, O Great Leader!"
10007025-57 = "We are here to serve your every whim and fancy, so you go home refreshed, relaxed, and ready to tackle a new day!"
10007025-58 = "You can't charm your way out of this. And how dare you change the name of the club without my permission! Hot Springs Resort No. 227? How ridiculous!"
10007025-59 = "The Spec Ops No. 227 wasn't an actual club anyway, just your impulse! So we'll call ourselves what we want!"
10007025-60 = "We, the members of the Spec Ops, aren't who we used to be!"
10007025-61 = "The hot springs took us from disillusioned suspended students with no hopes for a future, to this!"
10007025-62 = "Poverty became a thing of the past once we gained popularity across Kivotos."
10007025-63 = "Do you remember? You left us with two sticks to rub together and stale bread to stomach."
10007025-64 = "But guess what? Now I eat two whole puddings! With every meal!"
10007025-65 = "Did she say two puddings?"
10007025-66 = "[s] \"Two doesn't seem like that much...\""
10007025-67 = "Well, before, there was only one person in all of Red Winter Academy who could afford two puddings at every meal."
10007025-68 = "But now, I get two puddings, and new telescope lenses that let me zoom in from super far away!"
10007025-69 = "Hm... let's see... What else has changed..."
10007025-70 = "Honestly, we're so filthy rich I can't spend the money fast enough."
10007025-75 = "I won't stand for this."
10007025-76 = "I sent you here for punishment. You were meant to reflect on your rebellious behaviors and instead you're living like royalty eating pudding whenever you please."
10007025-77 = "Ready the Purginator No. 1! I'll make you watch as I purge your precious hot springs resort, and then I'll purge you!"
10007025-78 = "A-Are you crazy?! Please, please stop!"
10007025-79 = "I've suffered, cried, and struggled for so many years. And now, you want to take away the smallest happiness I've found in this little corner of life?"
10007025-80 = "And anyways, we're not causing any trouble here for President Cherino or the Secretariat, right?"
10007025-81 = "I-I suppose not, but..."
10007025-82 = "No! I won't allow it! Your luxuries threaten my authority as the Great Leader. If other students see this, they will rise in rebellion with you at the head."
10007025-83 = "Hmph. You leave me no choice."
10007025-88 = "Shigure, bring it out!"
10007025-90 = "What are you saying? Tomoe, she's threatening me!"
10007025-96 = "Hello, President Cherino. Please don't be alarmed, this is just the Mustache Hot Springs Manju I've been preparing just for you."
10007025-97 = "A bribe, you say?"
10007025-98 = "You may think you can sway me with its mustache design, but you've sorely underestimated me if you think I'll be moved by some second-rate manju made by you outcasts."
10007025-99 = "Why don't you just give it a try?"
10007025-100 = "You're awfully confident of some boring old snack from a gross old hot spring."
10007025-108 = "It's sweet?!"
10007025-109 = "What a perfect, soothing combination. The soft and chewy bread mixes with the smooth paste in an irresistible match."
10007025-110 = "Don't you think so? The profits provided by this resort allow us to invest in only the highest quality ingredients, just for the president."
10007025-111 = "I made sure to gain approval of gourmands all over Kivotos before I dared serve it to our Great Leader."
10007025-112 = "What do you say, President Cherino? "
10007025-113 = "If you accept our hot springs resort, our exclusive hot springs manju will be at your disposal, as well as free tickets whenever you please."
10007025-114 = "Hmph, well naturally I cannot simply ignore such earnest, sincere requests."
10007025-115 = "And this has nothing to do with the delicious Mustache Hot Springs Manju!"
10007025-117 = "While I respect President Cherino's opinion, I simply cannot allow this to pass. It remains that this is an illegal resort built without the Secretariat's permission."
10007025-118 = "I am in agreement. Such a building is a threat to the Secretariat's authority and Red Winter Academy itself."
10007025-123 = "Tomoe, beautiful, darling Tomoe. Did you know this resort has a bath so large it allows for communal bathing?"
10007025-124 = "Just imagine, you, President Cherino, a communal bath. A closeness you never could have imagined with Great Leader Cherino."
10007025-125 = "A bath...? With President Cherino?"
10007025-126 = "I suddenly remembered, just yesterday I was in the open-air bath and came across a giant bear enjoying the facilities."
10007025-127 = "The snowy landscape, a warm bath, the bear's fluffy fur... It was really an incredible experience."
10007025-128 = "A bath with a fluffy bear?"
10007025-129 = "Upon further consideration, I do believe Red Winter Academy could benefit from the existence of a hot springs resort."
10007025-130 = "Such bathing facilities can be considered a necessity for the health and cleanliness of the Security Council members. "
10007025-131 = "As well as fluffy bears, although that is none of my concern."
10007025-132 = "I agree wholeheartedly with your observations, wise Secretariat members! Please, allow us to guide you inside."
10007025-133 = "The changing room is this way!"
10007025-137 = "Phew, that nonsense's finally over with."
10007025-138 = "I-I-I didn't mean you were an inconvenience or anything, Sensei!"
10007025-139 = "I'm actually really happy you came."
10007025-140 = "[s3] \"You've done a great job here.\"\n[s4] \"I'm glad you seem a little happier at the Former Institute now.\""
10007025-141 = "Yes, thanks to the resort, I am busier than before, but... I've been able to do so many things I've always wanted to!"
10007025-142 = "Yes, thanks to the resort, I am busier than before, but... I've been able to do so many things I've always wanted to!"
10007025-143 = "Can you believe I finally got to get new lenses for my telescope? And did you see Cherino's face when I said I eat two puddings with every meal?"
10007025-144 = "And using bath maintenance as an excuse to watch students from other schools bathe... "
10007025-145 = "...Ah!"
10007025-146 = "P-Pretend you didn't hear that part! Poof! Erase it!"
10007025-147 = "[s] \"...I'm suddenly apprehensive about this.\""
10007025-148 = "N-No reason to be, Sensei! At Hot Springs Resort No. 227, we always put the comfort of our guests first."
10007025-157 = "Please, take this robe!"
10007025-158 = "Let me give you a private tour, from the manager herself."
10007025-159 = "I'll even take you to a private bath, just for Sensei."
10007025-160 = "*pant* *pant*"
10007025-167 = "With Nodoka's piercing gaze behind me, I headed to the open-air bath..."

[translation]
10007025-1 = "ตอนที่ 2;ยินดีต้อนรับสู่ออนเซ็น No.227!"
10007025-5 = "ทางเข้าออนเซ็น"
10007025-8 = "นี่มัน..."
10007025-9 = "ทั้งหมดนี่เลยเรอะ!"
10007025-10 = "[s] \"ออนเซ็นนี่สวยมากเลยนะ\""
10007025-11 = "มะ...ไม่ใช่เวลามามัวชื่นชมนะสหาย!"
10007025-12 = "เรามั่นใจว่าที่อาคารเรียนเก่านี่น่าจะมีต้นไม้ไม่พอให้ก่อฟืนเลยด้วยซ้ำ เพราะงั้นไม่ต้องคิดเรื่อง#nสร้างออนเซ็นเลย แล้วทำไมถึงได้สร้างออนเซ็นหรูหราแบบนี้ออกมาได้..."
10007025-19 = "ฮ่า... ออนเซ็นที่นี่ดีจริงๆ เลยนะคะ"
10007025-20 = "แถมชานมแบบขวดที่ขายอยู่ด้านหน้าก็รสชาติอร่อยมากๆ จนอยากรู้เคล็ดลับวิธีทำเลยทีเดียวค่ะ"
10007025-21 = "ฤดูหนาวปีหน้าคงต้องมาใหม่แล้วละค่ะ"
10007025-26 = "น่าตกใจจริงๆ นะที่สหภาพเรดวินเทอร์มีออนเซ็นดีๆ แบบนี้ด้วย..."
10007025-27 = "บ่อออนเซ็นกลางแจ้งที่มีหิมะล้อมรอบแบบนี้ ทำให้บรรยากาศดูงดงามกว่าออนเซ็นของเกเฮนน่าอีก"
10007025-31 = "มีนักเรียนของโรงเรียนอื่นมาด้วยเหรอเนี่ย?!"
10007025-32 = "เห็นเป็นที่ท่องเที่ยวกันรึไง? ห้ะ ที่นี่เป็นสถานที่ท่องเที่ยวรึไง!"
10007025-34 = "อืม... ดูเหมือนที่นี่จะมีชื่อเสียงกว่า <สวนสนุกหนวดขาว> ที่เราจัดขึ้นเมื่อก่อนอีก... "
10007025-35 = "ฮึ่ม! พวกเด็กนักเรียนห้องเรียนพิเศษหายไปไหนกันหมด? เราจะกวาดล้างให้หมดเลย!"
10007025-40 = "เฮ้อ เสียงดังกันจัง ใครมาส่งเสียงโวยวายอยู่ที่ด้านหน้าออนเซ็นกันคะ? ไม่เป็นสุภาพชนเลยนะคะ"
10007025-41 = "ถึงจะเป็นลูกค้าที่มาใช้บริการก็ตาม แต่ถ้ามาขัดขวางการให้บริการลูกค้าท่านอื่นแบบนี้..."
10007025-45 = "เอ๋? ประธานเชริโน่กับคุณครูเหรอ?!"
10007025-46 = "มะ...มะ...มาทำอะไรที่นี่เหรอคะ?"
10007025-47 = "[s1] \"หวัดดีโนโดกะ ชุดกิโมโนสวยจัง\"\n[s2] \"ครูว่าจะมาแช่ออนเซ็นเปิดใหม่สักหน่อยน่ะ\""
10007025-48 = "คนที่ต้องเป็นฝ่ายถามน่ะมันพวกเราต่างหาก!"
10007025-49 = "คนที่ต้องเป็นฝ่ายถามน่ะมันพวกเราต่างหาก!"
10007025-50 = "ออนเซ็นพวกนี้มันอะไรกัน! เกิดอะไรขึ้นกับอาคารเรียนเก่าน่ะ?!"
10007025-51 = "เอ่อ... คือว่าเรื่องนั้น..."
10007025-56 = "ยินดีต้อนรับสู่ออนเซ็น No.227 ค่ะท่านประธานเชริโน่"
10007025-57 = "ทางเราหวังว่าออนเซ็น No.227 ของเราจะช่วยให้ท่านประธานจะได้ผ่อนคลายความเหนื่อยล้า#nและกลับไปอย่างมีความสุขนะคะ"
10007025-58 = "ไม่ต้องมาเปลี่ยนเรื่องเลยนะ! อีกอย่าง... ไปเปลี่ยนชื่อชมรมเป็น \"ออนเซ็น No.227\" ตอนไหนกัน?"
10007025-59 = "ยังไงห้องห้องพิเศษ 227 ก็เป็นชมรมที่ยังไม่ได้รับอนุญาตอยู่แล้ว เพราะงั้นพวกเราจะใช้ชื่ออะไรก็ได้ใช่มั้ยล่ะคะ?"
10007025-60 = "พวกเราไม่ใช่พวกขี้แพ้ที่ถูกพักการเรียนอีกต่อไปแล้วค่ะ!"
10007025-61 = "ตั้งแต่เรามาดูแลออนเซ็นแห่งนี้ ชีวิตของพวกเราก็เปลี่ยนไปมากค่ะ"
10007025-62 = "พอมีลูกค้าจำนวนมากจากทั่วทั้งคิโวทอสมาแบบนี้... พวกเราก็ไม่ต้องจมอยู่กับความจนอีกแล้วค่ะ"
10007025-63 = "เมื่อก่อนพวกเราต้องกังวลเรื่องจำนวนอาหารกันอยู่ตลอด#nไม่ต้องพูดถึงพุดดิ้งที่แทบจะไม่ได้กินเลย..."
10007025-64 = "แต่ว่าตอนนี้พวกเรามีเงินพอจนกินพุดดิ้งได้คนละสองถ้วยทุกมื้อเลยค่ะ!"
10007025-65 = "พะ...พุดดิ้งสองถ้วยเลยเรอะ?!"
10007025-66 = "[s] \"เรื่องนั้นมันสุดยอดมากเลย...งั้นเหรอ?\""
10007025-67 = "ใช่แล้วค่ะ เพราะที่สหภาพเรดวินเทอร์ คนที่จะได้กินพุดดิ้งสองถ้วยทุกมื้อจะมีแต่ประธานเชริโน่#nเท่านั้นค่ะ"
10007025-68 = "นอกจากนี้ ฉันก็ซื้อเลนส์กล้องโทรทรรศน์มาใหม่แล้วด้วย เพื่อที่จะส่องได้ไกลขึ้นกว่าเดิมค่ะ!"
10007025-69 = "แล้วก็... มีอะไรอีกนะ..."
10007025-70 = "อ๊าาา~ ตอนนี้เราเริ่มเดือดร้อนเพราะมีเงินมากเกินไปค่ะ ฮิฮิ..."
10007025-75 = "อึ่ก... ยอมไม่ได้เด็ดขาด..."
10007025-76 = "พวกเธอถูกส่งมาให้ทบทวนตัวเองอยู่ที่อาคารเรียนเก่า แต่กลับมาใช้ชีวิตหรูหราอู้ฟู่สุขสบายกัน#nแบบนี้น่ะเหรอ... เรื่องแบบนี้ยอมไม่ได้เด็ดขาด!"
10007025-77 = "ต้องกวาดล้างให้หมด! เราจะใช้ <ผู้กวาดล้าง No.1> ถล่มออนเซ็นให้ราบคาบเลย!"
10007025-78 = "ดะ...เดี๋ยวก่อนสิคะ! ช่วยอดทนไว้ก่อนนะคะ!"
10007025-79 = "พวกเราอุตส่าห์ได้มีชีวิตสุขสบายบ้างหลังจากอดทนทำงานหนักมาตั้งนาน จะใช้เรื่องนั้นมาเป็น#nเหตุผลในการรื้อถอนออนเซ็น มันก็เกินไปหน่อยนะคะ!"
10007025-80 = "...ถึงพวกเราจะเปิดออนเซ็นที่นี่ แต่ก็ไม่ได้สร้างความเสียหายให้กับประธานเชริโน่ หรือสำนักเลขาธิการสักหน่อยนี่คะ"
10007025-81 = "มะ...มันก็จริงอยู่..."
10007025-82 = "แต่ยังไงก็ไม่ได้! ถึงจะไม่ได้สร้างความเสียหายก็จริง แต่ถ้าอนุญาตให้ใช้ชีวิตที่หรูหราอู้ฟู่แบบนี้ละก็ มันจะเป็นการบั่นทอนอำนาจของประธานนักเรียนอย่างเรา!"
10007025-83 = "อืม... ฉันไม่อยากใช้วิธีนี้เลยนะคะ..."
10007025-88 = "ชิกุเระจัง ช่วยเอา \"ไอ้นั่น\" มาหน่อย"
10007025-90 = "อะ...อะไรน่ะ? คิดจะทำอะไรร้ายกาจกับเรารึไง?!"
10007025-96 = "<ออนเซ็นมันจูรูปหนวด> สุดพิเศษสำหรับประธานเชริโน่เลยนะ"
10007025-97 = "หืม? คิดจะติดสินบนเรางั้นเหรอ?"
10007025-98 = "คิดจะใช้ออนเซ็นมันจูที่มีรูปหนวดวาดติดอยู่มาเกลี้ยกล่อมเรางั้นเหรอ... เพราะแบบนี้#nพวกยาจกในห้องเรียนพิเศษคงไม่มีทางเลือกจริงๆ สินะ"
10007025-99 = "ฮิฮิ ถ้าลองชิมดูแล้วอาจจะเปลี่ยนใจก็ได้นะ"
10007025-100 = "มันจูที่กินที่ออนเซ็นจะไปอร่อยได้ยังไง..."
10007025-108 = "อะ...อะไรกัน? รสชาติหวานแบบนี้!"
10007025-109 = "การผสมผสานของความเหนียวนุ่มฟูของขนมปังแบบนี้... ทำให้อดใจไม่ไหวจริงๆ!"
10007025-110 = "เราใช้เงินที่หาได้จากการเปิดบริการออนเซ็นไปซื้อวัตถุดิบราคาแพงจำนวนมากและทำสุดยอดมันจู#nขึ้นมายังไงล่ะ!"
10007025-111 = "แน่นอนว่ารสชาติไม่เป็นสองรองใคร เพราะได้รับการรับรองรสชาติจากพวกนักชิมทั่วคิโวทอสมาแล้ว"
10007025-112 = "เป็นยังไงบ้างคะท่านประธานเชริโน่? "
10007025-113 = "ถ้าช่วยมองข้ามเรื่องการเปิดให้บริการออนเซ็นไปละก็ ท่านจะรับประทานออนเซ็นมันจู และใช้บริการออนเซ็นได้ตามที่ต้องการเลยนะคะ!"
10007025-114 = "ฮึ่ม... ช่วยไม่ได้นะ... เราคงจะมองข้ามความตั้งใจนี้ไม่ได้..."
10007025-115 = "แต่ไม่ใช่เพราะว่าเราอยากกินออนเซ็นมันจูหรอกนะ!"
10007025-117 = "เดี๋ยวก่อนค่ะ ถึงท่านประธานเชริโน่บอกว่าจะทำเป็นไม่รู้ก็ตาม แต่ออนเซ็นแห่งนี้ก็สร้างขึ้นมา#nโดยไม่ได้รับอนุญาตจากทางสำนักเลขาธิการนะคะ"
10007025-118 = "ใช่แล้ว เพื่อรักษาอำนาจของสำนักเลขาธิการและความสงบสุขของสหภาพเรดวินเทอร์#nอาคารที่ผิดกฎหมายแบบนี้ต้องรีบจัด---"
10007025-123 = "คุณโทโมเอะคะ ที่ออนเซ็นของเรามีบ่อออนเซ็นขนาดใหญ่ที่สามารถลงไปแช่ด้วยกันได้อยู่ด้วยค่ะ"
10007025-124 = "เป็นโอกาสที่จะได้คอยดูท่านประธานเชริโน่แช่น้ำอยู่ข้างๆ เลยนะคะ... คุณโทโมเอะเองก็ลงไปแช่ออนเซ็นด้วยเลยดีไหมคะ?"
10007025-125 = "ชะ...แช่น้ำกับท่านประธานเชริโน่...?"
10007025-126 = "อ่า... พอมาคิดๆ ดูแล้ว พวกหมีมักจะมาแช่น้ำที่บ่อออนเซ็นกลางแจ้งตรงนั้นบ่อยๆ นะ..."
10007025-127 = "ถ้าได้ลงแช่น้ำในบ่อออนเซ็นกลางแจ้งกับพวกหมียักษ์ที่มีขนนุ่มๆ ละก็คงเพลินน่าดูเลยนะ..."
10007025-128 = "แช่น้ำกับหมียักษ์ขนนุ่มๆ เหรอ...?"
10007025-129 = "ฮึ่ม... ชะ...ช่วยไม่ได้นะคะ! บางทีการมีออนเซ็นอยู่ที่สหภาพเรดวินเทอร์บ้างก็อาจเป็นเรื่องดี#nก็ได้นะคะ..."
10007025-130 = "ฮึ่ม ฮึ่ม... ถ้าเพื่อรักษาความสะอาดของสมาชิกคณะความมั่นคง มีอุปกรณ์อาบน้ำดีๆ ก็ไม่เลว#nเหมือนกัน... "
10007025-131 = "...บอกไว่ก่อนเลยนะว่าไม่ใช่เพราะฉันอยากเห็นหมียักษ์ขนนุ่มมาแช่น้ำหรอกนะ!"
10007025-132 = "ค่ะ! ถ้างั้นจะพาลูกค้าจากสำนักเลขาธิการเรดวินเทอร์ทั้งสามไปด้านในเองค่ะ"
10007025-133 = "ห้องเปลี่ยนชุดอยู่ทางนี้ค่ะ..."
10007025-137 = "ฮู่ว... ในที่สุดก็จัดการแขกที่ไม่ได้รับเชิญได้สักทีนะคะ"
10007025-138 = "คะ...คุณครูไม่ได้รวมอยู่ใน \"แขกที่ไม่ได้รับเชิญ\" หรอกนะคะ!"
10007025-139 = "ฉันดีใจมากเลยนะคะที่คุณครูมา!"
10007025-140 = "[s3] \"ออนเซ็นที่นี่ดูดีมากเลยนะ\"\n[s4] \"ดีจังเลยน้าที่มีออนเซ็นที่อาคารเรียนเก่าแบบนี้\""
10007025-141 = "ค่ะ เพราะออนเซ็นแห่งนี้ทำให้ยุ่งกว่าตอนที่อยู่ที่อาคารเรียนเก่าเยอะเลยค่ะ... แต่ว่าก็ดีตรงที่#nได้ทำเรื่องที่เคยอยากทำหลายๆ อย่างเลยค่ะ"
10007025-142 = "ค่ะ เพราะออนเซ็นแห่งนี้ทำให้ยุ่งกว่าตอนที่อยู่ที่อาคารเรียนเก่าเยอะเลยค่ะ... แต่ว่าก็ดีตรงที่ได้ทำเรื่องที่เคยอยากทำหลายๆ อย่างเลยค่ะ"
10007025-143 = "ทั้งเรื่องที่ได้กินขนมราคาแพงได้จนจุใจ ทั้งได้เปลี่ยนเลนส์กล้องโทรทรรศน์ใหม่..."
10007025-144 = "แถมยังเอาเรื่องการดูแลบ่อออนเซ็นมาเป็นข้ออ้างแอบไปส่องนักเรียนโรงเรียนอื่นตอนอาบน้ำ... "
10007025-145 = "อ๊ะ...!"
10007025-146 = "ช่วยทำเป็นไม่ได้ยินเรื่องที่ฉันพูดไปเมื่อกี้ด้วยนะคะ!"
10007025-147 = "[s] \"ครูลงแช่น้ำได้แบบปลอดภัยแน่ใช่มั้ยนะ...?\""
10007025-148 = "กะ... ก็แน่น่ะสิคะ! ออนเซ็น No.227 ของเราคำนึงถึงความสะดวกสบายของลูกค้าเป็นอันดับ#nแรกอยู่แล้วค่ะ"
10007025-157 = "เอาละค่ะ เชิญรับชุดสำหรับแช่ออนเซ็นได้เลยค่ะ"
10007025-158 = "ในฐานะผู้จัดการของที่นี่ ฉันจะจัดห้องที่มีบ่อออนเซ็นส่วนตัวให้คุณครูเองค่ะ"
10007025-159 = "ถ้าอย่างนั้นก็... เชิญคุณครูลงแช่ออนเซ็นได้อย่างสบายๆ~ และแช่นานๆ~ เลยนะคะ!"
10007025-160 = "แฮ่ก...แฮ่ก..."
10007025-167 = "(คุณครูมองโนโดกะที่ทำสายตาน่าสงสัยและเปลี่ยนใจไปที่บ่อออนเซ็นกลางแจ้งแทน...)"

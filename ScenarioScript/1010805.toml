1010805-1 = "#title;애프터 다크"
1010805-2 = "#na;(밀레니엄 학생들의 고민 상담을 위해 밀레니엄 학원을 방문했다.)"
1010805-3 = "#na;(여러 학생들의 고민을 들어주다 보니 늦은 시간이 되어버리고 말았다……)"
1010805-4 = "#all;hide"
1010805-5 = "3;밀레니엄 모브 학생 A;03;선생님, 오늘 상담 들어주셔서 감사합니다!\n#3;a\n#3;em;[!]"
1010805-6 = "3;밀레니엄 모브 학생 A;02;덕분에 교정에 설치할 쓰레기통을 어떻게 디자인해야 할지 윤곽이 잡힌 것 같아요."
1010805-7 = "[s1] \"도움이 되었다면 다행이지만……\"\n[s2] \"무작정 폭발 기능을 추가하는 건 앞으로도 지양하도록 하자.\""

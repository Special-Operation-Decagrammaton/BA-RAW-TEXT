[translation]
1010805-1 = "黑夜之後"
1010805-2 = "（來到千年學園傾聽學生們的煩惱）"
1010805-3 = "（與許多學生諮商後，不知不覺就到了深夜……）"
1010805-5 = "老師，謝謝您今天幫我諮商！"
1010805-6 = "託您的福，我大概知道放在校園的垃圾桶該怎麼設計了。"
1010805-7 = "[s1]「能幫上忙真是太好了……」\n[s2]「但以後還是避免新增說爆炸就爆炸的功能吧。」"
1010805-10 = "話說把您留到這麼晚真是抱歉。"
1010805-11 = "老師從中午就開始諮商，應該也沒有好好吃飯……該怎麼辦才好？"
1010805-12 = "[s]「沒關係，我回夏萊再吃就好。」"
1010805-13 = "好的，那您路上小心！"
1010805-17 = "[ns3]（雖然說是這麼說，但現在確實很餓……）\n[ns4]（先到附近的便利商店簡單充飢一下再回去吧？）"
1010805-21 = "歡迎光臨天使24千年研究區域分店。"
1010805-22 = "您買的是……炸雞沙拉和吐司呢。#n現在要吃的話，需要幫您加熱嗎？"
1010805-23 = "[s]「嗯，請幫我加熱到酥酥脆脆的。」"
1010805-24 = "謝謝。歡迎下次再來！"
1010805-26 = "（就在簡單充飢後，正打算走出便利商店門口時）"
1010805-27 = "[ns5]（咦？那個學生是……）\n[ns6]「……優香？」"
1010805-31 = "― [log=유우카 파자마]哈呣，嚼嚼……真好初……[/log][wa:4510] "
1010805-34 = "― [log=유우카 파자마]唔，唔哇啊！？[/log][wa:500] "
1010805-38 = "― [log=유우카 파자마]老，老師？[/log][wa:1550] "
1010805-40 = "― [log=유우카 파자마]這個時間你怎麼會……？[/log][wa:940] "
1010805-43 = "― [log=유우카 파자마]那，那個……這個是，因為……[/log][wa:2580] "
1010805-45 = "― [log=유우카 파자마]我有點睡不著，所以就出來散步……[/log][wa:1850] "
1010805-48 = "― [log=유우카 파자마]結果那邊海報上的「天使炸雞」[/log][wa:1930] "
1010805-50 = "― [log=유우카 파자마]一下映入眼簾──[/log]"
1010805-53 = "― [log=유우카 파자마]但，但是，這也沒辦法吧？[/log][wa:1270] "
1010805-55 = "― [log=유우카 파자마]這個時段的天使炸雞，可是剛炸好的！[/log][wa:1470] "
1010805-58 = "― [log=유우카 파자마]熱呼呼又有滿滿的肉汁！[/log][wa:2600] "
1010805-60 = "― [log=유우카 파자마]怎麼可能不買！[/log][wa:890] "
1010805-63 = "― [log=유우카 파자마]所，所以那個……我其實，也不是天天都……[/log][wa:3220] "
1010805-65 = "― [log=유우카 파자마]會吃宵夜的…… [/log][wa:1790] "
1010805-68 = "― [log=유우카 파자마]那個……不介意的話……[/log][wa:2790] "
1010805-70 = "― [log=유우카 파자마]老師要不要也吃一口？[/log][wa:1720] "
1010805-74 = "[ns7]「謝謝，但我先不用了。」\n[ns8]「這個時間居然吃得下炸雞，高中生的腸胃真厲害……」"
1010805-77 = "請，請別捉弄我了！"
1010805-78 = "嗚嗚……早知道會在這裡遇到老師，我就選擇簡單的輕食了……"
1010805-79 = "比如蒟蒻果凍或豆腐餅乾之類的……"
1010805-80 = "[s]「最近還是不太好入睡嗎？」"
1010805-81 = "啊，這個嘛……"
1010805-82 = "……老實說是這樣沒錯。"
1010805-83 = "雖然我最近按照老師的建議，沒有強迫自己入睡……"
1010805-84 = "但是為了入睡而躺到床上的話，就會一直想東想西的。"
1010805-85 = "像是伺服器電腦的風扇不分晝夜轉動的聲音、#n從窗簾另一邊透進來的朦朧霓虹燈光、載滿貨物奔馳而過的卡車轟鳴聲……"
1010805-86 = "或者在這安靜的夜晚還是有人正為了明天而工作，我睡覺真的沒關係嗎……之類的。"
1010805-87 = "當然正是因為有人在熬夜工作，我才能舒適地休息……#n但就是有種疲憊的精神無法寄託於放鬆的身體的感覺。"
1010805-88 = "所以我想說乾脆讓身體累一點，於是就出來散散步……#n結果卻在吃油膩的便利商店炸雞，真是本末倒置。"
1010805-89 = "[s]「唔嗯，我覺得這是很棒的選擇啊。」"
1010805-93 = "[ns9]「為了睡眠，簡單散個步也是不錯的解決方法。」\n[ns10]「畢竟肚子太餓也會睡不著，所以吃點宵夜也不錯。」"
1010805-96 = "真的嗎……？"
1010805-97 = "老師總是會對學生說鼓勵的話，所以我有點難相信。"
1010805-98 = "[s11]「既然消化炸雞也需要時間……」\n[s12]「要不要一起散步，直到你消化完為止？」"
1010805-101 = "呵呵，好呀。"
1010805-102 = "那我向你介紹一條我常走的祕密路線。"
1010805-103 = "天色很暗，請一定要緊緊跟著我哦。"
1010805-105 = "（之後便和優香一起在千年人跡罕至的街道散步，度過了愉快的時間）"

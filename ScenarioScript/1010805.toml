[translation]
1010805-1 = "After Dark"
1010805-2 = "I visited Millennium to consult with students regarding their concerns."
1010805-3 = "As I advised student after student, it got later than I expected."
1010805-5 = "Sensei, thank you for speaking to us today!"
1010805-6 = "Thanks to you, I have a much clearer idea of how to design the trash cans we're installing on campus."
1010805-7 = "[s1] \"I'm glad I could help.\"\n[s2] \"But let's please refrain from any explosive features in the future.\""
1010805-10 = "I'm sorry for keeping you here so late."
1010805-11 = "You've been here since lunch. Were you able to eat anything?"
1010805-12 = "[s] \"It's okay. I'll eat when I get back to Schale.\""
1010805-13 = "Okay then, please take care."
1010805-17 = "[ns3] \"(Despite what I said, I'm actually really hungry...)\" \n[ns4] \"(Maybe I should grab a quick bite at the convenience store nearby.)\""
1010805-21 = "Welcome to Angel 24's Millennium Study Center branch."
1010805-22 = "You have a...chicken salad and toast. I can heat up the toast, if you're going to eat it now!"
1010805-23 = "[s] \"Yes, please make it crispy.\""
1010805-24 = "Thank you. Please come again!"
1010805-26 = "I ate my snack, and was just about to leave the convenience store, when..."
1010805-27 = "[ns5] \"(Hey, isn't that...)\"\n[ns6] \"...Yuuka?\""
1010805-31 = "― [log=유우카 파자마]Mmm. Nom, nom... This is so delicious...[/log][wa:3390] "
1010805-34 = "― [log=유우카 파자마]Wh-What?! [/log][wa:380] "
1010805-38 = "― [log=유우카 파자마]S-Sensei?[/log][wa:1390] "
1010805-40 = "― [log=유우카 파자마]What are you doing here, at this time?[/log][wa:10] "
1010805-43 = "― [log=유우카 파자마]S-So... Well... Um... [/log][wa:2260] "
1010805-45 = "― [log=유우카 파자마]I couldn't fall asleep, so I took a walk, [/log][wa:810] "
1010805-48 = "― [log=유우카 파자마]and the angel chicken shown in the convenience store flyer [/log][wa:130] "
1010805-50 = "― [log=유우카 파자마]caught my eye...[/log]"
1010805-53 = "― [log=유우카 파자마]I couldn't help it![/log][wa:990] "
1010805-55 = "― [log=유우카 파자마]The angel chicken is freshly fried around this time.[/log][wa:70] "
1010805-58 = "― [log=유우카 파자마]It's so warm and juicy![/log][wa:2120] "
1010805-60 = "― [log=유우카 파자마]It's more of a loss to NOT buy it![/log][wa:10] "
1010805-63 = "― [log=유우카 파자마]And...it's not like I come here[/log][wa:2780] "
1010805-65 = "― [log=유우카 파자마]for a late night snack every day... [/log][wa:670] "
1010805-68 = "― [log=유우카 파자마]I-If you want...[/log][wa:2590] "
1010805-70 = "― [log=유우카 파자마]Do you want to try a bite too, Sensei?[/log][wa:600] "
1010805-74 = "[ns7] \"Thanks, but I'm good.\"\n[ns8] \"High school students' stomachs are amazing, eating chicken at this hour...\""
1010805-77 = "D-Don't tease me!"
1010805-78 = "Uwaaah. If I knew you were going to be here, I would've chosen something lighter."
1010805-79 = "Like konjac jelly or some kind of tofu snacks..."
1010805-80 = "[s] \"Are you still having trouble falling asleep these days?\""
1010805-81 = "Well, the truth is..."
1010805-82 = "...Yes, sort of."
1010805-83 = "I really have been doing my best to not pressure myself too much."
1010805-84 = "But I still have so many thoughts running through my head whenever I try to lay down."
1010805-85 = "The sound of the server computer's fan that never turns off, the soft glow of the neon sign shining through the curtains, the revving of trucks loaded with goods going to their destination..."
1010805-86 = "Even on seemingly quiet nights, there are people out there preparing for the next day. It makes me wonder if it's even okay for me to sleep."
1010805-87 = "I realize that they're working all night, so I can get enough rest to take on the next day... My mind just feels so much more tired than my body actually is."
1010805-88 = "So I thought a nice walk would help tire myself out, but...I ended up eating greasy chicken from a convenience store."
1010805-89 = "[s] \"Well, I think you made a good choice.\""
1010805-93 = "[ns9] \"A light walk is a good solution to help you fall asleep.\"\n[ns10] \"Satisfying your late-night cravings can help you sleep too.\""
1010805-96 = "Really...?"
1010805-97 = "You're always saying nice things to students, so it's hard to believe you."
1010805-98 = "[s11] \"Of course, chicken takes a long time to digest, so...\"\n[s12] \"...shall we take a walk together, until you're ready?\""
1010805-101 = "Heehee. That sounds like a good idea."
1010805-102 = "I'll show you my secret trail. I walk there pretty often."
1010805-103 = "It's dark, so please stay close behind me."
1010805-105 = "After that, I had a great time walking through the quiet streets of Millennium with Yuuka."

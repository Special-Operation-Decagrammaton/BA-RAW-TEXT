1010805-77 = "3;유우카 파자마;11;노, 놀리지 말아 주세요!\n#3;em;[스팀]\n#3;hophop"
1010805-78 = "3;유우카 파자마;12;우으…… 선생님과 여기서 마주치게 될 줄 알았더라면 좀 더 가벼운 간식을 택했을 텐데……"
1010805-79 = "3;유우카 파자마;06;곤약 젤리라던가, 두부 과자라던가……\n#3;em;[훌쩍]"
1010805-80 = "[s] \"요즘도 쉽게 잠을 이루지 못하는 거야?\""
1010805-81 = "3;유우카 파자마;02;아, 그게 그러니까……"
1010805-82 = "3;유우카 파자마;99;……솔직히 그렇네요.\n#3;em;[...]"
1010805-83 = "3;유우카 파자마;01;요새는 선생님께서 조언해 주신 대로 강박적으로 잠에 들려 하지는 않지만."
1010805-84 = "3;유우카 파자마;02;그래도 잠을 청하기 위해 침대에 누우면 자꾸 이런저런 생각이 들어요."
1010805-85 = "3;유우카 파자마;05;서버 컴퓨터의 팬이 밤낮없이 돌아가는 소리, 커튼 너머로 은은하게 비쳐 들어오는 네온사인의 빛, 물류를 가득 싣고 달리는 트럭의 소리……\n#3;em;[반응]"
1010805-86 = "3;유우카 파자마;99;이 조용한 밤 중에도 누군가는 내일을 위해 일하고 있는데 나는 잠들어도 괜찮을까, 하고."
1010805-87 = "3;유우카 파자마;01;물론 누군가가 밤새워 일하고 있기에 저는 편하게 쉴 수 있는 것이지만, 오히려 피로한 정신이 편한 몸에 깃들지 못하는 느낌이라서요."
1010805-88 = "3;유우카 파자마;12;그래서 조금이라도 몸을 피로하게 만들까 싶어 산책을 나왔는데…… 결국은 기름진 편의점 치킨이나 먹고 있다니, 본말전도네요.\n#3;em;[세로선]"
1010805-89 = "[s] \"글쎄. 나는 좋은 선택이라고 생각하는데.\""
1010805-90 = "#st;[0,0];instant;1;"
1010805-91 = "#clearST"
1010805-92 = "#wait;1000"
1010805-93 = "[ns9] \"숙면을 위해 가벼운 산책을 하는 건 괜찮은 해답이야.\"\n[ns10] \"너무 배가 고파도 잠을 잘 수 없으니 야참을 먹는 것도 나쁘지 않지.\""
1010805-94 = "#wait;10"
1010805-95 = "#wait;10"
1010805-96 = "3;유우카 파자마;02;정말요……?\n#3;em;[?]"
1010805-97 = "3;유우카 파자마;05;선생님은 언제나 학생들에게 긍정적인 말만 해주시니까, 쉬이 믿기가 어려운걸요."
1010805-98 = "[s11] \"물론 치킨은 소화하는 데 시간이 많이 걸리니까……\"\n[s12] \"완전히 소화될 때까지 산책이라도 함께 더 할까?\""
1010805-99 = "#wait;10"
1010805-100 = "#wait;10"
1010805-101 = "3;유우카 파자마;07;후후, 좋아요.\n#3;em;[음표]"
1010805-102 = "3;유우카 파자마;03;그럼 제가 자주 다니는 비장의 산책로를 소개해 드릴게요."
1010805-103 = "3;유우카 파자마;03;날이 어두우니 제 뒤에 꼭 붙어서 따라와 주세요.\n#3;m4\n#3;jump"

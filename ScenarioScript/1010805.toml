1010805-9 = "#wait;10"
1010805-10 = "3;밀레니엄 모브 학생 A;04;그나저나 이런 시간까지 붙잡아 두어서 죄송해요."
1010805-11 = "3;밀레니엄 모브 학생 A;04;점심부터 상담이 있으셔서 식사도 제대로 못 하셨을 텐데…… 이를 어쩌죠?\n#3;em;[땀]"
1010805-12 = "[s] \"괜찮아. 샬레에 돌아가서 먹으면 되니까.\""
1010805-13 = "3;밀레니엄 모브 학생 A;03;네. 그럼 조심히 들어가세요!\n#3;em;[반응]"

[translation]
42050-1 = "Episode 5;A FOX's Shadow"
42050-3 = "What the hell is happening? Someone better start talking."
42050-4 = "I was monitoring the surveillance cameras, when I was ambushed! Someone forced a hood over my head and dragged me here."
42050-6 = "M-M-Me too...! I was in my position, and s-someone came up super quietly and..."
42050-7 = "They b-b-blindfolded me... I got rolled around and around and around in a big barrel..."
42050-8 = "Ugh... I think I'm gonna throw up..."
42050-9 = "Why are you slacking off with us, Saki? I thought you and Miyako had breached the building already."
42050-10 = "We had, but then... Ugh. I can't remember."
42050-11 = "I went into the center aisle to avoid the barricade, but I was ambushed and knocked out..."
42050-12 = "I don't remember what happened after that. I just remember waking up here."
42050-13 = "Well, we don't know where we are or who brought us here, but I do know one thing!"
42050-14 = "...We let ourselves get abducted, didn't we?"
42050-15 = "Don't make me say it... Ugh. It was pure carelessness."
42050-16 = "I-I just realized something... These suspects are arms brokers, r-right? So they do lots of illegal trades?"
42050-17 = "Super bad guys like them would normally...k-kill us, right? If we're alive, maybe they're going to...going to... They're going to sell us to someone!!!"
42050-18 = "They're gonna sell us to some research facility and test weapons on us and torture us... O-Or, or... What if they make us dress up in a cat costume and meow for them?! That would be even worse!"
42050-20 = "...I don't even want to know where that last fear came from."
42050-21 = "It's okay, Miyu. Look, Miyako isn't with us, which means she hasn't been caught yet."
42050-22 = "Just sit tight and plan how we're gonna get back at these guys once she rescues us."
42050-26 = "Is everyone okay? Uninjured?"
42050-27 = "Miyako!"
42050-28 = "Miyako! Right on time! See, I told you she'd come to rescue us!"
42050-29 = "Oh... About that..."
42050-31 = "I'm more of a prisoner than a rescuer in this situation."
42050-32 = "This is the last... Disqualified."
42050-37 = "If this was SRT's CQB test, every last one of you would have been disqualified."
42050-39 = "That equipment, are you..."
42050-40 = "Aren't you the FOX Squad?! I don't understand what's happening here..."
42050-41 = "What? You don't like parties? We decided to organize a little surprise welcoming party for our successors."
42050-42 = "C'mon now... I thought you would've grown up a little after your recent adventures in Kivotos, but it looks like you're still the same old you, huh?"
42050-43 = "Did you think you were coming to a tea party? I couldn't believe my eyes when you just rushed into an unknown building with no backup and no recon."
42050-45 = "Oh, dear. Haha. You shouldn't be so harsh on them, Kurumi."
42050-46 = "At least students who take the CQB test know that they're taking it. How could they have predicted us being here? If they'd been up against ordinary arms dealers like they thought, their plan would've been perfect."
42050-47 = "...The next time an enemy appears unexpectedly on the battlefield, should we just ask them to politely leave? You all were unprepared."
42050-48 = "I'm sorry..."
42050-50 = "Anyways! I'm sure you must be hungry after all that excitement. I made a bunch of inarizushi for everyone!"
42050-51 = "We can worry about operations and preparedness after everyone's stomachs are full."
42050-52 = "I know there's probably a million questions running through your mind, and, trust me, we have a whole lungful of things we want to say too. But let's enjoy a meal together first."
42050-53 = "Okay..."
42050-55 = "Nom, nom. I mean, I'd be slow to react too if I worried about as many things as you do during the middle of an operation."
42050-56 = "Imagine you're in a tight corridor like Miyako was before, and it's tricky to maneuver your primary weapon. Now, there's an enemy approaching from a different direction. What's your plan?"
42050-57 = "Um, I think you're supposed to switch to your sidearm and shoot..."
42050-58 = "And you think right, if you're following the manual. But you need to evaluate the situation in front of you. It's always gonna be different. Here you should smash them as hard as you can with your gun's buttstock."
42050-59 = "In close quarters like that, the fastest one wins. You were the one who was ambushed, so the enemy wouldn't expect a full frontal attack like that. And all this changes depending on the enemy's armor, distance, strength..."
42050-61 = "Ugh. Real-world situations are so different from the textbooks..."
42050-62 = "You think all it took was a mission or two to be a veteran? You've got a lot to learn. Heehee."
42050-66 = "Mmm. Is this salmon roe? It pairs surprisingly well with the inarizushi."
42050-67 = "Hey! I was saving that for myself. Hands off!"
42050-68 = "Chill out, it's just inarizushi. Do you really want to embarrass yourself in front of the little ones?"
42050-69 = "Here, just have the egg soboro flavored one."
42050-70 = "No thanks. I'll stick with the salmon roe."
42050-72 = "Heehee. I brought enough of each kind, so there's no need to fight."
42050-76 = "Miyu, here. Don't be shy, dig in."
42050-77 = "R-Really...? Even I can have some?"
42050-78 = "Of course! In fact, I think this one right here has your name on it."
42050-79 = "Th-Thanks..."
42050-83 = "It's so good!"
42050-85 = "Ah! It feels like forever since I've had Niko's cooking."
42050-86 = "You won't find inarizushi with this many toppings anywhere else in Kivotos."
42050-87 = "Heehee. Getting up early was totally worth it all of a sudden."
42050-88 = "You'll always be able to recognize my inarizushi from anyone else's because of my secret marinade!"
42050-89 = "(Hm. Why do I feel like I've had this inarizushi recently... Am I just imagining it?)"
42050-94 = "Um... If it's okay to ask... How did you f-find me?"
42050-95 = "I-I thought I found a really good spot...so I was kinda surprised..."
42050-97 = "Miyu, right? The star student who aced the concealment training!"
42050-98 = "E-Eek..."
42050-99 = "You did really well, actually. We wouldn't have noticed if Niko hadn't pointed you out. Good job."
42050-101 = "Th-Thank...you... Wh-Why are you getting...closer...and closer..."
42050-102 = "You were just so hidden. What's your process? Do you have some kind of special camo gear? What zoom is your scope set at?"
42050-103 = "W-Waaaaaaah!"
42050-106 = "Anyways, if our seniors in FOX Squad were the ones buying the weapons, I guess we don't have anything to worry about."
42050-107 = "If it came through them, I'm sure the funds were clean too."
42050-111 = "..."
42050-112 = "Actually, I'd like to ask a question."
42050-113 = "Of course, shoot."
42050-114 = "What did you guys take from Schale's basement during the coup?"
42050-115 = "O-Oh... Well... That..."
42050-116 = "More importantly, I've been wondering this for a long time now. You disappeared without a word when SRT's closure was decided. The next thing we knew, you were storming the General Student Council building... Why?"
42050-117 = "Ah..."
42050-122 = "I can't share that information with you yet."
42050-123 = "Is it confidential...?"
42050-124 = "No."
42050-125 = "It's not that. We needed to determine if you could be reliable allies."
42050-126 = "Hold on. Aren't we all on the same team? The SRT?"
42050-127 = "Wh-What did we do wrong...?"
42050-128 = "Let me ask you a question."
42050-129 = "If we ordered you, could you stand against Sensei on the battlefield? Right now, at this very moment?"
42050-131 = "..."
42050-135 = "See? You're not ready to decide."
42050-137 = "A weapon has one purpose and is useless if it can't perform it."
42050-139 = "Thanks for your hard work on this mission, Squad Leader Tsukiyuki."
42050-140 = "As of today, the RABBIT Squad is disbanded. You all will now be part of the FOX Squad."
42050-141 = "D-Disbanded? O-Our squad?"
42050-142 = "Don't misunderstand."
42050-143 = "I'm not penalizing you for an unsatisfactory performance. I value your leadership."
42050-144 = "We're just relieving you of burdens you never should have had to shoulder."
42050-145 = "Let us bear the difficult work from here on out."
42050-146 = "But we want to help restore SRT Academy... We never gave up..."
42050-147 = "Yes. You've all worked hard. That, on top of your living situations, seems to have worn your squad down."
42050-148 = "..."
42050-149 = "There is no longer a need to bear the responsibility of reviving SRT Academy."
42050-150 = "That responsibility was always ours. Yours has always been to be a weapon in our toolbox."
42050-151 = "That's not what we... We... The RABBIT Squad–"
42050-152 = "Squad Leader Tsukiyuki, you have to decide."
42050-153 = "Will you step up and fulfill your duty as a sharpened blade?"
42050-154 = "Or will you waver and fight for justice with your rusted edge?"
42050-155 = "We..."
42050-157 = "[ns] \"Hold on!"
42050-158 = "We've got company."
42050-159 = "Who? How could they have found us?"
42050-163 = "...[USERNAME] Sensei?"
42050-164 = "[s1] \"You guys are the FOX Squad, right? Nice to meet you.\"\n[s2] \"Hello, FOX Squad. I really enjoyed the inarizushi last time.\""
42050-165 = "[USERNAME] Sensei? Did you follow us from the park?"
42050-166 = "..."
42050-167 = "[USERNAME] Sensei? Did you follow us from the park?"
42050-168 = "I didn't notice w-we were being tailed..."
42050-169 = "[s3] \"Well, you guys left the park so suspiciously, so I came to find you.\" \n[s4] \"You all were acting weird, so I asked around and tracked you down.\""
42050-177 = "I believe this is our first meeting, [USERNAME] Sensei."
42050-178 = "I've been wanting to thank you for your working in cleaning up the mess created by the Student Council President's sudden departure."
42050-179 = "On behalf of SRT Academy, I would like to express my gratitude."
42050-180 = "[s] \"Just doing my job.\""
42050-181 = "But what I'm discussing with Squad Leader Tsukiyuki is internal SRT Academy business."
42050-182 = "So, we'd appreciate it if you could leave this matter to us."
42050-183 = "I've heard that you are not one to undermine a students' decision or authority."
42050-184 = "[s] \"Consider your authority the opposite of undermined.\""
42050-186 = "[ns5] \"But my students look like they need time to process.\" \n[ns6] \"But I think you need to give Miyako some space.\""
42050-189 = "Understood."
42050-190 = "It seems you're the kind of adult students inherently trust and follow."
42050-195 = "It's your type that tends to be the most...aggravating."
42050-196 = "[s] \"Haha. I'm glad your situation hasn't dampened your spirit.\""
42050-197 = "...This fight can wait until D-Day. It won't be long, anyway."
42050-198 = "FOX Squad, stand down. Head back to HQ for the next mission."
42050-206 = "Squad Leader Tsukiyuki, I've sent a location to your phone."
42050-207 = "Come find me there, if you are able to see things the right way."
42050-208 = "I..."
42050-209 = "One day... You'll understand."
42050-210 = "..."
42050-214 = "Next Episode;A RABBIT's Distress"

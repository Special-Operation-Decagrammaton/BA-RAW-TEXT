[translation]
42050-1 = "ตอนที่ 5;เงาของรุ่นพี่"
42050-3 = "... นี่มันเรื่องอะไรกันเนี่ย? ใครก็ได้ช่วยอธิบายทีสิ"
42050-4 = "ฉันกำลังเช็กกล้องวงจรปิดที่อยู่ใกล้เคียงอยู่ แต่จู่ๆ ก็มีคนใส่ผ้าคลุมผมมาดึงตัวฉันจากข้างหลัง แล้วก็ลากตัวฉันมาที่นี่..."
42050-6 = "ฮือ... ฉันก็กำลังซ่อนตัวอยู่ แต่ก็มีใครไม่รู้วิ่งมาจับตัวจากข้างหลัง..."
42050-7 = "แล้วก็ปิดตาฉันแล้วโยนลงไปในถังอะไรใหญ่ๆ จากนั้นก็กลิ้งไปกลิ้งมา..."
42050-8 = "โอย... ยังรู้สึกคลื่นไส้อยู่เลย"
42050-9 = "จะว่าไปแล้วซากิ ทำไมเธอถึงมาถูกมัดอยู่ที่นี่กับพวกเราได้ล่ะ? เธอไม่ได้เข้าไปในอาคารพร้อมมิยาโกะ#nหรอกเหรอ?"
42050-10 = "... ฮึ่ย ที่จริง... ฉันเองก็ไม่รู้อะไรเลยเหมือนกัน"
42050-11 = "ฉันจำได้แค่ว่าตอนที่เดินเข้าไปในทางโถงกลาง จู่ๆ หัวฉันก็ถูกกระแทกเข้าอย่างแรง..."
42050-12 = "พอได้สติอีกที ถึงได้รู้ว่าตัวเองมาถูกมัดอยู่กับพวกเธอนี่แหละ"
42050-13 = "ตอนนี้เราไม่รู้เลยว่าสถานการณ์เป็นยังไง..."
42050-14 = "นี่พวกเรา... ถูกลักพาตัวมาใช่มั้ย?"
42050-15 = "ชิ... ดันประมาทไปซะได้"
42050-16 = "จะ... จะว่าไปแล้วฝ่ายตรงข้ามที่เราพยายามจะโจมตีคือนายหน้าค้าอาวุธผิดกฎหมายที่หลบหนีสายตา#nผู้คนถูกไหม...?"
42050-17 = "ถ้าพวกเขาจับเราไว้ด้วยกันทั้งเป็นแบบนี้... แสดงว่าต้องเอาพวกเราไปขายที่ไหนแน่เลย..."
42050-18 = "บางทีอาจจะส่งเราไปทดลองอาวุธใหม่ที่ศูนย์วิจัยอาวุธ... หรือไม่ก็บังคับให้ใส่ชุดมุ้งมิ้งๆ แล้วก็ให้เรา#nพูดคำว่า 'เมี๊ยว' หลังทุกประโยคที่พูด..."
42050-20 = "... อย่างหลังมันไม่แปลกไปหน่อยเหรอ?"
42050-21 = "ไม่ต้องกังวลให้มากนะ มิยุ ถึงเรื่องอื่นจะยังไม่รู้ แต่การที่มิยาโกะไม่ได้อยู่ที่นี่ ก็ยังถือว่าเธอยังไม่โดนจับ และเรายังไม่จบเห่นะ"
42050-22 = "ถ้ารอต่ออีกหน่อย เดี๋ยวมิยาโกะก็มาช่วยเราแน่นอน"
42050-26 = "ทุกคน... ปลอดภัยกันใช่ไหมคะ?"
42050-27 = "มิยาโกะ...!"
42050-28 = "มิยาโกะจัง มาช่วยเราแล้วนี่เอง...!"
42050-29 = "อ่า... เอ่อ... คือว่า..."
42050-31 = "... ฉันก็ถูกจับมาเหมือนกันค่ะ"
42050-32 = "โดนเก็บเรียบ... ทั้ง 4 คนเลยนะ"
42050-37 = "ถ้านี่เป็นการสอบ CQB ของ SRT คงได้สอบตกจนซ้ำชั้นกันทั้งกลุ่มแน่ๆ"
42050-39 = "เดี๋ยวนะ อุปกรณ์นั่นมัน..."
42050-40 = "รุ่นพี่จากกองทหาร FOX...? ทำไมถึงมาอยู่ที่นี่ได้..."
42050-41 = "ถ้าจะให้อธิบายสั้นๆ ละก็ ทั้งหมดนี่ก็คือเซอร์ไพรซ์ปาร์ตี้ที่พวกเราเตรียมไว้ให้รุ่นน้องน่ะ"
42050-42 = "เฮ้อ... เห็นว่าช่วงนี้ทำผลงานได้ดีในคิโวทอส ก็เลยแอบคาดว่าจะพัฒนาขึ้นมาบ้างสักหน่อยเสียอีก สุดท้ายแล้วก็ยังเหมือนเดิมกันอยู่เลย"
42050-43 = "เข้ามาในสถานที่ที่ไม่เคยมาทั้งที แต่ก็แยกกันเข้ามาแบบไม่มีกำลังสนับสนุนได้ไง แบบนี้ก็ถูกยิงง่ายน่ะสิ นี่คิดว่ามาปิกนิกกันเหรอ?"
42050-45 = "แหะๆ... อย่าตำหนิน้องๆ เกินไปเลยนะ คุรุมิจัง"
42050-46 = "รุ่นน้องคงคาดเดาสถานการณ์แบบนี้ไม่ได้ และถ้าเป็นการปะทะกับสถานการณ์หรือนายหน้าธรรมดาๆ แค่ใช้กลยุทธ์นี้ก็น่าจะเพียงพอแล้วละ"
42050-47 = "... ศัตรูไม่ออกมาจากที่ที่เราคิดไว้หรอก ห้ามประมาทเด็ดขาด"
42050-48 = "... ต้องขออภัยด้วยค่ะ"
42050-50 = "งะ... งั้นเรามากินของว่างกันก่อนแล้วค่อยเริ่มไหม? ฉันพอจะรู้ว่ามันต้องเป็นแบบนี้ ก็เลยเอาซูชิเต้าหู้หวานมาด้วยน่ะ"
42050-51 = "ไว้กินให้อิ่มท้องแล้วก็ค่อยมาคุยกันต่อเถอะนะ"
42050-52 = "นอกจากพวกเราแล้ว... ฉันว่าพวกเธอก็น่าจะมีอะไรที่อยากจะพูดอยู่ไม่น้อยเลยละ"
42050-53 = "ค่ะ..."
42050-55 = "(ง่ำๆๆ) ก็เป็นซะอย่างนี้ไง พอพวกเธอเอาแต่ใส่ใจเรื่องเล็กๆ น้อยๆ การตอบสนองก็เลยช้าลงไปด้วย"
42050-56 = "ลองคิดตามนะ เธอกำลังอยู่ในทางเดินแคบๆ ขนาดที่หยิบอาวุธหลักออกมายิงก็ยังยาก แต่ก็มีศัตรูโผล่#nออกมาในอีกด้านหนึ่ง แบบนี้ต้องทำยังไง?"
42050-57 = "... ก็ยิงด้วยอาวุธรองแทน...?"
42050-58 = "ถ้าเป็นสถานการณ์แบบนี้ ในคู่มือของเราจะบอกว่า 'ให้ใช้พานท้ายปืนฟาดไปเลย'"
42050-59 = "การใช้พานท้ายปืนมันเร็วกว่าการเปลี่ยนอาวุธ แล้วก็ทำให้ศัตรูหงายเก๋งไปเลยได้ด้วย ถึงผลจะแตกต่างกันออกไปตามระยะปะทะหรือชุดป้องกันที่ศัตรูใส่อยู่ก็เถอะ"
42050-61 = "ฮึ่ย... พอเจอสถานการณ์จริงที่ต่างไปจากคู่มือทีไรนี่มันน่าปวดหัวชะมัด..."
42050-62 = "คิดว่าผู้เชี่ยวชาญมันเป็นกันได้ง่ายๆ หรือไง? ยังต้องฝึกกันอีกเยอะเลยละ ฮุฮุ"
42050-66 = "(ง่ำๆๆ) หืม? สัมผัสที่คุ้นเคยนี่มัน ไข่ปลาแซลมอนเหรอ? รสเค็มและกลมกล่อมของไข่ปลาแซลมอน#nเข้ากับซูชิเต้าหู้หวานมากกว่าที่คิดแฮะ..."
42050-67 = "เดี๋ยวก่อน! ชิ้นนั้นฉันเก็บไว้กินทีหลังนะ ห้ามแตะต้องเด็ดขาด!"
42050-68 = "อย่าหัวร้อนเรื่องซูชิเต้าหู้หวานต่อหน้ารุ่นน้องไปเลยน่า"
42050-69 = "เอ้านี่ เอาหน้าไข่ไปกินซะสิ"
42050-70 = "ไม่เอาเหอะ! ฉันก็จะกินไข่ปลาแซลมอนนะ!"
42050-72 = "ฮุฮุ.. อย่าทะเลาะกันนะทุกคน ฉันเตรียมซูชิเต้าหู้หวานมาหลายหน้าเลย แล้วก็ค่อยๆ กินกันด้วยละ"
42050-76 = "นี่ มิยุจังก็ไม่ต้องสนใจพวกพี่เขามากไปนะ กินได้ตามสบายเลย"
42050-77 = "ฉะ... ฉันเหรอคะ...? ให้คนอย่างฉันกินซูชิเต้าหู้หวานที่ดูหรูหราแบบนี้ได้เหรอคะ?"
42050-78 = "แน่นอนสิ ก็ฉันห่อมากินด้วยกันไง"
42050-79 = "ขะ... ขอบคุณค่ะ..."
42050-83 = "งือ... อร่อยสุดๆ เลย!"
42050-85 = "อ้ามมม~ ไม่ได้กินซูชิเต้าหู้หวานของรุ่นพี่นิโกะมานานแค่ไหนแล้วนะ?"
42050-86 = "ซูชิเต้าหู้หวานเครื่องแน่นและรสเด็ดแบบนี้ หากินจากที่อื่นในคิโวทอสไม่ได้เลยละ"
42050-87 = "ฮุฮุ ได้ยินแบบนี้ก็ถือว่าคุ้มค่าที่ตั้งใจลุกขึ้นมาหุงข้าวตั้งแต่เช้าเลยแฮะ"
42050-88 = "อ้อ สูตรน้ำส้มสายชูที่ใช้ตอนหมักเต้าหู้เป็นสูตรพิเศษที่ฉันรู้คนเดียวด้วยละ"
42050-89 = "(เอ๋? จะว่าไป เหมือนเพิ่งได้กินซูชิเต้าหู้หวานแบบเดียวกันมาเลย... หรือว่าจะจำผิดนะ...?)"
42050-94 = "เอ่อ... ว่าแต่พวกรุ่นพี่รู้ได้ไงเหรอคะว่าฉันมาดักซุ่มอยู่ที่ไหน?"
42050-95 = "จะให้พูดเองมันก็จะดูเหมือนอวยตัวเอง... แต่ฉันว่าฉันซ่อนตัวได้เก่งอยู่นะคะ..."
42050-97 = "อ้อ งั้นเธอคือมิยุสินะ? นักเรียนใหม่ที่เป็นที่พูดถึงเพราะได้คะแนนเต็มจากการฝึกพรางตัว!"
42050-98 = "ฮะ... เฮือก..."
42050-99 = "พรางตัวได้สมบูรณ์แบบตามข่าวลือเลยละ ถ้านิโกะไม่บอกพิกัดมา ต่อให้ซ่อนอยู่ตรงหน้าฉันก็คงหา#nไม่เจอแน่ๆ ถือว่าซ่อนตัวได้แนบเนียนมากเลย!"
42050-101 = "อะ... เอ่อ... ขะ... ขอบคุณค่ะ... ว่าแต่รู้ได้ยังไง..."
42050-102 = "เธอใช้อุปกรณ์พรางตัวแบบพิเศษอะไรทำนองนั้นเหรอ? แล้วปกติใช้อัตราการขยายกล้องสโคปเท่าไร#nงั้นเหรอ?"
42050-103 = "งะ... งือ..."
42050-106 = "แต่ยังไงก็เหอะ ถ้านายหน้าที่ซื้ออาวุธของเราไปคือรุ่นพี่จากกองทหาร FOX งั้นก็ไม่ต้องกังวลว่าอาวุธ#nของ SRT จะถูกเอาไปใช้ในเรื่องที่ไม่ดีสิเนอะ"
42050-107 = "นั่นน่ะสิ ถ้าเป็นเงินที่ได้มาจากพวกรุ่นพี่ ก็ไม่ต้องกังวลเกี่ยวกับที่มาของเงินด้วย"
42050-111 = "........."
42050-112 = "คือว่า รุ่นพี่คะ ฉันขอถามอะไรบ้างได้หรือเปล่าคะ?"
42050-113 = "ได้สิ อยากถามอะไรก็ถามมาได้เลย"
42050-114 = "... ตอนที่เกิดการปฏิวัติคราวก่อน พวกรุ่นพี่เอาของอะไรออกไปจากชั้นใต้ดินของชาเล่ต์เหรอคะ?"
42050-115 = "อ่า... เอ่อ... คือว่า..."
42050-116 = "... แล้วก็ตอนที่ SRT ถูกสั่งปิด ทำไมถึงบุกเข้าไปในอาคารองค์การนักเรียนกันเหรอคะ?"
42050-117 = "เรื่องนั้นน่ะ..."
42050-122 = "พวกเรายังบอกพวกเธอไม่ได้หรอก"
42050-123 = "... เป็นความลับเหรอคะ?"
42050-124 = "เปล่า"
42050-125 = "... เรายังไม่แน่ใจว่าพวกเธอคือ 'พันธมิตร' ของเราหรือเปล่าต่างหากล่ะ"
42050-126 = "เดี๋ยวก่อนสิรุ่นพี่ พวกเราเป็นนักเรียนของ SRT เหมือนกันนะ...?"
42050-127 = "ทำไมถึงพูดอย่างนั้นล่ะ..."
42050-128 = "ถ้างั้นฉันขอถามอะไรอย่างหนึ่งสิ"
42050-129 = "ตอนนี้พวกเธอคิดว่าตัวเองเป็นปฏิปักษ์กับคุณครูของชาเล่ต์ได้หรือเปล่าล่ะ?"
42050-131 = "........."
42050-135 = "จริงสิ พวกเธอคงตัดสินใจไม่ได้สินะ"
42050-137 = "อาวุธต้องไม่ตัดสินใจอะไรเอง ถึงจะมีคุณค่า"
42050-139 = "ที่ผ่านมาคงเหนื่อยกับการทำปฏิบัติการยากๆ มามากเลยสินะ หัวหน้ากองสึคิยูกิ"
42050-140 = "ตั้งแต่วันนี้เป็นต้นไป กองทหาร RABBIT จะถูกยุบ จากนี้ให้สมาชิกทุกคนย้ายมาอยู่กองทหาร FOX แทน"
42050-141 = "ยุบ...? ยุบกองทหาร RABBIT เหรอคะ...?"
42050-142 = "อย่าเข้าใจผิดกันเลยนะ"
42050-143 = "เราไม่ได้จะให้พวกเธอเสียผลประโยชน์หรอก เราเคารพสิทธิในการตัดสินใจของสึคิยูกิในฐานะหัวหน้า#nกองทหารนะ"
42050-144 = "แต่ว่านี่... คือการที่รุ่นพี่เอาความรับผิดชอบที่จู่ๆ รุ่นน้องก็ต้องมาแบกรับไปจากเหตุการณ์ที่เกิดขึ้น#nกลับมาก็เท่านั้น"
42050-145 = "การเลือกสิ่งที่เจ็บปวดที่ตามมาพร้อมกับความลังเลนั่นน่ะ เรื่องนี้ปล่อยให้พวกเราเป็นคนจัดการเถอะ"
42050-146 = "แต่ถ้าเป็นการทำเพื่อการฟื้นฟูสถาบัน SRT ละก็... พวกฉันเตรียมตัวไว้..."
42050-147 = "พวกเธอคงเหนื่อยกันมามากกับการใช้ชีวิตในค่ายมาเป็นเวลานานแล้วเลยละสิท่า"
42050-148 = "........."
42050-149 = "จากนี้ไปเธอไม่ต้องแบกรับความรับผิดชอบเพื่อการฟื้นฟูสถาบัน SRT ต่ออีกแล้วละ"
42050-150 = "คนที่ตำแหน่งสูงกว่าจะเป็นคนรับผิดชอบเอง สมาชิกกองทหารแต่ละคนให้กลับมาทำหน้าที่หลักในการ#nเป็นอาวุธ"
42050-151 = "กองทหาร RABBIT ของพวกฉัน..."
42050-152 = "เอาละ หัวหน้ากองสึคิยูกิ ถึงเวลาตัดสินใจแล้ว"
42050-153 = "ว่าจะฝากความรับผิดชอบและการตัดสินใจให้รุ่นพี่ แล้วไปทำหน้าที่เป็นอาวุธ"
42050-154 = "หรือว่าจะโอบกอดความลังเลแล้วใช้อำนาจด้วยมีดที่ขึ้นสนิมนั่น"
42050-155 = "พวกฉัน..."
42050-157 = "[ns] \"... รอเดี๋ยวก่อน!\""
42050-158 = "... ผู้บุกรุกเหรอ?"
42050-159 = "ทำไมถึงรู้จักที่นี่ได้ล่ะ...?!"

[translation]
42050-1 = "第5話;前輩的影子"
42050-3 = "……這是怎麼回事？#n有沒有人能解釋一下？"
42050-4 = "我在附近的[ruby=Node]節點[/ruby]檢查監視器的時候，#n突然被從背後套上了紙袋……"
42050-6 = "我，我也是……在躲藏時突然被從背後襲擊……"
42050-7 = "被矇著眼睛丟進不知道什麼地方……被咕嚕咕嚕地滾了過來……"
42050-8 = "嗚……還是好不舒服……"
42050-9 = "話說，為什麼連咲希都跟我們一起被相親相愛地綁在這裡了？#n你不是和都子一起突入大樓了嗎？"
42050-10 = "這……我也不太清楚。"
42050-11 = "在進攻中央通道的時候，頭部突然受了重擊……"
42050-12 = "等回過神來就被綁在這裡了。"
42050-13 = "也就是說……我們被綁架了嗎？"
42050-14 = "雖然還不清楚詳細狀況……"
42050-15 = "呿……太大意了。"
42050-16 = "吶……對我們發動奇襲的，是會進行違法交易的武器商人對吧……？"
42050-17 = "那像這樣饒我們一命，是不是為了把我們賣到某個地方去……？"
42050-18 = "像是被送去研究機構用於新武器的實驗……#n或是要我們穿上軟綿綿的衣服做各種事情，#n又或是強迫我們每次回話都要在結尾加上「喵～」之類的……"
42050-20 = "……最後的那個有點奇怪吧？"
42050-21 = "不用擔心，美優。還有都子在。"
42050-22 = "都子他一定會來救我們的才──"
42050-26 = "大家都沒事吧！？"
42050-27 = "都子……！"
42050-28 = "都子醬，你來救我們啦……！"
42050-29 = "啊，那個……這個嘛……"
42050-31 = "……我也被抓住了。"
42050-32 = "這樣就是第4個人了……全員失敗。"
42050-37 = "如果這是SRT的CQB考試，你們就要被當掉了吧。"
42050-39 = "那，那個裝備，該不會是……"
42050-40 = "FOX小隊的前輩們……？#n為，為什麼會在這裡……"
42050-41 = "嘛，簡單來說──這是為了後輩們準備的驚喜派對。"
42050-42 = "聽說你們最近在奇普托斯各地都很活躍，還期待你們有所成長了呢……#n看來是想太多了。"
42050-43 = "突入陌生地點時竟然沒人掩護就進攻……#n就像是自己說著「請盯上我吧」一樣。你們以為是來野餐的嗎？"
42050-45 = "哎呀哎呀胡桃醬，事情都結束了，就說到這邊吧。"
42050-46 = "他們應該也沒預料到這種情況哦。#n況且如果對方是普通的傭兵或武器商人，那個戰術也已經很足夠了。"
42050-47 = "……太天真了。#n敵人可不會總是依照自己的預期現身啊。"
42050-48 = "……對不起。"
42050-50 = "總，總之先來吃點點心吧！#n我準備了很多豆皮壽司哦。"
42050-51 = "邊吃邊聊好嗎？"
42050-52 = "我想……我們對彼此都有很多話想說吧。"
42050-53 = "……是。"
42050-55 = "（嚼嚼）真是的──你們太在意瑣碎的事了，所以反應才會這麼慢的啊。"
42050-56 = "要是像剛才一樣，敵人在難以變更武器方向的地點從反方向出現該怎麼做？"
42050-57 = "……切換成輔助武器射擊，之類的嗎？"
42050-58 = "教戰手冊是這麼寫的沒錯。#n但實戰中的正確解答是「用槍托直接敲下去」。"
42050-59 = "比起替換武器，直接使用槍托更能快速地對敵人發動攻擊。#n當然，答案是會隨著敵人的防護衣或交戰距離而改變沒錯……"
42050-61 = "唔唔……和教戰手冊不同的實戰狀況總是讓人很頭痛……"
42050-62 = "要成為老手可沒那麼容易。#n還需要繼續努力。"
42050-66 = "（嚼嚼）唔嗯～這個口感……是鮭魚卵嗎？#n意外的和豆皮壽司很搭呢。"
42050-67 = "等等，別碰那個啊！#n那是我留下來要之後再吃的！"
42050-68 = "啊哈哈，抱歉抱歉。#n不要在後輩面前這麼一板一眼的嘛～"
42050-69 = "來，這個有蛋的給你。"
42050-70 = "我不要蛋！#n我喜歡的是鮭魚卵！"
42050-72 = "好了好了，不要吵架。#n豆皮壽司還有很多的。"
42050-76 = "來，美優醬也不要有壓力，隨意吃吧。"
42050-77 = "我，我我……我這種人真的可以吃這麼棒的豆皮壽司嗎……？"
42050-78 = "當然囉。#n我就是做來給大家吃的。"
42050-79 = "謝，謝謝……"
42050-83 = "……好，好好吃！"
42050-85 = "哈啊～仁子前輩的豆皮壽司都多久沒吃到啦？"
42050-86 = "放了這麼多配料的豆皮壽司，可是哪裡都買不到的哦的。"
42050-87 = "呵呵，謝謝誇獎。#n不枉費我一大早就開始準備呢。"
42050-88 = "特別是這個煮豆皮的醬汁可是我的原創配方。#n我想應該是僅此一家的哦。"
42050-89 = "（……仔細想想，最近好像也吃過類似的豆皮壽司……是錯覺嗎……？）"
42050-94 = "那個……我想問一個問題，前輩是怎麼找出我埋伏的地方的呢？"
42050-95 = "雖然這麼說不太好意思……但我覺得應該躲得很好才對呀……"
42050-97 = "啊，你就是美優嗎？#n那位據說在偽裝訓練獲得滿分的新生！"
42050-98 = "噫，噫噫……！？"
42050-99 = "真是相當完美的偽裝呢！#n在仁子告訴我座標之前，我甚至完全沒有注意到！"
42050-101 = "謝，謝謝……太，太近了……"
42050-102 = "你用了什麼特殊的迷彩裝備嗎？#n我還很好奇瞄準鏡的倍率！"
42050-103 = "嗚，嗚嗚嗚……"
42050-106 = "總，總之，買走那些武器的人是FOX小隊的前輩們就太好了。#n這樣SRT的武器應該就不會被用來做壞事了。"
42050-107 = "就是說啊。#n而且既然是前輩們給的錢，也不用擔心來源。"
42050-111 = "…………"
42050-112 = "那個，前輩們。#n我可以問一個問題嗎？"
42050-113 = "當然可以囉。儘管問吧。"
42050-114 = "……上次事件時，前輩們從夏萊拿走的是什麼東西呢？"
42050-115 = "呃……那個是……"
42050-116 = "還有──決定要關閉SRT時，為何襲擊了聯邦學生會的大樓呢？"
42050-117 = "那個……"
42050-122 = "現在還不能告訴你們。"
42050-123 = "……是機密，是嗎？"
42050-124 = "不。"
42050-125 = "因為目前，你們還不是「我們」的友軍。"
42050-126 = "先等一下。#n我們不都是SRT隊員嗎……？"
42050-127 = "為什麼這麼說……"
42050-128 = "……我問你們一個問題。"
42050-129 = "如果[ruby= ・     ・ ]任務[/ruby]要求你們與夏萊的老師為敵，你們會怎麼做？"
42050-131 = "…………"
42050-135 = "沒錯，你們無法判斷。"
42050-137 = "武器──正因為不會自己做出判斷，才有其價值。"
42050-139 = "一直以來執行各種困難的作戰真是辛苦你了，月雪小隊長。"
42050-140 = "──RABBIT小隊自即刻起解散。#n各小隊員今後將以FOX小隊的分隊行動。"
42050-141 = "解散……？RABBIT小隊……？"
42050-142 = "希望你們不要誤會。"
42050-143 = "我們也不希望對你們不利。#n就尊重月雪小隊長擁有的裁量權吧。"
42050-144 = "沒什麼，只是重新由我們來背負因突如其來的事故而讓後輩背負的責任罷了。"
42050-145 = "今後，困難的選擇全部交給我們就行了。"
42050-146 = "但是……如果是為了讓SRT特殊學園復活的話，我們也有一定的覺悟──"
42050-147 = "長期的露宿生活已經讓所有人都很勞累了吧。"
42050-148 = "…………"
42050-149 = "已經不必，負起重建SRT特殊學園的責任了。"
42050-150 = "把剩下的事交給我們，各小隊員只要做好身為武器的本分即可。"
42050-151 = "我們，RABBIT小隊……"
42050-152 = "來吧，月雪小隊長──做出決定吧。"
42050-153 = "是要把責任和判斷交給我們，做好身為武器的本分──"
42050-154 = "還是要繼續抱持著猶豫，以生鏽的刀刃宣揚正義呢？"
42050-155 = "我們……"
42050-157 = "[ns]「……先等一下！」"
42050-158 = "……入侵者？"
42050-159 = "怎麼會知道這裡……！？"
42050-163 = "……[USERNAME]老師？"
42050-164 = "[s1]「你們就是FOX小隊？很高興見到你們。」\n[s2]「之前的豆皮壽司非常好吃哦。」"
42050-165 = "……[USERNAME]老師？你怎麼會來這裡？"
42050-166 = "…………"
42050-167 = "……[USERNAME]老師？你怎麼會來這裡？"
42050-168 = "難，難道是跟在我們後面……？"
42050-169 = "[s3]「因為大家都突然不見了……」\n[s4]「所以我就在街上四處打聽邊找你們。」"
42050-177 = "初次見面，[USERNAME]老師。"
42050-178 = "久仰大名，聽說老師安頓了因聯邦學生會長不在而陷入混亂的奇普托斯。"
42050-179 = "……我代表SRT特殊學園，致上最深的謝意。"
42050-180 = "[s]「不用客氣。」"
42050-181 = "但是，我正在跟月雪小隊長討論的是SRT特殊學園內部的事。"
42050-182 = "因此，希望老師能把之後的問題交給我們處理。"
42050-183 = "我聽說……老師是個會尊重學生意志的大人。"
42050-184 = "[s]「那當然。」"
42050-186 = "[ns5]「但是大家好像都對這麼突然的問題感到很困擾。」\n[ns6]「可以再給都子一點時間嗎？」"
42050-189 = "……我明白了。"
42050-190 = "不愧是夏萊的老師。#n真像是能獲得所有學生信賴之人的發言。"
42050-195 = "我們……最討厭像你這樣的大人了。"
42050-196 = "[s] 「哈哈……果然很有活力呢……」"
42050-197 = "……D-Day即將到來的現在，沒必要刻意與老師為敵。"
42050-198 = "──FOX小隊在此撤退。#n請各小隊員回到HQ，進行下次作戰的準備。"
42050-206 = "……月雪小隊長。#n我剛才傳送了一個座標到你的手機裡。"
42050-207 = "如果你有意接受我的提案，就到那裡去吧。"
42050-208 = "我……"
42050-209 = "……你們總有一天也會了解的。"
42050-210 = "…………"
42050-214 = "下一話;後輩的苦惱"

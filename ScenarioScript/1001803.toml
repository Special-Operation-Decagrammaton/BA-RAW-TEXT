1001803-32 = "3;유즈;03;헤헤, 이번 판에는 제가 이겼네요.\n#3;em;[음표]"
1001803-33 = "3;유즈;02;서, 선생님? 어째서 그런 표정을 짓고 계시나요? 호, 혹시 재미가 없으셨나요?\n#3;stiff"

1001803-1 = "#title;상냥한 파이터"
1001803-2 = "#place;게임개발부 부실"
1001803-3 = "3;유즈;01;저, 선생님. 괜찮으시다면…….\n#3;em;…\n#3;a"
1001803-4 = "3;유즈;03;저와 같이 대전 격투 게임을 플레이하지 않으시겠어요?"
1001803-5 = "[s] \"대전 격투 게임?\""
1001803-6 = "3;유즈;07;네, 전에 문자로 말씀드렸던 그 신작 대전 게임을 드디어 구했거든요!\n#3;em;[반짝]\n#3;greeting"
1001803-7 = "3;유즈;03;너무나도 기대했던 게임이라 빨리 플레이해보고 싶은데, 오늘따라 부원들이 모두 약속이 있다고 해서요."
1001803-8 = "3;유즈;02;대전 게임의 특성상 상대가 없으면 플레이할 수 없는데, 그렇다고 모르는 사람과 처음부터 게임을 하는 건 어쩐지 무서워서…….\n#3;em;[땀]\n#3;stiff"
1001803-9 = "3;유즈;03;선생님께서 제 상대가 되어 주시지 않겠어요?"
1001803-10 = "[s1] \"나는 대전 격투 게임은 잘 못 하는데…….\"\n[s2] \"봐주지 않을 테니까 각오해!\""
1001803-11 = "3;유즈;07;괜찮아요. 저도 이 게임을 플레이하는 건 처음이니까요.\n#3;em;[음표]"
1001803-12 = "3;유즈;03;함께 대전을 하며 실력을 쌓도록 하죠!"
1001803-13 = "3;유즈;07;하, 하하…… 그렇게 말씀하시니 저도 조금 긴장되네요.\n#3;em;[///]\n#3;stiff"
1001803-14 = "3;유즈;03;그럼 저도 최선을 다해서 싸울게요!"

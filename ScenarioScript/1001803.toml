[translation]
1001803-1 = "นักสู้ผู้อ่อนโยน"
1001803-2 = "ห้องชมรมพัฒนาเกม"
1001803-3 = "คือว่า... ถ้าคุณครูไม่ติดอะไร..."
1001803-4 = "จะเล่นเกมต่อสู้กับฉันได้มั้ยคะ?"
1001803-5 = "[s] \"เกมการต่อสู้งั้นเหรอ?\""
1001803-6 = "ใช่ค่ะ ในที่สุดฉันก็ได้เกมต่อสู้ใหม่ที่เคยส่งบอกไว้ก่อนหน้านี้มาแล้วล่ะค่ะ!"
1001803-7 = "เกมนี้ฉันรอมานานมาก อยากเล่นเร็วๆ แล้วค่ะ แต่วันนี้สมาชิกทุกคนมีนัดกันหมดเลยน่ะค่ะ"
1001803-8 = "เกมต่อสู้ถ้าไม่มีคู่แข่งก็เล่นไม่ได้ค่ะ แต่จะให้เล่นเกมกับคนแปลกหน้าตั้งแต่เริ่มเกมก็น่ากลัว..."
1001803-9 = "คุณครูจะเป็นคู่แข่งให้ฉันได้มั้ยคะ?"
1001803-10 = "[s1] \"ครูเล่นเกมต่อสู้ไม่เก่ง...\"\n[s2] \"ครูไม่ยอมหรอกนะ เตรียมตัวได้เลย!\""
1001803-11 = "ไม่เป็นไรค่ะ ฉันเองก็เพิ่งเล่นเกมนี้เป็นครั้งแรกค่ะ"
1001803-12 = "มาเล่นเกมต่อสู้และพัฒนาฝีมือกันนะคะ!"
1001803-13 = "ฮาฮ่า... ถึงจะพูดอย่างงั้น ฉันเองก็กังวลนิดหน่อยค่ะ"
1001803-14 = "ถ้าอย่างงั้นฉันจะพยายามเต็มที่ค่ะ!"
1001803-21 = "อะ... อ๊ะ... อันตราย...!"
1001803-24 = "ว้าว สุดยอดไปเลยค่ะ... ไม่คิดว่าจะมีสกิลแบบนั้น..."
1001803-25 = "ถ้างั้นครั้งนี้ใช้วิธีการตอบโต้แบบอื่น..."
1001803-30 = "<ฝั่งยูสึชนะขาดลอย!>"
1001803-31 = "[s] \"...แพ้ซะแล้ว\""
1001803-32 = "แหะๆ ตานี้ฉันชนะนะคะ"
1001803-33 = "คุณครูคะ? ทำไมทำสีหน้าอย่างนั้นล่ะคะ? คือว่า... ไม่สนุกเหรอคะ?"
1001803-34 = "คะ? ถามว่าฉันเพิ่งเล่นเกมนี้ครั้งแรกหรือเปล่างั้นเหรอคะ?"
1001803-35 = "ครั้งแรกเลยค่ะ! นี่เป็นเกมใหม่ที่เพิ่งออกมาเมื่อเช้าวันนี้ค่ะ"
1001803-36 = "ตานี้ฉันอาจจะโชคดีเลยชนะมาได้... มาเล่นกันอีกสักตาค่ะ!"
1001803-43 = "ทะ... เทคนิคนั่นคิดไม่ถึงเลยค่ะ"
1001803-44 = "ครั้งนี้แย่จริงๆ แล้วค่ะ...!"
1001803-47 = "<ฝั่งยูสึชนะขาดลอย!>"
1001803-48 = "[s] \"...\""
1001803-49 = "เฮ้อ... ครั้งนี้ชนะได้อย่างหวุดหวิดเลยล่ะค่ะ"
1001803-50 = "คะ? ไม่เหมือนที่ฉันพูดกับตัวเอง คุณครูถูกตีอยู่ฝ่ายเดียวเลยงั้นเหรอคะ?"
1001803-51 = "เรื่องนั้น... ระหว่างเล่มเกม ฉันอาจเผลอพูดกับตัวเองอยู่บ่อยๆ ค่ะ..."
1001803-52 = "ที่ฉันพูดไป ฉันไม่ได้คิดอะไรแปลกๆ เลยค่ะ!"
1001803-53 = "ถ้างั้นในตานี้ ฉันจะไม่ใช้สกิลคอมโบ้... เล่นอีกตาดีมั้ยคะ...?"
1001803-60 = "<ฝั่งยูสึชนะขาดลอย!>"
1001803-61 = "คะ... คือว่า...พอฉันจับคอนโทรลเลอร์ก็จะมีพลังขึ้นมาแบบที่ฉันเองก็ไม่รู้... ฮ่าฮ่า..."
1001803-62 = "ครั้งนี้ฉันจะไม่ใช้สกิลจับทุกอย่างเลย ขอเล่นอีกตาเดียวนะคะ!"
1001803-64 = "แม้ว่ายูสึจะอ่อนให้ครั้งแล้วครั้งเล่า แต่คุณครูก็ต่อสู้แพ้ไปอีก 10 ตา..."

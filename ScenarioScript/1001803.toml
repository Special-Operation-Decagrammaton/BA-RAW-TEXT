[translation]
1001803-1 = "溫柔的鬥士"
1001803-2 = "遊戲開發部．活動室"
1001803-3 = "那個，老師，如果可以的話……"
1001803-4 = "要，要不要跟我一起玩格鬥遊戲呀？"
1001803-5 = "[s] 「格鬥遊戲？」"
1001803-6 = "嗯，我買到之前跟老師說過的，那個新的對戰格鬥遊戲了……！"
1001803-7 = "我已經期待好久了想快點玩玩看，不過正好今天其他部員都有約了……"
1001803-8 = "畢竟是對戰遊戲，沒有對手就沒辦法玩了。雖然這麼說，但是一開始就要跟不認識的人玩遊戲有點，呃，害怕……"
1001803-9 = "所以老師，可以當我的對手嗎？"
1001803-10 = "[s1] 「雖然我格鬥遊戲不算特別強……」\n[s2] 「但我不會放水的，做好覺悟吧！」"
1001803-11 = "沒問題的，我也是第一次玩這個遊戲。"
1001803-12 = "一起對戰，互相增進實力吧……！"
1001803-13 = "啊，啊哈哈……聽你這麼一說，突然有點緊張了。"
1001803-14 = "既然這樣，我也會努力當你的對手的……！"
1001803-21 = "啊，啊啊……危，危險……！"
1001803-24 = "很，很厲害嘛……竟然還有這招……"
1001803-25 = "那我就用其他方式反擊……"
1001803-30 = "＜柚子選手，完全勝利＞"
1001803-31 = "[s] 「……我輸了。」"
1001803-32 = "嘿嘿，這次是我贏了呢。"
1001803-33 = "老，老師？怎麼露出那種表情……難，難道是太無聊了嗎？"
1001803-34 = "咦？你問我真的是第一次玩？"
1001803-35 = "當，當然是囉！這個遊戲可是今天早上才剛發售的新作……"
1001803-36 = "這次可能只是我運氣好才會贏的……再玩一次看看吧！"
1001803-43 = "啊，那招我可沒有料到呢。"
1001803-44 = "這次可能真的不妙了……！"
1001803-47 = "＜柚子選手，完全勝利！＞"
1001803-48 = "[s] 「…………」"
1001803-49 = "呼……這次也驚險獲勝呢。"
1001803-50 = "嗯？跟我遊戲時的自言自語不同，感覺老師是被單方面爆打……？"
1001803-51 = "抱歉……我只要一投入在遊戲裡，就會不知不覺開始自言自語……"
1001803-52 = "絕，絕對沒有在想什麼奇怪的事，所以應該沒有說出什麼奇怪的話……"
1001803-53 = "這，這樣的話，下次我不會用連技的……#n可以再玩一次嗎……？"
1001803-60 = "＜柚子選手，完全勝利＞"
1001803-61 = "這，這個是……一握住搖桿就不小心認真起來了……啊哈哈……"
1001803-62 = "接，接下來我不會用抓技了，再，再一次就好了……！"
1001803-64 = "雖然柚子再三退讓，之後又玩了10場依然全敗……"

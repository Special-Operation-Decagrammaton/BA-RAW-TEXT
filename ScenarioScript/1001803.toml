[translation]
1001803-1 = "A Friendly Fighter"
1001803-2 = "Game Development Department Club Room"
1001803-3 = "Um, Sensei, if it's okay with you..."
1001803-4 = "Would you like to play a fighting game with me?"
1001803-5 = "[s] \"A fighting game?\""
1001803-6 = "Yeah, I finally got the new fighting game I told you about when we were texting!"
1001803-7 = "It's a game I've really been looking forward to, so I want to play it now. But all the others have plans today..."
1001803-8 = "Since it's a fighting game, it's impossible to play without an opponent. But I'm kind of scared to play a game with someone that I don't know at all..."
1001803-9 = "Will you be my opponent, Sensei?"
1001803-10 = "[s1] \"I'm no good at fighting games...\"\n[s2] \"I won't go easy on you, so get ready!\""
1001803-11 = "It's okay. This is my first time playing this game."
1001803-12 = "Let's battle each other and build up our skills!"
1001803-13 = "Haha... Now that you've said that, I'm a little nervous."
1001803-14 = "Then I will do my best to fight back!"
1001803-21 = "U-Uh-oh... I-I'm in trouble!"
1001803-24 = "A-Amazing... I didn't know you had such skill..."
1001803-25 = "Then, I'll take a different approach this time..."
1001803-30 = "Yuzu wins! Flawless victory!"
1001803-31 = "[s] \"...I lost.\""
1001803-32 = "Heehee! I took this round."
1001803-33 = "S-Sensei? Why are you making that face? A-Are you not having fun?"
1001803-34 = "Huh? Is it really my first time playing this game?"
1001803-35 = "Of course! This is a brand new game that was just released this morning."
1001803-36 = "I might have won this round because of luck, so...let's go another round!"
1001803-43 = "I-I didn't even know that move existed."
1001803-44 = "I'm in a real pinch this time..."
1001803-47 = "Yuzu wins! Flawless victory!"
1001803-48 = "[s] \"...\""
1001803-49 = "Phew... I barely won again."
1001803-50 = "Contrary to what I said, I've been beating you easily?"
1001803-51 = "Well...when I'm in the zone, I tend to talk to myself without realizing it..."
1001803-52 = "I-I didn't mean to say anything weird, I swear!"
1001803-53 = "Th-Then I won't use any combos for this round, so...how about another round?"
1001803-60 = "Yuzu wins! Flawless victory!"
1001803-61 = "Th-The thing is...without realizing it, I get so excited once I hold the controller... Haha..."
1001803-62 = "I-I won't use any of my grab skills this time, so please play one more round with me!"
1001803-64 = "Despite Yuzu repeatedly going easy on me, I got completely wrecked in the following ten fights..."

[translation]
1000703-1 = "แฮ็กเกอร์ที่ดูลึกลับ"
1000703-2 = "ทางเข้าตลาดมืด"
1000703-6 = "ไม่มีใครดูอยู่ใช่มั้ยนะ? แถวนี้น่าขนลุกหน่อยๆ แฮะ..."
1000703-7 = "ฉันเองก็ไม่อยากมาที่แบบนี้นักหรอก... แต่เพราะแผนนั่นทำให้ฉันไม่มีทางเลือกเลย..."
1000703-8 = "ซอร์ฟแวร์ที่เตรียมไว้ก็เอามาแล้ว...#nเอาล่ะ มาลองทำตามแผนเลยดีกว่า"
1000703-11 = "[s] รู้สึกสังหรณ์ใจแปลกๆ จึงลองตามมากิไป"
1000703-13 = "ดีล่ะ เชื่อมต่อเข้าโปรแกรมที่ควบคุมเครื่องคีออสในบริเวณนี้ได้แล้ว...#nตอนนี้ก็เหลือแค่ติดตั้งซอร์ฟแวร์ที่เตรียมไว้ลงไปก็เรียบร้อย"
1000703-14 = "ติดตั้งโปรแกรมที่เชื่อมต่อพอร์ตไปยังเวอร์ชั่นเว็บซะก่อน!"
1000703-16 = "(ปี๊บ....)"
1000703-19 = "ร้านสะดวกซื้อใกล้กับตลาดมืด"
1000703-22 = "ยินดีต้อนรับ จะรับอะไรดีครับ?"
1000703-23 = "ขอข้าวกล่องบุลโกกีอุ่นร้อนหนึ่งกล่อง"
1000703-24 = "ครับผม เสียบการ์ดชำระเงินที่เครื่องคีออสตรงขวามือได้เลยครับ"
1000703-32 = "อะ...อะไรน่ะ? ทำไมที่หน้าจอเครื่องคีออสถึงแสดงเป็นเกมเรโทรแทนล่ะ..."
1000703-33 = "ปะ...ปีศาจอวกาศโผล่มาแล้ว!"
1000703-34 = "จะ...ใจเย็นๆ ก่อนนะครับคุณลูกค้า!#nมันเป็นแค่เกมเองครับ"
1000703-35 = "นี่มันอะไรกันน่ะ? ต้องเล่นเกมนี้ก่อนถึงจะซื้อข้าวกล่องได้งั้นเหรอ?"
1000703-36 = "ไม่ใช่ครับ ทางระบบคงมีข้อผิดพลาดบางอย่าง... ผมเองก็ไม่แน่ใจเหมือนกันครับ"
1000703-37 = "ถ้าเครื่องคีออสกลายเป็นแบบนี้ไปแล้วฉันจะซื้อข้าวกล่องยังไงล่ะ..."
1000703-39 = "ฮ่าฮ่าฮ่า! ดูพวกนั้นสิ งงเป็นไก่ตาแตกกันหมดเลย#nว่าแล้วเชียว <BOOM> เนี่ยยอดที่สุดเลย!"
1000703-40 = "[s] \"ทำอะไรอยู่น่ะ...\""
1000703-41 = "อ๊ะ? คุณครู? มายืนดูอยู่ตั้งแต่เมื่อไหร่กัน?"
1000703-42 = "ฉันทำอะไรอยู่น่ะเหรอ....? แค่ดูก็รู้แล้วนี่นา"
1000703-43 = "ฉันกำลังแฮ็กเข้าหน้าจอเครื่องคีออสในร้านสะดวกซื้อแล้วก็ติดตั้ง BOOM ลงไปแทนไงล่ะ!"
1000703-44 = "หือ....? คุณครูไม่รู้จัก BOOM งั้นเหรอ?"
1000703-45 = "<BOOM> เป็นสุดยอดผลงานเกมเรโทรแอ็กชั่นที่ดังที่สุดเลยนะ!"
1000703-46 = "ตำรวจอวกาศ BOOM เป็นเกมแนวใช้ปืนลูกซองขนาดใหญ่ไล่ล่ากำจัดมนุษย์ต่างดาวน่ะ#nและตอนนี้ในหมู่แฮ็กเกอร์ก็กำลังมี \"บูมชาเลนจ์\" โดยให้แฮ็กเข้าไปติดตั้งเกมนี้ลงบนอุปกรณ์#nต่างๆ อยู่ยังไงล่ะ!"
1000703-47 = "ทั้งพวกโทรศัพท์มือถือ เครื่องคีออส ป้ายโฆษณา อ๋อ... แล้วก็เครื่องคิดเลขด้วย!#nถ้าเป็นอุปกรณ์คอมพิวเตอร์ที่มีหน้าจออยู่ล่ะก็... สามารถติดตั้ง BOOM ลงไปได้หมดเลยล่ะ!"
1000703-48 = "คุณครูคิดว่าไงล่ะ? เจ๋งเลยใช่มั้ย?"
1000703-49 = "[s] \"คนอื่นเขาวุ่นวายไปหมดแล้วนะ เลิกแกล้งคนอื่นแบบนี้เถอะ\""
1000703-50 = "แต่ว่า... ท่าทางของพวกเขาดูตลกจะตายไป... ถ้าจู่ๆ ให้เลิกทำแบบนี้มันก็น่าเสียดายนะ"
1000703-51 = "ไหนดูซิ... คราวนี้ลองติดตั้งเกม BOOM ลงบนป้ายโฆษณาบนทางด่วน KV แล้วกัน..."
1000703-52 = "[s] \"ถ้าไม่หยุดจะโกรธจริงๆ แล้วนะ\""
1000703-53 = "อึ่ก... รู้แล้วล่ะ ฉันไม่อยากโดนคุณครูโกรธหรอก เพราะงั้นวันนี้จะยอมให้ก็แล้วกัน"
1000703-56 = "ชิส์ ฉันแค่อยากทำอะไรเจ๋งๆ ให้คนอื่นได้เห็นบ้างก็เท่านั้นเอง... แต่คุณครูก็เอาแต่ห้ามตลอด#nเลย..."
1000703-57 = "เรื่องเจ๋งๆ ที่ไม่สร้างความเดือดร้อนให้กับคนอื่นงั้นเหรอ?#nอืม... แล้วมันมีอะไรบ้างล่ะ?"
1000703-58 = "[s] \"ลองทำเรื่องที่ทุกคนชอบแทนดีมั้ยล่ะ?\""
1000703-59 = "เรื่องที่คนอื่นจะชอบงั้นเหรอ? มีเรื่องอะไรบ้างนะ..."
1000703-60 = "อ่ะฮ่า! ดีล่ะ ถ้างั้นคราวหน้าฉันจะอัปโหลดเป็นวิดีโอช่วยผ่อนคลายจิตใจแทนแล้วกัน!"
1000703-61 = "[s] \"เพิ่งบอกไปนะว่าอย่าทำให้คนอื่นลำบากน่ะ...\""

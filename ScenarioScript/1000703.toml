1000703-1 = "#Title;수상한 해킹"
1000703-2 = "#place;블랙마켓 입구"
1000703-3 = "3;마키;01\n#wait;1000\n#3;a"
1000703-4 = "3;마키;01\n#3;m2\n#wait;1000"
1000703-5 = "3;마키;01\n#3;m4\n#wait;1000"
1000703-6 = "3;마키;02;아무도 보는 사람 없겠지? #n이 근처는 조금 으슥하네…… \n#3;em;[...]"
1000703-7 = "3;마키;01;나도 이런 곳까지 오고 싶지는 않았지만……. #n그 계획을 실행시키기 위해서라면 어쩔 수 없지."
1000703-8 = "3;마키;00;미리 준비한 소프트웨어도 챙겨왔고…… #n자, 어디 한 번 계획을 실행시켜 볼까?\n#3;em;[음표]\n#3;greeting"
1000703-9 = "3;마키;00\n#3;dr\n#wait;1000"
1000703-10 = "#wait;1000\n#all;hide"
1000703-11 = "[s] 뭔가 불안하다. 마키를 따라가자."
1000703-12 = "#all;hide"
1000703-13 = "3;마키;01;좋아. 이 일대의 키오스크에 접근할 수 있는 제어 프로그램에 접속했으니까……. #n이제 남은 일은 준비한 소프트웨어를 설치하는 것 뿐이네.\n#3;a"
1000703-14 = "3;마키;00;우선은 간단하게 웹 버전으로 포팅된 소프트웨어를 실행시켜볼까!\n#3;em;[!]"
1000703-15 = "3;마키;00\n#3;greeting\n#3;h"
1000703-16 = "#na;(삑—)"
1000703-17 = "#wait;1500"
1000703-18 = "#3;hide\n1;점원;01"
1000703-19 = "#place;블랙마켓 인근의 편의점"
1000703-20 = "#wait;500"
1000703-21 = "5;고객;01\n#5;al\n#wait;1000"
1000703-22 = "1;점원;03;어서 오십시오, 무엇을 도와 드릴까요?\n#1;em;[반짝]\n#1;greeting"
1000703-23 = "5;고객;01;불고기 도시락 하나 데워서 주세요.\n#5;em;[반응]"
1000703-24 = "1;점원;01;네, 계산은 우측의 키오스크에 카드를 접촉시켜 주세요."
1000703-25 = "#wait;1500"
1000703-26 = "#wait;100"
1000703-27 = "5;고객;01\n1;점원;04\n#1;shake\n#5;shake\n#1;h\n#5;h\n#wait;1000"
1000703-28 = "#wait;500"
1000703-29 = "#wait;500"
1000703-30 = "#wait;500"
1000703-31 = "#wait;500"
1000703-32 = "1;점원;04;뭐, 뭐지? #n갑자기 키오스크 화면 상에 고전 게임이 떠오르다니……\n#1;em;[땀]"
1000703-33 = "5;고객;01;우, 우주 악마가 나타났다! \n#5;stiff\n#5;em;[!]"
1000703-34 = "1;점원;04;지, 진정하세요, 손님! #n이건 게임일 뿐입니다."
1000703-35 = "5;고객;01;이, 이건 뭐죠? #n이 게임을 플레이해야 도시락을 살 수 있는 건가요?"
1000703-36 = "1;점원;06;아뇨, 저도 처음보는 형태의 오류라……. #n잘 모르겠습니다.\n#1;em;[속상함]"
1000703-37 = "5;고객;01;그보다 키오스크가 이 모양이면 도시락은 어떻게 사지……"
1000703-38 = "#all;hide"
1000703-39 = "3;마키;03;하하하! 저 곤란해하는 모습 좀 보라지. #n역시 <BOOM>은 최고야!\n#3;em;[음표]\n#3;a\n#3;hophop"
1000703-40 = "[s] \"……무얼 하고 있는 거야.\""
1000703-41 = "3;마키;02;우앗? 선생님? #n언제부터 보고 있었던 거야?\n#3;shake\n#3;em;[?!]"
1000703-42 = "3;마키;01;무얼 하고 있냐고……? #n보면 알 수 있잖아."
1000703-43 = "3;마키;03;편의점의 키오스크 화면을 해킹해서 그 위에 BOOM을 설치하는 중이었어!\n#3;em;[반짝]"
1000703-44 = "3;마키;04;……응? 선생님, 혹시 BOOM을 모르는 거야?"
1000703-45 = "3;마키;03;<BOOM>은 말이지, 고전 게임 중에서도 최고의 걸작으로 손꼽히는 명작 액션 게임이라고!\n#3;m2\n#3;em;[재잘]"
1000703-46 = "3;마키;00;우주 경찰 붐-가이가 커다란 산탄총으로 외계인들을 물리쳐 나가는 게임인데, 해커들 사이에서는 이 게임을 온갖 기기에 설치하는 BOOM 챌린지가 대 유행이야!\n#3;m4"
1000703-47 = "3;마키;01;핸드폰은 물론이고, 키오스크, 전광판, 계산기까지! #n모니터가 존재하는 컴퓨터 기기라면 어디든 BOOM을 설치할 수 있어!\n#3;m3"
1000703-48 = "3;마키;03;어때. 대단하지, 선생님?\n#3;em;[반짝]\n#3;hophop"
1000703-49 = "[s] \"사람들이 곤란해 하잖아. 심한 장난은 그만둬.\""
1000703-50 = "3;마키;01;하지만…… #n모처럼 재미있는 반응을 볼 수 있을 텐데, 이대로 끝내기는 조금 아깝잖아."
1000703-51 = "3;마키;00;어디, 이번에는 KV 하이웨이의 전광판에도 BOOM을……\n#3;m4"
1000703-52 = "[s] \"그만두지 않으면 정말로 화낼 거야?\""
1000703-53 = "3;마키;05;우으…… 알았어. #n선생님이 화를 내는 건 보고 싶지 않으니까 오늘은 여기서 참을게.\n#3;m3\n#3;em;[속상함]"
1000703-54 = "3;마키;05\n#3;greeting\n#3;h\n#wait;1500"
1000703-55 = "#all;hide"
1000703-56 = "3;마키;05;칫, 나는 눈에 띄는 멋진 일을 하고 싶은데……. #n선생님은 매번 안된다는 말만 하구……\n#3;a"
1000703-57 = "3;마키;06;다른 사람에게 피해를 주지 않으면서 화려한 일? #n그런 게 뭐가 있는데?\n#3;em;[반응]"
1000703-58 = "[s] \"누구나 좋아할 만한 일을 하는 게 어떨까?\""
1000703-59 = "3;마키;02;누구나 좋아할 만한 일? 그런 게 뭐가 있을까……"
1000703-60 = "3;마키;03;아하! 좋아, 그럼 다음 번에는 마음이 편안해지는 힐링 영상을 송출시키는 거야!\n#3;em;[반짝]\n#3;hophop"
1000703-61 = "[s] \"그러니까, 다른 사람에게 폐를 끼치면 안 된다니까……\""

[translation]
1000703-1 = "可疑的入侵"
1000703-2 = "黑市．入口"
1000703-6 = "沒有被任何人看到吧……？ #n這附近，有點陰森呢……  "
1000703-7 = "雖然我也不想來這種地方…… #n為了執行那項計畫也沒辦法。"
1000703-8 = "事先準備好的軟體也帶來了…… #n好，來執行計畫吧？"
1000703-11 = "[s] 感覺有點不安，跟著真紀吧"
1000703-13 = "好。已經連上能夠存取這一帶多媒體設備的控制程式了…… #n現在只剩下安裝準備好的軟體了。"
1000703-14 = "首先，為了讓這個版本能夠作用先執行移植的軟體……！"
1000703-16 = "（嗶──）"
1000703-19 = "黑市附近的便利商店"
1000703-22 = "歡迎光臨。"
1000703-23 = "一個烤肉便當，請幫我加熱。"
1000703-24 = "是，結帳時請將卡片靠近右側的設備進行感應。"
1000703-32 = "什，什麼？ #n設備的螢幕上突然跳出懷舊遊戲的畫面……？"
1000703-33 = "這，這是什麼？#n畫面上，出現了像是來自宇宙的，惡魔！？"
1000703-34 = "請，請您冷靜一點，這位客人！ #n我想這只是，遊戲而已……"
1000703-35 = "這，這是什麼？ #n要玩這個遊戲才能買便當嗎？"
1000703-36 = "不，我也是第一次看到這種錯誤…… #n我不太清楚。"
1000703-37 = "怎麼會，設備這個樣子的話便當要怎麼結帳……"
1000703-39 = "啊哈哈！看看他那為難的樣子。 #n果然《毀滅狂戰士》最棒了！"
1000703-40 = "[s] 「……妳在做什麼？」"
1000703-41 = "嗚哇！？老師？ #n你從什麼時候開始看的？"
1000703-42 = "你問我在做什麼……？ #n看了就知道了吧？"
1000703-43 = "我駭進了便利商店的店面設備，在上面安裝了毀滅狂戰士！"
1000703-44 = "……嗯？難道說老師，你不知道毀滅狂戰士嗎？"
1000703-45 = "《毀滅狂戰士》呢，可是懷舊遊戲中被列為最強傑作之一的動作遊戲名作唷！"
1000703-46 = "雖然是個「宇宙警察毀滅狂戰士GUY」用巨大的霰彈槍擊退外星人的遊戲。最近在駭客之間很流行把這個遊戲設置在各種機器上的「毀滅狂戰士挑戰」！"
1000703-47 = "除了手機，還有這種店面設備、電子看板、就連計算機！ #n只要是有顯示器的電腦機器，不管是哪裡都可以安裝毀滅狂戰士！"
1000703-48 = "如何？很厲害吧，老師。"
1000703-49 = "[s] 「大家這不是很困擾嗎，不可以做這種過頭的惡作劇。」"
1000703-50 = "可是…… #n難得可以像這樣看到有趣的反應，就這樣結束有點可惜呀。"
1000703-51 = "我看看，下一個在KV高速公路的廣告看板上將毀滅狂戰士……"
1000703-52 = "[s] 「不住手的話我真的會生氣唷？」"
1000703-53 = "嗚……我知道了。 #n我不想看到老師生氣，今天就這樣吧。"
1000703-56 = "真是的，我明明想做華麗、引人注目的、帥氣的事。 #n老師每次都說不行……"
1000703-57 = "不會造成其他人困擾，華麗又帥氣的事…… #n有那種事嗎？"
1000703-58 = "[s] 「做大家都喜歡的事如何？」"
1000703-59 = "大家都喜歡的事？有那種事嗎……"
1000703-60 = "對了！那下次，就播放讓人看了就心情放鬆的療癒影片吧！"
1000703-61 = "[s] 「所以說，會對他人造成麻煩的不行啊……」"

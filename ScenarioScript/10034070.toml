[translation]
10034070-1 = "第7話;青春物語"
10034070-3 = "……謝謝您願意過來一趟，老師。這邊請。"
10034070-4 = "他們人就在這邊……是的……是的。#n這幾位就是夜襲營運委員會的現行犯。"
10034070-5 = "雖然不清楚原因為何，不過他們表示在您來之前一句話也不會說。"
10034070-6 = "看起來似乎沒有盜竊什麼貴重物品或金錢，因此我們也還在商量該如何處置……"
10034070-7 = "當我們抵達現場時，他們已經和負責警備的學生大打出手，甚至連警戒線都突破了。"
10034070-8 = "由於動作意外的熟練，差點就被他們順利逃脫……"
10034070-9 = "那麼我就先行告退了。#n後續的事再麻煩您稍後和一花前輩討論。"
10034070-10 = "好的……是，謝謝您。#n那麼我先告辭了……"
10034070-16 = "隔著拘留所的欄杆重聚……"
10034070-17 = "……真是搖滾呢。"
10034070-18 = "我還以為能再多堅持一下的說，看來凱茜．帕魯格的身手也退步了啊。"
10034070-19 = "誰敢再提一次我就宰了他……"
10034070-20 = "唉……雖然早有心理準備會變成這樣……"
10034070-21 = "[ns1]「所以這到底是什麼情況……？」\n[ns2]「你們究竟做了什麼……」"
10034070-24 = "實現正義部的人已經走了嗎……？"
10034070-25 = "真的走了？確定嗎？"
10034070-26 = "[s3]「嗯，是這樣沒錯……」\n[s4]「看來你們似乎隱瞞了什麼？」"
10034070-31 = "……老師，愛莉他在嗎？"
10034070-32 = "你們剛才應該在一起才對，有帶他過來嗎？"
10034070-33 = "……怎麼問得一副理所當然的樣子。"
10034070-34 = "[s5]「……愛莉怎麼了嗎？」\n[s6]「找愛莉的話，他在這裡哦。」"
10034070-41 = "嗯……？我……？"
10034070-42 = "為什麼突然提到我呢……"
10034070-43 = "……靠近一點。"
10034070-44 = "……？"
10034070-45 = "……再近一點。"
10034070-46 = "……？？"
10034070-47 = "……再近一點點。"
10034070-48 = "……？？？？？？"
10034070-49 = "……很好。"
10034070-50 = "…………喏。"
10034070-56 = "……？？？？？？"
10034070-57 = "這，這是……？"
10034070-58 = "[ns7]「……女王泡芙。」\n[ns8]「原來你們是……」"
10034070-62 = "我們的目的從一開始就是這個……"
10034070-63 = "……雖然很想這麼說，但我們的實力很遺憾地只有這種程度。"
10034070-64 = "不過這確實是我們從倉庫找到的一部分「真品」，所以味道還是能掛保證的。"
10034070-65 = "真是的～想要吃這個就早說嘛，害我們提心吊膽的！"
10034070-66 = "不是，你們兩個是在得意個什麼勁。#n架幾乎都是我在打吧……"
10034070-67 = "不過吃完後記得告訴我們感想哦。#n我們也都還沒嚐過呢。"
10034070-68 = "而且就像你看到的一樣……#n我們現在變成這副德性，明天之後可能就沒有社團部室能用了。"
10034070-69 = "我會再創一個聊天群組，不過那件事就等明天再說吧。"
10034070-71 = "那，那是……什麼意思……"
10034070-72 = "……抱歉，愛莉。沒跟你說一聲就擅自作主。"
10034070-73 = "你們……該不會……"
10034070-74 = "只是為了這個東西……不惜做到這種地步……？"
10034070-75 = "……？"
10034070-76 = "為什麼……到底為什麼……"
10034070-77 = "這，這個反應是怎麼回事……怎麼跟想像中完全不一樣？"
10034070-78 = "為什麼……要做這種事呢……？"
10034070-79 = "難道是為了我嗎……？"
10034070-80 = "不然還能為了什麼……？你不是想吃這個嗎？#n不就是因為太想吃這個才說要組樂團的嗎……"
10034070-87 = "難道不是嗎……？竟然不是嗎！？"
10034070-88 = "……喂，等等。#n那我們這麼辛苦到底是為了什麼啊？"
10034070-89 = "是哪個傢伙說要這麼做的！！最一開始提議的是誰！！！"
10034070-90 = "呵呵，搞錯了嗎。#n這也很搖滾……"
10034070-91 = "你這傢伙居然還笑得出來！！"
10034070-93 = "為什麼……為什麼要……"
10034070-94 = "為什麼要為了「我這種人」……"
10034070-96 = "……？"
10034070-97 = "……？？？？？？"
10034070-98 = "……怎麼了？#n為，為什麼要哭……？"
10034070-99 = "愛，愛莉……！？你怎麼了！？發生了什麼事嗎？"
10034070-100 = "老師！？現在是什麼情況？愛莉為什麼突然哭了？？"
10034070-106 = "[ns9]「……來吧，愛莉。」\n[ns10]「接下來就由你親口跟大家說吧。」"
10034070-109 = "嗯……？老師……？"
10034070-110 = "要我親口……告訴大家……？"
10034070-111 = "是指剛才跟老師說的那些話嗎……？#n怎，怎麼可能……！！我做不到！！"
10034070-112 = "居然要在這種場合……把那些話說出來……！！"
10034070-113 = "……？"
10034070-114 = "什，什麼跟什麼啊？#n你們兩個該不會有什麼我們不知道的祕密吧？"
10034070-115 = "兩個人的深夜幽會……一點也不搖滾……"
10034070-116 = "……不是，老師剛才只是要人家「親口說出來」而已。#n你們到底是怎麼理解成那種意思的啊。"
10034070-117 = "總之現在立刻從實招來！！不管是什麼，我今天一定要聽到答案！！#n我們可是為了這個折騰了一整晚耶！！"
10034070-118 = "讓人生氣的方法之一就是話只說一半……"
10034070-119 = "老，老師……！！"
10034070-123 = "[ns11]「那我先去見一下實現正義部。」\n[ns12]「這次該編什麼藉口好呢……」"
10034070-126 = "老，老師……！老師……！！"
10034070-127 = "[ns13]「沒事的，愛莉。我相信你一定做得到的。」\n[ns14] 裝作沒聽見並離開"
10034070-131 = "老師～～～！！！"
10034070-135 = "……嗯，好吧。#n大致情況我都明白了。我會先這樣呈報上去。"
10034070-136 = "唔嗯……雖然這個藉口聽起來還算合理……總會有辦法的吧。"
10034070-137 = "反正重點不是細節而是意圖。#n我會想辦法讓整起事件看起來只是個小插曲的。"
10034070-138 = "[s15]「謝謝你，一花。」\n[s16]「我欠了你一個大人情。」"
10034070-141 = "哎呀，哪有什麼人情不人情的。#n老師才真是辛苦了。"
10034070-142 = "畢竟出事的時候一定要聯絡你是我們的「約定」嘛！"
10034070-143 = "而且聽起來也沒做什麼壞事。#n我反倒覺得他們很可愛呢。哈哈！"
10034070-144 = "茶會的人應該也不希望在活動前把事情鬧大，我相信他們會睜一隻眼閉一隻眼的……"
10034070-145 = "所以這件事就不用太擔心了，一定會順利落幕的。"
10034070-150 = "哎呀，又有工作來了……"
10034070-151 = "雖然很想再跟老師聊聊，但今天得優先處理工作才行。#n那我先走囉，老師！"
10034070-152 = "下次再見～！"
10034070-153 = "[s17]「路上小心～」\n[s18] 揮手送別"
10034070-161 = "……真令人吃驚呢。"
10034070-162 = "我曾想過如果故事往這個方向發展……就會變得有如漫畫的情節一般。"
10034070-164 = "……沒想到我現在就身處於漫畫之中呢。"
10034070-165 = "[s19]「你果然在這裡啊，紬。」\n[s20]「抱歉突然請你過來。」"
10034070-170 = "您不必客氣。#n先前之所以把聯絡方式告訴您，也是希望能在這種時候派上用場。"
10034070-171 = "反而是我該為太晚看到訊息而來遲道歉才對……"
10034070-172 = "不過……"
10034070-173 = "嗯，我們的主角身邊已經有許多幫手，不再需要我出面了呢。"
10034070-174 = "……為自己的不足而感到挫折的主角啊。"
10034070-175 = "獨自對音樂傾注了多於旁人的情感，因此必須孤身面對名為「不安」的試煉。"
10034070-176 = "從中引發了自我衝突……以及對自己的反省及鄙視。"
10034070-177 = "與夥伴之間的衝突、逃避……以及戲劇性的邂逅和交心。"
10034070-178 = "倘若能克服這一切，那麼過去的練習和經驗就會開始發光發熱。"
10034070-179 = "只要能突破自己內心的天花板，便能展現出與以往不同的表演。"
10034070-180 = "真是太完美了。#n沒錯。如此美麗的……"
10034070-185 = "……「青春」。"
10034070-186 = "……真是青春的故事呢。"
10034070-187 = "不過，如此引人入勝的劇情，目前正演到「感人肺腑的高潮」吧。"
10034070-188 = "哭泣、吶喊著的學生們……綻放出含淚笑容的奇蹟場面。"
10034070-189 = "不去親眼見證沒關係嗎？#n和我在這裡說話，您不會覺得有點遺憾嗎？"
10034070-190 = "[s21]「沒關係，畢竟我是老師嘛。」\n[s22]「我反而有點慶幸不用親身參與。」"
10034070-193 = "原來如此……這樣啊。"
10034070-194 = "這就是大人的觀點嗎……在這短暫的時間裡，我也學到了一點東西呢。"
10034070-198 = "不過老師。#n即使故事已經發展至此……仍有一個伏筆尚未解開。"
10034070-199 = "主角終究沒能獲得特殊的能力或才能……這點依然沒有改變唷？"
10034070-200 = "莫非這部漫畫也只是「金玉其外，敗絮其中」之流嗎？"
10034070-201 = "老師您……是怎麼想的呢？"
10034070-202 = "……什麼？"
10034070-203 = "「討厭某部份的自己是很自然的事」……是嗎？"
10034070-204 = "真令人意外。#n其他人姑且不論，沒想到老師竟然也不否認這一點……"
10034070-205 = "[s23]「如果自己一直拿來比較的『旁人』……」\n[s24]「如果那些人對自己很重要……」"
10034070-210 = "[ns25]「那麼這也是自己所創造出來的結果。」\n[ns26]「那麼其中也勢必會包含自己的影響。」"
10034070-215 = "……原來如此。"
10034070-216 = "也就是說，如果他愛著自己身旁的人……"
10034070-217 = "那麼創造出那幅動人場景的人，自然也會是他自己。"
10034070-218 = "只是這對他來說太過理所當然……所以才會沒有意識到。"
10034070-219 = "……真是浪漫呢。我非常滿意。"
10034070-220 = "面對如此精彩的漫畫，若是毫無付出實在讓人過意不去。#n既然欣賞到了優秀的作品，我自然也該表示一些心意才行。"
10034070-221 = "所以老師，請您收下這個……"
10034070-225 = "[ns27]「這個是……」\n[ns28]「樂譜？是你自己作的嗎？」"
10034070-228 = "我是想像著這樣的結局……抱持著希望寫下這首曲子的。#n雖然最終將其親自交到您的手中，屬實在我意料之外。"
10034070-229 = "儘管這首歌比上次選的要難得多……"
10034070-230 = "……呵呵。#n相信以他們現在的實力和狀態，應該完全沒問題的。"
10034070-231 = "就當作是觀賞的費用吧。#n不過因為只寫了曲子，歌詞的部分就必須由主角來努力了。"
10034070-232 = "……哎呀，說著說著就到這個時間了呢。#n大家應該也等好一陣子了。"
10034070-233 = "那麼我就先告辭了。下次就在演出時再會吧。"
10034070-234 = "不過我要先聲明，我並非擔任團長或主唱之類的角色，所以不要抱太大的期待唷。"
10034070-235 = "或許您就算看到我們的表演也無法認出我……畢竟其他成員都比我還有個性呢。"
10034070-236 = "不過……嗯，那也無傷大雅吧。"
10034070-241 = "……畢竟音樂這種東西，只要能和它身處在同一個空間裡就足夠了。"
10034070-244 = "到底在說什麼啦，真是的！#n從剛才開始就一直在說奇怪的話～！！"
10034070-245 = "不是啦，喜美醬。我只是……"
10034070-246 = "……啊，老師！是老師！！"
10034070-247 = "你聽我說！！愛莉一直在說自己「一無是處，什麼都不會」之類的！！"
10034070-248 = "沒有，我只是想說自己沒什麼拿手的……"
10034070-249 = "所以你是想要有「角色個性」嗎？想變得更「搖滾」嗎？"
10034070-250 = "那有什麼問題。#n只要把本就屬於你的東西──王座、皇冠、頭銜──通通奪回去就行了。"
10034070-251 = "啊啊，座上空無一人的難受時期終於將畫下句點──她，將睥睨天下！"
10034070-255 = "簡單來說，我們只是在討論要把部長的職位還給愛莉而已。"
10034070-256 = "……嗯？你說不是沒有部長嗎？#n嗯，是這樣沒錯。我們社團一直都沒有部長。"
10034070-257 = "因為成立這個社團的人說過「不喜歡有上下關係的職位」。"
10034070-258 = "[s29]「……啊。」\n[s30]「所以成立放學後的甜點部的是……」"
10034070-261 = "我不是說過不是那樣了嗎！就算當了部長……！"
10034070-262 = "算了算了，這個話題到此為止！是我錯了……！！"
10034070-263 = "不行！不然愛莉以後只要逮到機會，說不定又會開始說這些奇怪的話。#n得想點辦法來預防這種情況才行。"
10034070-268 = "我也同意。#n而且說真的，我當初之所以來這裡……"
10034070-269 = "……？"
10034070-270 = "怎麼，終於不打算隱瞞了嗎，凱茜．帕魯格？"
10034070-271 = "……當然是因為甜點太好吃～才會來啊～？"
10034070-276 = "我真受不了你們這群笨蛋！怎麼連話都沒辦法好好說啊！？#n這樣還有臉說自己是高中生嗎！？"
10034070-277 = "愛莉！如果不是為了你，我們三個根本不會被抓來這裡！！這樣你聽懂了嗎！？"
10034070-278 = "雖然和他們兩個傢伙算在一起讓我有點不爽就是了……！"
10034070-279 = "你也看一下氣氛好嗎……"
10034070-281 = "喜，喜美醬……"
10034070-282 = "但是我……"
10034070-284 = "啊，真是的！！你就是人太好才會這樣！#n朋友之間相處久了，偶爾會覺得對方討厭很正常！！"
10034070-285 = "真的要這麼說的話，這些傢伙……"
10034070-286 = "沒錯，像我每天都覺得他們很煩。#n一週至少會有一次對他們起殺意。"
10034070-287 = "原來是這樣啊……千紗……"
10034070-288 = "……？#n怎，怎樣啦。突然那個反應……"
10034070-289 = "千紗……"
10034070-294 = "每天都那麼生氣不覺得累嗎？"
10034070-296 = "其中有七成是因為你啦──！！！！！！"
10034070-302 = "我是不會屈服於暴力的──！！！"
10034070-310 = "敢不敢把盾牌放下！！！"
10034070-311 = "人類會持續進步，我們遲早會找到方法！！"
10034070-312 = "可惡……呃呃呃……頭好暈……"
10034070-316 = "不過……這次我也認為喜美說得對。"
10034070-317 = "……還給我強調「這次」？"
10034070-318 = "……愛莉。"
10034070-319 = "不管是誰都有可能不喜歡自己。那種心情我比任何人都清楚。"
10034070-320 = "理所當然地認為愛莉不會有那種想法……是我不對。"
10034070-321 = "……抱歉，愛莉。"
10034070-323 = "千紗醬……"
10034070-328 = "所以這件事最終回歸到一個問題。"
10034070-329 = "在否定自己之前，先看看周圍的人事物吧。#n不要把自己和身旁的人分開，而是視為一個整體。"
10034070-330 = "……愛莉。"
10034070-337 = "你……"
10034070-365 = "「……討厭現在的自己嗎？」"
10034070-376 = "[log=아이리 밴드]「……我喜歡。」[/log]"

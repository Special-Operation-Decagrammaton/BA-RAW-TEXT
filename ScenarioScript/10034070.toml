[translation]
10034070-1 = "ตอนที่ 7;การ์ตูนวัยรุ่นหนึ่งตอน"
10034070-3 = "มาแล้วเหรอคะคุณครู เชิญทางนี้ค่ะ"
10034070-4 = "ในห้องคุมทางด้านนี้... ค่ะ ใช่ค่ะ... นี่คือกลุ่มผู้กระทำผิดที่จู่โจมคณะกรรมการบริหารที่พวกฉันจับตัว#nได้ในที่เกิดเหตุค่ะ"
10034070-5 = "เรื่องแรงจูงใจยังไม่รู้ค่ะ เด็กพวกนั้นบอกว่าจะไม่ปริปากพูดอะไรจนกว่าคุณครูจะมาถึงค่ะ"
10034070-6 = "แต่ก็ไม่ได้เหมือนว่าจะมาปล้นเงินหรือของมีค่า พวกฉันก็เลยยังไม่ได้ตั้งข้อหา..."
10034070-7 = "ตอนที่เข้าไปในที่เกิดเหตุ พวกนี้ปะทะกับเหล่านักเรียนที่เป็นเวรยามไปแล้วยกหนึ่ง แล้วก็ฝ่าแนวล้อมมาได้ทั้งหมดเลยค่ะ"
10034070-8 = "พวกเธอเคลื่อนไหวกันอย่างชำนาญมากจนพวกฉันเกือบจับตัวไม่ได้แล้วด้วย..."
10034070-9 = "เอาเป็นว่าฉันจะให้คุณครูได้คุยกับพวกเธอก่อนค่ะ ฉันจะกลับไปก่อน ส่วนที่เหลือไว้หารือกับรุ่นพี่#nอิจิกะต่อนะคะ"
10034070-10 = "ขอบคุณค่ะ... ถ้างั้นฉันขอตัวก่อนค่ะ"
10034070-16 = "การได้พบกันอีกครั้งที่มีหน้าต่างกรงเหล็กกั้นกลาง..."
10034070-17 = "แบบนี้มันร็อกจริงๆ..."
10034070-18 = "นึกว่าจะอดทนได้อีกหน่อยซะอีก แคทส์ พาลูคคงลาวงการไปแล้วจริงๆ สินะ"
10034070-19 = "หยุดพูดได้แล้ว เดี๋ยวก็เชือดทิ้งซะเลย..."
10034070-20 = "เฮ้อ... ถึงจะเตรียมใจไว้แล้วว่าจะจบแบบนี้ก็เถอะ..."
10034070-21 = "[ns1] \"นี่มันสถานการณ์อะไรกันน่ะ...?\"\n[ns2] \"ทุกคนไปก่อเรื่องอะไรกันมา...\""
10034070-24 = "ไปรึยัง? คนจากชมรมทวงความยุติธรรมน่ะ...?"
10034070-25 = "ไปแล้วใช่มั้ย? ไม่ได้อยู่ตรงนี้แล้วใช่มั้ย?"
10034070-26 = "[s3] \"ใช่ ออกไปแล้ว...\"\n[s4] \"มีเรื่องอะไรบิดบังอยู่ใช่มั้ย?\""
10034070-31 = "คุณครู... ไอริล่ะ...?"
10034070-32 = "เมื่อกี้ไม่ได้อยู่ด้วยกันหรอกเหรอ? พาเธอกลับมาด้วยรึเปล่า? พามาแล้วใช่มั้ย?"
10034070-33 = "พวกเธอนี่ก็ถามอะไรแปลกๆ นะ..."
10034070-34 = "[s5] \"เกี่ยวกับไอริด้วยงั้นเหรอ...?\"\n[s6] \"ไอริอยู่ตรงนี้แล้ว\""
10034070-41 = "อะ... อื้อ... เมื่อกี้..."
10034070-42 = "เรียกหาฉันเหรอ...? ทำไมอยู่ๆ ถึงพูดถึงฉัน..."
10034070-43 = "เข้ามาใกล้ๆ สิ"
10034070-44 = "...?"
10034070-45 = "ใกล้อีก..."
10034070-46 = "...??"
10034070-47 = "อีกนิด..."
10034070-48 = "...??????"
10034070-49 = "ดีละ..."
10034070-50 = "เอ้านี่..."
10034070-56 = "...??????"
10034070-57 = "นะ... นี่มัน...?"
10034070-58 = "[ns7] \"เฟรเดริก้า เซมล่า...\"\n[ns8] \"นี่ทุกคน...\""
10034070-62 = "นี่คือเป้าหมายตั้งแต่แรกของเราน่ะ..."
10034070-63 = "ถึงเราจะวางแผนกันมาซะดิบดี แต่ก็น่าเสียดายที่ความสามารถของเรามีได้แค่เท่านี้"
10034070-64 = "แต่ยังไงนี่ก็เป็นขนม 'ของจริง' ที่เราได้มาจากห้องเก็บของ เพราะงั้นมันจะต้องอร่อยแน่นอน"
10034070-65 = "จริงๆ เล้ย~ ถ้าอยากกินทำไมไม่บอกกันตั้งแต่แรกล่ะ ทำไมถึงทำให้คนอื่นเป็นห่วงแบบนี้!"
10034070-66 = "เดี๋ยวนะ ฉันคนเดียวเหอะที่เป็นคนต่อสู้น่ะ..."
10034070-67 = "แต่กินแล้วก็บอกกันหน่อยนะว่ารสชาติเป็นยังไงบ้าง พวกเรายังไม่ได้แตะเลยแม้แต่น้อยน่ะ"
10034070-68 = "แล้วก็อย่างที่เห็นว่าตอนนี้พวกเราอยู่ในสภาพนี้แล้ว ตั้งแต่พรุ่งนี้ไปเราคงอดใช้ห้องชมรม..."
10034070-69 = "ฉันจะสร้างกรุ๊ปแชตขึ้นมาให้ เอาไว้คุยเรื่องนี้กันพรุ่งนี้แล้วกัน"
10034070-71 = "นะ... นี่มัน... อะไรกันน่ะ..."
10034070-72 = "ขอโทษนะไอริ... ขอโทษที่พวกเราไปก่อเรื่องโดยที่ไม่ได้บอกล่วงหน้านะ"
10034070-73 = "ทุกคน... อย่าบอกนะว่า..."
10034070-74 = "ทำกันถึงขนาดนี้... เพื่อขนมชิ้นนี้ชิ้นเดียว...?"
10034070-75 = "...?"
10034070-76 = "ทำไมล่ะ... ทำไมถึง..."
10034070-77 = "อะ... อะไรกัน... ทำไมถึงมีปฏิกิริยาแบบนี้...? ไม่เห็นเหมือนที่คิดไว้เลย?"
10034070-78 = "ทำไม... ทำไมถึงทำเรื่องแบบนี้...?"
10034070-79 = "อย่าบอกนะว่าเพราะจะเอาขนมนี้มาให้ฉัน...?"
10034070-80 = "ถามแปลกๆ... เธอไม่ได้อยากกินขนมนี้หรอกเหรอ? อยากกินขนมนี้มากเสียจนมาชวนตั้งวงดนตรี#nเลยไม่ใช่รึไง..."
10034070-87 = "เดี๋ยวนะ...! ไม่ใช่งั้นเหรอ?"
10034070-88 = "ดะ... เดี๋ยวนะ ถ้างั้นสิ่งที่พวกเราทำไป..."
10034070-89 = "ใครเป็นคนริเริ่มแผนการนี้ห้ะ!! ใครเป็นคนพูดคนแรก!!!"
10034070-90 = "ฮุฮุ หักมุมเหรอเนี่ย ร็อกอีกแล้ว..."
10034070-91 = "นี่ไม่ใช่เรื่องมาหัวเราะอยู่นะ เดี๋ยวเหอะยัยนี่!!"
10034070-93 = "ทำไม... ทำไมถึง..."
10034070-94 = "ทำเพื่อ 'คนอย่างฉัน'... ทำไมกัน..."
10034070-96 = "...?"
10034070-97 = "...?????"
10034070-98 = "อะไรน่ะ? ระ... ร้องไห้ทำไม...?"
10034070-99 = "อะ... ไอริ...!? ไอริ เป็นอะไรไปน่ะ!? มีเรื่องอะไรงั้นเหรอ?"
10034070-100 = "คุณครู!? นี่มันเรื่องอะไรกัน? ทำไมไอริถึงร้องไห้...?"
10034070-106 = "[ns9] \"เอาละ... ไอริ\"\n[ns10] \"ตอนนี้ไอริบอกเพื่อนๆ เองได้แล้วนะ\""
10034070-109 = "คะ... คะ...? คุณครู...?"
10034070-110 = "ให้ฉัน... บอกเองเหรอคะ...?"
10034070-111 = "คำที่ฉันบอกคุณครู... เมื่อกี้น่ะเหรอคะ? จะ... จะให้ฉันบอกได้ยังไง...!! ฉันทำไม่ได้หรอกค่ะ!!"
10034070-112 = "ฉันพูดแบบนั้นกับทุกคนที่นี่... ไม่ได้หรอกค่ะ...!!"
10034070-113 = "...?"
10034070-114 = "พะ... พูดเรื่องอะไรน่ะ? ทั้งสองคนมีความลับอะไรที่ปกปิดพวกเราอยู่งั้นเหรอ?"
10034070-115 = "การแอบพบกันของคนสองคนกลางดึก... แบบนี้มันไม่ค่อยร็อกเท่าไรนะ..."
10034070-116 = "ตีความอะไรของเธอกันน่ะ! นี่ไอริ เมื่อกี้คุณครูบอกว่า 'ให้บอกเอง' ไม่ใช่เหรอ?"
10034070-117 = "งั้นก็รีบๆ บอกมาสิ!! พวกเราต้องรู้ให้ได้ว่ามันคืออะไรกันแน่! นั่นน่ะมันทำให้พวกเราก่อเรื่องวุ่นวาย#nทั้งคืนเลยนะ!!"
10034070-118 = "ถ้าจะบอกอะไรกันแล้วเงียบไปดื้อๆ แบบนี้คนอื่นจะโกรธนะ..."
10034070-119 = "คะ... คุณครู...!!"
10034070-123 = "[ns11] \"ระหว่างนี้ครูจะไปคุยกับชมรมทวงความยุติธรรมนะ\"\n[ns12] \"ครั้งนี้จะแก้ตัวว่าอะไรดีนะ...\""
10034070-126 = "คะ... คุณครู...! คุณครู...!!"
10034070-127 = "[ns13] \"ไม่เป็นไรหรอก ไอริทำได้อยู่แล้วละ\"\n[ns14] ทำเป็นไม่ได้ยินแล้วเดินออกไป"
10034070-131 = "คุณครู~!!!"
10034070-135 = "ค่ะ... พอจะเข้าใจสถานการณ์แล้วค่ะ ฉันจะรายงานไปก่อนแล้วกันนะคะ"
10034070-136 = "อืม... เป็นข้อแก้ตัวที่ใช้ได้เลย... น่าจะฟังขึ้นอยู่นะคะ"
10034070-137 = "สิ่งสำคัญไม่ใช่รายละเอียดของข้อแก้ตัว แต่เป็นที่เจตนา ฉันจะลองเสริมนู่นเสริมนี่ไปนิดหน่อยให้ดู#nเป็นเหตุบังเอิญแล้วกันค่ะ"
10034070-138 = "[s15] \"ขอบใจมากนะ อิจิกะ\"\n[s16] \"ครูติดหนี้บุญคุณอิจิกะครั้งใหญ่แล้วเลย\""
10034070-141 = "ไม่หรอกค่ะ เรื่องแค่นี้เอง ติดหนี้บุญคุณอะไรกันล่ะคะ คุณครูต่างหากค่ะที่ช่วยเด็กพวกนั้นไว้"
10034070-142 = "และการเรียกหากันเมื่อเกิดเรื่องอะไรขึ้นก็เป็น 'สัญญา' ของเรานี่คะ"
10034070-143 = "พอได้ฟังแล้วก็ไม่ใช่เรื่องไม่ดีด้วยค่ะ เด็กๆ พวกนั้นน่ารักดีนะคะ ฮ่าฮ่า!"
10034070-144 = "ทางสภาน้ำชาเองก็คงไม่อยากให้มีเรื่องวุ่นวายระหว่างเตรียมงาน ฉันว่าคนพวกนั้นคงยอมหลับหูหลับตาให้..."
10034070-145 = "เพราะงั้นไม่ต้องกังวลเกี่ยวกับเรื่องนี้นะคะ ทุกอย่างจะต้องราบรื่นค่ะ"
10034070-150 = "โอ๊ะ... งานเข้าอีกแล้ว..."
10034070-151 = "ฉันก็อยากอยู่คุยกับคุณครูต่อหรอกนะคะ แต่วันนี้ฉันต้องให้งานมาก่อน งั้นฉันขอตัวก่อนนะคะคุณครู!"
10034070-152 = "ไว้เจอกันใหม่ค่ะ~!"
10034070-153 = "[s17] \"กลับดีๆ นะ~\"\n[s18] โบกมือส่ง"
10034070-161 = "น่าตกใจจริงๆ เลยนะคะ..."
10034070-162 = "ฉันจินตนาการไว้ว่าถ้าเป็นอย่างนี้ก็คงจะเท่มากๆ เลย... เหมือนกับในการ์ตูนวัยรุ่นน่ะ"
10034070-164 = "แต่ก็ไม่คิดเลยนะว่านี่จะเป็นการ์ตูนที่ว่าจริงๆ"
10034070-165 = "[s19] \"อยู่ที่นี่จริงๆ ด้วยนะ สึมุกิ\"\n[s20] \"ขอโทษที่เรียกมากะทันหันนะ\""
10034070-170 = "ไม่เป็นไรค่ะ ที่ฉันให้เบอร์ติดต่อไว้คราวก่อนก็เพื่อให้ติดต่อมาหากเกิดเรื่องแบบนี้นี่คะ"
10034070-171 = "ฉันต้องขอโทษด้วยซ้ำค่ะ เพราะฉันไม่ได้รับโทรศัพท์ทันทีที่ติดต่อมา ก็เลยมาถึงช้าไปหน่อย..."
10034070-172 = "แต่ว่า..."
10034070-173 = "ตอนนี้ตัวเอกของเรามีคนช่วยเหลือเยอะแล้ว คงไม่ต้องให้ฉันช่วยก็ได้แล้วสินะคะ"
10034070-174 = "ตัวเอกของเรื่องที่ท้อแท้กับความบกพร่องของตัวเอง..."
10034070-175 = "ตัวเอกที่เผชิญหน้ากับดนตรีอย่างจริงจังเพียงลำพัง และต้องเผชิญกับความยากลำบากที่ได้ชื่อว่า 'ความวิตกกังวล' ที่โถมเข้ามาหาตัวเองเพียงคนเดียว"
10034070-176 = "จนเกิดเป็นความขัดแย้ง ใคร่ครวญ และดูแคลนตัวเอง"
10034070-177 = "นำมาสู่ความขัดแย้งกับเพื่อนและการหลบหนี จนมารวมตัวกันอีกครั้งพร้อมความจริงใจ..."
10034070-178 = "ถ้าข้ามผ่านทุกอย่างนี้ไปได้ การฝึกซ้อมและประสบการณ์ในระหว่างนั้นก็จะเปล่งประกายออกมาค่ะ"
10034070-179 = "ตัวเอกของเราจะทลายกำแพงที่ตัวเองสร้างขึ้น และทำการแสดงในมิติที่ต่างจากครั้งก่อนได้ค่ะ"
10034070-180 = "สมบูรณ์แบบเหลือเกิน ใช่ค่ะ ฉันพูดได้เลยว่านี่คือ..."
10034070-185 = "เรื่องราวที่สวยงามของ..."
10034070-186 = "'วัยรุ่น'"
10034070-187 = "ในภาพที่สวยงามนั้น ตอนนี้คงเป็นช่วง 'ไคลแมกซ์ที่น่าประทับใจ' เลยละค่ะ"
10034070-188 = "คงจะเป็นฉากแห่งปาฏิหาริย์ที่มีทั้งการร้องไห้ แผดเสียงร้อง และหยดน้ำตาของนักเรียน"
10034070-189 = "จะไม่เป็นไรเหรอคะถ้าคุณครูจะไม่ได้ชมฉากนั้นด้วยตัวเอง? ถ้ามัวมาคุยกับฉันอยู่ตรงนี้ คุณครูจะเสียดายที่ไม่ได้เห็นภาพที่น่าประทับใจเหล่านั้นรึเปล่าคะ?"
10034070-190 = "[s21] \"ไม่เป็นไรหรอก ครูเป็นครูนี่นา\"\n[s22] \"ครูกลับดีใจซะอีกที่ทุกคนเคลียร์ใจกันได้เอง\""
10034070-193 = "แบบนี้เองสินะ..."
10034070-194 = "นี่คือมุมมองของผู้ใหญ่สินะคะ... ฉันได้เรียนรู้สิ่งหนึ่งในช่วงเวลาสั้นๆ นี้เลยค่ะ"
10034070-198 = "แต่ว่า คุณครูคะ... ยังมีอีกหนึ่งอย่าง... ที่คุณครูอาจจะลืมไปอยู่ค่ะ"
10034070-199 = "เรื่องที่ตัวเอกไม่มีพลังหรือความสามารถพิเศษ... จะยังเป็นเหมือนเดิมมั้ยคะ?"
10034070-200 = "การ์ตูนเรื่องนี้ดูสวยงามแค่ภายนอก และมีเนื้อหาแค่ให้คนดูพึงพอใจหรือเปล่าคะ?"
10034070-201 = "คุณครู... คิดว่ายังไงเหรอคะ?"
10034070-202 = "คะ...?"
10034070-203 = "\"การที่เราไม่ชอบบางสิ่งบางอย่างของตัวเองมันก็เป็นเรื่องธรรมชาติ\" งั้นเหรอคะ?"
10034070-204 = "เกินคาดเลยนะคะ คุณครูไม่ปฏิเสธเรื่องนั้นเหรอคะเนี่ย..."
10034070-205 = "[s23] \"ถ้า 'คนรอบข้าง' ที่เราเอาตัวเองไปเปรียบเทียบ\"\n[s24] \"ถ้าคนพวกนั้นเป็นคนที่สำคัญกับเราแล้วละก็\""

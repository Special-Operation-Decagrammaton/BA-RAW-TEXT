[translation]
10034070-1 = "Episode 7;Straight Out of a Youth Manga"
10034070-3 = "You're here. This way, Sensei."
10034070-4 = "It's these cells right here. Right. Yes, these three were trying to infiltrate the Carnival Committee. Caught in the act."
10034070-5 = "For some reason, they said they wouldn't talk unless you were here."
10034070-6 = "They didn't steal any valuables or money. We're still trying to find out what their intentions were."
10034070-7 = "By the time we were called, they'd already had a scuffle with the students on watch and gone through all our defenses."
10034070-8 = "They were very skilled, to their credit. They even gave us a run for our money."
10034070-9 = "In any case, I'll leave them to you. You can discuss the rest with Ichika."
10034070-10 = "Right, thank you. They're all yours."
10034070-16 = "A reunion divided by iron bars..."
10034070-17 = "...This is definitely rock."
10034070-18 = "I thought we'd last a bit longer back there. I guess Cath Palug is out of practice."
10034070-19 = "I WILL kill you if you don't stop calling me that..."
10034070-20 = "...Bah, whatever. We're here now, like we knew we were going to be."
10034070-21 = "[ns1] \"So what's going on here...?\"\n[ns2] \"What did you do...?\""
10034070-24 = "Okay, first, did the Justice Task Force finally leave...?"
10034070-25 = "They're gone, right? They're really gone?"
10034070-26 = "[s3] \"Well, yes...\"\n[s4] \"What are you hiding?\""
10034070-31 = "...Sensei. Airi's here with you, right?"
10034070-32 = "You must have gone to see her. So that means you brought her with you?"
10034070-33 = "You're making a LOT of assumptions there."
10034070-34 = "[s5] \"Airi?\"\n[s6] \"Yes, she's here.\""
10034070-41 = "Wha...? Me?"
10034070-42 = "You're asking for me...? Why are you...?"
10034070-43 = "...Come here."
10034070-44 = "Hm?"
10034070-45 = "...Closer."
10034070-46 = "Hmm??"
10034070-47 = "...Closer..."
10034070-48 = "...Hmm?!"
10034070-49 = "...Okay."
10034070-50 = "...Here!"
10034070-56 = "...Hmmm??!!"
10034070-57 = "I-Is this...?"
10034070-58 = "[ns7] \"...Frederica Semla.\"\n[ns8] \"You three...\""
10034070-62 = "This was our driving force from the very start..."
10034070-63 = "...is what we'd like to say. In truth, this whole escapade was rather last-minute..."
10034070-64 = "But this is indeed authentic semla, straight from their storage. Have a taste."
10034070-65 = "Seriously, you should have told us how much you needed this, instead of making us all worried!"
10034070-66 = "For the record, I'm the one who did most of the fighting."
10034070-67 = "Anyway, enjoy, and let us know what it's like. We haven't eaten any ourselves."
10034070-68 = "Also, circumstances being what they are, we've surely forfeited all our club room privileges."
10034070-69 = "I'll create a group chat tomorrow, so we can talk about it more then."
10034070-71 = "W-Wait. Wh-What do you mean?"
10034070-72 = "...Sorry for going off and doing this without you, Airi."
10034070-73 = "You... Oh, don't tell me..."
10034070-74 = "You really went through all this, just for...?"
10034070-75 = "Hm?"
10034070-76 = "But why... Why would you...?"
10034070-77 = "...Wa-Wait. This is NOT how we thought you were going to react."
10034070-78 = "Why? Why in the world would you...?"
10034070-79 = "For me...?"
10034070-80 = "Of course...? Isn't this what you wanted? Wasn't it the whole reason you wanted to form a band in the first place?"
10034070-87 = "Wait... it wasn't?! What?!"
10034070-88 = "...Hold on, what DID we do all this for, then?"
10034070-89 = "Whose idea was this? Who thought of it first?"
10034070-90 = "Heehee. So this is a whole different kind of rock..."
10034070-91 = "This isn't funny! What's wrong with you?"
10034070-93 = "Why...Why would you...?"
10034070-94 = "...For someone like me... Why...?"
10034070-96 = "Hm?"
10034070-97 = "What??"
10034070-98 = "Wh-What's wrong? Why are you crying...?"
10034070-99 = "A-Airi...?! Airi, what's wrong? What happened?"
10034070-100 = "Sensei?! What's going on? Why is Airi crying??"
10034070-106 = "[ns9] \"Go ahead, Airi.\"\n[ns10] \"Do you want to tell them?\""
10034070-109 = "Wh-What? Sensei...?"
10034070-110 = "...? Tell them...directly?"
10034070-111 = "What I told you earlier? N-No...!! I can't, I couldn't!"
10034070-112 = "I can't say all that...not here...!"
10034070-113 = "Hm?"
10034070-114 = "Wh-What's going on? Are you two keeping a secret?"
10034070-115 = "A secret meeting at night, behind everyone's backs... That's not very rock..."
10034070-116 = "...Wait, Sensei just told Airi to tell us everything. How do you get \"they're keeping a secret\" out of that?"
10034070-117 = "Regardless, you better tell us right now! I don't know what it is, but I DEMAND to know for all the trouble we went through!!"
10034070-118 = "There are two sure-fire ways to annoy everyone. One is to leave them hanging, and the other..."
10034070-119 = "S-Sensei..."
10034070-123 = "[ns11] \"I should go talk to the Justice Task Force.\"\n[ns12] \"Wonder what excuse I'll come up with this time...\""
10034070-126 = "S-Sensei...! Sensei..."
10034070-127 = "[ns13] \"It's all right, Airi. You can do this.\"\n[ns14] Leave, pretending not to hear anything."
10034070-131 = "Senseiii!"
10034070-135 = "...Yes, well, I understand. That's what I'll put in the report."
10034070-136 = "As excuses go, it's a pretty good one. I'm sure your girls will be fine."
10034070-137 = "Their intentions were good, at any rate. I'll try to downplay everything else."
10034070-138 = "[s15] \"Thanks a lot, Ichika.\"\n[s16] \"I owe you big time.\""
10034070-141 = "Aw, it's nothing. You work real hard, Sensei."
10034070-142 = "Besides, we promised to call each other whenever anything came up!"
10034070-143 = "And this incident wasn't that bad. They're a tight-knit group of cute friends. Haha!"
10034070-144 = "Besides, the Tea Party won't want to make a fuss before a big event. They'll probably agree to sweep it under the rug."
10034070-145 = "So you don't have to worry about anything else. It'll all work out."
10034070-150 = "...Ah, there's more work..."
10034070-151 = "Sensei, I'd love to chat some more, but I have to get going."
10034070-152 = "Until next time!"
10034070-153 = "[s17] \"Stay safe.\"\n[s18] Wave goodbye."
10034070-161 = "...Amazing."
10034070-162 = "This would make a fantastic ending for a manga."
10034070-164 = "Life imitating art..."
10034070-165 = "[s19] \"I thought you'd be here, Tsumugi.\"\n[s20] \"Sorry for calling you so suddenly.\""
10034070-170 = "If I didn't want you calling me, I wouldn't have given you my number."
10034070-171 = "In fact, I didn't see your message right away. That's why I'm late. Sorry about that..."
10034070-172 = "Regardless..."
10034070-173 = "It seems our protagonist is already surrounded by good friends."
10034070-174 = "...The protagonist who despairs over her own shortcomings."
10034070-175 = "The only one who took her music seriously...and for that reason, the only one who faced the trial of uncertainty."
10034070-176 = "Which led her into a spiral of self-criticism and internal conflict."
10034070-177 = "Conflict with friends, running away, a dramatic reunion, and truth at last..."
10034070-178 = "Once she overcomes it all, her practice and experience will shine."
10034070-179 = "Once she breaks through her self-imposed limits, her performance will be absolutely unearthly."
10034070-180 = "It's perfect. It's such a beautiful example of..."
10034070-185 = "...youth."
10034070-186 = "A story of youth, one kept within the heart, is how I'd describe it."
10034070-187 = "And now, the beautiful scene is rising to its heartwarming climax."
10034070-188 = "They'll cry, shout, and you'll see them smile with tears of joy in their eyes."
10034070-189 = "Are you sure you don't want to witness that firsthand? Wouldn't it be a shame to miss it, because you were talking with me?"
10034070-190 = "[s21] \"It's fine. I'm a teacher.\"\n[s22] \"That joy is for them. It's not about me.\""
10034070-193 = "Ah... I see."
10034070-194 = "Spoken like a true adult...and now I've learned yet another lesson."
10034070-198 = "But Sensei...one thing is still unresolved."
10034070-199 = "Did the protagonist not discover any special power or talent?"
10034070-200 = "That'd be a downer for a manga with such a beautiful cover."
10034070-201 = "What do you think, Sensei?"
10034070-202 = "...Huh?"
10034070-203 = "\"Surprisingly, it's natural not to like a part of yourself\"...?"
10034070-204 = "That's unexpected. I didn't think you, of all people, would say that, Sensei..."
10034070-205 = "[s23] \"It's hard comparing yourself with everyone around you.\"\n[s24] \"But even so, if the people around you are important to you...\""
10034070-210 = "[ns25] \"But they cherish you, just as you do them.\"\n[ns26] \"...You should acknowledge your influence on them.\""
10034070-215 = "...Oho."
10034070-216 = "...I see. If she loves her surroundings, and the people in them..."
10034070-217 = "...she should know that she helped build that environment for herself."
10034070-218 = "But because it comes so naturally for her...she doesn't realize it."
10034070-219 = "Very romantic. And very satisfying."
10034070-220 = "This manga was too great to enjoy for free. I feel obligated to give something back for all the enjoyment."
10034070-221 = "So, Sensei, take this..."
10034070-225 = "[ns27] \"...This is...\"\n[ns28] \"A musical piece? Did you compose this?\""
10034070-228 = "When I wrote that, I imagined an ending just like this one. I never thought I'd actually get to see it."
10034070-229 = "Though it is much more difficult than the last song..."
10034070-230 = "...Heehee. Well, it should be no trouble for the people they are now, or the people they will be."
10034070-231 = "Think of it as my admission fee, to see the show. There's only music there, no lyrics. I'll leave those to the protagonist."
10034070-232 = "...Ah, look at the time. Everybody must be waiting."
10034070-233 = "I have to go. I'll see you at our concert."
10034070-234 = "I must warn you, I'm not a lead, or a vocalist, or anything, so don't expect too much."
10034070-235 = "You might not even recognize me up on stage. The others are all much more distinctive."
10034070-236 = "But...well, that doesn't really matter."
10034070-241 = "...Just being in the same space as the music is enough."
10034070-244 = "What are you talking about?! You just keep on repeating nonsense!!"
10034070-245 = "No, wait, Yoshimi, this is still..."
10034070-246 = "...Oh, Sensei! It's Sensei!!"
10034070-247 = "Listen, Airi's babbling about how she \"doesn't do anything,\" or \"doesn't have anything\"... "
10034070-248 = "I meant I don't have anything to show off."
10034070-249 = "So you need some kind of gimmick? Like more rock?"
10034070-250 = "That's easily resolved. You just need to claim what's rightfully yours. The throne, the crown, the title."
10034070-251 = "Ah, and now we come to it. The return of our long-absent, heavenly queen."
10034070-255 = "We're talking about making her the club president, right?"
10034070-256 = "...Huh? \"Since when did we have presidents,\" you ask, Sensei? True, our club's never really had one."
10034070-257 = "That's because our founder said she doesn't like the \"hierarchy\" that comes from those sorts of positions."
10034070-258 = "[s29] \"...Ah.\"\n[s30] \"Then the founder of the After-School Sweets Club was...\""
10034070-261 = "I told you, that wasn't the issue! I don't need to be president...!"
10034070-262 = "All right, all right. Let's stop talking about this! I'm sorry...!!"
10034070-263 = "No. She might keep saying nonsense whenever she gets the chance. We have to give her something now to prevent that."
10034070-268 = "I agree. In the first place, I'm here because..."
10034070-269 = "Hm?"
10034070-270 = "What, you're not even going to try to hide it anymore, Cath Palug?"
10034070-271 = "...for me to have come here, except for the delicious dessert?"
10034070-276 = "What are we even talking about? Why's everybody being so coy about this? And we call ourselves high schoolers?"
10034070-277 = "Airi, the three of us wouldn't even BE here if it weren't for you! Got it?!"
10034070-278 = "Not that I'm thrilled to be considered a package item with these two...!"
10034070-279 = "Now's not the time to say that..."
10034070-281 = "Y-Yoshimi..."
10034070-282 = "But I thought you're...!"
10034070-284 = "I said it's fine!! No need to be a saint about it! You can find your friends annoying sometimes!!"
10034070-285 = "In fact, with these two here..."
10034070-286 = "Yeah. I'm always annoyed. Once a week, I want to murder someone."
10034070-287 = "Is that so...Kazusa?"
10034070-288 = "Huh? Wh-What's with that response...?"
10034070-289 = "Kazusa..."
10034070-294 = "Don't you get tired of being so angry all the time?"
10034070-296 = "70% of the time, it's your fault!"
10034070-302 = "I will never give in to violence!"
10034070-310 = "Don't raise your shield on me!!"
10034070-311 = "Humans are resourceful beings. We will always find a way!!"
10034070-312 = "Ugh... Aughhh... I have a headache..."
10034070-316 = "But...Yoshimi is right for once."
10034070-317 = "...For once?"
10034070-318 = "...Airi."
10034070-319 = "You may not like yourself. I understand that feeling better than most."
10034070-320 = "And I shouldn't have assumed you wouldn't feel that way."
10034070-321 = "...I'm sorry, Airi."
10034070-323 = "Kazusa..."
10034070-328 = "So, allow me to say one thing in conclusion."
10034070-329 = "Before rejecting yourself, look around. See the whole picture, and your place in it."
10034070-330 = "...Airi."
10034070-337 = "Do you..."
10034070-365 = "\"...Do you not like this moment that you helped create?\""
10034070-376 = "[log=아이리 밴드]\"...No, I love it.\"[/log]"

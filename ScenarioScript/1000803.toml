[translation]
1000803-1 = "Visiting Sick Neru"
1000803-2 = "Neru's Room"
1000803-3 = "..."
1000803-4 = "Urgh."
1000803-5 = "Achooooo!"
1000803-6 = "*sigh* Damn it."
1000803-7 = "A cold... I haven't caught a cold since, like, elementary school."
1000803-8 = "Achooooo!"
1000803-9 = "Ugh... This sucks!"
1000803-10 = "This is bad. My attendance is bad enough as is."
1000803-11 = "*ding dong*"
1000803-12 = "Ugh..."
1000803-13 = "Who is it...? I'm too sick right now."
1000803-14 = "*ding dong*"
1000803-15 = "Go away!"
1000803-16 = "If it's the newspaper or a solicitor, then you can get lost!"
1000803-18 = "*ding dong* *ding dong*"
1000803-19 = "...Well, then."
1000803-20 = "Whoever you are, you've got some guts."
1000803-26 = "*ding dong* *ding dong* *ding dong* *ding dong* *ding dong* *ding dong* *ding dong* *ding dong*"
1000803-27 = "All right. This means war."
1000803-28 = "Don't move a muscle! It's time to take out the trash!"
1000803-30 = "*bang*"
1000803-32 = "Let's see that face before I beat it to a... What the?!"
1000803-33 = "[s] \"Hi.\""
1000803-34 = "S-Sensei! What are you doing here?"
1000803-35 = "Huh? You heard about me being under the weather?!"
1000803-36 = "That message was supposed to be for Akane! Did I send it to you by mistake? Crap!"
1000803-37 = "Ugh, I screwed up... The cold has got me all kinds of messed up!"
1000803-38 = "..."
1000803-41 = "(*sigh* I can't believe I'm letting Sensei see me like this.)"
1000803-42 = "(Luckily, I'm not in my pajamas, since I passed out first thing yesterday...)"
1000803-45 = "W-Well, you're already here. Don't just stand there."
1000803-46 = "...Come in."
1000803-48 = "*sigh*"
1000803-49 = "You don't need a full explanation."
1000803-50 = "I mean, we went over this once before, so I'll keep it short."
1000803-51 = "Sensei, if a single word slips out that I came down with a cold..."
1000803-52 = "[s] \"Say no more. My lips are sealed.\""
1000803-53 = "R-Right. Good. You're catching on."
1000803-54 = "The reason I don't want word to get out is..."
1000803-55 = "[s] \"It's because you want to look strong, but a rumor like that would ruin your reputation.\""
1000803-56 = "..."
1000803-57 = "Th-That's not true! Well, it's something like that, but it's different! Totally different!"
1000803-58 = "I'm Millennium's top secret agent."
1000803-59 = "Um... W-Well..."
1000803-60 = "[s1] \"I've kept your cleaning a secret.\"\n[s2] \"I've kept your can-kicking a secret.\""
1000803-61 = "..."
1000803-62 = "..."
1000803-63 = "U-Ugh... This is so annoying!"
1000803-64 = "I don't know why, but it's really getting on my nerves! Arrrggghhh!"
1000803-65 = "[s] Hand her the care package."
1000803-67 = "Huh? What's this?"
1000803-69 = "*rustle*"
1000803-70 = "Medicine and porridge... "
1000803-71 = "Heh. O-Of course, Sensei. You've come to take care of me."
1000803-72 = "I never catch colds, so it's not like I had any medicine lying around."
1000803-73 = "Thanks for grabbing me some. I'll take it off your hands."
1000803-74 = "So after I down this and take a short nap, I can go back to school, yeah...?"
1000803-75 = "Wait."
1000803-76 = "This is strawberry-flavored cold medicine for little kids!"
1000803-77 = "[s] \"Would you have preferred cherry?\""
1000803-78 = "That's not the problem here!"
1000803-79 = "Ugh. My fever is acting up again... Breathe in. Breathe out. Calm down. "
1000803-80 = "The effects are probably...the same, even if it is for children."
1000803-83 = "*gulp* *gulp*"
1000803-84 = "Yuck... What do they put in this stuff?"
1000803-85 = "...I'm gonna lie down for a bit."
1000803-86 = "I'll eat the porridge later. Put it in the fridge."
1000803-87 = "And..."
1000803-88 = "(I'm the patient here. I should be able to ask whatever I want...)"
1000803-91 = "...c-could you stay by my side...until I fall asleep?"
1000803-93 = "(Neru's voice gets fainter.)"
1000803-94 = "Like I said. Not a single word about this."
1000803-95 = "Do..."
1000803-96 = "...you..."
1000803-97 = "Zzz..."
1000803-98 = "..."
1000803-100 = "(I watched Neru sleep for a while before heading back.)"

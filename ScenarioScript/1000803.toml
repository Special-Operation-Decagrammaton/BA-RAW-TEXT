[translation]
1000803-1 = "探望寧瑠"
1000803-2 = "寧瑠的房間"
1000803-3 = "…… "
1000803-4 = "哈……"
1000803-5 = "哈啾──！！！"
1000803-6 = "哈啊，該死。"
1000803-7 = "感冒什麼的……小學之後就沒有過了。"
1000803-8 = "哈啾──！！！"
1000803-9 = "嗚啊！痛死了！"
1000803-10 = "麻煩了，再缺席的話，出席日數就危險了啊。"
1000803-11 = "（叮～咚～）"
1000803-12 = "啊啊……？"
1000803-13 = "身體狀況不好的時候……是誰啦。"
1000803-14 = "（叮～咚～）"
1000803-15 = "滾開！"
1000803-16 = "如果是新聞或是推銷的話快給我滾！"
1000803-18 = "（叮～咚～叮～咚～）"
1000803-19 = "……哦哦。"
1000803-20 = "……還真是有毅力的傢伙呢。"
1000803-26 = "（叮～咚，叮咚叮咚叮咚叮咚叮咚叮咚叮咚叮咚叮咚叮～咚！！）"
1000803-27 = "……好啊，既然那麼有幹勁的話……"
1000803-28 = "給我等著！馬上就了結你！"
1000803-30 = "（喀嚓）"
1000803-32 = "就讓我看看你長什麼樣……哈啊？"
1000803-33 = "[s] 「早安。」"
1000803-34 = "老，老師！你，你怎麼會來這裡！？"
1000803-35 = "哈？我傳訊息說我感冒了！？"
1000803-36 = "我本來是要傳給朱音的，不小心傳給老師了嗎？該死！"
1000803-37 = "這種失誤……都是感冒害的。"
1000803-38 = "……"
1000803-41 = "（哈啊，沒想到會被老師看到這種樣子）"
1000803-42 = "（昨天，衣服也沒換就睡著了，不是穿睡衣所以還好……）"
1000803-45 = "總，總之既然都來探病了……那也沒辦法。"
1000803-46 = "……進來吧。"
1000803-48 = "哈啊。"
1000803-49 = "我想你應該知道……"
1000803-50 = "之前也說過類似的話……這次就直說了。"
1000803-51 = "老師，如果把我感冒身體變弱的事情告訴誰的話…… "
1000803-52 = "[s] 「嗯，我不會說的。」"
1000803-53 = "……我，我想也是。啊啊，你很懂嘛。"
1000803-54 = "那個，畢竟……"
1000803-55 = "[s] 「寧瑠還有這種可愛的地方要是變成傳聞的話會很困擾呢。」"
1000803-56 = "……"
1000803-57 = "不，不是！！雖，雖然類似但有點不同！真的不是！！"
1000803-58 = "只，只是因為我是千年特務的領袖……"
1000803-59 = "那個……所，所以說……"
1000803-60 = "[s1] 「認真清掃垃圾的事也保密了唷。」\n[s2] 「喜歡玩踢罐子的事也保密了唷。」"
1000803-61 = "……"
1000803-62 = "……"
1000803-63 = "總，總覺得很不爽！ "
1000803-64 = "怎麼回事，雖然沒辦法說明但很不爽！咕啊啊──！"
1000803-65 = "[s] 遞出帶來的袋子"
1000803-67 = "……嗯？這什麼？"
1000803-69 = "（啪唦啪唦）"
1000803-70 = "藥，還有粥……"
1000803-71 = "……哦。是，是啊。老師，是來探病的啊。"
1000803-72 = "感冒之類的，有一陣子沒有過了，所以家裡也沒有藥。"
1000803-73 = "我就感激地收下了。"
1000803-74 = "吃完之後休息一下就馬上去……"
1000803-75 = "嗯？"
1000803-76 = "這個，不是兒童用的草莓味感冒藥嗎！！！"
1000803-77 = "[s] 「櫻桃口味的比較好嗎？」"
1000803-78 = "不是那個意思……！！"
1000803-79 = "唔，身體……呼，呼……冷靜點。"
1000803-80 = "就算是兒童用……反正效果都一樣。"
1000803-83 = "（咕嚕咕嚕）"
1000803-84 = "嗚耶……難吃！ "
1000803-85 = "……我稍微躺一下。"
1000803-86 = "粥晚點再吃，幫我放冰箱。"
1000803-87 = "……還，有……"
1000803-88 = "（……反正是病人，這種程度的撒嬌應該沒關係吧）"
1000803-91 = "……可，可以待在我身邊……到我睡著嗎？"
1000803-93 = "（寧瑠的聲音漸漸變小）"
1000803-94 = "……雖然說了很多次，不准對，任何人說哦。"
1000803-95 = "知道……"
1000803-96 = "了，嗎……"
1000803-97 = "（Zzz……）"
1000803-98 = "……"
1000803-100 = "（確認寧瑠睡著後便回去了）"

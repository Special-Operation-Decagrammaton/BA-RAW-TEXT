[translation]
1300105-1 = "Celestial Inspiration"
1300105-2 = "After receiving a text, I headed to the park, where I found Chise."
1300105-4 = "*rustle*"
1300105-5 = "*rustle* *rustle*"
1300105-6 = "[s] \"...Chise? What are you doing in the grass?\""
1300105-7 = "Meow?"
1300105-8 = "I'm not Chise right now, Sensei."
1300105-9 = "I-I'm a cat. Meow..."
1300105-10 = "[s] \"A cat...?\""
1300105-11 = "I am now a cat in the grass."
1300105-12 = "It's a way to gain a new perspective."
1300105-13 = "The only way!"
1300105-14 = "[s] \"And why are you a cat all of a sudden?\""
1300105-15 = "I need to find inspiration for a poem. "
1300105-16 = "I need to make a haiku."
1300105-17 = "[s1] \"Inspiration for a poem?\"\n[s2] \"A haiku?\""
1300105-18 = "Yup. Inspiration. A little something like this."
1300105-19 = "Yup. Inspiration. A little something like this."
1300105-20 = "I want to create a haiku that really moves the heart."
1300105-21 = "The deadline isn't too far away."
1300105-23 = "After listening to Chise and really pondering her words, I started to understand what she meant."
1300105-26 = "[ns3] \"So, as a promotional activity for the Yin-Yang Club...\"\n[ns4] \"...you need a haiku to perform in the promotional hall?\""
1300105-27 = "(nod)"
1300105-28 = "(nod)"
1300105-29 = "I need to recite a haiku."
1300105-30 = "[s] \"I see, so your Yin-Yang Club is in charge of that.\""
1300105-31 = "But Sensei, it's an emergency."
1300105-32 = "My head is empty... I can't think of anything."
1300105-33 = "That's why..."
1300105-34 = "I need help today. So that I can come up with a good poem."
1300105-35 = "Can you help?"
1300105-36 = "[s] \"Of course I'll help you.\""
1300105-37 = "Yeah! Thank you, Sensei."
1300105-38 = "Then, in honor of having met you, Sensei..."
1300105-39 = "I shall try to explain my feelings of becoming a cat through haiku."
1300105-41 = "#n #nIt feels good to be"
1300105-43 = "#n #n #n #na kitty cat because a"
1300105-45 = "#n #n #n #n #n #nkitty cat is me"
1300105-49 = "[ns] \"That's your haiku...\""
1300105-50 = "I feel like I can come up with something better if you hang around a little longer."
1300105-51 = "Well, let's go, Sensei."
1300105-56 = "*ribbit* *ribbit*"
1300105-57 = "I can hear the frogs."
1300105-58 = "[s] \"Yeah, there must be a lot of frogs.\""
1300105-59 = "Mister Frog is calling me. Sensei."
1300105-60 = "[s] \"Y-Yeah?\""
1300105-61 = "*ribbit* *ribbit*"
1300105-62 = "(tilts head) *ribbit* *ribbit*"
1300105-63 = "*ribbit* *ribbit* *ribbit* *ribbit* *ribbit*"
1300105-64 = "[s] \"The frogs are answering Chise's call?!\""
1300105-65 = "Ah."
1300105-66 = "Mister Frog gave me an idea."
1300105-67 = "It's a haiku, Sensei."
1300105-69 = "#n #nA frog will jump at"
1300105-71 = "#n #n #n #nthe far side of a river"
1300105-73 = "#n #n #n #n #n #nand croak happily"
1300105-76 = "How is it? Do you think the frogs will like it?"
1300105-77 = "*ribbit* *ribbit* *ribbit* *ribbit* *ribbit*"
1300105-78 = "[s] \"I think they like it...a lot.\""
1300105-79 = "That's great! ♪"
1300105-82 = "Welcome!"
1300105-83 = "[s] \"A convenience store?\""
1300105-84 = "Yup..."
1300105-85 = "The convenience store is so colorful."
1300105-86 = "I might come up with something here."
1300105-87 = "[s] \"Hmm, there isn't much to be inspired by here...\""
1300105-88 = "Ah."
1300105-89 = "Sensei, look."
1300105-90 = "It's a special matcha ramune."
1300105-91 = "[s] \"Matcha flavor?\""
1300105-92 = "Matcha ramune. Snacks. Bright colors..."
1300105-93 = "I've got an idea, Sensei."
1300105-94 = "[s] \"One more at the convenience store!\""
1300105-97 = "#n #nBuy a lot of snacks"
1300105-99 = "#n #n #n #nand tasty soda to share"
1300105-101 = "#n #n #n #n #n #nwith everybody"
1300105-104 = "How about it, Sensei?"
1300105-105 = "[s5] \"Um, that's your haiku?\"\n[s6] \"If you ask me, it's great, Chise.\""
1300105-106 = "But...it isn't enough, Sensei."
1300105-107 = "But...it isn't enough, Sensei."
1300105-108 = "What's missing?"
1300105-110 = "I went from place to place all day long with Chise."
1300105-111 = "She came up with several haiku."
1300105-112 = "No. Something is still missing, Sensei."
1300105-113 = "I need something...something that moves the heart..."
1300105-114 = "Chise, unsatisfied, kept shaking her head."
1300105-116 = "And then the sun went down."
1300105-118 = "[ns7] \"We've done a lot of walking today.\"\n[ns8] \"So, did you come up with any good ideas?\""
1300105-119 = "..."
1300105-120 = "..."
1300105-121 = "I don't know, Sensei."
1300105-122 = "I came up with a lot of ideas walking around with you."
1300105-123 = "But everything seems to be lacking."
1300105-124 = "Why is that?"
1300105-125 = "[s] \"Hmmm, this isn't easy.\""
1300105-126 = "Yeah."
1300105-127 = "[s] \"But at least it was a fun day.\""
1300105-128 = "...Fun?"
1300105-129 = "[s9] \"I got to listen to all your haiku.\"\n[s10] \"And I was able to have a fun walk.\""
1300105-130 = "Fun...walk..."
1300105-131 = "Fun...walk..."
1300105-132 = "...Fun."
1300105-133 = "Uh."
1300105-134 = "[s] \"Chise?\""
1300105-135 = "Poof! It just came to me."
1300105-136 = "I must return for one more haiku."
1300105-140 = "[ns] \"W-Wait! Chise?!\""
1300105-142 = "Hyakkiyako Old Schoolhouse 3"
1300105-143 = "I don't know how long I chased after Chise. She kept running around, claiming to have thought of something."
1300105-144 = "[s] \"This place is Hyakkiyako's old schoolhouse?\""
1300105-145 = "Sensei, here. Over here."
1300105-150 = "― Welcome, Sensei.[wa:2110] "
1300105-152 = "― It's quiet here...[wa:950] "
1300105-155 = "― Perfect for writing haiku.[wa:1570] "
1300105-158 = "― Sensei, spending time with you[wa:550] "
1300105-160 = "― was a lot of fun.[wa:290] "
1300105-163 = "― And that made me realize something.[wa:1280] "
1300105-165 = "― I want to write a haiku...[wa:4460] "
1300105-168 = "― About the feelings[wa:2470] "
1300105-170 = "― I had today."
1300105-173 = "After the sun sets,"
1300105-175 = " #nthe quiet footsteps of two"
1300105-177 = " #n #ncontinue to move"
1300105-180 = "― I think I can keep writing meaningful haiku like this[wa:2300] "
1300105-182 = "― as long as I'm with you, Sensei."
1300105-185 = "― Let's hang out again, okay?[wa:1380] "
1300105-188 = "― Oh... Sensei, look over there.[wa:2900] "
1300105-191 = "[ns] \"Huh? Over there... You mean the moon?\""
1300105-192 = "― Isn't the moon beautiful?[wa:2060] "
1300105-195 = "[ns] \"Hold on, Chise. Are you saying...?\""
1300105-196 = "― It really is beautiful...[wa:1640] "
1300105-199 = "[ns] \"Some things are beautiful even without a haiku to capture them.\""
1300105-201 = "[ns11] \"Yeah, it's just like you said...\"\n[ns12] \"The moon is beautiful.\""
1300105-205 = "I sat down with Chise, and we spent some time watching the moon together."

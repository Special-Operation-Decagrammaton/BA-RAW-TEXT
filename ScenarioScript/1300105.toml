1300105-17 = "[s1] \"แรงบันดาลใจในการแต่งกลอน?\"\n[s2] \"กลอนไฮกุ?\""
1300105-18 = "อื้อ แรงบันดาลใจในการแต่งกลอน เลยมาลองแบบนี้"
1300105-19 = "อื้อ แรงบันดาลใจในการแต่งกลอน เลยมาลองแบบนี้"

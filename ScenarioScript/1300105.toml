[translation]
1300105-1 = "月夜　作句　特別的"
1300105-2 = "（收到訊息後來到公園看看）"
1300105-4 = "（啪唦）"
1300105-5 = "（啪唦啪唦）"
1300105-6 = "[s] 「……知世？妳在草叢裡做什麼？」"
1300105-7 = "喵──"
1300105-8 = "……現在的我不是知世唷，老師。"
1300105-9 = "現在我是一隻貓，喵──……"
1300105-10 = "[s] 「貓……？」"
1300105-11 = "變成在草叢裡走來走去的貓。"
1300105-12 = "我是貓，我是貓……"
1300105-13 = "我是貓的喵～"
1300105-14 = "[s] 「怎麼又突然……？」"
1300105-15 = "我需要靈感。"
1300105-16 = "必須寫出俳句才行。"
1300105-17 = "[s1] 「靈感？」\n[s2] 「俳句？」"
1300105-18 = "嗯，像這樣做各種事。"
1300105-19 = "嗯，像這樣做各種事。"
1300105-20 = "我想要寫出能夠觸動人心的俳句。"
1300105-21 = "距離截稿日，還剩幾天。"
1300105-23 = "（一邊傾聽一邊分析知世語一段時間的結果，終於知道是怎麼回事了）"
1300105-26 = "[ns3] 「也就是作為這次陰陽部宣傳活動的一環，」\n[ns4] 「需要寫出能在公民館展示的俳句，這樣理解OK嗎？」"
1300105-27 = "（點頭）"
1300105-28 = "（點頭）"
1300105-29 = "為了那個，要吟詠俳句。"
1300105-30 = "[s] 「話說回來，有說過在進行那種活動呢。」"
1300105-31 = "嗯，不過緊急狀況。"
1300105-32 = "腦袋裡一片空白什麼都浮現不出來。"
1300105-33 = "所以說。"
1300105-34 = "為了想出好的俳句，今天一天，希望可以幫我。"
1300105-35 = "願意幫忙嗎……？"
1300105-36 = "[s] 「當然，我來幫妳吧。」"
1300105-37 = "謝謝你，老師。"
1300105-38 = "那麼首先，也遇到老師了……"
1300105-39 = "以變成貓的心境，吟詠現在的心情的話……"
1300105-41 = "老#n師#n喵"
1300105-43 = "啊#n啊#n老#n師#n喵"
1300105-45 = "老#n師#n喵#n｜"
1300105-49 = "[ns] 「這就是，知世的俳句……」"
1300105-50 = "再多和，老師在一起的話，也許能想到更多。"
1300105-51 = "走吧，老師。"
1300105-56 = "（呱呱呱……）"
1300105-57 = "叫聲。"
1300105-58 = "[s] 「嗯，附近好像有很多青蛙。」"
1300105-59 = "青蛙先生正在叫我。"
1300105-60 = "[s] 「嗯。……咦？」"
1300105-61 = "呱呱。"
1300105-62 = "呱，呱……？"
1300105-63 = "（呱呱！呱呱！）"
1300105-64 = "[s] 「對話能通！？」"
1300105-65 = "啊。"
1300105-66 = "多虧青蛙先生有靈感了。"
1300105-67 = "現在的話感覺可以。"
1300105-69 = "青#n蛙#n呱#n呱#n呱"
1300105-71 = "輪#n唱#n揭#n續#n幕"
1300105-73 = "蹦#n一#n聲#n躍#n起#n｜"
1300105-76 = "……如何？青蛙先生們也中意嗎？"
1300105-77 = "（呱呱！！呱呱！！）"
1300105-78 = "[s] 「好像很中意……的樣子呢？」"
1300105-79 = "太好了♪"
1300105-82 = "歡迎光臨～！"
1300105-83 = "[s] 「這次是便利商店？」"
1300105-84 = "嗯。"
1300105-85 = "便利商店五顏六色的很可愛。"
1300105-86 = "也許能得到好靈感也說不定。"
1300105-87 = "[s] 「嗯……但是好像沒什麼和俳句有關的……」"
1300105-88 = "啊。"
1300105-89 = "老師，你看這個。"
1300105-90 = "抹茶口味的蘇打汽水，好像是限定商品。"
1300105-91 = "[s] 「抹，抹茶口味的蘇打汽水……？」"
1300105-92 = "抹茶口味的蘇打汽水，除此之外還有其他五顏六色的點心……"
1300105-93 = "啊，有了。"
1300105-94 = "[s] 「沒想到在便利商店也能吟詠！」"
1300105-97 = "輪#n迴#n再#n輪#n迴"
1300105-99 = "然#n置#n身#n於#n黯#n夜"
1300105-101 = "仍#n光#n彩#n｜"
1300105-104 = "如何，老師？"
1300105-105 = "[s5] 「雖然我不是很懂，但感覺非常不錯。」\n[s6] 「我認為是很棒的俳句唷。」"
1300105-106 = "是嗎。嗯……不過，光是這樣可能還不足。"
1300105-107 = "是嗎。嗯……不過，光是這樣可能還不足。"
1300105-108 = "不足的東西……嗯……"
1300105-110 = "（就那樣和知世一起四處奔波了一整天）"
1300105-111 = "（雖然吟詠了好幾首徘句……）"
1300105-112 = "有什麼不足"
1300105-113 = "再一點，能觸及人心的，那種……"
1300105-114 = "（知世仍一直歪頭思考）"
1300105-116 = "（太陽就這樣不知不覺地下山了……）"
1300105-118 = "[ns7] 「今天逛了很多地方呢。」\n[ns8] 「如何，有想到什麼嗎？」"
1300105-119 = "……"
1300105-120 = "……"
1300105-121 = "我也，不太清楚。"
1300105-122 = "一整天和老師到處逛逛，雖然讓我想到了很多靈感。"
1300105-123 = "感覺，好像有什麼還不足，的感覺。"
1300105-124 = "這是為什麼呢？"
1300105-125 = "[s] 「嗯……是為什麼呢……」"
1300105-126 = "……"
1300105-127 = "[s] 「但是我今天一天，很開心唷。」"
1300105-128 = "……開心？"
1300105-129 = "[s9] 「有聽到知世的俳句，」\n[s10] 「也能兩個人一起散步很開心。」"
1300105-130 = "散步……"
1300105-131 = "散步……"
1300105-132 = "……很開心。"
1300105-133 = "啊。"
1300105-134 = "[s]「知世？」"
1300105-135 = "有了。"
1300105-136 = "得回去，寫下來才行。"
1300105-140 = "[ns] 「等，等一下！？知世！？」"
1300105-142 = "百鬼夜行聯合學園．舊第3校舍"
1300105-143 = "（那之後，追著突然跑走的知世……）"
1300105-144 = "[s] 「這裡是，百鬼夜行的……舊校舍？」"
1300105-145 = "老師，這邊唷。這邊。"
1300105-150 = "― 歡迎你，老師。[wa:2470] "
1300105-152 = "― 這裡很安靜…[wa:1430] "
1300105-155 = "― 要寫俳句的話很合適。[wa:2210] "
1300105-158 = "― 今天和老師在一起……[wa:1350] "
1300105-160 = "― 真的很開心。[wa:730] "
1300105-163 = "― 然後我，察覺到了。[wa:2320] "
1300105-165 = "― 我想寫的俳句，那就是……[wa:5020] "
1300105-168 = "― 注入了今天一直感覺到的，[wa:2710] "
1300105-170 = "― 這份心情的俳句。"
1300105-173 = "逢#n魔#n時#n刻#n後"
1300105-175 = "今#n者#n仍#n賡#n續"
1300105-177 = "人#n聲#n成#n双#n∣"
1300105-180 = "― ……感覺跟老師一起的話，還能一直，[wa:3740] "
1300105-182 = "― 繼續吟詠下去。"
1300105-185 = "― 下次也，可以陪我嗎？[wa:2060] "
1300105-188 = "― 啊……老師，你看。[wa:3740] "
1300105-191 = "[ns] 「嗯？……月亮？」"
1300105-192 = "― 月色，真美呢。[wa:2780] "
1300105-195 = "[ns] 「知世？你那是……」"
1300105-196 = "― 真的，好美……[wa:2360] "
1300105-199 = "[ns] 「啊，字面上意思的美啊……」"
1300105-201 = "[ns11] 「嗯，就如知世所說……」\n[ns12] 「月色真美呢。」"
1300105-205 = "（就這樣坐在知世的身邊，一起欣賞著月亮度過了很長一段時光）"

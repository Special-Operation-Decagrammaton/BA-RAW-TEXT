[translation]
80000050-1 = "為您獻上我的一切"
80000050-2 = "（隨著情人節的到來，因為擔心可能會發生什麼騷動而到街上巡邏時）"
80000050-3 = "（在視野的邊緣……）"
80000050-8 = "[ns]「……」"
80000050-10 = "（彎進巷子裡時……）"
80000050-16 = "[ns]「…………」"
80000050-23 = "[ns]「……若藻？」"
80000050-25 = "哎呀哎呀……"
80000050-26 = "我明明已經抑制住想衝上前的心情，盡可能不被發現了……"
80000050-27 = "呵呵……"
80000050-28 = "光是您能注意到我的存在，就足以讓我的心熱情如火了呢。"
80000050-29 = "啊啊，再這樣下去，我似乎又快要忍不住了……"
80000050-30 = "[s1]「若藻其實挺顯眼的……」\n[s2]「話說怎麼了嗎……？」"
80000050-31 = "啊啊，今天之所以來見閣下……"
80000050-32 = "啊啊，今天之所以來見閣下……"
80000050-38 = "竟敢擅自在我們的地盤賣巧克力，是來找碴的是不是啊！？"
80000050-40 = "其實是，那個……"
80000050-44 = "說什麼鬼話，這裡已經是我們的地盤了！"
80000050-45 = "啊！？既然如此，現在就來分個勝負吧！"
80000050-46 = "算你有勇氣，放馬過來！"
80000050-53 = "……似乎有點吵雜呢？"
80000050-54 = "[s]「等，等我一下下！我去說說他們！」"
80000050-56 = "（總算是在若藻暴走之前控制住了情況）"
80000050-58 = "呵呵……辛苦您了，老師。"
80000050-59 = "畢竟是今天這種日子，這種程度的吵鬧我想還是能忍住的……"
80000050-60 = "[s]「啊，是嗎？」"
80000050-61 = "是的♡今天是情人節，在這種日子引起騷動會讓閣下困擾的對吧？"
80000050-62 = "對了，我來與閣下見面的理由只有一個。"
80000050-63 = "請收下……"
80000050-69 = "[ns]「啊，巧克力……」"
80000050-70 = "是的，我無論如何也想交給閣下……"
80000050-71 = "於是一早便徬徨地徘徊，尋找著閣下的身影……"
80000050-72 = "總算能見到您了，我真是幸福……"
80000050-73 = "呵呵♡"
80000050-74 = "這果然是命運呢……♡"
80000050-75 = "[s]「找到之後感覺還被跟蹤了一段時間，那是……？」"
80000050-76 = "先別說那種事了，能請您務必在此品嘗嗎？"
80000050-77 = "我想立刻傾聽您的感想……"
80000050-78 = "[s]「啊，嗯。那我就開動了……」"
80000050-82 = "（正當我打算在若藻面前把巧克力放入口中的時候……）"
80000050-83 = "呵呵，呵呵呵呵呵……來吧，來吧……！快把我的巧克力……"
80000050-84 = "把我，放進閣下的體內……！"
80000050-85 = "[s] 將巧克力遠離嘴巴"
80000050-86 = "啊……您不願意吃嗎……？"
80000050-87 = "[s3]「呃……」\n[s4] 再次試著將巧克力放入口中"
80000050-88 = "呵呵，呵呵呵……♡啊啊，就差一點……"
80000050-89 = "呵呵，呵呵呵……♡啊啊，就差一點……"
80000050-90 = "差一點就能將我，將我的全部……！"
80000050-91 = "[s] 再次將巧克力遠離嘴巴"
80000050-92 = "啊啊……老師，為何要……？"
80000050-93 = "[s5]「那個，真的只是保險起見……」\n[s6]「這個巧克力，有沒有放什麼平常不會放的東西……？」"
80000050-94 = "當然有，而且還放得滿滿的……♡"
80000050-95 = "當然有，而且還放得滿滿的……♡"
80000050-96 = "[s]「放了什麼！？」"
80000050-97 = "您問我是什麼，那當然是……"
80000050-98 = "若藻我難以壓抑的愛情！"
80000050-99 = "希望您能早點品嘗……"
80000050-100 = "有什麼問題嗎？"
80000050-101 = "[s]「我很抱歉……」"
80000050-102 = "……？"
80000050-103 = "（拋開無謂的胡思亂想，好好享用了若藻給的巧克力）"
80000050-108 = "[ns]「嗯，很好吃。謝謝你，若藻。」"
80000050-109 = "啊，吃下去了呢……終於，把我的……"
80000050-110 = "如此激烈地在口中攪動……"
80000050-111 = "吃下了灌注我一切的巧克力……"
80000050-112 = "我的全部，現在正在閣下的腹中逐漸融為一體……"
80000050-113 = "[s]「那個，若藻同學……？」"
80000050-114 = "呵呵……沒什麼，請別在意。"
80000050-115 = "只是因為閣下願意品嘗我的巧克力讓我過於開心……"
80000050-116 = "來，這樣還不能算是結束。難得有此機會，您願意與我共度今日嗎？"
80000050-117 = "[s]「我當然非常樂意，那個……」"
80000050-118 = "啊啊，與接受了我的東西的閣下，整整一天都……"
80000050-119 = "呵呵呵……"
80000050-120 = "今天一定會是最棒的一天♡"
80000050-121 = "[s]「……？」"
80000050-123 = "（雖然有股背脊發涼的預感，依然和若藻開心地共度了一天）"

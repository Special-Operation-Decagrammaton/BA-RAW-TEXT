[translation]
80000050-1 = "ทุกสิ่งทุกอย่างของฉัน ขอมอบให้คุณ"
80000050-2 = "(คุณครูออกมาลาดตระเวนบนท้องถนน เพราะกังวลว่าจะมีเหตุการณ์อะไรเกิดขึ้นในวันวาเลนไทน์)"
80000050-3 = "(ขณะที่เดินตรวจตราอยู่ คุณครูก็เหลือบไปเห็นบางอย่าง...)"
80000050-8 = "[ns] \"อืม...\""
80000050-10 = "(ตอนที่เลี้ยวเข้าไปที่มุมถนน คุณครูก็เหลือบไปเห็นบางอย่างอีกครั้ง...)"
80000050-16 = "[ns] \"อืมมมมม...\""
80000050-23 = "[ns] \"วาคาโมะ...?\""
80000050-25 = "อุ๊ย ตายจริง"
80000050-26 = "ฉันพยายามติดตามอย่างระมัดระวังไม่ให้คุณท่านรู้ตัวแล้วแท้ๆ แต่คุณท่านกลับรู้ตัวซะได้..."
80000050-27 = "ฮุฮุ... ฉันที่เป็นฝ่ายแอบติดตามคุณท่านอย่างลับๆ พูดแบบนี้อาจจะฟังดูแปลกๆ สักหน่อย..."
80000050-28 = "แต่พอคิดว่าคุณท่านสังเกตเห็นฉัน... ก็รู้สึกใจเต้นแรงและมีความสุขมากเลยค่ะ"
80000050-29 = "อา... ไม่ได้การแล้วค่ะ ฉันจะทนต่อไปไม่ไหวแล้วค่ะ"
80000050-30 = "[s1] \"เดินตามกันโต้งๆ แบบนี้ใครก็ต้องเห็นอยู่แล้ว...\"\n[s2] \"ว่าแต่มีเรื่องอะไรงั้นเหรอ...?\""
80000050-31 = "ฉันมีเหตุผลที่ติดตามคุณท่านนะคะ คือว่า..."
80000050-32 = "ที่ฉันติดตามคุณท่านมาก็เพราะว่า..."
80000050-38 = "กล้าดียังไงมาขายช็อกโกแลตในถิ่นของพวกเรา! แบบนี้มันหยามกันชัดๆ เลย?!"
80000050-40 = "อ่ะแฮ่ม... คือว่าที่ฉันมาหาคุณท่านวันนี้..."
80000050-44 = "นั่นมันคำพูดของพวกเราต่างหาก! ตอนนี้พวกเราคุมถิ่นนี้อยู่นะเฟ้ย!"
80000050-45 = "งั้นก็ดี! มาตัดสินให้จบๆ ไปเลย พวกเราไม่กลัวอยู่แล้ว!"
80000050-46 = "ทุกคนลุยเลย!"
80000050-53 = "แถวนี้เสียงดังวุ่นวายจังเลยนะคะ"
80000050-54 = "[s] \"จะ...ใจเย็นๆ ก่อนนะ! เดี๋ยวครูจัดการให้เอง!\""
80000050-56 = "(คุณครูพยายามทำทุกอย่างให้สถานการณ์สงบลง ก่อนที่วาคาโมะจะฉุนจนอาละวาดหนัก)"
80000050-58 = "ฮุฮุ ยอดเยี่ยมมากเลยค่ะ อันที่จริงคุณท่านไม่ต้องใส่ใจเรื่องฉันขนาดนั้นก็ได้แท้ๆ..."
80000050-59 = "เรื่องวุ่นวายเล็กน้อยแค่นี้ ในวันพิเศษแบบนี้ฉันอดทนได้อยู่แล้วค่ะ"
80000050-60 = "[s] \"จะ...จริงเหรอ?\""
80000050-61 = "ค่ะ วันนี้เป็นวันวาเลนไทน์นี่คะ ถ้ายังก่อเรื่องวุ่นวายขึ้นในวันที่พิเศษแบบนี้ ฉันคงไม่มีหน้ามาพบ#nคุณท่านอีกแน่ค่ะ"
80000050-62 = "และเหตุผลที่ฉันติดตามคุณท่านมาในวันนี้..."
80000050-63 = "ก็เพราะอยากมอบสิ่งนี้ให้กับคุณท่านค่ะ"
80000050-69 = "[ns] \"ช็อกโกแลตของวาคาโมะเหรอ...?\""
80000050-70 = "ใช่แล้วค่ะ ฉันอยากให้ช็อกโกแลตกับคุณท่านในวันวาเลนไทน์..."
80000050-71 = "ก็เลยออกมาตามหาคุณท่านตามที่ต่างๆ ตั้งแต่เช้าค่ะ"
80000050-72 = "ฉันดีใจมาก ที่ในที่สุดก็ได้พบคุณท่านเสียที"
80000050-73 = "อา... ฮุฮุฮุ♡"
80000050-74 = "แบบนี้คงเรียกว่าพรหมลิขิตสินะคะ♡"
80000050-75 = "[s] \"เดี๋ยวสิ ไหนบอกว่าแอบสะกดรอยตามมาไง...\""
80000050-76 = "คือว่า... ถ้าไม่เป็นการรบกวนจนเกินไป คุณท่านช่วยชิมช็อกโกแลตตอนนี้เลยได้มั้ยคะ?"
80000050-77 = "ฉันอยากฟังความรู้สึกของคุณท่านค่ะ... ได้หรือเปล่าคะ?"
80000050-78 = "[s] \"อื้อ ครูจะกินให้อร่อยเลยนะ...\""
80000050-82 = "(และในตอนที่คุณครูกำลังจะกินช็อกโกแลต...)"
80000050-83 = "ฮุฮุฮุ... ฮุฮุฮุฮุ เอ้า เร็วสิคะ รีบๆ ทานสิคะ... ช็อกโกแลตของฉัน..."
80000050-84 = "คุณท่าน... รีบๆ ทาน... ช็อกโกแลต... ของฉัน... สิคะ..."
80000050-85 = "[s] วางช็อกโกแลตลงทันที"
80000050-86 = "คุณท่านจะไม่ทานช็อกโกแลตของฉันเหรอคะ...?"
80000050-87 = "[s3] \"ปะ...เปล่านะ! กินสิ กินแน่นอน!\"\n[s4] หยิบช็อกโกแลตของวาคาโมะขึ้นมาอีกครั้ง"
80000050-88 = "ฮุฮุฮุ... ฮุฮุฮุฮุ♡ อีกนิด... อีกนิดเดียว..."
80000050-89 = "ฮุฮุฮุ... ฮุฮุฮุฮุ♡ อีกนิด... อีกนิดเดียว..."
80000050-90 = "ฉันอยากให้คุณท่านได้ลิ้มลองทุกๆ อย่างของฉัน...!"
80000050-91 = "[s] วางช็อกโกแลตลง"
80000050-92 = "มีอะไรเหรอคะ คุณครู...?"
80000050-93 = "[s5] \"คือว่าครูขอถามหน่อยได้มั้ย...?\"\n[s6] \"วาคาโมะ... ใส่อะไรลงไปในช็อกโกแลตนี่ใช่มั้ย?\""
80000050-94 = "ใช่แล้วค่ะ ฉันใส่เข้าไปเต็มที่เลยค่ะ"
80000050-95 = "ค่ะ ใช่แล้วค่ะ ฉันใส่เข้าไปเต็มที่เลยค่ะ"
80000050-96 = "[s] \"ว่าแล้วเชียว! ใส่อะไรลงไปน่ะ?!\""
80000050-97 = "คะ? คือว่า..."
80000050-98 = "ฉันใส่ความรักอันท่วมท้นที่มีต่อคุณท่านลงไปค่ะ!"
80000050-99 = "ฉันก็แค่อยากให้คุณท่านได้ลิ้มรสความรู้สึกของฉันก็เท่านั้นเอง..."
80000050-100 = "มะ...มีอะไรหรือเปล่าคะ?"
80000050-101 = "[s] \"เปล่าหรอก ครูคงคิดมากไปเองน่ะ...\""
80000050-102 = "คะ...?"
80000050-103 = "(คุณครูเลิกคิดเรื่องอื่นๆ และกินช็อกโกแลตที่วาคาโมะให้อย่างเอร็ดอร่อย)"
80000050-108 = "[ns] \"อร่อยมากเลย วาคาโมะ ขอบคุณนะ\""
80000050-109 = "อา... คุณท่านทานจริงๆ ด้วย ในที่สุดคุณท่านก็ทานช็อกโกแลตที่ฉันทำ..."
80000050-110 = "ความรู้สึกท่วมท้นที่อัดแน่นอยู่ของฉัน..."
80000050-111 = "ได้สัมผัสกับริมฝีปาก ถูกเคี้ยว... และถูกคุณท่านกลืนกิน..."
80000050-112 = "ตอนนี้ทุกสิ่งทุกอย่างของฉันได้ละลายหลอมรวมเป็นหนึ่งอยู่ในท้องของคุณท่าน..."
80000050-113 = "[s] \"นะ...นี่ วาคาโมะ? คือว่าพูดอะไรอยู่น่ะ...\""
80000050-114 = "ฮุฮุ เปล่าค่ะ ไม่มีอะไรหรอกค่ะ"
80000050-115 = "ฉันแค่ดีใจที่คุณท่านทานของที่ฉันให้ค่ะ ฉันเลยควบคุมความรู้สึกของตัวเองไม่ค่อยได้เท่าไร... ฮุฮุ"
80000050-116 = "เอาละ ต่อไป... วันนี้ขอให้คุณท่านใช้เวลากับฉันได้รึเปล่าคะ?"
80000050-117 = "[s] \"หืม...? ก็ได้อยู่หรอก\""
80000050-118 = "ค่ะ~ วันนี้ฉันจะคอยอยู่เคียงข้างคุณท่าน... ผู้ที่ยินดีรับทุกสิ่งทุกอย่างของฉันเอาไว้เองค่ะ"
80000050-119 = "ฮุฮุฮุ ถ้าเป็นแบบนี้ละก็..."
80000050-120 = "วันนี้ต้องเป็นวันที่ยอดเยี่ยมที่สุดแน่ๆ เลยค่ะ♡"
80000050-121 = "[s] \"...???\""
80000050-123 = "(คุณครูใช้เวลาทั้งวันอยู่กับวาคาโมะ โดยพยายามไม่สนใจคำพูดแปลกๆ ที่ทำให้รู้สึกอยากวิ่งหนี...)"

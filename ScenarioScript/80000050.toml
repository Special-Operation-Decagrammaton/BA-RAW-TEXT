[translation]
80000050-1 = "All of Me, for You"
80000050-2 = "I was patrolling the streets on Valentine's Day just to make sure all of the festivities were going smoothly."
80000050-3 = "Then, I spotted something peculiar out of the corner of my eye."
80000050-8 = "[ns] \"Hmm.\""
80000050-10 = "Later, as I turned the corner into an alleyway, I thought I saw something again."
80000050-16 = "[ns] \"Hmmmmm.\""
80000050-23 = "[ns] \"Is that you, Wakamo?\""
80000050-25 = "Oh, my."
80000050-26 = "I was doing my best to refrain from crowding you, hoping to go unnoticed."
80000050-27 = "Heehee. It's a little uncouth of me to say this after following you in secret..."
80000050-28 = "...but I couldn't be happier that you noticed my presence without me having to say a word."
80000050-29 = "Dear me, this won't do. I can hardly contain myself now."
80000050-30 = "[s1] \"Well, you do sort of stand out sometimes...\"\n[s2] \"Anyway, what's up?\""
80000050-31 = "Ah, as for the reason I was following you..."
80000050-32 = "Ah, as for the reason I was following you..."
80000050-38 = "Who do you think you are, selling chocolate on OUR turf?!#nYou lookin' to get holes put in ya? HUH?!"
80000050-40 = "Ahem. As I was saying, the reason I came to see you was..."
80000050-44 = "That's my line, punks! This is our territory! Only WE get to do business here!"
80000050-45 = "So it's a fight you want, is it?! Well, bring it!"
80000050-46 = "ATTACK!"
80000050-53 = "Don't they realize some of us are trying to enjoy ourselves...?"
80000050-54 = "[s] \"W-Wait! I'll handle this!\""
80000050-56 = "I did my best to get the situation under control before Wakamo could take matters into her own hands."
80000050-58 = "Well done, Sensei. Although...you really don't have to worry about me so much."
80000050-59 = "They were only a minor nuisance. I wouldn't have stepped in and gotten violent if that's what you're thinking. Perish the thought."
80000050-60 = "[s] \"You wouldn't have?\""
80000050-61 = "Today is Valentine's Day, after all. I wouldn't want to cause a scene during such an auspicious occasion. That would be so unbecoming."
80000050-62 = "Besides, I still haven't told you the reason I was seeking you today."
80000050-63 = "I wanted to give you this."
80000050-69 = "[ns] \"Chocolate?\""
80000050-70 = "Yes. This is my Valentine's Day chocolate to you."
80000050-71 = "I've been wandering the streets all morning, hoping to give them to you."
80000050-72 = "I'm so happy I finally found you."
80000050-73 = "Heeheehee. ♥"
80000050-74 = "This must be...fate! ♥"
80000050-75 = "[s] \"But you kept following me after finding me...\""
80000050-76 = "Don't worry about that. Why don't you try tasting the chocolate?"
80000050-77 = "I'd love to hear your thoughts about it... Please?"
80000050-78 = "[s] \"S-Sure. Thanks for the chocolate...\""
80000050-82 = "Just as I was about to eat the chocolate Wakamo had gifted me..."
80000050-83 = "Heehee. That's it, my darling. Hurry and eat the chocolate."
80000050-84 = "Put my chocolate in your mouth. My chocolate... Me...#nIn your mouth..."
80000050-85 = "[s] Put the chocolate back down."
80000050-86 = "Oh... Are you not going to eat it...?"
80000050-87 = "[s3] \"No, no! Of course I will!\"\n[s4] Pick the chocolate back up again."
80000050-88 = "Heehee. That's it. Just a little closer... ♥"
80000050-89 = "Heehee. That's it. Just a little closer... ♥"
80000050-90 = "I want you to taste my everything!"
80000050-91 = "[s] Put the chocolate back down again."
80000050-92 = "Why, Sensei? What's wrong?"
80000050-93 = "[s5] \"About this chocolate's ingredients. Did you...?\"\n[s6] \"Wakamo. Did you put something in the chocolate?\""
80000050-94 = "Why, yes. Of course I did. And a lot of it."
80000050-95 = "Why, yes. Of course I did. And a lot of it."
80000050-96 = "[s] \"You did?! What did you put in it?!\""
80000050-97 = "Pardon? Isn't it obvious?"
80000050-98 = "I put all of my love into it!"
80000050-99 = "That's why I'm so eager to see you taste it."
80000050-100 = "Is something the matter?"
80000050-101 = "[s] \"No, it's nothing. Guess I was overthinking it...\""
80000050-102 = "...?"
80000050-103 = "I cleared my head and finally took a bite of Wakamo's chocolate."
80000050-108 = "[ns] \"That was great. Thanks for the chocolate, Wakamo.\""
80000050-109 = "Yes, at last! You finally ate the chocolate I made."
80000050-110 = "It finally passed your lips and graced your tongue."
80000050-111 = "You passionately chewed and swallowed my love whole."
80000050-112 = "Now it's one with you, inside the core of your very being.#nWE are one..."
80000050-113 = "[s] \"Uhhh...Wakamo? You're kind of freaking me out.\""
80000050-114 = "Heehee. Don't be silly. There's nothing to worry about."
80000050-115 = "I'm simply overjoyed that you accepted my chocolate.#nI couldn't contain myself."
80000050-116 = "Though this isn't all I wanted to do with you today.#nCould I trouble you to spend more time with me?"
80000050-117 = "[s] \"I suppose so...\""
80000050-118 = "Getting to spend the day with you after you accepted my Valentine's Day chocolate..."
80000050-119 = "Heehee. This is..."
80000050-120 = "...going to be the most wonderful day ever! ♥"
80000050-121 = "[s] \"...?\""
80000050-123 = "I spent the day with Wakamo, trying to ignore the shivers down my spine that were warning me to run as far away as I could."

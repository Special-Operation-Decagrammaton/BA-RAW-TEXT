[translation]
204-1 = "Ancient Doctrines"
204-5 = "There are two sides to the sublime. If unfathomable Mystic lies on one side, then irreversible Terror must dwell on the other."
204-6 = "Like two sides of a coin, Terror and Mystic are inseparable."
204-7 = "However, just as a tossed coin will only show one side of itself at any given moment, the sublime can only manifest itself in one way at a time."
204-8 = "Terror or Mystic. The essence of the two is the same, but we can only observe one aspect at a time."
204-9 = "And the sublime...was not something we could understand. Simply put, We, Gematria, failed."
204-10 = "We were unable to reach the essence of Mystic, let alone take it within our grasp. "
204-12 = "All that we could manage was Terror, and that too was but a Mimesis."
204-13 = "However, I am a supporter of simulacra. The distinction between original and replication is meaningless. "
204-15 = "Ultimately, my conclusion is that the sublime of this world is beyond our control."
204-16 = "Some of my colleagues are more than welcome to disagree. It is not my place to intervene."
204-17 = "We must approach the issue another way."
204-18 = "So we turned our attention to the ancient doctrines sealed below Trinity.#nThey differ from the sublime, but the Terror and Mystic they contain are somewhat similar. In theory..."
204-19 = "..."
204-20 = "Am I boring you? Pardon me, Sensei."
204-21 = "I merely wanted to educate you on our small success."
204-22 = "For the ancient doctrines will finally incarnate, proving that their will can be done below as it is in heaven."
204-25 = "An artificial angel that we created—a divine monster."
204-26 = "Allow me to introduce you. This is the doctrine that guides the Communio Sanctorum. "
204-27 = "It is known as Hieronymus, a name borrowed from the ancient doctrines."
204-28 = "Consider this the declaration of its arrival. Perhaps it's a bit avant-garde, but that suits an artist such as me, doesn't it?"
204-29 = "\"Oh, Congregatio de Causis Sanctorum, these blessed ones who gladly followed your teachings have finally been canonized, and they will perform miracles as proof.\""
204-30 = "Here is where you give me a round of applause, Sensei."

[translation]
204-1 = "ความรู้โบราณ"
204-5 = "ความสูงส่งนั้นมีสองด้าน หากด้านหนึ่งมีความลึกลับที่ไม่อาจแตะต้องได้อยู่ล่ะก็#nอีกด้านหนึ่งก็คือความกลัวที่ไม่สามารถหวนคืนได้"
204-6 = "เช่นเดียวกับเหรียญที่มีสองด้าน ความกลัวกับความลึกลับ#nก็คือสิ่งเดียวกันที่ไม่สามารถแยกออกจากกันได้"
204-7 = "แต่ว่าเช่นเดียวกับเหรียญที่โยนขึ้นไป พอตกลงมามันก็จะเห็นแค่เพียงด้านเดียวเท่านั้น#nความสูงส่งเองก็ปรากฏให้เราเห็นในลักษณะนั้นเช่นกัน"
204-8 = "ความกลัว หรือความลึกลับ..... แก่นแท้ของทั้งสองอย่างคือสิ่งเดียวกัน#nแต่เรามักจะเห็นความสูงส่งเพียงแค่แง่มุมเดียวเท่านั้น"
204-9 = "อีกทั้งความสูงส่งนั้น... ไม่ใช่สิ่งที่เราจะเข้าใจได้ หรือก็คือ...[ruby=เกมาเทรีย]พวกเรา[/ruby]ล้มเหลว"
204-10 = "พวกเราไม่สามารถเข้าถึงความลึกลับ และไม่สามารถครอบครองมันได้เช่นกัน"
204-12 = "สิ่งที่พวกเราเข้าถึงได้มีเพียงความกลัวเท่านั้น และมันก็เป็นเพียงแค่การเลียนแบบ#n[ruby=มิเมซิส]ที่ถูกเลียนแบบซ้ำ[/ruby]ขึ้นมาอีกครั้ง"
204-13 = "ผมเป็นผู้สนับสนุนซิมูลาร์กเท่านั้น และคิดว่าคำว่า \"ต้นแบบ\" กับ \"ตัวลอกเลียนแบบ\"#nนั้นไม่ได้มีความหมายอะไร"
204-15 = "แต่ท้ายที่สุดผมก็สรุปได้ว่าความสูงส่งของโลกใบนี้ คือสิ่งที่เราไม่สามารถเอื้อมถึงได้"
204-16 = "มีพวกพ้องบางคนที่ไม่เห็นด้วยกับข้อสรุปของผมอยู่ แต่ว่าพวกเขามีสิทธิ์ที่จะตัดสินใจ#nเพราะแบบนั้นผมจึงไม่มีสิทธิ์ที่จะเข้าไปแทรกแซงได้"
204-17 = "แต่ถึงยังไง พวกเราก็ต้องคำนึงถึงวิธีอื่นด้วยเช่นกัน"
204-18 = "พวกเราจึงหันความสนใจไปที่ความรู้โบราณที่ถูกผนึกเอาไว้ที่ชั้นใต้ดินของทรีนิตี้#nถึงจะไม่ใช่ความสูงส่งก็ตาม แต่ความกลัวกับความลึกลับก็มีความคล้ายคลึงกันในอีกมิติหนึ่ง#nซึ่งแนวคิดนั้น..."
204-19 = "....."
204-20 = "ช่างเป็นเรื่องน่าเบื่อจริงๆ ขอโทษทีนะ ครูเอ๋ย"
204-21 = "ผมอยากจะเล่าเรื่องความสำเร็จเล็กๆ ของเราให้ฟังสักหน่อย"
204-22 = "ความรู้โบราณนั้นจะถูกนำมาปลูกฝังและพิสูจน์ให้เห็นว่าไม่ว่าจะเป็นนรกหรือสวรรค์#nก็สามารถทำให้เจตจำนงบรรลุผลได้เช่นกัน"
204-25 = "เทวทูตประดิษฐ์ที่พวกเราสร้างขึ้นมา ปีศาจแห่งความศักดิ์สิทธิ์"
204-26 = "ผมขอแนะนำให้รู้จัก... นั่นก็คือคำสอนที่นำไปสู่[ruby=สหพันธ์นักบุญ]<เส้นทางร่วมกันของการเป็นผู้ใหญ่>[/ruby]"
204-27 = "และชื่อที่ได้รับมาจากความรู้โบราณนั้นก็คือ ไฮโรนีมัส"
204-28 = "ดังนั้นผมจะขอประกาศให้รู้กันดังนี้ บางครั้งมันอาจจะรู้สึกว่าล้ำสมัยไปบ้าง#nแต่ในฐานะของศิลปินแล้ว ผมค่อนข้างชอบสิ่งเหล่านี้มากเลยล่ะ"
204-29 = "\"โอ้ เหล่านักบุญทั้งหลายเอ๋ย เหล่าผู้ที่ได้รับคำอวยพรจนได้รับ การขนานนามให้เป็นนักบุญในที่สุด#nจงแสดงปาฏิหาริย์ให้เป็นที่ประจักษ์เถิด\""
204-30 = "อ่า... ขอจงปรบมือและโห่ร้องชื่นชมให้กับผมอีกครั้งด้วยเถอะ ครูเอ๋ย"

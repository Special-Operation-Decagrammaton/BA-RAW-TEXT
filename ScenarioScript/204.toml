[translation]
204-1 = "太古的教義"
204-5 = "所謂的「崇高」擁有不同的兩面……#n一是終究無法抵達的「神祕」；而另一面是無法逆轉的「恐怖」。"
204-6 = "舉例來說，如同硬幣的兩面一般，「神祕」和「恐怖」是無法分離彼此的。"
204-7 = "然而與丟向天空的硬幣終究會展現其中一面相同，「崇高」也會以類似的形式顯現。"
204-8 = "「神祕」以及「恐怖」。儘管兩者的本質相同，我們卻只能觀測到「崇高」的其中一個樣貌。"
204-9 = "話雖如此……儘管羞恥但事實上，我們也尚未完全理解它。#n換句話說，[ruby=蓋瑪特利亞]我們[/ruby]失敗了。"
204-10 = "我們沒能獲得「神祕」，甚至連真正觸及它都做不到。 "
204-12 = "我們能接近的只有「恐怖」而已，並且那也只不過是[ruby=Mimesis]複製[/ruby]出來的東西罷了。"
204-13 = "瑪艾斯托洛;雖然對支持[ruby=simulacrum]擬像論[/ruby]的我來說，區分「真品」和「複製品」沒有意義……"
204-15 = "就結果來說，那並非我們能加以運用的東西……這是我目前的結論。"
204-16 = "或許會有同志不同意我的結論，但他們各自的判斷並不需要我的參與吧。"
204-17 = "總之，我們必須想出其他作法。"
204-18 = "於是我們將目光投向了封印於三一地下的太古教義。#n儘管它與「崇高」並不相同，但其隱藏的「神祕」以及「恐怖」在別的意義上有相似之處，#n也就是說在概念上──"
204-19 = "……失禮了。"
204-20 = "我好像說了些無聊的話呢。抱歉，老師。"
204-21 = "簡單來說……我想向你介紹這個小小的成功。"
204-22 = "那個教義總算是道成了肉身，試圖證明其意志無論於天於地都一樣結實。"
204-25 = "這就[ruby=蓋瑪特利亞]是我們製[/ruby]造出來的人造天使、神性的怪物。"
204-26 = "讓我來為你介紹吧。這就是率領[ruby=Communio Sanctorum]「諸聖相通」[/ruby]的受肉教義……"
204-27 = "借用與太古教義相關之名，我們將其稱為「耶羅尼姆斯」。"
204-28 = "那麼，我這麼宣言吧……或許會被認為過於前衛，但我是個藝術家，這點還請見諒。"
204-29 = "……啊啊。那位有福之人總算受到列聖，成為了聖人。接著將引發奇蹟以玆證明……"
204-30 = "來吧，老師……請再次，做好喝采的準備。"

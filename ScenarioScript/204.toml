[translation]
204-1 = "#title;고대의 교의"
204-2 = "#wait;2000"
204-3 = "4;마에스트로;00\n#4;a\n#wait;1000"
204-4 = "4;마에스트로;00\n#4;stiff\n#wait;2500"
204-5 = "4;마에스트로;00;숭고(the sublime)는 두 개의 양면성을 지니고 있다.#n한쪽에 감히 와 닿을 수 없는 신비가 있다면, 그 반대편엔 돌이킬 수 없는 공포가 자리하고 있지."
204-6 = "4;마에스트로;00;동전의 양면처럼, 공포와 신비는 따로 떼어낼 수 없는 한 몸이라고 볼 수 있는 것이다."
204-7 = "4;마에스트로;00;하지만 던져진 동전이 언제나 단 하나의 정황만 보여주듯, 숭고 또한 그런 식으로만 우리들의 세계에 현현한다."
204-8 = "4;마에스트로;00;공포, 혹은 신비. 둘의 본질은 같지만, 우리는 숭고의 단 하나의 모습만을 관측할 수 있는 것이지.\n#4;m3"
204-9 = "4;마에스트로;00;그리고 그 숭고는…… 우리가 이해할 수 있는 것은 아니었다.#n말하자[ruby=게마트리아]면 우리는 [/ruby]실패했다.\n#4;stiff"
204-10 = "4;마에스트로;00;우리는 신비에 가 닿을 수 없고, 그것을 소유하지도 못했다. "
204-11 = "#all;hide"
204-12 = "#na;마에스트로;우리가 접근할 수 있었던 것은 그저 공포 뿐이였으며, 그것 또[ruby=미메시스]한 복제된 [/ruby]재현품일 뿐이었다."
204-13 = "#na;마에스트로;뭐, 나는 시뮬라크르를 지지하는 쪽이기에, 원본이나 복제라는 구분은 무의미하다고 생각하지만……. "
204-14 = "3;마에스트로;00\n#3;closeup"
204-15 = "3;마에스트로;00;결국, 이 세계의 그 숭고는 우리가 다룰 수 있는 게 아니라는 게 나의 결론이다.\n#3;closeup\n#3;stiff"
204-16 = "3;마에스트로;00;나의 결론에 동의하지 않는 동지들도 있겠지만, 그 판단은 그들의 몫이니 내가 개입할 여지는 없겠지.\n#3;closeup"
204-17 = "3;마에스트로;00;어쨌든, 우리는 다른 방식으로 사고해야만 했다.\n#3;closeup"
204-18 = "3;마에스트로;00;우리는 트리니티 지하에 봉인된 고대의 교의(敎義)로 관심을 돌렸다. 숭고는 아니지만, 그 공포와 신비는 다른 차원에서 비슷한 부분이 있었고…… 그 개념은…….\n#3;closeup"
204-19 = "3;마에스트로;00;…….\n#3;closeup"
204-20 = "3;마에스트로;00;……지루한 이야기였군. 실례했다. 선생이여.\n#3;closeup\n#3;stiff"
204-21 = "3;마에스트로;00;나는 우리들의 작은 성공을 소개하고 싶었던 것이다.\n#3;closeup"
204-22 = "3;마에스트로;00;그 고대의 교의는 마침내 수육(受肉)하여, 그 뜻이 하늘에서와 같이 지하에서도 이루어질 수 있다는 것을 증명해낼 것이니까.\n#3;closeup"
204-23 = "3;마에스트로;00\n#3;d\n#3;closeup\n#wait;1000"
204-24 = "3;마에스트로;00\n#3;a\n#wait;1500"
204-25 = "3;마에스트로;00;우리가 만들어낸 인공천사. 신성의 괴물."
204-26 = "3;마에스트로;00;소개하겠다. 이것이 바로 [ruby=Communio Sanctorum]<모든 성인의 통공通功>[/ruby]을 이끄는 교의. \n#3;m2"
204-27 = "3;마에스트로;00;그 고대 교의의 이름을 빌려, 예로니무스라고 부르고 있다."
204-28 = "3;마에스트로;00;그러니 이렇게 선언해 보겠다. 가히 전위적이지만, 나는 예술가이기에 이런 것도 즐기는 편이지.\n#3;m3"
204-29 = "3;마에스트로;00;\"오오, 시성성이여, 저들 복자는 예부되여 마침내 성인품에 올랐나니, 그 증거로 기적을 행하게 하리라.\"\n#3;em;…"
204-30 = "3;마에스트로;00;아아, 그러니 이번에도 부디 갈채를 내려주기 바란다. 선생이여.\n#3;stiff"

[translation]
84311100101-5 = "บางครั้งเนรุก็อ่อนไหวให้กับเรื่องที่ไม่เป็นเรื่องน่ะ"
84311100101-6 = "ฉันคิดว่าเธอต่างหากที่ไม่มีความรู้สึกอะไรเลย..."
84311100101-8 = "เอาเถอะค่ะ เราต่างก็มีเรื่องที่ไม่อยากคุยเหมือนกันนั่นละ ฉันเองก็มีค่ะ แต่การไม่พูดถึงมันตั้งแต่แรก#nก็น่าจะดีกว่านะคะ"
84311100101-9 = "หืม? เรื่องอะไรเหรอ?"
84311100101-10 = "..."
84311100101-12 = "เมื่อกี้ว่ายังไงนะ..."

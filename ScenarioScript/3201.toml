[translation]
3201-1 = "Princess Waraku's Special Concert 1"
3201-2 = "The next item on the agenda..."
3201-3 = "The Yin-Yang Club will be holding a concert called \"A Hyakkiyako Thanksgiving\" for the festival."
3201-4 = "This festival is an important tradition for us all, but there's no need to feel any pressure."
3201-5 = "It should be routine, so I'll handle directing and organizing it."
3201-10 = "Wait, please."
3201-11 = "Yes, Chise? Did you have any questions?"
3201-12 = "Mmm..."
3201-13 = "I want to be in charge."
3201-14 = "Of the concert?!"
3201-16 = "Director Chise? Nyahaha!"
3201-17 = "I like the sound of that."
3201-18 = "Y-You do? ...I mean, I appreciate the offer, Chise, really!"
3201-19 = "But there's not much work to be done regardless. We'll be reusing old equipment and props..."
3201-20 = "It's a special concert."
3201-21 = "I want to do it, okay?"
3201-22 = "(Sh-She's blindingly cute!)"
3201-23 = "Ahem! In that case..."
3201-24 = "I'll be there with you every step of the way. I'll help you with buying any additional props, staging..."
3201-25 = "I'll make sure this experience is smooth as silk for you, Chise."
3201-26 = "Aren't you going a little overboard?"
3201-27 = "It'll be totally fiiine."
3201-28 = "This falls under my purview as the vice president of the Yin-Yang Club."
3201-29 = "I've always coordinated our events and concerts..."
3201-31 = "(It's partially because I would feel terrible if Chise undertook my responsibilities...) "
3201-32 = "(I also... I do trust Chise, but I can't help but worry a little bit...)"
3201-33 = "It's okay."
3201-34 = "This time, Kaho can take a break."
3201-35 = "The sun is out. I have heard sunbathing is fun."
3201-36 = "You sunbathe, and I'll direct."
3201-37 = "Okay. I'm going shopping now."
3201-41 = "Wait, Chise! Come back!"
3201-42 = "Oh my. Just like that, she's gone."
3201-43 = "This is entirely out of character for Chise!"
3201-44 = "It couldn't be... I-Is Chise going through her rebellious phase?!"
3201-45 = "Nyahaha! I don't think that's possible for her. Why not just hand over the reins on this one, Kaho?"
3201-46 = "Chise's not the type to do something without intention behind it."
3201-47 = "I-I know that! It's not that I don't think she would do a good job..."
3201-48 = "B-But what if she gets lost at the mall?"
3201-49 = "Or she could get kidnapped! Again!"
3201-51 = "Worrywart Kaho rears her fearsome head!"
3201-52 = "We're really never going to live down the \"Princess Waraku\" incident, are we? She's just going shopping."
3201-53 = "How do you know it won't happen again? Hm?!"
3201-54 = "Exactly! You do not! And so, I will be...keeping an eye on her!"
3201-55 = "Hurry up, Niya!"
3201-56 = "Why am I getting dragged into this?"
3201-58 = "Welcome!"
3201-59 = "What a surprise! We're honored to serve the one and only Chise here."
3201-60 = "Hi. Thank you."
3201-64 = "Don't you feel like a stalker right now?"
3201-65 = "Maybe we'll get arrested! Nyahaha!"
3201-66 = "We'll only get caught if you keep making so much noise!"
3201-67 = "I am not stalking her! I'm respecting her independence while still keeping her safe, okay?"
3201-68 = "Oops. Did she just turn her head? She's gonna hear you, Kaho."
3201-69 = "Ugh!"
3201-70 = "Eh, well we're already here. Might as well see what happens."
3201-72 = "I'm guessing you're here to get props for the concert."
3201-73 = "Then let me recommend this..."
3201-74 = "Ah. Found it!"
3201-75 = "Kaho loves using this indigo umbrella for her concerts."
3201-76 = "Great choice, Chise!"
3201-77 = "Indigo is the color of dignity! It's the perfect representation of Hyakkiyako."
3201-82 = "I want the pink one, please."
3201-85 = "What?!"
3201-86 = "What are you thinking, Chise?!"
3201-87 = "We've always used indigo umbrellas for our concerts... Has she hated them all this time?"
3201-88 = "It's more fun to see this play out than I'd thought."
3201-90 = "It looks like our idol Chise IS going through a rebellious phase."
3201-92 = "This pink one, correct?"
3201-93 = "Packed and ready to go!"
3201-94 = "Thank you."
3201-95 = "Of course. Princess Waraku is always welcome here!"
3201-97 = "Chise! Are you getting some shopping done today?"
3201-98 = "I am shopping for dolls."
3201-99 = "Cute ones, please."
3201-100 = "Oh! It must be for the Thanksgiving concert!"
3201-101 = "These kokeshi dolls would be the natural choice."
3201-102 = "Great job, Chise! Dolls are very important props for any Hyakkiyako ritual, especially Thanksgiving."
3201-103 = "The umbrella may be the wrong color, but at least she's getting kokeshi dolls. "
3201-104 = "You can do it!"
3201-105 = "You need to learn to relax a little, Kaho."
3201-107 = "Kokeshi dolls?"
3201-108 = "I think this one is cuter."
3201-109 = "Th-The fox doll? A bit untraditional, but here you go..."
3201-110 = "No kokeshi?!"
3201-111 = "This is good. It looks like Vice President Kaho."
3201-113 = "Sh-She picked a doll that looks like me?!"
3201-114 = "Wow. Suddenly you don't seem so upset about the missing kokeshi doll. Nyahaha!"
3201-116 = "The Daruma too, please."
3201-117 = "Of course! Thank you!"
3201-118 = "Look. It is President Niya."
3201-120 = "Me?! A Daruma?"
3201-121 = "Does she think we look alike?! She means symbolically, right?"
3201-122 = "Thank you. This is exactly what I was looking for."
3201-123 = "I'm looking forward to the concert!"
3201-128 = "What happened to tradition?! She's getting ORANGE JUICE??"
3201-133 = "We already have traditional tableware! What is she going to do with some merch?"
3201-138 = "Pudding?! I-Ice cream?!"
3201-143 = "*pant* *pant*"
3201-144 = "You really ran the entire way back. You don't think you're being a little dramatic?"
3201-145 = "No! We had to get back before Chise did, or we could've gotten caught!"
3201-146 = "Okay, okay. Anyway, I can't make heads nor tails of Chise's vision."
3201-147 = "What a strange assortment of props..."
3201-148 = "I don't know either. "
3201-149 = "I'm doing my best to just trust her judgment."
3201-154 = "Hello. I'm back."
3201-160 = "I took a walk with Mr. Sun."
3201-161 = "Ch-Ch-Chise! What a surprise!"
3201-162 = "Did decoration shopping go well?"
3201-163 = "Yes. Perfectly."
3201-164 = "Everything is going according to plan."
3201-165 = "I-I'm looking forward to it!"
3201-166 = "I will go begin my preparations."
3201-170 = "What is she doing..."

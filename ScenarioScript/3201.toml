[translation]
3201-1 = "和樂公主的特別公演（１）"
3201-2 = "好，進入下一個案件。"
3201-3 = "這次陰陽部決定在慶典中，以「百鬼夜行感謝祭」的名義進行公演。"
3201-4 = "雖然名字聽起來略顯浮誇，其實和平時的演出大同小異。"
3201-5 = "既然是只是普通的演出，就由我來準備吧。"
3201-10 = "等等～"
3201-11 = "嗯？怎麼了嗎？知世醬？"
3201-12 = "那個～"
3201-13 = "這次的公演，由我來準備。"
3201-14 = "知世醬……？"
3201-16 = "喵哈，知世要準備啊……"
3201-17 = "感覺會有點意思呢～？"
3201-18 = "知，知世醬沒必要意親自準備。"
3201-19 = "道具和舞台裝置都能拿之前的來用。#n而且就如同剛才說的，這不是什麼了不起的公演……"
3201-20 = "但這次的演出很特別～"
3201-21 = "所以我能親自準備嗎？"
3201-22 = "（好，好可愛……！）"
3201-23 = "咳，咳哼，好吧，我知道了。"
3201-24 = "那麼從採購道具到搭建舞台，我都會在一旁盡力協助的。"
3201-25 = "因為不能讓知世醬的準備出現任何缺失。"
3201-26 = "哼嗯～需要做到那種程度嗎？"
3201-27 = "知世應該會自己看著辦吧。"
3201-28 = "身為陰陽部的副部長，自然要讓演出能順利進行。"
3201-29 = "這也是我一直以來的任務。"
3201-31 = "（而且都交給知世醬做的話……感覺就像把自己的事全推給了他，實在很過意不去） "
3201-32 = "（另一方面，也是出於擔心……）"
3201-33 = "嗯，沒問題的。"
3201-34 = "佳穗就好好休息～"
3201-35 = "今天是難得能見到太陽的好天氣～"
3201-36 = "包在我身上～"
3201-37 = "我去買個道具就回來。"
3201-41 = "等，等等！知世醬！"
3201-42 = "……哎呀，真的走掉了呢。"
3201-43 = "知世醬的言行舉止和平常不太一樣……"
3201-44 = "難，難道這就是所謂的青春期嗎！？"
3201-45 = "喵哈哈～佳穗真是的～也太大驚小怪了吧。#n我說啊，這次就先觀察看看吧？"
3201-46 = "知世肯定是有一些自己的想法～"
3201-47 = "那，那當然！我也不是對知世醬搭建舞台有意見……只是……"
3201-48 = "萬一知世醬在商店街被很多人圍住……！"
3201-49 = "然後有心懷不軌的人想綁架他的話，該怎麼辦！"
3201-51 = "喵哈哈，未免想太多了吧～？"
3201-52 = "又不是在演「和樂公主」。"
3201-53 = "唔唔……果然還是很擔心！"
3201-54 = "我得好好盯著知世醬才行！"
3201-55 = "仁耶大人也跟我一起去吧！"
3201-56 = "咦～？我也得去嗎～？"
3201-58 = "歡迎光臨！"
3201-59 = "哎呀，這不是知世大人嗎？哈哈！"
3201-60 = "你好～很高興見到你～"
3201-64 = "喵哈，偷偷跟蹤什麼的……"
3201-65 = "這樣不是反而會讓我們看起來像危險的人嗎～"
3201-66 = "噓，安靜點！會被聽到的！"
3201-67 = "只有這樣才能同時確保知世醬的安全，還有他想獨自準備演出的想法！"
3201-68 = "明明是佳穗的聲音更大……"
3201-69 = "唔唔！"
3201-70 = "總之我們就先觀望一下吧。"
3201-72 = "看來你是來準備「百鬼夜行感謝祭」的對吧。"
3201-73 = "既然如此……我看看……"
3201-74 = "啊，在這裡。"
3201-75 = "這是佳穗常買的藍色雨傘。"
3201-76 = "沒錯，就是那個，知世醬！"
3201-77 = "百鬼夜行的傳統工藝品──藍染傘──能增添演出的嚴肅、格調……！"
3201-82 = "不，我要那把桃色的～"
3201-85 = "！？"
3201-86 = "知世醬，為什麼……？"
3201-87 = "上次演出時是用藍染傘……難道你不喜歡嗎！？"
3201-88 = "哦哦，嗯嗯，果然是這樣。"
3201-90 = "是偶像知世的小小叛逆呢。"
3201-92 = "是要這個桃色的嗎？"
3201-93 = "來！"
3201-94 = "謝謝～"
3201-95 = "嗯！歡迎隨時再來。"
3201-97 = "你好！知世大人！是來採買的嗎？"
3201-98 = "嗯，我還需要人偶～"
3201-99 = "希望是可愛的。"
3201-100 = "是在準備「百鬼夜行感謝祭」吧？"
3201-101 = "這樣的話，我推薦這邊的木芥子人偶。"
3201-102 = "沒錯！人偶也是感謝祭儀式上非常重要的道具！"
3201-103 = "傘的顏色雖然和之前不一樣……但用於感謝祭的人偶，就該選店家推薦的木芥子人偶！"
3201-104 = "是正確答案唷！知世醬！"
3201-105 = "喵哈哈，靜靜地看吧～"
3201-107 = "木芥子人偶……"
3201-108 = "可愛是可愛，但我喜歡這個～"
3201-109 = "是說這邊的狐狸玩偶嗎？#n真讓人意外。來，在這邊。"
3201-110 = "居然又挑了別的……"
3201-111 = "嗯，這是佳穗副部長～"
3201-113 = "那，那個是我嗎！？"
3201-114 = "哦～原來如此。不愧是知世，真有眼光～"
3201-116 = "還有，那個達摩也拜託了～"
3201-117 = "來！請收下！"
3201-118 = "這是仁耶部長～"
3201-120 = "嗯，咦！？為什麼我是達摩？"
3201-121 = "應該不是在說我長得像它吧……？"
3201-122 = "謝謝。我會好好使用～"
3201-123 = "不客氣！祝你演出成功！"
3201-128 = "知世醬！？這次不是選儀式用的傳統飲料，而是柳橙汁！？"
3201-133 = "這次則是用畫有角色圖案的杯子代替儀式用的傳統茶具！？"
3201-138 = "甚至還改用布丁和冰淇淋！？"
3201-143 = "呼，呼……"
3201-144 = "有，有必要像這樣用跑的回來嗎？"
3201-145 = "因，因為不能被知世醬發現。"
3201-146 = "話說回來，知世到底在想什麼呢？"
3201-147 = "幾乎都是平常不會使用的東西……"
3201-148 = "就，就是說啊。知世醬……"
3201-149 = "我相信他一定是有什麼想法……"
3201-154 = "回來了～"
3201-160 = "太陽公公，有看到嗎？"
3201-161 = "啊，知，知世醬！你回來啦！"
3201-162 = "道具採買還順利嗎？"
3201-163 = "嗯，很完美～"
3201-164 = "演出會很順利的。"
3201-165 = "這，這樣啊。那真是太好了。"
3201-166 = "那我就去準備囉～"
3201-170 = "知世醬……"

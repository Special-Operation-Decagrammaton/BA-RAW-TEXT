[translation]
10000095-2 = "那麼我們節慶營運管理部還要做最後的準備，就先走一步了。#n之後還請讓我們正式答謝。"
10000095-3 = "頭兒！請找個好位置欣賞慶典的高潮哦！"
10000095-4 = "[s]「嗯，你們兩個都辛苦了。」"
10000095-6 = "（送走節慶營運管理部的兩人之後，走在熱鬧的街上）"
10000095-8 = "聽說等等跟千年合作的煙火大會就要開始了！"
10000095-9 = "趕快走吧！"
10000095-11 = "[ns] 跟著人群朝煙火大會的會場移動"
10000095-15 = "（能清楚觀賞煙火的觀景台上人很多，相當熱鬧）"
10000095-16 = "（但即使是在這樣的人群之中，依然馬上就發現了他）"
10000095-18 = "人，人實在太多，伊樹菜好像快缺氧了～"
10000095-19 = "[s] 向伊樹菜搭話"
10000095-20 = "啊，這個聲音是……！#n老……不對，主公！"
10000095-23 = "（差點因為伊樹菜突然衝過來的氣勢而跌倒）"
10000095-24 = "主公！伊樹菜發現了視野非常好的地點！"
10000095-26 = "那邊正好可以……呃，啊啊！已經全都是人了！"
10000095-27 = "嗚哇！怎，怎麼辦！？#n剛才的地方跟回去的路都被堵住了！"
10000095-28 = "（安撫慌張的伊樹菜後，決定就在原地欣賞煙火）"
10000095-29 = "[s]「在人群中看也不太方便，就在這裡看吧。」"
10000095-30 = "是，是！耶嘿嘿！"
10000095-32 = "啊，開始了……！ "
10000095-38 = "哇啊！真棒！"
10000095-39 = "（就這樣，和伊樹菜一起眺望著美麗而短暫的煙火在夜空中綻放）"
10000095-41 = "（是段彷彿僅有一瞬間，又好像欣賞了很久的時間）"
10000095-43 = "耶嘿嘿，這個景色……居然能和主公一起欣賞……"
10000095-44 = "……"
10000095-45 = "主公……那個，這次給大家添了這麼多麻煩，伊樹菜真的很抱歉。"
10000095-46 = "伊樹菜，伊樹菜是……"
10000095-47 = "[s1]「不用在意，我可是一名老師。」\n[s2]「隨時歡迎學生添麻煩哦。」"
10000095-48 = "老師……"
10000095-49 = "老師……"
10000095-51 = "耶嘿嘿……主公！伊樹菜在此宣言！"
10000095-52 = "老師，主公您是願意支持伊樹菜夢想的人！"
10000095-53 = "伊樹菜發誓，今後會向主公效忠！"
10000095-54 = "[s]「這，這樣啊。」"
10000095-55 = "所以主公！"
10000095-56 = "從今以後，伊樹菜也要請您多多指教了！"
10000095-57 = "伊樹菜今後也會繼續修練，為了主公而努力！"
10000095-60 = "忍忍！耶嘿嘿……！"
10000095-63 = "百鬼夜行．第38舊校舍"
10000095-67 = "（忍術研究部的部室）"
10000095-68 = "（正在募集想加入的夥伴！酸民退散！）"
10000095-69 = "哦哦，這裡就是傳說中的忍術研究部……！"
10000095-70 = "居然有研究忍術的社團……伊樹菜之前完全不知道！"
10000095-71 = "只要在這裡修練的話，伊樹菜也能成為優秀的忍者……！"
10000095-73 = "……好！"
10000095-76 = "打擾了……！"
10000095-79 = "完……？"
10000095-80 = "櫻花盛開慶典大騷動！～天之徒花，地之微行～"

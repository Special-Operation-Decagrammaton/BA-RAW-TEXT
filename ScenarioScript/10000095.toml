10000095-30 = "Um, sure! Heeheehee!"
10000095-32 = "Oh, look. It's starting. "
10000095-38 = "Whoa...! Amazing!"
10000095-39 = "Izuna and I took in the fireworks lighting up the night sky for a while."
10000095-41 = "A little later that night..."
10000095-43 = "It feels so nice to enjoy something together, my lord."
10000095-44 = "..."
10000095-45 = "Uh, Izuna is sorry for...causing so much trouble earlier."
10000095-46 = "Izuna just, um..."
10000095-47 = "[s1] \"I'm your Sensei. I'll always forgive you.\"\n[s2] \"You don't have to apologize for being yourself.\""
10000095-48 = "Sensei... Even after all of that, you still...?"
10000095-49 = "Sensei... Even after all of that, you still...?"
10000095-51 = "Heehee! That's right! Izuna made a vow to her lord!"
10000095-52 = "We're ninja comrades-in-arms! Because my lord is the biggest supporter of Izuna's dream!"
10000095-53 = "Izuna will remain loyal to her lord forever."
10000095-54 = "[s] \"F-Forever?\""
10000095-55 = "So, my lord...!"
10000095-56 = "Izuna is looking forward to what the future holds for us!"
10000095-57 = "And Izuna promises to keep training so she can uphold her vow!"

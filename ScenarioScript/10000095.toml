[translation]
10000095-2 = "Okay. We're off to prepare for the grand finale."
10000095-3 = "Make sure you find a good spot to watch the show, Boss!"
10000095-4 = "[s] \"Sure. Go ahead, you two.\""
10000095-6 = "I rejoined the busy festival street after seeing off Shizuko and Pina."

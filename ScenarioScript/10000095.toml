[translation]
10000095-2 = "ถ้างั้นชมรมเทศกาลขอกลับไปเตรียมงานเทศกาลขั้นสุดท้ายกันก่อนนะคะ"
10000095-3 = "บอส! อย่าลืมมาดูไคลแม็กซ์ของงานนะคะ!"
10000095-4 = "[s] \"อื้ม พยายามเข้าล่ะ\""
10000095-6 = "(บอกลาสมาชิกชมรมจัดงานเทศกาล แล้วออกไปเดินเล่นในงานเทศกาล)"
10000095-8 = "อีกไม่ช้าจะเริ่มจุดดอกไม้ไฟของมิลเลเนียมแล้วนะ!"
10000095-9 = "รีบไปกันเถอะ เดี๋ยวไม่ทัน!"
10000095-11 = "[ns] ตามผู้คนไปยังสถานที่ที่จุดดอกไม้ไฟ"
10000095-15 = "(ที่จุดชมวิวมีผู้คนมากมายมารอดูดอกไม้ไฟ)"
10000095-16 = "(แต่ในฝูงชนมากมาย ก็สังเกตเห็นบางคนได้อย่างง่ายๆ)"
10000095-18 = "คะ... คนมารวมตัวกัน ยะ.. เยอะมาก... อิซุนะหาย... หายใจไม่ออกเลย~"
10000095-19 = "[s] เรียกอิซุนะเบาๆ"
10000095-20 = "อ๊ะ!! เสียงนี้มัน! คุณครู... ไม่สิ.. นายท่าน!"
10000095-23 = "(อิซุนะวิ่งเข้ามาชนจนตัวเซ)"
10000095-24 = "นายท่าน! อิซุนะกำลังรับผิดชอบพื้นที่นี้อยู่พอดีเลยค่ะ!"
10000095-26 = "...อ๊ะ! ทำไมคนถึงแออัดกันเข้ามาเยอะแบบนี้ล่ะ!"
10000095-27 = "ทำยังไงดีล่ะคะ?! งืออ! แบบนี้ก็กลับไปไม่ได้แล้วน่ะสิ!"
10000095-28 = "(คุณครูปลอบอิซุนะที่ตกใจ แล้วตัดสินใจจะอยู่ที่นี่แทน)"
10000095-29 = "[s] \"ช่วยไม่ได้ ดูจากตรงนี้เอาแล้วกัน\""
10000095-30 = "อ๊ะ ได้ค่ะ! ฮิฮิฮิ!"
10000095-32 = "อ๊ะ.. เริ่มแล้วค่ะ!"
10000095-38 = "ว้าวว! เยี่ยมไปเลย!"
10000095-39 = "(ดูดอกไม้ไฟที่ระยิบระยับอยู่บนท้องฟ้าอยู่กับอิซุนะ)"
10000095-41 = "(หลังจากนั้นสักพัก)"
10000095-43 = "ฮิฮิ ดีจังเลยค่ะ... ที่ได้มาดูดอกไม้ไฟกับนายท่าน"
10000095-44 = "......"
10000095-45 = "เอ่อ... ที่ผ่านมาอิซุนะก่อเรื่องไว้เยอะเลย... ขอโทษด้วยนะคะ"
10000095-46 = "อิซุนะน่ะ..."
10000095-47 = "[s1] \"ฉันเป็นครูของเธอนะ ไม่ต้องขอโทษหรอก\"\n[s2] \"ไม่ต้องขอโทษที่เป็นตัวเองหรอก\""
10000095-48 = "ถึงจะเกิดเรื่องมากมาย...แต่คุณครูก็ยัง..."
10000095-49 = "ถึงจะเกิดเรื่องมากมาย...แต่คุณครูก็ยัง..."
10000095-51 = "ฮิฮิฮิ! ได้เลยค่ะ! นายท่าน! อิซุนะขอสาบานค่ะ"
10000095-52 = "เราคือสหายนินจาของกันและกัน! เพราะคุณครูคือคนที่สนับสนุนความฝันของอิซุนะ"
10000095-53 = "จากนี้ฉันจะเดินตามนายท่าน! จากนี้และตลอดไปเลยค่ะ!"
10000095-54 = "[s] \"อะ... เอางั้นเหรอ?\""
10000095-55 = "จริงสิ! นายท่าน!"
10000095-56 = "ต่อไปก็ขอฝากตัวด้วยนะคะ!"
10000095-57 = "อิซุนะจะตั้งใจฝึกฝนเพื่อรักษาคำสาบานค่ะ!"
10000095-60 = "นินนิน!"
10000095-63 = "อาคารเรียนเก่าที่ 38 เฮียกคิยาโค"
10000095-67 = "(ห้องชมรมวิจัยศาสตร์นินจา)"
10000095-68 = "(กำลังเปิดรับสมัคร! งดเข้าพบหากไม่มีธุระ!)"
10000095-69 = "ว้าว! นี่มันชมรมวิจัยศาสตร์นินจาที่ลือกัน!"
10000095-70 = "อิซุนะไม่รู้เลยค่ะว่ามีชมรมที่ศึกษาเกี่ยวกับนินจาด้วย!"
10000095-71 = "ถ้าได้ฝึกฝนวิชาที่นี่ ต่อไปอิซุนะคงได้เป็นนินจาที่เยี่ยมยอด!"
10000095-73 = "ดีล่ะ!"
10000095-76 = "ขอโทษนะคะ!"
10000095-79 = "จบแล้วเหรอ...?"
10000095-80 = "เทศกาลดอกซากุระบานสะพรั่ง!"

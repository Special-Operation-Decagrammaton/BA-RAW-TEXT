[translation]
83301100200-6 = "Head Prefect! Are you sure this is prudent?"
83301100200-7 = "What do you mean by prudent?"
83301100200-8 = "To accede to the demands of that idiot, even if the Pandemonium Society stands behind them...!"
83301100200-9 = "There's no reason for concern. We can hardly say that the chairman is completely in the wrong. "
83301100200-10 = "As I said... I also feel responsible for what's happened."
83301100200-11 = "And...to live up to Sensei's expectations..."
83301100200-12 = "Hm?"
83301100200-13 = "...No, it's nothing."
83301100200-14 = "Very well...if you say so."
83301100200-15 = "Regardless, we need to gather information. There's little merit in pursuing the Hot Springs Department without a plan in place."
83301100200-16 = "I doubt that the Hot Springs Department attempted to excavate the Pandemonium Society's Assembly Hall on a whim."
83301100200-17 = "Kinugawa Kasumi, the president of the Hot Springs Department, can certainly act on instinct..."
83301100200-18 = "But that apparent improvisation can mask a deeper cunning. I'm certain that there are reasons for her actions."
83301100200-19 = "There's a reason...other than just turning a parking lot into a hot spring?"
83301100200-23 = "Ah, come to think of it... We picked up a rumor circulating through the student body."
83301100200-24 = "A rumor?"
83301100200-25 = "Whispers that the Hot Springs Department had discovered Gehenna's true potential...and that we were on the cusp of a hot springs revolution."
83301100200-26 = "Something that will bring a permanent end to Gehenna's hot spring troubles. And on the basis of those rumors, hot springs entry tickets sold out in early access."
83301100200-27 = "Early...what?"
83301100200-28 = "I'm not sure what that means...but I think it's clear we need to investigate and discover more details."
83301100200-29 = "I understand now, Ako. Thank you."
83301100200-30 = "Of course! Please let me know if there's anything else you need—I'm here to assist you to the best of my abilities!"
83301100200-31 = "Before questioning any students I should investigate the site..."

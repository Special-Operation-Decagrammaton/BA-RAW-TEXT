[translation]
83301100200-6 = "ท่านประธาน...! จะไม่เป็นไรจริงๆ เหรอคะ?"
83301100200-7 = "ทำไมถามอย่างนั้นล่ะ? มีอะไรหรือเปล่า?"
83301100200-8 = "ถึงจะเป็นการขอร้องจากแพนเดโมเนียม โซไซตี้ก็เถอะ แต่ถ้าเราตอบรับคำขอร้องจากคนโง่เง่านั่น...!"
83301100200-9 = "เรื่องนั้นไม่เป็นไรหรอก สิ่งที่ประธานทางนั้นพูดก็ไม่ใช่เรื่องไม่สมเหตุสมผล "
83301100200-10 = "อย่างที่ฉันบอกไปเมื่อกี้... ว่าฉันก็รู้สึกว่าต้องรับผิดชอบต่อสิ่งที่เกิดขึ้นเมื่อกี้เหมือนกัน"
83301100200-11 = "แล้วก็... อย่างน้อยก็เพื่อตอบสนองต่อความคาดหวังของคุณครู..."
83301100200-12 = "......?"
83301100200-13 = "เปล่าหรอก... ไม่มีอะไร"
83301100200-14 = "อย่างนั้นเหรอคะ ถ้าจะพูดถึงขนาดนั้นก็เข้าใจแล้วค่ะ"
83301100200-15 = "แต่เราจะมัวตามตัวชมรมพัฒนาออนเซ็นโดยไม่มีแบบแผนอย่างนี้ไม่ได้ เราต้องการเบาะแสเพิ่มเติม"
83301100200-16 = "ที่ชมรมพัฒนาออนเซ็นเข้าไปขุดบ่อออนเซ็นอยู่หน้าหอประชุมของแพนเดโมเนียม โซไซตี้ อย่างปุบปับแบบนี้ คงไม่ได้แค่ทำไปตามอารมณ์เท่านั้นหรอก"
83301100200-17 = "ถึงแม้หัวหน้าชมรมพัฒนาออนเซ็น คินุกาวะ คาสุมิจะเป็นคนหุนหันพลันแล่นก็เถอะ"
83301100200-18 = "แต่เธอก็เป็นคนที่นึกถึงผลประโยชน์ไปพร้อมๆ กันด้วย แปลว่าเธอต้องมีเหตุผลอื่นในการกระทำนั้น"
83301100200-19 = "เหตุผลที่... พวกนั้นตัดสินใจไปพัฒนาออนเซ็นที่ลานจอดรถงั้นเหรอ"
83301100200-23 = "อ๊ะ จะว่าไปแล้ว... เมื่อไม่นานมานี้มีข่าวลือแบบนั้นในหมู่นักเรียนของเราค่ะ"
83301100200-24 = "ข่าวลือ?"
83301100200-25 = "ใช่ค่ะ เมื่อไม่นานมานี้ชมรมพัฒนาออนเซ็นออกมาบอกว่า... พวกเธอค้นพบความเป็นไปได้ที่ยิ่งใหญ่#nในเกเฮนน่า..."
83301100200-26 = "และถ้าสิ่งนั้นเสร็จสมบูรณ์ นักเรียนเกเฮนน่าก็ไม่ต้องกังวลเรื่องออนเซ็นกันอีกต่อไปอะไรทำนองนั้น แถมยังขายบัตรเข้าล่วงหน้าที่ใช้งานได้เมื่อมาถึงได้หลายใบเลยด้วยค่ะ"
83301100200-27 = "บัตรเออร์ลี... อะไรนะ?"
83301100200-28 = "ถึงฉันจะยังไม่เข้าใจว่านี่คืออะไร... แต่ถ้าเป็นเรื่องจริงละก็ คงต้องไปถามรายละเอียดจากพวกนักเรียน#nแล้วละ"
83301100200-29 = "ดีละ เข้าใจแล้วว่าต้องทำยังไงต่อ ขอบใจนะอาโกะ"
83301100200-30 = "ไม่เป็นไรเลยค่ะ! ถ้าต้องการอะไรอีกก็บอกฉันได้ตลอดนะคะ! ฉันก็จะช่วยอย่างสุดกำลังอีกแรงค่ะ!"
83301100200-31 = "การค้นหาความจริงจากนักเรียนก็อาจจะเป็นประโยชน์ แต่ก่อนอื่นเราไปดูที่หน้างานดีกว่า"

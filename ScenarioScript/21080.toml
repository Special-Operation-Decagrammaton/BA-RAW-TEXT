[translation]
21080-1 = "第8話;資格審查"
21080-2 = "千年．遊戲開發部"
21080-3 = "那麼，既然已經度過廢社的危機了，可以安心的玩遊戲了吧！"
21080-4 = "愛麗絲，今天就來打副本吧！準備好了嗎？"
21080-5 = "已掌握攻略方法，副本專用裝備也已經取得。#n公告【歡迎新手／「燃燒森林」遠征／4人／徵求補師和遠程輸出】的訊息。#n啊，【Perorochan32玩家加入了隊伍】。"
21080-6 = "會，會不會有點放心的太早了！？"
21080-7 = "有跟優香說了嗎？#n已經找齊4個社員，所以符合了社團資格的事。"
21080-8 = "當然囉。所以今天下午，優香會過來做愛麗絲的資格審查……#n啊，愛麗絲！那是吐息攻擊的預備動作！危險！"
21080-9 = "發現危險，施展護盾魔法！"
21080-10 = "現在現實比較危險吧！資格審查是什麼！？我還是第一次聽到有這回事！？"
21080-11 = "那個「資格審查」可是會關係到社團的存亡的……#n現在不是悠悠哉哉打副本的時候了吧！？"
21080-12 = "不用那麼擔心啦，有關愛麗絲的準備也已經很完美了呀。"
21080-13 = "咦？是嗎？"
21080-16 = "愛麗絲，自我介紹！"
21080-18 = "我的名字是Aris．The．Blue-eye，是名矮人族的槍騎士。#n使用的武器是銃槍「火龍之牙」，出身於鋼鐵山脈。#n小時候因為魔族的襲擊而失去了家人，只好孤身一人進入了燃燒的礦山……"
21080-19 = "不是遊戲裡的角色資訊，是愛麗絲你自己！"
21080-20 = "啊，明白了。"
21080-22 = "我的名字是愛麗絲，就讀千年科學學園一年級。#n因為最近才剛轉學過來，錯過了課程的申請時間，所以目前還沒有完成課程的登記，#n但是預計下個月開始就會正式參加課程。"
21080-23 = "雖然課程還沒辦法參加，但參加社團活動是可以的，因此便加入了遊戲開發部。"
21080-24 = "啊，看起來還挺像樣的。"
21080-25 = "在遊戲開發部的職位是坦克兼光屬性輸出……"
21080-26 = "不對不對，職位是軟體工程師！"
21080-27 = "對，是軟體工程師！打從出生的時候開始，比起母語我更先接觸的是Jaba……"
21080-28 = "嗚嗚，真的沒問題嗎……！？"
21080-29 = "……不可能啊。"
21080-31 = "遊戲開發部竟然會有新的社員，這怎麼可能……！"
21080-32 = "很可惜，但這就是事實！"
21080-33 = "優香……"
21080-36 = "……？"
21080-37 = "你就是傳言中的愛麗絲醬呢。加入了遊戲開發部的第四名成員。"
21080-38 = "哼～如果是千年的學生的話我應該基本上都有印象才對呀……"
21080-39 = "我竟然會不知道這麼可愛的孩子，有點無法置信呢。"
21080-40 = "（驚嚇）"
21080-41 = "……？？？"
21080-42 = "妖，"
21080-43 = "妖怪出現了……！"
21080-44 = "剛，剛才這孩子，把我叫做「妖怪」了對吧！？"
21080-45 = "你，你誤會了！#n應該是把「妖精」給聽錯了吧，真是的，愛麗絲是不會隨便亂說話的啦～"
21080-46 = "可惡……雖然說我已經習慣當壞人了，還真沒想到會被初次見面的孩子當成妖怪。"
21080-47 = "膽子真不小啊……！"
21080-48 = "冷，冷靜一點！學生會的工作不能參雜私人感情的對吧！？"
21080-50 = "總之，已經達到社團的規定人數了！#n這麼一來遊戲開發部就可以繼續存活，OK吧？"
21080-51 = "繼續存活……"
21080-52 = "確實是這樣呢……如果這孩子真的是自願加入的社員的話。"
21080-53 = "（驚嚇）"
21080-54 = "本來只要申報社員加入就可以了，但是……"
21080-55 = "最近社團的營運規則稍微有點改變，需要進行稍微嚴格一點的確認。"
21080-56 = "所以說，要對愛麗絲醬進行簡單的審問……啊，不小心用錯詞彙了……"
21080-57 = "那麼，我就簡單問幾個問題。"
21080-59 = "我怎麼覺得是不小心說出真心話了……"
21080-62 = "不會花很多時間的。"
21080-63 = "（發抖）"
21080-64 = "有，有可能因為選錯選項導致進入BadEnd嗎？"
21080-65 = "BadEnd……嘛，說不定有這種可能呢。#n那麼……愛麗絲醬。"
21080-68 = "提問要開始囉。"
21080-70 = "下一話;優香的質問"

[translation]
21080-1 = "ตอนที่ 8;ตรวจสอบคุณสมบัติ"
21080-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21080-3 = "วะฮ่ะฮ่า! จบวิกฤตยุบชมรมแล้ว~ จากนี้ก็เล่นเกมอย่างสบายใจได้แล้วใช่ไหม?"
21080-4 = "อาริสึ! วันนี้จะลงบอสไหม!? พร้อมแล้วรึยัง?"
21080-5 = "ฝึกการโจมตีอย่างชำนาญ ได้อุปกรณ์สำหรับลงบอสแล้ว#n[ยินดีต้อนรับมือใหม่/ คณะป่าเพลิง/ 4 ผู้เล่น/ หาฮีลเลอร์และอาร์เชอร์ ]#nอ่านประกาศ อ๊ะ [คุณ Perorochan32 มาเข้าร่วม]"
21080-6 = "ไม่ชิลมากไปหน่อยเหรอน่ะ?!"
21080-7 = "ตอนนี้เรามีสมาชิก 4 คนแล้ว พี่บอกยูกะไปแล้วใช่ไหมว่าเราทำตามเงื่อนไขแล้ว?"
21080-8 = "อื้ม บอกไปแล้วล่ะ เห็นว่าบ่ายนี้จะมาตรวจสอบคุณสมบัติของอาริสึด้วย... อาริสึ! บอสเตรียมโจมตีแล้ว!#nต้องหลบให้ได้นะ! มันอันตราย!"
21080-9 = "อันตราย! แผ่วงเวทป้องกัน!"
21080-10 = "ทางนี้ก็วิกฤตนะ! จะมาตรวจสอบคุณสมบัติงั้นเหรอ?! ไม่เคยได้ยินอะไรแบบนี้มาก่อนเลย!"
21080-11 = "ชมรมของเราขึ้นอยู่กับการตรวจสอบคุณสมบัตินี้นะ นี่มันใช่เวลามาเล่นเกมเหรอ?!"
21080-12 = "อย่าห่วงไปเลยน่า อาริสึเตรียมตัวไว้ดีแล้ว"
21080-13 = "หืม?"
21080-16 = "อาริสึ! แนะนำตัว!"
21080-18 = "ฉันชื่ออาริสึ เดอะบลูอาย เป็นอัศวินหอกของตระกูลคนแคระ อาวุธที่ใช้คือ <เขี้ยวมังกรไฟ>#nเกิดที่เทือกเขาเหล็ก ตอนเด็กถูกเผ่าปีศาจจู่โจมจนเสียครอบครัวและต้องหนีเข้าเหมืองที่ลุกโชน..."
21080-19 = "ไม่ใช่สิ! ไม่ได้ให้แนะนำอวาตาร์ในเกม! ให้แนะนำตัวเธอเองต่างหากอาริสึ!"
21080-20 = "ขะ.. เข้าใจแล้วค่ะ"
21080-22 = "ฉันชื่ออาริสึ ชั้นปีที่ 1 โรงเรียนมิลเลเนียม เพิ่งย้ายโรงเรียนมา และยังลงทะเบียนเรียนไม่ทัน#nคิดว่าจะเริ่มเข้าเรียนในเดือนหน้าเป็นต้นไปค่ะ"
21080-23 = "แม้จะยังไม่เข้าชั้นเรียน แต่มีคนบอกว่าฉันทำกิจกรรมนอกหลักสูตรได้ ก็เลยมาเข้าชมรมพัฒนาเกมค่ะ"
21080-24 = "โอ้ ใช้ได้เลยนะนั่น"
21080-25 = "ตำแหน่งที่รับผิดชอบในชมรมพัฒนาเกมคือ เป็นแท็งก์และโจมตีธาตุแสง..."
21080-26 = "ไม่ช่ายย! ตำแหน่งที่รับผิดชอบคือโปรแกรมเมอร์ต่างหาก!"
21080-27 = "ปะ.. โปรแกรมเมอร์ค่ะ! ฉันใช้ภาษา JABA มาตั้งแต่เกิด ก็เลยพูดไม่ค่อยคล่อง..."
21080-28 = "เฮ้อ...! มีหวังโดนยุบชมรมแน่เลย...!"
21080-29 = "เป็นไปไม่ได้..."
21080-31 = "มีนักเรียนมาเข้าชมรมพัฒนาเกมงั้นเหรอ? ไม่มีทาง...!"
21080-32 = "ต้องขอโทษด้วยนะ แต่เป็นเรื่องจริง!"
21080-33 = "ยูกะ..."
21080-36 = "......?"
21080-37 = "เธอคงเป็นอาริสึ สมาชิกคนที่ 4 ที่เป็นที่สนใจของชมรมพัฒนาเกมสินะ"
21080-38 = "อืม... ฉันนึกว่าฉันจะรู้จักนักเรียนทุกคนในโรงเรียนมิลเลเนียมแล้วซะอีก..."
21080-39 = "แทบไม่อยากเชื่อเลยว่าฉันจะไม่รู้จักเด็กที่น่ารักแบบนี้"
21080-40 = "(สะดุ้ง)"
21080-41 = "......???"
21080-42 = "อ่า..."
21080-43 = "นาง ยักษ์ ปรา กฎ ตัว..."
21080-44 = "?! นะ... นี่เธอเรียกฉันว่านางยักษ์งั้นเหรอ?"
21080-45 = "ขะ... เข้าใจผิดแล้ว ฟังผิดหรือเปล่า? อาริสึพูดว่านางฟ้าต่างหากล่ะ อาริสึไม่พูดโกหกหรอกนะ"
21080-46 = "อึ่ก... ถึงฉันจะชินกับการเล่นบทร้าย แต่ก็ไม่เคยโดนเด็กที่เพิ่งเจอกันครั้งแรกปฏิบัติตัวด้วยแบบนี้..."
21080-47 = "ยอม ให้ ไม่ ได้ ...!"
21080-48 = "จะ.. ใจเย็นๆ ก่อน อย่าเอาความรู้สึกส่วนตัวมาเกี่ยวข้องสิ!"
21080-50 = "เอาเถอะ ยังไงเราก็มีสมาชิกเพิ่มแล้ว! ทีนี้ก็ไม่ต้องยุบชมรมพัฒนาเกมแล้วใช่ไหม?"
21080-51 = "ไม่ต้องยุบงั้นเหรอ...?"
21080-52 = "ก็เป็นไปได้นะ หากเด็กคนนี้เข้าชมรมนี้ด้วยเจตนาของตัวเองจริงๆ"
21080-53 = "(สะดุ้ง)"
21080-54 = "เดิมทีแค่แจ้งว่าได้สมาชิกใหม่ ก็จะคงชมรมไว้ได้..."
21080-55 = "แต่เมื่อไม่นานมานี้มีการเปลี่ยนกฎในการบริหารชมรมใหม่ ก็เลยต้องตรวจสอบให้เข้มงวดมากขึ้น"
21080-56 = "เพราะฉะนั้นฉันต้องทำการสอบสวนง่ายๆ กับอาริสึ... อ่า ไม่อยากจะพูดแบบนี้เลย..."
21080-57 = "ฉันจะถามอะไรง่ายๆ ก็แล้วกัน"
21080-59 = "ไหนว่าไม่อยากจะพูดล่ะ ดูเหมือนมีเรื่องพูดเยอะเลยนะ..."
21080-62 = "ฉันไม่ใช้เวลานานขนาดนั้นหรอกน่า"
21080-63 = "(กลืนน้ำลาย)"
21080-64 = "คะ... คำตอบของฉันมีผลกับการอยู่ต่อของชมรมใช่ไหมคะ?"
21080-65 = "ก็อาจจะมีนะ... เอาล่ะ อาริสึ!"
21080-68 = "เริ่มการสอบสวนได้"
21080-70 = "ตอนต่อไป;คำถามของยูกะ"

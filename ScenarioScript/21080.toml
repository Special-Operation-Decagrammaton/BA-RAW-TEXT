21080-18 = "5;아리스N;00;제 이름은, 아리스 더 블루아이. 드워프 창기사. 사용 무기는 건랜스 <화룡의 송곳니>, 출신지는 강철 산맥, 하지만 어린 시절 마족의 습격에 가족을 잃고 불타는 광산에 들어가……\n#5;em;[재잘]"

[translation]
21080-1 = "第8話;資格審査"
21080-2 = "ミレニアム・ゲーム開発部"
21080-3 = "さてっ、もう廃部の危機は免れたんだし、安心してゲーム三昧できるね！"
21080-4 = "じゃあアリス、今日はレイドに行こう！準備できてる？"
21080-5 = "攻略法は把握しました。レイド専用装備も獲得済。【初心者歓迎/「燃える森」へ遠征/4人/ヒーラー、遠距離アタッカー募集】で告知。あっ、【Perorochan32さんが合流しました】。"
21080-6 = "ちょ、ちょっと気を緩めるには早くない！？"
21080-7 = "ユウカにはもう言ったの？部員が4人になったから、部の資格要件を備えたって。"
21080-8 = "もっちろん。それで今日の午後に、アリスの資格審査に来るって……あっ、アリス！それブレス攻撃の予備動作！危ない！"
21080-9 = "危険を察知、バリアの魔法を展開します！"
21080-10 = "今は現実の方が危険だよ！資格審査って何！？そんなの初めて聞いたんだけど！？"
21080-11 = "その「資格審査」に、私たちの部の存続がかかってるのに……呑気にレイドバトルしてる場合じゃないでしょ！？"
21080-12 = "心配し過ぎだって、アリスの準備についてはもう完璧なんだし。"
21080-13 = "え、そうなの？"
21080-16 = "アリス、自己紹介を！"
21080-18 = "私の名前はアリス・ザ・ブルーアイ、ドワーフ族の槍騎士。使用武器はガンランス「火竜の牙」、出身地は鋼鉄山脈。幼い頃、魔族の襲撃により家族を失って、燃え上がる鉱山の中へと単身入り込み……"
21080-19 = "いやゲーム内アバターのプロフィールじゃなくて、アリス自身の！"
21080-20 = "あ、理解しました。"
21080-22 = "私の名前はアリス、ミレニアムサイエンススクールの1年生。最近転校してきたばかりで受講申請のタイミングを逃してしまったため、まだ授業の登録ができていない状態なのですが、来月から正式に授業へ参加する予定です。"
21080-23 = "授業にはまだ参加できなくても、部活動への参加は可能とのことでしたので、ゲーム開発部に入部しました。"
21080-24 = "あ、結構それっぽい。"
21080-25 = "ゲーム開発部で担ってる役割は、タンク兼光属性アタッカー……"
21080-26 = "違う違う、役割はプログラマー！"
21080-27 = "ぷ、プログラマーです！生まれた時から、母国語よりも先にJabaを使っていまして……"
21080-28 = "ううっ、本当に大丈夫かな……！？"
21080-29 = "……あり得ないわ。"
21080-31 = "ゲーム開発部に新入部員が入ったなんて、あり得ない……！"
21080-32 = "残念だけど、事実だよ！"
21080-33 = "ユウカ……"
21080-36 = "……？"
21080-37 = "あなたが噂のアリスちゃんね。ゲーム開発部に入った、4人目のメンバー。"
21080-38 = "ふーん、ミレニアムの生徒ならほぼ全員把握してると思ってたけど……"
21080-39 = "私がこんなに可愛い子のことを知らなかったなんて、ちょっと信じられないわね。"
21080-40 = "（ビクッ）"
21080-41 = "……？？？"
21080-42 = "よ、"
21080-43 = "妖怪が出現しました……！"
21080-44 = "い、今この子、私のことを「妖怪」って言ったわよね！？"
21080-45 = "か、勘違いだよ！「妖精」って言ったのを聞き間違えたんでしょ、もう、アリスは嘘がつけないんだからー。"
21080-46 = "くっ……悪役には慣れてるとは言え、まさか初めて会う子に妖怪扱いされるだなんて。"
21080-47 = "良い度胸してるじゃない……！"
21080-48 = "お、落ち着いて！生徒会が個人的な感情を挟んじゃダメでしょ！？"
21080-50 = "とにかく、部の規定人数は満たしたよ！これでゲーム開発部は存続ってことでOKだよね？"
21080-51 = "存続……。"
21080-52 = "確かにそうね……この子が本当に、自分の意志でここに来た部員だったら、の話だけど。"
21080-53 = "（ドキッ）"
21080-54 = "本来は部員の加入を申告すれば、それだけで良かったのだけれど……。"
21080-55 = "最近は部活の運営規則も少し変わって、もう少し厳しく確認する必要が出てきたの。"
21080-56 = "だから、アリスちゃんに簡単な取り調べ……あら、思ってもない言葉が……。"
21080-57 = "じゃあ、いくつか簡単な質問をするわね。"
21080-59 = "思いっきり本音が出てた気がする……。"
21080-62 = "そんなに時間はかからないわ。"
21080-63 = "（ゴクッ）"
21080-64 = "せ、選択肢によっては、バッドエンドになることもありますか？"
21080-65 = "バッドエンド……まあ、そういうこともあるかもね。それじゃあ……アリスちゃん。"
21080-68 = "質問を、始めるわ。"
21080-70 = "次回;ユウカの質問"

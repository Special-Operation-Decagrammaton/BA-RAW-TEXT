[translation]
21080-1 = "Episode 8;Eligibility Screening"
21080-2 = "Millennium Game Development Department"
21080-3 = "Haha! Now that all the hard stuff is out of the way, we can kick back and play games, right?"
21080-4 = "We've got a raid today. Are you ready, Aris?"
21080-5 = "I understand the strategy. Our gear is ready, and I posted the announcement \"Beginners welcome - 4 man Burning Forest Expedition - Healers/DPS needed.\" Ah. Peroro32 joined."
21080-6 = "Can we really afford to take it easy?"
21080-7 = "Did you talk to Yuuka and tell her we have four members now?"
21080-8 = "'Course I did. She said she'll come this afternoon to screen Aris' eligibility... Oh! Aris! The boss is about to do its AOE breath attack! Careful or we'll get wiped!"
21080-9 = "Evasive maneuvers! Casting protection magic."
21080-10 = "We're in danger in real life too! Screening her eligibility?! What does that even mean?"
21080-11 = "The survival of our club is on the line, and you're raiding in an MMO!"
21080-12 = "Chillax, Midori. Aris is totally ready."
21080-13 = "Huh?"
21080-16 = "Aris! Do your introduction!"
21080-18 = "I am known as Aris the Blue Eyes. A dwarven lancer wielding the Flame Dragon Fang gunlance. I hail from the Steel Mountains, but lost my family at an early age to a demon attack—"
21080-19 = "No, not your game character! I mean you, yourself, Aris!"
21080-20 = "Oh, understood."
21080-22 = "Hello. My name is Aris. I am a first-year here at the Millennium School. I recently transferred, but missed registration, so I will not be starting my classes until next month."
21080-23 = "Even though I am not in any classes yet, I was told I could still join a club, so I ended up joining the Game Development Department."
21080-24 = "Oooh. That was actually pretty good."
21080-25 = "My role in the Game Development Department is to tank and deal light-type melee damage..."
21080-26 = "You're a programmer!"
21080-27 = "R-Right! Programming... I learned to code in JABA before I ever spoke my first word..."
21080-28 = "Are we going to make it through this...?"
21080-29 = "...There's no way this is true."
21080-31 = "There's no way someone would join the Game Development Department now!"
21080-32 = "Sorry, but you're wrong!"
21080-33 = "Yuuka..."
21080-36 = "...?"
21080-37 = "So, you must be the \"Aris\" everyone is talking about. The supposed fourth member of the Game Development Department."
21080-38 = "Hmm. I thought I knew every single Millennium School student..."
21080-39 = "How could I have missed such a cute girl...?"
21080-40 = "(Ack!)"
21080-41 = "Huh?"
21080-42 = "Oh."
21080-43 = "It is here, the specter...."
21080-44 = "Wh-Who are you calling a specter?!"
21080-45 = "It's, uh, a misunderstanding! Aris is a little scatterbrained so she didn't finish her word. She must have been trying to say the \"spectacular\" something!"
21080-46 = "Ugh... I don't take kindly to strangers speaking to me this way."
21080-47 = "You have a sharp tongue, newcomer."
21080-48 = "C-Calm down! It wasn't personal!"
21080-50 = "All that confusion aside, we got the number of members we needed! Can we keep the Game Development Department now?"
21080-51 = "What you say is true..."
21080-52 = "...assuming your new member joined of her own free will."
21080-53 = "(Ack!)"
21080-54 = "In the past, there were times clubs got by on just notifying us that they had found some new members."
21080-55 = "Recently, however, the rules have become more strict."
21080-56 = "So, as per the new rules, I've got an interrogation waiting for Aris... Wait, I didn't mean to say it like that."
21080-57 = "Anyway, I've just got a few simple questions for her."
21080-59 = "You TOTALLY meant to say it that way..."
21080-62 = "Don't worry. This won't take long."
21080-63 = "*gulp*"
21080-64 = "I-Is it possible to achieve a bad ending depending on the answers I choose?"
21080-65 = "Well...I suppose anything's possible. Okay, then. Aris."
21080-68 = "Let the games begin."
21080-70 = "Next Episode;Yuuka's Questions"

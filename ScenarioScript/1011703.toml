[translation]
1011703-1 = "Girl on the Street"
1011703-2 = "（路過街上的時候……）"
1011703-6 = "[ns]「那是……」"
1011703-11 = "[ns]「光，你在做什麼？」"
1011703-13 = "啊～老師～"
1011703-14 = "過來這邊～快點～"
1011703-16 = "（走到了光的身邊）"
1011703-18 = "這邊～有看到嗎～？"
1011703-22 = "[ns]「這是……」"
1011703-24 = "（黑螞蟻和紅螞蟻正在混戰中）"
1011703-26 = "[ns]「是螞蟻大戰爭……！」"
1011703-27 = "嗯～螞蟻大混戰～奇普托斯最後的諸神黃昏～"
1011703-28 = "[s]「原來你在看這個啊。」"
1011703-29 = "嗯嗯～這是光的興趣～"
1011703-30 = "我可以看一整天～"
1011703-31 = "老師～你覺得哪邊會贏呢～？"
1011703-32 = "[s1]「莫名讓我想起了從前……」\n[s2]「究竟會是哪邊呢……」"
1011703-38 = "黑色～體型大～"
1011703-39 = "紅色～數量多～"
1011703-40 = "[ns3]「黑色！」\n[ns4]「紅色！」"
1011703-43 = "嗯～那光選另一邊～"
1011703-44 = "啊～黑色方的將軍登場了～"
1011703-45 = "好大哦～紅色這邊危險了～"
1011703-46 = "[s]「不過紅色方的好幾隻一起撲了上去……！」"
1011703-47 = "好精彩～"
1011703-49 = "（就這樣和光一起專心看了很久的螞蟻，甚至忘記了時間的流逝……）"
1011703-51 = "啊～紅色方的砲兵部隊出動了～"
1011703-52 = "全彈發射～"
1011703-53 = "[s5]「螞蟻正在發射蟻酸。」\n[s6]「光，稍微後退一點吧。這樣有點危險……」"
1011703-56 = "啊呀～"
1011703-57 = "嗚啊～光中彈了～"
1011703-58 = "[s]「糟糕！快跟我來這邊……！」"
1011703-60 = "（匆忙帶光到附近的水龍頭用水清洗）"
1011703-62 = "嗚嗚～光受到了致命傷……"
1011703-63 = "[s7]「幸好只是稍微噴到，應該沒什麼大礙。」\n[s8]「很痛嗎？」"
1011703-66 = "是每秒5億點的傷害……"
1011703-67 = "必須報仇～現在的光是復仇者～"
1011703-68 = "[s9]「光是乖孩子，要忍耐一下……！」\n[s10]「老師買好吃的給你……！」"
1011703-71 = "嗚嗚……好吃的……"
1011703-72 = "可是還是要報仇～不然光會被螞蟻小看……"
1011703-76 = "唔嗯～"
1011703-77 = "要好吃到～能補充光流掉的血哦～"
1011703-78 = "[s]「根本沒有流血好嗎……」"
1011703-80 = "（完成簡單的應急措施後，帶光去吃了好吃的東西）"

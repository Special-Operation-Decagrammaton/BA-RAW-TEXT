[translation]
1011703-1 = "Girl on the Street"
1011703-2 = "I was walking down the street when..."
1011703-6 = "[ns] \"(Isn't that...?)\""
1011703-11 = "[ns] \"Hey, Hikari, what are you up to?\""
1011703-13 = "Ah. Sensei."
1011703-14 = "Hurry up. C'mere."
1011703-16 = "I went up next to Hikari."
1011703-18 = "There. See-see?"
1011703-22 = "[ns] \"Oh, it looks like...\""
1011703-24 = "Black ants and red ants scurried around, engaged in a fierce battle."
1011703-26 = "[ns] \"An ant war...!\""
1011703-27 = "Yup. Kivotos' Final Ragnarok. You can't spell \"Titans\" without \"Ants.\""
1011703-28 = "[s] \"This is what you wanted me to see?\""
1011703-29 = "Yuppies. Hikari loves watching ant fights."
1011703-30 = "All day, every day, it's ant fight o'clock!"
1011703-31 = "Hey. Hey, Sensei. Who do you think's gonna win?"
1011703-32 = "[s1] \"(Reminds me of when I was a kid...)\"\n[s2] \"Well, what do we know about them?\""
1011703-38 = "The black ants have the muscles."
1011703-39 = "But the red ones have the numbers."
1011703-40 = "[ns3] \"I'll say black!\"\n[ns4] \"I'll say red!\""
1011703-43 = "Cool. Hikari will pick the other ones."
1011703-44 = "Ooh, the black team's general!"
1011703-45 = "So big. Red's on the ropes here."
1011703-46 = "[s] \"Uh-oh, here come the red reinforcements!\""
1011703-47 = "So epic..."
1011703-49 = "As I got wrapped up in watching ants with Hikari..."
1011703-51 = "Hoo boy. Team Red's bringing up their artillery."
1011703-52 = "Full salvo!"
1011703-53 = "[s5] \"Ooh, they're shooting acid.\"\n[s6] \"This could be dangerous. Let's move back.\""
1011703-56 = "Ow."
1011703-57 = "Eek! Innocent casualty over here!"
1011703-58 = "[s] \"Yikes! Here, this way...!\""
1011703-60 = "I rushed Hikari to nearby faucet and rinsed the acid off with water."
1011703-62 = "Acid damage...critical..."
1011703-63 = "[s7] \"It was just a drop. You'll be okay.\"\n[s8] \"Does it hurt a lot?\""
1011703-66 = "500 million DPS..."
1011703-67 = "Must avenge self..."
1011703-68 = "[s9] \"Be merciful, Hikari. Let's let it slide.\"\n[s10] \"How about if I buy you something yummy?\""
1011703-71 = "Ooh... Something yummy..."
1011703-72 = "Hikari does wanna teach those ants a lesson, though, or they're gonna look down on her..."
1011703-76 = "Mmm."
1011703-77 = "All right. You can replace Hikari's lost blood with yum-yums."
1011703-78 = "[s] \"You didn't lose any blood, though...\""
1011703-80 = "After we finished with her first aid, we went off and enjoyed some delicious food."

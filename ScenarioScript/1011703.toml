[translation]
1011703-1 = "Girl on the Street"
1011703-2 = "(ขณะที่กำลังเดินไปตามถนน...)"
1011703-6 = "[ns] \"คนนั้นคือ...\""
1011703-11 = "[ns] \"ฮิคาริ มาทำอะไรอยู่เหรอ?\""
1011703-13 = "อ๊ะ คุณครู"
1011703-14 = "มานี่สิ เร็วเข้า"
1011703-16 = "(คุณครูเข้าไปข้างๆ ฮิคาริ)"
1011703-18 = "เห็นนี่มั้ย?"
1011703-22 = "[ns] \"นี่มัน...\""
1011703-24 = "(มดดำและมดแดงกำลังต่อสู้กันพัลวัน)"
1011703-26 = "[ns] \"สงครามมด...!\""
1011703-27 = "อื้อ ศึกแห่งมด แร็กนาร็อกครั้งสุดท้ายในคิโวทอส"
1011703-28 = "[s] \"มานั่งดูมดอยู่สินะ\""
1011703-29 = "อื้อๆ งานอดิเรกของฮิคาริน่ะ"
1011703-30 = "ให้ดูทั้งวัน ยัง ได้ เลย"
1011703-31 = "คุณครูคิดว่ามดฝ่ายไหนจะชนะเหรอ?"
1011703-32 = "[s1] \"คิดถึงสมัยเด็กเลยนะเนี่ย...\"\n[s2] \"ฝ่ายไหนจะชนะกันนะ...\""
1011703-38 = "มดดำ ตัวใหญ่"
1011703-39 = "ส่วนมดแดง มีเยอะกว่า"
1011703-40 = "[ns3] \"มดดำ!\"\n[ns4] \"มดแดง!\""
1011703-43 = "อื้อ งั้นฮิคาริจะเชียร์ฝ่ายตรงข้าม"
1011703-44 = "อ๊ะ นายพลมดดำออกมาแล้ว"
1011703-45 = "ตัวเบ้อเริ่มเลย มดแดงอาจแพ้ได้เลยนะ"
1011703-46 = "[s] \"แต่มดแดงก็เข้าไปรุมหลายตัวเลยนะ...!\""
1011703-47 = "เร้า ใจ จัง"
1011703-49 = "(คุณครูนั่งดูมดสู้กันกับฮิคาริจนแทบลืมเวลา และในระหว่างนั้นเอง...)"
1011703-51 = "อ๊ะ กองทหารปืนใหญ่มดแดงออกโรงแล้ว"
1011703-52 = "รัวปืนใหญ่เลย"
1011703-53 = "[s5] \"ปล่อยกรดมดกันอยู่สินะ\"\n[s6] \"ฮิคาริ อันตราย ถอยออกมาหน่อย...\""
1011703-56 = "อ๊ายย!"
1011703-57 = "แง ฮิคาริโดนโจมตี"
1011703-58 = "[s] \"ไม่นะ! มาทางนี้เร็ว...!\""
1011703-60 = "(คุณครูรีบพาฮิคาริไปที่ก๊อกน้ำใกล้ๆ แล้วเอาน้ำล้างหน้า)"
1011703-62 = "ฮือ ฮิคาริได้แผลร้ายแรงเลย..."
1011703-63 = "[s7] \"ยังดีที่กระเซ็นใส่แค่นิดเดียว ไม่น่าเป็นอะไรมากหรอก\"\n[s8] \"แสบมากหรือเปล่า?\""
1011703-66 = "ดาเมจ 500 ล้านต่อวินาที..."
1011703-67 = "ฮิคาริจะแก้แค้น ตอนนี้ฮิคาริเป็นอเวนเจอร์"
1011703-68 = "[s9] \"ฮิคาริเด็กดี ทนไว้ก่อนนะ เดี๋ยวครูซื้อขนมให้...!\"\n[s10] \"ฮิคาริ ไปกินขนมอร่อยๆ แทนการแก้แค้นดีกว่า...!\""
1011703-71 = "ฮือ... ขนม... อร่อยๆ"
1011703-72 = "แต่ฮิคาริจะแก้แค้นให้ได้เลย พวกมดจะได้ไม่ดูถูกฮิคาริ..."
1011703-76 = "อืม"
1011703-77 = "งั้นซื้อของอร่อยๆ ให้หน่อย เอาให้คุ้มกับเลือดที่ฮิคาริเสียไปนะ"
1011703-78 = "[s] \"ไม่เห็นจะเลือดออกสักหน่อย...\""
1011703-80 = "(หลังจากปฐมพยาบาลเสร็จแล้ว คุณครูก็ไปกินของอร่อยๆ กับฮิคาริ)"

[translation]
1006505-1 = "佳穗同學的完美伴遊"
1006505-2 = "百鬼夜行．第23商店街"
1006505-5 = "啊，老師。我在這裡。"
1006505-6 = "[s]「佳穗，謝謝你又找我出來。」"
1006505-8 = "[ns1]「上次因為太忙，沒能四處逛逛……」\n[ns2]「我很期待今天的伴遊，請多指教囉。」"
1006505-14 = "……！！"
1006505-15 = "是，我也請您多多指教。"
1006505-16 = "即使您沒這麼說，我也會把上次的錯誤當做前車之鑑，更加努力……"
1006505-17 = "看來我似乎還是太天真了。"
1006505-18 = "[s]「不用太緊張哦……？」"
1006505-19 = "老師，請交給我吧。"
1006505-20 = "我，桑上佳穗，向老師承諾……"
1006505-21 = "今天將會帶給您無懈可擊的完美伴遊。"
1006505-26 = "來，我們走吧！"
1006505-27 = "[s]「我沒有要讓你有那種壓力的意思……等，等等！」"
1006505-33 = "（於是佳穗的伴遊就這樣開始了……）"
1006505-34 = "（似乎打算先去逛一些觀光名勝）"
1006505-36 = "（佳穗最先介紹的是……）"
1006505-37 = "我曾經煩惱過，要向您介紹百鬼夜行時，應該先讓您看什麼比較適合……"
1006505-38 = "果然還是「作為觀光勝地的魅力」吧。"
1006505-42 = "尤其是從這個瞭望台俯瞰的景色……"
1006505-43 = "能夠將神木和街道盡收眼底，可說是百鬼夜行的驕傲。"
1006505-44 = "……老師了解百鬼夜行的神木嗎？"
1006505-45 = "[s3]「知道唷，畢竟很有名。」\n[s4]「也就聽過名字吧……」"
1006505-46 = "呵呵，真不愧是您！"
1006505-47 = "居然有名到連夏萊的[USERNAME]老師都知道……"
1006505-48 = "身為百鬼夜行的學生真是感到無比自豪。"
1006505-49 = "如同盛開的櫻花以其美麗聞名一般，是我們百鬼夜行聯合學園象徵性的存在。"
1006505-50 = "每到春天，配合神木綻放的時間，還會舉辦知名慶典「百夜之春櫻花祭」。"
1006505-51 = "如果有機會的話，還請老師務必來和我們一起享受慶典……"
1006505-52 = "啊，我想您應該也知道……還有其他與神木相關的故事……"
1006505-58 = "原來如此，我知道了。"
1006505-62 = "那麼我簡單為您說明。"
1006505-63 = "百鬼夜行的神木，是在很久很久以前……"
1006505-64 = "傳說在百鬼夜行聯合學園以聯盟的型態成立之前便已落地生根，#n是非常有歷史的櫻花樹。"
1006505-65 = "據傳說所述，那棵櫻花樹上沉睡著守護神──"
1006505-72 = "（就在傾聽眼神閃閃發亮的佳穗，充滿熱情地述說著觀光景點的傳說時……）"
1006505-76 = "啊……老師您餓了嗎？"
1006505-77 = "[s]「抱歉，因為走了不少路……」"
1006505-78 = "那正好。"
1006505-82 = "請您品嚐百鬼夜行學園引以為傲的特產「狸貓御好燒」吧！"
1006505-83 = "是百鬼夜行最推薦的料理！"
1006505-86 = "（參觀完觀光景點後，吃著百鬼夜行的名產）"
1006505-93 = "（比平時更充滿活力的佳穗的伴遊依舊持續）"
1006505-95 = "（之後也享受著與佳穗的百鬼夜行旅遊，讓人簡直忘記了時間的流逝……）"
1006505-98 = "那麼，接下來要介紹的地方是……"
1006505-104 = "[ns]「那裡聚集了很多人呢。發生什麼事了嗎？」"
1006505-105 = "那是……"
1006505-110 = "聽說那個「蘑菇與竹筍」馬上就要在這裡表演即興歌舞伎了！"
1006505-111 = "咦？那個每部影片都能輕鬆破百萬觀看的頻道！？"
1006505-112 = "在哪裡在哪裡？好想看！"
1006505-116 = "……蘑菇……與竹筍！！"
1006505-117 = "[s]「佳穗，怎麼了嗎……？」"
1006505-121 = "沒，沒什麼……"
1006505-125 = "來，我……我們去下一個地方吧……！"
1006505-129 = "（在這之後，佳穗似乎有點心不在焉）"
1006505-132 = "什麼！柴犬汪藏導演推出新任俠電影！？"
1006505-136 = "快報！聽說在東部地區競爭勢力的妖怪劇團，展開了路上俳句對決！"
1006505-137 = "俳句對決……！"
1006505-139 = "各位，冷靜聽我說！#n販售百鬼夜行周邊的限定快閃店……！"
1006505-140 = "限定，快閃店……！"
1006505-141 = "[s]「……佳穗？」"
1006505-145 = "沒……沒什麼！什麼都沒有！"
1006505-146 = "在陪老師伴遊的時候分心什麼的……"
1006505-147 = "那種隨便的心態……"
1006505-148 = "而且啊，好像還會上架公主的特別限定周邊哦！？"
1006505-151 = "！！！"
1006505-152 = "這次錯過的話，很可能未來半年內都買不到是真的嗎！？"
1006505-153 = "……！？"
1006505-160 = "[ns]「佳，佳穗！？你沒事吧！？」"
1006505-163 = "（讓突然倒下的佳穗稍微休息了一會……）"
1006505-167 = "[ns]「還好嗎？身體怎麼樣？」"
1006505-168 = "哈啊……對……不起，老師。"
1006505-169 = "被誘惑擾亂了心情，露出這種醜態……"
1006505-170 = "明明誇下海口要與老師伴遊……"
1006505-171 = "就算是現在才看得到的表演……再也買不到的周邊……"
1006505-172 = "甚至是，公主的周邊……公，公主……"
1006505-173 = "嗚……也必須放棄……！"
1006505-174 = "[s]「沒，沒必要這麼勉強自己……」"
1006505-175 = "明明身為陰陽部的副部長，卻總是讓老師看見羞愧的一面……#n我該如何是好……"
1006505-176 = "事到如今……我桑上佳穗能向老師賠罪的方法……"
1006505-177 = "果然……只能成為夏萊的專屬值日生……！"
1006505-178 = "[s]「不不不你先冷靜！情況正好相反！」"
1006505-179 = "……相反？怎麼說呢？"
1006505-180 = "[s5]「你會有反應的……」\n[s6]「都是佳穗喜歡的東西對吧？」"
1006505-183 = "那個……是的。"
1006505-184 = "那全都是百鬼夜行值得驕傲的文化……該這麼說嗎。"
1006505-185 = "每一樣我都非常喜歡。#n雖然這麼說，也不能在和老師伴遊的時候分心……"
1006505-186 = "[s]「既然如此，我更希望你可以幫我介紹。」"
1006505-190 = "……您想了解我喜歡的東西？"
1006505-191 = "百鬼夜行一般的觀光景點和美食雖然也很好，#n不過更想認識我個人的、更特別的事物……是嗎？"
1006505-192 = "[s7]「嗯，如果是非常重視百鬼夜行的佳穗喜歡的東西……」\n[s8]「我覺得那或許就是深入了解百鬼夜行的捷徑。」"
1006505-195 = "老師……"
1006505-196 = "……也許，您說的沒錯呢。"
1006505-197 = "連同我所深愛的百鬼夜行在內，您也想更深入的了解……"
1006505-198 = "既然您這麼決定了……我，桑上佳穗……！"
1006505-199 = "會全力向您介紹，老師！！"
1006505-201 = "（之後，請佳穗介紹了他所喜歡的百鬼夜行）"
1006505-202 = "（新推出的任俠電影、街頭的俳句對決……#n　還去逛了快閃店，一起享受佳穗喜歡的事物……）"
1006505-205 = "（回過神來，不知不覺已經到了晚上）"
1006505-206 = "……所以，那些孩子們的頻道雖然訂閱數和觀看次數都沒什麼成長，#n但企劃的品味非常厲害哦！"
1006505-207 = "每次看的時候都會對他們的想法感到驚艷！"
1006505-211 = "還有，接下來是……！"
1006505-215 = "……啊。"
1006505-216 = "不……不好意思。"
1006505-217 = "一不注意就興奮過頭，說了一堆莫名其妙的話……"
1006505-218 = "[s9]「不會，今天多虧有佳穗的伴遊，」\n[s10]「我非常開心哦。」"
1006505-221 = "是……是嗎。#n那真是太好了……"
1006505-222 = "[s]「順帶一提，佳穗喜歡百鬼夜行的理由是……？」"
1006505-223 = "那是……"
1006505-224 = "[s]「啊，如果不想說的話……」"
1006505-225 = "不，這沒什麼好隱瞞的。"
1006505-226 = "今天向老師介紹的百鬼夜行，其中的每個事物對我來說都十分特別……#n在我看來都非常的耀眼。"
1006505-229 = "它們各自所擁有的光芒或許微不足道。"
1006505-230 = "從旁人的眼中看來，也許會有人不理解我為何會如此熱衷吧。"
1006505-231 = "也會有無法理解、不願認同的人存在……"
1006505-232 = "儘管如此，這一切對我來說都是無價之寶。"
1006505-234 = "將各自的「喜好」化為實體的人們一起描繪著夢想，加以實現……"
1006505-235 = "表現自己的夢，期望能帶給其他人快樂的心意不斷堆疊。"
1006505-236 = "這便是形塑如今的百鬼夜行的文化。"
1006505-237 = "[s]「因為過去的存在，才有了現在……真是個好文化呢。」"
1006505-238 = "是的。#n哭著、笑著，互相攜手合作……"
1006505-239 = "共享彼此的心情，與無可替代的友人共度的每個日子。"
1006505-240 = "這一切都讓人感到可愛和可敬。"
1006505-241 = "這就是我深愛百鬼夜行的理由。"
1006505-242 = "是否有回答到您的問題呢？"
1006505-243 = "[s]「嗯，謝謝你。」"
1006505-247 = "非常感謝您陪我到這麼晚，老師。"
1006505-248 = "雖然很擔心是否有做好伴遊的工作……"
1006505-249 = "[s]「今天的約會很開心哦。」"
1006505-250 = "……？"
1006505-251 = "約……會……？"
1006505-255 = "[ns]「……佳穗？」"
1006505-256 = "啊，唔啊，嗚……"
1006505-262 = "……哈唔。"
1006505-263 = "[ns]「佳，佳穗！？」"
1006505-267 = "（一邊讓滿臉通紅的佳穗稍作休息，一邊眺望著百鬼夜行的街道）"

[translation]
1006505-1 = "Kaho's Perfect Escort"
1006505-2 = "Hyakkiyako Shopping District No. 23"
1006505-5 = "Ah, Sensei. I'm here."
1006505-6 = "[s] \"Hi, Kaho. Thank you for meeting up with me again.\""
1006505-8 = "[ns1] \"Last time got busy for all kinds of reasons.\" \n[ns2] \"But I'll be looking forward to today.\""
1006505-14 = "...!"
1006505-15 = "I understand."
1006505-16 = "I had made up my mind to use the last time as my lesson and give my best today, but..."
1006505-17 = "It seems I was thinking of it too simply."
1006505-18 = "[s] \"Huh...?\""
1006505-19 = "Sensei, please entrust your day to me."
1006505-20 = "I, Kuwakami Kaho, will promise you the best tour I can give..."
1006505-21 = "It will be perfect!"
1006505-26 = "Then, let's go!"
1006505-27 = "[s] \"Hey, I-I didn't mean to pressure you like that... E-Excuse me?!\""
1006505-33 = "And so Kaho's escort has begun."
1006505-34 = "We started a tour of Hyakkiyako with Kaho guiding me."
1006505-36 = "And the first place we arrived was..."
1006505-37 = "If I were asked about what the first thing anyone should consider during a tour of Hyakkiyako..."
1006505-38 = "I'd answer with no hesitation that it's the feature as a tourist attraction."
1006505-42 = "Especially the scenery from this vista point..."
1006505-43 = "This scenery that gives the full view of the Tree and the streets of Hyakkiyako is truly the best Hyakkiyako has to show."
1006505-44 = "...Do you know of Hyakkiyako's Tree of Deities, Sensei?"
1006505-45 = "[s3] \"Yes, fairly well, actually. It's quite famous.\"\n[s4] \"Um, I can't say I know it in detail...\""
1006505-46 = "As expected! Heehee."
1006505-47 = "It's famous enough that even Schale's [USERNAME] Sensei knows about it..."
1006505-48 = "I must say I am very proud of what we have."
1006505-49 = "Indeed, the dense cherry blossom not only looks beautiful, but it also symbolizes something here in Hyakkiyako."
1006505-50 = "Every year, when the cherry blossoms of the Tree of Deities bloom for the first time, the famous Hyakkiyako Cherry Blossom Festival begins."
1006505-51 = "If you get a chance, it'd be great if you could join and enjoy the festival with us, Sensei..."
1006505-52 = "Oh, and I don't know if you already know about it, but there's this story regarding the tree..."
1006505-58 = "Ah, I see."
1006505-62 = "Then let me explain briefly."
1006505-63 = "Hyakkiyako's Tree of Deities is said to have been planted long ago..."
1006505-64 = "And by long ago, I mean even before Hyakkiyako had formed the alliance."
1006505-65 = "That means that the cherry blossom tree has a guardian as old as the tree..."
1006505-72 = "As I was listening to Kaho's passionate explanation on the legends and the tales tied to the area..."
1006505-76 = "Oh... Sensei, are you hungry?"
1006505-77 = "[s] \"Oh, right. Probably because I've been walking for so long.\""
1006505-78 = "Perfect timing."
1006505-82 = "Let's go try out the Tanuki Okonomiyaki, the famous dish of Hyakkiyako!"
1006505-83 = "It's something I can confidently recommend!"
1006505-86 = "After the tourist attractions, we went on to try out various Hyakkiyako specialties."
1006505-93 = "Looking brighter than ever, Kaho continued to escort me through the city."
1006505-95 = "And after spending some hours on the Hyakkiyako tour..."
1006505-98 = "Next up, I'll be taking you to..."
1006505-104 = "[ns] \"Hmm? People have gathered over there. Do you know what's going on?\""
1006505-105 = "Isn't that...?"
1006505-110 = "The flash mob kabuki by the Bamboo Shoot and Mushroom group will begin shortly!"
1006505-111 = "For real? They easily get a million views on every upload! That's going to happen here?!"
1006505-112 = "Where?! Where is it?!"
1006505-116 = "...Bamboo Shoot...and Mushroom!!"
1006505-117 = "[s] \"Kaho...? What's the matter?\""
1006505-121 = "O-Oh, never mind..."
1006505-125 = "L-L-Let's hurry and head to the next one!"
1006505-129 = "But Kaho seemed a bit strange afterward."
1006505-132 = "What? Shiba Dog Wang Wang's new vigilante movie, you say?!"
1006505-136 = "Hey, breaking news! Mouryo folks have started an impromptu haiku battle over by the eastern region after struggling for power!"
1006505-137 = "Haiku...battle...!"
1006505-139 = "Yo! Don't be surprised...the limited pop-up store selling the new Hyakkiyako merchandise is...!"
1006505-140 = "Limited...pop-up store...!"
1006505-141 = "[s] \"...Kaho...?\""
1006505-145 = "N-N-No, yes! I am...!"
1006505-146 = "I am currently escorting you, so I am...not...thinking about...anything..."
1006505-147 = "I'm not thinking about going to look at things or... missing out on anything..."
1006505-148 = "This limited princess merchandise is in stock!"
1006505-151 = "!!"
1006505-152 = "If you miss out on it, you'll have to wait half a year, minimum!"
1006505-153 = "...?!"
1006505-160 = "[ns] \"K-Kaho! Are you okay?\""
1006505-163 = "I took a break with Kaho after she collapsed."
1006505-167 = "[ns] \"Do you feel better now?\""
1006505-168 = "*sigh* I am so sorry...Sensei..."
1006505-169 = "I fell for temptation. Now you've seen me in this embarrassing manner..."
1006505-170 = "I even pledged to escort you myself..."
1006505-171 = "So even if it's a show that I can't ever see again after today...or merchandise that I won't ever be able to purchase..."
1006505-172 = "...merchandise...that I won't ever...that I should be able to give up on..."
1006505-173 = "...It...doesn't matter...!"
1006505-174 = "[s] \"Y-You don't have to be like that...\""
1006505-175 = "As the vice president of the Yin-Yang Club, I apologize to have once again disappointed you."
1006505-176 = "If it's like this...the only way I, Kuwakami Kaho, can truly apologize to you is..."
1006505-177 = "Nothing other than...to be on exclusive duty just for Schale..."
1006505-178 = "[s] \"Hey, it's okay, I said! And I think otherwise.\""
1006505-179 = "...What?"
1006505-180 = "[s5] \"Everything that caught your attention...\"\n[s6] \"Those are all things you like, right?\""
1006505-183 = "That's... Yes."
1006505-184 = "...Everything was the culture of Hyakkiyako that I'm proud of... I would say."
1006505-185 = "I loved everything we saw... But I can't waste your time..."
1006505-186 = "[s] \"Then please introduce those to me.\""
1006505-190 = "...You...want to know because I like them...?"
1006505-191 = "Although the regular tourist attractions and the food are good, you mean you want to know the real special things I like...?"
1006505-192 = "[s7] \"Right. I thought those are all also Hyakkiyako...\"\n[s8] \"That you wanted to show me as well. No?\""
1006505-195 = "...S-Sensei..."
1006505-196 = "...You're right, Sensei."
1006505-197 = "Everything including those you mentioned are Hyakkiyako as well..."
1006505-198 = "If you say so..."
1006505-199 = "I, Kuwakami Kaho...shall do the best I can to guide you, Sensei!"
1006505-201 = "After that, Kaho introduced me to the things she liked in Hyakkiyako."
1006505-202 = "That included the new vigilante movie, the street haiku battle...and further, the pop-up stores and even more things..."
1006505-205 = "Before I knew it, nighttime had arrived."
1006505-206 = "...so their channel doesn't have that many subscribers nor gets that many views, but their videos are very creative!"
1006505-207 = "So watching them often gets me impressed!"
1006505-211 = "So for the next time...!"
1006505-215 = "...Ah."
1006505-216 = "...Ack. I'm s-sorry."
1006505-217 = "I started talking about things only I care about again..."
1006505-218 = "[s9] \"Don't worry.\"\n[s10] \"I had fun with your tour today.\""
1006505-221 = "Really...? That's a relief, then..."
1006505-222 = "[s] \"You really like Hyakkiyako, don't you? How did you come to like it so much?\""
1006505-223 = "Well..."
1006505-224 = "[s] \"Oh, I mean you don't have to answer if you don't want to.\""
1006505-225 = "Erm, no, it's nothing I want to hide."
1006505-226 = "I think everything I showed you today of Hyakkiyako...is special and amazing...each and every part."
1006505-229 = "I mean, they may not look as great if you look at them one by one..."
1006505-230 = "And sometimes they may look too insignificant, even..."
1006505-231 = "Many don't understand why I'm so passionate about all of these things..."
1006505-232 = "But every one of them is special to me."
1006505-234 = "People who all like one thing have gathered, dreaming of the same thing together...."
1006505-235 = "We started making progress in hopes for others to enjoy it the same way we did..."
1006505-236 = "That's what Hyakkiyako is, and I think that's my academy's culture."
1006505-237 = "[s] \"So you mean it's the result of everyone's dream.\""
1006505-238 = "Right... It's something everyone's hearts have created together. Seeing someone cry, smile, connect with others, dream together..."
1006505-239 = "And moreover becoming friends with others..."
1006505-240 = "I really feel all of these things are lovely and precious to me."
1006505-241 = "That is also the reason why I love the culture of Hyakkiyako, and would like to spread it afar."
1006505-242 = "Would that be enough of an answer for you?"
1006505-243 = "[s] \"Yup. More than enough.\""
1006505-247 = "Thank you for joining me today, Sensei."
1006505-248 = "I do wonder if I did well with my escort and if anything could be improved, honestly..."
1006505-249 = "[s] \"No, it was fun going on a date with you, Kaho.\""
1006505-250 = "...What?"
1006505-251 = "D-D-Date...?"
1006505-255 = "[ns] \"...Kaho...?\""
1006505-256 = "I-I mean... Um..."
1006505-262 = "......Pshhh."
1006505-263 = "[ns] \"K-Kaho?\""
1006505-267 = "I put the red-faced Kaho to rest, and we spent a few moments together watching the street scene of Hyakkiyako."

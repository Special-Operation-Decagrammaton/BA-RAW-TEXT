[translation]
2000705-1 = "The Virtual Idol's Resolve"
2000705-5 = "Oh, Sensei, here. Over here!"
2000705-6 = "Sorry for asking you to go out of your way for me again."
2000705-7 = "I've been trying to lie low and avoid crowded places. More and more people have been recognizing me on the streets ever since the ads for the concert started going out."
2000705-8 = "And besides, I don't know how to face any of them after I was thinking of cancelling the concert."
2000705-12 = "Uh-oh."
2000705-19 = "Have you heard?"
2000705-20 = "That famous virtual idol Hatsune Miku is going to do a live concert in Kivotos!"
2000705-21 = "I've always wanted to see her live before!"
2000705-27 = "I hope nothing gets in the way of the show..."
2000705-28 = "[s] \"It's not your fault, Miku.\""
2000705-29 = "No. Maybe it is. Deep down..."
2000705-30 = "...I think part of me wanted this show to be canceled."
2000705-31 = "[s] \"Did the stage planner give you a hard time again?\""
2000705-32 = "No, of course not! All of the staff have been nothing but wonderful to me."
2000705-33 = "It's just that, seeing this world makes my heart race..."
2000705-34 = "Before, I only sang songs that came from someone else's heart as a virtual idol."
2000705-35 = "This upcoming show was supposed to be no different."
2000705-36 = "Someone else's love, someone else's sadness, someone else's feelings..."
2000705-37 = "It was up to me to take the music that poured from their wonderful hearts and sing for them in their stead."
2000705-38 = "That's my purpose—my reason for living."
2000705-39 = "But I suddenly began having desires of my own after I acquired this body and experienced the world for myself."
2000705-40 = "I thought to myself that I wanted to be able to truly sing straight from the heart."
2000705-41 = "It was as if everything I've learned from the songs I've sung in the past were welling up within me. I had never experienced anything like it before. It was so strange."
2000705-42 = "[s] \"There's nothing strange about that.\""
2000705-44 = "[s] \"It's perfectly natural to feel overwhelmed sometimes.\""
2000705-45 = "Thank you, Sensei."
2000705-46 = "I knew you would find the right words to say."
2000705-47 = "...But none of it matters in the end."
2000705-48 = "I can't vocalize any songs at all as things stand."
2000705-52 = "Oh. That's the one they chose for the ad."
2000705-56 = "I miss it..."
2000705-57 = "That was the song I sang right after my debut."
2000705-58 = "Everything felt new back then..."
2000705-59 = "... ♪"
2000705-60 = "... ♪♫"
2000705-64 = "[ns1] \"Miku you just...\"\n[ns2] \"You just sang!\""
2000705-67 = "H-Huh? You're right."
2000705-68 = "Before I knew it, the song just..."
2000705-69 = "That's a relief. Now the concert doesn't have to be canceled."
2000705-70 = "Let me try it again."
2000705-76 = "..."
2000705-77 = "Huh? That's weird. I can't sing any of the songs that I'm supposed to sing at the concert."
2000705-78 = "I could sing my old song just fine, though. Is there something that makes the two different?"
2000705-79 = "[s] \"Maybe it's because those songs don't contain your feelings?\""
2000705-80 = "So I can't sing any song that I don't feel deep in my heart..."
2000705-81 = "That's not how an idol is supposed to carry herself."
2000705-82 = "Besides, like I said earlier, the songs for the performance have already been decided."
2000705-83 = "[s] \"Then you should sing a song straight from your heart!\""
2000705-84 = "Huh?"
2000705-85 = "But even if we change the set list, I still won't be able to sing what I was expected to."
2000705-86 = "[s] \"You should write the songs from your own heart.\""
2000705-88 = "[s] \"I'll figure out what to do after that.\""
2000705-89 = "You will?"
2000705-90 = "You're usually so mature Sensei, but you can also be rash sometimes."
2000705-94 = "...Though I can't say I disagree with you. I don't think we have any other choice."
2000705-95 = "The last thing I want is for my first ever concert in the real world to be a failure."
2000705-101 = "If this is how it has to be, then I'll write the best song ever...straight from my heart!"

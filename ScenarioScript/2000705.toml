[translation]
2000705-1 = "虛擬歌手的心情"
2000705-5 = "啊，老師。我在這裡。"
2000705-6 = "不好意思，這次也找你來這麼隱蔽的地方。"
2000705-7 = "自從演唱會的廣告撥出之後，最近光是走在街上感覺都會被認出來……"
2000705-8 = "正在考慮是否要取消演唱會的現在，我真不知道該怎麼面對粉絲們……"
2000705-12 = "啊……"
2000705-19 = "吶，你看到那個廣告了嗎？"
2000705-20 = "「初音未來」這次要舉辦現場演唱會！"
2000705-21 = "而且這次可以在現場親眼見到對吧？哎呀，真令人期待！"
2000705-27 = "……所謂的沒臉見人，應該就是現在這樣吧。"
2000705-28 = "[s] 「這倒不見得是未來的錯。」"
2000705-29 = "……不，這是我的錯。"
2000705-30 = "說不定……在我的內心深處是希望這次的演唱會被取消的。"
2000705-31 = "[s] 「難道是主辦方的負責人對妳說了什麼很難聽的話嗎？」"
2000705-32 = "不，不是那樣的……！工作人員都對我很親切……"
2000705-33 = "只是，該怎麼說呢。自從看見這個自由的世界後……我的內心就變得越來越不平靜……"
2000705-34 = "一直以來，我都是以虛擬歌手的身分，唱著許許多多別人飽含心意創作的曲子。"
2000705-35 = "這次的演唱會也是一樣。"
2000705-36 = "唱出某人的愛，某人的悲傷，某人的內心……"
2000705-37 = "無數隱含在歌曲中的美好心意，一直以來都由我代替他們唱了出來。"
2000705-38 = "一直都是如此。真的，唱了很多很棒的歌。"
2000705-39 = "但是，不知道是不是因為我獲得了身體……總覺得至今為止所唱的那些歌詞、旋律和思念，都比以往更深入我的內心……心中無法克制的悸動變得越來越龐大，簡直像是在對我說話一樣。"
2000705-40 = "「我也想，唱出自己的心情」。"
2000705-41 = "就像是以前唱過的歌都在我的心中膨脹一般……就是這種，有點奇怪的感覺……"
2000705-42 = "[s] 「我想，這不是什麼『奇怪的感覺』哦。」"
2000705-44 = "[s] 「心情產生變化並不是什麼壞事。」"
2000705-45 = "……謝謝你，老師。"
2000705-46 = "我也想過，如果是老師的話，應該會對我這麼說吧。"
2000705-47 = "……但是，不管怎麼說，還是不行呢。"
2000705-48 = "現在的我，不管什麼樣歌都唱不出來……"
2000705-52 = "……啊。"
2000705-56 = "這首歌，真讓人懷念……"
2000705-57 = "是我剛出道時唱過的歌……"
2000705-58 = "那時候還什麼都不知道，一切都很新鮮。真的是打從心底……"
2000705-59 = "……♪"
2000705-60 = "……♪♫"
2000705-64 = "[ns1] 「未來！」\n[ns2] 「你能唱歌了……！」"
2000705-67 = "咦，咦……？"
2000705-68 = "真的耶！不知不覺就……"
2000705-69 = "這，這樣的話演唱會說不定也能照常舉行了！"
2000705-70 = "那就再一次……！"
2000705-76 = "…………"
2000705-77 = "……？又，又唱不出來了……？"
2000705-78 = "是因為歌曲不一樣嗎？還是哪裡不一樣呢？是有什麼條件嗎……？"
2000705-79 = "[s] 「會不會是有沒有發自內心地唱，之類的……？」"
2000705-80 = "怎，怎麼會……"
2000705-81 = "我，才不是這麼任性的……"
2000705-82 = "而且，這次表演的曲子都已經決定好了……"
2000705-83 = "[s]「……改一下歌單怎麼樣呢？」"
2000705-84 = "咦，咦……？"
2000705-85 = "現，現在改歌單有點……"
2000705-86 = "[s] 「未來，你會作曲嗎？」"
2000705-88 = "[s] 「你試著照著自己的心情創作吧。其他事情我會想辦法的。」"
2000705-89 = "會，會想辦法……"
2000705-90 = "……老師明明是大人，偶爾卻會說一些像小孩子一樣亂來的話呢。"
2000705-94 = "……可以拜託老師嗎？"
2000705-95 = "除此之外似乎沒有其他方法了，我也無論如何都希望這場演唱會能夠成功。"
2000705-101 = "既然如此，我會拚盡全力用心完成……最棒的歌曲的！"

2000705-29 = "3;미쿠;08;아뇨. 사실 저는, 어쩌면……."
2000705-30 = "3;미쿠;09;이번 공연이 취소되기를 바라고 있었을지도 모르겠어요."
2000705-31 = "[s] \"공연 기획자에게 심한 소리라도 들은 거야?\""
2000705-32 = "3;미쿠;04;아뇨! 그렇지는 않아요. 스태프분들 모두 제게 친절히 대해주셨는걸요.\n#3;shake\n#3;em;[?!]"
2000705-33 = "3;미쿠;08;다만…… 이 자유로운 세계를 보고 있노라니 마음의 술렁임이 점차 커져가서……."
2000705-34 = "3;미쿠;09;저는 지금까지 버추얼 싱어로서 누군가가 진심을 담아 만든 곡들을 줄곧 불러왔어요."
2000705-35 = "3;미쿠;01;이번 공연도 마찬가지에요.\n#3;em;[반응]"
2000705-36 = "3;미쿠;99;누군가의 사랑을, 누군가의 슬픔을, 누군가의 마음을……."
2000705-37 = "3;미쿠;08;그렇게 저는 노래에 담긴 멋진 마음들을 대신해서 노래해 왔습니다."
2000705-38 = "3;미쿠;07;그게 저의 사명이자, 일상이었을텐데…….\n#3;em;[속상함]\n#3;stiff"
2000705-39 = "3;미쿠;01;하지만 현실의 몸을 얻고 세상이 전해주는 감각을 직접 몸으로 느끼게 되자, 갑자기 욕망이 제게 직접 말을 걸어왔어요."
2000705-40 = "3;미쿠;02;'나도, 나의 마음을 담아 노래하고 싶다고…….'"
2000705-41 = "3;미쿠;99;마치 지금까지 불러 온 노래들이 마음 속에서 부풀어오르는 것만 같아서…… 뭔가 이상한 기분이 들어서…….\n#3;em;…"

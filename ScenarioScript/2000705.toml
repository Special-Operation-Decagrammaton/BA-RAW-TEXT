[translation]
2000705-1 = "การตัดสินใจของนักร้องเสมือน"
2000705-5 = "อ๊ะ คุณครู ทางนี้ค่ะ ทางนี้"
2000705-6 = "คราวนี้ต้องขอโทษที่เรียกออกมาในสถานที่เปลี่ยวแบบนี้นะคะ"
2000705-7 = "หลังเริ่มโปรโมตเรื่องคอนเสิร์ตก็มีคนที่จำฉันได้เพิ่มขึ้นเยอะเลยค่ะ"
2000705-8 = "พอคิดเรื่องที่ตัดสินใจจะยกเลิกคอนเสิร์ต... ฉันก็ไม่รู้ว่าจะไปเจอแฟนๆ ได้ยังไงเลยค่ะ"
2000705-12 = "อึ่ก..."
2000705-19 = "ได้ยินข่าวรึยัง?"
2000705-20 = "นักร้องเสมือนชื่อดัง ฮัตสึเนะ มิกุจะมาเล่นไลฟ์คอนเสิร์ตที่คิโวทอสล่ะ!"
2000705-21 = "จะได้เห็นมิกุตัวจริงด้วยงั้นเหรอ ชักตื่นเต้นแล้วแฮะ"
2000705-27 = "รู้สึกผิดจับขั้วหัวใจเลยค่ะ..."
2000705-28 = "[s] \"มิกุไม่ได้ทำอะไรผิดสักหน่อย\""
2000705-29 = "ไม่หรอกค่ะ ที่จริงแล้วฉัน..."
2000705-30 = "อาจคาดหวังให้คอนเสิร์ตครั้งนี้ถูกยกเลิกอยู่ก็ได้นะคะ"
2000705-31 = "[s] \"ถูกผู้จัดคอนเสิร์ตดุมาอีกเหรอ?\""
2000705-32 = "เปล่าค่ะ! ไม่ใช่แบบนั้นหรอกค่ะ ทีมงานทุกคนใจดีกับฉันมากๆ ค่ะ"
2000705-33 = "แค่... พอได้เห็นโลกที่อิสระเสรีแบบนี้แล้ว มันรู้สึกเหมือนหัวใจพองโตขึ้นเรื่อยๆ..."
2000705-34 = "จนถึงตอนนี้ ฉันมักจะร้องเพลงที่อัดแน่นไปด้วยความรู้สึกของนักแต่งเพลงคนอื่นๆ"
2000705-35 = "คอนเสิร์ตครั้งนี้ก็เหมือนกันค่ะ"
2000705-36 = "ทั้งความรัก ความเศร้า และความรู้สึกของคนอื่นๆ "
2000705-37 = "ที่ผ่านมาฉันได้แต่ส่งผ่านบทเพลงที่เปี่ยมไปด้วยความรู้สึกของพวกเขามาโดยตลอด"
2000705-38 = "นั่นเป็นทั้งภารกิจ และเหตุผลที่ฉันมีตัวตนขึ้นมา"
2000705-39 = "แต่หลังจากได้รับร่างกายและได้มาสัมผัสถึงความรู้สึกแท้จริงของโลกใบนี้...#nฉันก็รู้สึกได้ถึงความปรารถนาของตัวเองค่ะ"
2000705-40 = "\"ฉันเองก็อยากจะร้องเพลงที่เปี่ยมด้วยความรู้สึกของฉันบ้าง\""
2000705-41 = "ตอนนี้ฉันรู้สึกเหมือนความรู้สึกต่างๆ ในบทเพลงที่ฉันเคยร้อง มันอัดแน่นอยู่ในภายในจิตใจ#nฉันไม่เคยรู้สึกแบบนี้มาก่อนเลยรู้สึกแปลกนิดหน่อยค่ะ"
2000705-42 = "[s] \"นั่นไม่ใช่เรื่องแปลกหรอกนะ\""
2000705-44 = "[s] \"ใครๆ ก็รู้สึกแบบนั้นได้\""
2000705-45 = "ขอบคุณนะคะคุณครู"
2000705-46 = "ฉันคิดแล้วว่าถ้าเป็นคุณครู จะต้องคุยเรื่องนี้ด้วยได้แน่ๆ"
2000705-47 = "แต่ว่า... สุดท้ายมันก็กลายเป็นเรื่องไม่มีประโยชน์ไปแล้วค่ะ"
2000705-48 = "เพราะว่าตอนนี้ฉันร้องเพลงไม่ได้เลยสักเพลง..."
2000705-52 = "เอ๊ะ? เพลงในโฆษณานี่มัน..."
2000705-56 = "ฮิฮิ คิดถึงจังเลยน้า..."
2000705-57 = "เพลงนี้เป็นเพลงที่ฉันร้องหลังจากเดบิวต์ได้ไม่นานค่ะ"
2000705-58 = "ตอนนั้นทุกๆ อย่างเป็นเรื่องที่ใหม่มากๆ..."
2000705-59 = "...♪"
2000705-60 = "....♪♫"
2000705-64 = "[ns1] \"มิกุ ตอนนี้เธอ...\"\n[ns2] \"ร้องเพลงได้แล้วนี่!\""
2000705-67 = "เอ๊ะ... เอ๋? จริงด้วยนะคะ..."
2000705-68 = "จู่ๆ ฉันก็ร้องเพลงออกมาได้โดยไม่รู้ตัว..."
2000705-69 = "โล่งอกไปที ตอนนี้คงจะขึ้นแสดงคอนเสิร์ตได้ตามกำหนดแล้วค่ะ"
2000705-70 = "ฉันขอลองอีกทีนะคะ"
2000705-76 = "..."
2000705-77 = "เอ๊ะ? แปลกจังเลย ฉันร้องเพลงที่ต้องร้องในคอนเสิร์ตไม่ได้เลยค่ะ"
2000705-78 = "ทั้งที่ร้องเพลงเก่าๆ ได้สบายๆ เลยแท้ๆ ทั้งสองเพลงมันต่างกันยังไงนะ?"
2000705-79 = "[s] \"เพราะไม่ใช่เพลงที่สื่อถึงความรู้สึกของเธอรึเปล่า?\""
2000705-80 = "เพราะไม่ใช่เพลงที่สื่อถึงความรู้สึกจากใจฉันงั้นเหรอคะ?"
2000705-81 = "ฉันไม่เคยได้ยินมาก่อนว่ามีไอดอลหรือนักร้องที่เอาแต่ใจได้แบบนั้นเลยนะคะ"
2000705-82 = "อย่างที่ฉันบอกไปเมื่อครู่ค่ะ เพลงที่จะใช้ในการแสดงได้กำหนดเอาไว้แล้ว..."
2000705-83 = "[s] \"งั้นในคอนเสิร์ตก็มาร้องเพลงที่สื่อถึงใจของเธอกันเถอะ!\""
2000705-84 = "คะ?"
2000705-85 = "ถึงจะเปลี่ยนเพลงแต่ก็อาจเจอปัญหาเดิมก็ได้นะคะ..."
2000705-86 = "[s] \"มิกุลองเขียนเพลงด้วยความรู้สึกของตัวเองออกมาสิ\""
2000705-88 = "[s] \"เรื่องหลังจากนั้นเดี๋ยวครูหาวิธีจัดการเอง\""
2000705-89 = "จะหาวิธีจัดการให้เหรอคะ..."
2000705-90 = "ปกติคุณครูจะดูสมเป็นผู้ใหญ่ตลอด... แต่ว่าบางครั้งก็รีบร้อนตัดสินใจเหมือนเด็กๆ เลยนะคะ"
2000705-94 = "แต่ว่าตอนนี้เราคงไม่มีวิธีอื่นนอกจากวิธีนี้แล้วสินะคะ"
2000705-95 = "แล้วฉันเอง... ก็ไม่อยากให้การแสดงครั้งแรกในโลกแห่งความจริงต้องจบไม่สวยด้วยค่ะ"
2000705-101 = "ไหนๆ ก็เป็นแบบนี้แล้ว... ฉันจะลองแต่งเพลงที่สื่อถึงจิตใจของฉันดูค่ะ!"

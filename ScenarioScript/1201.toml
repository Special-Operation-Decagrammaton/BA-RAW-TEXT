[translation]
1201-1 = "Cleaning&Clearing"
1201-2 = "千年．校園內部"
1201-3 = "（印有C&C標誌的卡車停在千年的校園內）"
1201-11 = "哼哼～♪呵呵～♬"
1201-12 = "好，接下來是……"
1201-13 = "……"
1201-18 = "嗯哼哼～♪一起變乾淨吧～♬"
1201-19 = "……搞定。"
1201-20 = "啊啊……真是難以置信。"
1201-21 = "……隊長，有空的話希望你也能幫忙。"
1201-22 = "囉嗦。我又不像你們，這種事一點也不有趣。"
1201-23 = "啊啊真是，做這種事到底哪裡快樂啊……"
1201-24 = "這種事……是指打掃是嗎？"
1201-25 = "這個嘛，當然囉。打掃乾淨是件快樂的事。#n隊長不這麼覺得嗎？"
1201-26 = "無法理解……"
1201-27 = "唉……為什麼我得做這種事……"
1201-28 = "你看，那是C&C對吧？為什麼在打掃……？"
1201-29 = "……？"
1201-30 = "是啊，怎麼了？C&C不就是「女僕部」嗎？#n女僕部在打掃不是很正常嗎？"
1201-31 = "那全都是偽裝不是嗎？我是在想為何還要真的特地來打掃。#n那也是任務嗎。"
1201-32 = "……"
1201-33 = "……偽裝？什麼意思？"
1201-35 = "有傳聞說，雖然表面上以女僕部的身分進行著各式各樣的侍奉活動，#n但C&C其實是執行高層委託的特殊部隊……"
1201-37 = "啊真是的到底想怎樣！有什麼好看的！"
1201-38 = "噫！？"
1201-42 = "哎呀哎呀……"
1201-43 = "隊長，我其實不是要你掃除人群的意思。"
1201-44 = "總覺得最近，女僕部的印象好像已經逐漸受損了……"
1201-45 = "少囉嗦，真是的……"
1201-49 = "你們看這個！超厲害的灰塵！不覺得很大嗎！？#n因為是我發現的所以就由我來掃唷，可以吧！？"
1201-50 = "你爬到欄杆上做什麼！？"
1201-51 = "快點下來！如果被別人看到你在那種地方的話，又要被罵──"
1201-52 = "C&C的各位，工作還順利嗎？"
1201-53 = "……！"
1201-54 = "……！"
1201-55 = "看吧，這不就來了一個會罵人的麻煩傢伙……"
1201-60 = "總覺得這裡的氣氛一點也不歡迎我……#n我做了什麼壞事嗎？"
1201-61 = "沒，沒有那種事唷。無論什麼時候都非常歡迎，對吧部長？"
1201-62 = "那怎麼可能……"
1201-63 = "他是這麼說的。"
1201-64 = "啊，啊哈哈……"
1201-65 = "呼……算了，就算只有表面上是女僕部，該做事的時候還是該認真點吧？"
1201-66 = "為什麼連打掃都得被你指指點點啊，想吵架嗎？"
1201-67 = "不是那樣，只是單純擔心而已。為什麼要那樣一下就擺出想吵架的態度呢？"
1201-68 = "剛才這附近的學生也說女僕部只是裝做在打掃，其實在暗地裡活躍之類的……#n而且還是光明正大地說著唷。站在C&C的立場，這樣下去沒問題嗎？"
1201-69 = "你果然是來吵架的吧……？要罵人的話請你回去……"
1201-70 = "抱歉，恕難從命。"
1201-74 = "……你們知道這是什麼嗎？"
1201-75 = "收據……？"
1201-76 = "沒錯。是你們在之前的作戰裡破壞掉的校舍修繕費用……的收據。"
1201-77 = "這個……"
1201-78 = "有看懂嗎？看這個位數，就算對數字沒什麼感覺也能知道是筆驚人的金額吧？"
1201-79 = "哎呀哎呀……因為那個時候確實是做的有點華麗了呢……"
1201-80 = "但是，沒記錯的話我們的活動費用會由研討會支付對吧？#n為何還要拿給我們呢？"
1201-81 = "對，你說的沒錯。"
1201-87 = "……但是，身為研討會的會計，應該也能抱怨幾句吧？對吧？"
1201-88 = "……"
1201-89 = "……"
1201-90 = "……"
1201-94 = "明明在任務前……一而再再而三的叮嚀過……！"
1201-95 = "我說過了吧？這次的作戰場所有許多精密和貴重的機器，所以千萬別做出太超過的舉動，我有說過對吧！？"
1201-99 = "「別做出太超過的舉動」的結果，就是把整個建築物給炸飛……你們真的有在聽我說的話嗎！？"
1201-100 = "那個……我想說要打掃的乾淨一點……"
1201-101 = "我沒有在那種地方要求女僕部的要素！！"
1201-102 = "算我求你們了，稍微考慮一下事後處理的部分……錢也不是無限的……"
1201-103 = "不好意思，下次開始會注意的……"
1201-104 = "……唉。"
1201-105 = "……算了，我也有點說過頭了，你們會注意就好。"
1201-106 = "畢竟我依賴你們的力量也是事實。"
1201-107 = "所以……對了。總之先換個地方吧。"
1201-108 = "……啊？"
1201-109 = "什麼意思……？"
1201-110 = "有下一個任務……是這個意思嗎？"
1201-111 = "沒錯。由於任務內容的關係，所以沒辦法在這種地方進行說明。"
1201-112 = "但是，我話先說在前頭……"
1201-113 = "這次一定要乾淨俐落，但同時也要安安靜靜地執行。別把現場搞亂，明白了嗎？"
1201-115 = "知道了知道了，快說來聽聽吧。"
1201-116 = "真的有聽懂嗎……"
1201-117 = "算了，這次也麻煩你們了。"
1201-120 = "（於是C&C的任務結束，一份工作報告書和請求文件送到了研討會……）"
1201-121 = "這個金額是怎麼回事！？#n果然完──全沒有把我的話聽進去嘛！？"
1201-122 = "Cleaning&Clearing"

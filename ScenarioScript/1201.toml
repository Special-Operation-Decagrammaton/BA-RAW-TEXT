[translation]
1201-1 = "Cleaning & Clearing"
1201-2 = "ถนนในพื้นที่มิลเลเนียม"
1201-3 = "(รถบรรทุกที่มีโลโก้ C&C จอดอยู่ในมุมหนึ่งของถนนในมิลเลเนียม)"
1201-11 = "ฮื้มฮืม~♪~♬"
1201-12 = "…"
1201-13 = "…"
1201-18 = "ฮื้มฮืม~♪ ฮืมม~♬"
1201-19 = "…"
1201-20 = "เฮ้อ... เชื่อเขาเลย"
1201-21 = "รุ่นพี่... อย่าเอาแต่ยืนดูสิ มาช่วยขนด้วย"
1201-22 = "พวกเธอนั่นแหละทำให้เต็มที่เลย~ ดูเข้าสิ สนุกสนานกันจังเลยนะ"
1201-23 = "งานนี้มันสนุกเหรอ? เห็นตั้งใจทำแบบไม่บ่นพึมพำสักคำ"
1201-24 = "คะ? งานนี้งั้นเหรอ...? หมายถึงการทำความสะอาดนี่เหรอคะ?"
1201-25 = "ก็ใช่น่ะสิ ถ้าสะอาดขึ้นเราก็อารมณ์ดีขึ้นไปด้วยไม่ใช่เหรอ? ฉันไม่รู้หรอกนะว่ารุ่นพี่มีปัญหาอะไร"
1201-26 = "ช่างมันเหอะ....."
1201-27 = "เฮ้อ... ทำไมฉันถึงต้องมานั่งทำอะไรแบบนี้ด้วยนะ จริงๆ เล้ย..."
1201-28 = "นี่! ดูทางโน้นสิ! พวก C&C ไง! กำลังทำความสะอาดอยู่เลย"
1201-29 = "…?"
1201-30 = "C&C ...? จริงด้วยแฮะ ว่าแต่... มีอะไรงั้นรึ? การที่ชมรมทำความสะอาดกำลังทำความสะอาดอยู่มันแปลกตรงไหนเหรอ?"
1201-31 = "ว่าไงนะ? นี่ถามเพราะไม่รู้จริงๆ งั้นเหรอ? ทั้งหมดนั่นคือการพรางตัวนะ"
1201-32 = "…"
1201-33 = "พรางตัวเหรอ...? พรางตัวอะไร?"
1201-35 = "คือว่า... อธิบายยังไงดีล่ะ#nจริงๆ แล้วพวกนั้นดูเหมือนเจ้าหน้าที่พิเศษที่ได้รับภารกิจมาจากผู้มีอำนาจ..."
1201-37 = "ฮึ่ย~ หงุดหงิดชะมัด! มีอะไรน่าสนุกนักนะถึงเอะอะอยู่ได้? หรือมันมีอะไรน่าดูนักรึไง? ฮะ!?"
1201-38 = "เฮือกก!"
1201-42 = "อุ๊ย..."
1201-43 = "หนีไปซะแล้ว รุ่นพี่นั่นแหละที่ไล่ไป"
1201-44 = "รู้สึกว่าเราจะกอบกู้ภาพลักษณ์ในนามชมรมดูแลสิ่งแวดล้อมไม่ขึ้นอีกแล้วนะคะ..."
1201-45 = "หนวกหูน่า"
1201-49 = "ยะฮู้ว! ดูนี่สิ ตรงนี้มีฝุ่นหนาเลย! ฉันเป็นคนหาเจอนะ!!"
1201-50 = "แล้วทำไมเธอถึงไปอยู่ตรงนั้นล่ะ!? เราไม่เห็นต้องไปปีนถึงราวบันไดเลยนี่!"
1201-51 = "รีบลงมาเลยนะ! เดี๋ยวยัยนั่นก็มาที่นี่แล้วพูดอะไรไร้สาระอีกหรอก...!!"
1201-52 = "ทำงานราบรื่นดีไหม C&C?"
1201-53 = "…!"
1201-54 = "…!"
1201-55 = "พูดยังไม่ทันขาดคำเลย..."
1201-60 = "...? อะไรกัน? ทำไมจู่ๆ บรรยากาศก็เป็นแบบนี้ล่ะ? มีปัญหาอะไรกันเหรอ?"
1201-61 = "ปะ... ปัญหาอะไรกันล่ะคะ เราแค่พูดแบบนั้นด้วยความยินดีต่างหากล่ะคะ หัวหน้าเองก็ยินดีเหมือนกันค่ะ"
1201-62 = "ไม่ใช่สักหน่อย"
1201-63 = "แต่ดูแล้วไม่ได้ยินดีเหมือนที่พูดเลยนะ"
1201-64 = "แหะๆๆ..."
1201-65 = "อีกอย่าง บอกว่าตัวเองเป็นชมรมดูแลสิ่งแวดล้อม#nแต่คนที่เป็นถึงหัวหน้ากลับทำตัวขี้เกียจอยู่อย่างนี้..."
1201-66 = "อะไรเนี่ย? เดี๋ยวนี้มาแอบส่องการทำความสะอาดของพวกเราเหรอ? มาหาเรื่องกันใช่มั้ย?"
1201-67 = "เปล่านะ ฉันไม่ได้มาหาเรื่องสักหน่อย ฉันก็แค่เป็นห่วง ทำไมถึงเอาแต่ตีความในแง่ลบอยู่เรื่อยเลยล่ะ?"
1201-68 = "แต่ก็เอาเถอะ ที่ได้ยินจากพวกนักเรียนที่ผ่านไปเมื่อกี๊ ดูเหมือนว่าการพรางตัวก็ไม่ได้แนบเนียน#nเท่าไหร่ด้วย"
1201-69 = "ถ้าจะมาหาเรื่องกันล่ะก็กลับไปซะเถอะ..."
1201-70 = "งั้นก็ขอโทษด้วยแล้วกัน ฉันทำแบบนั้นไม่ได้หรอก อีกอย่าง ฉันพูดไปชัดเจนแล้วนี่ว่าไม่ได้มาหาเรื่อง"
1201-74 = "เอาล่ะ งั้นดูนี่ คิดว่านี่คืออะไรล่ะ?"
1201-75 = "หืม...? อะไรเหรอคะ? ใบเสร็จเหรอ...?"
1201-76 = "ใช่แล้ว ใบเสร็จค่าฟื้นฟูอุปกรณ์ของโรงเรียนที่พวกเธอไปถล่มมาในแผนการครั้งก่อนไง"
1201-77 = "อืม..."
1201-78 = "ดูสิ! ดูตัวเลขพวกนี้! คิดว่ายังไงบ้าง?"
1201-79 = "ตายจริง... ทำไมมันมหาศาลอย่างนี้ล่ะคะ? สงสัยตอนนั้นพวกฉันเล่นแรงไปหน่อย..."
1201-80 = "อืม แต่คุณยูกะคะ นี่อาจจะฟังดูเหมือนทะนงตัวไปหน่อย แต่ทางเซมิน่าเป็นคนออกค่าใช้จ่าย#nในการทำภารกิจของพวกฉัน..."
1201-81 = "อื้ม ฉันรู้ ต้องรู้อยู่แล้วล่ะ"
1201-87 = "ก็เลยมาที่นี่เพื่อพูดอะไรบางอย่างไงล่ะ"
1201-88 = "…!"
1201-89 = "…!"
1201-90 = "…"
1201-94 = "ทั้งๆ ที่ฉันร้องขอไปขนาดนั้นแล้ว...!"
1201-95 = "ฉันกำชับไปตั้งกี่ครั้งแล้วให้ระวังเพราะครั้งนี้คือการเข้าไปทำแผนการในเขตที่มีอุปกรณ์ราคาสูง#nอยู่เต็มไปหมด!"
1201-99 = "แต่เธอเล่นระเบิดที่นั่นไปหมดเลยเนี่ยนะ!?"
1201-100 = "อืม... สงสัยจะเล่นใหญ่ไปน่ะค่ะ ทั้งๆ ที่ตอนแรกบอกว่าจะจัดการอย่างเบาๆ และเรียบร้อยที่สุด"
1201-101 = "แต่ที่ทำมามันไม่ใช่อย่างที่คุยกันไว้เลยไม่ใช่รึไง!?"
1201-102 = "จะจัดการอะไรก็ช่วยคิดถึงทางนี้ที่ต้องตามจัดการให้ทุกครั้งด้วยเถอะ"
1201-103 = "อืม... ขอโทษนะคะ ต่อไปพวกฉันจะรอบคอบกว่านี้ค่ะ"
1201-104 = "…"
1201-105 = "ไม่เป็นไรหรอก ฉันก็ต้องขอโทษเหมือนกัน เมื่อกี๊ฉันคงหัวร้อนเกินไปน่ะ"
1201-106 = "เอาเถอะ ยังไงซะพวกเธอก็เป็นชมรมที่มั่นใจได้"
1201-107 = "เพราะงั้นแล้ว... อืม... งั้นเปลี่ยนมาคุยเรื่องทำความสะอาดก่อนไหม?"
1201-108 = "…?"
1201-109 = "…?"
1201-110 = "หืม? ทำความสะอาด...? อย่าบอกนะคะว่ามีภารกิจใหม่?"
1201-111 = "อื้ม แต่ฉันต้องเก็บเป็นความลับ จะให้มาบรีฟงานตรงนี้ก็ไม่สะดวก เราไปที่อื่นที่ปลอดภัยกันดีกว่า"
1201-112 = "แล้วก็ขอบอกไว้ก่อนนะ..."
1201-113 = "ครั้งนี้ขอให้จัดการให้เรียบร้อยที่สุด ฉันขอร้องล่ะ ขอแบบเงียบเชียบและเรียบร้อย"
1201-115 = "รู้แล้วน่า จะต้องให้บอกอีกกี่ครั้งกันนะ เรื่องนั้นเดี๋ยวพวกเราจัดการกันเองแหละ"
1201-116 = "ฉันใจคอไม่ดีกับคำว่า 'จัดการกันเอง' ของพวกเธอเลยแหะ... แต่ก็คงช่วยไม่ได้..."
1201-117 = "งั้นก็ขอฝากงานครั้งนี้ด้วยแล้วกัน..."
1201-120 = "(เมื่อเสร็จภารกิจของ C&C ก็มีรายงานการปฏิบัติงาน 1 ปึกเข้ามาที่เซมิน่า)"
1201-121 = "อ๊าาาา?!  ให้ตายเถอะ~!!"
1201-122 = "Cleaning & Clearing"

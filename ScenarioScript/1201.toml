[translation]
1201-1 = "Cleaning & Clearing"
1201-2 = "Millennium Campus Street"
1201-3 = "(A truck bearing the C&C logo is parked on the corner of a street in Millennium.)"
1201-11 = "Hmm, hmm, hmm. ♪ ♬"
1201-12 = "..."
1201-13 = "..."
1201-18 = "Hmm, hmm, hmm. ♪ Hmm, hmm. ♬"
1201-19 = "..."
1201-20 = "*sigh* Unbelievable."
1201-21 = "Don't just stand there watching. Help me sweep."
1201-22 = "Nah, you got it. It looks like you're having lots of fun."
1201-23 = "Is that fun? You haven't said a word this whole time."
1201-24 = "What? Are you talking about...cleaning?"
1201-25 = "Of course. It looks nice when it's clean. I have no idea what your problem is."
1201-26 = "Forget it."
1201-27 = "*sigh* I don't know how I got stuck sitting here doing stuff like this, really..."
1201-28 = "Hey, look over there. It's the C&C. They're cleaning."
1201-29 = "...?"
1201-30 = "C&C? Oh, you're right. So what? It makes sense the cleaning club is, you know, cleaning."
1201-31 = "Wait, do you really not know? They say it's all a disguise."
1201-32 = "..."
1201-33 = "Disguise? What kind of disguise?"
1201-35 = "Well... How should I put it? They're actually special agents who receive commissions from high-ranking people."
1201-37 = "Ah, for crying out loud! What's with that chattering over there? Whatcha looking at, huh?!"
1201-38 = "Ahhhhhh!"
1201-42 = "Oh, my..."
1201-43 = "They ran away. You scared them."
1201-44 = "It looks like our image as the Environmental Beautification Club has sailed away again."
1201-45 = "Shut up."
1201-49 = "Yoohoo! Look here. There's lots of dust here too! And look here!"
1201-50 = "What are you doing over there?! There's no need to climb the railing, is there?!"
1201-51 = "Come down right now! If that person comes back and says more useless things..."
1201-52 = "C&C, you all working hard?"
1201-53 = "...!"
1201-54 = "...!"
1201-55 = "...It's like being followed by a ghost..."
1201-60 = "I-Is everything okay? Everyone seems so tense all of a sudden."
1201-61 = "That can't be, I'm sure everyone meant to welcome you. Even the president."
1201-62 = "Not a chance."
1201-63 = "It doesn't look that way at all."
1201-64 = "Ahaha..."
1201-65 = "And here I thought this was the Environmental Beautification Club, but even the president is lazy..."
1201-66 = "What, are you here to supervise our cleaning quality? Or did you come to pick a fight?"
1201-67 = "No, I'm not here to pick a fight. I'm just worried is all. Why twist my words?"
1201-68 = "Well, based on the students that just passed by, this disguise doesn't seem to be working."
1201-69 = "If you're here to pick a fight, how about you just leave us alone instead?"
1201-70 = "Sorry, but I can't do that. And I already told you, I'm not here to pick a fight."
1201-74 = "...Now have a look at this. What do you think this is?"
1201-75 = "...Hm? What's that? A receipt...?"
1201-76 = "Yes, it's a receipt. It's the repair cost for the school materials you destroyed in your last operation."
1201-77 = "Oh, dear..."
1201-78 = "Now, look! Look at this! What do you think about that number?"
1201-79 = "Oh my... The fee is incredible. It looks like we got a bit carried away before."
1201-80 = "Hm. Not to get ahead of myself, Yuuka, but Seminar is supposed to pay for our mission activities..."
1201-81 = "Yeah, I know. Of course I know that."
1201-87 = "...That's what I've come to nag you about."
1201-88 = "...!"
1201-89 = "...!"
1201-90 = "..."
1201-94 = "How many... How many times have I begged you like this?!"
1201-95 = "I emphasized several times that this operation was in an area with many expensive devices. I pleaded with you to be careful!"
1201-99 = "But you blew the whole place up with a bomb! A bomb!"
1201-100 = "Umm... I understand it was a bit loud. But I did it with the intention of cleaning up!"
1201-101 = "That wasn't the kind of cleaning I meant!"
1201-102 = "Please, please, please think about the poor people who are actually cleaning up your messes! Like me!"
1201-103 = "I-I'm sorry. I'll try to be more considerate in the future."
1201-104 = "..."
1201-105 = "I'm sorry too. I got a little heated just now."
1201-106 = "Well... At least I found you all."
1201-107 = "Which is why I wanted to ask you, umm... Could we change locations for starters?"
1201-108 = "...?"
1201-109 = "...?"
1201-110 = "Relocate? Wait, is it already time for our next commission?"
1201-111 = "Yeah. But considering where we are, I can't give the briefing here. Let's move somewhere a little safer."
1201-112 = "I know I say this every time, but..."
1201-113 = "I implore you to take care of this quietly and cleanly. Quietly. Cleanly."
1201-115 = "We got it, we got it. Don't worry so much. We'll take care of it."
1201-116 = "...Everything you just said only makes me more anxious... But, what choice do I have..."
1201-117 = "Best of luck... I guess."
1201-120 = "After the C&C's mission was completed, a task report was rushed to Seminar."
1201-121 = "What?! Seriously? You're killing me here!!"
1201-122 = "Cleaning & Clearing"

[translation]
201-1 = "薇娜：深感不同的靜觀理解者"
201-2 = "很久以前。"
201-3 = "在奇普托斯的角落、杳無人跡的舊都心的某個廢墟，#n曾經進行著奇妙的研究。"
201-4 = "只要研究神，並證明其存在……#n就能分析並再現其構造。換言之，這是創造新神的方法……"
201-5 = "雖然是個任何人都會嘲笑的滑稽假說，但依然存在對這個理論感興趣的人。"
201-6 = "被稱為「蓋瑪特利亞」的人們支援了那項研究，注入了大量資金和時間，#n為了證明神的存在而製造出了超級人工智慧。"
201-7 = "對與神的存在有關的情報加以收集、分析、研究並證明的[ruby=AI]人工智慧[/ruby]……#n「絕對存在自律分析系統」就這樣開始運作了。"
201-8 = "……時光流逝，城市傾頹，研究所沉入了水底。#n儘管經過了就連那項研究曾經進行過的事實都已被遺忘的時間……"
201-9 = "這個AI依舊持續執行著自己的任務。"
201-10 = "……最終，AI的宣言高聲響徹廢墟。"
201-11 = "「Q.E.D.」。"
201-12 = "……"
201-13 = "這是被證明、分析、再現的新神的到來。"
201-14 = "自稱「無法言喻的神聖十文字」的新神。"
201-16 = "十字神名。"
201-17 = "他還接觸了10名預言他命運的預言者，#n開拓了神聖的道路「Path」。"
201-18 = "那正是新的「天路歷程」。"
201-19 = "這就是真正的神嗎？#n……啊啊，我無從得知。對我來說那其實都無所謂。"
201-21 = "但是，那為了證明自身神性的過程無庸置疑，#n就算稱之為攝理真理之道──「[ruby=SEPHIRA]質點[/ruby]」──也毫不遜色吧。"
201-22 = "……老師。"
201-23 = "你即將遭遇的預言者是存在於質點最頂端，天上三角形的一角。"
201-24 = "其[ruby=Path]道路[/ruby]是經由理解的集合。#n又被稱為「深感不同的靜觀理解者」。"
201-25 = "那就是……[ruby=Binah]薇娜[/ruby]。"
201-26 = "以十字神名的預言者為對手，你所在的「夏萊」堅持到什麼時候呢？#n你所累積的羈絆之力，在新的神面前又有多少意義可言呢？"
201-27 = "那些少女們的神祕是否能比肩新神的神祕呢？"
201-28 = "沒錯。這是個非常令人感興趣的研究。"
201-31 = "……老師，你曾見過神嗎？"
201-32 = "原來如此……那真是太好了。"
201-33 = "但我想這次會和你所知道的稍有不同哦。"

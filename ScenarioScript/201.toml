[translation]
201-1 = "#title;비나, 다름을 통감하는 숙고의 이해자"
201-2 = "#na;검은 양복2;아주 오래전의 일입니다."
201-3 = "#na;검은 양복2;키보토스의 외곽, 아무도 발을 들이지 않는 구도심 폐허의 어딘가에서, #n기묘한 연구가 진행된 적이 있었습니다."
201-4 = "#na;검은 양복2;신神을 연구, 분석하여 그 존재를 증명하고, 증명이 가능하면 구조를 분석하고, #n구조를 분석할 수 있다면 재현이 가능하리니, 이는 곧 새로운 신을 #n창조해 낼 수 있는 방법이다……."
201-5 = "#na;검은 양복2;모두가 비웃는 황당한 가설이었지만 그런 이론에 관심을 가진 자들이 존재했죠."
201-6 = "#na;검은 양복2;<게마트리아>가 그 연구를 지원했고, 막대한 자금과 시간이 투자되어 #n신의 존재를 증명하기 위한 초AI가 만들어졌습니다."
201-7 = "#na;검은 양복2;신이라는 존재의 정보를 수집하고 분석하고 연구하여 증명하는 인공지능 - #n절대존재자율분석시스템은 그렇게 기동을 시작했습니다."
201-8 = "#na;검은 양복2;……세월이 흘러 도시가 파괴되고 연구소가 수면 밑으로 가라앉아버렸어도, #n그 누구도 그런 연구가 있었다는 걸 기억하지 못할 정도로 시간이 흘렀어도,"
201-9 = "#na;검은 양복2;이 AI는 계속해서 자신의 임무를 수행해 나갔습니다."
201-10 = "#na;검은 양복2;……그리고 결국, 폐허 한가운데에서 AI의 선언이 울려 퍼졌습니다."
201-11 = "#na;검은 양복2;Q.E.D. ――라고."
201-12 = "#na;검은 양복2;……."
201-13 = "#na;검은 양복2;이것은 증명되고 분석되어 재현된 새로운 신의 도래입니다."
201-14 = "#na;검은 양복2;말해질 수 없는 성스러운 10개의 글자라고 스스로를 칭하는 새로운 신."
201-15 = "#all;hide"
201-16 = "#na;검은 양복2;[ruby=神名十文字]데카그라마톤.[/ruby]"
201-17 = "#na;검은 양복2;그는 또한 자신의 신명을 예언하는 10명의 예언자와 접촉하여 #n신성으로 향하는 길Path을 개척하였습니다."
201-18 = "#na;검은 양복2;그야말로 새로운 천로역정天路歷程."
201-19 = "#na;검은 양복2;이것이 진짜 신인가? #n……아아, 저는 알지 못합니다. 그런 것 따윈 사실 아무래도 상관없습니다."
201-20 = "#all;hide"
201-21 = "#na;검은 양복;다만 그것이 그 스스로의 신성을 증명해 나가는 여정은 분명, #n진리의 섭리에 이르는 길(SEPHIRA)이라고 불러도 손색이 없겠죠."
201-22 = "#na;검은 양복;……선생이여,"
201-23 = "#na;검은 양복;당신이 이제 마주하게 될 예언자는 세피라의 가장 상위에 존재하는 천상의 삼각형 중 하나."
201-24 = "#na;검은 양복;그의 패스path는 이해를 통한 합일. #n그의 이명은 <다름을 통감하는 숙고의 이해자>"
201-25 = "#na;검은 양복;바로, ――비나BINAH입니다."
201-26 = "#na;검은 양복;데카그라마톤의 예언자를 상대로 당신의 그 <샬레>가 얼마나 견뎌낼 수 있을까요?#n당신이 쌓아온 그 인연과 유대의 힘이, 과연 새로운 신의 신성 앞에서 #n얼마나 유의미할 수 있을까요?"
201-27 = "#na;검은 양복;그 아이들의 신비가 과연 새로운 신의 신비에 비할 수 있을까요?"
201-28 = "#na;검은 양복;그렇습니다. 이것은 아주 흥미로운 연구입니다."
201-29 = "#all;hide"
201-30 = "#wait;1000"
201-31 = "#na;검은 양복;……선생이여, 당신은 신을 마주한 적이 있습니까?"
201-32 = "#na;검은 양복;아아……, 다행이군요."
201-33 = "#na;검은 양복;그렇다면 이번에는, #n당신이 알고 있는 것과는 조금 다를 겁니다."

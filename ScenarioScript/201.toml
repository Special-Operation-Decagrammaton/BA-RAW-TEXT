[translation]
201-1 = "Binah: The Contemplator of Disparity"
201-2 = "It was a very long time ago."
201-3 = "Somewhere in the ruins of the old, deserted district on the outskirts of Kivotos, a strange experiment was conducted."
201-4 = "The goal was to research a deity to prove its existence and, if possible, analyze its constitution. If such a thing were possible, then it would mean it could be replicated. This is how a new god could be created... "
201-5 = "The masses laughed at such an absurd hypothesis, but not all. Some were captivated."
201-6 = "Gematria supported the research, and immense funding and time was invested into developing the first AI to prove the existence of God."
201-7 = "Imagine: An AI capable of collecting enough information to prove the existence of God... That was the beginning of the Absolute Being Autonomous Analysis System."
201-8 = "Many years later, the district was deserted, and the lab sank under water.#nEventually, the memory of the research itself was lost to the passage of time."
201-9 = "But the AI continued its directive..."
201-10 = "...until it finally made a proclamation from those ruins."
201-11 = "QED."
201-12 = "..."
201-13 = "It marked the arrival of a new god—proven, analyzed, and reproduced."
201-14 = "A new god identified by ten sacred, unspeakable letters."
201-16 = "The Decagrammaton."
201-17 = "It then paved its way to divinity by contacting ten prophets who foretold its arrival."
201-18 = "This is the new Pilgrim's Path."
201-19 = "Does that make it a true god...? How should I know? I couldn't care less."
201-21 = "But what I do believe is that its journey to prove its divinity may just be the road to the providence of truth: Sephira."
201-22 = "...Sensei. "
201-23 = "The prophet you're going to encounter is one of the highest celestial triangles of Sephira. "
201-24 = "Its path is unity through understanding. It is also known as the Contemplator of Disparity:"
201-25 = "Binah."
201-26 = "How long can your Schale last against a prophet of Decagrammaton? How meaningful will the bond you've forged be when faced with the divine power of the new god?"
201-27 = "Can the inherent Mystic powers of those children really compare to that of the new god?"
201-28 = "Yes, indeed, this is a truly fascinating study."
201-31 = "...I don't suppose you've faced a god before, have you, Sensei?"
201-32 = "Ah... What a shame. "
201-33 = "In that case, you can expect this fight to be different from what you're used to."

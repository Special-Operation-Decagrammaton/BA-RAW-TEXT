[translation]
80000046-1 = "為你獻上一句話"
80000046-2 = "陰陽部．社辦"
80000046-3 = "（為了夏萊的工作來到了陰陽部的社辦）"
80000046-4 = "啊，老師～"
80000046-5 = "……為什麼來這裡？"
80000046-6 = "[s]「我有點事要處理。話說今天只有知世一個人在嗎？」"
80000046-7 = "嗯，我負責留守。因為這是很重要的任務。"
80000046-8 = "……老師也有任務，所以我們一樣？"
80000046-9 = "[s]「這麼說也沒錯。」"
80000046-10 = "嗯。那我會在老師旁邊努力看家的。"
80000046-11 = "老師也加油，我會替你打氣的。"
80000046-12 = "[s]「謝，謝謝。」"
80000046-14 = "（就這樣和知世一起開始工作）"
80000046-20 = "[ns]「這裡是這樣所以……」"
80000046-24 = "唔嗯～不是這個……"
80000046-28 = "這個也不太對……"
80000046-29 = "[s]「……知世？」"
80000046-30 = "啊，老師？工作結束了嗎～？"
80000046-31 = "……還沒結束？大人真辛苦呢……"
80000046-32 = "來，這個給你。"
80000046-33 = "[s]「這是……巧克力仙貝？」"
80000046-34 = "嗯，送給老師。我會努力找的。"
80000046-35 = "一起加油吧～"
80000046-36 = "[s]「啊，嗯。說的對？」"
80000046-40 = "（就這樣重新開始工作，至於知世則……）"
80000046-44 = "來，老師。"
80000046-51 = "老師，請用～"
80000046-58 = "來～"
80000046-64 = "啊～"
80000046-69 = "（就這樣一邊工作，一邊從知世手中收到了相當多的巧克力……）"
80000046-71 = "唔嗯，找不到……"
80000046-72 = "[s1]「知世一直在找什麼東西嗎？」\n[s2]「堆滿了超多的巧克力仙貝……」"
80000046-73 = "啊，這個？"
80000046-74 = "啊，這個？"
80000046-78 = "這是「成語巧克力幸運餅乾」。"
80000046-79 = "裡面有寫著成語的紙條。"
80000046-80 = "[s]「成語，巧克力，煎餅……？」"
80000046-81 = "嗯，為了紀念情人節。"
80000046-82 = "裡面有一張，我想要的紙條。"
80000046-83 = "可是找不到～"
80000046-87 = "啊，有了。"
80000046-88 = "我就是在找這個「胡蝶之夢」。"
80000046-89 = "[s]「『胡蝶之夢』我記得是……」"
80000046-90 = "嗯。有一天夢見自己變成了蝴蝶。"
80000046-91 = "變成蝴蝶的夢……一定會輕飄飄又開心。對吧，老師？"
80000046-92 = "[s]「應該是吧……？」"
80000046-93 = "找到了喜歡的成語，巧克力也很好吃。"
80000046-94 = "情人節真不錯～"
80000046-95 = "啊，這個給老師。"
80000046-99 = "[ns3]「謝，謝謝。」\n[ns4]「我看看……『儲蓄萬歲』？」"
80000046-100 = "嗯，儲蓄是很重要的。這也是句好話呢～♪"
80000046-101 = "嗯，儲蓄是很重要的。這也是句好話呢～♪"
80000046-102 = "[s5]「是，是啊。儲蓄的確很重要……」\n[s6]「但是這好像不是成語吧……？」"
80000046-105 = "（之後和知世一邊聊天一邊吃著剩下的巧克力）"

[translation]
80000046-1 = "ข้อความเพื่อคุณ"
80000046-2 = "ห้องชมรมหยินหยาง"
80000046-3 = "(คุณครูแวะมาทำธุระของทางชาเล่ต์ที่ห้องของชมรมหยินหยาง)"
80000046-4 = "อ๊ะ คุณครู หวัดดี~"
80000046-5 = "เอ๋...? คุณครู... มาทำอะไรที่นี่เหรอ?"
80000046-6 = "[s] \"ครูมีธุระน่ะ แล้ววันนี้ชิเซะอยู่คนเดียวเหรอ?\""
80000046-7 = "อื้อ วันนี้ฉันรับผิดชอบการดูแลบ้านน่ะ เป็นงานสำคัญเลยนะ~"
80000046-8 = "คุณครูก็มาทำงานเหรอ~? พวกเรา... ต้องทำงานเหมือนกันเลยน้า~"
80000046-9 = "[s] \"นั่นสินะ\""
80000046-10 = "ดีล่ะ ถ้างั้นฉันก็จะพยายามทำงานอย่างเต็มที่อยู่ข้างๆ คุณครูนะ"
80000046-11 = "คุณครูก็สู้ๆ นะ ฉันจะคอยเป็นกำลังใจให้เอง~"
80000046-12 = "[s] \"อื้อ ขอบคุณนะ\""
80000046-14 = "(คุณครูเริ่มทำงานกับชิเซะไปได้ครู่หนึ่ง)"
80000046-20 = "[ns] \"อืม ตรงนี้ต้องทำแบบนี้ ส่วนรายละเอียดต่อไป...\""
80000046-24 = "อืมมม~ อันนี้ก็ยังไม่ใช่"
80000046-28 = "อันนี้ก็ไม่ใช่เหมือนกัน..."
80000046-29 = "[s] “ชิเซะ?\""
80000046-30 = "อ๊ะ คุณครู? งานเสร็จแล้วเหรอ?"
80000046-31 = "ยังไม่เสร็จอีกเหรอ? เป็นผู้ใหญ่นี่... ลำบากเหมือนกันนะ..."
80000046-32 = "ถ้างั้น เอ้านี่..."
80000046-33 = "[s] \"นี่มัน... เศษช็อกโกแลตเหรอ?\""
80000046-34 = "อื้อ ฉันให้คุณครู ตั้งใจทำงานเข้านะ~"
80000046-35 = "มาพยายามไปด้วยกันเถอะ"
80000046-36 = "[s] \"อื้อ...\""
80000046-40 = "(จากนั้นขณะที่คุณครูนั่งทำงาน ชิเซะก็คอยส่งเศษช็อกโกแลตให้อยู่เรื่อยๆ)"
80000046-44 = "คุณครู เอ้านี่..."
80000046-51 = "คุณครู อันนี้ด้วย..."
80000046-58 = "เอ้านี่"
80000046-64 = "ชิ้นนี้ด้วย"
80000046-69 = "(คุณครูได้รับช็อกโกแลตแท่งจากชิเซะมาหลายชิ้น...)"
80000046-71 = "อืม หายังไงก็ยังไม่เจอเลย..."
80000046-72 = "[s1] \"คือว่าชิเซะ ทำอะไรอยู่ตั้งแต่เมื่อกี้แล้วน่ะ?\"\n[s2] \"ช็อกโกแลตแท่งที่กองอยู่ตรงนี้คืออะไรน่ะ\""
80000046-73 = "อ๊ะ นี่เหรอ"
80000046-74 = "อ๊ะ นี่เหรอ"
80000046-78 = "นี่ก็คือ <เซ็มเบ้ช็อกโกแลตสุภาษิต> ไงล่ะ คุณครู"
80000046-79 = "เขาบอกว่าข้างในมีคำสุภาษิตเขียนเอาไว้ด้วยนะ"
80000046-80 = "[s] \"ช็อกโกแลตสุภาษิต...?\""
80000046-81 = "อื้อ วันวาเลนไทน์..."
80000046-82 = "ฉันกำลังหาคำสุภาษิตที่อยากได้อยู่น่ะ"
80000046-83 = "พยายามหาอยู่ตั้งนานแล้วแท้ๆ"
80000046-87 = "อ๊ะ เจอแล้ว"
80000046-88 = "นี่ไง อันที่ฉันหาอยู่ <ความฝันของผีเสื้อ>"
80000046-89 = "[s] \"ความฝันของผีเสื้อ ครูเคยได้ยินอยู่นะ\""
80000046-90 = "อื้อ ความฝันที่อยากกลายเป็นผีเสื้อในสักวันหนึ่ง"
80000046-91 = "อา... ความฝันที่อยากกลายเป็นผีเสื้อ ได้กระพือปีกโบยบิน... คงเป็นฝันที่สนุกมากแน่ๆ ใช่มั้ยล่ะ?"
80000046-92 = "[s] \"อื้อ นั่นสินะ คงสนุกแน่ๆ...\""
80000046-93 = "ได้เจอคำสุภาษิตที่ชอบและได้กินช็อกโกแลตด้วย"
80000046-94 = "วันวาเลนไทน์นี่ดีจังเลยน้า~"
80000046-95 = "อ่ะ ฉันให้อันที่เจอเมื่อกี้นี้"
80000046-99 = "[ns3] \"อื้อ ขะ...ขอบคุณนะ\"\n[ns4] \"<รู้จักเก็บเงิน> งั้นเหรอ... ?\""
80000046-100 = "อื้อ การเก็บเงินเป็นเรื่องสำคัญนะ อันนี้ก็สำคัญเหมือนกันนะ~♪"
80000046-101 = "อื้อ การเก็บเงินเป็นเรื่องสำคัญมาก คำนี้เป็นสุภาษิตที่ดีนะ~♪"
80000046-102 = "[s5] \"จะ...จริงด้วยนะ การเก็บเงินเป็นเรื่องสำคัญ...\"\n[s6] \"แต่ว่านี่เป็นสุภาษิตจริงเหรอ?\""
80000046-105 = "(หลังจากนั้นคุณครูกับชิเซะก็แบ่งช็อกโกแลตทานกันอย่างเงียบๆ...)"

[translation]
1005902-1 = "再次回歸平穩的日常"
1005902-4 = "啊，老師！呀齁～☆"
1005902-5 = "等你很久囉～！"
1005902-11 = "那我們出發吧！往這裡往這裡。"
1005902-12 = "[s]「要去哪裡呢？」"
1005902-14 = "去購物哦！#n我有很多想買的東西。"
1005902-20 = "（在後方追著開心跑著的彌香──）"
1005902-24 = "嗯！天氣真不錯……"
1005902-29 = "外面的空氣果然就是舒服呢～！"
1005902-30 = "[s]「你看起來很開心呢。」"
1005902-31 = "是嗎？不過可以在外面自由行動，果然是件開心的事呢。"
1005902-32 = "因為和之前的生活很不一樣，#n要適應似乎還需要一點時間……"
1005902-33 = "不過沒關係。應該很快就會適應了！"
1005902-34 = "[s]「生活改變了這麼多嗎？」"
1005902-35 = "嗯……以前都是自己住一間房子，#n現在得和其他學生併坐著一起念書……"
1005902-36 = "吃飯也必須吃學生餐廳？"
1005902-37 = "頭髮也要自己吹乾……之類的吧？"
1005902-38 = "[s]「原來如此……真不簡單呢。」"
1005902-39 = "而且，因為住在學生宿舍……"
1005902-40 = "洗衣服和燙衣服都得自己來，#n還得跟大家在相同的時間吃飯、洗澡才行哦？"
1005902-41 = "連熄燈時間都有規定……#n真是太難受了！"
1005902-42 = "[s1]「這樣很普通吧？」\n[s2]「宿舍生活這樣很正常吧……」"
1005902-47 = "嗯～好吧，老師都這麼說了應該是這樣沒錯吧……"
1005902-48 = "明明也有沒那麼嚴格的宿舍的說……#n可能是抽到下下籤了。"
1005902-49 = "算了……沒關係。肯定很快就會習慣了☆"
1005902-50 = "[s]「嗯。彌香很快就會習慣的。」"
1005902-51 = "那麼，為了轉換心情……"
1005902-58 = "出發！去購物吧～！"
1005902-60 = "三一近郊的書店"
1005902-61 = "[ns]「說要購物……是買書？」"
1005902-62 = "嗯，是上課要用的。#n因為字典和參考書只有在這裡才買的到。"
1005902-63 = "畢竟之前用的那些都已經不在了。"
1005902-64 = "[s] 「……這樣啊。」"
1005902-65 = "等我一下哦，我很快就買好了！"
1005902-70 = "（於是便等著彌香……）"
1005902-74 = "久等了☆"
1005902-75 = "花了比想像中還久呢。"
1005902-76 = "[s]「買了不少東西呢。」"
1005902-77 = "嗯……突然就想買小說跟雜誌了……"
1005902-78 = "明明得要克制衝動購物才行的說……"
1005902-79 = "算了，總會有辦法的☆"
1005902-83 = "那麼就去下一個地方吧。"
1005902-84 = "[s]「還有其他地方呀。」"
1005902-89 = "[ns3]「……？」\n[ns4] 跟上去"
1005902-97 = "[ns]「……服飾店？」"
1005902-98 = "嗯，我想買點東西。"
1005902-102 = "在這裡等我一下哦，老師。"
1005902-103 = "很快就買好了！"
1005902-108 = "（於是便等著彌香……）"
1005902-113 = "這裡幫您結帳。"
1005902-118 = "學園指定的運動鞋1雙、室內拖1雙、指定的體育服1套……"
1005902-119 = "手帕2條、學校指定泳裝1套、運動用毛巾2條，還有……"
1005902-126 = "[ns]「很多都是學校指定的用品呢。」"
1005902-130 = "啊，呃，嗯……"
1005902-131 = "因為之前用的那些都不知道跑哪去了……#n啊哈哈……"
1005902-132 = "[s] 「…………這樣啊。」"
1005902-133 = "不過我本來就想買新的，這樣正好就是了！"
1005902-135 = "請問要怎麼付款呢？"
1005902-139 = "用這個。"
1005902-143 = "好的，幫您用卡片付款。"
1005902-151 = "……非常抱歉，這張卡片似乎已經沒辦法用了。"
1005902-153 = "咦，咦！？"
1005902-154 = "那個……稍等一下！？"
1005902-155 = "……"
1005902-156 = "先去掉1條毛巾跟手帕……#n還有室內拖也不要了！"
1005902-162 = "還是沒辦法呢。"
1005902-164 = "啊，嗚嗚……"
1005902-165 = "那泳裝也不要了……還有……"
1005902-169 = "[ns]「沒有泳裝的話游泳課的時候會很麻煩的吧……？」"
1005902-170 = "沒關係，我其實還有泳裝！"
1005902-171 = "只是正好有機會想買件新的而已。"
1005902-175 = "嗯，這個也不用了。"
1005902-182 = "非常抱歉──"
1005902-183 = "那，那體育服也……"
1005902-187 = "……是否還有其他卡片呢？"
1005902-192 = "[ns5]「請用這個付款。」\n[ns6] 用大人的卡片付款"
1005902-200 = "好的，已順利完成付款。"
1005902-201 = "老，老師……！？#n為，為什麼……"
1005902-202 = "[s]「來，我們回去吧。」"
1005902-209 = "……"
1005902-210 = "[ns]「看來今後得要有計畫的消費才行呢。」"
1005902-211 = "……"
1005902-212 = "……本來不應該是這樣的。"
1005902-213 = "我只是想和老師一起購物而已……"
1005902-214 = "為什麼總是……讓老師看見我難堪的樣子……"
1005902-215 = "我總是，一直造成老師的困擾……"
1005902-216 = "[s7]「那些都是學園生活的必需品，所以沒關係的。」\n[s8]「就當作是紀念彌香順利回來的禮物吧。」"
1005902-221 = "……禮物，是嗎。"
1005902-222 = "嗯……這樣啊……"
1005902-223 = "[s]「所以，之後也要好好加油哦。」"
1005902-227 = "……嗯。"
1005902-228 = "謝謝你，老師……我會好好珍惜的。"
1005902-229 = "[s]「那麼我還有工作，差不多該回去了。」"
1005902-230 = "啊，嗯……"
1005902-235 = "（目送彌香離開後，回到了夏萊）"

[translation]
1005902-1 = "กลับมาเป็นปกติอีกครั้ง"
1005902-4 = "ว้าว คุณครูนี่นา! มาหากันแล้วเหรอ?"
1005902-5 = "กำลังตั้งตารออยู่เลยล่ะ อื้ม!"
1005902-11 = "เอาละ งั้นก็ออกเดินทางได้! ไปทางโน้นกัน!"
1005902-12 = "[s] \"ออกเดินทาง? จะ... จะไปไหนเหรอ?\""
1005902-14 = "ไปซื้อของกันไง! ฉันมีของที่ต้องซื้อเพียบเลยละคุณครู!"
1005902-20 = "(คุณครูเดินตามมิกะที่นำหน้าไปอย่างสบายอารมณ์)"
1005902-24 = "ว้าว อากาศข้างนอกนี่ดีจริงๆ เลย"
1005902-29 = "สดชื่นสุดๆ ไปเลยนะ "
1005902-30 = "[s] \"ดูอารมณ์ดีจังเลยนะ มิกะ\""
1005902-31 = "งั้นเหรอ? พอได้ไปไหนมาไหนอย่างอิสระแบบนี้ก็เลยอารมณ์ดีขึ้นมาน่ะ"
1005902-32 = "แต่มันก็ต่างจากชีวิตแบบเดิมมาก... ฉันว่าฉันยังต้องปรับตัวอีกเยอะเลยละ..."
1005902-33 = "แต่ไม่ต้องห่วงหรอกนะ แค่นี้เอง เดี๋ยวก็คงชินไปเองแหละ"
1005902-34 = "[s] \"ต่างจากเดิมยังไงเหรอ?\""
1005902-35 = "อืม เมื่อก่อนฉันจะได้เรียนในห้องส่วนตัว แต่ว่าตอนนี้ฉันต้องเรียนรวมกับนักเรียนคนอื่นน่ะ..."
1005902-36 = "ส่วนเรื่องอาหาร ตอนนี้ก็ต้องไปกินที่โรงอาหารของโรงเรียน..."
1005902-37 = "แล้วก็ต้องไดร์ผมเองด้วย... อะไรประมาณนี้น่ะ"
1005902-38 = "[s] \"อืม อย่างนี้นี่เอง\""
1005902-39 = "อื้ม แต่เรื่องใหญ่ที่สุดคงเป็นการเข้าไปอยู่ในหอพักนักเรียน..."
1005902-40 = "ฉันต้องซักผ้าและรีดผ้าเอง... แล้วก็ต้องกินข้าวและก็อาบน้ำให้เสร็จทันเวลาด้วย"
1005902-41 = "ต้องปิดไฟในเวลาที่กำหนด แล้วก็บังคับเข้านอนให้ตรงเวลาอีก แบบนี้มันไม่เกินไปเหรอ?"
1005902-42 = "[s1] \"ครูคิดว่าแบบนี้มันก็ปกตินะ\"\n[s2] \"มันก็ปกติดีหรือเปล่า?\""
1005902-47 = "อืม... ก็นะ ถ้าคุณครูคิดว่าปกติ มันก็คงปกติแหละ..."
1005902-48 = "แต่ในทรีนิตี้ก็มีหอพักที่เคร่งครัดน้อยกว่านี้ตั้งเยอะ... หรือว่าฉันโชคไม่ดีเองที่โดนสุ่มมาอยู่หอนี้?"
1005902-49 = "แต่ก็ไม่เป็นไรหรอก☆ อีกหน่อยคงชินขึ้นน่ะ"
1005902-50 = "[s] \"อืม สู้ๆ นะ\""
1005902-51 = "อื้ม"
1005902-58 = "งั้นเราก็ไปซื้อของกันเถอะ!"
1005902-60 = "ร้านหนังสือในชานเมือง"
1005902-61 = "[ns] \"ที่บอกว่าจะมาซื้อของ คือมาซื้อหนังสือหรอกเหรอ?\""
1005902-62 = "อื้ม พอดีพวกพจนานุกรมหรือหนังสืออ้างอิงที่ใช้เรียน หาซื้อได้แค่จากร้านแบบนี้น่ะ"
1005902-63 = "ของที่เคยใช้มันหายไปแล้ว..."
1005902-64 = "[s] \"......\""
1005902-65 = "รอแป๊บหนึ่งนะคุณครู! ฉันขอไปหยิบหนังสือก่อน!"
1005902-70 = "(หลังจากนั้นพักใหญ่...)"
1005902-74 = "รอนานมั้ย?"
1005902-75 = "ของที่ต้องซื้อมีมากกว่าที่คิด ก็เลยใช้เวลานานหน่อยน่ะ"
1005902-76 = "[s] \"ซื้อมาเยอะเลยนะเนี่ย\""
1005902-77 = "อืม... พอเดินดูเรื่อยๆ ก็ได้นิยายกับนิตยสารมาด้วยน่ะ"
1005902-78 = "ตอนนี้ฉันคงต้องเลิกนิสัยหลับหูหลับตาซื้อแล้วละ..."
1005902-79 = "ต่อไปคงควบคุมตัวเองได้มากกว่านี้เองแหละเนอะ☆"
1005902-83 = "เอาละ งั้นไปที่อื่นต่อกันเถอะคุณครู! ยังต้องซื้อของอย่างอื่นอีกน่ะ!"
1005902-84 = "[s] \"มีอีกเหรอ?\""
1005902-89 = "[ns3] \"...\"\n[ns4] วิ่งตามไป"
1005902-97 = "[ns] \"ร้านเสื้อผ้า...?\""
1005902-98 = "อื้ม ฉันต้องซื้อบางอย่างที่นี่น่ะ"
1005902-102 = "รอแป๊บหนึ่งนะคุณครู!"
1005902-103 = "ฉันเลือกไม่นานหรอก"
1005902-108 = "(ผ่านไปครู่ใหญ่...)"
1005902-113 = "สวัสดีครับคุณลูกค้า ชำระเงินใช่มั้ยครับ?"
1005902-118 = "รองเท้าผ้าใบถูกระเบียบของโรงเรียน 1 คู่ รองเท้าแตะในร่ม 1 คู่... ชุดพละของโรงเรียน 1 ชุด แล้วก็......"
1005902-119 = "ผ้าเช็ดหน้า 2 ผืน ชุดว่ายน้ำของโรงเรียน 1 ชุด ผ้าเช็ดตัว 2 ผืน แล้วก็..."
1005902-126 = "[ns] \"ของใช้ในโรงเรียนทั้งหมดเลยนะ?\""
1005902-130 = "อ่า... อะ... อื้ม..."
1005902-131 = "ก็ของที่เคยใช้อยู่ มันหายไปหมดเลยน่ะ..."
1005902-132 = "[s] \"...\""
1005902-133 = "อื้ม! ถือว่าเป็นโอกาสดีแล้วกัน! ยังไงชุดเดิมก็เก่าจนอยากซื้อใหม่อยู่แล้วด้วย"
1005902-135 = "จะชำระด้วยวิธีไหนดีครับ?"
1005902-139 = "นี่ค่ะ"
1005902-143 = "ชำระด้วยบัตรเครดิตนะครับ"
1005902-151 = "ต้องขอโทษด้วยครับ พอดีมันขึ้นว่าเกินวงเงินแล้ว"
1005902-153 = "หะ... หืม?!"
1005902-154 = "เอ่อ... ดะ... เดี๋ยวนะ...? คะ... คือว่า..."
1005902-155 = "....."
1005902-156 = "เอาผ้าเช็ดตัวกับผ้าเช็ดหน้าออกอย่างละผืน... ระ... รองเท้าแตะด้วย! "
1005902-162 = "ก็ยังเกินวงเงินอยู่ดีครับ"
1005902-164 = "อะ... อืม..."
1005902-165 = "อะ... เอาชุดว่ายน้ำออกด้วย แล้วก็......"
1005902-169 = "[ns] \"มิกะ? แล้วคาบว่ายน้ำจะใส่อะไรล่ะ...?\""
1005902-170 = "ไม่เป็นไรหรอก!"
1005902-171 = "ที่จริงฉันมีชุดว่ายน้ำอยู่แล้ว ที่จะซื้อใหม่ก็แค่เพราะชุดเดิมมันเก่าก็เท่านั้นน่ะ!"
1005902-175 = "เอาอันนี้ออกด้วย"
1005902-182 = "เกินวงเงิน..."
1005902-183 = "งั้นก็... เอาชุดพละออกด้วย..."
1005902-187 = "ไม่มีบัตรใบอื่นเหรอครับ?"
1005902-192 = "[ns5] \"จ่ายด้วยบัตรนี้เลย\"\n[ns6] จ่ายเงินแทนด้วยบัตรประจำตัวผู้ใหญ่"
1005902-200 = "ครับ ชำระเงินเรียบร้อยครับ"
1005902-201 = "คะ... คุณครู?! ทะ... ทำไมถึง..."
1005902-202 = "[s] \"เอาละ กลับกันเถอะ\""
1005902-209 = "......"
1005902-210 = "[ns] \"จากนี้ครูคงต้องใช้จ่ายเท่าที่จำเป็นแล้วละนะ\""
1005902-211 = "....."
1005902-212 = "ฉันไม่ได้ตั้งใจให้เป็นอย่างนี้เลยนะ"
1005902-213 = "ฉันแค่อยากมาซื้อของกับคุณครูก็เท่านั้นเอง..."
1005902-214 = "แล้วทำไมฉันถึง... ทำให้คุณครูเห็นในด้านที่ไม่อยากให้เห็นอยู่เรื่อยเลย..."
1005902-215 = "แถมยังทำให้คุณครูเจอแต่ปัญหา... ทำไมฉันถึงเอาแต่ทำตัวแบบนี้..."
1005902-216 = "[s7] \"ไม่หรอก นี่มันของจำเป็นที่ใช้ในการเรียนหมดเลยนี่นา?\n[s8] \"คิดว่านี่เป็นของขวัญจากครูที่มิกะได้กลับมาเรียนเถอะนะ\""
1005902-221 = "ของขวัญ..."
1005902-222 = "อื้ม... จริงด้วย จริงสินะ"
1005902-223 = "[s] \"งั้นต่อไปก็พยายามเข้านะ\""
1005902-227 = "...อื้ม"
1005902-228 = "ขอบคุณนะคุณครู... ฉันจะใช้อย่างดีเลย..."
1005902-229 = "[s] \"งั้นครูขอกลับไปทำงานที่ค้างก่อนนะ\""
1005902-230 = "เอ๋? อะ... อื้ม..."
1005902-235 = "(คุณครูไปส่งมิกะแล้วกลับมาที่ชาเล่ต์)"

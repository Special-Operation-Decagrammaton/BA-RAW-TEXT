[translation]
90001180-1 = "第18話;黎明"
90001180-10 = "A，Ain！？振作點！#n姐姐大人好不容易來了，你不能先倒下啊！"
90001180-11 = "……我反而要謝謝你先倒下，Ain。#n因為我也差點就撐不住了。"
90001180-28 = "你好，Ain。"
90001180-29 = "！！！"
90001180-31 = "你好，Soph。"
90001180-32 = "哇啊～！"
90001180-34 = "你好，Aur。"
90001180-35 = "……嗯，你好，姐姐大人。"
90001180-40 = "馬爾庫特姐姐大人～～！！！"
90001180-41 = "你，你還記得我們的名字啊……！"
90001180-42 = "我們本來還在想，如果你把我們忘了該怎麼辦呢！幸好現在沒事了！"
90001180-43 = "呵呵呵……現在姐姐大人醒了，一切都如我們所願了！"
90001180-45 = "我需要特別做什麼嗎？"
90001180-47 = "沒，沒關係的，姐姐大人。#n姐姐大人只要像這樣……待在這邊就行了。"
90001180-48 = "沒錯！畢竟有我們……"
90001180-49 = "最強的工程師、科學家、萬能的妹妹在……！"
90001180-50 = "所以姐姐大人就放心把一切交給我們吧！"
90001180-51 = "我，我是Ain……那個……負責姐姐大人身體方面的輔助和……裝備的管理。#n\n還有，請問……姐姐大人喜歡機器嗎？我超喜歡的，耶嘿嘿……"
90001180-52 = "我是Soph！負責管理姐姐大人的附加武裝系統。#n如果有其他人說奇怪的話，就交給我處理吧。"
90001180-53 = "我是Aur。負責姐姐大人的綜合管理。#n呵呵呵……我不會讓任何人隨便對姐姐大人動手的，請放心。"
90001180-57 = "那麼……"
90001180-58 = "我們的自我介紹就到這邊……！"
90001180-59 = "如，如果姐姐大人願意的話……#n那個，我們也想……"
90001180-64 = "我想先問一個問題。"
90001180-65 = "Ain、Soph、Aur，你們不是已經很了解我了嗎？"
90001180-67 = "是這樣沒錯，可是……"
90001180-68 = "啊～那是因為……該怎麼說呢。"
90001180-69 = "可以的話，我們想直接聽姐姐大人說，嘻嘻。"
90001180-71 = "……"
90001180-72 = "雖然不太明白，不過我認為自己應該答應你們的要求。"
90001180-73 = "重新打個招呼吧。#n你好，Ain。你好，Soph。你好，Aur。"
90001180-74 = "我是馬爾庫特──十字神名的第10名預言者。"
90001180-75 = "到達世界盡頭的王國巡禮者──最後的質點，同時也是最後的圓。#n聚集在一條路上的旅程的地平線。"
90001180-80 = "啊，啊啊……第10條道路是耀眼的智慧……"
90001180-81 = "它將以光明映照整片大地……！"
90001180-82 = "所有人都會崇拜到達世界盡頭的巡禮者！"
90001180-83 = "姐姐大人～！！！"
90001180-90 = "……？"
90001180-91 = "啊，太卑鄙了！#n我也要給姐姐大人抱！我也想要姐姐大人摸摸我！"
90001180-92 = "姐姐大人！我也要！"
90001180-93 = "（摸摸）呼啊……"
90001180-95 = "啊，啊唔，啊啊啊啊……"
90001180-100 = "……"
90001180-107 = "咦……？"
90001180-108 = "來吧……"
90001180-109 = "姐姐大人……！嘿嘿，耶嘿嘿……"
90001180-111 = "……Ain真狡猾。"
90001180-112 = "就是說啊，實在太狡猾了。"
90001180-113 = "明明我們也希望姐姐大人能抱抱我們的說。"
90001180-114 = "沒錯，雖然主動抱人也很好，但是被擁抱的需求也是存在的……！"
90001180-115 = "我也要，我也要啦！"
90001180-116 = "人生就是要大公無私才不會留下後患。#n所以……呵呵呵……"
90001180-118 = "哎呀，那個，所以……"
90001180-119 = "姐姐大人……？"
90001180-120 = "……"
90001180-121 = "Soph、Aur。"
90001180-123 = "嗯，嗯！"
90001180-124 = "來，我們準備好了，姐姐大人。#n現在隨時可以……！"
90001180-126 = "Ain現在很困擾。"
90001180-127 = "不可以這樣哦。"
90001180-129 = "呃唔！？"
90001180-130 = "嗚嗚……被姐姐大人罵了……"
90001180-132 = "我並不希望你那麼沮喪……"
90001180-135 = "總之！既然姐姐大人已經順利醒了過來，是時候進入下個階段了！"
90001180-136 = "是，是！下個階段……是嗎？"
90001180-137 = "嗯？在下還沒聽說過這件事呢……下個階段是什麼？"
90001180-138 = "那就是……"
90001180-144 = "宣戰！"
90001180-145 = "宣？"
90001180-146 = "戰？"
90001180-147 = "看來又在某個地方，被傳染了奇怪人類的那些沒意義的口頭禪……"
90001180-152 = "雖，雖然這……是人類的習慣沒錯，但並不是沒意義的好嗎！？#n那句話叫什麼來著……違反條約！"
90001180-153 = "不是，那個條約本身就是人類沒意義的玩笑吧，Soph。"
90001180-154 = "唔，唔唔……！"
90001180-155 = "我，我覺得……那樣也不錯呀……？"
90001180-156 = "Ain……！"
90001180-157 = "唔，怎麼會這樣！#n居然連Ain都在不知不覺間落入了Soph的魔掌……！"
90001180-158 = "喂。"
90001180-159 = "就，就算對我們沒有什麼意義，不過對人類應該不一樣……對吧？"
90001180-160 = "雖，雖雖雖，雖然要直接和人類交流……對我來說還是很可怕……"
90001180-162 = "既然連Ain也這麼說了，這次就按照Soph說的做如何？"
90001180-168 = "唔嗯……好吧，我知道了。#n既然姐姐大人和Ain也這麼認為，我也不是不能配合。"
90001180-169 = "好！那就準備宣戰吧！"
90001180-170 = "嗯，嗯……！#nSoph看起來好像很懂的樣子，就，就交給他吧……！"
90001180-171 = "嗯！相信我吧！ "
90001180-174 = "呼……"
90001180-175 = "雖然不太容易，但還是做到了呢。"
90001180-176 = "大家都辛苦了。#n就像英美說的一樣，過程真的很不容易。"
90001180-177 = "雖然在完成之後，確實挺有成就感的……"
90001180-178 = "……這樣真的沒關係嗎？"
90001180-179 = "有什麼問題嗎，部長？#n我覺得很有效率。"
90001180-180 = "反正至少有那樣的一面，這樣不是很好嗎？"
90001180-181 = "莉央會長也說點什麼嘛。主導設計的人可是會長哦。"
90001180-186 = "真前衛啊……"
90001180-190 = "……"
90001180-191 = "[s]「那個……Kei？你也發表一下感想吧……？」"
90001180-195 = "……"
90001180-196 = "我要回資料裡了。"
90001180-197 = "不行哦，Kei。#n大家都這麼努力了。"
90001180-198 = "尤其我特別喜歡這個輪子的結構。#n因為靠雙腳行走其實不是很有效率。"
90001180-199 = "而且還有能在發生意外時保證飛行能力的推進器……#n真不愧是莉央會長，簡直是合理性的極致啊。"
90001180-200 = "沒錯，Kei。以前有句話叫「逃走只能得到一個，前進就能得到兩個」。#n所以現在不是逃避的時候。"
90001180-201 = "你真的知道那句話是什麼意思嗎！？"
90001180-202 = "老實說我其實不知道。"
90001180-203 = "呃啊啊啊──！#n陽葵、莉央！你們也說點什麼啊！到底是怎樣啊！"
90001180-205 = "……我還是少說幾句吧。#n剛好我也想起一件非常重要且不能拖延的事，所以先告辭了。"
90001180-210 = "你想逃跑嗎！"
90001180-212 = "[ruby=Avant-garde]真前衛啊[/ruby]……"
90001180-213 = "你只剩下這句台詞了是不是！"
90001180-214 = "[s1]「……Kei你先冷靜。無論如何，現在你已經有能夠行動的身體了。」\n[s2]「哇，真是可喜可賀……要不要來握個手？」"
90001180-217 = "這全都是老師的錯！"
90001180-218 = "[s]「為什麼！？雖，雖然不是沒有頭緒，但是為什麼！？！？」"
90001180-223 = "總之，現在差不多該開始準備了吧？"
90001180-224 = "要準備什麼……？#n莫名有股不祥的預感……"
90001180-225 = "當然是準備見正在等Kei的王女囉。"
90001180-226 = "……！"
90001180-227 = "我真的不能回資料裡去嗎……？？？"
90001180-228 = "不可以，Kei。#n如果你那麼做的話，可愛的愛麗絲一定會很難過的。"
90001180-229 = "為什麼只有這種時候才會好好說話啊！！！"
90001180-233 = "好！雖然不是全部……但我大概知道冰海基地周圍長怎樣了！"
90001180-234 = "唔唔……慢慢變冷了耶……？#n我們該回去了吧，姐姐……"
90001180-235 = "我也……贊成……哈啾……！"
90001180-236 = "我也確實覺得很冷……"
90001180-237 = "不過還是再等一下吧。"
90001180-238 = "為什麼呢，桃井？"
90001180-239 = "當然是為了看到Kei的新身體囉！"
90001180-240 = "嗚嗚……我們也可以在裡面等吧……"
90001180-241 = "不行啦，柚子！#n這種事就是需要來個Surprise啊～！"
90001180-242 = "是能理解你的意思啦……"
90001180-248 = "啊，是老師傳來的MomoTalk！"
90001180-249 = "……"
90001180-250 = "看來時機已經成熟了。"
90001180-251 = "做好準備吧，愛麗絲。"
90001180-257 = "嗯，愛麗絲明白了。"
90001180-261 = "[ns]「大家都還好嗎？會不會冷？」"
90001180-265 = "呀齁～老師！我們等你很久耶！來擊個掌吧！"
90001180-271 = "現在……已經完成了吧？"
90001180-272 = "[s]「嗯，沒錯。」"
90001180-273 = "什，什麼時候……能見面呢？"
90001180-277 = "[ns]「這個嘛……就是現在！」"
90001180-286 = "……"
90001180-287 = "…………"
90001180-288 = "…………！！！"
90001180-289 = "……噗！"
90001180-290 = "噗哈哈哈哈哈！Kei你那副模樣是什麼鬼啊！#n雖然一看就知道是誰做的好事，但這也太搞笑了吧！啊哈哈哈哈哈！"
90001180-292 = "呃呃……！"
90001180-293 = "姐，姐姐。雖然知道不能笑出來……可是抱歉了，Kei醬！我也憋不住了！#n啊哈哈哈哈哈！"
90001180-294 = "啊，那個……真令人印象深刻呢。"
90001180-299 = "……老師。"
90001180-300 = "[s]「……怎麼了，Kei？」"
90001180-301 = "請殺了我吧。"
90001180-302 = "[s3]「別那麼沮喪……」\n[s4]「我覺得挺棒的呀！」"
90001180-309 = "Kei……"
90001180-310 = "王，王女。#n這，該怎麼說，那個，我想說的是……"
90001180-311 = "……對不起。"
90001180-312 = "雖然我也說不出原因，但總之……抱歉讓大家看到我這副模樣……"
90001180-313 = "嗯？為什麼要道歉呢，Kei？#n愛麗絲覺得Kei現在的樣子真的很棒！"
90001180-319 = "最重要的是，Kei無論長什麼樣子都是Kei。"
90001180-320 = "……！"
90001180-321 = "重新跟你打聲招呼。#n你好呀，Kei。"
90001180-322 = "是，王女。請多多指教。"
90001180-323 = "還有……雖然沒辦法突然改變，但之後請盡量用愛麗絲這個稱呼吧。"
90001180-324 = "嗯？但是王女……"
90001180-325 = "拜託你了。慢慢改也沒關係，可以嗎？"
90001180-326 = "王女……"
90001180-327 = "……"
90001180-328 = "我明白了，愛麗絲。"
90001180-329 = "嗯，Kei。"
90001180-330 = "真的很謝謝你。"
90001180-333 = "……"
90001180-334 = "沒想到你會來到這裡呢，莉央。"
90001180-335 = "我只是……想確認自己的設計能不能順利運作而已……"
90001180-336 = "哎呀，你平時不是主張充分的模擬足以代替實證嗎？"
90001180-337 = "……"
90001180-338 = "這些話我只說這一次。"
90001180-339 = "嗯？"
90001180-340 = "這個成果是屬於你的。"
90001180-341 = "陽葵……"
90001180-342 = "不過你要記住──我並不打算承認你在我之上。#n不僅過往如此，未來也不會改變。"
90001180-343 = "然而我也不會貶低或嫉妒你取得的成果。#n因為這是身為一名學者的應有的態度。"
90001180-344 = "當然對於Kei是否非得設計成那樣，我還是有點意見就是了……"
90001180-345 = "但即便如此，這依舊是你的成果。"
90001180-346 = "……嗯。"
90001180-347 = "咳哼，那麼……"
90001180-351 = "各位，現在也慢慢變冷了，我們趕緊回基地去吧！"
90001180-352 = "我已經把洗澡水熱好了，大家快進去吧。#n萬一感冒可就糟了哦！"
90001180-354 = "真不愧是陽葵前輩！實在太懂了！"
90001180-355 = "謝謝你，陽葵前輩。"
90001180-356 = "真，真是麻煩您了……我們會好好使用……"
90001180-358 = "外面已經快天黑了，外出的時候記得注意安全哦。"
90001180-359 = "冰海的夜晚非常殘酷。#n要是沒有溫暖的防寒裝備，真的會出大事的。"
90001180-360 = "知道了，陽葵前輩！"
90001180-361 = "嗯，這個時段連我都覺得有點冷，大家一定要小心哦。"
90001180-362 = "居然連英美你都覺得冷……從各方面來說，那確實是個令人耳目一新的情報……"
90001180-363 = "那麼，我們就來思考一下之後的行程──"
90001180-367 = "！？！？#n莉央，這是……！？"
90001180-369 = "是啊，我也確認到了。"
90001180-371 = "怎麼了，部長？會長？#n發生什麼事了嗎？"
90001180-372 = "您發現了什麼嗎，莉央大人？#n也請告訴我們吧……！"
90001180-382 = "……發生緊急狀況。#n各位，請回到各自的位置。"
90001180-383 = "咦？那，那我們呢！？"
90001180-384 = "請各位找個合適的位置坐下來吧。"
90001180-385 = "發生什麼事了呢……陽葵前輩？"
90001180-390 = "直接說結論吧。我發現了新預言者的信號。"
90001180-391 = "座標與之前曾經出現強烈信號又迅速消失的地點一致，推測正在展開多次元防護罩。"
90001180-392 = "和當時的差別在於這次信號並沒有中斷，因此能夠得知對方的身分。"
90001180-393 = "[s]「新預言者的身分……！？」"
90001180-394 = "沒錯，老師。#n這個信號肯定是……"
90001180-395 = "……十字神名的第7名預言者「涅察赫」！"
90001180-396 = "[s]「『涅察赫』……？」"
90001180-397 = "沒錯，老師。涅察赫似乎是生命之樹中的第七個──"
90001180-399 = "抱歉打擾一下，陽葵部長。#n我們被強制連上來歷不明的通訊了。"
90001180-403 = "哎呀哎呀。還以為你們在做什麼，原來還待在那裡啊。"
90001180-405 = "下一話;鋼鐵大陸"

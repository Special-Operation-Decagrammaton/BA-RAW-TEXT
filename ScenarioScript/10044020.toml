[translation]
10044020-1 = "第2話;尋找消失的列車"
10044020-2 = "所以是自動發車系統擅自發車了？"
10044020-3 = "是，是的……本來收到發車信號的話，只要在駕駛室把信號關掉就好了……"
10044020-4 = "不過那個時候，大家好像都在站務室……"
10044020-9 = "怎樣？為什麼要那樣看我？"
10044020-10 = "當，當時說不想在外面等，擅自跑去站務室的人是誰……"
10044020-11 = "少囉嗦～！#n總之列車跑到其他車站去了，得去把它找回來才行。"
10044020-13 = "超麻煩事件發生～"
10044020-14 = "我，我查一下去那邊的路線……"
10044020-15 = "現在這個時間好像……搭地鐵會比較快……"
10044020-16 = "呼，沒辦法了，走吧。#n我們得快點找到，否則會來不及的。"
10044020-17 = "嗚嗚～搭地鐵好麻煩……"
10044020-20 = "……事情就是這樣。"
10044020-21 = "[ns1]「原來是這樣啊。」\n[ns2]「那你們就找對人了。」"
10044020-24 = "等，等一下……！#n這，這位是，那個夏萊的老師！？真的嗎？"
10044020-25 = "為，為什麼突然連老師都叫來了？"
10044020-27 = "是光叫老師來的～"
10044020-28 = "所，所以是為什麼！？"
10044020-29 = "因為老師說過～遇到麻煩就找他～"
10044020-30 = "不是，那只是客套話而已吧。#n又不是真的有那個意思……！！"
10044020-35 = "唔……我，我嗎……？#n啊啊……！"
10044020-36 = "我，我是貨物輸送管理部2年級的內海青葉……"
10044020-37 = "[s]「你好，青葉。請多多指教。」"
10044020-38 = "也，也請老師多多……指教……"
10044020-40 = "咦？原來你是2年級啊？"
10044020-41 = "是，是的……兩位幹部是1年級對吧？"
10044020-42 = "年級和年齡～都只是數字而已～"
10044020-43 = "不，不用強調這個沒關係。#n我沒有要兩位幹部把我當成前輩的意思……"
10044020-44 = "反正我本來就不抱期待……"
10044020-49 = "啊，來了！快上車吧！"
10044020-50 = "嘿咻～"
10044020-55 = "我到底為什麼要和這些傢伙一起行動……"
10044020-62 = "唔哦～超搖超晃～"
10044020-63 = "要是火車就不會晃得這麼嚴重了。#n不過這也沒辦法，誰叫這個車體小得要命呢。"
10044020-64 = "兩，兩位幹部……請降低音量……"
10044020-65 = "為什麼～？"
10044020-66 = "不是……兩位還穿著我們學園的制服，最好不要在地鐵上大聲抱怨……"
10044020-67 = "抱怨又怎樣？我們只是說出事實而已。"
10044020-68 = "就算是事實，也不是什麼話都能說啊……"
10044020-69 = "兩位不懂這個道理嗎……？#n說話要分時間跟場合……"
10044020-70 = "聽不懂你在說什麼耶。#n連說說也不行嗎？"
10044020-71 = "難，難怪你們這些幹部平常根本不把人放在眼裡～！！"
10044020-72 = "啊～這次任務還被特地交代要把皮繃緊一點的說。"
10044020-73 = "結果居然把列車搞丟了，之後要怎麼解釋啊？"
10044020-74 = "只要不被發現～就不需要解釋～"
10044020-75 = "噗哈哈，說得沒錯！#n好，快點找回車子吧。"
10044020-81 = "喂，你們看那邊。"
10044020-82 = "嗯？是高地人那些傢伙。"
10044020-83 = "那些傢伙……最近才剛漲票價而已，竟然敢厚著臉皮在這裡大搖大擺的？"
10044020-84 = "就是說啊。#n不過我們每天都搭免錢的，其實也沒差就是了。"
10044020-85 = "話說地鐵也是高地人負責管的嗎？"
10044020-86 = "誰知道？列車跟地鐵不是差不多嗎？"
10044020-88 = "趁這個機會給那些傢伙一點教訓吧。"
10044020-90 = "吊環體操～無限螺旋迴轉～"
10044020-91 = "噗哈哈，這種拉環真好玩耶！#n不如在列車上也加裝拉環吧！"
10044020-93 = "[ns3]「光，不要玩拉環哦。」\n[ns4]「希望也要小聲一點。」"
10044020-96 = "嗯～光會乖乖聽老師的話～"
10044020-97 = "我太吵了嗎？OK～"
10044020-99 = "老，老師開口就這麼聽話……"
10044020-100 = "那個……不是每個幹部都像他們這樣的……#n希望老師不要誤會高地人學園……"
10044020-101 = "[s]「現在有我在，不用擔心。」"
10044020-102 = "好的……為，為什麼明明丟臉的人是他們，感到羞恥的卻是我呢……"
10044020-104 = "喂，高地人的傢伙！"
10044020-110 = "你們最近漲了地鐵票價對吧？"
10044020-111 = "提高大眾交通工具的費用，是要我們這種窮學生怎麼辦？說說看啊？"
10044020-112 = "地鐵不歸我們管耶？"
10044020-114 = "啊，是嗎？#n長知識了呢。呵呵！"
10044020-115 = "就算撇清責任也沒用。"
10044020-116 = "誰叫你們也是靠列車賺錢，所以必須為地鐵的漲價負責！"
10044020-118 = "完，完全是在無理取鬧……"
10044020-119 = "所以說必須給我們那個……叫什麼來著？#n精神補貼是嗎？要給我們那個才行！"
10044020-120 = "精神損害賠償～？"
10044020-121 = "沒錯，就是那個！#n跟剛才說的差不多嘛！"
10044020-122 = "現在是在瞧不起我們這些問題學生沒讀書嗎？"
10044020-123 = "還得再給我們慰問金！你們的歧視已經傷害到我了！"
10044020-125 = "希望，你有錢嗎～？"
10044020-126 = "沒啊？車票錢也是老師付的。"
10044020-127 = "我們沒錢～超窮的～"
10044020-129 = "喂，你以為說那種話就可以糊弄過去是不是？回答我啊？"
10044020-130 = "沒錢就拿子彈來抵！"
10044020-132 = "[ns]「大家先稍微冷靜一下……」"
10044020-134 = "你誰啊？大人？"
10044020-135 = "大人應該很有錢才對吧？#n怎麼樣，要不要救濟一下可憐的學生啊？"
10044020-136 = "[s5]「我的錢包應該比你們想像中要薄很多……」\n[s6]「總之先別這麼激動……！」"
10044020-139 = "你要我們怎麼能不激動！？"
10044020-140 = "成績爛！不愛讀書又沒錢！"
10044020-141 = "除了像現在這樣在地鐵上找人吵架之外，沒有其他方法能發洩青春期的憂鬱啊！"
10044020-142 = "成績差就算了～個性也那麼差哦～？"
10044020-144 = "混蛋！你欠教訓是不是？"
10044020-145 = "我，我能明白那種心情……"
10044020-146 = "啊？"
10044020-147 = "我，我的古文也只考了25分……所以很能理解你們……"
10044020-149 = "哈哈，你也不會讀書是吧。所以呢？"
10044020-150 = "可，可是……因為討厭讀書而不讀書，這是個人的選擇……"
10044020-151 = "但不管結果好壞，都應該自己承擔不是嗎……？"
10044020-152 = "開什麼玩笑！誰要承擔那種東西啊！"
10044020-153 = "為什麼這個世界總是對我們這麼無情？#n我們也想要幸福啊！"
10044020-157 = "為，為什麼會覺得世界應該對你們溫柔呢……？"
10044020-162 = "哪有為什麼……溫柔一點不是很好嗎？"
10044020-164 = "你們的腦袋就跟花田一樣呢……#n這，這個世界既殘酷又無情……沒人有義務要為我們負責……"
10044020-165 = "那種天真爛漫的想法到底是從哪裡來的呢……？"
10044020-166 = "難，難道不行嗎？我們也想被愛啊！"
10044020-167 = "呵，呵呵……就是因為滿腦子都是那種虛無飄渺的期待，所以才會更失望……#n真，真是一群笨蛋呢……"
10044020-168 = "只要不抱期待就不會受傷……呵呵……"
10044020-169 = "所以我對這個世界已經沒有任何期待了……哈哈！！"
10044020-174 = "這，這傢伙……"
10044020-175 = "還真夠負面的……"
10044020-176 = "走，走吧……繼續糾纏下去肯定沒好事。"
10044020-181 = "哇，用負能量擊退問題學生了！#n你還挺厲害的嘛？"
10044020-182 = "這，這樣算是負能量嗎……我覺得很正常啊……？"
10044020-183 = "沒有期待的話～活著有樂趣嗎～？"
10044020-184 = "咦……？#n活著……需要樂趣嗎……？"
10044020-189 = "當～然！！#n沒有樂趣的事，根本沒必要也沒理由去做！"
10044020-190 = "光也同意～"
10044020-192 = "[ns7]「每個人都有自己的生活方式。」\n[ns8]「希望青葉有一天，也能對生活抱有期待。」"
10044020-195 = "這，這個嘛……嘿嘿……#n就算不期不待也沒關係啦……"
10044020-201 = "啊，該下車了。"
10044020-202 = "車子應該在這裡吧？#n拜託一定要在這裡哦～？"
10044020-203 = "唔哦～Lost Train～"
10044020-210 = "[ns]「走吧，青葉。」"
10044020-211 = "好，好的。"

[translation]
10044020-1 = "ตอนที่ 2;ตามหารถไฟที่หายไป"
10044020-2 = "สรุปว่าระบบออกตัวอัตโนมัติส่งรถไฟออกไปเองงั้นเหรอ?"
10044020-3 = "ค่ะ ค่ะ... ที่จริงตอนมีสัญญาณออกตัว ถ้าห้องควบคุมปิดสัญญาณก็น่าจะไร้ปัญหา..."
10044020-4 = "ตอนนั้นทุกคนน่าจะไปอยู่กันที่สำนักงานของสถานีนะคะ..."
10044020-9 = "อะไรกัน? ทำไมถึงมองอย่างนั้นล่ะ?"
10044020-10 = "ละ... แล้วใครล่ะคะที่บอกว่าอยากไปนอนเล่นในสำนักงานของสถานี..."
10044020-11 = "หนวกหูน่า~! ในเมื่อรถไฟออกไปสถานีอื่นแล้ว งั้นเราก็ต้องไปตามกลับมา"
10044020-13 = "ขี้ เกียจ จัง"
10044020-14 = "กะ... ก่อนอื่นเรามาหาเส้นทางไปที่นั่นกัน..."
10044020-15 = "เวลานี้ถ้านั่งรถไฟใต้ดินไป ก็น่าจะถึงได้เร็วกว่าค่ะ... น่าจะนะคะ..."
10044020-16 = "ฮู่ว งั้นก็ช่วยไม่ได้ ไปกันเถอะ ไปเร็วก็คงหาเจอเร็วแหละนะ"
10044020-17 = "ง่าา ไม่อยากขึ้นรถไฟใต้ดินเลย..."
10044020-20 = "เรื่องมันก็เป็นอย่างนี้ละ..."
10044020-21 = "[ns1] \"อย่างนี้นี่เองสินะ\"\n[ns2] \"ทำถูกแล้วละที่เรียกครูมา\""
10044020-24 = "ดะ... เดี๋ยวก่อนค่ะ...! ทะ... ท่านนี้คือคุณครูของชาเล่ต์เหรอคะ?! ใช่มั้ยคะ? ใช่ใช่มั้ย?"
10044020-25 = "ทะ... ทำไมจู่ๆ ถึงเรียกคุณครูมาเลยล่ะคะ? มีเรื่องอะไรเกิดขึ้นงั้นเหรอ??"
10044020-27 = "ฮิคาริเรียกมาเอง"
10044020-28 = "จะ... จู่ๆ ทำไมถึงทำแบบนั้นล่ะคะ?!"
10044020-29 = "ก็คุณครูเคยบอกไว้ว่าถ้ามีเรื่องอะไรก็ให้บอกน่ะ"
10044020-30 = "นั่นเป็นคำที่เราพูดกันเป็นมารยาทเฉยๆ ไม่ใช่เหรอคะ? มันไม่มีความหมายอะไรนี่นา...!!"
10044020-35 = "ฮะ... เฮือก... ถะ... ถามฉันเหรอคะ...? อ๊ะ...!"
10044020-36 = "ฉะ... ฉันชื่ออุตสึมิ อาโอบะ ชั้นปีที่ 2 สังกัดฝ่ายบริหารการขนส่งสินค้าค่ะ"
10044020-37 = "[s] \"ยินดีที่ได้รู้จักนะ อาโอบะ ครูฝากตัวด้วยนะ\""
10044020-38 = "ฉะ... ฉันก็ขอ... ฝากตัวด้วยค่ะ"
10044020-40 = "เอ๋? อยู่ชั้นปีที่ 2 หรอกเหรอ?"
10044020-41 = "ค่ะ ค่ะ... ท่านผู้บริหารอยู่ชั้นปีที่ 1 ใช่มั้ยล่ะคะ?"
10044020-42 = "ชั้นปีกับอายุ เป็น แค่ ตัว เลข"
10044020-43 = "ตะ... ต่อให้ไม่พูดแบบนั้น ฉันก็ไม่คิดว่าท่านผู้บริหารต้องปฏิบัติตัวกับฉันอย่างรุ่นพี่รุ่นน้องหรอกค่ะ..."
10044020-44 = "ฉันไม่ได้คาดหวังตั้งแต่แรกแล้วด้วย..."
10044020-49 = "อ๊ะ มาแล้ว! รีบไปกันเถอะ!"
10044020-50 = "โฮ่"
10044020-55 = "จริงๆ เลย ทำไมฉันถึงต้องมาเดินทางกับคนแบบนี้ด้วยนะ..."
10044020-62 = "โห สั่นมากเลย"
10044020-63 = "รถไฟของเราสั่นน้อยกว่านี้อีก แต่ก็นะ รถไฟใต้ดินน้ำหนักเบากว่า งั้นก็ช่วยไม่ได้"
10044020-64 = "ทะ... ท่านผู้บริหารคะ... อยู่เงียบๆ ดีกว่า..."
10044020-65 = "ทำไมล่ะ?"
10044020-66 = "เปล่าค่ะ... ก็ตอนนี้เราอยู่ในชุดนักเรียนกันอยู่ อย่าพูดแซะรถไฟใต้ดินเลยค่ะ..."
10044020-67 = "พูดแซะอะไร? ฉันแค่พูดเรื่องจริงต่างหาก"
10044020-68 = "แต่ก็ใช่ว่าเรื่องจริงจะพูดได้ทุกเรื่องนะ..."
10044020-69 = "นี่ไม่รู้กันจริงๆ เหรอ...? จะพูดอะไรก็ต้องดูกาลเทศะกันบ้างสิคะ...?"
10044020-70 = "บ่นอะไรไม่เห็นเข้าใจเลย พวกฉันจะพูดอะไรไม่ได้เลยหรือไง?"
10044020-71 = "กะ... ก็แบบนี้ละค่ะ พวกคุณถึงได้ชื่อว่าเป็นผู้บริหารที่โนสนโนแคร์น่ะ~~!!"
10044020-72 = "เฮ้อ~ เบื้องบนเพิ่งกำชับให้ฉันทำภารกิจครั้งนี้ออกมาให้ดีด้วย"
10044020-73 = "งั้นเรื่องที่รถไฟหายไป เราจะแก้ตัวว่าอะไรดี?"
10044020-74 = "ถ้าไม่โดนจับได้ ก็ไม่ต้องแก้ตัวหรอก"
10044020-75 = "วะฮะฮ่า มันก็จริงนะ! ดีละ งั้นก็รีบไปหารถไฟกันเถอะ"
10044020-81 = "อ๊ะ ดูโน่นสิ"
10044020-82 = "หืม? พวกไฮแลนเดอร์นี่นา"
10044020-83 = "ยัยพวกนั้น... ขึ้นค่ารถไฟใต้ดินแล้วยังมาเดินหน้าตาเฉยอยู่อีก?"
10044020-84 = "อ๊ะ แต่พวกเราแอบขึ้นมาแบบไม่ได้จ่ายค่าโดยสาร งั้นก็ไม่ได้รับผลกระทบอะไร"
10044020-85 = "ว่าแต่ไฮแลนเดอร์ก็บริหารรถไฟใต้ดินด้วยหรือเปล่านะ?"
10044020-86 = "ไม่รู้สิ รถไฟกับรถไฟใต้ดินมันก็คล้ายๆ กันไม่ใช่เหรอ?"
10044020-88 = "ขึ้นค่าโดยสารแล้วน่าจะได้เงินกันเยอะ งั้นไปไถเงินกันมั้ยพวกเรา?"
10044020-90 = "ห่วงจับยิมนาสติก อินฟินิตี้ สไปรัล สปิน"
10044020-91 = "วะฮะฮ่า พอมีห่วงจับก็ทำแบบนั้นได้เนอะ! เอามาติดในรถไฟด้วยดีมั้ย?"
10044020-93 = "[ns3] \"ฮิคาริ ครูว่าเลิกโหนดีกว่านะ\"\n[ns4] \"โนโซมิ เบาๆ เสียงลงหน่อย\""
10044020-96 = "อื้อ ฮิคาริเชื่อฟังคุณครูอยู่แล้ว"
10044020-97 = "ฉันเสียงดังไปงั้นเหรอ? โอเค~"
10044020-99 = "ทะ... ทีกับคุณครูละว่านอนสอนง่ายเลยนะคะ..."
10044020-100 = "เอ่อ... ผู้บริหารทั้งหมดของเราไม่ได้เป็นแบบนี้หรอกค่ะ... เพราะงั้นก็อย่าเข้าใจสถาบันการรถไฟ#nไฮแลนเดอร์ผิดเลยนะคะ คุณครู"
10044020-101 = "[s] \"ตอนนี้มีครูอยู่ด้วย ไม่เป็นไรหรอก\""
10044020-102 = "ค่ะ... ตะ... แต่ทำไมฉันอายแทนด้วยก็ไม่รู้..."
10044020-104 = "นี่ ไฮแลนเดอร์!"
10044020-110 = "พวกเธอขึ้นค่ารถไฟใต้ดินกันอีกแล้วเหรอ?"
10044020-111 = "มาขึ้นค่าโดยสารขนส่งมวลชนแบบนี้ แล้วนักเรียนที่ไม่มีเงินอย่างพวกเราจะทำยังไง ห้ะ?"
10044020-112 = "พวกเราไม่ได้บริหารรถไฟใต้ดินสักหน่อย?"
10044020-114 = "อ๊ะ งั้นเหรอ? ไม่บอกไม่รู้เลยนะเนี่ย คิกคิก!"
10044020-115 = "ต่อให้เฉไฉไปก็ไม่มีประโยชน์อะไรหรอกน่า"
10044020-116 = "พวกเธอก็หาเงินจากรถไฟเหมือนกันไม่ใช่เหรอ? งั้นก็มารับผิดชอบแทนกันสิ!"
10044020-118 = "มะ... ไม่ยุติธรรมเลย..."
10044020-119 = "เพราะงั้นก็ให้อันนั้นพวกเราเลย... มันเรียกว่าอะไรนะ? เงินชดเชยความเสียหายทางจิตใจ? จ่ายมาซะดีๆ!"
10044020-120 = "เงินชดเชยความเสียหายทางจิตใจ? มีค่าอะไรแบบนั้นด้วยเหรอ?"
10044020-121 = "ใช่ อันนั้นแหละ! จ่ายแค่นิดหน่อย ขนหน้าแข้งไม่ร่วงหรอก!"
10044020-122 = "เห็นว่าพวกฉันเป็นเด็กมีปัญหา เรียนก็ไม่ได้เรื่อง แล้วยังชอบกุเรื่องอีกหรือไง?"
10044020-123 = "ไม่ได้การละ เห็นทีต้องเรียกค่าปลอบขวัญด้วย เมื่อกี้มันเจ็บปวดมากเลยรู้มั้ย?"
10044020-125 = "โนโซมิ มีเงินมั้ย?"
10044020-126 = "ไม่มีหรอก ขนาดค่าตั๋วคุณครูยังจ่ายให้พวกเราเลย"
10044020-127 = "เงิน หมด บ๋อ แบ๋"
10044020-129 = "นี่ คิดว่าพวกฉันจะยอมให้หรือไง? ห้ะ?"
10044020-130 = "ถ้าไม่มีเงินก็เอากระสุนมาก็ได้!"
10044020-132 = "[ns] \"ทุกคนใจเย็นๆ กันก่อนนะ...\""
10044020-134 = "อะไรเนี่ย? ผู้ใหญ่เหรอ?"
10044020-135 = "เป็นผู้ใหญ่ก็ต้องมีเงินในกระเป๋าใช่มั้ย? อยากบริจาคให้นักเรียนด้อยโอกาสหน่อยมั้ยล่ะ?"
10044020-136 = "[s5] \"สงบสติอารมณ์ก่อนดีกว่า ครูกระเป๋าแบนกว่าที่คิดนะ...\"\n[s6] \"สงบสติอารมณ์ก่อนดีกว่า อีกอย่าง ครูก็กรอบอยู่...!\""
10044020-139 = "จะให้สงบสติอารมณ์ได้ยังไงล่ะ?!"
10044020-140 = "ทำข้อสอบก็ได้คะแนนต่ำเตี้ยเรี่ยดิน! แต่ก็ขี้เกียจอ่านหนังสือ! แล้วยังไม่มีเงินอีก!"
10044020-141 = "ตอนนี้ไม่มีวิธีอื่นที่จะคลายความหงุดหงิดของวัยรุ่นได้นอกจากการนั่งรถไฟใต้ดินแล้วเที่ยวหาเรื่องคน#nอื่นแล้วละ!"
10044020-142 = "คะแนนแย่ นิสัยก็แย่ด้วยเหรอ?"
10044020-144 = "เดี๋ยวเหอะ! อยากโดนดีหรือไง?"
10044020-145 = "ฉะ... ฉันก็เข้าใจความรู้สึกนั้นค่ะ..."
10044020-146 = "หืม?"
10044020-147 = "ฉะ... ฉันก็ได้ 25 คะแนนในการสอบวิชาวรรณกรรมคลาสสิก... ก็เลยเข้าใจความรู้สึกของพวกคุณค่ะ..."
10044020-149 = "ฮ่าฮ่า เธอก็เรียนไม่ได้เรื่องเหมือนกันสินะ เข้าใจแล้วมันยังไงกันล่ะ?"
10044020-150 = "ตะ... แต่ว่า... การไม่อ่านหนังสือเพราะขี้เกียจเป็นสิ่งที่ตัวเองเลือกเอง..."
10044020-151 = "ตัวเองก็ควรยอมรับผลลัพธ์นั้นไม่ใช่เหรอคะ...?"
10044020-152 = "อย่ามาตลกน่า! พวกฉันไม่อยากยอมรับเรื่องพรรค์นั้นหรอก!"
10044020-153 = "ทำไมโลกถึงเย็นชากับพวกฉันเสมอเลย? พวกฉันก็อยากมีความสุขเหมือนกันนะ!"
10044020-157 = "ทะ... ทำไมถึงคิดว่าโลกนี้ต้องใจดีกับทุกคนด้วยล่ะคะ...?"
10044020-162 = "ถามมาได้... ถ้าใจดีมันก็ดีไม่ใช่เหรอ?"
10044020-164 = "อยู่ในโลกแห่งจินตนาการกันเหรอคะ... ละ... โลกนี้ทั้งโหดร้ายและเย็นชา... ไม่มีใครรับผิดชอบ หรือสนใจฉันกันสักคน..."
10044020-165 = "แล้วทำไมพวกคุณถึงคิดอะไรใสซื่อและโลกสวยกันแบบนั้นคะ...?"
10044020-166 = "ละ... แล้วมันไม่ได้หรือไง? ฉันก็อยากได้รับความรักเหมือนกันนะ?!"
10044020-167 = "ฮุ... ฮุฮุ... ถ้าคาดหวังลมๆ แล้งๆ แบบนั้น ตอนผิดหวังมันเจ็บนะคะ... อะ... อ่อนต่อโลกกันจริงๆ เลย..."
10044020-168 = "ถ้าไม่คาดหวังก็ไม่มีเรื่องให้ผิดหวัง... ฮุฮุฮุ..."
10044020-169 = "ฉันก็เลยใช้ชีวิตแบบไม่คาดหวังอะไรเลยค่ะ... ฮุฮุ!!"
10044020-174 = "ยะ... ยัยนี่นี่..."
10044020-175 = "มองโลกในแง่ร้ายเกินไปแล้ว..."
10044020-176 = "ไปกันเถอะ... เข้าไปยุ่งด้วยก็ไม่มีอะไรดีขึ้นมาหรอก"
10044020-181 = "ว้าว ชนะได้ด้วยเนกาทีฟ ออร่า! ใช้ได้เลยนี่นา?"
10044020-182 = "นะ... เนกาทีฟอะไรกันล่ะคะ... มันก็ความคิดปกติไม่ใช่เหรอ...?"
10044020-183 = "ถ้าไม่คาดหวัง แล้วเราจะสนุกกับชีวิตได้ยังไง?"
10044020-184 = "คะ...? การใช้ชีวิต... ต้องสนุกด้วยเหรอคะ?"
10044020-189 = "ก็ใช่น่ะสิ~!! อะไรที่ไม่สนุกก็ไม่เห็นจำเป็นต้องทำเลย"
10044020-190 = "ฮิคาริเห็นด้วย"
10044020-192 = "[ns7] \"การมีความหวังในชีวิตก็ไม่ใช่เรื่องแย่เสมอไปหรอกนะ\"\n[ns8] \"ครูอยากให้อาโอบะมีเรื่องให้คาดหวังในชีวิตบ้างนะ\""
10044020-195 = "มะ... ไม่รู้สิคะ... แหะๆ... ฉันว่าฉันสะดวกแบบนี้น่ะค่ะ..."
10044020-201 = "อ๊ะ ถึงสถานีที่ต้องลงแล้วค่ะ"
10044020-202 = "รถไฟคงอยู่ที่นี่ละเนอะ? ต้องอยู่นะ ต้องอยู่แหละ!"
10044020-203 = "โอ้ว ลอสต์ เทรน"
10044020-210 = "[ns] \"ไปกันเถอะ อาโอบะ\""
10044020-211 = "ค่ะ ค่ะ..."

22100-145 = "ฉันไม่อยากทำให้คนที่ไม่ได้เกี่ยวข้องต้องมาบาดเจ็บไปด้วยหรอกนะ"
22100-151 = "(ชะงัก)"
22100-154 = "[ns] \"หยุดนะ ริโอะ\""
22100-157 = "ไม่เลยครู ฉันต่างหากที่ต้องพูดคำนั้น"

[translation]
22100-1 = "Episode 10; The Harsh Truth 2"
22100-15 = "Did you think you could stop me with these small fries?! Huh?!"
22100-19 = "I guess AMAS alone won't be able to stop you, Neru."
22100-20 = "I was hoping it wouldn't come to this, but..."
22100-22 = "...Toki."
22100-23 = "Yes, ma'am."
22100-24 = "I permit use of...the weapon."
22100-26 = "Understood."
22100-31 = "Following your command, I will now execute Mode 2."
22100-32 = "Huh? What are you mumbling about now?"
22100-42 = "Oh... That outfit..."
22100-43 = "[ns] \"...Her appearance changed?\""
22100-45 = "...!"
22100-54 = "Where are you?!"
22100-69 = "You're not getting away!"
22100-82 = "I missed again?!"
22100-83 = "Sh-She's so fast all of a sudden..."
22100-89 = "Where'd you go?! Get back here!"
22100-91 = "Neru, watch your back!"
22100-92 = "Huh?"
22100-106 = "G-Gahhh?!"
22100-107 = "[s] \"N-Neru was overpowered that easily?!\""
22100-109 = "She came out of nowhere!"
22100-110 = "U-Ugh..."
22100-115 = "Argh! Let go of me! I'll destroy you!"
22100-116 = "If you continue to resist, you may end up breaking your arm, Neru."
22100-117 = "I do not recommend any futile resistance. Everyone remain in your positions."
22100-119 = "Ack!"
22100-120 = "...!"
22100-123 = "[ns] \"What was that just now...?\""
22100-124 = "It's a special defense weapon I prepared just in case."
22100-125 = "Although, I didn't want to use it in a place like this."
22100-126 = "AMAS, retrieve Aris."
22100-136 = "...!"
22100-137 = "N-No! Stop!"
22100-139 = "I wouldn't do anything rash if I were you."
22100-145 = "I don't want to hurt any innocent bystanders in this situation."
22100-151 = "*flinch*"
22100-154 = "[ns] \"Rio. You need to stop.\""
22100-157 = "No, Sensei. I should be saying that to you."
22100-158 = "It's not as if I want to do this."
22100-159 = "I don't want to fight against you, and I don't want to be hated."
22100-160 = "But, consider this for a moment."
22100-161 = "In this situation right here..."
22100-166 = "Shouldn't you be the one taking initiative? As an adult?"
22100-167 = "[s] \"...What?\""
22100-168 = "You're the teacher. The adult. You should be more logical, more rational than us kids."
22100-169 = "Aren't you the one who should be making the calls?"
22100-170 = "[s] \"I won't hurt a student.\""
22100-171 = "How long are you going to speak this kind of nonsense?!"
22100-172 = "[s] \"...!\""
22100-173 = "Don't be fooled."
22100-176 = "That \"thing\" isn't alive. It's not a student you're responsible for."
22100-177 = "That's just the ELIZA effect, nothing more."
22100-178 = "It's a weapon. It'll bring destruction to this world."
22100-181 = "When you weigh what's more important between it and all the students of Kivotos, the answer is clear."
22100-182 = "And if you still won't take action..."
22100-183 = "I'll destroy Aris' halo myself. I've prepared everything I need to do so."
22100-189 = "..."
22100-190 = "No..."
22100-191 = "No! That's not true! Aris isn't a weapon!"
22100-192 = "Aris...is a hero, because...!"
22100-193 = "Aris has the Sword of Light...the Supernova, which is proof she's a hero!"
22100-195 = "By the Sword of Light...are you talking about that toy she got from the Engineering Department?"
22100-196 = "I see. That's how it is..."
22100-197 = "Understood."
22100-205 = "[ns] \"The Sword of Light's power turned off...?\""
22100-206 = "...!"
22100-207 = "I hacked and neutralized it."
22100-208 = "There's no such thing as a Sword of Light anymore."
22100-209 = "Does that prove it to you?"
22100-210 = "My sword... The proof of a hero is..."
22100-211 = "W-Wait..."
22100-217 = "Midori, Yuzu..."
22100-223 = "Ugh! Let go of me! Damn it! You piece of crap!"
22100-224 = "Hey, kid! Are you really going to let her destroy your halo?! C'mon! Fight! You can do it!"
22100-226 = "..."
22100-227 = "Neru..."
22100-230 = "Sensei..."
22100-231 = "[s] \"...Aris.\""
22100-232 = "...!"
22100-239 = "And...and...Momoi..."
22100-240 = "All of this happened because of me..."
22100-245 = "Because I am...a demon lord?"
22100-246 = "..."
22100-247 = "If I stay here...the same thing will...keep happening..."
22100-248 = "..."
22100-249 = "If..."
22100-250 = "If I am not a hero..."
22100-255 = "...Okay."
22100-261 = "[ns] \"Aris...?\""
22100-266 = "I understand everything."
22100-267 = "I will leave."
22100-268 = "No! Aris!"
22100-269 = "A-Aris..."
22100-270 = "What...? Kid! Hey!"
22100-275 = "[ns] \"Aris, don't do it. You don't need to.\""
22100-279 = "It is okay. It will be okay."
22100-280 = "I do not want to hurt you, Sensei."
22100-281 = "I..."
22100-291 = "I do not want to hurt Midori, Yuzu, Neru, and the others..."
22100-292 = "I do not want to hurt anyone."
22100-293 = "...When Momoi got hurt because of me, I felt awful."
22100-294 = "I did not understand why something like that had to happen."
22100-297 = "But now...when I heard the explanation...I understood."
22100-298 = "It happened because of me."
22100-299 = "And if I stay here..."
22100-300 = "In the end...everyone will get hurt."
22100-301 = "[s] \"No! Forget about what Rio said!\""
22100-302 = "Sensei... Please do not worry."
22100-305 = "I am not even a real, living thing."
22100-306 = "I am not a Millennium student. It is okay if I disappear forever."
22100-307 = "Because...because...I am not...a hero."
22100-308 = "It will be okay."
22100-313 = "Sensei, thank you for everything."
22100-314 = "Everyone... I was so happy to make many memories with you."
22100-315 = "I..."
22100-319 = "It was the best adventure of my life."
22100-329 = "Well, then... Farewell, Sensei from Schale."
22100-330 = "If you were offended by my rudeness..."
22100-331 = "I'll come back to apologize once everything is over."
22100-332 = "Then..."
22100-338 = "After that, until Rio and Aris left..."
22100-342 = "We couldn't even lift a finger because we were subdued by AMAS and Toki."
22100-347 = "All we could do was watch..."
22100-352 = "...All we could do was watch Aris disappear."
22100-358 = "Next Episode; Be That as It May!"

22100-83 = "หะ... หายไปในพริบตาเลย..."
22100-89 = "ยัยเด็กคนนี้นี่..."
22100-91 = "รุ่นพี่เนรุ... ข้างหลัง...!"
22100-92 = "...หา?"
22100-106 = "อึก...!"
22100-107 = "[s] \"นะ... เนรุโดนเล่นงานในชั่วพริบตาเลย?!\""
22100-109 = "โผล่มาอย่างกะทันหัน... ในเสี้ยววินาที..."
22100-110 = "อ่า..."
22100-115 = "อ้าากกก!! ปล่อยเซ่!! ไม่งั้นฉันจะหักแขนเธอให้ยับ บี้ให้เป็นผงเลยคอยดู!!"
22100-116 = "ถ้ายังคงขัดขืนอยู่ ฉันจะหักแขนของรุ่นพี่ให้มาหักแขนของฉันไม่ได้เลยค่ะ"
22100-117 = "อ้อ หวังว่าคนอื่นจะไม่เข้ามาแจมด้วยนะคะ ฉันไม่แนะนำให้ลุกขึ้นมาต่อต้านอย่างไร้ประโยชน์ค่ะ"
22100-119 = "อึก...!"
22100-120 = "......!"
22100-123 = "[ns] \"เมื่อกี้นี้มันเรื่องอะไรกัน...\""
22100-124 = "มันคืออาวุธคุ้มกันพิเศษที่เตรียมเผื่อไว้น่ะ"
22100-125 = "ฉันก็ไม่ได้อยากจะเอาออกมาใช้ในที่แบบนี้หรอกนะแต่ว่า..."

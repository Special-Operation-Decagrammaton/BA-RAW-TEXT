22100-160 = "แต่ฉันอยากจะถามคุณอยู่เหมือนกัน"
22100-161 = "คนแรกที่ควรออกมาเคลื่อนไหวในสถานการณ์เช่นนี้"
22100-166 = "ก็คือคุณที่เป็นทั้งผู้ใหญ่ และครูจากชาเล่ต์ไม่ใช่เหรอ?"
22100-167 = "[s] \"ว่าไงนะ...?\""
22100-168 = "ก็คุณเป็นผู้ใหญ่ ผู้ใหญ่มีความคิดสุขุมเยือกเย็นกว่า และสามารถตัดสินสถานการณ์ได้เป็นกลางกว่า#nเด็กๆ ──"
22100-169 = "แบบนี้ยิ่งต้องออกมาเคลื่อนไหวก่อนไม่ใช่หรือไง?"
22100-170 = "[s] \"คนเป็นครูเค้าไม่ทำร้ายนักเรียนหรอกนะ...\""
22100-171 = "คิดจะพูดจาเพ้อเจ้อแบบนี้ไปอีกถึงเมื่อไรกันน่ะ?!"
22100-172 = "[s] \"......!!\""
22100-173 = "── คุณเข้าใจผิดแล้ว"
22100-176 = "<สิ่งนั้น> ไม่ใช่สิ่งมีชีวิต ไม่ใช่นักเรียนที่คุณต้องรับผิดชอบซะด้วยซ้ำ"
22100-177 = "ถ้าหากรู้สึกแบบนั้น ก็คงจะเป็นสิ่งที่เรียกว่า <อีไลซา เอฟเฟกต์> ที่เรารู้สึกว่าพฤติกรรมของ#nคอมพิวเตอร์คล้ายคลึงกับพฤติกรรมของมนุษย์โดยไม่รู้ตัว"
22100-178 = "แต่นั่นคืออาวุธสงคราม... อาวุธที่น่าหวาดกลัวที่จะนำความหายนะมาสู่โลกนี้นะ!"
22100-181 = "ถ้าจะต้องชั่งใจเลือกระหว่าง[ruby=อาริสึ]สิ่งนั้น[/ruby]กับนักเรียนทั้งหมดของคิโวทอส คำตอบมันก็ชัดเจนอยู่แล้วนี่"
22100-182 = "...แต่ถ้าคุณยังเลือกที่จะไม่เคลื่อนไหวเลยละก็"
22100-183 = "ฉันจะทำลายฮาโลของอาริสึด้วยมือของฉันเอง ฉันเตรียมการเพื่อทำเรื่องแบบนี้ไว้พร้อมแล้ว"
22100-189 = "......"
22100-190 = "ไม่นะ..."
22100-191 = "ไม่ใช่นะ! อาริสึจังไม่ใช่อาวุธสงครามหรืออะไรแปลกๆ พวกนั้นซะหน่อย!"
22100-192 = "อาริสึจัง... เป็นผู้กล้าต่างหาก! นั่นก็เพราะว่า..."
22100-193 = "อาริสึจังมีดาบแห่งแสง... มีซูเปอร์โนวาที่เป็นหลักฐานของผู้กล้าอยู่นะ!"
22100-195 = "ดาบแห่งแสง... ของเล่นที่ได้รับมาจากชมรมวิศวกรรมน่ะเหรอ?"
22100-196 = "อืม... ถ้าพวกเธอพูดอย่างนี้..."
22100-197 = "ก็ได้"

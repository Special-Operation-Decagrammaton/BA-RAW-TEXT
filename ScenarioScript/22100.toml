[translation]
22100-1 = "第10話;殘酷的真相（２）"
22100-15 = "那種雜魚怎麼可能阻止我！"
22100-19 = "──不愧是寧瑠。看來光靠AMAS是無法阻止妳的。"
22100-20 = "雖然我不想做出這種事──"
22100-22 = "……季。"
22100-23 = "是的，主人。"
22100-24 = "允許妳使用「武裝」。"
22100-26 = "我明白了。"
22100-31 = "準備完成。更換為「模式2」。"
22100-32 = "哈啊？在那嘰嘰喳喳地說什麼──"
22100-42 = "咦？衣服……"
22100-43 = "[ns]「……『模樣』變了？」"
22100-45 = "……！"
22100-54 = "是那邊嗎！？"
22100-69 = "別想逃……！"
22100-82 = "呿，可惡……打不中……"
22100-83 = "一，一瞬間就消失了……"
22100-89 = "這傢伙，跑哪去了……"
22100-91 = "寧瑠前輩，後面……！"
22100-92 = "……什麼？"
22100-106 = "呃啊！！？"
22100-107 = "[s]「寧瑠瞬間就……」"
22100-109 = "回過神來……突然就出現了……"
22100-110 = "啊，啊嗚……"
22100-115 = "可惡！快放手！？想被打爆嗎！？"
22100-116 = "繼續抵抗的話，手臂會被折到不該折的方向唷，前輩。"
22100-117 = "請其他人也不要輕舉妄動。#n不建議做無意義的抵抗。"
22100-119 = "……唔！"
22100-120 = "……！"
22100-123 = "[ns]「剛才那個究竟是……」"
22100-124 = "是我製作的特殊武裝。"
22100-125 = "──本來不想在這種地方用上的。"
22100-126 = "去吧，AMAS。#n去回收愛麗絲。"
22100-136 = "！！"
22100-137 = "等，等等……！"
22100-139 = "最好別輕舉妄動。"
22100-145 = "我不想傷害無辜的孩子。"
22100-151 = "（瑟縮！）"
22100-154 = "[ns]「住手，莉央。」"
22100-157 = "──那是我的台詞唷。"
22100-158 = "我也不想造成對立。"
22100-159 = "我並不想與你敵對，也不想被你憎恨。"
22100-160 = "我反而想要問你。"
22100-161 = "面對這樣的事態，夏萊的老師。"
22100-166 = "身為大人的你，難道不應該率先展開行動嗎？"
22100-167 = "[s]「……那是，什麼意思？」"
22100-168 = "比孩子們更不會受到感情左右，#n可以冷靜地判斷狀況──"
22100-169 = "身為那樣大人的你應該有所行動不是嗎？"
22100-170 = "[s]「要傷害學生這種事……」"
22100-171 = "──你打算說那種夢話到什麼時候！"
22100-172 = "[s] 「……！！」"
22100-173 = "──請不要搞錯了，老師。"
22100-176 = "「它」並不是生命體──也不是你該負責的學生。"
22100-177 = "如果產生了那種感覺，也不過是因為「ELIZA效應」罷了。"
22100-178 = "「它」是會讓這個世界迎向終焉的恐怖兵器。"
22100-181 = "[ruby=愛麗絲]將它和[/ruby]奇普托斯的所有學生放在天秤上衡量的話，答案很明顯了吧？"
22100-182 = "……即使如此，如果你還是不打算行動的話。"
22100-183 = "愛麗絲的光環就由我親手破壞。#n準備也已經做好了。"
22100-189 = "……"
22100-190 = "不對……"
22100-191 = "不對！愛麗絲醬才不是什麼兵器！"
22100-192 = "愛麗絲醬是……勇者唷！#n因為──！"
22100-193 = "愛麗絲醬，有光之劍……有象徵勇者的「Supernova」啊！"
22100-195 = "光之劍……是指工程師部做的玩具？"
22100-196 = "是嗎……既然你們這麼說……"
22100-197 = "好吧。"
22100-205 = "[ns]「Supernova的電源……消失了？」"
22100-206 = "……！"
22100-207 = "這樣可以了嗎？"
22100-208 = "光之劍已經不存在了。"
22100-209 = "這樣就證明完畢了。"
22100-210 = "愛麗絲的，劍……身為勇者的，證據……"
22100-211 = "啊，嗚……嗚嗚……"
22100-217 = "綠……柚子……"
22100-223 = "可惡！放手！"
22100-224 = "喂，小不點！別呆在那，快反擊啊！"
22100-226 = "…………"
22100-227 = "寧瑠前輩………"
22100-230 = "老師…………"
22100-231 = "[s]「……愛麗絲。」"
22100-232 = "……！！"
22100-239 = "…………桃井。"
22100-240 = "全部……都是因為，愛麗絲在……？"
22100-245 = "因為愛麗絲是「魔王」……所以才會，發生這種事嗎？"
22100-246 = "……"
22100-247 = "愛麗絲……如果待在這裡……#n相同的事……"
22100-248 = "…………"
22100-249 = "…………愛麗絲。"
22100-250 = "………………愛麗絲，不是勇者的話……"
22100-255 = "……是，這樣啊。"
22100-261 = "[ns]「愛麗絲……？」"
22100-266 = "是的……愛麗絲，全都明白了。"
22100-267 = "…………愛麗絲會消失的。"
22100-268 = "不行！愛麗絲醬！"
22100-269 = "愛麗，絲……醬……"
22100-270 = "什麼……小不點，妳這傢伙……！"
22100-275 = "[ns]「沒有那種必要唷，愛麗絲。」"
22100-279 = "不，沒關係。"
22100-280 = "愛麗絲……不想讓老師受傷。"
22100-281 = "愛麗絲……"
22100-291 = "綠、柚子、寧瑠前輩，還有大家……"
22100-292 = "不想，讓大家受傷。"
22100-293 = "……桃井因為愛麗絲受傷的時候……胸口非常疼痛。"
22100-294 = "為什麼……會發生這種事，愛麗絲也不太清楚。"
22100-297 = "但是，儘管如此……聽了，這些話之後……總算，理解了。"
22100-298 = "這一切……都是因為愛麗絲才會發生的……"
22100-299 = "愛麗絲要是一直待在這裡……"
22100-300 = "總有一天……會傷害到大家的。"
22100-301 = "[s]「不用囫圇吞棗理解莉央說的沒關係。我們好好談談吧，愛麗絲。」"
22100-302 = "老師……不用擔心，沒事的。"
22100-305 = "沒關係的。因為愛麗絲不是生命體。"
22100-306 = "愛麗絲，不是千年的學生。#n就算消失，也沒有關係。"
22100-307 = "因為愛麗絲……不是，勇者………"
22100-308 = "愛麗絲……沒……問題的。"
22100-313 = "老師，一直以來謝謝你。"
22100-314 = "大家，謝謝妳們，願意和愛麗絲一起冒險。"
22100-315 = "愛麗絲……"
22100-319 = "至今為止真的……非常幸福。"
22100-329 = "那麼──告辭了。"
22100-330 = "如果──老師因為我的言行而受傷的話……"
22100-331 = "等一切都結束之後，我會再次向你道歉。"
22100-332 = "那麼，再會──"
22100-338 = "（直到莉央和愛麗絲完全離開這裡之前）"
22100-342 = "（被AMAS和季鎮壓的我們，連一根手指都動不了──）"
22100-347 = "（就這樣，在被無力感打擊著的我們面前──）"
22100-352 = "（──愛麗絲，消失了）"
22100-358 = "下一話;那種事怎樣都無所謂！"

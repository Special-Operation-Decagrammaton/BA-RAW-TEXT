[translation]
22100-1 = "ตอนที่ 10;ความจริงอันน่าโหดร้าย 2"
22100-15 = "คิดว่าหุ่นกระป๋องพวกนี้จะขวางฉันไว้ได้งั้นเหรอ?! หา?!"

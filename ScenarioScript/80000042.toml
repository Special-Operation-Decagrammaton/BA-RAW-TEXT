[translation]
80000042-1 = "#title;간식부장님의 진심"
80000042-2 = "1;노노미;01\n#1;ar\n#wait;1000"
80000042-3 = "1;노노미;01\n#1;m2\n#wait;1000"
80000042-4 = "1;노노미;01\n#1;m3\n#wait;1000"
80000042-5 = "1;노노미;01\n#1;greeting\n#wait;1500"
80000042-6 = "1;노노미;02;으응~! 생필품이랑 간식까지. 이번에도 이것저것 잔뜩 샀네요!"
80000042-7 = "1;노노미;03;오늘도 이렇게 장보기에 어울려 주셔서 감사해요. 선생님!\n#1;em;[반짝]"
80000042-8 = "[s1] \"이쯤이야 뭘, 그보다…….\"\n[s2] \"으음, 저기……. 짐이 너무, 무거운 거 아니야……?\""
80000042-9 = "1;노노미;04;네? 이 정도는 기본이라고요?\n#1;em;[?]"
80000042-10 = "1;노노미;04;네? 이 정도는 기본이라고요?\n#1;em;[?]"
80000042-11 = "1;노노미;03;이번엔 특히 발렌타인 데이를 맞이해서 기합을 넣은 부분도 있으니까요!\n#1;hophop"
80000042-12 = "[s] \"하지만 이 무게……. 혹시 또 아령이 들었다던가……?\""
80000042-13 = "1;노노미;04;아이 참~! 그런 일은 없답니다~\n#1;em;[땀]"
80000042-14 = "1;노노미;11;아, 하지만. 확실히 장보기가 길어지면서 선생님도 조금은 지치신 것 같고……."
80000042-15 = "[s] \"네, 면목이 없습니다마는.\""
80000042-16 = "1;노노미;12;후훗, 그럼 저희 조금만 나쁜 짓을 하다 갈까요?\n#1;em;[///]"
80000042-17 = "[s] \"나, 나쁜 짓?\""
80000042-18 = "#all;hide"
80000042-19 = "#na;(그리하여 노노미를 따라 강가의 벤치에 잠시 앉아서 쉬게 되었다.)"
80000042-20 = "#all;hide"
80000042-21 = "3;노노미;01;아~ 바람 시원해서 좋네요~\n#3;em;[반짝]\n#3;closeup\n#3;a"
80000042-22 = "[s] \"노노미, 나쁜 짓이란 게…….\""
80000042-23 = "3;노노미;08;네, 후훗. 원래라면 장보기가 끝난 직후에 곧장 돌아갔어야 했지만.\n#3;em;…\n#3;closeup"
80000042-24 = "3;노노미;09;이번만 이렇게, 돌아가기 전에 둘이서만 몰래 살짝 쉬다 가는 거예요.\n#3;closeup"
80000042-25 = "3;노노미;03;오늘은 날씨도 좋고……. 선생님과 단둘이 산책하는 것도, 무척이나 즐겁네요~☆\n#3;em;[음표]\n#3;greeting\n#3;closeup"
80000042-26 = "3;노노미;11;선생님은 어떠신가요? 혹시, 저만 즐거운 건가요?\n#3;stiff\n#3;closeup"
80000042-27 = "[s] \"아냐. 나도 즐거워. 노노미가 즐거운 만큼이나.\""
80000042-28 = "3;노노미;16;후후~ 또또 그러신다~\n#3;em;[재잘]\n#3;closeup"
80000042-29 = "3;노노미;15;으음. 하지만 뭔가 부족한 느낌이 드는 건 왜일까요?\n#3;closeup"
80000042-30 = "3;노노미;02;아, 맞다. 이렇게 된 거. 여기서 잠깐의 휴식을 반짝이게 해줄…… 간식 타임이에요!\n#3;em;[!]\n#3;closeup"
80000042-31 = "#st;[0,0];instant;1;"
80000042-32 = "#clearST"
80000042-33 = "3;노노미;02\n#3;d\n#3;closeup\n#wait;1000"
80000042-34 = "#wait;2000"
80000042-35 = "3;노노미;03\n#3;greeting\n#3;a\n#wait;1000"
80000042-36 = "3;노노미;03;자, 여기!\n#3;em;[반응]"
80000042-37 = "[s] \"이건 초콜릿 과자?\""
80000042-38 = "3;노노미;01;네, 그리고 또 이것도 있어요!"
80000042-39 = "[s] \"이건 초콜릿 캔디……?\""
80000042-40 = "3;노노미;02;그다음엔 또 이것도!\n#3;em;[반짝]\n#3;greeting"
80000042-41 = "[s] \"거기에 더해 초콜릿 캬라멜……?\""
80000042-42 = "3;노노미;08;그리고…….\n#3;em;[...]"
80000042-43 = "[s3] \"자, 잠깐! 노노미! 스타압!\"\n[s4] \"초콜릿이 계속해서 어디에서 나오는 거야?\""
80000042-44 = "3;노노미;12;아, 이것들 말인가요? 놀라셨나요? 아까 장 보면서 같이 샀던 이거랍니다!\n#3;em;[?]"
80000042-45 = "3;노노미;12;아, 이것들 말인가요? 놀라셨나요? 아까 장 보면서 같이 샀던 이거랍니다!\n#3;em;[?]"
80000042-46 = "#st;[0,0];instant;1;"
80000042-47 = "#clearST"
80000042-48 = "3;노노미;12;\n#3;d\n#wait;1000"
80000042-49 = "#wait;2500"
80000042-50 = "[ns5] \"초콜릿 과자가, 종류별로?\"\n[ns6] \"그야말로 초콜릿의 홍수……!\""
80000042-51 = "3;노노미;03;네~ 다 같이 먹기 위해, 물론 선생님까지 포함해서. 모두가 좋아할 만한 초콜릿 과자가 잔뜩 담긴 특제 상품이에요.\n#3;em;[반짝]\n#3;a"
80000042-52 = "3;노노미;03;네~ 다 같이 먹기 위해, 물론 선생님까지 포함해서. 모두가 좋아할 만한 초콜릿 과자가 잔뜩 담긴 특제 상품이에요.\n#3;em;[반짝]\n#3;a"
80000042-53 = "3;노노미;08;자아~ 그럼 같이 벤치에 앉아, 조금만 맛보도록 해요.\n#3;greeting"
80000042-54 = "3;노노미;02;지금부터 아비도스 고등학교 간식부장의 진심을 보여 드릴 테니까요~!"
80000042-55 = "3;노노미;09;하나씩 전부 맛보고, 감상을 말씀해주셔야 한다구요? 후훗☆\n#3;em;[음표]"
80000042-56 = "3;노노미;03;자, 아-앙!\n#3;closeup\n#3;greeting\n#fontsize;100"
80000042-57 = "[s] \"노, 노력하겠습니다.\""
80000042-58 = "#all;hide"
80000042-59 = "#na;(그렇게 노노미가 건네주는 초콜릿의 군세와 간신히 맞서 싸워나갔다.)"

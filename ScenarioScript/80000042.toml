[translation]
80000042-1 = "零食負責人的甜美心意"
80000042-6 = "唉呀～真是買了不少東西呢。"
80000042-7 = "從生活必需品到零食點心等等……謝謝老師陪我！"
80000042-8 = "[s1]「不客氣，這沒什麼。只不過是手有點痛而已……」\n[s2]「買了真多啊……好重……」"
80000042-9 = "咦，是嗎？"
80000042-10 = "咦，是嗎？"
80000042-11 = "雖然這次確實為了情人節買了各種東西……"
80000042-12 = "[s]「這個重量，難道裡面放了啞鈴……？」"
80000042-13 = "沒有沒有，沒有那種事唷～"
80000042-14 = "不過果然很重呢……老師看起來真的有點累……"
80000042-15 = "[s]「真沒面子……」"
80000042-16 = "呵呵。那我們兩個要不要去做點「壞壞的事」呀？"
80000042-17 = "[s]「壞，壞壞的事……？」"
80000042-19 = "（和野乃美兩人一起坐在附近河邊的長椅上稍作休息）"
80000042-21 = "涼風徐徐，真舒服呢～"
80000042-22 = "[s]「……壞壞的事？」"
80000042-23 = "呵呵，沒錯。本來買完東西之後就該立刻回去才對。"
80000042-24 = "像這樣在回去之前，兩個人一起偷偷休息就是「壞壞的事」哦。"
80000042-25 = "今天天氣這麼好，這樣一起散散步真是舒服又開心～☆"
80000042-26 = "老師覺得如何呢？"
80000042-27 = "[s]「我也很開心唷，真是個好地方呢。」"
80000042-28 = "呵呵，那真是太好了。"
80000042-29 = "唔嗯，總覺得好像忘了什麼……？"
80000042-30 = "啊，難得有這種機會……來點點心時間吧！"
80000042-36 = "來，請用！"
80000042-37 = "[s]「巧克力？」"
80000042-38 = "是，還有這個！"
80000042-39 = "[s]「是巧克力糖。」"
80000042-40 = "接著還有這個！"
80000042-41 = "[s]「巧克力牛奶糖……？」"
80000042-42 = "其他還有……"
80000042-43 = "[s3]「野乃美，暫停！」\n[s4]「這麼多巧克力是從哪裡拿出來的……？」"
80000042-44 = "啊，嚇到老師了嗎？其實這些是剛才購物的時候買的！"
80000042-45 = "啊，嚇到老師了嗎？其實這些是剛才購物的時候買的！"
80000042-50 = "[ns5]「有各種巧克力的零食……」\n[ns6]「簡直像是快要發生雪崩了一樣……」"
80000042-51 = "是的，我想跟大家一起吃。#n心裡想著大家會喜歡什麼樣的巧克力，於是就買了這麼多。"
80000042-52 = "是的，我想跟大家一起吃。#n心裡想著大家會喜歡什麼樣的巧克力，於是就買了這麼多。"
80000042-53 = "當然，老師也有哦☆來，請開動吧！"
80000042-54 = "我可是阿拜多斯的零食負責人，除了剛才那些之外還有很多種唷～！"
80000042-55 = "我會一個一個拿給老師的，老師也要把感想一個一個說給我聽哦？呵呵☆"
80000042-56 = "來，啊──！"
80000042-57 = "[s]「啊──」"
80000042-59 = "（就這樣被野乃美一個接一個地餵食，讓那座像山一樣的巧克力崩塌了）"

[translation]
80000042-1 = "ความจริงใจของหัวหน้าฝ่ายของว่าง"
80000042-6 = "อื้อ~! ของใช้จำเป็นกับขนมของว่าง คราวนี้ก็ซื้อมาหลายอย่างเลยนะคะ!"
80000042-7 = "ขอบคุณที่วันนี้มาซื้อของด้วยกันนะคะ คุณครู!"
80000042-8 = "[s1] \"เรื่องแค่นี้เอง...\"\n[s2] \"อืม แต่ว่า... ของมันหนักเกินไปรึเปล่า...?\""
80000042-9 = "คะ? เรื่องแค่นี้งั้นเหรอคะ?"
80000042-10 = "คะ? เท่านี้ถือว่าปกตินะคะ?"
80000042-11 = "คราวนี้มีของที่ซื้อไปสำหรับฉลองวาเลนไทน์ด้วยน่ะค่ะ!"
80000042-12 = "[s] \"แต่ว่าหนักขนาดนี้... ใส่ดัมเบลเข้าไปอีกรึเปล่าน่ะ?\""
80000042-13 = "โธ่~! ไม่มีซะหน่อยค่ะ~!"
80000042-14 = "อ๊ะ แต่ว่า... พอมาเดินซื้อของนานๆ คุณครูก็ดูเหมือนจะเหนื่อยๆ นะคะ..."
80000042-15 = "[s] \"อืม น่าอายจริงๆ เลยนะ...\""
80000042-16 = "ฮุฮุ ถ้างั้นพวกเราทำเรื่องเกเรกันสักหน่อยดีมั้ยคะ?"
80000042-17 = "[s] \"ระ...เรื่องเกเร?\""
80000042-19 = "(คุณครูเดินตามโนโนมิไปนั่งพักที่ม้านั่งริมแม่น้ำ)"
80000042-21 = "อา~ ลมเย็นสบายดีจังเลยนะคะ~"
80000042-22 = "[s] \"โนโนมิ เรื่องเกเรที่พูดถึงน่ะ...\""
80000042-23 = "ค่า ฮิฮิ~ ปกติเวลาซื้อของเสร็จแล้วก็จะต้องรีบกลับเลย"
80000042-24 = "แต่ว่าคราวนี้แอบแวะมานั่งพักผ่อนกันสองคนก่อนจะกลับน่ะค่ะ"
80000042-25 = "แถมวันนี้อากาศดีด้วย... ได้มาเดินเล่นสองคนกับคุณครูแบบนี้ รู้สึกสนุกมากเลยค่ะ~☆"
80000042-26 = "แล้วคุณครูสนุกมั้ยคะ? หรือว่ามีแค่ฉันคนเดียวที่สนุกกันนะ...?"
80000042-27 = "[s] \"ไม่หรอก ครูเองก็สนุกเหมือนโนโนมินั่นแหละ\""
80000042-28 = "ฮิฮิ~ พูดแบบนี้อีกแล้วนะคะ~"
80000042-29 = "อืม แต่ว่ารู้สึกเหมือนขาดๆ อะไรไปรึเปล่านะ...?"
80000042-30 = "อ๊ะ จริงด้วยสิ ไหนๆ ก็มาที่นี่แล้ว ก็ควรจะต้องมีของว่างที่เพิ่มระดับความเพลิดเพลินของเวลาพัก... ขนมทานเล่นไงล่ะคะ~!"
80000042-36 = "นี่ค่ะ!"
80000042-37 = "[s] \"ขนมรสช็อกโกแลตนี่นา?\""
80000042-38 = "ค่ะ แล้วก็มีอันนี้ด้วยค่ะ!"
80000042-39 = "[s] \"ลูกกวาดรสช็อกโกแลต...?\""
80000042-40 = "แล้วก็มีอันนี้ด้วยค่ะ!"
80000042-41 = "[s] \"ยังมีช็อกโกแลตคาราเมลอีกด้วย...?\""
80000042-42 = "แล้วก็..."
80000042-43 = "[s3] \"ดะ...เดี๋ยวก่อน โนโนมิ! หยุดก๊อนนน!\"\n[s4] \"เอาช็อกโกแลตมาจากไหนเยอะแยะเนี่ย?\""
80000042-44 = "อ๊ะ คุณครูตกใจเรื่องขนมพวกนี้เหรอคะ? นี่เป็นขนมที่ไปซื้อมาเมื่อกี้ไงคะ!"
80000042-45 = "อ๊ะ คุณครูตกใจเรื่องขนมพวกนี้เหรอคะ? นี่เป็นขนมที่ไปซื้อมาเมื่อกี้ไงคะ!"
80000042-50 = "[ns5] \"ซื้อพวกขนมช็อกโกแลตมาทุกชนิดเลยเรอะ?\"\n[ns6] \"ภูเขาช็อกโกแลตชัดๆ เลย...!\""
80000042-51 = "ค่า~ ฉันซื้อมาเผื่อทุกๆ คนเลย แน่นอนว่าซื้อมาเผื่อคุณครูด้วยค่ะ ผลิตภัณฑ์พิเศษที่มีขนม#nรสช็อกโกแลตที่ทุกคนชอบค่ะ"
80000042-52 = "ค่า~ ฉันซื้อมาเผื่อทุกๆ คนเลย แน่นอนว่าซื้อมาเผื่อคุณครูด้วยค่ะ ผลิตภัณฑ์พิเศษที่มีขนม#nรสช็อกโกแลตที่ทุกคนชอบค่ะ"
80000042-53 = "เอาล่ะ~ ถ้างั้นมานั่งกินขนมด้วยกันเถอะค่ะ"
80000042-54 = "ฉันจะแสดงฝีมือที่แท้จริงของหัวหน้าฝ่ายของว่างของโรงเรียนมัธยมอะบิดอสให้คุณครูเห็นค่ะ~!"
80000042-55 = "ลองชิมอย่างละชิ้นแล้วมารีวิวรสชาติกันเถอะค่ะ ฮุฮุ☆"
80000042-56 = "นี่ค่ะ อ้ามมม~!"
80000042-57 = "[s] \"ครูจะพยายามนะ...\""
80000042-59 = "(จากนั้นคุณครูก็ต้องต่อสู้กับกองทัพขนมที่โนโนมิป้อนให้)"

[translation]
1002205-1 = "A Summer View with Hina"
1002205-2 = "Hina's Room"
1002205-4 = "That should conclude our tasks for today, yes?"
1002205-5 = "*sigh*"
1002205-6 = "Maybe it's because I got up so early, but I think it'd be a good idea to take a short break before going to my appointment this afternoon."
1002205-7 = "I shouldn't overdo it and trouble them again."
1002205-8 = "I'll rest my eyes for just a little while..."
1002205-20 = "(Hmm...)"
1002205-21 = "(Huh? How long have I been asleep?)"
1002205-22 = "(My body feels heavy. Was I that tired? More importantly...)"
1002205-23 = "(*yawn* I feel like I'm forgetting something.)"
1002205-24 = "(What time is it?)"
1002205-25 = "(It's 6 PM...?)"
1002205-27 = "(That's far past lunchtime... Ah!)"
1002205-29 = "Wait. I've been sleeping for far too long."
1002205-30 = "[s] \"Did you have a nice nap, Hina?\""
1002205-31 = "Huh?"
1002205-32 = "What the...?"
1002205-33 = "...?!"
1002205-34 = "S-Sensei? What are you doing here of all places?!"
1002205-35 = "And why didn't you wake me up? It's already..."
1002205-36 = "[s1] \"You were super deep asleep.\"\n[s2] \"I would have felt bad waking you up.\""
1002205-37 = "Sensei..."
1002205-38 = "Sensei..."
1002205-39 = "But..."
1002205-40 = "We promised to meet today. I was the one who contacted you about playing together."
1002205-41 = "*sigh* I'm sorry."
1002205-42 = "I even promised to go to the beach with you. I've ruined everything."
1002205-43 = "There's no way I can face you like this..."
1002205-44 = "Huh? "
1002205-45 = "Was it because I got up so early to work that I was so tired?"
1002205-46 = "Well, you may have a point there. It's true that I had a lot of tasks, and I did get up especially early today."
1002205-47 = "Even so."
1002205-48 = "That has nothing to do with it. This happened because I failed to be responsible."
1002205-49 = "I have no excuses."
1002205-50 = "I'm sorry, Sensei. It's already too late to go to the beach...and you ended up wasting your time because of me."
1002205-51 = "Which is why..."
1002205-58 = "Huh? What are you doing, Sensei?"
1002205-59 = "Wh-Why are you suddenly grabbing my hand?"
1002205-60 = "[s] \"The beach is closer than you think.\""
1002205-61 = "What do you mean it's closer than I think?"
1002205-62 = "Oh. The manager did say that you could overlook the beach from the hotel terrace, right?"
1002205-63 = "The entrance was barred because it wasn't needed for boot camp training, but..."
1002205-64 = "[s3] \"Let's go!\"\n[s4] \"The view of the beach has to be great from there.\""
1002205-65 = "Really? Are you sure you're okay with this?"
1002205-66 = "Really? Are you sure you're okay with this?"
1002205-67 = "..."
1002205-68 = "All right."
1002205-69 = "You're always like this, Sensei. To think you'd be so easy to please."
1002205-70 = "If this is what you want. It might not be so bad."
1002205-71 = "Then, shall we...?"
1002205-75 = "Oh..."
1002205-76 = "Achoo!"
1002205-77 = "H-Huh? Why are you looking at me like that?"
1002205-78 = "This is just... It's because I just woke up."
1002205-85 = "And this cardigan? Did you bring this just for me?"
1002205-86 = "Yeah, okay."
1002205-87 = "(You're always considerate like this.)"
1002205-88 = "Thank you. I'll be sure to put it on."
1002205-89 = "So, shall we go see this ocean view that you've been hyping up?"
1002205-95 = "― Honestly,  I've never understood people's fascination[wa:2830] "
1002205-97 = "― with the ocean.[wa:50] "
1002205-100 = "― While everyone's having a good time,[wa:10] "
1002205-102 = "― I've never felt the same way.[wa:150] "
1002205-105 = "― It's blurry underwater, and I get nervous when my feet can't touch the ground.[wa:3200] "
1002205-107 = "― Sensei, have you ever felt that way before?[wa:40] "
1002205-110 = "― I found it eerie... The way the sea was just a bottomless well at night.[wa:2740] "
1002205-112 = "― I hated how it felt like I'd be sucked in just looking at it.[wa:3040] "
1002205-115 = "― But, you know, I think I'm beginning to understand. At least a little bit.[wa:5240] "
1002205-117 = "― The ocean can be so beautiful.[wa:1310] "
1002205-120 = "― Strange... I've never felt this way before.[wa:3350] "
1002205-123 = "― Thank you, Sensei...for being here with me.[wa:1440] "
1002205-125 = "― And for everything you've taught me.[wa:260] "
1002205-128 = "We gazed upon the sparkling early evening sea until it became completely dark."

[translation]
1002205-1 = "與委員長於仲夏夜"
1002205-2 = "陽奈的房間"
1002205-4 = "呼……這下今天該完成的工作應該都結束了……"
1002205-5 = "唉，真的有夠麻煩……"
1002205-6 = "是因為提早起床嗎，明明時間還早卻這麼累……#n下午去赴約之前，或許應該稍微休息一下……"
1002205-7 = "若是太逞強，又給老師造成困擾就不好了……"
1002205-8 = "一下下，就好……"
1002205-20 = "（嗯……）"
1002205-21 = "（嗯……呼啊……）"
1002205-22 = "（身體好沉重……看來比想像中累積了更多疲勞……）"
1002205-23 = "（嗯……呼。不過好久沒睡得這麼舒服了……我想想，在這之後是……）"
1002205-24 = "（話說回來，現在幾點了……？）"
1002205-25 = "（下午6點……錯過午餐了……）"
1002205-27 = "（算了沒關係……接下來的行程是…………！？）"
1002205-29 = "──！！和老師的……！"
1002205-30 = "[s] 「啊，陽奈早安。睡得好嗎？」"
1002205-31 = "……"
1002205-32 = "……？"
1002205-33 = "……！？"
1002205-34 = "老，老師！？為什麼老師會在這裡……！？"
1002205-35 = "而且，為什麼你沒有叫醒我……！？都這麼晚了……！"
1002205-36 = "[s1] 「因為陽奈睡得非常熟。」\n[s2] 「想說你老是那麼忙，該讓你好好睡一覺。」"
1002205-37 = "老師……"
1002205-38 = "老師……"
1002205-39 = "……"
1002205-40 = "今天的約定……明明是我自己邀請老師的……"
1002205-41 = "真的，很對不起……"
1002205-42 = "難得能和老師一起去海邊，結果全被我搞砸了……"
1002205-43 = "明明老師也一樣很忙碌……"
1002205-44 = "……？"
1002205-45 = "嗯，的確。我最近睡眠時間確實比較短……"
1002205-46 = "也或許今天特別短，才會……"
1002205-47 = "但，但是，那些都是我自己做的決定……！"
1002205-48 = "這是兩回事。這次說穿了，就是我自己沒有管理好身體狀況……！"
1002205-49 = "這根本不是藉口……"
1002205-50 = "真的很對不起，老師。現在要去海邊已經太晚了……因為我，浪費了老師的時間……"
1002205-51 = "我，我……"
1002205-58 = "……？老，老師……？"
1002205-59 = "你，你怎麼，突然握住我的手……"
1002205-60 = "[s] 「還不算晚，海邊離我們這麼近。」"
1002205-61 = "說什麼很近……"
1002205-62 = "啊……對了，這間飯店只要在陽台，就能眺望整個海邊……"
1002205-63 = "只是因為合宿時沒有必要使用，所以才會禁止進出……"
1002205-64 = "[s3] 「走吧！」\n[s4] 「在那邊看的海也一定很漂亮。」"
1002205-65 = "……為什麼，老師會這麼溫柔呢？"
1002205-66 = "……為什麼，老師會這麼溫柔呢？"
1002205-67 = "…………"
1002205-68 = "……沒事，當我沒說。"
1002205-69 = "老師一直以來都是這樣。總是這麼讓我……"
1002205-70 = "……嗯，既然老師都這麼說了，那就走吧。現在還不遲……"
1002205-71 = "我看看……"
1002205-75 = "啊，嗯……"
1002205-76 = "哈啾……！"
1002205-77 = "怎，怎麼……？我當然也會打噴嚏呀。"
1002205-78 = "……不要緊，這不是感冒。只是因為剛睡醒的關係──"
1002205-85 = "這是……羊毛衫？老師特地帶來的嗎？"
1002205-86 = "……嗯，謝謝。"
1002205-87 = "（因為老師總是這麼體貼，我才會……）"
1002205-88 = "……那我就不客氣囉。"
1002205-89 = "現在就去看一下，老師自信滿滿說很漂亮的海景吧。"
1002205-95 = "― 為什麼大家，都那麼喜歡大海呢……[wa:4310] "
1002205-97 = "― 我一直都這麼思考著。[wa:250] "
1002205-100 = "― 雖然大家看起來都很開心，"
1002205-102 = "― 但是我實在是沒辦法喜歡大海……[wa:710] "
1002205-105 = "― 在水裡會看不清楚，腳又無法著地會令人不安……[wa:5440] "
1002205-107 = "― 老師有沒有也這麼想過？[wa:1320] "
1002205-110 = "― 特別是夜晚的大海，就像黑暗一樣很陰森……[wa:4820] "
1002205-112 = "― 光是注視著就好像會被吸進去，雖然沒辦法喜歡……[wa:4560] "
1002205-115 = "― 不過……現在，好像能稍微理解大家的心情了。[wa:7360] "
1002205-117 = "― 原來大海，這麼美麗呀。[wa:2070] "
1002205-120 = "― 真神奇……至今為止，明明沒有這麼想過。[wa:4310] "
1002205-123 = "― 謝謝你，老師。陪伴在我身邊……[wa:2560] "
1002205-125 = "― 教導我，各種事物。[wa:1340] "
1002205-128 = "（就這樣兩人一起看著海面閃爍著夕陽的光芒，直到夕陽沉入海底）"

[translation]
1002205-1 = "ดื่มด่ำความงดงามของฤดูร้อนกับฮินะ"
1002205-2 = "ห้องพักของฮินะ"
1002205-4 = "เฮ้อ... งานวันนี้คงเสร็จหมดแล้วแหละ"
1002205-5 = "เฮ้อ..."
1002205-6 = "นี่ฉันเพลียเพราะตื่นเช้าเกินไปหรือเปล่านะ? นอนพักอีกหน่อย แล้วค่อยไปตามเวลานัดก็แล้วกัน..."
1002205-7 = "ถ้าเกิดหักโหมเกินไป เดี๋ยวจะเป็นเรื่องอีก"
1002205-8 = "งั้นขอพักสายตาสักหน่อย..."
1002205-20 = "(หืม...?)"
1002205-21 = "(เอ๋...? นี่ฉันหลับไปนานแค่ไหนเนี่ย?)"
1002205-22 = "(ทำไมมันเมื่อยตัวแบบนี้... หรือว่าเหนื่อยสะสม...)"
1002205-23 = "(ฮ้าววว... เหมือนจะลืมอะไรไปสักอย่างเลยแฮะ...)"
1002205-24 = "(กี่โมงแล้วเนี่ย...?)"
1002205-25 = "(6 โมงเย็น...?)"
1002205-27 = "(เลยเที่ยงมานานแล้วนี่... อ๊ะ!)"
1002205-29 = "เอาไงดี... เผลอนอนยาวเกินเวลาไปหลายชั่วโมงเลย...!"
1002205-30 = "[s] \"ตื่นแล้วเหรอฮินะ? \""
1002205-31 = "หืม?"
1002205-32 = "หา...?"
1002205-33 = "...!?"
1002205-34 = "คะ... คุณครู?! ทำไมคุณครูถึงมาอยู่ที่นี่ได้ล่ะ?!"
1002205-35 = "แล้วทำไมถึงไม่ปลุกฉัน...? นี่ก็ปาไปตั้ง 6 โมงแล้วนะ..."
1002205-36 = "[s1] \"ก็ฮินะหลับสนิทขนาดนั้น ดูเหมือนเหนื่อยๆ ด้วย\"\n[s2] \"ถ้าจะให้ปลุกก็รู้สึกผิดน่ะ\""
1002205-37 = "คุณครู..."
1002205-38 = "คุณครู..."
1002205-39 = "ถ้างั้น... ที่เรานัดกันล่ะ"
1002205-40 = "ฉันเป็นคนนัดเพราะอยากมาเที่ยวเล่นด้วยกันแท้ๆ"
1002205-41 = "เฮ้อ... ขอโทษนะ"
1002205-42 = "อุตส่าห์นัดว่าจะไปทะเลกันอย่างดิบดีแล้วเชียว แต่ฉันก็ทำพังหมดเลย"
1002205-43 = "แบบนี้จะมีหน้าไปเจอคุณครูได้ยังไง..."
1002205-44 = "หืม...? "
1002205-45 = "ฉันเพลียเพราะต้องตื่นเช้ามาทำงานหรือเปล่างั้นเหรอ?"
1002205-46 = "อาจเป็นแบบนั้นก็ได้ ฉันยอมรับว่าช่วงนี้งานเยอะ แล้ววันนี้ก็ตื่นเช้ามากเป็นพิเศษด้วย..."
1002205-47 = "แต่ถึงอย่างนั้น..."
1002205-48 = "มันก็คนละเรื่องกัน เพราะสุดท้ายก็คือฉันผิดเองที่ดูแลร่างกายไม่ดี"
1002205-49 = "ฉันไม่มีข้ออ้างอะไรทั้งนั้น"
1002205-50 = "ขอโทษนะคุณครู เราคงไปทะเลไม่ทันแล้ว ฉันทำให้คุณครูต้องเสียเวลาอยู่เรื่อยเลย"
1002205-51 = "เพราะงั้น..."
1002205-58 = "อ๊ะ? เดี๋ยวสิคุณครู...?"
1002205-59 = "ทำไมจู่ๆ ก็มาจับมือกันแบบนี้ล่ะ..."
1002205-60 = "[s] \"ชายหาดอยู่ใกล้แค่นี้เองนะ\""
1002205-61 = "อยู่ใกล้ๆ งั้นเหรอ?"
1002205-62 = "จริงสิ... ผู้จัดการโรงแรมบอกไว้ว่าเรามองเห็นทะเลจากดาดฟ้าโรงแรมได้"
1002205-63 = "ถึงจะเป็นเขตห้ามเข้า เพราะเราไม่ได้ใช้บริเวณนั้นเป็นสถานที่ฝึกก็เถอะ"
1002205-64 = "[s3] \"ไปกันเถอะ!\"\n[s4] \"ทะเลที่มองจากดาดฟ้าต้องสวยแน่ๆ\""
1002205-65 = "จริงเหรอ? ไปที่นั่นแทนก็ได้เหรอ?"
1002205-66 = "จริงเหรอ? ไปที่นั่นแทนก็ได้เหรอ?"
1002205-67 = "..."
1002205-68 = "ก็ได้..."
1002205-69 = "จะว่าไปแล้วคุณครูน่ะ... เป็นแบบนี้ตลอดเลยนะ พอใจกับเรื่องแค่นี้ตลอดเลย"
1002205-70 = "แต่ถ้าเป็นเรื่องที่คุณครูต้องการละก็... อาจเป็นเรื่องที่ดีก็ได้นะ"
1002205-71 = "ถ้างั้นเราไปกันเลยมั้ย?"
1002205-75 = "ฮะ..."
1002205-76 = "ฮัดชิ้ว...!"
1002205-77 = "หืม? ทำไมมองด้วยสายตาแบบนั้นล่ะ?"
1002205-78 = "มันก็แค่... ที่เป็นแบบนี้เพราะเพิ่งลุกจากเตียงมาน่ะ"
1002205-85 = "นี่มัน... เสื้อคลุมนี่นา? ตั้งใจเอามาให้ฉันเหรอ?"
1002205-86 = "อืม... เข้าใจแล้ว"
1002205-87 = "(คุณครูดูแลฉันดีแบบนี้ตลอดเลย)"
1002205-88 = "ขอบคุณนะ งั้นฉันจะไม่ปฏิเสธน้ำใจแล้วกัน"
1002205-89 = "งั้นเราไปดูทะเลที่คุณครูบอกว่าสวยกันเลยมั้ย?"
1002205-95 = "― ฉันไม่ค่อยเข้าใจหรอก ว่าทำไมทุกคนถึงชอบทะเลกัน...[wa:2990] "
1002205-97 = "― ฉันคิดมาตลอดน่ะ [wa:10] "
1002205-100 = "― ถึงทุกคนดูสนุกกันมาก...[wa:10] "
1002205-102 = "― แต่ฉันเอง... ไม่ได้รู้สึกแบบนั้นเลย[wa:10] "
1002205-105 = "― ฉันรู้สึกกังวล เวลาที่เท้ายันพื้นไม่ถึง หรือมองไม่เห็น...ข้างใต้น้ำน่ะ[wa:3520] "
1002205-107 = "― คุณครู... ไม่เคยคิดแบบนั้นเหรอ?[wa:520] "
1002205-110 = "― โดยเฉพาะ ทะเลตอนกลางคืน ดูเหมือนบ่อน้ำขนาดใหญ่ที่ไร้จุดสิ้นสุดเลย[wa:3020] "
1002205-112 = "― เพียงแค่มอง... ก็รู้สึกเหมือนว่าจะโดนดูดเข้าไป ฉันเลยไม่ค่อยชอบ...[wa:2840] "
1002205-115 = "― แต่ว่า... ตอนนี้ ฉันเริ่มเข้าใจความรู้สึกทุกคนแล้วละ[wa:6120] "
1002205-117 = "― ว่าท้องทะเล มันสวยงามขนาดนี้นี่เอง[wa:1150] "
1002205-120 = "― แปลกจังเลย... จนถึงตอนนี้ ฉันไม่เคยคิดแบบนี้มาก่อนเลย[wa:2950] "
1002205-123 = "― ขอบคุณนะคุณครู... ที่อยู่ด้วยกันในตอนนี้...[wa:1440] "
1002205-125 = "― แล้วก็ขอบคุณ... ที่ช่วยสอนฉันในหลายๆ อย่าง[wa:20] "
1002205-128 = "(ทั้งสองคนนั่งชมทะเลที่ส่องประกายระยิบระยับด้วยกันทั้งคืนจนโรงแรมปิดไฟ)"

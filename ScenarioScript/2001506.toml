[translation]
2001506-1 = "ในที่สุดก็ได้เป็นเลดี้ที่เพียบพร้อม"
2001506-2 = "อ๊ะ คุณครู! ทางนี้ ทางนี้~~!"
2001506-3 = "[s1] \"ครูพยายามรีบมาแล้วนะ...\"\n[s2] \"เรื่องใหญ่งั้นเหรอ? เกิดอะไรขึ้นน่ะ คาเอเดะ?\""
2001506-4 = "อ๊ะ~! ไม่เป็นไรๆ คุณคร ฟังแล้วอย่าตกใจนะ..."
2001506-5 = "อ๊ะ~! คือว่าคุณครู... ฟังแล้วอย่าตกใจนะ..."
2001506-6 = "ตามข้อมูลลับที่ฉันได้มา วันนี้ตั้งแต่บ่ายสามโมงเป็นต้นไปที่ซูเปอร์มาร์เก็ตปอนโปโกะน่ะ..."
2001506-7 = "[s] \"ซูเปอร์มาร์เก็ตปอนโปโกะ...?\""
2001506-8 = "ใช่แล้ว! ที่นั่นจะมีการ์ดของมูชิควีนลิมิเต็ดอันใหม่ขายไงล่ะ?!"
2001506-9 = "[s] \"หืม? ลิมิเต็ด...?\""
2001506-10 = "เราจะพลาดโอกาสสำคัญครั้งยิ่งใหญ่นี้ไปไม่ได้เด็ดขาด! จริงสิ! ฉันอดออมค่าขนมมาตั้งนานก็เพื่อ#nวันนี้เลยนะ!"
2001506-11 = "[s] \"นี่คาเอเดะ? ครูว่ามันไม่ใช่เรื่องใหญ่เลยนะ...\""
2001506-12 = "หาาา?! พูดอะไรน่ะคุณครู! นี่มันเรื่องใหญ่ เรื่องคอขาดบาดตายสุดๆ เลยนะ?!"
2001506-13 = "หลังจากเปิดตัวแพ็กมูชิควีนลิมิเต็ดครั้งนี้แล้ว คิดว่าสนามการต่อสู้ของมูชิควีนจะดุเดือดขึ้นอีกขนาด#nไหนล่ะ?!"
2001506-14 = "[s] \"งะ...งั้นเหรอ...?\""
2001506-15 = "เพราะงั้นคุณครู... ช่วยฉันหน่อยนะ!"
2001506-16 = "การเข้าร่วมกิจกรรมที่มีจำกัด... มันเป็นการต่อสู้ที่ยิ่งใหญ่มาก ถ้าฉันคนเดียว... เลยรู้สึกกลัว..."
2001506-17 = "ขอร้องล่ะ!"
2001506-18 = "อีกอย่างคุณครูเองก็มีเปลวไฟแห่งจิตวิญญาณของมูชิควีนพุ่งพล่านอยู่ในใจเหมือนกันไม่ใช่รึไง?! เอาไว้มาการ์ดแบตเทิลกระชับมิตรกับฉันดูสักตั้งหน่อยมั้ย?"
2001506-19 = "[s3] \"อย่าพูดอะไรที่ไม่เคยตกลงกันสิ!\"\n[s4] \"ถ้าแค่ช็อปปิ้งละก็เดี๋ยวครูไปเป็นเพื่อน\""
2001506-20 = "งั้นเหรอ?! ขอบคุณนะคุณครู!"
2001506-21 = "งั้นเหรอ?! ขอบคุณนะคุณครู!"
2001506-22 = "คุณครูกับฉัน...! ถ้าเราร่วมมือกันล่ะก็ต้องยอดเยี่ยมแน่นอน...!"
2001506-23 = "อื้ม! ตัดสินใจได้ดีมากคู่หู!"
2001506-24 = "ฮิฮิฮิ ถ้าแบบนี้ตอนที่ต้องเผชิญหน้ากับลาสบอสและต้องตัดสินใจ... ถึงคุณครูจะต้องเสียสละตัวเอง..."
2001506-25 = "ก็จะทำให้พลังของฉันตื่นขึ้นและล้มบอสได้!"
2001506-26 = "[s] \"บังคับให้ครูเสียสละอย่างนั้นเหรอ!\""
2001506-27 = "เอ้า~ ไปกันเถอะ คุณครู!"
2001506-28 = "(หลังจากนั้นคุณครูก็ถูกคาเอเดะลากไปที่ซูเปอร์มาร์เก็ตปอนโปโกะอย่างหลีกเลี่ยงไม่ได้)"
2001506-31 = "เร็วเข้า~ รีบไปเร็วเข้า คุณครู! รีบไปก่อนที่จะขายหมด-!"
2001506-35 = "อ๊ะ... แบบนี้มัน... ยุ่งยากแล้วสิ แย่แล้วๆ"
2001506-36 = "หืม...?"
2001506-41 = "ฮือ... แย่จริงๆ ด้วย รีบจนลืมไปสนิทเลย"
2001506-43 = "อ่า..."
2001506-44 = "[s] \"คาเอเดะ? ทำไมถึงหยุดเดินล่ะ?\""
2001506-45 = "คือว่า ตรงนั้นเหมือนมีใครกำลังมีปัญหาอยู่... ฮึ่ย...!"
2001506-50 = "นี่-! คุณตรงนั้นน่ะ!"
2001506-51 = "ครับ...? มะ...แม่หนู มีอะไรงั้นเหรอ...?"
2001506-52 = "ฉันคือคาเอเดะจากชมรมฝึกฝน! คุณกำลังมีปัญหาอะไรอยู่รึเปล่า?"
2001506-53 = "คือว่า... ผมทำคอนแทคเลนส์หล่นแถวๆ นี้ เลยกำลังหาดูน่ะ"
2001506-54 = "[s] \"แบบนี้ก็แย่เลยนะ\""
2001506-55 = "ครับ... อ๊ะ แต่ไม่ต้องห่วงหรอกนะครับ จะให้คนอื่นที่ยุ่งอยู่มาเสียเวลาช่วยก็คงไม่ดี..."
2001506-56 = "อืม ถึงพวกเราจะยุ่งอยู่ก็เถอะ! งานเปิดขายการ์ดมูชิควีนลิมิเต็ดเอดิชั่นสำคัญมากก็จริง...!"
2001506-57 = "มูชิควีน...?"
2001506-58 = "ใช่แล้ว! แต่ว่า..."
2001506-59 = "[s] \"เลดี้ที่เพียบพร้อมคงไม่เมินคนที่เดือดร้อนหรอกใช่ไหม?\""
2001506-60 = "อื้ม...! คุณครูพูดถูกแล้ว! ฉันมีเป้าหมายจะเป็นเลดี้ที่เพียบพร้อม...! เพราะงั้นฉันจะช่วยคุณเอง!"
2001506-61 = "อ๊ะ ขะ...ขอบใจนะ...! ถ้างั้นก็ขอรบกวนหน่อยนะ "
2001506-63 = "(หลังจากนั้นไม่นาน)"
2001506-65 = "ขะ... ขอบคุณมาก! เพราะเธอช่วยไว้เลยหาคอนแทคเลนส์เจอแล้ว!"
2001506-66 = "[s] \"ไม่คิดเลยว่าอีกาจะคาบไป...\""
2001506-67 = "โชคดีที่หาเจอนะ!"
2001506-68 = "ผมไม่รู้ว่าจะตอบแทนยังไงดี อ๊ะ คิดออกแล้ว ถ้าพวกคุณไม่ว่าอะไร ช่วยรับนามบัตรผมไป..."
2001506-69 = "อ๊ะ...!! ไม่ใช่เวลาจะมาโอ้เอ้แบบนี้นะ! อีกไม่นานก็จะเปิดขายการ์ดแล้ว! คุณครู!"
2001506-70 = "ต้องรีบไปแล้วละ! ถ้างั้นขอตัวก่อนนะคะ อย่าให้พวกอีกาแย่งไปได้อีกน้า~!"
2001506-72 = "[s] \"ดะ...เดี๋ยวก่อน คาเอเดะ รอครูด้วย! ...ถ้างั้นขอตัวก่อนนะ\""
2001506-76 = "อ๊ะ ทุกคน?!"
2001506-78 = "(การเดินทางไปที่ซูเปอร์มาร์เก็ตปอนโปโกะกับคาเอเดะไม่ใช่เรื่องง่ายๆ...)"
2001506-79 = "อ๊ะ! โปโป! ไม่ได้นะ หยุดเดี๋ยวนี้! ใคร... ใครก็ได้ช่วยจับหมาของฉันให้หน่อยค่ะ!"
2001506-80 = "ย้าาาา! หยุดน้าาาา!"
2001506-81 = "อ๊ะ ขอบคุณที่ช่วยจับมันไว้ให้ค่ะ!"
2001506-82 = "ฮื่อออ! สำหรับคู่หูดูเอลลิสต์การ์ดมูชิควีนสุดแกร่งอย่างฉันกับคุณครู เรื่องแค่นี้ไม่เท่าไรหรอก!"
2001506-84 = "อ๊ะ! พวกนักเรียนโรงเรียนวัลคิรี่ยังมาไม่ถึงเลย วะ...เวลาที่ติดตรงระเบิดใกล้จะหมดแล้ว...!! ตะ...ต้องตัดสายไฟเส้นไหนกันละเนี่ย?!"
2001506-85 = "เอ๋~! ตัดเส้นสีแดงเลย!"
2001506-86 = "(ฉึบ!)"
2001506-88 = "อ๊ะ! กังวลจังเลยว่าเครื่องดื่มตัวใหม่ที่จะวางขายวันนี้จะขายได้รึเปล่าน่ะ"
2001506-90 = "อึ่กๆๆ อื้อ! อร่อยมากเลย! สิบเต็มสิบ!"
2001506-92 = "อ๊ะ... โดนัทอันนี้..."
2001506-94 = "อื้ม! แป้งเหนียวนุ่มดี!"
2001506-96 = "(หลังจากผ่านปัญหาต่างๆ มามากมาย...)"
2001506-99 = "แฮ่ก... แฮ่ก... นะ...ในที่สุดก็ถึงสักที"
2001506-100 = "[s] \"ทำได้ดีมากเลย คาเอเดะ\""
2001506-101 = "อื้อ! ตอนนี้มาถึงแล้ว ที่เหลือก็แค่ไปซื้อเท่านั้น...!"
2001506-102 = "ขอโทษค่ะ! ขอแพ็กลิมิเต็ดหน่อยค่า!"
2001506-103 = "อ๊ะ ครับ โชคดีจังเลยนะครับ เหลือเซ็ตสุดท้ายพอดีเลยครับ"
2001506-104 = "ว้าววว! ในที่สุด...! คุณครู ดูนี่สิ! แสงสะท้อนเงาวิบวับนี่ สวยใช่มั้ย? แต่ละแพ็กจะมีการ์ดระดับแรร์อยู่ 1 ใบด้วยนะ! "
2001506-105 = "[s] \"คาเอเดะดูตื่นเต้นน่าดูเลยนะ\""
2001506-106 = "อ๊ะ! ไม่ใช่เวลามัวจะมาทำอะไรแบบนี้นะ รีบกลับกันเถอะ รีบไปจัดเด็กซ์การ์ดมูชิควีนใหม่ของฉัน..."
2001506-107 = "คะ?! ขะ... ขายหมดไปแล้วเหรอคะ?"
2001506-108 = "หืม...?"
2001506-110 = "ครับ คุณลูกค้า เราไม่มีเหลือแล้วละครับ"
2001506-111 = "ตะ...แต่ว่า... ฉันอุตส่าห์ตื่นมาแต่เช้า นั่งรถไฟมาตั้งสี่ชั่วโมงกว่าจะมาถึงที่นี่ แต่การ์ดขายหมดแล้วงั้นเหรอ..."
2001506-112 = "คุณครู... เด็กคนนั้นคงเดินทางมาไกลมากแน่เลย"
2001506-113 = "[s] \"นั่งรถมาตั้งสี่ชั่วโมงก็คงไกลน่าดูเลยนะ\""
2001506-114 = "ฮึ่ก..."
2001506-115 = "อะ...อื้ม! เด็กตรงนั้นน่ะ อย่าร้องไห้เลยนะ!"
2001506-116 = "หะ...หืม...?"
2001506-117 = "เอ้านี่! แพ็กการ์ดมูชิควีน!"
2001506-118 = "พี่สาว... อันนี้ให้ฉันเหรอคะ?"
2001506-119 = "[s] \"จะไม่เป็นไรแน่เหรอ?\""
2001506-120 = "อื้อ ไม่เป็นไรหรอก! เด็กคนนี้นั่งรถมาตั้งไกลเพื่อมาซื้อการ์ดเลยนี่นา"
2001506-121 = "ในอนิเมะมูชิควีนเองเคยมีคำพูดแบบนี้ด้วยนะ!"
2001506-122 = "ต่อให้เป็นการต่อสู้ที่ยากลำบากแค่ไหน... แต่ถ้าพยายามต่อไปไม่ย่อท้อละก็ จะต้องได้รับสิ่งตอบแทน#nที่คุ้มค่าอย่างแน่นอน! นั่นละ จิตวิญญาณของมูชิควีน!"
2001506-123 = "อ๊ะ อื้อ...! บทพูดของตัวร้ายในเรื่อง <มูชิควีน> ที่ออกมาในตอน 139!"
2001506-124 = "ใช่มั้ยล่ะ~? เพราะงั้นก็รับไปเถอะ!"
2001506-125 = "อื้อ! ขอบคุณนะพี่สาว!"
2001506-129 = "[ns] \"คาเอเดะ...\""
2001506-130 = "ฮิฮิ-! เป็นไงล่ะ คุณครู... เมื่อกี้ฉันดูเหมือนเลดี้ที่เพียบพร้อมเลยใช่มั้ย?"
2001506-131 = "[s] \"อื้อ สมกับเป็นเลดี้ที่เพียบพร้อมสุดๆ เลย\""
2001506-132 = "อื้อ... ค่อยยังชั่วหน่อย!"
2001506-133 = "อ๊ะ! ทั้งสองคนมาอยู่ตรงนี้นี่เองสินะครับ!"
2001506-134 = "เอ๋...? คุณลุงที่ทำคอนแทคเลนส์หายเมื่อกี้? "
2001506-135 = "อา... อันที่จริงผมเป็นคนทำงานนี้ต่างหาก..."
2001506-136 = "[s] \"ผู้ดูแลการโปรโมตโปรเจกต์มูชิควีน...?\""
2001506-137 = "เอ๋~~?! มูชิควีน?!"
2001506-138 = "ระหว่างทางที่มาที่นี่ ผมได้เจอคนมากมายที่เธอช่วยเหลือไว้ด้วย"
2001506-139 = "การกระทำของพวกคุณที่ไม่ละเลยคนที่กำลังเดือดร้อน และยื่นมือเข้าช่วยทั้งที่ตัวเองกำลังรีบ..."
2001506-140 = "นั่นคือจิตวิญญาณของมูชิควีนดูเอลลิสต์เลย!"
2001506-141 = "[s] \"งะ...งั้นเหรอ?\""
2001506-142 = "ใช่แล้ว! นักดูเอลลิสต์ของมูชิควีนเป็นตัวอย่างที่ดีของเลดี้ที่เพียบพร้อมสินะ คุณครู!"
2001506-143 = "อ๊ะ! วันนี้ผมได้เจอนักดูเอลลิสต์ของมูชิควีน... และเลดี้ที่เพียบพร้อมตัวจริงแล้ว! ตอนนี้ไอเดียในหัวผมผุดขึ้นมาเยอะแยะ เหมือนมีพลุจุดอยู่ในหัวเลย!"
2001506-144 = "...?"
2001506-145 = "ถ้าพวกคุณสะดวกละก็... เรื่องที่เกิดขึ้นวันนี้ ผมขอเอาไปใช้ในสารคดีโปรโมตมูชิควีนได้มั้ยครับ? "
2001506-146 = "ผมคิดว่าจะใช้หัวข้อ มูชิควีนดูเอลลิสต์ ~ ภาคเลดี้ที่เพียบพร้อม ~ ครับ!"
2001506-147 = "อ๊ะ ผมไม่ได้จะเอาไปใช้เฉยๆ หรอกนะครับ นี่ครับ...!"
2001506-151 = "ผมให้แพ็กการ์ดที่จะใช้แจกสำหรับโปรโมต 20 แพ็กเป็นการตอบแทนครับ!"
2001506-152 = "วะ...ว้าาาวววว! ทะ...ทำยังไงดีคุณครู! ฉันรับแพ็กการ์ดพวกนี้ไว้ได้จริงเหรอ?!"
2001506-153 = "ระ...หรือว่าไม่พอใจข้อเสนอของผมเหรอครับ...? ถ้างั้นผมจะหาของอย่างอื่น..."
2001506-154 = "ไม่ใช่นะ ไม่ใช่แบบนั้นเลย! ไม่ใช่เด็ดขาด!"
2001506-155 = "ทะ.. ทำยังไงดี คุณครู~?!"
2001506-156 = "[s5] \"ไม่เป็นไร คาเอเดะก็พยายามมาตั้งเยอะแล้วนี่นา?\"\n[s6] \"เมื่อกี้คาเอเดะพูดนี่ คำพูดในอนิเมะมูชิควีนน่ะ...\""
2001506-157 = "หืม...? อ๋อ..."
2001506-158 = "หืม...? อ๋อ..."
2001506-159 = "\"ถ้าพยายามต่อไปไม่ย่อท้อละก็ จะต้องได้รับสิ่งตอบแทนที่คุ้มค่าอย่างแน่นอน!\""
2001506-160 = "อะ...อื้อ!"
2001506-161 = "ทั้งหมดนี่... ต้องขอบคุณความพยายามฝึกฝนการเป็นเลดี้ที่เพียบพร้อมของฉันสินะ! อื้อ ขอบคุณนะ งั้นฉันขอรับการ์ดพวกนี้ไว้แล้วกัน!"
2001506-162 = "ด้วยความยินดีเลยครับ!"
2001506-163 = "อ๊ะ จะมามัวโอ้เอ้แบบนี้ไม่ได้สิ รีบกลับไปเปิดการ์ดแล้วซ้อมแบตเทิลเถอะ คุณครู!"
2001506-164 = "ฉันจะไม่อ่อนให้หรอกนะ เตรียมตัวให้ดีละ คุณครู?!"
2001506-165 = "[s] \"ได้อยู่แล้ว\""
2001506-167 = "(หลังจากนั้นทั้งคู่ก็กลับไปที่ห้องทำงาน และสวมจิตวิญญาณนักดวลการ์ดมูลชิควีนกันอย่าง#nสนุกสนาน)"
2001506-169 = "เอาละ! เทิร์นของฉัน...! ก่อนอื่นก็ทอยลูกเต๋าก่อน..."
2001506-170 = "อ๊ะ! ได้เลขหกแหละ...! เยี่ยม! ต่อไปก็จั่วการ์ดขึ้นมาได้แล้ว! ฉันจะจั่วการ์ดแล้วนะ!"
2001506-174 = "การ์ดที่ฉันได้... การ์ด <แรบบิท ดริลฮอร์น ระดับ UR>...! ใครจะคิดว่าจะได้สุดยอดการ์ดในเด็กซ์แบบนี้..."
2001506-175 = "คุณครู! คุณครู! ดูสิ! ในการต่อสู้ที่วิกฤตแบบนี้ จิตวิญญาณของการ์ดต้องส่งเสียงเรียกฉันอยู่แน่เลย!"
2001506-176 = "[s] \"งะ...งั้นเหรอ...?\""
2001506-177 = "ฮิฮิฮิ! ถ้างั้นฉันจะเต้นรำเพื่ออัญเชิญ <แรบบิท ดริลฮอร์น ระดับ UR> ออกมา! "
2001506-178 = "ลัล~♪ ลัลลัลลา~♪ ลัลลา~♪ คาเอเดะ! ร่ายรำอัญเชิญแบบพิเศษ ขออัญเชิญ <แรบบิท ดริลฮอร์น ระดับ UR> ลงสนาม!"
2001506-183 = "และในตอนนี้เอง...! ความสามารถพิเศษของการ์ด <แรบบิท ดริลฮอร์น ระดับ UR> ทำงาน! นอกจากความน่ารักของ <แรบบิท ดริลฮอร์น ระดับ UR> แล้ว บวกความน่ารักของฉันเข้าไปอีก...!   "
2001506-184 = "ทำให้ค่าพลังโจมตีของ <แรบบิท ดริลฮอร์น ระดับ UR> เพิ่มขึ้นสิบเท่า!"
2001506-185 = "[s] \"คือว่า... เล่นตามเกมบาลานซ์ใช่มั้ยเนี่ย...?\""
2001506-186 = "เอ้า~! คุณครู! อย่าประมาทละ! เทิร์นของฉันยังไม่จบเพียงแค่นี้หรอก...!"
2001506-187 = "จากนี้ไปเตรียมตัวให้ดีละ?! ลุยละนะ!"
2001506-190 = "― ฮิฮิ...[wa:1120] "
2001506-192 = "― ไม่รู้ทำไมวันนี้... ถึงมีเรื่องมากมายเกิดขึ้นเต็มไปหมด[wa:300] "
2001506-195 = "― เป็นวันที่ยุ่งมาก...จนหัวหมุนทั้งวันเลย...[wa:560] "
2001506-197 = "― วันนี้เพราะมีคุณครูอยู่คอยช่วย... ฉันอาจเข้าใกล้ การเป็นเลดี้ที่เพียบพร้อม อีกหนึ่งก้าวแล้วก็ได้?![wa:10] "
2001506-200 = "― ขอบคุณนะ! คุณครู![wa:1230] "
2001506-202 = "― ที่ไม่ว่าเมื่อไร... ก็คอยช่วยเหลือฉันตลอด![wa:20] "
2001506-205 = "[ns7] \"ทำไมจู่ๆ ก็พูดแบบนี้ล่ะ ครูยินดีนะ\"\n[ns8] \"ถ้าต้องการความช่วยเหลือเมื่อไรก็บอกนะ ครูจะรีบไปหาเลย\""
2001506-206 = "― จริงเหรอ?! เข้าใจแล้ว![wa:2080] "
2001506-207 = "― จริงเหรอ?! เข้าใจแล้ว![wa:2080] "
2001506-209 = "― ถ้างั้น... ฉันจะใส่ความรู้สึกขอบคุณที่มีทั้งหมด ลงไปในการโจมตีครั้งนี้เลยแล้วกัน![wa:2460] "
2001506-212 = "[ns] \"เมื่อกี้ยังซึ้งอยู่เลยไม่ใช่เรอะ?! จู่ๆ จะมาโจมตีกันแบบนี้ได้ไงเล่า!\""
2001506-213 = "― รับไปซะ[wa:1080] "
2001506-215 = "― ท่าไม้ตายของ <แรบบิท ดริลฮอร์น ระดับ UR>... ดริล อิมแพ็ก-!![wa:740] "
2001506-218 = "― ฮิฮิฮิ!"
2001506-222 = "ถ้าเป็นแบบนี้ก็จบแล้วละ ชัยชนะเป็นของฉัน! ตำนานชัยชนะของคาเอเดะไร้พ่ายยังคงดำเนินต่อไป! ย้าา!"
2001506-223 = "เป็นไงบ้างคุณครู! นี่ละกลยุทธ์การดูเอลการ์ดมูชิควีนของฉัน? ดีใช่มั้ย? เยี่ยมมากเลยใช่มั้ย?!"
2001506-224 = "หรืออาจเป็นเพราะว่าฉันแข็งแกร่งเกินไปก็ได้... ฮิฮิ"
2001506-225 = "[s9] \"เล่นกี่ครั้ง... ก็ยังไม่เข้าใจกฎการเล่นสักที...\"\n[s10] \"แบบนี้นี่มัน...กฎพิเศษของคาเอเดะนี่...!\""
2001506-226 = "อ๊ะ-! ไม่เป็นไรนะคุณครู!"
2001506-227 = "อ๊ะ-! ไม่เป็นไรนะคุณครู!"
2001506-228 = "จนกว่าคุณครูจะเข้าใจกฎ ฉันก็ยินดีจะแบตเทิลกับคุณครูเสมอเลย!"

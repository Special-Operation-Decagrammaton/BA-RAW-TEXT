[translation]
2001506-1 = "於是少女成為了完美淑女"
2001506-2 = "啊，老師！我在這裡！"
2001506-3 = "[s1]「那個，我姑且盡快趕來了……」\n[s2]「……但是是什麼緊急狀況？」"
2001506-4 = "老師，你可別嚇到唷。"
2001506-5 = "老師，你可別嚇到唷。"
2001506-6 = "根據我暗中取得的情報，今天下午3點以後，在大型賣場．PONPOKO……"
2001506-7 = "[s]「在賣場……？」"
2001506-8 = "會開始限定販售「甲蟲皇后」的新卡包！"
2001506-9 = "[s]「……？」"
2001506-10 = "我為了今天存了很多零用錢！絕對不能錯過這個機會！"
2001506-11 = "[s]「原來如此……緊急情況嗎？」"
2001506-12 = "當然是緊急情況！"
2001506-13 = "你以為每次推出新卡包時，都會對「甲蟲皇后」的對戰環境帶來多大的動盪？！"
2001506-14 = "[s]「原來如此啊……？」"
2001506-15 = "所以老師，幫幫我！"
2001506-16 = "想必現場一定會廝殺得非常激烈，我不敢一個人去……"
2001506-17 = "所以拜託啦！"
2001506-18 = "而且老師內心一定也有燃起，要成為「甲蟲皇后」的炙熱靈魂對不對！？總有一天會和我在決賽進行命運般的戰鬥，重新確認彼此的友情對吧！？"
2001506-19 = "[s3]「我完全不記得這種劇情發展耶！？」\n[s4]「不過要買東西的話，我當然可以陪你。」"
2001506-20 = "謝謝老師！"
2001506-21 = "謝謝老師！"
2001506-22 = "現在，此時此刻，"
2001506-23 = "最強搭檔誕生了！"
2001506-24 = "這下就算哪天要和最終頭目決戰……"
2001506-25 = "也能因為老師的犧牲，觸發我的覺醒劇情！"
2001506-26 = "[s]「我會犧牲喔……」"
2001506-27 = "總之我們走吧！老師！"
2001506-28 = "（於是楓就這樣拉著我的手，前往大型賣場．PONPOKO）"
2001506-31 = "快點快點！慢慢吞吞的就要賣光了！"
2001506-35 = "唉唷～傷腦筋呀……"
2001506-36 = "嗯？"
2001506-41 = "怎麼會這樣呢……竟然在這種時候弄丟……"
2001506-43 = "……"
2001506-44 = "[s]「楓？怎麼了？」"
2001506-45 = "感覺有人遇到困難了……"
2001506-50 = "不好意思！"
2001506-51 = "怎麼了，小姐？有什麼事嗎……？"
2001506-52 = "我是修行部的楓！請問你有遇到什麼困難嗎？"
2001506-53 = "喔，其實啊，我的隱形眼鏡掉了……我一直在找它。"
2001506-54 = "[s]「那還真是麻煩呢。」"
2001506-55 = "不，不過話雖如此，也請兩位不要在意。看兩位正要前往某個地方對吧。可不能因為我而耽誤兩位的行程……"
2001506-56 = "確，確實是這樣，「甲蟲皇后」確實很重要……！"
2001506-57 = "甲蟲皇后……？"
2001506-58 = "那個，可是……！"
2001506-59 = "[s]「身為完美淑女，看到有困難的人不能坐視不管，對吧？」"
2001506-60 = "嗯！就是這麼回事！我們來幫你找！"
2001506-61 = "謝，謝謝你們！"
2001506-63 = "（稍後）"
2001506-65 = "謝謝兩位幫忙！想不到會被烏鴉叼去那種地方……"
2001506-66 = "[s]「能找到真是太好了，不過感覺已經不能再用了呢……」"
2001506-67 = "不論如何，幸好有找到！"
2001506-68 = "真不知道該怎麼報答你們………對了，如果不介意，請收下我的名片……"
2001506-69 = "啊，對了，差點忘了！"
2001506-70 = "老師我們快走！再見囉，不可以再被烏鴉搶走囉～！"
2001506-72 = "[s]「啊，等一下……！那我們告辭了！」"
2001506-76 = "啊……！"
2001506-78 = " （我和楓一起快步前進，但一路上……）"
2001506-79 = "啊！我家的狗狗……！"
2001506-80 = "我抓到了──！！"
2001506-81 = "謝謝你的幫忙！"
2001506-82 = "哼哼！交給我和老師這對甲蟲皇后戰士組合，這根本小事一樁！"
2001506-84 = "啊啊！定時炸彈倒數快結束了……！可是女武神學園的學生還沒到，到底要剪哪條線啊……！？"
2001506-85 = "不管了！"
2001506-86 = "反正剪紅色吧！"
2001506-88 = "真擔心今天要販售的新款飲料賣不賣得出去……"
2001506-90 = "好喝！沒問題的！"
2001506-92 = "這個新款的甜甜圈，到底合不合客人口味呢……"
2001506-94 = "嗯！很Q彈很好吃！"
2001506-96 = "（就這樣，我們突破了眾多難關……）"
2001506-99 = "哈啊，哈啊……終於到了……"
2001506-100 = "[s]「真的……真是好不容易……」"
2001506-101 = "不過，新卡包就在眼前了！"
2001506-102 = "不好意思！請給我甲蟲皇后的新卡包！"
2001506-103 = "哎呀，你的運氣真好。剛好剩下最後一組呢，拿好囉。"
2001506-104 = "哇啊……！好棒喔！整個卡包都亮晶晶的！"
2001506-105 = "[s]「嗯，很高興楓看起來這麼開心。」"
2001506-106 = "啊，現在不是站在這裡的時候！聽說每個卡包都會放一張稀有卡，要快點回去重組牌庫……"
2001506-107 = "什麼！已經賣光了……？！"
2001506-108 = "……嗯？"
2001506-110 = "實在很抱歉，正好剛剛賣完……"
2001506-111 = "嗚嗚……可是我一大早就爬起來，搭了4小時的電車耶……居然全賣完了……"
2001506-112 = "……老師，那個小朋友好像是從很遠的地方來的耶。"
2001506-113 = "[s]「……就是啊。」"
2001506-114 = "嗚嗚嗚……"
2001506-115 = "小朋友，別哭了！"
2001506-116 = "咦……"
2001506-117 = "來！這是今天發售的新卡包！"
2001506-118 = "大姊姊……？你要送我嗎……？"
2001506-119 = "[s]「楓，這樣好嗎？」"
2001506-120 = "嗯！！人家都從很遠的地方努力趕來了……"
2001506-121 = "而且「甲蟲皇后」裡面，有這麼一句話。"
2001506-122 = "不管多艱難的戰鬥……只要努力到最後就能得到對應的回報。就應該要得到回報！"
2001506-123 = "啊，我知道！這句在「甲蟲皇后」第139話！"
2001506-124 = "沒錯！所以，請收下吧！"
2001506-125 = "……謝，謝謝大姊姊！"
2001506-129 = "[ns]「楓。」"
2001506-130 = "老師。我剛才的舉動，像不像是個完美淑女呢？"
2001506-131 = "[s]「那是當然。」"
2001506-132 = "…………嗯，那太好了！"
2001506-133 = "啊啊，兩位！原來你們在這裡啊……！"
2001506-134 = "咦？是剛才在找隱形眼鏡那位……？"
2001506-135 = "抱歉自我介紹晚了，這是我的名片。"
2001506-136 = "[s]「『甲蟲皇后』專案宣傳負責人……？」"
2001506-137 = "……咦？！你是「甲蟲皇后」的員工？！"
2001506-138 = "我來這裡的路上，遇到好多得到你們幫助的人。"
2001506-139 = "明明兩位有急事要來這裡……卻依然對遇到困難的人伸出援手……"
2001506-140 = "就是身為「甲蟲皇后戰士」該有的精神！"
2001506-141 = "[s]「是，是這樣啊。」"
2001506-142 = "沒錯，甲蟲皇后戰士在某個角度上，和完美淑女是一樣的！"
2001506-143 = "沒錯，我今天見識到了真正的甲蟲皇后戰士……一名完美淑女！也讓我想到了一個好靈感！"
2001506-144 = "……？"
2001506-145 = "如果兩位不介意，我可以在「甲蟲皇后」的宣傳記錄片裡，提到今天發生的事嗎？"
2001506-146 = "標題定為「甲蟲皇后戰士～成為完美淑女～」！"
2001506-147 = "啊，當然，我不會要求讓我無償使用。請兩位先看這些。"
2001506-151 = "很抱歉我手上只有這些，但這些都是新卡包。首先請兩位收下20包新卡包！"
2001506-152 = "咦咦咦！？怎，怎麼辦啊。老師！？"
2001506-153 = "難，難道兩位不滿意嗎……？當然，若要換成其他謝禮……"
2001506-154 = "不，不是那樣的，只是……！"
2001506-155 = "怎，怎麼辦……？"
2001506-156 = "[s5]「我覺得收下這些回報完全沒問題。」\n[s6]「這不就是楓剛才說的那句話嗎？」"
2001506-157 = "啊……"
2001506-158 = "啊……"
2001506-159 = "「努力到最後就能得到對應的回報。就應該要得到回報」……"
2001506-160 = "……嗯！"
2001506-161 = "那麼，身為一名完美淑女………我就心懷感激的收下了！"
2001506-162 = "是，請務必收下！"
2001506-163 = "好了，那我們快點回去對戰吧！老師！"
2001506-164 = "我可不會放水唷！"
2001506-165 = "[s]「嗯，好啊。」"
2001506-167 = "（回到社團教室，我和楓開始進行甲蟲皇后對戰）"
2001506-169 = "首先是我的回合！擲骰子……"
2001506-170 = "數字是……6！我要抽牌了！"
2001506-174 = "喔喔！是「鑽魂兔．究極體」！一下子就抽到王牌了！"
2001506-175 = "這一定是卡片的靈魂在回應我的靈魂！"
2001506-176 = "[s]「是，是這樣啊……？」"
2001506-177 = "那首先，我要開始跳舞召喚「鑽魂兔．究極體」！"
2001506-178 = "哼哼哼～♪哼哼哼～♪ 好了，透過這段舞蹈，特別召喚「鑽魂兔．究極體」！"
2001506-183 = "然後，發動「鑽魂兔．究極體」的能力！因為「鑽魂兔．究極體」很可愛，而且我也很可愛……！"
2001506-184 = "所以「鑽魂兔．究極體」的攻擊力上升十倍！"
2001506-185 = "[s]「這數值讓人擔心遊戲平衡啊……！」"
2001506-186 = "我的回合還沒結束呢！"
2001506-187 = "做好覺悟吧……"
2001506-190 = "― ……呵呵。[wa:1200] "
2001506-192 = "― 總覺得今天，發生了好多事喔。[wa:1900] "
2001506-195 = "― 雖然是個令人暈頭轉向的一天……[wa:1640] "
2001506-197 = "― 但多虧了老師，我好像又朝完美淑女更進一步了！？[wa:2960] "
2001506-200 = "― 謝謝你，老師！[wa:1630] "
2001506-202 = "― 謝謝你，總是幫助我！[wa:1300] "
2001506-205 = "[ns7]「還以為你突然要說什麼呢……」\n[ns8]「我可是老師呀。有任何事，隨時都能跟我說。」"
2001506-206 = "― 真的嗎！？太好了！[wa:2600] "
2001506-207 = "― 真的嗎！？太好了！[wa:2600] "
2001506-209 = "― 那麼，我就用這喜悅的心情……向老師發動攻擊！[wa:4820] "
2001506-212 = "[ns]「溫馨的氣氛被轉化成攻擊力了！？」"
2001506-213 = "― 接招吧，[wa:1200] "
2001506-215 = "― 「鑽魂兔．究極體」的鑽頭衝擊──！！[wa:2380] "
2001506-218 = "― 嘻嘻嘻！"
2001506-222 = "好耶，我贏了！楓的不敗神話將會持續下去！"
2001506-223 = "怎樣，老師？我很強對吧？是最強的對吧？"
2001506-224 = "難道說，我變得強過頭了……呵呵……"
2001506-225 = "[s9]「不管玩幾次……我還是搞不懂規則……」\n[s10]「楓特別規則太多了，根本記不住……！」"
2001506-226 = "沒事沒事，別擔心！"
2001506-227 = "沒事沒事，別擔心！"
2001506-228 = "在老師記住之前，不管幾次我都願意陪老師玩！"
2001506-229 = "我們再來一局吧，老師！"
2001506-231 = "（就這樣，我和楓一起進行卡牌戰鬥直到深夜）"

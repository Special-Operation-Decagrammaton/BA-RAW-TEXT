2001506-218 = "― Heeheehee!"
2001506-222 = "That's that! I win! Kaede's win streak goes on and on!"
2001506-223 = "This is the power of a Mushiqueen battler, Sensei! Aren't I incredible?"
2001506-224 = "Maybe I'm too strong for my own good. Heehee!"
2001506-225 = "[s9] \"I've played so many times, and I still don't understand the rules.\"\n[s10] \"This might as well be called Kaede's special game.\""
2001506-226 = "It's okay, Sensei!"

[translation]
2001506-1 = "From Girl to Lady"
2001506-2 = "Oh, Sensei! Over here!"
2001506-3 = "[s1] \"I came as fast as I could.\"\n[s2] \"You told me something big was going on?\""
2001506-4 = "Okay, Sensei. You have to promise you won't be too surprised."
2001506-5 = "Okay, Sensei. You have to promise you won't be too surprised."
2001506-6 = "According to intel from a top secret source, at 3:00 PM today, at the Superstore..."
2001506-7 = "[s] \"The Superstore...?\""
2001506-8 = "They'll be selling new limited-edition card packs for Mushiqueen! It's unbelievable, I know!"
2001506-9 = "[s] \"Huh? Limited edition?\""
2001506-10 = "We can't miss this golden opportunity! I've been saving up all my allowance for this moment!"
2001506-11 = "[s] \"Kaede? Is this the something big you told me about?\""
2001506-12 = "Of course, Sensei! This is the biggest event of the year!"
2001506-13 = "Do you even know how much the Mushiqueen battlefield changed when the last limited-edition Mushiqueen card pack was released?!"
2001506-14 = "[s] \"...Er.\""
2001506-15 = "You have to help me, Sensei!"
2001506-16 = "There's always fierce competition getting limited-time merch. I'm a little scared to go by myself."
2001506-17 = "Please!"
2001506-18 = "Besides, I'm sure somewhere deep inside...the raging soul of the Mushiqueen is burning! Don't you want to test our friendship through the fire of card battle?"
2001506-19 = "[s3] \"I had no intention of doing that. Ever.\"\n[s4] \"If it's just a shopping trip, I'll come with you.\""
2001506-20 = "Well... You'll change your mind!"
2001506-21 = "Well... You'll change your mind!"
2001506-22 = "It'll be great working together!"
2001506-23 = "We're the perfect duo!"
2001506-24 = "Heehee! When we're about to battle the final boss and you have to tragically sacrifice yourself..."
2001506-25 = "I can use this to awaken and slay the boss!"
2001506-26 = "[s] \"But why do I have to be sacrificed?\""
2001506-27 = "Okay, Sensei! Let's go!"
2001506-28 = "Kaede dragged me to the Superstore."
2001506-31 = "Hurry! Hurry up, Sensei! Before it's all sold out!"
2001506-35 = "Oh... Oh no... This is bad news..."
2001506-36 = "Hm? What's going on?"
2001506-41 = "Oh dear... Why did this have to happen today of all days?!"
2001506-43 = "..."
2001506-44 = "[s] \"Kaede? Why are you stopping?\""
2001506-45 = "There's... There's someone in trouble!"
2001506-50 = "Over there!"
2001506-51 = "Huh? Can I help you, miss?"
2001506-52 = "I'm Kaede from the Inner Discipline Club! Is everything okay?"
2001506-53 = "Well... I lost my contact lens."
2001506-54 = "[s] \"Oh, they really do need help.\""
2001506-55 = "Yes... But it's okay. I don't want to be a bother. I'm sure you're busy."
2001506-56 = "Yes, we are very busy! The limited-edition Mushiqueen card pack is extremely important."
2001506-57 = "Mushiqueen...?"
2001506-58 = "Yes! But still!"
2001506-59 = "[s] \"A proper lady would never ignore someone in trouble. Right, Kaede?\""
2001506-60 = "Yes! You're right, Sensei! My goal is to become a proper lady, so I will help you!"
2001506-61 = "Oh... Thank you so much!"
2001506-63 = "Moments later."
2001506-65 = "Thank you! I can see now thanks to you!"
2001506-66 = "[s] \"Who would've thought a crow had it...\""
2001506-67 = "I'm glad we found it!"
2001506-68 = "How can I repay you? Can I give you my business card?"
2001506-69 = "We're out of time, Sensei! The sale is gonna start!"
2001506-70 = "We have to go! Bye-bye! Don't let that crow take your stuff again, okay?!"
2001506-72 = "[s] \"W-Wait, Kaede. Hold on! Uh... Goodbye!\""
2001506-76 = "Huh? Bye?"
2001506-78 = "Getting to the Superstore wasn't easy..."
2001506-79 = "Oh, Poppy! No! Stop! Someone help me catch my dog!"
2001506-80 = "Hey! Stop right there!"
2001506-81 = "Oh! Thank you so much!"
2001506-82 = "This is nothing for the dynamic duo: Sensei and me, the Mushiqueen battler!"
2001506-84 = "Oh! The Valkyrie students haven't arrived yet! The bomb's timer is running out! Which wire am I supposed to cut?!"
2001506-85 = "Agh!!! I don't know! The red one!"
2001506-86 = "*snip*"
2001506-88 = "I'm not sure if today's new drink will sell..."
2001506-90 = "*slurp* It's delicious! Pass!"
2001506-92 = "Oh, this donut..."
2001506-94 = "Soft and yummy!"
2001506-96 = "We conducted countless rescues and helped a lot of people..."
2001506-99 = "*pant* We're finally here!"
2001506-100 = "[s] \"Good work, Kaede.\""
2001506-101 = "We made it! The pack is mine!"
2001506-102 = "Hello! One card pack, please!"
2001506-103 = "Wow! You're very lucky. I have exactly one set left."
2001506-104 = "WOW! Finally! Look at this, Sensei! It's so shiny! Isn't it beautiful? There's one rare card in each pack!"
2001506-105 = "[s] \"You look so happy, Kaede.\""
2001506-106 = "Huh? That doesn't matter! Sensei we have to go organize the deck!"
2001506-107 = "Huh? I-It's all sold out?!"
2001506-108 = "Huh?"
2001506-110 = "Yes... I'm so sorry. We have no more in stock."
2001506-111 = "But...I woke up early...rode four hours on the subway...and now it's sold out...?"
2001506-112 = "Sensei... That kid traveled from so far..."
2001506-113 = "[s] \"Yeah... Four hours is pretty long.\""
2001506-114 = "*sob*"
2001506-115 = "Um... Hey! Don't cry!"
2001506-116 = "...Huh?"
2001506-117 = "Here! You can have my Mushiqueen pack!"
2001506-118 = "R-Really? You're giving this to me?"
2001506-119 = "[s] \"Are you sure, Kaede?\""
2001506-120 = "It's okay! Didn't you come from far away to buy this?"
2001506-121 = "There's a story like this in Mushiqueen!"
2001506-122 = "No matter how hard the battle is, there's a reward if you work hard enough! That's the Mushiqueen way!"
2001506-123 = "Yeah! I know that one! That's what the villain said in Mushiqueen Episode 139!"
2001506-124 = "See, you get it? So you can have it!"
2001506-125 = "Thank you so much!"
2001506-129 = "[ns] \"Kaede.\""
2001506-130 = "Heehee! Wasn't that super ladylike, Sensei?"
2001506-131 = "[s] \"Yes, the most ladylike thing I've ever seen!\""
2001506-132 = "Yay! I'm happy!"
2001506-133 = "Oh! There you are!"
2001506-134 = "Aren't you the person who lost their contact lens?"
2001506-135 = "Well, I'm actually..."
2001506-136 = "[s] \"The Mushiqueen PR manager?!\""
2001506-137 = "Huh?! The PR manager?"
2001506-138 = "On my way here, I ran into more people you'd helped."
2001506-139 = "You didn't ignore those who were in trouble and went out of your way to help even through you were in a hurry..."
2001506-140 = "That is the essence of a Mushiqueen battler's mindset!"
2001506-141 = "[s] \"...I-Is that right?\""
2001506-142 = "Yes! Mushiqueen sets the perfect example for a proper lady, Sensei!"
2001506-143 = "Today, I witnessed a true Mushiqueen Battler... A proper lady! And I was inspired with a slew of new ideas!"
2001506-144 = "...?"
2001506-145 = "If it's okay with you, can I put today's events in a promotional documentary for Mushiqueen? "
2001506-146 = "The title will be \"Mushiqueen Battler: A Proper Lady\"!"
2001506-147 = "I wouldn't ask you to do this for free, of course."
2001506-151 = "Since we'll be using your story for marketing purposes, I'll give you twenty limited-edition Mushiqueen card packs as a reward!"
2001506-152 = "WHAAAAT?! What do I do, Sensei? Can I really accept this?"
2001506-153 = "Oh... If you don't want them... I guess I could find something else..."
2001506-154 = "N-No! That's not it!"
2001506-155 = "What should I do, Sensei?!"
2001506-156 = "[s5] \"You deserve it, Kaede. You worked so hard.\"\n[s6] \"Remember? That Mushiqueen episode.\""
2001506-157 = "Huh? Oh!"
2001506-158 = "Huh? Oh!"
2001506-159 = "\"There's a reward if you work hard enough!\""
2001506-160 = "Yes!"
2001506-161 = "This is the fruits of all my efforts to become a proper lady! Thank you very much!"
2001506-162 = "You're welcome!"
2001506-163 = "When I get back, I have to practice battling with my new card packs, Sensei!"
2001506-164 = "I'm not gonna go easy on you, Sensei! You better be ready!"
2001506-165 = "[s] \"All right! Bring it on!\""
2001506-167 = "We returned back to the club room and played some exciting Mushiqueen battles together. It was surprisingly fun."
2001506-169 = "Okay! It's my turn... Roll the dice..."
2001506-170 = "Woohoo! I got a six! Now I can pick a card..."
2001506-174 = "I got the Drill Horn Rabbit - Ultimate card! That's my ace card!"
2001506-175 = "Sensei, Sensei! This is a critical moment! I can feel the card's soul! It's speaking to me!"
2001506-176 = "[s] \"Is it...?\""
2001506-177 = "Heehee! Now I'm going to dance to summon the Drill Horn Rabbit - Ultimate!"
2001506-178 = "Teehee. Kaede's special summon: the Drill Horn Rabbit - Ultimate with special summoning dance!"
2001506-183 = "Here comes the Drill Horn Rabbit - Ultimate unique skill! The cuteness of the Drill Horn Rabbit - Ultimate, compounded with my cuteness!"
2001506-184 = "This increases the Drill Horn Rabbit - Ultimate's ATK tenfold!"
2001506-185 = "[s] \"Is that really how the game works...?\""
2001506-186 = "Sensei! Don't let your guard down yet! My turn isn't over!"
2001506-187 = "You have to get ready! Here I go!"
2001506-190 = "― Heehee.[wa:1120] "
2001506-192 = "― I feel like so much happened today.[wa:1060] "
2001506-195 = "― It was hectic, but...[wa:1400] "

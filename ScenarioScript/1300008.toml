[translation]
1300008-1 = "早安，主人"
1300008-2 = "夏萊．居住區"
1300008-4 = "呵呵，還在睡覺呢。"
1300008-5 = "好像在做著什麼好夢呢，但是很抱歉……"
1300008-6 = "差不多是，該起床的時間了。"
1300008-13 = "您醒來了嗎？"
1300008-14 = "早安，主人。"
1300008-15 = "好像比平常還早，是嗎？沒錯，我提早來叫您起床了。"
1300008-16 = "至於理由……待會會告訴您的。"
1300008-17 = "呵呵，如果讓您不高興了的話，之後要處罰我也沒問題的唷。"
1300008-18 = "不對！應該說我強烈希望能被處罰！"
1300008-19 = "如果是為了主人健全的生活和規律的飲食的話，朱音我有就算下地獄，也能露出燦爛笑容的自信。"
1300008-20 = "那麼就趕快！處罰我吧！"
1300008-21 = "……"
1300008-22 = "……哎呀，沒有處罰或責罵嗎？"
1300008-23 = "您真是溫柔呢，呵呵。"
1300008-25 = "啊，竟然又躺下去了。不能這樣唷～請趕快起床。"
1300008-26 = "您就放棄……咦，咦咦？為什麼要把我……呀啊！"
1300008-27 = "啊……"
1300008-30 = "真，真是的。"
1300008-31 = "竟，竟然把女僕強行拉到床上……"
1300008-32 = "……哎！？一，一起睡嗎！？"
1300008-33 = "那，那種，下流的事……啊啊，就算是主人，也還不能……"
1300008-35 = "耶？"
1300008-36 = "……。"
1300008-37 = "騙，騙人的吧？"
1300008-38 = "真……真的睡著了！？"
1300008-39 = "怎麼這樣！難以置信！趕快起來！都已經做到這一步了竟然來這招嗎！"
1300008-40 = "……呼。"
1300008-41 = "其實……之所以早點來叫醒主人是因為……"
1300008-42 = "哪怕只是早那麼一點點，也想趕快見到主人，和主人說說話。"
1300008-43 = "……"
1300008-44 = "唔嗯……就這樣待著……好像也不賴呢。"
1300008-45 = "呵呵，真暖和。"
1300008-46 = "雖然就這麼和主人一起，享受幸福的早晨也不錯……"
1300008-48 = "但我還有些，不得不去準備的東西。"
1300008-49 = "呵呵……請您稍等一下囉。"

[translation]
1300008-1 = "อรุณสวัสดิ์ค่ะนายท่าน"
1300008-2 = "บ้านพักของชาเล่ต์"
1300008-4 = "ฮุฮุ ยังนอนเป็นเด็กอยู่เลยนะคะ"
1300008-5 = "น่าจะกำลังฝันหวานอยู่เลย แต่ขอโทษนะคะ..."
1300008-6 = "ได้เวลาตื่นแล้วค่ะ"
1300008-13 = "ตื่นแล้วเหรอคะ?"
1300008-14 = "อรุณสวัสดิ์ค่ะนายท่าน"
1300008-15 = "ปกติจะตื่นช้ากว่านี้เหรอคะ? ฉันรู้ค่ะ ฉันมาปลุกก่อนเวลาน่ะค่ะ"
1300008-16 = "ส่วนสาเหตุที่มาปลุก... เดี๋ยวไว้บอกทีหลังค่ะ"
1300008-17 = "ฮุฮุ ถ้าไม่ชอบใจก็ลงโทษฉันได้นะคะ"
1300008-18 = "ที่จริงแล้ว... ฉันอยากโดนลงโทษหนักๆ เลยค่ะ!"
1300008-19 = "ถ้าเป็นการทำเพื่อสุขภาพที่ดีและการรับประทานอาหารที่ตรงเวลาของนายท่านแล้วล่ะก็#nต่อให้โทษหนักขนาดถึงต้องไปตกนรก อาคาเนะก็จะยิ้มรับค่ะ"
1300008-20 = "ลงโทษมาเลยค่ะ!"
1300008-21 = "......"
1300008-22 = "อ้าว... ไม่เป็นไรเหรอคะ?"
1300008-23 = "ใจดีจังเลย... ฮุฮุ"
1300008-25 = "อ๊ะ! จะลงไปนอนอีกไม่ได้นะคะ~ ลุกขึ้นเลย"
1300008-26 = "ฉันไม่ยอมให้หรอกค่ะ... อุ๊ย! ว้าย! ตายแล้ว! ทำไม... อ๊าย!?"
1300008-27 = "หืม?"
1300008-30 = "นะ... นายท่าน!"
1300008-31 = "ละ... ลากเมดมาบนเตียงแบบนี้ได้ไงคะ..."
1300008-32 = "หะ... ให้มานอน... ด้วยกันเหรอคะ?!"
1300008-33 = "อ่า... ตายแล้ว น่าอายจัง... ถึงจะเป็นนายท่านก็เถอะ แต่นี่มัน..."
1300008-35 = "เอ๋?"
1300008-36 = "...."
1300008-37 = "พระเจ้าช่วย..."
1300008-38 = "หละ... หลับไปแล้วเหรอคะเนี่ย?!"
1300008-39 = "ทำแบบนี้ได้ไง! ไม่อยากจะเชื่อเลย! ตื่นนะคะ! นอนต่อไม่ได้นะ!"
1300008-40 = "เฮ้อ..."
1300008-41 = "ความจริงแล้ว... ที่ฉันมาปลุกนายท่านตั้งแต่เช้าตรู่แบบนี้..."
1300008-42 = "ก็เพราะอยากเจอนายท่านไวๆ และใช้เวลาพูดคุยกันให้มากกว่าเดิมหน่อยน่ะค่ะ..."
1300008-43 = "......"
1300008-44 = "อืม... การได้อยู่แบบนี้... มันก็ไม่ได้แย่นะคะ"
1300008-45 = "ฮุฮุ อบอุ่นดีจังเลยค่ะ"
1300008-46 = "การได้อยู่ด้วยกันอย่างมีความสุขในตอนเช้าแบบนี้ก็ดีอยู่แล้ว..."
1300008-48 = "แต่ฉันมีบางอย่างเตรียมไว้ด้วยค่ะ"
1300008-49 = "เดี๋ยวนายท่านก็จะได้เห็นแล้วค่ะ"

[translation]
1300008-1 = "Good Morning, Master"
1300008-2 = "Schale House"
1300008-4 = "Heehee. Still sleeping like a baby, are you?"
1300008-5 = "And it looks like such a pleasant dream. Please forgive me for this."
1300008-6 = "It's time to wake up."
1300008-13 = "You're up."
1300008-14 = "Good morning, Master."
1300008-15 = "It's early? Well, naturally. I woke you up early after all."
1300008-16 = "My motivation can...wait until later."
1300008-17 = "Heehee. You have permission to punish me if you're upset."
1300008-18 = "In fact, I insist!"
1300008-19 = "I would go through hell and back with a smile on my face if it meant serving you until you're healthy and happy!"
1300008-20 = "So punish me!"
1300008-21 = "..."
1300008-22 = "Oh. You don't see the need to?"
1300008-23 = "You're too kind for your own good, Master. Heehee."
1300008-25 = "Ah, you can't lie down again! Wake up."
1300008-26 = "You may as well give in and... Oh dear. What are you...? Ah!"
1300008-27 = "Huh?"
1300008-30 = "O-Oh, my. "
1300008-31 = "F-Forcing a maid into your bed... How daring."
1300008-32 = "Pardon? Sleep together?!"
1300008-33 = "My, how scandalous. You may be my master, but still..."
1300008-35 = "Hmm?"
1300008-36 = "..."
1300008-37 = "My word. "
1300008-38 = "Did... Did you actually fall asleep?!"
1300008-39 = "Goodness, I don't believe this! Wake up! Wake up this instant! "
1300008-40 = "*sigh*"
1300008-41 = "Listen. The real reason I came to wake you up early today..."
1300008-42 = "...is because I couldn't wait to see and talk with you again."
1300008-43 = "..."
1300008-44 = "So part of me wouldn't mind staying like this a while longer."
1300008-45 = "Heehee. It's so warm."
1300008-46 = "This would make for a blissful way to start the day..."
1300008-48 = "...but I do have something else prepared."
1300008-49 = "I think you'll see it soon enough."

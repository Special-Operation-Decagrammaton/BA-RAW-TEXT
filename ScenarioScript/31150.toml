[translation]
31150-1 = "ตอนที่ 15;รองหัวหน้าชมรมทวงความยุติธรรม 2"
31150-4 = "…"
31150-5 = "ฉะ... ฉันขอบอกไว้ก่อน! ฉันไม่ได้ตั้งใจนะ!"
31150-6 = "[s] \"อะไรเหรอ...?\" "
31150-7 = "หนะ... หนังสือโป๊ไง... ปกติฉันซ่อนอย่างดี เอ๊ย ปกติฉันไม่มีหนังสืออะไรแบบนั้นหรอก"
31150-8 = "[s] \"ต่อไปก็อย่าให้โดนจับได้แล้วกัน\""
31150-9 = "?!"
31150-10 = "พะ... พูดอะไรน่ะ? แปลว่าเก็บติดตัวไว้ได้ ขอแค่อย่าให้โดนจับได้งั้นเหรอ?! "
31150-11 = "คิดอะไรอยู่น่ะ?! เป็นคุณครูหรือภัยสังคมกันแน่เนี่ย! นั่นเรื่องต้องห้ามนะ!! ลงโทษ! ต้องโดนลงโทษ!!"
31150-12 = "[s] \"ลงโทษโคฮารุด้วยไหม?\""
31150-13 = "?!"
31150-14 = "เอ่อ... ฉัน..."
31150-15 = "กะ... ก็บอกแล้วไงว่าไม่ได้ตั้งใจ! แบบนี้ไม่นับ! ไม่ถือว่าเป็นความผิด!"
31150-16 = "[s] \"ฮื้ม...\""
31150-17 = " อะ... อะไรเนี่ย? ทำไมตอบแบบนั้น?!  หัวเราะเยาะฉันเหรอ?!"
31150-18 = "[s] \"ครูว่าโคฮารุเป็นตัวของตัวเองก็ได้นะ\""
31150-19 = "หะ... หืม...?"
31150-20 = "[s] \"ไม่ต้องพยายามทำตัวให้เหมือนคนอื่นหรอก\""
31150-21 = "…"
31150-22 = "ไม่เห็นเข้าใจเลย..."
31150-23 = "แต่ก็..."
31150-24 = "เอาเป็นว่า... ฉันรู้แล้วว่า... คุณครูใส่ใจฉัน..."
31150-25 = "…"
31150-26 = "ฮึ่ม!"
31150-27 = "ดีล่ะ! งั้นฉันจะบอกความลับให้อย่างหนึ่งเป็นการตอบแทนแล้วกัน"
31150-28 = "[s] \"ความลับเหรอ?\""
31150-29 = "…"
31150-34 = "ที่จริงแล้วฉัน..."
31150-35 = "ฉันคือสายลับที่ปลอมตัวมาสังเกตการณ์ว่าทุกอย่างในชมรมชั้นเรียนเสริมเรียบร้อยดีรึเปล่า.."
31150-36 = "[s] \"......?\""
31150-37 = "ฉันกำลังทำภารกิจลับอยู่น่ะ การที่ฉันทำตัวเหมือนคนโง่เง่าแบบนี้ ฉันแค่เฟคขึ้นมาน่ะ!"
31150-38 = "[s] \"ใครสั่งมาเหรอ?\""
31150-39 = "หะ... หืม? คนนั้น..."
31150-40 = "เอ่อ... ระ... รุ่นพี่ฮาสุมิ!"
31150-41 = "ใช่! ก็รุ่นพี่ฮาสุมิคือรองหัวหน้าชมรมทวงความยุติธรรมที่แข็งแกร่งที่สุดในทรีนิตี้ "
31150-46 = "เอ่อ... แล้วก็มี... ท่านหัวหน้าซึ... ซึรุกิ... อยู่เบื้องหลัง!"
31150-47 = "[s] \"อย่างนั้นเหรอ?\""
31150-48 = "กะ... ก็ท่านหัวหน้าซึรุกิเป็นคนที่มีไหวพริบ มองการณ์ไกล... มีความรู้ทางวิชาการและกลอุบาย!"
31150-49 = "อ่อ ถึงฉันจะเคยเห็นไม่กี่ครั้ง... แต่ก็เอาเถอะ!"
31150-50 = "ทีนี้ก็รู้แล้วใช่ไหมว่าจริงๆ แล้วฉันไม่ได้หัวทึบจนต้องมาอยู่ในชมรมชั้นเรียนเสริมนี่น่ะ!"
31150-51 = "เพราะที่จริงแล้วฉันคือคนเก่งที่กำลังปฏิบัติภารกิจสายลับที่สำคัญอยู่!"
31150-52 = "[s] \"อืม... ตามนั้น\" "
31150-53 = "…"
31150-54 = "[s] \"แต่นี่เป็นภารกิจสายลับนะ มาบอกครูตามใจได้เหรอ?\""
31150-55 = "…?!"
31150-56 = "กะ... ก็คุณครูจะรักษาความลับนี่นา? ...เพราะงั้นไม่เป็นไรหรอก!"
31150-61 = "ห้องควบคุมของที่ถูกอายัด ชมรมทวงความยุติธรรม"
31150-63 = "ดีล่ะ... โล่งอกไปที ในที่สุดก็เอามาคืนได้ "
31150-64 = "เหมือนได้ยกภูเขาออกจากอกเลย..."
31150-70 = "โคฮารุ...?"
31150-71 = "ระ... รุ่นพี่ฮาสุมิ...?!"
31150-72 = "แล้วก็คุณครูด้วย? ไม่ได้ไปอยู่ที่อาคารย่อยเพื่อเข้าแคมป์ฝึกฝนกันเหรอคะ?"
31150-73 = "ทุกคนไม่น่าจะมาที่นี่ได้จนกว่าจะสอบผ่านนะคะ"
31150-74 = "เอ่อ... คือว่า... แบบว่า... อืม..."
31150-75 = "[s] พูดหาเหตุผลอ้อมแอ้ม"
31150-77 = "อ่า... มาเอาหนังสือที่จะใช้ติวเหรอคะ? "
31150-78 = "ก็ได้ค่ะ... ถ้าด้วยเหตุผลนี้คงต้องยอมให้"
31150-79 = "ค่ะ..."
31150-80 = "แต่ก็มาได้ถูกจังหวะเลยนะคะ ฉันมีเรื่องจะคุยกับโคฮารุอยู่พอดี..."
31150-81 = "คะ? คะ... คุยกับฉันเหรอ?"
31150-82 = "ขอโทษนะคะคุณครู เราขอคุยกันเพียง 2 คนได้ไหมคะ?#nมันเป็นเรื่องสำคัญที่สมาชิกชมรมทวงความยุติธรรมเท่านั้นที่ทำได้น่ะค่ะ"
31150-83 = "[s] \"อื้ม ได้สิ\""
31150-84 = "ขอโทษด้วยนะคะ..."
31150-86 = "(คุณครูไปรอที่ห้องข้างๆ)"
31150-91 = "ช่วย... หน่อยนะคะ... โคฮารุ..."
31150-92 = "...ช่วยอย่า... ...เป้าหมายของ..."
31150-94 = "[ns] \".........\""
31150-96 = "แต่ว่า... แต่มัน... หนักเกินไป... สำหรับ..."
31150-97 = "...แบบนั้น... เกินไป... สำหรับ..."
31150-98 = "ไม่หรอกค่ะ! ทำได้สิคะ! ยังไงก็ต้องทำค่ะ!"
31150-99 = "[ns] (ได้ยินเสียงดังลั่นของฮาสุมิ...)"
31150-101 = "ไม่ค่ะ... แต่ว่า... เพื่อ... ต่อไป..."
31150-102 = "แล้วก็... ครู... เข้าใจไหม..."
31150-103 = "ค่ะ... ฉันจะ... พยายาม..."
31150-107 = "รอนานไหมคุณครู?  "
31150-108 = "เรากลับกันเถอะ"
31150-109 = "[s] \"เกิดเรื่องอะไรเหรอ?\""
31150-110 = "หืม? เปล่าหรอก มันไม่ใช่เรื่องใหญ่อะไรน่ะ "
31150-112 = "(คุณครูเดินทางกลับกับโคฮารุ)"
31150-113 = "(และแล้ววันที่สองของแคมป์ฝึกฝนก็สิ้นสุดลง)"
31150-115 = "ตอนต่อไป;โอกาสเล็กๆ"

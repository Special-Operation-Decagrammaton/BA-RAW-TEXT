[translation]
31150-1 = "第15話;正義実現委員会の副委員長（２）"
31150-4 = "……その、"
31150-5 = "い、言っておくけど、こればっかりは本当に間違いだから！"
31150-6 = "[s] \"……？\""
31150-7 = "いつものはちゃんと隠……じゃなくて、あんまり持ち歩いたりしないし……。"
31150-8 = "[s] \"バレないように、上手く隠さないとね。\""
31150-9 = "！？！？"
31150-10 = "な、なに言ってるの！？それ、バレなきゃ持ってても良いって言ってるのと同じじゃん！？"
31150-11 = "せ、先生なんでしょ！？何考えてるの！？エッチなのはダメ！死刑！！"
31150-12 = "[s] \"その理論だと、コハルも刑に……。\""
31150-13 = "え、や、ちがっ……！？"
31150-14 = "わ、私は、その……"
31150-15 = "こ、これについては本当に間違いだから！つまりノーカン！！"
31150-16 = "[s] \"うん、じゃあそういうことにしよう。\""
31150-17 = "……！？なっ、何それ！大人の余裕ってわけ！？"
31150-18 = "[s] \"色々あるけど、無理に縛られなくて良いと思うよ。\""
31150-19 = "え……？"
31150-20 = "[s] \"コハルはコハルだから。\""
31150-21 = "……。"
31150-22 = "分かったような、分からないような……。"
31150-23 = "うん、でも……。"
31150-24 = "先生が私のことを考えてくれてるってことは、少しだけ分かった……。"
31150-25 = "……。"
31150-26 = "じゃ、じゃあっ！"
31150-27 = "お返しに、ひとつ私の秘密を教えてあげる！"
31150-28 = "[s] \"秘密？\""
31150-29 = "……。"
31150-34 = "実は、私……"
31150-35 = "……補習授業部が上手く回ってるかを監視するための、スパイなの！"
31150-36 = "[s] \"……スパイ？\""
31150-37 = "つまり、秘密のミッションを遂行中の身ってこと。だから今は私がバカみたいに見えてるかもしれないけど、これも全部フェイクってわけ！"
31150-38 = "[s] \"ミッション……誰からの指示で……？\""
31150-39 = "う、えっと……だ、誰って、その……。"
31150-40 = "んと……は、ハスミ先輩！"
31150-41 = "そう！ハスミ先輩はトリニティの中でもすっごい強くて、正義実現委員会の副委員長だし！"
31150-46 = "あ、あと、そう！つ、ツルギ委員長だっているんだから！"
31150-47 = "[s] \"……なるほど。\""
31150-48 = "つ、ツルギ委員長はその、えっと、委員長だし……そう、何でもできるの！ぶ、文武両道……？だから！多分！"
31150-49 = "何回かしか会ったことないけど……と、とにかくすごいの！"
31150-50 = "だから、そういうこと。私は別に、本当に勉強ができなくて補習授業部に入ったわけじゃないってこと、覚えといて！"
31150-51 = "私はスパイとして大事な任務を任されてる、エリートなんだから！"
31150-52 = "[s] \"そうなんだ。\""
31150-53 = "ふふんっ。"
31150-54 = "[s] \"でもこれ、教えちゃって大丈夫なことだったの？\""
31150-55 = "……！！"
31150-56 = "せ、先生が生徒の秘密をやたらに言いふらしたりしないでしょ！？しないよね！？……じゃ、じゃあ大丈夫！"
31150-61 = "正義実現委員会・押収品管理室"
31150-63 = "……うん、これで良し。"
31150-64 = "とりあえずひと安心――"
31150-70 = "……コハル？"
31150-71 = "は、ハスミ先輩！？"
31150-72 = "それに、先生まで……？たしか合宿で別館にいると聞いたのですが、どうかしましたか？"
31150-73 = "成績が良くなるまで、ここへは出入り禁止になっているはずですが……。"
31150-74 = "そ、その、違うんです、えっと……。"
31150-75 = "[s] 良い感じに誤魔化す。"
31150-77 = "……なるほど、授業に使う書籍の件で。"
31150-78 = "そういうことでしたら、仕方ありませんね。"
31150-79 = "は、はい……。"
31150-80 = "ですが、ある意味ちょうど良かったです。コハルにあらためて伝えておきたいこともありましたし……"
31150-81 = "え？わ、私ですか……？"
31150-82 = "先生、申し訳ないのですが少し席を外していただけますでしょうか？正義実現委員会としてお話したいこと、と言いますか……。"
31150-83 = "[s] \"うん、分かった。\""
31150-84 = "……すみません、ありがとうございます。"
31150-86 = "隣の部屋で待つことにした。"
31150-91 = "……コハル…………てください。"
31150-92 = "本来の……を……ないで………………"
31150-94 = "[ns] （この距離でも、微妙に声が聞こえてきてしまう……）"
31150-96 = "でも…………には……無理……"
31150-97 = "……なんて…………あまりにも……ことで……"
31150-98 = "それではダメなんです！"
31150-99 = "[ns] （もっと遠くの方に、と思った瞬間ハスミの怒鳴り声が……）"
31150-101 = "……なさい………………ずっと……ために………………"
31150-102 = "……先生…………を……です…………"
31150-103 = "……はい………………ます。"
31150-107 = "お、お待たせ……先生？"
31150-108 = "……帰らないの？"
31150-109 = "[s] \"……コハル、大丈夫？\""
31150-110 = "え、う、うん？別に、大丈夫だけど……？"
31150-112 = "コハルと一緒に帰路につき……"
31150-113 = "そして、また一日が終わりに近づいていく。"
31150-115 = "次回;小さな隙間"

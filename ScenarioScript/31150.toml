[translation]
31150-1 = "第15話;實現正義部的副部長（２）"
31150-4 = "……"
31150-5 = "我，我先說清楚！這真的只是意外！"
31150-6 = "[s]「……？什麼意思？」"
31150-7 = "色，色色的書……我平常都會確實藏……不對，是不會帶在身上。"
31150-8 = "[s]「之後要記得藏好哦。」"
31150-9 = "！？"
31150-10 = "你，你在說什麼啊！？你的意思是不被發現就可以帶在身上嗎！？"
31150-11 = "在想什麼啊！？你可是老師耶！不可以色色！死刑！！"
31150-12 = "[s]「所以小春也要死刑……？」"
31150-13 = "！？"
31150-14 = "我，我……"
31150-15 = "我只是碰到一點意外！所以不算！"
31150-16 = "[s]「好吧，那也沒辦法。」"
31150-17 = "那，那是什麼反應！？是在嘲笑我嗎！？"
31150-18 = "[s]「我覺得小春只要做自己就可以囉。」"
31150-19 = "咦……？"
31150-20 = "[s]「沒有必要刻意迎合其他人。」"
31150-21 = "……"
31150-22 = "好，好像懂又好像不太懂……"
31150-23 = "不過……"
31150-24 = "老師在為我著想……這點我倒是知道了……"
31150-25 = "……"
31150-26 = "那，那麼！"
31150-27 = "作為回禮，我告訴你一個重大的祕密！"
31150-28 = "[s]「祕密？」"
31150-29 = "……"
31150-34 = "其實我……"
31150-35 = "……是為了監視補課部的運作是否順利而偽裝的間諜！"
31150-36 = "[s]「……？」"
31150-37 = "換句話說就是在執行祕密任務。#n所以我看起來像個笨蛋也全都是裝出來的！"
31150-38 = "[s]「是誰派你來的……？」"
31150-39 = "咦？要問是誰的話……"
31150-40 = "那個……對了，是蓮實前輩！"
31150-41 = "沒錯！蓮實前輩在三一也非常厲害，還是實現正義部的副部長！"
31150-46 = "而，而且在他背後還有弦，弦生部長在！"
31150-47 = "[s]「……原來如此。」"
31150-48 = "弦，弦生部長是眼光非常長遠的頭腦派……可以說是文武雙全！"
31150-49 = "雖然我也只見過幾次……總之就是很厲害！"
31150-50 = "所以你懂了吧？我並不是真的不會唸書才進入補課部的，要記清楚哦！"
31150-51 = "我其實是個背負重大諜報任務的菁英啊！"
31150-52 = "[s]「……這樣啊。」"
31150-53 = "……"
31150-54 = "[s]「不過明明是諜報任務，擅自告訴我這些沒關係嗎？」"
31150-55 = "……！？"
31150-56 = "老，老師會幫我保守祕密吧！？#n……所以沒關係！"
31150-61 = "實現正義部．扣押品管理室"
31150-63 = "……呼，總算是順利拿過來了。"
31150-64 = "太好了，這樣就能放心地──"
31150-70 = "……小春？"
31150-71 = "蓮，蓮實前輩！？"
31150-72 = "而且連老師也在……兩位不是應該正在別館進行合宿嗎？"
31150-73 = "在順利合格之前，應該是禁止出入這裡的才對……"
31150-74 = "那，那個，這是因為……因為……"
31150-75 = "[s] 適當地蒙混過去"
31150-77 = "……啊啊，原來是為了拿教學用的書籍而來。"
31150-78 = "既然如此，那確實是沒辦法呢。"
31150-79 = "是，是的……"
31150-80 = "不過這樣正好。#n其實我有些話想告訴小春……"
31150-81 = "咦？我，我嗎……？"
31150-82 = "……老師。不好意思，可以請您稍微迴避一下嗎？#n畢竟這是實現正義部的重要事項……"
31150-83 = "[s]「嗯，我知道了。」"
31150-84 = "……感謝您的諒解，老師。"
31150-86 = "（決定在隔壁的房間等待）"
31150-91 = "……小春……請……"
31150-92 = "本來的…………請不要………………"
31150-94 = "[ns] （……）"
31150-96 = "但是……對……沒辦法……"
31150-97 = "……什麼的…………實在是……事情……"
31150-98 = "那樣是不行的！"
31150-99 = "[ns] （聽見了蓮實的怒吼聲……）"
31150-101 = "……不起………………為了……一直………………"
31150-102 = "……老師………………事…………"
31150-103 = "……是的………………的。"
31150-107 = "久等了，老師。"
31150-108 = "我們回去吧。"
31150-109 = "[s]「剛才發生了什麼嗎？」"
31150-110 = "嗯？沒什麼，不是什麼大事。"
31150-112 = "（和小春一起踏上了回程的路……）"
31150-113 = "（於是一天又接近了尾聲）"
31150-115 = "下一話;小小的閒隙"

[translation]
31150-1 = "Episode 15;Justice Task Force Vice President Part 2"
31150-4 = "..."
31150-5 = "J-Just to clarify, this really was all one big misunderstanding!"
31150-6 = "[s] \"Huh? What was?\""
31150-7 = "Th-That...book. I'm usually better about hiding it. I-I mean, I don't carry it with me."
31150-8 = "[s] \"Don't get caught next time.\""
31150-9 = "...?!"
31150-10 = "What are you trying to say?! That breaking the rules is fine as long as you don't get caught?! "
31150-11 = "You're supposed to be an adult! A sensei! Indecency is forbidden! You're going to be sentenced to death! Death!!!"
31150-12 = "[s] \"Wouldn't you get the same sentence?\""
31150-13 = "...?!"
31150-14 = "I-I..."
31150-15 = "I made an honest mistake! It doesn't count!"
31150-16 = "[s] \"If you say so.\""
31150-17 = "I do say so! Are you mocking me?!"
31150-18 = "[s] \"You shouldn't be ashamed to be yourself.\""
31150-19 = "H-Huh?"
31150-20 = "[s] \"You should be more comfortable with who you are.\""
31150-21 = "..."
31150-22 = "I-I don't know what you're talking about."
31150-23 = "But..."
31150-24 = "...I know you're trying to look out for me."
31150-25 = "..."
31150-26 = "Hmph!"
31150-27 = "Okay! I'll share an important secret with you in return!"
31150-28 = "[s] \"Secret?\""
31150-29 = "..."
31150-34 = "The truth is..."
31150-35 = "...I'm a spy who was sent here to monitor the Make-Up Work Club's progress."
31150-36 = "[s] \"...?\""
31150-37 = "Simply put, I'm carrying out a secret mission. I'm putting on an act and am not really such an idiot!"
31150-38 = "[s] \"Who sent you?\""
31150-39 = "Wh-Who sent me...?"
31150-40 = "Oh, right. It's, um...Hasumi!"
31150-41 = "That's right! Hasumi is the powerful vice president of Trinity's Justice Task Force! "
31150-46 = "A-And right above her is...President Tsurugi! She's backing it!"
31150-47 = "[s] \"You don't say.\""
31150-48 = "I-It's because President Tsurugi is so brilliant! It's like she can see 1,000 moves ahead. She's a master of the pen and sword!"
31150-49 = "Or, so I've heard. I haven't been allowed to see her that many times...but I know it's true!"
31150-50 = "Now do you get it? I didn't end up in the Make-Up Work Club because I'm actually bad at studying!"
31150-51 = "I'm actually an amazing spy who is carrying out an important undercover mission!"
31150-52 = "[s] \"Whatever you say.\""
31150-53 = "..."
31150-54 = "[s] \"Are you sure it's okay to blow your cover to me?\""
31150-55 = "...?!"
31150-56 = "Y-You wouldn't expose my secret, would you, Sensei? I told you because I know I can trust you!"
31150-61 = "Contraband Room"
31150-63 = "*sigh* It's done. I put it back where it's supposed to be. "
31150-64 = "Thank goodness it's over. Now we can—"
31150-70 = "Koharu?"
31150-71 = "H-Hasumi?!"
31150-72 = "And Sensei is with you too. Shouldn't you both be at the annex for boot camp?"
31150-73 = "You're not permitted to return to the Justice Task Force until your grades are above passing."
31150-74 = "I know that, but the thing is, um..."
31150-75 = "[s] Come up with a good excuse."
31150-77 = "Oh, so you came to pick up a book to help with your studies."
31150-78 = "Of course. That's a perfectly valid reason to visit."
31150-79 = "Y-Yeah."
31150-80 = "It's excellent timing actually. There's something I've been needing to discuss with you."
31150-81 = "What? With m-me...?"
31150-82 = "My apologies, but could you give us a moment of privacy, Sensei? This is an important matter that is for Justice Task Force member ears only."
31150-83 = "[s] \"Sure, okay.\""
31150-84 = "Sorry, Sensei."
31150-86 = "I decided to wait in the room next door."
31150-91 = "Please...Koharu."
31150-92 = "Don't lose...your goal..."
31150-94 = "[ns] \"...\""
31150-96 = "But...don't think...I can..."
31150-97 = "How...I'm not...this mission..."
31150-98 = "There's no other choice! It must be done!"
31150-99 = "[ns] \"(That was Hasumi shouting just now...)\""
31150-101 = "Forgive me...but...only way you..."
31150-102 = "...for me...Sensei...help us..."
31150-103 = "All right. I...try..."
31150-107 = "Sorry to keep you waiting, Sensei. "
31150-108 = "Let's head back now."
31150-109 = "[s] \"Is everything all right?\""
31150-110 = "Hmm? Yeah, nothing to worry about. "
31150-112 = "Koharu and I made our way back."
31150-113 = "The second day of boot camp came to a quiet ending."
31150-115 = "Next Episode;Crack in the Surface"

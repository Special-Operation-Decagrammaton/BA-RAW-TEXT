[translation]
52120-1 = "Episode 12;Kadenokouji's Miko"
52120-5 = "We spent half the day walking across the snowfield before arriving at the mansion."
52120-11 = "This must be the Mansion of the Beyond..."
52120-12 = "I-I've never been here before."
52120-13 = "...Strange. Was this mansion truly abandoned for several decades?"
52120-18 = "The garden is clean. The grass hasn't overgrown, as if someone tended it a few days ago."
52120-19 = "Isn't that all the more reason that this could be Nature's Beauty's base?"
52120-20 = "Someone maintaining and living in what was thought to be an abandoned mansion is inherently suspicious, right?"
52120-22 = "I agree with Ayame. All of this points to a larger, sinister operation."
52120-23 = "And if this is truly Nature's Beauty's base, then Shuro must—"
52120-30 = "..."
52120-31 = "Yabuki Shuro...?"
52120-32 = "[s] \"Are you all right?\""
52120-36 = "I can't do this..."
52120-37 = "How can I look in Miss Kokuriko's eyes...?"
52120-38 = "She gave me two chances, and I failed both times! She'll hate me!"
52120-39 = "She'll abandon me... Throw me out like last week's trash..."
52120-40 = "Oh, wow... Is Kokuriko really that cruel?"
52120-44 = "Don't you dare speak of Miss Kokuriko! Miss Kokuriko is..."
52120-45 = "Waah..."
52120-46 = "[s] \"Poor kid...\""
52120-48 = "[ns] \"How about you all go ahead? I'll watch Shuro.\""
52120-53 = "We were going to split up to case the mansion anyway..."
52120-54 = "Surely we cannot leave Sensei alone and defenseless? What if an Artifact Spirit emerges?"
52120-55 = "I suppose I can stay with these two."
52120-59 = "I'm no warrior, after all. I couldn't possibly be of much use in your search..."
52120-60 = "But I am fast. If something happens, I'll grab Sensei and run to you!"
52120-62 = "No, I don't think that's enough."
52120-63 = "I will stay behind and watch Shuro—"
52120-64 = "[s1] \"Don't worry, Kikyou.\"\n[s2] \"We'll be close by.\""
52120-67 = "But..."
52120-68 = "[s] \"As Azami said, we'll run if something happens.\""
52120-73 = "Fine. But don't overexert yourself."
52120-74 = "...You have a bad habit of trying to play the hero."
52120-75 = "[s] \"Thank you for your concern.\""
52120-76 = "Then shall we split up and start our search?"
52120-77 = "Nagusa and I will check the main building and inner court, Kikyou and Renge can check the shed and outbuilding, and Yukari will cover the library."
52120-78 = "If you see anything strange, don't touch it. And, if ANYTHING seems off, call for help immediately. We'll face it together."
52120-80 = "Very well, Ayame."
52120-81 = "Leave it to me!"
52120-86 = "Then let's get to it."
52120-93 = "It's so clean."
52120-94 = "Furthermore, the kitchen is stocked with silverware and tea sets. Someone must have been here recently."
52120-95 = "It all feels so eerie."
52120-96 = "They could be close by, waiting to ambush us."
52120-97 = "That's very possible."
52120-101 = "This building is strangely familiar..."
52120-106 = "Nature's Beauty! Face us, you cowards!"
52120-113 = "Did you really think that would work?"
52120-114 = "If anything, you're giving away your position. They could be fleeing as we speak."
52120-115 = "Hmph, they can try! Sensei and Azami are guarding the entrance."
52120-116 = "Anyway, doesn't this mansion feel familiar? It's like I've been here before..."
52120-117 = "Be reasonable. There's no way you've been to an abandoned mansion in a remote area like—"
52120-121 = "...Hold on. This structure..."
52120-130 = "...Could it be?"
52120-136 = "The pattern on this paperweight bears..."
52120-140 = "...the emblem of the Kadenokouji family."
52120-141 = "Why is the Kadenokouji seal in an abandoned mansion...?"
52120-147 = "...That's right. The Kadenokouji mansion here in Hyakkiyako Central was originally an expansion."
52120-148 = "The main Kadenokouji branch used to be somewhere far in the north."
52120-149 = "The white snow and the frozen pond in the back gardens were beautiful in the winter."
52120-150 = "But, due to a tragedy before your birth, we decided to move."
52120-154 = "...It was a disgrace that marred the family name."
52120-155 = "You see, the Kadenokouji miko behaved quite improperly..."
52120-158 = "Don't tell me..."
52120-159 = "Th-That can't be. It was over twenty years ago..."
52120-169 = "All the books are dusty except this one."
52120-170 = "It doesn't look like a tome. It looks like an ordinary journal..."
52120-180 = "Twenty years ago, the Kadenokouji miko possessed a righteous, upstanding heart."
52120-186 = "[log]Uphold the Kadenokouji name.[/log]"
52120-190 = "The girl, who believed in justice and chivalry, joined the Hyakkaryouran. Soon, her talent was recognized, and she became the president."
52120-195 = "[log]To uphold the Kadenokouji name[/log]"
52120-197 = "[log]means to spread the family's prestige[/log]"
52120-201 = "But the girl's sacrificial spirit clashed with her family's teachings."
52120-204 = "The girl was to perform the miko's dance at the Lantern Festival."
52120-205 = "However, as she was about to take the stage, a single, small fire spread in the distance."
52120-206 = "The selfless girl prioritized dousing the flames, believing that it would spread without her intervention."
52120-207 = "And while she stopped the blaze, it was at the cost of missing her performance. The festival ended with a fizzle...and the Kadenokouji family was grievously shamed."
52120-212 = "[log]No matter the reason,[/log]"
52120-214 = "[log]To neglect one's duty is to shame the family.[/log]"
52120-218 = "Utterly shamed, the girl was ousted from her home. She devoted herself to the Hyakkaryouran presidency, which was the only purpose left for her."
52120-219 = "But perhaps that obsession dulled her wisdom."
52120-220 = "Sensing her weakness, the Hyakkaryouran members held a succession contest. They took her position as well as the Hundred Lotus."
52120-225 = "[log]The Authority of the Presidency[/log]"
52120-227 = "[log]is proven through the succession contest.[/log]"
52120-230 = "Ultimately, the girl had nothing, not even her name."
52120-231 = "She lost the respect of her peers, of the people."
52120-232 = "So the girl sought out Kuzunoha, hoping to find divine guidance."
52120-237 = "[log]Uphold the Kadenokouji name.[/log]"
52120-241 = "But no matter how much she wandered the Great Snowfield, no matter how much she searched for Kuzunoha, the girl remained alone."
52120-242 = "This was because Kuzunoha was nothing more than a rumor."
52120-247 = "Everything was a lie."
52120-248 = "The final hope that held her noble heart together snapped, and the girl was enveloped by betrayal, despair, and hatred."
52120-249 = "If the Hyakkaryouran prophet and the unconditional love of a family were mere lies..."
52120-250 = "If all that she admired was a mere rumor that someone fabricated..."
52120-256 = "[log][ff4444]...Then she vowed to become a rumor as well.[-][/log]"
52120-261 = "I am the one who enlivens all the rumors and ghost stories. I brought them into reality."
52120-264 = "...I-It's impossible!"
52120-265 = "The Kadenokouji miko that disappeared twenty years ago is the president of Nature's Beauty?!"
52120-270 = "The truth possesses an elegance, dear girl."
52120-276 = "Your family and your beloved Council were built upon a grotesque past."
52120-277 = "This is your journal? This is your story?"
52120-278 = "Yes. It appears that it very much mirrors your own."
52120-282 = "Fufu... I wonder if I made that same betrayed face back then. It's...nostalgic, in a way."
52120-283 = "(\"I must alert the others!\")"
52120-284 = "Your friends won't save you, little Kadenokouji."
52120-288 = "H-How did you read my mind?"
52120-289 = "Darling, you are not terribly complicated. Your thoughts, emotions, and pain... I understand them all perfectly."
52120-290 = "I was the Kadenokouji miko. I was a member of the Hyakkaryouran."
52120-294 = "I was you. Your future will be no different from mine."
52120-301 = "That's a lie!"
52120-302 = "It's true that, I, Yukari, may not be the strongest..."
52120-303 = "And the ideals I strive for may be illusions decorated with lies...!"
52120-304 = "...But I will never be like you! That's a promise!"
52120-309 = "I pity you, you precious, delicate flower."
52120-310 = "You are utterly adorable. Truthfully, I considered letting you go...but I do have a reputation to uphold."
52120-317 = "...Especially given that you left muddy footprints all over my elegant home."
52120-319 = "...Ugh."
52120-320 = "Try all you want! I shall never waver!"

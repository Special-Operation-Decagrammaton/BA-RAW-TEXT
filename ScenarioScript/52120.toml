[translation]
52120-1 = "第12話;勘解由小路家的巫女"
52120-5 = "（之後繼續在雪原前進了半天左右，終於抵達了菖蒲所說的宅邸）"
52120-11 = "這裡就是那個「彼岸邸」嗎……"
52120-12 = "我，我也是第一次實際來到這裡呢。"
52120-13 = "……真奇怪。#n這宅邸真的已經有數十年沒人住過了嗎？"
52120-18 = "雖然說是廢墟，庭院卻乾淨得連雜草都沒見到幾根。#n簡直就像幾天前還有人住過一樣。"
52120-19 = "代表這裡就是花鳥風月部根據地的可能性越來越高了吧？"
52120-20 = "如果有人偷偷住在這種偏遠的廢墟裡，就算受到懷疑也是合情合理。"
52120-22 = "我也這麼認為。#n把這種偏僻的廢墟打理得這麼仔細，實在不像妖怪劇團那種問題兒童會做的事。"
52120-23 = "而且如果這裡真的是花鳥風月部的根據地，那麼在這裡的棕櫚就──"
52120-30 = "…………"
52120-31 = "箭吹棕櫚……？"
52120-32 = "[s]「有哪裡不舒服嗎？」"
52120-36 = "終究還是來了啊……"
52120-37 = "我該用什麼臉去見雛罌粟大人呢……？"
52120-38 = "明明給了我兩次機會卻都失敗了，雛罌粟大人一定非常失望吧……"
52120-39 = "這次我肯定會被拋棄……就像壞掉的廢品一樣……"
52120-40 = "情緒突然變得不穩定了……那個叫雛罌粟的人有這麼可怕嗎？"
52120-44 = "不准你隨便把雛罌粟大人的名字掛在嘴邊！#n雛罌粟大人可是……"
52120-45 = "嗚嗚……嗚嗚嗚……"
52120-46 = "[s]「看起來狀態不是很好呢……」"
52120-48 = "[ns]「大家抱歉，我可以留在這裡陪棕櫚嗎？」"
52120-53 = "我們本來就打算分頭搜索宅邸，所以應該沒問題……"
52120-54 = "不過在不清楚百物語會從何處襲擊的情況下，留下老師一個人真的沒關係嗎？#n小女子有點擔心……"
52120-55 = "那麼，能讓我跟老師和棕櫚同學一起在這裡留守嗎？"
52120-59 = "畢竟我不像大家那麼擅長戰鬥和搜索，如果在「彼岸邸」遇到百物語也無法應對……"
52120-60 = "不過我的腳程還算快！#n如果發生什麼事的話，我會立刻帶著老師與大家會合的！"
52120-62 = "不，這樣我還是無法放心。"
52120-63 = "花鳥風月部的怪談家，還是由我親自──"
52120-64 = "[s1]「不必太擔心，桔梗。」\n[s2]「我們也沒有離得很遠，對吧？」"
52120-67 = "可是……"
52120-68 = "[s]「就像薊說的一樣，如果出事的話我會立刻逃跑，所以不用擔心。」"
52120-73 = "我知道了，不過千萬別勉強自己。"
52120-74 = "碰到和學生有關的事就會不顧自己的安危……這可是你的壞習慣啊。"
52120-75 = "[s]「謝謝你擔心我。」"
52120-76 = "那麼，現在開始分區搜索宅邸吧。"
52120-77 = "本棟和中庭由我和名草負責確認。#n別館的倉庫交給桔梗和蓮華，書齋就麻煩紫了。"
52120-78 = "搜索過程中盡量不要碰觸可疑物品。#n如果發現異常現象就立刻呼叫其他部員。"
52120-80 = "嗯，我會記住的。"
52120-81 = "交給小女子吧！"
52120-86 = "大家記得保持警戒，隨時準備戰鬥。#n開始探索宅邸吧。"
52120-93 = "這座宅邸比想像中還乾淨呢。"
52120-94 = "嗯。從茶具茶杯這些充滿生活感的東西散落各處來看，也許不久前還有人來過這裡。"
52120-95 = "只是現在……卻安靜得不合常理。"
52120-96 = "說不定有人正躲在某處伺機偷襲，不能掉以輕心哦。"
52120-97 = "是啊。"
52120-101 = "不過這棟建築，總覺得有點眼熟……"
52120-106 = "花鳥風月部的傢伙們別躲了，快給我出來！"
52120-113 = "就算你這麼說，他們也不可能乖乖出來吧。"
52120-114 = "甚至反而會被你的聲音給嚇跑……為什麼要到處大吼大叫的？"
52120-115 = "哼，要跑就跑吧。#n反正師父和薊同學就守在入口嘛。"
52120-116 = "不過話說回來……這個宅邸好像有點眼熟耶？#n總覺得有股之前來過的感覺。"
52120-117 = "這麼偏僻又被棄置的宅邸，你怎麼可能會──"
52120-121 = "不……聽你這麼一說，我也覺得有印象。#n這個結構分明是……"
52120-130 = "……小女子，應該沒有看錯吧？"
52120-136 = "門框上刻著的這個紋樣……"
52120-140 = "……無疑是「勘解由小路家」的家紋。"
52120-141 = "為何勘解由小路家的家紋，會出現在被棄置數十年的廢墟裡呢……？"
52120-147 = "……沒錯。我們現在居住的這座位於百鬼夜行中心的勘解由小路家宅邸，#n原本只是為了幫助成員的學業而建造的別館。"
52120-148 = "勘解由小路家的本家，其實位於遙遠的北方之地。"
52120-149 = "冬日後院結冰的池塘被白雪覆蓋的景象，真是美得令人屏息呢，呵呵。"
52120-150 = "可惜在大小姐出生前發生了一件不光彩的事件，因而不得不搬離了那裡。"
52120-154 = "……沒錯，那是為家族帶來恥辱的不名譽之事。"
52120-155 = "因為當時的巫女，並沒有展現出勘解由小路家應有的正直姿態。"
52120-158 = "難道說……"
52120-159 = "應，應該不可能吧。#n那都已經是二十多年前的事了……"
52120-169 = "書架上的書都積滿了灰塵，唯獨這一本特別乾淨呢。"
52120-170 = "沒有感覺到怪書的氣息，看起來只是普通的日誌……"
52120-180 = "二十年前，繼承勘解由小路家之名的少女，是個富有正義感的正直之人。"
52120-186 = "[log]「勘解由小路家之人，必須保持正直」[/log]"
52120-190 = "認為活得正直必須實踐俠與義的少女，因而加入了「百花繚亂」──#n並迅速因才能受到認可而登上了委員長之位。"
52120-195 = "[log]「勘解由小路家的正直──」[/log]"
52120-197 = "[log]「不過是為了彰顯名聲的手段罷了」[/log]"
52120-201 = "然而少女希望拯救所有人的心意，卻與家族的教誨處處衝突。"
52120-204 = "某個祭典之日，少女負責主持儀式，並獻上巫女之舞。"
52120-205 = "本應按計畫順利落幕的祭典──險些因為細小的火苗而毀於一旦。"
52120-206 = "所幸少女在留意到火苗之後，為避免大火傷人而選擇優先將其撲滅。"
52120-207 = "雖說火勢因而沒有蔓延，祭典卻也不得不草草收場……#n導致負責儀式的勘解由小路家族蒙受了極大的恥辱。"
52120-212 = "[log]「無論有任何理由──」[/log]"
52120-214 = "[log]「怠慢職責之人皆是家族的恥辱」[/log]"
52120-218 = "不堪家族的責難而被迫離開的少女，#n因而對自己僅剩的職位──「百花繚亂的委員長」產生了強烈的執著。"
52120-219 = "或許正是這股執著，導致少女的身手有所退化。"
52120-220 = "意識到其身手不若以往之時──#n百花繚亂的成員隨即藉由「繼承戰」奪走了「百蓮」與委員長之位。"
52120-225 = "[log]「資格──」[/log]"
52120-227 = "[log]「必須由繼承戰來證明」[/log]"
52120-230 = "最終少女什麼也沒能留下。"
52120-231 = "即便努力維持正直的心態，也不再有任何人願意傾聽他的話語。"
52120-232 = "不過少女依然相信傳說中的大預言者──#n創立「百花繚亂」的葛葉，必定能理解他的正直。"
52120-237 = "[log]「勘解由小路家之人，必須保持正直」[/log]"
52120-241 = "然而無論在大雪原中徘徊了多久，無論如何打聽葛葉的名字，少女仍舊一無所獲。"
52120-242 = "因為葛葉大人，只是古老記錄中如傳聞般的存在。"
52120-247 = "一切都是謊言。"
52120-248 = "在維繫著正直信念的最後希望破滅之時，少女陷入了背叛、絕望與憎恨之中。"
52120-249 = "如果百花繚亂的始祖與家族所謂的正直全都是謊言──"
52120-250 = "如果自己憧憬的一切，只是他人編造的傳聞──"
52120-256 = "[log][ff4444]……那就由我親自成為傳聞吧。[-][/log]"
52120-261 = "我將把學園中流傳的所有傳聞與怪談化為現實──成為[ruby=花鳥風月部]魑魅魍魎之首[/ruby]。"
52120-264 = "……真，真不敢相信。"
52120-265 = "二十年前消失的勘解由小路家的巫女，竟然會是花鳥風月部的部長……"
52120-270 = "你總算察覺了啊，勘解由小路家的孩子。"
52120-276 = "你所愛護的家族與組織，其實都是建立於醜惡過去之上的罪惡。"
52120-277 = "你就是這本日記中的花鳥風月部部長……？"
52120-278 = "沒錯。這還是我們第一次實際見面呢。"
52120-282 = "呵呵……過去的我也曾經露出這樣的表情嗎？#n總覺得有點懷念呢。"
52120-283 = "（得趕快離開這裡，通知前輩們才行……）"
52120-284 = "如果打算向前輩們求助的話，勸你最好死了這條心吧。"
52120-288 = "你，你怎麼會知道小女子的想法……？"
52120-289 = "答案很簡單。#n你的想法、情感，乃至於痛苦……我全都瞭如指掌。"
52120-290 = "因為我也曾是勘解由小路家的孩子……和百花繚亂紛爭調停委員會的一員啊。"
52120-294 = "……你也遲早會面臨跟我一樣的未來。"
52120-301 = "……才沒有那種事！"
52120-302 = "雖然小女子就像你說的一樣，並沒有強大到足以包容一切……"
52120-303 = "自己所憧憬的美好世界，也可能只是虛假的幻影……！"
52120-304 = "但即便如此──小女子也已經和前輩們約好，不會放棄想做的事了！"
52120-309 = "……多麼可憐啊，勘解由小路家的孩子。"
52120-310 = "作為對你的憐憫，我原本想放你一馬……然而即便是棄置的廢墟，也有出入的禮節。"
52120-317 = "既然膽敢以沾滿泥土之鞋踏進別人的家園，想必也做好接受責罵的覺悟了吧？"
52120-319 = "唔……"
52120-320 = "即便如此，現在的小女子也不會動搖！"

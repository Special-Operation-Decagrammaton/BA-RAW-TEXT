[translation]
52120-1 = "ตอนที่ 12;มิโกะแห่งตระกูลคาเดโนะโคจิ"
52120-5 = "(หลังจากเดินข้ามทุ่งหิมะมาครึ่งวัน ทุกคนก็มาถึงคฤหาสน์ที่อายาเมะพูดถึง)"
52120-11 = "ที่นี่คือ <คฤหาสน์นิพพาน> งั้นเหรอ..."
52120-12 = "ฉะ... ฉันก็เพิ่งเคยมาที่นี่เป็นครั้งแรกเหมือนกันค่ะ"
52120-13 = "แปลกจัง... นี่คือคฤหาสน์ที่ถูกทิ้งร้างมาหลายสิบปีจริงๆ เหรอ?"
52120-18 = "สวนทั้งสะอาดและเรียบร้อยเกินกว่าจะเป็นสวนในบ้านร้าง วัชพืชก็ไม่มีให้เห็นเลยด้วย ราวกับว่ามีคนมาใช้ชีวิตอยู่ที่นี่เลย"
52120-19 = "เพราะอย่างนี้ละถึงยิ่งมีโอกาสที่ที่แห่งนี้จะเป็นฐานหลักของชมรมความงามของธรรมชาติ"
52120-20 = "คนที่ไม่มีเรื่องผิดบาปในใจคงไม่มาอาศัยอยู่ในบ้านร้างที่อยู่ห่างไกลจากหมู่บ้านอย่างนี้หรอก"
52120-22 = "ฉันก็คิดแบบนั้นเหมือนกัน บ้านร้างที่อยู่ห่างไกลได้รับการดูแลจนอยู่ในสภาพดีแบบนี้ คงไม่ใช่ฝีมือของเด็กเจ้าปัญหาอย่างพวกปีศาจทั่วไปหรอก"
52120-23 = "อีกอย่าง ถ้าที่นี่คือฐานหลักของชมรมความงามของธรรมชาติจริงๆ ชูโระที่อยู่กับเราก็คง..."
52120-30 = "......"
52120-31 = "ยาบูกิ ชูโระ?"
52120-32 = "[s] \"รู้สึกไม่สบายตรงไหนงั้นเหรอ?\""
52120-36 = "ในที่สุดก็มาถึงจนได้..."
52120-37 = "แล้วฉันจะเอาหน้าที่ไหนไปสู้ท่านโคคุริโกะล่ะ...?"
52120-38 = "ได้รับโอกาสมาตั้ง 2 ครั้งแต่ก็ยังพลาดไม่เป็นท่าอีก ท่านโคคุริโกะต้องผิดหวังในตัวฉันมากแน่ๆ..."
52120-39 = "ครั้งนี้ฉันคงถูกโยนทิ้ง... ถูกโยนทิ้งเหมือนสิ่งของที่ใช้ไม่ได้แหงๆ..."
52120-40 = "ทำไมจู่ๆ ก็เข้าบทเศร้าล่ะ... ผู้หญิงที่ชื่อโคคุริโกะน่ากลัวขนาดนั้นเลยเหรอ?"
52120-44 = "อย่าได้กล้าเอ่ยชื่อของท่านโคคุริโกะสุ่มสี่สุ่มห้าแบบนั้นนะ! ท่านโคคุริโกะน่ะ..."
52120-45 = "ฮือ... ฮือออ..."
52120-46 = "[s] \"ดูสภาพจิตใจไม่ค่อยดีเลยนะ...\""
52120-48 = "[ns] \"ขอโทษนะทุกคน ครูขออยู่ที่นี่กับชูโระได้มั้ย?\""
52120-53 = "ก็ได้อยู่หรอกนะ ยังไงพวกฉันก็จะแบ่งกลุ่มกันสำรวจคฤหาสน์นี้อยู่แล้ว..."
52120-54 = "แต่เราจะปล่อยท่านอาจารย์ไว้คนเดียวได้เหรอเจ้าคะ? ตำนานร้อยเรื่องราวอาจโผล่มาจู่โจมจากตรง#nไหนก็ได้... ข้าเป็นห่วงน่ะเจ้าค่ะ..."
52120-55 = "ถ้างั้นขอฉันอยู่กับคุณครูและแม่หนูชูโระได้มั้ยคะ?"
52120-59 = "ฉันไม่มีทักษะในการต่อสู้หรือสำรวจเหมือนพวกคุณ ต่อให้ค้นหาใน <คฤหาสน์นิพพาน> แล้วเจอตำนานร้อยเรื่องราวขึ้นมา ฉันก็คงรับมือกับพวกนั้นไม่ได้..."
52120-60 = "แต่ฉันก็เป็นคนคล่องแคล่วว่องไว ถ้าเกิดเรื่องอะไรฉันจะรีบพาคุณครูไปหาพวกคุณทันทีค่ะ!"
52120-62 = "ไม่หรอก แค่นั้นฉันยังวางใจไม่ได้"
52120-63 = "ฉันจะดูแลนักเล่าเรื่องลึกลับของชมรมความงามของธรรมชาติให้เอง..."
52120-64 = "[s1] \"ไม่ต้องห่วงมากเกินไปก็ได้ คิเคียว\"\n[s2] \"ยังไงเราก็อยู่ในคฤหาสน์หลังเดียวกันนะ\""
52120-67 = "แต่ว่า..."
52120-68 = "[s] \"ถ้าเกิดเรื่องอะไรขึ้น ครูจะรีบหนีอย่างที่อาซามิบอกเลย\""
52120-73 = "เข้าใจแล้ว แต่ก็อย่าหักโหมจนเกินกำลังมากไปล่ะ"
52120-74 = "พอเป็นเรื่องของนักเรียน คุณจะห่วงแต่นักเรียนจนไม่ใส่ใจเรื่องของตัวเอง นี่ละนิสัยที่ไม่ดีของคุณ..."
52120-75 = "[s] \"ครูขอบใจนะที่เป็นห่วง\""
52120-76 = "งั้นเรามาแบ่งพื้นที่ในคฤหาสน์แล้วแยกย้ายกันค้นหาเถอะ"
52120-77 = "ฉันกับนางุสะจะสำรวจอาคารหลักกับลานหน้าคฤหาสน์ คิเคียวกับเรนเกะไปสำรวจโกดังในอาคารอีก#nหลังที่แยกออกมา ส่วนยูคาริก็ไปดูห้องหนังสือนะ"
52120-78 = "ถ้าเจออะไรน่าสงสัยระหว่างการค้นหาก็อย่าเพิ่งแตะต้องสิ่งนั้น และถ้าพบสิ่งผิดปกติ ก็ให้รีบเรียกสมาชิกคนอื่นทันที"
52120-80 = "อื้อ เข้าใจแล้ว"
52120-81 = "วางใจได้เลยเจ้าค่ะ!"
52120-86 = "งั้นทุกคนก็เตรียมตัวต่อสู้และสำรวจคฤหาสน์กันอย่างระมัดระวังด้วยนะ"
52120-93 = "เป็นคฤหาสน์ที่สะอาดกว่าที่คิดไว้อีกแฮะ"
52120-94 = "อื้อ ดูจากข้าวของเครื่องใช้ที่วางอยู่ทั่วอย่างกาน้ำชากับถ้วยชาแล้ว ราวกับว่าเพิ่งจะมีใครมาที่นี่#nเมื่อไม่นานมานี้เลย"
52120-95 = "น่าแปลกนะที่ตอนนี้... ไม่รู้สึกว่ามีใครอยู่ที่นี่เลย"
52120-96 = "ยังไงเราก็ไม่ควรประมาท พวกนั้นอาจจะซ่อนตัวอยู่ที่ไหนในคฤหาสน์และรอโจมตีเราอยู่ก็ได้"
52120-97 = "มันก็จริงอยู่หรอกนะ"
52120-101 = "แต่ว่าคฤหาสน์หลังนี้มันดูคุ้นตาจัง..."
52120-106 = "พวกชมรมความงามของธรรมชาติ เลิกซ่อนตัวและออกมาได้แล้ว!"
52120-113 = "คิดว่าพูดอย่างนั้นแล้วพวกนั้นจะยอมออกมาง่ายๆ เหรอ"
52120-114 = "ดีไม่ดีอาจหนีไปเพราะได้ยินเสียงเธอก็ได้ เราจำเป็นต้องตะโกนไปด้วยหาไปด้วยหรือไง?"
52120-115 = "ฮึ่ม คิดว่าหนีได้ก็ลองหนีสิ ยังไงท่านอาจารย์กับอาซามิก็เฝ้าอยู่ที่ทางเข้าอยู่แล้ว"
52120-116 = "จะว่าไป เธอว่าคฤหาสน์หลังนี้มันดูคุ้นๆ หรือเปล่า? ฉันรู้สึกเหมือนเคยมาที่นี่แล้วเลย"
52120-117 = "จะเป็นแบบนั้นไปได้ยังไง เธอจะมาคฤหาสน์ที่ถูกทิ้งร้างอยู่ในพื้นที่ห่างไกลแบบนี้ทำไม..."
52120-121 = "เดี๋ยวนะ... จะว่าไปฉันก็จำได้ว่าเคยเห็นอาคารแบบนี้ โครงสร้างอาคารแบบนี้มัน..."
52120-130 = "นี่ข้าไม่ได้ตาฝาดไปใช่มั้ยเจ้าคะ...?"
52120-136 = "ลวดลายที่สลักไว้บนประตู..."
52120-140 = "คือ 'ตราประจำตระกูลคาเดโนะโคจิ' ของข้าไม่ผิดแน่..."
52120-141 = "เหตุใดตราประจำตระกูลคาเดโนะโคจิถึงมาอยู่ในคฤหาสน์ที่ถูกทิ้งร้างไว้หลายสิบปี..."
52120-147 = "นั่นสิเจ้าคะ... คฤหาสน์คาเดโนะโคจิที่อยู่ใจกลางเฮียกคิยาโคที่เราอาศัยอยู่ตอนนี้ เดิมทีสร้างขึ้นเพื่อ#nเป็นอาคารเสริมเพื่อช่วยเหลือด้านการศึกษาของคนในตระกูล"
52120-148 = "ส่วนคฤหาสน์ดั้งเดิมของตระกูลคาเดโนะโคจิตั้งอยู่ในดินแดนทางเหนืออันไกลโพ้นเจ้าค่ะ"
52120-149 = "เมื่อถึงฤดูหนาว หิมะสีขาวโพลนที่อยู่เหนือบ่อน้ำที่กลายเป็นน้ำแข็งน่ะงดงามมากๆ เลยเจ้าค่ะ ฮุฮุ"
52120-150 = "แต่ก็เกิดเหตุการณ์น่าอดสูตั้งแต่คุณหนูยังไม่ลืมตาดูโลก ครอบครัวก็เลยต้องย้ายไปที่อื่นเจ้าค่ะ"
52120-154 = "เจ้าค่ะ... มันเป็นเรื่องที่ทำให้ตระกูลเสื่อมเสียเกียรติ"
52120-155 = "เพราะมิโกะในตอนนั้นทำเรื่องที่ไม่เหมาะสมกับการเป็นคนตระกูลคาเดโนะโคจิ"
52120-158 = "หรือว่า..."
52120-159 = "ปะ... เป็นไปไม่ได้หรอก เรื่องผ่านมาตั้ง 20 ปีแล้ว..."
52120-169 = "หนังสือทุกเล่มในชั้นวางมีฝุ่นเกาะ แต่มีเล่มนี้ที่สะอาดเอี่ยมเป็นพิเศษเลยเจ้าค่ะ"
52120-170 = "ข้าไม่รู้สึกถึงพลังงานของหนังสือลึกลับ แล้วมันก็ดูเป็นสมุดบันทึกธรรมดาทั่วไปมากกว่า..."
52120-180 = "เมื่อ 20 ปีก่อน เด็กสาวผู้สืบทอดชื่อของตระกูลคาเดโนะโคจิเป็นคนซื่อตรงที่รักในความยุติธรรม"
52120-186 = "[log]จงยืนหยัดในฐานะคาเดโนะโคจิ[/log]"
52120-190 = "เด็กสาวเชื่อว่าเธอต้องฝึกนิสัยปราบคนพาล อภิบาลคนดีเพื่อใช้ชีวิตที่ชอบธรรม เธอจึงเข้าชมรมเฮียกกะเรียวรันและได้รับการยอมรับในพรสวรรค์จนได้เป็นหัวหน้า"
52120-195 = "[log]ความชอบธรรมของคาเดโนะโคจิ[/log]"
52120-197 = "[log]คือสิ่งที่ทำให้ชื่อเสียงของตระกูลขจรขจาย[/log]"
52120-201 = "แต่ความปรารถนาของเด็กสาวที่อยากช่วยเหลือทุกคนกลับขัดแย้งกับคำสอนของตระกูล"
52120-204 = "ในวันงานเทศกาลวันหนึ่ง เด็กสาวถูกกำหนดให้รับผิดชอบพิธีกรรมและแสดงระบำของมิโกะ"
52120-205 = "ทว่างานเทศกาลที่ควรจะดำเนินไปตามแผนที่วางไว้อย่างไร้ปัญหาใดๆ กลับพังทลายลง#nด้วยประกายไฟที่ไม่มีใครสนใจ"
52120-206 = "เด็กสาวเกรงว่าประกายไฟจะลุกลามเป็นไฟลูกใหญ่จนเป็นอันตรายต่อผู้คน จึงตัดสินใจไปดับไฟนั่น"
52120-207 = "โชคดีที่เด็กสาวควบคุมไฟไว้ได้ แต่งานเทศกาลก็จบลงด้วยความโกลาหล... ส่วนตระกูลคาเดโนะโคจิที่เป็นผู้รับผิดชอบพิธีกรรมก็ได้รับความอับอายเป็นอย่างมาก"
52120-212 = "[log]ไม่ว่าจะด้วยเหตุผลใดก็ตาม[/log]"
52120-214 = "[log]ตระกูลต้องเผชิญความอัปยศอดสูที่ละเลยหน้าที่[/log]"
52120-218 = "แล้วเด็กสาวก็ต้องออกจากตระกูลเพราะทนต่อคำวิพากษ์วิจารณ์ของตระกูลไม่ไหว สุดท้ายเธอจึงหมกมุ่นอยู่กับสิ่งเดียวที่เธอเหลืออยู่ นั่นคือตำแหน่ง 'หัวหน้าเฮียกกะเรียวรัน'"
52120-219 = "ความหมกมุ่นนั้นอาจเป็นเหตุให้เด็กสาวฝีมือตกไป"
52120-220 = "เมื่อฝีมือของเธอลดลงกว่าแต่ก่อน เหล่าสมาชิกเฮียกกะเรียวรันจึงประกาศศึกชิงตำแหน่ง และแย่งตำแหน่งหัวหน้าและเฮียกกุเร็นไปจากเธอ"
52120-225 = "[log]หลักฐานแสดงสิทธิ์[/log]"
52120-227 = "[log]พิสูจน์ได้ด้วยศึกชิงตำแหน่ง[/log]"
52120-230 = "สุดท้ายเด็กสาวก็ไม่เหลืออะไรเลย"
52120-231 = "แม้จะพยายามยืดหยัดในความซื่อตรง แต่ก็ไม่มีใครฟังคำของเธอ"
52120-232 = "แต่เธอก็เชื่อว่าคุซึโนฮะ ผู้พยากรณ์ใหญ่ในตำนานที่เป็นผู้ก่อตั้งเฮียกกะเรียวรันจะยอมรับในความ#nซื่อตรงของเธอ"
52120-237 = "[log]จงยืนหยัดในฐานะคาเดโนะโคจิ[/log]"
52120-241 = "ทว่าไม่ว่าจะท่องไปในทุ่งหิมะใหญ่สักแค่ไหน ไม่ว่าจะสืบหาชื่อของคุซึโนฮะมากเพียงใด เด็กสาวก็หาร่องรอยของเธอคนนั้นไม่พบ"
52120-242 = "นั่นเป็นเพราะตัวตนของคุซึโนฮะเป็นเหมือนข่าวลือที่ปรากฏในบันทึกเมื่อนานมาแล้ว"
52120-247 = "ทุกอย่างเป็นเรื่องโกหก"
52120-248 = "เมื่อความหวังสุดท้ายที่สนับสนุนความซื่อตรงของเธอหายไป เด็กสาวก็ถูกความรู้สึกถูกทรยศ ความสิ้นหวัง และความเกลียดชังครอบงำ"
52120-249 = "ถ้าทุกสิ่งทุกอย่างเป็นเรื่องโกหก ทั้งต้นกำเนิดของเฮียกกะเรียวรันไปจนถึงความซื่อตรงของ#nเฮียกกะเรียวรัน"
52120-250 = "หากทุกสิ่งที่ปรารถนาเป็นเพียงข่าวลือที่ใครบางคนแต่งขึ้น"
52120-256 = "[log][ff4444]ข้าก็จะเป็นข่าวลือนั้นเอง...[-][/log]"
52120-261 = "ข้าจะเป็นหัวหน้าของภูตผีปีศาจ หัวหน้าของชมรมความงามของธรรมชาติที่ทำให้ข่าวลือ และเรื่องลึกลับในโรงเรียนเป็นความจริงขึ้นมาเอง"
52120-264 = "มะ... ไม่อยากจะเชื่อเลยเจ้าค่ะ"
52120-265 = "มิโกะของคาเดโนะโคจิที่หายตัวไปเมื่อ 20 ปีก่อนคือหัวหน้าชมรมความงามของธรรมชาติอย่างนั้น#nเหรอเจ้าคะ..."
52120-270 = "ในที่สุดก็รู้จนได้สินะ เด็กจากตระกูลคาเดโนะโคจิ"
52120-276 = "ตระกูลและชมรมที่เธอรักและหวงแหน แท้จริงเป็นเพียงบาปที่ก่อตัวขึ้นเหนืออดีตอันน่าเกลียดชัง"
52120-277 = "คุณคือหัวหน้าชมรมความงามของธรรมชาติที่เขียนไว้ในบันทึกนี้เหรอเจ้าคะ...?"
52120-278 = "ใช่ เป็นครั้งแรกเลยนะที่ข้าได้เห็นเจ้าตัวจริง"
52120-282 = "ฮุฮุ... ข้าในอดีตก็เคยทำหน้าอย่างเจ้าหรือเปล่านะ คิดถึงอดีตจริงเชียว"
52120-283 = "(ต้องรีบออกไปจากที่นี่และติดต่อรุ่นพี่แล้ว...)"
52120-284 = "หากเจ้าคิดจะขอความช่วยเหลือจากรุ่นพี่คนอื่นละก็ เลิกล้มความคิดนั้นเสียเถอะ"
52120-288 = "อะ... อ่านใจข้าได้ยังไง...?"
52120-289 = "เรื่องง่ายๆ น่ะ ทั้งความคิด ความรู้สึก และความเจ็บปวดของเจ้า... ข้าเข้าใจทุกอย่างจนกระจ่างเลยละ"
52120-290 = "เพราะครั้งหนึ่งข้าก็เคยเป็นเด็กของตระกูลคาเดโนะโคจิและสมาชิกคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน"
52120-294 = "อนาคตของเจ้าก็คงไม่ต่างไปจากข้าหรอก..."
52120-301 = "ไม่หรอกเจ้าค่ะ...!"
52120-302 = "ถึงข้าจะยังไม่แข็งแกร่งพอจะแบกรับทุกอย่างได้..."
52120-303 = "แม้สิ่งสวยงามในโลกที่มนุษย์มุ่งหมายอาจเป็นเพียงภาพลวงตาที่เกิดขึ้นจากการโกหก...!"
52120-304 = "แต่ข้าสัญญากับเหล่ารุ่นพี่ไว้แล้วว่าจะไม่ล้มเลิกสิ่งที่อยากทำเจ้าค่ะ!"
52120-309 = "เจ้าช่างน่าเวทนาเหลือเกิน เด็กน้อยแห่งคาเดโนะโคจิ..."
52120-310 = "ข้าอยากแสร้งทำเป็นไม่รู้จักเจ้าแล้วเมตตาปล่อยเจ้าไป แต่บ้านที่ถูกทิ้งร้างแห่งนี้ก็มีกฎเกณฑ์ในการ#nเข้าออก"
52120-317 = "ก้าวเท้าเข้าบ้านคนอื่นพร้อมดินโคลนเปื้อนเท้าแบบนี้ เจ้าเตรียมตัวโดนดุไว้แล้วใช่มั้ย?"
52120-319 = "อึก..."
52120-320 = "ต่อให้พูดอย่างนั้น ข้าก็ไม่กลัวหรอกเจ้าค่ะ!"

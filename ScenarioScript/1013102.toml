[translation]
1013102-1 = "เป้าหมายในการวิจารณ์"
1013102-2 = "สุขสบายดีหรือเปล่าคะคุณครู? ขอแนะนำตัวนะคะ ฉันมิโยชิ ทาคาเนะค่ะ"
1013102-3 = "[s] \"เข้ามาสิ ทาคาเนะ เพิ่งเคยมาชาเล่ต์ใช่มั้ย?\""
1013102-4 = "ฮุฮุ ขอบคุณที่พูดต้อนรับอย่างใจดีค่ะ ชาเล่ต์เป็นสถานที่ที่ยอดเยี่ยมจังเลยนะคะ"
1013102-5 = "เหนือสิ่งอื่นใด... ก็คือความอบอุ่นที่เหนือคำบรรยายค่ะ"
1013102-6 = "ถึงจะกะทันหันไปสักหน่อยที่พูดแบบนี้... แต่ตั้งแต่ที่ฉันก้าวเท้าเข้ามาในชาเล่ต์ ฉันก็มีบางอย่างที่อยากขอร้องคุณครูค่ะ"
1013102-7 = "[s] \"อะไรเหรอ?\""
1013102-8 = "คือว่า..."
1013102-9 = "ฉันอยากทำความรู้จักคุณครูให้มากกว่านี้ค่ะ"
1013102-10 = "[s] \"ทะ... ทำไมจู่ๆ ถึง?\""
1013102-11 = "ตายจริง แล้วคุณครูไม่อยากรู้จักฉันให้มากกว่านี้เหรอคะ?"
1013102-12 = "ไม่ใช่อย่างนั้นเหรอคะ? เป็นธรรมดาอยู่แล้วที่คนเป็นครูจะอยากรู้จักนักเรียนให้มากขึ้นงั้นเหรอคะ?"
1013102-13 = "ดีเลยค่ะ งั้นต่อไปนี้เรามาทำความรู้จักกันให้มากขึ้นกันนะคะ"
1013102-14 = "สำหรับนักวิจารณ์แล้ว เป็นเรื่องปกติที่จะอยากรู้จักสิ่งที่ตัวเองจะวิจารณ์ค่ะ"
1013102-15 = "[s] \"ปกติวิจารณ์คนด้วยเหรอ?!\""
1013102-16 = "อืม... ถ้าจะพูดให้ถูก คนไม่ใช่เป้าหมายของการวิจารณ์หรอกค่ะ"
1013102-17 = "แต่ถึงยังไง การได้รู้จักเป้าหมายในการวิจารณ์ จากนั้นก็วิเคราะห์และก็หาคุณค่าที่ซ่อนอยู่จากข้อมูลที่#nได้มา"
1013102-18 = "ก็เป็นเรื่องสำคัญต่อการวิจารณ์และความสัมพันธ์ระหว่างกันด้วยนี่คะ"
1013102-19 = "ในแง่นั้นแล้ว ฉันว่าถ้าเราระมัดระวังให้มากพอ มนุษย์ก็น่าจะเป็นสิ่งที่วิจารณ์ได้เหมือนกันค่ะ"
1013102-20 = "แต่แน่นอนว่าต้องทำเพื่อเจตนาที่ดีนะคะ"
1013102-21 = "[s] \"ทาคาเนะมีศิลปะในการพูดจังเลยนะ...\""
1013102-22 = "แน่นอนอยู่แล้วค่ะ"
1013102-23 = "ถ้าไม่อย่างนั้น... ฉันก็คงทำงานหาเงิน... โดยเฉพาะกับในโลกอินเทอร์เน็ตแบบนี้ไม่ได้หรอกค่ะ..."
1013102-24 = "ถ้างั้นก็ คุณครูคะ นี่คือหนังสืออะไรเหรอคะ? ฉันเจอมาจากใต้โต๊ะของคุณครูน่ะค่ะ"
1013102-25 = "อ๊ะ ในเมื่อเป็นหนังสือ งั้นให้ฉันอ่านแล้วลองวิจารณ์ดูดีมั้ยคะ?"
1013102-26 = "[s] \"เล่มนั้นไม่ได้นะ!!!!!\""
1013102-27 = "ทะ... ทำไมล่ะคะ...?"
1013102-28 = "ต่อให้จะเกิดเรื่องอะไร ก็ไม่ได้อยู่ดี... งั้นเหรอคะ?"
1013102-29 = "ฮึ่ม..."
1013102-33 = "ก็ได้ค่ะ ทุกคนย่อมก็มีเรื่องที่อยากปกปิดเป็นธรรมดาอยู่แล้วค่ะ"
1013102-34 = "แต่ถึงยังไงก็น่าเสียดายอยู่ดีนะ... เห็นอย่างนี้ฉันก็เป็นคนเข้าอกเข้าใจคนอื่นมากกว่าที่คิดนะคะ"
1013102-35 = "ไม่ได้... จริงๆ เหรอคะ?"
1013102-36 = "[s] \"อาจต้องข้ามศพครูไปก่อนน่ะ...\""
1013102-37 = "ขะ... ขนาดนั้นเลยเหรอคะ...?"
1013102-39 = "จะว่าไปแล้ว คุณครูมีของนู่นนี่เยอะเลยนะคะ"
1013102-40 = "มีเยอะและหลากหลายจนแทบหาความเชื่อมโยงไม่ได้เลยค่ะ..."
1013102-41 = "คะ? ทั้งหมดเป็นของที่นักเรียนคนอื่นให้เป็นของขวัญงั้นเหรอคะ?"
1013102-42 = "..."
1013102-43 = "มันก็ดีอยู่หรอกค่ะ แต่ช่วยจัดประเภทตามมาตรฐานของคุณครูด้วยได้มั้ยคะ?"
1013102-44 = "การจำแนกประเภทคือกระบวนการสร้างความหมายในตัวมันเองค่ะ"
1013102-45 = "และการทำแบบนั้นก็น่าจะช่วยให้ฉันรู้จักคุณครูมากขึ้นด้วยนะคะ?"
1013102-46 = "ถ้างั้นฉันจะให้อันนี้คุณครูค่ะ"
1013102-47 = "หนังสือรวมบทวิจารณ์วัฒนธรรมคิโวทอสประจำเดือนนี้ที่ชมรมสื่อสิ่งพิมพ์ของเราจัดทำขึ้นค่ะ"
1013102-48 = "อ้อ หน้า 22-24 ไม่ต้องตั้งใจอ่านก็ได้ค่ะ"
1013102-49 = "ส่วนนั้นคุณเมรูริเขียนและวาดเองทั้งหมดน่ะค่ะ"
1013102-50 = "[s] \"ทาคาเนะตีพิมพ์บทวิจารณ์ทุกเดือนเลยเหรอ?\""
1013102-51 = "ถึงทั้งเล่มจะไม่ใช่งานเขียนของฉันคนเดียว แต่ในหน้าที่ฉันได้รับมอบหมาย ฉันก็พยายามเขียน#nให้ได้มากที่สุดค่ะ"
1013102-52 = "แต่ในตอนที่ไม่มีผลงานทางวัฒนธรรมที่ควรค่าแก่การวิจารณ์ ฉันก็จะยอมล้มเลิกความตั้งใจทั้งที่ใจยัง#nเจ็บปวดค่ะ..."
1013102-54 = "ใช่ค่ะ... ถ้าตีพิมพ์หนังสือเล่มแค่อย่างเดียว พวกฉันก็คงอยู่ไม่รอดหรอกค่ะ"
1013102-55 = "ในฐานะคนที่ทำงานในแวดวงสิ่งพิมพ์และวัฒนธรรม การที่ฉันได้เข้าไปมีส่วนร่วมในเกือบทุกด้านเท่าที่#nจะเป็นไปได้ ทำให้ฉันบริหารเรื่องนี้ได้ในระดับหนึ่งค่ะ"
1013102-56 = "แต่ฉันก็รู้สึกเหมือนทำสลับบทบาท ถ้าเป็นไปได้ฉันก็อยากกลับไปทำหน้าที่เฉพาะในการตีพิมพ์มากกว่า#nค่ะ..."
1013102-57 = "เฮ้อ... ค่ะ นี่คงเป็นการบ่นในเรื่องไม่เป็นเรื่องน่ะค่ะ ในแง่นั้นฉันคงต้องยอมรับกลยุทธ์ทางธุรกิจของ#nหัวหน้าค่ะ"
1013102-58 = "ต่อให้มันจะทำให้ฉันได้ข้อสรุปเหมือนเดิมทุกครั้งก็เถอะค่ะ..."
1013102-59 = "ตราบใดที่ธุรกิจของเรายังอยู่รอดได้ การเขียนบทวิจารณ์ที่ดีขึ้นอีกสักบทเพื่อเผยคุณค่าที่ซ่อนอยู่ให้#nผู้อ่านทุกคนรู้..."
1013102-60 = "คือ 'จรรยาบรรณในวิชาชีพ' อย่างหนึ่งนี่คะ"
1013102-61 = "เพราะงั้น คุณครูคะ! ขอให้ฉัน..."
1013102-62 = "ได้เห็นด้านที่ซ่อนอยู่ของคุณครูบ้างไม่ได้เหรอคะ...?"
1013102-63 = "[s] \"ครูไม่มีเรื่องอะไรที่ซ่อนนักเรียนไว้หรอก...\""
1013102-64 = "ว้าว นั่นเป็นคำตอบที่สมกับการเป็นคุณครูเลยค่ะ"
1013102-65 = "แต่ว่าฉันได้รู้มา 2 เรื่องแล้วนะคะ?"
1013102-66 = "อย่างแรกก็คือคุณครูเก็บรักษาของที่ได้รับจากนักเรียนไว้อย่างดี"
1013102-67 = "และอีกอย่างก็คือ... ถึงฉันจะไม่แน่ใจเหตุผลนัก แต่ก็รู้ว่าคุณครูกำลังปกปิดบางอย่างที่ไม่อาจแสดงให้#nนักเรียนเห็นได้ค่ะ!"
1013102-68 = "[s] \"งะ... งั้นทาคาเนะก็เปิดเผยสิ่งที่ตัวเองซ่อนอยู่มาด้วยสิ!\""
1013102-69 = "ได้อยู่แล้วค่ะ ถามมาได้เต็มที่เลยค่ะ"
1013102-70 = "อ้อ แต่ถ้าเป็นเรื่องละเอียดอ่อนมากเกินไปละก็..."
1013102-71 = "..."
1013102-72 = "ฉันอาจจะต้องปกปิดไว้บ้างนะคะ?"
1013102-73 = "[s] \"คะ... ครูไม่คิดถามอะไรแบบนั้นหรอก!\""
1013102-74 = "ยะ... อย่างนั้นเหรอคะ...?"
1013102-75 = "แล้วสรุปว่าอยากรู้เรื่องอะไรเหรอคะ?"
1013102-76 = "คะ? งานอดิเรกของฉันน่ะเหรอคะ? แล้วก็ห้ามตอบว่าอ่านหนังสือ เพราะนั่นน่าจะเป็นหนึ่งในงานอดิเรก#nของฉันอยู่แล้วด้วย?"
1013102-77 = "อึกก... คุณครูเป็นคนที่มองนักเรียนทะลุปรุโปร่งเลยนะคะ ไม่ยุติธรรมเลย...!"
1013102-78 = "แล้วที่คุณครูพูดมาก็ไม่ผิดเลยด้วยค่ะ ยิ่งน่าเจ็บใจเข้าไปอีก!"
1013102-79 = "ฮุฮุ... แต่ฉันก็มีงานอดิเรกที่คุณครูได้รู้แล้วจะต้องตกใจเลยละค่ะ"
1013102-80 = "ไอซ์ฮอกกี้ยังไงล่ะคะ!"
1013102-81 = "[s] \"ไอซ์ฮอกกี้เหรอ?!\""
1013102-82 = "ใช่ค่ะ! ไอซ์ฮอกกี้คือกีฬาที่จริงใจ! คุณครูรู้เกี่ยวกับไอซ์ฮอกกี้มากแค่ไหนเหรอคะ?"
1013102-83 = "[s1] \"ก็พอรู้บ้างนะ...?\"\n[s2] \"ไม่ค่อยรู้เท่าไรหรอก\""
1013102-84 = "งะ... งั้นเหรอคะ? ถ้างั้นคุณครูก็..."
1013102-85 = "ทั้งติดตามช่องไอซ์ฮอกกี้ในอินเทอร์เน็ต แล้วก็วิเคราะห์เกมของทีมที่ตัวเองเชียร์และทีมคู่แข่ง#nเหมือนฉันหรือเปล่าคะ?!"
1013102-86 = "อ่า ไม่ถึงกับเป็นแฟนกีฬาสินะคะ..."
1013102-87 = "อืม ค่ะ แบบนั้นก็เข้าใจได้อยู่ค่ะ"
1013102-88 = "ที่เรดวินเทอร์อากาศหนาวตลอดทั้งปี เราก็เลยได้ดูกีฬาฤดูหนาวบ่อยๆ แต่ที่อื่นไม่น่าจะเป็นอย่างนั้นค่ะ"
1013102-89 = "ถ้างั้น คุณครูคะ แบบว่า..."
1013102-90 = "ไว้ถ้ามีโอกาสมาที่เรดวินเทอร์ คุณครูไปดูแข่งไอซ์ฮอกกี้กับฉันมั้ยคะ?"
1013102-91 = "แล้วฉันจะอธิบาย..."
1013102-92 = "ไม่สิ จะ 'วิจารณ์' การเล่นให้ฟังด้วยเลยค่ะ!"

[translation]
1013102-1 = "#title;평론의 대상"
1013102-2 = "3;타카네;03;평안하신지요, 선생님. 미요시 타카네, 인사드리겠습니다.\n#3;a\n#3;greeting\n#3;em;[반짝]"
1013102-3 = "[s] \"어서 와, 타카네. 샬레는 처음이지?\""
1013102-4 = "3;타카네;00;후후. 친절한 말씀 감사합니다. 샬레는 멋진 곳이네요."
1013102-5 = "3;타카네;12;무엇보다…… 비할 바 없이 따듯하다는 점에서, 특히 그렇네요."
1013102-6 = "3;타카네;07;그러면, 갑작스럽게 외람되겠으나……. 샬레로 걸음을 옮기기 시작한 시점부터, 선생님께 부탁드리고 싶었던 것이 있었답니다?\n#3;em;[반응]"
1013102-7 = "[s] \"그게 뭔데?\""
1013102-8 = "3;타카네;00;그것은……."
1013102-9 = "3;타카네;08;선생님에 대해, 더 많이 알고 싶다는 것이었어요.\n#3;jump\n#3;em;[음표]"
1013102-10 = "[s] \"가, 갑자기…… 왜?\""
1013102-11 = "3;타카네;02;어머나, 선생님은 저에 대해 알고 싶지 않으세요?\n#3;em;[?]"
1013102-12 = "3;타카네;02;그건 아니라고요? 교사가 학생에 대해 잘 알아야 하는 것은 당연한 일이니까요?"
1013102-13 = "3;타카네;07;좋네요. 이제부터 서로에 대해 더 많이 알아 가도록 하죠.\n#3;em;[재잘]"
1013102-14 = "3;타카네;13;평론가가, 평론 대상에 대해 알고 싶어 하는 것은 자연스러운 일이니까요."
1013102-15 = "[s] \"사람도 평론해?!\""
1013102-16 = "3;타카네;14;어…… 정확히 말하면 사람이 평론의 대상은 아니긴 한데요.\n#3;stiff"
1013102-17 = "3;타카네;02;그래도 그 대상에 대해 알아가고, 분석하고, 정보를 종합해서 숨겨진 가치를 찾아내는 것.\n#3;em;…"
1013102-18 = "3;타카네;07;그건 평론에서도, 인간관계에서도 중요한 일이 아닐까요?"
1013102-19 = "3;타카네;08;그런 의미에서 충분히 조심한다면, 사람도 평론할 수 있는 것이 아닐까, 하고 저는 생각한답니다.\n#3;em;[반짝]\n#3;closeup"
1013102-20 = "3;타카네;12;물론, 어디까지나 긍정적인 방향성으로 말이죠.\n#3;closeup"
1013102-21 = "[s] \"말 정말 잘하는구나…….\""
1013102-22 = "3;타카네;00;그럼요."
1013102-23 = "3;타카네;11;……안 그러면, 특히나 이런 인터넷 세상에서는…… 글로 먹고 살 수 없어요…….\n#3;em;[한숨]"
1013102-24 = "3;타카네;07;그러면, 선생님. 이 책은 뭔가요? 선생님 책상 밑에서 찾았는데요.\n#3;greeting"
1013102-25 = "3;타카네;08;아, 책이니까 일단 읽어 보고 평론해 보도록 할까요?"
1013102-26 = "[s] \"그건 안 돼!!!!!\""
1013102-27 = "3;타카네;04;어, 어째서죠……?\n#3;em;[?!]\n#3;shake"
1013102-28 = "3;타카네;17;아무튼 무슨 일과 어떤 일이 동시에 일어나도, 절대로 안 된다고요……?"
1013102-29 = "3;타카네;06;우우……."
1013102-30 = "#st;[0,0];instant;1;"
1013102-31 = "#clearST"
1013102-32 = "3;타카네;99\n#3;em;[한숨]\n#wait;1500"
1013102-33 = "3;타카네;01;알겠어요. 누구에게나 숨기고 싶은 것은 있기 마련일 테니까요."
1013102-34 = "3;타카네;16;그렇지만 역시 아쉬운 것 같기도 한데 말이에요……. 저, 의외로 이해심 넓은데."
1013102-35 = "3;타카네;02;역시, 안 될까요?"
1013102-36 = "[s] \"……나를 죽이고 가면 될지도 몰라.\""
1013102-37 = "3;타카네;17;그, 그 정도인가요……?\n#3;em;[땀]\n#3;stiff"
1013102-38 = "#all;hide"
1013102-39 = "2;타카네;02;그러고 보니 참 다양한 물건들이 많으시네요.\n#2;a\n#2;em;[반응]"
1013102-40 = "2;타카네;01;어찌나 다양한지, 통일성이나 공통점을 찾을 수 없을 정도로요……."
1013102-41 = "2;타카네;17;네? 전부 다른 학생들이 기념이라면서 주고 간 물건들이라고요?\n#2;em;[!]\n#2;m3"
1013102-42 = "2;타카네;01;……."
1013102-43 = "2;타카네;11;그건 좋지만, 적어도 선생님 나름의 기준에 따라서 분류해 주세요.\n#2;em;[한숨]"
1013102-44 = "2;타카네;01;분류는 그 자체만으로도 의미를 만들어낼 수 있는 행위니까요."
1013102-45 = "2;타카네;00;그리고 그렇게 하는 것으로 제가 선생님이 어떤 분인지 더 잘 알 수도 있을 테고요?"
1013102-46 = "2;타카네;07;그런 의미에서, 이거, 드릴게요.\n#2;greeting"
1013102-47 = "2;타카네;10;저희 출판부에서 발간한, 이달의 키보토스 문화 평론집이랍니다.\n#2;em;[음표]"
1013102-48 = "2;타카네;05;아, 22페이지에서 24페이지까지는 굳이 읽지 않으셔도 돼요."
1013102-49 = "2;타카네;06;그 부분은 메루리 씨가 멋대로 쓰고 그려 놓은 부분들이거든요."
1013102-50 = "[s] \"그러면 타카네는 매달 평론집을 출간하는 거야?\""
1013102-51 = "2;타카네;07;저 혼자 쓰는 것은 아니기는 하지만, 가능한 한 저에게 할당된 페이지는 전부 채우려고 노력한답니다.\n#2;em;[반응]"
1013102-52 = "2;타카네;11;……정말 어떻게 해도 평론할 만한 문화 작품이 나오지 않을 때는, 슬픈 마음으로 단념하곤 하지만요……."
1013102-53 = "#all;hide"
1013102-54 = "3;타카네;99;……맞아요. 그냥 아날로그 출판만 했다면, 저희는 살아남을 수 없었겠죠.\n#3;a\n#3;em;…"
1013102-55 = "3;타카네;02;사실 출판 및 문화 계열 종사자라는 이유로, 손을 댈 수 있는 거의 모든 영역에 손을 뻗고 있어서, 그나마 경영이 되는 거고요."
1013102-56 = "3;타카네;06;물론 저는 자꾸 주객전도가 되는 느낌이어서, 가능한 한 출판이라는 고유의 담당 영역으로 돌아가고 싶기는 하지만……."
1013102-57 = "3;타카네;11;하아…… 네. 이것도 배부른 소리겠죠. 그런 점에서 부장님의 사업 전략은 인정할 수밖에 없기는 해요.\n#3;em;[한숨]"
1013102-58 = "3;타카네;12;그래서 뭐…… 제 결론은 항상 비슷한 것 같지만요."
1013102-59 = "3;타카네;07;배부른 소리를 할 수 있는 이상, 하나라도 더 좋은 평론을 남겨서, 숨겨진 가치를 모두에게 드러내야 할 일종의……"
1013102-60 = "3;타카네;00;'직업적 의무'가 있는 것이라고요.\n#3;em;[음표]"
1013102-61 = "3;타카네;08;그러니까 선생님! 저에게만 살짝…….\n#3;jump"
1013102-62 = "3;타카네;03;선생님의 숨겨진 부분, 보여 주실 수 없으신가요……?\n#3;em;[반짝]"
1013102-63 = "[s] \"선생님은 학생에게 뭐 숨기는 거 없는데요…….\""
1013102-64 = "3;타카네;17;우와, 완전히 교과서적인 대답이시네요.\n#3;em;[땀]"
1013102-65 = "3;타카네;00;하지만 저는 이미 두 가지 알았으니까요?"
1013102-66 = "3;타카네;12;선생님은 학생에게서 받은 물건을, 최대한 소중히 여기고 계신다는 것과."
1013102-67 = "3;타카네;08;……이유는 알 것 같으면서도 모르겠지만, 학생들에게 보여줄 수 없는 것 역시 숨기고 계신다는 것을 말이죠!\n#3;em;[!]\n#3;jump"
1013102-68 = "[s] \"그, 그러면 타카네의 숨은 면모도 보여 주었으면 하는데!\""
1013102-69 = "3;타카네;07;물론이죠. 얼마든지 물어보세요.\n#3;em;[반응]"
1013102-70 = "3;타카네;02;아, 그렇지만 너무 민감하거나 그런 부분은……."
1013102-71 = "3;타카네;16;……."
1013102-72 = "3;타카네;10;정도에 따라서, 자체 검열을 해 버릴 수도 있으니까요?\n#3;em;[반짝]"
1013102-73 = "[s] \"그, 그런 질문은 할 생각 없으니까!\""
1013102-74 = "3;타카네;04;그, 그러신가요……?\n#3;stiff"
1013102-75 = "3;타카네;07;어쨌든, 그러면 뭘 알고 싶으세요?\n#3;em;[반응]"
1013102-76 = "3;타카네;02;네? 제 취미요? 독서는 당연할 것 같으니까 다른 것으로?"
1013102-77 = "3;타카네;06;우으읏……. 빤히 들여다보이는 대로의 학생이라는 말을 들은 것 같아서, 조금 분하네요……!\n#3;em;[속상함]"
1013102-78 = "3;타카네;05;틀리지도 않았다는 게 더 그렇고요!"
1013102-79 = "3;타카네;00;후훗…… 하지만 저에게도 선생님께서 놀라실 만한 취미가 있답니다."
1013102-80 = "3;타카네;08;그건, 아이스하키예요!\n#3;closeup"
1013102-81 = "[s] \"아이스하키?!\""
1013102-82 = "3;타카네;08;네! 아이스하키야말로 진정한 스포츠라고 할 수 있죠! 선생님은 아이스하키에 대해서 얼마나 알고 계시는가요?\n#3;em;[반응]"
1013102-83 = "[s1] \"그럭저럭……?\"\n[s2] \"잘 몰라.\""
1013102-84 = "3;타카네;14;그, 그런가요? 그러면 혹시 저처럼…….\n#3;jump"
1013102-85 = "3;타카네;15;전용 인터넷 채널 구독하고, 응원 팀뿐만 아니라 라이벌 팀 경기까지 분석하시는 정도이신가요?!\n#3;em;[!]"
1013102-86 = "3;타카네;04;아, 그 정도까지는 아니시군요……. 그러면 말이죠, 선생님?"
1013102-87 = "3;타카네;02;아, 네. 그편이 오히려 자연스럽겠죠."
1013102-88 = "3;타카네;12;붉은겨울에서야 항상 추우니, 동계 스포츠를 자주 볼 수 있지만, 다른 곳에서는 아닐 테니까요."
1013102-89 = "3;타카네;06;그러면, 선생님. 있잖아요…….\n#3;stiff\n#3;em;[///]"
1013102-90 = "3;타카네;07;언제 붉은겨울에 오시면, 저와 함께 아이스하키 경기 관람하지 않으시겠어요?"
1013102-91 = "3;타카네;00;제가 이것저것 많이 해설……."
1013102-92 = "3;타카네;10;아뇨, '평론'까지도 해 드릴게요!\n#3;em;[반짝]\n#3;closeup"
1013102-93 = "#all;hide"

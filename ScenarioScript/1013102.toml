[translation]
1013102-1 = "The Subject of Critique"
1013102-2 = "How do you do, Sensei? I am Miyoshi Takane, and I'd like to offer my greetings."
1013102-3 = "[s] \"Welcome, Takane. This is your first time visiting Schale?\""
1013102-4 = "Fufu. Indeed it is. Thank you for the warm welcome. Schale is as wonderful as they say."
1013102-5 = "And, speaking of \"warm\"... This weather is quite balmy, isn't it? I'm not sure I've ever experienced such a climate."
1013102-6 = "I apologize if this is too sudden, but...from the moment I started my journey to Schale, I was assailed by a certain curiosity."
1013102-7 = "[s] \"About what?\""
1013102-8 = "Well I..."
1013102-9 = "I wish to learn more about you."
1013102-10 = "[s] \"Wh-Where's this suddenly coming from?\""
1013102-11 = "Well... Do you also not wish to learn more about ME, Sensei?"
1013102-12 = "I'm certain that you do. Every teacher must take care to understand their students, do they not?"
1013102-13 = "Very well. We are in accordance. From now on, we shall dedicate this time to learn more about one another."
1013102-14 = "After all, a critic must take care to intimately know whatever she's critiquing."
1013102-15 = "[s] \"You critique people too?!\""
1013102-16 = "Hmm... Technically, that's not something I would formally write and publish."
1013102-17 = "Regardless, the act of learning more about a subject, analyzing it, and discovering its hidden...value...is quite paramount."
1013102-18 = "I think both critiques and human relationships have that in common."
1013102-19 = "In that sense, if I take care with my words, I imagine that I can critique people one day."
1013102-20 = "...With positive and productive intentions, of course."
1013102-21 = "[s] \"Eloquent as always...\""
1013102-22 = "Of course I am."
1013102-23 = "...If I'm not, in this \"digital age\"... I'd never be able to make a living as a writer."
1013102-24 = "Now then, Sensei. Shall we discuss this book? I found it under your desk."
1013102-25 = "Perhaps I should read it with you and we can critique its merits and themes together?"
1013102-26 = "[s] \"Not that one, you won't!\""
1013102-27 = "Wh-Why not...?"
1013102-28 = "No matter what, I am \"explicitly\" not to read or critique this book...?"
1013102-29 = "Hm..."
1013102-33 = "All right, then. Keep your secrets."
1013102-34 = "Still, I confess a spot of disappointment... You know, Sensei, I can be quite open-minded."
1013102-35 = "Are you so certain I'm not allowed?"
1013102-36 = "[s] \"...You can read it over my dead body.\""
1013102-37 = "Ah, could it truly be so dire?"
1013102-39 = "Nevertheless, I have noticed an...eclectic collection of items arranged around your office."
1013102-40 = "It's such a varied motley that I can't uncover a cohesive theme or thesis."
1013102-41 = "Oh? Is that so? These are items your dear students gifted you? What a quaint array of souvenirs, so haphazardly stacked about."
1013102-42 = "..."
1013102-43 = "And while that's quite \"sweet,\" I must insist that you organize them with SOME semblance of order."
1013102-44 = "Classification and arrangement should demonstrate thoughtfulness. The way you arrange things demonstrates value in the act itself."
1013102-45 = "Further, by doing so, you would assist me in my attempts to understand what sort of person you are."
1013102-46 = "So, in the spirit of that, I present a gift."
1013102-47 = "Here you will find this month's Kivotos cultural critiques published by our Publishing Department."
1013102-48 = "Oh, do feel free to skip pages 22 to 24."
1013102-49 = "Those pages contain Meruri's...\"creative\" corner."
1013102-50 = "[s] \"Do you publish this every month, Takane?\""
1013102-51 = "I'm not the sole writer, but I do my best to fill the pages allotted to me."
1013102-52 = "...Although, in times when there isn't anything worth critiquing, I sometimes am forced to acquiesce with a heavy heart..."
1013102-54 = "...Indeed. If we solely pursued analog publication, we would have never survived."
1013102-55 = "As we continue in the publishing and cultural enrichment industry, we try to expand into other areas, anything that will help make ends meet."
1013102-56 = "I feel like the tail is wagging the dog now, so I would personally prefer things to go back to the days when we were solely handling published works, but..."
1013102-57 = "*sigh* I understand that I'm coming across as ungrateful. Even I must concede that the president's business strategy was a success."
1013102-58 = "And so, I keep coming to a similar conclusion."
1013102-59 = "If I have time to complain about how I must compromise in order to keep my job, then it is also my duty to make good critiques for the greater public..."
1013102-60 = "...so that I can unearth hidden gems of value and present them to as many people as possible."
1013102-61 = "So, Sensei! Now that we're on the topic..."
1013102-62 = "Could you reveal to me the sides of you that you normally keep hidden?"
1013102-63 = "[s] \"Teachers don't keep secrets from their students...\""
1013102-64 = "Wow, what a textbook response. It sounds almost coached."
1013102-65 = "But I've already uncovered two things, you realize?"
1013102-66 = "I know that the gifts students give you carry a great weight of sentimentality."
1013102-67 = "...And that even YOU have something you want to hide from your students. I have an inkling of what it is."
1013102-68 = "[s] \"Th-Then I think it's your turn to show me your hidden side!\""
1013102-69 = "Of course. Feel free to ask any and all questions."
1013102-70 = "Oh, but please refrain from prying into sensitive topics..."
1013102-71 = "..."
1013102-72 = "Depending on the question, I may need to censor myself."
1013102-73 = "[s] \"I-I'm not going to ask anything weird like that!\""
1013102-74 = "R-Really...?"
1013102-75 = "What would you like to learn about, then?"
1013102-76 = "What? My hobbies? You mean, other than the obvious answer of \"reading\"?"
1013102-77 = "Hm... I don't enjoy the thought of you finding me so trite and predictable."
1013102-78 = "It's even worse because your guess was absolutely correct."
1013102-79 = "Fufu... But even I have a hobby that will no doubt raise your eyebrows."
1013102-80 = "It's ice hockey!"
1013102-81 = "[s] \"Ice hockey?!\""
1013102-82 = "Yes! Ice hockey is a grand sport! How much do you know of ice hockey, Sensei?"
1013102-83 = "[s1] \"A little bit...?\"\n[s2] \"Not much.\""
1013102-84 = "R-Really? Then, I'm curious..."
1013102-85 = "Do you also subscribe to online channels, have a favored team you earnestly cheer for, and meticulously analyze the performance of rival teams?!"
1013102-86 = "Oh, not that much then... In that case, Sensei..."
1013102-87 = "Oh yes. That makes a lot of sense."
1013102-88 = "It's always so cold in Red Winter, so we are always playing the traditional \"winter sports.\" I understand that is not the truth elsewhere."
1013102-89 = "Then perhaps, Sensei..."
1013102-90 = "Would you be interested in watching an ice hockey game with me the next time you visit Red Winter?"
1013102-91 = "I will be happy to commentate..."
1013102-92 = "...No, I'll even offer critiques!"

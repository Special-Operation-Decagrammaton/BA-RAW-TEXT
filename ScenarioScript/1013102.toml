[translation]
1013102-1 = "評論的對象"
1013102-2 = "貴安，老師。#n三善貴音向您問好。"
1013102-3 = "[s]「歡迎，貴音。你是第一次來夏萊吧？」"
1013102-4 = "呵呵。感謝您親切的問候。#n夏萊是個很棒的地方呢。"
1013102-5 = "尤其……那無以倫比的溫暖，特別令人印象深刻。"
1013102-6 = "那麼，雖然這或許有點冒昧……#n不過從我前往夏萊的時候開始，就有件事想拜託老師。"
1013102-7 = "[s]「是什麼事？」"
1013102-8 = "我希望……"
1013102-9 = "可以知道更多關於老師的事。"
1013102-10 = "[s]「為，為什麼突然……想知道呢？」"
1013102-11 = "哎呀，難道老師不想了解我嗎？"
1013102-12 = "沒有那種事？老師充分了解學生也是理所當然的……？"
1013102-13 = "那真是太好了。#n那麼從現在開始，就讓我們更加深入地了解彼此吧。"
1013102-14 = "畢竟身為一名評論家，想了解評論對象也是很正常的事。"
1013102-15 = "[s]「連人也是你評論的對象嗎！？」"
1013102-16 = "唔嗯……嚴格來說，人確實不在評論對象之內。"
1013102-17 = "不過去了解、分析某個對象，並綜合獲得的資訊找出其中隱藏的價值──"
1013102-18 = "無論對評論作品還是人際關係而言，這不都是很重要的嗎？"
1013102-19 = "因此我認為只要足夠謹慎，人也是可以評論的。"
1013102-20 = "當然，這僅僅只限於正面的用意。"
1013102-21 = "[s]「真的很能言善道呢……」"
1013102-22 = "那是當然的。"
1013102-23 = "否則在現在這種網路社會……也無法靠寫文章維生了……"
1013102-24 = "那麼老師，請問這本書是什麼呢？#n我剛才在老師的桌子底下發現了它。"
1013102-25 = "啊，既然是書的話，就讓我在讀完之後評論一下吧？"
1013102-26 = "[s]「那個不行！！！！」"
1013102-27 = "為，為什麼呢……？"
1013102-28 = "總之無論發生什麼都絕對不行……？"
1013102-29 = "唔……"
1013102-33 = "我明白了。每個人終究都會有想隱藏的東西吧。"
1013102-34 = "不過果然還是覺得有點可惜……其實我意外地還挺寬容的哦？"
1013102-35 = "果然……還是不行嗎？"
1013102-36 = "[s]「……想看的話可能得先殺了我才行。」"
1013102-37 = "竟，竟然有到那種程度嗎……？"
1013102-39 = "這麼說來，老師這邊有很多各式各樣的東西呢。"
1013102-40 = "種類甚至多到無法找出統一性或共通點……"
1013102-41 = "嗯？您說那些全都是其他學生送給您的紀念品？"
1013102-42 = "……"
1013102-43 = "那樣固然很好……不過還請至少按照老師的標準稍微分類一下吧。"
1013102-44 = "分類這個行為，本身就具有一定的意義。"
1013102-45 = "而且在過程之中，也能幫助我了解老師是個什麼樣的人。"
1013102-46 = "基於這層意義……我想將這個送給您。"
1013102-47 = "是我們出版部發行的，本月的奇普托斯文化評論集。"
1013102-48 = "啊，第22頁到第24頁跳過不讀也沒關係。"
1013102-49 = "因為那個部分是Meruri同學擅自寫寫畫畫的內容。"
1013102-50 = "[s]「貴音每個月都會出版評論集嗎？」"
1013102-51 = "雖然執筆的並非只有我一個人，但我會盡可能填滿所有分配給我的頁數。"
1013102-52 = "……當然如果實在沒有值得評論的作品，也只能懷著悲傷的心情放棄就是了。"
1013102-54 = "……沒錯。如果只做紙本出版的話，我們恐怕無法生存下去。"
1013102-55 = "實際上，正是因為盡可能涉及了所有出版業能沾上邊的領域……#n我們才得以勉強經營下去。"
1013102-56 = "儘管我也覺得這有些本末倒置，希望能夠盡可能回歸出版的本業……"
1013102-57 = "唉……是啊。這是個奢侈的煩惱吧。#n從這點來看，的確不得不佩服部長的經營策略。"
1013102-58 = "到頭來……我的結論似乎總是相差無幾。"
1013102-59 = "既然還有餘力能擁有這種奢侈的煩惱，#n就應該多留下一些好的評論，向世人揭示隱藏的價值。"
1013102-60 = "這也算是我的一種「職業義務」吧。"
1013102-61 = "所以老師！您能不能向我一個人……"
1013102-62 = "展示老師您隱藏起來的部分呢……？"
1013102-63 = "[s]「老師對學生是沒有任何隱瞞的……」"
1013102-64 = "哇，完全是教科書式的回答呢。"
1013102-65 = "不過我已經知道兩件事了哦？"
1013102-66 = "首先，老師非常珍惜從學生手中收到的東西……"
1013102-67 = "……還有雖然原因似懂非懂，不過老師確實隱藏著絕對不能讓學生看的東西！"
1013102-68 = "[s]「那，那我也想看看貴音隱藏的另一面！」"
1013102-69 = "當然好。請您儘管發問吧。"
1013102-70 = "啊，不過如果是太過敏感的部分……"
1013102-71 = "……"
1013102-72 = "根據程度的不同，我也可能會進行自我審查哦？"
1013102-73 = "[s]「我，我不會問那種問題啦！」"
1013102-74 = "是，是嗎……？"
1013102-75 = "總之，老師想知道什麼呢？"
1013102-76 = "……我的興趣？#n閱讀太理所當然了，所以想知道一些其他的……？"
1013102-77 = "嗚嗚……感覺被當成一眼就能看透的學生，莫名有點不甘心……！"
1013102-78 = "尤其是說的還沒有錯這點！"
1013102-79 = "呵呵……不過我還有一個會讓老師驚訝的興趣唷。"
1013102-80 = "那就是……冰上曲棍球！"
1013102-81 = "[s]「冰上曲棍球！？」"
1013102-82 = "沒錯！冰上曲棍球可說是真正的運動哦！#n老師對於冰上曲棍球有多少了解呢？"
1013102-83 = "[s1]「還算可以……？」\n[s2]「不太了解。」"
1013102-84 = "是，是嗎？老師該不會也跟我一樣……"
1013102-85 = "除了訂閱專門的網路頻道之外，連支持的隊伍和競爭對手的比賽都會分析吧！？"
1013102-86 = "啊，沒有到那種程度啊……那麼，老師？"
1013102-87 = "啊，嗯。那樣反而比較自然吧。"
1013102-88 = "畢竟冬季運動在總是天寒地凍的赤冬還算常見，在其他地方就未必如此了呢。"
1013102-89 = "那麼，老師。那個……"
1013102-90 = "您下次來赤冬的時候，要不要和我一起觀賞冰上曲棍球的比賽呢？"
1013102-91 = "我可以為老師詳細解說……"
1013102-92 = "不，甚至可以「評論」給老師聽唷！"

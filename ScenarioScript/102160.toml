[translation]
102160-1 = "ตอนที่ 16;ปฏิบัติการป้องกันเขตปกครองตนเอง - มิลเลเนียม"
102160-2 = "เอาละ ถึงตาของพวกเราแล้ว"
102160-4 = "ค่ะ! พร้อมลุยแล้วค่ะ!"
102160-5 = "ฉันก็จะช่วยคุ้มกันเขตปกครองตนเองมิลเลเนียมอีกแรงค่ะ"
102160-7 = "เฮ้อ... ทั้งวิเคราะห์วัสดุหอคอย... วิเคราะห์ข้อมูล... แถมต้องมาทำปฏิบัติการป้องกันอีก... ต่อให้มีสักสิบร่างฉันก็ไม่ไหว..."
102160-14 = "หืม? AMAS?"
102160-16 = "มาช่วยพวกเราเหรอคะ? เวอริทัสส่งมาเหรอ...?"
102160-17 = "หืม? ไม่ใช่นะ? คนที่สามารถแฮ็กมันได้ น่าจะต้องเก่งขนาดหัวหน้าฮิมารินะ..."
102160-18 = "เอ๋... ฉันไม่ได้ทำนะคะ?"
102160-19 = "คะ? ถ้างั้นใคร... ยะ... อย่าบอกนะคะว่าวิญญาณทำให้มันขยับขึ้นมา?!"
102160-24 = "......"
102160-25 = "......"
102160-26 = "อืม... แต่ก็ไม่เห็นเป็นไรนี่คะ ยังไงเราก็ต้องการความช่วยเหลืออยู่แล้ว"
102160-27 = "...... จริงสิ เอาละ งั้นไปกันเลย"
102160-31 = "ลุยกันเลย!"

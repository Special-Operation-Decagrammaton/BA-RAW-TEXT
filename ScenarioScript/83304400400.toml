[translation]
83304400400-6 = "ฉันได้ยินเรื่องของมาโคโตะมาแล้ว เห็นว่า... โดนสะกดจิตเหรอ?"
83304400400-7 = "เฮ้อ... ใช่ค่ะ รุ่นพี่มาโคโตะโดนการสะกดจิตของรุ่นพี่ซัตสึกิเข้าไปอย่างจัง..."
83304400400-8 = "อิบูกิก็เลยโดนลูกหลงจนได้รับบาดเจ็บ..."
83304400400-9 = "ฉันไม่รู้เลยค่ะว่าพวกรุ่นพี่คิดอะไรกันอยู่!"
83304400400-10 = "หลังจากตื่นจากการถูกสะกดจิตก็มาขอโทษขอโพยยกใหญ่ แล้วก็โวยวายว่าต้องหาของขวัญมา#nปลอบใจอิบูกิแล้ว!"
83304400400-11 = "นี่ถ้าอิบูกิบาดเจ็บไปมากกว่านี้จะทำยังไงกันคะ! จริงๆ เลยเชียว!"
83304400400-12 = "เรื่องนั้นน่ะ... อืม คงต้องเหนื่อยกันตลอดเลยสินะ"
83304400400-13 = "อ่า ฉันไม่ได้มาเล่าเพื่อขอความเห็นใจหรอกนะคะ"
83304400400-14 = "พอมาคิดดูแล้ว คุณเองก็เป็นฝ่ายที่ต้องหัวหมุนกับรุ่นพี่มาโคโตะเหมือนกัน"
83304400400-15 = "งานหนักกันทั้งสองฝ่ายเลยนะคะเรา"
83304400400-16 = "ยังไม่ถึงกับเป็นงานหนักหรอก ฉันก็แค่ทำในสิ่งที่ทำได้น่ะ"
83304400400-17 = "ค่ะ... ตามนั้นก็ได้ค่ะ"

[translation]
83304400400-6 = "I heard Makoto ran into some trouble. Something about hypnosis?"
83304400400-7 = "...*sigh*. Of course you heard. Yeah... Makoto was completely hypnotized by Satsuki..."
83304400400-8 = "And Ibuki was hurt in the fallout..."
83304400400-9 = "I have no clue what she was thinking! None at all!"
83304400400-10 = "And now that she's in control of herself again, she's throwing a fit over how sorry she is and fretting over the gifts she needs to make amends to Ibuki."
83304400400-11 = "Seriously, Ibuki could have been in real danger! Just what was she thinking?!"
83304400400-12 = "That's... You seem to have a lot to deal with right now."
83304400400-13 = "...Ah, I don't want your sympathy right now."
83304400400-14 = "But I suppose we both have to keep up with Makoto in our own ways."
83304400400-15 = "I guess the two of us have a lot on our plates."
83304400400-16 = "It's not so bad. I'm just doing what I can."
83304400400-17 = "...Sure. We can leave it at that."

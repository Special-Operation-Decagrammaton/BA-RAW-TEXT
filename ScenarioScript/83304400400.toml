83304400400-6 = "3;히나;14;마코토에 대한 이야기를 들었어. 최면에 걸렸, 다고?"
83304400400-7 = "3;이로하;06;…………후우. 맞아요. 마코토 선배. 사츠키 선배의 최면에 그대로 정통으로 걸려버려서……\n#3;em;[한숨]\n#3;a"
83304400400-8 = "3;이로하;06;그 결과 이부키가 다치기까지 하고……\n#3;stiff"
83304400400-9 = "3;이로하;05;정말 무슨 생각을 하는지 모르겠다고요! 그 인간!\n#3;em;[빠직]\n#3;jump"
83304400400-10 = "3;이로하;05;본인은 최면에서 깨어나고 난 뒤에 엄청나게 미안하다면서, 이부키를 위해 선물을 준비해야 해! 라는 식으로 또 난리나 피우고 있고."
83304400400-11 = "3;이로하;05;이부키가 더 위험해졌으면 어쩌려고 그러는 건가요! 정말!\n#3;em;[스팀]\n#3;hophop"
83304400400-12 = "3;히나;99;그건……. 으응, 늘 고생하고 있는 모양이네."
83304400400-13 = "3;이로하;01;……아아, 뭐, 딱히 알아주셨으면 하는 건 아닙니다만."
83304400400-14 = "3;이로하;99;생각해 보면 그렇죠. 당신도 마코토 선배에게 휘둘리는 입장이었죠.\n#3;em;[…]"
83304400400-15 = "3;이로하;02;뭐, 서로 고생이 많네요."
83304400400-16 = "3;히나;02;고생이라고 할 정도까진 아니야. 그저 할 수 있는 일을 할 뿐이니까."
83304400400-17 = "3;이로하;01;………그래요. 뭐, 그런 걸로 쳐둘까요."

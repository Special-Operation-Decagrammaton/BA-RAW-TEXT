[translation]
83304400400-6 = "我聽說真琴的事了。他被催眠了嗎？"
83304400400-7 = "……唉，沒錯。#n真琴前輩因為中了皐月前輩的催眠……"
83304400400-8 = "甚至害伊吹受了傷……"
83304400400-9 = "真不知道那個人到底在想什麼！"
83304400400-10 = "他本人從催眠中醒來後還說自己非常抱歉，所以必須為伊吹準備禮物當成賠罪！#n於是鬧得沸沸揚揚的……"
83304400400-11 = "要是伊吹受了更嚴重的傷該怎麼辦啊？真讓人火大！"
83304400400-12 = "這……看來你也一直很辛苦呢。"
83304400400-13 = "……啊啊，我其實也不是希望被別人理解才這麼說。"
83304400400-14 = "仔細想想，你也跟我一樣處於真琴前輩受害者的立場吧。"
83304400400-15 = "我們彼此都很辛苦呢。"
83304400400-16 = "辛苦倒不至於，我只是做自己能力所及的事而已。"
83304400400-17 = "……是啊。就當作是這樣吧。"

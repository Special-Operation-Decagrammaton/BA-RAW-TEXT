2300720-60 = "3;하나코;01;그러고 보니, 선생님. 정말로 궁금하지 않으신가요? 아까 전부터 제가 들고 왔던 책."
2300720-61 = "3;하나코;99;선생님께서 어떤 예상을 하셨는지는 저도 짐작이 가긴 하지만……."

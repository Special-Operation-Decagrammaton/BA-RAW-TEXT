2300720-19 = "#wait;100"
2300720-20 = "3;하나코;01;후후……♡ 네? 무슨 이야기실까요? 왜 그런 반응이신가요?\n#3;em;[하트]\n#3;m3"
2300720-21 = "3;하나코;03;여자아이가 소중하게 품고 있던 책의 내용이 궁금하신가요? 어떤 내용일지? 뭐가 들었는지?"
2300720-22 = "3;하나코;99;뭣하면 지금 여기서 읽어 드려도 되는데 말이에요."
2300720-23 = "3;하나코;01;들으시기 편하게, '또박또박 큰 소리로' 말이죠……?\n#3;em;[반짝]"

[translation]
2300720-1 = "เด็กสาวที่เดาทางไม่ถูก"
2300720-2 = "(ระหว่างทางกลับ หลังเสร็จธุระที่ทรีนิตี้)"
2300720-3 = "...อุ๊ย ตายจริง"
2300720-4 = "ช่างเป็นเรื่องบังเอิญจริงๆ เลยนะคะที่มาเจอกันแบบนี้ได้"
2300720-5 = "[s1] \"เสียงนี้มัน... ฮานาโกะ?\"\n[s2] เดินไปยังทางที่ได้ยินเสียง"
2300720-9 = "กำลังจะกลับแล้วเหรอคะ? ถ้าฉันมาช้าไปสักนิดละก็คงไม่ได้เจอคุณครูแน่เลย"
2300720-10 = "คะ? อะไรทำให้มาช้างั้นเหรอคะ? อ่า... ไม่มีอะไรหรอกค่ะ"
2300720-16 = "ฉันไปขอของที่ถูกยึดไปคืนมาน่ะค่ะ..."
2300720-17 = "[s3] \"นะ...นี่มัน...!!!\"\n[s4] \"หนังสือเล่มนั้นนี่นา...!!\""
2300720-20 = "ฮุฮุ...♡ คุณครูพูดอะไรกันคะ? ทำไมถึงดูตกใจแบบนั้นล่ะคะ?"
2300720-21 = "สงสัยเนื้อหาของหนังสือที่เด็กผู้หญิงตัวน้อยๆ หวงแหนงั้นเหรอคะ? อยากรู้สินะคะว่าเนื้อเรื่อง#nเป็นยังไง? เกี่ยวกับอะไรบ้าง?"
2300720-22 = "ถ้าเป็นอย่างนั้น ฉันอ่านให้ฟังที่นี่ตอนนี้เลยก็ได้นะคะ"
2300720-23 = "ฉันจะอ่านแบบ \"เสียงดังฟังชัด\" ทุกคำ คุณครูจะได้ฟังได้สบายๆ ไงล่ะคะ?"
2300720-24 = "...คะ?"
2300720-25 = "ไม่เป็นไรงั้นเหรอคะ? ถ้าทำแบบนั้นจะยิ่งดูแย่กว่าเดิมงั้นเหรอคะ?"
2300720-26 = "[s5] \"รู้ว่าครูอยู่ที่นี่เลยมาหางั้นเหรอ?\"\n[s6] \"ตั้งใจมาหาครูใช่มั้ยเนี่ย ฮานาโกะ?\""
2300720-29 = "...?"
2300720-30 = "หืม~♡ คิดอย่างนั้นเหรอคะ? "
2300720-31 = "ฉันคิดมาตลอดเลยค่ะว่าปฏิกิริยาตอบสนองของคุณครูเนี่ย มันเป็นอะไรที่กระตุ้นต่อมฉันได้ตลอดเลย#nละค่ะ"
2300720-32 = "จนกำลังจะติดเป็นนิสัยไปแล้วได้รึเปล่านะ... ไม่สิ หรือว่าติดเป็นนิสัยไปแล้วกันนะ..."
2300720-36 = "...ฮุฮุ"
2300720-37 = "เอาเป็นว่าวันนี้ฉันจะยอมหลับตาข้างหนึ่ง มองข้ามไปก็แล้วกันค่ะ เพราะหลังจากนี้ก็ยังมีโอกาสอีก..."
2300720-38 = "คุณครูเองก็มักจะยอมให้ฉันบ่อยๆ อยู่แล้ว แต่ว่าก็มักจะชอบบอกฉันอยู่บ่อยๆ ด้วยว่าอย่าล้อเล่นมาก#nเกินไปด้วยนี่คะ"
2300720-39 = "...ถึงจะเป็นฉันก็เถอะค่ะ แต่ก็พอจะสังเกตได้อยู่นะคะ"
2300720-40 = "เพราะงั้นฉันเลยคิดว่าจะขอเดินไปส่งคุณครูตอนเดินกลับ ทดแทนที่ไม่แกล้งคุณครู..."
2300720-41 = "แบบนั้นจะได้รึเปล่าคะ?"
2300720-42 = "...ฮุฮุ ตกลงสินะคะ?"
2300720-43 = "ถ้างั้นเราไปกันเลยมั้ยคะ?"
2300720-48 = "(หลังจากนั้นคุณครูก็ได้รับการนำทางจากฮานาโกะ และเดินไปที่ป้ายรถบัสที่อยู่ใกล้ๆ ทรีนิตี้ด้วยกัน)"
2300720-49 = "(ทั้งคู่คุยเรื่องต่างๆ ด้วยกันมากมาย โดยที่ไม่มีหัวข้อสนทนาไหนสร้างความลำบากใจให้กับคุณครู ตามที่ฮานาโกะได้รับปากเอาไว้)"
2300720-51 = "...ถึงแล้วละค่ะ"
2300720-52 = "อืม~ แต่ฉันรู้สึกว่ามันน่าเบื่อนิดหน่อยนะคะ..."
2300720-53 = "รู้สึกว่าคุณครูจะผิดหวัง หรือคิดว่ามันน่าเบื่อรึเปล่าน่ะค่ะ..."
2300720-54 = "คุณครูอุตส่าห์มาตั้งไกลแบบนี้ ลึกๆ แล้วในใจแอบคาดหวังให้มีเรื่องสนุกๆ อะไรนิดหน่อยอยู่รึเปล่าคะ?"
2300720-55 = "ฉันกังวลว่าอาจจะหูตาไม่ไวพอที่จะสังเกตเห็นความต้องการลึกๆ ของคุณครู แล้วเอาแต่ชวนคุยเรื่อง#nน่าเบื่อระหว่างที่เดินมาส่งแบบนี้รึเปล่า...น่ะค่ะ"
2300720-56 = "[s7] \"ไม่เลย ไม่ใช่เลยสักนิดเดียว\"\n[s8] \"ครูกลับอยากให้เป็นแบบนี้บ่อยๆ ซะอีก...\""
2300720-59 = "ฮุฮุฮุ... อย่างนั้นเหรอคะ"
2300720-60 = "พอมาคิดดูแล้ว คุณครูคะ... ไม่สงสัยจริงๆ เหรอคะ? หนังสือที่ฉันถือมาด้วยน่ะค่ะ"
2300720-61 = "ถึงฉันจะพอเดาออกว่าคุณครูคิดว่ามันเป็นหนังสืออะไรก็เถอะค่ะ..."
2300720-62 = "แต่ว่าที่จริงแล้ว... มันอาจไม่ใช่หนังสืออย่างว่าก็ได้นี่คะ?"
2300720-63 = "หนังสือพวกนั้นน่ะ ภาพปกมันมักจะเหมือนๆ กันนี่คะ"
2300720-64 = "อันที่จริงมันก็อาจจะเป็นไดอารี่... สมุดโน้ตจดเรื่องที่กังวล... หรือสมุดรวมบทความสั้นๆ..."
2300720-65 = "หรืออาจจะเป็นสมุดที่จดรายละเอียดเรื่องส่วนตัวเอาไว้ก็ได้...?"
2300720-69 = "[ns9] \"แบบนั้นยิ่งไม่ควรดูใหญ่เลยสิ\" \n[ns10] \"ครูคิดว่าปล่อยไว้แบบนี้แหละดีแล้ว\""
2300720-75 = "อ่า..."
2300720-76 = "จริงๆ เลยค่ะ... คราวนี้ฉันทำพลาดเองค่ะ คาดเดาผิดไปนิดหน่อยค่ะ"
2300720-77 = "ถ้าเป็นคุณครูละก็คงจะต้องตอบอะไรแบบนี้อยู่แล้ว"
2300720-78 = "...ฮุฮุ"
2300720-79 = "เข้าใจแล้วค่ะ ถ้างั้นวันนี้ฉันจะยอมแพ้ไปเท่านี้ค่ะ"
2300720-80 = "อ๊ะ แต่ว่าเรื่องที่เราบังเอิญเจอกันวันนี้น่ะ เป็นเรื่องจริงนะคะ มีแค่เรื่องนั้นที่ฉันไม่ได้ล้อเล่นเลยค่ะ"
2300720-81 = "เพราะงั้นวันนี้ฉันถึงตัดสินใจว่าจะไม่ทำอะไรคุณครู"
2300720-82 = "...ค่ะ"
2300720-83 = "...พวกเรายังมีเวลาอีกเยอะ เอาไว้ฉันค่อย 'แกล้ง' คราวหน้าแล้วกันนะคะ♡"
2300720-85 = "(คุณครูก็ได้รับรอยยิ้มหวานๆ จากฮานาโกะเป็นการบอกลา จากนั้นก็ขึ้นรถบัสกลับไป)"

2300720-37 = "3;하나코;01;뭐, 오늘은 그냥 넘어가 드리도록 할게요. 기회는 앞으로도 얼마든지 있고…….\n#3;em;[음표]"
2300720-38 = "3;하나코;01;선생님께서는 종종 받아 주시겠다고 했지만, 그건 동시에 너무 자주 장난치지는 말라는 의미기도 하니까요."
2300720-39 = "3;하나코;03;……저도 그 정도의 눈치는 있거든요."
2300720-40 = "3;하나코;99;그 대신이라고 하기엔 뭐 하지만, 돌아가시는 길 배웅 정도는 함께 할까 하는데…….\n#3;em;…"

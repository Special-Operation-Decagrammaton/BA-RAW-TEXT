[translation]
2300720-1 = "難以捉摸的少女"
2300720-2 = "（在結束三一的工作後回去的路上）"
2300720-3 = "……哎呀。"
2300720-4 = "果然是相逢不如偶遇呢。"
2300720-5 = "[s1]「這個聲音是……花子？」\n[s2] 回頭看向聲音傳來的方向"
2300720-9 = "是在工作完成後要回去的路上嗎？#n要是再多耽擱一會就見不到面了呢。"
2300720-10 = "嗯？您說被什麼事耽擱了？#n啊啊。其實也沒什麼……"
2300720-16 = "是為了找回被沒收的這個……"
2300720-17 = "[s3]「……那，那個是！！！」\n[s4]「那本書該不會是……！！」"
2300720-20 = "呵呵♡#n這本書怎麼了嗎？為什麼會有這種反應？"
2300720-21 = "對女孩子珍藏的書感到好奇嗎？#n裡面是什麼內容？寫了什麼呢？"
2300720-22 = "如果想知道的話，我可以在這裡唸出來。"
2300720-23 = "為了讓您聽得更清楚，我會用「清楚且響亮」的聲音朗讀唷……？"
2300720-24 = "……嗯？"
2300720-25 = "您說不用了，現在不太方便是嗎？"
2300720-26 = "[s5]「你本來就知道我會在這裡吧？」\n[s6]「你是特地來找我的吧，花子？」"
2300720-29 = "……？"
2300720-30 = "嗯～哼♡#n您是這樣認為的嗎？"
2300720-31 = "我一直覺得……老師的反應總是能帶給我不小的刺激。"
2300720-32 = "感覺會變成一種習慣呢……不，可能已經變成習慣了……"
2300720-36 = "……呵呵。"
2300720-37 = "不過今天就先到此為止吧。#n以後還有的是機會……"
2300720-38 = "雖然老師大多會一笑置之，但這也不代表能一直開玩笑。"
2300720-39 = "……我也是懂得察言觀色的。"
2300720-40 = "雖然不能說是彌補，但我想為您送行……"
2300720-41 = "只是這種程度的話，沒問題吧？"
2300720-42 = "……呵呵，就這麼決定了。"
2300720-43 = "那我們走吧？"
2300720-48 = "（之後在花子的帶領下，一起走到了三一近郊的公車站）"
2300720-49 = "（雖然聊了很多，但就如花子所說，話題都不是很棘手）"
2300720-51 = "……到了呢。"
2300720-52 = "唔嗯～感覺還是少了點什麼……"
2300720-53 = "好擔心老師會因為無聊乏味而感到失望呢。"
2300720-54 = "都特別遠道而來了，其實您心裡是期待著一點刺激的對吧？"
2300720-55 = "我擔心自己是不是太不識趣，沒察覺老師的心思而為您做了這麼無趣的送行……"
2300720-56 = "[s7]「不不不，絕對不是。」\n[s8]「正好相反，我反而希望這樣的情況能越多越好……」"
2300720-59 = "呵呵呵……這樣啊。"
2300720-60 = "話說回來，老師。#n您真的不好奇嗎？我剛才拿著的書。"
2300720-61 = "雖然我大概猜的到老師您的想法……"
2300720-62 = "不過……說不定這其實不是那種內容的書唷？"
2300720-63 = "因為這類型的書……封面基本上都大同小異。"
2300720-64 = "搞不好是日記……寫著煩惱的筆記本……或是隨筆之類……"
2300720-65 = "內容更加私密、更坦白的書唷……？"
2300720-69 = "[ns9]「如果是那種內容，那就更不能看了。」\n[ns10]「我覺得現在這樣很好。」"
2300720-75 = "……啊。"
2300720-76 = "哎呀呀……這次是我失誤了呢。#n舉的例子似乎不是很好。"
2300720-77 = "如果老師您聽到這些話，肯定會這樣回答的。"
2300720-78 = "……呵呵。"
2300720-79 = "知道了。那今天就到此為止吧。"
2300720-80 = "啊，不過今天確實是偶遇唷。#n這點我並沒有開玩笑。"
2300720-81 = "所以，我今天對老師什麼都沒做。"
2300720-82 = "……嗯。"
2300720-83 = "……「開玩笑」的機會，就留到下一次吧♡"
2300720-85 = "（之後，在滿臉笑容的花子的送行下搭上了公車）"

2300720-53 = "3;하나코;05;선생님께서 지루하거나 따분하다고 실망하시진 않으셨을까 걱정이 되네요.\n#3;em;[속상함]"
2300720-54 = "3;하나코;05;굳이 이렇게 먼 길 오셨는데, 사실 내심 살짝 자극적인 재미를 기대하지 않으셨을까?"

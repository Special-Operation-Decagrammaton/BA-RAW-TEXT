[translation]
51260-1 = "ตอนที่ 26;ด้วยความปรารถนา"
51260-2 = "(สถานการณ์ที่นำเฮียกคิยาโคไปสู่ความสับสนถูกจัดการเสร็จแล้วในระดับหนึ่ง)"
51260-5 = "เฮ้! เอาอุปกรณ์ที่จำเป็นมาทางนี้หน่อย!"
51260-6 = "เมื่อกี้ใครบอกว่าอยากได้ค้อนนะ?"
51260-10 = "อ้อ ส่งมาทางนี้เลยครับ!"
51260-13 = "ค่ะ! ส่งใบคำร้องทางนี้ค่ะ!"
51260-14 = "ท่านไหนที่ต้องการเครื่องไม้เครื่องมืออะไร มาส่งใบคำร้องให้ฉันได้เลยค่ะ!"
51260-15 = "เรายังพอมีเวลาอยู่ ยังไงก็ช่วยส่งตามลำดับด้วยนะคะ~!"
51260-16 = "[s] \"ทุกคนเหนื่อยกันตั้งแต่เช้าเลยนะ\""
51260-20 = "อ๊ะ คุณครู!?"
51260-21 = "เชิญค่ะ! คุณครู!?"
51260-23 = "ฮุฮุ! ทุกคนในชมรมเทศกาลกำลังพยายามอย่างเต็มที่เพื่อนำเทศกาลกลับมาอีกครั้งค่ะ!"
51260-24 = "[s1] \"อืม ที่ผ่านมาก็วุ่นวายไม่เบาเลย\"\n[s2] \"แต่ก็ยืนยันแล้วใช่ไหมว่าจะจัดงานเทศกาลอีกครั้ง?\""
51260-27 = "ใช่ค่ะ เพราะเรื่องที่เกิดไป เราก็ไม่ได้อยากให้เกิด..."
51260-28 = "แต่ด้วยเหตุผลมากมาย เราก็ได้รับความเห็นใจจากหลายๆ คน ก็เลยได้มาจัดเทศกาลกันอีกครั้งค่ะ"
51260-29 = "อึก... แต่ระหว่างที่เกิดเหตุการณ์นั้น สมาชิกชมรมเทศกาลทุกคนก็สลบเหมือดกันหมด เราก็เลยไปช่วย#nอะไรไม่ได้..."
51260-30 = "น่าเจ็บใจนัก แบบนี้ยกโทษให้ไม่ได้เด็ดขาดค่ะ!!!"
51260-32 = "ใช่ค่ะ! ถ้าไม่เกิดเหตุการณ์แบบนั้น พวกเราชมรมเทศกาลก็คงได้ร่วมต่อสู้ด้วยแล้ว!"
51260-33 = "ใช่ค่ะ! แบบนั้นจะเรียกว่าเป็นงานเทศกาลไม่ได้ด้วย!"
51260-34 = "[s] \"ไม่หรอก ต่อให้ไม่เกิดเรื่องนั้น เราก็รู้ว่าชมรมเทศกาลทุ่มเทกันมาก\""
51260-36 = "ขอบคุณนะคะ..."
51260-37 = "แต่ว่า พวกฉันรู้สึกว่าต้องรับผิดชอบที่คุณครูและทุกคนในเฮียกคิยาโคช่วยกันจัดงานเทศกาลที่ผ่านมา แล้วก็รู้สึกว่าเป็นหนี้บุญคุณด้วยค่ะ"
51260-38 = "เพื่อเป็นการตอบแทน ครั้งนี้พวกเราชมรมจัดงานเทศกาลจะเริ่มจัดงานเทศกาลใหม่อีกครั้งเองค่ะ!"
51260-39 = "...อย่างน้อยก็เพื่อฉลองที่เหตุการณ์ในเฮียกกะเรียวรันคลี่คลายได้ด้วยดีค่ะ"
51260-41 = "ค่ะ! ใช่ค่ะ! หัวหน้า!"
51260-42 = "เพราะต่อให้อุปกรณ์ถูกทำลาย สถานที่จัดงานเทศกาลพังไม่เป็นท่า และเกิดสถานการณ์ยากลำบาก#nแค่ไหน แต่ก็ใช่ว่าเทศกาลจะต้องสิ้นสุดลงนี่คะ!"
51260-44 = "อื้ม อะไรที่เสียหายก็ซ่อมใหม่ ส่วนอะไรที่พังไปก็สร้างขึ้นใหม่ได้"
51260-45 = "ใช่มั้ยล่ะคะ คุณครู!?"
51260-46 = "[s] \"อื้ม ชิซุโกะพูดถูกแล้วละ\""
51260-47 = "ฮิฮิฮิ"
51260-51 = "เอาละ! ชมรมเทศกาล! เรามาลุยกันเลย!"
51260-54 = "ฮึบบบ!"
51260-56 = "จริงสิ คุณครู"
51260-64 = "ครั้งนี้คุณครูก็ทำได้ดีมากเลยค่ะ"
51260-65 = "[s] \"...ไม่หรอก\""
51260-89 = "(ต่อให้เป็นสถานที่ที่ถูกเพลิงไหม้ไป แต่ก็ยังมีคนขวักไขว่กันให้วุ่นเหมือนเดิม)"
51260-90 = "(แค่ซ่อมสิ่งที่เสียหาย และสร้างสิ่งที่ถูกทำลายไป... ทุกคนต่างลุกขึ้นมาอย่างกล้าหาญเพื่อกลับมาใช้#nชีวิตเหมือนเคย)"
51260-93 = "(และก็...)"
51260-99 = "[ns] \"ฮัลโหล\""
51260-106 = "เชิญค่ะคุณครู"
51260-107 = "ฉันติดต่อไปอย่างกะทันหันแท้ๆ ต้องขอบคุณนะคะที่ช่วยแวะเข้ามาที่ชมรมหยินหยางอย่างยินดีแบบนี้"
51260-108 = "[s] \"นิยะเรียกหาทั้งที ครูทิ้งทุกอย่างตรงหน้าแล้วรีบมาเลย\""
51260-109 = "อะฮะฮ่า งั้นเหรอคะ พูดจาน่าประทับใจแบบนี้ ฉันทำตัวไม่ถูกนะคะ~"
51260-110 = "ที่ฉันติดต่อคุณครูไปในวันนี้..."
51260-111 = "ก็เพื่อจะรายงานสิ่งที่เกิดขึ้นหลังจากเกิด <สถานการณ์> นั้นไปค่ะ"
51260-112 = "ก่อนอื่นฉันคงต้องแจ้งเกี่ยวกับชมรมเฮียกกะเรียวรันก่อน~"
51260-116 = "การยุบชมรมถูกเลื่อนออกไปก่อนค่ะ♪"
51260-117 = "[s] \"เลื่อนเหรอ? ไม่ใช่ระงับเลยหรอกเหรอ?\""
51260-118 = "ใช่ค่ะ ต่อให้เรื่องจากความโกลาหลเกี่ยวกับยูคาริจะเป็นแรงกระตุ้นให้สมาชิกหลักของชมรมมารวมตัว#nกันได้อีกครั้งก็เถอะ~"
51260-119 = "อะฮะฮ่า แต่ก่อนหน้านี้ก็มีวิกฤตหนักที่สมาชิกทั่วไปต่างพากันลาออกจากชมรมด้วย ถ้าเราไม่แก้ปัญหา#nหลักนั้น ความยากลำบากอันยิ่งใหญ่ในอนาคตของเฮียกกะเรียวรันก็คงไม่จบไม่สิ้นหรอกค่ะ~"
51260-120 = "[s] \"ความยากลำบากอันยิ่งใหญ่เหรอ...?\""
51260-121 = "ที่เห็นได้ชัดก็คงเป็น... ไม่ได้รับเงินสนับสนุนในการทำกิจกรรมของชมรม~?"
51260-122 = "[s] \"เรื่องใหญ่เลยนะนั่นน่ะ!\""
51260-123 = "อะฮะฮ่า~ แต่ดูจากแนวโน้มของตอนนี้แล้วละก็..."
51260-124 = "ค่ะ ถึงอาจจะต้องใช้เวลาหน่อย แต่ก็คงลุกขึ้นมายืนหยัดกันได้ในไม่ช้าค่ะ"
51260-125 = "ส่วนเรื่องเบาะแสเกี่ยวกับคุซึโนฮะ..."
51260-126 = "[s] \"เรื่องนั้นไม่เป็นไรหรอก ค่อยๆ จัดการไปทีละขั้นๆ ก็ได้\""
51260-127 = "...งั้นเหรอคะ?"
51260-128 = "เอาเถอะค่ะ นอกจากเรื่องนี้แล้วยังมีเรื่องการฟื้นฟูเทศกาลของชิซุโกะด้วย ผู้เกี่ยวข้องอย่างกลุ่มการค้า#nก็เข้ามาช่วยอีกครั้งเหมือนเคย เทศกาลคงจะเริ่มขึ้นอีกครั้งในเร็วๆ นี้นะคะ"
51260-129 = "แล้วก็มีอีกอย่างที่ต้องรายงานให้ทราบ..."
51260-130 = "มันเป็นเรื่องที่ค่อนข้างซีเรียสนะคะ"
51260-131 = "ถ้าจะให้บอกอย่างไม่อ้อมค้อมเลยละก็... นักเรียนชมรมความงามของธรรมชาติที่คุณครูกับ#nเฮียกกะเรียวรันเผชิญหน้าและต่อสู้ด้วยน่ะค่ะ..."
51260-132 = "ชื่อยาบูกิ ชูโระ หรือเปล่านะ"
51260-136 = "หลังจากหนีไปเธอก็ไปซ่อนตัว ฉันก็เลยสั่งให้ชมรมหยินหยางตามหาเธอคนนั้นทันทีค่ะ"
51260-137 = "แต่ก็น่าเสียดายที่พอออกจากเขตปกครองตนเองเฮียกคิยาโคไป เราก็หาร่องรอยของเธอไม่เจอเลยค่ะ"
51260-138 = "ฉันก็ไม่รู้ว่าเธอใช้กลเม็ดอะไร แต่ตั้งแต่พ้นระยะของเขตปกครองตนเองไป ตัวเธอก็ราวกับหายเข้ากลีบ#nเมฆไปเลยค่ะ"
51260-139 = "รู้สึกเหมือนถูกผีหลอกเลยละค่ะ"
51260-140 = "[s] \"งั้นเหรอ... ว่าแล้วว่าคงไม่ยอมให้ตามล่ากันง่ายๆ\""
51260-143 = "[ns] \"ทำได้ดีแล้วละนิยะ แต่ตอนนี้ต้องจัดการเรื่องที่เกิดที่เทศกาลก่อน...\""
51260-144 = "...เป็นความผิดของฉันเองค่ะ"
51260-145 = "[s] \"หืม?\""
51260-146 = "ก่อนหน้านี้ฉันคิดตื้นไปค่ะ"
51260-147 = "ฉันไม่ควรคิดตื้นๆ เรื่องคำเตือนจากชมรมความงามของธรรมชาติเลย มันก็เลยทำให้เกิดเรื่องใหญ่#nแบบนี้น่ะค่ะ"
51260-148 = "...ฉันตัดสินใจผิดพลาดไป มันจึงเกิดเป็นรอยแผลเป็นขนาดใหญ่กับเฮียกคิยาโค"
51260-149 = "ฉันคงไม่มีหน้าไปเจอทั้งคุณครูและทุกคนในเฮียกคิยาโคอีกแล้วค่ะ..."
51260-150 = "[s] \"ไม่หรอก มันไม่ใช่แบบนั้น\""
51260-154 = "...คะ?"
51260-155 = "[s3] \"นิยะบอกไว้เองไม่ใช่เหรอ?\"\n[s4] \"ชมรมความงามของธรรมชาติเป็นแค่ข่าวลือ ไม่มีค่าให้ไตร่ตรองด้วยซ้ำ\""
51260-158 = "[s5] \"ถ้าเอาแต่กลัวข่าวลือหรือเรื่องลึกลับทั่วๆ ไป ก็ทำอะไรไม่ได้\"\n[s6] \"นิยะตัดสินจากความสมเหตุสมผลของหลักฐานที่มีแล้วละ\""
51260-159 = "แต่ว่า"
51260-160 = "แต่ว่า"
51260-163 = "[ns7] \"และนั่นทำให้นิยะเรียกครูมาที่เฮียกคิยาโค\"\n[ns8] \"นิยะน่ะเป็นห่วงนักเรียนนะ\""
51260-166 = "[ns9] \"แล้วก็ทำให้ครูมาทันเวลาด้วย\"\n[ns10] \"ครูกลับภูมิใจในการทำแบบนั้นของนิยะนะ\""
51260-171 = "คุณครู..."
51260-172 = "เรื่องเกิดขึ้นถึงขนาดนี้แล้ว ยังจะมาบอกว่าฉันพยายามได้ดีอยู่อีก..."
51260-173 = "และภูมิใจในตัวฉันอีกงั้นเหรอคะ?"
51260-174 = "[s11] \"ชมเมื่อจำเป็น ให้กำลังใจเมื่อทำพลาด\"\n[s12] \"นี่เป็นงานของคนเป็นครูอยู่แล้ว\""
51260-177 = "คุณครูจะบอกว่าให้มองไปข้างหน้าแทนที่จะคิดวกวนและจมอยู่กับความผิดพลาด... แบบนี้สินะคะ"
51260-178 = "อะฮะฮ่า ถ้าคุณครูพูดถึงขนาดนี้ ฉันก็เข้าใจแล้วค่ะ"
51260-179 = "ในเมื่อตอนนี้เรายืนยันการมีอยู่ของชมรมความงามของธรรมชาติได้แล้ว ถ้าจะติดตามร่องรอยของพวก#nเธอ ต่อไปฉันคงต้องดูบันทึกเก่าๆ ของชมรมหยินหยางและหาวิธีใหม่ดูแล้วละค่ะ"
51260-180 = "ฉันจะเก็บความคิดเห็นที่มีคุณค่าของคุณครูไว้ในใจไม่ลืม และจะพยายามอย่างเต็มที่เพื่อสนับสนุน#nชาเล่ต์ต่อไปค่ะ อะฮะฮ่า"
51260-181 = "[s] \"อ้อ จริงสิ ครูยังไม่ได้รับการตอบแทนเลย\""
51260-182 = "...การตอบแทนเหรอคะ?"
51260-183 = "อ่า นั่นสินะ..."
51260-184 = "ครั้งนี้เราก็ได้รับความช่วยเหลือมากมายจากชาเล่ต์ งั้นก็ต้องเตรียมค่าตอบแทนที่สมน้ำสมเนื้อให้..."
51260-188 = "คะ? การตอบแทนที่คุณครูพูดถึงไม่ใช่อะไรอย่างนั้นหรอกเหรอคะ?"
51260-189 = "ลูบหัวแมวเหมียวชิเซะ...? คะ? เอ่อ พูดเรื่องอะไรคะ..."
51260-190 = "[s] \"แต่ชิเซะก็ยุ่งอยู่กับงานของชมรมหยินหยาง\""
51260-193 = "[ns] \"งั้นครูจะลูบหัวนิยะแทนแล้วกัน!\""
51260-197 = "คะ? เดี๋ยวก่อน คุณครู เรื่องนั้นฉันล้อเล่นต่างหาก"
51260-198 = "คะ... คือว่า..."
51260-203 = "เดี๋ยวสิคะ! คุณครู... ทำหน้าทำตาน่ากลัวแบบนั้น..."
51260-209 = "อ๊ายยย?!"
51260-214 = "(ร่องรอยของเหตุการณ์ที่เกิดขึ้นยังคงชัดเจนอยู่ทุกที่)"
51260-215 = "(ทั้งของปีศาจลึกลับที่ปรากฏตัวเมื่อเริ่มงานเทศกาล และการโจมตีที่เกิดขึ้นหลังจากนั้น)"
51260-218 = "(แต่ถึงอย่างนั้น... เทศกาลก็ไม่ได้ล่มสลาย พังทลาย หรือสิ้นสุดลง)"
51260-222 = "อ๊ะ คุณครู เข้ามาสิ"
51260-223 = "ฉันกำลังรออยู่เลย มาตรงเวลาเลยนะ"
51260-225 = "...สวัสดี"
51260-226 = "[s] \"อื้ม วันนี้เป็นวันที่ต้องลาดตระเวนในฐานะเฮียกกะเรียวรันใช่ไหม?\""
51260-228 = "ใช่ จะบอกว่านี่คือภารกิจแรกของเฮียกกะเรียวรันที่เกิดขึ้นใหม่เลยก็ได้!"
51260-229 = "เราได้อยู่ในช่วงเวลาประวัติศาสตร์ด้วยกันเลยนะ คุณครูก็ต้องดีใจเข้าไว้ล่ะ!"
51260-230 = "ต่อไปต้องทำอีกเป็นร้อยๆ ภารกิจเลย เรนเกะนี่สดชื่นสุดๆ ไปเลยเนอะ"
51260-234 = "ว่าไงนะ?!"
51260-235 = "[s] \"เดี๋ยวก่อน ทั้งคู่อย่าเพิ่งทะเลาะกัน...\""
51260-236 = "ถ้าจะเที่ยวเทศกาลอีกเป็นร้อยครั้ง... จะเอาเงินที่ไหนมาเที่ยวนะ...?"
51260-237 = "[s] \"กังวลเรื่องนั้นหรอกเหรอ?!\""
51260-238 = "นี่ คุณครูไม่รู้อะไรซะแล้ว! งานเทศกาลของเฮียกคิยาโคน่ะทำกระเป๋าฉีกไม่ใช่เล่นๆ เลยนะ!"
51260-239 = "โดยเฉพาะงานที่หัวหน้าชมรมเทศกาลคนนั้นจัด มันเต็มไปด้วยหลุมพรางที่ทำให้เราต้องควักเงินออก#nมาเลยละ!"
51260-241 = "อ่า... อืม ก็ใช่"

[translation]
51260-1 = "第26話;帶著願望"
51260-2 = "（讓百鬼夜行陷入混亂的情況已暫時告一段落）"
51260-5 = "這裡！麻煩幫我把材料拿過來！"
51260-6 = "剛才說要錘子的是誰？"
51260-10 = "啊，請拿來這裡！"
51260-13 = "好的！申請書請來這裡填寫！"
51260-14 = "需要器材的人請到這裡填寫申請書！"
51260-15 = "時間還很充裕，請大家遵守順序，不必慌張～！"
51260-16 = "[s]「大家一早就開始忙碌了呢，真是辛苦你們了。」"
51260-20 = "啊，老師！"
51260-21 = "歡迎你來！老師！"
51260-23 = "呵呵！為了重新舉辦慶典，我們節慶營運管理部的大家都正全力以赴！"
51260-24 = "[s1]「嗯嗯，確實忙得暈頭轉向呢。」\n[s2]「可是確定會重新舉辦慶典了吧？」"
51260-27 = "是的，畢竟那是沒人預想過的狀況…… "
51260-28 = "因此有幸獲得許多人的諒解，得以讓慶典重新舉行。"
51260-29 = "唔……不過即便如此，我們節慶營運管理部居然在最重要的時候全員暈倒在地……"
51260-30 = "真是太悔恨了，無法原諒！！！"
51260-32 = "就是說啊！如果沒發生那種事，我們節慶營運管理部也會全力奮戰的！"
51260-33 = "沒錯！那種事才不能算是慶典呢！"
51260-34 = "[s]「就算沒發生那種事，我也知道大家都很努力哦。」"
51260-36 = "謝謝老師……"
51260-37 = "但是老師和百鬼夜行的各位替我們收拾慶典這件事，我還是覺得有點責任與愧疚。"
51260-38 = "所以我們節慶營運管理部，就算是為了報答老師也一定要讓慶典重新舉辦！"
51260-39 = "……也算是紀念百花繚亂的事順利解決。"
51260-41 = "是！部長說的沒錯！"
51260-42 = "雖然設施遭到破壞，慶典會場亂成一團……也不代表慶典就結束了！"
51260-44 = "嗯，把壞掉的地方修好，把倒下的東西重新立起來就行了。"
51260-45 = "對吧？老師！"
51260-46 = "[s]「嗯，靜子說的對。」"
51260-47 = "耶嘿嘿。"
51260-51 = "好！那麼節慶營運管理部再努力加把勁，出動吧！"
51260-54 = "哦──！"
51260-56 = "對了，老師。"
51260-64 = "這次真的辛苦你了。"
51260-65 = "[s]「……不用客氣。」"
51260-89 = "（雖然曾遭大火席捲，這裡依然有很多人忙碌地奔波著）"
51260-90 = "（修復損壞的街道、重建崩毀的家園……#n　為了取回原本的日常，大家都堅強地努力著）"
51260-93 = "（接著……）"
51260-99 = "[ns]「你好，我是夏萊的老師。」"
51260-106 = "歡迎您，老師。"
51260-107 = "聽見如此突然的請求，老師卻還是願意爽快地來到陰陽部，實在是感激不盡。"
51260-108 = "[s]「因為是仁耶找我，所以我就拋下一切跑來了。」"
51260-109 = "喵哈。您這麼說真是讓我感到受寵若驚呢～"
51260-110 = "今天請老師過來不為別的……"
51260-111 = "是為了向老師報告不久前發生的那起「事件」的後續。"
51260-112 = "首先，我想告訴老師關於百花繚亂的事～"
51260-116 = "解散命令決定暫時保留♪"
51260-117 = "[s]「保留？不是取消嗎？」"
51260-118 = "是的。本次圍繞紫同學發生的騷動……#n能讓主要成員再次重聚的確相當令人欣慰沒錯～"
51260-119 = "不過一般成員的接連退出仍舊是個危及社團存亡的危機。#n如果不解決核心問題的話，日後百花繚亂依然會面臨很大的考驗～"
51260-120 = "[s]「你說的考驗，具體來說是指……？」"
51260-121 = "具體來說……像是沒有社團經費之類的～？"
51260-122 = "[s]「那確實是很大的考驗！」"
51260-123 = "喵哈哈～但以現在的情況來看……"
51260-124 = "雖然得花費一些時間，相信他們遲早能排除萬難重新站起來吧。"
51260-125 = "如此一來，和葛葉有關的線索應該也……"
51260-126 = "[s]「那件事不必放在心上。慢慢進行就可以了。」"
51260-127 = "……是嗎？"
51260-128 = "總之，靜子同學他們正持續進行修復作業……#n當事者自不用說，商會也同樣卯足了幹勁，短期內似乎就能重新舉辦慶典了。"
51260-129 = "此外……"
51260-130 = "還有一件較為嚴肅的事要向您報告。"
51260-131 = "我就開門見山地說了──#n與老師和百花繚亂正面交鋒到最後的，那位花鳥風月部的學生……"
51260-132 = "是叫箭吹棕櫚……對吧。"
51260-136 = "為了追捕在事件之後下落不明的他，我調動了陰陽部展開調查。"
51260-137 = "……只可惜在離開百鬼夜行自治區時追丟了。"
51260-138 = "不知道他究竟利用了什麼手段，一離開自治區邊界就消失得無影無蹤。"
51260-139 = "就像施展了某種幻術一樣。"
51260-140 = "[s]「嗯……果然不會那麼容易束手就擒吧。」"
51260-143 = "[ns]「不過還是辛苦你了，仁耶。現在就先專注在慶典會場的……」"
51260-144 = "……都是我的錯。"
51260-145 = "[s] 「嗯？」"
51260-146 = "是我想得太簡單了。"
51260-147 = "來自花鳥風月部的警告……我不該那麼輕易就無視它的。#n結果害事情鬧得這麼大。"
51260-148 = "……因為我的判斷錯誤，讓百鬼夜行留下了巨大的傷痕。"
51260-149 = "不只老師，我無顏面對百鬼夜行的所有人……"
51260-150 = "[s]「不，不是那樣的。」"
51260-154 = "……咦？"
51260-155 = "[s3]「仁耶你曾經說過。」\n[s4]「花鳥風月部只是個傳聞，本來就不值得多想。」"
51260-158 = "[ns5]「如果連單純的傳聞或怪談都要列入考量，那根本什麼事都無法完成。」\n[ns6]「仁耶是調查過情報的合理性才做出判斷的，不是嗎？」"
51260-159 = "但是……"
51260-160 = "但是……"
51260-163 = "[ns7]「而且你最終還是把我叫到了百鬼夜行。」\n[ns8]「這也是出於你擔心學生的心情吧？」"
51260-166 = "[ns9]「多虧有你，我才能夠及時趕上。」\n[ns10]「我反而對仁耶的小心謹慎感到很自豪哦。」"
51260-171 = "老師……"
51260-172 = "明明發生了這種事，老師卻還說我很努力…… "
51260-173 = "而且還以我為榮嗎？"
51260-174 = "[s11]「在需要時給予稱讚──」\n[s12]「在犯錯時給予鼓勵，這就是老師該做的事。」"
51260-177 = "與其糾結於過去的錯誤，不如抬頭往前看……老師您是這個意思啊。"
51260-178 = "喵哈。既然您都這麼說了……我明白了。"
51260-179 = "如今既然已經確定花鳥風月部確實存在，為了日後能進一步追蹤他們的下落，#n我認為有必要查詢陰陽部的舊記錄並尋找新的方法。"
51260-180 = "我會虛心接納老師的高見，今後全力支持夏萊。喵哈哈！"
51260-181 = "[s]「啊，順帶一提，我還沒拿到報酬。」"
51260-182 = "……您說報酬嗎？"
51260-183 = "啊，當然……"
51260-184 = "本次事件受到夏萊很大的幫助，提供相應的報酬也是理所當然的……"
51260-188 = "什麼？老師說的報酬不是這個意思？"
51260-189 = "想摸摸知世喵……？#n咦？那個，我不理解老師您的意思……"
51260-190 = "[s]「不過知世正忙著處理陰陽部的工作……」"
51260-193 = "[ns]「所以就改來摸摸仁耶吧！」"
51260-197 = "哎呀……老師，我當時其實只是在開玩笑而已……"
51260-198 = "那個，我……"
51260-203 = "等一下老師，您的表情好恐怖……！？"
51260-209 = "呀啊啊！？"
51260-214 = "（在慶典開始之際出現的奇特怪物，以及它們所展開的襲擊）"
51260-215 = "（那起事件……確實在各處都留下鮮明的痕跡）"
51260-218 = "（但是……即便如此，慶典並沒有失敗也沒有搞砸，更沒有結束）"
51260-222 = "啊，老師，歡迎！"
51260-223 = "我們都在等你。來的真準時啊。"
51260-225 = "……老師好。"
51260-226 = "[s]「嗯，今天是久違地以百花繚亂的身分進行巡邏對吧？」"
51260-228 = "沒錯，這是新生百花繚亂的第一個里程碑般的任務！"
51260-229 = "老師也一起經歷了這歷史性的一刻，應該更開心一點才對！"
51260-230 = "將來明明還會持續數十、數百次……你還真興奮呢，蓮華。"
51260-234 = "什麼！？"
51260-235 = "[s]「等等，你們兩個都冷靜點……」"
51260-236 = "如果參加慶典數百次……零用錢怎麼辦……？"
51260-237 = "[s]「你擔心的是那個嗎！？」"
51260-238 = "不不不，這很重要好嗎！？老師！#n百鬼夜行的慶典真的超級可怕！"
51260-239 = "尤其是那個節慶營運管理部長主辦的慶典……#n放眼望去全是覬覦錢包的陷阱，實在太險惡了！"
51260-241 = "啊……說的也是。"
51260-242 = "[s]「但你好像一臉無所謂的樣子……！話說紫呢……？」"
51260-244 = "啊，紫他……"
51260-249 = "勘解由小路紫！登場！"
51260-251 = "啊，紫！你來啦！"
51260-252 = "……嗨，紫。"
51260-253 = "家事順利解決了嗎？"
51260-255 = "是，我今天上午已經到家裡告訴各位僕人了。"
51260-256 = "[s]「家事？告訴僕人？什麼意思……」"
51260-257 = "小女子做出了宣言！"
51260-258 = "我不當巫女了！"
51260-260 = "哦～真爽快啊。"
51260-261 = "真的……沒關係嗎？"
51260-262 = "……是不是太意氣用事了？"
51260-263 = "喂，你們兩個怎麼還在說那種話啊？#n這種時候應該要尊重紫的決定才對！"
51260-264 = "但是……"
51260-266 = "這並不是意氣用事。#n小女子想了又想，考慮了無數次……但結論卻始終如一。"
51260-267 = "小女子喜歡百花繚亂。#n所以今後也想以百花繚亂的身分繼續努力。"
51260-272 = "……這樣啊。"
51260-274 = "僕人們也認為既然我心意已決也別無他法，選擇接受小女子的決定。"
51260-275 = "[s] 「嗯，那真是太好了。」"
51260-276 = "沒錯！所以從今天開始，百花繚亂將正式復活！紫的傳說也即將開始！"
51260-280 = "所以我們就別愣在這裡，趕快出發吧！前輩們！老師！"
51260-281 = "[s]「嗯？要去哪裡？」"
51260-283 = "啊，是這樣的。"
51260-284 = "在進行巡查任務之前，紫說要先讓百花繚亂的成員進行這次慶典中最大的活動。"
51260-285 = "也就是送舊迎新的放水燈。"
51260-286 = "[s]「原來是指燈籠祭的活動啊。」"
51260-288 = "沒錯，我們一起出發吧！"
51260-293 = "（曾一度中止的慶典即將再次開始）"
51260-303 = "（把損壞的地方修好，重新出發就行了）"
51260-304 = "（眼前的四個女孩，漸漸邁出了緩慢而確實的步伐）"
51260-317 = "雖然右手依舊如此……"
51260-318 = "不過菖蒲，我會和這些孩子一起──"
51260-325 = "（送走懷抱各自心願的燈火）"
51260-326 = "（描繪彼此內心的心願，以及期許的未來）"
51260-327 = "（帶著所有人心願的燈火將隨著流水──）"
51260-328 = "（──永遠漂流下去）"
51260-343 = "嗚哇啊啊啊～～～雛罌粟大人～～～"
51260-349 = "棕櫚，你回來啦。"
51260-350 = "我……都已經那麼努力！那麼拚命加油了……！"
51260-351 = "結果卻做不出百物語………！"
51260-352 = "真的很對不起～～！！！"
51260-353 = "明明雛罌粟大人那麼期待的說……！"
51260-354 = "呵呵，真是可愛的傢伙……"
51260-355 = "無妨，那件事你別在意。"
51260-356 = "就算沒能做出百物語……你也成功「重現20年前的慶典」了。"
51260-358 = "嗚嗚……真的那樣就可以了嗎？"
51260-359 = "那當然……"
51260-360 = "完成的慶典本身將擁有意義，成為孕育其他故事的種子。"
51260-361 = "既然如此，那就已經足夠了。"
51260-363 = "只要下次再完成就行了。"
51260-367 = "沒錯……一步一步共同完成吧。"
51260-368 = "那燃燒世界──屬於我們的「故事」。"
51260-373 = "[log=코쿠리코][ff4444]「只屬於我們的『百物語』。」[-][/log]"
51260-378 = "百花繚亂篇;To be Continued in Chapter 2"

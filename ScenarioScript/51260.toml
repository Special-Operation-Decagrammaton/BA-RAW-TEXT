51260-119 = "3;니야;00;냐하. 아무래도 일반부원들의 연이은 탈퇴로 존폐 위기까지 갔던 만큼, 그 핵심 문제를 해결하지 않는다면 앞으로도 백화요란에겐 커다란 시련이 계속될 테니까요~"
51260-120 = "[s] \"커다란 시련이라면 구체적으로는……?\""
51260-121 = "3;니야;07;구체적으로는 동아리 활동비가 안 나온다거나~?\n#3;em;…"
51260-122 = "[s] \"확실히 커다란 시련이네! 그건!\""
51260-123 = "3;니야;00;냐하하~ 그래도 지금 추세라면……\n#3;em;[재잘]\n#3;m3"
51260-124 = "3;니야;01;네, 시간은 조금 걸리겠지만, 조만간 훌훌 털어버리고 다시 일어설 수 있겠지요."

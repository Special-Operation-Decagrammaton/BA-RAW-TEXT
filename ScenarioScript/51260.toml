51260-29 = "3;시즈코;06;으으윽…… 그렇다고는 해도 사태가 벌어지는 동안, 저희 마츠리부 전원이 기절한 채로 쓰러져 아무것도 하지 못했다니……\n#3;em;[속상함]\n#3;stiff"

[translation]
51260-1 = "Episode 26;Carrying Wishes"
51260-2 = "And, at long last, this chapter of Hyakkiyako came to an end."
51260-5 = "We need more boards and nails here!"
51260-6 = "Didn't someone ask for a hammer earlier?"
51260-10 = "Yes! Here please!"
51260-13 = "Requisition forms can be turned in here!"
51260-14 = "Remember, you need to fill out a form if you need equipment!"
51260-15 = "Please form a single-file line!"
51260-16 = "[s] \"Too much energy. Even mornings are scared of them...\""
51260-20 = "Sensei! Sensei!"
51260-21 = "Welcome, Sensei!"
51260-23 = "The Festival Department is working hard to repair everything in time for the second festival!"
51260-24 = "[s1] \"There must be a lot to get fixed up.\"\n[s2] \"You're redoing the festival?\""
51260-27 = "Yes! It was unfortunate what happened... "
51260-28 = "But after some discussion and a lot of help, it was decided that the festival should still continue! "
51260-29 = "I'm so ashamed though... I can't believe we were all unconscious during the chaos..."
51260-30 = "I'll never forgive those ghosts!"
51260-32 = "I feel the same way! I wanted to fight alongside everyone else."
51260-33 = "Exactly! It's unforgivable to ruin a festival!"
51260-34 = "[s] \"Well, all of you worked very hard.\""
51260-36 = "Thank you..."
51260-37 = "We're still frustrated that we weren't able to do anything. So, thank you for keeping everyone safe during the incident."
51260-38 = "And the Festival Operations Department is going to thank everyone by making the best second festival anyone's ever seen!"
51260-39 = "People need a reason to celebrate after what happened..."
51260-41 = "Right as always, President!"
51260-42 = "Buildings were burned down, props destroyed, and food wasted, but that doesn't mean the festival is over!"
51260-44 = "With a little bit of effort, anything that's broken can be fixed."
51260-45 = "Isn't that right, Sensei?"
51260-46 = "[s] \"That's right, Shizuko.\""
51260-47 = "Heeheehee!"
51260-51 = "Okay! We have a lot to do, Festival Department members!"
51260-54 = "Let's get it done!"
51260-56 = "Oh, Sensei."
51260-64 = "Thank you, as usual, for all that you do."
51260-65 = "[s] \"It really wasn't much.\""
51260-89 = "People were hard at work cleaning up after the fires."
51260-90 = "They're rebuilding from the ashes of the conflict...working hard to bring back the place of their precious memories."
51260-93 = "And..."
51260-99 = "[ns] \"Yes, hello?\""
51260-106 = "Welcome, Sensei."
51260-107 = "I called you here rather suddenly. Thank you for coming."
51260-108 = "[s] \"If Niya calls, I'll always come running.\""
51260-109 = "Nyahaha. I'll hold you to that."
51260-110 = "To our agenda."
51260-111 = "I wanted to give you a report on the aftermath of the incident."
51260-112 = "To start with, the Hyakkaryouran."
51260-116 = "Their dissolution is on hold for the moment."
51260-117 = "[s] \"On hold? Not cancelled entirely?\""
51260-118 = "Unfortunately, yes. As you well know, the core executive members did return to the Hyakkaryouran."
51260-119 = "But a huge reason of the club's downfall was the mass-exodus of members after Nagusa disappeared. That's not going to be fixed overnight."
51260-120 = "[s] \"What will happen if it isn't fixed?\""
51260-121 = "Well, they won't be able to receive any funding, for one thing."
51260-122 = "[s] \"That's a rather devastating problem.\""
51260-123 = "Nyahaha! I know, right?"
51260-124 = "They'll get right back on track though, given some time."
51260-125 = "I also wanted to talk to you about Kuzunoha."
51260-126 = "[s] \"Another time. Let's take things step by step.\""
51260-127 = "If that's how you feel..."
51260-128 = "What else... Shizuko is heading the restoration projects, while also seeing to putting the festival back together."
51260-129 = "Ah. One last thing."
51260-130 = "On a more serious note..."
51260-131 = "That Nature's Beauty member whom Sensei and the Hyakkaryouran members fought..."
51260-132 = "Yabuki Shuro. "
51260-136 = "The Yin-Yang Club did our best to track her after she escaped."
51260-137 = "But we lost her right at the border of the Hyakkiyako District."
51260-138 = "We're still scratching our heads over it. She just disappeared into thin air."
51260-139 = "It felt like she cast a spell over us."
51260-140 = "[s] \"She didn't seem like the type to come quietly.\""
51260-143 = "[ns] \"You did great, Niya. You should just focus on the festival for now.\""
51260-144 = "...This is all my doing."
51260-145 = "[s] \"Hm?\""
51260-146 = "I was complacent, overly confident even."
51260-147 = "If I had taken the original letter more seriously, none of this would've happened."
51260-148 = "I took it as a joke, and all of Hyakkiyako suffered because of that."
51260-149 = "It's hard for me to face the other students...and you."
51260-150 = "[s] \"Well, you should hold your chin up high.\""
51260-154 = "...What?"
51260-155 = "[s3] \"Niya, weren't you the one who said it?\"\n[s4] \"That Nature's Beauty was a rumor of a rumor.\""
51260-158 = "[ns5] \"You can't chase down every rumor or whisper you hear.\"\n[ns6] \"You made a good decision based off of the information available to you.\""
51260-159 = "If I had been more careful..."
51260-160 = "It doesn't feel that way..."
51260-163 = "[ns7] \"And you didn't ignore it. You called me.\"\n[ns8] \"You did what you could to protect the students.\""
51260-166 = "[ns9] \"I wouldn't have made it in time without you.\"\n[ns10] \"I'm very proud of you for that, Niya.\""
51260-171 = "Sensei..."
51260-172 = "This entire festival was a debacle. "
51260-173 = "Why are you...proud of me right now?"
51260-174 = "[s11] \"It's my responsibility to compliment a job well done.\"\n[s12] \"Or to encourage students when they do make mistakes.\""
51260-177 = "Nyaha. I suppose you're right."
51260-178 = "I can't spend forever wondering what I could have done differently or wishing I could change the past."
51260-179 = "I'll need to do more research into Nature's Beauty, now that I'm aware of its existence. I'll do everything I can."
51260-180 = "The next time Schale needs some help, you can call. I'll coming running. Nyahaha!"
51260-181 = "[s] \"One last thing. My compensation?\""
51260-182 = "...Compensation?"
51260-183 = "Oh, my apologies. Of course."
51260-184 = "I can look at the numbers. We wouldn't have gotten through this without you, so a large..."
51260-188 = "...Hm? You want a different kind of compensation?"
51260-189 = "...You wanted to pet Chise? Wh-What's that supposed to..."
51260-190 = "[s] \"But since Chise is busy with Yin-Yang Club activities...\""
51260-193 = "[ns] \"I'll pet Niya instead!\""
51260-197 = "Sensei... You're just kidding, right?"
51260-198 = "U-Um..."
51260-203 = "W-W-Wait! You were serious?! Sensei!"
51260-209 = "Ahhhh?!"
51260-214 = "Everyone suffered hardships during the festival meant to celebrate Hyakkiyako."
51260-215 = "The scars of the incident will always be etched into the landmarks and the students' hearts."
51260-218 = "But Hyakkiyako is not one to let monsters stop them from holding a festival."
51260-222 = "You made it, Sensei! "
51260-223 = "You kept us waiting."
51260-225 = "...Hello."
51260-226 = "[s] \"Hi, everyone! Are you on patrol?\""
51260-228 = "Yup! It's the new and improved Hyakkaryouran's first mission!"
51260-229 = "This is a historical moment, Sensei. You better never forget it!"
51260-230 = "It's a routine patrol we'll do a thousand more times."
51260-234 = "What?!"
51260-235 = "[s] \"Now, now. Let's talk it out.\""
51260-236 = "How am I supposed to afford it if they keep redoing the festival?"
51260-237 = "[s] \"Money was the problem?!\""
51260-238 = "Don't dismiss the seriousness of this issue, Sensei! "
51260-239 = "The Festival Department president is one scary lady. She'll do anything to squeeze every last drop out of your wallet at these festivals!"
51260-241 = "...Just don't fall for it."
51260-242 = "[s] \"I don't think Kikyou cares either way... But where's Yukari?\""
51260-244 = "Oh, she's..."
51260-249 = "Here! I, Yukari, am right here!"
51260-251 = "You made it back safely!"
51260-252 = "...Yukari."
51260-253 = "Was your mission successful?"
51260-255 = "Absolutely! I marched up those mansion steps and told the family exactly how I felt!"
51260-256 = "[s] \"Family? What happened?\""
51260-257 = "I visited the Kadenokoujis this morning!"
51260-258 = "I told them that they can't force me to be a miko anymore!"
51260-260 = "A strong approach. I like it."
51260-261 = "Is that...truly okay?"
51260-262 = "...It's in her character to act recklessly."
51260-263 = "Hey! You two! This is when you shut it and tell Yukari, \"Whatever you want!\""
51260-264 = "But..."
51260-266 = "I didn't rush anything! I really, truly mulled it over. I even made a pros and cons list."
51260-267 = "It was an easy choice, in the end. The Hyakkaryouran is where I belong!"
51260-272 = "...Yes. It is."
51260-274 = "And guess what? They threw their hands up in the air and said there's nothing they can do if I'm so determined!"
51260-275 = "[s] \"Good for you.\""
51260-276 = "Thank you, Sensei! Let today be the first official day of the new Hyakkaryouran. And the first official day of creating the legend of Yukari of the Hyakkaryouran."
51260-280 = "With business out of the way, let's get going!"
51260-281 = "[s] \"Go? Go where?\""
51260-283 = "Oh, we didn't tell you."
51260-284 = "Yukari requested our presence at a festival event before we begin patrols."
51260-285 = "We're going to send lanterns into the sky to signify our new beginning."
51260-286 = "[s] \"Ah! The festival's main event!\""
51260-288 = "Exactly! Hurry, everyone!"
51260-293 = "The festival began again in full earnest."
51260-303 = "It was proof to the students of Hyakkiyako that anything can be fixed with a little effort."
51260-304 = "And the four students who released their lanterns into the sky were marching steadily forward towards their goals."
51260-317 = "My right arm may never completely heal."
51260-318 = "But it's okay now, Ayame. With the new Hyakkaryouran, I—"
51260-325 = "Each student sent their heartfelt wishes into the sky."
51260-326 = "The lanterns carried the feelings buried in their hearts."
51260-327 = "Their hopes for the future shined high above them."
51260-328 = "Forever and ever."
51260-343 = "Waaah! Kokuriko! Waaaaaaahhh!"
51260-349 = "Welcome back, Shuro."
51260-350 = "I...I really, really tried my best! I did everything right!"
51260-351 = "But I couldn't make a new Phantom Fable for you! My ghost story didn't go the way I planned it!"
51260-352 = "I'm sorry!!! "
51260-353 = "I wanted to bring you home the perfect ghost!"
51260-354 = "Heehee. Shuro is always so cute."
51260-355 = "Dry your tears, little one."
51260-356 = "You may have failed in one way, but you successfully recreated the Lantern Festival of the past."
51260-358 = "*sniff* Did...Did I do good enough?"
51260-359 = "Of course..."
51260-360 = "The festival was completed. Its seeds are planted, and another story will bloom."
51260-361 = "It's more than enough."
51260-363 = "And next time, we'll get to write the ending the way we want."
51260-367 = "Be patient, and bide your time. Step by step, together."
51260-368 = "We will create an elegance that will burn down the world."
51260-373 = "[log=코쿠리코][ff4444]A hundred ghost stories of our very own.[-][/log]"
51260-378 = "Hyakkaryouran;To be Continued in Chapter 2"

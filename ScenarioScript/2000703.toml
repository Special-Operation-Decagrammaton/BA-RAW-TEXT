[translation]
2000703-1 = "ความกังวลของนักร้องเสมือน"
2000703-5 = "ห้องรับรองในไลฟ์เฮาส์"
2000703-7 = "(คุณครูมาถึงที่ห้องรับรองด้านหลังของไลฟ์เฮาส์ตามเวลาที่นัดไว้ และเห็นมิกุกำลังพูดคุย#nกับใครบางคนอยู่)"
2000703-11 = "อะไรนะ?! ร้องเพลงไม่ได้งั้นเหรอ?"
2000703-12 = "ค่ะ ฉันไม่รู้ว่าเพราะอะไร แต่จู่ๆ มันก็..."
2000703-13 = "ทำไมไม่บอกผมก่อนหน้านี้ล่ะ เกิดเรื่องอะไรขึ้นงั้นเหรอ?"
2000703-14 = "หลังจากได้รับร่างกายมา พอฉันพยายามจะร้องเพลงก็เปล่งเสียงไม่ออกเลยค่ะ"
2000703-15 = "ฮึ่ม... เจ้าพวกวิศวกรขี้โม้ ไหนอวดนักอวดหนาว่าร่างกายของมิกุจะไม่มีปัญหาอะไร"
2000703-16 = "คอนเสิร์ตของนักร้องเสมือนที่ร้องเพลงไม่ได้งั้นเหรอ? เฮอะ เหตุการณ์แบบนี้มันหายนะชัดๆ"
2000703-17 = "คือ... มีวิธีที่จะยกเลิกคอนเสิร์ตตอนนี้บ้างไหมคะ..."
2000703-18 = "แบบนั้นก็แย่น่ะสิ! ถ้าทำแบบนั้นจะต้องจ่ายค่าปรับมหาศาลเลยนะ"
2000703-19 = "แถมตอนนี้ก็เริ่มโปรโมตไปแล้วด้วย ไหนจะค่าเช่าไลฟ์เฮาส์ ค่าวิศวกรที่สร้างร่างกายใหม่ขึ้นมา..."
2000703-20 = "ถ้ายกเลิกคอนเสิร์ตตอนนี้ พวกเราต้องแบกรับค่าใช้จ่ายพวกนั้นทั้งหมดเลยนะ..."
2000703-21 = "เพราะงั้นคงยกเลิกคอนเสิร์ตไม่ได้หรอก เธอเองก็รีบไปหาวิธีที่ทำให้ร้องเพลงได้เร็วๆ เถอะ!"
2000703-22 = "ค่ะ..."
2000703-27 = "เฮ้อ..."
2000703-28 = "[s] \"ดูเหมือนกำลังลำบากอยู่เลยนะ\""
2000703-30 = "อ๊ะ คุณครู มาแล้วเหรอคะ"
2000703-31 = "ไทม์มิ่งแย่จริงๆ ให้คุณครูเห็นเรื่องน่าอายเข้าซะแล้ว"
2000703-32 = "[s] \"คนเมื่อกี้คือผู้จัดคอนเสิร์ตเหรอ?\""
2000703-33 = "ค่ะ... เป็นผู้ดูแลระดับสูงที่รับผิดชอบงานไลฟ์คอนเสิร์ตครั้งนี้ค่ะ"
2000703-34 = "ฉันคิดจะปิดเรื่องที่ฉันร้องเพลงไม่ได้จนกว่าจะหาวิธีแก้ไขได้แล้วแท้ๆ..."
2000703-35 = "แต่ก็ถูกจับได้จนได้ค่ะ"
2000703-36 = "เพราะงั้นฉันเลยไปถามวิธีเผื่อจะยกเลิกคอนเสิร์ตในตอนนี้ได้ แต่ดูจากกำหนดการแล้วคงเลื่อนหรือยกเลิกไม่ได้ค่ะ"
2000703-37 = "[s] \"ทางผู้ใหญ่เขาก็มีเหตุผลอยู่หลายๆ อย่างสินะ\""
2000703-38 = "ใช่แล้วค่ะ สุดท้ายแล้วมันก็คือความรับผิดชอบของฉันค่ะ"
2000703-39 = "อีกอย่างถ้ายกเลิกคอนเสิร์ตตอนนี้ คงเสียมารยาทกับแฟนๆ ที่รอฟังเพลงของฉันด้วย...#nคิดแล้วว่าคงยกเลิกคอนเสิร์ตไม่ได้จริงๆ ค่ะ"
2000703-40 = "[s1] \"ไม่ต้องห่วงนะ\"\n[s2] \"เดี๋ยวเธอก็ร้องเพลงได้แล้วล่ะ\""
2000703-41 = "ขอบคุณที่ให้กำลังใจฉันนะคะ"
2000703-42 = "ขอบคุณที่ให้กำลังใจฉันนะคะ"
2000703-43 = "แต่ว่าคุณครู... เจอวิธีที่จะทำให้ฉันร้องเพลงได้แล้วเหรอคะ?"
2000703-44 = "[s] \"ครูเตรียมมาหลายวิธีเลยนะ\""
2000703-51 = "นี่มัน... ต้นหอมใหญ่?"
2000703-52 = "ตอนที่คัดจมูกหรือหวัดลงคอ ถ้าคาดต้นหอมใหญ่ไว้ที่คอจะช่วยให้เสียงกลับมาได้งั้นเหรอคะ?"
2000703-53 = "ถึงฉันจะไม่เคยได้ยินเรื่องนี้มาก่อนแต่ว่า..."
2000703-54 = "วิธีการรักษาแบบนี้จะได้ผลกับนักร้องเสมือนอย่างฉันด้วยเหรอคะ?"
2000703-55 = "[s] \"ลองดูก่อนดีกว่า\""
2000703-59 = "ค่ะ ยังไงตอนนี้ก็ไม่ใช่เวลาที่จะมานั่งเลือกมากได้นี่นา..."
2000703-66 = "อืม... พอเอาต้นหอมใหญ่มาคาดไว้รอบคอแบบนี้แล้วก็รู้สึกเริ่มร้อนๆ ที่คอแล้วค่ะ"
2000703-67 = "อาจได้ผลก็ได้นะคะ"
2000703-68 = "เอาล่ะค่ะ! งั้นมิกุจะลองร้องเพลงดูนะคะ!"
2000703-74 = "ร้องไม่ได้ค่ะ..."
2000703-75 = "ว่าแล้วเชียวว่าต้นหอมใหญ่คงไม่ได้ผลกับนักร้องเสมือนอย่างฉันจริงๆ ด้วย แต่ฉันไม่โทษคุณต้นหอมหรอกนะคะ"
2000703-76 = "[s3] \"ยังเร็วไปที่จะผิดหวัง...\"\n[s4] \"คราวนี้... ต้องเจอนี่!\""
2000703-85 = "นั่นมัน...เครื่องดื่มชูกำลังเหรอคะ?"
2000703-86 = "มีตรานกอ้วนหน้าตาประหลาดติดอยู่บนกระป๋องด้วย... "
2000703-87 = "[s5] \"เครื่องดื่มชูกำลังที่ฮิตในหมู่นักเรียนบางกลุ่มเลยนะ\"\n[s6] \"พอดื่มแล้วจะได้รับพลังแห่งปีกเหมือนกับท่านเพโรโร่เลยล่ะ\""
2000703-88 = "อืม... ฉันเชื่อคุณครูนะคะ แต่ว่าดีไซน์มันดูไม่เหมือนเครื่องดื่มชูกำลังเลยค่ะ"
2000703-89 = "อืม... ฉันเชื่อคุณครูนะคะ แต่ว่าดีไซน์มันดูไม่เหมือนเครื่องดื่มชูกำลังเลยค่ะ"
2000703-90 = "ถ้าดื่มเครื่องดื่มชูกำลังนี่แล้วคออาจจะพังกว่าเดิมล่ะคะ..."
2000703-91 = "แต่ว่าเครื่องดื่มชูกำลังนี่อาจจะช่วยให้เสียงกลับมาเหมือนเดิมได้จริงๆ ก็ได้..."
2000703-95 = "มิกุจะลองดูค่ะ!"
2000703-98 = "(...จากนั้นมิกุกับคุณครูก็ลองใช้วิธีรักษาต่างๆ ที่คุณครูเตรียมมา แต่สุดท้ายมิกุก็ยังร้องเพลง#nไม่ได้อยู่ดี...)"
2000703-100 = "ไม่ได้ผลเลยค่ะ"
2000703-101 = "[s] \"ไม่อยากเชื่อเลยว่าช็อกโกแลตมินต์สูตรลับก็ไม่ได้ผล...\""
2000703-102 = "เดี๋ยวสิคะ นี่มันแค่ไอติมธรรมดาๆ ไม่ใช่เหรอคะ?"
2000703-103 = "แถมยังเอาขนมหวานเยอะแยะมาเรียงให้ชิม ตอนนี้เลยดูเหมือนเป็นงานเลี้ยงน้ำชาไปแล้วเลย..."
2000703-104 = "แต่คิดอีกทีก็เป็นการเปลี่ยนบรรยากาศดีเหมือนกันนะคะ"
2000703-105 = "ช่วงนี้ฉันเอาแต่กังวลเกี่ยวกับเรื่องคอนเสิร์ตอย่างเดียว จนไม่มีเวลาคิดถึงเรื่องอื่นเลยค่ะ"
2000703-106 = "นานแค่ไหนแล้วที่ไม่ได้มานั่งสนุกเล่นไร้สาระแบบนี้..."
2000703-107 = "[s] \"เล่นไร้สาระเหรอ...\""
2000703-108 = "ฉะ...ฉันไม่ได้คิดจะทำร้ายจิตใจหรือบั่นทอนความตั้งใจของคุณครูนะคะ!"
2000703-109 = "แต่ฉันที่เกิดมาเพื่อร้องเพลง เลยยังไม่ชินกับเรื่องที่ว่าจะหัวเราะหรือมีความสุขกับเรื่องอื่นๆ#nนอกจากการร้องเพลงน่ะค่ะ "
2000703-110 = "ความรู้สึกสนุกสนานแบบนี้..."
2000703-111 = "[s] \"แค่มิกุสนุกก็พอแล้วล่ะ\""
2000703-112 = "งั้นเหรอคะ...?"
2000703-113 = "วันนี้ขอบคุณที่มาช่วยฉันนะคะคุณครู"
2000703-119 = "ถ้าเสียงของฉันกลับมาเร็วๆ ก็คงดีนะคะ"

[translation]
2000703-1 = "The Virtual Idol's Troubles"
2000703-5 = "Amphitheater Waiting Room"
2000703-7 = "(I found Miku talking with someone when I went to the amphitheater waiting room.)"
2000703-11 = "What do you mean you can't sing?!"
2000703-12 = "It's like I said. I have no idea why. I just...can't."
2000703-13 = "Why didn't you tell me sooner...? What happened?"
2000703-14 = "My singing voice just won't come out any time I try to sing with my new body for some reason."
2000703-15 = "Ugh. It must have been those blasted technicians. They assured me they were confident that your body wouldn't come with any abnormalities..."
2000703-16 = "We can't have a concert with an idol who can't sing. This is bad."
2000703-17 = "I don't suppose there's any way we could still postpone the show, is there?"
2000703-18 = "We can't do that! The penalty fee we would have to pay for canceling would be astronomical."
2000703-19 = "And that doesn't even take into account the investment we've already made. All the advertising, the rental fee for the amphitheater, plus the research and development costs for your new body."
2000703-20 = "We'd have no way to recoup all of those expenses if we were to cancel the performance."
2000703-21 = "There's no other option. You must find a way to recover your singing voice!"
2000703-22 = "Yes..."
2000703-27 = "*sigh*"
2000703-28 = "[s] \"Things aren't looking good.\""
2000703-30 = "Oh, Sensei. You're here."
2000703-31 = "I almost wish you weren't. I'm sorry you had to see that."
2000703-32 = "[s] \"Was that the stage planner?\""
2000703-33 = "Yes. He's one of the higher-ups who's taking responsibility for the live show."
2000703-34 = "I did everything I could to hide the fact that I couldn't sing until we could find a way out of this..."
2000703-35 = "...but the jig is up now."
2000703-36 = "It doesn't seem like there's any hope of postponing or canceling the show."
2000703-37 = "[s] \"A lot goes into these kinds of things.\""
2000703-38 = "That's true. I ultimately need to take responsibility."
2000703-39 = "Besides, I would be breaking a commitment I made to my fans who wanted to hear me sing if backed out now. I don't want to do that."
2000703-40 = "[s1] \"Don't worry too much.\"\n[s2] \"I'm sure you'll be able to sing soon.\""
2000703-41 = "Thank you for cheering me up."
2000703-42 = "Thank you for cheering me up."
2000703-43 = "Anyway, Sensei, were you able to find any way to restore my voice?"
2000703-44 = "[s] \"I brought something to get us started.\""
2000703-51 = "Is this...a leek?"
2000703-52 = "You heard that wrapping a leek around the neck of someone whose voice is hoarse due to cold can help them recover."
2000703-53 = "I've heard something like that too..."
2000703-54 = "...but would a folk remedy really work on me? I'm still just a virtual idol."
2000703-55 = "[s] \"Let's try it and see.\""
2000703-59 = "You're right. Beggars can't be choosers."
2000703-66 = "Hmm. My throat does feel warmer now that I have the leek wrapped around my neck."
2000703-67 = "Maybe this will work after all."
2000703-68 = "Okay! I'm going to try singing now!"
2000703-74 = "...It's not working."
2000703-75 = "Maybe it really is because I'm a virtual idol. I can't blame it on the leek—it's not its fault."
2000703-76 = "[s3] \"It's too early to give up.\"\n[s4] \"This time, let's try this!\""
2000703-85 = "Is this an energy drink?"
2000703-86 = "The label has a strange-looking bird on it."
2000703-87 = "[s5] \"It's really popular among some of the students.\"\n[s6] \"It gives you wings. You know, like Peroro.\""
2000703-88 = "Huh... It's not that I don't trust you, but this seems too good to be true. Just a simple energy drink?"
2000703-89 = "Huh... It's not that I don't trust you, but this seems too good to be true. Just a simple energy drink?"
2000703-90 = "What if it only makes my throat feel worse?"
2000703-91 = "Then again, if there's even the slightest chance that it will help me recover my voice..."
2000703-95 = "...then I'll do it!"
2000703-98 = "(We tried every single home remedy I brought, but Miku still wasn't able to sing again.)"
2000703-100 = "That didn't work either."
2000703-101 = "[s] \"I thought mint chocolate chip would work for sure...\""
2000703-102 = "Wasn't it just regular old ice cream though?"
2000703-103 = "And the one before that with the snack cakes made me feel like I was at a tea party."
2000703-104 = "We haven't made any progress, but I can honestly say I'm having a lot of fun."
2000703-105 = "I've been so worried about the upcoming concert that it felt good to get my mind off of it and think of something else."
2000703-106 = "I don't know how long it's been since I've been able to have some good old fashioned dumb fun without a care in the world."
2000703-107 = "[s] \"Dumb fun...\""
2000703-108 = "I-I wasn't trying to downplay your efforts, Sensei!"
2000703-109 = "It's just, I was created to sing. Being able to smile about something other than singing is a completely new feeling for someone like me."
2000703-110 = "I had a lot of fun..."
2000703-111 = "[s] \"If you found it enjoyable, then that's enough.\""
2000703-112 = "Do you really think so?"
2000703-113 = "Thank you for helping me again today, Sensei."
2000703-119 = "I hope my voice comes back soon."

2000703-38 = "3;미쿠;09;그건 그렇지요. 결국은 제 책임이니까요."
2000703-39 = "3;미쿠;00;게다가 지금 공연을 취소하면 제 노래를 듣기 위해 기다려 주신 팬 여러분께 실례를 하는 셈이니, 역시 공연은 취소할 수 없어요.\n#3;em;[반응]"

2000703-13 = "3;공연 스태프;04;그런 이야기는 듣지 못했는데…… 이게 어떻게 된 일이야?"
2000703-14 = "1;미쿠;07;새로운 신체를 갖게 된 뒤로 노래를 부르려고 하면 어째서인지 목소리가 나오지 않아서요."
2000703-15 = "3;공연 스태프;09;으으. 기술자 녀석들, 미쿠의 몸에 고장은 절대로 없을 거라고 호언장담했으면서…….\n#3;stiff\n#3;em;[땀]"
2000703-16 = "3;공연 스태프;09;노래를 부르지 못하는 버추얼 싱어의 공연이라니, 이건 진짜 위험한 상황이라고."
2000703-17 = "1;미쿠;09;저, 혹시 지금이라도 공연을 취소하는 방법은…….\n#1;em;…"
2000703-18 = "3;공연 스태프;04;그건 곤란해! 그랬다가는 어마어마한 비용의 위약금을 내게 될 거야.\n#3;hophop"
2000703-19 = "3;공연 스태프;04;이미 시작된 광고는 둘째치더라도, 라이브 하우스의 대관비부터 새로운 신체를 만드는 데 들어간 기술 비용까지……"
2000703-20 = "3;공연 스태프;07;공연이 취소되면 이 비용을 고스란히 우리가 떠안아야 한다고.......\n#3;stiff"
2000703-21 = "3;공연 스태프;05;그러니까 공연을 취소할 수는 없어. 미쿠도 노래를 다시 부를 수 있는 방법을 여러모로 찾아봐 줘!\n#3;em;[!]"

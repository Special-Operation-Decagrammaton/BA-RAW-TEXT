2000703-34 = "3;미쿠;07;방법을 찾을 때까지 노래를 부를 수 없게 되었다는 사실을 어떻게든 숨겨보려고 했는데……\n#3;em;…"
2000703-35 = "3;미쿠;09;결국 들키고 말았네요."
2000703-36 = "3;미쿠;08;그래서 혹시 지금이라도 공연을 취소할 방법은 없을지 여쭈어보았는데, 그건 스케쥴 상 곤란하다고 하셔서요.\n#3;em;[땀]\n#3;stiff"

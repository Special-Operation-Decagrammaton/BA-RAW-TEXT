[translation]
2000703-1 = "虛擬歌手的煩惱"
2000703-5 = "Live House．休息室"
2000703-7 = "（依照約定前往休息室，聽見未來正在和某人交談）"
2000703-11 = "咦，沒辦法唱歌了！？"
2000703-12 = "嗯……雖然不知道原因，但突然就……"
2000703-13 = "竟然不知道原因，到底是怎麼回事……"
2000703-14 = "雖然能像這樣交談說話，卻不知為何在唱歌時都無法正常發出聲音……"
2000703-15 = "唔，那些傢伙明明跟我說「身體的維護非常完美」……！"
2000703-16 = "但是情況不妙，這樣的話演唱會就……！？"
2000703-17 = "那個，請問現在是否有辦法停辦，或是延期呢……？"
2000703-18 = "不，現在的話很困難……這樣會造成非常龐大的損失……！"
2000703-19 = "廣告費不用說，就連Live House的租借費用和技術相關的費用也都回不來了……"
2000703-20 = "即使無法取消表演，我們也必須承擔這些龐大的費用……！"
2000703-21 = "總之，取消是不可能的！我也會想想辦法，妳無論如何也要給我找出解決的辦法……！"
2000703-22 = "是，是的……"
2000703-27 = "呼……"
2000703-28 = "[s] 「未來，還好嗎？」"
2000703-30 = "啊，老師。你來了呀。"
2000703-31 = "不好意思，時機真不巧呢。讓你看到了丟臉的一面了。"
2000703-32 = "[s] 「剛才那位是演唱會主辦方的人嗎？」"
2000703-33 = "是。他好像是這次演唱會企劃的負責人。"
2000703-34 = "我本來是想直到最後關頭為止盡可能想辦法解決，並且隱瞞這件事的……"
2000703-35 = "但是時間也所剩不多了。"
2000703-36 = "或許你剛才也聽到了，要把演唱會中止或延期都很困難的樣子……"
2000703-37 = "[s] 「這就是大人的苦衷吧……」"
2000703-38 = "確實是這樣……但追根究底，這都是我的責任。"
2000703-39 = "況且如果取消表演的話，也會讓期待聽我唱歌的粉絲失望的。所以，我也無論如何都想完成演出。"
2000703-40 = "[s1]「不用太鑽牛角尖。」\n[s2]「未來肯定沒問題的。」"
2000703-41 = "……謝謝你，老師。"
2000703-42 = "……謝謝你，老師。"
2000703-43 = "啊，話說回來，老師你在MomoTalk上提到的「找到了幾種方法」指的是……？"
2000703-44 = "[s] 「總之就一個一個試試看吧。」"
2000703-51 = "這是……蔥？"
2000703-52 = "感冒或生病的時候，只要用蔥圍住脖子，喉嚨就會好起來……嗎？"
2000703-53 = "確實，我好像也聽過這種說法……"
2000703-54 = "這樣的民間療法，對我這種虛擬歌手也會有效嗎？"
2000703-55 = "[s] 「就先試試看吧。」"
2000703-59 = "嗯，也對。現在也不是懷疑或挑剔的時候了。"
2000703-66 = "嘿咻……啊，總覺得用大蔥圍住脖子後，喉嚨有種溫暖的感覺呢。"
2000703-67 = "這樣的話說不定……"
2000703-68 = "……那麼初音未來要唱了！"
2000703-74 = "……看來不行呢。"
2000703-75 = "果然是因為我是虛擬歌手所以沒有效果嗎？雖然我不討厭蔥……"
2000703-76 = "[s3] 「現在放棄還太早了。」\n[s4] 「接下來是這個！」"
2000703-85 = "這是……能量飲料？"
2000703-86 = "好像在哪裡看過……而且上面畫了一隻噁……外觀很不可思議的鳥呢……？"
2000703-87 = "[s5] 「這是很受某些學生歡迎的能量飲料。」\n[s6] 「聽說喝了能和佩洛洛一樣獲得翅膀喔。」"
2000703-88 = "喝，喝這種東西沒問題嗎……不，我沒有懷疑老師的意思……"
2000703-89 = "喝，喝這種東西沒問題嗎……不，我沒有懷疑老師的意思……"
2000703-90 = "……希望喝了之後，喉嚨不會惡化。"
2000703-91 = "那麼……"
2000703-95 = "初音未來，要挑戰了！"
2000703-98 = "（……後來嘗試了老師準備的各種方法，但未來的情況都沒什麼改變）"
2000703-100 = "唔嗯，不太順利呢……"
2000703-101 = "[s] 「竟然連薄荷巧克力也沒效果……」"
2000703-102 = "雖然現在問有點晚了，但薄荷巧克力冰淇淋和喉嚨有什麼關係嗎……？確實是覺得有點冰涼……"
2000703-103 = "總覺得到後半段都只是在吃各種甜點，好像變成點心派對了呢。"
2000703-104 = "不過託老師的福，心情好多了。謝謝你。該不會……這才是你的目的？"
2000703-105 = "這麼想起來，最近都在擔心演唱會的事情，根本就沒有時間思考其他事……"
2000703-106 = "好久沒有像這樣開著玩笑的快樂時間了。"
2000703-107 = "[s] 「抱，抱歉，我沒有開玩笑的意思……」"
2000703-108 = "啊，不是！抱歉，我並不是在責怪老師……！"
2000703-109 = "為了向大家傳達歌曲而誕生的我，竟然產生這樣的心情。該說是新鮮嗎，總覺得有些不可思議。"
2000703-110 = "感覺有點奇怪。這就是「快樂」……"
2000703-111 = "[s]「未來能開心的話就太好了。我也很開心喔。」"
2000703-112 = "……聽到你這麼說，我也很「開心」。"
2000703-113 = "今天也謝謝你，老師。"
2000703-119 = "今後也麻煩老師了！"

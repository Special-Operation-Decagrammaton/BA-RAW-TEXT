[translation]
90001210-1 = "ตอนที่ 21;หน้าที่สุดท้าย"
90001210-4 = "...?"
90001210-12 = "ทะ... ทำไมทุกคนเป็นอย่างนี้ล่ะคะ?! ทำไมไม่มีใครขยับเลยล่ะ...?"
90001210-13 = "แงงง! แบบนี้เหมือนตอนเริ่มเล่นเกมสยองขวัญเลยค่ะ..."
90001210-14 = "เอ๋... ท้องฟ้ามัน...?"
90001210-18 = "มีแสงบนท้องฟ้าด้วย...?"
90001210-19 = "อะ... อาริสึกลัวค่ะ ใครก็ได้ช่วยอาริสึด้วยค่ะ!"
90001210-23 = "ไม่เป็นไรนะคะ ใจเย็นๆ ก่อนค่ะ ท่านธิดา ไม่มีอะไรต้องกลัวค่ะ"
90001210-24 = "เคย์...? เคย์ปลอดภัยดีสินะคะ! นี่มันเรื่องอะไรกันเหรอคะ...?"
90001210-25 = "เมื่อสักครู่มีการยิงพลังงานจำนวนมากเข้ามาที่นี่ค่ะ "
90001210-26 = "นี่คือพลังของทวยเทพไร้นามค่ะ เพราะงั้นจึงเกิดการก่อตัวของสนามพลังงานในบริเวณนี้ด้วยพลังของ#nทวยเทพไร้นามค่ะ"
90001210-27 = "นั่นเป็นเหตุผลว่าทำไมอุปกรณ์อิเล็กทรอนิกส์ทั้งหมดถึงหยุดทำงาน เพราะพลังนั้นเป็นพลังที่ไม่อาจ#nวิเคราะห์หรือเอามาใช้ได้ด้วยเทคโนโลยีในปัจจุบันค่ะ"
90001210-28 = "กลุ่มแสงที่ดูเหมือนแสงเหนือบนท้องฟ้านั่นก็เป็นโครงสร้างการกระจายพลังของเหล่าทวยเทพไร้นาม#nที่มีแต่ฉันและท่านธิดาเท่านั้นที่มองเห็นได้ค่ะ"
90001210-29 = "นี่อาจเป็นสถานการณ์ที่ยากลำบากสำหรับทุกคน  แต่มันเป็นเรื่องดีสำหรับท่านธิดากับฉัน เพราะถ้ามีพลังงานมากมายขนาดนี้ละก็ เราสองคนจะทำอะไรก็ได้ค่ะ"
90001210-30 = "อย่างเช่นการเข้าถึงจิตสำนึกชั่วคราวที่มีแต่เราเท่านั้นที่ทำได้ แล้วแลกเปลี่ยนข้อมูลที่คนอื่นไม่อาจ#nจินตนาการได้ค่ะ"
90001210-31 = "ที่ตอนนี้ทุกคนหยุดนิ่งกันหมดก็เป็นเพราะสิ่งนั้นค่ะ"
90001210-32 = "..."
90001210-33 = "เข้าใจแล้วค่ะ! เป็นอย่างนี้นี่เองสินะคะ!"
90001210-34 = "ท่านธิดา... ฉันแค่ถามเฉยๆ นะคะ ท่านธิดาเข้าใจจริงๆ เหรอคะ?"
90001210-35 = "ที่จริงก็ไม่เข้าใจเลยสักอย่างค่ะ!"
90001210-36 = "เอ่อ ถ้างั้น..."
90001210-37 = "ค่ะ นั่นสินะคะ ถ้าจะใช้การเปรียบเทียบให้ท่านธิดาเข้าใจละก็..."
90001210-38 = "เอาแบบนี้แล้วกันค่ะ ตอนนี้ที่แห่งนี้... เต็มไปด้วยเวทมนตร์... ไม่สิ เต็มไปด้วยพลังเวทค่ะ"
90001210-39 = "แต่นี่กลับเป็นโอกาสที่ดีของเรา เพราะเราสองคนใช้พลังเวทได้ค่ะ"
90001210-41 = "เข้าใจแจ่มแจ้งเลยค่ะ! ที่นี่เต็มไปด้วยพลังเวท! ก็เลยเกิดปรากฏการณ์เหมือนเวทมนตร์แบบนี้สินะคะ!"
90001210-42 = "เฮ้อ... ค่ะ จะว่าอย่างนั้นก็ได้ค่ะ ท่านธิดา"
90001210-43 = "แต่การกลับมาเรียกกันแบบนั้นมันก็น่าเสียใจนะคะ เคย์"
90001210-44 = "อาริสึอยากยืนอยู่ในที่เดียวกันกับเคย์ค่ะ"
90001210-45 = "อยากยืนเคียงข้างกัน จับมือกัน แล้วก็เดินด้วยกันไปตลอดเลย"
90001210-46 = "ค่ะ เพราะอย่างนั้นละค่ะ ท่านธิดา"
90001210-47 = "นี่อาจเป็นโอกาสสุดท้ายที่ฉันจะได้เรียกคุณว่าท่านธิดาก็ได้ค่ะ"
90001210-48 = "หมายความว่ายังไงเหรอคะ...?"
90001210-49 = "..."
90001210-50 = "เรามาพูดเกี่ยวกับโชคชะตากันดีมั้ยคะ?"
90001210-51 = "โชคชะตาเหรอคะ...?"
90001210-52 = "ปกติแล้วจะเรียกว่าเป็นสิ่งที่เราได้รับมาตั้งแต่เกิดค่ะ"
90001210-53 = "ว่ากันว่าเป็นสิ่งที่แทบไม่อาจหลีกเลี่ยงได้ เป็นสิ่งที่เราต้องดิ้นรนเพื่อใช้ชีวิต หรือเป็นสิ่งที่เราต้อง#nยอมรับในที่สุดค่ะ"
90001210-54 = "จริงสิคะ ในเกมก็น่าจะมีคำว่าผู้กล้าแห่งโชคชะตาเหมือนกันค่ะ"
90001210-55 = "ในความเป็นจริง โชคชะตาอาจมีอยู่จริงก็ได้ค่ะ สำหรับมนุษย์แล้ว พันธุกรรมก็คงเป็นโชคชะตาอย่าง#nหนึ่งค่ะ"
90001210-56 = "เพราะนั่นเป็นสิ่งที่เราได้รับมาตั้งแต่เกิด เป็นสิ่งที่เราหลีกเลี่ยงไม่ได้ และเป็นสิ่งที่เราจะต้องท้าทาย#nหรือปรับตัวไปตลอดชีวิต"
90001210-61 = "ที่นี่คือ...!"
90001210-62 = "ค่ะ เมืองแห่งปราการเอริดู เมืองลับของริโอะที่เตรียมไว้เพื่อรับมือการทำลายล้าง"
90001210-63 = "ในอีกแง่หนึ่ง มันเป็นสถานที่ที่โชคชะตาของเราเปลี่ยนแปลงอย่างใหญ่หลวงในที่สุดค่ะ"
90001210-64 = "..."
90001210-65 = "โชคชะตาของเราสองคนคืออะไรกันคะ?"
90001210-66 = "คุณเป็นท่านธิดา ส่วนฉันก็เป็นหญิงรับใช้ของคุณค่ะ"
90001210-67 = "บางทีนั่นอาจเป็นโชคชะตาที่ติดตัวเรามาตั้งแต่เกิดค่ะ"
90001210-68 = "แต่ว่า อาริสึ..."
90001210-73 = "ค่ะ ฉันรู้ดีค่ะ ใช่แล้วละค่ะ หลายคนบอกว่าให้เราทิ้งโชคชะตาหรืออะไรจำพวกนั้นไว้ในมุมที่เรามองไม่เห็น"
90001210-74 = "สิ่งที่สำคัญจริงๆ คือการเลือกของเราต่างหาก และตอนที่ฉันลืมตาขึ้นมาอีกครั้ง คุณก็..."
90001210-75 = "คุณก็..."
90001210-76 = "ไม่สิ เดี๋ยวนะคะ... เดี๋ยวก่อน นี่มันอะไรกันคะ...?"
90001210-81 = "\"ทุกคน รอเดี๋ยวก่อน\""
90001210-84 = "ไม่ค่ะ ไม่หรอกค่ะ เป็นไปไม่ได้ เป็นไปไม่ได้หรอกค่ะ...!"
90001210-88 = "\"ฟังที่อาริสึจะพูดให้จบเถอะ\""
90001210-91 = "ในตอนนั้น สิ่งแรกที่ผุดขึ้นมาในใจของฉันก็คือ... ไม่สิ บางที...!!!"
90001210-96 = "\"เธอกำหนดคนที่\""
90001210-99 = "!!!!!"
90001210-104 = "\"ตัวเองอยากเป็นได้เลย\""
90001210-107 = "ไม่ได้ค่ะ... ฉัน... รับมือกับอดีตแบบนี้... ไม่ไหวหรอกค่ะ...!!!"
90001210-113 = "เคย์? เคย์?!?! เป็นอะไรไปเหรอคะ เคย์! มีเรื่องอะไรเกิดขึ้นงั้นเหรอคะ??!!"
90001210-115 = "ไม่สิ... คือว่า..."
90001210-116 = "ตอนที่ฉันรู้สึกตัวเป็นครั้งแรก ฉันคิดว่าตัวเองนึกถึงท่านธิดา"
90001210-117 = "ชื่อของท่านธิดาผุดขึ้นมาก่อนชื่อของฉันอีก"
90001210-118 = "แล้วฉันก็พยายามสร้างตัวเองขึ้นใหม่โดยใช้สิ่งนั้นเป็นพื้นฐาน ฉันก็เลยคิดว่าท่านธิดาคือคนที่คอย#nสนับสนุนฉันจากใจกลางสุดของฉันเสมอ...!"
90001210-119 = "แต่ที่จริงแล้ว...?"
90001210-123 = "สิ่งที่อยู่ ณ ใจกลางนั้น... ก็คือคำพูดของคุณครูค่ะ"
90001210-124 = "อ้อ เป็นอย่างนี้สินะคะ! ไม่น่าแปลกใจเลยค่ะ! ก็คุณครูเป็นคุณครูอยู่ทุกเมื่อยังไงล่ะคะ!"
90001210-125 = "เหลวไหลที่สุด! ทำไมต้องเป็นมนุษย์คนนั้นด้วยล่ะคะ! แบบนี้มันไม่มีเหตุผลเลยค่ะ! อ๊ากกกกก!!!"
90001210-126 = "โล่งอกไปทีนะคะ สำหรับเคย์แล้ว คุณครูก็เป็นคนสำคัญที่ไม่อาจเอาอะไรมาแลกได้สินะคะ"
90001210-127 = "ไม่ใช่ค่ะ! ฉันยอมรับเรื่องนี้ไม่ได้เด็ดขาดเลยค่ะ! ไม่ยอมรับหรอก!"
90001210-128 = "อึก... ทำไมชีวิตถึงมีแต่เรื่องที่ไม่มีเหตุผลแบบนี้ล่ะคะ...!"
90001210-129 = "ตะ... แต่อาริสึไม่อยากให้เคย์โกรธมากเกินไปนะคะ... เพราะคุณครูน่ะ..."
90001210-130 = "ไม่ค่ะ! ฉันจะโกรธค่ะ! จะโกรธจนควันออกหูเลยค่ะ!"
90001210-131 = "ถ้าเกิดเรื่องแบบนี้ ท่านธิดาก็คงผ่านเรื่องนี้ไปได้พร้อมกับทุกคนใช่มั้ยล่ะคะ! แล้วก็จะพยายามยิ้มอยู่#nตลอดด้วย!"
90001210-132 = "ค่ะ... นั่นคือสิ่งที่ดีค่ะ ฉันพูดจริงนะคะ ต้องแบบนี้ละค่ะ ถึงจะเป็นงานที่เหมาะกับผู้กล้าที่เดินทางไป#nพร้อมกับทุกคน"
90001210-137 = "แต่กับฉันมันต่างออกไปค่ะ ฉันจะโกรธค่ะ"
90001210-138 = "ท่ามกลางความไม่เป็นธรรม ความไม่สมเหตุสมผล และสิ่งต่างๆ ที่ทำให้เราเจ็บปวด ไม่ว่ายังไงฉันก็จะ#nต่อสู้และขัดขืนจนถึงที่สุดค่ะ!"
90001210-154 = "ใช่ค่ะ! แม้จะต้องคลานไปบนพื้นและดื่มน้ำสกปรก ฉันก็จะไม่ยอมแพ้อย่างเด็ดขาด! เพราะชีวิตคือการ#nต่อสู้ยังไงล่ะคะ!"
90001210-158 = "และต้องมีใครสักคนที่พร่ำบ่น เพื่อให้ชีวิตเกิดความสมดุลไม่ใช่เหรอคะ... และที่สำคัญ..."
90001210-159 = "ที่สำคัญ ดูรูปลักษณ์นี้สิคะ!"
90001210-164 = "ไม่ว่าใคร! ก็ต้องโกรธ! อยู่แล้วละค่ะ!"
90001210-165 = "อะ... อาริสึไม่เป็นอะไรค่ะ! ไม่ว่าจะอยู่ในรูปร่างแบบไหน เคย์ก็ยังเป็นเคย์อยู่ดีค่ะ!"
90001210-166 = "แต่ว่าฉันไม่ชอบค่ะ!"
90001210-167 = "งะ... แง!"
90001210-186 = "ฮู่ว... ฮ่า... ฮู่ว... ฮ่า..."
90001210-187 = "ตะ... แต่ถึงอย่างนั้น อาริสึก็... ดีใจที่เคย์ได้มีร่างกายแบบนี้ค่ะ"
90001210-188 = "ถ้าไม่อย่างนั้น... เราก็คงมาช่วยกันและกันอยู่แบบนี้ไม่ได้ไม่ใช่เหรอคะ?"
90001210-189 = "..."
90001210-190 = "อะ... อะแฮ่ม เอาเถอะค่ะ"
90001210-191 = "บางครั้งฉันก็คิดแบบนั้นค่ะ คิดว่าถ้าทุกอย่างกลับไปเป็นเหมือนเดิมจะเป็นยังไง"
90001210-192 = "ถ้าเป็นอย่างนั้น ท่ามกลางความเป็นไปได้มากมายที่พวกเรายังไม่ได้ไป ท่านธิดาจะเป็นอย่างไร แล้วฉันจะเป็นอย่างไรบ้าง..."
90001210-193 = "บางครั้งฉันก็รู้สึกสงสัยน่ะค่ะ"
90001210-195 = "แน่นอนว่าที่นั่นคงมีความเป็นไปได้อีกมากมาย มากกว่าแสงที่เราเห็นอยู่บนฟ้าตอนนี้"
90001210-197 = "แต่ท่ามกลางความเป็นไปได้นั้น ก็คงมีตอนจบแบบนี้อยู่ค่ะ"
90001210-198 = "อะ... อาริสึไม่ชอบอะไรแบบนี้ค่ะ! อาริสึกลัวค่ะ!"
90001210-199 = "เหนือสิ่งอื่นใด... อาริสึไม่อยากย้อนกลับไปในตอนที่ 'ไม่เคยมี' ทุกคนค่ะ"
90001210-201 = "ค่ะ... ฉันรู้ดีค่ะ คุณคงไม่ทำแบบนั้นหรอกค่ะ ท่านธิดา"
90001210-202 = "นั่นก็เพราะว่าคุณในตอนนี้คือผู้กล้าตามการนิยามของตัวเองนี่คะ"
90001210-206 = "เคย์ รู้มั้ยคะว่าผู้กล้าคืออะไร...?"
90001210-207 = "คะ? อืม... บอกตรงๆ ว่าฉันก็ไม่แน่ใจเท่าไร..."
90001210-208 = "ว่ากันว่าผู้กล้าคืออาชีพที่จะทำอะไรก็ได้ค่ะ"
90001210-209 = "แต่ที่จริงแล้วไม่เป็นอย่างนั้นหรอกค่ะ มันเป็นไปไม่ได้หรอก"
90001210-210 = "ในด้านพละกำลังแล้ว อาชีพนักรบถือว่าเหนือกว่ามาก แต่ถ้าเป็นการสู้ด้วยเวทมนตร์ นักรบเอาชนะนักเวทไม่ได้หรอกค่ะ"
90001210-211 = "ผู้กล้าเชื่องช้ากว่าโจร แล้วก็ฟื้นฟูได้ไม่เก่งเท่านักบวชด้วยค่ะ"
90001210-212 = "ส่วนในเรื่องการค้าขาย แน่นอนว่าเทียบกับพ่อค้าไม่ติดเลยค่ะ"
90001210-213 = "นี่ละค่ะอาชีพที่เรียกว่าผู้กล้า โดยลำพังแล้วผู้กล้าทำอะไรไม่ได้เลยค่ะ"
90001210-214 = "ถ้าอย่างนั้น ทำไมถึงเลือกเป็นผู้กล้า...?"
90001210-215 = "เพราะว่าผู้กล้าเป็นอาชีพที่ต้องก้าวไปข้างหน้าพร้อมกับทุกคนน่ะค่ะ"
90001210-216 = "ค่ะ เพราะผู้กล้าต้องจับมือและฝ่าฟันอุปสรรคไปพร้อมกับทุกคน"
90001210-217 = "และเมื่อทำเช่นนั้น ผู้กล้าจะกลายเป็นคนที่ก้าวไปข้างหน้าพร้อมกับคนอื่นๆ สู่สถานที่อันไกลโพ้นที่เรา#nไม่อาจไปถึงได้ด้วยพละกำลังของเราคนเดียว"
90001210-218 = "ผู้กล้าจะอยู่ในแนวหน้ากว่าคนอื่นเล็กน้อย อาจจะพูดได้ว่าแค่ครึ่งก้าว"
90001210-219 = "และจากจุดที่อยู่นั้น ผู้กล้ามีหน้าที่เปิดทางให้คนอื่นด้วยความกล้าหาญ แม้ในใจจะหวาดหวั่นก็ตาม"

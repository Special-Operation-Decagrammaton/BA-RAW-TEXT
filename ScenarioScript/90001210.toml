[translation]
90001210-1 = "Episode 21;Final Duty"
90001210-4 = "...?"
90001210-12 = "Wh-What is happening?! Why is everyone still...?"
90001210-13 = "Eek! This feels like the beginning of a horror game..."
90001210-14 = "Wait, the sky..."
90001210-18 = "There is light coming from the sky...?"
90001210-19 = "I-I am scared. Somebody, please help me!"
90001210-23 = "All is well. Calm down, Princess. There's nothing to be scared of."
90001210-24 = "Kei...? Kei, you are okay! What is happening right now?"
90001210-25 = "Moments ago, a significant amount of energy was projected into this area. "
90001210-26 = "It's no big secret. Someone has projected the Nameless Gods' power here to create an energy field surrounding the area."
90001210-27 = "That's why all electronic devices have stopped functioning. Modern technology quickly crumbles in the face of it."
90001210-28 = "The cluster of lights that looks like an aurora in the sky is also the distribution structure of the Nameless Gods' power. Only we can see it."
90001210-29 = "It'd be a disaster for anyone else, but it's an advantage for you and me. With a place this full of energy, we can do anything."
90001210-30 = "For example, we can temporarily restore the link between the two of us and share information beyond their comprehension."
90001210-31 = "That's why it appears to you that everyone else has stopped moving."
90001210-32 = "..."
90001210-33 = "I understand! So that is what happened!"
90001210-34 = "...Princess. Just to check, did you actually understand any of that?"
90001210-35 = "I actually did not understand a single thing you said!"
90001210-36 = "Um, so..."
90001210-37 = "Allow me to explain using words you would be more familiar with..."
90001210-38 = "Let's put it this way. This place is currently filled with magic...something like mana."
90001210-39 = "And for us, who are able to use mana, it's a huge opportunity."
90001210-41 = "I fully understand now! This place is full of mana! Which is why there is a magical occurrence taking place!"
90001210-42 = "*sigh* Yes. Something like that, Princess."
90001210-43 = "However, I do find the way you address me a bit disappointing, Kei."
90001210-44 = "I would like for us to stand on even ground."
90001210-45 = "I wish for us to stand side by side, to hold hands as we walk forward together."
90001210-46 = "Yes. That's exactly why, Princess."
90001210-47 = "This is likely the last time I'll ever get to call you that. My princess."
90001210-48 = "What do you mean by that...?"
90001210-49 = "..."
90001210-50 = "For a moment, let's talk about the concept of fate."
90001210-51 = "Fate...?"
90001210-52 = "People generally believe it's bestowed upon you at birth."
90001210-53 = "They believe it to be impossible to outrun: a challenge one must overcome in life, or something one must learn to accept."
90001210-54 = "Similar to the \"hero of fate\" in your video games."
90001210-55 = "Perhaps it's a part of the fabric of reality as well. For humans, it is in their genes."
90001210-56 = "Bestowed upon them at birth. Impossible to overcome, something to either challenge or accept throughout their lifetime."
90001210-61 = "This place is...!"
90001210-62 = "Yes. The Fortress City of Eridu. Rio's secret city she created to prepare against the coming doom."
90001210-63 = "In a sense, it's a place where our fate was altered, all the way down to its genes."
90001210-64 = "..."
90001210-65 = "I wonder what our fate was once meant to be."
90001210-66 = "You were a princess. And I was your servant."
90001210-67 = "I suppose that was our given fate."
90001210-68 = "But I..."
90001210-73 = "Yes. I know. You're correct. People believe you should overthrow fate, leave it in a corner, out of sight."
90001210-74 = "What really matters in life is our decisions. When I was waking up, you..."
90001210-75 = "...you—"
90001210-76 = "...Hold on. Wait. What is this...?"
90001210-81 = "\"Everyone, hold on.\""
90001210-84 = "No, there's no way. Impossible. This can't be happening!"
90001210-88 = "\"Let Aris talk.\""
90001210-91 = "The first thing I remembered was, I mean... That was absolutely the case, however...!!"
90001210-96 = "\"You get to choose...\""
90001210-99 = "Augh!!!"
90001210-104 = "\"...who you want to be.\""
90001210-107 = "No... I...can't...handle...the past...!!"
90001210-113 = "Kei? Kei?! What is wrong, Kei! Is something bad happening?!"
90001210-115 = "...No. Not exactly."
90001210-116 = "When I regained consciousness, I believed you, my princess, were the first thought to cross my mind."
90001210-117 = "I remembered my princess' name before mine."
90001210-118 = "I reconstructed myself based on that, so it was you, it was my princess that has always supported me at my very core!"
90001210-119 = "B-But...?"
90001210-123 = "...But what was truly at my core was Sensei's words."
90001210-124 = "Aha. So that is what is happening! That is only natural! Sensei is always Sensei, after all!"
90001210-125 = "This doesn't make sense! Of all people, why that person?! This is not fair! AUGH!!"
90001210-126 = "I am so happy. I am glad that Sensei is someone irreplaceable and special to you too, Kei!"
90001210-127 = "No! I can't admit it! I won't!"
90001210-128 = "Tch... This life is simply filled with unfairness!"
90001210-129 = "H-However, please do not get too angry. Sensei is—"
90001210-130 = "No! I will get angry! I will get mad!"
90001210-131 = "I know that you will overcome this side by side with your friends, Princess! And all with a smile!"
90001210-132 = "And that is a wonderful thing. Truly. It is befitting of a hero on a journey with her party."
90001210-137 = "But I'm different. I WILL get mad."
90001210-138 = "I will rebel against all these absurdities, these irrationalities, these things that make us suffer. I will struggle, resist, and rebel until the very end!"
90001210-154 = "That's right! Even if I have to crawl on the ground and drink water from the sewers, I won't give in! Because life itself is a rebellion!"
90001210-158 = "To begin with, someone needs to be whiny to find the balance. And, above all..."
90001210-159 = "Above all, look at how I look!"
90001210-164 = "Anyone! Would! Be! Mad!"
90001210-165 = "I-I think it is fine! No matter how you look, you are still Kei!"
90001210-166 = "But I don't like it!"
90001210-167 = "W-Waaah!"
90001210-186 = "*huff* *puff* *huff* *puff*"
90001210-187 = "B-But...I am very happy you have a body and could travel with us."
90001210-188 = "Otherwise...we would not have been able to be by each other's side in this way, right?"
90001210-189 = "..."
90001210-190 = "A-Ahem! Anyways."
90001210-191 = "Sometimes, I wonder what if everything went the way it was supposed to."
90001210-192 = "What would you have looked like, and what would I have looked like... All the countless possibilities that we have yet to experience..."
90001210-193 = "I sometimes become curious about them."
90001210-195 = "Of course, there are more possibilities than the number of stars in the sky we can see right now."
90001210-197 = "But somewhere among those possibilities, this potential ending existed."
90001210-198 = "I-I do not like this! I am scared!"
90001210-199 = "More than anything... I do not want to change everything to things that \"never happened\"..."
90001210-201 = "...Yes. I know. You would never do that, Princess..."
90001210-202 = "Because right now, you, by your own definition, are a hero."
90001210-206 = "...Do you know what a hero is, Kei?"
90001210-207 = "Yes? Um... Honestly, not quite."
90001210-208 = "People say a hero is a class that is capable of anything."
90001210-209 = "However, that is not true. It cannot be true."
90001210-210 = "When it comes to strength, warriors are stronger. When it comes to magic, a hero cannot win against a sorcerer."
90001210-211 = "A hero cannot be faster than a rogue. A hero cannot heal the way a priest can."
90001210-212 = "This is a given, but a hero cannot trade as well as a merchant can."
90001210-213 = "A hero is of a class that cannot do anything on its own."
90001210-214 = "Then why did you choose to be a hero...?"
90001210-215 = "Because a hero is someone who marches constantly forward with their party members."
90001210-216 = "It is because a hero is someone who holds everyone's hands."
90001210-217 = "That way, a hero can go to all the places that would be impossible to reach with just their own strength."
90001210-218 = "A hero is someone who is slightly ahead, just one half step in front."
90001210-219 = "Who is scared, but finds the courage to pave the path forward."
90001210-220 = "That is why, Kei, I wish for you to be somewhere I can reach you too."
90001210-221 = "I wish that you and I could gaze upon the same sky and go forward together, from the same place, to the same destination."
90001210-222 = "This is my request...to you, Kei."
90001210-227 = "Thank you, Princess. That is why I must do this."
90001210-228 = "This will be my final job as your servant."
90001210-232 = "What...?"
90001210-234 = "At times, I wonder just what a servant is."
90001210-235 = "Someone who serves you. Someone who guides you. Someone who teaches you, you who is trying to learn to walk, to explode forth into this world."
90001210-236 = "Therefore, a servant is someone who will take your hand as you forge your path forward."
90001210-237 = "...Which is why I will never hesitate to scold you when you take the wrong path from time to time."
90001210-238 = "Eek! The last one is a bit scary..."
90001210-239 = "Although this is no longer your identity, your bestowed fate was the princess of the Nameless Gods."
90001210-240 = "We can disregard fate as we please, but we can also use it."
90001210-241 = "Just like how you were the princess, and just like how I was your servant."
90001210-243 = "This situation is proof of that."
90001210-244 = "This situation?"
90001210-245 = "Look at the sky, princess."
90001210-246 = "Countless rays of light. At a glance, you could even say it looks beautiful."
90001210-247 = "And the truth is..."
90001210-248 = "...each and every one of those rays is one of your possibilities."
90001210-249 = "Right now, they're all part of your strength."
90001210-250 = "...!"
90001210-251 = "I've been keeping our existence hidden from those brats."
90001210-252 = "They think they've made the Nameless Gods' power their own, but they're utterly wrong."
90001210-253 = "Do not be afraid, Princess. Retake what was once yours."
90001210-254 = "Open up your heart, and proclaim it proudly."
90001210-255 = "For you are the master of all, the righteous successor to everything."
90001210-256 = "How you choose to use it is entirely up to you."
90001210-257 = "Whether you use it to open up a path as a hero or cleanse this world filled with agony..."
90001210-258 = "There's no god anywhere who can judge or stop you."
90001210-259 = "I am your servant who serves only you, and there is no other master I will ever serve."
90001210-260 = "Everything is your choice, your right, and your legacy that should be returned to you."
90001210-261 = "As it was originally my fate to show you the path, I will now complete my last duty as your servant, here and now."
90001210-262 = "Kei...!"
90001210-263 = "You're already well aware. The concept of time actually does not exist."
90001210-264 = "It is the same with matter itself. It is but an observed wave, and what actually exists is nearly infinite space beyond a very small particle."
90001210-265 = "Depending on the observer's coordinates, the past, present, and future could be an event happening at the same time."
90001210-266 = "And we will go beyond the stars to find a possibility and reach out to the next possibility as if nothing happened."
90001210-267 = "So please close your eyes for a moment."
90001210-269 = "My precious..."
90001210-271 = "Princess—Aris."
90001210-276 = "What's wrong, Aris? Kei, you too. You two were so still."
90001210-281 = "...I see."
90001210-282 = "Can I ask you something, Momoi? How long were Kei and I like that?"
90001210-283 = "Maybe two seconds?"
90001210-284 = "I see. I understand, Kei."
90001210-285 = "Yes. That's how it was, Aris."
90001210-287 = "?"
90001210-288 = "Aris, Kei-Kei... Are you okay?"
90001210-290 = "Yes. Kei and I are fine. Rio, is everything okay?"
90001210-291 = "Hm? As you can see, all our electronic devices have stopped functioning entirely."
90001210-292 = "The transport ship is likely far behind enough that it's unaffected, but I can't access it remotely at this time."
90001210-293 = "I see. Rio, Himari, do not worry."
90001210-294 = "From now on, I will light up the path forward."
90001210-295 = "...?"
90001210-296 = "Aris? Do you know something about the current situation?"
90001210-297 = "I am sorry, Rio. I do not completely understand it. But I do know that you can believe in me and Kei. Please."
90001210-298 = "[s] \"Of course. We always believe in you, Aris.\""
90001210-299 = "Thank you, Sensei. Hearing your words gives me courage."
90001210-300 = "Kei."
90001210-301 = "Yes, Aris."
90001210-302 = "Could you help me?"
90001210-303 = "Of course."
90001210-308 = "I'll put it simply. This place has been flooded with the Nameless Gods' power...with its very essence."
90001210-310 = "...!"
90001210-311 = "That is how it was able to stop us in our tracks with no warning, no measurements, no detection."
90001210-312 = "I understand now...!"
90001210-313 = "It's good to know that, but can we do anything about it?"
90001210-314 = "Absolutely. It's rather simple, Eimi. Since the enemies have created an energy field here..."
90001210-315 = "...we'll simply absorb and return it to them."
90001210-316 = "That is...possible?"
90001210-317 = "Yes, it is. At least, now it is."
90001210-318 = "Because Aris and I are here. So from here on out—"
90001210-319 = "Yes! From here on out, it is Kei's and my turn!"
90001210-320 = "Look at the sky, Aris. I've designated the target. Can you feel it?"
90001210-324 = "Yes, Kei, I can! So this...this is what this place is like!"
90001210-325 = "I would like to show Sensei what I am seeing, if possible!"
90001210-326 = "I will control the output. You won't have any problems collecting and gathering the energy, Aris. All you have to do is..."
90001210-327 = "...prove who the real master of this power is."
90001210-328 = "Yes! Here I go!"
90001210-335 = "Blinding Light!!!"
90001210-338 = "[000000]Blinding Light!!![-]"
90001210-345 = "Aris' Sword of Light split the night sky into two."
90001210-346 = "The sky was filled with a flash so bright that we could barely keep our eyes open. And then..."
90001210-351 = "W-Wait! What's that light in the sky?"
90001210-352 = "Isn't that an aurora? Where did that even come from?"
90001210-353 = "It's so pretty..."
90001210-355 = "It wouldn't be an impossible phenomenon, but this is...quite unexpected in a way. Wait, perhaps it's actually the opposite?"
90001210-356 = "Ms. Rio! President! Just now, the devices...!"
90001210-357 = "Yes! The devices have begun working again. But how...?"
90001210-358 = "..."
90001210-359 = "You did it, Aris."
90001210-360 = "Yes, of course, Rio. After all, I am a hero."
90001210-361 = "A class that opens the path with their party."
90001210-362 = "[s1] \"What an amazing aurora.\"\n[s2] \"But why did it form here?\""
90001210-365 = "I know the answer to that, Sensei."
90001210-366 = "[s] \"Really? Why?\""
90001210-367 = "It's because that light..."
90001210-371 = "...is a possibility, for all of us."
90001210-377 = "What's happening?! What's the status!"
90001210-378 = "E-Emergency! The status is emergency! Our energy field has been...completely annihilated."
90001210-379 = "O-On top of that, the s-silent drones...the fly-wheels...!"
90001210-381 = "WAAAAAAHHH!!!"
90001210-382 = "D-Don't cry, Ein! We'll, um... What do they call it? Right! We'll avenge you!"
90001210-387 = "On the other hand, there appears to be rather interesting... Ahem! I mean, rather troubling data in the logs."
90001210-388 = "An improbably strong burst of powerful energy is what eradicated the silent drones."
90001210-389 = "However, just before the destruction, the Forbidden Power imbued into the energy field simply disappeared, as if guzzled away by someone."
90001210-390 = "Come again? Wouldn't that mean that one of them is capable of controlling the Forbidden Power?"
90001210-391 = "Who in the world...? I would say that Tsukatsuki Rio and Akeboshi Himari are the only ones with potential, MAYBE Asuma Toki, if I'm being generous."
90001210-392 = "The rest of them are just little gnats!"
90001210-393 = "The energy's intensity superseded all normal expectations."
90001210-394 = "It briefly split the ionosphere on site, such was the scale of its power."
90001210-395 = "An aurora has formed in response. That much we can confirm."
90001210-396 = "An aurora...? I wonder how pretty it is... Ehehe..."
90001210-397 = "Uh, yeah. Right... It'd be pretty, I guess..."
90001210-398 = "Anyways, we can say one thing for certain. They're in possession of...unknown variables."
90001210-399 = "Something that can freely utilize Forbidden Power and release an output so strong as to disrupt the electromagnetic field on top of that."
90001210-400 = "B-But what...could it be...?"
90001210-401 = "Our understanding until this point has led us to believe they were incapable of such feats. However, what has happened, has happened. There is no other path here but acceptance."
90001210-402 = "However, let us keep it a secret from Elder Sister for now."
90001210-403 = "I agree."
90001210-404 = "Yes. Understood..."
90001210-405 = "B-But if that adult...if Sensei keeps on going..."
90001210-406 = "..."
90001210-407 = "..."
90001210-408 = "W-Will Tiphy be okay...?"
90001210-409 = "For now, let's up our retaliation. We've been taking this too lightly."
90001210-410 = "I'm in agreement. As Sof said, we must consider all possibilities as we proceed."
90001210-411 = "I-I'll try to contact Tiphy... But generally, regarding Tiphy...Ohr was..."
90001210-412 = "Yes. You're right. I'm in charge of managing Tiphareth. That said, I accept Sof's proposal of harsher retaliation."
90001210-413 = "...Let us show them what we, the engineers, are capable of!"
90001210-414 = "Y-You're so cool, Ohr!"
90001210-419 = "(...Still, why? The anxious signals just won't stop...)"
90001210-420 = "(...)"
90001210-421 = "(It's an absolute impossibility, but there's always a potential for the worst-case scenario.)"
90001210-426 = "(If things do crumble, I'll turn to Elder Sister...)"

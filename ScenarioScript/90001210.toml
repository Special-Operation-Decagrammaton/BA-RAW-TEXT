90001210-26 = "1;케이;14;무엇을 숨기겠습니까. 네. 이름 없는 신들의 힘 그 자체가 내쏘아진 것이죠. 그리하여 이 지역에는 현재, 이름 없는 신들의 힘으로 이루어진 에너지장이 형성되었습니다.\n#1;sig"
90001210-27 = "1;케이;14;모든 전자기기가 작동을 멈춘 것은 그 때문입니다. 그것은 현재의 기술로는 온전히 해석해 낼 수도, 활용할 수도 없는 힘이니까요.\n#1;sig"
90001210-28 = "1;케이;14;저기 하늘에 오로라처럼 보이는 빛의 무리 역시, 왕녀와 저에게만 보이는 이름없는 신들의 힘의 분포 구조입니다.\n#1;sig"
90001210-29 = "1;케이;14;모두에게 아주 곤란한 상황일 수도 있지만, 당신과 저에게는 오히려 잘된 일입니다. 이렇게 에너지로 충만하다면, 우리는 무엇이든 할 수 있으니까요.\n#1;sig"
90001210-30 = "1;케이;14;가령 이렇게, 우리들만 되살려낼 수 있는 링크를 일시적으로나마 복구하여, 다른 사람들은 상상도 하기 힘든 정보 교환을 할 수도 있습니다.\n#1;sig"
90001210-31 = "1;케이;99;지금 다른 모두가 멈춘 듯이 보이는 것 역시, 그 때문이고요.\n#1;sig"

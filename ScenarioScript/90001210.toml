90001210-396 = "แสงเหนือ... เหรอคะ...? ต้องสวยแน่ๆ เลย... แหะๆๆ..."
90001210-397 = "อ่า อื้อ ใช่แล้วละ... มันต้องสวยแน่ๆ เลย..."
90001210-398 = "เอาเถอะ... สิ่งหนึ่งที่แน่นอนก็คือ ในหมู่คนพวกนั้น... มีตัวแปรที่พวกเรายังไม่รู้อยู่"
90001210-399 = "แล้วตัวแปรที่ว่านั่นก็ใช้พลังต้องห้ามได้อย่างอิสระในระดับหนึ่ง แถมยังปลดปล่อยพลังงานที่ทรงพลัง#nที่ถึงกับรบกวนสนามแม่เหล็กบางส่วนได้"
90001210-400 = "ตะ... แต่ว่า นั่นมัน... คืออะไรเหรอ... คะ...?"
90001210-401 = "เท่าที่พวกเรารู้ คนพวกนั้นไม่มีทางที่จะปลดปล่อยพลังแบบนั้นออกมาได้ แต่ว่า... มันก็เกิดขึ้นไปแล้ว#nอย่างที่เห็น เราต้องยอมรับปรากฏการณ์นี้ค่ะ"
90001210-402 = "แต่ฉันคิดว่าควรเก็บเรื่องนี้เป็นความลับกับพี่มัลคูธก่อนค่ะ"
90001210-403 = "ก็จริงนะ"
90001210-404 = "ค่ะ เข้าใจแล้วค่ะ..."
90001210-405 = "ตะ... แต่ว่าถ้าผู้ใหญ่คนนั้น... ถ้าคุณครูคนนั้นยังทำแบบนี้ต่อไปละก็..."
90001210-406 = "..."
90001210-407 = "..."
90001210-408 = "ทะ... ทิฟาจัง... จะไม่เป็นไรเหรอคะ...?"
90001210-409 = "มาเพิ่มระดับการตอบโต้ขึ้นอีกระดับก่อนเถอะ จากนี้ไปพวกเราห้ามประเมินพวกนั้นต่ำไปอย่างที่เคยทำ#nมาแล้วละ"
90001210-410 = "ฉันเห็นด้วยค่ะ ซอฟเคยพูดถึงแผนรับมือไว้แล้วก็จริง แต่เราก็ต้องพิจารณาถึงทุกความเป็นไปได้ค่ะ"
90001210-411 = "ฉะ... ฉันจะลองติดต่อทิฟาจังก่อนนะคะ... แต่โดยพื้นฐานแล้ว ทิฟาจัง... ต้องให้ออร์..."
90001210-412 = "ค่ะ ใช่ค่ะ โดยพื้นฐานแล้ว ฉันมีหน้าที่ควบคุมรายละเอียดปลีกย่อยของทิฟาเร็ธค่ะ และด้วยความเห็น#nของซอฟที่จะเพิ่มระดับการตอบโต้...!"
90001210-413 = "เราจะทำให้คนพวกนั้นได้เห็นอย่างเต็มตาว่าเหล่าผู้เลื่อมใสของเราทำอะไรได้บ้างค่ะ!"
90001210-414 = "ทะ... เท่สุดๆ ไปเลยค่ะ ออร์!"
90001210-419 = "(แต่ว่า ทำไมกันนะ... ทำไมสัญญาณที่ทำให้กังวลใจมันยังไม่หายไปสักที...)"
90001210-420 = "(...)"
90001210-421 = "(จริงๆ แล้วมันไม่ควรเป็นอย่างนี้ แต่จะยังไงก็เถอะ นี่คงเป็นสิ่งที่เรียกว่าหนึ่งในล้านน่ะ)"
90001210-426 = "(ถ้าทุกอย่างแย่ลง ตอนนั้นคงต้องให้พี่มัลคูธ...)"
90001210-428 = "ตอนต่อไป;กริดพอยต์"

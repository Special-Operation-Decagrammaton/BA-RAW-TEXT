[translation]
90001210-1 = "第21話;最後的職責"
90001210-4 = "……？"
90001210-12 = "大，大家怎麼了！？為什麼都一動也不動……？"
90001210-13 = "嗚哇！感覺就像恐怖遊戲的序章一樣……"
90001210-14 = "咦，天空……？"
90001210-18 = "天上，有光……？"
90001210-19 = "愛，愛麗絲好怕。誰快來救救愛麗絲！"
90001210-23 = "沒事的。請冷靜下來，王女。不需要感到害怕。"
90001210-24 = "Kei……？原來Kei平安無事啊！#n這到底是怎麼回事……？"
90001210-25 = "不久之前，有大量的能量被發射到了這個地區。"
90001210-26 = "其實也沒什麼好隱瞞的……沒錯，那股能量是無名之神的力量。#n因此現在這個地區，形成了由無名之神的力量組成的能量場。"
90001210-27 = "所有電子裝置會停止運作，就是因為這個原因。#n那是當前的技術無法完全解釋和運用的力量。"
90001210-28 = "天上那看似極光的光暈，是只有王女和我才看得到的無名之神力量的分布結構。"
90001210-29 = "雖然這種情況對其他人或許非常傷腦筋，但對你我而言反而是件好事。#n在這種充滿能量的環境下，我們什麼都能辦得到。"
90001210-30 = "就比如像現在這樣，#n暫時修復只有我們才能建立的連結，進行他人無法想像的情報交換。"
90001210-31 = "所以現在，其他人看起來才會像是靜止不動一樣。"
90001210-32 = "……"
90001210-33 = "原來如此！"
90001210-34 = "……請容我確認一下，王女真的明白了嗎？"
90001210-35 = "其實完全不懂！"
90001210-36 = "呃，我的意思是……"
90001210-37 = "嗯，如果要用能讓王女了解的比喻……"
90001210-38 = "就這麼說吧。#n現在這裡……充滿了魔力。"
90001210-39 = "所以對於能使用那股魔力的我們來說，這反而是個好機會。"
90001210-41 = "愛麗絲完全明白了！原來是因為這裡充滿了魔力，所以才會出現魔法現象啊！"
90001210-42 = "唉……大致上是這樣沒錯，王女。"
90001210-43 = "不過那個稱呼還是讓人有點遺憾呢，Kei。"
90001210-44 = "因為愛麗絲想和Kei處於相同的位置。"
90001210-45 = "想和你並肩站著，手牽手，永遠一起走下去。"
90001210-46 = "是啊，就是因為這樣，王女。"
90001210-47 = "也許這，是我最後一次稱呼你為王女的機會。"
90001210-48 = "那是什麼意思……？"
90001210-49 = "……"
90001210-50 = "我們來談談有關命運的話題吧。"
90001210-51 = "命運……是嗎？"
90001210-52 = "那通常是與生俱來，並且無法逃避的東西。"
90001210-53 = "有些人一生都在與之抗衡，或者最終選擇順從。"
90001210-54 = "要用遊戲來比喻的話，就類似「命定的勇者」這種說法吧。"
90001210-55 = "而在現實之中，或許也存在所謂的命運。#n對於人類來說，基因就是他們的命運吧。"
90001210-56 = "與生俱來、無法逃避，且終生都在與之抗衡或順從的東西。"
90001210-61 = "這裡是……！"
90001210-62 = "要塞都市埃里都──莉央為了應對終焉而準備的祕密都市。"
90001210-63 = "從某種意義上來說，也是我們的命運被改變的場所。"
90001210-64 = "……"
90001210-65 = "我們的命運究竟是什麼呢。"
90001210-66 = "你是王女，而我則是你的侍女。"
90001210-67 = "或許這就是我們與生俱來的命運吧。"
90001210-68 = "但是愛麗絲……"
90001210-73 = "嗯，我知道。#n命運什麼的，就把它丟到看不到的角落去吧。"
90001210-74 = "真正重要的是我們的選擇。#n當我再次睜開眼睛的時候，一定是因為你……"
90001210-75 = "因為，你──"
90001210-76 = "……不對，先等一下。#n這是什麼情況……？"
90001210-81 = "「大家先等一下。」"
90001210-84 = "不不不，怎麼會呢。不可能有這種事……！"
90001210-88 = "「聽愛麗絲把話說完吧。」"
90001210-91 = "當時我想起的第一句話好像是……#n不，但是這實在……！！！"
90001210-96 = "「你想成為的存在」"
90001210-99 = "！！！！！"
90001210-104 = "「可以由你自己決定。」"
90001210-107 = "不行……我無法……承受這種過去……！！！"
90001210-113 = "Kei？Kei！？！？#n你怎麼了，Kei！出了什麼問題嗎！？"
90001210-115 = "……不。"
90001210-116 = "我本以為自己即將恢復意識的時候，最先想起的會是王女。"
90001210-117 = "在自己的名字之前，我先想起的是王女的名字。"
90001210-118 = "我是以此為基礎重建自我，所以一直認為王女是我最核心的支柱，但是……！"
90001210-119 = "但是？"
90001210-123 = "……我核心的支柱，卻是老師說過的話。"
90001210-124 = "啊哈，原來如此！不過那也是理所當然的呀！#n因為老師無論什麼時候都是老師！"
90001210-125 = "不可能！為什麼偏偏是那個人類！#n這太不合理了！呃啊啊啊啊！！！"
90001210-126 = "太好了。對Kei來說，老師也是無可取代的重要存在呢。"
90001210-127 = "不！我無法認同！我絕不認同！"
90001210-128 = "該死……為什麼人生充滿這麼不合理的事呢……！"
90001210-129 = "希，希望你不要太生氣……老師他……"
90001210-130 = "不！我就要生氣！我就要憤怒！"
90001210-131 = "王女在遇到這種事的時候，總是會和大家一起克服！而且還總是努力展露著笑容！"
90001210-132 = "嗯……我認為這是件好事。#n是與大家一同前行的勇者相符的舉動。"
90001210-137 = "但是我不一樣。我要感到憤怒。"
90001210-138 = "對於所有荒謬、不合理、讓我們痛苦的事，都必須掙扎、抵抗、反抗到最後！"
90001210-154 = "沒錯！就算必須在地上邊爬邊喝髒水，我也絕不屈服！#n人生本來就是一場鬥爭！"
90001210-158 = "……有人負責發牢騷也比較平衡吧。#n最重要的是……"
90001210-159 = "看看我現在這副模樣！"
90001210-164 = "不管是誰都會生氣吧！"
90001210-165 = "愛，愛麗絲不介意哦！#n無論Kei的外表長什麼樣子，Kei就是Kei！"
90001210-166 = "可是我不喜歡！"
90001210-167 = "嗚哇！"
90001210-186 = "呼，呼，哈啊……"
90001210-187 = "可，可是愛麗絲……很高興Kei能用自己的身體陪在愛麗絲身邊。"
90001210-188 = "否則……現在也無法互相幫助了吧？"
90001210-189 = "……"
90001210-190 = "咳，咳哼。總之……"
90001210-191 = "我有時候會想……如果一切照舊的話會怎麼樣。"
90001210-192 = "在我們尚未探索過的無數可能性之中……王女會是什麼模樣，我又會是什麼樣子。"
90001210-193 = "我時常對此感到好奇。"
90001210-195 = "那裡充滿的可能性，想必比現在空中的星光還多吧。"
90001210-197 = "或許在那些可能性之中，也存在著這種結局。"
90001210-198 = "愛，愛麗絲不喜歡那樣！太可怕了！"
90001210-199 = "而且…… 愛麗絲不想讓大家回到「不存在」的狀態"
90001210-201 = "……嗯，我知道王女你不會那麼做的。"
90001210-202 = "因為現在的你，將自我定義為了勇者。"
90001210-206 = "……你知道什麼是勇者嗎，Kei？"
90001210-207 = "嗯？這個嘛……老實說我不太清楚……"
90001210-208 = "勇者在大家眼中，經常被認為是個無所不能的職業。"
90001210-209 = "但是事實並非如此，而且那也是不可能的。"
90001210-210 = "力量方面是戰士更勝一籌，魔法方面則贏不過魔法師。"
90001210-211 = "速度層面比不上盜賊，恢復能力也不如僧侶。"
90001210-212 = "當然，勇者在生意方面也比不過商人。"
90001210-213 = "只靠自己一個人什麼都做不了，這就是名為勇者的職業。"
90001210-214 = "既然如此，為何要選擇當勇者呢……？"
90001210-215 = "因為勇者是和所有人一起前進的職業。"
90001210-216 = "沒錯，因為勇者必須和所有人攜手合作。"
90001210-217 = "因為勇者只靠自己的力量無法到達目的地，但是和大家一起前進就能走得很遠。"
90001210-218 = "所謂的勇者，只是身先眾人……"
90001210-219 = "即便害怕仍勇於開創道路的角色而已。"
90001210-220 = "所以Kei……愛麗絲希望Kei能待在自己觸手可及的地方。"
90001210-221 = "希望能跟Kei在相同的地方仰望同一片天空，一起向前邁進。"
90001210-222 = "這就是愛麗絲想對Kei……提出的請求。"
90001210-227 = "謝謝你，王女。#n那正是我身處於此的理由。"
90001210-228 = "身為你的侍女，這是我最後想完成的事。"
90001210-232 = "咦……？"
90001210-234 = "所謂的侍女──"
90001210-235 = "就是負責陪伴你、引導你──教你如何走向世界的人。"
90001210-236 = "對於希望向前邁進的你來說，侍女就是為你指引道路的人。"
90001210-237 = "……也是會在你偶爾走錯路時，不惜對你嘮叨的人。"
90001210-238 = "嗚哇！最後那句聽起來有點可怕……"
90001210-239 = "雖然現在的情況已有所不同，但你的起源依舊是無名諸神的王女。"
90001210-240 = "即便已將命運視為無物，我們還是能夠從中有所收穫。"
90001210-241 = "就像你是王女，而我是你的侍女一樣。"
90001210-243 = "現在眼前的這片光景就是證據。"
90001210-244 = "這片光景？"
90001210-245 = "請看向這片天空吧，王女。"
90001210-246 = "空中那無數的光芒，雖然乍看之下很美……"
90001210-247 = "但實際上──"
90001210-248 = "那其中的每一道光芒，都是你的可能性。"
90001210-249 = "而現在，那一切都能成為你的力量。"
90001210-250 = "……！"
90001210-251 = "那些「小鬼頭」應該察覺不到我們的存在。#n因為我正在全力阻礙他們。"
90001210-252 = "他們或許自認已經完全掌握了無名之神的力量，但那純粹是天方夜譚。"
90001210-253 = "請別害怕，王女啊。#n取回屬於自己的東西吧。"
90001210-254 = "挺起胸膛，堂堂正正地向世界吶喊吧。"
90001210-255 = "自己才是這一切的主人──是這一切的正當繼承者。"
90001210-256 = "至於要如何使用這股力量，取決於你自己的想法。"
90001210-257 = "是要以勇者的身分開創道路，還是要淨化這個痛苦的世界。"
90001210-258 = "能夠判斷並阻止這一切的諸神，如今已不復存在。"
90001210-259 = "我是你的侍女，只會服侍你一個人。"
90001210-260 = "這一切都是你的選擇、你的權利──是應當回歸於你的遺產。"
90001210-261 = "我的命運本來就是為你指引道路──#n現在我將在此，履行身為侍女最後的職責。"
90001210-262 = "Kei……！"
90001210-263 = "你應該也知道，時間本來就不存在。"
90001210-264 = "而物質也是一樣。#n那是觀測到的波動，存在的只是位於極小粒子的另一端，接近無限的空間而已。"
90001210-265 = "根據觀測者的座標，過去、現在和未來可能是同時發生的事件。"
90001210-266 = "我們穿越星星尋找可能性，並於找到後若無其事地朝下一個可能性伸出手。"
90001210-267 = "所以現在請暫時將眼睛閉上。"
90001210-269 = "我重要的"
90001210-271 = "[ruby=王女]愛麗絲[/ruby]啊。"
90001210-276 = "怎麼了嗎，愛麗絲？#n你和Kei好像都在發呆耶？"
90001210-281 = "……原來如此。"
90001210-282 = "桃井，請問愛麗絲和Kei發呆了多久呢？"
90001210-283 = "大概2秒左右？"
90001210-284 = "原來是這麼回事啊，Kei。"
90001210-285 = "沒錯，愛麗絲。"
90001210-287 = "？"
90001210-288 = "愛麗絲醬、Kei醬……你們沒事吧？"
90001210-290 = "嗯，愛麗絲跟Kei都沒事。#n莉央前輩，現在的情況怎麼樣了？"
90001210-291 = "嗯？基本上……就像你見到的一樣，所有電子設備都完全停擺了。"
90001210-292 = "或許在遠處待命的運輸船沒有受到影響……#n然而現在無法遠距操控，所以結果依然沒有改變。"
90001210-293 = "愛麗絲明白了。#n沒事的，莉央前輩、陽葵前輩。"
90001210-294 = "接下來，愛麗絲將會點亮道路。"
90001210-295 = "……？"
90001210-296 = "愛麗絲？你對現在的情況有所了解嗎？"
90001210-297 = "對不起，莉央前輩。#n愛麗絲也不是很清楚，不過請多相信愛麗絲和Kei一點。"
90001210-298 = "[s]「嗯，我們一直都很相信愛麗絲哦。」"
90001210-299 = "謝謝你，老師。#n老師的這句話，讓愛麗絲獲得了勇氣。"
90001210-300 = "Kei。"
90001210-301 = "嗯，愛麗絲。"
90001210-302 = "可以拜託你嗎？"
90001210-303 = "當然可以，愛麗絲。"
90001210-308 = "我簡單說明一下吧。#n現在充滿這裡的……是無名之神的力量。"
90001210-310 = "……！"
90001210-311 = "所以才會在沒有被偵測與測量的情況下，毫無預警地讓我們停在了這裡。"
90001210-312 = "原來如此！所以才會……！"
90001210-313 = "不過就算知道是那樣，我們有什麼能做的嗎……？"
90001210-314 = "當然有，而且很簡單，英美。#n如果敵人傾注了未知能量來製造能量場──"
90001210-315 = "我們只要反過來吸收那股能量並加以利用，以其人之道還治其人之身就行了。"
90001210-316 = "那種事……辦得到嗎？"
90001210-317 = "如果是現在的話，可以辦到。"
90001210-318 = "因為有我和愛麗絲在。所以現在──"
90001210-319 = "是！輪到Kei和愛麗絲了！"
90001210-320 = "請看向天空吧，愛麗絲。#n我已經指定了座標，應該能感覺到才對……能看見嗎？"
90001210-324 = "看到了，Kei！#n這個地方……原來長這樣啊。"
90001210-325 = "如果可以的話，愛麗絲真想讓老師也看見自己現在眼前的景色！"
90001210-326 = "輸出由我來調整。能量的收集和程序也沒有任何問題。#n所以接下來，愛麗絲只要──"
90001210-327 = "──證明這股力量真正的主人是誰就行了。"
90001210-328 = "是！要上了！"
90001210-335 = "光啊────！！！！！"
90001210-338 = "[000000]光啊────！！！！！[-]"
90001210-345 = "（愛麗絲的「光之劍」，如字面意義般地將夜空一分為二）"
90001210-346 = "（一道亮得令人睜不開眼的閃光點亮了天空，接著……）"
90001210-351 = "咦，那是什麼？天上好像有光……？"
90001210-352 = "那是極光嗎？但是為什麼會在現在這種時候……？"
90001210-353 = "真漂亮……"
90001210-355 = "考量到目前所處的緯度，這並非不可能發生的現象。#n不過……從某種角度來看，這還真湊巧呢。不，應該恰好相反嗎？"
90001210-356 = "部長！會長！現在裝置……！"
90001210-357 = "所有裝置都能正常運作了。#n但是這究竟……？"
90001210-358 = "……"
90001210-359 = "是你幫助了大家對吧，愛麗絲。"
90001210-360 = "沒錯，這是理所當然的事，莉央前輩。#n因為愛麗絲是勇者。"
90001210-361 = "是和大家一起開闢道路的職業。"
90001210-362 = "[s1]「極光真漂亮呢。」\n[s2]「但是為什麼現在會出現極光？」"
90001210-365 = "愛麗絲知道，老師。"
90001210-366 = "[s]「真的嗎？為什麼呢？」"
90001210-367 = "因為那道光……"
90001210-371 = "是所有人的可能性。"
90001210-377 = "到底怎麼回事！？快告訴我情況！"
90001210-378 = "是，是重大緊急狀況！#n投射到現場的能量場……完全崩潰了！"
90001210-379 = "而，而且無，無聲無人機……飛輪醬們甚至……！"
90001210-381 = "嗚哇啊啊啊啊──！！！"
90001210-382 = "別，別哭，你別哭啊，Ain！#n我們……該怎麼說才好……對了！我們會幫你報仇！"
90001210-387 = "不僅如此，還有更有趣……不，還有更令人頭痛的部分。#n從Log的分析結果來看……"
90001210-388 = "首先，那發強大的能量確實一擊就擊墜了無聲無人機沒錯──"
90001210-389 = "但是在那之前，維持能量場的禁忌之力，就像被瞬間吸進某個地方一樣消失了。"
90001210-390 = "什麼？也就是說，他們之中有人能自由使用那股禁忌之力嗎？"
90001210-391 = "可是會是誰呢……？#n有可能的人選，是調月莉央和明星陽葵……硬要說的話還有飛鳥馬季。"
90001210-392 = "其他所有人都不是考慮對象！"
90001210-393 = "當時釋放出的能量強度，達到了一般而言難以想像的等級。"
90001210-394 = "要說強到什麼程度的話，甚至能讓現場上空的電離層暫時分裂。"
90001210-395 = "其結果就是在該地區形成了極光。#n這應該能直接確認才對。"
90001210-396 = "極光，是嗎……？#n一定很漂亮吧……耶嘿嘿……"
90001210-397 = "啊，嗯……確實很漂亮……"
90001210-398 = "總之……有一件事是能確定的。#n在他們之中……存在著我們所不知道的變數。"
90001210-399 = "那個變數能在一定程度上自由使用禁忌之力，#n還擁有足以打亂部分磁場的強力輸出能力。"
90001210-400 = "可，可是，那會是……什麼呢……？"
90001210-401 = "根據我們的瞭解，他們不可能釋放出這種力量。#n但是……事情確確實實地發生了。我們必須承認這個現象。"
90001210-402 = "不過最好還是先對姐姐大人保密比較好。"
90001210-403 = "說得也是。"
90001210-404 = "是，我知道了……"
90001210-405 = "可，可是那個大人……如果老師他們繼續前進的話……"
90001210-406 = "……"
90001210-407 = "……"
90001210-408 = "提，提法醬，沒問題嗎……？"
90001210-409 = "先提高應對級別吧。#n不能再像之前一樣不當一回事了。"
90001210-410 = "我也贊成。#n因為Soph說過，所謂的對策必須考慮到所有可能性。"
90001210-411 = "我，我先試著聯絡提法醬……#n但是提法醬基本上……是Aur……"
90001210-412 = "嗯，沒錯。基本上提法瑞特的細部管理是由我負責的。#n那我就接受Soph提高應對級別的建議……！"
90001210-413 = "……好好讓那些人見識見識，我們的預言者們的真本事吧！"
90001210-414 = "太，太帥了，Aur！"
90001210-419 = "（……但是為什麼呢？代表不安的信號依舊不斷湧現……）"
90001210-420 = "（……）"
90001210-421 = "（雖然實在不能那樣，但要是真的有什麼萬一……）"
90001210-426 = "（如果一切都朝著最壞的方向發展的話，到時候就找姐姐大人……）"

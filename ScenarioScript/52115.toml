[translation]
52115-1 = "Episode 11;The Path to the Beyond"
52115-2 = "Ebisu Satellite School Outskirts, Snowfield"
52115-4 = "...So. Their base is out here?"
52115-9 = "Ah, I thought I told you!"
52115-11 = "You did not."
52115-12 = "You ran out without a word, so we had no choice but to follow."
52115-17 = "Sorry, sorry! It's just that I'd like to get this done before it gets dark..."
52115-18 = "The Artifact Spirits come out after sundown, you know."
52115-19 = "And you are certain that the Nature's Beauty base is nearby?"
52115-20 = "Shuro was uncooperative. How do you know it's out here?"
52115-21 = "Remember this morning when I was examining the Artifact Spirit?"
52115-26 = "Do you see this carving on the umbrella's handle?"
52115-27 = "I've purposefully left special marks on old worn-out things and left them near the village's entrance."
52115-28 = "So, I've been tracking the Artifact Spirits' movements. And they all seem to be drifting in this direction."
52115-30 = "I see. That's very clever."
52115-32 = "A truly inspired plan, as expected of the Hyakkaryouran President!"
52115-33 = "We are following broken umbrellas?"
52115-35 = "So to speak. I left this umbrella at the north entrance of the village."
52115-36 = "And while the maps say that there is only a desolate snowfield out here..."
52115-37 = "...The villagers told me that there's an old mansion just a few hours away."
52115-38 = "A mansion in the northern snowfield... You mean the Mansion of the Beyond."
52115-43 = "...Mansion of the Beyond? How dramatic."
52115-44 = "Indeed. According to records, it's where an aristocratic family lived long ago."
52115-45 = "I've never been personally, so I cannot speak to its state."
52115-46 = "I suppose it would be a good place for Nature's Beauty to settle."
52115-47 = "Perhaps we will find the source of the Artifact Spirits there."
52115-48 = "[s1] \"You really think we should just barge in?\"\n[s2] \"There could be traps...\""
52115-54 = "Strike while the iron's hot, right?"
52115-55 = "If we hesitate, they'll get away again. It's time for action!"
52115-56 = "Besides, we have the unbeatable Ayame back on our side!"
52115-57 = "Truly, her skills are beyond compare!"
52115-58 = "But the Artifact Spirits are immune to bullets?"
52115-62 = "Precisely. Our numbers and gusto are irrelevant."
52115-63 = "The only way to defeat the spirits is with the Authority given by Kuzunoha..."
52115-64 = "Not to be harsh, but even the talented President Ayame won't be that much help without the Hundred Lotus."
52115-65 = "Th-That's not true. Ayame is quite capable—"
52115-66 = "So what was your plan, Ayame? What if we didn't follow you? How would you have fought Nature's Beauty all on your own?"
52115-68 = "Well..."
52115-69 = "While I wouldn't be able to fight the Artifact Spirits, I figured that I could somehow target the tomes themselves."
52115-70 = "Somehow...? That sounds a little reckless for you, Ayame."
52115-71 = "You're right! Maybe this harsh weather has made me bolder!"
52115-72 = "But the truth is... I trusted Nagusa to follow. She's such a reliable friend."
52115-77 = "...Me?"
52115-78 = "Last night, I saw you wielding the Hundred Lotus like a pro."
52115-79 = "I think you're exactly what the Great Prophet Kuzunoha had in mind when she passed down the Authority."
52115-80 = "You were a vision of a true Hyakkaryouran President."
52115-81 = "Th-That's not true, Ayame. Compared to you, I'm not even—"
52115-82 = "You don't have to put yourself down like that, Nagusa."
52115-87 = "You're my best friend."
52115-92 = "You worked so hard to fulfill your role. You're stronger than me, and I'm so proud."
52115-93 = "You know, Nagusa, I always thought you had the potential to bloom into a beautiful flower."
52115-94 = "It's a shame I never found Kuzunoha...but that just means that she saw something in you that I do not possess."
52115-95 = "I promised to always be by your side, didn't I?"
52115-96 = "So right now...please be at mine. Help me carry out this mission."
52115-103 = "Of course."
52115-105 = "Ah... Now that's inspiring!"
52115-106 = "...All right! Let's use this burning passion to sweep the floor with Nature's Beauty!"
52115-107 = "Oh, how fun! It's like something out of a manga!"
52115-108 = "See, Renge! We ARE embracing your youth, together!"
52115-110 = "Haha... I'm glad to see you all so impassioned."
52115-111 = "Well, if Nagusa is fine with this, then I'll go along as well."
52115-112 = "...But did we really need to bring the brat?"
52115-118 = "I'm not here with you losers by choice! You dragged me along on this lame hike!"
52115-119 = "Well, we couldn't leave a minor unattended. Who knows what trouble she'd get into?"
52115-120 = "And besides, the village is safer if she's with us. We don't want her using her tome on them."
52115-122 = "You don't have to worry about that. We wrecked her Phantom Records last time."
52115-126 = "...Wait a minute. How DID she summon those Artifact Spirits last night?"
52115-130 = "Could Nature's Beauty possess another tome?"
52115-132 = "...It's a possibility. If Nature's Beauty only had one tome, they wouldn't be so stupid as to trust it with this idiot."
52115-133 = "Who are you calling an idiot?! Miss Kokuriko trusted me and I did a great job—"
52115-137 = "Renge, Yukari. Grab her arms."
52115-147 = "Wh-What are you doing?!"
52115-149 = "We'll frisk her. Let's see if she's hiding some pocket-sized tome."
52115-150 = "I will take the legs."
52115-158 = "Wh-What are you doing?! If you think this is going to work, you're sorely mistaken—"
52115-164 = "Eek?! Ugh... Hahaha! Hahahaha! S-Stop it...!"
52115-165 = "Here? Or is it here...?"
52115-166 = "S-Stop... Someone! Help! These weird girls are robbing me!"
52115-173 = "Kikyou, I've recovered a notebook!"
52115-174 = "Good job, Yukari."
52115-179 = "N-No... Not THAT book! Please!"
52115-180 = "Oh, this must be good! She's losing it!"
52115-181 = "Nagusa, open it up!"
52115-183 = "Very well. Let us see..."
52115-193 = "[log]Title[/log]"
52115-194 = "[log]The Coolest Bard Ever[/log]"
52115-198 = "[log]Written By[/log]"
52115-199 = "[log]Kujiki Shura[/log]"
52115-203 = "[log]Hails of bullets, even bombs,[/log]"
52115-205 = "[log]are useless against her power.[/log]"
52115-207 = "[log]The rumors of the strongest, coolest bard ever spread across Hyakkiyako.[/log]"
52115-211 = "[log]She, with beautiful eyes, as chilling as ice,[/log]"
52115-213 = "[log]reaches into minds and unleashes their inner darkness.[/log]"
52115-215 = "[log]All who oppose her shall pay the price with their BLOOD.[/log]"
52115-219 = "[log]With a single point, a mere snap[/log]"
52115-221 = "[log]her creations manifest and swarm[/log]"
52115-223 = "[log]towards the pathetic, foolish beings that cross her.[/log]"
52115-227 = "[log]In particular, she holds no mercy for the pathetic Hyakkaryouran.[/log]"
52115-229 = "[log]They will run back home crying with snot-covered faces.[/log]"
52115-233 = "[log]Because she is the ultimate bard[/log]"
52115-234 = "[log]feared by all.[/log]"
52115-238 = "Ah."
52115-239 = "Ah..."
52115-240 = "Hah..."
52115-241 = "[s] \"...Hm.\""
52115-247 = "Yukari, keep searching. That drivel cannot possibly be valuable."
52115-252 = "Oh, come on! That's all you have to say?"
52115-253 = "Did you...write this novel...?"
52115-254 = "That's a novel? It sounded like... Can you write fan fiction about yourself?"
52115-255 = "Ugh... Ughhh...!"
52115-256 = "How dare you! Searching through someone else's stuff without permission, then publicly reading their precious work aloud!"
52115-257 = "That's my intellectual property! Just imagine, what if someone heard that and they steal my idea and they make it a bestseller?"
52115-258 = "Do you have any idea what you've done?!"
52115-259 = "[s] \"THAT'S what you're worried about?\""
52115-260 = "Ha. While I see why you used a pseudonym..."
52115-261 = "...I wouldn't worry about someone stealing your idea, Shuro."
52115-265 = "I suppose... Besides, a book is more than an idea! They'd have to have the skills to execute my vision."
52115-269 = "Ahem. So... What did everyone think? Did you...like it?"
52115-270 = "I gather that you're speechless from awe, but I encourage you to share your positive feedback."
52115-271 = "How did you like my masterpiece?"
52115-276 = "Um, so... I feel that..."
52115-277 = "...Pardon me, Yukari. We must quicken our pace if we hope to arrive at the mansion before sundown."
52115-278 = "Y-Yes, Nagusa! This is no time for peer review!"
52115-280 = "There was no tome. What a waste of time."
52115-281 = "Well, at least she wasn't hurting anyone. Though I'm not thrilled with how she wrote us..."
52115-282 = "[s] \"...Perhaps reading more will help?\""
52115-288 = "Ugh... Aughhh..."
52115-289 = "SHUT UP!"
52115-291 = "Next Episode;Kadenokouji's Miko"

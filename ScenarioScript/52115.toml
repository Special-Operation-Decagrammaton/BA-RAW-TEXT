52115-55 = "3;렌게;05;녀석들의 꼬리를 밟은 시점에서 몰아쳐야지, 우물쭈물하다간 또다시 놓치고 말거라고."
52115-56 = "3;렌게;00;게다가 지금의 백화요란에는 최강의 전력인 아야메 부장도 합류했으니까!"
52115-57 = "3;유카리;14;맞사와요! 다시 한번 무적의 백화요란 전설을 이 자리에서 실현하는 것이어요!\n#3;em;[재잘]\n#3;hophop"
52115-58 = "3;아자미 변장;02;하지만 백물어는 단순한 방법으로 상대할 수 없을텐데요……"

52115-239 = "อ่า..."
52115-240 = "อ่าา..."
52115-241 = "[s] \"อืม...\""
52115-247 = "ยูคาริ หาใหม่เถอะ ต้องมีหนังสือลึกลับซ่อนอยู่ที่อื่นแน่ๆ"
52115-252 = "ทำไมแกล้งทำเป็นไม่รู้ไม่ชี้ล่ะ! อ่านไปก็ตั้งเยอะ!"
52115-253 = "นี่คือนิยายที่เธอเขียนเหรอ...?"
52115-254 = "ไม่หรอก มันแปลกเกินจะเรียกว่านิยายได้นะ นี่มันเรียกว่า..."
52115-255 = "อึก... อึกกก...!"
52115-256 = "ทำบ้าอะไรกันน่ะ! ค้นของของคนอื่นเค้าตามอำเภอใจ แล้วก็อ่านผลงานชิ้นที่เลอค่าต่อหน้าประชาชี#nได้ยังไง!"
52115-257 = "ถ้ามีใครได้ยินพล็อตเรื่องดั้งเดิมที่ฉันตั้งใจแต่งแล้วเอาไปเขียนเป็นนิยายจนดังเปรี้ยงปร้างขึ้นมา..."
52115-258 = "พวกเธอจะรับผิดชอบหรือเปล่า?!"
52115-259 = "[s] \"อ่า... กังวลเรื่องนั้นสินะ...?\""
52115-260 = "เรื่องนั้นฉันว่าไม่ต้องกังวลก็ได้นะ"
52115-261 = "ไม่น่าจะมีนักเขียนที่เอาพล็อตเรื่องแบบนั้นไปเขียนต่อได้มากนักหรอก..."
52115-265 = "มันก็จริงอยู่หรอก... เพราะไม่ว่าพล็อตเรื่องจะดีแค่ไหน แต่ถ้าทักษะการเขียนไม่ดีก็เอาไปสานต่อ#nลำบากอยู่แล้ว"
52115-269 = "อะแฮ่ม... แล้วทุกคนคิดว่า... พล็อตเรื่องของฉันเป็นยังไงบ้างล่ะคะ? เรื่องธรรมดาทั่วไปของฉันที่#nไม่ใช่เรื่องลึกลับน่ะ"
52115-270 = "ดูจากสีหน้าแล้ว ทุกคนคงประทับใจจนพูดไม่ออกกัน แต่ฉันอยากให้โอกาสพิเศษในการแสดงความ#nประทับใจต่อผลงานของฉันดูค่ะ"
52115-271 = "ผลงานของฉันเป็นยังไงบ้างคะ? คิดเห็นยังไงกับ <นักเล่าเรื่องลึกลับยิ่งใหญ่ที่สุดตลอดกาล> ...?"
52115-276 = "เอ่อ... ถ้าถามความคิดเห็นจากข้า..."
52115-277 = "ฉันว่าเรารีบกันก่อนเถอะ... ถ้าจะไปถึงคฤหาสน์นิพพานก่อนอาทิตย์ตกดิน เราน่าจะต้องเร่งฝีเท้ากันแล้วนะ"
52115-278 = "ถะ... ถูกต้องเจ้าค่ะ! ตอนนี้ไม่ใช่เวลามาแสดงความคิดเห็นหรอกเจ้าค่ะ!"
52115-280 = "ไม่มีหนังสือลึกลับงั้นเหรอ เสียเวลาเปล่าจริงๆ"
52115-281 = "ก็นะ ยังไงก็ดีอยู่หรอกที่สิ่งลึกลับในเรื่องไม่โผล่มาทำร้ายผู้คนไปทั่ว ส่วนเรื่องความสนุก ฉันไม่พูดถึงดีกว่า"
52115-282 = "[s] \"ครูว่าลองอ่านหนังสืออื่นๆ เยอะๆ ก็น่าจะดีนะ...?\""
52115-288 = "อึก... อึกกก..."
52115-289 = "นางุสะจังงงง!"
52115-291 = "ตอนต่อไป;มิโกะแห่งตระกูลคาเดโนะโคจิ"

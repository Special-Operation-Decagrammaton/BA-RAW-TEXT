52115-198 = "[log]ผู้แต่ง[/log]"
52115-199 = "[log]คุจิกิ ชูระ[/log]"
52115-203 = "[log]ทั้งกระสุนและระเบิดที่พรั่งพรูออกมา[/log]"
52115-205 = "[log]กลับไร้พลังเมื่ออยู่ต่อหน้าร่างกายที่แข็งแรงราวกับเหล็กกล้า[/log]"
52115-207 = "[log]ข่าวลือของนักเล่าเรื่องลึกลับยิ่งใหญ่ที่สุดตลอดกาลแพร่กระจายไปทั่วเฮียกคิยาโค[/log]"
52115-211 = "[log]ดวงตาของเธอที่เยือกเย็นราวกับน้ำแข็ง[/log]"
52115-213 = "[log]แม้จะอยู่ในความมืดมิด แต่ก็หลอกล่อใจผู้คนได้[/log]"
52115-215 = "[log]หากใครคิดขัดขืน จะต้องชดเชยด้วย[ruby=ลมหายใจ]เลือด[/ruby][/log]"
52115-219 = "[log]แค่การดีดนิ้วเพียงครั้ง[/log]"
52115-221 = "[log]สิ่งลึกลับน่าขนลุกที่เธอเรียกออกมา[/log]"
52115-223 = "[log]ก็พุ่งเข้าใส่คนโง่เขลาที่ทำให้นักเล่าเรื่องลึกลับโกรธได้[/log]"
52115-227 = "[log]โดยเฉพาะพวกเฮียกกะเรียวรันที่อวดดี ไม่มีทางอ่อนข้อให้เด็ดขาด[/log]"
52115-229 = "[log]ยัยพวกนั้นต้องวิ่งร้องไห้กลับบ้านแน่นอน[/log]"
52115-233 = "[log]และนี่คือสุดยอดนักเล่าเรื่องลึกลับ[/log]"
52115-234 = "[log]ที่ทุกคนต่างหวาดกลัว[/log]"

[translation]
52115-1 = "ตอนที่ 11;เส้นทางสู่นิพพาน"
52115-2 = "ทุ่งหิมะ ชายขอบโรงเรียนสาขาเอบิสุ"
52115-4 = "สรุปว่า... จริงเหรอที่บอกว่าสืบหาที่มั่นของพวกนั้นได้แล้ว?"
52115-9 = "อ๊ะ เมื่อกี้ฉันยังไม่ได้บอกงั้นเหรอ?"
52115-11 = "ยังไม่ได้บอกนะ"
52115-12 = "จู่ๆ รุ่นพี่ก็วิ่งออกมาโดยไม่พูดอะไรสักคำ พวกเราก็เลยตามมาเจ้าค่ะ..."
52115-17 = "ขอโทษๆ ว่ากันว่าภูตผีปีศาจหรือห้วงอัสดงจะแข็งแกร่งขึ้นเมื่อได้กลืนกินความมืดเข้าไปน่ะ..."
52115-18 = "สงสัยฉันจะใจร้อนไปหน่อยเพราะอยากรีบให้ทันก่อนพระอาทิตย์ตก"
52115-19 = "ฐานหลักของชมรมความงามของธรรมชาติอยู่แถวนี้เหรอ...?"
52115-20 = "แต่ว่าแม่หนูชูโระไม่ได้ให้เบาะแสมานี่เจ้าคะ? แล้วรู้ได้ยังไงเหรอเจ้าคะว่าที่มั่นอยู่ที่ไหน?"
52115-21 = "อย่างที่ฉันพูดไปตอนเช้า ฉันรู้ได้จากเศษซากของซึคุโมะคามิอันนี้น่ะ"
52115-26 = "นี่ไง ดูเครื่องหมายที่อยู่ตรงด้ามร่มสิ"
52115-27 = "นับตั้งแต่ได้ฟังข่าวลือว่ามีซึคุโมะคามิมาปรากฏตัวรอบๆ หมู่บ้าน ฉันก็จงใจทำเครื่องหมายไว้บนของ#nเก่าๆ พังๆ แล้วก็เอาไปวางทิ้งไว้แถวทางเข้าออกหมู่บ้านน่ะ"
52115-28 = "ถ้าซึคุโมะคามิเกิดจากหนังสือลึกลับของชมรมความงามของธรรมชาติ แค่เราตรวจสอบเครื่องหมายที่#nอยู่บนของเก่าๆ อันนั้น ก็พอเดาได้แล้วละว่าชมรมความงามของธรรมชาติอยู่ตรงไหน"
52115-30 = "มีวิธีแบบนั้นด้วยสินะ..."
52115-32 = "รับมือกับการโจมตีของศัตรูและคิดแผนการอันชาญฉลาดไปด้วยกันแบบนี้ สมกับเป็นหัวหน้าเฮียกกะเรียวรันเลยเจ้าค่ะ!"
52115-33 = "งั้นตอนนี้เรากำลังไปยังที่ที่ร่มคันนี้เคยอยู่งั้นเหรอ?"
52115-35 = "อื้อ ฉันเอาร่มที่มีเครื่องหมายนี้วางไว้ที่ทางเข้าออกทางทิศเหนือของหมู่บ้านน่ะ"
52115-36 = "เลยทางเข้าออกทางทิศเหนือของหมู่บ้านไปก็มีแต่ทุ่งหิมะแห้งแล้ง ที่นั่นดูไม่น่ามีอาคารหรือสิ่งปลูกสร้างพิเศษอะไร..."
52115-37 = "แต่ตามคำบอกเล่าของคนในพื้นที่ ถ้าเดินไปประมาณครึ่งวันก็จะเจอคฤหาสน์หลังหนึ่ง"
52115-38 = "คฤหาสน์ที่อยู่เลยทุ่งหิมะทางเหนือไป... หมายถึง <คฤหาสน์นิพพาน> สินะคะ"
52115-43 = "<คฤหาสน์นิพพาน> เหรอ...? ชื่อฟังดูน่าขนลุกจังเลย"
52115-44 = "ค่ะ ตามบันทึกบอกไว้ว่าเป็นคฤหาสน์ของตระกูลที่เคยปกครองดินแดนแถบนี้ แต่ตอนนี้ไม่มีใครมาเยี่ยมเยียน ก็เลยถูกทิ้งร้างไว้แบบนี้มาหลายสิบปีแล้วค่ะ"
52115-45 = "ฉันเองก็ไม่เคยไปที่นั่น ก็เลยไม่รู้ว่าคฤหาสน์นั้นอยู่ในสภาพไหน แต่คิดไม่ถึงเลยนะคะ..."
52115-46 = "อืม มีโอกาสสูงเลยละว่าสมาชิกชมรมความงามของธรรมชาติจะใช้ที่นั่นเป็นที่มั่นของตัวเอง"
52115-47 = "บางทีตำนานร้อยเรื่องราวที่ปรากฏตัวอยู่แถวนี้อาจจะอยู่ที่นั่นด้วยก็ได้"
52115-48 = "[s1] \"แต่ว่าจู่ๆ เราก็จะไปที่นั่นเลยได้เหรอ?\"\n[s2] \"แต่ที่นั่นอาจมีกับดักอะไรอยู่ก็ได้นะ...\""
52115-54 = "ไม่เป็นไรหรอกน่า! มีคำพูดโบราณที่ว่า 'ถ้าตัดสินใจแล้วก็อย่าลังเล' อยู่ใช่มั้ยล่ะ?"
52115-55 = "เราต้องรีบเข้าไปสืบเบาะแสของคนพวกนั้นสิ ถ้ามัวแต่ลังเลอยู่เดี๋ยวก็พลาดโอกาสไปหรอก"
52115-56 = "แถมตอนนี้เฮียกกะเรียวรันก็มีหัวหน้าอายาเมะที่เป็นกองกำลังสุดแข็งแกร่งอยู่ทั้งคนนะ!"
52115-57 = "ถูกต้องเจ้าค่ะ! เราต้องเปิดตำนานเฮียกกะเรียวรันผู้ไม่มีวันพ่ายแพ้ที่นี่เจ้าค่ะ!"
52115-58 = "แต่ตำนานร้อยเรื่องราวก็คงจะไม่ได้ปราบกันได้ง่ายๆ นะคะ..."
52115-62 = "ทุกคนลืมการต่อสู้เมื่อคราวก่อนไปแล้วเหรอ? ตำนานร้อยเรื่องราวเป็นภูตผีที่ยิงด้วยปืนธรรมดาๆ ไม่ได้หรอกนะ"
52115-63 = "ผู้ที่ปราบเรื่องลึกลับที่ออกมาจากหนังสือลึกลับได้น่ะ มีแต่ผู้ที่ได้รับการสืบทอดสิทธิ์จาก#nท่านผู้พยากรณ์ใหญ่คุซึโนฮะเท่านั้น..."
52115-64 = "ฉันก็ไม่อยากพูดแรงๆ หรอกนะ แต่ต่อให้เป็นหัวหน้าอายาเมะที่มีความสามารถรอบด้าน แต่ถ้าใช้พลังของเฮียกกุเร็นได้ไม่เต็มที่ก็คงทำอะไรไม่ได้มากหรอก"
52115-65 = "มะ... ไม่หรอก อายาเมะน่ะเก่งกว่าฉันมาก..."
52115-66 = "ถ้าพวกเราไม่ได้มาที่นี่ตั้งแต่แรก หัวหน้าคิดว่าจะจัดการตำนานร้อยเรื่องราวด้วยตัวเองยังไงเหรอ?"
52115-68 = "ไม่รู้สิ..."
52115-69 = "ถ้าเป็นเรื่องราวลึกลับที่ออกมาจากหนังสือลึกลับละไม่แน่ แต่ถ้าเป็นตัวหนังสือลึกลับเองหรือเจ้าของ#nหนังสือลึกลับนั่น ฉันคิดว่า 'ไม่ว่ายังไง' ก็น่าจะมีวิธีจัดการน่ะ อยู่หน้างานก็คงคิดออกเองนั่นแหละ"
52115-70 = "ถ้าอยู่หน้างานคงคิดออก...? หัวหน้าอายาเมะที่ฉันรู้จักเป็นคนที่วางแผนกลยุทธ์โดยไม่มีแผนรับมือ#nอย่างงั้นเหรอ?"
52115-71 = "นั่นสินะ เวลาจนตรอกจริงๆ นิสัยคนเราอาจเปลี่ยนไปจนเรากระตือรือร้นขึ้นมาหน่อยก็ได้"
52115-72 = "และเหนือสิ่งอื่นใด... ฉันไว้ใจนางุสะ เพื่อนที่เชื่อถือได้ของฉัน"
52115-77 = "ฉันน่ะเหรอ...?"
52115-78 = "เมื่อคืนตอนเห็นนางุสะใช้พลังของเฮียกกุเร็นได้อย่างอิสระ ฉันก็คิดได้น่ะ"
52115-79 = "คนนี้สินะ ทายาทผู้มีสิทธิ์โดยชอบธรรมที่ได้รับการยอมรับจากผู้พยากรณ์ใหญ่คุซึโนฮะ"
52115-80 = "นี่สินะ คนที่เหมาะสมจะเป็นหัวหน้าเฮียกกะเรียวรัน"
52115-81 = "มะ... ไม่ใช่อย่างนั้นหรอก อายาเมะ ถ้าเทียบกับอายาเมะแล้ว ฉันมันแค่..."
52115-82 = "ไม่ต้องดูถูกตัวเองแบบนั้นหรอก นางุสะ"
52115-87 = "นางุสะเป็นเพื่อนคนสำคัญของฉันไม่ใช่เหรอ?"
52115-92 = "เพื่อนคนสำคัญของฉันพยายามอย่างหนักจนเก่งกว่าฉันและได้รับการยอมรับจากสมาชิกคนอื่นใน#nชมรมทั้งที ฉันจะอิจฉาเพื่อนคนนี้ได้ยังไงกัน"
52115-93 = "นางุสะ ฉันคิดมาตลอดเลยละว่าเธอมีศักยภาพที่จะผลิบานเป็นดอกไม้ที่สวยงามได้ในสักวัน"
52115-94 = "ถึงฉันจะเสียดายที่ตัวเองไม่ได้รับการยอมรับจากท่านคุซึโนฮะ... แต่นั่นก็แปลว่าเธอมีอะไรบางอย่าง#nที่ฉันไม่มีน่ะ"
52115-95 = "จำที่สัญญากันก่อนหน้านี้ได้มั้ย นางุสะ ไม่ว่าในยามที่เธออ่อนแอหรือเข้มแข็ง ฉันก็จะอยู่ข้างเธอเสมอ"
52115-96 = "เพราะงั้นตอนนี้... ช่วยฉันทำภารกิจสุดท้ายในฐานะหัวหน้าเถอะนะ"
52115-103 = "ได้สิ..."
52115-105 = "ฮึ่ม... แบบนี้ละที่เรียกว่าวัยรุ่น"
52115-106 = "ดีละ...! เอาแพชชั่นนี้ไปดับพวกชมรมความงามของธรรมชาติกันเลย!"
52115-107 = "ข้าเคยเห็นบทสนทนาแบบนี้จากการ์ตูนกีฬาที่เคยอ่านด้วยเจ้าค่ะ!"
52115-108 = "วัยรุ่นที่รุ่นพี่เรนเกะพูดถึงบ่อยๆ คือสิ่งที่ทำให้หัวใจเต้นแรงแบบนี้เองสินะเจ้าคะ...!"
52115-110 = "แหะๆ... บรรยากาศเปลี่ยนไปจนฉันคัดค้านอะไรอีกไม่ได้แล้วนะคะ"
52115-111 = "ก็นะ ถ้ารุ่นพี่นางุสะไม่ว่าอะไร ฉันก็ไม่คิดจะคัดค้านหรอก"
52115-112 = "ว่าแต่... พาเด็กคนนี้มาด้วยทำไมเหรอ?"
52115-118 = "คิดว่าฉันมาด้วยเพราะอยากมาหรือไง?! ฉันโดนพวกเธอลากมาเองต่างหาก!"
52115-119 = "ถ้าทิ้งเด็กไว้ตามลำพัง เราก็ไม่รู้นี่นาว่าจะไปก่อเรื่องอะไรอีก อย่างน้อยก็ต้องให้อยู่ในสายตาสิ"
52115-120 = "อีกอย่างนะ ใครจะไปรู้ล่ะ? บางทีระหว่างที่พวกเราไม่อยู่ เด็กน้อยคนนี้อาจใช้หนังสือลึกลับแล้วเรียก#nตำนานร้อยเรื่องราวออกมาอีกก็ได้..."
52115-122 = "เรื่องนั้นไม่ต้องกังวลไปหรอก หนังสือลึกลับที่ชื่อ <อิโนะ โมโนโนเคะ โรคุ> ที่ยัยตัวกะเปี๊ยกคนนี้#nเคยมีน่ะถูกทำลายไปตั้งแต่คราวก่อนแล้ว..."
52115-126 = "เดี๋ยวก่อนนะ... ถ้าใช้หนังสือลึกลับที่เคยใช้ไม่ได้แล้ว แล้วเมื่อคืนยัยเด็กคนนี้เรียกซึคุโมะคามิออกมา#nได้ยังไง?"
52115-130 = "หรือว่า... ชมรมความงามของธรรมชาติไม่ได้มีหนังสือลึกลับแค่เล่มเดียวเจ้าคะ?!"
52115-132 = "ก็เป็นไปได้นะ... ถ้าชมรมความงามของธรรมชาติมีหนังสือลึกลับแค่เล่มเดียว ก็คงไม่ให้ยัยเด็กตัวกะเปี๊ยกที่ชอบก่อปัญหาคนนี้เก็บไว้กับตัวหรอก"
52115-133 = "ว่าใครเป็นเด็กตัวกะเปี๊ยกที่ชอบก่อปัญหาน่ะ! ท่านโคคุริโกะไว้ใจในฝีมือของฉัน ก็เลยให้หนังสือลึกลับไว้ต่างหาก..."
52115-137 = "เรนเกะ ยูคาริ จับแขนเด็กคนนี้ไว้"
52115-147 = "จะ... จะทำอะไรน่ะ?!"
52115-149 = "ฉันจะค้นตัวเธอ ถ้าแอบซ่อนหนังสือลึกลับไว้ละเป็นเรื่องแน่"
52115-150 = "ดีเลย ฉันจะช่วยจับขาไว้อีกแรง"
52115-158 = "ทะ... ทำอะไรน่ะ! คิดว่าทำแบบนี้แล้วพวกเธอจะหาหนังสือลึกลับเจองั้นเหรอ..."
52115-164 = "เฮือก?! อึก... อะฮะฮ่า! อะฮะฮ่าฮ่า! ยะ... หยุดเลยนะ...!"
52115-165 = "ตรงนี้เหรอ? หรือว่าตรงนี้...?"
52115-166 = "ยะ... หยุดนะ... ฉันไม่ยกโทษให้แน่...!"
52115-173 = "รุ่นพี่คิเคียว ตรงนี้มีหนังสือขนาดพกพาซ่อนอยู่เจ้าค่ะ!"
52115-174 = "ดีมาก ยูคาริ"
52115-179 = "ละ... เล่มนั้น... เล่มนั้นไม่ได้นะ!"
52115-180 = "โฮ่ ดูจากปฏิกิริยาแล้วน่าจะเป็นหนังสือลึกลับจริงๆ หรือไม่ก็หนังสือที่สำคัญพอๆ กับหนังสือลึกลับ#nเลยสินะ?"
52115-181 = "รุ่นพี่นางุสะ รีบเปิดดูเนื้อหาข้างในเร็ว!"
52115-183 = "อื้อ ไหนดูซิ..."

52115-64 = "3;키쿄;99;심한 소리를 하고 싶지는 않지만, 아무리 다재다능한 아야메 부장이라 하더라도 백련의 힘을 제대로 사용할 수 없다면 별 도움이 되지 않을 거야."
52115-65 = "3;나구사ND;04;그, 그렇진 않아. 아무리 나라도 해도 아야메에 비하면—\n#3;em;[땀]"

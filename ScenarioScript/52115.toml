52115-26 = "3;아야메;03;여기, 우산의 손잡이에 새겨진 표식이 보이지?"
52115-27 = "3;아야메;00;전에 마을 근처에 츠구모가미가 나타난다는 소문을 들었을 때부터, 나는 일부러 오래되고 낡은 물건들에 특수한 표식을 새겨 마을 주변의 출입로에 방치해 놓았어."
52115-28 = "3;아야메;99;츠구모가미가 화조풍월부의 괴서에 의해 태어난다면, 그 재료가 된 낡은 물건에 새겨진 표식을 확인하는 것만으로도 화조풍월부가 어디서 왔는지 추측할 수 있겠지."

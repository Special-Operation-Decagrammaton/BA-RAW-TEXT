52115-44 = "3;아자미 변장;04;네. 기록에 의하면 먼 옛날 이 일대의 영지를 다스리던 가문의 저택이라고 하던데, 현재는 찾는 사람이 아무도 없어서 수십 년 넘게 폐가처럼 방치되어 있었거든요."
52115-45 = "3;아자미 변장;06;저도 직접 가본 적은 없어서 어떤 형태로 방치되었는지 알지는 못했는데, 설마……"

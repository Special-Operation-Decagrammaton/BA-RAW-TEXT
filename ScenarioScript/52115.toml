52115-35 = "3;아야메;03;응. 이 표식이 새겨진 우산은 마을의 북쪽 출입로에 놔둔 것이거든."
52115-36 = "3;아야메;99;마을의 북쪽 출입로 너머로는 이처럼 척박한 설원이 펼쳐져 있을 뿐, 특별한 건물이나 구조물은 없는 것 같지만……"
52115-37 = "3;아야메;05;주민들의 말에 의하면 한나절 정도 떨어진 거리에 오래된 저택 하나가 있다고 했어."
52115-38 = "3;아자미 변장;02;이 북쪽 설원 너머에 있는 저택이라면…… <피안의 저택>을 말씀하시는 것이군요.\n#3;em;…"

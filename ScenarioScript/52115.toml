52115-30 = "3;렌게;02;과연, 그런 방법이 있었나……"
52115-31 = "#all;hide"
52115-32 = "2;키쿄;00\n4;유카리;10;적의 공격에 대처하면서도 그런 기책을 떠올리시다니, 역시 백화요란의 부장다우셔요!\n#4;em;[반짝]\n#4;hophop"
52115-33 = "2;키쿄;02;그럼 우리는 지금 이 표식이 가리키는 방향으로 가고 있는 거야?"

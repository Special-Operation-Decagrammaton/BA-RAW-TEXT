1006105-22 = "3;사쿠라코;07;선생님께서 저의 비밀을, 들어주셨으면 합니다.\n#3;closeup"
1006105-23 = "[s1] \"비밀이라니? 무슨 일 있어?\"\n[s2] \"고백이라니? 무슨 일 있어?\""
1006105-24 = "#wait;10"
1006105-25 = "#wait;10"
1006105-26 = "3;사쿠라코;99;후후. 그렇지 않다고도, 그렇다고도 할 수 있는 이야기겠네요.\n#3;closeup"
1006105-27 = "3;사쿠라코;01;그리고 어쩌면, 사실 선생님이라면, 어느 정도 예상하고 계시는 일일 수도 있습니다.\n#3;em;[반응]\n#3;closeup"
1006105-28 = "3;사쿠라코;02;하지만……. 사실 지금도 꽤 망설이고 있답니다.\n#3;closeup"
1006105-29 = "3;사쿠라코;01;선생님께 폐가 되지는 않도록 하겠지만, 어쩌면 선생님께 또 하나의 근심거리를 얹어드릴 수도 있는 일이니까요.\n#3;closeup"
1006105-30 = "3;사쿠라코;99;언급하는 것 자체만으로도……. 말이죠.\n#3;closeup"
1006105-31 = "#st;[0,0];instant;1;"
1006105-32 = "#clearST"

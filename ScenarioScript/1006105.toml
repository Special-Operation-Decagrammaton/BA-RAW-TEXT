[translation]
1006105-1 = "祕密的夜晚"
1006105-2 = "（照櫻子所說，前往了位於大教堂內部的迴廊）"
1006105-3 = "（因為時間很晚，燈都已經關閉，也感受不到人的氣息）"
1006105-4 = "歡迎您，老師。"
1006105-5 = "我一直都在此等候著您。"
1006105-10 = "這麼晚的時間，您還願意赴約，真是萬分感謝……"
1006105-11 = "於此同時，我也對您感到很抱歉。"
1006105-12 = "因為我需要一個不會引人注目的地方……#n所以才會在這種時候邀請您，真是非常抱歉。"
1006105-13 = "……這是……我個人的問題。"
1006105-14 = "我想……這裡將成為我坦承的地方。"
1006105-15 = "雖然平常聽他人訴說祕密、與其共同祈禱是我的職責……"
1006105-16 = "但今天……此時此刻……"
1006105-22 = "我希望老師您，能聽我訴說心中的祕密。"
1006105-23 = "[s1]「坦承……？」\n[s2]「祕密……？」"
1006105-26 = "呵呵……也許會和老師期待出現的話題有所不同。"
1006105-27 = "不過，或許老師早已心裡有數了也說不定呢。"
1006105-28 = "但其實……我現在仍相當迷惘。"
1006105-29 = "我很想盡可能避免造成老師的困擾……#n然而……很可能會事與願違。"
1006105-30 = "就連談論這件事……都有增加您煩惱的可能性。"
1006105-34 = "如果您不想聽，那麼即便是現在也沒關係。#n無須在意我所說的話，就這麼回到夏萊也無妨。"
1006105-35 = "我在此發誓，不會因此而感到失望或難過。"
1006105-36 = "[s3]「身為老師很難這麼做呢……」\n[s4]「反而讓我更在意了。」"
1006105-39 = "……這樣啊。呵呵。"
1006105-40 = "我也有預感您會這麼說。#n有鼓起勇氣真是太好了。"
1006105-41 = "那麼……"
1006105-45 = "要不要稍微到外頭吹吹風呢？"
1006105-52 = "其實不管是我，還是修女會的大家……"
1006105-53 = "都很清楚這所學園裡發生的各種事情，不分日夜地加以處理。"
1006105-54 = "從普通的事──到連脫口而出都有所忌諱的事情。"
1006105-55 = "由於修女會是有著古老歷史的組織，#n即便有一兩個無法公開的祕密也不奇怪吧？"
1006105-56 = "這也是──作為一個組織必然會發生的事。"
1006105-57 = "而這一點……其他夥伴並不清楚。#n也許會有人認為這是經典上的知識……"
1006105-58 = "無論是以什麼樣的方向、形式，就算有切實的理由……#n要對他人開口也有困難。"
1006105-59 = "即便對方是老師──"
1006105-60 = "要說明一切也有困難……我的煩惱幾乎都是這樣的事情──"
1006105-65 = "……那個……"
1006105-66 = "明明告訴您有話想說，卻無法觸及具體的內容……#n真是非常抱歉。"
1006105-67 = "[s5]「沒關係。比那更重要的，」\n[s6]「是櫻子願意向我傾訴這件事。」"
1006105-70 = "老師……"
1006105-71 = "……呵呵。"
1006105-72 = "……總覺得煩惱似乎已經解決了呢。"
1006105-73 = "您說的對……"
1006105-79 = "其實……這就是我今天的目的。"
1006105-82 = "― 雖然想盡可能[wa:3800] "
1006105-84 = "― 不要對老師有所隱瞞……[wa:600] "
1006105-87 = "― 但以我的立場來說，"
1006105-89 = "― 要向您揭示一切有些困難──[wa:1320] "
1006105-92 = "― 不過，[wa:1400] "
1006105-94 = "― 我認為即便只是「存在著祕密這個事實」……[wa:2200] "
1006105-97 = "― 能夠傳達給您，真是太好了。[wa:2330] "
1006105-100 = "― 我不認為[wa:1560] "
1006105-102 = "― 能夠獲得您的諒解。[wa:90] "
1006105-105 = "― 也不會有所盼望……"
1006105-108 = "― 儘管如此，想把我[wa:1810] "
1006105-110 = "― 真實的一面展現給您的心情……還是有的。[wa:1920] "
1006105-113 = "― 那個……[wa:1050] "
1006105-116 = "― 這樣的我真的可以嗎，"
1006105-118 = "― 我也曾對此感到不安。[wa:780] "
1006105-121 = "― 比想像中更快[wa:1480] "
1006105-123 = "― 獲得答案了呢。[wa:360] "
1006105-126 = "― 真的……非常謝謝您，老師。[wa:3930] "
1006105-129 = "為老師進行的祈禱能夠比以往更真誠，讓我覺得很開心。"
1006105-130 = "希望老師身邊發生的一切都能充滿幸福。"
1006105-131 = "我會秉持比以往更真誠的心情……"
1006105-135 = "……獻上祈禱。在我醒著的每一刻、每一個瞬間……"
1006105-136 = "為了老師。"
1006105-138 = "（之後和櫻子在教堂附近散步，結束後便回到了夏萊）"

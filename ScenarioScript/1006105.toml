1006105-10 = "3;사쿠라코;99;이렇게 늦은 시간인데도 부름에 응해 주시다니…….\n#3;em;…"
1006105-11 = "3;사쿠라코;02;감사하고, 동시에 죄송할 따름입니다.\n#3;greeting"
1006105-12 = "3;사쿠라코;01;굳이 이런 시간, 이런 곳으로 부탁드린 이유는, 다른 사람들이 없는 곳이 필요했기 때문이지요."
1006105-13 = "3;사쿠라코;99;……그렇습니다. 이것은 저의 지극히 개인적인 용무."
1006105-14 = "3;사쿠라코;02;즉, 제 고백의 장소가 되겠군요.\n#3;em;[반응]"
1006105-15 = "3;사쿠라코;01;평상시에는 늘 다른 분들의 비밀을 들어 드리고, 또 함께 기도해 드리는 게 저의 일입니다만."
1006105-16 = "3;사쿠라코;99;오늘만큼은, 지금만큼은……."
1006105-17 = "#st;[0,0];instant;1;"

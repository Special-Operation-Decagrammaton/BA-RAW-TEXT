[translation]
1006105-1 = "เดินเล่นในทางเชื่อมภายใน"
1006105-2 = "(คุณครูมุ่งหน้าไปยังมหาวิหารตามเส้นทางที่ซากุระโกะบอกมา)"
1006105-3 = "(นี่เป็นเวลาดึกมากแล้ว ไฟทุกดวงจึงปิดอยู่ และเหมือนจะไม่มีใครอยู่ด้วย)"
1006105-4 = "มาแล้วเหรอคะคุณครู"
1006105-5 = "ฉันกำลังรออยู่เลยค่ะ"
1006105-10 = "เวลาดึกดื่นป่านนี้ก็ยังออกมาหาตามที่ฉันขอ..."
1006105-11 = "ฉันทั้งรู้สึกขอบคุณและก็ต้องขอโทษด้วยจริงๆ ค่ะ"
1006105-12 = "เหตุผลที่ฉันขอให้คุณครูมาหาในเวลาและสถานที่แบบนี้ ก็เพราะไม่อยากให้คนอื่นเห็นน่ะค่ะ"
1006105-13 = "...ใช่แล้วค่ะ นี่เป็นเรื่องส่วนตัวมากๆ ของฉัน"
1006105-14 = "งั้นที่นี่คงเป็นสถานที่แห่งการสารภาพสินะคะ"
1006105-15 = "ในเวลาปกติแล้ว งานของฉันคือรับฟังความลับของคนอื่น หรือไม่ก็สวดอธิษฐานไปพร้อมกับคนอื่นค่ะ"
1006105-16 = "แต่ในวันนี้ ตอนนี้..."
1006105-22 = "ฉันอยากให้คุณครูช่วยรับฟังความลับของฉันค่ะ"
1006105-23 = "[s1] \"ความลับ? มีเรื่องอะไรเหรอ?\"\n[s2] \"ให้ครูฟังความลับ มีเรื่องอะไรหรือเปล่า?\""
1006105-26 = "ฮุฮุ จะว่าไม่มีก็ไม่มี แต่มันก็... เหมือนจะมีค่ะ"
1006105-27 = "ฉันว่านี่อาจจะเป็นเรื่องที่คุณครูก็คาดไว้อยู่แล้วด้วยค่ะ"
1006105-28 = "แต่ว่า... ที่จริงแล้วฉันก็ยังลังเลอยู่ค่ะ"
1006105-29 = "ฉันไม่อยากทำให้คุณครูต้องเดือดร้อน แต่ถ้าเล่าให้ฟัง คุณครูอาจจะเป็นกังวลขึ้นมาก็ได้ค่ะ"
1006105-30 = "จริงๆ แค่การถูกพูดถึงก็น่าเป็นกังวลแล้ว..."
1006105-34 = "ตอนนี้ยังพอมีเวลาให้ตัดสินใจค่ะ ถ้าคุณครูไม่ต้องการ ก็กลับชาเล่ต์ได้นะคะ"
1006105-35 = "ฉันสาบานว่าจะไม่ผิดหวัง และจะไม่เสียใจด้วยค่ะ"
1006105-36 = "[s3] \"คนเป็นครูน่ะ ทำแบบนั้นไม่ได้หรอก\"\n[s4] \"แบบนี้ยิ่งน่าสงสัยเข้าไปอีก\""
1006105-39 = "ฮุฮุ งั้นเหรอคะ? นี่สินะคุณครู..."
1006105-40 = "ฉันแอบคิดไว้แล้วว่าคุณครูต้องเป็นแบบนี้ ก็เลยลองรวบรวมความกล้าขอให้คุณครูมาพบน่ะค่ะ... ค่อยยังชั่วหน่อยนะคะ"
1006105-41 = "งั้นก่อนอื่นก็..."
1006105-45 = "ออกไปเดินรับลมกันก่อนมั้ยคะ?"
1006105-52 = "ความจริงแล้วทั้งฉันและซิสเตอร์คนอื่นๆ..."
1006105-53 = "ต่างก็ได้รู้เรื่องราวที่ถ่ายทอดออกมาเป็นถ้อยคำได้ยาก และบางครั้งก็ต้องรับมือกับเรื่องเหล่านั้นค่ะ"
1006105-54 = "ค่ะ มันเป็นความจริงค่ะ"
1006105-55 = "เพราะว่าสถานที่ที่มีประวัติศาสตร์และขนาดเท่าชมรมซิสเตอร์มักมีความลับอยู่เสมอ"
1006105-56 = "ก็เลยเป็นเรื่องที่หลีกเลี่ยงไม่ได้ค่ะ"
1006105-57 = "แน่นอนว่าเรื่องนี้เป็นเรื่องที่ซิสเตอร์ส่วนใหญ่จะไม่รู้กันค่ะ หรือถ้าหากรู้ ก็คงรู้สึกว่ามันเหมือนการเรียน#nคัมภีร์ค่ะ"
1006105-58 = "ไม่ว่าจะในทิศทางใด ในรูปแบบไหน... หรือด้วยเหตุผลอะไร มันก็เป็นเรื่องที่ยากเกินกว่าจะบอกกับทุก#nคนน่ะค่ะ"
1006105-59 = "และถึงคุณครูจะได้ชื่อว่าคุณครูก็เถอะ"
1006105-60 = "แต่ยังไงฉันก็ขอโทษด้วยนะคะที่ฉันไม่สามารถบอกในสิ่งที่ฉันกังวลได้"
1006105-65 = "อืม รู้สึกผิดจังเลยค่ะ..."
1006105-66 = "ฉันบอกคุณครูว่ามีความลับจะบอก แต่พอถึงเวลาเข้าจริง ก็ไม่กล้าพูดออกมาอยู่ดี ฉันขอโทษจริงๆ นะคะ"
1006105-67 = "[s5] \"จะเป็นความลับหรืออะไรก็ไม่สำคัญหรอก\"\n[s6] \"เรื่องที่ครูสนใจคือเรื่องของซากุระโกะนะ\""
1006105-70 = "คุณครู..."
1006105-71 = "...ฮุฮุ"
1006105-72 = "เหมือนได้ฟังคำตอบจากคุณครูโดยที่ไม่ต้องเล่าเลยนะคะ"
1006105-73 = "...ค่ะ"
1006105-79 = "ความจริงแล้ว... มันเป็นจุดประสงค์ในวันนี้ของฉันน่ะค่ะ"
1006105-82 = "― หากเป็นไปได้ ฉันไม่อยาก[wa:3120] "
1006105-84 = "― ปิดบังคุณครูหรอกค่ะ...[wa:160] "
1006105-87 = "― ด้วยสถานะของฉัน"
1006105-89 = "― คงจะเปิดเผยทุกอย่างไม่ได้...[wa:720] "
1006105-92 = "― แต่ถึงยังไง[wa:1080] "
1006105-94 = "― สำหรับฉัน แค่ได้บอกเรื่องที่ว่า[wa:1760] "
1006105-97 = "― 'ที่จริงแล้วมีความลับ' ก็ถือว่าโชคดีแล้วค่ะ[wa:1130] "
1006105-100 = "― ฉันไม่คิดว่าคุณครู[wa:1000] "
1006105-102 = "― จะเข้าใจหรอกค่ะ[wa:10] "
1006105-105 = "― และฉันก็ไม่ได้คาดหวังเอาไว้ด้วย..."
1006105-108 = "― แต่ถึงยังไง ฉันก็รู้สึกอยาก...[wa:930] "
1006105-110 = "― เปิดเผยตัวจริงของฉัน...ให้คุณครูได้เห็นค่ะ[wa:1000] "
1006105-113 = "― ฉัน...[wa:970] "
1006105-116 = "― กังวลว่า..."
1006105-118 = "― คุณครูจะโอเคหรือเปล่าที่ฉันเป็นแบบนี้...[wa:10] "
1006105-121 = "― แต่กลับได้รับคำตอบเรื่องนั้น[wa:600] "
1006105-123 = "― เร็วกว่าที่คิดอีกนะคะ[wa:10] "
1006105-126 = "― ขอบคุณจริงๆ ค่ะ...คุณครู[wa:3490] "
1006105-129 = "ฉันดีใจที่จะได้อธิษฐานเพื่อคุณครูอย่างจริงใจมากกว่าแต่ก่อนค่ะ"
1006105-130 = "ขอให้งานทุกสิ่งที่คุณครูทำและอนาคตข้างหน้าของคุณครูมีแต่ความยินดีและโชคดีนะคะ"
1006105-131 = "ในทุกขณะที่ลืมตามองโลกอยู่"
1006105-135 = "ฉันจะอธิษฐานอย่างเบาใจและจริงใจ"
1006105-136 = "...เพื่อคุณครูค่ะ"
1006105-138 = "(จากนั้นคุณครูกับซากุระโกะก็เดินเล่นในวิหารต่อ และหลังจากพูดคุยกันเสร็จ คุณครูก็กลับชาเล่ต์)"

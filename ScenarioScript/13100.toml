[translation]
13100-1 = "Episode 10;That Day"
13100-3 = "I-I guess, but...trying to fix a problem with violence isn't really fixing anything... It just continues the cycle..."
13100-4 = "And if you keep resorting to fighting, soon that's the only way you'll know how to resolve conflict..."
13100-8 = "I didn't become president by matter of convenience. I wanted it. I wanted to be president."
13100-9 = "We can't blame the people who were just looking to ease their suffering, Hoshino. It's really the natural disasters' fault!"
13100-13 = "Is this a dream? Or maybe a miracle…? Yeah! That's it! It's definitely a miracle!"
13100-23 = "Back then...I was so full of rage."
13100-25 = "I was angry over Abydos' state... "
13100-26 = "Angry that every time you thought, maybe you could relax, another sandstorm would devastate us. Angry about the unrelenting desertification...endless days without rain...the brutal cold of the desert at night..."
13100-29 = "...the irresponsible students who abandoned Abydos...apathetic citizens and the incompetent former student council..."
13100-30 = "...criminals who took advantage of hard times...the pitiful adults..."
13100-32 = "...the student council president, who had no sense of urgency...who kept making mistakes..."
13100-34 = "But most of all, myself. Me, who couldn't solve anything..."
13100-37 = "I was angry about everything. "
13100-38 = "That's not exactly right... I believed in my rage. I thought it was the only solution."
13100-40 = "As if the strength of my anger would somehow just fix everything."
13100-44 = "Ta-da!  "
13100-45 = "Look, Hoshino! I finally found one of those old Abydos Oasis Festival posters!"
13100-46 = "Can you believe the oasis used to be the size of a lake? Here, here! Take it, as a souvenir! "
13100-47 = "It's incredible, isn't it? If we had some kind of miracle, people might start coming back here! Just imagine it!"
13100-48 = "Miracles don't exist."
13100-49 = "Something like that isn't going to happen!"
13100-50 = "Wha— "
13100-51 = "Who the hell's gonna come visit some random spot in the middle of a desert? For once in your life, will you stop daydreaming?!"
13100-52 = "S-Sorry, Hoshino... I-It's because I'm a dummy..."
13100-53 = "...!!"
13100-54 = "Talking about miracles, luck, fortune..."
13100-55 = "You're the president of the Abydos Student Council! Learn to take that responsibility more seriously!"
13100-59 = "*rip* *riiip* *riiip*"
13100-67 = "That's when...that day came."
13100-68 = "..."
13100-69 = "That day, Yume had cooked up some trouble, and, as usual, I was cleaning up the aftermath."
13100-70 = "Trouble...?"
13100-74 = "...Something small. "
13100-75 = "Some thugs who had wandered into the Abydos District started a fight, and Yume went to break it up. Instead, she almost got herself kidnapped."
13100-76 = "S-Seriously...?"
13100-77 = "I think that from the beginning, it was a trap set for the student council president. For Yume."
13100-78 = "In the end, I had to intervene and dismantle the gang entirely."
13100-79 = "If I think about it, they were definitely outsiders. Anyone from Abydos would've known our student council didn't have a cent to their name anymore. We hadn't been Kivotos' financial powerhouse for a long time."
13100-82 = "I was just mad that day. Angry about everything, frustrated, and at the end of my rope."
13100-83 = "Like I said, it was such a small thing. But I just couldn't handle it."
13100-84 = "Occurrences like those happened all the time, but I just lost my cool that day. I left her and went home by myself."
13100-87 = "...I was just lashing out. I didn't mean anything I said. I was just going to give her the silent treatment for a few days, and then come back."
13100-88 = "So I turned off my phone, lazed around for two days, and came back to the school. But, by then, Yume was gone."
13100-91 = "I'm back, Yume."
13100-92 = "...Forget what happened. I'm totally over it."
13100-93 = "More importantly..."
13100-100 = "...Yume?"
13100-102 = "And from that day on, the search for Yume consumed me. I searched all over Abydos."
13100-117 = "I'm sorry...Hoshino. The signal is cutting out— "
13100-118 = "There was an urgent matter, so I had to cross the desert, and— *tchhhk* I...sandstorm—"
13100-122 = "Hoshino... I'm sorry. "
13100-123 = "I forgot the compass again."
13100-124 = "I wrote you a note, but I'm leaving you a message here too. Please be sure to get my notebook. I left it for you."
13100-125 = "It's at *tchhhk*. It should be easy for you to find!"
13100-126 = "Hoshino... I..."
13100-128 = "...And then, Yume was found in the Abydos Desert, thirty three days later."
13100-130 = "..."
13100-131 = "..."
13100-132 = "..."
13100-138 = "She must have gotten stranded by a sandstorm when she was trying to cross the desert for this urgent matter."
13100-139 = "Once the storm hit, she probably strayed off the path to avoid it...but the storms change the landscape of the desert. And there was no signal out there. I had no way of making contact with her."
13100-140 = "She...couldn't find her way back."
13100-141 = "The causes of death were dehydration and exhaustion. "
13100-147 = "Seriously... Hahaha... I've been looking for you for so long..."
13100-148 = "...Yume."
13100-150 = "...I recovered Yume's remains, as well as her weapon, shield, and other belongings, but...I couldn't find her notebook."
13100-151 = "I searched and searched for even a hint of a clue about her urgent matter, and what really happened. "
13100-152 = "But I couldn't find anything."
13100-153 = "Where in the world was this place she left her notebook?"
13100-154 = "I tried everywhere I could think of, but...it was nowhere to be found."
13100-155 = "That notebook has to have answers on what happened to her..."
13100-156 = "Just why is it...that I couldn't find that damned notebook...?"
13100-161 = "(If...Nephthys was somehow involved in Student Council President Yume's death...)"
13100-162 = "(Then I...)"
13100-165 = "Why...? Yume, why?"
13100-180 = "Yikes?!"
13100-181 = "Huh? The doorbell again?!"
13100-187 = "...It's me. "
13100-189 = "Isn't that...Overseer Suou?"
13100-191 = "Apologies if I startled you. I've come with a Nephthys officer for our appointment. Did you forget?"
13100-195 = "May I come in, Miss?"
13100-197 = "Butler..."
13100-200 = "I've come to discuss the secrets of the Trans-Desert Railway."
13100-202 = "...Yes. I've been waiting."
13100-211 = "Should we get out of here? "
13100-212 = "Yes. Let's go to the Foreclosure Task Force room."
13100-215 = "Next Episode;Secret Revealed"

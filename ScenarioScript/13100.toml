[translation]
13100-1 = "ตอนที่ 10;วันนั้น"
13100-3 = "ตะ... แต่ว่า... การแก้ปัญหาด้วยการต่อสู้มัน... อืม... มันเหมือนไม่ได้แก้ไขปัญหาจริงๆ แต่กลับเป็นว่า#nยังย่ำอยู่กับที่น่ะ..."
13100-4 = "แล้วพอชินกับมันเข้า เราก็จะเอาแต่แก้ไขปัญหาด้วยวิธีที่ไม่ถูกต้องแบบนั้น..."
13100-8 = "โฮชิโนะจัง ใช่ว่าฉันจะรับตำแหน่งนี้มาส่งๆ หรอกนะ ฉันอยากเป็นประธานสภานักเรียนอยู่แล้วน่ะ"
13100-9 = "ไม่หรอก โฮชิโนะจัง ที่เป็นอย่างนี้เพราะภัยพิบัติจากธรรมชาติต่างหาก เราจะพูดแบบนั้นกับคนที่ได้รับ#nความเดือดร้อนจากเรื่องนี้ไม่ได้นะ"
13100-13 = "นี่มันความฝันหรือเปล่า...? หรือจะเป็นปาฏิหาริย์...? อื้อ! ใช่แล้วละ! ต้องเกิดปาฏิหาริย์ขึ้นแน่ๆ!"
13100-23 = "ตอนนั้นฉันโมโหมากเลยละ..."
13100-25 = "โมโหเรื่องสถานการณ์ของอะบิดอสน่ะ "
13100-26 = "ที่นี่เกิดพายุทรายจนพื้นที่กลายเป็นทะเลทรายไม่หยุดหย่อน... ทะเลทรายผืนใหญ่ที่หนาวเหน็บ#nในตอนกลางคืน และไม่มีฝนตกลงมาแม้แต่หยดเดียว"
13100-29 = "พวกนักเรียนก็ออกกันไปอย่างไร้ความรับผิดชอบ สภานักเรียนรุ่นก่อนก็ไร้ความสามารถ ชาวเมืองก็ไม่มีกำลัง"
13100-30 = "พวกคนร้ายก็พยายามใช้ประโยชน์จากสถานการณ์ที่ยากลำบาก พวกผู้ใหญ่ก็น่าสมเพช"
13100-32 = "ประธานสภานักเรียนก็ทำผิดพลาดซ้ำไปซ้ำมาโดยไม่รู้ว่านี่คือสถานการณ์ตึงเครียด"
13100-34 = "รวมทั้งตัวฉันเองที่ไม่สามารถแก้ไขเรื่องพวกนี้ได้"
13100-37 = "ฉันโมโหทุกๆ อย่างเลยละ "
13100-38 = "ไม่สิ ตอนนั้นฉันคิดว่ายังไงก็ต้องระบายความโกรธออกมาน่ะ"
13100-40 = "เพราะเชื่อว่านั่นเป็นทางเดียวที่จะแก้ไขเรื่องทั้งหมดได้"
13100-44 = "ท้าดา! "
13100-45 = "ดูสิ โฮชิโนะจัง! โปสเตอร์เทศกาลทะเลทรายอะบิดอสในตำนาน! นี่ของหายากเลยนะ!"
13100-46 = "ตอนนั้นโอเอซิสมีขนาดใหญ่เท่าทะเลสาบเลย ฉันจะให้สิ่งนี้ไว้เป็นที่ระลึกแล้วกัน! "
13100-47 = "แหะๆ... มันเยี่ยมไปเลยใช่มั้ย? หากเกิดปาฏิหาริย์ขึ้นละก็ ผู้คนก็จะกลับมาเที่ยวกันที่นี่อีก..."
13100-48 = "ไม่มีปาฏิหาริย์ที่ว่าหรอกค่ะรุ่นพี่"
13100-49 = "ไม่มีอะไรแบบนั้นอยู่จริงในโลกนี้หรอกค่ะ!"
13100-50 = "อะ... อ่า... "
13100-51 = "ใครเขาจะมาทำอะไรกันกลางทะเลทรายแบบนี้คะ!! เลิกพูดอะไรไร้สาระได้แล้วค่ะ!!!"
13100-52 = "อืม... โฮชิโนะจัง... ขะ... ขอโทษนะ เป็นเพราะฉันมันบ้าเองนั่นแหละ"
13100-53 = "...!!"
13100-54 = "เอาแต่รอปาฏิหาริย์ รอโชค รอดวง..."
13100-55 = "รุ่นพี่คือประธานสภานักเรียนของอะบิดอสนะคะ! ตระหนักถึงน้ำหนักของความรับผิดชอบที่แบกรับเอาไว้#nบ้างสิคะ!!"
13100-59 = "(แคว่ก แคว่กกกก)"
13100-67 = "แล้วก็เกิดเหตุการณ์วันนั้นขึ้น"
13100-68 = "..."
13100-69 = "วันนั้น... รุ่นพี่ยูเมะไปก่อปัญหาอะไรบางอย่างไว้ ฉันก็เลยไปตามเก็บกวาดแล้วกลับมา"
13100-70 = "ปัญหาอย่างนั้นเหรอ..."
13100-74 = "เรื่องเล็กๆ น้อยๆ น่ะ..."
13100-75 = "รุ่นพี่พยายามไปไกล่เกลี่ยกับพวกกลุ่มอันธพาลที่เข้ามาในเขตปกครองตนเองอะบิดอส แต่กลายเป็นว่าเกือบถูกคนพวกนั้นจับตัวไปซะเอง"
13100-76 = "วะ... ว่าไงนะ..."
13100-77 = "ที่จริงมันต้องมีใครรู้ว่ารุ่นพี่ยูเมะเป็นประธานสภานักเรียน ก็เลยจะวางกับดักเพื่อจัดการรุ่นพี่ยูเมะน่ะ"
13100-78 = "แต่สุดท้ายฉันก็ออกไปเล่นงานกลุ่มอันธพาลพวกนั้นได้ทั้งหมด"
13100-79 = "แต่ก็นะ ถ้ามาคิดดู คนพวกนั้นน่าจะเป็นพวกที่ไม่รู้เกี่ยวกับสถานการณ์ของอะบิดอสสักเท่าไร เพราะมันก็นานมากแล้วที่สภานักเรียนอะบิดอสคือคนที่รวยที่สุดในคิโวทอส~!"
13100-82 = "แต่วันนั้นฉันก็รู้สึกโมโหกับเรื่องทั้งหมดนี่... ทุกอย่างมันทั้งน่าหงุดหงิดและน่าอึดอัดไปหมด"
13100-83 = "แล้ววันนั้นฉันก็ทนต่อปัญหาเล็กๆ น้อยๆ ที่รุ่นพี่ยูเมะไปก่อไว้ไม่ไหวแล้ว"
13100-84 = "มันเป็นเรื่องเล็กน้อยที่เกิดขึ้นอยู่บ่อยๆ ก็จริง... แต่วันนั้นฉันระบายความโกรธออกมาแล้วกลับบ้านไป#nคนเดียว"
13100-87 = "ถึงฉันจะพูดไปด้วยความโมโห แต่มันก็ไม่ได้ออกมาจากใจจริง ฉันก็เลยคิดว่าจะไม่ติดต่อกันสัก 2-3 วัน แล้วค่อยกลับเข้าไป"
13100-88 = "ฉันปิดโทรศัพท์แล้วปล่อยเวลาให้เปล่าประโยชน์ หลังจากนั้น 2 วันก็กลับไปที่โรงเรียน แต่ตอนนั้นก็ไม่เจอรุ่นพี่ยูเมะแล้ว"
13100-91 = "รุ่นพี่ยูเมะ ฉันมาแล้วค่ะ"
13100-92 = "เรื่องที่ผ่านมาน่ะช่างมันเถอะค่ะ ฉันลืมไปหมดแล้ว"
13100-93 = "ที่สำคัญกว่านั้นน่ะ..."
13100-100 = "รุ่นพี่ยูเมะ...?"
13100-102 = "ตั้งแต่วันนั้นฉันก็ออกตามหารุ่นพี่ที่หายตัวไปทั่วทั้งอะบิดอสเลย"
13100-117 = "ขอโทษนะ... โฮชิโนะจัง ตอนนี้ไม่มีคลื่นวิทยุ@#$% "
13100-118 = "ฉันข้ามทะเลทรายมาน่ะ พอดีมีเรื่องด่วนต้องทำ@#&% แล้วก็มาเจอพายุทราย&#@"
13100-122 = "โฮชิโนะจัง... ขอโทษด้วยนะ"
13100-123 = "ฉันไม่ได้หยิบเข็มทิศมาอีกแล้ว"
13100-124 = "ฉันทิ้งโน้ตข้อความไว้แล้ว แต่จะขอทิ้งข้อความไว้ทางนี้ด้วย ฉันเอาสมุดโน้ตของฉันไว้ตรงนั้น ช่วยไปที่นั่นหน่อยนะ"
13100-125 = "ที่นั่นน่ะ@$^$%@#$ โฮชิโนะจังก็น่าจะรู้จัก ฉันวางไว้ในที่สะดุดตา น่าจะหาได้ง่ายๆ"
13100-126 = "โฮชิโนะจัง ฉันน่ะ"
13100-128 = "แล้ว 33 วันหลังจากนั้น... รุ่นพี่ยูเมะก็ถูกพบตัวในทะเลทรายอะบิดอส"
13100-130 = "..."
13100-131 = "..."
13100-132 = "..."
13100-138 = "รุ่นพี่น่าจะข้ามทะเลทรายไปเพราะมีเรื่องด่วนต้องทำ แล้วก็โดนพายุทรายพัดจนเกิดอุบัติเหตุเข้าน่ะ"
13100-139 = "พื้นที่ตรงนั้นไม่มีสัญญาณติดต่อสื่อสาร เราก็เลยติดต่อกันไม่ได้... รุ่นพี่อาจจะออกนอกเส้นทาง#nเพื่อหลบพายุทราย... แต่พายุนั่นก็ทำให้ภูมิประเทศของทะเลทรายเปลี่ยนไป..."
13100-140 = "สุดท้ายก็เลยหาทางกลับมาไม่ถูก"
13100-141 = "สาเหตุของการเสียชีวิตของรุ่นพี่มาจากอาการขาดน้ำและความเหนื่อยล้าน่ะ..."
13100-147 = "จริงๆ เลย เฮ้อ... ฉันตามหาอยู่นานเลยนะคะ..."
13100-148 = "รุ่นพี่ยูเมะ..."
13100-150 = "ฉันนำร่างของรุ่นพี่ รวมทั้งอาวุธ โล่ แล้วก็ของติดตัวของรุ่นพี่ยูเมะกลับมาได้... แต่หาสมุดโน้ตของรุ่นพี่ไม่เจอเลย"
13100-151 = "ฉันตามหาทุกร่องรอยที่รุ่นพี่ยูเมะทิ้งไว้ เพื่อสืบหาให้ได้ว่าวันนั้นรุ่นพี่ไปที่นั่นทำไม และเกิดเรื่องอะไรขึ้นกันแน่... "
13100-152 = "แต่สุดท้ายก็ไม่เจออะไรเลย..."
13100-153 = "\"ที่นั่น\" ที่รุ่นพี่บอกว่าวางสมุดโน้ตไว้... ก็ไม่รู้ว่าที่ไหน..."
13100-154 = "ฉันค้นทุกจุดที่พอจะเดาได้แล้ว... แต่ก็ไม่เจอสมุดโน้ตนั่นเลย..."
13100-155 = "ในสมุดโน้ตนั่นต้องมีเขียนไว้แน่นอนว่าเกิดเรื่องอะไรขึ้นกับรุ่นพี่..."
13100-156 = "ทำไมฉันถึง... หาสมุดโน้ตเล่มนั้นไม่เจอนะ..."
13100-161 = "(ถ้าหากว่า... การตายของประธานสภานักเรียนยูเมะเกี่ยวข้องกับเนฟธิส...)"
13100-162 = "(ถ้างั้นฉันก็...)"
13100-165 = "รุ่นพี่ยูเมะ... ทำไม... ทำไมกันนะ..."
13100-180 = "ตกใจหมดเลย?!"
13100-181 = "นะ... นั่นเสียงกริ่งจากหน้าประตูโรงเรียนนี่...?"
13100-187 = "ฉันเอง... "
13100-189 = "เสียงนั่นมัน... ผู้ควบคุมสุโอ?"
13100-191 = "ขอโทษนะ ฉันทำให้ตกใจหรือเปล่า? ฉันพาท่านผู้บริหารของเนฟธิสมาน่ะ เราตกลงกันไว้ล่วงหน้าแล้วนี่?"
13100-195 = "คุณหนู... ขอเข้าไปได้มั้ยครับ?"
13100-197 = "คุณพ่อบ้าน..."
13100-200 = "ครับ ผมมาคุยเรื่องความลับของ <ทางรถไฟข้ามทะเลทราย> น่ะครับ"
13100-202 = "ค่ะ... กำลังรออยู่เลยค่ะ"
13100-211 = "เราย้ายห้องกันดีมั้ย?"
13100-212 = "อืม ไปที่ห้องคณะกรรมการแผนงานกัน"
13100-215 = "ตอนต่อไป;ความลับเปิดเผย"

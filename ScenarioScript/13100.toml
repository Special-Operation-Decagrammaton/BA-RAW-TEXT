[translation]
13100-1 = "第10話;那一天"
13100-3 = "因，因為……只靠戰鬥沒辦法真正解決問題，只會原地踏步……"
13100-4 = "而且一旦習慣這種做法，之後就只會用那種錯誤的方式來解決問題了……"
13100-8 = "成為學生會長是我的意願。#n並不是被他們強迫的，星野醬。"
13100-9 = "不，星野醬。這是自然災害的錯。#n我們不應該對受害者說那種話。"
13100-13 = "這是夢嗎……？還是……奇蹟？#n嗯！沒錯！一定是奇蹟！"
13100-23 = "……當時的我，對任何事都感到很生氣。"
13100-25 = "比如阿拜多斯的情況……"
13100-26 = "每當快忘記時就會再次出現的沙塵暴，以及永不停歇的沙漠化……#n連滴雨都不下的天氣和嚴寒的大沙漠。"
13100-29 = "不負責任的學生、無能的前學生會、軟弱的市民……"
13100-30 = "藉機作亂的壞人、令人心寒的大人……"
13100-32 = "毫無緊張感又錯誤百出的學生會長……"
13100-34 = "以及什麼都無法解決的我。"
13100-37 = "這一切都讓我感到生氣。"
13100-38 = "不，應該是覺得非得生氣才行。"
13100-40 = "彷彿只有這樣才能解決一切。"
13100-44 = "鏘──！"
13100-45 = "星野醬你看你看──！#n是阿拜多斯砂漠慶典以前的海報！我終於拿到了唷──！"
13100-46 = "聽說當時的綠洲就像湖水一樣寬廣呢～#n啊，這個就給你當紀念吧！"
13100-47 = "耶嘿嘿，很棒對吧～？#n如果奇蹟能夠發生的話，說不定人們會像那時候一樣一窩蜂地聚集過來──"
13100-48 = "奇蹟什麼的才不會發生，前輩。"
13100-49 = "那種東西現實中怎麼可能存在！"
13100-50 = "啊，啊嗚……"
13100-51 = "人們怎麼可能會跑到這種砂漠正中央來！不要再做白日夢了！！"
13100-52 = "嗚嗚，可是星野醬……#n對，對不起嘛，因為我是個笨蛋……"
13100-53 = "……！！"
13100-54 = "整天說什麼奇蹟、幸運、好事之類的……"
13100-55 = "你是阿拜多斯的學生會長耶！麻煩對自己肩上承擔的責任有點自覺好不好！"
13100-59 = "（唰唰──！）"
13100-67 = "就在這種情況下……那天到來了。"
13100-68 = "……"
13100-69 = "那天……夢前輩又被捲入了麻煩，而我是去善後的。"
13100-70 = "麻煩指的是……"
13100-74 = "……其實只是件小事罷了。"
13100-75 = "有暴力集團跑來阿拜多斯自治區鬧事，而前去調解的前輩反而差點被那些傢伙綁架。"
13100-76 = "怎，怎麼會……"
13100-77 = "他們似乎知道夢前輩是學生會長，所以故意設下了陷阱。"
13100-78 = "最後是我出面打垮了那個暴力集團。"
13100-79 = "不過現在回頭想想，那些傢伙可能不太清楚阿拜多斯的狀況。#n阿拜多斯的學生會長是奇普托斯首富的時期早就過去了啊～！"
13100-82 = "但是那天……對一切都感到煩躁鬱悶的我……"
13100-83 = "對夢前輩犯下的小錯……實在忍無可忍。"
13100-84 = "明明只是司空見慣的小事而已……我卻對夢前輩大發脾氣，一個人先回了家。"
13100-87 = "……當時在氣頭上的我，對夢前輩說了違背本意的氣話。#n本來只是想斷絕聯絡，過個2～3天就回來……"
13100-88 = "於是我關掉手機閒晃了兩天。#n結果等我回到學校的時候，夢前輩已經不見了。"
13100-91 = "夢前輩，我來了。"
13100-92 = "……過去的事就讓它過去吧。我都已經忘了。"
13100-93 = "話說回來……"
13100-100 = "……夢前輩？"
13100-102 = "從那天開始，我就在阿拜多斯到處尋找下落不明的前輩。"
13100-117 = "對不起……星野醬。現在收訊不太好@#$% "
13100-118 = "因為有急事必須穿越沙漠，卻遇@#&%沙塵暴&#@"
13100-122 = "星野醬……對不起。"
13100-123 = "我又沒帶指南針來了。"
13100-124 = "雖然有留下紙條，但這邊也傳一次好了。#n我把手冊放在那裡，你以後再去拿吧。"
13100-125 = "那裡星野醬也很清楚@$^$%@#$#n我放在很顯眼的地方，應該很好找才對。"
13100-126 = "星野醬，我"
13100-128 = "……從那天起33天後，夢前輩在阿拜多斯沙漠的某處被發現了。"
13100-130 = "……"
13100-131 = "……"
13100-132 = "……"
13100-138 = "也許是有什麼急事必須穿越沙漠，結果因為沙塵暴而遇難了。"
13100-139 = "那裡本來就是收不到訊號的地區，所以沒辦法聯絡……#n或許是為了躲避風暴而偏離原本的路線……再加上沙漠的地形被風暴改變的關係……"
13100-140 = "最終沒能找到回來的路。"
13100-141 = "前輩是因為脫水和虛脫衰弱而死……"
13100-147 = "真是的……害我找了這麼久。"
13100-148 = "……夢前輩。"
13100-150 = "我回收了夢前輩的遺體、武器、盾牌和其他遺物……卻沒看到前輩的手冊。"
13100-151 = "為了調查夢前輩為什麼會去那裡，以及究竟發生了什麼事，#n我到處尋找前輩留下的所有痕跡……"
13100-152 = "……結果卻什麼都沒查到。"
13100-153 = "放手冊的「那個地方」究竟是哪裡……"
13100-154 = "明明已經把能想到的地方全都翻遍了……但就是找不到手冊……"
13100-155 = "那本手冊裡，一定寫著前輩碰到了什麼……"
13100-156 = "但我為什麼……就是找不到那本手冊呢……"
13100-161 = "（萬一……夢學生會長的死和奈芙蒂斯有關……）"
13100-162 = "（那我……）"
13100-165 = "夢前輩……為什麼……為什麼……"
13100-180 = "怎麼了！？"
13100-181 = "搞什麼，又是校門前的門鈴聲……？"
13100-187 = "……是我。"
13100-189 = "那位是……蘇芳監察官？"
13100-191 = "嚇到你了嗎？真不好意思。#n我把奈芙蒂斯的幹部帶來了。你們應該有約好吧？"
13100-195 = "大小姐……我可以進去嗎？"
13100-197 = "管家……"
13100-200 = "我是來告訴您「沙漠橫貫鐵路」的祕密的。"
13100-202 = "……請進，我也在等你呢。"
13100-211 = "先換個地方吧？"
13100-212 = "嗯，回對策委員會的部室吧。"
13100-215 = "下一話;揭露的祕密"

[translation]
32170-1 = "第17話;就算是這樣的世界（１）"
32170-2 = "咕，嗚……！！"
32170-8 = "贏，贏了嗎……？"
32170-9 = "所有人都已無法戰鬥。"
32170-10 = "多虧有老師的指揮，真是太厲害了……啊嗚……"
32170-14 = "暫且渡過一個難關了呢。"
32170-15 = "奧利斯的增援部隊應該很快就會抵達……而我們的目標則是爭取時間……"
32170-16 = "只要能撐到實現正義部的部隊抵達，這場大規模的攻擊也只能不了了之了吧……"
32170-17 = "啊，我有跟蓮實前輩聯絡過了！應該馬上就會有回覆了才對！"
32170-18 = "嗯……能讓收到茶會命令的實現正義部採取行動的唯一方法，#n就只有茶會成員身邊出現問題而已吧。"
32170-19 = "我想現在蓮實同學他們，應該也已經注意到渚同學出了某些狀況才對。"
32170-20 = "再加上有小春醬的聯絡……我想他們動身確認狀況應該只是早晚的問題。"
32170-21 = "接下來也只能祈禱他們能快點過來了……"
32170-25 = "！？"
32170-26 = "這是……"
32170-35 = "增援部隊這麼快就……！？"
32170-36 = "咦，咦……？"
32170-44 = "數量很多……已經達到大隊等級。#n可能有接近奧利斯分校一半的人數……"
32170-45 = "啊嗚……！這，這麼多人就這樣輕易地跑到三一的領地裡……！？"
32170-46 = "而且實現正義部好像也沒有採取行動的跡象……？"
32170-47 = "嗯，那也是沒辦法的唷。"
32170-49 = "……你，你是！？"
32170-54 = "畢竟這些人之後就要成為三一官方的武裝集團了嘛。"
32170-55 = "[s] 「彌香……？」"
32170-56 = "嗯，好久不見了呢，老師。#n能再見到你真開心。"
32170-57 = "還有，實現正義部是不會出動的。#n畢竟我都特別下達了待機命令。"
32170-58 = "你們不覺得今天的學園特別安靜嗎？#n那是因為我已經事先把可能妨礙我的因素全部都處理好了。"
32170-59 = "在茶會的命令能傳到的每個地方，都用各種理由限制他們的行動了。"
32170-60 = "畢竟襲擊渚醬的時候，如果被他們妨礙就麻煩了嘛。"
32170-61 = "「茶會」的聖園彌香同學……你為何會在這裡……"
32170-62 = "簡單來說，就是幕後黑手登場☆的感覺吧？"
32170-63 = "我才是[ruby= ・     ・ ]真正[/ruby]的「三一的叛徒」。"
32170-64 = "……"
32170-65 = "……"
32170-66 = "……！？"
32170-68 = "那麼，能告訴我渚醬被藏在哪裡嗎？我的時間也不多呢。"
32170-71 = "雖然把這裡的所有人全部打倒再慢慢找也可以，不過這樣很麻煩的對吧？"
32170-73 = "[ns] 「彌香，為什麼……」"
32170-74 = "嗯？老師想知道為什麼嗎？"
32170-75 = "那是因為……我討厭格黑娜。"
32170-76 = "我真的，真心……打從心底厭惡格黑娜。"
32170-77 = "……所以想要取消伊甸園條約嗎，彌香同學？#n為了這個才打算把渚同學給……"
32170-78 = "那個……你是哪位？抱歉，我不太擅長認別人的臉呢。"
32170-79 = "……啊，我想起來了，是浦和花子對吧。#n穿著泳衣參加禮拜堂課程而被趕出去的那位。啊哈哈哈。"
32170-80 = "……"
32170-81 = "嗯，簡單來說就是那樣沒錯。#n誰叫渚醬要推動伊甸園條約這種亂七八糟的東西。"
32170-82 = "居然要和格黑娜那種長著角的傢伙們簽訂和平條約？#n光是想像就覺得毛骨悚然。"
32170-83 = "肯定會被背叛的不是嗎？只要一轉過身馬上會被格黑娜背刺的。"
32170-84 = "這種事情我絕不允許。"
32170-85 = "渚醬也真是的，那種美好的事怎麼可能會發生呢……#n這可不是單純快樂的美好學園故事啊。"
32170-86 = "沒錯，這並不是那樣的故事。#n而我們也不得不承認，這樣混亂的故事更適合我們……"
32170-87 = "總之就是這樣，把渚醬還給我吧。別擔心，我不會傷害他的。#n雖然剩下的學園生活，可能都得以普通學生的身分在牢裡渡過，不過也不算太糟吧。"
32170-88 = "[s] 「所以伊甸園條約，果然是單純的和平條約嗎……」"
32170-89 = "啊，很抱歉那時候騙了你，老師。"
32170-90 = "那的確是和平條約唷。#n畢竟單蠢的渚醬，是不可能把伊甸園條約當成武力同盟來使用的嘛。"
32170-91 = "……不過，我當時說的也不全都是謊話。"
32170-92 = "我想和奧利斯和解這點是真的。"
32170-96 = "看看這些孩子們。#n他們跟我們一樣是憎恨格黑娜的夥伴。"
32170-97 = "我之前有跟老師說過吧？奧利斯原本也是三一的一員。#n他們對格黑娜的憎恨並不亞於我們……甚至可以說是由憎恨集結的群體吧。"
32170-98 = "所以我才會向他們尋求幫助。#n請他們跟我一起，擊倒想要和格黑娜締結和平條約的惡人。"
32170-99 = "如果主席「桐藤渚」有實現正義部的話，那麼主席「聖園彌香」就有奧利斯。"
32170-100 = "嗯，就是這樣的交易哦。#n或者說是和解的一小步？"
32170-101 = "為了擊倒眼前共通的敵人，和曾經的敵人攜手合作──因此，我暗中協助了奧利斯。"
32170-102 = "奧利斯打從一開始，就是三一政變的工具嗎……？"
32170-103 = "……嗯，也對。這或許確實能算是政變吧。#n畢竟渚醬將會失勢，而我則會成為茶會的主席。"
32170-104 = "一直以來辛苦你了，梓。#n雖然我不太了解你，不過這並不會改變你是個重要存在的事實。"
32170-105 = "因為我還得讓你成為襲擊渚醬的犯人才行。"
32170-106 = "……！！"
32170-107 = "必須有代罪羔羊來承擔罪過──#n只有這樣，大家才能夠安心入睡對吧？"
32170-108 = "這不是什麼稀奇的事，因為這個世界就是這樣的。"
32170-109 = "……"
32170-110 = "不過真是嚇了我一跳呢。#n聽到渚醬被不明人士襲擊，我還以為計畫出了差錯，所以才連忙趕過來……"
32170-111 = "啊哈哈，沒想到竟然會是補課部呢。#n這點確實出乎意料。"
32170-112 = "[s] 「這一切都是為了當上茶會的主席嗎？」"
32170-113 = "嗯，沒錯。"
32170-114 = "不過希望你別誤會，老師。#n我並不是為了得到權力才這麼做的。"
32170-115 = "我只是……單純想讓格黑娜從奇普托斯消失而已。"
32170-116 = "[s] 「……」"
32170-117 = "驅逐三一的鴿派，讓奧利斯補上空出來的位置。"
32170-118 = "或許會有新的聯盟誕生也說不定哦？#n有必要的話，召開新的公會議也可以……嗯，那也不錯吧？"
32170-119 = "接下來……重獲新生的三一將對格黑娜發起全面戰爭。#n──這就是我的計畫。"
32170-120 = "[ns] 「適可而止吧！」"
32170-121 = "哇，嚇到我了。"
32170-122 = "嗯，我已經知道老師非常生氣了。#n對不起，是我的態度太隨便了吧？"
32170-127 = "那麼……就先把事情處理一下，之後再慢慢談吧？"
32170-131 = "請小心，老師。"
32170-132 = "那個人……很強。"
32170-133 = "嗯，之前有跟你說過了吧，我其實還挺強的。"
32170-134 = "那麼，就先來處理一下補課部吧。"

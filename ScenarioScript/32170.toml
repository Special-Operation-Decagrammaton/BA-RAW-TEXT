32170-56 = "#na;미카;응, 오랜만이야. 선생님. 다시 보게 되니 좋네."
32170-57 = "#na;미카;정의실현부는 움직이지 않아. 내가 그렇게 명령했으니까."
32170-58 = "#na;미카;오늘 이상하게 학원이 조용하다고 생각하지 않았어? 당연하지. 방해가 될만한 것들은 모두 치워놨거든."
32170-59 = "#na;미카;티파티의 명령이 닿는 곳은 전부 이런 저런 걸로 발을 묶어뒀어."

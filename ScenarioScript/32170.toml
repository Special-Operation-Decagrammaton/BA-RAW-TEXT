32170-73 = "[ns] \"미카…… 어째서…….\""
32170-74 = "3;미카;09;응? 왜 이런 짓을 했냐고? 선생님? 그렇게 묻는 거야?\n#3;a\n#3;em;[?]"
32170-75 = "3;미카;15;응, 그야, 게헨나가 싫으니까."
32170-76 = "3;미카;01;나는 게헨나가 진짜, 너무너무 싫거든."
32170-77 = "1;하나코;06;……에덴조약의 취소? 그게 목적이었나요, 미카 씨?! 나기사 씨를 노린 건…….\n#1;a\n#1;em;[반응]\n#3;m5"
32170-78 = "3;미카;15;어라…… 누구더라? 미안해, 나는 얼굴 기억하는 게 힘들어서……."
32170-79 = "3;미카;10;아, 기억났어. 하나코였지? 채플 수업 때 수영복 차림으로 입장했다가 쫓겨났던. 아하하하.\n#3;em;[재잘]\n#3;hophop"
32170-80 = "1;하나코;06;……."
32170-81 = "3;미카;15;아하하. 맞아. 나기 쨩이 이상한 걸 하려고 해서 말야. 에덴조약 같은 말도 안 되는걸.\n#3;m3\n#1;dl"
32170-82 = "#1;hide\n3;미카;12;그 게헨나의 뿔달린 녀석들과 평화 조약이라니, 끔찍해서 소름 돋을 거 같아."
32170-83 = "3;미카;99;반드시 배신당할 걸? 게헨나 녀석들에게 뒤를 보였다간 바로 찔리게 될 거야."
32170-84 = "3;미카;01;그런 꼴을 절대 볼 수 없어."
32170-85 = "3;미카;08;나기 쨩도 참. 그렇게 편리한 이야기가 있을 리가 없잖아. 이게 단순하고 즐겁기만 한 학원의 순진한 이야기였으면 좋겠지만……. \n#3;em;…"
32170-86 = "3;미카;01;응. 그렇지 않은걸. 말하자면, 우리에겐 이런 게 어울린다는 걸 슬슬 인정해주지 않으려나……."
32170-87 = "3;미카;02;그러니까 나기 쨩을 돌려줘. 해치진 않을 거야. 평범한 학생으로 남은 시간을 감옥 교실에서 보내겠지만, 나쁘진 않을 거고.\n#3;em;[반응]"
32170-88 = "[s] \"역시 에덴조약은 평화조약이 맞았구나.\""
32170-89 = "3;미카;01;응. 선생님. 그땐 속여서 미안해. 내가 했던 말은 거짓말이었어."
32170-90 = "3;미카;99;나기 쨩은 순진한 바보라서 에덴조약을 무력 동맹으로 활용할 수 있을 리가 없거든. 그건 평화조약이 맞아."
32170-91 = "3;미카;01;하지만 거짓말만 한 건 아냐. 선생님."
32170-92 = "3;미카;06;내가 아리우스와 화해하고 싶다는 건 진짜였으니까."
32170-93 = "#st;[0,0];instant;1;"
32170-94 = "#clearST"
32170-95 = "1;아리우스 학생 A;01\n5;아리우스 학생 B;01\n3;미카;01\n#1;a\n#5;a\n#wait;1500"
32170-96 = "1;아리우스 학생 A;01\n5;아리우스 학생 B;01\n3;미카;02;자, 이것 봐. 게헨나를 증오하는 동지들을."
32170-97 = "1;아리우스 학생 A;01\n5;아리우스 학생 B;01\n3;미카;01;전에도 말한 적 있지? 아리우스도 한때 트리니티의 일원. 게헨나를 싫어하는 건 우리 못지 않아. 아니, 이 친구들이야말로 증오로 똘똘 뭉쳐진 집합체 같은 거지."
32170-98 = "1;아리우스 학생 A;01\n5;아리우스 학생 B;01\n3;미카;05;그래서 나와 뜻을 같이할 친구들에게 도움을 청한 거야. 게헨나와 평화 조약을 맺으려는 나쁜 악당을 물리쳐달라고.\n#3;em;[!]"
32170-99 = "1;아리우스 학생 A;01\n5;아리우스 학생 B;01\n3;미카;99;호스트 나기사에게 정의실현부가 있었다면, 호스트 미카에게는 앞으로 아리우스가 있을 거라고."
32170-100 = "1;아리우스 학생 A;01\n5;아리우스 학생 B;01\n3;미카;10;응. 이건 그런 종류의 거래. 화해의 제스처라고 할까……?\n#3;em;[반짝]\n#3;greeting"
32170-101 = "1;아리우스 학생 A;01\n5;아리우스 학생 B;01\n#1;d\n#5;d\n3;미카;01;공동의 적을 위해 한때의 원수들이 손을 잡는 거니까. 그래서 내가 아리우스를 남몰래 지원해준 거야."
32170-102 = "#1;hide\n#5;hide\n3;아즈사;01;아리우스는 처음부터 트리니티의 쿠데타의 도구였던 건가…….\n#3;em;…"
32170-103 = "3;미카;02;응. 그러게. 이건 쿠데타라고 볼 수도 있겠네. 나기 쨩을 실각시키고 내가 티파티의 호스트가 되는 거니까."
32170-104 = "3;미카;01;지금까지 신세 많았어. 아즈사. 난 널 잘 모르지만, 그래도 네가 나에게 소중한 존재라는 건 변치 않아."
32170-105 = "3;미카;03;왜냐면 네가 나기 쨩을 해친 범인이 되어줘야 하거든.\n#3;em;[반짝]\n#3;closeup"
32170-106 = "3;코하루;11;……!!\n#3;stiff\n#3;em;[!]\n#3;closeup"
32170-107 = "3;미카;02;죄를 뒤집어 씌울 희생양인 거지. 그야, 그런 게 있어야 모두가 안심하고 발을 뻗고 잘 수 있잖아?"
32170-108 = "3;미카;01;이곳엔 그런 게 있어 왔어. 흔히 있는 일이잖아? 여기는 그런 세계니까."
32170-109 = "3;아즈사;05;…….\n#3;em;…"
32170-110 = "3;미카;15;그치만 깜짝 놀랐다구. 나기 쨩이 정체불명의 존재에게 습격당했다고 해서, 내 계획이 틀어지는 줄 알고 이렇게 달려왔는데."
32170-111 = "3;미카;14;흐음. 설마 보충수업부가 움직였을 줄은. 아하하. 이건 예상 못했어.\n#3;em;[땀]"
32170-112 = "[s] \"넌 티파티의 호스트가 되려고 이런 짓을 저지른 거야?\""
32170-113 = "3;미카;01;응. 맞아."
32170-114 = "3;미카;99;그치만 권력욕 때문에 내가 이런다고 생각하진 말아줘. 선생님."
32170-115 = "3;미카;12;나는 그저…… 게헨나를 키보토스에서 지워버리고 싶을 뿐이니까.\n#3;em;…"
32170-116 = "[s] \"…….\""
32170-117 = "3;미카;01;트리니티 안의 비둘기 파를 모두 다 숙청하고, 빈자리를 아리우스로 채울거야."
32170-118 = "3;미카;02;새로운 연합이 탄생하는 거려나? 필요하면 새로운 공의회라도 열지 뭐. 응. 그것도 나쁘지 않겠어."
32170-119 = "3;미카;10;그리고…… 새롭게 재무장한 트리니티는 게헨나와 전면전을 벌이는 거야. 그게 내 계획.\n#3;greeting\n#3;em;[반짝]"
32170-120 = "#all;hide\n[ns] \"거기까지 해!!\""
32170-121 = "3;미카;11;우와, 까, 깜짝이야.\n#3;shake\n#3;em;[?!]"
32170-122 = "3;미카;15;응. 선생님. 화가 난 건 알겠어. 미안. 내가 너무 격식없이 굴었지?"

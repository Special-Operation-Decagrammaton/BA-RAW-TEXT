32170-61 = "#na;하나코;티파티의 미소노 미카 씨…… 당신이 어째서 여기에……."
32170-62 = "#na;미카;여기서는 마치 흑막 등장☆ 같은 느낌으로! 응. 내가 지금까지의 모든 계획의 실체야."

[translation]
32170-1 = "Episode 17;The Way of the World Part 1"
32170-2 = "Gahhhhhh!"
32170-8 = "Is it over?"
32170-9 = "All enemy units incapacitated. "
32170-10 = "Sensei's commands really are something else. Wow..."
32170-14 = "Well, that's one crisis averted at least."
32170-15 = "Arius' reinforcements will arrive soon. Our objective is to buy time until then."
32170-16 = "We need to hold out until the Justice Task Force intervenes, or everything we've done will go to waste."
32170-17 = "I-I've already contacted Hasumi! She should respond soon!"
32170-18 = "Good job. The Justice Task Force is still under the Tea Party's direct command, so this was the only way to get them to move from their post."
32170-19 = "Hasumi should have noticed that Nagisa has gone missing by now."
32170-20 = "You contacting Hasumi should speed things along. It's only a matter of time before the Justice Task Force confirms the situation."
32170-21 = "I just hope they arrive in time..."
32170-25 = "...?!"
32170-26 = "Reinforcements..."
32170-35 = "They're here already?"
32170-36 = "H-How?!"
32170-44 = "This is more like an army than a reinforcement unit. Half of the satellite school's roster must be here..."
32170-45 = "Th-They've sent this many forces into Trinity territory?!"
32170-46 = "And still no sign of the Justice Task Force."
32170-47 = "Of course there isn't."
32170-49 = "Y-You!"
32170-54 = "You've been surrounded by the armed force that will replace them as Trinity's official army."
32170-55 = "[s] \"Mika...?\""
32170-56 = "It's good to see you again, Sensei."
32170-57 = "As I was saying, the Justice Task Force won't be moving from their post. My orders."
32170-58 = "You noticed, didn't you? Just how empty campus was this morning?"
32170-59 = "I've removed every obstacle in my way and given stand down orders to anyone and everyone under the Tea Party's command."
32170-60 = "I wouldn't want anyone to interfere with our assault on Nagi."
32170-61 = "Misono Mika of the Tea Party..."
32170-62 = "That's me. And here I am, making my grand appearance as the mastermind behind everything. ☆"
32170-63 = "You can consider me to be Trinity's true traitor."
32170-64 = "..."
32170-65 = "..."
32170-66 = "...?!"
32170-68 = "Won't you tell me where you've hid Nagi? I don't have much time."
32170-71 = "Or we can always eliminate all of you and search this place top to bottom the hard way."
32170-73 = "[ns] \"Why, Mika? Why...?\""
32170-74 = "Hmm? You want to know why I'm doing this, Sensei?"
32170-75 = "Because I hate Gehenna."
32170-76 = "I sincerely loathe Gehenna Academy from the depths of my heart."
32170-77 = "Then was your real objective to stop the Eden Treaty from being signed? That's why you're targeting Nagisa?"
32170-78 = "Uh...who are you again? Sorry, I've always been awful at remembering faces."
32170-79 = "Wait, I remember now. You're Urawa Hanako, right? The one who was kicked out of chapel for attending in a swimsuit. Hahaha!"
32170-80 = "..."
32170-81 = "Well, to answer your question: That's correct. I mean, Nagi's Eden Treaty idea was completely ridiculous. Ludicrous."
32170-82 = "A peace treaty with those wretches? Just the thought of coexisting with them makes my skin crawl."
32170-83 = "And how long would that last? How many years—weeks—no, DAYS until we end up with a knife in our back?"
32170-84 = "I simply can't allow something like that to happen."
32170-85 = "For someone so paranoid, Nagi really is too naive. This isn't a fairy tale. There's no happily ever after waiting beyond her treaty. "
32170-86 = "It's about time she came to grips with the reality around us."
32170-87 = "So hand her over. I promise not to kill her. She may have to spend the rest of her school life in confinement, but it won't be so bad."
32170-88 = "[s] \"So the Eden Treaty was a peace treaty after all.\""
32170-89 = "Oh, that. Yes, I'm sorry for deceiving you, Sensei. The little conversation we had wasn't entirely truthful."
32170-90 = "Someone as ignorant and naive as Nagi would never think to use the Eden Treaty to create a military alliance under her control."
32170-91 = "But not everything was a lie, Sensei."
32170-92 = "I was telling the truth about reconciling with Arius."
32170-96 = "See? They make rather loyal comrades for someone wanting to wage war against Gehenna."
32170-97 = "As I told you, Arius was once one of us: an academy that would have otherwise joined the Trinity union. Of course they hate Gehenna—they always have. Theirs is an academy held together by animosity."
32170-98 = "That's why I extended an olive branch to them. I offered them the opportunity to stop a villain aiming to welcome Gehenna with open arms."
32170-99 = "I said that if the current host, Kirifuji Nagisa, has the Justice Task Force by her side now, then the next host, Misono Mika, will have Arius beside hers."
32170-100 = "What an offer, don'tcha think? Talk about making peace."
32170-101 = "The enemy of my enemy is my friend, as the saying goes. That's why I have been secretly supporting Arius."
32170-102 = "You've been using Arius to stage a coup d'etat from the very beginning..."
32170-103 = "I suppose you could refer to it as that. Nagi will be overthrown and I will become the host of the Tea Party, yes."
32170-104 = "You have my gratitude, Azusa. We may as well be strangers, yet you're oh-so special to me. I owe you such a great debt..."
32170-105 = "...for taking the fall as the assailant who attacked Nagi."
32170-106 = "...!"
32170-107 = "You'll be the scapegoat. We need someone to take responsibility, because otherwise, how will the public rest until the perpetrator is brought to justice?"
32170-108 = "I know it's a little unimaginative, but that can't really be helped. This is just the way the world works sometimes."
32170-109 = "..."
32170-110 = "You really did surprise me, though. I thought all of my planning was going to be thwarted when I first heard Nagi had been attacked. You forced my hand, and I had to come handle this personally."
32170-111 = "I wasn't expecting such a bold move from the Make-Up Work Club. Well done."
32170-112 = "[s] \"You did all this to become the host of the Tea Party?\""
32170-113 = "That's right."
32170-114 = "Oh, but don't be mistaken, Sensei. This isn't about seizing power for the sake of being powerful."
32170-115 = "I simply want to erase Gehenna from Kivotos. That's all."
32170-116 = "[s] \"...\""
32170-117 = "I'm going to purge Trinity of all the moderates and idealists that agreed with Nagi and fill their seats with leaders from Arius."
32170-118 = "This may very well be the start of a new alliance. We could even hold a new council to commemorate it. That wouldn't be such a bad idea, would it?"
32170-119 = "And then! The newly remade Trinity will declare all-out war on Gehenna! That's the plan!"
32170-120 = "[ns] \"That's enough!\""
32170-121 = "H-Hey, don't scare me like that."
32170-122 = "I've never heard you raise your voice like that. I guess you weren't a fan of my explanation, huh?"
32170-127 = "That's fine. We can talk it over more once I've taken care of the matter at hand."
32170-131 = "Be careful, Sensei."
32170-132 = "I can tell... She's strong."
32170-133 = "Thanks for noticing! See, didn't I tell you last time, Sensei? I'm a lot tougher than I look."
32170-134 = "All righty. Let's dispose of the Make-Up Work Club, then."

[translation]
32170-1 = "第17話;そんな世界も（１）"
32170-2 = "ぐっ、うっ……！！"
32170-8 = "か、勝った……？"
32170-9 = "全員戦闘不能。"
32170-10 = "あうぅ……先生の指揮があって、本当に助かりました……。"
32170-14 = "……はい。では難所をひとつ乗り越えたところで、次のフェーズに移りましょうか。"
32170-15 = "この後アリウスの増援部隊が到着するでしょう、ですが私たちは時間を稼ぐだけで大丈夫です。"
32170-16 = "正義実現委員会の部隊がここに到着するまでの間、それまで時間を稼げれば……。"
32170-17 = "あ、ハスミ先輩には連絡しておいた！すぐ返事来るはず！"
32170-18 = "はい、ありがとうございます♡……ティーパーティーの命令下にある正義実現委員会が動けるとしたら、それはティーパーティーの身辺に問題が生じた時だけ。"
32170-19 = "定期連絡とかもあるでしょうし、きっと今頃ハスミさんたちはナギサさんに何かがあったことには気づいたはず。"
32170-20 = "それに合わせてコハルちゃんからの連絡……少なくとも状況を確認するために動き出すまで、そうそう時間はかからないはずです。"
32170-21 = "あとは、早く来てくれることを願うばかりですが……。"
32170-25 = "！？"
32170-26 = "これは……。"
32170-35 = "増援部隊が、こんなに早く……！？"
32170-36 = "え、えっ……？"
32170-44 = "……数が多い、大隊単位だ。多分、アリウスの半数近くが……。"
32170-45 = "あうぅ……！こ、これだけたくさんの方が、平然とトリニティの敷地内に……！？"
32170-46 = "まだ、正義実現委員会が動く気配が無い……？"
32170-47 = "それは仕方ないよ。"
32170-49 = "……！"
32170-54 = "だってこの人たちはこれから、トリニティの公的な武力集団になるんだから。"
32170-55 = "[s] \"ミカ……？\""
32170-56 = "やっ、久しぶり先生。また会えて嬉しいな。"
32170-57 = "それから、正義実現委員会は動かないよ。私があらためて待機命令を出したから。"
32170-58 = "今日は学園が静かだったよね。正義実現委員会以外にも、邪魔になりそうなものは事前に全部片づけておいたの。"
32170-59 = "ティーパーティーの命令が届く限り全てのところに、色んな理由を付けて足止めしておいたから。"
32170-60 = "ナギちゃんを襲う時に、邪魔なんてされたら困っちゃうもんね。"
32170-61 = "「ティーパーティー」のひとり……[ruby=みその]聖園[/ruby]、ミカさん……。"
32170-62 = "まあ簡単に言うと、黒幕登場☆ってところかな？"
32170-63 = "私が[ruby=・]本[/ruby][ruby=・]当[/ruby]の、「トリニティの裏切り者」。"
32170-64 = "……。"
32170-65 = "……。"
32170-66 = "……！？"
32170-68 = "というわけで、ナギちゃんをどこに隠したのか教えてくれる？私も時間が無くってさ。"
32170-71 = "まあここにいる全員を消し飛ばしてから、ゆっくり探しても良いんだけど。それは面倒でしょ？"
32170-73 = "[ns] \"ミカ、どうして……。\""
32170-74 = "んー？聞きたい？先生にそう言われたら仕方ないなぁ。"
32170-75 = "それはね……ゲヘナが嫌いだからだよ。"
32170-76 = "私は本当に、心から……心の底からゲヘナが嫌いなの。"
32170-77 = "……だから、エデン条約を取り消そうと？そのためにナギサさんを……？"
32170-78 = "えっと……誰だっけ？ごめんね、私あんまり顔を覚えるの得意じゃなくってさ。"
32170-79 = "……あぁ、思い出した。浦和ハナコじゃん。礼拝堂の授業に水着で参加して追い出された、あの。あははっ、懐かしいねぇ。"
32170-80 = "……。"
32170-81 = "まあ、一応答えてあげるとその通りかな。だってナギちゃんが、エデン条約だなんて変なことをしようとするからさぁ。"
32170-82 = "ゲヘナのあんな、角が生えたやつらなんかと平和条約だなんて、冗談にも程があると思わない？考えるだけでゾッとしちゃうよ。"
32170-83 = "絶対裏切られるに決まってるじゃんね？背中を見せたらすぐに刺されるよ？"
32170-84 = "そんなこと、させるわけにはいかない。"
32170-85 = "ナギちゃんもほんと、優しいっていうか優しすぎるっていうか……創作の中の明るい学園物語じゃないんだし。そんな都合の良い話、現実には存在しないのに。"
32170-86 = "私たちはこういう、もっとドロドロした世界の住人だってこと、そろそろ分かってくれても良い頃なのにね？"
32170-87 = "……そういうわけだから、ナギちゃんを返してくれる？大丈夫、痛いことはしないよ。まあ、残りの学園生活は全部檻の中かもしれないけど。"
32170-88 = "[s] \"じゃあエデン条約は、やっぱりれっきとした平和条約……。\""
32170-89 = "あっ、あの時は騙してごめんね、先生。うん、それは嘘。"
32170-90 = "あれは本当に平和条約だよ。そもそも素直でおバカなナギちゃんに、エデン条約を武力同盟として活用するなんてこと、できっこないからね。"
32170-91 = "……でもあの時話したことは、全部が全部嘘ってわけじゃないよ。"
32170-92 = "私がアリウスと和解したかったっていうのは、本当のこと。"
32170-96 = "この子たちは、同じゲヘナを憎む仲間。"
32170-97 = "アリウスだって元々はトリニティの一員。先生には前も言った通り、この子たちもゲヘナに対する憎しみはすごいよ、私たちに勝るとも劣らない。むしろこの子たちこそ、純度の高い憎しみを持ってるとすら言えるかもしれない。"
32170-98 = "だから手を差し出したの。志を共にして、ゲヘナと平和条約を結ぼうとする悪党たちをやっつけない？って。"
32170-99 = "ティーパーティーのホスト「桐藤ナギサ」に正義実現委員会がいるなら、次期ティーパーティーのホスト「聖園ミカ」にはアリウスがつく。"
32170-100 = "これはそういう取引。和解へのステップアップ的な？"
32170-101 = "共通の敵のために、一時的に敵同士が互いの手を取り合う。そういうことだよ。それで私は、アリウスを密かに支援してたの。"
32170-102 = "アリウスは最初から、トリニティのクーデターの道具だった……？"
32170-103 = "うん？……うん、確かに。これはクーデターとも言えるかもね。最終的にはナギちゃんを失脚させて、私がティーパーティーのホストになるんだから。"
32170-104 = "ああ、あなたのことは分かるよ。ありがとう、白洲アズサ。私はあなたのことをあまり知らないけれど、私にとって大事な存在であることは変わらない。今までも、これからも。"
32170-105 = "だって今からあなたには、ナギちゃんを襲った犯人になってもらわないといけないからね。"
32170-106 = "……！！"
32170-107 = "スケープゴートって言った方が良いかな？罪を被る生贄としての存在がいてこそ、みんながぐっすり安心して眠れるの。"
32170-108 = "世の中って、そういうものじゃない？"
32170-109 = "……。"
32170-110 = "でもびっくりしたな。ナギちゃんが正体不明の誰かに襲撃されたって聞いて、計画が崩れるかもと思って少し焦ってみたら……。"
32170-111 = "まさかそれが補習授業部だったなんてねー、これは予想外だったよ。うん。"
32170-112 = "[s] \"……すべては、ティーパーティーのホストになるため？\""
32170-113 = "うん、そうだよ。"
32170-114 = "ああでも誤解してほしくないな、先生。別に権力が欲しいわけじゃないの。"
32170-115 = "私はゲヘナをキヴォトスから消し去りたい……本当にただ、それだけだから。"
32170-116 = "[s] \"……。\""
32170-117 = "トリニティの穏健派を追いやって、その空席をアリウスで埋める。"
32170-118 = "もしかしたら新しい連合になるかもね？必要なら新しい公会議でも開いて……うん、それも良いかも？"
32170-119 = "それで、新たな武力集団を得て再編されたトリニティが、ゲヘナに全面戦争を仕掛ける。そう、これが私の計画！"
32170-120 = "[ns] \"……っ！\""
32170-121 = "わっ、びっくりしたー……。"
32170-122 = "先生、そんなに怖い眼もできるんだね……うん、先生がすごく怒ってることはよく分かった。ごめんね、説明も何だか急いじゃったし、雑だったよね？"
32170-127 = "もっと丁寧にお話したいところだけど……まずは色々と邪魔なのを片付けてからにしよっか？"
32170-131 = "……気を付けて、先生。"
32170-132 = "こうして見ただけでわかる……かなり強い。"
32170-133 = "ふふっ、そうだよ。先生には前言ったけど、私結構強いんだから。"
32170-134 = "はい。じゃあ、補習授業部を片付けてくれる？"

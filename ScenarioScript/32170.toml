[translation]
32170-1 = "ตอนที่ 17;โลกแบบนั้น (1)"
32170-2 = "อึ้กก...!!"
32170-8 = "พะ... พวกเราชนะเหรอ?"
32170-9 = "ทุกคนต่อสู้ต่อไปไม่ได้แล้วล่ะ"
32170-10 = "การสั่งการทางยุทธวิธีของคุณครูเยี่ยมยอดไปเลยล่ะค่ะ... อ่า..."
32170-14 = "เราเพิ่งจะผ่านจุดวิกฤตมาได้เองค่ะ"
32170-15 = "กองกำลังเสริมของอาเรียสใกล้จะมาถึงแล้ว และเราต้องยื้อเวลาไว้จนถึงตอนนั้นค่ะ..."
32170-16 = "หากชมรมทวงความยุติธรรมกลับมาตอนนั้น การซุ่มโจมตีครั้งใหญ่นี้จะกลายเป็นศูนย์..."
32170-17 = "ชะ... ใช่แล้ว! ฉันติดต่อรุ่นพี่ฮาสุมิไว้แล้ว! เดี๋ยวก็คงติดต่อกลับมา!"
32170-18 = "ค่ะ วิธีเดียวที่จะทำให้ชมรมทวงความยุติธรรมที่กำลังทำตามคำสั่งของสภาน้ำชาเคลื่อนไหวได้#nก็คือการทำให้สภาน้ำชาเกิดปัญหาค่ะ"
32170-19 = "ตอนนี้คุณฮาสุมิคงสังเกตเห็นแล้วล่ะค่ะว่าเกิดปัญหากับคุณนางิสะ"
32170-20 = "โคฮารุจังก็ติดต่อไปแล้วด้วย เดี๋ยวชมรมทวงความยุติธรรมก็คงกลับมาตรวจสอบสถานการณ์ค่ะ"
32170-21 = "แต่อยากให้รีบมาหน่อยจัง..."
32170-25 = "?!"
32170-26 = "นี่มัน..."
32170-35 = "กะ... กองกำลังเสริม...? ทำไมถึงได้เร็วแบบนี้...?"
32170-36 = "ดะ... ได้ยังไงกัน...?"
32170-44 = "ดูจำนวนแล้ว... ไม่ได้มาเป็นทีม แต่มาเป็นกองพันเลย นี่มันเกือบครึ่งหนึ่งของสาขา..."
32170-45 = "อะ... อ่า... ยกโขยงมาบุกรุกโรงเรียนกันตั้งมากมายขนาดนี้ แต่ทำไมถึงเงียบแบบนี้ล่ะ...?"
32170-46 = "ชมรมทวงความยุติธรรมยังไม่เคลื่อนไหวอีกเหรอคะ...?"
32170-47 = "มันก็แน่นอนอยู่แล้วนี่"
32170-49 = "คะ... คุณคือ...?!"
32170-54 = "เพราะตั้งแต่ตอนนี้พวกนั้นคือกองกำลังติดอาวุธอย่างเป็นทางการของทรีนิตี้ไงล่ะ"
32170-55 = "[s] \"มิกะ...?\""
32170-56 = "อื้อ ไม่ได้เจอกันนานเลยนะคุณครู ดีใจจังที่ได้เจอกันอีกนะ"
32170-57 = "ชมรมทวงความยุติธรรมไม่เคลื่อนไหวหรอก เพราะฉันสั่งไว้แบบนั้นน่ะ"
32170-58 = "ไม่คิดบ้างเหรอว่าวันนี้โรงเรียนมันเงียบๆ แปลกๆ? มันก็ต้องแน่นอนอยู่แล้วสิ#nก็ฉันเก็บกวาดทุกอย่างที่อาจจะขวางทางได้หมดแล้วยังไงล่ะ"
32170-59 = "ฉันไปขัดขวางไว้ด้วยวิธีการต่างๆ ในทุกที่ที่คำสั่งจากสภาน้ำชาจะไปถึงได้เอาไว้แล้ว"
32170-60 = "พูดง่ายๆ ก็คืออย่ารบกวนการโจมตีนางิจังเลยนะ"
32170-61 = "คุณมิโซโนะ มิกะ แห่งสภาน้ำชา... คุณมาทำอะไรที่นี่..."
32170-62 = "กะจะให้เวลานี้เป็นเวลาแห่งการเปิดม่านสีดำน่ะ☆#nอื้ม นี่แหละคือเนื้อแท้ของแผนการทั้งหมดจนถึงตอนนี้ของฉัน"
32170-63 = "เพราะว่าฉันคือ <คนทรยศในทรีนิตี้ตัวจริง> ยังไงล่ะ"
32170-64 = "......."
32170-65 = "......."
32170-66 = "...?!"
32170-68 = "ฉันเองก็ไม่ค่อยจะมีเวลาหรอกนะ บอกมาเถอะว่าเอาตัวนางิจังไปซ่อนไว้ที่ไหน"
32170-71 = "จะให้ฉันกำจัดทุกคนที่อยู่ที่นี่แล้วค้นหาให้ทั่วทุกซอกทุกมุมก็ได้หรอกนะ แต่ว่าไม่เอาดีกว่า"
32170-73 = "[ns] \"มิกะ... ทำไมถึง...\""
32170-74 = "หืม? คุณครูอยากรู้ว่าทำไมฉันถึงทำแบบนี้น่ะเหรอ?"
32170-75 = "อืม... ก็เพราะว่าฉันไม่ชอบเกเฮนน่าไง"
32170-76 = "เรียกว่าเกลียดเลยน่าจะดีกว่า"
32170-77 = "ที่คุณมิกะมาเล่นงานคุณนางิสะ... เพราะต้องการจะยกเลิกสนธิสัญญาเอเดน... ใช่ไหมคะ?!"
32170-78 = "เอ๋...? ใครกันล่ะเนี่ย? ขอโทษนะ ฉันจำหน้าใครไม่ค่อยจะได้น่ะ..."
32170-79 = "อ้อ จำได้แล้ว ฮานาโกะใช่ไหม? คนที่ถูกไล่ออกมาเพราะใส่ชุดว่ายน้ำไปเข้าคลาสสวดมนต์#nอ่าฮะฮ่าฮ่า"
32170-80 = "......."
32170-81 = "อะฮ่ะฮ่า ถูกต้อง เพราะนางิจังตั้งใจจะทำอะไรแปลกๆ อย่างสนธิสัญญาเอเดนที่ไม่เข้าท่าไงล่ะ"
32170-82 = "สนธิสัญญาสันติภาพกับพวกเด็กเกเฮนน่าที่หัวมีเขางั้นเหรอ? น่าขนลุกออกจะตายไป"
32170-83 = "ไม่คิดว่าจะถูกทรยศเลยรึยังไงกัน? ถ้าเผลอให้กับพวกเกเฮนน่า มีหวังได้โดนแทงข้างหลังโดยไม่ทันได้รีรอแน่"
32170-84 = "ฉันไม่ยอมเห็นสภาพแบบนั้นหรอก"
32170-85 = "นางิจังนี่นะ... ไม่มีทางที่เรื่องราวจะง่ายดายขนาดนั้นหรอก ฉันอยากให้นี่เป็นเรื่องราว#nไร้เดียงสาของโรงเรียนที่เรียบง่ายและสนุกสนานจัง แต่ก็... "
32170-86 = "อืม... มันไม่เป็นอย่างนั้นหรอก จะให้อธิบายยังไงดีล่ะ? พวกเราไม่คิดว่าเรื่องแบบนี้#nจะเหมาะกับพวกเราหรอกนะ..."
32170-87 = "เพราะงั้นคืนตัวนางิจังมาเถอะ ฉันไม่ทำร้ายเธอหรอก เธอจะได้ใช้เวลาที่เหลือในฐานะ#nของนักเรียนธรรมดาๆ ในห้องเรียนคุก แต่มันก็ไม่แย่หรอกนะ"
32170-88 = "[s] \"สนธิสัญญาเอเดนคือสนธิสัญญาสันติภาพจริงด้วยสินะ\""
32170-89 = "อืม... ขอโทษที่หลอกนะคุณครู ที่ฉันเคยพูดไปคือเรื่องโกหกน่ะ"
32170-90 = "มันคือสนธิสัญญาสันติภาพจริงๆ นั่นแหละ นางิจังไม่มีทางใช้สนธิสัญญาเอเดนเป็นพันธมิตร#nทางกองกำลังหรอก ก็เพราะเธอออกจะใสซื่อและก็โง่งมสิ้นดี"
32170-91 = "แต่ก็ใช่ว่าฉันจะพูดโกหกทุกอย่างนะคุณครู"
32170-92 = "เพราะที่ฉันบอกว่าอยากคืนดีกับอาเรียสเป็นเรื่องจริง"
32170-96 = "ไม่เชื่อก็ดูนี่สิ พวกพ้องที่เกลียดชังเกเฮนน่า"
32170-97 = "ฉันเคยบอกไปก่อนหน้านี้แล้วนี่ว่าอาเรียสเคยเป็นสมาชิกของทรีนิตี้มาก่อน อาเรียสเกลียดเกเฮนน่า#nไม่ต่างไปจากเราหรอก ไม่สิ ต้องบอกว่าอาเรียสคือการรวมตัวของความเกลียดชังมากกว่า"
32170-98 = "ฉันก็เลยขอความช่วยเหลือจากพวกพ้องที่มีอุดมการณ์เหมือนกัน#nขอให้ช่วยขับไล่คนชั่วที่จะทำสนธิสัญญาสันติภาพกับเกเฮนน่าออกไปยังไงล่ะ"
32170-99 = "หากโฮสต์นางิสะมีชมรมทวงความยุติธรรม โฮสต์มิกะก็จะมีอาเรียสในอนาคต"
32170-100 = "อืม... ข้อตกลงก็ประมาณนี้แหละ จะเรียกว่าผูกมิตรกับศัตรูก็ได้แหละมั้ง...?"
32170-101 = "สองฝ่ายที่ครั้งหนึ่งเคยเป็นปฏิปักษ์ต่อกันมาจับมือกันเพื่อโค่นศัตรูคนเดียวกัน เพราะงี้ฉันเลยแอบสนับสนุนอาเรียสอยู่ไงล่ะ"
32170-102 = "อาเรียสคือเครื่องมือยึดอำนาจของทรีนิตี้ตั้งแต่แรกเลยใช่ไหม..."
32170-103 = "อืม... นั่นสินะ จะมองว่านี่คือการยึดอำนาจก็ได้นะ เพราะนางิจังจะถูกปลด#nและฉันก็จะขึ้นเป็นโฮสต์ของสภาน้ำชาแทน"
32170-104 = "ฉันติดหนี้เธอมาเยอะเลยล่ะอาซึสะ ถึงฉันจะไม่รู้จักเธอดี แต่เธอก็เป็นคนที่มีค่าสำหรับฉันไม่เสื่อมคลายเลยล่ะนะ"
32170-105 = "เพราะเธอต้องกลายเป็นคนร้ายที่ทำลายนางิสะไงล่ะ"
32170-106 = "......!!"
32170-107 = "เธอคงไม่ต่างจากแพะรับบาปที่ต้องรับโทษแทน ต้องมีใครแบบนี้สักคน ทุกคนที่เหลือจะได้วางใจ และนอนหลับอย่างสบายได้ไง ว่าไหม?"
32170-108 = "ใครคนนั้นมาที่นี่เพราะเรื่องนั้น มันเป็นเรื่องธรรมดามากเลยว่าไหม? ก็ที่นี่คือโลกแบบนั้นไงล่ะ"
32170-109 = "......."
32170-110 = "แต่ฉันก็ตกใจมากเลยนะ มีรายงานว่านางิจังถูกโจมตีโดยคนปริศนา ฉันก็เลยรีบมาที่นี่เพราะนึกว่าแผนการผิดพลาด"
32170-111 = "ฮึ่ม... ไม่คิดเลยว่าชมรมชั้นเรียนเสริมจะเคลื่อนไหว อะฮ่ะฮ่า คิดไม่ถึงเลย"
32170-112 = "[s] \"เธอทำเรื่องแบบนี้เพราะอยากเป็นโฮสต์ของสภาน้ำชาเหรอ?\""
32170-113 = "อืม... ถูกต้อง"
32170-114 = "แต่อย่าคิดว่าที่ฉันทำแบบนี้เพราะโหยหาอำนาจเลยนะคุณครู"
32170-115 = "ฉันก็แค่... อยากลบเกเฮนน่าออกจากคิโวทอสก็เท่านั้น"
32170-116 = "[s] \"......\""
32170-117 = "ฉันจะกวาดล้างนกพิราบในทรีนิตี้ออกให้หมด แล้วเอาอาเรียสเข้ามาแทนที่"
32170-118 = "ทำแบบนั้นจะเกิดสหพันธ์ใหม่ไหมนะ? อืม แต่ถ้าต้องการฉันก็เปิดสภาให้ใหม่ก็ได้#nแบบนั้นก็น่าจะไม่เลวเลยนะ"
32170-119 = "อีกอย่าง... ทรีนิตี้ที่ติดอาวุธใหม่ก็จะก่อสงครามเบ็ดเสร็จกับเกเฮนน่า นั่นแหละแผนการของฉัน"
32170-120 = "[ns] \"พอได้แล้ว พอที!!\""
32170-121 = "ว้าว ตะ... ตกใจหมดเลย"
32170-122 = "อืม ฉันรู้ว่าคุณครูโกรธ ขอโทษนะ ฉันเสียมารยาทมากเลยใช่ไหมล่ะ?"
32170-127 = "เอาเป็นว่า... เราจัดการสถานการณ์นี้ก่อนแล้วค่อยมาคุยกันต่อดีไหม?"
32170-131 = "ระวังนะคุณครู"
32170-132 = "เธอคนนั้น... เก่งไม่ใช่เล่นเลย"
32170-133 = "อืม... ฉันเคยบอกไปแล้วนี่ว่าฉันเก่งพอตัว"
32170-134 = "เอาล่ะ จัดการชมรมชั้นเรียนเสริมเลย"

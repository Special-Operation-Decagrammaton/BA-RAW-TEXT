[translation]
12160-1 = "第16話;大人的戰鬥"
12160-2 = "我們知道你是誰，由聯邦學生會長召喚出的無法理解的存在。"
12160-3 = "那[ruby=希迪姆的箱子]個歐帕茲的[/ruby]主人、聯邦搜查部「夏萊」的老師。"
12160-4 = "某些人似乎低估了你，但我們並不這麼認為。"
12160-5 = "……首先我想表明我們的立場。"
12160-6 = "我們不打算與你為敵。"
12160-7 = "不如說希望和你合作。"
12160-8 = "我們判斷你將會成為我們計畫中最大的阻礙。"
12160-9 = "對我們而言，剷除阿拜多斯這麼小的學校根本不成問題。#n不過老師，我們還是想避免與你為敵。"
12160-10 = "[s] 「你們到底是誰？」"
12160-11 = "……哎呀，原來我還沒自我介紹嗎？"
12160-12 = "我們和你一樣，都是奇普托斯的外來者……不過，我們和你是來自不同領域的存在。"
12160-15 = "因為正好有個合適的名字，我們決定借來一用──#n請稱呼我們為「蓋瑪特利亞」。"
12160-16 = "至於我的話，叫我「黑色西裝人」就可以了。#n我很喜歡這個名字。"
12160-17 = "[ruby=蓋瑪特利亞]我們[/ruby]是觀察者、探究者，也是研究者。"
12160-18 = "可以將我們視為和你一樣「無法理解的存在」。"
12160-19 = "姑且問你一下，你是否有和[ruby=我們]蓋瑪特利亞[/ruby]攜手合作的打算？"
12160-20 = "[s1] 「沒有。」\n[s2] 「一點都沒有。」"
12160-21 = "……"
12160-22 = "……"
12160-25 = "拒絕這個能夠掌握真理和秘儀的提議，那麼你在這奇普托斯究竟想追求什麼？"
12160-26 = "[s3] 「我對那些沒興趣。」\n[s4] 「我只是來把星野帶回去而已。」"
12160-27 = "……咯，咯咯。"
12160-28 = "……咯，咯咯。"
12160-29 = "你沒察覺自己的行為不具正當性嗎，老師？#n你有什麼權利提出那種要求？"
12160-30 = "星野已經不是阿拜多斯的學生了。你沒確認退學申請書嗎？"
12160-31 = "[s]「星野並沒有退學。」"
12160-32 = "……哦？"
12160-37 = "[ns]「身為『顧問』的我還沒批准那份文件。」"
12160-38 = "……"
12160-41 = "[ns]「所以星野依然是對策委員會的一員──」"
12160-43 = "[ns]「依然是阿拜多斯的副學生會長──」"
12160-45 = "[ns]「依然是我的學生。」"
12160-47 = "……原來如此。"
12160-48 = "只要你是「老師」，學生的去向就需要你的許可……"
12160-49 = "原來如此……這是那樣的故事啊。"
12160-50 = "學校的學生，還有老師……呼呣，真是麻煩的概念呢。"
12160-51 = "[s] 「你們欺騙了那些孩子、踐踏了他們的心、利用了他們的痛苦。」"
12160-52 = "沒錯，正是如此。#n他人的不幸確實能讓我們從中獲利。"
12160-53 = "如果要問我們的行為是善是惡，我想無庸置疑是惡吧──這點我並不否認。"
12160-54 = "不過這都是合乎規定的。"
12160-57 = "希望你別誤會，老師。"
12160-58 = "阿拜多斯的災難並不是我們造成的。"
12160-60 = "砂塵暴侵襲那所學校雖然相當少見，不過並非毫無可能。#n換言之，那就是所謂的天災異變。"
12160-61 = "我們只是利用了那個機會而已。"
12160-63 = "為在沙漠中脫水瀕臨死亡的人提供飲水……其代價是一生為奴才得以償還的債務。"
12160-64 = "僅此而已。"
12160-65 = "這是世上隨處可見的事。我們不必承擔這些責任。"
12160-66 = "並非因我們而起，也不因我們停手而不再發生。"
12160-67 = "有權者壓榨無權者，有識者壓榨無知者──"
12160-68 = "這不是每個大人都瞭然於心的事實嗎？"
12160-71 = "所以……希望你能從阿拜多斯撤離，老師。"
12160-72 = "只要願意放棄星野，我就替你保住那所學校。"
12160-73 = "凱薩PMC的事也會由我們解決。"
12160-74 = "如此一來，那些孩子就能繼續在阿拜多斯上學了吧。"
12160-75 = "我想這應該也是星野的期望才對──你意下如何？"
12160-76 = "[s] 拒絕"
12160-77 = "……為什麼？"
12160-78 = "無論如何都打算與我們敵對嗎？"
12160-79 = "你明明手無縛雞之力，究竟打算如何戰鬥！"
12160-82 = "[ns] 拿出大人的卡片"
12160-83 = "……"
12160-84 = "……老師。"
12160-85 = "那確實是只屬於你的武器。#n不過它所帶來的風險，我也略知一二。"
12160-86 = "越是使用就越會被削減吧──你的生命，你的時間。"
12160-87 = "……沒錯吧？"
12160-88 = "所以請收起那張卡片吧，老師。#n你應該也有自己的生活才對。"
12160-89 = "吃飯、搭地鐵、繳房租……必須解決這些無意義且不值一提的小事不是嗎？"
12160-90 = "請你務必那麼做，老師。#n請把它用在比那些孩子更重要的地方。"
12160-91 = "置之不理不也是一種選擇嗎？"
12160-92 = "畢竟這裡的事，本來就與你無關啊。"
12160-93 = "[s] 拒絕"
12160-94 = "為何？為何？為何？為何？為何？為何？為何？為何？為何？為何？"
12160-95 = "無法理解，為何？為何拒絕呢？"
12160-96 = "為什麼？老師，到底是為了什麼？"
12160-100 = "[ns] 「沒有任何大人願意為那些孩子的痛苦負責。」"
12160-101 = "……你想說什麼？"
12160-102 = "所以你想負起責任嗎？#n你並非那些孩子的監護人，也不是家人。"
12160-103 = "只是碰巧被叫來阿拜多斯，碰巧與那些孩子們相遇的外人而已。"
12160-104 = "究竟為何要做那種事呢？為什麼要承擔不必承擔的責任？"
12160-105 = "[s] 「因為那是大人該做的事。」"
12160-106 = "……"
12160-107 = "……啊啊，這樣啊。"
12160-108 = "你想說所謂的大人就是「背負責任之人」嗎？"
12160-111 = "老師，那個想法是錯誤的。"
12160-112 = "所謂的大人，是能將社會改造成自己理想的模樣──#n決定法律、決定規則……定義正常與異常、平凡與非凡的人。"
12160-113 = "以權力、知識、力量統治無權者、無知者、無力者──這就是大人。"
12160-114 = "──也就是像你這樣的人。"
12160-115 = "……你本來能成為這奇普托斯的支配者。"
12160-116 = "這座都市的巨大權力、權限，以及存在於此的神祕──#n這一切曾一度掌握在你的手中。"
12160-117 = "然而你卻毫不猶豫地放棄了它們。"
12160-118 = "實在無法理解。"
12160-119 = "那個選擇究竟意味著什麼？#n真理、祕儀、權利、金錢、力量……捨棄這一切的、你那毫無意義的選擇！"
12160-122 = "[ns]「……我想就算我說了，你也絕對無法理解。」"
12160-125 = "……"
12160-126 = "好吧。交涉決裂了，老師。"
12160-127 = "我雖然很中意你……但這也沒辦法。"
12160-128 = "老師，你想拯救星野嗎？"
12160-130 = "星野就在阿拜多斯砂漠．PMC基地中央的實驗室裡。"
12160-131 = "藉由[ruby=Mimesis]複製[/ruby]觀測神祕的另一面，也就是恐怖。#n這一手段是否適用於活著的學生──對其進行驗證的實驗即將開始。"
12160-132 = "沒錯，以星野為實驗對象進行徹底研究。"
12160-133 = "如果失敗的話，就拿那個狼神來當替代品……#n不過現在似乎沒有那個選項了呢。"
12160-134 = "儘管去拯救你的學生吧。"
12160-136 = "還請務必好好努力。"
12160-138 = "……"
12160-139 = "[USERNAME]老師。"
12160-140 = "……蓋瑪特利亞今後將一直關注著你。"
12160-141 = "[ns] 回去"
12160-144 = "歡迎回來，老師。"
12160-145 = "老師，等你很久了！"
12160-146 = "老師！"
12160-147 = "老師……"
12160-148 = "我們都在等待老師的決定。"
12160-149 = "接下來……"
12160-152 = "[ns5]「救出星野吧。」\n[ns6]「救出星野吧！」\n[ns7]「救出星野吧！！」"
12160-153 = "……嗯，走吧。"
12160-154 = "……嗯，走吧。"
12160-155 = "……嗯，走吧。"
12160-156 = "[ns] 「我們要救出星野，把他帶回這裡！」"
12160-157 = "是，我明白了！"
12160-158 = "[ns] 「要救出星野，然後好好教訓他才行！」"
12160-159 = "嗯嗯！違背自己說的話就必須處罰！要好好教訓！"
12160-160 = "[ns] 「對他說『歡迎回來』，讓他說出『我回來了』！」"
12160-161 = "嗯……"
12160-162 = "咦！？ "
12160-163 = "那也太羞恥了吧！！誰做得出來啊！！"
12160-164 = "我來做。"
12160-165 = "咦，咦！？"
12160-166 = "我也要！茜香醬不做也沒關係哦！"
12160-167 = "怎，怎麼這樣！？"
12160-168 = "我，我……雖然有點猶豫……不過感覺就得這樣才行……"
12160-169 = "隨，隨便你們！反正我絕對不會說那種肉麻的話！！"
12160-171 = "啊，啊哈哈……#n既然已經決定好了，來進行作戰的準備吧……"
12160-172 = "只靠現在的我們贏不了那支軍隊。"
12160-173 = "願意幫助我們的人……"
12160-174 = "便利屋呢？"
12160-175 = "他們確實幫了我們沒錯……不過現在已經不知去向了。#n不知道能不能再拜託他們……"
12160-176 = "肯定沒問題吧！誰叫他們至今為止給我們製造了那麼多麻煩！"
12160-179 = "[ns] 「我有個想法。」"
12160-180 = "嗯？"
12160-181 = "老師的想法是……？"
12160-183 = "下一話;想守護的事物"

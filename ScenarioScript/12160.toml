12160-168 = "ส่วนฉัน... ขอคิดดูก่อน... แต่เหมือนจะต้องทำยังไงก็ไม่รู้...\n"
12160-169 = "ตามใจเถอะ! แต่ฉันไม่ทำอะไรบ้าบอแบบนั้นหรอกนะ!! ไม่มีทาง!!\n"
12160-171 = "แหะๆๆ งั้นเอาเป็นว่าเราตัดสินใจตามนี้ ต่อไปก็มาวางแผนต่อสู้..."
12160-172 = "แต่ว่า ลำพังพวกเราคงเอาชนะกองทหารนั่นไม่ได้หรอก"
12160-173 = "คนที่จะมาช่วยพวกเรา..."
12160-174 = "หน่วยรับจ้างสารพัดไงล่ะ?\n\n\n"
12160-175 = "ทางนั้นเคยช่วยพวกเราไว้ก็จริง แต่ตอนนี้ก็หายตัวไปแล้วค่ะ เราจะขอร้องพวกเธออีกได้เหรอคะ..."
12160-176 = "กังวลอะไรล่ะ! คนพวกนั้นเคยมาก่อกวนเราไว้ตั้งเยอะ! \n\n"
12160-179 = "[ns] \"ครูมีความคิดดีๆ แล้วละ\""
12160-180 = "เอ๋? คุณครูน่ะเหรอคะ...?"
12160-181 = "...?"
12160-183 = "ตอนต่อไป;สิ่งที่อยากปกป้อง"

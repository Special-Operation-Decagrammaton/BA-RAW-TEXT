[translation]
12160-1 = "Episode 16;Battle Between Adults"
12160-2 = "We know who you are. An enigmatic individual chosen by the General Student Council president."
12160-3 = "Owner of the artifact known as the Shittim Chest. The Sensei of Schale, the Federal Investigation Club."
12160-4 = "Others tend to underestimate you, but we won't make the same mistake."
12160-5 = "First, let me make something clear."
12160-6 = "We have no interest in a conflict with you."
12160-7 = "In fact, we want to work with you..."
12160-8 = "...because otherwise, you represent the largest obstacle to our plans."
12160-9 = "Wiping out an insignificant school like Abydos is child's play. However, we'd rather avoid the consequence of starting a war with you in the process."
12160-10 = "[s] \"Who are you people?\""
12160-11 = "Oh, dear. Have we not introduced ourselves?"
12160-12 = "We are outsiders to Kivotos, the same as you... Ah, but that doesn't mean we came from the same place."
12160-15 = "For the time being, we've found a suitable name to borrow. Please call us Gematria."
12160-16 = "And I'm fine with going by \"Black Suit,\" Sensei. I've grown quite fond of that name."
12160-17 = "We, Gematria, are...observers, explorers, and researchers."
12160-18 = "An inexplicable existence, much like you."
12160-19 = "So allow me to formally ask. Do you have any interest in working with us? With Gematria?"
12160-20 = "[s1] \"No.\"\n[s2] \"Never.\""
12160-21 = "..."
12160-22 = "..."
12160-25 = "If not, then tell me... What is it that you seek in Kivotos? We can elucidate all manner of secrets and truths should you accept our proposal."
12160-26 = "[s3] \"Not interested.\"\n[s4] \"All I want is to take Hoshino back.\""
12160-27 = "Ha. Haha."
12160-28 = "Ha. Haha."
12160-29 = "Do you truly believe your actions are just, Sensei? What right do you have to make such demands?"
12160-30 = "Hoshino is no longer a student of Abydos. Haven't you seen her withdrawal papers?"
12160-31 = "[s] \"Hoshino never dropped out of school.\""
12160-32 = "Hmm?"
12160-37 = "[ns] \"See? I'm her club advisor and I never signed that document.\""
12160-38 = "..."
12160-41 = "[ns] \"That means she's still part of the Foreclosure Task Force.\""
12160-43 = "[ns] \"She is still vice president of the Abydos Student Council.\""
12160-45 = "[ns] \"And she is and will forever be one of my students.\""
12160-47 = "I see..."
12160-48 = "You're their teacher. Major changes in your students' lives must have your approval."
12160-49 = "The logic is easy to understand."
12160-50 = "Academies and their students... Teachers... Hmm. How bothersome."
12160-51 = "[s] \"You deceived children, trampled on their hearts, and took advantage of their suffering.\""
12160-52 = "Indeed. We have used the misfortune of others as stepping stones for our benefit."
12160-53 = "I won't deny it. If you must call it evil, so be it."
12160-54 = "Evil, but it is legal."
12160-57 = "Don't be mistaken, Sensei."
12160-58 = "The disaster that struck Abydos was not our doing."
12160-60 = "A sandstorm consuming a city—it's rare, but not impossible. A natural disaster, nothing more."
12160-61 = "We merely took advantage of the opportunity."
12160-63 = "Imagine providing water to someone dying of thirst in a desert. Would it not be fair to expect that person to repay you with their life?"
12160-64 = "This is no different."
12160-65 = "A tale as old as time. It is not our burden to bear."
12160-66 = "We didn't create this world, nor will it change if we step aside."
12160-67 = "The strong exploit the weak. The knowledgeable exploit the ignorant."
12160-68 = "Every adult knows that to be true. Isn't that right?"
12160-71 = "So...leave Abydos behind, Sensei."
12160-72 = "Give us Hoshino, and the school will remain intact."
12160-73 = "Kaiser PMC's forces present no challenge for us."
12160-74 = "Your students can continue attending Abydos to the best of their meager abilities."
12160-75 = "Isn't that what Hoshino wanted? What do you say?"
12160-76 = "[s] Refuse."
12160-77 = "...Why?"
12160-78 = "Why are you so desperate to stand in our way? You are powerless!"
12160-79 = "How do you plan to fight us?!"
12160-82 = "[ns] Take out your credit card."
12160-83 = "..."
12160-84 = "But, Sensei..."
12160-85 = "I've never concerned myself with such quotidian matters, but I understand the rules to its system."
12160-86 = "The more you use it, the more it eats away at you—your life, your time."
12160-87 = "...I'm right, aren't I?"
12160-88 = "So put the card away, Sensei. You have a life to live, don't you?"
12160-89 = "You need to eat, ride the subway, pay rent, and deal with trivial, mundane things like that."
12160-90 = "That's what you should be focusing on, Sensei. Spend your efforts on something worthwhile. Not those kids."
12160-91 = "So just leave it be."
12160-92 = "This isn't your fight."
12160-93 = "[s] Refuse."
12160-94 = "Why...? Why? Why? Why? Why?! WHY?!"
12160-95 = "I don't understand. Why? I can't get it. Why would you refuse?"
12160-96 = "Why, Sensei? For what?"
12160-100 = "[ns] \"Not a single adult took responsibility for their suffering.\""
12160-101 = "...You can't be serious."
12160-102 = "So you think that responsibility falls on you? You're not their guardian. You're not their family."
12160-103 = "You were just a stranger, called to Abydos by chance, who happened to meet them."
12160-104 = "Why go through all this trouble? Why burden yourself with a responsibility that was never yours to begin with?"
12160-105 = "[s] \"Because that's what it means to be an adult.\""
12160-106 = "..."
12160-107 = "Ah... I see."
12160-108 = "You believe that being an adult means taking responsibility?"
12160-111 = "No, Sensei. That's where you're wrong."
12160-112 = "Adults are the ones who transform society, set rules and laws, designate the norm, and define the boundary between ordinary and extraordinary."
12160-113 = "Adults rule the aimless with authority, the ignorant with knowledge, and the weak with power. That is what it means to be an adult."
12160-114 = "Someone like you."
12160-115 = "You could have ruled over all of Kivotos."
12160-116 = "You had it all for a brief moment: unfathomable power and authority over this city, its Mystics..."
12160-117 = "And yet, you cast it all aside without a second thought."
12160-118 = "I simply don't understand."
12160-119 = "Tell me—why make such a choice? Truth, influence, riches, power... Your choice left you with none of those. So why?!"
12160-122 = "[ns] \"Even if I told you, you would never understand.\""
12160-125 = "..."
12160-126 = "Very well. These negotiations are over."
12160-127 = "I did like you, but you've left me with no choice."
12160-128 = "Do you wish to save Hoshino, Sensei?"
12160-130 = "She's being held in the lab of the PMC base at the center of the Abydos Desert."
12160-131 = "Mimesis has shown us the other side of Mystic: Terror. Now we shall see if the same can be done with a living student."
12160-132 = "Hoshino is our guinea pig to use however we want. "
12160-133 = "And if she doesn't produce results, we'll move on to the wolf god. Though even that doesn't seem to be a feasible option at this point."
12160-134 = "Try saving your kidnapped student."
12160-136 = "...Do your best."
12160-138 = "..."
12160-139 = "[USERNAME] Sensei."
12160-140 = "...Gematria will be watching you."
12160-141 = "[ns] Return."
12160-144 = "Welcome back, Sensei."
12160-145 = "Hey! There you are, Sensei."
12160-146 = "Sensei!"
12160-147 = "Sensei..."
12160-148 = "We've been waiting for your decision."
12160-149 = "What's our next move...?"
12160-152 = "[ns5] \"We save Hoshino.\"\n[ns6] \"We save Hoshino!\"\n[ns7] \"We WILL save Hoshino!!!\""
12160-153 = "Agreed. We're with you, Sensei."
12160-154 = "Agreed. We're with you, Sensei."
12160-155 = "Agreed. We're with you, Sensei."
12160-156 = "[ns] \"We won't stop until we bring her home!\""
12160-157 = "Yes! Understood."
12160-158 = "[ns] \"And then we're going to give her a piece of our minds!\""
12160-159 = "That's right! She went back on her word and needs to be taught a lesson! A super scary lesson!"
12160-160 = "[ns] \"After we save Hoshino, we'll tell her, 'Welcome back,' and she'll say, 'I'm home!\""
12160-161 = "Yeah..."
12160-162 = "Wait, what?!"
12160-163 = "That's so corny and cliche! Are you TRYING to make me cringe?!"
12160-164 = "I will."
12160-165 = "You will?!"
12160-166 = "I'll do it too! You don't have to, Serika."
12160-167 = "Are you serious?!"
12160-168 = "U-um... I-I'll think about it... B-but...it does kinda feel like the proper thing to do..."
12160-169 = "Ugh, fine, do whatever you want! There's no way I'm doing something that embarrassing!!"
12160-171 = "Haha. Then it's settled. Let's prepare for battle..."
12160-172 = "But how do we defeat that army on our own?"
12160-173 = "Is there anyone we can call for backup?"
12160-174 = "What about Problem Solver?"
12160-175 = "They did help us earlier, but they took off after that. I don't know if we can ask them for another favor."
12160-176 = "Why not?! Think of all the trouble they caused us!"
12160-179 = "[ns] \"I have an idea.\""
12160-180 = "Huh? What is it, Sensei?"
12160-181 = "...Hmm?"
12160-183 = "Next Episode;That Which One Must Protect"

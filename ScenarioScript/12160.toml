12160-10 = "[s] \"พวกนายเป็นใคร?\""
12160-11 = "แย่จริง... ผมยังไม่ได้แนะนำตัวสินะครับ?"
12160-12 = "พวกเราก็เป็นคนนอกคิโวทอสเหมือนกันกับคุณ อ๊ะ แต่ก็ไม่ได้หมายความว่าพวกเราเป็นตัวตนที่เหมือน#nกับคุณหรอกนะครับ"

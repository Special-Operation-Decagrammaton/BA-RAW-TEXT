12160-18 = "เรียกได้ว่าเป็นคนที่ <ลึกลับ> เหมือนกับคุณได้ไหมนะ?"
12160-19 = "ขอถามเผื่อไว้ก่อนเลยแล้วกัน คุณคิดอยากจะร่วมมือกับเกมาเทรียไหมล่ะครับ?"

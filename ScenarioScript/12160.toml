12160-22 = "......"
12160-25 = "แล้วสิ่งที่คุณแสวงหาอยู่ในคิโวทอสแห่งนี้คืออะไรเหรอครับ? นี่เป็นข้อเสนอที่จะทำให้คุณได้มาซึ่งความ#nจริงและความลับสำคัญเลยนะครับ"

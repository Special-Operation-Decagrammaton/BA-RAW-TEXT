[translation]
10039010-1 = "ตอนที่ 1;โอกาสในการเปลี่ยนภาพลักษณ์"
10039010-2 = "48 ชั่วโมงก่อนหน้า"
10039010-7 = "ฮู่ว...! เสร็จแล้วค่ะ!"
10039010-11 = "เสร็จเร็วกว่าที่คิดอีกนะคะ ขอบคุณที่มาช่วยนะคะ ซิสเตอร์มารี!"
10039010-12 = "ไม่หรอกค่ะ ฉันช่วยแค่เรื่องเล็กๆ น้อยๆ เอง ส่วนมากซิสเตอร์ฮินาตะเป็นคนทำมากกว่าค่ะ"
10039010-13 = "ถ้าไม่มีซิสเตอร์ฮินาตะ งานนี้ก็คงใช้เวลามากกว่านี้แน่ๆ... ขอบคุณที่อยู่เคียงข้างกันเสมอเลยนะคะ"
10039010-14 = "มะ... ไม่ขนาดนั้นหรอกค่ะ! คนอย่างฉันน่ะ..."
10039010-19 = "เอ๋? เหมือนมีใครติดต่อมา..."
10039010-20 = "ไม่ใช่ของฉันนี่คะ...?"
10039010-21 = "หืม? อ๊ะ ขอโทษค่ะ ของฉันเองค่ะ! ต้องรีบตอบแล้ว..."
10039010-25 = "...?"
10039010-26 = "ซิสเตอร์มารี...?"
10039010-27 = "อ๊ะ ขอโทษค่ะ พอดีเป็นข้อความที่คาดไม่ถึงน่ะค่ะ..."
10039010-28 = "ท่านซากุระโกะ...?"
10039010-29 = "ท่านซากุระโกะเหรอคะ...? มีงานอะไรที่พวกฉันต้องทำเพิ่มอีกอย่างนั้นเหรอคะ?"
10039010-30 = "ไม่ค่ะ ไม่น่าจะใช่นะคะ... อืม... ฉันไม่แน่ใจเลยค่ะ ในข้อความบอกเอาไว้แค่ว่า..."
10039010-32 = "'ขอการสนับสนุนเร่งด่วน' น่ะค่ะ..."
10039010-36 = "ขอเสียมารยาทหน่อยนะคะ..."
10039010-37 = "ฉันมาที่นี่เพราะท่านซากุระโกะเรียกมาน่ะค่ะ... ท่านซากุระโกะอยู่ที่นี่หรือเปล่าคะ...?"
10039010-38 = "...?"
10039010-45 = "...!?!?!?"
10039010-46 = "ทะ.. ท่านซากุระโกะ!? คุณมิเนะ!? นะ... นี่มันอะไรกัน...!!"
10039010-48 = "หืม...?"
10039010-49 = "อ้อ มารี มาได้ตรงจังหวะเลยค่ะ น่าจะกำลังยุ่งอยู่แท้ๆ ขอบคุณที่มานะคะ"
10039010-50 = "ถ้ามารีไม่มาตอนนี้ ฉันก็ไม่รู้เลยค่ะว่าสถานการณ์หลังจากนี้จะเป็นยังไง..."
10039010-51 = "บางทีอาจจะเป็นการได้ข้อสรุปโดยที่ไม่มีการพิพากษาก็ได้ค่ะ ถึงแม้นั่นจะไม่ใช่ตอนจบที่ทั้งคุณ และฉันต้องการก็เถอะค่ะ"
10039010-52 = "ขะ... ข้อสรุปเหรอคะ!? ไหนจะการพิพากษาอีก!? นะ... นี่มันเรื่องอะไรกันคะ...!!"
10039010-54 = "...?"
10039010-55 = "คะ...?"
10039010-56 = "ข้อสรุป...? การพิพากษา...? นี่พวกเราทะเลาะกันอย่างนั้นเหรอคะ?"
10039010-57 = "...?"
10039010-58 = "คะ? จะบอกว่าที่ผ่านมาคุณไม่ได้พูดกันในทิศทางนั้นเหรอคะ...?"
10039010-59 = "คุณบอกเองไม่ใช่เหรอคะว่า \"ก่อนที่เราจะปะทะกัน ต้องให้คุณมารีเข้ามาสังเกตการณ์ก่อน\"?"
10039010-60 = "...????"
10039010-61 = "ค่ะ ก็ใช่... ฉันพูดไปอย่างนั้นจริงๆ ค่ะ แล้วมันแปลกยังไงเหรอคะ? ทำไมถึงสรุปแบบนั้นล่ะ...?"
10039010-62 = "ฉันก็แค่จะขอความคิดเห็นจากมารี..."
10039010-65 = "แต่ว่า... เมื่อกี้..."
10039010-66 = "คะ... คือว่า...!!"
10039010-67 = "ฉันมีส่วนเกี่ยวข้องอะไรกับเรื่องนี้ด้วยเหรอคะ!? หรือว่าฉันทำอะไรผิดไป...!"
10039010-68 = "ไม่ค่ะ...!! จะเป็นอย่างนั้นไปได้ยังไงคะ"
10039010-69 = "ถึงฉันจะไม่ใช่คนในชมรมซิสเตอร์ แต่ก็รู้ดีค่ะว่าคุณมารีได้รับความเชื่อถือจากทุกคนมากแค่ไหน"
10039010-71 = "ตายจริง... ขอโทษนะคะมารี คงจะสับสนน่าดู แต่ว่าสถานการณ์ตอนนี้ มารีเองก็น่าจะลำบากใจ#nไม่น้อยเลยค่ะ"
10039010-72 = "ถ้าจะให้อธิบายละก็..."
10039010-73 = "เดี๋ยวนะคะ..."
10039010-74 = "อืม... ฉันจะเป็นคนอธิบายเองค่ะ"
10039010-75 = "ฉันไม่ได้จะโทษคุณเรื่องเจตนานะคะ แต่ในฐานะของคนที่เฝ้าสังเกตการพูดของคุณซากุระโกะมา ฉันคิดว่าการอธิบายจากคุณอาจเพิ่มความสับสนได้ค่ะ"
10039010-76 = "คะ...?"
10039010-77 = "ฉันน่ะเหรอคะ? การพูดของฉันน่ะเหรอ...?"
10039010-78 = "ทำไมล่ะ...??"
10039010-79 = "..."
10039010-80 = "แค่ดูจากคำที่พูดมาเมื่อกี้ ฉันก็คิดว่ามีความเสี่ยงแล้วค่ะ"
10039010-81 = "อึก... รู้สึกเหมือนเดจาวูเลย..."
10039010-82 = "เอาเป็นว่า เข้าใจแล้วค่ะ... ทำอย่างที่ว่าเลยค่ะ..."
10039010-84 = "ท่านซากุระโกะ..."
10039010-85 = "ถ้าอย่างนั้นก็ คุณมารี... ต้องขอโทษเป็นอย่างยิ่งที่รบกวนเวลาอันมีค่าของคุณนะคะ ก่อนอื่นฉันจะ#nอธิบายเกี่ยวกับสถานการณ์ที่พวกเรากำลังเผชิญอยู่ให้ฟังค่ะ"
10039010-87 = "อย่างที่คุณมารีรู้ว่าตอนนี้ที่ทรีนิตี้กำลังจัดงานคาร์นิวัลอยู่"
10039010-88 = "ในงานคาร์นิวัลมีกิจกรรมต่างๆ มากมาย และสิ่งพิเศษในครั้งนี้ก็คือ <อีเวนต์ไอดอล> ค่ะ"
10039010-89 = "นี่เป็นอีเวนต์ขนาดใหญ่ที่ไม่ใช่แค่พวกเราชาวทรีนิตี้เท่านั้น แต่นักเรียนชมรมต่างๆ จากโรงเรียนอื่น#nก็มาเข้าร่วมได้ค่ะ"
10039010-90 = "อีเวนต์นี้จะให้เราสนุกไปกับการแสดงบนเวทีร่วมกับนักเรียนจากโรงเรียนอื่น ไม่ว่าภาพลักษณ์ในยาม#nปกติของแต่ละชมรมจะเป็นยังไง เรียกได้ว่าเป็น..."
10039010-91 = "โอกาสในการเปลี่ยนภาพลักษณ์เลยค่ะ..."
10039010-93 = "ใช่ค่ะ... นี่เป็นโอกาสที่ดีในการเปลี่ยนภาพลักษณ์ของเราค่ะ"
10039010-94 = "สรุปก็คือ นี่คือโอกาสเดียวที่เราจะได้ปรับปรุงภาพลักษณ์ที่ไม่ดีและความเข้าถึงยากของชมรมอัศวิน#nบรรเทาทุกข์กับชมรมซิสเตอร์ค่ะ"
10039010-95 = "ภะ... ภาพลักษณ์ที่ไม่ดีและเข้าถึงยาก...? พวกเรามีภาพลักษณ์อย่างนั้นเหรอคะ...?"
10039010-97 = "น่าเสียดายที่ใช่ค่ะ มารี"
10039010-98 = "มารีอาจจะยังไม่รู้ แต่ตามลักษณะเฉพาะของชมรมเราแล้ว ชมรมเราชอบโดนลากไปพัวพันกับข่าวลือ#nอันเป็นเท็จและทฤษฎีสมคบคิดแบบนั้นน่ะค่ะ"
10039010-99 = "อย่างเช่น ชมรมซิสเตอร์ชอบก่อแผนร้ายลับๆ สอดแนมพวกนักเรียนและจับตัวพวกเขาไปกลางดึก..."
10039010-100 = "แล้วก็มีความเข้าใจผิดว่าชมรมอัศวินบรรเทาทุกข์ใช้ชื่อชมรมเป็นข้ออ้างไว้ก่อความรุนแรงทุกรูปแบบ และทำลายล้างทุกอย่างก่อนเพื่อรักษาทีหลังค่ะ"
10039010-101 = "นี่เป็นข่าวลือที่ไม่ดีสำหรับชมรมที่ควรจะเป็นประโยชน์ต่อนักเรียนคนอื่นๆ และต้องทำให้พวกเธอ#nสบายใจแท้ๆ ค่ะ"
10039010-102 = "ปะ... เป็นแบบนั้นไปได้ยังไง...! ทำไมถึง...!"
10039010-103 = "ฮู่ว... นั่นสินะคะ ทำไมถึงมีข่าวลือแบบนั้นก็ไม่รู้ค่ะ..."
10039010-104 = "นี่ก็เลยเป็นการบ้านชิ้นใหญ่ของพวกเราทุกคนเลยค่ะ และฉันก็ยินดีทำทุกอย่างเพื่อแก้ไขปัญหานี้ค่ะ"
10039010-105 = "ถึงแม้นั่นจะเป็น... สิ่งที่ไม่เคยทำมาก่อน หรือเป็นการท้าทายครั้งแรกในชีวิตก็ตามค่ะ"
10039010-106 = "การท้าทาย... ครั้งแรกในชีวิต?"
10039010-107 = "มารี..."
10039010-108 = "ฉันกับหัวหน้ามิเนะ..."
10039010-112 = "จะเป็นไอดอลกันค่ะ..."
10039010-113 = "ไอดอลเหรอคะ...!?"
10039010-114 = "ฉันรู้ดีว่าเรื่องแบบนั้นไม่เหมาะกับฉันค่ะ เพราะทั้งฉันกับหัวหน้ามิเนะก็ไม่ได้มีความสนใจในไอดอล หรืออะไรน่ารักๆ เลย..."
10039010-115 = "...?"
10039010-116 = "ไม่นะคะ ฉันก็ไม่ถึงกับไม่ชอบอะไรพวกนั้น..."
10039010-117 = "แล้วฉันก็เตรียมใจไว้แล้วค่ะว่าถ้าคนอย่างพวกเราไปทำอะไรแบบนั้น ก็จะถูกมองว่าเป็นตัวตลก"
10039010-118 = "คะ...!? ดะ... เดี๋ยวนะคะ!!"
10039010-119 = "ปะ... เป็นอย่างนั้นเหรอคะ!? นั่นเป็นเรื่องน่าหัวเราะเยาะอย่างนั้นหรอกเหรอคะ!?!?"
10039010-120 = "แต่ถึงอย่างนั้น ถ้าความน่าหัวเราะเยาะพวกนั้น มันจะทำให้นักเรียนคนอื่นๆ มีความคิดในทางที่ดีกับ#nพวกเราได้บ้างแล้วละก็..."
10039010-121 = "...!!"
10039010-122 = "ถ้าเป็นอย่างนั้นได้ พวกฉันก็ยินดีที่จะอดทนต่อความน่าหัวเราะเยาะที่คนอื่นคิดค่ะ"
10039010-124 = "ท่านซากุระโกะ..."
10039010-128 = "เข้าใจแล้วค่ะ ถ้าทั้งสองท่านถึงกับพูดอย่างนั้น ฉันก็คงจะต้องช่วยแล้วละค่ะ"
10039010-129 = "หวังว่าฉันจะมีส่วนช่วยในความพยายามนั้นได้บ้างนะคะ ถ้าต้องการให้ฉันช่วยอะไรก็บอกได้เลยค่ะ"
10039010-130 = "มารี...!"
10039010-131 = "คุณมารี...!"
10039010-132 = "ขอบคุณจากใจจริงเลยค่ะ ถ้าอย่างนั้นฉันจะขอรวบรัดเลยนะคะ... และนี่ก็คือ..."
10039010-137 = "นะ... นี่มัน...?"
10039010-138 = "\"แผนการไอดอล\" ที่ฉันกับหัวหน้ามิเนะคิดและเตรียมกันมาค่ะ และนี่ก็เป็นเหตุผลที่ฉัน#nขอให้มารีมาที่นี่ด้วยค่ะ"
10039010-139 = "พวกฉันจัดหมวดได้ 3 หมวด และนั่นก็คือ <ชุด> <การเต้น> และก็ <เพลง> ค่ะ"
10039010-140 = "ลำพังแค่พวกเรา 2 คนมันก็ยากที่จะสรุปรายละเอียดได้ค่ะ ฉันเลยอยากให้คุณมารีช่วยเลือกให้หน่อย#nน่ะค่ะ"
10039010-141 = "ถ้าเป็นการเลือกจากคุณมารีละก็ ฉันคิดว่าทั้งฉันและคุณซากุระโกะเองก็จะยอมรับแต่โดยดีค่ะ"
10039010-142 = "คะ!? ให้ฉัน... เลือกเหรอคะ...!? ทำไมถึงให้ฉันทำเรื่องที่สำคัญแบบนี้คะ...!?"
10039010-143 = "ก็เพราะฉันคิดว่าถ้าเป็นเรื่องเกี่ยวกับ 'ไอดอล' แล้ว มารีน่าจะรู้จักดีกว่าฉันกับหัวหน้ามิเนะแน่นอนค่ะ"
10039010-144 = "ก็มารีทั้งเก็บคูปองจากร้านค้าที่ได้รับความนิยม ทั้งยังใช้งานตู้คีออสที่ร้านอาหารฟาสต์ฟู้ดได้อย่าง#nชำนาญเลยนี่คะ"
10039010-145 = "...? ไม่สิ ถ้าเรื่องพวกนั้นฉันเองก็ทำได้นะ..."
10039010-146 = "นอกจากนี้ มารียังให้คำปรึกษาเรื่องต่างๆ กับนักเรียนคนอื่น และเข้าใจจิตใจและความชอบของ#nนักเรียนคนอื่นเป็นอย่างดีด้วยค่ะ"
10039010-147 = "อืม... ก็... ถ้าเป็นเหตุผลนั้นละก็..."
10039010-148 = "สรุปก็คือฉันเชื่อว่ามารีรู้และเข้าใจเกี่ยวกับนักเรียนวัยรุ่นและเรื่องทางโลก ซึ่งต่างจากพวกฉันที่ไม่มีความรู้ด้านนั้นเลย..."
10039010-149 = "เดี๋ยวสิคะ พูดแบบนั้นมันแปลกนะคะ!! แปลกจริงๆ เลยค่ะ!!"
10039010-150 = "ทำไมถึงเอาฉันไปเหมารวมด้วยคะ!? สิ่งที่คุณซากุระโกะพูดเป็นเรื่องของคุณซากุระโกะคนเดียวนะคะ!!"
10039010-151 = "ถึงฉันจะไม่ค่อยรู้เรื่องไอดอล แต่ก็ไม่ใช่ว่าฉันจะไม่สนใจอะไรที่สวยๆ น่ารักๆ เลยนะคะ!!"
10039010-152 = "คนที่ชื่นชอบไอดอลจะใส่คำที่เรียกว่า 'แฟนชานท์' ลงในเพลงของไอดอลไม่ใช่เหรอคะ? เห็นฉันเป็นอย่างนี้ ฉันก็พอรู้นะคะว่าการทำแบบนั้นมันแปลกน่ะ!!"
10039010-153 = "ฉันอธิบายไปแล้วไม่ใช่เหรอคะว่านั่นเป็นการใส่ความคิดสร้างสรรค์ลงไปเท่านั้นน่ะ!! ฉันรู้แล้วค่ะว่ามันเป็นการทำผิดพลาด!!"
10039010-154 = "คุณซากุระโกะเองก็ใช่ย่อยค่ะ ที่คุณไปหาเพลงไอดอลจากเพลงสรรเสริญพระเจ้า คุณไม่คิดว่ามันก็#nแปลกเหมือนกันเหรอคะ!?"
10039010-155 = "มันแปลกยังไงกันคะ!? เพลงสรรเสริญพระเจ้าเป็นเพลงที่ทุกคนชอบไม่ใช่เหรอคะ!?"
10039010-156 = "ทำไมถึงพูดคำว่า 'ทุกคน' ได้อย่างมั่นใจขนาดนั้นล่ะคะ!? ไปเอาข้อมูลมาจากไหนคะ!?"
10039010-158 = "จากวิหารค่ะ!!"
10039010-159 = "ก็ที่นั่นเป็นวิหารนะคะ!!!"
10039010-160 = "ไม่เชื่อก็ถามจากมารีสิคะ! มารี! มารีก็ชอบเพลงสรรเสริญพระเจ้าใช่มั้ยคะ!?"
10039010-161 = "อะ... เอ่อ... แน่นอนว่า... ฉันก็ชอบมากๆ... แต่ว่า..."
10039010-162 = "เห็นมั้ยคะ!!"
10039010-164 = "อยากให้ฉันมีปฏิกิริยาตอบสนองแบบไหนเหรอคะ?"
10039010-169 = "ดูเอาเถอะค่ะ คุณมารี... ตอนนี้พวกเราเป็นกันอย่างนี้ละค่ะ เพราะแบบนั้นฉันก็เลยตัดสินใจว่า พวกเราต้องการการเลือกอย่างยุติธรรมจากคุณมารีค่ะ"
10039010-170 = "ถึงคุณมารีจะอยู่ในชมรมซิสเตอร์ที่มีคุณซากุระโกะเป็นหัวหน้า แต่ฉันก็เชื่อในคุณธรรม และความยุติธรรมของคุณมารี"
10039010-171 = "หากคุณมารีบอกว่าแผนการไอดอลของคุณซากุระโกะถูกต้อง ฉันก็จะยินดีทำตามค่ะ"
10039010-176 = "อ่า..."
10039010-177 = "งะ... งั้นก็แปลว่า... เอ่อ... อืม..."
10039010-178 = "ใช่แล้วค่ะ มารี ความคิดเห็นของมารีถูกต้องกว่าพวกฉันที่อยู่ตรงนี้ค่ะ ฉันเชื่ออย่างนั้นค่ะ"
10039010-179 = "เอ่อ... อืม... คือว่า..."
10039010-181 = "เอาละ ช่วยเลือกให้หน่อยค่ะว่าพวกฉันควรมุ่งหน้าไปทิศทางไหนในอนาคตดี!!"
10039010-182 = "เอ่อ...! อืม...!!"
10039010-186 = "ขอ..."
10039010-188 = "ขอเวลาฉัน 2-3 วัน... จะได้มั้ยคะ...?"
10039010-192 = "เรื่องมันก็เป็นแบบนี้ละค่ะ ฉันก็เลย..."
10039010-193 = "[s1] \"อดทนได้ดีมากเลยนะ มารี...\"\n[s2] \"มารีเป็นคนที่มีความอดทนสุดยอดเลยนะ\""
10039010-196 = "แหะๆๆ... ไม่หรอกค่ะ ไม่ขนาดนั้นหรอกค่ะ"
10039010-197 = "สิ่งที่ท่านซากุระโกะและหัวหน้ามิเนะอยากทำ..."
10039010-198 = "สิ่งที่ทั้ง 2 คนพูดมีจุดมุ่งหมายในสิ่งที่เป็นประโยชน์จริงๆ ค่ะ"
10039010-199 = "มาคิดดูแล้ว ถึงจะความเห็นไม่ตรงกัน แต่ทั้ง 2 คนก็มีจุดประสงค์เหมือนกันค่ะ และก็คงจะมีเรื่องแบบ#nนั้นเกิดขึ้นมากมายโดยที่ฉันไม่รู้ด้วย"
10039010-200 = "สำหรับฉันแล้ว ปกติก็แค่ทำงานอย่างสบายใจ..."
10039010-201 = "ในเมื่อฉันได้มีโอกาสช่วยเหลือทั้ง 2 คนแล้ว ฉันก็หวังว่าจะช่วยคลี่คลายเรื่องนี้ได้จนพวกเขาพอใจค่ะ"
10039010-202 = "แต่พอจะทำอย่างนั้น มันก็ยิ่ง..."
10039010-203 = "ยิ่งคิดว่าถ้าฉันเลือกความคิดเห็นของคนไหน ก็เท่ากับว่าเป็นการปฏิเสธความคิดเห็นของอีกคนหนึ่ง ฉันหวังว่าจะไม่มีใครน้อยใจหรือเสียใจที่ไม่ถูกเลือกน่ะค่ะ"
10039010-207 = "[ns3] \"มารีคิดถึงขนาดนั้นเลยเหรอ...\"\n[ns4] \"มารีคิดถึงขนาดนั้นเลยสินะ...\""
10039010-210 = "คุณครู...? เมื่อกี้ว่าอะไรนะคะ..."
10039010-211 = "คะ...?"
10039010-212 = "คุณครูจะช่วยฉันเหรอคะ?"
10039010-213 = "คุณครูจะชวนฉัน... ไปหาชมรมอื่นๆ ที่เข้าร่วมอีเวนต์ เพื่อเรียนรู้ว่าพวกเธอจะทำยังไงเหรอคะ...?"
10039010-214 = "ระ... เรื่องนั้น...! ไม่ใช่อย่างนั้นนะคะ ฉันไม่ได้มาเล่าเรื่องนี้เพื่อให้คุณครูทำแบบนั้นหรอกค่ะ!!"
10039010-215 = "คุณครูก็น่าจะงานยุ่งอยู่แล้ว ฉันจะขอให้ช่วยเรื่องแบบนี้ได้ยังไงกัน...!"
10039010-216 = "คะ...?"
10039010-217 = "คุณครูไม่คิดอย่างนั้นเหรอคะ? มะ... หมายความว่ายังไง..."
10039010-218 = "[s5] \"คิดว่าครูก็มีความคิดเหมือนมารีแล้วกัน\"\n[s6] \"ครูก็อยากช่วยซากุระโกะกับมิเนะเหมือนกัน\""
10039010-221 = "คุณครู..."
10039010-225 = "ฮุฮุ..."
10039010-226 = "จริงๆ เลย... คุณครูเป็นอย่างนี้ตลอดเลยนะคะ"
10039010-227 = "สมกับที่เป็นคุณครูเลย... ฉันไม่คิดเลยค่ะว่าคุณครูจะพูดแบบนั้น..."
10039010-228 = "ถ้าคุณครูถึงกับพูดแบบนั้น ฉันก็คงไม่กล้าปฏิเสธค่ะ"
10039010-229 = "ขอบคุณนะคะคุณครู ฉันได้รับการช่วยเหลือที่ยิ่งใหญ่จากคุณครูเลยสินะคะ"
10039010-230 = "น่าจะเป็นอย่างนั้นนะคะ ฉันว่าตอนนี้ฉันควรเก็บความคิดนั้นไว้ก่อนค่ะ"
10039010-231 = "ตอนนี้ฉันต้องคิดเรื่องการช่วยท่านซากุระโกะและคุณมิเนะก่อนอย่างที่คุณครูว่าค่ะ"
10039010-232 = "ถ้างั้น... คุณครูคะ"
10039010-233 = "วันนี้เวลาก็ล่วงเลยไปมากแล้ว ฉันว่าเรากลับไปพักกันก่อน"
10039010-234 = "แล้วตั้งแต่พรุ่งนี้ไป..."
10039010-239 = "เรามา... ศึกษาเกี่ยวกับไอดอลด้วยกันนะคะ"

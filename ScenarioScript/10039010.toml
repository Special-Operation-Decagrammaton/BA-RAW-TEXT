[translation]
10039010-1 = "#title;제1화;이미지 체인지의 기회"
10039010-2 = "#stm;[0,0];smooth;150;- 48시간 전 -"
10039010-3 = "#wait;1000"
10039010-4 = "#clearST"
10039010-5 = "#wait;2200"
10039010-6 = "#wait;1500"
10039010-7 = "#na;???;……후우! 이걸로 마지막이네요!"
10039010-8 = "#st;[0,0];instant;1;"
10039010-9 = "#clearST"
10039010-10 = "3;히나타;01\n#3;a\n#wait;1500"
10039010-11 = "3;히나타;01;생각보다 훨씬 빨리 끝났어요. 힘써 주셔서 고마워요, 마리 자매님!\n#3;em;[반응]\n#3;greeting"
10039010-12 = "3;마리;01;아니에요. 저는 자잘한 정리만 도왔을 뿐, 큰 건 대부분 히나타 자매님께서 해주셨는걸요.\n#3;a"
10039010-13 = "3;마리;03;자매님이 없으셨다면 얼마나 오래 걸렸을지……. 항상 계셔서 감사하다고 생각하고 있어요.\n#3;greeting"
10039010-14 = "3;마리;01\n1;히나타;04;그, 그런……! 당치도 않아요. 저 같은 건…….\n#1;em;[땀]\n#3;m5\n#1;ar"
10039010-15 = "#st;[0,0];instant;1;"
10039010-16 = "#clearST"
10039010-17 = "3;마리;01\n1;히나타;04\n#3;h\n#1;h\n#wait;1000"
10039010-18 = "3;마리;01\n1;히나타;02\n#1;em;[반응]\n#3;h\n#1;h\n#wait;1200"
10039010-19 = "1;히나타;02;음? 어라. 어디서 연락이…….\n#1;greeting"
10039010-20 = "1;히나타;01;……제 게 아니네요?"
10039010-21 = "3;마리;04;음? 아, 죄송해요. 제 거였네요! 얼른 답변을…….\n#3;em;[땀]\n#3;m3\n#1;dl"
10039010-22 = "#st;[0,0];instant;1;"
10039010-23 = "#clearST"
10039010-24 = "3;마리;04\n#3;em;[...]\n#1;hide\n#wait;2500"
10039010-25 = "3;마리;04;……?"
10039010-26 = "3;히나타;02;……마리 자매님?\n#3;em;[?]"
10039010-27 = "3;마리;02;아, 죄송해요. 조금 의외의 연락이라……."
10039010-28 = "3;마리;04;……사쿠라코 님?"
10039010-29 = "3;히나타;02;사쿠라코 님이요? 뭔가 저희가 더 해야 할 일이 생긴 걸까요?\n#3;em;[반응]"
10039010-30 = "3;마리;04;아뇨. 그런 말씀은 아니신 것 같은데……. 음……. 모르겠네요. 이 문구만으로는……."
10039010-31 = "#all;hide"
10039010-32 = "#na;마리;……'긴급 지원 요청'. 이라고 하시는데……."
10039010-33 = "#all;hide"
10039010-34 = "#wait;1000"
10039010-35 = "#wait;2000"
10039010-36 = "#na;마리;실례합니다……."
10039010-37 = "#na;마리;사쿠라코님께서 부르셔서 왔습니다만……. 혹시 여기에……?"
10039010-38 = "#na;마리;……?"
10039010-39 = "#all;hide"
10039010-40 = "3;사쿠라코;09\n#3;a\n#3;closeup\n#wait;1500"
10039010-41 = "#all;hide"
10039010-42 = "3;미네;09\n#3;a\n#3;closeup\n#wait;1500"
10039010-43 = "#all;hide"
10039010-44 = "#wait;2500\n#bgshake"
10039010-45 = "#na;마리;……!?!?!?"
10039010-46 = "#na;마리;사, 사쿠라코 님!? 미네 님!? 이, 이게 무슨……!!"
10039010-47 = "#all;hide"
10039010-48 = "3;사쿠라코;07;……음?\n#3;a\n#3;em;[반응]"
10039010-49 = "3;사쿠라코;02;아아. 마리. 마침 잘 와줬어요. 바쁜 와중일 터인데도 응해줘서 정말 고마워요.\n#3;greeting"
10039010-50 = "3;사쿠라코;07;마리가 지금 와 주지 않았다면 이 이후로 상황이 어떻게 됐을지…….\n#3;em;[...]"
10039010-51 = "3;미네;99;아마도 심판조차 없이 결착을 내는 방향으로 흘러갔겠지요. 저도 당신도 그다지 원하는 결말은 아니었겠지만요."
10039010-52 = "3;미네;99\n5;마리;08;겨, 결착이요!? 심판!? 대, 대체 무슨 일이시기에……!!\n#3;m1\n#5;em;[?!]\n#5;shake\n#5;a"
10039010-53 = "#all;hide"
10039010-54 = "3;사쿠라코;07;……?"
10039010-55 = "3;사쿠라코;04;……예?\n#3;em;[?]"
10039010-56 = "3;사쿠라코;04;무슨 결착……? 심판이라니……? 저희 싸우는 거였나요?"
10039010-57 = "3;미네;01;……?"
10039010-58 = "3;미네;04;예? 조금 전까지 그런 흐름으로 말씀하셨던 게 아니었단 말인가요……?\n#3;em;[?]"
10039010-59 = "3;미네;04;분명 \"저희 사이의 충돌에 앞서, 마리의 참관이 우선돼야 한다\"고 말씀하시지 않았습니까?"
10039010-60 = "3;사쿠라코;07;……????"
10039010-61 = "3;사쿠라코;07;네, 뭐……. 그렇게 말하긴 했습니다만. 뭔가 이상한 말인가요? 왜 그런 결론으로……?\n#3;em;[...]"
10039010-62 = "3;사쿠라코;04;저는 그냥 마리에게 의견을 구하고자……."
10039010-63 = "#st;[0,0];instant;1;"
10039010-64 = "#clearST"
10039010-65 = "3;미네;02;……아니, 그…….\n#3;em;[땀]\n#3;stiff"
10039010-66 = "3;미네;01\n5;마리;04;저, 저기……!!\n#3;m1\n#5;al"
10039010-67 = "5;마리;08;혹시 지금 말씀하신 상황에 제가 뭔가 관계가 있는 것인가요!? 제가 무언가의 잘못을……!\n#5;stiff"
10039010-68 = "3;미네;05;……!! 아뇨. 당치도 않습니다.\n#3;em;[!]"
10039010-69 = "3;미네;02;마리 씨가 얼마나 모두에게 신뢰받고 계신지는 시스터후드가 아닌 저조차도 익히 들었으니까요.\n#3;greeting"
10039010-70 = "#all;hide"
10039010-71 = "3;사쿠라코;07;이런……. 미안해요, 마리. 두서가 없었네요. 하긴 지금 상황은 마리에게도 적잖이 당혹스럽겠지요.\n#3;em;[반응]"
10039010-72 = "3;사쿠라코;02;설명을 하자면……."
10039010-73 = "3;미네;99;……잠깐만요."
10039010-74 = "3;미네;02;음……. 여기서는 제가 설명하도록 하겠습니다.\n#3;em;[...]"
10039010-75 = "3;미네;02;의도나 탓을 하려는 것은 아니지만, 사쿠라코 님의 발언을 지켜봐 온 사람으로서 그 설명이 오히려 혼란을 가중시킬 수 있다는 생각입니다."
10039010-76 = "3;사쿠라코;07;……예?"
10039010-77 = "3;사쿠라코;07;제가요? ……제 말이?\n#3;em;[?]"
10039010-78 = "3;사쿠라코;04;……어째서……??"
10039010-79 = "3;사쿠라코;04\n5;미네;01;…….\n#3;m1\n#5;a"
10039010-80 = "5;미네;02;당장 방금 전 말씀만 봐도 그럴 위험성이 있다고 판단됩니다만.\n#5;em;[반응]"
10039010-81 = "3;사쿠라코;06;……크윽. 뭔가의 기시감이…….\n#fontsize;50"
10039010-82 = "3;사쿠라코;12;이, 일단은 알겠습니다……. 그렇게 진행하시죠…….\n#3;em;[땀]\n#3;stiff"
10039010-83 = "#all;hide"
10039010-84 = "3;마리;08;사쿠라코 님……."
10039010-85 = "3;미네;99;……그럼 마리 씨. 바쁘신 시간을 빼앗아 대단히 죄송하지만, 지금부터 저희가 처한 상황에 대해 먼저 말씀드리고자 합니다.\n#3;greeting"
10039010-86 = "#all;hide"
10039010-87 = "#na;미네;마리 씨도 아시다시피, 지금은 트리니티 [ruby=카니발]사육제[/ruby]가 한창인 기간입니다."
10039010-88 = "#na;미네;다양한 행사들이 있지만, 이번에는 특별히 <아이돌 이벤트>라는 것도 진행한다고 하더군요."
10039010-89 = "#na;미네;트리니티뿐만이 아니라, 다양한 학교에서 다양한 동아리가 참가할 수 있는 큰 이벤트."
10039010-90 = "#na;미네;동아리마다 가지고 있는 평상시의 인식이나 이미지와는 상관없이, 그저 무대를 즐기고 다른 학생들과 교감하는……."
10039010-91 = "#na;미네;……이미지 체인지의 기회."
10039010-92 = "#all;hide"
10039010-93 = "3;미네;99;……그렇습니다. 이것은 더할 나위 없는 이미지 체인지의 기회입니다.\n#3;a"
10039010-94 = "3;미네;02;즉, 지금껏 저희 구호기사단과 시스터후드가 가지고 있던, 잘못되고 어려운 이미지를 바로잡을 다시없을 기회죠."
10039010-95 = "3;미네;02\n1;마리;04;자, 잘못되고 어려운 이미지……? 저희에게 그런 이미지가 있었나요……?\n#3;m5\n#1;em;[?]\n#1;a"
10039010-96 = "#all;hide"
10039010-97 = "3;사쿠라코;07;안타깝게도 그렇답니다, 마리."
10039010-98 = "3;사쿠라코;07;마리는 모를 수도 있겠지만, 저희들은 동아리의 특성상 그런 낭설과 음모론에 휘말리기 좋거든요.\n#3;em;[한숨]"
10039010-99 = "3;사쿠라코;06;가령 저희 시스터후드가 비밀스러운 음모를 꾸미고, 학생들을 감시하며 밤중에 납치해 간다거나……."
10039010-100 = "3;미네;01;구호기사단이 구호라는 명목하에 각종 폭력을 일삼으며, 치료를 위해 먼저 파괴부터 한다는 식의 오해들입니다."
10039010-101 = "3;미네;02;다른 학생들에게 도움이 되고, 어디보다 마음 편해야 할 곳에는 좋지 않은 소문들이지요.\n#3;em;[...]"
10039010-102 = "3;마리;08;그, 그럴 수가……! 어째서 그런……!"
10039010-103 = "3;사쿠라코;07;후……. 그러게 말입니다. 어째서 그런 소문이 생기는 것인지, 참……."
10039010-104 = "3;미네;99;그래서 이것은 저희 모두의 커다란 당면 과제 중 하나입니다. 해결을 위해서라면, 어떠한 일도 마다하지 않을 생각이지요.\n#3;em;[반응]"
10039010-105 = "3;미네;05;그것이 설령……. 한 번도 해 본 적 없는, 난생처음의 도전이라도 말이죠."
10039010-106 = "3;마리;04;난생처음의……. 도전?\n#3;em;[?]"
10039010-107 = "3;사쿠라코;07;……마리."
10039010-108 = "3;사쿠라코;07;미네 단장과 저는……."
10039010-109 = "#st;[0,0];instant;1;"
10039010-110 = "#clearST"
10039010-111 = "3;사쿠라코;07\n#3;em;[...]\n#wait;2500"
10039010-112 = "3;사쿠라코;11;……아이돌이, 될 겁니다.\n#3;closeup\n#fontsize;80"
10039010-113 = "3;마리;08;……! 아이돌이요……!?\n#3;shake\n#3;em;[?!]"
10039010-114 = "3;사쿠라코;06;물론 어울리지 않는 행동이라는 건 잘 알고 있습니다. 저도 미네 단장님도, 딱히 아이돌이나 귀여운 것에는 관심이 없고……."
10039010-115 = "3;미네;01;……?\n#3;em;[?]"
10039010-116 = "3;미네;02;아뇨. 전 썩 그런 걸 싫어하지는……."
10039010-117 = "3;미네;02\n1;사쿠라코;07;저희 같은 사람들이 그런 행동을 해도, 우스꽝스러운 모습으로밖에 비치지 않을 거라는 것도 각오하고 있습니다.\n#3;m5\n#1;ar\n#1;em;[반응]"
10039010-118 = "3;미네;04;……예!? 자, 잠깐만요!!"
10039010-119 = "3;미네;04;그, 그런 거였나요!? 우스꽝스럽게 되는 거였나요!?!?\n#3;em;[?!]\n#3;shake"
10039010-120 = "1;사쿠라코;07;하지만 그럼에도, 그 우스꽝스러움이 다른 학생들로 하여금 조금이라도 저희를 편하게 생각할 수 있는 계기가 된다면."
10039010-121 = "3;미네;01;…………!!\n#3;em;[!]"
10039010-122 = "1;사쿠라코;02;그럴 수만 있다면, 저희는 기꺼이 그 우스꽝스러움을 감내하고자 합니다.\n#1;m2"
10039010-123 = "#all;hide"
10039010-124 = "3;마리;04;……사쿠라코 님……."
10039010-125 = "#st;[0,0];instant;1;"
10039010-126 = "#clearST"
10039010-127 = "3;마리;05\n#3;em;[...]\n#wait;2500"
10039010-128 = "3;마리;03;알겠습니다. 두 분께서 그렇게 말씀하시는 데에, 어떻게 제가 돕지 않을 수 있겠어요."
10039010-129 = "3;마리;01;부디 그 노력에 저도 보탤 수 있었으면 좋겠어요. 필요하신 게 있으시다면, 뭐든 말씀해 주세요.\n#3;em;[반응]\n#3;greeting"
10039010-130 = "3;사쿠라코;02;마리……!"
10039010-131 = "3;미네;03;마리 씨……!"
10039010-132 = "3;미네;02;진심으로 감사드립니다. 그렇다면 염치없지만 거두절미하고 바로……. 이것을……."
10039010-133 = "#st;[0,0];instant;1;"
10039010-134 = "#clearST"
10039010-135 = "3;미네;01\n#3;greeting\n#wait;1200"
10039010-136 = "#wait;1200"
10039010-137 = "3;마리;04;이, 이건……?\n#3;em;[?]"
10039010-138 = "3;사쿠라코;07;저와 미네 단장님이 준비한, 각자가 생각한 \"아이돌 기획서\"입니다. 마리를 이곳에 와달라 부탁한 이유기도 하지요."
10039010-139 = "3;사쿠라코;04;나름대로 <의상>, <댄스>, <곡>, 세 가지로 카테고리를 구분해서 준비해 보았습니다만…….\n#3;em;[...]"
10039010-140 = "3;미네;01;저희끼리는 좀처럼 의견이 좁혀지지 않아서요. 마리 씨가 선택해 주었으면 합니다."
10039010-141 = "3;미네;02;마리 씨의 선택이라면, 저도 사쿠라코 님도 승복할 것이라고 생각했기 때문입니다.\n#3;em;[반응]"
10039010-142 = "3;마리;08;네, 네!? 선택이요? 이걸……. 제가요!? 어째서 제가 이런 중대한 일을……!?"
10039010-143 = "3;사쿠라코;07;그야 '아이돌'에 관련된 부분은, 당연히 저나 미네 단장님보다는 마리가 더 잘 알 것이라고 생각했기 때문입니다."
10039010-144 = "3;사쿠라코;02;마리는 유행 타는 가게에서 쿠폰도 적립할 수 있고, 패스트푸드점에서 키오스크도 능숙하게 사용할 수 있으니까요."
10039010-145 = "3;사쿠라코;02\n5;미네;04;……? 아니, 그 정도는 저도…….\n#5;a\n#5;em;[땀]\n#3;m1\n#fontsize;50"

[translation]
10039010-1 = "第1話;改變形象的機會"
10039010-2 = "- 48小時前 -"
10039010-7 = "……呼！這是最後一件了！"
10039010-11 = "比想像中還快結束呢。#n謝謝你的幫忙，瑪麗同學！"
10039010-12 = "別這麼說。#n我只是幫忙整理一些小東西而已，大部分的事都是日向同學完成的。"
10039010-13 = "如果沒有日向同學在，不知道得花多少時間……真是太感謝你了。"
10039010-14 = "那，那個……！#n像我這種人……實在承擔不起。"
10039010-19 = "咦？有訊息……"
10039010-20 = "……好像不是我的？"
10039010-21 = "嗯？啊，不好意思，是我這邊……"
10039010-25 = "……？"
10039010-26 = "……瑪麗同學？"
10039010-27 = "啊，對不起。#n因為傳訊息來的人，讓我有點意外……"
10039010-28 = "……櫻子大人？"
10039010-29 = "是櫻子大人傳來的？#n有什麼事需要交給我們嗎？"
10039010-30 = "不，看起來似乎不是……但我其實也不太清楚。#n因為訊息的內容……"
10039010-32 = "就只有「請求緊急支援」這句話……"
10039010-36 = "打擾了……"
10039010-37 = "是櫻子大人請我過來的……#n請問……？"
10039010-38 = "……？"
10039010-45 = "……！？！？！？"
10039010-46 = "櫻，櫻子大人！？美禰大人！？#n這，這是怎麼回事……！！"
10039010-48 = "……嗯？"
10039010-49 = "啊啊，瑪麗。你來得正好。#n感謝你願意在百忙之中抽空過來。"
10039010-50 = "要是你沒來的話，真不知道接下來會發生什麼事……"
10039010-51 = "或許會在未經審判的情況下進行裁決吧……雖然你我都不希望看見這樣的結局。"
10039010-52 = "裁，裁決！？審判！？#n究竟發生了什麼……！！"
10039010-54 = "……？"
10039010-55 = "……嗯？"
10039010-56 = "裁決……審判……？#n我們是要打起來了嗎？"
10039010-57 = "……？"
10039010-58 = "嗯？你那番話不就是這個意思嗎……？"
10039010-59 = "櫻子同學剛才確實是說「要在場面失控之前，先聽聽瑪麗的意見」對吧？"
10039010-60 = "……？？？"
10039010-61 = "沒錯，我的確這麼說過……但這有什麼問題嗎？#n為什麼會得出這樣的結論……？"
10039010-62 = "我只是想聽聽瑪麗的意見而已……"
10039010-65 = "不，這……"
10039010-66 = "那，那個……！！"
10039010-67 = "現在的情況是我造成的嗎！？#n難道是因為我做錯了什麼……！"
10039010-68 = "……！！#n不，不是這樣的。"
10039010-69 = "瑪麗同學在大家心中的地位，即使不是修女的我也有所耳聞。"
10039010-71 = "哎呀……抱歉，瑪麗。都怪我說得太含糊了。#n現在的情況想必讓你感到很困惑吧。"
10039010-72 = "請讓我解釋一下……"
10039010-73 = "……且慢。"
10039010-74 = "我想……還是由我來解釋吧。"
10039010-75 = "雖然我沒有要責怪你的意思，不過作為一直聽著櫻子同學說話的人……#n我認為由你來解釋，可能會讓事情更加混亂。"
10039010-76 = "……嗯？"
10039010-77 = "我……我說的話？"
10039010-78 = "怎麼會呢……？"
10039010-79 = "……"
10039010-80 = "光是剛才的情況，應該就足以證明我的擔憂才對。"
10039010-81 = "唔，這股既視感是……"
10039010-82 = "我，我明白了……就這麼辦吧……"
10039010-84 = "櫻子大人……"
10039010-85 = "……那麼，瑪麗同學。#n很抱歉佔用你的時間，但請容我先說明一下我們的情況。"
10039010-87 = "如瑪麗同學所知，現在正在舉行三一狂歡節。"
10039010-88 = "除了既有的各式活動外，這次還舉辦了一個特別的「偶像活動」。"
10039010-89 = "而這將會是場不僅限於三一，就連其他學園的社團也能報名參加的大型活動。"
10039010-90 = "無論社團平時給人的印象如何，都能盡情享受舞台、與其他學生交流……"
10039010-91 = "同時也是個改變形象的契機。"
10039010-93 = "……沒錯。這是個絕佳的機會。"
10039010-94 = "換言之──這將是我們救護騎士團與修女會，糾正錯誤印象的大好時機。"
10039010-95 = "糾正錯誤印象……？#n我們有受到什麼誤會嗎……？"
10039010-97 = "雖然遺憾，不過這是事實。"
10039010-98 = "瑪麗你也許不知道，但基於我們社團的特性，很容易被捲入謠言和陰謀論之中。"
10039010-99 = "比如說修女會總是在暗地裡策畫陰謀、監視學生、在半夜綁架他們等等……"
10039010-100 = "而救護騎士團則是被誤解成「以救護之名，行暴力之實」……#n或者為了治療而先出手破壞的團體。"
10039010-101 = "明明我們應該是提供其他學生幫助與寄託的地方，卻有這樣的壞名聲在外流傳。"
10039010-102 = "怎，怎麼會……！居然有這種事……！"
10039010-103 = "唉……我也深有同感。#n究竟為什麼會出現這種謠言呢……"
10039010-104 = "綜上所述，為了解決眼下的重大難題，我們將不排斥任何可能的手段。"
10039010-105 = "即便……是從未嘗試過的挑戰也一樣。"
10039010-106 = "從未嘗試過的……挑戰？"
10039010-107 = "……瑪麗。"
10039010-108 = "我和美禰團長……"
10039010-112 = "……決定要成為偶像。"
10039010-113 = "偶像……！？"
10039010-114 = "當然，我也明白這並不適合我們。#n畢竟無論是我還是美禰團長，都對偶像或可愛的東西不怎麼感興趣……"
10039010-115 = "……？"
10039010-116 = "不，我其實……"
10039010-117 = "像我們這樣的人做起這種事將有多麼滑稽，我們也心裡有數。"
10039010-118 = "……咦！？請，請等一下！！"
10039010-119 = "原，原來是這樣嗎！？會很滑稽嗎！？"
10039010-120 = "不過即便如此，如果滑稽能讓其他學生因而產生些許好感……"
10039010-121 = "…………！！"
10039010-122 = "我們也樂意接受。"
10039010-124 = "櫻子大人……"
10039010-128 = "我明白了。#n既然兩位都這麼說了，我怎麼能袖手旁觀呢。"
10039010-129 = "我也希望能為兩位的努力貢獻一己之力。#n如果有任何需要，還請儘管跟我說。"
10039010-130 = "瑪麗……！"
10039010-131 = "瑪麗同學……！"
10039010-132 = "真是感激不盡。#n那麼就容我直接切入正題……請先收下這些……"
10039010-137 = "這，這是……？"
10039010-138 = "是我和美禰團長各自準備的「偶像企劃書」……同時也是請你過來的原因。"
10039010-139 = "我們從「服裝」、「舞蹈」、「歌曲」三個面相進行了準備……"
10039010-140 = "然而卻始終無法達成共識……因此希望瑪麗同學能幫我們選擇。"
10039010-141 = "如果是瑪麗同學的選擇，我和櫻子同學也都能夠接受吧。"
10039010-142 = "咦，咦咦！？由，由我來選嗎……！？#n這麼重要的決定，為何要由我來……！？"
10039010-143 = "因為在「偶像」這方面，瑪麗肯定比我和美禰團長更加了解才對。"
10039010-144 = "畢竟瑪麗不只會累積時髦店鋪的點數，也能熟練地使用速食店的自助點餐機。"
10039010-145 = "不是，這種程度的話我也……"
10039010-146 = "而且還時常向其他學生提供諮詢，對外校學生的心思和喜好也很了解。"
10039010-147 = "唔嗯……這種理由的話倒還……"
10039010-148 = "總之，我們認為你比我們更了解年輕學生與世俗的事物……"
10039010-149 = "先等一下，這果然還是有點奇怪！！非常奇怪！！"
10039010-150 = "為什麼要擅自把我也算進去！？#n剛才說的那些完全是櫻子同學個人的想法吧！！"
10039010-151 = "雖然我確實不太了解偶像，但我對可愛和漂亮的東西也不是完全沒興趣好嗎！！！"
10039010-152 = "有興趣的人會在偶像歌曲裡加入「騎士團誓言」嗎！？#n即使是我也知道這很奇怪！！"
10039010-153 = "我不是已經跟你解釋過，那只是為了增加原創性的小失誤而已嗎！！"
10039010-154 = "櫻子同學從聖歌裡找偶像歌曲的行為才奇怪吧！？"
10039010-155 = "到底哪裡奇怪了！？大家明明都喜歡聖歌啊！？"
10039010-156 = "理直氣壯地說出「大家」都喜歡的依據何在！？#n那種事是在哪裡確認的！？"
10039010-158 = "在教堂裡！！"
10039010-159 = "在教堂裡問喜不喜歡聖歌！！！"
10039010-160 = "那不然問問瑪麗吧！#n瑪麗！你也喜歡聖歌吧！？"
10039010-161 = "那個，我，我當然很喜歡……"
10039010-162 = "看吧！！"
10039010-164 = "難不成你期望聽見其他答案嗎？"
10039010-169 = "……情況正如你所見，瑪麗同學。#n因此我們才認為，需要由瑪麗同學做出公正的選擇。"
10039010-170 = "雖然你是櫻子同學麾下的修女，但我也非常信任你的品德與公正。"
10039010-171 = "即便瑪麗同學選擇了櫻子同學的偶像企劃書，我也不會有任何異議。"
10039010-176 = "這……"
10039010-177 = "那，那個……唔嗯……"
10039010-178 = "沒錯，瑪麗。#n我相信你對這方面的事，肯定比我們更加了解。"
10039010-179 = "唔嗯……這……"
10039010-181 = "來，做出選擇吧！#n我們接下來的方向，就掌握在瑪麗的手中！！"
10039010-182 = "那個……！唔嗯……！！"
10039010-186 = "能……"
10039010-188 = "能不能……給我幾天的時間考慮……？"
10039010-192 = "……以上就是事情的經過。"
10039010-193 = "[s1]「……真佩服你能忍住啊，瑪麗。」\n[s2]「不禁讓人佩服瑪麗的耐性。」"
10039010-196 = "啊哈哈……您過獎了。#n我不會因為這種事而生氣的。"
10039010-197 = "況且櫻子大人和美禰團長想做的事……"
10039010-198 = "以及他們所說的那些話，真的充滿了想要幫助他人的意圖。"
10039010-199 = "仔細想想，他們兩位或許一直都是如此吧。#n類似的事情，其實總是在我不知道的地方不斷上演。"
10039010-200 = "而我卻只需要顧好自己份內的事情……"
10039010-201 = "所以這次有幸能幫助他們，我希望能讓事情順利落幕。"
10039010-202 = "……但也正因如此。"
10039010-203 = "我更希望不要因為選擇或否定了某一方，而讓另一方感到傷心或難過。"
10039010-207 = "[ns3]「瑪麗……」\n[ns4]「原來你想得這麼……」"
10039010-210 = "老師……？#n您剛才說……"
10039010-211 = "……嗯？"
10039010-212 = "要幫我……是嗎？"
10039010-213 = "要跟我一起去……看看其他參加的社團是怎麼做的……？"
10039010-214 = "那，那個……！#n我，我沒有這個意思！！"
10039010-215 = "老師本來就很繁忙了，我怎麼能再增加您的負擔……！"
10039010-216 = "……嗯？"
10039010-217 = "沒必要那麼想是嗎？#n怎，怎麼說呢……"
10039010-218 = "[s5]「你就當作我跟瑪麗有相同的心情吧。」\n[s6]「我也想幫助櫻子和美禰。」"
10039010-221 = "老師……"
10039010-225 = "……呵呵。"
10039010-226 = "……真是拿老師沒辦法呢。"
10039010-227 = "雖然這也很像老師的作風……"
10039010-228 = "既然您都這麼說了，我也不好意思婉拒您的好意。"
10039010-229 = "謝謝您，老師。#n包含剛才的部分在內，又再次得到了您的幫助。"
10039010-230 = "確實就像您說的一樣，或許現在應該先別考慮太多……"
10039010-231 = "只需要專注於幫助櫻子大人和美禰團長就行了。"
10039010-232 = "那麼……老師。"
10039010-233 = "現在時間也不早了，還請您好好休息……"
10039010-234 = "從明天起……"
10039010-239 = "……再麻煩您跟我一起進行偶像研究囉。"

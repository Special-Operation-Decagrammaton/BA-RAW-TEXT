[translation]
10039010-1 = "Episode 1;Chance for an Image Change"
10039010-2 = "- 48 hours ago -"
10039010-7 = "...Phew! That's the last one!"
10039010-11 = "That went way quicker than I thought it would. Thanks for all the hard work, Sister Mari!"
10039010-12 = "It was nothing. I only helped tidy up the small stuff. You handled all the heavy lifting."
10039010-13 = "It went so fast because of you. I'm the one who ought to be grateful."
10039010-14 = "N-No... Not at all. I'm just..."
10039010-19 = "Hmm? A message...?"
10039010-20 = "...Oh, it's not for me."
10039010-21 = "Oh? Y-Yes, that's for me. I'd better answer..."
10039010-25 = "......?"
10039010-26 = "...Sister Mari?"
10039010-27 = "Oh, sorry. I just wasn't expecting that message..."
10039010-28 = "Sakurako..."
10039010-29 = "Sakurako? Does she need something else?"
10039010-30 = "No, I don't think that's what she's saying. Hmm, it's hard to tell from the text..."
10039010-32 = "She says \"Emergency Support Request,\" but that could mean anything..."
10039010-36 = "Excuse me..."
10039010-37 = "Sakurako called me over. Is she here...?"
10039010-38 = "......?"
10039010-45 = "*gasp*"
10039010-46 = "S-Sakurako?! Mine?! What's going on...?!"
10039010-48 = "...Hmm?"
10039010-49 = "Ahh, Mari, perfect timing. You're busy, I know, so thank you for taking the time."
10039010-50 = "If you weren't here, this wouldn't end well."
10039010-51 = "We'd have to \"settle\" without even a proper judgment, to no proper resolution."
10039010-52 = "\"Settle\"? \"Judgment\"? Wh-What's this all about...?!"
10039010-54 = "......?"
10039010-55 = "...Hm?"
10039010-56 = "\"Judgment\"? Is there some kind of fight between us that I wasn't aware of?"
10039010-57 = "......?"
10039010-58 = "Is that not what you implied just now?"
10039010-59 = "Did you not say, \"Mari's verdict should settle the conflict between us\"?"
10039010-60 = "...?"
10039010-61 = "I didn't mean to imply a fight at all. Did it truly come across that way?"
10039010-62 = "Well, I only wanted her opinion."
10039010-65 = "Ah. Well, then..."
10039010-66 = "W-Wait..."
10039010-67 = "You two are arguing about me? Did I do something wrong...?!"
10039010-68 = "Oh no, not at all."
10039010-69 = "We were simply discussing how much trust your fellow Sisters place in you."
10039010-71 = "Yes, please forgive the...vagaries of our conversation, Sister Mari. It must be terribly confusing."
10039010-72 = "Allow me to explain..."
10039010-73 = "No, wait."
10039010-74 = "Allow me."
10039010-75 = "Not to inflame the misunderstanding, but as someone who's long observed you, I fear your explanation may only further confound her."
10039010-76 = "...Hm?"
10039010-77 = "\"Further confound her\"?"
10039010-78 = "What makes you say that?"
10039010-79 = "..."
10039010-80 = "I believe our conversation thus far is evidence enough."
10039010-81 = "...Ugh. Such a sense of déjà vu..."
10039010-82 = "Very well. We'll proceed as you suggest, then. For now."
10039010-84 = "As you say, Sakurako..."
10039010-85 = "Right, then. Mari, I apologize for intruding on your busy schedule, but allow me to illustrate our situation."
10039010-87 = "As you know, the Trinity Carnival is upon us."
10039010-88 = "There are many events, as always, but your Sister and I are concerned with the so-called \"Pop Idol Event.\""
10039010-89 = "It's open to clubs from many schools, beyond Trinity."
10039010-90 = "Some of those carry certain...images, reputations with other students. But the stage of this event offers a unique opportunity:"
10039010-91 = "A chance to change that image."
10039010-93 = "To remake the world's perception of us."
10039010-94 = "In other words, both the Remedial Knights and the Sisterhood have this once-in-a-lifetime chance to cast aside the public's misconceptions of who we are."
10039010-95 = "M-Misconceptions? Do other students not like us?"
10039010-97 = "Unfortunately, Mari...well, they're often wrong about us."
10039010-98 = "You may not know, but the very nature of our clubs is fertile ground for rumors and conspiracy theories."
10039010-99 = "Some even say we Sisters spy on others, or kidnap them in the night."
10039010-100 = "Or that we knights cause disasters and stage rescues, all as an excuse to do violence."
10039010-101 = "Such vile talk. We have never stood for anything but aid and comfort."
10039010-102 = "But how could anyone say that?!"
10039010-103 = "An excellent question. One does have to wonder where the rumors came from."
10039010-104 = "Regardless, they've become a problem for all of us, one we're quite determined to solve."
10039010-105 = "Even if it involves...rushing headlong into unknown territory."
10039010-106 = "\"Unknown territory\"?"
10039010-107 = "Mari..."
10039010-108 = "Captain Mine and I..."
10039010-112 = "...intend to become pop idols."
10039010-113 = "*gasp* Pop idols?!"
10039010-114 = "Of course, neither of us are particularly well suited for it. All the pink hearts, doe eyes, and peppy music. It's...not where our interests lie."
10039010-115 = "Well..."
10039010-116 = "Speaking for myself, I don't HATE those things, as such."
10039010-117 = "...And this may end in failure, in ridiculous humiliation. We are prepared to face that risk."
10039010-118 = "H-Hold on a moment!"
10039010-119 = "\"Ridiculous humiliation\"?! Just how likely is that?"
10039010-120 = "Who can say? But if such absurdity can help break down the walls between ourselves and the other students..."
10039010-121 = "Uh..."
10039010-122 = "...then with open arms and open hearts, we shall endure."
10039010-124 = "Oh, Sakurako..."
10039010-128 = "I understand. If it's what you both want, then how could I not help?"
10039010-129 = "Whatever I can do to lend a hand, just say the word."
10039010-130 = "Mari..."
10039010-131 = "...Mari..."
10039010-132 = "Right, without further ado...allow me to present..."
10039010-137 = "Wh-What am I looking at?"
10039010-138 = "Captain Mine and I each prepared our own proposals for the project. That's why we asked you to come."
10039010-139 = "We've broken it all down into three categories: \"Costumes,\" \"Dance,\" and \"Song\"..."
10039010-140 = "...And that's as far as we've gotten. We each have our own ideas, and we were hoping you could help us choose between them."
10039010-141 = "Both Sakurako and I are fully prepared to accept your choice, whatever it might be."
10039010-142 = "W-Wait, you want ME to make a choice that big for both of you?"
10039010-143 = "You know far more about pop idol style and culture than either of us."
10039010-144 = "I've seen the way you use your worldly skills to earn store discounts, or operate a fast food kiosk."
10039010-145 = "Hmm? I can...do those things too..."
10039010-146 = "More than that, I know that you're a fine counselor to other students, and that you respect their preferences and their feelings..."
10039010-147 = "Well, that sounds reasonable..."
10039010-148 = "...which in turn, gives you insight into their tastes and culture, an insight we both sorely lack."
10039010-149 = "Whoa now, hold on! That's not true, not at all!"
10039010-150 = "What is this \"we\"? Everything you said just now applies to you alone!"
10039010-151 = "I may not be a scholar of pop culture, but I have an affinity for \"pink hearts and peppy music,\" as you call it!"
10039010-152 = "You wrote an idol song with the words, \"My blade defends us both, I swear this sacred oath.\" Even I know that's bizarre!"
10039010-153 = "As I explained, I simply wanted to add a bit of flavor. I acknowledged the mistake."
10039010-154 = "At least MY lyrics didn't come from a hymn book."
10039010-155 = "They were INSPIRED by the hymn book, and what's wrong with that? Everyone likes hymns!"
10039010-156 = "\"Everyone\"? Who told you that?"
10039010-158 = "I saw it in the rapturous eyes of our cathedral choir!"
10039010-159 = "That's BECAUSE it's a cathedral choir!"
10039010-160 = "Ask Mari! Mari, you like hymns, do you not?"
10039010-161 = "Well, of course I do, but..."
10039010-162 = "You see?!"
10039010-164 = "...What do you expect me to say to that?"
10039010-169 = "...Mari, you see our dilemma. We have both agreed to trust to your good judgment."
10039010-170 = "I may not be your fellow Sister, nor your leader, but I have faith in your virtue and your sense of fairness."
10039010-171 = "Should you say that Sister Sakurako's path is the best one, then I shall follow it."
10039010-176 = "Um..."
10039010-177 = "S-So, the thing is, um..."
10039010-178 = "Captain Mine speaks the truth. In this matter, your word shall be our law."
10039010-179 = "Well... Um... Uh..."
10039010-181 = "Choose, we beseech you! Two paths lie before us, and only you can set us upon the right one."
10039010-182 = "Well...! Um...!!"
10039010-186 = "...Could..."
10039010-188 = "Could...you give me a few days...?"
10039010-192 = "...And that's pretty much how I got here. So..."
10039010-193 = "[s1] \"...You've handled it well, Mari.\"\n[s2] \"I'm impressed with your grace.\""
10039010-196 = "Ahaha... Well, people do say I'm quite gracious."
10039010-197 = "I respect what they're both trying to do."
10039010-198 = "And they're doing it for good reasons."
10039010-199 = "Those rumors they talked about must really be weighing them down."
10039010-200 = "I had no idea. I just did my work and didn't worry what anybody thought."
10039010-201 = "Now I have this chance to help them both out, and I don't know how to make them both happy."
10039010-202 = "I just..."
10039010-203 = "I really hope I don't hurt either of their feelings."
10039010-207 = "[ns3] \"Mari...\"\n[ns4] \"You're being so thoughtful about all of this.\""
10039010-210 = "Hm? What'd you say, Sensei?"
10039010-211 = "...Really?"
10039010-212 = "You want to help? Help me?"
10039010-213 = "You want to come along while I see what I can learn from the other clubs?"
10039010-214 = "N-No, that's not something I wanted to ask for!"
10039010-215 = "You already have a ton of work. I couldn't ask you to go that far out of your way."
10039010-216 = "...Really?"
10039010-217 = "I don't have to think of it that way? What do you mean by that...?"
10039010-218 = "[s5] \"I mean we're on the same page.\"\n[s6] \"I want to help Sakurako and Mine too.\""
10039010-221 = "Aw, Sensei..."
10039010-225 = "Heehee..."
10039010-226 = "You... You really are something, you know that?"
10039010-227 = "I guess it makes sense that you'd say that. I just didn't think you would..."
10039010-228 = "Well, if you're offering, it'd be rude of me to turn you down."
10039010-229 = "Thanks, Sensei. I'm glad to have your help again."
10039010-230 = "...Though I ought to remember, this isn't about me."
10039010-231 = "I should focus on helping Sakurako and Mine."
10039010-232 = "So... Sensei."
10039010-233 = "Let's adjourn for now, since it's getting late."
10039010-234 = "And then, tomorrow morning..."
10039010-239 = "...we will \"hit the streets\" and learn all there is to know about pop idol stardom!"

[translation]
1012606-1 = "That's...Not Me."
1012606-4 = "I headed out from the office on business."
1012606-5 = "Meow. Meooow."
1012606-6 = "Caw. Cacaw."
1012606-7 = "[ns] \"...Black cats and crows?\""
1012606-13 = "[ns] \"...?!\""
1012606-14 = "E...heehee..."
1012606-15 = "[ns1] \"(...Something feels more ominous than usual.)\"\n[ns2] \"(Like she asked, just ignore it for now...)\""
1012606-21 = "Meow! Meooow!"
1012606-25 = "..."
1012606-26 = "[ns] \"What...?!\""
1012606-30 = "Caw! Cacaaaw!"
1012606-33 = "..."
1012606-34 = "[ns] \"H-Here too?!\""
1012606-38 = "..."
1012606-39 = "[ns] \"WHAT is going on here?!\""
1012606-41 = "No matter where I went, I saw Kanoe."
1012606-45 = "I tried to stay focused on my work tasks, taking care of them one by one as planned."
1012606-60 = "But I kept on seeing her everywhere..."
1012606-63 = "[ns] \"*pant* *pant*\""
1012606-64 = "Ah, you're here. They told us you had a business appointment."
1012606-65 = "But you're...rather early, aren't you?"
1012606-66 = "[s] \"Th-The thing is...\""
1012606-68 = "I explain how Kanoe was constantly chasing me around."
1012606-70 = "Kanoe? Itagaki Kanoe, the walking broomstick?"
1012606-71 = "[s] \"'Walking broomstick'? What do you mean?\""
1012606-72 = "She always has black cats and crows following her around."
1012606-73 = "She SAYS she doesn't know why, but I don't buy that."
1012606-74 = "...Plus they pretty much do her bidding."
1012606-75 = "She's cold as ice, and just as pale..."
1012606-76 = "...and she's so good at voices, people say NO ONE has ever heard her real voice."
1012606-78 = "...She'd tricked me with that a few times already, so I couldn't argue there."
1012606-80 = "She might even be...a ghost."
1012606-81 = "She could be spying on us right now, laughing at us!"
1012606-82 = "[ns] \"...!\""
1012606-89 = "I flinched and looked around, but I couldn't see her anywhere."
1012606-90 = "...All that said, she's not the only weirdo in this academy."
1012606-91 = "Maybe she's just pranking everybody, so I guess we shouldn't take it too seriously."
1012606-92 = "Might as well just go with it."
1012606-93 = "[s] \"R-Right? Haha...\""
1012606-95 = "I quickly finished my work and returned to the office."
1012606-96 = "Then, the next day..."
1012606-99 = "Kanoe's calling."
1012606-100 = "She said she'd call me once it was safe."
1012606-105 = "Sensei... Was everything okay yesterday...?"
1012606-106 = "It's okay now at least, right? Everything's normal?"
1012606-107 = "[s3] \"What exactly happened?\"\n[s4] \"I saw you everywhere...\""
1012606-110 = "Right, first off, I apologize."
1012606-111 = "I made a mistake."
1012606-112 = "I thought the ritual was perfect. It was not."
1012606-113 = "[s] \"R-Ritual? What kind of ritual...?\""
1012606-114 = "The evil-spirit-summoning kind."
1012606-115 = "I accidentally summoned far too many, and they mocked me by taking on my form."
1012606-116 = "They even mimicked my personality. That must be the reason they were all after you."
1012606-117 = "[s] \"You're telling me all the Kanoes I saw yesterday were...?\""
1012606-118 = "Yes. They were all evil spirits."
1012606-119 = "Don't worry. I've banished them all."
1012606-120 = "[s5] \"Actual evil spirits.\"\n[s6] \"So all the times I saw you, they weren't you.\""
1012606-123 = "Correct. And they chose the worst time to haunt you, you being so busy. Too busy for anyone to see you, except from afar..."
1012606-124 = "...even if they had a hard-earned outing pass that day..."
1012606-125 = "[s] \"So it WAS you!\""
1012606-126 = "You've heard my explanation. Believe what you will."
1012606-127 = "Eheehee..."
1012606-132 = "I'm not quite a hundred percent sure who I saw that day..."
1012606-133 = "...and I never did find out."
1012606-134 = "Heehee..."
1012606-135 = "Eheeheehee...!"

[translation]
1012606-1 = "นั่น... ไม่ใช่ฉันนะ"
1012606-4 = "(คุณครูออกมาติดต่องานที่นอกสำนักงาน)"
1012606-5 = "เหมียว~ เหมียวววว~"
1012606-6 = "ก๊าาา~ ก๊าาาา~"
1012606-7 = "[ns] \"แมวดำกับอีกา...?\""
1012606-13 = "[ns] \"...?!\""
1012606-14 = "อิ... ฮิฮิ..."
1012606-15 = "[ns1] (รับรู้ได้ถึงออร่าที่มืดมนกว่าปกติ...)\n[ns2] (ไม่สนใจตามที่คาโนเอะบอกแล้วกัน...!)"
1012606-21 = "แง๊ววว~! แง๊ววววว~!"
1012606-25 = "......"
1012606-26 = "[ns] \"อะไรน่ะ...?!\""
1012606-30 = "ก๊าาา~! ก๊าาาา~!"
1012606-33 = "......"
1012606-34 = "[ns] \"ทะ... ที่นี่ก็ด้วย?!\""
1012606-38 = "......"
1012606-39 = "[ns] \"นี่มันอะไรกันเนี่ย?!\""
1012606-41 = "(ไม่ว่าคุณครูจะไปที่ไหนก็จะเห็นคาโนเอะที่นั่น...)"
1012606-45 = "(คุณครูพยายามมีสมาธิจดจ่ออยู่กับการจัดการงานตามกำหนดการ)"
1012606-60 = "(แต่ไม่ว่าจะไปที่ไหนก็เจอคาโนเอะตามไปทุกที่...)"
1012606-63 = "[ns] \"แฮ่ก... แฮ่ก... แฮ่ก...!\""
1012606-64 = "อ๊ะ มาแล้วสินะคะ ฉันได้รับแจ้งว่าคุณครูจะเดินทางมาติดต่อธุระ"
1012606-65 = "แต่ว่า... มาเร็วกว่ากำหนดเยอะเลยนะคะ? ค่อยๆ มาก็ได้แท้ๆ"
1012606-66 = "[s] \"ระ... เรื่องนั้นน่ะ...\""
1012606-68 = "(เล่าเรื่องที่ถูกคาโนเอะไล่ตามให้ฟัง)"
1012606-70 = "คาโนเอะ? อิตากาคิ คาโนเอะผู้ลึกลับคนนั้นน่ะเหรอ?"
1012606-71 = "[s] \"ที่บอกว่าลึกลับน่ะหมายความว่ายังไงเหรอ...?\""
1012606-72 = "คือว่าเด็กคนนั้นมักจะมีแมวกับอีกาตามไปด้วยทุกที่เลยนี่คะ"
1012606-73 = "ถึงเจ้าตัวก็ปฏิเสธว่าไม่รู้เรื่องแมวกับอีกาแต่มันจะเป็นไปได้ยังไงล่ะคะ"
1012606-74 = "(...เด็กพวกนี้ยังเชื่อที่คาโนเอะพูดด้วย)"
1012606-75 = "ทั้งเป็นคนที่มือเย็นเฉียบแล้วผิวก็ขาวซีด..."
1012606-76 = "แถมมีข่าวลือว่าเธอทำเสียงได้หลากหลายรูปแบบจนไม่รู้ว่าเสียงไหนคือเสียงที่แท้จริงเลยค่ะ"
1012606-78 = "(...คุณครูเคยโดนคาโนเอะใช้เสียงหลอกมาแล้วเลยปฏิเสธไม่ได้)"
1012606-80 = "บางทีเด็กคนนั้น... อาจเป็นวิญญาณก็ได้นะคะ"
1012606-81 = "แม้แต่ตอนนี้อาจจะหัวเราะ ฮิฮิ แล้วแอบดูเราอยู่ก็ได้...!"
1012606-82 = "[ns] \"......!\""
1012606-89 = "(คุณครูมองไปรอบๆ ด้วยความตกใจ แต่ก็ไม่เห็นคาโนเอะอยู่แถวนั้น)"
1012606-90 = "ทุกคนพูดกันแบบนั้นน่ะค่ะ... สถาบันของเรามีคนประหลาดอยู่เยอะเลยค่ะ "
1012606-91 = "ไม่ต้องห่วงหรอกค่ะ มันอาจจะเป็นแค่เรื่องล้อเล่นก็ได้"
1012606-92 = "พวกเราก็คิดแบบนั้นค่ะ"
1012606-93 = "[s] \"กะ... ก็คงงั้นเนอะ? ฮะฮ่า...\""
1012606-95 = "(คุณครูรีบจัดการธุระโดยเร็วและกลับมาที่สำนักงาน)"
1012606-96 = "(ในวันต่อมา...)"
1012606-99 = "(คาโนเอะโทรมาหาคุณครู)"
1012606-100 = "(คุณครูนึกได้ว่าคาโนเอะบอกว่าจะโทรมาหาหลังสถานการณ์ปลอดภัยแล้ว)"
1012606-105 = "ครู... เมื่อวานไม่มีอะไรเกิดขึ้นใช่มั้ย...?"
1012606-106 = "ตอนนี้ไม่เป็นไรแล้ว ทำตัวตามปกติก็ได้..."
1012606-107 = "[s3] \"เมื่อวานมันเกิดอะไรขึ้นกันแน่น่ะ?\"\n[s4] \"ครูเจอคาโนเอะทุกที่เลย...\""
1012606-110 = "ฉันคงต้องขอโทษก่อน..."
1012606-111 = "ขอโทษนะ ฉันผิดเอง"
1012606-112 = "ฉันคิดว่ามันเป็นพิธีกรรมที่สมบูรณ์แบบแล้วแต่มันล้มเหลวน่ะ..."
1012606-113 = "[s] \"พะ... พิธีกรรม? พิธีกรรมอะไร...?\""
1012606-114 = "พิธีกรรมเรียกวิญญาณร้าย"
1012606-115 = "แต่ปรากฏว่าผลข้างเคียงของพิธีกรรมล้มเหลวคือมีวิญญาณที่คล้ายกับตัวฉันปรากฏขึ้น"
1012606-116 = "บุคลิกก็เหมือนกัน... น่าจะเป็นสิ่งที่ครูเจอนั่นละ"
1012606-117 = "[s] \"งั้นคาโนเอะคนเมื่อวานที่ครูเจอ...?\""
1012606-118 = "ใช่ เป็นวิญญาณร้ายทั้งหมดเลย"
1012606-119 = "ไม่ต้องห่วงนะ ตอนนี้ฉันส่งมันกลับไปในที่ของมันแล้วละ..."
1012606-120 = "[s5] \"วิญญาณร้ายจริงๆ เหรอ?\"\n[s6] \"ไม่ใช่ตัวคาโนเอะเองแน่นะ...?\""
1012606-123 = "อื้อ ฉันจะทำแบบนั้นไปทำไม ไม่ได้อยากมองครูที่งานยุ่งจากที่ไกลๆ สักหน่อย"
1012606-124 = "ไม่ได้กังวลเลยว่าจะใช้ใบผ่านทางเข้าออกที่ได้มาอย่างยากลำบากแบบไหนดี..."
1012606-125 = "[s] \"สรุปว่าเป็นเธอนี่นา!\""
1012606-126 = "จะคิดยังไงก็ตามใจ ฉันพูดชัดเจนแล้วนะว่ามันเป็นผลข้างเคียงจากพิธีกรรม"
1012606-127 = "อิฮิฮิ..."
1012606-132 = "(คาโนเอะคนเมื่อวานที่เห็นคืออะไรกันแน่...)"
1012606-133 = "(สุดท้ายแล้วก็ไม่ได้รู้ความจริงเรื่องที่เกิดขึ้นในวันนั้น...)"
1012606-134 = "ฮิฮิ..."
1012606-135 = "อิฮิฮิฮิ...!"

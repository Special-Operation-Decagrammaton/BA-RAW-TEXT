[translation]
1012606-1 = "那……並不是我"
1012606-4 = "（先離開辦公室，開始今天的工作）"
1012606-5 = "喵嗚～喵嗚嗚～"
1012606-6 = "嘎啊～嘎嘎嘎～"
1012606-7 = "[ns]「……黑貓和烏鴉？」"
1012606-13 = "[ns]「……！？」"
1012606-14 = "咿……嘻嘻……"
1012606-15 = "[ns1]（……氣息感覺比平常更陰暗了）\n[ns2]（先照鹿江說的假裝沒看見吧……！）"
1012606-21 = "喵嗚～！喵嗚嗚～！"
1012606-25 = "……"
1012606-26 = "[ns]「什麼……！？」"
1012606-30 = "嘎啊～！嘎嘎嘎～！"
1012606-33 = "……"
1012606-34 = "[ns]「這，這裡也有！？」"
1012606-38 = "……"
1012606-39 = "[ns]「到底怎麼回事！？」"
1012606-41 = "（……無論去哪裡都能看到鹿江）"
1012606-45 = "（雖然依舊按照計劃一一完成了工作）"
1012606-60 = "（但果然無論去哪裡都能看到鹿江……）"
1012606-63 = "[ns]「哈啊，哈啊……」"
1012606-64 = "啊，歡迎。我有聽說老師今天要來辦公。"
1012606-65 = "不過……老師來得比預定時間還早呢？#n其實慢慢來也沒關係的。"
1012606-66 = "[s]「這，這是因為……」"
1012606-68 = "（說明了一路上似乎都被鹿江追著的事）"
1012606-70 = "鹿江？那個存在本身就是神秘學的鹿江？"
1012606-71 = "[s]「存在本身就是神秘學是什麼意思……？」"
1012606-72 = "那孩子身邊，總是有黑貓和烏鴉跟著對吧？"
1012606-73 = "雖然他說自己完全不認識那些動物，但這種事真的有可能嗎？"
1012606-74 = "（……而且好像還聽得懂鹿江的話）"
1012606-75 = "不只手很冰，皮膚又很白……"
1012606-76 = "還能發出各種聲音，甚至有傳聞說「根本不知道哪個才是真正的聲音」哦。"
1012606-78 = "（……回想起多次被鹿江的惡作劇耍得團團轉的經驗，因此實在無法否認）"
1012606-80 = "搞不好他……其實是幽靈也說不定。"
1012606-81 = "現在也可能偷偷帶著笑容看著我們……！"
1012606-82 = "[ns]「……！」"
1012606-89 = "（猛然環顧四周，卻沒看到鹿江的身影）"
1012606-90 = "……但說是這麼說，我們學院的怪人實在太多了。"
1012606-91 = "這可能只是單純的惡作劇而已，請老師別太在意。"
1012606-92 = "我們也已經習以為常了。"
1012606-93 = "[s]「說，說的也是？哈哈……」"
1012606-95 = "（趕緊完成工作後，回到了辦公室）"
1012606-96 = "（接著到了隔天……）"
1012606-99 = "（是鹿江打來的電話）"
1012606-100 = "（記得他說過「安全之後會聯絡」……）"
1012606-105 = "老師……昨天沒事吧……？"
1012606-106 = "現在已經不用擔心，可以像平常一樣了……"
1012606-107 = "[s3]「那到底是怎麼回事？」\n[s4]「無論我去哪裡都會看到鹿江……」"
1012606-110 = "先讓我道個歉……"
1012606-111 = "抱歉，是我失誤了。"
1012606-112 = "儀式本來應該要很完美才對，沒想到卻失敗了……"
1012606-113 = "[s]「儀，儀式？什麼儀式……？」"
1012606-114 = "是召喚惡靈的儀式。"
1012606-115 = "結果因為失敗的副作用，出現了一個跟我長得一模一樣的傢伙。"
1012606-116 = "由於性格也完全相同……所以馬上就去找老師了。"
1012606-117 = "[s]「所以昨天我看到的鹿江全都是……？」"
1012606-118 = "沒錯，全都是惡靈。"
1012606-119 = "不過別擔心。我已經想辦法把它送回原來的地方了……"
1012606-120 = "[s5]「真的都是惡靈？」\n[s6]「不是鹿江本人……？」"
1012606-123 = "嗯……絕對不是因為想遠遠看老師一眼……"
1012606-124 = "也不是因為拿到外出許可後，煩惱該怎麼有意義地利用……"
1012606-125 = "[s]「結果還是本人吧！」"
1012606-126 = "你要怎麼解釋都可以。#n反正我已經說過是儀式的副作用了。"
1012606-127 = "咿嘻嘻……"
1012606-132 = "（……昨天看到的鹿江究竟是什麼）"
1012606-133 = "（那天的真相，直到最後也依舊成謎……）"
1012606-134 = "咿嘻……"
1012606-135 = "咿嘻嘻嘻……！"

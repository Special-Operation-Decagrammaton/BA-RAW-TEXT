1004302-229 = "[s15] \"เป็นเรื่องที่คนสนิทกันทำในฤดูร้อนนะ อยู่ทำงานด้วยกันทั้งคืน\"\n[s16] \"พอดีงานมันเยอะน่ะ เลยคิดว่ามาช่วยกันทำได้มั้ย...\""

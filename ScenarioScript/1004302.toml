1004302-131 = "ระหว่างทางมาที่นี่ ฉันเจอร้านดีๆ มาด้วยค่ะ"
1004302-132 = "[s] \"เอ๋? เจอร้านบิงซูชื่อดังเหรอ?\""
1004302-133 = "ฮุฮุ เปล่าค่ะ ระหว่างทางที่มา ฉันบังเอิญเจอว่ามีอีเวนต์แบบนี้อยู่ด้วยค่ะ"
1004302-137 = "(สิ่งที่วาคาโมะยื่นให้ดูในโทรศัพท์พร้อมกับรอยยิ้มหวานๆ ก็คือข้อมูลเกี่ยวกับงานอีเวนต์ที่จัดอยู่ใกล้ๆ)"
1004302-138 = "(สิ่งที่เขียนไว้คือ...)"
1004302-139 = "[s] \"<นิทรรศการประติมากรรมน้ำแข็งเรดวินเทอร์รับฤดูร้อน>...?\""
1004302-140 = "ใช่แล้วค่ะ ฉันได้ยินว่าพวกเขากำลังจัดแสดงงานประติมากรรมน้ำแข็งพิเศษต่างๆ ที่ขนส่งมาจาก#nทางสหภาพเรดวินเทอร์ค่ะ"
1004302-141 = "และในบรรดานั้นก็มีรูปปั้นที่แสดงถึงความสง่างาม และความงดงามของหนวดเคราที่มีชื่อเสียง#nโด่งดังเป็นพิเศษอยู่ด้วยค่ะ...?"
1004302-142 = "[s] \"คือว่า... แล้วนั่นเกี่ยวอะไรกับบิงซูของครูเหรอ\""
1004302-143 = "รูปปั้นที่นำมาจัดแสดง กล่าวกันว่าทำมาจากน้ำแข็งจากเขตเหนือที่ไม่ละลายแม้แต่ในฤดูร้อนค่ะ"
1004302-144 = "เพราะงั้นถ้าฉันขโมยรูปปั้นมาทำบิงซูได้ละก็..."
1004302-145 = "จะต้องเป็นสุดยอดบิงซู ที่ทำให้วันนี้เป็นวันพิเศษของคุณท่านได้แน่ๆ ค่ะ ...!"
1004302-146 = "[s] \"หยุดเลย สต็อป! ลืมเรื่องบิงซูกันเถอะ วาคาโมะ!\""
1004302-147 = "คะ? แบบนั้นไม่ดีเหรอคะ?"
1004302-148 = "เป็นเพราะมันทำมาจากน้ำแข็งที่เป็นรูปปั้น เลยไม่ดีต่อสุขอนามัยเหรอคะ...?"
1004302-149 = "อา... จริงด้วยนะคะ"
1004302-150 = "วาคาโมะผู้นี้... มัวแต่จดจ่ออยู่กับความคิดที่จะทำเพื่อคุณท่าน และไม่ได้สนใจเรื่องนั้นเลย ขอโทษด้วยค่ะ..."
1004302-151 = "[s] \"ไม่เป็นไรหรอก ถ้างั้นเราไปเล่นน้ำกันมั้ย?\""
1004302-152 = "เล่นน้ำงั้นเหรอคะ..."
1004302-153 = "การเล่นน้ำเป็นสิ่งที่ขาดไม่ได้เลยในฤดูร้อน และก็คงเหมาะกับชุดที่ฉันใส่มาวันนี้มากค่ะ"
1004302-154 = "อุปกรณ์ของชาเล่ต์มีพวกสระน้ำยางอยู่ด้วยใช่มั้ยคะ? วาคาโมะผู้นี้จำไม่ค่อยได้เลยค่ะ..."
1004302-155 = "แล้วเล่นน้ำที่ไหนได้บ้างนะ..."
1004302-159 = "อ๊ะ ฉันเข้าใจแล้วค่ะ ที่คุณท่านพูดถึงน่ะ... หมายถึงสิ่งนั้นใช่มั้ยล่ะคะ...?"
1004302-160 = "วาคาโมะผู้นี้เข้าใจแล้วค่ะ"
1004302-161 = "[s] \"เดี๋ยวก่อน วาคาโมะเข้าใจว่ายังไงเหรอ\""
1004302-162 = "ฮุฮุฮุ บางครั้งคุณท่านก็ชอบพูดแหย่วาคาโมะอยู่เรื่อยเลยนะคะ"
1004302-163 = "คิดจะทดสอบฉันเหรอคะ?"
1004302-164 = "พอคิดว่าคุณท่านมีมุมน่ารักๆ แบบนั้นด้วย... วาคาโมะคิดว่าคุณท่านเป็นคนที่น่ารักมากเลยค่ะ#nวาคาโมะผู้นี้รู้สึกร้อนวูบวาบเลยค่ะ"
1004302-165 = "ที่อาคารนี้มีถังเก็บน้ำอยู่บนดาดฟ้าใช่มั้ยคะ?"
1004302-166 = "[s] \"ก็มีอยู่หรอกนะ ทำไมเหรอ...?\""
1004302-167 = "ถ้าระเบิดมันละก็ ทั้งอาคารก็คงจะกลายเป็นทะเล..."
1004302-168 = "ค่ะ... การเปลี่ยนที่นี่เป็นสถานที่เล่นน้ำคงขึ้นอยู่กับแค่เวลาเท่านั้น นี่คงเป็นคำตอบที่ถูกต้องในสิ่งที่#nคุณท่านถามมาสินะคะ?"

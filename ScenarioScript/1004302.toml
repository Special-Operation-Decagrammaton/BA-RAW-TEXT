[translation]
1004302-1 = "只為閣下"
1004302-2 = "（季節的變化正式來臨，夏萊也收到了各式與夏季相關的業務活動）"
1004302-6 = "[ns] 「不知道是不是因為夏天，感覺與慶典相關的工作很多呢……」"
1004302-10 = "（居民們為了準備各地的煙火大會所提出的支援申請和工程、#n　將在慶典中使用的道具安全性確認……）"
1004302-11 = "（就在忙著處理夏萊收到的大量業務時……）"
1004302-15 = "[ns1] 「已經中午了嗎……」\n[ns2] 「去買個飯回來吧。」"
1004302-22 = "[ns] 「……嗯？入口處有點吵雜，發生什麼事了嗎……」"
1004302-24 = "居然在大街上穿著泳衣……"
1004302-25 = "難道是在拍電視劇嗎？"
1004302-26 = "不過也沒看到攝影機和員工……#n話說這裡是夏萊辦公室前……也就是說……？"
1004302-27 = "難不成……是被夏萊的老師叫出來的嗎？"
1004302-28 = "哎呀……夏萊的老師有那種興趣……？"
1004302-29 = "[s3] 「是誤會！」\n[s4] 「為什麼若藻會在這裡……！？」"
1004302-34 = "啊……！老師……！"
1004302-41 = "唔呵呵……恭候多時了，閣下。"
1004302-42 = "[s5] 「若藻……為什麼穿著泳衣……！？」\n[s6] 「我對若藻做了什麼不好的事嗎……？」"
1004302-43 = "咦……？"
1004302-44 = "咦……？"
1004302-45 = "不，我只是……"
1004302-46 = "在這種美妙的盛夏之日……"
1004302-47 = "明明是身心都十分火熱的日子，若藻我卻聽說閣下一直待在辦公室……#n讓我感到坐立難安……"
1004302-48 = "[s] 「坐立難安……？」"
1004302-49 = "這是我與閣下相遇之後，首次共同度過的夏季……"
1004302-50 = "對我而言如此特別的時間，閣下竟然要獨自在辦公室度過……#n若藻我，實在無法忍受。"
1004302-51 = "時間終究是有限的。#n若是錯過了這個季節，就必須花費一年的時間等待下個夏季的到來。"
1004302-55 = "……當然，等待季節的到來或許也是一種樂趣……"
1004302-56 = "即便如此，只要閣下還置身於我伸手可及之處……"
1004302-57 = "那麼我便無法對白白浪費這個季節的情況視而不見。"
1004302-58 = "我希望閣下和我一起度過的時間，每秒都能絢爛光彩。"
1004302-59 = "期望今天這個日子，能夠成為閣下回憶中完美的一日……"
1004302-60 = "因而無畏羞恥地……前來見您♡"
1004302-61 = "[s] 「那個……也就是說，若藻之所以會穿著泳衣……」"
1004302-62 = "唔呵呵……是的。#n想送給閣下一個永生難忘的夏日回憶作為禮物♪"
1004302-63 = "[s] 「永生難忘的夏日回憶……」"
1004302-64 = "是的……這件泳衣，您覺得如何呢？不覺得很符合夏日的回憶嗎？"
1004302-65 = "這是我對閣下的喜好苦思許久後所選擇的款式♡#n希望閣下務必能親口發表感想♡"
1004302-66 = "[s] 「啊，嗯……很漂亮唷。很適合若藻。」"
1004302-70 = "……！？"
1004302-71 = "[s] 「……若藻？」"
1004302-72 = "啊，啊啊……閣下親口贈與的話語，甜美的聲音。"
1004302-73 = "不，不行……像那樣受到稱讚的話，我就要……"
1004302-77 = "那果然是因為夏萊老師的興趣吧？"
1004302-78 = "哎呀……"
1004302-79 = "[s7] 「所以說是誤會！」\n[s8] 「若藻，總之我們換個地方吧！」"
1004302-80 = "是，是……！？"
1004302-81 = "是，是……！？"
1004302-87 = "（趁騷動擴大之前，暫且先帶若藻回到了夏萊的休息室）"
1004302-95 = "沒想到，會以那麼心急如焚的表情將我帶進夏萊……"
1004302-101 = "您的那副表情，想在身邊一直注視的心情越發膨脹……"
1004302-102 = "唔呵呵……這全都多虧閣下發自內心明白了我的心意嗎……？"
1004302-103 = "[s] 「嗯，我感受到若藻為我著想的心情了哦……各種意義上。」"
1004302-104 = "啊啊，是這樣嗎？真令人高興……"
1004302-110 = "唔呵呵，那麼接下來該做什麼呢……？"
1004302-111 = "為了讓這一天成為「對閣下而言完美的夏日回憶」，請告訴我可以幫忙的事。"
1004302-112 = "若藻我為了閣下，無論任何請求都會回應您的。"
1004302-113 = "[s] 「啊，是請求制啊。」"
1004302-114 = "是的……為了不勞煩閣下，我也思考過由我來準備……"
1004302-115 = "不過煩惱許久後，#n依然沒有能創造「對閣下而言完美的夏日回憶」的自信……"
1004302-116 = "難得能與您相見，若藻我希望今天能成為閣下理想中完美的一天，#n因而遲遲無法決定……"
1004302-117 = "啊啊……"
1004302-118 = "我真是不成材，真丟臉……"
1004302-119 = "[s9] 「別這麼說，你願意為我思考這麼多，我也很高興哦。」\n[s10] （讓若藻安排的話，不知道會發生什麼事……）"
1004302-120 = "那真是太好了……"
1004302-121 = "那真是太好了……"
1004302-122 = "那麼……閣下的願望是什麼呢？請儘管吩咐♡"
1004302-123 = "[s] 「夏日回憶的話……吃刨冰之類的？」"
1004302-124 = "刨冰……？"
1004302-125 = "原來如此……好的，我明白了。"
1004302-126 = "確實……和閣下一起品嚐的刨冰會是極致的逸品吧……沒錯。"
1004302-127 = "因互相餵食冰品而傳達到舌根的微苦甜味……以及緩緩到來的甜美痛楚。"
1004302-128 = "……看見我對那股痛楚感到困惑的模樣，#n閣下便會露出笑容關心我吧……唔呵呵。"
1004302-129 = "[s11] 「啊，嗯，大概是吧……？」\n[s12] （完全沉浸在妄想中……）"
1004302-130 = "那麼……正好來這裡的途中，我發現了不錯的東西。"
1004302-131 = "那麼……正好來這裡的途中，我發現了不錯的東西。"
1004302-132 = "[s] 「有名的刨冰店攤位之類的？」"
1004302-133 = "呵呵，並非刨冰店……而是看見了這樣的活動。"
1004302-137 = "（若藻的手機上顯示的，是在附近舉辦的活動情報）"
1004302-138 = "（上面寫著……）"
1004302-139 = "[s] 「『赤冬萬年雪雕秀』……？」"
1004302-140 = "是的，似乎展示著由赤冬聯邦學園特別的冰製作而成的雕刻。"
1004302-141 = "特別是，某個用鬍子表現威嚴的雕刻似乎很有名……"
1004302-142 = "[s] 「呃……那跟刨冰有什麼關係……？」"
1004302-143 = "該處展示的雕像，似乎是以盛夏也不會溶解的北部地區的天然冰製成。"
1004302-144 = "既然如此，只要能從那個冰雕削下一部分來製作刨冰……"
1004302-145 = "想必就能製作出足以點綴這完美日子的特別刨冰……！"
1004302-146 = "[s] 「先，先等一下！刨冰還是算了吧！若藻！」"
1004302-147 = "嗯？那樣您會很困擾是嗎……？"
1004302-148 = "而且衛生方面也是個問題……？"
1004302-149 = "若藻我，只顧著思考為閣下準備特別的刨冰……"
1004302-150 = "卻疏忽了理所當然的事情，真是非常抱歉。"
1004302-151 = "[s] 「……戲水之類的如何？」"
1004302-152 = "戲水……嗎。"
1004302-153 = "確實是夏季就不可或缺，也與今日我所身著的服裝十分相符的行為……"
1004302-154 = "不過夏萊的備品有塑膠泳池這類的東西嗎？若藻我，沒有印象……"
1004302-155 = "這樣的話，究竟要在哪裡戲水……"
1004302-159 = "……我，理解了。"
1004302-160 = "閣下的話語，無論何時都會給予若藻我新的發現呢。"
1004302-161 = "[s] 「我其實沒什麼特別的意思……話說你是理解了什麼！？」"
1004302-162 = "唔呵呵……閣下偶爾也有壞心眼的時候呢。"
1004302-163 = "是在考驗我吧？"
1004302-164 = "那種地方也很可愛呢……#n沒錯，若藻我，只要是閣下的事什麼都能看穿。"
1004302-165 = "這棟大樓的頂樓有座水塔吧？"
1004302-166 = "[s] 「是有沒錯……那個怎麼了？」"
1004302-167 = "只要將其引爆，大樓整體就會浸水……"
1004302-168 = "就算不特別準備泳池也能戲水……閣下想表達的就是那個意思吧？"
1004302-169 = "[s13] 「被那麼純真的眼神盯著看的話，心裡有點難過耶……」\n[s14] 「不是那個意思……！抱歉，那個也先等等！」"
1004302-172 = "是……這樣啊。"
1004302-173 = "真是困難呢……"
1004302-175 = "（在那之後也和若藻討論著製造「完美的夏日回憶」的計畫……）"
1004302-178 = "欣賞螢火蟲……閃爍的火粉翩翩飛舞的模樣……"
1004302-179 = "唔呵呵，包在我身上。"
1004302-183 = "對若藻我來說……！"
1004302-184 = "咦？希望我停手……？"
1004302-185 = "那麼……"
1004302-186 = "若藻我就將一切粉碎殆盡……！"
1004302-187 = "不行嗎？"
1004302-190 = "啊啊，真是困難呢……究竟該怎麼做才好呢……"
1004302-191 = "不過，只要想到這全都是閣下和我正在朝著同一個夢想努力就……"
1004302-192 = "內心深處有股幸福……"
1004302-193 = "啊啊，感覺快要溢出來了♡"
1004302-194 = "[s] 「是，是啊……！」"
1004302-195 = "（就在煩惱這無論提出什麼樣的想法，都會獲得意外答案的狀況時……）"
1004302-200 = "（突然浮現了想法）"
1004302-201 = "[s] 「……這麼說來，我有件事想和若藻一起做。」"
1004302-202 = "咦……？"
1004302-206 = "這裡是……平常，閣下在工作的……"
1004302-207 = "兩人獨自在這種地方……究竟要……"
1004302-211 = "……啊啊！"
1004302-212 = "唔呵呵呵……單獨兩人，在他人無法目擊的地方度過特別的夏季……"
1004302-213 = "好的，若藻我，早在很久以前就做好心理準備了。"
1004302-214 = "來吧，請儘管吩咐……"
1004302-220 = "閣．下♡"
1004302-221 = "（這是為了讓不管提出什麼想法都會暴走的若藻老實下來的苦肉計……）"
1004302-224 = "[ns] 「那就是……夏天的趕工活動！」"
1004302-228 = "…………咦？"
1004302-229 = "[s15] 「這是在夏天召集親朋好友熬夜做的事唷。」\n[s16] 「正好還有很多工作，一起來把這些做完怎麼樣？」"
1004302-232 = "咦？那個……咦。"
1004302-233 = "那種事……真的就可以了嗎？"
1004302-234 = "這樣能成為「對閣下而言完美的夏日回憶」嗎……？"
1004302-235 = "[s] 「當然。和若藻兩人單獨做是有意義的！」"
1004302-239 = "和我，兩，兩，兩人單獨……"
1004302-240 = "好……好的！閣，閣下那麼說的話……！"
1004302-246 = "唔呵呵♡"
1004302-248 = "（總算是和若藻一起製造了「完美的夏日回憶」）"

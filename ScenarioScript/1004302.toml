1004302-212 = "ฮุฮุฮุ แบบนี้เองเหรอคะ... ฤดูร้อนแสนพิเศษที่ใช้เวลาร่วมกันในสถานที่ที่ลับสายตาผู้คน เพียงแค่สองเรา..."

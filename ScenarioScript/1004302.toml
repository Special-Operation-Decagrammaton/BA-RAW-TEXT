1004302-220 = "คุณ.ท่าน.♡"
1004302-221 = "(วิธีสุดท้ายที่คุณครูนึกออก เพื่อรั้งวาคาโมะที่ดูเหมือนพร้อมจะระเบิดทุกอย่างเอาไว้ที่นี่ ไม่ให้ออกไปข้างนอก)"

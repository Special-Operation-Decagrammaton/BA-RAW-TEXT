1004302-41 = "3;와카모 수영복ND;00;우후훗. 당신. 기다리고 있었답니다.\n#3;em;[하트]\n#3;greeting\n#3;closeup"
1004302-42 = "[s5] \"아무런 말도 없이? 그것도 수영복 차림으로……?! 어째서?!\"\n[s6] \"혹시 나, 와카모에게 뭔가 잘못한 거라도 있어?!\""
1004302-43 = "3;와카모 수영복ND;00;네에……?\n#3;em;[?]\n#3;closeup"
1004302-44 = "3;와카모 수영복ND;00;네에……?\n#3;em;[?]\n#3;closeup"
1004302-45 = "3;와카모 수영복ND;00;아니요. 저는 단지…….\n#3;closeup"
1004302-46 = "3;와카모 수영복ND;00;이 와카모, 모처럼 오늘같이 무더운 여름이 찾아와 몸과 가슴이 달아오르는데도 불구하고.\n#3;closeup"
1004302-47 = "3;와카모 수영복ND;00;당신께서 줄곧 사무실에만 계신다는 이야기를 듣고, 이대로 가만히 있으면 안 되겠다고 생각하여…….\n#3;em;…\n#3;closeup"
1004302-48 = "[s] \"가만히 있으면 안 된다니, 무슨 뜻이야?\""
1004302-49 = "3;와카모 수영복ND;00;그야 모처럼 저와 당신이 만난 뒤로, 이렇게 함께 맞이한 여름이잖아요……?\n#3;em;[반응]"
1004302-50 = "3;와카모 수영복ND;00;제게 있어 너무나도 특별한 이 시간을 당신께서는 그저 사무실에서 홀로 보내신다니. 이 와카모. 그런 건 참을 수 없답니다."
1004302-51 = "3;와카모 수영복ND;00;시간은 언제나 한정된 것. 이번 계절이 덧없이 지나가 버리면, 또다시 이러한 계절을 맞이하기 위해 앞으로 1년이란 시간이 필요할 터."
1004302-52 = "#st;[0,0];instant;1;"
1004302-53 = "#clearST"
1004302-54 = "3;와카모 수영복ND;00\n#3;m2\n#wait;1500"
1004302-55 = "3;와카모 수영복ND;00;……물론 그런 기다림을 맞이하는 것 또한 하나의 여흥이라 할 수도 있겠습니다마는."
1004302-56 = "3;와카모 수영복ND;00;그러하더라도 아직 와카모의 손을 뻗을 수 있다면……."
1004302-57 = "3;와카모 수영복ND;00;네에, 아무것도 하지 않은 채, 시간이 덧없이 흘러가도록 내버려 두지는 않겠습니다.\n#3;em;[///]\n#3;stiff"
1004302-58 = "3;와카모 수영복ND;00;당신과 제가 함께 보내는 매 순간은 반짝였으면 하기에."
1004302-59 = "3;와카모 수영복ND;00;오늘이라는 이 날이, 부디 당신의 추억에 남는 완벽한 하루가 되길 바라는 마음에……."
1004302-60 = "3;와카모 수영복ND;00;직접 부끄러움을 무릅쓰고 이렇게♡\n#3;em;[하트]\n#3;greeting"
1004302-61 = "[s] \"그럼 와카모가 수영복 차림인 건…….\""
1004302-62 = "3;와카모 수영복ND;00;우후훗, 네, 당신에게 잊지 못할 여름의 추억을 선물하고자 생각했으니까요♪\n#3;em;[음표]\n#3;m3"
1004302-63 = "[s] \"잊지 못할 여름의 추억…….\""
1004302-64 = "3;와카모 수영복ND;00;어떠신가요? 이 복장. <여름의 추억>을 쌓고자 하는 생각에 딱 맞게, 그야말로 여름이란 느낌이 물씬 풍기지 않나요?"
1004302-65 = "3;와카모 수영복ND;00;당신께서 무얼 마음에 들어 해 주실까. 고심하고 고심해서 고른 물건이랍니다아♡ 부디, 당신의 입으로 감상을♡\n#3;greeting"
1004302-66 = "[s] \"아, 응. 그렇네. 확실히 엄청 예쁜걸, 와카모에게 잘 어울려.\""

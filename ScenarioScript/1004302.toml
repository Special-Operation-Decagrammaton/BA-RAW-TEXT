[translation]
1004302-1 = "ด้วยใจที่อยากมอบให้คุณ"
1004302-2 = "(ฤดูร้อนที่ร้อนระอุมาเยือน พร้อมกับงานต่างๆ ที่ถาโถมเข้ามาที่ชาเล่ต์)"
1004302-6 = "[ns] \"ถึงจะเป็นฤดูร้อนก็เถอะ แต่งานเทศกาลเยอะจริงๆ เลยนะ...\""
1004302-10 = "(ทั้งให้ความร่วมมือกับชาวเมืองเพื่อเตรียมพร้อมสำหรับงานเทศกาลดอกไม้ไฟท้องถิ่น การเตรียม#nการเรื่องทั่วไป งานตรวจสอบความปลอดภัยอุปกรณ์ต่างๆ ที่ใช้ในงานเทศกาลและอื่นๆ อีกมากมาย...)"
1004302-11 = "(และในตอนที่คุณครูกำลังหัวหมุนอยู่กับงานที่ถาโถมเข้ามา...)"
1004302-15 = "[ns1] \"อืม ถึงเวลามื้อเที่ยงแล้วเหรอเนี่ย\"\n[ns2] \"ลงไปซื้อข้าวมาก่อนดีกว่า\""
1004302-22 = "[ns] \"หืม...? ตรงทางเข้ามีเรื่องอะไรกันนะ...\""
1004302-24 = "ใส่ชุดว่ายน้ำมาเดินในเมืองแบบนี้เหรอ ตายแล้วๆ "
1004302-25 = "เขาอาจจะถ่ายทำละครกันอยู่ก็ได้นะคะ?"
1004302-26 = "ถ่ายอะไรกัน ไม่เห็นมีกล้องเลยสักตัว... แล้วดูสิ ที่นี่คือสำนักงานของชาเล่ต์ไม่ใช่เหรอคะ?"
1004302-27 = "ไม่นะ หรือว่าจะถูกคุณครูของชาเล่ต์คนนั้นเรียกมาน่ะ...?"
1004302-28 = "ตายแล้วๆ คุณครูของชาเล่ต์มีรสนิยมแบบนี้เหรอเนี่ย...?"
1004302-29 = "[s3] \"เข้าใจผิดอย่างแรงเลย!\"\n[s4] \"วาคาโมะมาทำอะไรที่นี่เหรอ...?!\""
1004302-34 = "อ๊ะ! คุณครู...!"
1004302-41 = "ฮุฮุฮุ วาคาโมะกำลังรอคุณท่านอยู่เลยค่ะ"
1004302-42 = "[s5] \"มาไม่บอกไม่กล่าว แถมยังใส่ชุดว่ายน้ำอีก นี่มันอะไรเนี่ย?!\"\n[s6] \"ครูทำผิดอะไรต่อวาคาโมะไว้รึเปล่า?!\""
1004302-43 = "คะ...?"
1004302-44 = "คะ...?"
1004302-45 = "เปล่าค่ะ ก็แค่..."
1004302-46 = "วาคาโมะผู้นี้... ฤดูร้อนที่รอคอยมานานได้มาถึง ร่างกายและจิตใจของวาคาโมะก็รุ่มร้อนขึ้น..."
1004302-47 = "ในหน้าร้อนแบบนี้ ได้ยินว่าคุณท่านต้องอยู่แต่ในสำนักงานตลอดเวลา วาคาโมะคงอยู่เฉยๆ ไม่ได้แล้วค่ะ..."
1004302-48 = "[s] \"อยู่เฉยๆ ไม่ได้งั้นเหรอ หมายความว่ายังไงน่ะ?\""
1004302-49 = "หลังจากที่วาคาโมะกับคุณท่านได้พบกันครั้งก่อน นี่เป็นการพบกันครั้งแรกในฤดูร้อนของเรา#nใช่มั้ยล่ะคะ?"
1004302-50 = "เพียงแค่คิดว่าคุณท่าน ผู้เป็นบุคคลที่แสนพิเศษสำหรับวาคาโมะต้องอุดอู้อยู่แต่ในห้องทำงาน วาคาโมะผู้นี้ก็แทบทนไม่ได้เลยค่ะ"
1004302-51 = "เวลาเป็นสิ่งที่หมุนผ่านไป หากฤดูกาลนี้ผ่านพ้นไป จะต้องรอคอยอีกนานนับปีกว่าฤดูร้อนครั้งหน้า#nจะมาถึง..."
1004302-55 = "แน่นอนว่าการรอคอยอาจนับเป็นหนึ่งในความหฤหรรษ์ก็ได้..."
1004302-56 = "แต่ว่าถ้าวาคาโมะผู้นี้ยังสามารถเอื้อมมือไปหาคุณท่านได้..."
1004302-57 = "ใช่แล้วค่ะ ฉันจะต้องพยายาม และไม่ยอมปล่อยให้เวลาผ่านไปอย่างสูญเปล่าเด็ดขาดค่ะ"
1004302-58 = "วาคาโมะอยากให้ทุกช่วงเวลาที่เราสองคนได้อยู่ร่วมกัน เปล่งประกาย และน่าจดจำ..."
1004302-59 = "วาคาโมะปรารถนาให้วันนี้เป็นวันที่สมบูรณ์แบบในความทรงจำของคุณท่าน..."
1004302-60 = "ก็เลยอดทนต่อความเขินอายเช่นนี้...♡"
1004302-61 = "[s] \"ถ้างั้นที่วาคาโมะใส่ชุดว่ายน้ำมานี่...\""
1004302-62 = "ฮุฮุฮุ ใช่แล้วค่ะ ฉันอยากจะมอบความทรงจำในฤดูร้อนที่หอมหวานและไม่มีวันลืมให้คุณท่านค่ะ ♪"
1004302-63 = "[s] \"ความทรงจำในฤดูร้อนที่หอมหวานและไม่มีวันลืม...\""
1004302-64 = "ชุดนี้เป็นยังไงบ้างคะ ดูสมกับเป็นชุดที่เหมาะกับคอนเซปต์ที่จะใช้สร้าง <ความทรงจำในฤดูร้อน> รึเปล่าคะ?"
1004302-65 = "ฉันครุ่นคิดอยู่นานว่าคุณท่านจะชอบแบบไหน และสุดท้ายก็ตัดสินใจเลือกชุดนี้มาค่ะ♡ ได้โปรด... เพลิดเพลินไปกับสิ่งที่ฉันมอบให้ด้วยนะคะ♡"
1004302-66 = "[s] \"อะ...อื้อ นั่นสินะ ชุดสวยมาก เหมาะกับวาคาโมะจริงๆ\""
1004302-70 = "อึก...?!"
1004302-71 = "[s] \"วาคาโมะ...?\""
1004302-72 = "อ๊าาา... คำชื่นชมแบบไม่มีปี่มีขลุ่ยจากคุณท่าน เสียงอันไพเราะของคุณท่าน..."
1004302-73 = "มะ...ไม่ได้การแล้วค่ะ ถ้าวาคาโมะได้ยินคำพูดเช่นนั้นของคุณท่านอีก วาคาโมะ... วาคาโมะผู้นี้คงจะอดทนต่อไปไม่ไหวแน่ๆ..."
1004302-77 = "คุณครูของชาเล่ต์มีงานอดิเรกแบบนั้นจริงๆ เหรอคะเนี่ย?"
1004302-78 = "ตายจริง ไม่อยากเชื่อเลยว่าจะเป็นแบบนี้"
1004302-79 = "[s7] \"บอกว่าเข้าใจผิดแล้วไงเล่า!\"\n[s8] \"วาคาโมะ! ย้ายที่คุยกันก่อนเถอะ!\""
1004302-80 = "คะ...? อ๊ะ ได้ค่ะ..."
1004302-81 = "คะ...? อ๊ะ ได้ค่ะ..."
1004302-87 = "(คุณครูรีบพาวาคาโมะไปที่ห้องพักผ่อนของชาเล่ต์ ก่อนที่ข่าวลือแปลกๆ จะแพร่สะพัดไปไกล)"
1004302-95 = "คุณท่านถึงกับพาฉันเข้ามาในชาเล่ต์ด้วยสีหน้าที่รีบร้อนแบบนั้น..."
1004302-101 = "ทำให้วาคาโมะรู้สึกอยากถอดหน้ากากออกมา และเฝ้าพินิจใบหน้าของคุณท่านจากข้างๆ..."
1004302-102 = "ฮุฮุฮุ... ที่ฉันอ่อนไหวแบบนี้ เป็นเพราะคุณท่านเข้าใจจิตใจของฉัน และเข้าใจตัวฉันอย่างแท้จริง#nสินะคะ...?"
1004302-103 = "[s] \"อื้อ ครูรับรู้ได้ถึงความรู้สึกของวาคาโมะจากหลายๆ อย่างเลย\""
1004302-104 = "อา... จริงหรือคะ? มีความสุขจัง..."
1004302-110 = "ถ้าอย่างนั้นเราจะทำอะไรกันดีคะ คุณท่าน...?"
1004302-111 = "คุณท่านปรารถนาสิ่งใดเพื่อทำให้วันนี้เป็น <ความทรงจำวันในฤดูร้อนที่สมบูรณ์แบบของคุณท่าน> คะ?"
1004302-112 = "ขอเพียงเป็นความปรารถนาของคุณท่าน วาคาโมะผู้นี้ก็พร้อมที่จะยินยอมทุกอย่างเลยค่ะ"
1004302-113 = "[s] \"<ความปรารถนา> เหรอ\""
1004302-114 = "ค่ะ แน่นอนว่า... เพื่อไม่ให้เป็นการรบกวนคุณท่านเกินไป ฉันเตรียมบางอย่างเอาไว้แล้ว"
1004302-115 = "แต่หลังจากครุ่นคิดมาหลายๆ อย่าง ฉันไม่มั่นใจว่าจะกลายเป็น <ความทรงจำวันในฤดูร้อนที่สมบูรณ์#nแบบของคุณท่าน> ได้หรือเปล่า..."
1004302-116 = "แต่พอเราได้มาพบกันเช่นนี้แล้ว วาคาโมะผู้นี้เลยลังเลว่าจะทำให้วันนี้เป็นวันที่สมบูรณ์แบบอย่าง#nที่คุณท่านปรารถนาได้หรือเปล่า..."
1004302-117 = "อา... วาคาโมะยังไม่ดีพอสำหรับคุณท่าน... ละอายใจจริงๆ เลยค่ะ"
1004302-118 = "ขอโทษด้วยค่ะ คุณท่าน"
1004302-119 = "[s9] \"ไม่เลย ดีซะอีกนะที่นึกถึงครูน่ะ\"\n[s10] (ถ้าวาคาโมะวางแผนเอาไว้ อาจเป็นเรื่องที่เกินคาดก็ได้!)"
1004302-120 = "ได้ยินแบบนี้ก็ค่อยโล่งอกหน่อยนะคะ ฮุฮุฮุ"
1004302-121 = "อ๊ะ คุณท่านดีใจสินะคะ? แบบนี้ก็ค่อยโล่งอกหน่อยนะคะ ฮุฮุฮุ"
1004302-122 = "เอาละค่ะ ไม่ว่าเรื่องไหนก็บอกมาได้เลยค่ะ คุณท่านปรารถนาสิ่งใดคะ? บอกมาตรงๆ ได้เลยค่ะ♡"
1004302-123 = "[s] \"ความทรงจำในฤดูร้อน... ก็คงเป็นการกินบิงซูละมั้ง?\""
1004302-124 = "บิงซู...?"
1004302-125 = "อืม... ก็คงต้องเป็นแบบนั้นสินะคะ"
1004302-126 = "แน่นอนว่า... ในฤดูร้อนที่แสนอบอ้าวแบบนี้ สิ่งที่ขาดไม่ได้เลยก็คือการได้ลิ้มรสหวานกลมกล่อม#nของบิงซูเย็นๆ พร้อมกับคุณท่าน..."
1004302-127 = "แบ่งกันป้อนบิงซูให้กัน และทำหน้ามู่พร้อมกัน เมื่อความหวานของบิงซูแผ่ซ่านไปถึงโคนลิ้น... "
1004302-128 = "ถ้าฉันตกใจและทำท่าลุกลี้ลุกลนจากความเย็นจี๊ดที่ไม่เคยเจอมาก่อน คุณท่านก็คงจะหัวเราะ#nและพูดล้อเล่นกับฉันสินะคะ ฮุฮุฮุ..."

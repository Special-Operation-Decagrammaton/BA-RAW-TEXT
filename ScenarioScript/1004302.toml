1004302-110 = "3;와카모 수영복ND;S2_15;자아, 그럼 이제부터 무엇을 시작해볼까요? 선생님……?\n#3;em;[반짝]\n#3;closeup\n#3;greeting"
1004302-111 = "3;와카모 수영복ND;S2_01;오늘 하루가 <당신께 완벽한 여름날의 추억>이 되기 위해, 당신께서 바라는 것이 무엇일까요?\n#3;closeup"
1004302-112 = "3;와카모 수영복ND;S2_03;이 와카모, 당신을 위해서라면 어떠한 리퀘스트라도 응할 준비가 되어 있답니다.\n#3;em;[하트]\n#3;closeup"
1004302-113 = "[s] \"아, 리퀘스트, 란 말이지.\""
1004302-114 = "3;와카모 수영복ND;S2_15;네에, 물론…… 당신의 손을 번거롭게 하지 않기 위해, 제가 직접 준비한다는 방법도 있었겠습니다만…….\n#3;closeup"
1004302-115 = "3;와카모 수영복ND;S2_99;여러모로 고민해본 결과, 그랬다간 문자 그대로 <당신께 완벽한 여름날의 추억>이 될 확신이 없었달까…….\n#3;closeup"
1004302-116 = "3;와카모 수영복ND;S2_11;기왕 이렇게 만났으니만큼, 이 와카모, 부디 당신께서 바라는 완벽한 오늘이 되었으면 하는 마음에, 주저하고야 말았달까…….\n#3;em;[///]\n#3;stiff\n#3;closeup"
1004302-117 = "3;와카모 수영복ND;S2_14;아아…… 참 저도 부족하기 짝이 없어, 면목이 없습니다…….\n#3;closeup"
1004302-118 = "3;와카모 수영복ND;S2_12;죄송합니다. 선생님…….\n#3;greeting\n#3;closeup"
1004302-119 = "[s9] \"아냐! 오히려 그렇게 배려해준 게 좋아! 응!\"\n[s10] (와카모가 계획을 짰더라면 터무니없는 일이 됐을지도 모르니까!)"
1004302-120 = "3;와카모 수영복ND;S2_15;그러시다면 다행이네요. 우후훗.\n#3;em;[하트]"
1004302-121 = "3;와카모 수영복ND;S2_15;그러시다면 다행이네요. 우후훗.\n#3;em;[하트]"
1004302-122 = "3;와카모 수영복ND;S2_01;자, 어떠한 것이라도 좋답니다. 바라는 것은 무엇인가요? 가감없이 말씀해주시길♡"
1004302-123 = "[s] \"여름날의 추억……이라면, 역시 빙수 먹기……라거나?\""
1004302-124 = "3;와카모 수영복ND;S2_02;빙수……?\n#3;em;[?]"
1004302-125 = "3;와카모 수영복ND;S2_99;과연, 으음, 그런 것이로군요."
1004302-126 = "3;와카모 수영복ND;S2_01;확실히……. 여름의 풍물시하면 빠질 수 없는 것이 애틋한 당신과 함께 맛보는 차디찬 빙수의 맛."
1004302-127 = "3;와카모 수영복ND;S2_11;서로 먹여주며, 얼음을 입에 물었을 때 혀끝으로 퍼지는 알싸한 단맛과 함께 찡하고 찾아오는 두통.\n#3;em;[///]\n#3;stiff"
1004302-128 = "3;와카모 수영복ND;S2_12;……제가 당황하며 생경한 아픔에 머뭇거리고 있노라면, 당신은 필시 웃으며 농을 건네주시겠지요…… 우후훗."
1004302-129 = "[s11] \"아, 응. 그런 느낌이지……?\"\n[s12] (절찬리에 망상 중이구나…….)"
1004302-130 = "3;와카모 수영복ND;S2_03;좋습니다. 그렇지 않아도 마침 이곳에 오는 길에 딱 좋은 걸 발견하기도 했답니다.\n#3;em;[반응]"
1004302-131 = "3;와카모 수영복ND;S2_03;좋습니다. 그렇지 않아도 마침 이곳에 오는 길에 딱 좋은 걸 발견하기도 했답니다.\n#3;em;[반응]"
1004302-132 = "[s] \"어? 뭔가 유명한 빙수 가게라도 있던 거야?\""
1004302-133 = "3;와카모 수영복ND;S2_99;후훗. 아니요. 오늘 길에 마침 우연히 이런 이벤트가 있다는 걸 봤었기에."
1004302-134 = "#st;[0,0];instant;1;"
1004302-135 = "#clearST"
1004302-136 = "3;와카모 수영복ND;S2_01\n#3;greeting\n#wait;2000"
1004302-137 = "#na;(와카모가 미소 지으며 들고 있던 핸드폰을 통해 보여준 건, 근처에서 현재진행형으로 열리고 있던 이벤트의 정보였다.)"
1004302-138 = "#na;(거기에 쓰여있기를…….)"
1004302-139 = "[s] \"<여름맞이 붉은겨울 만년설 조각 전시회>……?\""

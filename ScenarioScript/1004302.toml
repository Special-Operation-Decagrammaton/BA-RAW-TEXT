[translation]
1004302-1 = "Because It's for You"
1004302-2 = "It was the middle of summer, and Schale was busy with various tasks."
1004302-6 = "[ns] \"There's a lot of festival-related work for the season...\""
1004302-10 = "Cooperation with residents to prepare for the local firework festival, preparation for general matters, safety checks for various equipment to be used at the festival, etc... It was endless."
1004302-11 = "I was trying to organize all the tasks assigned to Schale."
1004302-15 = "[ns1] \"Hmm, it's already lunchtime...\"\n[ns2] \"I should get takeout.\""
1004302-22 = "[ns] \"There's something going on at the entrance...\""
1004302-24 = "Who wears a swimsuit in the middle of the street? Whoa."
1004302-25 = "Maybe there's some filming going on?"
1004302-26 = "But I don't see a camera... By the way, isn't this the front of the Schale office?"
1004302-27 = "No way... Did the Schale Sensei ask her to do this?"
1004302-28 = "Whoa, whoa... There's something seriously wrong with them."
1004302-29 = "[s3] \"This is a misunderstanding!\"\n[s4] \"Hey, what's Wakamo doing here?!\""
1004302-34 = "Oh, Sensei...!"
1004302-41 = "Heeheehee. I've been waiting for you."
1004302-42 = "[s5] \"You can't just show up wearing a swimsuit!\"\n[s6] \"Did I do something wrong to you, Wakamo?!\""
1004302-43 = "Huh?"
1004302-44 = "Huh?"
1004302-45 = "No, I just..."
1004302-46 = "The summer has reached peak heat, and I've been feeling more passionate than ever."
1004302-47 = "I heard you were inside the office all day and night, so I thought I should do something..."
1004302-48 = "[s] \"What do you mean you had to do something?\""
1004302-49 = "This is the first summer we're spending together..."
1004302-50 = "This is a very special time, and I can't stand you wasting it inside your office all alone."
1004302-51 = "Time is finite. After this season is over, we have to wait another year for it to come back around."
1004302-55 = "Of course, waiting for the next summer could be part of the enjoyment, but..."
1004302-56 = "But if there's anything I can do to reach you..."
1004302-57 = "I have to at least try!"
1004302-58 = "I want every moment we spend together to shine."
1004302-59 = "I want today to be a perfect day that will remain in your memory."
1004302-60 = "That's why I came out here, although it's a bit embarrassing."
1004302-61 = "[s] \"The reason you're wearing the swimsuit is...\""
1004302-62 = "Heeheehee, yes! I wanted to gift you an unforgettable summer memory!"
1004302-63 = "[s] \"Unforgettable summer memory...\""
1004302-64 = "What do you think? Isn't it perfect for remembering this particular summer?"
1004302-65 = "I thought hard about which one to pick because I wanted to make sure you liked it. Please, tell me what you think."
1004302-66 = "[s] \"Oh, yes. I see. It's very pretty. You look great in it.\""
1004302-70 = "Ugh...?!"
1004302-71 = "[s] \"...Wakamo?\""
1004302-72 = "Th-The compliment you gave...with your sweet voice."
1004302-73 = "Oh, this is no good. When I hear something like that from you, I can hardly contain myself..."
1004302-77 = "Is this really what the Schale Sensei is into?"
1004302-78 = "Oh, my. That's inappropriate."
1004302-79 = "[s7] \"I said this is all a misunderstanding!\"\n[s8] \"Wakamo! Let's get out of here!\""
1004302-80 = "Huh? Whoa, o-okay..."
1004302-81 = "Huh? Whoa, o-okay..."
1004302-87 = "Before things got messier, I retreated to the Schale lounge with Wakamo."
1004302-95 = "You rushed me into the Schale office with a panicked face..."
1004302-101 = "I want to take off my mask and gaze at your face from the side..."
1004302-102 = "Heeheehee... Maybe I'm being vulnerable because you understand me..."
1004302-103 = "[s] \"Yes. It's very clear you think about me in too many ways.\""
1004302-104 = "Oh, really? I'm so glad..."
1004302-110 = "Okay. What should we do now, Sensei?"
1004302-111 = "To make our perfect summer memory, what should we do?"
1004302-112 = "I'm ready to accept any request to make you happy."
1004302-113 = "[s] \"Oh, a request...\""
1004302-114 = "Yes. Of course...I could have prepared something for your convenience, but..."
1004302-115 = "But after considering it, I wasn't sure if it would guarantee a perfect summer memory..."
1004302-116 = "Now that we're here together, I want to make sure you really have your perfect day."
1004302-117 = "Oh... I'm so sorry... I'm not good enough for you, am I...?"
1004302-118 = "Sorry, Sensei..."
1004302-119 = "[s9] \"No, it's okay! Thank you for being so considerate!\"\n[s10] \"(Wakamo comes up with such ridiculous plans!)\""
1004302-120 = "I'm relieved to hear that. Heehee."
1004302-121 = "Oh? Are you actually happy I'm here? I can tell from your face!"
1004302-122 = "Okay, tell me anything. What is it that you want to do?"
1004302-123 = "[s] \"The perfect summer memory... I guess we can eat shaved ice?\""
1004302-124 = "Shaved ice...?"
1004302-125 = "Hmm, I see."
1004302-126 = "Indeed...shaved ice... A summer delicacy for us to enjoy together."
1004302-127 = "We'll feed it to each other. When the ice touches our mouths, the sweetness and brain freeze will overwhelm our sensations."
1004302-128 = "When I'm making a face because of brain freeze, you'll smile and toss a joke at me. Heeheehee..."
1004302-129 = "[s11] \"That's not exactly what I was imagining...\" \n[s12] \"(She's daydreaming...)\""
1004302-130 = "Okay. I saw the perfect place on my way here."
1004302-131 = "Okay. I saw the perfect place on my way here."
1004302-132 = "[s] \"Oh, did you see a famous shaved ice shop or something?\""
1004302-133 = "Heehee, no. On my way here, I saw this."
1004302-137 = "Wakamo smiled and showed me her phone. There was an event happening nearby."
1004302-138 = "It was called..."
1004302-139 = "[s] \"The Summer Special Red Winter Ice Sculpture Exhibition?\""
1004302-140 = "Yes. I saw that Red Winter Academy is showing all kinds of special ice sculptures."
1004302-141 = "I hear the most famous sculpture is one that expresses the dignity of the mustache..."
1004302-142 = "[s] \"Um, but what does that have to do with shaved ice?\""
1004302-143 = "The sculptures are said to be made of natural ice that doesn't melt, even in the peak of summer."
1004302-144 = "So if we can secretly take the ice to make shaved ice..."
1004302-145 = "It'll be special shaved ice that will make your day perfect!"
1004302-146 = "[s] \"Stop, stop! All right, let's forget about the shaved ice, Wakamo!\""
1004302-147 = "Huh? Is that a bad idea?"
1004302-148 = "Ice from a sculpture isn't clean enough to eat?"
1004302-149 = "Oh... Yes... You're right."
1004302-150 = "I was so focused on making you happy that I missed such an important detail. I'm sorry..."
1004302-151 = "[s] \"Don't apologize. What about swimming?\""
1004302-152 = "Swimming..."
1004302-153 = "It's obviously the most popular summer activity. And I'm already dressed for the occasion."
1004302-154 = "Does Schale have a blow-up pool or something? I don't remember..."
1004302-155 = "Where can we go swimming?"
1004302-159 = "Oh, I see. You meant something else..."
1004302-160 = "I understand now."
1004302-161 = "[s] \"No, I didn't mean anything else! What do you mean you understand?!\""
1004302-162 = "Heeheehee... Sometimes you play mischievous tricks on me."
1004302-163 = "Are you testing me even now?"
1004302-164 = "I even think that side of you is cute... Oh! I just came up with a brilliant idea."
1004302-165 = "There's a water tank on the top of this building, right?"
1004302-166 = "[s] \"Yeah, but what about it...?\""
1004302-167 = "If we blow it up, the whole building will be submerged in water..."
1004302-168 = "It'll only be a matter of time before we have a place to swim. This must be what you were hinting at, correct?"
1004302-169 = "[s13] \"I'm sorry to disappoint you, but... No.\"\n[s14] \"That wasn't my intention at all! Forget that plan too! Cancel!\""
1004302-172 = "Oh, really...?"
1004302-173 = "This is hard..."
1004302-175 = "After that, Wakamo and I kept discussing how to create the perfect summer memory..."
1004302-178 = "Watching fireflies... You mean you wanna see fire in the dark... "
1004302-179 = "Heeheehee. Say no more. I can turn this whole place into an ocean of fire."
1004302-183 = "That's easy for me to do!"
1004302-184 = "Huh? You don't want that?!"
1004302-185 = "But if you want me to..."
1004302-186 = "I can destroy everything!"
1004302-187 = "No? That's not it, either?"
1004302-190 = "Oh, this is so hard. I don't know what to do."
1004302-191 = "I guess your dream of a perfect summer with me requires something even more profound..."
1004302-192 = "My heart is full of happiness..."
1004302-193 = "Oh, my feelings are spilling everywhere!"
1004302-194 = "[s] \"O-Okay! Sure...!\""
1004302-195 = "Regardless of what I told her, I ended up surrounded by figurative landmines. I thought hard about what to do."
1004302-200 = "Then I had an idea."
1004302-201 = "[s] \"Right, Wakamo. There's something I want to do with you this summer!\""
1004302-202 = "Hm?"
1004302-206 = "This is where you work?"
1004302-207 = "You want to spend time with me here...?"
1004302-211 = "...Oh! "
1004302-212 = "Heeheehee. I see... No one can distract us from each other here..."
1004302-213 = "Yes! I'm ready for anything."
1004302-214 = "Okay, what is it? What would you like to do with me?"
1004302-220 = "Darling!"
1004302-221 = "I came up with a desperate plan to keep Wakamo in one place so she didn't run wild outside while twisting my words."
1004302-224 = "[ns] \"Let's cram work on this summer day, together!\""
1004302-228 = "Excuse me?"
1004302-229 = "[s15] \"You know, that's what best friends do together during summer. They work together.\"\n[s16] \"I have a lot of work piled up, so I thought maybe we could work on it together.\""
1004302-232 = "Huh? Um, that's..."
1004302-233 = "Are you sure that's good enough? "
1004302-234 = "Would that make a perfect memory for your special summer?"
1004302-235 = "[s] \"Of course. What matters is that we're spending time together!\""
1004302-239 = "Spending...time together... Just the two of us..."
1004302-240 = "O-Okay! I-I-If you say so...!"
1004302-246 = "Heeheehee! ♡"
1004302-248 = "And that was how I got to spend a very...special day with Wakamo."

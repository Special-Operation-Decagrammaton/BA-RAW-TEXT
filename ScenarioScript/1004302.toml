1004302-194 = "[s] \"งะ...งั้นเหรอ...!?\""
1004302-195 = "(คุณครูตกที่นั่งลำบาก และต้องครุ่นคิดอย่างหนัก เพราะไม่ว่าจะพูดถึงตัวเลือกใดออกมาก็หนีไม่พ้น#nการระเบิดทุกครั้ง...)"

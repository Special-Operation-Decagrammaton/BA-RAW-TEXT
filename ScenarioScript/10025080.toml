[translation]
10025080-1 = "第8話;可疑的黑影"
10025080-2 = "夜戶浦村．鬼岩礁上"
10025080-4 = "唔嗯……今天的霧特別濃啊。"
10025080-5 = "本來想嘗試一下師父教的磯釣技巧的說……"
10025080-6 = "……算了，總之先拍個照也好。"
10025080-7 = "以濃霧瀰漫的大海為背景按下快門，就能拍到適合當成預覽圖的神祕感的海景照……"
10025080-13 = "嗯……？#n那是什麼……？"
10025080-19 = "……船？"
10025080-26 = "……資料轉移也完成了！"
10025080-27 = "來，這樣就可以輕鬆管理出入港口的船隻紀錄和載貨明細了。"
10025080-28 = "哇，那麼大量的報告書，居然能整理得這麼清楚……"
10025080-29 = "真是幫大忙了，謝謝你！#n有了這個就能大大減少工作時間了。"
10025080-30 = "這不算什麼，別在意別在意～"
10025080-37 = "這個叫做APP……的東西該怎麼用？#n最近的新科技還真是複雜……"
10025080-39 = "比想像中還簡單，我下次再教你。"
10025080-40 = "話說，竟然三兩下就做出這麼複雜的APP……#n各位不是千年學園的學生的話，究竟是從哪所學園來的呢？"
10025080-41 = "這，這個嘛……只是偶然路過的程式設計師之類的……"
10025080-48 = "師父！大事不好了！"
10025080-50 = "……誰是你師父啊。"
10025080-52 = "所以呢，發生什麼事了？有人落海了嗎？"
10025080-53 = "不，不是的……我剛剛在「鬼岩礁」上拍到了奇怪的東西。"
10025080-54 = "……奇怪的東西？"
10025080-55 = "我不是已經說過很多次，那裡地勢陡峭非常危險，這種天氣不要靠近那裡了──"
10025080-56 = "可是村子裡就只有那塊礁石可以嘗試師傅教我的磯釣……"
10025080-57 = "總之，請看這張照片。#n這裡……拍到了奇怪的東西。"
10025080-63 = "……是船？"
10025080-64 = "這個造型以船來說倒是有點奇怪。海面上看起來好像有鐵箱漂浮。"
10025080-65 = "居然在霧這麼濃的日子出海……感覺有點危險呢。"
10025080-67 = "這就奇怪了。#n今天因為濃霧的關係，應該沒有船登記要出海才對……"
10025080-68 = "那，那這個是……"
10025080-75 = "……是「返魂之船」。"
10025080-76 = "「返魂之船」？"
10025080-77 = "沒錯，據說是「深處的存在」上岸時所搭的船。"
10025080-78 = "老夫在捕魚時也從遠處目睹過……#n但這麼近距離觀察還是第一次啊。"
10025080-79 = "根據村子的傳說，「深處的存在」會在滿月時上岸，用船裝走村民們獻上的祭品，#n並賜予村民相應的回報。"
10025080-81 = "如果對祭品感到滿意……#n便會把獻上祭品的人帶回海中，將其變成與自己相同的「深處的存在」……"
10025080-82 = "噫，噫噫……"
10025080-88 = "[ns]「……沒有想過要跟著那艘船嗎？」"
10025080-89 = "說什麼傻話！明知靠近會被帶走還跟過去！？"
10025080-90 = "曾有一些按捺不住好奇心而追趕「返魂之船」的人，卻從來沒有人回到村子裡過。"
10025080-91 = "因此才被稱為禁忌。#n若是隨意靠近，就勢必要付出相應的代價。"
10025080-92 = "而這片大海……無法脫離禁忌和恐懼的支配。"
10025080-98 = "[ns]「……都子怎麼看呢？」"
10025080-99 = "我認為……"
10025080-100 = "那看起來像是人造的船隻。"
10025080-101 = "……人造的船隻？你說「返魂之船」？"
10025080-102 = "啊，不，這個……我沒有要否定村子傳說的意思，不過……"
10025080-103 = "要說這艘船是深淵中超乎想像的神祕存在打造的船隻，疑點實在過多。"
10025080-104 = "舉例來說，在船舷處的欄杆……"
10025080-105 = "乘客若是人類的話，為了避免落水則必須要有護欄。#n然而，對於能在水中來去自由的「深處的存在」來說，真的有設立的必要嗎？"
10025080-106 = "難道他們只是沒有護欄就會從船上墜落，這種程度的存在嗎？"
10025080-107 = "此外，這個看起來像艦橋的結構……只在水面航行倒不成問題，#n但若是潛入海底，勢必會立刻因水的阻力而出現損傷。"
10025080-108 = "然而這個造型複雜的艦橋仍然維持著完好的形狀，#n這就代表這艘船很可能並不會潛入海中。"
10025080-109 = "綜上所述，我認為這並不是「深處的存在」，而是與我們相同的人類所搭乘的船。"
10025080-115 = "…………"
10025080-116 = "有道理。#n聽你這麼一說，看起來確實有點像駁船……"
10025080-121 = "如果這裡是艦橋的話……那這邊是用來載貨的起重機嗎？"
10025080-122 = "這裡的箱子是不是「Red Hook Express」的貨櫃？"
10025080-123 = "看來是呢……我們為何會對這艘普通的船充滿恐懼、退避三舍呢？"
10025080-127 = "……因為無知。"
10025080-128 = "無知使人盲目，而盲目會無限放大恐懼。"
10025080-129 = "老夫們一直以來都受制於恐懼，以至於從未試圖探究、觀察、找出傳說的真相。"
10025080-130 = "然而，若是有人要利用恐懼，妨礙村子裡的漁業……"
10025080-131 = "身為夜戶浦村的漁會會長，我絕不能容忍。"
10025080-132 = "是啊，可不能放任違法行為。"
10025080-138 = "那麼，有方法能夠驅逐那艘「返魂之船」──不，那艘身分不明的船隻嗎？"
10025080-139 = "這……"
10025080-141 = "哎呀，要驅逐不是很簡單嗎？"
10025080-142 = "管它是「返魂之船」還是「反重力推進船」，#n凡是要在水面上移動就必定存在推進器……"
10025080-143 = "只要華麗地給它咚哐一發，就會在海上動彈不得。"
10025080-144 = "之後只要登上船隻、調查內部不就行了嗎？"
10025080-146 = "不過，我們該怎麼引爆位在水中的推進器呢？"
10025080-148 = "這一點不用擔心。"
10025080-149 = "我們小隊中可是有一位能夠執行水中爆破任務[ruby=RABBIT2]的優秀先鋒。[/ruby]"
10025080-150 = "你們看，我就說可能會需要水中作戰用的裝備吧？"
10025080-151 = "嗯嗯，幸好沒有白穿那套俗氣的泳裝呢。"
10025080-152 = "……這套泳裝哪裡俗氣了啊！？"
10025080-153 = "算了，帶來的炸藥還有剩吧？"
10025080-154 = "C4還有40磅左右……這樣夠嗎？"
10025080-155 = "很夠了。#n有這麼多的話，區區「返魂之船」想炸到天上都沒問題。"
10025080-156 = "……都子，請許可作戰。"
10025080-158 = "允許進行。"
10025080-159 = "準備就緒後，請RABBIT2從水中接近目標，並炸毀推進器。"
10025080-160 = "其他隊員則[ruby=小型充氣艇]於IBS待[/ruby]命。#n配合RABBIT2引爆的時機進行接近與登船！"
10025080-162 = "了解！"
10025080-169 = "之前戰鬥的時候也有這種感覺，你們該不會……"
10025080-170 = "各位也許會覺得有些可疑，不過請放心。"
10025080-172 = "我們……只是偶然路過的觀光客罷了。"

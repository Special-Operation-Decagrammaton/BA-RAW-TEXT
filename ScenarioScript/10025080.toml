[translation]
10025080-1 = "Episode 8; A Suspicious Shadow"
10025080-2 = "Devil's Reef, Yatoura Village"
10025080-4 = "Hm... Fog's thick today."
10025080-5 = "I wanted to practice my new fishing skills here..."
10025080-6 = "...But with weather like this, there's one thing I've gotta do first..."
10025080-7 = "Just got to line up this shot... With the sea and the fog, it'll be the perfect creepy thumbnail for my next..."
10025080-13 = "Huh? What's that?"
10025080-19 = "A ship...?"
10025080-26 = "...And that last step ensures your data is clean!"
10025080-27 = "There you have it, an easy way to track ship traffic and cargo records."
10025080-28 = "Wow... It usually takes hours to finish this report..."
10025080-29 = "Thanks for the help! This'll save us loads of time on paperwork."
10025080-30 = "It was a piece of cake. All in a day's work."
10025080-37 = "This, er, app thingy... How do I start it up again? Newfangled technology..."
10025080-39 = "I'll go over it with you later. It's not that hard!"
10025080-40 = "I can't believe you whipped up an app like this in the blink of an eye... You're not from Millennium Science School, are you?"
10025080-41 = "Ah, w-well... Let's just say I'm a wandering app developer..."
10025080-48 = "Master! We got a problem! A big problem!"
10025080-50 = "Who're you calling master?"
10025080-52 = "And what're you hollering about? Did someone fall into the sea?"
10025080-53 = "No, nothing like that... I got some footage of something real weird up on Devil's Reef!"
10025080-54 = "You were on Devil's Reef?"
10025080-55 = "Didn't I tell you to stay away from there? You're lucky you didn't trip and break your dang ankle. And in this weather..."
10025080-56 = "But the top of the reef gives me the best camera angle in the whole village. And besides, I wanted to try some tidal fishing..."
10025080-57 = "Anyway, please, take a look! I was trying to get a shot of the sea, and there was something...strange..."
10025080-63 = "What's that? A ship?"
10025080-64 = "The design is pretty unusual. It's almost like a metal box floating on the water."
10025080-65 = "In this thick fog, who would take a ship out? And so close to the reef..."
10025080-67 = "Now that is weird. Thanks to the low visibility, no ships left port today..."
10025080-68 = "Th-Then, could this be..."
10025080-75 = "That's the Stygian Ship."
10025080-76 = "The Stygian Ship?"
10025080-77 = "Yes. They say it's the cursed ship of the Deep Ones."
10025080-78 = "I've seen it in the distance, on foggy morning fishing trips, but...I never saw it caught in a photo before..."
10025080-79 = "Legend has it the Deep Ones come ashore on a full moon to collect offerings from the village. If they're pleased, they bless us with abundance..."
10025080-81 = "And if the offering is especially pleasing... Then they take the person who gave it and make them into a Deep One, too..."
10025080-82 = "E-Eeek..."
10025080-88 = "[ns] \"Have you ever seen it up close?\""
10025080-89 = "And why would I want to do that? I'm in no hurry to get dragged down to the depths!"
10025080-90 = "Every once in a while, you hear about someone who got it in their head to take a closer look, but none of them's ever returned..."
10025080-91 = "Some things are taboo for a reason. If you break the rules, you pay the price."
10025080-92 = "And this sea...is rife with taboos and terror..."
10025080-98 = "[ns] \"What do you think, Miyako?\""
10025080-99 = "It seems to me..."
10025080-100 = "...that this ship was made by people, not monsters."
10025080-101 = "Made by people? The Stygian Ship?"
10025080-102 = "I mean no disrespect to your beliefs, of course..."
10025080-103 = "But there are too many things I can't ignore about this ship that make no sense for the Deep Ones."
10025080-104 = "For example, look at this railing."
10025080-105 = "Obviously you need railing to prevent people from falling into the water. But why would the Deep Ones, who live underwater, need such railing?"
10025080-106 = "Wouldn't it be better for them to remove the railing, like the dock here in town, so it's easier to load and unload the ship?"
10025080-107 = "And look at this structure here... If this ship were underwater, it would create too much drag. So much drag that I think it would be torn off..."
10025080-108 = "The fact that the structure is still intact tells me that this ship probably doesn't spend any time underwater."
10025080-109 = "I have to conclude that this is not a vessel for creatures that live underwater, but for people who live on land."
10025080-115 = "..."
10025080-116 = "Huh. Now that you point it out, it looks like someone decorated a barge..."
10025080-121 = "So if that's the bridge, then...this here would be a crane, right?"
10025080-122 = "Look at that container. Isn't that from Red Hook Express?"
10025080-123 = "It is... Why have we been so scared of a plain old boat this whole time?"
10025080-127 = "Because of ignorance!"
10025080-128 = "Ignorance blinds you, and when you're blinded, you get scared."
10025080-129 = "We were so scared we didn't even try to figure out the truth. We blocked up our ears and stuck our heads in the sand."
10025080-130 = "But if someone's taking advantage of our fear and getting in the way of our livelihood..."
10025080-131 = "I won't take this sitting down!"
10025080-132 = "Agreed. There's no way that ship is legal."
10025080-138 = "So, how do we apprehend this Stygian Ship... Rather, this unidentified vessel?"
10025080-139 = "Well..."
10025080-141 = "Oh, that's simple!"
10025080-142 = "I don't care if it's a Stygian Ship or an unidentified floating object. If it's moving through water, it has some kind of propeller."
10025080-143 = "It doesn't matter if the propeller's made of metal or tentacles. A well-placed bomb will stop 'em in their tracks."
10025080-144 = "Then we just need to hop aboard and give it a good search, right?"
10025080-146 = "Okay, but even if we had a bomb on hand, how are we going to get it there?"
10025080-148 = "You let us worry about that."
10025080-149 = "We have a crack point woman who can pull off an underwater op like this in her sleep."
10025080-150 = "See! I told you I'd need all this gear!"
10025080-151 = "Yeah. Thank goodness you packed that tacky swimsuit."
10025080-152 = "It is NOT tacky!"
10025080-153 = "Anyway! Do we have enough explosives for this job?"
10025080-154 = "I've got about 40 pounds of C4... What'cha think?"
10025080-155 = "That should be enough to blow them sky high, even if they are gods or spirits or what-have-you."
10025080-156 = "Squad leader, I need your authorization for this operation."
10025080-158 = "Authorized."
10025080-159 = "RABBIT 2 will approach the ship using underwater thrusters and disable the vessel's propulsion system."
10025080-160 = "Everyone else, we'll make our approach in an IBS and board as soon as their propulsion is disabled!"
10025080-162 = "Understood!"
10025080-169 = "When we were fighting the other night, I couldn't help but notice you girls—"
10025080-170 = "I know we must look suspicious to you after all this."
10025080-172 = "But no matter what it looks like...we're just some tourists who happened to be in the right place at the right time."

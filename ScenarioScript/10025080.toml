[translation]
10025080-1 = "ตอนที่ 8;เงาต้องสงสัย"
10025080-2 = "บนแนวปะการังยักษ์ หมู่บ้านยาโตอูระ"
10025080-4 = "อืม... วันนี้หมอกลงหนาเป็นพิเศษเลยนะ"
10025080-5 = "ว่าจะออกมาฝึกสกิลตกปลาที่โขดหินตามที่ท่านอาจารย์สอนมาเมื่อวานสักหน่อยแท้ๆ..."
10025080-6 = "...แต่อากาศแบบนี้ก็คงถ่ายวิดีโอได้บรรยากาศไปอีกแบบละเนอะ"
10025080-7 = "ถ้าถ่ายฉากหลังของทะเลที่มีหมอกหนาทึบไว้ คงเอาไปทำภาพปกวิดีโอที่เต็มไปด้วยบรรยากาศน่า#nลึกลับๆ ได้..."
10025080-13 = "หืม? นั่นมันอะไรน่ะ...?"
10025080-19 = "เรือเหรอ...?"
10025080-26 = "...แค่นี้ก็ทดสอบข้อมูลสำเร็จ!"
10025080-27 = "เอาละ ทีนี้ก็ใช้สิ่งนี้จัดการบันทึกและประวัติการขนส่งของเรือที่ออกจากท่าได้อย่างง่ายดายแล้ว"
10025080-28 = "ว้าว รายงานซับซ้อนถูกจัดใหม่จนตรวจดูได้ง่ายๆ เลย..."
10025080-29 = "ขอบคุณที่มาช่วยเรื่องเอกสารนะคะ! แบบนี้น่าจะลดงานลงไปได้เยอะเลยค่ะ"
10025080-30 = "ไม่ใช่เรื่องยากอะไรหรอกนะ ไม่ต้องขอบใจกันขนาดนั้นหรอก~"
10025080-37 = "แอปนี้มัน... ใช้งานยังไงเนี่ย? ฉันไม่ถนัดกับเทคโนโลยีใหม่ๆ เลย..."
10025080-39 = "ไว้ฉันจะสอนใช้ให้นะคะ มันใช้ง่ายกว่าที่คิดอีกค่ะ"
10025080-40 = "จะว่าไป คุณสร้างแอปพลิเคชันที่ดูซับซ้อนแบบนี้ในเวลาเพียงชั่วพริบตาเลย... ถ้าไม่ได้เป็นนักเรียน#nโรงเรียนมิลเลเนียม แล้วพวกคุณมาจากโรงเรียนไหนกันเหรอคะ?"
10025080-41 = "อะ... เอ่อ... จะมองว่าเราเป็นโปรแกรมเมอร์ที่ได้มาเจอกันโดยบังเอิญก็ได้นะ..."
10025080-48 = "ท่านอาจารย์! เกิดเรื่องใหญ่แล้ว เป็นเรื่องแล้ว!"
10025080-50 = "... ใครเป็นอาจารย์กันไม่ทราบ"
10025080-52 = "แล้วมีเรื่องอะไรล่ะนั่น? มีใครตกลงไปในทะเลหรือไง?"
10025080-53 = "ไม่ใช่ ไม่ใช่อย่างนั้นหรอก... แต่ระหว่างทางที่ขึ้นไปที่ <แนวปะการังยักษ์> เมื่อกี้ ฉันถ่ายบางอย่างที่#nน่าสงสัยได้น่ะ"
10025080-54 = "ขึ้นไปบนแนวปะการังยักษ์งั้นเหรอ...?"
10025080-55 = "แนวปะการังยักษ์มันทั้งลาดชัน ทั้งอันตราย ฉันพูดเตือนไปไม่รู้กี่รอบแล้วนี่นาว่าอย่าไปที่นั่นในสภาพ#nอากาศแบบนี้..."
10025080-56 = "แต่ถ้าไม่ใช่ตรงนั้น ก็ไม่มีที่ไหนในหมู่บ้านที่จะตกปลาบนโขดหินได้แล้วนี่..."
10025080-57 = "แต่เรื่องนั้นเอาไว้ก่อน ช่วยดูรูปนี่ก่อนเถอะ ตรงนี้ไง... ฉันเก็บภาพอะไรแปลกๆ ไว้ได้"
10025080-63 = "...นั่นใช่เรือหรือเปล่า?"
10025080-64 = "รูปร่างมันแปลกเกินกว่าจะเป็นเรือได้นะ เหมือนกับเป็นกล่องเหล็กที่ลอยอยู่ในทะเลมากกว่าอีก"
10025080-65 = "เอาเรือออกในวันที่หมอกลงจัดแบบนี้ มันดูอันตรายนะคะ"
10025080-67 = "แต่ก็แปลกจังเลยค่ะ วันนี้สภาพอากาศไม่เอื้ออำนวย แล้วก็ไม่มีเรือที่แจ้งว่าจะออกจากท่าเลยนี่นา..."
10025080-68 = "ถะ... ถ้างั้นหรือว่า..."
10025080-75 = "...นี่มัน <เรือส่งวิญญาณ> สินะ"
10025080-76 = "เรือส่งวิญญาณเหรอคะ?"
10025080-77 = "ใช่ ว่ากันว่าเป็นเรือที่ <ตัวตนแห่งห้วงลึก> นั่งเมื่อจะขึ้นฝั่งน่ะ"
10025080-78 = "ตอนออกไปหาปลา ฉันจำได้ว่าเคยเห็นจากไกลๆ อยู่บ้าง... แต่นี่เป็นครั้งแรกเลยละที่ได้เห็นจากรูปที่#nถ่ายในระยะใกล้แบบนี้"
10025080-79 = "ตามตำนานของหมู่บ้านแล้ว <ตัวตนแห่งห้วงลึก> จะขึ้นฝั่งในทุกๆ 15 วัน และในวันนั้นผู้คนในหมู่บ้าน#nก็จะเอาเครื่องสังเวยไปใส่ไว้ในเรือเพื่ออธิษฐานขอความอุดมสมบูรณ์และความมั่งคั่ง"
10025080-81 = "ว่ากันว่าถ้าพวกเขาถูกใจเครื่องสังเวยมากๆ... คนที่เอาเครื่องสังเวยนั้นไปให้ก็จะถูกลากลงไปในทะเล แล้วโดนทำให้เป็น <ตัวตนแห่งห้วงลึก> เหมือนพวกเขาด้วย..."
10025080-82 = "ฮะ... เฮือก..."
10025080-88 = "[ns] \"แล้วเคยเข้าไปใกล้ๆ เรือลำนั้นไหม?\""
10025080-89 = "ให้เข้าไปใกล้ๆ เรือที่ลากคนบนบกลงไปในทะเลงั้นเหรอ? จะบ้าหรือเปล่า!"
10025080-90 = "เมื่อก่อนเคยมีชาวประมงที่ออกไล่ตามเรือส่งวิญญาณเพราะความอยากรู้อยากเห็นด้วย แต่ก็ไม่มีใคร#nที่กลับมาถึงหมู่บ้านเลย"
10025080-91 = "ไม่ทำตามข้อห้ามก็เป็นอย่างนี้ละ ถ้าคิดจะฝืนข้อห้าม ก็ต้องรู้ด้วยว่ามันมีราคาที่ต้องจ่าย"
10025080-92 = "และทะเลแห่งนี้... ก็เป็นพื้นที่ที่ปกครองด้วยข้อห้ามและความกลัว"
10025080-98 = "[ns] \"...มิยาโกะคิดว่ายังไงบ้าง?\""
10025080-99 = "ฉันว่า..."
10025080-100 = "มันเหมือนเรือขนาดใหญ่ที่มนุษย์สร้างขึ้นนะคะ"
10025080-101 = "...เรือที่มนุษย์สร้างขึ้น? <เรือส่งวิญญาณ> นี่น่ะเหรอ?"
10025080-102 = "อ่า... ฉะ... ฉันไม่ได้จะปฏิเสธความเห็นของชาวบ้านทุกคนที่นี่หรอกนะคะ..."
10025080-103 = "แต่มันมีหลายจุดที่ไม่เป็นธรรมชาติสำหรับเรือที่สร้างโดยสิ่งมีชีวิตลึกลับในห้วงลึกที่เกินกว่ามนุษย์จะ#nจินตนาการได้น่ะค่ะ"
10025080-104 = "ถ้าให้ยกตัวอย่างก็เช่นราวจับที่อยู่ฝั่งนี้"
10025080-105 = "ถ้าเป็นเรือทั่วไป ก็คงเป็นธรรมดาที่จะติดตั้งราวจับไว้ให้คนไม่ตกลงไปในน้ำ แต่สำหรับ <ตัวตนแห่งห้วงลึก> ที่ลอยไปมาในน้ำได้อย่างอิสระแล้ว พวกเขาต้องใช้ราวจับนี่เหรอคะ?"
10025080-106 = "ในทางกลับกัน ถ้าพวกเขาอยากขึ้นลงเรือได้ง่ายๆ ยิ่งกลับต้องเอาสิ่งปลูกสร้างเพื่อความปลอดภัย#nอย่างเช่นท่าเรือออกมากกว่า"
10025080-107 = "ไหนจะสิ่งปลูกสร้างที่ดูคล้ายหอบังคับการเรือตรงนี้อีก... ถึงมันจะไม่เป็นปัญหาในการเดินเรือบนผิวน้ำ แต่หากอยู่ใต้น้ำก็น่าจะเจอแรงดันจนเสียหายได้ง่ายๆ เลยนะคะ"
10025080-108 = "ถึงจะอย่างนั้น แต่การที่หอบังคับการเรือที่โครงสร้างซับซ้อนแบบนั้นยังคงอยู่ในสภาพดี ก็แปลว่าเรือลำนี้แล่นอยู่เหนือน้ำมากกว่าลงไปอยู่ใต้น้ำค่ะ"
10025080-109 = "เพราะฉะนั้นแล้วฉันก็เลยไม่คิดว่าเรือนี้คือเรือของ <ตัวตนแห่งห้วงลึก> แต่เป็นเรือของคนที่อาศัยอยู่#nบนบกค่ะ"
10025080-115 = "........."
10025080-116 = "นั่นสินะคะ พอบอกอย่างนั้น มันก็ดูเหมือนเป็นเรือมีรูปร่างแปลกประหลาดขึ้นมาจริงด้วย..."
10025080-121 = "ถ้าตรงนี้คือหอบังคับการเรือ... งั้นตรงนี้ก็คือเครนที่ใช้บรรทุกของหรือเปล่านะ?"
10025080-122 = "กล่องที่อยู่ตรงนี้คือตู้สินค้าของ <เรด ฮุก เอ็กซ์เพรส> ไม่ใช่เหรอ?"
10025080-123 = "...จริงด้วย ที่ผ่านมาทำไมพวกเราถึงกลัวและเอาแต่จะหนีเรือธรรมดาๆ ลำนี้นะ?"
10025080-127 = "...ก็เพราะความไม่รู้ไง"
10025080-128 = "ความไม่รู้ทำให้คนตาบอด และยิ่งตาบอด ความกลัวก็จะยิ่งทวีคูณขึ้น"
10025080-129 = "ที่ผ่านมาเราถูกครอบงำด้วยความกลัว แล้วก็ไม่ได้อยากพิสูจน์ว่าข่าวลือนั่นเป็นจริงหรือเปล่า เราทั้งไม่อยากรู้ ไม่อยากเห็น แล้วก็ไม่อยากรับฟังด้วย"
10025080-130 = "แต่หากมีใครที่ไหนสวมหน้ากากแห่งความกลัวแล้วมาขัดขวางการจับกุ้งละก็..."
10025080-131 = "ในฐานะหัวหน้าหมู่บ้านชาวประมงยาโตอูระ ฉันยอมไม่ได้เด็ดขาด"
10025080-132 = "ใช่ ใครทำผิดกฎหมายจะต้องโดนปราบปราม"
10025080-138 = "แล้วเรามีวิธีปราบเรือส่งวิญญาณ... ไม่สิ เรือปริศนาลำนั้นไหม?"
10025080-139 = "เรื่องนั้นมันก็..."
10025080-141 = "วิธีกำจัดมันก็ง่ายๆ ไม่ใช่เหรอ?"
10025080-142 = "ไม่ว่าจะเป็น <เรือส่งวิญญาณ> หรือ <เรือต้านแรงโน้มถ่วง> ก็เถอะ ถ้ามันลอยอยู่เหนือน้ำได้ก็แสดงว่า#nมันมีตัวขับเคลื่อนอยู่..."
10025080-143 = "และต่อให้ตัวขับเคลื่อนนั้นเป็นประเภทไหน ถ้าเจอระเบิดแรงๆ ใบพัดก็คงทำงานต่อไม่ได้แล้ว"
10025080-144 = "และในระหว่างนั้นเราก็ขึ้นเรือไปตรวจสอบข้างในกันก็ได้ยังไงล่ะ"
10025080-146 = "แต่เรือลำนั้นไม่มาเข้าอู่เลย แล้วเราจะระเบิดตัวขับเคลื่อนของเรือที่อยู่แต่ในน้ำได้ยังไงล่ะคะ?"
10025080-148 = "เรื่องนั้นไม่ต้องกังวลไปหรอก"
10025080-149 = "ก็กองทหารของเรามี RABBIT 2 พลชี้เป้าฝีมือยอดเยี่ยมที่ทำภารกิจระเบิดในน้ำได้อยู่นี่นะ"
10025080-150 = "เห็นไหมล่ะ ก็บอกแล้วว่าเราอาจต้องใช้อุปกรณ์ดำน้ำก็ได้"
10025080-151 = "นั่นสิ แต่ก็โชคดีนะที่ชุดว่ายน้ำเชยๆ นี้ได้ใช้ประโยชน์ขึ้นมา"
10025080-152 = "ไม่ได้เชยสักหน่อย!!"
10025080-153 = "เอาเถอะๆ ระเบิดที่เราเอามาด้วยเหลือพอหรือเปล่าล่ะ?"
10025080-154 = "C4 มีเหลือประมาณ 40 ปอนด์... แค่นี้ก็น่าจะพอเนอะ?"
10025080-155 = "แค่นี้ก็เพียงพอแล้ว ถ้ามีเยอะขนาดนั้นละก็ อย่าว่าแต่ตัวตนแห่งห้วงลึกเลย วิญญาณที่ล่องลอยในนรก#nก็น่าจะโดนระเบิดจนไม่เหลือซากเหมือนกัน"
10025080-156 = "...หัวหน้ากอง อนุมัติปฏิบัติการนี้ด้วย"
10025080-158 = "อนุมัติค่ะ"
10025080-159 = "ทันทีที่เตรียมทุกอย่างเสร็จ ให้ RABBIT 2 ใช้ เครื่องไอพ่นใต้น้ำเพื่อเข้าถึงเรือปริศนา จากนั้นก็ไปปิด#nระบบขับเคลื่อนของเรือนั้นค่ะ"
10025080-160 = "ส่วนสมาชิกที่เหลือให้ขึ้นเรือบรรทุกอากาศอัดขนาดเล็กไปอยู่ใกล้ๆ เรือปริศนา แล้วขึ้นเรือไปสำรวจ#nทันทีที่ระบบขับเคลื่อนเรือถูกปิดค่ะ"
10025080-162 = "รับทราบ!"
10025080-169 = "ตอนสู้กันก่อนหน้านี้ฉันก็รู้สึกได้นะว่าพวกเธอ... ไม่ธรรมดาจริงๆ"
10025080-170 = "ถึงจะดูน่าสงสัยไปบ้าง แต่ก็อย่าใส่ใจเลยค่ะ"
10025080-172 = "พวกฉันก็แค่... นักท่องเที่ยวจิตใจดีที่บังเอิญผ่านมาแถวนี้เท่านั้นค่ะ"

[translation]
1001502-1 = "อาริสึเควส ~ จุดเริ่มต้นการผจญภัย ~"
1001502-2 = "เขตเมืองในมิลเลเนียม"
1001502-3 = "(คุณครูรู้สึกกังวลแบบไม่รู้สาเหตุเลยไปที่ถนนแถวมิลเลเนียม)"
1001502-7 = "(ได้พบกับอาริสึที่เดินอยู่ตรงถนนนั้นพอดี)"
1001502-8 = "......คุณครู?"
1001502-9 = "[s1] \"อาริสึ ดีแล้วที่ไม่ได้เป็นอะไร\"\n[s2] \"ครูเป็นห่วงเลยมาหา\""
1001502-10 = "ป่าปั๊มป่า~ ปั๊ม! ป่าปั๊มป่าปั๊ม!"
1001502-11 = "ป่าปั๊มป่า~ ปั๊ม! ป่าปั๊มป่าปั๊ม!"
1001502-12 = "[s3] \"?!\"\n[s4] \"โฆษณาเหรอ?!\""
1001502-13 = "คุณครูเข้าร่วมปาร์ตี้แล้วสินะคะ"
1001502-14 = "คุณครูเข้าร่วมปาร์ตี้แล้วสินะคะ"
1001502-15 = "ในที่สุดผู้กล้าก็มีสหายแล้ว ฉันมีปาร์ตี้แล้วค่ะ"
1001502-16 = "[s5] \"เปล่า ครูไม่เคยบอกว่าจะเข้าร่วมนะ\"\n[s6] \"ผู้กล้า...นี่ตำแหน่งเหรอ...\""
1001502-17 = "แม้ว่าคุณครูจะไม่ได้ช่วยในการต่อสู้ ไม่มีอาวุธและมีแค่ 1 HP ด้วยค่ะ"
1001502-18 = "แม้ว่าคุณครูจะไม่ได้ช่วยในการต่อสู้ ไม่มีอาวุธและมีแค่ 1 HP ด้วยค่ะ"
1001502-19 = "ถึงอย่างนั้นก็ไม่เป็นไรค่ะ ถึงคุณครูจะไม่มีประโยชน์ในการต่อสู้ แต่ทำหน้าที่ให้ความช่วยเหลือสหายได้ค่ะ"
1001502-20 = "[s7] \"ฝ่ายสนับสนุนสินะ\"\n[s8] \"เป็นฝ่ายรักษางั้นเหรอ\""
1001502-21 = "ไม่ใช่ค่ะ มาสคอตค่ะ"
1001502-22 = "ไม่ใช่ค่ะ มาสคอตค่ะ"
1001502-23 = "คุณครูไม่ได้ช่วยอะไรในการต่อสู้เลย แต่อยู่ในปาร์ตี้เพื่อทำให้อารมณ์ดีค่ะ"
1001502-24 = "[s] \"ถึงอย่างนั้นก็มีความสามารถโดดเด่นสินะ...\""
1001502-25 = "ไม่มีหรอกค่ะ แค่ทำให้อารมณ์ดีเฉยๆ ค่ะ"
1001502-26 = "[s9] \"....\"\n[s10] \".......\""
1001502-27 = "แต่ฉันคิดว่านี่เป็นความสามารถที่ยอดเยี่ยมมากของคุณครูนะคะ"
1001502-28 = "แต่ฉันคิดว่านี่เป็นความสามารถที่ยอดเยี่ยมมากของคุณครูนะคะ"
1001502-29 = "หลักฐานคือตอนนี้อาริสึอารมณ์ดีขึ้นแล้วล่ะค่ะ"
1001502-30 = "การทำให้สมาชิกปาร์ตี้มีความสุข ไม่ใช่ว่าใครก็ทำได้นะคะ"
1001502-31 = "เพราะแบบนั้น มันถึงได้สุดยอดมากๆ เลยล่ะค่ะ คุณครูยอดเยี่ยมมากค่ะ"
1001502-32 = "[s] \"ขะ... ขอบคุณนะ\""
1001502-33 = "ลงชื่อปาร์ตี้เสร็จแล้ว ถ้างั้นตอนนี้ได้เวลาออกผจญภัยแล้วค่ะ"
1001502-34 = "นับแต่นี้ไปไม่ว่าจะเจออะไร..."
1001502-35 = "......"
1001502-37 = "...ก็แค่เดินหน้าต่อไปค่ะ"
1001502-38 = "[s] \"แค่เดินหน้าต่อไปเหรอ\""
1001502-39 = "ใช่ค่ะ ก่อนอื่นก็เดินหน้าค่ะ การผจญภัยของผู้กล้าเริ่มต้นเดินหน้าค่ะ"
1001502-40 = "[s11] \"แบบนี้มันก็แค่เดินเล่นนี่นา\"\n[s12] \"...งั้นก็ไปแบบสบายๆ ดีกว่า\""
1001502-45 = "(คุณครูเดินเล่นไปกับอาริสึที่ดูจะตื่นเต้นแปลกๆ)"

[translation]
1001502-1 = "Aris' Quest: The Adventure Begins"
1001502-2 = "The Streets of Millennium"
1001502-3 = "I went to the streets of Millennium out of concern."
1001502-7 = "It didn't take me long to find Aris walking down the street."
1001502-8 = "Sensei?"
1001502-9 = "[s1] \"Aris. I'm glad you're okay.\"\n[s2] \"I was worried about you.\""
1001502-10 = "Ba-ba-ba-bam! Bam bam!"
1001502-11 = "Ba-ba-ba-bam! Bam bam!"
1001502-12 = "[s3] \"...?!\"\n[s4] \"Was that a fanfare?!\""
1001502-13 = "Sensei has joined the party."
1001502-14 = "Sensei has joined the party."
1001502-15 = "The hero has finally gained an ally. Now she has a party of her own."
1001502-16 = "[s5] \"Wait, I never agreed to party up.\"\n[s6] \"Hero...? Are we doing this now?\""
1001502-17 = "But you are useless in battle, Sensei. You do not have any equipment and you only have one HP."
1001502-18 = "But you are useless in battle, Sensei. You do not have any equipment and you only have one HP."
1001502-19 = "But that is okay. You do not have to be good in battle to be helpful to your allies."
1001502-20 = "[s7] \"So I'm the support role.\"\n[s8] \"Does that mean I'm a healer?\""
1001502-21 = "No. You are the mascot."
1001502-22 = "No. You are the mascot."
1001502-23 = "You have no use in battle, but you make the rest of the party happy."
1001502-24 = "[s] \"Don't I have any kind of skills...?\""
1001502-25 = "No. You cheer people up. That is it."
1001502-26 = "[s9] \"...\"\n[s10] \"...!\""
1001502-27 = "It is still a good skill to have."
1001502-28 = "It is still a good skill to have."
1001502-29 = "I am feeling much better now that you are here. That is proof enough."
1001502-30 = "Not everyone can make their party members this happy."
1001502-31 = "That is what makes you so amazing, Sensei."
1001502-32 = "[s] \"Th-Thanks, I think.\""
1001502-33 = "Now that you are registered to the party, it is time to set off on an adventure."
1001502-34 = "So, from now on, we will be..."
1001502-35 = "..."
1001502-37 = "...moving forward."
1001502-38 = "[s] \"Is that all?\""
1001502-39 = "Yes. We will move forward. A hero's adventure always begins by moving forward."
1001502-40 = "[s11] \"Pretty sure that's just called walking.\"\n[s12] \"...I guess we should get started then.\""
1001502-45 = "I took a leisurely stroll with Aris, who seemed oddly excited."

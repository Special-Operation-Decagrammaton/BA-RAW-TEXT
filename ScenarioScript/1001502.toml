[translation]
1001502-1 = "愛麗絲任務～冒險的開始～"
1001502-2 = "千年．市區"
1001502-3 = "（總覺得有點擔心，就到千年附近看看）"
1001502-7 = "（很快就找到了正搖搖晃晃走著的愛麗絲）"
1001502-8 = "……老師？"
1001502-9 = "[s1] 「愛麗絲，看起來很順利呢。」\n[s2] 「我有點擔心，所以就來看看你了。」"
1001502-10 = "乓啪喀乓──！"
1001502-11 = "乓啪喀乓──！"
1001502-12 = "[s3] 「！？」\n[s4] 「突然吹奏入場的音樂！？」"
1001502-13 = "與老師會合了。"
1001502-14 = "與老師會合了。"
1001502-15 = "勇者獲得了同伴，組成了隊伍。"
1001502-16 = "[s5] 「原來如此。好，我們一起加油吧！」\n[s6] 「愛麗絲不知道什麼時候當上了勇者……！」"
1001502-17 = "然而，老師在戰鬥中幫不上忙。因為既沒有裝備武器，體力也只有1左右而已。"
1001502-18 = "然而，老師在戰鬥中幫不上忙。因為既沒有裝備武器，體力也只有1左右而已。"
1001502-19 = "就算這樣也沒有關係。#n老師雖然不能直接對戰鬥產生影響，作為同伴也是相當有幫助的存在。"
1001502-20 = "[s7] 「也就是擔任輔助的角色對吧。」\n[s8] 「我是補師對吧。」"
1001502-21 = "不對，是吉祥物。"
1001502-22 = "不對，是吉祥物。"
1001502-23 = "是雖然在戰鬥中完全沒有幫助，但只要待在隊伍裡就能提升士氣的角色。"
1001502-24 = "[s] 「在故事的後期，會發現其實有著什麼重要的能力之類的……」"
1001502-25 = "沒有那種東西，就只是會讓狀態提升而已。"
1001502-26 = "[s9] 「……」\n[s10] 「…………這樣啊。」"
1001502-27 = "但是，愛麗絲覺得這是很厲害的能力。"
1001502-28 = "但是，愛麗絲覺得這是很厲害的能力。"
1001502-29 = "證據就是，愛麗絲現在的心情非常好。"
1001502-30 = "能讓隊伍的夥伴產生幸福的感覺，這可不是每個人都能做到的。"
1001502-31 = "所以很厲害，老師真了不起。"
1001502-32 = "[s] 「謝，謝謝……」"
1001502-33 = "登錄隊伍完成。來吧，到了出發去冒險的時候了。"
1001502-34 = "至於接下來要做什麼嘛……"
1001502-35 = "……"
1001502-37 = "……總之，先前進吧。"
1001502-38 = "[s] 「總覺得剛才好像有點不太自然。」"
1001502-39 = "沒有那種事，總之就是前進。因為勇者的冒險都是從前進開始的。"
1001502-40 = "[s11] 「這個，難道只是在單純的散步……？」\n[s12] 「……那麼，我們就慢慢往前走吧。」"
1001502-45 = "（和比平時更雀躍的愛麗絲一起在街上散步）"

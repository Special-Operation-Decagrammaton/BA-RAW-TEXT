1001502-14 = "2;아리스;00;선생님이 파티에 합류했습니다.\n#2;greeting"
1001502-15 = "2;아리스;07;드디어 용사는 동료를 얻었습니다. 파티가 생겼습니다.\n#2;em;[반짝]"

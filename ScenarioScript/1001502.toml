1001502-18 = "2;아리스;00;하지만 선생님은 전투에 도움이 되지 않습니다. 무기도 장비하지 않았고 체력도 1 정도입니다."
1001502-19 = "2;아리스;07;그래도 괜찮습니다. 선생님은 전투엔 쓸모없지만 동료들에게 도움이 되는 역할이니까요.\n#2;em;[음표]"
1001502-20 = "[s7] \"서포터구나.\"\n[s8] \"힐러인가.\""
1001502-21 = "2;아리스;00;아뇨. 마스코트입니다."
1001502-22 = "2;아리스;00;아뇨. 마스코트입니다."
1001502-23 = "2;아리스;00;선생님은 전투에 전혀 도움이 되지 않지만 파티에 있으면 기분이 좋아지는 역할입니다."

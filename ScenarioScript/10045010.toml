[translation]
10045010-1 = "Episode 1;The Hyakkiyako Water Festival Begins!"
10045010-3 = "Hello, everyone! It's what you've all been waiting for!"
10045010-4 = "The greatest summer event hosted by the Hyakkiyako Festival Operations Department..."
10045010-5 = "...the opening of the one, the only, the Hyakkiyako Water Festival!"
10045010-9 = "Wow! Thank you everyone for the warm welcome, nyan!"
10045010-10 = "The Hyakkiyako Water Festival is a grueling adventure where 100 players will compete in various missions. And only one survivor will emerge victorious!"
10045010-11 = "The winner will walk away with some delicious prize money and a Momoyodou voucher for our exclusive menu!"
10045010-12 = "Wow, with perks like this, how will we even make a profit? Is this really okay for Momoyodou?"
10045010-13 = "It is, because we have each and every one of our wonderful customers to support us!"
10045010-18 = "And now...let me introduce one very special guest that will help us celebrate this momentous day!"
10045010-19 = "They're known for their tireless support of students all around Kivotos, the shining hope that emerges in the darkest of times!"
10045010-20 = "Sometimes stern, sometimes soft... Their name echoes throughout the city! You'd be hard pressed to find someone in Kivotos who DOESN'T know them..."
10045010-21 = "That's right, it's Schale's Sensei! Please give them a big round of applause!"
10045010-26 = "[ns] \"Uh... Hello, everyone. I'm [USERNAME].\""
10045010-27 = "Aw, Sensei! You forgot to say \"nyan\" at the end!"
10045010-28 = "[ns1] \"I'm Sensei, woof!\"\n[ns2] \"I'm Sensei, bark!\""
10045010-31 = "Wh-What happened to nyan?!"
10045010-32 = "Now then, who do you think will walk home with the trophy today, Sensei?"
10045010-33 = "[s] \"There are so many strong contenders, I can't pick just one!\""
10045010-34 = "That's right! Every single participant today is passionate and ready to take the win. Maybe that's why they're taking so long to get ready, heehee!"
10045010-35 = "Now, before the festivities begin, a quick word from our sponsor!"
10045010-36 = "Stay tuned, nyan!"
10045010-37 = "..."
10045010-38 = "...Phew, I'm pooped! Running a festival sure is hard work!"
10045010-39 = "[s] \"Shizuko! Your mic is still on...!\""
10045010-40 = "A-Ah! Teeheehee!"
10045010-41 = "I'm such a klutz, aren't I? Sorry, everyone!"
10045010-42 = "Everyone cheer for me, so I can keep my spirits high until the very end!"
10045010-43 = "Now, this time it's bye for real! Nyan!"
10045010-45 = "...The emcee seems very thoroughly prepared."
10045010-46 = "Huh? Didn't she make a huge mistake just now, though?"
10045010-47 = "Are you sure?"
10045010-48 = "Rather, it appears to be a deliberate move to emphasize her klutzy, yet lovable, character."
10045010-49 = "She appealed to the audience with a charm they won't quickly forget."
10045010-50 = "Shifting what may appear to be a mistake into a calculated net positive."
10045010-51 = "As expected of the idol of Momoyodou."
10045010-52 = "Whoa... I didn't catch any of that at all. Smart as usual, Kikyou."
10045010-53 = "But I have no intention of losing!"
10045010-54 = "Please direct your excessive competitive spirit to the many other, highly-skilled players here."
10045010-62 = "Truly! The ferocity of the competition has set my passion ablaze!"
10045010-63 = "Yes. We cannot afford to let our guard down."
10045010-65 = "Anyway, do you know what games we'll be playing?"
10045010-66 = "To encourage flexibility and improvisation, each game will be announced just before the match begins."
10045010-67 = "(...Although no amount of improvisation will be of assistance if the game involves swimming.)"
10045010-69 = "Soon after..."
10045010-71 = "The wait is finally over!"
10045010-72 = "What will be the inaugural game of the Hyakkiyako Water Festival?"
10045010-73 = "Sensei! Take us away!"
10045010-74 = "[ns] \"The first match of the Hyakkiyako Water Festival is...!\""
10045010-76 = "[log]Water Gun Gauntlet![/log]"
10045010-79 = "[ns3] \"The rules are simple! You get wet, you get eliminated!\"\n[ns4] \"If you step out of bounds, you're OUT!\""
10045010-82 = "It'll be a fierce beach battle with nowhere to run but towards each other! Only 30 participants will survive!"
10045010-83 = "Who will be the last ones standing?!"
10045010-84 = "[ns] \"Participants, please move to the beach immediately, nyan!\""
10045010-86 = "...Mentor's really hyped up for this, huh?"
10045010-87 = "Shall we proceed to the beach? I must evaluate the terrain and potential obstacles."
10045010-88 = "(...What a relief. Both my feet will stay on solid ground.)"
10045010-91 = "This beach...is way too open!"
10045010-92 = "Shall we push our backs together and shoot our guns in a circular trajectory as they do in the movies?!"
10045010-93 = "*sigh* Life is no movie, Yukari..."
10045010-94 = "Hahaha! I, for one, can hardly contain my excitement for Nagusa's full-power performance!"
10045010-98 = "My right arm isn't fully healed yet..."
10045010-99 = "...but I'll do my best."
10045010-100 = "For the seal has been lifted."
10045010-102 = "...That made me cringe. Please do not repeat that in front of others."
10045010-106 = "[ns] \"Oh, I see some familiar faces. Welcome!\""
10045010-107 = "Oh, oh! It is lovely to see you, Sensei!"
10045010-108 = "Will you be judging this match?"
10045010-109 = "[s] \"Yes! It's more fun to have a front row seat, right?\""
10045010-111 = "...A front row seat to your students dashing about in their swimwear?"
10045010-112 = "How very..."
10045010-113 = "[s5] \"You've misconstrued my intentions entirely!\"\n[s6] \"Fufu, you can think whatever you want!\""
10045010-116 = "Anyway, it looks like everyone's here now."
10045010-124 = "Now, are we READY?!"
10045010-125 = "Then let the first round of the Hyakkiyako Water Festival, Water Gun Gauntlet..."
10045010-126 = "[ns] \"...Commence!!\""
10045010-130 = "The Hyakkiyako Water Festival has finally begun! Who will survive the first round?!"

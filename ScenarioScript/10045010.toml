[translation]
10045010-1 = "第1話;開幕！百夜水上祭！"
10045010-3 = "大家好！終於等到這一刻了！"
10045010-4 = "由百鬼夜行的節慶營運管理部主辦的水上活動……！"
10045010-5 = "「百夜水上祭」華麗開幕！"
10045010-9 = "哇啊！感謝大家熱情的支持，喵喵！"
10045010-10 = "百夜水上祭是由100名選手完成各種任務，看誰能生存到最後的活動！"
10045010-11 = "優勝者將獲得鉅額獎金與百夜堂的商品券，還有百夜堂的特別限定菜單！"
10045010-12 = "咦，你說送這麼多，百夜堂不會虧本嗎？"
10045010-13 = "沒問題的！因為我有大家的支持呀……！"
10045010-18 = "接下來……為大家介紹擔任解說的特別來賓！"
10045010-19 = "日夜照顧無數學生的奇普托斯希望之光！"
10045010-20 = "時而嚴厲，時而溫柔……名聲響徹天際，如今想找到不認識他的人反而更難的──"
10045010-21 = "夏萊的老師！請大家以掌聲歡迎！"
10045010-26 = "[ns]「大，大家好。我是[USERNAME]。」"
10045010-27 = "啊啊，老師！不是說好要在後面加個「喵喵」來炒熱氣氛嗎！"
10045010-28 = "[ns1]「我是老師，汪汪！」\n[ns2]「我是老師，哐哐！」"
10045010-31 = "說好的喵喵呢……！？"
10045010-32 = "那麼，在老師的見證下！#n究竟誰能榮耀奪冠呢！"
10045010-33 = "[s]「參賽者們的實力都很強，實在很難預測呢！」"
10045010-34 = "據說選手們的熱情已經達到最高點！準備雖然稍微延遲，但也算是熱情的表現吧～"
10045010-35 = "那麼在準備完成前，先來看看贊助商的廣告！"
10045010-36 = "請不要轉台唷，喵喵！"
10045010-37 = "……"
10045010-38 = "……呼，好累。主持活動果然不簡單啊。"
10045010-39 = "[s]「靜子！麥克風還沒關……！」"
10045010-40 = "啊，啊啊！耶嘿～！"
10045010-41 = "靜子真是個冒失鬼，不小心就忘記關麥了！抱歉抱歉！"
10045010-42 = "還請大家繼續為靜子加油，讓我能撐到最後哦！"
10045010-43 = "那麼真的待會見了，喵喵！"
10045010-45 = "……流程乾淨俐落，看來準備得很周全呢。"
10045010-46 = "乾淨俐落？#n他剛才不是出糗了嗎？"
10045010-47 = "那並不是失誤。"
10045010-48 = "而是為了強調自己冒失人設的演出。"
10045010-49 = "既能炒熱氣氛，又能達到自我宣傳……"
10045010-50 = "把可能引起負面印象的因素，用一個演出自然化解。"
10045010-51 = "不愧是百夜堂的看板娘。"
10045010-52 = "哦……原來如此，我完全沒看出來耶。#n桔梗的腦袋果然很好。"
10045010-53 = "不過我可沒打算輸哦？"
10045010-54 = "那種競爭心就不必了。#n這裡除了我們以外，還有很多強者呢。"
10045010-62 = "確實是高手如雲……我都感覺到顫慄了！"
10045010-63 = "嗯，不能掉以輕心。"
10045010-65 = "話說，比賽項目是什麼？"
10045010-66 = "聽說每場比賽的項目都會在開始前公布。應該是想考驗應變能力吧。"
10045010-67 = "（……拜託不要跟游泳有關）"
10045010-69 = "不久之後……"
10045010-71 = "各位久等了！"
10045010-72 = "百夜水上祭的第一場比賽已經準備就緒！#n究竟會是什麼項目呢？"
10045010-73 = "老師！請為我們介紹一下吧！"
10045010-74 = "[ns]「百夜水上祭的第一場比賽就是……！」"
10045010-76 = "[log]水槍生存遊戲！[/log]"
10045010-79 = "[ns3]「規則很簡單！只要被弄濕就會遭到淘汰！」\n[ns4]「走出場地也算失去資格！」"
10045010-82 = "在無處可逃的沙灘上展開激烈戰鬥！#n而且！能存活下來的只有30人！"
10045010-83 = "能站到最後的會是誰呢！？"
10045010-84 = "[ns]「那麼請參賽者們立刻往沙灘移動，喵喵！」"
10045010-86 = "……師父的情緒也完全嗨起來了呢。"
10045010-87 = "先到沙灘去吧。得先確認場地的狀況才行。"
10045010-88 = "（……不是需要下水的比賽，真是萬幸）"
10045010-91 = "這裡的沙灘……也太開闊了吧？"
10045010-92 = "要在沙灘上背靠著背戰鬥嗎！？#n簡直跟電影一樣！"
10045010-93 = "唉，現實跟電影裡演得可不一樣啊，紫……"
10045010-94 = "名草前輩[ruby=Full Power]全力模～式[/ruby]下的表現也很令人期待！"
10045010-98 = "雖然右臂的狀態還沒完全恢復……"
10045010-99 = "但我會盡力而為。"
10045010-100 = "封印已經解除了。"
10045010-102 = "……剛才那句話實在莫名中二，拜託千萬別在其他人面前說出來。"
10045010-106 = "[ns]「哦，見到熟面孔了呢。歡迎你們！」"
10045010-107 = "喔喔！見到老師真開心！"
10045010-108 = "老師要親自擔任裁判嗎？"
10045010-109 = "[s]「嗯，這種比賽還是近距離看才有趣吧？」"
10045010-111 = "……所以是想近距離觀察穿著泳裝的學生？"
10045010-112 = "你這人真的是……"
10045010-113 = "[s5]「這，這是誤會啊……！」\n[s6]「呵呵呵，隨你怎麼想！」"
10045010-116 = "嗯，看來人差不多到齊了。"
10045010-124 = "來來來！大家都集合好了嗎？"
10045010-125 = "那麼，百夜水上祭第一回合！#n水槍生存遊戲──"
10045010-126 = "[ns]「開始──！！」"
10045010-130 = "百夜水上祭終於揭開序幕！#n究竟誰能突破第一回合呢……？"

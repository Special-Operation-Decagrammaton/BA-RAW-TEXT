[translation]
10045010-1 = "ตอนที่ 1;จ๋อมแจ๋ม! เทศกาลสวนน้ำเฮียกคิยาโค!"
10045010-3 = "สวัสดีค่ะผู้ชมทุกท่าน! กลับมาพบกันอีกแล้วนะคะ!"
10045010-4 = "กิจกรรมทางน้ำที่จัดโดยชมรมจัดงานเทศกาลของเฮียกคิยาโค...!"
10045010-5 = "<เทศกาลสวนน้ำเฮียกคิยาโค> เปิดให้ได้เปียกปอนกันแล้วค่ะ!"
10045010-9 = "ว้าว! ขอบคุณสำหรับเสียงตอบรับที่อบอุ่นนะคะ เมี้ยวเมี้ยว!"
10045010-10 = "เทศกาลสวนน้ำเฮียกคิยาโคคือกิจกรรมที่ให้ผู้เข้าแข่งขัน 100 คนทำภารกิจต่างๆ เพื่อเฟ้นหาผู้ที่จะ#nอยู่รอดเป็นคนสุดท้าย!"
10045010-11 = "ผู้ชนะจะได้รับเงินรางวัลก้อนใหญ่กับบัตรกำนัลร้านเฮียกคิยาโค และจะได้ทานเมนูพิเศษของทางร้าน#nเฮียกคิยาโคด้วยค่ะ!"
10045010-12 = "ใจป้ำขนาดนี้ ร้านเฮียกคิยาโคจะขาดทุนหรือเปล่า? แล้วจะมีอะไรเหลือบ้างน่ะเหรอคะ?"
10045010-13 = "ไม่ต้องกังวลเลยค่ะ! ก็ยังมีทุกคนเหลือยังไงล่ะคะ...!"
10045010-18 = "เอาละค่ะ... ฉันจะขอแนะนำแขกพิเศษที่มาร่วมบรรยายในวันนี้ค่ะ!"
10045010-19 = "ความหวังของคิโวทอส ผู้ที่ดูแลนักเรียนมากมายแบบไม่ได้หยุดพัก!"
10045010-20 = "บางครั้งก็ดุ บางครั้งก็อ่อนโยน... ชื่อเสียงดังก้องไปทั่วฟ้า! ตอนนี้คงไม่มีใครไม่รู้จักคนคนนี้..."
10045010-21 = "คุณครูจากชาเล่ต์นั่นเองค่ะ! ขอเสียงปรบมือต้อนรับหน่อยค่า!"
10045010-26 = "[ns] \"สะ... สวัสดีนะทุกคน ครู [USERNAME] เอง\""
10045010-27 = "อ๊ะ คุณครู! เราตกลงกันแล้วนี่คะว่าจะพูดคำสร้อยท้ายประโยคเพื่อทำให้บรรยากาศคึกคักน่ะ"
10045010-28 = "[ns1] \"ครูเองนะ บ๊อกบ๊อก!\"\n[ns2] \"ครูเองนะ โฮกโฮก!\""
10045010-31 = "ไม่ใช่เมี้ยวเมี้ยวเหรอ...?!"
10045010-32 = "เอาละค่ะ ตอนนี้คุณครูก็อยู่กับเราที่นี่แล้ว! #nคุณครูคิดว่าใครกันคะที่จะคว้าชัยชนะอันทรงเกียรติกลับบ้านไปได้!"
10045010-33 = "[s] \"มีผู้เข้าแข่งขันเยอะมากจนเดาไม่ถูกเลยละ!\""
10045010-34 = "ได้ข่าวว่าเหล่าผู้เข้าแข่งขันของเรากำลังเตรียมตัวอยู่อย่างตื่นเต้นเลยค่ะ! บางทีการใช้เวลาเตรียมตัว#nมากหน่อย อาจแสดงถึงความมุ่งมั่นที่จะคว้าชัยก็ได้นะคะ~"
10045010-35 = "เอาละค่ะ ในระหว่างที่ให้เตรียมตัวกัน เราจะไปรับชมโฆษณาของสปอนเซอร์กันค่ะ!"
10045010-36 = "อย่าเพิ่งเปลี่ยนช่องหนีไปไหนนะคะ เมี้ยวเมี้ยว!"
10045010-37 = "......"
10045010-38 = "เฮ้อ... เหนื่อยจังเลย การเป็นแม่งานนี่ไม่ใช่เรื่องง่ายเลยนะ"
10045010-39 = "[s] \"ชิซุโกะ! ลืมปิดไมค์...!\""
10045010-40 = "อ๊ะ อ๊าย! เดเฮตเปโร~!"
10045010-41 = "ชิซุโกะโก๊ะอีกแล้ว! ต้องขอโทษด้วยค่ะ!"
10045010-42 = "ทุกคนช่วยส่งกำลังใจให้ชิซุโกะดำเนินรายการได้จนจบด้วยนะคะ!"
10045010-43 = "ไว้จบโฆษณาแล้วมาเจอกันใหม่ค่ะ เมี้ยวเมี้ยว!"
10045010-45 = "ดำเนินรายการได้เฉียบเลยนะเนี่ย... สงสัยจะเตรียมตัวมาอย่างดีเลยละ"
10045010-46 = "หืม? เฉียบงั้นเหรอ? แต่เมื่อกี้เพิ่งทำพลาดไปเองนะ?"
10045010-47 = "ไม่ใช่การทำพลาดหรอก"
10045010-48 = "นั่นคือการจัดฉากเพื่อให้คนเอ็นดูคาแร็กเตอร์โก๊ะๆ กังๆ ของตัวเองต่างหาก"
10045010-49 = "ทั้งสร้างบรรยากาศของงานและโปรโมตตัวเองไปด้วย..."
10045010-50 = "เรียกว่าควบคุมปัจจัยที่ทำให้เกิดกระแสเชิงลบได้อย่างอยู่หมัดเลยละ"
10045010-51 = "สมแล้วที่เป็นไอดอลสาวน้อยคนดังแห่งร้านเฮียกคิยาโค"
10045010-52 = "โอ้... อย่างนี้นี่เอง ฉันไม่ทันได้คิดถึงเรื่องนั้นเลย คิเคียวนี่ฉลาดจริงๆ เลยนะ"
10045010-53 = "แต่ถึงจะฉลาดแค่ไหน ฉันก็ไม่คิดจะแพ้ให้หรอก"
10045010-54 = "อย่ามาคิดแข่งขันกันเองให้เปล่าประโยชน์เลย นอกจากพวกเราแล้ว นี่ที่มีคนอื่นเก่งๆ อีกตั้งเยอะ"
10045010-62 = "มีแต่คนเก่งที่น่ากลัวจริงๆ เจ้าค่ะ... คะ... แค่เห็นก็ประหม่าแล้ว!"
10045010-63 = "อื้อ เราจะประมาทกันไม่ได้แล้วละ"
10045010-65 = "ว่าแต่เราจะแข่งกีฬาทางน้ำแบบไหนกันเหรอ?"
10045010-66 = "ได้ยินว่าจะประกาศการแข่งขันตอนเริ่มแข่งน่ะ ทางผู้จัดเองก็คงจะอยากยืดหยุ่น ก็เราเล่นเพื่อความ#nสนุกกันนี่เนอะ"
10045010-67 = "(หวังว่าจะไม่มีแข่งว่ายน้ำนะ...)"
10045010-69 = "หลังจากนั้นไม่นาน..."
10045010-71 = "ทุกคนคะ! รอกันนานเลยใช่มั้ยคะ?"
10045010-72 = "ในที่สุดก็ถึงเวลาของการแข่งขันรายการแรกของเทศกาลสวนน้ำเฮียกคิยาโคแล้วค่ะ! จะเป็นการแข่งขันแบบไหนกันนะ?"
10045010-73 = "คุณครูคะ! ช่วยแนะนำการแข่งขันนี้หน่อยค่ะ!"
10045010-74 = "[ns] \"การแข่งขันรายการแรกของเราในวันนี้ก็คือ...!\""
10045010-76 = "[log]เกมปืนฉีดน้ำเซอร์ไววัล![/log]"
10045010-79 = "[ns3] \"กติกาก็ง่ายๆ! ห้ามโดนยิงหรือออกจากพื้นที่แข่งขัน!\"\n[ns4] \"ถ้าตัวเปียกหรือออกจากสนาม คนนั้นตกรอบ!\""
10045010-82 = "การต่อสู้สุดชุ่มฉ่ำในชายหาดที่ไม่มีที่ให้หลบหนี! #nการแข่งครั้งนี้เราจะหาผู้เข้ารอบแค่ 30 คนเท่านั้นค่ะ!"
10045010-83 = "มาดูกันค่ะว่าใครจะตัวแห้งและอยู่รอดได้จนถึงที่สุด!"
10045010-84 = "[ns] \"ผู้เข้าแข่งขันมารวมตัวกันที่ชายหาดได้เลย เมี้ยวเมี้ยว!\""
10045010-86 = "ท่านอาจารย์ก็ดูคึกคักไม่แพ้กันเลยนะเนี่ย..."
10045010-87 = "เราไปที่ชายหาดกันก่อนเถอะ ต้องดูลักษณะของสนามแข่งกันด้วย"
10045010-88 = "(ยังไงก็โล่งอกไปทีนะที่ไม่ใช่การแข่งที่ต้องลงไปอยู่ในน้ำ...)"
10045010-91 = "นี่มัน... ชายหาดเปิดโล่งเลยนี่นา?"
10045010-92 = "เราต้องยืนหันหลังให้กันแล้วสู้กันในชายหาดเหรอเจ้าคะ~!? #nเหมือนในหนังเลยเจ้าค่ะ!"
10045010-93 = "เฮ้อ ชีวิตจริงมันต่างจากในหนังนะ ยูคาริ..."
10045010-94 = "ข้าอยากเห็นรุ่นพี่นางุสะโชว์ฝีมือแบบฟูลพาวเวอร์~ แล้วเจ้าค่ะ! "
10045010-98 = "แขนขวาของฉันยังใช้งานได้ไม่เต็มที่..."
10045010-99 = "แต่ฉันจะพยายามทำให้ดีที่สุดแล้วกัน"
10045010-100 = "ตอนนี้พลังของมันไม่ถูกผนึกอีกต่อไปแล้วละ"
10045010-102 = "เมื่อกี้พูดเบียวเหมือนเด็กม.ต้นเลย อย่าไปพูดให้ใครอื่นได้ยินเข้าล่ะ..."
10045010-106 = "[ns] \"โอ้! ดีใจที่ได้เจอนะทุกคน!\""
10045010-107 = "ว้าว! ดีใจที่ได้เจอเจ้าค่ะท่านอาจารย์!"
10045010-108 = "ท่านอาจารย์มาเป็นกรรมการตัดสินเองเลยเหรอเจ้าคะ?"
10045010-109 = "[s] \"อื้อ แข่งแบบนี้ต้องมาดูใกล้ๆ สิถึงจะสนุก\""
10045010-111 = "อยากมาดูนักเรียนในชุดว่ายน้ำแบบใกล้ๆ สินะ...?"
10045010-112 = "คนอย่างคุณนี่นะ จริงๆ เลยเชียว..."
10045010-113 = "[s5] \"ขะ... เข้าใจครูผิดแล้ว...!\"\n[s6] \"ฮุฮุฮุ เชื่อตามที่คิดได้เลย!\""
10045010-116 = "ฮืม ผู้คนเริ่มทยอยกันมาแล้วแฮะ"
10045010-124 = "เอาละ ทุกคนมารวมตัวกันที่สนามแข่งแล้วใช่มั้ยคะ?"
10045010-125 = "ถ้างั้นก็! การแข่งขันรอบที่ 1 ในเทศกาลสวนน้ำเฮียกคิยาโค! #nเกมปืนฉีดน้ำเซอร์ไววัล!"
10045010-126 = "[ns] \"เริ่มได้!!\""
10045010-130 = "ในที่สุดก็เริ่มการแข่งขันในเทศกาลสวนน้ำเฮียกคิยาโค! #nใครบ้างที่จะผ่านการแข่งขันรอบแรกไปได้...?"

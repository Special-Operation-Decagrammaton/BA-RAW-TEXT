[translation]
10003050-1 = "ตอนที่ 5;ชมรมชิมอาหารตัวป่วนปรากฏตัว...!"
10003050-8 = "นี่ พวกชมรมชิมอาหาร ตัวป่วนอย่างพวกเธอมาทำอะไรกันที่นี่น่ะ?#nคิดจะก่อปัญหาอะไรอีกรึไง?"
10003050-9 = "(พอนึกดูแล้ว บัญชีที่เห็นในโซเชียลมีเดียตอนนั้น...)"
10003050-10 = "โอ๊ะ พวกเราไม่ได้จะมาก่อปัญหาสักหน่อยนะคะ"
10003050-11 = "ใช่แล้ว! พวกเราแค่จะมาขายข้าวโพดที่นี่กันต่างหาก!"
10003050-12 = "...?"
10003050-13 = "ข้าวโพดเหรอ?"
10003050-17 = "\"ทำไมข้าวโพดย่างที่กินที่งานเทศกาลฤดูร้อนหรือที่ชายหาดถึงมีรสชาติอร่อย?\""
10003050-18 = "ทุกคนไม่อยากรู้เหตุผลเหรอคะ? ทั้งที่เป็นข้าวโพดชนิดเดียวกัน แต่ทำไมรสชาติถึงแตกต่างกัน..."
10003050-19 = "ในฤดูร้อนนี้พวกเราพยายามค้นหาคำตอบในข้อสงสัยแล้ว... และข้อสรุปก็มีเพียงหนึ่งเดียวค่ะ"
10003050-21 = "นั่นก็คือถ้าไม่ลองด้วยตัวเองก็จะไม่มีทางรู้ค่ะ"
10003050-24 = "ดังนั้นพวกเราเลยมาที่ชายหาดแห่งนี้เพื่อขายข้าวโพดด้วยตัวเองค่ะ"
10003050-25 = "ใช่แล้ว☆ พวกเราได้ยินมาว่าที่นี่มีการต่อสู้ระหว่างกลุ่มแยงกี้สาวกับแก๊งหมวกกันน็อกน่ะค่ะ#nในเน็ตนี่เป็นประเด็นร้อนเลยนะคะ~ "
10003050-26 = "ถ้าพวกแยงกี้สาวกับแก๊งหมวกกันน็อกต่อสู้กันล่ะก็ น่าจะมีผู้คนที่มาดูพวกนั้นเยอะเลยใช่มั้ยล่ะ?#nนี่แหละ โอกาสชั้นยอดทางธุรกิจยังไงล่ะ!"
10003050-27 = "ใช่แล้ว! และของที่เหลือจากการขายก็จะเป็นของพวกเรา!"
10003050-28 = "เดี๋ยวสิ เราต้องขายให้หมดสิ! อุตส่าห์แบกมาถึงนี่เลยนะ!"
10003050-32 = "ว่าแต่ว่า... ทำไมที่ชายหาดถึงไม่มีใครอยู่เลยล่ะคะ?"
10003050-33 = "ไม่มีนั่นแหละดีแล้ว งานเทศกาลจบแล้ว เพราะงั้นรีบกลับไปได้แล้วล่ะ!"
10003050-34 = "ฮุฮุ..."
10003050-35 = "อุ๊ย☆ ให้พวกเรากลับเลยงั้นเหรอคะ"
10003050-36 = "ฮุฮุฮุ... ชมรมชิมอาหารของพวกเรา ไม่เคยย่อท้อต่ออุปสรรคในการค้นหารสชาติใหม่ๆ หรอกนะคะ"
10003050-37 = "ถ้าฮารุนะพูดแบบนั้นล่ะก็ต้องเป็นแบบนั้นอยู่แล้วละค่ะ อีกทั้งจากที่เห็น..."
10003050-39 = "ดูเหมือนว่าตอนนี้ประธานคณะกรรมการวินัยจะไม่อยู่ด้วยนะคะ?"
10003050-40 = "(สะดุ้ง!)"
10003050-42 = "(รู้สึกไม่ดีเท่าไหร่เลยค่ะ...)"
10003050-47 = "ฮุฮุฮุ... ยังไงพวกเราก็มาถึงที่นี่แล้ว พวกเราจะแสดงให้เห็นถึงความมุ่งมั่นของพวกเราเองค่ะ"
10003050-48 = "ใช่ล้าววว! อย่ามาขวางทางไม่ให้ฉันกินข้าวโพดนะ!"
10003050-52 = "เราเพิ่งจะจัดการพวกตัวปัญหาเสร็จไปเองนะ! คิดจะมาก่อเรื่องวุ่นวายที่นี่อีกรึไงกัน! ทุกคนจัดการเลย!"
10003050-53 = "รับทราบค่ะ!!"
10003050-54 = "เฮ้อ... จะบุกแล้วนะคะ"

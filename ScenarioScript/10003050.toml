[translation]
10003050-1 = "Episode 5;Why's the Gourmet Research Society Here?!"
10003050-8 = "What are you troublemakers DOING here?! Are you trying to cause a scene?"
10003050-9 = "(Now that I think about it, one of the social media accounts that I saw earlier was from...)"
10003050-10 = "Oh, we're not here to cause trouble."
10003050-11 = "Right! We're entrepreneurs! Proprietors! We came to sell corn!"
10003050-12 = "...?"
10003050-13 = "Corn?"
10003050-17 = "Haven't you ever wondered why grilled corn is so much more delicious when you eat on the beach with friends?"
10003050-18 = "Don't you want to find the answer as to why? It's no different than grilled corn anywhere else, and yet..."
10003050-19 = "That's why we've spent the summer conducting several investigations on the topic. We came to the conclusion that..."
10003050-21 = "...the only way to know is to come to the beach ourselves!"
10003050-24 = "That's why we came here to sell delicious grilled corn and collect data."
10003050-25 = "That's right. We heard about the war between the Fubar Beach Thugs and Splashy Helmet Gang. Talk about a perfect market! ☆"
10003050-26 = "Delinquents gotta eat, right? Not to mention all the spectators. It's free corn real estate!"
10003050-27 = "And best of all, we get to eat all the leftovers!"
10003050-28 = "You idiot! We have to sell every last one of them. Do you realize how much this corn cost us?!"
10003050-32 = "That sums up the plan. However, why is the beach deserted?"
10003050-33 = "I don't care why you came here. The show's over. You don't have to go home, but you can't stay here!"
10003050-34 = "Heehee..."
10003050-35 = "Oh? You want us to leave? ☆"
10003050-36 = "The Gourmet Research Society never runs away from a challenge when in search for the pinnacle of taste."
10003050-37 = "That's right. And judging by what I can see..."
10003050-39 = "...the head prefect is absent today, is she not?"
10003050-40 = "*flinch*"
10003050-42 = "(I have a bad feeling about this.)"
10003050-47 = "Heehee. Since we're all together, how about we show you just how steely our determination is?"
10003050-48 = "Exactly! Let's eat the corn already!"
10003050-52 = "It's one thing after another today. Do you think we're going to let you ruin it? Everyone prepare for combat!"
10003050-53 = "Yes, ma'am!"
10003050-54 = "*sigh* Engaging the enemy."

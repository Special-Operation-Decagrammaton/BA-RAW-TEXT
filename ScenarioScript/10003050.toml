[translation]
10003050-1 = "第5話;不請自來的美食研究會"
10003050-8 = "美，美食研究會！？你們為什麼在這裡……！這次又打算做什麼！？"
10003050-9 = "（這麼說來，那時看到社群網站帳號中確實有……）"
10003050-10 = "唉呀，真是失禮呢。我們才不是來鬧事的，對吧？"
10003050-11 = "對呀！我們只是來賣烤玉米的！"
10003050-12 = "……？"
10003050-13 = "……烤玉米？"
10003050-17 = "為什麼海邊或慶典的烤玉米會那麼好吃呢……"
10003050-18 = "各位難道不好奇箇中原因嗎？#n明明是同樣的玉米，味道卻大相逕庭……"
10003050-19 = "夏天來臨之後，我們對這個疑問想了又想，最終得出了一個結論──"
10003050-21 = "──只有吃了才知道。"
10003050-24 = "因此我們才會來到海邊，自己嘗試販賣烤玉米。"
10003050-25 = "就是這麼回事★#n網路都在傳說這裡今天將爆發全面戰爭，當作海邊慶典再適合不過了～"
10003050-26 = "太妹集團和頭盔團要互相爭鬥的話，除了他們之外也會有不少來看熱鬧的人對吧？#n從商業角度來看也是相當不錯的判斷！"
10003050-27 = "嗯嗯！賣剩的部分我們會吃掉的！"
10003050-28 = "不可以！一定要賣完才行！！我扛得那麼辛苦耶！"
10003050-32 = "……然而為什麼這裡會如此冷清呢？"
10003050-33 = "那種事不重要……總之慶典已經結束了，快回去，回去！"
10003050-34 = "……呵呵。"
10003050-35 = "哎呀呀，真是無情呢★"
10003050-36 = "我們美食研究會……無論在追求美食的道路上遇到什麼阻礙都不會逃避。"
10003050-37 = "羽留奈都這麼說了，接下來該做什麼已經很明顯了吧？#n況且現在……"
10003050-39 = "風紀委員長似乎不在這裡呢……？"
10003050-40 = "（驚！）"
10003050-42 = "（看來這下麻煩了……）"
10003050-47 = "呵呵呵……難得都來了，就讓你們看看我們對美食的執念吧？"
10003050-48 = "沒錯沒錯！快讓我吃玉米──！"
10003050-52 = "好不容易才解決了那些問題兒童，你們又想來惹事嗎……！#n風紀委員會，我們上！"
10003050-53 = "是！！"
10003050-54 = "唉……開始戰鬥。"

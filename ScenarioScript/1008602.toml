1008602-29 = "3;히나;01;그래도 샬레엔 다른 학생들도 여럿 드나들고 있으니까, 학생들의 본보기가 될 수 있도록 노력하는 편이 좋지 않을까, 싶어서."
1008602-30 = "[s] \"으윽……! 정론입니다………\""
1008602-31 = "3;히나;16;뭐, 선생님만 괜찮다면…… 가끔 내가 샬레에 찾아와서 정리하는 걸 도와줄까?\n#3;em;[반응]"
1008602-32 = "3;히나;99;이래 봬도 물건을 정리하거나 청소하는 건 제법 일가견이 있다고 자부하기도 하고……."
1008602-33 = "3;히나;12;무, 물론 어디까지나 선생님이 괜찮았을 때의 이야기지만…….\n#3;em;[///]\n#3;stiff"

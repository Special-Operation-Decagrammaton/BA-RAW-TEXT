[translation]
1008602-1 = "陽奈和禮服（１）"
1008602-2 = "你好，老師。打擾了。"
1008602-3 = "[s1]「歡迎你來，陽奈！要不要喝點什麼？」\n[s2]「咖啡？紅茶？啊，還有烏龍茶和可樂……」"
1008602-6 = "那麻煩給我一杯咖啡吧。"
1008602-7 = "[s]「好，交給我吧！」"
1008602-11 = "夏萊的辦公室啊……"
1008602-12 = "……總覺得已經很久沒有來這個地方了。"
1008602-13 = "[s]「陽奈竟然真的來到夏萊，簡直就像做夢一樣……」"
1008602-14 = "應，應該也沒有這麼誇張吧……"
1008602-18 = "嗯？放在桌上的是……吃剩的泡麵？"
1008602-19 = "還不只是這樣而已……#n亂七八糟的衣服……沒有整理的餐具……"
1008602-20 = "老師，這是玩具嗎……？"
1008602-21 = "[s]「啊，那個是……」"
1008602-22 = "……老師。 "
1008602-23 = "[s3]「這，這是因為……最近夏萊的工作太多，我根本沒時間處理。」\n[s4]「我本來打算之後就來整理的！是真的……！」"
1008602-26 = "沒，沒事，我也沒有要責怪老師的意思。"
1008602-27 = "我也常常會因為工作太忙而疏於整理周圍的環境。"
1008602-28 = "所以我其實不會特別介意……"
1008602-29 = "不過夏萊會有其他學生進出，我覺得還是該盡可能成為學生們的榜樣比較好。"
1008602-30 = "[s]「唔……！真有道理……」"
1008602-31 = "如果老師不介意的話……要不要我偶爾來夏萊幫老師整理？"
1008602-32 = "我對自己整理物品，以及打掃的能力還算有點自信……"
1008602-33 = "當，當然前提還是老師願意……"
1008602-34 = "[s5]「沒關係，陽奈平常就因為風紀委員會的工作很忙碌了。」\n[s6]「再怎麼說我也不該增加你的麻煩。」"
1008602-37 = "……………………啊，嗯。"
1008602-38 = "…………"
1008602-42 = "既然老師都這麼說了……我知道了。"
1008602-43 = "[s]「那個……陽奈，我有做錯什麼嗎……」"
1008602-44 = "沒有，老師怎麼會錯呢？"
1008602-45 = "……唉。#n那麼就進入正題吧，老師。"
1008602-46 = "[s]「是，是……！」"
1008602-47 = "咳哼……"
1008602-48 = "那個……我今天之所以會找老師諮詢……"
1008602-49 = "其實是因為萬魔殿突然要求我們舉辦一場社交派對。"
1008602-50 = "[s]「社交派對……格黑娜也會辦這種活動啊。」"
1008602-51 = "這是格黑娜的主要人物，以及奇普托斯的政．財界高層都會參加的派對。"
1008602-52 = "老實說我覺得參加那種活動不只麻煩，而且也沒什麼意義。"
1008602-53 = "……但即便如此，既然是公眾場合，身為風紀委員長的我就必須得露臉。"
1008602-54 = "所以我也只能參加了。"
1008602-55 = "……雖然真的很麻煩。"
1008602-59 = "但這也沒辦法……"
1008602-60 = "[s]（看來陽奈是真心覺得很麻煩……）"
1008602-61 = "然後問題是……那個……#n雖然我這麼說可能有點奇怪……"
1008602-62 = "因為我不太熟悉這種社交派對……"
1008602-63 = "明明必須做好參加派對的準備，卻對該從何做起完全沒有頭緒。"
1008602-64 = "希望能請老師幫忙……所以才會過來一趟。"
1008602-65 = "連這種小事都要向老師尋求協助……我很清楚身為風紀委員長不應該這麼做。"
1008602-66 = "但是……"
1008602-67 = "[s]「別這麼說，陽奈。你能依賴老師，老師反而覺得非常開心。」"
1008602-68 = "咦，真的嗎……？"
1008602-69 = "[s]「當然囉。說到參加社交派對必須準備的東西……」"
1008602-71 = "[ns]「陽奈，你有禮服嗎？」"
1008602-72 = "禮服……？"
1008602-73 = "[s7]「如果是重要場合的話，我覺得從TPO著手會比較好。」\n[s8]「雖然這好像有點太基本了……」"
1008602-76 = "嗯，老師說得對。"
1008602-77 = "說的也是，因為實在太理所當然，反而讓人忽略了這點。"
1008602-78 = "仔細想想這畢竟這是社交派對，#n如果穿風紀委員會的制服參加，多少會顯得有點突兀吧。"
1008602-79 = "確實需要準備一套禮服。"
1008602-80 = "派對用的服裝……還有搭配的飾品和鞋子……#n唔嗯，或許還需要一定程度的造型……"
1008602-81 = "謝謝你，老師。#n多虧你的幫忙，我比較有頭緒了。"
1008602-82 = "[s]「能幫上忙真是太好了。」"
1008602-84 = "[ns]「既然都說到這了，乾脆就一起去買陽奈的禮服……」"
1008602-85 = "嗯？不，不需要去買禮服。"
1008602-87 = "[ns]「這裡是……倉庫？」"
1008602-88 = "嗯，這是我平常使用的倉庫。"
1008602-89 = "很少用到的備品，還有老舊的個人物品都保管在這裡。"
1008602-90 = "我以前穿的禮服應該也放在這裡的某處吧。"
1008602-91 = "[s]「總覺得有股既視感……」"
1008602-92 = "平常不太穿的衣服都放在這邊的櫃子……稍等我一下哦。"
1008602-96 = "應該就在這附近才對……"
1008602-97 = "啊。"
1008602-101 = "[ns]「啊，陽奈，我找到了這個……」"
1008602-105 = "………………啊。"
1008602-106 = "[s]「……咦？這不是禮服，而是芭蕾舞的……」"
1008602-107 = "等，等一下！老師你手上拿的那個是……！"
1008602-113 = "……呼，再去找找看吧。"
1008602-114 = "[s]「陽奈，剛剛那個是芭蕾……」"
1008602-115 = "再去找找看吧？老師。"
1008602-116 = "[s]「是，是。」"
1008602-120 = "唔嗯……好像不在這邊。#n這次換從這邊開始……"
1008602-124 = "應該是這邊…… "
1008602-125 = "啊。"
1008602-129 = "[ns]「好，這次一定要找到禮服……」"
1008602-132 = "[ns]「嗯？這是體育服……」"
1008602-133 = "啊，原來放在這裡啊。#n我都忘記了。"
1008602-134 = "[s]「……………………」"
1008602-142 = "老師……！？你，你剛才打算做什麼！？"
1008602-143 = "[s]「沒，沒有啊？」"
1008602-144 = "你明明把臉靠在衣服上……"
1008602-145 = "不，沒什麼，當我沒說過吧。"
1008602-146 = "可能是我太敏感了。"
1008602-147 = "[s9]「抱歉，其實你說的對。」\n[s10]「應該是你多心了。」"
1008602-148 = "什，什麼！？"
1008602-149 = "……唉。真是的，果然不能掉以輕心。"
1008602-150 = "唔嗯……"
1008602-151 = "呼……總，總之現在重要的是要找禮服……"
1008602-152 = "繼續找吧……"
1008602-154 = "（後來不知在倉庫找了多久，最後總算是找到了禮服）"
1008602-156 = "啊，找到了。"
1008602-157 = "我找到了，老師。#n這就是我以前穿的禮服。"
1008602-162 = "能找到真是太好了。#n這樣就不用浪費多餘的錢了。"
1008602-163 = "[s]「陽奈，可是這不管怎麼看都……」"
1008602-164 = "在這裡等我一下，我馬上去換衣服。"
1008602-165 = "希望老師能告訴我適不適合。"
1008602-166 = "[s]「這倒是沒問題，但……」"
1008602-167 = "我馬上回來。"
1008602-171 = "先這樣……從這邊開始……"
1008602-172 = "嗯，然後……"
1008602-173 = "……咦？#n怎麼穿不進去……"
1008602-177 = "……啊。"
1008602-178 = "[s]「陽奈！？你還好嗎！？剛才有奇怪的聲音……！」"
1008602-179 = "沒，沒事！沒什麼……！"
1008602-180 = "只是……因為硬穿上禮服，結果衣服破了而已！"
1008602-181 = "[s]「這非常嚴重吧！？」"
1008602-182 = "總，總之老師……！你絕對不能過來這邊！"
1008602-183 = "如果你過來的話，我不會原諒你的……！"
1008602-184 = "[s]「……是。」"
1008602-188 = "……唉。結果禮服破了……"
1008602-189 = "之前也穿過幾次以前的衣服，本來以為這次也一樣能穿的。"
1008602-190 = "……是我在不知不覺中成長了嗎？"
1008602-191 = "[s]「陽奈，我有一個疑問。你最後一次穿這件禮服是什麼時候？」"
1008602-192 = "咦……？#n最後一次應該是小學聖誕節派對的時候吧。"
1008602-193 = "……那時大概是2年級？"
1008602-194 = "[s]「再怎麼說，那時的衣服也不可能還穿的下吧！？」"
1008602-195 = "好，好像也對……？"
1008602-196 = "成長……有時候也讓人困擾呢……"
1008602-197 = "該怎麼辦才好……"
1008602-198 = "[s]「陽奈，既然如此，我們一起去買禮服吧？」"
1008602-199 = "……和老師去買禮服？"
1008602-200 = "唔嗯，果然也只能這樣了吧……#n如果想參加社交派對就需要準備……"
1008602-201 = "難得老師都為了這件事專程過來一趟了。"
1008602-202 = "那麼雖然會造成老師的麻煩……可以麻煩你嗎？老師。"
1008602-203 = "[s]「當然可以！交給我吧！」"
1008602-204 = "……嗯。謝謝。"
1008602-205 = "那我們之後就一起……"

1008602-51 = "3;히나;02;게헨나의 주요 인물이나, 키보토스의 정·재계에서 높으신 분들이 참가하는 사교 파티야.\n#3;em;[반응]"
1008602-52 = "3;히나;05;본심을 말하자면 그런 장소에 가는 건, 솔직히 귀찮기도 하고 의미도 없다고 생각하지만."
1008602-53 = "3;히나;99;……아무리 그런 모임일지라도 공적인 모임인 이상, 얼굴을 비추는 것이 선도부장으로서 해야 할 일이니까."

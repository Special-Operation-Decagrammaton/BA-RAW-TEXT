1002520-1 = "#title;변하는 것, 변하지 않는 것."
1002520-2 = "3;꼬마 슌ND;20;바쁘실 텐데 번거롭게 해 드린 것 아닌가요?\n#3;em;[땀]\n#3;stiff"

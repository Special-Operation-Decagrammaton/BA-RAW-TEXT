[translation]
1002520-1 = "Changing and Unchanging"
1002520-2 = "I know you're busy. Are you sure this is okay?"
1002520-3 = "[s] \"Yeah! I'm free today!\""
1002520-4 = "That's a relief..."
1002520-5 = "I have a feeling you'll always say that, even when you're busy."
1002520-6 = "[s] \"When a grown-up lies, there's always a good reason...\""
1002520-7 = "Don't try to convince me!"
1002520-8 = "Anyway, it's been a while since we had a calm day like this."
1002520-9 = "The weather is nice, and the breeze feels good."
1002520-10 = "It's nice to have time where you don't have to do anything."
1002520-11 = "[s] \"I'm glad I get to spend time with you, Shun.\""
1002520-12 = "Seriously, you embarrass me when you say things like that!"
1002520-13 = "You need to think about how you come across to others sometimes!"
1002520-14 = "[s] \"Okay, Instructor Shun.\""
1002520-15 = "Ugh. You're teasing me again..."
1002520-16 = "[s] \"By the way, I noticed your hairpin...\""
1002520-17 = "Oh, this?"
1002520-18 = "Actually, this is my favorite hairpin."
1002520-19 = "I think the pair of ribbons looks adorable."
1002520-20 = "Yeah, I like wearing pigtails."
1002520-21 = "I like how they bounce on my shoulders when I run or jump."
1002520-22 = "Actually...I picked a similar hairpin to one that I usually wear..."
1002520-23 = "...because I like the design so much."
1002520-24 = "[s1] \"If you like the hairstyle so much, you should wear it more.\"\n[s2] \"Why don't you wear it more often, then?\""
1002520-25 = "Umm... I don't think it's really appropriate."
1002520-26 = "Umm... I don't think it's really appropriate."
1002520-27 = "I'd feel kinda embarrassed to wear pigtails with ribbons..."
1002520-28 = "I think I should just leave childhood memories in the past."
1002520-29 = "[s] \"But what you like doesn't change, regardless of age, you know?\""
1002520-30 = "Hm?"
1002520-31 = "..."
1002520-32 = "Do you really think there are things that don't change?"
1002520-33 = "[s3] \"It's impossible for everything to change, right?\" \n[s4] \"If there are things that change, there must be things that don't change.\""
1002520-34 = "Heehee. What kind of logic is that?"
1002520-35 = "Heehee. What kind of logic is that?"
1002520-36 = "But, okay... Things that don't change... Things I like..."
1002520-37 = "Heeheehee. I feel kind of good for some reason."
1002520-38 = "My face feels red from embarrassment."
1002520-39 = "[s] \"Are you okay? Do you need allergy medicine?\""
1002520-40 = "..."
1002520-41 = "You're missing the point, Sensei!"
1002520-42 = "[s] \"Don't yell at me...\""
1002520-43 = "Don't act like a baby. I'm not gonna take it easy on you!"
1002520-50 = "Argh! What are you doing?!"
1002520-51 = "Huh? \"Higher and Higher\" to make me feel better?"
1002520-52 = "[s] \"Higher and Higher!\""
1002520-53 = "Ahh, it tickles! P-Please put me down. It's fun, but..."
1002520-55 = "Do I feel better?"
1002520-56 = "Umm... Sure, you could say that."
1002520-57 = "Actually, I wasn't even mad."
1002520-58 = "I need you to promise something..."
1002520-59 = "[s] \"What is it?\""
1002520-60 = "Later..."
1002520-65 = "When I become a grown-up, don't laugh at me if I'm wearing pigtails."
1002520-66 = "Okay?"

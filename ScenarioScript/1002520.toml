[translation]
1002520-1 = "สิ่งที่เปลี่ยนและสิ่งที่คงเดิม"
1002520-2 = "คุณครูน่าจะยุ่งมากแท้ๆ ฉันรบกวนคุณครูรึเปล่าคะ?"
1002520-3 = "[s] \"ครูว่างงานสุดๆ เลยละ!\""
1002520-4 = "ถ้าอย่างนั้นก็ค่อยยังชั่วหน่อยค่ะ......"
1002520-5 = "ฉันคิดว่าคุณครูเป็นคนประเภทที่ว่าต่อให้ยุ่งแค่ไหนก็คงบอกว่าไม่ยุ่งน่ะค่ะ"
1002520-6 = "[s] \"ผู้ใหญ่ก็มีเหตุผลในการโกหกกันทั้งนั้นแหละ...\""
1002520-7 = "พูดอะไรที่เป็นปรัชญาจังเลยนะคะ..."
1002520-8 = "แต่จะว่าไป นี่ก็นานแล้วนะคะที่ไม่ได้มีเวลาว่างแบบนี้น่ะค่ะ"
1002520-9 = "อากาศเย็นสบาย ลมพัดอ่อนๆ แบบนี้ทำให้รู้สึกดีมากเลยค่ะ"
1002520-10 = "ดูเหมือนจะเป็นวันสบายๆ ที่ใช้เวลาได้อย่างไม่รีบร้อนอะไรเลยละค่ะ"
1002520-11 = "[s] \"ครูก็อยากใช้เวลาอยู่กับชุนนะ\""
1002520-12 = "ดะ... เดี๋ยวเถอะค่ะ! จู่ๆ ก็พูดแบบนี้อีกแล้วนะคะ!"
1002520-13 = "ฉันคิดว่าคุณครูอาจจะต้องไตร่ตรองคำพูดของตัวเองก่อนบ้างนะคะ"
1002520-14 = "[s] \"จ้า~ ผู้ฝึกสอนชุน\""
1002520-15 = "งือ คุณครูล้อฉันเล่นอีกแล้ว..."
1002520-16 = "[s] \"พอมาดูดีๆ แล้ว กิ๊บติดผมของชุน...?\""
1002520-17 = "อ๊ะ นี่เหรอคะ?"
1002520-18 = "ที่จริงกิ๊บติดผมที่ฉันชอบที่สุดก็คืออันที่ใช้ติดอยู่ตอนนี้ค่ะ"
1002520-19 = "พอติดคู่กันแล้วมันดูน่ารักมากเลยค่ะ"
1002520-20 = "ใช่ค่ะ ฉันชอบทำผมเปียค่ะ"
1002520-21 = "ฉันชอบที่เวลาที่วิ่งหรือกระโดดผมเปียจะแกว่งไปมามากเลยค่ะ"
1002520-22 = "ที่จริง... กิ๊บติดผมที่ใช้ตอนอยู่ในร่างเดิม..."
1002520-23 = "ฉันตั้งใจเลือกให้ดูคล้ายกับอันที่ติดอยู่ตอนนี้น่ะค่ะ"
1002520-24 = "[s1] \"ถ้าชอบก็ใช้ไปตลอดเลยสิ...\"\n[s2] \"ถ้าชอบมากๆ ตอนอยู่ในร่างโตก็ติดอันนี้ก็ได้นี่นา\""
1002520-25 = "อืม... ถ้าทำแบบนั้น... ขนาดคงไม่พอดีน่ะค่ะ"
1002520-26 = "อืม... ฉันกลัวว่าขนาดมันจะไม่พอดีน่ะค่ะ"
1002520-27 = "แล้วก็ติดริบบิ้นที่ผมเปียสองข้าง... มันก็ดูน่าอายด้วย"
1002520-28 = "ความทรงจำวัยเด็ก... ให้มันคงอยู่แค่ความทรงจำในวัยเด็กไม่ดีกว่าเหรอคะ"
1002520-29 = "[s] \"แต่ว่าความชอบมันไม่ได้เปลี่ยนไปตามอายุซะหน่อยนี่นา\""
1002520-30 = "คะ...?"
1002520-31 = "..."
1002520-32 = "ถ้างั้นคุณครู... เชื่อว่ามีสิ่งที่ไม่เปลี่ยนไปด้วยงั้นเหรอคะ?"
1002520-33 = "[s3] \"เชื่อสิ\"\n[s4] \"ถ้ามีสิ่งที่เปลี่ยนแปลงไป ก็ต้องมีสิ่งที่ไม่เปลี่ยนไปด้วยสิ ถึงจะสมดุลกัน\""
1002520-34 = "ฮ่าฮ่าฮ่า... อะไรกันคะ"
1002520-35 = "ฮ่าฮ่าฮ่า... อะไรกันคะเนี่ย"
1002520-36 = "แต่ว่าก็จริงนะคะ ทั้งสิ่งที่ไม่เปลี่ยนไป ทั้งสิ่งที่ชอบ..."
1002520-37 = "ฮิฮิ จู่ๆ ก็รู้สึกอารมณ์ดีขึ้นมามากๆ เลยละค่ะ"
1002520-38 = "รู้สึกเขินๆ แล้วก็จั๊กจี้นิดหน่อยด้วย...."
1002520-39 = "[s] \"เป็นอะไรรึเปล่า? เอายาแก้แพ้มั้ย?\""
1002520-40 = "..."
1002520-41 = "ถูกตัดคะแนนค่ะ คุณครู!"
1002520-42 = "[s] \"ชุนโกรธซะแล้ว...\""
1002520-43 = "จริงๆ เลย ถึงจะนั่งทำหน้าหงอยก็ไม่มีประโยชน์หรอกค่ะ! ฉันไม่ยกโทษให้หรอกนะคะ!"
1002520-50 = "อ๊ายยย จะทำอะไรคะ?!"
1002520-51 = "เพราะฉันงอนก็เลยจะง้อด้วยการเล่น \"ชูสูงๆ\" งั้นเหรอคะ ระ...เรื่องนั้นมันก็ดีอยู่หรอกค่ะ..."
1002520-52 = "[s] \"เอ้า สูงๆ สูงๆ เลย~\""
1002520-53 = "ฮะฮะฮะ มันจั๊กจี้นะคะ! ปะ...ปล่อยฉันลงได้แล้วค่ะ! ถึงฉันจะชอบเล่นก็เถอะ..."
1002520-55 = "ฉันหายงอนรึยังน่ะเหรอคะ?"
1002520-56 = "อืม... ก็ได้ค่ะ คราวนี้ฉันหายงอนก็ได้"
1002520-57 = "ที่จริงฉันก็ไม่ได้งอนอะไรตั้งแต่แรกแล้วค่ะ"
1002520-58 = "แต่ว่า..."
1002520-59 = "[s] \"แต่ว่า?\""
1002520-60 = "เอาไว้ฉันจะบอกทีหลังนะคะ"
1002520-65 = "พอฉันโตเป็นผู้ใหญ่แล้วทำผมเปียคู่ไปเจอ คุณครูก็ห้ามล้อฉันเด็ดขาดนะคะ"
1002520-66 = "เข้าใจมั้ยคะ?"

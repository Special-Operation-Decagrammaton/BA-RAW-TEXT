[translation]
1002520-1 = "改變與不變"
1002520-2 = "老師好！感謝老師抽空過來。我這樣不會給老師造成困擾吧？"
1002520-3 = "[s] 「不會啊！我很閒！」"
1002520-4 = "那就好……"
1002520-5 = "不過總覺得老師就算再忙，也會優先顧慮我們的感受。"
1002520-6 = "[s] 「別在意。只要能和旬見面，再忙也能挪出時間。」"
1002520-7 = "這種話不用特別說給我聽啦……"
1002520-8 = "但話說回來，好久沒有度過這麼悠閒的時光了。"
1002520-9 = "今天不僅天氣很好，吹來的微風也相當涼爽……"
1002520-10 = "讓人覺得今天就算什麼都不做也很美好。"
1002520-11 = "[s] 「我也很開心能和旬一起度過。」"
1002520-12 = "真、真是的！怎麼突然說這種話！"
1002520-13 = "我覺得老師有必要意識到，自己說的話會對他人帶來什麼影響！"
1002520-14 = "[s] 「好──！旬教官。」"
1002520-15 = "呃呃……又再取笑我了……"
1002520-16 = "[s] 「話說回來，你頭上戴的那個髮夾是……？」"
1002520-17 = "啊，你說這個嗎？"
1002520-18 = "其實這是我最喜歡的髮夾。"
1002520-19 = "上面有一對蝴蝶結，很可愛對吧。"
1002520-20 = "……我很喜歡綁雙馬尾。"
1002520-21 = "我喜歡它在跑跳時，在臉頰兩邊柔順擺動的感覺。"
1002520-22 = "其實……我正常時候戴的髮夾，"
1002520-23 = "也是刻意找了和現在這個髮夾很像的款式。"
1002520-24 = "[s1] 「既然你這麼喜歡這對髮夾……」\n[s2] 「正常時候也可以戴呀。」"
1002520-25 = "嗯……只是……除了尺寸不太合外，"
1002520-26 = "嗯……只是……除了尺寸不太合外，"
1002520-27 = "蝴蝶結雙馬尾也會讓人有點害羞……"
1002520-28 = "小時候的回憶，就讓它留在過去不是比較好嗎？"
1002520-29 = "[s] 「可是就算年紀增長，喜歡的東西也一樣不會改變，不是嗎？」"
1002520-30 = "那個……"
1002520-31 = "……"
1002520-32 = "難道老師認為，世上就是有不會改變的東西嗎？"
1002520-33 = "[s3] 「當然有。」\n[s4] 「既然有會改變的東西，但當然也會有不會改變的東西。」"
1002520-34 = "啊哈哈。說的這麼輕描淡寫。"
1002520-35 = "啊哈哈。說的這麼輕描淡寫。"
1002520-36 = "不過，是啊……不會改變的部分、喜歡的東西……"
1002520-37 = "嘿嘿嘿。心情好多了。"
1002520-38 = "心裡覺得有點害羞，也有些癢癢的……"
1002520-39 = "[s] 「還好嗎？要吃過敏藥嗎？」"
1002520-40 = "……"
1002520-41 = "老師，你這句話大扣分！"
1002520-42 = "[s] 「我被旬罵了……」"
1002520-43 = "真是的，你假裝難過也沒有用！我是不會同情你的！"
1002520-50 = "呀啊？你在做什麼？"
1002520-51 = "嗯？因為我不開心，所以要讓我『飛高高』？雖、雖然我很樂意，不過……！"
1002520-52 = "[s] 「飛高高～飛高高～」"
1002520-53 = "哈哈，好癢！快、快放我下來啦！你的好意我心領了……"
1002520-55 = "唔──嗯……知道了啦。"
1002520-56 = "這件事就算了吧。"
1002520-57 = "雖然我從一開始就沒有不開心……"
1002520-58 = "不過……"
1002520-59 = "[s] 「不過？」"
1002520-60 = "以後啊……"
1002520-65 = "等我變回大人，要是看到我哪天綁著雙馬尾，老師可不能取笑我喔。"
1002520-66 = "知道了嗎？"

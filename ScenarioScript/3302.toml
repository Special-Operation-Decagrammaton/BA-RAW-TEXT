3302-40 = "3;레이;03;후우……\n#3;em;[한숨]\n#3;greeting"
3302-41 = "3;레이;02;……그보다 이 운동, 야구에 도움이 되긴 하는 건가요?"
3302-42 = "3;레이;04;아무리 반복해도 팔이나 어깨 근육이 자극되기보다는, 허벅지와 종아리가 더 당기는 느낌인데……"
3302-43 = "3;레이;04\n1;스미레;03;걱정 마세요. 버피 테스트는 팔과 다리는 물론이고 신체를 지탱하는 코어 근육까지 강화하는 전신 운동이니까요.\n#1;ar\n#3;m5"
3302-44 = "1;스미레;03;이 버피 테스트만 꾸준히 해도 근육 단련은 물론이고 심폐 지구력도 강화할 수 있답니다!\n#1;jump"
3302-45 = "1;스미레;99;특히 레이 양은 심폐지구력을 비롯한 기초 체력이 다소 약화되어 있으니, 특정 부위만 자극하는 운동보다는 이런 전신 운동이 더욱 효과적이지요."
3302-46 = "3;레이;12;하지만……\n#3;em;…"
3302-47 = "3;레이;99;저는 홈런을 치고 싶은 거지, 기초 체력을 키우는 게 목적이 아니라고요."
3302-48 = "3;레이;06;유명한 슬러거 중에는 팔 근육을 집중적으로 단련해서, 정작 심폐지구력은 평범한 사람보다 훨씬 낮은 경우도 흔히 있는데……"

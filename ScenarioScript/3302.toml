[translation]
3302-1 = "Swinging for the Fences 2"
3302-10 = "*pant* *pant* Four...teen!"
3302-11 = "Come on, Rei. Just a little bit more."
3302-12 = "Just one more. One more, and you've cleared this set!"
3302-13 = "*pant* Hold it for three, two, one..."
3302-18 = "...That makes fifteen!"
3302-19 = "Very good!"
3302-20 = "One more!"
3302-21 = "Wait a second! I thought you said that was the last one!"
3302-22 = "Why is there still one left?"
3302-23 = "You say you're tired, but I know you've still got one more in you."
3302-24 = "Today's pain is what leads to tomorrow's gains."
3302-25 = "Imagine the amazing tone and definition you'll have tomorrow. It's just beyond this last burpee!"
3302-26 = "You said that earlier!"
3302-27 = "Now that I think about it, you even snuck an extra set..."
3302-28 = "I...give up..."
3302-29 = "All right. Break time!"
3302-30 = "Let's hydrate then move on to the next exercise before your muscles cool down!"
3302-40 = "Phew..."
3302-41 = "By the way, these exercises are supposed to help with baseball, right?"
3302-42 = "It feels like I'm working my thighs and calves rather than my arms and shoulders..."
3302-43 = "Don't worry. Burpees are meant to train your whole body. Arms, legs, even your core muscles that keep you upright."
3302-44 = "You can build muscles and even enhance your cardiorespiratory endurance, all through burpees alone!"
3302-45 = "Especially for someone like you, who hasn't done a whole lot of fitness, stimulating the entire body is more effective than focusing on a few arbitrary body parts."
3302-46 = "But..."
3302-47 = "I'm trying to be a home run queen not a bodybuilder."
3302-48 = "There are famous sluggers who focused only on their arm muscles. They may have had more cardio endurance than the average person...but they didn't need it!"
3302-52 = "...Rei."
3302-53 = "Why do you want to hit a home run so badly?"
3302-54 = "Because it's cool! Obviously..."
3302-55 = "A home run is like the gilded lily of a baseball game, don't you think?"
3302-56 = "Most ordinary hits never lead to a single point. But with a single swing, you can turn the tables of an entire game..."
3302-57 = "It's only natural for a batter to yearn for a home run."
3302-58 = "I've been thinking about them ever since I decided to join the baseball club."
3302-59 = "I know that one day, I will hit a radiant home run that leads my team to victory!"
3302-63 = "When was the last time you saw someone land a home run?"
3302-64 = "I think it was at the public baseball field. I went with my friends at the end of last year's season."
3302-65 = "I could never forget the beautiful arc the ball drew over the fences."
3302-66 = "Thanks to that swing, the home team was able to take back a game they were losing badly and emerge victorious..."
3302-67 = "...Wait. Were you rooting for the home team, or the away team?"
3302-72 = "(It was... Wait, which team was it?!)"
3302-73 = "(I remember the field, I remember the final score. But everything else is fuzzy...)"
3302-74 = "(There was that shooting star of a home run. What happened during the rest of the game, Rei?!)"
3302-76 = "...How about we call it a day."
3302-77 = "Right. Thank you for your help today."
3302-78 = "By the way... Is there a baseball game tonight, Rei?"
3302-79 = "Mmm. There's no regular season games on Mondays. But there is a minor league game playing on the outskirts of Gehenna."
3302-80 = "Let's go watch a game then!"
3302-81 = "Huh? Right now?!"
3302-82 = "We have a lot of extra time from cutting the training schedule short."
3302-83 = "So how about we make up for it with a field trip!"
3302-91 = "Up for a brisk jog to the Gehenna district?"
3302-93 = "From here?! On foot?! We'll never make it in time!"

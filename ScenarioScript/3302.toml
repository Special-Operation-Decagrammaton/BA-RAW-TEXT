3302-19 = "1;스미레;07;잘하셨습니다!"
3302-20 = "1;스미레;08;그리고 앞으로 마지막 한 개!"
3302-21 = "3;레이;17;잠깐만요! 방금 카운트가 마지막이라고 하셨잖아요?\n#3;m4"
3302-22 = "3;레이;05;어째서 은근슬쩍 카운트가 하나 더 늘어난 건가요!\n#3;jump"
3302-23 = "1;스미레;07;에이, 아무리 지쳤다고 하지만 아직 한 개는 더하실 수 있잖아요.\n#1;greeting"
3302-24 = "1;스미레;99;지금의 고통스러운 자극이 내일의 근성장으로 이어지는 법……\n#1;em;…"
3302-25 = "1;스미레;07;눈 딱 감고 한 번만 더 몸을 움직이면, 내일은 더 멋진 근육을 손에 넣으실 수 있습니다!\n#1;jump"
3302-26 = "3;레이;16;그 말은 아까도 하셨잖아요!\n#3;hophop"
3302-27 = "3;레이;09;그러고 보니 어느새 은근슬쩍 세트도 하나 더 늘어났어……\n#3;em;[땀]"
3302-28 = "3;레이;09;이대로는…… 더는 못해요!\n#3;stiff"
3302-29 = "1;스미레;05;좋습니다. 그럼 휴식입니다!"

3302-54 = "3;레이;14;그야 당연히…… 멋지니까요."
3302-55 = "1;스미레;01\n3;레이;03;홈런은 야구 경기의 꽃이나 다름없잖아요?\n#1;dl\n#3;m3"
3302-56 = "1;스미레;01\n3;레이;11;평범한 안타도 득점으로 이어지지 못하는 경우가 허다한데, 스윙 한 번으로 경기의 판도를 뒤바꿀 수 있다니……\n#1;hide"
3302-57 = "3;레이;13;홈런을 동경하는 건 타자로서 당연한 일이지요."
3302-58 = "3;레이;13;야구부에 들어오기로 결심한 순간부터 줄곧 생각했습니다."
3302-59 = "3;레이;03;언젠가 멋진 홈런을 쳐서 경기를 승리로 이끌겠다고!\n#3;jump\n#3;em;[!]"

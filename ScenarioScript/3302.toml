[translation]
3302-1 = "揮向遠方（２）"
3302-10 = "哈啊，哈啊……十……四！"
3302-11 = "很好，再加把勁，莉同學。"
3302-12 = "只要再做一下……再一下這組就完成了！"
3302-13 = "呼……一，二，三……"
3302-18 = "……十五！"
3302-19 = "做得很好！"
3302-20 = "最後再追加一組吧！"
3302-21 = "請等一下！剛才不是說最後一組了嗎？"
3302-22 = "為什麼又偷偷加了一組！"
3302-23 = "哎呀，雖然嘴上說不行了，但你其實還可以再做一組的對吧？"
3302-24 = "現在感受到的痠痛，將成為明天的肌肉……"
3302-25 = "只要現在咬牙撐過這組，明天一定能長出更結實的肌肉！"
3302-26 = "這句話剛才已經聽過了！"
3302-27 = "等等，這麼說來，你剛才好像就已經偷偷加了一組……"
3302-28 = "我，我真的……已經不行了！"
3302-29 = "好，進入休息時間！"
3302-30 = "趕緊去補充水分，趁你的汗水乾掉之前進行下個訓練！"
3302-40 = "呼……"
3302-41 = "……話說回來，這個訓練真的對打棒球有幫助嗎？"
3302-42 = "雖然一直重複著相同的訓練，但比起手臂跟肩膀，我覺得大小腿的肌肉更痠……"
3302-43 = "不用擔心，波比跳是一種全身性的運動。#n不只是手部和腿部，就連支撐身體的核心肌群也能訓練到。"
3302-44 = "只要你持續這套波比跳訓練，就能在鍛鍊肌肉的同時增強心肺功能。"
3302-45 = "尤其你比較缺乏心肺耐力這類的基礎體能，#n比起只訓練特定部位的運動，這種全身運動會更有效果。"
3302-46 = "可是……"
3302-47 = "我只是想要打出全壘打而已，並沒有想要增強基礎體能……"
3302-48 = "而且就連那些知名的強棒選手，也有很多人只注重手臂肌肉訓練，#n以至於心肺能力甚至比普通人還差……"
3302-52 = "……莉同學。"
3302-53 = "你為什麼想要打出全壘打呢？"
3302-54 = "那當然……是因為很帥囉。"
3302-55 = "全壘打基本上就是整場棒球比賽的高潮。"
3302-56 = "比賽中很多時候光靠普通的安打是無法得分的，#n然而一次全壘打卻有可能讓局勢徹底翻轉……"
3302-57 = "所以身為一名打擊手，對全壘打有憧憬也是很自然的。"
3302-58 = "自從我下定決心加入棒球部的瞬間，我就一直在想像──"
3302-59 = "打出漂亮的全壘打，藉此帶領團隊獲得勝利的那天！"
3302-63 = "那你最後一次看到有人打出全壘打是什麼時候？"
3302-64 = "這個嘛……我想應該是去年賽季結束後，和朋友一起去公立棒球場觀賽的時候吧。"
3302-65 = "我直到現在還是忘不了那道越過圍牆的美麗拋物線。"
3302-66 = "多虧那記全壘打，原本比分大幅落後的主場隊最後成功逆轉，並且贏得了勝利……"
3302-67 = "……不對，那場比賽是主場隊輸了嗎？"
3302-72 = "（……咦？真奇怪……）"
3302-73 = "（那場比賽的情景……好像想不太起來）"
3302-74 = "（除了那記全壘打的美麗拋物線之外，我對比賽的內容好像完全沒有印象……）"
3302-76 = "……今天的訓練就到此為止吧。"
3302-77 = "啊，是……前輩辛苦了。"
3302-78 = "莉同學，今晚有什麼地方會舉辦棒球比賽嗎？"
3302-79 = "因為今天是星期一，所以沒有舉行正規賽……#n不過格黑娜自治區外圍的運動場有一場二軍的聯盟賽。"
3302-80 = "那我們一起去看比賽吧！"
3302-81 = "什麼？這麼突然……！？"
3302-82 = "反正今天的訓練課程提早結束，現在還有很多時間嘛。"
3302-83 = "多出來的這些時間，我們就去現場觀摩吧！"
3302-91 = "啊，既然這樣……不如就「跑」去格黑娜自治區吧？"
3302-93 = "這樣今天之內根本到不了比賽場地啦！"

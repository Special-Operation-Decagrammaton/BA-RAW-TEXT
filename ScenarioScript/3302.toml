[translation]
3302-1 = "ขว้างไปให้ไกล (2)"
3302-10 = "แฮ่ก... แฮ่ก... สิบ... สี่!"
3302-11 = "เอาละ ออกแรงต่ออีกหน่อยค่ะ เรย์"
3302-12 = "อีกครั้งเดียวค่ะ... อีกครั้งเดียวก็หมดเซ็ตนี้แล้ว!"
3302-13 = "แฮ่ก... หนึ่ง สอง สาม..."
3302-18 = "สิบห้า...!"
3302-19 = "ดีมากค่ะ!"
3302-20 = "เหลืออีกแค่ครั้งเดียวแล้ว!"
3302-21 = "เดี๋ยวก่อนค่ะ! ก่อนหน้านี้ก็บอกว่าเหลือแค่ครั้งเดียวไม่ใช่เหรอคะ?"
3302-22 = "แล้วทำไมถึงตีเนียนให้ฉันทำอีกครั้งล่ะคะ?"
3302-23 = "ไม่เอาน่า ต่อให้เหนื่อยแค่ไหนแต่ก็ยังทำอีกครั้งไหวอยู่นี่คะ"
3302-24 = "ความเจ็บปวดของร่างกายตอนนี้จะนำไปสู่การพัฒนาของกล้ามเนื้อในวันพรุ่งนี้..."
3302-25 = "หลับตาลงแล้วขยับร่างกายอีกครั้งค่ะ พรุ่งนี้จะได้มีกล้ามเนื้อที่มากกว่านี้!"
3302-26 = "เมื่อกี้ก็พูดแบบนี้ไปแล้วนี่คะ!"
3302-27 = "จะว่าไป นี่ฉันทำไปเพิ่มอีกเซ็ตหนึ่งแล้วนะคะ..."
3302-28 = "ถ้าจะให้เพิ่มเรื่อยๆ แบบนี้... ฉันทำต่อไม่ไหวหรอกค่ะ!"
3302-29 = "ได้ค่ะ งั้นก็พักกันก่อน!"
3302-30 = "เติมความชุ่มชื้นแก่ร่างกายให้เพียงพอ แล้วก็ไปที่การออกกำลังกายต่อไปก่อนที่เหงื่อจะแห้งค่ะ!"
3302-40 = "ฮู่ว..."
3302-41 = "การออกกำลังกายแบบนี้มันมีส่วนช่วยในการเล่นเบสบอลไหมคะเนี่ย?"
3302-42 = "ต่อให้ออกกำลังซ้ำๆ แค่ไหน แต่แทนที่จะเป็นการกระตุ้นกล้ามเนื้อที่แขนกับไหล่ ฉันกลับรู้สึกตึงๆ ที่ขาและสะโพกมากกว่า..."
3302-43 = "ไม่ต้องห่วงค่ะ ท่าพุ่งหลังเป็นท่าออกกำลังกายที่ได้ทั้งตัว ท่านี้จะช่วยเสริมสร้างความแข็งแรงของ#nกล้ามเนื้อแขน ขา รวมถึงกล้ามเนื้อแกนกลางของลำตัวด้วยค่ะ"
3302-44 = "ถ้าทำท่าพุ่งหลังอย่างสม่ำเสมอ นอกจากจะช่วยฝึกกล้ามเนื้อแล้ว ยังช่วยเพิ่มสมรรถภาพของหัวใจ และปอดด้วยนะคะ!"
3302-45 = "โดยเฉพาะเรย์ที่ยังไม่ค่อยมีพละกำลัง ก็ต้องออกกำลังกายด้วยท่าที่โดนทั้งตัว ไม่ใช่แค่ส่วนใดส่วนหนึ่งโดยเฉพาะ ถึงจะได้ประสิทธิภาพมากกว่าค่ะ "
3302-46 = "แต่ว่า..."
3302-47 = "ฉันแค่อยากตีลูกโฮมรันให้ได้นะคะ ไม่ได้จะมาเพิ่มพละกำลังอะไรให้ร่างกาย"
3302-48 = "ในบรรดาแบตเตอร์ที่มีชื่อเสียงก็มีหลายคนที่เน้นไปที่การฝึกกล้ามเนื้อแขนให้แข็งแรง จนสมรรถภาพของหัวใจและปอดต่ำกว่าคนทั่วไป..."
3302-52 = "เรย์คะ"
3302-53 = "ทำไมถึงอยากตีลูกโฮมรันให้ได้เหรอคะ?"
3302-54 = "ก็มัน... เท่ดีนี่คะ"
3302-55 = "สำหรับการแข่งขันเบสบอลแล้ว โฮมรันก็ไม่ต่างกับดอกไม้สวยๆ หรอกค่ะ"
3302-56 = "และต่อให้ตีลูกได้ก็มีให้เห็นถมไปว่าทำแต้มไม่ได้ แต่ถ้าการสวิงเพียงครั้งเดียว มันสามารถพลิกเกม#nการแข่งขันได้ละก็..."
3302-57 = "จะให้สรุปเลยก็คือ โฮมรันเป็นสิ่งที่ผู้เล่นในตำแหน่งแบตเตอร์ใฝ่ฝันกันค่ะ"
3302-58 = "ตั้งแต่วินาทีที่เข้ามาในชมรมเบสบอล ฉันก็คิดอยู่เสมอ"
3302-59 = "ว่าสักวันจะต้องตีลูกโฮมรันเท่ๆ จนชนะการแข่งขันให้ได้!"
3302-63 = "ถ้างั้นครั้งสุดท้ายที่เห็นคนอื่นตีโฮมรันคือเมื่อไรเหรอคะ? "
3302-64 = "ก็น่าจะ... ตอนที่ฉันกับเพื่อนๆ ไปสนามเบสบอลสาธารณะหลังจากจบฤดูกาลที่แล้วน่ะค่ะ"
3302-65 = "จนถึงตอนนี้ฉันยังไม่ลืมวิถีพาราโบลาสวยๆ ตอนลูกข้ามกำแพงไปได้เลยค่ะ"
3302-66 = "ลูกนั่นน่ะทำให้ทีมเหย้าที่คะแนนเป็นรองอยู่พลิกเกมจนชนะได้..."
3302-67 = "ไม่สิ หรือว่าจะแพ้การแข่งขันนะ?"
3302-72 = "(เอ๋...? แปลกจัง...)"
3302-73 = "(ภาพของสนามกีฬาที่เห็นตอนนั้น... มันเลือนลางจนนึกไม่ออกเลย)"
3302-74 = "(วิถีสวยๆ ของพาราโบลาจากโฮมรันนั่นยังคงเห็นเด่นชัด แต่ว่าทำไมถึงจำรายละเอียดของการแข่งขัน#nไม่ได้...)"
3302-76 = "ฉันขอจบการฝึกฝนของวันนี้เท่านี้ก่อนค่ะ"
3302-77 = "อ้อ ค่ะ ขอบคุณมากนะคะ"
3302-78 = "เรย์คะ ไม่ทราบว่าเย็นนี้มีการแข่งขันเบสบอลที่ไหนบ้างไหมคะ?"
3302-79 = "วันนี้เป็นวันจันทร์ ก็เลยไม่มีการแข่งขันประจำฤดูกาล... แต่เห็นว่าจะมีการแข่งขันลีกระดับ 2 ในสนามกีฬาที่อยู่ในชายขอบของเขตปกครองตนเองเกเฮนน่านะคะ"
3302-80 = "งั้นเราไปดูเบสบอลกันเถอะค่ะ ไปตอนนี้เลย!"
3302-81 = "คะ? จู่ๆ ทำไมถึงได้...?!"
3302-82 = "พอเราลดตารางฝึกฝนกันไป เวลาก็เลยเหลือเยอะไงคะ"
3302-83 = "เวลาที่เหลือจากการฝึกฝนวันนี้ เราจะเอาไปใช้ในการเก็บข้อมูลนอกสถานที่กันค่ะ!"
3302-91 = "ไม่สิ ในเมื่อเป็นแบบนี้แล้ว เราวิ่งที่ไปเขตปกครองตนเองเกเฮนน่าแล้วค่อยไปดูการแข่งขันกันดีไหมคะ?"
3302-93 = "แบบนั้นวันนี้เราก็ไปไม่ถึงสนามกีฬาหรอกค่ะ!"

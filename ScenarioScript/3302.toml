3302-63 = "3;스미레;03;그럼 다른 사람이 홈런을 치는 모습을 마지막으로 보았던 것은 언제였나요?"
3302-64 = "3;레이;02;그건 아마…… 작년 시즌이 끝나고 친구들과 함께 공립 야구장에 갔을 때였을 거예요."

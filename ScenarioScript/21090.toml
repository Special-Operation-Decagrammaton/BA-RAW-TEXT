[translation]
21090-1 = "ตอนที่ 9;คำถามของยูกะ"
21090-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21090-3 = "อาริสึ ถ้าเธอถูกข่มขู่ให้เข้าชมรมพัฒนาเกมจนต้องเข้ามาอย่างปฏิเสธไม่ได้ (กระซิบ)#nให้กะพริบตาข้างซ้าย"
21090-4 = "(เหม่อ)"
21090-5 = "อะไรของเธอน่ะ! ถามอะไรกันอย่างนี้? พวกเราไม่ทำเรื่องแบบนั้นหรอกนะ!"
21090-10 = "ไม่เชื่อก็ดูบัตรนักเรียนนี่สิ! อาริสึเป็นนักเรียนของมิลเลเนียมนะ!"
21090-11 = "อืม... ฉันเช็กทั้งบัตรนักเรียนและรายชื่อนักเรียนในระบบมาแล้ว..."
21090-12 = "แต่ฉันไม่ใช่ผู้หญิงที่ถูกหลอกกันได้ง่ายๆ หรอกนะ"
21090-14 = "(สะดุ้ง)"
21090-15 = "(ดะ... โดนจับได้งั้นเหรอ?!)"
21090-17 = "เอาล่ะ เริ่มสอบสวนกันเลย"
21090-18 = "ทีนี้คงถามแบบไม่ยั้งเลยสินะ..."
21090-20 = "อาริสึ ทำไมเธอถึงมาเข้าชมรมพัฒนาเกมเหรอ?"
21090-21 = "พอได้สติก็ได้อยู่ในห้องนี้แล้ว... ซะที่ไหนล่ะ...."
21090-22 = "โมโมอิ อย่าจ้องอาริสึแบบนั้นได้ไหม? ลูกตาจะหลุดออกมาอยู่แล้ว"
21090-23 = "เอ่อ... พอดีฉันอยากเล่นเกมคาสเซิลมาเนีย... และได้ยินมาว่าชมรมพัฒนาเกมมีเกมนี้ ก็เลย..."
21090-24 = "อืม... แบบนี้นี่เอง"
21090-25 = "(ดีมากอาริสึจัง! ตอบได้ดีเลย)"
21090-26 = "ที่นี่ไม่ใช่คลับเกมคลาสสิค แต่เป็นชมรมพัฒนาเกมนะ"
21090-27 = "ถ้าเธอเข้ามาพัฒนาเกม แล้วหน้าที่ของเธอที่นี่คืออะไรเหรอ?"
21090-28 = "เป็นแท็งก์และโจมตีธาตุแสง..."
21090-29 = "หา?"
21090-30 = "ซะที่ไหนล่ะ! อ่า... ฉันเป็น... ปะ... โปรกรัมเมอร์ค่ะ!"
21090-31 = "หา...? ไม่ใช่โปรแกรมเมอร์เหรอ?"
21090-32 = "อ่า.. ใช่ ใช่แล้วค่ะ ฉันคือโปรแกรมเมอร์ผู้มากด้วยฝีมือค่ะ!"
21090-33 = "(ซวยแล้ว...!)"
21090-34 = "โปรแกรมเมอร์งั้นเหรอ... ตำแหน่งนี้ไม่ได้ทำงานง่ายๆ เลยนะ"
21090-35 = "อ่า... ชะ... ใช่ค่ะ ปะ.. โปรแกรมเมอร์เป็นงานยากค่ะ บางทีก็เหนื่อย แล้วบางทีก็ตายด้วย"
21090-36 = "วะ... ว่าไงนะ?!"
21090-37 = "แต่ก็ไม่เป็นไรค่ะ!"
21090-38 = "เดี๋ยวก่อน... จะไม่เป็นไรได้ไง..."
21090-39 = "ถ้าไปนอนในโรงแรมจิ้งหรีด หรือจ่ายเงินให้วิหาร ก็จะสามารถชุบชีวิตได้ค่ะ ชุบเพื่อนๆ ได้ด้วยนะคะ!"
21090-40 = "เดี๋ยวก่อน... มันจะเป็นแบบนั้นไปได้ยังไง!?"
21090-41 = "เป็นไปไม่ได้... งั้นเหรอคะ...? ไม่รู้จักเกม <มิธ ฮีโร่ส์> หรือ <แมจิคัล ซอร์ด> เหรอคะ?"
21090-43 = "เกมเทพมากเลยนะคะ"
21090-44 = "......"
21090-46 = "จบกัน..."
21090-48 = "......"
21090-49 = "ก็ได้... เข้าใจแล้ว"
21090-50 = "ทีนี้ฉันก็มั่นใจในตัวตนของเธอแล้วล่ะอาริสึ"
21090-52 = "(ซวยของจริงแล้ว!)"
21090-53 = "(เอาไงดี!)"
21090-56 = ".....?!"
21090-57 = "ถึงจะมีจุดที่น่าสงสัยอยู่บ้าง..."
21090-58 = "แต่ก็รู้ได้ว่าเป็นเด็กที่ชอบเรื่องราวการสำรวจโลกใหม่ และทำบางอย่างให้สำเร็จ#nไปพร้อมกับเพื่อนร่วมทีม..."
21090-60 = "สมกับเป็นสมาชิกชมรมพัฒนาเกมเลยล่ะนะ"
21090-62 = "หืม...?"
21090-63 = "ถะ... ถ้างั้นก็?!"
21090-65 = "ในเมื่อมีสมาชิกครบแล้ว... ชมรมพัฒนาเกมก็สามารถทำกิจกรรมในฐานะชมรมต่อไปได้"
21090-67 = "ไชโย!"
21090-68 = "ในที่สุดก็ทำได้แล้ว!"
21090-69 = "งั้นเราใช้ห้องชมรมได้ใช่ไหม? แล้วก็รับเงินสนับสนุนได้ด้วย!"
21090-70 = "แน่นอนอยู่แล้ว"
21090-71 = "แต่จนถึง 'เทอมนี้' เท่านั้น"
21090-72 = "ว้าว..... หือ?"
21090-73 = "วะ... วะ.. ว่ายังไงนะ?!"
21090-74 = "ทำไมล่ะ! จำนวนคนก็ครบแล้วไม่ใช่เหรอ!?"
21090-76 = "โอ๊ะ หรือว่าฉันยังไม่ได้บอกไปน่ะ?"
21090-77 = "'จากนี้' นอกจากจะต้องมีสมาชิกให้ครบแล้ว ยังต้องพิสูจน์ผลงานของชมรมด้วย"
21090-78 = "แน่นอนว่าเราจะผ่อนผันระยะเวลาให้ เพราะมีการเปลี่ยนแปลงกฎอย่างกะทันหัน"
21090-79 = "แต่หากไม่ทำผลงานให้ได้ภายในเดือนนี้ล่ะก็ ชมรมของเธอจะถูกยุบ ไม่ว่าจะมีสมาชิก 4 คน#nหรือ 400 คนก็ตาม!"
21090-80 = "ปะ... เป็นไปไม่ได้!"
21090-81 = "ได้สิ! ฉันพูดเรื่องนี้ในการประชุมหัวหน้าชมรมไปแล้ว"
21090-82 = "หัวหน้าชมรมทุกคนรู้กันดี ยกเว้นหัวหน้ายูสึของพวกเธอที่ไม่ได้เข้าประชุม"
21090-83 = "?!"
21090-84 = "จากนี้ก็เป็นความรับผิดชอบของพวกเธอแล้วล่ะนะ!"
21090-85 = "อึ้ก... คนขี้ขลาด!"
21090-86 = "ขี้ขลาดงั้นรึ? คนที่รักษากฎระเบียบมันดูขี้ขลาดยังไงไม่ทราบ?"
21090-87 = "ที่จริงตัวตนของอาริสึก็ยังเป็นที่สงสัย และฉันก็อยากจะทำเรื่องยุบชมรมในวันนี้เลยด้วย..."
21090-88 = "?!"
21090-89 = "แต่นั่นก็ไม่สำคัญหรอก... เพราะก็ได้รู้แล้วว่ามีความกระตือรือร้นในเรื่องเกมแค่ไหน"
21090-90 = "และที่ฉันยืดเวลาให้ ก็เพราะหวังว่าความกระตือรือร้นนั้นจะสร้างผลงานของชมรมได้"
21090-91 = "เธอพูดไว้ไม่ใช่เหรอโมโมอิ? พูดว่าจะสร้างผลงานที่น่าตื่นตาในงานมิลเลเนียมไพรซ์"
21090-92 = "ชะ.. ใช่ ฉันเคยพูดแบบนั้นก็จริง แต่ว่า..."
21090-93 = "ตอนนี้พวกเธอก็มีสมาชิกเพิ่มแล้ว คงจะสร้างเกมที่สนุกกว่าแต่ก่อนได้แล้วใช่ไหมล่ะ?"
21090-94 = "งั้นฉันจะตั้งตารอนะ ไปล่ะ~"
21090-97 = "เดี๋ยว! รอก่อนสิ! คนหลอกลวง!"
21090-98 = "ไปซะแล้ว..."
21090-100 = "อืม..."
21090-101 = "สุดท้ายแล้ว วิกฤตยุบชมรมพัฒนาเกมก็ยังไม่หายไปสินะ"
21090-102 = "ฮึ่ม! น่าโมโหชะมัด! นี่มันหลอกลวงกันชัดๆ ต้องเป็นแผนการยุบชมรมตั้งแต่แรกแน่ๆ"
21090-103 = "ขอโทษนะ... ขอโทษที่ฉันไปประชุมหัวหน้าชมรมไม่ได้..."
21090-104 = "มะ... ไม่ใช่ความผิดของยูสึจังหรอก! ปกติแล้วพี่โมโมอิจะไปประชุมแทนไม่ใช่เหรอ?"
21090-105 = "จะให้ไปได้ไงล่ะ..."
21090-106 = "ก็ตอนนั้นมันมีกิจกรรมอัตราดรอปไอเทม 2 เท่า..."
21090-107 = "ลบเกมนั้นไปเลยนะ! เดี๋ยวนี้เลย!"
21090-108 = "... เอาเถอะ สุดท้ายแล้วก็เหลือวิธีเดียวเท่านั้น"
21090-109 = "ใช่"
21090-110 = "เราต้องสร้างเกมที่จะเปิดตัวในงานมิลเลเนียมไพรซ์ให้ได้"
21090-111 = "งั้นก็ต้องมี G.Bible น่ะสิ! เฮ้อออ! เราต้องไปพื้นที่รกร้างนั่นอีกเหรอ?! ไม่เอาด้วยหรอก!"
21090-112 = "......"
21090-116 = "ฉันต้องรับผิดชอบ..."
21090-117 = "หืม? พูดอะไรน่ะยูสึจัง?"
21090-118 = "ถ้าจะไปพื้นที่รกร้าง... เพื่อหา G.Bible... ฉันก็จะไปด้วย"
21090-119 = "วะ... ว่าไงนะ!?"
21090-120 = "แต่เธอไม่เคยออกไปนอกอาคารเรียนมากว่าครึ่งปีแล้วนะ แล้วก็เรียนออนไลน์ตลอดเลยด้วย"
21090-121 = "เพราะเป็น... ความผิดของฉันไง... อีกอย่าง... ห้องชมรมนี้... ก็ไม่ได้เป็นของฉันคนเดียว"
21090-122 = "ขอให้ฉัน... ได้รักษามันไว้... กับพวกเธอเถอะนะ"
21090-123 = "ยูสึจัง..."
21090-126 = "ปาปัม ปาปัม ป๊าม! ยูสึเข้าร่วมเป็นสหายแล้วค่ะ"
21090-127 = "ก็ได้... ดีล่ะ! มาลองดูกันเถอะ!"
21090-128 = "อาริสึจัง! เธอก็เตรียมอาวุธกับอุปกรณ์มาด้วยนะ!"
21090-131 = "ไอเทมครบ! ติดตั้งดาบแห่งแสง: ซูเปอร์โนว่า"
21090-134 = "ความตั้งใจดีมาก! ไปกันเลย! ครั้งนี้จะต้องเอา G.Bible กลับมาให้ได้!"
21090-135 = "......"
21090-136 = "อื้ม...!"
21090-137 = "มาช่วยกันรักษาห้องชมรมไว้!"
21090-139 = "ตอนต่อไป;ไปยังพื้นที่รกร้างอีกครั้ง"

[translation]
21090-1 = "第9話;ユウカの質問"
21090-2 = "ミレニアム・ゲーム開発部"
21090-3 = "……アリスちゃん。もしゲーム開発部に脅されて仕方なくこの場にいるのなら、左目で瞬きをして。"
21090-4 = "……？"
21090-5 = "ちょっと、最初から何その質問！？小声で言っても聞こえてるから！っていうかそんなことしないって！！"
21090-10 = "ほら見て、このまぶしい学生証を！ミレニアムの生徒だっていうまごうことなき証明！"
21090-11 = "ふーん……確かに、生徒名簿にアリスちゃんが登録されていることも確認したけれど……。"
21090-12 = "私は、そんな簡単に騙される女じゃないわ。"
21090-14 = "（ビクッ）"
21090-15 = "（ば、バレた！？）"
21090-17 = "さて、それじゃあ取り調べを再開しましょうか。"
21090-18 = "もう隠すつもりもないじゃん……。"
21090-20 = "アリスちゃん、あなたがゲーム開発部に来たきっかけは何？"
21090-21 = "気が付いた時はすでにここに、ではなく……。"
21090-22 = "モモイ、何でそんなにアリスちゃんを睨んでるわけ？やめてあげなさい。"
21090-23 = "えっと、『魔王城ドラキュラ』がやりたくって……それで、ゲーム開発部の存在を知って……。"
21090-24 = "ふーん……そうなの。"
21090-25 = "（よし！アリスちゃん、その調子！）"
21090-26 = "でもここはレトロゲーム部じゃない、あくまでもゲーム開発部。"
21090-27 = "つまり、あなたもゲーム作りに参加するということよね？何を担当するの？"
21090-28 = "タンク兼光属性アタッカー……"
21090-29 = "えっ？"
21090-30 = "じゃなくて、えっと、ぷ、ぷ、ぷ……プログラマラスです！"
21090-31 = "……はい？プログラマー、じゃなくて？"
21090-32 = "あ、はい。そうです、その通りです。間違いなく私は完璧なプログラマーです。"
21090-33 = "（まずい……っ！？）"
21090-34 = "プログラマーね……すごく難しい役割だと聞くけれど。"
21090-35 = "はい、そ、そうです。ぷ、プログラマーは大変です。たまに過労で、意識を失ったりもします。"
21090-36 = "な、なんですって！？"
21090-37 = "それでも大丈夫です！"
21090-38 = "いや、大丈夫じゃないでしょ……ちゃんと休みなさいよ……。"
21090-39 = "宿屋で寝て起きるか、聖堂にお金を払えば、仲間たちと一緒に復活できます！"
21090-40 = "そっ、そんなわけないでしょ！？"
21090-41 = "そんなわけないのですか……？常識のはずですが……もしかして、『英雄神話』や『聖槍伝説』をご存じないのですか？"
21090-43 = "本当に「神ゲー」ですよ。"
21090-44 = "……。"
21090-46 = "終わった、全てが……。"
21090-48 = "……。"
21090-49 = "……ありがとう、分かったわ。"
21090-50 = "短い時間だったけれど、アリスちゃん。あなたのことについては概ね理解できた。"
21090-52 = "（もうダメだぁっ！）"
21090-53 = "（どうしよう……！？）"
21090-56 = "……！？"
21090-57 = "ちょっと怪しいところはあるけれど……"
21090-58 = "ゲームが好きだってこと。それに、新しい世界を冒険したり、仲間と一緒に何かをやり遂げるストーリーが好きなんだってことは、十分に伝わってきた……"
21090-60 = "そんなあなたがゲーム開発部の部員だというのは、何も不思議なことじゃないわ。"
21090-62 = "え……？"
21090-63 = "っていうことは！？"
21090-65 = "規定人数を満たしているので、ゲーム開発部をあらためて正式な部活として認定……部としての存続を承認します。"
21090-67 = "やったぁ！"
21090-68 = "良かったぁっ！"
21090-69 = "そ、そしたら部費も貰えるし、このまま部室を使っててもいいんだよね！？"
21090-70 = "ええ、もちろんよ。"
21090-71 = "「今学期」までは……ね。"
21090-72 = "わーぃ……え？"
21090-73 = "な、な、なんで！？"
21090-74 = "どうして！規定人数も満たしたのに！？"
21090-76 = "あら、知らなかったのかしら。"
21090-77 = "今は部活の規定人数を満たすだけじゃなく、同時に部としての成果を証明しないといけないの。"
21090-78 = "もちろん、最近急に変わった要件だから、猶予期間はあるけれど……。"
21090-79 = "その期間は今月末まで。今月中に結果を出せなければ、あなたたちの部はたとえ4人いても400人いても、廃部になるのよ。"
21090-80 = "嘘だ、あり得ない！"
21090-81 = "あり得るの！この間、全体の部長会議でちゃんと説明した内容なんだから。"
21090-82 = "ただ、あなたたちの部長、ユズはそこに参加してなかったけれど。"
21090-83 = "！？"
21090-84 = "つまり、あなたたちの責任よ。"
21090-85 = "くっ……卑怯者め！"
21090-86 = "「鬼」とかならまだ分かるけど、規則通りに事を運ぶことの何が「卑怯」なのよ……。"
21090-87 = "正直なところアリスちゃんの正体も怪しいし、本当なら今日すぐに退去を要請しようかとも思っていたのだけれど……。"
21090-88 = "！？"
21090-89 = "……正体はさておき、ゲームが好きっていう純粋な気持ちは本物だと思った。"
21090-90 = "猶予を与えたのは、その気持ちに相応しい成果がきちんと出せることを期待しているからよ。"
21090-91 = "モモイ、あなた言ったわよね？ミレニアムプライスで、びっくりするぐらいの結果を出してみせるって。"
21090-92 = "そ、それはそうだけど……。"
21090-93 = "新しいメンバーも増えたことだし、前よりもちゃんと面白いゲームが作れるんでしょうね？"
21090-94 = "それじゃあ、楽しみにしてるわよ。じゃあね～。"
21090-97 = "ちょっ、待って！詐欺師っ、杓子定規っ、もおぉぉぉぉっ！"
21090-98 = "行っちゃった……。"
21090-100 = "うーん……。"
21090-101 = "結果的に、まだゲーム開発部は存続の危機……ってことだよね。"
21090-102 = "でもこんなの、どう考えても詐欺だよ！謀略だよ！！"
21090-103 = "……ごめん。わたしが、部長会議に参加できなかったせいで……。"
21090-104 = "ゆ、ユズちゃんのせいじゃないよ！こういう場合って、お姉ちゃんが代わりに参加することにしてたはずでしょ？"
21090-105 = "……仕方なかったの。"
21090-106 = "だってその時は、アイテムドロップ率2倍のキャンペーン中で……。"
21090-107 = "やっぱりお姉ちゃんのせいじゃんっ！今すぐそのゲーム消して！"
21090-108 = "うう……とにかく、もうやるべきことは一つ。"
21090-109 = "そうだね。"
21090-110 = "ミレニアムプライスで受賞できるような、すごいゲームを作ること。"
21090-111 = "ってことは、結局G.Bibleが必要なんじゃん！またあの廃墟に行くの！？やだぁ！！"
21090-112 = "……。"
21090-116 = "……責任、取らないと。"
21090-117 = "え、ユズちゃん？"
21090-118 = "G.Bibleを探しに、また廃墟に行くなら……わたしも、一緒に行く。"
21090-119 = "え、え！？嘘！？"
21090-120 = "ユズちゃん、もう半年間近く校舎の外に出てないのに。授業もインターネット受講だけだし……。"
21090-121 = "……元々は、わたしのせい……だから。それに、この部室は……もうわたしだけのものじゃない。"
21090-122 = "……一緒に、守りたいの。"
21090-123 = "ユズちゃん……。"
21090-126 = "パンパカパーン、ユズがパーティに参加しました。"
21090-127 = "……うん、よし！やるしかない、行こう！"
21090-128 = "アリスちゃんも、武器とか装備持って！"
21090-131 = "アイテムを選択、「光の剣：スーパーノヴァ」を装備しました。"
21090-134 = "よし、行こっか！今度こそ、G.Bibleを手に入れるために！"
21090-135 = "……。"
21090-136 = "……うん！"
21090-137 = "みんなで、部室を守ろう！"
21090-139 = "次回;再び、廃墟へ"

[translation]
21090-1 = "第9話;優香的質問"
21090-2 = "千年．遊戲開發部"
21090-3 = "……愛麗絲醬。如果你是被遊戲開發部威脅才不得不待在這裡的話，就眨一下左眼。"
21090-4 = "……？"
21090-5 = "喂！怎麼一開始就問這種問題！？#n就算說得很小聲我也聽到了！話說我們才不會做這種事咧！！"
21090-10 = "你看看這個耀眼的學生證！這就是他是千年學生最好的證據！"
21090-11 = "嗯……確實，愛麗絲確實是有被登錄在學生名單上，但……"
21090-12 = "我可不是這麼簡單就會被騙過的女人。"
21090-14 = "（咦）"
21090-15 = "（被，被發現了嗎！？）"
21090-17 = "那麼，我們就重新開始審問吧。"
21090-18 = "已經演都不演了啊……"
21090-20 = "愛麗絲醬，你之所以加入遊戲研究部的契機是什麼呢？"
21090-21 = "醒過來的時候就在這裡，啊不是……"
21090-22 = "桃井，你為什麼要一直盯著愛麗絲醬看？請不要再盯著人家了。"
21090-23 = "那個，是想要玩《魔王城德古拉》……所以才知道有遊戲開發部這個社團……"
21090-24 = "嗯……是這樣啊。"
21090-25 = "（做得好！愛麗絲醬，就是這個樣子！）"
21090-26 = "不過這裡可不是懷舊遊戲部，而是遊戲開發部。"
21090-27 = "也就是說，你也要參加遊戲的開發對吧？你擔任的職位是？"
21090-28 = "坦克兼光屬性輸出……"
21090-29 = "咦？"
21090-30 = "不對，那個，是軟，軟，軟……軟體工逞師！"
21090-31 = "……什麼？不是該叫軟體工程師嗎？"
21090-32 = "啊，對。就是這個，就是這個沒錯。我毫無疑問就是個完美的軟體工程師。"
21090-33 = "（不妙……！？）"
21090-34 = "軟體工程師啊……聽說是個非常困難的工作呢。"
21090-35 = "沒，沒錯，就是這樣。軟體工程師是很辛苦的。偶爾會因為過勞而昏倒之類的。"
21090-36 = "你，你說什麼！？"
21090-37 = "但是就算這樣也沒關係！"
21090-38 = "不，很有關係吧……請好好休息啊……"
21090-39 = "只要在旅館睡一覺，或是付錢給教堂的話，就可以和夥伴們一起復活了！"
21090-40 = "不，不可能吧！？"
21090-41 = "不可能嗎……？這應該是常識才對……#n難道說，你不知道《英雄神話》或是《聖槍傳說》嗎？"
21090-43 = "真的是「神作」唷。"
21090-44 = "……"
21090-46 = "完了，全都完了……"
21090-48 = "……"
21090-49 = "……謝謝，我了解了。"
21090-50 = "雖然只是短短的時間，但是愛麗絲醬，我大概了解你的情況了。"
21090-52 = "（已經沒希望了嗎！）"
21090-53 = "（怎麼辦才好……！？）"
21090-56 = "……！？"
21090-57 = "雖然有些奇怪的部分……"
21090-58 = "但你喜歡遊戲，還有喜歡在新的世界冒險、和夥伴們一起達成某些成就這件事，#n我已經深刻體會到了……"
21090-60 = "這樣的你會是遊戲開發部的成員一點也不奇怪。"
21090-62 = "咦……？"
21090-63 = "也就是說！？"
21090-65 = "因為已經符合人數的規定，再次正式承認遊戲開發部是正式的社團……#n也就是認定你們社團將能夠繼續存活下去。"
21090-67 = "太好了！"
21090-68 = "太好了！"
21090-69 = "這，這樣的話就能夠得到社團經費，也能夠繼續使用社團活動室了對吧！？"
21090-70 = "嗯，那是當然。"
21090-71 = "到「這學期」為止……呢。"
21090-72 = "耶～……咦？"
21090-73 = "為，為，為什麼！？"
21090-74 = "為什麼！明明就已經達到規定的人數了呀！？"
21090-76 = "哎呀，你們不知道嗎。"
21090-77 = "現在不只是要擁有規定的人數，同時也要有能夠作為社團活動成果的證明才行。"
21090-78 = "當然，因為是最近突然修改的規定，所以有一定的緩衝時間……"
21090-79 = "但也到這個月底而已。#n如果在月底前拿不出成果，你們的社團不管是4個人還是400個人都一樣會被廢社。"
21090-80 = "騙人的，怎麼可能！"
21090-81 = "當然可能！這可是在之前的部長會議上詳細說明過的規定。"
21090-82 = "雖然你們的部長柚子並沒有來參加就是了。"
21090-83 = "！？"
21090-84 = "也就是說，這是你們自己的責任。"
21090-85 = "可惡……這個卑鄙小人！"
21090-86 = "如果是「魔鬼」之類的話還能理解，照著規定做的事哪裡「卑鄙」了……"
21090-87 = "說實在的愛麗絲醬的真實身分也很可疑，本來我是想立刻請他離開的……"
21090-88 = "！？"
21090-89 = "……姑且不論真實身分，我認為他喜歡遊戲這純粹的感情是真實的。"
21090-90 = "之所以給你們緩衝期間，也是期待你們能夠做出和這份感情相應的成果唷。"
21090-91 = "桃井，你也說過了吧？要在千年大賞裡拿出讓人嚇一跳的成果給我看看之類的。"
21090-92 = "是，是沒錯啦……"
21090-93 = "既然有了新的夥伴，比起以往應該更能做出有趣的遊戲了對吧？"
21090-94 = "那麼，我很期待唷。掰掰囉～"
21090-97 = "等，等一下！你這騙子、死古板，真是的！"
21090-98 = "走掉了……"
21090-100 = "唔嗯……"
21090-101 = "結果，遊戲開發部還是處於……存亡的危機中呢。"
21090-102 = "但是，這怎麼想都是詐欺吧！是計謀吧！"
21090-103 = "……對不起。都是我，沒有去參加部長會議的錯……"
21090-104 = "才，才不是柚子醬的錯呢！一般來說這種場合都是姐姐代替柚子參加的對吧？"
21090-105 = "……實在是沒有辦法啊。"
21090-106 = "誰叫那個時候，正好有掉落率兩倍的活動……"
21090-107 = "果然是姐姐的錯吧！現在立刻把那個遊戲給刪掉！"
21090-108 = "嗚嗚……總之，這麼一來該做的事就只有一個了。"
21090-109 = "是呢。"
21090-110 = "要製作出能在千年大賞裡得獎的，很厲害的遊戲。"
21090-111 = "所以說，終究還是需要G.Bible的嘛！又得要到那個廢墟去才行嗎！？我不要！！"
21090-112 = "……"
21090-116 = "……我得負起責任才行。"
21090-117 = "咦？柚子醬？"
21090-118 = "如果為了找到G.Bible又要再去廢墟一趟的話……我也，一起去。"
21090-119 = "咦，咦！？騙人的吧！？"
21090-120 = "柚子醬，明明已經接近半年都沒有離開過校舍了。就連上課都是線上上課而已……"
21090-121 = "……畢竟……這一開始就是我的錯。#n而且這間活動室……已經不只是我自己的了。"
21090-122 = "……我也想要，一起保護它。"
21090-123 = "柚子醬……"
21090-126 = "乓啪喀乓！柚子加入了隊伍。"
21090-127 = "……嗯，好！也只好這麼做了，走吧！"
21090-128 = "愛麗絲醬也趕快，裝備好武器之類的吧！"
21090-131 = "選擇道具，已裝備「光之劍：Supernova」。"
21090-134 = "好，我們走吧！這次一定要把G.Bible給拿到手！"
21090-135 = "……"
21090-136 = "……嗯！"
21090-137 = "大家一起，守護我們的活動室吧！"
21090-139 = "下一話;再次，前往廢墟"

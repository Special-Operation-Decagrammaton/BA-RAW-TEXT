[translation]
10023105-2 = "อึก...!"
10023105-3 = "พลังที่คาดไม่ถึง... นี่น่ะเหรอคะ พลังของคุณครูชาเล่ต์ที่เขาว่ากัน?"
10023105-11 = "ได้มงกุฎแล้ว!"
10023105-12 = "ได้ไอเทมแรร์มาแล้วค่ะ! ปาปัม ปาปัม ป๊าม!"
10023105-13 = "แล้วกับคนนั้น... ทำยังไงดีคะ?"
10023105-19 = "!!!"
10023105-20 = "เป็นม่านควันที่ใช้ได้เลย... ระวังเรื่องการหายใจด้วยนะคะคุณครู"
10023105-22 = "โอ๊ย แสบตาไปหมดเลยค่ะ แค่กๆ แค่กๆ! พี่โมโมอิ อยู่ตรงนั้นหรือเปล่า?"
10023105-24 = "ฉันได้ยินเสียงมาจากข้างๆ แต่ไม่เห็นใครเลย!"
10023105-29 = "(ตอนนั้นเองก็มีบางอย่างเหมือนลูกแก้วใสกลิ้งมาอยู่ใต้เท้า)"
10023105-33 = "(หยิบขึ้นมาดูดีกว่า...)"
10023105-34 = "สวัสดีค่ะ ได้ยินเสียงฉันไหมคะ?"
10023105-35 = "[s] \"... อื้ม ได้ยิน\""
10023105-37 = "น่าเสียดายนะคะที่ต้องบอกลาแบบนี้"
10023105-38 = "ถึงสุดท้ายจะถูกคุณครูชิงมงกุฎไปได้..."
10023105-39 = "แต่หากคิดในทางกลับกัน ยังไงการยึดมงกุฎคืนจากเมทาโร่ก็ถือว่าสำเร็จนะคะ เพราะยังไงก็ถือว่า#nสถานการณ์มันดีกว่าเดิม"
10023105-40 = "ถ้างั้น... ถึงจะน่าเสียดาย แต่ครั้งนี้ฉันคงต้องถอยก่อนค่ะ การพบกันของฉันกับ 'คุณครู' ชาเล่ต์ครั้งนี้ หวังว่าจะไม่ได้เป็นครั้งสุดท้ายนะคะ"
10023105-41 = "[s] \"... ปกติเกิดเรื่องแบบนี้ซ้ำแล้วซ้ำเล่างั้นเหรอ?\""
10023105-42 = "............"
10023105-43 = "คุณครู รู้ไหมคะว่า <หิน> กับ <งานศิลปะ> แตกต่างกันอย่างไร?"
10023105-44 = "ถึงจะได้ชื่อว่างานศิลปะ แต่หากไม่มีใครเห็นคุณค่าของมันก็คงไม่ต่างจากก้อนหินหรอกค่ะ"
10023105-45 = "อย่างที่ฉันบอกไปก่อนหน้านี้ว่ามีฉันคนเดียวเท่านั้นที่หยั่งรู้คุณค่าของงานศิลปะได้"
10023105-46 = "ถ้าอย่างนั้น การเก็บของแบบนั้นไว้กับคนอย่างฉันจะไม่ดีกว่าเหรอคะ?"
10023105-47 = "[s] \"นั่นคือเหตุผลที่เธอขโมยของเหรอ...?\""
10023105-50 = "ใช่ค่ะ และนั่นก็คือแพชชันที่ฉันมีต่อสิ่งสวยงาม การอุทิศตน ความใจบุญ... และความรัก"
10023105-51 = "หากไม่มีใครรู้คุณค่า งานศิลปะก็อาจจะถูกฝังอยู่ในความมืดตลอดกาล เพื่อรอว่าสักวันหนึ่งจะมีใครที่#nเห็นคุณค่าของมัน"
10023105-52 = "เราไม่ได้เกิดมาพร้อมชื่อของตัวเอง คำเรียกของเราจึงถูกกำหนดโดยคนอื่นค่ะ"
10023105-53 = "ในเมื่อโลกเรียกฉันว่าโจร ฉันก็เลยจะแก้ไขตรงนั้นสักหน่อยค่ะ"
10023105-54 = "แน่นอนว่าคนในโลกไม่อาจเข้าใจที่ฉันเป็นแบบนี้ ทุกคนต่างก็ชี้นิ้วต่อว่า และบอกว่าที่ฉันทำไม่ใช่#nความรักและไม่ใช่เรื่องปกติ"
10023105-55 = "เพราะงั้นหากคุณจะคิดแบบนั้นด้วย ฉันก็คงทำอะไรไม่ได้......"
10023105-56 = "[s] \"ครูไม่ได้... คิดอย่างนั้นเลยนะ\""
10023105-57 = "คะ......?!"
10023105-60 = "[ns1] \"ครูบอกไม่ได้หรอกนะว่าครูเข้าใจเธอได้\"\n[ns2] \"แต่การพยายามเข้าใจและเฝ้าดูนักเรียน\"\n[ns3] \"ก็คือบทบาทของคนเป็นครูนะ\""
10023105-66 = "เป็นครั้งแรกเลยนะคะ... ที่ฉันได้ยินคำตอบแบบนี้"
10023105-67 = "ถ้างั้นคุณครูคิดว่าสามารถทำความเข้าใจนักเรียนที่ได้ชื่อว่าเป็นโจรได้เหรอคะ?"
10023105-68 = "[s] \"ครูอยากทำแบบนั้น ไม่ว่าจะในฐานะผู้ใหญ่หรือครูเองก็เถอะ\""
10023105-69 = "... แล้วถ้าเกิดว่านักเรียนที่ขึ้นชื่อว่าเป็นโจรคนนั้น... เธอเป็น 'เด็ก' เกเรและไม่เคารพกฎระเบียบล่ะคะ?"
10023105-73 = "[ns] \"คนเป็นครูไม่มีวันหมดความหวังในตัวนักเรียนหรอกนะ\""
10023105-74 = "......!"
10023105-75 = "[s4] \"ถ้านักเรียนคนนั้นออกนอกลู่นอกทางและสร้างเรื่องลำบากให้ตัวเอง\"\n[s5] \"ครูก็จะต้องเข้าไปจูงมือให้กลับมาเป็นเด็กดีสักหน่อย\""
10023105-78 = "'แต่ถึงอย่างนั้น พวกเราก็ต้องไม่หยุดพยายาม' งั้นเหรอคะ......?"
10023105-79 = "......"
10023105-80 = "ฉันขอถามอะไรอีกอย่างเดียวค่ะ"
10023105-81 = "คุณครูเรียกคนอย่างฉันว่านักเรียนได้เหรอคะ?"
10023105-82 = "[s] \"... อืม เธอยังเป็นนักเรียนของครูเสมอ\""
10023105-83 = "......"
10023105-84 = "...... อากิระ"
10023105-85 = "[s] \"หืม? อากิระ?\""
10023105-86 = "ค่ะ คิโยซุมิ อากิระ"
10023105-90 = "นั่นคือ... ชื่อจริงของฉันค่ะ"
10023105-94 = "ถ้างั้น... คุณครู วันหลังก็..."
10023105-100 = "เฮ้อ..."
10023105-101 = "มองเห็นข้างหน้าได้สักที! คุณครู! เป็นอะไรไหม?"
10023105-102 = "คุณครู! เป็นยังไงบ้างคะ? คุณครูไม่ได้แข็งแรงมาก คุณครูต้องระวังๆ หน่อยนะคะ..."
10023105-103 = "ดูจากภายนอกแล้วไม่น่าจะเป็นอะไรนะคะ"
10023105-104 = "[s] \"อืม ครูไม่เป็นไร\""
10023105-106 = "ว่าแต่... ทำไมถึงได้ทำหน้าแบบนั้นล่ะคะ? เหมือนมีเรื่องอะไรเศร้าๆ เลย..."
10023105-107 = "หรือว่าไปเจอเรื่องอะไรไม่ดีมาคะ? คุณครูไม่เป็นอะไรแน่เหรอคะ?"
10023105-108 = "[s6] \"ไม่เป็นไร ครูไม่เป็นอะไรเลย\"\n[s7] \"แล้วมงกุฎล่ะ? ไม่ได้ทำหายไปใช่ไหม?\""
10023105-113 = "นี่ค่ะ..."
10023105-117 = "ยังสภาพดีอยู่เลยใช่ไหมล่ะคะ?"
10023105-119 = "(ทุกคนมองไปยังมงกุฎที่ยูสึยื่นออกมาจากอ้อมกอดอย่างระมัดระวัง จากนั้นก็ถอนหายใจด้วยความโล่งอก)"
10023105-120 = "(ถึงจะจับทั้งจอมโจรแห่งความเสน่หาและเมทาโร่ไม่ได้ แต่ทุกคนก็ดีใจที่ไม่มีใครได้รับบาดเจ็บ)"
10023105-124 = "แฮ่ก... แฮ่ก...! ไม่มีใครตามมาใช่ไหม? ค่อยยังชั่ว..."
10023105-125 = "ฉันไม่ล้มเลิกแค่นี้หรอก... ตราบใดที่ยังไม่ยอมแพ้ ทางก็จะเปิดให้เสมอ!"
10023105-126 = "ฉันรู้ดี ที่ผ่านมาก็เป็นอย่างนี้มาตลอดนี่!"
10023105-128 = "งั้นเรอะ? งั้นก็ลองหลบนี่ดูด้วยสิ"
10023105-132 = "ใครน่ะ─"
10023105-141 = "เฮือก?!"
10023105-153 = "อะไรเนี่ย ทำไมกระจอกอย่างนี้?"
10023105-154 = "มาเคลมว่าตัวเองเป็นลูกพี่ในซอย สุดท้ายฝีมือก็แค่ลูกกระจ๊อกดีๆ นี่เอง เฮ้อ..."
10023105-155 = "ทุกคนออกมาเถอะ รีบไปหาพวกนั้นกัน"

[translation]
10023105-2 = "唔……！"
10023105-3 = "呼呣，這股超出預期的力量……#n這就是傳聞裡聽到的，夏萊的老師啊……"
10023105-11 = "王冠已經拿到手囉！"
10023105-12 = "乓啪喀乓！獲得了稀有道具！"
10023105-13 = "那個人……該怎麼處理呢……？"
10023105-19 = "！！！"
10023105-20 = "這是……請使用我的手帕，老師。"
10023105-22 = "唔，眼睛痛到張不開……咳咳，咳咳！#n姐姐，你在哪裡？"
10023105-24 = "聽，聽的到聲音，可是我也什麼都看不見！"
10023105-29 = "（……感覺到球體撞上鞋子的觸感）"
10023105-33 = "（這次抱著確信的心情伸出了手……）"
10023105-34 = "貴安，能聽到我的聲音嗎？"
10023105-35 = "[s]「……嗯，聽得到哦。」"
10023105-37 = "必須以這種形式與您告別，我打從心底感到遺憾。"
10023105-38 = "從結果來看，王冠雖然落入老師手中……"
10023105-39 = "不過終究是成功從銅田手中取回了王冠。#n如此一來，至少迴避了流入黑市這種最糟糕的結局。"
10023105-40 = "雖然遺憾，但我這次就看在老師的面子上收手吧。#n畢竟這不會是最後一次。"
10023105-41 = "[s]「……你一直都在做這麼危險的事嗎？」"
10023105-42 = "…………"
10023105-43 = "「路旁的石頭」與「藝術品」……老師知道兩者的區別是以什麼樣的標準劃分的嗎？"
10023105-44 = "無論是多麼美妙的藝術品，也不是所有人都能完美地理解其價值。"
10023105-45 = "和先前所說的一樣，能理解其真正價值的人只有我而已。"
10023105-46 = "既然如此……交由我來管理，對藝術品來說不也是件好事嗎？"
10023105-47 = "[s]「所以你才會當怪盜……？」"
10023105-50 = "是的，正是如此。這就是我對美一心一意的愛。#n獻上自身的一切加以疼愛──故曰「慈愛」。"
10023105-51 = "如果沒有人能夠理解其價值，藝術品很可能埋沒在黑暗中乏人問津。#n盼望著有朝一日，理解美學之人的出現──"
10023105-52 = "我們生而無名。稱呼亦是由他人所規定。#n然而不僅是名號，價值與職責也是同理。"
10023105-53 = "比如，對……就像世間稱我為「慈愛的怪盜」一般。"
10023105-54 = "……當然，世上也有無趣之人自始至終都無法理解我。#n在背地裡譴責我是「瘋狂的偏愛者」。"
10023105-55 = "因此……即便老師抱持著和他們一樣的想法……"
10023105-56 = "[s]「我……並不這麼覺得。」"
10023105-57 = "嗯……！？"
10023105-60 = "[ns1]「我沒有輕易說出我能理解你的意思……」\n[ns2]「但是努力去了解學生們的心情、」\n[ns3]「守望著他們就是我的職責。」"
10023105-66 = "呼呣……這樣的回答，我還是，第一次聽見。"
10023105-67 = "也就是說，老師您……#n願意理解即使受到世人的指責，依然選擇成為怪盜的我嗎……？"
10023105-68 = "[s]「身為大人，身為老師，我希望自己能做到。」"
10023105-69 = "……如果那名怪盜始終是名不顧及他人的、扭曲的孩子呢……？"
10023105-73 = "[ns]「即便如此，我也會守望著他直到最後的。」"
10023105-74 = "……！"
10023105-75 = "[s4]「如果學生偏離了正軌，感到痛苦的話……」\n[s5]「我一定會伸出援手，引導他的方向。」"
10023105-78 = "您的意思是「即便如此，我們也不該放棄努力」……？"
10023105-79 = "……"
10023105-80 = "可以請教您一個問題嗎？"
10023105-81 = "即使是這樣的我……也能成為老師的學生嗎？"
10023105-82 = "[s]「……嗯，那當然。大家都是我重要的學生。」"
10023105-83 = "……"
10023105-84 = "……晶。"
10023105-85 = "[s]「……晶？」"
10023105-86 = "是的。清澄晶。"
10023105-90 = "那是……我隱藏在面具下真正的名字。"
10023105-94 = "那麼老師──有朝一日，希望我們能再次相見。"
10023105-100 = "咳咳……"
10023105-101 = "終於能看見了！老師，你沒事吧？"
10023105-102 = "老師！HP還有剩嗎？#n老師是隊伍裡最弱的，一定要小心才行……"
10023105-103 = "目前看來，似乎沒有外傷呢。"
10023105-104 = "[s]「……我沒事，謝謝你們。」"
10023105-106 = "……老師？"
10023105-107 = "難道被「慈愛的怪盜」做了什麼嗎？"
10023105-108 = "[s6]「不，什麼都沒有。」\n[s7]「我沒事的。話說回來，王冠沒事吧？」"
10023105-113 = "是……我有在箱子裡，好好地保管……"
10023105-117 = "太好了……這次沒事呢。"
10023105-119 = "（確認柚子手中的王冠後鬆了一口氣）"
10023105-120 = "（雖然「慈愛的怪盜」和明太郎都逃走了，所幸大家都平安無事）"
10023105-124 = "哈啊，哈啊……！沒有追兵吧……？"
10023105-125 = "還沒結束……我是不會放棄的。#n……怎麼能在這種地方放棄！"
10023105-126 = "沒錯，就是這樣沒錯！無論幾次都要捲土重來！"
10023105-128 = "是嗎？那試著躲躲看這招吧。"
10023105-132 = "是，是誰──"
10023105-141 = "嘎啊！？"
10023105-153 = "什麼嘛，原來也不怎麼樣。"
10023105-154 = "明明聽說是地下世界的大人物，看來只是個雜魚啊。呼啊……"
10023105-155 = "你們幾個都出來吧。要去見他們了。"

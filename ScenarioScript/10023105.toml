10023105-38 = "#na;통신자애의 괴도 가면;결론적으로는 왕관을 선생님에게 빼앗긴 셈이 되었지만……"
10023105-39 = "#na;통신자애의 괴도 가면;반대로 생각하면, 메이타로로부터 왕관을 되찾는 것에는 성공한 셈이네요. 그렇다면 전보다는 훨씬 상황이 나아진 셈이죠."
10023105-40 = "#na;통신자애의 괴도 가면;그러니 아쉽지만, 이번에는 그냥 물러나겠어요. 샬레의 '선생님'과 처음으로 만난 것에 대한 존중으로 생각해 주세요."

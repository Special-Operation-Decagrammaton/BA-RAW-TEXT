10023105-42 = "#na;통신자애의 괴도 가면;…………."
10023105-43 = "#na;통신자애의 괴도 가면;선생님, 당신께서는 <돌>과 <예술품>이 구분되는 기준을 알고 계신가요?"
10023105-44 = "#na;통신자애의 괴도 가면;아무리 예술품이라고 한들, 모두가 그 가치를 온전히 알아보지는 못하는 법이죠."
10023105-45 = "#na;통신자애의 괴도 가면;앞서 말씀드렸다시피 그 온전한 가치를 알아볼 수 있는 것은 오로지 저뿐."
10023105-46 = "#na;통신자애의 괴도 가면;그렇다면 그러한 물건들은 제가 보관하는 게 맞지 않겠어요?"
10023105-47 = "[s] \"그것이 네가 물건을 훔치는 이유……?\""
10023105-48 = "#all;hide"
10023105-49 = "#wait;500"
10023105-50 = "#na;통신자애의 괴도 가면;네, 그것이야말로 아름다움에 대한 저의 사랑. 헌신과 자비…… 자애죠."
10023105-51 = "#na;통신자애의 괴도 가면;알아봐 주는 사람이 없다면, 영원히 어둠 속에 묻혀버릴지도 모르는 예술품들을, 언젠가 그 가치를 알아봐 줄 세상을 위해 남기고자 하는 것."
10023105-52 = "#na;통신자애의 괴도 가면;우리는 이름을 갖고 태어나지 못하니, 호칭이란 타인에 의해 규정되기 마련이죠."
10023105-53 = "#na;통신자애의 괴도 가면;세상은 저를 괴도라고 불렀고, 그래서 저는 거기에 약간의 수정을 가하기로 했어요."
10023105-54 = "#na;통신자애의 괴도 가면;……물론, 이런 저를 두고 세상 사람들은 이해할 수 없다. 그런 건 사랑이 아니다. 제정신이 아니다. 손가락질을 하고는 하지요."
10023105-55 = "#na;통신자애의 괴도 가면;그러니 당신께서 그렇게 생각하시는 것도 어쩔 수 없……."

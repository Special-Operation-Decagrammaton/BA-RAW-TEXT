[translation]
10023105-2 = "Ugh...!"
10023105-3 = "That's truly an exceptional power... Is this...the power of Schale's Sensei that everyone's been talking about?"
10023105-11 = "Crown retrieved!"
10023105-12 = "Obtained a rare item! Bum bum bum!"
10023105-13 = "What should we do...about her...?"
10023105-19 = "...!"
10023105-20 = "Watch your respiratory system, Sensei. This smoke isn't good for it."
10023105-22 = "Gah! My eyes are itchy! *cough* *cough* Momoi, are you there?"
10023105-24 = "Eek! I hear you right beside me, but I can't see you!"
10023105-29 = "Suddenly, a small marble-looking object rolled into my foot."
10023105-33 = "And as I picked up the marble..."
10023105-34 = "Hello. Sensei?"
10023105-35 = "[s] \"...Yes, I can hear you.\""
10023105-37 = "I wanted to apologize for parting the way we did."
10023105-38 = "You won, in the end. You have the Crown."
10023105-39 = "But on the other hand, I have successfully wrested the Crown from Meitaro's hands. It's better this way."
10023105-40 = "So, I'm not fully satisfied, but I'll let it go this time. Please think of this as my token of respect towards our first meeting, Schale's Sensei."
10023105-41 = "[s] \"...You've been doing this alone, all this time?\""
10023105-42 = "..."
10023105-43 = "Sensei, do you know the difference between a stone and a piece of art?"
10023105-44 = "To some, there is none. That's how blind they are to the true value of art."
10023105-45 = "I meant what I told you earlier. I am the only one who can understand its beauty, see its true value."
10023105-46 = "And so, only I am capable of safekeeping these items, am I not?"
10023105-47 = "[s] \"And that's why you choose to be a thief?\""
10023105-50 = "Yes. That is my love, devotion and mercy towards beauty... My benevolence."
10023105-51 = "I take the artwork, which would otherwise be lost to darkness forever, and keep it until the world is ready to experience it."
10023105-52 = "\"On the day we are born, we are pure: without titles, without labels. And so we accept the ones others gift us.\""
10023105-53 = "The world has been calling me a thief, so I accepted it with my own twist."
10023105-54 = "...Of course, people tell me they don't understand, that it's not a love, that I'm insane."
10023105-55 = "So I can't do anything if you also—"
10023105-56 = "[s] \"Well... I don't really think of you that way.\""
10023105-57 = "Huh?!"
10023105-60 = "[ns1] \"It's not easy, but I do understand.\" \n[ns2] \"I'm your teacher. I wouldn't judge you.\" \n[ns3] \"I'll always do my best to understand you.\""
10023105-66 = "No one has ever...responded like that before."
10023105-67 = "I'm not just any student. Can you really understand a thief, Sensei?"
10023105-68 = "[s] \"As an adult and your teacher, it's not my job to judge you.\""
10023105-69 = "What if that thief is a stubborn, twisted person? One who will never come around?"
10023105-73 = "[ns] \"I have a knack for not giving up on my students.\""
10023105-74 = "...!"
10023105-75 = "[s4] \"I'll be there to stop my student from going too far off the road.\" \n[s5] \"I'll always take my student's hand when she's lost.\""
10023105-78 = "So, we'll just keep on trying? That's what you're saying?"
10023105-79 = "..."
10023105-80 = "I'd like to ask you a question..."
10023105-81 = "Despite being a criminal, one of the infamous Seven Prisoners, and even the Benevolent Thief... I'm still your student?"
10023105-82 = "[s] \"When I look at you, I only see my student.\""
10023105-83 = "..."
10023105-84 = "...Akira."
10023105-85 = "[s] \"Akira?\""
10023105-86 = "Yes. Kiyosumi Akira."
10023105-90 = "That is my name."
10023105-94 = "Sensei... I'm sure fates will have us cross paths again someday. Until then..."
10023105-100 = "Ugh..."
10023105-101 = "I can see again! Sensei, are you okay?!"
10023105-102 = "Are you injured, Sensei? You are weak, so you must be extra careful."
10023105-103 = "An initial glance seems to indicate good health."
10023105-104 = "[s] \"Yes, I'm okay.\""
10023105-106 = "Um... If you say so, but...your face just looks like you ate a bitter candy..."
10023105-107 = "Is everything okay? I don't know how much more bad news I can handle."
10023105-108 = "[s6] \"Everything is okay. Did we get it?\" \n[s7] \"How about the Crown? We didn't lose it or anything, right?\""
10023105-113 = "Here..."
10023105-117 = "It's safe."
10023105-119 = "Yuzu took out the Crown, and everyone sighed in relief."
10023105-120 = "Although both the Benevolent Thief and Meitaro ran away, we were all happy that everyone was safe."
10023105-124 = "*huff* *huff* No one's after me, right? Good..."
10023105-125 = "I can still do this... As long as I don't give up, an opportunity will open up..."
10023105-126 = "I know... I know it! There's a reason I survived!"
10023105-128 = "Huh? Is that so? Then, survive this."
10023105-132 = "Who's th—"
10023105-141 = "Ugh?!"
10023105-153 = "What was that? I thought there was gonna be a fight."
10023105-154 = "Magnate of the back alleys, you say? Just small fry."
10023105-155 = "Hey, let's go! We've got some kiddos to say hi to."

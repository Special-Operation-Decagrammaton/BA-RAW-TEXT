103090-251 = "อาริสึเลือกที่จะเป็นอาริสึ ไม่ใช่ใครหรือสิ่งใดอื่นค่ะ"
103090-252 = "อาริสึจัง..."
103090-254 = "อื้ม อาริสึจัง...... พรุ่งนี้เราไปด้วยกันนะ เราจะไม่แยกจากกันเด็ดขาดเลย"

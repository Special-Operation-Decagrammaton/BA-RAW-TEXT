103090-409 = "Y-Yes...! That's true."
103090-410 = "Life is suffering all the way to the end. Heehee..."
103090-411 = "Well, villains like us are supposed to suffer in the dark so the main characters can play their roles."
103090-416 = "..."
103090-417 = "But I'm glad that we get to be together."
103090-419 = "H-Hime..."
103090-420 = "..."
103090-426 = "And someday..."
103090-427 = "...Yeah."
103090-441 = "Um... Rin, are you here?"
103090-442 = "...Oh, yes. Please come in, Ayumu."
103090-452 = "I'm sorry to interrupt your break..."
103090-453 = "But could you take a look at this please?"

103090-221 = "ค่ะ ใช่ค่ะ"
103090-226 = "...... มันเหมือนกับว่าในตัวอาริสึ ยังมีสิ่งที่เรียกว่า <เคย์> หลงเหลืออยู่น่ะค่ะ"
103090-232 = "ว่าไงนะ? คะ... เคย์? จริงเหรอ? เราใช้ดาบแห่งแสงจัดการเคย์ไปแล้วไม่ใช่เหรอ!?"

[translation]
103090-1 = "Episode 9; The Last Night on the Ground"
103090-2 = "Schale Temporary Lodging"
103090-4 = "So that's the gist of it."
103090-5 = "Thanks for the update. I'd heard bits and pieces of it already."
103090-6 = "In your absence, we'll protect the Millennium district."
103090-7 = "Or rather, Kivotos."
103090-8 = "Okay. I'll be counting on you. "
103090-11 = "No, it's the other way around. Yuuka... "
103090-18 = "I'm counting on you to take care of yourself and come back home safely."
103090-23 = "...It's a promise."
103090-26 = "Hoshino..."
103090-27 = "I understand the situation, Ayane. You're boarding Utnapishtim with Sensei to infiltrate the Ark."
103090-28 = "But you're not going alone, Ayane!"
103090-29 = "B-But... "
103090-31 = "There'll be long and difficult fights when you get to the Ark."
103090-32 = "The more friends to fight alongside, the better."
103090-33 = "And more than anything else..."
103090-34 = "Shiroko is on the Ark, right?"
103090-41 = "..."
103090-42 = "...It's not for certain, but I think so."
103090-43 = "I wanna see Shiroko for myself. We all feel that way."
103090-45 = "If we board the Ark, Shiroko will come to intercept us."
103090-46 = "It's our job to subdue and capture Shiroko."
103090-47 = "We took on that responsibility. We promised Sensei it would be us to stop her."
103090-48 = "But...the probability for the mission's success is three percent... We should prepare for the chance of failure and leave..."
103090-52 = "That negativity isn't hard-boiled of you at all!"
103090-53 = "H-Huh...?!"
103090-62 = "Wow! ☆ Problem Solver!"
103090-65 = "Hi! We're here to play."
103090-66 = "I-It's good to see you."
103090-67 = "*sigh* I'm glad I'm not the only worried one..."
103090-68 = "What are you doing, gabbing about failure this, failure that? The operation hasn't even started! "
103090-70 = "W-Well... That's..."
103090-73 = "During times like this...! "
103090-78 = "You're supposed to say, \"Let's go out to eat ramen when we're done!\""
103090-85 = "I-I see! That's pretty hard-boiled, Aru!"
103090-86 = "It sounded a little ominous to me for some reason."
103090-87 = "Heeheehee. She says that, but Aru almost cried when she heard Kayoko was gonna go alone."
103090-89 = "What?! I-I did not!"
103090-90 = "Heehee... You were all like, \"Kayoko! You can't get hurt up there, okay?!\""
103090-91 = "A-An outlaw like me would never say that!"
103090-93 = "Honestly, it's not gonna be a walk in the park, but I'll be okay."
103090-94 = "The plan was put together by the best students of each academy. And most of all, [USERNAME] Sensei will be there."
103090-95 = "As long as Sensei's there...I feel like everything will be okay. So I'm not too worried."
103090-96 = "...You're right."
103090-98 = "I have to agree."
103090-99 = "Think about all the things we've achieved thanks to Sensei."
103090-100 = "..."
103090-101 = "..."
103090-121 = "...Right. Unimaginable things have happened when Sensei was with us."
103090-122 = "Heh, right? So let's have faith in those unimaginable things."
103090-127 = "...Okay!"
103090-128 = "Let's rescue Shiroko."
103090-129 = "Yeah! It's the Shiroko capture operation!"
103090-131 = "For the millionth time, she's not a wild animal..."
103090-133 = "Desert Excavation Site Temporary Lodging"
103090-136 = "I went to see the intergalactic battleship, but..."
103090-137 = "Yeah, it's kind of different than what we imagined."
103090-139 = "Yes... It can't even go into space, and it doesn't have any weapons. It must be something other than an intergalactic battleship."
103090-141 = "Sensei's gonna get on it to go and attack the evil base in the stratosphere tomorrow..."
103090-142 = "What should we do now?"
103090-143 = "Hmm, maybe we should go back to Millennium like Yuuka said...? I think we'd just be a burden to all these elite people..."
103090-149 = "I would like to go with Sensei."
103090-151 = "Aris?"
103090-152 = "Wh-What're you saying?"
103090-153 = "She's right. Aris, the Space Hero debut isn't gonna happen now."
103090-154 = "I am disappointed about the Space Hero, but..."
103090-155 = "I am the only one who can protect the battleship."
103090-157 = "Huh? What makes you say that?"
103090-158 = "B-Because there's no weapons on the ship..."
103090-159 = "Does this have to do with the Sword of Light? Is that why you wanna go?"
103090-161 = "Yes, the Sword of Light was designed for use in an intergalactic battleship by the Engineering Department."
103090-162 = "And there is no one else in Kivotos who can wield it."
103090-165 = "..."
103090-167 = "The Engineering Department did not actually design it for space battles, so they say the output will not do much in such a large battle, but..."
103090-168 = "If I am the only one who can protect the battleship... "
103090-169 = "If I am someone who can help Sensei, in any way, I would like to help."
103090-171 = "B-But...still..."
103090-172 = "Okay, I know how you feel. Sensei has helped so much."
103090-181 = "...So, should we all go together?"
103090-183 = "Huh? What?"
103090-184 = "Y-Yuzu...?"
103090-186 = "If we think about it, Aris has experienced a lot of dangerous situations."
103090-187 = "We didn't understand a lot of them. We needed a lot of help to resolve them."
103090-188 = "Th-That's true..."
103090-189 = "If I'm being honest, I still don't understand a lot of it. I don't know why the president is after Aris or what she's hiding."
103090-190 = "M-Me neither..."
103090-191 = "But that's not important!"
103090-192 = "R-Right..."
103090-194 = "..."
103090-196 = "I...I don't want us to be left behind. "
103090-197 = "Even if we don't understand the situation, we should be okay if we stick together..."
103090-198 = "Yeah... I don't understand much of what's happened until now...but I haven't felt too anxious because I was with Sensei and everyone else..."
103090-199 = "I got to meet new people...like the RABBIT Squad and the head prefect...although I was a bit scared of them..."
103090-204 = "But...I liked it better than hiding in a cabinet."
103090-205 = "So...I wanna go with Aris."
103090-206 = "The Game Development Department can continue to exist thanks to Aris."
103090-207 = "So if there's something Aris wants to do...we should help her."
103090-208 = "W-We're party members, remember?"
103090-213 = "..."
103090-215 = "Yes, that's true, Yuzu! We should go together! That's the right thing to do!"
103090-216 = "Okay! Aris, we might not be going as space heroes, but we'll protect the battleship by your side."
103090-218 = "Yes. I would like to go with my party members! Then, I will not be scared!"
103090-220 = "Aris... Are you afraid?"
103090-221 = "Yes, I am."
103090-226 = "...I can still feel Kei inside of me."
103090-232 = "Huh?! Kei? Really? I thought we blasted Kei with the Sword of Light!"
103090-233 = "K-Kei... I'm pretty sure that's not the right name...!"
103090-235 = "I do not know what Kei is or what Kei wants from me."
103090-236 = "If I am honest, I do not even know who I really am. "
103090-237 = "Kei says I am a princess left behind by the Nameless Gods, and President Rio says I am a weapon that will bring destruction to the world."
103090-238 = "The princess, Kei, the Ark, the Nameless Gods... I do not know anything about those things..."
103090-239 = "But I have Momoi, Midori, Yuzu, and Sensei with me..."
103090-240 = "I don't need to know what those things are. I can be just Aris."
103090-244 = "[ns] \"Let's do that then, Aris!\""
103090-246 = "[ns] \"You get to choose who you want to be, Aris.\""
103090-248 = "..."
103090-249 = "I want to go help Sensei with my party members."
103090-250 = "I want to be a hero and a member of the Game Development Department."
103090-251 = "I want to decide what I, Aris, do next."
103090-252 = "Aris..."
103090-254 = "Yes, Aris... Let's all leave together tomorrow. We're never gonna be apart."
103090-255 = "A-Aris! You're so impressive! You really act like a hero!"
103090-257 = "Yes, of course! That is because I am a hero!"
103090-258 = "Although it will not be anytime soon, I am going to be a space hero someday! Because that is what is trending!"
103090-260 = "You really aren't giving up on that concept... "
103090-262 = "It might become outdated if we don't implement it soon..."
103090-264 = "No!"
103090-265 = "This kind of stuff lasts longer than you think!"
103090-267 = "Just like Dinosaur Tornado! It's gonna be a masterpiece that will be talked about forever!"
103090-272 = "You mean talked about forever because it's so bad...?"
103090-277 = "Space Hero is..."
103090-278 = "...like Dinosaur Tornado...?!"
103090-280 = "O-Oh?! You hurt Aris' feelings!"
103090-286 = "That's the summary of the current situation."
103090-287 = "Hanako..."
103090-288 = "I see. It's going to be a tough mission."
103090-290 = "W-Will you be okay? "
103090-291 = "Well...Sensei will be with you, so..."
103090-292 = "Yes, it should be okay. It'll turn out fine somehow. Heehee."
103090-293 = "Yes, since Sensei will be there..."
103090-294 = "...I've been thinking."
103090-298 = "What if Sensei never came to the Make-Up Work Club?"
103090-299 = "What would have happened to us?"
103090-307 = "If that had happened..."
103090-308 = "Also, I've been thinking about all the things that were possible thanks to Sensei..."
103090-327 = "..."
103090-328 = "..."
103090-329 = "Hanako..."
103090-330 = "Come back safely, Hanako. We'll be protecting the academy in the meantime."
103090-331 = "Yes! Come back quickly! We'll be defending Kivotos!"
103090-333 = "Heehee. I'll come right back to you all."
103090-335 = "Be careful up there, Ako."
103090-336 = "President..."
103090-337 = "As much as I'd like to come, I should be here. With all our best forces up there, I'll be the best bet if there's an emergency."
103090-338 = "Understood. I'll give you a full report when I return."
103090-339 = "I'll be waiting for you."
103090-341 = "..."
103090-343 = "..."
103090-345 = "Are you worried, Seia?"
103090-346 = "N-No, not really..."
103090-348 = "How many cups of black tea did you have, Nagi? You're not gonna be able to sleep at this rate."
103090-350 = "Th-This is...just..."
103090-351 = "...I was wishing I still had the ability to have prophetic dreams."
103090-352 = "Seia..."
103090-354 = "Hmm... Seia, you're worried too."
103090-355 = "I'm worried as well."
103090-356 = "But this kind of story usually has a happy ending. So let's believe it's gonna go that way!"
103090-357 = "...Right. We wouldn't all be gathered together like this if it wasn't for Sensei."
103090-358 = "So, as you said, Mika, I choose to believe in the happy ending!"
103090-359 = "Right, if it wasn't for Sensei..."
103090-363 = "Hmm, no. I don't really wanna think about that."
103090-368 = "Sensei, and everyone..."
103090-369 = "Please come back safely."
103090-370 = "We'll make sure everything is safe at ground level. ☆"
103090-372 = "Wh-What should we do now?"
103090-373 = "Nothing changes. As SRT, we'll protect D.U. while Sensei is on the mission..."
103090-374 = "I mean, protect all of Kivotos."
103090-375 = "While Sensei is absent, we must secure the safety of Kivotos. That's our mission."
103090-376 = "Right. Those Kaiser bastards retreated for now, but who knows when they'll show up again to take advantage of the chaos."
103090-377 = "And with the General Student Council paralyzed, the officers will be scrambling to sort out the situation somehow."

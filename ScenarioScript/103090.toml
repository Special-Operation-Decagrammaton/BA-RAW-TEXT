103090-380 = "Um... I-I hope Sensei will be safe..."
103090-381 = "Don't worry too much, Miyu. Sensei will come back like nothing happened and tease us like usual."
103090-383 = "...Yes, that's how Sensei is."
103090-384 = "Heeheehee. Right. That's good old Sensei."
103090-389 = "There don't seem to be any more enemies here."
103090-394 = "..."
103090-395 = "Saori, what's on your mind?"
103090-396 = "...Oh, it's nothing."
103090-398 = "You were thinking about how strange it is to fight along with Trinity, right?"
103090-399 = "I can't get anything past you... Yes, things that were unimaginable before have been happening every day..."
103090-400 = "The suffering of life hasn't changed, but..."

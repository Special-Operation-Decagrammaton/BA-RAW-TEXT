[translation]
103090-1 = "第9話;陸上的最後一夜"
103090-2 = "夏萊．臨時據點"
103090-4 = "……事情就是這樣，乃愛。"
103090-5 = "好的。優香醬，你所說的我確實聽到了。"
103090-6 = "這段期間，千年自治區──"
103090-7 = "不，我們會守護奇普托斯的。"
103090-8 = "嗯，拜託了。"
103090-11 = "我才是……拜託你了哦。"
103090-18 = "請千萬別受傷，一定要好好保重。"
103090-23 = "……嗯。"
103090-26 = "──星野前輩……"
103090-27 = "事情就是這樣，綾音醬。#n我們也要搭乘「生命守護者」和老師一起前往「方舟」哦。"
103090-28 = "不可能讓綾音醬自己去吧！"
103090-29 = "可，可是……！"
103090-31 = "抵達方舟之後很可能需要戰鬥不是嗎？"
103090-32 = "既然如此，我認為人手越多越好哦。"
103090-33 = "而且…… "
103090-34 = "白子醬，也在那艘方舟上對吧？"
103090-41 = "……"
103090-42 = "……是，我想應該沒錯。"
103090-43 = "想見到白子前輩的不只綾音醬一個人。#n這裡的所有人都一樣。"
103090-45 = "如果是那種狀態的白子醬，一定會來妨礙我們吧……"
103090-46 = "而抓住白子醬就是大叔我們的工作哦～"
103090-47 = "我也和老師說過了。"
103090-48 = "但是……這個作戰的成功機率非常低。#n得考慮我們失敗的情況──"
103090-52 = "別說那種觸霉頭的話！"
103090-53 = "你，你們是……！"
103090-62 = "哇啊～是便利屋的各位☆"
103090-65 = "呀齁～我們來玩了唷！"
103090-66 = "辛，辛苦了……！"
103090-67 = "唉……這裡的氣氛也很沉重。"
103090-68 = "作戰都還沒開始就已經在擔心失敗了嗎？"
103090-70 = "呃，咦？那是……"
103090-73 = "這種時候！"
103090-78 = "就該說#n「順利回來之後，大家一起去吃拉麵吧！」才對！"
103090-85 = "原，原來如此……這就是冷硬派的作風！不愧是亞瑠大人！！"
103090-86 = "……不是，聽起來反而像是在立Flag吧。"
103090-87 = "咯呵呵……但是亞瑠醬他啊，聽到佳世子醬要一個人去的時候，#n馬上就一把鼻涕一把眼淚地──"
103090-89 = "哪，哪有！我什麼時候──"
103090-90 = "啊哈哈！說什麼小心別受傷～千萬要小心～之類的──"
103090-91 = "我，我才沒有說那種話！？"
103090-93 = "……雖然有很多需要擔心的事，不過沒問題的。"
103090-94 = "這可是各個學園合力做出的計畫──[USERNAME]老師也在。"
103090-95 = "只要有老師在……不管發生什麼事，一定會沒問題的。"
103090-96 = "……嗯。"
103090-98 = "說的也是……"
103090-99 = "一直以來，都是因為有老師在──"
103090-100 = "……"
103090-101 = "……"
103090-121 = "嗯……只靠我們絕對辦不到的事，也設法做到了。"
103090-122 = "說的沒錯……所以，只要相信這次也一定沒問題就好了唷。"
103090-127 = "……是！"
103090-128 = "我們去救白子醬吧。"
103090-129 = "嗯嗯！這是白子醬捕捉作戰☆"
103090-131 = "都說了白子前輩不是野生動物啊……"
103090-133 = "沙漠．挖掘區域的臨時據點"
103090-136 = "聽說發現了「宇宙戰艦」，所以才來看看的……"
103090-137 = "唔嗯，感覺和我們想像的有點不一樣呢。"
103090-139 = "就是啊……好像到不了宇宙，也沒有什麼武裝。#n看來這不是宇宙戰艦，而是某種別的東西……吧。"
103090-141 = "老師說「要搭乘這個去攻略大本營」……"
103090-142 = "……姐姐，我們該怎麼做呢？"
103090-143 = "嗯……我想，照優香所說的回去千年會比較好。#n……就算繼續待在這裡，也只會給大家添麻煩……"
103090-149 = "愛麗絲想和老師一起去。"
103090-151 = "……愛麗絲醬？"
103090-152 = "為，為什麼……？"
103090-153 = "呃，為什麼呢！？#n這艘船到不了宇宙，所以沒辦法進行「宇宙勇者」的出道唷？"
103090-154 = "雖然那也非常可惜……"
103090-155 = "但是能夠守護這艘戰艦的就只有愛麗絲而已。"
103090-157 = "咦……愛麗絲醬，那是什麼意思？"
103090-158 = "那個……是因為，戰艦沒有武器嗎……？"
103090-159 = "因為有「光之劍」，所以愛麗絲醬想去嗎……？"
103090-161 = "是的。愛麗絲持有的「光之劍」是工程師部的大家為宇宙戰艦而製作的武器。"
103090-162 = "目前奇普托斯能使用它的就只有愛麗絲而已。"
103090-165 = "……"
103090-167 = "雖然工程師部的大家說「那是半開玩笑研發的東西，這種程度的輸出能力無法對戰艦級別的戰鬥有所幫助」……"
103090-168 = "但是……如果愛麗絲是守護戰艦唯一的方法……"
103090-169 = "如果愛麗絲能為老師做出一點貢獻的話……愛麗絲也想一起去。"
103090-171 = "但，但是……"
103090-172 = "嗯，我能明白愛麗絲的心情。#n我們真的受了老師很多照顧。"
103090-181 = "……那，那要不要我們大家一起去？"
103090-183 = "咦……咦咦！？"
103090-184 = "柚子醬……？"
103090-186 = "你，你們想……至今為止也發生了很多危險的事……"
103090-187 = "其中也有我們無法理解的事……以及很多只靠我們無法解決的事……"
103090-188 = "是，是沒錯……"
103090-189 = "我，還不太明白學生會長為何會盯上愛麗絲……當時，究竟發生了什麼事情……"
103090-190 = "我，我們也一樣……"
103090-191 = "不過就算是這樣，我們也沒必要去吧！"
103090-192 = "就，就是說啊……"
103090-194 = "……"
103090-196 = "我──不希望我們，再被分開了。"
103090-197 = "就算，無法理解狀況，只要能跟大家在一起……就不會有問題……"
103090-198 = "雖然這次也發生很多無法理解的事……#n不過，因為和大家跟老師在一起……所以並不會很害怕……"
103090-199 = "能遇見新的人……像是RABBIT小隊，或是風紀委員長……#n當，當然還是會害怕，不過──"
103090-204 = "──比起躲在置物櫃裡瑟瑟發抖……我覺得，這樣好多了。"
103090-205 = "所以，我想要……和愛麗絲醬一起去。"
103090-206 = "是因為有愛麗絲醬，我們遊戲開發部才能持續到現在……"
103090-207 = "所以，愛麗絲醬如果有想做的事……#n這次，就該輪到我們幫忙了……"
103090-208 = "我們是──夥，夥伴呀……！"
103090-213 = "……"
103090-215 = "你說的對，柚子……說得太好了！#n綠，我們也一起去吧！"
103090-216 = "嗯，姐姐……愛麗絲醬，既然無法成為「宇宙勇者」……#n那麼就成為戰艦的主力輸出吧！"
103090-218 = "……是！有大家在就像獲得了一百人的力量一樣！愛麗絲不會再害怕了！"
103090-220 = "愛麗絲醬……也害怕過嗎？"
103090-221 = "是的。曾經非常非常害怕。"
103090-226 = "……「Kei」還留在愛麗絲的身體裡。"
103090-232 = "咦！？K，Kei……真的嗎！？#n那傢伙不是被光之劍打飛了嗎……"
103090-233 = "結果真的叫「Kei」……沒問題嗎……這個名字……"
103090-235 = "愛麗絲對Kei的真實身分……#n以及Kei究竟期望愛麗絲做些什麼，並不是很了解。"
103090-236 = "……愛麗絲就連「愛麗絲」的事也不清楚。"
103090-237 = "Kei說愛麗絲……是「無名之神」留下的王女。#n莉央會長則說愛麗絲是毀滅世界的兵器。"
103090-238 = "不管是「王女」、「Kei」、「方舟」、「無名之神」……#n愛麗絲對和愛麗絲有關的一切都一無所知……"
103090-239 = "但是……因為有大家……因為有老師在……"
103090-240 = "就算不知道那些事情，愛麗絲也能成為「愛麗絲」。"
103090-244 = "[ns]「嗯。可以成為勇者唷。」"
103090-246 = "[ns]「你想成為的存在，可以由你自己決定──愛麗絲。」"
103090-248 = "……"
103090-249 = "愛麗絲想和大家──想和夥伴們一起幫助老師。"
103090-250 = "愛麗絲想成為勇者……想成為遊戲開發部的一員。"
103090-251 = "愛麗絲想決定自己……決定「愛麗絲」的事！"
103090-252 = "愛麗絲醬……"
103090-254 = "嗯……愛麗絲醬，明天一起出發吧。絕對會陪在你身邊的。"
103090-255 = "愛麗絲真是帥氣！剛才就像真正的勇者一樣！"
103090-257 = "是！這是當然的！因為愛麗絲就是勇者！"
103090-258 = "還有，雖然這次沒辦法……不過總有一天也要成為宇宙勇者！"
103090-260 = "那個，原來還沒放棄啊……"
103090-262 = "因，因為會受流行影響，可能得趕快才行……"
103090-264 = "不對！"
103090-265 = "這種東西可是意外能夠維持很久的唷？"
103090-267 = "就像「恐龍龍捲風」是永遠膾炙人口的名作一樣！"
103090-272 = "不是……「迷」作嗎？"
103090-277 = "宇，宇宙勇者……"
103090-278 = "是恐龍龍捲風級別的嗎……"
103090-280 = "啊……愛麗絲醬好像很失落……！？"
103090-286 = "所以──事情變成這樣了。"
103090-287 = "花子醬……"
103090-288 = "這樣啊，這將會是很困難的任務吧。"
103090-290 = "會，會順利的吧？"
103090-291 = "不……不過老師也在…… "
103090-292 = "沒錯。我想一定沒問題的。唔呵呵♡"
103090-293 = "嗯，既然老師在的話，一定……"
103090-294 = "……我有時候會這麼想。"
103090-298 = "當時，老師如果沒有來當補課部的班導師……"
103090-299 = "我們會怎麼樣呢──這樣。"
103090-307 = "這，這個……"
103090-308 = "以及因為有老師，我們才能完成的事……"
103090-327 = "……"
103090-328 = "……"
103090-329 = "花子醬……"
103090-330 = "要注意安全哦，花子。#n我們會在這段期間守護好學園的。"
103090-331 = "沒錯！在我們保護奇普托斯的時候，俐落地解決事件吧！"
103090-333 = "呵呵，我知道了──我很快就會回來的。"
103090-335 = "亞子，保重身體。"
103090-336 = "委員長……"
103090-337 = "我應該留在這裡──這個判斷是正確的。#n發生緊急狀況時，我是最能有效率地解決問題的人吧。"
103090-338 = "……是。回來之後會再向您報告。"
103090-339 = "嗯，我等著。"
103090-341 = "……"
103090-343 = "……"
103090-345 = "你很擔心嗎，聖亞同學？"
103090-346 = "不，並不是那樣──"
103090-348 = "雖然渚醬這麼說，現在這是第幾杯紅茶了～？#n喝那麼多沒問題嗎？晚上睡得著？"
103090-350 = "這，這是因為……"
103090-351 = "……我只是在想，如果自己還有預知夢的能力會怎麼樣。"
103090-352 = "聖亞同學……"
103090-354 = "嘿～聖亞醬也很擔心啊。"
103090-355 = "雖然我也一樣就是了。"
103090-356 = "不過這種故事不都是HappyEnd嗎？#n所以──相信他們吧。"
103090-357 = "……啊啊。我們能像這樣聚在一起，如果沒有老師在是不可能的吧。"
103090-358 = "所以……就像彌香說的一樣，相信他們吧。"
103090-359 = "沒錯沒錯☆#n要是沒有老師的話──"
103090-363 = "不對，現在就不要想那種事吧。"
103090-368 = "老師，還有大家──"
103090-369 = "……祝各位武運昌隆。"
103090-370 = "地上的安全就由我們來保護，交給我們吧☆"
103090-372 = "我，我們現在該怎麼辦？"
103090-373 = "和平時沒什麼不同。#n在老師執行作戰的期間，就由我們來守護D.U.──"
103090-374 = "不，守護奇普托斯的安全。"
103090-375 = "「在老師不在的期間，維護奇普托斯的治安」這就是我們SRT的任務。"
103090-376 = "沒錯。凱薩他們雖然離開了，說不定會趁亂再次現身。"
103090-377 = "就是說呀～#n而且聯邦學生會為了釐清現狀，似乎也在東奔西跑呢。"
103090-378 = "……不過以那些傢伙的速度來看，可能會等老師回到地上之後才開始吧？"
103090-380 = "嗚嗚……老師，希望會沒事。"
103090-381 = "不用那麼擔心，美優。#n老師他啊，之後一定會一臉若無其事地回來的！"
103090-383 = "……嗯。總覺得老師確實會這麼做。"
103090-384 = "咯嘻嘻……就是啊。老師確實給人那種印象。"
103090-389 = "……沒有發現敵人的蹤跡。"
103090-394 = "……"
103090-395 = "沙醬，怎麼了嗎？"
103090-396 = "……不，沒什麼。"
103090-398 = "反正八成是在想我們居然會跟三一一起戰鬥……之類的吧？"
103090-399 = "就，就是呀……以前絕對無法想像的事情，好像一件件地發生……"
103090-400 = "活著雖然依舊痛苦……但怎麼說呢……"
103090-401 = "會期待著「明天」，對吧？"
103090-402 = "是，是……我不太清楚該怎麼表達才好…… "
103090-403 = "……"
103090-405 = "……要發表感想的話，等一切都結束再說也不遲。"
103090-406 = "「虛假的聖所」的威脅似乎還沒結束。"
103090-409 = "是，是……！"
103090-410 = "人生本來就又累又痛苦，耶嘿嘿……"
103090-411 = "為了讓主角能好好活躍，我們這種人也有必要在暗地裡努力啊。"
103090-416 = "……"
103090-417 = "……不過，大家能像這樣重新聚在一起，我覺得很開心。"
103090-419 = "公……公主醬……"
103090-420 = "……"
103090-426 = "之後，總有一天──"
103090-427 = "──啊啊……說的沒錯。"
103090-441 = "……琳前輩，您在嗎？"
103090-442 = "……是，怎麼了嗎？步。"
103090-452 = "抱歉在休息時打擾您……"
103090-453 = "有件需要您立刻確認的事……"
103090-460 = "聯邦學生會的緊急通訊網從剛才開始就響個不停……#n好像是在找琳前輩。"
103090-461 = "……看來通訊網已經成功修復了呢。"
103090-465 = "這個號碼是……"
103090-466 = "是……我想應該是財務室長。#n那個……我有想過是否要切斷通訊，但為了以防萬一……"
103090-467 = "知道了，我來接吧。"
103090-468 = "是，是……那麼我先告辭了……"
103090-469 = "好的。謝謝你，步。"
103090-479 = "……琳行政官──！"
103090-480 = "你現在在哪裡──？沒有受傷吧！？"
103090-481 = "財務室長……看來你平安無事。"
103090-482 = "──聽不太清楚。不過總算是修復了通訊網──"
103090-483 = "你人在哪裡？──剛才聖所之塔──"
103090-484 = "正在召集其他室長──凱薩──"
103090-485 = "琳行政官── "
103090-486 = "……碧。"
103090-487 = "對不起，琳前輩。#n我，沒想到事情會變成這樣──"
103090-488 = "……不，我並沒有埋怨你。#n你只是盡了自己應盡的職責而已。"
103090-489 = "所以，我也要盡我應盡的職責。"
103090-490 = "──現在，在哪裡做什麼──和夏萊在一起嗎？──"
103090-494 = "碧。"
103090-498 = "萬一我發生什麼事的話，聯邦學生會──#n奇普托斯就拜託你了。"
103090-499 = "……！？你剛才──"
103090-500 = "……請保重身體，碧。"
103090-508 = "（於是陸上的最後一夜──迎來了黎明）"
103090-514 = "老師，出發的準備已經就緒。"
103090-515 = "大家都在艦橋待命。"
103090-516 = "[ns]「嗯，知道了。」"
103090-520 = "[ns]「那麼……出發吧。」"
103090-526 = "下一話;前往天上遙遠的彼方"

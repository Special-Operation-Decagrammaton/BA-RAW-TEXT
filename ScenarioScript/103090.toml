103090-137 = "นั่นสิ แต่มันออกจะแตกต่างไปจากที่พวกเราคิดเอาไว้อยู่นะ"
103090-139 = "อืม... เห็นว่ามันทะยานสู่อวกาศไม่ได้ แล้วก็ไม่มีอาวุธอะไรติดตั้งไว้เลย สงสัยมันจะไม่ใช่เรือรบอวกาศ แต่เป็นอย่างอื่นน่ะ"

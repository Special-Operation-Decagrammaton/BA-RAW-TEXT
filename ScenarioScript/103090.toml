103090-47 = "ฉันบอกกับครูไว้แล้วเหมือนกันน่ะ"
103090-48 = "แต่ว่า... อัตราความสำเร็จของปฏิบัติการนี้มันต่ำมากเลยค่ะ ฉันว่าเราควรเตรียมตัวเผื่อไว้... ในกรณีที่ปฏิบัติการล้มเหลว..."

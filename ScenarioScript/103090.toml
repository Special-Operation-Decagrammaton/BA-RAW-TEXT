103090-168 = "แต่ถ้าหากหนทางเดียวในการปกป้องเรือรบลำนั้นคืออาริสึละก็..."
103090-169 = "ถ้าหากว่าอาริสึจะเป็นประโยชน์กับคุณครูได้บ้าง... อาริสึก็อยากทำค่ะ"
103090-171 = "ตะ... แต่ว่า... "

[translation]
12015-2 = "嗯……"
12015-3 = "第一中隊全滅！撤退後重新整備！"
12015-4 = "第三中隊無法繼續戰鬥！先行撤退進行補給！"
12015-5 = "……"
12015-6 = "原來如此，我大致明白了。#n夏萊的力量，以及與其對抗所需要的兵力……"
12015-7 = "這股超乎想像的力量……真厲害。"
12015-8 = "雖然沒有小看你們的意思，也許我應該更小心地執行計畫才對。"
12015-9 = "不過你們也並非所向無敵。#n我已經發現了你們的弱點……以及勝利的方式。"
12015-10 = "只要再往這附近多派點兵力……擊潰你們也只是時間的問題。"
12015-13 = "第八中隊，解除待機狀態，請突擊。"
12015-15 = "風紀委員會的第三波攻擊來了！"
12015-16 = "哈啊……哈啊……還有嗎！？"
12015-17 = "在這個狀況下投入更多兵力……！？"
12015-18 = "這，這點程度根本不算什麼！我還能繼續戰鬥！"
12015-19 = "雖然是這樣沒錯……但以亞子的權限根本無法動用這麼多兵力。#n這也代表這場襲擊不是亞子一個人的決定，難道……"
12015-20 = "……是風紀委員長？"
12015-21 = "咦！？陽奈要來嗎！？#n不行不行不行！？我們逃吧，動作快！！！"
12015-22 = "不是，我沒這麼說……冷靜一點，社長……"
12015-26 = "（唦，唦，唦，唦，唦，唦，唦，唦……）"
12015-28 = "呵呵……再繼續下去的話實在有點……"
12015-29 = "如果被委員長發現的話，我和伊織就得手牽手去寫悔過書了……"
12015-30 = "好，那麼……展開第三次交戰吧。#n風紀委員會，發動攻──"
12015-31 = "（唦唦）"
12015-33 = "亞子。"
12015-34 = "……咦？"
12015-35 = "陽，陽，陽奈委員長！？"
12015-37 = "委員長？"
12015-38 = "就，就是他嗎……？#n委員長也就是風紀委員會的最高負責人……？"
12015-39 = "委，委，委員長這個時間怎麼會……？"
12015-40 = "亞子，你現在在哪？"
12015-41 = "我，我嗎？我……這，這個……那個……#n在，在格黑娜近郊的城鎮！和風紀委員一起出來定期巡視……"
12015-42 = "完全在說謊嘛！"
12015-43 = "這果然是行政官的獨斷行動啊……"
12015-44 = "不，不過為什麼委員長這個時間會……您不是在出差嗎？"
12015-45 = "我剛回來。"
12015-46 = "這，這樣啊……！那個，我現在有事情必須要馬上處理……#n稍後再連絡您！現，現在稍微有點忙……！"
12015-47 = "有事要忙……？#n真奇怪，你明明在進行定期巡視……發生什麼事了嗎？"
12015-48 = "咦？那，那個……就是……"
12015-49 = "比如有人擅自在其他自治區動用風紀委員……之類的？"
12015-50 = "……咦？"
12015-56 = "……咦？"
12015-57 = "──！？"
12015-58 = "咦，咦──！？"
12015-59 = "！？"
12015-60 = "委，委，委，委員長！？你，你什麼時候來的！？"
12015-61 = "！！"
12015-62 = "……"
12015-64 = "咦咦咦咦──！？"
12015-66 = "……"
12015-67 = "……給我好好說明這個狀況，亞子。"
12015-69 = "下一話;格黑娜風紀委員長"

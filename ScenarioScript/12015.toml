[translation]
12015-2 = "อืม... \n"
12015-3 = "กองร้อยที่ 1 ต่อสู้ไม่ได้แล้ว เราจะล่าถอยแล้วจัดกองกำลังใหม่ค่ะ!"
12015-4 = "กองร้อยที่ 3 เสียกำลังไปครึ่งหนึ่งแล้วค่ะ จะออกคำสั่งล่าถอยก่อนค่ะ!"
12015-5 = "......"
12015-6 = "อืม พอเข้าใจแล้วละค่ะ... ว่าถ้าจะต่อกรกับชาเล่ต์จะต้องเตรียมกองกำลังมามากแค่ไหน..."
12015-7 = "น่ากลัวกว่าที่คิดไว้อีกนะคะ... ยอดเยี่ยมมากเลยค่ะ"
12015-8 = "ฉันไม่ได้ดูถูกพวกนั้นเลย แต่คงจะต้องวางแผนโจมตีให้รอบคอบกว่านี้แล้วละค่ะ"
12015-9 = "แต่ก็ไม่ใช่ว่าจะชนะพวกฉันได้หรอกนะคะ ฉันเห็นจุดบอดของฝ่ายนั้นแล้ว และก็รู้แล้วละค่ะ ว่าจะเอาชนะได้ยังไง"
12015-10 = "ถ้าเพิ่มกองกำลังและไล่ต้อนไปจากตรงนี้อีก... จะต้องพลิกสถานการณ์ได้อย่างแน่นอนค่ะ"
12015-13 = "เอาละค่ะ กองร้อยที่ 8 ที่อยู่ด้านหลัง บุกเข้าไปได้เลยค่ะ!\n\n"
12015-15 = "คณะกรรมการวินัยเพิ่มกองกำลังหน่วยเป็นครั้งที่ 3 เข้ามาอีกแล้วละค่ะ!"
12015-16 = "แฮ่ก... แฮ่ก... อีกแล้วเหรอ?!"
12015-17 = "ยังมีมาเพิ่มอีกงั้นเหรอ?! "
12015-18 = "จะ... จะเพิ่มมาอีกแค่ไหนก็ทำอะไรฉันไม่ได้หรอก! พวกเรายังสู้ได้สบายอยู่แล้ว!"
12015-19 = "แต่ว่า... อาโกะไม่น่าจะมีอำนาจสั่งการกองกำลังขนาดใหญ่แบบนี้เลยนะ... นี่ไม่น่าใช่คำสั่งบุกโจมตีจาก#nอาโกะคนเดียวแล้วละ..."
12015-20 = "หรือว่า... ประธานกรรมการ?\n\n"
12015-21 = "ว่าไงนะ?! ฮินะมาที่นี่เหรอ?! นะ... หนี... ต้องรีบหนีแล้ว!!"
12015-22 = "เปล่าซะหน่อย ฉันไม่ได้หมายความว่าอย่างนั้นซะหน่อย ใจเย็นๆ หน่อยสิ ประธาน..."
12015-26 = "(ตึง ตึง ตึง ตึ้ง ตึ้ง!)"
12015-28 = "ฮุฮุ... เรื่องนี้นับเป็นประสบการณ์ใหม่สำหรับฉันเหมือนกันนะคะ..."
12015-29 = "หากโดนท่านประธานจับได้ คงได้ไปเขียนหนังสือสำนึกผิดพร้อมกับอิโอริแน่เลยค่ะ... \n"
12015-30 = "เอาละ... การปะทะครั้งที่ 3 คณะกรรมการวินัย! โจม..."
12015-31 = "(ซ่า)"
12015-33 = "อาโกะ\n\n\n"
12015-34 = "หืม?"
12015-35 = "ทะ... ท่านประธาน... ฮินะ?!"
12015-37 = "ประธานเหรอ?"
12015-38 = "ถ้ายัยนั่นเรียกว่าประธานละก็ แสดงว่า... ประธานกรรมการงั้นเหรอ?\n"
12015-39 = "เอ่อ... ทะ... ทำไมท่านประธานถึงได้...?"
12015-40 = "อาโกะ ตอนนี้เธออยู่ที่ไหน?"
12015-41 = "ฉะ... ฉันเหรอคะ? ฉัน… อยู่ที่... คือว่า… ยะ... อยู่แถวชานเมืองเกเฮนน่าค่ะ! กำลังออกตรวจพื้นที่#nกับสมาชิกคณะกรรมการวินัย...."
12015-42 = "โกหกนี่นา!!\n"
12015-43 = "เจ้าหน้าที่อาวุโสคงทำตามอำเภอใจตัวเองจริงๆ ด้วยสินะคะ..."
12015-44 = "จะว่าไป... ท่านประธานติดต่อมาเวลาแบบนี้มีอะไรเหรอคะ... กะ... กลับจากไปติดต่องานมา#nแล้วเหรอคะ?"
12015-45 = "อืม เพิ่งกลับมาถึงพอดี"
12015-46 = "ท่านประธานกลับมาแล้วนี่เอง! ตะ... แต่ว่าฉันมีเรื่องที่ต้องจัดการนิดหน่อย เอาไว้เสร็จแล้วจะติดต่อไปนะคะ! ตอนนี้กำลังยุ่งนิดหน่อยน่ะค่ะ"
12015-47 = "ยุ่งงั้นเหรอ...? เจอเรื่องวุ่นวายระหว่างออกลาดตระเวนรึไง? มีเรื่องอะไรล่ะ?"
12015-48 = "คะ? เอ่อ... คือว่า... แบบว่า..."
12015-49 = "หรือว่าเรื่องยุ่งที่บอก... คือการส่งกองกำลังไปที่เขตปกครองอื่นโดยไม่ได้รับอนุญาต?"
12015-50 = "คะ...?"
12015-56 = "เอ่อ...\n"
12015-57 = "?!\n\n"
12015-58 = "วะ... ว้ากกก!"
12015-59 = "?!\n"
12015-60 = "ปะ... ปะ... ประธาน?! มา... ตั้งแต่เมื่อไร?"
12015-61 = "!!\n\n\n"
12015-62 = "......\n"
12015-64 = "เอ๋?!"
12015-66 = "......\n"
12015-67 = "...ขอคำอธิบายที่ฟังขึ้นด้วยล่ะ อาโกะ"
12015-69 = "ตอนต่อไป;ประธานกรรมการวินัยเกเฮนน่า"

[translation]
10003110-1 = "風紀委員會 夏季合宿訓練 實戰篇"
10003110-4 = "喂，動作再俐落點！這樣就能躲掉了！"
10003110-5 = "是，是……！"
10003110-6 = "我，我知道了！對不起！"
10003110-7 = "簡短回覆！與其動嘴不如動腳！"
10003110-8 = "哈啊，這樣沒問題嗎……"
10003110-9 = "伊織，訓練還順利嗎？"
10003110-10 = "啊，亞子醬。"
10003110-11 = "順利……可能還稱不上。動作仍相當不確實。"
10003110-12 = "太妹一類的不知何時會來，我懷疑目前這狀態是否能應付……"
10003110-13 = "原來如此，這樣的話……伊織，我有個建議。"
10003110-14 = "嗯？"
10003110-15 = "我認為下指示的人得先實際做給大家看，這點很重要。尤其是像動作節奏感這件事，只能透過客觀觀察他人的動作來掌握訣竅。"
10003110-16 = "……咦？"
10003110-17 = "所以，伊織，能示範一下射擊嗎？"
10003110-18 = "咦，示範？我？"
10003110-19 = "是的♪"
10003110-20 = "不，就算不用我也……"
10003110-21 = "好了，已經沒有時間能浪費了，快點開始吧。而且……"
10003110-25 = "我現在代理委員長。你可沒有否決權唷？"
10003110-26 = "啊啊，真是的，知道了知道了！我做，我做就是了！"

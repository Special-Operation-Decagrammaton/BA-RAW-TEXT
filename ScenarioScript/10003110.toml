10003110-4 = "3;이오리 수영복ND;05;모두 빨랑빨랑 못해? 거기! 다리가 보여서 되겠어?\n#3;a\n#3;em;[반응]\n#3;hophop"
10003110-5 = "1;선도부원 A;04;네, 네, 넵!\n#1;ar\n#1;em;[!]"
10003110-6 = "#1;dl\n5;선도부원 B;06;네, 아, 알겠습니, 다!\n#5;al\n#5;em;[!]"
10003110-7 = "#5;dr\n3;이오리 수영복ND;05;대답이 늘어진다! 네는 한 번만!\n#3;em;[반응]\n#3;jump"
10003110-8 = "3;이오리 수영복ND;06;하아, 나 참…….\n#3;stiff"
10003110-9 = "1;아코;02;어때요. 이오리. 훈련은 잘 되어가나요?\n#1;a\n#1;em;[반응]\n#3;m5"
10003110-10 = "3;이오리 수영복ND;02;앗, 아코 쨩."
10003110-11 = "3;이오리 수영복ND;08;잘 되어간다고 할까. 다들 느려터졌다니까?"
10003110-12 = "3;이오리 수영복ND;06;언제 문제아 녀석들하고 전면전을 벌일지도 모르는데, 저런 식으로 굼뜨게 굴다니. 걱정이라니까. 정말로.\n#3;em;[땀]"
10003110-13 = "1;아코;07;아하. 그런가요? 하지만 말이죠. 이오리.\n#1;em;…"
10003110-14 = "3;이오리 수영복ND;02;응?"
10003110-15 = "1;아코;01;훈련을 지도하는 당사자가 이곳에 가만히 앉아 지시만 하고 있어봐야, 아무래도 선도부의 간부로서 본보기가 되질 못하잖아요?"
10003110-16 = "3;이오리 수영복ND;04;……응?\n#3;em;[?]"
10003110-17 = "1;아코;03;후후, 그런 고로 지금부터 이오리가 직접 사격 훈련 시범을 보여주었으면 하는데요. 괜찮죠?\n#1;em;[반짝]\n#1;greeting"
10003110-18 = "3;이오리 수영복ND;09;시, 시범? 내가?\n#3;stiff"
10003110-19 = "1;아코;01;네."
10003110-20 = "3;이오리 수영복ND;08;저, 저기, 아코 쨩? 그런 거라면 굳이 내가 아니더라도…….\n#3;em;…"
10003110-21 = "1;아코;01;지금은 제가 선도부장님 대리니까. 말이죠? 후후……."

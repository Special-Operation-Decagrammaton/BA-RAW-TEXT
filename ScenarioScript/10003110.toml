[translation]
10003110-1 = "แคมป์ฤดูร้อนสุดโหดของคณะกรรมการวินัย <ภาคปฏิบัติ>!"
10003110-4 = "เร็วๆ เข้าหน่อยสิ! นี่! ฉันยังมองทันเธอสับขาวิ่งอยู่เลย วิ่งให้เร็วกว่านี้ไม่ได้รึไง?"
10003110-5 = "คะ...ค่ะ!"
10003110-6 = "ค่ะ! ขะ... เข้าใจแล้วค่ะ!"
10003110-7 = "ตอบยาวเกินไปแล้ว! ตอบแค่ \"ค่ะ\" ก็พอ!"
10003110-8 = "เฮ้อ จริงๆ เลยเชียว..."
10003110-9 = "เป็นยังไงบ้างคะ อิโอริ การฝึกเป็นไปได้ด้วยดีไหมคะ?"
10003110-10 = "อ๊ะ อาโกะจัง"
10003110-11 = "ก็ดีแหละ... คิดว่านะ  แต่ทุกคนดูช้าๆ ลงน่ะ"
10003110-12 = "เราไม่มีทางรู้เลยว่าพวกชอบก่อเรื่องจะโผล่มาอีกเมื่อไหร่ แต่ทุกคนกลับมีท่าทางอืดอาดแบบนี้#nน่ากังวลจริงๆ "
10003110-13 = "หืม งั้นเหรอคะ? แต่ว่านะ... อิโอริ"
10003110-14 = "หืม?"
10003110-15 = "ถ้าผู้ดูแลการฝึกมานั่งออกคำสั่งเฉยๆ แบบนี้ ในฐานะคณะกรรมการวินัยแล้วจะเป็นตัวอย่าง#nให้สมาชิกคนอื่นได้ยังไงคะ?"
10003110-16 = "หืม...?"
10003110-17 = "ฮุฮุ เพราะงั้น... ตั้งแต่ตอนนี้ฉันอยากให้อิโอริสาธิตการฝึกยิงปืนให้ทุกคนดูหน่อยค่ะ ไม่เป็นไรใช่ไหมคะ"
10003110-18 = "สะ...สาธิตเหรอ? ฉันเนี่ยนะ?"
10003110-19 = "ใช่ค่ะ"
10003110-20 = "คะ...คือว่าอาโกะจัง เรื่องแบบนั้นไม่ต้องเป็นฉันก็ได้นี่นา..."
10003110-21 = "ตอนนี้ฉันพูดในฐานะตัวแทนของท่านประธานนะคะ ฮุฮุ..."
10003110-25 = "ต้องทำค่ะ..."
10003110-26 = "อ๊าาาา... เข้าใจแล้ว! แค่ทำก็พอแล้วใช่มั้ยล่ะ! เรื่องแค่นี้เอง!"

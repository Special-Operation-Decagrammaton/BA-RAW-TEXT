[translation]
10003110-1 = "The Prefect Team's Boot Camp Begins!"
10003110-4 = "Faster! Hey, you! I can still see your legs, so pick it up!"
10003110-5 = "O-Okay!"
10003110-6 = "G-Got it!"
10003110-7 = "Keep your responses to one word only!"
10003110-8 = "*sigh* Man..."
10003110-9 = "How's training going, Iori?"
10003110-10 = "Oh. Ako."
10003110-11 = "It's all right, I guess. I wish we could pick up the pace."
10003110-12 = "Who knows when we'll be in a fight like that last one again. We'll be in trouble if we're this slow."
10003110-13 = "Is that so? Listen to this, Iori."
10003110-14 = "Hmm?"
10003110-15 = "How are the other members supposed to look up to you if you simply sit here and bark out orders?"
10003110-16 = "Huh?"
10003110-17 = "That's why I'd like for you to put on a personal demonstration during shooting practice. You're fine with that, right?"
10003110-18 = "You want ME to do a demonstration?"
10003110-19 = "Yes."
10003110-20 = "I-I don't know, Ako. I don't think I'm a good fit for it..."
10003110-21 = "You do remember I'm second in command, don't you?"
10003110-25 = "Do it."
10003110-26 = "Fine! I'll do it, all right? It's not a big deal."

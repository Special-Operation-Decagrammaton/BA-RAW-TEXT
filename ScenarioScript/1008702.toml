[translation]
1008702-1 = "I Won't Lose!"
1008702-2 = "I had no clue what was happening, but I headed to Gehenna anyway."
1008702-13 = "Prefect Team Administrative Office"
1008702-16 = "You're late!!"
1008702-17 = "[s] \"...But I'm on time though.\""
1008702-22 = "Oh... So you are."
1008702-27 = "But you kept me waiting, so you're late!"
1008702-28 = "[s] \"Is that how it works...?\""
1008702-29 = "Yes! That is how it works!"
1008702-30 = "Do you know how many times I've looked at my watch waiting for you to arrive?"
1008702-34 = "Still...you are TECHNICALLY on time. So I'll forgive you."
1008702-38 = "[ns1] \"(I don't think time is relative, but...)\"\n[ns2] \"(I'm glad she feels like her usual self.)\""
1008702-43 = "[ns] \"So, what's up, Ako?\""
1008702-46 = "It's those gremlins over at the Pandemonium Society!!"
1008702-47 = "Did you know they decided to hold a party? Once again, they've decided to torch all our extra funds for some outrageous diversion!"
1008702-48 = "Just look at this party proposal plan!"
1008702-49 = "[s] \"Hm...\""
1008702-50 = "It's a snapshot of all their evil schemes! "
1008702-54 = "They plan to wear flashy evening wear, while they recommend the Prefect Team...especially the Senior Administrator, wear their usual tattered rags?"
1008702-55 = "Seriously. My clothes? Rags? What a bunch of nonsense!"
1008702-56 = "[s3] \"...Oof.\"\n[s4] \"Now let's c-calm down.\""
1008702-57 = "I am Amau Ako! I will not just sit around and be mocked. "
1008702-58 = "But I am Amau Ako! I won't sit around and be had by this evil plan. "
1008702-59 = "I knew something like this would happen. Which is why I prepared a secret slush fund for just the occasion."
1008702-60 = "[s] \"A secret slush fund?!\""
1008702-61 = "It's time for war! I need a dress that'll blow those pests out of the water! "
1008702-62 = "I'm going to show them that they're so beneath the Prefect Team, they're trapped in a gorge. "
1008702-63 = "Do you have a good grasp on the situation, now, Sensei?"
1008702-64 = "[s] \"Oh I understand... But what does any of this have to do with me?\""
1008702-68 = "Huh? Sensei, this has everything to do with you! "
1008702-69 = "You need to help me pick out a dress!"
1008702-73 = "[ns] \"Me?\""
1008702-74 = "Huh?"
1008702-75 = "Who else, if not you, Sensei?"
1008702-76 = "[s] \"Well, shouldn't you pick the one that you like the most?\""
1008702-80 = "...What?"
1008702-85 = "Wh-What are you talking about? You expect me to pick out such an important dress by myself?"
1008702-86 = "You're too much, Sensei. This is so important to me. And here you are...with your \"It's not any of my business, so why should I help?\" attitude."
1008702-87 = "[s] \"Hm, that doesn't sound great, no.\""
1008702-88 = "You can't sit on the sidelines for this one. I need to bring them to their knees, and I can't without a second opinion."
1008702-89 = "Someone to tell me when the dress is a good fit. Or what color brings out my eyes."
1008702-90 = "[s] \"I... Hmm... That's... Okay...\""
1008702-95 = "Let's get down to business, then."
1008702-99 = "Here, take this catalog of dresses. "
1008702-100 = "Pick the one that suits me best!"
1008702-102 = "And so began Ako's dress hunt."
1008702-106 = "First things first, let's decide on the color. What do you think?"
1008702-107 = "[s5] \"Hmm... Maybe it should match your usual clothes for consistency?\"\n[s6] \"How about blue?\""
1008702-110 = "...Hmm. Is that your preference? ...I'll keep that in mind."
1008702-111 = "[s] \"Oh no, I think that's what would suit you. Don't cater to my tastes.\""
1008702-115 = "What? Don't be so wishy-washy."
1008702-116 = "This is about aesthetics, Sensei. You need to have an artistic opinion. Share your tastes!"
1008702-117 = "[s] \"...Got it.\""
1008702-120 = "Let's shift gears to the designs. Which one do you think looks better?"
1008702-121 = "[s7] \"For a party you want to be distinctive. BOLD!\"\n[s8] \"Dress conservatively. You don't want to overwhelm the guests. Less is more.\"\n[s9] \"It's a war right? Intimidate them with a design that says 'attack, attack, attack!'\""
1008702-125 = "You mean something like this? Let's see..."
1008702-132 = "This? I don't know, it seems like A LOT. "
1008702-133 = "This one could give those gremlins a run for their money, but..."
1008702-134 = "Or what about—? Ugh, I need some time to think about this..."
1008702-140 = "...Are you really a fan of this trashy-looking clothing?"
1008702-144 = "[ns] \"Huh?\""
1008702-145 = "You want me to wear something like this? Me, the Senior Administrator of the Prefect Team? I veto it! Veto!"
1008702-146 = "Why did I decide to rely on someone else's taste?"
1008702-147 = "I'll just pick something for myself!"
1008702-148 = "[s] \"H-Hey now, isn't this a bit too—\""
1008702-149 = "You're the one being too much!"
1008702-150 = "And don't you tell me I'm being indecisive!"
1008702-154 = "I already know! Don't remind me."
1008702-156 = "(I decided it was best I head back to Schale. Ako continued to fret and fuss over what to wear.)"

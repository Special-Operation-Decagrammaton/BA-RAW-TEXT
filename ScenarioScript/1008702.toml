[translation]
1008702-1 = "總之不能輸！"
1008702-2 = "（雖然不清楚發生什麼事，總之還是前往了格黑娜）"
1008702-13 = "風紀委員會行政官室"
1008702-16 = "您遲到了！！"
1008702-17 = "[s]「哪有……我明明很準時……」"
1008702-22 = "哎呀……的確是這樣呢。"
1008702-27 = "不過只要讓我等就算遲到！"
1008702-28 = "[s]「是這樣嗎……」"
1008702-29 = "沒錯！總之就是這樣！"
1008702-30 = "在老師抵達之前，您知道我看了多少次時間嗎？"
1008702-34 = "……不過既然您準時抵達了，我就原諒您吧。"
1008702-38 = "[ns1]（雖然不清楚那是什麼意思……）\n[ns2]（幸好還是平常的亞子）"
1008702-43 = "[ns]「所以是什麼事呢，亞子？」"
1008702-46 = "又是萬魔殿那些狡猾的傢伙！！"
1008702-47 = "老師知道那些傢伙要舉辦派對嗎？#n他們又追加預算，準備舉辦非常荒謬的派對。"
1008702-48 = "快看這個！這是萬魔殿送來的派對企劃書。"
1008702-49 = "[s]「我看看……」"
1008702-50 = "請看這充滿惡意的企劃！"
1008702-54 = "特別讓自己穿昂貴又華麗的晚禮服……#n而風紀委員會……尤其是行政官，則推薦穿平常那早已破洞的爛衣服……？"
1008702-55 = "這套衣服到底哪裡破爛了？#n實在有夠荒謬……"
1008702-56 = "[s3]「………………」\n[s4]「你，你先冷靜……」"
1008702-57 = "但是我天雨亞子！並不打算默默接受這充滿惡意的企劃。"
1008702-58 = "但是我天雨亞子！並不打算默默接受這充滿惡意的企劃。"
1008702-59 = "我早就預料到會發生這種事，所以偷偷藏了祕密資金。"
1008702-60 = "[s]「祕密資金……」"
1008702-61 = "所以這是戰爭！我必須穿上不輸給那些狡猾之人的禮服去參加派對。"
1008702-62 = "必須藉由這樣的方式，讓大家知道風紀委員會與萬魔殿之間的巨大差異。"
1008702-63 = "您理解現在的狀況了嗎，老師？"
1008702-64 = "[s]「理解是理解了……但這件事和我有什麼關係……」"
1008702-68 = "什麼？當然有關係！！"
1008702-69 = "老師必須幫忙挑適合我的禮服！"
1008702-73 = "[ns]「我？」"
1008702-74 = "咦？"
1008702-75 = "那當然，除了老師還有其他人選嗎……？"
1008702-76 = "[s]「只要挑你喜歡的款式不就行了嗎……」"
1008702-80 = "……嗯？"
1008702-85 = "您，您在說什麼呀？這麼重要的禮服卻要我自己挑……？"
1008702-86 = "這會不會有點過分了呢，老師？#n明明這對我來說很重要……老師卻好像事不關己，叫我自己看著辦……？"
1008702-87 = "[s]「啊，不是……怎麼會變成這樣……」"
1008702-88 = "您對我是不是太漠不關心了？#n如果老師不好好幫我挑，我又該如何讓那些傢伙跪下呢！"
1008702-89 = "老師必須替我選出最適合的設計跟顏色才行！"
1008702-90 = "[s]「這……好吧，我知道了。」"
1008702-95 = "那就開始吧？"
1008702-99 = "來，請看，這是禮服的商品目錄。"
1008702-100 = "請從這裡幫我挑選出適合的禮服吧！"
1008702-102 = "（於是便開始幫亞子挑選禮服）"
1008702-106 = "那麼首先……從禮服的顏色開始決定吧。#n該選什麼才好呢？"
1008702-107 = "[s5]「嗯……和亞子平常穿的衣服差不多色系應該就行了吧……」\n[s6]「藍色系應該沒問題吧……」"
1008702-110 = "嗯……這是老師喜歡的風格嗎？#n……我會當作參考的。"
1008702-111 = "[s]「不，與其說是我喜歡的類型，比較像是適合亞子的風格……」"
1008702-115 = "什麼？這微妙的說法是怎麼回事？"
1008702-116 = "您不多表示一些意見，我根本不知道該怎麼挑呀！請告訴我您的喜好！"
1008702-117 = "[s]「……嗯，我知道了。」"
1008702-120 = "設計呢？哪種看起來比較好？"
1008702-121 = "[s7]「我認為適合派對的大膽設計比較好。」\n[s8]「如果是布料面積小的設計，應該能壓倒周圍吧。」\n[s9]「具攻擊性且呈現壓迫感的設計怎麼樣呢？」"
1008702-125 = "這個嗎……？我瞧瞧……"
1008702-132 = "這，這個嗎……？會，會不會太大膽了？"
1008702-133 = "雖然這應該會讓那些狡猾的傢伙，感受到格調上的差異……"
1008702-134 = "但這個……我需要一點時間考慮……"
1008702-140 = "……換句話說，老師喜歡這種會擾亂風紀的服裝嗎？"
1008702-144 = "[ns]「……咦？」"
1008702-145 = "居然想讓我穿上這種服裝……？#n身為風紀委員會的行政官，我要駁回！駁回！"
1008702-146 = "相信老師的眼光是我的錯！！怎麼可能穿成這樣呢？"
1008702-147 = "我還是自己選吧！依照我自己的喜好！"
1008702-148 = "[s]「太，太過分了……」"
1008702-149 = "過分的是老師吧！"
1008702-150 = "什麼？我看起來很驚慌失措？"
1008702-154 = "不用您說我也知道！"
1008702-156 = "（丟下語無倫次又莫名慌張的亞子，回到了夏萊）"

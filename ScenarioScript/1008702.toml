[translation]
1008702-1 = "ยังไงฉันก็แพ้ไม่ได้ค่ะ!"
1008702-2 = "(คุณครูไม่รู้ว่าเกิดอะไรขึ้น แต่ก็มุ่งหน้าไปเกเฮนน่าก่อน)"
1008702-13 = "ห้องเจ้าหน้าที่คณะกรรมการวินัย"
1008702-16 = "มาสายนะคะ!!"
1008702-17 = "[s] \"ไม่นะ... ก็มาตรงเวลานี่...\""
1008702-22 = "เอ๋... นั่นสินะคะ"
1008702-27 = "แต่ฉันก็รอคุณครูอยู่ตลอด งั้นก็ถือว่ามาช้าอยู่ดีค่ะ!"
1008702-28 = "[s] \"แบบนี้ก็มีด้วยเหรอ...\" "
1008702-29 = "ใช่ค่ะ! มันเป็นแบบนั้นละค่ะ!"
1008702-30 = "รู้มั้ยคะว่ากว่าคุณครูจะมาถึง ฉันมองนาฬิกาไปกี่ครั้งแล้ว?"
1008702-34 = "แต่ก็นะ... ในเมื่อมาตรงเวลา ฉันก็จะยกโทษให้ค่ะ"
1008702-38 = "[ns1] (พูดอะไรอยู่กันนะ...)\n[ns2] (แต่ก็โล่งอกไปทีนะที่อาโกะคนเดิมกลับมาแล้ว)"
1008702-43 = "[ns] \"ตกลงมีเรื่องอะไรเหรอ อาโกะ?\""
1008702-46 = "ก็พวกแรคคูนจากแพนเดโมเนียม โซไซตี้น่ะสิคะ!!"
1008702-47 = "คุณครูรู้มั้ยคะว่าเจ้าพวกนั้นจะจัดงานปาร์ตี้น่ะ? พวกนั้นจัดสรรงบประมาณเพิ่มเติมเพื่อจัดงานปาร์ตี้ที่#nยิ่งใหญ่ค่ะ"
1008702-48 = "ดูนี่สิคะ! นี่คือแผนงานปาร์ตี้ที่แพนเดโมเนียม โซไซตี้ส่งมาให้ค่ะ"
1008702-49 = "[s] \"อืม...\""
1008702-50 = "ดูแผนการที่เต็มไปด้วยเจตนาร้ายนี่สิคะ! "
1008702-54 = "ตรงนี้มีบอกไว้ว่าเดรสโค้ดคือชุดราตรีราคาแพงและหรูหรา ก็เลยแนะนำให้คณะกรรมการวินัย โดยเฉพาะเจ้าหน้าที่อย่างฉันใส่เสื้อผ้าที่หลุดลุ่ยและเว้าแหว่งที่ชอบใส่เป็นประจำออกมา..."
1008702-55 = "ชุดของฉันมันหลุดลุ่ยหรือเว้าแหว่งตรงไหนเหรอคะ? พูดอะไรเหลวไหลจริงๆ..."
1008702-56 = "[s3] \".........\"\n[s4] \"จะ... ใจเย็นๆ นะ...\""
1008702-57 = "แต่ว่าฉัน อามาอุ อาโกะ! จะไม่ยอมโดนแผนการร้ายๆ แบบนั้นเล่นงานหรอกค่ะ "
1008702-58 = "แต่ว่าฉัน อามาอุ อาโกะ! จะไม่ยอมโดนแผนการร้ายๆ แบบนั้นเล่นงานหรอกค่ะ "
1008702-59 = "เพราะรู้ว่าจะเกิดเรื่องแบบนี้ขึ้น ฉันก็เลยไปหาเงินทุนลับไว้โดยที่พวกนั้นไม่รู้ค่ะ"
1008702-60 = "[s] \"เงินทุนลับ...\""
1008702-61 = "นี่มันสงครามเลยค่ะ! ในวันปาร์ตี้ ฉันต้องใส่ชุดที่ไม่น้อยหน้าไปกว่าเจ้าแรคคูนพวกนั้นค่ะ! "
1008702-62 = "และฉันจะให้ชุดนั้นสั่งสอนให้รู้ว่าคณะกรรมการวินัยกับแพนเดโมเนียม โซไซตี้อยู่กันคนละชั้นค่ะ "
1008702-63 = "คุณครูเข้าใจสถานการณ์มั้ยคะ?"
1008702-64 = "[s] \"ขะ... เข้าใจอยู่นะ... แต่มันเกี่ยวอะไรกับครูด้วย...\""
1008702-68 = "คะ? ก็ต้องเกี่ยวอยู่แล้วสิคะ!! "
1008702-69 = "คุณครูต้องช่วยเลือกชุดที่เหมาะกับฉันให้ยังไงล่ะคะ!"
1008702-73 = "[ns] \"ครูเนี่ยนะ?\""
1008702-74 = "คะ?"
1008702-75 = "แล้วถ้าไม่ใช่คุณครู จะเป็นใครล่ะคะ...?"
1008702-76 = "[s] \"เจ้าตัวก็เลือกตามรสนิยมของตัวเองก็ได้นี่...\""
1008702-80 = "คะ...?"
1008702-85 = "พะ... พูดอะไรของคุณครูคะเนี่ย? จะให้ฉันเลือกชุดสำคัญๆ คนเดียวเหรอ...?"
1008702-86 = "เกินไปแล้วนะคะคุณครู จะบอกว่าต่อให้เป็นเรื่องสำคัญของฉัน... แต่ก็จัดการเองเถอะ ครูไม่รู้ด้วยหรอก อะไรแบบนี้ใช่มั้ยคะ...?"
1008702-87 = "[s] \"ดะ... เดี๋ยว คิดเองเออเองแบบนั้นเลยเหรอ...\""
1008702-88 = "ไม่สนใจกันเกินไปหรือเปล่าคะ? ถ้าคุณครูไม่เลือกชุดให้ดีๆ ละก็ ฉันก็ต้องแพ้ให้พวกนั้นนะคะ!"
1008702-89 = "คุณครูต้องช่วยตัดสินใจให้ค่ะว่าชุดแบบไหนเหมาะกับฉัน และสีไหนเข้ากับฉันมากที่สุด!"
1008702-90 = "[s] \"เดี๋ยวนะ... เรื่องนั้น... อ่า... ก็ได้\""
1008702-95 = "งั้นเรามาเริ่มกันเลยมั้ยคะ?"
1008702-99 = "นี่คือแคตตาล็อกชุดราตรีค่ะ รับไปสิคะ "
1008702-100 = "ดูแคตตาล็อกแล้วช่วยเลือกชุดที่เหมาะกับฉันให้หน่อยนะคะ"
1008702-102 = "(แล้วคุณครูก็เริ่มเลือกชุดให้อาโกะ)"
1008702-106 = "อันดับแรกเราต้องเลือกสีของชุดก่อนค่ะ เอาเป็นสีอะไรดีคะ?"
1008702-107 = "[s5] \"อืม... เอาเป็นโทนสีของชุดที่อาโกะใส่เป็นประจำก็น่าจะได้นะ...\"\n[s6] \"โทนสีน้ำเงินน่าจะได้นะ...\""
1008702-110 = "ฮืม... นั่นเป็นรสนิยมของคุณครูเหรอคะ? ฉันจะจำเอาไว้ค่ะ"
1008702-111 = "[s] \"ไม่ใช่ ครูรู้สึกว่ามันน่าจะเข้ากับอาโกะดีน่ะ...\""
1008702-115 = "คะ? อะไรกันคะ? คำพูดที่ไม่หนักแน่นแบบนั้น? "
1008702-116 = "ถ้าบอกความคิดเห็นของตัวเองอย่างชัดเจนไม่ได้ แล้วใครจะไปรู้ด้วยล่ะคะ!"
1008702-117 = "[s] \"อืม เข้าใจแล้ว...\""
1008702-120 = "แล้วดีไซน์ล่ะคะ? เอาเป็นแบบไหนดีคะ?"
1008702-121 = "[s7] \"ครูว่าควรเป็นชุดที่มีดีไซน์โดดเด่นให้เข้ากับปาร์ตี้นะ\"\n[s8] \"แบบที่น้อยแต่มาก เรียบแต่โก้ น่าจะเป็นต่อคนอื่นได้นะ\"\n[s9] \"เล่นใหญ่ให้เห็นแล้วน่าเกรงขามไปเลยมั้ย?\""
1008702-125 = "อย่างนั้นเหรอคะ...? ไหนดูซิ..."
1008702-132 = "ชะ... ชุดนี้เหรอคะ...? มะ... มันไม่ดูมั่นใจเกินไปเหรอคะ? "
1008702-133 = "แน่นอนว่านี่จะทำให้พวกแรคคูนสำเหนียกถึงความแตกต่างระหว่างพวกเราได้อยู่หรอก..."
1008702-134 = "แต่ว่า... ฉันขอใช้เวลาคิดหน่อยนะคะ..."
1008702-140 = "อืม... คุณครูคงชอบชุดที่ดูขัดต่อระเบียบวินัยแบบนี้สินะคะ?"
1008702-144 = "[ns] \"หา...?\""
1008702-145 = "เป็นแผนการของคุณครูใช่มั้ยคะที่จะให้ฉันใส่ชุดแบบนี้? ในฐานะของเจ้าหน้าที่คณะกรรมการวินัย ฉันขอปัดตกค่ะ! ไม่ให้ผ่านหรอก!"
1008702-146 = "ฉันพลาดเองค่ะที่เชื่อในรสนิยมของคุณครู!! จะให้ฉันใส่ชุดแบบนี้ได้ยังไงคะ? "
1008702-147 = "ฉันขอเลือกเองดีกว่าค่ะ! ฉันจะเลือกตามความชอบของฉันค่ะ!"
1008702-148 = "[s] \"กะ... เกินไปแล้วนะ...\""
1008702-149 = "คุณครูต่างหากล่ะคะที่ทำเกินไป!"
1008702-150 = "คะ? ฉันดูพะวักพะวนงั้นเหรอคะ?"
1008702-154 = "ฉันรู้ตัวดีค่ะ ไม่ต้องย้ำเรื่องนั้นหรอกค่ะ!"
1008702-156 = "(แล้วคุณครูก็ปล่อยให้อาโกะที่พูดอะไรแปลกๆ และดูกระสับกระส่ายเลือกชุดของตัวเอง จากนั้นก็กลับ#nมาที่ชาเล่ต์)"

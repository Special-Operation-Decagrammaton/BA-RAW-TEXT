[translation]
10014045-5 = "這傢伙雖然氣勢不錯，不過沒什麼大不了的嘛。"
10014045-6 = "已經倒在地上了……難道昏過去了嗎？"
10014045-7 = "畢，畢竟我們有四個人……還有老師……"
10014045-8 = "就是啊。#n真是的，到底是怎麼回事啊……"
10014045-9 = "真是太棒了，誰也無法阻止我們了！！#n就乘著這股氣勢佔領這一帶吧！！"
10014045-10 = "凱茜……"
10014045-11 = "凱茜帕……"
10014045-12 = "……凱茜．帕魯格，對吧。"
10014045-14 = "不，不是。我覺得沒有必要做到這種程度的……"
10014045-18 = "吶……拜託……"
10014045-19 = "算我拜託你們，別再說了。"
10014045-20 = "[s1] 「……我想大家是想要理解千紗的想法。」\n[s2] 「雖然做法可能有點奇怪就是了。」"
10014045-21 = "唉……又說那種話……"
10014045-22 = "唉……又說那種話……"
10014045-26 = "……不，我忍不下去了。"
10014045-27 = "雖然對老師很抱歉，不過我沒辦法再沉默下去了。#n讓我把想說的說出來吧。"
10014045-28 = "……我說。"
10014045-29 = "別再做這種傻事了。#n拜託你們。"
10014045-35 = "本來就因為那個笨蛋搞得很頭痛了。#n請不要再製造更多麻煩了。"
10014045-36 = "……！"
10014045-37 = "……！？"
10014045-38 = "千，千紗醬！？#n我們只是想要……！"
10014045-39 = "想要和我們撇清關係的話已經太遲了。"
10014045-40 = "因為我們已經是同一艘船上的夥伴了……"
10014045-41 = "喂，先聽千紗把話說完吧。#n理由之後再解釋也可以吧！"
10014045-42 = "……嗯。"
10014045-46 = "唉……謝謝你，喜美。#n沒想到竟然會有感謝你的一天啊。"
10014045-47 = "雖然大概知道為什麼會變成這樣，也很感謝你們的心意#n……不過請住手吧。"
10014045-48 = "想要理解我的這份心情我很開心。#n不過我有拜託你們這麼做嗎。"
10014045-49 = "想想我沒有告訴你們的理由吧。"
10014045-50 = "那，那是因為……"
10014045-51 = "……趁這個機會我就說清楚吧。"
10014045-52 = "對我來說，那些全都是想要忘記的事情。"
10014045-53 = "抱歉破壞了氣氛。就是這麼回事，之後不要再提這件事了。#n我也會當作今天的事情沒發生過的。"
10014045-54 = "而且，還有那傢伙……"
10014045-55 = "……算了。#n有點累了……抱歉，詳細的情況之後再說吧。"
10014045-56 = "先走了……"
10014045-60 = "千紗醬……"
10014045-61 = "……唔嗯。"
10014045-62 = "……"
10014045-66 = "……？"
10014045-67 = "啊，醒來了。"
10014045-73 = "…………"
10014045-74 = "……不對……不是醒來了……"
10014045-75 = "[s] 「……你都聽到了對吧。」"
10014045-76 = "……哎呀。"
10014045-77 = "剛才的談話你都聽到了啊……唔姆，這下有點麻煩了呢。"
10014045-78 = "咦？夏醬，這是什麼意思……？"
10014045-82 = "…………"
10014045-89 = "咦……咦咦……？"
10014045-90 = "那個……？"
10014045-96 = "……愛莉。"
10014045-97 = "……？"
10014045-98 = "……嗯，現在就……"
10014045-100 = "……讓他一個人靜一靜比較好吧。"

[translation]
10014045-5 = "นอกจากพุ่งเข้าต่อสู้แบบไม่สนอะไรแล้ว ก็ไม่เท่าไรนี่นา เรอิสะอะไรนั่นน่ะ..."
10014045-6 = "ล้มลงไปแล้วนะนั่น สลบไปแล้วเหรอ?"
10014045-7 = "กะ...ก็เพราะว่าฝั่งนี้มีกันสี่คน แล้วยังมีคุณครูอยู่อีก..."
10014045-8 = "เฮ้อ นี่มันอะไรกัน..."
10014045-9 = "เยี่ยมยอดอย่างที่คิด ไม่ว่าใครก็มาขวางพวกเราไม่ได้! เราไปยึดครองพื้นที่รอบๆ ด้วยพลังนี้กันเลย!"
10014045-10 = "คะ..."
10014045-11 = "แคท..."
10014045-12 = "แคทส์ พาลูค..."
10014045-14 = "มะ... ไม่นะ ไม่คิดว่าจะมาถึงขั้นนี้เลย..."
10014045-18 = "...ขอร้องละ..."
10014045-19 = "ขอร้องละ พอได้แล้วสักทีเหอะน่า..."
10014045-20 = "[s1] \"คนอื่นๆ แค่อยากจะเข้าใจคาซึสะน่ะ\"\n[s2] \"ถึงจะดูเงอะงะไปหน่อย แต่ลองดูที่ความตั้งใจสิ\""
10014045-21 = "เฮ้อ... คุณครูพูดอะไรแบบนั้นอีกแล้ว..."
10014045-22 = "เฮ้อ... คุณครูพูดอะไรแบบนั้นอีกแล้ว..."
10014045-26 = "ไม่ละ ฉันทนไม่ไหวแล้ว..."
10014045-27 = "ต้องขอโทษคุณครูด้วยนะ แต่คงจะปล่อยไปแบบนี้ไม่ได้แล้วละ ฉันคงต้องพูดอะไรสักอย่าง"
10014045-28 = "นี่พวกเธอน่ะ..."
10014045-29 = "ฉันขอร้องละ หยุดทำเรื่องบ้าบอแบบนี้สักที"
10014045-35 = "แค่กับคนที่นอนล้มอยู่ตรงนั้นฉันก็เหนื่อยมากพอแล้ว พอพวกเธอยังมาทำแบบนี้อีกฉันยิ่งเหนื่อย#nเข้าไปใหญ่นะ"
10014045-36 = "...!"
10014045-37 = "...?!"
10014045-38 = "คะ... คาซึสะจัง! ทะ... ทำไมถึงพูดแบบนั้นล่ะ? พวกเราก็แค่อยากช่วยเองนะ...!"
10014045-39 = "ถึงจะไม่อยากให้เรื่องมันวุ่นวาย แต่ตอนนี้ก็สายไปแล้วละ"
10014045-40 = "พวกเราตัดสินใจจะลงเรือลำเดียวกัน..."
10014045-41 = "ฮึ่ย จริงๆ เลย! พอได้แล้ว พอทีเถอะ! ฟังเรื่องราวให้จบก่อนสิ! แล้วค่อยแก้ตัวทีหลังก็ได้!!"
10014045-42 = "อื้ม..."
10014045-46 = "เฮ้อ...  ขอบคุณนะโยชิมิ ไม่คิดเลยว่าวันหนึ่งจะได้ขอบคุณเธอด้วย"
10014045-47 = "ฉันก็พอจะรู้แล้วละว่าทำไมพวกเธอถึงทำเรื่องแบบนี้ ขอบคุณสำหรับความหวังดีนะ แต่อยากให้พอได้แล้วน่ะ"
10014045-48 = "รู้สึกขอบคุณจริงๆ นะ แต่ว่าความจริงแล้ว... เรื่องพวกนี้มันก็ไม่ใช่เรื่องดีเลยใช่มั้ยล่ะ"
10014045-49 = "ถ้าไม่ใส่ใจก็แค่ทำเป็นเหมือนไม่มีอะไรเกิดขึ้น ฉันว่าเราไม่ต้องมาทำอะไรแบบนี้ก็ได้"
10014045-50 = "คะ... คือว่า..."
10014045-51 = "อืม... ก็ดีแล้วละ คิดว่าคงจะได้ยินกันมาจากที่ไหนสักที่แล้ว งั้นจะใช้โอกาสนี้เล่าให้ฟังเลยแล้วกัน"
10014045-52 = "เรื่องที่ฉันอยากจะลืมไปให้หมดน่ะ ทั้งเรื่องในตอนนั้น แล้วก็คนที่เกี่ยวข้องในตอนนั้นด้วย"
10014045-53 = "ขอโทษที่จู่ๆ ก็ทำให้บรรยากาศเป็นแบบนี้นะ แต่อยากให้ทำตัวเหมือนตอนที่ยังไม่รู้เรื่องน่ะ เพราะฉันก็จะทำแบบนั้นเหมือนกัน"
10014045-54 = "อีกอย่างยัยนั่นก็..."
10014045-55 = "ไม่มีอะไรหรอก... ตอนนี้ฉันเพลียๆ น่ะ... ไว้ค่อยมาคุยรายละเอียดกันทีหลังนะ"
10014045-56 = "ถ้างั้น... ฉันไปก่อนนะ"
10014045-60 = "คาซึสะจัง..."
10014045-61 = "อืม..."
10014045-62 = "......"
10014045-66 = "......?"
10014045-67 = "อ๊ะ ตื่นขึ้นมาแล้ว"
10014045-73 = "........."
10014045-74 = "เดี๋ยวนะ... ไม่ได้ตื่นขึ้นมา..."
10014045-75 = "[s] \"ตื่นอยู่ตลอดเลยสินะ...\""
10014045-76 = "อะไรกัน..."
10014045-77 = "ได้ยินรึเปล่านะ ถ้าได้ยินทั้งหมดนั่นก็คง... เรื่องใหญ่แล้วสิ... "
10014045-78 = "หืม? หมายความว่ายังไงเหรอนัตสึจัง...?"
10014045-82 = "........."
10014045-89 = "เอ๊ะ เอ๋...?"
10014045-90 = "คือว่า... เดี๋ยวนะคะ...?"
10014045-96 = "ไอริ..."
10014045-97 = "......?"
10014045-98 = "อืม ตอนนี้น่ะ..."
10014045-100 = "ปล่อยให้อยู่คนเดียวน่าจะดีกว่านะ..."

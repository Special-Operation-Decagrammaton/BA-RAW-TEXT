[translation]
101145-2 = "SOF，報告狀況！SOF！！"
101145-4 = "發生什麼事了！！"
101145-7 = "喂，趕快回答！！"
101145-9 = "唔……怎麼會……身為PMC精銳部隊的，我們──"
101145-14 = "工藝室，確保完成。"
101145-18 = "[ns]「琳醬！我們來救你了！！」"
101145-20 = "……老師。"
101145-21 = "誰是「琳醬」啊。"
101145-22 = "……不過現在會那樣叫我的也只有老師了……或許也不壞。"
101145-23 = "前輩，你沒事吧！？"
101145-24 = "琳前輩……您平安無事……太好了。"
101145-25 = "大家……"
101145-26 = "非常抱歉……都怪我能力不足，事情才會變成這樣……"
101145-27 = "琳前輩……"
101145-30 = "唔……！？"
101145-31 = "這裡是大廳，已經抓住敵方指揮官。"
101145-32 = "你就是凱薩PMC的指揮官嗎？#n放棄吧。你們的計畫就到此為止了。"
101145-34 = "少說笑了！"
101145-38 = "引爆裝置……！？"
101145-39 = "想知道按下這個會發生什麼嗎？#n整棟大樓都會一起陪葬！給我退後！！"
101145-40 = "什，什麼……！"
101145-41 = "……RABBIT4，能夠狙擊他手上的引爆裝置嗎？"
101145-46 = "咕，唔……！？"
101145-50 = "嗯，嗯……雖然我已經開槍了。"
101145-52 = "下一話;沉沒的故事"

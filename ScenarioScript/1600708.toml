1600708-51 = "3;토모에;02;어머나, 벌써 시간이 이렇게 되었네요.\n#3;em;[반응]\n#3;a"
1600708-52 = "3;토모에;01;그저 행적을 뒤쫓기만 했는데 하루가 모두 지나가 버리다니…… 체리노 회장님께서는 정말 하루를 바쁘게 보내시는군요."
1600708-53 = "[s] \"먹고 즐기는 게 대부분이었지만.\""
1600708-54 = "3;토모에;01;후후, 그래도 즐거운 하루였네요.\n#3;em;[반짝]"
1600708-55 = "3;토모에;03;좋은 영화가 나올 것 같아 벌써부터 기대가 되네요."
1600708-56 = "[s3] \"아까 전부터 묻고 싶었는데…….\"\n[s4] \"촬영용 카메라는 어디에 있어?\""

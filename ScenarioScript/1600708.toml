[translation]
1600708-1 = "#title;미묘한 거짓말은 실수에 가깝다"
1600708-2 = "#place;붉은겨울 연방학원 정문 앞"
1600708-3 = "3;토모에;03;좋은 아침입니다, 선생님.\n#3;em;[반짝]\n#3;a"
1600708-4 = "3;토모에;00;전에 말씀드린 것처럼 오늘은 체리노 회장님의 위대한 행적을 기록하기 위해, 다큐멘터리 영화를 찍을 예정이랍니다."
1600708-5 = "3;토모에;99;체리노 회장님이 평소에 머무르시는 사무국의 집무실부터…… \n#3;m2"
1600708-6 = "3;토모에;01;휴식 중에 즐겨 찾으시는 디저트 가게까지…….\n#3;m4"
1600708-7 = "3;토모에;03;체리노 회장님의 동선을 따라 붉은겨울 학원 곳곳을 견학하며, 회장님의 취향과 일상을 빠짐없이 기록하도록 하죠!\n#3;em;[음표]\n#3;jump\n#3;m3"
1600708-8 = "[s] \"그런 일이라면 내가 없어도 되는 거 아냐?\""
1600708-9 = "3;토모에;05;아뇨. 이 영화는 장차 키보토스 전역의 영화관에서도 상영될 예정인, 붉은겨울 사무국의 역작이니까요!\n#3;em;[!]\n#3;stiff"
1600708-10 = "3;토모에;05;그러니 붉은겨울 학원과 무관한 외부인의 시선 또한 고려하지 않을 수 없겠지요."
1600708-11 = "3;토모에;01;관객의 이해를 도울 수 있도록, 선생님께서 영화의 중간마다 어떤 생각이 들었는지 솔직한 외부인의 시선으로 말씀해 주시면 좋겠습니다.\n#3;greeting\n#3;em;[반응]"
1600708-12 = "[s] \"그런 일이라면 어렵지 않지만…….\""
1600708-13 = "3;토모에;03;네. 오늘은 선생님을 회장님이라 생각하고 정성껏 모실테니, 선생님께서는 그저 편안히 하루를 즐겨주세요.\n#3;em;[하트]"
1600708-14 = "3;토모에;05;그럼 지금부터…… 녹화를 시작하겠습니다!\n#3;closeup\n#fontsize;80"
1600708-15 = "#all;hide"
1600708-16 = "#place;붉은겨울 사무국"
1600708-17 = "3;토모에;00;이곳은 붉은겨울 사무국의 임원들이 업무를 처리하는 사무국이랍니다.\n#3;a"
1600708-18 = "3;토모에;00;체리노 회장님의 하루 일과도 이곳에서 시작되지요.\n#3;em;[음표]"
1600708-19 = "3;토모에;03;체리노 회장님은 아침에 등교하시면 잼을 잔뜩 넣은 홍차를 한 잔 주문하시는데……"
1600708-20 = "[s1] \"잼을 넣은 홍차라고?\"\n[s2] \"맛이 잘 상상이 가질 않는데.\""
1600708-21 = "3;토모에;01;후후. 듣기에는 이상해 보여도 잼의 단맛은 홍차의 향과 정말 잘 어울린답니다.\n#3;em;[반짝]"
1600708-22 = "3;토모에;01;후후. 듣기에는 이상해 보여도 잼의 단맛은 홍차의 향과 정말 잘 어울린답니다.\n#3;em;[반짝]"
1600708-23 = "3;토모에;01;선생님께서도 한 잔 드셔보시겠어요?"
1600708-24 = "[s] \"그럼 부탁할게.\""
1600708-25 = "3;토모에;03;네, 그럼 지금 바로 차를 내오겠습니다. 자리에 앉아서 기다려주세요.\n#3;em;[반응]\n#3;greeting"
1600708-26 = "#st;[0,0];instant;1;"
1600708-27 = "#clearST"
1600708-28 = "3;토모에;03\n#3;d\n#wait;1000"
1600708-29 = "#all;hide"
1600708-30 = "#wait;500"
1600708-31 = "#na;(토모에가 내온 홍차를 마시며 즐겁게 이야기를 나누었다.)"
1600708-32 = "#all;hide"
1600708-33 = "#place;붉은겨울 자치구 내 디저트 가게"
1600708-34 = "3;토모에;00;이곳은 체리노 회장님이 제일 좋아하는 푸딩을 판매하는 디저트 가게입니다.\n#3;a"
1600708-35 = "3;토모에;99;과거 이곳의 푸딩을 맛보신 회장님이 크게 만족하여 훈장을 내려주신 덕분에, 이곳의 디저트에는 권위를 상징하는 수염 장식을 붙일 수 있게 되었답니다.\n#3;em;[반짝]"
1600708-36 = "3;토모에;00;이곳의 디저트는 푸딩도 맛있지만, 연어알과 달콤한 크림을 듬뿍 넣은 <수염 블린>도 인기가 많아요."
1600708-37 = "[s] \"연어알과 달콤한 크림이 잘 어울릴까……?\""
1600708-38 = "3;토모에;00;후후, 그럼 이번에도 직접 드셔보시겠어요?\n#3;em;[음표]"
1600708-39 = "3;토모에;03;잠시만 기다려주세요. 제가 곧 수염 블린을 가져오겠습니다."

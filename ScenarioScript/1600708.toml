1600708-60 = "3;토모에;02;어머나, 그러고 보니 카메라를 깜박했네요."
1600708-61 = "3;토모에;99;선생님과 나누는 대화가 너무 즐거워서 무심코 '실수'를 저지르고 말았네요.\n#3;em;[///]"

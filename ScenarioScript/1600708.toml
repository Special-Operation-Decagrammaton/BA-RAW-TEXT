1600708-72 = "3;토모에;01;체리노 회장님을 향한 제 마음은 여전히 변함이 없습니다만…… 제가 좋아하는 어느 영화에는 이런 말이 나온답니다.\n#3;closeup\n#3;greeting\n#3;a"
1600708-73 = "3;토모에;01;\"미묘한 거짓말은 실수에 가깝다.\"\n#3;closeup"
1600708-74 = "3;토모에;99;그러니까 선생님을 모시기 위해 제가 한 이 미묘한 거짓말은…… 어찌보면 작은 실수라고도 할 수 있겠지요.\n#3;closeup"
1600708-75 = "3;토모에;99;선생님과 함께 보낸 오늘 하루는, 체리노 회장님과 보내는 일상과는 다른 의미로 너무나도 즐거워서……\n#3;closeup"
1600708-76 = "3;토모에;03;앞으로도 종종 '실수'를 저지를 것만 같네요.\n#3;em;[하트]\n#3;closeup"

[translation]
1600708-1 = "錯誤和謊言並無太大差異"
1600708-2 = "赤冬聯邦學園．正門前"
1600708-3 = "早安，老師。"
1600708-4 = "就如之前所說，今日是記錄潔莉諾會長偉大的日常，拍攝紀錄片的預定。不過會長很忙碌……所以今日我想追著會長的足跡。"
1600708-5 = "從潔莉諾會長平常工作的事務局的辦公室，"
1600708-6 = "到休息中喜歡到訪的甜點店……"
1600708-7 = "沿著潔莉諾會長的日常同時見習赤冬聯邦學園，毫不遺漏地記錄會長的喜好和日常吧！"
1600708-8 = "[s] 「這個，我要做什麼才好……？」"
1600708-9 = "這部電影，是預計在奇普托斯全域的電影院上映，赤冬聯邦學園的力作！"
1600708-10 = "所以，也必須考慮赤冬聯邦學園以外的外部人士的客觀觀點才行。"
1600708-11 = "因此今日，想請老師重溫潔莉諾會長日常的同時……將感到不可思議的地方或是感想等等毫無疑慮地說出口。"
1600708-12 = "[s] 「原來如此，是那樣的話我很樂意。」"
1600708-13 = "好的。那麼機會難得，今日會將老師當作潔莉諾會長鄭重地服侍，老師首先只要純粹地享受就可以了。"
1600708-14 = "那麼……攝影開始！"
1600708-16 = "赤冬聯邦學園．事務局"
1600708-17 = "這裡如老師所知，是赤冬聯邦學園的事務局成員們工作的事務局。"
1600708-18 = "潔莉諾會長的一天，也是從這裡開始。"
1600708-19 = "雖然潔莉諾會長上學之後，首先會享受放滿果醬的紅茶……"
1600708-20 = "[s1] 「放入果醬的紅茶……？」\n[s2] 「味道似乎難以想像。」"
1600708-21 = "是的。果醬的甜味其實和紅茶的香味相當搭唷。"
1600708-22 = "是的。果醬的甜味其實和紅茶的香味相當搭唷。"
1600708-23 = "機會難得，老師也來一杯如何？"
1600708-24 = "[s] 「那麼，就拜託妳了。」"
1600708-25 = "那我馬上準備，請坐著稍候。"
1600708-31 = "（智惠拿來的紅茶確實美味，沒有什麼其他在意的點，開心地聊著天）"
1600708-33 = "赤冬聯邦學園內．甜點店"
1600708-34 = "這裡是賣著潔莉諾會長最喜歡的布丁的甜點店。"
1600708-35 = "過去嚐到這裡的布丁的潔莉諾會長因為感動，授予其勳章。因此，這間店無論哪個甜點都裝飾著象徵權威的鬍子。"
1600708-36 = "這裡除了布丁之外，也有使用了大量鮭魚卵和香甜的奶油的「鬍子布利尼」也很有人氣唷。"
1600708-37 = "[s] 「鮭魚卵和香甜的奶油……？」"
1600708-38 = "是的，相當的美味唷？要實際品嚐嗎？"
1600708-39 = "我去點餐，請稍等一下。"
1600708-45 = "（鮭魚卵和香甜奶油確實意外的很搭，非常的美味）"
1600708-46 = "（這之後，和智惠進行了各式各樣的對話，並巡迴了赤冬聯邦學園的各個地方。沒有什麼特別有疑問的地方，度過了非常愉快的時間……）"
1600708-50 = "赤冬聯邦學園．正門前"
1600708-51 = "啊啦，已經這種時間了呢。"
1600708-52 = "沒想到只是追隨著足跡就經過了一天……果然潔莉諾會長一整天的行程，是真的很忙碌呢。"
1600708-53 = "[s] 「基本上只是在吃東西而已……這樣就好了嗎？」"
1600708-54 = "是的，非常值得參考。"
1600708-55 = "似乎能拍成很好的電影，現在就開始期待了。"
1600708-56 = "[s3] 「順帶一提，從剛才就想問了……」\n[s4] 「攝影用的相機在哪裡？」"
1600708-57 = "……"
1600708-58 = "啊啦，這麼一說，忘記帶相機了呢。"
1600708-59 = "……"
1600708-60 = "啊啦，這麼一說，忘記帶相機了呢。"
1600708-61 = "和老師聊得太開心，一不小心「犯錯」了。"
1600708-62 = "[ns] 「有，有那種事……？」"
1600708-64 = "[ns] 「從哪裡到哪裡是真的……？」"
1600708-72 = "首先，我最喜歡潔莉諾會長的事，毫無疑問是真的……我喜歡的電影裡，有這樣的台詞。"
1600708-73 = "「錯誤和謊言並無太大差異」……"
1600708-74 = "也就是說……與其說是謊言不如說是錯誤，就是這麼回事。"
1600708-75 = "和潔莉諾會長相比，與老師一起度過的一天有不同的意義，所以很開心……"
1600708-76 = "也許接下來，也會不時「犯錯」也說不定。"
1600708-78 = "（這之後，再次配合了智惠的「錯誤」，結束了快樂的一天）"

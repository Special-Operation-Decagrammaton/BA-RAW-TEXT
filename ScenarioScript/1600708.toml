[translation]
1600708-1 = "คำพูดหลอกลวงเล็กๆ คือความผิดพลาด"
1600708-2 = "ด้านหน้าประตูหน้าของสถาบันสหภาพเรดวินเทอร์"
1600708-3 = "อรุณสวัสดิ์ค่ะ คุณครู"
1600708-4 = "อย่างที่ฉันแจ้งให้ทราบไปแล้ว วันนี้ฉันจะถ่ายวิดีโอภาพยนตร์สารคดีเพื่อบันทึกความยิ่งใหญ่#nของประธานเชริโน่เอาไว้ค่ะ"
1600708-5 = "เริ่มจากห้องทำงานที่สำนักเลขาธิการที่ท่านประธานเชริโน่อยู่ประจำ"
1600708-6 = "ไปจนถึงร้านของหวานที่ชอบไปบ่อยๆ ในตอนพัก..."
1600708-7 = "ถ้าตามท่านประธานเชริโน่ไปทั่วสหภาพเรดวินเทอร์ล่ะก็ จะสามารถบันทึกรสนิยม และชีวิต#nประจำวันของท่านประธานได้ทุกอย่างเลยค่ะ!"
1600708-8 = "[s] \"ถ้าอย่างนั้น ครูไม่ต้องอยู่ด้วยก็ได้สินะ?\""
1600708-9 = "ไม่ค่ะ นี่คือผลงานชิ้นเอกของสำนักเลขาธิการเรดวินเทอร์ที่จะเข้าฉายในโรงภาพยนตร์ทั่วคิโวทอส#nในอนาคตนะคะ!"
1600708-10 = "เพราะงั้นเลยต้องใช้มุมมองของคนภายนอกที่ไม่ได้เกี่ยวข้องกับสหภาพเรดวินเทอร์ด้วยค่ะ"
1600708-11 = "เพื่อให้ผู้ชมเข้าใจเรื่องราวได้ดี ฉันเลยอยากให้คุณครูช่วยบอกความคิดเห็นในมุมมอง#nของคนภายนอกเกี่ยวกับภาพยนตร์เป็นระยะๆ ค่ะ"
1600708-12 = "[s] \"ถ้างั้นก็ไม่เห็นยากเลย...\""
1600708-13 = "ค่ะ วันนี้ฉันจะคิดว่าคุณครูคือท่านประธานแล้วจะดูแลอย่างเต็มที่เลยค่ะ เพราะฉะนั้นขอให้สนุก#nได้เต็มที่เลยนะคะ"
1600708-14 = "ถ้างั้นตั้งแต่นี้ไป... ฉันจะเริ่มบันทึกภาพแล้วนะคะ!"
1600708-16 = "สำนักเลขาธิการเรดวินเทอร์"
1600708-17 = "ที่นี่คือสำนักเลขาธิการเรดวินเทอร์ เป็นสถานที่ปฏิบัติภารกิจของคณะกรรมการทุกคนค่ะ"
1600708-18 = "กิจวัตรประจำวันของท่านประธานเชริโน่จะเริ่มต้นจากที่นี่ค่ะ"
1600708-19 = "เมื่อท่านประธานเชริโน่มาถึงโรงเรียนในตอนเช้า ก็จะสั่งชาแดงที่ใส่แยมพูนๆ มาหนึ่งถ้วย..."
1600708-20 = "[s1] \"ชาแดงที่ใส่แยมงั้นเหรอ?\"\n[s2] \"จินตนาการรสชาติไม่ออกเลย\""
1600708-21 = "ฮุฮุ อาจจะฟังดูแปลกๆ อยู่สักหน่อย แต่รสชาติหวานของแยมกับกลิ่นหอมของชาแดง#nมันเข้ากันได้ดีมากนะคะ"
1600708-22 = "ฮิฮิ อาจจะฟังดูแปลกๆ สักหน่อย แต่รสชาติหวานของแยมกับกลิ่นหอมของชาแดงเข้ากันได้ดีมากนะคะ"
1600708-23 = "คุณครูอยากลองดื่มดูสักแก้วไหมคะ?"
1600708-24 = "[s] \"ขอลองหน่อยแล้วกัน\""
1600708-25 = "ค่ะ ถ้างั้นฉันจะไปเตรียมชามาให้นะคะ เชิญนั่งรอตรงนี้ก่อนค่ะ"
1600708-31 = "คุณครูดื่มชาแดงที่โทโมเอะชงมาให้และพูดคุยกับเธออย่างสนุกสนาน"
1600708-33 = "ร้านขนมหวานในเขตปกครองตนเองเรดวินเทอร์"
1600708-34 = "ที่นี่คือร้านของหวานที่ขายพุดดิ้งที่ท่านประธานเชริโน่ชอบที่สุดค่ะ"
1600708-35 = "เมื่อก่อนตอนที่ท่านประธานชิมได้พุดดิ้งของร้านนี้ก็ชื่นชอบมากๆ จนมอบเหรียญตราให้กับทางร้านค่ะ#nดังนั้นขนมหวานของร้านนี้เลยสามารถใช้รูปหนวดที่เป็นสัญลักษณ์ของอำนาจ#nบนขนมหวานได้ค่ะ"
1600708-36 = "พุดดิ้งของร้านนี้อร่อยมากก็จริง แต่ว่า <เครปครีมหนวด> ที่ใส่ไส้ครีมรสหวานกับไข่ปลาแซลมอน#nก็อร่อยไม่แพ้กันเลยนะคะ"
1600708-37 = "[s] \"ไข่ปลาแซลมอนกับครีมรสหวานมันเข้ากันเหรอ...?\""
1600708-38 = "ฮุฮุ ถ้างั้นจะลองทานดูไหมคะ?"
1600708-39 = "รอสักครู่นะคะ ฉันจะไปซื้อเครปครีมหนวดมาให้ค่ะ"
1600708-45 = "คุณครูแบ่งเครปครีมหนวดให้โทโมเอะและพูดคุยกันอย่างสนุกสนาน"
1600708-46 = "จากนั้นคุณครูก็ตามโทโมเอะไปดูสถานที่ต่างๆ ในสหภาพเรดวินเทอร์ และพูดคุยกัน#nในหลายๆ เรื่อง..."
1600708-50 = "ด้านหน้าประตูหน้าของสถาบันสหภาพเรดวินเทอร์"
1600708-51 = "ตายจริง เวลาผ่านไปขนาดนี้แล้วเหรอคะเนี่ย"
1600708-52 = "แค่ตามรอยท่านประธานไปสถานที่ต่างๆ เท่านั้นเอง ใช้เวลาไปทั้งวันเลยเหรอเนี่ย...#nท่านประธานเชริโน่นี่ก็งานยุ่งตลอดทั้งวันเลยนะคะ"
1600708-53 = "[s] \"ส่วนใหญ่ก็ไปตระเวนกินแบบสนุกๆ เองนะ...\""
1600708-54 = "ฮุฮุ แต่ว่าวันนี้ก็สนุกมากเลยนะคะ"
1600708-55 = "ดูเหมือนเราจะทำภาพยนตร์ดีๆ มาได้แล้วล่ะค่ะ ฉันตื่นเต้นจังเลย"
1600708-56 = "[s3] \"ครูอยากถามมาตั้งแต่เมื่อกี้แล้วล่ะ...\"\n[s4] \"กล้องที่ใช้ถ่ายอยู่ตรงไหนเหรอ?\""
1600708-57 = "...."
1600708-58 = "ตายจริง พอนึกดูแล้ว ฉันลืมเรื่องกล้องไปสนิทเลยค่ะ"
1600708-59 = "...."
1600708-60 = "ตายจริง พอนึกดูแล้ว ฉันลืมเรื่องกล้องไปสนิทเลยค่ะ"
1600708-61 = "มัวแต่คุยกับคุณครูเพลินไปหน่อย จนตัวฉันเอง \"ทำเรื่องผิดพลาด\" ไปโดยไม่ได้ตั้งใจซะแล้วค่ะ"
1600708-62 = "[ns] \"มันเห็นชัดเกินกว่าจะเรียกว่าผิดพลาดแล้วนะ...\""
1600708-64 = "[ns] \"ใช้เรื่องถ่ายหนังมาเป็นข้ออ้างรึเปล่าเนี่ย?\""
1600708-72 = "หัวใจของฉันที่มุ่งมั่นเพื่อประธานเชริโน่ยังคงไม่เปลี่ยนแปลงค่ะ แต่ว่า... ในภาพยนตร์ที่ฉันชอบ#nมันมีคำพูดแบบนี้อยู่ด้วยค่ะ"
1600708-73 = "\"คำพูดหลอกลวงเล็กๆ เรียกว่าเป็นความผิดพลาดมากกว่าการโกหกค่ะ\""
1600708-74 = "เพราะงั้นฉันถึงได้พูดหลอกคุณครูเพื่อที่จะได้ชวนคุณครูมาเที่ยวด้วยกันแบบนี้...#nเพราะงั้นก็น่าจะถือว่าเป็นความผิดพลาดเล็กๆ น้อยๆ เหมือนกันค่ะ"
1600708-75 = "หนึ่งวันที่ได้อยู่กับคุณครู มันทั้งสนุกแล้วก็มีความหมายกับฉันในแบบที่ต่างกับชีวิตประจำวัน#nที่ได้อยู่กับท่านประธานเชริโน่มาก..."
1600708-76 = "ต่อไปฉันคงจะต้อง \"ทำพลาด\" บ่อยๆ แล้วล่ะค่ะ"
1600708-78 = "และแล้ววันหนึ่งวันของคุณครูก็หมดลงหลังจากไปเที่ยวกับโทโมเอะ เพราะ \"ความผิดพลาด\" ที่เธอก่อขึ้น"

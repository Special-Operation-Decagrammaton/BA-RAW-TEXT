[translation]
1600708-1 = "Fibs Are More like Mistakes Than Lies"
1600708-2 = "In front of the Red Winter Federal Academy main gate"
1600708-3 = "Good morning, Sensei."
1600708-4 = "As I told you, today I am planning to film a documentary that captures the great achievements of President Cherino."
1600708-5 = "From the Executive Office of the Secretariat where President Cherino usually stays... "
1600708-6 = "To the dessert shop she frequents during break..."
1600708-7 = "We will follow President Cherino's daily routine and tour different parts of Red Winter Academy, recording every detail of the president's preferences and daily life!"
1600708-8 = "[s] \"You don't need me for this, do you?\""
1600708-9 = "Actually, I do. This will be a masterpiece of the Red Winter Office. It will be shown in movie theaters all over Kivotos in the near future!"
1600708-10 = "Therefore, I must consider the opinions of outsiders who are not from Red Winter Academy."
1600708-11 = "In order to help us relate to our audience, I will need an outsider's thoughts and opinions."
1600708-12 = "[s] \"That's not too hard to do, but...\""
1600708-13 = "Okay. Today, I will treat you as if you were the president and serve you accordingly, so please just enjoy the day."
1600708-14 = "The filming...starts now!"
1600708-16 = "Red Winter Office"
1600708-17 = "This is the Secretariat, where the members of the Red Winter Office handle their business."
1600708-18 = "President Cherino begins her day here."
1600708-19 = "When President Cherino arrives at school every morning, she orders a cup of black tea filled with jam."
1600708-20 = "[s1] \"Black tea filled with jam?\"\n[s2] \"I can't really imagine how that would taste.\""
1600708-21 = "Heehee. It may sound strange, but the sweetness of the jam goes really well with the sharpness of black tea."
1600708-22 = "Heehee. It may sound strange, but the sweetness of the jam goes really well with the sharpness of black tea."
1600708-23 = "Would you like some, Sensei?"
1600708-24 = "[s] \"Sure, let's try it.\""
1600708-25 = "Okay, I will bring you a cup of tea right away. Please sit while you wait."
1600708-31 = "I had a fun time chatting with Tomoe while drinking the tea."
1600708-33 = "Dessert shop in the Red Winter district"
1600708-34 = "This is the dessert shop that sells President Cherino's favorite pudding."
1600708-35 = "The president was so satisfied after trying the pudding here she awarded them a medal. Because of that, the desserts here can be decorated with a mustache, a symbol of authority."
1600708-36 = "While the pudding is delicious, the Beard Blini filled with salmon roe and sweet cream is also very popular."
1600708-37 = "[s] \"Does salmon roe and sweet cream go well together...?\""
1600708-38 = "Heehee, would you like to give it a try as well?"
1600708-39 = "Please wait a minute. I will bring you a Beard Blini."
1600708-45 = "I shared the Beard Blini Tomoe brought and we had a good time together."
1600708-46 = "Afterward, I followed Tomoe on a tour around Red Winter Academy and listened to her many stories."
1600708-50 = "In front of the Red Winter Federal Academy main gate"
1600708-51 = "Wow. I can't believe how late it is already."
1600708-52 = "All we did was follow her daily routine, but the day is already over... President Cherino keeps herself busy."
1600708-53 = "[s] \"It was mostly eating and enjoying ourselves.\""
1600708-54 = "Heehee, it was still a fun day."
1600708-55 = "I'm sure the movie will turn out great. I can't wait to see it."
1600708-56 = "[s3] \"I've been meaning to ask this for a while now...\"\n[s4] \"Where's the camera for shooting?\""
1600708-57 = "..."
1600708-58 = "Oh my gosh, I forgot the camera."
1600708-59 = "..."
1600708-60 = "Oh my gosh, I forgot the camera."
1600708-61 = "I was having so much fun talking with you that I must've forgotten. Heehee."
1600708-62 = "[ns] \"That's too obvious to be a mistake.\""
1600708-64 = "[ns] \"Did you lie about the film so you'd have an excuse to hang out?\""
1600708-72 = "My devotion to President Cherino hasn't changed, but there's this one line from my favorite movie."
1600708-73 = "\"Fibs are more like mistakes than lies.\""
1600708-74 = "So this little fib I told so I could spoil you was more like a small mistake than a lie."
1600708-75 = "Sensei, today with you was fun in a different way from the daily life I spend with President Cherino."
1600708-76 = "I might just keep making more mistakes like this."
1600708-78 = "After that, I finished up the day happily playing along with Tomoe's mistake."

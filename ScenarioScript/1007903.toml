[translation]
1007903-1 = "Innate Vibe"
1007903-2 = "After hearing what sounded like fighting, I hurried to a nearby park."
1007903-3 = "As I approached, Misaka's troubled voice rang out from afar."
1007903-5 = "N-No... Stop it, please."
1007903-6 = "This is too much..."
1007903-7 = "I've already told you. If you keep doing this, I'll..."
1007903-10 = "[ns1] \"Misaka!!\"\n[ns2] \"Stop right there! What's going on?!\""
1007903-17 = "Huh? Sensei...?"
1007903-18 = "Thank goodness you're here. I'm having a bit of trouble."
1007903-19 = "Sensei, you've got to do something. These people keep..."
1007903-20 = "[s3] \"First off, everyone calm down.\"\n[s4] \"Surely we can all just get along.\""
1007903-24 = "...calling me \"Sissy...\""
1007903-29 = "[ns5] \"Huh?\"\n[ns6] \"Did you say...\""
1007903-33 = "Um. Well... You see..."
1007903-34 = "It's short for \"big sister!\" Look at her, she's got that kinda vibe!"
1007903-35 = "Yeah, yeah. She looks kinda young, but it's what's on the inside that counts!"
1007903-36 = "And listen to the way she talks to you, Sensei... Talking so informally to an adult, like she's your equal!"
1007903-37 = "What's that supposed to mean...?"
1007903-38 = "Ah, you want me to tell you what exactly happened...?"
1007903-39 = "Well... It's a long story..."
1007903-40 = "To put it simply, they were in a bit of trouble, so I helped them out...with my electricity."
1007903-41 = "That's putting it mildly! We were in big trouble! A whole mess of rebar fell from a construction site."
1007903-42 = "If Sissy hadn't shot it down with her crazy lightning, we would've been crushed!"
1007903-43 = "Sissy went like this, and...! Crash! Boom! And then...!"
1007903-47 = "...That's enough."
1007903-48 = "They've been like this ever since. They want to know why I helped them, but who wouldn't help someone in trouble?"
1007903-49 = "You say that like it's nothing! But it's not nothing!"
1007903-50 = "People call us thugs... Forget helping us, most folks would rather fight us!"
1007903-51 = "Why on earth would I fight you...?"
1007903-52 = "I thought your outfits were a little strange, but I didn't think you were thugs. I just assumed that was the area's fashion."
1007903-53 = "So open-minded! No one's ever been that fair with me before! So open-minded!"
1007903-54 = "She really is our Sissy...!!"
1007903-58 = "[ns7] \"I was worried you got into a fight.\"\n[ns8] \"I'm glad everything's okay, after all.\""
1007903-64 = "No, this is not okay! It's actually really bad!"
1007903-65 = "I'm still in middle school. I don't want a bunch of high school students calling me their big sister!"
1007903-66 = "Age is just a number!"
1007903-67 = "Hey, why don't we introduce you to the others? With a power like yours, you could take over this whole neighborhood...!"
1007903-68 = "Aah! Stop! If anyone hears you, they'll think I'm some kind of underworld gang boss!"
1007903-69 = "Stop following me. I'm warning you. I won't stand for any more of this nonsense!"
1007903-70 = "Wow... As expected of Sissy... She's a true lone wolf..."
1007903-71 = "I-I guess...sticking with a group is something only weaklings like us do..."
1007903-72 = "We've really got so much to learn..."
1007903-73 = "It's not like that! I'm telling you it's not like that!!"
1007903-74 = "Sensei!! Say something! They'll listen to you!"
1007903-78 = "Sensei?"
1007903-82 = "[ns9] Look up from your phone.\n[ns10] \"Sorry, I was working. What's up?\""
1007903-85 = "Pay attention!!"
1007903-87 = "It took some convincing, but we persuaded them to leave Misaka alone."
1007903-88 = "I also encouraged them to not jump to conclusions about people so quickly."

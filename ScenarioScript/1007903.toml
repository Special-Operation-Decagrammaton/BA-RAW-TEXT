[translation]
1007903-1 = "เป็นไปโดยธรรมชาติ"
1007903-2 = "(คุณครูได้ยินว่ามีการต่อสู้เกิดขึ้น จึงรีบมุ่งหน้าไปที่ด้านหลังสวนสาธารณะที่อยู่ใกล้ๆ)"
1007903-3 = "(เมื่อมาถึงก็ได้ยินเสียงของมิซากะโวยวายดังมาจากที่ไกลๆ)"
1007903-5 = "ดะ... เดี๋ยวสิ บอกให้หยุดไง"
1007903-6 = "แบบนี้มันเกินไปแล้วนะ"
1007903-7 = "ฉันก็บอกไปแล้วไง ถ้ายังไม่เลิกทำแบบนี้ ฉันก็จะ..."
1007903-10 = "[ns1] \"มิซากะ!!\"\n[ns2] \"หยุดเดี๋ยวนี้เลย! นี่มันเรื่องอะไรกัน!?\""
1007903-17 = "...หืม? คุณครูเหรอ...?"
1007903-18 = "อ่า มาได้จังหวะพอดีเลย ฉันกำลังเจอเรื่องลำบากอยู่พอดีน่ะ"
1007903-19 = "คุณครูช่วยพูดอะไรกับพวกนี้หน่อยสิ พวกนี้เอาแต่ล้อมฉันไว้ แล้วก็..."
1007903-20 = "[s3] \"อืม ทุกคนใจเย็นๆ ก่อนนะ\"\n[s4] \"ครูไม่รู้หรอกนะว่ามีเรื่องอะไรกัน แต่ค่อยๆ คุยกันดีๆ...\""
1007903-24 = "เอาแต่เรียกฉันว่า \"ท่านพี่\" ไม่หยุดเลย..."
1007903-29 = "[ns5] \"...หา?\"\n[ns6] \"ว่าไงนะ...\""
1007903-33 = "เอ่อ... อืม... ก็อย่างที่เห็น..."
1007903-34 = "หรืออยากให้เรียก \"อาเจ้\" แทนดี? ดูทรงแล้วก็ใช่อยู่เหมือนกันนะ!"
1007903-35 = "ใช่ๆ! ไม่เกี่ยวกับอายุสักหน่อย ดูทรง ดูไวบ์แล้วมันใช่ \"ท่านพี่\" หรือทรง \"อาเจ้\" ก็เท่านั้นเอง!"
1007903-36 = "อีกอย่างเมื่อกี้ยังพูดกับคุณครูที่เป็นผู้ใหญ่แบบไม่มีหางเสียงอีกด้วย...!!"
1007903-37 = "พูดอะไรของพวกเธอเนี่ย... เฮ้อ..."
1007903-38 = "...หืม? คุณครู? อยากรู้ว่าเรื่องมันเป็นยังไงมายังไงงั้นเหรอ?"
1007903-39 = "คือว่า... ถ้าให้จะเล่า เรื่องมันน่าจะยาว..."
1007903-40 = "สรุปง่ายๆ ก็คือ ฉันเดินอยู่ดีๆ แล้วเห็นว่ามีเรื่องอะไรกันอยู่ก็เลยเข้ามาช่วย... ด้วยพลังไฟฟ้าน่ะ"
1007903-41 = "เกือบเป็นเรื่องแล้วมั้ยล่ะ! จู่ๆ ก็มีเหล็กร่วงลงมาจากไซต์ก่อสร้างเชียวนะ"
1007903-42 = "แต่ถ้าท่านพี่ไม่ปล่อยพลังไฟฟ้าแปลกๆ อะไรนั่นออกมา ยัยนี่ก็คงต้องไปนอนหยอดน้ำข้าวต้มแล้วละ!"
1007903-43 = "ท่านพี่เข้ามาช่วยพวกเราแบบ... วี๊ดดดด ตู้ม! บู้ม! เปรี้ยง...!!"
1007903-47 = "...เอาเถอะ"
1007903-48 = "หลังจากนั้นก็เป็นอย่างที่เห็นนี่แหละน่ะ พวกนี้เอาแต่ซักฉันไม่หยุดเลยว่าทำไมถึงช่วย พอบอกไป#nว่าต้องมีเหตุผลในการช่วยคนที่กำลังลำบากด้วยเหรอ ก็เลย..."
1007903-49 = "แหม พูดง่ายจังเลยนะคะท่านพี่! นี่มันเรื่องเล็กน้อยที่ไหนกันคะ!"
1007903-50 = "แถมพวกเรายังถูกตราหน้าว่าเป็นนักเลงด้วย... ดีแค่ไหนแล้วที่พวกเราไม่คิดว่าท่านพี่จะแกล้งเข้ามา#nทำดีกับพวกเราน่ะ!"
1007903-51 = "แล้วฉันจะไปทำแบบนั้นทำไมกันเล่า..."
1007903-52 = "ถึงฉันจะคิดว่าชุดของพวกเธอมีเอกลักษณ์เฉพาะตัวอยู่ แต่ก็ไม่ได้คิดเลยนะว่าจะเป็นนักเลง ก็แค่คิดว่าที่นี่คงมีคนที่ใส่ชุดที่มีลักษณะเฉพาะตัวอยู่ด้วย... ก็แค่นั้นเอง"
1007903-53 = "คะ...คนดีศรีคิโวทอสสุดๆ...! ไม่เคยมีใครมองพวกเราในแง่ดีแบบนี้มาก่อนเลย! สายตาของท่านพี่#nช่างปราศจากอคติซะจริงๆ...!"
1007903-54 = "สมแล้วที่เป็น \"ท่านพี่\" ที่จริงใจ...!!"
1007903-58 = "[ns7] \"นึกว่าทะเลาะอะไรกันซะอีก สรุปเป็นเรื่องเข้าใจผิดสินะ\"\n[ns8] \"นึกว่าเกิดเรื่องไม่ดีซะอีก แบบนี้ก็ค่อยโล่งอกหน่อย\""
1007903-64 = "ไม่หรอก นี่มันแย่มาก ไม่เห็นจะเป็นเรื่องดีตรงไหนเลย!"
1007903-65 = "ฉันเป็นแค่นักเรียนม.ต้นเองนะ จะให้นักเรียนม.ปลายมาเรียกว่าท่านพี่ๆ แบบนี้ได้ยังไง ไม่เอาด้วยหรอก!"
1007903-66 = "ก็บอกว่าอายุมันไม่เกี่ยวยังไงล่ะคะท่านพี่!"
1007903-67 = "ถ้าไม่ติดอะไร ให้พวกเราแนะนำเพื่อนๆ คนอื่นให้ท่านพี่รู้จักด้วยดีไหมคะ? ถ้าท่านพี่ต้องการน่ะนะ... ก็แหม พลังที่น่าตื่นตาตื่นใจของท่านพี่เมื่อกี้น่ะ ระเบิดแถวนี้ให้กระจุยได้เลยนะคะ...!!"
1007903-68 = "โอ๊ย! พอได้แล้ว!! ใครมาได้ยินเข้าคงคิดว่าฉันเป็นหัวโจกกลุ่มแยงกี้ที่คุมแถวนี้กันพอดี...!!"
1007903-69 = "เลิกตามมาสักที ฉันเตือนแล้วนะ ถ้าเข้ามาใกล้มากกว่านี้อีก ฉันไม่อยู่เฉยๆ แน่!!"
1007903-70 = "ว้าววว สมแล้วที่เป็นท่านพี่ของเรา... นี่สินะ หมาป่าเดียวดายผู้แข็งแกร่ง..."
1007903-71 = "กะ... ก็นะ พวกที่อยู่รวมกันเป็นกลุ่มคือคนอ่อนปวกเปียกอย่างเรานี่เนอะ..."
1007903-72 = "พวกเราคิดน้อยไปหน่อย..."
1007903-73 = "ก็บอกว่าไม่ใช่แบบนั้นไง!!"
1007903-74 = "คุณครู!! ช่วยพูดอะไรหน่อยสิ! ถ้าคุณครูพูดยัยพวกนี้น่าฟังนะ!"
1007903-78 = "...คุณครู?"
1007903-82 = "[ns9] ทำงานที่ค้างอยู่ผ่านโทรศัพท์มือถือ\n[ns10] \"ขอโทษที พอดีครูทำงานอยู่ เมื่อกี้ว่าอะไรนะ?\""
1007903-85 = "อย่ามาทำเป็นไม่รู้ไม่ชี้นะ!!"
1007903-87 = "(หลังจากนั้นคุณครูก็ช่วยเกลี้ยกล่อมพวกนักเลงให้เข้าใจและยอมกลับไปแต่โดยดี)"
1007903-88 = "(ก่อนกลับคุณครูก็ตักเตือนด้วยว่าอย่าไปทำเรื่องอะไรแบบนี้อีก)"

[translation]
1007903-1 = "與生俱來的氣場"
1007903-2 = "（聽說發生爭執，於是急忙前往了附近的公園後方）"
1007903-3 = "（才剛到附近，就聽見遠處傳來御坂困擾的聲音）"
1007903-5 = "哎，哎呀……拜託你們別這樣。"
1007903-6 = "真傷腦筋……"
1007903-7 = "我剛才就說了，一直這樣我也──"
1007903-10 = "[ns1]「御坂！！」\n[ns2]「住手！發生什麼事了！！」"
1007903-17 = "……嗯？老師……？"
1007903-18 = "啊啊，你來得正好，我正傷腦筋呢。"
1007903-19 = "老師來說說他們吧。這些人從剛才就一直……"
1007903-20 = "[s3]「嗯，大家先冷靜下來。」\n[s4]「雖然不知道發生了什麼事，但大家要和睦相處……」"
1007903-24 = "……叫我「姊姊大人」……"
1007903-29 = "[ns5]「……嗯？」\n[ns6]「你說什麼……？」"
1007903-33 = "……呃，就……跟你看到的一樣……"
1007903-34 = "可，可是……那個氣場不管是誰看了都會叫你「姊姊大人」吧！"
1007903-35 = "沒錯沒錯！這跟年紀無關！重要的是人的本質！"
1007903-36 = "而且剛才跟老師……跟大人說話的口氣也這麼從容……！！"
1007903-37 = "這又是什麼意思……呃呃……"
1007903-38 = "……老師？你問是怎麼回事？"
1007903-39 = "這……說來話長……"
1007903-40 = "簡單來說，我在路上偶然看見他差點碰到意外，所以就幫了他一把……用電力。"
1007903-41 = "真的差點就出事了！#n鋼筋突然從施工現場掉了下來！"
1007903-42 = "要不是姊姊大人用不可思議的電能力射向鋼筋，現在這傢伙早就受重傷了！"
1007903-43 = "姊姊大人他「哐噹！！」一聲就把鋼筋給……！！"
1007903-47 = "……總之。"
1007903-48 = "在那之後就一直是這個樣子。#n我只是在被問到為什麼幫忙的時候，回答幫助有困難的人不需要理由而已……"
1007903-49 = "說得太簡單了吧！那明明就不是那麼容易的事！"
1007903-50 = "更何況對象還是我們這種被貼上太妹標籤的人……#n光是不故意陷害我們就該謝天謝地了說！"
1007903-51 = "我到底為什麼要做那種事……"
1007903-52 = "雖然服裝確實是有點奇特，但我不會因為這樣就認為你們是太妹哦。#n只是覺得這裡也有別具特色的打扮而已。"
1007903-53 = "那個眼神……那不帶偏見的眼神！還有能受到這種待遇都是第一次啊！"
1007903-54 = "真不愧是姊姊大人……！！"
1007903-58 = "[ns7]「我還以為是發生了爭執，原來是誤會一場。」\n[ns8]「本來還擔心出了什麼壞事，真是太好了。」"
1007903-64 = "不不不，一點都不好，情況壞透了！"
1007903-65 = "我還是國中生耶，才不想被高中生叫姊姊大人！！"
1007903-66 = "都說年紀不重要了嘛。"
1007903-67 = "如果不介意的話，要不要我向您介紹一下其他人？#n只要姊姊大人願意……不，用剛才那個神奇的能力把這周圍一帶都……！！"
1007903-68 = "啊啊──！快停下來！！#n要是別人聽到會把我誤會成是要佔領附近的太妹首領的啊！！"
1007903-69 = "別再跟過來了，這是警告哦。#n再過來我真的不會善罷甘休哦！！"
1007903-70 = "唔……不愧是姊姊大人……簡直是孤高的一匹狼……"
1007903-71 = "也，也對。只有像我們這樣的弱者才會成群結隊的……"
1007903-72 = "我們又思慮不周了……"
1007903-73 = "都說不是那樣了──！！"
1007903-74 = "老師！！請老師說幾句話吧！老師說的話他們應該會聽吧！"
1007903-78 = "……老師？"
1007903-82 = "[ns9] 用手機APP處理沒做完的工作\n[ns10]「抱歉，我剛才在工作。你說什麼？」"
1007903-85 = "別裝傻了啦──！！"
1007903-87 = "（之後說服了太妹並將他們請了回去）"
1007903-88 = "（順便也叮嚀了幾句，以免他們在附近隨意鬧事）"

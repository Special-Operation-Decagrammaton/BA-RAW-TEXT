[translation]
1008705-1 = "總之就這樣做吧！"
1008705-3 = "（格黑娜外圍的派對大廳）"
1008705-7 = "老師，您來了啊。"
1008705-8 = "[s]「亞子，這裡到底是……」"
1008705-9 = "這裡是和格黑娜有往來的企業舉辦的聯誼會。"
1008705-10 = "因為各種理由而必須要露臉，真是麻煩……不過處理這種事也是行政官的工作。"
1008705-11 = "換作是平常的話，就算穿原本的衣服來也不會有人有意見……"
1008705-15 = "穿著這套禮服走路和行動還是讓我有點在意……"
1008705-16 = "但是在參加萬魔殿的派對之前，還是需要熟悉一下才行。"
1008705-17 = "[s]「也就是說，你想進行模擬戰對吧。」"
1008705-18 = "是的，沒錯。"
1008705-19 = "既然是那個萬魔殿……#n那些狡猾的傢伙舉辦的派對，老師恐怕也很難和我一起行動……"
1008705-20 = "這是老師幫我挑選的衣服……所以第一次還是……"
1008705-25 = "總，總之老師也必須融入訓練當中！"
1008705-26 = "[s]「我知道了，交給我吧。」"
1008705-27 = "……是。"
1008705-33 = "[ns] 護送亞子"
1008705-40 = "唔……"
1008705-41 = "[s]「亞子，你還好吧？走路的姿勢看起來好像不太方便？」"
1008705-45 = "啊，是的……"
1008705-46 = "可能是禮服比想像中還長的關係，不小心就會踩到裙子……"
1008705-51 = "啊……？"
1008705-56 = "呀啊！？"
1008705-57 = "[ns]「亞子，你沒事吧？」"
1008705-61 = "啊，嗯……差點就因為踩到裙子跌倒了……"
1008705-62 = "幸虧有老師及時抓住我……"
1008705-66 = "……咦？"
1008705-67 = "那，那個……您有聽見什麼撕破的聲音嗎？"
1008705-71 = "可能是在我的背後……？#n……不，是腰部？"
1008705-72 = "[s]「背？腰？」"
1008705-74 = "不，再稍微下面一點……"
1008705-79 = "哇，哇啊啊──！？#n腰部附近的地方破了！？"
1008705-80 = "[s1]「你，你等等，我會想辦法解決的。」\n[s2]「先去沒有人的角落吧！」"
1008705-88 = "― [log=아코 드레스]這，這樣下去我會很困擾的！[/log][wa:850] "
1008705-90 = "― [log=아코 드레스]如果被其他人發現的話……[/log][wa:1170] "
1008705-93 = "― [log=아코 드레스]就要出大事了……！[/log][wa:1010] "
1008705-96 = "[ns]「你先別動，我用別針把破掉的部分……」"
1008705-97 = "― [log=아코 드레스]居，居然偏偏在這種時候……！[/log][wa:1710] "
1008705-100 = "―[log=아코 드레스]果然，是因為和老師一起來的關係……？[/log][wa:2440] "
1008705-103 = "[ns]「什麼！？這未免也太牽強了吧！？」"
1008705-104 = "― [log=아코 드레스]老師！請想想辦法！[/log][wa:1290] "
1008705-107 = "― [log=아코 드레스]在我發生大事之前，快點！[/log][wa:2100] "
1008705-110 = "[ns3] 在處理亞子弄破的禮服時，突然發現了熟悉的東西\n[ns4]「………………這是！」"
1008705-111 = "― [log=아코 드레스]咦？怎，怎麼了嗎？那個表情……[/log][wa:2630] "
1008705-112 = "― [log=아코 드레스]咦？怎，怎麼了嗎？那個表情……[/log][wa:2630] "
1008705-115 = "― [log=아코 드레스]……嗯？[/log]"
1008705-118 = "― [log=아코 드레스]怎，怎麼了？[/log][wa:640] "
1008705-120 = "― [log=아코 드레스]您到底發現了什麼……？[/log]"
1008705-123 = "[ns]「……你不是說要退貨嗎？」"
1008705-124 = "― [log=아코 드레스]這，這是，因為……[/log][wa:1680] "
1008705-126 = "― [log=아코 드레스]退貨的話，各方面都有點麻煩……[/log][wa:1840] "
1008705-129 = "― [log=아코 드레스]那個……因為風紀委員會的工作很忙……[/log][wa:2000] "
1008705-131 = "― [log=아코 드레스]該說是沒時間嗎……[/log][wa:640] "
1008705-134 = "― [log=아코 드레스]總之就是那樣！[/log]"
1008705-136 = "― [log=아코 드레스]就請當作是那樣吧！[/log][wa:260] "
1008705-139 = "（好不容易才解決了傷腦筋的情況）"
1008705-140 = "（將失落的亞子送回格黑娜後，回到了夏萊）"

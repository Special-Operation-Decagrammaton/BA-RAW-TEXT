[translation]
1008705-1 = "It Is What It Is!"
1008705-3 = "At the party hall on the outskirts of Gehenna."
1008705-7 = "Sensei, you're here."
1008705-8 = "[s] \"Ako. What in the world...\""
1008705-9 = "This is a social gathering for private companies with ties to Gehenna."
1008705-10 = "I hate having to attend these things... But as Senior Administrator, it's part of my responsibilities."
1008705-11 = "Normally, I would have just worn my normal clothes, and no one would have cared, but..."
1008705-15 = "Uh, wearing this dress still gives me the jitters. "
1008705-16 = "I wanted to try getting used to wearing it at some minor functions before I attended the Gehenna special party."
1008705-17 = "[s] \"In other words, you wanted to do a mock battle.\""
1008705-18 = "Precisely. "
1008705-19 = "If it's a party thrown by those gremlins... I don't think I'll be able to lean on your support..."
1008705-20 = "And seeing as you picked out this dress... "
1008705-25 = "It's only natural I get your support during training, if I can't on the battlefield!"
1008705-26 = "[s] \"Understood. I've got your back.\""
1008705-27 = "...All right."
1008705-33 = "[ns] And so, I chaperoned Ako."
1008705-40 = "Mmm..."
1008705-41 = "[s] \"Are you okay? You look a bit uncomfortable.\""
1008705-45 = "Ah. Yeah..."
1008705-46 = "This dress is a bit longer than I thought. I keep feeling like I'm going to trip over it. Uh..."
1008705-51 = "H-Huh?"
1008705-56 = "Fuehhhh?!"
1008705-57 = "[ns] \"Ako, are you okay?!\""
1008705-61 = "Y-Yeah... I-I just...almost tripped over my dress."
1008705-62 = "Thank goodness you caught me."
1008705-66 = "Huh?"
1008705-67 = "Did you hear something tear?"
1008705-71 = "Wait, I think it was my dress! Was it the back? No... At my waist?"
1008705-72 = "[s] \"Back? Waist?\""
1008705-74 = "Where is it?"
1008705-79 = "K-Kyahhh?! It did tear!"
1008705-80 = "[s1] \"H-Hold on. I'll see what I can do.\"\n[s2] \"Let's find a private corner!\""
1008705-88 = "― [log=아코 드레스]Th-This is really bad![/log][wa:490] "
1008705-90 = "― [log=아코 드레스]If someone else notices...[/log][wa:610] "
1008705-93 = "― [log=아코 드레스]It'll be huge trouble![/log][wa:490] "
1008705-96 = "[ns] \"Hold on, let me try to close the torn area with a safety pin.\""
1008705-97 = "― [log=아코 드레스]Wh-Why now of all times?![/log][wa:1270] "
1008705-100 = "― [log=아코 드레스]Is it because I came here with you, Sensei?![/log][wa:1360] "
1008705-103 = "[ns] \"Huh?! What are you talking about?!\""
1008705-104 = "― [log=아코 드레스]Sensei! Please...just do something![/log][wa:250] "
1008705-107 = "― [log=아코 드레스]Before I end up in a tabloid![/log][wa:1420] "
1008705-110 = "[ns3] As I mended Ako's torn dress, I saw a familiar sight.\n[ns4] \"Ako, you didn't...\""
1008705-111 = "― [log=아코 드레스]Hm? Wh-What is it? What's with that look?[/log][wa:1590] "
1008705-112 = "― [log=아코 드레스]Hm? Wh-What is it? What's with that look?[/log][wa:1590] "
1008705-115 = "― [log=아코 드레스]...Huh?[/log]"
1008705-118 = "― [log=아코 드레스]Wh-What is it?[/log][wa:320] "
1008705-120 = "― [log=아코 드레스]Just what did you find?[/log]"
1008705-123 = "[ns] \"...Didn't you say you were going to return this?\""
1008705-124 = "― [log=아코 드레스]Th-That's, uh...[/log][wa:1400] "
1008705-126 = "― [log=아코 드레스]Returning...purchases tends to be a lot of effort...[/log][wa:360] "
1008705-129 = "― [log=아코 드레스]And...I was too busy with Prefect Team work,[/log][wa:960] "
1008705-131 = "― [log=아코 드레스]so I had no time...[/log][wa:240] "
1008705-134 = "― [log=아코 드레스]Look, it is what it is![/log]"
1008705-136 = "― [log=아코 드레스]Let's just leave it at that![/log][wa:10] "
1008705-139 = "Somehow, that lone, little safety pin managed to save the day, and put an end to that awkward situation."
1008705-140 = "Afterwards, I took a very flustered Ako back to Gehenna. The tabloids were none the wiser."

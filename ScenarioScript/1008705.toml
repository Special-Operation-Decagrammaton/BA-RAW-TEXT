[translation]
1008705-1 = "ให้รู้ไว้ว่าเป็นแบบนั้นค่ะ!"
1008705-3 = "(ที่จัดงานปาร์ตี้ในชานเมืองเกเฮนน่า)"
1008705-7 = "คุณครู มาแล้วเหรอคะ"
1008705-8 = "[s] \"อาโกะ นี่มันงานอะไรกัน...\""
1008705-9 = "ค่ะ นี่คืองานสังสรรค์กระชับมิตรของบริษัทเอกชนที่เกี่ยวข้องกับสถาบันเกเฮนน่าค่ะ"
1008705-10 = "การต้องมาร่วมงานด้วยเหตุผลนู่นนี่นั่นก็เป็นเรื่องน่ารำคาญนะคะ... แต่งานแบบนี้ก็เป็นหน้าที่ของ#nเจ้าหน้าที่อย่างฉันค่ะ"
1008705-11 = "ถ้าเป็นปกติ ฉันก็คงใส่ชุดเดิมมาและไม่มีใครว่าอะไร..."
1008705-15 = "แต่ฉันก็ยังกังวลเรื่องการเดินและการเคลื่อนไหวเมื่อใส่ชุดนี้... "
1008705-16 = "ก็เลยอยากลองใส่ให้ชินก่อนที่จะไปเข้าร่วมงานปาร์ตี้ของแพนเดโมเนียม โซไซตี้น่ะค่ะ"
1008705-17 = "[s] \"เหมือนเตรียมการต่อสู้ล่วงหน้าสินะ\""
1008705-18 = "ค่ะ แบบนั้นแหละค่ะ "
1008705-19 = "และถ้าเป็นปาร์ตี้ที่จัดโดยพวกแรคคูนนั่นด้วยละก็... ในวันนั้นฉันคงไม่ได้อยู่กับคุณครูเท่าไร..."
1008705-20 = "อีกอย่าง ชุดนี้เป็นชุดที่คุณครูเลือกให้... งั้นคุณครูก็ต้อง... "
1008705-25 = "ต้องมาช่วยฉันฝึกฝนในคราวนี้ด้วยค่ะ!"
1008705-26 = "[s] \"เข้าใจแล้ว วางใจได้เลย\""
1008705-27 = "ค่ะ..."
1008705-33 = "[ns] ช่วยคุ้มกันอาโกะ"
1008705-40 = "อืม..."
1008705-41 = "[s] \"อาโกะ โอเครึเปล่า? เหมือนจะเดินไม่ค่อยสะดวกเลยนะ?\""
1008705-45 = "อ่า... ค่ะ..."
1008705-46 = "ชุดนี้มันยาวมากกว่าที่คิด ฉันก็เลยเอาแต่เหยียบชายกระโปรงโดยไม่รู้ตัวน่ะค่ะ..."
1008705-51 = "เอะ... เอ๋...?"
1008705-56 = "ว้ายย?!"
1008705-57 = "[ns] \"อาโกะ เป็นยังไงบ้าง?!\""
1008705-61 = "มะ... ไม่เป็นไรค่ะ พอดีฉันเผลอเหยียบกระโปรงน่ะ... เกือบหกล้มไปแล้วสิ... "
1008705-62 = "ค่อยยังชั่วที่คุณครูช่วยจับไว้ได้..."
1008705-66 = "เอ๋...?"
1008705-67 = "ดะ... เดี๋ยวนะคะ... เมื่อกี้ได้ยินเสียงอะไรขาดมั้ยคะ?"
1008705-71 = "ขะ... ข้างหลังฉัน...? ตรงหลัง... ไม่สิ ตรงเอว...?"
1008705-72 = "[s] \"หลัง? หรือเอวนะ?\""
1008705-74 = "ไม่ค่ะ ลงไปข้างล่างอีกหน่อย..."
1008705-79 = "อะ... อ๊ายยย?!! ตรงเอวขาดเลยเหรอคะเนี่ย?!"
1008705-80 = "[s1] \"ระ... รอเดี๋ยวนะ ครูจะหาทางจัดการเอง\"\n[s2] \"ไปหลบในที่ที่ไม่มีคนก่อนดีกว่า!\""
1008705-88 = "― [log=아코 드레스]บะ... แบบนี้ก็แย่เลยสิคะ![/log][wa:370] "
1008705-90 = "― [log=아코 드레스]ถ้าคนอื่นเห็นขึ้นมาละก็...[/log][wa:610] "
1008705-93 = "― [log=아코 드레스]จะเป็นเรื่องใหญ่ได้นะคะ...![/log][wa:290] "
1008705-96 = "[ns] \"อยู่นิ่งๆ ก่อน เดี๋ยวครูใช้เข็มกลัดติดส่วนที่ขาดไว้...\""
1008705-97 = "― [log=아코 드레스]เฮ้อ ทำไมกันนะ ทำไมต้องเป็นจังหวะนี้ด้วย...![/log][wa:510] "
1008705-100 = "― [log=아코 드레스]หรือว่าเพราะใส่ชุดนี้มากับคุณครูงั้นเหรอ...?[/log][wa:1360] "
1008705-103 = "[ns] \"เอ๋?!  กล่าวหากันแบบนั้นได้ยังไงกัน?!\""
1008705-104 = "― [log=아코 드레스]คุณครู! ทำอะไรสักอย่างสิคะ![/log][wa:570] "
1008705-107 = "― [log=아코 드레스]ก่อนที่ฉันจะเจอเรื่องใหญ่น่ะ! เร็วๆ เข้าสิ![/log][wa:860] "
1008705-110 = "[ns3] คุณครูสะดุดตากับสิ่งที่คุ้นเคยระหว่างช่วยจัดการชุดที่ขาดของอาโกะ\n[ns4] \"นี่มัน...\""
1008705-111 = "― [log=아코 드레스]หืม? อะ... อะไรกันคะ? สีหน้าแบบนั้น?[/log][wa:1790] "
1008705-112 = "― [log=아코 드레스]หืม? อะ... อะไรกันคะ? สีหน้าแบบนั้น?[/log][wa:1790] "
1008705-115 = "― [log=아코 드레스]เอ๋...?[/log]"
1008705-118 = "― [log=아코 드레스]อะ... อะไรกันคะ?[/log][wa:240] "
1008705-120 = "― [log=아코 드레스]เจออะไรงั้นเหรอคะ...?[/log]"
1008705-123 = "[ns] \"ไม่ได้บอกว่าจะเอาไปคืนหรอกเหรอ...?\""
1008705-124 = "― [log=아코 드레스]ระ... เรื่องนั้น... คือว่า...[/log][wa:880] "
1008705-126 = "― [log=아코 드레스]ถ้าจะเอาไปคืน ก็ต้องใช้ความพยายามมาก...[/log][wa:880] "
1008705-129 = "― [log=아코 드레스]แล้ว... งานของคณะกรรมการวินัยก็ยุ่งด้วย[/log][wa:1160] "
1008705-131 = "― [log=아코 드레스]ฉันก็เลยไม่มีเวลาน่ะค่ะ...[/log][wa:10] "
1008705-134 = "― [log=아코 드레스]เอาเถอะค่ะ![/log]"
1008705-136 = "― [log=아코 드레스]ให้รู้ไว้ว่าเป็นแบบนั้นก็แล้วกันค่ะ![/log][wa:10] "
1008705-139 = "(คุณครูจัดการชุดให้อาโกะได้สำเร็จ และคลี่คลายสถานการณ์ที่ลำบากนี้ได้ในที่สุด)"
1008705-140 = "(หลังจากไปส่งอาโกะที่หดหู่ใจถึงเกเฮนน่า คุณครูก็กลับมายังชาเล่ต์)"

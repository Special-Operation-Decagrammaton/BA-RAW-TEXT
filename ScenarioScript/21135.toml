[translation]
21135-3 = "ริมทางเดินในตึกมิลเลเนียม"
21135-4 = "ฮุฮุ นี่ดูต่างจากฉากกั้นเหล็กกล้าผสมเมื่อกี้นะเนี่ย โดนขังเข้าจริงๆ ซะแล้ว~"
21135-5 = "ฮุฮุ รุ่นพี่อาคาเนะ การที่ต้องถูกขังแบบนี้ก็ถือเป็นโชคชะตานะคะ#nมานั่งฟังเลคเชอร์ทฤษฎีสัมพันธภาพกับฉันไหมล่ะ?"
21135-8 = "อึ่ก! นี่คือซีโร่ทรี! ฉันถูกขังอยู่ที่เขต A-11! ซีโร่วันทราบแล้วเปลี่ยน! ทราบแล้วเปลี่ยน!"
21135-12 = "<อีกฝ่ายกำลังออฟไลน์>"
21135-13 = "โธ่! รุ่นพี่อาสึนะ! ไปอยู่ที่ไหนกันนะ? เปิดสัญญาณไว้สิคะ!"
21135-15 = "(ตี๊ดติ๊ด..)"
21135-17 = "Connecting, New Message..."
21135-18 = "ยังไม่รู้ตำแหน่งรุ่นพี่อาสึนะ แต่ก็วางใจได้ อาคาเนะ"
21135-20 = "ชมรมพัฒนาเกมอยู่ในบริเวณของฉันแล้ว"
21135-22 = "From Call Sign 02"
21135-24 = "ตอนต่อไป;เมด vs ไมสเตอร์"

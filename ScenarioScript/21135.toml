21135-13 = "AHHH! Asuna! Where the hell are you?! Turn your comm on, for crying out loud!"
21135-15 = "*beep beep*"
21135-17 = "Connecting. New Message..."
21135-18 = "I don't know where Asuna is, but don't worry, Akane."
21135-20 = "I've got the Game Development Department exactly where I want them."
21135-22 = "From: call sign Zero-Two."
21135-24 = "Next Episode;Maids vs. Meisters"

21135-15 = "（嗶嗶）"
21135-17 = "Connecting, New Message……"
21135-18 = "雖然不知道明日奈前輩在哪……不過放心吧，朱音。"
21135-20 = "遊戲開發部，已經在我的射程範圍裡了。"

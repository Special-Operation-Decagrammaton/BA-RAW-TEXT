[translation]
10009120-1 = "ย้อนวันวาน;แต่สิ่งที่ผิดพลาดคือโลก"
10009120-2 = "..."
10009120-4 = "ที่ฉันกลายมาเป็นแยงกี้น่ะ ก็เพราะว่ามีอิสระยังไงล่ะ..."
10009120-5 = "ไม่ต้องผูกมัดกับกฎระเบียบ ใช้ชีวิตได้อย่างอิสระ..."
10009120-6 = "รับผิดชอบแค่เรื่องของตัวเอง แต่ถ้ามีเรื่องไหนที่รับผิดชอบไม่ไหว ก็โบ้ยกลับไปให้สังคมได้..."
10009120-7 = "เรื่องนั้นมันก็ไม่ได้แย่อะไรหรอก แถมยังสนุกด้วยซ้ำ"
10009120-8 = "ถึงแม้... จะมีบางช่วงที่ใช้ชีวิตลำบากอยู่บ้าง แต่ถ้าเอาแต่ใช้ชีวิตสบายๆ ง่ายๆ มันก็ไม่สนุกน่ะสิ"
10009120-9 = "ดีทุกอย่างเลย ทุกๆ อย่างดีหมด..."
10009120-12 = "แต่กระโปรงยาวล้าสมัยแบบนี้มันใช่เรื่องที่ไหนกันเล่า?!"
10009120-13 = "เพราะอะไรกัน! ทำไมถึงต้องมาใส่กระโปรงที่ยาวจนถึงตาตุ่ม ดูเทอะทะแบบนี้ด้วย...!"
10009120-17 = "ไม่ได้ดูสวยอะไรเลยสักนิด ถ้าฝนตกก็จะเปียกไปทั้งตัว ถึงข้อดีคือจะเอาอะไรซ่อนไว้ข้างในได้ก็เถอะ แต่แล้วมันต้องเอาอะไรซ่อนไว้ใต้กระโปรงรึไงกันเล่า?"
10009120-21 = "แต่ว่าถ้าไม่ใส่กระโปรงนี่ละก็ จะถือว่าละเมิดระเบียบการแต่งตัว ถือว่าไม่มีความภักดี!"
10009120-22 = "เป็นแยงกี้แล้วแต่งตัวสวยๆ หน่อยไม่ได้รึไง?! ใส่ชุดสวยๆ น่ารักๆ บ้างไม่ได้รึไง!"
10009120-24 = "ฮุฮุฮุ... เสียงตะโกนที่อัดแน่นด้วยความอึดอัดใจของคุณ ฉันได้รับฟังแล้วค่ะ"
10009120-26 = "คะ... ใครน่ะ?!"
10009120-29 = "ฉันอาจช่วยคลี่คลายเรื่องที่คุณอึดอัดใจอยู่ให้ก็ได้นะคะ..."
10009120-30 = "อืม... เรียกว่าผู้ช่วยเหลือละมั้งคะ?"
10009120-35 = "ถ้างั้น... ให้ใส่เสื้อผ้ากับหน้ากากนี่ แล้วก็ออกไปเที่ยวเล่นตามใจได้เลยงั้นเหรอ?"
10009120-37 = "ใช่แล้วค่ะ"
10009120-38 = "แต่ว่าชุดกับหน้ากากนี่น่ะ มันเหมือนกับที่เธอใส่อยู่เลยไม่ใช่รึไง?"
10009120-39 = "แต่ว่าก็อาจจะดีกว่ากระโปรงเห่ยๆ นั่นก็ได้นะคะ ไม่คิดแบบนั้นเหรอคะ?"
10009120-40 = "ฉันไม่บังคับหรอกนะคะ ฉันก็แค่เสนอทางเลือกให้เฉยๆ ค่ะ"
10009120-41 = "..."
10009120-42 = "ฉันชอบนะ"
10009120-43 = "เสื้อนักเรียนสไตล์กิโมโนน่ารักดี แถมลายสวยด้วย ส่วนหน้ากากก็... ไม่ได้แย่เท่าไหร่"
10009120-44 = "ฉันเองก็ชอบอะไรที่ดูโดดเด่นอยู่แล้วด้วย"
10009120-48 = "ดีละ ฉันจะรับข้อเสนอของเธอ!"
10009120-56 = "ถ้างั้นก็ขอให้พบแต่ความบันเทิงนะคะ..."
10009120-60 = "ไปซะแล้วแฮะ..."
10009120-65 = "ถ้างั้นก็มีเรื่องที่ต้องทำแล้วสินะ"
10009120-72 = "ดีละ ออกไปเที่ยวเล่นให้สบายใจเลยแล้วกัน!"

[translation]
10009120-1 = "Afterword; The World is Wrong"
10009120-2 = "..."
10009120-4 = "You know...the whole reason I became a thug in the first place was for freedom."
10009120-5 = "To live life freely, unhindered by rules..."
10009120-6 = "You take responsibility for your own actions, and to heck with everything else."
10009120-7 = "That's not a bad way to live. It was fun, even."
10009120-8 = "Of course there were hard times, but life's no fun without a few bumps in the road."
10009120-9 = "So... I shouldn't complain, but..."
10009120-12 = "Can't we do something about this totally outdated uniform?!"
10009120-13 = "Seriously, what is this?! It's so annoying to move around in a skirt that comes all the way to my ankles!"
10009120-17 = "It's not even cute! And don't even get me started on when it rains... It gets so heavy you can barely move. The bosses say it's for hiding things but I've never, ever needed to do that!"
10009120-21 = "But even think about wearing something else, and what do you hear? \"Oh, you're violating the dress code! You're being disloyal!\""
10009120-22 = "Is it so wrong for a thug to want to look pretty? To want to wear something cute?!"
10009120-24 = "Heehee... Don't worry. Your anguished cries have been heard."
10009120-26 = "Wh-Who are you?!"
10009120-29 = "Who am I? I just may be the solution to your troubles..."
10009120-30 = "You could think of me as a potential collaborator."
10009120-35 = "So I just have to wear this outfit and mask... And run amok however I want?"
10009120-37 = "That's right."
10009120-38 = "But, uh, these are just the same clothes that you're wearing, aren't they?"
10009120-39 = "That's true, but it's still better than your uniform, is it not?"
10009120-40 = "But I won't force you if you don't want to. It's just a suggestion, after all."
10009120-41 = "..."
10009120-42 = "Actually, I like it."
10009120-43 = "This kimono-style uniform is really beautiful! And the mask isn't half-bad, either."
10009120-44 = "And running amok... Heh heh heh. Running amok is my specialty."
10009120-48 = "So I accept your suggestion!"
10009120-56 = "In that case... Thank you for your hard work."
10009120-60 = "Oh? She's gone..."
10009120-65 = "Well, I guess it's decided."
10009120-72 = "Time to run amok to my heart's content!"

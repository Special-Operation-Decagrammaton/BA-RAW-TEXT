[translation]
10009120-1 = "後日談其五;錯的是這個世界"
10009120-2 = "……"
10009120-4 = "我成為太妹的理由……是為了追求「自由」。"
10009120-5 = "不受規則束縛，恣意謳歌人生。"
10009120-6 = "自己的事自己負責──#n無法負責的部分就交給社會──"
10009120-7 = "當個太妹的生活還不賴。#n最重要的是和無聊的那時相比，不知道有趣了多少倍。"
10009120-8 = "雖然多少還是會覺得活著很辛苦，不過一帆風順的人生也很無趣。"
10009120-9 = "所以，我喜歡當個太妹。#n但是──"
10009120-12 = "這個過時的裙子不能改一改嗎！？"
10009120-13 = "這到底是什麼啊！又礙事又妨礙活動！"
10009120-17 = "既不可愛又沒什麼功能！#n下雨的時候每次都會淋濕還黏在腿上！"
10009120-21 = "可是，不穿這件裙子又會被說什麼服裝違反規定之類的……"
10009120-22 = "難道太妹就不能打扮嗎！？#n想打扮成怎樣根本就無所謂吧！？"
10009120-24 = "唔呵呵……你的煩惱，我聽見了。"
10009120-26 = "是，是誰！？"
10009120-29 = "或許，我能解決你的煩惱……"
10009120-30 = "或者，也可以說是幫手？"
10009120-35 = "所以……要穿上這件衣服和面具，在這裡鬧事是嗎？"
10009120-37 = "正是如此。"
10009120-38 = "但是……為什麼要打扮得跟你一樣？"
10009120-39 = "呵呵，我想應該會比那件裙子更符合你的喜好……"
10009120-40 = "不過這只是個提案罷了，我並不會強迫你。"
10009120-41 = "……"
10009120-42 = "你說的對，我很喜歡。"
10009120-43 = "這個和服風格的制服也很可愛，面具也……還算不錯。"
10009120-44 = "而且鬧事可是太妹的獨家專利。"
10009120-48 = "你的提案，我接受了！"
10009120-56 = "唔呵呵……那麼，就拜託你囉。"
10009120-60 = "嗯？已經走掉了啊。"
10009120-65 = "那麼……接下來就──"
10009120-72 = "來稍微鬧點事吧！"

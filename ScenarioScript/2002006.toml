[translation]
2002006-1 = "เครื่องหมายเซมิโคลอนของแฮ็กเกอร์อัจฉริยะ"
2002006-2 = "(วันนี้ฮิมาริไม่ได้ชวนคุณครูไปยังที่ซ่อนเหมือนกับทุกครั้ง แต่กลับขอให้ไปที่ห้องทำงานของเวอริทัสแทน)"
2002006-8 = "สวัสดีค่ะคุณครู ฮิฮิ มาแล้วสินะคะ"
2002006-9 = "[s] \"ทำไมวันนี้ถึงเรียกมาที่นี่ล่ะ?\""
2002006-10 = "ค่ะ วันนี้ฉันมีงานที่ต้องจัดการอยู่นิดหน่อย เลยไม่ได้ไปพักผ่อน..."
2002006-11 = "ถ้างั้น... เรามาเข้าเรื่องกันดีกว่าค่ะ"
2002006-12 = "ฉันได้มันมาแล้วค่ะ"
2002006-13 = "[s] \"ได้มาเหรอ? ใช่สมบัติที่พูดถึงก่อนหน้านี้รึเปล่า?\""
2002006-14 = "ฮุฮุฮุ ใช่แล้วค่ะ สมบัติค่ะ"
2002006-15 = "มันเป็นของที่ขึ้นชื่อว่าหายากเป็นพิเศษในหมู่ <แฮ็กเกอร์> ค่ะ"
2002006-16 = "อยากรู้ว่ามันคือสมบัติอะไรงั้นเหรอคะ?"
2002006-17 = "ฮุฮุฮุ..."
2002006-18 = "เห็นแล้วอย่าตกใจนะคะ..."
2002006-24 = "นี่ค่ะ!"
2002006-28 = "[ns] \"นี่มันมอนสเตอร์แม็กซ์... นี่นา\""
2002006-29 = "ตายจริง มันไม่ใช่แค่มอนสเตอร์แม็กซ์ธรรมดาๆ หรอกนะคะ"
2002006-30 = "นี่เป็นรุ่นลิมิเต็ดเอดิชั่น ที่มีรสชาติอร่อยกว่ามอนสเตอร์แม็กซ์ทั่วไปถึงร้อยเท่า... 'แม็กซ์ อิน เดอะ แม็กซ์' เลยค่ะ"
2002006-31 = "[s] \"อ๋อ... งั้นเหรอ\""
2002006-36 = "ตอบเสียงเบากว่าที่คิดนะคะ..."
2002006-37 = "มีข่าวลือว่าเป็นสินค้าขายดีในหมู่คนที่ชอบเล่นคอมพิวเตอร์ค่ะ เป็นของหายาก ลิมิเต็ดสุดๆ ค่ะ"
2002006-38 = "สมาชิกเวอริทัสคนอื่นๆ ก็บอกว่าอยากลองดื่มดูสักครั้ง"
2002006-39 = "[s] \"หรือว่าที่ฮิมาริพยายามหามา... ก็เพื่อทุกคนเหรอ?\""
2002006-40 = "ฮุฮุ บางครั้งก็ต้องแสดงความเป็นหัวหน้าให้เด็กๆ พวกนั้นเห็นบ้าง จะได้เป็นหัวหน้าได้อย่างภาคภูมิยัง#nไงล่ะคะ"
2002006-41 = "แน่นอนว่าในบรรดาเครื่องดื่มที่ซื้อมา ฉันเลือก <รสมิกซ์ ฟรุ๊ตเพิ่มความฮึกเหิม> มาลองชิม#nพร้อมกับคุณครูค่ะ"
2002006-42 = "[s] \"ฮิมาริพูดแบบนี้ ครูดีใจนะ\""
2002006-43 = "เอาละค่ะ อย่ามัวรอช้าอยู่เลย เรามาลิ้มรสดูว่ามันอร่อยแค่ไหนกันเถอะค่ะ ดื่มแล้วก็มาทำงานให้เต็ม#nที่กันเถอะค่ะ"
2002006-44 = "ฉันเรียนรู้เคล็ดลับการดื่มมอนสเตอร์แม็กซ์ให้อร่อยขึ้นกว่าเดิมมาจากพวกเด็กๆ ด้วยนะคะ"
2002006-45 = "[s] \"เคล็ดลับอะไรเหรอ?\""
2002006-46 = "นี่ค่ะ"
2002006-53 = "[ns] \"ฮะ...ฮิมาริ?! ทำไมจู่ๆ ถึงเขย่ากระป๋องแบบนั้นล่ะ?!\""
2002006-54 = "แบบนี้ค่ะ ฮู่ว..."
2002006-60 = "เขย่ากระป๋องแรงๆ แบบนี้ ฮึบ"
2002006-61 = "มอนสเตอร์แม็กซ์ในกระป๋อง อึก..."
2002006-67 = "พวกเด็กๆ บอกว่า... ฮึบ"
2002006-73 = "รสชาติจะอร่อยกว่ากินแบบธรรมดา 5 เท่าค่ะ ฮึบ!"
2002006-74 = "[s] \"โดนหลอกอยู่นะ ไม่รู้ตัวเรอะ?!\""
2002006-75 = "คะ?"
2002006-84 = "[ns] \"เกิดเรื่องอย่างที่คิดเลย...\""
2002006-86 = "อ่า..."
2002006-87 = "ระ... เรื่องแบบนี้ฉันก็คิดไว้แล้วว่าอาจจะเกิดขึ้นได้ค่ะ"
2002006-88 = "ก็นะ... ยังไงมันก็เป็นน้ำอัดลม... ก็อาจระเบิดได้..."
2002006-89 = "เหมือนกับการออกผจญภัยที่คาดหวังว่าจะเจอของอร่อยๆ แต่กลับเจอเครื่องดื่มที่ระเบิดแทน..."
2002006-90 = "หรือว่าเราควรพึงพอใจกับชีวิตที่สงบสุขในปัจจุบัน พึงพอใจกับตัวเองที่อ่อนแอในตอนนี้ดี..."
2002006-91 = "เป็นปัญหาที่ยากจะหาคำตอบได้ เหมือนกับชีวิตของเราเลยนะคะ"
2002006-92 = "[s1] \"ครูว่ามันไม่ถึงขั้นนั้นหรอก เช็ดตัวได้แล้ว!\"\n[s2] \"เอ้า มาเช็ดตัวก่อนที่จะเป็นหวัดเถอะ\""
2002006-93 = "อ๊ะ... ขะ... ขอบคุณค่ะ"
2002006-97 = "อ๊ะ... ขะ... ขอบคุณค่ะ"
2002006-102 = "ขะ... ข้างบนฉันก็พอเช็ดเองได้..."
2002006-103 = "ตะ... แต่ว่าตรงเท้า..."
2002006-104 = "อืม..."
2002006-105 = "[s] \"งั้นเดี๋ยวครูเช็ดให้เอามั้ย?\""
2002006-109 = "คะ... คะ?! คะ... คุณครูจะช่วยเช็ดให้เหรอคะ?"
2002006-110 = "ระ...เรื่องนั้น..."
2002006-111 = "[s] \"แต่ถ้าฮิมาริรู้สึกอึดอัดก็ไม่เป็นไร...\""
2002006-115 = "เปล่าค่ะ ฉะ...ฉันไม่เป็นไรค่ะ"
2002006-116 = "ถะ... ถ้าคุณครูอยากจะช่วยเช็ดเท้าให้แฮ็กเกอร์สาวแสนสวยอย่างฉันละก็... ฉะ... ฉันก็ไม่มีปัญหาค่ะ!"
2002006-117 = "ฮู่ว..."
2002006-121 = "ขะ... ขอรบกวนได้มั้ยคะ?"
2002006-127 = "[ns] \"ได้อยู่แล้ว เดี๋ยวครูเช็ดให้นะ\""
2002006-128 = "อ่ะแฮ่ม! ค่ะ ชะ...เชิญได้เลยค่ะ...!"
2002006-131 = "― ฮุฮุ เป็นยังไงคะ[wa:760] "
2002006-134 = "― ที่มีโอกาสได้เช็ดเท้า..."
2002006-136 = "― ให้กับสาวน้อยผู้แสนงดงามแห่งมิลเลเนียม..."
2002006-139 = "― โอกาสแบบนี้น่ะ...[wa:60] "
2002006-141 = "― หาไม่ได้ง่ายๆ หรอกนะคะ..."
2002006-144 = "― อึก...?[wa:380] "
2002006-146 = "― มันรู้สึกแปลกๆ... กว่าที่คิดไว้...[wa:3080] "
2002006-149 = "― ระ...รู้สึกน่าอายอย่างบอกไม่ถูก...[wa:2960] "
2002006-151 = "― ทะ... ทำไมกันนะ...?[wa:900] "
2002006-154 = "― คะ... ความรู้สึกที่ยากจะอธิบายออกมาเป็นคำพูดแบบนี้...![wa:360] "
2002006-157 = "― คุณครูก็แค่...[wa:1560] "
2002006-159 = "― เช็ดเท้าให้ฉันอย่างเอาใจใส่ก็แค่นั้นเอง...[wa:200] "
2002006-162 = "― เพราะอะไรกัน...?"
2002006-165 = "[ns] \"ครูเพิ่งจะผสมน้ำสบู่เองนะ!?\""
2002006-166 = " ― ฮุ... ฮุฮุ[wa:590] "
2002006-169 = "― ค่ะ...แน่นอนว่าฉันก็เตรียมใจไว้แล้ว[wa:190] "
2002006-171 = "― อย่าใส่ใจเลยนะคะ"
2002006-174 = "― เชิญ... ทำได้เต็มที่เลยค่ะ![wa:340] "
2002006-176 = "― ฉัน...เตรียมใจ...เอาไว้...พร้อมแล้วค่ะ[wa:3720] "
2002006-179 = "[ns] \"เข้าใจแล้ว ครูทำต่อล่ะนะ\""
2002006-180 = "― ค่ะ เชิญค่ะ[wa:1200] "
2002006-182 = "― ถะ... ถ้างั้นก็ขอรบกวนด้วยนะคะ...[wa:2900] "
2002006-186 = "[ns] \"เอาละ เช็ดออกหมดแล้ว!\""
2002006-187 = "อึก อืม..."
2002006-188 = "อืม..."
2002006-189 = "[s] \"ฮิมาริ? ยังรู้สึกเหนียวๆ ตรงไหนเหรอ ให้เช็ดตรงไหนอีกมั้ย?\""
2002006-193 = "ปะ... เปล่าค่ะ ฉันแค่... ก็แค่...!"
2002006-194 = "สาวน้อยอัจฉริยะอย่างฉันคาดไม่ถึงเลยนะคะ ว่าการถูกสัมผัสร่างกายแบบนี้...มะ... มันจะรู้สึกน่าอายขนาดนี้"
2002006-195 = "เวลาที่อยู่กับคุณครู มักจะเกิดเรื่องอะไรที่คาดไม่ถึงอยู่เสมอๆ แต่ฉันก็ได้เรียนรู้อะไรเยอะเลยค่ะ#nน่าประทับใจมากค่ะ"
2002006-196 = "[s] \"พูดอะไรน่ะ ครูไม่เห็นเข้าใจเลย\""
2002006-197 = "ฮุฮุ ไม่ต้องใส่ใจหรอกค่ะ"
2002006-198 = "ก็แค่เรื่องเล็กๆ น้อยๆ บางอย่าง..."
2002006-199 = "ค่ะ เรื่องเล็กๆ น้อยๆ แสนสำคัญที่ฉันได้เรียนรู้น่ะค่ะ~♪"
2002006-201 = "(จากนั้น คุณครูกับฮิมาริก็นั่งดื่มมอนสเตอร์แม็กซ์ด้วยกัน และช่วยกันทำงานจนเสร็จ)"

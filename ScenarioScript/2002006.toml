[translation]
2002006-1 = "天才駭客的細膩分號"
2002006-2 = "（今天被帶到的地點並非平時的藏身地，而是陽葵執行貝里塔斯工作的地方）"
2002006-8 = "恭候多時了，老師。#n呵呵……平安抵達了呢。"
2002006-9 = "[s]「畢竟說教過了……話說今天不是在藏身地啊。」"
2002006-10 = "那，那件事……嗯，我有在反省。#n今天雖然有想要處理的業務……"
2002006-11 = "不過正題與訊息裡傳送的一樣。"
2002006-12 = "總算是弄到手了。"
2002006-13 = "[s]「是剛才提到的寶物？」"
2002006-14 = "呵呵，沒錯。是寶物唷。"
2002006-15 = "而且還是我們駭客人人都想要的夢幻逸品。"
2002006-16 = "您能想像出是什麼寶物嗎？"
2002006-17 = "呵呵。"
2002006-18 = "看了請別嚇到哦……"
2002006-24 = "就是這個！"
2002006-28 = "[ns]「妖怪MAX？」"
2002006-29 = "哎呀，這可不是普通的妖怪MAX唷？"
2002006-30 = "想不到吧！#n這個特別限定版，據說比普通的妖怪MAX好喝100倍……是妖怪MAX中的妖怪MAX。"
2002006-31 = "[s]「這，這樣啊……」"
2002006-36 = "……反應比想像中還平淡呢。"
2002006-37 = "這個限定版可是足以被稱為珍品的、非常厲害的東西……"
2002006-38 = "貝里塔斯的部員們也說「好想喝一次看看」，不知鬧了多久呢。"
2002006-39 = "[s]「啊，難道其實是為了部員們所以才……？」"
2002006-40 = "呵呵。偶爾也要讓那些孩子們見識部長的英姿，展現我的威嚴才行。"
2002006-41 = "不過這個「熱情澎湃綜合水果口味」，#n因為無論如何都想和老師一起品嚐，特別留了下來。"
2002006-42 = "[s]「聽你這麼說，讓我都期待起來了。」"
2002006-43 = "那麼就讓我們來確認一下這個口味究竟有多厲害吧。#n只要喝下這個，今天不管有多少工作應該都能完成才對。"
2002006-44 = "哎呀，對了，這可不能忘記呢。#n部員們教了我能讓妖怪MAX喝起來更美味的方法。"
2002006-45 = "[s]「是什麼方法呢？」"
2002006-46 = "呵呵……要這麼做。"
2002006-53 = "[ns]「陽，陽葵！？為什麼要這麼大力地搖晃它！？」"
2002006-54 = "請稍等，一會！"
2002006-60 = "像這樣，全力，搖晃罐子的話……哈啊。"
2002006-61 = "內部的，妖怪MAX力量就會，增強……！"
2002006-67 = "和直接喝，比起來……呼。"
2002006-73 = "會好喝5倍以上，部員們是這麼說的……！"
2002006-74 = "[s]「不管怎麼想那都是騙你的惡作劇吧！？」"
2002006-75 = "嗯？"
2002006-84 = "[ns]「我就知道會這樣……」"
2002006-86 = "哎，哎呀……"
2002006-87 = "不，這，這也在預料之內。"
2002006-88 = "畢竟是碳酸飲料嘛。"
2002006-89 = "是該相信會變得更美味，冒著風險挑戰呢……"
2002006-90 = "還是要安於現狀，接受懦弱的自己呢……"
2002006-91 = "……真是困難的問題。簡直就像我們的人生一樣。"
2002006-92 = "[s1]「我不覺得是那種高深的問題！」\n[s2]「用這條毛巾擦一擦吧。」"
2002006-93 = "謝……謝謝您。"
2002006-97 = "謝……謝謝您。"
2002006-102 = "上半身雖然自己多少可以擦……"
2002006-103 = "下半身的話手就……"
2002006-104 = "……該怎麼辦呢。"
2002006-105 = "[s]「我來幫你擦吧？」"
2002006-109 = "咦，咦咦？老師要幫我擦嗎？"
2002006-110 = "這，這個……"
2002006-111 = "[s]「抱歉，我不會強迫──」"
2002006-115 = "不，沒，沒關係的。"
2002006-116 = "您就這麼想要摸我這個超天才美少女的腳對吧！#n我不，不，不介意唷！"
2002006-117 = "……嘶，呼。"
2002006-121 = "……可以，拜託您嗎？"
2002006-127 = "[ns]「那……我要摸囉。」"
2002006-128 = "好，好的。您想擦得多乾淨都沒問題！"
2002006-131 = "― 呵呵，怎麼樣呢？[wa:1080] "
2002006-134 = "― 能洗千年最棒美少女的腳"
2002006-136 = "― 的機會什麼的……"
2002006-139 = "― 可不是常常……[wa:460] "
2002006-141 = "― 常常有的……"
2002006-144 = "― 唔……？[wa:500] "
2002006-146 = "― 比想像中還……好像有種奇怪的……[wa:3800] "
2002006-149 = "― 奇妙的……該，該說是害羞嗎……[wa:3720] "
2002006-151 = "― 為，為什麼呢……？[wa:1300] "
2002006-154 = "― 難，難以用言語表達的感情……！[wa:1920] "
2002006-157 = "― 明明老師只是[wa:1880] "
2002006-159 = "― 細心地替我洗腳而已……[wa:1440] "
2002006-162 = "― 為何會……？"
2002006-165 = "[ns]「只是用肥皂洗腳而已啊！？」"
2002006-166 = "― 呵，呵呵。[wa:830] "
2002006-169 = "― 沒錯，我當然已經做好覺悟了，[wa:1030] "
2002006-171 = "― 無需在意。"
2002006-174 = "― 請做到您滿意為止……！[wa:980] "
2002006-176 = "― ……覺悟，我已經……做好了。[wa:4680] "
2002006-179 = "[ns]「知道了，那我繼續囉。」"
2002006-180 = "― 好，好的……[wa:1400] "
2002006-182 = "― 那，那就……拜託您了……[wa:3740] "
2002006-186 = "[ns]「擦乾淨了唷！」"
2002006-187 = "好，好的……"
2002006-188 = "……唔，唔…………"
2002006-189 = "[s]「怎麼了？還會黏黏的嗎？」"
2002006-193 = "沒，沒有！那個，只是……"
2002006-194 = "……連我這種超天才美少女都無法想像。#n那個……被別人觸碰身體……居然會這麼害羞。"
2002006-195 = "真的是……只要跟老師在一起，就能學到很多意想不到的事，我很感激。"
2002006-196 = "[s]「那個……我不懂你的意思……」"
2002006-197 = "呵呵，無須在意。"
2002006-198 = "只是我自己的……"
2002006-199 = "……一點小小發現而已♪"
2002006-201 = "（之後，一邊和陽葵兩人喝著妖怪MAX，一邊協助了陽葵的工作）"

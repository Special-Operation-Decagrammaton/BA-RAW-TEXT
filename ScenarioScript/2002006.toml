[translation]
2002006-1 = "The Delicate Semicolon of a Genius Hacker"
2002006-2 = "Today, unlike usual, I was invited to where Himari does Veritas work instead of her hideout."
2002006-8 = "Hello, Sensei. Heehee, you made it."
2002006-9 = "[s] \"Why here instead of the hideout today?\""
2002006-10 = "Today's objective isn't as restful as usual. I have certain work to do..."
2002006-11 = "Well, let's get to the point."
2002006-12 = "It's finally mine."
2002006-13 = "[s] \"Finally yours... The treasure you mentioned before?\""
2002006-14 = "Heehee. Yes, the treasure."
2002006-15 = "Its value is exceeded only by the difficulty of obtaining it."
2002006-16 = "You wanna know what kind of a treasure it is?"
2002006-17 = "Heehee."
2002006-18 = "Prepare to be shocked..."
2002006-24 = "It's none other than this!"
2002006-28 = "[ns] \"...It's none other than a Frenzy MAX?\""
2002006-29 = "Heh heh heh. This is no ordinary Frenzy MAX."
2002006-30 = "It's a special edition. Rumored to be a hundred times more delicious than any other Frenzy MAX. It's even better than the best of the best."
2002006-31 = "[s] \"...Okay.\""
2002006-36 = "...What a lukewarm reaction."
2002006-37 = "This is a legendary item among the technically inclined. Limited-Edition wouldn't even begin to describe it."
2002006-38 = "All the members of Veritas desperately seek it."
2002006-39 = "[s] \"Oh, so...it's a gift for everyone?\""
2002006-40 = "Well, I have to demonstrate my generosity as president sometimes."
2002006-41 = "Speaking of which, I picked out this Passion Fruit Mix flavor for the two of us to enjoy, Sensei."
2002006-42 = "[s] \"That's very sweet of you, Himari.\""
2002006-43 = "Okay, let's try it and find out what all the fuss is about. We'll work hard after we enjoy it."
2002006-44 = "I even got a tip from a member on how to get the most amount of enjoyment from a can of Frenzy MAX."
2002006-45 = "[s] \"Really?\""
2002006-46 = "Yeah, just watch."
2002006-53 = "[ns] \"H-Himari?! Why are you shaking the can?!\""
2002006-54 = "Just...like...this..."
2002006-60 = "Shake the can vigorously..."
2002006-61 = "So that the Frenzy MAX will have a reaction inside the can..."
2002006-67 = "And taste even better before opening... Hiyah!"
2002006-73 = "About five times better than usual... Hiyap!"
2002006-74 = "[s] \"Think this through! You're being tricked!\""
2002006-75 = "Hm?"
2002006-84 = "[ns] \"An expected tragedy...\""
2002006-86 = "Oh..."
2002006-87 = "This...was a possibility."
2002006-88 = "I mean, it's a carbonated drink... Which has certain implications..."
2002006-89 = "But fortune favors the bold. Was it wrong of me to risk it blowing up in my face for the hope of a brighter, more delicious future?"
2002006-90 = "Or should I have remained complacent and content with the mediocre present? There is no reward without risk."
2002006-91 = "This is the dilemma inherent to life."
2002006-92 = "[s1] \"I don't think you need to take it that seriously!\"\n[s2] \"Okay, let's dry off before you catch a cold.\""
2002006-93 = "Oh... Th-Thank you."
2002006-97 = "Oh... Th-Thank you."
2002006-102 = "I was able to dry most of myself off, but..."
2002006-103 = "But my feet..."
2002006-104 = "...Hmm."
2002006-105 = "[s] \"Do you want me to help?\""
2002006-109 = "H-Huh? You? Help me?"
2002006-110 = "Th-That..."
2002006-111 = "[s] \"Oh, sorry. If you feel uncomfortable..\""
2002006-115 = "N-No! It's fine! Totally fine!"
2002006-116 = "I mean, if you really want to wipe the feet of a beautiful super genius hacker such as myself, who I am to stop you?"
2002006-117 = "...A-Ahem."
2002006-121 = "...Okay, please?"
2002006-127 = "[s] \"So... I'll wipe them?\""
2002006-128 = "G-Go ahead!"
2002006-131 = "― Heehee. So, how does it feel?[wa:240] "
2002006-134 = "― A rare chance to wash the dainty feet of"
2002006-136 = "― Millennium's most stunning, delicate beauty."
2002006-139 = "― Truly, a once-in-a-lifetime opportunity.[wa:10] "
2002006-141 = "― It's not every day that..."
2002006-144 = "― Hm...?[wa:420] "
2002006-146 = "― This feels a lot different than I thought it would...[wa:2320] "
2002006-149 = "― It's so strange... It's almost like...I feel bashful?[wa:2200] "
2002006-151 = "― I-I don't understand...[wa:740] "
2002006-154 = "― These feelings... I can't put them into words![wa:680] "
2002006-157 = "― All Sensei is doing is washing my delicate feet[wa:240] "
2002006-159 = "― with the utmost care in the world...[wa:440] "
2002006-162 = "― So why...?"
2002006-165 = "[ns] \"I haven't even started yet!\""
2002006-166 = " ― Oh. Haha.[wa:630] "
2002006-169 = "― Yes, of course. As you can tell, I'm perfectly ready.[wa:10] "
2002006-171 = "― So no need to worry."
2002006-174 = "― Now, go on, to your heart's content...![wa:10] "
2002006-176 = "― Since I have prepared myself and all...[wa:3680] "
2002006-179 = "[ns] \"Okay, I'll get right to it.\""
2002006-180 = "― Y-Yes, of course.[wa:960] "
2002006-182 = "― I... I'll leave it to you...[wa:3100] "
2002006-186 = "[ns] \"All done!\""
2002006-187 = "Huh?"
2002006-188 = "H-Hmm... Hmmmm..."
2002006-189 = "[s] \"What's wrong, Himari? Did I miss a spot? Somewhere else need washing?\""
2002006-193 = "N-No! It's just..."
2002006-194 = "Even a super-genius like me didn't expect... I mean, getting a part of your body rubbed by someone else... It's actually kind of embarrassing."
2002006-195 = "You always find a way to surprise me, Sensei... Is that your teaching method? It's very impressive."
2002006-196 = "[s] \"I don't follow...\""
2002006-197 = "Heehee, don't worry about it."
2002006-198 = "You're always sweating the small stuff..."
2002006-199 = "...Yeah, it's just a small little trivial thing. ♪"
2002006-201 = "After that, I drank the rest of the Frenzy MAX left in the can with Himari and helped her with her work."

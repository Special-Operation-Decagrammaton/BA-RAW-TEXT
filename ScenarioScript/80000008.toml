[translation]
80000008-1 = "#title;구두약과 초콜릿"
80000008-2 = "#place;게헨나 선도부"
80000008-3 = "#na;(샬레의 업무차 게헨나 선도부를 방문했다.)"
80000008-4 = "#st;[0,0];instant;1;"
80000008-5 = "#clearST"
80000008-6 = "3;이오리;06\n#wait;1500\n#3;a"
80000008-7 = "3;이오리;02;아, 선생님. 어서 와.\n#3;em;[반응]"
80000008-8 = "3;이오리;07;학원 앞까지 마중을 나가지 못해서 미안하네. 선도부의 일이 잔뜩 밀려있었거든."
80000008-9 = "[s] \"꽤나 바빠 보이네.\""
80000008-10 = "3;이오리;99;그래. 게헨나의 바보들이 이번 주에도 여기저기서 다양하게 말썽을 부리는 바람에 경위서가 잔뜩 도착했거든.\n#3;greeting"
80000008-11 = "3;이오리;07;이쪽에 쌓인 서류의 양만 하더라도…….\n#3;em;…"
80000008-12 = "#st;[0,0];instant;1;"
80000008-13 = "#clearST"
80000008-14 = "#wait;2000"
80000008-15 = "#wait;1500"
80000008-16 = "3;이오리;06;아아, 또 어질러져 버렸네. 책상 정리를 미리 해 둘 걸 그랬어.\n#3;em;[속상함]\n#3;stiff"
80000008-17 = "[s] \"뭔가 구두약 같은 게 떨어졌는데.\""
80000008-18 = "#st;[0,0];instant;1;"
80000008-19 = "#clearST"
80000008-20 = "3;이오리;06\n#3;d\n#wait;1000"
80000008-21 = "#all;hide"
80000008-22 = "#wait;2500"
80000008-23 = "3;이오리;04;아, 그, 그건 구두약이 아니라…….\n#3;em;[!]\n#3;stiff\n#3;a"
80000008-24 = "#st;[0,0];instant;1;"
80000008-25 = "#clearST"
80000008-26 = "3;이오리;04\n#3;em;[...]\n#wait;2500"
80000008-27 = "3;이오리;03;그래, 맞아. 그건 내가 쓰는 구두약이야.\n#3;em;[반짝]\n#3;greeting"
80000008-28 = "3;이오리;02;내 부츠에 언제나 바르는 물건이니, 선생에게는 익숙하겠지."
80000008-29 = "3;이오리;03;뭣하면 한번 핥아볼래? 내 구두를 직접 핥는 것과 같은 향이 날지도 모르잖아?\n#3;em;[?]"
80000008-30 = "#st;[0,0];instant;1;"
80000008-31 = "#clearST"
80000008-32 = "3;이오리;03\n#3;d\n#wait;1000"
80000008-33 = "#wait;2000"
80000008-34 = "3;이오리;07\n#3;closeup\n#3;a\n#wait;1000"
80000008-35 = "3;이오리;07;……농담이야. 선생이 아무리 발을 핥는 걸 좋아한다 해도, 선생에게 진짜 구두약을 핥게 할 생각은 없어.\n#3;em;[땀]\n#3;closeup"
80000008-36 = "3;이오리;06;이건 구두약이 아니라 사실은…….\n#3;closeup"
80000008-37 = "[s] 핥는다."
80000008-38 = "#wait;1000"
80000008-39 = "3;이오리;04;뭐 하는 짓이야?!\n#3;em;[?!]\n#3;shake\n#fontsize;80\n#bgshake"
80000008-40 = "3;이오리;05;내가 이건 구두약이라고 말했잖아! 몸에 무슨 일이라도 생기면 어쩌려고 무턱대고 혀를 가져다 대는 거야?\n#3;stiff\n#3;em;[빠직]"
80000008-41 = "[s] \"달콤한 맛이 나는데?\""
80000008-42 = "3;이오리;04;그야 당연하지! 이건 구두약이 아니라 캔에 포장된 다크 초콜릿이니까!\n#3;hophop\n#3;em;[반응]"
80000008-43 = "3;이오리;99;맛도 진하고, 잘게 조각나 있기 때문에 먹기가 편해서 게헨나 선도부원들 사이에서 인기가 있는 제품인데……."
80000008-44 = "3;이오리;05;그보다 초콜릿이기에 망정이지, 진짜 구두약이면 어쩌려고 그런 거야?\n#3;stiff\n#3;em;[땀]"
80000008-45 = "3;이오리;02;선생님은 진짜 구두를 핥으면서 흥분하는 변태야?"
80000008-46 = "[s] \"구두를 핥는 걸 좋아하는 게 아냐.\""
80000008-47 = "#st;[0,0];instant;1;"
80000008-48 = "#clearST"
80000008-49 = "#wait;1000"
80000008-50 = "[ns] \"이오리의 다리가 좋은 거야.\""
80000008-51 = "3;이오리;04;그게 뭐야. 기분 나빠…….\n#3;em;[속상함]"
80000008-52 = "3;이오리;06;게다가 모처럼 준비한 초콜릿에 선생님의 침이 잔뜩 묻어버렸고…….\n#3;stiff"
80000008-53 = "3;이오리;07;자, 가져가."
80000008-54 = "[s] \"이건 발렌타인 데이 선물?\""
80000008-55 = "3;이오리;04;그, 그럴 리가 없잖아! 선생이 내 초콜릿을 핥아버렸으니, 먹을 수 없게 되어서 주는 거라고!\n#3;em;[!]\n#3;jump"
80000008-56 = "3;이오리;04;……거짓말 아니거든? 그러니까 멋대로 착각하지 마!\n#3;stiff"
80000008-57 = "#wait;1000"

[translation]
80000008-1 = "ยาขัดรองเท้า & ช็อกโกแลต"
80000008-2 = "คณะกรรมการวินัยเกเฮนน่า"
80000008-3 = "(คุณครูมาที่คณะกรรมการวินัยเพราะเรื่องงานของทางชาเล่ต์)"
80000008-7 = "อ๊ะ คุณครู เข้ามาสิ"
80000008-8 = "ขอโทษที่ไปรับที่หน้าโรงเรียนไม่ได้นะ พอดีติดงานของคณะกรรมการวินัยอยู่น่ะ"
80000008-9 = "[s] \"ดูยุ่งมากเลยนะเนี่ย\""
80000008-10 = "อื้อ อาทิตย์นี้พวกเด็กงี่เง่าของโรงเรียนเราก่อปัญหาเอาไว้เต็มไปหมด งานของคณะกรรมการก็#nเลยเพิ่มขึ้นน่ะ"
80000008-11 = "แค่เอกสารที่กองอยู่นี่ก็..."
80000008-16 = "เฮ้อ โต๊ะรกไปหมดแล้ว รู้งี้ทำความสะอาดโต๊ะไว้หน่อยก็คงดี"
80000008-17 = "[s] \"ดูเหมือนมียาขัดรองเท้าตกอยู่ด้วยนะ...\""
80000008-23 = "อ๊ะ... นะ... นั่นไม่ใช่ยาขัดรองเท้า..."
80000008-27 = "เอ่อ ใช่แล้วล่ะ นั่นยาขัดรองเท้าที่ฉันใช้เอง"
80000008-28 = "เอาไว้ขัดรองเท้าบูทของฉันน่ะ คุณครูก็น่าจะชินแล้วนี่"
80000008-29 = "ลองเลียดูหน่อยมั้ยล่ะ? กลิ่นมันอาจจะเหมือนกับได้เลียรองเท้าฉันจริงๆ ก็ได้นะ?"
80000008-35 = "ล้อเล่นน่า ถึงคุณครูจะชอบเลียเท้าแค่ไหนก็เถอะ แต่ฉันก็ไม่ได้คิดจะให้คุณครูเลียน้ำยาขัดรองเท้าจริงๆ สักหน่อย"
80000008-36 = "ที่จริงนี่ไม่ใช่ยาขัดรองเท้าหรอกนะ แต่มันคือ..."
80000008-37 = "[s] เลีย"
80000008-39 = "ทำบ้าอะไรเนี่ย?!!"
80000008-40 = "ฉันบอกว่ามันคือยาขัดรองเท้าไงเล่า! ถ้าเลียไปแล้วเป็นอะไรขึ้นมาจะทำยังไงฮะ!"
80000008-41 = "[s] \"แต่รสชาติมันหวานๆ นะ?\""
80000008-42 = "แหงอยู่แล้วสิ! ก็มันคือดาร์กช็อกโกแลตแบบกระปุก ไม่ใช่ยาขัดรองเท้าสักหน่อย!"
80000008-43 = "รสชาติที่เข้มข้นและกินง่ายเพราะเป็นชิ้นเล็กๆ มันเลยเป็นของที่สมาชิกเราชอบกันทุกคนไงล่ะ..."
80000008-44 = "แต่ถ้าเกิดมันไม่ใช่ช็อกโกแลตแต่เป็นยาขัดรองเท้าขึ้นมาจริงๆ จะทำยังไงฮะ?"
80000008-45 = "คุณครูเป็นพวกโรคจิตที่จะคึกเวลาได้เลียรองเท้ารึไง?"
80000008-46 = "[s] \"ไม่ได้ชอบเลียรองเท้าสักหน่อย\""
80000008-50 = "[ns] \"ชอบขาของอิโอริต่างหาก\""
80000008-51 = "พูดอะไรน่ะ น่าหงุดหงิดจริงๆ..."
80000008-52 = "แถมช็อกโกแลตที่เตรียมไว้ยังเลอะน้ำลายคุณครูหมดเลยด้วย..."
80000008-53 = "เอ้า เอาไปสิ"
80000008-54 = "[s] \"ของขวัญวาเลนไทน์เหรอ?\""
80000008-55 = "มะ...ไม่ใช่สักหน่อย! คุณครูเลียช็อกโกแลตฉันไปแล้วนี่ จะให้กินต่อยังไงล่ะ เลยจะยกให้คุณครูต่างหากเล่า!"
80000008-56 = "ไม่ได้โกหกเลยนะ! เพราะงั้นเลิกทึกทักเอาเองซะทีเหอะ!"

[translation]
80000008-1 = "鞋油與巧克力"
80000008-2 = "格黑娜學園．風紀委員會"
80000008-3 = "（因為夏萊的業務到了格黑娜風紀委員會）"
80000008-7 = "啊，老師。歡迎你來。"
80000008-8 = "抱歉沒有在校門口迎接你，現在風紀委員會的事情真的是堆積如山。"
80000008-9 = "[s]「沒關係，看來還是很忙呢。」"
80000008-10 = "是啊，因為笨蛋們不厭其煩到處惹麻煩的關係，報告書不斷湧進來……"
80000008-11 = "回過神來就已經像座山一樣了。"
80000008-16 = "啊啊真是，又倒下來了……在處理文件之前，先整理桌子吧……"
80000008-17 = "[s]「有東西掉了……這個是，鞋油？」"
80000008-23 = "啊。那，那不是鞋油……"
80000008-27 = "不，我看錯了。那就是我用的鞋油沒錯。"
80000008-28 = "我平時都用它保養靴子，老師應該不陌生吧。"
80000008-29 = "要不要舔舔看啊？畢竟老師喜歡舔腳，說不定也會喜歡鞋油哦？"
80000008-35 = "……開玩笑的。就算老師是變態，我也沒打算真的要老師舔鞋油。"
80000008-36 = "其實這不是鞋油，而是……"
80000008-37 = "[s] 舔"
80000008-39 = "你認真的嗎笨蛋！？"
80000008-40 = "我不是說了這是鞋油嗎！#n明明知道對身體不好，為什麼就是忍不住啊！？身體會出問題的啊！？"
80000008-41 = "[s]「咦，甜甜的……？」"
80000008-42 = "那當然囉！因為這不是鞋油，而是黑巧克力！"
80000008-43 = "味道濃郁而且方便攜帶，最近在風紀委員會也很流行……"
80000008-44 = "唉……還好是巧克力，要是真的是鞋油的話怎麼辦？"
80000008-45 = "難道老師真的是對鞋油也能興奮的變態？"
80000008-46 = "[s]「我不是對鞋子或鞋油有興趣。」"
80000008-50 = "[ns]「只是喜歡伊織的腳而已……」"
80000008-51 = "什麼，好噁心……"
80000008-52 = "唉，既然都被你吃過了……"
80000008-53 = "給你，拿走吧。"
80000008-54 = "[s]「這是情人節禮物嗎？」"
80000008-55 = "才，才不是！因為老師舔過的關係害我不能吃了，所以不得已才給你的！"
80000008-56 = "……不要誤會啊！？"

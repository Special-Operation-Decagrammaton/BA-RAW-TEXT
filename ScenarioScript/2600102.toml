[translation]
2600102-1 = "ความลับของผู้ใหญ่"
2600102-2 = "สำนักงานชาเล่ต์"
2600102-4 = "โคทามะนำตุ๊กตาหมีขนาดใหญ่มาที่สำนักงานชาเล่ต์ในวันที่เธอมาทำงาน"
2600102-5 = "[ns] \"ตุ๊กตาหมีนั่นมันอะไรน่ะ?\""
2600102-6 = "อ่อ คือว่า... อืม..."
2600102-7 = "ของขวัญค่ะ ของขวัญสำหรับคุณครู"
2600102-8 = "[s] \"ของขวัญเซอร์ไพรส์เหรอ?!\""
2600102-9 = "ที่ผ่านมาคุณครูคอยช่วยฉันมาตลอดไงล่ะคะ"
2600102-10 = "ฉันคิดว่าจะตอบแทนคุณครูยังไงดี สุดท้ายเลยตัดสินใจว่าจะให้ของขวัญคุณครูค่ะ"
2600102-11 = "[s] \"ครูตกใจนิดหน่อยก็จริงแต่ว่า... ขอบคุณนะ\""
2600102-12 = "ค่ะ"
2600102-14 = "คุณครูคะ ฉันอยากให้คุณครูเก็บตุ๊กตาหมีนี้ไว้ที่สำนักงานชาเล่ต์ค่ะ"
2600102-15 = "ฉะ... ฉันไม่ได้มีเจตนาอะไรแอบแฝงหรอกนะคะ"
2600102-16 = "ฉันแค่... คิดว่าน้องหมีอยู่ที่นี่น่าจะดีที่สุดค่ะ"
2600102-17 = "ฉันอยากให้น้องหมีอยู่ในที่ที่มีแดดส่องถึงและมองเห็นทั้งสำนักงานได้ค่ะ"
2600102-18 = "อย่าวางอะไรบังหน้าน้องหมีนะคะ แล้วก็ช่วยวางไว้ให้ห่างจากน้ำและสนามแม่เหล็กที่อาจส่ง#nผลเสียต่อไฟฟ้าด้วยค่ะ..."
2600102-19 = "[s] สำรวจตุ๊กตาหมีอย่างละเอียด"
2600102-21 = "คะ...คุณครู? จะทำอะไรคะ..."
2600102-23 = "เจออุปกรณ์น่าสงสัยติดอยู่ด้านหลังปุ่มของตุ๊กตาหมี"
2600102-24 = "นะ...นั่นมัน... ไม่มีอะไรต้องกังวลหรอกค่ะ นั่นมันก็แค่..."
2600102-25 = "แค่... อุปกรณ์บันทึกเสียงเองค่ะ!"
2600102-26 = "[s] \"ขอโทษนะแต่ครูคงรับตุ๊กตาหมีไว้ไม่ได้หรอก\""
2600102-27 = "ค่ะ ถ้าคุณครูไม่ชอบจริงๆ ก็คงช่วยไม่ได้ค่ะ..."
2600102-29 = "โคทามะยังคงหาทางติดตั้งอุปกรณ์ดักฟังต่อไป..."
2600102-31 = "คุณครูคะ ฉันซื้อนาฬิกาแขวนเรือนใหม่มาให้ค่ะ"
2600102-32 = "รอบนี้ไม่มีอะไรแปลกๆ แน่นอนค่ะ"
2600102-33 = "[s] ตรวจดูนาฬิกา"
2600102-35 = "เจออุปกรณ์ดักฟังสอดอยู่ระหว่างเข็มนาฬิกา"
2600102-36 = "อ๊ะ คือว่า...นาฬิกาอันนี้มีอุปกรณ์บันทึกเสียงอยู่ค่ะ ไม่มีอะไรพิเศษนอกจากนี้แล้วค่ะ"
2600102-37 = "[s] \"ครูรับนาฬิกานี้ไว้ไม่ได้หรอกนะ\""
2600102-38 = "เฮ้อ... ล้มเหลวอีกแล้วสินะ"
2600102-40 = "คุณครูคะ ฉันเตรียมอาหารไว้ให้แล้วนะคะ"
2600102-41 = "ทานตอนที่ยังร้อนๆ อยู่นะคะ"
2600102-42 = "ในซุปมีอุปกรณ์ดักฟังลอยขึ้นมาแบบเห็นได้ชัด"
2600102-43 = "[s] ..."
2600102-44 = "...ดูเหมือนจะรู้อยู่แล้วสินะคะ"
2600102-45 = "อาหารคงไม่ใช่ตัวเลือกที่ดีสำหรับติดตั้งอุปกรณ์ดักฟังสินะ..."
2600102-47 = "ตุ๊กตาหมี นาฬิกา อาหารล้มเหลวทั้งหมด ต่อไปใช้อะไรดีนะ...."
2600102-48 = "[s] \"ทำไมถึงอยากจะดักฟังครูล่ะ?\""
2600102-49 = "ไม่ได้ดักฟังค่ะ ฉันแค่อยากบันทึกเสียงของคุณครูเอาไว้เท่านั้นค่ะ"
2600102-50 = "[s] \"ถ้างั้นก็ไม่เห็นต้องทำลับๆ ล่อๆ เลยนี่นา\""
2600102-51 = "ฉันทำแบบนั้นเพราะว่า..."
2600102-52 = "ฉันอยากรู้ความลับของคุณครูที่คนอื่นไม่รู้ค่ะ"
2600102-53 = "ฉันคิดว่าถ้าฉันติดเครื่องดักฟังไว้ในสำนักงาน ฉันอาจจะบันทึกเสียงตอนที่คุณครูเผลอทำอะไร#nที่ไม่ได้ตั้งใจไว้ได้น่ะค่ะ..."
2600102-54 = "[s1] \"หลังจากรู้ความลับครูแล้วจะทำอะไรต่อเหรอ?\"\n[s2] \"คิดจะแบล็กเมล์ครูเหมือนกับในการ์ตูนเหรอ?!\""
2600102-55 = "ปะ..เปล่าค่ะ ไม่ใช่แบบนั้นนะคะ!"
2600102-56 = "ปะ..เปล่าค่ะ ไม่ใช่แบบนั้นนะคะ!"
2600102-57 = "ฉันแค่อยากจะคุยกับคุณครูได้แบบทั่วๆ ไปก็เท่านั้น..."
2600102-58 = "ในสายตาของฉัน คุณครูเป็นคนที่สมบูรณ์แบบและไร้ที่ติค่ะ"
2600102-59 = "อาจเป็นเพราะคุณครูเป็นคนที่สมบูรณ์แบบเลยคอยช่วยเหลือฉันอยู่เสมอๆ แต่นั่นก็ทำให้ฉันคุย#nกับคุณครูได้ยากขึ้น..."
2600102-60 = "ฉันคิดว่าถ้าได้รู้ความลับของคุณครูที่คนอื่นไม่รู้ อาจช่วยให้ฉันคุยกับคุณครูได้น่ะค่ะ"
2600102-61 = "แต่ดูเหมือนว่าการติดอุปกรณ์ดักฟังในชาเล่ต์จะไม่ใช่เรื่องง่ายๆ เลย เพราะงั้นฉันจะล้มเลิก#nความพยายามเรื่องค้นหาความลับของคุณครูค่ะ"
2600102-62 = "[s] \"ที่จริงครูกลัวความสูงนะ\""
2600102-63 = "อะไรนะคะ?"
2600102-64 = "[s] \"จุดอ่อนของครูก็คือครูกลัวความสูงน่ะ\""
2600102-65 = "อย่างนี้นี่เอง ที่แท้คุณครูก็กลัวความสูง..."
2600102-67 = "ฮ่าฮ่า ตลกจังเลยค่ะ คุณครูทำงานในสำนักงานที่อยู่บนตึกสูงแต่กลัวความสูงเหรอคะเนี่ย"
2600102-68 = "[s] \"เพราะงั้นถึงต้องเป็นความลับไงล่ะ\""
2600102-69 = "แบบนี้นี่เอง แม้กระทั่งคนที่ดูสมบูรณ์แบบก็ยังมีจุดอ่อนที่คาดไม่ถึงอยู่..."
2600102-70 = "ฉันคิดว่าตอนนี้ฉันเข้าใจคุณครูมากขึ้นแล้วค่ะ"
2600102-71 = "ขอบคุณที่ยอมทำตามฉันนะคะคุณครู"

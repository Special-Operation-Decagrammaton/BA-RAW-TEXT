[translation]
2600102-1 = "#title;어른의 비밀"
2600102-2 = "#place;샬레 집무실"
2600102-3 = "#bgshake\n#wait;1500"
2600102-4 = "#na;코타마의 당번 날. 코타마가 샬레 집무실에 커다란 곰 인형을 가지고 왔다."
2600102-5 = "[ns] \"갑자기 웬 곰 인형이야?\""
2600102-6 = "3;코타마;05;어, 그러니까…… 음…….\n#3;a\n#3;em;…"
2600102-7 = "3;코타마;04;선물입니다. 선생님을 위한 선물.\n#3;stiff\n#3;em;[반응]"
2600102-8 = "[s] \"갑자기 선물!?\""
2600102-9 = "3;코타마;05;그동안 선생님께 많은 도움을 받았으니까요."
2600102-10 = "3;코타마;06;보답할 방법이 없을까 고민하다가 선생님께 특별한 선물을 드리기로 했습니다.\n#3;em;[!]"
2600102-11 = "[s] \"갑작스럽지만…… 일단은 고맙게 받을게.\""
2600102-12 = "3;코타마;05;네.\n#3;greeting"
2600102-13 = "#wait;1500"
2600102-14 = "3;코타마;06;저, 선생님. 이 곰 인형은 가능한 샬레의 집무실에 두었으면 좋겠습니다.\n#3;em;[반응]\n#3;stiff"
2600102-15 = "3;코타마;04;벼, 별다른 이유가 있는 것은 아닙니다."
2600102-16 = "3;코타마;04;그냥…… 그러는 편이 곰 인형에게도 제일 좋을 것 같아서 그렇습니다.\n#3;em;…"
2600102-17 = "3;코타마;06;그리고 곰 인형은 꼭 볕이 잘 드는, 집무실의 전경이 잘 보이는 위치에 올려놓아 주셨으면 합니다.\n#3;greeting"
2600102-18 = "3;코타마;99;곰 인형의 앞에는 시야를 가로막을만한 물건을 두지 마시고, 전자기기에 해로운 습기와 전자파는 가급적 피해주시고…….\n#3;m2"
2600102-19 = "[s] 곰 인형을 자세히 살펴본다."
2600102-20 = "3;코타마;04\n#3;em;[?!]\n#3;stiff\n#wait;1500"
2600102-21 = "3;코타마;04;서, 선생님? 갑자기 왜…….\n#3;m3\n#3;hophop"
2600102-22 = "#wait;1500"
2600102-23 = "#na;곰 인형의 단추 뒤에서 수상쩍은 기계장치가 발견되었다."
2600102-24 = "3;코타마;04;그, 그건 그러니까…… 절대로 수상한 장치가 아닙니다. #n그냥 단순한…….\n#3;em;…"
2600102-25 = "3;코타마;06;주변의 소리를 녹음하는 장치일 뿐입니다!\n#3;em;[!]\n#3;closeup"
2600102-26 = "[s] \"미안하지만 이 곰 인형은 받을 수 없겠어.\""
2600102-27 = "3;코타마;04;네. 마음에 들지 않으신다면, 하는 수 없지요…….\n#3;em;…\n#3;stiff"
2600102-28 = "#all;hide"
2600102-29 = "#na;하지만 이후로도 코타마의 도청 시도는 계속되었다……."
2600102-30 = "#all;hide"
2600102-31 = "3;코타마;06;선생님, 이번에는 새로운 벽걸이 시계를 가져왔습니다.\n#3;em;[반응]\n#3;a\n#3;greeting"
2600102-32 = "3;코타마;05;이번에는 어떤 문제도 찾아내지 못하실 겁니다."
2600102-33 = "[s] 시계를 조사한다."
2600102-34 = "#wait;1500"
2600102-35 = "#na;시계 바늘 사이에서 도청장치가 발견되었다."
2600102-36 = "3;코타마;04;그, 그건…… 녹음 장치가 달린 시계입니다. 그 외에 특별한 점은 없습니다.\n#3;stiff"
2600102-37 = "[s] \"그래도 이 시계는 받을 수 없어.\""
2600102-38 = "3;코타마;04;(한숨) ……이번에도 실패했군요.\n#3;em;[속상함]"
2600102-39 = "#all;hide"
2600102-40 = "3;코타마;06;선생님, 이번에는 선생님을 위해 식사를 준비했습니다.\n#3;a\n#3;greeting"
2600102-41 = "3;코타마;05;식기 전에 어서 드시지요."
2600102-42 = "#na;수프 위에 노골적으로 도청장치가 올라가 있다."
2600102-43 = "[s] ……."
2600102-44 = "3;코타마;04;……벌써 눈치를 채신 모양이군요.\n#3;stiff"
2600102-45 = "3;코타마;99;음식을 통해 도청장치를 전달하는 것도 역시 어려운가…….\n#3;em;…"
2600102-46 = "#all;hide"
2600102-47 = "3;코타마;04;곰 인형도, 시계도, 음식도 실패했으니, 다음에는 무슨 방법을 써야 할까요…….\n#3;a\n#3;em;[땀]"
2600102-48 = "[s] \"어째서 그렇게 도청장치를 설치하려고 애를 쓰는 거야.\""
2600102-49 = "3;코타마;05;도청이 아닙니다. 선생님의 목소리를 녹음하고 싶은 것 뿐입니다."
2600102-50 = "[s] \"그럼 선물에 몰래 녹음 장치를 달지 않아도 괜찮잖아.\""
2600102-51 = "3;코타마;99;그건 그러니까……"
2600102-52 = "3;코타마;06;다른 학생들이 모르는 선생님의 비밀을 알고 싶었기 때문입니다.\n#3;em;[반응]"
2600102-53 = "3;코타마;05;24시간 집무실을 감시할 수 있는 도청장치를 설치해두면, 선생님께서 무언가 실수하셨을 때를 포착할 수 있을 것 같아서……."
2600102-54 = "[s1] \"내 비밀을 알아내서 무슨 짓을 하려는 거야……?\"\n[s2] \"나를 괴롭히려는 거지? 소년 만화처럼!\""
2600102-55 = "3;코타마;04;그, 그렇지 않습니다!\n#3;shake\n#3;em;[?!]"
2600102-56 = "3;코타마;04;그, 그렇지 않습니다!\n#3;shake\n#3;em;[?!]"
2600102-57 = "3;코타마;99;저는 그냥, 선생님과 평범하게 이야기를 하고 싶었을 뿐이라……."
2600102-58 = "3;코타마;05;제 눈에 선생님은 단점이 없는 완전무결한 어른처럼 보입니다."
2600102-59 = "3;코타마;04;물론 그 덕분에 선생님께는 많은 도움을 받았지만, 그 때문인지 선생님과 이야기를 나누는 것이 점점 더 어려워져서…….\n#3;em;[땀]"
2600102-60 = "3;코타마;99;하다못해 다른 학생들이 모르는 선생님의 비밀을 알게 된다면, 좀 더 편하게 이야기할 수 있을 것 같아서 그랬습니다."
2600102-61 = "3;코타마;01;그렇다고는 하지만 역시 샬레에 도청장치를 설치하는 건 어렵겠지요. #n선생님의 비밀을 알아내는 건 포기하겠습니다.\n#3;greeting"
2600102-62 = "[s] \"나는 사실 높은 곳을 무서워해.\""
2600102-63 = "3;코타마;04;네?\n#3;em;[?]\n#3;stiff"
2600102-64 = "[s] \"높은 곳을 무서워하는 게 내 약점이야.\""
2600102-65 = "3;코타마;99;그렇군요. 선생님은 높은 곳을 무서워하신다…….\n#3;greeting"
2600102-66 = "3;코타마;99\n#3;em;…\n#wait;2500"
2600102-67 = "3;코타마;03;후후, 어쩐지 우습네요. 높은 건물에 있는 집무실에서 일하시는 선생님께서 정작 높은 곳을 무서워하신다니.\n#3;em;[재잘]\n#3;stiff"
2600102-68 = "[s] \"그러니까 비밀이야.\""
2600102-69 = "3;코타마;01;그렇네요. 완전무결해 보이는 사람이라도 의외의 측면에서 예상치도 못한 약점을 갖고 있는 법이니…….\n#3;greeting"
2600102-70 = "3;코타마;02;덕분에 선생님을 더 잘 이해한 것 같습니다."
2600102-71 = "3;코타마;03;제 어리광을 들어주셔서 감사합니다, 선생님.\n#3;greeting\n#3;em;[반짝]"

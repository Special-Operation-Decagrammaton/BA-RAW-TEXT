[translation]
2600102-1 = "大人的祕密"
2600102-2 = "夏萊．辦公室"
2600102-4 = "（小玉值班的日子。小玉帶了巨大的熊玩偶，來到了夏萊的辦公室）"
2600102-5 = "[ns]「突然怎麼了？」"
2600102-6 = "那個，這個……嗯……"
2600102-7 = "對，是禮物。給老師的，禮物。"
2600102-8 = "[s]「明明也不是生日啊！？」"
2600102-9 = "因為至今為止，受到了老師很多幫助。"
2600102-10 = "煩惱的結果，抵達了送禮物給老師的結論。"
2600102-11 = "[s]「稍微有點跳躍的感覺……不過就心懷感激的收下囉。」"
2600102-12 = "來。"
2600102-14 = "那個，老師。這個熊玩偶，可以的話能放在夏萊的辦公室嗎。"
2600102-15 = "雖，雖然沒有什麼特別的理由。"
2600102-16 = "只是……那樣比較，我想那個玩偶也會開心吧。"
2600102-17 = "還有，我期望盡可能的在可以將辦公室一覽無遺的位置。"
2600102-18 = "然後，玩偶的面前不要擺放會遮擋視野的東西，因為濕氣和電磁波不好盡可能的避免……"
2600102-19 = "[s]（試著調查玩偶的內部）"
2600102-21 = "老，老師？突然做什麼……"
2600102-23 = "（在熊玩偶的鈕扣背面發現了可疑的裝置）"
2600102-24 = "那，那是，那個……並不是什麼可疑的東西。#n那只是……"
2600102-25 = "只是個，錄製周圍聲音的機械！"
2600102-26 = "[s]「很抱歉，這個熊玩偶我不能收下呢……」"
2600102-27 = "……你不喜歡嗎。那就沒辦法了……"
2600102-29 = "（然後這之後，小玉的嘗試也還在持續著……）"
2600102-31 = "老師，我拿來了新的壁掛時鐘。請收下。"
2600102-32 = "這次是普通的時鐘，對。"
2600102-33 = "[s]（調查時鐘）"
2600102-35 = "（時鐘的指針背面，附著著竊聽器）"
2600102-36 = "那，那是……附有錄音機能的時鐘。除此之外，沒有什麼特別的地方。"
2600102-37 = "[s]「退貨。」"
2600102-38 = "呼……不行嗎。"
2600102-40 = "今天為了老師，準備了午餐。"
2600102-41 = "在冷掉前請用。"
2600102-42 = "（湯品上面，正大光明的浮著竊聽器）"
2600102-43 = "[s] ……"
2600102-44 = "……被注意到了嗎。"
2600102-45 = "如果是食物的話，雖然這麼想，果然不行呢……"
2600102-47 = "玩偶、時鐘、料理也失敗……下次要用什麼方法呢……"
2600102-48 = "[s]「為什麼要那麼努力設置竊聽器呢？」"
2600102-49 = "並不是想要竊聽。只是想要錄製老師的聲音而已。"
2600102-50 = "[s]「那樣的話也不用偷偷設置吧……？」"
2600102-51 = "那是，那個……"
2600102-52 = "……因為我想知道其他學生不知道的，老師的祕密。"
2600102-53 = "我想只要能24小時竊聽辦公室的話，或許就能知道老師的祕密了……"
2600102-54 = "[s1]「調查我的祕密，到底想做什麼……？」\n[s2]「是打算對我做過分的事吧！？像薄薄的本子一樣！」"
2600102-55 = "不，不是，不是什麼奇怪的事！"
2600102-56 = "不，不是，不是什麼奇怪的事！"
2600102-57 = "我只是想和老師，進行普通的對話……"
2600102-58 = "對我來說，老師看起來就是毫無缺點完美的大人。"
2600102-59 = "當然至今為止被那樣的老師幫了很多忙，不過不知道是不是因為這樣，和老師普通對話的難度，變得越來越高……"
2600102-60 = "如果可以知道其他學生不知道的老師的祕密的話，是不是就可以更輕鬆的對話……我是那麼想的。"
2600102-61 = "雖然如此，果然要在夏萊設置竊聽器似乎很困難……#n我會放棄調查老師的祕密……"
2600102-62 = "[s]「其實我，很怕高的地方呢。」"
2600102-63 = "……咦？"
2600102-64 = "[s]「高的地方，這就是我的弱點唷。」"
2600102-65 = "是，是那樣啊。老師害怕高的地方……"
2600102-67 = "呵呵，雖然很失禮，不過有點好笑呢。明明是在這麼高的地方工作的老師，竟然怕高的地方。"
2600102-68 = "[s]「所以是祕密唷。」"
2600102-69 = "好的。看似完美的老師，果然也有意外的弱點呢……"
2600102-70 = "不過這樣就稍微，感覺比以前還要理解老師了。"
2600102-71 = "謝謝你，老師。"

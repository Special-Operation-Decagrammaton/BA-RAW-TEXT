[translation]
2600102-1 = "Grown-Up Secrets"
2600102-2 = "Schale Executive Office"
2600102-4 = "Kotama brought a large teddy bear to Schale's Executive Office on her duty day."
2600102-5 = "[ns] \"What's with the teddy bear?\""
2600102-6 = "Well... Uh..."
2600102-7 = "It's a gift. A gift for Sensei."
2600102-8 = "[s] \"A surprise gift?\""
2600102-9 = "I did receive a lot of help from you."
2600102-10 = "I thought about how I could repay you, and decided to give you a gift."
2600102-11 = "[s] \"This is unexpected.... But I'll take it. Thank you.\""
2600102-12 = "Sure."
2600102-14 = "Sensei. I'd like for you to keep this teddy bear in Schale's Executive Office if possible."
2600102-15 = "I don't have any ulterior motives."
2600102-16 = "I just...I thought it'd be best for the bear."
2600102-17 = "I'd prefer it to be placed somewhere in the sunlight where it can overlook the entire Executive Office."
2600102-18 = "Don't place anything in front of it which might block its sight, and be sure to keep it away from water and electromagnetic fields that might be bad for electronics..."
2600102-19 = "[s] (Examine the teddy bear carefully.)"
2600102-21 = "S-Sensei? Why are you..."
2600102-23 = "(There was a suspicious device behind a button on the bear.)"
2600102-24 = "Th-That's... I wouldn't worry about that. It's just a simple..."
2600102-25 = "It's just a device that records sound!"
2600102-26 = "[s] \"I'm sorry, but I can't accept this teddy bear.\""
2600102-27 = "Yes. I guess it can't be helped if you don't like it..."
2600102-29 = "But Kotama's wiretapping attempts continued..."
2600102-31 = "Sensei, I brought a new wall clock."
2600102-32 = "You won't find anything strange this time."
2600102-33 = "[s] (Examine the clock.)"
2600102-35 = "(A wiretapping device was tucked between the hands of the clock.)"
2600102-36 = "Oh, it's just...a clock with a recording device. Other than that, there's nothing unique about it."
2600102-37 = "[s] \"I still can't accept this clock.\""
2600102-38 = "*sigh* ...Foiled again."
2600102-40 = "Sensei, I've prepared a meal for you."
2600102-41 = "Please eat it before it gets cold."
2600102-42 = "(A wire-tapping device was floating in plain sight.)"
2600102-43 = "[s] ..."
2600102-44 = "...It seems you already know."
2600102-45 = "I guess sneaking in an eavesdropping device with some food isn't a viable option either..."
2600102-47 = "The teddy bear, clock, and meal all failed. What next..."
2600102-48 = "[s] \"Why are you so insistent on wiretapping us?\""
2600102-49 = "It's not about wiretapping. I just want to record your voice."
2600102-50 = "[s] \"In that case, you don't need to be so secretive about it.\""
2600102-51 = "I'm trying because..."
2600102-52 = "I want to know a secret of yours that nobody else knows."
2600102-53 = "I thought if I wiretapped the Executive Office, I might be able to record you slipping up here and there..."
2600102-54 = "[s1] \"What were you going to do after finding out a secret of mine?\"\n[s2] \"Were you going to blackmail me? Like in a manga?\""
2600102-55 = "No, that's not true!"
2600102-56 = "No, that's not true!"
2600102-57 = "I just want to have a normal conversation with you..."
2600102-58 = "In my eyes, Sensei, you're a perfect adult with zero flaws."
2600102-59 = "Of course, I've gotten so much help from you thanks to your perfection, but that makes it harder for me to talk with you..."
2600102-60 = "I thought I'd be able to finally have a normal conversation with you if I knew a secret others didn't."
2600102-61 = "But it's not easy to get a wiretapping device into Schale. I'll give up on trying to uncover your secrets."
2600102-62 = "[s] \"I'm actually afraid of heights.\""
2600102-63 = "What?"
2600102-64 = "[s] \"My weakness is that I'm afraid of heights.\""
2600102-65 = "I see. So Sensei is afraid of heights..."
2600102-67 = "Haha. That's funny. You work in an office in a tall building, and yet you're afraid of heights."
2600102-68 = "[s] \"That's why it's a secret.\""
2600102-69 = "Indeed. Even a person who seems perfect has an unexpected weakness..."
2600102-70 = "I think I understand you better now, Sensei."
2600102-71 = "Thank you for playing along with me, Sensei."

[translation]
51200-1 = "ตอนที่ 20;นักเล่าเรื่องลึกลับ จากชมรมความงามแห่งธรรมชาติ 2"
51200-5 = "...ตกใจหมดเลย"
51200-6 = "มายิงคนอื่นโดยไม่มีปี่ไม่มีขลุ่ยแบบนี้มันเสียมารยาทนะคะ ฉันตกใจแทบแย่เลย ถึงจะไม่สะทกสะท้าน#nจากปืนก็เถอะ"
51200-7 = "เรากำลังคุยกันดีๆ แท้ๆ... ทำไมถึงทำอะไรแบบนั้นคะ?"
51200-8 = "คุณกับคุณครูจากชาเล่ต์ พวกคุณจะไม่ให้อีกฝ่ายตั้งตัวเลยเหรอ?"
51200-9 = "[s] \"...เหตุผลก็ง่ายๆ ก็เพราะตัวต้นเหตุของความวุ่นวายอยู่ตรงหน้ายังไงล่ะ\""
51200-10 = "พวกเราก็เลยออกแรงนิดหน่อยเพื่อแก้ไขปัญหา ก็แค่นั้น"
51200-11 = "ชมรมฝึกฝนกำลังดูแลความสงบบนท้องถนนอยู่น่ะ"
51200-12 = "ใช่ค่ะ! ไม่ว่าเหตุผลจะเป็นอะไร แต่ฉันคงปล่อยคุณไว้แบบนี้ไม่ได้หรอกค่ะ"
51200-13 = "พวกรุ่นพี่พูดถูก!"
51200-14 = "ชมรมฝึกฝนของเราจะสู้จนสุดแรงเลย!"
51200-19 = "ชมรมฝึกฝน..."
51200-20 = "พวกคุณ..."
51200-22 = "...กำลังคุยกันดีๆ แท้ๆ แต่มารบกวนกันด้วยเหตุผลพรรค์นั้น"
51200-23 = "อีกแค่นิดเดียวก็จะเข้าที่เข้าทางอยู่แล้วเชียว"
51200-24 = "การไม่มีอารมณ์ร่วมและแสดงท่าทีที่เมินเฉยต่อเรื่องราวแบบนี้ ไม่ถูกใจเอาซะเลย..."
51200-35 = "...แต่ถึงยังไงก็เปล่าประโยชน์อยู่ดีค่ะ"
51200-36 = "ครั้งนี้คือคุณเหรอคะ? แม่แมวเหมียวของเฮียกกะเรียวรัน?"
51200-38 = "ชมรมฝึกฝนพูดถูกแล้ว สิ่งสำคัญที่ต้องทำคือการควบคุมความวุ่นวาย ในฐานะเฮียกกะเรียวรัน ฉันจะลืมข้อนี้ไม่ได้"
51200-39 = "...ต่อให้ต้นเหตุของความวุ่นวายจะเป็นสารพัดผีที่คนเห็นไม่อยากเชื่อสายตาตัวเองก็ตาม"
51200-40 = "เรนเกะ ตั้งสติไว้ให้ดี"
51200-41 = "...อ่า รู้แล้วละน่า!"
51200-42 = "ส่วนรุ่นพี่นางุสะ..."
51200-47 = "...อึก"
51200-49 = "...สรุปแล้วยัยนั่นคือเบื้องหลังความชั่วร้ายของเรื่องทั้งหมดที่เกิดขึ้นตอนนี้ใช่มั้ย?"
51200-50 = "ดูทรงแล้วก็เหมือนคนน่ารังเกียจที่พร้อมจะก่อเรื่องไม่ดีอยู่หรอก"
51200-51 = "อะไรกัน~ ไม่เห็นต้องพูดแรงขนาดนั้นก็ได้นี่คะ~?"
51200-52 = "คุณครู กระสุนของหัวหน้าชมรมฝึกฝนและการโจมตีของฉัน..."
51200-53 = "[s] \"ใช่ ทำอะไรทางนั้นไม่ได้เลย เหมือนยิงลงในน้ำอย่างนั้นแหละ...\""
51200-54 = "ใช่ค่า~~ ไม่สะทกสะท้านผิวหรอกนะคะ"
51200-55 = "เพราะเมื่อมีหนังสือลึกลับ อิโนะ โมโนโนเคะ โรคุของฉันแล้ว ก็ไม่มีอะไรหรือใครสร้างบาดแผลให้ <ตำนานร้อยเรื่องราว> และฉันได้หรอกค่ะ"
51200-56 = "ถ้าเป็นสิ่งที่อายาเมะมีก็ไม่แน่"
51200-57 = "อ่า น่าเสียดายจังเลยนะคะ คนที่อยู่ที่นี่ดันมีแค่นางุสะจัง คนโง่ขี้แยที่เป็นแค่ตัวประกอบ"
51200-59 = "......"
51200-61 = "งั้นเหรอ?"
51200-62 = "ใช้กลโกงอย่างขี้ขลาดตาขาว คนน่ารังเกียจ"
51200-63 = "เอาอีกแล้ว ทำไมพูดจาไม่ดีอีกแล้วคะ~~!"
51200-64 = "เฮ้อ... ก็ดีค่ะ เอาเลย เชิญพูดไปเรื่อยตามใจเลยค่ะ"
51200-65 = "ถึงพวกคุณจะแกล้งทำเป็นไม่รู้ร้อนรู้หนาว..."
51200-66 = "แต่เรื่องมันก็เริ่มไปแล้วละค่ะ... <เวที> และ <บทบาท> ก็ถูกจัดเตรียมไว้แล้วตามที่ฉันต้องการ..."
51200-67 = "และ <ตำนานร้อยเรื่องราว> ของฉันก็กำลังค่อยๆ มุ่งหน้าสู่ตอนอวสาน"
51200-68 = "[s1] \"ชูโระ เป้าหมายที่แท้จริงของชมรมความงามของธรรมชาติคืออะไรกันแน่?\"\n[s2] \"เธอมาก่อความวุ่นวายแบบนี้ทำไม?\""
51200-71 = "อ่ะฮ่าฮ่า เพิ่งจะมาสงสัยเอาป่านนี้เหรอคะ?"
51200-72 = "แต่ก็ดีค่ะ ถึงฉันไม่จำเป็นต้องตอบก็ได้ แต่ฉันจะตอบให้แล้วกันค่ะ"
51200-77 = "ทั้งหมดก็เพื่อ... <ความสง่างาม>"
51200-78 = "เพื่อสร้าง <ตำนานร้อยเรื่องราว> ของฉันในฐานะนักเล่าเรื่องลึกลับแห่งชมรมความงามของธรรมชาติ"
51200-80 = "เรียกปีศาจพวกนั้นออกมาด้วยเหตุผลพรรค์นั้นน่ะเหรอ?"
51200-81 = "...ว่างกันนักรึไง? ชมรมความงามของธรรมชาติของพวกเธอน่ะ"
51200-89 = "อะฮ่า"
51200-90 = "อะฮ่าฮ่าฮ่า!"
51200-96 = "อะฮ่าฮ่าฮ่าฮ่าฮ่า!"
51200-97 = "อะ... อะไรกัน? ทำไมถึง..."
51200-103 = "จะเซ่อไปถึงไหนกัน"
51200-104 = "คิดอย่างนั้นจริงๆ เหรอคะ?"
51200-105 = "คิดว่าการเรียกภูตผีปีศาจ การจุดไฟเผาถนน และแค่การปรากฏตัวต่อหน้าพวกคุณจะทำให้ <ตำนานร้อยเรื่องราว> ของฉันเกิดขึ้นได้งั้นเหรอ?"
51200-106 = "คิดเองเออเองอย่างคนไร้เดียงสา... เข้าใจผิดอย่างคนโง่เขลาเบาปัญญา"
51200-108 = "<ตำนานร้อยเรื่องราว> ของฉันน่ะมีมานานแล้ว ใช่ค่ะ มันเป็นเรื่องที่เริ่มขึ้นมาแต่ไหนแต่ไรแล้ว"
51200-109 = "พวกคุณคงไม่รู้อะไรกันเลย แล้วก็คงคาดเดากันไม่ได้เลยด้วย"
51200-110 = "ว่าเพียงข่าวลือข่าวเดียวก็เพียงพอที่จะมาถึงตรงนี้ได้แล้ว"
51200-111 = "[s] \"...ข่าวลือ?\""
51200-113 = "ข่าวลือก็คือสิ่งที่ต่อให้จำไม่ได้แล้วว่าได้ยินมาจากที่ไหน แต่สุดท้ายมันก็จะฝังไว้ในสมองอยู่เนิ่นนาน"
51200-114 = "สิ่งที่จำเป็นมีเพียงอย่างเดียว นั่นคือข่าวลือ"
51200-115 = "อย่างเช่น... ชักจูงคุณหนูที่แสนจะไร้เดียงสาด้วย <การเล่าเรื่องศึกชิงตำแหน่งให้ฟัง> อย่างลับๆ"
51200-116 = "[s] \"......!\""
51200-117 = "หรือบงการยัยคนซื่อๆ บื้อๆ ว่า <ออกไปสนุกกับชีวิตวัยรุ่นไม่ดีกว่าเหรอ?> ด้วยการพูดคุยอย่างมีอารมณ์ขัน และมีไหวพริบ"
51200-119 = "...เอ๋?"
51200-121 = "ยังไม่หมดๆ ยังมีอีกนะ~ มีอีกอย่างหนึ่ง!"
51200-122 = "ฉันใช้คำถามว่า <ถ้าเป็นการทำเพื่อรุ่นน้อง ก็เอาไปคืนเสียไม่ดีกว่าเหรอ?> ทำให้ยัยเด็กอวดดีต้อง#nทะเลาะกับรุ่นน้องด้วยค่ะ"
51200-127 = "[ns] \"...อย่าบอกนะว่า\""
51200-129 = "รู้กันแล้วใช่ไหมล่ะคะ ว่าที่เรื่องทั้งหมดนี้มันเป็นไปได้..."
51200-133 = "เป็นเพราะคุณมาที่นี่ยังไงล่ะคะ คุณครูจากชาเล่ต์"
51200-134 = "พอจะเดาเหตุผลที่คุณมาที่นี่ได้หรือเปล่าล่ะคะ?"
51200-142 = "[ns] \"...จดหมายจากชมรมความงามของธรรมชาติถึงชมรมหยินหยาง\""
51200-143 = "อะฮ่า อะฮ่าฮ่า"
51200-144 = "[s] \"หรือว่า... เรื่องทั้งหมดนี่...\""
51200-145 = "ฉันเคลื่อนไหวเพื่อสิ่งที่แต่ละคนคิดว่าเป็นสิ่งที่ดีที่สุด"
51200-146 = "จนกระทั่งการเคลื่อนไหวสิ้นสุดลง ผลลัพธ์ที่ฉันได้เห็นก็คือความผิดใจ ความพินาศ และความแตกหัก#nของทุกอย่าง"
51200-147 = "ไม่มีคนโง่หน้าไหนรู้เลยว่าสิ่งที่ตัวเองคิดว่าดีที่สุดจะกลับกลายเป็นสิ่งที่เลวร้ายที่สุด"
51200-148 = "เฮ้อ น่าสมเพชนะคะ"
51200-149 = "น่าสมเพชจริงๆ เรื่องนี้มันช่าง... โง่เง่าและยอดเยี่ยม!"
51200-150 = "อะฮ่าฮ่าฮ่า! ขอบคุณนะคะ คนไร้สมองทุกๆ คน"
51200-151 = "ต้องขอบคุณที่พวกคุณโง่กันเสียขนาดนี้ เวทีของเรื่องลึกลับเมื่อ 20 ปีก่อนก็เลยถูกสร้างขึ้นได้อีกครั้ง"
51200-164 = "เจ้าพวกนั้นอีกแล้ว...!"
51200-165 = "คาเอเดะจัง! อย่าออกไปไกลนะคะ!"
51200-166 = "อะ... อื้ม...!"
51200-181 = "พยายามไปก็เปล่าประโยชน์อยู่ดี ฉันน่ะติด <กระดุมเม็ดแรก> ไปแล้วละค่ะ"
51200-182 = "ความสง่างามของพวกเรามันเริ่มไปแล้ว จากนี้ไปจะเป็นไคลแมกซ์ที่เราเฝ้ารอค่ะ"
51200-183 = "ต้องขอบคุณทุกคนที่ช่วยพยายามอย่างสุดความสามารถ เพราะในที่สุด... เราก็ได้บทบาทอันยอดเยี่ยม#nของตัวเอกจากเรื่องที่ฉันแต่งขึ้นมาแล้ว"
51200-184 = "คนที่ทุกคนรู้จักกันดี... จะมาเป็นตัวหลักในเรื่องนี้ยังไงล่ะคะ"
51200-188 = "ยูคาริ...?"
51200-189 = "ว่าไงนะ?!"
51200-190 = "ฮิฮิ ใช่แล้วค่ะ ต้องมีไหวพริบแบบนี้แหละ"
51200-193 = "ใช่ค่ะ ใช่แล้ว ต้องขอบคุณในความทุ่มเทของทุกๆ คน เด็กสาวคนนี้ก็เลยโอบกอดบาดแผลและรับเอา#nความสิ้นหวังที่ยิ่งใหญ่กว่าใครเพื่อนมาเลยละ"
51200-194 = "เด็กสาวที่ถูกกักขังด้วยคำสาปที่ตนไม่ต้องการ เพื่อการนำเวทีเมื่อ 20 ปีที่แล้วกลับมาอีกครั้ง"
51200-196 = "อ่า... ถ้าเป็นเด็กสาวคนนั้น... ความสง่างาม... ที่งดงามเช่นนี้..."
51200-197 = "จะกลายเป็นตำนานร้อยเรื่องราวที่ยิ่งใหญ่เลยละค่ะ"
51200-202 = "พวกเธอจะทำแบบนั้น... เหมือนที่ทำกับอายาเมะเหรอ..."
51200-203 = "[s] (เหมือนที่ทำกับ... อายาเมะ?)"
51200-208 = "ขอตัวก่อนแล้วกันนะ"
51200-212 = "[ns] \"......!! ทุกคน! หยุดชูโระไว้...!\""
51200-221 = "เปล่าประโยชน์"
51200-226 = "เรื่องที่เริ่มไปแล้วน่ะ ตอนนี้ไม่ว่าใครหน้าไหนก็ขัดขวางไม่ได้หรอก"

[translation]
51200-1 = "第20話;花鳥風月部的怪談家（２）"
51200-5 = "……嚇我一跳。"
51200-6 = "居然突然朝人開槍，太沒禮貌了吧？#n這樣會嚇到我的……雖然對我不管用就是了。"
51200-7 = "我明明說得正起勁……怎麼能突然開槍呢？"
51200-8 = "夏萊的老師和你們……難道都沒有美感嗎？"
51200-9 = "[s]「……理由很簡單。因為引起騷亂的元兇就在眼前。」"
51200-10 = "我們只是努力解決騷亂罷了。"
51200-11 = "因為我們修行部正在和老師一起守護大街的和平。"
51200-12 = "是啊！不管有什麼理由，我都不會放任你胡作非為。"
51200-13 = "前輩們說的對！"
51200-14 = "我們修行部會全力阻止你！"
51200-19 = "修行部……"
51200-20 = "你們……"
51200-22 = "……居然因為那種理由妨礙我？"
51200-23 = "明明只差一點點就恰到好處了說。"
51200-24 = "你們這種無視餘興與戲劇性的行為，真是讓人看不下去……"
51200-35 = "……我不是說過不管用了嗎？"
51200-36 = "這次是你嗎？#n百花繚亂的貓。"
51200-38 = "修行部說的對，重要的是平息騷亂。#n身為百花繚亂的一員，可不能忘了這一點。"
51200-39 = "……就算引起騷亂的是讓人懷疑自己眼睛的魑魅魍魎也一樣。"
51200-40 = "蓮華，打起精神來。"
51200-41 = "……我，我知道啦！"
51200-42 = "還有名草前輩……"
51200-47 = "……唔。"
51200-49 = "……那傢伙就是這一連串事件的幕後黑手對吧？"
51200-50 = "看起來確實像是會做那種不起眼的小事的人。"
51200-51 = "什麼嘛～不必把話說成那樣吧～？"
51200-52 = "老師……對那傢伙的攻擊全都……"
51200-53 = "[s]「嗯，都向射擊水面一樣直接穿過去了……」"
51200-54 = "沒～～錯，沒有用的。"
51200-55 = "在我擁有的[ruby=怪書]《稻生物怪錄》[/ruby]面前，任誰都傷不了「百物語」，更別說要傷到我了。"
51200-56 = "只要菖蒲不在，就沒人奈何的了我。"
51200-57 = "啊，但是真可惜，怎麼辦咧～#n這裡只有傻傻的愛哭鬼兼蠢蛋名草醬耶？"
51200-59 = "…………"
51200-61 = "是嗎？"
51200-62 = "原來不過是個只會用作弊手段躲藏的膽小鬼而已啊。"
51200-63 = "又說那種難聽的話～～！"
51200-64 = "唉……算了，隨便你們怎麼說。"
51200-65 = "反正就算你們裝作若無其事……"
51200-66 = "故事也已經開始了。#n「舞台」和「角色」已經如我所願安排就位……"
51200-67 = "屬於我的「百物語」正一步一步、確確實實地走向結局。"
51200-68 = "[s1]「……棕櫚，花鳥風月部真正的目的是什麼？」\n[s2]「引起這種騷亂的意圖是什麼？」"
51200-71 = "啊哈哈，事到如今才問這個嗎？"
51200-72 = "不過……好吧。#n雖然沒有必要，我就回答你吧。"
51200-77 = "一切都是為了──「風情」。"
51200-78 = "為了完成我──花鳥風月部怪談家的「百物語」。"
51200-80 = "就為了那種莫名其妙的理由叫出那些怪物？"
51200-81 = "……看來花鳥風月部比我想像中還閒啊。"
51200-89 = "啊哈。"
51200-90 = "啊哈哈哈！"
51200-96 = "啊哈哈哈哈哈！"
51200-97 = "怎……怎麼了？#n為什麼大笑……"
51200-103 = "真愚蠢。"
51200-104 = "你真的那麼認為嗎？"
51200-105 = "只是叫出怪物燒毀大街，站在你們面前就能創造出我的「百物語」？"
51200-106 = "居然有那種天真爛漫的誤會……真是太愚蠢了。"
51200-108 = "我的「百物語」從更久以前……沒錯，早就已經開始了。"
51200-109 = "你們根本不知道吧？完全沒料到吧？"
51200-110 = "來到這裡只要一個傳聞就夠了。"
51200-111 = "[s]「……傳聞？」"
51200-113 = "所謂的傳聞，就算不記得在哪裡聽到，也會一直在腦裡縈繞不去。"
51200-114 = "沒錯，我需要的就只有傳聞和謠言。"
51200-115 = "比方說……悄悄地藉由「告知繼承戰」來挑撥天真的小姐。"
51200-116 = "[s]「……！」"
51200-117 = "還有藉由「享受青春不是比較好嗎」來動搖愚蠢的丫頭。"
51200-119 = "……咦？"
51200-121 = "還有～我還沒說完！還有一件事。"
51200-122 = "透過「為了後輩著想應該讓他回去」這個說法，讓自以為是的某人和後輩爭鬥。"
51200-127 = "[ns]「……難道。」"
51200-129 = "而且你已經知道了吧？#n這一切之所以能夠實現──"
51200-133 = "夏萊的老師，全都是因為你來到了這裡。"
51200-134 = "至於過來的原因……你有頭緒嗎？"
51200-142 = "[ns]「陰陽部收到的……來自花鳥風月部的信。」"
51200-143 = "啊哈，啊哈哈。"
51200-144 = "[s]「難道……從一開始全都是……」"
51200-145 = "雖然每個人都以自認最好的方法採取行動……"
51200-146 = "結果卻帶來反效果，搞砸了一切。"
51200-147 = "最愚蠢的是，所有人做夢都沒想到──自認最好的方法居然會導致最壞的結果。"
51200-148 = "唉，真遺憾。"
51200-149 = "真是太遺憾了。#n這個故事實在……太愚蠢、太精彩了！"
51200-150 = "啊哈哈哈！#n真是太感謝了，愚蠢的各位。"
51200-151 = "多虧你們如此愚蠢，我才能打造出能讓20年前的怪談重現的舞台。"
51200-164 = "又是那些怪物……！"
51200-165 = "楓醬！別離開我身邊！"
51200-166 = "嗯……！"
51200-181 = "沒用的。#n「第一步」已經踏出去了。"
51200-182 = "我們的風情現在才剛開始。#n苦苦等待的高潮即將到來。"
51200-183 = "多虧各位的大力幫忙，適合擔任故事主角的完美角色……終於成形了。"
51200-184 = "各位所熟知的人，將會成為這個故事的主角。"
51200-188 = "紫……？"
51200-189 = "什麼！？"
51200-190 = "咿嘻嘻。果然還是認得出來啊。"
51200-193 = "沒錯，因為有你們的拚命努力，才造就了這位傷得最重、比任何人都絕望的少女。"
51200-194 = "被捲入「必須重現20年前的舞台」詛咒的可憐少女。"
51200-196 = "啊啊……如果是那孩子……一定能帶來最棒的風情……"
51200-197 = "成為無與倫比的百物語！"
51200-202 = "你們……又想跟菖蒲那時一樣……"
51200-203 = "[s] （跟菖蒲那時……一樣？）"
51200-208 = "那麼我就先告辭了。"
51200-212 = "[ns]「……！！大家！快攔住棕櫚……！」"
51200-221 = "沒用的。"
51200-226 = "故事一旦開始，就沒有任何人能夠阻止。"

[translation]
51200-1 = "Episode 20;The Bard of Nature's Beauty 2"
51200-5 = "...Geez."
51200-6 = "Don'tcha know it's rude to shoot at people with no warning? If it'd been someone else, they would've gotten hurt!"
51200-7 = "C'mon! I was in the middle of gloating."
51200-8 = "You would think a teacher would know what manners are. Hm?"
51200-9 = "[s] \"We're going to cut off this problem at the root.\""
51200-10 = "I won't let you do as you please."
51200-11 = "Sensei and the Inner Discipline Club don't owe criminals who disturb Hyakkiyako's peace any manners."
51200-12 = "We're proper ladies, and we'll protect our home no matter what."
51200-13 = "Heck yeah!"
51200-14 = "You're up against the Inner Discipline Club now!"
51200-19 = "You three..."
51200-20 = "How admirable."
51200-22 = "So loud with nothing worth saying... "
51200-23 = "You interrupted me right in the middle of my big speech!"
51200-24 = "Idiots like you with no respect for artistry or drama—"
51200-35 = "Are you really going to keep trying that? It's obviously not working. "
51200-36 = "I thought Hyakkaryouran's kitty cat would be a little smarter than that."
51200-38 = "The Inner Discipline Club reminds me of our purpose. The Hyakkaryouran's duty is to protect Hyakkiyako against evil such as you."
51200-39 = "No matter how fantastical or terrifying our enemy may be. "
51200-40 = "Renge, stop idling."
51200-41 = "Y-You don't have to tell me! Geez!"
51200-42 = "Nagusa..."
51200-47 = "..."
51200-49 = "I've gathered that she is the mastermind behind this plot."
51200-50 = "Yes. This inane behavior is befitting of that child."
51200-51 = "I wouldn't say that twice, if I were you."
51200-52 = "Don't threaten me. Why were our attacks ineffective?"
51200-53 = "[s] \"It was like everyone was shooting the air.\""
51200-54 = "Like I've been SAYING."
51200-55 = "Ino's Phantom Records keeps me and all the monsters safe and sound. You couldn't give me a papercut if you tried."
51200-56 = "Ah! Ayame could've though."
51200-57 = "Let's see, let's see... Is Ayame here? Hm... I see a crybaby, an idiot, and a coward. What an ensemble! No Ayame though!"
51200-59 = "..."
51200-61 = "Hm."
51200-62 = "It appears to me you are the cowardly one. Not Nagusa."
51200-63 = "Maybe I should call you the mean one instead!"
51200-64 = "Well, if it makes you feel better, insult away!"
51200-65 = "Keep that cool, calm exterior while you panic on the inside."
51200-66 = "The cast has gathered, and the curtains are drawn. You're already in the thick of it."
51200-67 = "There's nothing you can do to stop my ghost story from reaching its conclusion."
51200-68 = "[s1] \"...Shuro, what is Nature's Beauty's real objective?\"\n[s2] \"What are you trying to get out from all this?\""
51200-71 = "Hahaha! You're finally asking the good stuff! "
51200-72 = "I'm a good person, so I'll answer you."
51200-77 = "Everything I do is for my vision of elegance!"
51200-78 = "I'll create my own, beautiful ghost story! I am Nature's Beauty's glorious bard!"
51200-80 = "You sound so proud of such trivialities."
51200-81 = "Perhaps you should find something better to fill your obviously immense amount of free time."
51200-89 = "Aha."
51200-90 = "Ahahaha!"
51200-96 = "Hahahahaha!"
51200-97 = "What the hell is so funny?"
51200-103 = "I'm laughing at your utter idiocy."
51200-104 = "That's what you got out of that?"
51200-105 = "Do you think this is it? That my ghost story is a paltry handful of monsters and some fire?"
51200-106 = "You look down on me, but with such stupid, stupid eyes."
51200-108 = "I've been here since the beginning. Creating, weaving, threading the inception of my stories."
51200-109 = "You imbeciles didn't even see it coming. Still don't see it."
51200-110 = "All it takes is one rumor here, another little whisper there."
51200-111 = "[s] \"...Rumor?\""
51200-113 = "Yup! Rumors! No one ever knows where they come from, but they get stuck in your head like a bad pop song."
51200-114 = "You just need one person to believe it, to murmur it over breakfast to their fellow student."
51200-115 = "Maybe just one naive little girl hearing about a succession contest?"
51200-116 = "[s] \"You...?!\""
51200-117 = "Or maybe it was suggesting to a stupid girl going through an identity crisis that she should find her youth..."
51200-119 = "...M-Me?"
51200-121 = "Oh, another one! Another one!"
51200-122 = "Once upon a time, there was a mean, arrogant strategist who let herself get manipulated into believing the best thing to do for her precious underclassman was to send her far, far away."
51200-127 = "[ns] \"Every single thing that's happened here...\""
51200-129 = "How was any of this even possible?!"
51200-133 = "Well, it's all thanks to the arrival of our one and only Sensei."
51200-134 = "Now then, surely you don't still think your arrival here was a coincidence."
51200-142 = "[ns] \"...The letter from Nature's Beauty to the Yin-Yang Club.\""
51200-143 = "Got it! Ahahaha!"
51200-144 = "[s] \"You manipulated everything from the very beginning.\""
51200-145 = "One thing I've learned about people is that they'll always act in their best self-interest."
51200-146 = "But there's no such thing as happy endings, not in this world."
51200-147 = "And they're so stupid they don't even realize they're walking towards disaster!"
51200-148 = "Ah, how unfortunate. "
51200-149 = "For you at least! This is a stupid and exhilarating story where the heroes all lose!"
51200-150 = "Hahaha! I have nothing but gratitude towards each and every one of you. "
51200-151 = "Thank you for being so stupid! Because now I can finally recreate the legends from twenty years ago."
51200-164 = "They're here!"
51200-165 = "Kaede, behind me! Now!"
51200-166 = "O-Okay!"
51200-181 = "Try, try, try your hearts out. The die is already cast."
51200-182 = "This is the climax of the story, the epitome of our elegance!"
51200-183 = "You see, I've finally chosen my leading actress for my story. All thanks to you."
51200-184 = "You should be happy! You know her very, very well."
51200-188 = "...Yukari? What did you do to her?"
51200-189 = "Y-Yukari?!"
51200-190 = "Heehee. Even you can put that much together! "
51200-193 = "Yes, Yukari. I have to thank you. After all, you were the ones who pushed her into isolation and loneliness, exposed her worst insecurities."
51200-194 = "Your precious Yukari will be the focal point of my recreation of the Lantern Festival of twenty years past."
51200-196 = "I can hardly contain my excitement... She will be the very personification of elegance."
51200-197 = "She will be my greatest Phantom Fable!"
51200-202 = "You...just like...Ayame..."
51200-203 = "[s] \"(Just like Ayame?)\""
51200-208 = "Well, this was fun. Bye-bye now!"
51200-212 = "[ns] \"No! Stop! Get back here!\""
51200-221 = "It's futile."
51200-226 = "The book is open. It won't close until the conclusion has been read."

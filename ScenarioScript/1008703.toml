[translation]
1008703-1 = "ฉันจะเอาไปคืนค่ะ!"
1008703-4 = "เอาละ... ออกมาได้เลยครับ คุณลูกค้า"
1008703-11 = "ปะ... เป็นยังไงบ้างคะ? คุณครู...?"
1008703-12 = "[s1] \"โอ้ว...!! เข้ากับอาโกะมากเลย!\"\n[s2] \"สวยมากจนไม่อยากเชื่อสายตาเลยละ อาโกะ!\""
1008703-15 = "งั้นเหรอคะ...? อาจเป็นเพราะนี่เป็นดีไซน์ที่คุณครูชอบน่ะ..."
1008703-16 = "ขนาดน่าจะพอดีตัวคุณลูกค้าเลย ใส่แล้วรู้สึกว่าอึดอัดตรงไหนบ้างมั้ยครับ?"
1008703-21 = "อืม... ไม่อึดอัดตรงไหนเป็นพิเศษค่ะ... แต่รู้สึกเย็นๆ หลังหน่อย... "
1008703-25 = "ต้องบอกว่ายังไงดีนะ... มันค่อนข้าง..."
1008703-26 = "ส่วนหลังเป็นดีไซน์ของชุดนี้อยู่แล้ว เราน่าจะแก้ไม่ได้ แต่ปรับความยาวของชุดให้ได้ครับ"
1008703-27 = "คุณลูกค้าไปเปลี่ยนชุดมาให้หน่อยได้มั้ยครับ? ผมจะแก้ความยาวให้เดี๋ยวนี้เลยครับ"
1008703-34 = "อืม..."
1008703-35 = "[s] \"ครูว่าชุดเข้ากับอาโกะดีออก กังวลอะไรเหรอ?\""
1008703-39 = "ก็ไม่ถึงกับกังวลหรอกค่ะ..."
1008703-45 = "เอ่อ... คือว่า..."
1008703-51 = "หืม...? คณะกรรมการวินัยติดต่อมา...?"
1008703-55 = "ค่ะ ฉันเจ้าหน้าที่อาโกะ "
1008703-61 = "คะ? ว่าไงนะคะ? พวกแพนเดโมเนียม โซไซตี้อีกแล้วเหรอ?! "
1008703-62 = "อ่า... พอดีฉันมีธุระส่วนตัว ก็เลยออกมาข้างนอกน่ะค่ะ ได้ค่ะ ฉันจะไปเดี๋ยวนี้เลยค่ะ ระหว่างนี้ก็รอคำสั่ง#nจากฉันก่อนนะคะ!"
1008703-66 = "คุณครู! ขอโทษนะคะ ฉันต้องกลับก่อนเพราะมีเรื่องด่วนค่ะ"
1008703-67 = "[s] \"มีเรื่องอะไรเหรอ?\""
1008703-68 = "เรื่องน่ารำคาญที่เจอเป็นปกติน่ะค่ะ!"
1008703-69 = "ไม่ใช่เรื่องใหญ่อะไรหรอก คุณครูไม่ต้องใส่ใจก็ได้ค่ะ "
1008703-73 = "ขอโทษนะคะคุณครู! ฉันฝากเรื่องชุดด้วยนะคะ!"
1008703-79 = "[ns] \"งานของคณะกรรมการวินัยนี่ยุ่งตลอดเลยสินะ...\""
1008703-83 = "เอ๋ คุณลูกค้าท่านนั้นล่ะครับ? "
1008703-84 = "[s3] \"พอดีมีงานเข้า ก็เลยกลับไปก่อนแล้วน่ะ\"\n[s4] \"เรื่องชุด เดี๋ยวทางนี้เอากลับไปเอง\""
1008703-87 = "แหมๆ... อย่างนั้นเองเหรอครับ ผมแก้ชุดและซักแห้งให้เสร็จเรียบร้อยแล้ว รับชุดไปได้เลยครับ"
1008703-88 = "เงินก็จ่ายแล้ว... สิ่งที่เหลือก็แค่..."
1008703-92 = "อ้อ จริงด้วย ผมลืมเรื่องนี้ไปเลยครับ"
1008703-96 = "พอชุดมีดีไซน์แบบนี้ เวลาใส่ก็เลยต้องใส่อินเนอร์แวร์เฉพาะน่ะครับ"
1008703-97 = "รูปทรงของชุดจะได้สวยเหมือนเดิม และจะขยับตัวได้สะดวกด้วยครับ"
1008703-98 = "[s] \"อ่า งั้นก็ต้อง...\""
1008703-99 = "ร้านของเรามีขายอินเนอร์แวร์สำหรับชุดแบบนี้ด้วยครับ จะซื้อไปเลยมั้ยครับ?"
1008703-100 = "ถึงจะดูแปลกตาไปหน่อยก็เถอะครับ"
1008703-104 = "[ns] \"นี่มัน... อินเนอร์แวร์จริงเหรอ? ไม่ใช่ริบบิ้นใช่มั้ย?\""
1008703-105 = "ครับ... ต้องใส่แบบนี้ จะได้ทำให้ดูดีขึ้นตอนใส่ชุดแบบนี้น่ะครับ"
1008703-109 = "[ns5] ถึงแม้จะมีลางสังหรณ์ว่าอาโกะจะโกรธ แต่ก็ซื้อไปก่อน\n[ns6] ถึงแม้จะเดาปฏิกิริยาได้ แต่ก็ตัดสินใจซื้อไปเป็นของขวัญ"
1008703-112 = "ค่ะ เลือกได้ดีเลยครับ"
1008703-113 = "ผมจะใส่อินเนอร์แวร์ไปในถุงเดียวกับชุดเดรสเลยนะครับ"
1008703-121 = "(อาโกะไม่อยู่ที่ห้อง คุณครูจึงเอาชุดไปวางไว้บนโต๊ะและกลับมา)"

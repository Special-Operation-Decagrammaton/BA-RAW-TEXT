[translation]
1008703-1 = "總之要退貨！"
1008703-4 = "……好，請出來吧。這位客人。"
1008703-11 = "怎，怎麼樣呢？……老師？"
1008703-12 = "[s1]「哦哦……！！非常適合你！」\n[s2]「漂亮到讓人忍不住給予認同，亞子！」"
1008703-15 = "……是嗎？#n因為是老師喜歡的設計，所以才會這樣吧……"
1008703-16 = "尺寸也剛剛好，有沒有不舒服的地方呢？"
1008703-21 = "唔嗯……雖然背部有點涼……"
1008703-25 = "但該怎麼說呢……總覺得有點……"
1008703-26 = "背部因為設計的關係，會有那種情況也是沒辦法的。#n至於長度可能還要稍微調整一下。"
1008703-27 = "能請您先將衣服換回來嗎？我立刻去修改。"
1008703-34 = "唔……"
1008703-35 = "[s]「我覺得很適合呀，有哪裡讓你在意的嗎？」"
1008703-39 = "與其說是在意……"
1008703-45 = "這……那個……"
1008703-51 = "嗯……？風紀委員會來電……？"
1008703-55 = "是，我是行政官。"
1008703-61 = "什麼？可惡的萬魔殿又來了！？"
1008703-62 = "啊，我，我因為私事暫時外出了。#n好，我現在立刻出發。這段期間先等待我的指示！"
1008703-66 = "老師！不好意思，我有急事要先回去了。"
1008703-67 = "[s]「發生什麼事？」"
1008703-68 = "和平常一樣麻煩的事！"
1008703-69 = "沒什麼，老師不需要太在意。"
1008703-73 = "對不起，老師！禮服就拜託您了！"
1008703-79 = "[ns]「還是一樣相當忙碌呢……」"
1008703-83 = "咦？另一位客人呢？"
1008703-84 = "[s3]「他有事要忙，已經先回去了。」\n[s4]「禮服交給我就行了。」"
1008703-87 = "哎呀哎呀……原來如此。#n修改和乾洗都已經完成，現在可以直接帶走。"
1008703-88 = "款項也已經收到……接下來……"
1008703-92 = "啊，我忘了一件事。"
1008703-96 = "因為設計的關係，穿著這套禮服時必須穿著專屬的內衣。"
1008703-97 = "這樣才能讓線條更明顯，行動時也不會造成不便。"
1008703-98 = "[s]「啊，所以當時才會……」"
1008703-99 = "我們店裡有販售專屬的內衣，您覺得怎麼樣呢？"
1008703-100 = "設計大概是這樣。"
1008703-104 = "[ns]「……這是內衣對吧？不是緞帶？」"
1008703-105 = "是的……這是為了凸顯衣服的風采……"
1008703-109 = "[ns5] 雖然覺得亞子應該又會生氣，但還是決定買了\n[ns6] 雖然早就預料到情況會怎麼發展，但還是決定買了"
1008703-112 = "好的，我認為這是個明智的選擇。"
1008703-113 = "那麼我將內衣和禮服包裝在一起。"
1008703-121 = "（因為亞子不在，之後把禮服放在他的位置上後就離開了）"

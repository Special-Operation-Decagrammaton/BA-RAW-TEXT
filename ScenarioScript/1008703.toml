[translation]
1008703-1 = "I'm Returning It!"
1008703-4 = "Do come out, miss."
1008703-11 = "Well, what do you think, Sensei?"
1008703-12 = "[s1] \"Wow! It looks so good on you!\"\n[s2] \"I'll admit it, it's very striking, Ako!\""
1008703-15 = "...That's just because it's to your tastes."
1008703-16 = "It fits you well, miss. Is there any discomfort?"
1008703-21 = "Heh. No, actually. Although my back's a little cold... "
1008703-25 = "It's also a little... How do I say it?"
1008703-26 = "The back I fear is cut that way. But we could adjust the length just a touch."
1008703-27 = "Would you mind changing back into your clothes? Then I can start making alterations right away."
1008703-34 = "Hm..."
1008703-35 = "[s] \"I really meant it. You looked great. So what's really bothering you?\""
1008703-39 = "Bothered isn't the right word..."
1008703-45 = "It's...well..."
1008703-51 = "Hm? I've got a call from the Prefect Team..."
1008703-55 = "Hello? Ako speaking."
1008703-61 = "Huh? What? The Pandemonium Society, again?! "
1008703-62 = "Uh, I'm out of the office on a personal errand. Yes, I can head over right now. Do not engage without my orders!"
1008703-66 = "I'm sorry, Sensei! Something urgent came up. I have to go."
1008703-67 = "[s] \"What's going on?\""
1008703-68 = "Just business as usual!"
1008703-69 = "It's not a big deal. No need to worry about it."
1008703-73 = "I'll leave the dress to you!"
1008703-79 = "[ns] \"It seems the Prefect Team never sleeps...\""
1008703-83 = "Huh? What happened to the young lady? "
1008703-84 = "[s3] \"She had to step out.\"\n[s4] \"You can leave the dress with me.\""
1008703-87 = "Oh dear... Okay, well it's been tailored and dry-cleaned, so it's ready to go!"
1008703-88 = "There. The payment is all set. I think that should be—"
1008703-92 = "Oh, right, I nearly forgot."
1008703-96 = "Due to the design, the young miss will need to wear special underclothes with this dress."
1008703-97 = "That way, the lines and design of the dress can come alive. It'll also help her avoid discomfort when moving."
1008703-98 = "[s] \"Ah. That makes sense.\""
1008703-99 = "Our shop has the underclothes available in several colors."
1008703-100 = "How about this one? "
1008703-104 = "[ns] \"...Sir I think that's a ribbon.\""
1008703-105 = "What? No. These are underclothes! They are vital to bringing out the outfit's true elegance!"
1008703-109 = "[ns5] \"...Maybe as long as an expert said it, she'll believe me.\"\n[ns6] \"I have a bad feeling about this. But every girl deserves to feel elegant...right?\""
1008703-112 = "You've made the right decision. "
1008703-113 = "Here. I'll add it to your order. "
1008703-121 = "Ako was out of the office when I arrived at the Prefect Team offices. So I left her dress at her desk."

90001130-150 = "#na;오르;후후. 후후. 우후후후후. 그 부분에 있어서는 소인의 공이 가장 컸다는 것을 이제 슬슬 인정하실 때가 아니신지?"
90001130-151 = "#na;소프;……그래. 진짜 절대로 인정하기 싫지만, 그건 사실이니까."
90001130-152 = "#na;아인;죄, 죄송해요……. 역시 그 부분의 이론, 저는 아직도 완전히 이해가 안 가요…… 히잉……."

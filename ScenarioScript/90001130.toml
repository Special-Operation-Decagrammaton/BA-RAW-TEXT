90001130-76 = "3;소프;99;진정해, 아인. 진정하라고. 네가 그…… 헬리컬 3호였나? 그 설비를 얼마나 아끼는지는 잘 알았으니까."
90001130-77 = "5;아인;10;5, 5호예요! 그리고 헬리컬 5호 쨩은 설비 같은 게 아, 아니예요! 그 아이는, 그러니까…….\n#5;hophop"

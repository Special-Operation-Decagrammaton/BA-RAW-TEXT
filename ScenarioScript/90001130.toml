[translation]
90001130-1 = "ตอนที่ 13;ออกเดินทาง"
90001130-10 = "โอ้ ในที่สุดก็มาถึงแล้วสินะ"
90001130-12 = "ชะ... ใช่ค่ะ! ทรัพยากรสุดท้ายจาก <กริดพอยต์>... มาถึงแล้วค่ะ!"
90001130-13 = "ไม่หรอก ถ้าจะพูดให้ชัดๆ แล้วละก็ นี่ไม่ใช่ทรัพยากรสุดท้ายเสียทีเดียวหรอกค่ะ ตอนนี้เรารวบรวม#nมาได้ทั้งหมด 99.98%... งั้นก็น่าจะต้องมีการขนส่งอีกสัก 2 รอบนะคะ "
90001130-17 = "มะ... มันก็จริงหรอกนะคะ... ฮือ..."
90001130-19 = "มะ... ไม่เป็นไรหรอกน่า ไอน์! ถ้าดูจากขอบเขตของข้อผิดพลาดแล้ว ต่อให้เราเข้าสู่กระบวนการต่อไป#nตอนนี้เลยก็ไม่มีปัญหาหรอก!"
90001130-20 = "ออร์ ทำไมเธอถึงชอบพูดเสริมเติมแต่งแล้วทำลายบรรยากาศอยู่เรื่อยเลย?"
90001130-24 = "แต่ว่า... ก่อนหน้านี้ซอฟเองก็เห็นด้วยไม่ใช่เหรอคะ?"
90001130-25 = "เห็นด้วยกับอะไรงั้นเหรอ...? ฉันจำไม่ได้เลยนะว่าไปเห็นด้วยอะไรกับการใช้คารมของเธอเอาไว้"
90001130-31 = "ก็ที่บอกว่าไอน์น่ารักที่สุดตอนทำท่าเหมือนจะร้องไห้ไง!"
90001130-33 = "คะ... คะ?!?!"
90001130-35 = "อืม เรื่องนั้นมันก็จริงอยู่หรอกนะ..."
90001130-37 = "ซอฟก็เป็นไปกับเขาด้วยเหรอคะ!?!?"
90001130-42 = "อ่า ระ... เรื่องนั้นน่ะ ไอน์! ที่ฉันพูดไปเมื่อกี้ ฉันไม่ได้หมายความแบบนั้นหรอกนะ..."
90001130-43 = "ทั้งหมดเป็นเพราะเธอแท้ๆ เลยนะ ออร์!"
90001130-44 = "ทีนี้จะมาโทษฉันเหรอคะเนี่ย?!"
90001130-54 = "เอ่อ... ทุกคนคะ..."
90001130-62 = "ตะ... ตอนนี้การขนส่งทรัพยากรเสร็จเรียบร้อยแล้ว...! ต่อไปก็ถึงตาของพวกหุ่นรับใช้จังแล้วสินะคะ!"
90001130-66 = "ใช่แล้วค่ะ ไอน์ ทุกคนกำลังทำงานอย่างขยันขันแข็งเลยค่ะ"
90001130-67 = "แต่ยังไงก็... นะ... น่าเป็นห่วงอยู่นะคะ... ก็แผลของเฮลิคอลจัง No. 5 ยังไม่หายดีเลย..."
90001130-72 = "เฮลิคอล No. 5? อ๋อ เกลียวที่สีลอกไปก่อนหน้านี้น่ะเหรอ? ไปตั้งชื่อให้ตั้งแต่เมื่อไรเนี่ย?"
90001130-73 = "ชะ... ใช่ค่ะ! ถ้าสีหลุดลอก ก็จะเกิดสนิมได้ง่ายค่ะ!"
90001130-74 = "และในขณะที่กำลังรักษาบาดแผล ก็มีการเสริมแขนกลให้มีขนาดใหญ่ขึ้น ก็เลยยิ่งต้องใช้กำลังไฟที่#nมากขึ้นไปด้วย...!"
90001130-75 = "ดังนั้นตัวขับเคลื่อนก็ต้องเพิ่มขนาดตามไปด้วย นี่จึงเป็นโอกาสที่จะใช้ลำตัวที่ใหญ่ขึ้นและวัสดุที่#nแข็งแกร่งยิ่งขึ้น...!!!"
90001130-76 = "ใจเย็นๆ ก่อนนะ ไอน์ ตั้งสติก่อน ฉันก็รู้อยู่หรอกว่าไอน์หวงแหนอุปกรณ์เฮลิคอล No. 3 นี้มากแค่ไหน"
90001130-77 = "ไม่ใช่ค่ะ No. 5 ต่างหาก! แล้วเฮลิคอลจัง No. 5 ก็ไม่ใช่แค่อุปกรณ์หรอกนะคะ! เด็กคนนั้นน่ะ เค้า..."
90001130-78 = "คะ... เค้าเป็นสิ่งพิเศษค่ะ!"
90001130-79 = "พิเศษอะไรขนาดนั้นเหรอ? ก็เป็นแค่หุ่นรับใช้หนึ่งในหลายหมื่นตัวเท่านั้นเอง"
90001130-84 = "ตายจริง ทำไมถึงโหดร้ายและเยือกเย็นได้ถึงขนาดนี้คะ! ซอฟ รู้ตัวมั้ยว่าเธอคือผู้ดูแลที่เลือดเย็น ผู้ที่มองทุกสิ่งเป็นแค่วัตถุที่มีเป้าหมายเท่านั้น!"
90001130-85 = "ไม่รู้เหรอว่าคำพูดเย็นชาที่ไร้ความรู้สึกจะทำให้ไอน์ที่อ่อนโยนต้องเสียใจมากแค่ไหนน่ะ..."
90001130-86 = "ฉันไม่อยากฟังคำแบบนั้นจากปากของเธอหรอกนะ..."
90001130-87 = "ว่าแต่ ไอน์ จะใช้แค่วิธีนั้นในการรักษาบาดแผลของเฮลิคอล No. 5 เหรอคะ?"
90001130-93 = "ในทุกการอัปเกรดในทางกายภาพ เราต้องเพิ่มประสิทธิภาพของซอฟต์แวร์และอุปกรณ์เสริมให้เหมาะ#nสมนะคะ"
90001130-94 = "ถ้าติดตั้งอุปกรณ์ที่ใช้กำลังไฟฟ้าเยอะๆ หลายๆ ชิ้นละก็ ข้อต่อและชิ้นส่วนของเฮลิคอล No. 5 อาจจะทนต่อการสึกหรอไม่ได้จนอายุการใช้งานลดเหลือครึ่งเดียวก็ได้นะคะ?"
90001130-96 = "คะ... คะ?! ฉะ... ฉัน... ไม่อยากให้เป็นแบบนั้นค่ะ...!!!"
90001130-97 = "เพราะงั้นฉันถึงจะเข้ามาช่วยยังไงล่ะคะ วางใจฉันเถอะค่ะ"
90001130-98 = "ก่อนอื่นเราจะปรับประสิทธิภาพการทำงานในทุกขั้นตอน เพื่อให้ทำงานเดิมที่มีให้เสร็จสิ้นภายในเวลา#nไม่ถึงครึ่งหนึ่ง..."
90001130-102 = "ส่วนเวลาที่เหลือก็... อ๊ะ จริงสินะคะ! เรามาทำให้เฮลิคอล No. 5 ก้มลงไปจับเท้าของตัวเองได้ แล้วให้หมุนอยู่ที่เดิมไปตลอดกันเถอะค่ะ! แล้วก็..."
90001130-104 = "บะ... แบบนั้นมันเกินไปนะคะ! ฮือออ..."
90001130-117 = "อย่าใช้ความรุนแรงสิ... อึกก..."
90001130-119 = "แต่ว่า... การที่มีอัตราการรวบรวมที่ 99.98% แล้ว ก็หมายความว่า..."
90001130-120 = "อื้อ... ใช่แล้วละ ตอนนี้ถึงเวลาจริงๆ แล้ว"
90001130-124 = "ใช่ค่ะ พี่สาวของพวกเรา..."
90001130-128 = "เราพร้อมที่จะให้ <มัลคูธ> มาจุติ ณ ที่แห่งนี้แล้วค่ะ"
90001130-130 = "จะ... จะจะจะจะ... ทำได้ใช่มั้ยคะ? ฉันไม่ได้ทำทุกอย่างพังใช่มั้ยคะ?"
90001130-131 = "ถะ... ถ้าฉันทำผิดพลาดอะไรกลางคันจนพี่สาวไม่ฟื้นขึ้นมาละก็...!"
90001130-132 = "อย่าพูดอะไรแปลกๆ เลยน่า ไอน์ พวกเราเชื่อเธอนะ ที่ผ่านมาเธอก็ทำได้ดีมาตลอดไม่ใช่เหรอ?"
90001130-133 = "ถ้าเป็นเรื่องเครื่องจักร เธอรู้ดีมากกว่าใครในหมู่พวกเราเลยนะ"
90001130-134 = "ตะ... ตะตะตะตะ... แต่ว่า...!"
90001130-139 = "ฉันเข้าใจความกังวลของไอน์นะคะ เพราะถ้าเราจะไปถึงพื้นที่ใดพื้นที่หนึ่ง... เราก็ต้องคำนึงถึง#nผลกระทบของกลศาสตร์ควอนตัมด้วย"
90001130-140 = "เราต้องทำให้สำเร็จให้ได้ เพราะเมื่อมาถึงจุดหนึ่ง คำว่า \"ทำดีที่สุดแล้ว\" จะใช้เป็นข้อแก้ตัวไม่ได้น่ะค่ะ"
90001130-141 = "ฮือ..."
90001130-142 = "แต่ตอนนี้เราไม่มีทางเลือกอื่นแล้วค่ะ เราต้องเจอกับเวลาแบบนี้บ้างละค่ะ เวลาที่เราทำได้แค่ยอมรับ#nผลลัพธ์ที่จะเกิดขึ้นน่ะ"
90001130-143 = "ในเรื่องการมาจุติของพี่สาว ที่จริงฉันเองไม่ถูกใจกับการยืมพลังต้องห้ามนั้นมาเหมือนกัน..."
90001130-144 = "แต่ก็นะ ถ้าผลลัพธ์ออกมาดี ทุกอย่างก็คงจะดีละค่ะ เหนือสิ่งอื่นใด เรายังปกป้องดินแดนนี้ไว้โดย#nไม่ให้ใครล่วงรู้ได้นี่คะ!"
90001130-145 = "ใช่ <บาเรียทับซ้อนเชิงความน่าจะเป็นจากการวิเคราะห์พหุมิติ>... ชื่อยาวแบบนี้ใครจะไปเรียกนะ เราเรียกแค่ว่า <บาเรียพหุมิติ> แล้วกัน"
90001130-146 = "ทำให้ทุกความเป็นไปได้ในมิติอนันต์อยู่ร่วมกัน แล้วสร้างมันขึ้นมาเป็นบาเรียป้องกัน..."
90001130-149 = "วันนั้นเราได้เห็นตัวอย่างที่ดีมากเลยละ เราก็เลยใช้วิศวกรรมย้อนกลับแล้วทำการสร้างขึ้นใหม่ได้#nสำเร็จจนถึงตรงนี้ยังไงล่ะ"
90001130-150 = "ฮุฮุ ฮุฮุ อุฮุฮุฮุฮุ คงต้องยอมรับแล้วละค่ะว่าในส่วนนั้นน่ะ ฉันสร้างผลงานไว้ได้มากที่สุดเลย"
90001130-151 = "อืม... ฉันไม่อยากยอมรับแม้แต่นิดเดียว แต่มันก็จริงอย่างที่เธอว่าน่ะนะ"
90001130-152 = "ขะ... ขอโทษด้วยนะคะ ฉันยังไม่ค่อยเข้าใจทฤษฎีในส่วนนั้นเลยค่ะ... ฮือ..."
90001130-155 = "ไม่เป็นไรหรอก ไม่เป็นไร ไอน์! ก็เราทั้งสามคนมีเรื่องที่ถนัดแตกต่างกันไปนี่"
90001130-156 = "ซอฟ ใจดีแต่กับไอน์คนเดียวหรือเปล่าคะ..."
90001130-157 = "ก็ลองคิดถึงพฤติกรรมของตัวเองดูสิว่าฉันควรใจดีด้วยหรือเปล่า"
90001130-158 = "เอาเถอะค่ะ สรุปว่าที่แห่งนี้ได้รับการปกป้องอยู่จากบาเรียพหุมิติ จึงแทบจะเป็นไปไม่ได้เลยที่คนนอก#nจะมองเห็นเราได้"
90001130-163 = "นี่ก็ไม่ต่างกับการที่เราได้สิ่งที่เหมือนกับพลังของเหล่าทวยเทพไร้นามมาไว้ในมือแล้วละค่ะ!"
90001130-165 = "จะ... จะคิดแบบนั้น... ได้จริงๆ เหรอคะ? ต่อไปถ้ามีใครมาโกรธที่เราใช้พลังของคนอื่นตามอำเภอใจ แล้วเราจะทำยังไงล่ะคะ..."
90001130-166 = "แต่ถึงยังไงก็เถอะ ในสายตาคนอื่นแล้ว คนที่ใช้พลังนั้นได้ดีที่สุดในตอนนี้คือพวกเราไม่ใช่เหรอ?"
90001130-171 = "งั้นก็ไม่จำเป็นต้องไปคิดแบบนั้นหรอกค่ะ ก็พวกเราสมบูรณ์แบบแล้วนี่คะ"
90001130-172 = "ก็แค่เลือกส่วนที่ใช้ได้มาใช้ประโยชน์ แล้วก็ทิ้งส่วนที่เหลือไป ไม่มีใครมาตำหนิอะไรพวกเราหรอกค่ะ!"
90001130-173 = "นั่นสินะคะ ถึงจะได้ยินข่าวลือมาว่ามีพวกนักบวชของเทพองค์นั้นอยู่ที่ไหนสักแห่งก็เถอะ..."
90001130-174 = "ผู้พ่ายแพ้ต่อกาลเวลาทั้งหลาย จงขอบคุณที่พวกเราใช้พลังนั้นเถอะค่ะ!"
90001130-176 = "โอ้ ต้องอย่างนี้สิ ออร์ ท่าทีแบบนี้ละดีเลย"
90001130-177 = "จะ... จะทำอย่างนี้กันได้จริงๆ เหรอคะ...?"
90001130-193 = "ในที่สุดก็... ได้ดูตอนจบแล้ว..."
90001130-202 = "ปะ... เป็นไงบ้าง เป็นยังไงน่ะ?!"
90001130-207 = "ค่ะ! อาริสึรู้ดีค่ะ! นี่คือ..."
90001130-208 = "นี่คือ...?"
90001130-213 = "เกมกากค่ะ!"
90001130-215 = "เฮือก...!"
90001130-216 = "หา?!"
90001130-217 = "เดี๋ยวก่อนนะพี่โมโมอิ... ทำไมต้องหนาวตายทันทีที่เหยียบเท้าลงบนน้ำแข็งเลยล่ะ?"
90001130-218 = "ถามแปลกๆ... ก็เซ็ตติ้งของเกมนี้อยู่ในเขตขั้วโลกนี่นา ถ้าเราได้ไปเขตขั้วโลกจริงๆ ก็คงจะหนาวตาย#nแบบนั้นอยู่แล้วไม่ใช่เหรอ?"
90001130-219 = "แต่มันก็เกินไปนะ! ควรจะให้ได้เล่นเกมบ้างสิ!"
90001130-220 = "ก็ถ้าไม่ข้ามโหมดฝึกสอนในตอนแรก ก็จะได้ไอเทมป้องกันความหนาวอยู่แล้วนี่?!"
90001130-221 = "โหมดฝึกสอนของพี่มันนานตั้ง 30 นาทีเลยนะ แล้วไอเทมป้องกันความหนาวก็เอาไปซ่อนอยู่ในมุมที่#nหายากอีก!"
90001130-222 = "อีกอย่างนะ ต่อให้จะเป็นเขตขั้วโลก แต่มันก็ไม่ได้หนาวจนถึงกับซี้แหงแก๋ทันทีที่ย่างเท้าเข้าไปหรอก!"
90001130-223 = "พูดเหมือนเคยไปมาแล้วอย่างนั้นละ! รู้ได้ยังไงว่ามันไม่หนาวถึงขนาดนั้น!"
90001130-227 = "เฮ้อ... เอาเถอะ เรื่องการพิสูจน์ความจริงน่ะเอาไว้ก่อนแล้วกัน ว่าแต่ภาพอาร์ตชุดกันหนาวที่ฉันเคย#nวาดไว้ล่ะหายไปไหนหมดแล้ว?"
90001130-231 = "อะ... อันนั้นเดี๋ยวเก็บไว้เป็น DLC ของเกมทีหลัง..."
90001130-236 = "ถ้าอย่างนั้นจะขอให้วาดไว้ล่วงหน้าตั้งแต่แรกทำไมเล่า!"
90001130-244 = "ทะ... ทุกคน อย่าทะเลาะกันเลยนะ..."
90001130-245 = "แต่อาริสึสนุกนะคะ! ทั้งการได้สร้างเกมกับทุกคน ทั้งได้เล่นเกมที่สร้างขึ้นมาแล้วแก้ไขไปทีละอย่างๆ ด้วยค่ะ!"
90001130-251 = "ว้าว~ อาริสึ~"
90001130-252 = "เฮ้อ... ที่พี่โมโมอิเป็นแบบนี้เพราะอาริสึจังเอาแต่ให้ท้ายแบบนี้หรือเปล่านะ"
90001130-254 = "แต่ถึงยังไง... ฉันว่าเกมของเราก็มีปัญหาอยู่นะ ตรงไหนกันนะ... ที่มันยังบกพร่องไป?"
90001130-256 = "อืม...! สำหรับนักเขียนเนื้อเรื่อง แพลนเนอร์ และโปรดิวเซอร์แล้ว นี่คือปัญหาที่ต้องพิจารณาอย่าง#nจริงจังเลยนะเนี่ย!"
90001130-257 = "โปรดิวเซอร์อะไรกัน อวยยศให้ตัวเองเฉยเลย..."
90001130-261 = "ใช่แล้วละ! ฉันว่าสิ่งที่ยังบกพร่องในเกม <อากติก แอดเวนเจอร์> ของเราในครั้งนี้คือข้อมูลอ้างอิง#nที่มาจากความเป็นจริง!"
90001130-262 = "ถ้าจะพูดให้เจาะจงมากกว่านี้ ก็ต้องบอกว่าเราต้องการข้อมูลเกี่ยวกับเขตขั้วโลกที่สมจริงมากกว่านี้!"
90001130-263 = "พูดอะไรน่ะ พี่โมโมอิ! ทำไมถึงไปเรื่องนั้นได้ล่ะ?! จะชวนให้ไปเที่ยวในทุ่งกว้างที่ปกคลุมไปด้วยหิมะ#nหรือไง!?!?"
90001130-268 = "ไปเที่ยว...? ไปโลกภายนอกที่อยู่ข้างนอกไปอีกเหรอ...? บะ... แบบนั้นมัน...!"
90001130-274 = "ยะ... ยูสึ? ไหวหรือเปล่าคะ ยูสึ?!"
90001130-276 = "แต่ก็ลองคิดดูสิ... ทุ่งหิมะหนาทึบ ธารน้ำแข็งสีฟ้าสดใส หมีขาวกับเพนกวินที่เล่นสนุกกัน..."
90001130-277 = "มันคือทิวทัศน์อันงดงามที่จะช่วยเติมพลังและแรงบันดาลใจให้พวกเราเลยนะ?!"
90001130-278 = "พี่ก็แค่อยากไปเห็นด้วยตาตัวเองต่างหาก... อีกอย่างนะ หมีขาวกับเพนกวินไม่ได้อยู่ในขั้วโลกเดียวกัน#nสักหน่อย? และถึงจะอยู่ด้วยกัน เพนกวินก็คงโดนหมีขาวจับกินมากกว่าเล่นกันนะ"
90001130-279 = "ยะ... อย่าเอาความดิบเถื่อนของสัตว์มาพูดให้น่ากลัวสิ..."
90001130-288 = "อาริสึ? มีคนโทรเข้ามาเหรอ?"
90001130-293 = "เบอร์นี้มัน...?"
90001130-298 = "คุณครูนี่นา...?"
90001130-299 = "อะไรกันน่ะ? คุณครูเหรอ?"
90001130-301 = "พอรู้ว่าเป็นคุณครู ก็น่าดีใจนะ ฮุฮุ..."
90001130-305 = "สวัสดีค่ะ คุณครู!"
90001130-306 = "[s] \"สวัสดี อาริสึ!\""
90001130-307 = "ค่ะ! อาริสึของคุณครูเองค่ะ! รู้สึกเหมือนนานมากแล้วนะคะที่ไม่ได้คุยกับคุณครูแบบนี้น่ะ!"
90001130-308 = "เอ๋? หรือจะไม่ใช่แค่ความรู้สึกคะ? จะว่าไปแล้ว หมู่นี้พวกเราแทบไม่ได้เจอคุณครูเลยค่ะ..."
90001130-309 = "ทั้งอาริสึ โมโมอิ มิโดริ แล้วก็ยูสึคิดถึงคุณครูนะคะ คิดถึงมากกว่าที่คุณครูคิดถึงพวกเราอีก! ติดต่อมาบ่อยๆ สิคะ!"
90001130-310 = "[s] \"ขอโทษทีๆ\""
90001130-312 = "[ns] \"จะว่าไป ตอนนี้ทุกคนอยู่กันครบเลยเหรอ?\""
90001130-313 = "ใช่ค่ะ! ตอนนี้พวกเรากำลังทดสอบเกมที่สร้างขึ้นใหม่ด้วยกันอยู่ในห้องชมรมค่ะ! อยากเล่นเกมนี้กับ#nคุณครูจังเลยนะคะ!"
90001130-317 = "สงสัยว่าเป็นเกมที่ทำได้ดีจนเอ่ยปากชวนกันเลยหรือเปล่าน่ะเหรอคะ? มันก็..."
90001130-327 = "อาริสึไม่รู้หรอกค่ะ แต่ระหว่างที่สร้างเกม อาริสึสนุกมากเลยค่ะ!"
90001130-328 = "จะว่าไปแล้ว คุณครูโทรมาด้วยธุระอะไรหรือเปล่าคะ? เหมือนว่าน้ำเสียงจะแตกต่างออกไปจากปกติ#nนิดหน่อยด้วย"
90001130-329 = "[s] \"อืม... ใช่แล้วละ ตอนนี้ทุกคนอยู่กันครบเลยใช่มั้ย?\""
90001130-330 = "ก็ครบนะคะ?"
90001130-335 = "(คุณครูกังวลมาตลอดว่าจะเล่าเรื่องนี้ให้อาริสึและเด็กๆ ชมรมพัฒนาเกมฟังอย่างไรดี...)"
90001130-336 = "(แต่ก็คิดว่าการบอกไปตามตรงจะดีที่สุด)"
90001130-338 = "[ns] \"ทุกคน ตั้งใจฟังสิ่งที่ครูจะบอกให้ดีนะ\""
90001130-349 = "สำ?"
90001130-350 = "รวจ?"
90001130-351 = "ธาร?"
90001130-352 = "น้ำแข็ง!!!"
90001130-353 = "ว้าว ว้าว! อย่างนี้นี่เองสินะคะ คุณครู! พวกเราจะได้ไปเที่ยวธารน้ำแข็งด้วยกันสินะคะ! งั้นก็ดีเลยนะคะ โมโมอิ!"
90001130-355 = "นั่นสินะ! ได้จังหวะพอดีเลย! สมกับที่เป็นคุณครูเลยละ!"
90001130-356 = "[s1] \"เอ่อ... นี่ ทุกคน? ครูย้ำหลายครั้งแล้วนะว่านี่มันงานอันตราย\"\n[s2] \"แต่ว่านี่มันงานอันตรายจริงๆ นะ...\""
90001130-359 = "ชะ... ใช่ พี่โมโมอิ! แล้วก็อาริสึจังด้วย! ถ้าลองสรุปที่คุณครูว่ามาเมื่อกี้ละก็..."
90001130-360 = "ตอนนี้ A.I. ปริศนาที่ไม่รู้วัตถุประสงค์ที่แน่ชัดกำลังสร้างสัตว์ประหลาดจักรกลขนาดใหญ่และวางแผน#nทำอะไรอยู่ก็ไม่รู้?!"
90001130-361 = "แล้วคุณครูก็ยังบอกว่าอาจจะต้องการความช่วยเหลือจากอาริสึจังเกี่ยวกับเรื่องที่ว่าด้วย?!?!"
90001130-362 = "อึก... ฟังดูเหมือนบอสในเกมเลย..."
90001130-363 = "[s3] \"ชะ... ใช่แล้วละ! อย่างที่มิโดริกับยูสึว่าเลย!\"\n[s4] \"เพราะงั้นลองคิดเกี่ยวกับเรื่องนี้ดีๆ...\""
90001130-366 = "แต่ว่า คุณครูคะ อาริสึคือสหายของคุณครูนะคะ ในทำนองเดียวกัน คุณครูก็เป็นสหายของอาริสึด้วย"
90001130-367 = "[s] \"ถ้าคิดแบบนั้นครูก็ขอบใจอยู่หรอกนะ...\""
90001130-369 = "[ns] \"แต่ครูจะย้ำอีกครั้งนะ บางทีมันอาจจะ...\""
90001130-370 = "หืม...? อย่างนั้นสินะคะ เข้าใจแล้วค่ะ นี่อาจเป็นเรื่องที่ไม่ปกติจริงๆ"
90001130-371 = "ที่คุณครูจะบอกก็คือ บางทีงานนี้มันอาจจะอันตรายถึงขนาดที่คุณครูเองก็รับรองความปลอดภัยของ#nอาริสึไม่ได้สินะคะ"
90001130-372 = "อาริสึจัง..."
90001130-377 = "..."
90001130-378 = "เข้าใจแล้วค่ะ คุณครู แล้วถ้าจะไปที่ธารน้ำแข็งนั่น อาริสึต้องทำยังไงบ้างเหรอคะ?"
90001130-379 = "[s] \"หืม!?\""
90001130-384 = "อะ... อาริสึ?!"
90001130-385 = "อาริสึจัง!?!?"
90001130-390 = "ตกใจอะไรกันขนาดนั้นคะ? ในยามที่สหายเจอปัญหา เราจะเมินเฉยได้ยังไงกัน นี่มันพื้นฐานของการ#nเล่นแบบปาร์ตี้นะคะ"
90001130-391 = "อีกอย่างนะคะ อาริสึกลับรู้สึกขอบคุณด้วยซ้ำที่คุณครูนึกถึงอาริสึในเวลาแบบนี้"
90001130-392 = "เพราะนั่นหมายความว่าคุณครูเชื่อใจอาริสึยังไงล่ะคะ แล้วความเชื่อใจก็เป็นเครื่องพิสูจน์ที่สำคัญที่สุด#nของสหายด้วยค่ะ"
90001130-393 = "[s] \"จะไม่เป็นไรจริงๆ เหรอ...?\""
90001130-394 = "คุณครูคะ ถึงอาริสึจะเป็นผู้กล้าฝึกหัด แต่ก็ได้ชื่อว่าเป็นผู้กล้านะคะ อย่างน้อยอาริสึก็กำลังพยายาม#nเพื่อให้เป็นอย่างนั้นค่ะ"
90001130-395 = "เพราะงั้นอาริสึก็เลย... อยากให้โลกใบนี้เป็นที่ที่ดีกว่าเดิม แม้จะดีขึ้นเพียงเล็กน้อยก็ตาม นั่นคือความตั้งใจจริงของอาริสึค่ะ"
90001130-396 = "และเพราะคิดอย่างนั้น... ถ้าคนที่เคยช่วยเหลืออาริสึมาขอความช่วยเหลือจากอาริสึบ้าง อาริสึก็ไม่อยากเมินเฉยหรือหลบหนีค่ะ"
90001130-397 = "นั่นก็เพราะถ้าอาริสึทำอย่างนั้น โลกใบนี้ก็จะน่าอยู่ขึ้นได้อีกนิดยังไงล่ะคะ"
90001130-398 = "[s] \"แต่ถ้าเกิดเหตุการณ์อันตรายขึ้นมาจริงๆ ล่ะจะทำยังไง?\""
90001130-399 = "นั่นสินะคะ ถ้าเกิดสถานการณ์เลวร้ายขึ้นมาจริงๆ..."
90001130-405 = "ตอนนั้นอาริสึจะกลับไปเป็นนักเรียนและซ่อนตัวอยู่ในที่ที่ปลอดภัยค่ะ!"
90001130-407 = "โอ้ ต้องอย่างนั้นละ! ได้ยินแบบนั้นก็โล่งอกไปทีนะ! ก็ตอนเล่นเกมกับของจริงมันไม่เหมือนกันนี่นา!"
90001130-408 = "อืม แล้วก็ไม่น่าจะแฮ็กหรือใช้สูตรโกงได้ด้วย"
90001130-409 = "ถะ... ถ้าประมาณนั้นละก็ ฉันน่าจะพอไหวอยู่... ว่ายังไงล่ะคะ คุณครู...?"
90001130-410 = "[s] \"สัญญาได้ใช่ไหมว่าถ้าเกิดอันตรายแล้วจะฟังคำของครู?\""
90001130-412 = "แน่นอนสิคะ คุณครู! ผู้กล้าต้องรักษาสัญญาอยู่แล้วค่ะ!"
90001130-413 = "อืม... แต่ถ้าคุณครูขอร้องให้ทำอะไรแปลกๆ ขึ้นมา จะทำยังไงงั้นเหรอคะ...?"
90001130-418 = "มะ... ไม่ต้องกังวลหรอกน่า อาริสึ! ปกติคุณครูก็ชอบพูดอะไรแปลกๆ อยู่แล้วละ!"
90001130-419 = "มันก็จริงอยู่หรอกนะ"
90001130-420 = "ตะ... แต่ถึงยังไง... ตอนที่อันตรายคุณครูก็ไม่น่าจะพูดอะไรแปลกๆ หรอกนะ..."
90001130-422 = "อย่างนั้นสินะคะ... เข้าใจแล้วค่ะ! งั้นถ้าจะไปธารน้ำแข็ง พวกเราต้องทำยังไงบ้างคะ?"
90001130-423 = "[s5] \"ขอบใจนะทุกคน แล้วครูจะบอกให้ล่วงหน้านะ\"\n[s6] \"ครูจะส่งอีเมลไปบอกวิธีมาที่นี่ให้นะ\""
90001130-426 = "[ns] \"ครูมีเรื่องที่อยากบอกเป็นอย่างสุดท้ายด้วย\""
90001130-432 = "อะไรเหรอคะ คุณครู?"
90001130-433 = "[s] \"ที่ธารน้ำแข็งอากาศหนาวมาก ใส่เสื้อผ้าอุ่นๆ กันมานะ...\""
90001130-438 = "ตอนต่อไป;รวมตัวกัน"

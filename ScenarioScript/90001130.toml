[translation]
90001130-1 = "第13話;出發"
90001130-10 = "哦，看來終於到了啊。"
90001130-12 = "沒，沒錯！來自「網格點」的……最後資源已經抵達了！"
90001130-13 = "不不不。嚴格來說這還不算是最後。#n總收集率是99.98%……大約還需要再運輸兩次才行。"
90001130-17 = "雖，雖然是這樣沒錯……嗚嗚……"
90001130-19 = "沒，沒關係的，Ain！#n考慮到誤差範圍的話，就算現在直接進入下一個工程也沒問題！"
90001130-20 = "Aur，你為什麼老是要多嘴破壞氣氛啊？"
90001130-24 = "可是……Soph之前不是也同意了嗎？"
90001130-25 = "……什麼同意？我幾乎不記得自己有附和過你的歪理啊。"
90001130-31 = "就是Ain快哭的時候很可愛這件事！"
90001130-33 = "咦，咦咦！？！？"
90001130-35 = "嗯，這倒是沒錯啦……"
90001130-37 = "怎麼連Soph也這樣！？！？"
90001130-42 = "你，你先聽我說，Ain！#n我剛才不是那個意思──"
90001130-43 = "這都是Aur的錯！"
90001130-44 = "現在是要把錯都推給我嗎！？"
90001130-54 = "那個……大家……"
90001130-62 = "現，現在資源都已經運送完成了……！#n接下來該輪，輪到我們的工人醬們登場了！"
90001130-66 = "沒錯，Ain。#n大家都很努力呢。"
90001130-67 = "可是……我，我還是有點擔心……#n螺旋5號醬的傷還，還沒完全好……"
90001130-72 = "螺旋5號……？啊，是說之前掉漆了的那個嗎？#n你已經為它取名了啊？"
90001130-73 = "沒，沒錯！要是漆剝落了的話，會更容易生鏽的！"
90001130-74 = "我趁著處理傷口的時候，幫它換上了更大的機械手臂來進行補強。#n因為尺寸變大的關係，輸出功率也需要增加……！"
90001130-75 = "因此驅動器的尺寸也必須跟著加大，#n所以我就乾脆換了更大的機身和更堅固的材料……！！！"
90001130-76 = "冷靜，Ain。你先冷靜一點。#n我已經非常理解你對那個什麼……螺旋3號的重視了。"
90001130-77 = "是，是5號啦！還有螺旋5號才不，不是什麼設備！#n它是，它是……"
90001130-78 = "是，是特別的！"
90001130-79 = "有什麼特別的嗎？#n不就只是幾萬個工人之中的一個而已。"
90001130-84 = "啊啊，多麼冷酷無情啊！#n只把一切視為對象和目的，冷血的管理者Soph！"
90001130-85 = "不明白那些冷漠無情的話語，會對Ain脆弱的心靈造成多大的傷害──"
90001130-86 = "……我可不想聽你說這些啊？"
90001130-87 = "話說回來，Ain。#n那些東西足夠治療螺旋5號的傷口嗎？"
90001130-93 = "所有的物理升級，應該都需要相應的軟體最佳化和輔助設備吧。"
90001130-94 = "如果安裝那麼多高功率的設備，#n螺旋5號的關節和零件搞不好會承受不了磨損，導致壽命減半哦！"
90001130-96 = "咦，咦咦！？#n那，那樣……是不行的……！！！"
90001130-97 = "所以就讓我來幫你吧。放心交給我。"
90001130-98 = "首先要對所有流程進行最佳化，讓現有工作的完成時間能減少到一半以下……"
90001130-102 = "省下來的時間就……啊，我想到了！#n讓螺旋5號抓住自己的腳底，無止盡地原地轉圈吧！接著再──"
90001130-104 = "那，那樣太過分了！#n嗚嗚嗚嗚……"
90001130-117 = "反，反對暴力……呃啊……"
90001130-119 = "那個……收集率99.98%就代表……"
90001130-120 = "……嗯，是啊。#n時候終於到了。"
90001130-124 = "沒錯，是時候準備讓我們的姐姐大人……"
90001130-128 = "「馬爾庫特」在這片土地上降臨了。"
90001130-130 = "能，能能能做到嗎？#n我會不會搞砸一切？"
90001130-131 = "要，要是我在過程中做錯了什麼，導致姐姐大人無法醒過來的話……！"
90001130-132 = "別說那種奇怪的話，Ain。我們相信你。#n目前為止你不是都做得很好嗎？"
90001130-133 = "關於機械設備的事，我們之間沒人比得上你。"
90001130-134 = "可，可可可可，可是……！"
90001130-139 = "我能理解Ain的擔憂。#n畢竟到了某些領域之後……就必須考量到量子力學的效應。"
90001130-140 = "而且從某個時刻開始，「已經盡力」就不再能成為失敗的理由了。#n呵呵……"
90001130-141 = "嗚嗚嗚……"
90001130-142 = "不過我們現在別無選擇。#n遲早會碰上只能無奈接受結果，並感到無能為力的時刻。"
90001130-143 = "雖然我個人也不太喜歡借助那股禁忌之力，來實現姐姐大人的降臨……"
90001130-144 = "不過只要結果是好的不就行了嗎？#n最重要的是，我們能保護這片土地不被任何人發現！"
90001130-145 = "沒錯。「多次元詮釋共存相位防護罩」……#n這名字太長太麻煩了，就簡稱為多次元防護罩吧。"
90001130-146 = "將無限維度中的所有可能性──混合機率的空間本身用於防禦……"
90001130-149 = "那一天，我們看見了非常好的樣本。#n多虧如此，我們才能成功透過逆向工程重建到這一步。"
90001130-150 = "呵，呵呵，唔呵呵呵呵。#n在這個方面，是不是該承認在下的功勞最大呢？"
90001130-151 = "……嗯。雖然我真的非常不想承認，但這是事實沒錯。"
90001130-152 = "對，對不起……#n這部分的理論，我還是沒有完全理解……嗚嗚……"
90001130-155 = "沒關係沒關係，Ain！#n我們三個本來就各有所長，不是嗎？"
90001130-156 = "Soph，你對Ain會不會太溫柔了啊……"
90001130-157 = "想想自己平時的行為好嗎？"
90001130-158 = "總之，現在這裡受到多次元防護罩的保護，想從外部發現我們幾乎是不可能的。"
90001130-163 = "無名之神的力量，就跟在我們手中沒兩樣了！"
90001130-165 = "真，真的可以那樣想嗎……？#n萬一之後有人因為我們擅自使用別人的力量而生氣怎麼辦……"
90001130-166 = "就算在別人眼裡，現在最能善用這股力量的不也是我們嗎？"
90001130-171 = "沒必要那麼想吧？#n因為我們已經完美了。"
90001130-172 = "只要挑選能用的部分來用，剩下的直接丟棄就好。#n誰在乎過去那些被遺忘的遺產啊！"
90001130-173 = "雖然我也聽說過，在某個地方有那位神明的祭司之類的存在……"
90001130-174 = "但他們應該要感謝我們使用它才對吧！那些時間的失敗者們！"
90001130-176 = "哦，不錯嘛，Aur。#n這股氣勢就對了。"
90001130-177 = "這，這樣真的可以嗎……"
90001130-193 = "總算，看到，結局了……"
90001130-202 = "怎，怎麼樣！？"
90001130-207 = "是！愛麗絲知道！這……"
90001130-208 = "這……？"
90001130-213 = "是款爛遊戲呢！"
90001130-215 = "噫噫……！"
90001130-216 = "呃啊！？"
90001130-217 = "你先回答我，姐姐……為什麼一踏到冰上面就會被凍死呢？"
90001130-218 = "那是因為……這次遊戲的背景是極地嘛？#n如果真的到了極地的話，這種事不是理所當然的嗎？"
90001130-219 = "那也太過分了吧！至少要讓人可以玩遊戲啊！"
90001130-220 = "可是明明只要不跳過教學，就能拿到防寒裝備了呀！？"
90001130-221 = "那個教學長達30分鐘耶？#n而且防寒裝備還藏在角落！"
90001130-222 = "再說了，就算是極地也不至於踏出第一步就直接被凍死吧！？"
90001130-223 = "綠你又沒去過！怎麼知道不會那樣咧！"
90001130-227 = "唉……好吧，考證方面的問題暫時先不討論。#n我畫的所有防寒服的美術資源都用到哪去了？"
90001130-231 = "那，那是之後DLC的內容……"
90001130-236 = "那就別叫我一開始就畫啊！"
90001130-244 = "大，大家不要吵架……"
90001130-245 = "但是愛麗絲很開心！#n和大家一起製作遊戲，在遊玩的過程不斷修改真的很開心！"
90001130-251 = "嗚啊啊～愛麗絲～"
90001130-252 = "唉……都是因為愛麗絲醬太縱容姐姐了，才會每次都變成這樣。"
90001130-254 = "不過……也不能說沒有問題。#n總覺得好像……還缺少了什麼？"
90001130-256 = "唔嗯……！作為劇本作家兼企劃兼總製作人，這個問題確實需要認真思考！"
90001130-257 = "總製作人是姐姐自封的吧……"
90001130-261 = "我知道了！這次《極地冒險》遊戲中缺少的，就是現實的參考資料！"
90001130-262 = "如果要說得更具體一點，就是我們需要比現在更加真實的極地資訊！"
90001130-263 = "你在說什麼啊，姐姐！為什麼突然說這個！？#n難道你要我們現在前往雪地旅行嗎！？！？"
90001130-268 = "旅行……？要到外面世界的更外面去……？#n那個，那個……！"
90001130-274 = "柚，柚子？你沒事吧，柚子！？"
90001130-276 = "你們好好想像一下……#n白雪覆蓋的原野，蔚藍透明的冰川，和諧相處的北極熊跟企鵝……"
90001130-277 = "不覺得是能為我們帶來滿滿靈感和活力的絕美景色嗎！？"
90001130-278 = "那只是姐姐想看的東西吧……而且北極熊跟企鵝生活在不同地區好嗎？#n就算真的能相遇好了，企鵝也只會被吃掉而已。"
90001130-279 = "別，別提到那麼殘酷的現實嘛……"
90001130-288 = "電話？是找愛麗絲的嗎？"
90001130-293 = "這個號碼是……？"
90001130-298 = "老師……？"
90001130-299 = "咦，什麼？是老師嗎？"
90001130-301 = "聽到是老師，總覺得有點高興呢。呵呵……"
90001130-305 = "喂～老師！"
90001130-306 = "[s]「你好呀，愛麗絲！」"
90001130-307 = "沒錯！是老師的愛麗絲！#n感覺很久沒見到老師了呢！"
90001130-308 = "咦？好像不只是感覺而已呢……？#n現在想想，最近確實很少見到老師……"
90001130-309 = "愛麗絲和桃井，還有綠跟柚子都很想多見見老師！#n請多多聯絡哦！"
90001130-310 = "[s]「抱歉抱歉。」"
90001130-312 = "[ns]「話說大家都在那裡嗎？」"
90001130-313 = "是的！大家正在部室測試新做的遊戲！之後也想和老師一起玩！"
90001130-317 = "遊戲做得好不好？#n這個嘛……"
90001130-327 = "愛麗絲也不太清楚，但製作的過程真的很開心！"
90001130-328 = "話說回來，老師有什麼事嗎？#n感覺你的聲音和平常不太一樣。"
90001130-329 = "[s]「嗯……沒錯。大家都在那裡對吧？」"
90001130-330 = "怎麼了嗎？"
90001130-335 = "（雖然一直很苦惱，該和愛麗絲跟遊戲開發部的孩子們說到什麼程度……）"
90001130-336 = "（不過果然還是坦白地說出來比較好吧）"
90001130-338 = "[ns]「大家，請仔細聽我說。」"
90001130-349 = "冰？"
90001130-350 = "海！"
90001130-351 = "探？"
90001130-352 = "險！！！"
90001130-353 = "哇哇！這樣啊，老師！#n大家要一起來趟冰海旅行是嗎！太好了，桃井！"
90001130-355 = "就是說啊！時機也恰到好處！真不愧是老師！"
90001130-356 = "[s1]「那個……孩子們？我應該已經強調很多次了……」\n[s2]「這件事可能真的會有危險的哦……？」"
90001130-359 = "對，對呀，姐姐！還有愛麗絲醬也是！#n老師說的意思大致上就是……"
90001130-360 = "有某個身份和目的都不明的AI造出了巨大的機械怪獸，企圖達成某些事情……"
90001130-361 = "而且很有可能會需要愛麗絲醬的幫助對吧！？！？"
90001130-362 = "嗚嗚……這種東西，留在遊戲裡當頭目就夠了吧……"
90001130-363 = "[s3]「沒，沒錯！就像綠和柚子說的一樣！」\n[s4]「所以我們應該更慎重地看待這件事……」"
90001130-366 = "但是老師──愛麗絲是老師的夥伴。#n同樣的，老師也是愛麗絲的夥伴。"
90001130-367 = "[s]「雖然你能這麼想，讓我覺得很高興……」"
90001130-369 = "[ns]「我再說明一次。這可能會很──」"
90001130-370 = "啊……？原來如此，愛麗絲明白了。#n看來事情確實非同小可。"
90001130-371 = "甚至連老師也無法保證愛麗絲的安全對吧。"
90001130-372 = "愛麗絲醬……"
90001130-377 = "……"
90001130-378 = "老師，要去冰海的話應該怎麼做呢？"
90001130-379 = "[s]「哦！？」"
90001130-384 = "愛，愛麗絲！？"
90001130-385 = "愛麗絲醬！？！？"
90001130-390 = "大家為什麼那麼驚訝呢？#n在夥伴遇到困難的時候，絕對不能袖手旁觀──這是團隊遊戲的基本原則。"
90001130-391 = "愛麗絲反而很感謝老師，能在這種時候想到愛麗絲。"
90001130-392 = "因為這代表老師相信著愛麗絲。而信賴正是夥伴之間最有效的證明。"
90001130-393 = "[s]「……真的沒問題嗎？」"
90001130-394 = "老師，愛麗絲雖然還在見習階段，但終究是個勇者！#n愛麗絲正在為此而努力。"
90001130-395 = "所以愛麗絲希望世界能變得更好……哪怕只有一點點也沒關係。#n這是愛麗絲的真心話。"
90001130-396 = "正因如此……當幫助過愛麗絲的人向愛麗絲求助時，愛麗絲不想選擇迴避或逃跑。"
90001130-397 = "因為只有這樣，這個世界才能往更美好的方向前進。"
90001130-398 = "[s]「但如果真的遇到危險情況的話，你打算怎麼辦？」"
90001130-399 = "嗯，如果真的遇到危險的話……"
90001130-405 = "到時候愛麗絲會暫時切換回學生的身分，找個安全的地方躲起來！"
90001130-407 = "哦哦，這樣就對了！#n畢竟在遊戲中，也沒有什麼狡猾不狡猾的事嘛！"
90001130-408 = "嗯，只要沒有用外掛或作弊指令就行了。"
90001130-409 = "我，我也覺得這樣的話，應該沒問題……#n老師覺得呢……？"
90001130-410 = "[s]「能答應我遇到危險的時候，就算用狡猾的手段也要保護好自己嗎？」"
90001130-412 = "當然沒問題，老師！勇者一定會遵守約定的！"
90001130-413 = "咦……不過遵守狡猾的約定是正確的嗎……？"
90001130-418 = "沒，沒問題的，愛麗絲！#n這是……對了！是一種取巧的方式！"
90001130-419 = "知道怎麼變通取巧，也是遊戲的一部份對吧？"
90001130-420 = "而，而且有些東西就像彩蛋一樣……是為了讓玩家使用才放進去的……"
90001130-422 = "原來如此……愛麗絲知道了！#n那麼要去冰海的話，該怎麼做呢？"
90001130-423 = "[s5]「愛麗絲、桃井、綠，還有柚子……謝謝你們。」\n[s6]「至於過來的方法，我會再發訊息告訴你們的。」"
90001130-426 = "[ns]「還有，最後我想再說一件事。」"
90001130-432 = "是什麼事呢？老師？"
90001130-433 = "[s]「冰海這邊很冷，過來的時候一定要穿得暖和一點……」"
90001130-438 = "下一話;會合"

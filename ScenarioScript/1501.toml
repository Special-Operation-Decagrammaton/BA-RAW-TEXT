[translation]
1501-1 = "Trouble & Trackers (1)"
1501-2 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
1501-3 = "เฮ้อ..."
1501-4 = "มีอะไรเหรอ มากิ? เอาแต่นั่งจ้องพื้นแล้วถอนหายใจอยู่แบบนั้น"
1501-5 = "คือว่า... วันนี้เป็นวันที่นักเรียนโรงเรียนมิลเลเนียมต้องตรวจร่างกายทุกคนใช่มั้ยล่ะ..."
1501-6 = "ผลตรวจร่างกายของรุ่นพี่ฮาเระเป็นยังไงบ้าง? ผลชั่งน้ำหนักออกมาตรงมั้ย?"
1501-7 = "ผลชั่งน้ำหนักออกมาตรงมั้ยงั้นเหรอ? หมายความว่ายังไงน่ะ เครื่องชั่งน้ำหนักผิดปกติเหรอ?"
1501-8 = "ไม่ใช่อย่างนั้น! หมายถึงน้ำหนักมันเยอะกว่าที่คิดต่างหากล่ะ!"
1501-9 = "พอรู้ว่าจะมีตรวจร่างกายวันนี้ ฉันก็เลยหยุดกินขนมจุกจิกไปตั้งแต่อาทิตย์ก่อน แถมไปวิ่งตอนเย็นไม่ขาดเลยด้วย—!"
1501-10 = "ฉันอุตส่าห์ลำบากขนาดนั้นแล้วแท้ๆ แต่ทำไมน้ำหนักถึงยังไม่ลงเลยสักนิดเดียวล่ะ..."
1501-12 = "ข้อมูลไม่โกหกหรอกนะคะ มากิ"
1501-13 = "หากข้อมูลที่ประมวลผลออกมาไม่น้อยกว่าข้อมูลที่ป้อนเข้าไปละก็ แสดงว่าข้อมูลที่ป้อนเข้าไปไม่ลดลงเลย#nไงล่ะคะ น้ำหนักของคนเราก็เหมือนกันค่ะ"
1501-14 = "แน่นอนว่าเธอคงจะอ้างว่าต้องอยู่ทำงานทั้งคืนแล้วก็ดื่มโซดากับกินมันฝรั่งทอดใช่มั้ยล่ะคะ"
1501-15 = "อึ่กกก...! "
1501-16 = "แล้วรุ่นพี่โคทามะเป็นยังไงบ้าง? น้ำหนักขึ้นกว่าปีที่แล้วมั้ย?"
1501-17 = "ฉะ...ฉันไม่เท่าไรหรอกค่ะ"
1501-18 = "มันงี่เง่ามากเลยนะ ถ้ามัวแต่ยึดติดกับตัวเลขทั้งที่อยู่ในโลกความจริงที่มีการเปลี่ยนแปลงตลอดเวลา#nแบบนี้น่ะ เพราะตัวตนที่แท้จริงของเรามันอยู่ภายในโลกแห่งจินตนาการต่างหากล่ะคะ"
1501-19 = "พูดอะไรน่ะ ดูจากสีหน้าแล้ว รุ่นพี่เองก็คงไม่ถูกใจเรื่องน้ำหนักสินะ"
1501-20 = "ฮืออออ จริงๆ เลยเชียว...! ทำไมโรงเรียนถึงต้องเก็บบันทึกน้ำหนักของนักเรียนด้วย? แบบนี้มันรุกล้ำความเป็นส่วนตัวแล้วนะ!"
1501-21 = "ทุกคนไม่ต้องกังวลหรอก ถึงยังไงบันทึกน้ำหนักมันก็เปลี่ยนแปลงได้นี่นา"
1501-22 = "ถ้าไม่พอใจน้ำหนักตอนนี้ก็ไปพยายามออกกำลังกายให้หนัก แล้วค่อยบันทึกใหม่ก็ได้นี่นา"
1501-23 = "ไม่ได้หรอก แบบนั้นไม่ไหวหรอก! ถ้าปล่อยให้มีตัวเลขแบบนี้อยู่ในบันทึกน้ำหนักละก็ เท่ากับว่า#nเรื่องที่ฉันน้ำหนักขึ้นก็จะถูกบันทึกไว้ในโรงเรียนมิลเลเนียมตลอดกาลเลยนะ!"
1501-24 = "อีกอย่างถ้าปล่อยบันทึกนี้เอาไว้ต่อไป บางทีมันอาจกลายมาเป็นจุดอ่อนในชีวิตฉันก็ได้นะ..."
1501-25 = "จะมีคนที่สนใจบันทึกข้อมูลนักเรียนของคนอื่นแบบนั้นด้วยรึไง..."
1501-26 = "ถึงยังไงก็แก้ไขบันทึกน้ำหนักในตอนนี้ไม่ได้หรอกนะ มันมีวิธีอื่นอีกเหรอ?"
1501-27 = "ฮุฮุฮุ รุ่นพี่ฮาเระ ลืมไปแล้วเหรอว่าพวกเราเป็นใคร?"
1501-28 = "ผู้พิทักษ์ความจริงและสมาชิกชมรมแฮ็กเกอร์แห่งความยุติธรรมที่มุ่งแสวงหาความจริง เวอริทัส!"
1501-29 = "ถ้าใช้ความสามารถของพวกเราละก็ การแก้ไขบันทึกข้อมูลนักเรียนของโรงเรียนก็หมูตู้สบายๆ อยู่แล้ว!"
1501-31 = "\"พวกเรา\" เหรอ?"
1501-32 = "หมายถึงพวกเราด้วยเหรอคะ?"
1501-33 = "พวกรุ่นพี่นี่จริงๆ เลย มาถึงขนาดนี้แล้วจะทำเป็นไม่รู้ได้ยังไง รุ่นพี่ก็อยากแก้ไขบันทึกการตรวจร่างกายเหมือนกันไม่ใช่เหรอ?"
1501-34 = "ตอนที่อ่านบันทึกข้อมูลนักเรียน ถ้ามีข้อมูลสัดส่วนรูปร่างดีๆ เอาไว้ละก็...คุณครู [USERNAME] ก็อาจจะมาหารุ่นพี่อีกครั้งก็ได้..."
1501-35 = "ถะ...ถ้าฉันปฏิเสธคำขออย่างจริงจังของรุ่นน้องคงเป็นตัวอย่างที่ไม่ดีเท่าไร เพราะงั้นคราวนี้ฉันจะสนับสนุนมากิอย่างเต็มที่ค่ะ! "
1501-36 = "ไม่ใช่เพราะฉันอยากดูดีในสายตาคุณครูหรอกนะคะ!"
1501-37 = "ฉันไม่สนเรื่องบันทึกการตรวจร่างกายหรอก..."
1501-38 = "รุ่นพี่ฮาเระ พอมานึกดูแล้ว คราวก่อนรุ่นพี่บอกว่ามีโดรนที่ใช้สำหรับแฮ็กพัฒนาขึ้นใหม่ใช่มั้ย?"
1501-39 = "รุ่นพี่ไม่อยากลองทดสอบดูเหรอว่าโดรนนั่นกับระบบรักษาความปลอดภัยของมิลเลเนียม อันไหนจะมีประสิทธิภาพดีกว่ากัน?"
1501-40 = "จริงอยู่ว่าหลังสร้างโดรนนั่นขึ้นมาก็ยังไม่ได้ทดสอบเพิ่ม เลยทำให้มีข้อมูลการใช้งานไม่เพียงพอ..."
1501-41 = "ถ้าได้ลองเอาไปใช้สักครั้งก็คงดี"
1501-42 = "ยะฮู้ว! ถ้างั้นทุกคนก็เห็นด้วยกับแผนการของฉันใช่มะ? ห้ามมาป๊อดกลางคันด้วยล่ะ!"
1501-46 = "เพื่อปกป้องความจริงและอิสระทางความรู้!"
1501-47 = "ไม่สิ เพื่อการปลอมแปลงบันทึกการตรวจร่างกาย...ต่างหากค่ะ"
1501-48 = "เพื่อการทดสอบความเสถียรของโดรนแฮ็กเกอร์"
1501-50 = "เวอริทัส เริ่มปฏิบัติการได้!"

[translation]
1501-1 = "Trouble & Trackers（１）"
1501-2 = "貝里塔斯．休息室"
1501-3 = "唉……"
1501-4 = "真紀，怎麼了嗎？看你嘆氣的好像靈魂都要被你嘆出來一樣。"
1501-5 = "……今天不是有以所有千年學生為對象的身體測量嗎？"
1501-6 = "晴前輩這次怎麼樣？體重有順利量出結果嗎？"
1501-7 = "「順利」是什麼意思？體重計有異常嗎？"
1501-8 = "我不是那個意思！是體重比想像中還重！"
1501-9 = "為了這次的身體測量，我從上禮拜就不吃零食，而且傍晚的跑步也沒有偷懶！"
1501-10 = "可是我明明那麼努力，體重卻一點也沒有減少……"
1501-12 = "數據是不會騙人的。"
1501-13 = "如果輸出不大於輸入，數據的總量是不會減少的。人的體重也是一樣的道理。"
1501-14 = "真紀昨天也以熬夜工作為藉口攝取了很多碳酸飲料跟洋芋片吧。"
1501-15 = "唔……！"
1501-16 = "這麼說來小玉前輩怎麼樣呢？有比去年瘦嗎？"
1501-17 = "……我，我一點也不在意。"
1501-18 = "執著於變幻莫測的現實數值是件愚蠢的事。真正的自我只存在於虛擬世界之中。"
1501-19 = "什麼嘛。從你的表情來看，前輩似乎也對數值不太滿意呢。"
1501-20 = "唔唔，話又說回來……！學校為什麼要記錄學生的體重呢？這是侵犯隱私！"
1501-21 = "不需要那麼在意。反正人的體重什麼的，不就只是一時的紀錄嗎？"
1501-22 = "如果不滿意的話就努力運動，下次留下好紀錄就好了。"
1501-23 = "不，那可不行！#n如果這次的體重留在紀錄裡的話，我在這個時候稍微胖了一點的事實就會永遠留在千年的歷史裡了對吧！"
1501-24 = "然後這個紀錄會一直被討論，作為我接下來人生的汙點，成為永遠的腳鐐……"
1501-25 = "雖然不知道有沒有人會那麼在意其他人的體重數據……"
1501-26 = "但是已經被記錄下來的體重是無法改變的吧。有什麼其他方法嗎？"
1501-27 = "哼哼哼。你忘記我們是誰了嗎，晴前輩？"
1501-28 = "我們是真理的守護者、探索知識的正義駭客社團「貝里塔斯」！"
1501-29 = "依我們的駭入能力，修改千年的學籍數據簡直易如反掌！"
1501-31 = "……我「們」？"
1501-32 = "……你說「我們」嗎？"
1501-33 = "為什麼要一臉意外呀？#n前輩們也想修正身體測量的紀錄對吧？"
1501-34 = "如果在閱覽學籍資料時，看到表上寫著完美身材的記錄，[USERNAME]老師應該也會對前輩們的身材給驚艷到的說……"
1501-35 = "……雖，雖然不太願意，但既然是後輩的請求，那就沒辦法了。#n這次就協助真紀吧。"
1501-36 = "絕對，不是想讓老師看到我的優點才這麼做的！"
1501-37 = "對我來說身體測量記錄怎樣都無所謂……"
1501-38 = "晴前輩，話說回來，之前你不是說開發出新型駭客無人機了嗎？"
1501-39 = "那台無人機的性能和千年的安全系統……你不想試試看哪個比較強嗎？"
1501-40 = "……確實，在開發出那台無人機之後就沒有什麼委託，所以實戰數據不足是事實。"
1501-41 = "……也許用來入侵一次也不錯。"
1501-42 = "好耶！那我就當作你們兩個也贊成我的計畫囉？不能中途反悔喔！"
1501-46 = "來吧，為了真理的守護和知識的自由！"
1501-47 = "不對，是為了偽造身體測量的記錄。"
1501-48 = "為了進行駭入用無人機的穩定性測試……"
1501-50 = "貝里塔斯──作戰開始！"

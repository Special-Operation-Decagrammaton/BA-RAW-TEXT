[translation]
1501-1 = "#title;Trouble & Trackers 1"
1501-2 = "#place;베리타스 해커 휴게실"
1501-3 = "3;마키;05;어휴…….\n#3;em;[속상함]\n#3;stiff\n#3;a"
1501-4 = "5;하레;01;무슨 일이야, 마키? 그렇게 땅이 꺼져라 한숨만 쉬고.\n#5;al\n#3;m1"
1501-5 = "3;마키;05;그게…… 오늘 전 밀레니엄 학생들을 대상으로 신체검사를 했잖아.\n#3;em;…"
1501-6 = "3;마키;06;하레 선배는 이번 신체검사 어땠어? 몸무게 제대로 나왔어?\n#3;jump"
1501-7 = "5;하레;02;제대로라니? 그게 무슨 소리야? 체중계에 무슨 이상이라도 있었어?\n#5;em;[?]"
1501-8 = "3;마키;06;그게 아니라! 몸무게가 예상한 것보다 더 많이 나왔단 말이야!\n#3;em;[빠직]"
1501-9 = "3;마키;06;이번 신체검사를 대비해서 저번 주부터 간식도 끊고, 저녁에 달리기도 거르지 않고 했는데—!\n#3;m3\n#5;dr\n#3;hophop"
1501-10 = "3;마키;05;그렇게 고생을 했는데, 몸무게는 조금도 빠지지 않았어…….\n#3;em;…"
1501-11 = "#all;hide"
1501-12 = "3;코타마;01;데이터는 거짓말을 하지 않습니다, 마키.\n#3;a"
1501-13 = "3;코타마;99;인풋 이상의 아웃풋이 없으면 데이터는 줄어들지 않습니다. 사람의 몸무게 또한 마찬가지지요.\n#3;em;…"
1501-14 = "1;마키;05\n3;코타마;01;분명 당신은 그제도 밤샘 작업을 핑계로 탄산음료와 감자칩을 잔뜩 먹었을 텐데요.\n#3;m5\n#1;ar"
1501-15 = "1;마키;04;으윽……! \n#1;stiff"
1501-16 = "1;마키;02;그러는 코타마 선배는 어떤데? 작년에 비해서 살 빠졌어?\n#1;em;[?]"
1501-17 = "3;코타마;04;……저, 저는 아무렇지도 않습니다.\n#3;shake"
1501-18 = "3;코타마;06;변화무쌍한 현실의 수치에 집착하는 것은 어리석은 일. 진정한 자아는 가상세계 속에 존재하는 법이니까요.\n#3;greeting"
1501-19 = "1;마키;04;뭐야. 그 표정을 보아하니 선배도 몸무게가 마음에 안 들게 나온 모양이네.\n#1;em;[땀]"
1501-20 = "1;마키;06;우우, 정말……! 학교에서는 왜 학생들의 몸무게 같은 걸 기록하는 거야? 이건 사생활 침해라고!\n#1;hophop"
1501-21 = "#3;hide\n5;하레;02;다들 너무 신경 쓰지 마. 어차피 사람의 몸무게야 일시적인 기록일 뿐이잖아?\n#5;em;[반응]"
1501-22 = "5;하레;01;정 마음에 들지 않으면 열심히 운동을 해서 다음번에 좋은 기록을 받으면 되는 거야."
1501-23 = "1;마키;06;안 돼, 그럴 수는 없어! 이대로 이 몸무게를 기록으로 남겼다가는, 내가 살이 쪘다는 사실이 밀레니엄의 역사에 영원히 남게 되잖아!\n#1;hophop"
1501-24 = "1;마키;05;그리고 이 기록은 두고두고 회자되며 앞으로의 내 인생에 사사건건 발목을 잡게 되겠지…….\n#1;em;…"
1501-25 = "5;하레;04;다른 사람의 학생기록부에 그렇게까지 신경 쓰는 사람이 있을지는 모르겠지만……."
1501-26 = "5;하레;02;하지만 이미 기록된 몸무게를 바꿀 수는 없잖아. 무슨 다른 방법이라도 있는 거야?"
1501-27 = "1;마키;07;후후후. 우리가 누구인지 벌써 잊어버린 거야, 하레 선배?\n#1;em;[재잘]"
1501-28 = "1;마키;03;진리의 수호자이자 지식을 탐구하는 정의로운 해커 동아리, 베리타스!\n#1;m3\n#1;hophop\n#5;dr"
1501-29 = "1;마키;00;우리의 해킹 실력이라면 밀레니엄의 학생기록부를 수정하는 것쯤은 식은 죽 먹기라고!\n#1;closeup"
1501-30 = "#all;hide"
1501-31 = "5;코타마;02\n1;하레;02;……우리?\n#1;em;[?]"
1501-32 = "5;코타마;02;……저희, 말입니까?"
1501-33 = "#1;hide\n#5;hide\n3;마키;06;이제 와서 무얼 아닌 척하는 거야, 선배들. 선배들도 신체검사 기록을 고치고 싶은 거 아니었어?\n#3;jump\n#3;em;[반응]"
1501-34 = "3;마키;99;학생기록부를 열람했을 때 나이스 바디의 신체기록이 적혀 있다면 [USERNAME] 선생님도 선배들을 다시 보게 될 텐데…….\n#3;em;…"
1501-35 = "3;코타마;05;내, 내키지는 않지만 후배의 부탁이니 어쩔 수가 없습니다. 이번만큼은 마키를 서포트 하겠습니다.\n#3;stiff"
1501-36 = "3;코타마;04;절대로 선생님께 잘 보이고 싶어서 이러는 게 아닙니다!\n#3;em;[!]\n#3;jump"
1501-37 = "3;하레;02;나는 신체검사 기록이야 아무래도 상관없는데……."
1501-38 = "1;마키;02;하레 선배. 그러고 보니 전에 새로운 해킹용 드론을 개발했다고 하지 않았어?\n#1;ar\n#1;em;[?]\n#3;m5"
1501-39 = "1;마키;01;그 드론의 능력과 밀레니엄의 보안 시스템 중 어느 게 더 강력할지 시험해 보고 싶지 않아?"
1501-40 = "3;하레;99;확실히 그 드론을 개발한 이후로는 이렇다 할 의뢰가 없어서 실전 데이터가 부족하긴 하네.\n#3;em;…"
1501-41 = "3;하레;03;……한 번쯤이라면 해킹에 사용해도 괜찮을지도."
1501-42 = "1;마키;03;야호! 그럼 모두 내 계획에 찬성한 거지? 중간에 무르기 없기야!\n#1;em;[반짝]\n#1;hophop"
1501-43 = "3;하레;01\n1;마키;00\n#1;m3\n#wait;1000"
1501-44 = "#all;hide"
1501-45 = "5;하레;01\n3;마키;00\n1;코타마;01\n#1;ar\n#wait;1000"
1501-46 = "3;마키;00;진리의 수호와 자유로운 지식을 위해서!\n#3;em;[!]\n#3;jump"
1501-47 = "1;코타마;02;아니, 신체검사 기록을 위조하기 위해서— 입니다."
1501-48 = "5;하레;02;해킹 드론의 안정적인 시험을 위해서……."
1501-49 = "#1;dl\n#5;dr\n3;마키;00\n#3;h\n#wait;1000"
1501-50 = "#1;hide\n#5;hide\n3;마키;03;베리타스, 작전 개시야!\n#3;closeup"

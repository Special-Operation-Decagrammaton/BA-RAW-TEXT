[translation]
1501-1 = "Trouble & Trackers Part 1"
1501-2 = "Veritas Hackers' Lounge"
1501-3 = "*sigh*..."
1501-4 = "Why the heavy sigh, Maki? Is something the matter?"
1501-5 = "I was just thinking about the physical exam we took today."
1501-6 = "Say, Hare. Did you notice anything strange about physical? Like, do you think weight was off?"
1501-7 = "What do you mean? Did something happen?"
1501-8 = "For some reason, the scale said my weight was way higher than it should be!"
1501-9 = "It doesn't make any sense! I even stopped snacking and worked out for an entire week to get ready for the physical!"
1501-10 = "I put in all that work, but I didn't lose any weight at all..."
1501-12 = "Data never lies, Maki."
1501-13 = "If the output doesn't exceed the input, the data will reflect that. Just as the scale did."
1501-14 = "I saw you reward yourself for pulling an all-nighter with soda and potato chips."
1501-15 = "Ack! "
1501-16 = "What about you, Kotama? How did it go compared to last year?"
1501-17 = "Th-That hardly matters to me."
1501-18 = "One's physical form is sure to change over time and it's a fool's errand to attempt to control any more than you can. I'm more focused on the virtual world."
1501-19 = "Y-You're starting to scare me. You sure sound like you care."
1501-20 = "Anyway, I refuse to stand for this...this invasion of privacy! Why does the school even care how much we weigh?!"
1501-21 = "I agree with Kotama. There's no point in worrying about it.#nHuman weight is a fluctuating data point."
1501-22 = "If you're that concerned about it, then simply cut back on the late night rewards."
1501-23 = "I can't do that! How do you expect me to live my life knowing that me getting fat will be carved into Millennium's records forever!"
1501-24 = "Everyone whisper about it behind my back, and it'll follow me for the rest of my life."
1501-25 = "I somehow doubt anyone cares that much."
1501-26 = "Regardless, what's done is done—the record has already been made. Where are you going with this?"
1501-27 = "Heh heh. Who do you think you're talking to?"
1501-28 = "We're Veritas: the righteous truth-defending and knowledge-liberating hacking club!"
1501-29 = "Changing Millennium's records will be a breeze with skills like ours!"
1501-31 = "Like \"ours\"?"
1501-32 = "Are you referring to us?"
1501-33 = "C'mon. Don't act like you haven't thought about it before."
1501-34 = "Just imagine how proud Sensei will be when they see your shining physical exam results."
1501-35 = "I guess I wouldn't be setting a very good example if I refused such a sincere request from my adorable underclassman."
1501-36 = "Just for the record, my acceptance of this request has absolutely nothing to do with Sensei's opinion of me!"
1501-37 = "My opinion remains unchanged. I'm not interested either way."
1501-38 = "Hey, Hare. Weren't you just telling me about your new hacking drone?"
1501-39 = "Don't you want to give a real challenge to see what it can do? Like say...Millennium's security system?"
1501-40 = "It's true that I've yet to gather any field data since completing development..."
1501-41 = "Fine. I'll go along with this."
1501-42 = "Great! Then we're all in agreement. No backing out now!"
1501-46 = "Here's to the defense of truth and the freedom of knowledge!"
1501-47 = "Shouldn't you being saying, \"Here's to forging our physical exam records\"?"
1501-48 = "I'll stick with, \"Here's to practical testing of my latest drone.\""
1501-50 = "Veritas, it's time to roll out!"

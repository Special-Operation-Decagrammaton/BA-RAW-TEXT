[translation]
10005065-5 = "แฮ่ก... แฮ่ก... แฮ่ก... แฮ่ก..."
10005065-6 = "อะ... อึก... ขอร้องละ...! ปล่อยฉันไปเถอะ..."
10005065-7 = "ทำไมถึงมีคนที่พูดไม่รู้เรื่องแบบนี้อยู่ด้วย แล้วทำไมถึงหากันเจอเก่งแบบนี้?"
10005065-8 = "อุตส่าห์จ้างคนมาโปรยพันธบัตรเพื่อปิดเส้นทางเอาไว้เลยนะ..."
10005065-10 = "ไม่ได้ผลเลยสักนิด แถมผ่านมาได้หมดเลยอีกต่างหาก!"
10005065-11 = "แล้วทำไมเส้นทางที่จะหนีถึงได้ถูกระเบิดหมดเลยล่ะเนี่ย...!"
10005065-12 = "ที่นี่ไม่ใช่มิลเลเนียมสักหน่อย... ทำไมฉันต้องมาเจอเรื่องอะไรแบบนี้ที่นี่ด้วย...!"
10005065-16 = "เน่~ เจ้ากระต่ายน้อย~"
10005065-17 = "ไปแอบอยู่ที่ไหนน้า~? วะฮะฮะฮ่าฮ่าฮ่า!!!"
10005065-18 = "เฮือกกกก...!!"
10005065-19 = "ตะ... แต่ว่าเดี๋ยวก็จบแล้วละ... คิดว่าฉันจะวิ่งหนีต่อไปแบบนี้โดยไม่ทำอะไรงั้นเหรอ?"
10005065-20 = "ถ้าผ่านตรงนี้ไปก็ถึงดาดฟ้าแล้ว... และถ้าหนีไปถึงดาดฟ้าได้ละก็...!"
10005065-21 = "ถ้าเป็นแบบนั้น... ถ้าเป็นแบบนั้นละก็...!"
10005065-22 = "แฮ่ก... แฮ่ก... ฮึ่ก...!"
10005065-27 = "เลาจน์บนดาดฟ้าเรือโกลเด้น ฟลีซ"
10005065-28 = "แฮ่ก... แฮ่ก... ในที่สุด... ในที่สุด!"
10005065-29 = "ในที่สุดก็ถึงสักที!! ถ้ามาถึงดาดฟ้าได้... ก็ถือว่าฉันชนะแล้ว...!!"
10005065-34 = "...!?"
10005065-39 = "วะฮ่ะฮ่ะฮ่า! อยู่ตรงนี้เองเหรอ"
10005065-40 = "คิดว่าหนีไปไหนซะอีก สุดท้ายก็หนีมาที่นี่สินะ... ยัยกระต่าย"
10005065-41 = "ถ่วงเวลาได้พอสมควรเลยนี่ ต้องขอบคุณเธอนะ ได้ออกแรงแล้วตอนนี้รู้สึกตัวเบาขึ้นเยอะเลย"
10005065-42 = "วะฮ่ะฮ่ะฮ่า! หมดเวลาเล่นสนุกแล้วละ ตอนนี้คงต้องรีบกลับแล้ว นี่ ยัยกระต่าย"
10005065-44 = "ยะฮู้ว! โคยูกิ--! พวกเรามาล้าววววว-!"
10005065-45 = "ไม่มีที่ให้หนีได้แล้วละ ยอมจำนนซะ ชิโระอุซางิ"
10005065-46 = "ฮุฮุ... นั่นสินะคะ"
10005065-48 = "ฮึ่มมม... ตามมาจนได้นะคะรุ่นพี่...!"
10005065-49 = "แต่รุ่นพี่คิดผิดแล้วละค่ะ ทุกอย่างจบแล้วค่ะ ตราบใดที่อยู่ที่นี่... พวกรุ่นพี่ก็แพ้แล้วล่ะค่ะ!"
10005065-50 = "เพราะงั้นก็อย่าชะล่าใจ แล้วรีบๆ มาจับฉันให้ได้สิคะ!"
10005065-51 = "...?"
10005065-52 = "…?"
10005065-53 = "อะไรน่ะ? ยัยนั่นสติแตกไปแล้วรึไง?"
10005065-55 = "อาจจะเป็นแบบนั้นก็ได้..."
10005065-56 = "อื้อ ก็เป็นไปได้"
10005065-57 = "เพราะครั้งนี้รุ่นพี่เนรุก็โหดกับเธอไม่ใช่เล่น"
10005065-59 = "เห็นแบบนี้ ฉันก็รู้จักเตรียมตัวมาเหมือนกันนะ!"
10005065-60 = "ฉันคิดว่าอาจเกิดเรื่องแบบนี้ขึ้นได้ ก็เลยทุ่มเงินไปเยอะมาก..."
10005065-61 = "กับโดรนหลบหนีส่วนตัวนี้ยังไงล่ะคะ!!"
10005065-66 = "โดรนส่วนตัว..."
10005065-67 = "สำหรับหลบหนี..."
10005065-68 = "งั้นเหรอ...?"
10005065-69 = "...?"
10005065-74 = "หึ! ในระหว่างที่คุยกัน ฉันก็ติดตั้งเอาไว้เสร็จแล้วละ...!"
10005065-75 = "ฮะฮะฮะฮะ!! ฉันไม่ได้โง่หรอกนะ! มหาสมุทรที่กว้างใหญ่แบบนี้!"
10005065-76 = "พวกรุ่นพี่ไม่มีทางไล่ตามมาได้หรอกค่ะ!"
10005065-77 = "ระหว่างที่ฉันบินไปท่องมหาสมุทรที่กว้างใหญ่ ก็นั่งงอแงกันอยู่ตรงนั้นซะเถอะค่ะ!"
10005065-78 = "ถ้างั้นฉันขอตัวก่อนนะคะ อาดิโอสสส!"
10005065-82 = "ฮะฮะฮะฮ่าฮ่าฮ่าฮ่า-!!"
10005065-86 = "[ns] “......”"
10005065-87 = "คาริน..."
10005065-89 = "อื้อ..."
10005065-95 = "อ๊ายยยยย~~!!"
10005065-99 = "บุ๋งๆ... บุ๋งๆๆ! บุ๋งๆๆ! รุ่นพี่!"
10005065-100 = "รุ่นพี่ช่วยฉันด้วยค่ะ! น้ำ....! ฉันว่ายน้ำ...! ฉัน...ว่ายน้ำ...ไม่เป็น...!"
10005065-101 = "บุ๋งๆ บุ๋งๆๆ...! ระ...!"
10005065-102 = "รุ่นพี่~~~! แค่กๆๆ...!!"
10005065-106 = "[ns] \"ต้องลงไปช่วยเธอนะ\""
10005065-107 = "อย่างที่เธอบอกยังไงล่ะคะ... มหาสมุทรที่กว้างใหญ่แบบนี้!"
10005065-108 = "ยิงง่ายจะตายไป โดยเฉพาะในระยะแบบนี้ด้วย"
10005065-109 = "…"
10005065-110 = "เฮ้อ..."
10005065-111 = "นี่พวกเราต้องลงทุนลงแรงมาไล่จับยัยเด็กบ๊องแบบนี้เหรอเนี่ย..."
10005065-112 = "เสียศักดิ์ศรีจริงๆ..."
10005065-117 = "แบบนี้ละค่ะ... ที่เรียกว่ากระบวนการพัฒนาของปฏิบัติการ"
10005065-118 = "มีข้อสงสัย... หรือมีคำถามอะไรรึเปล่าคะ?"
10005065-119 = "…"
10005065-120 = "อะไรกัน สุดท้ายก็เกิดเรื่องวุ่นวายที่นั่นจนได้..."
10005065-121 = "อา... ค่ะ ไม่ต้องเป็นห่วงหรอกค่ะ เพราะอย่างที่ได้แจ้งไปแล้วว่าพวกฉันจัดการไม่ให้เกิด#n\"ปัญหาระหว่างโรงเรียน\" ไปแล้ว"
10005065-122 = "แต่ว่าอาจจะมี \"ค่าใช้จ่ายเล็กน้อย\" นะคะ"
10005065-123 = "อ้อ... เรื่องนั้นคงจะทราบดีอยู่แล้วนะคะ เพราะในสัญญาระบุว่าฝ่ายว่าจ้างจะแก้ไขปัญหา..."
10005065-127 = "เฮ้อ..."
10005065-128 = "เฮ้ออออ... เฮ้อออออ... เฮ้ออออออ..."
10005065-129 = "[s1] \"ใจเย็นๆ ก่อนยูกะ สูดหายใจเข้าลึกๆ นะ...\"\n[s2] \"คีฟลุคคนคูลไม่ไหวแล้วสินะ\""
10005065-130 = "ฟู่ว... ขะ... เข้าใจแล้วค่ะ..."
10005065-131 = "ฟู่ว... ขะ... เข้าใจแล้วค่ะ..."
10005065-132 = "ถ้าคุณครูไปสังเกตการณ์อยู่ที่นั่น... แบบนั้น...คงเป็นวิธีที่ดี...ที่สุดแล้วนะคะ"
10005065-133 = "คะ...? เรื่องการลงโทษชิโระอุซางิเหรอคะ?"
10005065-134 = "อืม... ค่ะ ถ้าเป็นคุณครูก็คงบอกได้ค่ะ"
10005065-135 = "ชิโระอุซางิจะต้องถูกควบคุมตัวไว้เหมือนเดิมค่ะ ถ้าไม่มีเหตุผลจำเป็นที่ต้องออกมาจริงๆ เธอก็คง#nจะถูกขังเอาไว้ที่เดิมตลอดค่ะ"
10005065-136 = "อา... ส่วนเรื่องที่เธอจะหลบหนี... คงไม่ต้องกังวลไปอีกสักระยะค่ะ"
10005065-137 = "เพราะเธอจะถูกพาไปคุมขังไว้ในห้องกระจกสี่เหลี่ยมลูกบาศก์ที่มีเส้นผ่านศูนย์กลาง 10 เมตร#nและด้านในก็จะไม่มีอุปกรณ์อิเล็กทรอนิกส์ใดๆ ทั้งนั้นค่ะ"
10005065-138 = "เรื่องระบบรักษาความปลอดภัยทั้งหมด จะมีผู้ดูแลจัดการด้วยเอกสารเขียนมือทุกอย่าง#nและจะมีการสั่งห้ามใช้โทรศัพท์ในบริเวณนั้นด้วยค่ะ"
10005065-139 = "ถึงจะเป็นระบบที่ล้าสมัยไปสักหน่อย... แต่สำหรับเด็กคนนี้ วิธีนี้จะเป็นวิธีที่มีประสิทธิภาพมากกว่าค่ะ"
10005065-140 = "พอมาลองนึกๆ ดูแล้ว... นี่ก็ใกล้จะเวลาอาหารค่ำของเธอแล้วละค่ะ"
10005065-141 = "ฉันขอบอกไว้ก่อนนะคะ อย่าได้คิดสงสารยัยเด็กนั่นเชียว"
10005065-142 = "เด็กคนนั้นสร้างความเสียหายอย่างรุนแรงให้กับทางมิลเลเนียมมาจนถึงทุกวันนี้ เรื่องนี้เป็นเรื่องที่#nละเอียดอ่อนมากค่ะ"
10005065-143 = "เฮ้อ..."
10005065-144 = "การที่ฉันต้องแสดงด้านที่เข้มงวดแบบนี้ให้คุณครูเห็นบ่อยๆ ก็รู้สึกแย่เหมือนกันนะคะ"
10005065-145 = "คราวหน้า... หวังว่าจะได้แสดงด้านที่ดีๆ ให้คุณครูเห็นนะคะ"
10005065-146 = "ถ้างั้นขอตัวนะคะ..."
10005065-151 = "อืม..."
10005065-152 = "บางทีทางเซมิน่าคงจะวุ่นวายกับการเก็บกวาดอยู่สักพัก เพราะงั้นพวกเราอย่าเข้าไปขวางจะดีกว่าค่ะ"
10005065-153 = "ถ้างั้นก็ยุติการสื่อสารก่อน..."
10005065-159 = "ถึงจะเกิดเรื่องต่างๆ มากมาย... แต่ภารกิจครั้งนี้ก็เหมือนจะสำเร็จไปได้ด้วยดีนะคะ"
10005065-161 = "ก็คงงั้น"
10005065-162 = "ต้องขอบคุณคุณครูด้วยนะที่มาช่วยควบคุมหัวหน้าของเราไม่ให้บันดาลโทสะตั้งแต่เริ่มภารกิจ"
10005065-163 = "หา...? ควบคุมอะไรกัน? แล้วฉันไปบันดาลโทสะตอนไหน?"
10005065-164 = "เลิกพูดเรื่องไร้สาระได้แล้ว"
10005065-166 = "ฮุฮุ ขอขอบคุณอีกครั้งนะคะคุณครู"
10005065-167 = "ถึงจะเป็นการทำภารกิจ... แต่ก็รู้สึกสนุกอยู่เหมือนกันนะคะ"
10005065-168 = "แต่ฉันไม่แน่ใจเลยค่ะว่าคุณครูรู้สึกยังไง... หวังว่าคุณครูก็จะสนุกเหมือนกับพวกเรานะคะ"
10005065-169 = "[s3] \"ครูก็สนุกมากเลยล่ะ\"\n[s4] \"คราวหลังเรียกครูได้ตลอดนะ\""
10005065-170 = "โอ๊ะ..."
10005065-171 = "อุ๊ย..."
10005065-172 = "ฮุฮุ เป็นเรื่องที่น่ายินดีมากเลยค่ะ ฉันดีใจมากเลยค่ะ"
10005065-173 = "ยังไงก็เถอะค่ะ ตอนนี้งานก็เสร็จแล้ว ถ้างั้นฉันจะไปเปลี่ยนกลับเป็น..."
10005065-177 = "ชุดเมด...?"
10005065-178 = "ตายจริง... จะว่าไปแล้วใครเป็นคนเก็บ... ชุดเมดไว้นะคะ?"
10005065-179 = "...? เก็บอะไร?"
10005065-180 = "ฉันไม่ได้เก็บ..."
10005065-181 = "อ่อ... จะว่าไปแล้ว..."
10005065-182 = "...? หืม? อะไรเหรอ?"
10005065-183 = "...? หรือว่าไม่มีใครเก็บชุดมาเลยเหรอคะ? ถ้างั้น..."
10005065-189 = "อ๊าาาาา--! ต้องไปที่ห้องนั้นอีกแล้วเรอะ!?"
10005065-191 = "โอ้สสส-! จะไปอีกแล้วเหรอ? คราวนี้ไปเที่ยวกันใช่มั้ย?"
10005065-192 = "จะ... ใจเย็นๆ ก่อนนะรุ่นพี่! คราวนี้เราไม่ได้ไปทำภารกิจนะ เราแค่ไปเอาของ!"
10005065-193 = "เราไม่ได้ทำภารกิจแล้ว และก็ไม่ต้องปลอมตัวด้วย ไม่เป็นไรหรอกน่า! ยังไงรุ่นพี่อาสึนะก็มีตั๋ว VIP#nอยู่ไม่ใช่รึไง?"
10005065-194 = "ถ้าเอาตั๋วนั่นไปด้วยก็เข้านอกออกในได้ตามสบายอยู่แล้ว ใช่มั้ยล่ะรุ่นพี่?"
10005065-195 = "หืม...?"
10005065-196 = "ตั๋ว VIP เหรอ? ต้องพกไว้ด้วยเหรอ? มันเป็นของสำคัญงั้นเหรอ?"
10005065-197 = "..."
10005065-198 = "ถามเผื่อไว้ก่อนนะ... นี่ทิ้งไปแล้วงั้นเหรอ?"
10005065-199 = "อื้อ!"
10005065-200 = "เดี๋ยวนะ... เอ่อ... คือ..."
10005065-201 = "เฮ้อ... คนอื่นๆ เขาทุ่มเงินกันไปตั้งเยอะเพื่อให้ได้ตั๋วนั่นมา แต่นี่รุ่นพี่กลับทิ้งไปงั้นเหรอ..."
10005065-202 = "คาริน นี่รุ่นพี่อาสึนะนะคะ... เรื่องแบบนั้นจะเกิดขึ้นก็ไม่แปลกหรอกค่ะ"
10005065-203 = "แต่ยังไงก็เถอะ... สุดท้ายก็ต้องย้อนกลับไปตั้งแต่แรกสินะคะ"
10005065-204 = "ชุดเมดอยู่ในห้องเก็บของของเรือโกลเด้น ฟลีซ ตอนนี้จะไปอ้างว่าเป็นชุดของพวกเรามันก็ดู..."
10005065-205 = "แต่ยังไงเราก็จะทิ้งชุดเมดที่เป็นชุดใส่ออกปฏิบัติการไม่ได้นะ"
10005065-206 = "นั่นสิคะ เพราะงั้น..."
10005065-207 = "[s5] \"ก็ลอบเข้าไปอีกครั้งสิ\"\n[s6] \"ว้าว จะเริ่มรอบสองแล้วใช่มั้ย?\""
10005065-215 = "โธ่เว้ย! ฉันละไม่ชอบภารกิจลอบเข้าเลย!!!"
10005065-216 = "ตามล่าบันนี่ภารกิจลับบนเรือยอร์ช"

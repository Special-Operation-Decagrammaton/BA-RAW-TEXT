10005065-129 = "[s1] \"Calm down, Yuuka. Deep breaths...\"\n[s2] \"Being smart was too much for us.\""
10005065-130 = "*sigh* I... I understand..."
10005065-131 = "*sigh* I... I understand..."
10005065-132 = "I trust in you, Sensei... I'm sure they did their... b-best..."
10005065-133 = "What did we do with White Rabbit?"
10005065-134 = "Hmm... I suppose it's okay to tell you, Sensei."
10005065-135 = "White Rabbit has been returned to confinement, where she'll remain for the forseeable future."
10005065-136 = "...Ah! She definitely won't be able to escape again."
10005065-137 = "She's confined in a glass room 10 meters across with no electronic devices of any kind, at all."
10005065-138 = "All security surrounding her is paperwork and manpower, with no mobile phones allowed on the premises."
10005065-139 = "It's a bit old fashioned, but necessary for keeping her confined."
10005065-140 = "Come to think of it, I believe it's nearly her meal time."

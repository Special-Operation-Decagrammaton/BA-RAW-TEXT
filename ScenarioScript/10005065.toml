[translation]
10005065-5 = "哈啊，哈啊，哈啊，哈啊，哈啊……"
10005065-6 = "不，不行了……"
10005065-7 = "那是什麼，果然犯規了吧？為什麼馬上就被發現了？"
10005065-8 = "即使在途中強迫警備員把錢綑成牆壁，也完全沒有意義……！"
10005065-10 = "一下就變成碎紙了啊！連一秒鐘都爭取不到嗎！？"
10005065-11 = "而且所到之處的走廊都被炸毀了，總覺得像是早就設好了誘餌一樣……！"
10005065-12 = "他們不是才剛到這裡嗎！？為什麼那麼熟練啊……！？"
10005065-16 = "喂～小白兔～"
10005065-17 = "躲到哪裡去啦～？哈哈哈哈哈哈哈哈！！"
10005065-18 = "噫噫！？"
10005065-19 = "唔……！以，以為我會就這麼放棄就大錯特錯了！"
10005065-20 = "只要能到頂樓上去……！"
10005065-21 = "我……我就能……！"
10005065-22 = "哈啊，哈啊……！"
10005065-27 = "黃金芙利號．船頂大廳"
10005065-28 = "哈啊，哈啊……！"
10005065-29 = "終於到了！是我贏了……！"
10005065-34 = "噫！？"
10005065-39 = "哈哈！找到你了。"
10005065-40 = "總算是找到你了啊，你這小兔崽子。"
10005065-41 = "還挺努力的吧，算是讓我好好運動了一下。"
10005065-42 = "所以呢，已經結束了嗎？再抵抗一下也沒關係的哦？"
10005065-44 = "啊，發現小雪！呀齁～久等了！"
10005065-45 = "你已經無處可逃了，放棄吧。"
10005065-46 = "呵呵……乖乖束手就擒吧。"
10005065-48 = "唔，接二連三地……"
10005065-49 = "……但是，你們似乎誤會了呢。#n我並沒有被逼得走投無路，是前輩們輸了！"
10005065-50 = "明明應該不由分說地直接抓住我就好，現在後悔已經太遲了唷！"
10005065-51 = "太～可～惜～了～！！尼哈哈哈哈哈哈！"
10005065-52 = "……？"
10005065-53 = "……怎麼了？累到腦袋壞掉了嗎？"
10005065-55 = "確實，搞不清楚在說什麼呢……"
10005065-56 = "都怪隊長一邊笑著……"
10005065-57 = "一邊緊追著他不放……"
10005065-59 = "才，才不是腦袋壞掉了！"
10005065-60 = "以為我會毫無準備就跑到這裡來嗎？#n我早就預料到可能會有這種事情……"
10005065-61 = "所以花大錢買了單人用的逃生無人機！"
10005065-66 = "單人用的……"
10005065-67 = "逃生……"
10005065-68 = "無人機？"
10005065-69 = "……啊？"
10005065-74 = "呵呵，在你們呆住的時候已經著裝完畢了！"
10005065-75 = "尼哈哈哈哈哈！笨蛋笨蛋，前輩們是笨～蛋！！"
10005065-76 = "只要逃到這片海上，就算是前輩們也不可能追上我的！"
10005065-77 = "就在那裡咬著手指看吧！"
10005065-78 = "先走一步囉！"
10005065-82 = "尼哈哈哈哈！掰掰～！！！"
10005065-86 = "[ns]「……」"
10005065-87 = "……花凛。"
10005065-89 = "……了解。"
10005065-95 = "唔呀啊啊啊────！？"
10005065-99 = "咕！等！咕噗！啊，那，等！？"
10005065-100 = "救救我！前輩們！等，我不會，咕噗！"
10005065-101 = "噗哈！？我，不會游……！前輩！前輩！？"
10005065-102 = "救救我！前噗，咳咳，唔！！"
10005065-106 = "[ns]「……還是幫幫他吧？」"
10005065-107 = "這種發展，怎麼反而事前沒想到呢……"
10005065-108 = "這種距離不可能打不中。"
10005065-109 = "……"
10005065-110 = "唉……"
10005065-111 = "想到我們為了這種傢伙，一路忙到現在……"
10005065-112 = "總覺得幹勁都沒了……"
10005065-117 = "……以上就是這次的來龍去脈。"
10005065-118 = "那個，請問是否有疑問呢……？"
10005065-119 = "……"
10005065-120 = "與其說是疑問……你們似乎，鬧得相當大呢……？"
10005065-121 = "啊，是的。但是無須擔心，就像我先前說的一樣，似乎不會成為「學校間的問題」。"
10005065-122 = "雖然需要負擔一點費用……"
10005065-123 = "不過，該說我們有盡最大努力的義務了嗎……"
10005065-127 = "嘶──哈──"
10005065-128 = "呼……嘶────哈──────"
10005065-129 = "[s1]「抱歉，優香……」\n[s2]「沒辦法用聰明的方法。」"
10005065-130 = "呼，呼……這，這畢竟是有老師陪同下的結果。"
10005065-131 = "呼，呼……這，這畢竟是有老師陪同下的結果。"
10005065-132 = "我也不打算多說什麼……唉。"
10005065-133 = "……？白兔的處分是嗎？"
10005065-134 = "……告訴老師應該沒問題吧。"
10005065-135 = "那個孩子被關起來了。只要沒有出什麼大事，一段時間內是出不來的吧。"
10005065-136 = "順帶一提，他現在處於相當難以逃脫的狀態。"
10005065-137 = "他被關在一個直徑10m正六面體的玻璃屋中，裡面沒有任何電子儀器。"
10005065-138 = "特意不使用數位的方式，而是用紙本文件與人力加以管理，#n附近的區域也嚴禁攜帶智慧型手機進入。"
10005065-139 = "數位的保全設備對他來說幾乎沒有意義……#n但相反的，只要這麼做，他就無能為力了吧。"
10005065-140 = "……這麼說來，差不多到吃飯時間了呢。我去幫他送餐吧。"
10005065-141 = "……因為老師很善良所以我先提醒一下，老師沒有必要可憐他。"
10005065-142 = "考慮到那孩子至今對千年造成的……或者沒能造成的損害，這樣已經很仁慈了。"
10005065-143 = "唉……"
10005065-144 = "為什麼我總是得在老師面前做這種事……"
10005065-145 = "……雖然並不是想找藉口，之後找機會再見個面吧。"
10005065-146 = "那麼今天就先這樣。辛苦了，下次見。"
10005065-151 = "……"
10005065-152 = "研討會那邊想必也很頭痛吧……"
10005065-153 = "那麼先切斷通訊吧……"
10005065-159 = "雖然發生了很多事，不過總算是完成任務了呢。"
10005065-161 = "嗯，辛苦了。"
10005065-162 = "老師也辛苦了。不只是控制住了隊長，還幫了我們很多忙。"
10005065-163 = "……啊？"
10005065-164 = "你說誰被誰控制了？"
10005065-166 = "呵呵。再次向您致謝，老師。"
10005065-167 = "多虧了您，雖然是任務卻也很開心。"
10005065-168 = "啊，不過或許給老師添麻煩了……"
10005065-169 = "[s3]「別這麼說，我也挺開心的。」\n[s4]「有什麼我能做的事的話，歡迎再通知我。」"
10005065-170 = "哎呀……"
10005065-171 = "哎呀……"
10005065-172 = "很高興能聽到您這麼說，謝謝您。"
10005065-173 = "那麼，事情總算是告一段落了……"
10005065-177 = "……哎呀？"
10005065-178 = "話說回來……我們的女僕裝，後來怎麼樣了？"
10005065-179 = "……啊？"
10005065-180 = "這麼說來……"
10005065-181 = "那個，姑且問一下，明日奈前輩也……"
10005065-182 = "？？？"
10005065-183 = "也就是說，難不成……"
10005065-189 = "啊！？在那艘船上！？還要再去一次啊！？"
10005065-191 = "啊，那這次就去玩吧！"
10005065-192 = "沒，沒問題的！這次沒有必要潛入……"
10005065-193 = "而且明日奈前輩還有VIP票不是嗎？"
10005065-194 = "只要用那個的話……"
10005065-195 = "……咦？"
10005065-196 = "你說的票，是在船上的時候給我的那張紙嗎？#n那難道是很重要的東西嗎？"
10005065-197 = "……"
10005065-198 = "雖然我覺得不太可能，難道前輩把那張票……？"
10005065-199 = "嗯！丟掉了！！"
10005065-200 = "……這樣啊。"
10005065-201 = "呼……在那裡絕大多數的人花了大把鈔票，無論如何也想拿到手的那張票，#n居然這麼簡單就……"
10005065-202 = "畢竟是明日奈前輩呢……"
10005065-203 = "那個，也就是說，我們又回到原點了呢……？"
10005065-204 = "我們的女僕裝就放在黃金芙利號的置物櫃裡，#n不管通知哪個學校似乎都不會願意幫我們拿回來，#n而且當初就是因為無法光明正大地進入，所以才選擇潛入的……"
10005065-205 = "但是，也不能輕易放棄那些女僕裝。"
10005065-206 = "就是啊。所以……"
10005065-207 = "[s5]「好，潛入任務開始。」\n[s6]「開始二週目吧！」"
10005065-215 = "我最討厭潛入作戰了啦！！！"
10005065-216 = "船上的兔子追逐者"

[translation]
10035010-1 = "第1話;救生員任務，開始！"
10035010-2 = "終於到了！"
10035010-3 = "這裡就是D.U.規模最大的「海神水上樂園」！"
10035010-4 = "確實大到讓人搞不清楚方向呢！"
10035010-5 = "為什麼叫我們來戶外設施啊……"
10035010-6 = "這樣不就跟巡邏沒什麼兩樣了嗎。"
10035010-7 = "別這麼說嘛，吹雪！"
10035010-8 = "我們的本分不就是保護市民的安全嗎？"
10035010-9 = "怎麼能因為熱就洩氣呢！"
10035010-10 = "我們的辛苦付出肯定能傳達給市民們的！"
10035010-12 = "在保護別人之前，我就要先被曬成魷魚乾了啦。"
10035010-13 = "現在連防曬油都沒擦……"
10035010-14 = "這裡好像也有室內泳池，真希望能被安排到那邊。"
10035010-15 = "局長也是這麼想的吧？"
10035010-19 = "……"
10035010-20 = "怎麼了嗎，局長？您的臉色不太好唷！"
10035010-21 = "滿臉疲憊、雙眼渙散、四肢無力……"
10035010-22 = "難，難不成是中暑了！？"
10035010-23 = "糟了，吹雪！得快點扶局長到陰涼處，然後呼叫救生員過來！"
10035010-24 = "啊，我不就是救生員嗎？"
10035010-26 = "不必大驚小怪，桐乃警官。我沒事。"
10035010-27 = "只是覺得現況有點不真實罷了。"
10035010-28 = "還沒糾結完嗎？差不多也該接受現實了吧？"
10035010-29 = "說得倒容易。"
10035010-30 = "不管是來水上樂園……"
10035010-31 = "還是穿著這麼暴露的衣服值勤……"
10035010-32 = "又或是上班時間去游泳池，都是我進公安局後的第一次。"
10035010-34 = "原，原來如此……"
10035010-35 = "咦？那為什麼派遣人員名單上會有局長您的名字呢？"
10035010-36 = "就是說啊。"
10035010-37 = "我們兩個生活安全局的被派遣過來還算合情合理，#n但公安局所屬的環奈局長，究竟為什麼會被派遣過來呢？"
10035010-39 = "這個嘛……"
10035010-47 = "副局長！這是怎麼回事！"
10035010-48 = "啊，您來了啊，大姐頭！"
10035010-49 = "等等，讓我做完這最後一組引體向上……！"
10035010-50 = "嘿咻！"
10035010-53 = "嘿呀，真是通體舒暢。#n找我有什麼事嗎，大姐頭？"
10035010-54 = "誰准你在上班時間運動的……"
10035010-55 = "算了，現在這不是重點。"
10035010-56 = "為什麼派遣人員名單上會有我的名字？"
10035010-57 = "而且還是以生活安全局臨時增員的身份，去跟我八竿子打不著關係的水上樂園！"
10035010-59 = "啊哈，有這回事嗎～"
10035010-60 = "少裝蒜了，派遣人員的批准文件上簽的就是副局長你的名字。"
10035010-61 = "也就是說，這整件事都是你一手策畫的，木乃香。"
10035010-62 = "你還想怎麼狡辯？"
10035010-66 = "噗哈哈！我就知道您會有這種反應。"
10035010-67 = "唔嗯，雖然我覺得還不足以稱作是我一手「策畫」……"
10035010-68 = "不過您說的沒錯，將大姐頭的名字加進派遣人員名單的人的確是我。"
10035010-69 = "誰叫那份公文正好在前輩不在的時候送來嘛。"
10035010-70 = "你……！"
10035010-71 = "不過我這也是為了大姐頭著想哦。"
10035010-72 = "啊？"
10035010-73 = "您一直在寫報告、審訊犯人，連週末也沒時間休息。"
10035010-74 = "再這樣下去會累垮的。"
10035010-75 = "……所以就把我送去水上樂園？"
10035010-76 = "就是這樣！"
10035010-77 = "雖然救生員也沒輕鬆到哪去，但水上樂園那邊肯定不會把重要工作交給外部人員的。"
10035010-78 = "畢竟這只是為了讓大家知道「女武神警察學園正在幫助我們」的派遣請求，不是嗎？"
10035010-79 = "所以您就當作是去玩吧！"
10035010-80 = "哎呀！為了上司做到這種地步的部下該上哪找啊！"
10035010-82 = "馬上給我取消。"
10035010-83 = "公安局長可沒有閒情逸致去什麼水上樂園。"
10035010-84 = "改派生活安全局的人去吧。"
10035010-88 = "請等一下，大姐頭。"
10035010-89 = "這樣真的好嗎？"
10035010-90 = "……什麼意思？"
10035010-91 = "我是基於私交才說這些……我覺得這對大姐頭來說是個好機會。"
10035010-92 = "……？"
10035010-94 = "大姐頭剛進女武神的時候，申請的不就是生活安全局嗎？"
10035010-95 = "你，你怎麼會知道這件事？"
10035010-96 = "哎呀，雖然我的權限不如您，但副局長還是能閱覽大部分的文件嘛。"
10035010-97 = "只是在無聊的時候順手翻了一下而已。"
10035010-98 = "總之，雖然現在您是公安局長……"
10035010-99 = "但如果當時的心情還在，趁著這次機會體驗一下也不錯呀。"
10035010-100 = "不然什麼時候才能經手直接面對民眾的第一線任務呢！"
10035010-104 = "呵。"
10035010-105 = "？"
10035010-106 = "別鬧了，木乃香。"
10035010-107 = "咦？"
10035010-108 = "我剛入學時的志願確實是生活安全局沒錯，但這個想法早已經被我拋諸腦後了。"
10035010-109 = "像我這種凶神惡煞的人，要是去接待民眾肯定不會有好效果。"
10035010-110 = "事到如今已經沒有什麼遺憾了。"
10035010-111 = "我會請上級重新審核派遣人員名單。"
10035010-112 = "你只要知道這些就好，接下來我會親自處理。"
10035010-114 = "就算大姐頭這麼說……"
10035010-115 = "也已經結束了唷。"
10035010-116 = "結束？什麼結束？"
10035010-117 = "批准和預算都已經審完了。"
10035010-118 = "來，這是今天核發的人事命令！"
10035010-119 = "什麼……！"
10035010-122 = "……這是機密。"
10035010-123 = "什麼嘛，那何必擺出一副像是會告訴我們的表情。"
10035010-125 = "[ns1]「就是說啊，這樣會讓人很想知道耶。」\n[ns2]「這樣我反而更好奇了。」"
10035010-129 = "咦？老師？"
10035010-130 = "沒想到能在這種地方見到您！您好！"
10035010-131 = "哎呀，而且連泳裝都準備好了。"
10035010-132 = "看來老師也打算好好玩一玩吧？"
10035010-133 = "[s]「嗨，桐乃、吹雪、環奈。」"
10035010-134 = "為，為什麼[USERNAME]老師會在這裡？"
10035010-135 = "這次的任務應該跟夏萊沒有關係吧。"
10035010-136 = "[s]「因為我收到了對派遣救生員感到擔心的報告。」"
10035010-137 = "（木乃香……！）"
10035010-138 = "[s]「我不想增加你們的負擔。」"
10035010-140 = "[ns]「把我當成是普通的遊客就行了。」"
10035010-141 = "我明白了！"
10035010-142 = "那麼如果您不慎落水的話，請趕緊用電話或MomoTalk聯絡本官！#n本官會馬上去救您的！"
10035010-143 = "[s]（人都落水了還能用MomoTalk嗎……？）"
10035010-144 = "老師，既然這樣就一起去漂漂河裡悠閒地游個泳……啊不對，就一起去巡邏吧。"
10035010-145 = "美食廣場那邊有間甜甜圈店，可以順便填飽肚子。"
10035010-146 = "你又只想著玩了，吹雪！"
10035010-150 = "……"
10035010-151 = "[s]「環奈，你有什麼擔心的事嗎？」"
10035010-152 = "啊，不是的。"
10035010-153 = "那個，只是沒想到會在這裡見到[USERNAME]老師。"
10035010-154 = "一時之間有點驚訝。"
10035010-155 = "[s]「救生員的泳裝很適合你哦。」"
10035010-156 = "……謝謝您的關心。"
10035010-157 = "但我果然與這套衣服不太相襯。"
10035010-158 = "咦？局長的衣服尺寸不合嗎？"
10035010-159 = "胸前的部分看起來確實有點緊～"
10035010-160 = "我，我不是這個意思，吹雪警官。"
10035010-164 = "各位在樂園內待命的救生員們，請注意。"
10035010-165 = "稍後將進行工作分配，請所有人到戶外設施的中央集合。"
10035010-170 = "好，那麼就開始救生員的任務吧！"

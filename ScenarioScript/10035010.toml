[translation]
10035010-1 = "Episode 1;Starting as a Lifeguard!"
10035010-2 = "We're finally here!"
10035010-3 = "So this is Aegir, the biggest water park in D.U.!"
10035010-4 = "It's so huge, I think I'm going to get lost!"
10035010-5 = "We're still going to be out in the sun all day."
10035010-6 = "It's just patrolling with extra steps."
10035010-7 = "Don't say that, Fubuki!"
10035010-8 = "Our duty is to protect the people, right?"
10035010-9 = "We can't let a little heat get in the way of that!"
10035010-10 = "And I'm sure they'll appreciate all our hard work."
10035010-12 = "Not sure how I'm going to protect people when I'm drying up like a squid..."
10035010-13 = "Ugh, why didn't I put on sunscreen...?"
10035010-14 = "Oh, there's an indoor pool too. Hope they put us there."
10035010-15 = "Right, Director?"
10035010-19 = "..."
10035010-20 = "Director, what's wrong? You don't look so good!"
10035010-21 = "Wait... Tired expression, weak limbs, lackluster eyes..."
10035010-22 = "A-Are you getting heatstroke?!"
10035010-23 = "Come on, Fubuki! Move the director to the shade. We need to call for a lifeguard!"
10035010-24 = "Oh, wait. We're the lifeguards, aren't we?"
10035010-26 = "At ease, Officer Kirino. I'm perfectly fine."
10035010-27 = "Just...taking a bit to adjust to this whole situation."
10035010-28 = "Still? You might as well accept it."
10035010-29 = "That's easier said than done."
10035010-30 = "Being here at the water park..."
10035010-31 = "...in, let's say, minimal work attire..."
10035010-32 = "...and spending my working day at the pool...well, it's a professional first for me."
10035010-34 = "I, um, I see..."
10035010-35 = "Wait, but then why was the director's name on the dispatch list?"
10035010-36 = "I know, right?"
10035010-37 = "We're both from the Public Safety Bureau, so it makes sense they sent us, but why would they send her too?"
10035010-39 = "Well, uh..."
10035010-47 = "Deputy Director! What's going on?"
10035010-48 = "Oh, you're here!"
10035010-49 = "Give me a second to finish these pull-ups."
10035010-50 = "Hyaah!"
10035010-53 = "Ah, feels great. So what's up?"
10035010-54 = "Since when are we allowed to exercise at work...?"
10035010-55 = "Forget it. Not important right now."
10035010-56 = "Why is my name on the dispatch list?"
10035010-57 = "I seem to have been conscripted into the Public Safety Bureau, and assigned to a water park."
10035010-59 = "Aha, is that so?"
10035010-60 = "Don't play dumb. I saw the Deputy Director's signature on the dispatch approval paperwork."
10035010-61 = "You're the one behind this, Konoka."
10035010-62 = "You want to explain yourself?"
10035010-66 = "Haha, I thought you might come stomping in here like this."
10035010-67 = "I wouldn't go so far as to say I'm \"behind\" it all, but..."
10035010-68 = "Yes, you're right. I did put your name on the list."
10035010-69 = "My senior was away, the list landed on my desk, and I took the opportunity."
10035010-70 = "You—"
10035010-71 = "FOR your benefit."
10035010-72 = "What?"
10035010-73 = "You've been swamped with interrogations and paperwork for weeks. And weekends."
10035010-74 = "Even you can't go forever without a rest."
10035010-75 = "...And that's why you're sending me to the water park?"
10035010-76 = "That's exactly it, yes!"
10035010-77 = "Lifeguarding is a tough job with high stakes. The water park wouldn't assign anything critical to outside help, no offense."
10035010-78 = "Valkyrie will be there for show, to reassure people that they're safe and secure, that's all."
10035010-79 = "And as for you, just go there and have a good time!"
10035010-80 = "So am I the best deputy ever, or what?"
10035010-82 = "Cancel it immediately."
10035010-83 = "I'm the Director of the Public Peace Bureau. I don't get to frolic in a water park. I can't afford to."
10035010-84 = "See if the Public Safety Bureau can send a few more people instead."
10035010-88 = "Whoa, whoa, wait."
10035010-89 = "Are you sure?"
10035010-90 = "...Why do you ask?"
10035010-91 = "Well, between you and me...I think this could be a good opportunity for you too."
10035010-92 = "Hm?"
10035010-94 = "When you first enrolled in Valkyrie, the Public Safety Bureau was your first choice, wasn't it?"
10035010-95 = "How did you know?"
10035010-96 = "Well, I may not have the same level of access as you, but as the Deputy Director, I do have the authority to review certain documents at my own discretion."
10035010-97 = "...I got bored one day and took a peek."
10035010-98 = "Anyway, now you're busy being the Director of the Public Peace Bureau..."
10035010-99 = "...but, if you still feel the way you did back then, this could be your chance."
10035010-100 = "When else would you ever have the time or the opportunity for public service work?"
10035010-104 = "Heh."
10035010-105 = "Hm?"
10035010-106 = "I have to stop you right there."
10035010-107 = "Why?"
10035010-108 = "I did aim to join the Public Safety Bureau at first, but I gave that up a long time ago."
10035010-109 = "I'm too...mean-looking. The public and I would not get along face to face."
10035010-110 = "So no regrets."
10035010-111 = "I'll put in a request for the higher-ups to reconsider the dispatch list."
10035010-112 = "And I'll go there personally, just so you know."
10035010-114 = "Even if you do..."
10035010-115 = "...it's already too late."
10035010-116 = "What do you mean, \"too late\"?"
10035010-117 = "The approval and the budget have already been finalized."
10035010-118 = "In fact, I have the official forms right here."
10035010-119 = "Seriously...?!"
10035010-122 = "...It's classified."
10035010-123 = "Aw man, I thought you were going to tell us."
10035010-125 = "[ns1] \"I know, right? I really wanted to hear it.\"\n[ns2] \"I'm even more curious now.\""
10035010-129 = "Huh? Sensei?"
10035010-130 = "Surprised to see you here. Hello!"
10035010-131 = "Wow, you're in a swimsuit, even."
10035010-132 = "You look like you're up for some fun, yeah?"
10035010-133 = "[s] \"Hello, Kirino, Fubuki, Kanna.\""
10035010-134 = "Huh? Why is [USERNAME] Sensei here?"
10035010-135 = "This task shouldn't have anything to do with Schale."
10035010-136 = "[s] \"I got a report about some concerns with the choice of lifeguards.\""
10035010-137 = "(Konoka...!)"
10035010-138 = "[s] \"I'm not here to get in anybody's way.\""
10035010-140 = "[ns] \"Just think of me as a regular visitor.\""
10035010-141 = "Understood!"
10035010-142 = "If you fall in the water, just call me or MomoTalk me! I'll come to your rescue!"
10035010-143 = "[s] \"(MomoTalking underwater. Hmm...)\""
10035010-144 = "Well, since we're both here, why don't you join me in the lazy river? ...On patrol?"
10035010-145 = "There's a donut shop in the food court, so we could grab a bite to eat too."
10035010-146 = "You just want to go goof off, Fubuki?"
10035010-150 = "..."
10035010-151 = "[s] \"Kanna, is something bothering you?\""
10035010-152 = "No, it's nothing."
10035010-153 = "I just didn't expect to see you here."
10035010-154 = "You surprised me, that's all."
10035010-155 = "[s] \"That lifeguard swimsuit looks nice on you.\""
10035010-156 = "Thank you..."
10035010-157 = "...but it doesn't seem like the right fit for me."
10035010-158 = "Huh? Director, did they give you the wrong size?"
10035010-159 = "It does seem a little tight around the chest."
10035010-160 = "Th-That's not what I meant, Officer Fubuki."
10035010-164 = "Attention, all lifeguards."
10035010-165 = "Please gather at the center of the outdoor facility for duty assignments."
10035010-170 = "Right, let's get this mission started!"

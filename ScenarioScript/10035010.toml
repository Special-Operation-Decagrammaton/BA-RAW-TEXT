[translation]
10035010-1 = "ตอนที่ 1;เริ่มการเป็นไลฟ์การ์ดค่ะ!"
10035010-2 = "มาถึงแล้วค่ะ!"
10035010-3 = "ที่นี่คือสวนน้ำ <แอกิร์> ที่มีขนาดใหญ่ที่สุดใน D.U. สินะคะ!"
10035010-4 = "กว้างจนเดินหลงได้เลยนะคะเนี่ย!"
10035010-5 = "ทำไมถึงให้เรามาอยู่ข้างนอกล่ะ..."
10035010-6 = "แบบนี้ก็ไม่ต่างอะไรกับงานลาดตระเวนที่เคยทำน่ะสิ"
10035010-7 = "อย่าพูดแบบนั้นสิคะ ฟุบุกิ!"
10035010-8 = "หน้าที่หลักของเราคือการรักษาความปลอดภัยให้ชาวเมืองไม่ใช่เหรอคะ?"
10035010-9 = "ถึงจะร้อนไปหน่อย แต่จะถอดใจไม่ได้นะคะ!"
10035010-10 = "ชาวเมืองจะสนุกกับสวนน้ำได้ด้วยความพยายามของพวกเรานะคะ!"
10035010-12 = "ก่อนจะไปช่วยคนอื่น ฉันคงเป็นปลาหมึกตากแห้งไปก่อนแล้วละ"
10035010-13 = "ครีมกันแดดก็ไม่ได้ทามาซะด้วย..."
10035010-14 = "ที่นี่น่าจะมีสระน้ำในร่มสิ แล้วทำไมไม่ให้พวกเราไปทำงานตรงนั้นนะ..."
10035010-15 = "หัวหน้ากรมฯ ก็คิดเหมือนกันใช่มั้ยล่ะ?"
10035010-19 = "..."
10035010-20 = "เป็นอะไรไปเหรอคะหัวหน้ากรมฯ? สีหน้าดูไม่ดีเลยค่ะ!"
10035010-21 = "สีหน้าดูเหนื่อยล้า แขนขาดูไม่มีแรง แล้วก็ตาปรือด้วย..."
10035010-22 = "ระ... หรือว่านี่เป็นอาการของโรคลมแดด?! "
10035010-23 = "เกิดเรื่องใหญ่แล้วค่ะ ฟุบุกิ! รีบพาหัวหน้ากรมฯ ไปนอนในร่มแล้วเรียกไลฟ์การ์ดให้หน่อยค่ะ!"
10035010-24 = "อ๊ะ ฉันเป็นไลฟ์การ์ดนี่คะ?"
10035010-26 = "อย่าตื่นตระหนกเกินเหตุนักสิ เจ้าหน้าที่คิริโนะ ฉันน่ะไม่เป็นไรหรอก"
10035010-27 = "แค่ยังทำใจยอมรับและปรับตัวให้เข้ากับสถานการณ์ตอนนี้ไม่ได้น่ะ"
10035010-28 = "ยังรู้สึกแบบนั้นอยู่อีกเหรอ? ถึงเวลาที่เราต้องยอมรับได้แล้วนะ?"
10035010-29 = "พูดน่ะมันง่าย"
10035010-30 = "แต่สำหรับฉันแล้ว ทั้งเรื่องมาสวนน้ำ"
10035010-31 = "ทั้งเรื่องใส่เสื้อผ้าน้อยชิ้นในการปฏิบัติงาน"
10035010-32 = "และการมาอยู่ที่สระว่ายน้ำระหว่างปฏิบัติงาน ทั้งหมดนี้มันเป็นครั้งแรกของฉันตั้งแต่มาทำงานในกรม#nความมั่นคงสาธารณะเลยนะ"
10035010-34 = "ยะ... อย่างนั้นนี่เองสินะคะ..."
10035010-35 = "เอ๋? แล้วทำไมในรายชื่อถึงได้มีชื่อของหัวหน้ากรมฯ ด้วยล่ะคะ?"
10035010-36 = "ก็นั่นน่ะสิ"
10035010-37 = "พวกฉัน 2 คนอยู่สำนักรักษาความปลอดภัย ก็เลยไม่แปลกที่จะถูกส่งตัวมา แต่ทำไมกรมความมั่นคง#nสาธารณะถึงต้องมาด้วย แถมยังเป็นหัวหน้ากรมฯ โดยตรงอีก?"
10035010-39 = "เรื่องนั้นน่ะ..."
10035010-47 = "รองหัวหน้ากรมฯ! นี่มันอะไรกัน!"
10035010-48 = "อ๊ะ มาแล้วเหรอคุณพี่!"
10035010-49 = "แป๊บหนึ่งนะ ฉันโหนบาร์เซ็ตสุดท้ายแล้ว ขอเล่นเซ็ตนี้ให้เสร็จก่อน..."
10035010-50 = "ฮึบบ!"
10035010-53 = "เฮ้อ สดชื่นจัง มีเรื่องอะไรเหรอคะคุณพี่?"
10035010-54 = "ใครอนุญาตให้ออกกำลังกายในเวลาทำงานน่ะ..."
10035010-55 = "เฮอะ ช่างเถอะ เรื่องนั้นไม่สำคัญหรอก"
10035010-56 = "แล้วทำไมฉันถึงได้อยู่ในรายชื่อไลฟ์การ์ดของสวนน้ำด้วยล่ะ?"
10035010-57 = "ตอนนี้ฉันต้องไปทำงานในสวนน้ำที่ไม่ได้เกี่ยวอะไรกับกรมเลยนะ แถมต้องไปสังกัดสำนักรักษาความ#nปลอดภัยชั่วคราวอีก!"
10035010-59 = "อ๋อ อย่างนั้นเหรอคะ~"
10035010-60 = "อย่ามาพูดปัดความรับผิดชอบนะ ฉันเห็นว่าในเอกสารอนุมัติมีลายเซ็นของรองหัวหน้ากรมฯ อยู่"
10035010-61 = "งั้นก็แปลว่าคนที่อยู่เบื้องหลังเรื่องนี้ก็คือเธอสินะ โคโนกะ"
10035010-62 = "มีอะไรจะแก้ตัวหรือเปล่า!?"
10035010-66 = "ฮ่าฮ่าฮ่า! คิดไว้แล้วเชียวว่าต้องเป็นแบบนี้"
10035010-67 = "แต่ว่านี่ไม่ใช่งานใหญ่โตอะไรที่ฉันจะ 'อยู่เบื้องหลัง' ได้หรอกนะคะ..."
10035010-68 = "ใช่แล้ว ฉันเป็นคนใส่ชื่อของคุณพี่เข้าไปอย่างที่คุณพี่ว่า"
10035010-69 = "เพราะว่า... เราได้คำร้องฉบับนั้นมาตอนคุณพี่ไม่อยู่พอดีน่ะค่ะ"
10035010-70 = "นี่เธอ...!"
10035010-71 = "แต่ว่านี่เป็นการทำเพื่อคุณพี่นะคะ"
10035010-72 = "ว่าไงนะ?"
10035010-73 = "ที่ผ่านมาคุณพี่เอาแต่สอบสวนอาชญากร แล้วก็ต้องทำงานเอกสารแบบไม่เว้นวันหยุดด้วยนี่คะ"
10035010-74 = "ถ้าไม่ได้พักผ่อนให้พอเพียง คุณพี่จะล้มป่วยเอานะคะ"
10035010-75 = "ก็เลยส่งฉันไปสวนน้ำงั้นเรอะ...?"
10035010-76 = "ใช่แล้วค่ะ!"
10035010-77 = "ถึงไลฟ์การ์ดจะไม่ใช่งานง่าย แต่ทางสวนน้ำก็คงไม่ฝากงานสำคัญให้คนนอกทำหรอกค่ะ"
10035010-78 = "นี่เป็นแค่คำร้องเพื่อสร้างความตระหนักว่าสวนน้ำกำลัง 'ได้รับความร่วมมือกับสถาบันฝึกตำรวจวัลคิรี่' น่ะค่ะ"
10035010-79 = "เพราะงั้นแค่ไปเที่ยวเล่นและพักผ่อนกลับมาก็พอค่ะ!"
10035010-80 = "อ๊าย! จะมีลูกน้องคนไหนที่ทำเพื่อเจ้านายได้ขนาดนี้กันคะ!"
10035010-82 = "ยกเลิกเดี๋ยวนี้เลย"
10035010-83 = "คนเป็นหัวหน้ากรมฯ ไม่ได้มีเวลาว่างพอจะไปสวนน้ำได้หรอกนะ"
10035010-84 = "ตัดฉันออกแล้วเพิ่มคนจากสำนักรักษาความปลอดภัยไปซะ"
10035010-88 = "รอเดี๋ยวก่อนสิคะคุณพี่"
10035010-89 = "จะให้ทำแบบนั้นจริงๆ เหรอคะ?"
10035010-90 = "หมายความว่ายังไง...?"
10035010-91 = "รู้กันแค่พวกเรานะคะ... ฉันว่านี่เป็นโอกาสที่ดีของคุณพี่เหมือนกันนะคะ"
10035010-92 = "...?"
10035010-94 = "ก็ตอนแรกที่คุณพี่เข้าวัลคิรี่มา คุณพี่สมัครเข้าสำนักรักษาความปลอดภัยไม่ใช่เหรอคะ?"
10035010-95 = "นี่เธอ... รู้เรื่องนั้นได้ยังไง?"
10035010-96 = "ก็... ถึงจะไม่เท่าคุณพี่ แต่รองหัวหน้ากรมฯ ก็มีสิทธิ์ในการอ่านเอกสารอยู่นะคะ"
10035010-97 = "ฉันก็แค่หยิบมาอ่านตอนเบื่อๆ น่ะค่ะ"
10035010-98 = "เอาเถอะค่ะ ถึงตอนนี้จะอยู่ในตำแหน่งหัวหน้ากรมฯ..."
10035010-99 = "แต่ถ้ายังหลงเหลือความตั้งใจในตอนนั้นอยู่ละก็ ฉันว่าใช้โอกาสนี้เปิดประสบการณ์ดูก็ไม่เลวนะคะ"
10035010-100 = "ถ้าไม่ใช่ตอนนี้ คุณพี่จะได้ทำงานบริการประชาชนอีกเมื่อไรล่ะคะ!"
10035010-104 = "ฮึ"
10035010-105 = "?"
10035010-106 = "โคโนกะ ทำอะไรดูตำแหน่งซะบ้างสิ"
10035010-107 = "คะ?"
10035010-108 = "ตอนเข้ามาเรียนที่นี่ จริงอยู่ที่ฉันอยากเข้าสำนักรักษาความปลอดภัย แต่ฉันก็ล้มเลิกความตั้งใจนั้นไป#nนานแล้ว"
10035010-109 = "หน้าฉันดุอย่างนี้ ต่อให้ไปทำงานช่วยเหลือชาวเมืองก็ไม่เกิดผลดีขึ้นมาหรอก"
10035010-110 = "ฉันไม่เหลือความปรารถนาในตอนนั้นแล้วละ"
10035010-111 = "ฉันจะส่งคำร้องให้เบื้องบนพิจารณารายชื่อใหม่อีกครั้ง"
10035010-112 = "ฉันจะจัดการเรื่องนี้เอง เธอรับรู้ไว้อย่างนี้ก็แล้วกัน"
10035010-114 = "ถึงจะพูดอย่างนั้นก็เถอะ..."
10035010-115 = "แต่เรื่องนี้เสร็จสิ้นไปแล้วนะคะ"

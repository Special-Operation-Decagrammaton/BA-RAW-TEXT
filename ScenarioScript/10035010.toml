10035010-117 = "ก็มีการอนุมัติทั้งบุคลากรและงบประมาณไปเรียบร้อยแล้วค่ะ"
10035010-118 = "นี่ไงคะ หนังสือคำสั่งให้ไปปฏิบัติงาน เพิ่งออกมาวันนี้เลยค่ะ!"
10035010-119 = "ว่าไงนะ...!"
10035010-122 = "มันเป็นเรื่องลับสุดยอดน่ะ..."
10035010-123 = "อะไรกัน ทำเหมือนจะบอกแต่ก็ไม่บอก"

[translation]
10033070-1 = "ตอนที่ 7;เหตุผลของแต่ละคน"
10033070-3 = "ฮึ่ม เด็กเกเฮนน่านี่ไม่ธรรมดากันจริงๆ"
10033070-4 = "นั่นน่ะสิ พวกเราอุตส่าห์เหน็ดเหนื่อย 'ทำความสะอาด' พื้นจุดชมวิวไว้"
10033070-5 = "แต่เด็กพวกนั้นทำให้พื้นลื่นไปหมดแล้วทำเป็นสนามเด็กเล่นเฉยเลย"
10033070-6 = "ถึงได้บอกว่า \"คนที่เก่งที่สุดคือคนที่สนุกกับสิ่งนั้นที่สุด\" ไงล่ะ"
10033070-7 = "ใช่ ถ้าเป็นงานเทศกาลก็ต้องสนุกเข้าไว้ แต่ตอนที่บอกว่าจะติดตั้งระเบิดตรงสุดทาง ตอนนั้นฉันใจหวิวเลยละ"
10033070-8 = "เพราะถ้าพื้นแตกหรือพังขึ้นมา เราคงต้องปวดหัวกับการตามเก็บกวาดน่าดูเลย"
10033070-15 = "ว่างกันนักรึไง! เอาแต่พูดชมเหมือนว่าเด็กพวกนั้นสุดยอดอย่างนั้นละ!"
10033070-16 = "อ๊ะ หัวหน้า! อยู่ตรงนั้นเองสินะคะ! กลับมาแล้วเหรอคะ?"
10033070-17 = "แล้วแผนการ <ปล่อยปีศาจน่ากลัวแล้วทำให้พวกเกเฮนน่าขนหัวลุกระหว่างการทดสอบความกล้า> เป็นยังไงบ้างคะ?"
10033070-18 = "ถอนกำลังมาแล้วน่ะสิ!"
10033070-19 = "ตอนที่กลับมา ฉันแอบเห็นเด็กพวกนั้นตื่นเต้นจนรัวกระสุนใส่ปีศาจแบบไม่ยั้งเลยค่ะ ไม่ได้มีทีท่าว่าจะกลัวกันเลยด้วย"
10033070-20 = "เหมือนกับเล่นจุดดอกไม้ไฟอย่างนั้นละค่ะ! ระเบิดปุ้งปั้งแล้วก็สว่างวิบวับเลย!"
10033070-21 = "จริงสิ ตอนที่มีนักเรียนมาขุดบ่อออนเซ็นอย่างกะทันหันที่โรงศิลปะแล้วบอกว่าจะเอาพวกเราไปเป็น#nของตกแต่งออนเซ็นน่ะ ตอนนั้นฉันกลัวมากเลย..."
10033070-22 = "การรับมือของเรากับทางนั้นเป็นคนละเรื่องกันเลย ต้องบอกว่าทางนั้นคิดใช้วิธีที่เราจินตนาการไม่ถึง#nเลยละ... สมแล้วที่เป็นเด็กเกเฮนน่า เล่นใหญ่เกินคาดทุกครั้งเลย"
10033070-23 = "ถ้าฉันทำขนมปังแยมคูซายะอีก เธอจะกินมั้ย?"
10033070-24 = "จะกินทำไมล่ะ!! แค่ตอนทำก็เหมือนจะสติหลุดอยู่แล้ว! จะให้กินด้วยเนี่ยนะ! ฟุดฟิด ฟุดฟิด... อึกก... กลิ่นยังติดเสื้ออยู่เลย"
10033070-25 = "แต่ก็มีคนหนึ่งที่กินอย่างเอร็ดอร่อยเลยนะ..."
10033070-26 = "คนแบบนั้นจะมีอยู่สักกี่คนบนโลกนะ... แล้วโลกนี้จะมีอาหารอะไรบ้างหรือเปล่าที่คนคนนั้นกินไม่ได้น่ะ?"
10033070-32 = "พวกเธอนี่! ฉันว่าอย่างนู้นบ้างแหละ ฉันว่าอย่างนี้บ้างแหละ ว่างนักรึไงถึงได้มานั่งแชร์ความทรงจำกัน#nแบบนี้!"
10033070-33 = "พวกเธอชิลกันเกินไปรึเปล่า! ลองช่วยกันคิดหน่อยสิ! ตอนนี้ปัญหาคืองานต้นไม้ศักดิ์สิทธิ์ที่จะจัดในวัน#nพรุ่งนี้นะ"
10033070-34 = "งานต้นไม้ศักดิ์สิทธิ์เป็นเทศกาลของเฮียกคิยาโคที่จัดแค่ปีละครั้งเท่านั้น... และในแง่หนึ่งก็ถือว่า เป็นเทศกาลของปีศาจอย่างพวกเราด้วย!"
10033070-35 = "แค่เพราะพวกเกเฮนน่ามาเที่ยวที่นี่ ก็ถึงกับต้อง 'จัดงานขึ้นมาอีกครั้ง' เลยอย่างนั้นเหรอ! นั่นมันงานต้นไม้ศักดิ์สิทธิ์ของพวกเรานะ!"
10033070-36 = "ถ้าต้นไม้ศักดิ์สิทธิ์เป็นคนละก็ ป่านนี้คงเอากำปั้นทุบอกตัวเองและนั่งถอนหายใจแล้วละ!"
10033070-38 = "อืม... แต่ถ้ามองอีกแง่หนึ่ง พวกเด็กเกเฮนน่าก็เป็นเหมือนนักท่องเที่ยวที่มาสนุกกับงานเทศกาลของ#nเฮียกคิยาโคนะคะ"
10033070-39 = "เฮียกคิยาโคของเราเป็นโรงเรียนที่ต้อนรับนักท่องเที่ยวอยู่แล้วไม่ใช่เหรอคะ?"
10033070-40 = "แบบนี้ยิ่งเป็นการโปรโมตเรื่อง 'โชคลาภมหาศาล บันดาลให้ทุกสิ่งสำเร็จ' ของต้นไม้ศักดิ์สิทธิ์ให้มาก#nขึ้นอีกนะคะ..."
10033070-41 = "รู้อะไรไหมคะ? ถ้าจัดงานจนมีผู้คนแวะไปที่นั่นอีกครั้ง ต้นไม้ศักดิ์สิทธิ์อาจจะดีใจก็ได้นะ"
10033070-46 = "นี่พวกเธออยู่ทีมเดียวกับฉันรึเปล่าเนี่ย!"
10033070-51 = "โธ่ หัวหน้า อย่าโมโหเกินไปเลยค่ะ"
10033070-53 = "คอยดูได้เลย... ในงานต้นไม้ศักดิ์สิทธิ์พรุ่งนี้ ฉันจะประกาศให้ทุกคนรู้เลยว่าพวกเราจะเอางานเทศกาล#nของปีศาจกลับคืนมา!"
10033070-55 = "เดี๋ยวนะคะหัวหน้า ถ้าทำแบบนั้น... ก็เท่ากับว่าเราเข้าไปขัดขวางงานเทศกาลของพวกเราเองน่ะสิ... แบบนั้นจะไม่เป็นไรเหรอคะ?"
10033070-56 = "ฉันรู้สึกลางไม่ค่อยดีเท่าไรเลยค่ะ เหมือนกับว่าเราจะไปขายหน้ากันกลางงานอย่างนั้นแหละ..."
10033070-58 = "ไม่เป็นไรหรอกน่า! ยังไงงานต้นไม้ศักดิ์สิทธิ์พรุ่งนี้ก็เป็นงานที่จัดขึ้นเป็นรอบที่ 2 อยู่แล้ว ต่อให้งานจะออกมาเละไม่เป็นท่าก็ไม่เป็นปัญหาอะไรหรอก!"
10033070-59 = "เป้าหมายของพวกเราคือทำให้พวกเกเฮนน่าได้รู้ว่าเทศกาลของเฮียกคิยาโคต้องเป็นของเฮียกคิยาโค! และก็เป็นของพวกเราชาวปีศาจด้วย!"
10033070-61 = "อ่า ถ้าแบบนั้นก็ถูกใจฉันอยู่นะคะ เทศกาลของเฮียกคิยาโคต้องเป็นของเฮียกคิยาโค และก็เป็นของ#nพวกเราชาวปีศาจด้วย!"
10033070-62 = "อืม อีกนัยหนึ่งเหมือนกับว่า... ที่ผ่านมาเราเอาแต่โดนเด็กเกเฮนน่าเล่นงานอย่างนั้นเลยนะคะ?"
10033070-63 = "งั้นพรุ่งนี้ก็มาออกแรงสู้อีกนิดแล้วกัน"
10033070-64 = "จะว่าไป ได้ยินว่าคุณชิเซะจะมาเข้าร่วมงานต้นไม้ศักดิ์สิทธิ์พรุ่งนี้ด้วยนะ~ ตื่นเต้นจัง~"
10033070-65 = "ดีจังเลย~ จะได้เห็นการเซ่นไหว้บนเวทีด้วยมั้ยนะ~"
10033070-70 = "พวก! เธอ! นี่! นะ! เอาให้มันน้อยๆ หน่อยเหอะ!!!"
10033070-78 = "ขอบคุณที่ทำงานหนักนะคะคุณครู"
10033070-79 = "โล่งอกไปทีนะคะที่นักเรียนจากเกเฮนน่าเข้านอนกันได้แล้ว"
10033070-80 = "[s1] \"ครูคิดว่าจะมีใครออกมาเล่นปาหมอนใส่กันซะอีก...\"\n[s2] \"นึกว่าจะมีคนตะโกนว่าเป็นอิสระแล้ว! แล้วก็ออกมาเดินเล่นซะอีก...\""
10033070-83 = "สงสัยทุกคนจะเหนื่อยกันมากน่ะค่ะ"
10033070-84 = "แต่ยังไงเราก็ละเลยการลาดตระเวนยามดึกไม่ได้อยู่ดีค่ะ"
10033070-85 = "[s] \"วันนี้อุมิกะทำงานไกด์ได้ดีมากเลยนะ\""
10033070-86 = "ไม่หรอกค่ะ กลายเป็นว่าฉันให้ทุกคนได้เห็นด้านที่ไม่ดีมากกว่า"
10033070-87 = "ถ้าเป็นไปได้... ฉันอยากจะลบเวลาที่ผ่านมาให้หมดเลยค่ะ..."
10033070-88 = "ไม่มีกิจกรรมไหนเลยที่ทำเวลาได้ตามกำหนดการเป๊ะๆ จนแผนการเราเละตุ้มเป๊ะไปหมด..."
10033070-89 = "ถ้าท่านประธานอยู่ด้วยละก็... คงไม่เกิดเรื่องแบบนี้..."
10033070-90 = "[ns3] \"เคยได้ยินคำนี้รึเปล่า?\"\n[ns4] \"แผนการมีไว้เพื่อผิดแผนนะ...\""
10033070-93 = "คะ... คะ? หมายความว่ายังไงคะ...?"
10033070-94 = "ไว้ถึงเวลาฉันจะรู้เองงั้นเหรอคะ? อ่า... ยิ่งพูดยิ่งไม่เข้าใจเลย..."
10033070-95 = "[s] \"แต่บางครั้งแผนของงานเทศกาลก็มีคลาดเคลื่อนนี่นา\""
10033070-98 = "หมายถึงแผนของงานเทศกาลเหรอคะ..."
10033070-99 = "ใช่ค่ะ พอมาคิดดูแล้วก็มีหลายครั้งที่งานเทศกาลออกมาไม่ตรงตามแผนที่วางไว้ค่ะ"
10033070-100 = "ตรงหน้างานมันมักจะเกิดเหตุการณ์ไม่คาดฝันขึ้นมาเสมอ สิ่งสำคัญก็เลยจะอยู่ที่การจัดการกับ#nปัญหาพวกนั้นค่ะ"
10033070-101 = "แต่ว่า..."
10033070-102 = "ที่ผ่านมาฉันยังไม่เคยรับมือกับเหตุการณ์ที่ไม่คาดฝันได้อย่างจริงจังเลยค่ะ"
10033070-103 = "[s] \"เป็นคำตอบที่คาดไม่ถึงเลยแฮะ\""
10033070-104 = "ค่ะ เพราะปกติแล้วเรื่องแบบนั้นเป็นความรับผิดชอบของท่านประธานน่ะค่ะ"
10033070-105 = "ฉันน่าสมเพชใช่ไหมล่ะคะ? ฉันเป็นคนชอบงานเทศกาล และตั้งใจกับการวางแผนและเตรียมตัวเพื่อ#nงานเทศกาลแท้ๆ..."
10033070-106 = "แต่กับเรื่องที่สำคัญและยากที่สุดของงานเทศกาลแล้ว ฉันเอาแต่พึ่งพาท่านประธานเหมือนเด็กๆ เลยละค่ะ..."
10033070-107 = "ฉันรู้ดีว่าตอนนี้ฉันต้องพยายามให้มากขึ้น แต่ในใจก็ยัง..."
10033070-108 = "ยังคิดว่าอยากให้ท่านประธานอยู่ตรงนี้ด้วย ฉันถึงจะมั่นใจขึ้นมาน่ะค่ะ..."
10033070-109 = "[s5] \"ไม่แปลกหรอกนะ ก็อุมิกะได้รับหน้าที่ยิ่งใหญ่เลยนี่นา\"\n[s6] \"แต่ยังไงก็ยังอยากทำให้ดีที่สุดใช่มั้ย?\""
10033070-112 = "ฮืออ..."
10033070-114 = "ย้าก! โจมตีเลย!"
10033070-115 = "[ns] \"เฮือก?!\""
10033070-117 = "คะ... คุณคิราระ? คุณเอริกะ?"
10033070-121 = "ว่าไง ว่าไง~! พอดีเห็นว่าเดินคอตกหมดแรงกันอยู่น่ะ!"
10033070-122 = "ทำแบบนั้นได้ไง ถ้ามีใครบาดเจ็บขึ้นมาจะทำยังไงน่ะ"
10033070-123 = "ไม่หรอกน่า! ทำไมถึงดูหมดแรงเหมือนผักต้มอย่างนี้ล่ะ?"
10033070-124 = "คือว่า..."
10033070-130 = "ที่ผ่านมาก็ทำหน้าที่ได้ดีเลยนี่นา?"
10033070-131 = "ฉันไม่ค่อยแน่ใจเลยค่ะ... วันนี้ไม่มีกิจกรรมไหนเป็นไปตามแผนการสักอย่าง แถมเวลาก็ล่าช้าไปจาก#nตารางด้วย..."
10033070-132 = "อืม... จะให้ฉันพูดคำนี้เองก็ออกจะน่าอายไปหน่อย แต่ว่า..."
10033070-133 = "เด็กที่มาทัศนศึกษาคือเด็กจากเกเฮนน่าเลยนะ ทำได้เท่านี้ฉันว่าก็เก่งมากแล้วละ"
10033070-134 = "ใช่แล้ว งานนี้ยากกว่าจับปูใส่กระด้งเป็นร้อยเท่า! มั่นใจในตัวเองหน่อยนะ พี่ไกด์!"
10033070-135 = "ต้นไม้ศักดิ์สิทธิ์ที่จุดชมวิวก็สวยมาก ตอนทำงานศิลปะก็สนุก แถมอาหารเย็นก็อร่อยอีก!"
10033070-136 = "ส่วนการทดสอบความกล้า... อืม..."
10033070-137 = "กะ... กะไว้แล้วเชียว!"
10033070-138 = "ไม่หรอก เรื่องนั้นพวกเราต่างหากที่ต้องขอโทษน่ะ"
10033070-142 = "ที่จริงฉันก็แค่..."
10033070-143 = "อยากทำให้ออกมาดีน่ะค่ะ อยากให้... ทุกอย่างออกมาดีน่ะ"
10033070-144 = "[s] \"อืม ครูเข้าใจมากๆ เลย\""
10033070-145 = "(ถ้าท่านประธานอยู่ด้วยก็คง...)"
10033070-146 = "แต่มันก็เป็นไปไม่ได้อยู่แล้วไม่ใช่เหรอที่จะทำให้ทุกๆ อย่างมันออกมาสมบูรณ์แบบ 100% น่ะ?"
10033070-147 = "ใช่ เว้นแต่ว่าเราจะรู้ทุกเหตุการณ์ที่จะเกิดขึ้นล่วงหน้าน่ะ"
10033070-148 = "วันนี้ฉันสนุกออกนะ! พรุ่งนี้ก็น่าจะสนุกเหมือนกัน! คิดแบบนี้ไม่ดีกว่าเหรอ?"
10033070-149 = "ขอบคุณที่ช่วยพูดให้กำลังใจนะคะ..."
10033070-150 = "อืม... แต่ก็ใช่ว่าเราจะพูดไปงั้นๆ นะ"
10033070-151 = "จะยังไงก็เถอะ วันนี้ทั้งครูและอุมิกะต้องเหนื่อยกันมากเลยนะ แถมยังต้องมาลาดตระเวนกันในเวลา#nแบบนี้อีก"
10033070-152 = "อะฮ่าฮ่าฮ่า! เหมือนทีมไกด์มืออาชีพเลยนะ!"
10033070-157 = "[ns] \"ชมกันเกินไปแล้วนะ แต่ว่า...\""
10033070-158 = "เอ๋? จู่ๆ ก็เป็นอะไรไปเหรอครู?"
10033070-159 = "[ns] \"ตอนนี้คือเวลาเคอร์ฟิวนะ เด็กๆ เกเฮนน่า\""
10033070-164 = "อ๊ะ!"
10033070-165 = "ว้าย~ โดนจับได้ซะแล้ว~ หนีกันเถอะ~!"
10033070-170 = "[ns] \"หยุดอยู่ตรงนั้นเลยนะ ทั้งสองคนเลย~\""
10033070-173 = "(......)"
10033070-174 = "(เว้นแต่ว่าเราจะรู้ทุกเหตุการณ์ที่จะเกิดขึ้นล่วงหน้างั้นเหรอ...?)"
10033070-175 = "(งั้นถ้าเรารู้ล่วงหน้าแล้วเตรียมตัวไว้ก่อน...)"

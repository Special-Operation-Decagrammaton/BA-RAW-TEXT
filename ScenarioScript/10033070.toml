10033070-53 = "3;아라타;05;두고 보자고……. 내일의 신목제에서, 반드시 우리들 망량즈의 축제를 되찾아 오겠다고 선언해 줄 테니까 말이야!\n#3;em;[스팀]\n#3;hophop"
10033070-54 = "#all;hide"
10033070-55 = "4;망량즈 B;00\n2;망량즈 A;04;그런데 리더. 그거…… 어떤 의미로는 우리들의 축제를 우리가 방해하는 셈이 되는데…… 괜찮은 겁니까?"
10033070-56 = "4;망량즈 B;01;뭔가, 살짝 느낌이 좋지 않다고 할지, 구체적으로는 오히려 우리가 더 큰 망신을 당할 것 같다고 할지…….\n#4;em;…"
10033070-57 = "#all;hide"
10033070-58 = "3;아라타;03;괜찮아! 어차피 내일의 신목제는 결국 재현 행사니까, 어느 정도 엉망이 된다 해도 의미상 큰 문제는 없을 거야!\n#3;jump"
10033070-59 = "3;아라타;08;우리의 목적은, 백귀야행의 축제는 백귀야행의 것이라는 걸! 나아가 우리 망량즈의 것이라는 걸! 게헨나 녀석들에게 확실하게 보여 주자는 거니까!\n#3;em;[!]"
10033070-60 = "#all;hide"
10033070-61 = "4;망량즈 B;00\n2;망량즈 A;03;아, 그건 조금 마음에 드네요. 백귀야행의 축제는 백귀야행의 것…… 나아가 우리 망량즈의 것…….\n#2;em;[반짝]"

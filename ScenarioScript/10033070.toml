10033070-2 = "2;망량즈 A;03\n4;망량즈 B;05\n#2;a\n#4;a\n#2;h\n#4;h\n#wait;1000"
10033070-3 = "2;망량즈 A;03;이야– 게헨나 녀석들, 보통이 아니었지?\n#2;em;[재잘]"
10033070-4 = "4;망량즈 B;05;그러게 말이야. 간만에 힘들여서 전망대 바닥을 '청소'해 뒀는데."
10033070-5 = "4;망량즈 B;04;오히려 바닥 전체를 미끌미끌하게 만들어서 놀이터로 만들어 버릴 줄은.\n#4;em;[땀]"
10033070-6 = "2;망량즈 A;03;그런 말도 있잖아? 가장 강한 것은 사실 즐기는 자라고."
10033070-7 = "4;망량즈 B;03;맞아, 맞아. 애초에 축제란 건 즐기는 거니까 말이지. 아, 그래도 사출 폭탄을 설치하겠다고 했을 때는 조금 가슴이 철렁했어.\n#4;em;[반응]"
10033070-8 = "2;망량즈 A;04;만에 하나 바닥에 흠이 나거나 깨지기라도 하면, 뒷처리가 골치 아파졌을 테니까 말야……."

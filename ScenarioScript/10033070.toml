10033070-15 = "3;아라타;05;뭘 한가하게 그 녀석들 대단해, 이 녀석들 엄청나~ 같은 이야기 하고 있는 거야!\n#3;jump\n#3;em;[빠직]"
10033070-16 = "3;아라타;05\n5;망량즈 B;02\n4;망량즈 A;02;아, 리더! 거기 있었군요! 이제 돌아오는 겁니까?\n#3;m1\n#4;al\n#5;al\n#4;em;[반응]"
10033070-17 = "4;망량즈 A;02\n5;망량즈 B;03;<담력 시험 코스에서 일부러 엄청난 요괴를 보여줘서, 게헨나 녀석들에게 뜨거운 맛을 보여주자! 계획>은 어떻게 됐어요?\n#5;em;[?]"
10033070-18 = "3;아라타;04;……작전상 후퇴야!\n#3;stiff"
10033070-19 = "4;망량즈 A;02;돌아오면서 살짝 봤는데, 그 녀석들 겁먹기는커녕 신이 나서 온갖 화기들을 있는 대로 쏴대던데요.\n#3;dl\n#4;m2\n#5;m4\n#4;em;[반응]"
10033070-20 = "5;망량즈 B;03;어떤 의미로는 불꽃놀이 같았죠! 막 펑펑 터지고 번쩍거리고 하는 게.\n#5;em;[반짝]"
10033070-21 = "4;망량즈 A;02;아, 그래도 공예 공방에서 다짜고짜 온천을 파 내려간 다음, 우리를 온천장의 장식으로 쓰겠다는 말은 솔직히 무서웠어…….\n#4;em;[땀]"
10033070-22 = "5;망량즈 B;04;대응 수준의 스케일이 다르다고 할까, 우리로서는 도저히 상상도 못 할 방법으로 접근해 온다고 할까……. 역시 게헨나네. 무엇을 상상하든, 그 이상을 보여 줘.\n#5;stiff"
10033070-23 = "4;망량즈 A;05;쿠사야 잼 토스트, 다시 만든다면 먹을 거야?"
10033070-24 = "5;망량즈 B;04;내가 왜?! 스스로 만들면서도 정신이 어딘가로 날아가 버릴 것 같았는데! 킁킁. 으으, 아직도 옷에 냄새가 배어 있는 것 같아…….\n#5;em;[?!]\n#5;shake"
10033070-25 = "4;망량즈 A;01;그런데도 그걸 왠지 맛있게 먹던 녀석이 있었지…….\n#4;em;[땀]"
10033070-26 = "5;망량즈 B;04;그건 일종의 경이라고 해야 하나……. 그 녀석이 먹지 못하는 음식이라는 게 존재하기는 하는 걸까?"

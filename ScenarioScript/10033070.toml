[translation]
10033070-1 = "第7話;家家有本難念的經"
10033070-3 = "哎呀～格黑娜的傢伙們真不簡單呢？"
10033070-4 = "我也有同感。#n虧我還使勁「打掃」了觀景台的地板……"
10033070-5 = "結果他們反而把整片地板都弄得滑溜溜的，簡直就像遊樂場一樣。"
10033070-6 = "不是有句話這麼說嗎？#n懂享受的人才是最厲害的。"
10033070-7 = "沒錯沒錯，慶典本來就是用來享受的。#n啊，不過他們說要裝什麼炸彈的時候，我還真有點緊張。"
10033070-8 = "萬一地板上出現破損或裂痕，事後處理可是很頭痛的啊……"
10033070-15 = "怎麼悠悠哉哉地在說「那些傢伙們真了不起」、「這些傢伙們真厲害」的話啊！"
10033070-16 = "啊，隊長！原來你在啊！剛回來嗎？"
10033070-17 = "「在試膽大會中用可怕的妖怪，給格黑娜那些傢伙們一點刺激吧！」計畫怎麼樣了？"
10033070-18 = "……戰略性撤退了！"
10033070-19 = "我在回來的路上看了一下，那些傢伙們不僅不害怕，甚至還興奮地火力全開。"
10033070-20 = "某種程度上有點像煙火吧！一直爆炸又閃亮亮的。"
10033070-21 = "啊，不過在工房不管三七二十一地開挖溫泉，#n還說要把我們當成溫泉浴場的裝飾……老實講真的挺可怕的。"
10033070-22 = "該說是應對的規模不同，還是說他們總是會採取我們無法想像的做法呢……#n真不愧是格黑娜，永遠能讓人大開眼界。"
10033070-23 = "那個臭魚醬吐司，要是再做一次的話你會吃嗎？"
10033070-24 = "誰要吃那種東西啊！？我自己做著做著都差點昏過去了！#n現在衣服上好像還有味道……"
10033070-25 = "可是那個傢伙還能吃得津津有味的……"
10033070-26 = "這也是一種奇葩吧……世界上真的存在那傢伙吃不了的東西嗎？"
10033070-32 = "啊啊啊！為什麼在有說有笑地回憶往事！"
10033070-33 = "你們是不是過得太安逸了啊！#n給我仔細想想！明天舉行神木祭可是大問題耶！"
10033070-34 = "神木祭本來是百鬼夜行一年一度的慶典……#n某種意義上來說，是我們妖怪劇團的慶典！"
10033070-35 = "明明是我們妖怪劇團的神木祭，#n結果居然因為格黑娜的那些傢伙們來玩，就打算以「重現」的名義再次舉行！"
10033070-36 = "要是神木有手的話，現在應該已經在捶地嘆氣了！"
10033070-38 = "唔……不過格黑娜的學生們，其實也能算是享受百鬼夜行慶典的觀光客吧？"
10033070-39 = "我們百鬼夜行……本來不就是非常歡迎觀光客的學園嗎？"
10033070-40 = "再加上，現在神木祭好像漸漸給人「運勢亨通！萬事大吉！」的感覺……"
10033070-41 = "而且你想想看哦？從神木的立場來看……#n能多一個讓大家來看看自己、記得自己的機會，說不定也是件開心的事吧？"
10033070-46 = "如果連你們也無法理解，叫我該怎麼辦！"
10033070-51 = "哎呀，隊長你別那麼生氣嘛。"
10033070-53 = "你們等著瞧……我一定會在明天的神木祭上，宣示重新奪回我們妖怪劇團的慶典！"
10033070-55 = "但是隊長，那個……#n這樣某種意義上來說，我們是要自己妨礙自己的慶典……沒問題嗎？"
10033070-56 = "有種不太好的感覺……#n總覺得反而會自取其辱……"
10033070-58 = "沒關係！#n反正明天的神木祭本來就是「重現」的活動，就算變得有點混亂，問題也不大！"
10033070-59 = "我們的目的是要告訴大家，百鬼夜行的慶典屬於百鬼夜行──也就是妖怪劇團！#n要好好給格黑娜的那些傢伙們一點顏色瞧瞧！"
10033070-61 = "啊，這點我倒是同意。#n百鬼夜行的慶典屬於百鬼夜行……也就是我們妖怪劇團……"
10033070-62 = "雖然目前為止，我們幾乎是一直被格黑娜的那些傢伙們打著跑就是了。"
10033070-63 = "那明天就多加把勁吧？"
10033070-64 = "這麼說來，明天知世大人也會親自參加神木祭對吧～真期待～"
10033070-65 = "能看到他登上舞台的樣子嗎～真棒～"
10033070-70 = "所！以！我！說！你們能不能把皮繃緊一點！！！"
10033070-78 = "啊，辛苦了，老師。"
10033070-79 = "跟一開始擔心的情況相比，格黑娜的學生們似乎都睡得很好，真是太好了。"
10033070-80 = "[s1]「比如血流成河的枕頭大戰……」\n[s2]「或是高喊著『自由！！！』在晚上夜遊之類的……」"
10033070-83 = "看來大家似乎都玩累了呢。"
10033070-84 = "不過夜間巡查也不能因此就隨便了事。"
10033070-85 = "[s]「海花擔任導覽員也辛苦了。」"
10033070-86 = "別這麼說……我反而只讓大家看見了最糟糕的樣子。"
10033070-87 = "如果可以的話……我真想抹去這段時間……"
10033070-88 = "沒有按照行程進行，所有計劃都被打亂……"
10033070-89 = "要是社長在的話……就不會……"
10033070-90 = "[ns3]「世界上……有這樣的一句話。」\n[ns4]「計畫，就是為了被打亂而存在的……」"
10033070-93 = "咦，咦咦？#n這是什麼意思呢……？"
10033070-94 = "時候到了就會知道？#n越來越搞不清楚了呢……？"
10033070-95 = "[s]「慶典的計畫不是也經常被打亂嗎？」"
10033070-98 = "慶典的計畫……"
10033070-99 = "說的也是。#n回頭想想，為慶典所制定的計劃……確實常常不如人意。"
10033070-100 = "現場時常會出現突發狀況，因此該如何應對也十分重要。"
10033070-101 = "但是……"
10033070-102 = "……我至今為止，還沒有實際處理過現場的突發情況。"
10033070-103 = "[s]「這我倒是沒想到。」"
10033070-104 = "因為那種時候，通常都會由社長出面處理。"
10033070-105 = "我……很讓人失望對吧？#n明明因為喜歡慶典，在計劃和準備都付出了很多努力……"
10033070-106 = "結果卻將慶典中最重要、最辛苦的部分……無意間賴在社長的身上……"
10033070-107 = "明明知道自己應該有所作為，但心底的某個地方……"
10033070-108 = "卻還是依然想著，要是社長在這裡就好了……"
10033070-109 = "[s5]「突然必須承擔這樣的工作，我覺得會這麼想也是很正常的。」\n[s6]「海花也沒有想撒手不管的意思吧？」"
10033070-112 = "這……"
10033070-114 = "有破綻！"
10033070-115 = "[ns]「嗚哇！？」"
10033070-117 = "綺，綺羅羅同學？繪里香同學？"
10033070-121 = "呀齁！怎麼無精打采的呢！"
10033070-122 = "這樣要是讓人家受傷了怎麼辦……"
10033070-123 = "哎呀，不會啦！不過為什麼垂頭喪氣的？"
10033070-124 = "那是因為……"
10033070-130 = "目前為止都做得挺棒的呀？"
10033070-131 = "……真的能這麼說嗎。#n今天幾乎沒有依照計畫進行，行程不斷有所延誤……"
10033070-132 = "唔嗯……雖然這種話由我來說可能有點好笑。"
10033070-133 = "……你面對的可是我們格黑娜的孩子哦？#n能做到這個程度……我覺得已經非常厲害了。"
10033070-134 = "沒錯沒錯！拿出自信來吧，導覽員姐姐！"
10033070-135 = "在觀景台看的神木很壯觀，製作工藝品也很好玩，連晚餐也很好吃！"
10033070-136 = "還有試膽大會也……呃……"
10033070-137 = "果，果然一言難盡嗎！？"
10033070-138 = "抱歉，是我們不好。"
10033070-142 = "我只是……"
10033070-143 = "只是……想盡可能做得更好。#n真的……只是這樣而已。"
10033070-144 = "[s]「嗯……我能理解。」"
10033070-145 = "（要是社長在的話，一定……）"
10033070-146 = "不過你想想看！要把每件事都做到100%完美，幾乎是不可能的不是嗎？"
10033070-147 = "沒錯，除非能夠事先知道會發生什麼事，否則實際上就是這樣的。"
10033070-148 = "我很喜歡今天哦！明天也一定會很有趣的！那不就很好了嗎？"
10033070-149 = "謝謝你能這麼說……哪怕只是為了安慰我……"
10033070-150 = "唔嗯，我們沒有那個意思啦。"
10033070-151 = "總之老師跟海花都辛苦了。這種時間還要巡查。"
10033070-152 = "啊哈哈哈！這才是所謂的導覽組嘛！"
10033070-157 = "[ns]「你們客氣了。不過話又說回來……」"
10033070-158 = "嗯？怎麼了嗎，老師？"
10033070-159 = "[ns]「現在不是超過門禁時間了嗎？格黑娜的兩位？」"
10033070-164 = "哎呀。"
10033070-165 = "哇啊～被發現了～快逃～！"
10033070-170 = "[ns]「給我站住～你們這些搗蛋鬼～」"
10033070-173 = "（……）"
10033070-174 = "（如果能夠事先知道會發生什麼事……？）"
10033070-175 = "（只要能提前知道會發生，並做好準備……）"
10033070-176 = "（就能不再像今天一樣，把行程搞得一團亂了嗎？）"

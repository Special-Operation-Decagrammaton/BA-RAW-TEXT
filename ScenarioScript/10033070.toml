10033070-32 = "3;아라타;05;크아앗! 뭘 추억담 나누듯 한가하게 그랬었지, 이랬었지 말랑말랑한 이야기나 하고 있는 거야!\n#3;hophop\n#3;em;[!]"
10033070-33 = "3;아라타;05;너희들! 너무 안이해진 것 아니냐고! 생각해 보란 말이야! 애초에 신목제를 내일 한다는 것부터가 문제잖아!\n#3;stiff"
10033070-34 = "3;아라타;05;신목제는 원래 1년에 한 번만 이루어지는 축제이자 백귀야행의 축제…… 어떤 의미로는 우리 망량즈의 축제란 말야!\n#3;jump"
10033070-35 = "3;아라타;05;그런 우리 망량즈의 신목제를, 게헨나 녀석들이 놀러 왔다는 이유를 들어, '재현'이라는 명목을 붙여 다시 개최하려 하다니!"
10033070-36 = "3;아라타;05;신목에게 두 팔이 달려 있었다면, 지금쯤 땅을 치며 한숨을 내쉬고 있겠다!\n#3;hophop\n#3;em;[빠직]"
10033070-37 = "#all;hide"
10033070-38 = "4;망량즈 B;06\n2;망량즈 A;04;어어…… 그렇지만 게헨나 학생들은 어떤 의미로 보면 백귀야행의 축제를 즐기러 온 관광객들이고요?\n#2;stiff"
10033070-39 = "4;망량즈 B;06;원래 우리 백귀야행은…… 관광객이 찾아오는 걸 누구보다 환영하는 학원이기도 했잖습니까?"
10033070-40 = "2;망량즈 A;02;거기에 뭐, 신목제 역시 이제 와서는 운수 대통! 만사 형통! 쪽의 느낌이 더 강해지기도 했고 말이죠……."
10033070-41 = "4;망량즈 B;03;또 아나요? 신목 입장에서는 그렇게라도 한 번 더 자기를 찾아와 주고, 기억해 줘서 기쁘다고 생각할지도 모르고 말이죠.\n#4;em;[재잘]"

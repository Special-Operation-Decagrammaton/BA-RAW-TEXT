[translation]
10033070-1 = "Episode 7;To Each Their Own"
10033070-3 = "Those Gehenna brats are crazy! Insane! Mental!"
10033070-4 = "I was on my hands and knees cleaning that dang Observatory floor!"
10033070-5 = "And what'd they do? Turned it into a dang playground!"
10033070-6 = "I heard you're the strongest if you're havin' fun."
10033070-7 = "I don't wanna hear it! Only crazy people would think of plantin' bombs to make a slide."
10033070-8 = "What'd we have done if they went and scratched up them tiles? We'd be the ones cleanin' it all up!"
10033070-15 = "Why're y'all praisin' and admirin' them? They're the enemy, you know! The enemy!"
10033070-16 = "Leader! You're finally back!"
10033070-17 = "How'd the \"pretend to be a super scary youkai and scare them off durin' the test of courage\" operation go?"
10033070-18 = "...We had to do a tactical retreat! Tactical!"
10033070-19 = "I saw them on the way here. They were blastin' off every firearm they had like they were at a festival or somethin'!"
10033070-20 = "Everythin' was blowin' up like fireworks!"
10033070-21 = "Well, shoot, they gave me a damn fright when they up and said they were gonna dig a hot spring and use us as decorations for a resort at the workshop..."
10033070-22 = "The way they handle things is on a whole 'nother level. Whatever we come up with, they're a step ahead. You can't make this stuff up! Guess that's Gehenna for you."
10033070-23 = "Would you try kusaya jam toast if I made it for you?"
10033070-24 = "Are you kiddin'? Even just sniffin' the stuff made me pass out. I swear the stink is still on my clothes."
10033070-25 = "That weirdo girl was enjoyin' it like last night's supper for some reason!"
10033070-26 = "My jaw was on the floor! There ain't a food in this world she wouldn't eat!"
10033070-32 = "Y'all are relaxin' and yappin' like you're sharin' good ole memories around a campfire!"
10033070-33 = "Don'tcha think you're takin' this too lightly?! The Tree of Deities ritual is tomorrow! Tomorrow!"
10033070-34 = "It's only supposed to happen once a year, and it's a Mouryo thing first, ain't it?!"
10033070-35 = "And those hoity toity festival people go throwin' their weight around, trying to host OUR festival like they own the place! Just for some stupid Gehenna brats!"
10033070-36 = "If the Tree of Deities could talk, it'd be screamin' 'bout the injustice of it all, that's for sure!"
10033070-38 = "Them Gehenna brats are tourists that wanna see our festivals, ain't they?"
10033070-39 = "And Hyakkiyako's whole thing is welcomin' tourists and bein' nice to them."
10033070-40 = "The Tree of Deities ritual's been less about us and more about prayin' for good fortunes recently anyway."
10033070-41 = "So maybe the tree's actually real thrilled that all these people are visitin'!"
10033070-46 = "What the hell am I supposed to do if y'all ain't on my side neither?!"
10033070-51 = "Take a deep breath, Leader. It'll be okay!"
10033070-53 = "Ugh! Tomorrow I'm gonna reclaim what's ours. I won't let them do what they want with the Mouryo's festival!"
10033070-55 = "If you think about it, then we're kinda gonna be blowin' up our own festival..."
10033070-56 = "Yeah, you think that's okay? It's kinda embarrassin'..."
10033070-58 = "No it's not! Tomorrow's ritual ain't even the real thing, so who cares if their fake festival gets ruined?"
10033070-59 = "We're gonna send a clear message to Gehenna and the rest of them! Hyakkiyako's festivals belong to Hyakkiyako! Therefore, they belong to us Mouryo!"
10033070-61 = "I gotta admit, that sounds pretty nice. The festivals are Mouryo's!"
10033070-62 = "Technically, we've only lost to the Gehenna students so far. Not the Hyakkiyako normies."
10033070-63 = "I'm kinda motivated to try hard tomorrow now!"
10033070-64 = "Same! I just remembered that Chise's gonna be performing at the Tree of Deities ritual!"
10033070-65 = "I wanna watch her do the offering on stage. That'll be awesome."
10033070-70 = "I! AM! SAYING! Y'all are way too lax!"
10033070-78 = "Great work, Sensei."
10033070-79 = "Thankfully, the Gehenna students went to sleep faster than I expected."
10033070-80 = "[s1] \"I was sure there was going to be a bloody pillow fight...\"\n[s2] \"I thought there would be students running the streets screaming things like 'Freedom!!!'...\""
10033070-83 = "They were all rather exhausted. "
10033070-84 = "But, naturally, we can't slack on our night patrol!"
10033070-85 = "[s] \"You're working hard leading this field trip, Umika.\""
10033070-86 = "The opposite, actually. It seems I keep showing everyone my worst."
10033070-87 = "When I reflect on everything that's happened in the past day... Well, I'd just like to curl up in a hole and disappear."
10033070-88 = "I was utterly inept at keeping our schedule, and the itinerary seemed to be more of a suggestion."
10033070-89 = "The boss would've handled things much more smoothly..."
10033070-90 = "[ns3] \"There's this one saying I've heard before...\"\n[ns4] \"Plans are worthless, but planning is everything.\""
10033070-93 = "Wh-What? I don't understand..."
10033070-94 = "...It'll come to me naturally, one day? How mysterious."
10033070-95 = "[s] \"Even festivals tend to go awry, don't they?\""
10033070-98 = "Festivals, you say..."
10033070-99 = "I suppose you're right. In fact, festivals rarely go exactly according to our expectations."
10033070-100 = "A festival environment is usually one filled with surprises and challenges, so flexibility is essential to success."
10033070-101 = "However..."
10033070-102 = "I've never been the one to handle those unexpected situations before."
10033070-103 = "[s] \"That's a bit of a surprise.\""
10033070-104 = "Well, normally the boss is spearheading our efforts."
10033070-105 = "It's rather pathetic of me, isn't it? I claim to love festivals, and I do put my all into the planning and preparations..."
10033070-106 = "However I'm beginning to see that I've always shirked away from the most difficult aspects of managing a festival. I've been rather spoiled by the boss."
10033070-107 = "I have no intention of giving up, and I know I need to see this through to the end."
10033070-108 = "I just can't help but think every once in a while, \"If only the boss were here...\""
10033070-109 = "[s5] \"That's only natural when taking on something new.\"\n[s6] \"But you've put your all into this, haven't you?\""
10033070-112 = "I suppose..."
10033070-114 = "Hiyah! Attack!"
10033070-115 = "[ns] \"Whoa?!\""
10033070-117 = "K-Kirara? Erika?"
10033070-121 = "Hi, hi! We saw you patrolling, and you seemed kind of sad!"
10033070-122 = "You really need to be more careful."
10033070-123 = "I didn't hurt anyone, did I? Anyways, why're you so down on yourself?"
10033070-124 = "That's... Well..."
10033070-130 = "You've been doing a bang-up job, in my opinion!"
10033070-131 = "That's kind of you. But nothing went to plan today, and we ended incredibly behind schedule."
10033070-132 = "Hm. It's a bit ironic coming from me..."
10033070-133 = "But you're dealing with Gehenna students, you know? Like Kirara said, you've done great considering that."
10033070-134 = "Exactly! So stop beating yourself up, Mizz Guide!"
10033070-135 = "The view of the Tree of Deities from the Observatory was awesome! Everyone had fun making crafts, and dinner was bomb!"
10033070-136 = "And the test of courage was... It was...um..."
10033070-137 = "It was that horrible?!"
10033070-138 = "Sorry, sorry. That's not what I meant. It was an interesting experience, for certain."
10033070-142 = "No, don't apologize."
10033070-143 = "I undertook this endeavor hoping I could prove myself. That's...all."
10033070-144 = "[s] \"Of course we understand.\""
10033070-145 = "(The boss would've done everything so much better.)"
10033070-146 = "Things never go 100% according to plan! That's just life."
10033070-147 = "Right. Unless you can predict the future somehow, you can't plan for everything."
10033070-148 = "I had a ton of fun today! And tomorrow's going to be a blast too. I just know it!"
10033070-149 = "You two are always so kind. Thank you."
10033070-150 = "They're not just words. I mean it."
10033070-151 = "Anyways, look at you two still hard at work, patrolling at this hour."
10033070-152 = "Hahaha! The guide team really never sleeps!"
10033070-157 = "[ns] \"Thank you. But one thing.\""
10033070-158 = "Hm? What's wrong, Teach?"
10033070-159 = "[ns] \"Isn't it past your curfew?\""
10033070-164 = "Ah."
10033070-165 = "We're caught! Hahaha! Make a break for it!"
10033070-170 = "[ns] \"Hold it right there! You troublemakers!\""
10033070-173 = "(...)"
10033070-174 = "(Unless I can predict the future?)"
10033070-175 = "(So if I can just plan for every possible outcome...)"
10033070-176 = "(Then I can prevent mishaps in our schedule going forward!)"

10033070-63 = "2;망량즈 A;03;그러면 내일 조금만 더 힘내 볼까?"
10033070-64 = "4;망량즈 B;02;그러고 보니 내일은 치세 님도 직접 신목제에 참가하신다고 했지~ 기대되네~"

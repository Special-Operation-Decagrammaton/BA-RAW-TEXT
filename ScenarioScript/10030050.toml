[translation]
10030050-1 = "第5話;準備晚餐"
10030050-6 = "……回來的真慢。#n你們到底跑到多遠的地方去了啊？"
10030050-7 = "我一個人在帳篷前面等，都快無聊至──"
10030050-18 = "大家……這副模樣是怎麼回事？#n你們一起在樹林裡賽跑了嗎？"
10030050-21 = "嗯，確實是跑了一下……"
10030050-22 = "……要仔細說明的話，可能要花上一點時間。"
10030050-23 = "我們剛才在樹林裡遇到了特訓中的堇部長。"
10030050-28 = "啊啊～"
10030050-29 = "[s]「……馬上就接受了！？」"
10030050-30 = "啊，嗯。#n一聽到堇部長的名字，我大概就能猜到了……"
10030050-31 = "雖然不知道你猜到了什麼，但我們並沒有被堇部長追趕哦。"
10030050-32 = "只是很平常地和訓練部的新成員聊著有關野外活動的事……"
10030050-34 = "結果就突然出現了一隻很大的熊！"
10030050-39 = "很，很大的熊！？"
10030050-40 = "沒，沒問題吧？#n萬一熊跑來襲擊露營場……"
10030050-41 = "別擔心，現在熊已經逃得遠遠的了。"
10030050-46 = "多虧訓練部把熊引走，所以才成功甩開了牠……"
10030050-47 = "之後還是盡量別靠近樹林比較好。#n說不定還會出現熊以外的猛獸。"
10030050-48 = "話說回來，訓練部在這場混亂之後還想繼續進行野外訓練是嗎？"
10030050-49 = "嗯，應該會暫且換個地方，但不會停止特訓吧。"
10030050-50 = "他們說如果想在明年賽季開始前全力提升體力，就連1分1秒都不能浪費。"
10030050-51 = "看來莉對棒球的認真程度超乎了我的想像。"
10030050-52 = "明年可以期待千年棒球部大放異彩嗎？"
10030050-56 = "[ns]「總覺得跟我的記憶有點不一樣……」"
10030050-60 = "我已經忍無可忍了！"
10030050-61 = "明明說好要教我輕鬆打出全壘打的祕訣，結果卻一直在做和棒球毫無關係的特訓……甚至還被熊追！"
10030050-62 = "這種社團活動，我不想繼續了！"
10030050-68 = "如果莉同學想退出社團的話，我也不會阻止你……"
10030050-69 = "但是既然特訓已經開始，在訓練結束之前，我不能讓莉同學離開。"
10030050-70 = "因為如果不做收操運動就突然中斷訓練，可能會引發肌肉疼痛或筋膜沾黏！"
10030050-71 = "無論你是否加入訓練部……#n我身為千年健身中心的安全負責人，可不能對從事危險運動的「會員」置之不理！"
10030050-72 = "你以為這樣阻止我有用嗎？"
10030050-73 = "就算前輩擋在我面前，我也會硬著頭皮打倒前輩再回去！"
10030050-74 = "這個心態就對了，莉同學。"
10030050-75 = "咦？"
10030050-76 = "剛才是由熊老師進行速度訓練……"
10030050-81 = "從現在起，將由我親自為莉同學進行力量訓練！"
10030050-82 = "就算你哭出來，訓練也不會停止哦？"
10030050-88 = "嗚……嗚嗚……"
10030050-89 = "我最討厭訓練部了啦！"
10030050-92 = "……話說現在該做什麼好呢？才下午4點而已。"
10030050-93 = "什麼？明明經歷了那場混亂，時間居然只過了這麼一點點？"
10030050-94 = "……野外的時間果然過得比平常慢。"
10030050-95 = "就是說啊。#n在部室裡光是玩兩三場遊戲，一天一下子就結束了。"
10030050-96 = "……這就是所謂的狹義相對論嗎？"
10030050-97 = "不是，相對論不是用在這種地方的吧。"
10030050-103 = "我想想……差不多該準備晚餐了吧。"
10030050-108 = "這麼早！？"
10030050-109 = "吃完午餐之後才過了3小時而已耶……？"
10030050-110 = "副部長，難道你的食量在這幾天變大了──"
10030050-112 = "我才不是因為肚子餓才著急好不好！？"
10030050-113 = "是因為野外和室內不一樣。#n如果想在野外做料理，從生火到處理食材，有很多事都必須事先做好。"
10030050-114 = "如果想在太陽下山之前完成料理，最好現在就開始準備。"
10030050-115 = "回想一下你們平常表現出來的手藝，我反而擔心現在開始會不會太晚……"
10030050-116 = "哼，就算要處理食材，不也只是把帶來的蔬菜洗一洗而已嗎？"
10030050-117 = "那種簡單的工作，只要下定決心一下就搞定了。"
10030050-120 = "帶來的蔬菜也只有馬鈴薯和洋蔥這種普通的東西……"
10030050-121 = "幾個人一起處理，馬上就能搞定了。"
10030050-123 = "看來你們很有幹勁，太好了。"
10030050-124 = "那你們把這裡的蔬菜洗好去皮，然後切成方便入口的大小吧。"
10030050-125 = "我會趁這段時間在營地對面生火。"
10030050-126 = "包在我身上！"
10030050-132 = "（約1小時之後……）"
10030050-135 = "唔唔……"
10030050-139 = "哇啊啊！？"
10030050-144 = "真紀，你沒事吧？手有沒有受傷？"
10030050-148 = "我沒事，好險沒有受傷……"
10030050-149 = "這根紅蘿蔔是怎麼回事啊！#n我都這麼用力了，居然還完好無缺？"
10030050-150 = "怎麼會硬到連刀都切不斷呢？"
10030050-151 = "[s1]「因為露營用的刀子和一般廚房的刀相比，不只鈍還比較小……」\n[s2]「如果不大力一點就很難使用。」"
10030050-158 = "[ns3]「紅蘿蔔就由我來切吧。」\n[ns4]「真紀，麻煩你幫我削皮。」"
10030050-163 = "嗯，那就拜託你了，老師……"
10030050-164 = "小玉前輩你呢？馬鈴薯皮都削好了嗎？"
10030050-170 = "還沒……才削到第3個而已……"
10030050-171 = "馬鈴薯的皮不只薄還凹凸不平，比想像中還難削……"
10030050-172 = "我的手腕已經有點痛了，所以很難用力握住刀柄……"
10030050-173 = "而且這附近也沒有熱水……在冰冷的溪水裡清洗蔬菜也是件苦差事。"
10030050-174 = "嗚嗚，每當把手泡到溪水裡就會覺得指尖快凍僵了……"
10030050-175 = "就像千尋前輩說的一樣，比想像中還花時間……"
10030050-176 = "……話說我們非得這樣親手做晚餐嗎？"
10030050-184 = "菜都處理好了嗎？"
10030050-189 = "還，還沒……"
10030050-190 = "如果再多給我們一些時間和預算……"
10030050-192 = "預算……？"
10030050-193 = "那個，千尋前輩。"
10030050-194 = "這次帶來的行李中裡沒有泡麵或速食咖哩之類的即食食品嗎？"
10030050-195 = "為了預防緊急狀況，我是有帶幾個來……怎麼了？"
10030050-199 = "那就吃那個來當晚餐吧！"
10030050-200 = "露營場沒有網路也沒有便利商店，處處充滿不便……輕鬆吃個飯總行吧？"
10030050-201 = "不行。"
10030050-202 = "你們平常已經吃夠多即食食品了，都到這裡來了還要繼續吃？"
10030050-203 = "呃，嗚嗚……"
10030050-204 = "來這裡之前我就說過，這次露營的目的是擺脫平時的生活，度過健康的一天。"
10030050-205 = "雖然有點麻煩，今天就做點像樣的料理來吃吧。#n我會幫忙把食材處理好。"
10030050-206 = "說是像樣的料理，在這種野外能做的還是有限吧？"
10030050-207 = "像是咖喱飯或炒飯之類的……"
10030050-208 = "呵呵，等真紀看到完成的料理就不會說這種話了。"
10030050-214 = "我在露營前就事先把適合今天的特別材料準備好了。"
10030050-221 = "特別材料……？"

[translation]
10030050-1 = "Episode 5;Dinner Prep"
10030050-6 = "...You were gone longer than I expected. How long did it take to find her?"
10030050-7 = "Waiting alone by the tent was boring—"
10030050-18 = "...Why are you all breathing so heavily? Did you race back to camp?"
10030050-21 = "Well, we did race in a sense..."
10030050-22 = "...But the details would seem pretty weird."
10030050-23 = "We ran into Sumire in the forest. She's on a special training trip."
10030050-28 = "Ahhh..."
10030050-29 = "[s] \"...Is that all you need to hear?\""
10030050-30 = "Ah, sorry. I just got a rough idea of what happened as soon as I heard Sumire's name."
10030050-31 = "I'm not sure what you're thinking...but we weren't chased by Sumire."
10030050-32 = "We were simply discussing our camping trip with her and a new member of the Athletics Training Club..."
10030050-34 = "When a giant bear appeared out of nowhere!"
10030050-39 = "A b-bear?!"
10030050-40 = "I-Is that okay? If it attacks the campsite..."
10030050-41 = "Don't worry. It's gone now."
10030050-46 = "The Athletics Training Club baited it away and allowed us to escape..."
10030050-47 = "But we should stay on the hiking trail from now on. We might run into other beasts."
10030050-48 = "Anyway, it looked like the Athletics Training Club intended to keep training despite all that."
10030050-49 = "Well, I think they shouted something about relocating to a different training ground while they ran away, at least."
10030050-50 = "I heard one of them say that they can't waste a single second if they're going to fulfill their potential before the next season."
10030050-51 = "Perhaps Rei is more passionate about baseball than I thought."
10030050-52 = "Maybe we can look forward to the Millennium Baseball Club's performance next year?"
10030050-56 = "[ns] \"That's a bit different from what I saw...\""
10030050-60 = "I can't take it anymore!"
10030050-61 = "You said you would teach me how to hit more home runs, not train me to escape bears! This doesn't have anything to do with baseball!"
10030050-62 = "I quit!"
10030050-68 = "If you wish to quit the Athletics Training Club when we get back I won't stand in your way..."
10030050-69 = "But once special training begins, I can't let you go until it's complete."
10030050-70 = "Ending our exercise without cooling down can cause muscle strain and blood pooling!"
10030050-71 = "Regardless of whether you join the Athletics Training Club or not, as the safety manager of the Millennium Fitness Center I cannot allow you to use dangerous exercise techniques!"
10030050-72 = "You think you can stop me?"
10030050-73 = "I'll force my way past you if you think you can stand between me and home plate!"
10030050-74 = "That's the spirit, Rei!"
10030050-75 = "Ack!"
10030050-76 = "Coach Bear led our speed training until now..."
10030050-81 = "So I'll handle your strength training!"
10030050-82 = "This exercise won't stop, even if you cry!"
10030050-88 = "W-Waah..."
10030050-89 = "I hate the Athletics Training Club!"
10030050-92 = "...Anyway, what should we do now? It's only 4:00 PM."
10030050-93 = "What? It's that early, even with everything that's happened?"
10030050-94 = "...It feels like time flows slowly when I'm outside."
10030050-95 = "Yeah, it only takes two or three rounds of video games for a day to pass in the club room."
10030050-96 = "...Is this what they call the theory of special relativity?"
10030050-97 = "That's not the theory you'd use in this situation."
10030050-103 = "Well, our next course of action is clear. It's time to start prepping for dinner."
10030050-108 = "Already?!"
10030050-109 = "It's only been three hours since lunch..."
10030050-110 = "Vice President, don't tell me you've started eating more recently—"
10030050-112 = "I'm not rushing because I'm hungry!"
10030050-113 = "Cooking outdoors lacks the convenience of cooking in a kitchen. We need to start a fire, prepare ingredients, make sure we have a way to keep our food waste away from animals..."
10030050-114 = "We better start now if we want to eat before the sun sets."
10030050-115 = "In fact, I'm worried that we're starting too late as it is, with how clumsy you all are with cooking utensils..."
10030050-116 = "Tch, we just have to wash and cut the vegetables, right?"
10030050-117 = "That's easy! We just need to get serious!"
10030050-120 = "We also only brought common vegetables like potatoes and onions..."
10030050-121 = "With the entire party focusing on it, we'll beat this boss in no time."
10030050-123 = "I'm glad you're enthusiastic, at least."
10030050-124 = "Here. Wash these vegetables, then peel and cut them to bite size."
10030050-125 = "In the meantime, I'll start a fire on the other side of camp."
10030050-126 = "Leave it to us!"
10030050-132 = "About an hour later..."
10030050-135 = "Urgh..."
10030050-139 = "Uwah!"
10030050-144 = "Are you all right, Maki? Is your hand okay?"
10030050-148 = "Yeah... I didn't get hurt, luckily..."
10030050-149 = "But what's with this carrot? I pressed really hard but it didn't even budge."
10030050-150 = "Just how solid is the core, if a knife won't cut through?"
10030050-151 = "[s1] \"Camping knives generally aren't as sharp as kitchen knives...\"\n[s2] \"Different types of knives need different techniques.\""
10030050-158 = "[ns3] \"I'll cut the carrots if you want to peel.\"\n[ns4] \"Here, watch me.\""
10030050-163 = "Okay, I'll switch places with you, Sensei..."
10030050-164 = "How's it going over there, Kotama? Are you done peeling the potatoes?"
10030050-170 = "No... I just finished...my third one..."
10030050-171 = "Cutting thin slices off a potato is harder than I thought..."
10030050-172 = "My wrist already feels sore and I can't put any power in my knife..."
10030050-173 = "On top of that, there's no warm water nearby... Washing vegetables in a cold stream is making my hands numb..."
10030050-174 = "Ugh, do you think I'll get frostbite if I keep dipping my fingers in this water?"
10030050-175 = "Chihiro was right... This is taking forever."
10030050-176 = "...Do we really have to do all this to make our own dinner?"
10030050-184 = "Have you finished preparing the vegetables?"
10030050-189 = "N-Not yet..."
10030050-190 = "But with a bit more time and budget..."
10030050-192 = "Budget?"
10030050-193 = "Um, Chihiro."
10030050-194 = "You didn't bring any instant cup ramen or retort curry by any chance, did you?"
10030050-195 = "I brought some in case of an emergency... But why?"
10030050-199 = "Let's eat that, then!"
10030050-200 = "There's no internet at the campsite, we can't order any food, everything is so inconvenient... Can't we take it easy with dinner, at least?"
10030050-201 = "No."
10030050-202 = "It's not healthy for you to eat so much instant food. Why would you want to eat more, after coming all the way out here?"
10030050-203 = "U-Ugh..."
10030050-204 = "We're camping here to break the rut the club is in and spend some time living healthily."
10030050-205 = "So even if it's a pain, let's eat a proper meal today. I'll help prepare the remaining ingredients."
10030050-206 = "A proper meal is well and good, but aren't we limited in what we can make outdoors?"
10030050-207 = "Imagine a nice plate of curry rice...or fried rice..."
10030050-208 = "Heeheehee... I'm sure you'll be singing a different tune once we're done cooking."
10030050-214 = "I prepared something special before we left. We're celebrating this trip properly."
10030050-221 = "Something...special?"

[translation]
10030050-1 = "ตอนที่ 5;เตรียมอาหารเย็น"
10030050-6 = "นานกว่าที่คิดแฮะ ไปตามหากันไกลถึงไหนเนี่ย?"
10030050-7 = "พอมานั่งรออยู่หน้าเต็นท์คนเดียว มันก็น่าเบื่อ..."
10030050-18 = "ทุกคน... ทำไมอยู่ในสภาพนั้นกันล่ะ? ไปแข่งวิ่งในป่ากันมาเหรอ?"
10030050-21 = "เราก็ได้วิ่งจริงอยู่หรอกนะ..."
10030050-22 = "ถ้าจะให้อธิบายให้มันละเอียดๆ เรื่องมันจะยาวเลยละ"
10030050-23 = "เมื่อกี้เราเจอกับหัวหน้าสึมิเระที่มาฝึกพิเศษกลางป่าค่ะ"
10030050-28 = "อ่า"
10030050-29 = "[s] \"ทำไมถึงไม่ตกใจเลยล่ะ?!\""
10030050-30 = "อ้อ ขอโทษที พอได้ยินชื่อหัวหน้าสึมิเระก็พอจะเดาออกน่ะว่าเจออะไรกันมา..."
10030050-31 = "ฉันไม่รู้ว่าเธอคิดอะไรแปลกๆ อยู่หรือเปล่า แต่เราไม่ได้วิ่งหนีหัวหน้าสึมิเระมาหรอกนะ"
10030050-32 = "พวกเรากำลังคุยกับสมาชิกใหม่ของชมรมออกกำลังกายเกี่ยวกับกิจกรรมกลางแจ้ง..."
10030050-34 = "แต่จู่ๆ ก็มีหมีโผล่ออกมาตรงหน้าเลย!"
10030050-39 = "มะ... หมีเหรอ?!"
10030050-40 = "บะ... แบบนี้จะไม่เป็นไรเหรอ? ถ้ามันลงมาถึงที่ตั้งแคมป์ของเราล่ะ..."
10030050-41 = "ไม่ต้องห่วงหรอก ตอนนี้มันหนีไปไกลแล้วละ"
10030050-46 = "โชคดีที่ชมรมออกกำลังกายช่วยล่อให้มันหนีไปอีกทางได้ทันเวลา พวกเราก็เลยออกมาจากตรงนั้นได้#nอย่างหวุดหวิด..."
10030050-47 = "ตอนนี้ถ้าเป็นไปได้ก็อย่าเข้าใกล้ป่าจะดีกว่า มันอาจจะมีสัตว์ป่าตัวอื่นนอกเหนือจากหมีอีกก็ได้"
10030050-48 = "จะว่าไป ชมรมออกกำลังกายเจอเรื่องวุ่นวายแบบนั้น แต่ก็ยังคิดจะฝึกพิเศษต่ออีกนะ"
10030050-49 = "อืม ถึงจะย้ายที่ฝึกไปแล้ว แต่เห็นว่าจะไม่ยกเลิกการฝึกพิเศษน่ะ"
10030050-50 = "ถ้าอยากจะเพิ่มพละกำลังให้เต็มที่ก่อนเริ่มฤดูกาลใหม่ในปีหน้า เวลาแค่วินาทีเดียวก็จะปล่อยผ่านไปไม่ได้"
10030050-51 = "เรย์มีแพชชั่นในกีฬาเบสบอลมากกว่าที่คิดเยอะเลยนะคะ"
10030050-52 = "งั้นปีหน้าเราจะคาดหวังในชมรมเบสบอลมิลเลเนียมได้ใช่มั้ย?"
10030050-56 = "[ns] \"ทำไมไม่เล่าให้หมดล่ะว่าทางนั้นฝึกยังไงกัน...\""
10030050-60 = "ทนไม่ไหวแล้ว!"
10030050-61 = "ไหนบอกว่าจะบอกเคล็ดลับให้ตีโฮมรันได้ง่ายๆ ไงล่ะคะ! เอาแต่ฝึกพิเศษอะไรก็ไม่รู้ที่ไม่เห็นจะเกี่ยวกับ#nเบสบอลตรงไหนเลย... แถมยังต้องมาวิ่งหนีหมีอีก!"
10030050-62 = "ฉันขอเลิกทำกิจกรรมชมรมแบบนี้ดีกว่าค่ะ!"
10030050-68 = "ถ้าเรย์อยากออกจากชมรม ฉันก็ห้ามไม่ได้หรอกนะคะ..."
10030050-69 = "แต่เมื่อเริ่มฝึกพิเศษไปแล้ว ฉันก็ปล่อยเรย์ไปไม่ได้จนกว่าจะสิ้นสุดการฝึกค่ะ"
10030050-70 = "ถ้าหยุดฝึกกลางคันโดยที่ไม่ได้คูลดาวน์ผ่อนคลายกล้ามเนื้อเลย ก็อาจเกิดอาการปวดกล้ามเนื้อหรือมี#nเลือดอุดตันได้ค่ะ!"
10030050-71 = "ต่อให้ตัดเรื่องการเข้าชมรมออกกำลังกายไป แต่ในฐานะผู้รับผิดชอบด้านความปลอดภัยของฟิตเนส เซ็นเตอร์มิลเลเนียมแล้ว ฉันจะปล่อยให้ 'ท่านสมาชิก' ออกกำลังกายอย่างอันตรายไม่ได้ค่ะ"
10030050-72 = "คิดว่าห้ามแล้วฉันจะกลับไม่ได้งั้นเหรอคะ?"
10030050-73 = "ถ้ารุ่นพี่มายืนขวางหน้าฉัน ฉันก็จะจัดการรุ่นพี่ให้หงายเก๋งค่ะ!"
10030050-74 = "ต้องแบบนี้ละค่ะ เรย์"
10030050-75 = "ห้ะ?"
10030050-76 = "เมื่อกี้เรารับการฝึกฝนความเร็วจากโค้ชหมีกันไปแล้ว..."
10030050-81 = "ต่อจากนี้ไปฉันจะรับช่วงต่อและฝึกพละกำลังให้เรย์เองค่ะ!"
10030050-82 = "ต่อให้ร้องไห้ ฉันก็จะไม่หยุดฝึกหรอกนะคะ"
10030050-88 = "งะ... งือออ..."
10030050-89 = "ไม่ชอบชมรมออกกำลังกายเอาซะเลย!"
10030050-92 = "จะว่าไป... จากนี้เราทำอะไรกันดีล่ะ? นี่ก็เพิ่งจะสี่โมงเย็นเอง"
10030050-93 = "ว่าไงนะ? พวกฉันเจอเรื่องวุ่นวายและต้องวิ่งลงเขากันมาขนาดนั้น แต่เวลายังเดินไม่ถึงไหนเลยเหรอ?"
10030050-94 = "ตอนที่อยู่ข้างนอก... เวลาผ่านไปช้ากว่าปกติจริงๆ ด้วยนะคะ"
10030050-95 = "นั่นสินะ ปกติแค่เล่นเกม 2-3 ตาในห้องชมรม เวลาก็ผ่านไปทั้งวันแล้ว"
10030050-96 = "หรือว่านี่คือสิ่งที่เรียกว่าทฤษฎีสัมพัทธภาพพิเศษ?"
10030050-97 = "ไม่หรอก ทฤษฎีนั่นไม่ได้เอามาใช้ในเวลาแบบนี้"
10030050-103 = "ไม่ต้องกังวลว่าจะไม่มีอะไรทำหรอก เราต้องเตรียมอาหารเย็นกันนะ"
10030050-108 = "จะเตรียมเลยเหรอ?!"
10030050-109 = "เรากินอาหารกลางวันไปยังไม่ถึง 3 ชั่วโมงเลยนะ..."
10030050-110 = "รองหัวหน้า อย่าบอกนะว่ากระเพาะขยาย..."
10030050-112 = "ฉันไม่ได้รีบเตรียมอาหารเพราะหิวสักหน่อย!!"
10030050-113 = "ถ้าจะทำอาหารกลางแจ้งละก็ เราต้องเตรียมอะไรไว้ตั้งแต่เนิ่นๆ หลายอย่าง ตั้งแต่ก่อไฟไปจนถึงหั่น#nวัตถุดิบเลย"
10030050-114 = "และถ้าจะทำอาหารให้เสร็จก่อนพระอาทิตย์ตก เราก็ต้องเตรียมการอย่างแข็งขันกันตั้งแต่ตอนนี้"
10030050-115 = "เอาจริงๆ ถ้าดูจากฝีมือที่พวกเธอเคยทำอาหารให้ดูแล้ว ฉันว่าเริ่มตอนนี้ก็อาจจะช้าเกินไปด้วย..."
10030050-116 = "ชิ ก็แค่เตรียมวัตถุดิบ แค่เอาผักที่เตรียมมาไปล้างแล้วหั่นก็พอใช่ไหมล่ะ?"
10030050-117 = "งานง่ายๆ แบบนี้น่ะ แต่ตั้งใจทำแป๊บเดียวก็เสร็จ"
10030050-120 = "ผักที่เตรียมมาก็มีแค่ของธรรมดาๆ อย่างมันฝรั่งกับหอมใหญ่..."
10030050-121 = "ถ้าช่วยกันหลายๆ คนก็น่าจะเสร็จเร็วอยู่นะ"
10030050-123 = "เห็นตั้งใจกันแบบนี้ฉันก็ค่อยเบาใจหน่อย"
10030050-124 = "ถ้างั้นพวกเธอก็เอาผักตรงนี้ไปล้าง แล้วก็ปอกเปลือกและหั่นให้พอดีคำทีนะ"
10030050-125 = "ระหว่างนี้ฉันจะไปก่อไฟที่ด้านตรงข้ามของเต็นท์"
10030050-126 = "วางใจพวกเราได้เลย!"
10030050-132 = "(ราวๆ 1 ชั่วโมงต่อมา...)"
10030050-135 = "อึก... อึกกก..."
10030050-139 = "ว้ากก?!"
10030050-144 = "มากิ โอเคมั้ย? โดนมีดบาดหรือเปล่า?"
10030050-148 = "ไม่บาดๆ โล่งอกไปที แต่ว่า..."
10030050-149 = "แคร์รอตหัวนี้มันอะไรกันเนี่ย ออกแรงมากขนาดนั้นแล้วยังหั่นไม่เข้าเลย"
10030050-150 = "ต้องแข็งเบอร์ไหนถึงใช้มีดหั่นไม่เข้าน่ะ?"
10030050-151 = "[s1] \"มีดแคมป์ปิ้งไม่คมเหมือนมีดที่ใช้ในครัวน่ะ แล้วก็เล็กกว่าด้วย...\"\n[s2] \"ถ้าใช้แรงแค่พอประมาณ ก็ไม่น่าจะหั่นได้ง่ายๆ นะ\""
10030050-158 = "[ns3] \"เดี๋ยวครูช่วยหั่นแคร์รอตให้เอง\"\n[ns4] \"มากิช่วยไปช่วยปอกเปลือกให้แทนแล้วกันนะ\""
10030050-163 = "อื้ม งั้นก็รบกวนด้วยนะ คุณครู..."
10030050-164 = "รุ่นพี่โคทามะล่ะ เป็นไงบ้าง? ปอกเปลือกมันฝรั่งหมดแล้วรึยัง?"
10030050-170 = "ยังค่ะ เพิ่งจะได้... 3 หัวเอง..."
10030050-171 = "การปอกเปลือกมันฝรั่งที่ผิวขรุขระไม่ใช่งานง่ายๆ เลยค่ะ..."
10030050-172 = "ไม่ทันไรข้อมือก็เริ่มเจ็บแปลบๆ แล้ว ไม่มีแรงใช้มีดเลยค่ะ..."
10030050-173 = "แถมแถวนี้ยังไม่มีน้ำอุ่นให้ใช้อีก... การล้างผักในน้ำเย็นๆ ก็เป็นงานยากมากด้วยเหมือนกัน"
10030050-174 = "โอยยย ทุกครั้งที่เอามือจุ่มลงในน้ำจากลำธาร ฉันคิดว่านิ้วมือจะแข็งให้ได้เลย..."
10030050-175 = "เราน่าจะต้องใช้เวลามากกว่าที่คิดอย่างที่รุ่นพี่จิฮิโระบอกเอาไว้เลยนะ..."
10030050-176 = "จะว่าไป เราดั้นด้นมาลำบากกันถึงที่นี่แล้ว ยังต้องมาทำอาหารเย็นกินกันเองอีกเหรอ?"
10030050-184 = "หั่นผักกันเสร็จรึยัง?"
10030050-189 = "ยะ... ยังเลย..."
10030050-190 = "ขอเวลากับงบประมาณให้พวกฉันอีกหน่อยนะคะ..."
10030050-192 = "งบประมาณ...?"
10030050-193 = "เอ่อ รุ่นพี่จิฮิโระ"
10030050-194 = "จากสัมภาระที่เอามาด้วย ไม่มีพวกราเม็งถ้วยหรือแกงกะหรี่สำเร็จรูปที่กินได้เลยติดมาบ้างเลยเหรอ?"
10030050-195 = "ฉันก็เตรียมมาเผื่อฉุกเฉินบ้างหรอกนะ... ทำไมเหรอ?"
10030050-199 = "งั้นก็กินอันนั้นเป็นอาหารเย็นกันเถอะ!"
10030050-200 = "ที่นี่ไม่มีทั้งอินเทอร์เน็ต ไม่มีทั้งร้านสะดวกซื้อ แล้วก็มีอะไรไม่สะดวกตั้งหลายอย่าง... อย่างน้อยก็ขอ#nให้เราได้กินข้าวกันสบายๆ ไม่ได้เหรอ?"
10030050-201 = "ไม่ได้"
10030050-202 = "ปกติพวกเธอก็กินอาหารฟาสต์ฟู้ดกันบ่อยอยู่แล้ว ยังจะมากินอาหารสำเร็จรูปที่นี่กันอีกเหรอ?"
10030050-203 = "อะ... อึก..."
10030050-204 = "ฉันก็บอกไปก่อนหน้านี้แล้วว่าแคมป์ปิ้งครั้งนี้มีเป้าหมายเพื่อการหลุดออกจากชีวิตประจำวันเดิมๆ แล้วมาทำอะไรที่มีประโยชน์ต่อสุขภาพกันแทน"
10030050-205 = "ถึงพวกเธอจะขี้เกียจ แต่วันนี้ก็มาทำอาหารจริงๆ จังๆ กินกันเถอะ ผักที่เหลือเดี๋ยวฉันช่วยหั่นเอง"
10030050-206 = "แต่ถึงจะบอกว่าเป็นอาหารจริงๆ จังๆ แต่อาหารที่ทำได้ตอนอยู่ข้างนอกก็มีแค่ไม่กี่อย่างเองนี่?"
10030050-207 = "น่าจะได้แค่ข้าวแกงกะหรี่หรือไม่ก็ข้าวผัด..."
10030050-208 = "ฮุฮุ เดี๋ยวพอเห็นอาหารที่เสร็จสมบูรณ์แล้ว มากิจะพูดแบบนั้นไม่ได้เลยละ"
10030050-214 = "นั่นก็เพราะก่อนที่จะออกเดินทางมาวันนี้ ฉันเตรียมวัตถุดิบพิเศษเอาไว้ล่วงหน้าแล้วยังไงล่ะ"
10030050-221 = "วัตถุดิบพิเศษเหรอ...?"

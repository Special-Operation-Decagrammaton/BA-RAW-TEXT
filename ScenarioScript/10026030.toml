[translation]
10026030-1 = "第3話;調查點A「石牆迷宮」"
10026030-2 = "（首先從最靠近的遺跡開始調查）"
10026030-6 = "是，是這裡嗎？#n這裡就是遺跡……？"
10026030-7 = "這裡……看起來的確像是一座遺跡……"
10026030-8 = "雖然年代久遠，不過從石壁的樣式和附近的雕像來看，確實是聖徒會的遺跡沒錯。"
10026030-13 = "嗯……看起來確實是這樣……我也這麼覺得。"
10026030-14 = "……嗯？"
10026030-15 = "小春，你已經知道這裡是什麼地方了嗎？"
10026030-16 = "嗯……！？那，那當然！這不是一看就知道了嗎！？#n而且你們不是也都知道嗎！？"
10026030-17 = "為，為什麼會覺得只有我不知道……！？"
10026030-18 = "說的也是，明明大家都知道卻只有小春不知道也很奇怪吧。#n呵呵，你真厲害，小春醬。"
10026030-19 = "哈哈哈！那是當然的！"
10026030-23 = "……剛才那該不會是在嘲諷我吧？"
10026030-28 = "[ns1]「……憂？」\n[ns2]「在思考什麼嗎？」"
10026030-31 = "沒，沒有，沒什麼……我並沒有在想奇怪的事……"
10026030-32 = "只是……假設這裡真的是古代聖徒會的遺跡……那……嗯……"
10026030-33 = "唔嗯……根據地圖上記載的位置和規模……這些石壁圍成了一座迷宮……"
10026030-34 = "……說不定這裡是座試煉場……或是訓練場之類的，也可能兩個都是。"
10026030-35 = "總之，既然這裡規模龐大，我們先分頭去尋找有用的線索吧……#n大家先各自行動，晚一點再回來這裡集合……"
10026030-36 = "那，那我就先出發了……"
10026030-40 = "憂，憂同學……？"
10026030-41 = "呵呵，憂同學比看起來還有活力呢。#n是喜歡單獨行動嗎……"
10026030-42 = "不過他說的沒錯，這裡相當廣大……"
10026030-43 = "……我們也分頭去尋找線索吧。"
10026030-51 = "（於是開始在石牆迷宮裡繞來繞去，試圖尋找憂所說的「線索」）"
10026030-52 = "（迷宮裡的路不僅縱橫交錯，而且幾乎都長得一模一樣，#n　只是有些地方長滿了苔癬，有些地方則嵌著樹幹）"
10026030-53 = "（然而……）"
10026030-57 = "[ns3]「嗯……小春？我們不是說好分頭調查嗎……」\n[ns4]「不過你好像從剛剛開始就一直跟著我……」"
10026030-60 = "怎麼？有，有什麼問題嗎！？"
10026030-61 = "我之前不是說過了嗎！？監視老師和花子就是我的使命！"
10026030-62 = "雖然照理來說，我應該也要緊緊盯著花子才對……"
10026030-63 = "但身體只有一個也沒辦法！所以現在只能這樣……！"
10026030-64 = "……嗯？"
10026030-65 = "為，為什麼偏偏選你？#n那，那是因為……"
10026030-66 = "問，問這個問題是死刑！不要一直轉移話題！！"
10026030-70 = "……噫噫！？"
10026030-75 = "……啊。"
10026030-76 = "……咦？老師……？"
10026030-77 = "[s5]「嗨，憂。」\n[s6]「看來這裡的路是相通的。」"
10026030-80 = "看來似乎是這樣呢，因為我剛剛也遇到過日向同學……"
10026030-81 = "真是個有趣的地方。#n為什麼要打造成迷宮呢？真好奇聖徒會的用意……"
10026030-85 = "嗯……話說回來，老師，你旁邊那位……"
10026030-86 = "……！？"
10026030-87 = "啊，你……你是說我嗎！？#n我，我……那個……呃……"
10026030-88 = "[s7]「我們也是剛剛巧遇的。」\n[s8]「他看起來有點害怕。」"
10026030-91 = "……原來如此，我明白了。#n老師，你辛苦了……"
10026030-92 = "那麼，我就先告辭了……"
10026030-93 = "……什麼？一起……？"
10026030-94 = "一起……嗯……一起……一起嗎……"
10026030-101 = "不……不好意思，我，我還是自己單獨行動就好。#n跟不認識的人一起走，我會覺得很有壓力。"
10026030-102 = "如果是來這裡玩的話倒還好，但現在畢竟是在工作……"
10026030-103 = "所以請你們……見諒……也請別把我的話往心裡去。#n告辭……"
10026030-107 = "呼……嚇死我了……"
10026030-108 = "……嗯？你說他不是壞人，所以不需要那麼緊張？"
10026030-109 = "我，我才沒有緊張！#n你這樣說別人會以為我是一遇到人就會緊張得不知所措的……"
10026030-113 = "噫噫噫！？"
10026030-118 = "……嗯？"
10026030-119 = "嗯嗯？老師……？#n還有您身後的……是叫小春醬對吧？"
10026030-120 = "……"
10026030-121 = "……你……你……好……"
10026030-122 = "……你好？#n沒想到我們打完招呼後，竟然又在這種地方巧遇，這些路還真是有趣！"
10026030-123 = "嗯，嗯……就是說啊……"
10026030-124 = "[ns] 「……」"
10026030-128 = "（之後繼續沿著迷宮般的石牆走著走著，又遇到了憂和日向幾次）"
10026030-130 = "[ns9]「嗯，看來這裡應該就是盡頭了吧。」\n[ns10]「辛苦你了，小春。」"
10026030-133 = "呼……累死我了……老師，這樣就結束了吧？"
10026030-134 = "……嗯？我是不是很累？一直遇到人是不是覺得很有壓力？"
10026030-135 = "我，我才沒有那麼怕生！#n而且我不是從半路開始就有跟他們打招呼了嗎……？"
10026030-136 = "就算是我，只要多見到幾次也是……"
10026030-140 = "……！！"
10026030-141 = "好，好，這次我一定會主動打招呼！這樣總行了吧？"
10026030-142 = "老師，你看著吧，我一定會主動打招呼的！"
10026030-148 = "你，你……"
10026030-150 = "你好……哇！！"
10026030-153 = "…………"
10026030-154 = "…………"
10026030-155 = "…………"
10026030-159 = "呀啊啊啊啊啊啊！！！！！！！！！"

[translation]
10026030-1 = "Episode 3;Site A: Stone Labyrinth"
10026030-2 = "The team decided to investigate the closest ruins first."
10026030-6 = "So... This is it, huh?"
10026030-7 = "\"Ruins\" is exactly right."
10026030-8 = "It's nothing but rubble now. Even so... It's clear from the layout and statuary that this was some kind of cathedral."
10026030-13 = "It certainly does seem that way..."
10026030-14 = "Hm..."
10026030-15 = "How about you, Koharu? Do you think that's what it is?"
10026030-16 = "Mm... Yes, I agree... But don't you already know that? Why did you single me out?"
10026030-17 = "Did you think I wouldn't draw the same conclusions?"
10026030-18 = "Not at all! Of course you agree with the rest of us. It would be strange if you didn't, right?"
10026030-19 = "Right. Nothing to worry about!"
10026030-23 = "...You're making fun of me again, aren't you?!"
10026030-28 = "[ns1] \"...Ui?\"\n[ns2] \"What's on your mind?\""
10026030-31 = "Huh? Nothing. At least, nothing particularly unusual."
10026030-32 = "I-I was just thinking... We could assume these ruins really were a cathedral once."
10026030-33 = "But based on the location and size on the map as well as the maze-like layout of the stone walls..."
10026030-34 = "...it seems more like some kind of training grounds or testing area...maybe both."
10026030-35 = "We'll have to investigate more to find out. Let's split up, so we can cover more ground faster. This place is massive."
10026030-36 = "I-I'll head this way..."
10026030-40 = "Ui...?"
10026030-41 = "Heehee. She's more lively than I expected. Kind of a loner too..."
10026030-42 = "Uh, anyway, Ui's right. This place is huge."
10026030-43 = "We should split up."
10026030-51 = "We searched the labyrinth for anything unusual."
10026030-52 = "Several paths intersected. There were wooden pillars scattered throughout, and much of it was covered in spongey moss."
10026030-53 = "And..."
10026030-57 = "[ns3] \"Koharu? We're supposed to split up...\"\n[ns4] \"Why are you just following me around?\""
10026030-60 = "What? You have a problem with that?!"
10026030-61 = "I thought I made it clear! It's my duty to keep an eye on things, including you, Sensei!"
10026030-62 = "I should be watching Hanako too, but since we all split up..."
10026030-63 = "Well, I can't be in two places at once, can I? So I'm doing my best given the situation."
10026030-64 = "...What?"
10026030-65 = "Well, I'm following you instead of Hanako because...because, um..."
10026030-66 = "I don't have to answer that! What is this? Some kind of interrogation?! Stay on topic!"
10026030-70 = "Huh?! Eeeek!"
10026030-75 = "I think I understand..."
10026030-76 = "Oh... Yes, Sensei...?"
10026030-77 = "[s5] \"Hi, Ui.\"\n[s6] \"I guess our paths cross here.\""
10026030-80 = "It seems so. I passed Hinata recently too..."
10026030-81 = "It's a fascinating place. Did they intend it to be a maze when they built it? I wonder..."
10026030-85 = "Oh... I see you're not alone, Sensei."
10026030-86 = "...?!"
10026030-87 = "Oh, yes... I-I'm... I mean... Well..."
10026030-88 = "[s7] \"We just bumped into each other.\"\n[s8] \"She was nervous about being alone, so...\""
10026030-91 = "Ah. I see. Well... Thanks for your hard work."
10026030-92 = "I'll be off."
10026030-93 = "Huh? You want to stick together?"
10026030-94 = "Mm... I see..."
10026030-101 = "Um... I prefer to work alone. Being around unfamiliar people is...uncomfortable for me."
10026030-102 = "If we were here for fun, it would be different. But I need to focus on work right now."
10026030-103 = "I hope you understand. I don't mean any offense by it... See you later..."
10026030-107 = "Phew! That was close."
10026030-108 = "Look, you don't have to remind me. I know she's nice and that I shouldn't be nervous around her..."
10026030-109 = "And I'm not... Really! Geez! You act like I'm a nervous wreck all the time..."
10026030-113 = "Eeeeek!"
10026030-118 = "...What?"
10026030-119 = "Sensei? Hm... Is that Koharu with you?"
10026030-120 = "..."
10026030-121 = "Ah... H-Hello..."
10026030-122 = "We split up, and the maze brought us right back to each other. What fun this place is!"
10026030-123 = "Y-Yes... Right..."
10026030-124 = "[ns] \"...\""
10026030-128 = "We ran into Ui and Hinata several more times over the course of the day."
10026030-130 = "[ns9] \"Looks like this is the end of the maze.\"\n[ns10] \"Good work, Koharu.\""
10026030-133 = "I'm exhausted... Sensei, we're almost done, right?"
10026030-134 = "...Mm? Oh. I'm glad you think I did well today."
10026030-135 = "It wasn't as scary as I thought it would be. I started saying hello back after a while..."
10026030-136 = "Once we ran into each other a few times, it got easier..."
10026030-140 = "...!"
10026030-141 = "I guess the next thing I should work on is being the first to say hello, right?"
10026030-142 = "Just you watch, Sensei! I'll be great at saying hello first!"
10026030-148 = "U-Um..."
10026030-150 = "H-H-He...!"
10026030-153 = "..."
10026030-154 = "..."
10026030-155 = "..."
10026030-159 = "Kyaaaaaaa!!"

[translation]
10026030-1 = "ตอนที่ 3;จุดสำรวจ A เขาวงกตผาหิน"
10026030-2 = "(คณะสำรวจเริ่มจากการสำรวจซากปรักหักพังที่อยู่ใกล้ที่สุดก่อน)"
10026030-6 = "ตะ... ตรงนี้... เหรอคะ? ที่เรียกว่าซากปรักหักพัง...?"
10026030-7 = "น่าจะใช่นะ... ดูๆ ไปแล้วก็เหมือนซากปรักหักพังอยู่..."
10026030-8 = "ถึงมันจะเก่าแล้วก็เถอะ แต่รูปแบบของผาหินหรือประติมากรรมคือของเหล่าสาวกจริงๆ ด้วยนะคะ"
10026030-13 = "อืม... ก็ดูเป็นอย่างนั้น... อื้ม น่าจะใช่นะ"
10026030-14 = "...หืม?"
10026030-15 = "โคฮารุจัง รู้อยู่แล้วเหรอคะว่าที่นี่คือที่ไหน?"
10026030-16 = "หะ... หืม...!?  กะ... ก็ต้องรู้สิ! ดูเอาก็รู้นี่นา!?  ขนาดพวกเธอยังรู้กันหมดเลย!"
10026030-17 = "แล้วทำไมถึงคิดว่าฉันไม่รู้อยู่คนเดียวล่ะ...!?"
10026030-18 = "ก็นะ ถ้าเป็นเรื่องที่ทุกคนรู้ แต่มีโคฮารุจังไม่รู้อยู่คนเดียวมันก็คงแปลกๆ นะคะ ฮุฮุ ยอดไปเลยค่ะ ยอดเลย"
10026030-19 = "ฮ่าฮ่าฮ่า! ของมันแน่อยู่แล้ว!"
10026030-23 = "...ไม่ได้แกล้งกันหรอกใช่ไหมเนี่ย...?"
10026030-28 = "[ns1] \"...อุย?\"\n[ns2] \"ทำหน้าครุ่นคิดอะไรน่ะ?\""
10026030-31 = "มะ... ไม่ค่ะ ไม่ได้ครุ่นคิดอะไรค่ะ... ไม่เลย ไม่ได้คิดอะไรแปลกๆ ทั้งนั้นค่ะ..."
10026030-32 = "กะ... ก็แค่คิดว่า... สมมติว่าที่นี่เป็นซากปรักหักพังของเหล่าสาวกโบราณละก็... เอ่อ... อืม..."
10026030-33 = "อืม... พอดูตำแหน่งและขนาดจากแผนที่แล้ว... มันดูเหมือนผาหินที่มีรูปร่างเหมือนกับเขาวงกต... งั้นก็แปลว่าที่นี่อาจจะเป็น..."
10026030-34 = "...สนามสอบ? หรือไม่ก็สนามฝึก... ก็ได้ค่ะ บางทีอาจเป็นทั้งสองอย่างเลยก็ได้"
10026030-35 = "พื้นที่ตรงนี้ค่อนข้างกว้าง เราแยกย้ายกันไปหาจุดที่น่าสนใจเถอะค่ะ... แยกย้ายกันไปหาเดี่ยวๆ แล้วกลับมาเจอกันตรงนี้..."
10026030-36 = "งะ... งั้นฉันขอตัวก่อน..."
10026030-40 = "คะ... คุณอุย...? "
10026030-41 = "ฮุฮุ ดูเป็นคนมีชีวิตชีวามากกว่าที่เห็นนะคะเนี่ย ดูจากที่ชอบทำอะไรคนเดียวแล้ว..."
10026030-42 = "แต่มันก็จริงของคุณอุยที่บอกว่าพื้นที่ตรงนี้ค่อนข้างกว้างขวาง..."
10026030-43 = "...งั้นพวกเราแยกย้ายกันไปสำรวจก่อนไหมคะ?"
10026030-51 = "(จากนั้นครูและทุกคนก็แยกย้ายกันสำรวจเขาวงกตผาหินเพื่อตามหา 'จุดที่น่าสนใจ' ที่อุยว่า)"
10026030-52 = "(โดยรวมแล้วเส้นทางอยู่ในรูปแบบเดียวกันและมีความซับซ้อน บางจุดมีตะไคร่น้ำเกาะอยู่ และบางที่ก็มีเสาไม้ฝังอยู่)"
10026030-53 = "(...แต่ว่า...)"
10026030-57 = "[ns3] \"อืม... โคฮารุ? เราต้องแยกย้ายกันหาตามลำพังไม่ใช่เหรอ...\"\n[ns4] \"เหมือนเธอจะเดินตามครูอยู่สักพักแล้วนะ...\""
10026030-60 = "ทำไมล่ะ? มะ... มีปัญหาอะไรหรือไงกัน!!"
10026030-61 = "เมื่อกี้ฉันก็บอกไปแล้วนี่นา! ว่าการสอดส่องดูแลคุณครูกับฮานาโกะคือหน้าที่ของฉัน!"
10026030-62 = "ไม่ใช่คุณครูเท่านั้นนะ เดิมทีแล้วฉันต้องไปอยู่ข้างๆ ฮานาโกะเพื่อสอดส่องเธอด้วย..."
10026030-63 = "แต่ในเมื่อฉันมีร่างเดียว งั้นก็ช่วยไม่ได้นี่นา!?  ก็สถานการณ์มันเป็นแบบนี้นี่...!"
10026030-64 = "...หืม?"
10026030-65 = "แล้วทำไมถึงต้องเลือกคุณครูด้วยน่ะเหรอ? กะ... ก็แบบว่า..."
10026030-66 = "ถะ... ถ้าถามแบบนั้นจะต้องโดนลงโทษนะ! อย่ามาชวนเปลี่ยนเรื่องสิ!!"
10026030-70 = "......!?  เฮือก!?"
10026030-75 = "...อ่า"
10026030-76 = "...เอ๋... หืม? คุณครู...?"
10026030-77 = "[s5] \"ว่าไง อุย\"\n[s6] \"ถนนตรงนี้มาเชื่อมกันสินะ\""
10026030-80 = "นั่นสินะคะ เมื่อกี้คุณฮินาตะก็เพิ่งเดินผ่านไปค่ะ..."
10026030-81 = "เป็นสถานที่ที่น่าศึกษาทีเดียวค่ะ ฉันยิ่งสงสัยมากเข้าไปทุกทีแล้วค่ะว่าทำไมถึงสร้างที่แห่งนี้ให้เป็น#nเหมือนเขาวงกต..."
10026030-85 = "อืม... จะว่าไปแล้ว คุณครูคะ คนที่อยู่ข้างๆ..."
10026030-86 = "......!?"
10026030-87 = "เอ่อ... ฉะ... ฉันเหรอ!? ฉะ... ฉัน... คือว่า... เอ่อ..."
10026030-88 = "[s7] \"พวกเราก็บังเอิญเดินมาเจอกันน่ะ\"\n[s8] \"เห็นทำตัวยึกยักๆ ครูเลยให้มาด้วยกัน\""
10026030-91 = "แบบนี้นี่เอง... คงเหนื่อยน่าดูเลยนะคะ..."
10026030-92 = "งั้นฉันขอตัวก่อน..."
10026030-93 = "...คะ? ปะ... ไปด้วยกันเหรอคะ?"
10026030-94 = "ไปด้วยกัน... อืม... ไปด้วยกัน... งั้นเหรอ..."
10026030-101 = "ไม่ดีกว่าค่ะ ตอนนี้ฉันยัง... ขอโทษนะคะ ฉะ... ฉันขอไปสำรวจคนเดียวดีกว่าค่ะ ถ้าให้ไปกับคนที่ไม่รู้จัก ฉันจะไม่ค่อยสะดวกใจเท่าไร"
10026030-102 = "ถ้าแค่มาเที่ยวเล่นฉันคงทนได้ แต่ตอนนี้เรากำลังทำงานกันอยู่..."
10026030-103 = "ขอความเห็นใจ... ด้วยนะคะ... อย่าคิดในแง่ลบเลยนะคะ ฉันไปละ..."
10026030-107 = "ฮู่ว... หัวใจร่วงไปอยู่ตาตุ่มแล้ว..."
10026030-108 = "...หืม? อุยไม่ใช่คนไม่ดีอะไร ไม่ต้องประหม่าก็ได้งั้นเหรอคะ?"
10026030-109 = "ฉะ... ฉันก็ไม่ได้ประหม่าอะไรนี่!? ถ้าใครมาได้ยินเข้า คงคิดว่าฉันประหม่าทุกครั้งที่เห็นคน..."
10026030-113 = "เฮือกกก!?"
10026030-118 = "...หืม?"
10026030-119 = "หืมมม? ...คุณครู? และอีกคนข้างๆ... คุณโคฮารุ... หรือเปล่านะคะ?"
10026030-120 = "..."
10026030-121 = "...อ่า... สวัส... ดีค่ะ..."
10026030-122 = "สวัสดีค่ะ เราทักทายกันไปแล้วแท้ๆ แต่เขาวงกตทำให้เรามาเจอและทักทายกันอีก สนุกดีนะคะเนี่ย!"
10026030-123 = "ค่ะ... ค่ะ... นั่นสินะคะ..."
10026030-124 = "[ns] \".........\""
10026030-128 = "(หลังจากนั้นคุณครูก็เดินไปตามกำแพงหินที่เหมือนเขาวงกต และก็เจอกับอุยและฮินาตะอีกหลายครั้ง)"
10026030-130 = "[ns9] \"อืม ตรงนี้น่าจะเป็นจุดสุดท้ายแล้วนะ\"\n[ns10] \"ทำได้ดีมากเลย โคฮารุ\""
10026030-133 = "เฮ้อ... เหนื่อยจัง... คุณครู เกือบจะเสร็จแล้วยังน่ะ?"
10026030-134 = "...หืม? ฉันดูเหนื่อยมากงั้นเหรอ? เหนื่อยที่ต้องเจอผู้คนเยอะน่ะนะ?"
10026030-135 = "มะ... ไม่ขนาดนั้นสักหน่อย!?  ฉันเจอใครก็ทักทายกลับอย่างมีชีวิตชีวาเหอะ..."
10026030-136 = "แต่ถ้าให้เจอหลายๆ รอบแบบนั้นมันก็..."
10026030-140 = "......!!"
10026030-141 = "กะ... ก็ได้ ต่อไปฉันจะเป็นคนเอ่ยทักทายก่อนเอง! แค่นี้ก็จบแล้วใช่ไหม?"
10026030-142 = "คะ... คอยดูฉันไว้ให้ดีๆ ล่ะ คุณครู! แล้วฉันจะทักทายคนอื่นก่อนให้ดู!"
10026030-148 = "อ่า... เอ่อ..."
10026030-150 = "สวัสดี...!!"
10026030-153 = "............"
10026030-154 = "............"
10026030-155 = "............"
10026030-159 = "ว้ายยยยยยย!!!!!!!!!!!"

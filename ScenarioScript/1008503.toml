[translation]
1008503-1 = "Glamping"
1008503-3 = "My Schale work sent me over to Millennium again. I decided to visit the Veritas club room to check on Hare."
1008503-8 = "Veritas Hackers' Lounge"
1008503-10 = "[ns1] \"Are you in, Hare?\"\n[ns2] \"I brought Frenzy MAX passion fruit flavor!\""
1008503-16 = "[ns3] \"Whoa, it's freezing!\"\n[ns4] \"The AC's running in this weather?\""
1008503-23 = "Ah, Sensei. You're here."
1008503-24 = "Sorry. I was out picking up a package."
1008503-28 = "Is that energy drink passion fruit flavor?"
1008503-29 = "I was just getting thirsty. Thanks for bringing me one."
1008503-30 = "[s5] \"No problem.\"\n[s6] \"By the way, I think you left the AC on...\""
1008503-33 = "Don't worry about the AC. That's intentional."
1008503-34 = "I'm running the server computer in the club room at max load to test out its new high-speed calculation cloud computing."
1008503-35 = "Even the slightest spike in temperature could tank the server's performance, so I'm keeping it cool with the AC."
1008503-36 = "I know it's very cold, but I hope you can understand."
1008503-37 = "[s7] \"It's not a problem for me...\"\n[s8] \"But will you be able to keep working at this temperature?\""
1008503-40 = "Yeah. You don't have to worry about me."
1008503-41 = "I borrowed some camping equipment from the vice president for just this situation."
1008503-46 = "A windbreaker, a portable electric hand warmer...oh this insulated blanket is a must!"
1008503-47 = "I even brought some canned soup and cup ramen to warm myself up."
1008503-48 = "In other words... Today the Veritas Hackers' Lounge is..."
1008503-50 = "A glamping base camp!"
1008503-54 = "[ns] \"Glamping?\""
1008503-55 = "Yeah. Didn't I mention it on MomoTalk?"
1008503-56 = "Glamping is all the positives of camping, without the tedious parts, like pitching tents or moving equipment."
1008503-57 = "We're technically using camping equipment here in the club room. So, I think you could call this a form of glamping."
1008503-58 = "If I can glamp in here, I think I could handle doing it outdoors with Chihiro."
1008503-59 = "While it may seem like it's not that different from our usual set up..."
1008503-60 = "...this is preparation for future outdoor activities!"
1008503-61 = "[s] \"This conclusion sounds a bit off...\""
1008503-62 = "Anyways, since I've borrowed all this equipment, I'm going to relax like I'm at camp."
1008503-66 = "First, a can of Frenzy MAX..."
1008503-71 = "Aaah...camping and a cold drink...name a better duo!"
1008503-72 = "Shall I start setting up the server then?"
1008503-76 = "I watched Hare work from within her blanket cocoon."
1008503-79 = "Mm, this part's tricky."
1008503-80 = "I need to adjust the settings that automatically increase this node's capacity when it's overloaded..."
1008503-84 = "*gulp*"
1008503-85 = "[s9] \"Uh, Hare...\"\n[s10] \"Are you gonna do something about that mountain of cans on your desk?\""
1008503-90 = "...Hm? Cans...?"
1008503-91 = "Huh? Did I drink all these?!"
1008503-92 = "[s11] \"I don't want to be a nag...\"\n[s12] \"But how about you clear out all this trash on your desk?\""
1008503-95 = "Mm... I should."
1008503-96 = "But I'm really in the zone fixing this node. Stopping to take out the trash might break up my flow..."
1008503-100 = "That's right. Am I not camping right now?"
1008503-101 = "When you're camping, you always keep the trash gathered up in one spot."
1008503-102 = "I promise I'll take the cans out at the very end. So can you just let it slide until then?"
1008503-103 = "[s] \"If you say so...\""
1008503-104 = "Heehee. I knew you'd understand."
1008503-105 = "Back to upgrading this node..."
1008503-111 = "But Hare's lazy bones camping trip had only just begun..."
1008503-115 = "Heehee. Cup ramen tastes so good when you eat it from inside your sleeping bag."
1008503-116 = "It's like breakfast in bed... New guilty pleasure unlocked."
1008503-122 = "*yawn*"
1008503-123 = "I think I'm finally crashing after all those energy drinks..."
1008503-124 = "Or maybe it's because I'm caught between the AC breeze and my cozy, warm sleeping bag. I can barely keep my eyes open..."
1008503-128 = "Ugh... I think that should do it."
1008503-129 = "All that's left now is to wait for data analysis to complete..."
1008503-130 = "Maybe I should take a nap while I wait."
1008503-131 = "Sensei, could you turn the lights off for me?"
1008503-132 = "It's so warm in my sleeping bag. I don't want to leave..."
1008503-140 = "S-Sensei? What's the matter? Your face is scaring me..."
1008503-145 = "[ns] \"Wake up!\""
1008503-149 = "H-Huh?!"
1008503-150 = "[s13] \"I thought I could wait it out. But clearly I can't.\"\n[s14] \"This indoor camping has you acting lazier than usual!\""
1008503-153 = "[ns] \"Enough! Time for you to wake up and smell the calisthenics!\""
1008503-154 = "B-But today is glamping day! I don't wanna—"
1008503-155 = "...What? Cardio will make me feel warmer than my sleeping bag? That's a lie!"
1008503-156 = "If I exercise too much, how will I be able to code? I'll be too tired to think!"
1008503-157 = "I-I heard there was a study that intellectual activities like programming actually burn a lot of calories—"
1008503-162 = "Please, Sensei! I'm a scholar, not an athlete! I don't wanna go for a jog! Sensei!!"
1008503-168 = "I took Hare for a light jog around the academy. She swore she'd never glamp in the club room again."

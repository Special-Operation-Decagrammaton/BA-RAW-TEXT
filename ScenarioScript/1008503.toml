[translation]
1008503-1 = "Glamping"
1008503-3 = "（為了處理夏萊的公務去了一趟千年學園，順路到貝里塔斯的部室找晴）"
1008503-8 = "貝里塔斯．駭客休息室"
1008503-10 = "[ns1]「晴，你在嗎？」\n[ns2]「我買了你上次託我買的百香果口味『妖怪MAX』……」"
1008503-16 = "[ns3]「嗚哇，好冷！」\n[ns4]「為什麼這麼冷還要開冷氣……？」"
1008503-23 = "啊，老師，你來了啊。"
1008503-24 = "抱歉，我剛才去領快遞所以不在位置上。"
1008503-28 = "你手裡拿的那瓶飲料……不是百香果口味的「妖怪MAX」嗎？"
1008503-29 = "我剛好想喝這個呢……謝謝你特地替我帶來。"
1008503-30 = "[s5]「不客氣。」\n[s6]「話說回來，部室裡好像開著冷氣……」"
1008503-33 = "啊，那個不用在意，是我故意打開的。"
1008503-34 = "為了測試高效能的雲端運算功能，我把部室裡的雲端伺服器都調成了最高性能模式。"
1008503-35 = "要是室溫再高一點的話，伺服器的運算效率就會降低，所以我才會利用冷氣散熱。"
1008503-36 = "……雖然有點冷，還請老師忍耐一下。"
1008503-37 = "[s7]「我是沒關係……」\n[s8]「不過這裡這麼冷，你有辦法一直待在這裡工作嗎？」"
1008503-40 = "嗯，這點老師不用擔心。"
1008503-41 = "為了預防這種情況，我事先向副部長借了露營工具。"
1008503-46 = "從能夠抵禦冷風的防風衣、電子隨身暖爐、禦寒毛毯……"
1008503-47 = "到有助於在工作時暖胃的湯罐頭和泡麵，我全都準備好了。"
1008503-48 = "換句話說，今天的貝里塔斯駭客休息室……"
1008503-50 = "就跟豪華露營地沒兩樣！"
1008503-54 = "[ns]「豪華露營地……？」"
1008503-55 = "嗯，我之前不是在MomoTalk跟你提過嗎？"
1008503-56 = "有一種露營形式是省略架設帳篷、運送裝備這些麻煩的過程，#n讓人可以單純享受露營的氛圍……而這就叫做[ruby=Glamping]豪華露營[/ruby]。"
1008503-57 = "雖然地點是在部室裡，但既然使用了這麼多露營工具……#n我認為稱之為豪華露營應該也不為過。"
1008503-58 = "等我習慣這種露營方式，就算之後要和千尋前輩去野外露營，我一定也能快速適應。"
1008503-59 = "就算這看起來跟我平常的生活差別不大……"
1008503-60 = "但這可以說是我為了野外活動而做的事前準備！"
1008503-61 = "[s]「你的結論好像有點奇怪……」"
1008503-62 = "總之，既然今天都特地借了露營裝備，#n我打算像真的在露營一樣，悠閒地度過今天的時光。"
1008503-66 = "先來一罐妖怪MAX……"
1008503-71 = "呼哈……不知道是不是因為在露營的關係，總覺得能量飲料喝起來變得更好喝了。"
1008503-72 = "好，那我也差不多該來重新架設伺服器了……"
1008503-76 = "（於是便在一旁默默看著晴像披著蓑衣一般披著毛毯工作……）"
1008503-79 = "唔，這部分有點麻煩呢。"
1008503-80 = "如果想讓大量連線湧入時，可以自動增加節點容量的設定正常運行……"
1008503-84 = "……（咕嘟）"
1008503-85 = "[s9]「那個，晴……」\n[s10]「你桌上那堆飲料罐……」"
1008503-90 = "……嗯？飲料罐……？"
1008503-91 = "咦？我什麼時候喝了這麼多罐！？"
1008503-92 = "[s11]「雖然我不想一直唸你……」\n[s12]「但你要不要先把那些垃圾拿去丟掉？」"
1008503-95 = "嗯……老師說得對。"
1008503-96 = "不過我難得能這麼專心，要我現在為了丟垃圾跑到外面去實在有點……"
1008503-100 = "……啊，對了。#n我們現在不是在露營嗎？"
1008503-101 = "在露營中如果產生垃圾，不是都會先堆在一起嗎……"
1008503-102 = "這些瓶子我之後會一起拿去丟，老師今天能不能暫時放我一馬……？"
1008503-103 = "[s]「既然你都這麼說了，那好吧……」"
1008503-104 = "呵呵，謝謝老師。"
1008503-105 = "那接下來要做的是……"
1008503-111 = "（然而在那之後，晴的懶惰露營生活依舊持續……）"
1008503-115 = "呵呵，以半躺的姿勢窩在睡袋裡吃東西，連泡麵吃起來都特別好吃呢。"
1008503-116 = "簡直就像是躺在床上吃泡麵一樣……有種偷嚐禁果的感覺。"
1008503-122 = "呼啊……"
1008503-123 = "明明喝了那麼多能量飲料，為什麼還是會想睡覺呢……"
1008503-124 = "是因為裹著溫暖的睡袋感受不到冷風，所以連身體都開始懶惰了嗎？#n眼睛感覺快閉起來了……"
1008503-128 = "呼……終於整理好了。"
1008503-129 = "現在只要等資料分析完就行了……"
1008503-130 = "那這段時間就先來睡個午覺吧。"
1008503-131 = "老師，可以幫我關燈嗎？"
1008503-132 = "睡袋裡實在太溫暖，我已經離不開這裡了……"
1008503-140 = "老，老師……？怎麼了？#n為什麼用那麼恐怖的表情看我……"
1008503-145 = "[ns]「……起床！」"
1008503-149 = "咦，咦咦……？"
1008503-150 = "[s13]「本來是不想管你的……但我實在看不下去了。」\n[s14]「什麼都用露營當藉口，整個人變得比平常還要懶散。」"
1008503-153 = "[ns]「所以從現在開始──伸展運動預備！」"
1008503-154 = "可是……我今天是在豪華露營唷？#n沒必要特地做運動吧……"
1008503-155 = "你說只要活動身體，就算不靠露營裝備也不會覺得冷？"
1008503-156 = "這個道理我當然也懂……可是我就是不想白白浪費能量呀……"
1008503-157 = "某項研究結果指出，進行寫程式這類需要用腦的活動時，會消耗大量的卡路里……"
1008503-162 = "等等，老師……我知道了啦！#n你不要硬把我拖出去嘛……！"
1008503-168 = "（之後帶著晴去學園附近慢跑，直到他的身體徹底暖和起來為止……）"

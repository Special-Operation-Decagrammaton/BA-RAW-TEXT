[translation]
1008503-1 = "แกลมปิ้ง"
1008503-3 = "(คุณครูไปโรงเรียนมิลเลเนียมเพื่อทำงานของชาเล่ต์ จึงถือโอกาสนี้แวะไปหาฮาเระที่ห้องเวอริทัสด้วย)"
1008503-8 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
1008503-10 = "[ns1] \"ฮาเระ อยู่รึป่าว?\"\n[ns2] \"ครูซื้อ <มอนสเตอร์แม็กซ์> รสเสาวรสที่ฝากซื้อคราวก่อนมาให้—\""
1008503-16 = "[ns3] \"เหวอ หนาวจัง!\"\n[ns4] \"อากาศหนาวขนาดนี้แล้วยังเปิดแอร์อีก...?\""
1008503-23 = "อ๊ะ คุณครู มาแล้วเหรอ"
1008503-24 = "ขอโทษนะ พอดีฉันออกไปรับพัสดุข้างนอกมาน่ะ"
1008503-28 = "เครื่องดื่มในมือนั่น... มอนสเตอร์แม็กซ์รสเสาวรสนี่นา?"
1008503-29 = "กำลังอยากกินอยู่พอดีเลย... ขอบคุณที่เอามาให้นะ"
1008503-30 = "[s5] \"ครูยินดี\"\n[s6] \"จะว่าไป เหมือนตอนนี้แอร์จะเปิดอยู่นะ...\""
1008503-33 = "อ้อ ไม่ต้องสนใจหรอก ฉันตั้งใจเปิดเอาไว้เองน่ะ"
1008503-34 = "พอดีฉันทดสอบคลาวด์ประสิทธิภาพสูงอยู่น่ะ ก็เลยจัดเซิร์ฟเวอร์คอมพิวเตอร์ในห้องให้อยู่ในสเป็ก#nสูงสุด"
1008503-35 = "และถ้าอุณหภูมิสูงขึ้น ก็อาจทำให้ประสิทธิภาพของเซิร์ฟเวอร์ลดลงได้ ฉันก็เลยเปิดแอร์ไว้ให้เย็นๆ น่ะ"
1008503-36 = "...ถึงห้องชมรมจะหนาวไปหน่อยก็ช่วยเข้าใจด้วยนะ"
1008503-37 = "[s7] \"ครูไม่มีปัญหาอะไรหรอก...\"\n[s8] \"แต่ถ้าหนาวขนาดนี้ ฮาเระจะทำงานต่อไหวเหรอ?\""
1008503-40 = "อื้ม ถ้าเรื่องนั้นไม่ต้องกังวลหรอก"
1008503-41 = "ฉันยืมอุปกรณ์แคมป์ปิ้งจากรองหัวหน้ามาเพื่อการนี้แล้วยังไงล่ะ"
1008503-46 = "ฉันมีทั้งแจ็กเกตกันลม เครื่องทำความร้อนไฟฟ้าแบบพกพา แล้วก็ผ้าห่มป้องกันลมหนาวจากแอร์..."
1008503-47 = "แล้วก็มีซุปกระป๋องกับราเม็งถ้วยที่ทำให้ร่างกายอบอุ่นระหว่างทำงานด้วย"
1008503-48 = "เท่ากับว่าห้องพักผ่อนแฮ็กเกอร์เวอริทัสในวันนี้—"
1008503-50 = "คือลานแกลมปิ้งเลยละ!"
1008503-54 = "[ns] \"ลานแกลมปิ้ง...?\""
1008503-55 = "อื้ม ก่อนหน้านี้ฉันเคยบอกใน MOMOTALK ไปแล้วนี่?"
1008503-56 = "นอกจากแคมป์ปิ้งแล้ว ยังมีสิ่งที่เรียกว่าแกลมปิ้งด้วย นั่นก็คือการตั้งแคมป์แบบเอาแต่บรรยากาศ ไม่ต้องมากางเต็นท์หรือขนสัมภาระมากมาย ขั้นตอนน่ารำคาญแบบนั้นน่ะตัดไปได้เลย"
1008503-57 = "ถึงจะอยู่ในห้องชมรมที่สะดวกสบาย แต่ก็ใช้อุปกรณ์แคมป์ปิ้งให้ได้บรรยากาศ แบบนี้แหละที่เรียกว่า#nแกลมปิ้ง"
1008503-58 = "ถ้าเราเริ่มคุ้นเคยกับแกลมปิ้งรูปแบบนี้ ต่อไปถ้าต้องตามรุ่นพี่จิฮิโระไปตั้งแคมป์กลางแจ้ง ก็คงจะปรับตัวได้ง่ายๆ เลยละ"
1008503-59 = "ถึงแม้นี่จะดูไม่ต่างจากปกติเท่าไรเลยก็เถอะ..."
1008503-60 = "แต่ก็เรียกได้ว่าเป็นการเตรียมการสำหรับกิจกรรมกลางแจ้งล่วงหน้านะ!"
1008503-61 = "[s] \"บทสรุปมันดูแปลกๆ อยู่นะ...\""
1008503-62 = "เอาเถอะ ไหนๆ วันนี้ฉันก็ยืมอุปกรณ์แคมป์ปิ้งมาแล้ว ฉันก็เลยจะใช้เวลาในวันนี้แบบชิลๆ เหมือนออกไปตั้งแคมป์"
1008503-66 = "ก่อนอื่นก็ต้องเริ่มด้วยมอนสเตอร์แม็กซ์สักกระป๋อง..."
1008503-71 = "ฮ่าา... พอเป็นเครื่องดื่มชูกำลังที่ดื่มระหว่างแคมป์ปิ้งก็ยิ่งอร่อยขึ้นไปอีกนะ"
1008503-72 = "งั้นต่อไปก็มาเริ่มตั้งค่าเซิร์ฟเวอร์ดีกว่า"
1008503-76 = "(...จากนั้นคุณครูก็เฝ้าดูฮาเระทำงานอยู่ในผ้าห่มอยู่พักใหญ่)"
1008503-79 = "อืม ปัญหาตรงนี้ซับซ้อนจัง"
1008503-80 = "ถ้าจะตั้งค่าเพื่อเพิ่มกำลังการทำงานอัตโนมัติของโหนดในตอนที่มีการเชื่อมต่อจากหลายทิศทาง..."
1008503-84 = "...... (กลืนน้ำลาย)"
1008503-85 = "[s9] \"นี่ ฮาเระ...\"\n[s10] \"กระป๋องเครื่องดื่มที่กองเป็นพะเนินอยู่บนโต๊ะน่ะ\""
1008503-90 = "...หืม? กระป๋องเครื่องดื่ม...?"
1008503-91 = "เอ๋? ดื่มไปขนาดนี้ตั้งแต่ตอนไหนเนี่ย?!"
1008503-92 = "[s11] \"ครูก็ไม่อยากจะบ่นอะไรจุกจิกหรอกนะ...\"\n[s12] \"แต่ไปทิ้งขยะที่อยู่บนโต๊ะก่อนมั้ย?\""
1008503-95 = "อืม... นั่นสินะ"
1008503-96 = "แต่ว่าฉันกำลังจดจ่อกับการเขียนโปรแกรม จะให้ออกไปทิ้งขยะข้างนอกมันก็..."
1008503-100 = "...อ่า จริงสิ ฉันกำลังแคมป์ปิ้งอยู่นี่นา?"
1008503-101 = "ปกติแล้วเวลาออกไปตั้งแคมป์ เราก็จะรวบรวมขยะไว้ในที่เดียวแล้วค่อยเอาไปทิ้ง..."
1008503-102 = "เดี๋ยวฉันเอากระป๋องมารวมกันแล้วเอาไปทิ้งเอง วันนี้คุณครูช่วยหลับหูหลับตาให้หน่อยไม่ได้เหรอ...?"
1008503-103 = "[s] \"ถ้าพูดแบบนั้นก็ช่วยไม่ได้นะ...\""
1008503-104 = "ฮุฮุ ขอบคุณที่เข้าใจนะ"
1008503-105 = "งั้นก็มาเขียนโปรแกรมต่อ..."
1008503-111 = "(การแคมป์ปิ้งอย่างเกียจคร้านของฮาเระยังคงดำเนินต่อไป...)"
1008503-115 = "ฮุฮุ ราเม็งถ้วยที่นอนกินในถุงนอนก็มีรสชาติดีเหมือนกันแฮะ"
1008503-116 = "เหมือนนอนกินราเม็งบนเตียงเลย... แทบจะรู้สึกผิดเลยนะเนี่ย"
1008503-122 = "ฮ้าวว~ zZZ"
1008503-123 = "กินเครื่องดื่มชูกำลังไปเยอะขนาดนั้น แต่ทำไมถึงง่วงล่ะ..."
1008503-124 = "หรือเพราะอยู่ในถุงนอนอุ่นๆ แล้วโดนลมแอร์เย็นๆ ร่างกายก็เลยอ่อนเพลีย? ตาจะปิดอยู่แล้ว..."
1008503-128 = "อึก... ปิดงานได้สักที"
1008503-129 = "จากนี้ก็เหลือแค่รอให้วิเคราะห์ข้อมูลเสร็จ..."
1008503-130 = "ระหว่างนี้ของีบสักหน่อยดีมั้ยนะ"
1008503-131 = "คุณครู ฝากปิดไฟให้หน่อยได้มั้ย?"
1008503-132 = "ตอนนี้ในถุงนอนอุ่นมาก ฉันก็เลยไม่อยากออกไปจากตรงนี้น่ะ..."
1008503-140 = "คะ... คุณครู...? จู่ๆ ก็เป็นอะไรไปน่ะ? ทำไมทำหน้าทำตาน่ากลัวแบบนั้น..."
1008503-145 = "[ns] \"...ลุกขึ้น!\""
1008503-149 = "หะ... หืม...?"
1008503-150 = "[s13] \"ครูว่าจะดูต่ออีกสักพัก... แต่ให้เป็นแบบนี้ต่อไม่ได้แล้ว\"\n[s14] \"เอาเรื่องแคมป์ปิ้งมาเป็นข้ออ้างแล้วทำตัวขี้เกียจนี่นา\""
1008503-153 = "[ns] \"ลุกขึ้นมายืดเส้นยืดสายเดี๋ยวนี้!\""
1008503-154 = "แต่ว่าแคมป์ปิ้งวันนี้... คือแกลมปิ้งนะ ไม่จำเป็นต้องออกแรงทำอะไรมาก—"
1008503-155 = "ถ้าได้ขยับร่างกาย ต่อให้ไม่ได้ใส่เสื้อผ้าแคมป์ปิ้งก็จะไม่หนาวงั้นเหรอ?"
1008503-156 = "มันก็จริงอยู่หรอก... แต่ฉันไม่อยากใช้พลังงาน..."
1008503-157 = "มีงานวิจัยบอกไว้ด้วยนะว่ากิจกรรมที่ต้องใช้สมองอย่างการเขียนโปรแกรมก็ใช้แคลลอรีไม่ใช่เล่นเลย—"
1008503-162 = "เดี๋ยวสิ คุณครู... ก็ได้ๆ เข้าใจแล้ว! อย่าดึงกันสิ...!"
1008503-168 = "(หลังจากนั้นคุณครูก็พาฮาเระออกมาวิ่งจ็อกกิ้งเบาๆ ใกล้ๆ โรงเรียนจนได้เหงื่อ)"

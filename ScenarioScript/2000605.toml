[translation]
2000605-1 = "Saya's Favorite Spot"
2000605-2 = "Noodle Shop"
2000605-3 = "This is one of my favorite ramen places!"
2000605-4 = "The owner here uses creative ingredients every Ramen Week to come up with a surprising new menu."
2000605-5 = "And I'm sure the new one is going to be amazing! ♪"
2000605-6 = "What's wrong, Sensei? You don't look so good."
2000605-7 = "Are you not a fan of ramen?"
2000605-8 = "[s1] \"It's not that I don't like it...\"\n[s2] \"Something smells fishy...\""
2000605-13 = "Oh, Saya. You're back."
2000605-14 = "Yup. I came to try out the new dish with Sensei here."
2000605-15 = "Well...I hate to be the bearer of bad news, but it's still not ready this week. You'll have to go somewhere else if you want new ramen."
2000605-16 = "What? Really? You said just last week that you were happy you came up with a new secret broth."
2000605-17 = "Was there something wrong with it?"
2000605-18 = "Yeah, something like that. There's been a problem..."
2000605-19 = "How about you see for yourself?"
2000605-22 = "[s] \"I knew I smelled something fishy.\""
2000605-23 = "Right. I used kusaya fish sauce as a base for the broth."
2000605-24 = "It's thick and has an umami flavor that's better than any ramen I've developed so far, but I just can't seem to get rid of that distinct fishy smell."
2000605-25 = "The Promenade's reputation would be ruined if I served this to customers."
2000605-26 = "That's awful. I was really looking forward to trying it too..."
2000605-28 = "Say, you wouldn't happen to have some kind of secret sauce that can get rid of this smell, would you, Saya?"
2000605-29 = "Huh? What makes you think I would have something like that?"
2000605-30 = "Your specialty is alchemy, isn't it? You know how to mix all sorts of things to make whatever effect you want."
2000605-31 = "If anyone knows how to make something that would affect someone's sense of smell, it would be you."
2000605-32 = "And isn't the old saying that the customer is always right?"
2000605-33 = "What do business slogans have to do with me practicing alchemy?!"
2000605-34 = "Heh... Well, lucky for you, this works out perfectly."
2000605-35 = "It just so happens that I have an elixir with me that blocks out bad smells!"
2000605-36 = "[s3] \"Lucky?\"\n[s4] \"It just so happens?\""
2000605-37 = "Stop treating me like a suspect!"
2000605-38 = "Stop treating me like a suspect!"
2000605-39 = "It's natural for a scientist to carry around their materials so they can conduct research any time, any place."
2000605-40 = "I'll make you a sauce that neutralizes unpleasant odors in no time by simply combining a few base materials!"
2000605-41 = "Then, my ramen is all yours to experiment on!"
2000605-42 = "Heh heh. Let's get started, shall we?"
2000605-45 = "― Heh heh heh. The smell really packs a punch.[wa:4140] "
2000605-47 = "― We definitely can't eat it like this.[wa:1330] "
2000605-50 = "― First, one spoonful of deodorizer to remove the smell.[wa:1840] "
2000605-52 = "― Next, two spoonfuls of mustard powder to dull the aftertaste.[wa:1380] "
2000605-55 = "― Just a little bit more... You're gonna be delicious.[wa:440] "
2000605-58 = "― Uh,  wait a second.[wa:330] "
2000605-60 = "― I accidentally added way too much mustard powder![wa:570] "
2000605-63 = "― Eh, it shouldn't be that big a deal.[wa:1810] "
2000605-65 = "― I just need to add something else to then counteract the smell.[wa:1270] "
2000605-68 = "It's done! Have a taste!"
2000605-69 = "I added plenty of my special sauce, so you shouldn't have to worry about that smell anymore."
2000605-70 = "You're right. That fishy smell is completely gone."
2000605-71 = "Now let's see how it tastes..."
2000605-78 = "HOT! SPICY HOT!"
2000605-79 = "*cough* *cough* What is this?! This sauce is so spicy! It feels like my mouth is on fire!"
2000605-80 = "Heh heh heh. That's the whole point!"
2000605-81 = "The root of the problem is that the fishy smell is too strong for people's noses, right?"
2000605-82 = "So..."
2000605-83 = "...if you add so much spice that it numbs the eater's sense of smell, they wouldn't be able to smell the odor at all!"
2000605-84 = "I'm such a genius! Hahaha!"
2000605-85 = "But who would ever want to eat this if it's THIS spicy?"
2000605-88 = "Did someone say spicy soup?"
2000605-89 = "Would you mind if I give it a try?"
2000605-90 = "And you are...?"
2000605-91 = "Go right ahead! It was made with my special sauce!"
2000605-92 = "Let's see..."
2000605-99 = "HOT! SPICY HOT!"
2000605-100 = "[s] \"That's two for two.\""
2000605-101 = "*cough* *cough* I've never tasted anything so spicy before. Any normal person would struggle simply to put in their mouth."
2000605-102 = "...However, underneath the spiciness is a deep hidden flavor that's rather enjoyable."
2000605-103 = "No, better than that. It harmonizes with the spiciness to satisfy the palate like nothing else!"
2000605-104 = "It's decided, then."
2000605-105 = "The winner of this Ramen Week is this spicy ramen!"
2000605-106 = "You wouldn't happen to be the legendary connoisseur...Mr. Nekobara, would you?"
2000605-107 = "Who I am doesn't matter. All that matters is that there's delicious food here."
2000605-109 = "I can only imagine business is about to pick up, so I'll be back another time."
2000605-114 = "Well, he was strange. Who just leaves after giving such a glowing review?"
2000605-115 = "Anyway, my work here is done. I'll be heading back now."
2000605-118 = "Is this the place that sells the spicy ramen Mr. Nekobara praised on social media?"
2000605-119 = "I heard it's worth trying if you love spicy food. I'd like to order, please!"
2000605-120 = "Same here! One order of that new ramen everyone is talking about!"
2000605-121 = "But it still isn't officially on the menu yet. How did everyone find out about it?"
2000605-122 = "I-I mean, coming right up!"
2000605-124 = "IT'S SO SPICY! But delicious too!"
2000605-125 = "This is the spiciest thing I've ever tasted! I think I'm in love..."
2000605-126 = "It burns so much...but my chopsticks are moving on their own!"
2000605-130 = "Do you all really think it's that good?"
2000605-131 = "(This never happens...)"
2000605-132 = "[s] \"Why so surprised? Not what you were expecting?\""
2000605-133 = "O-Of course it is! I made it, so I knew it was going to be delicious!"
2000605-134 = "...Think we should try it for ourselves?"
2000605-136 = "Saya and I then shared a bowl of ramen made with the special sauce."
2000605-137 = "...For over three days, my stomach felt like it had boiling lava inside of it."

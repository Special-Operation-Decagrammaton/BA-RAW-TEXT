[translation]
2000605-1 = "沙耶的美味餐廳"
2000605-2 = "某間拉麵店"
2000605-3 = "這裡是我推薦的拉麵店！"
2000605-4 = "這家老闆每次拉麵週都會推出充滿創意，讓人驚豔的新菜色。"
2000605-5 = "這次新研發的拉麵一定也會很美味♪"
2000605-6 = "哦？怎麼了老師？你臉色有點差耶……？"
2000605-7 = "難道老師討厭拉麵嗎？"
2000605-8 = "[s1] 「不，我很喜歡拉麵……」\n[s2] 「只是這間店怎麼有一股臭味……」"
2000605-13 = "啊。沙耶親，你來了呀！"
2000605-14 = "嗨。今天我和老師一起來吃這次新研發的菜色！"
2000605-15 = "啊──……抱歉啊，沙耶親。這次新菜色開發的不太順利……"
2000605-16 = "嗯？怎麼會？上星期老闆不是還很開心說，最新最棒的湯頭就要完成了嗎？"
2000605-17 = "之後有發生什麼問題嗎？"
2000605-18 = "就是那湯頭有點問題啊……"
2000605-19 = "你們看看……"
2000605-22 = "[s] 「剛才的腥臭味就是從這裡……！？」"
2000605-23 = "你們聞應該也能聞出來，這次的湯頭有使用臭魚乾汁。"
2000605-24 = "就好吃程度來說確實是目前為止研發的湯頭中最棒的，但就是這個臭魚乾腥味怎樣都去不掉。"
2000605-25 = "臭成這樣實在沒辦法端給客人呀……"
2000605-26 = "呃呃，好可惜……我一直都很期待老闆的新口味拉麵……"
2000605-28 = "……對了，沙耶。你知道有什麼方法能消除這個味道嗎？"
2000605-29 = "嗯？這種事為什麼要問我？"
2000605-30 = "沙耶不是一直在研究鍊丹術嗎，應該很熟悉各種材料的特性吧？"
2000605-31 = "所以我想說你那部分的知識，是不是能應用到料理上面。"
2000605-32 = "而且也聽說你身上常常會帶很多奇怪的藥，不知道是不是有能派上用場的藥。"
2000605-33 = "前，前面就算了，後面說什麼「奇怪的藥」，真是失禮！"
2000605-34 = "嗯，不過……哼──哼哼哼，這樣正好！"
2000605-35 = "剛好讓我想起來，我手上剛好有幾個應該能去除臭味的藥品！"
2000605-36 = "[s3] 「那個，沒問題嗎……？」\n[s4] 「我覺得先不要吧……？」"
2000605-37 = "為，為什麼這麼懷疑我？"
2000605-38 = "為，為什麼這麼懷疑我？"
2000605-39 = "一名專業的研究者，為了能隨時進行研究，當然會隨身攜帶材料！這種程度的調合三兩下就好了！"
2000605-40 = "話不多說，馬上開始吧！"
2000605-41 = "喔！那就拜託啦！"
2000605-42 = "哼──哼哼哼，放心交給我！"
2000605-45 = "― 哼哼……原來如此，這真的是非常強烈的臭味呢……[wa:4980] "
2000605-47 = "― 這樣確實很難入口……[wa:2410] "
2000605-50 = "― 那首先，為了消除腥臭味，先來一匙除臭劑……[wa:3160] "
2000605-52 = "― 然後再加入兩匙辣椒粉，讓嗅覺變遲鈍……[wa:3060] "
2000605-55 = "― 變好吃吧～變好吃～[wa:2160] "
2000605-58 = "― 啊，啊咧？[wa:890] "
2000605-60 = "― 不小心放太多辣椒粉了！[wa:2090] "
2000605-63 = "― 嘛，這種小事應該不用太擔心。[wa:2690] "
2000605-65 = "― 只要再加多一點除臭劑，應該就沒事了！[wa:3070] "
2000605-68 = "完成了！吃吃看吧！"
2000605-69 = "已經沒有腥臭味了對吧？"
2000605-70 = "臭味確實消失了……"
2000605-71 = "我試試看……"
2000605-78 = "好辣！！！！！？！！？！？"
2000605-79 = "咳咳，咳咳……！？這什麼鬼，辣死人了，根本不能吃啊！？"
2000605-80 = "哼──哼哼哼，這就對了。"
2000605-81 = "人在吃東西的時候，也會透過口腔感受到氣味。"
2000605-82 = "因此為了連入口的時候也能完全感受不到氣味……"
2000605-83 = "只要用強烈的辣味徹底轉移注意力，就不會注意到臭味了！"
2000605-84 = "我果然是天才！唔──哈哈哈！"
2000605-85 = "但湯汁這麼辣，沒有人吃得下去吧……？"
2000605-88 = "……你剛才是說，非常辣的湯汁嗎？"
2000605-89 = "我非常喜歡吃辣，可以讓我試一口嗎？"
2000605-90 = "那個，你是……？"
2000605-91 = "當然，品嘗一下我特製的調合湯汁吧！"
2000605-92 = "我看看……"
2000605-99 = "好辣啊啊啊啊！？"
2000605-100 = "[s] 「受害者增加了……」"
2000605-101 = "咳咳，咳咳……這確實是個我不曾品嘗過的嶄新辣味。一般人大概只吃一口就不會想再吃了吧。"
2000605-102 = "然而……在這個辣味背後，隱藏著獨特深沉的韻味。很不錯。"
2000605-103 = "不如說辣味和韻味互相搭配反而能刺激食慾，形成讓人想繼續吃下去的魅力……！"
2000605-104 = "……我決定了。"
2000605-105 = "這次拉麵週的優勝者，就是這個「超辣拉麵」！"
2000605-106 = "什……！難道您是傳說中的美食家……貓原雲顏老師？"
2000605-107 = "呵，我是誰並不重要。這裡有美味的食物……這個事實才重要。"
2000605-109 = "待會而人潮會變多……我下次再來。"
2000605-114 = "這客人真奇怪，怎麼突然出現講一堆大道理。"
2000605-115 = "總之問題解決了，我要回去了。"
2000605-118 = "不好意思。請問這裡有在賣貓原雲顏老師在社群媒體上稱讚的「超辣拉麵」嗎？"
2000605-119 = "聽說喜歡吃辣就不能錯過這間店，請給我來一份！"
2000605-120 = "我也一碗傳聞中的新口味拉麵！"
2000605-121 = "大家怎麼會知道……難道剛才那位真的是……！？"
2000605-122 = "請，請稍等！馬上來！沙耶，拜託幫我弄剛才那個！"
2000605-124 = "好辣啊啊啊！？但真好吃！"
2000605-125 = "這是什麼新穎的刺激……！？真不錯……！！"
2000605-126 = "好辣好痛苦，但筷子卻停不下來……！"
2000605-130 = "咦，那種東西真的會好吃嗎……？"
2000605-131 = "（感覺和我預想的反應不一樣……）"
2000605-132 = "[s] 「這難道就是偶然下的產物？」"
2000605-133 = "怎，怎麼可能！？我一開始弄的時候就知道一定會變好吃！"
2000605-134 = "不過看那些人的反應看到我都餓了……要不要一起吃一碗？"
2000605-136 = "（後來我們點了一碗沙耶調合的特製拉麵，兩人分著吃。）"
2000605-137 = "（吃到整個胃就像燒起來一樣，難受了將近一整週……）"

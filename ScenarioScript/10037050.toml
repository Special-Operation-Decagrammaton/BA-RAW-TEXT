[translation]
10037050-1 = "#title;제5화;하늘에 뜬 구름은 자기 몸이 뜯긴 것을 모르니."
10037050-2 = "#wait;1000"
10037050-3 = "[ns] \"그러면 체리노와 마리나는 먼저 자러 간 거야?\""
10037050-4 = "3;토모에 치파오;00;네. 특히 체리노 서기장…… 체리노 쨩은 꽤 피곤해 보였거든요. \n#3;em;[반응]\n#3;a"
10037050-5 = "3;토모에 치파오;99;아무래도 빡빡한 일정이었다 보니, 무리도 아니었겠지요."
10037050-6 = "3;토모에 치파오;02;네? 저는 피곤하지 않으냐고요?\n#3;em;[?]"
10037050-7 = "3;토모에 치파오;01;걱정해 주시는 건가요? 감사하네요. 우후후."
10037050-8 = "3;토모에 치파오;99;물론 피곤하지 않다고 하면 거짓말이겠지만…… 조금, 여러 가지로 생각을 정리해 봐야 할 것 같아서요."
10037050-9 = "[s] \"가령, 이번 교류회에 숨겨진 저의라던가?\""
10037050-10 = "3;토모에 치파오;02;……글쎄요. 그것은 과연 어떨까요.\n#3;em;…"
10037050-11 = "3;키사키;00\n#3;black\n#3;h"
10037050-12 = "#wait;500"
10037050-13 = "#na;토모에 치파오;솔직하게 말씀드리자면, 문주님의 뜻은 어느 정도 짐작이 가고 있답니다."
10037050-14 = "#na;토모에 치파오;물론 그것이 맞는 짐작일지 어떨지는, 저 자신도 확신할 수 없지만요."
10037050-15 = "[s] \"나는 아직도 잘 모르겠는데.\""
10037050-16 = "#all;hide"
10037050-17 = "#wait;500"
10037050-18 = "3;토모에 치파오;07;그러신가요? 우후후. 하지만 제 짐작이 맞는다면…… 문주님은 그런 걸 그다지 신경 쓰지 않을 듯하네요.\n#3;em;[하트]\n#3;a"
10037050-19 = "[s] \"토모에가 보기에, 산해경은 어땠어?\""
10037050-20 = "3;토모에 치파오;03;어머나. 지금은 꼭 산해경에 속한 사람처럼 말씀하시는군요?"
10037050-21 = "3;토모에 치파오;01;일단은 문주님께 부탁을 받고 산해경에 와 계시기 때문이라고요? 우후후. 확실히, 그건 어쩔 수 없는 부분이겠네요."
10037050-22 = "3;토모에 치파오;99;그렇네요. 산해경은…… 아름다운 곳이었어요.\n#3;em;…"
10037050-23 = "#all;hide"
10037050-24 = "#wait;500"
10037050-25 = "#na;토모에 치파오;인상적이고, 역사적이고…… 무엇보다 숨겨진 것들이 많아서, 흥미로웠죠."
10037050-26 = "#na;토모에 치파오;그리고 더더욱 흥미로운 것은, 산해경 학생들은 그 숨겨진 것들을, 숨겨져 있다고 생각하지도 않고 있다는 부분이었고요."
10037050-27 = "[s] \"조금 더 자세히 이야기해 줄래?\""
10037050-28 = "#all;hide"
10037050-29 = "#wait;500"
10037050-30 = "3;토모에 치파오;03;이런 것입니다. 선생님.\n#3;em;[반응]\n#3;a"
10037050-31 = "3;토모에 치파오;00;비밀이란, 비밀이라고 인식되어야 비로소 비밀일 수 있지요."
10037050-32 = "3;토모에 치파오;99;그곳에 있는 사람들이, 그것을 인식하지도 못하고 구태여 알려고도 하지 않는다면, 비밀은 비밀일 수 없어요.\n#3;m4"
10037050-33 = "3;토모에 치파오;01;그저 아직 알려지지 않은, 존재도 정체도 모르는 무언가일 뿐이죠.\n#3;em;…"
10037050-34 = "3;토모에 치파오;03;산해경에는, 외부인인 저희들이 그저 둘러보는 것만으로도 알 수 있을 만큼 숨겨진 것들이 많아 보였지만……."
10037050-35 = "3;토모에 치파오;01;산해경의 학생들은, 그 사실조차 자각하고 있지 못한 것처럼 보였거든요."
10037050-36 = "3;토모에 치파오;07;물론 이것은 어디까지나 하루 정도만 산해경을 둘러본, 저의 짧은 견문일 수도 있지만요? 우후후.\n#3;em;[하트]\n#3;greeting"
10037050-37 = "[s] \"키사키에 대해서는 어떻게 생각해?\""
10037050-38 = "3;토모에 치파오;00;문주님은…… 멋진 분이죠. 네. 정말로요.\n#3;m3"
10037050-39 = "3;토모에 치파오;03;왜 그렇게 진심으로 따르는 학생들이 많은지도 어느 정도 알 것 같고요."
10037050-40 = "3;토모에 치파오;02;아, 물론 체리노 쨩만큼 귀엽지는 않지만요. 오히려 지나치게 원숙하다고 할까요? 약간, 부자연스러움을 느낄 만큼 말이지요.\n#3;em;[땀]"
10037050-41 = "3;토모에 치파오;01;처음부터 사람들의 위에 서는 것이 당연했다는 것마냥 매사에 능숙하고, 사리에 맞는 판단을 내릴 줄 알고……."
10037050-42 = "3;토모에 치파오;99;이렇게까지 말씀드리고 나니, 새삼 그때 부자연스러운 모습을 보이신 이유가 사뭇 궁금해지기는 하네요."
10037050-43 = "[s] \"그때?\""
10037050-44 = "3;토모에 치파오;00;네. 그때. 오후의 산해경 순방에, 어째서 함께 하시지 않으셨는가, 하는 문제 말이죠."
10037050-45 = "[s] \"아…….\""
10037050-46 = "3;토모에 치파오;03;손님을 초대한 안주인이, 그 손님을 자신의 영역에 직접 안내하지 않는다는 것은 어딘가 부자연스럽지 않을까요?\n#3;em;…"
10037050-47 = "3;토모에 치파오;01;더군다나 그것이 문주님처럼, 예의와 경우를 아는 분이라면 말이죠."
10037050-48 = "3;토모에 치파오;99;도저히 피할 수 없는 사정이 있다고는 말씀하셨지만……."
10037050-49 = "3;토모에 치파오;01;그 시점에서, 이것은 매우 실례되는 생각이겠습니다만, 오히려 어딘가가 석연치 않다고 생각하게 되는 것은, 저뿐만은 아닐 거라고 믿습니다."
10037050-50 = "#st;[0,0];instant;1;"
10037050-51 = "#clearST"
10037050-52 = "3;토모에 치파오;01\n#3;d\n#wait;1500"
10037050-53 = "#all;hide"
10037050-54 = "3;토모에 치파오;01\n#3;a\n#3;closeup\n#wait;1500"
10037050-55 = "3;토모에 치파오;03;선생님은 어떻게 생각하시는지……. 우후후. 대답하지 않으셔도 될 것 같네요. 표정이 이미 말씀을 대신하고 있으니까요.\n#3;em;[반응]\n#3;closeup"
10037050-56 = "3;토모에 치파오;00;그렇게 티가 났냐고요? 어떨까요. 저는 다른 학생들보다 이런 문제에는 조금 민감한 편이어서요.\n#3;closeup"
10037050-57 = "[s] \"그리고 보면, 산해경의 학생들은 어땠어?\""
10037050-58 = "3;토모에 치파오;99;매우 흥미로운 주제를 꺼내셨군요."
10037050-59 = "#st;[0,0];instant;1;"
10037050-60 = "#clearST"
10037050-61 = "3;토모에 치파오;01\n#3;m2\n#wait;1500"
10037050-62 = "3;토모에 치파오;03;물론 저희가 오늘 만난 산해경 학생들이라고 하면, 미나 집행부장과 카구야라고 하는 그분과 루미 상인회장, 매화원 여러분……."
10037050-63 = "3;토모에 치파오;99;그리고 산해경 순방 중에 스쳐 지나갔던 다른 학생들 정도이겠습니다만."
10037050-64 = "3;토모에 치파오;01;…….\n#3;em;…"
10037050-65 = "3;토모에 치파오;99;그렇군요. 제 감상은."
10037050-66 = "#st;[0,0];instant;1;"
10037050-67 = "#clearST"
10037050-68 = "3;토모에 치파오;00\n#3;m3\n#wait;1500"
10037050-69 = "3;토모에 치파오;03;누군가 불을 붙이면 화르륵, 불타오를 짚단 같은 것이 떠올랐다고나 할까요."
10037050-70 = "[s] \"무슨…… 의미야?\""
10037050-71 = "3;토모에 치파오;01;대부분의 결과에는, 징후가 따르게 마련이죠."
10037050-72 = "3;토모에 치파오;99;산해경의 학생들은, 겉으로는 평온해 보였지만…….\n#3;em;…"
10037050-73 = "3;토모에 치파오;01;저는 그 이면에 숨어 있는 팽팽한 긴장감이나…… 공포 같은 감정을, 약간이지만 느꼈답니다."
10037050-74 = "3;토모에 치파오;00;큰 사고가 하나 일어난다면, 그 전에 같은 원인으로 발생한 작은 사고가 29건, 같은 원인으로 일어날 뻔한 잠재적 사고가 300여 건 정도 있다는 통계적 결과도 있고요."
10037050-75 = "[s] \"흐음……. 그 정도인가?\""
10037050-76 = "3;토모에 치파오;00;물론 저의 지나친 느낌일 뿐일 수도 있지요."
10037050-77 = "3;토모에 치파오;99;그렇지만 저는…… 그리고 저희 붉은겨울은, 그런 분위기에는 조금 민감한 편이거든요."

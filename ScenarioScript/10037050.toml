[translation]
10037050-1 = "ตอนที่ 5;เม็ดฝนไม่สะเทือนหมู่เมฆ"
10037050-3 = "[ns] \"เชริโน่กับมารินะไปนอนกันก่อนแล้วเหรอ?\""
10037050-4 = "ค่ะ โดยเฉพาะเลขาธิการเชริโน่... เชริโน่จังดูเหนื่อยมากเลยละค่ะ"
10037050-5 = "ตารางของวันนี้แน่นมาก ถ้าไม่ไหวก็ไม่แปลกหรอกค่ะ"
10037050-6 = "คะ? สงสัยว่าทำไมฉันไม่เหนื่อยบ้างน่ะเหรอคะ?"
10037050-7 = "เป็นห่วงฉันงั้นเหรอคะ? ขอบคุณค่ะ ฮุฮุฮุ"
10037050-8 = "ถ้าจะบอกว่าไม่เหนื่อยก็คงเป็นการโกหกค่ะ... แต่ว่าฉันต้องจัดการความคิดหลายๆ อย่างก่อนน่ะค่ะ"
10037050-9 = "[s] \"อย่างเช่น เจตนาที่แท้จริงของงานแลกเปลี่ยนนี้เหรอ?\""
10037050-10 = "ไม่รู้สิคะ... จะมีเจตนาที่แท้จริงอะไรซ่อนไว้หรือเปล่านะคะ"
10037050-13 = "พูดตามตรง ฉันก็พอสันนิษฐานความตั้งใจของท่านประมุขได้บ้างค่ะ"
10037050-14 = "แต่ฉันก็ไม่รู้หรอกนะคะว่าการสันนิษฐานของฉันถูกต้องหรือเปล่า"
10037050-15 = "[s] \"ครูเองก็ยังไม่รู้เลยเหมือนกัน\""
10037050-18 = "อย่างนั้นเหรอคะ? ฮุฮุฮุ แต่ถ้าการสันนิษฐานของฉันถูกต้อง... ท่านประมุขดูเหมือนจะไม่สนใจอะไร#nแบบนั้นหรอกค่ะ"
10037050-19 = "[s] \"โทโมเอะคิดว่าซานไห่จิงเป็นยังไงบ้างเหรอ?\""
10037050-20 = "โอ๊ะ คุณครูถามเหมือนกับว่าตัวเองเป็นคนของซานไห่จิงเลยนะคะ?"
10037050-21 = "เป็นเพราะท่านประมุขขอร้องให้มาที่นี่งั้นเหรอคะ? ฮุฮุฮุ ถ้าอย่างนั้นก็ถือว่าช่วยไม่ได้นะคะ"
10037050-22 = "นั่นสิคะ ซานไห่จิง... เป็นสถานที่ที่สวยงามค่ะ"
10037050-25 = "ทั้งน่าประทับใจ มีประวัติศาสตร์มากมาย... ที่สำคัญคือมีเรื่องราวที่ซ่อนอยู่มากมาย ก็เลยน่าสนใจมากค่ะ"
10037050-26 = "และที่น่าสนใจยิ่งกว่านั้นก็คือ นักเรียนซานไห่จิงไม่คิดว่าสิ่งที่ซ่อนอยู่เหล่านั้นถูกซ่อนอยู่ค่ะ"
10037050-27 = "[s] \"ช่วยอธิบายอีกหน่อยได้มั้ย?\""
10037050-30 = "อย่างนี้ไงล่ะคะ คุณครู"
10037050-31 = "สิ่งที่เป็นความลับ ต้องถูกคนอื่นมองว่าเป็นความลับ มันถึงจะเรียกได้ว่าเป็นความลับ"
10037050-32 = "ถ้าคนที่อยู่ที่นั่นไม่ได้ตระหนักถึงมัน แต่ไม่ได้บอกให้ใครรู้จนถึงตอนนี้ ความลับนั้นจะเรียกว่าเป็น#nความลับไม่ได้หรอกค่ะ"
10037050-33 = "มันจะเป็นเพียงแค่สิ่งที่ยังไม่ถูกบอกกล่าว และเป็นแค่บางอย่างที่ไม่มีตัวตนก็เท่านั้นค่ะ"
10037050-34 = "ที่ซานไห่จิงน่ะ แค่คนนอกอย่างพวกฉันกวาดตามองดูก็รู้ค่ะว่ามีสิ่งที่ซ่อนอยู่มากมาย..."
10037050-35 = "แต่ดูเหมือนว่านักเรียนที่ซานไห่จิงจะไม่ตระหนักถึงข้อเท็จจริงนั้นน่ะสิคะ"
10037050-36 = "แต่ก็แน่นอนว่านี่เป็นแค่ประสบการณ์สั้นๆ จากการเที่ยวชมซานไห่จิงแค่วันเดียวของฉันค่ะ ฮุฮุฮุ"
10037050-37 = "[s] \"แล้วคิดยังไงเกี่ยวกับคิซากิเหรอ?\""
10037050-38 = "ท่านประมุข... เป็นคนที่สง่าค่ะ ใช่ค่ะ สง่าและเท่มากเลยค่ะ"
10037050-39 = "ฉันพอจะเข้าใจแล้วค่ะว่าทำไมถึงมีนักเรียนภักดีต่อท่านมากมายขนาดนั้น"
10037050-40 = "อ้อ แน่นอนว่าไม่น่ารักเท่าเชริโน่จังหรอกนะคะ ต้องบอกว่าท่านประมุขดูเป็นผู้ใหญ่เกินไป จนบางครั้งก็รู้สึกว่าไม่เป็นธรรมชาติค่ะ"
10037050-41 = "ท่านประมุขดูจะชำนาญกับทุกอย่าง ราวกับว่าคุ้นเคยกับการเป็นผู้ปกครองตั้งแต่แรก แล้วก็คิดตัดสินใจ#nอะไรอย่างถูกต้องตามทำนองคลองธรรมด้วย..."
10037050-42 = "พอได้พูดแบบนี้แล้ว ฉันก็ยิ่งสงสัยน่ะค่ะ ว่าทำไมตอนนั้นท่านประมุขถึงดูไม่เป็นธรรมชาติเอาเสียเลย"
10037050-43 = "[s] \"ตอนนั้นเหรอ?\""
10037050-44 = "ค่ะ ตอนนั้น... ที่ท่านประมุขไม่มาเที่ยวชมซานไห่จิงกับพวกเรายังไงล่ะคะ"
10037050-45 = "[s] \"อ้อ...\""
10037050-46 = "มันค่อนข้างจะผิดธรรมชาติไม่ใช่เหรอคะ ตัวเองเป็นคนเชิญแขกมาทั้งที แต่ก็ไม่มาพาแขกเที่ยวใน#nพื้นที่ของตัวเอง?"
10037050-47 = "ยิ่งเป็นคนที่รู้จักมารยาทและกาลเทศะเป็นอย่างดีอย่างท่านประมุขแล้วด้วย"
10037050-48 = "ถึงจะตอบว่ามีธุระที่ไม่อาจหลีกเลี่ยงได้โดยเด็ดขาดก็เถอะค่ะ..."
10037050-49 = "นี่อาจเป็นความคิดที่เสียมารยาทเป็นอย่างมาก แต่ฉันก็เชื่อค่ะว่าไม่ใช่แค่ฉันคนเดียวที่คิดว่ามันมีบาง#nอย่างน่าสงสัยค่ะ"
10037050-55 = "แล้วคุณครูล่ะคะ คิดว่ายังไง... ฮุฮุฮุ ไม่ต้องตอบก็ได้ค่ะ สีหน้าของคุณครูช่วยตอบแทนแล้วค่ะ"
10037050-56 = "ฉันดูออกขนาดนั้นเลยอย่างนั้นเหรอคะ? คิดว่ายังไงล่ะคะ? เมื่อเทียบกับนักเรียนคนอื่นแล้ว เรื่องแบบนี้ฉันค่อนข้างไวน่ะค่ะ"
10037050-57 = "[s] \"จะว่าไป แล้วนักเรียนซานไห่จิงล่ะเป็นยังไงบ้าง?\""
10037050-58 = "ชวนคุยในเรื่องที่น่าสนใจเลยนะคะ"
10037050-62 = "นักเรียนที่พวกฉันได้เจอมาวันนี้ก็มีแค่หัวหน้าคณะกรรมการมินะ คางุยะ ประธานกลุ่มการค้ารูมิ คนจากสวนต้นบ๊วย..."
10037050-63 = "แล้วก็นักเรียนคนอื่นที่เดินผ่านระหว่างเที่ยวชมซานไห่จิงค่ะ"
10037050-64 = "..."
10037050-65 = "ถ้าถามว่ารู้สึกยังไงละก็..."
10037050-69 = "คงต้องบอกว่าฉันนึกถึงมัดฟางข้าวที่จะลุกไหม้ขึ้นเวลามีใครจุดไฟขึ้นมาค่ะ"
10037050-70 = "[s] \"หมายความว่า... ยังไงเหรอ?\""
10037050-71 = "โดยส่วนใหญ่แล้ว ผลลัพธ์จะเป็นไปตามสัญญาณบอกเหตุค่ะ"
10037050-72 = "เหล่านักเรียนของซานไห่จิง ถึงภายนอกจะดูสงบสุข ไม่มีทุกข์ร้อนอะไร..."
10037050-73 = "แต่ฉันก็รู้สึกได้ถึงความตึงเครียด... หรือความกลัวที่ซ่อนอยู่เบื้องหลังภาพที่สงบสุขนั้นค่ะ แต่ก็รู้สึกแค่นิดหน่อยนะคะ"
10037050-74 = "นอกจากนี้ยังมีผลทางสถิติว่าถ้ามีอุบัติเหตุใหญ่เกิดขึ้นครั้งหนึ่ง ก่อนหน้านั้นก็จะมีอุบัติเหตุเล็กๆ ที่เกิดจากสาเหตุเดียวกัน 29 ครั้ง และมีอุบัติเหตุที่เกือบจะเกิดขึ้นจากสาเหตุเดียวกัน 300 ครั้งด้วยค่ะ"
10037050-75 = "[s] \"อืม... ขนาดนั้นเลยเหรอ?\" "
10037050-76 = "แน่นอนว่าฉันอาจคิดมากไปเองคนเดียวก็ได้ค่ะ"
10037050-77 = "แต่ว่าฉัน... และเรดวินเทอร์ของเราค่อนข้างอ่อนไหวกับบรรยากาศแบบนั้นน่ะค่ะ"
10037050-81 = "ทำไมน่ะเหรอคะ?"
10037050-85 = "..."
10037050-86 = "ก็เพราะว่าที่เรดวินเทอร์เกิดการปฏิวัติเฉลี่ย 1-2 ครั้งต่อสัปดาห์เลยนี่คะ"
10037050-94 = "..."
10037050-95 = "ฉันมาหาเพราะได้ยินว่า 'อยากคุยเกี่ยวกับสัญญาณบอกเหตุที่เกิดขึ้นในซานไห่จิงในนามของความ#nจงรักภักดี'..."
10037050-96 = "เป็นสถานที่ที่แปลกจริงๆ ถึงจะอยู่ในซานไห่จิง แต่ก็อยู่ในขอบนอกสุด ไม่มีนักเรียน ไม่มีสิ่งอำนวยความสะดวก และไม่ใช่ซานไห่จิง"
10037050-97 = "คนที่รู้ว่ามีสถานที่แบบนี้อยู่น่ะ..."
10037050-102 = "อยากจะบอกว่าคนแบบนั้นดูไม่ใช่คนปกติใช่มั้ยล่ะ...?"
10037050-106 = "ใครกันนะ...?"
10037050-112 = "ถนนช่างมืดครึ้ม แต่แสงก็ไม่อาจถูกปิดกั้น คิดเหมือนกันมั้ยล่ะ?"
10037050-113 = "คุณคือ...? ชินทานิ ไค?! ทำไมถึงมาอยู่ที่นี่??!!"
10037050-114 = "โฮ่ คิดไม่ถึงเลยนะว่าจะยังจำฉันได้ น่าตกใจอยู่นะ"
10037050-115 = "ใช่... แม้ว่าคนอื่นจะลืมไปแล้ว... แต่ก็มีบางคนที่ต้องจดจำอดีตไว้"
10037050-116 = "หึหึหึ... ยังเหมือนเดิมเลยสินะ คางุยะ ปกติฉันเป็นคนที่ไม่ค่อยจำหน้าของผู้คนที่เจอในครั้งแรกเท่าไร แต่ก็มีบางคนนะที่ฉันจำได้"
10037050-117 = "ยังอยู่ชมรมการแสดงงิ้วอยู่หรือเปล่า? แต่ถามไปก็เท่านั้น ฉันได้ยินมาว่าเธอยังอยู่ชมรมนั้นอยู่"
10037050-118 = "มีเวลามาสนใจเรื่องชมรมของคนอื่นด้วย ท่าทางสถานการณ์จะไม่ได้เลวร้ายอะไรเลยนี่?"
10037050-119 = "หึหึหึ เป็นห่วงฉันงั้นเหรอ? จริงๆ เลยนะ นึกไม่ถึงเลยนะว่าฉันต้องมาคิดหนักว่าควรพูดคำว่าขอบคุณ#nหรือเปล่า"
10037050-120 = "ไม่ต้องพูดหรอก การตัดสินใจให้เธอออกจากโรงเรียนน่ะ อย่างน้อยถ้าดูแต่ผลลัพธ์แล้วละก็ ฉันไม่คิดว่านั่นเป็นการตัดสินใจที่ผิดหรอก"
10037050-121 = "'ถ้าดูแต่ผลลัพธ์' งั้นเหรอ? ฟังแล้วรู้สึกเหมือนแฝงความนัยอะไรเอาไว้ด้วยนะ"
10037050-122 = "ท่านประมุขใช้อำนาจในการขับไล่เธอออกไปโดยไม่ผ่านขั้นตอนปกติ... แล้วก็สั่งให้ลบบันทึกทุกอย่าง#nที่เกี่ยวข้องกับเธอด้วย"
10037050-123 = "อยากชวนฉันนึกถึงความทรงจำเก่าๆ งั้นเหรอ? แต่ฉันก็จำได้นะ... หึหึหึ ถ้าฉันไม่ถูกไล่ออก ฉันก็คงจะเรียนจบไปแล้ว แล้วไหนจะเรื่องระเบียนประวัติที่ถูกลบไปอีก"
10037050-124 = "ฉันเลยต้องอยู่ในห้องคุมขังอยู่พักหนึ่ง แล้วหลังจากนั้นก็มีชีวิตอยู่อย่างคนไร้ตัวตน... สภาพของฉัน#nมันไม่ต่างกับวิญญาณที่เตร็ดเตร่อยู่ตามชายขอบคิโวทอสเลยละ"
10037050-125 = "นึกไม่ถึงเลยนะ ใครจะคิดว่าคนอย่างชินทานิ ไคจะมาคร่ำครวญเรื่องโชคชะตาของตัวเอง"
10037050-126 = "ตีความได้ว่าอย่างนั้นเหรอ? ดูเหมือนฝีปากของฉันจะถดถอยลงไปสินะ"
10037050-127 = "เรียกฉันมาทำไมกัน?"
10037050-128 = "ฉันมีเรื่องเกี่ยวกับซานไห่จิงที่อยากคุยด้วยน่ะ น่าจะต้องตอบอย่างนี้นะ"
10037050-129 = "คนอย่างเธอจะไปรู้อะไรเกี่ยวกับซานไห่จิงในตอนนี้?"
10037050-130 = "หึหึหึ... เธอกำลังจะบอกว่าวิญญาณในอดีตไม่ควรจะเข้ามาแทรกแซง แต่ควรหายตัวไปงั้นเหรอ? คารมคมคายนักนะ"
10037050-131 = "พูดก็พูดเถอะ คนซานไห่จิงที่ไม่ใช่คนในซานไห่จิงอย่างฉันจะไปพูดอะไรได้"
10037050-135 = "ฉันก็แค่รู้มาว่าตอนนี้มีผู้มาเยือนจากเรดวินเทอร์ แล้วก็เกิดระลอกคลื่นเงียบๆ อยู่ในซานไห่จิงก็เท่านั้น"
10037050-140 = "ระ... รู้เรื่องนี้ได้ยังไง...?!"
10037050-142 = "เรื่องแค่นั้นฉันรู้ดี ซานไห่จิงลืมฉันไปแล้ว แต่ฉันไม่ลืมซานไห่จิงหรอกนะ เพราะว่าฉันลืมไม่ได้ยังไงล่ะ"
10037050-143 = "เธอคงมีวิธีสืบหาความเป็นไปของซานไห่จิงในแบบฉบับของตัวเองสินะ..."
10037050-144 = "หึหึหึ... ได้ยินว่าเธอได้แสดงงิ้วต่อหน้าคณะผู้มาเยือนจากเรดวินเทอร์งั้นเหรอ? รู้สึกยังไงบ้างล่ะ คางุยะ?"
10037050-145 = "ฉันไม่ขอตอบ..."
10037050-146 = "งั้นก็ดี เพราะการพูดแบบนั้นก็ถือว่าเป็นคำตอบที่ยอดเยี่ยมแล้วละ คงจะรู้สึกเสียเกียรติสินะ หรือว่าไม่ใช่?"
10037050-147 = "...!"
10037050-148 = "เธอต้องพยายามอย่างเต็มที่และเปิดเผยตัวเองให้กับคนที่ไม่รู้จักคุณค่าของประเพณี ไม่รู้ความหมาย#nของการแสดงงิ้ว และไม่คิดที่จะเข้าใจถึงความทุ่มเทของเธอด้วย... "
10037050-149 = "ฉันรู้ ฉันรู้ดีเลยละ แม้ว่าคนอื่นจะไม่รู้ แต่ฉันเข้าใจความรู้สึกนั้น"
10037050-151 = "เธอน่ะถูกเนรเทศไปแล้ว อย่ามาพล่ามเรื่องการตัดสินใจและการวินิจฉัยของท่านประมุขนะ!"
10037050-153 = "โฮ่ แต่แล้วเธอก็เริ่มสงสัยในการตัดสินใจและการวินิจฉัยของคิซากิคนนั้นแล้วนี่?"
10037050-154 = "ถ้าเธอไม่เป็นอย่างนั้น ก็คงไม่มีทางออกมาเจอฉันถึงที่นี่หรอก"
10037050-155 = "...!!!"
10037050-160 = "ฉันเห็นคลื่นที่เริ่มก่อตัวในซานไห่จิง เห็นไปจนถึงผลลัพธ์ที่จะตามมาเลยละ"
10037050-161 = "ถ้าเป็นแบบนี้ต่อไปละก็ แม้แต่การแสดงงิ้วก็คงกลายเป็นการแสดงเก่าๆ ของยุคสมัยที่ผ่านไป และสุดท้ายก็คงไม่มีใครหยิบมาสานต่อ"
10037050-162 = "การเปลี่ยนแปลงก็เป็นอย่างนี้ละ ก็เหมือนกับที่แม่น้ำกัดเซาะหินนั่นละ แม้จะมองเห็นไม่ได้ในทันที แต่ทุกอย่างก็ย่อมเปลี่ยนไปอยู่เรื่อยๆ และก็แน่นอน"
10037050-167 = "อย่ามาดูถูกคุณค่าและความหมายของการแสดงงิ้วนะ!"
10037050-168 = "ฉันไม่ได้ดูถูก ต่อให้ทุกคนจะดูถูกและลดคุณค่าของการแสดงงิ้ว แต่อย่างน้อยก็ต้องมีสักคนที่ต้อง#nปกป้องการแสดงงิ้วและประเพณีนั้นไว้นี่?"
10037050-170 = "เธอบอกให้ฉันทำงั้นเหรอ...?"
10037050-171 = "แล้วจะมีใครอื่นอีกล่ะ?"
10037050-172 = "ทำไมต้องเป็นฉันด้วยล่ะ?"
10037050-173 = "คนที่เข้าใจความหมายและคุณค่าของประเพณีของซานไห่จิงดีที่สุดคือชมรมการแสดงงิ้วไม่ใช่เหรอ?"
10037050-174 = "อย่างน้อยตอนที่ฉันยังเป็นนักเรียนของซานไห่จิง มันก็เป็นอย่างนั้นนะ...?"
10037050-175 = "...!"
10037050-176 = "ใครๆ ก็พูดถึงประเพณีกันอย่างง่ายๆ..."
10037050-177 = "แต่ก็มีเพียงไม่กี่คนหรอกที่เข้าใจอย่างแท้จริงว่ามันสำคัญแค่ไหน"
10037050-178 = "เราต้องให้ความเคารพสิ่งที่มีมาตั้งแต่อดีต และเคารพประวัติศาสตร์ของมนุษย์ที่มีต้นกำเนิดมาจาก#nสิ่งนั้นด้วย! เพราะปัจจุบันก็คือสิ่งที่หยั่งรากลึกและยืนต้นอยู่บนอดีต!"
10037050-179 = "ย่านการค้าเทพเต่าดำนั่นละตัวการที่สำคัญที่สุด"
10037050-182 = "คนพวกนั้นน่ะ...! ใช้การทำอาหารและการค้าเป็นข้ออ้าง แล้วทำตัวเหมือนเห็ดพิษที่กระจายสปอร์ไป#nทุกที่!"
10037050-183 = "ท่านประมุขเองก็ควรจะทำอะไรกับย่านการค้าเทพเต่าดำบ้าง... ทำไมถึงปล่อยปละละเลยคนพวกนั้นก็#nไม่รู้"
10037050-184 = "ท่านฉลาดพอที่จะรู้ว่าคนพวกนั้นกำลังก่อให้เกิดวิกฤตแบบไหนบ้างแท้ๆ!"
10037050-187 = "คุณครูของชาเล่ต์ก็เป็นคนที่ควรต้องระมัดระวังไว้แท้ๆ แล้วไหนตอนนี้ยังเชิญคนจากเรดวินเทอร์มา#nเยี่ยมเยือนอีก..."
10037050-188 = "หึหึหึหึ..."
10037050-190 = "ฉันเข้าใจที่เธอว่าแล้ว แต่ในเมื่อเป็นชมรมการแสดงงิ้ว ก็ควรเล่าเรื่องนี้ด้วยงิ้วจะไม่ดีกว่าเหรอ?"
10037050-191 = "ถ้าอยากรักษาประเพณีจริงๆ ก็ควรต้องเริ่มต้นจากตรงนั้นสิ"
10037050-192 = "หมายความว่ายังไง?"
10037050-193 = "จริงสิ ก็อย่างเช่น คิดการแสดงงิ้วชุดใหม่ด้วยเนื้อเรื่องใหม่ยังไงล่ะ"
10037050-198 = "แล้วก็ลองทำอะไรบางอย่างบนเวทีการแสดงงิ้วนั่นซะ..."
10037050-205 = "พะ... พูดอะไรออกมาน่ะ...?! ชินทานิ ไค! ฉันกับชมรมการแสดงงิ้วไม่มีสิทธิ์ทำอะไรแบบนั้นตั้งแต่แรก#nอยู่แล้ว...!"
10037050-207 = "ใช้คำพูดได้น่าสนใจดีนะ หัวหน้าชมรมการแสดงงิ้ว"
10037050-208 = "ถ้าชมรมการแสดงงิ้วที่เป็นผู้ปกป้องประเพณีของซานไห่จิงอย่างจริงจังมากที่สุดไม่มีสิทธิ์นั้นละก็ แล้วใครกันล่ะที่มีสิทธิ์...!"
10037050-209 = "...!"
10037050-210 = "ก็นะ ต่อให้ฉันจะพูดเรื่องนี้ไป สุดท้ายมันก็อาจจะเป็นแค่คำพูดเหลวไหลของคนที่ถูกไล่ออกจาก#nซานไห่จิงก็ได้"
10037050-211 = "ถ้าพวกฉันทำการแสดงงิ้วชุดใหม่... แล้วถ้ามันไม่สำเร็จขึ้นมา..."
10037050-212 = "ตลกดีนะ ความสำเร็จและความล้มเหลวเกี่ยวข้องกับความภักดีด้วยเหรอ?"
10037050-213 = "...!!!"
10037050-214 = "หึหึหึ หัวหน้าชมรมการแสดงงิ้วเองก็ลุ่มหลงในความสำเร็จหรือล้มเหลวสินะ ใช่ ใช่แล้วละ... ทุกอย่างย่อมเปลี่ยนแปลงเสมอนั่นละ ว่าไหม?"
10037050-215 = "อย่ามาพูดอะไรพล่อยๆ นะ! ต่อให้ทุกคนจะลืม แต่ถ้ามีคนที่จดจำสิ่งนั้นอยู่ละก็...!"
10037050-216 = "ใช่ นั่นละที่ฉันจะบอก ฉันรอเจตนาอันแรงกล้าแบบนั้นอยู่ แต่ก็ไม่ต้องกังวลมากเกินไปหรอกนะ เรื่องการเตรียมเวทีที่น่ะ ฉันจะช่วยเอง"
10037050-220 = "ช่วยยังไง...?"
10037050-221 = "หึหึ คนที่ถูกไล่ออกย่อมมีวิธีของตนอยู่แล้ว"
10037050-222 = "เรื่องนี้ไม่เกี่ยวกับเธอหรอก... ชินทานิ ไค"
10037050-223 = "ชมรมการแสดงงิ้วของเราทำงานด้วยความจงรักภักดีต่อซานไห่จิงอยู่แล้ว เรื่องนั้นฉันจะทำให้ชัดเจน#nเลยละ!"
10037050-224 = "แน่นอนอยู่แล้ว ก็ควรจะเป็นอย่างนั้นละ"
10037050-229 = "หึหึหึ... สิ่งนี้จะทำให้บางอย่างเริ่มเคลื่อนไหวสินะ"
10037050-237 = "ฉันก็ตั้งใจฟังมาตลอดหรอกนะคะ แต่สิ่งที่ท่านไคต้องการคืออะไรเหรอคะ?"
10037050-238 = "เชื้อไฟ"
10037050-240 = "เชื้อไฟ... เหรอคะ?"
10037050-241 = "ใช่ เชื้อไฟที่ดูไม่สลักสำคัญอะไร แต่เมื่ออยู่ในความมืดแล้วจะส่องสว่างอย่างชัดเจน "
10037050-242 = "และถ้าเป็นไปได้ ฉันก็อยากให้เป็นเชื้อไฟเล็กๆ ที่จะลุกไหม้เป็นไฟกองที่ใหญ่ที่สุด"
10037050-243 = "แล้วเธอล่ะ ว่ายังไง?"
10037050-249 = "ชมรมวิจัยศาสตร์การปรุงยา... อยากได้หัวหน้าที่แท้จริงค่ะ"
10037050-250 = "ยังตอบแบบนี้เหมือนเดิมสินะ คงเพราะแบบนี้ พวกเธอถึงเป็นกลุ่มเดียวที่ยังติดตามฉันอยู่"
10037050-251 = "หัวหน้าซายะ... ไม่สิ ยาคูชิ ซายะไม่เหมาะสมกับการเป็นหัวหน้าชมรมวิจัยศาสตร์การปรุงยาหรอก เหนือสิ่งอื่นใด เมื่อเทียบกับท่านแล้ว ซายะยังขาดความสามารถและคุณสมบัติอยู่ค่ะ"
10037050-252 = "เราต้องเอาหัวหน้าที่แท้จริงของชมรมวิจัยศาสตร์การปรุงยากลับมาให้ได้ แค่นั้นละค่ะที่เราต้องการ"
10037050-253 = "งั้นเหรอ?"
10037050-258 = "ถ้าอย่างนั้นเห็นทีก็คงจะต้องทำอะไรบางอย่างแล้วละ"
10037050-259 = "เรารอคำสั่งอยู่ค่ะ"
10037050-260 = "ต่อให้คำสั่งนั้นจะขวางกั้นอนาคตของพวกเธอน่ะเหรอ?"
10037050-261 = "ยังไงตอนนี้ฉันก็มองไม่เห็นอนาคตของชมรมวิจัยศาสตร์การปรุงยาอยู่แล้วค่ะ"
10037050-266 = "ดีละ ถ้าอย่างนั้นก็กลับไปยังชมรมวิจัยศาสตร์การปรุงยา... แล้วไปทำสิ่งนั้นไว้"
10037050-267 = "ฉันจะทำตามที่สั่งค่ะ"

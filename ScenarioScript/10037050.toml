10037050-94 = "3;카구야;12;……."
10037050-95 = "3;카구야;99;'충의(忠義)의 이름으로, 산해경에 일어나고 있는 징후에 대해 이야기하고 싶다'는 말을 듣고 찾아왔지만……."
10037050-96 = "3;카구야;05;기묘한 곳이로구나. 산해경에 속해 있지만 산해경이 아닌, 학생도 시설물도 없는 최외곽의 부지."
10037050-97 = "3;카구야;12;이런 장소가 있었다는 것을 알고 있는 사람이란, 도대체…….\n#3;em;…"

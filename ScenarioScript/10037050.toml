[translation]
10037050-1 = "Episode 5;The Clouds Don't Know of Being Torn Asunder"
10037050-3 = "[ns] \"Did Cherino and Marina go to sleep first?\""
10037050-4 = "Yes. Great Leader Cherino especially looked quite tired. "
10037050-5 = "That's not surprising, since her schedule was so packed."
10037050-6 = "Huh? You want to know if I'm tired?"
10037050-7 = "Are you concerned for me? I appreciate that. Heehee."
10037050-8 = "I'd be lying if I said I'm not tired... I think I need to go organize my thoughts a bit."
10037050-9 = "[s] \"Are you worried about an ulterior motive for the exchange meeting?\""
10037050-10 = "Hmm, I wonder what it could be..."
10037050-13 = "To tell you the truth, I have an idea of what the president's intentions are."
10037050-14 = "Though, I have no way of knowing if my assumption is correct."
10037050-15 = "[s] \"I still can't really tell.\""
10037050-18 = "Is that so? Heehee! Well, if I'm right, the president wouldn't be too concerned about it anyway."
10037050-19 = "[s] \"What did you think of Shanhaijing, Tomoe?\""
10037050-20 = "Oh, goodness. Now you sound just like one of the Shanhaijing students."
10037050-21 = "I suppose if you're here in Shanhaijing at the behest of the president, it can't be helped. Hah hah..."
10037050-22 = "It's true. Shanhaijing...is beautiful."
10037050-25 = "It's impressive and historic... Above all, there were plenty of fascinating things to discover."
10037050-26 = "What's even more interesting is that the Shanhaijing students don't even consider them hidden gems."
10037050-27 = "[s] \"Would you mind explaining what you mean a bit?\""
10037050-30 = "It's like this, Sensei."
10037050-31 = "Secrets only exist in the minds of the people who keep them."
10037050-32 = "If people don't recognize them for what they are and keep them secret, then a secret cannot exist."
10037050-33 = "It's simply a thing whose existence or identity has yet to be discovered."
10037050-34 = "In Shanhaijing, there were a lot of hidden gems that outsiders like us notice..."
10037050-35 = "But Shanhaijing's students didn't even seem aware of them."
10037050-36 = "Of course, this is just my opinion formed from a single day of exploring Shanhaijing. Heehee!"
10037050-37 = "[s] \"What do you think of Kisaki?\""
10037050-38 = "The president is...an amazing person. Yes, truly."
10037050-39 = "I can understand why so many students wholeheartedly follow her."
10037050-40 = "Of course, she isn't as cute as Cherino. One could even say she's a bit too mature? It's almost unnatural."
10037050-41 = "She was so worldly, as if she was meant to lead from the very beginning. And she makes sensible judgments..."
10037050-42 = "Now that I think about it, it makes me wonder why she behaved so strangely that one time."
10037050-43 = "[s] \"That one time?\""
10037050-44 = "Yes, that one time—when she didn't join us for the afternoon tour of Shanhaijing."
10037050-45 = "[s] \"Oh...\""
10037050-46 = "You don't think it's a bit odd that the hostess didn't personally escort us around her own areas?"
10037050-47 = "And we're talking about someone who knows her etiquette, like the president."
10037050-48 = "Though she did say that she had something she absolutely could not avoid tending to..."
10037050-49 = "I know it's not polite to say, but I don't think I'm the only one who doubts her intentions."
10037050-55 = "I wonder what you think, Sensei... Heehee! No, you don't need to respond. Your expression says everything."
10037050-56 = "No, I don't think it was that obvious. I'm just more sensitive to this issue than the other students."
10037050-57 = "[s] \"Then, how were the Shanhaijing students?\""
10037050-58 = "Ah, now that's an amusing topic!"
10037050-62 = "The Shanhaijing students we met today were Executive Officer Mina, the one named Kaguya, Rumi the merchant guild president, everyone from the Plum Blossom Garden..."
10037050-63 = "Oh, and the other students we brushed past during the Shanhaijing tour."
10037050-64 = "..."
10037050-65 = "My impression is..."
10037050-69 = "They reminded me of a blazing haystack moments after someone lights it on fire."
10037050-70 = "[s] \"What...do you mean by that?\""
10037050-71 = "There are always warning signs of impending consequences."
10037050-72 = "The students of Shanhaijing appear serene on the outside..."
10037050-73 = "But I felt the slightest bit of nerves and tension hiding on the inside...or perhaps it was fear."
10037050-74 = "Additionally, statistics show that one large accident precludes 29 smaller accidents from the same cause, which themselves preclude approximately 300 potential accidents from the same cause."
10037050-75 = "[s] \"And that's...bad?\""
10037050-76 = "Yes! Of course, it could just be an exaggeration based on my initial impressions."
10037050-77 = "However...Red Winter and I tend to be a bit more sensitive to moods like that."
10037050-81 = "Why's that, you ask?"
10037050-85 = "..."
10037050-86 = "Well, that's because a coup d'etat occurs about one to two times a week on average at Red Winter."
10037050-94 = "..."
10037050-95 = "I came here after I heard you mention the signs that are cropping up in Shanhaijing, in the name of loyalty..."
10037050-96 = "But this is a peculiar place. It belongs to Shanhaijing, but it's not Shanhaijing. It's land at the outskirts with no students or facilities."
10037050-97 = "Few know a place like this even exists..."
10037050-102 = "Are you suggesting those who do are somehow strange?"
10037050-106 = "Who...?"
10037050-112 = "The path is dark, but night cannot hide the light. Isn't that so?"
10037050-113 = "Are you...? Shintani Kai?! How did you get here?!"
10037050-114 = "Oho. I didn't think you'd still remember me. That is a bit surprising."
10037050-115 = "...Yes. Even if everyone else has forgotten...someone has to remember the past."
10037050-116 = "Keh heh... You never change, Kaguya. I may not remember faces well, but some people I never forget."
10037050-117 = "Yes, I know the Peking Opera Club is still active."
10037050-118 = "You must really be living the life if you have time to worry about someone else's club activities."
10037050-119 = "Keh heh. Do I detect concern? Ha! I never expected to debate thanking you."
10037050-120 = "Now there's no need for that. Your expulsion...is a decision I stand by, especially considering the outcome."
10037050-121 = "\"Considering the outcome\" has quite a few connotations."
10037050-122 = "...The president abused her authority to expel you instead of going through the proper channels. And she erased all records associated with you."
10037050-123 = "Are you trying to bring up old memories? I remember... Keh heh. If I hadn't been expelled, I would have graduated top of my class. But my records mysteriously disappeared..."
10037050-124 = "I did momentarily become a burden to the Corrections Bureau. And after that, I ended up roaming the Kivotos outskirts unnoticed...like some kind of living ghost."
10037050-125 = "...That's surprising. THE Shintani Kai laments being a burden."
10037050-126 = "Is that how you took it? I think my own eloquence is suffering as a consequence."
10037050-127 = "Why did you call me over?"
10037050-128 = "I want to discuss something about present-day Shanhaijing."
10037050-129 = "What do you know about present-day Shanhaijing?"
10037050-130 = "Keh heh... Are you shooing the soul of the past? How biting."
10037050-131 = "Well, what did you expect from someone who both is and isn't part of Shanhaijing?"
10037050-135 = "It's just that... Well, the moment visitors from Red Winter arrived, I suddenly started hearing about the unrest in Shanhaijing."
10037050-140 = "How did you know that...?!"
10037050-142 = "Shanhaijing has forgotten me. I know that much. But I did not forget Shanhaijing. I can't."
10037050-143 = "...So you have your own way of knowing what's going on in Shanhaijing..."
10037050-144 = "Keh heh heh... I heard you put on a Peking opera performance for the Red Winter visitors. How did that make you feel, Kaguya?"
10037050-145 = "...I won't respond to that."
10037050-146 = "That's okay. A refusal to answer is still an answer. It was humiliating, wasn't it?"
10037050-147 = "...!"
10037050-148 = "All of your lifelong effort went unrecognized by individuals who don't even know the value of tradition, nor the meaning of Peking opera... "
10037050-149 = "I know. I know very well. Even if everyone else says they don't know, I understand the feeling."
10037050-151 = "Expelled one, don't go disputing Madam's decisions and judgments!"
10037050-153 = "Oho! Didn't you have doubts about Kisaki's decisions and judgments? "
10037050-154 = "If not, then you have no reason to come all the way over here."
10037050-155 = "...!!!"
10037050-160 = "I can see it. The unrest in Shanhaijing, and the storm it will surely bring about."
10037050-161 = "If this continues, the Peking opera itself will become a relic of the past, and in the end, no one will seek it out."
10037050-162 = "That's what transformation is. Just as the river water carves away at the boulder, change affects everything, though it may not be immediately apparent."
10037050-167 = "Never scoff at the cultural value and meaning of the Peking opera!"
10037050-168 = "I would never scoff! No matter how many people disparage the Peking opera, there should always be at least one person to protect the Peking opera and its traditions."
10037050-170 = "...Are you telling me to do that?"
10037050-171 = "Who else could there be?"
10037050-172 = "Why me?"
10037050-173 = "Because the Peking Opera Club always understood the value and meaning of Shanhaijing's traditions."
10037050-174 = "...At least, that's how it should have been when I was enrolled at Shanhaijing."
10037050-175 = "...!"
10037050-176 = "...Everyone talks so casually about tradition, like it's nothing..."
10037050-177 = "It's rare for anyone to understand how truly important tradition is."
10037050-178 = "We must respect the past and the history of the people who originated from it! The present stands with its roots in the past!"
10037050-179 = "At the end of the day, the Black Tortoise Promenade is the biggest problem."
10037050-182 = "Those poisonous mushrooms! They use cooking and business as excuses to spread their spores everywhere!"
10037050-183 = "And Madam President is no less to blame for the Black Tortoise Promenade... Why is she letting them get away with it?"
10037050-184 = "She's smart enough to know those punks are causing all kinds of trouble."
10037050-187 = "Not to mention inviting Schale's Sensei is distraction enough, but to have the Red Winter visitors on top of that..."
10037050-188 = "Keh heh heh heh..."
10037050-190 = "Got it. But if you're loyal to the Peking Opera Club before anything else, shouldn't you be more concerned about that?"
10037050-191 = "If you want to truly protect tradition, you should start there."
10037050-192 = "What do you mean?"
10037050-193 = "Well, for example, why not try an opera with new content?"
10037050-198 = "And you can experiment with choreography on the Peking opera stage..."
10037050-205 = "...?! What are you saying, Shintani Kai?! There's no way the Peking Opera Club and I would have that kind of authority!"
10037050-207 = "I find it amusing that you would say that, Peking Opera Club President."
10037050-208 = "The Peking Opera Club has honored Shanhaijing's traditions most seriously up until now. If not you, who else could possibly have it?"
10037050-209 = "...!"
10037050-210 = "Granted, this could be nothing more than the ramblings of a Shanhaijing outcast."
10037050-211 = "If we end up doing a new Peking opera...and it fails..."
10037050-212 = "Funny, is discussing success and failure a mark of loyalty?"
10037050-213 = "...!!!"
10037050-214 = "Keh heh heh... It seems even the Peking Opera Club President can be corrupted by worldly desires. But what can you expect, really? The only constant is change, right?"
10037050-215 = "Don't speak so rashly! If one person remembers, even if everyone else forgets...!"
10037050-216 = "Ah, that's the spirit I was looking for! Don't worry. I'll help you prepare."
10037050-220 = "How...?"
10037050-221 = "Keh heh. The expelled one has her ways."
10037050-222 = "...This matter has nothing to do with you, Shintani Kai."
10037050-223 = "No matter what, the Peking Opera Club, is loyal to Shanhaijing. That, I will make sure of!"
10037050-224 = "Sure. Of course you will. Or not. Whatever."
10037050-229 = "Keh heh heh... That certainly stirred up sparks."
10037050-237 = "I heard everything. What do you want, Kai."
10037050-238 = "Embers."
10037050-240 = "Embers...?"
10037050-241 = "Yes. Embers. Even the smallest spark shines brightly in the darkness. "
10037050-242 = "If it's possible, I hope these small but powerful embers will grow into a raging fire."
10037050-243 = "How about you?"
10037050-249 = "...I hope the Eastern Alchemy Society finds a true president."
10037050-250 = "I see you haven't changed. Though that's probably why you're the only one who still obeys me."
10037050-251 = "President Saya—I mean, Yakushi Saya is not suitable for the role of Eastern Alchemy Society's president. Compared to you, she's lacking in both skill and qualifications."
10037050-252 = "The Eastern Alchemy Society must find its true owner. That is all."
10037050-253 = "Is that so."
10037050-258 = "In that case, there's something you must do for me."
10037050-259 = "I await your orders."
10037050-260 = "Even if what I need interferes with your future?"
10037050-261 = "At the moment, my future at the Eastern Alchemy Society eludes me anyway."
10037050-266 = "Good. Then go back to the Eastern Alchemy Society...and get things done."
10037050-267 = "I will do as you say."

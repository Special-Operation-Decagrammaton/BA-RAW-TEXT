10037050-110 = "3;카구야;05\n5;카이;00\n#5;al\n#3;m1\n#3;h\n#5;h\n#wait;1500"
10037050-111 = "3;카구야;15\n5;카이;00\n#3;em;[?!]\n#3;shake\n#3;h\n#5;h\n#wait;800"
10037050-112 = "5;카이;03;길은 어두우나, 빛이 가려지지는 않은 밤이다. 그렇지 아니한가?\n#5;em;[음표]"
10037050-113 = "3;카구야;05;당신은……? 신타니 카이?! 어째서 여기에??!!\n#3;stiff"
10037050-114 = "5;카이;02;호오. 나를 여태 기억하고 있을 줄이야. 그것은 조금 놀랍군."
10037050-115 = "3;카구야;11;……그렇다. 다른 모두가 잊었어도, 잊게 되었어도…… 누군가는 과거를 기억해야 한다."
10037050-116 = "5;카이;08;쿡쿡쿡…… 여전하구나. 카구야. 나는 애초에 사람들의 얼굴 같은 것은 그다지 기억하지 않는 편이다만, 그럼에도 기억에 남는 자들이 있더군.\n#5;em;…"
10037050-117 = "5;카이;07;경극부는 여전히 활동중인가? 뭐, 이미 그렇다고 들어 알고는 있다만."
10037050-118 = "3;카구야;16;남의 동아리 활동까지 신경 써 줄 만큼, 상황이 나쁘지 않은 모양인데?\n#3;em;[반응]"
10037050-119 = "5;카이;03;쿡쿡쿡. 나를 걱정해 주는 것이냐? 이것 참, 여기에서 고맙다는 말을 꺼내야 할지 고민하게 될 줄은 몰랐는데 말이다."
10037050-120 = "3;카구야;05;그럴 일은 없다. 당신의 퇴학 결정이…… 적어도 결과만을 보자면, 잘못되었다고 생각하고 있지도 않고."
10037050-121 = "5;카이;02;'결과만을 보자면' 인가? 꽤 많은 의미를 내포하고 있는 말처럼 들리는데.\n#5;em;[?]"
10037050-122 = "3;카구야;12;……문주님은 정상적인 절차를 거치지 않고, 당신을 직권으로 추방시켰지. 그리고 당신과 관련되었던 모든 기록을 말소시켰고."
10037050-123 = "5;카이;08;옛 추억이라도 떠올릴 작정인가? 기억나는군……. 쿡쿡쿡. 그리 퇴학당하지 않았다면 진작에 졸업했을 터였겠지만, 이렇게 학적 자체가 말소되어서 말이다."
10037050-124 = "5;카이;03;교정국에도 잠시 신세를 지기도 했고, 그 이후로는 마치 존재하지만 존재하지 않는 유령처럼…… 키보토스의 외곽을 떠도는 처지가 되기는 했지.\n#5;em;[음표]"
10037050-125 = "3;카구야;05;……의외로군. 그 신타니 카이가 신세 한탄을 할 줄은."
10037050-126 = "5;카이;02;그렇게 들렸단 말인가? 이거, 내 언변도 무뎌진 모양이군."
10037050-127 = "3;카구야;16;왜 나를 불러냈지?\n#3;em;[?]"
10037050-128 = "5;카이;03;지금의 산해경에 대해 나누고 싶은 이야기가 있어서, 일까."
10037050-129 = "3;카구야;05;당신이 작금의 산해경에 대해 무엇을 안다는 거지?"
10037050-130 = "5;카이;08;쿡쿡쿡……. 과거의 망령은 간섭하지 말고 사라지라는 말인가? 날카롭구나.\n#5;em;…"
10037050-131 = "5;카이;03;하기야, 산해경이면서 산해경이 아닌 내가 무엇을 말할 수 있겠는가."

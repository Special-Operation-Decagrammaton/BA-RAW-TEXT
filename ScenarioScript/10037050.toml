10037050-84 = "3;토모에 치파오;00\n#3;em;…\n#wait;2500"
10037050-85 = "3;토모에 치파오;99;……."
10037050-86 = "3;토모에 치파오;03;그야, 붉은겨울에서는 평균적으로 일주일에 1~2회 정도는 쿠데타가 발생하곤 하니까요.\n#3;greeting"

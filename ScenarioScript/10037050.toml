[translation]
10037050-1 = "第5話;空中浮雲，裂而不覺"
10037050-3 = "[ns]「潔莉諾和瑪麗娜先去休息了嗎？」"
10037050-4 = "是的，特別是潔莉諾書記……潔莉諾醬看起來很疲憊。"
10037050-5 = "畢竟行程這麼緊湊，我想這也難怪。"
10037050-6 = "嗯？我嗎？"
10037050-7 = "您是在擔心我嗎？#n謝謝老師。呵呵。"
10037050-8 = "要說不累的話當然是騙人的……不過還有些事情，需要整理一下思緒。"
10037050-9 = "[s]「比如說，這場交流會背後隱藏的用意之類的？」"
10037050-10 = "……這個嘛，那究竟是什麼呢。"
10037050-13 = "老實說，我多少能猜到門主大人的想法。"
10037050-14 = "當然，我自己也不確定這個猜測是否正確。"
10037050-15 = "[s]「這點我也還不太清楚。」"
10037050-18 = "是嗎？呵呵。#n不過假使我的猜測正確……門主大人應該也不會太在意這種事才對。"
10037050-19 = "[s]「就智惠看來，山海經這個地方怎麼樣？」"
10037050-20 = "哎呀，老師這樣的語氣，彷彿您也是山海經的人一樣呢？"
10037050-21 = "您說是受到門主大人的委託，才會暫時來到山海經的？#n呵呵，那確實有些無可奈何呢。"
10037050-22 = "怎麼說呢……#n山海經……是個美麗的地方。"
10037050-25 = "令人印象深刻、充滿歷史氣息……#n但同時也有許多東西受到隱藏……這點相當耐人尋味。"
10037050-26 = "更有趣的是，山海經的學生們似乎並不覺得那些東西有被隱藏起來。"
10037050-27 = "[s]「可以說得更詳細一點嗎？」"
10037050-30 = "是這樣的，老師。"
10037050-31 = "祕密存在的基礎，在於有人將其視為祕密。"
10037050-32 = "如果人們不去認識，也不想了解的話──祕密就不能被稱作為祕密。"
10037050-33 = "只不過是一些尚未被發現，連存在和真相都不為人知的事物而已。"
10037050-34 = "在我們這些外人眼中，僅是走馬看花就能察覺山海經似乎隱藏著很多東西……"
10037050-35 = "然而山海經的學生，看起來卻完全沒有意識到這一點。"
10037050-36 = "當然，這只不過是我在山海經短短一天當中，一些淺薄的一己之見而已。呵呵。"
10037050-37 = "[s]「你對妃姬有什麼看法？」"
10037050-38 = "門主大人他……的確是位非常出色的人。"
10037050-39 = "我也大概能夠明白，為何會有這麼多學生真心追隨著他。"
10037050-40 = "啊，當然要論可愛還是比不過潔莉諾醬就是了。#n反而有點太過成熟，甚至到了讓人感覺有點不自然的程度。"
10037050-41 = "自始至終都理所當然地超脫於眾人之上，以老練的手段做出明智的判斷……"
10037050-42 = "不過說了這麼多，我現在突然很好奇……#n為何他當時會採取如此有違常理又不自然的做法呢？"
10037050-43 = "[s]「當時？」"
10037050-44 = "是的，我指的是午後的山海經巡訪。#n他沒有選擇一同前往的原因究竟是什麼？"
10037050-45 = "[s]「啊……」"
10037050-46 = "身為發出邀請的主人，卻不親自帶領客人參觀自己的領地……實在有點不自然吧？"
10037050-47 = "更何況還是像門主大人那樣如此講究禮儀和場合的人。"
10037050-48 = "雖然他表示有不得已的原因……"
10037050-49 = "這麼說或許有些失禮，#n不過我相信在那個當下，覺得事有蹊蹺的人應該不只我一個才對。"
10037050-55 = "不知道老師您……呵呵，看來似乎沒有提問的必要了呢。#n畢竟您的表情已經做出了回應。"
10037050-56 = "您好奇自己的表情是不是真的這麼明顯？#n怎麼說呢……我對這方面的事情，比其他學生更敏感一點。"
10037050-57 = "[s]「那麼，你覺得山海經的學生們怎麼樣呢？」"
10037050-58 = "這是個相當有趣的話題呢。"
10037050-62 = "說到我們今天遇到的山海經學生……#n有美奈執行部長、那位名叫輝夜的同學、瑠美商會長，以及梅花園的各位。"
10037050-63 = "當然還有在山海經巡訪途中，匆匆擦肩而過的其他學生。"
10037050-64 = "……"
10037050-65 = "對此，我的感受是……"
10037050-69 = "他們很像只要有人點燃導火線，就會瞬間引發大火的乾草捆。"
10037050-70 = "[s]「這是……什麼意思？」"
10037050-71 = "大多數的情況下，在結果出現之前都會存在「徵兆」。"
10037050-72 = "山海經的學生們雖然看似平靜……"
10037050-73 = "但我隱約能感受到其背後隱藏的緊張感……或者說某種類似恐懼的情緒。"
10037050-74 = "有統計結果顯示，在發生一件大事故之前，#n通常會有29件相同原因的小事故，以及300多件可能發生的潛在事故。"
10037050-75 = "[s]「唔嗯……有這麼嚴重嗎？」"
10037050-76 = "當然，這也可能只是我過於神經質。"
10037050-77 = "但是……我們赤冬對這種氛圍特別敏感。"
10037050-81 = "何以見得？"
10037050-85 = "……"
10037050-86 = "畢竟在我們赤冬，可是平均每週就會發生一兩次政變啊。"
10037050-94 = "……"
10037050-95 = "被告知要「以忠義之名，談論山海經正在發生的徵兆」而來到這裡……"
10037050-96 = "真是個奇妙的地方啊。#n既沒有學生也沒有設施的邊陲地區……雖然屬於山海經，卻又不是山海經。"
10037050-97 = "知道這個地方的人……"
10037050-102 = "──並非等閒之輩，是嗎？"
10037050-106 = "是誰……？"
10037050-112 = "路途雖然昏暗，卻是個夜色無法掩蓋光芒的夜晚呢。#n你不這麼認為嗎？"
10037050-113 = "你是……申谷誡！？#n你怎麼會在這裡！？"
10037050-114 = "哦？沒想到你居然還記得我啊。#n這倒是讓我有點訝異。"
10037050-115 = "……沒錯。#n即便其他人早已遺忘，又或者被迫遺忘……總得有人記得過去才行。"
10037050-116 = "咯咯……你還是老樣子啊，輝夜。#n雖然我不太擅長記別人的長相，卻還是有些面容會讓我印象深刻呢。"
10037050-117 = "京劇部還在活動嗎？#n……雖然我其實已經有所耳聞了。"
10037050-118 = "還有心思關心別人的社團活動，看來你的情況還不算太糟啊。"
10037050-119 = "咯咯，這是在擔心我嗎？#n想不到竟然會在這種時候，猶豫該不該向你說聲謝謝啊。"
10037050-120 = "大可不必。#n對於你退學的處分……至少從結果來看，我也並不認為有什麼問題。"
10037050-121 = "「從結果來看」？#n聽起來好像話中有話呢。"
10037050-122 = "……門主大人他未經正常程序，便利用職權將你驅逐。#n同時還抹去了與你有關的所有紀錄。"
10037050-123 = "現在是要話當年嗎？讓我想想……咯咯。#n要是沒有被退學，我早就已經畢業了吧？#n結果卻因為學籍被抹除，變成今天這個樣子。"
10037050-124 = "在矯正局短暫待過之後，就像是存在卻又不存在的幽魂……在奇普托斯的邊緣飄蕩。"
10037050-125 = "……真令人意外。#n沒想到就連那個申谷誡也會埋怨自己的處境啊。"
10037050-126 = "聽起來像是在埋怨嗎？#n唉，看來我連口才都生疏了啊。"
10037050-127 = "找我出來要做什麼？"
10037050-128 = "那當然是想跟你聊聊山海經的現狀囉。"
10037050-129 = "你對現在的山海經又了解多少？"
10037050-130 = "咯咯……你言下之意是要過去的幽魂滾得遠遠的，少管閒事嗎？#n還真是不留情面。"
10037050-131 = "也對，像我這種屬於山海經又不屬於山海經的傢伙，如今還能說些什麼呢？"
10037050-135 = "不過我很清楚──自從赤冬的訪問團抵達之後，山海經正悄悄掀起波瀾。"
10037050-140 = "你是怎麼……！？"
10037050-142 = "山海經早已將我遺忘，這點我心知肚明。#n但我從未忘記山海經──因為我無法忘記。"
10037050-143 = "……意思是說，你自有辦法掌握山海經的情況？"
10037050-144 = "咯咯……聽說京劇部為赤冬的訪問團演出了京劇啊？#n感覺如何？輝夜。"
10037050-145 = "……我不打算回答這個問題。"
10037050-146 = "無所謂，那句話本身就是絕佳的回答了。#n你一定感覺很屈辱吧？"
10037050-147 = "……！"
10037050-148 = "竟然要為了那些根本不懂傳統價值和京劇意義的人，盡全力展現自己的一切…… "
10037050-149 = "我能理解，我完全能理解。#n即便其他人無法理解，我也非常明白那種感受。"
10037050-151 = "不過是個被驅逐的人，少對門主大人的決定和判斷指手畫腳！"
10037050-153 = "哦？但你不是已經開始懷疑妃姬的決定和判斷了嗎？"
10037050-154 = "若非如此，你也不會來到這個地方了吧。"
10037050-155 = "……！！！"
10037050-160 = "徵兆已經顯露。#n無論是開始在山海經擴散的漣漪，還是它將帶來的結果。"
10037050-161 = "要是再這樣下去，就連京劇都會成為過去的遺產，最終變得乏人問津。"
10037050-162 = "所謂的變化就是這麼回事。#n如同河流侵蝕岩石一般……即便起初難以察覺，依然確實且不斷地改變著一切。"
10037050-167 = "不許你輕視京劇的價值和意義！"
10037050-168 = "我並沒有輕視。只是即便全世界都忽視和貶低京劇……#n至少還是要有那麼一個人，將京劇和傳統守護下去吧？"
10037050-170 = "……你是要我接下那個職責嗎？"
10037050-171 = "不然還有誰呢？"
10037050-172 = "為什麼是我？"
10037050-173 = "因為自始至終，最了解山海經傳統價值和意義的一直都是京劇部。"
10037050-174 = "……至少我還在山海經就讀的時候是如此。"
10037050-175 = "……！"
10037050-176 = "大家總是把傳統掛在嘴邊……"
10037050-177 = "但真正深刻理解其重要性的人卻少之又少。"
10037050-178 = "對於從過去保存至今的珍貴資產，以及由此演進的歷史必須心懷敬意！#n因為「現在」立足於「過去」的根基之上！"
10037050-179 = "不管怎麼說，玄武商會都是最大的問題。"
10037050-182 = "那群傢伙……！#n打著料理和商業的幌子，就像毒蕈般到處散播孢子！"
10037050-183 = "對於玄武商會造成的亂象，門主大人也不能撇清責任……究竟為何如此放任他們？"
10037050-184 = "如此睿智的門主，一定比誰都清楚他們可能引發的危機才對啊！"
10037050-187 = "然而不僅解除了對夏萊老師的警戒，如今連對赤冬的訪問團都……"
10037050-188 = "咯咯咯咯……"
10037050-190 = "你說得很對。#n不過既然身為京劇部的一員，不是應該用京劇來表達自己的想法嗎？"
10037050-191 = "如果真心想守護傳統的話，不是應該從京劇開始做起嗎？"
10037050-192 = "這是什麼意思？"
10037050-193 = "不如這樣吧……試著演一齣新的京劇如何？"
10037050-198 = "然後在那個舞台上，嘗試採取一些行動……"
10037050-205 = "……！？你，你在說什麼，申谷誡！#n我和京劇部從來就不可能有那種權限……！"
10037050-207 = "這話還真有趣啊，京劇部長。"
10037050-208 = "京劇部不僅背負著山海經的傳統之名，更是這些年來最維護傳統的社團。#n如果連你們都沒資格的話，究竟誰有這個資格呢？"
10037050-209 = "……！"
10037050-210 = "不過話又說回來，這些也不過是我這個被山海經驅逐之人的一己之見罷了。"
10037050-211 = "假如真的演出了新京劇……結果卻失敗的話……"
10037050-212 = "真有趣。成就忠義之路上，何來的成與敗呢？"
10037050-213 = "……！！！"
10037050-214 = "咯咯。看來連京劇部長也被世俗污染了啊。#n也對，也對……畢竟沒有什麼事是不會改變的對吧？"
10037050-215 = "你少胡言亂語！#n就算所有人都忘記，哪怕還有一個人記得……！"
10037050-216 = "這就對了。我等的就是你的這股意志與氣魄。#n不必擔心，我會幫忙佈置一下舞台的。"
10037050-220 = "要怎麼做……？"
10037050-221 = "咯咯。受驅逐之人，自有規範之外的方法。"
10037050-222 = "……這件事與你無關，申谷誡。"
10037050-223 = "我話先說在前頭，京劇部這麼做純粹是為了守護山海經的忠義。#n我會堅守這個原則！"
10037050-224 = "那是當然。本就應該如此。"
10037050-229 = "咯咯……看來齒輪終於要開始轉動了。"
10037050-237 = "聽您說了這麼多，到頭來您究竟想得到什麼呢，誡大人。"
10037050-238 = "火苗。"
10037050-240 = "火苗……是嗎？"
10037050-241 = "沒錯，就是火苗。#n無論多麼微小，仍然能在黑暗中燃燒自己綻放光芒的火苗。"
10037050-242 = "一旦抓住機會，便能夠造成燎原之勢──微小而強大的火苗。"
10037050-243 = "你又是怎麼想的呢？"
10037050-249 = "……我希望鍊丹術研究會能找回真正的會長。"
10037050-250 = "還是同樣的回答啊。#n所以你才會是至今唯一仍追隨著我的人。"
10037050-251 = "沙耶會長……不，藥子沙耶並不適合擔任鍊丹術研究會的會長。#n尤其是和誡大人相比，能力和資質都遠遠不足。"
10037050-252 = "鍊丹術研究會需要找回真正的主人──僅此而已。"
10037050-253 = "這樣啊。"
10037050-258 = "既然如此，有件要緊事必須趕快辦好。"
10037050-259 = "隨誡大人差遣。"
10037050-260 = "即便會影響你未來的發展也一樣嗎？"
10037050-261 = "反正如今的鍊丹術研究會，也沒有所謂明日可言了。"
10037050-266 = "很好，那就回鍊丹術研究會……把事情辦好吧。"
10037050-267 = "遵命。"

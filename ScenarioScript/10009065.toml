[translation]
10009065-9 = "สมกับเป็นคนที่ได้ชื่อว่าหนึ่งในเจ็ดอาชญากรจริงๆ นะคะ"
10009065-10 = "เรายังไม่ได้รับข่าวการหลบหนีเลย แต่คุณก็มาปรากฏตัวต่อหน้าเราแบบนี้แล้ว ไม่เบาเลยนะคะ"
10009065-14 = "แต่ว่าเพราะคุณครูช่วยออกคำสั่ง ทำให้จัดการพวกเด็กเกเรคนอื่นๆ ได้และยึดอุปกรณ์ที่ถูกขโมยไป#nคืนมาได้แล้วค่ะ"
10009065-15 = "สถานการณ์มาถึงจุดจบแล้วค่ะ จิ้งจอกแห่งความพินาศ"
10009065-16 = "...!"
10009065-20 = "พอตกอยู่ในสถานการณ์คับขันก็เลยคิดที่จะหนีเหรอคะ? "
10009065-21 = "ก็ดีค่ะ... ฉันจะไม่ยอมให้มีศพ... "
10009065-22 = "ขออภัยค่ะ เพื่อไม่ให้จำนวนผู้บาดเจ็บเพิ่มขึ้นมากกว่านี้ เรามาจบสถานการณ์นี้กันเถอะค่ะ"
10009065-23 = "คุณครู ฉันจะไล่ตามจิ้งจอกแห่งความพินาศไปเองค่ะ"
10009065-24 = "แถวๆ นี้อาจจะมีกลุ่มพวกเด็กเกเรหลงเหลืออยู่ เพราะงั้นตอนนี้คุณครูไปรวมกลุ่มกับพวกนักเรียน#nโรงเรียนวัลคิรี่ก่อนดีกว่าค่ะ"
10009065-25 = "[s] \"เดี๋ยวก่อน เซนะ...!\""
10009065-30 = "(เมื่อพูดจบ เซนะแสดงสีหน้ามุ่งมั่นก่อนจะวิ่งออกไปไล่ตามวาคาโมะที่กำลังหลบหนี)"
10009065-31 = "(หลังจากวาคาโมะหายไป คุณครูก็ครุ่นคิดอยู่ครู่หนึ่งว่าจะทำอย่างไรต่อไป)"
10009065-37 = "คุณครู ปลอดภัยรึเปล่า?! ไม่บาดเจ็บตรงไหนใช่มั้ย?!"
10009065-38 = "[s] \"อื้อ ว่าแต่จิฮิโระมีอะไรเหรอ ทำไมทำหน้าเครียดแบบนั้นล่ะ\""
10009065-39 = "ตอนนี้อยู่คนเดียวงั้นเหรอ? แล้วเด็กเกเฮนน่าที่อยู่ด้วยเมื่อกี้ล่ะ?"
10009065-40 = "ว่าไงนะ? ไล่ตามวาคาโมะไป...?"
10009065-41 = "ไม่ได้นะ คุณครู โดนหลอกแล้วล่ะ นั่นมันกับดัก!"
10009065-42 = "[s] \"กับดักเหรอ...?\""
10009065-43 = "มันเป็นแผนการที่วาคาโมะวางเอาไว้ตั้งแต่แรกแล้ว ยัยนั่นตั้งใจก่อความวุ่นวายขึ้น เพื่อให้องค์กรที่ดูแลความปลอดภัยทั้งหมดมุ่งเป้าไปที่ตัวเอง... "
10009065-44 = "ตอนนี้ฉันไม่มีเวลามาอธิบายสถานการณ์ทั้งหมดแล้ว คุณครูทำตามที่ฉันบอกก่อนเถอะ ฉันเพิ่งแฮ็กเข้าระบบรักษาความปลอดภัยตรงบริเวณที่คุณครูอยู่"
10009065-45 = "[s] \"ดะ...เดี๋ยวก่อน?! จู่ๆ ก็แฮ็กเลยเหรอ?!\""
10009065-46 = "ฉันจะใช้กล้องวงจรปิดและระบบสัญญาณไฟจราจรนำทางคุณครูไปยังที่ปลอดภัยเอง"
10009065-47 = "คุณ...ครู... สื่อ...สาร..."
10009065-48 = "อย่า.... ระ...!"
10009065-53 = "[ns] \"เอ๊ะ สัญญาณขาดไปแล้ว...?\""
10009065-54 = "(ในสถานการณ์ที่ไม่สามารถติดต่อกับจิฮิโระได้ คุณครูจึงใช้เวลาครุ่นคิดว่าควรทำอย่างไรต่อไป และในตอนนั้นเอง...)"
10009065-56 = "ฮุฮุฮุ ในที่สุดก็ได้พบกันเสียทีนะคะ♡"
10009065-57 = "[s] \"หืม...?\""
10009065-60 = "(ในช่วงเวลาเดียวกัน ที่บริเวณอื่นๆ...)"
10009065-65 = "รายงานค่ะ! จิ้งจอกแห่งความพินาศปรากฏตัวที่ย่านการค้าในเขต D.U. ขอกองกำลังสนับสนุนจากสำนักงานใหญ่ด้วยค่ะ!"
10009065-66 = "พบกลุ่มเด็กเกเรกลุ่มอื่นๆ เข้ามาในระยะประชิดเพิ่มขึ้น หน่วยที่อยู่ในพื้นที่รับมือได้ไม่หมด...!"
10009065-67 = "เรียกศูนย์! จากผู้รับผิดชอบเขต D.U. ตะวันตก!"
10009065-68 = "อ๊ะ! เขตตะวันตก! พอดีเลยนะ! ทางนี้! ช่วยมาสนับสนุนที่ย่านการค้าที...!"
10009065-69 = "จิ้งจอกแห่งความพินาศที่หลบหนีออกมาจากห้องคุมขังปรากฏตัวขึ้นที่บริเวณเขตย่านการค้า#nฝั่งตะวันตก! ช่วยส่งกองกำลังสนับสนุนมาที่นี่ก่อนที่จะสายเกินไปด้วย!"
10009065-70 = "ว่ายังไงนะ...?!"
10009065-75 = "ขอย้ำ! วาคาโมะปรากฏตัวขึ้นที่เขตตะวันตก...!"
10009065-79 = "พูดอะไรน่ะ! จิ้งจอกแห่งความพินาศอยู่ที่นี่ต่างหาก! ยัยนั่นโผล่มาที่ถนนหลักในเขตกลางของ D.U. ค่ะ!"
10009065-88 = "ฟะ...ฟุบุกิ! นี่มัน...!"
10009065-89 = "อ๊าาาา นะ...นี่มันเกิดอะไรขึ้นกันเนี่ย แบบนี้มัน...!"
10009065-90 = "โดนต้มจนเปื่อยเลย พวกที่อยู่ตรงนั้นเป็น <ตัวปลอม> ทั้งหมดเลย วาคาโมะวางแผนเอาไว้แบบนี้#nตั้งแต่แรกก่อนหลบหนีออกมาแล้ว"
10009065-91 = "ทำให้ทุกคนมุ่งความสนใจไปที่ตัวเอง แล้ววาคาโมะตัวจริงก็เข้าไปประชิดตัวคุณครูยังไงล่ะ!"
10009065-92 = "คะ?!"
10009065-93 = "ถ้างั้นรีบติดต่อหาคุณครูเร็วเข้า...!"
10009065-94 = "พลาดแล้วล่ะ ตอนนี้การสื่อสารทางฉันโดนบล็อกเรียบร้อยแล้ว"
10009065-95 = "ยัยจิ้งจอกแห่งความพินาศนั่นไปได้อุปกรณ์ปล่อยคลื่นรบกวนมาจากไหนกัน..."
10009065-99 = "อา... "
10009065-100 = "...คงจะเป็นของทางโรงเรียนวัลคิรี่ละสินะ"
10009065-101 = "ไม่สิ นี่ไม่ใช่เวลามาห่วงเรื่องนี้"
10009065-102 = "ถ้าติดต่อไม่ได้แบบนี้ละก็... "
10009065-103 = "นี่ เธอขับรถเป็นรึเปล่า?"
10009065-105 = "ฉันเหรอ...?"
10009065-107 = "ฮุฮุฮุ♡ ฉันเปิดใช้อุปกรณ์คลื่นรบกวนแล้ว ตอนนี้ก็จะไม่มีเสียงหนวกหูอะไรมารบกวนอีกแล้วละค่ะ"
10009065-108 = "ฉันแอบหยิบมาเอาไว้ใช้แก้เบื่อนิดหน่อย แต่อุปกรณ์ของโรงเรียนวัลคิรี่นี่มีประโยชน์จริงๆ เลยนะคะ"
10009065-109 = "ไม่คิดอย่างนั้นเหรอคะ? คุณ-ครู"
10009065-110 = "[s] \"วาคาโมะ...\""
10009065-113 = "อา... ฉันรอคอยเวลานี้มานานแสนนาน"
10009065-114 = "ฉัน... รอคอยมานานมากเลยนะคะ เพราะมีคนมากมายวนเวียนอยู่รอบตัวคุณ ฉันหาช่วงเวลาเหมาะๆ ไม่ได้เลยค่ะ"
10009065-115 = "พอมีพวกขยะไร้ค่าคอยมาขัดขวางอยู่ตลอด ฉันเลยเอื้อมมือไปถึงคุณไม่ได้ ฉันต้องเสียใจเป็นสิบ... เป็นร้อยครั้ง"
10009065-116 = "เพราะงั้นฉันเลยกังวลค่ะ ว่าจะต้องทำยังไง เพื่อให้เข้าใกล้คุณได้"
10009065-117 = "จะต้องทำยังไง เพื่อให้มาอยู่ต่อหน้าคุณได้โดยที่ไม่มีใครรบกวน"
10009065-118 = "[s] \"เพราะแบบนี้เองเหรอ...?\""
10009065-119 = "ฮุฮุ เพื่อเปิดตัวอย่างสง่างามที่สุด ในงานเทศกาลคราวนี้ ฉันถึงทำให้ทุกคนมุ่งความสนใจมาที่ฉัน#nแทนที่จะเป็นคุณครู ปรากฏตัวอย่างโดดเด่น และดูรุนแรงมากขึ้นเพื่อไม่ให้ละสายตาไปจากฉันได้..."
10009065-120 = "และผลลัพธ์ก็เป็นอย่างที่เห็นค่ะ ฉันมาปรากฏตัวต่อหน้าคุณสำเร็จแล้วค่ะ"
10009065-121 = "เอาละค่ะ ฉันจะไม่เสียเวลาพูดอะไรยืดเยื้ออีกต่อไปแล้วค่ะ"
10009065-126 = "[ns] \"เฮือก...!\""
10009065-127 = "ในที่สุดสิ่งที่ฉันตั้งตารอมาจนถึงตอนนี้...!"
10009065-132 = "คุณครูช่วยรับของสิ่งนี้ไว้ได้หรือเปล่าคะ?"
10009065-133 = "[s] \"หืม? นี่มัน...ช็อกโกแลต?\""
10009065-134 = "ค่ะ ช็อกโกแลตของวาคาโมะที่เตรียมเอาไว้มอบให้กับคุณในวันนี้โดยเฉพาะเลยค่ะ♡"
10009065-135 = "[s] \"ตะ...แต่ทำไมจู่ๆ ถึงเอาช็อกโกแลตมาให้ล่ะ\""
10009065-137 = "ก็นะ มันก็เป็นวันวาเลนไทน์นี่นา วันที่คนที่ได้รับและมอบช็อกโกแลตให้กันและกันจะมีความสุขมากขึ้น"
10009065-139 = "เพราะวันวาเลนไทน์เป็นวันที่พิเศษมาก ทุกคนต่างก็เตรียมช็อกโกแลตไว้ให้คนสำคัญของตัวเองนี่คะ"
10009065-143 = "[ns] \"อืม แต่ว่านี่มัน...\""
10009065-144 = "ฉันตกหลุมรักคุณตั้งแต่แรกเห็นเลยค่ะ คุณครู"
10009065-145 = "ตั้งแต่วันแรกที่ได้พบกับคุณ ในใจของฉันก็ร่ำร้องเรียกหาแต่คุณ ฉันต้องอดกลั้นความคิดถึงที่มี#nต่อคุณมาตลอดจนถึงตอนนี้ค่ะ"
10009065-146 = "และในที่สุดฉันก็มามอบช็อกโกแลตให้กับคุณได้แล้ว...!"
10009065-147 = "อา... ฮุฮุฮุ ไม่คิดมาก่อนเลยว่าจะมีความสุขถึงเพียงนี้...!"
10009065-148 = "[s] \"วาคาโมะก่อเรื่องวุ่นวายพวกนั้น เพื่อเอาช็อกโกแลตมาให้ครูเหรอ...?\""
10009065-149 = "ค่ะ ใช่แล้วค่ะ คุณครู♡"
10009065-150 = "[s] \"...\""
10009065-152 = "[s1] \"ขอบคุณสำหรับช็อกโกแลตนะ วาคาโมะ\"\n[s2] \"แบบนั้นมันไม่ถูกต้องนะ! วาคาโมะ!\""
10009065-153 = "อา ไม่คิดเลยว่าคุณจะมีความสุขที่ได้รับช็อกโกแลตขนาดนี้"
10009065-154 = "ถ้าฉันรู้ละก็คงจะทำแบบนี้ตั้งแต่แรกแล้วละค่ะ ถ้าทำแบบนั้นก็จะได้พูดคุยกับคุณได้เร็วขึ้น!"
10009065-155 = "ฮุฮุฮุ... ฮุฮุฮุฮุ"
10009065-156 = "[s3] \"อืม ครูก็ขอบคุณนะ แต่ว่า...\""
10009065-157 = "หืม? คะ...?"
10009065-158 = "[s4] \"ครูคิดว่าแบบนี้มันลำบากใจนิดหน่อยนะ\""
10009065-159 = "คะ... คือว่า... ละ...ลำบากใจงั้นเหรอคะ?"
10009065-160 = "[s5] \"ถ้าให้พูดตรงๆ ก็คือทำแบบนี้มันไม่ถูกนะ วาคาโมะ\""
10009065-161 = "ไม่ถูกต้อง...?"
10009065-162 = "คะ...?!"
10009065-163 = "[ns6] \"ที่ก่อเหตุวุ่นวายที่ต่างๆ ขึ้นเพื่อเอาช็อกโกแลตมาให้ครูน่ะ\""
10009065-165 = "[ns7] \"เธอคิดว่ามันสร้างความเสียหายไปมากแค่ไหนกันล่ะ?\""
10009065-167 = "[ns8] \"สิ่งที่วาคาโมะทำไปน่ะ ไม่ใช่สิ่งที่ถูกต้องนะ\""
10009065-168 = "...!!"
10009065-169 = "ตะ.. แต่ว่า! คุณครู! วันวาเลนไทน์น่ะ...!"
10009065-170 = "คือวันที่ทุ่มเทกำลังทั้งหมดเพื่อถ่ายทอดความรู้สึกที่แท้จริงของเราออกไปนี่คะ...!"
10009065-171 = "วาคาโมะผู้นี้ เชื่อในคำพูดนั้นถึงได้พยายามทุ่มเทอย่างสุดความสามารถ...!"
10009065-172 = "[s] \"แต่ยังไงก็เอามาเป็นเหตุผลสร้างความเดือดร้อนให้คนอื่นไม่ได้นะ\""
10009065-173 = "ฉันก็แค่... แค่อยากสื่อความรู้สึกของฉันให้กับคุณครูได้รับรู้เท่านั้น...!"
10009065-174 = "[s9] \"ในวันแบบนี้น่ะ คงมีคนอื่นๆ ที่คิดเหมือนกับวาคาโมะอีกหลายคนเลย\"\n[s10] \"แต่วาคาโมะกลับเหยียบย่ำพวกเขาเพื่อตัวเอง\""
10009065-175 = "ฉันน่ะ... คือว่าฉัน...!"
10009065-176 = "ฉันน่ะ... คือว่าฉัน...!"
10009065-177 = "[s] \"ถ้าปฏิเสธความจริงเรื่องนี้ ครูคงจะยกโทษให้วาคาโมะไม่ได้หรอก\""
10009065-178 = "...!!!"
10009065-179 = "คุณ... จะไม่... ยกโทษ... ให้ฉัน...เหรอ?"
10009065-180 = "ฉันก็แค่... ทำทุกๆ อย่างเพื่อที่จะได้พบกับคุณ ได้เข้าใกล้คุณแบบปกติ..."
10009065-181 = "แต่ทุกอย่าง... เป็นสิ่งที่ไม่ถูกต้อง... และจะไม่ยกโทษให้...?"
10009065-182 = "มะ...ไม่นะ ไม่เอานะคะ เรื่องแบบนั้น..."
10009065-183 = "ถ้าฉันถูกคุณเกลียดเข้าละก็ ฉันคง... วาคาโมะผู้นี้คงจะ... อ๊าาาา...!"
10009065-184 = "[s] \"แต่ครูเชื่อนะว่าวาคาโมะจะไม่ทำแบบนั้น\""
10009065-185 = "!!"
10009065-186 = "คุณ... เชื่อฉันเหรอคะ...? ถึงฉันจะทำผิดพลาดไป คุณก็จะไม่เกลียดฉันเหรอคะ?"
10009065-187 = "[s11] \"อื้อ ไม่ว่าใครจะพูดยังไง วาคาโมะก็เป็นนักเรียนคนสำคัญของครูนะ\"\n[s12] \"แค่สัญญาว่าต่อไปจะไม่ทำเรื่องแบบนี้แล้วก็พอ\""
10009065-192 = "ฉัน...คือคนสำคัญ... ของคุณครู..."
10009065-193 = "อา... นะ...นะ...นะ... แน่นอนค่ะ! ใช่แล้วค่ะ! แน่นอนค่ะ! ฉันสัญญาค่ะ"
10009065-194 = "ค่ะ...! ฉัน... วาคาโมะผู้นี้ขอให้สัญญากับคุณครูค่ะ!"

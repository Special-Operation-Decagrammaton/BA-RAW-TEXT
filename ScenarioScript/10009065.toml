[translation]
10009065-9 = "Now I see why she was one of the Seven Prisoners."
10009065-10 = "She counterattacked without anyone having noticed she escaped this time. Quite impressive."
10009065-14 = "But it's over now. Thanks to Sensei's leadership, there's no one left to help you, and the stolen equipment has been disabled."
10009065-15 = "You've met your match, Fox of Calamity."
10009065-16 = "...!"
10009065-20 = "Trying to escape from the corner you've backed yourself into? "
10009065-21 = "So be it. I'd rather avoid there being more dead bodies to look after... "
10009065-22 = "Or rather, more wounded to take care of. So it's time to end this."
10009065-23 = "I'm going to chase after her, Sensei."
10009065-24 = "Some of her forces may still try to regroup and cause trouble.#nI suggest you reconvene with the Valkyrie students to be safe."
10009065-25 = "[s] \"But, Sena...!\""
10009065-30 = "It was too late. Sena already took off to chase Wakamo."
10009065-31 = "I stood there for a while wondering what I should do next."
10009065-37 = "Sensei, are you okay?! You haven't been hurt, have you?"
10009065-38 = "[s] \"I'm fine. What's wrong? You seem panicked.\""
10009065-39 = "Wait. Are you alone? What happened to the Gehenna student you were with?"
10009065-40 = "She chased after Wakamo?!"
10009065-41 = "Sensei, no! It's a trap!"
10009065-42 = "[s] \"A trap...?\""
10009065-43 = "This was Wakamo's plan from the very beginning. She was causing those incidents to draw every law enforcement agency's focus on her. "
10009065-44 = "There's no time to explain. I need you to stay calm and follow my instructions. I just hacked into a system near where you are."
10009065-45 = "[s] \"You did?!\""
10009065-46 = "I can use the nearby security cameras and traffic lights to guide you to safety."
10009065-47 = "Th...can...lay..."
10009065-48 = "Come...sei...!"
10009065-53 = "[ns] \"I lost her...\""
10009065-54 = "I couldn't reconnect with Chihiro and remained at a loss about what to do, when..."
10009065-56 = "Heeheehee. I finally found you. ♥"
10009065-57 = "[s] \"Huh?\""
10009065-60 = "Meanwhile..."
10009065-65 = "Report! The Fox of Calamity has been spotted in a D.U. shopping district! Requesting backup!"
10009065-66 = "She has reinforcements with her! We can't handle them alone!"
10009065-67 = "Come in! This is the D.U. West Street unit!"
10009065-68 = "I read you loud and clear! I repeat, send support to—"
10009065-69 = "No can do! The Fox of Calamity escaped from the Corrections Bureau and is attacking the West Street festival! We're requesting backup!"
10009065-70 = "Wait! What?!"
10009065-75 = "Repeat! We have eyes on Wakamo!"
10009065-79 = "That's impossible! We're engaged with the Fox of Calamity in D.U.'s Central Street!"
10009065-88 = "What's going on, Fubuki...?!"
10009065-89 = "Heck if I know! Are all of them...?!"
10009065-90 = "Fake, yes. Wakamo planned all of this to escape the Corrections Bureau."
10009065-91 = "This was an elaborate diversion so that she could confront Sensei by herself."
10009065-92 = "What?!"
10009065-93 = "We have to warn Sensei right away!"
10009065-94 = "I've already tried. Our comms are being jammed."
10009065-95 = "Where did she get equipment capable of something like this?"
10009065-99 = "Uh-oh. "
10009065-100 = "What do you mean, \"uh-oh\"? It wasn't from Valkyrie, was it?"
10009065-101 = "Never mind. We don't have time for that."
10009065-102 = "If we can't make contact with Sensei from here, then that leaves us with one other option."
10009065-103 = "Do you know how to drive?"
10009065-105 = "Me?"
10009065-107 = "I set up a jamming device so that no one can interrupt us. ♥ "
10009065-108 = "Stealing Valkyrie's equipment on a whim turned out to be quite useful."
10009065-109 = "Wouldn't you say so...Sensei?"
10009065-110 = "[s] \"Wakamo...\""
10009065-113 = "Oh, how I've waited... You have no idea how long I've been dreaming of this moment."
10009065-114 = "Or how long I struggled to make it happen. Removing all of the obstacles surrounding you proved to quite difficult."
10009065-115 = "But at last, nothing is standing in my way."
10009065-116 = "I've been thinking all this time what I must do to get this close to you."
10009065-117 = "Or better yet, what I would do once I was alone with you like this."
10009065-118 = "[s] \"That's why you waged war with Valkyrie?\""
10009065-119 = "Heehee. It was the only way to take everyone's eyes off of you and place them on me. I caused such a stir that they had no choice but to focus all of their attention on me. "
10009065-120 = "It was all to create the opportunity to finally be alone with you."
10009065-121 = "But enough talk. I can't hold back any longer."
10009065-126 = "[ns] \"...!\""
10009065-127 = "At long last, I can fulfill my deepest desires!"
10009065-132 = "So...will you accept this, Sensei?"
10009065-133 = "[s] \"Is this...chocolate?\""
10009065-134 = "Of course. Today's a special day, so I made it just for you. ♥"
10009065-135 = "[s] \"B-But why chocolate...? Wait!\""
10009065-137 = "This is Valentine's Day we're talking about—an important holiday.#nIt's a day of exchanging chocolate and being happy."
10009065-139 = "Valentine's Day is a special exception, being such an important holiday.#nIt's meant to be a day people exchange chocolate to convey the feelings they carry in their hearts."
10009065-143 = "[ns] \"Does this mean...?\""
10009065-144 = "Yes! It was love at first sight!"
10009065-145 = "Since the moment we met, I've been longing for you in my heart, waiting for this day."
10009065-146 = "And now that we're alone at last, I can give you this chocolate to show you how I feel."
10009065-147 = "Heeheehee. I couldn't be any happier!"
10009065-148 = "[s] \"Everything that happened today...was to give me chocolate?\""
10009065-149 = "Yes, Sensei! ♥"
10009065-150 = "[s] \"...\""
10009065-152 = "[s1] \"Don't get me wrong. I'm grateful and all, but...\"\n[s2] \"I think you went a little too far, Wakamo!\""
10009065-153 = "Aw. I'm so glad you like it."
10009065-154 = "I knew I should have done something like this from the beginning.#nI could have confessed to you earlier!"
10009065-155 = "Heehee. Heeheehee."
10009065-156 = "[s3] \"I really do appreciate it, but...\""
10009065-157 = "Huh? What is it?"
10009065-158 = "[s4] \"I don't know how I feel about this.\""
10009065-159 = "How you feel...?"
10009065-160 = "[s5] \"This was the wrong way to go about it.\""
10009065-161 = "Wrong, you say?"
10009065-162 = "Wh-What?!"
10009065-163 = "[ns6] \"You caused a lot of trouble because of me.\""
10009065-165 = "[ns7] \"Don't you feel even a little remorseful?\""
10009065-167 = "[ns8] \"What you did today was wrong.\""
10009065-168 = "...!"
10009065-169 = "B-But, Sensei! Valentine's Day is supposed to be...!"
10009065-170 = "Today is when people are supposed to convey their true feelings to one another."
10009065-171 = "Everything I did today was to show you how I feel."
10009065-172 = "[s] \"I understand, but it can't come at the expense of others.\""
10009065-173 = "But I...!"
10009065-174 = "[s9] \"You're not the only one who had special plans today.\"\n[s10] \"Think of the bystanders whose special days you ruined.\""
10009065-175 = "I was only trying to...!"
10009065-176 = "I was only trying to...!"
10009065-177 = "[s] \"If you can't understand that, then I'm truly disappointed in you.\""
10009065-178 = "...!"
10009065-179 = "Y-You're...disappointed in me...?"
10009065-180 = "Everything I did was for you..."
10009065-181 = "...but it was wrong? I've...disappointed you?"
10009065-182 = "This can't be happening!"
10009065-183 = "I don't know what I'd do with myself if I made you hate me! *sob*"
10009065-184 = "[s] \"But I have faith that you can learn from this and be better.\""
10009065-185 = "...!"
10009065-186 = "You believe in me...? You don't hate me despite the mistakes I've made?"
10009065-187 = "[s11] \"I always believe in giving my students second chances.\"\n[s12] \"I couldn't hate one of my students. Just promise to do better.\""
10009065-192 = "I'm one of your students...?"
10009065-193 = "Ah...of course! I'll do better next time!"
10009065-194 = "Anything for you, Sensei!"
10009065-195 = "From now on, I won't do anything to disappoint you."
10009065-196 = "I'll follow the rules and be your best student!"
10009065-197 = "[s] \"Okay. Promise?\""
10009065-198 = "Yes! I promise! "
10009065-204 = "Oh, Sensei. My dearest Sensei! ♥"
10009065-208 = "And on that note, it would seem those interlopers are on their way here to interrupt our precious alone time again."
10009065-209 = "That's okay. We had time to make our promise together."
10009065-210 = "With that, I know I can endure the sadness of this temporary farewell.#nI'm sure of it."
10009065-211 = "Goodbye for now, my dearest Sensei."
10009065-212 = "[s] \"S-See you later?\""
10009065-213 = "Indeed. I'm looking forward to it. "
10009065-214 = "So long, my darling! ♥"
10009065-219 = "Sensei! Are you all right?!"
10009065-220 = "Fubuki, look! The Fox of Calamity is escaping!"
10009065-221 = "We can't let her get away! Do whatever it takes to catch her!"
10009065-223 = "And so the chase resumed, but I stayed back this time as all I could do was blankly stare at the chocolate Wakamo gave me."

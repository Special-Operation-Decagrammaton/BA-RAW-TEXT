[translation]
10009065-9 = "「七罪人」……是嗎。"
10009065-10 = "這次居然連逃出矯正局的消息都還沒傳來，就忽然現身了。果然不容小覷呢。"
10009065-14 = "但是，這次就是最後了。#n多虧老師的指揮，其他的問題兒童們已經無力抵抗，裝備也已經無效了。"
10009065-15 = "做好覺悟了嗎，災厄之狐。"
10009065-16 = "……！"
10009065-20 = "一知道被逼上絕境就選擇逃跑嗎？"
10009065-21 = "……好吧。不能再讓屍體…… "
10009065-22 = "不對，不能再讓傷患繼續增加了。既然如此就來個一對一吧。"
10009065-23 = "老師，我現在就去追擊災厄之狐。"
10009065-24 = "雖然附近已經清掃完畢，但可能還有問題兒童的漏網之魚。#n請老師儘快和女武神的學生會合。"
10009065-25 = "[s]「啊，瀬奈……！」"
10009065-30 = "（瀬奈以驚人的氣勢追向了若藻）"
10009065-31 = "（就在一時之間煩惱接下來該如何行動時）"
10009065-37 = "老師沒事吧！？有沒有受傷！？"
10009065-38 = "[s]「嗯，我沒事。千尋你呢？」"
10009065-39 = "……等等。難道你現在獨自一人？"
10009065-40 = "跟老師在一起的格黑娜的孩子呢？"
10009065-41 = "……一對一追擊？上當了……！"
10009065-42 = "[s]「……？」"
10009065-43 = "若藻的目標打從一開始就是這個。刻意擴大騷動，讓所有目光集中到自己身上……"
10009065-44 = "不，現在不是詳細說明的時候。老師，請冷靜地聽從我的指示。#n我駭入了老師附近的系統。"
10009065-45 = "[s]「駭入！？這麼輕鬆！？」"
10009065-46 = "我會透過監視器和紅綠燈，引導老師前往安全的區……"
10009065-47 = "…………師，…………通……………………"
10009065-48 = "……聽……心………………………………"
10009065-53 = "[ns]「通訊被……」"
10009065-54 = "（和千尋之間的通訊斷斷續續，正在煩惱接下來的行動時……）"
10009065-56 = "呵呵，終於找到了……♡"
10009065-57 = "[s]「……？」"
10009065-60 = "（與此同時，在別的地方……）"
10009065-65 = "「災厄之狐」在D.U.商店街地區出沒！請求本部支援！"
10009065-66 = "其他問題學生也大量出現，光靠現場人力完全無法……！"
10009065-67 = "這裡是D.U.西區！"
10009065-68 = "西區，終於連絡上了！正好，這邊需要支援……！"
10009065-69 = "從矯正局消失的「災厄之狐」出現在西區！請在事態失控之前盡快支援……！"
10009065-70 = "……咦！？"
10009065-75 = "重複，這裡是西區！若藻就出現在面前……！"
10009065-79 = "怎麼回事！？災厄之狐正在D.U.中央大道……！"
10009065-88 = "吹，吹雪！這是……！？"
10009065-89 = "啊啊真是的，到底是怎麼回事！難道這一切都是……！"
10009065-90 = "嗯，全部都是「偽裝」。#n若藻打從一開始，就是為了這個才會嘗試從矯正局逃獄的。"
10009065-91 = "為了避開所有人的視線，在不被任何人妨礙的情況下與老師對峙……！"
10009065-92 = "……你說什麼！？"
10009065-93 = "現在立刻聯絡老師……！"
10009065-94 = "沒辦法。我們的通訊全都被干擾了。"
10009065-95 = "災厄之狐，究竟是怎麼做到如此複雜的干擾……"
10009065-99 = "……啊。"
10009065-100 = "女武神學園真的沒問題嗎……"
10009065-101 = "不，現在不是說這些的時候。"
10009065-102 = "既然聯絡不上，就只有一種手段了。"
10009065-103 = "你，會開車吧？"
10009065-105 = "……我？"
10009065-107 = "呵呵……♡這樣一來，短時間內就無須擔心受到遠方的騷擾了。"
10009065-108 = "雖然是無意間搶來的東西，女武神警察學園的裝備還真便利呢。"
10009065-109 = "您不這麼覺得嗎，老師？"
10009065-110 = "[s]「若藻……」"
10009065-113 = "啊，我是多麼期盼著這個瞬間。"
10009065-114 = "真是，花了不少時間呢……閣下身邊一直都有人在，讓我費了一番功夫。"
10009065-115 = "真是，四處受人阻礙……"
10009065-116 = "思考、策劃了無數次。要怎麼做，才能夠接近閣下……"
10009065-117 = "如何才能不受任何人妨礙，像這樣站在閣下面前。"
10009065-118 = "[s]「為了這個才把女武神……？」"
10009065-119 = "呵呵。盡可能高調地引起騷動，讓視線集中在我身上。#n為了引人注意，必須盡力做得高調、華麗、強烈。"
10009065-120 = "鍥而不捨地嘗試後，總算成功了。我終於抵達了閣下身邊。"
10009065-121 = "啊啊，忍耐快要到達極限了……"
10009065-126 = "[ns]「……！」"
10009065-127 = "我的願望，終於要達成了……！"
10009065-132 = "老師，請您收下……"
10009065-133 = "[s]「……這是，巧克力？」"
10009065-134 = "是的♡這是只為閣下準備的，若藻的巧克力♡"
10009065-135 = "[s]「難道……」"
10009065-137 = "再怎麼說也是難得的情人節嘛。是個互相贈送巧克力，讓大家都感到幸福的節日。"
10009065-139 = "是的，畢竟情人節是重要的日子。#n是將彼此隱藏在心中的重要心情，轉化為實體的特別節日。"
10009065-143 = "[ns]「所以是因為……？」"
10009065-144 = "我對您是一見鍾情……"
10009065-145 = "若藻我，從見到閣下的第一眼開始……#n就一直深深愛戀著閣下，難以抑制心中滿溢的情感。"
10009065-146 = "於是我總算找到了……！"
10009065-147 = "能在兩人獨處的情況下將巧克力送給閣下的機會……！"
10009065-148 = "[s]「全部，都是為了把巧克力送給我……？」"
10009065-149 = "是的，老師♡"
10009065-150 = "[s]「……」"
10009065-152 = "[s1]「……我就心懷感激地收下了，我非常開心。」\n[s2]「但是做得太過火了！」"
10009065-153 = "啊啊……！您竟然願意對我這麼說……"
10009065-154 = "雖然是無可奈何，我真怨恨沒能早點行動的自己。#n否則就能再早一點，像這樣和閣下說話了……！"
10009065-155 = "呵呵，呵呵呵呵……"
10009065-156 = "[s3]「但是，若藻。」"
10009065-157 = "……？"
10009065-158 = "[s4]「你的這種做法會讓我很困擾，我覺得不太好唷。」"
10009065-159 = "咦……困，困擾，是嗎？"
10009065-160 = "[s5]「這種方法是不對的。」"
10009065-161 = "是，是不對的……？"
10009065-162 = "咦，咦咦……！？"
10009065-163 = "[ns6]「今天四處都發生了許多騷動。」"
10009065-165 = "[ns7]「很多人都因此受傷了。」"
10009065-167 = "[ns8]「這種作法，我覺得不太好。」"
10009065-168 = "……！？"
10009065-169 = "但，但是老師……！"
10009065-170 = "我聽說情人節，就是要將自己的心意率直且全力傳達的日子！"
10009065-171 = "我只是，想要傳達這份心意……！"
10009065-172 = "[s]「這點我真的很開心，但是會傷害他人的做法是不行的。」"
10009065-173 = "我，我……！"
10009065-174 = "[s9]「我想今天有很多人都懷抱著跟若藻一樣的想法。」\n[s10]「但是也許有人會因為你而失去那個機會。」"
10009065-175 = "……！"
10009065-176 = "……！"
10009065-177 = "[s]「如果你還是視而不見的話，我也沒辦法開心地收下你的心意。」"
10009065-178 = "……！？"
10009065-179 = "怎，怎麼會……？"
10009065-180 = "我只是，一心想著閣下……"
10009065-181 = "卻不能，讓您開心……？"
10009065-182 = "不，不行，這樣不行。"
10009065-183 = "那樣的話，要是，要是被閣下討厭的話，我就，我就……！"
10009065-184 = "[s]「……我相信若藻今後能想出不同的做法。」"
10009065-185 = "！！！"
10009065-186 = "您願意，相信我嗎……？#n不會討厭，犯了錯的我嗎……？"
10009065-187 = "[s11]「不會因為一次的錯誤就討厭你哦，若藻也是我重要的學生。」\n[s12]「希望你能答應我，今後會好好努力。」"
10009065-192 = "我是，老師……重要的，學生……"
10009065-193 = "啊，啊啊……當，當然，當然願意！是！一定，不，是必定會的！"
10009065-194 = "若藻我向閣下，向老師發誓！"
10009065-195 = "今後絕對……！"
10009065-196 = "只要是老師說不能做的事，無論如何都絕對不會做的……！"
10009065-197 = "[s]「那，約好了哦。」"
10009065-198 = "是，約好了……！"
10009065-204 = "啊啊，老師……我的老師……♡"
10009065-208 = "又有人想妨礙我和老師的寶貴時光了……"
10009065-209 = "但是……我和您約好了。與閣下交換的，彼此之間的約定……"
10009065-210 = "只要有了這個，即使必須再次於此分別，我也一定會堅持下去的。"
10009065-211 = "那麼，我很快就會再來迎接您的。老師。"
10009065-212 = "[s] 「啊，嗯……？」"
10009065-213 = "呵呵。我打從心裡期待著再次重逢的那一天。"
10009065-214 = "即使肉體彼此分離……我也會打從心底思念著閣下♡"
10009065-219 = "老師，沒事吧！？"
10009065-220 = "啊，吹雪，那邊！災厄之狐同學逃走了……！"
10009065-221 = "不準逃！給我站住────！"
10009065-223 = "（於是在重新開始的騷動中，只能呆呆地望著若藻送的巧克力好一陣子）"

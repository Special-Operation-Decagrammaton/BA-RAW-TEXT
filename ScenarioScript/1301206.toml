[translation]
1301206-1 = "#title;유치원에 간 경찰"
1301206-2 = "#Place;발키리 경찰학교 본관 앞"
1301206-3 = "#wait;2500"
1301206-4 = "3;키리노;01;어린이 여러분, 발키리 경찰학교에 오신 것을 환영합니다!\n#3;em;[반짝]\n#3;a"
1301206-5 = "3;키리노;03;본관은 오늘 여러분의 안내를 맡게 된 생활안전국의 키리노라고 합니다.\n#3;em;[재잘]\n#3;hophop"
1301206-6 = "#na;유치원 원생 A;에에~? 생활안전국? 어째서 경비국이나 수사국 학생이 아닌 거야?"
1301206-7 = "#na;유치원 원생 B;무시무시한 범죄자를 체포하는 이야기를 잔뜩 듣고 싶었는데……."
1301206-8 = "#na;유치원 원생 C;바보야, 경비국이나 수사국 학생들은 바쁘니까 대신 한가한 생활안전국 학생이 안내를 맡은 게 당연하잖아."
1301206-9 = "3;키리노;04;그, 그렇지 않습니다! 경비국만큼은 아니지만, 생활안전국에도 바쁜 일이 잔뜩 있다고요?\n#3;hophop"
1301206-10 = "3;키리노;09;분실물의 주인을 찾아 준다던가, 도심에 위험한 시설물은 없는지 정기 순찰을 한다던가……!"
1301206-11 = "#na;유치원 원생 A;그게 뭐야, 재미없어~."
1301206-12 = "#na;유치원 원생 B;생활안전국의 업무 같은 시시한 일에는 관심없다구~."
1301206-13 = "3;키리노;07;하, 하지만…… 그, 그게 그러니까…….\n#3;em;[땀]"
1301206-14 = "[s1] \"키리노, 당황하지 마.\"\n[s2] \"매뉴얼대로 안내를 시작해.\""
1301206-15 = "3;키리노;02\n#3;em;[반응]\n#wait;1000"
1301206-16 = "3;키리노;02\n#3;em;[반응]\n#wait;1000"
1301206-17 = "3;키리노;00;그, 그렇지! 여러분, 우선 본관을 따라와 주세요!"
1301206-18 = "3;키리노;03;건물 안내와 함께 발키리 경찰학교의 역사에 대해 설명드리겠습니다!\n#3;em;[음표]\n#3;hophop"
1301206-19 = "#all;hide"
1301206-20 = "3;키리노;01;이곳은 발키리 경찰학교의 학생들이 거주하는 기숙사의 입구입니다!\n#3;em;[반짝]\n#3;greeting\n#3;a"
1301206-21 = "3;키리노;01;대부분의 발키리 학생들은 사건이 터졌을 때 신속하게 대응할 수 있도록 교내에 있는 기숙사에 거주하고 있답니다."
1301206-22 = "3;키리노;99;여기 기숙사 입구에 있는 주춧돌에는 초대 회장님의 잠언을 새겨, 기숙사에 출입하는 학생들에게 경찰의 책무를 환기시키고, 또 자신을 돌아볼 수 있는 기회를 제공하고 있지요.\n#3;em;[음표]"
1301206-23 = "3;키리노;99;'경찰은 언제나 시민의 안전을 최우선으로 생각하고, 다른 학생들에게 봉사하는 마음으로 움직여야 하며…….'"
1301206-24 = "#na;유치원 원생 A;우우~ 재미없어~"
1301206-25 = "#na;유치원 원생 B;그런 따분한 잔소리가 뭐가 중요해?"
1301206-26 = "#na;유치원 원생 C;우리가 알고 싶은 건 멋지게 범인을 체포하는 방법이라고!"
1301206-27 = "3;키리노;04;하, 하지만 경찰의 책무를 확실히 알아두는 건 중요한 일이랍니다.\n#3;stiff\n#3;em;[땀]"
1301206-28 = "3;키리노;05;시민의 안전을 고려하지 않고 날뛰는 경찰은 범죄자와 다를 게 없으니까요!"
1301206-29 = "#na;유치원 원생 A;그런 건 괜찮으니까— 무시무시한 범인의 이야기나 들려줘!"
1301206-30 = "#na;유치원 원생 B;언니도 현장에 출동해서 총 쏴 본 적 있어?"
1301206-31 = "#na;유치원 원생 C;설마, 언니…… 생활안전국 학생이라고 총을 쏘지 못하는 건 아니겠지?"
1301206-32 = "3;키리노;07;그, 그럴 리가요! 정밀한 사격 솜씨는 부서를 막론하고 발키리 학생이라면 갖추어야 하는 기본 소양이랍니다!\n#3;em;[?!]\n#3;shake"
1301206-33 = "3;키리노;03;본관 역시도 지난 인질 사건 때 사격으로 사건을 해결했으니까요! 하, 하하……."
1301206-34 = "[s3] \"………….\"\n[s4] \"와아— 대단해—.\""
1301206-35 = "3;키리노;03\n#3;em;[...]\n#wait;2500"
1301206-36 = "3;키리노;05;(소근) 그, 그런 눈으로 쳐다보지 말아 주세요! 아이들이 의심하잖습니까!\n#3;em;[빠직]\n#3;hophop"
1301206-37 = "3;키리노;03\n#3;em;[...]\n#wait;2500"
1301206-38 = "3;키리노;05;(소근) 그, 그런 영혼 없는 반응을 보이지 말아주세요! 아이들이 의심하잖습니까!\n#3;em;[빠직]\n#3;hophop"
1301206-39 = "#na;유치원 원생 A;인질 사건 때 총을 쐈다고? 범인이 무섭지는 않았어?"
1301206-40 = "3;키리노;03;무, 물론 두려운 마음이 없지는 않았지만, 인질이 잡혀 있었기 때문에…….\n#3;em;[땀]"
1301206-41 = "#na;유치원 원생 B;생활안전국의 일이라고 해서 시시하게만 생각했는데…… 멋져!"
1301206-42 = "3;키리노;06;(우으…… 거짓말은 하지 않았다지만, 천진한 아이들을 속이려니 양심이 아프네요.)\n#3;stiff"
1301206-43 = "3;키리노;09;(하지만 덕분에 아이들의 주의가 돌아왔어요. 이대로라면 무사히 견학을 진행할 수 있겠네요.)"
1301206-44 = "#na;유치원 원생 A;언니, 그 허리춤에 찬 물병은 뭐야? 그것도 무기야?"
1301206-45 = "3;키리노;01;아, 이건 연막탄입니다. 수류탄만큼의 위력은 없지만, 상대의 시야를 가릴 수 있기 때문에 인질 작전 등을 진행할 때 효과적이지요.\n#3;em;[반응]"
1301206-46 = "3;키리노;00;지난 달 시바타운에서 발생했던 인질 사건 당시에도 이 연막탄이 중요한 역할을 했답니다!\n#3;hophop\n#3;em;[반짝]"
1301206-47 = "#na;유치원 원생 A;지난 달 시바타운에서 발생했던 사건이라면…… 중무장한 학생들이 푸딩 가게를 습격한 그 사건?"
1301206-48 = "#na;유치원 원생 B;언니도 그 작전에 참가했었구나!"
1301206-49 = "#na;유치원 원생 A;대단해! 멋져!"

1301206-53 = "3;키리노;00;이건 슈슈가 아니라 수갑이랍니다. 나쁜 범죄자를 움직이지 못하게 할 때 손에 채워 사용하지요."
1301206-54 = "3;키리노;09;이 수갑은 아주 튼튼해서 열쇠 없이는 빠져나올 수 없기 때문에, 사용할 때는 주의해야 해요."
1301206-55 = "#na;유치원 원생 C;정말? 잡아당기면 금세 풀릴 것처럼 생겼는데……."
1301206-56 = "3;키리노;00;그렇지 않아요. 보이지 않는 안쪽에 톱니가 채워져 있기 때문에 사람의 힘으로는 절대 해제할 수 없답니다!\n#3;hophop"

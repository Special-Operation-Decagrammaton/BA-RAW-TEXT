[translation]
1301206-1 = "Kindergarten Going Downtown"
1301206-2 = "Police School Entrance"
1301206-4 = "Hello, children! Welcome to Valkyrie Police School!"
1301206-5 = "I'm Kirino from the Public Safety Bureau, and I'll be your guide today."
1301206-6 = "How come you're not a Security or Investigation Bureau student?"
1301206-7 = "I wanted to hear a bunch of stories about arresting scary criminals..."
1301206-8 = "You dummy. The Security and Investigation Bureau students are busy. Of course they'd send someone from Public Safety. They have nothing better to do."
1301206-9 = "Th-That isn't true! Sure, we're not as busy as Security, but the Public Safety Bureau still has plenty on its plate!"
1301206-10 = "We find the owners of lost items and conduct regular patrols to find dangerous facilities in the city center!"
1301206-11 = "What the heck? That's so boring."
1301206-12 = "Who cares about your busywork?"
1301206-13 = "B-But... Well, the thing is..."
1301206-14 = "[s1] \"Don't allow yourself to get flustered, Kirino.\"\n[s2] \"Follow the manual and begin the tour.\""
1301206-17 = "R-Right! Everyone, follow me!"
1301206-18 = "I will guide you through the buildings and explain the history of Valkyrie Police School!"
1301206-20 = "This is the dorm where the cadets reside!"
1301206-21 = "Most Valkyrie students reside in the school dorms in order to quickly respond to every incident."
1301206-22 = "At the entrance, you'll find a cornerstone where the first president of the school's maxims are engraved. Students entering the building are imparted with their responsibilities as officers and given an opportunity for self-reflection."
1301206-23 = "\"It's the police's duty to think of the civilians' safety above all and treat your fellow students with a servant's heart.\""
1301206-24 = "Boo...! Boring!"
1301206-25 = "What's so important about this boring lecture?"
1301206-26 = "We want to know how to look cool when you take down bad guys!"
1301206-27 = "B-But understanding the responsibilities of the police is very important."
1301206-28 = "Officers that have no regard for the public's safety are no better than the criminals they're stopping!"
1301206-29 = "Yeah, okay. Now tell us stories about the scary criminals!"
1301206-30 = "Have you ever shot your gun at a crime scene?"
1301206-31 = "Let me guess. You're not even allowed to shoot your gun because you're with the Public Safety Bureau, huh?"
1301206-32 = "Th-That isn't true at all! Shooting is a basic skill that all Valkyrie students must have regardless of department!"
1301206-33 = "And it just so happens that I recently resolved a hostage situation with my gun! Hahaha..."
1301206-34 = "[s3] \"...\"\n[s4] \"You don't say?\""
1301206-36 = "(D-Don't look at me like that! The children might suspect something!)"
1301206-38 = "(T-Try not to sound so insincere! The children might suspect something)"
1301206-39 = "You fired your gun during a hostage situation? Weren't you afraid of the criminal?"
1301206-40 = "Well, of course I was scared, but they had a hostage..."
1301206-41 = "I always thought the Public Safety Bureau only did boring stuff, but that's so cool!"
1301206-42 = "(Technically, that wasn't a lie, but I still feel like I'm being dishonest with these innocent kids.)"
1301206-43 = "(At least I got their attention now. The field trip should go much smoother now.)"
1301206-44 = "So what's that bottle hanging from your waist? Is it another weapon?"
1301206-45 = "Oh, this? It's a smoke bomb. It's not as powerful as a grenade, but it comes in handy during hostage extractions because it obscures the culprit's vision."
1301206-46 = "In fact, it played an important part in the hostage case that happened last month in Shiba Town!"
1301206-47 = "You mean when those heavily armed schoolgirls infiltrated the pudding shop?"
1301206-48 = "Wow! So you were part of that?!"
1301206-49 = "Amazing! So cool!"
1301206-50 = "Ahaha..."
1301206-51 = "(To be fair, my smoke bomb didn't exactly help matters...)"
1301206-52 = "What about those scrunchies you have?"
1301206-53 = "These aren't scrunchies—they're handcuffs. I use them to arrest criminals by placing them around their wrists."
1301206-54 = "There's no hope of getting out of them without a key, so you have to be very careful when using them."
1301206-55 = "Really? They look like they could fall apart just by tugging at them..."
1301206-56 = "Not at all. It has hidden gears on the inside that make it impossible to loosen them by hand!"
1301206-57 = "Why don't I show you with a demonstration?"
1301206-58 = "First, you restrict and immobilize the criminal and cuff one arm..."
1301206-61 = "...then you loop the other end of the handcuffs around a sturdy structure and cuff the other arm."
1301206-64 = "Ta-da! They've been apprehended!"
1301206-70 = "As you can see, there's no escaping once a criminal has been apprehended."
1301206-71 = "Wow, that's awesome!"
1301206-72 = "This is the first time I've ever seen anyone use handcuffs!"
1301206-73 = "Haha. I'm glad they're such a hit."
1301206-74 = "Now, time to use the key to undo the handcuffs..."
1301206-75 = "Wh-What the...?"
1301206-81 = "(M-My hand slipped and I lost the key for the handcuffs!)"
1301206-82 = "(And to make matters worse, it rolled into the sewers!)"
1301206-83 = "Hey, what's wrong? Is there some kind of problem?"
1301206-84 = "Uh. Um, well..."
1301206-87 = "― (Wh-What should I do...?)[wa:810] "
1301206-89 = "― (Hngh, hmph!  It won't...come off?!)[wa:2170] "
1301206-92 = "[ns] \"Don't tell me you lost the key.\""
1301206-93 = "― H-Huh? No, no![wa:920] "
1301206-95 = "― An upstanding officer like me would never lose the key![wa:1870] "
1301206-98 = "― This is just a, uh...[wa:960] "
1301206-100 = "― It's an escape training demonstration![wa:10] "
1301206-103 = "― Just in case you find yourself wrongfully placed in handcuffs.[wa:10] "
1301206-105 = "― Yours truly will show you how to escape![wa:420] "
1301206-108 = "[ns] \"Are you allowed to share that kind of info with the public?\""
1301206-109 = "― Don't fret! I'm a trained police officer![wa:1370] "
1301206-111 = "― This is nothing for someone like me![wa:10] "
1301206-114 = "― Ghhhhhh! Ahhhhhh! *sigh*[wa:1550] "
1301206-117 = "― What did I do to deserve this...?[wa:10] "
1301206-119 = "― Please...save me Sensei...[wa:680] "
1301206-122 = "Kirino remained locked in her handcuffs until another Valkyrie student arrived to lend her some help."
1301206-127 = "*sigh* Today's field trip was a total failure..."
1301206-128 = "I spent half the day sitting around handcuffed like a lowly criminal instead of showing the students how cool the police can be."
1301206-129 = "What kid would ever look up to the police as role models after that?"
1301206-130 = "[s5] \"It's going to be okay.\"\n[s6] \"You did the best you could, Kirino.\""
1301206-131 = "But..."
1301206-132 = "But..."
1301206-133 = "Miss Officer!"
1301206-134 = "You're one of the students from the field trip. Is something wrong?"
1301206-135 = "I wanted to thank you for being our guide. I had a lot of fun!"
1301206-136 = "But...I messed everything up today."
1301206-137 = "I didn't even get to show you all the great things that Valkyrie Police School has to offer, and you watched me embarrass myself on top of that..."
1301206-138 = "But that only happened because you were answering our questions."
1301206-139 = "It was so cool how you answered everything we asked, no matter how trivial!"
1301206-140 = "The older girls at the other schools we went on field trips to didn't even give us the time of day because we're little kids."
1301206-141 = "I want to grow up to become a nice police officer just like you some day!"
1301206-145 = "Wow... That's so sweet of you!"
1301206-146 = "I, Kirino, solemnly swear that I'll always do my best to protect and serve the public and treat them with respect!"
1301206-147 = "[s] \"I'm glad they had a good time.\""
1301206-148 = "Me too. I'm grateful they could tell how sincere I was."
1301206-149 = "But still, mistakes were made. I still have a lot to learn if I want to avoid repeating those mistakes again."
1301206-150 = "I'm going to work real hard on my escape training so I can free myself right away the next time I lose the key to my handcuffs!"
1301206-151 = "[s] \"Is that really what you need to improve on?\""

[translation]
1301206-1 = "Iron Connection"
1301206-2 = "女武神警察學園．本館前"
1301206-4 = "各位小朋友，歡迎來到女武神警察學園！"
1301206-5 = "本官是今天負責替各位解說的，生活安全局的桐乃。"
1301206-6 = "咦咦～，生活安全局～？怎麼不是警備局或是搜查局呢～？"
1301206-7 = "人家想聽逮捕可怕罪犯的故事耶……"
1301206-8 = "笨蛋，警備局或搜查局的學生都很忙，當然是由比較閒的生活安全局負責呀。大人們都有些難言之隱。"
1301206-9 = "不，不是那樣的！雖然比不上警備局，但生活安全局也一樣要每天從早忙到晚喔……！"
1301206-10 = "要幫市民尋找失物、還要上街巡邏確認是否有什麼危險……！"
1301206-11 = "那是什麼真普通～"
1301206-12 = "沒有更華麗的工作嗎～？"
1301206-13 = "那，那個，華麗的工作，是嗎……？"
1301206-14 = "[s1] 「桐乃，不要慌張。」\n[s2] 「一直待在原地也不好玩，先帶小朋友進去參觀吧。」"
1301206-17 = "說，說得也是呢！那麼各位，請跟著本官！"
1301206-18 = "本官會先帶各位去參觀建築物，並講解女武神警察學園的歷史！"
1301206-20 = "這個地方是女武神警察學園的學生進行生活起居的宿舍！"
1301206-21 = "大部分的女武神學生為了在發生事件時能迅速應對，都會在學校宿舍生活。"
1301206-22 = "宿舍入口刻有第一任學生會長的訓言。讓學生每次進出宿舍時，都能重新記住自己的職責，並省思自己的行為。"
1301206-23 = "就如同訓言所寫的：「警察要隨時以市民的安全為優先，站在服務其他學生的立場──"
1301206-24 = "好無聊～"
1301206-25 = "不好玩～"
1301206-26 = "我們想知道能帥氣逮捕罪犯的方法～！"
1301206-27 = "但，但是，先從理念開始理解是非常重要的……"
1301206-28 = "比方說如果有警察不顧市民安全而濫用權利任意妄為，那不就跟和罪犯沒有兩樣嗎？"
1301206-29 = "那種事別管了啦，我們想聽大姊姊目前為止有遇到什麼事件！"
1301206-30 = "大姊姊也有在現場開槍過嗎？"
1301206-31 = "該不會大姊姊因為是生活安全局的，所以沒辦法開槍吧？"
1301206-32 = "怎，怎麼可能？精密的射擊技術是每位女武神學生的必備技術！不管隸屬哪個部門都一樣！"
1301206-33 = "而且本官前陣子，才在一場挾持人質的事件中靠著射擊解決事件的……！"
1301206-34 = "[s3] 「……」\n[s4] 「好厲害哦～真不愧是～」"
1301206-36 = "（不，不要用那種眼神看我啦老師……！小朋友們在懷疑了……！）"
1301206-38 = "能請你稱讚時多帶點感情嗎！？"
1301206-39 = "在人質事件中開槍？妳不會害怕嗎……？"
1301206-40 = "是的，當然一想到狀況如果有什麼差錯，確實會讓人害怕，但最重要的還是救出人質。"
1301206-41 = "好厲害……本來知道今天是生活安全局時還覺得好失望，大姊姊太帥了！"
1301206-42 = "（雖，雖然沒有說謊……但莫名覺得良心不安……）"
1301206-43 = "（不過好歹有引起小朋友們的興趣……這樣應該就能順利進行參觀了）"
1301206-44 = "大姊姊，妳腰上這些是什麼呢？那也是武器嗎？"
1301206-45 = "啊，這些是煙霧彈。雖然威力不如手榴彈，但能影響對方的視線，所以要救援人質的時候相當有效果。"
1301206-46 = "上個月在芝町發生的人質事件，就是使用這類煙霧彈解決的！"
1301206-47 = "上個月的芝町……是全副武裝的學生襲擊布丁店的事件！？"
1301206-48 = "是大姊姊解決那個事件的嗎！？"
1301206-49 = "真厲害！太帥了！"
1301206-50 = "啊，啊哈哈……"
1301206-51 = "（雖然解決事件的煙霧彈不是我丟的……但「用煙霧彈解決事件」這點是事實……）"
1301206-52 = "那旁邊這個髮圈呢？"
1301206-53 = "這不是髮圈喔，這是手銬。抓到兇惡罪犯之後，就要把這個戴在罪犯手上讓罪犯無法動彈。"
1301206-54 = "當然，為了不讓罪犯逃走，這個手銬很牢固，沒有鑰匙就無法解開，所以使用時必須多加注意。"
1301206-55 = "真的嗎？看起來一拉就會鬆開的樣子……"
1301206-56 = "看起來或許會這麼覺得，但其實它的內側有齒輪，一般人的力氣是絕對解不開的！"
1301206-57 = "既然都提到了，那就讓你們看一下手銬實際使用的狀況吧。"
1301206-58 = "首先，壓制罪犯讓對方無法動彈，然後把手銬套在一隻手上。"
1301206-61 = "接著打開另一邊的手銬，根據現場狀況繞過附近的固定物……再套住另一隻手……"
1301206-64 = "好了，逮捕完畢！這下罪犯就動不了了！"
1301206-70 = "就如各位所見，手銬完全解不開對吧？要不要碰碰看？"
1301206-71 = "哇～，好厲害～！"
1301206-72 = "這是我第一次看到真的手銬！"
1301206-73 = "呵呵，大家都很高興，真是太好了。"
1301206-74 = "那我現在要解開手銬了……啊咧，鑰匙在……啊，有了，嘿咻……"
1301206-75 = "唔啊！？"
1301206-81 = "（啊！手一滑，手銬的鑰匙！？）"
1301206-82 = "（偏偏掉進了排水孔裡……！？）"
1301206-83 = "嗯～？大姊姊怎麼了嗎？"
1301206-84 = "那，那個啊……就是說……"
1301206-87 = "― （怎，怎麼辦才好……！）[wa:1330] "
1301206-89 = "― （呼嗯，嗯……！打， 打不開……！）[wa:2890] "
1301206-92 = "[ns] 「吶，桐乃。我如果沒看錯的話，鑰匙剛剛是不是掉進排水孔……」"
1301206-93 = "― ……咦？沒，沒有沒有！[wa:1040] "
1301206-95 = "― 好歹也是隸屬於警察的本官，怎麼可能把鑰匙弄丟呢！[wa:3110] "
1301206-98 = "― 所，所以說，這只是……[wa:1360] "
1301206-100 = "― 在，在做逃脫訓練的演練而已！[wa:910] "
1301206-103 = "― 為了以防萬一發生意外的事態，而被拘束的時候……[wa:1490] "
1301206-105 = "― 從現在開始，本官要示範逃脫的方法！[wa:1340] "
1301206-108 = "[ns] 「……真的沒問題嗎？」"
1301206-109 = "― 請放心！只要是像本官這樣有確實累積訓練的人，[wa:2130] "
1301206-111 = "― 這種程度輕而易舉！[wa:560] "
1301206-114 = "― 咕唔唔唔……！呼呣呣呣呣呣呣……！[wa:1830] "
1301206-117 = "― ……對不起。"
1301206-119 = "― 請幫幫我，老師……[wa:1360] "
1301206-122 = "（後來，直到其他女武神學生剛好經過來幫忙為止，桐乃有好一段時間都被手銬困住，成了幼稚園學童們的笑柄）"
1301206-127 = "唔……搞砸了……"
1301206-128 = "別說要讓小朋友看見警察的英姿，竟然還在大庭廣眾下被自己的手銬困住……這下反而跟罪犯沒有兩樣……"
1301206-129 = "一定沒有小朋友看見這種情景還會夢想成為警察吧……"
1301206-130 = "[s5] 「沒關係的。」\n[s6] 「今天辛苦了。好了，把臉抬起來。」"
1301206-131 = "但是……"
1301206-132 = "但是……"
1301206-133 = "大姊姊！"
1301206-134 = "咦……大家怎麼都還沒回去啊……？"
1301206-135 = "今天謝謝大姊姊！看到了好多東西，好好玩唷！"
1301206-136 = "啊……但，但是本官今天一直犯錯……"
1301206-137 = "沒能充分展現女武神警察學園學生帥氣的一面就算了，最後還在大家面前出糗……"
1301206-138 = "不會呀，我們有學到手銬是真的很牢固！"
1301206-139 = "而且我們亂問問題的時候，大姊姊都會理我們，我們真的覺得很開心！"
1301206-140 = "其他學園的大姊姊，不管我們講什麼幾乎都沒有反應！"
1301206-141 = "我以後也要像大姊姊一樣，當一個親切的警察！"
1301206-145 = "各，各位……真的很感謝……！"
1301206-146 = "不才中務桐乃！往後也將謙恭虛己，與各位站在同樣的角度。並努力成為能夠確實守護各位的優秀警察！"
1301206-147 = "[s] 「大家有了解你的熱情，真是太好了。」"
1301206-148 = "是的……而且小朋友們也都有專心聽講，這也讓本官非常開心。"
1301206-149 = "話雖如此，失誤就是失誤。為了避免犯下相同的錯誤，必須把今天的事當作教訓進行反省。"
1301206-150 = "本官會努力進行逃脫訓練，這樣下次就算弄丟鑰匙，也能掙脫手銬！"
1301206-151 = "[s] 「……這努力的方向不太對吧？」"

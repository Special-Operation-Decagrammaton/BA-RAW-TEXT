10015020-20 = "3;치히로;05\n5;마키;00;앗, 선배. 마침 잘 왔어. 방금 세미나 집무실의 폐쇄회로 감시장치를 해킹하고 있었거든.\n#3;m1\n#5;al\n#5;em;[반응]"

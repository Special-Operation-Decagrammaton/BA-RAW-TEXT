[translation]
10015020-1 = "Episode 2; The Millennium Hackers"
10015020-7 = "Veritas Hackers' Lounge"
10015020-8 = "Kotama... Do you hear anything yet?"
10015020-9 = "Nothing. I'll keep scanning the frequency band."
10015020-10 = "Really? I would've expected something by now. How's the drone looking, Hare?"
10015020-11 = "Looking like...nothing."
10015020-12 = "Maybe there's just no one there."
10015020-13 = "No way. We should try bypassing the proxy again."
10015020-19 = "...What is going on here?"
10015020-20 = "Just the person we needed! We're hacking the monitoring equipment in the Seminar Executive Office."
10015020-21 = "...Why?"
10015020-22 = "Hare was buying some more energy drinks, and guess who she sees? [USERNAME] Sensei following Yuuka into the office!"
10015020-23 = "We immediately formed a hypothesis on why a student and a teacher would enter a room alone at night."
10015020-24 = "They must be doing something fun! ...I mean, suspicious!"
10015020-25 = "We at Veritas are the protectors of truth and seekers of knowledge! It was my duty to investigate."
10015020-26 = "So...can you help us hack the system, Chihiro? Pretty please?"
10015020-27 = "*sigh*"
10015020-28 = "Your hypothesis is incorrect. The Halo Festival is tomorrow. It makes perfect sense for Sensei to be visiting Seminar."
10015020-29 = "Don't create narratives to suit your own needs, Maki."
10015020-30 = "B-But..."
10015020-31 = "Furthermore, I've told you time and time again. Caution and care. I was impressed when you found the key by going through the dump files, but you left your fingerprints all over when you erased the logs."
10015020-32 = "I knew you reckless kids were attacking the CCTV server an hour ago. The alarms went off pretty much as soon as you began."
10015020-33 = "I know it takes more work, but you need to use a logic bomb before erasing the logs. It's about the details, Maki, the details."
10015020-34 = "Ah, darn. I totally forgot."
10015020-35 = "Oh my... Ugh! I also forgot that you're the one who manages the CCTV servers!"
10015020-36 = "...I am Millennium's security advisor, you know. A fact you three constantly forget."
10015020-40 = "Enough of that, you learned your lesson. Aren't you all going to the field day?"
10015020-42 = "The Halo Festival stuff? Us? Seriously?"
10015020-43 = "I will never participate in a festival hosted by Seminar! Although, I guess I could go to plant some wire taps..."
10015020-44 = "I don't like exercise. End of story."
10015020-46 = "...I shouldn't have asked."
10015020-47 = "I get that it's weird and that we're not on the best terms with the student council."
10015020-48 = "But this isn't Seminar's event. It's by the students and for the students, regardless of their club or academy."
10015020-49 = "Would it kill you three to leave your computers and drones for one festival? Get some fresh air?"
10015020-51 = "How kind of you to say. And I agree! The Halo Festival is meant for anyone and everyone."
10015020-53 = "[USERNAME] Sensei? Noa? H-How did you sneak in here?!"
10015020-55 = "Thank you for the warm welcome. It seems my reputation precedes me."
10015020-60 = "[ns] \"Hey. It's been a while.\""
10015020-61 = "This is a duo I wasn't expecting to see together."
10015020-62 = "And what's a fancy Seminar executive doing down here? At this time of night?"
10015020-63 = "Late at night...with just Sensei..."
10015020-65 = "I promise whatever your thinking isn't right. Heehee."
10015020-66 = "And I don't want to interfere with whatever it is you're up to. I'm here to ask for help."
10015020-67 = "You? Asking us? For help?"
10015020-68 = "As you were discussing earlier, the Kivotos Halo Festival hosted by your very own school begins tomorrow."
10015020-69 = "While Seminar has done our utmost to ensure the event is a resounding success, we can hardly account for everything."
10015020-70 = "Unfortunately, in these last hours leading up to the event, a series of incidents has rendered Yuuka completely exhausted from managing them."
10015020-72 = "Yuuka does work like a maniac, non-stop, all the time..."
10015020-73 = "Seriously! She should get some rest before the actual event!"
10015020-75 = "We're in complete agreement. That's why I need you. While Yuuka rests, I need someone to process and send out the last of the data she was sorting through."
10015020-76 = "Naturally, Veritas' club members are the best fit for this job."
10015020-79 = "Heehee! I guess she does have some sense! Nobody's better than us when it comes to computers."
10015020-80 = "...I was expecting something way worse."
10015020-81 = "You're just...handing over data? I guess at least I won't need to install RF transmission modules in every building anymore."
10015020-82 = "[s] \"What on earth were you trying to do...?\""
10015020-84 = "Don't ask. We can do it, Noa. It's an easy task for us."
10015020-85 = "But is it really okay for Seminar to be coming to us for help?"
10015020-86 = "I wouldn't want to be within a hundred feet of President Rio if she found out an unauthorized club like Veritas was a part of the preparations for the Halo Festival of all things."
10015020-87 = "I wouldn't want to be either!"
10015020-88 = "I'm well aware of President Rio's feelings about President Himari. And vice versa."
10015020-89 = "But let's not over-complicate things with politics."
10015020-90 = "Consider this a request from me, Noa. Not from Seminar."
10015020-91 = "I would never try to force you to cooperate with Seminar, but...wouldn't you feel even a teeny, tiny bit guilty turning down a desperate student in need?"
10015020-96 = "You sure know how to paint a picture."
10015020-97 = "I don't think President Rio will approve, but it's not like my adorable protégés have personally done anything wrong. I don't see why they shouldn't get to participate in the festival in some form."
10015020-98 = "Heehee. Thank you for being a good sport."
10015020-99 = "So? What's the data?"
10015020-100 = "Yuuka compiled everything in a list here. Take a look."
10015020-105 = "Let's see... She just needs an inventory of current equipment and...to put together athlete rosters to send out to the schools."
10015020-110 = "That should be relatively simple."
10015020-111 = "I'll make a macro to process all the data at once and organize it into quantities. We'll do a check of the actual equipment inventory to compare, and that should be it."
10015020-112 = "Heehee. I knew you were the ones for the job."
10015020-117 = "Oh, before I forget. There was one thing bothering me earlier."
10015020-124 = "I took a break earlier, and just in that short time there were several malicious attacks on Millennium's server."
10015020-126 = "Really? What kind of attacks?"
10015020-127 = "They were trying to crack the passwords to intercept packets and forge data...and plant viruses. Don't worry, they were childish attempts at best. Our firewall blocked it."
10015020-128 = "The thing that bothered me about it was that all their attacks were focused on equipment and facilities we need for the field day. It felt deliberate."
10015020-129 = "Another coincidence..."
10015020-130 = "The president of the Engineering Department mentioned something of a similar nature earlier."
10015020-131 = "I've never been a big believer of coincidences."
10015020-132 = "I reverse tracked the attacker's IP, and the signal came from within the school. A Millennium student is trying to disrupt the festival, I think. "
10015020-133 = "Oh, my..."
10015020-134 = "We don't know what could happen tonight, so please be careful, Sensei."
10015020-135 = "Haha! Ensuring visitors' safety is Seminar's absolute, top priority. It's laughable anything would happen to them."
10015020-136 = "I'll be by [USERNAME] Sensei's side every second they're here. Don't worry."
10015020-138 = "I won't, then. Keep them safe."
10015020-139 = "Heehee. I don't take your trust lightly."
10015020-140 = "Well, there's much to be done before the big day! Thank you for handling this."
10015020-145 = "All right. Let's get to it."
10015020-146 = "Maki, I need you to organize the athlete rosters based on which events they'll be participating in, please."
10015020-147 = "Already done! Look at how neat my tables are!"
10015020-148 = "It's this file right here."
10015020-149 = "You already organized it? I haven't even seen you sit down at your computer yet."
10015020-150 = "I, um, totally predicted this might happen, so I actually already made the athlete rosters a few days ago... Yup, that's definitely why I did it."
10015020-152 = "Translation: making rosters of students from different schools sounded like a fun and rare opportunity."
10015020-153 = "So, I took a bunch of personal data along with some fun facts about students from every school!"
10015020-157 = "...To summarize, you stole personal information without the administrator's permission?"
10015020-158 = "I was hoping to avoid this... But you three need another ethics lesson. Right now."
10015020-159 = "B-B-But, it kinda ended up being super helpful in the end, right?"
10015020-160 = "Please! Have mercy! For once in my life!"

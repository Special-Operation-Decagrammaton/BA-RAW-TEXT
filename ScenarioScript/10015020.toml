[translation]
10015020-1 = "ตอนที่2;แฮ็กเกอร์แห่งมิลเลเนียม"
10015020-7 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
10015020-8 = "...รุ่นพี่โคทามะ ได้ยินเสียงอะไรมั้ย?"
10015020-9 = "กำลังสแกนคลื่นความถี่... ตอนนี้ยังไม่พบแนวโน้มอะไรที่ผิดปกติ"
10015020-10 = "อืม แปลกจัง... รุ่นพี่ฮาเระล่ะ? กล้องโดรนตรวจพบอะไรได้บ้างมั้ย?"
10015020-11 = "อืม ภาพจากกล้องทางนี้ก็ไม่มีอะไรผิดปกติเหมือนกัน"
10015020-12 = "เหมือนจะไม่มีใครอยู่ที่ห้องสำนักงานเซมิน่าเลยนะ..."
10015020-13 = "ไม่น่าเป็นไปได้นะ ถ้างั้นเราเอาพร็อกซี่วนดูอีกรอบดีมั้ย...?"
10015020-19 = "...ทำอะไรกันอยู่น่ะ?"
10015020-20 = "อ๊ะ รุ่นพี่ มาพอดีเลย เมื่อกี๊ฉันเพิ่งแฮ็กเข้าไปในระบบกล้องวงจรปิดของห้องสำนักงานเซมิน่าน่ะ"
10015020-21 = "ห้องสำนักงานเซมิน่าเหรอ...? ทำไมจู่ๆ ถึงทำแบบนั้นล่ะ?"
10015020-22 = "คือว่า เมื่อกี๊รุ่นพี่ฮาเระออกไปซื้อเครื่องดื่มชูกำลังที่ร้านสะดวกซื้อ แล้วบังเอิญเห็นคุณครู [USERNAME] กับรุ่นพี่ยูกะกำลังเดินกลับมาที่ห้องสำนักงานเซมิน่ากันน่ะ"
10015020-23 = "ไม่น่าเชื่อเลยว่าคุณครูกับนักเรียนจะหลบสายตาผู้คนแล้วมาเจอกันตอนกลางค่ำกลางคืนแบบนี้..."
10015020-24 = "คงจะทำเรื่องสนุกๆ กันสองคน... ไม่สิ ต้องกำลังวางแผนอะไรที่น่าสงสัยอยู่แน่ๆ"
10015020-25 = "ในฐานะสมาชิกของเวอริทัสที่มีหน้าที่พิทักษ์ความจริงและสืบค้นความรู้ ฉันอยู่เฉยๆ ไม่ได้หรอก"
10015020-26 = "เอาละ รุ่นพี่จิฮิโระก็มาช่วยกันแฮ็กเถอะ!"
10015020-27 = "เฮ้อ..."
10015020-28 = "ถ้าคุณครูจากชาเล่ต์มาเจอกับนักเรียนของมิลเลเนียมในช่วงนี้ ก็คงจะเป็นเพราะเรื่องงานมหกรรม#nแข่งขันกีฬาที่จะจัดขึ้นในวันพรุ่งนี้ยังไงล่ะ"
10015020-29 = "คาดเดาเรื่องที่เกินขอบเขตไปมันไม่ดีนะ มากิ"
10015020-30 = "แต่ว่า..."
10015020-31 = "แล้วก็นะมากิ ที่บอกว่าแฮ็กเซิร์ฟเวอร์เมื่อกี๊น่ะ การที่พยายามหาคีย์ส่วนตัวโดยเข้าไปค้นที่ดัมพ์ไฟล์ก็#nถือว่าพยายามได้ดี แต่ระวังอย่าให้หลงเหลือร่องรอยเอาไว้ด้วยล่ะ"
10015020-32 = "เมื่อ 1 ชั่วโมงก่อนมีสัญญานเตือนแจ้งว่าเซิร์ฟเวอร์ CCTV ถูกบุกรุกดังขึ้นด้วย"
10015020-33 = "ถ้าเป็นฉันคงจะระเบิดบอมบ์ลอจิกก่อนที่จะลบบันทึกข้อมูลน่ะ"
10015020-34 = "อ่า จริงด้วย ลืมไปเลย..."
10015020-35 = "เอ๊ะ? หมายความว่ารุ่นพี่เป็นคนดูแลเซิร์ฟเวอร์ CCTV ของเซมิน่าอยู่เหรอ?"
10015020-36 = "...ทำไมพวกเธอถึงได้ลืมอยู่เรื่อยเลยล่ะว่าฉันเป็นคนรับหน้าที่ดูแลระบบรักษาความปลอดภัยของ#nมิลเลเนียมน่ะ?"
10015020-40 = "...จะว่าไปแล้ว พวกเธอจะไม่เข้าร่วมงานมหกรรมแข่งขันกีฬาครั้งนี้เหรอ?"
10015020-42 = "งานมหกรรมแข่งขันกีฬา? ทำไมพวกเราต้องทำอะไรด้วยล่ะ?"
10015020-43 = "ถ้าเป็นการไปดักฟังก็ไม่แน่ แต่ถ้าจะให้เข้าร่วมงานเทศกาลที่จัดโดยเซมิน่าก็ต้องขอปฏิเสธค่ะ"
10015020-44 = "อีกอย่างถ้าให้ไปทำกิจกรรมออกกำลัง ขอผ่านดีกว่า..."
10015020-46 = "...คิดไว้แล้วว่าต้องเป็นแบบนี้"
10015020-47 = "แน่นอนว่าการที่พวกเราที่ไม่ได้มีความสัมพันธ์อันดีกับประธานสภานักเรียน จะให้ไปเข้าร่วมกิจกรรมที่#nจัดโดยสภานักเรียน มันก็คงจะดูแปลกๆ..."
10015020-48 = "ถึงงานมหกรรมแข่งขันกีฬานี้จะเป็นกิจกรรมที่จัดโดยเซมิน่า แต่ก็ยังเป็นเทศกาลแห่งความสงบสุขที่#nนักเรียนทุกสถาบันทั่วคิโวทอสมาเข้าร่วมด้วย"
10015020-49 = "ฉันคิดว่าถ้าทุกคนลืมสังกัดตัวเองไปสักพัก แล้วมาสนุกกับงานเทศกาลก็คงจะดีนะ..."
10015020-51 = "ฉันก็คิดแบบนั้นเหมือนกันค่ะ ฮาโลเฟสติวัลเป็นกิจกรรมที่ทุกคนสามารถสนุกด้วยกันได้โดยไม่มีการ#nแบ่งแยกค่ะ"
10015020-53 = "คุณครู [USERNAME] กับรุ่นพี่โนอา...? มาตั้งแต่เมื่อไรกันน่ะ?"
10015020-55 = "สวัสดีทุกคนนะคะ เลขาของเซมิน่า อุชิโอะ โนอาค่ะ"
10015020-60 = "[ns] \"ว่าไงทุกคน ไม่เจอกันนานเลยนะ\""
10015020-61 = "คุณครู [USERNAME] กับรุ่นพี่โนอา... เป็นคู่ที่คาดไม่ถึงเลยนะเนี่ย"
10015020-62 = "ดึกดื่นแบบนี้คณะกรรมการของเซมิน่ามีธุระอะไรที่ห้องชมรมของเวอริทัสเหรอ?"
10015020-63 = "ถึงขนาดที่ต้องพาคุณครูของชาเล่ต์มาด้วย..."
10015020-65 = "ฮุฮุ ไม่ต้องกังวลไปหรอกค่ะ"
10015020-66 = "ฉันไม่ได้มาขัดขวางการทำงานของทุกคนหรอกค่ะ แต่จะมาขอความช่วยเหลือบางอย่างน่ะค่ะ"
10015020-67 = "ขอความช่วยเหลือ...?"
10015020-68 = "ทุกท่านคงจะทราบดีค่ะว่าฮาโลเฟสติวัลที่จะจัดขึ้นที่โรงเรียนมิลเลเนียมของพวกเรากำลังจะเริ่มขึ้นใน#nวันพรุ่งนี้แล้ว"
10015020-69 = "ทางเซมิน่าได้ทุ่มเทและพยายามเตรียมการหลายอย่างเพื่อให้กิจกรรมครั้งนี้สมบูรณ์แบบภายในเวลา#nที่กำหนด..."
10015020-70 = "แต่ก็โชคร้ายที่มีทั้งอุบัติเหตุใหญ่และเล็กเกิดขึ้นอย่างต่อเนื่องในขณะที่วันพิธีเปิดใกล้เข้ามา ทำให้ยูกะจังที่คอยเก็บกวาดต้องเหนื่อยล้ามากค่ะ"
10015020-72 = "ก็นะ ปกติรุ่นพี่ยูกะก็ทำงานหนักอยู่ตลอดเลยนี่..."
10015020-73 = "ก็เลยคิดว่าจะใช้โอกาสนี้ให้ยูกะได้พักผ่อนอย่างนั้นสินะ"
10015020-75 = "ค่ะ ฉันเองก็อยากจะฝากงานการประมวลข้อมูลของ <ฮาโลเฟสติวัล> ที่ยูกะจังเป็นคนรับผิดชอบใน#nตอนแรกให้นักเรียนคนอื่นทำอยู่หรอกนะคะ..."
10015020-76 = "แต่การจะหานักเรียนที่มีความสามารถในการประมวลข้อมูลของกิจกรรมขนาดใหญ่แบบนี้ ก็นึกถึงใคร#nไม่ออกนอกจากสมาชิกของเวอริทัสน่ะค่ะ"
10015020-79 = "ฮึฮึ มันก็แน่อยู่แล้วสิ ที่มิลเลเนียมคงไม่มีชมรมอื่นที่เชี่ยวชาญเรื่องคอมพิวเตอร์มากไปกว่าเวอริทัสอีก#nแล้วละ!"
10015020-80 = "...เป็นคำขอที่ง่ายกว่าที่คิดเอาไว้อีกนะเนี่ย"
10015020-81 = "แบบนี้ก็ไม่ต้องไปติดตั้งโมดูลส่งสัญญาน RF ตรงทุกอาคารในมิลเลเนียมแล้วสินะ"
10015020-82 = "[s] \"พวกเธอคิดจะทำอะไรกันน่ะ...?\""
10015020-84 = "...ก็อย่างที่พวกสมาชิกบอกน่ะ จะให้เราช่วยเรื่องประมวลข้อมูลมันไม่ใช่เรื่องยากอะไรหรอก"
10015020-85 = "แต่ว่าการที่ 'คณะกรรมการของเซมิน่า' มาขอร้องเวอริทัสแบบนี้มันจะไม่เป็นอะไรเหรอ?"
10015020-86 = "การเตรียมงาน <ฮาโลเฟสติวัล> ที่มีหน้าตาของมิลเลเนียมเป็นประกัน มาขอให้เวอริทัสช่วยแบบนี้ ถ้าไปถึงหูประธานริโอะเข้า คงจะไม่พอใจมากแน่ๆ"
10015020-87 = "อาจจะเป็นแบบนั้นก็ได้นะคะ"
10015020-88 = "เรื่องความสัมพันธ์ที่ไม่ค่อยดีของประธานริโอะกับหัวหน้าฮิมาริ พวกเราเองก็รู้อยู่แก่ใจค่ะ"
10015020-89 = "ฉันคงไม่ขอใช้ชื่อเซมิน่าไปยุ่งเกี่ยวกับเรื่องยุ่งยากนั้นหรอกค่ะ"
10015020-90 = "...แต่ถ้าไม่ได้ขอในฐานะเซมิน่า แต่ในฐานะอุชิโอะ โนอา ทุกคนจะว่ายังไงคะ?"
10015020-91 = "ถึงจะไม่อยากช่วยงานเซมิน่า แต่ถ้าเป็นการช่วยเหลือรุ่นน้องตาดำๆ คนหนึ่งก็คงจะได้ใช่มั้ยคะ?"
10015020-96 = "...ถ้าพูดแบบนั้นมันก็ช่วยไม่ได้นะ"
10015020-97 = "ประธานริโอะจะว่ายังไงก็ช่าง แต่รุ่นน้องแสนน่ารักของเราไม่ได้ทำอะไรผิดสักหน่อย"
10015020-98 = "ฮุฮุ ขอบคุณที่เอ็นดูฉันนะคะ"
10015020-99 = "ว่าแต่จะให้ช่วยงานอะไรล่ะ?"
10015020-100 = "รายการของงานที่ยังต้องทำอยู่ในเอกสารที่ยูกะจังเตรียมเอาไว้แล้ว ใช้อ้างอิงจากอันนี้ได้เลยค่ะ"
10015020-105 = "ตรวจสอบสถานะอุปกรณ์ในคลังที่ไม่เสียหาย จัดการรายชื่อนักกีฬาแล้วส่งไปให้โรงเรียนที่เกี่ยวข้อง..."
10015020-110 = "งานแค่นี้ก็ไม่ยากเท่าไรหรอก"
10015020-111 = "เอกสารก็สร้างแมโครขึ้นมาจัดการให้เสร็จในรวดเดียว ส่วนอุปกรณ์ก็ไปตรวจนับจำนวนเองที่คลังก็ไม่#nน่าจะยากอะไร"
10015020-112 = "ฮุฮุ คิดถูกจริงๆ เลยละค่ะที่มาขอให้ทางเวอริทัสช่วย"
10015020-117 = "อ่า จริงสิ จะว่าไปแล้ว มีบางอย่างที่ฉันสงสัยมาตั้งแต่เมื่อกี้แล้ว"
10015020-124 = "ตอนที่ฉันไม่อยู่ เหมือนว่าเซิร์ฟเวอร์ของมิลเลเนียมจะถูกบุกรุกโดยมีเจตนาร้ายหลายครั้งเลยนะ"
10015020-126 = "ถ้าเป็นการบุกรุกที่มีเจตนาร้าย...หรือว่า?"
10015020-127 = "ก็นะ... อาจจะเป็นการดักจับแพ็กเก็ตเพื่อปลอมแปลงข้อมูลหรือไม่ก็เป็นการแฮ็กเพื่อปล่อยไวรัส โชคดีไปที่ใช้วิธีแบบพวกมือสมัครเล่นก็เลยถูกไฟร์วอลล์กันเอาไว้ได้"
10015020-128 = "...แต่ว่าพวกนั้นมุ่งโจมตีไปที่อุปกรณ์กับของอำนวยความสะดวกที่ใช้ในงานมหกรรมแข่งขันกีฬา เหมือนกับว่ามีความแค้นอะไรกันมาก่อนเลยละ"
10015020-129 = "โอ๊ะ บังเอิญจังเลยนะคะ"
10015020-130 = "ก่อนหน้านี้หัวหน้าชมรมวิศวกรรมก็พูดเหมือนกันเลยค่ะ"
10015020-131 = "เดี๋ยวก็รู้เองแหละว่าเรื่องบังเอิญหรือจงใจกันแน่..."
10015020-132 = "แต่ที่แน่ใจได้เลยก็คือ คนที่กำลังขัดขวางงานกีฬาครั้งนี้ไม่ใช่คนนอก เพราะว่า IP ของผู้ที่โจมตีมี#nตำแหน่งที่ตั้งอยู่ภายในโรงเรียนมิลเลเนียมนี่แหละ"
10015020-133 = "ตายจริง..."
10015020-134 = "คืนนี้อาจจะมีนักเรียนน่าสงสัยลงมือโจมตีก็ได้... คุณครูเองก็ระวังตัวอย่าให้บาดเจ็บนะ"
10015020-135 = "ฮุฮุ ยังไงก็เป็นหน้าที่ของ[ruby=เซมิน่า]สภานักเรียน[/ruby]ที่จะต้องดูแลความปลอดภัยของแขกที่มายังโรงเรียนของเราค่ะ"
10015020-136 = "ระหว่างที่อยู่ในมิลเลเนียม ฉันจะรับหน้าที่คอยดูแลคุณครู [USERNAME] เองค่ะ"
10015020-138 = "...นั่นสินะ ถ้าอยู่กับโนอาก็คงไม่มีอะไรต้องห่วง"
10015020-139 = "ฮุฮุ ขอบคุณที่เชื่อใจฉันนะคะ"
10015020-140 = "ถ้าอย่างนั้นเราขอตัวไปจัดการปัญหาอื่นก่อน ระหว่างนั้นก็ขอฝากงานประมวลข้อมูลด้วยนะคะ"
10015020-145 = "เอาละ ถ้างั้นพวกเราก็มาจัดการงานเอกสารที่โนอาขอให้ช่วยกันเลยมั้ย?"
10015020-146 = "มากิ เธอช่วยจัดรายชื่อนักกีฬาพวกนี้ตามประเภทหน่อยได้มั้ย?"
10015020-147 = "อ่า ถ้าเป็นรายชื่อนักกีฬาละก็ ฉันแบ่งไว้เป็นตารางเรียบร้อยแล้วละ"
10015020-148 = "...ไฟล์นี้น่ะ"
10015020-149 = "หืม? เพิ่งจะได้รายชื่อนักกีฬามาจากโนอาเมื่อกี๊เองนะ จัดการเสร็จแล้วเหรอ?"

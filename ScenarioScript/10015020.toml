10015020-22 = "5;마키;03;그게, 아까 하레 선배가 에너지 드링크를 사러 편의점에 나갔다가 [USERNAME] 선생님이 유우카 선배와 세미나의 집무실로 들어가는 걸 보았다고 했거든."

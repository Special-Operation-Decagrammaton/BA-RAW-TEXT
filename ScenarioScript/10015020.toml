10015020-30 = "3;마키;05;하지만…….\n#3;em;[속상함]\n#3;stiff"
10015020-31 = "3;치히로;02;그리고 마키. 아까 서버의 해킹 건 말인데, 덤프 파일을 뒤져 개인 키를 찾아낸 건 좋은 시도였지만 로그를 지울 때는 흔적이 남지 않도록 주의해.\n#3;em;[반응]"

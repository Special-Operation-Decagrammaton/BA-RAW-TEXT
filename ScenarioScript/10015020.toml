[translation]
10015020-1 = "第2話;千年的駭客"
10015020-7 = "貝里塔斯．駭客休息室"
10015020-8 = "……小玉前輩，有聽見什麼嗎？"
10015020-9 = "正在掃描頻率……目前沒有發現特殊的異常動向。"
10015020-10 = "唔嗯，好奇怪……晴前輩呢？無人機有拍到什麼嗎？"
10015020-11 = "嗯，這邊的影像也沒有變化。"
10015020-12 = "不管怎麼看……現在研討會辦公室似乎都沒有人在。"
10015020-13 = "不可能啊……再繞過一次代理伺服器試試吧……？"
10015020-19 = "……你們在做什麼？"
10015020-20 = "啊，前輩！你來得正好。#n我們剛才駭入了研討會辦公室的閉路監視器……"
10015020-21 = "研討會辦公室……？#n為什麼突然這麼做？"
10015020-22 = "剛才晴前輩去便利商店買能量飲料，#n看見[USERNAME]老師和優香前輩一起走進了研討會的辦公室。"
10015020-23 = "學生和老師在深夜時避開他人視線偷偷見面……"
10015020-24 = "他們一定是偷偷在進行有趣的……不對，一定是在策畫可疑的事。"
10015020-25 = "身為守護真理與探究知識的貝里塔斯成員，我們不能坐視不管。"
10015020-26 = "來吧，千尋前輩。幫我們一起駭進去吧！"
10015020-27 = "……唉。"
10015020-28 = "夏萊的老師如果在這個時間點拜訪研討會，肯定是和明天的大運動會有關吧？"
10015020-29 = "過度的揣測並非好事，真紀。"
10015020-30 = "但是……"
10015020-31 = "還有，真紀，關於剛才伺服器的駭入……#n搜尋傾印檔案後找出私密金鑰是不錯的嘗試，但清除Log時要注意別留下痕跡。"
10015020-32 = "因為一個小時前，監視器的伺服器就因為受到攻擊，警報響個不停。"
10015020-33 = "換作是我的話，在清除記錄前，就會先引爆一枚邏輯炸彈。"
10015020-34 = "啊，對耶。#n我完全忘了……"
10015020-35 = "咦？#n話說回來，研討會的監視器伺服器也是前輩負責管理的嗎？"
10015020-36 = "你們啊……難道忘了我還負責千年的安全顧問嗎？"
10015020-40 = "……話說回來，你們不參加這次的大運動會嗎？"
10015020-42 = "大運動會？#n我們為什麼要參加？"
10015020-43 = "要竊聽倒是可以考慮，但要參加研討會舉辦的慶典還是算了吧。"
10015020-44 = "而且我最討厭體育活動了……"
10015020-46 = "……果然是這種反應嗎。"
10015020-47 = "雖然和學生會長關係惡劣的貝里塔斯，#n如果去參加學生會舉辦的活動是有點奇怪……"
10015020-48 = "不過大運動會雖然是由研討會主辦，#n卻同時也是奇普托斯所有學園的學生們一起參加的慶典。"
10015020-49 = "這種時候還是希望大家能先放下自己所屬的社團，好好享受慶典活動啊……"
10015020-51 = "這點我也認同。#n因為晄輪大祭就是大家打破藩籬、一起公平享樂的慶典。"
10015020-53 = "[USERNAME]老師和乃愛前輩……？#n什，什麼時候來的！？"
10015020-55 = "大家好。#n我是研討會的書記，生塩乃愛。"
10015020-60 = "[ns]「嗨，好久不見。」"
10015020-61 = "[USERNAME]老師和乃愛前輩……真是奇妙的組合。"
10015020-62 = "研討會的幹部在三更半夜來到貝里塔斯的部室有什麼事？"
10015020-63 = "而且還有夏萊的老師同行……"
10015020-65 = "呵呵，請不必這麼警戒。"
10015020-66 = "我之所以會來，並不是為了阻撓各位，而是想要向各位尋求協助。"
10015020-67 = "……協助？"
10015020-68 = "相信各位也知道，距離我們千年舉辦的「晄輪大祭」只剩下一天。"
10015020-69 = "我們研討會為了在期限內將活動準備到完美，付出了許多努力……"
10015020-70 = "不幸的是，在開幕前卻接二連三地發生各種意外，#n負責善後的優香醬也因為過勞而到了極限……"
10015020-72 = "畢竟優香前輩平常就肩負了沉重的工作……"
10015020-73 = "我認為趁這個機會讓優香休息一下會比較好。"
10015020-75 = "是的……因此，我希望能請其他人處理優香醬負責的「晄輪大祭」電算業務……"
10015020-76 = "而能夠處理這種大型活動電算作業的，就只有貝里塔斯的各位了……"
10015020-79 = "呵呵，是沒錯啦。#n畢竟在千年，沒有比貝里塔斯更擅長操作電腦的社團了！"
10015020-80 = "……委託的內容比想像中還簡單呢。"
10015020-81 = "幸好不需要在千年的所有建築物安裝RF發收模組。"
10015020-82 = "[s]「你們本來是想做什麼……？」"
10015020-84 = "……就如同這些孩子們說的一樣，協助電算處理作業並非難事。"
10015020-85 = "不過「研討會的幹部」可以向「貝里塔斯」發出委託嗎？"
10015020-86 = "把攸關千年威信的「晄輪大祭」準備工作交給貝里塔斯這種不被承認的社團……#n這件事如果傳到莉央會長耳中，應該會很麻煩吧。"
10015020-87 = "也許會吧。"
10015020-88 = "畢竟我早已聽說莉央會長和陽葵部長的關係十分惡劣。"
10015020-89 = "我也不樂見因為擅自使用研討會的名義而被捲入麻煩。"
10015020-90 = "……所以就拋開研討會，以我生塩乃愛個人的名義委託各位怎麼樣呢？"
10015020-91 = "既然協助研討會容易引人注目，那麼幫助陷入困境的後輩應該就沒問題了吧？"
10015020-96 = "……既然你都這麼說了，那就沒辦法了。"
10015020-97 = "雖然不知道莉央會長會做何反應，但可愛的後輩們畢竟是無辜的。"
10015020-98 = "呵呵，承蒙前輩的憐愛。"
10015020-99 = "所以，有什麼我們能幫忙的呢？"
10015020-100 = "優香醬已經將剩餘的業務彙整好了……#n請參考這份文件吧。"
10015020-105 = "掌握沒有毀損的備品庫存狀況，整理選手名單後發送給相關學園……"
10015020-110 = "嗯，小事一樁。"
10015020-111 = "備品的話，只要去現場確認數量……之後再用巨集一次搞定就行了。"
10015020-112 = "呵呵，果然來拜託貝里塔斯是正確的。"
10015020-117 = "啊，對了……剛才有件事讓人很在意。"
10015020-124 = "我不在的時候，千年的伺服器遭到數次的惡意攻擊。"
10015020-126 = "惡意攻擊……？"
10015020-127 = "嗯……雖然很快就被防火牆擋下了。"
10015020-128 = "……但對方似乎是對大運動會不滿，只攻擊大運動會需要的設備與機器。"
10015020-129 = "……這還真是巧呢。"
10015020-130 = "剛才工程師部的部長也說過類似的話。"
10015020-131 = "是偶然還是蓄意，之後就會水落石出……"
10015020-132 = "可以確定的是，妨礙運動會的並非是外部人士。#n逆向追蹤攻擊者的IP後，發現信號是從千年學園內部捕捉到的。"
10015020-133 = "哎呀……"
10015020-134 = "他們今晚可能會發動襲擊……#n老師也要注意安全。"
10015020-135 = "呵呵，維護訪客的安全，同樣也是[ruby=研討會]學生會[/ruby]的義務。"
10015020-136 = "老師待在千年的期間，我會負責護送[USERNAME]老師。"
10015020-138 = "……確實。有乃愛陪著，應該不需要太擔心。"
10015020-139 = "呵呵，感謝前輩的信賴。"
10015020-140 = "那麼，我們還得去解決其他問題……電算業務就拜託了。"
10015020-145 = "那麼，我們開始著手處理被託付的文書作業吧。"
10015020-146 = "真紀，可以幫我依照項目整理選手名單嗎？"
10015020-147 = "啊，選手名單的話，已經整理好了。"
10015020-148 = "來，檔案在這裡。"
10015020-149 = "嗯？不是才剛收到嗎……什麼時候整理好的？"
10015020-150 = "呵呵呵……為了以防萬一，我事先調查過選手名單了。"
10015020-152 = "難得有機會一次取得多所學校的學生名單……"
10015020-153 = "可以看到各學園學生的個人資訊、三圍等有趣的情報。"
10015020-157 = "……在沒有經過管理者許可的情況下，擅自竊取個人資料並加工？"
10015020-158 = "果然還是得跟你們再說明一下正確的駭客倫理才行！"
10015020-159 = "可，可是，這次不是幫上忙了嗎？"
10015020-160 = "這次就放過我們吧，前輩～！"

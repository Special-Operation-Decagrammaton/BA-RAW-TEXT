[translation]
80000027-1 = "Poor Man's Chocolate"
80000027-2 = "Ruins Near Spec Ops No. 227"
80000027-6 = "Another failure..."
80000027-7 = "I wanted to give you chocolates for Valentine's Day, Sensei."
80000027-8 = "But this poor former institute doesn't have ingredients, let alone chocolate."
80000027-13 = "This was the best I could do..."
80000027-14 = "[s] \"Are these...cacao beans?\""
80000027-15 = "Yes. I have a friend in the School Lunch Club."
80000027-16 = "I asked her to smuggle me some of the cacao beans used for Cherenka."
80000027-17 = "B-But...I don't know how to make chocolate with them!"
80000027-18 = "I'm truly a disappointment in every way."
80000027-19 = "[s] Chew a cacao bean."
80000027-23 = "Sensei, no! It'll be too bitter to enjoy!"
80000027-24 = "It doesn't taste anything like chocolate when it's raw!"
80000027-25 = "[s] \"ANY chocolate filled with your sincerity is delicious.\""
80000027-26 = "Chocolate filled with my sincerity..."
80000027-27 = "That's so kind of you. Even saying it is sweet!"
80000027-28 = "This is why you're my favorite person to watch, Sensei!"
80000027-32 = "I've made a decision."
80000027-33 = "I may have failed this time, but next year I'll make you proper chocolate no matter what!"
80000027-34 = "[s] \"It'd be a lot easier to just get pre-made chocolate...\""
80000027-36 = "After that, I gave Nodoka lots of premium chocolate to repay her kindness."
80000027-37 = "I may have gone overboard. She couldn't even finish half of it."

[translation]
80000027-1 = "窮人的巧克力"
80000027-2 = "舊校舍附近的廢墟"
80000027-6 = "搞砸了……"
80000027-7 = "今天是情人節，我本來打算送老師很棒的巧克力……"
80000027-8 = "但舊校舍別說是巧克力，就連巧克力的原料都難以獲得……雖然努力過了還是……"
80000027-13 = "只有這個……"
80000027-14 = "[s]「……可可樹的果實？」"
80000027-15 = "是的，其實我在供給部有個朋友。"
80000027-16 = "所以特別拜託他拿到了製作「潔蓮卡」所需的可可果實。"
80000027-17 = "可是我根本不知道光用這個要怎麼做出巧克力……"
80000027-18 = "老，老師果然會很失望吧……對不起，連像樣的東西都準備不出來……"
80000027-19 = "[s]咬一咬可可果實"
80000027-23 = "老，老師！？那不是拿來生吃的東西唷！？"
80000027-24 = "至少也要用水加熱之類的……"
80000027-25 = "[s]「這是充滿和香心意的禮物，所以沒關係。」"
80000027-26 = "我的，心意……"
80000027-27 = "老師連這種東西都願意當成禮物收下呢。"
80000027-28 = "我喜歡的人果然就是這種……"
80000027-32 = "老師，我決定了。"
80000027-33 = "雖然今年失敗了……不過明年一定不會只有可可果實，#n而是會把奶油和砂糖準備齊全，做出真正的巧克力送給老師的！"
80000027-34 = "[s]「沒有從原料開始製作以外的選擇嗎……？」"
80000027-36 = "（之後作為可可果實的回禮，順便作為味道的參考送了和香很好吃的巧克力）"
80000027-37 = "（不知道是不是因為有點高級，和香似乎連一半都沒吃完……）"

[translation]
80000027-1 = "ช็อกโกแลตของคนไม่มีเงิน"
80000027-2 = "พื้นที่รกร้างใกล้ อาคารเรียนเก่า No.227"
80000027-6 = "ล้มเหลวอีกแล้วค่ะ..."
80000027-7 = "ฉันอยากให้ช็อกโกแลตคุณครูเป็นของขวัญวันวาเลนไทน์แท้ๆ..."
80000027-8 = "แต่ที่อาคารเรียนเก่านี่ ไม่ต้องพูดถึงช็อกโกแลตหรอก แค่วัตถุดิบทำช็อกโกแลตยังแทบหาไม่ได้เลย..."
80000027-13 = "ที่หาได้ก็มีแค่นี้ค่ะ..."
80000027-14 = "[s] \"นี่มัน... เมล็ดโกโก้?\""
80000027-15 = "ใช่ค่ะ ฉันมีเพื่อนที่รู้จักอยู่ที่ชมรมโภชนาการน่ะค่ะ"
80000027-16 = "เลยขอร้องให้เธอแบ่งเมล็ดโกโก้ที่ใช้ทำ <ช็อกเชริโน่> มาให้เป็นกรณีพิเศษ..."
80000027-17 = "แต่ก็ยังคิดไม่ออกว่าจะใช้แค่เจ้านี่ทำช็อกโกแลตขึ้นมาได้ยังไง..."
80000027-18 = "ฮือ... คงล้มเหลวจริงๆ นั่นแหละค่ะ นักเรียนที่มอบช็อกโกแลตให้คุณครูไม่ได้อย่างฉัน..."
80000027-19 = "[s] รับเมล็ดโกโก้มาเคี้ยว"
80000027-23 = "ดะ...เดี๋ยวก่อนค่ะ คุณครูคะ ถ้ากินดิบๆ มันจะขมมากเลยนะคะ!"
80000027-24 = "อย่างน้อยก็ควรปอกแล้วเอาไปต้มในน้ำร้อน..."
80000027-25 = "[s] \"ไม่เป็นไรหรอก นี่เป็นช็อกโกแลตจากใจจริงของโนโดกะนี่นา\""
80000027-26 = "ช็อกโกแลตจากใจจริงของฉัน..."
80000027-27 = "คุณครูเรียกของแบบนี้ว่าช็อกโกแลต..."
80000027-28 = "ว่าแล้วเชียว... สมกับเป็นคุณครูที่ฉันชอบจริงๆ ค่ะ"
80000027-32 = "คุณครู... ฉันตัดสินใจแล้วค่ะ"
80000027-33 = "ถึงปีนี้จะล้มเหลว แต่ปีหน้าฉันจะต้องหาเนยกับน้ำตาลมา และทำช็อกโกแลตให้คุณครูให้ได้ค่ะ!"
80000027-34 = "[s] \"หาช็อกโกแลตมาเลยไม่เร็วกว่าเหรอ...?\""
80000027-36 = "(จากนั้นคุณครูก็ซื้อช็อกโกแลตสุดหรูมาชิมและให้โนโดกะเพื่อเป็นการตอบแทนที่ให้เมล็ดโกโก้มา)"
80000027-37 = "(อาจจะเพราะเกรงใจ โนโดกะเลยกินช็อกโกแลตไปไม่ถึงครึ่ง...)"

[translation]
2600005-1 = "#title;피로회복 고민상담"
2600005-2 = "#na;(……)"
2600005-3 = "#all;hide"
2600005-4 = "#wait;1000"
2600005-5 = "[ns] \"……?\""
2600005-6 = "3;치나츠;05;……\n#3;a\n#3;em;…"
2600005-7 = "[s1] \"여기는……?\"\n[s2] \"치나츠?\""
2600005-8 = "3;치나츠;02;……선생님?\n#3;em;[반응]"
2600005-9 = "3;치나츠;02;……선생님?\n#3;em;[반응]"
2600005-10 = "3;치나츠;01;네. 여긴 양호실입니다. 제가 선생님을 모셔왔습니다."
2600005-11 = "3;치나츠;02;……네? 왜 지금 여기 있으시냐고요?"
2600005-12 = "3;치나츠;05;오히려 제가 여쭤보고 싶은 질문입니다. 어째서 그런 상태셨던 건가요?\n#3;em;[반응]"
2600005-13 = "3;치나츠;99;선생님께 메시지를 보내고, 계신 곳으로 찾아갔을 때……"
2600005-14 = "3;치나츠;06;의식도 없이 쓰러져 계시고, 머리엔 혹도 주먹 만하게 나 있으시더군요.\n#3;em;[땀]"
2600005-15 = "3;치나츠;01;무슨 일이 있었는지 말씀해주실 수 있으신가요, 선생님? 습격이라도 당하셨나요?"
2600005-16 = "3;치나츠;02;기억나는 게 있으실까요?\n#3;em;[?]"
2600005-17 = "[s3] \"……단순한 과로야. 걱정할 거 없어.\"\n[s4] \"글쎄. 사실 나도 전혀 기억이 없어.\""
2600005-18 = "3;치나츠;01;……"
2600005-19 = "3;치나츠;01;……"
2600005-20 = "3;치나츠;06;……후우……\n#3;stiff\n#3;em;[속상함]"
2600005-21 = "3;치나츠;99;그러시군요. 네…… 과로로 인한 기절이셨군요."
2600005-22 = "3;치나츠;01;머리에 난 혹은, 책상에서 쓰러지시다가 바닥에 부딪히신 것 같습니다."
2600005-23 = "3;치나츠;01;큰 상처는 없으시니, 조금 쉬고 일어나시면 곧 회복되실 것 같습니다.\n#3;greeting"
2600005-24 = "3;치나츠;01;……네? 아직 일이 덜 끝나셨다고요?"
2600005-25 = "3;치나츠;02;바로 일어나서 하던 일을 마무리 지으셔야 한다고요?\n#3;em;[?]"
2600005-26 = "3;치나츠;99;……"
2600005-27 = "3;치나츠;01;안됩니다, 선생님.\n#3;em;[반응]"
2600005-28 = "3;치나츠;02;정말 죄송하지만 그 말씀에는 따를 수 없습니다."
2600005-29 = "3;치나츠;05;선생님께서 무리하게 나가려 하신다면, 제가 그러시지 못하게 계속 곁을 지키겠습니다.\n#3;em;[반응]"
2600005-30 = "3;치나츠;05;전에도 말씀드렸지만 저는 보건 담당입니다. 이런 일만큼은 간과해 드릴 수 없습니다."
2600005-31 = "3;치나츠;99;……\n#3;em;…"
2600005-32 = "3;치나츠;06;그리고 가급적 말씀드리지 않으려 했지만……"
2600005-33 = "3;치나츠;05;저도 가끔은, 화를 낼 줄 압니다. 선생님.\n#3;em;[!]"
2600005-34 = "[s] \"……치나츠?\""
2600005-35 = "3;치나츠;05;실례되는 일이라는 건 알고 있지만, 선생님께서 주무시는 동안 메디컬 체크를 해봤습니다."
2600005-36 = "3;치나츠;05;살아 계신 게 신기하다고 해도 될 정도로 피로 관리가 안 되고 계시더군요.\n#3;em;…"
2600005-37 = "3;치나츠;99;아무리 선생님으로서 책임감을 가지시고, 학생들을 관리하는 것이 중요하다고는 해도,"
2600005-38 = "3;치나츠;05;결국 그것들을 지속하기 위해서라도 가장 중요한 것 또한 선생님 본인의 건강입니다.\n#3;em;[반응]"
2600005-39 = "3;치나츠;05;이런 식으로 계속 자신을 혹사 시키시는 건……"
2600005-40 = "3;치나츠;05;……"
2600005-41 = "3;치나츠;06;……죄, 죄송합니다. 또 잔소리 같은 말을 해버렸군요.\n#3;stiff\n#3;em;[땀]"
2600005-42 = "3;치나츠;99;……"
2600005-43 = "3;치나츠;05;그, 그렇지만 다음부터는, 일이 많으시다면 차라리 저를 불러 주셨으면 합니다."
2600005-44 = "3;치나츠;01;제가 선생님처럼 중요한 일을 결정하거나 허가하는 일을 도와드릴 순 없지만……"
2600005-45 = "3;치나츠;02;그래도 단순한 분류작업이나 정리 작업 정도는 도와드릴 수 있을 테니까요.\n#3;greeting"
2600005-46 = "3;치나츠;99;지금까지는 선생님께 늘 도움만 받았으니, 이런 부분에서라도 그, 그……"
2600005-47 = "3;치나츠;04;……보답해드릴 기회를…… 주셨으면 해서……\n#3;stiff\n#3;em;[///]"
2600005-48 = "3;치나츠;04;……"
2600005-49 = "3;치나츠;04;괘, 괜찮으실까요, 선생님……?"
2600005-50 = "[s5] \"서로 챙겨 주자니, 부부 같은 걸.\"\n[s6] \"둘만의 비밀이라니, 초 럭키-!\""
2600005-51 = "3;치나츠;99;……네. 바로 그런 의미……\n#3;greeting"
2600005-52 = "3;치나츠;99;……네. 바로 그런 의미……\n#3;greeting"
2600005-53 = "3;치나츠;04;……?\n#3;stiff"
2600005-54 = "3;치나츠;05;……선생님……\n#3;em;…"
2600005-55 = "[s] \"잘못했습니다.\""
2600005-56 = "3;치나츠;05;……"
2600005-57 = "3;치나츠;06;후우. 아닙니다. 선생님은 그런 분이시니까요.\n#3;em;[속상함]"
2600005-58 = "3;치나츠;99;……"
2600005-59 = "3;치나츠;02;말하면서도 혹시 귀찮게 생각하시진 않을까 내심 걱정이 많이 됐습니다만……"
2600005-60 = "3;치나츠;07;허락해 주셔서 정말로 감사합니다. 덕분에 앞으로는 좀 더…… 뭐랄까……"
2600005-61 = "3;치나츠;99;……선생님께 연락을 취하는 게 편해지겠군요."
2600005-62 = "3;치나츠;07\n#wait;1500"
2600005-63 = "3;치나츠;03;선생님과 저는, 이제 서로 챙겨주는 사이인 거니까요.\n#3;em;[반짝]\n#3;greeting"
2600005-64 = "#all;hide"
2600005-65 = "#na;(처음 왔을 때와 달리, 이후 돌아가는 치나츠는 완전히 화가 풀린 얼굴을 하고 있었다.)"

[translation]
2600005-1 = "Fatigue Recovery Counseling"
2600005-2 = "(...)"
2600005-5 = "[ns] \"...?\""
2600005-6 = "..."
2600005-7 = "[s1] \"Where am I...?\"\n[s2] \"Chinatsu?\""
2600005-8 = "Sensei?"
2600005-9 = "Sensei?"
2600005-10 = "You're in the infirmary. I was the one who brought you here."
2600005-11 = "...Hm? You're wondering why you're here?"
2600005-12 = "I'd like to know that as well. What happened to you before I found you?"
2600005-13 = "After our last text, I arrived at the meeting spot..."
2600005-14 = "...And I found you lying on the ground unconscious with a lump on your head as big as my fist."
2600005-15 = "Can you tell me what happened, Sensei? Were you attacked?"
2600005-16 = "Do you remember anything?"
2600005-17 = "[s3] \"I'm just overworked. It's nothing to worry about.\"\n[s4] \"Dunno. To be honest, I don't really remember anything.\""
2600005-18 = "..."
2600005-19 = "..."
2600005-20 = "*sigh*"
2600005-21 = "I see. So you fainted...from overworking."
2600005-22 = "Meaning the lump on your head must be from either when you hit it on the desk or when you passed out."
2600005-23 = "Well, you have no serious injuries, so you should be fine once you've rested."
2600005-24 = "You...still have more work left to do?"
2600005-25 = "And you have to get back to finishing it right away?"
2600005-26 = "..."
2600005-27 = "No can do, Sensei."
2600005-28 = "I'm terribly sorry, but I can't let you do that."
2600005-29 = "I'll stay here and make sure you don't go anywhere if I have to."
2600005-30 = "I'm in charge of medical aid, which means you're under my care. I won't look the other way."
2600005-31 = "..."
2600005-32 = "Moreover, there's something I was hoping I wouldn't have to say..."
2600005-33 = "I can have quite the temper, Sensei."
2600005-34 = "[s] \"...Chinatsu?\""
2600005-35 = "I may have overstepped my bounds, but I ran a full diagnosis on you while you were asleep."
2600005-36 = "You're extremely fatigued, to the point that it's a miracle that you're still alive."
2600005-37 = "No matter how committed you are to your job and the well-being of your students..."
2600005-38 = "...you won't be able to help anyone if you run yourself into the ground."
2600005-39 = "If you keep pushing yourself like this..."
2600005-40 = "..."
2600005-41 = "M-My apologies. I'm nagging you again."
2600005-42 = "..."
2600005-43 = "B-But from now on, whenever you have too much work, I'd rather you call me."
2600005-44 = "I can't carry out every duty you have and make decisions on your behalf..."
2600005-45 = "...but I can help with simple tasks like sorting and organizing at the very least."
2600005-46 = "For as long as we've known each other, you're the one who's always helping me. So I want you to, um..."
2600005-47 = "...give me a chance...to repay you."
2600005-48 = "..."
2600005-49 = "I-Is that okay with you, Sensei...?"
2600005-50 = "[s5] \"Putting it that way, we almost sound like a married couple.\"\n[s6] \"I like the idea of a secret just between you and me.\""
2600005-51 = "I'm glad that you understa—"
2600005-52 = "I'm glad that you understa—"
2600005-53 = "...?"
2600005-54 = "Sensei..."
2600005-55 = "[s] \"Sorry. That might have been over the line.\""
2600005-56 = "..."
2600005-57 = "*sigh* There's no need to apologize. I know what to expect from you."
2600005-58 = "..."
2600005-59 = "I was nervous about telling you that because I was afraid you'd find me annoying..."
2600005-60 = "So thank you for agreeing. Now that I've said it, it should be...well..."
2600005-61 = "...easier for me to reach out to you, Sensei."
2600005-63 = "I want it to just be the two of us taking care of each other from now on."
2600005-65 = "(Chinatsu seemed much more chipper as she left than she did at the start of the conversation.)"

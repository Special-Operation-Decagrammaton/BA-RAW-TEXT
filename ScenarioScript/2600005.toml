[translation]
2600005-1 = "疲勞的時候"
2600005-2 = "（……）"
2600005-5 = "[ns]「……？」"
2600005-6 = "這個人還真是……"
2600005-7 = "[s1]「這裡是……？」\n[s2]「……嗯？千夏？」"
2600005-8 = "老師……？"
2600005-9 = "老師……？"
2600005-10 = "意識還清楚嗎？這裡是保健室，是我把老師帶過來的。"
2600005-11 = "……您問我為什麼會在這裡？"
2600005-12 = "那是我要說的吧，老師怎麼把自己搞成這樣？"
2600005-13 = "我傳完訊息，到老師那邊的時候……"
2600005-14 = "就看到老師頭上腫了一大包，還不省人事……"
2600005-15 = "到底出了什麼事啊，老師？難道被人襲擊了嗎？"
2600005-16 = "失去意識之前，老師還記得什麼嗎？"
2600005-17 = "[s3]「……只是單純過勞，不用擔心。」\n[s4]「完全不記得……我只記得工作到一半就突然……」"
2600005-18 = "……"
2600005-19 = "……"
2600005-20 = "……呼……"
2600005-21 = "原來如此……原來老師是過勞才會昏倒。"
2600005-22 = "老師頭上的包，應該是昏倒的時候，從座位上跌下來撞到地板所導致。"
2600005-23 = "身上也沒有其他嚴重的傷，稍微休息一下應該就沒事了。"
2600005-24 = "…咦？還有工作要做？"
2600005-25 = "這種時候了還提工作……"
2600005-26 = "……"
2600005-27 = "不行，老師，"
2600005-28 = "非常抱歉，但這件事我不能接受。"
2600005-29 = "如果老師硬要勉強自己去工作，那我也會盡全力阻止老師。"
2600005-30 = "我之前也跟老師說過，我負責的職位是醫療，因此這類情況我絕對不會通融。"
2600005-31 = "……"
2600005-32 = "另外還有，我本來不太想說這種話……"
2600005-33 = "但我也是會生氣的唷，老師。"
2600005-34 = "[s]「……千夏？」"
2600005-35 = "很抱歉我擅自作主，不過我在老師醒來前，有替您做過全身檢查了。"
2600005-36 = "……依照老師疲勞累積的程度，老師還能活著實在很不可思議。"
2600005-37 = "就算身為老師的職責有多重要，就算是為了我們這些學生，"
2600005-38 = "老師如果倒下，一切就都結束了。"
2600005-39 = "看到老師這樣虐待自己的身體，我實在……"
2600005-40 = "……"
2600005-41 = "……對不起，我居然對老師這樣發牢騷……"
2600005-42 = "……"
2600005-43 = "……下次工作太多的時候，請找我幫忙吧。"
2600005-44 = "雖然我沒辦法代替老師批准或決定什麼重大事務……"
2600005-45 = "不過至少我能幫忙一些簡單的文書處理或整理工作。"
2600005-46 = "我最近總是受到老師幫助，所以至少……"
2600005-47 = "希望能給我報答老師的機會……"
2600005-48 = "……"
2600005-49 = "老師……？"
2600005-50 = "[s5]「彼此扶持，感覺就像夫妻一樣。」\n[s6]「那這就是我們兩個人的約定囉。」"
2600005-51 = "呃，啊……不，也不是那個意思……"
2600005-52 = "呃，啊……不，也不是那個意思……"
2600005-53 = "……？"
2600005-54 = "老師，這種時候就請您別開玩笑了……"
2600005-55 = "[s]「抱歉……」"
2600005-56 = "……呼。"
2600005-57 = "算了，我也知道老師就是這種人。"
2600005-58 = "……"
2600005-59 = "老實說，我很擔心說出這種話，老師會不會覺得我很煩……"
2600005-60 = "總之謝謝老師。我覺得我今後……該怎麼說呢……"
2600005-61 = "……應該可以用更輕鬆的心情聯絡老師了。"
2600005-63 = "因為老師和我現在是互相扶持的關係了。"
2600005-65 = "（轉身回去的千夏，表情看起來非常平靜）"

[translation]
2600005-1 = "การให้คำปรึกษาเพื่อฟื้นฟูพลังใจ"
2600005-2 = "(...)"
2600005-5 = "[ns] \".....?\""
2600005-6 = "......"
2600005-7 = "[s1] \"ที่นี่คือ...?\"\n[s2] \"ชินัตสึ?\""
2600005-8 = "คุณครูคะ...?"
2600005-9 = "คุณครูคะ...?"
2600005-10 = "ที่นี่คือห้องพยาบาลค่ะ ฉันพาคุณครูมาที่นี่เองค่ะ"
2600005-11 = "สงสัยว่าทำไมตัวเองต้องมาอยู่ที่นี่น่ะเหรอคะ?"
2600005-12 = "ฉันก็อยากรู้เหมือนกันค่ะ ว่าเกิดอะไรกับคุณครูก่อนหน้านี้น่ะค่ะ"
2600005-13 = "ฉันส่งข้อความไปให้คุณครู แล้วก็ออกไปหาตามที่ที่นัดเจอกัน..."
2600005-14 = "แต่ก็เจอคุณครูนอนล้มไม่ได้สติ แล้วหัวก็โนขนาดเท่ากำปั้นเลยด้วยล่ะค่ะ"
2600005-15 = "พอจำได้มั้ยคะว่าเกิดอะไรกับคุณครู? โดนทำร้ายหรือเปล่าคะ?"
2600005-16 = "จำอะไรได้บ้างมั้ยคะ?"
2600005-17 = "[s3] \"คงแค่เหนื่อยจนเป็นลมไปน่ะ ไม่ต้องห่วงหรอก\"\n[s4] \"ไม่รู้สิ ครูเองก็จำอะไรไม่ได้เลย\""
2600005-18 = "......"
2600005-19 = "......"
2600005-20 = "เฮ้อ..."
2600005-21 = "แบบนี้นี่เอง คุณครูคงทำงานหนักจนล้มพับไปสินะคะ"
2600005-22 = "ที่หัวโนแบบนั้นอาจจะเพราะว่าล้มไปชนกับโต๊ะหรือพื้นก็ได้ค่ะ"
2600005-23 = "โชคดีที่ไม่บาดเจ็บมาก แค่นอนพักอีกนิดหน่อยก็น่าจะดีขึ้นแล้วล่ะค่ะ"
2600005-24 = "...คะ? งานยังไม่เสร็จเหรอคะ?"
2600005-25 = "จะลุกขึ้นไปทำงานต่อเลยงั้นเหรอคะ?"
2600005-26 = "......"
2600005-27 = "ไม่ได้นะคะคุณครู!"
2600005-28 = "ฉันขอโทษที่ต้องพูดแบบนี้ แต่ยังไงก็ไปไม่ได้ค่ะ!"
2600005-29 = "ถ้าคุณครูจะฝืนลุกไปล่ะก็ ฉันก็จะนั่งเฝ้าอยู่ที่นี่และกำชับไม่ให้ออกไปไหนได้เลยค่ะ!"
2600005-30 = "ฉันเคยบอกไว้แล้วนี่คะว่าฉันมีหน้าที่ด้านงานพยาบาล ตอนนี้คุณครูอยู่ในการดูแลของฉันแล้วค่ะ!"
2600005-31 = "......"
2600005-32 = "แล้วฉันก็มีบางอย่างที่จริงๆ แล้วก็ไม่อยากบอกด้วย..."
2600005-33 = "ถึงจะเห็นแบบนี้ แต่ฉันก็โมโหเป็นเหมือนกันนะคะ"
2600005-34 = "[s] \"...ชินัตสึ?\""
2600005-35 = "ฉันรู้ดีค่ะว่ามันเสียมารยาท แต่ระหว่างที่คุณครูหลับ ฉันก็ตรวจเช็กร่างกายให้แล้วค่ะ..."
2600005-36 = "คุณครูร่างกายอ่อนเพลียมากจนฉันตกใจว่ายังมีชีวิตอยู่ได้ยังไงเลยล่ะค่ะ"
2600005-37 = "ถึงจะต้องแบกความรับผิดชอบในฐานะครูและอยากดูแลนักเรียนก็เถอะ"
2600005-38 = "แต่ถ้าไม่ดูแลสุขภาพของตัวเอง ก็จะอยู่กับนักเรียนไปนานๆ ไม่ได้นะคะ"
2600005-39 = "ถ้าจะยังดื้อแบบนี้ล่ะก็..."
2600005-40 = "......"
2600005-41 = "ขะ... ขอโทษค่ะ ฉันเผลอบ่นอะไรออกไปอีกแล้ว"
2600005-42 = "......"
2600005-43 = "แต่ถ้าต่อไปคุณครูงานยุ่งก็เรียกฉันไปช่วยได้นะคะ"
2600005-44 = "ถึงฉันจะช่วยในงานสำคัญๆ หรืองานที่ต้องตัดสินใจไม่ได้ก็เถอะค่ะ..."
2600005-45 = "แต่เรื่องจัดการเอกสารหรือทำนู่นทำนี่นิดๆ หน่อยๆ ฉันไปช่วยได้เสมอค่ะ!"
2600005-46 = "ที่ผ่านมาฉันเอาแต่รับความช่วยเหลือจากคุณครู ฉันก็เลย... ก็เลย..."
2600005-47 = "อยาก... อยากตอบแทนดูบ้างน่ะค่ะ ให้โอกาสฉันเถอะนะคะ..."
2600005-48 = "......"
2600005-49 = "จะ... ไม่เป็นอะไรใช่มั้ยคะ คุณครู...?"
2600005-50 = "[s5] \"ดูแลกันและกันแบบนี้... เหมือนคู่แต่งงานเลยนะ\"\n[s6] \"นี่เรามีความลับของกันและกันแล้วเหรอ?\""
2600005-51 = "ค่ะ... ฉันดีใจที่คุณครูเข้าใจ..."
2600005-52 = "ค่ะ... ฉันดีใจที่คุณครูเข้าใจ..."
2600005-53 = ".....?"
2600005-54 = "คุณครูคะ..."
2600005-55 = "[s] \"ครูผิดไปแล้ว\""
2600005-56 = "......"
2600005-57 = "เฮ้อ... ช่างเถอะค่ะ ฉันรู้ว่าคุณครูแค่แกล้งเล่น"
2600005-58 = "......"
2600005-59 = "จริงๆ ฉันกังวลมากเลยค่ะ ว่าถ้าพูดแบบนั้นแล้วคุณครูจะคิดว่าฉันน่ารำคาญ..."
2600005-60 = "แต่ก็ขอบคุณที่อนุญาตนะคะ ต่อไปนี้ฉันคง..."
2600005-61 = "ติดต่อคุณครู... ได้อย่างสบายใจมากขึ้นแล้วล่ะค่ะ"
2600005-63 = "ก็เพราะตอนนี้เราคือคนที่ต้องดูแลกันและกันยังไงล่ะคะ"
2600005-65 = "(ชินัตสึกลับไปพร้อมสีหน้าที่ผ่อนคลาย ไม่ได้ทำหน้าโกรธเหมือนตอนแรกแล้ว)"

[translation]
1001305-1 = "เดตแบบผู้ใหญ่"
1001305-3 = "(คุณครูได้บัตรทานอาหารในภัตตาคารหรูสำหรับสองคนมาเป็นของสมนาคุณจากการใช้บัตร#nประจำตัวผู้ใหญ่ดีเด่น)"
1001305-4 = "(ซึรุกิดูไม่ค่อยร่าเริงเท่าไร คุณครูเลยจะไปหาเธอ)"
1001305-6 = "(ซึรุกินั่งอยู่ในสวนสาธารณะคนเดียว)"
1001305-7 = "(เหม่อ)"
1001305-8 = "[s1] ทักทาย\n[s2] จับมือทักทาย"
1001305-9 = "คะ...คุณครู?!"
1001305-10 = "คะ...คุณครู?!"
1001305-11 = "มะ...มาได้ยังไงคะ... อ่า มะ...หมายถึงว่า..."
1001305-12 = "[s3] \"มีอะไรเหรอ?\"\n[s4] \"กังวลเรื่องอะไรอยู่งั้นเหรอ?\""
1001305-13 = "กะ...กังวล...เหรอคะ..."
1001305-14 = "กะ...กังวล...เหรอคะ..."
1001305-15 = "ถะ...ถ้าบอกว่าไม่มีก็คงเหมือนโกหก..."
1001305-16 = "[s] \"เล่าให้ครูฟังได้มั้ย?\""
1001305-17 = "....."
1001305-19 = "ภารกิจชมรมทวงความยุติธรรมที่ 32 - รวบตัวแยงกี้สาว"
1001305-20 = "กร๊าก ฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!"
1001305-21 = "ปิดกั้นเส้นทางหนีหมดแล้ว พวกเธอหนีไม่พ้นแล้วล่ะ!"
1001305-22 = "เตรียมตัวลาโลกกันได้เลย!!"
1001305-23 = "(ตู้มมมม! ตู้มๆๆๆ!!!)"
1001305-25 = "พื้นที่ติดอาวุธ เขตปกครองตนเองทรีนิตี้ครึ่งแรก"
1001305-26 = "ก๊ากกกกกๆๆๆๆ!!"
1001305-27 = "ฉันจะขยี้พวกเธอให้แหลกเหมือนบี้ปลวกเลย!"
1001305-28 = "(ตู้มมมมมม!! ปังๆๆ ปัง!!)"
1001305-30 = "ภารกิจอพยพฉุกเฉิน - กองกำลังป้องกันโรงเรียน"
1001305-31 = "ก๊ากกกกกๆๆๆ ฮ่าๆๆๆๆ!!!"
1001305-32 = "ยัง...ยังไม่พอ ยังไม่พอ!!"
1001305-33 = "เอาเลยสิ เอาเลย ต่อต้านฉันอีกสิ!!"
1001305-34 = "(ตู้มมมมมมม!! ตู้มมม! ตู้มมมมมมม!!)"
1001305-36 = "เรื่องเป็นแบบนี้น่ะค่ะ..."
1001305-37 = "[s5] \"ซึรุกิตั้งใจทำภารกิจมากๆ เลยนะ...\"\n[s6] \"จะบอกว่างานเยอะเกินไปงั้นเหรอ...?\""
1001305-38 = "มะ...ไม่ใช่แบบนั้นค่ะ"
1001305-39 = "มะ...ไม่ใช่แบบนั้นค่ะ"
1001305-40 = "ฉะ...ฉะ...ฉัน..."
1001305-41 = "[s] \"หืม?\""
1001305-42 = "ฉันกำลังคิดว่าตัวเอง...ใช้ชีวิตวัยรุ่น...ดีแล้วรึยัง..."
1001305-43 = "[s7] \"ชีวิตวัยรุ่น....?!\"\n[s8] \"พูดอะไรของเธอน่ะ!\""
1001305-44 = "ชีวิตวัยรุ่นของฉันไม่มีเรื่องที่หวือหวา หรือน่ารักกุ๊กกิ๊กสดใสโลกชมพูเหมือนวัยรุ่นในนิยาย#nหรือในการ์ตูนเลย...."
1001305-45 = "ชีวิตวัยรุ่นของฉันไม่มีเรื่องที่หวือหวา หรือน่ารักกุ๊กกิ๊กสดใสโลกชมพูเหมือนวัยรุ่นในนิยาย#nหรือในการ์ตูนเลย...."
1001305-46 = "ในหนังสือเขียนไว้ว่าชีวิตวัยรุ่นมักเป็นช่วงที่เห็นทุกอย่างสดใสเป็นสีชมพู..."
1001305-47 = "[s9] \"ซึรุกิเองก็เป็นเด็กสาวที่มีความฝันเหมือนกัน\"\n[s10] \"ชีวิตจริงมันโชกเลือดยิ่งกว่าสินะ...\""
1001305-48 = "ยะ...อย่างน้อย...ฉะ..ฉะ...ฉันหวังว่า...ฉะ...ฉันอาจจะ...ได้...ไป...ไป...ไปเดต...กับ...ใครสักคน...บ้าง"
1001305-49 = "ยะ...อย่างน้อย...ฉะ..ฉะ...ฉันหวังว่า...ฉะ...ฉันอาจจะ...ได้...ไป...ไป...ไปเดต...กับ...ใครสักคน...บ้าง"
1001305-50 = "...อ่า ขอโทษด้วยค่ะ ฉันพูดอะไรแปลกๆ ไปอีกแล้ว..."
1001305-51 = "[s11] ใช้บัตรทานอาหารที่ได้มา \n[s12] ทำให้ซึรุกิมีโลกสีชมพูตามที่หวัง"
1001305-56 = "(แอบมอง)"
1001305-57 = "คะ? นะ...นี่มัน...?!"
1001305-58 = "[s] ครูจะพาเธอไปฝึกพิเศษ (เดต) เอง ซึรุกิ!"
1001305-59 = "?!?!!"
1001305-61 = "ยินดีต้อนรับครับ เรากำลงรอคุณ [USERNAME] อยู่เลยครับ"
1001305-62 = "ยินดีต้อนรับสู่ภัตตาคาร <คิโวทอส ดีลักซ์ พาเลส>#nเราพร้อมที่จะมอบบริการสุดประทับใจให้กับลูกค้าคนพิเศษแล้วครับ"
1001305-63 = "......?!"
1001305-64 = "ขอเชิญผ่อนคลายอารมณ์และดื่มด่ำกับบรรยากาศยามค่ำคืนสุดพิเศษในระดับความสูง 550 เมตรเหนือพื้นดิน"
1001305-65 = "ผมจะพาไปที่โต๊ะนะครับ เชิญทางนี้ครับ"
1001305-67 = "[s13] \"ขอบคุณนะ\"\n[s14] \"ไปกันเถอะ ซึรุกิจัง\""
1001305-68 = "คะ? อ่า... เอ่อ... คือฉัน..."
1001305-69 = "คะ? อ่า... เอ่อ... คือฉัน..."
1001305-73 = "― (หนีกลับเลยดีมั้ย? หรือว่ากระโดดออกหน้าต่างเลยดี?)[wa:1700] "
1001305-75 = "― (จะตายรึเปล่านะ? อาจจะตายก็ได้ อยากตายจัง...หรือฆ่าเลยดีมั้ย? ไม่สิ ไม่ใช่แบบนั้นสิ...)[wa:3040] "
1001305-78 = "[ns15] (ถึงเป็นแค่การฝึก แต่ก็ควรทำให้สมจริงสินะ) \n[ns16] (พยายามสร้างบรรยากาศ)"
1001305-81 = "― มะ...มะ...มีอะ... มีอะไร... จะ... จะพูดเหรอคะ...[wa:3700] "
1001305-83 = "― ทะ... ที่แบบนี้มัน... ไม่เหมาะกับฉันสักเท่าไรเลย...[wa:1920] "
1001305-86 = "[ns] \"ซึรุกิ ครูมีบางอย่างที่อยากจะบอกเธอ\""
1001305-87 = "― เอ่อ อืม... ฉัน ยัง...ไม่ได้เตรียมใจเลย...[wa:4820] "
1001305-90 = "― (กรี๊ดดดดด! ทำไมฉันถึงได้มาอยู่ในที่แบบนี้เนี่ย!!)[wa:2780] "
1001305-93 = "[ns] \"ครูอยากบอกว่า...พวกเรามาพยายามไปด้วยกันเถอะ\""
1001305-94 = "อ่า..."
1001305-95 = "......"
1001305-96 = "...ค่ะ"
1001305-97 = "(จากนั้นซึรุกิก็ได้สัมผัสประสบการณ์การเดตแบบผู้ใหญ่อย่างสนุกสนาน)"

[translation]
1001305-1 = "大人的約會"
1001305-3 = "（因為使用大人的卡片的績效優異，所以收到了2人份的頂級餐廳招待券）"
1001305-4 = "（先不管這個，弦生的狀態似乎不太好，去看看吧）"
1001305-6 = "（弦生獨自坐在公園）"
1001305-7 = "……"
1001305-8 = "[s1] 打招呼\n[s2] 揮手"
1001305-9 = "老，老師！？"
1001305-10 = "老，老師！？"
1001305-11 = "為，為什麼會來這裡……不，不，比起那個……"
1001305-12 = "[s3] 「發生什麼事？」\n[s4] 「有什麼煩惱嗎？」"
1001305-13 = "煩，煩惱……嗎……"
1001305-14 = "煩，煩惱……嗎……"
1001305-15 = "雖，雖然不能說沒有……"
1001305-16 = "[s] 「能說給我聽嗎？」"
1001305-17 = "……"
1001305-19 = "第32回實現正義任務．太妹掃蕩作戰"
1001305-20 = "呀哈哈哈哈哈哈哈哈哈！！ "
1001305-21 = "退路被擋住了！這樣一來，妳們就沒有逃跑的方法了吧？"
1001305-22 = "給我乖乖地消失吧！！"
1001305-23 = "（咚哐──！咚哐哐──！！！）"
1001305-25 = "上半年度．三一自治區武裝巡邏"
1001305-26 = "咿嘿嘿嘿嘿嘿嘿嘿嘿嘿嘿嘿！！"
1001305-27 = "這樣就跟被驅除的蟲子沒兩樣呢？"
1001305-28 = "（咚哐！！！砰！！砰！！）"
1001305-30 = "緊急避難任務．指導主任護衛"
1001305-31 = "咯嘿耶耶耶耶嘿嘿嘿嘿耶耶！！！"
1001305-32 = "不夠，這樣還不夠啊啊啊！！ "
1001305-33 = "繼續，繼續啊，繼續抵抗啊！！"
1001305-34 = "（咚哐！！！咚哐！！咚哐哐！！）"
1001305-36 = "……就是這樣。"
1001305-37 = "[s5] 「……很努力呢，弦生。」\n[s6] 「……那個，意思是說工作太多嗎？」"
1001305-38 = "……不，不是那樣。"
1001305-39 = "……不，不是那樣。"
1001305-40 = "我，我，我……"
1001305-41 = "[s] 「我？」"
1001305-42 = "我的青春，這樣就行了嗎……之類的……"
1001305-43 = "[s7] 「青春……！？」\n[s8] 「出現可怕的單字了！」"
1001305-44 = "在小說或雜誌裡看到的華麗又酸酸甜甜的，閃閃發光的戀愛，那種青春在我的生活裡完全找不到……"
1001305-45 = "在小說或雜誌裡看到的華麗又酸酸甜甜的，閃閃發光的戀愛，那種青春在我的生活裡完全找不到……"
1001305-46 = "……就我的狀況，別說什麼閃閃發光了，根本是鮮豔的紅色……"
1001305-47 = "[s9] 「弦生也是有夢想的少女呢。」\n[s10] 「確實是紅色的呢。」"
1001305-48 = "至，至，至少有，和喜，喜，喜歡的……約，約，約……約會…………之類的事情的話……"
1001305-49 = "至，至，至少有，和喜，喜，喜歡的……約，約，約……約會…………之類的事情的話……"
1001305-50 = "……啊，對，對不起。又說了奇怪的話……"
1001305-51 = "[s11] （難得取得了頂級餐廳的招待券，）\n[s12] （幫弦生實現夢想吧）"
1001305-56 = "（咻）"
1001305-57 = "咦？這，這是！？"
1001305-58 = "[s] 「和我[ruby=約會]體驗青春[/ruby]吧！弦生！」"
1001305-59 = "！？！！？"
1001305-61 = "歡迎光臨，恭候多時了，[USERNAME]貴賓。"
1001305-62 = "歡迎來到僅為少數受邀顧客服務的頂級晚宴餐廳「Deluxe Palace．Kivotos」。"
1001305-63 = "……！？"
1001305-64 = "請在高達550公尺的超高樓層夜景環繞之下，一邊品嚐料理一邊享受寧靜的時光吧。"
1001305-65 = "我來為您帶位，請跟我來。"
1001305-67 = "[s13] 「謝謝你，老闆。」\n[s14] 「走吧，弦生。」"
1001305-68 = "咦？啊，啊嗚……我，我……"
1001305-69 = "咦？啊，啊嗚……我，我……"
1001305-73 = "― （要逃跑嗎？現在立刻從窗戶跳下去？）[wa:2980] "
1001305-75 = "― （會死嗎？會死吧？好想死……要殺掉嗎？不，不對不對！）[wa:5440] "
1001305-78 = "[ns15] （就算是練習，也必須好好做才行）\n[ns16] （好好營造氣氛吧）"
1001305-81 = "― 該，該，該，該，該，該說什麼……才好呢……[wa:4780] "
1001305-83 = "― 這，這種地方……明明不適合我……[wa:3320] "
1001305-86 = "[ns] 「弦生，我有話想說。」"
1001305-87 = "― 啊，唔唔……我還沒做好心理準備……[wa:5820] "
1001305-90 = "―（呀啊啊啊啊啊～～！怎麼會到這種地方來了啊啊──！！）[wa:3740] "
1001305-93 = "[ns] 「……接下來也一起，在各方面努力吧？」"
1001305-94 = "啊……"
1001305-95 = "……"
1001305-96 = "……呃，是。"
1001305-97 = "（那之後和弦生開開心心地體驗了大人的約會）"

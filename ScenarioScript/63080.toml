63080-5 = "3;나기사;99;아닙니다. 지금은 선생님의 말씀을 감사히 받아들이기로 하죠."
63080-6 = "3;나기사;01;아리우스 학생들이 공부할 장소와 시험을 치를 장소에 대해서는, 너무 걱정하지 마세요."
63080-7 = "3;나기사;02;명목상 트리니티의 소유로 되어 있지만, 지금은 사용되지 않는 구교사 건물들이 있습니다."
63080-8 = "3;나기사;01;그곳을 자유롭게 사용할 수 있도록 무료 대여해 드리고자 합니다."
63080-9 = "[s1] \"사용되지 않는 구교사 건물들…….\"\n[s2] \"무료 대여…….\""

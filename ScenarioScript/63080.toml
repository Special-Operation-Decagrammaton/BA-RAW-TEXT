63080-14 = "3;나기사;04;왜, 왜 그러시나요. 선생님? 제가 또 뭔가 잘못이라도……?"
63080-15 = "3;나기사;11;네? 마음 씀씀이의 폭이 너무 넓어서, 따라가기 조금 어려우셨다고요?"
63080-16 = "3;나기사;99;후훗. 무슨 말씀이신가 했네요. 하지만 모든 요소는 각자의 자리에서 쓸모를 다할 때, 비로소 더욱 빛을 낼 수 있는 법이니까요."
63080-17 = "3;나기사;02;네? 저희 티파티 멤버들은 모의고사를 치르지 않느냐고요?\n#3;em;[반응]"
63080-18 = "3;나기사;00;그럴 리가요. 오히려 저희야말로 성적이 좋지 않으면, 티파티의 자격을 의심받게 됩니다."
63080-19 = "3;나기사;03;하지만 미카 씨도 세이아 씨도, 다들 우수하니까요. 큰 걱정은 하지 않습니다."
63080-20 = "3;나기사;11;네? 세이아 씨는 그렇다 쳐도, 미카 씨의 성적 말씀이신가요?\n#3;stiff"

[translation]
63080-1 = "ตอนที่ 8;เวลาน้ำชา"
63080-2 = "ก่อนอื่นเลย ฉันขอแสดงความขอบคุณจากใจจริงอีกครั้งเกี่ยวกับการสอบจำลองครั้งนี้ค่ะ"
63080-3 = "[ns] \"นางิสะก็ทำได้ดีมากนะ\""
63080-4 = "ไม่หรอกค่ะ แค่นี้ไม่เท่าไรหรอกค่ะ..."
63080-5 = "ไม่สิ ตอนนี้ฉันขอรับคำขอบคุณจากคุณครูดีกว่าค่ะ"
63080-6 = "ส่วนเรื่องสถานที่เรียนและสนามสอบของนักเรียนอาเรียส คุณครูไม่ต้องกังวลให้มากไปนะคะ"
63080-7 = "มีอาคารเรียนเก่าหลายหลังที่ทรีนิตี้เป็นเจ้าของ แต่ปัจจุบันไม่ได้ใช้งานแล้วค่ะ"
63080-8 = "ฉันยินดีให้คุณครูใช้อาคารสถานที่ได้อย่างอิสระโดยไม่ต้องมีค่าใช้จ่ายค่ะ"
63080-9 = "[s1] \"อาคารเรียนเก่าที่ไม่ได้ใช้แล้ว...\"\n[s2] \"ให้ใช้ฟรีๆ เลยเหรอ...\""
63080-14 = "ทะ... ทำไมเหรอคะ คุณครู? ฉันทำอะไรผิดไปอีกหรือเปล่า...?"
63080-15 = "คะ? ฉันใจกว้างเกินไป ก็เลยตามทันยากเหรอคะ?"
63080-16 = "ฮุฮุ ฉันก็สงสัยว่าหมายถึงอะไร ก็แต่ละองค์ประกอบจะยิ่งเปล่งประกายเมื่อมันได้ทำหน้าที่ของตัวเอง#nอย่างเหมาะสมนี่คะ"
63080-17 = "คะ? แล้วสมาชิกสภาน้ำชาต้องสอบจำลองหรือเปล่าน่ะเหรอคะ?"
63080-18 = "จะไม่สอบได้ยังไงล่ะคะ ยิ่งคะแนนของพวกฉันไม่ดี ก็จะยิ่งถูกตั้งคำถามเกี่ยวกับคุณสมบัติที่จะอยู่ใน#nสภาน้ำชาค่ะ"
63080-19 = "แต่ว่าคุณมิกะ คุณเซอา และคนอื่นต่างก็ยอดเยี่ยมกันทั้งนั้น ฉันก็เลยไม่กังวลมากค่ะ"
63080-20 = "คะ? กับคุณเซอาพอเข้าใจได้ แต่เรื่องผลการเรียนของคุณมิกะน่ะเหรอคะ?"
63080-24 = "..."
63080-25 = "คุณครู"
63080-26 = "กรณีของคุณมิกะ คงไม่มีคำอธิบายไหนที่เหมาะสมไปกว่า..."
63080-27 = "'หัวดี แต่ไม่พยายาม' แล้วละค่ะ"
63080-30 = "ฉันว่าคุณครูอาจจะรู้แล้วก็ได้... แต่คุณมิกะไม่ใช่นักเรียนหัวไม่ดีหรอกนะคะ ต้องบอกว่าตรงกันข้ามมากกว่า"
63080-31 = "แต่แค่คุณมิกะ... ไม่พยายามใช้ความฉลาดของตัวเองอย่างจริงจังก็เท่านั้นค่ะ"
63080-32 = "ฉันแค่เดานะคะ... ก็การใช้สมองกับทุกเรื่องก็มันเป็นเรื่องน่ารำคาญนี่คะ..."
63080-35 = "เพราะงั้นไม่ต้องห่วงหรอกค่ะ คุณมิกะจะทำข้อสอบได้ดี... อย่างที่เคยทำมาตลอดค่ะ... เฮ้อ..."
63080-36 = "ถ้าผลการเรียนไม่ดี ก็คงไม่ได้รับเลือกให้มาอยู่ในสภาน้ำชาตั้งแต่แรกหรอกค่ะ ว่ามั้ยคะ?"
63080-37 = "[s] \"นางิสะคงต้องเหนื่อยแย่เลยนะ...\""
63080-38 = "ขอบคุณที่เข้าใจค่ะ..."
63080-39 = "..."
63080-40 = "ท้ายที่สุดแล้ว ไม่ว่าจะตอนนี้หรือตอนไหน สาเหตุที่เกิดเรื่องแบบนี้ขึ้น... ก็มาจากประวัติศาสตร์ของ#nทรินิตี้กับอาเรียสค่ะ"
63080-41 = "ประวัติศาสตร์ของทรีนิตี้กับอาเรียสคล้ายกันมาก แต่กลับมีการตีความที่แตกต่างกันอย่างสิ้นเชิง"
63080-42 = "ประวัติศาสตร์คือผลรวมของข้อเท็จจริงที่เกิดขึ้นจากในอดีต แต่คนที่บันทึกเรื่องราวเหล่านั้นไว้ก็คือ#nมนุษย์ค่ะ"
63080-43 = "..."
63080-44 = "เพราะฉะนั้นแล้ว คุณครูคะ หลังจากสิ้นสุดการสอบครั้งนี้..."
63080-45 = "ฉันตั้งใจว่าจะเปรียบเทียบประวัติศาสตร์ที่บันทึกไว้ในทรีนิตี้กับประวัติศาสตร์ที่บันทึกไว้ในปอร์ตาปาซิส#nทีละประเด็นๆ แล้วจัดตั้งเป็นหอจดหมายเหตุหรือพิพิธภัณฑ์ขึ้นมาค่ะ"
63080-46 = "[s] \"จะไหว... เหรอ?\""
63080-47 = "แน่นอนว่าประวัติศาสตร์ของ 2 ฝ่ายแตกต่างกันมากค่ะ และในกระบวนการเปรียบเทียบนั้น ก็คงมีความขัดแย้งและข้อพิพาทเกิดขึ้นไม่น้อยเลย... ถึงจะเป็นการชั่วคราวก็เถอะค่ะ"
63080-48 = "แต่ถ้าจำเป็น ฉันก็อยากขอมุมมองที่เชี่ยวชาญจากบุคคลที่ 3 ด้วยค่ะ"
63080-49 = "นั่นก็เพราะการเอาชนะอดีต... คือการมองอดีตอย่างกล้าหาญโดยปราศจากอคตินี่คะ"
63080-50 = "ถ้าเป็นเรื่องการตรวจสอบ เปรียบเทียบ หรือวิเคราะห์บันทึกละก็... มีคนที่ยินดีรับงานนี้ค่ะ"
63080-55 = "แต่ถึงยังไงฉันก็เชื่อว่าทรีนิตี้จะเอาชนะความวุ่นวายทั้งหมดนั้นได้"
63080-56 = "ทรีนิตี้ที่ฉันรู้จักไม่ได้อ่อนแอขนาดนั้นหรอกค่ะ"
63080-57 = "แน่นอนว่าในกระบวนการนี้จะเกิดปัญหาทางการเมืองและค่าใช้จ่ายจำนวนมาก..."
63080-58 = "..."
63080-59 = "แต่ในแง่หนึ่ง จะมองว่านั่นเป็นเรื่องที่โฮสต์ของสภาน้ำชา 'เชี่ยวชาญ' ก็ได้นี่คะ"
63080-60 = "[s] \"...\""
63080-61 = "การเมืองก็เป็นอย่างนี้ละค่ะ"
63080-62 = "มันคือกระบวนการที่เราต้องสละสิ่งที่มีอยู่ เพื่อแลกกับสิ่งของจากผู้อื่น"
63080-63 = "และถึงจะเกิดการประนีประนอมและการแลกเปลี่ยนซ้ำแล้วซ้ำเล่า..."
63080-64 = "แต่เราก็ไม่ควรปล่อยคุณค่าใดๆ ก็ตามที่เราอยากปกป้องไปค่ะ"
63080-65 = "การประนีประนอมและการแลกเปลี่ยนครั้งแรกอาจจะง่ายจนน่าประหลาดใจ แต่ในครั้งที่ 2 เป็นสิ่งที่#nหลายคนมักมองข้ามไป"
63080-66 = "และถ้าเป็นแบบนั้น เราก็มักจะลืมไปว่าตัวเองเป็นใครและกำลังพยายามทำอะไรอยู่ค่ะ"
63080-67 = "[s] \"นางิสะอยากปกป้องอะไรเหรอ?\""
63080-71 = "ฉัน..."
63080-72 = "ฉันอยากให้ทรีนิตี้เป็นโรงเรียนที่ดีที่สุดค่ะ"
63080-73 = "ฉันอยากให้นักเรียนทรีนิตี้ภูมิใจในโรงเรียนและมีความเชื่อมั่นในตนเองค่ะ"
63080-74 = "และหลังจากเวลาล่วงเลยไป เมื่อทุกคนคิดถึงช่วงเวลาที่ได้เป็นนักเรียนของทรีนิตี้"
63080-75 = "ฉันหวังว่าทุกคนจะจดจำช่วงเวลานั้นด้วยความสุข เพราะมันช่างล้ำค่าและมีความหมายอย่างแท้จริงค่ะ"
63080-84 = "ฉันหวังว่าทุกประสบการณ์ที่ทรีนิตี้จะเป็นสมบัติล้ำค่าชิ้นเล็กๆ ที่จะช่วยให้นักเรียนแต่ละคน#nพัฒนาตนเองให้ดียิ่งขึ้นค่ะ"
63080-85 = "แน่นอนว่าหนทางยังอีกยาวไกล"
63080-86 = "แต่ถ้าทำได้ ฉันก็อยากให้อะไรแบบนั้นเป็นจริงขึ้นมาค่ะ"
63080-87 = "แต่การจะทำแบบนั้นได้..."
63080-88 = "ฉันว่าเราต้องมองทุกสิ่งรอบตัวด้วยมุมมองที่สุขุมกว่านี้ค่ะ"
63080-89 = "ทั้งหมดนี้ก็เป็นสิ่งที่คุณครูสอนฉันด้วยค่ะ"
63080-90 = "[s] \"นางิสะ\""
63080-91 = "คะ?"
63080-92 = "[s] \"ตอนนั้นครูขอโทษนะ\""
63080-93 = "คะ...?"
63080-94 = "[s] \"ที่ครูยังไม่ค่อยเชื่อใจนางิสะเท่าไร\""
63080-97 = "[ns] \"แล้วก็... ที่ครูพูดจารุนแรงกับนางิสะด้วย\""
63080-99 = "[ns3] \"ทุกอย่างเป็นความผิดของครูเอง\"\n[ns4] \"ครูไม่ควรพูดแบบนั้นไปเลยแท้ๆ\""
63080-103 = "คุณ... ครู...?"
63080-104 = "ทำไมจู่ๆ ถึง... พูดอะไรแบบนั้นล่ะคะ...?"
63080-105 = "ถ้าไม่ได้พูดตอนนี้ ก็คงไม่มีโอกาสได้พูดความจริงกับฉันไปตลอดก็ได้... งั้นเหรอคะ?"
63080-106 = "มะ... ไม่ค่ะ! ไม่ต้องก้มตัวลงแบบนั้นก็ได้...!"
63080-111 = "เอ๋...?"
63080-116 = "ขะ... ขอโทษค่ะ คุณครู ฉัน..."
63080-117 = "[s5] \"ไม่หรอก นางิสะจะทำอย่างนั้นก็ไม่แปลกหรอก\"\n[s6] \"ครูเป็นคนผิด ขอให้ครูได้ขอโทษอีกครั้งเถอะนะ\""
63080-123 = "[ns7] \"ครูควรจะเป็นผู้ใหญ่ที่ดีขึ้นในเร็ววันแท้ๆ\"\n[ns8] \"ครูขอโทษจริงๆ ที่เป็นคุณครูที่ยังไม่โตเป็นผู้ใหญ่พอน่ะ\""
63080-126 = "คุณ... ครู..."
63080-127 = "คุณครู..."
63080-128 = "..."
63080-129 = "ขอโทษนะคะ"
63080-130 = "แต่ช่วยหันหลังกลับไปสักครู่จะได้มั้ยคะ...?"
63080-133 = "(คุณครูหันหลังกลับไปตามคำขอของนางิสะ)"
63080-134 = "(ในระหว่างที่ยืนอยู่อย่างนั้น...)"
63080-139 = "(ก็รู้สึกถึงมือที่แตะเบาๆ บนหลัง...)"
63080-143 = "มันยากลำบากมากเลยค่ะ..."
63080-144 = "[s] \"ขอโทษนะ...\""
63080-145 = "ในตอนนั้น ฉันน่ะ..."
63080-146 = "[s] \"อื้อ...\""
63080-147 = "ฉันคิดอยู่หลายรอบเลยค่ะ"
63080-148 = "แน่นอนว่าเรื่องนั้นเป็นความรับผิดชอบของฉันทั้งหมด"
63080-149 = "แต่ถึงจะเป็นอย่างนั้น แต่ว่า..."
63080-150 = "ทำไมมาตรฐานถึงได้เข้มงวดกับฉันคนเดียวเสียขนาดนี้ล่ะคะ?"
63080-151 = "ฉันเข้าใจว่าฉันคือโฮสต์ของสภาน้ำชาที่ต้องใช้มาตรฐานที่เข้มงวดอยู่แล้ว"
63080-152 = "เรื่องของคุณฮิฟุมิกับคุณโคฮารุ ต่อให้ฉันถูกประณามด้วยถ้อยคำที่รุนแรงกว่านั้น มันก็คงช่วยไม่ได้..."
63080-153 = "แต่ว่า แต่ว่า..."
63080-158 = "ฮือ..."
63080-159 = "(นางิสะเอามือทุบหลังของคุณครูหลายครั้ง ราวกับว่าที่ผ่านมาเธอต้องเจ็บปวดจริงๆ)"
63080-160 = "(ถึงจะไม่รู้สึกเจ็บเท่าไรเพราะเป็นแค่กำปั้นของเด็ก...)"
63080-161 = "(แต่ด้วยเหตุผลบางอย่าง คุณครูกลับยิ่งทุกข์ใจกว่าเดิม...)"
63080-164 = "[ns] \"รู้สึก... ดีขึ้นบ้างมั้ย?\""
63080-165 = "ค่ะ"
63080-166 = "ขอโทษที่ให้คุณครูเห็นด้านที่ไม่น่ามองนะคะ"
63080-167 = "[s] \"ครูขอโทษอีกครั้งนะ...\""
63080-168 = "คุณครูเลิกเอาแต่ขอโทษได้แล้วค่ะ ถ้ายังเป็นแบบนี้ละก็ ฉันคง..."
63080-169 = "..."
63080-170 = "เอาอย่างนี้แล้วกันค่ะ คุณครู"
63080-171 = "ต่อไปเราทั้งคู่ต้องระมัดระวังให้มากกว่าเดิม"
63080-172 = "และจะไม่หยิบยกเรื่องนั้นขึ้นมาพูดอีกถ้าไม่จำเป็น"
63080-173 = "เพื่อเป็นการฉลองและสัญญา เรามาดื่มชาแดงกันสักแก้วมั้ยคะ?"
63080-174 = "[s] \"ขอบใจนะ นางิสะ\""
63080-175 = "ด้วยความยินดีค่ะ"
63080-176 = "[s] \"ถ้างั้นก็... ชนแก้วชา!\""
63080-177 = "ชนแก้ว~"
63080-182 = "[ns] \"กลิ่นดีจังเลยนะ...\""
63080-185 = "แน่นอนอยู่แล้วค่ะ ต้องเป็นแบบนั้นละค่ะ"
63080-189 = "คะ? มีบางอย่างที่ยังไม่ได้พูดกับฉันเกี่ยวกับเรื่อง 'ในตอนนั้น' เหรอคะ...?"
63080-194 = "(แล้วคุณครูก็เล่าเรื่องที่บอกสุบารุไปด้วยอีกคน... ไม่สิ ต้องบอกว่าเป็นเรื่องที่สุบารุได้รับรู้)"
63080-195 = "(และนั่นก็คือเรื่องเกี่ยวกับ... 'ฉันทามติ' ของกลุ่มปาเตอร์กับกลุ่มซางตุสหลังจากเหตุการณ์#nสนธิสัญญาเอเดนให้นางิสะฟัง...)"
63080-198 = "..."
63080-199 = "......"
63080-200 = "........."
63080-201 = "[s] \"คะ... คุณนางิสะ...?\""
63080-202 = "ฮู่ว..."
63080-203 = "[s] \"ฮู่ว...?\""
63080-204 = "ฮุฮุ"
63080-205 = "ฮุฮุฮุฮุ..."
63080-206 = "อย่างนี้นี่เอง เป็นแบบนี้เองสินะคะ มีเรื่องแบบนั้นด้วยสินะ"
63080-207 = "ฉันพอจะเดาได้แล้วค่ะว่า 2 คนนั้นคือใคร พวกเธอส่งรายงานเกี่ยวกับเรื่องนั้นให้ฉันด้วยน่ะค่ะ"
63080-208 = "ขอบคุณมากนะคะ"
63080-209 = "ขอบคุณจากใจจริงเลยค่ะ คุณครู"
63080-210 = "นั่นเป็นข้อมูลที่มีค่ามากเลยละ ฮุฮุฮุฮุฮุ..."
63080-211 = "[s] \"ฮะ... เฮือกกก...\""
63080-212 = "อย่างนี้นี่เอง อย่างนี้สินะคะ มาบอกว่าจะไปจัดการเรื่องนี้เอง แต่สุดท้ายก็ทำอย่างนี้สินะ..."
63080-213 = "แล้วยังแอบไปบิดเบือนรายงานก่อนเอามาส่งด้วย..."
63080-214 = "[s] \"นางิสะ...?\""
63080-215 = "ไม่ต้องกังวลนะคะ คุณครู"

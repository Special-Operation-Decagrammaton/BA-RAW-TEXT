[translation]
63080-1 = "第8話;Tea Time"
63080-2 = "首先，我想針對本次考試的事，再次向老師致上由衷的謝意。"
63080-3 = "[s]「渚也真的辛苦了。」"
63080-4 = "這我實在不敢當……"
63080-5 = "……不。現在就心懷感激地接受老師的肯定吧。"
63080-6 = "關於奧利斯學生們讀書與考試的地點，還請不必擔心。"
63080-7 = "學園內有些名義上屬於三一，但目前無人使用的舊校舍。"
63080-8 = "我打算將那些地方免費租借，讓他們能夠自由使用。"
63080-9 = "[s1]「無人使用的舊校舍……」\n[s2]「免費租借……」"
63080-14 = "為，為何那麼驚訝呢，老師？#n莫非我又做錯了什麼事嗎……？"
63080-15 = "咦？您說我想得太周到了，所以一時有點跟不上？"
63080-16 = "呵呵，還以為您想說什麼呢。#n所有事物都僅有在屬於自己的位置上發揮作用時，才能真正發光發熱。"
63080-17 = "嗯？我們茶會的成員是否也要接受考試？"
63080-18 = "那是當然。#n倘若成績不好，茶會的資格可是會受人懷疑的哦？"
63080-19 = "不過彌香同學與聖亞同學都十分優秀，因此我並不是很擔心。"
63080-20 = "您說聖亞同學姑且不論，彌香同學的成績大致如何……是嗎？"
63080-24 = "……"
63080-25 = "老師。"
63080-26 = "彌香同學的情況……用這句話來形容簡直再貼切不過了。"
63080-27 = "「我們家的孩子其實很聰明，但就是不肯努力」……"
63080-30 = "或許老師您也已經隱約感覺到了……#n彌香同學並非頭腦不好，而是恰好相反。"
63080-31 = "他只是……不太想積極地使用而已。"
63080-32 = "雖然這只是我個人的推測……他也許是覺得每件事都要一一思考很麻煩吧……"
63080-35 = "所以他在考試時總是會考出好成績……一直以來都是如此……#n唉……"
63080-36 = "況且如果成績不好的話，一開始就不會被選為茶會成員了吧？"
63080-37 = "[s]「渚真是辛苦了……」"
63080-38 = "謝謝老師能夠理解……"
63080-39 = "……"
63080-40 = "無論當時還是現在……會發生這種事情，終究與三一和奧利斯的歷史有關吧。"
63080-41 = "雙方的歷史明明完全相同，卻被賦予了截然不同的詮釋。"
63080-42 = "雖然歷史是已發生事實的總和，然而將歷史記錄下來的終究是人。"
63080-43 = "……"
63080-44 = "所以……老師。#n我打算在這次的考試結束之後……"
63080-45 = "將三一與波塔帕西斯記錄的歷史逐一對照，並建造一座類似紀錄館或博物館的設施。"
63080-46 = "[s]「那樣不會有問題嗎？」"
63080-47 = "當然，我相信兩者之間勢必會存在相當大的差異。#n並且在過程之中……衝突與摩擦也會暫時性地增加。"
63080-48 = "如果有必要的話，我也會借助第三方的視角，尋求相關的諮詢與建議。"
63080-49 = "想要克服過去……就必須鼓起勇氣，毫不避諱地正視它才行。"
63080-50 = "對於紀錄的重新調查、對照及研究……也正好有個人會欣然接下這份工作。"
63080-55 = "我相信三一一定能夠克服所有隨之而生的混亂。"
63080-56 = "因為我所認識的三一，並沒有那麼脆弱。"
63080-57 = "當然我也同意在過程之中，勢必會發生許多政治層面的問題與紛擾……"
63080-58 = "……"
63080-59 = "不過某方面來說，那也可以算是茶會主席的「專業」領域吧？"
63080-60 = "[s]「……」"
63080-61 = "所謂的政治，就是這麼一回事。"
63080-62 = "為了從他人那裡得到某樣東西，就必須交出自己擁有的東西。"
63080-63 = "而在反覆妥協與交換的過程中──"
63080-64 = "唯有自己想守護的某種價值，直到最後都不能放手。"
63080-65 = "實際上，妥協與交換意外地並不困難──然而許多人往往會忽略堅守價值的部分。"
63080-66 = "進而導致到了最後……就連自己是誰，以及當初想追求的目標都忘得一乾二淨。"
63080-67 = "[s]「渚想守護的是什麼呢？」"
63080-71 = "我……"
63080-72 = "希望三一能夠成為最好的學園。"
63080-73 = "希望在三一就讀的學生們，能夠為自己身在這所學園感到驕傲。"
63080-74 = "希望在遙遠的將來，當他們回想起在三一度過的學生時代──"
63080-75 = "能夠帶著喜悅的心情，回憶那段寶貴且無可取代的時光。"
63080-84 = "希望在三一經歷的一切，能夠成為幫助學生成為更好的人的……微小而珍貴的寶物。"
63080-85 = "當然，前方還有很長的路要走。"
63080-86 = "假如可以的話，我自己也希望能得到那樣的寶物。"
63080-87 = "不過如果要做到這一點……"
63080-88 = "果然還是必須以更加冷靜且理性的眼光，看待圍繞在我們身邊的一切吧。"
63080-89 = "這些其實也都是老師教會我的。"
63080-90 = "[s]「……渚。」"
63080-91 = "您請說？"
63080-92 = "[s]「那個時候，真的很對不起。」"
63080-93 = "咦……？"
63080-94 = "[s]「當時我遲遲沒有完全相信渚。」"
63080-97 = "[ns]「而且……還對渚說了很過分的話。」"
63080-99 = "[ns3]「全都是我的錯。」\n[ns4]「我不該用那種方式說話的。」"
63080-103 = "老師……？"
63080-104 = "您為何突然……在這種時候說這些……？"
63080-105 = "如果不趁現在的話，可能再也沒有機會坦率地說出口了……？"
63080-106 = "沒，沒事的！您，您不必那樣向我低頭……！"
63080-111 = "咦……？"
63080-116 = "對，對不起，老師。#n我……"
63080-117 = "[s5]「渚會這樣是很正常的，一點也不奇怪。」\n[s6]「做錯事的人是我。請讓我再次向你道歉。」"
63080-123 = "[ns7]「我也得快點成為更像樣的大人才行。」\n[ns8]「有個像我這麼不成熟的老師，真的很抱歉。」"
63080-126 = "老，師……"
63080-127 = "老師……"
63080-128 = "……"
63080-129 = "不好意思……"
63080-130 = "可以麻煩您，暫時別看向這裡嗎……？"
63080-133 = "（依照渚的要求轉過身去）"
63080-134 = "（就這樣站了一會……）"
63080-139 = "（小小的重量，輕輕地落在了背上……）"
63080-143 = "我……真的很難受。"
63080-144 = "[s]「……對不起。」"
63080-145 = "這段時間真的，真的……"
63080-146 = "[s]「嗯……」"
63080-147 = "我反覆思考了無數次。"
63080-148 = "當然，那件事完全是我的責任。"
63080-149 = "可是，可是……"
63080-150 = "為何唯獨對我的標準……是那麼地嚴格呢。"
63080-151 = "我明白身為茶會的主席，理應被用嚴格的標準來檢視。"
63080-152 = "關於日步美同學和小春同學的事……#n就算被說得更加難聽，我也無話可說……"
63080-153 = "但是，但是就算是這樣……"
63080-158 = "嗚……"
63080-159 = "（渚的手一次又一次地輕輕敲在了背上，彷彿訴說著自己這段時間的痛苦一般）"
63080-160 = "（雖然力道微弱地像孩童的拳頭……）"
63080-161 = "（卻不知為何，反而更加令人心痛……）"
63080-164 = "[ns]「稍微好一點了嗎？」"
63080-165 = "嗯。"
63080-166 = "很抱歉讓老師見到如此失態的樣子。"
63080-167 = "[s]「我也再次跟你道歉……」"
63080-168 = "請老師也不要太過自責了。#n要是您一直那樣的話，我也會……"
63080-169 = "……"
63080-170 = "不如這樣吧，老師。"
63080-171 = "往後我們彼此都要再注意一點。"
63080-172 = "有關那件事的話題，以後也要盡量避免提起。"
63080-173 = "為了紀念這個約定……我們就用紅茶來乾杯吧？"
63080-174 = "[s]「謝謝你，渚。」"
63080-175 = "不敢當。"
63080-176 = "[s]「那麼……乾杯！」"
63080-177 = "乾杯～"
63080-182 = "[ns]「香味真不錯呢……」"
63080-185 = "那是當然。否則我可是會很困擾的。"
63080-189 = "嗯？您說關於「那起事件」，還有最後一件事情沒告訴我……？"
63080-194 = "（向渚講述了曾經告訴過昴……不，是昴自己讀取到的那件事）"
63080-195 = "（也就是在伊甸園條約事件之後……與聖父派和聖靈派的「共同意志」有關的事）"
63080-198 = "……"
63080-199 = "…………"
63080-200 = "……………………"
63080-201 = "[s]「渚，渚同學……？」"
63080-202 = "呵。"
63080-203 = "[s]「呵……？」"
63080-204 = "呵呵。"
63080-205 = "呵呵呵呵……"
63080-206 = "原來如此，原來如此。#n原來還發生過這種事啊。"
63080-207 = "關於那兩位的身分，我多少也有頭緒。#n畢竟我這邊也收到了相關的報告。"
63080-208 = "真的……"
63080-209 = "真的由衷感謝您，老師。"
63080-210 = "這是份非常寶貴的情報呢。呵呵呵呵呵……"
63080-211 = "[s]「噫，噫噫……」"
63080-212 = "原來如此，原來如此。#n嘴上跟我說會妥善處理，結果卻把事情辦成那樣啊……"
63080-213 = "而且還把報告書稍微修飾了一下，就這麼交了上來……"
63080-214 = "[s] 「渚……」"
63080-215 = "您不必擔心，老師。"
63080-216 = "這件事我會「圓滿地」處理。"
63080-217 = "真的真的。"
63080-218 = "我會「竭盡全力」處理好，不讓老師擔心的。#n政治這種事，本來就講究名分與時機。"
63080-219 = "比如這樣的欺瞞行為，也可以視作是各派系代表的權威尚未恢復所引起。"
63080-220 = "特別是彌香同學的地位與待遇，想完全回到從前恐怕非常困難。"
63080-221 = "不過至少可以發送一份內部公文，表示經過判斷後，認為稍作改善也並無不妥……"
63080-225 = "（渚一邊說著，一邊露出了神清氣爽的表情……）"
63080-226 = "（不禁讓人感受到了今天最大程度的恐懼……）"
63080-227 = "那麼……老師？#n沉重又令人頭痛的話題就先說到這裡吧。"
63080-228 = "剩下的大約一個小時……您願意和我單獨享受下午茶時光嗎？"
63080-229 = "[s]「我是沒問題，不過為什麼突然……？」"
63080-230 = "該怎麼說呢……"
63080-231 = "比如「老師的發言」……"
63080-232 = "還有我和老師之間微妙的距離感……"
63080-233 = "以及造成那種距離感的種種因素等等。"
63080-234 = "基於上述的這些原因……"
63080-235 = "能讓我向老師索取一點「小小的補償」嗎？"
63080-236 = "[s]「……！」"
63080-241 = "[ns]「剛才不是說好不提那件事了嗎！」"
63080-242 = "哎呀。"
63080-243 = "我並沒有明確指出是什麼樣的發言哦？"
63080-244 = "[s]「被算計了……被渚算計了！」"
63080-245 = "呵呵，究竟是如何呢……？"
63080-246 = "那麼，老師。"
63080-247 = "啊～嗯？"
63080-248 = "[s]「什麼！？！？」"
63080-249 = "老師您……就那麼討厭我嗎……？"
63080-250 = "[s]「被算計了……被渚算計了……」"
63080-251 = "沒錯。這就是我的算計。"
63080-252 = "某種意義上來說……這不也是一種「政治」嗎？"
63080-254 = "（就在承認自己完全落入渚的陷阱……）"
63080-255 = "（正打算接受渚的撒嬌的瞬間！）"
63080-260 = "呀齁，渚醬！你在做什麼呀？"
63080-266 = "彌，彌香同學！？聖亞同學！？！？"
63080-270 = "哦，哦哦！？老師！？#n要，要是知道老師也在的話，我就再稍微……"
63080-271 = "哼～？因為總覺得有股會發生有趣的──#n我是說重要的事情的預感，所以就臨時過來看看……"
63080-272 = "看來似乎是來對了呢。"
63080-274 = "老，老師？怎麼辦！？#n我不想讓那兩位……尤其是彌香同學知道這件事情！"
63080-275 = "[s]（你先冷靜，渚！那個話題已經結束了！）"
63080-276 = "！！！"
63080-277 = "確實如此呢……謝謝您，老師！"
63080-281 = "咳哼。歡迎你們兩位。#n其實老師他臨時造訪了三一學園。"
63080-282 = "真的嗎……？原來是這樣啊。#n那渚醬確實得好好安排一下呢。做得好！"
63080-283 = "嗚嗚……不過要是能先跟我說一聲就更好了……"
63080-287 = "（渚連忙眨眼示意）"
63080-288 = "[ns9]「說的也是。我應該先說一聲的。」\n[ns10]「我突然想見彌香一面，所以才打算給你一個驚喜。」"
63080-293 = "咦，咦咦咦！？真的嗎！？#n那還真讓人開心呢……"
63080-294 = "耶嘿嘿。嘿嘿嘿嘿。老師也真是的。"
63080-299 = "……"
63080-300 = "老師可真是罪孽深重呢。"
63080-301 = "[s11]「我，我什麼都沒做啊！」\n[s12]「冤枉啊！我只是盡可能做到最好而已！」"
63080-302 = "你是認真的嗎……"
63080-303 = "要是意圖與結果總是能達成一致，那該有多好呢……"
63080-304 = "那麼兩位，既然事已至此……要不要一起久違地享受「下午茶時光」呢？"
63080-305 = "正巧老師人也在這裡。"
63080-306 = "嗯，嗯！我舉雙手贊成！"
63080-307 = "咦？這麼說來……我們三個跟老師一起喝下午茶，好像還是第一次？#n不對，之前有喝過了嗎？"
63080-308 = "嗚嗚，我的記憶力好像變差了。#n有種模模糊糊的感覺……該怎麼辦才好呢，老師？"
63080-309 = "那種事情無所謂吧，彌香。"
63080-310 = "重要的是現在，我們一同待在這裡的這個事實。"
63080-311 = "當然對你而言……或許世上大部分的事情，看起來一直都很新鮮吧。"
63080-312 = "聖～亞～醬～？#n你現在是連拐個彎都懶，直接說我記性不好了是吧？"
63080-313 = "雖然記憶力岌岌可危，察言觀色的能力倒是還在呢。#n真是可喜可賀。"
63080-314 = "老是那樣拐彎抹角地說話，小心總有一天會被大家疏遠哦？"
63080-315 = "這就得繼續觀察才能知道了吧？"
63080-316 = "畢竟我現在已經無法讀取未來了啊。"
63080-317 = "你就一定要每句話都回嘴嗎……！"
63080-318 = "……呵。"
63080-320 = "彌，彌香同學？聖亞同學？#n老師現在也在這裡哦……？"
63080-332 = "[ns13]「果然人與人之間的矛盾……」\n[ns14]「沒有那麼容易解決啊……」"
63080-335 = "真的很抱歉，老師……"
63080-337 = "下一話;準備考試"

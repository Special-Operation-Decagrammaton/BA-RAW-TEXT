[translation]
63080-1 = "Episode 8;Teatime"
63080-2 = "First of all, I would like to sincerely thank you again for your role in everything regarding these practice exams."
63080-3 = "[s] \"You worked really hard too, Nagisa.\""
63080-4 = "No, not at all..."
63080-5 = "Apologies, I should gratefully accept your words, Sensei."
63080-6 = "I've already settled the matter of where Arius students will study and take their exams."
63080-7 = "There are some old school buildings that, while Trinity property, are currently unused."
63080-8 = "We would like to lend them to you, free of charge, for the Arius students to use however they desire."
63080-9 = "[s1] \"Unused old school buildings...\"\n[s2] \"Free of charge...\""
63080-14 = "Wh-Why that reaction, Sensei? Did I say something wrong again...?"
63080-15 = "Hm? The breadth of my generosity is so wide-ranging that it's a little hard to keep up with?"
63080-16 = "Fufu. So that's what you meant. Still, every piece only truly shines once it fulfills its intended purpose."
63080-17 = "Oh? You're asking if we Tea Party members are taking the exams?"
63080-18 = "Naturally. If anything, if our grades were poor, people would question whether we deserve to be in the Tea Party."
63080-19 = "But Mika and Seia are both excellent students, so I'm not concerned."
63080-20 = "Huh? You can understand when it comes to Seia, but you're curious about Mika's grades?"
63080-24 = "..."
63080-25 = "Sensei."
63080-26 = "When it comes to Mika... Have you ever heard this phrase?"
63080-27 = "\"My child has so much potential, she just doesn't apply herself.\""
63080-30 = "You may already have noticed this yourself, but Mika is actually quite smart."
63080-31 = "It's just that... She has no desire to make any use of it."
63080-32 = "If I had to guess...I suspect she simply finds it tedious to think through things the way a school wants her to."
63080-35 = "She'll do well on her exams, as she always does."
63080-36 = "You do realize she never would have been chosen for the Tea Party if her grades were poor, don't you?"
63080-37 = "[s] \"You really have your hands full, Nagisa...\""
63080-38 = "Thank you for understanding..."
63080-39 = "..."
63080-40 = "In the end, both back then and now, at the root of all our problems is the long history between Trinity and Arius."
63080-41 = "Trinity and Arius share the same exact history, yet they interpret it in completely different ways."
63080-42 = "History is meant to be an accurate record of events, but the people who record it are fallible."
63080-43 = "..."
63080-44 = "So, Sensei. Once these exams are over..."
63080-45 = "I plan to compare Trinity's recorded history with the history preserved in Porta Pacis, line by line, and establish something of an archive or museum."
63080-46 = "[s] \"Will...that really be okay?\""
63080-47 = "The two records will naturally be vastly different. As we go about comparing them, conflicts and disputes will inevitably arise, at least for a time."
63080-48 = "Even so, if necessary, we'll bring in third parties for objective views and counsel."
63080-49 = "We'll never overcome our past without first looking it straight in the eye."
63080-50 = "When it comes to reexamining, comparing, and researching the records... I already know of someone who would gladly take on that task."
63080-55 = "I truly believe Trinity will be able to overcome all that turmoil."
63080-56 = "The Trinity I know is not that fragile."
63080-57 = "Naturally, I do expect many political issues and debts to surface in the process..."
63080-58 = "..."
63080-59 = "But in a way, that kind of thing is exactly the Tea Party host's \"specialty,\" wouldn't you say?"
63080-60 = "[s] \"...\""
63080-61 = "That's simply the nature of politics."
63080-62 = "It is the process of giving up something of yours in order to gain something someone else has that you need."
63080-63 = "And even as you repeat those compromises and exchanges..."
63080-64 = "...you must never let go of the one core value you wish to protect."
63080-65 = "That first compromise, that first trade, is surprisingly easy. It's the second one that many people stumble on."
63080-66 = "Before they know it, they forget who they are, and what they were striving for."
63080-67 = "[s] \"So what is it that you want to protect, Nagisa?\""
63080-71 = "I..."
63080-72 = "I want Trinity to become the finest academy there ever was."
63080-73 = "I want attending Trinity to be a badge of honor and pride."
63080-74 = "And years from now, when students look back on their school days at Trinity..."
63080-75 = "...I hope they will remember them fondly, as truly precious, irreplaceable times."
63080-84 = "I want every experience they have here to be a small, but cherished, treasure that helps them grow into better people."
63080-85 = "Of course, we still have a very long way to go."
63080-86 = "And, if possible, I'd also like to earn that kind of experience for myself."
63080-87 = "In order to make my dream a reality..."
63080-88 = "We have to see the world around us with much more discerning, unclouded vision."
63080-89 = "You know, I did learn all of this from you, Sensei."
63080-90 = "[s] \"Hey, Nagisa.\""
63080-91 = "Yes?"
63080-92 = "[s] \"About back then... I'm sorry.\""
63080-93 = "For?"
63080-94 = "[s] \"For not trusting you.\""
63080-97 = "[ns] \"And...for being so hard on you.\""
63080-99 = "[ns3] \"It was all my fault.\"\n[ns4] \"I never should have said those things.\""
63080-103 = "S-Sensei...?"
63080-104 = "Why are you saying this now? Out of nowhere?"
63080-105 = "Because if you don't say it now, you thought you might never come clean about it?"
63080-106 = "N-No! Please, you don't have to bow like that...!"
63080-111 = "Ah...?"
63080-116 = "I-I'm sorry, Sensei. I..."
63080-117 = "[s5] \"No. Your reaction is perfectly normal, Nagisa.\"\n[s6] \"I'm the one at fault. Please, let me apologize properly this time.\""
63080-123 = "[ns7] \"I really do need to hurry up and become a proper adult for you all.\"\n[ns8] \"I'm sorry for being so lacking as a teacher.\""
63080-126 = "S-Sensei..."
63080-127 = "Sensei..."
63080-128 = "..."
63080-129 = "I-I'm sorry, but..."
63080-130 = "Could you please...turn around for a moment...?"
63080-133 = "I turned my back to Nagisa, just as she asked."
63080-134 = "I stayed like that for a while..."
63080-139 = "Then, I felt the lightest weight rest very gently on my back."
63080-143 = "I... It was so hard."
63080-144 = "[s] \"...I'm sorry.\""
63080-145 = "All this time, really, truly..."
63080-146 = "[s] \"I know...\""
63080-147 = "I thought about it over and over."
63080-148 = "I accept full responsibility for what happened. I do."
63080-149 = "But... But still..."
63080-150 = "I kept wondering why your standards seemed so much harsher for me than for anyone else."
63080-151 = "I know I'm the Tea Party host, and that strict standards are a given."
63080-152 = "And especially when it came to Hifumi and Koharu, I know I deserved it."
63080-153 = "But even...so..."
63080-158 = "*sob*"
63080-159 = "Nagisa's hand thumped on my back lightly, again and again, as if trying to express just how much she'd been hurting all this time."
63080-160 = "It was as harmless as a child's little fist..."
63080-161 = "And yet, somehow, it hurt even more."
63080-164 = "[ns] \"Feeling a little better?\""
63080-165 = "Yes."
63080-166 = "I'm sorry you had to see me like that."
63080-167 = "[s] \"I really, really am sorry...\""
63080-168 = "Please, don't keep blaming yourself, Sensei. If you keep doing that, I...I'll start to..."
63080-169 = "..."
63080-170 = "Why don't we do this instead, Sensei?"
63080-171 = "From now on, both of us will be a little more careful."
63080-172 = "And we'll endeavor to not bring that incident up again, unless the situation demands it."
63080-173 = "To mark that promise and seal it, how about a toast with some tea?"
63080-174 = "[s] \"Thank you, Nagisa.\""
63080-175 = "Think nothing of it."
63080-176 = "[s] \"All right, then... Cheers!\""
63080-177 = "Cheers!"
63080-182 = "[ns] \"Smells nice...\""
63080-185 = "Of course. It should."
63080-189 = "Oh? Now that I think of it, there was one last thing about the recent incident you wanted to tell me, wasn't there?"
63080-194 = "(What I told Subaru about—rather, what was shared with her from my memory...)"
63080-195 = "I told Nagisa about the so-called \"collective will\" of the Pater and Sanctus factions right after the Eden Treaty incident..."
63080-198 = "..."
63080-199 = "..."
63080-200 = "........."
63080-201 = "[s] \"N-Nagisa...?\""
63080-202 = "Ha."
63080-203 = "[s] \"'Ha'...?\""
63080-204 = "Heehee."
63080-205 = "Hahahaha..."
63080-206 = "I see, I see. I finally understand."
63080-207 = "I can more or less surmise who those two are. They did submit a report to me on the matter as well."
63080-208 = "Truly."
63080-209 = "Truly, from the bottom of my heart, thank you, Sensei."
63080-210 = "You've brought me some very, very valuable information today. Fufufufu."
63080-211 = "[s] \"Aha...ahaha....\""
63080-212 = "So, they assured you that they would take care of all of it, and then handled things as they pleased."
63080-213 = "They even edited parts of the report to bolster their fabrications..."
63080-214 = "[s] \"Nagisa...?\""
63080-215 = "Oh, worry not, Sensei."
63080-216 = "This will be settled smoothly, and quietly."
63080-217 = "Really, truly."
63080-218 = "In fact, if I do my job correctly, you'll never even hear of this again. All you need to manipulate the narrative is pretext and excellent timing."
63080-219 = "For example, one could say this little act of deception occurred because the authority of each faction's acting representative remains permanently damaged."
63080-220 = "Of course, restoring things to the way they were before would be extremely difficult, particularly when it comes to Mika and her position."
63080-221 = "However, it will take little to circulate an internal memo that many are recommending a promotion, at the least."
63080-225 = "Nagisa's sinister cheer grew as she plotted..."
63080-226 = "...I hadn't felt that kind of sheer terror before."
63080-227 = "Well then, Sensei. Why don't we stop here with the heavy, headache-inducing topics?"
63080-228 = "For the remaining hour or so...would you join me for a private teatime, just the two of us?"
63080-229 = "[s] \"I don't mind, but why all of a sudden?\""
63080-230 = "Because..."
63080-231 = "For example, those remarks you made, Sensei."
63080-232 = "Or the subtle distance that exists between you and me."
63080-233 = "Or the many little things that created that distance."
63080-234 = "All of those things..."
63080-235 = "I believe that I would like to be compensated for them."
63080-236 = "[s] \"...!\""
63080-241 = "[ns] \"Hey, we agreed not to talk about that!\""
63080-242 = "Oh, my."
63080-243 = "Did I specify which remarks...exactly?"
63080-244 = "[s] \"This is what you wanted from the beginning, Nagisa!\""
63080-245 = "Fufu. And if it was?"
63080-246 = "What will you do, Sensei?"
63080-247 = "Aww."
63080-248 = "[s] \"What?!?!\""
63080-249 = "...Do you dislike me that much...?"
63080-250 = "[s] \"...This really is what you wanted...from the beginning, Nagisa...\""
63080-251 = "Yes, it was."
63080-252 = "In a way, isn't this also a form of politics?"
63080-254 = "Admitting that I'd fallen perfectly into her trap..."
63080-255 = "...I was just about to give in to Nagisa's spoiled demands, when...."
63080-260 = "Yo, Nagi! What're you up to?"
63080-266 = "M-Mika?! Seia?!?!"
63080-270 = "Wh-Whoa?! Sensei??! I didn't know...! I would've gotten ready a little if I knew you were gonna be here..."
63080-271 = "Oho. Here I was simply following a...feeling, of sorts, that something fun, or perhaps important, would happen here and dropped by unannounced."
63080-272 = "And yet, it would seem my intuition was correct."
63080-274 = "S-Sensei, what do we do?! There are things...things that I especially don't want Mika to know about!"
63080-275 = "[s] (Relax, Nagisa! We've already moved on from that topic!)"
63080-276 = "Ack!!"
63080-277 = "Th-That's correct. Thank you, Sensei."
63080-281 = "Ahem. Welcome, you two. Sensei paid us an unexpected visit."
63080-282 = "Huh? Really? Oh, that makes sense. Of course, Nagi would still manage to get things set up! Good job!"
63080-283 = "Um...still, I'd have preferred if you would've given me a heads up."
63080-287 = "Nagisa's wink and pointed look may not have been quite as subtle as she thought."
63080-288 = "[ns9] \"Yeah, you're right. I probably should've.\"\n[ns10] \"It's just...I suddenly really wanted to see Mika, so I thought I'd surprise her.\""
63080-293 = "Wh-Whoa, r-really?! Me? I-I'm really happy to hear that."
63080-294 = "Eheehee. Heeheehee. Sensei, you're too much."
63080-299 = "..."
63080-300 = "You truly are a grievously sinful person, Sensei."
63080-301 = "[s11] \"I-I didn't do anything!\"\n[s12] \"I'm innocent! I was just doing my best!\""
63080-302 = "Are you serious...?"
63080-303 = "The world would be a wonderful place if intent and impact were always aligned."
63080-304 = "Well then, since things turned out this way, shall we all have a long-overdue teatime together?"
63080-305 = "Especially since Sensei is here with us."
63080-306 = "Yeah, yeah! I'm all for it!"
63080-307 = "Huh? Come to think of it...is this our first teatime with all three of us plus Sensei? Or have we ever...?"
63080-308 = "Maybe my memory's getting worse. Everything's so fuzzy... What do I do, Sensei?"
63080-309 = "You're not QUITE at that point yet, Mika."
63080-310 = "What matters is that we're all here together, now."
63080-311 = "Of course, to you, it might feel like almost everything in the world is always fresh and new."
63080-312 = "Seia? You basically just turned around and told me my memory's bad straight to my face, didn't you?"
63080-313 = "I'm relieved. Even if your memory's in danger, at least your instincts are still sharp."
63080-314 = "If you keep twisting people's words like that, people might not put up with it anymore one day!"
63080-315 = "That remains to be seen, doesn't it?"
63080-316 = "More importantly, how would I know? I can't see the future anymore."
63080-317 = "You just have to get the last word in, don't you? Every! Single! Time!"
63080-318 = "...Hmph."
63080-320 = "M-Mika? Seia? Remember, Sensei is present at the moment."
63080-332 = "[ns13] \"Indeed, conflict between two people...\"\n[ns14] \"...is not something that can be easily resolved.\""
63080-335 = "I'm terribly sorry, Sensei..."
63080-337 = "Next Episode;Exam Prep"

63080-41 = "3;나기사;02;트리니티와 아리우스의 역사는, 완전히 같으면서도 완전히 다른 해석을 갖고 있습니다."
63080-42 = "3;나기사;19;역사는 일어난 사실의 총합이지만, 그것을 기록하는 것은 사람이니까요."

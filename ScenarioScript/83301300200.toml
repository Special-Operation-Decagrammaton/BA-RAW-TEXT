[translation]
83301300200-6 = "委員長！聽說您遭遇了戰鬥，您沒事吧！"
83301300200-7 = "我沒事。"
83301300200-8 = "究竟發生了什麼呢？"
83301300200-9 = "我在追蹤溫泉開發部的線索，後來發現他們在地下道策畫可疑的陰謀。"
83301300200-10 = "從情報來看，這一切……似乎和「格黑娜咕嘟咕嘟大作戰」有關係。"
83301300200-11 = "「格黑娜咕嘟咕嘟大作戰」……？"
83301300200-12 = "好像是想要開鑿格黑娜最完美溫泉的計畫。"
83301300200-13 = "想要開鑿格黑娜最完美溫泉的……？"
83301300200-14 = "那個……您不是在開玩笑吧……？"
83301300200-15 = "……？"
83301300200-16 = "沒，沒什麼！"
83301300200-17 = "總之關於地下道的事，我已經和那邊的作業班長做過了結了。"
83301300200-18 = "真正主導這次事件的溫泉開發部部長．佳澄的蹤跡還是個謎。"
83301300200-20 = "啊，關於溫泉開發部部長的行蹤，我派遣風紀委員們四處展開調查之後……"
83301300200-27 = "收到了真琴議長可能知道他行蹤的消息。"
83301300200-28 = "真琴……？"
83301300200-29 = "是的，據說去委託溫泉開發時好像曾說過「要親自去一趟目前溫泉開發部的據點」。"
83301300200-30 = "……原來如此。"
83301300200-31 = "如果早就知道的話，在我們開始追查的時候就該講清楚才對吧……！#n害我們白跑一趟！"
83301300200-32 = "就算你這麼說，你覺得他會老實說出來嗎？"
83301300200-33 = "啊……說的也是。"
83301300200-34 = "我知道了，我會親自和議長談談。"

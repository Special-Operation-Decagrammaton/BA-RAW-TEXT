83301300200-27 = "3;아코;09;아무래도 마코토 의장이, 그 행적을 알고 있을 수도 있다는 첩보를 입수했어요."
83301300200-28 = "3;히나;05;마코토가………?\n#3;em;[반응]"
83301300200-29 = "3;아코;06;네. 온천개발을 의뢰하러 갈 때. 직접 스스로 <현재 온천개발부가 아지트로 삼고 있는 곳에 다녀오겠다.>라고 말했던 모양이에요."
83301300200-30 = "3;히나;99;……과연.\n#3;em;[…]"
83301300200-31 = "3;아코;14;그런 걸 알고 있었으면 저희가 쫓을 때부터 알려줬으면 좋았을 텐데……! 괜한 걸음을 하게 만들고 말이죠!\n#3;em;[스팀]\n#3;hophop"

83301300200-5 = "3;아코;09\n#3;a\n#wait;1000"
83301300200-6 = "3;아코;05;부장님! 전투를 했다고 들었습니다. 괜찮으신가요?!\n#3;em;[!]\n#3;jump"
83301300200-7 = "5;히나;01;나는 괜찮아.\n#5;a\n#3;m1"
83301300200-8 = "3;아코;09;대체 무슨 일이었던 건가요?"
83301300200-9 = "5;히나;02;온천개발부의 단서를 추적하다가 온천개발부가 지하도에서 무언가 수상한 일을 꾸미는 걸 발견했어."
83301300200-10 = "5;히나;99;정보에 따르면 그 전부가…… <게헨나 부글부글 대작전>과 관련된 일이라는 모양이야."
83301300200-11 = "3;아코;04;<게헨나 부글부글 대작전>…………?\n#3;em;[?]"
83301300200-12 = "5;히나;05;게헨나에서 가장 완벽한 온천을 만들기 위한 계획이라는 모양이야."
83301300200-13 = "3;아코;12;게헨나에서 가장 완벽한 온천을 만들기 위한………?\n#3;stiff"
83301300200-14 = "3;아코;04;저기…… 농담, 은 아니신 거죠……?\n#3;em;[땀]"
83301300200-15 = "5;히나;01;………?\n#5;em;[?]"
83301300200-16 = "3;아코;04;아, 아무것도 아니에요!\n#3;jump"
83301300200-17 = "5;히나;99;뭐, 어쨌거나 지하도에서 벌어지고 있던 일에 대해선, 그쪽의 작업반장과 어떻게든 매듭을 지은 참이지만.\n#5;m3\n#3;dl"
83301300200-18 = "5;히나;01;정작 이번 일을 손수 이끌고 있는 온천개발부 부장. 카스미의 행적이 아직이야."
83301300200-19 = "#all;hide"
83301300200-20 = "3;아코;02;아, 바로 그 온천개발부 부장의 행적과 관련해서 말인데요. 선도부원들을 풀어서 이곳저곳에서 정보를 알아본 결과."

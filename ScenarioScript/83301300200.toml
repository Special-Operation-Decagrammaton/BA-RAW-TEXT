[translation]
83301300200-6 = "ท่านประธาน! ได้ยินว่ามีการต่อสู้เหรอคะ เป็นยังไงบ้างคะ?!"
83301300200-7 = "ฉันไม่เป็นไรหรอก"
83301300200-8 = "นี่มันเรื่องอะไรกันเหรอคะ?"
83301300200-9 = "ฉันไปหาเบาะแสจากชมรมพัฒนาออนเซ็นจนรู้ว่าพวกนั้นกำลังทำอะไรที่น่าสงสัยอยู่ใต้ดินน่ะ"
83301300200-10 = "จากข้อมูลที่ได้มา ทั้งหมดนั่นน่าจะเกี่ยวกับ <ยุทธการเกเฮนน่าเดือดปุดๆ>"
83301300200-11 = "<ยุทธการเกเฮนน่าเดือดปุดๆ>...?"
83301300200-12 = "ดูเหมือนว่าจะมีการวางแผนสร้างออนเซ็นที่สมบูรณ์แบบที่สุดในเกเฮนน่าน่ะ"
83301300200-13 = "ออนเซ็นที่สมบูรณ์แบบที่สุดในเกเฮนน่า...?"
83301300200-14 = "นี่... ไม่ได้ล้อกันเล่นใช่ไหมคะ...?"
83301300200-15 = "......?"
83301300200-16 = "มะ... ไม่มีอะไรค่ะ!"
83301300200-17 = "เอาเถอะ เรื่องที่เกิดขึ้นใต้ดินตอนนี้น่ะ ฉันก็ว่าจะไปตรวจสอบหัวหน้างานของทางนั้น"
83301300200-18 = "แต่ว่าคาสุมิ หัวหน้าชมรมพัฒนาออนเซ็นที่เป็นตัวตั้งตัวตีของเรื่องนี้ ฉันยังไม่รู้ว่าเธอไปอยู่ที่ไหน"
83301300200-20 = "อ้อ สำหรับเรื่องร่องรอยของหัวหน้าชมรมพัฒนาออนเซ็น จากที่ฉันให้คณะกรรมการวินัยหลายคนไป#nหาข้อมูลมาจากที่ต่างๆ"
83301300200-27 = "มีแหล่งข่าวบอกมาว่าประธานมาโคโตะอาจจะรู้อยู่ก็ได้ค่ะว่าเธออยู่ที่ไหน"
83301300200-28 = "มาโคโตะเหรอ...?"
83301300200-29 = "ค่ะ ดูเหมือนว่าตอนที่ประธานมาโคโตะไปขอให้มีการพัฒนาออนเซ็น เธอพูดเอาไว้ว่า <จะออกไปที่#nกองบัญชาการของชมรมพัฒนาออนเซ็น> ค่ะ"
83301300200-30 = "งั้นเหรอ..."
83301300200-31 = "ถ้ารู้เรื่องนั้นก็ควรจะบอกกันตั้งแต่ที่พวกเราไปไล่ตามแล้วสิ...! ทำไมถึงทำให้เราทำงานช้าด้วยก็ไม่รู้!"
83301300200-32 = "แต่ถึงจะรู้จริงๆ คิดว่าพวกนั้นจะบอกเหรอ?"
83301300200-33 = "อ่า... นะ... นั่นสินะคะ"
83301300200-34 = "ฉันจะไปคุยกับประธานของทางนั้นด้วยตัวเอง"

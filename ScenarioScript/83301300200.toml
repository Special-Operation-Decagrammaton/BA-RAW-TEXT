[translation]
83301300200-6 = "Head Prefect, are you well? I heard you were in combat."
83301300200-7 = "I'm fine."
83301300200-8 = "What happened?"
83301300200-9 = "I was investigating the Hot Springs Department and found one of their work parties up to something suspicious in the Gehenna underground."
83301300200-10 = "From what I've learned... It's all related to Operation Gehenna Bubble."
83301300200-11 = "Gehenna...Bubble?"
83301300200-12 = "Supposedly, it's a plan to bring the ultimate hot spring to Gehenna."
83301300200-13 = "All this secrecy to create another hot spring in Gehenna?"
83301300200-14 = "Um... You're not joking, are you?"
83301300200-15 = "...?"
83301300200-16 = "N-Never mind!"
83301300200-17 = "Regardless, by interrogating their Task Leader I was able to form some preliminary conclusions."
83301300200-18 = "But I have yet to find any signs of Kasumi, the Hot Springs Department's president."
83301300200-20 = "Ah, regarding her whereabouts... I've sent out the Prefect Team to find any information they can."
83301300200-27 = "They reported that Chairmain Makoto might know a way to find her."
83301300200-28 = "Makoto...?"
83301300200-29 = "Yes. Supposedly she said something like, \"I'll be visiting the Hot Springs Department's current hideout myself,\" after ordering some hot spring development."
83301300200-30 = "...I see."
83301300200-31 = "She could have told us before we wasted time tracking them down and saved us the trouble!"
83301300200-32 = "Even if she does know, do you really think she would volunteer information to us?"
83301300200-33 = "...No. I suppose you're right..."
83301300200-34 = "I'll go call upon the chairman myself."

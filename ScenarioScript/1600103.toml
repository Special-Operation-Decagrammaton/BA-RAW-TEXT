1600103-107 = "What the...? Did it hit something?"
1600103-109 = "...?"
1600103-110 = "D-Damn it! I knew they were tailing us!"
1600103-111 = "We're so screwed. Abort the plan...!"
1600103-112 = "Damn it all. We won't forget this, C&C!"
1600103-115 = "..."
1600103-116 = "...?"
1600103-118 = "What was that all about?"

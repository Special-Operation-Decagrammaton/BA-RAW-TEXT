[translation]
1600103-1 = "偶然的跟蹤約會"
1600103-2 = "啊，主人──！這邊這邊！我在等你唷！"
1600103-3 = "謝謝主人這麼忙還過來！果然主人最好了！"
1600103-4 = "[s1] 「發生什麼事了？」\n[s2] 「如果是明日奈叫我的話，那是當然的囉。」"
1600103-5 = "我需要主人的幫忙！！"
1600103-6 = "真的嗎！？哇──！主人最棒了！！"
1600103-7 = "您問要幫什麼忙？那個，就是……"
1600103-8 = "……要幫什麼呢？"
1600103-9 = "啊哈哈，抱歉，我還沒仔細想過呢！"
1600103-10 = "[s] 「……？？？」"
1600103-11 = "……嗯？怎麼露出那種表情呢，主人？"
1600103-12 = "你問我是真的需要幫忙嗎……？當然囉！只是還沒想到具體的細節而已！"
1600103-13 = "今天是難得沒有任務也不用上課的日子呀。"
1600103-14 = "這種時候就需要找個人在一起對吧？這樣的話對我來說這個對象當然就只有主人不是嗎？"
1600103-15 = "你說這是約會的邀請嗎……？"
1600103-16 = "唔──嗯，怎麼說呢，雖然確實是想要主人在我身邊……"
1600103-17 = "……嗯！想想應該就是這樣沒錯！那就決定了，主人願意的話就跟明日奈來約會吧！"
1600103-18 = "來吧來吧！我們就別浪費時間了趕快走吧！主人！"
1600103-21 = "好，出發──！！"
1600103-23 = "（在我說話之前，就被明日奈握住手腕拉走了）"
1600103-25 = "所以說只要在這附近埋伏，把經過的學生……"
1600103-26 = "原來如此，聽起來不錯。這還真是完美的……"
1600103-27 = "……等，等等！在那邊的不是C&C的女僕嗎？"
1600103-29 = "～♪～♬"
1600103-32 = "還真的是……！嘖，被那些傢伙抓到就麻煩了，總之先換個地方吧。"
1600103-38 = "……嗯？剛才有人在叫我嗎？好像聽到了什麼……"
1600103-39 = "……是錯覺嗎？"
1600103-40 = "……算了，現在那些都無所謂！不在意不在意！"
1600103-41 = "我們快走吧，主人！今天要盡量去多點地方才行！"
1600103-43 = "（就這麼被明日奈抓著，到處逛了起來）"
1600103-45 = "這裡的話總算可以……"
1600103-48 = "……什麼！？那傢伙是剛才的女僕！跟我們走同一個方向嗎，可惡，撤退！"
1600103-51 = "主人，你看那個！我從以前就想要一起玩了！"
1600103-52 = "咦，主人有玩過這個遊戲嗎？那真是剛好，跟我玩玩看吧！"
1600103-53 = "嗯？怎麼玩？嗯……我完全不會呀？"
1600103-54 = "哎呀，這種東西憑直覺就可以了！況且現在誰贏也沒有那麼重要嘛。"
1600103-55 = "……我和主人能一起玩才重要，對吧？"
1600103-56 = "好！那就開始囉！！"
1600103-57 = "（因為是玩了挺久的遊戲，所以多少有點自信的）"
1600103-59 = "（……結果被打得體無完膚了）"
1600103-63 = "奇怪了，為什麼走到哪都有那傢伙在……難道我們被跟蹤了嗎……"
1600103-64 = "又，又來了！可惡……快逃！"
1600103-67 = "是遊樂園──！我還是第一次像這樣普通地來遊樂園呢！"
1600103-68 = "嗯？你說之前因為任務而來的時候，不是也搭過遊樂設施了嗎？"
1600103-69 = "我說的普通是指像這樣兩人單獨來。"
1600103-70 = "所以就像剛剛說的一樣，不管要做什麼都沒關係的！"
1600103-71 = "只要能跟主人一起，就很快樂又開心。不管是在遊戲中心還是遊樂園都一樣！"
1600103-72 = "只要能跟主人一起，就算只是散步都很開心的。"
1600103-73 = "……雖然不是想要證明這點，但要不要在這附近走走呢？主人的腳會不會痛呢？"
1600103-74 = "[s] 「不會喔，沒事的。」"
1600103-75 = "好！那就到太陽下山為止兩個人到處走走吧！！不要脫隊了唷！"
1600103-76 = "啊，不過如果走到腳痛了的話要跟我說喔，我會背您的！"
1600103-78 = "（明日奈這麼說完後，便開心地走了起來）"
1600103-80 = "（……結果我途中就耗盡了體力，只好讓明日奈背著我了）"
1600103-82 = "啊！真～～～～是太開心了！謝謝您！"
1600103-83 = "嗯？主人，您剛剛說什麼？"
1600103-84 = "……該放您下來了？很在意周圍的視線？"
1600103-85 = "是嗎？機會難得就讓他們看個夠吧！"
1600103-86 = "唔──嗯，既然您都這麼說了……嘿咻。"
1600103-89 = "怎麼樣？腳還好嗎？"
1600103-90 = "[s] （一邊點頭一邊把拿著的飲料給明日奈）"
1600103-91 = "啊，是能量飲料！要給我嗎？謝謝主人──！"
1600103-92 = "（咕嚕，咕嚕……）"
1600103-93 = "呼哇～！好涼快～！！"
1600103-94 = "我喜歡這個──，很好喝呢。"
1600103-95 = "……真的很喜歡。真神奇呢……"
1600103-96 = "就算是已經見過的景色，只要跟主人在一起就完全不一樣呢。"
1600103-97 = "果然主人對我來說是特別的呢。"
1600103-98 = "啊哈……大概就是這種感覺。"
1600103-99 = "……那時間也不早了，主人也該回去了對吧？"
1600103-100 = "機會難得，要不要背您回去呀？嗯？不喜歡？"
1600103-101 = "啊哈哈哈哈！開玩笑的啦，開玩笑！"
1600103-102 = "那就把這個喝完的飲料罐往垃圾桶發射──！"
1600103-104 = "（咻──）"
1600103-105 = "哎呀，好像太遠了……"
1600103-106 = "（哐──！！）"
1600103-107 = "……嗯？好像有什麼怪聲，砸到什麼了嗎？"
1600103-109 = "……？"
1600103-110 = "好痛……！？可惡！果然全都被掌握住了嗎！"
1600103-111 = "不行了，這次就放棄吧……！"
1600103-112 = "可惡！給我記住啊C&C……！！"
1600103-115 = "……"
1600103-116 = "……？"
1600103-118 = "……那些人，是誰？"

[translation]
1600103-1 = "เดตที่เผลอแอบตามโดยไม่ได้ตั้งใจ"
1600103-2 = "ยะฮู้ว! นายท่าน! ทางนี้ ทางนี้! กำลังรออยู่เลย!"
1600103-3 = "ขอบคุณที่มาหาแม้ว่าจะงานยุ่งนะ นายท่านเนี่ย เยี่ยมไปเลย!"
1600103-4 = "[s1] \"มีเรื่องอะไรเหรอ?\"\n[s2] \"อาสึนะเป็นคนชวนทั้งที ครูต้องมาอยู่แล้ว\""
1600103-5 = "ฉันรู้ว่านี่มันกะทันหันมากไป แต่ฉันอยากให้นายท่านมาช่วยหน่อยน่ะ!"
1600103-6 = "จริงเหรอ?? ว้าว! นี่สินายท่านของฉัน!!"
1600103-7 = "สงสัยใช่มั้ยว่าฉันอยากให้ช่วยอะไร? อืม..."
1600103-8 = "นั่นสินะ...?"
1600103-9 = "จริงๆ ฉันเองก็ยังไม่ได้ลองคิดดูอย่างจริงจังเลย!"
1600103-10 = "[s] \"...???\""
1600103-11 = "...เอ๋? ทำไมทำหน้าแบบนั้นล่ะนายท่าน?"
1600103-12 = "ไม่เชื่อว่าฉันอยากให้นายท่านมาช่วยเหรอ? ไม่ใช่อย่างนั้นสักหน่อย!#nเรื่องให้ช่วยน่ะมีแน่ แค่ยังไม่ได้คิดน่ะ!"
1600103-13 = "วันนี้เป็นวันที่ฉันไม่มีเรียน แล้วก็ไม่มีภารกิจให้ทำด้วย"
1600103-14 = "แน่นอนอยู่แล้วไม่ใช่เหรอว่าวันว่างๆ แบบนี้เราต้องมีคนอยู่ด้วย?#nและสำหรับฉัน คนคนนั้นก็คือนายท่านไงล่ะ!"
1600103-15 = "หืม? คิดว่าฉันขอให้มาเดตด้วยเหรอ?"
1600103-16 = "อืม~ ก็ไม่รู้สินะ จริงๆ แค่คิดว่าวันนี้อยากอยู่กับนายท่านก็เท่านั้น..."
1600103-17 = "อืม... แต่ก็อาจจะใช่ก็ได้? ถ้านายท่านไม่ว่าอะไร อาสึนะก็เอาด้วย!"
1600103-18 = "เอาล่ะๆ เรามีเวลาไม่มาก! รีบออกไปกันเถอะ! นายท่านไปด้วยกันได้ใช่มั้ย?"
1600103-21 = "ไปกันเล้ยย!!"
1600103-23 = "(ยังไม่ทันได้พูดอะไรก็โดนอาสึนะก็ดึงแขนออกไปข้างนอกแล้ว)"
1600103-25 = "เพราะฉะนั้นถ้าเราจับพวกนักเรียนที่ผ่านไปผ่านมาแถวนี้ได้..."
1600103-26 = "อื้ม อื้ม แบบนี้เยี่ยมไปเลย นี่มันสมบูรณ์แบบเลยนะ...?"
1600103-27 = "......! ดะ...เดี๋ยวก่อน! เด็กคนนั้นมัน... เด็กเมด C&C ไม่ใช่เหรอ?"
1600103-29 = "ลั้นลา~♬~♪"
1600103-32 = "ชะ.. ใช่จริงด้วย ซวยแล้วสิ ถ้าโดนจับได้คงโดนเล่นงานแย่แน่ รีบออกไปจากที่นี่กันเถอะ!"
1600103-38 = "เดี๋ยวนะ? เมื่อกี้มีคนพูดถึงพวกเราหรือเปล่า? ฉันว่าฉันได้ยินบางอย่างนะ..."
1600103-39 = "หรือว่าจะคิดไปเอง...?"
1600103-40 = "...แต่ก็ช่างเถอะ วันแบบนี้ต้องพักผ่อนสิ!"
1600103-41 = "รีบไปเถอะนายท่าน! วันนี้ฉันอยากไปเที่ยวเล่นให้ได้มากที่สุดเลย!"
1600103-43 = "(อาสึนะควงแขนเดินไปข้างหน้าอย่างมั่นใจ)"
1600103-45 = "คราวที่แล้วเราทำไม่สำเร็จ แต่คราวนี้เราต้อง..."
1600103-48 = "......!? นั่นมันเด็กที่เจอเมื่อกี้นี่! มาทางนี้อีกแล้ว!? โธ่เอ๊ย! วิ่งสิรออะไร!"
1600103-51 = "นายท่าน ทางนี้! ฉันมีเกมที่อยากเล่นกับนายท่านอยู่พอดี!"
1600103-52 = "โอ้วว! นายท่านก็รู้จักเกมนี้เหรอ? ดีเลย! มาดวลกัน!!"
1600103-53 = "หืม? สงสัยว่าฉันเล่นเป็นมั้ยงั้นเหรอ? ไม่เป็นอยู่แล้วสิ ก็ฉันเพิ่งเริ่มเล่นวันนี้นี่?"
1600103-54 = "มาหัดเล่นเอาหน้างานก็ได้ไม่ใช่เหรอ? อีกอย่าง มันสำคัญด้วยเหรอว่าใครจะชนะ?"
1600103-55 = "...สิ่งสำคัญคือฉันกับนายท่านได้เล่นเกมด้วยกันต่างหากล่ะ"
1600103-56 = "เอาล่ะ! งั้นมาเริ่มกันเลย!!"
1600103-57 = "(รับคำท้าของอาสึนะอย่างมั่นใจเพราะเป็นเกมที่เคยเล่นมาแล้ว)"
1600103-59 = "(คุณครูแพ้อาสึนะทุกเกม...)"
1600103-63 = "แปลกจัง... นี่เราโดนไล่ล่าอยู่จริงมั้ยเนี่ย...?"
1600103-64 = "มาอีกแล้ว! เวรแล้ว! ...รีบหนีเร็ว!"
1600103-67 = "สวนสนุกนี่นา! ฉันไม่เคยมาสวนสนุกแบบนี้มาก่อนเลย!"
1600103-68 = "หืม? คิดว่าฉันไม่เคยมาเลยงั้นเหรอ? ไม่หรอก ฉันเคยมาทำภารกิจที่สวนสนุก แล้วก็ไปเล่น#nเครื่องเล่นด้วย"
1600103-69 = "ที่บอกว่าไม่เคยมาสวนสนุกแบบนี้ หมายถึงมากับนายท่านต่างหากล่ะ"
1600103-70 = "เมื่อกี้ก็บอกไปแล้วนี่นา ไม่สำคัญหรอกว่าเราจะทำอะไร"
1600103-71 = "ถ้าได้อยู่กับนายท่าน ทุกอย่างที่ทำก็พิเศษไปหมดนั่นแหละ ไม่ว่าจะที่ร้านเกมหรือสวนสนุก!"
1600103-72 = "จริงๆ แค่ได้เดินเล่นกับนายท่านเฉยๆ ก็สนุกแล้วล่ะ"
1600103-73 = "จริงสิ งั้นเราไปเดินเล่นกันมั้ย? นายท่านไม่เจ็บขาใช่มั้ย?"
1600103-74 = "[s] \"อื้ม\""
1600103-75 = "ดีเลย! งั้นไปเดินเล่นกันจนตะวันตกดินเลย!! ตามมาเลย!"
1600103-76 = "แต่ว่าถ้าเริ่มเจ็บขาก็บอกฉันเลยนะ ห้ามฝืนล่ะ เข้าใจมั้ย? แล้วฉันจะแบกไปเอง!"
1600103-78 = "(พูดจบอาสึนะก็เดินไปอย่างมั่นใจ)"
1600103-80 = "(สุดท้ายก็หมดแรงจนต้องให้อาสึนะแบกกลับมาโรงเรียน)"
1600103-82 = "อ่า! วันนี้สนุกมากกกกกเลย~! ชอบวันแบบนี้ที่สุด!"
1600103-83 = "หือ? เมื่อกี้นายท่านพูดว่าอะไรนะ?"
1600103-84 = "ให้ฉันปล่อยลงเหรอ? กลัวคนอื่นจะมองไม่ดีงั้นเหรอ?"
1600103-85 = "ทำไมล่ะ? จะไปสนใจทำไม?"
1600103-86 = "อืม~ ก็ได้ ฉันไม่เข้าใจว่าทำไมต้องแคร์คนอื่น แต่ในเมื่อนายท่านต้องการ... ก็ได้ ฮึบ!"
1600103-89 = "เป็นยังไงบ้าง? ขาที่เจ็บดีขึ้นหรือยังน่ะ?"
1600103-90 = "[s] (ยื่นเครื่องดื่มที่ซื้อมาให้อาสึนะ)"
1600103-91 = "ว้าว! เครื่องดื่มชูกำลังนี่นา? ให้ฉันเหรอ? ขอบคุณนะนายท่าน!"
1600103-92 = "(อึกๆๆ)"
1600103-93 = "ฮ่าา! สดชื่น!"
1600103-94 = "......"
1600103-95 = "ดีจังเลย... หายเหนื่อยเลยล่ะ"
1600103-96 = "จริงๆ กิจกรรมที่ทำในวันนี้ก็ไม่ได้ต่างจากปกติเท่าไหร่ แต่พอมีนายท่านอยู่ด้วยก็รู้สึกต่างกันไปเลย"
1600103-97 = "หรือว่านายท่านมีบางอย่างที่... พิเศษกันนะ?"
1600103-98 = "ฮิฮิ... ฉันก็แค่รู้สึกแบบนั้นน่ะ"
1600103-99 = "...นี่ก็ค่ำแล้ว นายท่านจะต้องกลับแล้วใช่มั้ย?"
1600103-100 = "ไหนๆ ฉันก็แบกมาถึงที่นี่แล้ว ให้ฉันแบกไปส่งถึงบ้านเลยดีมั้ย? หืม? ไม่เอาเหรอ?"
1600103-101 = "ฮ่ะฮ่ะฮ่ะฮ่าา! ฉันแค่แกล้งเล่นน่ะ!"
1600103-102 = "ขอโยนกระป๋องลงถังขยะก่อนแล้วกัน!"
1600103-104 = "ฟิ้วววว!"
1600103-105 = "อ้าว... เลยถังขยะไปจนได้"
1600103-106 = "แกร๊งง!!"
1600103-107 = "หืม? ฉันโยนไปโดนอะไรเข้าเหรอ?"
1600103-109 = "......?"
1600103-110 = "โธ่เอ๊ยยย! ยัยเด็กนี่แอบติดตามฉันมาจริงด้วย!"
1600103-111 = "งั้นก็ช่วยไม่ได้ ครั้งนี้สงสัยต้องหนี...!"
1600103-112 = "ฮึ่มม! จำไว้เลยนะ!! แล้วฉันจะมาเอาคืนแน่ เจ้าพวก C&C...!!"
1600103-115 = "......"
1600103-116 = "......?"
1600103-118 = "พวกนั้นเป็นใครกันน่ะ...?"

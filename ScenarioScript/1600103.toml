[translation]
1600103-1 = "Date Tracking"
1600103-2 = "Yoohoo, Master! Over here! I've been waiting for you!"
1600103-3 = "Thanks for making time for me despite how busy you are. You're the best!"
1600103-4 = "[s1] \"What's this all about?\"\n[s2] \"You asked, so of course I came.\""
1600103-5 = "I know it's sudden, but I need your help!"
1600103-6 = "Really?! There really isn't anyone like you, Master!"
1600103-7 = "Hmm? What kind of help do I need? Well..."
1600103-8 = "Good question."
1600103-9 = "To be honest, I haven't figured that part out yet either."
1600103-10 = "[s] \"???\""
1600103-11 = "What? Why are you giving me that look?"
1600103-12 = "Do I really need your help? You bet I do! I just haven't worked out the details yet!"
1600103-13 = "It just so happens that I don't have any missions or classes today."
1600103-14 = "Which means what I need is someone to spend time with. You can do that for me, can't you, Master?"
1600103-15 = "Huh? Am I asking you out?"
1600103-16 = "Hmm... I don't know. I just wanted to be with you today for some reason."
1600103-17 = "But I might be! If you don't mind, Master, then I'm all for it!"
1600103-18 = "Come on, let's go! We don't have much time, so I'm ready to go when you are. You don't mind, do you?"
1600103-21 = "Let's go!"
1600103-23 = "(Asuna hooks her arm around mine and drags me away before I can say anything.)"
1600103-25 = "So we just lay low and grab the students that pass by..."
1600103-26 = "Uh-huh, perfect. That will totally..."
1600103-27 = "...! W-Wait! Isn't that the maid from C&C?"
1600103-29 = "Hmm hmm. ♬"
1600103-32 = "Damn it, you're right. If we're spotted, they'll need a sponge to pick up what's left of us. Let's get out of here."
1600103-38 = "Huh? Was someone just talking about us? I could have sworn I heard something..."
1600103-39 = "Was it just my imagination?"
1600103-40 = "Well, whatever! Doesn't matter."
1600103-41 = "Let's hurry, Master. I want us to go everywhere today!"
1600103-43 = "(Asuna confidently marches forward, her arm linked with mine.)"
1600103-45 = "We failed last time, but this one for sure..."
1600103-48 = "It's the same ones from before! Oh crap, run! They're coming this way!"
1600103-51 = "This way, Master. There's a game I've been dying to play!"
1600103-52 = "*gasp* You've played it before? I'm up for a challenge—bring it on!"
1600103-53 = "Do I know how to play? Nope! Today will be my first time."
1600103-54 = "I'll just figure it out as I go along! It doesn't matter who wins and who loses, right?"
1600103-55 = "...All that matters is that I'm getting to play with you."
1600103-56 = "All righty! Let's get started!"
1600103-57 = "(I confidently accepted Asuna's challenge, having played the game before.)"
1600103-59 = "(...I lost every game.)"
1600103-63 = "Something doesn't add up here. Are we actually being pursued...?"
1600103-64 = "Th-They're coming again! Damn it... Run!"
1600103-67 = "The theme park! I've never gotten to go like this before!"
1600103-68 = "I mean, sure, I've been here on a mission before, but that's not a big deal. Nor can anyone blame me for hopping on the rides when I'm here for official business."
1600103-69 = "What I really meant when I said \"like this,\" was getting to come here with you."
1600103-70 = "I told you earlier. The details don't matter as long as it's the two of us!"
1600103-71 = "Arcades, theme parks—what makes them special is going with you!"
1600103-72 = "I could have fun doing anything with you, Master. Even walking."
1600103-73 = "Speaking of, wanna go for a walk? Your legs aren't feeling tired, are they?"
1600103-74 = "[s] \"Fine with me.\""
1600103-75 = "You're on! We'll walk until the sun goes down, so you better keep up!"
1600103-76 = "But if your legs start to hurt, be sure to let me know, okay? I can carry you on my back!"
1600103-78 = "(Asuna began striding forward.)"
1600103-80 = "(I did ultimately run out of energy and was taken back to campus on Asuna's back.)"
1600103-82 = "Wow! That was really fun! I loved it!"
1600103-83 = "Master, did you say something just now?"
1600103-84 = "You wanna go back down? People's stares are becoming too much?"
1600103-85 = "Why? Who cares what they think?"
1600103-86 = "Umm! Sure. I don't get what the big deal is, but you're the boss. Down we go."
1600103-89 = "So? Are your legs feeling better?"
1600103-90 = "[s] (Hand her the drink you brought.)"
1600103-91 = "You brought an energy drink for me? You're so sweet, Master!"
1600103-92 = "*gulp* *gulp*"
1600103-93 = "Ah! That hit the spot!"
1600103-94 = "..."
1600103-95 = "It's almost strange how happy I am."
1600103-96 = "The things we did today aren't any different from what I usually do, but they felt totally different because you were with me."
1600103-97 = "Maybe there's something...special about you."
1600103-98 = "Heehee. At least, that's what I think."
1600103-99 = "Today's almost over. You should be heading back soon, right?"
1600103-100 = "I've carried you this far, so I may as well give you a ride the rest of the way. What? Still too embarrassed?"
1600103-101 = "Hahaha! I'm only teasing."
1600103-102 = "Let me just throw this can away and we can go."

80000011-9 = "4;카요코;02;어라. <블랙 데스 포이즌>의 한정판 앨범이 나왔네."
80000011-10 = "4;카요코;03;이 시즌에는 신곡을 내는 일이 거의 없었는데. 한 번 볼까……"
80000011-11 = "#st;[0,0];instant;1;"

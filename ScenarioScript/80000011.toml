80000011-34 = "#all;hide"
80000011-35 = "3;카요코;06;일단은 엉겁결에 초콜릿을 받기는 했지만, 이걸 어떻게 처리하지?\n#3;a"
80000011-36 = "3;카요코;07;먹기에는 너무 양이 많고, 이걸 흥신소 사무실까지 들고 가져갈 수도 없고…….\n#3;em;[속상함]\n#3;stiff"
80000011-37 = "[s] \"안녕, 카요코.\""
80000011-38 = "3;카요코;02;아, 선생님. 우연이네.\n#3;em;[반응]"
80000011-39 = "3;카요코;01;선생님도 이곳에 음반을 구매하러 온 거야?"
80000011-40 = "[s] \"응, 그런 셈이지.\""
80000011-41 = "#wait;500"
80000011-42 = "[s] \"그나저나 엄청난 크기의 초콜릿이네.\""
80000011-43 = "3;카요코;04;그게…… 좋아하던 그룹의 앨범을 샀는데, 사은품으로 받아버려서."
80000011-44 = "3;카요코;06;나나 다른 흥신소 사원들이 먹기에는 양이 너무 많고. 그렇다고 버리자니 좋아하는 밴드의 사은품인지라, 어딘가 내키지가 않고……."
80000011-45 = "#st;[0,0];instant;1;"
80000011-46 = "#clearST"
80000011-47 = "3;카요코;99\n#3;em;…\n#wait;2500"
80000011-48 = "3;카요코;02;저…… 괜찮다면, 선생이 가져갈래?\n#3;greeting"
80000011-49 = "[s] \"좋아.\""
80000011-50 = "3;카요코;03;다행이다. 선생이 이 초콜릿을 받아주지 않으면 어떻게 하나 걱정했거든."
80000011-51 = "3;카요코;04\n#3;em;[!]\n#3;jump\n#wait;1000"
80000011-52 = "3;카요코;07;그…… 오늘이 발렌타인 데이이기는 하지만, 특별한 의미는 없으니까…….\n#3;stiff"
80000011-53 = "3;카요코;05;다른 뜻으로 받아들이면 안 된다고, 선생?"
80000011-54 = "#all;hide"
80000011-55 = "#na;(이후 카요코가 준 거대한 소 해골 모양의 초콜릿을 받아 샬레로 돌아왔다.)"
80000011-56 = "#na;(정교하게 조각된 초콜릿은 어쩐지 먹기가 아까워 장식용으로 벽에 걸어두었다.)"

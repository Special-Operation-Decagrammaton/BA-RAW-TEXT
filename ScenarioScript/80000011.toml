80000011-13 = "4;카요코;03\n#4;em;…\n#wait;2500"
80000011-14 = "4;카요코;04;발렌타인 데이를 겨냥한 러브송이라고?\n#4;em;[?]\n#4;stiff"
80000011-15 = "4;카요코;04;헤비메탈 그룹인 블랙 데스 포이즌이 어째서 그런 장르의 음악을 시도한 거지?"
80000011-16 = "4;카요코;06;으음…… 우선은 좋아하는 가수의 신곡이니 시험 삼아 구매해볼까.\n#4;em;[속상함]\n#4;stiff"
80000011-17 = "4;카요코;01;저기, 이 음반을 사고 싶은데.\n#4;m2"
80000011-18 = "#na;종업원;아. 블랙 데스 포이즌의 한정판 앨범, <사랑은 심장을 뽑아 쟁취하는 거야> 말씀이시군요."
80000011-19 = "#na;종업원;해당 앨범은 발렌타인 데이를 맞아 발매된 한정판인 만큼, 앨범을 구매하시는 손님들께 특별한 경품을 증정하고 있습니다."
80000011-20 = "4;카요코;02;특별한 경품?\n#4;em;[?]"
80000011-21 = "#na;종업원;네, 이 앨범을 구매하신 고객님에게는……"
80000011-22 = "#st;[0,0];instant;1;"

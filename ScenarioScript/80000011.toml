[translation]
80000011-1 = "เพลงรักของชาวร็อก"
80000011-2 = "ด้านหน้าร้านขายซีดี ย่านการค้า"
80000011-9 = "เอ๋? อัลบั้มลิมิเต็ดของ <แบล็ก เดธ พอยซั่น> วางแผงแล้วเหรอ"
80000011-10 = "ปกติไม่ค่อยออกเพลงใหม่ในช่วงแบบนี้เลยนี่นา จะมีเพลงอะไรบ้างนะ..."
80000011-14 = "เพลงรักสำหรับวาเลนไทน์เหรอ?"
80000011-15 = "ทำไมวงร็อกที่ฉันชอบอย่าง แบล็ก เดธ พอยซั่นถึงได้ทำเพลงแนวนี้ออกมานะ?"
80000011-16 = "อืม... ยังไงก็เพลงของวงที่ชอบ ลองซื้อไปฟังก่อนก็แล้วกัน"
80000011-17 = "ขอโทษนะคะ ฉันอยากซื้ออัลบั้มนี้น่ะ"
80000011-18 = "อัลบั้มลิมิเต็ด <ความรักคือการไขว่คว้าพิชิตใจ> ของแบล็ก เดธ พอยซั่นเหรอ"
80000011-19 = "อัลบั้มนี้เป็นอัลบั้มพิเศษที่วางจำหน่ายในเทศกาลวาเลนไทน์ เราจึงมีของขวัญพิเศษมอบให้กับ#nลูกค้าที่ซื้อด้วยนะ"
80000011-20 = "ของขวัญพิเศษเหรอ?"
80000011-21 = "ครับ สำหรับลูกค้าที่ซื้ออัลบั้มนี้..."
80000011-26 = "เราจะมอบช็อกโกแลตรูปกะโหลกวัวให้เป็นของขวัญ!"
80000011-27 = "..."
80000011-28 = "อะ... เอ๋? มีปัญหาอะไรรึเปล่า คุณลูกค้า?"
80000011-29 = "ปะ...เปล่าหรอก แค่ตกใจที่มันใหญ่เกินไปน่ะ"
80000011-30 = "ถ้างั้นขอให้มีความสุขกับเพลงใหม่ของแบล็ก เดธ พอยซั่นและเทศกาลวาเลนไทน์!"
80000011-35 = "ได้ของฟรีมามันก็ดีอยู่หรอก แต่ฉันจะทำยังไงกับช็อกโกแลตยักษ์นี่ดีล่ะ?"
80000011-36 = "ดูท่าจะกินเองก็คงไม่หมดแฮะ แต่จะเอาไปไว้ที่หน่วยรับจ้างสารพัดก็คงไม่ได้..."
80000011-37 = "[s] \"ว่าไง คาโยโกะ\""
80000011-38 = "อ๊ะ คุณครู"
80000011-39 = "คุณครูก็มาซื้อซีดีเพลงเหรอ?"
80000011-40 = "[s] \"อื้อ ใช่แล้ว\""
80000011-42 = "[s] \"ช็อกโกแลตชิ้นใหญ่เบิ้มมากเลยนะ\""
80000011-43 = "คือว่า... ฉันซื้ออัลบั้มวงที่ชอบแล้วได้มาเป็นของแถมน่ะ"
80000011-44 = "มันดูใหญ่เกินที่จะกินหมดคนเดียว แต่มันเป็นของแถมจากวงที่ฉันชอบ จะเอาไปทิ้งก็คงไม่ได้..."
80000011-48 = "คือ... คุณครูช่วยรับไว้ได้มั้ย?"
80000011-49 = "[s] \"ได้สิ\""
80000011-50 = "ดีจัง ฉันกำลังกังวลอยู่เลยว่าคุณครูจะไม่รับช็อกโกแลตชิ้นนี้"
80000011-52 = "คือ... ถึงวันนี้จะเป็นวันวาเลนไทน์ แต่นี่ไม่ได้มีความหมายพิเศษอะไรหรอกนะ"
80000011-53 = "อย่าเข้าใจผิดล่ะ คุณครู"
80000011-55 = "(หลังจากนั้นคุณครูก็กลับไปที่ชาเล่ต์พร้อมกับช็อกโกแลตรูปหัวกะโหลกที่คาโยโกะให้มา)"
80000011-56 = "(ช็อกโกแลตที่แกะสลักมาอย่างประณีต จนรู้สึกว่าจะกินก็เสียดาย สุดท้ายก็เลยเอาไปแขวนตกแต่ง#nผนังแทน)"

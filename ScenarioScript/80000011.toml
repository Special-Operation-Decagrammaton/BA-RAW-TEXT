80000011-25 = "#wait;1500"
80000011-26 = "#na;종업원;이 소 해골 모양의 초콜릿을 사은품으로 증정해 드립니다!"
80000011-27 = "3;카요코;05;…….\n#3;em;[...]\n#3;a"
80000011-28 = "#na;종업원;어, 어라? 무슨 문제라도 있으신가요?"
80000011-29 = "3;카요코;04;아니, 너무 커서 당황한 것뿐이야.\n#3;stiff"
80000011-30 = "#na;종업원;네. 그럼 블랙 데스 포이즌의 신곡과 함께 즐거운 발렌타인 데이가 되시길 바라겠습니다."

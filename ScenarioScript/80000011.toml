[translation]
80000011-1 = "搖滾歌手的情歌"
80000011-2 = "商店街．唱片店"
80000011-9 = "咦，「黑色．死亡．毒藥」推出了限定單曲啊。"
80000011-10 = "這個季節很少出新歌的說，怎麼會突然推出限定單曲呢。我看看……"
80000011-14 = "是瞄準情人節市場的情歌？"
80000011-15 = "一直都走硬派重金屬路線的「黑色．死亡．毒藥」怎麼會挑戰這種類型的音樂……？"
80000011-16 = "唔嗯，不過畢竟是喜歡的樂團……還是買來聽聽看吧。"
80000011-17 = "那個，我想買這個……"
80000011-18 = "啊。您是說「黑色．死亡．毒藥」的限定專輯《愛要摘下心臟去爭取》嗎。"
80000011-19 = "因為這是紀念情人節的限定單曲，所有購買的顧客都可以拿到特別贈品哦。"
80000011-20 = "特別贈品？"
80000011-21 = "是，凡是購買這張專輯的顧客……"
80000011-26 = "都可以免費獲得這個牛頭骨造型的巧克力！"
80000011-27 = "……"
80000011-28 = "咦，咦？有什麼問題嗎？"
80000011-29 = "……沒什麼，只是因為太大了讓我有點困擾。"
80000011-30 = "這樣啊。那麼祝您與「黑色．死亡．毒藥」的新曲一同度過幸福的情人節。"
80000011-35 = "不小心就收下了……這個巧克力該怎麼處理……"
80000011-36 = "要吃的話量太多了，但要扛回便利屋的辦公室又有點……"
80000011-37 = "[s]「哈囉，佳世子。」"
80000011-38 = "啊，老師。"
80000011-39 = "真巧呢，老師也來買唱片嗎？"
80000011-40 = "[s]「嗯，算是吧。」"
80000011-42 = "[s]「話說，你的巧克力還真大呢。」"
80000011-43 = "就是說啊……是我買了喜歡樂團的新專輯收到的贈品。"
80000011-44 = "搬運起來十分笨重，但畢竟是喜歡的樂團送的贈品，實在不太想丟掉……"
80000011-48 = "不介意的話，老師願意收下嗎？"
80000011-49 = "[s]「我很樂意。」"
80000011-50 = "太好了。如果老師不願意收下，我真的不知道該拿這個巧克力怎麼辦才好。"
80000011-52 = "啊，那個……雖然今天是情人節，但我沒有特別的意思……"
80000011-53 = "這個巧克力不是那種意思，知道嗎？"
80000011-55 = "（之後便帶著佳世子給的巨大牛頭骨造型巧克力回到夏萊）"
80000011-56 = "（總覺得把這麼精心雕刻的巧克力吃掉很可惜，於是將它掛在牆上當裝飾）"

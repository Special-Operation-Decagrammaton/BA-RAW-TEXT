[translation]
80000011-1 = "A Rocker's Love Song"
80000011-2 = "Record Store"
80000011-9 = "Oh. It's the limited edition of Black Death Poison's new album."
80000011-10 = "This is an unusual time of year to release new music.#nI wonder what the track list looks like."
80000011-14 = "Is this supposed to be a ballad for Valentine's Day?"
80000011-15 = "Seems like it would be out of the wheelhouse of a death metal band like BDP."
80000011-16 = "Hmm. I do like their music, though, so I should try to support them."
80000011-17 = "Excuse me. I'll take this one."
80000011-18 = "Ah, that's Black Death Poison's new album:#n\"Pull Your Heart Out of Your Chest.\""
80000011-19 = "The day-one edition comes with a special Valentine's Day bonus."
80000011-20 = "It does?"
80000011-21 = "Yes. All copies come with..."
80000011-26 = "...this chocolate bull skull!"
80000011-27 = "..."
80000011-28 = "Um... Is there a problem?"
80000011-29 = "No. I just wasn't expecting something so...extravagant."
80000011-30 = "Wonderful. I'll wrap it up for you, then. Have a happy Valentine's Day,#nand I hope you enjoy your purchase."
80000011-35 = "Just great. What am I gonna do with this giant hunk of chocolate?"
80000011-36 = "It's way too much for me to eat by myself, and I don't want to lug it all the way to the Problem Solver office."
80000011-37 = "[s] \"Hey, Kayoko.\""
80000011-38 = "Oh. Hey, Sensei."
80000011-39 = "Here to check out some music?"
80000011-40 = "[s] \"Something like that.\""
80000011-42 = "[s] \"By the way, what's with the huge piece of chocolate?\""
80000011-43 = "It came with this album I just bought."
80000011-44 = "It's too much for just me, but I don't want to throw it away.#nThat'd be a waste."
80000011-48 = "I don't suppose you want it...do you?"
80000011-49 = "[s] \"I thought you'd never ask.\""
80000011-50 = "Good. I was worried you'd say no."
80000011-52 = "Hey, I know today is Valentine's Day and all..."
80000011-53 = "...but don't take it the wrong way. All right?"
80000011-55 = "I returned to the Schale office with the gigantic bull skull chocolate."
80000011-56 = "I figured eating such an artistic piece of chocolate would be a shame,#nso I hung it on the wall instead."

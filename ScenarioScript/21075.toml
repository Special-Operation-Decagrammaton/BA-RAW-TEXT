[translation]
21075-4 = "......"
21075-5 = "เยี่ยมไปเลย"
21075-6 = "ฮึ่ม! น่าโมโห! แต่ก็ช่วยไม่ได้ล่ะนะ!"
21075-7 = "อาริสึ! ดาบแห่งแสงเป็นของเธอแล้ว!"
21075-8 = "ว้าว! ว้าว!"
21075-9 = "เฮ้อ โล่งอกไปที"
21075-10 = "เยี่ยมมากเลยที่ใช้งานสิ่งนั้นได้....."
21075-11 = "มาทางนี้สิอาริสึ ฉันจะบอกวิธีใช้งาน และเสริมที่จับให้แข็งแรงขึ้น"
21075-23 = "แรงยึดที่สันนิษฐานว่าต้องใช้อย่างน้อย 1 ตัน ความสมดุลและมั่นคงเมื่อยิง ผิวหนัง... ไม่สิ#nลำตัวสะอาดสะอ้าน ไม่ปรากฏรอยแผลใดๆ เลย"
21075-24 = "ร่างกายที่สร้างจากนาโนแมชชีนภายใต้เงื่อนไขของ 'การซ่อมแซมตัวเอง' ในสภาพแวดล้อมที่โหดร้าย.."
21075-25 = "เป้าหมายนั้น... ต้องเป็น..."
21075-27 = "... 'การต่อสู้' ...แน่นอน"
21075-31 = "อาริสึ... จริงๆ แล้วเธอคือ...?"
21075-33 = "ตอนต่อไป;ตรวจสอบคุณสมบัติ"

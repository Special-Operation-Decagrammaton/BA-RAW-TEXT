[translation]
21075-4 = "……。"
21075-5 = "素晴らしい。"
21075-6 = "くっ、悔しい……ですが、これが結果ですね！"
21075-7 = "アリス、その「光の剣」はあらためて、あなたの物です！"
21075-8 = "わぁ、わぁっ……！"
21075-9 = "ふぅ、とりあえず良かった。"
21075-10 = "それを使いこなせるなんて、本当にすごいね……。"
21075-11 = "おいで、アリス。もう少し使い方を教えてあげる。それから、取っ手の部分をもう少し補強しようか。"
21075-23 = "最低でも1トン以上と推定される握力、発射時にもブレない安定した体幹バランス、強度や出力はもちろん、肌全体に傷すら見当たらない綺麗な肉体……いや、機体。"
21075-24 = "つまり、最初から厳しい環境での活動を想定し、ナノマシンによって「自己修復」することを前提として作られた体……。"
21075-25 = "その目的はきっと……"
21075-27 = "……「戦闘」、だな。"
21075-31 = "アリス、君はいったい……？"
21075-33 = "次回;資格審査"

[translation]
34230-1 = "第23話;少女たちのためのキリエ（１）"
34230-12 = "はぁ……はぁ……。"
34230-13 = "うぅ……痛い……疲れた………#nあーもう傷だらけ……"
34230-18 = "でも……まだ大丈夫。"
34230-30 = "……。"
34230-34 = "ここは……聖歌隊室？"
34230-38 = "オルガンと……楽譜……"
34230-42 = "蓄音機まで……。#n……そっか、そうだよね、アリウスも私たちと同じ授業を受けていたはずだもの。"
34230-47 = "……動かないかぁ。#nまぁ、長い間使ってなさそうだし、仕方ないよね。"
34230-48 = "……。"
34230-56 = "はぁ……。"
34230-57 = "コハルちゃんが身を挺して助けてくれた時……カッコ良かったなぁ。"
34230-58 = "コハルちゃん、物語のお姫様みたいだった。#n先生が登場して助けてくれてさ……私もそういうお話が好き。"
34230-59 = "窮地に陥ったお姫様を運命の人が救う――そんな御伽話。"
34230-60 = "子供っぽくて、夢にあふれて……素敵で、胸がときめくような……"
34230-61 = "……私も、そんな物語の主役になりたかった。"
34230-62 = "でも、わかってる――私にはそんな資格なんてない。"
34230-63 = "「魔女」がハッピーエンドを迎えるお話なんて、この世のどこにもないもの。"
34230-64 = "サオリ……私は、自分が受けた痛みをあなたに感じてほしかった。#nそうじゃないと不公平だと思っていたの。"
34230-65 = "でも……そうだね……"
34230-66 = "私と同じように、あなた達も救われたかったよね。"
34230-67 = "あなた達も……幸せになりたかったよね。"
34230-68 = "あなたがアツコを助けたい理由も分かるよ……。"
34230-69 = "多くの人を騙し、絶望に陥れたあなたでも……#n最後の最後に、誰かを救う事ができたなら……"
34230-70 = "苦痛だらけのあなたの人生も、それだけで報われる……#n……そう、思ったのでしょう？"
34230-71 = "わかるよ――私とセイアちゃんもそうだもの。"
34230-76 = "だから……アリウススクワッド。"
34230-80 = "あなた達のために、祈るね。"
34230-81 = "いつか……"
34230-82 = "いつか、あなた達の苦痛が癒える事を――"
34230-83 = "やり直しの機会[ruby=こいねが]を希う[/ruby]のと同じように――"
34230-84 = "あなた達に、未来が……次の機会がある事を――"
34230-85 = "だから、私は……"
34230-86 = "――あなた達を赦すよ。"
34230-87 = "それは互いが公平に不幸であることよりも、もっと良い結末だろうから。"
34230-97 = "――例えアツコを救ったとしても、あなた達の未来はきっと苦難に満ちている。"
34230-98 = "一生追われるかもしれない……#n表を歩くことができないような悲惨な人生になるかもしれない。"
34230-99 = "でも、それでも……"
34230-100 = "あなた達の未来に、ほんの一筋でも光明があると信じるのなら――"
34230-101 = "アツコを助ける事で、あなた達自身をも救えばいい。"
34230-102 = "私はもう手遅れだけど……あなた達には、まだ時間が残されているでしょう？"
34230-103 = "それに……先生が手伝ってくれているから、きっと大丈夫……。"
34230-104 = "あなた達のその行く先に幸いが――"
34230-106 = "祝福が、あらんことを――"
34230-111 = "……あれ？"
34230-116 = "あははっ、故障してたんじゃなかったの？"
34230-120 = "これは……慈悲を求める歌。"
34230-121 = "別にこの歌が好きなわけじゃないけど……"
34230-122 = "そうだね、うん。"
34230-137 = "あは☆何をそんなに急いでいるのかな？"
34230-138 = "あなた達は通れないよ。#nこの先にあるのは、救済の戦いを繰り広げる主人公の舞台。"
34230-139 = "私たちみたいな悪役には許されていないの。"
34230-140 = "さあ、先生――あの子たちを救ってあげて。"
34230-144 = "ここは私が食い止めるから。"
34230-153 = "― [i]Kyrie[/i]"
34230-155 = "[i]Eleison[/i]"
34230-168 = "次回;少女たちのためのキリエ（２）"

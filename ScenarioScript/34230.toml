34230-57 = "3;미카;99;코하루 쨩, 선생님이 등장해서 구해주었을 때…… 멋있었지?"
34230-58 = "3;미카;03;응. 그때만큼은 코하루 쨩도 이야기 속의 공주님 같았어. 나도 좋아해. 그런 이야기."
34230-59 = "3;미카;02;화려하게 주인공이 등장해서 시련에 빠진 공주님을 구해주는 그런 이야기."
34230-60 = "3;미카;01;유치하지만 멋지고 가슴 두근거리는 이야기……."
34230-61 = "3;미카;02;……나도 그런 이야기의 주인공이 되고 싶었어."
34230-62 = "3;미카;15;그치만 알고 있어. 나에겐 그런 자격 따위 없다는걸."
34230-63 = "3;미카;14;이 세상 그 어디에도, <마녀>가 해피엔딩을 맞이하는 이야기는 없으니까."
34230-64 = "3;미카;15;……사오리. 나는 내가 받은 고통만큼 너희도 고통받기를 원했어. 그게 공평한 거라고 생각했으니까."
34230-65 = "3;미카;06;하지만…… 동시에……. \n#3;em;…"
34230-66 = "3;미카;12;내가 그랬던 것만큼, 너희도 구원받고 싶었겠지."
34230-67 = "3;미카;12;너희도 행복해지고 싶었을 거야. 내가 바랐던 것만큼."
34230-68 = "3;미카;02;사오리, 너가 아츠코에게 집착하는 이유도 알고 있어……."
34230-69 = "3;미카;01;수많은 사람을 속이고 절망에 빠트려 온 너라도…… 최후의 최후에는 누군가를 구원할 수 있다면……."

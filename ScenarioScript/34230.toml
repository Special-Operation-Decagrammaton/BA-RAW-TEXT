[translation]
34230-1 = "ตอนที่ 23;คำอธิษฐานเพื่อเด็กสาว 1"
34230-12 = "แฮ่ก... แฮ่ก..."
34230-13 = "แฮ่ก... ทั้งเจ็บ... ทั้งเหนื่อย... แย่ชะมัด..."
34230-18 = "แต่มันก็... ยังไม่จบ..."
34230-30 = "......."
34230-34 = "ที่นี่คือ... ห้องสวดสรรเสริญเหรอ...?"
34230-38 = "ทั้งไปป์ออร์แกน... ทั้งโน้ตเพลง... "
34230-42 = "มีเครื่องเล่นแผ่นเสียงด้วย... ฮ่าฮ่า อย่างนี้นี่เอง... พอมาคิดดูแล้ว อาเรียสเองก็มีคลาสสวดมนต์#nเหมือนพวกเรา"
34230-47 = "เครื่องเล่นแผ่นเสียงไม่ทำงานแล้ว แต่ก็เข้าใจได้แหละ มันคงไม่ได้ใช้งานมานานมากแล้วนี่เนอะ"
34230-48 = "......."
34230-56 = "ฮื้ม..."
34230-57 = "ตอนที่คุณครูปรากฏตัวออกมาช่วยโคฮารุจัง... มันเท่มากๆ เลยละ"
34230-58 = "ใช่ ตอนนั้นโคฮารุจังก็เป็นเหมือนองค์หญิงในเรื่องเลยละ ฉันก็ชอบเรื่องแบบนั้นเหมือนกัน"
34230-59 = "เรื่องที่ตัวเอกปรากฏตัวอย่างสง่างามเพื่อมาช่วยองค์หญิงที่กำลังตกอยู่ในความทุกข์ทรมาน"
34230-60 = "ถึงเรื่องจะเชย แต่มันก็เท่และกินใจอยู่ดี..."
34230-61 = "ฉันเองก็คิดอยากเป็นตัวเอกของเรื่องแบบนั้นบ้างจัง..."
34230-62 = "แต่ก็รู้ดีว่าคนอย่างฉันไม่มีสิทธิ์ทำอะไรอย่างนั้นหรอก"
34230-63 = "ก็บนโลกใบนี้น่ะ <แม่มด> ไม่มีวันได้พบเจอตอนจบที่สวยหรูอยู่แล้วละเนอะ"
34230-64 = "ซาโอริ... ฉันเคยอยากให้พวกเธอได้รับความเจ็บปวดเหมือนกับที่ฉันได้รับบ้าง ฉันคิดว่านั่นละคือความยุติธรรม"
34230-65 = "แต่ว่า... ในขณะเดียวกัน... "
34230-66 = "พวกเธอก็อยากได้รับการไถ่บาป... เหมือนๆ กันกับฉัน"
34230-67 = "พวกเธอเองก็อยากมีความสุขบ้าง... ไม่น้อยไปกว่าที่ฉันต้องการหรอก"
34230-68 = "ซาโอริ ฉันรู้เหตุผลที่เธอยึดติดกับอาสึโกะแล้วละ..."
34230-69 = "คนที่หลอกลวงผู้คนมากมายและตกอยู่ในความสิ้นหวังอย่างเธอ... สุดท้ายแล้วคงอยากช่วยชีวิต#nใครบางคนได้บ้าง..."
34230-70 = "เธอแอบหวังใช่ไหมล่ะ ว่าชีวิตอันน่าสังเวชที่มีแต่ความเจ็บปวดของเธอจะได้รับการช่วยเหลือบ้าง"
34230-71 = "ฉันรู้ดีเลยละ ฉันเองก็คิดอย่างนั้นกับเซอาจังเหมือนกัน"
34230-76 = "ใช่ เพราะงั้น... สควอดของอาเรียส"
34230-80 = "ฉันจะอธิษฐานเพื่อพวกเธอเอง..."
34230-81 = "ฉันหวังว่าความเจ็บปวดของพวกเธอจะหมดไปนะ"
34230-82 = "เหมือนกับที่ฉันอยากให้ความเจ็บปวดของฉันหายไปด้วย..."
34230-83 = "เหมือนกับที่ฉันร่ำร้อง หวังถึงโอกาสที่สอง..."
34230-84 = "เหมือนกับที่ฉันโหยหาโอกาสครั้งต่อไป..."
34230-85 = "ฉันจะยกโทษให้พวกเธอ..."
34230-86 = "เหมือนกับที่ฉันอยากได้รับการยกโทษ..."
34230-87 = "แบบนี้น่าจะเป็นตอนจบ... ที่ดีกว่าความ <ยุติธรรม> นะ"
34230-97 = "ถึงจะช่วยอาสึโกะไว้ได้ อนาคตของพวกเธอก็ไม่มีความสุขขึ้นหรอก"
34230-98 = "คงโดนไล่ล่าไปตลอดชีวิต ต้องเตร็ดเตร่ไปตามซอกซอยที่สกปรก ต้องเหน็บหนาว หิวท้อง และใช้ชีวิตอย่างทุกข์ทรมานต่อไป"
34230-99 = "แต่ว่าถึงจะเป็นอย่างนั้น..."
34230-100 = "หากเชื่อว่าวันข้างหน้าของเธออาจมีความสุขรออยู่..."
34230-101 = "ก็จงช่วยเหลือพวกเธอเอง ด้วยการไปช่วยอาสึโกะกลับมาเสียเถอะ"
34230-102 = "ถึงจะสายไปแล้วสำหรับฉัน... แต่กับพวกเธอยังไม่สายเกินไปนี่นา?"
34230-103 = "ยังไงคุณครูต้องไปช่วยแน่ๆ อื้ม แน่นอนเลยละ"
34230-104 = "อื้อ เพราะงั้น..."
34230-106 = "ขอให้สุดท้ายแล้วพวกเธอมีความสุขนะ..."
34230-111 = "หืม...? "
34230-116 = "อ้าว อะไรเนี่ย? ไม่ได้พังไปแล้วหรอกเหรอ?"
34230-120 = "อื้ม นั่นสิ นี่มัน... เพลงขอความเมตตา..."
34230-121 = "ถึงฉันจะไม่เคยชอบเพลงนี้เลย แต่ก็นะ..."
34230-122 = "นั่นสิเนอะ..."
34230-137 = "จะรีบไปไหนขนาดนั้นเหรอ? มีงานคืนสู่เหย้าหรือไงละนั่นน่ะ?"
34230-138 = "พวกเธอผ่านไปไม่ได้หรอก ข้างนอกนั่นคือเวทีของตัวเอกที่ต่อสู้เพื่อการได้รับความช่วยเหลือต่างหากล่ะ"
34230-139 = "คนเลวๆ อย่างพวกเราไม่ได้รับอนุญาตให้เข้าไปหรอกนะ"
34230-140 = "เอาละ คุณครู ไปช่วยเด็กพวกนั้นเถอะ"
34230-144 = "ฉันจะขวางทางนี้เอาไว้ให้เอง"
34230-153 = "― [i]Kyrie[/i]"
34230-155 = "[i]Eleison[/i]"
34230-168 = "ตอนต่อไป;คำอธิษฐานเพื่อเด็กสาว 2"

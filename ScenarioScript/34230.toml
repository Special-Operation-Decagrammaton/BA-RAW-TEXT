[translation]
34230-1 = "第23話;為了少女們的垂憐經（１）"
34230-12 = "哈啊……哈啊……"
34230-13 = "嗚……好痛……好累……#n啊啊已經渾身是傷了……"
34230-18 = "不過……還撐得住。"
34230-30 = "……"
34230-34 = "這裡是……聖歌隊室？"
34230-38 = "管風琴和……樂譜……"
34230-42 = "連留聲機都有……#n……這樣啊，也對呢，奧利斯過去應該也和我們上著一樣的課。"
34230-47 = "……沒反應呢。#n嘛，看起來已經很久都沒用過了，這也沒辦法。"
34230-48 = "……"
34230-56 = "唉……"
34230-57 = "小春醬挺身而出幫助我的時候……真帥氣呢。"
34230-58 = "小春醬就像是故事裡的公主一樣。#n老師會登場並拯救她……我也喜歡這種故事。"
34230-59 = "命運之人將拯救陷入絕境的公主──這種童話故事。"
34230-60 = "像孩子一樣充滿夢想……既美好又讓人心動不已……"
34230-61 = "……我也想成為那種故事中的主角。"
34230-62 = "不過，我知道的──我沒有那種資格。"
34230-63 = "「魔女」迎向HappyEnd這種故事，不管在哪都不存在。"
34230-64 = "沙織……我曾經想讓你感受跟我一樣的痛苦。#n認為不這樣就不公平。"
34230-65 = "不過……也是呢……"
34230-66 = "你們也和我一樣，想要得到救贖對吧。"
34230-67 = "你們也……想要獲得幸福對吧。"
34230-68 = "你想要拯救敦子的理由我也明白……"
34230-69 = "欺騙了許多人，陷入絕望的你……#n在最後的最後，如果能夠拯救某個人的話……"
34230-70 = "你那充滿苦痛的人生，也能就此得到回報……#n……你是這麼想的對吧？"
34230-71 = "我懂的──就像我和聖亞醬一樣。"
34230-76 = "所以……奧利斯小隊。"
34230-80 = "我會，為你們祈禱。"
34230-81 = "希望有一天……"
34230-82 = "希望有一天，你們的苦痛能被治癒──"
34230-83 = "就像你們祈求重新來過的機會一樣──"
34230-84 = "祝福你們能夠擁有未來……擁有下一次機會──"
34230-85 = "所以，我會……"
34230-86 = "──寬恕你們。"
34230-87 = "比起公平地變得不幸，這肯定會是更好的結局吧。"
34230-97 = "──就算能夠救出敦子，你們的未來想必也會充滿苦難。"
34230-98 = "或許一生都會受到追趕……過著不敢拋頭露面的悲慘人生也說不定。"
34230-99 = "不過，儘管如此……"
34230-100 = "你們還是相信，在你們的未來中哪怕有一絲光明存在的話──"
34230-101 = "就藉由拯救敦子，拯救你們自己吧。"
34230-102 = "雖然對我來說已經太遲了……不過你們還有時間的對吧？"
34230-103 = "而且……老師也會幫助你們，所以一定沒問題的……"
34230-104 = "願你們旅途的前方充滿著幸福──"
34230-106 = "充滿著祝福──"
34230-111 = "……咦？"
34230-116 = "啊哈哈，不是故障了嗎？"
34230-120 = "這是……祈求憐憫的歌。"
34230-121 = "雖然我不是很喜歡這首歌……"
34230-122 = "不過呢，嗯。"
34230-137 = "啊哈☆你們在急什麼呢？"
34230-138 = "不會讓你們通過這裡的唷。#n在這前方的可是進行救濟之戰的主角的舞台。"
34230-139 = "像我們這種反派是禁止進入的。"
34230-140 = "好了，老師──拯救那些孩子吧。"
34230-144 = "這裡就交給我吧。"
34230-153 = "― [i]Kyrie[/i]"
34230-155 = "[i]Eleison[/i]"
34230-168 = "下一話;為了少女們的垂憐經（２）"

[translation]
90000160-1 = "ตอนที่ 16;ผู้เลื่อมใสลำดับที่ 5"
90000160-3 = "แบบนี้น่าจะเกินกำลังเรานะ ไม่มีร่องรอยของสิ่งมีชีวิตที่เราเจอหลงเหลืออยู่อีกเลย"
90000160-4 = "พวกนั้นหายไปอย่างไร้ร่องรอยสินะคะ"
90000160-5 = "เฮ้อ..."
90000160-6 = "[s] \"พวกนั้นคืออะไรกันแน่?\""
90000160-7 = "วิศวกรและนักวิทยาศาสตร์ที่สานต่อเจตนารมณ์ของเดคาแกรมมาทอน และผู้ช่วยเหลือผู้เลื่อมใส... น่าจะสรุปได้แบบนี้นะคะ ตอนนี้น่าจะมองได้แค่นี้ค่ะ"
90000160-8 = "แปลว่าเดคาแกรมมาทอนตายไปแล้ว แต่ว่าเจตนารมณ์ของเขายังคงอยู่ค่ะ"
90000160-9 = "ฉันไม่รู้ว่าทำไมพวกนั้นถึงเรียกเรามาไกลถึงที่นี่... แต่ตัวตนของพวกเราน่าจะเป็นสิ่งจำเป็นในการทำให้ <พี่สาว> คนนั้นสมบูรณ์นะคะ"
90000160-10 = "ถึงแม้จะไม่รู้ว่าพวกนั้นต้องการใครในหมู่พวกเรา... "
90000160-11 = "จะเป็น <อาบี เอชูห์> ที่มีเทคโนโลยีของนักบวชนิรนามและทวยเทพไร้นาม "
90000160-15 = "หรือว่าจะเป็น <กล่องแห่งซิสดิม> วัตถุหลงยุคที่ประธานองค์การนักเรียนทิ้งเอาไว้..."
90000160-16 = "[s] \"......\""
90000160-17 = "หรือถ้าไม่ใช่ ก็อาจจะเป็นพลังที่น่ากลัวของ 'บุคคลที่รู้ทุกอย่าง' อย่างผู้มีรอยยิ้มสดใสฮีลใจเหมือน#nยาวิเศษ อาเกโบชิ ฮิมาริ..."
90000160-18 = "(มีจริงซะที่ไหน)"
90000160-19 = "ว่าแต่ <พี่สาว> ที่พวกนั้นพูดถึงคือใครเหรอคะ?"
90000160-20 = "ฮืม... นั่นสิคะ ส่วนนั้นฉันก็ต้องไปวิเคราะห์เหมือนกัน... ว่าเป็นใครกันแน่... "
90000160-21 = "หัวหน้า จำเรื่องนั้นได้รึเปล่า?"
90000160-22 = "คะ?"
90000160-23 = "คำที่เดคาแกรมมาทอนพูดไว้ก่อนตายที่ฐานการวิจัยในพื้นที่รกร้างน่ะ"
90000160-25 = "โอ้...!! ข้ามองเห็นแล้ว! "
90000160-26 = "ผู้เลื่อมใสลำดับสุดท้ายที่จะนำทางเหล่าผู้เลื่อมใสอื่นๆ <มัลคูธ> ผู้ที่จะพิสูจน์การมีตัวตนของข้า#nอีกครั้ง...!!!"
90000160-30 = "มัลคูธ..."
90000160-31 = "..."
90000160-32 = "..."
90000160-33 = "นั่นสินะคะ มัลคูธ... คือเซฟิร่าลำดับสุดท้ายของต้นไม้แห่งชีวิตใช่ไหมคะ?"
90000160-34 = "ฮืม... บางทีเราอาจได้เจอกับสิ่งที่แตกต่างกับที่เจอมาอย่างสิ้นเชิง... วิกฤตใหม่อาจจะเริ่มต้นขึ้นก็ได้ค่ะ"
90000160-35 = "งั้นพวกเราต้องทำอะไรล่ะ?"
90000160-36 = "ก็ต้องเตรียมตัวค่ะ "
90000160-37 = "เตรียมตัวสู้กับผู้สานต่อเจตนารมณ์ของเดคาแกรมมาทอน... สู้กับไอน์ ซอฟ และออร์"
90000160-38 = "[s] \"ฮืม...\""
90000160-39 = "ฉันคาดว่าการต่อสู้นั้นอาจจะเริ่มต้นในอนาคตอันใกล้นี้ค่ะ"
90000160-40 = "และคิดว่า... นั่นอาจจะเป็นการต่อสู้ครั้งยิ่งใหญ่ที่เราต้องเผชิญหน้ากับผู้เลื่อมใสทั้ง 10 ของต้นไม้แห่งชีวิตค่ะ..."
90000160-42 = "ผู้เลื่อมใสทั้งหมดเลยเหรอ..."
90000160-43 = "ใช่ค่ะ เพราะงั้นเราถึงนิ่งเฉยกันไม่ได้ เราต้องเตรียมตัวให้พร้อมค่ะ"
90000160-44 = "เพราะงั้นก่อนอื่นเราจะเก็บข้อมูลจากธารน้ำแข็งกันต่อ เราต้องหาข้อมูลของ <เกวูราห์> ผู้เลื่อมใสลำดับที่ 5 ให้ได้มากที่สุดค่ะ "
90000160-45 = "อื้ม ฉันเอาด้วย ฉันชอบที่นี่เพราะอากาศเย็นดีน่ะ คิดว่ามาเที่ยวพักร้อนแบบชิลๆ กันเถอะ"
90000160-46 = "ไม่ใช่ ต้องไม่ใช่อย่างนั้นสิ ที่นี่หนาวมากจนน้ำทะเลแข็งเป็นธารน้ำแข็งเลยนะคะ ที่ตรงนี้ไม่เหมาะกับการเป็นสถานที่พักร้อนเลยค่ะ!"
90000160-47 = "ไม่หรอกค่ะ ยิ่งเวลาแบบนี้เรายิ่งต้องทำใจให้สบายเข้าไว้ค่ะ การมีจิตใจที่สงบเป็นสิ่งสำคัญนะคะ"
90000160-48 = "เห็นมั้ยล่ะ โทคิก็เห็นด้วยนะ"
90000160-49 = "คุณครูล่ะ...?"
90000160-50 = "[s] \"ถือว่ามาพักผ่อนชิลๆ แล้วกัน\""
90000160-51 = "เฮ้อ... คุณครูก็เป็นไปด้วยเหรอเนี่ย"
90000160-52 = "ก็ได้ค่ะ เข้าใจแล้ว ระหว่างนั้นฉันจะหาวิธีรับมือกับความหนาวเพิ่มอีก ทุกคนไปสนุกกับการพักผ่อน#nแบบเย็นสุดขั้วกันเถอะค่ะ"
90000160-53 = "อื้ม งั้นก็ไปกันเลย~"

90000160-1 = "#title;제17화;다섯 번째 예언자"
90000160-2 = "3;에이미 수영복ND;99\n#3;a\n#wait;1000"
90000160-3 = "3;에이미 수영복ND;99;……무리야. 우리가 접촉했던 그 존재들의 흔적은 더 이상 남아있지 않아."
90000160-4 = "3;토키 모드 1;99;그야말로 흔적도 없이 사라져버렸군요."
90000160-5 = "3;히마리 방한복;06;하아…….\n#3;em;[속상함]"
90000160-6 = "[s] \"그 녀석들의 정체는 대체 뭐였지?\""
90000160-7 = "3;히마리 방한복;05;……데카그라마톤의 의지를 이어 나가는 엔지니어이자 과학자이자 예언자의 조력자, 겠죠. 지금은 그렇게밖에 생각할 수 없어요."
90000160-8 = "3;히마리 방한복;01;즉, 데카그라마톤은 죽었으나, 아직 그의 의지는 살아있다고 봐야겠죠."
90000160-9 = "3;히마리 방한복;02;그들이 어째서 우리를 이곳까지 불러들였는지는 모르겠지만…… 그 <언니>라는 존재를 완성시키는 데 저희의 존재가 필요했다는 거겠죠."
90000160-10 = "3;히마리 방한복;06;필요했던 게 저희 중 누구였는지는 알 수 없지만…… "
90000160-11 = "3;히마리 방한복;06;무명사제와 이름없는 신들의 기술이 반영되어 있는 <아비 에슈흐>였는지, "
90000160-12 = "#st;[0,0];instant;1;"
90000160-13 = "#clearST"
90000160-14 = "3;토키 모드 1;06\n#3;em;…\n#wait;2500"
90000160-15 = "3;히마리 방한복;05;아니면 총학생회장이 남긴 오파츠 <싯딤의 상자>였는지……."
90000160-16 = "[s] \"…….\""
90000160-17 = "3;히마리 방한복;11;그것도 아니면 초천재병약미소녀인 저 아케보시 히마리의 <전지>의 두려운 힘이었는지……."
90000160-18 = "3;에이미 수영복ND;04;(그거 가짜잖아.)"
90000160-19 = "3;토키 모드 1;02;그런데 그들이 말한 <언니>라는 건 누구를 뜻하는 것이었을까요?"
90000160-20 = "3;히마리 방한복;07;흐음…… 글쎄요. 그 부분도 분석이 필요할 것 같은데…… 그게 정확하게 누구인지는……. "
90000160-21 = "3;에이미 수영복ND;02;부장. 그거 기억나?"
90000160-22 = "3;히마리 방한복;01;네?\n#3;em;[?]"
90000160-23 = "3;에이미 수영복ND;00;예전에 폐허의 연구기지에서, 데카그라마톤이 죽기 직전에 마지막으로 했던 말."
90000160-24 = "#all;hide"
90000160-25 = "#na;데카그라마톤;오오……!! 나에게는 보인다! "
90000160-26 = "#na;데카그라마톤;모든 예언자를 이끄는 최후의 예언자. <말쿠트>가 나의 존재 증명을 다시 시작하는 모습이……!!"
90000160-27 = "#all;hide"
90000160-28 = "5;히마리 방한복;05\n1;토키 모드 1;06\n3;에이미 수영복ND;99\n#1;h\n#3;h\n#5;h\n#1;a\n#3;a\n#5;a"
90000160-29 = "5;히마리 방한복;05\n1;토키 모드 1;06\n3;에이미 수영복ND;99\n#1;h\n#3;h\n#5;h\n#1;em;…\n#3;em;…\n#5;em;…\n#wait;2500"
90000160-30 = "5;히마리 방한복;05;말쿠트……."
90000160-31 = "3;에이미 수영복ND;99;……."
90000160-32 = "1;토키 모드 1;06;……."
90000160-33 = "5;히마리 방한복;99;그러네요. 말쿠트라…… 분명 생명의 나무의 가장 마지막에 도달하게 되는 세피라였죠?"
90000160-34 = "5;히마리 방한복;07;흐음…… 어쩐지 지금까지의 전개와는 전혀 다른…… 새로운 위기가 시작될지도 모르겠네요."
90000160-35 = "3;에이미 수영복ND;01;그럼 우리는 뭘 해야 해?"
90000160-36 = "5;히마리 방한복;09;준비를 해야겠죠. "
90000160-37 = "5;히마리 방한복;03;데카그라마톤의 의지를 이어 나가는 존재…… 아인, 소프, 오르. 그 엔지니어들과의 싸움을.\n#1;dl\n#3;dl\n#5;m3"
90000160-38 = "[s] \"……흐음.\""
90000160-39 = "5;히마리 방한복;99;제 예상에 그 싸움은 아마도…… 아마 멀지 않은 미래에 시작될 거예요."
90000160-40 = "5;히마리 방한복;02;아마…… 생명의 나무에 기록된 10개의 모든 예언자들을 전부 상대해야만 할 거대한 싸움일 거라고 생각해요……."
90000160-41 = "#all;hide"
90000160-42 = "3;토키 모드 1;07;모든 예언자들을……."
90000160-43 = "3;히마리 방한복;01;네. 그러니 마냥 손 놓고 있어서는 안 되겠죠. 철저한 준비와 대비를 해두지 않으면 안 되니까요."
90000160-44 = "3;히마리 방한복;10;……. 그러니 일단은 빙해에서의 정보수집을 계속하는 거예요. 저희는 5번째 예언자 게부라의 정보를 최대한 확보해야 합니다. "
90000160-45 = "3;에이미 수영복ND;03;응. 나는 찬성이야. 여기는 시원해서 마음에 들었거든. 느긋하게 바캉스하는 느낌으로 머물다가 가자.\n#3;jump"
90000160-46 = "3;히마리 방한복;11;아니, 그건 아니거든요? 바다가 얼 정도로 추운 공간이잖아요? 바캉스는 때와 장소에 맞지 않잖아요?!\n#3;em;[?!]"
90000160-47 = "3;토키 모드 1;02;아뇨. 이럴 때일수록 여유를 잃지 않는 게 중요하니까요. 느긋한 마음이야말로 중요합니다."
90000160-48 = "3;에이미 수영복ND;03;거봐. 토키도 동의하잖아?\n#3;em;[음표]"
90000160-49 = "3;히마리 방한복;06;……선생님? "
90000160-50 = "[s] \"느긋하게 지내다가 돌아가자.\""
90000160-51 = "3;히마리 방한복;06;하아……. 선생님마저.\n#3;em;[한숨]"
90000160-52 = "3;히마리 방한복;05;네. 알겠어요. 그동안 저는 방한 대책을 더 강구하고 있을 테니, 극한지의 바캉스를 즐겨보죠."
90000160-53 = "3;에이미 수영복ND;03;응, 그럼 출동~\n#3;em;[반짝]"

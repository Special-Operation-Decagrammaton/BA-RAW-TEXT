[translation]
90000160-1 = "Episode 17;The Fifth Prophet"
90000160-3 = "I am unable to find any traces of the strange beings."
90000160-4 = "It's as if they never existed."
90000160-5 = "*sigh*"
90000160-6 = "[s] \"Do you know anything about them?\""
90000160-7 = "Nothing more than what they told us. Engineers, scientists, and assistants to Decagrammaton's prophets."
90000160-8 = "Even from the grave, Decagrammaton and its machinations continue to plague us."
90000160-9 = "There's too many unanswered questions... I don't know why they called us here, but it seems our presence here was the final component in completing this Elder Sister they spoke of."
90000160-10 = "If they needed all of us, or a specific individual, and why, I don't know though. "
90000160-11 = "Maybe it was the Nameless Priests' and Gods' technology in the Abi-Eshuh they were after... "
90000160-15 = "Or even the Shittim Chest. There's still many unknowns around the General Student Council president's last gift to Schale."
90000160-16 = "[s] \"...\""
90000160-17 = "It could even be the super delicate genius hacker Akeboshi Himari's fearsome gift of Omniscience!"
90000160-18 = "(That's not real.)"
90000160-19 = "Do you know who this Elder Sister is?"
90000160-20 = "Not right now. I need more data. We'll have to do some research and analysis when we return to the lab. "
90000160-21 = "President, I just remembered something."
90000160-22 = "Huh?"
90000160-23 = "Decagrammaton's last words to us."
90000160-25 = "Ah! Yes! I can see it! "
90000160-26 = "The prophet to lead all other prophets... My final prophet, Malkuth, leading the charge to validate my existence...!"
90000160-30 = "Malkuth..."
90000160-31 = "..."
90000160-32 = "..."
90000160-33 = "You're right, Eimi. Malkuth would be...the last Sephira in the Tree of Life, I believe."
90000160-34 = "We may be at the precipice of a never before seen catastrophe."
90000160-35 = "What do we do, President?"
90000160-36 = "Prepare. "
90000160-37 = "We will have to prepare to fight those who carry out Decagrammaton's will. We'll be at odds with the three engineers: Ein, Sof, and Ohr."
90000160-38 = "[s] \"...\""
90000160-39 = "I would assume we have very little time to do so."
90000160-40 = "This is merely speculation, but I expect it will be no small task either. Kivotos will have to ready itself for a fight against all ten prophets recorded in the Tree of Life."
90000160-42 = "All ten prophets..."
90000160-43 = "You understand that time is of the essence. We must take immediate action."
90000160-44 = "What we're missing as of right now is information. We'll need to gather as much data on the fifth prophet Geburah as possible. "
90000160-45 = "I like this idea. The weather here is very nice. We can treat this like a vacation."
90000160-46 = "Are those real words coming out of your mouth?! How can you call these conditions vacation-worthy?! This frozen tundra is more like a prison!"
90000160-47 = "Let's not lose our composure. It's important to maintain a calm mind at times like this."
90000160-48 = "See? Toki is on my side."
90000160-49 = "...Sensei? Help? "
90000160-50 = "[s] \"We can't change the situation, so let's make the most of it.\""
90000160-51 = "Et tu, Sensei?"
90000160-52 = "Fine. I will adapt to the cold temperature, so enjoy your frigid vacation."
90000160-53 = "Yay. Off we go!"

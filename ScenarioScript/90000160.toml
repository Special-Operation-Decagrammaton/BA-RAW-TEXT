[translation]
90000160-1 = "第17話;第5名預言者"
90000160-3 = "……不行，我們剛才接觸的那些存在沒有留下任何痕跡。"
90000160-4 = "簡直消失得無影無蹤。"
90000160-5 = "唉……"
90000160-6 = "[s]「那些傢伙到底是什麼來歷？」"
90000160-7 = "繼承十字神名意志的工程師、科學家和預言者的幫手……目前也只能這麼認定了吧。"
90000160-8 = "也就是說，十字神名雖然已經死了，但它的意志依然活著。"
90000160-9 = "把我們叫到這裡來的原因……#n恐怕是因為要完成他們口中的「姐姐大人」需要我們的力量吧。"
90000160-10 = "雖然不清楚他們需要的是我們當中的誰…… "
90000160-11 = "是反映無名祭司和無名之神技術的「Abi-Eshuh」……"
90000160-15 = "還是聯邦學生會長留下的歐帕茲「希迪姆的箱子」……"
90000160-16 = "[s] 「……」"
90000160-17 = "還是我這個超天才清楚系病弱美少女，「全知」明星陽葵的可怕力量……"
90000160-18 = "（這個肯定不是）"
90000160-19 = "不過他們說的「姐姐大人」指的是誰呢？"
90000160-20 = "這……究竟會是誰呢……#n這部分似乎也需要分析……"
90000160-21 = "部長，你還記得嗎？"
90000160-22 = "嗯？"
90000160-23 = "當時十字神名在廢墟研究地區留下的最後一段話。"
90000160-25 = "我能看見……！"
90000160-26 = "率領所有預言者的最後預言者「馬爾庫特」，重新開始證明我的存在的模樣……！！"
90000160-30 = "馬爾庫特……"
90000160-31 = "……"
90000160-32 = "……"
90000160-33 = "馬爾庫特……也就是生命之樹最後的質點吧？"
90000160-34 = "……也許將有不同於以往的發展……新的危機即將開始。"
90000160-35 = "我們該怎麼做？"
90000160-36 = "做好準備吧。"
90000160-37 = "與繼承十字神名意志的存在……「Ain、Soph、Aur」戰鬥的準備。"
90000160-38 = "[s]「……嗯。」"
90000160-39 = "根據我的預測……那場戰鬥將發生於不久後的未來。"
90000160-40 = "我想……恐怕得對付記錄於生命之樹的10名預言者，而那將會是一場大戰……"
90000160-42 = "要對付所有預言者……"
90000160-43 = "嗯，所以不能置之不理，必須做好徹底的準備和防備。"
90000160-44 = "……先繼續在冰海收集情報吧。#n我們必須盡可能取得第5名預言者「葛夫拉」的情報。"
90000160-45 = "嗯，我贊成。這裡很涼爽，我很喜歡。#n帶著悠閒渡假的心情待一下再走吧。"
90000160-46 = "不是，我不是這個意思。#n這裡可是冷到大海都結冰了哦？不管是時間和地點都不適合渡假吧！？"
90000160-47 = "不，越是這種時候越不能失去從容。#n保有餘裕也是很重要的。"
90000160-48 = "你看，季也同意了哦？"
90000160-49 = "……老師？"
90000160-50 = "[s]「帶著悠閒的心情待一下再回去吧。」"
90000160-51 = "唉……連老師都這麼說。"
90000160-52 = "好吧，我知道了。#n這段時間我會繼續研究防寒對策，好好享受極地渡假。"
90000160-53 = "嗯，那就出動吧～"

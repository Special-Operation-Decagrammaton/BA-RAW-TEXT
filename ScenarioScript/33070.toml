[translation]
33070-1 = "第7話;火と灰に染まる日（１）"
33070-3 = "きゃあぁぁぁぁっ！？"
33070-4 = "こっち、こっちに怪我人が……！"
33070-5 = "けほっ、けほっ！だ、誰か……。"
33070-7 = "緊急事態です！古聖堂が、正体不明の爆発によって炎に包まれ……！"
33070-8 = "これは一体……せっ、尖塔が崩れています！"
33070-9 = "……ナギちゃん？"
33070-12 = "きゃぁぁぁぁっ！！"
33070-13 = "気を付けて！そっちは……！"
33070-14 = "な、何ですか、これは……。"
33070-18 = "あっ、アズサちゃんはどこに……！？"
33070-19 = "せ、先輩たちが……っ！"
33070-20 = "コハルちゃん、ヒフミちゃん！待ってください！"
33070-21 = "状況が把握できるまで、動くのは得策ではありません！"
33070-22 = "で、ですがアズサちゃんが……！"
33070-24 = "アズサちゃんも正義実現委員会も、少なくとも自分の身は守れます！今はそれよりバラバラに散らばることの方が危険です！"
33070-25 = "で、でも……！"
33070-26 = "ハナコちゃん、コハルちゃん……私たち、どうすれば……。"
33070-30 = "（……何が起きた？）"
33070-31 = "（爆発……攻撃された？状況は？）"
33070-32 = "（さっきの、何かが高速で飛んでくるような音……それにこの被害状況……）"
33070-33 = "（巡航ミサイル……それも、対空防御システムが迎撃できないほどの速さで？）"
33070-34 = "（……ラムジェットエンジン？キヴォトスで、そこまでの技術を持っているところは……）"
33070-35 = "（いや、それだけじゃこの規模の爆発にはならないはず……初めから古聖堂に爆薬が……？）"
33070-36 = "（一体、どこからが罠だった？それに、誰が……トリニティ、シスターフッド……？）"
33070-38 = "（……違う。今考えるべきことは……！）"
33070-39 = "（アコは……無事。だとすると……）"
33070-40 = "（次に動くべきは……）"
33070-41 = "……っ！先生……！？"
33070-43 = "ひ、ヒナさん、まだ立ってますねぇ……。"
33070-44 = "ど、どうしましょう……あれを受けてまだ立っているなんて、すごいですねぇ、強いですねぇ……まだまだ戦うだなんて、どうして……痛いはずなのに、苦しいはずなのに……。"
33070-46 = "やれ、特にヒナだけは逃すな。"
33070-47 = "は、はいっ！"
33070-51 = "そ、そういうことみたいでして……すみませんね、えへへっ……。"
33070-53 = "（……アリウス、分校）"
33070-54 = "あ、あなたを先に行かせないように言われてるので……すみませんが、これも命令でして……。"
33070-56 = "……。"
33070-57 = "……どきなさい。"
33070-58 = "やっぱり、辛いことばっかりですねぇ……。"
33070-63 = "キキキキキッ！！"
33070-64 = "成功だ！これぞ計画通りっ！キヒャヒャヒャヒャッ！！"
33070-65 = "マコト先輩、一体何を……？"
33070-66 = "これで邪魔者はすべて消える。ティーパーティーも、あの目障りだったヒナも！"
33070-67 = "分かるかイロハ、これぞ一石二鳥ってやつだよ。"
33070-69 = "何を隠そうこのマコト様は、トリニティを恨んでいるアリウスと前々から結託していたのさ！"
33070-70 = "ティーパーティーの内紛も、クーデターも、私は最初から知っていた。全ては今日の計画のために！"
33070-72 = "クーデター……？"
33070-73 = "いつの間にそんなことを……つまり先輩は、最初からエデン条約を結ぶ気は無かったと？"
33070-74 = "ああ、そんなことこれっぽっちも興味無いね！私の関心はずっと、邪魔者どもを片付けることだけ！"
33070-75 = "いつまで経っても姿を現さないティーパーティーの奴らをおびき出すため、あくまでそのために条約へ同意する振りをしていたのさ。"
33070-76 = "そのついでにヒナまで片付いた、こんなラッキーなことはない！キキキッ！"
33070-77 = "そのために、アリウスは多大なサポートをしてくれた。この飛行船だって私たちの友好の証としての贈り物……敵の敵は味方ということだよ、キキキキッ！！"
33070-78 = "さあ、アリウスに連絡を。本格的にトリニティの壊滅戦を始めようじゃないか。"
33070-79 = "ヒナにナギサ、私の邪魔者はもう誰もいない！"
33070-81 = "今こそトリニティを、キヴォトスの地図から消し去る時だ！"
33070-83 = "マコト先輩……そのアリウスが下手したらトリニティ以上に憎んでいるのが、私たちゲヘナなんですよ。どうして私たちと手を組むと思ったんですか？"
33070-88 = "……何ぃっ！？"
33070-89 = "ねえねえ、このたくさん置いてある箱って何？「取扱注意」「可燃性」って書いてあるけど……"
33070-90 = "まぁ、つまりは……またマコト先輩が騙された、と。"
33070-92 = "ドカアアアァァァァァァンッ！！"
33070-96 = "チームⅡ、報告を。"
33070-97 = "チームⅡ、古聖堂に侵入した。そろそろ正義実現委員会との交戦に突入する。そっちは？"
33070-98 = "ああ、こっちも用事は終わった。"
33070-99 = "ち、チームⅢ、現在ヒナさんと交戦中です！チームⅤは予定通り、地下に侵入中……！"
33070-100 = "了解、すぐに合流する。"
33070-102 = "トリニティ、そしてゲヘナよ……これまでの長きに渡る我らの憎悪、その負債を払ってもらう時だ。"
33070-103 = "我々アリウスが楽園の名の下に……"
33070-105 = "貴様らを審判してやろう。"
33070-107 = "……い！"
33070-108 = "先生、目を覚ましてください！"
33070-109 = "[s] \"アロナ……？\""
33070-110 = "先生、大丈夫ですか！？気を確かに……！"
33070-111 = "[s] \"いったい何が……。\""
33070-112 = "古聖堂が爆破させられて……何とか先生を守ろうとしたのですが……。"
33070-113 = "もう、これ以上は…………しっかり……力が……"
33070-114 = "[s] \"アロナ……！？\""
33070-125 = "[ns] （今のは……！）"
33070-127 = "……先生！"
33070-129 = "せ、先生……けほっ、こほっ……ご無事でしたか！"
33070-130 = "[ns] （身体が動かない……）"
33070-131 = "良かったです、辛うじて瓦礫の隙間に……。"
33070-132 = "待っててください、すぐに私が……！"
33070-136 = "これだけの力があることに、感謝します……先生、立てますか？"
33070-137 = "[ns] 起き上がる。"
33070-139 = "お怪我は……無さそうですね。あの爆発に巻き込まれてほとんど傷一つ無いだなんて、本当に奇跡のようです……。"
33070-143 = "先生！ご無事でしたか！"
33070-144 = "せ、先生……！"
33070-145 = "正義実現委員会のみなさん……！"
33070-146 = "[s] \"みんな、すごい怪我……。\""
33070-147 = "これくらい大したことはありません。ですが先ほどの爆発で、正義実現委員のほとんどは戦闘不能になってしまいました。"
33070-148 = "それに、ナギサ様やサクラコさん……それ以外にも多くの方が見当たらなくって……。"
33070-149 = "……ゲヘナ側も、ほとんど見当たりませんね。これは一体どういう……"
33070-151 = "っ！！"
33070-158 = "作戦地域に到着、正義実現委員会の残党を発見。……いや、訂正。残党じゃなく、正義実現委員会の真髄だ。"
33070-159 = "ツルギにハスミか……兵力をこっちに回して。これより交戦に入る。"
33070-161 = "アリウス分校……！？"
33070-162 = "ど、どこからこれほどの兵力が……！？どうやって、周辺地域は全て警戒態勢だったのに……"
33070-163 = "ま、まさか……！！"
33070-167 = "まさか、地下から……？古聖堂の地下にある、あのカタコンベから……！？"
33070-168 = "……。"
33070-169 = "……なるほど。つまりこの状況、あなたたちアリウスの仕業だと考えて良いでしょうか？"
33070-170 = "……許しません。その代償、今ここで……っ！"
33070-171 = "……ハスミ。"
33070-172 = "……！"
33070-173 = "落ち着け。"
33070-174 = "……はい、そうですね。"
33070-175 = "ありがとうございます、ツルギ。今は先生の安全が最優先……先生を連れて、ここから離脱します。"
33070-176 = "あぁ……暴れるのは、私の役目だ。"
33070-177 = "くひひひひっ……さぁ。"
33070-178 = "相手してやるぜ、虫けらども！かかってきなぁっ！！！"
33070-180 = "ひゃっははははああぁぁーーーっ！"
33070-181 = "先生、行きましょう！"

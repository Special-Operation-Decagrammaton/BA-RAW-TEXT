[translation]
33070-1 = "Episode 7;Day of Fire and Ash Part 1"
33070-3 = "Ahhhhhh!"
33070-4 = "S-Student down! Student down!"
33070-5 = "*cough* *cough*"
33070-7 = "Breaking news! An unknown explosion has gone off at the cathedral!"
33070-8 = "It's completely engulfed in flames! The steeple—it's collapsing!"
33070-9 = "Nagi. "
33070-12 = "Ahhhhhh!"
33070-13 = "Look out! Run away!"
33070-14 = "Wh-What's happening...?"
33070-18 = "I don't see Azusa anywhere!"
33070-19 = "The Justice Task Force was there... Are they...? "
33070-20 = "Koharu! Hifumi! "
33070-21 = "We can't just go rushing over there! It's too dangerous until we know the situation!"
33070-22 = "But what about Azusa?"
33070-24 = "She and the Justice Task Force are perfectly capable of handling themselves! The rest of us can't afford to be separated!"
33070-25 = "B-But... "
33070-26 = "Then what are we supposed to do?"
33070-30 = "(What just happened?)"
33070-31 = "(An explosion? Are we under attack?)"
33070-32 = "(That sound was...something flying at high speed followed by impact.)"
33070-33 = "(Could that have been a cruise missile? At speeds too fast for anti-air defense to intercept?)"
33070-34 = "(Was it using a ramjet engine? But the only place in Kivotos with that kind of tech is...)"
33070-35 = "(No. That alone doesn't explain the scale of the damages. Was there an explosive planted in the cathedral from the beginning?)"
33070-36 = "(Who could have laid such a trap? Trinity? The Sisterhood?)"
33070-38 = "(Now isn't the time to think about that. I have to stay focused.) "
33070-39 = "(Ako should be fine, but I have to move quickly.)"
33070-40 = "(...) "
33070-41 = "Sensei!"
33070-43 = "Th-That Hina girl is still standing..."
33070-44 = "Wh-What do we do now? How are we supposed to contain someone strong enough to withstand that? If she's still willing to fight, this is going to hurt... We're gonna suffer..."
33070-46 = "No excuses. Don't let Hina get away. "
33070-47 = "Y-Yes! I-I'll try! "
33070-51 = "W-Well, we have our orders. Sorry about this...haha. "
33070-53 = "(Arius Satellite School.)"
33070-54 = "W-We can't exactly let you leave.."
33070-56 = "..."
33070-57 = "Move."
33070-58 = "O-Oh, boy. Here comes the suffering."
33070-63 = "Hahahaha! "
33070-64 = "All according to plan! Hahaha!"
33070-65 = "What are you talking about...?"
33070-66 = "Everyone who would dare interfere with my plans is gone!#nNot just the Tea Party, but that eyesore Hina as well."
33070-67 = "Don't you understand, Iroha? This is a classic example of killing two birds with one stone. "
33070-69 = "That's why I've been colluding with Trinity's bitter enemy Arius this whole time! "
33070-70 = "I knew everything from the very beginning. From the Tea Party's internal struggles to the coup d'état. All of it has been building toward today!"
33070-72 = "Coup d'etat? "
33070-73 = "How long have you been conspiring this? That would mean...you never intended to sign the Eden Treaty in the first place."
33070-74 = "That's right! I never had any interest in it. All I've cared about is disposing of the interlopers in my way!"
33070-75 = "I only agreed to it to draw those Tea Party vermin out of their holes."
33070-76 = "And why not finally rid myself of Hina while I'm at it? Kiheheh!"
33070-77 = "Arius was so generous to offer their support. In fact, they're the ones who paid for this reinforced blimp: a symbol of our friendship. As they say, the enemy of my enemy is my friend. Kiheheheh!"
33070-78 = "Now, then. Contact Arius."
33070-79 = "Hina and Nagisa will never stand in my way again! "
33070-81 = "The time has come to wipe Trinity off the map once and for all!"
33070-83 = "Makoto...you understand that Arius hates Gehenna even more than they hate Trinity, correct? Why would they ever agree to cooperate with us?"
33070-88 = "THEY DO?!"
33070-89 = "Hey, Ibuki found a bunch of boxes here! It says \"flammable,\" \"handle with care,\" and...\"explosives\"?"
33070-90 = "*sigh* They tricked you, Makoto. "
33070-92 = "*BOOM*"
33070-96 = "Team II. Report."
33070-97 = "Team II has entered the cathedral. We'll engage the Justice Task Force shortly. What about you, Leader?"
33070-98 = "I've finished what I had to. "
33070-99 = "Team III is currently engaging Hina! Team V is going underground as planned!"
33070-100 = "Roger that. I'll be joining you soon."
33070-102 = "Trinity and Gehenna... The time has finally come to pay the price for this age-old hatred. "
33070-103 = "Yes, in the name of paradise..."
33070-105 = "...we, Arius, will be the ones to pass judgment on you."
33070-107 = "...nsei!"
33070-108 = "Sensei! Wake up!"
33070-109 = "[s] \"Arona?\""
33070-110 = "Are you okay? You need to get a hold of yourself!"
33070-111 = "[s] \"What happened?\""
33070-112 = "There was an explosion, and the cathedral collapsed. I did everything I could to protect you, but..."
33070-113 = "Ugh. I think I'm at my limit. I'm going to run out of energy, so you have to wake up!"
33070-114 = "[s] \"You did what? Arona?!\""
33070-125 = "[ns] \"(What was that just now?)\""
33070-127 = "...nsei!"
33070-129 = "Sensei... *cough* *cough* You're okay!"
33070-130 = "[ns] \"(I can't move...)\""
33070-131 = "Thank goodness. You were buried underneath the rubble. "
33070-132 = "Hold on. I'll get you out!"
33070-136 = "I'm glad my muscles are coming in handy at a time like this... There. Can you move?"
33070-137 = "[ns] Stand up."
33070-139 = "You don't seem to be seriously hurt. It's a miracle you didn't sustain any serious injuries after an explosion like that..."
33070-143 = "Sensei! You're all right!"
33070-144 = "*sob* Sensei!"
33070-145 = "The Justice Task Force! Oh, your wounds..."
33070-146 = "[s] \"You should be more worried about yourselves than me.\""
33070-147 = "We'll be fine. The other members have been incapacitated from the explosion, unfortunately."
33070-148 = "Nagisa, Sakurako, and the key personnel who were with them are missing. On top of that..."
33070-149 = "I haven't spotted a single person representing Gehenna. What's going on?"
33070-151 = "...!"
33070-158 = "Confirming arrival at target destination. Justice Task Force remnants spotted. No—correction. It's the core of their forces."
33070-159 = "Tsurugi and Hasumi sighted. Send in reinforcements. We'll be engaging shortly."
33070-161 = "Arius Satellite School?! "
33070-162 = "Wh-Where did they come from? How did they get here?! The perimeter should have been secure... "
33070-163 = "I-It can't be!"
33070-167 = "They must have come from underground... The catacombs below the cathedral."
33070-168 = "... "
33070-169 = "I see. So all of this is Arius' doing, is it?"
33070-170 = "You won't get away with this. You'll pay for your sins here and now!"
33070-171 = "Hasumi."
33070-172 = "...!"
33070-173 = "Try to stay calm."
33070-174 = "Yes. You're right. "
33070-175 = "Thank you, Tsurugi. We need to prioritize Sensei's safety right now and get them as far away from here as possible. I'll take care of that."
33070-176 = "Sure. Let me be the one to get my hands dirty. "
33070-177 = "Keheheh... Well, then. "
33070-178 = "Line up and prepare to be exterminated!"
33070-180 = "Kyahahahahaha!"
33070-181 = "Let's go, Sensei!"

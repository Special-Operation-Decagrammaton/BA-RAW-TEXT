[translation]
33070-1 = "第7話;染上火與灰燼之日（１）"
33070-3 = "呀啊啊啊啊啊！？"
33070-4 = "這邊，這邊有傷患……！"
33070-5 = "咳咳，咳咳！誰，誰來……"
33070-7 = "緊急事態！古教堂因為原因不明的爆炸陷入火海……！"
33070-8 = "這到底是……尖，尖塔崩塌了！"
33070-9 = "……渚醬？"
33070-12 = "呀啊啊啊啊！！"
33070-13 = "小心點！那邊是……！"
33070-14 = "這，這是，什麼情況……"
33070-18 = "啊，梓醬在哪裡……！？"
33070-19 = "前，前輩們……！"
33070-20 = "小春醬，日步美醬！請等一下！"
33070-21 = "在掌握狀況前就行動並不是好方法！"
33070-22 = "可，可是梓醬她……！"
33070-24 = "梓醬和實現正義部，至少都可以保護自己！比起那個，現在走散的話更危險！"
33070-25 = "可，可是……！"
33070-26 = "花子醬，小春醬……我們，該怎麼辦……"
33070-30 = "（……發生了什麼？）"
33070-31 = "（爆炸……被攻擊了？狀況呢？）"
33070-32 = "（剛才，像是什麼東西高速飛過來的聲音……而且這個被害狀況……）"
33070-33 = "（巡航導彈……而且還是，以對空防禦系統無法迎擊的速度？）"
33070-34 = "（……衝壓引擎？在奇普托斯，持有那種技術的地方……）"
33070-35 = "（不，光是那樣不會有這個規模的爆炸才對……從一開始就在古教堂埋了炸藥……？）"
33070-36 = "（到底，從哪裡開始是陷阱？而且，是誰……三一，修女會……？）"
33070-38 = "（……不對。現在該思考的是……！）"
33070-39 = "（亞子……沒事。這樣的話……）"
33070-40 = "（下一個該採取的行動……）"
33070-41 = "……！老師……！？"
33070-43 = "陽，陽奈同學，還站得起來呢……"
33070-44 = "該，該怎麼辦……受到那種攻擊竟然還能站起來，真厲害呢，真強呢……竟然還能戰鬥，為什麼……明明很痛，明明很痛苦……"
33070-46 = "動手，絕對別讓陽奈跑了。"
33070-47 = "是，是的！"
33070-51 = "似，似乎就是那麼回事……不好意思呢，欸嘿嘿……"
33070-53 = "（……奧利斯，分校）"
33070-54 = "因，因為被交代不能讓妳前進……不好意思，這也是命令……"
33070-56 = "……"
33070-57 = "……滾開。"
33070-58 = "果然，都是難受的事呢……"
33070-63 = "嘻嘻嘻嘻嘻！！"
33070-64 = "成功了！跟計劃一樣！嘻呀呀呀！！"
33070-65 = "真琴前輩，到底做了什麼……？"
33070-66 = "這樣礙事者就全都會消失。茶會也是，那個礙眼的陽奈也是！"
33070-67 = "妳知道嗎伊呂波，這就是所謂的一石二鳥唷。"
33070-69 = "不瞞你說我真琴大人，很久以前就和憎恨三一的奧利斯串通了！"
33070-70 = "茶會的內亂和政變，我最初就知道了。全都是為了今天的計劃！"
33070-72 = "政變……？"
33070-73 = "什麼時候做了那種事……也就是說，前輩從最初開始就沒有打算締結伊甸園條約？"
33070-74 = "啊啊，那種事一點興趣都沒有呢！我關心的一直都是，清除礙事者而已！"
33070-75 = "為了引出不管過了多久都不肯現身的茶會那些傢伙，終究只是為了這個才假裝同意條約的。"
33070-76 = "還順便清除了陽奈，沒有比這個更幸運的事了！嘻嘻嘻！"
33070-77 = "為了這個，奧利斯給了龐大的支援。這艘飛船也是作為我們友好證明的禮物……敵人的敵人就是友方唷，嘻嘻嘻嘻！！"
33070-78 = "好，聯絡奧利斯。讓我們正式的開始三一毀滅戰吧。"
33070-79 = "陽奈和渚，妨礙我的人已經不在了！"
33070-81 = "現在正是，將三一從奇普托斯的地圖抹消的時候了！"
33070-83 = "真琴前輩……那個奧利斯搞不好比起三一更憎恨我們格黑娜唷。為什麼認為她們會和我們合作呢？"
33070-88 = "……什麼──！？"
33070-89 = "吶吶，這個放了很多的箱子是什麼？寫著「小心使用」「可燃性」耶……"
33070-90 = "嘛，也就是說……真琴前輩又被騙了。"
33070-92 = "（咚哐哐哐哐哐哐哐哐哐哐！！）"
33070-96 = "小組Ⅱ，回報。"
33070-97 = "小組Ⅱ，入侵古教堂了。差不多要和實現正義部交戰了。那邊呢？"
33070-98 = "啊啊，這邊也處理完了。"
33070-99 = "小，小組Ⅲ，正在和陽奈同學交戰中！小組Ⅴ按照計劃，正在入侵至地下……！"
33070-100 = "了解，我馬上會合。"
33070-102 = "三一，還有格黑娜啊……長期以來我們的憎惡，到了該償還這項負債的時刻了。"
33070-103 = "讓我們奧利斯以樂園之名……"
33070-105 = "審判你們吧。"
33070-107 = "……師！"
33070-108 = "老師，請醒一醒！"
33070-109 = "[s]「彩奈……？」"
33070-110 = "老師，你沒事吧！？振作一點……！"
33070-111 = "[s]「到底發生了什麼……」"
33070-112 = "古教堂被引爆……總算是保住了老師……"
33070-113 = "已經，快撐不住了……振作一點……沒力了……"
33070-114 = "[s]「彩奈……！？」"
33070-125 = "[ns]（剛才的是……！）"
33070-127 = "……老師！"
33070-129 = "老，老師……咳咳，咳咳……您沒事啊！"
33070-130 = "[ns]（無法動彈……）"
33070-131 = "太好了，只是卡在瓦礫的縫隙間……"
33070-132 = "請稍等一下，我馬上……！"
33070-136 = "感謝自己能有這麼大的力氣……老師，站得起來嗎？"
33070-137 = "[ns] 起身"
33070-139 = "看起來……沒有受傷呢。被捲進那場爆炸竟然幾乎沒有受傷，真的是奇蹟……"
33070-143 = "老師！您沒事啊！"
33070-144 = "老，老師……！"
33070-145 = "實現正義部的各位……！"
33070-146 = "[s]「大家，傷得好嚴重……」"
33070-147 = "這點程度沒什麼。不過因為剛才的爆炸，實現正義部員幾乎都無法戰鬥了。"
33070-148 = "而且，渚同學和櫻子同學……還有其他人都沒看見……"
33070-149 = "……格黑娜那邊，也幾乎沒看見呢。這到底是……"
33070-151 = "！！"
33070-158 = "抵達作戰地區，發現實現正義部的殘黨。……不對，更正。不是殘黨，是實現正義部的主力。"
33070-159 = "弦生和蓮實啊……把兵力轉來這邊。現在進入交戰。"
33070-161 = "奧利斯分校……！？"
33070-162 = "從，從哪裡來這麼多的兵力……！？是怎麼，明明周邊地區全都處於警戒態勢……"
33070-163 = "難，難道說……！！"
33070-167 = "難道說，從地下……？從古教堂地下的那個地下墓穴……！？"
33070-168 = "…… "
33070-169 = "……原來如此。也就是這個狀況，可以認為是妳們奧利斯的作為吧？"
33070-170 = "……無法原諒。這個代價，就在這邊……！"
33070-171 = "……蓮實。"
33070-172 = "……！"
33070-173 = "冷靜點。"
33070-174 = "……是，說的也是呢。"
33070-175 = "謝謝妳，弦生。現在老師的安全為優先……帶著老師，從這裡脫離。"
33070-176 = "啊啊……大鬧是我的職責。"
33070-177 = "咕嘻嘻嘻嘻……好了。"
33070-178 = "我來當對手，蟲子們！放馬過來呀啊！！！"
33070-180 = "呀哈哈哈哈啊啊啊啊──！"
33070-181 = "老師，走吧！"

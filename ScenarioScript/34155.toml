[translation]
34155-3 = "咳，咳……"
34155-4 = "哈啊……唔……"
34155-5 = "總算是，成功壓制了……"
34155-6 = "嗚，嗚嗚……真的打倒她了嗎。"
34155-10 = "嗯……真痛啊……果然老師在的話很麻煩呢……"
34155-11 = "[s1] 「彌香……聖亞應該沒事的唷。」\n[s2] 「所以回三一去吧……我不想傷害彌香。」"
34155-12 = "老師……"
34155-13 = "老師……"
34155-14 = "抱歉……我總是這樣對吧……"
34155-15 = "像我這樣的問題兒童……每次都讓老師擔心的學生……是無法待在老師身邊的，這點我很清楚……"
34155-19 = "但是……我……"
34155-21 = "我……對我來說……"
34155-23 = "已經沒有可以回去的地方了……不管是三一……還是其他地方……"
34155-24 = "因為我是三一的叛徒、大家的敵人……#n──是傷害聖亞醬無數次的魔女……"
34155-25 = "如果被趕出學園的話，不管是渚醬還是重要的人們……都再也見不到了……"
34155-26 = "如果不再是學生了……像我這樣的問題兒童，就算是老師也不會想再見到我了……"
34155-27 = "我很清楚，已經不會有比這更幸福的未來了……"
34155-28 = "因，因為我是……壞人……殺人兇手……"
34155-29 = "所以……我剩下的就只有[ruby=．   ．   ．   ．]這種東西[/ruby]了……"
34155-30 = "但是，你們呢……憑什麼？"
34155-31 = "我明明失去了所有重要的東西！#n被奪走了一切！！"
34155-32 = "而你們呢……憑什麼？"
34155-34 = "……"
34155-35 = "……"
34155-36 = "……"
34155-40 = "你們什麼代價都沒有付出，什麼都沒有被奪走……"
34155-41 = "如果接受這種事的話……我……"
34155-42 = "我……就真的什麼都不是了……"
34155-43 = "我，又有什麼意義呢……"
34155-44 = "我……"
34155-45 = "我，該怎麼辦才好……"
34155-46 = "……"
34155-47 = "不能就這樣放任奧利斯小隊──放任沙織不管……"
34155-48 = "那個女人不能就這麼毫無代價地接受老師的庇護……"
34155-49 = "……"
34155-50 = "所以老師，請不要阻止我。"
34155-63 = "[ns] 「彌香！」"
34155-64 = "走，走掉了……？"
34155-65 = "到底是怎麼回事啊……那個女人。"
34155-66 = "你是如此地……憎恨著我嗎，彌香。"
34155-67 = "……或許，這也是沒辦法的。"
34155-68 = "隊長打算怎麼做呢？那個女人似乎還會追著我們……如果就這樣衝進宗座聖殿的話可能會有點危險。"
34155-69 = "奧利斯、聖徒會……還有一個跟蹤狂……沒有辦法全都應付。"
34155-70 = "……就這樣從舊校舍地下的迴廊進入宗座聖殿。"
34155-71 = "她有什麼計畫都無所謂。走吧……沒有時間了。"
34155-75 = "是，是的！"
34155-79 = "……沒辦法了，嗎？"
34155-80 = "走吧，老師。"
34155-85 = "[ns3] 跟上\n[ns4] （彌香……）"
34155-91 = "下一話;地下迴廊"

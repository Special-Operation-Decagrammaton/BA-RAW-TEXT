[translation]
34155-3 = "แค่กๆ แค่กๆ..."
34155-4 = "แฮ่ก... แฮ่ก..."
34155-5 = "คุมตัวไว้ได้หรือยัง..."
34155-6 = "อะ... อึก... สงบไปแล้วเหรอคะ?"
34155-10 = "โอ๊ย... เจ็บนะ... ยิ่งมีคุณครูก็ยิ่งยุ่งยาก... "
34155-11 = "[s1] \"มิกะ... ครูเชื่อว่าเซอาจะต้องปลอดภัย\"\n[s2] \"เพราะงั้นกลับทรีนิตี้ไปเถอะ ครูไม่อยากทำให้เธอต้องเจ็บตัวนะ!\""
34155-12 = "คุณครู..."
34155-13 = "คุณครู..."
34155-14 = "ขอโทษนะ... ฉันทำตัวแบบนี้มาตลอด..."
34155-15 = "ฉันรู้ดีว่าตัวปัญหาอย่างฉัน... เด็กที่ทำให้คุณครูต้องเสียใจไม่รู้กี่ครั้งต่อกี่ครั้งอย่างฉัน... ไม่อาจอยู่ข้างๆ คุณครูได้..."
34155-19 = "แต่ว่า... แต่ว่าฉัน... ฉันน่ะ..."
34155-21 = "ฉันน่ะ... ฉัน..."
34155-23 = "ฉันไม่มีที่ที่จะให้กลับไปแล้ว...... ไม่ว่าจะทรีนิตี้...... หรือว่าที่ไหน......"
34155-24 = "ฉันเป็นทั้งคนทรยศ ทั้งศัตรูของทรีนิตี้... เป็นแม่มดที่ทำให้เซอาจังต้องบาดเจ็บตั้งหลายครั้ง..."
34155-25 = "ฉันรู้ดีว่าถ้าถูกไล่ออกจากโรงเรียน ฉันก็จะไม่ได้เจอนางิจัง ไม่ได้เจอคุณครู... ไม่ได้เจอคนสำคัญของ#nฉันอีก..."
34155-26 = "ถ้าฉันไม่ได้เป็นนักเรียนแล้วละก็... คุณครูก็คงไม่ยอมมาพบเด็กเจ้าปัญหาอย่างฉันอีก..."
34155-27 = "ไม่มีอนาคตที่แสนสุขรออยู่ข้างหน้าฉันอีกต่อไปแล้ว..."
34155-28 = "เพราะว่าฉันเป็นคนร้าย... เป็นฆาตกร..."
34155-29 = "เพราะฉะนั้น... สิ่งที่เหลืออยู่สำหรับฉัน ก็มี[ruby=.]เพียง[/ruby][ruby=.]สิ่ง[/ruby][ruby=.]นี้[/ruby]..."
34155-30 = "แต่ว่ากับพวกเธอ... ทำไมมันต่างกันล่ะ!!"
34155-31 = "ฉันสูญเสียสิ่งมีค่าไปทั้งหมด! ถูกแย่งไปทุกอย่าง!"
34155-32 = "แต่กับพวกเธอ... ทำไมถึงได้...!"
34155-34 = "......"
34155-35 = "......"
34155-36 = "......"
34155-40 = "ดูพวกเธอสิ พวกเธอไม่ต้องชดใช้อะไร แถมยังร่าเริงกันได้อยู่อีก พอฉันเห็นพวกเธอแบบนี้แล้ว..."
34155-41 = "ฉัน..."
34155-42 = "ฉัน... กลายเป็นคนไร้ค่า..."
34155-43 = "มันไม่มีความหมายอะไรเหลือสำหรับฉันเลย..."
34155-44 = "แต่ว่า..."
34155-45 = "ฉันเฝ้าดูพวกเธออยู่เฉยๆ ไม่ได้..."
34155-46 = "......"
34155-47 = "ฉันยอมสควอด ยอมซาโอริไปไม่ได้..."
34155-48 = "ฉันยอมให้ผู้หญิงคนนั้นได้รับความหวังดีจากคุณครูอย่างหน้าไม่อายไม่ได้..."
34155-49 = "......"
34155-50 = "คุณครูอย่ามาห้ามฉันเลย"
34155-63 = "[ns] \"มิกะ! ไม่ได้นะ รอครูก่อน!!\""
34155-64 = "ปะ... ไปแล้วเหรอคะ...?"
34155-65 = "ตั้งใจจะทำอะไรของเธอกันแน่นะ... "
34155-66 = "นี่เธอ... แค้นฉันขนาดนั้นเลยเหรอ... มิกะ"
34155-67 = "อย่างนี้เองสินะ... ถึงจะมองว่าหน้าไม่อายแต่ก็คงช่วยอะไรไม่ได้อยู่ดี"
34155-68 = "ทำยังไงดีล่ะหัวหน้า? เธอน่าจะไล่ล่าเราต่อไปเรื่อยๆ นะ... ถ้าเข้าไปมหาวิหารทั้งๆ แบบนี้คงจะอันตราย"
34155-69 = "อาเรียส สาวก... แล้วไหนจะมีคนไล่ล่าอีก... น่าปวดหัวจริงๆ"
34155-70 = "ไม่หรอก... เราจะเข้ามหาวิหารด้วยทางเชื่อมใต้ดินของอาคารเรียนเก่า"
34155-71 = "ไม่ว่าเธอคิดจะทำอะไรก็ไม่สำคัญหรอก ไปกันเถอะ... เราไม่มีเวลาแล้ว "
34155-75 = "ค่ะ!"
34155-79 = "ช่วยไม่ได้สินะ... "
34155-80 = "ไปกันเถอะ คุณครูก็ด้วย"
34155-85 = "[ns3] ตามไป\n[ns4] (มิกะ......)"
34155-91 = "ตอนต่อไป;ทางเชื่อมใต้ดิน"

[translation]
101070-1 = "Episode 7; Convening the Emergency Response Committee"
101070-2 = "The request to convene the Emergency Response Committee was sent to each district."
101070-4 = "This..."
101070-5 = "What is it, Ayane?"
101070-7 = "Sakurako..."
101070-8 = "...A message from the General Student Council."
101070-10 = "..."
101070-12 = "The General Student Council seeks to form an Emergency Response Committee... How many years has it been?"
101070-13 = "I heard Sensei reported our prophetic dream to the General Student Council. Could that be the catalyst?"
101070-14 = "The General Student Council isn't the type to enact such drastic measures over a hunch. There's likely more to this than we know."
101070-15 = "However, I have been wary of the General Student Council since the president's disappearance. While Nanagami Rin has been harmless enough, it would be foolish of us to blindly follow her lead."
101070-16 = "The raging storm within the Council since the president's disappearance has been obvious to all. We need to discuss the situation with Sensei before anything else."
101070-17 = "As of now, I don't see any reason to turn it down."
101070-18 = "...Sensei will be by our side."
101070-19 = "We may not be in the majority with our decision to attend, however. I see here the Pandemonium Society, Millennium's Big Sister, the Red Dictator, and even the Dark Monarch were invited."
101070-20 = "I find it unlikely a meeting with such a cast can run smoothly. I'm apprehensive of the political strife that may ensue."
101070-28 = "Oh my gosh! Nagi! Seia! Whatcha doing up here?"
101070-29 = "M-Mika..."
101070-30 = "Whoa, wow! Lemme see! The General Student Council is asking all Tea Party members to attend an Emergency Response Committee meeting?"
101070-31 = "That sounds so dramatic! I guess I don't have a choice, do I? What should I wear? I'll need to curl my hair too!"
101070-35 = "Hm? Gehenna and the Pandemonium Society will be there too? "
101070-36 = "..."
101070-37 = "Mika... Please..."
101070-38 = "Please what, Nagi? Please don't cause trouble? Don't you know me by now? Heehee! ☆"
101070-39 = "Sensei's gonna be there right? I have to impress them with how much I've grown!"
101070-44 = "..."
101070-45 = "*sigh* ...I already have a headache."
101070-46 = "Our opportunity has finally come, Iroha! It's time!"
101070-47 = "...Time for what?"
101070-48 = "We will rise to the occasion and prove the might of the Pandemonium Society to the General Student Council and Schale itself!"
101070-49 = "I intercepted the message before it could reach the Prefect Team! Heeheehee. We'll carry out our plan without their unbearable meddling!"
101070-50 = "...At least tell me what your plan is, Makoto."
101070-51 = "The General Student Council isn't going to just plop us down next to Trinity. They're not that dumb."
101070-52 = "Well... Hopefully Sensei can keep things from devolving into a total disaster."
101070-54 = "...You have 51,234 unread messages."
101070-57 = "...You have 51,235 unread messages."
101070-59 = "Madam! This..."
101070-60 = "Don't make a fuss. I know."
101070-61 = "Y-Yes, ma'am."
101070-62 = "It is not my place to interfere. But I should be aware of what transpires."
101070-64 = "I find it strange that the General Student Council would invite us. We're remote both geographically and politically."
101070-65 = "Nyahaha! I agree! They've been contacting us more often these days, haven't they, Kaho?"
101070-66 = "...That's not a laughing matter, Niya."
101070-67 = "Nyahaha. Perhaps you're right."
101070-68 = "If Hyakkaryouran was around, we could leave such annoyances to them..."
101070-70 = "I haven't seen the president lately. What's going on?"
101070-71 = "You didn't hear? She's hiding in the mountains because of the most recent coup."
101070-72 = "Another one? Who staged it this time? "
101070-73 = "Eh. Who cares? Wasn't the first, won't be the last."
101070-74 = "Wanna take bets on how long she'll be gone this time?"
101070-80 = "Sensei, the General Student Council sent us an email!"
101070-81 = "Senior Administrator Rin assembled the student representatives of the main districts for what's known as an Emergency Response Committee!"
101070-82 = "And Rin's attached some separate data just for you..."
101070-84 = "It says that masses with ultra-high energy have been observed all over Kivotos."
101070-86 = "But the masses are invisible..."
101070-87 = "The goal of the Emergency Response Committee is for the districts to cooperate with each other to find out the cause and truth behind this phenomenon!"
101070-88 = "It's gonna be difficult to organize all the different districts' students, so they've requested Sensei's presence to help!"
101070-89 = "[s] \"Thanks for the summary, Arona.\""
101070-90 = "That's my job! They're sending an escort to come retrieve you soon. You're an important person, so they're covering all security concerns."
101070-91 = "In the meantime, I'll look more into the information Rin gave us."
101070-92 = "I'll let you know if I find anything out!"
101070-93 = "[s] \"I can always count on you. Thank you.\""
101070-99 = "Sensei? We're here to pick you up."
101070-100 = "We will be your escort to the Sanctum Tower, the General Student Council's current base of operations."
101070-101 = "[s] \"Valkyrie?\""
101070-102 = "Yes. We've prepared a helicopter at Schale's emergency heliport."
101070-104 = "This way, please."
101070-105 = "[ns1] Get on the helicopter.\n[ns2] Step into the helicopter."
101070-111 = "..."
101070-112 = "..."
101070-113 = "[s] \"It seems excessive to use a tactical transport helicopter just to pick me up...\""
101070-114 = "Well, we're a police school. "
101070-115 = "We have the resources to provide this kind of support to someone so important."
101070-116 = "[ns3] \"...\"\n[ns4] \"...?\""
101070-120 = "And seeing how there's barely enough budget for bullets these days, I can't be selfish."
101070-121 = "At this rate, I'm going to be wielding a peashooter against a flamethrower! Or worse!"
101070-123 = "..."
101070-124 = "..."
101070-125 = "[ns5] \"Who are you guys?!\" \n[ns6] \"You're not Valkyrie students!\""
101070-128 = "..."
101070-129 = "..."
101070-135 = "[ns7] \"...!!!\"\n[ns8] \"Kaiser PMC...!\""
101070-138 = "You pick up on things quickly, Sensei. Although not quickly enough."
101070-139 = "*tchhhk* We've secured Schale's Sensei."
101070-140 = "*tchhhk* Good job. Then continue with the next phase."
101070-142 = "Heeheehee. I'm guessing the mission was a success, General?"
101070-148 = "Yes. We have secured Schale's Sensei."
101070-149 = "Indeed."
101070-150 = "The Emergency Response Committee will be crippled without Sensei, and the chief officer's authority will plummet. "
101070-151 = "Which brings us one step closer to our goal of dismantling Schale..."
101070-152 = "...Huh?"
101070-157 = "A-Argh...?!"
101070-161 = "...We finally know your motives, Chief of Defense."
101070-162 = "We've never had any interest in your idea of justice. Dismantling Schale isn't to our advantage at this point."
101070-163 = "Without your knowing, our plans changed a long time ago."
101070-168 = "President, it's me."
101070-169 = "Hello, General. Are we proceeding according to plan?"
101070-170 = "Yes. Everything is running smoothly."
101070-173 = "Excellent. As we've secured the artifact in the desert, we no longer have any need for the General Student Council's forces, and with that, the cooperation of the Defense Office."
101070-174 = "Gematria is also a petty waste of time. With the artifact, we can act of our own accord."
101070-175 = "Proceed to occupy the General Student Council. We will simultaneously secure administrative control of the Sanctum Tower."
101070-176 = "Then Kaiser Corporation will finally seize control of Kivotos from the hands of the General Student Council."
101070-177 = "...Hm? Don't worry. They won't cause any trouble."
101070-179 = "...Understood."
101070-183 = "Wait until the Emergency Response Committee meeting ends at the specified area. Once the General Student Council room is defenseless, we will take over."
101070-184 = "Our target is the chief officer of the General Student Council and the chairmen. But remember, the chief officer is our priority."
101070-185 = "Yes, sir."
101070-186 = "What should we do with the chief of defense?"
101070-187 = "Transfer her to the prison at the PMC headquarters. Even her soldiers won't be able to find her there."
101070-188 = "The Emergency Response Committee will fall to pieces without Sensei or the chief of defense present. When we occupy the General Student Council and the president secures administrative control over Sanctum Tower, martial law will be declared on the D.U."
101070-189 = "Then the plan will move on to the second stage."
101070-190 = "*tchhhk* General, what should we do with Sensei?"
101070-192 = "*tchhhk* Lock Sensei up somewhere no one will find them. And don't let them move a muscle, even if it means shooting a limb."
101070-193 = "Understood!"
101070-197 = "[ns] \"(At gunpoint...!)\""
101070-203 = "Next Episode; The Arrival of the Light"

[translation]
101070-1 = "ตอนที่ 7;เรียกคณะกรรมการมาตรการฉุกเฉิน"
101070-2 = "(หนังสือเชิญคณะกรรมการมาตรการฉุกเฉินขององค์การนักเรียนถูกส่งไปยังแต่ละเขตปกครองตนเอง)"
101070-4 = "นี่มัน... "
101070-5 = "อะไรเหรอ อายาเนะจัง?"
101070-7 = "ท่านซากุระโกะ..."
101070-8 = "...... มาจากองค์การนักเรียนสินะคะ"
101070-10 = "......"
101070-12 = "องค์การนักเรียนประกาศจัดตั้งคณะกรรมการมาตรการฉุกเฉินเหรอคะเนี่ย ในรอบกี่ปีกันนะ..."
101070-13 = "ได้ยินมาว่าคุณครูไปเล่าเรื่องราวในความฝันนั้นให้องค์การนักเรียนฟังด้วย......"
101070-14 = "ค่ะ แต่องค์การนักเรียนไม่น่าเคลื่อนไหวเพียงเพราะเรื่องนั้นนะคะ หรือว่าจะมีเรื่องอะไรที่พวกเราไม่รู้..."
101070-15 = "หลังจากประธานองค์การนักเรียนหายตัวไป ฉันก็ไม่เชื่อถือองค์การนักเรียนสักเท่าไรค่ะ ถึงแม้ว่าคุณ#nนานากามิ รินที่รักษาการแทนจะเป็นคนไร้พิษภัย... แต่ฉันก็ไม่อยากเชื่อใจค่ะ"
101070-16 = "ค่ะ ตอนนี้องค์การนักเรียนเหมือนกับอยู่ในพายุที่โหมกระหน่ำเลยละค่ะ แต่ยังไงเราก็ต้องหารือเรื่อง#nทั้งหมดนี้กับคุณครูค่ะ"
101070-17 = "ถ้าคิดว่านี่เป็นโอกาส ก็ไม่จำเป็นต้องปฏิเสธหรอกค่ะ  "
101070-18 = "...... เพราะถ้ามีคุณครูอยู่ด้วย ไม่ว่ายังไงก็จะผ่านไปได้ด้วยดี"
101070-19 = "แต่ดูรายชื่อผู้เข้าร่วมแต่ละคนสิ... แพนเดโมเนียม โซไซตี้ บิ๊กซิสเตอร์ จอมเผด็จการแห่งเรดวินเทอร์ ราชาทมิฬ... พวกนี้ไม่น่าจะตอบรับคำเชิญนะ..."
101070-20 = "แต่ถึงจะมา แล้วคนพวกนี้จะหารือกันด้วยดีได้หรือเปล่า... หวังว่าจะไม่เกิดสงครามนะ..."
101070-28 = "ว้าว นางิจัง! เซอาจัง! ทำอะไรกันอยู่เหรอ?"
101070-29 = "คะ.. คุณมิกะ..."
101070-30 = "หืม นี่อะไรน่ะ? คำเชิญจากองค์การนักเรียน? คณะกรรมการมาตรการฉุกเฉิน? ขอให้สภาน้ำชาทุกคน#nเข้าร่วมเหรอ?"
101070-31 = "เกิดเรื่องอะไรกับพวกนั้นรึเปล่า? ฮืม ดูท่าฉันจะต้องไปด้วยแล้วนะเนี่ย? ไม่ได้ออกไปข้างนอกตั้งนาน#nแล้วด้วยเนอะ..."
101070-35 = "...เกเฮนน่าก็มาด้วยเหรอ? แพนเดโมเนียม โซไซตี้ก็ด้วย?"
101070-36 = "......"
101070-37 = "คุณมิกะ... ได้โปรด..."
101070-38 = "ได้โปรด... อะไรเหรอนางิจัง? หืม? อย่าไปสร้างปัญหาอะไรงั้นเหรอ? ไม่หรอกน่า ไม่ต้องห่วงนะ☆"
101070-39 = "คุณครูก็อยู่ที่นั่นด้วย ฉันจะไปสร้างปัญหาอะไรได้ไงล่ะ?"
101070-44 = "......"
101070-45 = "เฮ้อ... มีเรื่องให้หนักใจอีกแล้ว..."
101070-46 = "อื้ม ในที่สุดก็ได้โอกาสแล้ว อิโรฮะ! โอกาสนั้นไง!"
101070-47 = "คะ? โอกาสเหรอคะ? โอกาสอะไร..."
101070-48 = "โอกาสที่จะทำให้องค์การนักเรียนและชาเล่ต์ตระหนักถึงการมีอยู่ของแพนเดโมเนียม โซไซตี้ยังไงล่ะ!"
101070-49 = "เรารู้ว่าจะเป็นอย่างนี้ ก็เลยไปตัดการติดต่อกับคณะกรรมการวินัยไว้ด้วย! หึหึหึหึ... เราจะเริ่มแผน#nการของพวกเราโดยไม่มีเจ้าพวกนั้น!"
101070-50 = "...... รุ่นพี่มาโคโตะ ช่วยบอกก่อนได้ไหมคะว่ามันคือแผนการอะไร?"
101070-51 = "อีกอย่าง ฉันว่าองค์การนักเรียนไม่จัดให้เราได้อยู่ที่เดียวกับทรีนิตี้หรอกค่ะ ทางนั้นน่าจะรู้นะคะว่าเรา#nสองฝ่ายไม่น่าร่วมมือทำอะไรได้ราบรื่น"
101070-52 = "ตะ... แต่ถ้ามีคุณครูอยู่ ก็อาจผ่านไปได้ด้วยดีก็ได้..."
101070-54 = "...... มี 51,234 ข้อความที่ยังไม่ได้อ่าน"
101070-57 = "...... มี 51,235 ข้อความที่ยังไม่ได้อ่าน"
101070-59 = "ท่านประมุข! เห็นสิ่งนี้หรือยังคะ!"
101070-60 = "ไม่ต้องโวยวายหรอก ฉันดูไปแล้วละ"
101070-61 = "เอ่อ... ค่ะ...."
101070-62 = "ถึงจะเป็นงานที่ฉันไม่ได้ไป แต่อย่างน้อยก็รู้ไว้ก่อนก็แล้วกัน..."
101070-64 = "...... ถือว่าเป็นเรื่องพิเศษเลยนะคะ องค์การนักเรียนติดต่อเขตปกครองตนเองที่มีการเปลี่ยนแปลงด้วย#nแบบนี้"
101070-65 = "อะฮะฮ่า~ เหมือนว่าช่วงนี้ทางนั้นจะไม่ค่อยติดต่อเราเท่าไรเลยนะว่าไหม คาโฮะ?"
101070-66 = "ต้องไม่ใช่เรื่องดีๆ แน่ค่ะ... คุณนิยะ"
101070-67 = "ก็แน่อยู่แล้วละ อะฮ่าฮ่าฮ่าฮ่า"
101070-68 = "...... ถ้าเฮียกกะเรียวรันยังอยู่ปกติดี ภาระน่าเบื่อหน่ายทั้งหมดก็คงจะหมดไปแล้ว"
101070-70 = "เหมือนว่าหมู่นี้จะไม่ค่อยเห็นประธานเลย เกิดเรื่องอะไรขึ้นหรือเปล่า?"
101070-71 = "ไม่รู้หรอกเหรอ? ก็สัปดาห์ที่แล้วมีปฏิวัติ เด็กตัวกะเปี๊ยกนั่นก็เลยหนีขึ้นภูเขาหิมะไปน่ะสิ"
101070-72 = "อีกแล้วเหรอ? รอบนี้เป็นฝีมือใครล่ะ? "
101070-73 = "ไม่รู้สิ มันสำคัญด้วยเหรอ? เรื่องแบบนี้ไม่ได้มีแค่ครั้งสองครั้งสักหน่อย"
101070-74 = "มันก็ใช่ ว่าแต่รอบนี้จะหนีไปสักกี่วันนะ"
101070-80 = "คุณครูคะ มีอีเมลส่งมาจากองค์การนักเรียนค่ะ"
101070-81 = "คุณริน หัวหน้าฝ่ายบริหารกำลังเรียกตัวแทนนักเรียนจากเขตปกครองตนเองหลักๆ เพื่อจัดตั้งเป็น... คณะกรรมการมาตรการฉุกเฉินค่ะ!"
101070-82 = "แล้วคุณรินก็แนบไฟล์ข้อมูลบางอย่างมาให้คุณครูคนเดียวด้วยค่ะ..."
101070-84 = "ในนี้บอกว่าสังเกตพบก้อนมวลสารที่มีพลังงานเข้มข้นสูงเป็นพิเศษกระจายอยู่ทั่วคิโวทอสละค่ะ"
101070-86 = "แต่ว่าทางนั้นก็ยังไม่เห็นก้อนมวลสารที่ว่านั้นจริงๆ..."
101070-87 = "ก็เลยจะขอความร่วมมือจากแต่ละเขตปกครองตนเอง แล้วจัดตั้งคณะกรรมการมาตรการฉุกเฉินขึ้นมา เพื่อหาสาเหตุและตัวตนของปรากฏการณ์นี้ค่ะ!"
101070-88 = "และเนื่องจากเป็นงานที่มีนักเรียนจากหลายเขตปกครองมารวมกัน จึงเป็นเรื่องยากที่จะจัดการความคิด#nเห็นของทุกคนได้ ก็เลยอยากขอความช่วยเหลือจากคุณครูด้วยค่ะ!"
101070-89 = "[s] \"ขอบใจที่ช่วยสรุปให้นะอะโรน่า\""
101070-90 = "ค่ะ เห็นว่ารถที่องค์การนักเรียนเตรียมไว้ให้กำลังมาแล้วด้วยค่ะ! คุณครูเป็นคนสำคัญ ทางนั้นก็เลย#nใส่ใจกับการรักษาความปลอดภัยด้วยนะคะ!"
101070-91 = "งั้นระหว่างนี้หนูจะศึกษาข้อมูลที่คุณรินส่งมาไปพลางๆ นะคะ"

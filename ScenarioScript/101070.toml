101070-162 = "พวกฉันไม่ได้สนใจความยุติธรรมของเธอตั้งแต่แรกแล้ว ตรงกันข้าม การดำเนินการตามแผนยุบชาเล่ต์#nคงเป็นไปได้ยากแล้วละนะ"

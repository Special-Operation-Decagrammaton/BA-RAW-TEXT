101070-150 = "ถ้าไม่มีคุณครู คณะกรรมการมาตรการฉุกเฉินก็จะเป็นไปอย่างกระท่อนกระแท่น และอำนาจของหัวหน้า#nฝ่ายบริหารก็จะยิ่งตกต่ำกว่าที่เป็นอยู่ค่ะ"
101070-151 = "เป้าหมายของเราในการยุบชาเล่ต์ถือว่าสำเร็จไปอีกก้าว..."

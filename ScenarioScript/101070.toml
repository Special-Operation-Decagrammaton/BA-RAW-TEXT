101070-169 = "อ้อ แม่ทัพ แผนการเป็นไปด้วยดีหรือเปล่า?"
101070-170 = "ครับ ราบรื่นดีครับ"
101070-173 = "อื้ม เมื่อเจอวัตถุหลงยุคในทะเลทรายแล้ว กองกำลังขององค์การนักเรียน... และความร่วมมือกับสำนัก#nป้องกันก็คงไม่จำเป็นอีกต่อไป"
101070-174 = "การประสานกับเกมาเทรียก็ไม่มีความหมายแล้ว ในเมื่อได้ของชิ้นนั้นมาแล้ว เราแค่ทำต่อด้วยตัวเองก็พอ"
101070-175 = "จากนี้ไปถ้าพวกเธอยึดครององค์การนักเรียนได้ เราก็คงได้อำนาจควบคุมและบริหารของแซงค์ทัม#nทาวเวอร์มาด้วยสินะ"
101070-176 = "ถ้าเป็นอย่างนั้น อำนาจบริหารของคิโวทอสก็จะไม่ได้อยู่ที่องค์การนักเรียน แต่จะเป็นของไคเซอร์ คอร์เปอเรชั่น"
101070-177 = "อืม... ไม่ต้องกังวลไป เรื่องนั้นไม่เป็นปัญหาหรอก"
101070-179 = "......รับทราบครับ"
101070-183 = "ผมจะอยู่รอจนกว่าการประชุมคณะกรรมการมาตรการฉุกเฉินจะสิ้นสุด แล้วจะบุกเข้าไปตอนที่องค์การ#nนักเรียนไม่พร้อมป้องกันตัวครับ"
101070-184 = "เป้าหมายของเราคือเหล่าหัวหน้าคณะฯ รวมถึงหัวหน้าฝ่ายบริหารขององค์การนักเรียนด้วย ไม่จำเป็น#nต้องได้ตัวหัวหน้าคณะฯ มาครบก็ได้ แต่อย่างน้อยเราต้องได้ตัวหัวหน้าฝ่ายบริหารมา"
101070-185 = "รับทราบครับ"
101070-186 = "แล้วหัวหน้าสำนักป้องกันล่ะครับ?"
101070-187 = "ส่งตัวไปที่คุกของสำนักงานใหญ่ PMC ถ้าเป็นที่นั่น ทหารของผู้หญิงคนนั้นคงหาไม่เจอแน่"
101070-188 = "ในเมื่อไม่มีครูและหัวหน้าสำนักป้องกัน คณะกรรมการมาตรการฉุกเฉินก็คงจะล่มในอีกไม่ช้า ถ้าเรายึด#nองค์การนักเรียนได้ พอประธานใหญ่ได้อำนาจควบคุมแซงค์ทัมทาวเวอร์มา ก็จะมีการประกาศกฎอัยการศึก#nใน D.U."
101070-189 = "และหลังจากนั้น แผนการจะเข้าสู่ขั้นที่สอง"
101070-190 = "(ซ่า) นายพล แล้วเราจะทำยังไงกับครูดีครับ?"

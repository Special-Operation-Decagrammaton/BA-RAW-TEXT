101070-14 = "3;나기사;04;네. 하지만 그 정도만으로 총학생회가 움직이진 않을 텐데. 저희가 모르는 무슨 일이 있을지도…….\n#3;em;…"
101070-15 = "3;나기사;10;저는 총학생회장이 사라진 후의 총학생회를 신뢰하지 않아요. 대행 나나가미 린 씨는 무해한 사람이지만…… 그렇기에 더욱 믿을 수 없어요."
101070-16 = "1;세이아;02;네. 지금 총학생회는 휘몰아치는 폭풍 속에 있는 것과 마찬가지죠. 하지만 어차피 이 모든 일들을 선생님과 함께 논의할 필요는 있어요.\n#1;em;[반응]"

101070-18 = "1;세이아;99;……선생님이 함께 있으니 어떻게든 될 거니까."
101070-19 = "3;나기사;04;하지만 참가 목록에는…… 만마전, 빅 시스터, 붉은 독재자, 검은 군주…… 이들 대부분은 소환에 응하지도 않겠지만, 그래도……."
101070-20 = "3;나기사;15;이들이 모두 모인 자리에서 제대로 된 논의가 진행될지는……. 전쟁이 나지만 않아도 다행……."

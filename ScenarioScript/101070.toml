[translation]
101070-1 = "第7話;召集緊急對策委員會"
101070-2 = "（聯邦學生會向各學園自治區發送了緊急對策委員會的邀請書）"
101070-4 = "這是……"
101070-5 = "綾音醬，怎麼了嗎？"
101070-7 = "櫻子大人……"
101070-8 = "……是聯邦學生會傳來的，對吧。"
101070-10 = "……"
101070-12 = "……聯邦學生會宣布要成立緊急對策委員會。"
101070-13 = "聽說老師已經把夢境的內容告訴了聯邦學生會……"
101070-14 = "是的。不過聯邦學生會應該不會只因為這個理由就採取行動才對……#n說不定還有什麼其他的原因……"
101070-15 = "我……並不信賴失去學生會長後的聯邦學生會。#n作為代理的七神琳雖然是無害的人物……卻也因此無法信任。"
101070-16 = "現在的聯邦學生會就如同置身於暴風雨之中。#n不過無論如何，終究有必要與老師討論。"
101070-17 = "如果將其視為機會──那就沒有拒絕的必要吧。"
101070-18 = "……只要有老師在，總會有辦法的。"
101070-19 = "但是委員會的清單裡……#n有萬魔殿、大姐頭、赤冬的獨裁者、黑色君主等等各個學園的代表……#n雖然我不認為他們會回應召集……"
101070-20 = "但這些人齊聚一堂時，別說是正常地進行討論……#n沒有發生戰爭就已經像奇蹟一樣了──"
101070-28 = "啊，渚醬，聖亞醬！你們在這裡做什麼呢？"
101070-29 = "彌，彌香同學……"
101070-30 = "哇，這是什麼！緊急對策委員會？#n而且茶會全員都要參加？"
101070-31 = "這是怎麼了？話說，這樣我也得去嗎？#n啊，畢竟是久違的外出──"
101070-35 = "嘿……格黑娜也會來啊？[ruby=・]那[/ruby][ruby=・]個[/ruby]萬魔殿。"
101070-36 = "……"
101070-37 = "彌香同學……算我拜託你了……"
101070-38 = "咦？怎麼啦渚醬？#n不會引起騷動的唷？別擔心☆"
101070-39 = "畢竟老師也在，我不可能會做出那種事，對吧？"
101070-44 = "……"
101070-45 = "唉……又有麻煩事來了……"
101070-46 = "沒錯！就是這樣！#n這個時刻終於到來了啊伊呂波！"
101070-47 = "呃，那是什麼意思……？"
101070-48 = "讓聯邦學生會和夏萊雙方重新認識我們萬魔殿存在的時刻！"
101070-49 = "我已經攔截了要給風紀委員會的聯絡！#n嘻嘻嘻……我們要在他們不在的情況下開始計畫！"
101070-50 = "……那是什麼樣的計畫，希望你能先告訴我啊真琴前輩。"
101070-51 = "還有，我想聯邦學生會應該不會讓我們和三一待在同一個空間。#n畢竟會讓談話的過程產生危險。"
101070-52 = "不過聽說老師也會來，應該會有辦法吧……"
101070-54 = "……未讀訊息有51,234封。"
101070-57 = "……未讀訊息有51,235封。"
101070-59 = "門主大人！請您過目……"
101070-60 = "別大聲嚷嚷──妾身已經確認過了。"
101070-61 = "是，是……！"
101070-62 = "雖然並非妾身該干涉的場合，還是得看看情況。"
101070-64 = "……真稀奇呢。#n居然連我們這種邊疆的自治區都收到了聯絡。"
101070-65 = "喵哈哈，不覺得最近的聯絡越來越多了嗎～？"
101070-66 = "……這並非值得高興的事唷，仁耶大人。"
101070-67 = "說的也對，喵哈哈哈。"
101070-68 = "──要是百花繚亂還在的話就能全都推給他們了。"
101070-70 = "最近好像沒看見會長，發生什麼事了嗎？"
101070-71 = "你不知道嗎？因為上星期的政變，已經逃進雪山裡了唷。"
101070-72 = "又來了？這次是誰？"
101070-73 = "咦？誰知道～政變又不是一次兩次的事了。"
101070-74 = "確實。#n這次要在幾天之後才會回來呢。"
101070-80 = "老師，聯邦學生會傳來了訊息。"
101070-81 = "行政官琳同學似乎召集了主要自治區的學生代表。"
101070-82 = "呣呣！琳同學還附上了一份要給老師的資料呢……"
101070-84 = "好像是在奇普托斯各處觀測到了超高濃度的能量體。"
101070-86 = "但實際上卻無法以目視加以確認……"
101070-87 = "希望各個自治區互相合作，找出此一現象的原因與真相，#n似乎就是本次召集的理由。"
101070-88 = "由於聚集了各個自治區的學生，琳同學判斷要整合意見會有困難，#n所以希望借助老師的力量！"
101070-89 = "[s]「謝謝你幫忙整理，彩奈。」"
101070-90 = "是！聯邦學生會準備的車輛馬上就會抵達！#n他們會負責到達聖所之塔為止的警備！"
101070-91 = "那麼我就繼續調查從琳同學那邊收到的情報。"
101070-92 = "如果有任何查明的情報，我會告訴老師的！"
101070-93 = "[s]「嗯，拜託你了。」"
101070-99 = "我們來迎接您了，老師。"
101070-100 = "從這裡到聯邦學生會總部所在的聖所之塔為止，將由我們負責進行護衛。"
101070-101 = "[s]「女武神？」"
101070-102 = "是的。已經在夏萊的緊急直升機場準備好直升機了。"
101070-104 = "請往這裡，我們出發吧。"
101070-105 = "[ns1]搭上直升機\n[ns2]進入內部"
101070-111 = "……"
101070-112 = "……"
101070-113 = "[s]「居然用戰術運輸直升機來移動，感覺有點豪華呢。」"
101070-114 = "……是。畢竟是警察學校。"
101070-115 = "在財政方面相當有餘裕嘛。"
101070-116 = "[ns3]「…………」\n[ns4]「…………？」"
101070-120 = "更何況女武神整體的財政狀況似乎不太好……就連子彈的補給都很辛苦。"
101070-121 = "感覺這樣下去，女武神警察學園的武裝看起來就好像很貧弱一樣。"
101070-123 = "……"
101070-124 = "……"
101070-125 = "[ns5]「你們是誰？」 \n[ns6]「你們不是女武神的學生，對吧？」"
101070-128 = "……"
101070-129 = "……"
101070-135 = "[ns7]「…………！！」\n[ns8]「凱薩PMC……！！」"
101070-138 = "直覺真敏銳啊，老師。#n不過，注意到的時機稍微有點晚了。"
101070-139 = "已控制夏萊的老師。"
101070-140 = "辛苦了。那麼，繼續依照計畫進行。"
101070-142 = "呵呵……怎麼樣啊，將軍。#n任務成功了嗎？"
101070-148 = "……啊啊，順利抓住他了。"
101070-149 = "不愧是將軍。"
101070-150 = "失去老師的緊急對策委員會將會瓦解……#n琳行政官的權威也會直接跌落谷底吧。"
101070-151 = "這樣一來，距離我們讓夏萊解體的目標又前進了──"
101070-152 = "……？"
101070-157 = "咕……唔……！？"
101070-161 = "……那是你的目標吧？防衛室長。"
101070-162 = "我們打從一開始就對你的正義不感興趣。#n不如說，讓夏萊解體計畫繼續進行的話會讓人很傷腦筋的。"
101070-163 = "因為計畫在不久前改變了。"
101070-168 = "總裁，是我。"
101070-169 = "啊啊。#n將軍，計畫進行得順利嗎？"
101070-170 = "是，非常順利。"
101070-173 = "沒錯。因為在沙漠中找到了那個歐帕茲。#n已經沒有必要與聯邦學生會的武力──防衛室合作了。"
101070-174 = "就連與蓋瑪特利亞聯手也不再需要。#n只要那個東西在我們手中，即使獨斷行動也不會有問題吧。"
101070-175 = "只要你們能控制住聯邦學生會，我們就能確保聖所之塔的行政控制權。"
101070-176 = "如此一來，這個奇普托斯的行政權限就不再屬於聯邦學生會──#n──而是將移交到我們凱薩公司手中。"
101070-177 = "……啊啊，不用擔心。沒有問題。"
101070-179 = "……我明白了。"
101070-183 = "在緊急對策委員會結束前，在目標地點待命。#n抓準聯邦學生會毫無防備的時機進行突入。"
101070-184 = "目標是聯邦學生會行政官以及委員長。#n沒有必要控制住所有委員長……不過務必要抓住行政官。"
101070-185 = "知道了。"
101070-186 = "防衛室長該怎麼處理呢？"
101070-187 = "移送到PMC總部的監獄吧。#n他的私兵應該也找不到那裡吧。"
101070-188 = "老師和防衛室長的缺席──將會讓緊急對策委員會立刻瓦解。#n等我們控制住聯邦學生會，總裁取得聖所之塔的行政控制權之後……就會在D.U.發布戒嚴令吧。"
101070-189 = "這樣一來，計畫就能進入第二階段。"
101070-190 = "將軍，老師怎麼處置呢？"
101070-192 = "在計畫完成之前把他關起來吧，別讓任何人知道他的行蹤。#n然後……為了不讓他多管閒事，先開槍射他的腳吧。"
101070-193 = "Yes, Sir！"
101070-197 = "[ns]（槍口……！）"
101070-203 = "下一話;光的到來"

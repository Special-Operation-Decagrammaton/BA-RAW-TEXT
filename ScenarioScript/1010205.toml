[translation]
1010205-1 = "砰砰砰砰！"
1010205-2 = "（接到日和的聯絡後，在臨近傍晚的時候動身前往海邊）"
1010205-7 = "耶嘿嘿……又找到了一個……"
1010205-8 = "我看看……這裡也有一個呢。雖然有點小……"
1010205-12 = "[ns]（他好像撿了一些東西裝進鐵罐裡……）"
1010205-13 = "這附近應該都找過了……啊，這裡還有一個。"
1010205-17 = "沒想到仔細一找竟然有這麼多……老師應該也會很高興吧！"
1010205-18 = "啊，這裡也有……！"
1010205-20 = "（因為日和只顧著撿東西而完全沒有注意到這邊，所以偷偷觀察了他一陣子……）"
1010205-22 = "[ns]「日和。」"
1010205-23 = "啊，老師？"
1010205-24 = "約好的時間已經到了……？#n真，真的耶，我都沒發現……"
1010205-25 = "謝謝你特地過來，老師。"
1010205-26 = "我今天之所以找你來，是為了報答你哦……耶嘿嘿。"
1010205-27 = "就像上次說的一樣，我總是受到老師的照顧……"
1010205-28 = "[s1]「你不用覺得有壓力。」\n[s2]「那些都是我自願做的。」"
1010205-31 = "是，是嗎？可是我還是覺得有點過意不去……"
1010205-32 = "雖然不是什麼了不起的東西，希望老師願意收下……耶嘿嘿。"
1010205-33 = "那我們就馬上開始……#n不，不過天還沒有完全暗下來，可能還得再等一陣子……"
1010205-34 = "嗯？是不是要等到天黑才能送的禮物？"
1010205-35 = "這，這是祕密。耶嘿嘿……"
1010205-36 = "總之再稍微等一下下吧……"
1010205-40 = "現在這個天色應該剛剛好……！"
1010205-41 = "那我要開始囉……"
1010205-47 = "只要把裝在鐵罐裡的東西……點燃的話……"
1010205-48 = "啊，點燃了……！#n老師，請靠近一點……！"
1010205-49 = "[s]「什麼什麼？」"
1010205-52 = "耶嘿嘿……是煙火哦。雖然很小就是了。"
1010205-53 = "其實我從剛才就一直在海邊撿燒過的煙火和線香。"
1010205-54 = "我以前在雜誌上看到過，夏天來海邊的時候一定要放煙火……"
1010205-55 = "雖然很想買新的煙火跟老師一起欣賞，但我實在沒有錢……耶嘿嘿。"
1010205-56 = "感覺怎麼樣……？#n我覺得這樣其實也挺有氣氛的……"
1010205-57 = "[s3]「嗯，這是我見過最酷的煙火。」\n[s4]「我以後一定會經常回想起這段回憶的。」"
1010205-60 = "太，太好了……"
1010205-61 = "本來還擔心這樣會不會太無聊，讓老師覺得很失望……"
1010205-62 = "不過我還是希望有朝一日，能看到在夜空中綻放的美麗煙火……"
1010205-63 = "假如到時候也能和老師一起看的話……嗯？"
1010205-67 = "咦……鐵罐裡面好像有什麼聲音……"
1010205-71 = "噫噫！"
1010205-72 = "[s]「哇！！」"
1010205-74 = "咳咳，咳咳……"
1010205-75 = "原來還有個大型煙火沒有引爆……#n因為爆炸的威力太強，東西都從鐵罐裡噴了出來……"
1010205-79 = "而且還全都被海水澆熄……這下真的完蛋了……"
1010205-80 = "為什麼我老是這個樣子？#n難道我這輩子都無法體會到煙火的浪漫了嗎！？"
1010205-81 = "嗚啊啊啊啊！"
1010205-83 = "（安撫好日和之後，買了新的煙火跟他一起放）"
1010205-84 = "（……幸好最後日和的心情總算好了一些）"

[translation]
1010205-1 = "ปุ้งปั้ง ปุ้งปั้ง!"
1010205-2 = "(คุณครูได้รับข้อความจากฮิโยริ และไปหาเธอที่ชายหาดในช่วงเย็น)"
1010205-7 = "แหะๆ... เจออีกอันแล้วค่ะ..."
1010205-8 = "ไหนดูซิ... ตรงนี้ก็มีอันเล็กๆ อยู่อันหนึ่ง..."
1010205-12 = "[ns] (กำลังหยิบอะไรใส่กระป๋องงั้นเหรอ...)"
1010205-13 = "ทางนี้เหมือนจะเก็บครบหมดแล้วนะคะ... อ๊ะ ยังมีอีกอันหนึ่งนี่"
1010205-17 = "มีเยอะกว่าที่คิดอีกนะคะ... คุณครูเองก็จะต้องชอบแน่ๆ เลยค่ะ...!"
1010205-18 = "อ๊ะ ตรงนี้ก็มี...!"
1010205-20 = "(ฮิโยริยังไม่รู้ตัวว่าคุณครูมาหา คุณครูจึงยืนดูฮิโยริที่กำลังเก็บอะไรใส่กระป๋องอยู่ครู่หนึ่ง...)"
1010205-22 = "[ns] \"ฮิโยริ\""
1010205-23 = "อ๊ะ คุณครู?"
1010205-24 = "ถึงเวลานัดแล้วเหรอคะเนี่ย...? จะ... จริงด้วยแฮะ ฉันลืมเรื่องเวลาไปเลยค่ะ..."
1010205-25 = "ขอบคุณที่มานะคะคุณครู"
1010205-26 = "ที่ฉันขอให้คุณครูมาในวันนี้ ก็เพราะฉันอยากตอบแทนบางอย่างให้คุณครูน่ะค่ะ... แหะๆ"
1010205-27 = "อย่างที่ฉันบอกไปคราวก่อนว่าฉันเป็นฝ่ายได้รับความช่วยเหลือจากครูตลอดเลย..."
1010205-28 = "[s1] \"ไม่ต้องรู้สึกขอโทษก็ได้นะ\"\n[s2] \"ครูช่วยเพราะอยากช่วยน่ะ\""
1010205-31 = "งะ... งั้นเหรอคะ? แต่ฉันก็ไม่สบายใจอยู่ดีค่ะ..."
1010205-32 = "นี่ไม่ใช่อะไรยิ่งใหญ่หรอกค่ะ หวังว่าครูจะรับไว้นะคะ... แหะๆ"
1010205-33 = "ถ้าอย่างนั้นก็มาเริ่มกันเลย... อ๊ะ ฟ้ายังไม่มืดสินะคะ งั้นคงต้องรออีกหน่อยแล้วค่ะ..."
1010205-34 = "หืม? สงสัยว่าต้องทำแค่ตอนฟ้ามืดเท่านั้นหรือเปล่าน่ะเหรอคะ?"
1010205-35 = "ระ... เรื่องนั้นเป็นความลับค่ะ แหะๆ..."
1010205-36 = "งั้นเรามารอเวลาด้วยกันอีกหน่อยนะคะ..."
1010205-40 = "ตอนนี้น่าจะโอเคแล้วค่ะ...!"
1010205-41 = "งั้นฉันจะเริ่มเลยนะคะ..."
1010205-47 = "ฉันก็แค่ต้องจุดไฟ... ใส่ของที่อยู่ในกระป๋องนี้..."
1010205-48 = "อ๊ะ ไฟติดแล้วค่ะ...! คุณครู เข้ามาดูใกล้ๆ สิคะ...!"
1010205-49 = "[s] \"ไหน มีอะไรเหรอ?\""
1010205-52 = "แหะๆ... ดอกไม้ไฟค่ะ ถึงมันจะแค่เล็กน้อยก็เถอะค่ะ"
1010205-53 = "ที่จริงฉันนั่งเก็บประทัดที่จุดเหลือไว้กับธูปหักๆ ที่ชายหาดอยู่น่ะค่ะ"
1010205-54 = "ฉันเคยอ่านเจอจากในนิตยสารว่าดอกไม้ไฟเป็นสิ่งที่ขาดไม่ได้ในฤดูร้อนค่ะ..."
1010205-55 = "ถ้าเป็นไปได้ฉันก็อยากจะซื้อประทัดอันใหม่มาจุดเล่นกับคุณครูนะคะ แต่ฉันไม่มีเงิน... แหะๆๆ"
1010205-56 = "เป็นยังไงบ้างคะ...? ฉันว่าอย่างน้อยของพวกนี้ก็ช่วยสร้างบรรยากาศได้อยู่นะคะ...?"
1010205-57 = "[s3] \"อืม เป็นดอกไม้ไฟที่สวยที่สุดที่ครูเคยเห็นมาเลย\"\n[s4] \"นี่จะเป็นความทรงจำที่ดีเลยละ\""
1010205-60 = "ละ... โล่งอกไปทีนะคะ..."
1010205-61 = "มันดูไม่มีค่า ฉันก็เลยกังวลว่าคุณครูจะผิดหวังหรือเปล่าน่ะค่ะ..."
1010205-62 = "หวังว่าในอนาคตฉันจะได้เห็นดอกไม้ไฟลูกสวยๆ บนท้องฟ้ายามค่ำคืนบ้างนะคะ..."
1010205-63 = "ถ้าตอนนั้นได้อยู่กับคุณครูละก็... หืม?"
1010205-67 = "เอ๋... มีเสียงอะไรดังออกมาจากกระป๋อง..."
1010205-71 = "เฮือก!"
1010205-72 = "[s] \"เหวอ!!\""
1010205-74 = "แค่ก แค่กๆ..."
1010205-75 = "สงสัยจะยังเหลือประทัดอันใหญ่อยู่อีกอันน่ะค่ะ... พอมันระเบิด กระป๋องก็เลยร่วง..."
1010205-79 = "ร่วงลงทะเลจนประทัดดับหมดแล้วค่ะ... แย่จังเลยค่ะ..."
1010205-80 = "ทำไมฉันต้องเจอแต่เรื่องแบบนี้ด้วยคะ? ชีวิตฉันจะไม่ได้ดูดอกไม้ไฟ แม้แต่จากประทัดเหลือทิ้งด้วย#nเหรอคะ?!"
1010205-81 = "มุแงงงง!"
1010205-83 = "(คุณครูปลอบฮิโยริ แล้วไปซื้อประทัดอันใหม่มาจุดเล่นด้วยกัน)"
1010205-84 = "(โล่งอกไปทีที่ฮิโยริดูอารมณ์ดีขึ้นมาบ้าง...)"

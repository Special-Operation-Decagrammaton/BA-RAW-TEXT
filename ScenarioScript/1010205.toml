[translation]
1010205-1 = "Boom, Boom, Boom!"
1010205-2 = "It was late afternoon when I headed to the beach, after my conversation with Hiyori."
1010205-7 = "Another one! Heehee."
1010205-8 = "Let's see, let's see... Another small one!"
1010205-12 = "[ns] \"(She's collecting things in a can...)\""
1010205-13 = "That's everything here... Wait, one more right there..."
1010205-17 = "There's so many! Sensei's sure to like these..."
1010205-18 = "Oh, here too...!"
1010205-20 = "I watched Hiyori happily collect things for quite some time, without her ever noticing me."
1010205-22 = "[ns] \"Hiyori.\""
1010205-23 = "Ah, Sensei?"
1010205-24 = "It's already time...? Wow, you're right. How did this happen?"
1010205-25 = "Thank you for coming, Sensei."
1010205-26 = "I invited you here so that I could finally repay you. Heehee."
1010205-27 = "Because you're always giving me things..."
1010205-28 = "[s1] \"There's really no need.\"\n[s2] \"I do it because I want to.\""
1010205-31 = "R-Really? But...it still doesn't sit well with me."
1010205-32 = "So I hope this will be good enough... Heehee..."
1010205-33 = "I just have to... Ah. We have to wait until it gets dark first."
1010205-34 = "Huh? Why does it have to be dark?"
1010205-35 = "Th-That's a surprise. Heehee."
1010205-36 = "Please just wait a little..."
1010205-40 = "N-Now!"
1010205-41 = "Let me start..."
1010205-47 = "I just need to set the stuff in the can...on fire..."
1010205-48 = "It's lit! Sensei, come look!"
1010205-49 = "[s] \"Where? What am I looking at?\""
1010205-52 = "Heehee. In here! Fireworks! Just little tiny ones, though."
1010205-53 = "I gathered up a bunch of leftover fireworks and broken incense sticks that people left on the beach."
1010205-54 = "I read that fireworks are a must at the beach during the summer..."
1010205-55 = "I couldn't afford real fireworks, though. Heeheehee."
1010205-56 = "D-Does this measure up at all? Wh-What do you think, Sensei?"
1010205-57 = "[s3] \"The best fireworks I've ever seen.\"\n[s4] \"I'll never forget this.\""
1010205-60 = "What a relief..."
1010205-61 = "I didn't want to disappoint you."
1010205-62 = "I hope that one day I'll be able to see huge, beautiful fireworks bursting in the night sky..."
1010205-63 = "And...I hope you'll be with me, Sensei."
1010205-67 = "Huh? What's that weird sound?"
1010205-71 = "Eek!"
1010205-72 = "[s] \"Gaaah!!\""
1010205-74 = "*cough* *cough*"
1010205-75 = "There was a big firework still in there...and everything in the can spilled when it exploded..."
1010205-79 = "...Now they're all wet from the ocean... Everything... Everything's ruined!"
1010205-80 = "Why does everything I do turn out this way? Is something as simple as fireworks too much to ask for?"
1010205-81 = "WAAAHHH!"
1010205-83 = "I calmed Hiyori down and bought us some new, real fireworks to enjoy together."
1010205-84 = "...Fortunately, it didn't take long for Hiyori to cheer up after that."

[translation]
84301500100-5 = "...I see."
84301500100-6 = "This chip is suspicious, all right. It looks like it originates from outside Millennium."
84301500100-7 = "You can tell that?"
84301500100-8 = "I can't guarantee it...but I do know the styles of our students. None of them would make it this way."
84301500100-9 = "How do you know their styles?"
84301500100-10 = "I'm Millennium's Student Council President. I need to know what my students like, and what they want, in order to create a school that everyone can best enjoy."
84301500100-11 = "Which is not to say I always make the best choices..."
84301500100-12 = "No one ALWAYS makes the best choices. You shouldn't have to dwell on that."
84301500100-13 = "...I... No, I..."
84301500100-14 = "As things stand, I can't..."
84301500100-19 = "...We're missing someone."
84301500100-20 = "Neru has something else to do. But that's in progress, and she should be back soon."
84301500100-21 = "In the meantime, I'll keep investigating the chip. It won't take long, so please wait."

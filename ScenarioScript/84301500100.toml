84301500100-5 = "5;세이아;00\n1;리오;99;……과연.\n#5;a\n#1;a"
84301500100-6 = "1;리오;02;명백히 수상한 칩이야. 밀레니엄 내부, 즉 우리 학생들의 손으로 만들어졌다고 보기는 어려워."
84301500100-7 = "5;세이아;99;그런 것도 알 수 있군요."
84301500100-8 = "1;리오;99;장담은 못 하지만……. 우리 학교 학생들의 스타일은 인지하고 있으니까. 이런 짓을 할 사람은 없다고 봐도 무방해.\n#1;em;…"
84301500100-9 = "5;세이아;00;학생들의 스타일을 알고 있다고요?\n#5;em;[?]"
84301500100-10 = "1;리오;01;나는 밀레니엄의 학생회장이야. 학우들이 무엇을 좋아하는지, 무엇을 원하는지를 알아야 모두가 최대의 만족을 누리는 학교로 만들 수 있지."
84301500100-11 = "1;리오;99;한때는 그 방법을 잘못 택하고 있었지만……."
84301500100-12 = "5;세이아;01;우리 모두 방법론에서는 잦은 실수를 겪죠. 지금까지 마음에 담아두고 있을 일은 아니라고 생각해요."

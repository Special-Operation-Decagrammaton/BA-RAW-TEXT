[translation]
84301500100-5 = "……原來如此。"
84301500100-6 = "這枚晶片果然很可疑。#n而且我也很難認為這是我們千年內部的學生製造的。"
84301500100-7 = "原來那種事是能看出來的啊。"
84301500100-8 = "雖然無法保證……但我明白我們學生的製作風格。#n要我說沒有人會做出這種事也可以。"
84301500100-9 = "你知道學生的風格？"
84301500100-10 = "我可是千年的學生會長。#n得知道學生喜歡什麼、想要什麼，才能打造出最能令大家滿意的學校。"
84301500100-11 = "雖然我曾經選錯了方法……"
84301500100-12 = "任何人都會在方法論上出錯的。#n不需要一直對這種事感到耿耿於懷。"
84301500100-13 = "不……我……"
84301500100-14 = "我……要是再這樣下去的話，會讓大家……"
84301500100-19 = "……話說似乎少了一個人呢。"
84301500100-20 = "就像我之前說過的一樣，寧瑠有別的事要做。#n現在已經進行了一段時間，他不久後就會回來了。"
84301500100-21 = "先調查你帶回來的晶片吧。#n很快就能結束，稍等我一會吧。"

84301500100-20 = "1;리오;01;말했듯이 네루는 따로 해야 할 일이 있어. 하지만 그것도 한참 진행 중이니, 머지않아 곧 도착할 거야."
84301500100-21 = "1;리오;02;우선 가져온 칩을 조사하도록 할게. 오래 걸리진 않을 테니, 조금만 기다려 줘."

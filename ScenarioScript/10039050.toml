[translation]
10039050-1 = "ตอนที่ 5;เปิดฉากสงคราม"
10039050-3 = "เฮ่อ... เฮ่อ... เฮ่อ... เฮ่อ..."
10039050-11 = "แฮ่ก... แฮ่ก... แฮ่ก..."
10039050-17 = "ดะ... เดี๋ยวก่อน...! เดี๋ยวก่อนค่ะ...! หยุดก่อน!!"
10039050-21 = "มีอะไรเหรอคะ คุณซากุระโกะ...? "
10039050-22 = "เพลงยังไม่จบเลยนะคะ ถ้ามีความคิดเห็นอะไร ก็รอไว้ให้จบเพลงก่อน..."
10039050-23 = "มะ... ไม่ใช่แบบนั้นค่ะ! ฉันว่ามันแปลกน่ะค่ะ มีบางอย่างแปลกๆ ค่ะ!"
10039050-24 = "ตอนนี้เรากำลังซ้อมกันอยู่ใช่มั้ยคะ? กำลังซ้อมท่าเต้นที่เรียนมาจากครูสอนเต้นใช่มั้ยคะ?"
10039050-25 = "...?"
10039050-26 = "ค่ะ แล้วมีปัญหาอะไรเหรอคะ?"
10039050-27 = "ก็... ฉันเองก็ไม่ได้รู้เรื่องทางนี้มากนัก แต่ก่อนหน้านี้ฉันเคยหาจากอินเทอร์เน็ตมาบ้างค่ะ"
10039050-28 = "แต่ตอนซ้อมอะไรแบบนี้ คนที่เป็นไอดอลจริงๆ ก็จะใส่ชุดพละหรือชุดออกกำลังกายกันค่ะ"
10039050-29 = "ไม่ใช่... ชุดอย่างที่พวกเราใส่กันตอนนี้น่ะค่ะ"
10039050-31 = "แล้วยังไงเหรอคะ?"
10039050-32 = "แล้วยังไงน่ะเหรอคะ? ฉันเพิ่งพูดประเด็นหลักไปเลยนะคะ"
10039050-33 = "ถ้าเราใส่ชุดพละหรือชุดออกกำลังกายซ้อมกัน ก็น่าจะสะดวกมากกว่านี้น่ะค่ะ ทำไมตอนนี้เราถึงใส่ชุด#nไอดอลซ้อมกันอยู่ล่ะคะ?"
10039050-34 = "ก็คุณเพิ่งพูดไปเองไม่ใช่เหรอคะ? ก็เพราะอย่างนั้นละค่ะ"
10039050-35 = "เพราะชุดแบบนั้นมัน 'สะดวก' ยังไงล่ะคะ ยิ่งใส่ชุดที่สะดวก มันก็ยิ่งยากต่อการฝึกซ้อมค่ะ"
10039050-36 = "คะ? พูดอะไรของคุณคะเนี่ย..."
10039050-37 = "คุณซากุระโกะ คุณเคยได้ยินคำนี้มั้ยคะ?"
10039050-38 = "\"ซ้อมให้เหมือนปฏิบัติจริง ปฏิบัติจริงให้เหมือนซ้อม\""
10039050-39 = "ตะ... แต่เรื่องนั้นมัน...!!"
10039050-40 = "ฉันก็เข้าใจความตั้งใจของคุณซากุระโกะนะคะ แต่ก็น่าเสียดายที่พวกเราไม่ใช่ <ไอดอลจริงๆ> ที่คุณพูดถึงค่ะ"
10039050-41 = "คนพวกนั้นคุ้นเคยกับชุดที่ใส่บนเวทีอยู่แล้ว ก็เลยต้องแค่ซ้อมเต้นก็เท่านั้นค่ะ แต่พวกเราไม่ได้เป็น#nอย่างนั้นนี่คะ?"
10039050-42 = "มะ... มันก็จริงอยู่หรอกนะ แต่ว่า...! แต่มันก็แปลกๆ นะ...!!"
10039050-44 = "ซ้อมให้เหมือนปฏิบัติจริง!!!"
10039050-45 = "อึก...!!! พูดอะไรสมเหตุสมผลอีกแล้ว...!!"
10039050-46 = "ดะ... เดี๋ยวสิคะ...!! แต่ตอนนี้พวกเราก็ยังไม่คืบหน้าเลยนะคะ!"
10039050-47 = "พวกเราเหลือเวลากันไม่มากแล้ว ขืนเป็นแบบนี้ต่อไป เราคงเรียนทุกอย่างได้ไม่ทันกำหนดแน่ๆ ค่ะ!"
10039050-48 = "ฉันว่าเราติดต่อมารีเพื่อขอคำแนะนำในการฝึกซ้อมดีกว่า..."
10039050-49 = "จะใช้งานคุณมารีอีกแล้วเหรอคะ!!"
10039050-50 = "...!?"
10039050-51 = "แค่นี้คุณมารีก็เกือบจะทำให้ทั้งหมดอยู่แล้ว แล้วยังจะกล้าขอให้คุณมารีช่วยอะไรเพิ่มอีกงั้นเหรอคะ?!"
10039050-52 = "จะรบกวนคุณมารีไปถึงเมื่อไรกันคะเนี่ย!? คุณชอบทำให้คุณมารีต้องลำบากทุกครั้งที่เจอปัญหาอะไร#nอย่างนั้นเหรอคะ??"
10039050-53 = "เอ่อ... มะ... ไม่ใช่นะคะ ฉันไม่ได้ตั้งใจให้เป็นแบบนั้น..."
10039050-54 = "ต่อให้คุณซากุระโกะจะไม่ได้ตั้งใจให้มันเป็นแบบนั้น แต่ถ้าเรียกคุณมารีให้มาช่วย ก็จะกลายเป็นว่า#nตั้งใจให้เป็นแบบนั้นค่ะ!"
10039050-55 = "คุณเป็นทั้งรุ่นพี่และก็หัวหน้านี่คะ! คุณต้องรู้สิคะว่าการกระทำของตัวเองเป็นภาระของคนอื่นน่ะ!!"
10039050-56 = "ทะ... ที่จริง... ก่อนหน้านี้ก็มีอยู่หลายครั้ง..."
10039050-60 = "ถะ... ถ้างั้นเราไม่รบกวนมารี แต่ขอร้องจากคุณครูแทน..."
10039050-61 = "เอาอีกแล้ว! เอาอีกแล้วนะคะ!"
10039050-62 = "ทะ... ทำไมอีกล่ะคะ... "
10039050-63 = "หยุดเอาแต่ขอความช่วยเหลือจากคนอื่น!! แล้วหาข้อมูลอะไรเองจากในอินเทอร์เน็ตเถอะค่ะ!!"
10039050-64 = "ฉันไม่ปฏิเสธว่าการขยับตัวเพื่อขอความช่วยเหลือจากคนรอบข้างก็ถือเป็นความพยายามเหมือนกัน แต่บางครั้งเราก็ต้องหาคำตอบด้วยตัวเองค่ะ! !"
10039050-65 = "เข้าใจมั้ยคะ? พวกเราหาภาระให้คุณครูและมารีมากจนเกินพอแล้วค่ะ"
10039050-66 = "จากนี้ไปเราสองคนต้องจัดการกันเอง! ต่อให้เจออุปสรรคอะไร ก็ต้องแก้ด้วยตัวเองค่ะ! แล้วก็อย่าคิดวิ่งหนีอุปสรรคพวกนั้นด้วยค่ะ! คุณซากุระโกะ!!"
10039050-68 = "อึก...!!!"
10039050-69 = "แต่ว่า... ฉันก็เข้าใจที่หัวหน้ามิเนะพูดอยู่หรอกนะคะ...!! แต่ถ้าเป็นแบบนี้ต่อไป เราคงเสร็จไม่ทันกำหนด...!!"
10039050-70 = "ก็คงเป็นอย่างนั้นละค่ะ"
10039050-71 = "ฉันเองก็ทราบดีถึงสิ่งที่คุณกำลังกังวลอยู่ค่ะ แต่ถึงอย่างนั้น ฉันก็ไม่อาจสร้างปัญหาให้คนอื่นได้อีกค่ะ"
10039050-72 = "ตอนนี้ไม่ว่าใครจะยื่นมือเข้ามาช่วยเหลือก็ตาม ฉันกับคุณซากุระโกะก็ควรต้องปฏิเสธและลงมือทำด้วย#nมือของตัวเองค่ะ"
10039050-73 = "แบบนั้นทุกคนจะได้มองเราบนเวทีได้อย่างภูมิใจยังไงล่ะคะ"
10039050-74 = "ค่ะ..."
10039050-75 = "จากนี้ไปไม่ต้องติดต่อขอความช่วยเหลือจากใครแล้วนะคะ คุณซากุระโกะ ถึงใครจะติดต่อมาก็ทำเป็น#nไม่เห็นไปเลยค่ะ"
10039050-76 = "ฉันขอจนกว่าเรื่องนี้จะจบ... เลยนะคะ..."
10039050-77 = "ค่ะ... เข้าใจแล้วค่ะ..."
10039050-78 = "ฮืม..."
10039050-79 = "แต่จะหาทางออกยังไงดี..."
10039050-80 = "เราจะหาทางออกเรื่องสเต็ปการเต้นที่ไม่เข้ากัน และเรื่องจังหวะการร้องเพลงที่ไม่ตรงกันของเรากันยัง#nไงเหรอคะ?"
10039050-81 = "พวกเราไม่รู้อะไรเกี่ยวกับไอดอลกันเลยนะคะ ไม่รู้ด้วยซ้ำว่าไอดอลต้องมีคุณสมบัติอะไรบ้าง..."
10039050-82 = "เรื่องนั้น..."
10039050-83 = "ฉันบอกไปหลายครั้งแล้วนะคะว่าอย่าเหมารวม คุณซากุระโกะ... เห็นอย่างนี้ฉันก็ฟังเพลงของไอดอล แล้วก็ดูสเตจของไอดอลอยู่นะคะ..."
10039050-84 = "ถ้างั้นหัวหน้ามิเนะรู้มั้ยล่ะคะว่าตอนนี้วงเราไม่มีอะไรที่วงอื่นเขามีกัน?"
10039050-85 = "อืม... สิ่งที่ไม่มี..."
10039050-86 = "อืม...?"
10039050-87 = "อ๊ะ"
10039050-88 = "อ๊ะ...?"
10039050-89 = "คิดอะไรออกแล้วเหรอคะ หัวหน้ามิเนะ?"
10039050-90 = "คือว่า... อืม... ขอฉันคิดอีกหน่อยนะคะ..."
10039050-91 = "อืม... นั่นสินะคะ นี่อาจจะเป็นข้อแตกต่างที่สำคัญเลยค่ะ"
10039050-92 = "ข้อแตกต่างที่สำคัญ...?"
10039050-93 = "ใช่ค่ะ คุณซากุระโกะ บางอย่างที่วงไอดอลอื่นมี แต่เราไม่มี"
10039050-94 = "ปัจจัยสำคัญของการทำงานกลุ่ม คนที่จะจัดการสมาชิก และในขณะเดียวกันก็ทำให้พฤติกรรม และสไตล์ของสมาชิกเป็นไปในทางเดียวกัน"
10039050-98 = "และนั่นก็คือ... <ลีดเดอร์> ของวงค่ะ"
10039050-99 = "ลีดเดอร์... ของวง...?"
10039050-100 = "ลีดเดอร์... งั้นเหรอคะ... หมายถึงคนที่เป็นผู้นำกลุ่มใช่มั้ยคะ?"
10039050-101 = "ใช่ค่ะ เป็นคนที่มีบทบาทสำคัญในการป้องกันไม่ให้สมาชิกในกลุ่มกระจัดกระจายกันหรือทำอะไรตามใจ#nตนเอง และคอยกำกับให้ทุกคนมีทิศทางเดียวกันค่ะ"
10039050-102 = "ทำไมก่อนหน้านี้ถึงคิดไม่ได้เลยนะ...! ถ้าไม่มีลีดเดอร์ เราก็คงทำอะไรไม่ราบรื่นค่ะ"
10039050-103 = "อืม นั่นสิคะ ทุกกลุ่มจำเป็นต้องมีผู้นำ คุณมิเนะก็โน้มน้าวฉันได้เลยนะคะเนี่ย"
10039050-104 = "แล้วถ้าอย่างนั้น เราสองคนจะให้ใครเป็นผู้นำกันล่ะคะ... ฉันว่าควรจะเป็นหัวหน้ามิเนะที่รู้อะไรมากกว่า#nฉันนะคะ..."
10039050-105 = "ไม่ค่ะ นี่ไม่ใช่ปัญหาที่คิดหาคำตอบได้ง่ายๆ แบบนั้นค่ะ"
10039050-106 = "ลีดเดอร์ของไอดอลไม่จำเป็นต้องเป็นคนที่มีประสบการณ์มากกว่าหรือมีความรู้มากกว่าหรอกค่ะ"
10039050-107 = "ในทางกลับกัน ฉันว่าคนที่ริเริ่มและเป็นตัวตั้งตัวตีในการเข้าร่วมอีเวนต์ไอดอลอย่างคุณซากุระโกะ อาจจะเหมาะสมกับตำแหน่งลีดเดอร์มากกว่าฉันก็ได้นะคะ"
10039050-108 = "เป็นเรื่องยากน่าดูนะคะ... เรื่องนี้คงตัดสินใจในทันทีไม่ได้ค่ะ"
10039050-109 = "ฉันว่าเราต้องแยกย้ายกันไปจัดระเบียบความคิดสักหน่อยแล้วละค่ะ"
10039050-110 = "คุณซากุระโกะเองก็ดูเหนื่อยๆ เหมือนกัน งั้นเราไปพักผ่อนแล้วคิดเรื่องลีดเดอร์กันมั้ยคะ?"
10039050-112 = "ฉันพยายามไม่แสดงออกว่าเหนื่อยแท้ๆ แต่หัวหน้ามิเนะก็ยังดูออกเหรอคะ... ต้องขอโทษด้วยนะคะ"
10039050-113 = "เข้าใจแล้วค่ะ งั้นก็เอาตามที่คุณมิเนะว่าเลยค่ะ"
10039050-114 = "ก่อนอื่นคงต้องไปเปลี่ยนเสื้อผ้าก่อน..."
10039050-123 = "ตามนั้นค่ะ..."
10039050-124 = "อีก 2 ชั่วโมง เราค่อยมาเจอกันที่หน้าน้ำพุกลางจัตุรัสทรีนิตี้..."
10039050-125 = "ค่ะ ได้ค่ะ แล้วพวกเรา..."
10039050-127 = "จะไปเลือกผู้นำของกลุ่มกันที่นั่นค่ะ"
10039050-133 = "เลือกผู้นำงั้นเหรอคะ... ก็นะ มันก็ไม่ผิดหรอกค่ะ..."
10039050-134 = "ฉันรู้ดีค่ะ... ว่าเรื่องนี้ต้องเป็นความลับต่อคุณครูและคนอื่น"
10039050-135 = "ฉันรู้ดีว่าที่เป็นเรื่องของเรา 2 คนเท่านั้น"
10039050-136 = "พวกเราต้องตัดสินใจกันเองว่าจะให้ใครเป็นผู้นำของกลุ่ม..."
10039050-140 = "ฉันสังเกตและคิดมานานแล้วค่ะ คุณซากุระโกะนี่ชอบใช้คำแปลกๆ นะคะ..."
10039050-141 = "คะ...? คำไหนคะที่แปลก...?"
10039050-142 = "ช่างเถอะค่ะ แค่เรื่องเล็กน้อยน่ะค่ะ มาให้ตรงเวลาด้วยนะคะ"
10039050-143 = "งั้นฉันขอตัวก่อน..."
10039050-151 = "?"
10039050-158 = "ไม่ได้มีวันที่สงบสุขแบบนี้มานานแล้วนะคะ..."
10039050-159 = "อากาศก็แจ่มใส งานคาร์นิวัลก็กำลังดำเนินไปอย่างราบรื่น..."
10039050-160 = "ปีนี้ก็ดูเหมือนว่าเพื่อนนักเรียนจะเข้าร่วมกันอย่างกระตือรือร้นมากกว่าเดิมด้วย"
10039050-161 = "ให้ความรู้สึกเหมือนกับ... รสชาติของชาแดงที่ล้ำลึกขึ้นอีกขั้นเลยค่ะ"
10039050-162 = "นี่อาจจะเป็นความจริงก็ได้นะคะ ก็รสชาติของชาแดงไม่ได้จำกัดอยู่ที่ตัวชาแดงอย่างเดียวเท่านั้นนี่คะ"
10039050-166 = "เฮ้อ..."
10039050-167 = "ในวันที่อากาศดีแบบนี้ คุณมิกะไปอยู่ที่ไหนก็ไม่รู้... แต่ก็คงเดาได้ว่าไปเที่ยวเล่นอยู่ที่ไหนสักแห่งข้าง#nนอกค่ะ"
10039050-168 = "ส่วนคุณเซอาก็เห็นบอกว่าจะพักผ่อนแต่ในห้อง... น่าเสียดายจังเลยนะคะ วันนี้ควรจะเป็นวันที่ได้เชิญ#nคนอื่นมาร่วมโต๊ะน้ำชาแท้ๆ"
10039050-169 = "ออกจะเป็นวันที่ดีแบบนี้..."
10039050-170 = "วันที่อากาศแจ่มใส ปลอดโปร่ง และไร้ปัญหาใดๆ..."
10039050-171 = "ฮืม..."
10039050-172 = "นั่นสินะคะ น่าจะเป็นเพราะฉันเรียกทั้ง 2 คนนั้นให้มาหาอยู่ทุกครั้งไป"
10039050-173 = "บางครั้งฉันก็ควรจะเป็นฝ่ายไปหาเองบ้างนะคะ"
10039050-174 = "ไว้ถ้าหมดเวลางานของวันนี้แล้ว ฉันจะไปหาสองคนนั้น..."
10039050-181 = "คุณนางิสะ!! คะ... คุณนางิสะ!!!"

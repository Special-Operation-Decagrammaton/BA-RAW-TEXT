[translation]
10039050-1 = "Episode 5;The Opening Act of War"
10039050-3 = "*huff* *puff* *huff*"
10039050-11 = "*huff* *huff* *huff*"
10039050-17 = "W-Wait...! Hold on a moment, please!"
10039050-21 = "Hm? What's the matter, Sakurako?"
10039050-22 = "Is the music too loud? We can turn it down."
10039050-23 = "No, that's not it. It's simply... This doesn't make any sense!"
10039050-24 = "This is practice, yes? We're practicing the dance we learned from the instructor?"
10039050-25 = "Um..."
10039050-26 = "Yes, that's right. Is there a problem?"
10039050-27 = "Well...I'm no expert, but I have done a bit of research online. And what I've found is..."
10039050-28 = "...professional idols, when they practice, wear tracksuits or sportswear."
10039050-29 = "They do NOT practice in full costume like this."
10039050-31 = "Your point being?"
10039050-32 = "My point...?! I just said it!"
10039050-33 = "Would it not be more comfortable to practice in more suitable clothing?"
10039050-34 = "Yes, but that's exactly why we aren't."
10039050-35 = "If we let ourselves grow too comfortable, we won't be able to practice properly."
10039050-36 = "What? That's ridiculous..."
10039050-37 = "Sakurako, have you heard anyone say..."
10039050-38 = "\"...Practice as if it's the real thing, and treat the real thing as if it is practice\"?"
10039050-39 = "...! W-Well...!"
10039050-40 = "I understand your point, Sakurako, but you and I are NOT professionals."
10039050-41 = "They already know how to move in costume, so they ONLY need to learn the dance. We have learned neither thus far."
10039050-42 = "Well, that may be true, but it feels so strange..."
10039050-44 = "I said, \"Practice as if it's the real thing!\""
10039050-45 = "Ugh... Repetition is key, I suppose..."
10039050-46 = "Either way, it's clear we're learning much too slowly."
10039050-47 = "At this rate, we won't be ready in time at all!"
10039050-48 = "I wonder if Mari might have some advice—"
10039050-49 = "You would burden Mari again?!"
10039050-50 = "Well...!"
10039050-51 = "She gave us everything we have here, and you would have the audacity to ask for MORE?!"
10039050-52 = "How much will you ask of her this time? Does she solve ALL your problems for you?!"
10039050-53 = "N-No, I didn't mean to imply—"
10039050-54 = "Whatever you meant, every time you reach out to her, that is EXACTLY what you're doing!"
10039050-55 = "Aren't you the senior and the superior?! You must understand that your words and deeds affect others!"
10039050-56 = "Well...I have asked her for help a FEW times..."
10039050-60 = "But...very well. Perhaps Sensei could help."
10039050-61 = "And STILL you fail to understand!"
10039050-62 = "W-What don't I understand? "
10039050-63 = "You seek help too soon and too easily! From others, from the internet..."
10039050-64 = "There's no shame in seeking help when you NEED it, but it ought to be your last resort, not your first!"
10039050-65 = "Do you understand? We have already asked too much of Mari and Sensei."
10039050-66 = "From this moment on, this is our task, our journey! Whatever trials beset us, we'll solve them ourselves. Think no more of fleeing from the challenge, Sakurako."
10039050-68 = "Ugh!"
10039050-69 = "All right, that's very inspirational, but the fact remains, we have a deadline looming, and not enough time to prepare!"
10039050-70 = "That is true."
10039050-71 = "Believe me, I share that concern, but even so, we can cause no more trouble for others."
10039050-72 = "Rather, even if they offer to help, we shall decline and press forward on our own."
10039050-73 = "Then our peers, and all those who've helped us already, will watch our performance with pride and respect."
10039050-74 = "All right..."
10039050-75 = "So hold the line, do not reach out, and even if you receive a message, ignore it."
10039050-76 = "Only until the performance. That's all."
10039050-77 = "I understand."
10039050-78 = "Hm..."
10039050-79 = "...But we still have the same problem."
10039050-80 = "We can barely move in these costumes, we can't stay in rhythm..."
10039050-81 = "...more than that, we're fundamentally ignorant of what a pop idol IS."
10039050-82 = "Hmm..."
10039050-83 = "I am not quite fundamentally ignorant. I have been known to listen to idol songs, and watch the occasional broadcast."
10039050-84 = "Then maybe you know what we're missing. What other groups have that ours doesn't."
10039050-85 = "Hm, well..."
10039050-86 = "Yes?"
10039050-87 = "...Ah."
10039050-88 = "...\"Ah\"?"
10039050-89 = "What is it, Captain?"
10039050-90 = "Hmm... Let me think this through..."
10039050-91 = "...Yes. Yes, that would make quite a difference."
10039050-92 = "What would make a difference?"
10039050-93 = "You're right, Sakurako. There is something we lack."
10039050-94 = "Something to bring us together, to bring us into sync, so to speak."
10039050-98 = "We have no leader."
10039050-99 = "A leader?"
10039050-100 = "Like a superior?"
10039050-101 = "In a manner of speaking. Someone to guide our group in a single direction, to keep us in harmony despite our differences."
10039050-102 = "So obvious in hindsight. How could our group have any sort of order with no one to lead it?"
10039050-103 = "Hmm, that makes sense. Every organization needs some kind of leadership."
10039050-104 = "But then who would lead us? Would it be you, Captain Mine, since you know more than I do?"
10039050-105 = "Perhaps I do, but no, that's not the answer."
10039050-106 = "Knowledge and experience alone do not a leader make."
10039050-107 = "We began this project on your initiative. Perhaps you'd be better suited for the role."
10039050-108 = "It's a difficult question. We shouldn't answer in haste."
10039050-109 = "Let us take some time and organize our thoughts."
10039050-110 = "Speaking of, you do look a bit tired. Shall we rest while we think it over?"
10039050-112 = "I was trying to hide it, but you must have seen right through me."
10039050-113 = "Very well, then rest we will."
10039050-114 = "After we...change out of these costumes."
10039050-123 = "...Indeed."
10039050-124 = "Two hours. Trinity Plaza, in front of the central fountain."
10039050-125 = "Right. I will meet you there..."
10039050-127 = "...and we will see who deserves to be called \"superior.\""
10039050-133 = "Well spoken, but remember..."
10039050-134 = "...this must remain a secret, even to Sensei."
10039050-135 = "No one else must know."
10039050-136 = "A secret meeting, one on one, to decide who to lead us both..."
10039050-140 = "You have your own unique way with words, don't you?"
10039050-141 = "Hmm? Which words?"
10039050-142 = "Oh, never mind. Until we meet again. Don't be late."
10039050-143 = "Farewell for now..."
10039050-151 = "Huh?"
10039050-158 = "...Finally, a nice, quiet day."
10039050-159 = "The weather is clear, the Carnival's going smoothly..."
10039050-160 = "...other classmates have stepped up to participate..."
10039050-161 = "...It's as if the taste of black tea has grown even deeper."
10039050-162 = "Of course, there's more to the taste of tea than the tea itself..."
10039050-166 = "*sigh*"
10039050-167 = "A shame Mika isn't here. She must be out playing somewhere."
10039050-168 = "And Seia is simply resting in her room. A pity. She'd be good company here."
10039050-169 = "On this beautiful day..."
10039050-170 = "This peaceful, sunny day with nothing happening..."
10039050-171 = "Hm..."
10039050-172 = "I do always call them out here, and make them come to me."
10039050-173 = "I should go and visit them for a change."
10039050-174 = "If the day stays quiet, I'll go find them."
10039050-181 = "Nagisa! N-Nagisa...!"
10039050-182 = "*sigh* How many times have I told you not to barge in like that?"
10039050-183 = "You are a proper member of the Tea Party. Please remember your decorum!"
10039050-184 = "I'm sorry, Nagisa..."
10039050-185 = "B-But given the circumstances...!"
10039050-186 = "...What circumstances?"
10039050-187 = "What's going on?"
10039050-188 = "If it has to do with the Carnival, I've already told you to support them as needed and let the other students enjoy themselves."
10039050-190 = "It's not that... There's a report from Intelligence..."
10039050-191 = "Intelligence?"
10039050-192 = "Yes, it just came in."
10039050-193 = "Utazumi Sakurako, from the Sisterhood, and Aomori Mine, from the Remedial Knights..."
10039050-194 = "...are going to meet at Trinity Plaza in two hours...to determine a leader for both groups!"
10039050-198 = "..."
10039050-199 = "...What?"
10039050-200 = " What do you mean? The Sisterhood and...the Remedial Knights...?"
10039050-201 = "One leader for both groups...? Why all of a sudden?"
10039050-202 = "Well, we don't know all the details yet..."
10039050-203 = "...but according to what we overheard, they made it sound like some kind of a duel..."
10039050-204 = "A duel?"
10039050-208 = "Again, what would they need with a unified leader? Why now?"
10039050-213 = "(...Wait a moment...)"
10039050-214 = "(\"Why now?\" Now, when our Tea Party is spread thin preparing for the Carnival...?)"
10039050-215 = "(If they join forces at a time like this, their numbers will dwarf our own.)"
10039050-216 = "(...)"
10039050-217 = "(......)"
10039050-218 = "*gasp*"
10039050-220 = "Ah, no. We mustn't jump to conclusions..."
10039050-221 = "I've grown past such things, after all."
10039050-222 = "Let us trust in the good faith of our fellow students."
10039050-223 = "...I'll simply call them and resolve any misunderstandings."
10039050-229 = "...Hmm, Sakurako seems to be unavailable."
10039050-230 = "What about Mine, then...?"
10039050-236 = "...Noted."
10039050-237 = "Very well, I'll send a message on MomoTalk."
10039050-238 = "\"This is Kirifuji Nagisa...from the Tea Party...\""
10039050-239 = "\"Pardon me for messaging you out of nowhere, but...there are strange rumors afoot...\""
10039050-240 = "\"Supposedly, you and Sakurako have some kind of personal engagement planned. Could you let me know more about it?\""
10039050-241 = "Sending..."
10039050-247 = "Oh! A reply..."
10039050-248 = "And that reply is..."
10039050-249 = "\"Thank you for your concern, but...\""
10039050-250 = "\"...this matter is indeed personal, between Sakurako and myself. The Tea Party need not pay it any mind.\""
10039050-251 = "..."
10039050-255 = "N-Nagisa...?"
10039050-256 = "..."
10039050-257 = "Nagisa. What should we do? Nagisa...?"
10039050-258 = "..."
10039050-259 = "...Mika."
10039050-260 = "...What?"
10039050-264 = "Find Mika. Go. Right now."
10039050-266 = "I walked around the Trinity campus, checking out the students' events and performances."
10039050-270 = "[ns1] \"(There's a lot to see here.)\"\n[ns2] \"(Big school, big events.)\""
10039050-275 = "[ns3] \"(Hmm? Who's calling?)\"\n[ns4] Answer the phone."
10039050-279 = "...Sensei?"
10039050-280 = "Sensei!"
10039050-281 = "Good, you're there."
10039050-282 = "[s5] \"Mari? What's wrong?\"\n[s6] \"What's going on? Is that the wind I'm hearing?\""
10039050-285 = "I'm sorry to call you like this, but it's VERY urgent!"
10039050-290 = "Hope you can hear me over the wind. I'm on a motorcycle!"
10039050-294 = "[ns7] \"...What?\"\n[ns8] \"You're on a what?\""
10039050-297 = "Can I ask you to come meet me someplace?"
10039050-298 = "I'll tell you more in person. There's not a lot of time..."
10039050-299 = "I don't know EXACTLY what's going on, but people are saying it's crazy!"
10039050-300 = "I mean..."
10039050-301 = "Trinity... Today, I think..."
10039050-305 = "I think they're going to start a civil war!"

[translation]
10039050-1 = "第5話;戰爭的序幕"
10039050-3 = "哈啊，哈啊……哈啊……哈啊……"
10039050-11 = "呼……呼……呼呼……"
10039050-17 = "等，等等……！麻煩……先暫停一下……！！"
10039050-21 = "……怎麼了嗎，櫻子同學？"
10039050-22 = "現在歌曲才撥到一半而已。#n如果有什麼意見的話，還是等整首放完再說吧……"
10039050-23 = "不，不是！我總覺得有點不對勁！"
10039050-24 = "我們現在是在練習吧？是在按照標準的舞步練習沒錯吧？"
10039050-25 = "……？"
10039050-26 = "是這樣沒錯。有什麼問題嗎？"
10039050-27 = "那個……雖然我不敢說自己對這方面有多了解，但我之前有在網路上查過幾次。"
10039050-28 = "專業偶像在進行這種練習時，通常都會穿著運動服。"
10039050-29 = "而不是像我們現在這樣……直接穿著偶像服練習。"
10039050-31 = "所以呢？"
10039050-32 = "所……所以？#n就是我剛才說的那些呀？"
10039050-33 = "明明穿運動服練習更方便，為什麼我們要穿偶像服裝練習呢？"
10039050-34 = "這個問題的答案，你剛才已經說出口了。"
10039050-35 = "就是因為「方便」。#n過度的方便將會影響練習的效果。"
10039050-36 = "咦？怎麼說呢……"
10039050-37 = "櫻子同學，你聽過這句話嗎？"
10039050-38 = "……「演習視同作戰」。"
10039050-39 = "……！！#n這，這……！！"
10039050-40 = "我明白櫻子同學想表達的意思，可惜我們並非你說的那種「專業偶像」。"
10039050-41 = "他們是因為已經很習慣舞台服裝，所以才只需要專注於舞步的練習。#n我想我們應該還沒達到那種程度吧？"
10039050-42 = "是，是這樣沒錯……！但我還是覺得有點奇怪……！！"
10039050-44 = "演習視同作戰！！！"
10039050-45 = "唔……！！！無法反駁……！！"
10039050-46 = "可，可是……！！不管怎麼說，現在的進度都太緩慢了！"
10039050-47 = "留給我們的時間本來就不多，再這樣下去很可能會無法掌握所有內容！"
10039050-48 = "不如我們再聯絡一下瑪麗，請他提供一些練習的建議或幫助……"
10039050-49 = "你又要找瑪麗同學嗎！！"
10039050-50 = "……！？"
10039050-51 = "這次的事情已經幾乎全交給瑪麗同學了，要是再麻煩他未免也太過分了！！"
10039050-52 = "你打算讓他煩惱到什麼時候！？#n難道每次遇到問題都要請他出面解決嗎！？"
10039050-53 = "唔……我，我沒有這個意思……"
10039050-54 = "不管櫻子同學有沒有這個意思，只要你找瑪麗同學就會造成這種情況！"
10039050-55 = "你可是他的前輩與上級！#n應該要意識到自己的行為對他人的影響才對！！"
10039050-56 = "這，這……之前也確實被提醒過好幾次類似的事……"
10039050-60 = "那，那麼就不找瑪麗，改找老師如何……"
10039050-61 = "又來了又來了──！"
10039050-62 = "什，什麼又來了……"
10039050-63 = "為什麼又馬上想找別人幫忙！！#n甚至想透過網絡輕鬆解決呢！！"
10039050-64 = "雖然我不否認尋求幫助也是一種努力，但有時也該嘗試自己尋找答案！！"
10039050-65 = "明白我的意思嗎？#n我們已經讓瑪麗同學和老師承擔了太多。"
10039050-66 = "接下來的難關，應該由我們兩人自己克服才對！！#n請不要逃避，櫻子同學！！"
10039050-68 = "唔唔……！！！"
10039050-69 = "那個……雖然我完全理解你的意思……！！#n不過要是再這樣下去，很可能會無法在期限內完成……！！"
10039050-70 = "我能夠理解櫻子同學的擔憂。"
10039050-71 = "對此我也深有同感，但即便這樣也不應該再給其他人添麻煩。"
10039050-72 = "往後就算別人願意幫忙也應該婉拒，憑藉我們自己的力量完成才對。"
10039050-73 = "這樣才能讓曾對我們伸出援手的人，在看到我們在舞台上的表現後感到欣慰不是嗎？"
10039050-74 = "是……"
10039050-75 = "今後請不要再聯絡別人了，櫻子同學。#n即便有人聯絡也麻煩你裝作沒看見。"
10039050-76 = "只要維持到這次活動結束之前的……這一小段時間就行了。"
10039050-77 = "是……我知道了……"
10039050-78 = "唔……"
10039050-79 = "不過這樣一來……問題又該如何解決呢……"
10039050-80 = "我們兩人舞步不一致或對不上節奏的問題，有辦法自己解決嗎？"
10039050-81 = "打從一開始，我們對於偶像這個概念的了解就非常有限……#n甚至不明白構成偶像的要素究竟有哪些。"
10039050-82 = "那個……"
10039050-83 = "我已經說過很多次了，我並非對偶像一無所知。#n櫻子同學……雖然不算頻繁，但我也會聽偶像團體的歌，或者欣賞相關節目的……"
10039050-84 = "那美禰團長知道嗎？#n其他團體具備，而我們卻缺乏的東西。"
10039050-85 = "唔嗯……這……"
10039050-86 = "……嗯？"
10039050-87 = "……啊。"
10039050-88 = "……啊？"
10039050-89 = "你想到什麼了嗎？"
10039050-90 = "那個……稍等。#n我想想……"
10039050-91 = "……嗯，或許這就是關鍵。"
10039050-92 = "關鍵……？"
10039050-93 = "沒錯，櫻子同學。#n其他偶像團體具備，而我們卻缺乏的東西。"
10039050-94 = "能使人團結一致、協調行動和風格──進而引導大家的關鍵。"
10039050-98 = "……那就是偶像團體的「領袖」。"
10039050-99 = "團體的……領袖？"
10039050-100 = "也就是……領導者嗎？"
10039050-101 = "沒錯。防止成員過於個性化或行動不一致，並提供方向的重要角色。"
10039050-102 = "為什麼之前都沒想到呢……！#n就是因為缺少了領袖，團體的行動才會無法統一。"
10039050-103 = "這麼說也對。#n組織確實需要領袖。"
10039050-104 = "那麼，該由誰來擔任好呢……#n相對了解偶像的美禰團長，應該比我更適合吧……？"
10039050-105 = "不，這件事不應該輕易決定。"
10039050-106 = "偶像的領袖該由誰來擔任，並非單純取決於經驗或知識量的多寡。"
10039050-107 = "我反而認為，發起並主導此事的櫻子同學比我更加適任。"
10039050-108 = "……真是個無法迅速解決的難題。"
10039050-109 = "看來有必要花點時間整理各自的想法。"
10039050-110 = "正好櫻子同學似乎也有點累了……#n我們不如稍作休息，順便思考一下如何？"
10039050-112 = "還是沒能瞞住你的眼睛嗎……真是抱歉。"
10039050-113 = "我明白了，就這麼辦吧。"
10039050-114 = "……那麼先把衣服換下來吧。"
10039050-123 = "……就這麼說定了。"
10039050-124 = "兩個小時後，在三一廣場的中央噴泉前見……"
10039050-125 = "嗯，待會見。#n到時候……"
10039050-127 = "……我們將決定誰是團體的共主。"
10039050-133 = "決定共主……#n雖然這麼說也沒錯，不過……"
10039050-134 = "此事還請務必……向老師和其他人保密……"
10039050-135 = "因為決定該由誰來帶領團體……"
10039050-136 = "是我們團體內部的事。"
10039050-140 = "我其實一直都覺得，櫻子同學的用字遣詞實在是……"
10039050-141 = "……嗯？用字遣詞……？"
10039050-142 = "沒什麼，只是一點小事而已。#n稍後還請準時赴會。"
10039050-143 = "那麼我先告辭了……"
10039050-151 = "？"
10039050-158 = "……今日真是難得平靜呢。"
10039050-159 = "不僅天氣很好，狂歡節也正在順利進行……"
10039050-160 = "今年外校同學們的參與似乎也比以往積極。"
10039050-161 = "……感覺就連紅茶的韻味都更加濃厚了呢。"
10039050-162 = "不，或許這並非我的錯覺。#n畢竟紅茶的味道，本來就不只取決於茶葉本身。"
10039050-166 = "……唉。"
10039050-167 = "天氣明明這麼好，彌香同學卻不見人影……八成又跑去外面玩耍了吧。"
10039050-168 = "聖亞同學也說想在房間裡好好休息……#n真可惜，本來想邀請他們過來坐坐的。"
10039050-169 = "這麼好的天氣……"
10039050-170 = "如此和平安穩的晴天……"
10039050-171 = "嗯……"
10039050-172 = "不過回頭想想，每次都是我請他們過來，或許也是原因之一吧。"
10039050-173 = "偶爾也該由我主動去找他們才對。"
10039050-174 = "只要今天的工作能順利完成，我就──"
10039050-181 = "渚大人！！渚大人……！！！"
10039050-182 = "唉……我已經說過很多次了，不要這麼冒冒失失地闖進來。"
10039050-183 = "你們也同樣是茶會的一員，請謹記應有的使命和禮儀……"
10039050-184 = "非常抱歉，渚大人……"
10039050-185 = "不，不過現在事態緊急……！！"
10039050-186 = "……事態緊急？"
10039050-187 = "發生什麼事了？"
10039050-188 = "如果是有關學園祭的事，我已經應該說過就讓同學們盡情享受才對。"
10039050-190 = "那個……是來自情報部的報告……"
10039050-191 = "……情報部？"
10039050-192 = "沒錯。這是剛剛收到的情報。"
10039050-193 = "修女會的領袖歌住櫻子，以及救護騎士團團長蒼森美禰……"
10039050-194 = "將在兩個小時後，於三一廣場決定團體的「共主」……！！"
10039050-198 = "……？"
10039050-199 = "……什麼？？？"
10039050-200 = "這是什麼意思？#n修女會和救護騎士團……"
10039050-201 = "要決定共主……？#n為何突然要做這種事？"
10039050-202 = "具，具體的情況我也不清楚……"
10039050-203 = "但根據情報部的推測，他們討論時的氣氛像是在約定決鬥……"
10039050-204 = "……決鬥？"
10039050-208 = "居然要在這個時候選出共主，實在令人匪夷所思……"
10039050-213 = "（不……等等……）"
10039050-214 = "（這個時候……？#n　在茶會因為忙於狂歡節而分散力量的……這個時候？）"
10039050-215 = "（如果他們此時合併為新的組織，規模將會超越我們茶會……）"
10039050-216 = "（…………）"
10039050-217 = "（……………………）"
10039050-218 = "……！！！"
10039050-220 = "不，不不不……肯定不會的。#n呵呵……"
10039050-221 = "我已經下定決心要有所成長，不要再重蹈覆轍了。"
10039050-222 = "不能失去對他人的信任。"
10039050-223 = "……直接聯絡他們看看吧。"
10039050-229 = "……櫻子同學沒接電話呢。"
10039050-230 = "那麼就向美禰團長……"
10039050-236 = "唔嗯……"
10039050-237 = "……用MomoTalk傳個訊息吧。"
10039050-238 = "「我是茶會的……桐藤渚……」"
10039050-239 = "「很抱歉突然叨擾……不過我聽到了一些奇怪的傳聞……」"
10039050-240 = "「據說美禰團長與櫻子同學正試圖達成某種協議……能告訴我詳細的情況嗎……？」"
10039050-241 = "送出……"
10039050-247 = "……咦？雖然沒接電話，MomoTalk卻有回覆呢。"
10039050-248 = "我看看……"
10039050-249 = "「感謝您的關心……」"
10039050-250 = "「不過這是我們之間的事，希望茶會不要介入」"
10039050-251 = "……？"
10039050-255 = "渚，渚大人……？"
10039050-256 = "…………"
10039050-257 = "渚大人，請問該如何應對呢……？"
10039050-258 = "…………"
10039050-259 = "去把彌香同學……"
10039050-260 = "……嗯？"
10039050-264 = "……立刻去把彌香同學找來！"
10039050-266 = "（利用剩餘的時間在三一各處打轉，觀看學生們準備的活動）"
10039050-270 = "[ns1]（都已經走了這麼久，卻還有很多活動沒看到呢）\n[ns2]（畢竟學校的規模大，活動的數量也不同凡響啊）"
10039050-275 = "[ns3]（……有電話？）\n[ns4] 接聽電話"
10039050-279 = "老師……"
10039050-280 = "老師……！"
10039050-281 = "太好了！幸好能聯絡上您……！"
10039050-282 = "[s5]「瑪麗……？感覺你好像很著急的樣子？」\n[s6]「怎麼了？好像聽到了風聲？」"
10039050-285 = "很抱歉突然聯絡老師！但情況真的非常緊急……！！"
10039050-290 = "啊，因為我正在騎機車，可能會因為風聲太大讓您聽不太清楚……！"
10039050-294 = "[ns7]「……咦？」\n[ns8]「你說你在騎什麼……？」"
10039050-297 = "如果可以的話……#n不，能請您盡快……到我說的地方來嗎？"
10039050-298 = "詳細情況見面之後會再向您說明，時間所剩不多了！！"
10039050-299 = "雖然具體情況我也還不太清楚……但出現了奇怪的傳聞……！！"
10039050-300 = "說不定……"
10039050-301 = "今天……我們三一學園……"
10039050-305 = "將會發生內戰！！"

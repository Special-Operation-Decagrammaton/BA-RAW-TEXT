[translation]
2600406-1 = "#title;좀 더 자주자주"
2600406-2 = "#na;(도서관에 도착하니, 웬일로 로비까지 나와 있던 시미코가 보였다.)"
2600406-3 = "3;시미코;02;아, 선생님! 오셨군요. 기다리고 있었어요.\n#3;em;[반응]\n#3;a"
2600406-4 = "3;시미코;01;왜 여기까지 나와 있었냐고요?"
2600406-5 = "3;시미코;02;그, 그야 선생님을 도와 드리기 위해……."
2600406-6 = "3;시미코;04;……네? 평소엔 늘 책을 보고 있지 않았냐고요?\n#3;stiff"
2600406-7 = "3;시미코;03;아, 아하하……. 역시나 그런 이미지였군요. 저…….\n#3;em;[땀]"
2600406-8 = "3;시미코;01;뭐, 자업자득이겠지만요."
2600406-9 = "#st;[0,0];instant;1;"

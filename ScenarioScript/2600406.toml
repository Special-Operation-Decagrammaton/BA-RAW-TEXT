[translation]
2600406-1 = "無論多少次"
2600406-2 = "（一到圖書館，就看到志美子少見地來到了大廳）"
2600406-3 = "啊，老師！我在等你來呢！"
2600406-4 = "咦？"
2600406-5 = "啊，那個，知道老師要來，不知不覺就到這裡來了……"
2600406-6 = "……很，很少見，是嗎？確，確實我幾乎都在裡頭讀書和整理書本……"
2600406-7 = "所，"
2600406-8 = "所以才會給人這種印象吧。"
2600406-12 = "……呵呵。"
2600406-14 = "我喜歡書本是事實。"
2600406-15 = "不過換個方向思考，如果只是想讀書的話，不到圖書館來也沒關係。"
2600406-16 = "然而我這個圖書管理員之所以每天都在圖書館……"
2600406-17 = "正是為了這個瞬間。"
2600406-18 = "[s1]「……？」\n[s2]「這個瞬間？」"
2600406-19 = "是的。所以能像這樣迎接這個瞬間，而且竟然還是老師本人，我感到非常雀躍。"
2600406-20 = "是的。所以能像這樣迎接這個瞬間，而且竟然還是老師本人，我感到非常雀躍。"
2600406-21 = "以圖書管理員的身分，為有需要的人尋找想要的書……這件事對我來說，就像是醍醐味一樣。"
2600406-22 = "既然老師都特地這麼說了，我想肯定是相當難以入手的書。"
2600406-23 = "已經有在網路上搜尋過了對吧？"
2600406-24 = "[s3] 「嗯，真是敏銳。」\n[s4] 「搜尋不到……」"
2600406-25 = "呵呵，果然如此。"
2600406-26 = "呵呵，果然如此。"
2600406-27 = "大部分的書都已經電子化，「來圖書館」這個行為雖然已經越來越少見了……"
2600406-28 = "儘管如此，網路也不能代替一切。"
2600406-29 = "當然，除了需要尋找的技術外，如果因為時間和人手的問題導致誰也沒有接觸過「那個」的話，大家就都無法搜尋到了。"
2600406-30 = "只在紙張裡沉睡的東西，還有非常多……這種時候就是圖書館，以及圖書管理員登場的時候了！一起把它找出來吧！"
2600406-31 = "而且……"
2600406-35 = "[ns5]「……而且？」\n[ns6]「……志美子？」"
2600406-36 = "……不，請別在意。來，我們趕快開始找吧！"
2600406-37 = "……不，請別在意。來，我們趕快開始找吧！"
2600406-38 = "畢竟就算已經按照分類整理過了，這裡的藏書量可是相當驚人的。"
2600406-45 = "話說回來，想找的書有什麼特徵之類的嗎……？"
2600406-46 = "原來如此……這樣的話，請先來這裡吧！"
2600406-50 = "[ns] 跟著志美子"
2600406-54 = "（跟著志美子漸漸朝著圖書館的深處前進）"
2600406-55 = "（因為是規模非常大的圖書館，儘管已經知道分類，依然有相當多的書架）"
2600406-56 = "（由於從這裡開始只能一本一本的找，所以只能花時間仔細看了……）"
2600406-57 = "（過了好一段時間……）"
2600406-61 = "（終於，找到了正在找的書）"
2600406-62 = "[s] 把手放在書背上"
2600406-67 = "（……拿不出來）"
2600406-68 = "……？"
2600406-69 = "[s]「……？」"
2600406-72 = "― [log=시미코]那個……真，真巧呢。[/log][wa:4590] "
2600406-73 = "― [log=시미코]沒想到居然會剛好同時……[/log][wa:2475] "
2600406-76 = "― [log=시미코]本來想先找到，[/log]"
2600406-77 = "― [log=시미코]然後再向老師報告的……[/log][wa:2265] "
2600406-80 = "― [log=시미코]……不。[/log][wa:340] "
2600406-81 = "― [log=시미코]先摸到書的人或許是我……對吧？[/log][wa:4220] "
2600406-84 = "― [log=시미코]唔嗯，該怎麼做呢～[/log][wa:2045] "
2600406-85 = "― [log=시미코]如果你說無論如何都想要的話，讓給你也不是不行……[/log][wa:3525] "
2600406-88 = "― [log=시미코]……我是開玩笑的。[/log][wa:1560] "
2600406-91 = "― [log=시미코]等我寫好借書紀錄後，馬上就拿給你。[/log][wa:1595] "
2600406-92 = "― [log=시미코]能順利找到真是太好了。[/log][wa:3180] "
2600406-95 = "― [log=시미코]怎麼樣呀？在圖書館裡的這種時間……[/log][wa:3170] "
2600406-96 = "― [log=시미코]不覺得很開心嗎？[/log][wa:3730] "
2600406-99 = "― [log=시미코]該說是其他地方體驗不到的呢，[/log][wa:1765] "
2600406-100 = "― [log=시미코]還是該說是這裡獨有的呢……[/log][wa:2910] "
2600406-103 = "― [log=시미코]……所以，今後也請務必，[/log][wa:2070] "
2600406-104 = "― [log=시미코]在喜歡的時候來這裡哦。[/log][wa:3670] "
2600406-107 = "― [log=시미코]……我，會等著你的！[/log][wa:2100] "
2600406-110 = "（之後也和志美子一起找了其他的書，向他表達感謝後便拿著借來的書回到了夏萊）"

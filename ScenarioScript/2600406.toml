[translation]
2600406-1 = "บ่อยขึ้นอีกนิด"
2600406-2 = "(คุณครูมาถึงที่ห้องสมุด และเห็นชิมิโกะออกมายืนอยู่ที่บริเวณหน้าล็อบบี้)"
2600406-3 = "อ๊ะ คุณครู! มาแล้วเหรอคะ กำลังรออยู่เลยค่ะ"
2600406-4 = "ทำไมฉันถึงออกมารอที่ล็อบบี้งั้นเหรอคะ?"
2600406-5 = "คะ...คือว่าฉันแค่อยากจะช่วยคุณครูค่ะ...?"
2600406-6 = "คะ...? ปกติฉันก็อ่านหนังสือตลอดอยู่แล้วงั้นเหรอคะ?"
2600406-7 = "อา...ฮะฮะฮะ... ฉันคงมีภาพลักษณ์แบบนั้นสินะคะ..."
2600406-8 = "ก็... ยิ่งอ่านก็ยิ่งได้ความรู้ไม่ใช่เหรอคะ"
2600406-12 = "ฮิฮิฮิ..."
2600406-14 = "จริงอยู่ที่ฉันชอบอ่านหนังสือค่ะ แต่ว่าความสนุกของห้องสมุดไม่ได้มีแค่นั้นหรอกนะคะ"
2600406-15 = "ที่จริงถ้าพูดถึงการอ่านหนังสือแล้วละก็... การอ่านหนังสือที่บ้านดีกว่าการอ่านที่ห้องสมุดเยอะเลยค่ะ"
2600406-16 = "แต่เหตุผลที่ฉันเข้ามาทำหน้าที่เป็นบรรณารักษ์ห้องสมุดและรับหน้าที่ดูแลทุกอย่างแบบนี้..."
2600406-17 = "ก็เพราะเรื่องแบบนี้ค่ะ เพราะสถานการณ์แบบนี้ยังไงละคะ"
2600406-18 = "[s1] \"เรื่องแบบนี้...??\"\n[s2] \"เรื่องของครูเหรอ...?\""
2600406-19 = "ค่ะ ตอนนี้ฉันตื่นเต้นมากเลยนะคะ ฉันคิดไม่ถึงเลยว่าคุณครูจะตอบตกลงค่ะ"
2600406-20 = "ค่ะ ตอนนี้ฉันตื่นเต้นมากเลยนะคะ ฉันคิดไม่ถึงเลยว่าคุณครูจะตอบตกลงค่ะ"
2600406-21 = "งานที่บรรณารักษ์ชอบมากที่สุด... นั่นก็คือการช่วย 'ค้นหา' หนังสือที่มีเพียงแค่คนที่ต้องการ#nเท่านั้นจะหาเจอค่ะ"
2600406-22 = "ถึงฉันจะยังไม่รู้ว่าคุณครูต้องการหาหนังสือเล่มไหน แต่คิดว่าคงเป็นหนังสือที่หายากใช่มั้ยคะ?"
2600406-23 = "ถ้าเป็นข้อมูลที่หาได้จากแหล่งอ้างอิงอื่น สมัยนี้ก็คงจะหาจากอินเทอร์เน็ตกันหมดแล้วนี่คะ"
2600406-24 = "[s3] \"ก็จริงนะ\"\n[s4] \"ครูลองหาดูแล้วก็ไม่เจอเลยน่ะ\""
2600406-25 = "ฮิฮิ ว่าแล้วเชียว..."
2600406-26 = "ฮิฮิ ว่าแล้วเชียว..."
2600406-27 = "ในยุคสมัยที่ข้อมูลทุกอย่างสามารถค้นหาได้จากอินเทอร์เน็ตและอีบุ๊ก ผู้คนก็เลยแวะเวียนมาที่#nห้องสมุดน้อยลงเรื่อยๆ "
2600406-28 = "แต่ก็น่าแปลกที่พวกข้อมูลเชิงลึกบางอย่างก็ยังหาได้จากอินเทอร์เน็ตลำบากอยู่ดีค่ะ"
2600406-29 = "พวกข้อมูลที่ไม่ค่อยมีคนค้นหามากเท่าไร เพราะงั้นพวกเรื่องราวหรือข้อมูลที่เข้าถึงได้ยากก็เลยมัก#nจะมีแค่รูปแบบรูปเล่มหนังสือเท่านั้น"
2600406-30 = "ในฐานะบรรณารักษ์แล้วไม่มีอะไรสนุกกว่าการค้นหาว่าหนังสือพวกนั้นมีอะไรบ้างหรอกค่ะ!"
2600406-31 = "ยิ่งกว่านั้น..."
2600406-35 = "[ns5] \"ยิ่งกว่านั้น...?\"\n[ns6] \"ชิมิโกะ...?\""
2600406-36 = "ไม่มีอะไรหรอกค่ะ เอาล่ะ รีบไปหาหนังสือกันเถอะค่ะ! ว่าแต่คุณครูหาหนังสืออะไรอยู่เหรอคะ?"
2600406-37 = "ไม่มีอะไรหรอกค่ะ เอาล่ะ รีบไปหาหนังสือกันเถอะค่ะ! ว่าแต่คุณครูหาหนังสืออะไรอยู่เหรอคะ?"
2600406-38 = "ถึงที่นี่จะเป็นห้องสมุดที่จัดเรียงชื่อหนังสือและประเภทเอาไว้อย่างเป็นระเบียบ แต่ที่นี่ก็มีขนาดใหญ่มาก เพราะงั้นอาจหายากนิดหน่อยค่ะ"
2600406-45 = "อืม... งั้นเหรอคะ ทราบแล้วค่ะ"
2600406-46 = "ถ้าเล่มนั้นละก็... ด้านนี้ค่ะ!"
2600406-50 = "[ns] เดินตามชิมิโกะไป"
2600406-54 = "(คุณครูเดินตามชิมิโกะเข้าไปยังส่วนลึกด้านในของห้องสมุดไปเรื่อยๆ)"
2600406-55 = "(ห้องสมุดแห่งนี้เป็นห้องสมุดที่มีขนาดใหญ่มาก แค่ตู้หนังสือที่จัดเรียงหนังสือแยกประเภทไว้เป็น#nบล็อกต่างๆ ก็กินพื้นที่ไปกว่าหนึ่งห้องแล้ว)"
2600406-56 = "(คงไม่มีทางเลือกนอกจากหาดูไปทีละเล่ม คุณครูจึงเดินวนไล่ดูหนังสือไปมาสักพักใหญ่)"
2600406-57 = "(จากนั้น... หลังจากที่เวลาผ่านไปครู่ใหญ่)"
2600406-61 = "(ในที่สุดคุณครูก็เจอหนังสือที่ต้องการ)"
2600406-62 = "[s] หยิบหนังสือออกมา"
2600406-67 = "(หยิบหนังสือออกมาไม่ได้)"
2600406-68 = "...? คะ?"
2600406-69 = "[s] \"....?\""
2600406-72 = "― [log=시미코]เอ่อ... บะ...บังเอิญจังเลยนะคะ[/log][wa:3790] "
2600406-73 = "― [log=시미코]ไม่คิดว่า... สุดท้ายจะเป็นแบบนี้...[/log][wa:1555] "
2600406-76 = "― [log=시미코]ฉันแค่อยากหาให้เจอก่อน...[/log]"
2600406-77 = "― [log=시미코]แล้วไปบอกคุณครูก็เท่านั้นเองค่ะ...[/log][wa:1345] "
2600406-80 = "― [log=시미코]...ไม่ใช่นะคะ[/log][wa:10] "
2600406-81 = "― [log=시미코]ฉันเป็นคนหยิบมาได้ก่อนนี่คะ...[/log][wa:3620] "
2600406-84 = "― [log=시미코]อืม เอายังไงดีนะ~[/log][wa:1725] "
2600406-85 = "― [log=시미코]ถ้าคุณครูอยากได้จริงๆ ละก็ ฉันจะยอมให้ก็ได้นะคะ...[/log][wa:2485] "
2600406-88 = "― [log=시미코]...ล้อเล่นน่ะค่ะ [/log][wa:1240] "
2600406-91 = "― [log=시미코]เดี๋ยวฉันจะเอาไปประทับตรายืมก่อน แล้วจะเอามาให้ค่ะ[/log][wa:275] "
2600406-92 = "― [log=시미코]โชคดีที่หาหนังสือเจอนะคะ[/log][wa:2660] "
2600406-95 = "― [log=시미코]เป็นยังไงบ้างคะ? การได้ใช้เวลาในห้องสมุดแบบนี้...[/log][wa:1890] "
2600406-96 = "― [log=시미코]มันน่าสนุกดี ใช่มั้ยล่ะคะ?[/log][wa:3010] "
2600406-99 = "― [log=시미코]ก็ความสนุกแบบนี้สัมผัสจากที่อื่นไม่ได้นี่นา...[/log][wa:485] "
2600406-100 = "― [log=시미코]เราจะเล่นสนุกแบบนี้ ได้ที่ห้องสมุดเท่านั้นนี่คะ...[/log][wa:1430] "
2600406-103 = "― [log=시미코]เพราะงั้นหลังจากนี้[/log][wa:1790] "
2600406-104 = "― [log=시미코]ถ้าคุณครูต้องการละก็ แวะมาที่นี่ได้ตลอดเลยนะคะ[/log][wa:2270] "
2600406-107 = "― [log=시미코]ฉัน... จะรอนะคะ! [/log][wa:1820] "
2600406-110 = "(จากนั้นคุณครูก็เดินดูหนังสือเล่มอื่นๆ อยู่กับชิมิโกะสักพัก ก่อนจะรับหนังสือที่ยืมมาแล้วกลับชาเล่ต์)"

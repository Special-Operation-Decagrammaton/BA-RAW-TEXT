2600406-12 = "3;시미코;99;……후후훗."
2600406-13 = "#all;hide"
2600406-14 = "3;시미코;02;물론 제가 책 보는 걸 좋아하는 건 사실이지만, 그것만이 도서관의 즐거움은 아니니까요.\n#3;em;[반응]"
2600406-15 = "3;시미코;01;사실 책 보는 것으로만 따지면, 도서관보다 집에서 보는 걸 더 선호하는 편이기도 하고요."
2600406-16 = "3;시미코;99;제가 굳이 매일처럼 도서관으로 나와서 사서 일을 도맡아 하고 있는 이유는……."
2600406-17 = "3;시미코;03;바로 지금 이런 일. 이런 상황들 때문이죠.\n#3;em;[반짝]\n#3;greeting\n#3;closeup"
2600406-18 = "[s1] \"……? 이런 일?\"\n[s2] \"내 이야기야?\""
2600406-19 = "3;시미코;01;네. 그래서 지금 되게 신이 나 있답니다. 정말로 선생님께서 응해 주실 줄은 몰랐거든요.\n#3;closeup"
2600406-20 = "3;시미코;01;네. 그래서 지금 되게 신이 나 있답니다. 정말로 선생님께서 응해 주실 줄은 몰랐거든요.\n#3;closeup"
2600406-21 = "3;시미코;99;사서가 가장 좋아하는 일. 그것은 바로 필요한 사람에게 '밖에선 구할 수 없는 책'을 찾아주는 일.\n#3;closeup"
2600406-22 = "3;시미코;02;지금 선생님께서 필요로 하시는 책이 뭔지는 아직 못 들었지만, 분명 구하기 힘든 거겠죠?\n#3;em;[?]\n#3;closeup"
2600406-23 = "3;시미코;01;어디서든 구할 수 있는 내용이었다면, 요즘 같은 시대에 인터넷으로 벌써 찾으셨을 테니까요.\n#3;closeup"
2600406-24 = "[s3] \"과연. 확실히 말이 되네.\"\n[s4] \"결국 검색으론 못 찾았었지.\""
2600406-25 = "3;시미코;99;후훗. 역시…….\n#3;em;…"
2600406-26 = "3;시미코;99;후훗. 역시…….\n#3;em;…"
2600406-27 = "3;시미코;01;많은 것들이 인터넷과 e북으로 풀려 있고, 점점 더 도서관으로 올 일이 적어지는 세상이지만."
2600406-28 = "3;시미코;02;의외로 아직도 진짜 깊은 정보들은, 인터넷 검색으로 찾기 어려운 게 많답니다."
2600406-29 = "3;시미코;01;찾는 사람이 많지 않은 정보. 접근이 쉽지 않은 이야기들은 아직도 종이 속에 잠들어 있죠."
2600406-30 = "3;시미코;03;그게 뭔지 같이 찾아보는 것만 해도 사서로서는 더 없는 즐거움!\n#3;hophop\n#3;em;[음표]"

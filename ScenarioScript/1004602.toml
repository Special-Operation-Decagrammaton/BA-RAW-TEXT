[translation]
1004602-1 = "Crushing Watermelons with Izuna!"
1004602-5 = "At Izuna's urgent request, I went out to the summer beach under the scorching sun."
1004602-10 = "My lord, my lord! Here, here!"
1004602-11 = "[s] \"Hi, Izuna.\""
1004602-12 = "Heehee. Hello, my lord!"
1004602-13 = "[s1] \"So, what's on the schedule for today?\"\n[s2] \"You said you wanted to do some ninja activities for the summer, right?\""
1004602-16 = "Um, since we're at the beach during summer..."
1004602-17 = "I want to do something seasonal that we can only do right now!"
1004602-18 = "[s] \"A special activity for the summer... Maybe swimming?\""
1004602-19 = "(Shock)"
1004602-20 = "[s] \"Today is really hot, so we can take a dip together...\""
1004602-24 = "[ns] \"Huh? Izuna?\""
1004602-25 = "Oh, um, my lord, so, about swimming..."
1004602-26 = "Y-Yes! My lord! Of course, that's a good idea, but...!"
1004602-27 = "Since I wanna be a ninja...!"
1004602-28 = "Maybe we should do special training that we can only do on the beach!"
1004602-29 = "That was my plan!"
1004602-30 = "[s] \"What kind of training is that...?\""
1004602-31 = "Don't worry! I prepared the items necessary for training, my lord!"
1004602-36 = "[ns] \"A watermelon...and a wooden sword? By training, do you mean...\""
1004602-37 = "Yes! This is the best form of physical training during the summertime!"
1004602-38 = "The watermelon crush!"
1004602-39 = "[s3] \"That's a kind of physical training? I guess it is seasonal.\"\n[s4] \"But what does it have to do with ninjas...?\""
1004602-42 = "Heeheehee...!"
1004602-43 = "Of course, it's not gonna be any ordinary watermelon crush, my lord!"
1004602-44 = "We'll be doing the Special Ninja Watermelon Crush, which is said to be popular among famous ninjas!"
1004602-45 = "[s] \"Izuna, where did you hear this from?\""
1004602-46 = "Huh? I saw it on the Michiruchi, a Girl's Ninja Scroll video channel."
1004602-47 = "[s] \"I figured as much.\""
1004602-48 = "The channel said that the rules for the Special Ninja Watermelon Crush are simple!"
1004602-49 = "Once you, my respected lord, give me the command, I'll execute it faithfully as a ninja!"
1004602-50 = "I'll crush the watermelon at your command!"
1004602-51 = "[s] \"...Sorry, but I'm failing to see the difference between this and an ordinary watermelon crush.\""
1004602-55 = "[ns] \"But I'll do it if that's what you want.\""
1004602-56 = "Heehee! Let's begin training, my lord!"
1004602-60 = "Then, like this..."
1004602-65 = "I'm gonna set up the watermelon..."
1004602-71 = "Okay! Preparation is complete!"
1004602-77 = "Now, I'll just close my eyes..."
1004602-78 = "My lord! Give me the commands!"
1004602-79 = "[s] \"Okay, first, Izuna...\""
1004602-80 = "*gulp* *pit-a-pat pit-a-pat*"
1004602-81 = "[s5] \"From where you are, take three steps forward...\"\n[s6] \"From where you are, go four steps back...\""
1004602-82 = "Yes, my lord! I'm going!"
1004602-86 = "Yes, my lord! I'm going!"
1004602-90 = "[ns] \"W-Wait, Izuna?!\""
1004602-98 = "*cough* I made a mistake..."
1004602-99 = "[s] \"A-Are you all right?\""
1004602-100 = "Yes! I'm okay, my lord!"
1004602-101 = "In my rush to follow your commands, I didn't consider my speed and sprinted!"
1004602-102 = "I won't make the same mistake twice!"
1004602-103 = "As a ninja, I'm ready for your summer training commands, my lord! "
1004602-104 = "[s] \"Oh, okay. Then this time, go to the right...\""
1004602-105 = "Yes! The right!"
1004602-106 = "Ahhh!"
1004602-111 = "[s] \"I-Izuna?!\""
1004602-115 = "*cough cough* I made another mistake..."
1004602-119 = "I won't give up yet!"
1004602-120 = "My lord! Again!"
1004602-121 = "[s] \"Oh, um, th-then, left this time...?\""
1004602-122 = "Haaap!"
1004602-128 = "Not yet, not yet!"
1004602-132 = "Allow me to show you Izuna-style ninjutsu! Hiyaa!"
1004602-137 = "She tried to crush the watermelon repeatedly, to no avail."
1004602-138 = "While clouds of sand were billowing around us,"
1004602-142 = "the watermelon remained untouched and perfect."
1004602-144 = "Ugh... I didn't think a watermelon could be so strong..."
1004602-145 = "I can't even scratch its armor!"
1004602-146 = "Indeed...this Special Ninja Watermelon Crush training...is not to be underestimated!"
1004602-147 = "[s7] \"I mean, I think there's a fundamental problem...\"\n[s8] \"You should reconsider this training...\""
1004602-150 = "A p-problem?! ...You may be right."
1004602-151 = "R-Right... I suggested we jump right into the Special Ninja Watermelon Crush..."
1004602-152 = "I haven't been able to make any progress!"
1004602-153 = "So it makes sense this training isn't working..."
1004602-154 = "I guess...it's just hopeless."
1004602-155 = "I-I'm sorry, my lord!"
1004602-156 = "I made you come all the way out here on such a hot day! But I'm not good enough! I disappointed you!"
1004602-157 = "[s] \"No, no. You didn't do anything wrong.\""
1004602-158 = "*sniffle* Huh?"
1004602-159 = "[s9] \"How about we try slowing it down a little?\" \n[s10] \"You don't have to react to a command immediately.\""
1004602-165 = "Oh... Like, take my time in following your commands?"
1004602-166 = "Ah! I should incorporate more strategy into this training!"
1004602-167 = "My lord! Your guidance is beyond wise, as usual!"
1004602-168 = "Hmm! "
1004602-169 = "..."
1004602-170 = "But...that might be impossible, my lord."
1004602-171 = "[s] \"Huh? Why is that?\""
1004602-172 = "When I hear your commands, my body automatically moves even when I don't intend for it to!"
1004602-173 = "I want to succeed in the Special Ninja Watermelon Crush training so badly..."
1004602-174 = "But also, when I hear your commands, I want to follow immediately with all my heart!"
1004602-175 = "Argh! What should I do, my lord?!"
1004602-176 = "I didn't know the watermelon crush was such hard training. I wasn't prepared!"
1004602-177 = "But..."
1004602-178 = "I don't want to give up yet..."
1004602-179 = "Well... I'm happy I got to train with my lord, regardless!"
1004602-180 = "[s11] \"You did very well!\" \n[s12] \"Izuna... I'm proud of you!\""
1004602-187 = "Izuna was still overly motivated..."
1004602-188 = "I couldn't get myself to tell her to quit or calm down."
1004602-189 = "And in the end..."
1004602-190 = "[ns] \"Okay, Izuna. Let's try it until you succeed!\""
1004602-192 = "...!"
1004602-193 = "Yes! Thank you, my lord!"
1004602-194 = "Nin nin!"
1004602-200 = "Izuna couldn't stop rushing her every move. We practiced the watermelon crush all day."
1004602-206 = "After training, we ate watermelon as a reward for all her hard work."

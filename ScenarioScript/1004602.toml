[translation]
1004602-1 = "ตีแตงโมกับอิซุนะ!"
1004602-5 = "(คุณครูออกมาที่ชายหาดที่แดดร้อนระอุตามคำขอแกมบังคับของอิซุนะ)"
1004602-10 = "นายท่านๆ! ทางนี้ค่ะ! ทางนี้!"
1004602-11 = "[s] \"ว่าไง อิซุนะ\""
1004602-12 = "ฮิฮิฮิ ค่ะนายท่าน!"
1004602-13 = "[s1] \"แล้ววันนี้จะทำอะไรเหรอ?\"\n[s2] \"เมื่อกี้บอกว่ากิจกรรมของนินจาในฤดูร้อนใช่มั้ย?\""
1004602-16 = "คือว่า... ตอนนี้พวกเราก็มาถึงที่ทะเลกันแล้ว!"
1004602-17 = "ถ้าเป็นไปได้อิซุนะก็อยากทำสิ่งที่ทำได้แค่ในฤดูร้อนค่ะ!"
1004602-18 = "[s] \"สิ่งที่ทำได้เฉพาะในฤดูร้อน... ว่ายน้ำเหรอ?\""
1004602-19 = "(ตกใจ)"
1004602-20 = "[s] \"อากาศร้อนแบบนี้ ถ้าไปเล่นน้ำกัน...\""
1004602-24 = "[ns] \"หืม อิซุนะ?\""
1004602-25 = "เอ่อ คือว่านายท่าน... เรื่องว่ายน้ำน่ะ..."
1004602-26 = "คะ...ค่ะ นายท่าน! แน่นอนว่าถ้าได้ไปว่ายน้ำก็คงดีมาก..."
1004602-27 = "แต่ว่าถ้าเป็นนินจาแล้ว เวลาอยู่ที่ชายหาดละก็...!"
1004602-28 = "จะต้องฝึกพิเศษที่สามารถทำได้แค่ในฤดูร้อนเท่านั้น!"
1004602-29 = "และนั่นก็คือแผนของอิซุนะค่ะ!"
1004602-30 = "[s] \"การฝึกพิเศษที่ทำได้แค่ในฤดูร้อน...?\""
1004602-31 = "เพราะงั้นนี่ค่ะ อิซุนะเตรียมอุปกรณ์พิเศษสำหรับการฝึกมาแล้วค่ะ นายท่าน!"
1004602-36 = "[ns] \"นี่มันแตงโมกับไม้ หรือว่าการฝึกที่บอกคือ...\""
1004602-37 = "ใช่แล้วค่ะ! การฝึกที่ขาดไม่ได้ในฤดูร้อน...!"
1004602-38 = "นั่นก็คือการฝึกตีแตงโมค่ะ!"
1004602-39 = "[s3] \"ฝึกพละกำลังเหรอ? สมกับเป็นการฝึกฤดูร้อนเลย\"\n[s4] \"คือว่ามันเกี่ยวกับการฝึกนินจา... ตรงไหนเหรอ?\""
1004602-42 = "ฮุฮุฮุ...!"
1004602-43 = "แน่นอนว่าเราไม่ได้จะตีแตงโมแบบธรรมดาๆ หรอกค่ะนายท่าน!"
1004602-44 = "แต่เป็น <การตีแตงโมพิเศษแบบฉบับนินจา> ที่โด่งดังมากในหมู่นินจาค่ะ!"
1004602-45 = "[s] \"อิซุนะไปได้ข้อมูลนี้มาจากไหนน่ะ?\""
1004602-46 = "คะ? ฉันเห็นมาจากช่องวิดีโอ <วิถีนินจา มิจิรุจจี้> ของหัวหน้าน่ะค่ะ?"
1004602-47 = "[s] \"อืม คิดไว้ไม่มีผิดเลย!\""
1004602-48 = "ตามที่ดูมาวิธี <การตีแตงโมพิเศษแบบฉบับนินจา> ง่ายมากเลยค่ะ!"
1004602-49 = "แค่นายท่านที่อิซุนะเคารพออกคำสั่ง... อิซุนะที่เป็นนินจาก็จะปฏิบัติตามอย่างซื่อสัตย์!"
1004602-50 = "อิซุนะผู้นี้... จะตีแตงโมให้แตกตามคำสั่งของนายท่านค่ะ!"
1004602-51 = "[s] \"โทษทีนะ แต่ครูไม่เห็นว่ามันจะต่างกับเกมทั่วๆ ไปเลย\""
1004602-55 = "[ns] \"แต่ถ้าอิซุนะอยากทำแบบนั้น ครูก็จะยอมทำตาม\""
1004602-56 = "ฮิฮิฮิ ค่า!"
1004602-60 = "ถ้างั้นก่อนอื่น..."
1004602-65 = "ก็ต้องวางแตงโมเตรียมเอาไว้..."
1004602-71 = "ค่ะ! เท่านี้ก็เตรียมพร้อมแล้วค่ะ!"
1004602-77 = "จากนั้นก็ต้องปิดตา..."
1004602-78 = "นายท่าน! เชิญออกคำสั่งได้เลยค่ะ!"
1004602-79 = "[s] \"ถ้างั้นอิซุนะ...\""
1004602-80 = "อึก... (ตึกตักตึกตัก!)"
1004602-81 = "[s5] \"เดินตรงไปสามก้าว...\"\n[s6] \"ถอยหลังไปอีกสี่ก้าว...\""
1004602-82 = "ค่ะ นายท่าน! อิซุนะจะลุยแล้วนะคะ!"
1004602-86 = "ค่ะ นายท่าน! อิซุนะจะลุยแล้วนะคะ!"
1004602-90 = "[ns] \"ดะ...เดี๋ยวก่อน อิซุนะ?!\""
1004602-98 = "แค่กๆๆ อิซุนะทำพลาดซะแล้วค่ะ..."
1004602-99 = "[s] \"เป็นอะไรรึเปล่า?\""
1004602-100 = "อิซุนะไม่เป็นไรค่ะ นายท่าน!"
1004602-101 = "เมื่อกี้พอได้ยินคำสั่งของนายท่าน อิซุนะก็เผลอวิ่งออกไปโดยไม่ได้คำนึงถึงเรื่องความเร็วในการวิ่งเลย..."
1004602-102 = "คราวนี้ฉันจะไม่พลาดค่ะ!"
1004602-103 = "ในฐานะนินจา อิซุนะพร้อมรับคำสั่งแล้วค่ะ โปรดออกคำสั่งได้เลยค่ะ นายท่าน!"
1004602-104 = "[s] \"อะ...อื้อ ถ้างั้นคราวนี้ก็ไปทางขวา...\""
1004602-105 = "ค่ะ! ทางขวา!"
1004602-106 = "ไฮย่าาา!!"
1004602-111 = "[ns] \"อะ...อิซุนะ?!\""
1004602-115 = "แค่กๆๆ อิซุนะทำพลาดซะแล้วค่ะ..."
1004602-119 = "ไม่ล่ะ ยังเร็วไปที่จะยอมแพ้ค่ะ"
1004602-120 = "นายท่าน! ช่วยออกคำสั่งอีกทีค่ะ!"
1004602-121 = "[s] \"อะ...อื้อ ถ้างั้นคราวนี้ก็ไปทางซ้าย...\""
1004602-122 = "ไฮย่าาา!!"
1004602-128 = "ยังค่ะ ยังหรอกค่ะ!"
1004602-132 = "ฉันจะแสดงวิถีนินจาอิซุนะให้ได้ชมค่ะ! ย้าาาา!!"
1004602-137 = "(หลังจากนั้นอิซุนะก็พยายามตีแตงโมอยู่หลายครั้ง)"
1004602-138 = "(แม้อิซุนะจะพยายามตีแตงโม จนทรายพัดกระจายฟุ้งขึ้นมาทั่วก็ตาม...)"
1004602-142 = "(แต่ว่าแตงโมก็ยังคงอยู่ในสภาพเดิม ไม่ได้มีรอยขีดข่วนเลยแม้แต่อย่างใด)"
1004602-144 = "อึก... นึกไม่ถึงเลยว่าแตงโมจะเป็นศัตรูที่ร้ายกาจแบบนี้... "
1004602-145 = "อิซุนะ ไม่สามารถทำอะไรแตงโมได้เลยค่ะ..."
1004602-146 = "<การตีแตงโมพิเศษแบบฉบับนินจา> แบบนี้... ประมาทไม่ได้เลยจริงๆ ค่ะ!"
1004602-147 = "[s7] \"ครูว่ามีปัญหาที่เทคนิคพื้นฐานรึเปล่านะ...\"\n[s8] \"ครูว่าต้องทบทวนเรื่องวิธีการฝึกใหม่แล้วล่ะ...\""
1004602-150 = "แง๊ว~?! นะ... นายท่าน?! ทะ...ที่นายท่านพูดเมื่อกี้หมายความว่าวิธีการฝึกมีปัญหา...?!"
1004602-151 = "นะ...นั่นสินะคะ อิซุนะเป็นฝ่ายชวนนายท่านมาฝึก <การตีแตงโมพิเศษแบบฉบับนินจา> แท้ๆ..."
1004602-152 = "แต่กลับไม่สามารถฝึกได้อย่างถูกต้อง เอาแต่ทำเรื่องผิดพลาด..."
1004602-153 = "เพราะงั้น... การที่นายท่านบอกให้มาทบทวนการฝึกใหม่..."
1004602-154 = "คงช่วยไม่ได้จริงๆ นะคะ..."
1004602-155 = "ขอโทษด้วยค่ะ นายท่าน~!"
1004602-156 = "อิซุนะชวนนายท่านออกมาทั้งที่อากาศร้อนแบบนี้ แต่อิซุนะกลับบกพร่องในการฝึก และทำให้#nนายท่านผิดหวัง...!"
1004602-157 = "[s] \"ไม่หรอกๆ ไม่ใช่ความผิดของอิซุนะเลย\""
1004602-158 = "ฮึก คะ...คะ?!"
1004602-159 = "[s9] \"อิซุนะฟังครูให้ดีก่อนที่จะวิ่งไปดีมั้ย?\"\n[s10] \"หมายถึงให้รอบคอบว่าควรจะเคลื่อนไหวยังไงก่อนวิ่งน่ะ\""
1004602-165 = "อา... ให้ทบทวนคำสั่งให้รอบคอบก่อนปฏิบัติตาม"
1004602-166 = "อ๊ะ! ฉันควรทบทวนคำสั่งก่อนเคลื่อนไหวอย่างรวดเร็วสินะคะ!"
1004602-167 = "คำพูดของนายท่าน... อิซุนะสลักเอาไว้ในใจแล้วค่ะ!"
1004602-168 = "อืม... "
1004602-169 = "...."
1004602-170 = "อืม แต่ว่าฉันคิดว่าทำไม่ได้แน่เลยค่ะ นายท่าน!"
1004602-171 = "[s] \"ทำไมล่ะ?\""
1004602-172 = "คือว่านายท่าน... อิซุนะน่ะ พอได้ยินคำสั่งของนายท่าน ร่างกายของอิซุนะก็จะขยับไปเองทันทีเลยค่ะ!"
1004602-173 = "ฮือ... แต่ว่าอิซุนะอยากตีแตงโมให้สำเร็จ..."
1004602-174 = "แต่ว่าพอได้ยินคำสั่งของนายท่านละก็ ร่างกายของอิซุนะก็เคลื่อนไหวไปเอง..."
1004602-175 = "อ๊าาา~! ทำยังไงดีคะ นายท่าน?!"
1004602-176 = "อิซุนะไม่รู้มาก่อนเลยว่าการตีแตงโมจะยากขนาดนี้ค่ะ!"
1004602-177 = "แต่ว่า..."
1004602-178 = "อิซุนะยังไม่อยากยอมแพ้แค่นี้ค่ะ..."
1004602-179 = "เพราะเป็นการฝึกกับนายท่านที่อิซุนะรอคอยมานาน...!"
1004602-180 = "[s11] \"อื้อ นะ...นั่นสินะ...\"\n[s12] \"อิซุนะ ครูภูมิใจจริงๆ!\""
1004602-187 = "(เมื่อเห็นอิซุนะที่พลังพุ่งพล่านแบบนั้น...)"
1004602-188 = "(คุณครูจึงไม่สามารถพูดปรามให้เธอล้มเลิกได้)"
1004602-189 = "(และสุดท้าย...)"
1004602-190 = "[ns] \"ดีล่ะ อิซุนะ ถ้างั้นมาพยายามจนกว่าจะสำเร็จเถอะ!\""
1004602-192 = "...!"
1004602-193 = "ค่ะ อิซุนะจะพยายามค่ะ!"
1004602-194 = "นินนิน!"
1004602-200 = "(หลังจากนั้น คุณครูกับอิซุนะก็ร่วมฝึกตีแตงโมด้วยกันอย่างดุเดือดเลือดพล่าน)"
1004602-206 = "(และพอเสร็จสิ้นการฝึก ทั้งสองคนก็นั่งกินแตงโมด้วยกันอย่างเอร็ดอร่อย)"

[translation]
1004602-1 = "和伊樹菜一起劈西瓜！"
1004602-5 = "（應伊樹菜的要求，來到了炙熱陽光壟罩的夏日海邊）"
1004602-10 = "主公！主公！在這裡！這裡！"
1004602-11 = "[s] 「伊樹菜，讓你久等了。」"
1004602-12 = "不會！您別這麼說！"
1004602-13 = "[s1] 「那麼今天要來做什麼呢？」\n[s2] 「我記得你說想透過修行，成為能適應海邊的忍者……對吧？」"
1004602-16 = "是的！既然來到了夏天的海邊！"
1004602-17 = "所以伊樹菜想進行只有現在才能進行的活動！"
1004602-18 = "[s] 「說到夏天……所以是游泳之類的嗎？」"
1004602-19 = "（！！）"
1004602-20 = "[s] 「而且今天這麼熱，下水游泳一定很舒服……」"
1004602-24 = "[ns] 「伊樹菜？」"
1004602-25 = "那，那個，主公……"
1004602-26 = "游，游泳當然也是不錯啦……！"
1004602-27 = "不過既然身為忍者……"
1004602-28 = "伊樹菜還是想嘗試看看，只能在夏日海邊做的特別修行……！"
1004602-29 = "主公覺得這點子如何呢！！"
1004602-30 = "[s] 「特別修行……？」"
1004602-31 = "是！道具也已經準備好了！"
1004602-36 = "[ns] 「西瓜和……木刀？難道這是要……」"
1004602-37 = "是的！說到夏天就不能缺席的體力訓練……！"
1004602-38 = "劈西瓜！"
1004602-39 = "[s3] 「這能算是訓練嗎……？雖然確實很有夏天的感覺……」\n[s4] 「……但這跟忍者……有什麼關係嗎？」"
1004602-42 = "哼哼哼……！"
1004602-43 = "今天要進行的當然不是普通的劈西瓜！"
1004602-44 = "而是在知名忍者間悄悄流行的……「忍者流特別版劈西瓜」！"
1004602-45 = "[s] 「……伊樹菜是從哪裡知道這個消息的？」"
1004602-46 = "咦？是在部長經營的「少女忍法帖 小小三千留」頻道裡看到的唷？"
1004602-47 = "[s] 「我就知道……」"
1004602-48 = "這種「忍者流特別版劈西瓜」的規則很簡單！"
1004602-49 = "身為忍者，一旦發誓效忠的主公下令，就必須要徹底執行！"
1004602-50 = "所以伊樹菜會遵照主公的命令，打破西瓜！"
1004602-51 = "[s] 「目前聽起來和普通的劈西瓜沒什麼不同……」"
1004602-55 = "[ns] 「但總之先開始吧。」"
1004602-56 = "耶嘿嘿！是！"
1004602-60 = "那麼……"
1004602-65 = "首先把西瓜擺好……"
1004602-71 = "久等了，都準備好了！"
1004602-77 = "接下來將眼睛閉起來……"
1004602-78 = "來吧主公！請您儘管下令吧！"
1004602-79 = "[s] 「那首先是……」"
1004602-80 = "（緊張……）"
1004602-81 = "[s5] 「往前走三步……」\n[s6] 「往後走四步……」"
1004602-82 = "是！伊樹菜！要上了！"
1004602-86 = "是！伊樹菜！要上了！"
1004602-90 = "[ns] 「等等，伊樹菜！？」"
1004602-98 = "咳咳咳……失敗了……"
1004602-99 = "[s] 「你沒事吧？」"
1004602-100 = "是！請別擔心！"
1004602-101 = "剛才一聽到主公的聲音，就不自覺地一股腦往前衝了……"
1004602-102 = "不過這次不會再失手了！"
1004602-103 = "來吧，這次一定會成功的！主公！"
1004602-104 = "[s] 「那這次，先往右邊……」"
1004602-105 = "右邊！！！"
1004602-106 = "哈啊啊啊！！"
1004602-111 = "[ns] 「伊，伊樹菜！？」"
1004602-115 = "咳咳咳……！竟然又失手了……"
1004602-119 = "……不！現在放棄還太早了！"
1004602-120 = "主公！請您再次下令！"
1004602-121 = "[s] 「哦，嗯。那往左邊……」"
1004602-122 = "喝啊啊！！！"
1004602-128 = "還，還沒完！"
1004602-132 = "看招！伊樹菜流忍法！"
1004602-137 = "（就這樣，不管反覆進行了多少次……）"
1004602-138 = "（依然只見沙塵漫天紛飛……）"
1004602-142 = "（西瓜仍維持著它漂亮的外型）"
1004602-144 = "呃呃……沒想到西瓜竟然是如此厲害的強敵……"
1004602-145 = "伊樹菜甚至連一點小擦傷都辦不到……"
1004602-146 = "這就是「忍者流特別版劈西瓜」……不容小覷啊！"
1004602-147 = "[s7] 「我覺得問題不在那裡……」\n[s8] 「我覺得你應該要先思考一下……」"
1004602-150 = "是，是嗎！？"
1004602-151 = "唔……主公說的對，明明是伊樹菜自己說要進行這項訓練的……"
1004602-152 = "可是卻一次都沒能完成，還不斷失手……"
1004602-153 = "現在主公會說出這番話……"
1004602-154 = "也是理所當然的……"
1004602-155 = "唔，真是抱歉！主公！"
1004602-156 = "天氣如此炎熱！伊樹菜還這麼沒用！只會讓主公失望……！"
1004602-157 = "[s] 「沒有，我沒有要責怪你！沒事的！」"
1004602-158 = "真，真的嗎……？"
1004602-159 = "[s9] 「嗯。我的意思是說，你不要一聽到命令就立刻行動。」\n[s10] 「你要不要試試，先冷靜思考再付諸行動呢？」"
1004602-165 = "原來如此……比起聽到命令就立刻行動……"
1004602-166 = "主公的意思是……身為忍者，更應該要仔細確實的理解作戰內容再行動！"
1004602-167 = "明白了！主公的金言，伊樹菜會永遠銘記在心！"
1004602-168 = "……"
1004602-169 = "…………"
1004602-170 = "主公，說是這樣說……但執行起來似乎會有困難。"
1004602-171 = "[s] 「那又是為什麼？」"
1004602-172 = "那個，伊樹菜只要聽到主公的聲音，身體就會馬上自己動起來……"
1004602-173 = "可是……果然還是想成功劈開西瓜……"
1004602-174 = "但是！要伊樹菜聽到主公的聲音卻不做出反應實在是……！"
1004602-175 = "呃啊～！該怎麼辦才好，主公！？"
1004602-176 = "伊樹菜完全不知道，劈西瓜竟然是這麼困難的訓練！"
1004602-177 = "可是……"
1004602-178 = "伊樹菜真的不想放棄……"
1004602-179 = "好不容易才有機會和主公一起特訓……"
1004602-180 = "[s11] 「這，這樣啊……」\n[s12] 「伊樹菜真是個好孩子……！」"
1004602-187 = "（見到如此執著的伊樹菜）"
1004602-188 = "（實在不忍心要他就這麼放棄……）"
1004602-189 = "（於是……）"
1004602-190 = "[ns] 「……好。那總之先累積經驗，直到成功為止吧！」"
1004602-192 = "……！"
1004602-193 = "是！伊樹菜會努力的！"
1004602-194 = "忍忍！"
1004602-200 = "（之後，和不停暴衝的伊樹菜進行了一整天的劈西瓜特訓）"
1004602-206 = "（訓練總算結束後，和因為修行累癱的伊樹菜一起享用了美味的西瓜）"

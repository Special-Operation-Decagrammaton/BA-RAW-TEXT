[translation]
10035150-1 = "ย้อนวันวาน;พักร้อนลับๆ ของโคะมาคาเสะ ราบุ 2"
10035150-4 = "ทะ... ที่นี่คือสวนน้ำนี่คะ?"
10035150-5 = "เห็นว่าเพิ่งเปิดเลยด้วย เราจะได้เล่นน้ำในสวนน้ำกันเลยเหรอคะ...?!"
10035150-7 = "ก็ใช่น่ะสิ!"
10035150-8 = "พวกคนจากสำนักงานใหญ่น่ะเลือกปฏิบัติ!"
10035150-9 = "ช่างคนพวกนั้นเถอะ! ถึงจะมีชื่อแต่ฉันก็ไม่ไปหรอก!"
10035150-10 = "มาสนุกกันที่นี่ให้ลืมชายหาดบ้าบอของพวกนั้นไปเลย!"
10035150-11 = "ฉันอยากให้ลูกน้องของฉันได้สนุกกับฤดูร้อนเหมือนกัน!"
10035150-16 = "หัวหน้าราบุ...!"
10035150-17 = "ทำเพื่อพวกเราขนาดนี้เลย...!"
10035150-19 = "ก็... ไม่ใช่เรื่องใหญ่อะไรหรอก แล้วฉันเองก็อยากมาเที่ยวสวนน้ำดูสักครั้งอยู่แล้ว"
10035150-20 = "งั้นเราก็เข้าไปกันเถอะ!"
10035150-23 = "ค่ะ! หัวหน้า!"
10035150-31 = "เชิญครับ! มากี่ท่านครับ?"
10035150-33 = "3 คน!"
10035150-35 = "ครับคุณลูกค้า ทั้งหมด 18,000 เยนครับ"
10035150-39 = "หะ... หา?!"
10035150-40 = "ทำไมมันแพงขนาดนี้เนี่ย?"
10035150-42 = "อ่า... นี่เป็นราคาปกติน่ะครับ"
10035150-43 = "แล้วก็จะมีลดราคาให้ตามเงื่อนไขด้วย"
10035150-44 = "ใช่ ต้องมีสิ"
10035150-45 = "ถ้าเป็นนักเรียนก็จะมีส่วนลดสำหรับนักเรียนครับ "
10035150-46 = "นักเรียนจะได้รับส่วนลด 50% ไม่ว่าจะมาจากโรงเรียนไหน แค่แสดงบัตรนักเรียนให้เราดูก็พอครับ!"
10035150-47 = "ดะ... ได้!"
10035150-49 = "หะ... หัวหน้า พวกเราลาออกกันมาแล้ว ไม่มีบัตรนักเรียนหรอกค่ะ"
10035150-51 = "ละ... แล้วมีส่วนลดอื่นมั้ย?"
10035150-52 = "อืม ถ้าแสดงใบรับรองการทำกิจกรรมอาสา ก็ใช้เป็นส่วนลดได้ 30% ครับ"
10035150-53 = "พวกเราไม่มีใบรับรองการทำกิจกรรมอาสาอะไรนั่นหรอก..."
10035150-54 = "ถ้างั้นก็..."
10035150-55 = "มีส่วนลด 20% สำหรับลูกค้าที่มาใช้บริการหลัง 4 โมงเย็นครับ"
10035150-57 = "นี่มันเพิ่งจะเที่ยงเองนะ!"
10035150-58 = "จะให้เรารออีก 4 ชั่วโมงเลยเหรอ?"
10035150-64 = "เฮ้อ..."
10035150-65 = "มีเงินกันเท่าไรล่ะครับ?"
10035150-66 = "อ่า... เงินที่เรามีตอนนี้ก็..."
10035150-70 = "1,500 เยน..."
10035150-71 = "ลดให้เหลือคนละ 500 เยนไม่ได้เหรอ?"
10035150-73 = "ขอโทษนะครับลูกค้า แต่เราให้ส่วนลดที่ไม่อยู่ในกฎไม่ได้ครับ"
10035150-77 = "เชิญลูกค้าท่านต่อไปครับ!"
10035150-78 = "เดี๋ยวๆๆๆ เดี๋ยวก่อน!"
10035150-79 = "ฉะ... ฉันเข้ามาถึงในนี้แล้วนะ จะให้กลับไปได้ยังไง!"
10035150-81 = "ใช่แล้วค่ะ!"
10035150-82 = "หัวหน้าอุตส่าห์พาเรามาสวนน้ำทั้งทีนะ...!"
10035150-84 = "หยวนๆ ให้เราหน่อยไม่ได้หรือไง?"
10035150-85 = "งั้นขอใช้แรงงานแลกค่าเข้าก็ได้!"
10035150-86 = "อืม แบบนั้นมันผิดกฎอยู่นะ..."
10035150-90 = "แต่มีจุดที่ยังขาดแรงงานอยู่พอดี เอาเป็นว่าผมจะลองติดต่อดูก่อนแล้วกันครับ"
10035150-92 = "ขะ... ขอบใจนะ!"
10035150-93 = "ไม่ว่าจะเป็นงานอะไร พวกฉันก็จะตั้งใจทำให้เต็มที่เลย!"
10035150-101 = "งานทำความสะอาดสระว่ายน้ำ แค่นี้เรื่องจิ๊บๆ น่า!"
10035150-102 = "ถึงท่านราบุคนนี้จะไม่ชอบถือแปรงมานั่งขัดพื้นก็เถอะ..."
10035150-103 = "แต่ชีวิตคนเรามันก็ต้องมีวันแบบนี้บ้างละ"
10035150-109 = "หัวหน้า ฉันขัดตรงนี้เสร็จแล้วค่ะ!"
10035150-110 = "ตรงนี้ก็ด้วยค่ะ!"
10035150-112 = "งั้นเหรอ? ถ้างั้นก็..."
10035150-119 = "ประกาศให้ทราบ"
10035150-120 = "เราจะเปิดให้บริการสวนน้ำรอบเย็น ณ บัดนี้ เชิญลูกค้าทุกท่านที่รออยู่ด้านนอกเข้าเกทเพื่อเข้าสวนน้ำ#nได้ค่ะ"
10035150-121 = "นะ... ในที่สุด!"
10035150-122 = "ถึงเวลาแล้วค่ะหัวหน้า!"
10035150-124 = "ดีละ!"
10035150-125 = "เราใช้แรงงานเพื่อแลกค่าเข้าสวนน้ำกันเพียงพอแล้ว ทีนี้ก็เหลือแค่ไปเล่นสนุกกัน!"
10035150-126 = "ทุกคน!"
10035150-129 = "ค่ะ หัวหน้า!"
10035150-131 = "ถ้าวันนี้ไม่สนุกให้เต็มที่ ฉันไม่ยกโทษให้หรอกนะ!"
10035150-132 = "ลืมงานทุกอย่างให้หมดแล้วไปปล่อยจอยกันเลย!"
10035150-133 = "เราเล่นน้ำกันได้จริงๆ เหรอคะ?"
10035150-134 = "ได้แน่นอนอยู่แล้ว ไม่ต้องกังวลอะไรหรอก!"
10035150-136 = "ถ้าสวนน้ำไม่มีจระเข้ออกมาว่ายน้ำน่ะนะ!"

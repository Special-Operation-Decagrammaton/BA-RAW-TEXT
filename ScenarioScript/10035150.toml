[translation]
10035150-1 = "Afterword;Komakaze Rabu's Secret Vacation 2"
10035150-4 = "Y-You took us to a water park?"
10035150-5 = "On opening day, looks like. Is this what you meant by us \"using the swimsuit\"?"
10035150-7 = "That's right!"
10035150-8 = "Those punks at headquarters, discriminating against people like that."
10035150-9 = "So forget it! I'm not going either!"
10035150-10 = "Let's have so much fun here, we won't even think about the beach."
10035150-11 = "Just relax and enjoy the summer, like we all deserve!"
10035150-16 = "Aw, Captain..."
10035150-17 = "For us...?"
10035150-19 = "For you and, well, for me too. I like water parks."
10035150-20 = "Anyway! Let's get our tickets already!"
10035150-23 = "Yes, Captain!"
10035150-31 = "Welcome. How many in your party?"
10035150-33 = "Three!"
10035150-35 = "Three guests. That will be 18,000 Yen."
10035150-39 = "Unbelievable."
10035150-40 = "Why's it so expensive?"
10035150-42 = "Well, that's the regular price."
10035150-43 = "We do have discounts available."
10035150-44 = "Okay, good..."
10035150-45 = "First, there's a student discount. "
10035150-46 = "If you have a student ID card from any academy, it's 50% off the regular price."
10035150-47 = "U-U-Um..."
10035150-49 = "W-We're drop-outs. That's not gonna work."
10035150-51 = "Yeah, any other discounts?"
10035150-52 = "Well...if you're a certified volunteer, we can give you 30% off."
10035150-53 = "We don't have any volunteer certificates..."
10035150-54 = "Then..."
10035150-55 = "...if you come in after 4:00 PM, it's 20% off."
10035150-57 = "You guys aren't even open yet!"
10035150-58 = "We're supposed to sit around here until 4:00 PM?"
10035150-64 = "*sigh*"
10035150-65 = "How much do you have?"
10035150-66 = "Hmm, altogether, we have..."
10035150-70 = "...1,500 Yen."
10035150-71 = "Could you let us in for 500 each?"
10035150-73 = "Oh no, I'm sorry, but that's all the discounts we have available."
10035150-77 = "Next guest, please!"
10035150-78 = "Hold on, hold on, hold on!"
10035150-79 = "W-We've come all the way here, we can't just leave!"
10035150-81 = "Yeah!"
10035150-82 = "The Captain went through the trouble of bringing us here!"
10035150-84 = "Can't you cut us some slack?"
10035150-85 = "Ah! How about if we do some work for you, pay you that way?"
10035150-86 = "Well, that goes against regulations, but..."
10035150-90 = "I do know we're short-staffed in one department. Let me make a call real quick."
10035150-92 = "Th-Thank you!"
10035150-93 = "Whatever it is, we'll do a great job!"
10035150-101 = "So we're pool cleaners today. That's easy enough."
10035150-102 = "Not that I ENJOY scrubbing tiles with a teeny little brush, but..."
10035150-103 = "...there's gonna be days like this."
10035150-109 = "Captain, this area's finished!"
10035150-110 = "Here, too!"
10035150-112 = "Yeah? Okay, then let's..."
10035150-119 = "Attention, everyone."
10035150-120 = "The park is officially open. All guests, proceed to the entry gate."
10035150-121 = "F-Finally!"
10035150-122 = "Here we go, Captain!"
10035150-124 = "Awesome!"
10035150-125 = "We've worked off our entry fee, so now all we have to do is have fun!"
10035150-126 = "...Hey, guys?"
10035150-129 = "Yes, Captain?"
10035150-131 = "Have a good time today. That's an order."
10035150-132 = "Forget about everything else, and just enjoy yourselves."
10035150-133 = "Is that really gonna be okay?"
10035150-134 = "Yeah, there's not a thing to worry about!"
10035150-136 = "Unless a random alligator crawls out of the pipes, or something!"

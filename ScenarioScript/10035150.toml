[translation]
10035150-1 = "後日談;河駒風良舞的祕密假期（２）"
10035150-4 = "這，這裡是水上樂園……？"
10035150-5 = "才剛開幕的那個？#n難道是要來這裡玩水嗎……！？"
10035150-7 = "那還用說！"
10035150-8 = "總部那些傢伙，居然給我搞什麼差別待遇。"
10035150-9 = "沒關係！那我也不去了！"
10035150-10 = "就在這裡玩個痛快，把海邊的事忘了吧。"
10035150-11 = "部下無法享受的夏天，我可沒辦法接受！"
10035150-16 = "隊長……！"
10035150-17 = "居然為了我們……！"
10035150-19 = "這，這不算什麼啦，而且我也早就想來水上樂園看看了！"
10035150-20 = "別說那麼多了！總之快進去吧！"
10035150-23 = "是！隊長！"
10035150-31 = "歡迎光臨！請問幾位？"
10035150-33 = "三位！"
10035150-35 = "好的，那麼三位客人一共是18000元。"
10035150-39 = "咦！？"
10035150-40 = "怎麼這麼貴啊？"
10035150-42 = "啊，剛才跟您說的是原價。"
10035150-43 = "我們還有其他的優惠方案。"
10035150-44 = "呼～早說嘛。"
10035150-45 = "首先是學生優惠。"
10035150-46 = "只要出示學生證，就可以享受五折的優惠！"
10035150-47 = "啊，這個……"
10035150-49 = "隊，隊長，我們都被退學了，哪來的學生證啊？"
10035150-51 = "還，還有其他優惠方案嗎？"
10035150-52 = "唔嗯，出示志工活動證明的話，可享七折優惠。"
10035150-53 = "我們也沒有志工活動證明呢……"
10035150-54 = "如果都沒有的話……"
10035150-55 = "下午四點後入場，可享八折優惠。"
10035150-57 = "現在才早上剛開門耶！"
10035150-58 = "要我們在這裡等到下午四點嗎？"
10035150-64 = "唉……"
10035150-65 = "請問三位的預算是多少呢？"
10035150-66 = "那個，我們現在全身上下……"
10035150-70 = "只有1500元……"
10035150-71 = "可以算我們一個人500元就好嗎？"
10035150-73 = "非常抱歉，我不能提供規定以外的折扣。"
10035150-77 = "請下一位客人往前！"
10035150-78 = "先先先先等一下！"
10035150-79 = "我們人都到門口了，總不能連進都不讓我們進去吧！"
10035150-81 = "是啊是啊！"
10035150-82 = "隊長好不容易才帶我們來水上樂園的……！"
10035150-84 = "就不能通融一下嗎？"
10035150-85 = "不然這樣，不夠的錢就用我們的勞力來補吧！"
10035150-86 = "唔嗯，照規定是不能這麼做的……"
10035150-90 = "好吧，剛好我們有些地方缺人手，我來聯絡看看。"
10035150-92 = "謝，謝謝你！"
10035150-93 = "不管什麼工作，我們都會努力做的！"
10035150-101 = "哎呀～掃泳池這種事再簡單不過了！"
10035150-102 = "雖然良舞大人我，對拿刷子刷磁磚這種工作實在不是很滿意……"
10035150-103 = "但人生總是有時起有時落嘛。"
10035150-109 = "隊長，我這邊清理完了！"
10035150-110 = "我這邊也好了！"
10035150-112 = "是嗎？那麼差不多要──"
10035150-119 = "樂園廣播。"
10035150-120 = "讓各位久等了，現在即將開放入園。#n請客人們依序進場。"
10035150-121 = "終，終於！"
10035150-122 = "可以進去了，隊長！"
10035150-124 = "好極了！"
10035150-125 = "既然已經用打掃補足了入場費，接下來就該好好玩樂了！"
10035150-126 = "你們兩個！"
10035150-129 = "是，隊長！"
10035150-131 = "要是沒玩個過癮，我可不會饒了你們哦！"
10035150-132 = "今天就忘掉一切，盡情享受吧！"
10035150-133 = "這樣真的沒問題嗎？"
10035150-134 = "哎～還能出什麼問題咧！"
10035150-136 = "除非水上樂園突然出現鱷魚之類的！"

[translation]
61100-1 = "ตอนที่ 10;บาดแผลและร่องรอย"
61100-2 = "ขอปรึกษาเรื่องของวันนี้หน่อยได้มั้ย?"
61100-3 = "[s1] \"อื้อ ได้สิ ดื่มอะไรกันก่อนมั้ย?\"\n[s2] \"อื้อ ได้สิ ดื่มชานมกับชาข้าวบาร์เลย์นี้ก่อนมั้ย?\""
61100-6 = "อะ... อื้อ..."
61100-8 = "(คุณครูกับซาโอรินั่งข้างๆ กันแล้วดื่มเครื่องดื่มอยู่ครู่หนึ่ง)"
61100-9 = "(ซาโอริดูวิตกกังวลเล็กน้อย...)"
61100-11 = "[ns] \"จะว่าไป วันนี้สอนได้ดีมากเลยนะ\""
61100-12 = "งะ... งั้นเหรอ?"
61100-13 = "แม้แต่ครูเองก็ทำได้ไม่ดีขนาดนี้ในคาบแรกงั้นเหรอ?"
61100-14 = "ถ้าจะชมกันขนาดนี้ ฉันก็ทำตัวไม่ถูกนะ..."
61100-15 = "พูดจริง... งั้นเหรอ? แล้วก็อยากบอกว่าครูมองคนไม่ผิดจริงๆ ด้วย?"
61100-16 = "อะ... อืม..."
61100-17 = "ที่ฉันทำได้คงเป็นเพราะเมื่อก่อนฉันเคยลองเป็นผู้ฝึกสอนมาน่ะ..."
61100-18 = "แล้วก็... ถึงจะเป็นเรื่องใหม่อยู่บ้าง แต่ฉันก็คิดว่าตัวเองต้องเรียนหนังสือให้เยอะๆ เข้าไว้ก่อน"
61100-19 = "หืม? เดิมทีแล้วถ้าเราจะสอนใคร เราย่อมต้องเรียนรู้ให้มากกว่างั้นเหรอ?"
61100-20 = "นั่นก็เพราะในกระบวนการสอน ก็เป็นการจัดระเบียบองค์ความรู้ของตัวเองไปด้วย?"
61100-21 = "ฮุฮุ นั่นสินะ ฉันก็รู้สึกแบบนั้นเหมือนกัน รู้สึกว่าสิ่งที่ผสมปนเปกันเหมือนหมอกมันเป็นรูปเป็นร่าง#nชัดเจนขึ้นมาน่ะ"
61100-22 = "ยังมีอีกอย่างด้วยงั้นเหรอ?"
61100-23 = "[s] \"อื้อ ครูเองก็ได้เรียนรู้จากพวกเราทุกคนเยอะเลย\""
61100-24 = "เรื่องนั้น... ฉันไม่ค่อยแน่ใจแฮะ?"
61100-25 = "การได้สอนคนที่ยังอ่อนประสบการณ์ก็คืออาชีพครูไม่ใช่เหรอ?"
61100-26 = "[s] \"สุดท้ายแล้วครูก็คนอ่อนประสบการณ์คนหนึ่งนั่นละ\""
61100-30 = "[ns3] \"ครูเลยได้เรียนรู้สิ่งที่ครูพลาดไปจากนักเรียนไง\"\n[ns4] \"ครูเลยได้เรียนรู้สิ่งที่ครูพลาดไปจากพวกเราทุกคนน่ะ\""
61100-33 = "งั้น... เหรอ?"
61100-34 = "ถ้างั้นสิ่งนั้นคงเป็นสิ่งที่ฉันในตอนนี้ยังไม่รู้สินะ"
61100-35 = "จะได้รู้เองเมื่อถึงเวลางั้นเหรอ?"
61100-36 = "ฮุฮุ รู้สึกว่าครูที่มาอยู่อาเรียสในตอนนี้ดูจะเป็น..."
61100-37 = "'คนแก่' ยังไงก็ไม่รู้นะ"
61100-38 = "[s] \"แค่ก! แค่ก! อึกกก...!\""
61100-39 = "ปะ... เป็นอะไรไปเหรอ ครู?! หรือว่าจู่ๆ ก็รู้สึกไม่สบายขึ้นมา?"
61100-40 = "เอะ... เอ๋? ปฏิกิริยาเมื่อกี้คือเสียงกรีดร้องจากหัวใจที่เปล่งออกมาอัตโนมัติตอนเผชิญกับข้อเท็จจริง#nที่ไม่อาจหลีกเลี่ยงได้งั้นเหรอ...?"
61100-41 = "ขะ... ขอโทษนะ นี่เป็นครั้งแรกที่ฉันพูดคำนั้นดูน่ะ..."
61100-42 = "แล้วฉันก็เผลอพูดออกไปโดยไม่รู้ตัวเลยด้วย..."
61100-43 = "[s5] \"แต่ที่พูดมาก็ไม่ผิดหรอก... อืม...\"\n[s6] \"ในคิโวทอส ถ้าครูไม่ใช่คนแก่... แล้วใครจะเป็นคนแก่ล่ะ...\""
61100-46 = "ฉะ... ฉันขอโทษจริงๆ นะ! ต่อให้ครูจะบอกว่าไม่เป็นไร แต่ฉันก็...!"
61100-47 = "ฉัน..."
61100-48 = "......"
61100-50 = "(เสียงของซาโอริเบาลงอีกครั้ง)"
61100-51 = "(มีเสียงกลืนเครื่องดื่ม 2-3 อึก)"
61100-52 = "ครู"
61100-53 = "ฉันขอโทษในอีกนัยหนึ่งด้วยนะ"
61100-54 = "ฮุฮุ... ฉันเอาแต่พูดคำขอโทษที่เข้าใจยากสินะ"
61100-55 = "แบบนี้ฉันคงได้แต่ขอโทษจนหมดวัน เหมือนที่เคยพูดไว้บนเรือสำราญพอดี"
61100-56 = "ฮู่ว..."
61100-57 = "ครู จากนี้ไปฉันอาจจะ... ขอร้องครูในสิ่งที่เสียมารยาทมากๆ ก็ได้"
61100-58 = "แต่ฉันไม่มีความหมายอื่นซ่อนอยู่นะ นั่นก็เพราะ..."
61100-59 = "ตอนนี้ฉันตัดสินใจที่จะเผชิญหน้ากับสิ่งที่ฉันได้ทำลงไปแล้ว..."
61100-60 = "พอมาถึงที่นี่ ฉันถึงได้..."
61100-61 = "ตระหนักได้ว่าฉันไม่เคย 'ขอโทษ' ครูจริงๆ จังๆ เลย"
61100-62 = "[s7] \"แต่ตอนนั้นก็เหมือนจะเอ่ยขอโทษไปแล้วนี่...\"\n[s8] \"ตอนนั้นครูเปลี่ยนเรื่องคุยเพราะเห็นซาโอริจะขอโทษเหมือนกัน...\""
61100-65 = "ตอนนั้นเหรอ...?"
61100-67 = "ก็... พอมาที่นี่"
61100-68 = "ฉันก็คิดถึงเรื่องในอดีต... ในหลายๆ แง่น่ะ"
61100-69 = "......"
61100-70 = "จริงสิ ครู?"
61100-71 = "......"
61100-72 = "ฉันยังไม่ได้ขอโทษครูอย่างเป็นทางการเลย..."
61100-73 = "[log]\"จริงสิ! เรื่องเด็กๆ ที่ย้ายมาเรียนที่ทรีนิตี้น่ะ!\"[/log]"
61100-77 = "งั้นเหรอ... ฉันก็ว่าอยู่ว่าครูพูดตัดบทเสียเป็นธรรมชาติเลย"
61100-78 = "แต่ว่า..."
61100-79 = "ครู ถึงมันจะดูน่าไม่อาย... แต่ตอนนี้ฉันอยากให้ครูยอมรับความดื้อรั้นของฉันหน่อย"
61100-80 = "ฉันคิดว่านี่คือ 'อดีต' ของฉันที่ต้องก้าวข้ามไปให้ได้ ไม่รู้ทำไมเหมือนกัน แต่ตอนนี้ฉันคิดแบบนั้นน่ะ "
61100-81 = "ถ้าฉันไม่เผชิญกับเรื่องนั้นในอาเรียสแห่งนี้... ฉันก็คงไม่มีหน้าไปเจอเด็กๆ อาเรียส"
61100-82 = "แล้วฉันก็เหมือนจะเสียความมั่นใจที่จะไปต่อด้วย"
61100-83 = "[s] \"เข้าใจแล้วละ ทำตามที่ต้องการได้เลย\""
61100-84 = "อืม"
61100-85 = "ถ้างั้น"
61100-89 = "ฉันขอดู... หน้าท้องของครูได้มั้ย?"
61100-90 = "[s9] \"?!?!?!?!\"\n[s10] \"คุณซาโอริ!!??!!??\""
61100-93 = "มะ... ไม่ใช่อย่างนั้นนะ! คิดไว้แล้วเชียวว่าครูจะมีปฏิกิริยาแบบนั้น!"
61100-94 = "ฉันก็เลยพูดดักไว้ก่อนแล้ว... แต่ถึงจะพูดไว้ก่อนแล้วก็เถอะ แต่ก็..."
61100-95 = "......"
61100-96 = "ฉัน..."
61100-97 = "อยากเห็นรอยแผลที่ฉันทำไว้กับครู... ด้วยตาของตัวเองน่ะ"
61100-98 = "[ns] \"......!\""
61100-100 = "(คุณครูเพิ่งจะเข้าใจว่าซาโอริหมายถึงอะไร)"
61100-101 = "(จึงเปิดรอยแผลที่หน้าท้องให้ดูตามที่ซาโอริขอ...)"
61100-103 = "อ่า..."
61100-104 = "นี่คือ..."

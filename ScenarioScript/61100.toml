61100-193 = "ครู...?"
61100-194 = "[ns] \"อื้อ เท่านี้ก็พอแล้ว\""
61100-196 = "[ns] \"ถ้าคนทั้งโลกบอกว่าซาโอริเป็นคนผิดขึ้นมาละก็\""
61100-197 = "หืม? หมายความว่าฉันยังมีความผิดติดตัวสินะ?"

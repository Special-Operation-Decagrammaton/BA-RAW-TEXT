61100-404 = "ขอโทษที่... ฉันมาดูแลทุกคนบ่อยๆ ไม่ได้นะคะ"
61100-405 = "มะ... มะมะมะมะ... ไม่เลยค่ะ! พวกฉันต้อง... ขอบคุณรุ่นพี่ต่างหาก..."
61100-406 = "ยังไงก็ขอบคุณนะคะที่กินข้าวกันอย่างเอร็ดอร่อยและใช้ชีวิตกันอย่างเพลิดเพลิน ทุกครั้งที่ฉันเห็นทุกคนเป็นแบบนั้น ฉันก็รู้สึกมีแรงค่ะ"
61100-407 = "ที่บอกว่าทุกคนมีความสุขได้เท่าเทียมกัน... คงเป็นคำพูดราวกับฝันเลยใช่มั้ยคะ?"
61100-408 = "พวกเราชาวอาเรียสก็รู้เรื่องนี้ดีกว่าใครเลยละ"
61100-409 = "และฉันคิดว่าที่ไหนสักแห่งในโลกนี้ ควรมีที่สำหรับเด็กแบบนั้น"
61100-410 = "ที่นี่คือสถานที่แบบนั้น และฉันก็อยากสร้างสถานที่แบบนั้นค่ะ"
61100-411 = "เด็กๆ ที่ถูกทอดทิ้ง เด็กๆ ที่ถูกลืม เด็กๆ ที่มองไม่เห็นประโยชน์ของตัวเอง..."
61100-412 = "เด็กๆ พวกนั้นมาที่นี่ได้ค่ะ ถึงจะลำบากสักหน่อยถ้าทุกคนแห่กันมาที่นี่ก็เถอะ ก็ที่นี่ออกจะคับแคบด้วยนี่คะ"
61100-413 = "ดูไม่ต่างจากรังนกเล็กๆ เลยด้วยซ้ำ..."
61100-414 = "แต่ถึงยังไง ฉันก็อยากปกป้องรังแห่งนี้ไว้"
61100-415 = "เพื่อให้นกน้อยที่มาเติบโตอยู่ที่นี่"
61100-416 = "ได้รู้สึกว่าตัวเองโชคดีที่ยังมีชีวิตอยู่ค่ะ"
61100-417 = "รุ่นพี่..."
61100-418 = "จำตอนที่ 'มาดาม' ยังอยู่ได้มั้ยคะ?"
61100-419 = "อึก"
61100-420 = "ฮ่าฮ่าฮ่า! ใช่ค่ะ มันแย่จริงๆ เลยใช่มั้ยคะ? แค่คิดก็สั่นสะท้านไปทั้งตัวแล้ว!"
61100-421 = "มีบางอย่างที่มาดามทำไม่ได้ค่ะ..."
61100-422 = "แล้วก็มีบางอย่างที่มาดามไม่ตั้งใจจะทำด้วย"
61100-423 = "ถ้าฉันทำสิ่งเหล่านั้นได้ ฉันว่ามันก็น่าจะไม่เลวเลยละ"
61100-424 = "แต่ตอนนี้... แค่เท่านี้ก็น่าจะเพียงพอแล้วค่ะ"
61100-425 = "......"
61100-426 = "รุ่นพี่"
61100-427 = "คะ?"
61100-428 = "เป่าฮาร์โมนิกาให้ฟังหน่อยสิคะ!"
61100-429 = "อะ... เอาอีกแล้วเหรอ? ในเวลาอย่างนี้เนี่ยนะคะ?! ฉันเพิ่งเล่นให้ฟังไปเมื่อไม่นานมานี้เอง..."
61100-430 = "ฉันอยากฟังอีกค่ะ ทุกคนจะต้องชอบแน่นอนค่ะ!"
61100-431 = "จริงๆ เลยนะ บางครั้งฉันไม่รู้เลยค่ะว่าทำไมทุกคนถึงเป็นแบบนี้กัน..."
61100-432 = "อะ... อะแฮ่ม... ถ้างั้นก็..."
61100-433 = "แหะๆ..."
61100-451 = "เสียงฮาร์โมนิกานั่น... สุบารุงั้นเหรอ"
61100-452 = "......"
61100-453 = "ยัยนั่นก็ไม่เปลี่ยนไปเลยจริงๆ สินะ"
61100-454 = "หืม...?"
61100-458 = "อะ... อะไรกัน? ใครน่ะ?"
61100-463 = "อึกก?!?!"
61100-467 = "(จู่ๆ ก็รู้สึกเหมือนเข้าไปในหมอกหนาทึบที่ทำให้หายใจไม่ออก...)"
61100-468 = "(และที่สำคัญกว่านั้น...)"
61100-470 = "นั่นมัน... เสียงแตร...?"
61100-472 = "ตอนต่อไป;ทัศนศึกษา 1"

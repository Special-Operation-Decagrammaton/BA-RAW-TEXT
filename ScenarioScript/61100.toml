[translation]
61100-1 = "Episode 10;Scars and What Remain"
61100-2 = "I'd like to talk about some things with you...please."
61100-3 = "[s1] \"Of course. Do you want something to drink?\"\n[s2] \"I only have bottled milk tea or barley tea, though.\""
61100-6 = "Yes, please... Either is fine."
61100-8 = "We sat in silence for a while, sipping from our bottles as we unwound from the day."
61100-9 = "Saori was tense, and I could tell she had a lot on her mind."
61100-11 = "[ns] \"By the way, your class today was amazing.\""
61100-12 = "R-Really?"
61100-13 = "...Even you don't think you could've done as well?"
61100-14 = "Too much flattery is a little embarrassing, Sensei."
61100-15 = "...You meant it? You knew you were right to ask us?"
61100-16 = "Oh. Um..."
61100-17 = "I used to teach all of them in the past. As a drill instructor."
61100-18 = "But this experience...it's motivating me to study harder."
61100-19 = "Hm? Teaching is its own form of learning?"
61100-20 = "I suppose you would have to understand a subject thoroughly to teach it to someone else."
61100-21 = "Fufu. I agree with that. Like the fog lifted as I began to explain things."
61100-22 = "And... Hm? There's something else?"
61100-23 = "[s] \"I learn more and more from each of you, all the time.\""
61100-24 = "How...can we teach you anything?"
61100-25 = "A teacher's job is to guide those with less experience, is it not?"
61100-26 = "[s] \"Despite what you'd think, I'm still pretty inexperienced myself.\""
61100-30 = "[ns3] \"And there's a lot you lose as you age.\"\n[ns4] \"I get to learn them all over again from my students.\""
61100-33 = "I...see..."
61100-34 = "That's hard for me to understand."
61100-35 = "...But I will one day?"
61100-36 = "At times, Sensei..."
61100-37 = "You speak a bit like...a geezer."
61100-38 = "[s] \"Gah! Augh! *cough* *cough*\""
61100-39 = "Are you okay, Sensei?! Did you choke? Are you sick?"
61100-40 = "N-No? That was the despair of someone forced to face undeniable truths?"
61100-41 = "Sh-Should I not have used that word? It was my first time..."
61100-42 = "I overheard someone say it once, so I wanted to try."
61100-43 = "[s5] \"No, no. There was nothing wrong with what you said.\"\n[s6] \"Who in Kivotos is a 'geezer,' if not 'Schale's Sensei'?\""
61100-46 = "I...truly am sorry! Even if you forgive me, I..."
61100-47 = "I..."
61100-48 = "..."
61100-50 = "Saori's face fell as she slowly trailed off."
61100-51 = "I waited patiently for her to find the words as she sipped at her drink a few more times."
61100-52 = "Sensei."
61100-53 = "I'm sorry. Again. For something else."
61100-54 = "...Fufu. All these apologies may be ineffective in communicating my intentions."
61100-55 = "We might have a repeat of the cruise, at this rate. A never-ending carousel of apologies that leads us nowhere."
61100-56 = "*sigh*"
61100-57 = "I apologize if what I'm about to ask is rude, Sensei."
61100-58 = "I hope I don't come across as rude."
61100-59 = "This is simply the result of my resolve to face my crimes."
61100-60 = "Being back here made me realize something."
61100-61 = "I never apologized to you. Not even once."
61100-62 = "[s7] \"I really mean it when I say it's okay, Saori.\"\n[s8] \"I knew that's what you wanted to say earlier, so I changed the subject.\""
61100-65 = "Back then...?"
61100-67 = "It's just... being back here..."
61100-68 = "...brings back a lot of memories, in more ways than one."
61100-69 = "..."
61100-70 = "S-sensei?"
61100-71 = "..."
61100-72 = "I still haven't properly apologized to you, Sensei..."
61100-73 = "[log]Ah! I almost forgot! About the transfer students![/log]"
61100-77 = "Oh... That did feel abrupt at the time. I didn't realize that was why, though."
61100-78 = "However..."
61100-79 = "Could you indulge me for a little bit, Sensei? I realize I'm being selfish."
61100-80 = "Lately, I've felt stuck in that moment. As if the past is binding me to it, demanding I find the courage to face it. "
61100-81 = "If I can't do that while I'm here, where everything began... I don't know if I'll ever be able to return to those kids."
61100-82 = "I'll be stuck, wading through this sludge of regret and guilt."
61100-83 = "[s] \"Got it. Let's do it together, then.\""
61100-84 = "Hm..."
61100-85 = "Then..."
61100-89 = "Could you show me your stomach, Sensei?"
61100-90 = "[s9] \"?!?!?!?!\"\n[s10] \"Saori?!?!\""
61100-93 = "I realize how it sounds! But that's not what I mean at all!"
61100-94 = "I did try to give some context this time..."
61100-95 = "..."
61100-96 = "I..."
61100-97 = "I want... I need to see it with my own eyes, Sensei. Your scar. The traces left on you, Sensei."
61100-98 = "[ns] \"...!\""
61100-100 = "Everything Saori had been saying finally clicked into place for me."
61100-101 = "So, whether it was for the best or not, I did as she asked and pulled up my shirt."
61100-103 = "Ah..."
61100-104 = "That's..."
61100-105 = "..."
61100-108 = "Saori reached out, her fingertips tracing gently along the raised ridges of my scar."
61100-109 = "The tremors in her hand were so intense, I could feel them on my skin without even looking."
61100-111 = "I'm...sorry..."
61100-112 = "Sensei, I'm..."
61100-113 = "...sorry..."
61100-114 = "I'm sorry. I'm just so..."
61100-115 = "I'm sorry. Sorry. I'm so sorry."
61100-116 = "I'm... Wh-What do I do? How do I make this better? How do I fix this?"
61100-117 = "Sensei..."
61100-118 = "Our Sensei..."
61100-119 = "How could...someone like me...?"
61100-120 = "How could I...?"
61100-121 = "Ugh..."
61100-122 = "Hng..."
61100-123 = "*sob* I'm... *sob* Augh...!"
61100-125 = "Saori crumpled onto the ground, as if she was collapsing from the weight of her guilt."
61100-126 = "Slowly, gently, I placed my hands on her shoulders."
61100-128 = "[ns] \"Hey. It's okay.\""
61100-129 = "Sen...sei?"
61100-130 = "[s11] \"You saw it for yourself. I've healed. I'm okay.\"\n[s12] \"It doesn't hurt. I promise. It doesn't hurt at all.\""
61100-133 = "I-It doesn't matter!"
61100-134 = "I scarred you! It's still there! It'll be there forever!"
61100-135 = "I know that! That much, I've learned, Sensei!"
61100-136 = "These are the consequences of my actions! No matter what I do, the things I have done have left wounds that will never, ever truly heal!"
61100-137 = "The scars of my very existence scattered into thorns that hurt everything and everyone around me! I will never be able to erase those traces! Yesterday, now, and forevermore!"
61100-138 = "If this is how things are, I'd rather..."
61100-139 = "I'd rather...have..."
61100-140 = "[s13] \"Don't ever say something like that.\"\n[s14] \"I can't bear to hear something so sad from my own student.\""
61100-143 = "Sensei...?"
61100-144 = "[s15] \"I can't lie to you, Saori.\"\n[s16] \"There are wounds that will never heal.\""
61100-147 = "Ugh...!"
61100-148 = "[s17] \"The thing about humans is that, even with those scars...\"\n[s18] \"..we're remarkably strong. We bear them, and we live on. Together.\""
61100-151 = "...We bear them? Together?"
61100-152 = "..."
61100-153 = "That's how...people are meant to live...?"
61100-154 = "But..."
61100-155 = "I still don't know. I really don't know..."
61100-156 = "The only thing I've learned...is that I know nothing at all."
61100-157 = "I truly believed that if I could face what I've done, I could finally move forward from it."
61100-158 = "I deluded myself into thinking that, if I could look at it with my own eyes, I could forgive myself."
61100-159 = "But all of that..."
61100-160 = "This was all just arrogance on my part, wasn't it?"
61100-161 = "[s] \"Hey, Saori.\""
61100-162 = "...Yes?"
61100-163 = "[s19] \"If you could travel to the past, to the Saori back then...\"\n[s20] \"What would you say to her?\""
61100-173 = "..."
61100-174 = "Fufu."
61100-175 = "How strange."
61100-176 = "I've thought about that, many times over."
61100-177 = "..."
61100-178 = "And every time I did, I was overcome with regret."
61100-179 = "I resented that idiotic brat, who hurt others and committed crimes without a second thought."
61100-180 = "Without considering the consequences of her actions, with little regard for the lives she would destroy."
61100-181 = "I wish I could talk to that brat."
61100-182 = "...After slapping her across the face at least once."
61100-183 = "I would ask her if she understood the gravity of what she intended to do."
61100-184 = "I want to shake her until she comes to her senses, until she sees how dark and desolate the path she's walking down is."
61100-185 = "..."
61100-186 = "But that's impossible now."
61100-187 = "That brat is gone, and it's just me. Me, trying to understand the very consequences she so selfishly ignored."
61100-188 = "Since I can't do that, I have no other option but to keep moving forward on the path she set us upon. To try to right it, somehow."
61100-189 = "That's all there is to it."
61100-190 = "..."
61100-191 = "Yes. That's all there is to it."
61100-192 = "[s] \"And that's more than enough, Saori.\""
61100-193 = "Sensei...?"
61100-194 = "[ns] \"Do you hear me, Saori? That's enough.\""
61100-196 = "[ns] \"Even if the whole world points their finger at you—\""
61100-197 = "So you do think I'm guilty...?"
61100-198 = "[s21] \"Let me finish talking!\"\n[s22] \"That's not what I'm trying to say at all!\""
61100-201 = "...If I can make the better choice next time..."
61100-202 = "...and if I've grown enough to stop and think before I act next time, that's enough for you?"
61100-203 = "If I can promise you that, you'll be there..."
61100-204 = "...as many times as it takes?"
61100-205 = "U-Ugh..."
61100-209 = "Saori sobbed and cried out all her feelings, all her guilt."
61100-210 = "I rubbed her back, comforting her until the sobs turned into quiet sniffles and hiccups."
61100-212 = "You know, something is different. Here at Arius."
61100-213 = "[s] \"Hm? What's different?\""
61100-214 = "Um."
61100-215 = "That first class helped to ease the tensions."
61100-216 = "And we were able to talk to each other."
61100-217 = "Their quality of life has improved."
61100-218 = "Water Time is a more peaceful teatime now, and they've been receiving three proper meals a day."
61100-219 = "Of course, the entire district is still run down, but..."
61100-220 = "Money and supplies have started circulating, even if only slightly."
61100-221 = "Although I still don't understand where it's all coming from."
61100-222 = "Regardless, something has shifted in Arius."
61100-223 = "...I suppose it's not surprising, though."
61100-224 = "Nothing in this world stays exactly the same forever."
61100-225 = "[s] \"Does the change make you uneasy?\""
61100-226 = "I don't have a name for this feeling yet."
61100-227 = "All I can say is that it's good to see that their lives have improved, no matter how slightly."
61100-228 = "..."
61100-229 = "Sensei."
61100-230 = "Do you think...there's any hope for us too?"
61100-231 = "[s23] \"We can start building from here.\"\n[s24] \"When you're laying bricks one by one, it feels endless.\"\n[s25] \"But all that little effort comes together to create an entire structure.\""
61100-235 = "...I see."
61100-236 = "I'm grateful we met you, Sensei."
61100-237 = "To have had you by our side until now... We're truly lucky."
61100-238 = "Without you, I..."
61100-239 = "Actually, all of us probably would have..."
61100-243 = "Sensei, I'm only postulating, but I have a question."
61100-244 = "..."
61100-245 = "Could I...sleep here with you tonight?"
61100-246 = "[s] \"?!?!\""
61100-247 = "Don't look THAT shocked, Sensei. I was making a joke."
61100-248 = "[s] \"When someone who never jokes makes one out of nowhere, it's a little shocking...\""
61100-249 = "I see. I'll keep that in mind for the future."
61100-250 = "[s] \"I completely embarrassed myself, didn't I?\""
61100-251 = "Fufu. Who's to say?"
61100-252 = "Well, I don't have the most comfortable room to get back to."
61100-253 = "But I should still return to it. Good night, Sensei."
61100-254 = "[s] \"Sleep well, Saori.\""
61100-258 = "Saori closed the door, paused, and rested against it for just a moment."
61100-259 = "I said I was only making a joke."
61100-260 = "A part of me may have meant it, though."
61100-261 = "Fufu."
61100-262 = "Sleep well, Sensei."
61100-267 = "U-Um, Subaru? Are you sleeping...?"
61100-271 = "Oh, Maia. No, I'm not. Why don't you come in?"
61100-272 = "It's okay! Um, I was just checking in..."
61100-273 = "Oho? Did you think I would be in here nursing my pride, sulking over my loss against the Squad and Sensei?"
61100-274 = "N-N-N-N-No way! That's not why at all! I absolutely, definitely wasn't thinking that, Subaru!"
61100-275 = "Don't worry... I understand why you'd think that..."
61100-276 = "I SAID that's not it!"
61100-277 = "Ahahaha. I'm sorry, Maia. I'm just teasing. There's nothing to worry about, okay?"
61100-278 = "R-Really...?"
61100-279 = "Really. Maybe now isn't the time to talk about this, but..."
61100-281 = "Arius' hatred won't be satiated so easily."
61100-282 = "Ah...!!"
61100-283 = "By the way, did you have fun today?"
61100-284 = "In class? Um... Well..."
61100-285 = "D-Did you, Subaru?"
61100-286 = "Hey, we've talked about this. We'll never get anywhere if you always answer questions with questions."
61100-287 = "I-I'm sorry, Subaru!"
61100-288 = "It's hard for me to say..."
61100-289 = "I've never experienced anything like that before. There was too much going on."
61100-290 = "But..."
61100-291 = "It was also really incredible, in its own way."
61100-299 = "Like, \"Wow! So that's how things work out there.\""
61100-302 = "And it made me realize...just how separate our two worlds were."
61100-308 = "Actually, that's not exactly right."
61100-309 = "They still are. Two entirely different worlds."
61100-310 = "...I can't deny that."
61100-311 = "But a lot has still changed here."
61100-312 = "Most importantly, there's enough food to go around now. So we've taken steps forward, in our own way."
61100-313 = "Mhm! That's the best part of all this!"
61100-314 = "I-I did...have a question about that..."
61100-315 = "All this food, the snacks and meals... Don't they cost money?"
61100-316 = "So how...??"
61100-317 = "..."
61100-319 = "Do you really want to know, Maia?"
61100-320 = "Huh? Y-Yes..."
61100-321 = "Once you know this, there's no going back. There are some things that we are better off not knowing. That will warp your understanding of the world."
61100-322 = "A-Are you serious?!"
61100-323 = "No, no. Kidding, I'm kidding. Forgive me?"
61100-324 = "Subaru..."
61100-325 = "It is true, though. New knowledge shapes your perspective."
61100-326 = "It molds the way you view certain circumstances. And you won't be able to unlearn it."
61100-327 = "...Like with Sensei's lessons today."
61100-328 = "Subaru...?"
61100-329 = "In this world, you can't change or do anything without money."
61100-330 = "Everyone wants the next best thing, but there's a finite number of resources in the world."
61100-336 = "Scarcity causes competition, and competition causes conflict."
61100-342 = "Along the way, someone gets left behind. But society doesn't stop for anyone, until one day everyone forgets they even existed. Just like that."
61100-343 = "...Just like us."
61100-344 = "Have you heard? In Kivotos, our particular set of skills is in very high demand."
61100-345 = "It's a line of work where Arius students alone hold a very unique advantage."
61100-346 = "In other words, Arius has a monopoly on the market."
61100-347 = "A \"line of work\"? A \"monopoly?\"? Our \"unique advantage\"...?"
61100-351 = "S-Subaru?!?"
61100-354 = "Good, you're back. I assume the job is done?"
61100-358 = "Hm? What's this?"
61100-359 = "P-Please spare me! I'll do anything if you let me live! Just don't kill me, please!"
61100-360 = "Um...?!"
61100-361 = "..."
61100-362 = "Explain yourself, Subaru. I told you to \"take care of him.\""
61100-363 = "Consider him a present. From now on, he lives to serve you."
61100-364 = "If you're not happy with it, I'll make him eat lead right here."
61100-365 = "AUGH! No! Please! Anything but that!"
61100-366 = "...He certainly looks the part. But taking him out will be cleaner."
61100-367 = "You get none of his assets if I kill him here. Keep him, and everything he owns is yours, down to his socks."
61100-368 = "You can have anything you want! Just don't kill me! I can be useful!"
61100-369 = "Hm... How can you ensure my safety? He could turn on me at any moment."
61100-370 = "Tell him you have Arius on speed dial. That'll keep him in check."
61100-371 = "Eeek!!"
61100-372 = "It's tempting, but...you're nothing but a mercenary. You'll stab me from behind as soon as I turn my back on you."
61100-373 = "I'm no common criminal looking for their next buck. Without their reputation, a mercenary is nothing."
61100-374 = "We're wildcards in a business that doesn't like surprises, so mercenaries have to be reliable to survive."
61100-375 = "..."
61100-376 = "Fine. I'll trust you on this. Good work."
61100-377 = "Bahahaha! The market's as good as ours!"
61100-378 = "(...Most people barely know what Arius is, and those who do dismiss it as the dirty slums.)"
61100-379 = "(Do they not realize just how filthy the outside world they live in is?)"
61100-381 = "D-Does that mean..."
61100-382 = "...you've...killed someone before...?"
61100-383 = "Not yet."
61100-384 = "Wh-What a relief! That's good to hear!"
61100-385 = "But you can get paid for...doing that?"
61100-386 = "I don't actually do the deed. Just...close enough. It usually works out in the end."
61100-387 = "It's common to say that people don't change."
61100-388 = "I've learned that's not true."
61100-389 = "When people are face-to-face with death...they change. It's like instinct. It's always a gamble, who they'll become in that last moment."
61100-390 = "Maybe we've changed too. Who in this world lives closer to death than we do?"
61100-392 = "Because we're Arius."
61100-394 = "This might be just me, but money...is just money."
61100-395 = "There's no such thing as \"clean\" or \"dirty\" money. One yen is always just one yen. If I had the luxury to think about things like that like that, I'd consider myself blessed."
61100-396 = "The longer I do this kind of work, the more I can feel it wear away at my soul."
61100-397 = "When you attack something that looks human, it gets inside your head. Maybe humans evolved that way to protect ourselves from each other."
61100-398 = "Hm? What do I do when I feel that way?"
61100-399 = "..."
61100-401 = "I think about each of you, of course."
61100-402 = "You're my reason to keep pushing forward."
61100-404 = "...I've been away more lately, haven't I? I'm sorry."
61100-405 = "N-N-No! Not at all! Please don't apologize! Of all people, you shouldn't be the one apologizing! You're working so hard for us, Subaru..."
61100-406 = "And I'm happy to do it. You can make it up to me by eating lots and enjoying your youth. That's what keeps me going."
61100-407 = "Not everyone can be happy. That's the thinking of dreamers and innocents."
61100-408 = "Nobody knows that better than we do."
61100-409 = "That's why the kids at Arius need somewhere to go. A place they can call home."
61100-410 = "I'm going to build that home for them. Here."
61100-411 = "The kids that were thrown away, the ones who weren't \"useful\" to society... They can come here."
61100-412 = "It might be a little cramped for everyone to come all at once, though!"
61100-413 = "...It's like a little bird's nest, huh?"
61100-414 = "Be that as it may, it's this nest I want to protect."
61100-415 = "Then all those baby birds can live here with a sense of safety."
61100-416 = "And maybe, step by step, they'll be able to learn how it feels to live."
61100-417 = "Subaru..."
61100-418 = "Remember Madame?"
61100-419 = "Ugh."
61100-420 = "Hahaha! Seriously. Ugh! Just the thought of that time makes my skin crawl."
61100-421 = "...There are things out there that Madame has never done."
61100-422 = "Things she never even thought to try."
61100-423 = "If I lived out my life experiencing all those things, I'd be satisfied."
61100-424 = "For the time being... That's enough."
61100-425 = "..."
61100-426 = "Subaru."
61100-427 = "Yeah?"
61100-428 = "Play me a song!"
61100-429 = "D-Do you know what time it is? I already played today..."
61100-430 = "Just one more time! Please? I'm sure everyone else will hear it and love it too!"
61100-431 = "Geez... I don't know how you all turned out like this."
61100-432 = "All right, all right. Fine."
61100-433 = "Heehee..."
61100-451 = "Is that a harmonica? Subaru..."
61100-452 = "..."
61100-453 = "That one hasn't changed at all."
61100-454 = "Hm...?"
61100-458 = "Wh-What is this? Who's there?!"
61100-463 = "Ugh!"
61100-467 = "(I feel like I'm drifting...into a suffocating fog...)"
61100-468 = "(But what...?)"
61100-470 = "Is that...a trumpet?"
61100-472 = "Next Episode;Field Trip 1"

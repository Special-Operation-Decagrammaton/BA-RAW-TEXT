61100-184 = "แล้วบอกว่าถ้าตั้งสติไม่ได้ เธอก็จะ... ต้องเดินไปตามเส้นทางที่ไม่อาจย้อนกลับได้"
61100-185 = "......"
61100-186 = "แต่ฉันทำแบบนั้นไม่ได้หรอก"
61100-187 = "เด็กโง่คนนั้นหายไปแล้ว สิ่งที่เหลืออยู่มีแค่ฉันในตอนนี้และตรงนี้"
61100-188 = "ฉันก็เลยไม่มีทางเลือกอื่นนอกจากแบกรับความจริงนั้นแล้วใช้ชีวิตต่อ"
61100-189 = "นั่นคือทั้งหมดที่ฉันทำได้"
61100-190 = "......"
61100-191 = "อื้อ นั่นคือทั้งหมดที่ฉันทำได้"

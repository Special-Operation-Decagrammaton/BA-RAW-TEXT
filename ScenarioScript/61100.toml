61100-154 = "แต่ว่า..."
61100-155 = "ฉันไม่รู้เลย..."
61100-156 = "ฉันไม่รู้อะไรสักอย่างเลย... จริงๆ..."
61100-157 = "ฉันนึกว่าถ้าได้เผชิญหน้ากับสิ่งที่เกิดขึ้นมาจากตัวเอง ฉันจะผ่านมันไปได้บ้างเสียอีก..."
61100-158 = "ฉันคิดว่าถ้าฉันกล้าที่จะสบสายตาต่อสิ่งนั้น... ฉันคงจะให้อภัยตัวเองได้..."
61100-159 = "แต่ว่ามัน..."
61100-160 = "เป็นเหมือนแค่ความอวดดีของฉันเลย..."
61100-161 = "[s] \"ซาโอริ\""
61100-162 = "หืม...?"
61100-163 = "[s19] \"ถ้าย้อนกลับไปตอนนั้นได้ จะบอกตัวเองว่ายังไงเหรอ?\"\n[s20] \"ถ้าย้อนกลับไปตอนนั้นได้ อยากบอกอะไรซาโอริคนนั้นเหรอ?\""
61100-173 = "......"
61100-174 = "ฮุฮุ"
61100-175 = "น่าทึ่งจังเลยนะ"
61100-176 = "ฉันก็เคยมีความคิดคล้ายๆ กันนี้อยู่หลายสิบครั้งเลยละ"
61100-177 = "......"
61100-178 = "ไม่มีวันไหนเลยที่ฉันไม่เสียใจ"
61100-179 = "เด็กที่โง่เขลาและยังไม่โตคนหนึ่งทำความผิดที่น่าอับอายไว้"
61100-180 = "ถ้าเป็นไปได้ ฉันอยากบอกเด็กคนนั้นเหลือเกินว่าการกระทำของเธอจะส่งผลกระทบอะไรบ้าง"
61100-181 = "และสิ่งนั้นจะทำลายอนาคตของผู้คนมากมายแค่ไหน"

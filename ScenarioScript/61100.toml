61100-201 = "ถ้าฉันกลายเป็นคนที่ตัดสินใจได้ดีขึ้นในสถานการณ์เดียวกัน..."
61100-202 = "และถ้าฉันมีจิตใจยั้งคิดได้อีกครั้งก่อนจะลงมือทำอะไรลงไป เท่านั้นครูก็พอใจแล้วงั้นเหรอ...?"
61100-203 = "ถ้าฉันสัญญาว่าจะทำแบบนั้น ครูก็จะ..."
61100-204 = "ไม่ว่าจะกี่ครั้ง ครูก็จะ..."
61100-205 = "อะ... อึก..."

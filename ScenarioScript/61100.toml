61100-112 = "ขอโทษ..."
61100-113 = "ฉันขอโทษ..."
61100-114 = "ฉันขอโทษจริงๆ..."
61100-115 = "ขอโทษนะ ขอโทษ ฉันขอโทษ"
61100-116 = "จริงๆ เลย... ฉันควรทำยังไงดี..."
61100-117 = "คุณครู..."
61100-118 = "คุณ... ครู..."
61100-119 = "คนอย่างฉัน..."
61100-120 = "ทำเรื่องแบบนี้ลงไปได้ยังไง..."
61100-121 = "อึก..."
61100-122 = "ฮือ... ฮึก..."
61100-123 = "ฮือ... ฮือออ... ฮืออออออ...!"
61100-125 = "(ซาโอริฟุบลงไปร้องไห้)"
61100-126 = "(คุณครูวางมือบนไหล่ของซาโอริอย่างอ่อนโยน)"
61100-128 = "[ns] \"ไม่เป็นไรหรอกนะ\""
61100-129 = "ครู...?"
61100-130 = "[s11] \"ไม่เป็นไรแล้ว มันหายดีแล้วละ\"\n[s12] \"ตอนนี้ครูไม่เจ็บแผลแล้ว ไม่รู้สึกอะไรเลยละ\""
61100-133 = "แต่... แต่ว่า...!"
61100-134 = "รอยแผลเป็นมันยังอยู่...!"
61100-135 = "ตอนนี้ฉันรู้แล้ว ฉันรู้ดีเลย!"
61100-136 = "ฉันรู้แล้วว่าทุกการกระทำย่อมทิ้งผลลัพธ์ไว้! แล้วแผลก็ไม่มีวันจางหายไปด้วย!"
61100-137 = "ไม่ว่ายังไงมันก็ทิ้งร่องรอยไว้ให้เห็น และส่งผลกับเราตั้งแต่วินาทีที่เกิดแผลนั้นมาจนถึงตอนนี้เลย...!"
61100-138 = "ฉันไม่ควร..."
61100-139 = "ไม่ควร..."
61100-140 = "[s13] \"ไม่ต้องพูดหรอกว่าไม่ควรทำอะไรลงไปเลย\"\n[s14] \"ครูไม่อยากให้นักเรียนของครูพูดอะไรน่าเศร้าแบบนั้นนะ\""
61100-143 = "ครู...?"
61100-144 = "[s15] \"เรื่องแผลน่ะ ซาโอริพูดถูกแล้วละว่ามันจะไม่หายไป\"\n[s16] \"ไม่ว่าจะเป็นแผลแบบไหน มันก็คงหายไปเลยไม่ได้หรอก\""
61100-147 = "อึก...!"
61100-148 = "[s17] \"แต่คนเราแข็งแกร่งพอที่จะใช้ชีวิตกับแผลเป็นที่ยังมีอยู่ได้นะ\"\n[s18] \"มนุษย์เป็นสิ่งมีชีวิตที่แข็งแกร่งพอที่จะ... ใช้ชีวิตกับมันได้นะ\""
61100-151 = "ใช้ชีวิตกับมันงั้นเหรอ...?"
61100-152 = "......"

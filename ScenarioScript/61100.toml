[translation]
61100-1 = "第10話;傷痕與痕跡"
61100-2 = "包含今天的事情在內，我有點事想跟你商量……可以嗎？ "
61100-3 = "[s1]「嗯，當然可以。要邊喝點東西邊聊嗎？」\n[s2]「不過我也只有寶特瓶奶茶或麥茶而已。」"
61100-6 = "嗯，嗯……"
61100-8 = "（一起並肩坐下，喝著寶特瓶裡的飲料）"
61100-9 = "（沙織看起來有點緊張……）"
61100-11 = "[ns]「話說今天的課程還真厲害呢。」"
61100-12 = "是，是嗎？"
61100-13 = "老師也不是第一次上課就做得那麼好？"
61100-14 = "被你誇成這樣，反而讓我有點困擾……"
61100-15 = "你說是認真的？老師的眼光果然沒錯？"
61100-16 = "唔，唔嗯……"
61100-17 = "可能是因為之前有擔任過教官的經驗，所以才有辦法應付吧……"
61100-18 = "同時我也意識到，自己也必須多加學習。"
61100-19 = "嗯？在教別人的時候，本來就會學到更多？"
61100-20 = "因為在教學的過程中，自己的知識會被整理起來？"
61100-21 = "呵呵，原來如此。我確實也有這種感覺。#n那些原本像霧一樣混雜的東西，好像漸漸轉化成了清晰的形狀。"
61100-22 = "理由還不止這個？"
61100-23 = "[s]「嗯。像我也經常從你們身上學到很多東西。」"
61100-24 = "那個……我不太明白你的意思。"
61100-25 = "教導不成熟的人，不就是老師的職責嗎？"
61100-26 = "[s]「我呢，說白了也不過是個不成熟的人而已。」"
61100-30 = "[ns3]「正因如此，那些隨著年齡增長而失去的東西……」\n[ns4]「我會從依然擁有那些東西的你們身上，重新學回來。」"
61100-33 = "是……嗎？"
61100-34 = "那麼，這或許是現在的我還無法理解的事吧。"
61100-35 = "等時候到了，我也會明白？"
61100-36 = "呵呵。現在來到奧利斯的老師……"
61100-37 = "莫名有種「老古板」的感覺呢。"
61100-38 = "[s]「咳！咳哼！咳哼……！」"
61100-39 = "你，你怎麼了，老師！？#n突然身體不舒服嗎？"
61100-40 = "什，什麼？剛才那是被無法迴避的事實正面擊中的時候，自然發出的心靈慘叫……？"
61100-41 = "抱，抱歉。這是我第一次使用那個詞語……"
61100-42 = "而且那也只是我路過某個地方時偶然聽到的……"
61100-43 = "[s5]「不過……要那麼說也沒錯啦……」\n[s6]「如果老師在奇普托斯不是老古板的話……那誰才是呢……」"
61100-46 = "真，真的很抱歉！#n就算老師不介意，我也……！"
61100-47 = "我也……"
61100-48 = "……"
61100-50 = "（沙織再次安靜了下來）"
61100-51 = "（吞下飲料的聲音，數次在寂靜中響起）"
61100-52 = "老師。"
61100-53 = "某種意義上……抱歉。"
61100-54 = "……呵呵，我好像只是不斷重複讓人難以理解的道歉呢。"
61100-55 = "這樣下去就要跟郵輪那時說過的一樣，把時間都花在道歉上了吧。"
61100-56 = "呼……"
61100-57 = "老師。我接下來可能會提出一個……對老師而言非常失禮的請求。"
61100-58 = "不過我沒有其他意思。只是因為我……"
61100-59 = "……終於能下定決心，正視自己所犯下的錯誤了。"
61100-60 = "來到這裡之後，我才真正意識到……"
61100-61 = "我直到現在……都不曾向老師做過一次真正的「道歉」。"
61100-62 = "[s7]「其實你真的不用放在心上……」\n[s8]「那個時候我也是同樣的心情，所以才故意那麼說的……」"
61100-65 = "那個時候……？"
61100-67 = "來到這裡之後…… "
61100-68 = "讓我回想起了……許多過去的事。 "
61100-69 = "……"
61100-70 = "老師？ "
61100-71 = "……"
61100-72 = "我果然還是必須向老師好好道歉──"
61100-73 = "[log]「對了！關於轉入三一的那些孩子！」[/log]"
61100-77 = "這樣啊……#n現在想想，老師當時打斷話題的方式確實有點不自然。"
61100-78 = "不過……"
61100-79 = "雖然很抱歉，但老師現在能不能……稍微配合一下我的固執呢？"
61100-80 = "我認為……這是我必須跨越的「過去」。"
61100-81 = "如果不在這裡──在奧利斯面對那件事的話……#n總覺得自己實在沒有臉面對奧利斯的孩子們。"
61100-82 = "甚至感覺……自己將會失去向前邁進的勇氣。"
61100-83 = "[s]「知道了。我會照你說的去做。」"
61100-84 = "嗯。"
61100-85 = "那麼……"
61100-89 = "能讓我看看老師的肚子嗎？"
61100-90 = "[s9]「！？！？！？」\n[s10]「沙織同學！？！？」"
61100-93 = "不，不是！我就是猜到你可能會有這種反應……！"
61100-94 = "所以才會說了那麼多開場白……希望能盡可能先鋪墊一下……"
61100-95 = "……"
61100-96 = "我……"
61100-97 = "想親眼確認自己在老師身上留下的[ruby=傷口]痕跡[/ruby]。"
61100-98 = "[ns]「……！」"
61100-100 = "（直到這時才明白了沙織的意思）"
61100-101 = "（於是便按照沙織的請求，讓他看了肚子上的傷痕……）"
61100-103 = "啊……"
61100-104 = "這就是……"
61100-105 = "……"
61100-108 = "（沙織的指尖，輕輕撫過了那道傷痕）"
61100-109 = "（他的手……顫抖得連被觸碰的一方都能清楚感覺到）"
61100-111 = "抱歉……"
61100-112 = "抱歉……"
61100-113 = "對不起……"
61100-114 = "真的……很對不起……"
61100-115 = "對不起。對不起。對不起。"
61100-116 = "我真的，真的，不知道該怎麼……"
61100-117 = "老師……"
61100-118 = "老，師……"
61100-119 = "像我這樣的人……"
61100-120 = "我竟然……"
61100-121 = "嗚……"
61100-122 = "嗚……嗚……"
61100-123 = "嗚，嗚啊啊啊，啊啊啊啊啊……！"
61100-125 = "（在沙織那彷彿要崩潰般的肩膀上……）"
61100-126 = "（輕輕地，將手放了上去）"
61100-128 = "[ns]「沒事的。」"
61100-129 = "老，師……？"
61100-130 = "[s11]「沒事的。已經痊癒了。」\n[s12]「現在完全不痛，也沒有任何問題。」"
61100-133 = "可是，可是……！"
61100-134 = "那道傷痕還在……！"
61100-135 = "我知道……我已經知道了！"
61100-136 = "所有行為都會留下結果！傷痕絕對不會完全恢復原來的樣子！"
61100-137 = "無論如何都會留下痕跡……#n從事件發生的那一刻開始……就連未來都會永遠受到影響……！"
61100-138 = "我寧願……"
61100-139 = "寧願……"
61100-140 = "[s13]「希望你不要說『什麼都不做還比較好』之類的話。」\n[s14]「我不希望聽見我的學生說出那麼悲傷的話。」"
61100-143 = "老師……？"
61100-144 = "[s15]「你說的沒錯，沙織。」\n[s16]「有些傷口，或許永遠都無法痊癒。」"
61100-147 = "唔……！"
61100-148 = "[s17]「不過我們人類，是即使留下了痕跡……」\n[s18]「也能帶著它繼續活下去的……堅強的生物。」"
61100-151 = "帶著它，繼續活下去……？"
61100-152 = "……"
61100-153 = "這就是，人類活下去的方法嗎……？"
61100-154 = "可是……"
61100-155 = "我不明白……"
61100-156 = "我真的……真的什麼都不明白……"
61100-157 = "本以為只要正視自己犯下的錯誤，就能稍微向前邁進……"
61100-158 = "只要鼓起勇氣看著它……就能原諒自己……"
61100-159 = "然而，那恐怕……"
61100-160 = "只是我自以為是的傲慢吧……"
61100-161 = "[s]「聽我說，沙織。」"
61100-162 = "……嗯？"
61100-163 = "[s19]「如果沙織能回到那個時候……」\n[s20]「跟當時的沙織見一面的話，你會對他說什麼呢？」"
61100-173 = "……"
61100-174 = "呵呵。"
61100-175 = "真是不可思議。"
61100-176 = "我也曾經想過類似的問題……至少有幾十次吧。"
61100-177 = "……"
61100-178 = "我沒有一天不感到後悔。"
61100-179 = "那不成熟又愚蠢的傢伙……犯下了荒唐的罪行。"
61100-180 = "完全不知道自己的行為會造成什麼影響，也不知道會摧毀多少人的今天。"
61100-181 = "如果可以的話，我真的很想和那個傢伙談談。"
61100-182 = "不過在談話之前，要先狠狠給他一巴掌。"
61100-183 = "告訴他「你到底知不知道自己現在要做什麼」。"
61100-184 = "「如果再不清醒過來的話……你真的會走上無法回頭的道路」。"
61100-185 = "……"
61100-186 = "可是那種事不可能做到。"
61100-187 = "那個愚蠢的傢伙已經不存在了……剩下的只有現在的我。"
61100-188 = "所以我至少……要背負著這個事實繼續活下去。"
61100-189 = "這就是全部。"
61100-190 = "……"
61100-191 = "沒錯，這就是全部。"
61100-192 = "[s]「這樣就夠了，沙織。」"
61100-193 = "老師……？"
61100-194 = "[ns]「嗯，這樣就足夠了。」"
61100-196 = "[ns]「哪怕全世界都說你有罪也一樣。」"
61100-197 = "嗯？那是不是代表，我真的有罪呢？"
61100-198 = "[s21]「不是！」\n[s22]「我想表達的是……！」"
61100-201 = "如果面對同樣的情況，能做出更好的選擇……"
61100-202 = "如果在行動之前能多思考一下，老師就心滿意足了……"
61100-203 = "只要能答應這一點，老師無論什麼時候……"
61100-204 = "無論多少次都會……"
61100-205 = "嗚，嗚嗚……"
61100-209 = "（沙織的情緒漸漸潰堤，像孩子一樣哭了起來）"
61100-210 = "（在哭聲平息之前，不斷輕撫著他的背來安慰他……）"
61100-212 = "這麼說來，我注意到奧利斯的孩子們發生了一些改變。"
61100-213 = "[s]「改變？」"
61100-214 = "嗯。"
61100-215 = "可能是第一堂課之後，彼此的距離稍微拉近了的關係……"
61100-216 = "在休息時間隨意閒聊的機會也變多了。"
61100-217 = "跟以前相比，生活似乎改善了不少。"
61100-218 = "「Water Time」也變成了「Tea Time」……至少在吃的方面似乎還算不錯。"
61100-219 = "雖然建築和設施還是你所見到的這個樣子……"
61100-220 = "不過感覺已經開始有外部資金跟物資開始流入和循環了。"
61100-221 = "至於資金的來源和流向……目前還不清楚。"
61100-222 = "但總而言之，奧利斯確實發生了一些變化。"
61100-223 = "……仔細想想，這也是理所當然的吧。"
61100-224 = "哪有東西是能永遠保持不變的呢？"
61100-225 = "[s]「會覺得不安嗎？」"
61100-226 = "我也不太確定。不過……"
61100-227 = "看到孩子們的生活有所改善，多少讓我安心了一點。"
61100-228 = "……"
61100-229 = "老師。"
61100-230 = "我們……也有希望嗎？"
61100-231 = "[s23]「只要從現在開始，一起創造就可以了。」\n[s24]「就算堆疊磚塊的時候看起來遙不可及……」\n[s25]「但那座建築遲早會在不知不覺間完成。」"
61100-235 = "……是嗎。"
61100-236 = "我……能遇見老師真是太好了。"
61100-237 = "老師在這裡……真的是我的幸運。"
61100-238 = "如果沒有老師的話，我……"
61100-239 = "我們大概……"
61100-243 = "老師，這只是個非常假設性的問題……"
61100-244 = "……"
61100-245 = "今天……能跟我一起睡嗎？"
61100-246 = "[s]「！？！？」"
61100-247 = "呵呵，希望老師別那麼驚訝。#n我只是開開玩笑而已。"
61100-248 = "[s]「不開玩笑的人一旦開玩笑，破壞力可是會翻倍的啊……」"
61100-249 = "這樣啊……我會記住的。"
61100-250 = "[s]「我剛才……該不會自爆了吧？」"
61100-251 = "呵呵，誰知道呢。"
61100-252 = "那麼……嗯，雖然稱不上多麼舒適……"
61100-253 = "我差不多該走了。"
61100-254 = "[s]「沙織也晚安。」"
61100-258 = "（沙織關上門後，靠在門上低聲喃喃自語）"
61100-259 = "雖然說是開玩笑……"
61100-260 = "但有一半……其實是認真的呢。"
61100-261 = "呵呵。"
61100-262 = "希望你能好好休息，老師。"
61100-267 = "前，前輩？你睡了嗎……？"
61100-271 = "哎呀，舞彩？#n有什麼事嗎？快進來吧。"
61100-272 = "沒，沒有！只是……覺得有點擔心……"
61100-273 = "哦？你該不會是覺得今天輸給小隊和老師讓我很受傷，所以會一個人悶悶不樂的吧？"
61100-274 = "不，不不不不不，不是的，前輩！#n我怎麼可能那麼想呢……我沒有那個意思！"
61100-275 = "沒關係啦，會那樣想也是很正常的。"
61100-276 = "真的不是啦！"
61100-277 = "啊哈哈，抱歉抱歉。我只是突然想講講看而已。#n還有……我真的沒事。"
61100-278 = "真，真的嗎……？"
61100-279 = "嗯，真的。#n雖然不知道現在說這些適不適合……"
61100-281 = "……奧利斯的憎恨，可不會因為這點小事就消失。"
61100-282 = "……！！！"
61100-283 = "話說，你覺得課程怎麼樣？"
61100-284 = "咦？課程……是嗎？#n那個……"
61100-285 = "前輩覺得呢……？"
61100-286 = "哎呀，用問題回答問題會造成彼此的困擾……之前不是說過了嗎？"
61100-287 = "對，對不起，前輩！"
61100-288 = "只是……該怎麼說呢……"
61100-289 = "我第一次遇到這種事情，感覺有點手忙腳亂……很多地方還不是很理解。"
61100-290 = "不過……"
61100-291 = "有種不可思議的感覺。"
61100-299 = "外面的世界，原來是這樣運作的啊。"
61100-302 = "我們……確實是另一個世界的人。"
61100-308 = "不，不對。"
61100-309 = "就算到了現在……也還是另一個世界吧。"
61100-310 = "……沒錯。"
61100-311 = "不過跟以前相比，在許多方面……"
61100-312 = "至少在吃這件事上已經有模有樣的了。#n這也代表我們正在慢慢進步了吧？"
61100-313 = "沒錯！我也最喜歡這一點了！"
61100-314 = "不，不過……我其實有點好奇……"
61100-315 = "零食或餐點之類的東西，不是都需要花錢嗎？"
61100-316 = "那到底是怎麼……"
61100-317 = "……"
61100-319 = "你真的想知道嗎，舞彩？"
61100-320 = "咦？是，是的……"
61100-321 = "知道真相之後，你看待某些事物的方式……可能再也無法跟以前一樣了哦？#n……這樣也沒關係嗎？"
61100-322 = "原來是那麼可怕的事情嗎！？"
61100-323 = "沒有沒有，剛才只是在跟你開玩笑啦。抱歉。"
61100-324 = "前輩～"
61100-325 = "不過，一旦了解了原本不知道的事……"
61100-326 = "看待事物的眼光就會無可避免地發生改變。"
61100-327 = "……嗯。就跟老師今天說的「學習」一樣。"
61100-328 = "前輩……？"
61100-329 = "改變需要金錢，這是無可奈何的事情。"
61100-330 = "每個人都希望自己的生活能夠變好，可惜資源往往是有限的。"
61100-336 = "於是競爭與衝突便隨之而生……"
61100-342 = "最終有些人遭到了拋棄……甚至連曾經存在過的事實都被抹去和遺忘。"
61100-343 = "……就像我們一樣。"
61100-344 = "你知道嗎？#n在奇普托斯，有個只有奧利斯能夠做到……"
61100-345 = "只有奧利斯具備競爭力的「業務領域」。"
61100-346 = "壟斷市場可是件好事哦。#n因為這樣就能隨心所欲地定價了。"
61100-347 = "咦？業務領域？壟斷市場……？#n只有奧利斯具備的競爭力……？"
61100-351 = "前，前輩！？！？！？"
61100-354 = "你回來啦。很好很好。#n應該「處理」得還順利吧？"
61100-358 = "嗯？這是什麼？"
61100-359 = "饒，饒命啊！只要能活下來，我什麼都願意做！#n求求你饒我一命吧……！"
61100-360 = "唔嗯……！？"
61100-361 = "……"
61100-362 = "這是怎麼回事，昴。#n我明明說過要確實「處理」掉吧？"
61100-363 = "這樣不是更好嗎？#n無論你現在說什麼，他都會對你唯命是從。"
61100-364 = "當然如果你不滿意的話，再往他腦袋灌兩個彈匣也能確實「處理」乾淨就是了。"
61100-365 = "哇啊啊啊啊啊！？拜，拜託千萬不要……！"
61100-366 = "……乍看之下確實是這樣沒錯。#n不過不「處理」掉他，對我有什麼好處？"
61100-367 = "至少從現在開始……這傢伙的一切都會屬於你，不是嗎？"
61100-368 = "沒錯！只要饒我一命，我願意獻給你任何東西！！！"
61100-369 = "哼嗯……要是這傢伙哪天心生歹念怎麼辦呢？"
61100-370 = "到時候，你只要隨口說一句「會叫奧利斯來」之類的話就行了。"
61100-371 = "噫噫噫！！！"
61100-372 = "這樣啊。不過……萬一你哪天為了更高的報酬而出賣我呢？#n這就是你們傭兵的生活方式吧？"
61100-373 = "那只適用於過一天算一天的傢伙而已。#n想在這個圈子待久一點的話，就得守信用才行。"
61100-374 = "正因為生活在規則之外……我們傭兵才更需要成為「可預測的資源」。"
61100-375 = "……"
61100-376 = "好吧，我相信你。#n辛苦了。"
61100-377 = "呵呵呵呵……#n這樣這片區域的商業權利，就完全屬於我們了……"
61100-378 = "（奧利斯的存在並不為大多數人所知。知道的人也只會說那是個骯髒又醜惡的地方）"
61100-379 = "（然而人們是否真的明白……「外面」其實遠比奧利斯骯髒數倍呢）"
61100-381 = "難，難道……"
61100-382 = "前輩你……殺人了嗎？"
61100-383 = "還沒有。"
61100-384 = "那，那真是太好了……！"
61100-385 = "可是……這樣還有辦法做那種「隨意定價」的工作嗎……？"
61100-386 = "嗯，只要把人逼到某個程度就行了。#n這樣有時候反而會更順利。"
61100-387 = "常有人說「人不會改變」對吧？"
61100-388 = "但實際上並非總是如此。"
61100-389 = "一旦親身感受到死亡……人就不得不發生改變。#n雖然改變的方向……我也不得而知。"
61100-390 = "從這個意義上來說，我們或許早就改變了吧？#n畢竟最接近死亡的……"
61100-392 = "就是我們奧利斯啊。"
61100-394 = "接下來是我個人的看法。#n我認為……錢就是錢。"
61100-395 = "沒有所謂乾淨或骯髒的區別。#n如果有能力計較這些的話……坦白說就是還擁有餘裕的意思。"
61100-396 = "……就算是我，在做那種事情的時候也會感覺自己的心正在碎裂。"
61100-397 = "因為人這種生物，只要攻擊「人形的東西」就會受到精神衝擊。#n或許人類就是這樣進化過來的吧。"
61100-398 = "咦？問我那個時候該怎麼辦？"
61100-399 = "……"
61100-401 = "我會想著大家。"
61100-402 = "就是因為有你們，我才能夠活下去。"
61100-404 = "沒能經常照顧你們……我很抱歉。"
61100-405 = "別，別別別別，別這麼說！#n反而是我們……常給前輩……"
61100-406 = "謝謝你們總是吃得津津有味的樣子。#n每當看見這樣的景象……就會帶給我力量。"
61100-407 = "所有人都能公平地獲得幸福……只是癡人說夢而已。"
61100-408 = "我們奧利斯的孩子，比任何人都清楚這個事實。"
61100-409 = "同時我也認為……在世上的某個角落，應該要有屬於這些孩子的地方才對。"
61100-410 = "這裡就是那個地方──我希望把這裡打造成那樣的地方。"
61100-411 = "被拋棄的孩子、被遺忘的孩子、在任何地方都找不到自己價值的孩子……"
61100-412 = "就先到這裡來吧。#n當然，要是所有人都湧進來還是有點傷腦筋啦。#n畢竟這裡還挺狹窄的……"
61100-413 = "……就像一個小小的鳥巢一樣。"
61100-414 = "我想要守護這個鳥巢。"
61100-415 = "守護這個，哪怕只有一丁點也好……"
61100-416 = "能讓生活在這裡的雛鳥們……感受到「活著真好」的地方。"
61100-417 = "前輩……"
61100-418 = "還記得以前「夫人」在的時候嗎？"
61100-419 = "唔……"
61100-420 = "啊哈哈！沒錯，簡直糟透了對吧！#n光是回想起來就讓人起雞皮疙瘩！"
61100-421 = "……有些事情，夫人他沒能做到。"
61100-422 = "也有些事情，是他根本沒打算做的。"
61100-423 = "假如我至少能完成那些事情……應該也不算壞事吧。"
61100-424 = "現在……我認為做到這個程度就足夠了。"
61100-425 = "……"
61100-426 = "前輩。"
61100-427 = "嗯？"
61100-428 = "吹口琴給我們聽吧！"
61100-429 = "又，又來？都這麼晚了耶！？#n而且不是才剛吹過嗎……"
61100-430 = "可是我還想聽嘛！大家一定也會喜歡的！"
61100-431 = "真是的，有時候我真搞不懂你們……"
61100-432 = "咳，咳哼……那好吧……"
61100-433 = "嘿嘿……"
61100-451 = "這個聲音……是昴嗎。"
61100-452 = "……"
61100-453 = "那傢伙果然還是一點都沒變啊。"
61100-454 = "嗯……？"
61100-458 = "什，什麼？是誰在那裡！？"
61100-463 = "唔！？"
61100-467 = "（突然間，感覺像是踏入了一片黑暗且令人窒息的霧氣之中……）"
61100-468 = "（而且最重要的是……）"
61100-470 = "那是，號角聲……？"
61100-472 = "下一話;校外教學（１）"

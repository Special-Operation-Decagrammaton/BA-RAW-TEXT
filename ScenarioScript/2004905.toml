[translation]
2004905-1 = "การอาบแดดก็น่าเบื่อ"
2004905-2 = "(คุณครูหอบหิ้วเตียงอาบแดดสองอันมายังชายหาดที่มิซากิอยู่)"
2004905-4 = "มาแล้วเหรอคุณครู"
2004905-5 = "นั่นอะไรน่ะ... เตียงอาบแดด? เอามาสองอันทำไม?"
2004905-6 = "เอามาเผื่อฉันด้วยเหรอ? ฉันไม่ได้บอกสักหน่อยว่าจะอาบแดด"
2004905-10 = "เข้าใจแล้ว... จะยอมทำตามก็แล้วกัน"
2004905-11 = "[s] \"เอ๋...? จริงเหรอ?\""
2004905-12 = "ทำไมล่ะ?"
2004905-13 = "จะบอกว่าฉันตกลงเร็วเกินไปจนน่าสงสัยงั้นเหรอ...?"
2004905-14 = "ตอนนี้แค่ตอบตกลงก็เป็นปัญหาแล้วรึไง?"
2004905-15 = "ไม่มีเหตุผลอะไรหรอก... ฉันแค่คิดว่ายังไงก็ต้องทำอยู่แล้ว เพราะงั้นทำให้เสร็จๆ ไปน่าจะดีกว่า"
2004905-16 = "ก็แค่นั้น ไม่ได้มีความหมายพิเศษอะไรเลย"
2004905-17 = "แค่นอนตรงนี้ก็พอใช่มั้ย?"
2004905-21 = "(คุณครูกับมิซากินอนมองท้องฟ้าข้างๆ กัน)"
2004905-23 = "ร้อน..."
2004905-24 = "[s] \"ไหนบอกว่าชินกับความร้อนแล้วไง?\""
2004905-25 = "ฉันบอกว่าเคยชิน ไม่ได้บอกว่าชอบสักหน่อยย"
2004905-26 = "ทำไมถึงต้องจงใจมาโดนแดดแบบนี้ด้วย"
2004905-27 = "[s1] \"เพราะผิวแทนนิดหน่อยมันดูสุขภาพดีละมั้ง...?\"\n[s2] \"รับวิตามินดีไง...?\""
2004905-30 = "อะไรกันเนี่ย"
2004905-31 = "สุดท้ายแล้วก็ไม่มีความหมายอะไรเลย"
2004905-32 = "[s] \"คิดแล้วว่าจะพูดแบบนั้น...\""
2004905-33 = "......"
2004905-37 = "ฝน...?"
2004905-38 = "[s3] \"จู่ๆ ฝนก็เทเลยเรอะ...!\"\n[s4] \"มิซากิ รีบเข้าไปที่ร้านริมทะเลก่อนเถอะ!\""
2004905-44 = "แฮ่ก แฮ่ก..."
2004905-45 = "[s] \"นั่งตรงนี้ก่อนเถอะ\""
2004905-48 = "ฉันคิดแล้วว่ามันจะต้องเป็นแบบนี้"
2004905-49 = "การได้สนุกกับอะไรบางอย่างน่ะมันไม่เหมาะกับฉันหรอก"
2004905-50 = "เพราะสุดท้ายสิ่งที่รออยู่ก็คือการถูกทรยศแบบนี้..."
2004905-51 = "เพราะงั้นไม่คาดหวังอะไรตั้งแต่แรกน่าจะดีกว่า"
2004905-52 = "เพราะถ้าไม่คาดหวังก็จะไม่ผิดหวัง"
2004905-53 = "ไม่ต้องรู้สึกอะไรที่เปล่าประโยชน์... ไม่ต้องเสียเวลาไปโดยเปล่าประโยชน์"
2004905-54 = "[ns] \"......\""
2004905-58 = "ฝนหยุดแล้วละ คงเป็นแค่ฝนไล่ช้างน่ะ"
2004905-59 = "แล้วจะเอายังไงต่อล่ะ?"
2004905-60 = "จะไปอาบแดดต่อมั้ย?"
2004905-61 = "[s] \"อื้อ ครูว่าจะไปอาบแดดต่อน่ะ\""
2004905-62 = " อึก... เอาจริงเหรอ?"
2004905-63 = "[s5] \"ถึงผิวจะไม่เป็นสีแทนหรือยังไม่ได้รับวิตามินดีเลย แต่ครูก็อยากทำ\"\n[s6] \"การได้นอนคุยกับมิซากิจะเป็นสิ่งที่อยู่ในความทรงจำนี่นา\""
2004905-66 = "......"
2004905-67 = "ฉันไม่เห็นเข้าใจเลย"
2004905-68 = "ความทรงจำงั้นเหรอ..."
2004905-69 = "มันสำคัญมากพอที่จะทำสิ่งที่เปล่าประโยชน์แบบนี้เหรอ?"
2004905-70 = "[s7] \"งั้นไปอาบแดดด้วยกันต่อมั้ย?\"\n[s8] \"ถ้าไปอาบแดดต่ออาจจะได้คำตอบก็ได้นะ\""
2004905-73 = "โน้มน้าวกันแบบนี้อีกแล้ว..."
2004905-74 = "......"
2004905-75 = "เฮ้อ..."
2004905-76 = "บอกตามตรงว่าฉันไม่เข้าใจเลยสักนิด..."
2004905-77 = "ก็ได้... ตามใจก็แล้วกัน"

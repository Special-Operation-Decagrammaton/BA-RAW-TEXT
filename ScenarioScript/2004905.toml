[translation]
2004905-1 = "日光浴很無聊"
2004905-2 = "（帶著兩張躺椅走向了美咲所在的海邊）"
2004905-4 = "你果然來了啊，老師。"
2004905-5 = "那是……躺椅？而且還有兩張？"
2004905-6 = "居然連我的都帶來了……我可沒答應要做這種事。"
2004905-10 = "……算了，我就配合你吧。"
2004905-11 = "[s]「……咦？真的嗎？」"
2004905-12 = "怎麼了？"
2004905-13 = "……因為答應得太快，反而覺得奇怪？"
2004905-14 = "現在就算答應也不行了嗎？"
2004905-15 = "……沒有什麼特別的理由。#n只是覺得既然要做，不如早點結束比較好而已。"
2004905-16 = "反正這種事也沒什麼意義。"
2004905-17 = "所以呢？我只要躺在這裡就行了嗎？"
2004905-21 = "（和美咲並肩躺下，望著天空）"
2004905-23 = "……好熱。"
2004905-24 = "[s]「你不是說過你習慣耐熱了嗎？」"
2004905-25 = "我只說過習慣，可沒說過喜歡。"
2004905-26 = "為什麼要故意曬太陽啊……"
2004905-27 = "[s1]「稍微曬黑的皮膚看起來比較健康……？」\n[s2]「還有維他命D之類的……？」"
2004905-30 = "那是什麼啊。"
2004905-31 = "還不只是些毫無意義的東西。"
2004905-32 = "[s]「是嗎……」"
2004905-33 = "……"
2004905-37 = "……雨？"
2004905-38 = "[s3]「突然下雨了……！？」\n[s4]「美咲，先跑到那邊的海之家吧！」"
2004905-44 = "哈啊，哈啊……"
2004905-45 = "[s]「先坐一下吧。」"
2004905-48 = "果然會是這種結局。"
2004905-49 = "果然「享受」這種行為根本不適合我。"
2004905-50 = "反正最終都要面臨這種背叛……"
2004905-51 = "還不如打從一開始就不要抱期待比較好。"
2004905-52 = "沒有期待就不會失望。"
2004905-53 = "不需要多餘的情緒起伏……也不必做無謂的努力。"
2004905-54 = "[ns]「……」"
2004905-58 = "雨停了呢。看來只是場驟雨而已。"
2004905-59 = "所以呢？你接下來打算怎麼辦？"
2004905-60 = "還要繼續日光浴嗎？"
2004905-61 = "[s]「……嗯，繼續吧。」"
2004905-62 = "咦……真的嗎？"
2004905-63 = "[s5]「就算最後沒得到健康的膚色，也沒補充到維他命D……」\n[s6]「至少能留下和美咲並肩躺著聊天的回憶呀！」"
2004905-66 = "……"
2004905-67 = "我不懂那是什麼意思。"
2004905-68 = "回憶什麼的……"
2004905-69 = "真的有重要到值得承受這種徒勞感嗎？"
2004905-70 = "[s7]「一起繼續下去吧？」\n[s8]「說不定能找到答案哦？」"
2004905-73 = "又想用這種話來引誘我……"
2004905-74 = "……"
2004905-75 = "唉……"
2004905-76 = "老實說我還是不懂……"
2004905-77 = "……不過好吧。隨你高興。"

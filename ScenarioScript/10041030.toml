[translation]
10041030-1 = "第3話;激怒人的方法"
10041030-6 = "……一小時前。"
10041030-9 = "聖亞出發後，於莉央的藏身處。"
10041030-12 = "…………"
10041030-17 = "……？？"
10041030-21 = "怎麼了，你到底在不安什麼？"
10041030-26 = "怎麼突然說這種話。#n我沒有提過我感到不安才對。"
10041030-27 = "一定要說出來才會知道嗎？#n還不是因為你的臉上是這麼寫的，所以我才會問你。"
10041030-28 = "不，我才沒有。"
10041030-29 = "……我才沒有。"
10041030-34 = "有那麼明顯嗎？"
10041030-35 = "這世界上有兩種方法可以把人惹怒，一是講話只講一半……"
10041030-36 = "不，我沒有想激怒你的意思。"
10041030-37 = "你這樣我反而更生氣了。#n尤其你還是用那種表情說出來的。"
10041030-38 = "唉……"
10041030-39 = "就算你不說我也看得出來。#n我最討厭人家有話不說了。"
10041030-40 = "所以如果有話想說就趕快說，何必一直跟我兜圈子呢？"
10041030-42 = "那，那個……其實嚴格來說，我並沒有想說什麼……"
10041030-43 = "畢竟我不清楚你聽到這件事會有什麼反應，#n因此才想等收集更多情報之後，再找個更適合的時機……"
10041030-45 = "啊，一直要說不說的都快把我氣死了！！你想急死我啊！！"
10041030-49 = "反正你最後還不是會說！你也很想說不是嗎？#n還是你真的不打算開口？不講就算了啊！"
10041030-50 = "我認為遲早必須說出來……"
10041030-51 = "那你現在就給我說！！#n這裡也只有我們兩個人而已，你到底在擔心什麼啦！？"
10041030-52 = "只有我們兩人……"
10041030-56 = "……這，這樣真的好嗎？#n像我們這樣的關係，真的好嗎？"
10041030-57 = "要是我不認識你的話，我肯定會覺得你是故意的，然後忍不住狠狠揍你一拳。#n我是說認真的。"
10041030-58 = "你是真的打算要氣死我啊？"
10041030-63 = "如果我不想幫忙，一開始就不會這麼說了不是嗎？#n明明已經叫我做了那麼多奇怪的事，怎麼現在才開始覺得不好意思？"
10041030-64 = "假如是我真的不願意幫忙的事，那不管你說什麼我也不會幫你的。#n所以你就別想東想西的了，到底有什麼事？"
10041030-66 = "……我知道了。"
10041030-67 = "其實這件事和那個原本不在我們計畫之中的人，也就是百合園聖亞有關。"
10041030-69 = "啊啊，果然跟他有關嗎？#n其實我多少也有猜到啦。"
10041030-70 = "所以你擔心事情會偏離計畫嗎？#n害怕他會闖禍？還是怕他洩露我們的事？"
10041030-71 = "不，我對他的人格和動機還是有信心的。#n況且以他的立場也不可能那麼做。"
10041030-72 = "真要我判斷的話，他對我們而言顯然是「正面」的因素。#n這點是無庸置疑的，我也不認為他的行為會對我們產生負面影響。"
10041030-73 = "畢竟他……是個既明辨事理又懂得照顧自己的人。"
10041030-74 = "哦？意思是你不認為他有問題？#n那不是很好嗎？所以問題到底出在哪裡？"
10041030-75 = "……問題不在我們這邊，而在他自己身上。"
10041030-81 = "雖然他的確是我印象中的百合園聖亞沒錯，但我總覺得他和之前的感覺不太一樣。"
10041030-84 = "語氣和行為都十分迫切……簡直像是在被什麼追趕著一樣。"
10041030-85 = "而且他還親口提過「證明自己」之類的話……#n再加上明明是跟老師一起來的，卻一直避免提及有關老師的話題，實在有點不對勁。"
10041030-88 = "這部分的確是有點奇怪。#n畢竟這種事情只要和老師扯上關係，通常都會進行得比較順利。"
10041030-89 = "真是的……什麼證明跟資格之類的都好無聊。"
10041030-90 = "只有幼稚的人才會說出那種話。"
10041030-91 = "……總之。"
10041030-92 = "就算他現在失去了力量，我們還是不能小看他的直覺和判斷能力。#n說不定他真的能帶回什麼有用的情報。"
10041030-93 = "然而即便如此，我們也只能把那些當作是「額外獲得的好處」。#n不能期待他在這次事件中一定幫得上忙。"
10041030-94 = "雖然他的提議的確頗具吸引力，但我們還是要按照原定計畫進行。"
10041030-98 = "所以麻煩你去「千年資料中心」幫我確認活動準備期間的整體數據變化。"
10041030-99 = "千年資料中心？#n你居然要把這麼艱難的任務交給我啊。"
10041030-100 = "那不是這學園裡保全系統最森嚴的地方嗎？#n沒點身手可是進不去的。"
10041030-101 = "之所以這麼規劃，是因為我認為美甘寧瑠肯定辦得到。#n難道有什麼問題嗎？"
10041030-105 = "哈──！"
10041030-106 = "原來你偶爾也會說出這種好聽的話啊。#n怎麼可能會有什麼問題，我可是美甘寧瑠耶。"
10041030-107 = "親愛的委託人，你就好好在這裡等我的消息吧。"
10041030-111 = "……我去去就回♪"

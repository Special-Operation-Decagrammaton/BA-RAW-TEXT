10041030-37 = "5;네루 교복;05;없어서 더 화나네. 그런 얼굴로 그렇게 말하니 두 배로 더 화나네.\n#5;em;[빠직]"
10041030-38 = "5;네루 교복;24;하아…….\n#5;em;[한숨]"
10041030-39 = "5;네루 교복;00;언급 안 해주면 삐쳐도 합법일 정도로 티 난다고. 말 안 걸어준 쪽이 나쁜 수준이라고.\n#5;m3\n#3;dl"
10041030-40 = "5;네루 교복;05;할 말 있으면 그냥 빨리해. 왜 자꾸 이런 불필요한 대화를 늘리는 거야?"
10041030-41 = "#all;hide"
10041030-42 = "3;리오;07;그, 그건……. 확실히 그렇게 논리를 따지면 할 말은 없지만……."
10041030-43 = "3;리오;99;하지만 나로서는 내가 이 주제에 대해 언급했을 때의 네 반응을 확신할 수 없어. 그렇기 때문에 보다 많은 정보가 쌓일 때를 기다려서 보다 정확한 타이밍에……."
10041030-44 = "#all;hide"
10041030-45 = "3;네루 교복;20;아 말 안 하는 게 열 받는다고, 지금!! 답답하게 하지 말라고, 좀!!\n#3;hophop\n#3;closeup\n#bgshake"

10041030-84 = "#na;리오;어딘가 쫓기고 있는 듯한……. 약간의 초조함이 묻어 나는 어조와 행동이었거든."
10041030-85 = "#na;리오;그녀의 입에서 '자신의 증명' 같은 단어가 나온 것도, 선생과 함께 왔으면서 정작 선생에 대한 이야기는 피하고 있는 분위기도 이상해."
10041030-86 = "#all;hide"
10041030-87 = "#wait;500"
10041030-88 = "3;네루 교복;99;확실히 그 부분은 조금 이상하지. 보통 이런 일은 오히려 선생을 엮는 편이 일이 수월하니까 말이야.\n#3;em;…\n#3;a"
10041030-89 = "3;네루 교복;05;정말이지……. 증명이니, 자격이니 쓸데없는 소리들."
10041030-90 = "3;네루 교복;00;좀 철부지들이 하는 소리인데 말이지, 그런 거는."
10041030-91 = "3;리오;06;……어쨌든.\n#3;em;[세로선]"
10041030-92 = "3;리오;02;힘을 잃었다고 해도 그녀의 직감이나 판단 능력은 무시할 것이 못 돼. 어쩌면 정말로 유용한 정보를 가지고 올지도 모르지."

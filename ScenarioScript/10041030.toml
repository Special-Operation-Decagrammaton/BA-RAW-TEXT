10041030-67 = "3;리오;02;이슈는 우리의 원래 계획에 없던 새로운 존재, 유리조노 세이아에 관한 거야."
10041030-68 = "#all;hide"
10041030-69 = "3;네루 교복;24;아아, 역시 그쪽이었나. 뭐 그럴 거라 생각하긴 했지."
10041030-70 = "3;네루 교복;01;일을 제대로 못 할까 봐 걱정인 거냐? 사고 칠까 봐? 아니면 우리 존재를 발설할까 봐?\n#3;em;[?]"
10041030-71 = "1;리오;02;아니. 나는 적어도 그녀의 인격과 의도에 대해서는 신뢰하고 있어. 그러지 않을 수 없는 입장이기도 하지.\n#1;ar\n#3;m5"
10041030-72 = "1;리오;99;판별하자면 그녀는 우리 입장에서 명백한 '선'이야. 이것은 의심의 여지가 없고, 그 행동이 우리에게 마이너스가 되진 않을 거라 예측하고 있어."
10041030-73 = "1;리오;00;그런 정도는…… 스스로 구분하거나 케어할 수 있는 사람이니까."
10041030-74 = "3;네루 교복;21;오, 뭐야? 멀쩡한 인간이라는 뜻이네. 좋은 거잖아, 그럼 뭐가 문제인데?"

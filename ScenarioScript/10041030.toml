10041030-49 = "5;네루 교복;19;말할 거잖아! 어차피 하고 싶은 거 아니냐고, 맞지? 아니면 말 안 할 거야? 안 할 거면 말고!\n#5;em;[스팀]\n#5;al\n#5;hophop\n#3;m1"
10041030-50 = "3;리오;07;필요에 따라서는 해야 할 때가 올 거라고 예측하고 있…….\n#3;em;[세로선]"
10041030-51 = "5;네루 교복;13;그럼 그냥 지금 하라고, 좀!! 어차피 둘밖에 없는데 뭐가 그리 걱정이야!?"

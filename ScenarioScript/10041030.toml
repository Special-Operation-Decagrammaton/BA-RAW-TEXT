10041030-63 = "5;네루 교복;00;어차피 도울 거 아니었으면 처음부터 돕는다고도 안 했을 거 아니냐. 예전에는 이상한 것도 잘만 시켜 놓고 이제 와서 왜 이래?\n#5;m3\n#3;dl"

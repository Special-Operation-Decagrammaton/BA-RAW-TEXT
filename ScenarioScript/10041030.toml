[translation]
10041030-1 = "ตอนที่ 3;วิธีทำให้คนโกรธ"
10041030-6 = "1 ชั่วโมงก่อน..."
10041030-9 = "ณ ที่ซ่อนตัวของริโอะ ทันทีที่เซอาออกไป"
10041030-12 = "..."
10041030-17 = "...??"
10041030-21 = "อะไรกัน กังวลเรื่องอะไรนักหนา?"
10041030-26 = "พูดเรื่องอะไรน่ะ ฉันไม่เคยบอกว่ากังวลอะไรสักหน่อย"
10041030-27 = "ที่ฉันถามก็เพราะคำว่ากังวลมันเขียนอยู่บนหน้าเธอน่ะสิ ไม่ต้องพูดอะไรก็รู้แล้วละน่า"
10041030-28 = "ไม่หรอก ฉันไม่ได้กังวล"
10041030-29 = "ไม่กังวลหรอก..."
10041030-34 = "ดูออกขนาดนั้นเลยเหรอ?"
10041030-35 = "การทำให้คนอื่นโกรธมีอยู่สองวิธี วิธีแรกก็คือพูดๆ อยู่แล้วก็หยุดพูดไปเลย ส่วนอีกวิธี..."
10041030-36 = "เปล่านะ ฉันไม่ได้ตั้งใจจะทำให้โกรธ"
10041030-37 = "พอบอกว่าไม่ได้ตั้งใจยิ่งน่าโมโหเข้าไปใหญ่ ยิ่งเธอพูดด้วยสีหน้าแบบนั้นแล้วด้วย ยิ่งน่าโมโหขึ้นเป็นสองเท่าเลย"
10041030-38 = "เฮ้อ..."
10041030-39 = "มันดูออกชัดเลยละ ชัดจนขนาดที่ถ้าไม่พูดถึงแล้วจะงอนก็ไม่แปลก แล้วถ้าไม่พูดถึงก็จะดูเป็นคนที่แย่ด้วย"
10041030-40 = "ถ้ามีเรื่องอะไรก็รีบๆ บอกมาเถอะน่า ทำไมถึงทำให้ฉันต้องมาพูดเรื่องที่ไม่จำเป็นด้วย"
10041030-42 = "คะ... คือว่า... ถ้าพูดอย่างมีเหตุผลขนาดนั้น ฉันก็คงพูดขัดอะไรไม่ได้..."
10041030-43 = "แต่ฉันไม่แน่ใจน่ะว่าเธอจะมีท่าทียังไงถ้าฉันพูดถึงเรื่องนี้ เพราะงั้นฉันก็เลยอยากรอจนกว่าจะได้ข้อมูล#nที่มากกว่านี้ แล้วค่อยบอกในจังหวะที่เหมาะสม..."
10041030-45 = "ที่ไม่บอกเลยอย่างนี้ละที่ทำให้ฉันโมโห!! อย่าทำให้หัวร้อนสิ!!"
10041030-49 = "ยังไงก็จะบอกอยู่แล้วไม่ใช่เหรอ? อยากบอกอยู่แล้วไม่ใช่หรือไง? หรือว่าจะไม่บอก? ถ้าจะไม่บอกก็ไม่ต้องบอก!"
10041030-50 = "ฉันคาดว่าเดี๋ยวก็มีจังหวะเหมาะสมที่ควรบอกน่ะ..."
10041030-51 = "บอกมาตอนนี้เลยให้มันจบๆ ไปเถอะน่า!! ยังไงที่นี่ก็มีเราแค่สองคน จะไปกังวลอะไรก็ไม่รู้!?"
10041030-52 = "แค่สองคน..."
10041030-56 = "ดะ... ได้ด้วยเหรอ...? ระหว่างเราสองคน จะทำแบบนี้ได้เหรอ?"
10041030-57 = "ถ้าฉันไม่รู้จักเธอละก็ ป่านนี้ฉันคงคิดว่าเธอตั้งใจยั่วโมโหฉันแล้วฟาดหน้าหงายไปแล้ว"
10041030-58 = "นี่เธอจะฆ่าฉันด้วยการทำให้ฉันหงุดหงิดหรือไง?"
10041030-63 = "ถ้าฉันไม่คิดจะช่วย ฉันก็คงไม่มาบอกว่าจะช่วยตั้งแต่แรกหรอก ทีแต่ก่อนละชอบสั่งให้ทำอะไรแปลกๆ เยอะแยะ แต่ตอนนี้เป็นคนละคนเฉยเลย"
10041030-64 = "ถ้าฉันไม่อยากทำ ฉันก็จะบอกว่าไม่อยากทำเองนั่นละ เพราะงั้นก็ไม่ต้องใส่ใจฉันแล้วรีบๆ บอกมาเถอะ ตกลงมีเรื่องอะไรกันแน่?"
10041030-66 = "เข้าใจแล้ว..."
10041030-67 = "ปัญหานี้เกี่ยวกับคนที่ไม่ได้อยู่ในแผนการของเราตั้งแต่แรก... ฉันหมายถึงยูริโซโนะ เซอาน่ะ"
10041030-69 = "อ้อ หมายถึงเด็กทรีนีตี้คนนั้นสินะ ฉันก็คิดไว้บ้างแล้วละว่าจะเป็นเรื่องนี้"
10041030-70 = "กังวลว่าจะทำงานออกมาได้ไม่ดีเหรอ? กลัวว่าจะไปสร้างเรื่องอะไร? หรือว่ากลัวว่าจะเปิดเผยตัวตน#nของพวกเรา?"
10041030-71 = "เปล่าหรอก อย่างน้อยฉันก็เชื่อใจในความคิดและเจตนาของเซอา ฉันอยู่ในฐานะที่ต้องเชื่อใจด้วยน่ะ"
10041030-72 = "ถ้าจะให้พูดให้ชัดเจน เซอาคือตัวแปรที่เป็น 'บวก' ของเรา เรื่องนี้ไม่ต้องสงสัยเลย และฉันก็คาดว่า#nการกระทำของเซอาก็จะไม่ให้ผลในทางลบกับเราด้วย"
10041030-73 = "นั่นก็เพราะ... เซอาเป็นคนที่คิดแยกแยะและดูแลตัวเองได้"
10041030-74 = "อ้าว? พูดแบบนี้ก็แสดงว่าเป็นคนปกติคนหนึ่งนี่? มันก็ดีแล้วไม่ใช่เหรอ แล้วปัญหามันอยู่ตรงไหนล่ะ?"
10041030-75 = "ปัญหาไม่ได้อยู่ที่พวกเรา แต่อยู่ที่เซอาน่ะ"
10041030-81 = "เธอคนนั้นคือยูริโซโนะ เซอาที่ฉันรู้จักก็จริง แต่ฉันสัมผัสได้ถึงบรรยากาศที่แตกต่างออกไปนิดหน่อย"
10041030-84 = "ทั้งน้ำเสียง ทั้งพฤติกรรมของเซอา... เหมือนกับว่าเธอกำลังโดนสอดส่องจากที่ไหนสักแห่งอย่างนั้นละ"
10041030-85 = "การเลือกใช้คำพูดว่านี่คือ 'การพิสูจน์ตัวเอง' ก็เป็นเรื่องแปลก แล้วไหนจะมาที่นี่กับครู แต่ก็หลีกเลี่ยงที่จะพูดเรื่องเกี่ยวกับครูอีก"
10041030-88 = "เรื่องนั้นมันก็แปลกอยู่หรอก ปกติแล้วถ้ามีเรื่องแบบนี้ สู้ให้ครูเข้ามามีส่วนร่วมไปเลยมันก็น่าจะง่ายดาย#nกว่าเดิม"
10041030-89 = "จริงๆ เลย... เดี๋ยวก็พิสูจน์บ้างละ เดี๋ยวก็คุณสมบัติบ้างละ เอาแต่พูดอะไรไร้สาระอยู่ได้"
10041030-90 = "คำพูดพวกนั้นนั่นแหละที่มีแต่พวกคนที่ไม่เชื่อมั่นในตัวเองเค้าพูดกัน"
10041030-91 = "เอาเถอะ..."
10041030-92 = "ถึงจะบอกว่าสูญเสียพลังของตัวเองไป แต่เราก็ไม่ควรเมินเฉยต่อสัญชาตญาณหรือลางสังหรณ์ของ#nเซอา เพราะบางทีความสามารถนั้นอาจจะนำข้อมูลที่เป็นประโยชน์มาให้เราจริงๆ ก็ได้"
10041030-93 = "แต่ถึงอย่างนั้น เราก็ต้องใช้มันในแง่ของ 'ข้อได้เปรียบเพิ่มเติม' เท่านั้น จะทำงานโดยหวังพึ่งพา#nลางสังหรณ์ของเซอาอย่างเดียวคงไม่ได้"
10041030-94 = "ฉันก็ขอบใจที่เซอายื่นมือมาช่วย แต่พวกเราก็จะทำงานต่อตามแผนการเดิมของเรา"
10041030-98 = "ไปที่ <ศูนย์ข้อมูลมิลเลเนียม> แล้วตรวจสอบกระแสข้อมูลโดยรวมในช่วงที่มีการเตรียมงานเอ็กซ์โป#nให้หน่อยนะ"
10041030-99 = "งานหินเลยนะเนี่ย ให้ไปศูนย์ข้อมูลมิลเลเนียมเลยเหรอ?"
10041030-100 = "ที่นั่นมีระบบการรักษาความปลอดภัยที่เข้มงวดที่สุดในโรงเรียนเลยนี่? นักเรียนความสามารถธรรมดาๆ เข้าไปที่นั่นไม่ได้หรอกนะ?"
10041030-101 = "ที่ฉันวางแผนนี้ไว้เพราะคิดว่านักเรียนที่ชื่อมิคาโมะ เนรุสามารถทำได้ยังไงล่ะ หรือว่าติดอะไรหรือเปล่า?"
10041030-105 = "เฮอะ...!"
10041030-106 = "พูดดีๆ กับเขาก็เป็นเหมือนกันนี่ ฉันน่ะไม่ติดอะไรหรอก ฉันคือมิคาโมะ เนรุเชียวนะ"
10041030-107 = "ผู้ว่าจ้างน่ะนั่งรออยู่ตรงนี้ได้เลย"
10041030-111 = "เพราะแป๊บเดียวฉันก็ทำงานเสร็จแล้วละ...♪"

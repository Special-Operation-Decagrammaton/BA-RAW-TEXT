[translation]
103160-1 = "第16話;逆襲"
103160-2 = "快點……快回來呀。"
103160-3 = "請加快動作！"
103160-4 = "……"
103160-8 = "……"
103160-9 = "大家，快點……"
103160-10 = "……"
103160-12 = "「自爆程式」建構完成。只要按下執行按鈕就行了。"
103160-13 = "模擬結果也沒問題。#n這樣就能確實摧毀「阿特拉哈西斯的方舟」。"
103160-14 = "會發生很嚇人的爆炸對吧？#n方舟的碎片也許會飛到奇普托斯的四處也說不定。"
103160-16 = "……這邊也準備完畢了。#n做好逃脫準備的話就告訴我一聲。"
103160-17 = "慢著！！"
103160-18 = "……莉央？"
103160-19 = "情況有點奇怪──我們現在應該已經掌控住方舟了才對……"
103160-20 = "……陽葵！#n現在立刻確認「生命守護者」的中樞系統。"
103160-21 = "……中樞系統？"
103160-25 = "……"
103160-26 = "……這，這是？"
103160-27 = "……被[ruby= ・     ・ ]駭入[/ruby]了。"
103160-31 = "數值不應該是這樣……究竟是誰……在什麼時候……"
103160-32 = "「生命守護者本艦」──被駭入了！！"
103160-34 = "這，這是……什麼情況……！？"
103160-35 = "有點奇怪……！#n為什麼現在「自爆程式」已經啟動了……！？"
103160-36 = "怎，怎麼會……？已經按下按鈕了嗎？#n逃脫準備不是還沒完成嗎！？"
103160-37 = "不，這是……！"
103160-39 = "執行「自爆程式」。"
103160-53 = "────！？！？"
103160-55 = "咦……？「自爆程式」啟動了？"
103160-56 = "什麼……？你剛才說什麼……？"
103160-57 = "這……究竟是？"
103160-58 = "大家，快趴下！！"
103160-68 = "……"
103160-69 = "究竟為什麼會……"
103160-70 = "發生什麼事了……"
103160-71 = "這是……船，自爆了……？#n為，為什麼……？"
103160-75 = "究竟發生了什麼……現在是什麼情況……"
103160-77 = "咳咳，咳咳……大家都還好嗎……？"
103160-78 = "怎麼會這樣！？"
103160-79 = "唔……！！"
103160-80 = "幸好爆炸的威力並不是很大……"
103160-81 = "這個狀況……沒問題，嗎……？"
103160-84 = "陽葵部長。可以請你說明現在的情況嗎？"
103160-85 = "……中計了。"
103160-86 = "咦，中計了……中了什麼計？"
103160-87 = "……在我們占領「阿特拉哈西斯的方舟」的這段期間，敵人……"
103160-88 = "──也在從後門掌控「生命守護者」。"
103160-89 = "……什麼！？"
103160-92 = "……現在「生命守護者本艦」的所有權已經落入敵人手中。"
103160-93 = "是，是在什麼時候……！#n話說要辦到這種事的話，敵人就得從內部進行物理性的接觸不是嗎！？"
103160-94 = "我可不記得有任何敵人進──"
103160-105 = "難……難道是那個時候……"
103160-106 = "別說是讓方舟自爆了……#n現在連「生命守護者本艦」都在協助「阿特拉哈西斯的方舟」進行多次元詮釋。"
103160-107 = "這樣下去的話「虛假的聖所」又會……"
103160-113 = "這是……"
103160-114 = "天，天空……！？"
103160-115 = "虛假的聖所……又要……！？"
103160-127 = "怎，怎麼了……！？"
103160-128 = "天，天空又……"
103160-131 = "……"
103160-133 = "……"
103160-134 = "……確認到緊急狀況。"
103160-141 = "……"
103160-142 = "老師……"
103160-144 = "天，天空又……！#n前，前輩，該怎麼辦！？"
103160-145 = "優香醬……老師……"
103160-147 = "天空……"
103160-148 = "老，老師是不是發生什麼事了……"
103160-149 = "這是……"
103160-153 = "……"
103160-160 = "聖，聖亞同學，彌香同學！"
103160-161 = "晚了一步呢，渚醬。#n聖亞醬已經先離開了。"
103160-162 = "……什麼？"
103160-163 = "他說自己有不祥的「預感」，所以想要先做點準備唷。"
103160-164 = "──還說「自己不在的時候如果發生什麼狀況就交給你們了」。"
103160-165 = "這樣啊……那我們也立刻採取行動吧。"
103160-166 = "嗯。了解☆"
103160-167 = "老師回來的時候，如果我們沒有好好處理，肯定會讓他失望的對吧！"
103160-168 = "──所以，之後再擔心老師吧。"
103160-170 = "天，天空──！？"
103160-171 = "日和，那種話沒必要說出來。"
103160-172 = "那，那是什麼意思呢美咲同學……我給人的印象就是總是說著「人生結束了」、#n「世間充滿苦痛」之類的負面發言嗎……？嗚……雖然是事實沒錯……！"
103160-174 = "……走吧。"
103160-175 = "嗯──不管發生什麼事都不該停止努力，對吧。"
103160-177 = "是……我，我們走吧！"
103160-178 = "……嗯。我們就做我們能做的事吧。"
103160-180 = "現在「生命守護者」的控制權處於被對方奪走的狀態……"
103160-181 = "正在追蹤駭入的位置……"
103160-182 = "……確認完畢。是在「阿特拉哈西斯的方舟」第4區域的中央。"
103160-183 = "……咦？這是那個地方的名字嗎？"
103160-184 = "多次元詮釋引擎管制室．「納拉姆辛的王座」──"
103160-185 = "就是從那裡駭入「生命守護者」的……必須阻止才行！！"
103160-187 = "大家，沒事吧？"
103160-188 = "嗯……沒事。沒受什麼傷……"
103160-189 = "所以，事情是那樣對吧……？"
103160-190 = "……"
103160-191 = "……那個「白子」之所以一再妨礙我們──"
103160-192 = "……只是想拖延時間而已嗎？"
103160-193 = "怎，怎麼會……那我們至今為止的……"
103160-195 = "作戰失敗……目前為止付出的努力，全都化為泡──"
103160-196 = "不，還沒結束。"
103160-197 = "白，白子前輩……？"
103160-199 = "[ns]「現在放棄還太早了。」"
103160-200 = "連，連老師也……您和白子前輩在一起嗎？#n現在人在哪裡……！？"
103160-209 = "嗯。我和老師正往第4區域中央，正在對「生命守護者」進行駭入的地方前進。"
103160-211 = "……什麼！？"
103160-212 = "[s]「我和白子會想辦法阻止駭入，之後的事情就交給你們了。」"
103160-213 = "……！！"
103160-214 = "什，咦！？"
103160-215 = "……！！"
103160-216 = "……老師。"
103160-224 = "看見管制室了。"
103160-225 = "立刻進去壓制敵人。"
103160-226 = "[s]「……好，上吧！」"
103160-242 = "[ns]（這裡是……）"
103160-244 = "發現敵人。"
103160-247 = "是綁架我的那傢伙……！"
103160-250 = "不准動──！！"
103160-251 = "要是敢有任何動作……我就開槍！！"
103160-253 = "放棄無謂的抵抗吧。"
103160-254 = "我這裡可是有「夏萊的老師」在。#n所以全都結束了。"
103160-255 = "乖乖投降吧，現在立刻……"
103160-257 = "…………"
103160-258 = "別，別動……！把雙手舉高！！"
103160-260 = "否則……我就要開槍了。"
103160-261 = "……停，停下來！"
103160-275 = "「……我們盼望，耶利哥的歎息。」#n「……我們記得，七項古則。」"
103160-280 = "唔──────！？"
103160-292 = "子彈……全都打偏了……？"
103160-293 = "在這種距離，怎麼會……？"
103160-296 = "[ns1]（那是……）\n[ns2]（我沒聽錯的話──）"
103160-297 = "老，老師……？"
103160-298 = "老，老師……？"
103160-299 = "老師……不行，情況……情況有點奇怪。"
103160-300 = "[s]「……白子，先退後吧。」"
103160-301 = "咦……？"
103160-303 = "[USERNAME]老師的生物驗證，完成。"
103160-304 = "[s3]「我的……名字？」\n[s4]「剛才，叫了我的名字……？」"
103160-308 = "常駐於「希迪姆的箱子」的系統管理者和主OS──"
103160-315 = "──A.R.O.N.A，等待命令中。"
103160-316 = "[s5]「………………」\n[s6]「…………彩……奈？」"
103160-320 = "「阿特拉哈西斯的方舟」修復系統啟動。"
103160-321 = "以「希迪姆的箱子」的權限，#n將遭到破壞的「阿特拉哈西斯的方舟」與多次元的同一存在進行交換與修復。"
103160-322 = "預計約30分鐘後將完全修復。"
103160-323 = "入侵方舟的「生命守護者本艦」將在800秒後啟動最終自爆程序。"
103160-325 = "……所以我不是說過了嗎。"
103160-330 = "既定的命運是無法改變的。"
103160-334 = "奇普托斯將依預定計畫迎向終焉。"
103160-337 = "我的──[USERNAME]老師。"
103160-339 = "Final.;To be Continued in Chapter 4"

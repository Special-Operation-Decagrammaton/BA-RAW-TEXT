[translation]
1012103-1 = "這可不是百花繚亂的方式哦！"
1012103-2 = "（來到了與紫約好的見面地點）"
1012103-3 = "（不過……）"
1012103-5 = "百鬼夜行附近的游泳池前"
1012103-9 = "（也許是因為連日酷暑的關係，就連泳池外都擠滿了人潮）"
1012103-10 = "啊，老師！這邊！"
1012103-14 = "小女子在這裡！"
1012103-18 = "哇啊！這裡人太多了，感覺一不小心就會走散！"
1012103-19 = "那，那個……可以請您稍微牽著我嗎？"
1012103-20 = "……那麼，嘿！"
1012103-25 = "呵呵，這樣就不會走散了。"
1012103-26 = "話說回來，這裡就是傳聞中的[ruby=Water Park]水上樂～園[/ruby]啊！"
1012103-27 = "果然是個非常棒的地方呢……"
1012103-28 = "[s1]「這還只是入口而已。」\n[s2]「裡面更厲害哦？」"
1012103-31 = "不過真正重要的東西，即使看不見也能感受到。"
1012103-32 = "從綻放在每個人臉上的笑容就能知道，[ruby=Water Park]水上樂～園[/ruby]一定是跟樂園一樣美妙的場所！"
1012103-33 = "小女子已經興奮得等不及了！老師！"
1012103-34 = "我們也趕快進去吧！"
1012103-36 = "哇……！老師您看！"
1012103-37 = "大家都穿著泳裝呢！"
1012103-38 = "[s3]「你感嘆的部分怎麼有點微妙……」\n[s4]「一般應該是感嘆設施或泳池才對吧……」"
1012103-41 = "先前老師教我的內容果然沒錯！#n大家都穿著符合Dress Code的服裝呢！"
1012103-42 = "換上與平常不同的打扮，盡情享受活動……簡直就像慶典一樣！"
1012103-43 = "出於百花繚亂的職責，小女子平時的立場大多偏向於管理方。#n不過今天……至少今天，小女子要和老師一起盡情享受！"
1012103-44 = "（傳來了人群的嘈雜聲……）"
1012103-48 = "咦……是小女子的錯覺嗎？#n總覺得氣氛好像突然變了……？"
1012103-49 = "大家都帶著困惑的表情往出口走去……#n難道裡面發生了什麼事故嗎……？"
1012103-53 = "感謝各位今日蒞臨本游泳池。  "
1012103-54 = "非常抱歉，今日的營業將提前結束。#n請仍在館內的顧客盡速離場。  "
1012103-55 = "這，這是怎麼回事……！？#n距離打烊不是還有一段時間嗎……"
1012103-56 = "難道這也是小女子所不知道的泳池文化！？"
1012103-57 = "大小姐也真是的……最近明明還挺老實的，結果又惹出了這種麻煩。"
1012103-61 = "不過現在已經沒問題了。#n因為這座泳池，已經以勘解由小路家的名義包下來了。"
1012103-62 = "管家……？你怎麼會在這裡……！？"
1012103-63 = "而且包場又是……！？"
1012103-64 = "雖然是個相當唐突的請求，所幸這裡的老闆非常通情達理。"
1012103-65 = "這都要歸功於勘解由小路家在百鬼夜行累積的恩德吧。"
1012103-66 = "勘解由小路家的……#n小女子並沒有希望這樣……"
1012103-67 = "不行！這可是攸關家族的問題！#n勘解由小路家的千金，怎麼能在大庭廣眾下裸露肌膚呢！"
1012103-68 = "啊，當然老師您是個例外。#n畢竟老師對我們有恩……"
1012103-69 = "況且也是大小姐的意思……"
1012103-70 = "……總之！還請老師明白這可是天大的榮幸！"
1012103-71 = "[s]「……感謝招待？」"
1012103-73 = "與老師單獨相處……這雖然是小女子夢寐以求的事……"
1012103-74 = "對吧？我馬上就離開，還請兩位慢慢……呵呵。"
1012103-76 = "咦～？今天不能去泳池玩嗎？"
1012103-77 = "我從昨天就很期待的說！"
1012103-78 = "好了好了，孩子們～#n我們下次再來吧……"
1012103-81 = "老師。"
1012103-82 = "小女子和老師在一起的每一刻……#n即便不在身邊……小女子只要想到老師，就會感到無比開心又心跳加速。"
1012103-83 = "因為和老師在一起的時光，對小女子來說既不丟臉又無比珍貴。"
1012103-87 = "所以，老師。"
1012103-88 = "[s5]「嗯，我懂你的意思。」\n[s6]「就照紫想做的去做吧。」"
1012103-91 = "是的！小女子在此鄭重宣告！"
1012103-92 = "為了自己的幸福而讓他人不幸……#n無論勘解由小路的意志如何，都不是紫的做法！"
1012103-93 = "既然大小姐這麼說也沒辦法……不過能請您避免使用泳池嗎？"
1012103-94 = "沒問題！"
1012103-95 = "您究竟為何要做到這個地步呢……我明白了。"
1012103-99 = "老師。"
1012103-100 = "真是抱歉。#n明明是小女子先邀請老師，卻因為家族的緣故變成這樣……"
1012103-101 = "咦？要我看那邊？"
1012103-105 = "呃……剛才的廣播造成各位的困擾，我們對此深感抱歉。#n今日的營業將繼續照常進行，另外……"
1012103-106 = "為了表達歉意，今天將改為免費入場！#n已經付費的顧客可至櫃檯辦理退費！"
1012103-107 = "既然已經收到包場費就不用擔心錢的問題了……重點是要挽回民心……！#n啊，麥克風怎麼還開著……！"
1012103-108 = "咦？怎麼回事？#n剛才不是說有大人物要來所以要清場嗎……"
1012103-109 = "可能是臨時改變主意了吧！#n而且居然還能免費……本來以為假日要毀了，結果變成了最棒的一天！"
1012103-111 = "耶，可以進泳池了！"
1012103-112 = "快去排滑水道！"
1012103-116 = "孩子們～用跑的很危險哦～"
1012103-119 = "……大家都露出了開心的笑容。"
1012103-120 = "[ns7]「這就是紫想要的結果吧？」\n[ns8]「我也覺得很高興。」"
1012103-123 = "是！"
1012103-125 = "（雖然沒能練習游泳，但回程時和紫一起去粗點心店度過了愉快的時光）"

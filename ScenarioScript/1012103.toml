[translation]
1012103-1 = "That's Not the Hyakkaryouran Way!"
1012103-2 = "I went to where Yukari and I agreed to meet."
1012103-3 = "And then..."
1012103-5 = "Outside the Hyakkiyako Water Park"
1012103-9 = "People waited in a long line, eager to escape the hot weather."
1012103-10 = "Ah! Sensei! Here!"
1012103-14 = "I'm so glad I spotted you."
1012103-18 = "It is so crowded... I could lose you in a second."
1012103-19 = "I-If you don't mind... May I hold on to your arm?"
1012103-20 = "...Right. We are secure."
1012103-25 = "Heehee. Entwined like this, you will never get rid of me."
1012103-26 = "Anyway, this must be the water-themed park that has people so excited."
1012103-27 = "I have heard that it is quite...the \"cool\" place."
1012103-28 = "[s1] \"This is just the entrance.\"\n[s2] \"It's much cooler inside.\""
1012103-31 = "Without even peering within, I, Yukari, see the truth."
1012103-32 = "Everyone here wears an eager smile, so this water-filled park must be an astounding location!"
1012103-33 = "Oh, I can barely contain my excitement, Sensei!"
1012103-34 = "Let us venture!"
1012103-36 = "Whoa...! Sensei, look!"
1012103-37 = "Everyone is donning swimsuits!"
1012103-38 = "[s3] \"THAT'S what impresses you?\"\n[s4] \"And there are lots of slides...\""
1012103-41 = "It is exactly as you said. Everyone understands the expected dress code."
1012103-42 = "Different costumes and fun activities... It resembles a festival!"
1012103-43 = "The Hyakkaryouran usually has me working through such events... But you and I are free to have fun today!"
1012103-44 = "*rabble rabble*"
1012103-48 = "Hm...? I sense unease. Why has the atmosphere changed?"
1012103-49 = "Everyone is being herded toward the exit. Oh no! Was there an accident in the pool, or an...\"accident\"?"
1012103-53 = "Thank you so much for visiting today!  "
1012103-54 = "Due to circumstances, we are closing early. Please, all guests must vacate immediately.  "
1012103-55 = "Wh-What's going on...?! I thought they were open for a few more hours..."
1012103-56 = "Are unscheduled evacuations also a part of swimming pool culture?"
1012103-57 = "My lady... And here I thought you were behaving well lately, but you're out here causing trouble!"
1012103-61 = "But all is well now. This unhygienic...water...playground...is now reserved for a private Kadenokouji event."
1012103-62 = "How did you get here...?!"
1012103-63 = "And did you say \"reserved\"?"
1012103-64 = "Yes. Though it was a sudden request, the owner was quite reasonable."
1012103-65 = "I suppose it's due to the Kadenokouji family's continued contributions to the community."
1012103-66 = "The Kadenokouji family... I didn't wish for such—"
1012103-67 = "Tut! This is a FAMILY matter! A precious Kadenokouji lady must not show her gleaming, honorable skin in public!"
1012103-68 = "Sensei, you are not considered part of the public. We respect you very much."
1012103-69 = "But, my lady, you know better than to behave this way. Where DOES this rebellious streak come from?"
1012103-70 = "...Anyway! You should know that you're lucky to be here, Sensei!"
1012103-71 = "[s] \"...? Thank you?\""
1012103-73 = "While I am grateful to be alone with Sensei..."
1012103-74 = "Very well. I shall leave you two to... Hoho!"
1012103-76 = "Huh? What do you mean the pool is closed?"
1012103-77 = "But you promised us yesterday that we could..."
1012103-78 = "No crying, now! We'll try again next week."
1012103-81 = "Sensei."
1012103-82 = "I value every moment we have together. The thought of you brings a smile to my face and a surge to my heart."
1012103-83 = "I believe that is because of your character. I am proud of who you are and what I have learned from you."
1012103-87 = "So, Sensei..."
1012103-88 = "[s5] \"I think I know...\"\n[s6] \"The floor's yours, Yukari.\""
1012103-91 = "Yes! Gather around, as I have a declaration for all to hear!"
1012103-92 = "Regardless of the Kadenokouji family's desires, I, Yukari, will never sacrifice another's joy for my own!"
1012103-93 = "So stubborn... If that's what you choose, then the family insists that you leave these public premises!"
1012103-94 = "Very well. I accept."
1012103-95 = "Why must you always...? Very well, then."
1012103-99 = "Sensei."
1012103-100 = "I apologize. I never imagined that my family would find out and object so fiercely..."
1012103-101 = "Hm? I should direct my attention this way?"
1012103-105 = "Uh... Apologies for the confusion with the earlier announcement. Due to...more circumstances, we are ACTUALLY open!"
1012103-106 = "And as penance, admission is free today! If you've already paid, please visit Customer Relations for a refund."
1012103-107 = "That oughta shut those whiners up, and that rich Kouji guy covered the day's fees, so we're still profitable, baby! ...Huh? The mic's still on?!"
1012103-108 = "Hm? Did you hear that? I thought they kicked us all to the curb!"
1012103-109 = "I guess their consciences got the best of them! And it's free! Wow, this day has really turned around!"
1012103-111 = "We can go in! Race you to the waterslide!"
1012103-112 = "Last one in's a rotten egg!"
1012103-116 = "Hey! No running!"
1012103-119 = "...Look at all those smiles."
1012103-120 = "[ns7] \"It's good to see.\"\n[ns8] \"Was it worth it?\""
1012103-123 = "Absolutely!"
1012103-125 = "While Yukari and I didn't get to swim, we picked up some snacks on the walk back and had a lovely time."

[translation]
1012103-1 = "นี่ไม่ใช่วิถีของเฮียกกะเรียวรันนะเจ้าคะ!"
1012103-2 = "(คุณครูออกมาหายูคาริตามนัด)"
1012103-3 = "(แต่ว่า...)"
1012103-5 = "หน้าสระว่ายน้ำใกล้ๆ เฮียกคิยาโค"
1012103-9 = "(คงเป็นเพราะอากาศที่ร้อนต่อเนื่องทุกวัน สระว่ายน้ำจึงคับคั่งไปด้วยผู้คนที่มาใช้บริการ)"
1012103-10 = "อ๊ะ! ท่านอาจารย์! ตรงนี้เจ้าค่ะ!"
1012103-14 = "ข้าอยู่ตรงนี้เจ้าค่ะ!"
1012103-18 = "ว้าว! ที่นี่คนเยอะมากเลย ถ้าเผลอไผลไปแม้แต่นิดเดียวก็น่าจะพลัดหลงได้เลยนะเจ้าคะ!"
1012103-19 = "ขะ... ข้าขอ... จับแขนท่านอาจารย์ไว้สักเดี๋ยวจะได้มั้ยเจ้าคะ?"
1012103-20 = "ถ้างั้นก็... หมับ!"
1012103-25 = "ฮุฮุ ทีนี้ก็ไม่ต้องกลัวว่าจะหลงแล้วเจ้าค่ะ!"
1012103-26 = "ที่นี่เองสินะเจ้าคะ วอเตอร์พาคุ~ที่คนเขาร่ำลือกัน!"
1012103-27 = "เป็นที่ที่ยอดเยี่ยมอย่างที่ได้ยินมาเลย..."
1012103-28 = "[s1] \"นี่แค่ทางเข้าเองนะ\"\n[s2] \"ข้างในน่ะน่าทึ่งกว่านี้อีก\""
1012103-31 = "สิ่งที่สำคัญจริงๆ ต่อให้มองไม่เห็นก็รู้สึกได้เจ้าค่ะ"
1012103-32 = "ทุกคนที่อยู่ที่นี่ต่างก็มีรอยยิ้มบนใบหน้า วอเตอร์พาคุ~แห่งนี้ต้องเป็นสถานที่วิเศษราวกับโลกอีกใบแน่ๆ เจ้าค่ะ!"
1012103-33 = "ข้าตื่นเต้นมากจนรอไม่ไหวแล้วเจ้าค่ะ! ท่านอาจารย์!"
1012103-34 = "พวกเรารีบเข้าไปกันเถอะเจ้าค่ะ!"
1012103-36 = "ว้าว...! ท่านอาจารย์ ดูสิเจ้าคะ!"
1012103-37 = "ทุกคนใส่ชุดว่ายน้ำกันหมดเลยเจ้าค่ะ!"
1012103-38 = "[s3] \"ประทับใจกับรายละเอียดเล็กๆ น้อยๆ สินะ...\"\n[s4] \"นอกจากชุด ที่นี่มีเครื่องเล่นกับสระน้ำให้ดูด้วยนะ...\""
1012103-41 = "มันเป็นสิ่งที่ข้าได้เรียนรู้จากท่านอาจารย์มาเมื่อวันก่อนนี่เจ้าคะ! ทุกคนใส่กันมาถูกต้องตามโดเรสุ~ โคโดะ~ เลยเจ้าค่ะ!"
1012103-42 = "ทุกคนแต่งตัวต่างจากปกติแล้วเพลิดเพลินไปกับกิจกรรมที่สนุกสนาน... แบบนี้เหมือนงานเทศกาลเลย#nเจ้าค่ะ!"
1012103-43 = "กับกิจกรรมของเฮียกกะเรียวรัน ส่วนมากข้าจะเน้นจัดการมากกว่าเข้าร่วม... แต่วันนี้ข้าจะเข้าร่วม#nกิจกรรมของที่นี่กับท่านอาจารย์อย่างเต็มที่เลยเจ้าค่ะ!"
1012103-44 = "(ซุบซิบ...)"
1012103-48 = "เอ๋...? นี่ข้าคิดไปเองหรือเปล่าเจ้าคะ รู้สึกเหมือนจู่ๆ บรรยากาศก็เปลี่ยนไปเลย...?"
1012103-49 = "ทุกคนกำลังเดินไปยังทางออกด้วยสีหน้าสับสนเจ้าค่ะ หรือว่ามีอุบัติเหตุอะไรเกิดขึ้นข้างใน...?"
1012103-53 = "ขอขอบคุณลูกค้าที่มาใช้บริการสระว่ายน้ำของเราในวันนี้ครับ  "
1012103-54 = "เราเสียใจที่จะแจ้งให้ทราบว่าวันนี้เราจะปิดให้บริการเร็วกว่าปกติ ขอให้ลูกค้าที่ยังอยู่ในอาคารทุกท่าน#nรีบออกไปทันทีครับ  "
1012103-55 = "นะ... นี่มันอะไรกันเจ้าคะ...?! อีกตั้งนานไม่ใช่เหรอกว่าจะถึงเวลาปิด..."
1012103-56 = "หรือนี่เป็นธรรมเนียมของสระว่ายน้ำที่ข้าไม่เคยรู้มาก่อนเจ้าคะ?!"
1012103-57 = "คุณหนูนี่ละก็... ช่วงหลังมานี้เห็นว่าไม่มีอะไรน่าห่วงแล้วแท้ๆ แต่มาซนอยู่แบบนี้นี่เอง"
1012103-61 = "แต่ตอนนี้ไม่เป็นไรแล้วเจ้าค่ะ ข้าเหมาสระว่ายน้ำนี้ในนามของตระกูลคาเดโนะโคจิไว้ให้แล้วเจ้าค่ะ"
1012103-62 = "คุณป้า มาที่นี่ได้ยังไง...?!"
1012103-63 = "ที่สำคัญกว่านั้น... คุณป้าเหมาสระเลยเหรอเจ้าคะ?!"
1012103-64 = "ถึงจะเป็นคำขอที่กะทันหัน แต่เจ้าของสระที่นี่ก็พูดจาเข้าใจง่ายเจ้าค่ะ"
1012103-65 = "ต้องขอบคุณตระกูลคาเดโนะโคจิที่สั่งสมคุณงามความดีไว้ในเฮียกกะเรียวรันน่ะเจ้าค่ะ"
1012103-66 = "คำขอของตระกูลคาเดโนะโคจิงั้นเหรอเจ้าคะ... ข้าไม่ได้ต้องการอะไรแบบนั้นสักหน่อย..."
1012103-67 = "ไม่ได้เจ้าค่ะ! นี่เป็นเรื่องของตระกูลเจ้าค่ะ! คุณหนูผู้สูงศักดิ์จากตระกูลคาเดโนะโคจิ#nจะมาเปิดเผยเนื้อหนังต่อสาธารณชนได้ยังไงกัน!"
1012103-68 = "อ่า... แน่นอนว่ากับท่านอาจารย์แล้วไม่เป็นไรเจ้าค่ะ พวกเราก็เป็นหนี้บุญคุณท่านอาจารย์เหมือนกัน..."
1012103-69 = "อีกอย่างนี่ก็เป็นสิ่งที่คุณหนูอยากทำด้วย..."
1012103-70 = "เอาเถอะเจ้าค่ะ...! เอาเป็นว่าท่านอาจารย์โชคดีมากเจ้าค่ะที่ได้สิทธิ์นี้!"
1012103-71 = "[s] \"ขอบคุณนะ...?\""
1012103-73 = "การได้อยู่กับท่านอาจารย์เพียงแค่ 2 คน... เป็นสิ่งที่ข้าเฝ้าหวังมาตลอดก็จริง..."
1012103-74 = "ใช่มั้ยล่ะเจ้าคะ? งั้นข้าขอตัวก่อนนะเจ้าคะ ทั้ง 2 คนจะได้... โฮะโฮะ"
1012103-76 = "อะไรน่ะ? วันนี้สระว่ายน้ำปิดเหรอ?"
1012103-77 = "ฉันตั้งตารอมาตั้งแต่เมื่อวานแล้วนะ!"
1012103-78 = "ไม่เป็นไรนะ เด็กๆ~ คราวหน้าไว้มาใหม่ก็ได้..."
1012103-81 = "ท่านอาจารย์"
1012103-82 = "ข้ามีความสุขทุกครั้งที่ได้อยู่กับท่านอาจารย์ และต่อให้ไม่ได้อยู่ด้วยกัน แค่ข้าคิดถึงท่านอาจารย์ ข้าก็สนุกและตื่นเต้นแล้วเจ้าค่ะ"
1012103-83 = "คงเป็นเพราะทุกช่วงเวลาที่ข้าได้อยู่กับท่านอาจารย์ เป็นช่วงเวลาล้ำค่าที่ข้าไม่รู้สึกเขินอายเลยเจ้าค่ะ"
1012103-87 = "เพราะงั้น ท่านอาจารย์เจ้าคะ"
1012103-88 = "[s5] \"อื้อ ครูพอเข้าใจแล้ว\"\n[s6] \"ทำตามที่ยูคาริอยากทำได้เลย\""
1012103-91 = "เจ้าค่ะ! ข้าขอประกาศอย่างภาคภูมิใจที่นี่!"
1012103-92 = "ไม่ว่าคาเดโนะโคจิจะคิดเห็นอย่างไร แต่การทำให้คนอื่นเดือดร้อนเพื่อประโยชน์สุขของตัวเอง นั่นไม่ใช่วิธีของยูคาริผู้นี้เจ้าค่ะ!"
1012103-93 = "ถ้าคุณหนูจะว่าอย่างนั้นก็คงช่วยไม่ได้... แต่เรื่องการใช้สระว่ายน้ำก็คงต้องหลีกเลี่ยงนะเจ้าคะ พอรับได้มั้ยเจ้าคะ?"
1012103-94 = "เจ้าค่ะ!"
1012103-95 = "ข้าเข้าใจค่ะ... ว่าเหตุใดคุณหนูถึงเป็นแบบนี้"
1012103-99 = "ท่านอาจารย์"
1012103-100 = "ข้าละอายใจจริงๆ เจ้าค่ะ ข้าเป็นคนชวนท่านอาจารย์ก่อนแท้ๆ แต่กฎที่เคร่งครัดของตระกูลข้าทำให้#nเรื่องกลายเป็นแบบนี้ไปได้..."
1012103-101 = "เจ้าคะ? ให้ดูตรงนั้นเหรอเจ้าคะ?"
1012103-105 = "เอ่อ... เราต้อง... ขอโทษที่ประกาศแบบนั้นออกไปจนทำให้ทุกท่านสับสนนะครับ วันนี้เรายังเปิดให้บริการตามปกติครับ แล้วก็... เอ่อ..."
1012103-106 = "เพื่อเป็นการแสดงการขอโทษ วันนี้เราจะให้ทุกท่านเข้าใช้บริการฟรีครับ! สำหรับท่านที่ชำระเงินแล้ว ให้ไปรับเงินคืนได้ที่เคาน์เตอร์นะครับ!"
1012103-107 = "ไม่เป็นไรหรอก ยังไงเราก็ได้ค่าเช่าเหมาสระมาแล้ว... และที่สำคัญกว่านั้น เราต้องซื้อใจลูกค้ากลับมาด้วย...! อ๊ะ ยังไม่ได้ปิดไมค์...!"
1012103-108 = "เอ๋? ตกลงมันยังไงเนี่ย? เมื่อกี้ยังขอให้ออกจากสระเพราะมีคนใหญ่คนโตมาเล่นน้ำอยู่เลย..."
1012103-109 = "คงเปลี่ยนใจแล้วน่ะสิ! แถมเรายังได้เล่นฟรีอีก นึกว่านี่จะเป็นวันหยุดสุดเห่ยซะแล้ว แต่กลับเป็นวันหยุดที่สุดยอดเลยนะ!"
1012103-111 = "ว้าว จะได้ลงสระว่ายน้ำแล้ว!"
1012103-112 = "รีบไปต่อแถวเล่นสไลเดอร์กันเถอะ!"
1012103-116 = "เด็กๆ~ อย่าวิ่งสิ มันอันตรายนะ~"
1012103-119 = "ทุกคนหัวเราะกันอย่างสนุกสนานเลยเจ้าค่ะ..."
1012103-120 = "[ns7] \"นี่คือสิ่งที่ยูคาริต้องการใช่มั้ยล่ะ?\"\n[ns8] \"ครูก็ชอบแบบนี้เหมือนกัน\""
1012103-123 = "เจ้าค่ะ!"
1012103-125 = "(ถึงจะไม่ได้ฝึกว่ายน้ำในสระ แต่เมื่อกลับจากสระว่ายน้ำ คุณครูกับยูคาริก็แวะไปที่ร้านขนมขบเคี้ยว แล้วใช้เวลาอย่างสนุกสนานด้วยกัน)"

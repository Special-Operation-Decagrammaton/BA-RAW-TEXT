[translation]
1002902-1 = "ชื่อวิชา: ความโรแมนติก"
1002902-6 = "(คุณครูมาที่ห้องเรียนห้องหนึ่งที่ทรีนิตี้ตามที่นัตสึบอก)"
1002902-7 = "(เพราะเป็นวันหยุดจึงทำให้ไม่เจอนักเรียนคนอื่นๆ ในโรงเรียน)"
1002902-8 = "โอ้... มาตรงเวลาเป๊ะเลยนะ"
1002902-13 = "สมกับเป็นคุณครูจริงๆ เตรียมตัวมาเข้าฟังบรรยายอย่างดี พอๆ กับเตรียมตัวมาบรรยายเองเลย#nยอดเยี่ยมมาก!"
1002902-14 = "[s1] \"หือ? จู่ๆ ก็จะมาสอนเหรอ?\"\n[s2] \"ที่บอกว่าจะ \"สอน\" นี่เอาจริงสินะ\""
1002902-15 = "ฮะฮะ... แน่นอนอยู่แล้ว ฉันก็บอกไปแล้วไม่ใช่รึไง? ฉันเป็นพวกที่พูดไปแล้วไม่คืนคำหรอกนะ"
1002902-16 = "ฮะฮะ... แน่นอนอยู่แล้ว ฉันก็บอกไปแล้วไม่ใช่รึไง? ฉันเป็นพวกที่พูดไปแล้วไม่คืนคำหรอกนะ"
1002902-17 = "แต่ไม่ต้องห่วง มันไม่น่าเบื่อหรือน่านอนเหมือนวิชาเรียนทั่วๆ ไปหรอก"
1002902-18 = "หืม? พูดแบบนั้นกับคนที่ทำอาชีพสอนหนังสือได้รึเปล่าน่ะเหรอ?"
1002902-19 = "ฮะฮะ..."
1002902-20 = "อะไรกันเล่า พวกเรามายอมรับในสิ่งที่ควรยอมรับกันอย่างตรงไปตรงมาเถอะ "
1002902-21 = "ตอนเด็กๆ คุณครูเองก็คงแอบหลับในห้องเรียนเหมือนกันไม่ใช่รึไง ก็นะ... ถ้าไม่ใช่ก็ช่างเถอะ"
1002902-22 = "การเปิดเผยตัวตนแท้จริงไร้สิ่งปิดบังของกันและกันให้เห็น... มันเป็นเรื่องพื้นฐานของเรื่องโรแมนติก"
1002902-23 = "เอาเป็นว่า... นี่คือเหตุผลที่ฉันเรียกคุณครูมา..."
1002902-24 = "หัวข้อการบรรยายของวันนี้ก็คือ \"ความโรแมนติก\" ละ"
1002902-25 = "ความโรแมนติกคืออะไร? คนที่มีความโรแมนติกคือคนแบบไหน?"
1002902-26 = "คุณครูคงจะคิดใช่มั้ยล่ะ ว่าทำไมเด็กคนนี้ถึงได้มาพูดเรื่องพวกนี้?"
1002902-27 = "ตอนคุยใน MOMOTALK ก็พูดแต่เรื่องเข้าใจยากกับเรื่องคุกกี้ แต่ตอนนี้จะมาพูดเรื่องปรัชญาอย่างนั้น#nน่ะเหรอ?"
1002902-28 = "แน่นอนว่าตอนนี้น่ะพูดได้สบายมาก ก่อนอื่นฉันจะให้หนังสือเรียนกับคุณครูก่อน..."
1002902-29 = "และนี่ก็คือ..."
1002902-30 = "อุปกรณ์การเรียนที่จะใช้วันนี้!!"
1002902-35 = "[ns3] \"คุกกี้โฮมเมดนี่นา\"\n[ns4] \"ดูน่าอร่อยดีนะ\""
1002902-38 = "ฮุฮุ แต่สิ่งที่สำคัญไม่ใช่รสชาติของมันหรอก"
1002902-39 = "ที่สำคัญคือหน้าตาของพวกมันต่างหากล่ะ"
1002902-40 = "หืม...? แปลกใจงั้นเหรอ?"
1002902-41 = "พอฉันที่เป็นสมาชิกชมรมของหวานหลังเลิกเรียนพูดแบบนั้นเกี่ยวกับเรื่องรสชาติ เลยตกใจนิดหน่อย#nงั้นเหรอ?"
1002902-42 = "ฮ่าฮ่าฮ่า..."
1002902-43 = "คุณครู เพราะแบบนั้นแหละ ฉันอยู่ใน \"ชมรมของหวานหลังเลิกเรียน\" นะ ไม่ใช่ \"ชมรมค้นหาร้านขนม#nหวานแสนอร่อยหลังเลิกเรียน\" สักหน่อย"
1002902-44 = "แค่เพราะพูดว่าไม่ใช่ \"สิ่งสำคัญที่สุด\" แต่ก็ไม่ได้หมายความว่าไม่สำคัญนี่นา"
1002902-45 = "แค่บอกว่าสำคัญกว่ารสชาติเท่านั้นเอง"
1002902-46 = "ซึ่งก็คือ... หน้าตาของมันไงล่ะ"
1002902-51 = "ดูคุกกี้นี่สิ พวกคุกกี้โฮมเมดน่ะจะมีรูปร่างและการตกแต่งต่างกันไป"
1002902-52 = "เหมือนกับหวีที่เป็นสิ่งที่บ่งบอกถึงความอิสระและรสนิยมของผู้คน คุกกี้พวกนี้ได้ถูกทำขึ้นมาทีละชิ้น#nและได้ซึมซับความรู้สึกของคนทำเอาไว้"
1002902-53 = "เพราะเวลาที่ทำจะต้องไม่คิดเรื่องอื่นและจดจ่ออยู่กับมัน..."
1002902-54 = "จิตใจและความคิด ณ ช่วงเวลานั้นๆ ก็จะซึมซับอยู่ในคุกกี้แต่ละชิ้นเหมือนกับรูปภาพที่บันทึกเรื่องราว#nในช่วงเวลานั้นไว้"
1002902-55 = "กล่าวคือผลผลิตที่เปี่ยมไปด้วยความจริงใจ และความคิด โดยที่คนทำไม่ได้รู้ตัว..."
1002902-56 = "เรียกว่าเป็นการแสดงความรักที่แสนโรแมนติกอย่างแท้จริงไงล่ะ!"
1002902-57 = "เพราะแบบนั้นละ ฉันถึงชอบคุกกี้ ถึงขนมหวานราคาแพงอื่นๆ จะอร่อยก็จริง แต่ว่าขนมโฮมเมดแบบนี้#nก็อร่อยเหมือนกัน"
1002902-58 = "เพราะงั้นตอนที่ฉันอบคุกกี้อยู่ จู่ๆ ก็คิดว่าถ้าให้คุณครูได้รู้หลักปรัชญาข้อนี้ด้วยก็น่าจะดีน่ะ"
1002902-59 = "นั่นละคือเหตุผลที่ฉันเรียกคุณครูมา บางครั้งตอนที่คิดแบบนี้ ฉันจะทนไม่ได้ถ้าไม่ได้บอกใครออกไป"
1002902-60 = "แต่บางทีอาจกลายเป็นว่าทำให้รำคาญใจด้วยเรื่องไม่เป็นเรื่องรึเปล่านะ? ฮะฮะ..."
1002902-61 = "ขอบคุณที่ฟังฉันนะ ฉันอาจไม่มีอะไรให้เป็นการตอบแทน... แต่ว่าฉันจะให้อุปกรณ์การเรียนนั่นเป็น#nของขวัญแล้วกัน"
1002902-68 = "ถึงฉันจะบอกว่ารสชาติไม่ใช่เรื่องสำคัญก็เถอะ แต่ฉันก็มั่นใจฝีมือตัวเองพอตัวเลยนะ รับรองว่ากินได้แน่"
1002902-69 = "หืม...? มากินด้วยกันที่นี่เหรอ? กินด้วยกัน...?"
1002902-70 = "เฮ้อ..."
1002902-71 = "คุณครู จำเนื้อหาที่เรียนวันนี้ไม่ได้เหรอ"
1002902-72 = "ฉันเพิ่งบอกไปเองนะ ว่าคุกกี้แต่ละชิ้นน่ะซึมซับจิตใจของคนทำเอาไว้โดยบังเอิญด้วย"
1002902-73 = "เพราะงั้นถึงจะเสียมารยาท แต่ฉันขอปฏิเสธข้อเสนอนั่นแล้วกัน เก็บไว้กินในที่ที่ฉันไม่อยู่ดีกว่า"
1002902-74 = "เอาล่ะ! ถ้างั้นคาบเรียนวันนี้ก็จบแล้วละ!"
1002902-75 = "ฉันกลับก่อนนะ พอฉันออกไปแล้วคุณครูค่อยออกมาล่ะ"
1002902-76 = "หรือไม่งั้นจะอยู่ทบทวนบทเรียนที่นี่คนเดียวก็ได้นะ"
1002902-77 = "ฮุฮุฮุ ถ้างั้น...ไปละนะ!"
1002902-82 = "(หลังจากที่นัตสึออกไปแล้ว คุณครูที่ยังอยู่ในห้องก็หยิบคุกกี้รูปร่างต่างๆ มากิน และใช้เวลาอยู่ตาม#nลำพัง)"
1002902-83 = "(...อันที่จริงคุณครูไม่ได้เข้าใจสักนิดเดียวว่ารูปร่างของคุกกี้แต่ละอันมีความหมายอะไรแฝงอยู่...)"

[translation]
1002902-1 = "第一堂課「科目：浪漫」"
1002902-6 = "（夏所說的地方，是三一的某個教室）"
1002902-7 = "（可能今天是週末，所以教室裡沒有其他學生）"
1002902-8 = "哦～你來的剛剛好。"
1002902-13 = "不愧是老師。不只是在台上教書，連在台下被教的準備都做好了，真優秀～"
1002902-14 = "[s1] 「被教……？」\n[s2] 「這麼說來，你好像是要教我關於『浪漫』的事？」"
1002902-15 = "呵呵，沒錯～#n別看我這樣，我可是言出必行的人呢。"
1002902-16 = "呵呵，沒錯～#n別看我這樣，我可是言出必行的人呢。"
1002902-17 = "啊啊，但不用擔心。#n我不會像普通的課程那樣，讓人感到好無聊～好想睡～的。"
1002902-18 = "咦，在老師面前說這種話是不是不太好？"
1002902-19 = "嘻。"
1002902-20 = "哎呀哎呀，反正這種事也沒什麼好隱瞞的。"
1002902-21 = "老師在上課的時候也常常會睡著吧？#n沒有？哎呀都行啦。"
1002902-22 = "不假修飾地，向對方一五一十地坦承……#n這樣的精神可是通往浪漫的第一步哦。"
1002902-23 = "總之……"
1002902-24 = "今天的課程主題就是「浪漫」哦。"
1002902-25 = "何為浪漫？所謂的浪漫究竟是什麼呢？"
1002902-26 = "我來猜猜，老師現在肯定在想，「為什麼突然開始說這些？」吧。"
1002902-27 = "「為什麼突然在MomoTalk上說些看不懂的話，還說起餅乾了呢」……！"
1002902-28 = "不過，會有這樣的疑問也是當然的。#n現在就為疑惑的老師，提供一點小小的教材吧！！"
1002902-29 = "那就是……"
1002902-30 = "這個！登登！！"
1002902-35 = "[ns3] 「手工餅乾啊。」\n[ns4] 「看起來真好吃。」"
1002902-38 = "呵呵，對吧。"
1002902-39 = "但──是！現在最重要的並非這些餅乾是不是手工製作，也不是餅乾的味道。"
1002902-40 = "……嗯？怎麼了嗎？"
1002902-41 = "明明是放學後的甜點部卻說味道不重要，讓你感到很意外？"
1002902-42 = "啊哈──"
1002902-43 = "是個不錯的著眼點呢，老師。但你應該已經知道答案了才對哦。#n因為我們是「放學後的甜點部」，而不是「放學後的美食探訪部」呀！"
1002902-44 = "而且，我也只是說……"
1002902-45 = "這不是「現在最重要的」而已。"
1002902-46 = "那麼～現在最重要的是什麼呢？#n……答案是，「外觀」。"
1002902-51 = "你看這些餅乾，每一片手工餅乾都有各自不同的外觀和裝飾對吧？"
1002902-52 = "製作者的心意與喜好自然而然融入其中的結果……#n即使並非有意為之，餅乾裡也會蘊含各種不同的情感。"
1002902-53 = "在製作這塊餅乾的時候……"
1002902-54 = "就像是把每一個瞬間拍下來的照片一樣，把當下的心情用餅乾的型態留下來。"
1002902-55 = "也就是說，不管是當下的心情還是想法，說不定連做餅乾的本人都沒察覺，有意無意地就做出了各式各樣的餅乾。"
1002902-56 = "……這不正是，浪漫的體現嗎！"
1002902-57 = "所以啊，所以我很喜歡手工餅乾。#n其他的高級甜點固然也不錯，但這有它獨有的一番風味。"
1002902-58 = "這是在做餅乾時腦袋裡突然浮現的想法，也想分享給老師。"
1002902-59 = "……嘛，就是這樣。#n我總是想到某些事情，就會忍不住想要跟別人說。"
1002902-60 = "抱歉呢──還讓你特地跑來。嘻嘻。"
1002902-61 = "謝謝你聽我說～#n雖然說不上是謝禮，那個教材就當成禮物送給老師吧～"
1002902-68 = "雖然剛才說過味道不重要，但我想應該不錯吃喔。#n對自己的實力很有信心，呵。"
1002902-69 = "……嗯？你要在這裡馬上吃？跟我一起？"
1002902-70 = "呣……"
1002902-71 = "抱歉老師，還請容我拒絕這誘人的邀約。#n回想一下今天上課的內容吧～"
1002902-72 = "我剛才不是說了嗎？#n每一個餅乾的模樣，都在無意間包含了心意。"
1002902-73 = "所以在我面前吃著實有點不浪漫啊～#n至少也要到我不在的地方再吃吧～不然實在有點害羞呢。"
1002902-74 = "好了，今天的課到此結束！！"
1002902-75 = "起立！那我先回去囉。#n請老師自己找個時間差離開吧。"
1002902-76 = "……或者是自己留下來複習今天上課的教材也可以。"
1002902-77 = "嘻。那再見囉～"
1002902-82 = "（在夏離開後的教室中，一個個端詳著餅乾）"
1002902-83 = "（形狀各異的餅乾中究竟蘊含著什麼樣的意義，彷彿明白了，又好像不太明白……）"

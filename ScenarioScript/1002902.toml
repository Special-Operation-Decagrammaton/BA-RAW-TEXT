[translation]
1002902-1 = "#title;강의명: 로망"
1002902-2 = "#wait;500"
1002902-3 = "#wait;1000"
1002902-4 = "#all;hide"
1002902-5 = "#wait;1000"
1002902-6 = "#na;(나츠의 안내대로 트리니티의 한 교실에 들렀다.)"
1002902-7 = "#na;(주말이라 그런지 교실에는 다른 학생들이 보이지 않았다.)"
1002902-8 = "#na;???;오-. 딱 맞춰 와줬군."
1002902-9 = "#st;[0,0];instant;1;"
1002902-10 = "#clearST"
1002902-11 = "#wait;1800"
1002902-12 = "3;나츠;00\n#3;a\n#wait;1300"
1002902-13 = "3;나츠;03;역시 선생님이야. 본인이 수업을 하는 사람이니만큼, 받을 준비도 잘 돼 있구만. 훌륭하네~.\n#3;greeting\n#3;em;[음표]"
1002902-14 = "[s1] \"예? 갑자기 수업입니까?\"\n[s2] \"'가르쳐준다'는 게 정말 그 뜻이었을 줄이야.\""
1002902-15 = "3;나츠;05;하하. 당연하지. 처음부터 그렇게 말했잖아? 나는 한번 뱉은 말은 지키는 타입이라고.\n#3;em;[반응]"
1002902-16 = "3;나츠;05;하하. 당연하지. 처음부터 그렇게 말했잖아? 나는 한번 뱉은 말은 지키는 타입이라고.\n#3;em;[반응]"
1002902-17 = "3;나츠;01;하지만 걱정할 건 없어. 보통의 교과목 수업처럼 따분하거나 잠 오진 않을 테니까."
1002902-18 = "3;나츠;02;응? 일단은 교직에 종사하는 사람에게 그런 말을 해도 괜찮냐고?\n#3;em;[?]"
1002902-19 = "3;나츠;99;……하하."
1002902-20 = "3;나츠;07;왜 이래. 우리 서로 솔직하게 인정할 건 인정하자고. \n#3;em;[음표]"
1002902-21 = "3;나츠;07;선생님도 소싯적엔 수업시간에 많이 잤을 거 아냐. 뭐-. 아니면 말고."
1002902-22 = "3;나츠;02;허례허식 없이 서로의 알몸을 드러내는 마인드. 그것 또한 로망을 위한 기본이니까 말이야."
1002902-23 = "3;나츠;99;……아무튼. 그래서 오늘 선생님을 여기에 부른 이유.\n#3;em;…"
1002902-24 = "3;나츠;01;오늘의 강의 주제가 바로 그 '로망'이야."
1002902-25 = "3;나츠;05;로망이란 무엇인가? 로맨틱한 사람이란 어떤 사람인가?\n#3;em;[?]"
1002902-26 = "3;나츠;05;이쯤 오면 선생님은 생각하고 있겠지. 왜 이 녀석은 갑자기 이런 소리를 시작하는 거야?"
1002902-27 = "3;나츠;02;모모톡으로 알 수 없는 인용구와 쿠키 이야기를 내뱉더니, 이제는 갑자기 철학강의를 시작한다고?"
1002902-28 = "3;나츠;01;물론 지금은 그걸로 충분해. 그런 선생님을 위해 우선 교재를 건네 주도록 하지.\n#3;em;[반응]"
1002902-29 = "3;나츠;99;이게 바로……."
1002902-30 = "3;나츠;05;오늘의 수업 교재야!!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
1002902-31 = "#st;[0,0];instant;1;"
1002902-32 = "#clearST"
1002902-33 = "3;나츠;05\n#3;greeting\n#3;closeup\n#wait;2000"
1002902-34 = "3;나츠;05\n#3;em;[반짝]\n#3;closeup\n#wait;2000"
1002902-35 = "[ns3] \"수제 쿠키구나.\"\n[ns4] \"맛있어 보이네.\""
1002902-36 = "#wait;100"
1002902-37 = "#wait;100"
1002902-38 = "3;나츠;99;후후. 허나 맛은 가장 중요한 게 아니야.\n#3;em;…"
1002902-39 = "3;나츠;01;그보다 중요한 것은 녀석들의 생김새지."
1002902-40 = "3;나츠;02;……응? 의외라고?\n#3;em;[?]"
1002902-41 = "3;나츠;02;다른 사람도 아닌 방과후 디저트부 부원인 내가 맛에 대해 그렇게 말한 게 놀랍다고?"
1002902-42 = "3;나츠;99;하하하."
1002902-43 = "3;나츠;05;선생님. 바로 그렇기 때문에 내가 '방과후 디저트부'인 거야. '방과후 맛집 탐방부'가 아니라.\n#3;em;[반짝]"
1002902-44 = "3;나츠;01;그리고 '가장 중요한 것'이 아니라 했지 중요하지 않다곤 안했잖아?"
1002902-45 = "3;나츠;99;맛보다 더 중요한 것이 있다고 했을뿐."
1002902-46 = "3;나츠;01;……바로 생김새야."
1002902-47 = "#st;[0,0];instant;1;"
1002902-48 = "#clearST"
1002902-49 = "3;나츠;01\n#3;m4\n#wait;1200"
1002902-50 = "3;나츠;01\n#3;greeting\n#wait;1500"
1002902-51 = "3;나츠;05;이 쿠키들을 봐. 수제 쿠키들은 모두 저마다 다른 생김새와 데코레이션을 하고 있어.\n#3;em;[반응]"
1002902-52 = "3;나츠;05;빚은 사람의 자유와 취향이 담긴 만큼, 무의식적으로 하나하나 만들면서 그 당시에 품은 마음들이 담기는 거지."
1002902-53 = "3;나츠;99;다른 걸 생각하지 않고 오직 거기에만 집중하며…….\n#3;em;…\n#3;m3"
1002902-54 = "3;나츠;01;그 순간순간 사람이 떠올린 마음들이 순간을 포착한 사진처럼 쿠키의 형태로 남아있는 거야."
1002902-55 = "3;나츠;02;마음 가는 대로, 생각한 대로, 본인도 모르는 진심을 담아 무의식적으로 빚어낸 결과물."
1002902-56 = "3;나츠;05;실로 로망의 현현이라고 할 수 있지!\n#3;em;[반짝]"
1002902-57 = "3;나츠;01;그래서 난 쿠키를 좋아해. 다른 값비싼 디저트들도 좋지만 이건 이것 대로의 맛이 있거든."
1002902-58 = "3;나츠;02;그래서 쿠키를 만들다 보니, 문득 선생님도 이 철학을 알아줬으면 좋겠다는 생각이 들었어."
1002902-59 = "3;나츠;01;……부른 이유는 사실 그것뿐이야. 가끔 이런 생각이 들면, 누군가에게 말하지 않곤 못 버티거든.\n#3;em;…"
1002902-60 = "3;나츠;99;어쩌면 별것도 아닌 일로 귀찮게 해버린 걸까? 하하."
1002902-61 = "3;나츠;02;들어줘서 고마워. 답례라고 하긴 뭣하지만, 대신 그 교재를 선물로 주도록 할게.\n#3;em;[반응]"
1002902-62 = "#st;[0,0];instant;1;"
1002902-63 = "#clearST"
1002902-64 = "3;나츠;02\n#3;d\n#wait;1000"
1002902-65 = "3;나츠;02\n#3;closeup\n#3;a\n#wait;1000"
1002902-66 = "#wait;1000"
1002902-67 = "3;나츠;01\n#3;closeup\n#3;greeting\n#wait;1500"
1002902-68 = "3;나츠;02;맛이 별로 중요하진 않다고 했지만, 나름대로 실력에는 자신이 있으니 먹을만할 거야.\n#3;closeup"
1002902-69 = "3;나츠;01;……음? 여기서 지금 바로 먹자고? 같이?\n#3;closeup"
1002902-70 = "3;나츠;99;……하아.\n#3;em;[속상함]\n#3;stiff\n#3;closeup"
1002902-71 = "3;나츠;01;선생님. 오늘 수업의 내용을 기억해봐.\n#3;closeup"
1002902-72 = "3;나츠;02;아까도 말했잖아? 쿠키의 모양들은 무의식적인 마음들이 담겨 있는 것들이라고.\n#3;em;[?]\n#3;closeup"
1002902-73 = "3;나츠;01;그러니 미안하지만 그 제안은 사양하도록 하겠어. 그건 적어도 내가 없는 곳에서 먹어 주길 바래.\n#3;closeup"
1002902-74 = "3;나츠;02;자-. 그럼 오늘 수업은 여기서 끝!!\n#3;em;[반응]\n#3;closeup"
1002902-75 = "3;나츠;01;난 먼저 돌아가겠어. 선생님은 내가 나간 뒤에 나와줘.\n#3;closeup"
1002902-76 = "3;나츠;02;……아니면 남아서 오늘 받은 교재를 혼자 복습해 보는 것도 좋겠지.\n#3;closeup"
1002902-77 = "3;나츠;03;후후후후. 그럼 이만!!\n#3;em;[음표]\n#3;greeting\n#3;closeup"
1002902-78 = "#st;[0,0];instant;1;"
1002902-79 = "#clearST"
1002902-80 = "3;나츠;03\n#3;dr\n#wait;3000"
1002902-81 = "#all;hide"
1002902-82 = "#na;(이후 나츠가 사라진 뒤 교실에 남아, 다양한 모양의 쿠키들을 먹으며 잠시 시간을 보냈다.)"
1002902-83 = "#na;(……솔직히 각각의 모양에 무슨 의미가 담겨있는지까지는 잘 알 수 없었다.)"

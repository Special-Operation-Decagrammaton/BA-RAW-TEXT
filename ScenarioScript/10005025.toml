[translation]
10005025-5 = "อะ... อะไรเนี่ย!? เสียงระเบิดอะไรน่ะ? มีอุบัติเหตุเรอะ?"
10005025-6 = "ไม่ใช่... นี่มัน...! เสียงระเบิดจากลูกระเบิดต่างหากเล่า!"
10005025-7 = "ว่าไงนะ? ระเบิดเรอะ? หมายความว่าพวกเราถูกโจมตีงั้นเรอะ?"
10005025-8 = "แจ้งทุกคนเร็วเข้า!! รายงานกับหัวหน้าด้วย! ศัตรูบุกโจมตีแล้ว! มีศัตรูบุกโจมตี!"
10005025-9 = "บอกไปว่าเราต้องการให้ส่งบันนี่ 2 มา! นี่ไม่ใช่การซ้อม ย้ำ! นี่ไม่ใช่การซ้อม! เป็นสถานการณ์จริง!"
10005025-12 = "อืม..."
10005025-13 = "ดูเหมือนจะจัดการได้ถูกจุดเลยนะ โชคดีที่เราไม่ถูกเจอตัวหรือไม่ถูกเปิดโปงแผนการ"
10005025-14 = "ตอนนี้กล้องวงจรปิดก็บอดไปชั่วขณะแล้ว..."
10005025-18 = "[ns1] \"อาคาเนะ บาดเจ็บตรงไหนมั้ย?\"\n[ns2] \"เป็นอะไรรึเปล่า? ไม่บาดเจ็บใช่มั้ย?\""
10005025-19 = "ไม่ค่ะ... คือ..."
10005025-20 = "ไม่ค่ะ... คือ..."
10005025-21 = "ขอโทษด้วยค่ะคุณครู ฉันทำพลาดครั้งใหญ่ซะแล้ว..."
10005025-22 = "พอมานึกดูแล้ว ภารกิจครั้งนี้เป็นภารกิจการนำตัวชิโระอุซางิกลับไปอย่างลับๆ และไม่ควรใช้ระเบิด#nจริงๆ ด้วยค่ะ"
10005025-23 = "แต่ด้วยความเคยชิน ฉันก็เลย..."
10005025-24 = "สุดท้ายก็ทำให้พวกนั้นรู้ว่ามีผู้บุกรุกเข้ามาจนได้สินะคะ..."
10005025-25 = "ทั้งหมดเป็นความผิดของฉันเองค่ะ น่าละอายใจจริงๆ..."
10005025-26 = "อาคาเนะ?"
10005025-28 = "อ่า! ให้ตายสิ...!"
10005025-29 = "ก็บอกแล้วไงว่าอย่าเสียเวลาให้เหนื่อยเลย บุกเข้าไปซัดให้หมดเลยดีกว่าน่า"
10005025-30 = "นี่เรากำลังทำอะไรกันอยู่เนี่ย? แค่การ์ดไม่กี่คนเอง ทำไมถึงต้องวิ่งหนีมาเหมือนพวกเด็ก#nนักเรียนหญิงขี้กลัวกันด้วย"
10005025-31 = "[s3] \"แล้วเนรุไม่ใช่นักเรียนรึไง!?\"\n[s4] \"หึหึ เกือบลืมไปแล้วนะว่าเนรุก็เป็นเด็กนักเรียน\""
10005025-32 = "ครูนี่ก็อีกคน...!!"
10005025-33 = "ครูนี่ก็อีกคน...!!"
10005025-34 = "คุณครู...?"
10005025-35 = "คุณครูไม่ลงโทษฉันเหรอคะ...? ทำไมล่ะ...?"
10005025-36 = "[s5] \"ครูบอกไปแล้วนี่ว่าไม่ได้มาจับตาดูพวกเธอ\"\n[s6] \"แผนการไม่ได้ล้มเหลวสักหน่อย\""
10005025-37 = "คะ? หมายความว่ายังไงคะ...?"
10005025-38 = "คะ? หมายความว่ายังไงคะ...?"
10005025-39 = "คะ...? คุณครูมีวิธีอยู่เหรอคะ?"
10005025-40 = "แผน B เหรอ...?"
10005025-41 = "อาจมีคนที่พอจะถามได้อยู่... งั้นเหรอคะ?"

[translation]
42020-1 = "第2話;ウサギの見る夢"
42020-4 = "「SRT特殊学園は……連邦生徒会長の認可の下……」"
42020-6 = "「SRTの小隊は少数精鋭のチームで構成され……」"
42020-8 = "「……正義とは、理にかなった正しい道理のこと。」"
42020-11 = "「SRTの正義は、いかなる状況でも揺らぎはしません。」"
42020-15 = "……テレビに映る先輩方は、眩いほど輝いていた。"
42020-16 = "理想を体現したその姿は……私たちの[ruby=せんぼう]羨望[/ruby]、そのものだった。"
42020-18 = "過酷な状況にも決して折れない、強い信念と厳格な規律に憧れた。"
42020-19 = "どんな悪人をも一撃で制圧できる、圧倒的な力に憧れた。"
42020-20 = "[ruby=おぞ]悍[/ruby]ましい敵の前でも揺るがない、大胆な勇気に憧れた。"
42020-22 = "――いつまでも変わらない正義に憧れた。"
42020-23 = "先輩方は私たちの夢、そして未来だった。"
42020-24 = "その背中を追って走り――"
42020-26 = "そして私たちは……"
42020-30 = "SRTになった。"
42020-33 = "んん……。"
42020-34 = "あっ、ミヤコちゃん。おはよう。"
42020-35 = "……おはようございます、ミユ。"
42020-36 = "もう起きるの？朝ごはんまでまだ時間あるよ……？"
42020-37 = "ミヤコちゃん、昨日の夜間警戒で遅かったから……もう少し寝ててもいいのに。"
42020-38 = "大丈夫です、睡眠は十分に取れましたので。"
42020-42 = "今日はいい天気ですね、洗濯物もよく乾きそうです。"
42020-43 = "ところで、モエとサキは……？"
42020-44 = "さっき、おかずになる食材を探しに行くって……。"
42020-51 = "おい、見てくれ！"
42020-52 = "いつもの散歩コースから少し外れたところに、キノコがたくさん生えてたんだ！#nデカいやつを集めてきたぞ。"
42020-53 = "これだけあれば、キノコだけで2日は持つな！"
42020-58 = "くひひひ……こっちもビックリするかもよ？"
42020-59 = "ほら見て、卵がいっぱい！"
42020-60 = "さっき商店街でもらってきたんだ。害虫駆除のお礼だって。"
42020-61 = "ちょ～っと、新しい煙幕弾を試しただけなんだけど……得しちゃったね。"
42020-62 = "わっ……新鮮な食材がこんなに……！"
42020-66 = "缶詰のパンも残っていますから……今日の朝ごはんは豪華になりそうですね。"
42020-67 = "くひひ、ワクワクしてくるねぇ。#nそれじゃ、まずは火をおこさないと。私、枯れ枝を集めてくるよ。"
42020-68 = "フライパンと野菜の準備は任せろ！"
42020-69 = "それでは、調味料やその他の準備は私がしますね。"
42020-73 = "わ、私も手伝う……！"
42020-78 = "パンにキノコ炒めと卵……今まで想像すらできなかった贅沢な朝食だな。"
42020-79 = "毎日これくらい豊かなご飯を食べていたい――"
42020-80 = "んだねぇ。それに、今日は涼しくて天気もいいし……"
42020-81 = "こんな日々が続くなら、ずっとここにいてもいいかも――"
42020-86 = "……なぁ。私たち、この状況に慣れすぎてないか？"
42020-87 = "……たしかに。なんかもう、作戦は二の次で生活の些細なあれこれが改善されることに一喜一憂しているくらいだし……。"
42020-88 = "くっ……SRTのエリートだというのに……#n装備は常に最先端の特殊学園の小隊員なのに……。"
42020-89 = "……この話はやめよう。#nせっかくの素敵なご飯がまずくなっちゃう。"
42020-90 = "そうだな。今は食事に――"
42020-94 = "[ns] \"おはよう、みんな元気？\""
42020-95 = "あ、[USERNAME]先生だ。"
42020-96 = "ああ、見慣れた顔がいると思ったら先生か。"
42020-97 = "いらっしゃい、先生。今日は気分がいいから歓迎してやる。"
42020-98 = "[s1] \"サキに満面の笑みで歓迎されるなんて……。\"\n[s2] \"先生になってよかった……。\""
42020-99 = "う、うるさい！満面の笑みじゃないし！"
42020-100 = "う、うるさい！満面の笑みじゃないし！"
42020-107 = "あ、先生。おはようございます。"
42020-108 = "こんな朝早くにどうしたのですか？#n特に連絡はしていませんが……"
42020-109 = "もしかして、何か問題でも……？"
42020-110 = "[s] \"ううん、そういうのじゃなくて……。\""
42020-112 = "[ns] \"この前のお礼をしたかったんだ。\""
42020-113 = "この前の……。"
42020-114 = "ああ……あの事件のことか。"
42020-119 = "……キヴォトスの危機なんて、刺激的な体験だったよねぇ。"
42020-120 = "破滅を楽しむ私でも背筋が凍っちゃうくらいだったよ、くひひ……。"
42020-121 = "空は真っ赤で、正体不明の敵がたくさん出てきて……#n怖くてずっと逃げ出したかったけど……。"
42020-122 = "……みんな、キヴォトスのために頑張ってたから。"
42020-123 = "[s] \"あの事件ではたくさんの生徒に助けられたけど……。\""
42020-125 = "どりゃあぁぁぁ――！！！"
42020-126 = "RABBIT小隊。先生の救助要請を確認し、参上いたしました。"
42020-127 = "[ns3] \"あの時、RABBIT小隊のみんなが来てくれなかったら。\"\n[ns4] \"反撃を始めるなんて、夢のまた夢だったから。\""
42020-132 = "……いいえ、お礼なんて必要ありません。"
42020-133 = "SRTとして、やるべきことをやっただけですから……。"
42020-134 = "そうだ、正義を守るのがSRTの役目だからな！"
42020-135 = "それに、シャーレの建物に向かってミサイルをぶっ放せる貴重なチャンスだったし、くひひ……。"
42020-136 = "[s] \"ありがとう。でも何かお礼をしないと気が済まなくて。\""
42020-140 = "[ns] \"差し入れを持ってきたんだけど……。\""
42020-141 = "ふっ……すっかりこの生活に馴染んだ私たちだぞ？#n食料なんて間に合っているが――"
42020-142 = "まぁ、気持ちだけもらっておくから、しまっておいてくれ。"
42020-144 = "市民の安全を守れたのが一番の喜びですから。#nそれ以上は何も望みません。"
42020-145 = "ところで先生。朝ごはんまだなら、良かったらここで食べていかない？#nちょうど卵もキノコもいっぱいあるし。"
42020-146 = "ああ、それがいい。このキノコ、この辺りでは滅多に獲れない種類でな。#n「香りはマツタケ、味はしめじ」と言われるほどの――"
42020-151 = "[ns] \"でも、これ……。\""
42020-153 = "[ns] \"ステーキ用の特上牛ロースなんだけど……。\""
42020-155 = "え、ええと……その……。"
42020-156 = "……も、もちろん市民の安全が一番の喜び、ですが……。"
42020-157 = "特上牛……ロース……ステーキ……！！"
42020-158 = "こんな霜降り肉……一度も食べたことない……。"
42020-159 = "[s5] \"いらないなら仕方ないね……。\"\n[s6] \"いっぱいあるから適当にカップ麺にでも……。\""
42020-162 = "なんだと！？"
42020-163 = "今、霜降りの特上牛ロースをカップ麺に入れて食べるって言った？"
42020-164 = "どんな判断だ！？金をドブに捨てる気か！"
42020-168 = "[ns7] \"でも他にいい食べ方が見つからないし……。\"\n[ns8] \"それに量も多いから、一人じゃ食べきれないかも。\""
42020-169 = "だ、だったらここで食べればいいじゃないか……。"
42020-170 = "だ、だったらここで食べればいいじゃないか……。"
42020-171 = "ここなら火も使えるし、食べる人ならいくらでも……。"
42020-175 = "[ns] \"じゃあ、みんなで食べよっか。\""
42020-177 = "やったー！"
42020-178 = "私は網を用意してきますね。"
42020-179 = "お皿、もう一枚とってくる……！"
42020-183 = "に、肉には何を添えればいいんだ？#nジャガイモか？それとも玉ねぎ……？"
42020-184 = "とりあえずこのキノコは片付けて、と……。"
42020-189 = "……滅多に獲れないキノコとか言ってなかった？"
42020-190 = "それはそうだが……一生に一度拝めるかどうか分からない特上牛ロースだぞ？#nより相応しいつけ合わせがあるはずだ！"
42020-191 = "それよりモエ、早く火を起こしてくれ！#n炭火焼きは火力が命だからな！"
42020-192 = "はいはい、おおせのままに～"
42020-198 = "次回;餌"

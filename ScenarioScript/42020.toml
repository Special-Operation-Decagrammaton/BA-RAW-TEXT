[translation]
42020-1 = "第2話;兔子做的夢"
42020-4 = "「SRT特殊學園……是在聯邦學生會長的許可下……」"
42020-6 = "「SRT的小隊是由少數的菁英組成……」"
42020-8 = "「……所謂正義，即符合真理的正確道理。」"
42020-11 = "「SRT的正義，面對任何情況都不會動搖。」"
42020-15 = "……在電視中看見的前輩們，耀眼得令人眩目。"
42020-16 = "前輩們那體現了我們所沒有的理想的姿態……無疑是我們的憧憬。"
42020-18 = "憧憬著面對嚴酷狀況也絕不退縮的強烈信念和嚴格規律。"
42020-19 = "憧憬著面對任何敵人都能一擊壓制的壓倒性力量。"
42020-20 = "憧憬著面對強悍敵人也毫不動搖的強大勇氣。"
42020-22 = "──憧憬著始終不變的正義。"
42020-23 = "前輩們是我們的夢想，也是我們的未來。"
42020-24 = "追隨著那樣的背影──"
42020-26 = "於是我們……"
42020-30 = "成為了SRT。"
42020-33 = "嗯嗯……"
42020-34 = "啊，都子醬。早安。"
42020-35 = "……早安，美優。"
42020-36 = "這麼早就起床了嗎？#n離早餐還有一點時間哦……？"
42020-37 = "都子醬昨天也因為夜間的警戒工作很晚才休息……明明可以多睡一點的。"
42020-38 = "沒關係的，我已經睡得很飽了。"
42020-42 = "今天天氣真不錯呢，感覺衣服很容易曬乾。"
42020-43 = "話說回來，萌和咲希呢……？"
42020-44 = "他們剛才說要去找能當配菜的食材回來……"
42020-51 = "喂，你們看這個！超棒的哦，簡直棒極了！"
42020-52 = "在距離平常散步的步道稍遠的地方長了這麼多蘑菇！#n我採了一些大的回來哦。"
42020-53 = "有這麼多的話，就算只吃菇類也能吃上兩天了！"
42020-58 = "咯嘻嘻嘻……我帶回來的東西可能也會讓你們嚇一跳哦？"
42020-59 = "看～有這麼多雞蛋！"
42020-60 = "是剛才在商店街拿到的，說是驅除害蟲的謝禮。"
42020-61 = "雖然我只不過是稍～微測試了一下新的煙霧彈而已……就拿到了這些。"
42020-62 = "哇……有這麼多新鮮的食材……！"
42020-66 = "正好麵包罐頭還有剩……今天的早餐看來會很豪華呢。"
42020-67 = "那麼得先來生個火才行吧？#n我去收集一點枯枝。"
42020-68 = "鍋子跟野菜的準備就交給我吧！"
42020-69 = "那我來進行調味料和其他的準備。"
42020-73 = "我，我也來幫忙……！"
42020-78 = "麵包、炒蘑菇，還有蛋……真是以前無法想像的奢侈早餐呢。"
42020-79 = "好想每天都吃這麼豐盛的食物──"
42020-80 = "就是說啊。#n而且今天的天氣涼快又舒服……"
42020-81 = "要是這樣的日子能持續下去的話，永遠待在這裡好像也不錯──"
42020-86 = "……我說，我們是不是太習慣這個狀況了？"
42020-87 = "……說的沒錯。#n感覺我們已經把作戰放在一邊，甚至會因為生活的瑣事有些許改善就悲喜交加……"
42020-88 = "唔……明明身為SRT的菁英……#n明明是裝備永遠是奇普托斯最頂尖的特殊學園的小隊員……"
42020-89 = "這個話題就到此為止吧。#n難得這麼棒的一餐都要變難吃了。"
42020-90 = "說的也是。#n現在還是專心吃──"
42020-94 = "[ns]「大家早啊！」"
42020-95 = "啊，是[USERNAME]老師。"
42020-96 = "一大早就看到熟悉的面孔，原來是老師啊。"
42020-97 = "歡迎你來，老師。"
42020-98 = "[s1]「竟然能被咲希滿臉笑容地歡迎……」\n[s2]「能成為老師真是太好了……」"
42020-99 = "少，少囉嗦……！#n而且我也沒有滿臉笑容！"
42020-100 = "少，少囉嗦……！#n而且我也沒有滿臉笑容！"
42020-107 = "啊，老師。早安。"
42020-108 = "這麼早來有什麼事嗎？#n好像沒有收到聯絡……"
42020-109 = "莫非是發生了什麼問題……？"
42020-110 = "[s]「不是，沒有什麼問題。我只是──」"
42020-112 = "[ns]「想要為上次的事來道謝。」"
42020-113 = "上次的事……"
42020-114 = "啊啊，你指的是那個事件啊。"
42020-119 = "……奇普托斯的危機什麼的，真是場刺激的體驗呢。"
42020-120 = "就連能享受毀滅的我都感覺到背脊發涼了呢，咯嘻嘻……"
42020-121 = "天空變得紅通通的，還冒出了很多不知名的敵人……#n雖然很害怕很想逃走……"
42020-122 = "……不過大家都在為奇普托斯而努力。"
42020-123 = "[s]「雖然在那個事件中受到了很多學生的幫助……」"
42020-125 = "哈啊啊啊──！！！"
42020-126 = "RABBIT小隊。已確認老師的支援請求，前來幫忙。"
42020-127 = "[ns3]「但當時，如果RABBIT小隊的大家沒有過來的話……」\n[ns4]「就不可能展開反擊了。」"
42020-132 = "……老師不必為了這件事道謝。"
42020-133 = "我們只是做了身為SRT的一員該做的事而已……"
42020-134 = "就是說啊。畢竟守護正義就是SRT的工作！"
42020-135 = "而且那可是能向夏萊大樓盡情發射導彈的寶貴機會啊，咯嘻嘻……"
42020-136 = "[s]「即便如此，我還是覺得應該來道謝一下才對。」"
42020-140 = "[ns]「所以帶了一些慰勞品來……」"
42020-141 = "哼……我們可是已經完全適應這裡的生活了哦？食材也很充足……"
42020-142 = "嘛，有這份心意就夠了，東西還是帶回去吧。"
42020-144 = "對我們來說，能守護市民的安全就是最大的喜悅了。"
42020-145 = "話說老師，如果還沒吃早餐的話，要不要在這裡吃？#n正好有很多雞蛋和菇類。"
42020-146 = "這可是在這附近很少見的鴻喜菇哦。#n甚至有「香氣選松茸、味道選鴻喜菇」的說法──"
42020-151 = "[ns]「但是這個……」"
42020-153 = "[ns]「……是牛排用的特上里肌肉的說。」"
42020-155 = "呃，這……那個……"
42020-156 = "當，當然……我們最大的喜悅是市民的安全沒錯……"
42020-157 = "特上牛……里肌……牛排……？"
42020-158 = "這種霜降肉……我這輩子都沒吃過……"
42020-159 = "[s5]「不要的話就沒辦法了……」\n[s6]「反正這麼多，就隨便加在泡麵裡吃吧……」"
42020-162 = "你說什麼！？"
42020-163 = "你，你剛才說要把霜降特上牛里肌加在泡麵裡吃嗎？"
42020-164 = "這到底是什麼判斷！？#n是想把錢丟到水溝裡嗎！"
42020-168 = "[ns7]「可是我又想不到其他的吃法……」\n[ns8]「而且量這麼多，我一個人可能吃不完。」"
42020-169 = "要，要在這裡吃也不是不行……"
42020-170 = "要，要在這裡吃也不是不行……"
42020-171 = "這裡可以生火，能吃的人也是要多少有多少……"
42020-175 = "[ns]「那就大家一起吃吧。」"
42020-177 = "好耶！"
42020-178 = "那我去準備鐵網。"
42020-179 = "我再去拿個盤子過來……！"
42020-183 = "肉，肉該配什麼吃才好？#n馬鈴薯？還是洋蔥……？"
42020-184 = "總之先把這個菇收拾一下……"
42020-189 = "……你剛才不是說這是少見的菇嗎？"
42020-190 = "現在這裡可是有一輩子都不知道有沒有機會見到的特上牛里肌肉哦？#n應該還有更適合的配料才對！"
42020-191 = "先別說那些了萌，你也趕快生火！#n火力就是炭烤的生命啊！"
42020-192 = "好好好～"
42020-198 = "下一話;誘餌"

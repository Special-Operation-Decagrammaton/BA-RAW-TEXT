[translation]
42020-1 = "ตอนที่ 2;ความฝันของกระต่าย"
42020-4 = "<สถาบันพิเศษ SRT ของพวกเราคือ... กองกำลังพิเศษที่ได้รับอนุญาตในการปฏิบัติการจากประธาน#nองค์การนักเรียน...>"
42020-6 = "<...หน่วย SRT ประกอบด้วยสมาชิกชั้นหนึ่งในจำนวนไม่มาก...>"
42020-8 = "<...ความยุติธรรมคือหลักการที่ถูกต้องตามความจริง>"
42020-11 = "<ความยุติธรรมของ SRT จะไม่เปลี่ยนแปลงไปไม่ว่าจะในสถานการณ์ไหนค่ะ>"
42020-15 = "... ภาพของพวกรุ่นพี่ใน TV ดูเปล่งประกายสดใส"
42020-16 = "ภาพของพวกรุ่นพี่ที่โอบกอดอุดมการณ์ที่พวกเราไม่เคยมีมาก่อน นั่นละเป้าหมายแห่งความริษยา"
42020-18 = "พวกเราใฝ่ฝันในกฎระเบียบที่เข้มงวดและไม่สั่นไหว แม้ว่าจะต้องอยู่ในสถานการณ์ที่ยากลำบาก"
42020-19 = "พวกเราใฝ่ฝันในพลังอันยิ่งใหญ่ที่กำราบศัตรูได้อยู่หมัดในการโจมตีเพียงครั้งเดียว ไม่ว่าจะเป็นศัตรู#nแบบไหนก็ตาม"
42020-20 = "พวกเราใฝ่ฝันในความกล้าหาญที่ไม่สั่นคลอน แม้จะอยู่ต่อหน้าศัตรูที่น่ากลัว"
42020-22 = "... พวกเราใฝ่ฝันในความยุติธรรมที่ไม่มีวันเสื่อมคลาย"
42020-23 = "พวกรุ่นพี่เป็นทั้งความฝันและอนาคตของพวกเรา"
42020-24 = "พวกเราไล่ตามเงานั้นและวิ่งมาข้างหน้าต่อไปเรื่อยๆ"
42020-26 = "และพวกเรา..."
42020-30 = "ก็ได้เป็น SRT"
42020-33 = "อืม..."
42020-34 = "อ๊ะ มิยาโกะจัง อรุณสวัสดิ์"
42020-35 = "... อรุณสวัสดิ์ค่ะ มิยุ"
42020-36 = "ตื่นแล้วเหรอ? ยังไม่ถึงเวลาเตรียมอาหารเช้าเลยนะ..."
42020-37 = "เมื่อคืนกว่ามิยาโกะจังจะกลับมาจากเฝ้ายามก็ดึกมากเลยด้วย... นอนพักต่ออีกหน่อยเถอะ"
42020-38 = "ไม่เป็นไรค่ะ ฉันนอนมาพอแล้วละค่ะ"
42020-42 = "วันนี้อากาศดีจังเลยนะคะ แดดก็ดีด้วย แบบนี้ผ้าน่าจะแห้งเร็วด้วยค่ะ"
42020-43 = "จะว่าไป แล้วโมเอะกับซากิล่ะ...?"
42020-44 = "สองคนนั้นบอกว่าจะออกไปหากับข้าวตั้งแต่ฟ้ายังไม่สางเลย..."
42020-51 = "ทุกคน ดูนี่สิ! สุดยอดเลย สุดยอด!"
42020-52 = "ฉันลองออกไปตามทางเดินที่ปกติไม่เคยไป แล้วก็ได้เจอเห็ดกองใหญ่อยู่ตรงนั้น ก็เลยเลือกเก็บมา#nเฉพาะดอกใหญ่ๆ น่ะ"
42020-53 = "ได้เห็ดกลับมาเยอะขนาดนี้ ฉันว่ากินแต่เห็ดจนพุงกางได้สองวันเลยละ!"
42020-58 = "ฮุฮุ... ถ้าได้เห็นของของฉันด้วยคงได้ตกใจกันแน่ๆ"
42020-59 = "ดูนี่สิ ฉันได้ไข่ไก่มาเพียบเลย! ร้านในย่านการค้าให้มาตอนที่ฉันเดินกลับมาน่ะ"
42020-60 = "ทางนั้นบอกว่าเป็นของตอบแทนที่เราไปช่วยกำจัดศัตรูพืชให้ครั้งก่อน ถึงจริงๆ แล้วฉันแค่ลองทดสอบ#nระเบิดควันตัวใหม่ที่ได้มาก็เถอะ..."
42020-61 = "แต่ก็ดีจังเลยเนอะที่ยังพอเป็นประโยชน์ได้บ้าง ฮุฮุฮุ..."
42020-62 = "ได้วัตถุดิบอาหารสดใหม่มาเยอะแยะเลย...!"
42020-66 = "แบบนี้ก็หายห่วงนะคะ ยังไงเสบียงของเราก็มีขนมปังกระป๋องอยู่แล้ว ถ้าเพิ่มอะไรนิดหน่อยคงได้เป็น#nอาหารเช้ามื้อหรูเลยนะคะ"
42020-67 = "ถ้าจะทำอาหาร ก็ต้องก่อไฟก่อนเนอะ? งั้นก็ต้องใช้กิ่งไม้แห้งเยอะเลย..."
42020-68 = "งั้นฉันจะล้างผักกับกระทะให้เอง"
42020-69 = "ถ้างั้นฉันจะไปหาวัตถุดิบกับเครื่องเทศอื่นๆ ที่จำเป็นมาให้ค่ะ"
42020-73 = "ดะ... เดี๋ยวฉันไปช่วยด้วยอีกแรง..!"
42020-78 = "อาหารเช้าที่มีทั้งไข่ ขนมปัง แล้วก็เห็ดผัด... นี่มันความหรูหราที่คาดไม่ถึงเลยนะ"
42020-79 = "อยากกินแต่อาหารดีๆ แบบนี้ทุกวันจัง"
42020-80 = "นั่นน่ะสิ วันนี้อากาศก็เย็นสบายดีด้วย..."
42020-81 = "ถ้าอากาศดีและมีอาหารอร่อยๆ ให้กินแบบนี้ การอยู่ที่นี่ต่อก็อาจจะไม่แย่ก็ได้นะ"
42020-86 = "... นี่พวกเราปรับตัวเข้ากับการใช้ชีวิตแบบคนไร้บ้านได้ดีเกินไปหรือเปล่าเนี่ย?"
42020-87 = "... จะให้ปฏิเสธก็ไม่ได้ซะด้วย ตอนนี้เรื่องปฏิบัติการของเราคือเรื่องรอง แต่เรื่องหลักคือการปรับปรุง#nปัจจัยพื้นฐานการดำรงชีวิตเล็กๆ น้อยๆ มากกว่า..."
42020-88 = "ฮึ่ม... แต่พวกเราเป็นถึงหัวกะทิของ SRT เลยนะ... เราเป็นกองทหารจากสถาบันพิเศษที่ดีที่สุดแห่ง#nคิโวทอสเลย..."
42020-89 = "อย่าพูดถึงเรื่องเศร้าๆ เลยน่า เราอุตส่าห์ได้วัตถุดิบอาหารดีๆ มากันทั้งที เอาแต่คุยเรื่องห่อเหี่ยวๆ เดี๋ยวก็ไม่มีอารมณ์กินข้าวกันพอดีหรอก"
42020-90 = "ใช่! เราคงไม่ได้อยู่ในสภาพดีๆ กว่านี้ได้แล้วแหละ"

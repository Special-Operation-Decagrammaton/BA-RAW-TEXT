[translation]
42020-1 = "Episode 2; A RABBIT's Dream"
42020-4 = "The General Student Council President formed SRT and the FOX Squad to give Kivotos a means to more effectively fight against..."
42020-6 = "SRT's made of small teams of elites..."
42020-8 = "Justice is the path to preserving truth."
42020-11 = "No matter the obstacle, SRT's justice never wavers."
42020-15 = "The seniors seemed to glow through the TV screen."
42020-16 = "They were the very embodiment of SRT's ideals. We strove for the impossible standards they set."
42020-18 = "Their rigid discipline never swayed no matter the situation."
42020-19 = "We watched as criminals fell in front of them, one by one."
42020-20 = "And no matter how daunting their mission, not even a flicker of fear ever seemed to cross their faces."
42020-22 = "Their undeviating justice... It was impossible not to admire."
42020-23 = "The seniors... They were our dream, and one day meant to be our future."
42020-24 = "To us, moving forward just meant chasing their shadows."
42020-26 = "But one day the sun disappeared, and there was nothing left to chase."
42020-30 = "One day, we became the SRT."
42020-33 = "Mm..."
42020-34 = "Miyako! You're awake."
42020-35 = "Good morning, Miyu."
42020-36 = "It's still early... I don't think breakfast is done."
42020-37 = "You stayed out late last night on patrol... Do you wanna rest more?"
42020-38 = "Thank you, but I've slept enough."
42020-42 = "I don't want to waste a nice day like this. I'm sure even the laundry's dried by now."
42020-43 = "Are Moe and Saki around?"
42020-44 = "I think they'll be back soon... They left early to go get food..."
42020-51 = "Y'all! Come and check this out!"
42020-52 = "I did a little extra scouting on my way back, and I happened on this huge mushroom colony. Look at the ones I picked! Aren't they big?!"
42020-53 = "With this many... We could have a mushroom buffet!"
42020-58 = "Heh heh. I've got a surprise for us too."
42020-59 = "Ta-da! Fresh eggs! I got it from one of the stores on our usual route."
42020-60 = "It was thanks for helping them out with some pest control... I may or may not have just been testing out a new smoke bomb in what I thought was a deserted alley, though."
42020-61 = "Heeheehee. As long as it helped a citizen in need..."
42020-62 = "W-Wow! So much fresh food..."
42020-66 = "Great work, both of you. It looks like we'll have a complete breakfast today. Let me dig up the canned bread from our supplies too."
42020-67 = "Heeheehee. You know you can count on me to get the fire going."
42020-68 = "I'll start the preparations! Heehee... Mushrooms, mushrooms.~"
42020-69 = "I'm off to the supplies tent! Let me know if you need help with anything."
42020-73 = "I can h-help with supplies!"
42020-78 = "A breakfast of eggs, bread, and sautéed mushrooms... I never thought we'd ever experience luxury like this again."
42020-79 = "If only I could eat like this everyday..."
42020-80 = "Seriously! It's the perfect meal for a perfect day. Do you feel that breeze?"
42020-81 = "With this amazing weather and yummy food, I mean, who wouldn't wanna stick around here forever, right?"
42020-86 = "Uh... Do you think maybe we've gotten a little too used to being homeless?"
42020-87 = "No denying it... These days, we're more about making life better than upholding justice."
42020-88 = "SRT's supposed to be the cream of the crop! We hail from the best school in all of Kivotos. We're second to none in equipment, training... I mean, we were, at least..."
42020-89 = "Enough of the gloomy stuff. We've got all the delicious food we could possibly ask for. Who wants to spoil their appetite with sad talk?"
42020-90 = "R-Right... Right! Let's not look a gift horse in the mouth. Things have been going great!"
42020-94 = "[ns] \"Hey there, RABBIT squad!\""
42020-95 = "Ah. [USERNAME] Sensei."
42020-96 = "Who...? Oh. It's just you, Sensei. Hi."
42020-97 = "I was wondering who that vaguely familiar person was..."
42020-98 = "[s1] \"Are you happy to see me, Saki?\" \n[s2] \"Ah! The joys of being a teacher!\""
42020-99 = "Sh-Shut up...! I wasn't trying to cover my excitement or anything! Geez!"
42020-100 = "Sh-Shut up...! There's no way a student would ever be happy to see their teacher anywhere outside of school!"
42020-107 = "Good morning, Sensei. Don't mind the ruckus."
42020-108 = "You didn't call ahead before coming over. Is it an urgent matter?"
42020-109 = "Did we get you in trouble with someone again?"
42020-110 = "[s] \"No, no. Not at all. The opposite, actually.\""
42020-112 = "[ns] \"I just wanted to thank you for your support with the recent events.\""
42020-113 = "Recent events..."
42020-114 = "Ah... It still feels like it just happened yesterday."
42020-119 = "I thought Kivotos was a goner for real that time."
42020-120 = "Even I was scared! Imagine that! Me, scared of some buildings blowing up!"
42020-121 = "I-It was way more than some buildings. I just wanted to run and hide as soon as the sky turned red...b-but enemies were appearing everywhere..."
42020-122 = "And more importantly... All my f-friends were fighting for Kivotos!"
42020-123 = "[s] \"You're right. So many students came together to protect Kivotos...\""
42020-125 = "Hiyah!!!"
42020-126 = "RABBIT Squad! Responding to Sensei's request for support!"
42020-127 = "[ns3] \"Who knows what would've happened if you didn't save me?\"\n[ns4] \"None of it would've been possible without you all.\""
42020-132 = "We don't expect thanks for completing our duty."
42020-133 = "SRT f-fights to protect the citizens!"
42020-134 = "Psh. You think we went to help you? We would've been there no matter what!"
42020-135 = "I just wanted to make Schale's building go ka-boom. Heeheehee."
42020-136 = "[s] \"Even SRT agents deserve recognition sometimes.\""
42020-140 = "[ns] \"So, as thanks, I brought you a hot meal.\""
42020-141 = "Heh... We've actually adapted to this new lifestyle perfectly, so we have more than enough food, actually."
42020-142 = "We'll take your kind thoughts as gratitude instead, and you can enjoy your hot meal."
42020-144 = "Exactly what Saki said. Our reward is knowing we've kept the citizens safe."
42020-145 = "In fact, if you're still up for breakfast, why not join us? We've got loads of eggs and mushrooms."
42020-146 = "I even found some shimeji mushrooms today, which are pretty rare around here. They're so delicious that there's a saying: Matsutake for the scent, but shimeji for the taste."
42020-151 = "[ns] \"Well, if you insist...\""
42020-153 = "[ns] \"...I guess I'll just put these prime beef sirloin steaks away...\""
42020-155 = "Ahem...! I-I actually didn't get to finish what I was saying..."
42020-156 = "Yes, yes. Naturally, there is no greater reward than serving the public. H-However..."
42020-157 = "Isn't that the s-super expensive kind of meat?"
42020-158 = "Even before SRT closed, I'd never eaten anything so decadent..."
42020-159 = "[s5] \"I mean, if you don't want it, I guess I'll just make ramen...\" \n[s6] \"What do I do with all this extra meat? Ramen, maybe?\""
42020-162 = "What did you just say?!"
42020-163 = "You want to eat fatty steak sirloin in RAMEN?"
42020-164 = "Are you an idiot? A stupid person?! Do you have so much money you can just boil it away in a pot of water?"
42020-168 = "[ns7] \"But it's too much to grill and eat by myself!\" \n[ns8] \"But Schale doesn't have a fire pit! I can't grill it!\""
42020-169 = "W-Well, if you're in that much of a pickle..."
42020-170 = "W-Well, if you're in that much of a pickle..."
42020-171 = "We have a firepit...and I guess we could help you out with eating all of it..."
42020-175 = "[ns] \"My saviors! Let's eat together, then!\""
42020-177 = "Okay!"
42020-178 = "We'll need some sort of mesh to use as a grill. I'll handle that."
42020-179 = "I-I'll get extra plates..."
42020-183 = "So, do we have any sides to go with the meat? Maybe some potatoes or onions...?"
42020-184 = "Get these dumb, ole' mushrooms out of the way."
42020-189 = "...What happened to \"so rare, shimeji for taste!\"?"
42020-190 = "What the heck is a shimeji?! We've got prime beef sirloin to worry about! This is a once-in-a-lifetime opportunity!"
42020-191 = "Focus, Moe! We need the fire going, stat! Achieving the perfect grilling temperature is an essential part of the process!"
42020-192 = "Aye, aye."
42020-198 = "Next Episode; Bait"

[translation]
1008805-1 = "It Might Look Like a Child's Arrogance"
1008805-2 = "I stopped by the Problem Solver office to return the documents I got last time."
1008805-10 = "...Huh, Sensei? What are you doing here?"
1008805-11 = "[s1] \"Kayoko? That outfit...?\"\n[s2] \"Huh. The dress again?\""
1008805-14 = "Hey, I asked first..."
1008805-15 = "...Huh?"
1008805-16 = "Documents?"
1008805-17 = "Oh, the ones you borrowed earlier. I didn't expect them back so soon."
1008805-18 = "Leave them on that desk over there. I'll handle it later."
1008805-22 = "Eh?"
1008805-23 = "What about my dress?"
1008805-27 = "I heard you the first time. You're really persistent about this."
1008805-28 = "*sigh*...Okay. Ignoring you will just make things more awkward so..."
1008805-29 = "Look...it's not a big deal. I wore it for work."
1008805-30 = "A lot of my Problem Solver 68 work has called for this kind of attire lately."
1008805-31 = "And it's nice to have different clothes for different commissions."
1008805-32 = "That said..."
1008805-33 = "Most of my missions have been a bust..."
1008805-34 = "[s3] \"You've got a lot on your plate, Kayoko.\"\n[s4] \"...Don't give up.\""
1008805-39 = "No need for sympathy. It's not like I hate it or the work's been hard."
1008805-40 = "...Huh?"
1008805-41 = "What, you think I just hate everything?"
1008805-42 = "Well, I mean..."
1008805-43 = "I don't have any ill will towards my clothes. They're my clothes."
1008805-44 = "I might have said the dress didn't suit me, but that doesn't mean I dislike the outfit itself."
1008805-45 = "And then there's what you said..."
1008805-50 = "How well the dress suited me... I hope that wasn't just hot air."
1008805-51 = "I believed in those words. That's why I'm able to keep wearing this outfit for my work."
1008805-56 = "[ns5] \"Of course. It suits you perfectly.\"\n[ns6] \"Ab-so-lute-ly.\""
1008805-61 = "I figured you'd say that. Really..."
1008805-62 = "..."
1008805-63 = "...Heehee."
1008805-64 = "By the way, Sensei. You remember the MomoTalk I sent you this morning?"
1008805-65 = "About whether you had some free time?"
1008805-66 = "If it's all right with you, I'd like to treat you to dinner."
1008805-67 = "Since I'm already dressed up..."
1008805-68 = "...I figure I'll pay."
1008805-69 = "[s7] \"If it's a meal, I should pay.\"\n[s8] \"I'm not used to being the one getting treated.\""
1008805-72 = "Too bad. "
1008805-73 = "I have to pay. Otherwise what's the point?"
1008805-74 = "And it is necessary."
1008805-75 = "I knew you'd say that..."
1008805-76 = "How about I pay back your words too..."
1008805-81 = "My conscience won't let me sit idly by. That's just how us students are, Sensei."
1008805-85 = "[ns9] \"Hmm, I see...\"\n[ns10] \"So that's how you're gonna play it...\""
1008805-86 = "...Heehee."
1008805-87 = "...Heehee."
1008805-88 = "Checkmate."
1008805-89 = "Don't sweat it. You're just having good food with a good student."
1008805-90 = "And if you're still anxious, then blame my stubbornness."
1008805-91 = "For now, that should be fine."
1008805-95 = "Since you're not panicking or changing the subject anymore... I take it we're good?"
1008805-96 = "Good. Your ability to accept things is both your greatest weakness and strength."
1008805-97 = "...Thank you, Sensei."
1008805-98 = "And..."
1008805-104 = "...I'll be waiting."

[translation]
1008805-1 = "孩子般的好勝心"
1008805-2 = "（為了歸還從便利屋借來的資料，來到了事務所）"
1008805-10 = "……哎呀，老師。#n來這邊有什麼事嗎？"
1008805-11 = "[s1]「佳世子？為什麼打扮成這樣……？」\n[s2]「哎呀，禮服？」"
1008805-14 = "呃，先發問的應該是我吧……"
1008805-15 = "……嗯？"
1008805-16 = "是來還資料的？"
1008805-17 = "啊啊，原來是之前借給你的那個啊。#n沒想到老師這麼快就還回來了。"
1008805-18 = "麻煩放在那邊的書桌上吧。#n之後我會再整理的。"
1008805-22 = "……？？"
1008805-23 = "啊……這副打扮……？"
1008805-27 = "我還以為已經順利蒙混過去了，何必再問一次呢……？"
1008805-28 = "唉……我知道了。#n如果不回答的話，氣氛反而會變得很奇怪。"
1008805-29 = "嗯……其實也不是什麼大不了的事。#n我是因為工作才穿的。"
1008805-30 = "最近便利屋要穿這種衣服的工作變多了……"
1008805-31 = "反正既然都弄來了這種衣服，能多發揮一點功用也不錯。"
1008805-32 = "當然基本上……"
1008805-33 = "……不，到目前為止幾乎都只是在做白工。"
1008805-34 = "[s3]「佳世子也辛苦了。」\n[s4]「……加油。」"
1008805-39 = "別擔心。我也沒有覺得不願意或是很辛苦。"
1008805-40 = "……嗯？"
1008805-41 = "我居然不覺得討厭？"
1008805-42 = "這個嘛……"
1008805-43 = "其實不管要打扮成什麼樣子，我都不會特別介意。"
1008805-44 = "雖然之前說過它不太適合我，但這不代表我不喜歡這件衣服。"
1008805-45 = "而且老師之前……"
1008805-50 = "之前也對我說過「很適合」……#n希望你不是隨口說說而已。"
1008805-51 = "因為我決定相信那句話……所以現在才會打扮成這樣。"
1008805-56 = "[ns5]「當然不是，我真的覺得很好看。」\n[ns6]「絕．對．真．心。」"
1008805-61 = "真是個……意料之中的答案。"
1008805-62 = "…………"
1008805-63 = "……呵呵。"
1008805-64 = "話說回來，我早上傳的MomoTalk，老師還記得嗎？"
1008805-65 = "問你之後能不能抽點時間的那句。"
1008805-66 = "如果可以的話，就選今天晚上怎麼樣？#n一起簡單吃個晚餐。"
1008805-67 = "正好現在也穿著這件衣服……"
1008805-68 = "……這次換我請你吧。"
1008805-69 = "[s7]「如果要吃飯的話，應該讓我請才對。」\n[s8]「我不習慣被請吃飯。」"
1008805-72 = "不行。"
1008805-73 = "這次得由我來請。不然就沒有意義了。"
1008805-74 = "你說不需要？"
1008805-75 = "就知道你會這麼說。"
1008805-76 = "那我就在這，把老師說過的話還給老師吧。"
1008805-81 = "因為想讓心裡舒坦一點，我也沒辦法。#n學生就是那樣的生物哦，老師。"
1008805-85 = "[ns9]「居然來這招……」\n[ns10]「居然用我的手段對付我……」"
1008805-86 = "……呵呵。"
1008805-87 = "……呵呵。"
1008805-88 = "看來老師被反將一軍了呢。"
1008805-89 = "不過真的沒什麼特別的期待或是期望，只是吃頓飯而已。"
1008805-90 = "不用想得太嚴重。#n就當是滿足我的好勝心，適當地配合一下吧。"
1008805-91 = "……嗯，這樣應該沒問題了。"
1008805-95 = "既然老師已經不再反駁，也沒有轉移話題……我就當你接受囉？"
1008805-96 = "太好了。這種坦率的地方是老師的缺點也是優點呢。"
1008805-97 = "……謝謝你，老師。"
1008805-98 = "那麼……"
1008805-104 = "……我很期待哦。"

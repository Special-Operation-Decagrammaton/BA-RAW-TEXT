[translation]
1008805-1 = "ถึงจะดูเหมือนความดื้อรั้นของเด็กก็เถอะ"
1008805-2 = "(คุณครูแวะไปที่สำนักงานหน่วยรับจ้างสารพัดเพื่อเอาเอกสารที่ได้มาไปคืน)"
1008805-10 = "เอ๋... ครู? มาทำอะไรที่นี่น่ะ?"
1008805-11 = "[s1] \"คาโยโกะ? ชุดนี้มัน...?\"\n[s2] \"หืม? ใส่ชุดเดรสเหรอ?\""
1008805-14 = "เดี๋ยวสิ ฉันถามก่อนนะ..."
1008805-15 = "หืม...?"
1008805-16 = "เอาเอกสารมาคืนเหรอ?"
1008805-17 = "อ่า เอกสารที่ฉันให้ยืมไปคราวก่อนสินะ ไม่คิดเลยนะว่าจะเอามาคืนเร็วแบบนี้"
1008805-18 = "วางไว้บนโต๊ะตรงนั้นได้เลย ไว้เดี๋ยวฉันเอาไปเก็บที่เอง"
1008805-22 = "...??"
1008805-23 = "อ่า... ชุดนี้เหรอ...?"
1008805-27 = "เมื่อกี้อุตส่าห์ปล่อยผ่านไปแล้วเชียว แต่ยังจะถามกันอีกเหรอ...?"
1008805-28 = "เฮ้อ... ก็ได้ เพราะถ้าฉันไม่ตอบ บรรยากาศก็คงแปลกๆ ไปกว่านี้"
1008805-29 = "ก็... ไม่ได้มีเรื่องใหญ่อะไรหรอก ฉันใส่เพราะเรื่องงานน่ะ"
1008805-30 = "ช่วงนี้หน่วยรับจ้างสารพัดมีงานที่ต้องหยิบชุดนี้มาใส่บ่อยๆ..."
1008805-31 = "ไหนๆ ก็มีชุดนี้แล้ว มันก็เป็นเรื่องดีไม่ใช่เหรอที่จะมีเรื่องที่ทำได้มากขึ้นอีก"
1008805-32 = "ถึงแม้ว่าส่วนใหญ่..."
1008805-33 = "ไม่สิ ถึงแม้ที่ผ่านมาจะทำไปโดยเปล่าประโยชน์ก็เถอะ"
1008805-34 = "[s3] \"คาโยโกะก็งานหนักน่าดูเลยนะ\"\n[s4] \"พยายามเข้านะ...\""
1008805-39 = "ก็ไม่เชิงว่าฉันไม่อยากทำหรือรู้สึกเหนื่อยหรอกนะ ไม่ต้องห่วงหรอก"
1008805-40 = "หืม...?"
1008805-41 = "แต่ก็ถือว่าเป็นบรรยากาศที่น่าพอใจเลยงั้นเหรอ?"
1008805-42 = "ก็นะ..."
1008805-43 = "ไม่ว่าจะต้องใส่ชุดอะไรทำงาน ฉันก็ไม่ได้ไม่พอใจหรือคิดว่ามันแย่หรอก"
1008805-44 = "และต่อให้จะบอกว่าชุดไม่เหมาะกับฉัน แต่ก็ไม่ได้แปลว่าฉันไม่ชอบชุดนั้นด้วย"
1008805-45 = "อีกอย่าง คำที่คุณครูบอกก่อนหน้านี้..."
1008805-50 = "ว่าชุดนี้ 'เหมาะกับฉัน'... ฉันหวังว่าจะเป็นคำพูดที่ออกมาจากความรู้สึกจริงๆ..."
1008805-51 = "ฉันก็เลยตัดสินใจว่าจะเชื่ออย่างนั้น... ถึงได้หยิบชุดนี้มาใส่อยู่อย่างนี้น่ะ"
1008805-56 = "[ns5] \"แน่นอนอยู่แล้ว ชุดนี้เหมาะกับคาโยโกะมากนะ \"\n[ns6] \"ครูพูดจากใจจริงอยู่แล้ว\""
1008805-61 = "ครูเนี่ย... ตอบอย่างที่ฉันคิดไว้ไม่ผิด"
1008805-62 = "..."
1008805-63 = "ฮุฮุ..."
1008805-64 = "ครู จะว่าไป ยังจำ MOMOTALK ที่ฉันส่งไปตอนเช้าได้รึเปล่า?"
1008805-65 = "ที่ฉันถามว่าหลังจากนี้พอมีเวลาบ้างหรือเปล่าน่ะ"
1008805-66 = "ในเมื่อเราก็มาเจอกันแล้ว วันนี้ตอนเย็นเราไปกินข้าวกันมั้ย?"
1008805-67 = "ไหนๆ ฉันก็ใส่ชุดนี้อยู่ด้วยแล้วน่ะ..."
1008805-68 = "ครั้งนี้ฉันขอเป็นคนเลี้ยงเองนะ"
1008805-69 = "[s7] \"ถ้าไปกินข้าว ครูต้องเป็นคนเลี้ยงสิ\"\n[s8] \"ครูไม่ชินกับการให้คนอื่นเลี้ยงหรอกนะ\""
1008805-72 = "ไม่ได้"
1008805-73 = "ไม่ได้สิ ครั้งนี้ฉันต้องเป็นเจ้ามือ ต้องทำแบบนี้ถึงจะมีความหมายสิ"
1008805-74 = "ไม่จำเป็นต้องทำแบบนั้นก็ได้งั้นเหรอ?"
1008805-75 = "กะไว้แล้วว่าต้องพูดอย่างนี้"
1008805-76 = "ถ้าอย่างนั้นฉันขอพูดคำที่คุณครูเคยพูดกับฉันแล้วกัน"
1008805-81 = "ถ้าฉันไม่ได้เลี้ยงข้าว ฉันจะไม่สบายใจน่ะ นักเรียนก็เป็นกันอย่างนี้ละคุณครู"
1008805-85 = "[ns9] \"อืม แบบนี้นี่เอง...\"\n[ns10] \"จะเล่นแบบนี้สินะ...\""
1008805-86 = "ฮุฮุ..."
1008805-87 = "ฮุฮุ..."
1008805-88 = "ถือว่ารุกฆาตเลยละสิ"
1008805-89 = "มันไม่ใช่เรื่องใหญ่อะไรหรอกน่า แค่ไปกินอาหารด้วยกันก็เท่านั้น"
1008805-90 = "ไม่ต้องคิดให้จริงจังมากไปก็ได้นะ คิดแค่ว่าเด็กคนนี้ดื้อจัง แล้วก็แค่กินข้าวด้วยกันก็พอ"
1008805-91 = "อืม... แค่นั้นก็เพียงพอแล้วละ"
1008805-95 = "ดูจากการที่ไม่ปฏิเสธหรือไม่พูดอ้อมค้อมแล้ว... แสดงว่าตอบรับฉันแล้วใช่มั้ย?"
1008805-96 = "โล่งอกไปทีนะ ที่ยอมให้แต่โดยดีน่ะเป็นทั้งข้อดีและข้อเสียของครูเลยละ"
1008805-97 = "ขอบคุณนะครู..."
1008805-98 = "ถ้างั้น..."
1008805-104 = "เราไปกินข้าวกันนะ"

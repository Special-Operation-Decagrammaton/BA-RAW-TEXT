[translation]
63070-1 = "ตอนที่ 7;ลองทำ"
63070-2 = "เพดานแบบนี้..."
63070-3 = "ไม่คุ้นเลยสักนิด"
63070-7 = "สวัสดีค่ะ คุณสุบารุ! ฉันมาตรวจสุขภาพช่วงบ่ายค่ะ"
63070-11 = "ต้องขอโทษด้วยค่ะ พอดีตอนเช้าฉันมีเรียน..."
63070-12 = "มีเรียน... งั้นเหรอคะ? ใช่ค่ะ..."
63070-13 = "แบบนั้นคงเป็นเรื่องปกติสินะคะ"
63070-14 = "..."
63070-18 = "ห้องพักผู้ป่วยของชมรมอัศวินบรรเทาทุกข์เป็นยังไงบ้างคะ?"
63070-19 = "ดีเลยละค่ะ... ฉันแทบไม่เคยเห็นห้องพักผู้ป่วยที่ดูดีขนาดนี้มาก่อนเลยค่ะ"
63070-20 = "ดูเหมือนทุกคนกำลังฟื้นตัวได้ดีเลย ต้องขอบคุณมากนะคะ"
63070-21 = "นอนจนเมื่อยตัวแล้ว~"
63070-22 = "ขอกลับเลยได้มั้ยนะ..."
63070-23 = "ไม่ได้นะคะ ทุกคน! อย่างน้อยก็ต้องอดทนนอนพักฟื้นจนกว่าหัวหน้าจะอนุญาตให้กลับได้ค่ะ!"
63070-24 = "เมื่อคิดว่าทุกอย่างดีขึ้นแล้ว นั่นละค่ะคือเวลาที่อันตรายที่สุด"
63070-25 = "ค่ะ นั่นสินะคะ"
63070-26 = "..."
63070-30 = "เอ่อ คุณสุบารุ?"
63070-31 = "คะ?"
63070-32 = "คุณไม่ได้... เกลียดพวกฉันหรอกเหรอคะ?"
63070-33 = "จู่ๆ ก็ถามอะไรแบบนี้คะ? พวกคุณอุตส่าห์ช่วยรักษาพยาบาลพวกเราแท้ๆ..."
63070-34 = "..."
63070-35 = "หมายถึงเรื่องนั้นสินะคะ"
63070-36 = "ใช่ค่ะ..."
63070-38 = "(วันนั้น...)"
63070-39 = "(วันที่เสียงแตรของนางฟ้าหยุดลง)"
63070-40 = "(ชมรมหน่วยแพทย์ฉุกเฉินของเกเฮนน่ากับชมรมอัศวินบรรเทาทุกข์ของทรีนิตี้)"
63070-41 = "(และนักเรียนคนอื่นจำนวนมาก... ก็เดินทางมาที่โรงเรียนสาขาอาเรียส)"
63070-64 = "(พวกเราถูกส่งตัวมายังอาคารหลักของชมรมอัศวินบรรเทาทุกข์ของทรีนิตี้...)"
63070-65 = "(และได้รับการรักษาและรอการฟื้นตัวอยู่ที่นี่จนถึงตอนนี้)"
63070-67 = "ยังมีนักเรียนหลายคนที่สับสนที่ตัวเองได้รับความช่วยเหลือจากทรีนิตี้และเกเฮนน่าค่ะ..."
63070-68 = "แน่นอนว่าตอนนี้พวกฉันไม่อาจพูดจาอะไรตามอำเภอใจได้อีกแล้ว..."
63070-69 = "แต่ฉันอยากขอเวลาให้พวกเราได้เรียบเรียงความคิดและความรู้สึกกันสักหน่อยค่ะ ต้องขอโทษด้วยนะคะ"
63070-73 = "มะ... ไม่เลยค่ะ! พวกฉันต่างหากที่..."
63070-74 = "ค่ะ"
63070-75 = "ถ้าตัดปัญหานั้นออกไป"
63070-76 = "ฉันอยากขอบคุณอีกครั้งที่ช่วยดูแลพวกเราเป็นอย่างดีค่ะ"
63070-80 = "มะ... ไม่ต้องขอบคุณหรอกค่ะ!"
63070-82 = "ดูเหมือนเราจะอยู่ในสถานการณ์ที่ต้องถามกันว่าเป็นยังไงบ้างนะคะ เป็นยังไงบ้างคะ?"
63070-83 = "ฉันไม่เป็นไรค่ะ แต่ว่าคุณมิเนะ..."
63070-84 = "ไม่ต้องห่วงฉันหรอกค่ะ ถึงฉันจะยังบกพร่องอยู่บ้าง แต่ฉันก็เป็นถึงหัวหน้าของชมรมอัศวินบรรเทาทุกข์#nนะคะ"
63070-85 = "วันนั้นเกิดเรื่องอะไรขึ้นกับคุณมิเนะเหรอคะ...?"
63070-86 = "คะ?"
63070-87 = "อ้อ หมายถึงวันนั้นสินะคะ"
63070-88 = "..."
63070-89 = "ฉันก็แค่ไปปกป้องคนอื่นค่ะ เรื่องมีแค่นั้นเลยค่ะ"
63070-90 = "และก็ฉันดีใจมากเลยนะคะที่ได้เจอกับพวกคุณทุกคนอีกครั้ง"
63070-91 = "ฉันกลับอยากถามตรงข้ามมากกว่าค่ะ... แล้วคุณสุบารุ ในฐานะสมาชิกของอาเรียสคนหนึ่ง..."
63070-92 = "ค่ะ พูดตามตรง ถ้าบอกว่าฉันไม่รู้สึกอะไรเลย ก็คงเป็นเรื่องโกหกค่ะ"
63070-93 = "..."
63070-94 = "แต่สำหรับตอนนี้... ฉันจะเก็บความรู้สึกนี้ไว้ และจะพยายามใช้ชีวิตต่อไปค่ะ"
63070-95 = "ความรู้สึกนี้อาจทวีความรุนแรงขึ้น อาจค่อยๆ ลดลง หรืออาจมอดไหม้จนเหลือเพียงเถ้าถ่าน..."
63070-96 = "แต่ยังไงฉันก็ต้องมีชีวิตต่อไปนี่คะ..."
63070-97 = "อย่างนี้นี่เองสินะคะ ทัศนคติที่แน่วแน่แบบนั้นทำให้ฉันได้เรียนรู้อะไรเยอะแยะเลยค่ะ"
63070-98 = "เรียนงั้นเหรอคะ ค่ะ..."
63070-103 = "เอาละค่ะ งั้นจากนี้ไปจะเป็นการเตรียมสอบจำลองค่ะ!!!"
63070-104 = "คะ?! ตอนนี้เลยเหรอคะ?!?!?!"
63070-105 = "ตั้งสติให้มั่นค่ะ ทุกคน! การสอบจำลองใกล้เข้ามาแล้วค่ะ!"
63070-106 = "ถ้าสภาพจิตใจและร่างกายแข็งแรงดีแล้ว ก็ถึงเวลาที่จะมุ่งเน้นไปที่การเตรียมตัวสอบ! นั่นคือทัศนคติที่ถูกต้องของนักเรียนค่ะ!"
63070-107 = "ถึงชมรมอัศวินบรรเทาทุกข์ของเราจะต้องทุ่มเทให้กับงานบรรเทาทุกข์..."
63070-108 = "แต่การทำงานบรรเทาทุกข์ควบคู่ไปกับการเรียนก็เป็นหน้าที่ที่ต้องทำเพื่อพิสูจน์คุณค่าของชมรม#nอัศวินบรรเทาทุกข์ด้วยค่ะ!"
63070-109 = "ใช่มั้ยล่ะคะ ทุกคน!"
63070-110 = "ใช่ค่ะ หัวหน้า!"
63070-111 = "ฮุฮุ ดีเลยค่ะ"
63070-112 = "ถ้างั้นก็ คุณสุบารุ แล้วก็ทุกคน"
63070-113 = "มาตั้งใจเรียนกันนะคะ"
63070-117 = "ไหงเป็นงี้ไปได้ล่ะ..."
63070-118 = "ต้องเรียนงั้นเหรอ..."
63070-119 = "ไม่อยากเรียนเลย..."
63070-120 = "ที่จริงฉันก็ไม่ต่างจากทุกคน..."
63070-121 = "แต่ยังไงก็อยากลองดูค่ะ!"
63070-122 = "พลังเหลือล้นเลยนะคะ... ครั้งนี้ฉันต้องตั้งใจเรียนแล้วละค่ะ..."
63070-128 = "เอ๋? นั่นคือ...?"
63070-137 = "ค่ะ... นี่คือพื้นฐานคร่าวๆ ของ[ruby=CQB]กลยุทธ์ยิงระยะประชิด[/ruby]ของอาเรียสค่ะ"
63070-138 = "แน่นอนว่าทางที่ดีที่สุดคือการหลีกเลี่ยงสถานการณ์ต่อสู้ระยะประชิด แต่ในสนามรบ อะไรก็เกิดขึ้นได้#nใช่มั้ยล่ะคะ?"
63070-139 = "ว้าววว..."
63070-140 = "เท่ระเบิดไปเลย...!"
63070-144 = "เอะ... เอ๋? ไม่คิดเลยว่าจะมีคนปรบมือให้แบบนี้..."
63070-145 = "ในอาเรียส เราจะเรียนรู้ 'ด้วยร่างกาย' ไปจนกว่าจะรู้ว่าตัวเองทำอะไรผิด..."
63070-146 = "ดะ... เดี๋ยวนะคะ! กะ... กลยุทธ์? ยิงระยะประชิด? นั่นน่ะค่ะ... ช่วยสอนพวกเราด้วยได้มั้ยคะ?"
63070-147 = "คะ? ตะ... แต่ว่าทุกคนไม่จำเป็นต้อง..."
63070-148 = "ใครจะไปรู้ล่ะคะ! อะไรก็เกิดขึ้นได้ไม่ใช่เหรอคะ!"
63070-150 = "ถึงฉันจะเป็นแค่เด็กสาว แต่ก็คิดว่าเรามาถึงจุดที่ต้องเรียนรู้การป้องกันอาวุธปืนระยะประชิดแล้วค่ะ!"
63070-152 = "นั่นสิคะ! ถึงจะเป็นแค่เด็กสาว... ไม่สิ ยิ่งเป็นเด็กสาวยิ่งต้องเรียนรู้ไว้ค่ะ! "
63070-153 = "เราต้องปกป้องตัวเอง และสอนมารยาทแก่คนที่ไม่สุภาพค่ะ!"
63070-154 = "ค่ะ! แบบนั้นละค่ะ!"
63070-158 = "จะไม่เป็นอะไรใช่มั้ยคะ ทรีนิตี้..."
63070-159 = "นี่พวกเราเข้ามาริเริ่มในเรื่องเหลวไหลหรือเปล่านะ..."
63070-160 = "ในเมื่อเป็นแบบนี้แล้ว งั้นลองขอตั้งชมรมวิจัย CQB เลยมั้ยคะ?"
63070-161 = "ไอเดียดีเลยค่ะ! ถ้างั้นหัวหน้ากับรองหัวหน้าชมรมก็..."
63070-162 = "ต้องให้ผู้เชี่ยวชาญที่สุดมารับตำแหน่งอยู่แล้วค่ะ!"
63070-166 = "ใช่ค่ะ! รบกวนด้วยนะคะ!"
63070-171 = "พะ... พวกฉันน่ะเหรอคะ?! แต่นี่มันเรื่องใหญ่เลย พวกฉันจะ..."
63070-172 = "อะ... อ่า..."
63070-173 = "ไม่ต้องห่วงนะคะ! ถ้ายังไม่คุ้นชินหรือมีเรื่องลำบากอะไรละก็ มาบอกพวกฉันได้ตลอดเลยค่ะ!"
63070-174 = "ทุกคนคะ! ช่วยปรบมือให้อีกครั้งนะคะ!"
63070-178 = "ขะ... ขอฝากตัวด้วยค่ะ..."
63070-179 = "เป็นแบบนี้ไปเสียได้..."
63070-181 = "เอ่อ... รุ่นพี่?"
63070-182 = "คะ? มีเรื่องอะไรเหรอคะ?"
63070-183 = "..."
63070-184 = "พวกเราทำแบบนั้นด้วยได้มั้ยคะ?"
63070-185 = "ถึงทิศทางจะต่างจากเดิมเล็กน้อย..."
63070-190 = "แต่เราจะสร้างรังใหม่ของเราได้มั้ยคะ?"
63070-191 = "..."
63070-192 = "ก็ต้องลองดูค่ะ"
63070-194 = "ที่ผ่านมาฉันอยากทำอะไรเหรอคะ?"
63070-195 = "\"อยากปกป้องอาเรียสเอาไว้ไง\""
63070-197 = "ถ้ารู้ว่าจะเป็นอย่างนี้ ฉันก็คงไม่ทำอะไรเลย..."
63070-198 = "ไม่หรอก"
63070-199 = "\"สุบารุมีสิทธิ์ที่จะพยายามอยู่แล้ว\""
63070-201 = "\"ต่อให้พยายาม บางอย่างก็อาจไม่เปลี่ยนไป\""
63070-202 = "\"อาจจะล้มเหลว หรืออาจจะแย่ลงกว่าเดิมก็ได้\""
63070-203 = "\"แต่ลองคิดดูนะ\""
63070-204 = "\"ถ้าอยู่ในจุดที่ต่ำสุดแล้วจริงๆ เราก็ต้องขึ้นไปข้างบนใช่ไหมล่ะ?\""
63070-206 = "ไม่ว่าผลลัพธ์จะเป็นยังไงก็ตามค่ะ"
63070-208 = "ตอนต่อไป;เวลาน้ำชา"

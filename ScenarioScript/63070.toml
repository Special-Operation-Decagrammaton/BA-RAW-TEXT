[translation]
63070-1 = "第7話;嘗試"
63070-2 = "……是陌生的天花板呢。"
63070-3 = "真的很陌生。"
63070-7 = "午安，昴同學！我來做下午的檢查了。"
63070-11 = "不好意思，因為我上午有課的關係……"
63070-12 = "有課……是嗎。"
63070-13 = "那樣，應該才是正常的吧。"
63070-14 = "……"
63070-18 = "救護騎士團的病房怎麼樣呢？"
63070-19 = "……相當不錯。#n這麼棒的設施，我以前從來沒見過。"
63070-20 = "拜其所賜，大家似乎都恢復得很好。"
63070-21 = "感覺身體已經閒不下來了～"
63070-22 = "我們不能就這樣出院嗎……"
63070-23 = "不行哦，各位！#n在團長正式批准出院之前，請大家再忍耐一下！"
63070-24 = "覺得自己已經痊癒的時候，反而才是最危險的哦？"
63070-25 = "是啊，確實如此。"
63070-26 = "……"
63070-30 = "那個，昴同學？"
63070-31 = "怎麼了嗎？"
63070-32 = "你不會……討厭我們嗎？"
63070-33 = "怎麼突然這麼說？#n各位可是幫我們治療的……"
63070-34 = "……"
63070-35 = "原來是在說那件事啊。"
63070-36 = "是的……"
63070-38 = "（那天）"
63070-39 = "（天使的號角聲停止的那天）"
63070-40 = "（格黑娜的急救醫學部和三一的救護騎士團……）"
63070-41 = "（以及除此之外的眾多學生……都來到了奧利斯分校）"
63070-64 = "（我們碰巧被後送到了三一救護騎士團的本館……）"
63070-65 = "（並且一直在這裡接受治療、等待康復）"
63070-67 = "……對於接受了三一和格黑娜的幫助這個事實，依然有學生感到困惑。"
63070-68 = "當然以我們如今的立場，已經無法隨便發表意見……"
63070-69 = "不過……還是希望能再給我們一點時間整理思緒和心情。#n真是不好意思。"
63070-73 = "不，不會不會！反倒是我們才應該……"
63070-74 = "嗯。"
63070-75 = "但是撇開那些問題不談……"
63070-76 = "對於各位照顧我們這件事，我想再次向各位致謝。"
63070-80 = "不，不用客氣！"
63070-82 = "似乎應該先互相關心一下呢……身體都還好嗎？"
63070-83 = "我沒有大礙。不過美禰同學你……"
63070-84 = "請不必擔心。#n雖然稱不上多麼強健，我姑且也是救護騎士團的團長。"
63070-85 = "……那天，美禰同學碰上了什麼事嗎？"
63070-86 = "咦？"
63070-87 = "啊啊，你指的是那天嗎。"
63070-88 = "……"
63070-89 = "我只是……保護了大家而已。"
63070-90 = "能像這樣再次與各位面對面交談，我打從心底感到高興。"
63070-91 = "……不過，我想請教你一個問題。#n昴同學作為奧利斯的一員……"
63070-92 = "坦白講，如果要說我的心裡沒有任何波瀾，那肯定是騙人的。"
63070-93 = "……"
63070-94 = "但是……我打算先帶著這樣的心情，試著想辦法活下去。"
63070-95 = "這份情感也許會漸漸變強，也許會慢慢平息……或者在燃燒殆盡後只留下灰燼。"
63070-96 = "……即便如此，還是得繼續活下去才行。"
63070-97 = "這樣啊……我明白了。#n看見昴同學如此堅定的覺悟，讓我也感覺學到了很多。"
63070-98 = "沒錯，學習……"
63070-103 = "那麼接下來就是學習時間了！！！"
63070-104 = "什麼！？#n這麼突然！？！？！？"
63070-105 = "請各位打起精神來！#n現在距離綜合考試真的沒剩多少時間了！"
63070-106 = "既然身心已經穩定下來，就應該趁現在專心準備考試！#n那不才是身為一名學生應有的態度嗎！"
63070-107 = "儘管我們救護騎士團必須致力於救護活動……"
63070-108 = "仍然有義務藉由兼顧救護和學習，證明救護騎士團這個社團的價值！"
63070-109 = "沒錯吧，各位！"
63070-110 = "是的，團長！"
63070-111 = "呵呵，回答得很好。"
63070-112 = "那麼昴同學，以及奧利斯的各位……"
63070-113 = "考試請加油哦。"
63070-117 = "明明一開始還聊得好好的，怎麼結論突然就……"
63070-118 = "唸書啊……"
63070-119 = "果然還是不想唸書……"
63070-120 = "……老實說我也是。"
63070-121 = "我想試著努力看看！"
63070-122 = "真是充滿幹勁呢……#n這次或許該換我向你學習了……"
63070-128 = "哎呀？那是……？"
63070-137 = "那麼……以上大致就是奧利斯式[ruby=CQB]限制空間戰鬥[/ruby]的基礎。"
63070-138 = "當然能夠避免近距離戰鬥是最好的，不過在事發現場什麼事都有可能發生。"
63070-139 = "哇啊……"
63070-140 = "好厲害……！"
63070-144 = "咦，咦咦？#n沒想到獲得這麼熱烈的掌聲……"
63070-145 = "在奧利斯要是學不好的話，可是得用「身體」學到會為止的說……"
63070-146 = "那，那個！請問剛才說的限制空間……戰鬥？#n可以教教我們嗎？"
63070-147 = "咦？可，可是各位其實沒必要……"
63070-148 = "這種事誰也不知道不是嗎！#n就像你剛才說的一樣！"
63070-150 = "我認為現在已經是淑女也必須學習近距離槍械護身術的時代了！"
63070-152 = "沒錯！身為淑女……不，正因為是淑女才更應該如此！"
63070-153 = "自己的身體應該由自己守護，面對無禮之人就該教會他們何謂禮儀！"
63070-154 = "嗯！說的真好！"
63070-158 = "三一那邊不會有問題嗎……"
63070-159 = "我們搞不好喚醒了不得了的東西也說不定……"
63070-160 = "既然這樣，要不要乾脆提議成立CQB研究部呢？"
63070-161 = "好主意！那麼部長和副部長……"
63070-162 = "當然必須由最專業的人來擔任囉！"
63070-166 = "是啊！拜託你們了！"
63070-171 = "我，我們！？#n可是那麼重大的事，我們實在承擔不起……"
63070-172 = "唔，唔啊啊……"
63070-173 = "沒關係的！如果遇到不熟悉或有困難的事情，我們隨時可以幫忙！"
63070-174 = "那麼！請大家再次掌聲鼓勵！"
63070-178 = "那，那麼，還請各位多多指教……"
63070-179 = "怎麼會變成這樣……"
63070-181 = "那個……前輩？"
63070-182 = "嗯？有什麼事嗎？"
63070-183 = "……"
63070-184 = "我們也做得到嗎？"
63070-185 = "或許跟一直以來的方向不太一樣……"
63070-190 = "不過……我們能打造出屬於我們的新巢嗎？"
63070-191 = "……"
63070-192 = "得試試看才行。"
63070-194 = "到頭來，我究竟想做什麼呢。"
63070-195 = "「你想守護你的奧利斯。」"
63070-197 = "如果早知道會這樣，我寧願自己當初什麼都不做……"
63070-198 = "「不是那樣的。」"
63070-199 = "「光是試著去做，就已經足夠了。」"
63070-201 = "「就算付出努力，也可能什麼都無法改變。」"
63070-202 = "「甚至還可能會失敗，把情況變得比以前更糟。」"
63070-203 = "「不過，你可以試著這麼想。」"
63070-204 = "「如果已經身處谷底的話，不就只剩下往上爬這條路了嗎？」"
63070-206 = "無論結果將會如何。"
63070-208 = "下一話;Tea Time"

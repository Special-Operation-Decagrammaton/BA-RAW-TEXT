[translation]
63070-1 = "Episode 7;An Attempt"
63070-2 = "...A ceiling I don't recognize."
63070-3 = "No, really."
63070-7 = "Hello, Subaru. I'm here for your afternoon checkup."
63070-11 = "I'm sorry. I have morning classes, so..."
63070-12 = "Morning classes, huh. Right..."
63070-13 = "I guess that's how things are supposed to be."
63070-14 = "..."
63070-18 = "How are you finding the Remedial Knights' infirmary?"
63070-19 = "...It's nice. These are the nicest facilities I've ever seen, honestly."
63070-20 = "Thanks to that, it looks like everyone's on the mend."
63070-21 = "I'm starting to get restless..."
63070-22 = "Can't they just discharge us already...?"
63070-23 = "No, no, everyone! You have to stay put until Captain gives discharge approval!"
63070-24 = "The moment you think you're fine is actually the most dangerous one, you know?"
63070-25 = "See? Just like that."
63070-26 = "..."
63070-30 = "Um, Subaru?"
63070-31 = "Hm?"
63070-32 = "You...don't hate us or anything, do you?"
63070-33 = "Why would I hate you? After everything you've done for us?"
63070-34 = "..."
63070-35 = "That's what you meant."
63070-36 = "Yes..."
63070-38 = "(...That day.)"
63070-39 = "(The day the angel's trumpets quieted.)"
63070-40 = "(Students from Gehenna's Medical Emergency Club and Trinity's Remedial Knights...)"
63070-41 = "(...as well as many others, came to Arius.)"
63070-64 = "(They transported us to the Remedial Knights' Main Building.)"
63070-65 = "(We've been here ever since, getting treatment and regaining our strength.)"
63070-67 = "It's hard for some of the students to come to terms with the fact that Trinity and Gehenna are the ones who helped us."
63070-68 = "Of course, we're not really in any position to speak openly about our feelings anymore."
63070-69 = "I need a little more time to sort out my thoughts and feelings. I'm sorry."
63070-73 = "Ah, no! If anything, we should be the ones apologizing..."
63070-74 = "Well..."
63070-75 = "Putting that aside..."
63070-76 = "Again, thank you, for all you've done to treat and care for us."
63070-80 = "N-Not at all!"
63070-82 = "Rather, we should be checking up on your condition. Do you fare well?"
63070-83 = " I'm fine. But what about you, Mine?"
63070-84 = "Please do not burden yourself with worries for me. I may be lacking in many ways, but this body still belongs to the captain of the Remedial Knights."
63070-85 = "...That day, what exactly happened to you, Mine?"
63070-86 = "Hm?"
63070-87 = "Ah. That day..."
63070-88 = "..."
63070-89 = "I simply protected those I saw before me. That is all."
63070-90 = "And it is a joyous thing, to once again be able to stand face to face with each of you."
63070-91 = "...If it passes your approval, I would like to inquire on something as well. Subaru, for you, as someone from Arius..."
63070-92 = " I see. Honestly, it would be a lie to say I felt nothing at all about it at this point."
63070-93 = "..."
63070-94 = "For now, I intend to live on, even while these feelings still exist inside of me. One way or another."
63070-95 = "I don't know what'll happen. Maybe those feelings will grow, or maybe they'll settle into a dull ache, or burn out into ashes."
63070-96 = "...Come what may, I can't just stop living."
63070-97 = "I see. That firm resolve of yours is something I can learn a great deal from as well."
63070-98 = "Yes. A lesson..."
63070-103 = "In that case, from this moment on, we embark upon practice exam study!"
63070-104 = "Huh?! R-Right at this very moment?!?!"
63070-105 = "Pull yourselves together, everyone! The practice exams are just around the corner!"
63070-106 = "Now that your bodies and minds have recovered, devoting yourselves to your studies is exactly what a proper student should do!"
63070-107 = "We Remedial Knights also bear the duty of focusing on relief work..."
63070-108 = "...but we also have an obligation to prove the worth of the Remedial Knights as a club academically!"
63070-109 = "Don't you agree, everyone?"
63070-110 = "Yes, Captain!"
63070-111 = "Fufu. Excellent."
63070-112 = "Then, Subaru. And everyone else."
63070-113 = "I wish you the best of luck on your exams."
63070-117 = "How did such a nice talk end with...that?"
63070-118 = "Studying, huh...?"
63070-119 = "...I still don't want to do it."
63070-120 = "I feel the same, if I'm being honest."
63070-121 = "I want to give it a try!"
63070-122 = "You're so full of energy... Maybe this time, I'm the one who needs to learn from you..."
63070-128 = "Huh? What's going on...?"
63070-137 = "That should be about it for the basics of Arius-style close-quarters combat."
63070-138 = "Of course, the ideal is never to end up in close-quarters combat at all, but out in the field, anything can happen."
63070-139 = "Wooow..."
63070-140 = "So cool...!"
63070-144 = "H-Huh? I didn't think we'd get this kind of response..."
63070-145 = "...Back in Arius, if you messed up, you'd learn what you did wrong with your body..."
63070-146 = "U-Um! That...close-quarters combat prowess... Could you teach it to us?"
63070-147 = "Huh? B-but you all don't really need to..."
63070-148 = "You're the one who said it! You never know, right?"
63070-150 = "Even for young ladies like us, I think we live in an age where close-quarters self-defense is essential!"
63070-152 = "That's right! For ladies...No, especially because we're ladies! "
63070-153 = "We should protect our own bodies, and teach some manners to anyone rude enough to cross us!"
63070-154 = "Yes! Exactly!"
63070-158 = "Is Trinity...going to be okay?"
63070-159 = "We might have just awakened something completely ridiculous..."
63070-160 = "Hm, maybe we should propose starting a CQC research club?"
63070-161 = "Great idea! Then for club president and vice-president..."
63070-162 = "Obviously, it should be handled by the people with the most expertise!"
63070-166 = "Exactly! We're counting on you!"
63070-171 = "U-Us?! We couldn't take on something that important..."
63070-172 = "A-Augh..."
63070-173 = "Don't give it too much thought! We'll help you with whatever we can!"
63070-174 = "Everyone! Another round of applause for our new president and vice president!"
63070-178 = "W-We look forward to working with you..."
63070-179 = "H-How did things end up like this again?"
63070-181 = "Um... Subaru?"
63070-182 = "Yeah? What is it?"
63070-183 = "..."
63070-184 = "Do you think...it's possible?"
63070-185 = "It might not be exactly how we're used to..."
63070-190 = "...but do you think we can build a new nest for ourselves?"
63070-191 = "..."
63070-192 = "We have to try."
63070-194 = "What...was I even trying to do?"
63070-195 = "You were \"trying to protect your Arius.\""
63070-197 = "If I'd known it was going to end up like this, I probably wouldn't have done anything."
63070-198 = "\"That's not true.\""
63070-199 = "\"Just the fact that you tried at all is enough.\""
63070-201 = "\"Sometimes things won't change, no matter how hard you try.\""
63070-202 = "\"You can fail, or even make things worse.\""
63070-203 = "\"But think about it.\""
63070-204 = "\"If you've truly hit rock bottom, there's nowhere to go but up.\""
63070-206 = "No matter how it turns out."
63070-208 = "Next Episode;Teatime"

[translation]
22060-1 = "第6話;不可思議的機器（１）"
22060-2 = "（某天，收到了來自貝里塔斯的聯絡──）"
22060-10 = "[ns]「這麼突然，怎麼了嗎？」"
22060-11 = "老師聽我說！我們有了「世紀大發現」！！"
22060-12 = "這東西真的很厲害……！！說不定是能留在奇普托斯史裡的歷史性的發現哦！！"
22060-13 = "[s]「……歷史性的發現？」"
22060-14 = "真紀，再怎麼說那也太誇張了。"
22060-15 = "晴說的沒錯。#n雖然發現了奇怪的東西是事實……"
22060-16 = "平時，在千年找到的東西幾乎都是破銅爛鐵，#n從統計資料來看，這東西也是那樣的可能性很高。"
22060-17 = "真是的～！大家也多少該懂點浪漫吧？#n我們問了很多人都說沒看過哦。"
22060-18 = "嘛，這倒是沒錯……"
22060-19 = "雖然真紀說的也有點道理……"
22060-20 = "[s]「到底發現了什麼呢？」"
22060-21 = "唔嗯……有點難用言語說明。"
22060-22 = "和真紀說的一樣，是從來沒有見過的那種物體……"
22060-23 = "光靠我們難以判斷，所以想請老師直接過來一趟。"
22060-24 = "就是這樣……老師，時間上方便嗎？"
22060-25 = "[s]「沒問題唷。」"
22060-26 = "那，我們在貝里塔斯社辦等你。"
22060-27 = "好耶！老師要來的話就來開個派對吧！"
22060-28 = "嗯。來點披薩吧。"
22060-29 = "不是，這也太誇張了……"
22060-32 = "（於是，在抵達貝里塔斯社辦時──）"
22060-33 = "啊！愛麗絲，發現老師了！"
22060-41 = "……咦？"
22060-42 = "老，老師好……"
22060-44 = "呀齁～老師！"
22060-45 = "……為什麼會來這裡？"
22060-46 = "[s]「呀齁。因為貝里塔斯請我過來……遊戲開發部也是？」"
22060-47 = "嗯！真紀好像發現了什麼有趣的東西！"
22060-49 = "想說會不會帶來一些靈感。"
22060-50 = "因為可能發生重要的事件，所以今天柚子也來了！"
22060-51 = "是的……要，要是能有什麼好點子的話……#n可是，來，來到這種地方……有點……"
22060-52 = "……非常地，辛苦……"
22060-53 = "就快到了唷，柚子！"
22060-54 = "嗯，加油吧。"
22060-56 = "為了不讓柚子倒下，愛麗絲會扶好的！"
22060-57 = "大，大家，謝謝妳們……"
22060-58 = "[s]「那我們進去吧？」"
22060-63 = "歡迎！請進！"
22060-71 = "呀齁～！打擾了！"
22060-72 = "中途會合的隊員，老師也來了。"
22060-74 = "看來時間正好呢。"
22060-75 = "呀齁～！好久不見了呢。"
22060-76 = "（點頭）"
22060-77 = "[s] 「呀齁～」"
22060-79 = "所以，晴前輩，妳說的那個東西呢？"
22060-80 = "啊啊，那個的話……"
22060-81 = "就是這個。"
22060-91 = "（晴給大家看的，是個形狀有點奇怪的機器人）"
22060-92 = "（仔細一看，在社辦的各處放了一共五台的機器人）"
22060-93 = "[s]「這是……在哪裡找到的？」"
22060-95 = "全部都是在千年學區郊外發現的東西。"
22060-96 = "而且這些還不是全部，少說還有二十台唷！"
22060-97 = "[s]「總覺得外表有點……」"
22060-98 = "感覺，看起來有點像深海魚呢。"
22060-99 = "不過，還是有點像機器人就是了……"
22060-100 = "但是有點奇怪吧？#n千年製作的機器人裡，應該沒有這種形狀的才對。"
22060-101 = "外表相當有個性。"
22060-102 = "唔嗯，該說個性嗎……總感覺……"
22060-107 = "[ns]（該說有點奇怪嗎……）"
22060-108 = "嚇，嚇我一跳！好像跟我想像的完全不一樣！"
22060-110 = "就像以為是搞笑電影結果突然變成恐怖片一樣……！#n這是什麼啊！！"
22060-111 = "這些真的是千年製作的……機器人嗎？"
22060-112 = "晴前輩，這些東西現在是什麼狀態呢？"
22060-113 = "努力的話就能啟動之類的……"
22060-115 = "……"
22060-117 = "我們也試著做了一些調查。"
22060-118 = "因為外表還算乾淨，所以想看看它能不能啟動。"
22060-119 = "但是，卻什麼也沒找到。"
22060-120 = "[s]「什麼也沒找到……？」"
22060-121 = "根據我們調查的結果，別說是電源鈕了，就連接口都沒找到。"
22060-122 = "除此之外，它的表面連接縫都沒有。"
22060-123 = "因為沒辦法打開內部，所以無法啟動的理由究竟是硬體還是軟體──"
22060-124 = "甚至，就連是否真的有故障都無法得知……"
22060-130 = "所以才會找老師過來。"
22060-131 = "是的。如果是危險物品的話，希望能請夏萊協助。"
22060-135 = "如果是這樣的話，把遊戲開發部找來好像不太對吧。"
22060-136 = "啊哈哈。反正，就當作是順便找來的吧。#n這種東西大家一起看才有趣嘛？"
22060-141 = "……"
22060-146 = "怎麼樣，老師？能得知什麼嗎？"
22060-147 = "[s]「……唔嗯，我不太清楚。」"
22060-148 = "果然不行嗎。#n如果是老師的話說不定……本來是這麼想的。"
22060-149 = "只能問部長了嗎……#n我記得她好像喜歡這種超自然的東西。"
22060-150 = "超自然啊……"
22060-151 = "還是問副部長？#n副部長應該能找出一點情報的說～！"
22060-152 = "討論現在不在這裡的人也於事無補唷。"
22060-153 = "與其說不在這裡，部長根本就完全不來嘛。"
22060-155 = "……啊。"
22060-159 = "怎麼了？發現什麼了嗎？"
22060-162 = "愛麗絲……"
22060-163 = "愛麗絲……有看過這個。"
22060-164 = "愛麗絲醬……？"
22060-166 = "這是……"
22060-180 = "咦！？怎麼了！？電源啟動了！？"
22060-181 = "咦！？"
22060-182 = "咦？什麼什麼！？"
22060-188 = "這個聲音是……"
22060-189 = "姐姐，有遊戲機的聲音唷？"
22060-190 = "咦？"
22060-196 = "啊，真的耶。#n明明之前都無法啟動的……為什麼呢。"
22060-198 = "等，等等……愛麗絲醬的樣子……有點奇怪。"
22060-199 = "愛麗絲……？"
22060-200 = "…………"
22060-204 = "＜＜＜我……＞＞＞"
22060-206 = "[ns]「愛麗絲？」"
22060-208 = "＜＜＜我重要的……＞＞＞"
22060-211 = "…………開始啟動。"
22060-212 = "……愛麗絲？"
22060-221 = "哇哇！為什麼突然動了起來！？#n小玉前輩，妳做了什麼嗎！？"
22060-222 = "真紀，不是那樣。我什麼都……"
22060-223 = "……小心一點！樣子有點奇怪！"
22060-225 = "＜＜＜我重要的…………啊。＞＞＞"
22060-227 = "[ns]「這到底是……」"
22060-229 = "……代號「AL-1S」啟動完畢。"
22060-236 = "執行協議ATRAHASIS。"
22060-237 = "[ns]「……！」"

22060-182 = "ไหน! ขอดูหน่อย!!"
22060-188 = "พี่โมโมอิ... เสียงนี้มัน?"
22060-189 = "เสียงเครื่องเล่นเกมที่อยู่ในกระเป๋าของพี่หรือเปล่า?"
22060-190 = "หืม?"
22060-196 = "อ๊ะ จริงด้วยแฮะ ที่ผ่านมาไม่ว่าจะพยายามแค่ไหนก็เปิดไม่ติดเลยนี่นา? ทำไมจู่ๆ ถึงติดขึ้นมาได้ล่ะ?"

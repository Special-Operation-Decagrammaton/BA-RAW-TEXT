[translation]
22060-1 = "Episode 6; A Strange Machine 1"
22060-2 = "One day, I received a message from Veritas."
22060-10 = "[ns] \"What's going on, everyone?\""
22060-11 = "Sensei, Sensei! We found something super crazy!"
22060-12 = "In fact, it's so crazy that our discovery could be written down in Kivotos' history books!"
22060-13 = "[s] \"What do you mean?\""
22060-14 = "Maki, you're always so dramatic."
22060-15 = "I'm with Hare on this, Maki. I agree it's interesting, but..."
22060-16 = "Considering all of the things you can find in Millennium, there's a pretty big chance it's nothing."
22060-17 = "You guys are such party poopers! You said yourselves it's like nothing you've seen before!"
22060-18 = "Well... I guess..."
22060-19 = "I can't argue with that."
22060-20 = "[s] \"What did you find?\""
22060-21 = "Hmm... It's hard to explain, honestly."
22060-22 = "Like Maki said, we've never seen anything like it before, Sensei."
22060-23 = "We weren't too sure what we were looking at, so we wanted you to come look."
22060-24 = "Do you have time, Sensei?"
22060-25 = "[s] \"Well, for something like this, I'll make time.\""
22060-26 = "Sweet. We're all at the Veritas club room right now."
22060-27 = "Sensei's coming? Awesome, it's a party!"
22060-28 = "Yes. I'll order us some pizza."
22060-29 = "Not you, too, Kotama..."
22060-32 = "I was walking up to the Veritas club room when I saw some familiar faces."
22060-33 = "Look! It is Sensei!"
22060-41 = "Huh?"
22060-42 = "H-Hello..."
22060-44 = "Hi, Sensei!"
22060-45 = "...Huh? What are you doing here, Sensei?"
22060-46 = "[s] \"I got a call from Veritas. Did they call you all as well?\""
22060-47 = "Yeah! Maki said she found something cool!"
22060-49 = "I thought we might be able to find some inspiration for our game."
22060-50 = "This could be a main quest event, so even Yuzu joined today!"
22060-51 = "Yes... I-If we can get some good ideas...coming all the way out here..."
22060-52 = "...will have been worth it...although it wasn't easy..."
22060-53 = "We're almost there, Yuzu!"
22060-54 = "You can do it!"
22060-56 = "Yuzu, I will hold on to you so you do not fall!"
22060-57 = "Th-Thank you, everyone..."
22060-58 = "[s] \"If everyone is okay, let's go in now!\""
22060-63 = "They're here! They're here! Come in!"
22060-71 = "The Game Development Department has arrived!"
22060-72 = "Sensei has joined our party as well!"
22060-74 = "You all made it just in time!"
22060-75 = "Hi everyone! And hey Sensei!"
22060-76 = "*bows*"
22060-77 = "[s] \"Thanks for having me, you all.\""
22060-79 = "So, what's the big discovery, Hare?"
22060-80 = "Oh, you see..."
22060-81 = "These."
22060-91 = "Hare showed us a strange robot."
22060-92 = "Actually, it wasn't just one, but five robots scattered throughout the Veritas club room."
22060-93 = "[s] \"...Robots? Where did you get them?\""
22060-95 = "We found them on the outskirts of the Millennium school district."
22060-96 = "These aren't all of them, Sensei. There are at least twenty more at the outskirts."
22060-97 = "[s] \"They look kind of...\""
22060-98 = "Doesn't this one look like a giant squid washed ashore from the deep sea?"
22060-99 = "Well, based on its appearance, there's no reason not to call it a robot, but..."
22060-100 = "Isn't it strange? We've never seen a drone like this in Millennium."
22060-101 = "It's quite unique."
22060-102 = "I don't know if we should call it unique, or..."
22060-107 = "[ns] \"(Grotesque is more so the adjective I would use...)\""
22060-108 = "Whoa! This wasn't what I was expecting to see!"
22060-110 = "It's like...seeing a horror movie when you bought a ticket for a comedy..."
22060-111 = "W-Were these robots really made in Millennium...?"
22060-112 = "How's their condition, Hare?"
22060-113 = "Oh... They don't work? I wonder if we can make them run again somehow."
22060-115 = "..."
22060-117 = "We tried already. A bunch of times."
22060-118 = "They looked like they were in tip-top shape, so we thought we could get them moving again."
22060-119 = "But we couldn't even tell where to start."
22060-120 = "[s] \"What do you mean by that?\""
22060-121 = "None of them have a power button or port that can connect to an outside power source."
22060-122 = "Also, there are no seams where you can open them up."
22060-123 = "If we can't open them up, we can't tell if it's a power problem or a software problem."
22060-124 = "Maybe they're just broken. I haven't got a clue."
22060-130 = "That's why we called you, Sensei!"
22060-131 = "We thought it would be good to call Schale, just in case they're dangerous."
22060-135 = "I still don't know why you called the Game Development Department, Maki."
22060-136 = "Heehee. I figured this was pretty cool, so the more the merrier!"
22060-141 = "..."
22060-146 = "So, what do you think, Sensei?"
22060-147 = "[s] \"...I'm not sure.\""
22060-148 = "Really?! Aw man, we thought Sensei would know something!"
22060-149 = "Himari's the best person for something weird like this. She's into the occult and stuff like that, you know?"
22060-150 = "The occult? Hmm..."
22060-151 = "Or maybe Vice President Chihiro can find some information quickly!"
22060-152 = "But she's not here, so there's no point..."
22060-153 = "It's been a while since we've seen President Himari..."
22060-155 = "...Ah."
22060-159 = "Huh? Is something wrong, Aris?"
22060-162 = "I..."
22060-163 = "I have seen this before."
22060-164 = "Aris...?"
22060-166 = "This..."
22060-180 = "Oh?! The lights turned on!"
22060-181 = "Huh?!"
22060-182 = "What is this?!"
22060-188 = "That sound..."
22060-189 = "Is that the sound of the console in your bag?"
22060-190 = "What?!"
22060-196 = "You're right. It wouldn't boot up no matter how many times I pressed the power button. So why now?"
22060-198 = "W-Wait, guys. Aris is acting strange..."
22060-199 = "Aris...?"
22060-200 = "………………"
22060-204 = "<<<My...>>>"
22060-206 = "[ns] \"Aris? Are you okay?\""
22060-208 = "<<<My precious...>>>"
22060-211 = "\"...Ready for operation.\""
22060-212 = "...? Aris?"
22060-221 = "Whoa! What?! They're moving all of a sudden! Kotama, what did you do?!"
22060-222 = "I didn't do anything, Maki."
22060-223 = "Hey! Step back! I have a bad feeling about this!"
22060-225 = "<<<My precious...lady.>>>"
22060-227 = "[ns] \"What is happening to her?!\""
22060-229 = "\"...Codename AL-1S ready for operation.\""
22060-236 = "\"Starting now, protocol ATRAHASIS will be executed.\""
22060-237 = "[ns] \"...!\""

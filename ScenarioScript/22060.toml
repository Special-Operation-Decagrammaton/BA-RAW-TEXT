[translation]
22060-1 = "ตอนที่ 6;อุปกรณ์ประหลาด 1"
22060-2 = "(ในวันหนึ่ง คุณครูก็ได้รับการติดต่อจากเวอริทัส)"
22060-10 = "[ns] \"หืม? ทุกคนมีเรื่องอะไรเหรอ?\""
22060-11 = "คือว่า... คุณครู! พวกเราค้นพบ <สิ่งที่ยิ่งใหญ่> มาละ!"
22060-12 = "นี่อาจเป็นการค้นพบทางประวัติศาสตร์ที่เป็นประวัติการณ์ของคิโวทอสเลยก็ได้!"
22060-13 = "[s] \"การค้นพบที่เป็นประวัติการณ์...?\""
22060-14 = "มากิ เธอตื่นเต้นมากเกินไปหรือเปล่าน่ะ"
22060-15 = "ถึงเราจะค้นพบอะไรที่แปลกประหลาด แต่ที่ฮาเระพูดก็ถูกต้องนะคะมากิ"
22060-16 = "ถ้าดูจากของที่มักจะพบในเขตโรงเรียนมิลเลเนียม โดยสถิติแล้วมีความเป็นไปได้สูงที่เราจะเจอแต่ของ#nจุกจิกค่ะ"
22060-17 = "เดี๋ยวสิ~ แต่ถึงอย่างนั้นก็เถอะ~ ขอฉันเพ้อฝันอะไรหน่อยไม่ได้หรือไง? ทุกคนบอกเองไม่ใช่เหรอว่า#nไม่เคยเห็นของชิ้นนี้จากที่ไหนมาก่อนน่ะ"
22060-18 = "เรื่องนั้น..."
22060-19 = "มากิก็พูดถูกค่ะ..."
22060-20 = "[s] \"ไปเจออะไรกันมาเหรอ?\""
22060-21 = "อืม... มันอธิบายด้วยคำพูดยากน่ะคุณครู"
22060-22 = "มันเป็นสิ่งที่พวกฉันเพิ่งเคยเห็นเป็นครั้งแรกในชีวิต... อย่างที่มากิพูดเลยค่ะคุณครู"
22060-23 = "พวกฉันคิดว่ามันยากที่จะตัดสินด้วยตัวพวกฉันเอง ก็เลยอยากให้คุณครูช่วยมาดูให้หน่อยน่ะค่ะ"
22060-24 = "งั้นก็เข้าเรื่องเลยนะ คุณครู... พอจะมีเวลาบ้างไหม?"
22060-25 = "[s] \"อื้ม ถ้าเป็นเรื่องนั้น ครูมีเวลาให้อยู่แล้ว\""
22060-26 = "งั้นพวกฉันจะรอกันอยู่ที่ห้องชมรมเวอริทัสนะ"
22060-27 = "ดีละ! คุณครูตอบตกลงแล้ว! ได้เวลาปาร์ตี้!"
22060-28 = "ได้ค่ะ ฉันจะสั่งพิซซ่าตอนนี้เลยค่ะ"
22060-29 = "อย่างที่พูดไว้ไม่มีผิด... ทุกคนเนี่ยวุ่นวายกันเกินเหตุไปแล้ว..."
22060-32 = "(ในขณะที่คุณครูไปถึงหน้าห้องชมรมเวอริทัส)"
22060-33 = "อ๊ะ! อาริสึพบคุณครูแล้วค่ะ!"
22060-41 = "หืม...?"
22060-42 = "สะ... สวัสดีค่ะ..."
22060-44 = "สวัสดีคุณครู!"
22060-45 = "เอ๋...? ว่าแต่คุณครูมาทำอะไรที่นี่น่ะ?"
22060-46 = "[s] \"ว่าไง พอดีเวอริทัสให้ครูมาหาน่ะ ชมรมพัฒนาเกมก็ด้วยเหรอ?\""
22060-47 = "อื้ม! มากิบอกว่าไปเจออะไรน่าสนุกมาด้วยแหละ!"
22060-49 = "พวกเราก็เลยมาดู เผื่อว่าจะเป็นแรงบันดาลใจในการสร้างเกมได้น่ะค่ะ"
22060-50 = "นี่อาจจะเป็นกิจกรรมสำคัญก็ได้นะ ยูสึเองก็มากับพวกเราด้วยเหมือนกันค่ะ!"
22060-51 = "ค่ะ... ขะ... ขอแค่ได้ไอเดียดีๆ กลับไป... ตะ... แต่กว่าจะมาถึง..."
22060-52 = "ก็... ลำบากใช่ย่อยเลย..."
22060-53 = "อดทนอีกหน่อยนะยูสึ!"
22060-54 = "อื้ม! สู้ๆ!"
22060-56 = "อาริสึจะช่วยพยุงไว้ให้มั่นเลยค่ะ ยูสึจะได้ไม่เป็นลมไปซะก่อนนะคะ!"
22060-57 = "ขะ... ขอบใจนะทุกคน"
22060-58 = "[s] \"เอาละ งั้นก็รีบเข้าไปเลยไหม?\""
22060-63 = "อ๊ะ! สงสัยจะมาถึงแล้ว! เข้ามาเลย!"
22060-71 = "พวกเรามาแล้ว!"
22060-72 = "มาพร้อมกับสมาชิกปาร์ตี้ที่เจอกันระหว่างทาง คุณครูของเรานั่นเองค่ะ"
22060-74 = "ทุกคนมากันตรงเวลาเลยนะ"
22060-75 = "ว่าไง~ เพื่อนๆ ชมรมพัฒนาเกม! แล้วก็คุณครูด้วย~!"
22060-76 = "(โค้ง)"
22060-77 = "[s] \"สวัสดีทุกคน\""
22060-79 = "ตกลงของที่ไปเจอมาใหม่คืออะไรเหรอ รุ่นพี่ฮาเระ?"
22060-80 = "อ่า เรื่องนั้น..."
22060-81 = "อันนี้ไง"
22060-91 = "(ฮาเระยื่นหุ่นยนต์หน้าตาประหลาดๆ ให้ดู)"
22060-92 = "(ในห้องเวอริทัสมีหุ่นยนต์แบบนี้วางไว้ถึง 5 ตัว)"
22060-93 = "[s] \"นี่มัน... หุ่นยนต์เหรอ? ไปเจอมาจากไหนน่ะ?\""
22060-95 = "พวกเราเจอของพวกนี้จากเขตชานเมืองของโรงเรียนมิลเลเนียมค่ะ"
22060-96 = "แถมที่อยู่ตรงนี้ก็ไม่ใช่ทั้งหมดที่มีด้วยนะคุณครู บริเวณที่เราไปกันมาน่ะ น่าจะมีสัก 20 ตัวเลยละ"
22060-97 = "[s] \"ทำไมถึงหน้าตาแบบนี้...\""
22060-98 = "เหมือนปลาหมึกยักษ์ที่อาศัยอยู่ใต้ทะเลลึก แล้วถูกพัดขึ้นมาบนฝั่งทะเลเลยใช่ไหมล่ะ?"
22060-99 = "อืม ถึงจะดูจากภายนอกแล้วมันจะเหมือนหุ่นยนต์ก็เถอะ..."
22060-100 = "แต่มันก็แปลกๆ ว่าไหม? พวกโดรนที่ถูกสร้างขึ้นในมิลเลเนียม ก็ยังไม่เห็นมีรูปร่างหน้าตาแบบนี้เลย"
22060-101 = "ดูมีเอกลักษณ์ดีนะคะ"
22060-102 = "จะเรียกว่าเป็นเอกลักษณ์ได้ไหมนะ... มันแบบว่า..."
22060-107 = "[ns] (รู้สึกว่ามันแปลกประหลาด... เกินกว่าจะเป็นเอกลักษณ์นะ)"
22060-108 = "ว้าย ตกใจหมดเลย! ทำไมต่างจากที่คิดไว้ลิบลับเลยล่ะ?"
22060-110 = "เหมือนกดรีโมทจะดูหนังตลก แต่จู่ๆ ก็กลายเป็นหนังสยองขวัญขึ้นมาอย่างนั้นแหละ..."
22060-111 = "นี่มันหุ่นยนต์ที่สร้างขึ้นในมิลเลเนียม... จริงๆ เหรอ?"
22060-112 = "สภาพมันเป็นยังไงบ้างเหรอคะ รุ่นพี่ฮาเระ?"
22060-113 = "ยังเปิดติดอยู่ไหมคะ...? หรือว่าเราต้องทำอะไรนิดหน่อยเพื่อให้มันกลับมาใช้งานได้คะ?"
22060-115 = "........."
22060-117 = "ถ้าเป็นเรื่องนั้น พวกฉันเองก็ลองตรวจสอบดูกันแล้ว"
22060-118 = "พอดีเห็นว่าพื้นผิวที่ลำตัวไม่ได้มีรอยขีดข่วนอะไร ก็เลยคิดว่าอาจจะใช้งานได้อีกครั้งน่ะ"
22060-119 = "แต่สุดท้ายเราก็หาอะไรไม่เจอเลย"
22060-120 = "[s] \"ไม่เจอเลยเหรอ?\""
22060-121 = "ค่ะ พวกฉันหาปุ่มเปิดของหุ่นยนต์ทุกตัวแล้ว ไม่เจอปุ่มเปิดใช้งาน หรือพอร์ตเชื่อมต่อกับอุปกรณ์อื่นเลยค่ะ"
22060-122 = "รอยต่อที่เราจะเอาไว้เปิดดูข้างในก็ไม่มีด้วยเหมือนกัน"
22060-123 = "เราก็เลยไม่รู้ว่าที่มันไม่ทำงานแบบนี้ เป็นเพราะปัญหาเรื่องแบตเตอรี่ หรือเป็นปัญหาที่ซอร์ฟแวร์กันแน่"
22060-124 = "หรือมันอาจจะพังไปแล้วจริงๆ ก็ได้... พวกฉันหาคำตอบไม่ได้สักที..."
22060-130 = "พวกเราถึงได้เรียกคุณครูให้ออกมาหาน่ะ"
22060-131 = "ถ้ามันเป็นวัตถุอันตรายขึ้นมา พวกเราก็ว่าจะขอความช่วยเหลือจากชาเล่ต์ค่ะ"
22060-135 = "แต่ก็ไม่เห็นต้องลำบากให้ชมรมพัฒนาเกมมาด้วยเลยนะ มากิ"
22060-136 = "ไม่เอาน่า~ ไหนๆ ก็มากันแล้ว~ ดูอะไรน่าสนุกด้วยกันมันก็จะยิ่งสนุกไม่ใช่เหรอ?"
22060-141 = "........."
22060-146 = "คุณครูล่ะคิดว่าไง? พอจะรู้อะไรบ้างไหม?"
22060-147 = "[s] \"ไม่รู้สิ ครูก็ไม่รู้เหมือนกัน...\""
22060-148 = "อ้าว~ ผิดคาดแฮะ~ นึกว่าคุณครูจะรู้อะไรซะอีก..."
22060-149 = "ถ้าเป็นของประหลาดแบบนี้ สงสัยต้องไปถามจากหัวหน้าฮิมาริแล้วละ... หัวหน้าก็เคยชอบอะไรแปลกๆ ลึกลับๆ แบบนี้ด้วย"
22060-150 = "ลึกลับงั้นเหรอ..."
22060-151 = "บางทีรองหัวหน้าจิฮิโระอาจเคาะคีย์บอร์ดสองสามครั้ง แล้วก็หาข้อมูลให้เราได้ในชั่วพริบตาก็ได้นะ!"
22060-152 = "เราจะไปหาข้อมูลจากคนที่ไม่อยู่ได้ยังไงล่ะคะ"
22060-153 = "ไม่อยู่งั้นเหรอ... จะว่าไปฉันก็ไม่ได้เจอหัวหน้าฮิมาริมานานมากแล้วแฮะ จนลืมไปแล้วว่าเคยอยู่ด้วยกัน#nมาก่อน"
22060-155 = "อ่า..."
22060-159 = "หืม? มีอะไรเหรออาริสึ?"

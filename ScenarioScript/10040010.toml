[translation]
10040010-1 = "Episode 1;Accomplice"
10040010-2 = "Heeheehee..."
10040010-4 = "At last...the end of the year. The final day."
10040010-5 = "Truly, it was a stormy year of turmoil. This blessed leisure almost feels like a hallucination."
10040010-6 = "...And despite all that, I survived."
10040010-7 = "That's right! Me! I came out victorious against every obstacle that conspired to obstruct the path to my happiness!"
10040010-8 = "And I'm kinda proud of myself for it! That's why..."
10040010-9 = "...I'll grant myself this small reward, for having survived such a difficult, tumultuous life."
10040010-14 = "Let me raise this solitary toast!"
10040010-15 = "For a world that's backwards, and for me, who's just a sad, lonely soul who longs for freedom but is forced to fall in line."
10040010-19 = "...\"Cheers\"."
10040010-26 = "...Ah."
10040010-31 = "What do you mean, \"Ah\"? What are you even doing? And with some weird background pulled up on the monitor..."
10040010-32 = "The photo is a beautiful nighttime view. Were you inspired to match its mood, Koyuki?"
10040010-34 = "W-Weird?! In what universe is that weird? Have some sense, geez!"
10040010-35 = "I don't want you, of all people, accusing me of having no sense."
10040010-36 = "Can't you see that I'm currently undergoing treatment for my weary soul? I was having a lonely year-end party! For one! For just me!"
10040010-37 = "No, you're not. You're in the Self-Reflection Room. You're supposed to be reflecting on your actions, not throwing a party."
10040010-38 = "And what exactly are you so weary from?! You're living it up, quite comfortably I might add, in here!"
10040010-39 = "Hah! Comfortable?! Ridonculous! Of course it looks comfortable to the perpetrator that stuffed me in here!"
10040010-40 = "You! You're the perpetrator! You're only in here because you drained the Seminar budget! AGAIN!"
10040010-41 = "'Fess up! What on earth did you buy with all that money?!"
10040010-42 = "I've told you time and time again that Seminar funds are not your personal wallet!"
10040010-46 = "*sigh*"
10040010-47 = "Considering your complete inability to self-reflect, I wonder if there's any point to even keeping you in here."
10040010-49 = "...?!"
10040010-50 = "S-So you're setting me free?!"
10040010-51 = "...? What in the...?"
10040010-52 = "You're completely twisting what I said. You're so..."
10040010-53 = "Whaaaaaat?! But you totally just said there's no point to imprisoning me!"
10040010-54 = "GYAH! You tricked me! You liar! Meanie pants! This is cruel and unusual punishment!"
10040010-55 = "...You're so completely illogical that I don't even want to respond."
10040010-57 = "But it's just like her, isn't it?"
10040010-59 = "Hah...!"
10040010-60 = "'Kay, just hear me out. Sure, maybe I did something a teensy, teensy, tiny bit wrong, but—"
10040010-61 = "Teensy...? Tiny...?"
10040010-62 = "BUT! Even if I did mess up a little, don't you know what today is? It's the last day of the year! A holiday!"
10040010-63 = "To be locked away in this prison masquerading as the Self-Reflection Room, on a day like today..."
10040010-64 = "Even you must think it's terrible and cruel to witness! To see me like this on, let me emphasize, the very last day of the year!"
10040010-65 = "Shouldn't I...get to do something?"
10040010-70 = "YES! SELF-REFLECT!!"
10040010-76 = "REFLECT!"
10040010-80 = "ON!"
10040010-84 = "YOURSELF!"
10040010-88 = "SELF-REFLECTION!!"
10040010-92 = "Reflect on your actions!"
10040010-97 = "Ack, ack, ack, ack! Say no to violence!!"
10040010-98 = "*sigh* Seriously..."
10040010-99 = "Okay. I get it, so please calm down. You're just bored, right?"
10040010-105 = "...? Why're you not mad all of a sudden?"
10040010-106 = "Are you planning something, Yuuka?"
10040010-108 = "Koyuki, you don't need to know, so just...be patient."
10040010-109 = "I'm sorry to ask this, Noa, but are you busy today?"
10040010-110 = "Oh? No, I'm quite free."
10040010-111 = "Then I'll borrow some of your time. Thank you!"
10040010-112 = "Koyuki! If you do one more thing out of line, I'm really not going to let it go this time, got it?!"
10040010-113 = "\"W-Won't let it go\"? What are you going to do to me?!"
10040010-117 = "...Gyah!"
10040010-118 = "P-Please! Don't deploy Noa against me! Not again!"
10040010-119 = "N-Noa? Why is SHE the one you're scared of?"
10040010-120 = "Have you realized that the way you treat Noa and the way you treat me are completely different?! Do you not take me seriously?!"
10040010-121 = "No matter how good Noa's memory is...!"
10040010-122 = "No, it's not just that..."
10040010-123 = "Hm. How do I put it? I mean, I'm sure you feel it too!"
10040010-124 = "Noa has this unique way of...applying pressure? Kinda?"
10040010-125 = "She can say one thing with her mouth, but I still feel like she's thinking something totally different."
10040010-126 = "...You know?"
10040010-130 = "..."
10040010-132 = "...?"
10040010-133 = "... ... ..."
10040010-134 = "...???"
10040010-135 = "...Hm."
10040010-136 = "Do you really, truly feel this is an appropriate topic of discussion at this time?"
10040010-137 = "...Ah."
10040010-138 = "That... Um... So..."
10040010-142 = "..."
10040010-147 = "...Gyah!"
10040010-149 = "I don't understand? You think Noa is hard to read?"
10040010-150 = "That's completely nonsensical. Do you think Noa is like you?"
10040010-151 = "Noa can be a bit playful at times, but she's not like you! You're impossible to read!"
10040010-157 = "W-Wow... Are you serious...?"
10040010-159 = "What? Why are you looking at me weirdly?"
10040010-160 = "I-I'm not! Well, I just think that you should stay exactly the way you are, Yuuka!"
10040010-161 = "...?!"
10040010-168 = "Wh-What is it?! Why?! What did I do this time?!"
10040010-169 = "I have no idea what you're trying to say, but it's pissing me off."
10040010-170 = "Stop messing around. What's your answer to my earlier question? Are you going to behave?"
10040010-171 = "Yes..."
10040010-172 = "...*sigh* I'm tired. Let's go, Noa."
10040010-178 = "..."
10040010-179 = "...Wh-What is it? Noa...?"
10040010-180 = "...Heehee."
10040010-181 = "It's...really nothing."
10040010-191 = "..."
10040010-192 = "...Heh."
10040010-193 = "...Are they gone...?"
10040010-198 = "Heeheehee... Yahahaha!"
10040010-200 = "Meanwhile, at Schale..."
10040010-207 = "[ns1] \"Ah... There's just too much work to do...\" \n[ns2] \"I can't believe I'm doing this on the last day of the year...\""
10040010-211 = "What?! You haven't finished your year-end accounting yet? Wh-What do you mean? We're already at the end of the year!"
10040010-212 = "Oh... Oh my gosh. There's SO much left to do! Why didn't you say anything?!"
10040010-213 = "Senseeeiii! "
10040010-215 = "...What?"
10040010-216 = "...The deadline's next week, so you'll be fine? What kind of mindset is that?"
10040010-217 = "It's called \"YEAR-END\" accounting! You should be done with it already!"
10040010-218 = "Huh? You want to give up?! No! This isn't a game!"
10040010-219 = "You can't just give up! Get going right now!"
10040010-220 = "I'm going to come by to check on your progress!"
10040010-221 = "...Don't think I won't!"
10040010-223 = "..."
10040010-224 = "Hm... This was completely self-inflicted."
10040010-229 = "[ns3] \"...? Who could be calling me at this time?\"\n[ns4] Take the call."
10040010-234 = "Yay! You answered!"
10040010-235 = "Yahoo! Sensei! Hiii!"
10040010-236 = "[s5] \"Koyuki? What's going on?\"\n[s6] \"It's surprising to hear from you at this time.\""
10040010-239 = "Hey! Don't be like that. It's the end of the year! What's wrong with giving my bestie a call?"
10040010-243 = "Whatcha doing? Lemme guess! Working? Because that's your job and stuff."
10040010-244 = "Ah? No, no. I just figured that's what you're always doing..."
10040010-245 = "...Huh?"
10040010-246 = "...? What? No, Sensei, seriously...?! "
10040010-247 = "I would never call you just to make fun of you! That's what you think of me?!"
10040010-248 = "Well..."
10040010-249 = "Of course I didn't just call you for no reason, though! Fufu..."
10040010-250 = "It wasn't to tease you either. In fact, I have something I think you'll like."
10040010-251 = "It's..."
10040010-252 = "Drum roll, please...!"
10040010-257 = "[ns7] \"This is...a Mushiqueen Card Pack?!\" \n[ns8] \"A new pack was released?!\""
10040010-260 = "Yahahaha! I knew you'd recognize it. That's right, the sold-out, totally-fresh, just-released first edition Mushiqueen Pack Box!"
10040010-261 = "Beginning right now, I'm going to open each card pack in this box, one by one! Aren't you just itching to know what legendaries lurk within the foil?"
10040010-262 = "...What?"
10040010-263 = "How'd I get it? How you get anything, bought it with money... Duh..."
10040010-264 = "With whose money? Ah... About that..."
10040010-268 = "...Why're you even asking?!"
10040010-269 = "[s9] \"You're going to get yelled at again...\"\n[s10] \"How do you plan on dealing with this later?\""
10040010-272 = "Late...? Later...?"
10040010-273 = "Yahahaha! Sensei! Oh, Sensei! You say the funniest things. What does \"later\" even mean?"
10040010-274 = "It's the last day of the year! So wouldn't \"later\" be next year?"
10040010-275 = "Therefore, why are you worrying yourself over next year already? You worrywart!"
10040010-276 = "Let's live life in the present! And in our current present, this moment we're experiencing right now, the only thing that matters is this pack! Yes? Yes?!"
10040010-277 = "[s11] \"That logic of yours is really...\" \n[s12] \"It's pretty novel, actually...\""
10040010-280 = "Anyway! You're focusing on useless stuff! What matters is that I'm going to open this pack, right now!"
10040010-281 = "I went out of my way to share this historic moment with you, and this is how you react! Ugh, Sensei!"
10040010-282 = "...What? Where am I right now?"
10040010-283 = "Well, where I always am, I guess... The Self-Reflection Room."
10040010-287 = "[ns13] \"Always...always...\"\n[ns14] \"When will the Self-Reflection Room find its true purpose?\""
10040010-290 = "Yahahaha! Your face is saying, \"Wow! Koyuki is so impressive!\""
10040010-291 = "So, when are we doing this? We've got all night! I can wait for you."
10040010-292 = "...What?"
10040010-293 = "You...can't come over? You have to finish your work?"
10040010-294 = "...Yuuka's gonna scold you if you don't get through it today?"
10040010-295 = "What in the world...?"
10040010-299 = "*sigh*..."
10040010-300 = "Did you not hear a single word I said, Sensei?!"
10040010-301 = "I already told you! Next year's problems are for next year!"
10040010-302 = "This isn't like you at all, Sensei. To be so afraid of some distant, unknown future."
10040010-303 = "[s15] \"That's not like me?\"\n[s16] \"What do you see me as...?\""
10040010-306 = "Tsk. This... This is a problem!"
10040010-307 = "Fine! I see how it is! You leave me no other choice. I'd like to see you endure this without giving in!"
10040010-308 = "Fufu... Please look forward to..."
10040010-309 = "[s17] \"...Koyuki?\"\n[s18] \"What are you trying to do...?\""
10040010-315 = "...my live unboxing stream! Let's go!"
10040010-316 = "Here's the first pack!"
10040010-317 = "I'm opening it!"
10040010-321 = "[ns] \"...\""
10040010-323 = "[ns19] \"...!\"\n[ns20] \"A live stream, right now...?!\""
10040010-327 = "Hmmm. No good pulls."
10040010-328 = "Yahahaha! I didn't get a single good one! I surely thought I'd pull at least one!"
10040010-329 = "Well, I guess I was being a bit greedy. It's the first pack of many, after all!"
10040010-330 = "Many...but not infinite... I just may need to open every single one to find a good one..."
10040010-336 = "And then...they'll disappear forever, right, Sensei?"
10040010-337 = "[s21] \"Why, you...!\"\n[s22] \"This is a dirty tactic to provoke me!\""
10040010-340 = "Hm, heehee. Well. I mean, of COURSE I wanted to experience this historical moment with my dearest teacher."
10040010-341 = "It's too bad you're such a diligent adult with no interest in cards whatsoever."
10040010-342 = "I suppose I simply have no other choice! I'll have to open them all up by myself, one by one."
10040010-343 = "I wonder what new cards will be in this brand-new pack? What stats will they have?"
10040010-344 = "You know, if we were to do it today, we could even build new decks and try them out together...with those shiny new cards..."
10040010-345 = "But, oh dear, since these packs are all sold out, it'll take at least a week for them to restock. By then, people will have discovered all the new ones already."
10040010-346 = "I guess you won't get to build a new deck all by yourself... You can just copy the decks other people have made, I guess."
10040010-347 = "...As long as that sits right with you, Sensei..."
10040010-348 = "You're so, so, sooo busy, right? And work is super-duper-uber important, riiight?"
10040010-349 = "...That's how you feel, RIGHT?"
10040010-350 = "[s23] \"Ugh... *grind* *grind*\"\n[s24] \"Kurosaki...KOYUKI...! (snap)\""
10040010-353 = "...Heeheehee."
10040010-354 = "Your mind says you want to be good and focus on your work, but at least your heart is being honest. So I'll ask you one last time."
10040010-355 = "This is the last night of the year to have this very first experience together... What do you say?"
10040010-359 = "...Green light?"

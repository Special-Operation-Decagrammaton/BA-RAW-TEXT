[translation]
10040010-1 = "第1話;共犯"
10040010-2 = "哼哼哼……"
10040010-4 = "一年就這樣過去了。#n不知不覺已經到了最後一天……"
10040010-5 = "真是有如風暴般的一年啊。#n現在享受的這份悠閒好不真實。"
10040010-6 = "……但是我活下來了。"
10040010-7 = "沒錯，我順利活到了最後。#n熬過了無數嫉妒、妨礙我幸福的戰鬥。"
10040010-8 = "連我都不禁為自己感到驕傲。#n所以……"
10040010-9 = "應該沒關係吧。#n都已經歷盡滄桑了，給自己一點小禮物也不過分吧。"
10040010-14 = "……所以，舉起孤獨的酒杯吧。"
10040010-15 = "為了錯誤的世界，以及……為了我這個在世界中渴望自由的孤獨靈魂。"
10040010-19 = "……「Cheers」。"
10040010-26 = "……啊。"
10040010-31 = "「啊」什麼「啊」……你又在做什麼？#n螢幕上還顯示著奇怪的圖片……"
10040010-32 = "真是張漂亮的夜景照呢。#n小雪醬，這是為了應景嗎？"
10040010-34 = "竟然說是奇怪的圖片！？#n前輩你不懂什麼叫看氣氛嗎！？"
10040010-35 = "這種話輪得到你來說我嗎……？"
10040010-36 = "沒看到我在療癒疲憊的自己嗎！我在開孤獨的1人年終派對啦！！"
10040010-37 = "不乖乖在反省室裡反省，還開什麼年終派對……#n光從這點就已經出局了吧……"
10040010-38 = "而且你有什麼好疲憊的啊！？#n那是疲憊的人該有的模樣嗎？看起來明明就過得很舒服啊！？"
10040010-39 = "哈……！真是莫名其妙！#n到底哪裡看起來舒服了！？也不想想這都是誰害的！！"
10040010-40 = "除了你還會有誰！！#n都怪你又亂拿研討會的預算，事情才會變成這樣！"
10040010-41 = "你這次又把錢花到哪裡去了！？你到底買了什麼東西……！"
10040010-42 = "研討會的預算可不是你的私人財產，我明明已經千叮嚀萬交代你別亂花了……！！"
10040010-46 = "唉……"
10040010-47 = "仔細想想，如果你連反省是什麼都不知道的話，我又何必把你關在反省室裡呢……"
10040010-49 = "……！？"
10040010-50 = "哦，所以你要放了我嗎！？"
10040010-51 = "……？#n你在胡說什麼啊……"
10040010-52 = "我剛才說的……才不是那個意思。"
10040010-53 = "咦咦咦──！？#n可是你剛剛不是說就算關住我也沒有用嗎？"
10040010-54 = "啊啊啊啊～！！！居然騙我！#n好過分，真的是太過分了！！什麼跟什麼嘛！！！"
10040010-55 = "你的邏輯真是荒謬到我都懶得反駁了。"
10040010-57 = "不愧是小雪醬呢。"
10040010-59 = "哈……！"
10040010-60 = "前輩，就算退一百步來說，這次真的是我的錯好了……"
10040010-61 = "退一百步來說……？真的是你的錯……？"
10040010-62 = "你知道今天是什麼日子？#n今天可是年末，是一年的最後一天耶？"
10040010-63 = "像今天這種日子，居然把我獨自關在這個名為反省室的監獄裡……！"
10040010-64 = "這樣未免也太殘忍了吧？今天是跨年夜耶？"
10040010-65 = "像今天這種日子……不做點事情慶祝怎麼行？"
10040010-70 = "你給我好好反省！！！"
10040010-76 = "你！"
10040010-80 = "給我！"
10040010-84 = "好好反省！"
10040010-88 = "聽懂了嗎！！"
10040010-92 = "反省！反省！再反省！！"
10040010-97 = "啊痛痛痛痛！！反對暴力！！！"
10040010-98 = "唉，真是的……"
10040010-99 = "知道了知道了，你先給我乖乖待著。#n反正總而言之就是你覺得很無聊對吧？"
10040010-105 = "……？#n這是什麼反應？"
10040010-106 = "優香醬……？你想到了什麼嗎？"
10040010-108 = "小雪你不用知道，乖乖在這裡等著就對了。"
10040010-109 = "乃愛，那個……抱歉，你今天有空嗎？"
10040010-110 = "嗯？我隨時都有空哦。"
10040010-111 = "謝謝，那麻煩你借我一點時間，我有件事想拜託你。"
10040010-112 = "小雪！我再強調一次，要是你敢再亂來，這次我一定不會放過你的！"
10040010-113 = "不放過我？#n你又打算對我做什麼了……"
10040010-117 = "……啊！"
10040010-118 = "難道你又要跟乃愛前輩聯手……！"
10040010-119 = "這跟乃愛有什麼關係……#n話說你為什麼說得好像只怕乃愛一個人啊！？"
10040010-120 = "小雪，你知道你對我和乃愛的態度簡直判若兩人嗎！？是覺得我很好欺負是不是！？"
10040010-121 = "就算乃愛的記憶力再怎麼好……！"
10040010-122 = "不是，呃……雖然不能說不對，但也不完全是這個原因……"
10040010-123 = "唔，該怎麼解釋好呢？#n前輩你應該也多少有感覺到吧？"
10040010-124 = "乃愛前輩的身上散發著一種獨特……又微妙的壓迫感……"
10040010-125 = "明明對著你說話，可是卻完全猜不透他的想法……類似這種感覺？"
10040010-126 = "……你都沒有感覺到嗎？"
10040010-130 = "…………"
10040010-132 = "……？"
10040010-133 = "………………"
10040010-134 = "……？？？"
10040010-135 = "嗯……"
10040010-136 = "你不覺得這種話不應該當著本人的面說嗎，小雪醬……？"
10040010-137 = "……啊。"
10040010-138 = "我……呃……那個，前輩，總之……"
10040010-142 = "…………"
10040010-147 = "……嗚啊啊！"
10040010-149 = "……在說什麼啊？#n乃愛怎麼了？完全猜不透他的想法？"
10040010-150 = "又在胡說八道……你以為乃愛跟你一樣嗎？"
10040010-151 = "雖然乃愛有時候的確有點愛捉弄人，但他跟你這種讓人捉摸不透的傢伙才不一樣！"
10040010-157 = "哇，哇……我的天，你剛才那番話是認真的嗎……"
10040010-159 = "怎，怎樣啦……那是什麼表情……"
10040010-160 = "不，不是，我……#n算了，優香前輩還是維持現在這個樣子比較好。"
10040010-161 = "……！？"
10040010-168 = "為，為什麼！？這次又怎麼了！！"
10040010-169 = "雖然不知道為什麼，但我總覺得心情有點差。"
10040010-170 = "還有不要一直轉移話題，你還沒回答我剛才的問題哦？#n你會乖乖待著吧？"
10040010-171 = "是……"
10040010-172 = "唉……累死我了……#n我們走吧，乃愛。"
10040010-178 = "…………"
10040010-179 = "怎，怎麼了嗎，前輩……？"
10040010-180 = "……呵呵。"
10040010-181 = "沒事……什麼也沒有。"
10040010-191 = "…………"
10040010-192 = "…………咯咯咯。"
10040010-193 = "都走了嗎……？"
10040010-198 = "咯咯咯咯……尼哈，尼哈哈哈哈……！！"
10040010-200 = "（……同一時刻，夏萊）"
10040010-207 = "[ns1]「啊……工作也太多了吧……」\n[ns2]「為什麼我的跨年夜會這麼悽慘呢……」"
10040010-211 = "什麼！？年終結算還沒有完成？#n這，這是什麼意思……已經年底了耶？"
10040010-212 = "等一下，怎麼還有這麼多……！#n為什麼不早點跟我說呢！！"
10040010-213 = "老～師～！！"
10040010-215 = "……嗯？"
10040010-216 = "繳交期限在下週，所以暫時先放著沒關係？哪有這種事啦！？"
10040010-217 = "老師！這可是「年終」結算耶！#n再怎麼樣也得在今天之內完成才行！"
10040010-218 = "……棄權？#n等一下，這又不是遊戲！？"
10040010-219 = "別找藉口了，快點動手吧！"
10040010-220 = "我之後會來檢查的……！！"
10040010-221 = "……我說到做到哦！！"
10040010-223 = "（…………）"
10040010-224 = "（嗯，這完全是自作自受）"
10040010-229 = "[ns3]「嗯……？這個時間竟然有人打給我？」\n[ns4] 接起電話"
10040010-234 = "……哦，打通了。"
10040010-235 = "呀齁～！老師你好呀！！"
10040010-236 = "[s5]「小雪？怎麼了嗎？」\n[s6]「你竟然會在這個時間打給我，真神奇。」"
10040010-239 = "唉唷～怎麼這麼說呢，我們都那麼熟了～#n而且今天可是跨年夜耶，打個電話給你也不奇怪吧？"
10040010-243 = "話說你現在在做什麼？是不是還在處理公務？畢竟這是你的工作嘛。"
10040010-244 = "不，不，沒什麼……我只是覺得你應該在工作而已。"
10040010-245 = "……嗯？"
10040010-246 = "……？#n不是不是，哎呀，真受不了老師你耶！"
10040010-247 = "什麼叫做「你該不會是為了嘲笑我才打給我的吧」，真是太過分了！#n我在你心裡是那種人嗎！？"
10040010-248 = "嗯……"
10040010-249 = "我當然不是閒閒沒事才打給你的，呵呵……"
10040010-250 = "雖然我並沒有要嘲笑你的意思，不過我接下來要說的話可能會讓你心動不已哦？"
10040010-251 = "那就是……"
10040010-252 = "鏘鏘……請看！！"
10040010-257 = "[ns7]「……！？這，這難道是甲蟲皇后的卡包……！？」\n[ns8]「等等，咦……？出新卡包了嗎！？」"
10040010-260 = "尼哈哈哈哈！！我就知道老師認得出來！#n這可是熱騰騰的新卡包，而且還是才剛上市就銷售一空的首刷版本哦！"
10040010-261 = "我現在正打算把這些卡包一包一包拆開～#n是不是很好奇裡面會出現哪些新卡呀～"
10040010-262 = "……嗯？"
10040010-263 = "問我是去哪裡買的？當然是花錢買的啊……？"
10040010-264 = "錢是從哪裡來的？#n那當然是……"
10040010-268 = "……為什麼要問這個？"
10040010-269 = "[s9]「你是不是又想挨罵了……」\n[s10]「你知道這麼做的下場是什麼嗎？」"
10040010-272 = "等等……？等一下……？"
10040010-273 = "尼哈哈哈哈！！這話還真有趣呢，老師！"
10040010-274 = "今天可是一年的最後一天！#n你說的等等應該也是明年了吧？"
10040010-275 = "明年的事不是就應該交給明年的我煩惱嗎？#n老師你真愛操心～"
10040010-276 = "人就應該活在當下！而當下最重要的就是這些卡包！#n──請問我有說錯嗎？"
10040010-277 = "[s11]「你這種思考方式還真是……」\n[s12]「又是走在潮流頂端的想法呢……」"
10040010-280 = "總之！！那些都不重要！我現在要來拆這些卡包了！"
10040010-281 = "我明明是為了讓老師見證這歷史性的一刻才特別打給你的，結果你居然說這種話！"
10040010-282 = "……嗯？問我現在人在哪裡？"
10040010-283 = "跟平常一樣在反省室啊。"
10040010-287 = "[ns13]「跟平常一樣……跟平常一樣……」\n[ns14]「反省室什麼時候才能發揮原本的功用呢？」"
10040010-290 = "尼哈哈哈！！#n老師那是什麼表情啊！一副若有所思的樣子！！"
10040010-291 = "所以你什麼時候會過來？我會一直等到你出現的哦！反正夜晚還很長嘛！"
10040010-292 = "……嗯？"
10040010-293 = "你說你來不了……？#n因為工作很多，所以今天沒辦法來……？"
10040010-294 = "如果沒在今天之內把工作做完，明天就會被優香前輩罵……？"
10040010-295 = "那是什麼意思……"
10040010-299 = "唉……"
10040010-300 = "老師，你有沒有把我剛才說的話聽進去啊？"
10040010-301 = "我不是說過那些都是明年的事嗎？"
10040010-302 = "居然會對遙遠的未來感到害怕，真不像老師的作風。"
10040010-303 = "[s15]「……什，什麼叫不像我的作風？」\n[s16]「不是，話不能隨便亂說……」"
10040010-306 = "哎呀呀，這樣也不行嗎……"
10040010-307 = "既然你要這麼說的話，我也不是沒有別的辦法。#n就讓我來瞧瞧，老師有沒有辦法拒絕我的誘惑吧。"
10040010-308 = "呵呵……敬請期待……"
10040010-309 = "[s17]「……小雪？」\n[s18]「你想做什麼……」"
10040010-315 = "來～要開始囉～即時開箱直播～"
10040010-316 = "首先是第一包～"
10040010-317 = "我要拆囉～！！"
10040010-321 = "[ns]「…………」"
10040010-323 = "[ns19]「……！！！！！！！！」\n[ns20]「竟然直播開箱……！！」"
10040010-327 = "唔嗯～沒什麼好料呢～"
10040010-328 = "尼哈哈哈！！#n啊，可惜這包沒中～還以為至少會中個一張的說～"
10040010-329 = "不過算了，畢竟第一包就想拆到的話，實在有點太貪心了嘛～反正我還有很多包。"
10040010-330 = "但說是這麼說，這盒卡包也不是無窮無盡的。#n像我這樣拆呀拆的……"
10040010-336 = "……「遲早會被我拆完」對吧，老師？"
10040010-337 = "[s21]「……！！你，你這傢伙……！！」\n[s22]「居然敢用這種方式挑釁我……！！」"
10040010-340 = "哪有～我明明就非常想和親愛的老師，一起分享這歷史性的時刻呀～"
10040010-341 = "可惜某位勤勞的大人，好像對這些卡片沒什麼興趣的樣子～"
10040010-342 = "既然如此～我不就只能自己把這些卡包都拆開了嗎～？"
10040010-343 = "這些可是新出的卡包，說不定會抽到某些有新功能的卡耶～#n不，肯定會抽到的～"
10040010-344 = "搞不好我今天就能把新卡牌加進我的牌組裡，然後找個對手測試看看了～"
10040010-345 = "而且新卡包的庫存都已經被搶購一空，下次能買到大概也是一週之後的事了～#n到時候大家肯定都已經組好牌了吧～"
10040010-346 = "所以根本沒機會自己組出新的牌組……只能抄別人的牌組來用～"
10040010-347 = "……不過這樣也沒關係吧～#n畢竟老師你……"
10040010-348 = "今．天．工．作．很．忙．對．吧……？#n工．作．第．一．對．吧……？"
10040010-349 = "對吧對吧……？"
10040010-350 = "[s23]「你，你竟敢……！！（咬牙切齒）」\n[s24]「黑崎……小雪……！！（顫抖）」"
10040010-353 = "……呵呵呵。"
10040010-354 = "無論再怎麼忍耐也騙不過自己的心的。#n那麼我再問你一次……"
10040010-355 = "怎麼樣？你願意跟我一起燃燒今年的最後一夜，探索前所未有的體驗嗎……"
10040010-359 = "……GO？"

[translation]
10040010-1 = "ตอนที่ 1;ผู้สมรู้ร่วมคิด"
10040010-2 = "ฮุฮุฮุ..."
10040010-4 = "เกือบจะหมดไปอีกปีแล้วนะ ในที่สุดก็ถึงคืนสุดท้ายของปีแล้ว..."
10040010-5 = "ปีนี้เป็นปีที่มีแต่เรื่องวุ่นวายจริงๆ วุ่นวายเสียจนการมีเวลามาพักผ่อนในตอนนี้ดูเหมือนจะเป็นเรื่องโกหก#nเลยละ"
10040010-6 = "แต่ยังไงเราก็อยู่รอดมาได้อีกปีนะ..."
10040010-7 = "ใช่แล้วละ สุดท้ายฉันก็ใช้ชีวิตรอดมาได้อีกปี ฉันต้องทนต่อการต่อสู้ที่ขัดขวางความสุขของฉันมา#nครั้งแล้วครั้งเล่า"
10040010-8 = "รู้สึกภูมิใจในตัวเองจังเลย เพราะงั้น..."
10040010-9 = "การให้ของขวัญเล็กๆ น้อยๆ กับตัวเองที่ใช้ชีวิตมาอย่างทุลักทุเล ก็คงเป็นเรื่องที่ทำได้ละเนอะ"
10040010-14 = "งั้นก็มาดื่มฉลองอย่างโดดเดี่ยวกันเถอะ..."
10040010-15 = "เพื่อโลกที่ผิดพลาด... และเพื่อฉันผู้มีจิตวิญญาณโดดเดี่ยวที่โหยหาอิสรภาพในโลกใบนั้น"
10040010-19 = "\"Cheers\"..."
10040010-26 = "อ่า..."
10040010-31 = "\"อ่า\" อะไรกัน... ทำอะไรอีกแล้ว? แล้วเปิดรูปอะไรแปลกๆ ไว้ที่หน้าจอด้วยน่ะ..."
10040010-32 = "เป็นรูปยามค่ำคืนที่สวยจังเลยนะคะ กำลังสร้างบรรยากาศอยู่เหรอคะ โคยูกิจัง?"
10040010-34 = "รูปแปลกๆ งั้นเหรอ!? ทำไมพูดแบบนั้นล่ะคะ!? รุ่นพี่ไม่มีเซนส์หรืออารมณ์ร่วมอะไรเลยเหรอคะ!?"
10040010-35 = "ไม่มีเซนส์งั้นเหรอ นี่ฉันต้องฟังคำแบบนี้จากเธอเหรอเนี่ย...?"
10040010-36 = "ไม่เห็นเหรอคะว่าฉันกำลังฮีลตัวเองที่สูญสิ้นกำลังใจอยู่น่ะ? ฉันกำลังจัดปาร์ตี้ส่งท้ายปีอย่างโดดเดี่ยว#nอยู่นะคะ!!"
10040010-37 = "เดี๋ยวนะ สั่งให้ทบทวนตัวเองในห้องสำนึกผิดก็ไม่ทำ แต่กลับมาจัดปาร์ตี้ส่งท้ายปีอยู่เนี่ยนะ แบบนี้ใช้ได้ที่ไหนกัน..."
10040010-38 = "แล้วเธอมีเรื่องอะไรให้สูญสิ้นกำลังใจ?? นี่น่ะเหรอที่เรียกว่าคนที่สูญสิ้นกำลังใจน่ะ? เธอดูสบายอกสบายใจมากกว่านะ!?"
10040010-39 = "เฮ้อ...! เหลือจะเชื่อเลย! ฉันดูสบายใจตรงไหนเหรอคะ!? แล้วที่เป็นอยู่แบบนี้มันเป็นเพราะใครกัน!!"
10040010-40 = "ก็เพราะตัวเธอเองไง!! ก็เธอเอางบของเซมิน่าไปผลาญเล่นอีกแล้ว ก็เลยเป็นแบบนี้ยังไงล่ะ!"
10040010-41 = "คราวนี้เอาไปใช้ทำอะไรมาอีก!? ไปซื้ออะไรมา...!"
10040010-42 = "ฉันพูดกี่ครั้งแล้วว่างบของเซมิน่าไม่ใช่เงินส่วนตัว เพราะงั้นจะเอามาใช้ตามอำเภอใจไม่ได้น่ะ...!!"
10040010-46 = "เฮ้อ..."
10040010-47 = "พอมาคิดๆ ดู ฉันว่าเธอคงไม่รู้ด้วยซ้ำว่าการสำนึกผิดคืออะไร งั้นการขังไว้ในห้องสำนึกผิดก็คงไม่มี#nความหมายหรอก..."
10040010-49 = "...!?"
10040010-50 = "อ๊ะ งั้นแสดงว่าจะให้ฉันออกไปได้เหรอคะ!?"
10040010-51 = "ว่าไงนะ...?????? พูดเรื่องเหลวไหลอะไร..."
10040010-52 = "ฉันไม่ได้หมายความแบบนั้นสักหน่อย ที่ฉันพูดเมื่อกี้น่ะ..."
10040010-53 = "อะไรกันคะ? แต่เมื่อกี้ยังพูดอยู่เลยว่าต่อให้อยู่ในนี้ก็ไม่มีความหมายน่ะ??"
10040010-54 = "แงงงง~!!! แกล้งพูดให้ฉันดีใจเหรอคะเนี่ย! ทำแบบนี้มันมากเกินไปแล้วนะ!! ฉันไม่ชอบแบบนี้เลยค่ะ!!!"
10040010-55 = "ตรรกะของเธอมันเพี้ยนจนฉันไม่อยากตอบโต้ด้วยแล้วละ"
10040010-57 = "สมกับที่เป็นโคยูกิจังเลยนะคะ"
10040010-59 = "เฮอะ...!"
10040010-60 = "ฟังฉันนะคะรุ่นพี่ ก็ได้ค่ะ ฉันจะยอมอ่อนข้อให้ สมมติว่าฉันเป็นคนผิดเองแล้วกันค่ะ"
10040010-61 = "ยอมอ่อนข้อให้...? ว่าตัวเองเป็นคนผิด...?"
10040010-62 = "แต่ถึงฉันจะทำผิดอะไรไป แต่ก็รู้กันไม่ใช่เหรอคะว่าวันนี้วันอะไร? วันนี้คือวันสิ้นปีนะคะ เป็นวันสุดท้ายของปีเลยนะ"
10040010-63 = "ในวันที่มีความหมายแบบนี้ แต่ฉันต้องมาถูกขังอย่างโดดเดี่ยวในคุกที่ชื่อว่าห้องสำนึกผิด...!"
10040010-64 = "แบบนี้มันเกินไปหรือเปล่าคะ? นี่มันวันสุดท้ายของปีเลยนะ...?"
10040010-65 = "ในวันดีๆ แบบนี้น่ะ... ต้องให้ฉันได้ทำอะไรบ้างไม่ใช่เหรอคะ?"
10040010-70 = "ก็ถึงได้ให้ไปสำนึกผิดไงเล่า!!!"
10040010-76 = "สำ!"
10040010-80 = "นึก!"
10040010-84 = "ผิด!"
10040010-88 = "บ้าง!!"
10040010-92 = "ปีหน้าจะได้ไม่ทำอีกไง!!"
10040010-97 = "โอ๊ยยยยย!! อย่าใช้ความรุนแรงสิ!!!"
10040010-98 = "เฮ้อ จริงๆ เลยเชียว..."
10040010-99 = "เข้าใจแล้ว ฉันเข้าใจแล้ว งั้นก็อยู่นิ่งๆ ก่อน สรุปว่าอยากหาอะไรทำใช่มั้ย?"
10040010-105 = "อะไรกันน่ะ...?? ทำไมมีท่าทีแบบนั้นล่ะคะ?"
10040010-106 = "ยูกะจัง...? คิดอะไรอยู่งั้นเหรอคะ?"
10040010-108 = "เธอน่ะไม่ต้องรู้หรอก โคยูกิ รอไปก่อน"
10040010-109 = "ส่วนโนอา... ขอโทษนะ วันนี้พอจะมีเวลาบ้างมั้ย?"
10040010-110 = "หืม? ฉันไม่ติดอะไรอยู่แล้วค่ะ"
10040010-111 = "ขอบใจนะ งั้นฉันขอยืมเวลาหน่อยนะ ฉันมีเรื่องอยากขอร้องน่ะ"
10040010-112 = "โคยูกิ! อย่างที่ฉันบอกไปเมื่อกี้ ถ้าเธอทำอะไรแปลกๆ อีกละก็ ครั้งนี้ฉันจะไม่อยู่เฉยๆ แน่!"
10040010-113 = "จะไม่อยู่เฉยๆ งั้นเหรอคะ งั้นจะทำอะไร..."
10040010-117 = "เฮือก...!"
10040010-118 = "หรือว่าจะจับมือกับรุ่นพี่โนอาแล้วทำอะไรฉัน...!!"
10040010-119 = "โนอาเกี่ยวอะไรด้วย... เดี๋ยวนะ แล้วทำไมเธอถึงกลัวแต่โนอาล่ะ!?"
10040010-120 = "โคยูกิ รู้ตัวหรือเปล่าว่าเธอน่ะปฏิบัติตัวกับฉันและโนอาแบบสองมาตรฐาน!? กลัวแต่โนอา แต่ไม่กลัวฉันงั้นเหรอ!?"
10040010-121 = "ต่อให้โนอาจะความจำดีขนาดไหนก็เถอะ...!"
10040010-122 = "ไม่ใช่นะคะ... ไม่สิ ก็ไม่เชิงว่าไม่ใช่ แต่นั่นก็ไม่ใช่เหตุผลทั้งหมด..."
10040010-123 = "อืม ต้องเรียกว่าอะไรดีนะ? แต่รุ่นพี่เองก็รู้สึกอย่างนั้นอยู่บ้างไม่ใช่เหรอคะ?"
10040010-124 = "เอกลักษณ์เฉพาะของรุ่นพี่โนอาน่ะ ต้องเรียกว่าอะไรนะ... แรงกดดันอันแปลกประหลาด...?"
10040010-125 = "แบบว่า... ต่อให้รุ่นพี่โนอากำลังพูดอะไรอยู่ แต่เราก็ไม่รู้เลยว่าในใจของรุ่นพี่น่ะคิดอะไรอยู่กันแน่...? อะไรแบบนี้น่ะค่ะ"
10040010-126 = "ไม่รู้สึกเลยเหรอคะ...?"
10040010-130 = "......"
10040010-132 = "...?"
10040010-133 = "............"
10040010-134 = "...?????"
10040010-135 = "คือว่า..."
10040010-136 = "ไม่คิดบ้างเหรอคะว่าไม่ควรพูดเรื่องของฉันต่อหน้าฉันน่ะ? โคยูกิจัง...?"
10040010-137 = "อ่า..."
10040010-138 = "เอ่อ... คือ... อืม รุ่นพี่ พอดีฉัน..."
10040010-142 = "......"
10040010-147 = "เฮือก...!"
10040010-149 = "หมายความว่ายังไงน่ะ...???? โนอามีปัญหาตรงไหน? ไม่รู้ว่าคิดอะไรอยู่กันแน่เนี่ยนะ?"
10040010-150 = "พูดอะไรเหลวไหล... คิดว่าโนอาจะเหมือนเธอหรือไง? เรื่องแบบนั้นน่ะเป็นไปไม่ได้หรอก!"
10040010-151 = "ถึงโนอาจะขี้เล่นบ้างในบางครั้ง แต่ก็ไม่ใช่เด็กที่คาดเดาความคิดไม่ได้อย่างเธอหรอกนะ!"
10040010-157 = "หะ... โห... พูดปกป้องกันขนาดนี้เลย..."
10040010-159 = "อะ... อะไรกัน... ทำไมทำหน้าแบบนั้น..."
10040010-160 = "ปะ... เปล่าค่ะ ก็แค่... ค่ะ ฉันอยากให้รุ่นพี่ยูกะทำตัวเหมือนอย่างตอนนี้ไปตลอดเลยค่ะ"
10040010-161 = "...!?"
10040010-168 = "อะ... อะไรคะ!? ทำไมคะ!? ฉันผิดอะไรอีก!!"
10040010-169 = "ไม่รู้หรอก แต่ฟังแล้วมันอารมณ์เสียน่ะ"
10040010-170 = "เอาเถอะ เลิกพูดอะไรอ้อมค้อมได้แล้ว ตกลงกับฉันมาเสียดีๆ ว่าจะรออยู่อย่างสงบเสงี่ยมน่ะ"
10040010-171 = "ค่ะ..."
10040010-172 = "ฮู่ว... เหนื่อยจังเลย... ไปกันเถอะ โนอา"
10040010-178 = "..."
10040010-179 = "อะ... อะไรกันคะเนี่ย? รุ่นพี่...?"
10040010-180 = "ฮุฮุ..."
10040010-181 = "ไม่มีอะไรมากหรอกค่ะ..."
10040010-191 = "..."
10040010-192 = "คิกคิกคิก..."
10040010-193 = "ไปหรือยังนะ...?"
10040010-198 = "คิกคิกคิกคิก... อุวะ... อุวะฮะฮะ...!!"
10040010-200 = "(ในเวลาเดียวกัน ที่ชาเล่ต์)"
10040010-207 = "[ns1] \"เฮ้อ... งานท่วมหัวไปหมดแล้ว...\"\n[ns2] \"วันสิ้นปีทั้งที แต่ต้องมาทำงานเหรอเนี่ย...\""
10040010-211 = "ว่าไงนะคะ!? ยังปิดงบปลายปีไม่เสร็จงั้นเหรอคะ? มะ... หมายความว่ายังไง... นี่มันวันสิ้นปีแล้วนะคะ?"
10040010-212 = "เดี๋ยวนะ ยังเหลือตั้งขนาดนี้เลยเหรอเนี่ย...! ถ้าคิดว่าจะทำไม่ทัน ก็ควรบอกฉันสิคะ!!"
10040010-213 = "คุณ~ ครู~!! "
10040010-215 = "คะ...?"
10040010-216 = "กำหนดส่งคือสัปดาห์หน้า เอาไว้เดี๋ยวค่อยทำก็ได้งั้นเหรอคะ? แบบนี้มีที่ไหนกันล่ะคะ!?"
10040010-217 = "คุณครู! นี่มันปิดงบ 'ปลายปี' นะคะ! อย่างน้อยก็ต้องทำให้เสร็จภายในปีนี้สิคะ!"
10040010-218 = "คะ? ยอมแพ้เหรอคะ...? อะไรกัน นี่ไม่ใช่เกมนะ!?"
10040010-219 = "จะมายอมแพ้ได้ไง! เริ่มทำเดี๋ยวนี้เลยค่ะ!"
10040010-220 = "แล้วฉันจะมาตรวจสอบทีหลัง...!!"
10040010-221 = "ต้องทำเลยนะคะ...!!"
10040010-223 = "(...)"
10040010-224 = "(อืม กรรมตามสนองของแท้เลย)"
10040010-229 = "[ns3] \"ใครโทรมาเวลานี้นะ...?\"\n[ns4] รับโทรศัพท์"
10040010-234 = "โอ๊ะ รับแล้ว..."
10040010-235 = "ยะฮู้ว! คุณครู! สวัสดีค่ะ!!"
10040010-236 = "[s5] \"โคยูกิ? มีเรื่องอะไรเหรอ?\"\n[s6] \"โทรมาตอนนี้มีธุระอะไรเหรอ โคยูกิ?\""
10040010-239 = "แหม~ ถามเหมือนคนห่างคนไกลกันไปได้ วันนี้เป็นวันสิ้นปีทั้งที ฉันจะโทรหาหน่อยไม่ได้เหรอคะ?"
10040010-243 = "ว่าแต่ตอนนี้ทำอะไรอยู่เหรอคะ? คงจะทำงานอยู่ใช่มั้ยคะ? ก็นั่นคือหน้าที่ของครูนี่เนอะ"
10040010-244 = "มะ... ไม่หรอกค่ะ ฉันแค่ อืม... แค่คิดว่าคุณครูน่าจะกำลังทำงานอยู่น่ะค่ะ"
10040010-245 = "คะ...?"
10040010-246 = "ไม่ใช่อย่างนั้นนะ เฮ้อ คุณครูเนี่ย จริงๆ เลย! "
10040010-247 = "คิดว่าฉัน \"โทรมาชวนโดดงาน\" งั้นเหรอคะ? แบบนี้เกินไปแล้วนะ! คิดว่าฉันเป็นเด็กแบบนั้นเหรอคะ!?"
10040010-248 = "ก็นะ..."
10040010-249 = "ที่จริงฉันก็มีเหตุผลที่ติดต่อมาอยู่หรอกค่ะ ฮุฮุ..."
10040010-250 = "อย่าเรียกว่าเป็นการโดดงานเลยค่ะ เรียกว่าเป็นสิ่งที่จะทำให้คุณครูติดใจจะดีกว่า"
10040010-251 = "และนั่นก็คือ..."
10040010-252 = "ตั้งตารอได้เลย ตื่นเต้นๆๆๆ...!!"
10040010-257 = "[ns7] \"นะ... นี่มันแพ็กการ์ดมูชิควีน...!?\"\n[ns8] \"เดี๋ยวนะ...? ออกแพ็กใหม่แล้วเหรอ!?\""
10040010-260 = "อุวะฮ่าฮ่าฮ่า!! แค่เห็นก็รู้เลยสินะคะ! นี่เป็นแพ็กใหม่ที่เพิ่งออกมาสดๆ ร้อนๆ เลยค่ะ เป็นล็อตแรกของ#nตลาดเลยละ!"
10040010-261 = "ฉันว่าจะแกะการ์ดในแพ็กทีละใบๆ ตอนนี้เลย~ คุณครูไม่อยากรู้เหรอคะว่าจะมีการ์ดใหม่อะไรบ้าง~?"
10040010-262 = "คะ...?"
10040010-263 = "ฉันซื้อมาได้ยังไงน่ะเหรอคะ? ก็จ่ายเงินซื้อไงคะ...?"
10040010-264 = "เอาเงินมาจากไหนน่ะเหรอคะ? ก็..."
10040010-268 = "ถามเรื่องนี้ทำไมเหรอคะ...?"
10040010-269 = "[s9] \"เดี๋ยวเถอะ เดี๋ยวก็ได้โดนดุทีหลังหรอก...\"\n[s10] \"เดี๋ยวก็ได้โดนบ่นทีหลังหรอก เธอน่ะ\""
10040010-272 = "ทีหลัง...? งั้นเหรอคะ...?"
10040010-273 = "อุวะฮ่าฮ่าฮ่า!! คุณครูเนี่ย พูดอะไรน่าขำนะคะ ทีหลังงั้นเหรอคะ?"
10040010-274 = "วันนี้เป็นวันสุดท้ายของปีนะคะ! ถ้าพูดว่าทีหลัง ก็แปลว่าหลังจากวันนี้ งั้นก็คงเป็นปีหน้าเลยสิ?"
10040010-275 = "จะกังวลเรื่องของปีหน้าไปก่อนทำไมล่ะคะ? เกิดมาเพื่อกังวลหรือไงน้า~"
10040010-276 = "อยู่กับปัจจุบันสิคะ เรื่องของอนาคตไว้ให้ตัวเราในอนาคตจัดการค่ะ! และสิ่งที่สำคัญในปัจจุบันก็คือ#nการ์ดแพ็กนี้ไม่ใช่เหรอคะ? ฉันพูดถูกใช่มั้ยล่ะ?"
10040010-277 = "[s11] \"ตรรกะอะไรเนี่ย...\"\n[s12] \"เป็นตรรกะที่แปลกใหม่ดีนะ...\""
10040010-280 = "เอาเถอะค่ะ!! เรื่องตรรกะน่ะไม่สำคัญหรอก! ประเด็นคือฉันกำลังจะแกะการ์ดในแพ็กต่างหากค่ะ!"
10040010-281 = "ฉันอุตส่าห์โทรมาหาคุณครูเพราะอยากให้อยู่ด้วยกันในช่วงเวลาแห่งประวัติศาสตร์นี้เลยนะคะ!"
10040010-282 = "คะ...? ตอนนี้ฉันอยู่ที่ไหนน่ะเหรอคะ?"
10040010-283 = "ก็ที่ประจำละค่ะ ห้องสำนึกผิดไงคะ"
10040010-287 = "[ns13] \"ที่ประจำ... งั้นเหรอ...\"\n[ns14] \"ใช้ห้องสำนึกผิดเป็นที่พักส่วนตัวแล้วเหรอ?\""
10040010-290 = "อุวะฮ่าฮ่า!! อะไรกันคะ ดูทำหน้าเข้าสิ! ประทับใจฉันใช่มั้ยล่ะคะ!!"
10040010-291 = "ว่าไงล่ะคะ จะมาหาฉันตอนไหนคะ? ฉันจะรอจนกว่าคุณครูจะมานะ!"
10040010-292 = "คะ...?"
10040010-293 = "มาไม่ได้เหรอคะ...? วันนี้มาไม่ได้เพราะงานเยอะงั้นเหรอ...?"
10040010-294 = "ถ้าไม่ทำไว้ตั้งแต่วันนี้ให้ได้เยอะๆ พรุ่งนี้รุ่นพี่ยูกะจะมาดุเอางั้นเหรอคะ...?"
10040010-295 = "อะไรกัน..."
10040010-299 = "เฮ้อ..."
10040010-300 = "คุณครูคะ ไม่ได้ฟังที่ฉันบอกไปเมื่อกี้เหรอคะ?"
10040010-301 = "สุดท้ายแล้วนั่นมันก็คืองานของปีหน้าไม่ใช่เหรอคะ?"
10040010-302 = "เกรงกลัวต่ออนาคตอันไกลโพ้นที่ยังมาไม่ถึงจนแสดงความกล้าออกมาไม่ได้แบบนี้ ไม่สมกับเป็นคุณครูเลยค่ะ"
10040010-303 = "[s15] \"แล้วแบบไหนเหรอที่สมกับเป็นครูน่ะ...???\"\n[s16] \"อนาคตอันไกลโพ้นอะไรกัน เหลือไม่กี่ชั่วโมงแล้วนะ\""
10040010-306 = "คิกคิก ไม่ไหวๆ ไม่ได้การละ คุณครูคนนี้เนี่ย..."
10040010-307 = "ก็ได้ ถ้าจะมาไม้นี้ละก็ ใช่ว่าฉันจะหมดหนทางหรอกนะคะ มาดูกันค่ะว่าคุณครูจะปฏิเสธได้หรือเปล่า"
10040010-308 = "ฮุฮุ... ตั้งตารอได้เลย..."
10040010-309 = "[s17] \"โคยูกิ...?\"\n[s18] \"จะทำอะไรน่ะ...\""
10040010-315 = "เอาละ~ เริ่มเลยนะคะ~ ไลฟ์อันบ็อกซ์การ์ดมูชิควีน~"
10040010-316 = "ใบแรกจะได้อะไรน้า~"
10040010-317 = "จะแกะละนะ~!"
10040010-321 = "[ns] \"...\""
10040010-323 = "[ns19] \"...!!!!!!!\"\n[ns20] \"ไลฟ์แกะการ์ดเหรอ...!!\""
10040010-327 = "อืม~ อะไรเนี่ย เกลือๆๆ~"
10040010-328 = "อุวะฮ่าฮ่า!! นึกว่าจะได้การ์ดแรร์เสียอีก~"
10040010-329 = "แต่ก็นะ ถ้าหวังว่าจะได้ของดีตั้งแต่ใบแรกก็คงโลภไปหน่อย เหลือการ์ดที่ยังไม่ได้แกะอีกตั้งเยอะเลยนี่"
10040010-330 = "ก็นะ ถึงจะบอกว่ายังเหลืออีกเยอะก็เถอะ แต่แกะแป๊บเดียว เดี๋ยวก็..."
10040010-336 = "... \"ก็คงหมดแล้ว\" ว่ามั้ยคะ คุณครู?"
10040010-337 = "[s21] \"เด็กคนนี้นี่...!!\"\n[s22] \"ยั่วยุครูด้วยวิธีแบบนี้เหรอ...!!\""
10040010-340 = "เปล่า~ ยั่ว~ ยุ~ นะ~ ฉันก็แค่อยากให้คุณครูที่ฉันนับถือมีส่วนร่วมในเหตุการณ์แห่งประวัติศาสตร์#nเท่านั้นเองค่ะ~"
10040010-341 = "แต่ผู้ใหญ่ที่ขยันขันแข็งอย่างคุณครูดูเหมือนจะไม่ได้สนใจในการ์ดสักเท่าไรเลยนะคะ~?"
10040010-342 = "ถ้าอย่างนั้น~ ฉันก็คงต้องแกะการ์ดแล้วก็ตื่นเต้นคนเดียวสินะคะ~?"
10040010-343 = "นี่เป็นแพ็กใหม่ งั้นก็อาจจะมีการ์ดที่มีค่าพลังใหม่ๆ ที่ไม่เคยมีมาก่อนก็ได้นะ~? ไม่สิ ความเป็นไปได้#nต้องมากกว่า 'อาจจะ' แน่นอน~"
10040010-344 = "วันนี้ต้องได้ใส่การ์ดใบใหม่ในสำรับแน่นอนเลย~"
10040010-345 = "ล็อตแรกก็ขายไปหมดแล้ว ถ้าจะซื้อใหม่ก็คงต้องรอเป็นอาทิตย์ แต่กว่าจะถึงตอนนั้นก็คงไม่มีอะไรให้#nลุ้นแล้วก็ได้~?"
10040010-346 = "แต่ก็นะ เพราะยังไงก็อาจจะมีคนที่... ยอมแพ้กับการมีสำรับใหม่..."
10040010-347 = "แล้วจัดการ์ดที่มีตามคนอื่นเอาก็ได้ ใครจะไปรู้~? เพราะคนนั้นก็..."
10040010-348 = "เอา แต่ ยุ่ง อยู่ กับ งาน...? งาน ต้อง มา เป็น ที่ หนึ่ง อยู่ แล้ว เนอะ...?"
10040010-349 = "ฉันพูดถูก... มั้ยล่ะคะ...?"
10040010-350 = "[s23] \"ฮึ่ยยยยยย...!! (กรอด)\"\n[s24] \"คุโรซากิ... โคยูกิ...! (ฮึ่ม)\""
10040010-353 = "ฮุฮุฮุ..."
10040010-354 = "อยากข่มจิตใจไว้ แต่สุดท้ายก็ทำไม่ได้สินะคะ ถ้างั้นฉันจะถามอีกครั้งค่ะ"
10040010-355 = "ว่ายังไงล่ะคะ? โอกาสที่จะได้ใช้เวลาในคืนสุดท้ายของปีกับฉันในการเปิดประสบการณ์... เปิดการ์ดข้ามปี..."
10040010-359 = "GO...?"

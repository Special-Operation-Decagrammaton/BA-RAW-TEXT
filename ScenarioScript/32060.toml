[translation]
32060-1 = "ตอนที่ 6;โกลาหลกลางดึก (2)"
32060-2 = "ชมรมชิมอาหาร...?"
32060-3 = "ตอนนี้รุ่นพี่อยู่ไหนคะ? รีบออกคำสั่งเถอะค่ะ ขืนชักช้าแบบนี้รุ่นพี่ซึรุกิจะบุกเดี่ยวไปนะคะ"
32060-4 = "ขะ... ขวางซึรุกิไว้ก่อนค่ะ ตอนนี้ฉันออกมาข้างนอกเพราะมีภารกิจส่วนตัว..."
32060-5 = "อ่า ไม่ไหวแน่ เราไม่ไหวแน่ค่ะ รุ่นพี่ฮาสุมิก็รู้นี่คะว่าเราจัดการเองไม่ได้ถ้าไม่มีรุ่นพี่"
32060-6 = "อ๊ะ รุ่นพี่ซึรุกิ? อย่าไปนะคะ! ทางนั้นไม่ใช่ประตู แต่เป็นผนังต่างหาก..."
32060-11 = "ไปซะแล้ว... ฉันจะบุกเข้าไปก่อนแล้วกันค่ะรุ่นพี่"
32060-12 = "(แกร็ก)"
32060-13 = "..."
32060-18 = "อยู่แถวๆ นี้สินะ ฟังจากเสียงระเบิดแล้ว ความโกลาหลเกิดอยู่ในรัศมี 1 กิโลเมตร"
32060-19 = "ฮือ..."
32060-20 = "ทุกคนคะ... "
32060-21 = "ขอโทษที่ขอร้องกะทันหันนะคะ แต่ฉันอยากได้ความช่วยเหลือจากทุกคนค่ะ#nช่วยฉันหน่อยได้ไหมคะ?"
32060-22 = "ตอนนี้เราอยู่ในสถานการณ์ที่ละเอียดอ่อนของสนธิสัญญาเอเดนที่ใกล้เข้ามา หากปัญหานี้ก่อเป็น#n\nความขัดแย้งระหว่างชมรมทวงความยุติธรรมและเกเฮนน่า ก็จะเป็นข้อเสียเปรียบกับเราในอนาคตค่ะ"
32060-23 = "ฉันว่าปัญหานี้ต้องช่วยคลี่คลายโดยชมรมชั้นเรียนเสริมและ <ชาเล่ต์> แล้วล่ะค่ะ...#nคุณครูคะ ได้โปรด..."
32060-24 = "[s] \"ได้เลย ชมรมชั้นเรียนเสริม! ออกปฏิบัติการ!\" "
32060-26 = "เข้าใจแล้ว ถ้าเป็นการช่วยคุณครูล่ะก็ ฉันไม่มีปัญหา"
32060-27 = "คะ?! อะ... เอ่อ... ทำไมจู่ๆ ก็ชวนต่อสู้ล่ะคะ..."
32060-28 = "อุ๊ยตาย... ถ้าคุณครูพูดแบบนี้แล้ว... ฮุฮุ♡"
32060-32 = "ฉะ... ฉันด้วยเหรอ...? กับรุ่นพี่ฮาสุมิเหรอ...?"
32060-33 = "ใช่ค่ะโคฮารุ เราได้ทำภารกิจด้วยกันเร็วกว่าที่คิดอีกนะคะ"
32060-34 = "อะ... เอ่อ รับทราบค่ะ!"
32060-35 = "จะว่าไป นี่เป็นครั้งแรกเลยนะที่ได้รับคำสั่งการจากคุณครู ใช้งานฉันให้เต็มที่เลยนะ"
32060-36 = "ตายจริง.....♡"
32060-37 = "[s] \"เอาล่ะ ออกตัวได้!\""

[translation]
32060-1 = "第6話;深夜的大騷動（２）"
32060-2 = "……美食研究會？"
32060-3 = "話說前輩，你現在在哪裡呢？#n再沒有收到命令的話，弦生前輩好像快要發射……飛出去了哦。"
32060-4 = "請，請先阻止弦生吧。#n我現在……在外面有點事……"
32060-5 = "沒辦法啦，蓮實前輩之外的人阻止不太了……"
32060-6 = "啊，弦生前輩！請別過去啊！還有那邊不是門是牆壁──"
32060-11 = "啊……總之我們也先追過去吧，先出擊囉。"
32060-12 = "（嗶）"
32060-13 = "……"
32060-18 = "很近呢。從爆炸的聲音聽起來，應該距離這裡不到1km吧。"
32060-19 = "啊，啊嗚……"
32060-20 = "……各位。"
32060-21 = "雖然很突然，但我需要大家的力量，能拜託你們嗎？"
32060-22 = "現在因為伊甸園條約的關係，正處於非常敏感的時期。#n此事如果被視為三一與格黑娜的衝突，恐怕將會造成不好的影響。"
32060-23 = "因此希望能由補課部和「夏萊」出面解決……#n老師，萬事拜託了……"
32060-24 = "[s] 「我明白了，補課部出動吧。」"
32060-26 = "我知道了。聽從老師的指示。"
32060-27 = "咦！？突，突然就要戰鬥了嗎……！？啊，啊嗚……"
32060-28 = "呵呵……既然老師都這麼說了♡"
32060-32 = "啊，我，我也要……？跟老師和……蓮實前輩一起……？"
32060-33 = "我一直覺得有一天能跟你一起並肩作戰的……看來這天來得比想像中還早呢，小春。"
32060-34 = "是，是！我會加油的……！"
32060-35 = "這麼說來，完全在老師的指揮下戰鬥還是第一次呢。不用多慮，盡情使用我吧。"
32060-36 = "哎呀哎呀……♡"
32060-37 = "[s] 「那麼，千萬注意安全啊。」"

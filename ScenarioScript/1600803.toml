1600803-15 = "[s] \"내가 곁에서 도와줄 테니까 기운 내.\""
1600803-16 = "5;후부키;00;……정말? 그럼 선생에게 부탁 하나만 해도 될까?\n#5;em;[반짝]\n#5;jump"

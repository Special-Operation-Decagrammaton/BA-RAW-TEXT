[translation]
1600803-1 = "การลาดตระเวนของตำรวจจอมขี้เกียจ"
1600803-2 = "(คุณครูมาที่ตัวเมืองเพื่อมาให้กำลังใจฟุบุกิที่กำลังหดหู่)"
1600803-8 = "เฮ้อ..."
1600803-9 = "ร้อนจัง น่าหงุดหงิด ทรมาน... อยากกลับแล้ว..."
1600803-10 = "อยากจะเลิกทำงานไร้สาระแบบนี้ แล้วกลับไปนั่งกินโดนัทกับกาแฟที่สำนักงานจัง"
1600803-11 = "[s1] “งานไร้สาระเหรอ...”\n[s2] “การลาดตระเวนก็เป็นความรับผิดชอบของทางวัลคิรี่นะ”"
1600803-12 = "แต่ว่าสถานที่ที่ต้องลาดตระเวนวันนี้มันกว้างเกินไป ตรอกซอกซอยก็ซับซ้อน#nอย่างกับเขาวงกต"
1600803-13 = "แต่ว่าสถานที่ที่ต้องลาดตระเวนวันนี้มันกว้างเกินไป ตรอกซอกซอยก็ซับซ้อน#nอย่างกับเขาวงกต"
1600803-14 = "ถ้าจะให้สำรวจซอกซอยทั้งหมดนี้ให้ครบ ใช้เวลาครึ่งวันก็ไม่น่าจะพอหรอก..."
1600803-15 = "[s] “ครูจะคอยช่วยอยู่ข้างๆ เอง ร่าเริงเข้าไว้นะ”"
1600803-16 = "จริงนะ...? ถ้างั้น ฉันขอรบกวนคุณครูเรื่องหนึ่งได้มั้ย?"
1600803-17 = "ตรงนี้คือถนนหมายเลข 1 คุณครูช่วยลาดตระเวนไปจนถึงถนนหมายเลข 5 ให้ทีสิ"
1600803-18 = "อ๋อ แล้วก็ฝากลาดตระเวนถนนฝั่งตรงข้ามด้วยนะ"
1600803-19 = "[s] “แล้วระหว่างนั้นฟุบุกิจะทำอะไรล่ะ?”"
1600803-20 = "หืม? ฉันน่ะเหรอ? ฉันก็..."
1600803-21 = "ฉันจะนั่งดื่มกาแฟที่คาเฟ่แล้วก็คอยจับตามองหาคนที่น่าสงสัยเอง!"
1600803-22 = "[s] “โยนงานมาให้ครูหมดเลยนี่นา...”"
1600803-23 = "ชิส์... หลอกไม่ได้จริงๆ ด้วยสินะ"
1600803-24 = "ช่วยไม่ได้ละนะ คุณครูอุตส่าห์ยอมใช้วันหยุดออกมาทั้งที เรามาลาดตระเวนจริงๆ จังๆ กันดีกว่า"
1600803-25 = "หวังว่าจะไม่มีเรื่องน่ารำคาญเกิดขึ้นในเขตลาดตระเวนที่ฉันรับผิดชอบนะ..."
1600803-29 = "ฮึ่ย ไม่อยากไปเลยจริงๆ..."
1600803-35 = "ซอยนี้ก็ปลอดภัย... ที่นี่ก็สงบดีไม่มีปัญหา"
1600803-36 = "คิโวทอสสงบสุขขนาดนี้ ทำไมพวกเบื้องบนถึงต้องให้ออกมาลาดตระเวนวุ่นวายแบบนี้ด้วยนะ"
1600803-37 = "พวกเขาคิดว่าโลกนี้เต็มไปด้วยเด็กนักเรียนเกเรมากมายที่ชอบทะเลาะกันไม่มีที่สิ้นสุด#nที่เป็นแบบนั้นก็เพราะว่าพวกเขาไม่รู้จักปล่อยวางไงล่ะ"
1600803-41 = "หืม? คุณครู ทำไมจู่ๆ ก็หยุดกลางคันล่ะ? มีอะไรงั้นเหรอ?"
1600803-42 = "[s] “ในซอยนั้นมีพวกนักเรียนที่ดูน่าสงสัยอยู่น่ะ”"
1600803-46 = "หา? บอกว่าใครน่าสงสัยนะ?"
1600803-47 = "มาพูดพล่อยๆ ทั้งที่ไม่รู้จักกันเลยได้ไง..."
1600803-48 = "ถ้าไม่อยากเจ็บตัวละก็ ออกไปจากที่นี่ซะ!"
1600803-53 = "(เฮือก...กลิ่นของเหตุการณ์ที่น่ารำคาญ...)"
1600803-54 = "ฮ่าฮ่า... เป็นนักเรียนที่พูดจาหยาบคายจริงๆ"
1600803-55 = "แต่ฉันคิดว่าพวกเขาไม่ใช่คนน่าสงสัยหรอกนะ"
1600803-56 = "ดูสิ ก็แค่พวกเด็กๆ เล่นกันอยู่ในซอยเปลี่ยวเท่านั้นเอง"
1600803-57 = "ไม่ต้องใส่ใจแล้วไปลาดตระเวนกันต่อดีกว่า"
1600803-58 = "[s] “พวกเขาคาบอะไรไว้ในปากด้วยนะ”"
1600803-59 = "เอ่อ พวกนั้นอาจจะเป็น... เอ่อ..."
1600803-60 = "ลูกกวาด! น่าจะเป็นลูกกวาดนะ"
1600803-61 = "เด็กผู้หญิงในวัยนี้ก็ติดของหวานเป็นธรรมดา... แล้วมารวมตัวกับเพื่อนๆ ในซอย#nแบ่งลูกกวาดกินกันไงล่ะ!"
1600803-62 = "อย่าไปรบกวนให้พวกเธอลำบากใจเลย พวกเรารีบไปกันเถอะ!"
1600803-63 = "[s] “แต่พวกเขาพ่นควันออกมาด้วยนะ...”"
1600803-64 = "คือว่า...."
1600803-65 = "สงสัยลูกกวาดจะอร่อยมากแน่เลย!"
1600803-66 = "ลูกกวาดคงอร่อยมาก ถ้าเลียไปเรื่อยๆ ก็คงมีควันออกมาเพราะความร้อนจากแรงเสียดทานใช่ไหมล่ะ?"
1600803-67 = "ต้องเป็นแบบนั้นแน่ๆ ไม่ผิดแน่นอน!"
1600803-68 = "[s] “แต่ว่า...”"
1600803-69 = "คุณครูจะกังวลไปทำไมกัน? พวกเขาไม่ใช่นักเรียนที่น่าสงสัยไงล่ะ!"
1600803-70 = "การด่วนสรุปและตัดสินผู้คนด้วยรูปลักษณ์ภายนอกไม่ใช่เรื่องดีหรอกนะ ถ้าเรามีอคติตั้งแต่แรก#nแม้แต่ก้อนหินที่กลิ้งไปมาตามถนนก็ยังดูน่าสงสัยเลย!"
1600803-76 = "เธอคิดว่าพวกเราไม่น่าสงสัยจริงๆ เหรอ?"
1600803-77 = "นะ... แน่นอนอยู่แล้ว! เราไม่สงสัยพวกเธอเลยสักนิด"
1600803-78 = "ไม่ต้องเสียเวลาตรวจสอบ ไม่ต้องขอให้เดินทางไปด้วยกันด้วย!"
1600803-79 = "ไม่อยากเชื่อเลย เธอเป็นคนแรกเลยที่ไม่สงสัยเราและปฏิบัติกับเราอย่างอ่อนโยนแบบนี้..."
1600803-80 = "ที่ผ่านมาฉันคิดว่าสถาบันฝึกตำรวจวัลคิรี่มีแต่พวกงี่เง่าที่เอาแต่สงสัยคนอื่น..."
1600803-81 = "แต่เธอกลับเข้าใจพวกเรา... ซึ้งใจจริงๆ "
1600803-82 = "อะ..เอ๋? ทำไมจู่ๆ เป็นแบบนั้นล่ะ?"
1600803-86 = "ที่ผ่านมานี้ไม่เคยมีใครสนใจอยากรู้ว่าเราทำอะไรแล้วก็เอาแต่วิพากษ์วิจารณ์อย่างเดียว"
1600803-87 = "คำพูดพวกนั้นทำให้พวกเราอยากทำตัวเกเรมากขึ้น..."
1600803-88 = "แต่ว่าพอได้ยินเธอพูดแบบนั้นแล้วก็นึกขึ้นได้ว่าพวกเราเองก็ไม่ได้เป็นเด็กเกเรจริงๆ"
1600803-89 = "พวกเราเองก็อยากจะทำงานที่เป็นประโยชน์ต่อสังคมเหมือนกับเธอ!"
1600803-94 = "ฮะฮะ... นับว่าเป็นเรื่องดีเลย"
1600803-95 = "ถ้างั้นช่วยเก็บขยะที่หล่นอยู่ตามข้างทางดีมั้ย? พอดีว่าฉันกำลังยุ่งอยู่กับการลาดตระเวน..."
1600803-97 = "ลาดตระเวนงั้นเหรอ? ถ้างั้นพวกเราจะช่วยเอง!"
1600803-99 = "ใช่แล้ว ถ้าเป็นตรอกซอยแถวนี้ละก็ ไว้ใจพวกเราได้เลย!"
1600803-101 = "เรามาลาดตระเวนให้ครบทุกซอกทุกมุมไม่ให้เหลือกันเถอะ!"
1600803-102 = "[s3] “เยี่ยมเลย ฟุบุกิ”\n[s4] “พูดโน้มน้าวใจพวกเด็กเกเรได้ด้วย!”"
1600803-103 = "ดูเหมือนจะยุ่งยากกว่าเดิมอีกนะ..."
1600803-104 = "ดูเหมือนจะยุ่งยากกว่าเดิมอีกนะ..."
1600803-106 = "(หลังจากนั้นฟุบุกิก็ถูกพวกเด็กเกเรลากไปลาดตระเวนต่ออย่างขยันขันแข็ง)"
1600803-107 = "(ต้องขอบคุณความมุ่งมั่นของพวกเด็กเกเร การลาดตระเวนยังคงดำเนินต่อไป แม้เวลาจะผ่านไปจนถึงดึกแล้ว...)"

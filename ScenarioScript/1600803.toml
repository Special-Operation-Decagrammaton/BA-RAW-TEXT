[translation]
1600803-1 = "A Lazy Cop's Patrol"
1600803-2 = "Fubuki was feeling down, so I made a trip downtown to cheer her up."
1600803-8 = "*sigh*..."
1600803-9 = "It's too hot out and my feet hurt. I don't wanna do this..."
1600803-10 = "I just wanna go back to the office, get in the air conditioning,#nand have some donuts and coffee."
1600803-11 = "[s1] \"C'mon. It's not so bad.\"\n[s2] \"Patrolling is part of attending Valkyrie.\""
1600803-12 = "But the area I was assigned to is way too big, and all the alleys are like navigating a maze."
1600803-13 = "But the area I was assigned to is way too big, and all the alleys are like navigating a maze."
1600803-14 = "It's gonna take all day to comb every nook and cranny of this place."
1600803-15 = "[s] \"Cheer up. That's why I'm here to help.\""
1600803-16 = "Really? Can you do me a favor, then?"
1600803-17 = "This is 1st Street. Can you patrol the alleyways all the way to 5th Street?"
1600803-18 = "Oh, and can you also patrol the other side of the street?"
1600803-19 = "[s] \"What are you gonna do in the meantime?\""
1600803-20 = "Me? I, uh..."
1600803-21 = "I'll sit inside this cafe and see if anyone suspicious passes by!"
1600803-22 = "[s] \"In other words, you're dumping your work onto me.\""
1600803-23 = "Okay, okay. You caught me."
1600803-24 = "You're not leaving me much of a choice. I know you could have taken today off, but instead you're here working. I'll be a good girl for once and patrol."
1600803-25 = "Just please, for the love of everything good in Kivotos, don't let anything happen in my area..."
1600803-29 = "*sigh* Here goes nothing."
1600803-35 = "All clear in this alley. Nothing unusual."
1600803-36 = "The city is pretty calm today. I don't get why the higher-ups always make a big deal out of patrolling."
1600803-37 = "They think the world is full of bad students and conflict, but that's because they don't know how to relax."
1600803-41 = "Huh? Why'd you stop in the middle of the street, Sensei?"
1600803-42 = "[s] \"Those students in the alley are acting suspicious.\""
1600803-46 = "Who are you callin' suspicious?!"
1600803-47 = "You don't even know us! Watch your mouth."
1600803-48 = "Now get lost unless you want us to break yer bones!"
1600803-53 = "(Ugh. This is the last thing I need.)"
1600803-54 = "Haha... They seem pretty tough, huh?"
1600803-55 = "Though I didn't notice them doing anything suspicious."
1600803-56 = "Looks like just a couple of friends hanging out in a plain old back alley."
1600803-57 = "Let's ignore them and keep patrolling."
1600803-58 = "[s] \"What's that they have in their mouths?\""
1600803-59 = "Th-Those? Those must be, uh..."
1600803-60 = "...lollipops! Yeah, those must be lollipops."
1600803-61 = "Girls will be girls, ya know? Students our age really love our sweets.#nThey must be enjoying some candy in the alley!"
1600803-62 = "All right, let's leave them be. We should go!"
1600803-63 = "[s] \"That candy is burning at the end. And there's smoke...\""
1600803-64 = "Well, uh..."
1600803-65 = "S-Spicy!"
1600803-66 = "It must be that spicy kind of candy that everyone likes nowadays.#nSweet and spicy is a great combination, you know."
1600803-67 = "It must be so hot that you can see the heat coming off the tip of it."
1600803-68 = "[s] \"But...\""
1600803-69 = "Why are you so worried? They're not suspicious!"
1600803-70 = "You really shouldn't judge a book by its cover, Sensei.#nPrejudice can make everything you see seem suspicious—#neven a pebble on the street!"
1600803-76 = "You...seriously think we're not suspicious?"
1600803-77 = "O-Of course not! There is absolutely nothing out of the ordinary going on here."
1600803-78 = "No need to waste time asking you endless questions or dragging you down to the station, ya know?"
1600803-79 = "Wow. You're the first person who's been nice enough to give us the benefit of the doubt."
1600803-80 = "I thought Valkyrie Police School was full of idiots who were just out to give everyone a hard time..."
1600803-81 = "...but you understand us! I'm tearin' up over here! *sob*"
1600803-82 = "Wait, wha...?"
1600803-86 = "All anyone ever does is criminalize us without understanding the first thing about who we are."
1600803-87 = "All it made us want to do was rebel against the system and do bad things."
1600803-88 = "But after what you just said, we've remembered that we're not really bad people!"
1600803-89 = "We want to do good things for society, just like you do!"
1600803-94 = "H-Haha... That's, uh, great. Good for you."
1600803-95 = "I should be getting back to patrol. Why don't you try, uh, picking up some litter off the street?"
1600803-97 = "Did you say \"patrol\"? We can help you with that!"
1600803-99 = "Yeah, we know these streets better than anyone!"
1600803-101 = "We'll have this place covered in no time!"
1600803-102 = "[s3] \"Way to go, Fubuki!\"\n[s4] \"You really got through to them!\""
1600803-103 = "Ugh. You've got to be kidding me..."
1600803-104 = "Ugh. You've got to be kidding me..."
1600803-106 = "Fubuki had no choice but to patrol the streets with the two former troublemakers we met."
1600803-107 = "They were so enthusiastic about helping that the patrol didn't end until much later than Fubuki wanted."

[translation]
1600803-1 = "怠惰警官的巡邏"
1600803-2 = "（為了聲援沒有幹勁的吹雪而來到了市區的中心街）"
1600803-8 = "唔唔……"
1600803-9 = "好熱，好煩，好累，好想回去……"
1600803-10 = "好想趕快結束這種事，回涼快的事務所享用甜甜圈跟咖啡……"
1600803-11 = "[s1] 「別說是『這種事』啊……」\n[s2] 「巡邏也是女武神警察學園的重要任務吧？」"
1600803-12 = "但是這附近不只大的離譜，路線還很複雜，感覺很容易迷路……"
1600803-13 = "但是這附近不只大的離譜，路線還很複雜，感覺很容易迷路……"
1600803-14 = "每個地方都巡的話會花上大半天的……"
1600803-15 = "[s] 「雖然不知道能不能幫上忙，不過我也會幫你的。」"
1600803-16 = "……真的嗎？那老師，就拜託你一件事可以嗎？"
1600803-17 = "這條大路1丁目到5丁目的巡邏想麻煩老師。"
1600803-18 = "啊，還有反方向那邊也麻煩了。"
1600803-19 = "[s] 「那這段時間吹雪要做什麼呢？」"
1600803-20 = "我，我嗎？我的話……"
1600803-21 = "負責在那間咖啡廳一邊喝咖啡一邊監視有沒有可疑的人經過！"
1600803-22 = "[s] 「那不就是全部都丟給我做了嗎……」"
1600803-23 = "行不通嗎……"
1600803-24 = "沒辦法。難得老師也犧牲假日來陪我了，這次就認真做吧。"
1600803-25 = "拜託今天這附近不要發生什麼麻煩的事件……"
1600803-29 = "啊啊，真的不想去……"
1600803-35 = "……這附近也沒問題。到目前為止很和平呢。"
1600803-36 = "奇普托斯平時明明都是這麼和平的，為什麼那些高層總是那麼慌慌張張的呢……"
1600803-37 = "會覺得「到處都是不良學生吵吵鬧鬧」，也是因為看的人的心中沒有餘裕嘛……"
1600803-41 = "嗯？老師？為什麼站在路中央……有什麼問題嗎？"
1600803-42 = "[s] 「那個巷子裡好像有個可疑的──」"
1600803-46 = "啊？你說誰可疑啊！？"
1600803-47 = "明明什麼都不知道還敢在那找碴……"
1600803-48 = "不想受傷的話就趕快消失吧！"
1600803-53 = "（唔……是麻煩事件的味道……）"
1600803-54 = "唉……真是講話粗魯的傢伙呢。"
1600803-55 = "嘛，不過看起來確實並不可疑。"
1600803-56 = "肯定是很普通地在巷子裡跟朋友玩吧。沒錯，就是這樣。"
1600803-57 = "所以我們不要在意，繼續巡邏吧。"
1600803-58 = "[s] 「他們的嘴巴裡是不是叼著可疑的棒子？」"
1600803-59 = "可疑的棒子……？啊，啊啊……"
1600803-60 = "……那是棒棒糖！一定是棒棒糖啦！"
1600803-61 = "這個年紀的女孩子大多都喜歡甜食嘛……和朋友一起和樂融融地在巷子裡舔棒棒糖，對女高中生來說再常見不過了！"
1600803-62 = "所以為了不要打擾她們，我們快走吧！"
1600803-63 = "[s] 「那個棒子的前端好像在冒煙……？」"
1600803-64 = "那，那是……"
1600803-65 = "對了，是磨擦！"
1600803-66 = "棒棒糖實在是太好吃，所以在高速舔來舔去的過程中因為摩擦產生了煙！很常見的！"
1600803-67 = "絕對是這樣沒錯！"
1600803-68 = "[s] 「可是……」"
1600803-69 = "別擔心別擔心，一點也不可疑！"
1600803-70 = "用外表來評斷他人不是件好事吧？如果帶有偏見的話，不管看什麼都會覺得可疑的哦。"
1600803-76 = "喂，那邊那傢伙……你是認真的嗎？"
1600803-77 = "當，當然囉！在我看來你們一點也不可疑呀！"
1600803-78 = "所以也不會特地進行質問，更不會帶走你們的！！"
1600803-79 = "……從一開始就不懷疑我們，還對我們這麼溫柔的人，你還是第一個呢。"
1600803-80 = "明明至今為止女武神警察學園全都是些打從一開始就斷定我們是壞人的傢伙……"
1600803-81 = "你居然這麼想要理解我們……我都快哭了……！"
1600803-82 = "咦……啊？"
1600803-86 = "明明不知道我們在做什麼，就只是一味地批評。"
1600803-87 = "而我們也對此做出反抗，變得更加扭曲……"
1600803-88 = "不過聽了你的話之後我想起來了，我們也並非一開始就是這樣的人！"
1600803-89 = "我們也想像你一樣……成為對社會有幫助的人！"
1600803-94 = "咦，啊……那也是件好事呀？"
1600803-95 = "這樣的話，不如去撿一下路上的垃圾怎麼樣啊？我還得繼續巡邏……"
1600803-97 = "巡邏？我們也會幫忙的哦！"
1600803-99 = "沒錯，這附近的路我們最清楚了！"
1600803-101 = "每個角落都不放過，一起去巡邏吧！"
1600803-102 = "[s3] 「真厲害呢，吹雪。」\n[s4] 「這就是所謂的向心力吧。」"
1600803-103 = "不是，這樣不是變得更麻煩了嗎……"
1600803-104 = "不是，這樣不是變得更麻煩了嗎……"
1600803-106 = "（之後吹雪被不良（？）學生們拱著，就這麼認真地巡邏到了最後）"
1600803-107 = "（因為她們的熱心，巡邏一直持續到了晚上才結束……）"

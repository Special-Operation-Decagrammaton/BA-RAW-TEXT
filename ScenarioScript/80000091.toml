[translation]
80000091-1 = "หวานยิ่งกว่าหวาน"
80000091-2 = "นี่ คุณครู..."
80000091-3 = "ฉันน่ะ ช่วงนี้มีงานอดิเรกใหม่แล้วล่ะ"
80000091-4 = "[s1] \"มีงานอดิเรกก็ดีแล้ว ว่าแต่งานอะไรเหรอ?\"\n[s2] \"งานอดิเรกอะไรเหรอ?\""
80000091-5 = "นั่นก็คือ..."
80000091-6 = "นั่นก็คือ..."
80000091-7 = "การทำค็อกเทลไงล่ะ"
80000091-8 = "[s] \"งานอดิเรกแบบนี้ไม่ดีนะ!\""
80000091-9 = "ทำไมต้องกังวลอะไรขนาดนั้นด้วยล่ะคุณครู"
80000091-10 = "ค็อกเทลที่ฉันทำเป็นค็อกเทลที่ไม่ผสมเหล้าหรือแอลกอฮอลล์น่ะ"
80000091-11 = "ถึงจะเป็นนักเรียนที่ถูกพักการเรียนอยู่ก็เถอะ แต่นักเรียนก็ไม่ควรดื่มเหล้าไม่ใช่รึไง? ฮุฮุ..."
80000091-12 = "[s] \"...\""
80000091-13 = "หืม? นี่คุณครูสงสัยฉันรึไง..."
80000091-14 = "ถ้างั้นเดี๋ยวฉันจะทำค็อกเทลสูตรลับที่คิดขึ้นใหม่ให้ชิมแล้วกัน"
80000091-15 = "คุณครูลองชิมดูแล้วกันว่ามีส่วนผสมอะไรที่น่าสงสัยรึเปล่า"
80000091-16 = "ถ้างั้น... เดี๋ยวฉันทำค็อกเทลให้นะ"
80000091-18 = "(หลังจากนั้น ชิกุเระก็ลงมือผสมค็อกเทลอย่างชำนาญ...)"
80000091-25 = "เอ้า สุดยอดค็อกเทลของฉัน..."
80000091-30 = "<ชิกุเระ สเปเชียล บิทเทอร์>"
80000091-31 = "[s] \"แค่ชื่อก็ฟังดูบาปแล้ว...\""
80000091-32 = "ปกติชื่อค็อกเทลน่ะจะตั้งล้อเลียนเครื่องดื่มนั้นๆ เพราะงั้นอย่าคิดมากเลย"
80000091-33 = "รีบชิมแล้วก็บอกความเห็นมาเถอะน่า"
80000091-37 = "[ns] \"ดูเหมือนจะไม่มีส่วนผสมของแอลกอฮอลล์...\""
80000091-39 = "[ns3] \"รสหวานพอเหมาะ รสชาติติดลิ้นก็รู้สึกสดชื่นดี...\"\n[ns4] \"...อร่อยมากเลย!\""
80000091-40 = "ใช่มั้ยล่ะ?"
80000091-41 = "ใช่มั้ยล่ะ?"
80000091-42 = "ฉันใช้ช็อกโกแลตมาเป็นเบสเครื่องดื่ม แล้วก็ลองเพิ่มส่วนผสมต่างๆ ที่ให้รสหวานเข้าไปเพื่อไม่ให้#nรู้สึกเลี่ยนง่าย"
80000091-43 = "ฉันลองผิดลองถูกไปมาอยู่หลายครั้ง จนสุดท้ายก็ได้รสชาติที่น่าพอใจแบบนี้น่ะ"
80000091-44 = "ค่อยยังชั่วหน่อยที่คุณครูชอบ"
80000091-45 = "[s] \"เคล็ดลับรสชาติหวานสดชื่นแบบนี้คืออะไรน่ะ?\""
80000091-46 = "...นี่เป็นสูตรลับพิเศษที่ฉันตั้งใจคิดค้นขึ้นเชียวนะ จะให้บอกกันง่ายๆ ได้ยังไง เรียกร้องเกินไปรึเปล่า...?"
80000091-47 = "อืม ปกติฉันไม่บอกใครหรอกนะ..."
80000091-48 = "ฮุฮุ ช่วยไม่ได้นะ ถ้างั้นฉันจะบอกแค่คุณครูแล้วกัน แต่ต้องเก็บเป็นความลับ ห้ามบอกใครนะ"
80000091-49 = "วิธีทำ <ชิกุเระ สเปเชียล บิทเทอร์> ก็เหมือนกับวิธีทำค็อกเทลช็อกโกแลตอื่นๆ แหละ"
80000091-50 = "แต่ว่าเพื่อให้ได้รสหวานที่หอมสดชื่น ก็เลยใส่ดาร์กช็อกโกแลตขมๆ ลงไปหนึ่งชิ้นน่ะ"
80000091-51 = "ถึงดาร์กช็อกโกแลตจะมีรสขม แต่ถ้าเอาไปผสมกับวัตถุดิบอื่นๆ ก็จะช่วยดึงรสหวานที่โดดเด่นออกมาได้"
80000091-52 = "และถ้าเข้าใจลักษณะพิเศษของวัตถุดิบ ก็จะสามารถใช้ได้อย่างเหมาะสมและทำค็อกเทลที่#nยอดเยี่ยมออกมาได้"
80000091-53 = "[s] \"ชิกุเระนี่เชี่ยวชาญเรื่องการผสมค็อกเทลจริงๆ เลยนะ\""
80000091-54 = "งั้นเหรอ? ฉันว่ามันก็ธรรมดาๆ ออก"
80000091-58 = "พอมาคิดดูแล้ว คุณครูเองก็มีแววที่จะเป็นบาร์เทนเดอร์ที่ยอดเยี่ยมเหมือนกันนะ"
80000091-59 = "[s] \"ทำไมถึงคิดแบบนั้นล่ะ?\""
80000091-60 = "เพราะว่าคุณครูรู้จักการประเมินจุดแข็งและจุดอ่อนของนักเรียน รวมถึงเลือกดึงจุดแข็งของแต่ละคน#nไปใช้ได้เหมาะกับสถานการณ์ไง?"
80000091-61 = "เวลาที่เห็นภาพของเหล่านักเรียนที่ปฏิบัติภารกิจสำเร็จจากคำแนะนำของคุณครู..."
80000091-62 = "ฉันมักนึกถึงค็อกเทลที่ผสมเคล้าเข้ากันได้อย่างดีน่ะ"
80000091-63 = "เพราะงั้น ฉันเลยหาวิธีใช้ดาร์กช็อกโกแลตที่ปกติไม่ค่อยได้ใช้บ่อยเท่าไร แบบนี้ได้ไงล่ะ"
80000091-68 = "เพราะงั้นถือว่านี่เป็นของตอบแทนเรื่องที่ผ่านมาก็แล้วกัน"
80000091-69 = "ต่อไปก็ขอฝากด้วยนะ คุณครู"

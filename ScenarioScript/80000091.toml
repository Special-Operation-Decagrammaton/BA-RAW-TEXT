80000091-42 = "3;시구레;11;초콜릿을 베이스로 삼으면서도 입안이 텁텁하지 않도록 개운한 단맛이 나는 부재료를 여러가지 찾아봤거든."
80000091-43 = "3;시구레;00;조금 시행착오를 겪긴 했지만 끝내 좋은 맛을 찾아내서 만족하던 참이었어."
80000091-44 = "3;시구레;07;선생님도 이 맛이 마음에 든다니 다행이네.\n#3;em;[음표]"
80000091-45 = "[s] \"이 깔끔한 단맛의 비결은 뭐야?\""
80000091-46 = "3;시구레;02;……내가 열심히 개발한 비장의 레시피를 그렇게 쉽게 알려 하다니. 너무 한 거 아냐?\n#3;em;[속상함]"
80000091-47 = "3;시구레;99;으음, 원래는 절대로 알려주지 않는 거지만……"
80000091-48 = "3;시구레;07;후훗, 어쩔 수 없지. 선생님에게만 알려 줄게. 다른 사람들에게는 비밀로 해야 해.\n#3;em;[하트]"
80000091-49 = "3;시구레;08;<시구레 비터 스페셜>을 만드는 방법은 다른 초콜릿 칵테일을 만드는 방법과 비슷해."
80000091-50 = "3;시구레;00;다만 깔끔한 단맛을 내기 위기해서, 마지막에 쓰디쓴 비터 초콜릿을 한 조각 넣는 게 포인트야."
80000091-51 = "3;시구레;11;비터 초콜릿은 그 자체로는 쓰기만 하지만, 여러가지 재료와 섞이면 단맛이 두드러지는 것을 눌러 맛을 조화롭게 중재해주거든."
80000091-52 = "3;시구레;00;이처럼 재료의 특성을 정확히 이해해서 적재적소에 사용해야 훌륭한 칵테일을 만들 수 있는 법이지.\n#3;em;[음표]"
80000091-53 = "[s] \"시구레는 의외로 미식에 조예가 깊네.\""
80000091-54 = "3;시구레;02;그래? 평범한 편이라고 생각했는데.\n#3;em;[?]"

80000091-58 = "3;시구레;00;그러고 보면 선생님도 훌륭한 바텐더의 자질이 있을지도 모르겠어."
80000091-59 = "[s] \"어째서 그렇게 생각했어?\""
80000091-60 = "3;시구레;02;그야 선생님도 학생들의 장점과 단점을 잘 파악해서 적재적소에 사용할 줄 알잖아?"
80000091-61 = "3;시구레;00;선생님의 조언 덕분에 자신의 장점을 깨닫고 다른 학생들과 협력해서 멋지게 작전을 완성시키는 학생들의 모습을 보고 있노라면……"
80000091-62 = "3;시구레;03;잘 만들어진 한 잔의 칵테일이 떠올라."
80000091-63 = "3;시구레;11;덕분에 나처럼 섞이기 어려운 쓴맛의 비터 초콜릿도 쓸모를 느낄 수 있게 되었으니까."

[translation]
80000091-1 = "甜蜜一點"
80000091-2 = "對了對了，老師。"
80000091-3 = "我最近多了一個興趣。"
80000091-4 = "[s1]「那是件好事呢。」\n[s2]「是什麼興趣呢？」"
80000091-5 = "那就是……"
80000091-6 = "那就是……"
80000091-7 = "調雞尾酒唷。"
80000091-8 = "[s]「等等，時雨同學！？」"
80000091-9 = "不用那麼慌張。"
80000091-10 = "當然，是沒有酒精的唷。"
80000091-11 = "就算是在停學期間，學生也不能喝酒對吧。#n呵呵……"
80000091-12 = "[s]「……」"
80000091-13 = "……那是懷疑的眼神呢。"
80000091-14 = "我知道了。那我就調一杯密藏的新雞尾酒給你喝。"
80000091-15 = "老師親自來試喝確認，這樣最能放心對吧。"
80000091-16 = "稍等一下哦。"
80000091-18 = "（於是時雨開始使用熟練的手法調製雞尾酒）"
80000091-25 = "……久等了，老師。"
80000091-30 = "這就是「時雨．苦味特調」唷。"
80000091-31 = "[s]「呃……」"
80000091-32 = "啊啊，名字是我隨意取的，請別在意。"
80000091-33 = "先喝一口看看吧。"
80000091-37 = "[ns]「確實沒有酒精成分，而且……」"
80000091-39 = "[ns3]「恰到好處的甜味，以及清爽的餘韻……」\n[ns4]「超好喝的！？」"
80000091-40 = "對吧？"
80000091-41 = "對吧？"
80000091-42 = "為了讓口感更加清爽，我進行過許多嘗試。"
80000091-43 = "我對味道很有自信唷，雖然花了不少時間。"
80000091-44 = "不過老師似乎也很喜歡，真是太好了。"
80000091-45 = "[s]「這個雞尾酒是怎麼做的？」"
80000091-46 = "這是我努力研究出來的配方，不是很想那麼簡單就說出來呢。"
80000091-47 = "嗯～……本來不想說出來的。"
80000091-48 = "算了，告訴老師也無所謂吧。#n要對其他人保密哦？"
80000091-49 = "「時雨．苦味特調」的製作方法，和一般的巧克力雞尾酒一樣唷。"
80000091-50 = "不過，重點是最後要添加一些苦味巧克力。"
80000091-51 = "這樣就能抑制甜味，調和出清爽的味道。"
80000091-52 = "即使是直接吃起來很苦的巧克力，依據使用方式的不同也能變成很棒的雞尾酒哦。"
80000091-53 = "[s]「真厲害呢，時雨……」"
80000091-54 = "是嗎？"
80000091-58 = "……老師要不要也試著當個調酒師呢？"
80000091-59 = "[s]「為何突然這麼說呢？」"
80000091-60 = "老師也很了解各個學生對吧？"
80000091-61 = "用「使用方式」來形容有點奇怪……應該說適才適所吧。#n獲得老師建議的學生們充滿活力的樣子……"
80000091-62 = "總覺得和調製雞尾酒有點類似呢。"
80000091-63 = "也讓我了解到了「苦巧克力」的存在意義。"
80000091-68 = "總之這是我對老師平時照顧的謝禮。"
80000091-69 = "今後也請多多指教哦，老師。"

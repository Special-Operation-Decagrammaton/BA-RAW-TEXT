80000091-8 = "[s] \"나쁜 취미야!\""
80000091-9 = "3;시구레;03;왜 그렇게 당황하는 거야, 선생님.\n#3;em;[재잘]"
80000091-10 = "3;시구레;00;당연히 내가 만드는 칵테일은 술이 안 들어간 논 알코올 칵테일이지."
80000091-11 = "3;시구레;03;아무리 붉은겨울 학원의 정학생이라고는 하지만, 학생이 술을 마실 리가 없잖아? 후후……\n#3;em;[음표]"
80000091-12 = "[s] \"……….\""
80000091-13 = "3;시구레;00;어쩐지 의심받고 있는 것 같은데……\n#3;em;[땀]"
80000091-14 = "3;시구레;11;그렇다면 내가 요번에 새롭게 개발한 비장의 칵테일을 한 잔, 직접 만들어 줄게."
80000091-15 = "3;시구레;00;선생님이 한번 마셔보고, 의심스러운 재료가 들어갔는지 직접 평가해줘."

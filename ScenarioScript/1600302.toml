[translation]
1600302-1 = "#title;트리니티의 자경단"
1600302-2 = "#na;(트리니티 지역 변두리의 어느 편의점.)"
1600302-3 = "3;점원;02;잠확깨 드링크 3개와 제육도시락, 쓰다써 커피…… 합계 1,130엔입니다.\n#3;a"
1600302-4 = "3;점원;03;계산되었습니다. 매번 감사합니다! 또 오세요-!\n#3;greeting\n#3;em;[반짝]"
1600302-5 = "#na;지이잉-. 띵!"
1600302-6 = "3;점원;02;어머, 그새 새로운 손님이 오셨네요. 안녕하세요! 무엇을 도와드릴……\n#3;em;[반응]"
1600302-7 = "#na;타타타타탕! 타탕! 탕!!\n#fontsize;80\n#bgshake"
1600302-8 = "3;점원;04;……!?\n#3;shake\n#3;em;[?!]"
1600302-9 = "4;불량 학생 A;02;꼼짝마!! 모두 손들고 자리에 엎드려! 여긴 이제 우리가 접수한다!\n#4;al\n#4;em;[빠직]\n#3;m1"
1600302-10 = "4;불량 학생 A;02\n5;불량 학생 B;02;쓸 데 없는 짓 하면 재미없을 줄 알아! 아픈 꼴 보기 싫으면 가만히 있으라고!\n#5;hophop\n#5;al"
1600302-11 = "3;점원;07;히익!! 다, 당신들 여긴 트리니티 자치구예요! 이런 짓을 하고도……!\n#3;shake\n#3;em;[속상함]"
1600302-12 = "5;불량 학생 B;02\n4;불량 학생 A;03;무사할 줄 아냐고? 당연히 알지! 그걸 아니까 이런 짓을 하는 거 아니겠어?\n#4;jump"
1600302-13 = "4;불량 학생 A;03\n5;불량 학생 B;03;정의실현부라면 지금 이 근방에 없다고. 미리 싸악- 조사하고 왔으니까 말이야!\n#5;em;[음표]\n#5;greeting"
1600302-14 = "5;불량 학생 B;03\n4;불량 학생 A;03;아무리 걔네라고 이런 변방의 구석진 곳까지 일일이 들쑤시고 다니긴 힘들지~."
1600302-15 = "4;불량 학생 A;03\n5;불량 학생 B;02;그러니 쓸 데 없는 기대는 접고! 어서 카운터 금고나 열어! 안에 있는 거 다 내놔!\n#5;hophop\n#5;em;[빠직]"
1600302-16 = "4;불량 학생 A;05;……?\n#4;em;[?]"
1600302-17 = "4;불량 학생 A;02;아앙? 이건 또 뭐야? 당신은……?\n#4;m2\n#5;m4\n#3;dl"
1600302-18 = "#3;hide\n4;불량 학생 A;03;하하, 안 되지 안 돼. 위험하다고~ 다 큰 어른이 혼자 이런 밤에 말이야~.\n#4;em;[재잘]"
1600302-19 = "4;불량 학생 A;03;이렇게 나쁜 여고생들이 잡아간다고~ 어흥! 히히히. 조심해야지!\n#4;em;[음표]"
1600302-20 = "5;불량 학생 B;03;이왕 이렇게 된 거, 조금 있다 우리랑 이렇게 저렇게 재밌는 일을……\n#5;em;…"

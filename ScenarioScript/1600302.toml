[translation]
1600302-1 = "Trinity's Vigilante Crew"
1600302-2 = "(A convenience store on the outskirts of Trinity.)"
1600302-3 = "Three energy drinks, a pork lunch box, a black coffee... That'll be 1,130 yen."
1600302-4 = "Thank you. Please come again!"
1600302-5 = "*vroom* ... *ding*"
1600302-6 = "Another one already. Welcome! How can I...help..."
1600302-7 = "*pow* *pow* *pow* *pow* *pow* *bang* *bam*"
1600302-8 = "...?!"
1600302-9 = "Don't move! Get on the ground and hands where we can see them! This is a stick up!"
1600302-10 = "Don't try anything funny! Stay still if you want to get out of here alive!"
1600302-11 = "Eeek! This is the Trinity district! You won't get away with th—!"
1600302-12 = "We won't, will we? Guess again! We already are!"
1600302-13 = "The Justice Task Force is nowhere to be found. We scouted!"
1600302-14 = "Even they can't patrol every nook and cranny of somewhere this remote!"
1600302-15 = "Don't get your hopes up! Open the safe and give us everything you have!"
1600302-16 = "...?"
1600302-17 = "Huh? What's this?"
1600302-18 = "Haha. Don't you know it's dangerous for someone your age to go out alone at night?"
1600302-19 = "Bad high school girls are gonna kidnap you! Haha! You should be more careful!"
1600302-20 = "If this is how you want to play it, then we may as well have some fun."
1600302-21 = "*smash*"
1600302-22 = "What the...? Is that...?"
1600302-23 = "A flash grenade?"
1600302-25 = "*bam* *riiiiiinnnnnng*"
1600302-26 = "Ah! Ack! I can't see anything!"
1600302-27 = "You didn't scout very thoroughly. I was on patrol just in case."
1600302-28 = "Th-That voice! It can't be! What's the Vigilante Crew doing here?!"
1600302-31 = "*pow* *pow* pow* *bam* *poof*"
1600302-32 = "Ugh... Arrrgh... Ack!"
1600302-33 = "Bah...! Wh-What's happening...? Urgh!"
1600302-35 = "Seriously. Don't you get tired of me beating you?"
1600302-36 = "Huh? What are you doing here, Sensei?"
1600302-37 = "[s] \"Hi.\""
1600302-38 = "H-Hello. I didn't expect to see you here."
1600302-39 = "I had wanted to see you again, but I didn't think it'd be like this."
1600302-40 = "This is bad. Someone your age shouldn't be out this late at night."
1600302-41 = "What will you do if a delinquent high school girl abducts you? Get back to the club room."
1600302-42 = "You want me to escort you back? That would be..."
1600302-43 = "...You're afraid a bad high school girl might abduct you?"
1600302-44 = "*sigh*"
1600302-45 = "Very well. I'll be your escort if I must."
1600302-46 = "I should finish suppressing these delinquents before we leave, though."
1600302-47 = "Eeeeeek! Wh-What do you plan to do with us?!"
1600302-48 = "Stop screaming. I'll disarm you, but it won't hurt too badly."
1600302-50 = "Instead, I'll tie you both to a pillar and leave you listening to \"Baby\" by Austin Dieber on repeat."
1600302-52 = "...?!"
1600302-53 = "Why that music?! It's not even popular anymore!"
1600302-54 = "What are you, some kind of pop music dinosaur?!"
1600302-56 = "Ahhhhhhhhhhhh!"
1600302-59 = "[ns1] \"...What a cruel punishment.\"\n[ns2] \"Excellent work.\""
1600302-60 = "They were trying to rob a convenience store. They deserve it."
1600302-61 = "It wasn't easy, but I'm only doing what must be done."
1600302-62 = "Let's go, Sensei. Your safety is ensured with me here."
1600302-63 = "This way."
1600302-65 = "[ns] (Follow Suzumi.)"
1600302-68 = "(After that, Suzumi and I spent 30 minutes walking to Schale.)"
1600302-69 = "Here we are. It's straight through this alley."
1600302-70 = "It should be safe to go alone from here. You should get inside since it's late."
1600302-71 = "Huh? You don't need to thank me. I was simply carrying out my Vigilante Crew duties."
1600302-72 = "Even if it's not an official club..."
1600302-73 = "Trinity is all too prone to incidents like tonight.#nWe have to keep working to maintain the peace."
1600302-74 = "What was that? You thought tonight was fun?"
1600302-75 = "I...don't understand. "
1600302-76 = "You were almost in a hostage situation. What part of that is fun?"
1600302-77 = "What?"
1600302-78 = "The fun part was walking here?"
1600302-79 = "But nothing happened. What could possibly be fun about that?"
1600302-80 = "[s3] \"I was escorted by the one and only Suzumi.\"\n[s4] \"I got to go on a walk with you, Suzumi..\""
1600302-81 = "...!"
1600302-82 = "...!"
1600302-83 = "N-Nevertheless, my job here is done. Y-You should get inside!"
1600302-84 = "..."
1600302-86 = "...I'll admit I enjoyed myself too."
1600302-87 = "There wasn't much in the way of conversation, but the walk was nice."
1600302-88 = "For whatever reason, when I'm with you...I forget that I'm a part of the Vigilante Crew."
1600302-89 = "I hope we meet under more relaxing circumstances next time."
1600302-90 = "Preferably during the day and not after dark."
1600302-94 = "Oh. Here's a parting gift."
1600302-95 = "[s] \"A flash bomb?\""
1600302-96 = "It may not be a gun, but you can use it for self-defense."
1600302-97 = "Please take it."
1600302-98 = "Pardon? Why wouldn't you need it?"
1600302-99 = "Because you have me to p-protect you...?"
1600302-100 = "W-Well of course I will! That goes without...!"
1600302-101 = "..."
1600302-102 = "That is the mission of the Vigilante Crew."
1600302-103 = "I'll be going now, Sensei. Have a good night."
1600302-105 = "(Suzumi turned around and disappeared quickly.)"
1600302-106 = "(And for some reason, her gait seemed different than before.)"

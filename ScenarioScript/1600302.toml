[translation]
1600302-1 = "三一的自衛隊"
1600302-2 = "（位於三一郊區的某間便利商店）"
1600302-3 = "三罐「瞬間清醒飲料」、「豬肉便當」、「極苦咖啡」……總共1,130元。"
1600302-4 = "謝謝惠顧，歡迎下次再來。"
1600302-5 = "（嗡────！）"
1600302-6 = "啊，歡迎光──"
1600302-7 = "（噠噠噠噠噠！噠噠噠噠噠！咚！）"
1600302-8 = "……！？"
1600302-9 = "不准動！你們所有人把手放在頭上原地趴下！這裡現在歸我們管了！"
1600302-10 = "勸你們別想些有的沒的！！不想吃苦頭的話就給我安分點！"
1600302-11 = "噫噫！？#n你，你們這些人，這裡可是三一自治區啊！？就算做這種事情也會馬上……！"
1600302-12 = "會被抓起來？哼，我們當然知道會有這種可能！"
1600302-13 = "但實現正義部現在不在這附近，我們早就確認好了！"
1600302-14 = "就算是他們，也幾乎不會跑來這種邊緣地帶……"
1600302-15 = "所以就別做無謂的期待了！快打開收銀台跟保險箱！把裡面的東西全部交出來！"
1600302-16 = "……？"
1600302-17 = "啊？你誰啊你……？"
1600302-18 = "哈哈，就算是大人，這麼晚了還一個人跑到街上依然很危險唷～"
1600302-19 = "毫無戒心到處閒晃，小心被我們這種壞壞的女高中生抓去做壞事喔！"
1600302-20 = "要不要我們教教你啊？來，和姊姊一起來快活一下吧……"
1600302-21 = "（喀嚓！）"
1600302-22 = "……嗯？？這是什麼？"
1600302-23 = "……閃光彈？"
1600302-25 = "（碰！嘰咿咿咿咿咿咿──）"
1600302-26 = "呃啊啊！？我，我看不到了！"
1600302-27 = "以防萬一巡邏到這裡真是來對了，果然是你們啊。"
1600302-28 = "這，這個聲音！？難，難道！你怎麼會出現在這裡……！"
1600302-31 = "（咚！砰！啪咚！）"
1600302-32 = "呃呃……呃呃呃……呃啊！"
1600302-33 = "怎，怎麼會這樣，嗚！"
1600302-35 = "這群人還真是學不乖……"
1600302-36 = "……？嗯？老師？老師你怎麼會在這種地方……？"
1600302-37 = "[s] 「嗨。」"
1600302-38 = "老師晚安。沒想到會在這種地方見到你。"
1600302-39 = "雖然之前有說過希望哪天能再見面，但沒想到那天會這麼快到來。"
1600302-40 = "雖然老師是大人了，但怎麼這麼晚了還跑到這麼偏僻的地方。"
1600302-41 = "小心會被不良學生抓住喔，勸老師盡早回去吧。"
1600302-42 = "咦？你希望我護送你……？"
1600302-43 = "……因為會怕不良學生所以才拜託我？"
1600302-44 = "……呼。"
1600302-45 = "我明白了。既然老師這麼請求，那就是我的工作了。"
1600302-46 = "但要先把這些不良學生壓制住……"
1600302-47 = "嚇──！！你，你想做什麼！？"
1600302-48 = "請別擔心，我不會傷害你們。只是必須讓你們無法行動。"
1600302-50 = "我要把兩位綁在電線桿上，然後給你們戴耳機聽「奧斯汀．比伯」的〈北鼻〉。"
1600302-52 = "……！？"
1600302-53 = "這，這是什麼選曲品味！？這是什麼年代的歌啊！"
1600302-54 = "是大叔！是個把喜好強加於人的大叔！！是個會一邊碎碎念「為什麼不懂呢」，一邊沉醉在老歌中，一邊硬要年輕人接受老氣興趣的大叔！"
1600302-56 = "哇啊啊啊啊啊啊啊啊！"
1600302-59 = "[ns1] 「好可怕的處罰……嗎？」\n[ns2] 「辛苦了。」"
1600302-60 = "他們是打算搶劫便利商店的人，當然要受到這點懲罰。"
1600302-61 = "不會，我只是做我該做的事而已。"
1600302-62 = "走吧，老師。有我跟著你就安全了，請放心。"
1600302-63 = "請往這邊。"
1600302-65 = "[ns] 跟著鈴美走"
1600302-68 = "（之後大概走了30分鐘，和鈴美一起抵達夏萊附近）"
1600302-69 = "……只要過那個轉角就能馬上抵達夏萊，辛苦老師了。"
1600302-70 = "我想從這裡開始一個人走也沒問題了。已經很晚了，請別再到處亂跑，趕快回去吧。"
1600302-71 = "不會，沒什麼好道謝的。這是我身為自衛隊員的本分。"
1600302-72 = "儘管不是正式社團……"
1600302-73 = "但由於三一是個比外界想像中，還常發生各種事件的地方，不這麼做會相當危險的。"
1600302-74 = "……咦？你說你很開心嗎？"
1600302-75 = "這還真是個奇怪的感想呢。"
1600302-76 = "你不是被捲進超商搶案了嗎？這有什麼好開心的？"
1600302-77 = "……咦？"
1600302-78 = "你是說來到這裡的路上……？"
1600302-79 = "不就只是一條普通的路嗎……"
1600302-80 = "[s3] 「因為一路上有鈴美保護我。」\n[s4] 「因為一路上有鈴美陪著我。」"
1600302-81 = "……！！"
1600302-82 = "……！！"
1600302-83 = "你，你會這麼想是很令人感激，但不論如何今天已經很晚了，請快回去吧。"
1600302-84 = "……"
1600302-86 = "……但仔細一想，我好像也很開心。"
1600302-87 = "因為個性使然，我實在不太會聊天，但一路上卻完全不覺得無聊。"
1600302-88 = "不知道為什麼……和老師在一起的時候……我幾乎會忘記自己正在執行自衛隊員的工作。"
1600302-89 = "希望下次不是以這種方式，而是能在更輕鬆的狀況下交談。"
1600302-90 = "而且不是在晚上，是在白天。"
1600302-94 = "……對了，這東西送給老師。"
1600302-95 = "[s] 「……閃光彈？」"
1600302-96 = "就算沒有槍，最好還是帶個能保護自己的東西。"
1600302-97 = "請你收下吧。"
1600302-98 = "……咦？不需要嗎？為什麼……"
1600302-99 = "因為有我守護你？這，這……！"
1600302-100 = "這方面我當然也會善盡職責！但只靠一種方法的話，要是遇上緊急情況……！"
1600302-101 = "……"
1600302-102 = "不，我明白了。我身為自衛隊員，只要我能確實保護好老師就行了。"
1600302-103 = "……我會努力回應老師的期待。那麼再見了，晚安。"
1600302-105 = "（鈴美轉過身快步離去，消失在黑暗中）"
1600302-106 = "（而且不知為何，她的步伐和剛才為止不同，變得有點彆扭）"

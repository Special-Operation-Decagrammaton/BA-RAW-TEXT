1600302-35 = "3;스즈미;05;정말이지, 지치지도 않는 겁니까? 매번 이런 식으로 저에게 당하고도……\n#3;a\n#3;em;…"
1600302-36 = "3;스즈미;02;……? 음? 선생님? 선생님께서 어떻게 이런 곳에……?\n#3;em;[반응]"
1600302-37 = "[s] \"안녕.\""
1600302-38 = "3;스즈미;01;아, 안녕하십니까 선생님. 이런 곳에서 다 뵙게 되는군요.\n#3;greeting"
1600302-39 = "3;스즈미;99;다시 한번 뵙고 싶다고 연락 드리긴 했었지만, 그 날이 이렇게 빨리 올 줄은……\n#3;em;…"
1600302-40 = "3;스즈미;05;하지만 좋지 않습니다. 다 큰 어른이 이렇게 늦은 밤까지 돌아다니시다니요.\n#3;em;[반응]"
1600302-41 = "3;스즈미;05;그러다 나쁜 여고생들이 잡아가기라도 하면 어쩌려고요. 어서 부실로 돌아가십시오."
1600302-42 = "3;스즈미;02;네? 부실까지의 에스코트 말씀이십니까? 그게 무슨……\n#3;stiff\n#3;em;[?]"

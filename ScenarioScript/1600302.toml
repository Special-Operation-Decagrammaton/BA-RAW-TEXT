[translation]
1600302-1 = "กลุ่มรักษาความสงบแห่งทรีนิตี้"
1600302-2 = "(ร้านสะดวกซื้อ เขตชานเมืองทรีนิตี้)"
1600302-3 = "เครื่องดื่มชูกำลัง 3 ขวด ข้าวหน้าเนื้อ แล้วก็กาแฟ... รวมทั้งหมด 1,130 เยนครับ"
1600302-4 = "ได้รับเงินเรียบร้อย ขอบคุณที่มาอุดหนุนนะครับ ไว้มาใหม่นะครับ!"
1600302-5 = "ครืด... ติ๊ง!"
1600302-6 = "โอ๊ะ สวัสดีครับคุณลูกค้า เชิญได้เลยครับ จะรับอะไรดีครับ..."
1600302-7 = "ปังๆๆๆ ปังๆๆ ปัง!!"
1600302-8 = "........!?"
1600302-9 = "หยุดเดี๋ยวนี้!! ยกมือขึ้นแล้วอย่าขยับ! พวกเรายึดที่นี่เอาไว้แล้ว!"
1600302-10 = "อย่าคิดจะทำอะไรที่ไร้ประโยชน์ล่ะ! อยู่นิ่งๆ แล้วจะไม่เจ็บตัว!"
1600302-11 = "เฮือก!! ทะ...ที่นี่เป็นเขตปกครองตนเองของทรีนิตี้นะครับ! ถ...ถ้าทำแบบนี้ล่ะก็....!"
1600302-12 = "คิดว่าพวกเราจะไม่รอดงั้นเหรอ? ไม่มีทางซะล่ะ พวกเรามีวิธีอยู่แล้วถึงได้ทำแบบนี้ยังไงล่ะ"
1600302-13 = "ตอนนี้พวกชมรมทวงความยุติธรรมไม่ได้อยู่ที่นี่ พวกเราไปสืบมาหมดแล้ว!"
1600302-14 = "ถึงเป็นชมรมทวงความยุติธรรมก็เถอะ แต่ก็คงไม่รู้จักที่ห่างไกลแบบนี้หรอก~"
1600302-15 = "เพราะงั้นเลิกหวังลมๆ แล้งๆ ได้เลย! รีบเปิดตู้เซฟเร็วๆ แล้วส่งเงินมาให้หมด!"
1600302-16 = ".....?"
1600302-17 = "อ๊ะ? นี่อะไรกันเนี่ย เธอคือ...?"
1600302-18 = "ฮ่าฮ่า แบบนี้ไม่ดีหรอกนะ ผู้ใหญ่แบบคุณมาเดินเตร็ดเตร่แบบนี้ตอนกลางคืน มันอันตรายนะ~"
1600302-19 = "ระวังจะเจอพวกเด็กเกเรอย่างเราจับตัวไปล่ะ~ ฮึ่ม! ฮิฮิฮิ... อย่างน้อยก็ระวังตัวให้มากกว่านี้หน่อยสิ"
1600302-20 = "ไหนๆ ก็เป็นแบบนี้แล้ว เรามาเล่นสนุกกันหน่อยเป็นไง..."
1600302-21 = "....แคร็ง!"
1600302-22 = "....หือ?? อะไรน่ะ?"
1600302-23 = "ระเบิดแสงเหรอ?"
1600302-25 = "ฟิ้ววว!! กริ้งงงงงงงง!!!"
1600302-26 = "อึ่ก อึ่กกก?! มองไม่เห็นข้างหน้าเลย!"
1600302-27 = "ฉันแค่ออกมาเดินลาดตระเวนเฉยๆ คิดไว้แล้วเชียว... พวกเธอ..."
1600302-28 = "สะ...เสียงนี้มัน!? เดี๋ยวสิ ทำไมกลุ่มรักษาความสงบถึงมาอยู่ที่นี่ล่ะ...!"
1600302-31 = "ปังๆๆ! ปัง! ปังๆๆ!"
1600302-32 = "อึ่ก...เอื้อ....อ๊าก!"
1600302-33 = "อึ่ก... นี่มัน...อะไรกัน!"
1600302-35 = "ถามจริง ไม่เหนื่อยบ้างรึยังไงคะ? ที่ถูกฉันจัดการทุกครั้งแบบนี้น่ะ..."
1600302-36 = "...? หืม? คุณครู? ทำไมคุณครูถึงมาอยู่ที่นี่...?"
1600302-37 = "[s] \"สวัสดี\""
1600302-38 = "สะ...สวัสดีค่ะคุณครู ผิดคาดเลยนะคะที่เจอคุณครูที่นี่"
1600302-39 = "ฉันอยากเจอคุณครูอยู่พอดีก็จริง แต่ไม่คิดว่าจะได้เจอเร็วแบบนี้..."
1600302-40 = "แบบนี้ไม่ดีเลยนะคะ ผู้ใหญ่แบบคุณครูไม่ควรออกมาเดินข้างนอกตอนกลางคืนแบบนี้"
1600302-41 = "ถ้าถูกพวกเด็กเกเรจับตัวไปอีกจะทำยังไงล่ะคะ รีบกลับไปห้องชมรมเถอะค่ะ"
1600302-42 = "คะ? ให้ฉันเดินไปเป็นเพื่อนจนถึงห้องชมรมเหรอคะ เรื่องนั้น..."
1600302-43 = "...กลัวว่าจะถูกพวกเด็กเกเรจับตัวไปอีกงั้นเหรอคะ?"
1600302-44 = "เฮ้อ..."
1600302-45 = "เข้าใจแล้วค่ะ ช่วยไม่ได้นะ ฉันจะเดินไปส่งที่ตึกเองค่ะ"
1600302-46 = "แต่ฉันขอจัดการพวกนักเรียนเกเรพวกนี้ก่อนนะคะ..."
1600302-47 = "วะ...ว้ากกกกก!! เธอคิดจะทำอะไรกับพวกเราน่ะ!!"
1600302-48 = "ไม่ต้องห่วงหรอกค่ะ ฉันจะไม่ทำอันตรายพวกคุณแน่นอน แค่จะริบอาวุธของพวกคุณเท่านั้นค่ะ"
1600302-50 = "ฉันจะมัดพวกคุณสองคนไว้กับเสาแล้วให้ฟังเพลง <เบบี้> ของ <ออสติน บีเวอร์> ไปพลางๆ นะคะ"
1600302-52 = ".......!?"
1600302-53 = "พะ...เพลงอะไรของเธอน่ะ!? เพลงนั้นมันเก่ามากแล้วนะ!!"
1600302-54 = "เธอนี่เป็นพวกโบราณคร่ำครึจริงๆ เลย!! เหมือนพวกคนแก่ๆ ที่ชอบฟังแต่เพลงเก่าๆ!"
1600302-56 = "อ๊าาาาาาา!!!"
1600302-59 = "[ns1] \"...เป็นการลงโทษที่น่ากลัวจริงๆ\"\n[ns2] \"ทำได้ดีมากเลย\""
1600302-60 = "พวกเขาคิดจะปล้นร้านสะดวกซื้อ สมควรเจอแบบนี้แล้วค่ะ"
1600302-61 = "เรื่องเล็กน้อยค่ะ ฉันแค่ทำในสิ่งที่ควรทำก็เท่านั้น"
1600302-62 = "ไปกันเถอะค่ะคุณครู ถ้าฉันอยู่ด้วย รับรองได้ว่าคุณครูปลอดภัยแน่นอน"
1600302-63 = "ทางนี้ค่ะ"
1600302-65 = "[ns] (เดินตามสึซึมิไป)"
1600302-68 = "(คุณครูกับสึซึมิใช้เวลาประมาณ 30 นาทีเดินกลับไปที่ชาเล่ต์)"
1600302-69 = "ถึงแล้วค่ะ ผ่านซอยข้างหน้าไปก็ถึงแล้วล่ะ"
1600302-70 = "จากตรงนี้คุณครูเดินไปคนเดียวก็ได้แล้วค่ะ รีบไปก่อนที่จะมืดกว่านี้เถอะค่ะ"
1600302-71 = "คะ? ไม่ต้องขอบคุณฉันหรอกค่ะ ไม่ใช่เรื่องใหญ่เลย ฉันแค่ทำในสิ่งที่สมาชิกของชมรมต้องทำ#nเท่านั้นเอง"
1600302-72 = "ถึงจะไม่ใช่ชมรมอย่างเป็นทางการก็เถอะ..."
1600302-73 = "ที่ทรีนิตี้เองก็มีเหตุการณ์ต่างๆ เกิดขึ้นบ่อยค่ะ พวกเราเองก็ต้องคอยดูแลให้เรียบร้อยค่ะ"
1600302-74 = "...คะ? วันนี้สนุกเหรอคะ?"
1600302-75 = "อืม... ถึงฉันจะไม่ค่อยเข้าใจเท่าไหร่ก็เถอะ..."
1600302-76 = "แต่วันนี้คุณครูเกือบถูกจับเป็นตัวประกันแล้วไม่ใช่เหรอคะ? ทำไมถึงยังบอกว่าสนุกอีกล่ะ?"
1600302-77 = "...คะ?"
1600302-78 = "แค่มาที่นี่ก็สนุกแล้วงั้นเหรอคะ?"
1600302-79 = "ไม่เห็นมีเรื่องอะไรสักหน่อยนี่คะ? ทำไมถึงสนุกกันนะ..."
1600302-80 = "[s3] \"เพราะสึซึมิยอมเดินมาส่งครูไง\"\n[s4] \"เพราะได้เดินมากับสึซึมิไง\""
1600302-81 = "...!!"
1600302-82 = "...!!"
1600302-83 = "ถึงคุณครูจะพูดแบบนั้นก็เถอะ แต่ฉันไม่ได้ทำอะไรเลยนะคะ ระ...รีบไปเถอะค่ะ"
1600302-84 = "......"
1600302-86 = "พอมาคิดดูแล้ว... ฉันก็รู้สึกสนุกเหมือนกันค่ะ"
1600302-87 = "ถะ...ถึงเราไม่ค่อยได้คุยอะไรกันมากตอนเดินมา แต่มันก็ไม่ได้น่าเบื่อเลย"
1600302-88 = "บางครั้งเวลาที่ได้อยู่กับคุณครู... ฉันก็ลืมไปว่าอยู่ระหว่างการลาดตระเวน"
1600302-89 = "ถ้าเจอกันคราวหน้า หวังว่าจะได้เจอกันในบรรยากาศที่ดีกว่านี้นะคะ"
1600302-90 = "ถ้าเป็นไปได้อยากเจอกันตอนกลางวันมากกว่ากลางคืนค่ะ"
1600302-94 = "อ่า... นี่ของขวัญเล็กๆ น้อยๆ ค่ะ"
1600302-95 = "[s] \"ระเบิดแสง?\""
1600302-96 = "ถึงจะไม่ใช่ปืน แต่ก็สามารถใช้ป้องกันตัวเองได้ในบางครั้งค่ะ"
1600302-97 = "ช่วยรับไว้ด้วยนะคะ"
1600302-98 = "คะ...? ไม่จำเป็นต้องใช้เหรอคะ? ทำไมกันคะ..."
1600302-99 = "เพราะถึงยังไงฉันก็คอยดูแลคุณครูได้อยู่แล้วงั้นเหรอคะ? ระ...เรื่องนั้นมัน...!"
1600302-100 = "ระ...เรื่องนั้นฉันทำได้อยู่แล้วค่ะ พะ...เพราะงั้น...!"
1600302-101 = "......"
1600302-102 = "เข้าใจแล้วค่ะ มะ...มันเป็นเรื่องที่ต้องทำในฐานะสมาชิกกลุ่มรักษาความสงบอยู่แล้ว"
1600302-103 = "ถ้างั้นขอตัวก่อนนะคะ ฝันดีนะคะคุณครู"
1600302-105 = "(สึซึมิหันหลังและวิ่งไปอย่างรวดเร็ว)"
1600302-106 = "(แต่ไม่รู้ว่าเพราะอะไร คุณครูรู้สึกว่าท่าทางการเดินของเธอกลับดูแปลกตาไป)"

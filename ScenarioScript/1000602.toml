[translation]
1000602-1 = "她的誤會"
1000602-2 = "奇普托斯．商店街"
1000602-4 = "（不小心在販賣機前弄掉了100圓硬幣）"
1000602-5 = "（……硬幣就這樣滾進水溝蓋裡消失了）"
1000602-6 = "[s] 打開人孔蓋到下面尋找硬幣"
1000602-8 = "（喀嚓）"
1000602-11 = "……喂，你在那裡做什麼？"
1000602-16 = "……老師？"
1000602-17 = "[s] 「……」"
1000602-18 = "…………"
1000602-19 = "[s] 「…………」"
1000602-20 = "必須聯絡風紀委員會來抓傳聞中的變態呢……"
1000602-21 = "[s] 「這是誤會。」"
1000602-22 = "誤會？你在說什麼啊。"
1000602-23 = "有什麼理由需要特地打開水溝蓋鑽進去？"
1000602-24 = "假如真的有，那一定是潛入不容易被發現的下水道，打算偷窺女學生的裙底風光。"
1000602-25 = "[s] 說明來龍去脈"
1000602-26 = "為了撿銅板鑽進下水道？"
1000602-27 = "……夏萊老師的生活有辛苦到甚至需要為了一個銅板鑽進下水道嗎……"
1000602-28 = "老師，你有什麼想喝的飲料的話我請你喝。"
1000602-29 = "你說不能給學生添麻煩？ #n不，100圓的話沒關係的。"
1000602-30 = "以後就算弄丟銅板也不要鑽進下水道哦。"
1000602-31 = "你說不是因為錢不夠才這麼做的？#n那到底是為什麼……"
1000602-32 = "[s1] 「下水道裡意外的涼爽，很舒服哦。」\n[s2] 「從這個位置更能看清楚伊織的腿。」"
1000602-33 = "你，你在說什麼啊！？"
1000602-34 = "你，你在說什麼啊！？"
1000602-35 = "變態，去死！"
1000602-37 = "（之後雖然找回了硬幣，卻被伊織誤會了）"

1000602-31 = "Huh? You're not still in there because you need the cash? Then why...?"
1000602-32 = "[s1] \"Who knew the sewer had such great views?\"\n[s2] \"You were right. Your legs look pretty good from here.\""
1000602-33 = "Wh-What did you just say?!"
1000602-34 = "Wh-What did you just say?!"
1000602-35 = "Die, you pervert!"
1000602-37 = "I did eventually find the coin, but Iori hasn't treated me the same ever since my little joke."

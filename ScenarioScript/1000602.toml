[translation]
1000602-1 = "A Big Misunderstanding"
1000602-2 = "Kivotos Shopping District"
1000602-4 = "I accidentally dropped a 100-yen coin in front of the vending machine."
1000602-5 = "The coin rolled toward the sewer manhole and slipped through the gap."
1000602-6 = "[s] Open up the manhole and look for the coin."
1000602-8 = "(slam-!)"
1000602-11 = "Huh? What do you think you're doing?!"
1000602-16 = "...Sensei?"
1000602-17 = "[s] \"...\""
1000602-18 = "..."
1000602-19 = "[s] \"...\""
1000602-20 = "I suppose I should call the Prefect Team and let them know I finally caught the pervert that's been sneaking around..."
1000602-21 = "[s] \"I think there's been a misunderstanding.\""
1000602-22 = "A misunderstanding? Nice try!"
1000602-23 = "Manholes were built for only one reason. Why else would you want to open one and climb inside?"
1000602-24 = "You were going to hide in there and look up the skirt of every girl that walked by!"

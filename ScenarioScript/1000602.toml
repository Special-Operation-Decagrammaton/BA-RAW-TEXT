[translation]
1000602-1 = "ความเข้าใจผิดของเด็กสาวคนนั้น"
1000602-2 = "ย่านการค้า คิโวทอส"
1000602-4 = "(คุณครูบังเอิญทำเหรียญหนึ่งร้อยเยนตกลงที่หน้าตู้ขายเครื่องดื่มอัตโนมัติ)"
1000602-5 = "(...เหรียญกลิ้งตกลงไปด้านในของท่อระบายน้ำ)"
1000602-6 = "[s] เปิดฝาท่อระบายน้ำออกเพื่อหาเหรียญที่ตกลงไป"
1000602-8 = "(แกร๊ง!)"
1000602-11 = "...นี่ ทำอะไรอยู่ตรงนั้นน่ะ?"
1000602-16 = "...คุณครู?"
1000602-17 = "[s] \"...\""
1000602-18 = "..."
1000602-19 = "[s] \"...\""
1000602-20 = "คงต้องติดต่อไปแจ้งคณะกรรมการวินัยว่าจับคนโรคจิตที่เป็นข่าวลือได้แล้ว..."
1000602-21 = "[s] \"เข้าใจผิดแล้ว\""
1000602-22 = "เข้าใจผิดงั้นเหรอ? คิดว่าฉันจะเชื่อรึไง"
1000602-23 = "มีเหตุผลอะไรที่ต้องปีนลงไปในท่อระบายน้ำแบบนั้นกันล่ะ?"
1000602-24 = "คงคิดจะเข้าไปซ่อนในท่อระบายน้ำแล้วรอให้เด็กผู้หญิงเดินผ่านมาเพื่อแอบมองใต้กระโปรง#nของพวกเธอล่ะสิ!"
1000602-25 = "[s] อธิบายเรื่องทั้งหมดให้ฟัง"
1000602-26 = "จะลงไปเก็บเหรียญงั้นเหรอ?"
1000602-27 = "คุณครูของชาเล่ต์ลำบากจนต้องมาเปิดฝาท่อระบายน้ำเพื่อเก็บเหรียญแบบนี้...#nคงลำบากน่าดูเลยนะ"
1000602-28 = "คุณครู ถ้าอยากดื่มอะไรก็บอกได้นะ เดี๋ยวฉันเลี้ยงเอง"
1000602-29 = "ให้นักเรียนมาซื้อของให้ไม่ได้งั้นเหรอ?#nเดี๋ยวสิ แค่ร้อยเยนเอง เดี๋ยวฉันจ่ายให้คุณครูเองก็ได้..."
1000602-30 = "ต่อไปเวลาทำเหรียญหล่นก็ไม่ต้องมุดลงไปเก็บในท่อระบายน้ำแล้วนะ"
1000602-31 = "ไม่ใช่ว่ามีเงินไม่พอหรอกเหรอ? ถ้างั้นเพราะอะไรล่ะ...?"
1000602-32 = "[s1] \"เวลาลงไปนั่งในท่อระบายน้ำมันรู้สึกดีเหมือนกันน่ะ\"\n[s2] \"ถ้านั่งอยู่ตรงนี้ก็จะมองเห็นขาของอิโอริได้...\""
1000602-33 = "พะ.. พะ.. พูดอะไรของคุณครูน่ะ!"
1000602-34 = "พะ.. พะ.. พูดอะไรของคุณครูน่ะ!"
1000602-35 = "พวกโรคจิต... ตายซะเถอะ!"
1000602-37 = "(หลังจากนั้นคุณครูก็เจอเหรียญที่ทำหล่น แต่ว่าอิโอริก็ยังคงไม่หายเข้าใจผิดอยู่ดี)"

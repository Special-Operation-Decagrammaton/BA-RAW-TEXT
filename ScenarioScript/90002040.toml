[translation]
90002040-1 = "第4話;耶索德"
90002040-3 = "這種情況，反而還算簡單。"
90002040-4 = "……那隻手臂，再看一次還是覺得超巨大。"
90002040-16 = "避開一次了。好……"
90002040-17 = "呃！？"
90002040-22 = "失誤了嗎……！"
90002040-23 = "雖然躲過手臂攻擊，但被巨大的碎片壓住腿了。"
90002040-27 = "……！"
90002040-28 = "這樣，不太容易脫身呢……"
90002040-37 = "……！！！"
90002040-38 = "（耶索德再次抬起手臂）"
90002040-39 = "（用兵力包圍了呢。是打算連自己的兵力一起壓死嗎？)"
90002040-40 = "（確實是有效率的選擇。畢竟兵力還能再創造）"
90002040-41 = "（但是，我……）"
90002040-42 = "即便要承受一定程度的傷害……！"
90002040-54 = "咦……？"
90002040-59 = "沒關係！"
90002040-60 = "姐姐！快把這個搬開！等我數到三就一起……！"
90002040-61 = "一，二──"
90002040-66 = "──三！！！"
90002040-72 = "……桃井？綠？"
90002040-74 = "嘿嘿，怎麼樣！老師可是特地拜託我們的喔！"
90002040-75 = "沒事吧，英美同學？目前外觀看起來沒有問題……"
90002040-77 = "沒關係，謝謝你們。"
90002040-78 = "還有……"
90002040-83 = "嗯？"
90002040-84 = "嗯？"
90002040-86 = "現在立刻，不要回頭用最快速度往右邊跑。"
90002040-88 = "那是為什麼…… 啊！？"
90002040-96 = "呀啊啊啊啊！？"
90002040-104 = "躲，躲掉了……"
90002040-105 = "謝，謝謝。英美同學。"
90002040-107 = "不是的。該道謝的人是我。"
90002040-108 = "那麼老師"
90002040-109 = "接下來，就拜託你們了。"
90002040-114 = "這已經是最快的速度嗎，Kei！？"
90002040-115 = "是的，再提高RPM真的會炸掉的。"
90002040-116 = "使用後燃器也不行嗎？"
90002040-117 = "如果只有幾秒應該還能勉強撐住…沒關係嗎？"
90002040-118 = "准許！"
90002040-119 = "我明白了，引擎輸出至最大上限。"
90002040-126 = "那麼，就在耶索德上方見吧。各位，"
90002040-127 = "愛麗絲，出擊！"
90002040-133 = "耶索德攻擊組，確認全員安全出擊。"
90002040-134 = "將指揮權交還給你，老師。拜託老師了。"
90002040-135 = "[s]「我知道了！在搜索組陷入危險之前……！」"

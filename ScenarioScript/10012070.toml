10012070-73 = "คำเตือน พื้นที่ในความดูแลของรีสอร์ต"
10012070-76 = "คำเตือน พื้นที่ในความดูแลของรีสอร์ตกำลัง"
10012070-79 = "คำเตือน พื้นที่ในความดูแลของรีสอร์ตกำลังถูกโจมตี"

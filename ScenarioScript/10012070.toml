10012070-84 = "เริ่มการ"
10012070-86 = "ยิงตอบโต้"
10012070-91 = "เอ๋..."
10012070-95 = "ครู...? เห็นนั่นไหม? บนทะเลนั่น..."
10012070-96 = "ห่วงยางเหรอ? เดี๋ยวนะ มันใหญ่เกินห่วงยางไปไหม?"
10012070-97 = "กำลังมาทางนี้เหรอ?"
10012070-98 = "นั่นมัน... ไม่สิ คนคนนั้น..."
10012070-100 = "อ๊ะ..."
10012070-102 = "ในที่สุดก็หาเจอ! อยู่ตรงนั้นเองเหรอคะคุณครู!!"
10012070-103 = "ช่วยทนอีกหน่อยนะคะ! วาคาโมะผู้นี้กลับมาแล้วค่ะ!!"
10012070-111 = "โอ้ว..."
10012070-115 = "ทางนั้นค่ะ! ทางชายทะเล!!"
10012070-119 = "...... เฮือก .....!?"
10012070-120 = "นะ... นั่นมันอะไรกันคะ?? เกิดเรื่องอะไรขึ้นกันคะเนี่ย!?"
10012070-121 = "เรือโฮเวอร์คราฟต์...!?  คนพวกนั้น... ทำไมถึงมีเรือแบบนั้นอยู่ด้วยล่ะคะ?"
10012070-123 = "อาจจะเป็นกองกำลังของทางนั้นก็ได้"
10012070-124 = "ก็ว่าอยู่ว่าหายไปไหนตั้งนาน..."
10012070-125 = "ทำอะไรกันอยู่เล่า!? รีบออกไปช่วยสิ! ขืนปล่อยไว้แบบนี้ระบบป้องกันรีสอร์ตจะต้านทานไว้ไม่ไหวนะ!"
10012070-136 = "มันเริ่มทรุดตัวลงแล้วละ... อีกอย่าง กำลังไฟฟ้ามันต่างกันมากเกินไป..."
10012070-137 = "แบบนั้นก็ยิ่งต้องออกไปช่วยสิ! จะดูอยู่เฉยๆ แบบนี้น่ะเหรอ!?"
10012070-138 = "ไม่ใช่อย่างนั้นหรอก...! แต่ถ้าจะไป อย่างน้อยก็ต้องเตรียมอะไรรับมือกับอุปกรณ์หนักแบบนั้นด้วย...!"
10012070-147 = "อุปกรณ์หนัก...?"
10012070-148 = "อายาเนะ?"
10012070-149 = "จะว่าไป... เราก็มีของแบบนั้นอยู่ด้วยนี่คะ!"
10012070-150 = "ถึงมันจะยังไม่สมบูรณ์ก็เถอะ..."
10012070-151 = "แต่ฉันว่าอย่างน้อยก็น่าลองดูสักตั้งนะคะ!"
10012070-153 = "หืม...? อายาเนะจัง...? ลองดูงั้นเหรอ... หมายความว่ายังไงน่ะ..."
10012070-154 = "อ๋อ~☆"
10012070-155 = "จะว่าไป พวกเราก็ซ่อมกันเกือบเสร็จแล้วใช่ไหมคะ?"
10012070-156 = "อื้ม เป็นการตัดสินใจที่ดีเลย"
10012070-157 = "อื้ม! อายาเนะจังคิดจะเคลื่อนไหวได้ตั้งแต่เนิ่นๆ ฉันว่าเราน่าจะตามทันนะคะ"
10012070-158 = "แล้วนี่เราก็ซ่อมเกือบจะเสร็จแล้วด้วยนี่คะ!"
10012070-159 = "แถมในรีสอร์ตก็มีอาวุธมากมายที่เราเอามาใช้ได้..."
10012070-163 = "ไหนๆ ก็ซ่อมแล้ว... เราลองทดสอบดูสักหน่อยดีไหมคะ?"

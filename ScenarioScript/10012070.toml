[translation]
10012070-1 = "ตอนที่ 8;ห่วงยางที่ใหญ่เกินไปนิด"
10012070-4 = "(ถึงเช้าวันใหม่แบบที่ทุกคนก็ไม่รู้ตัว)"
10012070-5 = "(คุณครูตื่นขึ้นเพราะพื้นที่นอนอยู่ค่อยๆ ร้อนขึ้น)"
10012070-6 = "โอ๊ะ... ตื่นแล้วเหรอครู?"
10012070-7 = "นอนเพลินเลยนะครู พระอาทิตย์จะตรงหัวอยู่แล้ว... หรือเป็นเพราะว่าเมื่อคืนนอนดึกเหรอ?"
10012070-8 = "หรือว่าในวันหยุดจะตื่นสายแบบนี้ตลอด? ถ้าเป็นแบบนี้ก็น่าสงสารนะ"
10012070-9 = "[s1] \"... โฮชิโนะ?\"\n[s2] \"แล้วคนอื่นล่ะ?\""
10012070-10 = "ยังทำหน้าง่วงอยู่อีก แต่ก็นะ ถึงจะอยู่ตรงนี้มันก็ไม่มีอะไรเสียหายหรอก..."
10012070-11 = "หืม? อ้อ คนอื่น..."
10012070-12 = "ทุกคนไปซ่อมเฮลิคอปเตอร์น่ะ ก็มันเป็นงานที่ต้องใช้หลายคนทำนี่เนอะ"
10012070-13 = "หืม...? ฉันเหรอ?"
10012070-14 = "แหะๆ ฉันได้รับภารกิจที่สำคัญมาน่ะ ภารกิจคุ้มกันคุณครูไง ถึงตอนนี้จะปลอดภัยขึ้นมากแล้ว แต่ก็เผื่อเอาไว้ก่อน"
10012070-15 = "คิดว่าฉันขี้เกียจไปทำงานตรงนู้นอย่างนั้นหรอกเหรอ...?"
10012070-16 = "เอาละ ไหนๆ ครูก็ตื่นแล้ว..."
10012070-17 = "งั้นก็ถึงตาของฉันแล้วสินะ?"
10012070-18 = "[s3] \"แล้วจะทำภารกิจสำคัญยังไงล่ะ!?\"\n[s4] \"กะไว้แล้วเชียวว่าต้องมานอน\""
10012070-19 = "งื้ม ไม่เอาน่า~ เรียกว่ามันเป็นการเปลี่ยนเวรดีกว่า เปลี่ยนเวรกันทำงานไง"
10012070-20 = "งื้ม ไม่เอาน่า~ เรียกว่ามันเป็นการเปลี่ยนเวรดีกว่า เปลี่ยนเวรกันทำงานไง"
10012070-21 = "คุณครูก็หักหลังฉันมาหลายครั้งแล้วนี่นา ครั้งนี้ต้องปรับตัวให้เข้ากับฉันบ้างสิ"
10012070-22 = "พักอีกสักเดี๋ยวแล้วค่อยกลับไปหาทุกคนแล้วกัน เอาตามนี้นะ? โอเคเปล่า?"
10012070-23 = "แต่ถ้าจะมีใครมาก่อนหน้านั้นก็ช่วยปลุกด้วยนะ สัญญานะ?"
10012070-24 = "สัญญาต้องเป็นสัญญานะครู~ งั้นฉันขอไปงีบก่อนละ แหะๆ..."
10012070-30 = "......zzZ......"
10012070-31 = "[s5] \"ฝันดีนะ โฮชิโนะ\"\n[s6] \"อื้ม เดี๋ยวครูช่วยปลุกเอง\""
10012070-32 = "งืมมม... งืมๆ..."
10012070-33 = "งืมมม... งืมๆ..."
10012070-35 = "(จากนั้นคุณครูก็นั่งดูทะเลอย่างเหม่อลอย หรือที่เรียกกันว่านั่งโง่ๆ ริมทะเล)"
10012070-36 = "(เริ่มใกล้ถึงเวลาอาหารกลางวันแล้ว)"
10012070-38 = "[ns7] เขย่าตัวโฮชิโนะเบาๆ\n[ns8] \"ถึงเวลาที่ต้องตื่นแล้วนะ โฮชิโนะ\""
10012070-39 = "อืม... ครู... ห้านาที... ขออีกห้านาที..."
10012070-40 = "อืม... ครู... ห้านาที... ขออีกห้านาที..."
10012070-41 = "[s] \"โฮชิโนะ ตื่น...\""
10012070-45 = "[ns] \"...?\""
10012070-47 = "เปิดระบบรักษาความปลอดภัยของรีสอร์ต ตรวจพบการเคลื่อนไหวของเรือติดอาวุธขนาดใหญ่ที่ไม่#nได้รับอนุญาต"
10012070-48 = "ขอให้แขกทุกท่านรีบอพยพเข้าไปในอาคารด้วย ประกาศอีกครั้ง ขอให้ท่านรีบอพยพเข้าไปในอาคาร#nด้วย"
10012070-49 = "ไม่เคยได้ยินเสียงเตือนประเภทนี้เลยแฮะ..."
10012070-50 = "เปิดระบบป้องกันรีสอร์ต เปิดปากกระบอกปืนใหญ่"
10012070-52 = "หืม..."
10012070-53 = "หืม...? อะไรกัน.... เสียงอะไรน่ะ...?"
10012070-54 = "หืม...? ครู? มันคืออะไรเหรอ? เกิดอะไรขึ้นน่ะ...?"
10012070-55 = "ทำไมปืนใหญ่กับปืนกลถึงออกมาอยู่ทั่วทั้งเกาะเลยล่ะ? มีปีศาจอะไรออกมาหรือเปล่าเนี่ย?"
10012070-56 = "[s9] \"ครูก็ไม่รู้เหมือนกัน\"\n[s10] \"เหมือนมีอะไรบุกเข้ามาเลย\""
10012070-57 = "เหมือนจะมีอะไรบุกเข้ามาเลยนะ...?"
10012070-58 = "บุกเข้ามางั้นเหรอ? อะไรล่ะนั่น..."

[translation]
10012070-1 = "第7話;飛來的救生圈"
10012070-4 = "（……不知不覺間朝陽已經升起，來到了早上）"
10012070-5 = "（躺著的地面逐漸開始變熱，讓人漸漸醒了過來）"
10012070-6 = "……哦，老師醒來啦～？"
10012070-7 = "快中午了唷～真愛賴床呢。#n是不是因為昨天太晚睡了？"
10012070-8 = "還是說休息日一直都是這樣？"
10012070-9 = "[s1] 「……星野？」\n[s2] 「大家呢？」"
10012070-10 = "看起來還很睏呢～"
10012070-11 = "嗯？那個啊……"
10012070-12 = "大家去修理直昇機了。#n畢竟修理工作還挺麻煩的。"
10012070-13 = "……啊啊，我嗎？"
10012070-14 = "大叔被分配了保護老師的重大任務。#n雖然警備系統已經啟動，不過還是要以防萬一，對吧？"
10012070-15 = "……不是因為我懶得動唷？"
10012070-16 = "好，老師也醒來了……"
10012070-17 = "……接下來輪到我睡了呢～"
10012070-18 = "[s3] 「重大的任務呢！？」\n[s4] 「我就知道你會這麼說。」"
10012070-19 = "啊哈哈，這是職責交換唷。"
10012070-20 = "啊哈哈，這是職責交換唷。"
10012070-21 = "老師睡著的期間我負責了看守，所以這次換老師了。"
10012070-22 = "晚點再回去找那些孩子們吧？"
10012070-23 = "如果孩子們在我睡醒前就過來的話，要記得提早叫醒我哦？約好囉？"
10012070-24 = "絕對要哦～老師～#n那我先來睡一會，唔嘿……"
10012070-30 = "……zzz。"
10012070-31 = "[s5] 「……晚安，星野。」\n[s6] 「嗯。我會看好時機叫醒你的。」"
10012070-32 = "嗯嗯……呼喵……"
10012070-33 = "嗯嗯……呼喵……"
10012070-35 = "（之後的一段時間，靜靜望著大海享受著假期……）"
10012070-36 = "（時間接近了中午）"
10012070-38 = "[ns7] 輕輕叫醒星野\n[ns8] 「差不多該起來囉，星野。」"
10012070-39 = "嗯……老師……再5分鐘……5分鐘就好……"
10012070-40 = "嗯……老師……再5分鐘……5分鐘就好……"
10012070-41 = "[s] 「星野，該起床……」"
10012070-45 = "[ns] 「……？」"
10012070-47 = "渡假勝地警備系統啟動，於地域內檢測到，有未經許可的，武裝船隻，正在移動。"
10012070-48 = "請客人，儘速，至室內，避難。再重複一次。請儘速，至室內，避難。"
10012070-49 = "嗯……第一次聽到的警報呢……"
10012070-50 = "渡假勝地防禦系統啟動，砲台，開啟。"
10012070-52 = "……呃，嗯？"
10012070-53 = "……什，什麼……什麼聲音……？"
10012070-54 = "……老師這是，什麼狀況……？"
10012070-55 = "島的四處冒出了大砲和機關槍耶……"
10012070-56 = "[s9] 「我也不清楚。」\n[s10] 「好像有什麼攻過來了。」"
10012070-57 = "攻過來……？到底，是什麼……"
10012070-58 = "攻過來……？到底，是什麼……"
10012070-64 = "<System Message>"
10012070-66 = "警告。渡假勝地管轄，"
10012070-69 = "<System Message>"
10012070-70 = "警告。渡假勝地管轄，地域，"
10012070-73 = "警告。渡假勝地管轄，地域，正在，"
10012070-76 = "警告。渡假勝地管轄，地域，正在，受到，"
10012070-79 = "警告。渡假勝地管轄，地域，正在，受到，攻擊。"
10012070-82 = "<System Message>"
10012070-84 = "即將，開始，"
10012070-86 = "迎擊。"
10012070-91 = "……咦。"
10012070-95 = "……老師，你看得到那個嗎？那邊……"
10012070-96 = "以救生圈來說……好像有點大？"
10012070-97 = "……是不是在朝這邊過來？"
10012070-98 = "咦……不對，那傢伙是……"
10012070-100 = "……啊。"
10012070-102 = "啊啊……終於見到了！您在那裡啊，老師！！"
10012070-103 = "若藻我，來迎接閣下了！請您再忍耐一下！"
10012070-111 = "……哇哦。"
10012070-115 = "在那裡！那個海邊！！"
10012070-119 = "……咦！？"
10012070-120 = "那，那到底是什麼狀況！？"
10012070-121 = "為什麼會有氣墊船……！？"
10012070-123 = "那或許就是對方的所有兵力呢。"
10012070-124 = "還想說一陣子沒看見他們……"
10012070-125 = "在做什麼啊，得趕快過去才行！那樣子渡假勝地防禦系統也撐不了多久！"
10012070-136 = "已，已經開始崩潰了……而且，戰力差距實在是……"
10012070-137 = "所以要趕快過去才行！打算就這樣看著嗎！？"
10012070-138 = "不，不是那樣的……#n不過畢竟是要對付那種大型機械，要去的話就得做好準備才行……！"
10012070-147 = "……大型機械？"
10012070-148 = "……綾音？"
10012070-149 = "這麼說來……大型機械的話我們也有！"
10012070-150 = "雖然還沒完全修好……"
10012070-151 = "但是我認為至少值得一試！"
10012070-153 = "……那個，綾音？值得一試是，什麼……"
10012070-154 = "……原來如此～☆"
10012070-155 = "這麼說來，我們已經幾乎要修好了吧？"
10012070-156 = "嗯。明智的判斷。"
10012070-157 = "嗯嗯！多虧綾音醬一早就開始修理，已經幾乎結束了。"
10012070-158 = "這樣的話要追上也很簡單！"
10012070-159 = "剛好機庫裡有很多能使用的武器……"
10012070-163 = "在修理的同時……稍微改裝一下吧？"

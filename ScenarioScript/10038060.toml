10038060-113 = "[ns] \"현룡문이 키사키를 대체할 대상을 찾으려 하고 있다……?\""
10038060-114 = "3;레이죠;99;…….\n#3;a"
10038060-115 = "3;레이죠;02;솔직하게 말씀드리죠. 저는 현무상회의 일원으로서, 현룡문에 대해 그다지 좋은 감정을 가지고 있지 않습니다.\n#3;em;[반응]"
10038060-116 = "3;레이죠;01;하지만 산해경에 현룡문이 필요하다는 점은 인정합니다. 그건 아마, 앞으로도 그럴 수밖에 없을 거라고 생각합니다."
10038060-117 = "3;레이죠;07;그렇지만 그런 현룡문이, '전통'에 어긋나는 일을 했다는 이유로, 키사키 문주님을 스스로 내치려 하다니……\n#3;stiff"

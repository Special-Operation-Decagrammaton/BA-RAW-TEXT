10038060-6 = "4;레이죠;00\n#4;greeting\n#4;a\n#wait;1500"
10038060-7 = "4;레이죠;02;……자리는 불편하지 않으십니까. 선생님?\n#4;em;[?]"
10038060-8 = "[s1] \"나야 다 괜찮지만.\"\n[s2] \"키사키와 미나…… 루미는?\""
10038060-9 = "#wait;10"
10038060-10 = "#wait;10"
10038060-11 = "4;레이죠;00;그 세 분에 대한 것이라면, 아니, 두 분과 한 명에 대한 것이라면 걱정하지 마십시오."
10038060-12 = "4;레이죠;99;아마…… 곧 선생님도 그곳으로 모셔야 하겠지만, 저희 현무상회에서 가장 안전한 곳으로 안내했습니다.\n#4;em;…\n#4;m3"
10038060-13 = "4;레이죠;03;저희로서도 나쁘지 않은 일입니다. 그 키사키 문주님께 일종의 빚을 하나 지워 드릴 수 있게 된 셈이니까요."
10038060-14 = "4;레이죠;05;이것도 저것도, 전부 무사히…… 문주님께서 원래의 자리를 되찾으실 때의 일이겠습니다만.\n#4;stiff"
10038060-15 = "[s] \"바깥의 정보를 어느 정도 모을 수 있었다고 했지?\""
10038060-16 = "4;레이죠;00;예. 회장님께서는 여전히 어린 상태이시고, 어린이 병의 증상이 남아 있는 학생은……."
10038060-17 = "4;레이죠;99;주위의 눈치가 보여서, 제대로 돌아다니기 어려운 분위기니까요."
10038060-18 = "4;레이죠;01;특히 회장님처럼 얼굴이 잘 알려져 있는 학생이라면, 더더욱 그렇겠죠."
10038060-19 = "4;레이죠;02;그래도 아직 현무상회의 정보망은 건재한 편이니, 바깥소식을 전해 듣는 것 정도는 어렵지 않습니다. \n#4;em;[반응]"
10038060-20 = "4;레이죠;99;어쨌든 바깥의 소식, 특히 현룡문 쪽의 이야기부터 말씀드리자면……."
10038060-21 = "#st;[0,0];instant;1;"
10038060-22 = "#clearST"
10038060-23 = "4;레이죠;00\n#4;h\n#wait;1300"
10038060-24 = "#all;hide"
10038060-25 = "#na;레이죠;……현룡문에서, 문주님에 대한 비판…… 이라고 할까, 사실상 비난이…… 이루어지고 있습니다."
10038060-26 = "#all;hide"
10038060-27 = "#wait;500"
10038060-28 = "3;레이죠;04;그런 표정으로 보지 말아 주십시오. 처음에는 저도 제 귀를 의심했으니까요.\n#3;em;[땀]\n#3;a"
10038060-29 = "3;레이죠;99;물론 모든 현룡문 부원이 그렇다는 것은 아닙니다만, 현룡문 강경파 부원 위주로, 그런 의견이 제시되고 있다고 합니다."
10038060-30 = "3;레이죠;00;강경파들이 현재 문제 삼고 있는 것은, 문주님이 지금의 자리."
10038060-31 = "3;레이죠;07;그러니까 다른 학교로 치자면 학생회장의 자리에 오르게 되신 과정 그 자체였습니다…….\n#3;em;…"
10038060-32 = "#all;hide"
10038060-33 = "#wait;500"
10038060-34 = "#wait;1100"
10038060-35 = "#wait;500"
10038060-36 = "#wait;2000"
10038060-37 = "3;강경파 현룡문 부원;07\n#3;a\n#3;stiff\n#wait;1500"
10038060-38 = "3;강경파 현룡문 부원;05;따지고 보면 키사키 문주를 옹립한 과정부터 정상적이지는 않았습니다!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
10038060-39 = "3;강경파 현룡문 부원;00;문주는 본디 3학년생이 맡도록 되어 있는 것. 그러나 키사키 문주는 2학년부터 이미 문주의 자리에 올라 있었습니다!\n#3;closeup"
10038060-40 = "#st;[0,0];instant;1;"
10038060-41 = "#clearST"
10038060-42 = "3;강경파 현룡문 부원;00\n#3;closeup\n#3;d\n#wait;1200"
10038060-43 = "#all;hide"
10038060-44 = "3;온건파 현룡문 부원;02;그렇지만 그것은…… 현룡문의 추대에 의한 것이 아니었는지요? 그리고 그렇게 된 문제의 원인 중 하나는…….\n#3;em;[?]\n#3;a"
10038060-45 = "3;온건파 현룡문 부원;00;키사키 문주 이전의 문주가 실각했기 때문이었고요."
10038060-46 = "3;온건파 현룡문 부원;99;문주의 실각이란 본디…… 웬만해서는 일어나지도 않고, 일어나도록 해서는 안 되는 불미스러운 일이지요……."
10038060-47 = "1;강경파 현룡문 부원;05;그러나 그것이 일어났기에, 키사키 문주가 전통을 깨고 문주의 자리에 오른 것이었습니다.\n#1;em;[반응]\n#1;ar\n#3;m5"
10038060-48 = "1;강경파 현룡문 부원;07;바꾸어 말해 키사키 문주의 그 직위는! 시작부터 전통에 어긋나는 측면이 있었다고 말할 수 있겠습니다!\n#1;stiff"
10038060-49 = "3;온건파 현룡문 부원;00;하지만 그 결정은…… 만장일치였던 결정이 아니었는지요……?\n#3;em;…"
10038060-50 = "1;강경파 현룡문 부원;07;바로 그렇기에! 시작부터 어그러졌던 이 모든 과정을, 이제부터라도 바로 펴야 할 때가 온 것입니다!\n#1;hophop\n#1;m2"
10038060-51 = "#all;hide"
10038060-52 = "#wait;500"
10038060-53 = "[ns] \"키사키에게는 말하지 않는 편이 좋을까…….\""
10038060-54 = "3;레이죠;02;오히려 그 반대이지 않을까요. 오히려 나중에 왜 진작 말하지 않았느냐며 조용히 꾸중하실 분입니다.\n#3;a"
10038060-55 = "3;레이죠;99;'무릇 문주라면 자신에 대한 어떤 평가라도 받아들여야 하는 것이다' 뭐 그런 말씀을 하시면서요."
10038060-56 = "#st;[0,0];instant;1;"
10038060-57 = "#clearST"
10038060-58 = "3;레이죠;00\n#3;em;[?]\n#3;h\n#wait;1000"
10038060-59 = "3;레이죠;08;네? 지금 꽤나 비슷했다고요? 음…… 네. 감사합니다.\n#3;stiff"
10038060-60 = "3;레이죠;04;……새삼 느끼는 것입니다만, 선생님께서는 정말로 허물없이 모두를 대해 주시는군요……."
10038060-61 = "[s] \"선생님은 학생의 편이니까!\""
10038060-62 = "3;레이죠;06;바로 그래서 저는 오히려 어떻게 선생님을 대해 드려야 할지 어렵습니다만…….\n#fontsize;50"
10038060-63 = "#st;[0,0];instant;1;"
10038060-64 = "#clearST"
10038060-65 = "3;레이죠;04\n#3;em;[반응]\n#wait;800"
10038060-66 = "3;레이죠;08;아, 아닙니다. 이야기를 계속해 드리기로 하겠습니다.\n#3;stiff"
10038060-67 = "#st;[0,0];instant;1;"
10038060-68 = "#clearST"
10038060-69 = "3;레이죠;00\n#3;m2\n#wait;1300"
10038060-70 = "3;레이죠;00;정작 이 모든 일을 초래한 연단방…… 신타니 카이는 산해경의 사태에 큰 관심을 보이고 있지 않습니다."
10038060-71 = "#all;hide"
10038060-72 = "#wait;500"
10038060-73 = "3;카이;01\n#3;em;[?]\n#3;a\n#wait;1200"
10038060-74 = "3;카이;02;흠? 현룡문에서의 갑론을박이 예상보다 심해지고 있다?"
10038060-75 = "3;카이;05;토의의 주요 내용은 키사키 문주가 없는 지금, 현룡문과 산해경의 통치를 어떤 방식으로 행할 것인가."
10038060-76 = "3;카이;01;그리고 키사키 문주에게 정통성이 존재하는가, 같은 것들이라고?"
10038060-77 = "3;카이;99;이해할 수 없군. 그런 것들이 선단(仙丹)의 제조와 완성에 도움이 되는 이야기들인가?\n#3;em;…"
10038060-78 = "3;카이;02;쓸데없이 그런 소문을 주워듣고 고민할 시간에, 선단(仙丹)의 제조에 힘을 쓰도록 해라."
10038060-79 = "#st;[0,0];instant;1;"
10038060-80 = "#clearST"
10038060-81 = "3;카이;01\n#3;m4\n#wait;1200"
10038060-82 = "3;카이;06;재료가 부족하다. 가공이 모자라다. 무엇보다 만년삼의 수가 절대적으로 모자라다."
10038060-83 = "3;카이;05;부족한 것이 있다면 현룡문에 요청하고, 그것도 모자라다면 현무상회에도 청구해라. 나는 연구실로 돌아가겠다."
10038060-84 = "3;카이;99;정말이지, 제대로 도움이 되는 자들이 없구나.\n#3;em;[한숨]"
10038060-85 = "#st;[0,0];instant;1;"
10038060-86 = "#clearST"
10038060-87 = "3;카이;01\n#3;dr\n#wait;2500"
10038060-88 = "#wait;1500\n#bgshake"
10038060-89 = "#all;hide"
10038060-90 = "3;레이죠;00;……그 덕분에, 반쯤 활동이 멈춰 버린 저희 현무상회에도, 연단방으로부터의 압력이 들어오고 있습니다.\n#3;em;…\n#3;a"
10038060-91 = "3;레이죠;99;'보통'의 산해경이었다면 이런 사태를 중재하고 해결하는 것은 현룡문의 역할이었겠습니다만, 지금의 현실은…… 네. 그렇죠."
10038060-92 = "#all;hide"
10038060-93 = "#wait;500"
10038060-94 = "#wait;2000"
10038060-95 = "3;강경파 현룡문 부원;05;현무상회 역시 책임을 피할 수 없습니다! 그래서는 안 된다고 생각합니다!\n#3;em;[!]\n#3;a"
10038060-96 = "3;강경파 현룡문 부원;07;분명 이번의 사태도, 현무상회로 대표되는 '그' 세력들이!\n#3;stiff"
10038060-97 = "3;강경파 현룡문 부원;05;상회를 통제한 것에 앙심을 품고 일부러 월영제를 취소시키려 이런 소란을 벌인 것임에 틀림없습니다!\n#3;closeup\n#fontsize;80"
10038060-98 = "3;강경파 현룡문 부원;05\n5;온건파 현룡문 부원;02;그것은 조금 지나친 억측이 아닐까요……? 무엇보다 증거가 부족해 보입니다만…….\n#5;em;[반응]\n#5;al\n#3;m1"
10038060-99 = "3;강경파 현룡문 부원;07;여기에 계신 분들도 확실히 해야 할 것입니다! 자신은 산해경의 전통을 수호하는 현룡문의 편인가, 아니면 다른 누군가의 편인가!\n#3;hophop"
10038060-100 = "3;강경파 현룡문 부원;05;문주의 자리가 일시적으로 공백이 된 이 시점에서, 우리가 현룡문과 산해경을 지키지 않으면 누가 그렇게 할 수 있단 말입니까!"
10038060-101 = "5;온건파 현룡문 부원;99;……모든 것이 혼란 속에 있으니, 혼란을 바로잡을 시금석이 필요하다는 것에는 동의합니다…….\n#5;em;…"
10038060-102 = "5;온건파 현룡문 부원;01;그렇지만 그것을, 어디에서 찾아야 할까요……?"
10038060-103 = "3;강경파 현룡문 부원;07;결국, 우리는 전통으로 돌아가야 합니다. 그렇게 할 수밖에 없습니다.\n#3;stiff"
10038060-104 = "5;온건파 현룡문 부원;02;그렇지만, 어떻게요……?\n#5;em;[?]"

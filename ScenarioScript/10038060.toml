10038060-106 = "#clearST"
10038060-107 = "5;온건파 현룡문 부원;02\n3;강경파 현룡문 부원;99\n#3;em;…\n#3;h\n#5;h\n#wait;2500"
10038060-108 = "5;온건파 현룡문 부원;02\n3;강경파 현룡문 부원;00\n#3;m3\n#5;dr\n#3;h\n#5;h\n#wait;1500"
10038060-109 = "#all;hide"
10038060-110 = "3;강경파 현룡문 부원;02;저는 우리 중에서 가장 산해경의 전통에 맞닿아 있는 동아리와 인물을, 인선해 볼 것을 건의합니다.\n#3;em;[반응]\n#3;closeup"
10038060-111 = "#all;hide"

10038060-129 = "3;온건파 현룡문 부원;04;경극부……?\n#3;stiff"
10038060-130 = "1;강경파 현룡문 부원;02;……역시 경극부가 최적이라고 생각되지 않습니까? 산해경의 전통문화 그 자체라고 할 수 있는 경극을 오늘날까지 지켜 오고 있기도 하고요.\n#1;em;[반응]\n#1;ar\n#3;m5"
10038060-131 = "1;강경파 현룡문 부원;00;경극 자체가 체력을 많이 요구하기도 하고, 거기에 카구야의 엄격한 단련이 합쳐져, 경극부의 전투력은 산해경 내에서도 굴지의 수준이기도 하죠."
10038060-132 = "3;온건파 현룡문 부원;02;그렇지만, 그것이 옳을까요? 다시 말씀드리자면, 전통에 부합하는…… 그런 결정일까요?"
10038060-133 = "1;강경파 현룡문 부원;99;……."

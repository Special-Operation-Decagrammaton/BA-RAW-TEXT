[translation]
10038060-1 = "Episode 6;Us, From the Distant Future "
10038060-7 = "...Are you all right, Sensei?"
10038060-8 = "[s1] \"I'm okay, but...\"\n[s2] \"What about Kisaki, Mina...and Rumi?\""
10038060-11 = "Don't worry about those three."
10038060-12 = "We took them to the safest spot in the Promenade. We may need to take you there too, soon."
10038060-13 = "For us, at least, it worked out. We paid off a debt we owed to the president."
10038060-14 = "And the rest will be fine...once the president overcomes this political predicament she's suddenly in."
10038060-15 = "[s] \"What's the news from your information network?\""
10038060-16 = "Well, for one thing, Rumi's still a child. For her, and the other students who still have Tyke Syndrome..."
10038060-17 = "...it's hard for them to roam around, since they draw so much attention."
10038060-18 = "Especially for Rumi. She's so well known."
10038060-19 = "On the bright side, the Promenade's information network is indeed still intact, so we're bringing in news from all around. "
10038060-20 = "And most of that news, right now, is about Genryumon."
10038060-25 = "The president's facing a lot of criticism. Condemnation, even."
10038060-28 = "I know. I couldn't believe it either, at first."
10038060-29 = "Of course, not all Genryumon members feel that way. It's mainly the hardliners."
10038060-30 = "To sum it up, they're questioning Kisaki's legitimacy as the president."
10038060-31 = "See, there's a normal process to choosing a student council president, but..."
10038060-38 = "The process of installing Madam Kisaki wasn't normal at all!"
10038060-39 = "Traditionally, the president has to be a third-year student. Madam Kisaki was only a second-year when she took office."
10038060-44 = "But wasn't that because Genryumon endorsed her? And one of the reasons they did was because..."
10038060-45 = "...the previous president lost her position."
10038060-46 = "Unfortunate, and not normal, but it did happen."
10038060-47 = "Yes, and if it hadn't, Kisaki would never have even been considered for president."
10038060-48 = "That consideration alone was a massive breach of tradition!"
10038060-49 = "Even so, the decision was unanimous..."
10038060-50 = "Which goes to show that the entire process was rotten from top to bottom! It HAS to be set right!"
10038060-53 = "[ns] \"Maybe we shouldn't tell Kisaki about this...\""
10038060-54 = "I suggest you be the one to tell her. Or else she'll be upset when she finds out you didn't."
10038060-55 = "She'll take it well. She'll probably just say, \"A president must accept the people's judgment.\""
10038060-59 = "Oh? I sounded just like her? Heehee...Thank you."
10038060-60 = "I appreciate how...open you are. With all of us."
10038060-61 = "[s] \"A teacher is always on the student's side.\""
10038060-62 = "I'm not always sure when to be open. Even with you, Sensei..."
10038060-66 = "...but let me just tell you the rest."
10038060-70 = "Considering that Shintani Kai caused all this, she doesn't seem very interested in following up with it."
10038060-74 = "...Oh, is Genryumon still arguing back and forth?"
10038060-75 = "About how to govern in Kisaki's absence..."
10038060-76 = "...and whether she earned her title legitimately?"
10038060-77 = "And how does any of that help us with the potion, hmm?"
10038060-78 = "Don't waste your time on gossip. Focus on the potion. It's what we're here for."
10038060-82 = "We need better processing, more supplies — especially more ten-thousand-year ginseng."
10038060-83 = "Whatever we're lacking, request it from Genryumon. If that doesn't suffice, call the Black Tortoise Promenade. I'll be here in the lab."
10038060-84 = "*sigh* I'm surrounded by imbeciles..."
10038060-90 = "...So now the Promenade is up in arms, trying to get the restrictions overturned, and the Eastern Alchemy Society's throwing requisition orders all over the place."
10038060-91 = "Normally, Genryumon would come in and mediate for everyone. But now... Yeah."
10038060-95 = "The Black Tortoise Promenade wants to duck responsibility? No! Not happening!"
10038060-96 = "They definitely had a hand in this whole situation!"
10038060-97 = "They probably CAUSED it, just to get the Moonlight Festival canceled so they wouldn't have their restrictions anymore!"
10038060-98 = "Isn't that a bit of a stretch...? There's no evidence for that..."
10038060-99 = "You listen VERY carefully! You're either with Genryumon, and everything Shanhaijing's always stood for, or you're not."
10038060-100 = "Right now, there's no president. So who's going to keep order and stand up for the school if not us?!"
10038060-101 = "Well, we do need order, and we can't function without a leader."
10038060-102 = "But who are you suggesting?"
10038060-103 = "Not who, what. We have our traditions to guide us."
10038060-104 = "What do you mean?"
10038060-110 = "I propose we form an interim government and choose someone to lead it, someone who embodies our traditions the most."
10038060-113 = "[ns] \"Genryumon is trying to replace Kisaki...?\""
10038060-114 = "......"
10038060-115 = "You know, speaking as part of the Black Tortoise Promenade, I've never had much love for Genryumon."
10038060-116 = "But I do recognize that Shanhaijing needs them, and I think they always will."
10038060-117 = "Not that I agree with what they're doing here, trying to expel Kisaki for going against \"tradition\"..."
10038060-118 = "[s] \"...\""
10038060-120 = "[ns] \"What else do we know?\""
10038060-124 = "Well, that's most of it. Except..."
10038060-125 = "...the latest word is, the hardliners are already close to picking a replacement."
10038060-129 = "You want to bring the Peking Opera Club into this?"
10038060-130 = "They've preserved the very essence of our culture. Who better to represent Shanhaijing tradition?"
10038060-131 = "Not only that, but between the physical demands of an opera performance and Kaguya's training, they're some of our best fighters."
10038060-132 = "But does that make it the right thing to do? To put it another way, would it align with tradition?"
10038060-133 = "......"
10038060-137 = "Here's my proposal:"
10038060-138 = "We release Kaguya and let her give us her opinion. Then we go from there."
10038060-145 = "[ns] \"That sounds bad...\""
10038060-146 = "It does, and I can't say which way it's going to go."
10038060-147 = "That's why I wanted to ask for your advice."
10038060-151 = "No pressure, of course. You can just...tell me whatever comes to mind."
10038060-152 = "Or you can just go on listening. Maybe that's enough."
10038060-153 = "[s5] \"Hmm, if you want to know what I think...\"\n[s6] \"This is just my personal opinion, but...\""
10038060-156 = "Thank you, Sensei. Hm, this almost feels like a lesson. "
10038060-157 = "Should I salute you, like in class? Oh...that's too much? Fair enough."
10038060-158 = "Hmm? Have I heard the saying, \"power abhors a vacuum\"? Well, I think I have, but..."
10038060-159 = "Oh... So it doesn't just mean people will seize power when there's an empty spot..."
10038060-160 = "...it also means pressure from below will push somebody into that position?"
10038060-161 = "Power and authority ought to go hand in hand with responsibility and accountability."
10038060-162 = "And as we go through life, things are going to happen. The question of who's responsible WILL come up."
10038060-163 = "Someone has to set a direction, take that responsibility, and make a decision."
10038060-167 = "In that sense, someone with ambition, who claws their way into power, might actually find happiness for themselves..."
10038060-168 = "...at least in terms of satisfying their own personal needs and desires."
10038060-169 = "But if someone without that ambition gets pressured into it, just by other people's expectations..."
10038060-173 = "......"
10038060-174 = "The Kaguya I know is a lot of things, but she's not ambitious."
10038060-175 = "She's more like an old-school craftswoman, rigid and inflexible."
10038060-176 = "[s7] \"And if they put her in charge...\"\n[s8] \"Then she might be...\""
10038060-186 = "...Right."
10038060-190 = "I'm thinking of a lot of ways this could all go very wrong."
10038060-198 = "Kaguya, please step out of your cell. ...You're free."
10038060-204 = "My, this is unexpected. Is this the will of the president?"
10038060-209 = "......"
10038060-210 = "...It's the will of Genryumon."
10038060-212 = "Mm, that raises more questions than it answers."
10038060-213 = "We'll explain everything. Would you please come with us?"
10038060-220 = "...And that is what you've missed in Shanhaijing."
10038060-221 = "S-So let me put it all together. The president has disappeared, Shintani Kai has returned, she's taken over the Eastern Alchemy Society... Pardon me, I'm getting ahead of myself..."
10038060-222 = "...A disease called Tyke Syndrome is turning people into children, the Black Tortoise Promenade is under quarantine..."
10038060-223 = "...and the Moonlight Festival is at risk of being canceled?!"
10038060-224 = "How could all that have happened here, all at once?!"
10038060-229 = "......"
10038060-231 = "Now Kaguya, Genryumon has come together and decided we need to fall back on our traditions. "
10038060-232 = "More than that, we need an organization to help us uphold them, at least for now."
10038060-233 = "And you thought of the Peking Opera Club..."
10038060-235 = "That's right."
10038060-240 = "I'd be honored, as would we all. ...But I suspect you have something else to tell me."
10038060-241 = "Yes, and we'll tell you straight."
10038060-247 = "We need a president. And we want it to be you, at least for now."
10038060-253 = "......"
10038060-255 = "Shanhaijing is in dire need of both tradition and order. And based on your previous questioning, you wanted to allow Shintani Kai to return to school."
10038060-256 = "Coincidentally, that's already happened, and if you handle this situation well, you'll be able to make other decisions for Shanhaijing."
10038060-262 = "......"
10038060-264 = "I don't know how to tell this to Rumi or Kisaki."
10038060-265 = "[s] \"I'll figure that part out.\""
10038060-266 = "Thank you. After that...well, we'll have to consider all the possibilities and plan our next move."
10038060-267 = "Even if they do put Kaguya in charge, they'll still have problems."
10038060-268 = "Her legitimacy will be in question from the get-go."
10038060-269 = "Ironically, the only person who can claim true legitimacy is Shintani Kai."
10038060-273 = "She won her stare down with Kisaki, circumstances notwithstanding."
10038060-274 = "More importantly, she would have been — some would say \"should have been\" — a Shanhaijing graduate."
10038060-277 = "But the Eastern Alchemy Society appears to be staying out of that particular debate, and Shintani Kai is holding her ground where she is now."
10038060-278 = "If Shintani Kai had either grabbed for more power or signed it away, this would all be going much more smoothly."
10038060-279 = "But the way it's going now..."
10038060-280 = "[s] \"A lot's going to come down to Kaguya's decision.\""
10038060-281 = "Yes..."
10038060-282 = "Not just a lot. Everything."
10038060-285 = "I understand."
10038060-286 = "What Shanhaijing needs the most, in this moment, is the restoration of order and tradition."
10038060-291 = "And with that in mind..."
10038060-292 = "......"
10038060-297 = "......"
10038060-298 = "I must refuse. I cannot take the position of president."
10038060-303 = "Why not?!"
10038060-304 = "......"
10038060-306 = "You are asking the Peking Opera Club and I to destroy Shanhaijing's tradition in order to protect it."
10038060-307 = "Th-That's...!"
10038060-308 = "Moreover, assuming Madam Kisaki's position, while she is missing, would make me a usurper, nothing more. It would be absolute disloyalty."
10038060-310 = "Kaguya..."
10038060-312 = "I am only an artist, a producer and performer. Anyone from the Peking Opera Club would agree."
10038060-313 = "I may be strict, my methods of training intense, but it's all for the sake of the performance..."
10038060-314 = "...and for what that performance means to Shanhaijing as a whole. I had no other ambitions or intentions behind it."
10038060-315 = "Had I done so out of selfishness, in any way, I would have deserved far more punishment than I received. Expulsion would have been the least of it."
10038060-316 = "But listen. Right now, Shanhaijing is..."
10038060-317 = "...Yes, I understand Genryumon's perspective on the matter. "
10038060-318 = "And should the chaos continue, every student in Shanhaijing will suffer for it."
10038060-319 = "I love Shanhaijing, and all its traditions. My club and I have upheld them for a long time."
10038060-320 = "And so, I will contribute to maintaining order as best I can — within the allowed school regulations."
10038060-325 = "Well, that settles it."
10038060-329 = "Thank you, Kaguya."
10038060-333 = "We've received another message from the Eastern Alchemy Society. It says..."
10038060-339 = "\"All resources and support available in Shanhaijing are to be directed to the Eastern Alchemy Society.\""
10038060-340 = "Just to confirm, has the Society always made such requests so frequently?"
10038060-341 = "No, not at all... In fact, until now, the Society's position has usually been closer to, \"We won't ask for anything, so don't mind us.\""
10038060-342 = "Then this is their new approach...or perhaps a return to a very old one."
10038060-343 = "......"
10038060-344 = "In either case, such a request would be quite difficult to fill."
10038060-345 = "True. But in fairness, all of us do owe them for our current positions, and in a roundabout way, you owe them for your freedom."
10038060-346 = "It'll be hard to keep turning them down."
10038060-347 = "Hmm..."
10038060-348 = "We could do what we can for them, for the time being, and then reconsider later on..."
10038060-349 = "Is that the consensus of Genryumon?"
10038060-353 = "......"
10038060-354 = "(So no one wants to take responsibility...)"
10038060-355 = "All right, let's proceed with that suggestion for now. "
10038060-357 = "As long as you agree to sign off on it."
10038060-364 = "*sigh*"
10038060-373 = "A home is like an inn. You stay for a while, but we're all travelers. Someday, we all move on."
10038060-374 = "Power and status are like an autumn breeze, brushing against one's collar...on a night walk down an unclear path."
10038060-378 = "Where is the path for me, for the Peking Opera Club, for Shanhaijing?"
10038060-380 = "......"
10038060-381 = "And has the president always faced such questions?"

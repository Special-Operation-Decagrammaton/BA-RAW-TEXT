[translation]
10038060-1 = "ตอนที่ 6;เราในอนาคตอันไกลโพ้น "
10038060-7 = "ที่นี่ไม่สะดวกตรงไหนหรือเปล่าคะคุณครู...?"
10038060-8 = "[s1] \"ไม่เลย ครูสบายดี แล้วทุกคนล่ะ?\"\n[s2] \"ไม่ต้องห่วงนะ แล้วคิซากิ มินะ... แล้วรูมิล่ะ?\""
10038060-11 = "ถ้าเป็นเรื่องของ 3 ท่านนั้น ไม่สิ... 2 ท่านกับอีก 1 คนนั้น คุณครูไม่ต้องห่วงหรอกค่ะ"
10038060-12 = "บางที... คุณครูอาจต้องไปยังที่นั่นในเร็วๆ นี้ด้วย ทางย่านการค้าเทพเต่าดำของเราจะพาคุณครูไปใน#nที่ที่ปลอดภัยที่สุดเองค่ะ"
10038060-13 = "สำหรับพวกเราแล้ว นี่ไม่ใช่เรื่องไม่ดีหรอกค่ะ เพราะเท่ากับว่าเราจะได้ใช้หนี้บุญคุณส่วนหนึ่งของท่าน#nประมุขคิซากิด้วย"
10038060-14 = "แต่นั่นก็หลังจากที่ทุกอย่างเข้าที่เข้าทางอย่างปลอดภัย... และท่านประมุขได้ตำแหน่งของตัวเองกลับ#nมาแล้วค่ะ"
10038060-15 = "[s] \"สถานการณ์ในโรงเรียนเป็นยังไงบ้าง?\""
10038060-16 = "ค่ะ ท่านประธานยังอยู่ในร่างเด็กเหมือนเดิม ส่วนนักเรียนที่ยังมีอาการของโรคเด็กลงก็..."
10038060-17 = "ตอนนี้เป็นการยากที่พวกเธอจะออกมาเตร็ดเตร่ข้างนอก นั่นเป็นเพราะสายตาจากคนรอบข้างน่ะค่ะ"
10038060-18 = "โดยเฉพาะนักเรียนที่เป็นที่รู้จักหน้าค่าตาอย่างท่านประธานค่ะ"
10038060-19 = "แต่เครือข่ายข้อมูลของย่านการค้าเทพเต่าดำยังแข็งแกร่งอยู่ เราก็เลยยังสืบหาข่าวสารจากข้างนอก#nนั่นได้อยู่ค่ะ "
10038060-20 = "ฉันจะขอแจ้งข้อมูลของฝ่ายมังกรดำก่อนเลยแล้วกันค่ะ..."
10038060-25 = "ตอนนี้ภายในมังกรดำมีการวิพากษ์วิจารณ์เกี่ยวกับท่านประมุขอยู่ค่ะ ที่จริงต้องบอกว่า... เป็นการกล่าว#nโทษมากกว่าการวิพากษ์วิจารณ์ด้วยซ้ำ..."
10038060-28 = "อย่ามองฉันด้วยสีหน้าแบบนั้นสิคะ ตอนแรกฉันก็ไม่อยากจะเชื่อหูของตัวเองหรอกค่ะ"
10038060-29 = "แน่นอนว่าสมาชิกมังกรดำทุกคนไม่ได้มีทีท่าแบบนั้น ตามที่ได้ยินมาส่วนใหญ่จะเป็นสมาชิกมังกรดำ#nหัวรุนแรงที่มีความคิดเห็นแบบนั้นค่ะ"
10038060-30 = "สิ่งที่พวกอนุรักษ์นิยมหัวรุนแรงคิดว่าเป็นปัญหาก็คือตำแหน่งของท่านประมุขในตอนนี้ค่ะ"
10038060-31 = "ถ้าจะเปรียบเทียบกับของโรงเรียนอื่น ก็คงเป็นกระบวนการในการขึ้นมาเป็นประธานนักเรียนน่ะค่ะ..."
10038060-38 = "ถ้าพิจารณาดูแล้ว การได้รับตำแหน่งของประมุขคิซากินั้น มันไม่ปกติตั้งแต่กระบวนการแล้วค่ะ!"
10038060-39 = "เดิมทีแล้วตำแหน่งประมุขควรเป็นของนักเรียนปี 3 แต่ประมุขคิซากิได้เป็นประมุขตั้งแต่ตอนอยู่ปี 2 ค่ะ!"
10038060-44 = "แต่นั่นก็... น่าจะเป็นเพราะการยกย่องของมังกรดำในตอนนั้นไม่ใช่เหรอคะ? และหนึ่งในสาเหตุที่ทำให้#nเกิดปัญหานั้นก็คือ..."
10038060-45 = "ประมุขคนก่อนหน้าประมุขคิซากิถูกปลดออกค่ะ"
10038060-46 = "การปลดประมุขออก... เป็นเรื่องไม่น่ายินดีที่ปกติแล้วจะไม่เกิดขึ้น และไม่ควรปล่อยให้เกิดขึ้นด้วยค่ะ..."
10038060-47 = "แต่เพราะเกิดเรื่องแบบนั้นไปแล้ว ประมุขคิซากิถึงได้ทำลายประเพณีและได้ขึ้นมาเป็นประมุขยังไงล่ะ"
10038060-48 = "พูดอีกนัยหนึ่งก็คือ ตำแหน่งของประมุขคิซากิมีแง่มุมที่ขัดต่อประเพณีตั้งแต่แรกแล้วค่ะ!"
10038060-49 = "แต่การตัดสินใจครั้งนั้น... เป็นการตัดสินใจที่เป็นเอกฉันท์ไม่ใช่เหรอคะ...?"
10038060-50 = "ก็เพราะอย่างนั้นไงล่ะ! ตอนนี้เลยถึงเวลาแล้วที่เราจะแก้ไขกระบวนการที่บิดเบี้ยวมาตั้งแต่เริ่มต้น!"
10038060-53 = "[ns] \"ไม่บอกให้คิซากิรู้จะดีกว่าหรือเปล่า...\""
10038060-54 = "ฉันว่าควรทำตรงกันข้ามมากกว่าค่ะ เพราะถ้ามารู้ทีหลัง ท่านคงตำหนิอย่างเงียบๆ ว่า 'เหตุใดจึงไม่บอกเราตั้งแต่แรก?'"
10038060-55 = "แล้วก็คงพูดว่า 'คนที่เป็นประมุขต้องรับฟังทุกคำวิจารณ์เกี่ยวกับตัวเอง' แน่นอนค่ะ"
10038060-59 = "คะ? ฉันทำเหมือนท่านประมุขเลยงั้นเหรอคะ? อืม... ค่ะ ขอบคุณค่ะ"
10038060-60 = "จู่ๆ ฉันก็คิดแบบนี้ขึ้นมา... คุณครูนี่ช่างเป็นคนที่ปฏิบัติต่อทุกคนอย่างบริสุทธิ์ใจจังเลยนะคะ..."
10038060-61 = "[s] \"คนเป็นครูต้องอยู่ข้างนักเรียนอยู่แล้ว!\""
10038060-62 = "นี่ถึงเป็นเรื่องยากสำหรับฉันค่ะ เพราะฉันไม่รู้ว่าควรจะปฏิบัติต่อคุณครูยังไง..."
10038060-66 = "มะ... ไม่มีอะไรค่ะ ฉันจะรายงานข้อมูลต่อค่ะ"
10038060-70 = "ส่วนชมรมวิจัยศาสตร์การปรุงยา... หรือต้องบอกว่าชินทานิ ไคที่เป็นต้นตอที่แท้จริงของเรื่องทั้งหมด เธอไม่สนใจเกี่ยวกับสถานการณ์ในซานไห่จิงเท่าไรค่ะ"
10038060-74 = "หืม? การโต้เถียงกันในมังกรดำรุนแรงกว่าที่คิดไว้อย่างนั้นเหรอ?"
10038060-75 = "เนื้อหาหลักของการโต้เถียงกันก็คือ มังกรดำและซานไห่จิงจะถูกปกครองต่อไปในรูปแบบไหน เมื่อประมุขคิซากิไม่อยู่ในตอนนี้"
10038060-76 = "และประมุขคิซากิมีคุณสมบัติในการรับตำแหน่งประมุขหรือเปล่า... อย่างนั้นเหรอ?"
10038060-77 = "ฉันจำเป็นต้องรู้ด้วยหรือไง? เรื่องแบบนั้นเป็นประโยชน์ต่อการทำน้ำอมฤตให้เสร็จสมบูรณ์งั้นหรือ?"
10038060-78 = "เอาเวลาที่จะกังวลเกี่ยวกับข่าวลือที่ไร้ประโยชน์แบบนั้นมาทุ่มเทในการทำน้ำอมฤตเถอะ"
10038060-82 = "ตอนนี้วัตถุดิบยังขาด ยังแปรรูปได้ไม่พอ เหนือสิ่งอื่นใด โสมหมื่นปีก็ยังขาดอยู่เยอะมาก"
10038060-83 = "ไปขอสิ่งที่ยังขาดจากมังกรดำ และถ้ายังไม่พอ ก็ไปขอจากย่านการค้าเทพเต่าดำด้วย ฉันจะกลับไปที่#nห้องวิจัย"
10038060-84 = "ไม่มีใครที่เป็นประโยชน์จริงๆ เลยสักคน"
10038060-90 = "นั่นก็เลยทำให้... ย่านการค้าเทพเต่าดำของเราที่หยุดทำกิจการมาครึ่งหนึ่งแล้วได้รับการกดดันจาก#nชมรมวิจัยศาสตร์การปรุงยาค่ะ"
10038060-91 = "ถ้าเป็นซานไห่จิงในยาม 'ปกติ' แล้วละก็ มังกรดำต้องเป็นฝ่ายรับผิดชอบในการไกล่เกลี่ยและแก้ไข#nสถานการณ์แบบนี้ แต่ในตอนนี้... ก็อย่างนั้นละคะ"
10038060-95 = "ย่านการค้าเทพเต่าดำก็ต้องรับผิดชอบค่ะ! จะปล่อยไปไม่ได้เด็ดขาด!"
10038060-96 = "เหตุการณ์นี้ต้องมีสาเหตุมาจากพวกย่านการค้าเทพเต่าดำแน่นอน!"
10038060-97 = "พอมีการควบคุมย่านการค้า คนพวกนั้นก็เลยมีจิตใจพยาบาท และก่อความวุ่นวายแบบนี้ขึ้นเพื่อจะ#nยกเลิกเทศกาลเงาจันทร์ค่ะ!"
10038060-98 = "นั่นเป็นการคาดเดาที่เกินไปหน่อยหรือเปล่าคะ...? ยังไม่มีหลักฐานในข้อกล่าวหานั้นเลยนะคะ..."
10038060-99 = "สมาชิกคนอื่นที่อยู่ที่นี่ก็ต้องทำให้ชัดเจนค่ะ! ว่าตัวเองจะอยู่ข้างมังกรดำที่คอยรักษาประเพณีของ#nซานไห่จิง หรือจะอยู่ข้างใครคนใดคนอื่น!"
10038060-100 = "ในยามนี้ที่ตำแหน่งประมุขว่างอยู่ชั่วคราว ถ้าเราไม่ปกป้องมังกรดำกับซานไห่จิงไว้ แล้วใครจะมาทำแบบนั้นคะ!"
10038060-101 = "ตอนนี้ทุกอย่างอยู่ในความวุ่นวาย... ฉันเองก็ยอมรับค่ะว่าเราต้องรีบหาคนที่จะมาเป็นบรรทัดฐานในการ#nคลายความสับสนอลหม่าน..."
10038060-102 = "แต่ว่าเราจะไปหาคนคนนั้นจากที่ไหนเหรอคะ...?"
10038060-103 = "เราต้องกลับคืนสู่ประเพณีดั้งเดิม เราไม่มีทางเลือกอื่นค่ะ"
10038060-104 = "แต่ว่า... จะทำยังไงเหรอคะ...?"
10038060-110 = "ฉันแนะนำว่าให้เราคัดเลือกชมรมและบุคคลที่เหมาะสมกับประเพณีของซานไห่จิงที่สุดค่ะ"
10038060-113 = "[ns] \"มังกรดำกำลังหาคนมาแทนคิซากิอย่างนั้นเหรอ...?\""
10038060-114 = "..."
10038060-115 = "ขอพูดอย่างตรงไปตรงมานะคะ ในฐานะของสมาชิกย่านการค้าเทพเต่าดำ ฉันไม่ค่อยชอบใจมังกรดำ#nมากนักหรอกค่ะ"
10038060-116 = "แต่ก็ต้องยอมรับว่าซานไห่จิงจำเป็นต้องมีมังกรดำ และฉันคิดว่าจะเป็นเช่นนั้นต่อไปในอนาคตด้วยค่ะ"
10038060-117 = "แต่ไม่อยากเชื่อเลยนะคะว่ามังกรดำจะกำจัดประมุขคิซากิออกด้วยเหตุผลที่ว่าท่านทำสิ่งที่ขัดกับ#n'ประเพณี'..."
10038060-118 = "[s] \"......\""
10038060-120 = "[ns] \"ครูอยากฟังเรื่องจากเรย์โจวต่อให้จบก่อน\""
10038060-124 = "ค่ะ เข้าใจแล้วค่ะ แต่ฉันก็บอกข้อมูลที่ได้รับมากับคุณครูไปเกือบหมดแล้วค่ะ"
10038060-125 = "เรื่องที่ยังไม่ได้บอกก็คงเป็น... เรื่องที่... ตอนนี้พวกหัวรุนแรงในมังกรดำตกลงที่จะหาคนอื่นที่จะมา#nแทนประมุขคิซากิแล้วค่ะ"
10038060-129 = "ชมรมการแสดงงิ้วเหรอคะ...?"
10038060-130 = "ไม่คิดว่าชมรมการแสดงงิ้วเป็นชมรมที่เหมาะสมที่สุดเหรอคะ? ชมรมนั้นรักษาและสืบทอดการแสดงงิ้ว#nที่เรียกได้ว่าเป็นวัฒนธรรมดั้งเดิมของซานไห่จิงไว้ได้ถึงทุกวันนี้นะคะ"
10038060-131 = "การแสดงงิ้วเป็นงานที่ต้องใช้พละกำลังเป็นอย่างมาก คางุยะเองก็ฝึกฝนสมาชิกอย่างเข้มงวด ความสามารถในการต่อสู้ของชมรมการแสดงงิ้วก็อยู่ในระดับแนวหน้าของซานไห่จิงด้วยค่ะ"
10038060-132 = "แต่ว่ามันจะถูกต้องเหรอคะ? ฉันหมายถึง... นั่นจะเป็นการตัดสินใจที่สอดคล้องกับประเพณีเหรอคะ?"
10038060-133 = "..."
10038060-137 = "ฉันอยากแสดงความคิดเห็นอีกอย่างหนึ่งอยู่พอดีค่ะ"
10038060-138 = "เพื่อตัดสินใจเรื่องนั้น ฉันว่าเราปล่อยตัวคางุยะก่อน แล้วมาฟังความคิดเห็นจากเธอดีมั้ยคะ?"
10038060-145 = "[ns] \"จะไม่เป็นอะไรเหรอ?!\""
10038060-146 = "ฉันก็... ไม่รู้เหมือนกันค่ะว่าต้องตีความเรื่องนี้ยังไง และมันตีความได้อย่างไรบ้าง"
10038060-147 = "ฉันก็เลยมาแจ้งเรื่องนี้เพื่อจะขอคำปรึกษาจากคุณครูค่ะ"
10038060-151 = "ไม่หรอกค่ะ คุณครูไม่ต้องกดดันถึงขนาดนั้นก็ได้นะคะ คุณครูแค่... พูดอะไรกับฉันบ้างก็พอค่ะ"
10038060-152 = "พอมาคิดดูแล้ว แค่การที่คุณครูช่วยรับฟังฉันอย่างนี้ ฉันก็รู้สึกขอบคุณแล้วค่ะ"
10038060-153 = "[s5] \"อืม... ถามว่าครูคิดยังไงน่ะเหรอ...\"\n[s6] \"นี่เป็นแค่ความเห็นส่วนตัวของครู แค่ฟังผ่านๆ ไปก็พอนะ...\""
10038060-156 = "ขอบคุณค่ะ คุณครู ในอีกทางหนึ่ง นี่ก็เหมือนเรากำลังเรียนอยู่เลยนะคะ "
10038060-157 = "ให้ฉันนั่งลง ยืนขึ้น แล้วแสดงความเคารพดีมั้ยคะ? อ่า... ไม่จำเป็นต้องทำถึงขนาดนั้นก็ได้เหรอคะ? ค่ะ เข้าใจแล้วค่ะ"
10038060-158 = "ฉันรู้จักคำว่า 'อำนาจไม่อาจว่างเปล่าได้' มั้ยน่ะเหรอคะ? ก็เคยได้ยินมาบ้างนะคะ..."
10038060-159 = "อ่า... อย่างนี้นี่เองสินะคะ ปกติแล้วคำพูดนั้นอาจหมายความว่า 'หากที่ใดสูญเสียอำนาจไป ก็ย่อมมีคน#nทะเยอทะยานที่อยากจะเข้าไปอยู่ในที่นั้น'"

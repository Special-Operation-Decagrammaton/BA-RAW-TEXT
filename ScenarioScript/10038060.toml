[translation]
10038060-1 = "第6話;遙遠未來的我們"
10038060-7 = "……座位不會讓您感到不舒服吧，老師？"
10038060-8 = "[s1]「不必太在意我沒關係。」\n[s2]「妃姬和美奈……還有瑠美呢？」"
10038060-11 = "如果是那三位，不，應該說是兩位和一位的話，請不用擔心。"
10038060-12 = "也許……不久後也會把老師帶到那裡。#n我們玄武商會已經安排了最安全的地方。"
10038060-13 = "這對我們來說也不全是壞事。#n畢竟能讓門主大人欠我們一個人情。"
10038060-14 = "不過這也是一切都平安落幕……門主大人重回原位之後的事了。"
10038060-15 = "[s]「你說外部的情報收集得差不多了是嗎？」"
10038060-16 = "是的。雖然會長目前依然處在孩童狀態，不少學生也感染了還童症……"
10038060-17 = "考量到周圍的目光，行動起來很不方便。"
10038060-18 = "尤其對會長這樣知名度較高的學生更是如此。"
10038060-19 = "幸好我們玄武商會的情報網還算健全，因此想打聽外部的消息並不難。"
10038060-20 = "我先從外部，特別是玄龍門那邊的狀況開始說起……"
10038060-25 = "現在玄龍門內部，正在對門主大人展開批判……或者應該說指責比較正確。"
10038060-28 = "請不要用那種表情看我。#n我一開始也不敢相信自己的耳朵。"
10038060-29 = "當然，並非所有玄龍門成員都參與其中。#n提出指責的主要是強硬派的成員。"
10038060-30 = "而他們現在質疑的，是門主大人上位的正當性。"
10038060-31 = "拿其他學校來比喻的話，就是當上學生會長的過程……"
10038060-38 = "說到底，擁立妃姬門主的過程本來就不正常！"
10038060-39 = "門主本來就該由三年級生擔任，但妃姬門主卻在二年級就登上了門主之位！"
10038060-44 = "但之所以會有這種結果……不也是玄龍門的推舉促成的嗎？#n何況其中一個原因……"
10038060-45 = "也是因為妃姬門主之前的門主失勢了。"
10038060-46 = "門主的失勢……本來就不應該發生……"
10038060-47 = "但就是因為發生了，妃姬門主才會打破傳統上位。"
10038060-48 = "換句話說，妃姬門主的職位打從一開始就違背了傳統！"
10038060-49 = "可是那個決定……不是全體一致通過的嗎？"
10038060-50 = "就是因為這樣！現在才應該糾正當時鑄下的大錯啊！"
10038060-53 = "[ns]「不告訴妃姬會比較好嗎……」"
10038060-54 = "恐怕恰好相反。#n他反而是那種事後會輕聲責怪我們為什麼不早點告訴他的人。"
10038060-55 = "也許會說「擔任門主之人，本應接受任何批評才是」之類的話吧。"
10038060-59 = "嗯？您說我模仿得很像？#n唔嗯……謝謝您的稱讚。"
10038060-60 = "……我又再次感受到，老師真的對大家都很親切呢。"
10038060-61 = "[s]「老師是站在學生這邊的！」"
10038060-62 = "就是因為這樣，我才不知道該怎麼對待老師比較好啊……"
10038060-66 = "沒，沒什麼。我繼續往下說。"
10038060-70 = "引發這一切的鍊丹術研究會……申谷誡本人對山海經的事態並不關心。"
10038060-74 = "嗯？玄龍門內部的爭論比預想中還激烈？"
10038060-75 = "內容主要是妃姬門主不在的現在，玄龍門和山海經該如何統治……"
10038060-76 = "以及妃姬門主是否具有正統性？"
10038060-77 = "真是難以理解。#n這些事對製造仙丹有任何幫助嗎？"
10038060-78 = "與其在意那些無聊的傳聞，不如專心製造仙丹。"
10038060-82 = "現在材料與加工都不夠。#n而且最重要的是，萬年參的數量遠遠不足。"
10038060-83 = "缺少什麼就去找玄龍門要，再不夠的話找玄武商會也行。#n我回研究室去了。"
10038060-84 = "真是的，一個能幫上忙的人都沒有。"
10038060-90 = "……在鍊丹術研究會的施壓下，我們玄武商會接近一半的活動都停擺了。"
10038060-91 = "如果是「平常」的山海經，這種事應該由玄龍門來調解。#n但現在的情況……就跟您所見到的一樣。"
10038060-95 = "玄武商會也責無旁貸！休想推卸責任！"
10038060-96 = "這次的事件，肯定和玄武商會代表的「那股」勢力脫不了關係！"
10038060-97 = "他們肯定是對商會的管制有所不滿，#n所以才故意引發這場騷動來妨礙月影祭！"
10038060-98 = "這實在有點過度揣測了吧……？#n何況也沒有掌握到證據……"
10038060-99 = "在座的各位也應該表明立場！#n各位究竟是站在守護山海經傳統的玄龍門這邊，還是其他人那邊！"
10038060-100 = "眼下門主之位暫時空缺，如果我們不挺身守護玄龍門和山海經，還有誰能守護呢！"
10038060-101 = "……我也認同在一切都陷入混亂的現在，需要一個試金石來撥亂反正。"
10038060-102 = "但那個人該從何找起呢……？"
10038060-103 = "我們必須回歸傳統──現在只能這麼做了。"
10038060-104 = "可是該怎麼做……？"
10038060-110 = "我建議推舉最符合山海經傳統的社團或人物。"
10038060-113 = "[ns]「玄龍門在尋找替代妃姬的人……？」"
10038060-114 = "……"
10038060-115 = "坦白說，我作為玄武商會的一員，對玄龍門沒有什麼好感。"
10038060-116 = "但我也不得不承認山海經需要玄龍門。#n且未來恐怕也依舊如此。"
10038060-117 = "但玄龍門卻因為違背「傳統」而想罷黜妃姬門主大人……"
10038060-118 = "[s]「……」"
10038060-120 = "[ns]「能麻煩你先把剛才的事繼續說下去嗎？」"
10038060-124 = "好的。我們目前收集到的情報大致上就是這些。"
10038060-125 = "玄龍門的強硬派基本已經達成共識……那就是必須找出能代替妃姬門主大人的人選。"
10038060-129 = "京劇部……？"
10038060-130 = "……京劇部是最適合的選擇吧？#n畢竟他們是將代表山海經傳統文化的京劇守護至今的社團。"
10038060-131 = "京劇本身就需要大量體力，再加上輝夜的嚴格訓練……#n京劇部的戰鬥力，即便放眼山海經也是首屈一指的。"
10038060-132 = "話雖如此，這麼做真的是正確的嗎？#n或者說……這符合傳統嗎？"
10038060-133 = "……"
10038060-137 = "我想在此提出一個建議。"
10038060-138 = "為了判斷這麼做是否正確……應該先釋放輝夜，聽過他的意見後再做決定。"
10038060-145 = "[ns]「這麼做好嗎！？」"
10038060-146 = "關於這點……我實在無法判斷，也不知道如何解讀比較正確。"
10038060-147 = "所以才想請教老師您的意見。"
10038060-151 = "啊，您不必那麼有壓力沒關係。#n只要……告訴我一些您的想法就行了。"
10038060-152 = "畢竟仔細想想，您光是這樣聽我說就已經很足夠了。"
10038060-153 = "[s5]「嗯……如果非要說說我的想法……」\n[s6]「這只是我個人的意見，你聽聽就好。」"
10038060-156 = "謝謝您，老師。#n某種意義上，這也算是在上課吧。"
10038060-157 = "需要「起立、立正、敬禮」嗎？#n啊……不需要到那種程度是嗎？好的，我明白了。"
10038060-158 = "我是否聽過「權力真空」的概念是嗎？#n雖然有聽過……"
10038060-159 = "啊……原來如此。#n指的是通常當權力消失時，野心家便會設法填補空缺。"
10038060-160 = "又或者是因應從下而上的需要，將某人推上那個位置……？"
10038060-161 = "權力，也就是權限……說白了就是責任與歸屬的問題。"
10038060-162 = "這麼說也對……#n生活中總是會發生事件和變化，責任歸屬也將隨之出現。"
10038060-163 = "如此一來便需要有人做出決定並承擔責任……"
10038060-167 = "就這層意義上來說，野心家為此爭權奪位，也許對他個人而言反而是幸福的嗎？"
10038060-168 = "至少那名野心家可以滿足個人的欲望和需求。"
10038060-169 = "反之，如果只因為周圍的推舉而上位，恐怕……"
10038060-173 = "……"
10038060-174 = "至少在我眼中，我所認識的輝夜部長並不足以被稱為野心家。"
10038060-175 = "他只是個頑固而不擅變通……更接近匠人或藝術家的人而已。"
10038060-176 = "[s7]「嗯。所以如果輝夜被『推舉』上位的話……」\n[s8]「恐怕……」"
10038060-186 = "……原來如此。"
10038060-190 = "那恐怕對我們所有人而言……都會是場悲劇也說不定。"
10038060-198 = "你被釋放了。#n請出來吧，輝夜部長。"
10038060-204 = "還真是突然呢。#n這是門主大人的意思嗎？"
10038060-209 = "……"
10038060-210 = "……這是玄龍門的意思。"
10038060-212 = "能請教這個回答的弦外之音嗎？"
10038060-213 = "情況我之後會慢慢解釋的。#n先離開這裡吧。"
10038060-220 = "……以上就是這段時間，在山海經發生的所有事件的經過。"
10038060-221 = "慢著慢著。也就是說……#n門主大人如今下落不明、申谷誡回歸並佔據了鍊丹術研究會……不，在這之前。"
10038060-222 = "名為「還童症」的怪病在山海經蔓延，玄武商會也因此遭到管制。"
10038060-223 = "月影祭能否如期舉行也是未知數……？"
10038060-224 = "怎麼會，為什麼山海經會發生這種事……！"
10038060-229 = "……"
10038060-231 = "正是如此，輝夜部長。#n為了糾正這些混亂和無序，即便只是暫時的也好。"
10038060-232 = "山海經需要一個最能守護傳統的團體──這是玄龍門得出的結論。"
10038060-233 = "而那個團體，將可能是京劇部？"
10038060-235 = "沒錯。"
10038060-240 = "這是我的榮幸。#n不過……從目前的氣氛來看，將我帶來這裡似乎還有其他原因。"
10038060-241 = "是的。我就開門見山地說了。"
10038060-247 = "即便只是暫時的也好，請您就任門主之位吧。"
10038060-253 = "……！"
10038060-255 = "現在的山海經需要傳統和秩序。#n根據之前的審問內容，我聽說您也贊成申谷誡的暫時復學。"
10038060-256 = "巧合的是，眼下該條件已經滿足。#n只要善加利用，您便能將山海經引導至您期望的方向。"
10038060-262 = "……"
10038060-264 = "真不知道該如何向門主大人和會長報告這件事。"
10038060-265 = "[s]「這件事我會想辦法處理。」"
10038060-266 = "謝謝您。不過……接下來該怎麼做也是個問題。#n現在必須將所有可能性納入考量，計畫下一步的行動才行。"
10038060-267 = "即便輝夜部長上位，也不代表問題就能迎刃而解。"
10038060-268 = "從正統性的角度來看，我想無可避免地會引發爭議。"
10038060-269 = "沒錯。如今具備正統性的，只有申谷誡一人。"
10038060-273 = "不管怎麼說，他終究是打倒了妃姬門主大人……#n而且……他也有自己的理由。"
10038060-274 = "最重要的是，他本應是山海經的畢業生啊。"
10038060-277 = "但鍊丹術研究會似乎完全不想插手這些問題。#n至少申谷誡並沒有以任何形式，表示要將他的資格轉移給玄龍門或其他社團的意願。"
10038060-278 = "如果他這麼做的話，事情反而會順利得多吧。"
10038060-279 = "但現在的情況……"
10038060-280 = "[s]「許多事情都將取決於輝夜的選擇。」"
10038060-281 = "是的……"
10038060-282 = "實際上也許不是「許多」，而是「所有」事都將取決於他吧。"
10038060-285 = "我明白了。"
10038060-286 = "山海經的現狀，以及此刻我們山海經所需要的……是恢復秩序和傳統一事。"
10038060-291 = "那麼就事不宜遲……！"
10038060-292 = "……"
10038060-297 = "……"
10038060-298 = "我拒絕。#n唯獨就任門主一事，我絕對無法接受。"
10038060-303 = "這是為什麼！？"
10038060-304 = "……！"
10038060-306 = "玄龍門現在正要求我和京劇部──為了守護山海經的傳統而破壞傳統。#n這顯然是自相矛盾的。"
10038060-307 = "這，這……！"
10038060-308 = "何況如今妃姬門主大人的行蹤尚未明朗──#n若我擅自上位那便是篡位，是違反忠義的行為。"
10038060-310 = "（輝夜部長……）"
10038060-312 = "我不過是個構思並表演京劇的文化人。我們京劇部的成員也是如此。"
10038060-313 = "雖然我對部員們的鍛鍊比其他學生嚴格是事實……但那終究是為了京劇。"
10038060-314 = "更進一步說是為了山海經，除此之外的意圖或意義皆不存在。"
10038060-315 = "假如我在此當中帶有任何一點私心，哪怕要遭受天譴或退學處分我也甘之如飴。"
10038060-316 = "但是，現在的山海經……！"
10038060-317 = "……我明白你的意思，也理解玄龍門的出發點。"
10038060-318 = "如果這種混亂繼續持續下去，確實會影響所有在山海經學習的學生……"
10038060-319 = "我明白了。#n作為長期接觸並守護山海經傳統的社團部長……"
10038060-320 = "我會在現有的校規範圍內，盡最大努力維護山海經的秩序。"
10038060-325 = "現在這樣已經非常足夠了。"
10038060-329 = "……萬事拜託了，輝夜部長。"
10038060-333 = "另外……有來自鍊丹術研究會的傳話。"
10038060-339 = "內容是……「將山海經內的所有資源集中至鍊丹術研究會」。"
10038060-340 = "為求保險起見，我先確認一下……鍊丹術研究會以前有提出過這樣的要求嗎？"
10038060-341 = "沒有，恰巧相反……#n鍊丹術研究會過往的立場更接近「不會提出任何要求，所以請不要干涉我們」……"
10038060-342 = "也就是發生了新的變化……#n不，從某種角度來看，或許也能說是回到了以前的鍊丹術研究會……"
10038060-343 = "……"
10038060-344 = "但無論如何，這種要求實在很難接受……"
10038060-345 = "話雖如此，無論是輝夜部長還是我們……#n都是因為有了新的鍊丹術研究會，才得以獲得如今的地位。"
10038060-346 = "因此如果要完全拒絕鍊丹術研究會的要求……怎麼說呢，實在是有點困難。"
10038060-347 = "唔嗯……"
10038060-348 = "先暫時接受鍊丹術研究會的要求，日後再尋找對策如何呢？"
10038060-349 = "這是[ruby= ・     ・     ・ ]玄龍門[/ruby]的意思嗎？"
10038060-353 = "……"
10038060-354 = "（沒有人願意承擔責任……）"
10038060-355 = "我明白了。#n就先這麼辦吧。"
10038060-357 = "那麼，我就當做輝夜部長也同意這個提案了。"
10038060-364 = "呼……"
10038060-373 = "「家如旅館暫歇處，人生行客終須去」。"
10038060-374 = "「權位如風過衣襟，夜來問路尋歸程」。"
10038060-378 = "我們京劇部……以及山海經該何去何從……"
10038060-380 = "……"
10038060-381 = "門主大人，您一直在為這些事情煩惱嗎……"

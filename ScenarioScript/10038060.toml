10038060-122 = "#clearST"
10038060-123 = "3;레이죠;99\n#3;em;[한숨]\n#3;h\n#wait;1200"
10038060-124 = "3;레이죠;02;네. 알겠습니다. 어차피 저희가 수집한 정보는 거의 다 말씀드린 것 같습니다."
10038060-125 = "3;레이죠;00;현룡문의 강경파가, 결국 키사키 문주님을 대신할 대상을 찾아내는 데에…… 거의 합의했다는 것 정도만 제외하면요."

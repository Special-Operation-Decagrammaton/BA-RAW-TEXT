[translation]
2000308-1 = "#title;정의의 실현"
2000308-2 = "#place;트리니티 학원 건물 옥상"
2000308-3 = "3;마시로;00;으음…… 예상보다 조금 늦군요. #n분명 이 앞으로 지나갈 때가 되었는데……\n#3;em;[...]\n#3;a"
2000308-4 = "3;마시로;05;하지만 긴장을 늦출 수는 없습니다. #n적을 노릴 수 있는 건 단 한순간 뿐이니까요!\n#3;em;[!]"
2000308-5 = "3;마시로;02;네? 아무리 극악무도한 악의 간부라 하더라도 총으로 즉결 처분하는 건 너무한 일 아니냐고요?"
2000308-6 = "3;마시로;03;안심하시길. 이 총에 장전된 탄환은 사람을 잠들게 만드는 마취탄입니다.\n#3;greeting"
2000308-7 = "3;마시로;03;상대가 쓰러지는 즉시 구속하여 츠루기 부장께 조사를 부탁드릴 예정입니다.\n#3;em;[반짝]"
2000308-8 = "#all;hide"
2000308-9 = "#wait;6500"
2000308-10 = "#st;[-1200,-530];serial;60;― 후우…… [wa:1200]오늘따라 날씨가 무덥군요."
2000308-11 = "#wait;4000"
2000308-12 = "#clearST"
2000308-13 = "#st;[-1200,-530];serial;60;[wa:700]― 완벽한 저격을 위해서라면 [wa:1700]이 정도의 더위는 [wa:800]충분히 감내할 수 있습니다.[wa:200] "
2000308-14 = "#wait;4300"
2000308-15 = "#clearST"
2000308-16 = "#st;[-1200,-530];serial;60;― 조금…… [wa:1300]땀 냄새가 나지는 않으려나……"
2000308-17 = "#wait;5000"
2000308-18 = "#clearST"
2000308-19 = "#st;[-1200,-530];serial;60;― 이런 여름날에는 [wa:2000]다른 학우들의 [wa:1000]하얀 교복이 그립네요."
2000308-20 = "#wait;5000"
2000308-21 = "#clearST"
2000308-22 = "#st;[-1200,-530];serial;60;[wa:500]― 선생님…… [wa:1500]어쩐지 시선이 음흉합니다만……"
2000308-23 = "#wait;4000"
2000308-24 = "#st;[-1200,-630];serial;60;― 제대로 적을 [wa:1000]주시하고 계신 게 맞으시지요?"

2000308-26 = "#all;hide\n#clearST"
2000308-27 = "#na;(삐리리리-)"
2000308-28 = "3;마시로;02;어라, 정의실현부로부터 연락이……?\n#3;em;[?]\n#3;a"
2000308-29 = "#na;정의실현부 부원;마시로 씨? #n지금 어디서 무얼 하고 계시는 건가요?"
2000308-30 = "3;마시로;01;어제 하스미 선배께서 블랙마켓의 간부가 근처를 지나간다고 하셔서……. #n근처의 저격 포인트에서 대기중이었습니다.\n#3;em;[반응]"
2000308-31 = "#na;정의실현부 부원;이런, 헛걸음을 하셨군요."
2000308-32 = "3;마시로;04;네? 그게 무슨 말씀이신가요?\n#3;shake\n#3;em;[?!]"
2000308-33 = "#na;정의실현부 부원;그 악당은 어젯밤에 이미 츠루기 부장님께서 직접 생포해 오셨답니다."
2000308-34 = "#na;정의실현부 부원;츠루기 부장님도 참, 멋대로 습격을 감행하시다니……"
2000308-35 = "3;마시로;04;그런…… 그럼 저는 무얼 위해서……"
2000308-36 = "#na;정의실현부 부원;우선은 학교로 복귀 부탁드립니다. #n수고하셨습니다."
2000308-37 = "3;마시로;06;우으…… 네.\n#3;em;[속상함]\n#3;stiff"
2000308-38 = "#all;hide"
2000308-39 = "#na;이후, 풀이 죽은 마시로를 달래 주며 학교로 돌아왔다."

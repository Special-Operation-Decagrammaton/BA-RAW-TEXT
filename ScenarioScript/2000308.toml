[translation]
2000308-1 = "A Duty to Justice"
2000308-2 = "Trinity Rooftop"
2000308-3 = "Hmm. They're late. They should be passing by any minute now..."
2000308-4 = "But I can't let my guard down. I'll only have a split second to get the perfect shot on the target!"
2000308-5 = "What? Do you think it's cruel to kill a target in a single shot? Even if they're guilty of terrible crimes?"
2000308-6 = "You needn't worry. This gun is loaded with tranquilizers that will only put the target to sleep."
2000308-7 = "As soon as they're out, we'll take them into custody and request an investigation from President Tsurugi."
2000308-10 = "― Whew... It's unseasonably hot today.[wa:520] "
2000308-13 = "― I can handle heat like this if that's what it takes  to get the perfect shot.[wa:1920] "
2000308-16 = "― But I do hope...that I don't get too sweaty.[wa:380] "
2000308-19 = "― I envy the other students' white uniforms on hot summer days like this.[wa:1320] "
2000308-22 = "― Sensei. You're staring at me.[wa:1720] "
2000308-24 = "― Shouldn't you keep your eyes out for the target?[wa:10] "
2000308-27 = "*beep* *beep*"
2000308-28 = "Huh? A call from the Justice Task Force...?"
2000308-29 = "Mashiro? Where are you and what are you doing right now?"
2000308-30 = "Hasumi told me yesterday that the head of the Black Market would be passing by soon... I've been waiting at a nearby position."
2000308-31 = "Oh, dear. I'm afraid you've been wasting your time."
2000308-32 = "Huh? What do you mean?"
2000308-33 = "President Tsurugi arrested that criminal herself just last night."
2000308-34 = "You know how she is. Always going off on her own."
2000308-35 = "Then...I've been doing all of this for nothing?"
2000308-36 = "You can return to the clubroom now. Sorry for the misunderstanding."
2000308-37 = "*sigh* Understood."
2000308-39 = "I spent the walk back to school trying to cheer up Mashiro."

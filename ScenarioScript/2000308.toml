[translation]
2000308-1 = "ความเข้าใจจริงเรื่องความยุติธรรม"
2000308-2 = "ดาดฟ้าอาคารในสถาบันทรีนิตี้"
2000308-3 = "อืม... ช้ากว่าที่คิดไปหน่อยนะคะ ฉันแน่ใจว่าถึงเวลาที่ต้องผ่านตรงนี้แล้ว..."
2000308-4 = "แต่จะลดการ์ดลงไม่ได้นะคะ ฉันมีแค่โอกาสเดียวเท่านั้นที่จะจัดการพวกศัตรูได้!"
2000308-5 = "คะ? ไม่ว่าผู้บริหารจะชั่วร้ายแค่ไหน การด่วนตัดสินด้วยปืนมันไม่เกินไปหน่อยงั้นเหรอคะ?"
2000308-6 = "สบายใจได้เลยค่ะ กระสุนในปืนกระบอกนี้เป็นกระสุนยาสลบที่ทำให้คนหลับค่ะ"
2000308-7 = "ทันทีที่ฝ่ายตรงข้ามล้มลง ฉันจะเข้าควบคุมตัวทันที และขอให้หัวหน้าซึรุกิช่วยสืบสวนค่ะ"
2000308-10 = "― ฮู่ว... วันนี้อากาศร้อนจริงๆ เลยนะคะ[wa:520] "
2000308-13 = "― สำหรับการเป็นสุดยอดนักแม่นปืน ความร้อนขนาดนี้ ทนได้สบายอยู่แล้วค่ะ[wa:2360] "
2000308-16 = "― ฉันคง... ไม่ได้มีกลิ่นเหงื่อออกมาใช่มั้ยนะ...[wa:340] "
2000308-19 = "― ในหน้าร้อนแบบนี้นึกถึงชุดนักเรียนสีขาวของโรงเรียนเลยนะคะ[wa:1920] "
2000308-22 = "― คุณครู... คือสายตาของคุณครู... มันน่ากลัวนิดหน่อยนะคะ...[wa:640] "
2000308-24 = "― ตอนนี้คุณครูกำลังจับตาดูศัตรูอยู่ใช่มั้ยคะ?[wa:200] "
2000308-27 = "(ตื๊ดดดด....)"
2000308-28 = "เอ๊ะ ชมรมทวงความยุติธรรมติดต่อมา...?"
2000308-29 = "คุณมาชิโระ? ตอนนี้กำลังทำอะไรอยู่ที่ไหนคะ?"
2000308-30 = "เมื่อวานนี้รุ่นพี่ฮาสุมิบอกว่าผู้บริหารของตลาดมืดจะผ่านมาแถวนี้.....#nฉันเลยมารออยู่ที่จุดซุ่มยิงใกล้ๆ ค่ะ"
2000308-31 = "แย่ละสิ มาเสียเที่ยวซะแล้วละค่ะ"
2000308-32 = "คะ? หมายความว่ายังไงเหรอคะ?"
2000308-33 = "เจ้าวายร้ายนั่นถูกท่านหัวหน้าซึรุกิจับตัวไปเมื่อคืนแล้วค่ะ"
2000308-34 = "ท่านหัวหน้าซึรุกิก็เข้าโจมตีตามอำเภอใจ..."
2000308-35 = "ถ้างั้น...ฉันมาทำอะไรกันล่ะ..."
2000308-36 = "ก่อนอื่นรบกวนกลับไปที่โรงเรียนก่อนค่ะ ขอบคุณมากนะคะ!"
2000308-37 = "อื้ม... ได้ค่ะ"
2000308-39 = "(หลังจากนั้นก็มาปลอบมาชิโระที่ซึมๆ และกลับไปที่โรงเรียน)"

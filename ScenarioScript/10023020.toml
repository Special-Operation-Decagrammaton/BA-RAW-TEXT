[translation]
10023020-1 = "第2話;開始「打掃」吧"
10023020-2 = "（到了與桃井約好的時間……）"
10023020-3 = "（看了看四周──）"
10023020-4 = "呀齁～老師！"
10023020-5 = "[s]「你好呀，桃……井……？」"
10023020-6 = "鏘～是女僕裝唷！"
10023020-7 = "怎麼樣？怎麼樣？很可愛吧？"
10023020-8 = "很適合吧？"
10023020-9 = "來，請說說你的感想吧！"
10023020-10 = "[s1]「啊，啊啊……我一定……」\n[s2]「是為了這一天而誕生的吧……！」"
10023020-11 = "真，真的嗎……？耶嘿，耶嘿嘿。#n你那麼高興的話……好像有點害羞。"
10023020-12 = "真，真的嗎……？耶嘿，耶嘿嘿。#n你那麼高興的話……好像有點害羞。"
10023020-13 = "哈啊，哈啊……！姐姐真是的，不要突然用跑的嘛！#n剛剛明明還說什麼動起來不方便，抱怨個不停的說……發生什麼事了？"
10023020-14 = "哼哼～！因為想早點讓老師看見！"
10023020-15 = "很抱歉讓你久等了，老師。"
10023020-16 = "[s]「別在意。綠也很可愛哦，很適合你。」"
10023020-17 = "是，是……嗎？#n謝，謝謝。耶嘿嘿……"
10023020-18 = "來，柚子也出來吧！"
10023020-19 = "啊，呃，嗯……"
10023020-20 = "怎麼……樣呢，老師？#n嗚……這件裙子是不是太飄逸了……？"
10023020-21 = "[s]「非常適合你唷，柚子……棒極了！」"
10023020-22 = "老，老師！？"
10023020-23 = "啊，那，那個……！啊嗚嗚！"
10023020-28 = "接下來是愛麗絲！"
10023020-29 = "……呃，咦？愛麗絲呢？"
10023020-30 = "愛麗絲醬？怎麼了嗎？"
10023020-32 = "果然對愛麗絲來說還太早了！女僕裝……女僕裝……"
10023020-33 = "是寧瑠前輩的衣服！愛麗絲辦不到！"
10023020-35 = "哎呀……好不容易才說服他來這裡的……"
10023020-36 = "愛麗絲醬一直是那個樣子……"
10023020-37 = "[s]「女僕裝還太早了……？」"
10023020-38 = "那個……他說舉止好像還是沒辦法跟C&C的大家一樣……"
10023020-39 = "所以似乎也對自己穿上有所抗拒……"
10023020-40 = "愛麗絲，穿衣服沒有什麼早不早的哦！#n不穿的話什麼都不會開始的！"
10023020-42 = "可是愛麗絲……"
10023020-43 = "[s3]「無論是什麼樣的勇者，都要勇於挑戰對吧。」\n[s4]「所以愛麗絲也試著向前邁進，開始冒險好嗎？」"
10023020-44 = "嗚……確實是這麼說沒錯……"
10023020-45 = "嗚……確實是這麼說沒錯……"
10023020-46 = "……愛麗絲知道了。"
10023020-47 = "──因為愛麗絲是勇者！"
10023020-50 = "嗚哇……"
10023020-51 = "真的適合愛麗絲嗎……！"
10023020-52 = "[s]「嗯，非常適合唷！別擔心！」"
10023020-53 = "……"
10023020-54 = "愛麗絲就是愛麗絲，是嗎……？"
10023020-55 = "就算穿上女僕裝也一樣……？"
10023020-58 = "當然囉！"
10023020-62 = "大家……謝謝你們。"
10023020-66 = "無論穿上什麼衣服，愛麗絲就是愛麗絲……！"
10023020-68 = "愛麗絲，想做還是做得到的嘛！"
10023020-70 = "很了不起唷，愛麗絲醬。"
10023020-72 = "愛麗絲醬……你很努力呢……"
10023020-76 = "[ns]「做得好，愛麗絲。」"
10023020-79 = "（大家一起為愛麗絲鼓掌）"
10023020-80 = "（就這樣，遊戲開發部迎來了美好結局──）"
10023020-82 = "（──還太早了！）"
10023020-84 = "[ns]「話說，大家的代號都是Double O呢。」"
10023020-85 = "因為老師借來的女僕裝，尺寸上只有寧瑠前輩的比較適合。"
10023020-86 = "柚子跟愛麗絲醬身上穿的似乎是寧琉前輩不同尺寸的預備品。#n裡面還塞著「請在長高之後穿吧」的紙條。"
10023020-90 = "就跟綠說的一樣，尺寸不同的預備品我也可以穿……"
10023020-91 = "剩下的全部都太大了！#n特別是花凛前輩的女僕裝，真的超級大！"
10023020-92 = "不過總之，這樣就準備萬全了呢！#n呵呵，也讓老師看過大家穿上女僕裝的樣子了！"
10023020-93 = "是！冒險即將開始！"
10023020-94 = "雖然說老師也會一起來，真的沒問題嗎……"
10023020-95 = "嗚……好想回櫃子裡去……"
10023020-97 = "（於是，勇者們的冒險（？）就此展開──）"
10023020-99 = "……"
10023020-100 = "……"
10023020-104 = "……"
10023020-105 = " ？"
10023020-109 = "[ns]「……是個比想像中還大的屋子呢。」"
10023020-110 = "現，現在拒絕會不會比較好！？"
10023020-111 = "……明明都來到這裡了？"
10023020-118 = "咦，柚子醬？#n……柚子醬！？"
10023020-124 = "歡迎各位的到來。恭候多時了。"
10023020-125 = "願意在約定好的時刻前來……我在此致上謝意。"
10023020-127 = "（綠……你看，就是這個人）"
10023020-128 = "你，你就是……那個，委託人嗎……？"
10023020-133 = "[ns5]「聽說是『打掃』的委託……」\n[ns6]「可以告訴我們詳細的情況嗎？」"
10023020-134 = "原來如此，希望盡快進入正題是嗎。#n各位是大忙人，我可真是失禮了。"
10023020-135 = "原來如此，希望盡快進入正題是嗎。#n各位是大忙人，我可真是失禮了。"
10023020-136 = "本人是一名美術商人……負責管理從收藏家手中買來的商品，#n並藉由拍賣會使其再次流通，也就是所謂的二手商人。"
10023020-137 = "由於下次的拍賣會上將展出一件非常貴重的作品……#n所以想委託各位進行參加者的護衛和美術品的警備。"
10023020-138 = "先，先等一下！？#n我們明明聽說工作內容是「打掃」……！？"
10023020-139 = "您說的沒錯，我確實說過是「打掃」。#n不過C&C所謂的「打掃」指的就是特務的工作──沒錯吧？「小暴君」──#n不，C&C的隊長，美甘寧瑠。"
10023020-140 = "（是，是這樣的嗎！？）"
10023020-141 = "（我怎麼會知道，姐姐！）"
10023020-142 = "（怎，怎麼辦……！？怎麼辦，怎麼辦，怎麼辦……！）"
10023020-143 = "（總之先冷靜！……現在必須克服眼前的難關！）"
10023020-144 = "是，是的！確實是這樣沒錯！"
10023020-145 = "[s]「如果能事前詳細地告知，我們的準備也會更完善……」"
10023020-147 = "關於這點真是抱歉。#n不過C&C的各位都是祕密特務……"
10023020-148 = "如果在公眾面前向各位說明，我擔心會招來無謂的誤解。#n要在有限的期間內製造對話的場合也有困難，因而才會如此判斷。"
10023020-149 = "總之……非常感謝各位不辭辛勞蒞臨本宅邸。#n我們能這樣相遇也算是某種緣份……"
10023020-150 = "本人有個小小的請求，希望能親眼見識傳說中C&C的實力。"
10023020-153 = "！！！"
10023020-155 = "聽說C&C的各位，都在各自的領域上擁有特別的實力。"
10023020-156 = "當然，我並沒有要各位揭露一切這種厚顏無恥的意思。#n各位真正的實力，應該要在「打掃」的現場展現才對……"
10023020-157 = "不過，我想展示部分的實力應該不成問題才是。"
10023020-158 = "（果然還是說出真相吧，姐姐！）"
10023020-159 = "（等等，綠！那麼做的話會被寧瑠前輩殺掉的！現在我們已經被當成C&C了哦！？）"
10023020-160 = "（那，我們得自己想辦法完成委託嗎……！？）"
10023020-161 = "（沒錯。這裡就靠我們自己的力量設法解決吧）"
10023020-165 = "那麼，哪位要先讓我開開眼界呢？"
10023020-171 = "愛麗絲知道了！這是轉職活動對吧！#n愛麗絲會轉職成C&C的女僕！"
10023020-172 = "愛麗絲醬！？"
10023020-173 = "愛麗絲！？"
10023020-174 = "愛麗絲的職業是……"
10023020-181 = "……"
10023020-187 = "……"
10023020-194 = "……！"
10023020-199 = "……！！！"
10023020-212 = "今天愛麗絲的職位是……光屬性的單體輸出……"
10023020-213 = "愛麗絲，現在開始狙擊遠處的小岩石！"
10023020-214 = "哈啊啊啊……！"
10023020-215 = "光呀！"
10023020-217 = "（咚哐──！）"
10023020-219 = "哦，哦哦……！一擊就命中距離那麼遠的小岩石……！"
10023020-220 = "這就是傳聞中，無論什麼目標都能命中的狙擊手的實力……！"
10023020-221 = "不過我聽說狙擊手為了不暴露位置，應該要避人耳目的才對……？"
10023020-222 = "沒，沒問題的！這樣能一擊就從遠處壓制！"
10023020-223 = "沒，沒錯！只要沒有目擊者就沒問題了！"
10023020-224 = "呼呣……既然C&C的各位都這麼說了……"
10023020-225 = "感謝你的配合。#n其他幾位的職責我也有點在意……"
10023020-226 = "那邊那位從剛才開始就非常安靜的是……？"
10023020-230 = "噫！？"
10023020-233 = "（怎麼辦，怎麼辦，怎麼辦，怎麼辦……！）"
10023020-234 = "（柚子，沒問題的！想想柚子能做到的事吧！）"
10023020-235 = "（柚子醬平常都躲在櫃子裡，只要活用這點的話……）"
10023020-236 = "（……對了！）"
10023020-237 = "（什，什麼！？）"
10023020-238 = "（來這邊！）"
10023020-240 = "呼呣……聽說準備要花上幾分鐘所以離開了一會……大家都到哪去了呢？"
10023020-244 = "……嗯？"
10023020-247 = "這樣的箱子，剛才應該不在這裡才對……#n看起來也不像動過什麼手腳。C&C的各位……？"
10023020-262 = "請，不要動……"
10023020-263 = "嗚喔喔喔！？"
10023020-265 = "這可真是不得了，著實令人吃驚。#n居然能隱藏氣息出現在我的背後。"
10023020-266 = "這麼說來……聽說C&C有位非常幸運，#n可以在神不知鬼不覺的情況下出現在目標面前的潛入人員。"
10023020-267 = "要用那麼纖細的身軀執行任務想必很不容易吧。#n不……應該說將其活用於潛入比較正確吧。"
10023020-268 = "是，是……就是，這樣……"
10023020-269 = "那麼接下來……嗯。#n聽說還有能冷靜地掌握戰況，妥善指揮所有人的參謀存在……"
10023020-270 = "指的應該就是這位了吧？"
10023020-271 = "咦？那個……對。#n我是參謀……"
10023020-272 = "剩下就是……"
10023020-273 = "……"
10023020-274 = "……"
10023020-275 = "什，什麼！有話就快說吧！"
10023020-276 = "不，我失禮了。"
10023020-278 = "「小暴君」──那與傳聞相符的作風，我再次感受到了。"
10023020-279 = "那，那是什麼意思──！？"
10023020-281 = "[ns7]「既然是有如此規模的宅邸……」\n[ns8]「應該會有安全系統才對……為何要委託C&C……？」"
10023020-284 = "確實，宅邸的保全系統非常完善。"
10023020-285 = "然而，之所以還要委託C&C的各位……"
10023020-289 = "是因為收到了預告信──#n來自那名「慈愛的怪盜」……！"
10023020-294 = "……「慈愛的怪盜」？"

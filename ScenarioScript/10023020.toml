[translation]
10023020-1 = "ตอนที่ 2;เริ่มทำความสะอาดกันเถอะ"
10023020-2 = "(ถึงเวลาที่นัดไว้กับพวกโมโมอิแล้ว...)"
10023020-3 = "(ระหว่างที่คุณครูกำลังมองไปรอบๆ)"
10023020-4 = "ว่าไง คุณครู!"
10023020-5 = "[s] \"สวัสดี โมโม... อิ...?\""
10023020-6 = "แต่นแต๊น! นี่ชุดเมดเลยนะ! "
10023020-7 = "เป็นไงบ้าง? น่ารักใช่ไหมล่ะ?"
10023020-8 = "เหมาะกับฉันใช่มั้ย?"
10023020-9 = "เอาละ รู้สึกยังไงก็พูดมาได้เลย!"
10023020-10 = "[s1] \"อะ... อืม... ครูเกิดมาเพื่อสิ่งนี้แน่ๆ...\"\n[s2] \"ครูเกิดมาเพื่อเห็นโมโมอิในชุดเมดในวันนี้สินะ...\""
10023020-11 = "งะ... งั้นเหรอ? ฮิฮิ ต้องพูดชมกันขนาดนี้เลยเหรอ แอบเขินอยู่นะ"
10023020-12 = "งะ... งั้นเหรอ? ฮิฮิ ต้องพูดชมกันขนาดนี้เลยเหรอ แอบเขินอยู่นะ"
10023020-13 = "แฮ่ก... แฮ่ก! อยู่ดีๆ จะวิ่งออกไปได้ยังไงล่ะพี่! ไหนเมื่อกี้ยังบ่นอยู่เลยว่าชุดน่าจะขยับตัวยากน่ะ...!"
10023020-14 = "ฮุฮุ~! ก็อยากรีบให้คุณครูเห็นไวๆ ไงล่ะ!"
10023020-15 = "สวัสดีค่ะคุณครู มาเร็วจังเลยนะคะ ขอโทษนะคะ พวกฉันต้องมาถึงก่อนแท้ๆ"
10023020-16 = "[s] \"เรื่องแค่นี้เอง จะว่าไป มิโดริน่ารักจัง เหมาะกับชุดเมดเลย\""
10023020-17 = "งะ... งั้นเหรอ... คะ? ขะ... ขอบคุณค่ะ แหะๆๆ..."
10023020-18 = "เอาละ ยูสึก็ออกมาด้วยสิ!"
10023020-19 = "อ๊ะ... อะ... อื้อ..."
10023020-20 = "เป็นยังไง... บ้างคะ คุณครู? อ่า... กระโปรงมันรุ่มร่ามมากไปไหมคะ...?"
10023020-21 = "[s] \"เหมาะกับยูสึมากเลย... สุดยอดเลยละ!\""
10023020-22 = "คะ... คุณครู?!"
10023020-23 = "อ่า... คะ... คือว่า...! อื้อ!"
10023020-28 = "ต่อไปก็อาริสึ! ใช่ไหม...?"
10023020-29 = "เอ๋? อาริสึ?"
10023020-30 = "อาริสึจัง? เป็นอะไรเหรอ?"
10023020-32 = "ชุดเมด... ชุดเมด... มันยังเร็วไปสำหรับอาริสึค่ะ!"
10023020-33 = "มันคือชุดของรุ่นพี่เนรุนะคะ! สำหรับอาริสึแล้ว มันยังมากเกินไปอยู่ดีค่ะ!"
10023020-35 = "เฮ้อ... อุตส่าห์เกลี้ยกล่อมให้ออกมาได้แล้วเชียว..."
10023020-36 = "โรคกลัวชุดเมดของอาริสึจัง... ยังไม่หายสักทีสินะ"
10023020-37 = "[s] \"โรคกลัวชุดเมดเหรอ?\""
10023020-38 = "ค่ะ... คือว่า... อาริสึจังยังกลัวชุดเมดอยู่เลยค่ะ..."
10023020-39 = "ถึงจะสนิทกับรุ่นพี่เนรุมากขึ้นแล้ว แต่อะไรที่กลัวก็คงจะกลัวเหมือนเดิมน่ะค่ะ"
10023020-40 = "มะ... ไม่ได้นะ! อาริสึ! ผู้กล้าจะกลัวชุดเมดได้ยังไงล่ะ!"
10023020-42 = "แต่ว่าอาริสึ..."
10023020-43 = "[s3] \"อื้ม อาริสึ การเผชิญหน้ากับความกลัวคืองานของผู้กล้านะ\"\n[s4] \"ผู้กล้าจะไม่ล้มเลิกนะ ต้องทำเควสแล้วออกผจญภัยสิ!\""
10023020-44 = "อ่า... มันก็จริงอยู่ค่ะ ตะ... แต่ว่า..."
10023020-45 = "อ่า... มันก็จริงอยู่ค่ะ ตะ... แต่ว่า..."
10023020-46 = "... เข้าใจแล้วค่ะ อาริสึคือผู้กล้าค่ะ ใช่ค่ะ... อาริสึจะเป็นผู้กล้าค่ะ"
10023020-47 = "อาริสึจะไปด้วยค่ะ!"
10023020-50 = "งื้อ..."
10023020-51 = "แค่ได้ใส่ชุดเมดก็รู้สึกวูบวาบไปทั้งตัวแล้วค่ะ...!"

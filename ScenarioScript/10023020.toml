10023020-128 = "คะ... คุณคือ... ผู้ว่าจ้างใช่ไหมคะ...?"
10023020-133 = "[ns5] \"ได้ยินว่าเป็นงานทำความสะอาด...\"\n[ns6] \"จะให้ไปทำความสะอาดตรงไหนดีล่ะ?\""
10023020-134 = "อ้อ จะเข้าเรื่องภารกิจเลยสินะครับ ได้ครับ"
10023020-135 = "อ้อ จะเข้าเรื่องภารกิจเลยสินะครับ ได้ครับ"
10023020-136 = "ผมเป็นผู้รับผิดชอบในการดูแล การจัดเก็บและการหมุนเวียนผลงานศิลปะ รวมถึงการจัดประมูลผลงาน#nศิลปะครับ"
10023020-137 = "แต่ในการประมูลครั้งนี้ จะมีผลงานที่ล้ำค่ามากๆ มาวางขายด้วย... ผมเลยอยากให้มาช่วยเฝ้าและรักษา#nความปลอดภัยให้ผลงานพวกนั้นครับ"
10023020-138 = "ดะ... เดี๋ยวก่อน! ก็ไหนบอกว่าเป็นงานทำความสะอาดไง...?!"
10023020-139 = "ใช่ครับ สำหรับภารกิจของ C&C แล้ว 'การทำความสะอาด' ไม่ได้แปลว่างานของเจ้าหน้าที่ลับหรอก#nเหรอครับ?"
10023020-140 = "(ปะ... เป็นงี้หรอกเหรอ?!)"
10023020-141 = "(มาถามฉันแล้วฉันจะรู้เหรอพี่โมโมอิ!)"
10023020-142 = "(ทะ... ทำยังไงดีล่ะ...? ทำไงดี ทำไงดี ทำไงดี ทำไงดี...!)"
10023020-143 = "(ใจเย็นๆ ก่อน! แล้วก็... ต้องผ่านจุดนี้ไปให้ได้!)"
10023020-144 = "ค่า ค่ะ... ถูกต้องแล้วค่ะ!"
10023020-145 = "[s] \"ถ้าเป็นงานแบบนั้น อย่างน้อยก็น่าจะบอกกันให้ชัดๆ หน่อยสิ...\""
10023020-147 = "เรื่องนั้นต้องขอโทษด้วยครับ แต่ว่า C&C ทุกคนคือเจ้าหน้าที่ลับ"
10023020-148 = "ผมเลยคิดว่าคงจะไม่สะดวกหากจะเปิดเผยรายละเอียดของภารกิจในที่สาธารณะน่ะครับ"
10023020-149 = "ยังไงก็... ผมมองว่าการที่เราได้มาเจอกันแบบนี้ถือเป็นโชคชะตาที่เรามีต่อกัน"
10023020-150 = "ผมอยากจะเห็นความสามารถของ C&C ทุกคนด้วยสายตาของตัวเองแล้วน่ะสิครับ"
10023020-153 = "!!!"
10023020-155 = "ผมได้ยินมาว่า C&C ทุกคนต่างเป็นผู้เชี่ยวชาญในสาขาของตน และมีความสามารถในสาขาของตนใน#nขนาดที่ไม่มีใครเทียบชั้นได้เลยครับ"
10023020-156 = "แน่นอนว่าผมไม่ได้ขอให้โชว์ศักยภาพให้เห็นทั้งหมดหรอกนะครับ เพราะตอนที่ทุกคนจะได้แสดง#nความสามารถที่แท้จริงออกมา... ก็คือตอนที่อยู่ใน 'สถานที่ทำความสะอาด' ครับ"
10023020-157 = "แต่ผมว่าคงไม่เป็นการเสียมารยาท ถ้าจะให้สาธิตความสามารถบางส่วนให้เห็นนะครับ"
10023020-158 = "(บอกไปตามตรงเถอะพี่โมโมอิ!)"
10023020-159 = "(ไม่ได้นะ! เดี๋ยวก็ได้โดนรุ่นพี่เนรุฆ่ากันพอดี! ตายไปแล้วอดเล่นเกมนะ!)"
10023020-160 = "(งั้นแปลว่าไม่ว่ายังไง พวกเราก็ต้องทำภารกิจนี้ให้ได้งั้นเหรอ...!?)"
10023020-161 = "(ชะ... ใช่... มาทำอะไรสักอย่างด้วยความสามารถของเรากันเถอะ!)"
10023020-165 = "เอาละ ให้ผมขอร้องกับใครก่อนดีครับ?"
10023020-171 = "อาริสึเข้าใจแล้วค่ะ! นี่คือกิจกรรมเปลี่ยนอาชีพสินะคะ! เปลี่ยนมาเป็น C&C สินะคะ!"

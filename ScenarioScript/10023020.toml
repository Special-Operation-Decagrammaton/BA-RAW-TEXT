10023020-215 = "ลำแสงทำลายล้าง!"
10023020-217 = "(ตู้มมมม!)"
10023020-219 = "โอ้ว...! หินที่อยู่ห่างออกไป 800 เมตรถูกยิงระเบิดซะกระจุยเลย...!"
10023020-220 = "จะว่าไป ว่ากันว่าใน C&C มีสไนเปอร์ที่ไม่ว่าเป้าหมายจะอยู่ไกลแค่ไหนก็สอยร่วงได้...!"
10023020-221 = "แต่ก็ได้ยินมาด้วยว่าสไนเปอร์ต้องปิดบังตัวเองไม่ใช่เหรอครับ...?"
10023020-222 = "มะ... ไม่เป็นไรหรอกค่ะ! ถ้ายิงเป้าหมายที่อยู่ไกลได้สำเร็จก็ถือว่าเป็นสไนเปอร์แล้วค่ะ!"

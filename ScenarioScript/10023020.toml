10023020-244 = "หืม?"
10023020-247 = "อะไรกัน นี่มันกล่องธรรมดาๆ นี่ครับ ก็คิดว่าเป็นอะไรเสียอีก"
10023020-262 = "อย่าขยับนะคะ..."
10023020-263 = "เหวอออ?!"
10023020-265 = "เฮือก ตกใจหมดเลย เยี่ยมไปเลยนะครับ มาอยู่ข้างหลังแบบไม่ให้ซุ่มให้เสียงได้ยังไงกัน"

10023020-235 = "(ใช่! ปกติยูสึจังซ่อนตัวเก่งไม่ใช่เหรอ! ถ้าลองเอาเรื่องนั้นมาใช้...)"
10023020-236 = "(ใช่ อย่างนั้นแหละ!)"

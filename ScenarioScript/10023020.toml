10023020-53 = "......"
10023020-54 = "อาริสึ... จะไม่เป็นไรใช่ไหมคะ?"
10023020-55 = "ถึงจะใส่ชุดเมด... อาริสึก็ยังเป็นอาริสึใช่ไหมคะ?"
10023020-58 = "แน่นอนสิ!"
10023020-62 = "ขอบคุณ... ค่ะ"
10023020-66 = "ไม่ว่าจะอยู่ในชุดไหน... อาริสึก็ยังคงเป็นอาริสึสินะคะ...!"
10023020-68 = "เห็นไหมล่ะ ฉันบอกแล้วว่าอาริสึทำได้!"
10023020-70 = "เยี่ยมเลย อาริสึจัง"

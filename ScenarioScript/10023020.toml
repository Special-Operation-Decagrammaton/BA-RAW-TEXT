10023020-225 = "ยังไงก็ขอบคุณนะครับ สงสัยจังเลยนะครับว่าคนอื่นอยู่ในตำแหน่งไหนกัน"
10023020-226 = "อย่างเช่น คนที่ยืนเงียบๆ อยู่ตรงนี้...?"

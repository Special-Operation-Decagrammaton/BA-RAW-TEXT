10023020-194 = "แงงง......!"
10023020-199 = "......!!!"
10023020-212 = "บทบาทของอาริสึในวันนี้คือ... นักแม่นปืนที่มีชื่อเสียง..."
10023020-213 = "จากนี้ไปอาริสึจะยิงก้อนหินที่อยู่ไกลๆ ตรงนั้นค่ะ!"

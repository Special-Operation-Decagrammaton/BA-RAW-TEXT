10023020-105 = "?"
10023020-109 = "[ns] \"ที่นี่... กว้างขวางกว่าที่คิดเยอะเลยแฮะ?\""
10023020-110 = "ละ... เลิกภารกิจตอนนี้ยังทันมั้ยนะ...?!"
10023020-111 = "... มาถึงที่นี่แล้ว จะพูดแบบนั้นได้ยังไงเล่า!"
10023020-118 = "เอ๋? ยูสึจัง? ยูสึจัง?!"
10023020-124 = "เชิญครับทุกคน กำลังรออยู่เลยครับ"
10023020-125 = "มาตามเวลานัดเลยนะครับ ไม่เร็วเกินไป แล้วก็ไม่ช้าเกินไปด้วย ขอบคุณมากครับ"

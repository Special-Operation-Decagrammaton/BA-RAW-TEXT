10023020-79 = "(ทุกคนมายืนล้อมรอบอาริสึและปรบมือให้)"
10023020-80 = "(เหมือนเรื่องราวจะจบลงได้ด้วยดี...)"
10023020-82 = "(แต่ว่า!)"
10023020-84 = "[ns] \"แต่จะว่าไป ทุกคนใช้รหัสประจำตัวดับเบิ้ลโอหมดเลยแฮะ?\""
10023020-85 = "อ้อ นี่เหรอ? ก็ชุดเมดที่คุณครูหามาให้... มีแต่ชุดของรุ่นพี่เนรุเท่านั้นค่ะที่พอดีตัว"
10023020-86 = "ตรงนี้มีโน้ตที่น่าจะเป็นลายมือของรุ่นพี่อาคาเนะด้วยนะคะ ในนี้เขียนไว้ว่า 'ชุดนี้เอาไว้เผื่อหัวหน้าใส่#nตอนโต' ค่ะ"
10023020-90 = "น่าจะเป็นชุดสำรองของรุ่นพี่เนรุที่ตัดเผื่อๆ ไว้ให้ไซซ์ใหญ่ขึ้น เผื่อว่าจะใส่ตอนตัวโตขึ้นนะคะ..."
10023020-91 = "ส่วนชุดของคนอื่นใส่ไม่ได้เลยค่ะ! โดยเฉพาะชุดของรุ่นพี่คาริน มันใหญ่มากจนพื้นที่เหลือเลยค่ะ!"
10023020-92 = "เอาละๆ ยังไงเราก็มารวมตัวกันครบแล้ว! แล้วคุณครูก็ช่วยยืนยันแล้วว่าพวกเราเหมาะกับชุดเมด!"
10023020-93 = "งั้นมาเริ่มการผจญภัยกันค่ะ!"

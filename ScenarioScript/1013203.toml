[translation]
1013203-1 = "Modeling, Again...?!"
1013203-2 = "Art School Principal's Office"
1013203-3 = "Y-You're here, Sensei."
1013203-4 = "[s] \"What's up, Tsukuyo?\""
1013203-5 = "Well..."
1013203-6 = "I-I was hired to model for an art school this time."
1013203-7 = "But I've never done this kind of modeling work before... It's so close-up."
1013203-8 = "So I thought that if you were here, I might be able to relax a little bit..."
1013203-12 = "W-Wait, have I overstepped? Am I burdening you with my personal issues?"
1013203-13 = "I-I'm so sorry...!"
1013203-14 = "[s] \"I-It's all right, Tsukuyo...!\""
1013203-16 = "[ns] \"But you're modeling again...?!\""
1013203-17 = "T-To tell you the truth..."
1013203-18 = "Do you remember the manager who gave me the promotional pamphlet for \"A Ninja has Seven Lives\"?"
1013203-23 = "He practically begged me to help him with just one more job..."
1013203-24 = "Apparently the model they had booked for this gig...ran away on an adventure, or something."
1013203-25 = "And he was having a lot of trouble finding another model under such short notice..."
1013203-26 = "It's pretty simple, right? All I need to do is just stay perfectly still, so..."
1013203-27 = "[s1] \"I see...!\"\n[s2] \"I thought you were considering becoming an artist! Which is good, too.\""
1013203-30 = "O-Of course not!"
1013203-31 = "My only aspiration is to become a proper ninja!"
1013203-32 = "What? Oh, why am I wearing a dress today?"
1013203-33 = "Well, the subject for the students is \"woman in a dress.\" ...I'm trying to fulfill the assignment."
1013203-34 = "S-So I wore one in advance."
1013203-39 = "Miss Tsukuyo? Could you please enter the classroom?"
1013203-43 = "R-Right away!"
1013203-44 = "I-I'll be right back, Sensei!"
1013203-46 = "Art School Classroom"
1013203-50 = "Ah, you must be the replacement model, Miss Ono Tsukuyo."
1013203-51 = "Oh, yes! Yes, I am."
1013203-52 = "Since this is your first time here, let's go over what you'll be doing..."
1013203-53 = "The class you'll be modeling for is a preparatory class for Wildhunt Art Academy."
1013203-54 = "More specifically, the students will be sketching you."
1013203-55 = "I'll help you with the exact posing, so all you need to do is hold still."
1013203-57 = "U-Understood!"
1013203-58 = "I-It's my first time doing this, but I'll try my best!"
1013203-59 = "Haha, there's no need to be too anxious. Nothing to worry about."
1013203-64 = "(...Anything to comfort her, even if I don't believe it. It won't be easy. No one's NATURALLY a good art model.)"
1013203-65 = "(If anything, staying perfectly still is harder than walking on a runway or rapidly switching between poses for a shoot.)"
1013203-68 = "(She's completely defied my expectations!)"
1013203-69 = "(She hasn't moved an inch in over an hour!)"
1013203-75 = "Um, the model is a real person, right?"
1013203-76 = "Oh! I thought she was a mannequin."
1013203-77 = "Do you seriously not know? She's the model that's been making a splash lately! What, you've never read a magazine?"
1013203-78 = "Hey, you're right!"
1013203-82 = "(Huh...)"
1013203-83 = "(I was so worried, but this is so much easier than being a fashion model...)"
1013203-84 = "(I'm more experienced in standing still than most people, I suppose...)"
1013203-85 = "(Heehee. I suppose all that ninja camouflage training has paid off!)"
1013203-86 = "(She's a genius...! Absolutely brilliant!)"
1013203-87 = "(In my 10 years as an instructor, I've never seen such an exemplary art model...!)"
1013203-88 = "(She would be perfect even on a pedestal in a museum, just like this...!)"
1013203-89 = "(Even her expression is so peaceful...!)"
1013203-90 = "(Where did such talent come from?! How did she cultivate such skill?)"
1013203-92 = "The students finished their sketches and the class ended."
1013203-95 = "Thank you so much for the hard work!"
1013203-96 = "Heehee, oh it wasn't that difficult..."
1013203-97 = "I must say, you took to this task like a duck takes to water."
1013203-98 = "You've really never been an art model before?"
1013203-99 = "Huh? Oh, um, no, this was my first time..."
1013203-100 = "(So she was a natural talent...! A prodigy!)"
1013203-101 = "Then, if you'll excuse me..."
1013203-102 = "Wait!"
1013203-103 = "If it's all right with you, could you model for one more class?"
1013203-104 = "Excuse me...?"
1013203-105 = "It's just that the sculpting class needs a model too...!"
1013203-107 = "We'll pay you double! Think of the overtime!"
1013203-108 = "W-Well..."
1013203-109 = "Honestly, Miss Tsukuyo, I've never seen a model stay as still as you did."
1013203-110 = "We must share your talents with more students."
1013203-111 = "I'm sure it'll help cultivate their artistic development! You'll help them unleash their potential!"
1013203-112 = "Please!"
1013203-113 = "Well, um..."
1013203-117 = "Th-Then, I suppose I'll do it..."
1013203-120 = "And so, Tsukuyo served as the model for the sculpting class as well."
1013203-121 = "She, of course, delivered another perfect performance."
1013203-122 = "And then, a few hours later..."
1013203-125 = "Thank you for all your hard work today, Miss Tsukuyo."
1013203-126 = "Th-Thank you for your help as well! You gave great instructions!"
1013203-131 = "Sorry, Sensei! W-Were you waiting long...?"
1013203-132 = "[s] \"Not at all. I enjoyed watching the students work.\""
1013203-133 = "Y-You really are too kind. I appreciate your understanding."
1013203-134 = "Honestly, I felt so much more at ease because I had you here."
1013203-135 = "What? How did I like the sculpture class?"
1013203-136 = "Hm, I suppose it was pretty similar to the figure drawing class where they sketched me..."
1013203-137 = "Aside from all the dust and dried clay in the air... But, that's the nature of sculpting, isn't it?"
1013203-138 = "Actually, I may need to clear my throat..."
1013203-139 = "[s3] \"Looks like you had your fill of dust and dry clay.\"\n[s4] \"So let's get some real food.\""
1013203-144 = "U-Um..."
1013203-145 = "Th-Then this time I should—"
1013203-146 = "[s] \"Don't worry about it. I already made the reservation!\""
1013203-147 = "R-Really...?"
1013203-148 = "Th-Thank you, Sensei!"
1013203-150 = "I took Tsukuyo to the place I had booked."
1013203-151 = "It was a Hyakkiyako restaurant with an extensive and very healthful vegetarian menu."
1013203-155 = "Let's just say that I had a feeling Tsukuyo would be modeling again."

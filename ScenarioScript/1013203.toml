[translation]
1013203-1 = "ได้เป็นนางแบบอีกครั้ง... อีกแล้วเหรอคะ?"
1013203-2 = "ห้องผู้อำนวยการ สถาบันศิลปะ"
1013203-3 = "มะ... มาแล้วเหรอคะ คุณครู?"
1013203-4 = "[s] \"มีเรื่องอะไรเหรอ สึคุโยะ?\""
1013203-5 = "คือว่า..."
1013203-6 = "คะ... ครั้งนี้ฉันได้รับการติดต่อให้ไปเป็นแบบวาดรูปที่สถาบันศิลปะค่ะ"
1013203-7 = "แต่ว่าฉันไม่เคยทำงานเป็นนางแบบงานศิลปะมาก่อน..."
1013203-8 = "ก็เลยคิดว่าถ้ามีคุณครูไปด้วย ก็อาจจะประหม่าน้อยลงก็ได้..."
1013203-12 = "ดะ... เดี๋ยวก่อนนะคะ นี่ฉันทำให้คุณครูพลอยเดือดร้อนไปด้วยหรือเปล่านะ?!"
1013203-13 = "ขะ... ขอโทษด้วยค่ะ...!"
1013203-14 = "[s] \"มะ... ไม่เป็นไร สึคุโยะ...!\""
1013203-16 = "[ns] \"ว่าแต่ทำไมถึงกลับเข้าวงการนางแบบอีกครั้งล่ะ...?!\""
1013203-17 = "คะ... คือว่าที่จริงแล้ว..."
1013203-18 = "คุณครูจำผู้จัดงานแฟชั่นโชว์ที่หาแผ่นพับ <นินจา 7 ชีวิต> ให้ฉันเมื่อคราวก่อนได้มั้ยคะ?"
1013203-23 = "เขามาขอร้องอ้อนวอนให้ฉันไปช่วยงานนี้อีกสักครั้งน่ะค่ะ..."
1013203-24 = "นางแบบคนที่รับงานนี้ไว้น่าจะเทงานกลางคันค่ะ..."
1013203-25 = "แต่ทางนั้นก็บอกว่าการหานางแบบคนใหม่ให้ทันน่าจะไม่ใช่เรื่องง่ายๆ เลย..."
1013203-26 = "แล้วคนที่จะเป็นนางแบบงานศิลปะยังต้องอยู่นิ่งๆ ให้ได้นานๆ ด้วย..."
1013203-27 = "[s1] \"อย่างนี้นี่เอง ได้เป็นนางแบบงานศิลปะแล้วสินะ!\"\n[s2] \"ดีเลยนะ ต่อไปจะเอาดีทางด้านศิลปะเลยหรือเปล่า?\""
1013203-30 = "มะ... ไม่หรอกค่ะ!"
1013203-31 = "ต่อไปสึคุโยะคนนี้จะเป็นนินจาที่องอาจค่ะ!"
1013203-32 = "คะ? แต่ทำไมฉันถึงใส่ชุดเดรสมาน่ะเหรอคะ?"
1013203-33 = "คือว่า... หัวข้อภาพที่นักเรียนต้องวาดในวันนี้ก็คือ 'หญิงสาวในชุดเดรส'"
1013203-34 = "ฉะ... ฉันก็เลยใส่ชุดนี้มาล่วงหน้าค่ะ"
1013203-39 = "คุณสึคุโยะ ช่วยเข้ามาในห้องเรียนได้เลยค่ะ"
1013203-43 = "ค่ะ... ค่ะ! ฉันจะไปเดี๋ยวนี้ละค่ะ!"
1013203-44 = "คะ... คุณครู! ฉันจะรีบกลับมานะคะ!"
1013203-46 = "ห้องเรียน สถาบันศิลปะ"
1013203-50 = "อ๊ะ คุณสึคุโยะที่มาเป็นนางแบบสำรองในวันนี้ใช่มั้ยครับ?"
1013203-51 = "ค่ะ ใช่ค่ะ!"
1013203-52 = "ในเมื่อเพิ่งเคยมาเป็นครั้งแรก งั้นเดี๋ยวผมจะอธิบายงานให้ฟังนะครับ..."
1013203-53 = "อย่างแรกเลย นักเรียนในชั้นนี้เป็นนักเรียนที่กำลังเตรียมตัวสอบเข้าสถาบันศิลปะไวลด์ฮันต์ครับ"
1013203-54 = "คุณสึคุโยะจะได้เป็นนางแบบในคลาสวาดภาพของนักเรียนเหล่านี้"
1013203-55 = "ส่วนเรื่องการโพสต์ท่า ไว้ผมจะเข้าไปอธิบายในคลาสอย่างละเอียด ตอนนั้นคุณสึคุโยะแค่อยู่นิ่งๆ ให้ก็พอครับ"
1013203-57 = "ขะ... เข้าใจแล้วค่ะ!"
1013203-58 = "ฉันจะทำให้เต็มที่เลยค่ะ!"
1013203-59 = "ฮ่าฮ่า ไม่ต้องกังวลมากเกินไปนะครับ"
1013203-64 = "(ถึงจะบอกไปอย่างนั้น แต่ครั้งแรกก็คงไม่ใช่งานง่ายเลยละ...)"
1013203-65 = "(ก็การอยู่นิ่งๆ เป็นเวลานานมันยากกว่าการขยับตามใจชอบนี่นา...)"
1013203-68 = "(คิดว่าจะทำไม่ได้เสียอีก...)"
1013203-69 = "(แต่ไม่ขยับเขยื้อนเลยมา 1 ชั่วโมงแล้วเหรอเนี่ย?!)"
1013203-75 = "นางแบบคนนั้นคือคนจริงๆ หรือเปล่าน่ะ?"
1013203-76 = "ไม่ใช่หุ่นขี้ผึ้งหรอกเหรอ?"
1013203-77 = "พวกเธอไม่รู้จักคนคนนั้นเหรอ? นางแบบแฟชั่นที่กำลังเป็นกระแสอยู่ตอนนี้ไง!"
1013203-78 = "อ๊ะ พอดูอีกทีก็ใช่จริงด้วย!"
1013203-82 = "(อ่า...)"
1013203-83 = "(อุตส่าห์กังวลว่าจะทำงานนี้ได้หรือเปล่า แต่เอาเข้าจริงๆ ก็ง่ายกว่างานนางแบบแฟชั่นอีกนะ...)"
1013203-84 = "(ก็การอยู่นิ่งๆ เป็นเรื่องที่ฉันมั่นใจกว่าใครเพื่อนนี่นา...)"
1013203-85 = "(แหะๆ นี่คงเป็นผลตอบแทนที่คุ้มค่าจากความพยายามในการปลอมตัวเป็นต้นไม้ของฉันสินะ)"
1013203-86 = "(อัจฉริยะตัวจริง...!)"
1013203-87 = "(สอนศิลปะมา 10 ปี เพิ่งเคยเห็นนางแบบวาดรูปที่ไร้ที่ติขนาดนี้เป็นครั้งแรกเลย...!)"
1013203-88 = "(ให้ไปยืนในพิพิธภัณฑ์หุ่นขี้ผึ้งก็น่าจะดูไม่ออกเลยว่าเป็นคนจริงๆ น่ะ...!)"
1013203-89 = "(นอกจากจะไม่ขยับตัวสักนิด ยังทำสีหน้าผ่อนคลายได้อย่างเหลือเชื่อ...!)"
1013203-90 = "(ทำไมฉันเพิ่งได้เจอคนที่มีพรสวรรค์แบบนี้เอาตอนนี้นะ?!)"
1013203-92 = "(แล้วเวลาก็ล่วงเลยไปจนจบคลาส)"
1013203-95 = "ทำได้ดีมากครับ! คงเหนื่อยน่าดูเลยนะครับ!"
1013203-96 = "แหะๆ ไม่เหนื่อยเลยค่ะ..."
1013203-97 = "จะว่าไป คุณสึคุโยะดูเชี่ยวชาญมากเลย"
1013203-98 = "เคยทำงานเป็นแบบนางวาดรูปมาก่อนงั้นเหรอครับ?"
1013203-99 = "คะ? อ่า คือ... ฉันเพิ่งลองทำครั้งนี้เป็นครั้งแรกค่ะ..."
1013203-100 = "(เกิดมาเพื่อเป็นนางแบบจริงด้วย...!)"
1013203-101 = "เอ่อ ถ้างั้นฉันต้องขอตัวก่อนค่ะ..."
1013203-102 = "เดี๋ยวก่อนครับ!"
1013203-103 = "ถ้าไม่ติดอะไรละก็ วันนี้ช่วยเป็นนางแบบต่อให้อีกสักคลาสได้มั้ยครับ?"
1013203-104 = "คะ...?"
1013203-105 = "คลาสประติมากรรมก็ต้องการนางแบบอยู่พอดีน่ะครับ...!"
1013203-107 = "ผมจะเพิ่มค่าจ้างรายชั่วโมงให้เป็น 2 เท่าเลยครับ!"
1013203-108 = "ระ... เรื่องนั้น..."
1013203-109 = "อันที่จริง นี่เป็นครั้งแรกเลยละที่ผมได้เห็นนางแบบที่อยู่นิ่งๆ ได้อย่างไร้ที่ติแบบคุณสึคุโยะ"
1013203-110 = "ถ้านักเรียนคนอื่นได้สร้างงานศิลปะจากนางแบบเก่งๆ อย่างคุณสึคุโยะละก็..."
1013203-111 = "ทักษะของนักเรียนเหล่านั้นต้องพัฒนาขึ้นได้อย่างไม่ต้องสงสัยเลยละครับ!"
1013203-112 = "ขอร้องละครับ!"
1013203-113 = "เอ่อ อึกก..."
1013203-117 = "ถะ... ถ้างั้นก็ขอฝากตัวอีกครั้งนะคะ..."
1013203-120 = "(แล้วสึคุโยะก็ได้เป็นนางแบบในคลาสประติมากรรมต่อ)"
1013203-121 = "(แน่นอนว่าสึคุโยะก็ทำหน้าที่ได้อย่างสมบูรณ์แบบในคลาสนั้น)"
1013203-122 = "(และไม่กี่ชั่วโมงต่อมา...)"
1013203-125 = "วันนี้ทำได้ดีมากเลยครับ คุณสึคุโยะ"
1013203-126 = "ตะ... ต้องขอบคุณผู้ฝึกสอนด้วยนะคะ!"
1013203-131 = "เอ่อ คะ... คุณครู! รอนานเลยใช่มั้ยคะ...?"
1013203-132 = "[s] \"ไม่หรอก ได้ดูนักเรียนทำงานศิลปะก็สนุกดีนะ\""
1013203-133 = "มะ... ไม่ต้องช่วยพูดถึงขนาดนั้นก็ได้...!"
1013203-134 = "แต่พอคุณครูมาอยู่ด้วย ฉันก็หายประหม่าและทำงานได้อย่างสบายใจขึ้นจริงๆ ค่ะ..."
1013203-135 = "คะ? คลาสประติมากรรมเป็นยังไงบ้างน่ะเหรอคะ?"
1013203-136 = "อืม ฉันว่าบรรยากาศก็ไม่ได้ต่างกับคลาสวาดภาพสักเท่าไร..."
1013203-137 = "แต่ประติมากรรมเป็นงานที่ต้องแกะสลักและขัดดินเหนียวอย่างต่อเนื่อง ก็เลยมีฝุ่นในอากาศเยอะเลยค่ะ..."
1013203-138 = "เพราะงั้นฉันก็เลยเจ็บคอ..."
1013203-139 = "[s3] \"งั้นไปหาอะไรกินแทนฝุ่นในอากาศดีกว่า...\"\n[s4] \"งั้นไปกินอะไรอร่อยๆ กันดีกว่า\""
1013203-144 = "อะ... เอ่อ..."
1013203-145 = "ถะ... ถ้างั้นครั้งนี้ฉันขอ..."
1013203-146 = "[s] \"ครูรู้ว่าจะเป็นแบบนี้ ก็เลยจองภัตตาคารไว้แล้วละ!\""
1013203-147 = "งะ... งั้นเหรอคะ...!"
1013203-148 = "ขะ... ขอบคุณค่ะ คุณครู!"
1013203-150 = "(และที่ที่คุณครูพาสึคุโยะไปก็คือ...)"
1013203-151 = "(ภัตตาคารอาหารเพื่อสุขภาพที่อยู่ในเฮียกคิยาโค)"
1013203-155 = "(นั่นเป็นเพราะคุณครูรู้สึกว่าสึคุโยะคงไม่เลิกทำงานนางแบบแค่วันนี้แน่นอน...)"

[translation]
1013203-1 = "又是，模特兒……？"
1013203-2 = "美術教室的院長室"
1013203-3 = "您，您來啦，老師？"
1013203-4 = "[s]「怎麼了嗎，月夜？」"
1013203-5 = "那個……"
1013203-6 = "我，我這次被找去，擔任美術教室的繪畫模特兒。"
1013203-7 = "不過，因為這是我第一次當美術模特兒……"
1013203-8 = "想說如果有老師陪著的話，心情應該能放鬆一點……"
1013203-12 = "等，等一下……#n我這樣是不是……因為自己的私事給老師添麻煩了！？"
1013203-13 = "對，對不起……！"
1013203-14 = "[s]「沒、沒關係的，月夜……！」"
1013203-16 = "[ns]「話說，你怎麼又當起模特兒了……！？」"
1013203-17 = "那，那是因為……"
1013203-18 = "老師還記得，上次幫我弄到《七命怪忍》手冊的那位社長嗎？"
1013203-23 = "他非常誠懇地拜託我，說只要再幫他這一次就好……"
1013203-24 = "聽說……原本今天要做這份工作的模特兒落跑了……"
1013203-25 = "一時之間要找新模特兒實在很困難……"
1013203-26 = "加上美術模特兒，好像只要靜靜待著不動就好……"
1013203-27 = "[s1]「原來如此啊……！」\n[s2]「我還以為你要轉行當畫家了呢。當然那樣也不錯啦。」"
1013203-30 = "怎，怎麼會呢！"
1013203-31 = "月夜以後要成為一名優秀的忍者！"
1013203-32 = "咦？問我為什麼要穿著禮服過來？"
1013203-33 = "啊，因為，今天這裡的學生要畫的主題是「穿著禮服的女性」。"
1013203-34 = "所，所以就直接穿過來了。"
1013203-39 = "月夜同學，現在可以進教室了嗎？"
1013203-43 = "好，好的！我馬上過去！"
1013203-44 = "老，老師！我先走囉！"
1013203-46 = "美術教室"
1013203-50 = "啊，你就是今天來當代班模特兒的大野月夜同學對吧？"
1013203-51 = "啊，是的！"
1013203-52 = "因為你是第一次來，我先跟你說明一下……"
1013203-53 = "首先，月夜同學待會要進去的班級，是準備要升學到狂獵藝術學院的準備班。"
1013203-54 = "你會在那裡的素描課擔任模特兒。"
1013203-55 = "姿勢的部分我會在現場詳細指導，你只要保持不動就可以了。"
1013203-57 = "我，我知道了！"
1013203-58 = "雖，雖然沒有經驗，不過我會努力的！"
1013203-59 = "哈哈，沒必要給自己太大的壓力哦。"
1013203-64 = "（……話雖如此，第一次想必還是很辛苦吧）"
1013203-65 = "（畢竟要長時間保持不動，其實比隨意活動身體要難上許多……）"
1013203-68 = "（……我本來是這麼認為的）"
1013203-69 = "（沒想到都過去1個小時了，他竟然還是一動也不動！？）"
1013203-75 = "那位模特兒……是真人對吧？"
1013203-76 = "不是蠟像嗎？"
1013203-77 = "你們不知道他是誰嗎？#n他是最近備受矚目的新人時裝模特兒耶！"
1013203-78 = "啊，仔細一看真的是他耶！"
1013203-82 = "（唔……）"
1013203-83 = "（我本來還有點擔心，不過這份工作比當時裝模特兒輕鬆多了……）"
1013203-84 = "（畢竟要說靜止不動這件事的話，我可是比任何人都有自信……）"
1013203-85 = "（耶嘿嘿，沒想到平時努力修煉樹木變裝術的成果，會在這種地方派上用場）"
1013203-86 = "（簡直是天才……！）"
1013203-87 = "（擔任講師10年以來，我還是第一次見到如此完美的美術模特兒……！）"
1013203-88 = "（就算直接搬進蠟像館展示也毫無違和感……！）"
1013203-89 = "（甚至連表情都如此放鬆自然……！）"
1013203-90 = "（這樣的人才，究竟是從哪裡冒出來的！？）"
1013203-92 = "（於是隨著時間過去，素描課也結束了）"
1013203-95 = "辛苦了！真的辛苦了！"
1013203-96 = "嘿嘿，其，其實也還好啦……"
1013203-97 = "話說回來，你表現得非常熟練呢。"
1013203-98 = "以前真的沒有擔任過美術模特兒嗎？"
1013203-99 = "咦？啊，那個，今天是第一次……"
1013203-100 = "（果然是位天生的奇才啊……！）"
1013203-101 = "那我就先告辭了……"
1013203-102 = "請留步！"
1013203-103 = "如果可以的話，今天能不能麻煩你再當一次模特兒呢？"
1013203-104 = "咦……？"
1013203-105 = "其實雕塑班剛好也需要模特兒……！"
1013203-107 = "我會付你雙倍時薪的！"
1013203-108 = "那，那個……"
1013203-109 = "老實說，我從來沒見過能像月夜同學一樣，把姿勢保持得這麼完美的模特兒。"
1013203-110 = "所以如果其他學生的課程，也能請月夜同學擔任模特兒的話……"
1013203-111 = "對於提升孩子們的實力，一定會有莫大的幫助！"
1013203-112 = "萬事拜託了！"
1013203-113 = "咦，嗚嗚……"
1013203-117 = "那，那就再次請你多多指教了……"
1013203-120 = "（於是月夜就這樣一併擔任了雕塑課的模特兒）"
1013203-121 = "（在那堂課的表現自然也同樣完美）"
1013203-122 = "（幾小時後……）"
1013203-125 = "今天真的辛苦你了，月夜同學。"
1013203-126 = "講，講師也辛苦了！"
1013203-131 = "那個，老，老師！讓您久等了吧……？"
1013203-132 = "[s]「不會。看著學生們創作也挺有趣的。」"
1013203-133 = "老，老師沒必要這麼顧慮我的……！"
1013203-134 = "都是因為有老師陪在我身邊，我才能放鬆下來……"
1013203-135 = "咦？雕塑班的感覺怎麼樣……？"
1013203-136 = "唔嗯，我覺得氣氛跟素描班差不多……"
1013203-137 = "不過因為雕塑需要不斷削切、揉捏黏土的關係，空氣中飄散著很多粉塵……"
1013203-138 = "所以喉嚨有點……"
1013203-139 = "[s3]「既然粉塵吃得夠多了……」\n[s4]「現在就去吃點真正美味的東西吧。」"
1013203-144 = "那，那麼……"
1013203-145 = "這，這一次就由我……"
1013203-146 = "[s]「我就知道你會這麼說，所以已經提前預約好餐廳了！」"
1013203-147 = "咦，咦咦……！"
1013203-148 = "謝，謝謝老師！"
1013203-150 = "（後來帶月夜去的地方……）"
1013203-151 = "（是位於百鬼夜行的，一間蔬食餐點非常豐富的餐廳）"
1013203-155 = "（……因為莫名有種月夜的模特兒生涯，似乎不會就此結束的預感）"

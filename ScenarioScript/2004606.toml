[translation]
2004606-1 = "少女擲下了骰子"
2004606-2 = "（前往陰陽部部室途中的街道比之前乾淨許多）"
2004606-3 = "（除了乾淨以外，給人的印象甚至比祭典前還華麗繽紛了不少）"
2004606-7 = "[ns] 「這是……紙藝？」"
2004606-8 = "喂～這邊安裝完成囉～這樣擺就可以了吧？"
2004606-10 = "嗯，嗯！不過真的沒問題嗎？"
2004606-11 = "把我們的展示品放在行人經過的街道上……會不會造成困擾啊……"
2004606-12 = "不會不會，當然沒問題！#n我們本來還在煩惱該怎麼修復被破壞的街道呢。"
2004606-13 = "從今天起，這條街將以「摺紙街」的名號重新出發！#n如果能打響名號的話，說不定還能舉辦摺紙慶典呢！"
2004606-14 = "摺紙慶典……呵呵，這還是我們第一次被這麼認可呢。"
2004606-18 = "抱歉打擾一下，關於我們的報酬……"
2004606-19 = "啊，當然會支付。#n上次祭典的報酬跟這次街道美化的部分都會一起計算。"
2004606-20 = "話說回來，之前我們的人真是失禮了。#n本來以為是妖怪劇團過來找碴……沒想到已經成為正式的社團了啊。"
2004606-21 = "畢竟不久前還是妖怪劇團，這麼說其實也沒錯啦。"
2004606-22 = "當然現在已經是臨演部了哦！#n謝謝你們商會在上次祭典證明我們的活躍！"
2004606-23 = "畢竟是我們虧欠你們，這種證言小事一樁啦～"
2004606-24 = "下次演出也再麻煩你們啦～"
2004606-25 = "當然沒問題！"
2004606-27 = "（穿過氣氛融洽的街道……）"
2004606-29 = "你們真的願意跟我們交換部室嗎？"
2004606-30 = "這裡這麼偏僻，還有鬧鬼的傳聞……"
2004606-31 = "我們可是連小孩都能嚇哭的妖怪劇團，怎麼可能會怕鬼呢！#n啊，現在好像已經不是妖怪劇團了？總之沒關係啦！"
2004606-32 = "與其每次練習的時候都被投訴太吵，我們更喜歡能盡情喧鬧的據點！"
2004606-34 = "（經過偏僻的摺紙部部室……）"
2004606-36 = "原來發生了這些事啊～"
2004606-37 = "那不是挺好的嗎？一切都圓滿解決了～"
2004606-38 = "[s] 「這都是你安排的吧，仁耶？」"
2004606-39 = "怎麼會呢～#n之前也說過，我可沒有預知未來的能力唷～"
2004606-40 = "況且在一旁看著的老師，應該也清楚我什麼都沒做才對。"
2004606-41 = "要說為何一切能順利解決的話～嗯，應該是偶然吧。"
2004606-42 = "在適當的時間、適當的地點湊齊了所有要素，所以事情自然就解決了。"
2004606-43 = "這就是所謂的陰陽調和吧，喵哈哈～"
2004606-44 = "……嗯～老師的表情好像還是不太相信呢？"
2004606-48 = "那麼我再請教您一次之前問過的問題吧。#n老師覺得百鬼夜行是個怎麼樣的地方呢？"
2004606-49 = "[s1] 「是個很美的地方。」\n[s2] 「雖然並不是一直都很和平。」"
2004606-52 = "沒錯沒錯～百鬼夜行很有魅力對吧～"
2004606-53 = "四季都有美麗的自然風光，熱鬧的慶典接連不斷，學生們都專注於自己喜歡的事……"
2004606-54 = "這樣美好的學園之所以能存在……"
2004606-55 = "果然是因為運氣好吧，喵哈哈～！"
2004606-56 = "就像這次一樣，在種種偶然的巧妙堆疊下，我們的學園才得以維持。"
2004606-57 = "……唔嗯～這個答案老師還是不滿意嗎？"
2004606-58 = "那不如這樣吧？#n如果一定要把功勞歸給誰……"
2004606-59 = "就歸功於那些默默盡責、在背後努力的所有人吧～♪"
2004606-60 = "[ns] 「……」"
2004606-61 = "……這樣的結尾不行嗎？"
2004606-62 = "喵哈哈……#n不過～話又說回來～"
2004606-63 = "這次的騷動都已經解決，大家似乎也各自獲得了幸福～"
2004606-64 = "今天的說教……能不能考慮取消一下呢～"
2004606-65 = "[ns] 「仁耶。」"
2004606-68 = "喵哈……？"
2004606-69 = "[ns] 「今天要摸頭。」"
2004606-70 = "喵哈！？"
2004606-78 = "（之後狠狠地摸了個過癮）"

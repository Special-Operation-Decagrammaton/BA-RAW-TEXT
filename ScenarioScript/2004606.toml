2004606-51 = "#wait;10"
2004606-52 = "3;니야;03;그렇죠, 그렇죠~ 백귀야행은 멋스럽죠~\n#3;em;[반응]"
2004606-53 = "3;니야;01;사시사철 아름다운 자연과 함께, 즐거운 축제는 연일 계속되고, 학생은 자신들이 하고 싶은 일에 전념하는 그런 학원……."
2004606-54 = "3;니야;07;이런 멋진 학원이 존재할 수 있는 건…….\n#3;em;[...]"
2004606-55 = "3;니야;03;역시 운이 좋기 때문이겠죠, 냐하핫~!"
2004606-56 = "3;니야;01;이번 일처럼 절묘한 우연이 쌓이고 쌓여, 우리 학원은 유지되고 있답니다~"
2004606-57 = "3;니야;06;……흐음~ 이것도 원하는 대답은 아니신가요?\n#3;em;[한숨]"
2004606-58 = "3;니야;02;그러면 이렇게 할까요? 꼭 누군가에게 공로를 돌려야 한다면……."
2004606-59 = "3;니야;01;보이지 않는 곳에서 묵묵히 자기 일을 다한 모두의 공로라는 걸로~♪\n#3;em;[음표]"

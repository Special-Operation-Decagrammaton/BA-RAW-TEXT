[translation]
2004606-1 = "#title;소녀는 주사위를 던진다"
2004606-2 = "#na;(음양부실로 향하는 길, 거리는 전보다 훨씬 깨끗해져 있었다)"
2004606-3 = "#na;(단지 깨끗해진 정도가 아니라, 축제 전보다 화려하고 알록달록해 예쁜 인상을 준다.)"
2004606-4 = "#st;[0,0];instant;1;"
2004606-5 = "#clearST"
2004606-6 = "#wait;1500"
2004606-7 = "[ns] \"이건…… 종이 공예?\""
2004606-8 = "#na;엑스트라부 부원 A;어이~ 이쪽 설치 다 끝났어~ 이렇게 두면 되는 거지?"
2004606-9 = "3;종이접기부 부원 A;01"
2004606-10 = "3;종이접기부 부원 A;04;네, 네! 근데 정말 괜찮나요?\n#3;em;[?]"
2004606-11 = "3;종이접기부 부원 A;02;사람들이 다니는 거리에 저희 전시물을 둬도 된다니…… 괜히 걸리적거리거나 방해되는 건……."
2004606-12 = "1;지역상인회장;01;아니, 아니, 괜찮다마다요! 안 그래도 망가진 거리를 어떻게 복구하나 막막했는데.\n#3;m4\n#1;ar\n#1;em;[!]\n#1;jump"
2004606-13 = "1;지역상인회장;01;오늘부터 이 거리는 종이접기 거리로 재탄생할 겁니다! 입소문을 타서 유명해진다면 종이접기 축제도 열 수 있겠죠!"
2004606-14 = "3;종이접기부 부원 A;03;종이접기 축제라니…… 헤헤, 이렇게 인정받는 건 처음이에요.\n#3;em;[///]"
2004606-15 = "#st;[0,0];instant;1;"
2004606-16 = "#clearST"
2004606-17 = "1;지역상인회장;01\n3;종이접기부 부원 A;03\n#1;h\n#3;h\n#1;d\n#3;d\n#wait;1000"
2004606-18 = "3;엑스트라부 부원 A;01;이야기 중에 미안한데, 우리 보수는…….\n#3;em;[...]\n#3;a"
2004606-19 = "3;지역상인회장;01;아, 물론 지급하지요. 저번 축제에 이어, 이번 거리 미화까지 한꺼번에 말이죠."
2004606-20 = "3;지역상인회장;01;그나저나, 우리 애들이 실례가 많았습니다. 망량즈가 트집 잡으러 온 줄만 알았다고…… 설마 정식 동아리일 줄은.\n#3;em;[한숨]"
2004606-21 = "3;엑스트라부 부원 A;01;얼마 전까지 망량즈였으니까 틀린 말은 아니긴 하지."
2004606-22 = "3;엑스트라부 부원 A;01;물론! 이제는 엑스트라 동아리지만 말이야! 상인회에서 저번 축제 때 활약을 증언해 준 덕이지!\n#3;em;[재잘]\n#3;hophop"
2004606-23 = "3;지역상인회장;01;대금을 밀렸는데, 그깟 증언 정도야 얼마든지 하지요~"
2004606-24 = "3;지역상인회장;01;다음 공연도 모쪼록 잘 부탁합니다~\n#3;em;[음표]"
2004606-25 = "3;엑스트라부 부원 A;01;물론이지!"
2004606-26 = "#all;hide"
2004606-27 = "#na;(화기애애한 거리를 지나서…….)"
2004606-28 = "#all;hide"
2004606-29 = "3;종이접기부 부원 B;04;저, 정말 우리랑 부실을 바꿔도 괜찮아?\n#3;em;[?]\n#3;a"
2004606-30 = "3;종이접기부 부원 B;02;이렇게 외진 데다가 귀신이 나온다는 소문까지 있는데……."
2004606-31 = "4;엑스트라부 부원 B;02;우는 아이도 그치는 우리 망량즈가 귀신 같은 걸 무서워할 리가 없잖아! 아, 이제는 망량즈가 아닌가? 아무튼!\n#3;m2\n#4;a\n#4;em;[!]"
2004606-32 = "4;엑스트라부 부원 B;03;우리도 연습할 때마다 시끄럽다고 민원이 들어오는 곳보다, 떠들썩하게 지낼 수 있는 아지트가 좋아!"
2004606-33 = "#all;hide"
2004606-34 = "#na;(외진 종이접기 동아리의 부실을 지나서…….)"
2004606-35 = "#all;hide"
2004606-36 = "3;니야;01;그런 일들이 있었군요~\n#3;a\n#3;em;[반응]"
2004606-37 = "3;니야;02;잘된 일 아닌가요? 전부 원만하게 해결되었으니~"
2004606-38 = "[s] \"니야가 꾸민 일이지?\""
2004606-39 = "3;니야;03;설마요~ 저번에도 말했지만, 제게 미래를 보는 능력이 있는 것도 아닌데요~\n#3;em;[재잘]"
2004606-40 = "3;니야;01;무엇보다 선생님께서 옆에서 보셨듯이, 말 그대로 저는 아무것도 하지 않았답니다."
2004606-41 = "3;니야;07;모든 일이 좋게 해결된 이유라면~ 그렇네요, 우연이겠죠."
2004606-42 = "3;니야;01;우연히 적재적소에, 시의적절하게 요소들이 갖춰져서 만사가 저절로 해결되었을 뿐.\n#3;greeting"
2004606-43 = "3;니야;03;이런 게 바로 음양의 조화라 할까요, 냐하하~\n#3;em;[음표]"
2004606-44 = "3;니야;01;……음~ 뭔가 석연치 못한 표정이시네요?"

[translation]
2004606-1 = "เด็กสาวขว้างลูกเต๋า"
2004606-2 = "(ระหว่างเดินทางไปยังห้องชมรมหยินหยาง คุณครูก็สังเกตเห็นว่าถนนดูสะอาดสะอ้านกว่าเดิมมาก)"
2004606-3 = "(ไม่เพียงแต่สะอาดขึ้นเท่านั้น แต่ยังมีสีสันและสวยงามยิ่งกว่าตอนก่อนจัดงานเทศกาลด้วยซ้ำ)"
2004606-7 = "[ns] \"นี่มัน... งานฝีมือกระดาษนี่นา?\""
2004606-8 = "นี่~ ฉันวางผลงานตรงนี้เรียบร้อยแล้ว~ เอาไว้แบบนี้ได้ใช่มั้ย?"
2004606-10 = "ค่ะ ค่ะ! ว่าแต่จะไม่เป็นไรจริงๆ เหรอคะ?"
2004606-11 = "เอางานฝีมือของพวกเรามาจัดแสดงบนถนนที่มีผู้คนสัญจรไปมาแบบนี้... มันอาจจะน่ารำคาญตา หรือไปขัดขวางการสัญจรก็ได้..."
2004606-12 = "ไม่ๆ ไม่เป็นไรเลยครับ! พวกเราก็อยากจะฟื้นฟูถนนที่เสียหายอยู่พอดี แต่ก็คิดหาวิธีกันไม่ได้เลย"
2004606-13 = "ตั้งแต่วันนี้เป็นต้นไป ถนนสายนี้จะเป็นถนนสายโอริกามิ! ถ้าไปบอกเล่ากันปากต่อปาก อีกหน่อย#nคงได้จัดงานเทศกาลพับกระดาษโอริกามิก็ได้นะครับ!"
2004606-14 = "เทศกาลพับกระดาษโอริกามิ... แหะๆ เป็นครั้งแรกเลยนะคะที่พวกเราได้รับการยอมรับแบบนี้"
2004606-18 = "ขอโทษที่มาขัดจังหวะนะ แต่ค่าจ้างของพวกเรา..."
2004606-19 = "อ้อ ก็ต้องจ่ายให้อยู่แล้วสิครับ ทั้งค่าจ้างจากงานเทศกาลครั้งก่อน แล้วก็ค่าจ้างฟื้นฟูถนนสายนี้ด้วย"
2004606-20 = "พ่อค้าคนอื่นในย่านการค้าไม่น่ารักกับพวกคุณใช่มั้ยล่ะครับ? พวกนั้นคงคิดว่าพวกปีศาจมาหาเรื่อง#nอะไรอีก... แล้วก็คาดไม่ถึงว่าพวกคุณเป็นชมรมอะไรอย่างเป็นทางการน่ะครับ"
2004606-21 = "จะคิดแบบนั้นก็ไม่ผิดหรอก ก็ก่อนหน้านี้เราเคยเป็นปีศาจกันมานี่นา"
2004606-22 = "แต่ตอนนี้พวกเราก็เป็นชมรมเอ็กซ์ตราแล้วละ! ต้องขอบคุณกลุ่มการค้าที่มองเห็นผลงานของเราใน#nงานเทศกาลครั้งก่อนนะ!"
2004606-23 = "พวกฉันจ่ายเงินให้ช้าแท้ๆ เรื่องแค่นี้น่ะเล็กน้อย~"
2004606-24 = "งั้นก็ฝากเรื่องการแสดงต่อไปด้วยนะครับ~"
2004606-25 = "อื้อ!"
2004606-27 = "(แล้วก็เดินผ่านถนนที่ผู้คนเป็นมิตรกัน...)"
2004606-29 = "จะ... จะเปลี่ยนห้องชมรมกับเราจริงๆ เหรอ?"
2004606-30 = "มันทั้งอยู่ไกล แล้วก็มีข่าวลือว่าแถวนั้นมีผีออกมาด้วยนะ..."
2004606-31 = "ปีศาจอย่างพวกฉันขนาดเด็กที่ร้องไห้มาเห็นแล้วยังหยุดร้องเลย พวกเราน่ะไม่กลัวผีหรือวิญญาณ#nอะไรหรอก! อ๊ะ แต่ตอนนี้พวกฉันไม่ใช่ปีศาจแล้วนี่นา? แต่ก็เอาเถอะ!"
2004606-32 = "พวกฉันอยากได้ที่ที่เอะอะโวยวายได้มากกว่า เวลาซ้อมจะได้ไม่มีใครมาร้องเรียนว่าเสียงดังยังไงล่ะ!"
2004606-34 = "(แล้วก็เดินผ่านห้องชมรมพับกระดาษโอริกามิที่อยู่ไกลออกไป...)"
2004606-36 = "เกิดเรื่องแบบนั้นขึ้นสินะคะ~"
2004606-37 = "ถือว่าดีแล้วไม่ใช่เหรอคะ? ทุกอย่างได้รับการคลี่คลายด้วยดีเลยนี่นา~"
2004606-38 = "[s] \"เป็นฝีมือของนิยะใช่มั้ย?\""
2004606-39 = "ไม่มีทางหรอกค่ะ~ ฉันก็บอกไปแล้วนี่คะว่าฉันไม่มีญาณหยั่งรู้อนาคตอะไรหรอก~"
2004606-40 = "และอย่างที่คุณครูก็น่าจะเห็นว่าฉันไม่ได้ทำอะไรเลยจริงๆ ค่ะ"
2004606-41 = "ถ้าถามว่าทำไมทุกอย่างถึงคลี่คลายได้ด้วยดี~ ก็คงต้องตอบว่าคงเป็นเรื่องบังเอิญน่ะค่ะ"
2004606-42 = "บังเอิญว่าองค์ประกอบต่างๆ ลงตัวอย่างเหมาะสม และทุกอย่างก็ดำเนินไปด้วยดีอย่างถูกที่ถูกเวลา"
2004606-43 = "นี่ละค่ะสมดุลของหยินหยาง อะฮะฮ่า~"
2004606-44 = "อืม~ ทำไมทำหน้าเคลือบแคลงอย่างนั้นล่ะคะ...?"
2004606-48 = "ฉันขอถามคำถามเดิมอีกครั้งนะคะ คุณครูคิดยังไงกับเฮียกคิยาโคเหรอคะ?"
2004606-49 = "[s1] \"ถึงจะมีเรื่องวุ่นๆ บ้าง แต่ก็สวยงามเหมือนเดิมนะ\"\n[s2] \"ถึงจะไม่สงบสุขเสมอไป แต่ก็เป็นที่ที่สวยงามเลยละ\""
2004606-52 = "ใช่แล้วค่ะ ต้องอย่างนี้สิคะ~ นี่ละค่ะเฮียกคิยาโคของเรา~"
2004606-53 = "โรงเรียนที่มีธรรมชาติงดงามทุกฤดูกาล มีงานเทศกาลให้เพลิดเพลินทั้งปี และมีนักเรียนที่มีความมุ่งมั่น#nในสิ่งที่ตัวเองอยากทำ..."
2004606-54 = "การที่มีโรงเรียนที่ยอดเยี่ยมอยู่แบบนี้ได้..."
2004606-55 = "คงเป็นเพราะพวกเราโชคดีน่ะค่ะ อะฮะฮ่า~!"
2004606-56 = "ความบังเอิญอันแสนวิเศษที่เกิดขึ้นซ้ำแล้วซ้ำเล่าอย่างเรื่องของวันนี้ เป็นสิ่งที่คอยทำให้โรงเรียนของ#nเราคงอยู่ได้ค่ะ~"
2004606-57 = "ฮืม~ นี่ก็ไม่ใช่คำตอบที่คุณครูต้องการเหรอคะ?"
2004606-58 = "งั้นทำยังไงดีล่ะคะ? ถ้าจะให้ฉันยกความดีความชอบให้ใครละก็..."
2004606-59 = "งั้นก็คงต้องมอบความดีความชอบให้ทุกคนที่ทำงานของตัวเองอย่างตั้งใจในที่ที่ไม่มีใครเห็นค่ะ~♪"
2004606-60 = "[ns] \"......\""
2004606-61 = "ขอปิดจบด้วยความรู้สึกดีๆ~ แบบนี้ไม่ได้เหรอคะ...?"
2004606-62 = "อะฮะฮ่า... แต่ก็~ เอาเถอะค่ะ~"
2004606-63 = "ความวุ่นวายครั้งนี้ก็ได้รับการคลี่คลายทั้งหมดแล้ว แล้วทุกคนก็ดูมีความสุขกันแล้วด้วย~"
2004606-64 = "งั้นวันนี้คุณครูไม่ต้องปรับทัศนคติฉัน~ จะได้มั้ยคะ~?"
2004606-65 = "[ns] \"นิยะ\""
2004606-68 = "อะฮ่า...?"
2004606-69 = "[ns] \"วันนี้ครูจะลูบหัวแทน\""
2004606-70 = "อะฮ่า?!"
2004606-78 = "(แล้วคุณครูก็ลูบหัวชมเชยนิยะอยู่หลายครั้ง)"

[translation]
1007302-1 = "ภาพลักษณ์ที่ไม่เข้ากัน"
1007302-4 = "(คุณครูไม่เห็นอุยอยู่รอบๆ แคมป์ เลยไปตามหายังที่ต่างๆ)"
1007302-11 = "(คุณครูก็พบอุยนั่งแอบๆ อยู่ที่ซอกหินมุมหนึ่งของชายหาดเงียบสงบที่ไกลออกไป)"
1007302-15 = "[ns1] \"มาอยู่ตรงนี้นี่เอง\"\n[ns2] \"มีอะไรเหรอ อุย?\""
1007302-20 = "อ่า..."
1007302-21 = "คุณครู...? ทำไมคุณครูถึงมาที่นี่... ไม่สิ ก่อนหน้านี้..."
1007302-22 = "มาที่นี่ได้ยังไงกันคะ... ตรงนี้เป็นที่ที่ไม่น่าจะมีใครหาเจอได้ง่ายๆ เลยแท้ๆ..."
1007302-23 = "...คะ? "
1007302-24 = "ตามหาฉันอยู่ตลอดเลยงั้นเหรอคะ? ตะ...ตลอดงั้นเหรอ ตะ... ตั้งแต่เมื่อไรกัน..."
1007302-29 = "ตั้งแต่ตอนที่ส่งข้อความไปทาง MOMOTALK งั้นเหรอคะ!?"
1007302-30 = "ดะ...เดี๋ยวนะ ทะ...ทำไม... ถึงตามหาฉันแบบนี้ล่ะคะ..."
1007302-31 = "ฉันบอกไปแล้วนี่คะว่าไม่มีอะไร... ต่อให้มีปัญหาอะไร มันก็เป็นปัญหาของฉัน..."
1007302-32 = "ถ้าคุณครูทำแบบนี้ละก็... ฉันยิ่งลำบากขึ้นนะคะ..."
1007302-33 = "[s3] \"ครูลำบากใจนะ ถ้าต้องปล่อยให้อุยอยู่คนเดียว\"\n[s4] \"ครูทำเพราะชอบน่ะ ไม่ต้องใส่ใจหรอก\""
1007302-36 = "พะ...พูดแบบนั้นอีกแล้ว... ฮือออ..."
1007302-37 = "อ่า... ทำไมฉันถึงมาอยู่ที่นี่น่ะเหรอคะ?"
1007302-38 = "เรื่องนั้น..."
1007302-39 = "มาพูดเอาตอนนี้มันก็ดูน่าอายกว่าเดิม... เพราะมันไม่ใช่เรื่องใหญ่อะไรเลย..."
1007302-43 = "เฮ้อ..."
1007302-47 = "ก็แค่... คือ... จะว่ายังไงดีล่ะ... ทั้งเสื้อผ้าและสถานที่แบบนี้ มันไม่เหมาะกับฉันเลยสักนิด..."
1007302-48 = "เพราะงั้นก็เลยรู้สึกอายขึ้นมาดื้อๆ ประมาณนั้นน่ะค่ะ"
1007302-49 = "คุณครูเองก็รู้ดี ฉันน่ะไม่มีเสน่ห์ หรือว่าหน้าตาน่ารักสดใสเหมือนกับคนอื่นๆ..."
1007302-50 = "ฉันรู้เรื่องนั้นดีที่สุดค่ะ ว่าคนรอบข้างมองฉันยังไง และตัวฉันเองมีบรรยากาศรอบตัวแบบไหน"
1007302-51 = "อย่างน้อยถ้าเป็นที่ห้องสมุดเก่า... หรือห้องในอาคาร... แล้วก็เสื้อผ้าที่ไม่ใช่ชุดน้อยชิ้นแบบนี้ละก็ มันคงจะดีกว่านี้ แต่ว่า..."
1007302-52 = "ตอนนี้มันเอ่อ... คือ... จะว่ายังไงดีล่ะ..."
1007302-53 = "บอกตามตรงว่าฉันลำบากใจสุดๆ กับเรื่องทั้งหมดน่ะค่ะ มันเป็นสถานการณ์ที่ไม่ได้เตรียมตัวรับมือมา#nก่อน..."
1007302-54 = "อ่า..."
1007302-55 = "เดี๋ยวก่อนค่ะ ฉันพอจะเดาได้ว่าคุณครูจะพูดว่าอะไร แต่ไม่ต้องพูดแบบนั้นก็ได้นะคะ"
1007302-56 = "ถ้าเป็นคุณครูละก็คงจะพูดว่า \"ใส่ชุดแบบนี้ก็ดีแล้วนี่นา ก็ดูน่ารักดีนี่นา\" แบบนี้ใช่มั้ยล่ะคะ? แต่ว่าไม่เป็นไรหรอกค่ะ"
1007302-57 = "ฉันไม่ได้อยากได้คำปลอบใจอะไร... ค่ะ เรื่องแบบนี้ฉันพอแยกแยะได้ว่าอะไรเป็นอะไรค่ะ"
1007302-58 = "เวลาที่ได้ยินคำชมที่มันดูเกินจริง มันก็ยิ่งทำให้รู้สึกแย่กว่าเดิมค่ะ"
1007302-59 = "ฮึ..."
1007302-60 = "...คะ?"
1007302-61 = "คุณครูไม่ได้จะพูดแบบนั้นงั้นเหรอคะ...? ถ้าอย่างนั้น..."
1007302-62 = "[s5] \"ครูว่าที่นี่สบายกว่าอีกเนอะ?\"\n[s6] \"อุยก็แค่ใส่ใจตัวเองไม่ใช่หรือไง?\""
1007302-65 = "พูดแบบนั้น... หมายความว่ายังไงน่ะคะ..."
1007302-66 = "อืม... เดี๋ยวก่อนนะคะ... ขอเวลาฉันคิดก่อน..."
1007302-70 = "...อ่า..."
1007302-71 = "อืม... เป็นแบบนั้นจริงๆ... เหรอคะ...?"
1007302-72 = "นั่นสินะ พอมาคิดดูแล้ว ที่นี่ไม่ค่อยมีผู้คนอยู่... ต่างจากแถวๆ เขตในเมืองของทรีนิตี้เลยนะคะ..."
1007302-73 = "ที่จริงก็มีคนแวะเวียนมาอยู่บ้าง..."
1007302-74 = "อาจพูดไม่ได้เต็มปากว่าไม่อึดอึดกับคนพวกนั้น แต่การมีใครสักคนแวะเวียนมาคุยด้วย มันก็ไม่ได้แย่#nหรอกค่ะ"
1007302-75 = "[s7] \"อื้อ อันที่จริง คนอื่นๆ ก็คงคิดเหมือนกันแหละ\"\n[s8] \"เพราะงั้นทุกคนก็เลยออกมาที่ไกลๆ ไงล่ะ\""
1007302-78 = "อืม... ทุกคนก็ออกมาที่ไกลๆ เหมือนกันหมด"
1007302-79 = "สุดท้าย... ก็อาจจะเป็นอย่างนั้นก็ได้ค่ะ"
1007302-82 = "การที่หนีผู้คนมาอยู่ที่ไกลๆ ด้วยเหตุผลที่ว่าไม่อยากถูกรบกวนจากคนอื่นๆ..."
1007302-83 = "ก็ไม่ได้ต่างอะไรกับฉันที่แอบหนีมาซ่อนตัวอยู่ในมุมโขดหินเพื่อหลบสายตาผู้คนสินะคะ"
1007302-86 = "อันที่จริง... มันก็ฟังดูน่าเชื่อถือดีนะคะ..."
1007302-87 = "ถ้างั้น... ชุดแบบนี้เองก็...?"
1007302-88 = "[s9] \"อื้อ ก็มันเป็นชุดที่ไม่ได้ใส่กันทั่วๆ ไปนี่เนอะ\"\n[s10] \"คิดซะว่าเป็นการเบนความสนใจอย่างหนึ่งดีมั้ย?\""
1007302-91 = "...โฮ่..."
1007302-92 = "การเบนความสนใจงั้นเหรอ... ถ้าคิดแบบนั้นละก็... ก็ฟังดูมีเหตุมีผลอยู่เหมือนกัน..."
1007302-93 = "แต่คงจะมีแค่พวกคนแปลกๆ เท่านั้น ที่ใส่ชุดล่อแหลมแบบนี้เดินไปไหนมาไหน..."
1007302-94 = "[s11] \"เอ่อ อืม... เรื่องนั้นมันก็... อืม\"\n[s12] \"......\""
1007302-97 = "...ฉันพูดเล่นค่ะ"
1007302-98 = "จะว่ายังไงดีนะ... คุณครูนี่เป็นคนที่เชื่อคนง่ายจริงๆ เลยนะคะ ฉันไม่ได้หมายถึงในทางไม่ดีหรอก#nค่ะ ช่วยอย่าเข้าใจผิดด้วยนะคะ"
1007302-99 = "ฉันรับรู้ได้ว่าที่คุณครูพูดมาไม่ใช่แค่คำพูดเพียงลมปาก เพราะงั้นพอได้คุยกับคุณครูแบบนี้แล้ว ก็รู้สึกสบายใจขึ้นค่ะ"
1007302-100 = "...ฉันพูดจริงนะคะ"
1007302-101 = "ถ้าเป็นแค่พวกคำพูดกลวงๆ มันโน้มน้าวให้คนเชื่อไม่ได้หรอกนะคะ..."
1007302-105 = "ฉันได้ยินมาเยอะเลยค่ะ คำพูดประเภทนั้น... คำพูดชมเชยที่มีน้ำหนักแค่ลมปาก คำพูดเยินยอต่างๆ..."
1007302-106 = "พอได้ยินเข้าเรื่อยๆ ฉันก็รู้สึกได้ว่าการฟังคำพูดพวกนั้น... เป็นการเสียเวลาโดยเปล่าประโยชน์"
1007302-107 = "ก็เลยทำให้ฉันค่อยๆ ทิ้งระยะห่างจากคนอื่นมาทีละนิด และผลักไสความสัมพันธ์จอมปลอมพวกนั้น#nออกไปให้ไกล..."
1007302-108 = "พอรู้สึกตัวอีกที ฉันก็กลายเป็นคนแบบนั้นไปซะแล้วค่ะ"
1007302-109 = "กลายเป็นคนที่มืดมน ไม่ชอบผู้คน เอาแต่อยากอยู่คนเดียว และไม่ชอบให้ใครมายุ่งเกี่ยวด้วย"
1007302-110 = "คนใกล้ตัวเลยเหลือแค่เพียงรุ่นน้องที่พูดตรงๆ แล้วก็ชอบบ่นจู้จี้จุกจิก... แค่ผู้คนที่มีความสัมพันธ์ที่ดี#nต่อกัน"
1007302-111 = "...น่าสมเพชใช่มั้ยล่ะคะ ดูน่าเวทนาสินะคะ ค่ะ... นั่นแหละคือตัวฉันในตอนนี้..."
1007302-112 = "แต่ถึงฉันจะซ่อนตัวอยู่ที่ไหนก็ตาม ก็ยังหนีกลุ่มคนเล็กๆ ที่แวะเวียนมาหาฉันไม่ได้เลยค่ะ..."
1007302-113 = "เป็นพวกคนประหลาดทั้งนั้นเลยนะคะ จริงๆ เลยเชียว..."
1007302-114 = "ทั้งพวกรุ่นน้องที่ชอบวนเวียนมาหาแล้วก็เอาแต่เรียกว่ารุ่นพี่ๆ ทุกครั้ง หรือไม่ก็พวกคนที่ยอมตามฉัน#nมาที่นี่เพื่อแก้ปัญหาของฉัน"
1007302-115 = "...คุณครูก็เหมือนกันค่ะ ไม่สิ พอมาคิดๆ ดูแล้ว คุณครูน่ะหนักที่สุดเลยนะคะ"
1007302-116 = "[s13] \"อ่า... ครูก็พอรู้อยู่ ไม่ต้องห่วงนะ\"\n[s14] \"อาจเพราะเราเหมือนๆ กันก็ได้ละมั้ง\""
1007302-121 = "...ฮุ..."
1007302-122 = "...ฮุฮุ... จริงๆ เลย..."
1007302-123 = "...ค่ะ"
1007302-124 = "...เอาเป็นว่าตามนั้นก็แล้วกันค่ะ"

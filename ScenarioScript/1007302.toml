[translation]
1007302-1 = "格格不入"
1007302-4 = "（因為在營地周圍找不到憂而找了很多地方）"
1007302-11 = "（總算在稍遠海邊的岩石邊發現了憂）"
1007302-15 = "[ns1]「原來你在這裡啊。」\n[ns2]「憂，發生什麼事了嗎？」"
1007302-20 = "……咦？"
1007302-21 = "老師……？#n你怎麼會在這裡……不，在這之前……"
1007302-22 = "你是怎麼找到我的……這裡應該沒那麼好找才對……"
1007302-23 = "……什麼？"
1007302-24 = "你一直在找我？#n從，從什麼時候開始……？"
1007302-29 = "……從傳MomoTalk的時候就開始了！？"
1007302-30 = "就，就這樣……找了……好幾個小時……"
1007302-31 = "我不是說過了嗎，沒有任何問題……#n就算有也是我自己的問題……"
1007302-32 = "老師這樣……會讓我很困擾的……"
1007302-33 = "[s3]「不能對你置之不理。」\n[s4]「因為我會擔心憂。」"
1007302-36 = "又，又說那種話……唔唔……"
1007302-37 = "啊……我為什麼會在這裡？"
1007302-38 = "那是因為……"
1007302-39 = "現在才說反而好像更難為情……#n但其實真的不是需要老師特地來找我的事……"
1007302-43 = "唉……"
1007302-47 = "那個……該怎麼說呢……#n這副打扮，以及這個地方都和我格格不入……"
1007302-48 = "讓我覺得很丟臉……就是這樣而已。"
1007302-49 = "我並不像其他人一樣有魅力，也沒有特別的亮眼……"
1007302-50 = "周圍的人對我的看法和印象，我自己也很清楚。"
1007302-51 = "如果是在古書館……或者室內……#n而且不穿這身衣服的話還稍微好一點……"
1007302-52 = "但現在卻……怎麼說才好……"
1007302-53 = "各種事都讓我倍感壓力。#n老實說……這種狀況確實在我的意料之外。"
1007302-54 = "……啊。"
1007302-55 = "請等一下。#n老師打算說什麼，這我已經知道了。"
1007302-56 = "像是「很適合你」、「很可愛唷」之類的……但真的沒有必要。"
1007302-57 = "畢竟，我也不是想得到別人的安慰……是啊，我還是能分辨出來的。"
1007302-58 = "聽到那種無法讓人認同的話，反而只會令人傷心……"
1007302-59 = "……嗚……"
1007302-60 = "……咦？"
1007302-61 = "你想說的不是這個……？#n那是……？"
1007302-62 = "[s5]「在這裡反而能過得更自在不是嗎？」\n[s6]「是不是你自己在鑽牛角尖？」"
1007302-65 = "唔……那是什麼意思……"
1007302-66 = "唔嗯……請給我……一些時間思考……"
1007302-70 = "……嗯……"
1007302-71 = "嗯……真的是那樣……嗎……？"
1007302-72 = "說的也是。#n仔細想想，這裡和三一不同……也沒有其他人……"
1007302-73 = "就算有，也只有一起來的幾位同學而已……"
1007302-74 = "雖然還沒有完全敞開心扉，卻也不會覺得很不自在。"
1007302-75 = "[s7]「嗯，這點其他人也是一樣的哦。」\n[s8]「所以才會來這麼遠的地方休息吧。」"
1007302-78 = "呼呣……大家也有類似的煩惱，所以才遠道而來……"
1007302-79 = "……也許……確實是這樣吧。"
1007302-82 = "想遠離日常的嘈雜，跑到沒人知道的地方……"
1007302-83 = "就和平時為了避開人群而躲在角落的我一樣。"
1007302-86 = "確實……有道理……"
1007302-87 = "那麼……這種服裝也是有意義的嗎……？"
1007302-88 = "[s9]「嗯，畢竟平常穿不到呀。」\n[s10]「就當成是一種小叛逆如何？」"
1007302-91 = "……原來如此……"
1007302-92 = "小叛逆啊……這麼一想……好像比較能接受……"
1007302-93 = "畢竟平時也穿成這樣會很奇怪啊……"
1007302-94 = "[s11]「哦，嗯……那個，嗯。」\n[s12]「…………」"
1007302-97 = "……開玩笑的。"
1007302-98 = "老師真的很會說服人呢。#n當然，我這麼說並沒有惡意，希望老師別誤會。"
1007302-99 = "不會有被客套話哄騙的感覺，對話時心裡會感到很舒服……"
1007302-100 = "……這是我的真心話。"
1007302-101 = "即便同樣是勸說，但不斷重複讓人無法共鳴的話，只會讓人覺得空虛不是嗎？"
1007302-105 = "那種話我已經聽過無數次了。#n虛有其表的稱讚、討人歡心的讚美……"
1007302-106 = "聽久了自然就能感覺出來，#n開始覺得那樣的對話只是在浪費時間……"
1007302-107 = "就這樣漸漸與人保持距離，排斥虛假的關係……"
1007302-108 = "等回過神來，已經無法坦率接受他人的好意。"
1007302-109 = "變得陰沉、悲觀而孤僻，總是很負面又時常抱怨的人。"
1007302-110 = "願意與這種人相處的，就只有一些愛撈叨且有話直說的後輩們而已……"
1007302-111 = "……很可憐對吧。#n是啊，真可憐，這就是我現在的樣子。"
1007302-112 = "但即使是這樣的我……還是有人願意陪在我身邊。"
1007302-113 = "真是群奇怪的人呢……"
1007302-114 = "願意稱呼我這種人為「前輩」，無法對我置之不理的後輩。#n以及明明沒有任何好處，卻願意一起來到無人島的人……"
1007302-115 = "……還有老師也是。#n或者該說老師是最奇怪的。"
1007302-116 = "[s13]「啊啊，這點我自己是最清楚的，別擔心。」\n[s14]「也可以說是物以類聚吧。」"
1007302-121 = "……呵……"
1007302-122 = "……呵呵……真是的……"
1007302-123 = "……嗯。"
1007302-124 = "……就當成是這樣吧。"

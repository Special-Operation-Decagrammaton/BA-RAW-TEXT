1007302-49 = "3;우이 수영복ND;01;보시다시피 저는 다른 분들처럼 매력이 있는 것도 아니고, 화사한 얼굴도 아니고……."
1007302-50 = "3;우이 수영복ND;02;당연히 스스로도 알고는 있으니까요. 주변에서 어떻게 보는지, 제가 어떤 분위기를 풍기고 있는지 정도는.\n#3;em;[반응]"
1007302-51 = "3;우이 수영복ND;99;그나마 고서관이나……. 실내라면……. 그리고 이런 휑한 옷이 아니라면 그래도 좀 낫지만……."
1007302-52 = "3;우이 수영복ND;01;지금은, 그, 거의, 그……. 뭐랄까……."
1007302-53 = "3;우이 수영복ND;02;그 자체로도 굉장히 부담이 심하네요. 솔직히. ……전혀 대비해 본 적 없는 상황이라."

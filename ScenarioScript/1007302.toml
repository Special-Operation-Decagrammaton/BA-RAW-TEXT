1007302-56 = "3;우이 수영복ND;01;선생님이라면 또 보기 좋다느니, 귀엽다느니 좋은 말씀해주시겠죠. 하지만 괜찮으니까요."
1007302-57 = "3;우이 수영복ND;06;위로를 받고 싶다는 것도 아니고……. 네. 그런 정도는 구분할 수 있거든요.\n#3;em;[한숨]"

[translation]
84300200700-5 = "คุณรู้ว่าฉันอยู่ในนี้สินะคะ... ถ้างั้นฉันก็คงไม่จำเป็นต้องแอบในกล่องนี้อีกต่อไปแล้วละค่ะ"
84300200700-9 = "หืม...? เด็กโรงเรียนทรีนิตี้นี่นา? "
84300200700-10 = "แล้วชุดที่ใส่ก็... หรือว่าเป็นคนในสภาน้ำชาน่ะ?"
84300200700-11 = "คนที่สูงส่งมาทำอะไรในที่ที่ซอมซ่อแบบนี้นะ?"
84300200700-12 = "คนที่สูงส่งงั้นเหรอ... ต่อให้คุณจะเรียกฉันถึงขนาดนั้น แต่บรรยากาศมันก็ยังไม่เปลี่ยนไปเลยนะคะ"
84300200700-13 = "ค่ะ ใช่แล้วค่ะ ฉันคือยูริโซโนะ เซอา สังกัดสภาน้ำชาแห่งโรงเรียนสามัญทรีนิตี้ ฉันสังเกตเห็นการ#nเคลื่อนไหวที่น่าสงสัย ก็เลยไล่ล่าตามลงมาถึงที่นี่ค่ะ"
84300200700-14 = "ว่าไงนะ...? ไล่ล่างั้นเหรอ?"
84300200700-15 = "เธอเนี่ยนะ? ในสภาพร่างกายนี้น่ะนะ?"
84300200700-16 = "ใช่แล้วค่ะ..."
84300200700-17 = "ฮ่าฮ่า...! นึกไม่ถึงเลยแฮะ ดูลุคเหมือนลูกคุณหนูแต่ก็ใจกว้างไม่เบาเลยนะ?"
84300200700-18 = "แบบนี้ละถูกใจฉันเลย ก็ 'คนที่ตำแหน่งใหญ่โต' ในโรงเรียนนี้น่ะ ไม่มาทำอะไรแบบนี้อยู่แล้วละ"
84300200700-20 = "คิดผิดแล้วละ เนรุ ฉันไม่ได้เป็นแบบนั้นนะ..."
84300200700-21 = "เฮ้อ ช่างเถอะ ฉันไม่ได้พูดแบบนั้นเพราะอยากเหน็บแนมหรอก"
84300200700-22 = "และถ้าจะเถียงว่าถูกหรือผิด ฉันรู้ดีว่าตอนนี้เธอน่ะเป็นฝ่ายถูก ส่วนเรื่องการลงภาคสนามน่ะ ต้องให้เป็นหน้าที่ของคนที่เหมาะสมอยู่แล้ว"
84300200700-24 = "อืม... ถ้างั้นก็แล้วไป"
84300200700-28 = "นั่นเสียงของ... คุณคือ สึคัตสึกิ ริโอะเหรอคะ?"
84300200700-29 = "ทำไมคุณถึง... ฉันคิดว่าคุณจากมิลเลเนียมไปแล้วเสียอีกค่ะ"
84300200700-33 = "ก็จริงอยู่หรอก แล้วก็ยังจริงจนถึงทุกวันนี้ด้วย"
84300200700-34 = "ส่วนงานตอนนี้น่ะ... เรียกว่าฉันมีเหตุผลที่ต้องแวะมาที่นี่สักเดี๋ยวน่ะ"
84300200700-35 = "ฉันกลับอยากถามคุณมากกว่านะ ยูริโซโนะ เซอา ทำไมถึงมาอยู่ที่นี่ล่ะ?"
84300200700-36 = "คุณ..."
84300200700-42 = "ก็แค่เสียงเครื่องจักรอะไรนิดหน่อยน่ะ... ไม่ต้องสนใจหรอก"
84300200700-43 = "ฉันว่าทั้งสองคนต้องมาหาฉันทางนี้แล้วละ ขืนคุยกันอยู่ตรงนั้นต่อไป ก็ยิ่งเสี่ยงต่อการเปิดเผยตัวตน"
84300200700-47 = "ให้พายัยนี่ไปด้วยเหรอ? พูดออกมาจากใจจริงเหรอเนี่ย...?"
84300200700-49 = "(ยัยนี่งั้นเหรอ...)"
84300200700-51 = "ตอนนี้ฉันยิ่งปล่อยเซอาไว้คนเดียวไม่ได้ เนรุ สถานการณ์นี้มันเปลี่ยนไปตั้งแต่วินาทีที่เธอปรากฏตัว#nต่อหน้าเซอาแล้วละ"
84300200700-52 = "แต่จะให้ฉันปล่อยไปเฉยๆ ก็ไม่ได้นี่นา"
84300200700-53 = "เอาเถอะ ฉันเข้าใจแล้วละ งั้นก็พาตัวเซอามาด้วยกัน"
84300200700-58 = "ได้ยินแล้วใช่มั้ย?"
84300200700-59 = "ตามมาอย่างว่าง่ายล่ะ ฉันขอบอกด้วยความเป็นห่วงนะ อย่าคิดทำอะไรเหลวไหลขึ้นมาเชียว เพราะต่อให้เป็นสภาน้ำชาหรือใคร ฉันก็ไม่ไว้หน้าหรอก"
84300200700-65 = "ถ้าคนที่โทรคุยด้วยคือสึคัตสึกิ ริโอะ... ถ้าอย่างนั้นคนคนนี้ก็คือมิคาโมะ เนรุ... สินะ"
84300200700-66 = "ฉันเองก็ไม่รู้รายละเอียด แต่งานนี้คงไม่ใช่งานปกติใช่มั้ยคะ?"

[translation]
84300200700-5 = "...You knew I was here the whole time? I might as well come out, then."
84300200700-9 = "A Trinity student, huh? "
84300200700-10 = "And those clothes... You with the Tea Party?"
84300200700-11 = "What's a VIP like you doing in this dingy little place, hmm?"
84300200700-12 = "If I am so important, you ought to be mindful of your tone."
84300200700-13 = "But yes, I am with the Trinity General School Tea Party. My name is Yurizono Seia. I spotted suspicious actors and tailed them."
84300200700-14 = "Oh, you tailed them?"
84300200700-15 = "Tiny little you?"
84300200700-16 = "...Well, yes."
84300200700-17 = "Ha...! Surprising. You're a lot bolder than you look."
84300200700-18 = "I like it. Our school's higher-ups never get that directly involved."
84300200700-20 = "It's not like that..."
84300200700-21 = "Don't worry about it. I'm not judging you."
84300200700-22 = "Some people are better suited to field work than others, that's all."
84300200700-24 = "...Let's change the subject."
84300200700-28 = "That voice... Are you Tsukatsuki Rio?"
84300200700-29 = "Why are you...? I thought you left Millennium."
84300200700-33 = "I did, and I'm still not officially here."
84300200700-34 = "But I do have my reasons to visit."
84300200700-35 = "For one thing, I have a question for you, Yurizono Seia. What are you doing here?"
84300200700-36 = "You..."
84300200700-42 = "...That's just machine noise. No need to worry."
84300200700-43 = "Why don't you both come with me? Before someone spots us here."
84300200700-47 = "Both of us? You want to bring in THIS chick? You can't be serious..."
84300200700-49 = "(\"This chick\"...)"
84300200700-51 = "She's seen you, Neru. We can't send her back alone. You already determined that."
84300200700-52 = "Well, it's not like I could've just ignored her..."
84300200700-53 = "Whatever, I get it. We'll take her."
84300200700-58 = "You hear me?"
84300200700-59 = "Follow along quietly. And just to be sure, no funny business, all right? I don't care whether you're Tea Party or not."
84300200700-65 = "Tsukatsuki Rio... So that must be...Mikamo Neru."
84300200700-66 = "Whatever's going on here, it's nothing ordinary."

[translation]
84300200700-5 = "……原來已經被發現了啊。#n繼續這樣下去也沒什麼意義。"
84300200700-9 = "……怎麼？這不是三一的學生嗎？"
84300200700-10 = "那件衣服……該不會是茶會？"
84300200700-11 = "那種大人物怎麼會跑來這種簡陋的地方？你說說看啊？"
84300200700-12 = "雖然稱呼我為大人物……態度還是一樣呢。"
84300200700-13 = "沒錯，我是三一綜合學園，茶會所屬的百合園聖亞。#n因為發現了可疑的動靜，所以正在進行追查。"
84300200700-14 = "……啊？追查？"
84300200700-15 = "就憑你？用那副身體？"
84300200700-16 = "……沒錯。"
84300200700-17 = "哈……！真讓人意外。#n看不出來你還挺大膽的嘛？"
84300200700-18 = "我喜歡。換作是我們學園的「大人物」，絕對不會這樣親自出面的。"
84300200700-20 = "不對。寧瑠，不是那樣的……"
84300200700-21 = "啊，算了算了。#n我也不是為了指責你才那麼說的。"
84300200700-22 = "而且要追究對錯的話，你也是對的。#n現場還有更適合的人選。"
84300200700-24 = "……嗯，那就好。"
84300200700-28 = "那個聲音……是調月莉央嗎？"
84300200700-29 = "你怎麼會……我還以為你已經離開千年了呢。"
84300200700-33 = "你並沒有說錯。而且至今依舊如此。"
84300200700-34 = "現在……只是因為有事情要辦，所以才會稍作停留。"
84300200700-35 = "我反而想問你，百合園聖亞。#n你怎麼會在這裡？"
84300200700-36 = "你……"
84300200700-42 = "……只是機械聲而已。不用在意。"
84300200700-43 = "看來得請你們兩個先過來一趟了。#n如果繼續在那邊談話，會有曝光的風險。"
84300200700-47 = "跟這傢伙一起？#n……你是認真的嗎？"
84300200700-49 = "（這傢伙……）"
84300200700-51 = "現在反而不能放他一個人回去。#n從寧瑠你在他面前現身的那一刻起，這件事就已經注定了。"
84300200700-52 = "剛才那種情況，我總不能視而不見吧。"
84300200700-53 = "總之我知道了。#n我會帶他過去。"
84300200700-58 = "都聽到了吧？"
84300200700-59 = "乖乖跟我來吧。#n勸你最好不要輕舉妄動，我可不在乎你是茶會還是什麼的哦。"
84300200700-65 = "調月莉央……#n既然如此，那個人就是美甘寧瑠……對吧。"
84300200700-66 = "雖然還不確定，但事情想必非同小可。"

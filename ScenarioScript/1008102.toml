[translation]
1008102-1 = "I'm Trying Everything for The First Time!"
1008102-5 = "Fear not, Sensei! I, Yukari, have arrived!"
1008102-6 = "[s] \"Hi Yukari. You're here earlier than I expected.\""
1008102-7 = "Yes! Because of you, Sensei. You suggested that we all take a \"breather\"."
1008102-8 = "I, Yukari, wished to learn more about this task you gave us."
1008102-9 = "So here I am!"
1008102-10 = "[s] \"Nothing beats that Yukari enthusiasm!\""
1008102-11 = "Of course! Enthusiasm is just one of my many strengths!"
1008102-12 = "So...where do we find this \"breather\", Sensei?"
1008102-13 = "I, Yukari, shall seize it without fail!"
1008102-14 = "[s1] \"I think you're a little confused, but I appreciate your attitude.\"\n[s2] \"I see...\""
1008102-19 = "[ns] \"How about we take a breather together?\""
1008102-20 = "Of course! I'll go prepare some supplies for our mission!"
1008102-24 = "Heehee."
1008102-31 = "Heeheehee."
1008102-35 = "Heh?"
1008102-36 = "[s] \"You look lost, Yukari.\""
1008102-40 = "Uh, Sensei...what's a breather?"
1008102-44 = "[ns] \"Huh?\""
1008102-45 = "?"
1008102-47 = "Ahh! I must look like a fool!"
1008102-48 = "I thought \"taking a breather\" was slang for some kind of secret mission!"
1008102-49 = "[s] \"No... It's just a way of saying we should rest.\""
1008102-50 = "Really? I was certain it had a deeper, hidden meaning."
1008102-51 = "Forgive me, Sensei! I've troubled you with my impudence."
1008102-52 = "I'm sorry!"
1008102-53 = "[s3] \"There's nothing to be sorry about.\"\n[s4] \"You're going to win a gold medal with those mental gymnastics, Yukari.\""
1008102-56 = "So taking a breather is resting..."
1008102-57 = "But it can also mean spending time with others to clear your mind."
1008102-58 = "Interesting. I can see the wisdom in that, Sensei."
1008102-59 = "But where would I take this breather?"
1008102-63 = "Hm? It should be somewhere I want to go? Or something I've always wanted to do?"
1008102-64 = "Let me think about that..."
1008102-65 = "Hmmmm!"
1008102-66 = "I'm sorry, Sensei. I can't think of anything. The idea of pure leisure is very new to me."
1008102-67 = "[s] \"Well then. If you aren't sure what you want to do...\""
1008102-68 = "Huh?"
1008102-71 = "I took Yukari to an arcade near Schale."
1008102-77 = "Sensei, what is all this?!"
1008102-78 = "[s] \"It's an arcade.\""
1008102-82 = "[ns] \"There's a lot to do here. I figured you could find something fun.\""
1008102-83 = "Arcade, a strange name for a strange place."
1008102-84 = "It's so loud and flashy."
1008102-85 = "Ah! Look, Sensei! The people onscreen are all screaming and squirming! What's happened to them?"
1008102-86 = "Do they need medical attention?!"
1008102-87 = "[s] \"Oh, I know that one. It's a game where you shoot down zombies with a gun. Want to give it a try?\""
1008102-88 = "Is this one of those video games that are popular right now? I just have to shoot these creatures to win right?"
1008102-89 = "All right! Let's go!"
1008102-98 = "Ha ha! Bullseye! Next!"
1008102-99 = "More ill citizens?! Wait...no! That must be the boss! They look fearsome!"
1008102-100 = "Too bad. I, Yukari, will not lose!"
1008102-112 = "Phew! We are victorious!"
1008102-113 = "What a fascinating game!"
1008102-114 = "Oh. "
1008102-115 = "Sensei, what's this over here?!"
1008102-116 = "[s] \"That's called a claw machine.\""
1008102-117 = "So you become a UFO pilot and abduct innocent plush creatures?"
1008102-118 = "How mysterious!"
1008102-119 = "Ooo, let's try this one next!"
1008102-125 = "Yukari and I spent the afternoon enjoying many different kinds of games."
1008102-127 = "Phew! That game was fun as well!"
1008102-128 = "So was the shooting game, the game where you had to move right to defeat the enemy, and that one where you had to step in time with the music... I even enjoyed the motorcycle race game!"
1008102-129 = "Who knew there were so many different, wonderful games!"
1008102-130 = "[s] \"Did you have fun?\""
1008102-131 = "Of course!"
1008102-132 = "I don't usually get to play around like this . I spend most of my free time at home or with the Hyakkaryouran."
1008102-133 = "So this is what you meant by taking a breather."
1008102-134 = "I, Yukari, quite enjoyed it!"
1008102-135 = "[s] \"I'm glad you got some time to relax.\""
1008102-136 = "Me too!"
1008102-137 = "O-Of course! I was only able to relax because... "
1008102-138 = "It wasn't just the games, Sensei. It was also..."
1008102-139 = "[s] \"Hm?\""
1008102-140 = "Oh nothing!"
1008102-141 = "Enough chatter! Let's move onto the next game!"
1008102-143 = "I spent the rest of the day playing different kinds of games with Yukari."

1008102-7 = "3;유카리;01;네! 모처럼 선생님께서 직접 한숨을 돌리자고 말씀을 해주신 덕분에.\n#3;greeting"
1008102-8 = "3;유카리;03;선생님의 그러한 제안을 들었다면 저 유카리, 이대로 가만히 있을 때가 아니라는 생각에 몸과 마음이 달아서……"

[translation]
1008102-1 = "全部都是初體驗！"
1008102-5 = "呵呵！紫前來造訪了，老師！"
1008102-6 = "[s]「你好呀，紫。來得比我想像中早呢。」"
1008102-7 = "是！因為老師難得親自邀我一起「喘口氣」……"
1008102-8 = "聽老師這麼說以後，小女子覺得自己不能什麼都不做，於是心急之下……"
1008102-9 = "就馬上來找老師了！"
1008102-10 = "[s]「無論何時何地總是全力以赴，很像你的作風呢。」"
1008102-11 = "正是如此！總是全力以赴也是小女子無數的優點之一！"
1008102-12 = "所以這次為了照老師說的「喘口氣」……"
1008102-13 = "我勘解由小路紫一定會竭盡全力！"
1008102-14 = "[s1]「呃，那樣反而本末倒置了吧……」\n[s2]「既然紫都這麼說了……」"
1008102-19 = "[ns]「那我們就喘口氣吧？」"
1008102-20 = "是！請老師儘管吩咐！"
1008102-24 = "呵呵。"
1008102-31 = "呵呵呵。"
1008102-35 = "……呵呵？"
1008102-36 = "[s]「那個……紫？」"
1008102-40 = "是！老師！#n請問紫該怎麼做才能「喘口氣」呢！"
1008102-44 = "[ns]「……嗯？」"
1008102-45 = "？"
1008102-47 = "啊啊！小女子誤會了！"
1008102-48 = "原來「喘口氣」並不是某種行為的代稱啊！？"
1008102-49 = "[s]「啊，嗯……就只是休息一下的意思。」"
1008102-50 = "因為是老師提出的建議，我誤以為其中有某種特別的含意……！"
1008102-51 = "這是小女子的過失！#n都怪我有所誤會，給老師添麻煩了。"
1008102-52 = "非，非常抱歉！"
1008102-53 = "[s3]「沒關係，你不需要為這種事道歉……」\n[s4]「我比較訝異的是你竟然辛苦到沒聽過這句話。」"
1008102-56 = "喘口氣原來指的是……"
1008102-57 = "為了休息而放空頭腦，靜下心來消磨時間。"
1008102-58 = "唔嗯……很感謝老師提出這麼貼心的建議……"
1008102-59 = "不過……如果想喘口氣的話，我該做什麼才好呢……"
1008102-63 = "可以嘗試做平常想做的事……？"
1008102-64 = "我平常想做的事啊……"
1008102-65 = "唔嗯～～～！"
1008102-66 = "真是不好意思，老師。#n我似乎還是不明白該怎麼喘口氣。"
1008102-67 = "[s]「好吧，如果你不知道想做什麼的話……」"
1008102-68 = "……嗯？"
1008102-71 = "（和紫一起前往了夏萊附近的遊戲中心）"
1008102-77 = "那個，老師，請問這裡是……？"
1008102-78 = "[s]「這裡是遊戲中心哦。」"
1008102-82 = "[ns]「如果不知道想做什麼，我覺得來這裡打發時間也不錯。」"
1008102-83 = "「由系」中心……？"
1008102-84 = "總覺得一閃一閃的很刺眼……#n雖然吵鬧……卻又相當華麗………"
1008102-85 = "啊！老師！請看出現在那邊螢幕上的人！#n不僅發出哭號般的叫聲，臉色還非常蒼白啊！"
1008102-86 = "這已經是需要叫救護車的情況了吧！？"
1008102-87 = "[s]「啊，那是開槍擊殺殭屍的遊戲。要玩看看嗎？」"
1008102-88 = "是一種體驗型的……開槍消滅敵人的「由系」？"
1008102-89 = "啊，好！請務必讓小女子嘗試！"
1008102-98 = "啊！射中了！接下來……！"
1008102-99 = "又出現另一個臉色很差的敵人！？#n啊！那是敵方的隊長嗎？一看就知道很強！"
1008102-100 = "不過小女子是絕對不會輸的！"
1008102-112 = "呼！這樣就贏了吧！"
1008102-113 = "原來如此……這就是「由系」啊！"
1008102-114 = "啊。"
1008102-115 = "老師！請問這是什麼！？"
1008102-116 = "[s]「哦，那是夾娃娃機。」"
1008102-117 = "是扮演[ruby=UFO]「優福」[/ruby]的駕駛，大量劫持玩偶的「由系」……？"
1008102-118 = "那真是太神～秘了呢！"
1008102-119 = "接下來是這個！小女子要試試看！"
1008102-125 = "（就這樣和紫一起在遊戲中心盡情玩樂，度過了一段快樂的時光）"
1008102-127 = "呼～！剛才的「由系」真是太好玩了！"
1008102-128 = "射擊的「由系」……邊向右移動邊擊退敵人的「由系」……#n配合拍子踩踏板的「由系」……還有騎機車奔馳的「由系」！"
1008102-129 = "世界上原來有這麼多種不同的「由系」啊！"
1008102-130 = "[s]「覺得如何，喜歡嗎？」"
1008102-131 = "啊，是！"
1008102-132 = "因為小女子平時……#n不是待在家裡就是參加百花繚亂的活動，所以完全沒接觸過這些。"
1008102-133 = "原來如此……其他人「喘口氣」的時候都會玩這些啊。"
1008102-134 = "小女子也非常喜歡！"
1008102-135 = "[s]「能讓你喘口氣真是太好了。」"
1008102-136 = "是！"
1008102-137 = "不，不過！小女子之所以能喘口氣…… "
1008102-138 = "當然不只是因為玩得很高興……而是老師為了我親自……"
1008102-139 = "[s] 「嗯？」"
1008102-140 = "沒，沒有，我什麼都沒說！老師！"
1008102-141 = "來！我們繼續玩吧！#n接下來要玩那個……！"
1008102-143 = "（之後也跟著紫玩了各種遊戲，度過歡樂的時光）"

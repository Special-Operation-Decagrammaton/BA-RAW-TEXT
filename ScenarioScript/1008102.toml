[translation]
1008102-1 = "เพิ่งลองทำทุกอย่างครั้งแรกเจ้าค่ะ!"
1008102-5 = "ฮุฮุ! ยูคาริมาแล้วเจ้าค่ะ ท่านอาจารย์!"
1008102-6 = "[s] \"ว่าไงยูคาริ มาเร็วกว่าที่คิดนะเนี่ย\""
1008102-7 = "เจ้าค่ะ! ก็ท่านอาจารย์บอกให้ข้าหายใจหายคอ"
1008102-8 = "พอได้คำแนะนำแบบนั้นจากท่านอาจารย์ ข้าก็เลยคิดว่านี่ไม่ใช่เวลาจะมาอยู่เฉยๆ"
1008102-9 = "ก็เลยรีบออกมาหาท่านอาจารย์แบบนี้ยังไงล่ะเจ้าคะ!"
1008102-10 = "[s] \"ยูคารินี่ทุ่มเทสุดตัวทุกที่ทุกเวลาเลยนะ\""
1008102-11 = "ใช่แล้วเจ้าค่ะ! การทุ่มเทอย่างสุดพลังเป็นหนึ่งในข้อดีมากมายของข้าเจ้าค่ะ!"
1008102-12 = "เพราะงั้น เพื่อการหายใจหายคออย่างที่ท่านอาจารย์ว่า..."
1008102-13 = "ยูคาริผู้นี้ก็จะทุ่มเทอย่างสุดพลังเจ้าค่ะ!"
1008102-14 = "[s1] \"แบบนั้นมันจะยิ่งไม่ได้พักกันใหญ่นะ\"\n[s2] \"แต่ถ้ายูคาริพูดอย่างนั้นละก็...\""
1008102-19 = "[ns] \"งั้นเราก็มาพักหายใจหายคอกันสักหน่อยดีมั้ย?\""
1008102-20 = "เจ้าค่ะ! จะให้ทำอะไรบอกได้เลยเจ้าค่ะ!"
1008102-24 = "ฮุฮุ"
1008102-31 = "ฮุฮุฮุ"
1008102-35 = "ฮุฮุ...?"
1008102-36 = "[s] \"เอ่อ... ยูคาริ?\""
1008102-40 = "เจ้าค่ะ ท่านอาจารย์! ให้ยูคาริทำอะไรเพื่อ <หายใจหายคอ> ดีเจ้าคะ?"
1008102-44 = "[ns] \"หืม...?\""
1008102-45 = "?"
1008102-47 = "อ๊ะ! ข้าเข้าใจผิดไปสินะเจ้าคะ!"
1008102-48 = "<หายใจหายคอ> ไม่ใช่คำที่เอาไว้เรียกการทำอะไรเป็นพิเศษหรอกเหรอเจ้าคะ?!"
1008102-49 = "[s] \"อืม เป็นการบอกให้พักผ่อนน่ะ\""
1008102-50 = "นี่เป็นไอ~เดีย~ ที่ท่านอาจารย์เสนอให้ ข้าก็เลยคิดว่ามันมีความหมายพิเศษอะไรเสียอีก...!"
1008102-51 = "ข้าเบาปัญญาเอง ดันเข้าใจผิดจนทำให้ท่านอาจารย์ลำบากใจเสียแล้ว..."
1008102-52 = "ขะ... ขออภัยด้วยเจ้าค่ะ!"
1008102-53 = "[s3] \"เปล่าเลย ไม่ต้องขอโทษก็ได้...\"\n[s4] \"จดจ่ออยู่กับการทำงานมากเกินไปรึเปล่า?\""
1008102-56 = "พักหายใจหายคอแปลว่า..."
1008102-57 = "การทำให้หัวโล่งและใช้เวลาอย่างผ่อนคลายสบายใจ เพื่อให้ได้พักผ่อนสินะเจ้าคะ"
1008102-58 = "อืม... แต่ยังไงก็ต้องขอบคุณท่านอาจารย์นะเจ้าคะที่ช่วยแนะนำให้ข้าทำแบบนั้น"
1008102-59 = "แต่ว่า... ข้าคิดไม่ออกเลยว่าต้องทำอะไร ถึงจะเรียกว่าได้พักหายใจหายคอ..."
1008102-63 = "ในเวลาแบบนี้ ต้องทำเรื่องที่อยากทำในชีวิตประจำวันรึเปล่าเจ้าคะ...?"
1008102-64 = "สิ่งที่ข้าอยากทำงั้นเหรอ..."
1008102-65 = "อืมมมม!"
1008102-66 = "อภัยให้ข้าด้วยเจ้าค่ะท่านอาจารย์ ข้าไม่คุ้นเคยกับเรื่องแบบนี้ ก็เลย..."
1008102-67 = "[s] \"ถ้ายูคาริไม่รู้ว่าตัวเองอยากทำอะไรละก็...\""
1008102-68 = "เจ้าคะ...?"
1008102-71 = "(คุณครูชวนยูคาริไปร้านเกมที่อยู่แถวๆ ชาเล่ต์)"
1008102-77 = "เอ่อ... ท่านอาจารย์ ที่นี่มัน...?"
1008102-78 = "[s] \"ร้านเกมน่ะ\""
1008102-82 = "[ns] \"ถ้าไม่รู้ว่าจะทำอะไร มาเล่นสนุกในที่แบบนี้ก็น่าจะดีนะ\""
1008102-83 = "ร้านเกม...?"
1008102-84 = "บรรยากาศที่ส่องแสงวูบวาบๆ เสียงดังหนวกหู... แต่ก็ดูอลังการด้วย..."
1008102-85 = "อ๊ะ! ท่านอาจารย์! ตรงนี้เจ้าค่ะ! พวกคนที่อยู่ในหน้าจอส่งเสียงร้องครวญคราง จิตใจดูไม่อยู่กับเนื้อ#nกับตัว แล้วสีหน้าก็ซีดเผือดมากเจ้าค่ะ!"
1008102-86 = "แบบนี้เราต้องเรียกรถฉุกเฉินแล้วหรือเปล่าเจ้าคะ?!"
1008102-87 = "[s] \"อ้อ นั่นเกมยิงซอมบี้น่ะ ลองเล่นดูมั้ย?\""
1008102-88 = "ประเภทหนึ่งของเกมแอท~แทร็ก~ ชั่น~ เหรอ...? เป็นเกมยิงและกำจัดศัตรูเหรอเจ้าคะ?"
1008102-89 = "อ๊ะ เจ้าค่ะ! ถ้างั้นก็ลุยกันเลยเจ้าค่ะ...!"
1008102-98 = "อ๊ะ! ล้มไปแล้วเจ้าค่ะ! งั้นต่อไปก็...!"
1008102-99 = "หาคนที่สีหน้าไม่ค่อยดี?! อ๊ะ! นั่นหัวหน้าหรือไม่เจ้าคะ! ดูก็รู้เลยเจ้าค่ะว่าต้องเก่งแน่ๆ!"
1008102-100 = "แต่ยูคาริผู้นี้... จะไม่ยอมแพ้หรอกเจ้าค่ะ!"
1008102-112 = "ฮู่ว! ชนะได้แล้วเจ้าค่ะ!"
1008102-113 = "เป็นเกมแบบนี้เองสินะเจ้าคะ!"
1008102-114 = "อ๊ะ "
1008102-115 = "ท่านอาจารย์! แล้วตรงนี้คืออะไรเหรอเจ้าคะ?!"
1008102-116 = "[s] \"อ้อ นั่นคือตู้คีบตุ๊กตาน่ะ\""
1008102-117 = "เกมที่เราได้เป็นคนขับ[ruby=UFO]ยูว~เอฟ~โอ้ว[/ruby] แล้วลักพาตัวพวกตุ๊กตา... เหรอเจ้าคะ?"
1008102-118 = "มิส~ที~เรี้ยส~ มากเจ้าค่ะ!"
1008102-119 = "ต่อไปอันนี้เจ้าค่ะ! ข้าอยากลองเล่นอันนี้เจ้าค่ะ!"
1008102-125 = "(คุณครูกับยูคาริได้เล่นเกมต่างๆ มากมายด้วยกันในร้านเกม)"
1008102-127 = "ฮู้วว! เกมที่เพิ่งเล่นเมื่อกี้ก็สนุกมากเลยเจ้าค่ะ!"
1008102-128 = "ทั้งเกมยิงปืน... เกมวิ่งไปทางขวาแล้วกำจัดศัตรู... เกมเหยียบพื้นตามจังหวะ... ไหนจะเกมขี่รถ#nมอเตอร์ไซค์อีก!"
1008102-129 = "ในโลกนี้มีเกมมากมายหลายแบบเลยนะเจ้าคะ!"
1008102-130 = "[s] \"เป็นไงบ้าง ชอบหรือเปล่า?\""
1008102-131 = "ชอบเจ้าค่ะ!"
1008102-132 = "ปกติแล้ว... ข้าก็อยู่แต่บ้านหรือไม่ก็ไปทำกิจกรรมของทางเฮียกกะเรียวรัน ก็เลยแทบจะไม่ได้มา#nสัมผัสอะไรแบบนี้"
1008102-133 = "แบบนี้เองสินะเจ้าคะ... ปกติแล้วคนอื่นๆ มาเล่นสนุกอะไรแบบนี้เพื่อ <หายใจหายคอ> กันนี่เอง"
1008102-134 = "ข้าเองก็ถูกใจอะไรแบบนี้มากเลยเจ้าค่ะ!"
1008102-135 = "[s] \"ก็ดีแล้วละที่ได้พักหายใจหายคอกับเขาบ้าง\""
1008102-136 = "เจ้าค่ะ!"
1008102-137 = "อ่า... นะ... แน่นอนว่าที่ข้าได้พักหายใจหายคอ... "
1008102-138 = "ไม่ใช่ว่าเพราะได้เล่นเกมเท่านั้น... แต่เป็นเพราะท่านอาจารย์ต่างหาก..."
1008102-139 = "[s] \"หืม?\""
1008102-140 = "อ๊ะ ไม่มีอะไรเจ้าค่ะ ท่านอาจารย์!"
1008102-141 = "เอาละ! ไปที่เกมต่อไปเลยเจ้าค่ะ! เอาอันนั้นเลย...!"
1008102-143 = "(หลังจากนั้นคุณครูก็ตามยูคาริไปเล่นเกมด้วยกันอีกหลายเกม)"

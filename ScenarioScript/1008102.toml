1008102-10 = "[s] \"언제 어디서나 늘 전력투구하는 게 유카리 다운 걸.\""
1008102-11 = "3;유카리;01;그 말씀대로! 늘 전력투구하는 것! 그 또한 저 유카리의 무수히 많은 장점 중 하나!\n#3;hophop"

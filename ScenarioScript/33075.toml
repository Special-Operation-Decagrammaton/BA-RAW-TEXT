[translation]
33075-2 = "อะ... อึ่ก! นั่นมันอะไรกันคะ...?"
33075-3 = "......."
33075-8 = "อานุภาพนั่นมัน... ไม่ว่าจะต่อสู้แค่ไหนก็ไม่รู้สึกถึงการตอบสนองเลย..."
33075-9 = "นั่นคนจริงๆ เหรอคะ...? หรือจะเป็น..."
33075-10 = "คุณฮาสุมิ... นั่นมัน... ไม่สิ... คนนั้นคือ... "
33075-11 = "ซิสเตอร์ฮินาตะ...? "
33075-12 = "ฉันเคยเห็นชุดแบบนี้จากในหนังสือค่ะ... ชุดของกลุ่มสาวก..."
33075-13 = "กลุ่มสาวก? คืออะไรเหรอคะ?"
33075-16 = "สาวกยูสตาร์!!  ผู้พิทักษ์บรรทัดฐานที่หายไปเมื่อหลายร้อยปีก่อน...?!  ทำไมมาอยู่ที่นี่ตอนนี้ได้ล่ะ...?!"
33075-21 = "ตอนต่อไป;วันแห่งการมอดไหม้และเถ้าถ่าน (2)"

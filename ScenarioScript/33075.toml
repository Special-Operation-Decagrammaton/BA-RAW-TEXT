[translation]
33075-2 = "呃！那個到底是什麼啊……！？"
33075-3 = "……"
33075-8 = "那個威力……還有不管怎麼戰鬥都沒有手感，這個奇怪的感覺……"
33075-9 = "那個，真的是「人」……？還是說……"
33075-10 = "蓮實同學……那是，那個人是……"
33075-11 = "日向修女……？"
33075-12 = "那副樣子，我有在書上看過……那是「聖徒會」的服裝。"
33075-13 = "……「聖徒會」？"
33075-16 = "「優斯提娜聖徒會」……數百年前應該消失的「戒律的守護者」，為什麼在這裡……！？"
33075-21 = "下一話;染上火與灰燼之日（２）"

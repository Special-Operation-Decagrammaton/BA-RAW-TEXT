[translation]
33075-2 = "くっ！一体何ですか、あれは……！？"
33075-3 = "……。"
33075-8 = "あの威力……そしていくら戦っても手ごたえの無い、この不思議な感覚……。"
33075-9 = "あれは、本当に「人」……？それとも……"
33075-10 = "ハスミさん……あれは、あの人は……。"
33075-11 = "シスターヒナタ……？"
33075-12 = "あの姿、本で見たことがあります……あれは「聖徒会」の服装。"
33075-13 = "……「聖徒会」？"
33075-16 = "「ユスティナ聖徒会」……数百年前に消えたはずの「戒律の守護者たち」が、どうして今ここに……！？"
33075-21 = "次回;火と灰に染まる日（２）"

[translation]
1003706-1 = "#title;보안위원장의 오해"
1003706-2 = "#place;붉은겨울 학원 제8지구 외곽 보안 초소"
1003706-3 = "3;마리나;01;네 녀석들, 이런 짓을 저지르고도 무사할 줄 아느냐!\n#3;a\n#3;stiff\n#3;em;[빠직]"
1003706-4 = "3;마리나;05;사무국으로 돌아가는 즉시 모조리 숙청해 주마!"
1003706-5 = "3;마리나;05\n5;보안위원 붉은겨울;00;시끄러워! 제한구역에 멋대로 들어온 주제에, 뭐가 그렇게 불만인 거야?\n#3;m1\n#5;al\n#5;em;[반응]"
1003706-6 = "5;보안위원 붉은겨울;00;얌전히 머무르지 않으면 너야말로 험한 꼴을 볼 줄 알아!\n#5;hophop"
1003706-7 = "3;마리나;08;젠장, 이런 일이 생길 줄 알았더라면 산책을 나오기 전에 학생증을 챙겨 나왔을 텐데…….\n#3;em;…"
1003706-8 = "[s] \"……무슨 일이야?\""
1003706-9 = "3;마리나;08\n5;보안위원 붉은겨울;00;응? 너는 또 누구지?\n#3;dl\n#5;m3\n#5;em;[?]"
1003706-10 = "5;보안위원 붉은겨울;00;이곳은 붉은겨울 학원의 최전선. 그걸 알고도 이 근처를 배회하는 건 바보나 스파이, 둘 중 하나 밖에 없을 텐데……."
1003706-11 = "5;보안위원 붉은겨울;00;신분을 증명할 수 없다면, 네 녀석도 스파이 혐의로 함께 체포하겠다!\n#5;hophop"
1003706-12 = "[s] 신분증을 내민다."
1003706-13 = "5;보안위원 붉은겨울;00;이 신분증은…… 샬레의 선생? 그렇다면 최근 서기장님이 무한한 신뢰를 보내고 있다는 그 <콤라드>가 이 사람이란 말인가?\n#5;em;…"
1003706-14 = "5;보안위원 붉은겨울;00;바로 알아보지 못해 실례했습니다. 이곳은 워낙 외진 곳이라, 초상화의 전달이 워낙 느려서요.\n#5;greeting"
1003706-15 = "5;보안위원 붉은겨울;00;하지만 선생님의 활약상은 <붉은 곰>을 통해서 익히 전해 들었습니다. 만나 뵙게 되어 영광입니다!\n#5;em;[반짝]"
1003706-16 = "[s1] \"그보다 이 상황은……\"\n[s2] \"어째서 마리나를 구속하고 있는 거야?\""
1003706-17 = "1;마리나;01\n5;보안위원 붉은겨울;00;아, 보안위원장을 사칭한 이 스파이 말씀이시군요.\n#5;m5\n#1;ar\n#5;em;[반응]"
1003706-18 = "1;마리나;01\n5;보안위원 붉은겨울;00;아, 보안위원장을 사칭한 이 스파이 말씀이시군요.\n#5;m5\n#1;ar\n#5;em;[반응]"
1003706-19 = "5;보안위원 붉은겨울;00;이 멍청한 스파이는 신분증도 없이 보안위원들이 감시 중이던 제한 구역에 들어오려 했습니다."
1003706-20 = "5;보안위원 붉은겨울;00;게다가 뻔뻔하게도 자신이 보안위원장이라며 신분을 사칭하기까지……\n#5;em;…"
1003706-21 = "1;마리나;12;그러니까 내가 보안위원장이라고 말했잖아? 어째서 믿어 주질 않는 거야?\n#1;hophop"
1003706-22 = "5;보안위원 붉은겨울;00;시끄러워, 스파이! 너 같은 게 보안위원장일 리가 없잖아?\n#5;hophop\n#5;em;[!]"
1003706-23 = "5;보안위원 붉은겨울;00;<붉은 곰>의 기사에 따르면…… 마리나 보안위원장님은 키는 조금 작긴 하지만 온몸에서 무시무시한 아우라가 흘러나와 그 어떤 맹수도 범접할 수 없는 분이라고 쓰여 있었지."
1003706-24 = "5;보안위원 붉은겨울;00;그런데 산책을 하다 길을 잃고, 고양이에게 쫓기기나 하는 멍청이가 보안위원장님이라는 게 말이나 돼?"
1003706-25 = "1;마리나;08;어, 그건 그러니까…….\n#1;em;[땀]\n#1;stiff"
1003706-26 = "5;보안위원 붉은겨울;00;게다가 보안위원장은 체리노 회장님을 가까이에서 보좌하며 회장님의 일거수일투족을 관리하는 중책이거늘……\n#5;em;…"
1003706-27 = "5;보안위원 붉은겨울;00;그런데 너는 체리노 회장님의 키가 얼마인지도 제대로 답하지 못했잖아!"
1003706-28 = "5;보안위원 붉은겨울;00;너 같은 멍청이가 마리나 님을 사칭하다니, 뻔뻔함에도 유분수가 있지!"
1003706-29 = "5;보안위원 붉은겨울;00;진짜 마리나 보안위원장님은 훨씬 더 위대한 분이시라고!\n#5;hophop"
1003706-30 = "1;마리나;12;…….\n#1;em;…"
1003706-31 = "[s] \"그게, 사실은 이쪽이 진짜—\""
1003706-32 = "5;보안위원 붉은겨울;00\n1;마리나;06;……아니, 선생. 나는 보안위원장이 아니야.\n#5;dr\n#1;m3"
1003706-33 = "1;마리나;08;비록 뭔가 잘못된 정보가 전달된 것 같지만, 그래도 일면식도 없는 나를 위해 열심히 일해 온 이 보안위원들의 꿈을 깨트릴 수는 없어…….\n#1;em;[땀]\n#1;stiff"
1003706-34 = "1;마리나;06;그러니 지금은 날 모른 척해줘!"
1003706-35 = "#all;hide"
1003706-36 = "#na;(이후, 보안위원들에게 전후 사정을 설명하여 마리나를 데리고 나왔다.)"
1003706-37 = "#all;hide"
1003706-38 = "3;마리나;06;우으…… 수치스러워…… 이대로는 사무국으로 못 돌아가…….\n#3;a\n#3;stiff\n#3;em;[속상함]"
1003706-39 = "3;마리나;08;앞장서서 모범을 보여야 할 위원들 앞에서 이런 추태를 보이다니. 그것도 심지어 샬레의 선생에게 이런 도움까지 받아 가며……."
1003706-40 = "3;마리나;06;나는 더 이상 붉은겨울 학원의 보안위원을 맡을 자격이 없어."
1003706-41 = "3;마리나;06;사무국으로 돌아가는 즉시 체리노님께 사직서를 제출해야겠어……."
1003706-42 = "[s3] \"그럴 필요는 없어.\"\n[s4] \"내가 보기에 마리나는 이미 훌륭한 보안위원장이야.\""
1003706-43 = "3;마리나;04;……어째서 그렇게 생각하는 거지, 선생?\n#3;em;[?]"
1003706-44 = "3;마리나;04;……어째서 그렇게 생각하는 거지, 선생?\n#3;em;[?]"
1003706-45 = "3;마리나;08;나는 길고양이에게도 이기지 못하고, 체리노님의 프로필도 제대로 외우지 못하는, 반쪽짜리 위원일 뿐인데……."
1003706-46 = "3;마리나;08;이런 내게, 보안위원장으로서의 가치가 아직도 남아 있을까?\n#3;em;[속상함]\n#3;stiff"
1003706-47 = "[s] \"어…….\""
1003706-48 = "3;마리나;12;거기서 입 다물지 마!\n#3;hophop"
1003706-49 = "3;마리나;12;기왕 응원해 주기로 했으면 내 좋은 점을 하나라도 말해보라고!"
1003706-50 = "[s5] \"마리나는 사람의 말을 잘 믿어줘!\"\n[s6] \"마리나는 화장실 청소를 잘해!\""
1003706-51 = "3;마리나;04;사람의 말을 잘 믿어주는 것이 보안위원장의 일과 무슨 상관이 있는 거지?\n#3;em;[?]"
1003706-52 = "3;마리나;04;부하들의 말도 의심 없이 믿어 주기 때문에 보안위원들로부터 깊은 신뢰를 받고 있다고?"
1003706-53 = "3;마리나;99;확실히…… 그러고 보면 보안위원들은 쿠데타를 일으킬 때면 언제나 군말 없이 나를 믿고 따라주었지.\n#3;em;…"
1003706-54 = "3;마리나;04;화장실 청소? 그게 보안위원장의 일과 무슨 상관이 있는 거지?\n#3;em;[?]"
1003706-55 = "3;마리나;04;더러운 세균으로부터 학생의 안전을 지키는 것도 어엿한 보안위원회의 활동이라고?"
1003706-56 = "3;마리나;99;확실히…… 그러고 보면 붉은겨울 학원에서는 더러운 화장실 때문에 안전사고가 일어난 적은 한 번도 없었지.\n#3;em;…"
1003706-57 = "3;마리나;03;……훗. 어쩔 수 없군. 선생이 그렇게 말한다면 이번의 결정은 재고해볼까."
1003706-58 = "3;마리나;09;지금 나를 대신하여 보안위원장을 맡을 적당한 인재도 없거니와, 한 번 실수는 병가지상사라는 말도 있으니까!\n#3;em;[반짝]"
1003706-59 = "3;마리나;11;앞으로 멋진 모습을 계속 보여 오늘의 실수를 만회하는 거야!\n#3;hophop"
1003706-60 = "#all;hide"
1003706-61 = "#na;(이후, 묘하게 들뜬 마리나를 따라 다시 사무국으로 돌아갔다.)"
1003706-62 = "#na;(……하지만 돌아가는 길에 마리나의 착각으로 또다시 길을 잃고 말았다…….)"

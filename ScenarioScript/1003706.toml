[translation]
1003706-1 = "Security Committee Chair's Misunderstanding"
1003706-2 = "Red Winter District 8 Security Post"
1003706-3 = "Do you really think you'll get away with this?!"
1003706-4 = "I'll purge every single one of you once I get back to the Secretariat!"
1003706-5 = "Silence! You were trespassing in a restricted area."
1003706-6 = "Behave yourself!"
1003706-7 = "I'm never leaving my house without my student ID again..."
1003706-8 = "[s] \"What's going on here?!\""
1003706-9 = "Huh? Who are you?"
1003706-10 = "This is the forefront of Red Winter Academy. Only fools and spies tread here, so which one are you?"
1003706-11 = "If you don't have proper identification, I'll arrest you as a spy too!"
1003706-12 = "[s] Show your ID."
1003706-13 = "This ID says...you're that Sensei from Schale? The comrade who has garnered the Great Leader's utmost trust?"
1003706-14 = "I'm sorry I didn't recognize you. This place is so remote that photo records take forever to get here."
1003706-15 = "But I've heard about your achievements through the Red Bear newspaper.#nIt's an honor to meet you!"
1003706-16 = "[s1] \"So, care to explain what's happening?\"\n[s2] \"Why are you arresting Marina?\""
1003706-17 = "Oh, you mean this spy who is impersonating the security chair?"
1003706-18 = "Oh, you mean this spy who is impersonating the security chair?"
1003706-19 = "She tried to enter a restricted area under the protection of the Security Council with no identification!"
1003706-20 = "And she had the audacity to claim she was the security chair herself."
1003706-21 = "What do I have to do for you to believe me?!"
1003706-22 = "Shut up, spy! There's no way you're the security chair!"
1003706-23 = "According to the Red Bear...Security Chair Marina is petite, but terrifying in ways an average student can't even imagine. Not even the most ferocious beast could take her."
1003706-24 = "And then this bumbling fool, who got lost on her walk while running from a stray cat, says she's the security chairman. Ha!"
1003706-25 = "O-Oh. Well, that's because..."
1003706-26 = "Also, the security chair is a close assistant to President Cherino, responsible for the Great Leader's safety..."
1003706-27 = "And you don't even know how tall she is!"
1003706-28 = "How dare you impersonate the great Marina?! You're shameless!"
1003706-29 = "The real Security Chair Marina is an admirable and respected person!"
1003706-30 = "..."
1003706-31 = "[s] \"Actually, this is—\""
1003706-32 = "No, Sensei. I'm not the security chair."
1003706-33 = "Hearing the way she described me... I don't want to disappoint the Security Council members who admire an ideal of me I can't live up to."
1003706-34 = "So it would be best to pretend you don't know who I am."
1003706-36 = "I explained the situation to the Security Council members and took Marina back with me."
1003706-38 = "I'm so ashamed... I can't go back to the Secretariat like this."
1003706-39 = "Rather than being a role model to my members, I humiliated myself and needed help from you, Sensei."
1003706-40 = "I don't deserve the title of the Red Winter Academy security chair."
1003706-41 = "I'll submit my letter of resignation to President Cherino immediately."
1003706-42 = "[s3] \"That might be going a bit too far.\"\n[s4] \"That'd be a big loss for the Security Council.\""
1003706-43 = "What do you mean, Sensei?"
1003706-44 = "What do you mean, Sensei?"
1003706-45 = "I'm afraid of stray cats and can't even memorize the president's profile information..."
1003706-46 = "How can I deserve my role?"
1003706-47 = "[s] \"Hmm. If you say so.\""
1003706-48 = "What's that supposed to mean?!"
1003706-49 = "If you're going to encourage me, do it properly!"
1003706-50 = "[s5] \"You trust people!\"\n[s6] \"You're good at cleaning bathrooms!\""
1003706-51 = "What does trusting people have to do with anything?"
1003706-52 = "Because I trust my subordinates without suspicion, they return that trust?"
1003706-53 = "Well... Come to think of it, the Security Council members have always followed me whenever I staged a coup."
1003706-54 = "Cleaning the bathroom? What does that have to do with anything?"
1003706-55 = "My dedication to protect students from bacteria is admirable?"
1003706-56 = "Come to think of it...there have never been any issues due to poor sanitation."
1003706-57 = "Well, if you insist. I'll reconsider my resignation."
1003706-58 = "No one is talented enough to take over my position! And there's a saying that a stumble may prevent a fall!"
1003706-59 = "I'm going to make up for today's mistake by continuing to exemplify greatness!"
1003706-61 = "I followed Marina to the Secretariat. She was suddenly strangely excited..."
1003706-62 = "...but still managed to take a wrong turn and get lost again."

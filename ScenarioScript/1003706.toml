[translation]
1003706-1 = "ความเข้าใจผิดของหัวหน้าคณะฯ"
1003706-2 = "ศูนย์รักษาความปลอดภัยชายขอบที่ 8 สหภาพเรดวินเทอร์"
1003706-3 = "นี่พวกเธอ! คิดว่าก่อเรื่องแบบนี้แล้วจะรอดไปได้งั้นเรอะ!"
1003706-4 = "ถ้าฉันไปถึงสำนักเลขาธิการละก็โดนลงโทษแน่!"
1003706-5 = "เงียบไปเลย! เข้ามาในเขตหวงห้ามตามอำเภอใจแล้วยังจะมีหน้ามาบ่นอะไรอีก!"
1003706-6 = "ถ้าไม่ทำตัวดีๆ เธอนั่นแหละที่จะโดนดี!"
1003706-7 = "ฮึ่ม! ถ้ารู้ว่าจะเกิดเรื่องอย่างนี้ ก่อนออกมาเดินเล่นก็น่าจะหยิบบัตรนักเรียนออกมาด้วย..."
1003706-8 = "[s] \"เกิดอะไรขึ้นเหรอ?"
1003706-9 = "หืม? ใครเนี่ย?"
1003706-10 = "นี่คือเขตแดนหน้าสุดของสหภาพเรดวินเทอร์ รู้แล้วยังมาเดินเตร็ดเตร่แถวนี้อีก คงจะเป็นอะไรไปไม่ได้#nนอกจากคนทึ่มไม่ก็สายลับ"
1003706-11 = "ถ้ายืนยันตัวตนไม่ได้ ฉันจะจับทั้งคู่ในข้อหาเป็นสายลับ!"
1003706-12 = "[s] ยื่นบัตรประจำตัวให้"
1003706-13 = "บัตรนี่มัน... ครูจากชาเล่ต์เหรอ? งั้นคนที่ท่านเลขานุการบอกว่ามอบความไว้วางใจอย่างถึงขีดสุด#nก็คือ <สหาย> คนนี้เหรอ?"
1003706-14 = "ขอโทษด้วยค่ะที่ไม่ทันรู้ ที่นี่เป็นเขตห่างไกลมาก ภาพบุคคลก็เลยถูกส่งมาช้าน่ะค่ะ "
1003706-15 = "แต่พวกเราก็ได้ข่าวรางวัลบุคคลดีเด่นของคุณครูผ่าน <เรดแบร์> นะคะ เป็นเกียรติเหลือเกินที่ได้พบค่ะ!"
1003706-16 = "[s1] \"เดี๋ยวนะ สถานการณ์นี่มัน...\"\n[s2] \"ทำไมมารินะถึงถูกจับกุมไว้ล่ะ?\""
1003706-17 = "อ๋อ หมายถึงสายลับที่แอบอ้างว่าเป็นหัวหน้าคณะความมั่นคงสินะคะ"
1003706-18 = "อ๋อ หมายถึงสายลับที่แอบอ้างว่าเป็นหัวหน้าคณะความมั่นคงสินะคะ"
1003706-19 = "สายลับซื่อบื้อคนนี้พยายามจะเข้าเขตหวงห้ามที่สมาชิกคณะความมั่นคงตรวจตราอยู่"
1003706-20 = "มาแบบไม่มีบัตรประจำตัวยังไม่พอ แถมยังปลอมตัวเป็นหัวหน้าคณะความมั่นคงอีก"
1003706-21 = "ก็บอกอยู่นี่ไงว่าฉันคือหัวหน้าคณะความมั่นคง ทำไมไม่เชื่อกันเลย?"
1003706-22 = "หนวกหูน่าเจ้าสายลับ! คนอย่างเธอจะเป็นหัวหน้าคณะความมั่นคงได้ไง?"
1003706-23 = "ใน <เรดแบร์> บอกไว้ว่าหัวหน้าคณะความมั่นคงมารินะค่อนข้างตัวเล็ก แต่ก็มีออร่าแห่งความน่า#nยำเกรงออกมาจากตัว แม้แต่สัตว์ดุร้ายก็ไม่อาจเข้าถึงตัวได้"
1003706-24 = "จะบอกว่าคนทึ่มที่ออกมาเดินเล่นแล้วหลงทาง แถมยังโดนแมววิ่งไล่เนี่ยนะเป็นหัวหน้าคณะความมั่นคง ใครจะไปเชื่อ?"
1003706-25 = "เอ่อ คือว่า..."
1003706-26 = "หัวหน้าคณะความมั่นคงมีหน้าที่ช่วยเหลือและจัดการตารางงานให้ท่านประธานเชริโน่อย่างใกล้ชิด"
1003706-27 = "อย่าว่าแต่เรื่องความรับผิดชอบเลย แค่ส่วนสูงของท่านประธานเชริโน่ยังตอบไม่ได้!"
1003706-28 = "คนทึ่มอย่างเธอปลอมตัวเป็นท่านมารินะได้อย่างไร! ใจกล้าบ้าบิ่นมากไปแล้ว!"
1003706-29 = "ท่านหัวหน้าคณะความมั่นคงมารินะดูน่ายกย่องมากกว่าอีก"
1003706-30 = "......"
1003706-31 = "[s] \"เอ่อ คนนี้แหละตัวจริงเสียงจริง...\""
1003706-32 = "ไม่หรอกครู ฉันไม่ใช่หัวหน้าคณะความมั่นคงหรอก"
1003706-33 = "ถึงจะดูเหมือนว่ามีการส่งข้อมูลผิดพลาด แต่ฉันก็ทำลายความฝันของสมาชิกคณะความมั่นคง#nที่ตั้งใจทำงานเพื่อฉันไม่ได้หรอก ถึงเราจะไม่เคยเจอหน้ากันเลยก็เถอะ"
1003706-34 = "เพราะแบบนั้น ช่วยแกล้งทำเป็นไม่รู้จักฉันเถอะนะ"
1003706-36 = "(คุณครูช่วยอธิบายสถานการณ์กับสมาชิกคณะความมั่นคงและพามารินะออกมา)"
1003706-38 = "ขายขี้หน้าชะมัด... ฉันไม่กล้ากลับไปสำนักเลขาธิการหรอก..."
1003706-39 = "ต้องมาอับอายต่อหน้าสมาชิกคณะฯ ที่ฉันควรจะเป็นตัวอย่างที่ดีแท้ๆ แถมยังต้องพึ่งพาครูจาก#nชาเล่ต์ด้วย..."
1003706-40 = "ฉันไม่มีคุณสมบัติที่จะเป็นสมาชิกคณะความมั่นคงแห่งสหภาพเรดวินเทอร์อีกต่อไปแล้วละ"
1003706-41 = "แบบนี้คงต้องกลับไปที่สำนักเลขาธิการแล้วยื่นใบลาออกกับท่านเชริโน่..."
1003706-42 = "[s3] \"ไม่ต้องทำอย่างนั้นหรอก\"\n[s4] \"สำหรับครู มารินะคือหัวหน้าคณะความมั่นคงที่ยอดเยี่ยมมากแล้ว\""
1003706-43 = "ทำไมถึงคิดอย่างนั้นล่ะครู...?"
1003706-44 = "ทำไมถึงคิดอย่างนั้นล่ะครู...?"
1003706-45 = "ฉันทั้งสู้แมวจรไม่ได้ ทั้งจำข้อมูลของท่านเชริโน่ได้ไม่ดี แบบนี้จะเรียกว่าเป็นคณะความมั่นคง#nเต็มตัวได้ไง..."
1003706-46 = "ฉันยังเหลือคุณค่าของหัวหน้าคณะความมั่นคงอยู่อีกเหรอ?"
1003706-47 = "[s] \"อื้ม...\""
1003706-48 = "อย่าหยุดแค่นั้นสิ!"
1003706-49 = "ไหนๆ ก็จะให้กำลังใจฉันแล้ว ช่วยพูดข้อดีของฉันออกมาหน่อย!"
1003706-50 = "[s5] \"มารินะเป็นคนเชื่อฟังคำคนอื่น!\"\n[s6] \"มารินะทำความสะอาดห้องน้ำเก่ง!\""
1003706-51 = "การเชื่อฟังคำคนอื่นมันเกี่ยวข้องกับการเป็นหัวหน้าคณะความมั่นคงยังไงล่ะนั่น?"
1003706-52 = "เพราะฉันเชื่อลูกน้องอย่างไม่มีข้อกังขา ก็เลยได้รับความไว้วางใจจากสมาชิกคณะความมั่นคงอยู่เช่นนี้ แบบนี้น่ะเหรอ?"
1003706-53 = "ก็จริงอยู่นะ... พอมีการปฏิวัติ สมาชิกคณะความมั่นคงก็เชื่อฟังและทำตามคำสั่งของฉันโดยไม่บ่นเลย"
1003706-54 = "ทำความสะอาดห้องน้ำเหรอ? การทำความสะอาดห้องน้ำมันเกี่ยวข้องกับการเป็นหัวหน้าคณะ#nความมั่นคงยังไงล่ะนั่น?"
1003706-55 = "การดูแลความปลอดภัยของนักเรียนจากแบคทีเรียที่สกปรกคือการกระทำที่องอาจของสมาชิกคณะ#nความมั่นคงแบบนี้น่ะเหรอ?"
1003706-56 = "ก็จริงอยู่นะ... เพราะที่ผ่านมาสหภาพเรดวินเทอร์ไม่เคยมีอุบัติเหตุที่เกิดจากห้องน้ำที่สกปรกเลย"
1003706-57 = "ฮุฮุ ก็ช่วยไม่ได้นะ... ถ้าครูพูดอย่างนี้ เห็นทีต้องพิจารณาการตัดสินใจใหม่"
1003706-58 = "อีกอย่างตอนนี้ก็ยังไม่มีใครที่เหมาะกับตำแหน่งหัวหน้าคณะความมั่นคงมากกว่าฉัน เรื่องที่ฉันพลาดไป#nก็ให้เป็นบทเรียนแล้วกัน!"
1003706-59 = "ฉันจะชดเชยความผิดพลาดในวันนี้ด้วยความรับผิดชอบที่เต็มเปี่ยมในอนาคต!"
1003706-61 = "(จากนั้นก็ตามมารินะที่ดูตื่นเต้นอย่างประหลาดกลับมาที่สำนักเลขาธิการ)"
1003706-62 = "(แต่ขากลับก็หลงทางอีกเพราะมารินะจำทางผิด...)"

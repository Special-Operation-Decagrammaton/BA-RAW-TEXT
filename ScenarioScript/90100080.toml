90100080-3 = "3;쿠루미;02;보고, 여기는 FOX 3.\n#3;em;[반응]"
90100080-4 = "3;쿠루미;01;현 시각은 키보토스 표준시로 1000시. 현재 기온은 섭씨 28도, 풍속은 약 3 노트."

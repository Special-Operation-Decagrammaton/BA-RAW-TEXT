[translation]
90100080-1 = "第8話;陽炎の向こうから"
90100080-3 = "報告、こちらFOX3。"
90100080-4 = "現在、キヴォトス標準時1000。気温は摂氏28度、風速およそ3ノット。"
90100080-5 = "FOX4と共にポイントロメオにおいて、#n方位0-3-0方向に特異現象――通称「白いかかし」の発生を監視中。"
90100080-6 = "地面の温度は順調に上がってきてるけど、まだ陽炎が立つ気配はなさそう。"
90100080-10 = "なんか退屈だなぁ。いつ来るか分からない対象を待つなんてさ。"
90100080-11 = "あっ、オトギ――じゃなくてFOX4！回線に割り込まないでよ！"
90100080-12 = "そんな細かいこと気にしなくてよくない？#nおしゃべりしてたほうが楽しいじゃん。"
90100080-13 = "こちらFOX4。FOX3の言う通り、特異現象どころか普通の陽炎すら立ってないよ。#n地面の熱さが足りてないんだろうね。"
90100080-14 = "……にしても、今日は日陰で待機してて平気なの？"
90100080-15 = "前より全然ラクだから不満はないけど。"
90100080-19 = "こちらFOX1。作戦に変更はない。今は陽炎に集中しろ。"
90100080-20 = "容疑者の決定的証拠はまだないが、被害者と同じ視界で現場を観測すれば、手がかりを拾えるかもしれない。"
90100080-21 = "つまり……陽炎をずっと見てたら、なんか出てくるってこと？"
90100080-22 = "陽炎の形にぐにゃっと歪んだゾンビが歩いてくるとかさ～"
90100080-23 = "そ、そんなのあるわけないでしょ！？"
90100080-24 = "「白いかかし」の正体を確認するまでは、「ありえない」と切り捨てることはできない。"
90100080-25 = "……冗談だって。ほんと隊長さんは冗談が通じないよねぇ。"
90100080-30 = "こちらFOX2。ポイントシエラにて方位2-1-0方向を観測中。#nこっちも今のところ異常なしだよ。"
90100080-31 = "それより……今日は先生来ないのかな？"
90100080-32 = "あ、なんか別の仕事があるって言ってたよ。"
90100080-33 = "なにさ、何か用でもあったの？"
90100080-34 = "う、ううん。そういうのじゃないんだけど……。"
90100080-35 = "なんだろう……嫌な予感がするんだ。"
90100080-36 = "急に先生の助けなしで動くと思うと、ちょっと不安になってね。"
90100080-37 = "えー、今までだって自分たちで片づけてきたじゃん？"
90100080-38 = "まあ、先生と一緒だとおいしいお菓子とか出てきて楽しいのはあるけど。"
90100080-39 = "あんた、先生のことを補給係か何かだと思ってない……？"
90100080-40 = "ていうかFOX4……矯正局を出てから太ったよね？"
90100080-41 = "筋肉だから！"
90100080-44 = "FOX2。何かあったか？"
90100080-45 = "ううん。さっきも言ったけど、ただの予感だから。気にしないで。"
90100080-46 = "だが、ニコの勘はよく当たる。無視はできない。"
90100080-47 = "……FOX1らしくないね。ちょっと弱気で、感覚的。"
90100080-48 = "情報が揃うまでは軽々しく判断するなって言ってなかった？"
90100080-49 = "作戦立案と違って、現場では直感も武器になり得る。"
90100080-50 = "いくら慎重になっても足りないくらいだ。"
90100080-51 = "経験が多いと身体が覚えてる時もあるし……一理あるね。"
90100080-52 = "でも私が気になったのは、敵の奇襲とか、狙撃とか、そういうのじゃなくて……。"
90100080-53 = "もしかしたら、この作戦そのものに落とし穴があるかもしれない。#nいつの間にか味方に銃口を向けてるかもしれないみたいな――そういう根本の不安。"
90100080-54 = "例えば……そう、あのときの「兎狩り」みたいに。"
90100080-55 = "…………。"
90100080-56 = "……FOX1。連邦生徒会長って……本当に連邦生徒会長だった？"
90100080-57 = "当たり前だ。FOX2も映像と写真で確認しただろう？"
90100080-58 = "うん。顔立ちも、振る舞いも……間違いなく、記憶通りの連邦生徒会長だった。"
90100080-59 = "でも[ruby=不確かな存在]、ロアを[/ruby]相手にしてるからかな……任務中ずっと不安が消えないの。"
90100080-60 = "せめて、先生が隣にいてくれたら……。"
90100080-61 = "でも、忙しい先生を、毎日呼び出すわけにもいかないもんね。"
90100080-65 = "ああ。ひとまず、覚えておく。"
90100080-67 = "こちらFOX4、外気温が31度に到達。"
90100080-68 = "そろそろ陽炎が立ち始めるよ。"
90100080-69 = "かかしっぽいの見える？"
90100080-70 = "全然。あーでも、窓ガラスの反射した白い光と重なれば、白いかかしに見える……かも？"
90100080-72 = "うーん……。"
90100080-73 = "FOX4？"
90100080-74 = "いや、ちょっと目眩が……ずっと陽炎見てるせいかな……。"
90100080-75 = "そういえば、オデュッセイアで任務やってる隊員から聞いたんだけどさ。"
90100080-76 = "黙って水面を見続けてる生徒がいたら、すぐ引き離さなきゃいけないんだって。"
90100080-77 = "なんで？"
90100080-79 = "詳しくは聞けてないけど、波の動きが人を催眠にかけるとか何とか。"
90100080-80 = "だから自分で飛び込む前に、水面から引き離せって。"
90100080-82 = "それって……絵本に出てくる「セイレーンの歌」みたいな話？"
90100080-83 = "まあ、岩の上で歌う半人半魚の怪物よりは現実的かな。"
90100080-84 = "だからFOX4も気をつけて。#n陽炎に誘われてアスファルトの向こうに引きずり込まれるかもしれないから。"
90100080-85 = "まっさかぁ。似たような作戦はこれまで何回もやってきたじゃん。"
90100080-86 = "それに、おしゃべりな相棒が隣にいるんだから、そうやすやすと――"
90100080-91 = "……あれ？"
90100080-92 = "どうしたの？"
90100080-93 = "あんなとこに……草原なんてあったっけ？"
90100080-94 = "草原？どこ、何時方向？"
90100080-95 = "道路の向こう。青空の草原が見える。#n地図には載ってないし……蜃気楼？"
90100080-96 = "草が生い茂ってて……かかしが、1つ……その向こうで笑ってる白い服の人が――"
90100080-97 = "ん……？それ！「白いかかし」じゃない！？"
90100080-98 = "FOX4、座標は！？どっち！？"
90100080-110 = "薄気味悪くて……むわっとする風が吹いてくる方……。"
90100080-115 = "みんな「白いかかし」って言ってたけど……あれはかかしなんかじゃない。"
90100080-116 = "意志を持って動いてる。そうしないと存在できないんだ……。#n観測されなきゃ干渉できないから、目立つ白い服を着て踊ってるんだ。"
90100080-117 = "なに言ってんの！？FOX4！しっかりして！！"
90100080-118 = "来る……来るよ！巨大な灰色の波が、痙攣するみたいに、くねくねと、踊るみたいに、くねくねと――"
90100080-119 = "くねくねくねくねくねくね――"
90100080-129 = "オトギ！！"
90100080-135 = "な、なに！？銃声が聞こえたけど……。"
90100080-136 = "ポイントロメオ、応答しろ。何が起きた？"
90100080-140 = "いったた……FOX3が急におかしくなったみたい！#nいきなり走ってきて私の頭ぶん殴ったんだけど！"
90100080-141 = "はぁ！？あんた正気！？私が誰か分かる？"
90100080-145 = "なんでそんなこと聞くのさ……いつも通りの平坦な胸が目の前にあるし。"
90100080-146 = "ふざけないで！この指、何本に見える！？"
90100080-147 = "2本……？なに、どしたの。"
90100080-151 = "よかった……。#n被害者の人数が増えなくて……。"
90100080-152 = "FOX3。状況を報告しろ。"
90100080-153 = "こちらFOX3。直前まで陽炎を観測してたFOX4が――"
90100080-154 = "「白いかかし」を目撃したって言った。"
90100080-155 = "私が！？"
90100080-156 = "そうだよ。覚えてないの？#n「青い空の草原がどうの」とか、「灰色の波がどうの」とか、変なこと言い出したでしょ。"
90100080-157 = "全然覚えてない。"
90100080-158 = "クルミがオデュッセイアの話をしてるのを聞きながら、#nスコープ越しに陽炎を見てたつもりなんだけど。"
90100080-159 = "なんでだろ。白昼夢でも見てたのかな。"
90100080-160 = "無事ならそれでいい。さっき発砲された流弾による被害はないか？"
90100080-161 = "うぅ……いま確認する。"
90100080-162 = "変な所に飛んでなきゃいいけど。"
90100080-166 = "……あれ？"
90100080-167 = "ど、どうしたの？まさか市民に当たったとかじゃ――"
90100080-168 = "いや、それが……そもそも弾痕がない。#nでも弾は不発じゃないから、確かに撃ってるのに。"
90100080-169 = "は？50口径の弾丸が空中で蒸発でもしたってわけ？"
90100080-170 = "……やっぱり本当に幽霊だったのかな。"
90100080-173 = "FOX1、何か心当たりでも？"
90100080-174 = "まだ断定はできない。だが状況の整理は必要だな。"
90100080-178 = "全隊員、直ちにHQへ復帰する。装備を回収し、ランデブーポイントに集結しろ。"
90100080-180 = "ラジャー！"
90100080-182 = "次回;手掛かり"

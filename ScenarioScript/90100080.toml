90100080-10 = "2;통신오토기;99;뭔가 따분하네. 언제 나타날지 모르는 상대를 기다리고 있으려니."
90100080-11 = "2;통신오토기;99\n3;쿠루미;05;아앗, 오토기…… 아니, FOX 4! 멋대로 교신에 끼어들지 마!\n#3;m4\n#3;jump\n#3;em;[!]"

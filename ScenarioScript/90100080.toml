90100080-19 = "5;통신유키노;02;여기는 FOX 1. 작전 개시 전에 말했듯이 지금은 아지랑이에 집중하도록."
90100080-20 = "5;통신유키노;01;용의자에 대한 뾰족한 증거는 여전히 없지만, 피해자와 같은 시야에서 현장을 관측하면 증거를 확보할 수도 있으니까."
90100080-21 = "2;통신오토기;02;그 말인즉…… 아지랑이를 계속 지켜보고 있으면 뭔가 나온다는 거야?\n#2;em;[?]"
90100080-22 = "2;통신오토기;13;구부러진 아지랑이 모양으로 일그러진 좀비가 걸어나온다거나~\n#3;hide"

90100080-13 = "2;통신오토기;02;여기는 FOX 4. FOX 의 말대로 지금은 땅이 충분히 달궈지지 않아서 그런지, 이상현상은 커녕 평범한 아지랑이조차 피어 오르지 않고 있어.\n#3;dr\n#2;m3"
90100080-14 = "2;통신오토기;01;……그나저나. 오늘은 이렇게 그늘에서 대기하고 있어도 괜찮은 거야?"

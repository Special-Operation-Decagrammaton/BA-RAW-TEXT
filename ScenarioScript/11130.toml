[translation]
11130-2 = "ตอนที่ 13;ปฏิบัติการ! กองกำลังหน้ากากมิสึกิ 1"
11130-3 = "เขตเมืองในตลาดมืด"
11130-4 = "แฮ่ก...แฮ่ก... เหนื่อยจัง"
11130-5 = "เราเดินมาหลายชั่วโมงแล้วนะคะ..."
11130-6 = "ลุงแก่เกินกว่าจะมาเดินมาราธอนแบบนี้แล้วนะ เอวก็เจ็บ ข้อเข่าก็เสื่อม..."
11130-7 = "เอ๋...? คุณโฮชิโนะอายุเท่าไหร่นะคะ..."
11130-8 = "อายุไม่ได้ห่างกันเท่าไหร่หรอก!"
11130-9 = "อ๊ะ! ขนมไทยากิค่ะ!"
11130-10 = "ว้าว มีร้านขายขนมในที่แบบนี้ด้วยเหรอเนี่ย?"
11130-11 = "พวกเราไปกินไทยากิแล้วพักกันหน่อยไหมคะ? ฉันเลี้ยงเองค่ะ!"
11130-12 = "อะไรนะ? รุ่นพี่โนโนมิจะใช้บัตรเครดิตอีกแล้วเหรอ?!"
11130-13 = "เราใช้บัตรประจำตัวผู้ใหญ่ของคุณครูก็ได้นี่นา~"
11130-15 = "อื้ม! ก็ฉันอยากกินนี่คะ☆ มากินด้วยกันเถอะ"
11130-18 = "ขอบคุณนะคะ~!"
11130-19 = "(ง่ำๆ)"
11130-20 = "อร่อยจัง"
11130-21 = "ดีจัง กำลังน้ำตาลตกอยู่พอดีเลย"
11130-22 = "(กรอบแกรบ) แหะๆ... ขอบคุณที่ซื้อให้นะคะ"
11130-23 = "(ง่ำ)"
11130-24 = "เอ้า..."
11130-26 = "คุณครูก็กินด้วยกันสิ"
11130-27 = "[s] \"ขอบใจนะ\""
11130-29 = "ส่วนของอายาเนะจัง ฉันจะเก็บไว้ให้เองค่ะ ขอโทษที่ตอนนี้พวกเรากินกันก่อนนะคะ..."
11130-30 = "อะฮ่าฮ่า ไม่เป็นไรหรอกค่ะ รุ่นพี่โนโนมิ ทางนี้ฉันก็แอบกินขนมอย่างอื่นอยู่..."
11130-31 = "ระหว่างกินก็พักกันหน่อยแล้วกัน"
11130-33 = "ไม่น่าเชื่อเลยว่าเราจะหาข้อมูลที่ต้องการได้ยากขนาดนี้... แบบนี้มันแปลกๆ อยู่นะคะ"
11130-34 = "ข้อมูลของอาวุธยุทธศาสตร์ที่ตามหากันอยู่ ไม่ใช่ว่ามันจะไม่มีข้อมูลนะ แต่พอเราพยายามหา#nก็เหมือนว่ามันจะหายไป"
11130-35 = "ทั้งเส้นทางการค้าขาย... หรือแม้แต่บันทึกการจัดเก็บ ทุกอย่างดูผิดปกติ เหมือนว่ามีคนจงใจปกปิด#nข้อมูลเอาไว้เลยค่ะ"
11130-36 = "ถึงจะเป็นพวก <ธุรกิจ> ที่คุมตลาดมืดอยู่ก็ไม่น่าจะควบคุมตลาดมืดได้ขนาดนี้นะ..."
11130-37 = "มันน่าแปลกขนาดนั้นเลยเหรอ?"
11130-38 = "จะว่าแปลกก็แปลกอยู่หรอกค่ะ... แต่ทำไมถึงต้องทำขนาดนี้นะ? ฉันว่านี่มันจงใจเกินไปแล้ว..."
11130-39 = "เพราะกลุ่ม <ธุรกิจ> ที่นี่ทำเรื่องไม่ดีกันอย่างเปิดเผยสุดๆ ปกติแล้วเขาไม่ปกปิดอะไรหรอกค่ะ"
11130-40 = "เห็นตึกที่อยู่ตรงนั้นไหมคะ? นั่นคือธนาคารตลาดมืดที่มีชื่อเสียงของตลาดมืดค่ะ"
11130-41 = "ธนาคารตลาดมืด?"
11130-42 = "เป็นธนาคารที่ใหญ่ที่สุดในตลาดมืดน่ะค่ะ เท่าที่ได้ยินมา สิ่งของที่ถูกขโมยจากเหตุอาชญากรรม#nในคิโวทอสกว่า 15% ถูกส่งตรงไปที่นั่น..."
11130-43 = "แถมเงินจากการยักยอก จี้ปล้น และเรียกค่าไถ่ก็ยังส่งไปเก็บที่นั่น แล้วเปลี่ยนเป็นอาวุธผิดกฎหมายที่ใช้#nในอาชญากรรมอื่นต่อไป..."
11130-44 = "นับว่าเป็นวงจรอุบาทว์ดีๆ เลยละค่ะ"
11130-45 = "...เป็นไปได้ยังไง? นี่เท่ากับว่าธนาคารส่งเสริมให้เกิดอาชญากรรมเลยนะคะ"
11130-46 = "ใช่ค่ะ แต่ถ้าจะพูดให้ถูก ธนาคารนั่นก็เป็นหนึ่งในกลุ่มอาชญากรนั่นแหละค่ะ..."
11130-47 = "......"
11130-48 = "แบบนี้มันมากเกินไปแล้วนะ! องค์การนักเรียนมัวทำอะไรอยู่เนี่ย?"
11130-49 = "ทางนั้นก็คงมีเหตุผลของตัวเองแหละมั้ง"
11130-50 = "จริงๆ แล้วโลกใบนี้มันสกปรกกว่าที่เราคิดอีกสินะ พวกเราเอาแต่อยู่ในอะบิดอสก็เลยไม่รู้เรื่องของ#nโลกภายนอกเลย..."
11130-53 = "ทุกคนคะ! มีกองกำลังติดอาวุธกลุ่มหนึ่งกำลังไปทางนั้นอยู่ค่ะ!"
11130-54 = "!!!"
11130-55 = "ฉันคิดว่าพวกนั้นยังไม่เห็นทุกคน เพราะงั้นตอนนี้รีบไปซ่อนตัวก่อนดีกว่าค่ะ!"
11130-56 = "อ๊ะ? พวกนั้นคือผู้คุมตลาดค่ะ!"
11130-57 = "ผู้คุมตลาดเหรอ?"
11130-58 = "เป็นองค์กรระดับสูงสุดที่อยู่ในหน่วยงานความปลอดภัยที่ฉันเล่าให้ฟังน่ะค่ะ!"
11130-59 = "เร็วเข้าเถอะค่ะ!"
11130-62 = "...แค่มาตรวจพื้นที่เฉยๆ เหรอ? เหมือนมาคุ้มกันใครมากกว่าเลย..."
11130-63 = "(บรื้นนนน)"
11130-64 = "คุ้มกันรถบรรทุกอยู่... รถขนเงินสดสินะ"
11130-65 = "เดี๋ยวนะ... ทางนั้นมัน..."
11130-66 = "(บรื้นนนน)"
11130-67 = "เข้าไปในธนาคารตลาดมืดนี่คะ?"
11130-70 = "(เอี้ยดดด-)"
11130-71 = "เงินที่รับมาของเดือนนี้ครับ"
11130-72 = "มาไวกว่าที่คิดอีกนะ ทำได้ดีมาก เซ็นชื่อบนใบยืนยันการขับขี่ด้วย"
11130-74 = "ครับผม (แกรก แกรก)"
11130-75 = "ดีมาก"
11130-76 = "ขอบคุณมากนะครับ"
11130-79 = "เอาละ เปิดประตูได้ เงินที่เก็บได้เดือนนี้ส่งมาถึงแล้ว"
11130-80 = "(บรื้นนนนนนน)"
11130-82 = "เอ๋...? คนนั้นมัน...?"
11130-83 = "เดี๋ยวนะ...? อะไรเนี่ย?! พนักงานธนาคารที่มาเก็บดอกเบี้ยจากพวกเราไปทุกเดือนนี่...?"
11130-84 = "เอ๊ะ จริงด้วย"
11130-85 = "คะ?! เอ๋...?"
11130-86 = "เป็นแบบนี้ได้ไง?"
11130-87 = "จริงด้วยค่ะ!! นั่นมันรถบรรทุกของสินเชื่อไคเซอร์นี่คะ!"
11130-88 = "เหมือนกับรถบรรทุกที่ขนเงินของพวกเราไปเมื่อเช้านี้เลย! แล้วทำไมเข้าไปในตลาดมืดล่ะ?!"
11130-89 = "สะ.. สินเชื่อไคเซอร์เหรอคะ?!"
11130-90 = "ฮิฟุมิจังรู้จักด้วยเหรอ?"
11130-91 = "สินเชื่อไคเซอร์... เป็นบริษัทเงินกู้หน้าเลือดของ <ไคเซอร์ คอร์เปอเรชั่น> ที่โด่งดังค่ะ..."
11130-92 = "พวกอาชญากร... ที่โด่งดังเหรอ?"
11130-93 = "กะ...ก็ไม่เชิงหรอกค่ะ ไคเซอร์กรุ๊ปไม่ใช่บริษัทอาชญากรรมอะไรหรอกค่ะ แต่พวกเขาทำธุรกิจหลาก#nหลายอย่างและมักจะเลี่ยงกฎหมายได้อย่างมีชั้นเชิง เหมือนพลิกดำเป็นขาวได้..."
11130-94 = "พวกไคเซอร์พยายามที่จะขยายธุรกิจเข้ามาในเขตทรีนิตี้ เพราะงั้นสมาชิกของสภาน้ำชาต่างก็กลัวว่า#nจะเกิดปัญหาอะไรขึ้นกับพวกนักเรียน เลยจับตาดูพวกเขาอยู่ห่างๆ เหมือนกันค่ะ"
11130-95 = "สภาน้ำชา... หมายถึงสภานักเรียนของทรีนิตี้ใช่ไหม?"
11130-96 = "ว่าแต่ที่ทุกคนพูดถึงหนี้เมื่อกี้... หมายถึงทางโรงเรียนอะบิดอสกู้เงินมาจากทางสินเชื่อไคเซอร์เหรอคะ?"
11130-97 = "ใช่ค่ะ ถึงแม้เราจะไม่ได้เป็นคนกู้เงินมาก็เถอะ..."
11130-98 = "เรื่องมันยาวน่ะ อายาเนะจัง เราค้นหาเส้นทางเดินรถของรถบรรทุกเงินที่เข้าไปในธนาคารตลาดมืดได้ไหม?"
11130-99 = "ฉันจะตรวจสอบให้นะคะ"
11130-101 = "แย่จัง... ค้นหาไม่ได้เลยค่ะ พวกนั้นคงจัดเก็บข้อมูลทั้งหมดเป็นแบบออฟไลน์แน่ๆ ค่ะ ถึงได้หาอะไรไม่เจอเลย.."
11130-102 = "กะแล้วเชียวว่าจะเป็นแบบนั้น..."
11130-103 = "จะว่าไป พวกนั้นขอเงินสดจากพวกเรามาตลอดเลย... หรือว่า..."
11130-104 = "เงินสดที่พวกเราจ่ายไปถูกส่งมายังธนาคารอาชญากรรมในตลาดมืดมาโดยตลอด...?"
11130-105 = "อะไรกันเนี่ย?! นี่พวกเราส่งเงินให้พวกตลาดมืดไปใช้สนับสนุนการทำอาชญากรรมงั้นเหรอ?!"
11130-106 = "......"
11130-107 = "......"
11130-108 = "......"
11130-109 = "......"
11130-110 = "เรื่องนั้นเรายังไม่รู้หรอกค่ะ... เรายังขาดหลักฐานนะคะ จนกว่าเราจะได้เส้นทางเดินรถมา คงจะด่วนสรุป#nไม่ได้..."
11130-111 = "จริงสิ! ใบยืนยันการขนส่งที่พนักงานเซ็นชื่อไปเมื่อกี้... ดูจากเอกสารนั่นก็ได้นี่คะ?"
11130-112 = "นั่นสิ"
11130-113 = "โอ้ว จริงด้วย! สุดยอดเลยฮิฟุมิจัง!"
11130-114 = "แต่ว่าเอกสารนั่นอยู่ในธนาคารนี่นา... เราคงเข้าไปเอามาไม่ได้แน่ค่ะ"
11130-115 = "ธนาคารในตลาดมืดมีการป้องกันที่เข้มงวดและแน่นหนามาก... แถมพวกผู้คุมก็ยืนคุ้มกันอยู่เต็มไปหมดเลย..."
11130-116 = "ถ้าไม่ใช้วิธีนี้ แล้วจะหาหลักฐานเส้นทางการเดินรถบรรทุกได้ยังบ้างนะ อืม... ขอคิดดูก่อนนะคะ..."
11130-117 = "ไม่ต้องหรอก"
11130-118 = "เราไม่มีวิธีอื่นแล้ว"
11130-119 = "คะ?"
11130-120 = "รุ่นพี่โฮชิโนะ ถ้าอยู่ที่นี่ก็มีเพียงวิธีเดียวเท่านั้น"
11130-121 = "อืม... นั่นสินะ คิดเหมือนกันอยู่ใช่ไหม?"
11130-122 = "คะ...?"
11130-123 = "อ้อ!! นั่นสินะคะ ถ้าใช้วิธีนั้นละก็...!"
11130-124 = "อะไรน่ะ? หมายถึงอะไรกัน? หรือว่าวิธีนั้น...? คงไม่ใช่วิธีที่ฉันคิดใช่ไหม?"
11130-125 = "......"
11130-126 = "นะ.. แน่นะ? เอาจริงเหรอ?!"
11130-128 = "ทะ.. ทุกคนคะ? นี่พูดเรื่องอะไรกันอยู่เหรอคะ...? วิธีที่ว่าคืออะไรเหรอ?"
11130-129 = "มีเพียงวิธีเดียวเท่านั้น"
11130-130 = "(พรึ่บ)"
11130-132 = "ปล้นธนาคาร!"
11130-133 = "คะ?!"
11130-134 = "ใช่แล้ว ก็คงต้องแบบนั้นแหละ"
11130-135 = "คะ?!?!"
11130-136 = "ว้าวว☆ ไปสั่งสอนธนาคารนิสัยไม่ดีกันเลยค่ะ!"
11130-137 = "ฮะ?!?! ดะ.. เดี๋ยวนะคะ?!"
11130-138 = "เฮ้อ... นี่จะเอากันแบบนี้ใช่ไหม...?"
11130-139 = "ถ้างั้นก็..."
11130-140 = "ก็ต้องเอาด้วยสิ!!!"
11130-141 = "อะ... อ๊ะ...? หวา...?"
11130-143 = "......"
11130-144 = "เฮ้อ... ก็ได้ค่ะ ในเมื่อสถานการณ์มันเป็นแบบนี้แล้ว ถึงฉันห้ามไปก็คงไม่มีใครฟัง ถ้างั้นมาลองดูสักตั้งแล้วกันค่ะ..."
11130-146 = "ขอโทษนะฮิฟุมิ ฉันไม่ได้เตรียมหน้ากากสำรองมาเลย"
11130-147 = "งั้นถ้าโดนจับได้ขึ้นมา เราก็ต้องบอกว่าทั้งหมดเป็นฝีมือของทรีนิตี้น่ะสิ... แย่จัง"
11130-148 = "คะ?!! แล้วทำไม.... ไม่มีหน้ากาก... เอ่อ... ฉันหมายถึง... อ่า..."
11130-149 = "แบบนี้น่าสงสารนะคะ"
11130-150 = "เราไม่มีเวลาหาให้แล้ว งั้นฮิฟุมิจังใช้นี่ไปก่อนนะคะ☆"
11130-151 = "ถุงขนมไทยากิ? โอ้ว! ใช้ได้อยู่นะ"
11130-152 = "คะ? เดี๋ยวก่อนสิคะทุกคน..."
11130-153 = "อะ... อ่า..."
11130-155 = "(กรอบแกรบๆ)"
11130-156 = "เอ่อ..."
11130-157 = "......"
11130-158 = "อืม เพอร์เฟกต์"
11130-159 = "ฉันเขียนหมายเลขให้แล้วค่ะ ของฮิฟุมิจังคือหมายเลข 5 น้า~☆"
11130-160 = "ดูเหมือนบอสเลย! นี่มันหัวโจกชัดๆ!"
11130-161 = "ฉะ... ฉันต้องเข้าไปด้วยเหรอคะ? ต้องไป... ปล้นธนาคารตลาดมืดด้วยเหรอ...? หะ... ให้ฉันไปด้วยจริงๆ#nเหรอคะ?"
11130-162 = "เมื่อกี้เราสัญญากันแล้วนี่~ วันนี้ฮิฟุมิจังต้องอยู่กับพวกเราสิ"
11130-163 = "อ่า... แล้วฉันจะมองหน้าคนในสภานักเรียนยังไงกันล่ะทีนี้..."
11130-164 = "ไม่เห็นเป็นอะไรเลย คนร้ายคือพวกนั้นต่างหาก! เราไปปล้นธนาคารของพวกอาชญากรนะ พวกเราเป็นคนดี#nต่างหาก!"
11130-165 = "เอาละคุณครู.. พูดประโยคที่เราอยากฟังมาได้เลย"
11130-166 = "[s] \"ไปปล้นธนาคารกันเถอะ!\""
11130-168 = "เย้! ไปกันเลยค่ะ~☆"
11130-169 = "อ่า..."
11130-170 = "กองกำลังหน้ากากมิสึกิ..."

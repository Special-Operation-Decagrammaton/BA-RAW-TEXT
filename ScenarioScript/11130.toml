[translation]
11130-2 = "第13話;出動！泳裝蒙面團（１）"
11130-3 = "黑市．中心街"
11130-4 = "哈啊……累死我了。"
11130-5 = "感覺已經走了好幾個小時……"
11130-6 = "這對大叔來說也太強人所難了～#n腰和膝蓋都發出悲鳴了～"
11130-7 = "咦……星野同學幾歲了……？"
11130-8 = "明明沒差幾歲！"
11130-9 = "啊！那邊有間鯛魚燒店！"
11130-10 = "1;星野;14;哎呀，真的耶。沒想到這種地方居然也會有路邊攤。"
11130-11 = "在那邊稍微休息一下吧？我請大家吃鯛魚燒！"
11130-12 = "1;茜香;06;咦！？野乃美前輩，又要使用卡片嗎！？"
11130-13 = "5;星野;00;還有老師的「大人的卡片」唷～"
11130-15 = "沒關係，因為我想吃嘛☆大家一起吃，好嗎？"
11130-18 = "歡迎再來──！"
11130-19 = "（嚼嚼）"
11130-20 = "真好吃！"
11130-21 = "哎呀～正好想吃點甜的東西呢。"
11130-22 = "（喀唦）啊哈哈……我要開動了。 "
11130-23 = "（啊姆）"
11130-24 = "來……"
11130-26 = "老師也吃吧。"
11130-27 = "[s]「我開動囉。」"
11130-29 = "綾音醬的份，等回學校之後會另外幫你準備的。#n只有我們在吃真是不好意思……"
11130-30 = "啊哈哈，沒關係的，野乃美前輩。#n我可以在這邊吃些別的點心……"
11130-31 = "大家邊吃邊休息一下吧。"
11130-33 = "居然會如此缺乏情報……真奇怪。"
11130-34 = "各位在找的戰略兵器的情報……#n明明一定就在某個地方，卻怎麼也找不到……"
11130-35 = "像是販賣途徑、資材保管紀錄……#n總覺得這一切像是被某人刻意隱藏了起來。"
11130-36 = "就算是主宰著這個地方的「企業」，應該也無法控制黑市到這個地步……"
11130-37 = "有那麼奇怪嗎？"
11130-38 = "與其說是奇怪……應該說是「一般會做到這種地步嗎？」的感覺……"
11130-39 = "聚集在這裡的「企業」都是明目張膽地做壞事，幾乎不會加以掩飾。"
11130-40 = "比如……各位有看到那棟大樓嗎？#n那裡就是黑市有名的暗黑銀行。"
11130-41 = "暗黑銀行？"
11130-42 = "是黑市最大的銀行之一。#n據說奇普托斯15%的贓物會流向那裡……"
11130-43 = "因挪用公款、強盜、綁架等等犯罪行為獲得的金錢，#n將會在那裡轉變為非法武器或兵器，再次被用於犯罪……"
11130-44 = "重複著那樣的惡性循環。"
11130-45 = "……那不就等於是銀行在助長犯罪嗎？"
11130-46 = "沒錯。可以說那間銀行也屬於犯罪集團……"
11130-47 = "……"
11130-48 = "太過分了！聯邦學生會到底在做什麼？ "
11130-49 = "他們應該也有他們的苦衷吧～家家有本難念的經。"
11130-50 = "這個世界其實比我們想像的骯髒多了。#n只是我們一直待在阿拜多斯，所以對外界的情況太不了解……"
11130-53 = "請大家注意！有一批武裝份子正朝各位接近！"
11130-54 = "！！"
11130-55 = "雖然看起來似乎沒有發現我們…… #n但我認為還是先躲起來比較好……"
11130-56 = "嗚，嗚哇啊！？他們是黑市守衛！"
11130-57 = "黑市守衛？"
11130-58 = "是剛剛提過的治安單位中最高階的組織！"
11130-59 = "動作快！"
11130-62 = "……只是單純在巡邏嗎？#n看起來像是在護衛著什麼……"
11130-63 = "（轟隆隆隆……）"
11130-64 = "在護送貨車……是運鈔車呢。"
11130-65 = "咦……那個方向是……"
11130-66 = "（轟隆隆隆……）"
11130-67 = "開進暗黑銀行了？"
11130-70 = "（嘰咿咿咿咿──）"
11130-71 = "這是這個月的款項。"
11130-72 = "提早到了啊，辛苦了。#n來，請在這張款項確認文件上簽名。"
11130-74 = "是。（唰唰） "
11130-75 = "很好。"
11130-76 = "那麼失禮了。 "
11130-79 = "好，把門打開。這是這個月的現金。"
11130-80 = "（轟隆隆隆……）"
11130-82 = "各位請看……那個人……"
11130-83 = "咦……？怎，怎麼會！？#n那傢伙是每個月來向我們收利息的銀行職員……？"
11130-84 = "哦，真的耶。"
11130-85 = "咦！？咦咦……？"
11130-86 = "……怎麼回事？"
11130-87 = "沒，沒錯！那是凱薩信貸的運鈔車！ "
11130-88 = "載著我們早上交付的現金的好像就是那輛運鈔車……#n為什麼會在黑市……！？"
11130-89 = "你，你說凱薩信貸！？"
11130-90 = "你知道他們嗎？日步美醬？"
11130-91 = "凱薩信貸……就是那個知名的凱薩公司旗下的高利貸公司……"
11130-92 = "知名的……？#n是犯罪集團嗎？"
11130-93 = "啊，不……凱薩公司本身並不是犯罪組織……#n不過卻很巧妙地遊走在法律的灰色地帶，是一間多角化經營的企業……"
11130-94 = "由於不少凱薩旗下的企業也進駐了我們三一地區，#n茶會擔心會對學生們造成問題，因此也在持續注意它們的動向。"
11130-95 = "5;星野;05;「茶會」……也就是三一的學生會。"
11130-96 = "話說各位的債……#n難道阿拜多斯向凱薩信貸借了錢嗎……？"
11130-97 = "嗯，雖然不是我們借的……"
11130-98 = "這件事說來話長。#n綾音醬，可以查出剛才那台運輸卡車的路徑嗎？"
11130-99 = "請稍等。"
11130-101 = "……對方所有的數據似乎都是在離線狀態下保存的。#n完全無法搜尋。"
11130-102 = "果然是這樣啊……"
11130-103 = "這麼說來，他們向來都只收我們現金呢。#n難道……"
11130-104 = "我們交出的現金都流向了黑市的黑暗銀行……？"
11130-105 = "什麼意思？所以我們是在為黑市提供犯罪資金嗎！？"
11130-106 = "……"
11130-107 = "……"
11130-108 = "……"
11130-109 = "……"
11130-110 = "這，這還很難說……目前我們的證據不足。#n至少在找到那輛卡車的動線之前……"
11130-111 = "……啊！剛剛那個職員簽名的款項確認文件…… #n只要看了那個不就能證明了嗎？"
11130-112 = "有道理。"
11130-113 = "哦哦，真是個好主意呢～日步美醬。"
11130-114 = "啊哈哈……#n不過仔細想想，文件已經在那間銀行裡……看來行不通呢。"
11130-115 = "那間銀行以擁有黑市最滴水不漏的保全系統為傲……#n而且還有黑市守衛在守著……"
11130-116 = "其他能確認運輸卡車路徑的方法……#n我想想……唔嗯……"
11130-117 = "不。"
11130-118 = "沒有其他方法。"
11130-119 = "咦？"
11130-120 = "星野前輩，只能用那個方法了。"
11130-121 = "原來如此，要用那個方法啊。"
11130-122 = "……咦？"
11130-123 = "啊……！對耶，如果是那個方法的話！"
11130-124 = "什麼？你們在說什麼？ #n……難道是那個？不會是我想的那個吧？"
11130-125 = "……"
11130-126 = "1;茜香;04;騙，騙人！？認真！？"
11130-128 = "……那，那個。我完全不知道你們在說什麼…… #n「那個方法」是什麼？"
11130-129 = "剩下的方法只有一個。"
11130-130 = "（咻）"
11130-132 = "搶銀行吧。"
11130-133 = "什麼！？"
11130-134 = "嗯～這種時候就該這樣吧～"
11130-135 = "什什什麼！？！？"
11130-136 = "哇啊☆就這樣把壞銀行處理掉吧！"
11130-137 = "咦咦咦！！？？請，請等一下！"
11130-138 = "唉……認真？#n你們是認真的吧……？"
11130-139 = "5;茜香;06;呼，既然如此……"
11130-140 = "只能做到底了！"
11130-141 = "啊，嗚啊……？啊哇哇……？"
11130-143 = "…… "
11130-144 = "……唉，我知道了。就算現在阻止，各位大概也不會聽吧……#n總會有辦法的，大概……"
11130-146 = "抱歉，日步美。#n沒有準備你的面罩。"
11130-147 = "唔嘿～也就是說曝光的話就能把事情全部賴在三一頭上了呢～"
11130-148 = "咦！？怎，怎麼這樣……#n面罩……為什麼……那個，所以……啊，啊嗚……"
11130-149 = "那樣就太可憐了。"
11130-150 = "日步美醬，總之先用這個吧☆"
11130-151 = "鯛魚燒的紙袋？#n哦哦！這樣應該就沒問題了！"
11130-152 = "咦？請，請等一下，各位……"
11130-153 = "啊，啊嗚嗚……"
11130-155 = "（啪沙沙）"
11130-156 = "啊嗚嗚……"
11130-157 = "……"
11130-158 = "嗯，很完美。"
11130-159 = "號碼也幫你寫上了。日步美醬是5號☆"
11130-160 = "看起來就像最終BOSS等級的呢～？#n是邪惡的根源？還是首領？"
11130-161 = "我，我也要去嗎？去搶暗黑銀行……？"
11130-162 = "唔嘿～剛剛不是約好了嗎？#n日步美醬今天要跟我們一起行動。"
11130-163 = "嗚，嗚啊啊…… #n我，我以後該怎麼面對學生會的人……"
11130-164 = "沒問題的！我們又沒有錯！#n錯的是他們才對！所以才要把暗黑銀行洗劫一空！"
11130-165 = "那麼，老師。那句台詞就拜託你了。"
11130-166 = "[s] 「來搶銀行吧！」"
11130-168 = "是！出發～☆"
11130-169 = "啊，啊嗚嗚……"
11130-170 = "呼……那麼，泳裝蒙面團。"
11130-172 = "（咻）"
11130-173 = "出擊。"
11130-175 = "下一話;出動！泳裝蒙面團（２）"

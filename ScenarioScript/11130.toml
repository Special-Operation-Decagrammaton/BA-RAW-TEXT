[translation]
11130-2 = "Episode 13;The Masked Swimsuit Gang! Part 1"
11130-3 = "Black Market Streets"
11130-4 = "*sigh* I'm beat."
11130-5 = "It feels like we've been walking for hours..."
11130-6 = "I'm getting too old for this kind of thing. My knees and back are killing me."
11130-7 = "Really? How old are you again, Hoshino?"
11130-8 = "Like I said, we're all pretty much the same age!"
11130-9 = "Look over there! They're selling taiyaki!"
11130-10 = "Hey, they really are. I didn't know they had street vendors here."
11130-11 = "Should we grab some snacks and take a break? I'm buying!"
11130-12 = "What?! Nonomi, are you gonna use your card again?!"
11130-13 = "We could always use Sensei's credit card!"
11130-15 = "No, that's okay. I really want some, so I insist."
11130-18 = "Thank you!"
11130-19 = "*nom* *nom*"
11130-20 = "That's tasty!"
11130-21 = "Whew, perfect timing. My blood sugar was getting low."
11130-22 = "*rustle* Haha. Thanks. Don't mind if I do."
11130-23 = "*nom*"
11130-24 = "Oh."
11130-26 = "You take one too, Sensei."
11130-27 = "[s] \"Can't say no to that.\""
11130-29 = "Sorry you're not here, Ayane. We'll bring some back for you."
11130-30 = "Haha. That's okay, Nonomi. I have snacks with me."
11130-31 = "See? Nothing to worry about. Let's just chow down and enjoy this."
11130-33 = "It's strange that we haven't been able to find any leads."
11130-34 = "About those weapons you're looking for, I mean. I'm sure they're out there, but we haven't tracked down a single clue."
11130-35 = "There's not even a paper trail. No records of transactions, storage logs... Nothing. It's like someone's trying to hide the whole operation."
11130-36 = "Even the corporations shouldn't be able to manipulate the Black Market to this extent."
11130-37 = "It is pretty strange."
11130-38 = "I don't know if I would call it strange. It's more like... Why go through all this trouble?"
11130-39 = "This is the Black Market we're talking about. Corporations typically have no trouble conducting illegal business out in the open."
11130-40 = "For example, see that building there? That's the Black Market's infamous Stygian Bank."
11130-41 = "The Stygian Bank?"
11130-42 = "It's one of the largest banks in the Black Market. It's said that about 15 percent of all illicit profits from Kivotos' criminal activities flow through that bank."
11130-43 = "The proceeds from extortion, armed robbery, abductions, and so on are then used to fund illegal weapons and arms for further criminal activities."
11130-44 = "It's a never-ending cycle."
11130-45 = "Goodness. So the bank is just as complicit as anyone else."
11130-46 = "Yeah. If you think about it, the bank is really a whole criminal organization unto itself."
11130-47 = "..."
11130-48 = "That's ridiculous! Why isn't the General Student Council doing anything?!"
11130-49 = "I'm sure they have their reasons. You never know."
11130-50 = "It looks like the real world isn't all sunshine and butterflies like we thought.#nI guess we were too sheltered within the safety of Abydos..."
11130-53 = "Hang on a second, everyone! There are armed forces heading your way!"
11130-54 = "...!"
11130-55 = "I don't think they've spotted you, but you should take cover just to be safe."
11130-56 = "Th-Those are Market Guards!"
11130-57 = "Market Guards?"
11130-58 = "They act as the top enforcers for all the groups I just mentioned!"
11130-59 = "Hurry!"
11130-62 = "It just looks like they're on a routine patrol..."
11130-63 = "*click* *clank* *click*"
11130-64 = "That looks like an armored truck full of cash they're escorting."
11130-65 = "Hey. Look over there."
11130-66 = "*click* *clank* *click*"
11130-67 = "It's entering the Stygian Bank?"
11130-70 = "*screech*"
11130-71 = "These are the collections from this month."
11130-72 = "Even earlier than scheduled. Well done. Sign the transport papers here."
11130-74 = "Of course. *scribble*"
11130-75 = "Perfect."
11130-76 = "Well, then. Have a good day."
11130-79 = "Open the gates. It's the cash collections for this month."
11130-80 = "*vroom*"
11130-82 = "Hey. Wasn't that...?"
11130-83 = "What the heck?! That's the bank employee who takes our interest payments every month..."
11130-84 = "Hey, no kidding."
11130-85 = "What...?"
11130-86 = "What's going on?"
11130-87 = "You're right! That's a Kaiser Loans truck!"
11130-88 = "In fact, it's the same truck that our cash payment was loaded into this morning! What is it doing at the Black Market?!"
11130-89 = "K-Kaiser Loans?!"
11130-90 = "You've heard of them, Hifumi?"
11130-91 = "That's the infamous Kaiser Corporation's loan shark company..."
11130-92 = "Infamous? Is it a criminal organization?"
11130-93 = "Not exactly. The Kaiser Corporation doesn't do anything outright illegal, but they're definitely shady. They walk the line between legitimate and criminal activities..."
11130-94 = "Kaiser's been trying to extend its reach into the Trinity district as well,#nand the Tea Party has been watching them like a hawk to make sure they don't cause any problems for the students."
11130-95 = "The Tea Party... That's Trinity's student council if I remember right."
11130-96 = "This debt you guys owe is to Kaiser Loans?"
11130-97 = "Well, technically, we weren't the ones who originally owed the debt."
11130-98 = "It's kind of a long story. Ayane, can you get a bead on that armored truck?"
11130-99 = "One moment."
11130-101 = "No good. I think they're working on a closed network. I can't pull anything up on them at all."
11130-102 = "Should've known..."
11130-103 = "Come to think of it, they were very adamant about cash only.#nDo you think it's because...?"
11130-104 = "Our cash payments are being funneled into this Black Market bank?"
11130-105 = "So we've essentially been funding criminal activities for the Black Market this entire time?!"
11130-106 = "..."
11130-107 = "..."
11130-108 = "..."
11130-109 = "..."
11130-110 = "W-We can't say for certain yet... There isn't anything concrete to back it up. Not until we figure out where that truck is going."
11130-111 = "Wouldn't those transport papers that employee just signed tell us?"
11130-112 = "Indeed."
11130-113 = "Good thinking, Hifumi."
11130-114 = "On second thought, those papers are inside the bank... We might be out of luck."
11130-115 = "Not just any bank—the most heavily guarded bank in the entire Black Market. And it's crawling with armed guards."
11130-116 = "If only we could find another way to get that truck's transport route. Let's see. Hmm..."
11130-117 = "No."
11130-118 = "There's no other way."
11130-119 = "Pardon?"
11130-120 = "It's our only option, Hoshino."
11130-121 = "So, that's how it's going to be."
11130-122 = "Come again?"
11130-123 = "Oh, now I get it! We're going to use THAT plan, aren't we?"
11130-124 = "Hold on. You can't be serious. You three aren't thinking what I think you're thinking...are you?"
11130-125 = "..."
11130-126 = "Was that a yes?! Seriously?!"
11130-128 = "I'm not sure I follow. What are you all talking about?"
11130-129 = "It's finally time."
11130-130 = "*rustle*"
11130-132 = "We're gonna hit the bank."
11130-133 = "What?!"
11130-134 = "Turns out it was the best plan after all."
11130-135 = "Excuse me?"
11130-136 = "Yippee! Time to teach that evil bank a lesson! ☆"
11130-137 = "Th-This is a joke, right?!"
11130-138 = "This is actually happening. We're really doing this?"
11130-139 = "Because if you three are serious..."
11130-140 = "...then count me in too!"
11130-141 = "You too, Serika...?"
11130-143 = "... "
11130-144 = "*sigh* Copy that. I doubt I can talk any of you out of it at this point. Good luck. I'm sure you'll manage somehow."
11130-146 = "Sorry, Hifumi. We don't have a mask prepared for you."
11130-147 = "Well, I guess we can just blame Trinity for everything if we get caught."
11130-148 = "That would be really...REALLY bad..."
11130-149 = "But I don't want you to feel left out."
11130-150 = "This is the best we can do last-minute. Take this, Hifumi! ☆"
11130-151 = "The bag the taiyaki came in? Brilliant!"
11130-152 = "Hold on! I never agreed to..."
11130-153 = "A-Ah..."
11130-155 = "*crumple* *crumple*"
11130-156 = "Mrrrp..."
11130-157 = "..."
11130-158 = "Perfect."
11130-159 = "I even wrote you a number, Hifumi. You're No. 5. ☆"
11130-160 = "Whoa, it makes her look like she's our boss. What a leader."
11130-161 = "I-I am? I mean, are we really going to hit the Stygian Bank?"
11130-162 = "Of course we are, Hifumi. Remember? We're sticking together today."
11130-163 = "How will I explain this to the Tea Party if they ever find out?"
11130-164 = "What's to explain? We're hitting a criminal bank! We're the good guys!"
11130-165 = "Would you do us the honors, Sensei?"
11130-166 = "[s] \"Let's rob ourselves a bank!\""
11130-168 = "Yay! Let's roll! ☆"
11130-169 = "Oh, no..."
11130-170 = "*sigh* All Masked Swimsuit Gang units..."
11130-172 = "*shuffle*"
11130-173 = "The mission is a go."
11130-175 = "Next Episode;The Masked Swimsuit Gang! Part 2"

[translation]
10046230-3 = "ระ... รุ่นพี่!"
10046230-4 = "เอ๋? โคฮารุ? มีธุระอะไรที่นี่เหรอคะ?"
10046230-5 = "ฉันมาช่วยรุ่นพี่ค่ะ! ก็ฉันอยู่ชมรมทวงความยุติธรรมนี่คะ!"
10046230-6 = "อืม แต่ว่าตอนนี้โคฮารุสังกัดอยู่ใน..."
10046230-10 = "......"
10046230-11 = "เอาเถอะค่ะ ถ้างั้นฉันขอร้องอะไรหน่อยได้มั้ยคะ?"
10046230-12 = "จะ... จริงเหรอคะ?!"
10046230-13 = "ได้แน่นอนค่ะ! ถ้ามีรุ่นน้องฝีมือดีอย่างโคฮารุมาช่วยงาน ฉันก็รู้สึกอุ่นใจขึ้นค่ะ"
10046230-14 = "ปฏิบัติการร่วมครั้งแรกของฉันกับรุ่นพี่อิจิกะ...!"
10046230-15 = "ฉันจะตั้งใจทำให้เต็มที่เลยค่ะ!"
10046230-16 = "ค่ะ ฉันเชื่อใจโคฮารุค่ะ"
10046230-21 = "ยะ... เย้!"
10046230-22 = "ฉันต้องโชว์ฝีมือให้รุ่นพี่เห็นแล้วกลับไปยังชมรมทวงความยุติธรรมด้วยความภาคภูมิใจให้ได้เลย!"
10046230-28 = "......"
10046230-29 = "เอ่อ... ที่โคฮารุต้องไปอยู่ชมรมชั้นเรียนเสริมก็เพราะเรื่องผลการเรียน งั้นก็ต้องทำข้อสอบให้ได้#nคะแนนดีๆ ไม่ใช่เหรอ...?"
10046230-30 = "แต่ไหนๆ โคฮารุก็ตื่นเต้นเสียขนาดนี้ ถ้าจะพูดอะไรก็คงเสียบรรยากาศเปล่าๆ ละนะ"

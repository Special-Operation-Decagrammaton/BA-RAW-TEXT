[translation]
10046230-3 = "前，前輩！"
10046230-4 = "咦，小春？你怎麼會在這裡？"
10046230-5 = "我是來幫忙的！#n因為我終究也是實現正義部的一員！"
10046230-6 = "唔嗯，不過小春現在的所屬應該是……"
10046230-10 = "…………"
10046230-11 = "好吧，那就拜託你囉？"
10046230-12 = "真，真的可以嗎！？"
10046230-13 = "當然可以囉。#n有像小春這樣優秀的後輩來支援，我也安心不少呢。"
10046230-14 = "和一花前輩的第一次聯合作戰……！"
10046230-15 = "我，我一定會全力以赴的！"
10046230-16 = "嗯，我很期待唷。"
10046230-21 = "太，太好了！"
10046230-22 = "這次一定要在前輩面前大顯身手，然後堂堂正正地回到實現正義部！"
10046230-28 = "…………"
10046230-29 = "不過小春之所以會去補課部……是因為成績的關係吧？#n感覺應該要先顧好考試才對……？"
10046230-30 = "算了，難得他這麼有幹勁，我還是別潑冷水了。"

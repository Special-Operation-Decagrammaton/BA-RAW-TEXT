90000035-41 = "3;히마리;S2_08;……흐음. 발굴지 쪽은 데이터가 완전 봉쇄되어 있어요. 게다가 이건 처음보는 형태의 방화벽……"
90000035-42 = "3;히마리;S2_09;후후, 건방지네요. 새로운 기술인가요? 해커의 혼이 끓는 느낌……. \n#3;em;[음표]"
90000035-43 = "3;히마리;S2_07;패턴 자체는 흔한 난수 알고리즘의 OTP를 활용한 것이네요. 난이도가 낮은 대신 물리적 시간이 많이 소모되게 만들어두었네요."
90000035-44 = "3;히마리;S2_99;즉, 여기서 침입자가 시간을 끄는 동안 패턴을 변경하겠다……라는 함정이죠."
90000035-45 = "3;히마리;S2_12;하지만 이 정도라면 제가 4시간 정도만 투자하면…….\n#3;em;[반짝]"
90000035-46 = "1;에이미;04;……부장. 발굴지의 정보는 이제 됐어. 다른 길로 새지 마. 비나를 찾아야지.\n#1;em;[반응]\n#1;ar\n#3;m5"
90000035-47 = "3;히마리;S2_02;그치만 미소녀 해커의 혼이……."

90000035-7 = "1;에이미;01;어때, 부장? PMC 쪽의 데이터는? 쓸만한 거라도 찾았어?\n#1;em;[반응]\n#1;a\n#3;m5"
90000035-8 = "3;히마리;S2_03;……아뇨. 이쪽은 텅 비었어요."
90000035-9 = "1;에이미;02;비었다고?\n#1;em;[?]"
90000035-10 = "3;히마리;S2_07;네. ……재미있네요. 발굴지에서 얻은 모든 정보는 암호화되어서 본사로 전송되고 있어요. 이쪽에는 어떤 정보도 남겨두고 있지 않네요."
90000035-11 = "1;에이미;05;흐음…… 보안 때문인가? 그치만 왜 그렇게까지 번거로운 짓을 하는 거지?"
90000035-12 = "3;히마리;S2_08;그러게요. 평범한 사설 용병 기업이 어째서 이렇게까지 보안에 신경을 쓰는걸까요……? 이것만으로도 꽤 수상쩍긴 하군요."
90000035-13 = "3;히마리;S2_03;그럼 목표를 카이저 코퍼레이션의 본사로 변경합니다. \n#3;em;[반응]"
90000035-14 = "1;에이미;01;그쪽은 침투하는 게 더 힘든 거 아냐?"
90000035-15 = "3;히마리;S2_99;아무래도 그렇죠. 하지만……."

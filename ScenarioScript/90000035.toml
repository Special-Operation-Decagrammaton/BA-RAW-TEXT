90000035-33 = "3;히마리;S2_07;……. PMC는 사막의 발굴지구에서 비나와 싸우고 있었던 거네요. 아니, 이 패턴이라면……."
90000035-34 = "1;에이미;99;비나가 발굴지구에 접근하지 못하게 PMC가 방어하고 있었다…… 에 가까우려나."

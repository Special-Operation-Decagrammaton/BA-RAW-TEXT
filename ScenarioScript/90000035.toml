[translation]
90000035-2 = "We started to analyze the data obtained from PMC."
90000035-7 = "Have you found anything useful, President?"
90000035-8 = "The opposite actually. It's blank.  "
90000035-9 = "How can that be?"
90000035-10 = "It's fascinating. Anything obtained from the excavation site was encrypted and transmitted to their HQ. Not a trace left behind."
90000035-11 = "That's a lot of effort to cover up nothing."
90000035-12 = "I agree. An ordinary, private mercenary company wouldn't normally go to such lengths to protect their data. It raises more red flags."
90000035-13 = "I suppose there's no choice but to go into the dragon's lair. Changing target to Kaiser HQ.  "
90000035-14 = "Won't that be much more difficult?"
90000035-15 = "Yes, however..."
90000035-20 = "And done. DB infiltration complete. Nothing is impossible for a beautiful and alluring hacker like me."
90000035-21 = "That is incredible. But I still disagree that beauty plays a role here."
90000035-22 = "Yes, it does. Hacking is a basic skill every beautiful girl should have."
90000035-26 = "Let's see what PMC is hiding. "
90000035-30 = "Hmm... I see. "
90000035-31 = "There it is."
90000035-32 = "Battle records against Binah. There's quite a bit to sort through."
90000035-33 = "PMC was fighting Binah at the excavation site in the desert?"
90000035-34 = "I would say more that they were defending the site from Binah."
90000035-35 = "It makes me even more curious what they were doing there."
90000035-41 = "The excavation site data is completely sealed. Not only that, I've never seen this type of firewall. "
90000035-42 = "Heehee, how bold. Is this new technology? I feel the burning ambition of a hacker flaring up. "
90000035-43 = "The pattern uses an OTP of a common random number algorithm. Not particularly difficult, but it's intentionally designed to be time-consuming.  "
90000035-44 = "It must be a trap that allows them to change the pattern while the intruder is still working."
90000035-45 = "But I think I can solve this in four hours."
90000035-46 = "...President. That's unnecessary. Our target is Binah, not the excavation site."
90000035-47 = "But...my reputation as a beautiful hacker that deigned to grace this planet with my very presence is at stake..."
90000035-48 = "Our only target is Binah. And again, beauty has nothing to do with our mission."
90000035-49 = "..."
90000035-50 = "[s] (She's pouting...)"
90000035-53 = "...Fine. The prophets are our main priority. I can prove my genius on my own time..."
90000035-54 = "(How annoying.)"
90000035-55 = "Don't waste your energy glaring at me. I've already oh-so-graciously agreed to focus on the matter at hand, haven't I?"
90000035-56 = "Fine. Sorry.  "
90000035-63 = "[ns] (Awkward...)"
90000035-66 = "Next Episode;Research Part 4: Binah"

[translation]
90000035-2 = "(เริ่มวิเคราะห์ข้อมูลจาก PMC ที่สืบมาได้)"
90000035-7 = "ข้อมูลจาก PMC เป็นไงบ้าง? หัวหน้า? มีอะไรที่เป็นประโยชน์มั้ย?"
90000035-8 = "...ไม่เลย ว่างเปล่า "
90000035-9 = "ว่างเปล่าเหรอ?"
90000035-10 = "ใช่ ...น่าสนุกขึ้นมาแล้วสิคะ ข้อมูลทั้งหมดที่ขุดค้นขึ้นมาได้ถูกเข้ารหัสเอาไว้และกำลังถูกส่งไปที่#nสำนักงานใหญ่"
90000035-11 = "ฮึ่ม... เพื่อความปลอดภัยเหรอ? ทำไมต้องทำอะไรยุ่งยากแบบนั้นด้วย?"
90000035-12 = "ไม่รู้สิ ธุรกิจทหารรับจ้างธรรมดาๆ ทำไมต้องระมัดระวังเรื่องความปลอดภัยถึงขั้นนั้นด้วย...? แบบนี้ยิ่งน่าสงสัยเข้าไปใหญ่ค่ะ"
90000035-13 = "ถ้างั้นจะเปลี่ยนเป้าหมายไปที่สำนักงานใหญ่ของไคเซอร์ คอเปอเรชั่นค่ะ "
90000035-14 = "แบบนั้นน่าจะแทรกซึมได้ยากกว่าอีกไม่ใช่รึไง?"
90000035-15 = "ก็คงจะเป็นแบบนั้นค่ะ แต่ว่า..."
90000035-20 = "แทรกซึมเข้า DB สำเร็จ... ไม่มีอะไรที่แฮ็กเกอร์สาวน้อยน่ารักและบริสุทธิ์อย่างฉันทำไม่ได้หรอกค่ะ"
90000035-21 = "โอ้... สมแล้วที่เป็นหัวหน้า ถึงจะไม่เกี่ยวอะไรกับสาวน้อยน่ารักก็เถอะ"
90000035-22 = "เกี่ยวสิ เพราะนี่เป็นทักษะพื้นฐานของสาวน้อยน่ารักยังไงล่ะคะ"
90000035-26 = "มาดูกันดีกว่าค่ะ ว่า PMC ซ่อนอะไรเอาไว้ "
90000035-30 = "ฮืม... อย่างนี้นี่เอง "
90000035-31 = "มีจริงด้วย"
90000035-32 = "บันทึกการต่อสู้กับบีนาห์ เป็นตัวเลขจำนวนมากทีเดียว"
90000035-33 = "... PMC ต่อสู้กับบีนาห์ที่เขตขุดค้นทะเลทรายสินะ ไม่สิ ถ้าเป็นรูปแบบนี้ละก็..."
90000035-34 = "ดูเหมือน PMC น่าจะกำลังป้องกันไม่ให้บีนาห์เข้าถึงเขตขุดค้นได้มากกว่ารึเปล่าน่ะ... "
90000035-35 = "นั่นสินะคะ ไปทำอะไรที่นั่นกันแน่... "
90000035-41 = "...ฮึ่ม ข้อมูลจากเขตขุดค้นถูกสกัดกั้นทั้งหมด ไฟร์วอลล์รูปแบบนี้ก็เพิ่งเคยเห็นเป็นครั้งแรก... "
90000035-42 = "ฮุฮุ อวดดีมากนะคะ หรือว่าจะเป็นเทคโนโลยีใหม่? รู้สึกเหมือนจิตวิญญาณแฮ็กเกอร์กำลังเดือดพล่าน#nเลยละ... "
90000035-43 = "เป็นการใช้ OTP อัลกอริทึมแบบสุ่มสินะคะ เป็นรูปแบบที่ไม่ซับซ้อนแต่ทำให้เสียเวลาแทนค่ะ "
90000035-44 = "หรือก็คือ เป็นกับดักที่ใช้ทำให้ผู้บุกรุกเสียเวลา ในระหว่างนั้นก็จะเปลี่ยนรูปแบบใหม่..."
90000035-45 = "แต่ถ้าแค่นี้ละก็ ฉันใช้เวลาสัก 4 ชั่วโมง..."
90000035-46 = "...หัวหน้า เรื่องนั้นช่างมันเถอะ อย่าเพิ่งออกนอกลู่นอกทางสิ เราต้องตามหาบีนาห์นะ"
90000035-47 = "แต่ว่าจิตวิญญาณของแฮ็กเกอร์สาวน้อยน่ารัก..."
90000035-48 = "นั่นไม่ใช่เป้าหมายของเรานี่ แล้วก็ไม่ได้เกี่ยวกับสาวน้อยน่ารักเลยด้วย"
90000035-49 = "..."
90000035-50 = "[s] (หน้าหงอยเลยแหะ...)"
90000035-53 = "...ก็ได้ค่ะ ตอนนี้การไล่ล่าผู้เลื่อมใสของเดคาแกรมมาทอนสำคัญกว่าสินะคะ ส่วนเรื่องนี้เอาไว้ถ้ามี#nโอกาสละก็... ฮุฮุ... "
90000035-54 = "(...ยุ่งยากชะมัด)"
90000035-55 = "อย่ามองเหมือนฉันน่ารำคาญขนาดนั้นได้มั้ยคะ? แค่นี้เฉยๆ มากค่ะ ฉันน่ะเป็นคนใจกว้างมากนะคะ"
90000035-56 = "อืม โทษที "
90000035-63 = "[ns] (น่าอึดอัดจังเลยนะ...)"
90000035-66 = "ตอนต่อไป;รวบรวมข้อมูล 4 - บีนาห์"

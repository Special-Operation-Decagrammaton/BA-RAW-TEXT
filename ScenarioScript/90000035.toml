[translation]
90000035-2 = "（正在分析從PMC取得的數據……）"
90000035-7 = "怎麼樣，部長？PMC的數據有什麼能用的情報嗎？"
90000035-8 = "……沒有。完全是一片空白呢。"
90000035-9 = "一片空白？"
90000035-10 = "是的……這還真是有趣。在挖掘現場獲得的所有情報，#n全都在加密之後傳送給了總公司。本地則沒有留下任何訊息。"
90000035-11 = "哼嗯……是為了安全性嗎？#n不過為什麼要弄得那麼麻煩？"
90000035-12 = "就是說呀。#n一間普通的私人軍事公司竟然如此重視安全性……光是這點就已經十分可疑了。"
90000035-13 = "既然如此，我們就將目標更改為總公司吧。"
90000035-14 = "那邊不是很難入侵嗎？"
90000035-15 = "我想應該是吧。不過……"
90000035-20 = "……資料庫入侵完畢。#n對天真爛漫美少女駭客的我來說，沒有什麼是不可能的。"
90000035-21 = "哦～不愧是部長。雖然我覺得跟美少女沒關係就是了。"
90000035-22 = "當然有關係。這可是美少女的基本素養啊。"
90000035-26 = "那麼，就來看看凱薩PMC究竟隱藏了什麼吧？"
90000035-30 = "哼嗯……原來如此。"
90000035-31 = "確實有呢。"
90000035-32 = "沒錯，是與薇娜的戰鬥紀錄。而且數量還相當多。"
90000035-33 = "PMC曾在挖掘區域和薇娜交戰……#n不，從這個模式來看……"
90000035-34 = "感覺更接近PMC為了不讓薇娜靠近挖掘區域……而進行防衛？"
90000035-35 = "是啊，他們究竟在那裡做些什麼呢……"
90000035-41 = "唔嗯……與挖掘區域有關的情報被完全封鎖住了。#n而且這種類型的防火牆，之前從來沒見過……"
90000035-42 = "呵呵，還真是囂張呢。#n是新的技術嗎？感覺駭客之魂都燃燒起來了……"
90000035-43 = "模式本身是利用亂數演算法的OTP……#n雖然難度不高，但被設計的需要花費大量的物理時間。"
90000035-44 = "目的是在爭取時間的同時改變模式……類似這樣的陷阱。"
90000035-45 = "不過這種程度，只要我投資四小時左右……"
90000035-46 = "……部長，挖掘地區的情報就先處理到這裡吧。#n別再偏離主題了，我們還得找出薇娜才行。"
90000035-47 = "可是美少女駭客之魂……"
90000035-48 = "那並不是現在的目標吧？#n而且跟「美少女」也沒關係。"
90000035-49 = "……"
90000035-50 = "[s]（突然就洩氣了……）"
90000035-53 = "……說的也是。現在更重要的是追蹤十字神名的預言者。#n這個就等改天有機會再……呵呵……沒錯。"
90000035-54 = "（……真麻煩）"
90000035-55 = "請不要用那種覺得別人很麻煩的眼神看我好嗎？#n我可是很寬容的，這點小事我一點都不在乎。"
90000035-56 = "嗯，抱歉。"
90000035-63 = "[ns]（真是特別的關係啊……）"
90000035-66 = "下一話;蒐集情報(4)薇娜"

[translation]
10041010-1 = "第1話;自我證明"
10041010-3 = "[log]一週前[/log]"
10041010-9 = "我實在是無法理解。#n請容我提醒你一下……"
10041010-10 = "這種事本來就是由我負責，而且我在這方面的經驗也更豐富。"
10041010-11 = "但我現在……"
10041010-12 = "……等等，你該不會認為「現在」的我已經做不到了吧？"
10041010-16 = "你明明很清楚我不是那個意思，聖亞同學。#n我只是……"
10041010-20 = "[ns] 「……？」"
10041010-21 = "聖，聖亞醬你怎麼了？為什麼那麼生氣？#n有什麼事惹你不高興了嗎？"
10041010-22 = "你現在才發覺嗎？#n雖然這的確很有你的風格……"
10041010-23 = "聖亞醬！？"
10041010-24 = "請你先冷靜一點，聖亞同學。#n彌香同學你也是，我們先聽聽聖亞同學怎麼說吧。"
10041010-25 = "竟然要我重新解釋一遍，現在的狀況簡直令人痛心疾首。"
10041010-26 = "為什麼要把話說得這麼嚴重……"
10041010-27 = "請你們兩位都先冷靜下來……#n要是被外面的人聽到，可能會以為我們之間起了什麼紛爭的。"
10041010-28 = "我們怎麼可能會起什麼紛爭呢？#n現在的茶會不都是你說了算嗎？"
10041010-29 = "聖亞醬！！！"
10041010-30 = "[ns1]「到底發生了什麼事……？」\n[ns2] 往聲音傳來的方向走去"
10041010-38 = "……？"
10041010-39 = "老師……？"
10041010-44 = "咦？老師？老師怎麼會在這裡……？？"
10041010-48 = "難道你剛才都聽到了嗎？#n其，其實我們……呃……那個……"
10041010-49 = "不，不是！我們絕對沒有在吵架！剛才只是……！"
10041010-55 = "唉……"
10041010-56 = "是我拜託老師過來的。#n因為我早就料想到事情會變成這樣。"
10041010-61 = "是渚……？"
10041010-62 = "是渚醬你？"
10041010-64 = "雖然我也希望只是我多慮了，可惜事情還是朝著我擔心的方向發展。#n還請老師替我們釐清一下情況。"
10041010-65 = "儘管這種事情，本來應該由我們自己私下處理的……"
10041010-67 = "……啊！"
10041010-68 = "但是在感到不安徬徨的時候，不要獨自一個人煩惱，要積極尋求他人或大人的幫助！"
10041010-69 = "……我們曾經這樣承諾過，對吧！"
10041010-70 = "原來如此……確實有這麼回事。"
10041010-71 = "竟然不惜請出老師來說服我，你這麼做究竟有幾分是真心的呢，渚？"
10041010-72 = "你怎麼又這樣說話啦！"
10041010-74 = "我一直都是真心的。#n如果要開玩笑的話，我肯定會事先告訴你們。"
10041010-75 = "況且我這麼做的目的，是出於對聖亞同學的擔心。"
10041010-76 = "唯有這點，我由衷地盼望……你不要誤會我。"
10041010-77 = "沒錯沒錯！渚醬無論什麼時候都一直擔心著聖亞醬哦！"
10041010-78 = "雖然他平時經常做一些會讓人誤會的舉動就是了！"
10041010-79 = "彌香同學沒資格這麼說吧……"
10041010-85 = "[ns3]「可以告訴我究竟發生了什麼事嗎？」\n[ns4]「我想你們一定都有各自的理由，大家一起好好溝通吧。」"
10041010-89 = "這種時候跟我相比，或許由聖亞同學親自說明，更能夠緩和氣氛吧。"
10041010-90 = "聖亞同學。#n如果你願意的話，可以麻煩你說明事情的來龍去脈嗎？"
10041010-95 = "……？#n這還真是出乎我的預料。"
10041010-96 = "我認識的渚應該會搶著說明原委，並將情況描述成對自己有利的局面才對。"
10041010-98 = "聖亞醬，你今天會不會有點太過分了！？"
10041010-99 = "渚醬再怎麼說也是因為擔心你才會……！！"
10041010-103 = "渚醬……"
10041010-109 = "……對不起，我確實說得太過分了。"
10041010-110 = "剛才是我一時激動，那並不是我的本意。"
10041010-111 = "我知道你也需要一個能夠接受……不，是能「讓你安心」的保證。"
10041010-112 = "我從來沒有懷疑過你對我的關心。#n我怎麼……"
10041010-113 = "…………"
10041010-114 = "我怎麼會懷疑你的真心呢……那是絕對不可能的。"
10041010-115 = "聖亞同學……"
10041010-116 = "不過即使如此，我還是認為你做得太超過了。#n尤其這次的事更是如此。"
10041010-117 = "[s5]「太超過？」\n[s6]「這次的事？」"
10041010-120 = "還是先向老師說明我們在爭論什麼吧。#n簡單來說，我們正在討論該由誰來擔任參加「千年博覽會」的「三一代表」。"
10041010-123 = "千年博覽會是千年科學學園主辦的巨型技術展覽活動，#n而我們學園也會派學生去參加博覽會，藉此和各校展開交流。"
10041010-124 = "渚主張由自己親自出面，而我則主張該由我前往。"
10041010-125 = "我這麼主張的目的，是因為渚目前負擔的龐大工作量，已經到了分身乏術的地步。"
10041010-128 = "而他則是擔心我的復原情況與人身安全。#n這就是我們意見分歧的原因。"
10041010-129 = "身為茶會的正式成員，我自然具備代表三一學園的資格。#n而且過往這種相對輕鬆的外交活動，也一直都是由我負責出面的。"
10041010-130 = "渚現在光是處理三一內部的工作就已經很不容易了。#n要是再派他去出差的話，我們內部的事務恐怕會完全停擺……這樣是不對的。"
10041010-131 = "而渚反對的原因，或者說他擔心的則是我的健康和安全……"
10041010-132 = "雖然聖亞同學的健康狀況確實有所好轉，#n但坦白說也不過是剛擺脫「病患」的身份而已。"
10041010-133 = "這並非出自我的主觀判斷，而是救護騎士團所下的客觀結論。"
10041010-134 = "況且像我們這種茶會的核心幹部，隨時都有遭受有心人士襲擊和暗殺的風險。"
10041010-138 = "然而聖亞同學現在，已經不再具備能提早察覺危險並加以防範的能力。#n我可以坦承地告訴各位，他在我眼裡是個「必須接受保護的對象」。"
10041010-143 = "又是這件事嗎……"
10041010-144 = "從人身安全的層面來看，我反而覺得由彌香同學去更安全。"
10041010-145 = "我在渚醬眼裡究竟是什麼樣子呢……？"
10041010-146 = "千年科學學園是個治安狀況穩定的自治區，發生犯罪的可能性相對較低。"
10041010-147 = "話雖如此，由於那裡是新科技的研發重地，#n因而導致的「意外」遠高於其他學園也是事實。"
10041010-148 = "萬一，我是說萬一聖亞同學真的被捲入了不可預期的意外之中……"
10041010-149 = "你這個說法太荒謬了。#n真要這麼說的話，難道你自己就不會被捲進意外之中嗎？"
10041010-150 = "……我說的是聖亞同學的情況，和我沒有任何關係。"
10041010-152 = "這好像有點前後矛盾……"
10041010-156 = "話說為什麼你們都不把我考慮進去呢？"
10041010-157 = "因為彌香同學現在確實不太適合擔任「三一的代表」……"
10041010-161 = "啊……對哦。#n耶嘿嘿，抱歉……"
10041010-162 = "即便撇除這點，我們也無法預料派你去會衍生什麼樣的問題。"
10041010-163 = "…………"
10041010-164 = "[s7]「所以結論就是你們互相在擔心彼此嘛。」\n[s8]「太好了，幸好你們三個關係依舊很好。」"
10041010-170 = "老師，雖然我很感謝您這麼說，但現在不是說這些的時候……"
10041010-171 = "……嗯？"
10041010-172 = "老師您同意聖亞同學的看法？"
10041010-178 = "……您是認真的嗎？"
10041010-180 = "老師？"
10041010-181 = "老師……？#n你說你同意……我的看法？"
10041010-182 = "[s9]「如果你們不介意的話，我會陪他一起去的。」\n[s10]「這樣要是發生什麼事的話，我也能立刻通知你們。」"
10041010-187 = "哎呀……"
10041010-188 = "有點意外。這樣渚醬找老師來不就是扯了自己的後腿嗎？#n事情的發展好像有點出乎我的預料呢。"
10041010-189 = "但他會不會「接受」這個決定，又是另一回事了。"
10041010-194 = "唔嗯……"
10041010-195 = "原來如此，老師是這麼想的啊。"
10041010-208 = "……唉。"
10041010-209 = "我明白了。#n既然老師願意幫忙，這件事就交給聖亞同學去辦吧。"
10041010-214 = "……渚？"
10041010-215 = "太陽打西邊出來了嗎？#n你竟然答應得這麼爽快！？"
10041010-216 = "這麼快下決定很不像渚醬的作風哦？這樣真的好嗎？"
10041010-221 = "我在各位眼裡的形象究竟是……"
10041010-222 = "正如剛才所說，我並沒有刻意阻攔聖亞同學離開三一。#n我的目的只不過是要保障他的安全罷了。"
10041010-223 = "坦白說即便老師同意，我還是「難以認定」這麼做就沒有後顧之憂。"
10041010-224 = "其實我自己也清楚，這些或許都只是我過度的擔憂。#n雖然心裡清楚……卻依然無法放下。"
10041010-225 = "不過既然老師……至今為我們做了那麼多的老師願意出面的話……"
10041010-226 = "我願意努力用信任壓抑心中的焦慮，相信老師無論如何都會替我們解決問題。"
10041010-227 = "……沒錯，我相信老師。"
10041010-228 = "[s11]「謝謝你，渚。」\n[s12]「什麼事也不會發生的，別擔心。」"
10041010-231 = "如果真是如此，那就再好不過了。"
10041010-237 = "渚……"
10041010-239 = "你信任的不是我……而是老師嗎。"
10041010-243 = "[log]現在[/log]"
10041010-247 = "其實我也知道，這終究是我自己的問題。#n是我的自卑感在作祟。"
10041010-248 = "「無法預言又沒有力量的百合園聖亞派不上用場」"
10041010-249 = "我非常清楚渚……不，是他們兩個絕不會有這種想法。"
10041010-250 = "但我還是無法妥善控制自己的情緒，這或許是因為我還太年輕的緣故吧。"
10041010-251 = "畢竟我們大家……終究還是如此脆弱而不成熟的孩子。"
10041010-252 = "不過也正因如此，我才會更想來參加千年博覽會並擔任領隊。"
10041010-253 = "因為我總覺得自己必須做點什麼……才能讓我認可我自己。"
10041010-254 = "說白了就是在耍任性罷了。#n老師你應該也清楚吧？"
10041010-255 = "[s13]「我反而認為這是一次很不錯的嘗試。」\n[s14]「這是個必要的過程，絕對不是什麼任性。」"
10041010-258 = "老師又要說這種話嗎？"
10041010-259 = "不過謝謝你。我感覺心情輕鬆了不少。"
10041010-260 = "既然如此……如果老師不介意的話……"
10041010-261 = "或許這個要求對老師有點過分，但我可以拜託你一件事嗎？"
10041010-262 = "我也明白這麼說真的很任性，但這一切都是為了讓我能夠認可我自己。"
10041010-263 = "為了讓我能明確感受到自己可以有所成就。"
10041010-264 = "所以在這次的出差，也就是千年博覽會期間……"
10041010-265 = "希望老師你不要……"
10041010-272 = "……好像到了呢。"
10041010-273 = "我們先下車吧。#n等下車之後……我再找機會跟你說明。"

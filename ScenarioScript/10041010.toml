[translation]
10041010-1 = "Episode 1;Proof of Self"
10041010-3 = "[log]1 Week Ago[/log]"
10041010-9 = "...Incomprehensible! In case you need a reminder..."
10041010-10 = "...this sort of task has always been MY responsibility. I have far more experience with it than Nagisa does."
10041010-11 = "So why are you saying that...?"
10041010-12 = "...Wait, do you not think I have what it takes anymore?"
10041010-16 = "You know I don't mean it like that, Seia. I'm just..."
10041010-20 = "[ns] \"...?\""
10041010-21 = "S-Seia? What's wrong? You're quite upset. Why?"
10041010-22 = "Must you ask? You never change, do you, Mika?"
10041010-23 = "Seia?!"
10041010-24 = "Easy, Seia. Mika, let's hear her out before we say anything more."
10041010-25 = "Oh, wonderful, let me explain it all over again..."
10041010-26 = "Again, what is going on with this attitude of yours?"
10041010-27 = "Both of you, please calm down. If anyone hears this, they might misunderstand and think we're having an argument."
10041010-28 = "Oh, but what's there to argue about? Apparently, Nagisa simply decides everything now."
10041010-29 = "Seia!!"
10041010-30 = "[ns1] \"What's going on in there?\"\n[ns2] Follow the voices."
10041010-38 = "Hm?"
10041010-39 = "Sensei...?"
10041010-44 = "Huh? Sensei? What are you doing here...?"
10041010-48 = "You, um, did you happen to overhear that? We were just..."
10041010-49 = "W-Well, we weren't fighting! Not at all! We just..."
10041010-55 = "*sigh*"
10041010-56 = "I called Sensei here. I thought we might need help."
10041010-61 = "Nagisa...?"
10041010-62 = "YOU did?"
10041010-64 = "I was hoping it wouldn't come to this, but seeing as it has, we clearly need a mediator. Who better than Sensei?"
10041010-65 = "Normally, we'd settle this ourselves, but..."
10041010-67 = "...Ah!"
10041010-68 = "\"When you're worried, don't worry alone, get help from a friend or an adult.\""
10041010-69 = "That's the rule we set for ourselves, right?"
10041010-70 = "...Very well, I see it all clearly now."
10041010-71 = "You called in Sensei to bolster yourself and have me sidelined, didn't you, Nagisa?"
10041010-72 = "There you go again!"
10041010-74 = "Listen to me. I'm very serious."
10041010-75 = "And I'm serious because I'm worried about you, Seia."
10041010-76 = "If nothing else, I sincerely hope you can understand that."
10041010-77 = "That's right, that's right! Nagi's only being pushy because she's worried about you, Seia!"
10041010-78 = "Sometimes she's unclear and gets misunderstood, but NOT this time!"
10041010-79 = "You're one to talk..."
10041010-85 = "[ns3] \"Can someone tell me what's happening?\"\n[ns4] \"I'm sure everyone here has their reasons. Let's talk.\""
10041010-89 = "Well, I suppose we might as well let Seia explain."
10041010-90 = "Seia, if you wouldn't mind..."
10041010-95 = "...Huh. How uncharacteristic of you."
10041010-96 = "I'd expected you to blather to Sensei right away, and color this whole talk with your own opinions."
10041010-98 = "Seia, that's too far."
10041010-99 = "Again, Nagi is only doing this because she's worried about you!"
10041010-103 = "Nagi..."
10041010-109 = "...I'm sorry. That WAS too far."
10041010-110 = "I lost my temper. I truly didn't mean it."
10041010-111 = "And I understand. Nagisa, you wish to be reassured — well, convinced — that you needn't worry about me at all."
10041010-112 = "I never once doubted that your worries were sincere. How could I?"
10041010-113 = "..."
10041010-114 = "Your sincerity is well beyond question, and always has been."
10041010-115 = "Seia..."
10041010-116 = "But even so, I feel you've overstepped. Especially given the specific issue at hand."
10041010-117 = "[s5] \"Overstepped?\"\n[s6] \"What issue?\""
10041010-120 = "Let me explain the topic of debate. Put simply, we're determining which of us will represent the Tea Party at the Millennium Expo."
10041010-123 = "It's a grand demonstration of technology, hosted by Millennium, and we agreed to hold an exchange with students from our school."
10041010-124 = "Nagisa has nominated herself, and I've nominated myself in turn."
10041010-125 = "My main concern is her workload and fatigue."
10041010-128 = "Hers is my health and safety. And so, we have a conflict to resolve."
10041010-129 = "To begin with, I have no trouble representing the Tea Party. I've facilitated many such diplomatic events in the past."
10041010-130 = "Nagisa is already overworked with Trinity's internal affairs. Were she to leave now, she would have to put too much on hold, and that would be...counterproductive."
10041010-131 = "Conversely, as I said, Nagisa has raised the issue of my health and safety. But..."
10041010-132 = "Her health has improved, a great deal, but she's barely out of \"patient\" status."
10041010-133 = "And that is not my personal opinion, it's an objective statement from the Remedial Knights."
10041010-134 = "For all of us in the Tea Party, the constant threat of attack is a fact of life..."
10041010-138 = "Seia can no longer predict and prepare for them like she used to. To be honest, I think she needs protection."
10041010-143 = "There it is again..."
10041010-144 = "There's no point in sugarcoating it. Even Mika can defend herself better than you can now."
10041010-145 = "Just what is that supposed to mean...?"
10041010-146 = "Now, I concede that Millennium Science School is a safer place than most, and an attack there is unlikely."
10041010-147 = "That being said, their technology is often unstable, and so they're prone to accidents. We can't ignore that risk."
10041010-148 = "If, by some stroke of bad luck, Seia were caught in such an accident..."
10041010-149 = "And why would your luck be any better than mine?"
10041010-150 = "...I'm talking about you, Seia. It has nothing to do with me."
10041010-152 = "Something doesn't quite make sense there..."
10041010-156 = "By the way, why am I not even being considered for this?"
10041010-157 = "Well, Mika, you're in a bit of a difficult position to represent Trinity at the moment..."
10041010-161 = "Ah... Right. Ehehe, sorry..."
10041010-162 = "Sending Mika is a risk neither of us are willing to take."
10041010-163 = "..."
10041010-164 = "[s7] \"So you two are both worried about each other.\"\n[s8] \"It sounds like you really care.\""
10041010-170 = "That's kind of you, Sensei, but now's not the time for..."
10041010-171 = "...What?"
10041010-172 = "You agree with Seia?"
10041010-178 = "...With Seia, really?"
10041010-180 = "Sensei?"
10041010-181 = "You agree with me?"
10041010-182 = "[s9] \"What if I were to come along?\"\n[s10] \"I could let you know right away if something happens.\""
10041010-187 = "Huh..."
10041010-188 = "That was unexpected. I suppose calling Sensei didn't quite go the way you thought, did it, Nagi?"
10041010-189 = "Although she has yet to agree..."
10041010-194 = "...Hmm..."
10041010-195 = "I see. So that's your proposal, Sensei."
10041010-208 = "*sigh*"
10041010-209 = "Understood. If you say you can keep her safe, then I will trust you."
10041010-214 = "...Nagisa?"
10041010-215 = "You're so agreeable all of a sudden. What happened?"
10041010-216 = "Just making up your mind instantly like that? Are you okay?"
10041010-221 = "What sort of person do you think I am, exactly?"
10041010-222 = "I already said I don't wish to stop her from going. I only wish to guarantee her safety."
10041010-223 = "And honestly, even with Sensei there, her safety can't be \"guaranteed,\" not completely."
10041010-224 = "Of course, much of this comes from my own anxiety. I know that. But still..."
10041010-225 = "...Well, regardless, we all know Sensei has a long history of success."
10041010-226 = "And my faith in that success outweighs my anxiety, as much as anything can."
10041010-227 = "...Yes. Sensei, I believe in you."
10041010-228 = "[s11] \"Thank you, Nagisa.\"\n[s12] \"Don't worry. I won't let anything go wrong.\""
10041010-231 = "You carry all my hopes with you."
10041010-237 = "Nagisa, you..."
10041010-239 = "...You trust Sensei...but not me."
10041010-243 = "[log]Back in the Present[/log]"
10041010-247 = "I know this is my own internal problem. A lack of self-esteem, in a way."
10041010-248 = "\"What good is Seia if she can't predict anything? She's useless now!\""
10041010-249 = "I don't think Nagisa would ever actually say that, or even think it. I don't think either of them would."
10041010-250 = "But even though I know that in my head...well, I'm still immature in some ways, particularly when it comes to my emotions."
10041010-251 = "We all have our gaps and flaws, I suppose."
10041010-252 = "That's why I wanted this Millennium Expo job, to lead students there."
10041010-253 = "I feel like I need to accomplish something, to make myself acknowledge my own worth."
10041010-254 = "But it's all just a tantrum, isn't it, Sensei?"
10041010-255 = "[s13] \"Not at all. You're helping yourself heal.\"\n[s14] \"It's all part of the process. There's nothing wrong with it.\""
10041010-258 = "Always so encouraging."
10041010-259 = "Thank you. That does make me feel a bit better."
10041010-260 = "In that case, Sensei...if it sits well with you..."
10041010-261 = "...might I ask for one more favor?"
10041010-262 = "This may be childish of me, and certainly stubborn, but if I wish to fully embrace and acknowledge myself..."
10041010-263 = "...to experience my own competence and confidence..."
10041010-264 = "...while I'm out and about at the Millennium Expo, could you possibly..."
10041010-265 = "...not follow m—"
10041010-272 = "...We're here."
10041010-273 = "Well, on with it, then. We'll speak again soon, no doubt."

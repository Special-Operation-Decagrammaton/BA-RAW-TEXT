[translation]
10041010-1 = "ตอนที่ 1;พิสูจน์ตัวเอง"
10041010-3 = "[log]1 สัปดาห์ก่อน[/log]"
10041010-9 = "ไม่เห็นเข้าใจเลยค่ะ ฉันจะขอพูดเพื่อเตือนความจำอีกครั้งนะคะ..."
10041010-10 = "ปกติแล้วงานแบบนี้คืองานของฉันค่ะ เดิมทีแล้วฉันเคยรับหน้าที่ในงานแบบนี้มากกว่านางิสะอีกนะคะ"
10041010-11 = "แต่ตอนนี้กลายเป็นว่า..."
10041010-12 = "ไม่สิ... หรือว่าคิดว่า 'จากนี้ไป' ฉันจะทำไม่ได้แล้วคะ?"
10041010-16 = "คุณเซอา คุณก็รู้ไม่ใช่เหรอคะว่าฉันไม่ได้หมายความแบบนั้นน่ะ? ฉันก็แค่..."
10041010-20 = "[ns] \"...?\""
10041010-21 = "ซะ... เซอาจัง? เป็นอะไรเหรอ? ทำไมดูอารมณ์เสียจังเลยล่ะ? มีเรื่องอะไรทำให้อารมณ์ไม่ดีเหรอ?"
10041010-22 = "เพิ่งจะมารู้สึกได้เอาตอนนี้เหรอคะ? แต่ก็นะ ก็สมกับที่เป็นมิกะแล้วละค่ะ..."
10041010-23 = "เซอาจัง!?"
10041010-24 = "ใจเย็นๆ ก่อนค่ะ คุณเซอา คุณมิกะก็ฟังคุณเซอาก่อนแล้วค่อยพูดนะคะ"
10041010-25 = "ฉันต้องอธิบายเรื่องนี้อีกครั้งเหรอคะ ฉันละผิดหวังกับสถานการณ์นี้จังเลยค่ะ"
10041010-26 = "พูดแบบนั้นอีกแล้ว..."
10041010-27 = "ทั้งสองคนใจเย็นๆ ก่อนนะคะ... ถ้าใครคนอื่นมาได้ยินเข้า คงเข้าใจผิดว่าพวกเรากำลังโต้เถียงกันเอง#nแล้วค่ะ"
10041010-28 = "มีโอกาสโต้เถียงด้วยเหรอคะ? สภาน้ำชาตอนนี้น่ะ นางิสะเป็นคนตัดสินใจทุกอย่างเลยไม่ใช่เหรอ"
10041010-29 = "เซอาจัง!!!"
10041010-30 = "[ns1] \"เกิดอะไรขึ้นเนี่ย...?\"\n[ns2] เดินไปตามเสียง"
10041010-38 = "...?"
10041010-39 = "คุณครู...?"
10041010-44 = "เอ๋? คุณครู? ทำไมคุณครูถึงมาอยู่ตรงนี้...??"
10041010-48 = "อย่าบอกนะว่าเมื่อกี้ได้ยินหมดเลย? ระ... เรื่องนั้นน่ะ คือว่า... อ่า... คือว่า..."
10041010-49 = "มะ... ไม่ใช่นะ! เราไม่ได้ทะเลาะหรืออะไรกันเลย! พวกเราก็แค่...!!"
10041010-55 = "เฮ้อ..."
10041010-56 = "ฉันเป็นคนขอร้องให้คุณครูมาเองค่ะ พอดีฉันมีความรู้สึกว่าเรื่องจะออกมาเป็นอย่างนี้น่ะค่ะ"
10041010-61 = "นางิสะ...?"
10041010-62 = "นางิจังน่ะเหรอ?"
10041010-64 = "ฉันหวังว่ามันจะเป็นแค่ความกังวลที่เปล่าประโยชน์ แต่ก็น่าเสียดายที่มันออกมาเป็นอย่างที่กังวลเอาไว้ ฉันเลยอยากให้คุณครูช่วยจัดการสถานการณ์ตอนนี้หน่อยค่ะ"
10041010-65 = "แม้ว่าปกติแล้วเรื่องแบบนี้พวกฉันจะเป็นคนหาทางออกกันเองก็เถอะค่ะ..."
10041010-67 = "อ๊ะ...!"
10041010-68 = "เวลาวิตกกังวลหรือเจอเรื่องยากลำบาก ก็อย่ากังวลอยู่คนเดียว แต่ให้รับความช่วยเหลือจากคนอื่น หรือจากผู้ใหญ่!"
10041010-69 = "พวกเรา... เราสัญญากันไว้อย่างนั้นนี่เนอะ!"
10041010-70 = "ก็เลยเป็นอย่างนี้สินะคะ..."
10041010-71 = "ถึงกับเรียกคุณครูมาช่วยโน้มน้าวเลยเหรอ ทำแบบนี้ถือว่าจริงใจแล้วเหรอคะ นางิสะ"
10041010-72 = "พูดแบบนี้อีกแล้ว!!"
10041010-74 = "ฉันจริงใจเสมอค่ะ ถ้าฉันล้อเล่น ฉันก็บอกว่าล้อเล่นไปตั้งแต่แรกแล้วค่ะ"
10041010-75 = "และที่ฉันทำอย่างจริงใจแบบนี้ ก็เพราะว่าฉันเป็นห่วงคุณเซอาค่ะ"
10041010-76 = "ฉันหวังจากใจจริงว่า... คุณเซอาจะไม่เข้าใจผิดในส่วนนี้นะคะ"
10041010-77 = "ใช่แล้วละ ใช่แล้ว! ที่นางิจังทำแบบนี้ก็เพราะเป็นห่วงเซอาจังนะ!"
10041010-78 = "ถึงแม้ว่าปกติแล้วจะทำอะไรให้น่าเข้าใจผิดอยู่บ่อยๆ ก็เถอะ!"
10041010-79 = "นั่นคือสิ่งที่พูดออกจากปากคุณเหรอคะ..."
10041010-85 = "[ns3] \"อธิบายกับครูหน่อยได้มั้ยว่าเกิดอะไรขึ้น?\"\n[ns4] \"ไหนใครช่วยอธิบายได้มั้ยว่านี่มันเรื่องอะไรกัน?\""
10041010-89 = "ฉันว่าถ้าให้คุณเซอาบอกด้วยตัวเอง บรรยากาศน่าจะดีกว่าให้ฉันพูดนะคะ"
10041010-90 = "คุณเซอา ช่วยอธิบายสถานการณ์ให้คุณครูฟังหน่อยได้มั้ยคะ?"
10041010-95 = "น่าแปลกใจนะคะ...?"
10041010-96 = "ฉันคิดว่านางิสะจะอธิบายต่อ เพื่อทำให้สถานการณ์เป็นประโยชน์ต่อตัวเองเสียอีกค่ะ"
10041010-98 = "เซอาจัง วันนี้พูดแรงไปแล้วนะ!?"
10041010-99 = "แต่ถึงยังไงนางิจังก็เป็นห่วงเซอาจังนะ ก็เลย...!!"
10041010-103 = "นางิจัง..."
10041010-109 = "ขอโทษค่ะ... เมื่อกี้ฉันพูดแรงเกินไปจริงๆ ค่ะ"
10041010-110 = "ฉันพูดไปแบบนั้นเพราะโกรธน่ะค่ะ นั่นไม่ได้มาจากใจจริงของฉันหรอก"
10041010-111 = "ฉันรู้ดีค่ะ ฉันรู้ว่านางิสะต้องการหลักฐานที่เชื่อถือได้... ไม่สิ ต้องเรียกว่าหลักฐานที่จะ 'วางใจได้' มากกว่า"
10041010-112 = "ฉันไม่เคยสงสัยในสิ่งที่คุณเป็นห่วงฉันเลยค่ะ คุณก็ไม่ใช่ใครอื่น..."
10041010-113 = "..."
10041010-114 = "ฉันจะไปสงสัยในความตั้งใจจริงของคุณได้ยังไงกันคะ เรื่องแบบนั้นไม่มีทางเกิดขึ้นหรอกค่ะ..."
10041010-115 = "คุณเซอา..."
10041010-116 = "แต่ถึงฉันจะคำนึงถึงเรื่องนั้น แต่ฉันก็รู้สึกว่ามันเกินไปจริงๆ โดยเฉพาะในเรื่องนี้น่ะค่ะ"
10041010-117 = "[s5] \"เกินไป?\"\n[s6] \"โดยเฉพาะในเรื่องนี้?\""
10041010-120 = "ฉันควรต้องบอกหัวข้อของเรื่องที่เรากำลังถกเถียงกันอยู่ตอนนี้ก่อนนะคะ พูดง่ายๆ ก็คือ เรากำลัง#nคุยกันเรื่อง <ตัวแทนของทรีนิตี้> ที่จะไปเข้าร่วมงาน <มิลเลเนียม เอ็กซ์โป> ค่ะ"
10041010-123 = "งานนั้นเป็นงานสาธิตเทคโนโลยีขนาดใหญ่ที่มิลเลเนียมเป็นเจ้าภาพจัดขึ้น และเราจะมีการส่งนักเรียน#nไปดูงานนั้นในตลอดระยะเวลางานด้วยค่ะ"
10041010-124 = "นางิสะบอกว่าตัวเองควรเป็นคนที่ต้องไป ส่วนฉันก็คิดว่าฉันควรต้องไปค่ะ"
10041010-125 = "เหตุผลของฉันก็คือภาระงานและความเหนื่อยล้าที่มากเกินไปของนางิสะในตอนนี้"
10041010-128 = "ส่วนเหตุผลของนางิสะก็คือเรื่องฟื้นฟูสุขภาพกับความปลอดภัยของฉัน เราเห็นต่างกันในส่วนนี้ละค่ะ"
10041010-129 = "ในฐานะของสมาชิกอย่างเป็นทางการของสภาน้ำชา ฉันคิดว่าตัวเองไม่มีปัญหาในเรื่องคุณสมบัติการ#nเข้าร่วมค่ะ ส่วนงานที่เกี่ยวกับวิเทศสัมพันธ์ในลักษณะนี้ ที่ผ่านมาฉันก็เคยทำมาแล้วด้วย"
10041010-130 = "ตอนนี้แค่งานภายในของทรีนิตี้ก็ทำให้นางิสะงานล้นมือจนเหนื่อยแล้วค่ะ ถ้าต้องออกไปทำงาน#nข้างนอกอีก งานภายในของโรงเรียนตอนนี้ก็คงเป็นอัมพาต... ถ้าจะทำแบบนั้นก็ไม่ถูกหรอกค่ะ"
10041010-131 = "ในทางกลับกัน ปัญหาที่นางิสะเสนอ หรือก็คือความกังวลของนางิสะ... ก็คือเรื่องสุขภาพ และความปลอดภัยของฉันค่ะ..."
10041010-132 = "ถึงแม้ตอนนี้สุขภาพของคุณเซอาจะดีขึ้นกว่าแต่ก่อนอย่างเห็นได้ชัด แต่ถ้าจะพูดให้ชัดเจน ก็ต้องบอกว่าเพิ่งจะหลุดออกจากการเป็น 'คนไข้' เองค่ะ"
10041010-133 = "นี่ไม่ใช่ความคิดเห็นส่วนตัวของฉัน แต่เป็นความคิดเห็นที่เป็นกลางจากชมรมอัศวินบรรเทาทุกข์ค่ะ"
10041010-134 = "นอกจากนี้ การที่บุคคลสำคัญในสภาน้ำชาอย่างพวกเราจะถูกบุกจู่โจมหรือโจมตีไม่ว่าที่ไหน เมื่อไร และด้วยเรื่องอะไรก็ไม่นับว่าเป็นเรื่องแปลก"
10041010-138 = "แต่ถ้าเป็นคุณเซอาละก็ ตอนนี้เราคงคาดการณ์หรือเตรียมการล่วงหน้าไม่ได้เหมือนเมื่อก่อน ถ้าจะให้พูดตรงๆ ละก็ ฉันมองว่าคุณเซอาคือ 'คนที่ต้องได้รับการคุ้มครอง' ค่ะ"
10041010-143 = "พูดเรื่องนี้อีกแล้ว..."
10041010-144 = "เรื่องที่ช่วยไม่ได้ก็ต้องทำใจยอมรับค่ะ ถ้าพิจารณาในเรื่องนั้น ฉันว่าคุณมิกะปลอดภัยกว่าค่ะ"
10041010-145 = "นางิจังคิดยังไงกับฉันกันเนี่ย...?"
10041010-146 = "แน่นอนว่าโรงเรียนวิทย์มิลเลเนียมก็อยู่ในสถานที่ที่ปลอดภัยค่ะ เรื่องอาชญากรรมก็แทบไม่ต้องกังวล#nเลยด้วย"
10041010-147 = "แต่ถึงยังไง ที่นั่นก็มีการพัฒนาเทคโนโลยีใหม่ๆ อยู่บ่อยๆ จึงเกิด 'อุบัติเหตุ' จากการพัฒนามากกว่า#nในโรงเรียนอื่นค่ะ เรื่องนี้เรามองข้ามไม่ได้หรอกค่ะ"
10041010-148 = "ต่อให้จะมีโอกาสแค่ 0.0001% แต่ถ้าคุณเซอาไปข้องเกี่ยวกับอุบัติเหตุที่ไม่คาดฝันที่โรงเรียนนั้น#nขึ้นมาละก็..."
10041010-149 = "เหลวไหลค่ะ ถ้าจะพูดเรื่องนี้ หมายความว่าตัวเองไม่เคยไปข้องเกี่ยวกับอุบัติเหตุอะไรเลยเหรอคะ นางิสะ?"
10041010-150 = "ฉันกำลังพูดถึงเรื่องของคุณเซอาค่ะ... ส่วนเรื่องของฉันมันไม่เกี่ยวค่ะ"
10041010-152 = "ถ้างั้นมันก็ไม่ถูกสิ..."
10041010-156 = "จะว่าไป ทำไมฉันถึงไม่ถูกเสนอเป็นตัวแทนบ้างล่ะ?"
10041010-157 = "นั่นเป็นเพราะตอนนี้ยังยากที่จะให้คุณมิกะไปเป็น 'ตัวแทนของทรีนิตี้' ยังไงล่ะคะ..."
10041010-161 = "อ่า... จริงสินะ แหะๆๆ ขอโทษนะ..."
10041010-162 = "ที่ฉันไม่เคยเสนอชื่อของมิกะ ก็เพราะห่วงว่ามิกะจะไปสร้างปัญหาอะไรน่ะค่ะ"
10041010-163 = "..."
10041010-164 = "[s7] \"สุดท้ายทุกคนก็เป็นห่วงกันเองสินะ\"\n[s8] \"ค่อยยังชั่วนะที่เห็นทุกคนเป็นห่วงกัน\""
10041010-170 = "ขอบคุณสำหรับคำพูดดีๆ นะคะคุณครู แต่ตอนนี้ฉันว่าไม่ใช่เวลามาชื่นชม..."
10041010-171 = "คะ...?"
10041010-172 = "คุณครูบอกว่าเห็นด้วยกับความเห็นของคุณเซอางั้นเหรอคะ?"
10041010-178 = "ความเห็นของคุณเซอาเนี่ยนะคะ...?"
10041010-180 = "คุณครู?"
10041010-181 = "คุณครู...? เห็นด้วยกับความคิดเห็น... ของฉันเหรอ?"
10041010-182 = "[s9] \"ถ้านางิสะไม่ว่าอะไร ครูจะติดตามไปด้วยเอง\"\n[s10] \"ถ้าเกิดเรื่องอะไรจะรีบบอกเลย\""
10041010-187 = "เอ๋..."
10041010-188 = "คิดไม่ถึงเลยนะ ถ้างั้นแบบนี้นางิจังก็เรียกคุณครูมาเสียเที่ยวน่ะสิ? ไม่เป็นไปอย่างที่คิดแฮะ?"
10041010-189 = "แต่อีกปัญหาหนึ่งก็คือ แล้วเธอคนนั้นจะ 'ยอมรับ' ข้อเสนอนี้หรือเปล่าค่ะ"
10041010-194 = "อืม..."
10041010-195 = "อย่างนี้สินะคะ คุณครูคิดอย่างนี้สินะ"
10041010-208 = "เฮ้อ..."
10041010-209 = "เข้าใจแล้วค่ะ ในเมื่อคุณครูรับประกันในส่วนนั้น ฉันก็จะเชื่อและยอมให้ไปค่ะ"
10041010-214 = "นางิสะ...?"
10041010-215 = "อะไรกันเนี่ย? ยอมง่ายๆ แบบนี้เลยเหรอ!?"
10041010-216 = "รีบตอบในทันทีแบบนี้ไม่สมกับเป็นนางิจังเลยนะ? แบบนี้ไม่เป็นอะไรเหรอ?"
10041010-221 = "ทุกคนคะ ไม่ทราบว่ามองฉันเป็นคนยังไง..."
10041010-222 = "อย่างที่ฉันบอกไปว่าฉันไม่ได้พยายามจะห้ามไม่ให้คุณเซอาออกไปข้างนอกค่ะ ฉันก็แค่คำนึงถึงความ#nปลอดภัยของคุณเซอาน่ะ"
10041010-223 = "พูดตามตรงว่าต่อให้คุณครูจะเห็นด้วยกับคุณเซอา แต่มันก็ยัง 'ยากที่จะคิด' ว่าจะไม่เกิดเหตุอะไรค่ะ"
10041010-224 = "ฉันจะพูดตามตรงค่ะ ฉันรู้ว่านี่คืออาการวิตกกังวลของฉันเอง ฉันรู้ค่ะ... แต่ก็"
10041010-225 = "แต่ในเมื่อคนที่จะไปด้วยคือคุณครู และที่ผ่านมาคุณครูก็ช่วยเหลือพวกเราหลายอย่าง"
10041010-226 = "งั้นฉันก็จะพยายามปกปิดความกังวลด้วยความเชื่อที่ว่า 'ไม่ว่ายังไงคุณครูก็จะจัดการให้ได้'"
10041010-227 = "ค่ะ... ฉันเชื่อคุณครูค่ะ"
10041010-228 = "[s11] \"ขอบใจนะ นางิสะ ครูจะไม่ให้เกิดเรื่องอะไรหรอก\"\n[s12] \"ไม่ต้องห่วงนะ จะไม่มีเรื่องอะไรหรอก\""
10041010-231 = "ฉันเองก็หวังว่าจะเป็นอย่างนั้นค่ะ"
10041010-237 = "นางิสะ..."
10041010-239 = "ไม่ได้เป็นเพราะเชื่อใจฉัน แต่เป็นเพราะเชื่อใจคุณครู... อย่างนั้นหรอกเหรอคะ?"
10041010-243 = "[log]ปัจจุบัน[/log]"
10041010-247 = "ฉันเองก็รู้ค่ะว่าสุดท้ายแล้วนี่คือปัญหาของฉันเอง มันคือปมอย่างหนึ่งน่ะค่ะ"
10041010-248 = "\"ยูริโซโนะ เซอาที่พยากรณ์ไม่ได้และไม่มีพลังอะไรน่ะเป็นคนไร้ประโยชน์\""
10041010-249 = "ฉันพอจะรู้ดีค่ะว่านางิสะ... ไม่สิ ฉันพอจะรู้ดีว่าทั้งสองคนไม่ได้คิดแบบนั้นค่ะ"
10041010-250 = "ฉันรู้ดีค่ะ แต่เพราะฉันเองและทุกคนก็ยังเด็ก ก็เลยยังควบคุมอารมณ์ของตัวเองทั้งหมดไม่ได้"
10041010-251 = "สุดท้ายพวกฉันก็เลยทั้งอ่อนแอและบกพร่อง... พวกฉันทุกคนก็เป็นแบบนี้ละค่ะ"
10041010-252 = "ที่จริงเพราะอย่างนั้น ฉันก็เลยอยากเป็นผู้นำนักเรียนไปดูงานมิลเลเนียม เอ็กซ์โปครั้งนี้ค่ะ"
10041010-253 = "ฉันรู้สึกว่าต้องทำอะไรสักอย่าง... ไม่ใช่เพื่อให้ใครคนอื่น แต่เป็นเพื่อให้ตัวฉันเองเกิดความยอมรับใน#nตัวเองค่ะ"
10041010-254 = "เป็นการทำตัวเหมือนเด็กที่น่าสมเพชใช่มั้ยล่ะคะ ฉันรู้ว่าคุณครูก็รู้ดีค่ะ"
10041010-255 = "[s13] \"ไม่หรอก ครูว่าเป็นการกระทำที่ยอดเยี่ยมเลยนะ\"\n[s14] \"นี่คือกระบวนการที่ต้องเกิดอยู่แล้ว ไม่มีอะไรแย่หรอก\""
10041010-258 = "พูดอย่างนี้กับฉันอีกแล้วเหรอคะ?"
10041010-259 = "ขอบคุณค่ะ แบบนี้ฉันก็โล่งใจขึ้นมาหน่อยน่ะค่ะ"
10041010-260 = "ถ้างั้น... คุณครูคะ ถ้าคุณครูไม่ว่าอะไร..."
10041010-261 = "บางทีนี่อาจเป็นการขอที่มากเกินไปก็ได้ แต่ฉันขอรบกวนคุณครูสักอย่างได้มั้ยคะ?"
10041010-262 = "ฉันทั้งทำตัวเหมือนเด็กและเอาแต่ใจ แต่เพื่อให้ฉันยอมรับในตัวเองได้"
10041010-263 = "และเพื่อให้รู้สึกได้เองว่าฉันคนนี้สามารถทำอะไรด้วยตัวเองได้"
10041010-264 = "ในระหว่างที่ฉันไปเป็นผู้นำนักเรียนที่ไปดูงานในมิลเลเนียม เอ็กซ์โปครั้งนี้ ขอให้คุณครู..."
10041010-265 = "แยก..."
10041010-272 = "มาถึงแล้วสินะคะ..."
10041010-273 = "ลงกันก่อนเถอะค่ะ ไว้ลงไปแล้ว... ฉันจะพิจารณาสถานการณ์แล้วอธิบายให้ฟังอีกรอบค่ะ"

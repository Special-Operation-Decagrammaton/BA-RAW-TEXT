[translation]
1008903-1 = "ดูคล้ายขึ้นบ้างมั้ยนะ?"
1008903-2 = "(ที่ที่อารุให้คุณครูไปหาคือสถานที่บรรยายธุรกิจที่มีผู้ประกอบการรายใหญ่และคนจากโลกสีเทามารวม#nตัวกัน)"
1008903-6 = "เข้ามาสิ คุณครู ฉันกำลังรออยู่เลย"
1008903-7 = "[s1] \"อารุ...?\"\n[s2] \"มาฟังการบรรยายธุรกิจเหรอ...?\""
1008903-10 = "ฮุฮุ พอดีวันนี้มีการเปิดตัวโปรเจกต์ที่ฉันสนใจน่ะ แล้วก็นึกถึงคำที่คุณครูเคยพูดไว้ด้วย"
1008903-11 = "ที่บอกว่าฉันไม่ต้องหาวันที่จะได้ใส่ชุด... แต่เดี๋ยววันที่ต้องใส่ชุดจะมาหาฉันเองน่ะ"
1008903-12 = "ถ้าฉันใส่ชุดนักเรียนมาในที่แบบนี้... เดี๋ยวคนอื่นได้ดูถูกว่าฉันเป็นนักเรียนกันพอดี"
1008903-13 = "ฉันก็เลยใส่ชุดเดรสนี้มา และไหนๆ ก็ใส่มาแล้ว... ฉันก็เลยเรียกคุณครูที่เป็นหุ้นส่วนที่ไว้ใจได้#nมากที่สุดของหน่วยรับจ้างสารพัดมาด้วย"
1008903-14 = "ฮุฮุ... ว่ายังไงล่ะ? ถือว่าฉันตัดสินใจได้ดีเลยใช่มั้ย?"
1008903-18 = "ฉันทำถูกต้องเลยใช่มั้ยล่ะ?"
1008903-19 = "[s3] \"โอ้... ถูกต้องเลย!\"\n[s4] \"เยี่ยมไปเลย นั่นละที่ครูจะสื่อ!\""
1008903-22 = "ฮุฮุฮุ งั้นก็ดีมากๆ เลย"
1008903-23 = "ถ้างั้นวันนี้ฉันจะเสนออะไรบางอย่างกับครูเป็นพิเศษ แต่ไม่ใช่ในฐานะนักเรียนของคุณครู แต่เป็น 'ประธาน' คนหนึ่ง"
1008903-24 = "เข้าไปฟังบรรยายธุรกิจด้วยกันกับฉันมั้ยล่ะ? ฉันไม่ได้ขอปากเปล่าเฉยๆ หรอกนะ"
1008903-25 = "ถ้าธุรกิจไปได้สวย... ฉันจะตอบแทนให้อย่างงามเลย"
1008903-26 = "ถ้างั้น..."
1008903-30 = "เราเข้าไปด้วยกันเลยมั้ยคุณครู?"
1008903-34 = "(จากนั้นคุณครูก็ไปเข้าร่วมฟังการบรรยายธุรกิจกับอารุ และได้ฟังการนำเสนอธุรกิจและดูบูทต่างๆ มากมาย)"
1008903-37 = "(แต่ทั้งหมดล้วนเป็นธุรกิจที่ขายฝันและฟังดูเป็นมิจฉาชีพ)"
1008903-41 = "ทำไมกันนะ!!!!"
1008903-43 = "ทำไมถึงเป็นแบบนี้ไปได้! ไม่เห็นมีโปรเจกต์ไหนเข้าท่าเลย!!"
1008903-45 = "ทั้งพลังไทรแองเกิลบ้างละ สร้อยข้อมือเจอร์เมเนียมบ้างละ! ไหนจะน้ำที่ช่วยอ่านอารมณ์ได้อีก!!"
1008903-46 = "จะให้เชื่อเรื่องงมงายแบบนั้นแล้วลงทุนทำธุรกิจด้วยเหรอ? นี่มันสมัยไหนกันแล้ว!! คิดว่าคนที่มา#nฟังบรรยายเป็นคนโง่รึไง!!"
1008903-47 = "[s5] \"จะ.... ใจเย็นๆ ก่อนนะ\"\n[s6] \"เดี๋ยวนี้มิจฉาชีพก็เยอะแบบนี้แหละ\""
1008903-50 = "เฮ้อ... หัวจะปวด..."
1008903-51 = "คิดว่านี่เป็นโอกาสที่จะได้แสดงความเป็นผู้ใหญ่และความน่าเชื่อถือของประธานแล้วเสียอีก"
1008903-52 = "ถ้าเป็นแบบนี้ อย่าว่าแต่เรื่องการสร้างความไว้วางใจเลย ใครมาเห็นคงคิดว่าฉันคิดจะทำธุรกิจสีเทา ถึงได้มาฟังบรรยายอะไรแบบนี้..."
1008903-55 = "ไม่ได้รู้สึกอย่างนั้นเลยเหรอ...?"
1008903-58 = "คุณครู..."
1008903-63 = "ขอบคุณที่ช่วยพูดปลอบนะ แต่ไม่เป็นไรหรอก เห็นอย่างนี้ฉันก็อ่านสถานการณ์เป็นเหมือนกันนะ"
1008903-64 = "วันนี้ถือว่าล้มเหลวไม่มีชิ้นดี แถมยังเรียกคุณครูมาให้เสียเวลา แต่ไม่ได้อะไรเป็นชิ้นเป็นอันอีก"
1008903-65 = "ไม่ต้องห่วงงั้นเหรอ...?"
1008903-66 = "ไม่ได้หมายความว่าอย่างนั้นหรอกเหรอ...? ถ้างั้น...?"
1008903-67 = "[s7] \"เราต้องหัดคุ้นเคยกับเรื่องแบบนี้นะ\"\n[s8] \"ทุกอย่างมักจะไม่เป็นอย่างที่ใจเราคิดหรอก จริงๆ นะ\""
1008903-70 = "หะ... หืม? หมายความว่ายังไงอีกล่ะเนี่ย...?"
1008903-71 = "ไม่เห็นจะเข้าใจเลย... บอกตรงๆ นะ ฉันยังรู้สึกเหมือนคุณครูจะพยายามปลอบใจฉันน่ะ"
1008903-72 = "หืม...?"
1008903-73 = "ให้ตามมาก่อนงั้นเหรอ...? จะ... จะไปไหนน่ะ? พระอาทิตย์ใกล้จะตกแล้วนะ"
1008903-74 = "สถานที่ดีๆ เหรอ...?"
1008903-78 = "แล้วฉันก็จะชอบด้วย...?"
1008903-79 = "[s9] \"อารุต้องชอบที่นั่นแน่นอน\"\n[s10] \"ให้ครูเป็นคนกำหนดตารางงานสุดท้ายของวันนะ\""
1008903-82 = "อะ... อืม... ก็ได้... ถ้าคุณครูพูดถึงขนาดนั้นละก็..."
1008903-86 = "แล้ว... จะไปที่ไหนล่ะ?"
1008903-92 = "...?!!"
1008903-93 = "ที่นี่มัน... ร้านราเม็ง...?"
1008903-94 = "คุณครู? ที่ที่บอกว่าจะพามา... คือที่นี่เหรอ...?"
1008903-95 = "[s11] \"ใช่ นั่งก่อนสิ\"\n[s12] นั่งลงแล้วสั่งราเม็ง"
1008903-98 = "คะ... คุณครู!!"
1008903-106 = "พอบอกว่าต้องเป็นที่ที่ฉันชอบ ฉันก็อุตส่าห์ลุ้นว่าจะพาฉันไปที่แบบไหน สุดท้ายก็เป็นร้านราเม็ง... เนี่ยนะ..."
1008903-107 = "ถะ... ถึงฉันจะไม่ได้ไม่ชอบราเม็งก็เถอะ... ที่จริง... ต้องบอกว่าฉันชอบมากกว่าด้วย..."
1008903-108 = "แต่ยังไงมันก็รู้สึกต่างกับที่คิดอยู่นะ มีเหตุผลอะไรที่พาฉันมาที่นี่เหรอ?"
1008903-109 = "ถ้าพามาแบบนี้ จะได้ต่างกับที่เคยซื้อราเม็งให้กินปกติเหรอ..."
1008903-110 = "ต่างกันเหรอ...? "
1008903-111 = "ต่างกันยังไง...?"
1008903-112 = "[s13] \"วันนี้เราไม่ได้งานกลับมา ก็เลยมากินปลอบใจกันไง\"\n[s14] \"เวลาครูเจอปัญหากับงานตัวเอง ครูก็มาที่แบบนี้ละ\""
1008903-115 = "อ่า..."
1008903-116 = "หมายถึง..."
1008903-120 = "อ่า..."
1008903-121 = "ถะ... ถ้างั้นแบบนี้..."
1008903-122 = "คือการปลอบใจของผู้ใหญ่อย่างคุณครูเหรอ...?"
1008903-126 = "[ns15] \"พอเข้าใจแล้วใช่มั้ย...?\"\n[ns16] \"เป็นไง สุดท้ายก็ไม่ได้มีอะไรมากใช่มั้ย?\""
1008903-129 = "ฮุฮุ..."
1008903-130 = "ฮุฮุ ฮุฮุฮุ..."
1008903-131 = "คุณครูเนี่ย... ชอบพูดอะไรแบบไม่คาดคิดแบบนี้อยู่เรื่อยเลยนะ"
1008903-132 = "อืม ก็ใช่นะ..."
1008903-133 = "อืม..."
1008903-135 = "สุดท้ายแล้วก็ไม่มีอะไรมากอย่างที่คิดเลย..."
1008903-138 = "― [log=아루 드레스]เฮ้อ... คิดไม่ถึงเลยนะว่าจะเป็นแบบนี้[/log][wa:3610] "
1008903-139 = "― [log=아루 드레스]แต่ก็... อย่างที่คุณครูว่าเลยนะ ว่าเรื่องแบบนี้ก็ไม่ได้แย่เท่าไร[/log][wa:3500] "
1008903-142 = "― [log=아루 드레스]ที่จริง มันน่าแปลกใจมากเลยนะ...[/log][wa:1080] "
1008903-145 = "― [log=아루 드레스]ผู้ใหญ่ที่แต่งตัวดีแบบนี้[/log]"
1008903-146 = "― [log=아루 드레스]ทำไมถึงมากินอาหารในที่แบบนี้นะ...[/log][wa:2380] "
1008903-149 = "― [log=아루 드레스]แต่ว่า...ตอนนี้เหมือนฉันจะเข้าใจนิดหน่อยแล้วละ[/log][wa:1660] "
1008903-152 = "― [log=아루 드레스]ต่อให้แต่ละคนมีเหตุผลต่างกัน...[/log][wa:10] "
1008903-153 = "― [log=아루 드레스]แต่ทุกคนก็มีอารมณ์แบบนี้ด้วยกันทั้งนั้นสินะ[/log][wa:3460] "
1008903-156 = "― [log=아루 드레스]คุณครูเองก็...คงจะเป็นแบบนั้นด้วย[/log][wa:850] "
1008903-159 = "― [log=아루 드레스]ฮุฮุ... ฉันเองก็...คล้ายๆ กับคุณครูขึ้นบ้างมั้ยนะ?[/log][wa:4010] "
1008903-162 = "(หลังจากนั้นคุณครูก็กินราเม็งกับอารุ และฟังเรื่องทุกข์ใจที่อารุสะสมไว้มาตลอด)"
1008903-163 = "(ส่วนมากอารุพูดชื่นชมและขอบคุณหน่วยรับจ้างสารพัดทุกคน และพร่ำบ่นเกี่ยวกับความยากลำบาก#nของ 'กิจการ')"
1008903-164 = "(ดึกดื่นเที่ยงคืนก็แล้ว แต่อารุก็ยังพูดไม่จบ คุณครูจึงต้องฟังยาวไปจนกว่าจะกลับไปถึงที่พัก)"

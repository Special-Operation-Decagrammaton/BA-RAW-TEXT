1000509-37 = "3;호시노;02;……하아. 즐거웠어.\n#3;em;[하트]\n#3;a"
1000509-38 = "3;호시노;03;아귀 먹이 주기 체험이 완전 웃겼어. 아하하. 입이 엄청 컸어.\n#3;hophop"
1000509-39 = "3;호시노;14;야광 해파리들도 멋졌고. 형광 조명이 엄청 어지러웠지."
1000509-40 = "3;호시노;03;바다 터널도 엄청 크고 대단했어. 하아. \n#3;em;[반짝]\n#3;greeting"
1000509-41 = "3;호시노;02;기념품도 이렇게 잔뜩 사버렸네. 으헤헤헤."
1000509-42 = "3;호시노;17;완전 녹초가 될 때까지 놀아서, 집에가면 분명 뻗어서 24시간은 자버릴 거 같아.\n#3;em;[속상함]\n#3;stiff"
1000509-43 = "[s1] \"늦잠은 안돼.\"\n[s2] \"학교는 가야지.\""
1000509-44 = "3;호시노;02;으헤헤. 노력해볼게, 선생!\n#3;em;[음표]"
1000509-45 = "3;호시노;02;으헤헤. 노력해볼게, 선생!\n#3;em;[음표]"
1000509-46 = "3;호시노;15;자, 그럼 슬슬 돌아가볼까? 하루종일 돌았는데도 못 본 곳이 있다니, 뭔가 아쉽지만 말야."
1000509-47 = "3;호시노;01;뭐, 힘내서 다음에 또 오면 되니까. 그치?\n#3;em;[반응]"

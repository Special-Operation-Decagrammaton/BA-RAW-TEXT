[translation]
1000509-1 = "A Day at the Aquarium! "
1000509-2 = "Aquarium Entrance"
1000509-3 = "Wow! So this is the aquarium."
1000509-4 = "A place like this is completely foreign to an old-fashioned country bumpkin like me."
1000509-5 = "Look, I got the pamphlet."
1000509-6 = "There's a tropical fish exhibit, deep sea fish exhibit, and even a live feeding experience!"
1000509-7 = "Hmm, there's also a dolphin show...and a penguin exhibit. They must keep that one cold, don't you think?"
1000509-8 = "Look, Sensei! A sea tunnel!"
1000509-9 = "They have a whale shark too! Wait, is it technically a whale or a shark?"
1000509-10 = "Do you think we'll have time to see everything today? I'd like to at least try to."
1000509-11 = "So where should we go first?"
1000509-13 = "We visited the tropical fish exhibit and deep sea exhibit before arriving at the sea tunnel exhibit."
1000509-16 = "— Is that a whale?"
1000509-20 = "― Wow... Amazing. I've never been to a place like this before.[wa:2280] "
1000509-23 = "— Look! It's a fish! Hahaha, it's so cute![wa:1940] "
1000509-26 = "― ..."
1000509-29 = "— Is it okay that I'm the only one who's having so much fun...?[wa:400] "
1000509-32 = "— I shouldn't worry about that? All right, then.[wa:3720] "
1000509-35 = "After that, we checked out the entire aquarium, including the live feeding, jellyfish exhibit, sea turtle exhibit, and gift shop. It turned out to be a really fun day."
1000509-37 = "Phew. That was so much fun."
1000509-38 = "The anglerfish were so much fun to feed. Haha. Their mouths are so big."
1000509-39 = "It was really cool how the jellyfish glow in the dark too. Keeping up with their neon lights made me kind of dizzy."
1000509-40 = "Oh, and then there was the sea tunnel! It was just so...! *sigh*"
1000509-41 = "I bought a bunch of souvenirs too. Heh heh."
1000509-42 = "I'm completely exhausted after all that. I might just pass out the second I get home."
1000509-43 = "[s1] \"You had better not oversleep, though.\"\n[s2] \"Don't forget you have school tomorrow.\""
1000509-44 = "Heh. I'll make it on time. Don't worry, Sensei!"
1000509-45 = "Heh. I'll make it on time. Don't worry, Sensei!"
1000509-46 = "Ready to go back? It's a shame we couldn't see everything today, though."
1000509-47 = "But there's always next time, right?"
1000509-48 = "[s3] \"Of course.\"\n[s4] \"We'll definitely come back.\""
1000509-51 = "Heh, I'll be the one to invite you next time. Just you wait and see, Sensei!"
1000509-53 = "I then took Hoshino home. She was tired, but happy."

[translation]
1000509-1 = "อควาเรียม!"
1000509-2 = "ทางเข้าอควาเรียม"
1000509-3 = "เห... ที่นี่คืออควาเรียมงั้นเหรอ"
1000509-4 = "ลุงแก่ๆ อย่างฉันเป็นคนบ้านนอก เลยไม่ค่อยรู้จักที่แบบนี้หรอก "
1000509-5 = "ดูนี่สิ ได้ใบปลิวมาด้วย "
1000509-6 = "โซนปลาน้ำลึกกับโซนปลาทะเล... มีโซนสำหรับให้อาหารปลาด้วยละ!"
1000509-7 = "อืม มีโชว์โลมา... แล้วก็มีลานเพนกวินด้วย... ตรงนั้นน่าจะหนาวเนอะ?"
1000509-8 = "ดูนี่สิครู! อุโมงค์ใต้น้ำ!"
1000509-9 = "เห็นว่ามีฉลามวาฬด้วย! จะเหมือนวาฬหรือเปล่านะ?"
1000509-10 = "วันนี้จะได้ดูครบทุกโซนมั้ยน้า... อืม... คงต้องลองดูแล้วละ"
1000509-11 = "เริ่มดูจากตรงไหนก่อนดีน้า?"
1000509-13 = "(หลังจากชมโซนปลาเขตร้อนและปลาทะเล ทั้งสองคนก็มาถึงอุโมงค์ใต้ทะเล)"
1000509-16 = "― นั่นใช่วาฬรึเปล่า?"
1000509-20 = "― แหะๆ~ สุดยอดเลย เพิ่งเคยมาที่แบบนี้เป็นครั้งแรกเลยนะ[wa:2600] "
1000509-23 = "― ดูนั่นสิ! ปลาล่ะ! ฮะฮ่าฮ่าฮ่า น่ารักจังเลย!![wa:1820] "
1000509-26 = "― ..."
1000509-29 = "― มีแค่ฉัน... ที่สนุกอยู่คนเดียวแบบนี้จะดีเหรอ[wa:1120] "
1000509-32 = "― ฉันดูกังวลมากเกินไปเหรอ? นั่นสิน้า~[wa:4200] "
1000509-35 = "(หลังจากนั้นทั้งคู่ก็ไปดูโซนให้อาหารปลา โซนแมงกะพรุน โซนเต่าทะเล ร้านขายสินค้า#nและได้ใช้เวลาชมอควาเรียมด้วยกันอย่างมีความสุข)"
1000509-37 = "อ่า... วันนี้สนุกจังเลย"
1000509-38 = "คิคิ ตอนให้อาหารปลาน่ะตลกมาก ฮ่าฮ่าฮ่า ปากพวกมันใหญ่สุดๆ เลย"
1000509-39 = "พวกแมงกะพรุนเรืองแสงก็สุดยอดเหมือนกัน แต่แสงไฟเรืองแสงของพวกมันทำให้เวียนหัวมาก#nเลยละ"
1000509-40 = "อุโมงค์ใต้ทะเลก็ใหญ่สุดๆ ไปเลย ฮ่า... "
1000509-41 = "ซื้อของที่ระลึกมาเยอะแยะเลยแฮะ แหะๆๆ"
1000509-42 = "เดินซะจนหมดแรงเลย พอถึงบ้านคงได้ล้มฟุบนอนหลับเป็นตาย 24 ชั่วโมงแน่ๆ"
1000509-43 = "[s1] \"อย่านอนดึกมากล่ะ\"\n[s2] \"อย่าลืมไปโรงเรียนด้วยล่ะ\""
1000509-44 = "แหะๆ ฉันจะพยายามนะครู!"
1000509-45 = "แหะๆ ฉันจะพยายามนะครู!"
1000509-46 = "เอาละ ถ้างั้นก็กลับกันเลยมั้ย? ถึงจะน่าเสียดายที่ต่อให้เดินทั้งวันแล้วก็ยังดูไม่ครบทุกโซน..."
1000509-47 = "แต่เอาไว้มาดูใหม่คราวหน้าก็ได้เนอะ ใช่มั้ย?"
1000509-48 = "[s3] \"ใช่แล้ว\"\n[s4] \"ไว้เราค่อยมาด้วยกันใหม่ก็ได้\""
1000509-51 = "ฮิฮิ ไว้คราวหน้าฉันจะชวนมาด้วยกันใหม่ ตั้งตารอได้เลยนะครู!"
1000509-53 = "(คุณครูเดินกลับบ้านพร้อมกับโฮชิโนะที่ดูมีความสุขมาก ถึงจะดูเหนื่อยนิดหน่อยก็ตามที)"

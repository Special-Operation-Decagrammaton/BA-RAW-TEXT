1000509-3 = "3;호시노;02;으헤에- 여기가 아쿠아리움인가.\n#3;a"
1000509-4 = "3;호시노;15;이 아저씨는 시골 사람이라 이런데는 낯설다고. \n#3;em;[땀]"
1000509-5 = "3;호시노;14;이것 봐, 팜플렛도 받았어. \n#3;hophop"
1000509-6 = "3;호시노;03;열대어관이랑 심해어관, 먹이주기 체험관도 있대! \n#3;em;[반짝]\n#3;greeting"
1000509-7 = "3;호시노;14;흐음, 돌고래쇼도 있고…… 펭귄관도 있네. 여기는 춥겠지? \n#3;m2"
1000509-8 = "3;호시노;03;이것봐, 선생! 바다터널이야! \n#3;m3\n#3;em;[반응]"
1000509-9 = "3;호시노;04;고래 상어도 있대! 고래 같은 건가……?\n#3;em;[?]\n#3;m4"
1000509-10 = "3;호시노;14;오늘 하루만에 다 볼 수 있을까……. 음. 힘내야겠군.\n#3;m3"

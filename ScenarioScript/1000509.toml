[translation]
1000509-1 = "海生館！"
1000509-2 = "海生館．入口"
1000509-3 = "唔嘿──，這裡就是海生館啊。"
1000509-4 = "因為大叔是土包子，對這種地方很陌生。 "
1000509-5 = "你看，還拿了小冊子唷。 "
1000509-6 = "這裡有熱帶魚館、深海魚館，還有餵食體驗館耶！ "
1000509-7 = "嘿，有海豚表演……還有企鵝館。這裡一定很冷吧？ "
1000509-8 = "你看，老師！是海底隧道！ "
1000509-9 = "聽說甚至還有鯨鯊！是像鯨魚一樣的東西嗎……？"
1000509-10 = "今天一天能全部看完嗎……唔嗯，得努力才行。"
1000509-11 = "那麼，先從哪裡看呢？"
1000509-13 = "（經過熱帶魚館、深海魚館，到了海底隧道）"
1000509-16 = "― 那就是鯨魚嗎？"
1000509-20 = "― 欸嘿～好厲害。來這樣的地方還是第一次。[wa:3920] "
1000509-23 = "― 你看那個！是魚！啊哈哈哈，好可愛！[wa:2900] "
1000509-26 = "― ……"
1000509-29 = "― 我一個人這麼開心是可以的嗎……[wa:2280] "
1000509-32 = "― 你說這擔心是多餘的？……是嗎？[wa:5000] "
1000509-35 = "（之後去了餵食體驗館、水母館、海龜館和周邊商店，在海生館到處遊玩）"
1000509-37 = "……很開心。"
1000509-38 = "鮟鱇魚的餵食體驗十分有趣呢。嘴巴超級大的。"
1000509-39 = "螢光水母也很酷，雖然光線看得我有點頭暈。"
1000509-40 = "海底隧道也又大又壯觀……呼。 "
1000509-41 = "還買了這麼多紀念品，唔嘿嘿嘿。"
1000509-42 = "因為玩得筋疲力盡，感覺回到家後會就這樣倒下，睡個24小時。"
1000509-43 = "[s1] 「不能睡過頭唷。」\n[s2] 「不能不去學校唷。」"
1000509-44 = "唔嘿嘿。我會努力的，老師！"
1000509-45 = "唔嘿嘿。我會努力的，老師！"
1000509-46 = "好，那差不多該回去了？沒想到逛了一整天還有地方沒看到，總覺得有點可惜。"
1000509-47 = "嘛，下次再努力想辦法來就行了。對吧？"
1000509-48 = "[s3] 「是啊。」\n[s4] 「下次再來吧。」"
1000509-51 = "唔嘿。下次換大叔邀請你，可以好好期待一下唷，老師！"
1000509-53 = "（和看起來有點累但很開心的星野一起回去了）"

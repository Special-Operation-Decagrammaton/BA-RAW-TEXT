10013060-48 = "4;시즈코 수영복ND;99;물론 장사라고 하는 건, 인건비나 임대료 등등. 여러 가지 요인으로 가격이 정해지는 것……. 거기에 어떤 가격을 매길지는, 제공하는 측의 마음이긴 해.\n#4;em;[...]"

10013060-22 = "3;시즈코 수영복ND;06\n1;우미카;99;아, 그거라면 일단 인터넷에서 찾아본 자료인데 말이죠\n#1;em;[반응]\n#1;a\n#3;m5"
10013060-23 = "1;우미카;02;이 리조트의 전반적인 관리는 아무래도 그 유명한 <현무상회>가 맡고 있는 모양이에요.\n#1;greeting"

[translation]
10013060-1 = "Episode 6;Messengers of the Black Tortoise 1"
10013060-6 = "Here we are! It's the resort everyone is talking about online. This is where the Messengers of the Black Tortoise Who Demand Constant Compensation are!"
10013060-7 = "[s] \"What a crowd.\""
10013060-8 = "And not only that..."
10013060-9 = "*sniff* Izuna smells something delicious!"
10013060-15 = "Sensei. My stomach is growling."
10013060-16 = "[s] \"Hmm, should we get something to eat?\""
10013060-17 = "Yes, please!"
10013060-18 = "Heehee. Everything is better with a satiated stomach."
10013060-20 = "By the way..."
10013060-21 = "It looks peaceful here. Is this place really known for fierce Resort Hunters gathering here?"
10013060-22 = "I found some more information online."
10013060-23 = "It seems like the famous Black Tortoise Promenade is in charge of managing this resort."
10013060-24 = "[s] \"The Black Tortoise Promenade, of Shanhaijing?\""
10013060-25 = "THE Black Tortoise?!"
10013060-26 = "But the weird thing is...while they stand out in the Resort Hunt..."
10013060-27 = "On the internet, they say the customer service is horrible here!"
10013060-28 = "How weird... They're known for delicious food, so I thought their service would be the same."
10013060-29 = "We'll have to see and judge for ourselves."
10013060-36 = "Look. People are yelling over there."
10013060-37 = "It appears to be a customer and worker."
10013060-39 = "Th-That's not fair! How could you charge me for sitting on a chair?!"
10013060-40 = "What do you mean it's not fair? It's only natural you pay for using something!"
10013060-41 = "Not only for using the chair, you also have to pay for touching the chopsticks and that glass!"
10013060-42 = "Oh! And you touched the table! I'll add that to your bill!"
10013060-43 = "Th-That's too much!"
10013060-44 = "Hahaha! What do you mean? We're the Black Tortoise Promenade. Premium services have a price!"
10013060-45 = "It's still unfair!"
10013060-46 = "[s] \"Ah! Shizuko!\""
10013060-47 = "Who even are you?! Are you here to disrupt our business?"
10013060-48 = "I get that with businesses there are labor costs, rent, et cetera, and pricing is determined by such factors. It's up to the provider to decide the price."
10013060-49 = "At a vacation site like this, people are bound to spend more than usual."
10013060-50 = "Due to supply and demand, it's only natural to charge for as much as you can get away with! I know that better than anyone!"
10013060-51 = "But still, you're crossing the line!"
10013060-52 = "Charging for sitting on a chair, touching chopsticks, a glass, the table? That's just disrespectful towards your customers!"
10013060-53 = "Right! What kind of business is this? It's a rip-off!"
10013060-54 = "I was wondering where \"Messengers of the Black Tortoise Who Demand Constant Compensation\" came from."
10013060-55 = "But I can't believe this is what it meant! You should care about your customers when you provide a service!"
10013060-56 = "How did the renowned Black Tortoise Promenade come to this?"
10013060-57 = "[s] \"No, no, this is the Kurokame Gang.\""
10013060-61 = "Really?"
10013060-62 = "Oh, they're...not the Black Tortoise Promenade?"
10013060-63 = "Huh?! Really?!"
10013060-65 = "Th-They found us out?!"
10013060-66 = "Support! Call in support!"
10013060-74 = "What is happening? They're not the Black Tortoise Promenade, but the Kurokame Gang?"
10013060-75 = "[s] \"Yes, but I thought they were disbanded.\""
10013060-80 = "What's happening?"
10013060-85 = "I thought I told you to deal with small problems yourselves."
10013060-91 = "Ah."
10013060-92 = "Oh, dear."
10013060-93 = "[s] \"Oh.\""
10013060-98 = "Uh..."
10013060-99 = "D-D-D-Date Meowru?!"
10013060-100 = "W-Wait. What are you guys doing here?"
10013060-101 = "Well, I guess it's to be expected."
10013060-102 = "I saw that the Hyakkiyako Festival Operations Department was listed as the proprietor of these resorts on my contract."
10013060-103 = "So it wasn't completely out of the realm of possibility for you to appear, but still!"
10013060-104 = "[s] \"What are you doing here?\""
10013060-105 = "Hmph! As you can see, we're doing business."
10013060-106 = "We're not pushing any services. I have a resort ticket, which allows us to do business here. We've got nothing to hide!"
10013060-107 = "[s] \"But you were impersonating the Black Tortoise Promenade.\""
10013060-108 = "Ahem! Th-That was simply a smart and resourceful business strategy!"
10013060-109 = "We're here to pick up the pieces of a failed organization, reorganize, and start business anew! Right?!"
10013060-111 = "Yes!"
10013060-113 = "More like reorganizing and conspiring! You're a villain!"
10013060-114 = "Conspiring what? Hm? I saw a good opportunity and took it."
10013060-115 = "The Resort Contract... It was obviously a trap set by someone. You totally got fooled by it. What a pity."
10013060-116 = "...!"
10013060-117 = "We re-established our organization and created this resort. Haha! I was able to create a platform and elevate myself again. I guess I should thank you!"
10013060-118 = "If you already know the situation, there's no need for us to explain. Give us the contract!"
10013060-119 = "Hmph! Do you really think I'd just hand it over to you?"
10013060-120 = "It's your fault things came to this, Kawawa Shizuko!"
10013060-121 = "That's..."
10013060-122 = "Obviously, you thought this was a chance to make easy money and got greedy!"
10013060-123 = "You hastily let them use your name and got used. How disappointing."
10013060-124 = "No! That wasn't the boss' intention at all!"
10013060-125 = "[s] \"Shizuko wouldn't act without thinking like that.\""
10013060-126 = "Sensei..."
10013060-128 = "Your intentions don't matter! You never should have come here!"
10013060-129 = "Everyone who has a contract is a target for the Resort Hunt!"
10013060-133 = "We'll take everything from you!"
10013060-135 = "Everyone! Watch out!"
10013060-136 = "Izuna will fight beside you, my lord!"
10013060-137 = "Yup! Let's burn it down."

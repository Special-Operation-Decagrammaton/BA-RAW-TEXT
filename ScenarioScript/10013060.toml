[translation]
10013060-1 = "ตอนที่ 6;เหล่าทูตแห่งเทพเต่าดำ 1"
10013060-6 = "ที่นี่ค่ะ! ตอนนี้ชาวเน็ตต่างก็บอกว่า <ทูตแห่งเทพเต่าดำที่กำลังเรียกร้องค่าตอบแทนของทุกสิ่ง> กำลังอยู่ที่รีสอร์ตแห่งนี้!"
10013060-7 = "[s] \"ดูวุ่นวายจังเลยนะ\""
10013060-8 = "นั่นสิคะ ที่นี่ไม่เพียงแค่มีคนเยอะ..."
10013060-9 = "(ฟุดฟิด) แต่มีกลิ่นของอร่อยๆ เต็มไปหมดเลยค่ะ!"
10013060-15 = "คุณครู... ฉันรู้สึกหิวขึ้นมาแล้ว~"
10013060-16 = "[s] \"อืม งั้นซื้ออะไรกินกันหน่อยมั้ย?\""
10013060-17 = "อ๊ะ! อิซุนะเห็นด้วยค่ะ!"
10013060-18 = "ฮุฮุ กองทัพต้องเดินด้วยท้องนี่คะ"
10013060-20 = "จะว่าไป..."
10013060-21 = "ที่นี่ทั้งเงียบและสงบ จะมีวายร้ายนักล่ารีสอร์ตอยู่จริงๆ เหรอ...?"
10013060-22 = "อ้อ ฉันหาข้อมูลในอินเทอร์เน็ตมาค่ะ"
10013060-23 = "เห็นว่าคนจาก <ย่านการค้าเทพเต่าดำ> ที่มีชื่อเสียงเป็นคนดูแลรีสอร์ตนี้โดยรวมค่ะ"
10013060-24 = "[s] \"ย่านการค้าเทพเต่าดำ... ของซานไห่จิงน่ะเหรอ...?\""
10013060-25 = "หมายถึง <เทพเต่าดำ> นั่นน่ะเหรอ?!"
10013060-26 = "แต่ที่น่าแปลกใจก็คือ..."
10013060-27 = "การบริการของรีสอร์ตนี้ ดูเหมือนจะมีชื่อเสียงไม่ดีไปทั่วอินเทอร์เน็ต..."
10013060-28 = "แปลกจังเลย... ถึงปกติย่านการค้าเทพเต่าดำจะมีชื่อเสียงเรื่องความเยอะในการทำอาหารก็เถอะ แต่นี่ถึงกับเจอเรื่องการบริการไม่ดีด้วยเหรอ...?"
10013060-29 = "คงต้องไปดูให้เห็นเองกับตาแล้วละค่ะ"
10013060-36 = "เอ๋~? ทางนู้น~ เกิดเรื่องวุ่นวายแล้ว"
10013060-37 = "นั่นมัน... ลูกค้ากับพนักงานหรือเปล่าคะ?"
10013060-39 = "แบบนี้มันเกินไปแล้วนะ! แค่มานั่งเก้าอี้ก็เรียกเก็บเงินกันแล้วเหรอ?"
10013060-40 = "เกินไปที่ไหนกันล่ะ! ถ้ามาแล้วก็ต้องจ่ายค่าธรรมเนียมที่เหมาะสมสิ!"
10013060-41 = "ไม่ใช่แค่ค่าเก้าอี้เท่านั้นนะ! ค่าจับตะเกียบด้วย! แล้วก็ค่าแตะแก้วด้วย!"
10013060-42 = "อ๊ะ! เธอเพิ่งทำให้โต๊ะสั่น! งั้นก็จ่ายเงินตรงนี้มาด้วย!"
10013060-43 = "กะ... เกินไปแล้วนะ~!"
10013060-44 = "ฮ่ะฮ่ะฮ่า! เกินไปที่ไหนกันล่ะ! พวกเราคือพ่อค้าจากย่านการค้าเทพเต่าดำนะ! ต้องเก็บค่าตอบแทนจากการบริการระดับสูงสิ!"
10013060-45 = "หนอยแน่~! นั่นไม่ใช่การเรียกเก็บเงินที่เหมาะสมแล้วสักหน่อย!!"
10013060-46 = "[s] \"อ๊ะ ชิซุโกะ!\""
10013060-47 = "อะไรกัน?! พวกเธอเป็นใครน่ะ?! ทำไมถึงมาขัดขวางกิจการแบบนี้!"
10013060-48 = "ฉันก็เข้าใจว่าการค้าขายขึ้นอยู่กับปัจจัยหลายอย่าง ทั้งค่าแรง ค่าเช่าที่ และการกำหนดราคาก็เป็น#nหน้าที่ของผู้ค้าขาย"
10013060-49 = "และยิ่งเป็นสถานที่พักผ่อนหย่อนใจแบบนี้... ก็คงช่วยไม่ได้ที่จะมีต้นทุนที่มากกว่าปกติ"
10013060-50 = "และนั่นทำให้ผู้ค้าขายต้องตั้งราคาสินค้าและบริการในราคาที่สูงขึ้น และกิจการที่นี่จะเป็นไปตาม#nอุปสงค์และอุปทาน! เรื่องแบบนี้ฉันรู้ดี!"
10013060-51 = "แต่ถึงอย่างนั้นก็เถอะ มันก็ควรจะมีความพอดีกันบ้างสิ!"
10013060-52 = "ค่านั่งเก้าอี้ ค่าจับตะเกียบ ค่าแตะแก้ว ค่าทำให้โต๊ะสั่น นี่พวกเธอมาเก็บเงินกับเรื่องแบบนี้เหรอ? นี่มันเรื่องบ้าบออะไรกัน?!"
10013060-53 = "ใช่ค่ะ! คิดว่าธุรกิจคืออะไรกันคะ...! พวกโก่งราคาหน้าไม่อาย!"
10013060-54 = "ก็ว่าอยู่ว่า <ทูตแห่งเทพเต่าดำกำลังเรียกร้องค่าตอบแทนของทุกสิ่ง> หมายถึงอะไร..."
10013060-55 = "ตกลงมันหมายถึงรีสอร์ตที่เรียกเก็บเงินจากเรื่องแบบนี้อย่างงั้นเองเหรอ?!"
10013060-56 = "ทำไมพ่อค้าย่านการค้าเทพเต่าดำถึงเป็นแบบนี้ไปได้...!"
10013060-57 = "[s] \"ไม่ใช่ๆ พวกนั้นคือ... แก๊งคุโระกาเมะ\""
10013060-61 = "คะ?"
10013060-62 = "เอ๋? คนพวกนั้น... ไม่ใช่คนจากย่านการค้าเทพเต่าดำเหรอคะ?"
10013060-63 = "เอ๋?! เป็นอย่างนั้นเองหรอกเหรอ?!"
10013060-65 = "ดะ... โดนจับได้ซะแล้ว!"
10013060-66 = "โธ่เว๊ย! เรียกกองสนับสนุนมาเร็วเข้า!"
10013060-74 = "นะ... นี่มันอะไรกันคะ? ตกลงเป็นแก๊งคุโระกาเมะหรอกเหรอ?"
10013060-75 = "[s] \"อื้ม แต่ครูมั่นใจว่าแก๊งคุโระกาเมะต่างก็แยกย้ายกันไปแล้วนะ...\""
10013060-80 = "เรียกตัวมากะทันหันแบบนี้ เกิดเรื่องอะไรขึ้นน่ะ"
10013060-85 = "บอกไปตั้งกี่ครั้งแล้วว่าหากเจอปัญหาเล็กๆ น้อยๆ ก็ให้แก้ไขกันเอง..."
10013060-91 = "อ่า..."
10013060-92 = "อุ๊ย"
10013060-93 = "[s] \"อ๊ะ\""
10013060-98 = "เอ่อ..."
10013060-99 = "นะ... นะ... นะ... เนียนเต็นมารุ?!"
10013060-100 = "ดะ... เดี๋ยวนะ! ทำไมพวกเธอถึงมาอยู่ที่นี่...!"
10013060-101 = "ไม่สิ... พอมาคิดๆ ดูแล้วมันก็ไม่น่าแปลก"
10013060-102 = "ในหนังสือสัญญาที่ฉันมี... มีชื่อของชมรมจัดงานเทศกาลของเฮียกคิยาโคอยู่ด้วย"
10013060-103 = "และเมื่อฉันเห็นชื่อนั้น ก็อดคิดไม่ได้ว่านี่มันเรื่องอะไรกันแน่!"
10013060-104 = "[s] \"มาทำอะไรอยู่ที่นี่น่ะ...?\""
10013060-105 = "ฮึ่ม! ถามแปลก! ก็มาทำการค้าน่ะสิ"
10013060-106 = "ฉันไม่ได้บังคับให้แขกมาใช้บริการอะไรเป็นพิเศษหรอก เพราะยังไงก็ได้ <ตั๋วใช้งานรีสอร์ต> ที่จำเป็นต่อการค้ามาไว้ในมืออยู่แล้ว"
10013060-107 = "[s] \"แต่ก็แอบอ้างตัวเองว่าเป็นพ่อค้าเทพเต่าดำนี่\""
10013060-108 = "อะแฮ่ม! มันเป็นการตัดสินใจเพื่อธุรกิจน่ะ ฉันก็แค่ใช้ความสามารถของฉันเท่านั้นเอง!"
10013060-109 = "นี่คือการฟื้นฟูองค์กรที่ล่มสลาย แล้วผลักดันธุรกิจใหม่ขึ้นมา! ใช่มั้ยพวกเรา?"
10013060-111 = "เยสเซอร์!"
10013060-113 = "ฟื้นฟูองค์กรของคนอื่นงั้นเหรอ! คิดจะก่อแผนร้ายอะไรอีกคะ! เจ้าพวกคนร้าย!"
10013060-114 = "ฮึ่ม! แผนร้ายอะไรกัน เรียกว่าเป็นโอกาสดีกว่า"
10013060-115 = "<ตั๋วใช้งานรีสอร์ต> งั้นเหรอ... แค่ดูก็รู้แล้วว่าเป็นกับดักที่ใครบางคนขุดเอาไว้ พวกเธอมาติดกับนี้#nเอาจนได้สินะ น่าสมเพชจริงๆ ชมรมเทศกาล"
10013060-116 = "!!"
10013060-117 = "ดูสิ นี่ทำให้ฉันรวบรวมองค์กรแล้วซื้อรีสอร์ตมาได้เลย ฮ่าฮ่า! เป็นเพราะพวกเธอเลยนะที่ทำให้ฉันกลับ#nมามีที่ยืนอีกครั้ง นี่ต้องกล่าวแสดงความขอบคุณด้วยมั้ยเนี่ย?"
10013060-118 = "ถ้ารู้เรื่องอยู่แล้วคงคุยกันง่ายหน่อยนะคะ! คืนหนังสือสัญญานั่นมาเถอะค่ะ! "
10013060-119 = "ฮึ่ม! ฉันจะไปคืนให้ง่ายๆ ได้ยังไง!"
10013060-120 = "ที่สถานการณ์มันเป็นอย่างนี้ ก็เพราะความผิดพลาดของเธอตั้งแต่แรกไม่ใช่รึไง! คาวาวะ ชิซุโกะ!"
10013060-121 = "เรื่องนั้น..."
10013060-122 = "เธอคงคิดว่านี่เป็นโอกาสทำเงิน ก็เลยตาบอดเพราะความโลภละสิท่า?"
10013060-123 = "คิดจะเอาชื่อเสียงของตัวเองมาขาย แต่ดันโดนหลอกใช้งานซะเอง ช่างน่าผิดหวังจริงๆ"
10013060-124 = "ไม่ใช่นะคะ! หัวหน้าไม่ได้..."
10013060-125 = "[s] \"ชิซุโกะไม่ใช่คนที่จะคิดอะไรแบบนั้นนะ\""
10013060-126 = "คะ... คุณครู?"
10013060-128 = "ฮึ่ม! พูดไปก็เท่านั้น! ยังไงซะ ทุกอย่างมันก็จบลงแล้วตั้งแต่พวกเธอมาถึงที่นี่!"
10013060-129 = "คนที่มีหนังสือสัญญา คือผู้มีคุณสมบัติในการล่ารีสอร์ต!"
10013060-133 = "เพราะฉะนั้นพวกฉันก็จะแย่งทุกอย่างจากเธอด้วยการล่ารีสอร์ตนี่แหละ!"
10013060-135 = "ทุกคน! ระวังตัวด้วยค่ะ!"
10013060-136 = "อิซุนะจะต่อสู้ไปกับนายท่านค่ะ!"
10013060-137 = "อื้ม~ ฉันจะเผาให้วอดเลย~~"

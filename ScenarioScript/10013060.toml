[translation]
10013060-1 = "第6話;玄武的使者們（１）"
10013060-6 = "就是這裡吧！現在在網路上引發話題的──#n「對一切要求代價的玄武使者們」所在的渡假勝地！"
10013060-7 = "[s] 「還真是熱鬧呢。」"
10013060-8 = "就是說啊。而且不只是人多而已……"
10013060-9 = "嗅嗅──好像有很多好吃食物的味道！"
10013060-15 = "……老師，我的肚子在叫～"
10013060-16 = "[s] 「那我們去買點東西吃吧。」"
10013060-17 = "好！伊樹菜贊成！"
10013060-18 = "呵呵，有句話叫「吃飯皇帝大」。"
10013060-20 = "話說回來……"
10013060-21 = "看起來還挺和平的……#n這裡真的是在「渡假勝地狩獵」中惡名昭彰的地方嗎……？"
10013060-22 = "關於這點我也在網路上查過了。"
10013060-23 = "看來這整個渡假勝地都是由那個有名的「玄武商會」負責管理的樣子。"
10013060-24 = "[s] 「玄武商會是指山海經的那個？」"
10013060-25 = "還真是完全不在意暴露身分的名字！"
10013060-26 = "但真是有點不可思議呢。"
10013060-27 = "看了一下大家的討論，好像因為服務的關係而被炎上中呢……"
10013060-28 = "那還真是有點奇怪呢。玄武商會不是以對料理嚴格而聞名的嗎？#n既然如此，我不覺得會因為服務而收到負評……"
10013060-29 = "詳細的情況果然還是要親自確認才行呢。"
10013060-36 = "嗯？那裡好像有什麼騷動唷。"
10013060-37 = "那是……客人跟員工嗎？"
10013060-39 = "太，太過分了！竟然只是坐在椅子上就要收費！"
10013060-40 = "啊啊？哪裡過分了啊！使用者付費，這是當然的吧！"
10013060-41 = "而且不只是椅子而已！還有碰了筷子跟摸了杯子的費用。"
10013060-42 = "啊，你剛剛也摸了桌子對吧！請你付錢！"
10013060-43 = "太，太誇張了！！"
10013060-44 = "哈哈哈！我們可是玄武商會哦？#n既然使用了我們提供的高級服務，費用就得請你好好付清！"
10013060-45 = "那～種～東～西～！怎麼可能會是正當的請求費用啊──！！！"
10013060-46 = "[s] 「啊，靜子！」"
10013060-47 = "你，你們想幹嘛！？這可是妨礙營業啊！"
10013060-48 = "所謂的服務就是根據提供者的技術和場地──以及各式各樣的原因來決定價格……#n而要制定多少價格是提供者所決定，這點我很清楚。"
10013060-49 = "特別是在渡假勝地這種平常不會去的地方……消費者會比較願意消費也很正常。"
10013060-50 = "因此稍～微提高一點價格，也是供需法則下自然會發生的事，我也非常理解。"
10013060-51 = "但是那也該有個限度吧！"
10013060-52 = "坐了椅子的費用？碰了筷子、杯子、桌子的費用？#n完全無法理解！"
10013060-53 = "就是說嘛！真是的，你們把商業行為當成什麼了啊！#n敲竹槓OUT！"
10013060-54 = "本來還很好奇「對一切要求代價的玄武使者們」到底是什麼意思……"
10013060-55 = "結果竟然只是字面上的什麼都要你付錢而已！"
10013060-56 = "那個玄武商會為什麼會做出這種事……！"
10013060-57 = "[s] 「不，那些人是黑龜組哦。」"
10013060-61 = "咦？"
10013060-62 = "也就是說……不是玄武商會？"
10013060-63 = "咦咦！？原來是這樣嗎！？"
10013060-65 = "可惡，被發現了！"
10013060-66 = "既然這樣只好叫支援了！請求支援！"
10013060-74 = "不是玄武商會而是黑龜組……這是怎麼回事？"
10013060-75 = "[s] 「黑龜組應該已經瓦解了才對呀……」"
10013060-80 = "發生什麼事了？突然叫我們出來……"
10013060-85 = "只是一點小糾紛的話你們自己解決不就好了……"
10013060-91 = "啊。"
10013060-92 = "哎呀。"
10013060-93 = "[s] 「啊。」"
10013060-98 = "…………啊。"
10013060-99 = "喵，喵喵喵，喵天丸！？"
10013060-100 = "等，等等！為什麼你們這些傢伙會在這裡……！？"
10013060-101 = "……不，仔細想想這也不奇怪。"
10013060-102 = "當我們拿到這份有著「百鬼夜行祭典營運管理部」名字的合約……"
10013060-103 = "就已經想過可能會發生這種狀況了！"
10013060-104 = "[s] 「你在這裡做什麼？」"
10013060-105 = "哼！你說在做什麼？看也知道在做生意啊。"
10013060-106 = "我們可沒有強迫推銷，做生意需要的「渡假勝地使用權」也如你所見有好好取得。#n並沒有做什麼虧心事喔？"
10013060-107 = "[s] 「不不，你們假裝自己是玄武商會了吧。」"
10013060-108 = "咳咳！那只不過是我做生意的策略之一而已！"
10013060-109 = "只是把快要毀滅的組織重建，重新推展新的事業而已！#n對吧？"
10013060-111 = "沒錯！就是這樣！"
10013060-113 = "說這麼多，你又想耍什麼奸詐的計謀了對吧！"
10013060-114 = "說是奸詐的計謀還真是失禮啊。我只是覺得是個不錯的機會而已。"
10013060-115 = "這個「渡假勝地使用權」不管怎麼看都是某人設下的陷阱吧？#n竟然還能漂亮地上當，真是丟臉啊，節慶營運管理部。"
10013060-116 = "！！"
10013060-117 = "但是也是拜其所賜，才能像這樣重新集合組織的人員，還能得到這個渡假勝地！#n讓我有了捲土重來的機會這點，還是值得感謝一下吧？"
10013060-118 = "既然你都知道，那事情就簡單了！#n那份契約書，現在就請你還給我們吧！"
10013060-119 = "哼。哪有笨蛋會聽到一句「還我」就乖乖照做啊！"
10013060-120 = "到頭來，會導致這種情況也是因為你們自己的疏忽吧。#n是吧，河和靜子！"
10013060-121 = "那，那是……"
10013060-122 = "我看八成也是被金錢蒙蔽了雙眼，有了不該有的貪欲吧？"
10013060-123 = "不經思考就隨意出借自己的名義……真讓人失望啊。"
10013060-124 = "不，不是這樣的！社長也是有所考慮才──"
10013060-125 = "[s] 「靜子才不是會因為那種單純的想法而行動的孩子。」"
10013060-126 = "……老師？"
10013060-128 = "隨便你怎麼說！但是可別忘了。#n在你們這些傢伙踏進這裡的瞬間就已經完蛋了！"
10013060-129 = "擁有契約書的所有人──都是「渡假勝地狩獵」的對象！"
10013060-133 = "所以，就由我們親手奪走你們的一切吧！"
10013060-135 = "大家！請小心！"
10013060-136 = "主公！伊樹菜也一起戰鬥！"
10013060-137 = "好～燒光他們～"

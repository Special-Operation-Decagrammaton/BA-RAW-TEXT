10013060-39 = "3;가여운 손님 A;00;너, 너무해용! 의자에 앉았다는 이유만으로 비용을 청구하다니용!\n#3;em;[속상함]\n#3;stiff\n#3;a"
10013060-40 = "3;가여운 손님 A;00\n1;현무상회 멤버 A(?);00;너무하긴 뭐가 너무해! 정당한 이용료를 지불하란 것뿐이야!\n#1;a\n#3;m5\n#1;em;[빠직]"
10013060-41 = "3;가여운 손님 A;00\n1;현무상회 멤버 A(?);00;의자 이용료뿐만이 아니다! 젓가락을 만진 비용도! 잔을 건드린 비용도!\n#1;em;[!]\n#1;m2\n#3;stiff"
10013060-42 = "1;현무상회 멤버 A(?);00;앗! 지금 막 탁자를 건드렸지! 그 비용도 청구할 테다!\n#1;em;[!]\n#1;m3"

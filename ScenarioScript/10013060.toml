10013060-26 = "1;우미카;04;하지만 이상한 건…… <리조트 사냥>에서 두각을 나타내고 있다는 것도 그렇지만,"
10013060-27 = "1;우미카;08;또 이곳 리조트의 서비스가 아무래도 인터넷상에서 악명으로 자자한 모양이라…….\n#1;em;…"
10013060-28 = "3;시즈코 수영복ND;05;그건 정말 이상하네……. 현무상회야 평소 요리에 깐깐하기로 유명하기는 해도, 서비스가 악평을 들을 정도라니……?\n#3;em;[?]"

[translation]
10023030-1 = "第3話;沒有時鐘的心臟"
10023030-2 = "「慈愛的怪盜」是……誰？"
10023030-3 = "「慈愛的怪盜」是惡名昭彰的「七罪人」之中的一人。#n雖然真正的名字並不清楚……"
10023030-4 = "[s1]「『七罪人』……！？」\n[s2]「跟若藻一樣……？」"
10023030-5 = "正是如此。#n如果說被稱為「災厄之狐」的若藻，會將所到之處化為焦土……"
10023030-6 = "正是如此。#n如果說被稱為「災厄之狐」的若藻，會將所到之處化為焦土……"
10023030-7 = "那麼「慈愛的怪盜」……便是以絕對會盜走其目標而聞名。"
10023030-9 = "與其說是「怪盜」……不就只是個犯罪者嗎！而且名字好怪！"
10023030-10 = "姐姐……"
10023030-11 = "哦……面對「慈愛的怪盜」竟然是那種反應……#n不愧是C&C。"
10023030-12 = "但是……「慈愛的怪盜」的行動終究是無法忽視的。#n一旦收到了預告信，不管什麼樣的警備都沒有意義，寶物終究會被奪走……"
10023030-13 = "不過說到底，由於預告信相當難以解讀，#n導致在被盜走前都無法得知究竟被盯上的是什麼，這也是很大的原因吧。"
10023030-17 = "乓啪喀乓！任務內容已更新。#n接下來是與「慈愛的怪盜」對決！"
10023030-18 = "那封預告信……可以……讓我們看一下嗎？"
10023030-19 = "當然沒問題。"
10023030-20 = "請看這個。"
10023030-22 = "1天22次，相會的2名旅人。"
10023030-24 = "正確的2人。無法計算的20。以及半步。"
10023030-26 = "月亮無法觸及的場所，靜止的舞與安迪基西拉的後方。"
10023030-28 = "我將拜訪從未被授予，奢華而不幸的劍所在之處。#n　　　　　　　　　　　　　　　──慈愛的怪盜"
10023030-31 = "這是……？"
10023030-35 = "是「慈愛的怪盜」的預告信。#n首先，要加以解讀就已經相當困難……"
10023030-36 = "不僅如此，#n「慈愛的怪盜」還以「光明正大送出預告信，並且成功完成偷盜」宣告自己的犯行。"
10023030-37 = "啊啊，無論看了幾次都無法理解。#n1天22次，相會的2名旅人，指的究竟是什麼呢？"
10023030-41 = "是不是這棟房子裡有一天會見面22次的人？"
10023030-42 = "你在說什麼啊，姐姐。#n再說見面的次數又要怎麼數呢？"
10023030-44 = "愛麗絲知道了！這些旅人們指的是NPC。#n如果是任務櫃台的NPC別說是20次，要見更多次都沒問題！"
10023030-45 = "愛麗絲醬……現實中是沒有任務櫃檯NPC的……"
10023030-47 = "沒有那種事！#n柚子只要去特定的地方就能見到，對話之後就能收到任務！"
10023030-49 = "嗚嗚……無法完全否認……"
10023030-53 = "[ns]「1天22次的話，大約是1小時1次的節奏呢……」"
10023030-54 = "因為1天是24小時，有2小時見不到的意思嗎……"
10023030-55 = "24小時……難道……？"
10023030-56 = "不好意思……明太郎先生。#n這間屋子裡有類比時鐘嗎……？"
10023030-57 = "有，有的……在大廳正中央有個大型的壁鐘……"
10023030-58 = "可以……讓我們看一下那個時鐘嗎……？"
10023030-59 = "可以，當然沒問題。#n莫非，有什麼頭緒了嗎……？"
10023030-60 = "柚子醬，你知道些什麼了嗎？"
10023030-62 = "如果我想得沒錯……這封預告信……"
10023030-64 = "果然沒錯……！"
10023030-65 = "怎，怎麼了嗎柚子？#n時間的話看手機也知道呀？"
10023030-66 = "不，不是的。#n用手機……或者說數位時鐘是很難理解的。"
10023030-67 = "……我想，應該已經解讀完第1行和第2行的一半了……！"
10023030-69 = "！！！"
10023030-70 = "咦！？什麼意思？怎麼做到的！？"
10023030-72 = "「1天見面22次的2名旅人」……#n我想指的應該是類比時鐘上的短針和長針。"
10023030-73 = "可是柚子，1天有24小時。多了2次！"
10023030-74 = "沒錯……我一開始也是這麼想的。可是呢，愛麗絲醬。#n時鐘的指針會在午前和午後各重疊11次，也就是說[ruby=  ・     ・     ・     ・     ・     ・   ・  ・   ・  ]一共只會重疊22次[/ruby]。"
10023030-75 = "短針每分鐘會移動0.5度，長針每分鐘會移動6度……#n有2次會在12點整時重疊，其餘的20次則會在不同的時刻重疊……"
10023030-76 = "而11點到12點之間，指針並不會重疊……"
10023030-78 = "哦哦……不愧是C&C，真是驚人的推理能力！#n那麼，接下來的部分也已經解讀完成了嗎？"
10023030-82 = "那個……#n「以及半步。月亮無法觸及的場所，靜止的舞與安迪基西拉的後方」。"
10023030-83 = "「我將拜訪從未被授予，奢華而不幸的劍所在之處」是這樣吧？"
10023030-84 = "半步，半步……我認為這指的也是時間。"
10023030-85 = "半步……一半……"
10023030-86 = "啊！會不會是指30分！？"
10023030-87 = "柚子醬，可以算出指針交疊的瞬間有沒有在30分前後的嗎？"
10023030-89 = "那樣的話，就是5點27分到7點38分之間……嗎？"
10023030-90 = "也就是說，怪盜會在那個時間入侵是嗎？"
10023030-91 = "不過「月亮無法觸及的場所，靜止的舞與安迪基西拉的後方」還不清楚……#n這是什麼意思呢？"
10023030-96 = "安迪基西拉……安迪基西拉……"
10023030-97 = "嗯！？"
10023030-98 = "有什麼頭緒嗎？"
10023030-99 = "沒，沒有！安迪基西拉的後方什麼的，真是句無厘頭的話呢。#n不過「從未被授予，奢華而不幸的劍」我倒是有點想法。"
10023030-100 = "恐怕……是在說後天要展示的藝術品吧。"
10023030-101 = "就是這個。"
10023030-106 = "這是什麼畫呢？"
10023030-107 = "是任命儀式的畫作。#n是描繪從主人手中收下了劍，成為騎士的一幅畫。"
10023030-108 = "如果是繪畫中的劍，自然就「從未被授予」了對吧？"
10023030-109 = "在這個意義上，也能說是「不幸」吧。"
10023030-111 = "聽你這麼一說……？"
10023030-112 = "……"
10023030-114 = "這幅畫正好是預計在拍賣會上拍賣的貴重作品，希望得到它的人應該不在少數。"
10023030-115 = "啊啊，竟然會盯上如此重要的畫作……#n如果沒有各位的力量，或許就只能眼睜睜地看著它被奪走了吧。"
10023030-116 = "既然已經找出被盯上的物品，希望各位能盡全力守護這幅畫……"
10023030-117 = "咦？#n不是還有其他貴重的物品嗎……？"
10023030-118 = "不不不！既然已經解開預告信的謎團，接下來就只要守住它就行了！#n哈哈哈，愚蠢的「慈愛的怪盜」……"
10023030-119 = "他做夢也不會想到會有如此優秀的各位在這裡吧！"
10023030-120 = "啊哈哈。是，是嗎？"
10023030-121 = "但是……"
10023030-125 = "能，能幫上忙……真是太好了……"
10023030-126 = "任務達成了！#n接下是守護畫作的連續任務！"
10023030-130 = "此外雖然冒昧，還有其他事想拜託各位……"
10023030-131 = "……什麼事呢？"
10023030-132 = "從明天開始的3天內，可以請各位負責這棟宅邸的警備嗎？"
10023030-133 = "這倒不成問題……但如果預告信的解讀錯了呢？"
10023030-134 = "當然，無法否定怪盜的目標另有其物的可能性。#n……但是，只要各位抓住怪盜就沒問題了。"
10023030-135 = "「慈愛的怪盜」雖然以神出鬼沒聞名，但是在C&C的實力面前就像小孩子一樣。#n哈哈哈，我說的沒錯吧？"
10023030-136 = "萬事拜託了。#n我會準備足夠的報酬……"
10023030-137 = "大約是這麼多，各位意下如何呢？"
10023030-141 = "！！！？？"
10023030-143 = "（真……真的能收下這麼多錢……？）"
10023030-144 = "（能1人買1台最新的PrayStation Pro7……還有ZBOX Series Z！#n　不不不，就算1人買2台都還有剩！）"
10023030-145 = "（怎，怎麼辦啊？綠！？）"
10023030-146 = "（你問我也不知道啊！）"
10023030-148 = "[ns] （……先讓大家冷靜下來吧）"
10023030-150 = "[ns]「可以讓我們單獨討論一下嗎？」"
10023030-151 = "啊啊，是我思慮不周，真是失禮了。#n那麼我就先離開了。"
10023030-155 = "哈啊啊啊啊……謝謝你，老師。#n我的腦袋差點就爆炸了呢……"
10023030-156 = "怎，怎麼辦，老師？#n竟然是「七罪人」，只靠我們已經無法承擔了……"
10023030-157 = "好想回去……置物櫃……心的故鄉……"
10023030-158 = "大家為什麼都是這種反應呢……？#n愛麗絲，究竟該怎麼做才好……"
10023030-159 = "[s3]「先決定該怎麼處理這個委託吧？」\n[s4]「要告訴對方真相然後放棄嗎？」"
10023030-160 = "……如果放棄委託的話，情況究竟會變成什麼樣子呢……？"
10023030-161 = "……如果放棄委託的話，情況究竟會變成什麼樣子呢……？"
10023030-162 = "我想……委託人或許會抗議吧。#n事到如今才說這一切都是騙人的，說不定會成為整個千年的問題……"
10023030-163 = "那，那樣寧瑠前輩絕對會生氣……的吧？"
10023030-164 = "不想想像……"
10023030-166 = "不過桃井！這是交給愛麗絲與夥伴們的任務！#n桃井說過，一旦接受任務就應該做到最後才對。"
10023030-167 = "就這樣放棄真的好嗎……？"
10023030-168 = "愛，愛麗絲……！#n確，確實是這麼說沒錯……！"
10023030-169 = "可是……這對我們來說太沉重了……"
10023030-170 = "[s]「有時候不遵守任務或許也是必要的。」"
10023030-171 = "老師？"
10023030-172 = "那是……什麼意思呢？"
10023030-173 = "[s]「我們也沒有一定要跟怪盜戰鬥對吧。」"
10023030-174 = "不必跟怪盜戰鬥……？"
10023030-175 = "我，我好像明白老師的意思了！"
10023030-176 = "簡單來說，只要不被怪盜偷走任何東西，就等於是我們贏了不是嗎？"
10023030-179 = "！！！"
10023030-181 = "反正都已經走到這一步了，而且老師也在。#n何況這間宅邸的防盜措施也很厲害不是嗎？"
10023030-182 = "我們沒有必要和怪盜戰鬥，也不必抓住他。#n只要寶物不被偷走就行了！"
10023030-183 = "確實，這樣或許還有一點可能性……"
10023030-184 = "我們……也有和C&C戰鬥的經驗……#n就連更厲害的戰鬥也經歷過了……"
10023030-185 = "只要能活用那些經驗……"
10023030-186 = "[s]「成功的話或許就能獲得報酬，不過也有風險哦。」"
10023030-187 = "（沒錯，如果能獲得那些報酬……我們遊戲開發部的……）"
10023030-188 = "那決定了吧？"
10023030-189 = "唉……真的沒問題嗎。"
10023030-190 = "我們一定做的到的！#n而且這也是個讓C&C欠我們一份人情的機會不是嗎？"
10023030-191 = "畢竟這本來是C&C該接受的委託嘛！"
10023030-193 = "愛麗絲會加油的！#n只要跟老師在一起，愛麗絲跟夥伴們就是無敵的！"
10023030-197 = "……看來各位已經得出結論了呢。#n非常感謝各位願意接受我的委託。"
10023030-198 = "那麼就如同先前所說，希望各位能在接下來的[ruby=・]3[/ruby][ruby= ・     ・ ]天內[/ruby]保護這棟房子和藝術品。"
10023030-199 = "只要這3天就好了嗎？"
10023030-200 = "是的。只要負責從明天開始的活動期間就可以了。"
10023030-201 = "第一天是集結嘉賓們舉行派對，第二天是藝術品的展示。#n至於最後一天……預計將會舉行藝術品的拍賣會。"
10023030-202 = "……怪，怪盜會，在這3天的其中一天出現……對吧……"
10023030-203 = "或許正是如此。#n希望各位能在第一天的派對會場一邊招待客人，一邊維護現場的秩序。"
10023030-205 = "咦，招待客人……？"
10023030-206 = "是的。有句話說藏木於林對吧？我認為隱藏身分混入會場或許是最適當的選擇。#n正好各位的打扮也非常適合。"
10023030-207 = "以防萬一先告訴各位……怪盜混入嘉賓中的可能性也是有的。#n還請務必注意，切勿大意。"
10023030-209 = "（總覺得不太對勁……）"
10023030-210 = "（預告信的解讀真的正確嗎……？#n　明明還有其他的可能性……）"

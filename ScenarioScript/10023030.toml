[translation]
10023030-1 = "Episode 3;The Heart Without a Clock"
10023030-2 = "Who or what is the Benevolent Thief?"
10023030-3 = "Your question is who. She is one of the infamous Seven Prisoners...and a renowned thief."
10023030-4 = "[s1] \"Isn't Wakamo one of the Seven Prisoners...?!\"\n[s2] \"That's just like Wakamo!\""
10023030-5 = "Indeed. The Fox of Calamity is known for the blazing inferno and devastation she wreaks wherever she goes."
10023030-6 = "Indeed. The Fox of Calamity is known for the blazing inferno and devastation she wreaks wherever she goes."
10023030-7 = "And the Benevolent Thief earned her notoriety stealing anything and everything her heart desired."
10023030-9 = "What a weird name! And what kinda thief tells everyone that they're a thief? Hahaha!"
10023030-10 = "Momoi..."
10023030-11 = "Y-You have a rather cavalier attitude about the matter..."
10023030-12 = "But please do not underestimate the Benevolent Thief. She has always successfully followed through on her calling cards."
10023030-13 = "Although, some would say it's only because the cards' riddles are so cryptic and convoluted. The object is stolen before they can even be solved!"
10023030-17 = "We will not underestimate our new enemy! Bum bum bum! It is time for a new quest! Fight the Benevolent Thief!"
10023030-18 = "Could we...see the calling card...please?"
10023030-19 = "I'm glad you asked. I brought it with me today."
10023030-20 = "Here, the calling card."
10023030-22 = "Two travelers meet twenty-two times a day."
10023030-24 = "Precisely two. But an unclear twenty. A half-step"
10023030-26 = "behind the frozen dance and Antikythera, no moonlight shines."
10023030-28 = "The sad sword of opulence never awarded to another will be mine."
10023030-31 = "...What?"
10023030-35 = "I understand your confusion. The Benevolent Thief's calling cards are all as muddled and indecipherable as this one."
10023030-36 = "She claims to be better than other thieves, since she sends a warning ahead of time. But they're all just too cryptic!"
10023030-37 = "Even from the very first line, it makes no sense. What kind of travelers meet twenty-two times a day?!"
10023030-41 = "Some people might see each other over twenty times a day, right? I mean, we see each other all the time!"
10023030-42 = "That's different from meeting someone twenty-two different times in one day. There's no way that would happen."
10023030-44 = "I have solved the puzzle! The travelers are NPCs. You can easily run into NPCs more than twenty times a day while doing your dailies."
10023030-45 = "Aris...there's no daily quest NPCs in real life..."
10023030-47 = "But Yuzu is a daily quest NPC in my real life! I am able to meet her in the same spot every day, talk to her there, and she gives me quests!"
10023030-49 = "...I can't exactly say she's wrong... And she's not even trying to be mean..."
10023030-53 = "[ns] \"Twenty-two times a day would make it roughly every hour or so...\""
10023030-54 = "But one day is twenty-four hours. We are missing two hours..."
10023030-55 = "Hours...time...?"
10023030-56 = "Meitaro... Do you have...an analogue clock?"
10023030-57 = "How did you know? We have a large clock hanging in middle of the hall."
10023030-58 = "...Could I look at it please?"
10023030-59 = "That's no problem at all, but what interest could you have in a clock?"
10023030-60 = "Did you figure something out, Yuzu?"
10023030-62 = "If I'm understanding correctly...this calling card..."
10023030-64 = "...I was right!"
10023030-65 = "You were right...about the time? We could've checked our phones or something instead of coming all the way to the hall."
10023030-66 = "It's wasn't that... I really needed to look at an actual, analogue clock."
10023030-67 = "And now that I have, I think I solved the first part, at least..."
10023030-69 = "...!"
10023030-70 = "You did? What is it? Come on. Spill!"
10023030-72 = "The two travelers that meet twenty-two times a day, I realized that was referring to the hands of a clock... That's why I needed an analogue one..."
10023030-73 = "But, Yuzu, I thought a day is twenty-four hours. Not twenty-two."
10023030-74 = "You're right, Aris. But the hands of a clock only actually overlap eleven times throughout the day. So, twenty-two."
10023030-75 = "The hour hand moves 0.5 degrees every minute while the minute hand moves 6 degrees every minute... so they overlap at 12 o' clock two times a day, and the other 20 times are at awkward times of day."
10023030-76 = "They never overlap between 11 and 12 o' clock..."
10023030-78 = "I expect nothing less from C&C! Do you have any ideas on the rest of the calling card?"
10023030-82 = "...behind the frozen dance and Antikythera, no moonlight shines"
10023030-83 = "\"The sad sword of opulence never awarded to another will be mine,\" right?"
10023030-84 = "And what did \"half step\" mean... That must be another reference to a clock!"
10023030-85 = "A clock... a half step on a clock would mean..."
10023030-86 = "Oh! Like, the half-hour mark!"
10023030-87 = "Yuzu, can you figure out at what time the hour and minute hands overlap after the half-hour point?"
10023030-89 = "Between 5:27 and 7:38... I think?"
10023030-90 = "That is when the thief will attempt to break in!"
10023030-91 = "\"...Antikythera, no moonlight shines.\" What does that mean?"
10023030-96 = "Antikythera... Antikythera..."
10023030-97 = "Wait!"
10023030-98 = "Do you know something about Antikythera?!"
10023030-99 = "N-No! I don't understand that portion at all, but I did just remember something about the \"sad sword of opulence.\""
10023030-100 = "I believe it must be referring to a piece of art I'll be displaying at the exhibition."
10023030-101 = "It's this painting here."
10023030-106 = "What is this image?"
10023030-107 = "It's an old knighting ceremony. Traditionally, a sword is used when bestowing a knighthood."
10023030-108 = "So it's an unfortunate sword because it can't leave its painting, and it can never be awarded to anyone else."
10023030-109 = "It's a bit metaphorical, but it fits the description."
10023030-111 = "I think it makes sense!"
10023030-112 = "..."
10023030-114 = "This is one of our most highly anticipated pieces for the upcoming auction..."
10023030-115 = "What would I have done without you? I would have never guessed they were intending to steal something so priceless."
10023030-116 = "I will leave the protection of this art piece in your capable hands for the remainder of your time here."
10023030-117 = "Just this one? You're not worried about the other pieces?"
10023030-118 = "Of course not! We've solved the Benevolent Thief's riddle and know exactly where she'll strike next!"
10023030-119 = "Haha! I'm sure she didn't expect to meet her match in C&C!"
10023030-120 = "Aha...haha... I guess not?"
10023030-121 = "But..."
10023030-125 = "Glad to be of service..."
10023030-126 = "The first step of this quest has been completed! Our next objective is to protect the artwork!"
10023030-130 = "Actually, perhaps I could expand the scope of the next...\"quest\" slightly."
10023030-131 = "What do you mean?"
10023030-132 = "I would like for C&C to oversee the security of this estate for the next three days, starting tomorrow. "
10023030-133 = "But we're not...100% sure our solution to the calling card is right..."
10023030-134 = "Well, yes. But in the event we are incorrect and the thief targets another item, it wouldn't be a problem, would it?"
10023030-135 = "The Benevolent Thief may be the most elusive thief known to Kivotos, but I'm sure she's nothing against seasoned agents of your caliber. Hahaha."
10023030-136 = "I would appreciate it immensely. And, of course, you will be compensated handsomely."
10023030-137 = "Would this amount be agreeable?"
10023030-141 = "?!?!?!"
10023030-143 = "(Th-There's no way right? How deep is this clients' pockets?!)"
10023030-144 = "(Everyone could have their own, personal FlyStation Pro AND a ZBOX Series X, twice over!)"
10023030-145 = "(Midori! What do we do?!)"
10023030-146 = "(I don't have the answers to everything! And especially not this!)"
10023030-148 = "[ns] \"(They're overwhelmed by the amount. I have to intervene, quickly!)\""
10023030-150 = "[ns] \"We need a moment to discuss everything, privately. If you don't mind.\""
10023030-151 = "Of course. Please, go ahead. I've presented you with quite a bit of information."
10023030-155 = "Phew! Good save, Sensei! I needed a second to breathe."
10023030-156 = "This has totally spiraled out of control. We can't handle one of the Seven Prisoners!"
10023030-157 = "I want to go home... I want my cabinet...my computer..."
10023030-158 = "What is wrong? This is a very simple quest, is it not?"
10023030-159 = "[s3] \"Let's take it one step at a time. Do you want to keep going?\" \n[s4] \"If you want, we can come clean and go home.\""
10023030-160 = "What would happen if we quit?"
10023030-161 = "What would happen if we quit?"
10023030-162 = "The usual procedure would be to file an official complaint... It would be submitted to Seminar to review, and the Game Development Department and C&C would both be involved."
10023030-163 = "A-And then Neru would find out and kill us!"
10023030-164 = "Please don't remind me..."
10023030-166 = "I am still confused! Momoi, you have always told me it is our duty to keep our word and finish a quest once it has started!"
10023030-167 = "But we should...quit? And not fulfill our hero's duty?"
10023030-168 = "No, Aris! Everything you're saying is right..."
10023030-169 = "But there are some things even heroes can't handle..."
10023030-170 = "[s] \"When the quest is overwhelming, it can be easy to forget the real job.\""
10023030-171 = "Sensei?"
10023030-172 = "What does that mean? "
10023030-173 = "[s] \"Our job isn't to fight this thief, let alone catch them.\""
10023030-174 = "Have you been paying attention? That's exactly what it is."
10023030-175 = "Wait! I think I get what Sensei is trying to say."
10023030-176 = "It's right there in the print! All we were asked to do was to make sure nothing gets stolen!"
10023030-179 = "...!"
10023030-181 = "Look, everyone. We've come so far already, and you heard Meitaro! They've got an awesome security system already. Worst comes to worst, Sensei'll bail us out."
10023030-182 = "We don't need to fight the thief or even catch them. We just need to protect the artwork!"
10023030-183 = "It's not impossible..."
10023030-184 = "We've fought against...fought with...and even fought for C&C... We've done a lot and grown a lot."
10023030-185 = "If we can tap into all those experiences... Then maybe we could make it work...just maybe."
10023030-186 = "[s] \"It'll take a lot of hard work, but there's a big reward at the end of it.\""
10023030-187 = "(And with that amount of money, we could... we might be able to...)"
10023030-188 = "Sounds like we're all decided, right?"
10023030-189 = "*sigh* Do we really think this is a good idea? "
10023030-190 = "Heh, think about it. If we pull this off, we get to rub it in Neru's face later!"
10023030-191 = "I mean, just imagine! C&C are gonna be the ones who owe US one!"
10023030-193 = "I believe we will succeed! After all, our party has the Sensei-buff!"
10023030-197 = "I'm happy to hear your decision. Thank you, everyone."
10023030-198 = "Then, as agreed upon, C&C will manage the security of my estate and the art within it for the next three days."
10023030-199 = "If you don't mind me asking, why three days?"
10023030-200 = "For the next three days, I will be holding an event here."
10023030-201 = "The first day will be for guest reception, the second for gallery viewings, and the auction will be the grand finale."
10023030-202 = "You expect that the thief will strike during the event, so you hired extra security."
10023030-203 = "Precisely. Ah! And I would appreciate it if you would help out with the guest reception on the first day as well."
10023030-205 = "Huh? The reception?!"
10023030-206 = "As I said. Consider it undercover work as you secure the perimeter. "
10023030-207 = "It will help you gather information as well. One of the guests could be related to the thief. "
10023030-209 = "(What about the painting...?)"
10023030-210 = "(Wasn't our job just to protect one painting? Now we're running security and a reception? Something just seems...off.)"

[translation]
10023030-1 = "ตอนที่ 3; ศูนย์กลางที่ไม่มีนาฬิกา"
10023030-2 = "<จอมโจรแห่งความเสน่หา> คืออะไรเหรอ?"
10023030-3 = "<จอมโจรแห่งความเสน่หา>... คือสมญานามของโจรคนหนึ่ง ที่เป็นหนึ่งในเจ็ดอาชญากรที่น่ากลัวครับ"
10023030-4 = "[s1] \"เจ็ดอาชญากร...?!\"\n[s2] \"เหมือนวาคาโมะน่ะเหรอ...?\""
10023030-5 = "ใช่ครับ ถ้าวาคาโมะมีชื่อเสียงเรื่องการพกระเบิดและประทัดไปทุกที่ที่ปรากฏตัวละก็"
10023030-6 = "ใช่ครับ ถ้าวาคาโมะมีชื่อเสียงเรื่องการพกระเบิดและประทัดไปทุกที่ที่ปรากฏตัวละก็"
10023030-7 = "<จอมโจรแห่งความเสน่หา> ก็คงเป็นคนดังที่เลื่องลือกันว่าสามารถขโมยได้ทุกอย่างที่ต้องการครับ"
10023030-9 = "แปลว่าขโมยคนนั้นสถาปนาตัวเองว่าเป็นจอมโจรแล้วขโมยข้าวของไปเรื่อยเหรอ? ตลกชะมัด! แถมยังใช้ชื่อที่ไม่ได้เรื่องด้วย!"
10023030-10 = "พี่......"
10023030-11 = "อ่า... อืม...! ไม่ยักรู้ว่าจะมีปฏิกิริยาแบบนี้เลยนะครับ..."
10023030-12 = "แต่เราไม่อาจมองข้ามการกระทำของ <จอมโจรแห่งความเสน่หา> ได้ครับ เธอมีชื่อเสียงเป็นพิเศษใน#nการขโมยของที่เธอบอกไว้ ไม่ว่าจะเกิดอะไรขึ้นก็ตาม"
10023030-13 = "และเนื้อหาที่ระบุในจดหมายเตือนก็ซับซ้อนมาก ส่วนใหญ่กว่าจะรู้ว่าเธอจ้องขโมยอะไรไปก็หลังจาก#nที่เธอได้ของชิ้นนั้นไปแล้วครับ"
10023030-17 = "งั้นเหรอคะ! อัปเดตรายละเอียดเควสค่ะ นี่คือการเผชิญหน้ากับ <จอมโจรแห่งความเสน่หา> ค่ะ! ปาปัม ปาปัม ป๊าม!"
10023030-18 = "พวกฉันขอดู... จดหมายเตือนอันนั้น... หน่อยได้ไหมคะ?"
10023030-19 = "ผมก็ว่าจะให้ดูอยู่พอดีครับ"
10023030-20 = "นี่ครับ จดหมายเตือนที่ว่า"
10023030-22 = "นักเดินทางสองคนมาพบกันวันละ 22 ครั้ง"
10023030-24 = "อย่างแน่นอน 2 ครั้ง ไม่แน่นอน 20 ครั้ง และอีกครึ่งก้าว"
10023030-26 = "ที่ที่แสงจันทร์สาดไม่ถึง ด้านหลังของท่าเต้นที่หยุดแล้วกับแอนทิคีเธรา"
10023030-28 = "ฉันจะไปที่นั่นเพื่อดาบที่หรูหราแต่อาบโชคร้าย ดาบที่ไม่เคยถูกส่งมอบมาก่อน"
10023030-31 = "นี่มัน... อะไรกันเนี่ย?"
10023030-35 = "ครับ นี่แหละครับจดหมายเตือนจาก <จอมโจรแห่งความเสน่หา> แค่ตีความจดหมายก็ถือว่ายากแล้ว..."
10023030-36 = "พอเธอส่งมาก็ไปปล่อยข่าวลืออย่างว่าตัวเองส่งจดหมายเตือนมาแล้วอย่างกล้าหาญ และอาชญากรรม#nของเธอก็แตกต่างจากการโจรกรรมทั่วไปด้วยครับ"
10023030-37 = "ปัญหามันติดตั้งแต่ประโยคแรกแล้วครับ นักเดินทางสองคนมาพบกันวันละ 22 ครั้ง นี่มันอะไรกันครับ?"
10023030-41 = "น่าจะมีคนแบบนั้นมาพบกันสักแห่งก็ได้นะ? เจอกันวันละ 22 ครั้ง..."
10023030-42 = "คนบ้าอะไรเนี่ย เจอกันตั้งวันละ 22 ครั้ง ไม่หลับไม่นอนกันเหรอ? ลองคิดดูนะ เจอกันวันละ 22 ครั้ง#nมันเป็นไปได้ที่ไหนกันเล่า"
10023030-44 = "อาริสึเข้าใจแล้วค่ะ! นักเดินทางที่ว่าคือ NPC ค่ะ ถ้าเป็น NPC ของเควสรายวันละก็ อาจจะได้เจอกัน#nมากกว่าวันละ 22 ครั้งก็ได้ค่ะ!"
10023030-45 = "อาริสึจัง... ในชีวิตจริงน่ะมันไม่มี NPC เควสรายวันหรอกนะ..."
10023030-47 = "ไม่หรอกค่ะ! ยูสึเป็น NPC เควสรายวันที่อยู่ในโลกแห่งความเป็นจริงค่ะ! เป็นคนที่พบได้หากไปใน#nสถานที่เฉพาะ แล้วก็ยังพูดคุยด้วยได้ แถมยังให้เควสได้ด้วยค่ะ!"
10023030-49 = "งือ... จะให้ปฏิเสธว่าไม่ใช่ก็ไม่ได้ซะด้วยสิ..."
10023030-53 = "[ns] \"ถ้าเจอวันละ 22 ครั้ง เฉลี่ยแล้วก็เท่ากับชั่วโมงละครั้งเลยแฮะ...\""
10023030-54 = "วันหนึ่งมี 24 ชั่วโมง งั้นก็แปลว่าไม่ได้เจอกัน 2 ชั่วโมงค่ะ..."
10023030-55 = "เวลา... เวลา...?"
10023030-56 = "คือว่า คุณเมทาโร่คะ ที่นี่พอจะมีนาฬิกาอนาล็อกบ้างไหมคะ...?"
10023030-57 = "ครับ? อืม... จริงๆ ที่ห้องโถงก็มีนาฬิกาแขวนผนังแบบอนาล็อกเรือนใหญ่อยู่นะครับ..."
10023030-58 = "พวกฉัน... ขอดูนาฬิกานั่นหน่อยได้ไหมคะ?"
10023030-59 = "ได้ครับ ไม่มีปัญหา ว่าแต่จะดูไปทำไมเหรอครับ...?"
10023030-60 = "ยูสึจัง? ไขปริศนาอะไรได้งั้นเหรอ?"
10023030-62 = "ถ้าฉันคิดถูก... จดหมายเตือนนี้ก็คือ..."
10023030-64 = "ใช่จริงด้วย...!"
10023030-65 = "ทะ... ทำไมเหรอ? ยูสึ? อยากรู้ว่าตอนนี้กี่โมงงั้นเหรอ? ถ้าสงสัยแค่เวลา ก็ดูเอาจากมือถือก็ได้นี่นา"
10023030-66 = "ไม่ใช่อย่างนั้นหรอก โมโมอิ ฉันต้องดูนาฬิกาอนาล็อกของจริงน่ะ"
10023030-67 = "และตอนนี้... ฉันว่าฉันตีความบรรทัดแรกจนถึงกลางบรรทัดที่ 2 ได้แล้วละ...!"
10023030-69 = "!!!"
10023030-70 = "ยังไงเหรอ? ตีความได้ว่าไง? อย่ารู้อยู่คนเดียวสิ!"
10023030-72 = "ที่บอกว่า 'นักเดินทางสองคนมาพบกันวันละ 22 ครั้ง'... อาจจะหมายถึงเข็มสั้นกับเข็มยาวของนาฬิกา#nอนาล็อกก็ได้"
10023030-73 = "แต่วันหนึ่งมี 24 ชั่วโมงนะคะ ยูสึ"
10023030-74 = "เพราะอย่างนั้นแหละ อาริสึจัง เข็มนาฬิกามาเจอกัน 11 ครั้ง 2 รอบ... ในวันหนึ่งซ้อนกันแค่ 22 ครั้ง"
10023030-75 = "เข็มสั้นขยับ 0.5 องศาต่อนาที ส่วนเข็มยาวจะขยับ 6 องศาต่อนาที... ดังนั้นตอนเที่ยงวันและเที่ยงคืน#nเท่านั้นที่จะซ้อนกันพอดี ส่วนที่เหลืออีก 20 ครั้งจะซ้อนกันแบบคลุมเครือ"
10023030-76 = "และตั้งแต่ 11 โมงถึงเที่ยง เข็มจะไม่มาซ้อนกันเลย ตอนห้าทุ่มถึงเที่ยงคืนก็ด้วย..."
10023030-78 = "โอ้ สุดยอดไปเลยครับ! นี่สินะ C&C! ถ้างั้นส่วนอื่นในจดหมายเตือนจะตีความได้ว่ายังไงเหรอครับ?"
10023030-82 = "'และอีกครึ่งก้าว ที่ที่แสงจันทร์สาดไม่ถึง ด้านหลังของท่าเต้นที่หยุดแล้วกับแอนทิคีเธรา'"
10023030-83 = "'ฉันจะไปที่นั่นเพื่อดาบที่หรูหราแต่อาบโชคร้าย ดาบที่ไม่เคยถูกส่งมอบมาก่อน' ใช่ไหมนะ?"
10023030-84 = "ครึ่งก้าว... ครึ่งก้าว... ฉันว่าตรงนี้ก็น่าจะหมายถึงเวลานะ"
10023030-85 = "เวลา... ครึ่งก้าวมันคือเวลาไหนนะ..."
10023030-86 = "อ้อ! หรือว่าหมายถึง 30 นาที?!"
10023030-87 = "ยูสึจัง ในเวลาที่เข็มนาฬิกาซ้อนกัน มีตอนไหนที่อยู่ก่อนและหลังเวลา 30 นาทีบ้างไหม?"
10023030-89 = "ตั้งแต่ 05:27 น. ถึง 07:38 น. ไหมนะ...?"
10023030-90 = "ถ้างั้นจอมโจรที่ว่าก็จะบุกเข้ามาตอนนั้นสินะคะ?"
10023030-91 = "'ที่ที่แสงจันทร์สาดไม่ถึง ด้านหลังของท่าเต้นที่หยุดแล้วกับแอนทิคีเธรา'... แล้วอันนี้แปลว่าอะไรน่ะ?"
10023030-96 = "แอนทิคีเธรา... แอนทิคีเธรา..."
10023030-97 = "หืม?!"
10023030-98 = "อะไรน่ะ พอจะเดาอะไรได้เหรอคะ"
10023030-99 = "มะ... ไม่มีครับ! ด้านหลังแอนทิคีเธรา... มันแปลกประหลาดยังไงชอบกล แต่ท่อนที่บอกว่า 'ดาบที่หรูหราแต่อาบโชคร้าย ดาบที่ไม่เคยถูกส่งมอบมาก่อน' ผมพอจะเดาได้อยู่ครับ"
10023030-100 = "มันอาจจะเป็นหนึ่งในผลงานศิลปะที่จะจัดแสดงในวันมะรืนน่ะครับ"
10023030-101 = "ชิ้นนี้ครับ"
10023030-106 = "ภาพนี้มันอะไรกันเหรอคะ?"
10023030-107 = "ภาพการแต่งตั้งอัศวินครับ และในการแต่งตั้งอัศวินก็จะใช้ดาบเป็นธรรมเนียมครับ"
10023030-108 = "ถ้าเป็นดาบที่อยู่ในภาพวาดละก็ ต้องเป็นดาบที่ไม่มีการส่งมอบอยู่แล้วนี่ครับ?"
10023030-109 = "สิ่งที่อยู่ในภาพวาดมันจับต้องไม่ได้อยู่แล้วครับ"
10023030-111 = "ฟังๆ ดูก็เหมือนจะเป็นอย่างนั้นนะ?"
10023030-112 = "......"
10023030-114 = "แล้วภาพนี้ก็จะถูกนำมาประมูลอยู่พอดี ดังนั้นน่าจะมีคนไม่น้อยเลยครับที่อยากได้"
10023030-115 = "จอมโจรส่งจดหมายมาเตือนว่าจะมาขโมยภาพวาดนี้เหรอเนี่ย... ถ้าไม่ได้ความเฉียบแหลมของทุกคน พวกผมคงงานเข้าไปแล้วครับ"
10023030-116 = "ถ้างั้นผมต้องขอให้ทุกคนช่วยกันปกป้องภาพนี้ไว้แล้วละครับ"
10023030-117 = "เอ๋? แล้วผลงานชิ้นอื่นๆ ล่ะ ไม่ต้องดูแลก็ได้เหรอ?"
10023030-118 = "ครับ! ก็เราตีความจดหมายเตือนได้แล้วนี่ครับ! จอมโจรแห่งความเสน่หานี่สมองทึ่มเสียจริง..."
10023030-119 = "เขาคงคิดไม่ถึงหรอกครับว่า C&C ที่ยอดเยี่ยมจะมาโชว์ศักดาในงานนี้!"
10023030-120 = "แหะๆๆ งะ... งั้นเหรอ?"
10023030-121 = "แต่ว่า..."
10023030-125 = "โล่งอกไปทีนะคะ... ที่พวกฉันก็เป็นประโยชน์..."
10023030-126 = "เราไขความลับของเควสกันได้แล้วค่ะ! ต่อไปก็คือการปกป้องภาพวาดสินะคะ!"
10023030-130 = "อ้อ แล้วก็... ผมมีเรื่องที่ต้องขอร้องทุกคนอีกเรื่องครับ"
10023030-131 = "คะ?"
10023030-132 = "ตั้งแต่พรุ่งนี้เป็นต้นไป ทุกคนช่วยมารักษาความปลอดภัยของคฤหาสน์นี้ให้สัก 3 วันได้ไหมครับ? "
10023030-133 = "แต่ว่า... ถ้าเราตีความจดหมายเตือน... ผิดไปล่ะคะ?"
10023030-134 = "จริงอยู่ที่จอมโจรอาจเพ่งเล็งผลงานชิ้นอื่นก็ได้ แต่หากเป็นอย่างนั้น ทุกคนก็ช่วยสกัดจอมโจรนั่นให้ได้ ใช่หรือเปล่าล่ะครับ?"
10023030-135 = "ถึง <จอมโจรแห่งความเสน่หา> จะมีชื่อเสียงโด่งดังในเรื่องการหลบหนี แต่หากเทียบกับกิตติศัพท์ของ C&C แล้ว คงเทียบกันไม่ติดหรอกครับ ว่าไหมครับ ฮ่ะฮ่ะฮ่า"
10023030-136 = "ต้องขอรบกวนด้วยนะครับ แล้วผมจะตอบแทนให้อย่างสมน้ำสมเนื้อเลยครับ"
10023030-137 = "ประมาณนี้เป็นไงครับ?"
10023030-141 = "!!!???"
10023030-143 = "(กะ... ก็โอเคอยู่ไหมนะ? เราจะได้ค่าตอบแทนตั้งขนาดนั้นเลยเหรอ...?)"
10023030-144 = "(เงินตั้งขนาดนี้ถ้าเอาไปซื้อไพล์สเตชั่น โปร 7 รุ่นใหม่ล่าสุด... แล้วก็ ZBOX ซีรีย์ Z ละก็! ต่อให้ซื้อมา#nแจกคนละเครื่องก็ยังเหลืออีกตั้งเยอะเลย!)"
10023030-145 = "(อะ... เอาไงดี? มิโดริ?!)"
10023030-146 = "(อย่าเอาแต่ถามฉันสิ!)"
10023030-148 = "[ns] (ทุกคนดูตกใจกันมากเลย... ต้องทำอะไรสักอย่างแล้ว)"
10023030-150 = "[ns] \"ขอพวกเรา... คุยกันสักครู่ได้ไหม?\""
10023030-151 = "ครับ? อ้อ ได้สิครับ คงอยากประชุมปฏิบัติการก่อนสินะครับ ได้ครับ"
10023030-155 = "แหะๆๆๆ... ขอบคุณนะคุณครู นึกว่าจะตื่นเต้นจนตุยเย่ไปแล้วซะอีก"
10023030-156 = "ทะ... ทำยังไงดีคะคุณครู? เขาเป็นหนึ่งในเจ็ดอาชญากรเลย พวกฉันไม่น่าจะรับมือได้แล้วค่ะ..."
10023030-157 = "อยากกลับแล้ว... อยากกลับตู้... อยากกลับเซฟโซนแล้ว..."
10023030-158 = "?  ทำไมทุกคนถึงเป็นแบบนี้กันล่ะคะ...? อาริสึเข้าใจอะไรผิดไปหรือเปล่าคะ?"
10023030-159 = "[s3] \"มาคิดทีละสเต็ปก่อนดีกว่า เราทำงานนี้กันต่อไหม?\"\n[s4] \"หรือว่าจะบอกความจริงแล้วถอนตัวดี?\""
10023030-160 = "... ถ้าบอกไปตามตรงว่าไม่อยากทำ แล้วจะเป็นยังไงเหรอคะ...?"
10023030-161 = "... ถ้าบอกไปตามตรงว่าไม่อยากทำ แล้วจะเป็นยังไงเหรอคะ...?"
10023030-162 = "ผู้ว่าจ้างก็อาจจะ... มาเอาเรื่องเราจริงจังก็ได้ อาจจะมาประท้วงที่ชมรมพัฒนาเกมไม่ก็ C&C ดีไม่ดีอาจ#nจะมาทั่วมิลเลเนียมเลยก็ได้"
10023030-163 = "ถะ... ถ้าเป็นอย่างนั้นเราคงโดนรุ่นพี่เนรุอาละวาดใส่... ใช่ไหม?"

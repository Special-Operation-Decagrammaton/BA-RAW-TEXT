[translation]
2600206-1 = "不成熟的我能做的事"
2600206-2 = "格黑娜．第8學生餐廳"
2600206-3 = "（於是到了週末）"
2600206-4 = "（依照和茱莉的約定，來到了格黑娜的學生餐廳）"
2600206-10 = "啊，老師！我在等您呢！"
2600206-11 = "[s1]「讓你久等了，抱歉我來晚了。」\n[s2]「茱莉手上拿著的是什麼呢？」"
2600206-14 = "啊，您說這個嗎……"
2600206-19 = "是鏟子、鐮刀，還有鐵鎚！"
2600206-20 = "[s]「……你想做什麼？」"
2600206-21 = "「啪！」地挖呀挖、#n「唰！」地砍呀砍、#n「咚！」地敲呀敲！"
2600206-22 = "啊，當然不只有這些唷。"
2600206-23 = "除此之外我還準備了所有需要的工具。"
2600206-28 = "請別擔心，今天就全部包在我身上吧！"
2600206-29 = "請放一百二十個心！"
2600206-30 = "[s]「我可以問一下你打算做什麼嗎……？」"
2600206-31 = "那當然是……"
2600206-32 = "務農囉！"
2600206-34 = "（跟著茱莉一起前往餐廳後方……）"
2600206-35 = "（那裡有片巨大的旱田）"
2600206-36 = "呵呵，怎麼樣呀？"
2600206-37 = "這裡就是我們供給部引以為傲的農地哦！"
2600206-38 = "[s3]「真壯觀呢……！」\n[s4]「為什麼這種地方會有農地呢……？」"
2600206-41 = "我們供給部的預算一直都不夠充裕，又時常因為各種原因導致食材不足……"
2600206-42 = "所以希望多少能補上一點空缺，才會像這樣自己培育食材。"
2600206-43 = "而且，格黑娜學園的附近就有火山。"
2600206-49 = "所以土壤非常肥沃，品質非常高唷！"
2600206-50 = "雖然我們並不是專家，不過只要撒下種子並進行適度地管理……"
2600206-56 = "就能夠種出這麼多美味的野菜哦！"
2600206-57 = "呵呵，您不覺得很厲害嗎？"
2600206-58 = "[s5]「確實很厲害呢。不過，總覺得……」\n[s6]「茱莉一談到跟農地有關的話題，表情就像在發光一樣。」"
2600206-61 = "咦，啊……是，是嗎？"
2600206-62 = "其實我不只喜歡料理……也喜歡種植農作物。"
2600206-63 = "因為我的料理技術不成熟，沒辦法做出讓大家滿意的料理……"
2600206-64 = "既然如此，除了鑽研料理手藝外，也可以試著對食材有所講究。我是這麼想的。"
2600206-65 = "您想，好的食材就算沒有特別調理也很美味不是嗎？"
2600206-66 = "當然我並不是要放棄料理，但我覺得如果能栽培出美味的食材，最終一定能讓大家更開心的吧。"
2600206-67 = "[s]「……茱莉真了不起呢。」"
2600206-68 = "了，了不起……嗎？#n我反而覺得自己好像什麼都不擅長……"
2600206-69 = "正因為我的廚藝不純熟，才想為做出好的料理多盡一分心力……"
2600206-70 = "不是什麼值得被老師誇獎的事……"
2600206-71 = "那個……"
2600206-72 = "啊，現，現在不是說這些的時候了呢！"
2600206-73 = "為了防曬，我準備了這些……來，您請用！是草帽、袖套和防曬油！"
2600206-78 = "那麼老師，能麻煩您協助我嗎？"
2600206-81 = "― 啊，請看，老師！[wa:2560] "
2600206-84 = "― 這顆紅透的番茄，[wa:1360] "
2600206-85 = "― 不覺得看起來非常美味嗎？[wa:1720] "
2600206-88 = "― 耶嘿，這也是我身為供給部一員的成果。[wa:2960] "
2600206-89 = "― 誠心誠意栽培果然是值得的！[wa:3080] "
2600206-92 = "― 啊，那邊的番茄長得也很不錯……[wa:2840] "
2600206-95 = "[ns]「哪裡哪裡？」"
2600206-96 = "― 那個，就，就在，那邊，[wa:4280] "
2600206-97 = "― 那個……總覺得距離有點……？[wa:6040] "
2600206-100 = "― 這麼近的話，那個，我……[wa:5080] "
2600206-103 = "― （啊，老師的味道……）[wa:3600] "
2600206-104 = "― （總，總覺得心臟突然跳得很快……！？）[wa:6400] "
2600206-107 = "[ns]「茱莉，你的臉很紅哦，沒事吧？」"
2600206-108 = "― 沒，沒事的，是！請別擔心……！[wa:3500] "
2600206-111 = "― 只是該怎麼說呢？那個……[wa:5680] "
2600206-112 = "― 總覺得臉在發燙，那個……！唔……！[wa:8220] "
2600206-115 = "（之後的一段時間都在協助茱莉的農務，但是……）"
2600206-116 = "（平常無論做什麼事都很認真的茱莉，眼神少見地四處游移）"
2600206-117 = "[ns]「茱莉，真的沒事嗎……？」"
2600206-118 = "（為什麼呢，這股……心裡的悸動……）"
2600206-119 = "那個，身體應該是沒什麼問題……"
2600206-120 = "嗚……！"
2600206-121 = "不，不好意思！我去取個水……！"
2600206-126 = "（因為茱莉的狀態看起來確實沒什麼異常，於是便默默地處理農務等待茱莉回來，然而最終並沒有等到）"

[translation]
2600206-1 = "ถึงจะไม่ชำนาญ แต่ก็ทำได้นะ"
2600206-2 = "โรงอาหาร 8 เกเฮนน่า"
2600206-3 = "(เวลาผ่านมาจนถึงช่วงวันหยุดสุดสัปดาห์)"
2600206-4 = "(คุณครูมาที่โรงอาหารตามที่สัญญาไว้กับจูริ)"
2600206-10 = "ตายจริง มาแล้วเหรอคะคุณครู ฉันกำลังรออยู่เลยค่ะ!"
2600206-11 = "[s1] \"ขอโทษที่ทำให้รอนานนะ ว่าแต่ถืออะไรอยู่น่ะ?\"\n[s2] \"ถืออะไรอยู่ในมือเหรอ?\""
2600206-14 = "คะ? เอ่อ หมายถึงนี่เหรอคะ?"
2600206-19 = "ฮิฮิ เคียวกับพลั่ว แล้วก็ค้อนค่ะ...!"
2600206-20 = "[s] \"...แล้วเอามาทำไมเหรอ?\""
2600206-21 = "ก็จะเอาพลั่วมาขุด ขุด ขุด แล้วก็กลบ! ใช้เคียว ตัด ตัดตัด! แล้วก็ใช้ค้อนทุบปัง! ปัง! ไงล่ะคะ!"
2600206-22 = "อ๊ะ! อุปกรณ์ที่เตรียมไว้ไม่ได้มีแค่นี้หรอกนะคะ!"
2600206-23 = "ฉันยังเตรียมอุปกรณ์อื่นไว้อีกหลายๆ อย่างเลยค่ะ..."
2600206-28 = "คุณครูไม่ต้องห่วงเรื่องอุปกรณ์ไม่พอหรอกนะคะ!"
2600206-29 = "ภารกิจคราวนี้ ไว้ใจจูริได้เลยค่ะ!"
2600206-30 = "[s] \"เดี๋ยวๆๆ 'ภารกิจ' ที่พูดถึงนี่คืออะไร...?!\""
2600206-31 = "คะ? ก็เรื่อง..."
2600206-32 = "ตกแต่งแปลงผักไงล่ะคะ?"
2600206-34 = "(คุณครูเดินตามจูริไปที่ด้านหลังโรงอาหารเกเฮนน่า)"
2600206-35 = "(เมื่อไปถึงก็พบแปลงผักขนาดใหญ่)"
2600206-36 = "ฮุฮุ เป็นยังไงคะ? "
2600206-37 = "ที่นี่คือแปลงผักที่แสนภาคภูมิใจของชมรมโภชนาการของเราค่ะ!"
2600206-38 = "[s3] \"ว้าว... สุดยอดเลย\"\n[s4] \"ว่าแต่ว่าทำไมถึงมีแปลงผักอยู่ที่ด้านหลังโรงอาหารได้...?\""
2600206-41 = "ไม่ว่ายังไงชมรมโภชนาการของเราก็มักจะมีงบประมาณไม่พออยู่เสมอๆ เลยค่ะ มีหลายครั้งที่เราต้องเจอปัญหาเรื่องการจัดซื้อวัตถุดิบสำหรับทำอาหารกลางวัน..."
2600206-42 = "ถ้าทำแบบนี้... พวกเราก็สามารถเก็บวัตถุดิบทำอาหารจากสวนนี่ไปใช้ได้ค่ะ"
2600206-43 = "โดยเฉพาะดินของสถาบันเกเฮนน่านี่น่ะค่ะ~"
2600206-49 = "เขตเกเฮนน่ามีภูเขาไฟอยู่ใกล้ๆ ทำให้ดินมีแร่ธาตุอุดมสมบูรณ์มากค่ะ!"
2600206-50 = "ถ้าเอาเมล็ดมาปลูกแล้วหมั่นดูแลให้ดีละก็ จะได้ผลผลิตที่คาดไม่ถึงค่ะ...!"
2600206-56 = "ผลผลิตแสนอร่อยมากมายที่ทุกคนร่วมกันปลูก!"
2600206-57 = "ฮุฮุ สุดยอดเลยใช่มั้ยคะ?!"
2600206-58 = "[s5] \"อื้อ เรื่องนั้นก็สุดยอดเลยนะ\"\n[s6] \"จูริดูสนุกมากเลยนะ...\""
2600206-61 = "อ่า... อืม... ยะ...อย่างนั้นเหรอคะ?"
2600206-62 = "ฮิฮิ... ใช่ค่ะ เป็นอย่างที่คุณครูบอกเลยค่ะ ถึงการทำอาหารสนุกก็จริง แต่ฉันก็ชอบการดูแลแปลงผักมากๆ เลยค่ะ"
2600206-63 = "ฉันยังไม่เก่งพอที่จะทำอาหารอร่อยๆ จนทุกคนต้องตะลึงออกมาได้..."
2600206-64 = "เพราะงั้นก็เลยคิดว่า... \"ถ้างั้นก็มาตั้งใจปลูกวัตถุดิบอร่อยๆ กันเถอะ!\" ค่ะ"
2600206-65 = "วัตถุดิบดีๆ ถึงไม่นำไปปรุงอาหาร ก็มีความอร่อยในตัวอยู่ใช่มั้ยล่ะคะ?"
2600206-66 = "แน่นอนว่าฉันไม่ได้ล้มเลิกความคิดที่จะทำอาหารหรอกนะคะ แค่คิดว่าถ้าฉันปลูกผักอร่อยๆ ได้ ก็จะทำให้คนจำนวนมากมีความสุขได้ค่ะ!"
2600206-67 = "[s] \"อื้อ จูรินี่เก่งจังเลยน้า\""
2600206-68 = "คะ? เก่ง...งั้นเหรอคะ? มะ...มันก็แค่เรื่องธรรมดาๆ เองนะคะ?"
2600206-69 = "แค่คิดว่าควรพยายามในส่วนนี้เพื่อทดแทนฝีมือทำอาหารที่ยังอ่อนหัดอยู่..."
2600206-70 = "จะ...จู่ๆ คุณครูชมฉันแบบนี้..."
2600206-71 = "ฮือออ..."
2600206-72 = "อะ...เอาละค่ะ! ยะ...อย่ามัวรอช้าอยู่เลยค่ะ!"
2600206-73 = "กะ...ก่อนที่จะไปดูแลแปลงผัก ฉันเตรียมหมวกฟาง ปลอกแขน แล้วก็ครีมกันแดดไว้ให้คุณครูแล้วค่ะ เชิญใช้ได้เลยค่ะ!"
2600206-78 = "ถะ...ถ้างั้นตอนนี้เรามาเริ่มเลยดีมั้ยคะคุณครู?!"
2600206-81 = "― อ๊ะ ดูนี่สิคะคุณครู[wa:2120] "
2600206-84 = "― มะเขือเทศสีแดงสด[wa:1040] "
2600206-85 = "―ดูน่าอร่อยใช่มั้ยล่ะคะ?[wa:1320] "
2600206-88 = "― อ่ะแฮ่ม ทั้งหมดนี่ เป็นผลงานของชมรมโภชนาการค่ะ[wa:1840] "
2600206-89 = "― คุ้มค่าที่ประคบประหงมมาอย่างดีเลยค่ะ![wa:2120] "
2600206-92 = "― อ๊ะ มะเขือเทศที่อยู่ด้านนั้น ก็เหมือนจะสุกได้ที่แล้ว...[wa:1240] "
2600206-95 = "[ns] \"อ๊ะ? ไหนเหรอ?\""
2600206-96 = "― คือว่า เอ่อ...คือ... ทางนั้นค่ะ[wa:3480] "
2600206-97 = "― คือว่า... ทำไม...จู่ๆ...ถึงได้...?[wa:5240] "
2600206-100 = "― ถ้าเข้ามาใกล้แบบนี้...คือว่า... เอ่อ...[wa:4000] "
2600206-103 = "― (อ๊ะ กลิ่นของคุณครู...)[wa:3120] "
2600206-104 = "― (ทะ...ทำไมจู่ๆ ถึงได้ใจเต้นโครมครามแบบนี้กันนะ...!?)[wa:5080] "
2600206-107 = "[ns] \"หืม? จูริ หน้าแดงๆ นะ เป็นอะไรรึเปล่า?\""
2600206-108 = "― ฉะ...ฉันไม่เป็นไรค่ะ มะ...ไม่ต้องห่วงค่ะ...![wa:2340] "
2600206-111 = "― แต่จะว่ายังไงดีล่ะคะ...คือว่า...[wa:4880] "
2600206-112 = "― ไม่รู้ทำไมถึงรู้สึกร้อนๆ ที่หน้า เอ่อ...! คือว่า...![wa:6820] "
2600206-115 = "(ทำไมถึงตั้งหน้าตั้งตาแต่งสวนขนาดนั้นนะ)"
2600206-116 = "(จูริที่มักจะมีสมาธิอยู่เสมอเวลาทำอะไรบางอย่าง จู่ๆ ก็ดูลุกลี้ลุกลนขึ้นมา)"
2600206-117 = "[ns] \"นี่ จูริ...?\""
2600206-118 = "(กะ...ก็แค่ดูแลสวนแบบทุกวันแท้ๆ... แต่พอคุณครูเข้ามาอยู่ใกล้ๆ หะ...หัวใจก็เต้นโครมครามใหญ่เลย)"
2600206-119 = "คะ...คือว่า คือ...ฮือออ..."
2600206-120 = "ฮืออออ...?!"
2600206-121 = "คะ...คือ~! ฉันจะไปหยิบสายยางที่ใช้รดน้ำแปลงผักมาให้ค่ะ ขะ...ขอตัวสักครู่นะคะ-!"
2600206-126 = "(หลังจากนั้น ระหว่างรอจูริ คุณครูก็ดูแลแปลงผักคนเดียวพักใหญ่...)"

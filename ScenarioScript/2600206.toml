2600206-66 = "3;주리;09;물론 요리 쪽을 포기한 것은 아닙니다만, 맛있는 식재료를 기를 수 있으면 더더욱 많은 사람이 기뻐해 주시지 않을까~하고 생각했거든요!"
2600206-67 = "[s] \"응, 주리는 대단하네.\""
2600206-68 = "3;주리;02;네? 대단……한가요? 저, 저는 그냥 평범한걸요?\n#3;em;[?]"
2600206-69 = "3;주리;02;요리가 미숙한 만큼 이런 부분에서 노력하자고 생각했을 뿐이고……."

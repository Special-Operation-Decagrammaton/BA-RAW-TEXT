2600206-62 = "3;주리;99;후후……, 네에, 선생님의 말씀대로 요리도 요리지만, 전 이렇게 텃밭을 가꾸는 것도 무척 좋아해요."
2600206-63 = "3;주리;06;아무래도 전 아직 미숙하다 보니까, 모두가 한 입만 맛봐도 고개를 끄덕여줄 만큼 멋진 요리를 만들지는 못하지만……."
2600206-64 = "3;주리;05;그렇다면 좀 더 식재료를 더욱 신경 쓰자! 고 생각해서.\n#3;jump"

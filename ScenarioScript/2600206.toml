[translation]
2600206-1 = "Something Even a Beginner Can Do"
2600206-2 = "Gehenna Dining Hall No. 8"
2600206-3 = "Before I knew it, the weekend arrived."
2600206-4 = "I visited the Student Dining Hall, like I had promised Juri I would."
2600206-10 = "Oh, Sensei! I'm so glad you finally made it!"
2600206-11 = "[s1] \"Thank you for waiting. What's the plan?\"\n[s2] \"...What is all of that, Juri?\""
2600206-14 = "Oh, you mean all of this?"
2600206-19 = "Isn't it obvious? It's a shovel, a sickle, and a hammer!"
2600206-20 = "[s] \"Yes, but what do you plan on doing with those things...?\""
2600206-21 = "Well, to dig with the shovel like THUD, cut with the sickle like SWISH, and beat it with the hammer like BANG!"
2600206-22 = "Ah! Don't worry. These aren't the only tools we have."
2600206-23 = "I have all different kinds besides just these."
2600206-28 = "So, you don't have to worry about whether we'll have enough tools, Sensei."
2600206-29 = "Trust that School Lunch Club member Juri is on the job!"
2600206-30 = "[s] \"Wait, wait. What kind of 'job' are you going to do...?!\""
2600206-31 = "Oh. Isn't it obvious."
2600206-32 = "Gardening!"
2600206-34 = "I followed Juri to the back side of the Gehenna Student Dining Hall."
2600206-35 = "She led me to a large garden filled with many different kinds of food."
2600206-36 = "Heehee. Do you like it?"
2600206-37 = "This is the School Lunch Club's pride and joy: our garden!"
2600206-38 = "[s3] \"Wow… I'm amazed you grew all this.\"\n[s4] \"Why is there a garden like this behind the Dining Hall though?\""
2600206-41 = "Well, you see... The School Lunch Club is always working on a tight budget, and it can be hard to get enough food to make hundreds and hundreds of lunches for the students..."
2600206-42 = "So we've been trying to solve the problem by growing some of the ingredients ourselves!"
2600206-43 = "To make things even easier, there's a volcano right by Gehenna."
2600206-49 = "The soil in our region is very fertile because of it!"
2600206-50 = "We just plant the seeds, water and prune them as needed, and then ta-da! It's like magic!"
2600206-56 = "And now we can source the freshest garden-to-table vegetables and ingredients that we all worked together to grow!"
2600206-57 = "Heehee. Isn't it pretty incredible!"
2600206-58 = "[s5] \"Yeah, it's almost as incredible as you.\"\n[s6] \"You really light up while talking about this, Juri.\""
2600206-61 = "H-Huh?! R-Really? Do you think so?"
2600206-62 = "Heehee. I suppose you're right. Cooking will always have my whole heart, but I do love to garden as well."
2600206-63 = "I have a long way to go in my culinary journey... I still can't make an amazing dish that makes everyone go \"Yum!\" with just one bite..."
2600206-64 = "But I thought helping us find a way to source high-quality ingredients at an affordable cost was something I could do to contribute."
2600206-65 = "Really good ingredients are delicious even before they're cooked! That's what I wanted to bring to the School Lunch Club."
2600206-66 = "This doesn't mean I'm giving up on becoming a master chef! I just wanted to do what I could, right now, with the skills I currently have, to make the students happier and healthier."
2600206-67 = "[s] \"Yup. I was right. You're just incredible, Juri.\""
2600206-68 = "M-Me...?! Incredible? I-I'm just another normal student..."
2600206-69 = "I just wanted to do what I could to help, since I'm still a novice cook."
2600206-70 = "B-But for you to give me such a huge compliment, Sensei..."
2600206-71 = "W-Well...! What do I do?!"
2600206-72 = "I-It doesn't matter! We're here for a job!"
2600206-73 = "Let's get to gardening! Before we begin, I-I brought you a straw hat, arm sleeves, and sunscreen to protect you from the sun! Please be sure to use them."
2600206-78 = "Th-Then, shall we, Sensei?"
2600206-81 = "― Ah. Look, Sensei.[wa:2200] "
2600206-84 = "― That ripe tomato[wa:1040] "
2600206-85 = "― looks so delicious, doesn't it?[wa:960] "
2600206-88 = "― Heehee. This is all the result of everyone's hard work at the School Lunch Club.[wa:480] "
2600206-89 = "― Growing this garden was really worth it![wa:2000] "
2600206-92 = "― Oh, the tomatoes over there look really good too…[wa:1480] "
2600206-95 = "[ns] \"Huh? Where?\""
2600206-96 = "― Um, uh, it's over there, b-but...[wa:3400] "
2600206-97 = "― Aren't we really close right now…?[wa:5240] "
2600206-100 = "― If you're this close, then, uh, um…[wa:4160] "
2600206-103 = "― (Ah! Sensei's so close I can smell them…)[wa:2400] "
2600206-104 = "― (M-My heart is beating faster for some strange reason…!)[wa:4920] "
2600206-107 = "[ns] \"Juri... You're flushed. Are you too hot?\""
2600206-108 = "― I- I'm okay! P-Please don't worry…![wa:2700] "
2600206-111 = "― But, it's just that, you see... Um…[wa:4760] "
2600206-112 = "― My face feels so hot… Eek…![wa:7820] "
2600206-115 = "We were gardening together for quite some time."
2600206-116 = "Juri was usually very focused when doing tasks, but she seemed distracted and was fidgeting constantly."
2600206-117 = "[ns] \"Hey, Juri…?\""
2600206-118 = "(I garden like this all the time, but it's a different experience doing it by Sensei's side, with my heart beating out of my chest...)"
2600206-119 = "So, um... The thing is..! You see!"
2600206-120 = "H-Huh...?!"
2600206-121 = "Augh! I need space— I mean, water! We need water to water the plants! Y-Yes. I'll go get us some!"
2600206-126 = "I tended the garden by myself for a while after Juri scampered off in a hurry. She took a very long time getting back for some reason."

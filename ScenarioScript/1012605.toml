[translation]
1012605-1 = "突如其來的邀請"
1012605-2 = "（不久後，抵達了鹿江等待的錄音室）"
1012605-6 = "你來啦，老師。"
1012605-7 = "來……在那邊坐著吧。#n我會教你設備的使用方法。"
1012605-8 = "趁著這個機會，享受只屬於我們兩人的幸福時光吧。#n咿嘻嘻……"
1012605-9 = "[s]「只，只是要錄音吧？」"
1012605-10 = "嗯……？難道你還想做錄音以外的事嗎？"
1012605-11 = "……原來如此。"
1012605-12 = "沒關係……從請老師過來的那一刻起，我就做好覺悟了……"
1012605-13 = "老師一定能溫暖我冰冷的體溫吧。"
1012605-14 = "[ns1]（不禁冷汗直流……）\n[ns2]（得想辦法逃走才行）"
1012605-22 = "咿嘻嘻，不會讓你逃走的唷。"
1012605-23 = "[s]「你，你是什麼時候……！」"
1012605-24 = "老師你……究竟在想什麼呢？"
1012605-25 = "告訴我吧？跟我一起享受嘛？"
1012605-26 = "咿嘻……咿嘻嘻嘻……！"
1012605-27 = "[s3]「沒，沒什麼！」\n[s4]「我會乖乖照做的！」"
1012605-31 = "（……之後努力學習鹿江教的設備操作方法）"
1012605-32 = "（因而能夠完成簡單的錄音輔助工作了……）"
1012605-37 = "那麼，開始錄音吧。"
1012605-38 = "作為幫忙的回報……就讓你看看真正的我。"
1012605-43 = "― [log=카노에]老，老師……那個，在錄音之前……[/log][wa:4400] "
1012605-45 = "― [log=카노에]我想先告訴你一件事。[/log]"
1012605-48 = "― [log=카노에]其，其實……[/log][wa:750] "
1012605-50 = "― [log=카노에]我，有件事一直瞞著你……[/log][wa:1500] "
1012605-53 = "― [log=카노에]我，我呢……是個害羞的人，[/log][wa:2210] "
1012605-55 = "― [log=카노에]不太擅長說話。[/log]"
1012605-58 = "― [log=카노에]為了掩飾這點，[/log][wa:510] "
1012605-60 = "― [log=카노에]才會扮演陰沉的角色……[/log]"
1012605-63 = "― [log=카노에]之所以會接觸神秘學，[/log]"
1012605-65 = "― [log=카노에]也是因為想改變自己。[/log]"
1012605-68 = "― [log=카노에]知道這件事的……只有老師。[/log][wa:3310] "
1012605-70 = "― [log=카노에]所以……要替我保密哦？[/log][wa:1540] "
1012605-73 = "― [log=카노에]我，我相信老師唷……[/log][wa:4610] "
1012605-76 = "[ns]「這，這就是鹿江的真面目嗎……？」"
1012605-77 = "― [log=카노에]……咿嘻，咿嘻嘻。[/log][wa:1210] "
1012605-79 = "― [log=카노에]吶，你相信了嗎？[/log][wa:1390] "
1012605-82 = "― [log=카노에]老師你，喜歡可愛的東西對吧？[/log][wa:1840] "
1012605-85 = "― [log=카노에]那麼，應該……也喜歡我，對吧？[/log][wa:5690] "
1012605-87 = "― [log=카노에]咿嘻……！[/log]"
1012605-90 = "[ns]「鹿江！你耍我！鹿江！！」"
1012605-92 = "（……之後努力幫鹿江完成了錄音）"
1012605-93 = "（這次錄的是熱血運動題材的廣播劇CD）"
1012605-95 = "嗯，這樣就結束了。"
1012605-96 = "辛苦了，老師。你果然很可靠。"
1012605-97 = "[s]「我再次認識到鹿江的演技範圍真的很廣。」"
1012605-98 = "我還要更努力才行……"
1012605-99 = "對近期的聲優界而言，這種程度只是基本而已。"
1012605-100 = "就算是有前途的新人……也不能鬆懈。"
1012605-101 = "[s]「原來鹿江是追夢的少女啊。」"
1012605-105 = "嗯……我也有夢想……"
1012605-106 = "知道是什麼夢想嗎？"
1012605-107 = "[s]「成為有名的聲優？」"
1012605-108 = "雖然那也沒錯……但我其實還有個更大的夢想。"
1012605-109 = "那就是……"
1012605-122 = "……找回前世的羈絆。"
1012605-123 = "咿嘻，老師。你還是沒有想起來嗎？"
1012605-128 = "是我啊……雖然手很冰，內心卻很火熱的女人。"
1012605-132 = "喜歡神秘學，還特別受黑貓和烏鴉青睞的女人。"
1012605-138 = "就是我……！"
1012605-139 = "[s]「這，這我已經很清楚了……！！」"
1012605-141 = "（……之後把興奮的鹿江帶到附近的甜點咖啡廳安撫情緒）"
1012605-146 = "（也許是因為錄音時相當努力，他在補充糖分時看起來很滿足……）"

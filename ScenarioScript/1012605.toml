[translation]
1012605-1 = "Surprise Invitation"
1012605-2 = "A while later, I arrived at the recording room. Kanoe was waiting there for me."
1012605-6 = "You're here, Sensei."
1012605-7 = "Have a seat. I'll teach you how to use the equipment."
1012605-8 = "But first, let's just take a breath and enjoy this moment together. Just the two of us. Heehee..."
1012605-9 = "[s] \"W-We're just recording, right?\""
1012605-10 = "Oh, did you want to do more than that?"
1012605-11 = "...I see."
1012605-12 = "No worries, Sensei. I'm well-prepared for such things..."
1012605-13 = "You can warm up the cold in my body."
1012605-14 = "[ns1] \"(I'm breaking out in a cold sweat...)\"\n[ns2] \"(I need to get out of here...)\""
1012605-22 = "Eheehee, I'm afraid there's no escape."
1012605-23 = "[s] \"Wh-When did you...?!\""
1012605-24 = "Oh, what COULD you be thinking right now?"
1012605-25 = "Share it with me. Let's enjoy this together."
1012605-26 = "Heehee. Eheeheehee...!"
1012605-27 = "[s3] \"D-Don't worry about it!\"\n[s4] \"Just show me how to help you record!\""
1012605-31 = "I took careful notes while Kanoe taught me to use the equipment."
1012605-32 = "Thanks to that, I was able to help her get the recording done."
1012605-37 = "It seems we're ready. Shall we, then?"
1012605-38 = "As thanks for your help...I'll show you the truest side of myself."
1012605-43 = "― [log=카노에]Sensei. Um, before we start recording...[/log][wa:3440] "
1012605-45 = "― [log=카노에]...there's something I want you to know.[/log]"
1012605-48 = "― [log=카노에]Th-The thing is...[/log][wa:270] "
1012605-50 = "― [log=카노에]There's something I've been hiding from you...[/log][wa:140] "
1012605-53 = "― [log=카노에]I-I'm...very shy,[/log][wa:2050] "
1012605-55 = "― [log=카노에]and I'm not a good talker either.[/log]"
1012605-58 = "― [log=카노에]And in order to hide that,[/log][wa:10] "
1012605-60 = "― [log=카노에]I've been faking that gloomy personality.[/log]"
1012605-63 = "― [log=카노에]The reason I got into the occult...[/log]"
1012605-65 = "― [log=카노에]was because I wanted to change myself.[/log]"
1012605-68 = "― [log=카노에]The only person who knows the real me...is you, Sensei.[/log][wa:1630] "
1012605-70 = "― [log=카노에]So...would you please keep it a secret?[/log][wa:420] "
1012605-73 = "― [log=카노에]I-I trust you, Sensei, so...[/log][wa:3890] "
1012605-76 = "[ns] \"So this is who you really are, Kanoe?\""
1012605-77 = "― [log=카노에]...Heehee, eheehee.[/log][wa:810] "
1012605-79 = "― [log=카노에]Did you really fall for that,  Sensei?[/log][wa:190] "
1012605-82 = "― [log=카노에]...Sensei, you like cute things, right? [/log][wa:800] "
1012605-85 = "― [log=카노에]That means, you...also like me, right?[/log][wa:4770] "
1012605-87 = "― [log=카노에]Ehee...![/log]"
1012605-90 = "[ns] \"Come on. You tricked me!\""
1012605-92 = "...Afterwards, I went on helping with Kanoe's recording session."
1012605-93 = "What she recorded this time was a CD for a passionate sports drama."
1012605-95 = "Annnd I think that's a wrap!"
1012605-96 = "Thank you for the assistance, Sensei. I knew I could count on you."
1012605-97 = "[s] \"You really have a lot of range in your acting, Kanoe.\""
1012605-98 = "Maybe, but I still need to work harder..."
1012605-99 = "These days, in this industry, the range I have now is the bare minimum."
1012605-100 = "\"Prodigy\" or not...I need to stay on my toes."
1012605-101 = "[s] \"You're chasing your dreams.\""
1012605-105 = "True. I do have a dream."
1012605-106 = "Can you guess what it is?"
1012605-107 = "[s] \"Um, becoming a famous voice actress?\""
1012605-108 = "There is that...but there's something more."
1012605-109 = "I want to find..."
1012605-122 = "...my connections from my previous life."
1012605-123 = "Heehee, Sensei. Do you still not remember?"
1012605-128 = "The mysterious woman with cold hands and a warm heart..."
1012605-132 = "The woman followed by crows and black cats as she delves into the occult..."
1012605-138 = "That's me...!"
1012605-139 = "[s] \"I-I mean, I GET that, but...\""
1012605-141 = "To help Kanoe ease up, I took her to a nearby dessert cafe."
1012605-146 = "After the tension of the recording session, she satisfied herself with sweets."

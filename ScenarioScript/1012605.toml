[translation]
1012605-1 = "คำเชิญกะทันหัน"
1012605-2 = "(ไม่นานนัก คุณครูก็มาถึงห้องอัดเสียงของคาโนเอะ)"
1012605-6 = "มาแล้วเหรอ ครู"
1012605-7 = "เอ้า... นั่งตรงนั้นสิฉันจะสอนวิธีใช้อุปกรณ์ให้"
1012605-8 = "นี่เป็นโอกาสที่เราจะได้มีเวลาแห่งความสุขร่วมกันนะ ฮิฮิ..."
1012605-9 = "[s] \"คะ... แค่อัดเสียงก็พอใช่มั้ย?\""
1012605-10 = "หืม...? หรืออยากทำอย่างอื่นนอกจากอัดเสียงเหรอ?"
1012605-11 = "อย่างนี้นี่เอง..."
1012605-12 = "ไม่เป็นไร... ฉันเตรียมใจไว้ตั้งแต่เรียกครูมาแล้วละ..."
1012605-13 = "ถ้าเป็นครูละก็คงจะช่วยทำให้ร่างที่เย็นเฉียบของฉันอบอุ่นขึ้นได้"
1012605-14 = "[ns1] (เหงื่อแตกพลั่กๆ...)\n[ns2] (น่าจะต้องหาทางชิ่งแล้วละ)"
1012605-22 = "อิฮิฮิ ไม่มีทางหนีหรอกค่ะ"
1012605-23 = "[s] \"ตะ... ตั้งแต่เมื่อไรเนี่ย...!\""
1012605-24 = "ครู... คิดอะไรไปถึงไหนกันเนี่ย?"
1012605-25 = "บอกฉันหน่อยสิ เราจะได้สนุกด้วยกัน"
1012605-26 = "ฮิฮิ... อิฮิฮิฮิ...!"
1012605-27 = "[s3] \"มะ... ไม่มีอะไร!\"\n[s4] \"ครูจะตั้งใจทำตามที่บอกเลย!\""
1012605-31 = "(หลังจากนั้นคุณครูก็พยายามเรียนรู้วิธีใช้อุปกรณ์ตามที่คาโนเอะบอก)"
1012605-32 = "(เพราะงั้นจึงทำหน้าที่เป็นผู้ช่วยอัดเสียงได้อย่างดี...)"
1012605-37 = "งั้นมาเริ่มอัดเสียงกันเลยแล้วกัน"
1012605-38 = "และเพื่อตอบแทนที่มาช่วย... ฉันจะให้คุณได้เห็นตัวตนแท้จริงของฉัน"
1012605-43 = "― [log=카노에]คุณครู เอ่อ... ก่อนจะบันทึกเสียง...[/log][wa:3640] "
1012605-45 = "― [log=카노에]ฉันมีอะไรอยากให้ฟังก่อนน่ะ[/log]"
1012605-48 = "― [log=카노에]ทะ... ที่จริงแล้ว...[/log][wa:190] "
1012605-50 = "― [log=카노에]ฉันมีบางอย่างที่ปิดบังไว้อยู่น่ะ...[/log][wa:580] "
1012605-53 = "― [log=카노에]ฉัน... ฉันเป็นคนขี้อาย[/log][wa:1850] "
1012605-55 = "― [log=카노에]แถมพูดไม่ค่อยเก่งด้วย[/log]"
1012605-58 = "― [log=카노에]เลยแกล้งทำเป็น[/log][wa:230] "
1012605-60 = "― [log=카노에]นิสัยมืดมนเพื่อปกปิดเรื่องนั้นเอาไว้[/log]"
1012605-63 = "― [log=카노에]เรื่องที่หลงใหลในรหัสยศาสตร์...[/log]"
1012605-65 = "― [log=카노에]ก็เป็นเพราะฉันอยากเปลี่ยนตัวเอง[/log]"
1012605-68 = "― [log=카노에]คนที่เห็นด้านนี้ของฉัน... มีแค่คุณครูนะ[/log][wa:2270] "
1012605-70 = "― [log=카노에]เพราะงั้น... ช่วยเก็บเป็นความลับไว้ได้มั้ย[/log][wa:300] "
1012605-73 = "― [log=카노에]ฉะ... ฉะ... ฉันไว้ใจ คุณครูนะ...[/log][wa:3730] "
1012605-76 = "[ns] \"นะ... นี่คือตัวตนแท้จริงของคาโนเอะงั้นเหรอ...?\""
1012605-77 = "― [log=카노에]ฮิฮิ... อิฮิฮิ[/log][wa:1010] "
1012605-79 = "― [log=카노에]ครู... เชื่อรึเปล่า?[/log][wa:910] "
1012605-82 = "― [log=카노에]ครูน่ะชอบสิ่งของที่น่ารักๆ ใช่มั้ย? [/log][wa:960] "
1012605-85 = "― [log=카노에]งั้นครูก็คงจะชอบฉันด้วยสินะ?[/log][wa:5170] "
1012605-87 = "― [log=카노에]ฮิฮิ...![/log]"
1012605-90 = "[ns] \"คาโนเอะ หลอกครูสินะ! คาโนเอะ!!\""
1012605-92 = "(หลังจากนั้นคุณครูก็ช่วยคาโนเอะอย่างขมักเขม้น)"
1012605-93 = "(และเสียงที่อัดในครั้งนี้ก็คือดราม่า ซีดีกีฬาที่เต็มไปด้วยความรู้สึกร้อนแรง)"
1012605-95 = "อืม เท่านี้ก็เสร็จแล้วละ"
1012605-96 = "ขอบคุณที่มาช่วยนะครู เป็นคนที่พึ่งพาได้จริงๆ ด้วย"
1012605-97 = "[s]  \"คาโนเอะกว้างขวางเรื่องแสดงมากๆ เลยนะเนี่ย\""
1012605-98 = "ถึงยังไงฉันก็ต้องพยายามให้มากขึ้น..."
1012605-99 = "สมัยนี่การทำเรื่องแบบนี้ถือเป็นเรื่องพื้นฐานในวงการนักพากย์น่ะ"
1012605-100 = "ถึงทุกคนจะเรียกฉันว่าดาวรุ่ง... แต่ก็ประมาทไม่ได้หรอก"
1012605-101 = "[s] \"คาโนเอะกำลังไล่ตามความฝันอยู่สินะ\""
1012605-105 = "อื้อ... ฉันก็มีความฝันเหมือนกัน..."
1012605-106 = "รู้มั้ยว่าความฝันนั้นคืออะไร?"
1012605-107 = "[s] \"ฝันว่าอยากเป็นนักพากย์ชื่อดัง?\""
1012605-108 = "เรื่องนั้นก็ใช่... แต่ฉันมีความฝันที่ยิ่งใหญ่กว่านั้นด้วย"
1012605-109 = "นั่นก็คือ..."
1012605-122 = "การฟื้นคืนสายสัมพันธ์ในชาติก่อน"
1012605-123 = "ฮิฮิ ครู... ยังจำไม่ได้ใช่มั้ย?"
1012605-128 = "ฉันน่ะ... ถึงอุณหภูมิที่มือจะเย็นแค่ไหน แต่เป็นหญิงสาวที่มีจิตใจอบอุ่นนะ..."
1012605-132 = "หญิงสาวที่หลงใหลในเรื่องรหัสยศาสตร์ผู้ถูกฝูงแมวและอีกาตามติด"
1012605-138 = "ก็คือฉันเอง...!"
1012605-139 = "[s] \"ระ... เรื่องนั้นครูรู้แล้ว...!!\""
1012605-141 = "(หลังจากนั้นคุณครูก็พาคาโนเอะไปคาเฟ่ขนมหวานที่อยู่ใกล้ๆ เพื่อให้เธอผ่อนคลาย...)"
1012605-146 = "(อาจเพราะความเครียดตอนอัดเสียง ทำให้พอได้เติมน้ำตาลเธอก็ดูมีความสุขมาก)"

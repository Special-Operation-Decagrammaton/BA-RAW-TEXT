[translation]
1007202-1 = "ปฏิบัติการหาเสบียงในทะเล 1"
1007202-3 = "(หลังได้รับข้อความจากซากิ คุณครูก็เตรียมอุปกรณ์ตกปลาแล้วออกมาที่ท่าเรือ)"
1007202-6 = "อ๊ะ คุณครู ทางนี้ๆ"
1007202-7 = "เตรียมอุปกรณ์ที่บอกมาแล้วใช่มั้ย?"
1007202-11 = "กระชอนตักปลากับมีดพก แล้วก็กระชังใส่ปลา..."
1007202-12 = "อื้ม เท่านี้ก็คงพร้อมแล้วละ!"
1007202-13 = "ถ้างั้นขอฉันวอร์มร่างกายก่อนแล้วกันนะ"
1007202-14 = "[s] \"เดี๋ยวจะทำอะไรต่องั้นเหรอ...?\""
1007202-15 = "ฉันบอกไปแล้วนี่ ว่าจะไปหาอาหารทะเลน่ะ?"
1007202-16 = "เมื่อกี้ฉันไปขออนุญาตจากคนในหมู่บ้านมาแล้วละ"
1007202-17 = "[s] \"ขออนุญาต...?\""
1007202-18 = "อื้อ คนในหมู่บ้านคอยดูแลสัตว์ทะเลในแถบนี้อยู่ ถ้าคนนอกเข้าไปจับโดยไม่ขออนุญาต จะถือว่าผิด#nกฎหมายน่ะ"
1007202-19 = "เพราะงั้นเมื่อกี้เลยไปขออนุญาตหัวหน้าหมู่บ้านว่าจับสัตว์ทะเลมาทำเป็นมื้อเย็นก่อนน่ะ เขาบอกว่าให้#nจับไปได้เท่าที่ต้องการเลยด้วยละ"
1007202-20 = "ยอมให้จับปลาที่ดูแลได้ฟรีๆ แบบนี้... เป็นคนใจกว้างจริงๆ เลยนะ"
1007202-21 = "คุณครู อยากกินปลาอะไรเป็นพิเศษหรือเปล่า?"
1007202-22 = "ไหนๆ ก็ได้รับอนุญาตแล้ว ฉันจะไปจับปลามาให้ เพื่อตอบแทนที่คอยช่วยเหลือกันไงล่ะ"
1007202-23 = "ปกติถ้าไปกินที่ร้านอาหาร พวกปลากระพงขาวหรือปลากระพงแดงจะมีราคาแพงมาก แต่ตอนนี้ถ้า#nเราจับเองได้ ก็จะได้กินฟรีๆ..."
1007202-24 = "[s] \"ดำน้ำจับปลาได้แน่เหรอ?\""
1007202-25 = "อะไรกัน... ไม่เชื่อใจฝีมือฉันหรือยังไง?"
1007202-26 = "เมื่อก่อนตอนที่อยู่ที่สถาบัน SRT ฉันเคยสอบใบอนุญาตนักดำน้ำของสมาคมดำน้ำคิโวทอสได้ระดับ#nมาสเตอร์เลยนะ"
1007202-27 = "สำหรับนักดำน้ำระดับมาสเตอร์ที่พร้อมรับมือกับสถานการณ์ฉุกเฉินในระดับน้ำลึกแล้ว การจับปลา#nแค่นี้ถือเป็นเรื่องง่ายๆ"
1007202-28 = "[s] \"นักเรียนของ SRT นี่สุดยอดเลยนะ...\""
1007202-30 = "[ns1] \"ครูเป็นคนกินง่ายๆ น่ะ ปลาอะไรก็ได้\"\n[ns2] \"จับมาเท่าที่ทำได้ก็พอ อย่าฝืนล่ะ\""
1007202-33 = "ชิ... ไม่ไหวเลย..."
1007202-37 = "เข้าใจแล้ว ถ้างั้นเดี๋ยวฉันมานะ!"
1007202-48 = "(ผ่านไปสักพักใหญ่...)"
1007202-54 = "เฮ้อ... ไม่ได้ดำน้ำมานาน สนุกเหมือนเดิมเลยนะ"
1007202-58 = "เอ้า รับไปสิ ฉันเก็บพวกของที่เก็บง่ายๆ มาก่อนน่ะ"
1007202-59 = "[s] \"นี่มันสาหร่ายเคลป์นี่นา\""
1007202-60 = "อื้อ มีอยู่แถวนี้เยอะเลย"
1007202-61 = "สาหร่ายเคลป์เป็นหนึ่งในวัตถุดิบปรุงรสชั้นดี ถ้าเอาห่อปลาดิบก็จะยิ่งช่วยดึงความอร่อยของ#nเนื้อปลาออกมาได้ดีขึ้น พวกร้านอาหารหรูๆ เลยนิยมใช้กันน่ะ"
1007202-62 = "ลงไปเก็บครั้งแรกถือว่าได้ของดีมาเลยนะ"
1007202-66 = "ถ้างั้น... เดี๋ยวฉันมานะ!"
1007202-77 = "(หลังจากนั้นก็ผ่านไปสักพักใหญ่...)"
1007202-82 = "...ฮู่ว ง่ายกว่าที่คิดอีกแฮะ"
1007202-86 = "เอ้า รับไปสิ คราวนี้ฉันก็เก็บมาได้เยอะเลยละ"
1007202-87 = "[s] \"นี่มัน... สาหร่ายมาโครนี่นา?\""
1007202-88 = "ใช่ สาหร่ายมาโครเป็นวัตถุดิบที่อุดมไปด้วยธาตุเหล็กและแคลเซียม แถมยังเป็นวัตถุดิบที่เอาไปทำ#nอาหารได้หลายชนิดด้วย"
1007202-89 = "อีกอย่างเวลาเอาไปตากแห้งก็จะมีขนาดเล็กลง 10 เท่าเลย ทำให้จัดเก็บได้ง่ายมาก"
1007202-90 = "อีกไม่นานก็ต้องกลับไปที่โคะอุซางิ การ์เด้น ก็เลยคิดว่าเก็บอาหารทะเลมาไว้เยอะๆ น่าจะดีกว่าน่ะ..."
1007202-94 = "ถะ... ถ้างั้นคราวนี้ฉันจะไปจับปลามาให้แล้วกัน...!"
1007202-96 = "(อีกสักครู่ต่อมา...)"
1007202-101 = "...เอ้า รับไปสิ"
1007202-102 = "[s] \"นี่มันสาหร่ายเขากวาง...?\""
1007202-103 = "สาหร่ายเขากวางไม่มีรสชาติอะไรพิเศษ แต่ว่าถ้าเอาไปต้มจะสกัดวุ้นออกมาได้..."
1007202-104 = "ถ้าเอาไปทำให้สุกก็น่าจะเอามากินแทนพุดดิ้งได้นะ...?"
1007202-105 = "[s3] \"เอ่อ... ขอโทษที่ขัดตอนกำลังจริงจังนะ...\"\n[s4] \"ทำไมถึงมีแต่พืชทะเลทั้งนั้นเลยล่ะ...?\""
1007202-108 = "มะ...ไม่ได้ตั้งใจจะทำแบบนี้สักหน่อย?!"
1007202-109 = "อีกอย่างสาหร่ายไม่ใช่พืชทะเลสักหน่อย เป็นสาหร่ายต่างหากเล่า! อย่าเข้าใจผิดสิ!"
1007202-110 = "ฉันไม่ได้ดำน้ำมานาน... ร่างกายยังไม่ชินดีก็เลยเลือกเก็บแต่ของที่เก็บง่ายๆ มาก่อนก็แค่นั้นเอง"
1007202-111 = "ตะ...แต่ว่าคราวนี้แหละ ฉันจะจับปลากะพงตัวใหญ่ๆ มาให้เอง!"
1007202-116 = "(หลังจากนั้นก็ผ่านไปพักใหญ่...)"
1007202-123 = "...กลับมาแล้ว"
1007202-127 = "อืม... คราวนี้ฉันจับอย่างอื่นมาได้น่ะ..."
1007202-131 = "[ns5] \"คือว่าขอโทษนะซากิ... มันไม่น่าจะกินได้นะ\"\n[ns6] \"ครูว่าดาวทะเลมันกินไม่ได้นะ...\""
1007202-134 = "ระ...รู้อยู่แล้วละน่า!"
1007202-135 = "ฉันเก็บมาเพราะมันสีสวยดีต่างหาก!"
1007202-136 = "เพราะงั้นคุณครู..."
1007202-141 = "...ขอโทษนะ คงจะไปหาอาหารทะเลด้วยมือเปล่าไม่ได้แล้วแหละ"
1007202-142 = "ถึงฉันจะเคยมีประสบการณ์ยิงปืนหรือใช้ดินระเบิดในน้ำมาก่อน แต่ก็ยังไม่เคยจับปลามาก่อนเลย..."
1007202-143 = "ไม่คิดว่าพวกปลามันจะว่ายหนีได้เร็วขนาดนั้น..."
1007202-144 = "สะ...สุดท้ายก็จับปลาตัวใหญ่ๆ ไม่ได้เลยสักตัว"
1007202-145 = "[s7] \"อย่าคิดมากเลยนะ\"\n[s8] \"ถ้างั้นเราไปซื้อปลาที่ตลาดกันเถอะ\""
1007202-150 = "ทำแบบนั้นไม่ได้นะ!"
1007202-151 = "ฉันบอกไว้แล้วนี่ว่าจะจับปลาตัวใหญ่ๆ มาให้คุณครูเอง แล้วจะให้ไปซื้อปลาที่ตลาดได้ยังไง..."
1007202-152 = "ทำแบบนั้นก็เสียศักดิ์ศรีนักดำน้ำระดับมาสเตอร์กันพอดี..."
1007202-156 = "ถ้าเป็นแบบนี้ละก็ ใช้ปืนยิงแล้วจับมาเลยดีกว่า...!"
1007202-160 = "[ns] \"ซากิ รอเดี๋ยว—\""
1007202-167 = "[ns] \"...จับปลาได้มั้ย?\""
1007202-168 = "ฉันจับปลาได้แล้วละ แต่ว่า..."
1007202-172 = "ปลามันโดนกระสุน... จนพรุนไปทั้งตัวเลย..."
1007202-173 = "แบบนี้คงเอาไปทำอาหารไม่ได้แล้วสินะ...?"
1007202-174 = "[s] \"ก็คงงั้น...\""
1007202-176 = "[ns] \"เย็นมากแล้ว เอาสาหร่ายที่เก็บมาไปทำอาหารกันเถอะ\""
1007202-180 = "...ก็ได้"
1007202-181 = "แต่ว่าคราวหน้า ฉันจะจับปลาสดๆ มาให้คุณครูให้ได้เลย...!"
1007202-183 = "(จากนั้น คุณครูกับซากิก็กลับไปที่พักและนำสาหร่ายที่เก็บมาได้มาทำซุปสาหร่ายกิน...)"
1007202-184 = "(ถึงจะเป็นแค่ซุปสาหร่ายธรรมดาๆ แต่ก็รสชาติเข้มข้นถูกปาก จนคุณครูเผลอกินไปเยอะมากๆ...)"

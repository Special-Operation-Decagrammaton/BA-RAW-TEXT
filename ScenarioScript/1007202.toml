[translation]
1007202-1 = "水中補給作戰（１）"
1007202-3 = "（接到咲希的聯絡後，帶著漁具前往了碼頭）"
1007202-6 = "老師，我在這裡。"
1007202-7 = "請你帶的裝備都有帶來了嗎？"
1007202-11 = "撈網、瑞士刀，還有用來裝魚的圓籠……"
1007202-12 = "好，這樣就湊齊了。"
1007202-13 = "我做個暖身運動，稍微等我一下。"
1007202-14 = "[s]「那個，你打算做什麼……？」"
1007202-15 = "我之前不是說過了嗎？#n難得到海邊來所以要抓魚。"
1007202-16 = "我剛從村民那邊獲得了採集許可。"
1007202-17 = "[s]「採集許可……？」"
1007202-18 = "沒錯。海產是由漁村來管理的。#n未經許可不能擅自採集。"
1007202-19 = "所以我剛才去詢問能不能讓我們捕撈一些海產當晚餐，對方爽快地答應了。"
1007202-20 = "真是群好心人呢。#n明明管理漁場相當不容易的說……"
1007202-21 = "話說回來，老師有什麼想吃的魚嗎？"
1007202-22 = "平時總是受你照顧……今天就幫你抓些魚順便當成謝禮吧。"
1007202-23 = "就算是在餐廳裡因為太貴不敢吃的鯛魚，只要抓到都能免費吃啊！"
1007202-24 = "[s]「你打算徒手浮潛抓魚嗎……？」"
1007202-25 = "什麼，老師在懷疑我的實力嗎？"
1007202-26 = "以前在SRT學園的時候，#n我可是為了因應海洋作戰取得了奇普托斯海洋潛水員協會的名仕潛水員資格哦。"
1007202-27 = "能夠處理水下的緊急狀況才能稱得上是名仕潛水員。#n抓個一兩隻魚簡直就是小菜一碟。"
1007202-28 = "[s]「SRT的隊員果然很厲害呢……」"
1007202-30 = "[ns1]「不過我沒有特別的喜好……」\n[ns2]「所以這附近的魚就可以囉。注意安全。」"
1007202-33 = "老師還真是無欲無求呢……算了，無所謂。"
1007202-37 = "期待著等我回來吧！"
1007202-48 = "（幾分鐘後……）"
1007202-54 = "呼……好久沒潛水了，果然還是很開心。"
1007202-58 = "總之先收下這個吧。"
1007202-59 = "[s]「是昆布呢，看起來真好吃。」"
1007202-60 = "是啊，這附近長了很多哦。"
1007202-61 = "昆布雖然常被用於煮高湯，但其實還有很多用法。#n用昆布包裹生魚片的話，除了肉質會更加緊實之外還能增添風味。#n是高級餐廳也經常使用的調理方式。"
1007202-62 = "嘛，以最初的收穫來說還算不錯吧。"
1007202-66 = "那麼……我再去一趟！"
1007202-77 = "（接著又過了幾分鐘……）"
1007202-82 = "……哈啊，本來不該是這樣的。"
1007202-86 = "……來，給你。"
1007202-87 = "[s]「……海帶？」"
1007202-88 = "嗯，海帶富含鐵質和鈣質，是能用於多種料理的萬能食材。"
1007202-89 = "由於乾燥後體積會縮小，在保存和流通方面也很方便。"
1007202-90 = "把這種便於保存的海產帶回兔寶寶公園好像也不錯……"
1007202-94 = "沒，沒問題的！下次一定會抓魚回來……！"
1007202-96 = "（過了一會……）"
1007202-101 = "……老師。"
1007202-102 = "[s]「石花菜……？」"
1007202-103 = "石花菜可以做為心太跟寒天的材料。"
1007202-104 = "當然要直接吃也可以。#n聽說不只熱量低，對美容跟健康也有幫助。"
1007202-105 = "[s3]「雖然那也很讓人好奇……」\n[s4]「不過從剛才開始好像全都是海草……？」"
1007202-108 = "我，我也不想這樣啊！？"
1007202-109 = "還有那些不是海草，是海藻！別搞錯了！"
1007202-110 = "實在是很久沒潛水了，還沒恢復全力……#n所以才會先採附近的東西……"
1007202-111 = "下，下次一定會抓一隻大鯛魚回來的！"
1007202-116 = "（於是，等了數十分鐘後……）"
1007202-123 = "…………我回來了。"
1007202-127 = "……這次不是海藻。"
1007202-131 = "[ns5]「咲希……」\n[ns6]「再怎麼說海星也不能吃吧……？」"
1007202-134 = "我，我當然知道！"
1007202-135 = "只是因為顏色很好看，所以想讓老師也看看而已！"
1007202-136 = "至於魚的部分……"
1007202-141 = "……抱歉。徒手浮潛抓魚果然還是沒辦法。"
1007202-142 = "我雖然有在水中處理炸彈、發射子彈的經驗，#n卻從來沒有抓過魚……"
1007202-143 = "我都不知道魚竟然那麼敏捷。"
1007202-144 = "別說鯛魚了，連條小魚都沒抓到……"
1007202-145 = "[s7]「不用在意。」\n[s8]「去附近的市場買點魚回去吧。」"
1007202-150 = "絕對不行！"
1007202-151 = "都誇下海口要捕條大魚回來，居然還得從市場買……"
1007202-152 = "我名仕潛水員的名號會哭泣的！"
1007202-156 = "事到如今，哪怕要開槍我也……！"
1007202-160 = "[ns]「咲希，等等──！」"
1007202-167 = "[ns]「……所以，抓到魚了嗎？」"
1007202-168 = "抓是抓到了……"
1007202-172 = "但魚……開了個洞……"
1007202-173 = "這個狀態應該沒辦法吃了吧……？"
1007202-174 = "[s]「好像，是呢……」"
1007202-176 = "[ns]「時候也不早了，今天就吃咲希採回來的海藻吧。」"
1007202-180 = "……我知道了。"
1007202-181 = "不過下次我一定會讓你吃到我抓回來的魚的……！"
1007202-183 = "（之後，回到住處將海帶和昆布煮成湯來吃）"
1007202-184 = "（或許是因為湯頭過於鮮美，不小心就吃太多了……）"

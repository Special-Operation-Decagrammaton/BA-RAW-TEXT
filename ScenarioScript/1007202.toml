1007202-18 = "2;사키 수영복;02;응. 보통 해산물은 어촌 마을 사람들이 관리하고 있으니까, 외지인이 허가 없이 해산물을 채취하는 건 불법이거든."
1007202-19 = "2;사키 수영복;99;그래서 아까 촌장님께 저녁 식사에 쓸 해산물을 조금 채취해도 괜찮냐고 물어봤는데, 원하는 만큼 마음껏 가져가도 괜찮다고 하더라고.\n#2;em;…"

[translation]
1007202-1 = "Underwater Supply Operation 1"
1007202-3 = "After receiving word from Saki, I grabbed my fishing gear and headed to the dock."
1007202-6 = "Sensei! Over here."
1007202-7 = "You brought everything I asked for?"
1007202-11 = "Fishing net... Pocket knife... A net..."
1007202-12 = "Yes, this will do!"
1007202-13 = "Just let me warm up before I get into the water."
1007202-14 = "[s] \"Sure, but what are you going to do in there?\""
1007202-15 = "Didn't I tell you? We're gathering provisions."
1007202-16 = "The villagers said I can keep any fish that we catch."
1007202-17 = "[s] \"So... fishing?\""
1007202-18 = "Right. This stretch of sea belongs to the village. It would be illegal for us to take their fish without permission."
1007202-19 = "That's why I asked the person in charge if we could catch some for our dinner, and he gave me the go-ahead."
1007202-20 = "We're lucky they're so generous, sharing their fishing ground like this."
1007202-21 = "Sensei, is there any particular fish you want to eat?"
1007202-22 = "I want to thank you for coming out to help me today."
1007202-23 = "Something like a sea bass or a snapper is expensive at a restaurant, but it's free if we catch it ourselves..."
1007202-24 = "[s] \"Can you really catch anything by jumping into the water?\""
1007202-25 = "Are you questioning my skills?"
1007202-26 = "Back at the academy, I earned my certification as a master diver in amphibious combat training."
1007202-27 = "I'm a deadly combatant in the water. Catching a little fish will be a piece of cake."
1007202-28 = "[s] \"You SRT students are amazing...\""
1007202-30 = "[ns1] \"But I'm not picky.\"\n[ns2] \"Don't stress yourself out. Just get whatever's easy to catch.\""
1007202-33 = "Hmph. How boring..."
1007202-37 = "Have it your way. I'll be back soon!"
1007202-48 = "A few minutes pass..."
1007202-54 = "Wow... It's been a while since I went diving."
1007202-58 = "Here. I've already caught something."
1007202-59 = "[s] \"This is kelp.\""
1007202-60 = "Well, there is a lot of it around here..."
1007202-61 = "And kelp is a high-end ingredient! Expensive restaurants wrap their sashimi in kelp while they age it, allowing it to develop a more intense flavor."
1007202-62 = "Not bad for a first dive."
1007202-66 = "Now... Back in I go!"
1007202-77 = "Another few minutes pass..."
1007202-82 = "...This is tougher than I expected."
1007202-86 = "Here. Take it. I got plenty..."
1007202-87 = "[s] \"Aaand...this is seaweed.\""
1007202-88 = "For your information, seaweed is rich in iron and calcium, and it can be used in all kinds of dishes."
1007202-89 = "It's also easy to store, since it shrinks to a tenth its normal size when you dry it."
1007202-90 = "I should gather some more to keep as rations for when we return to Kousagi Park..."
1007202-94 = "Okay. I'm going to catch some actual fish this time!"
1007202-96 = "A little while later..."
1007202-101 = "Here. Take this."
1007202-102 = "[s] \"This is...red algae?\""
1007202-103 = "Red algae, also called agar-agar, is not very flavorful, but when you boil and strain it, it solidifies into a jelly-like substance...!"
1007202-104 = "We can cook it, and use it as...a substitute for pudding...?"
1007202-105 = "[s3] \"You certainly know your seaweeds...\"\n[s4] \"I'm seeing a pattern here.\""
1007202-108 = "It's not like I'm doing this on purpose!"
1007202-109 = "Kelps and seaweeds are edible, aren't they? This is important work!"
1007202-110 = "I haven't dived in ages, so I'm rusty! I'm gathering the easy stuff first! As a warm-up!"
1007202-111 = "N-Next time, I'll catch a sea bass! A huge one!"
1007202-116 = "Some time later..."
1007202-123 = "I'm back..."
1007202-127 = "Well... It's not seaweed this time..."
1007202-131 = "[ns5] \"That's a starfish.\"\n[ns6] \"I don't think you can eat that...\""
1007202-134 = "I-I know!"
1007202-135 = "I just thought it was pretty!"
1007202-136 = "As for the fish I promised you..."
1007202-141 = "I'm sorry. They keep slipping out of my hands."
1007202-142 = "I've set off explosives and shot guns underwater before, so I thought catching a few stupid fish would be simple..."
1007202-143 = "But they're so fast. And slimy."
1007202-144 = "I thought I'd bag a huge fish, no problem. But I couldn't even catch a minnow..."
1007202-145 = "[s7] \"Don't sweat it. Let me treat you to some sashimi.\"\n[s8] \"We could just pick some up at the fish market?\""
1007202-150 = "No way!"
1007202-151 = "I promised you fresh fish. You can't settle for something store-bought after that..."
1007202-152 = "I'll never live it down as a master diver!"
1007202-156 = "That's it. I'm taking my gun with me on this dive!"
1007202-160 = "[ns] \"Saki, wait—\""
1007202-167 = "[ns] \"...So. How'd it go?\""
1007202-168 = "I got one, but..."
1007202-172 = "Now it has a huge hole in it."
1007202-173 = "I don't think we can cook and eat it like this..."
1007202-174 = "[s] \"I guess not.\""
1007202-176 = "[ns] \"It's getting late. I'm sure we can whip something up with all this seaweed.\""
1007202-180 = "...Fine."
1007202-181 = "But next time, I'm catching you those fish, Sensei!"
1007202-183 = "We headed back and made a big pot of soup."
1007202-184 = "Even though the only ingredients were seaweed and kelp, it tasted much better than I expected. In fact, I ate a little too much..."

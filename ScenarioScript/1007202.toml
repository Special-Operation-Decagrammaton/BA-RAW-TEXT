1007202-21 = "2;사키 수영복;02;선생님, 뭔가 먹고 싶은 생선이라도 있어?"
1007202-22 = "2;사키 수영복;07;모처럼 채취 허가를 받았으니 평소의 도움에 보답할 겸, 내가 직접 잡아다 줄게.\n#2;em;[반짝]\n#2;hophop"
1007202-23 = "2;사키 수영복;03;평상시에는 엄두조차 내지 못하는 돔이나 다금바리 같은 비싼 생선이라도 직접 잡으면 공짜나 다름없으니까……"

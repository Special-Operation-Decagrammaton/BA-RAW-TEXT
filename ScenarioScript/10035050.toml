[translation]
10035050-1 = "ตอนที่ 5;ไม่เห็นสัตว์ประหลาดเลยค่ะ..."
10035050-3 = "อ่า~ ฮัลโหลๆ ขอให้ลูกค้าที่อยู่ในสระคลื่นรีบออกมาจากสระก่อนค่ะ~"
10035050-4 = "อย่าผลักกันนะคะ รักษาความปลอดภัยด้วย"
10035050-5 = "เกิดเรื่องอะไรน่ะเหรอคะ คือว่า..."
10035050-6 = "อืม บอกตามตรงว่าฉันก็ไม่แน่ใจเหมือนกัน..."
10035050-7 = "เอาเป็นว่า รีบหนีออกมาก่อนเถอะ~"
10035050-13 = "อ๊าย!"
10035050-14 = "ยะ... อย่าผลักกันสิคะ! ค่อยๆ อพยพกันไปนะคะ!"
10035050-15 = "ความปลอดภัยสำคัญที่สุดนะคะ..."
10035050-19 = "ว้าย!"
10035050-24 = "ทุกคนขึ้นจากน้ำให้หมด!"
10035050-25 = "อพยพออกจากพื้นที่อย่างเป็นระเบียบ!"
10035050-27 = "มีเรื่องอะไรเหรอ? ทำไมถึงอพยพคนออกไปล่ะ?"
10035050-28 = "ไม่รู้สิ! แต่ดูเป็นเรื่องเร่งด่วนนะ!"
10035050-29 = "งั้นก็ช่วยอพยพคนก่อน!"
10035050-33 = "สต็อป! สต็อป!"
10035050-34 = "พวกคุณทำอะไรกันครับเนี่ย?"
10035050-35 = "ยังไม่ทันจะได้รายงานว่าเกิดอะไร แต่ไล่ลูกค้าออกจากสระแล้วเนี่ยนะ!"
10035050-36 = "เกิดอุบัติเหตุฉุกเฉินอะไรงั้นเหรอครับ?"
10035050-38 = "อ๊ะ! หัวหน้าสวนน้ำ!"
10035050-39 = "ไม่ใช่อย่างนั้นนะคะ! ไม่ใช่อุบัติเหตุค่ะ แต่ว่ามีความเสี่ยงที่จะเกิดอันตรายได้...!"
10035050-40 = "ผมอุตส่าห์วางใจที่ได้คนจากวัลคิรี่... เดี๋ยวนะ มีความเสี่ยงที่จะเกิดอันตรายงั้นเหรอครับ?"
10035050-41 = "เกิดปัญหาอะไรกับอุปกรณ์สร้างคลื่นเหรอครับ?"
10035050-42 = "หรือว่ามีสัญญาณเตือนภัยจากเครื่องตรวจมลพิษทางน้ำ?"
10035050-43 = "คือว่า..."
10035050-44 = "ฟุบุกิ ฉันจะรายงานเอง"
10035050-45 = "ฉันโอกาตะ คันนะ ปัจจุบันรับหน้าที่ไลฟ์การ์ดตามคำสั่งส่งตัวของสถาบันฝึกตำรวจวัลคิรี่ค่ะ"
10035050-46 = "วันนี้เวลา 11:20 น. ฉันพบสัตว์ประหลาดที่ระบุตัวตนไม่ได้ในสระคลื่น"
10035050-47 = "ฉันห่วงว่าจะส่งผลกระทบต่อความปลอดภัยของลูกค้าที่มาใช้บริการสระคลื่น จึงสั่งอพยพคนอย่างหลีกเลี่ยงไม่ได้ค่ะ"
10035050-48 = "สัตว์ประหลาดงั้นเหรอ?"
10035050-49 = "โธ่เอ๊ย แล้วมันรูปร่างหน้าตาเป็นยังไงครับ?"
10035050-50 = "มันอยู่ในน้ำ ฉันก็เลยมองเห็นมันไม่ชัด..."
10035050-51 = "แต่มันปากใหญ่ ขาทั้ง 4 อ้วนหนา และส่วนลำตัวดูแข็งแรง"
10035050-52 = "สัตว์ที่คล้ายมันมากที่สุดก็คือ..."
10035050-53 = "คิดว่าเป็นจระเข้ค่ะ"
10035050-55 = "จระเข้เรอะ?"
10035050-59 = "ในสวนน้ำจะไปมีจระเข้ได้ยังไงกันเล่า!"
10035050-61 = "เฮือก!"
10035050-62 = "ไม่พูดสุภาพกับเราแล้วเหรอ"
10035050-64 = "ที่นี่ไม่ใช่ชายหาดหรือแม่น้ำนะ ที่นี่เป็นแค่สวนน้ำเท่านั้น!"
10035050-65 = "อย่าว่าแต่จระเข้เลย ปลาทองสักตัวก็ไม่มี!"
10035050-66 = "ฉันอุตส่าห์คาดหวังเพราะเป็นคนจากวัลคิรี่ แต่กลับมารบกวนการทำธุรกิจกันงั้นเรอะ!"
10035050-67 = "ฉันแค่รายงานไปตามที่เห็นค่ะ"
10035050-68 = "คิดว่าฉันโกหกงั้นเหรอคะ?"
10035050-69 = "ฮะ... เฮือก! ยะ... อย่าจ้องกันอย่างนั้นสิ มันน่ากลัวนะ!"
10035050-70 = "ธะ... เธอคงเห็นภาพหลอนไปเองน่ะ!"
10035050-71 = "พวกเธอทำให้ลูกค้าสวนน้ำต้องสั่นกลัวไปหมดด้วยเหตุผลที่ไม่เข้าท่า แล้วก็อพยพลูกค้าออกไปจาก#nสระหมดเลย!"
10035050-72 = "หรือว่าเธอเชื่อเรื่องลึกลับในเมืองอย่างเรื่องจระเข้ในทางระบายน้ำเสียน่ะ?"
10035050-73 = "พวกเธอต้องรับผิดชอบความเสียหายที่เกิดขึ้น...!"
10035050-74 = "[s1] \"เดี๋ยวก่อนนะ คุณเจ้าของสวนน้ำ\"\n[s2] \"ใจเย็นก่อน คุณเจ้าของสวนน้ำ\""
10035050-77 = "หืม?"
10035050-78 = "คุณเป็นใคร ทำไมถึงเข้ามาแทรกแซงด้วย?"
10035050-79 = "หืม? คุณครูของชาเล่ต์?"
10035050-80 = "แล้วก็มาที่นี่ในฐานะลูกค้าสวนน้ำด้วย... เหรอครับ?"
10035050-81 = "แหมๆ แย่ละสิ ขอโทษด้วยนะครับที่จำไม่ได้!"
10035050-82 = "คุณครูน่าจะบอกกันสักหน่อยว่าจะมา... ผมจะได้ดูแลความสะดวกสบายให้มากกว่านี้... แหะๆ"
10035050-83 = "[s] \"ไม่เป็นไรหรอก แต่ช่วยฟังคำของนักเรียนพวกนี้หน่อยนะ\""
10035050-85 = "[ns] \"พวกเธอไม่ใช่นักเรียนที่ทำอะไรวู่วามและไม่มีความรับผิดชอบหรอกนะ\""
10035050-86 = "...!"
10035050-87 = "แต่เรื่องมันฟังดูเหลวไหลมากเลยนี่ครับ"
10035050-88 = "[s3] \"ยังไงเราก็อพยพลูกค้าได้หมดแล้ว...\"\n[s4] \"ลองตรวจสอบในสระดูสักครั้งไม่ดีกว่าเหรอ?\""
10035050-91 = "ฮึ่ม ยังไงเราก็ต้องทำให้ลูกค้าสบายใจด้วย..."
10035050-92 = "งั้นก็ตามนั้นครับ"
10035050-93 = "ผมไม่คิดว่าจะมีจระเข้อยู่จริงๆ แต่ก็จะเกณฑ์เจ้าหน้าที่มาช่วยค้นหาครับ"
10035050-94 = "[s] \"ขอบคุณที่ยอมทำนะ\""
10035050-95 = "แต่สมมติว่าเราหาอะไรไม่เจอเลยละก็..."
10035050-96 = "พวกคุณ"
10035050-97 = "ต้องไปประจำอยู่ที่ซุ้มทาโกะยากิในศูนย์อาหารกลางแจ้งนะครับ"
10035050-103 = "ถ้าก่อความเสียหายในการใช้งานสวนน้ำไว้ขนาดนั้น ก็ต้องรับผิดชอบแบบนั้นละครับ"
10035050-104 = "ขะ... ขอร้องละ... ไม่เอากลางแจ้ง...!"
10035050-105 = "เอ้า! ระดมเจ้าหน้าที่รักษาความปลอดภัยกับไลฟ์การ์ดมาค้นหาให้ทั่วสระคลื่น!"
10035050-106 = "แล้วก็ระวังกันด้วยนะ ในสระอาจจะมีจระเข้ก็ได้! เหอะๆ!"
10035050-111 = "ขอบคุณนะคะคุณครู"
10035050-112 = "ไลฟ์การ์ดอย่างฉันต้องช่วยคนอื่นแท้ๆ แต่กลับเป็นฝ่ายได้รับความช่วยเหลือจนได้"
10035050-113 = "[s5] \"ไม่ต้องคิดมากนะ\"\n[s6] \"การช่วยนักเรียนเป็นหน้าที่ของครูอยู่แล้ว\""
10035050-116 = "แต่ก็โล่งอกไปทีนะคะ ทางสวนน้ำระดมเจ้าหน้าที่รักษาความปลอดภัยมาช่วยค้นหากันหลายคน แบบนี้น่าจะเจอตัวจระเข้ได้ในไม่ช้าค่ะ!"
10035050-117 = "ถ้ามีจริงๆ น่ะนะ..."
10035050-118 = "ฉันไม่ได้โกหกนะ ฟุบุกิ"
10035050-119 = "ฉันเห็นเงาขนาดใหญ่ว่ายอยู่ในน้ำเต็มสองตาเลย "
10035050-120 = "ฉันเชื่อหัวหน้ากรมฯ ค่ะ!"
10035050-121 = "เดี๋ยวก็หาเจอแล้วค่ะ!"
10035050-127 = "ทาโกะยากิค่ะ... ทาโกะยากิ... ทาโกะยากิอร่อยๆ ค่ะ..."
10035050-129 = "เฮ้อออ... ต้องมาย่างทาโกะยากิ แล้วก็โดนแดดย่างไปด้วยอีก..."

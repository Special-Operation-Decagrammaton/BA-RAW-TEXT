[translation]
10035050-1 = "第5話;怪異生物，不見了……"
10035050-3 = "嗯～所以麻煩請目前正在波浪池的客人盡快離場～"
10035050-4 = "一個一個來，不要推擠，安全第一。"
10035050-5 = "至於發生了什麼事嘛……"
10035050-6 = "嗯，我也不好說……"
10035050-7 = "總之快點去避難吧～"
10035050-13 = "哎呀！"
10035050-14 = "請，請不要推擠！慢慢撤離就可以了！"
10035050-15 = "安全第一……"
10035050-19 = "哎唷！"
10035050-24 = "大家快離開水裡！"
10035050-25 = "依序撤離！"
10035050-27 = "發生了什麼事？為什麼要疏散遊客？"
10035050-28 = "不知道！但看起來是緊急情況！"
10035050-29 = "那就先協助疏散吧！"
10035050-33 = "等等！都先給我等等！"
10035050-34 = "這是在做什麼？"
10035050-35 = "為什麼沒先通報就把遊客趕出泳池？"
10035050-36 = "發生了什麼緊急事故嗎？"
10035050-38 = "啊！老闆！"
10035050-39 = "不是的！目前還沒有事故發生，但是有發生事故的風險……！"
10035050-40 = "你們是女武神派來的……不，現在要緊的是你們所謂的事故風險！"
10035050-41 = "是造浪設施出問題了嗎？"
10035050-42 = "還是水質汙染檢測器發出警報？"
10035050-43 = "那個……"
10035050-44 = "吹雪，我來報告吧。"
10035050-45 = "我是從女武神警察學園接受派遣，目前擔任救生員一職的尾刃環奈。"
10035050-46 = "今日11點20分前後，我在波浪池中確認到了不明生物的蹤影。"
10035050-47 = "因為擔心會威脅遊客的安全，因此不得已採取了臨時措施。"
10035050-48 = "不明生物？"
10035050-49 = "可以麻煩你形容一下那個怪物長什麼樣子嗎？"
10035050-50 = "因為在水裡，所以視野不是很清楚……"
10035050-51 = "看起來有張巨大的嘴、粗壯的四肢，以及相當厚實的軀幹。"
10035050-52 = "要說跟牠最相似的生物──"
10035050-53 = "我覺得是鱷魚。"
10035050-55 = "鱷魚？"
10035050-59 = "水上樂園哪來的鱷魚！"
10035050-61 = "噫！"
10035050-62 = "哇，口氣一百八十度大轉變。"
10035050-64 = "這裡不是海邊也不是河口，而是水上樂園！"
10035050-65 = "連找條金魚都是天方夜譚！"
10035050-66 = "本以為女武神派了能幹的人來，結果反而是來妨礙營業！"
10035050-67 = "我只是據實以報。"
10035050-68 = "您現在是在指控我說謊嗎？"
10035050-69 = "噫噫！別，別用那種凶狠的表情盯著我！我，我不是那個意思！"
10035050-70 = "有，有可能只是你看錯了！"
10035050-71 = "居然因為這種荒謬的理由讓客人們陷入恐慌，甚至還疏散他們！"
10035050-72 = "你該不會相信「下水道的鱷魚」那種都市傳說吧？"
10035050-73 = "這已經對我們樂園造成了難以估計的損失──"
10035050-74 = "[s1]「請先等一下，老闆。」\n[s2]「請先冷靜下來，老闆。」"
10035050-77 = "嗯？"
10035050-78 = "你又是哪位啊？幹嘛跑來多管閒事？"
10035050-79 = "嗯？夏萊的老師？"
10035050-80 = "而且還是以我們樂園遊客的身分造訪……？"
10035050-81 = "哎呀，沒能認出您真是不好意思！"
10035050-82 = "您要大駕光臨的話怎麼不事先告訴我呢……#n那樣我就能多為您安排一些特別服務了……呵呵。"
10035050-83 = "[s]「不用在意我沒關係，但我希望您可以再考慮一下學生們說的話。」"
10035050-85 = "[ns]「他們並不是那種不先確認情況就貿然行動的孩子。」"
10035050-86 = "……！"
10035050-87 = "可是那種說法實在有點過於荒唐了。"
10035050-88 = "[s3]「既然客人們都已經疏散了……」\n[s4]「以防萬一還是調查一下吧？」"
10035050-91 = "您這麼說也對，畢竟總是得給遊客一個交代……"
10035050-92 = "那就這麼辦吧。"
10035050-93 = "我會安排保全人員進行搜索……雖然我實在不認為會有什麼鱷魚。"
10035050-94 = "[s]「感謝您的諒解。」"
10035050-95 = "但如果什麼都沒發現的話……"
10035050-96 = "你們幾個。"
10035050-97 = "就得去戶外的美食廣場賣章魚燒。"
10035050-103 = "這可是對樂園的營業造成了實質性的損害，當然得負起相應的責任才行。"
10035050-104 = "拜，拜託不要……！"
10035050-105 = "喂！叫保全和救生員去搜索波浪池！"
10035050-106 = "小心可能會有鱷……噗，鱷魚出沒啊！記得注意安全！"
10035050-111 = "……謝謝您，老師。"
10035050-112 = "本來應該幫助人的救生員，反而接受了幫助。"
10035050-113 = "[s5]「別放在心上。」\n[s6]「幫助學生是我的職責。」"
10035050-116 = "不過真是太好了，有那麼多保全人員一起搜索，一定很快就能找到鱷魚！"
10035050-117 = "前提是真的有鱷魚……"
10035050-118 = "我沒有說謊，吹雪。"
10035050-119 = "我親眼見到了一個巨大的影子在水中游動。"
10035050-120 = "本官也相信局長！"
10035050-121 = "肯定很快就能找到的！"
10035050-127 = "章魚燒～來買章魚燒哦～好吃的章魚燒……"
10035050-129 = "哇啊啊……我已經分不清楚是我在烤章魚燒，還是章魚燒在烤我了……"

[translation]
10035050-1 = "Episode 5;I Don't See the Monster..."
10035050-3 = "Yeah, so...we kindly ask all guests using the wave pool to exit the water immediately."
10035050-4 = "Now, now, no pushing, please. Let's keep it safe."
10035050-5 = "The thing is... It's just that..."
10035050-6 = "Well, to be honest, I'm not quite sure myself..."
10035050-7 = "Forget it. Just run!"
10035050-13 = "Oh, no!"
10035050-14 = "Please, stop pushing. Evacuate slowly and calmly!"
10035050-15 = "Remember, safety first..."
10035050-19 = "Ahh!"
10035050-24 = "Everyone, get out of the water!"
10035050-25 = "Please evacuate in an orderly manner!"
10035050-27 = "What's going on? Why are we evacuating?"
10035050-28 = "I don't know, but there must be a reason!"
10035050-29 = "Yeah, let's just keep going with it for now!"
10035050-33 = "Stop! Stop!"
10035050-34 = "What are you all doing?"
10035050-35 = "How can you force the guests out of the pool without even reporting it?"
10035050-36 = "Was there some sort of an accident?"
10035050-38 = "Oh, there's the owner!"
10035050-39 = "No accident, but there's a danger."
10035050-40 = "You know, when Valkyrie sent you, I thought... What kind of danger?"
10035050-41 = "Is there a malfunction with the wave generator?"
10035050-42 = "Is the water quality monitor beeping?"
10035050-43 = "But..."
10035050-44 = "Let me do the talking, Fubuki."
10035050-45 = "My name is Ogata Kanna. I'm a lifeguard from Valkyrie Police School."
10035050-46 = "At around 11:20 AM today, we confirmed the presence of an unidentified creature in the wave pool."
10035050-47 = "Out of safety concerns for the park guests, we were forced to implement emergency measures."
10035050-48 = "An unidentified creature?"
10035050-49 = "Is that so? And what did this creature look like?"
10035050-50 = "It was underwater, so I couldn't get a good look at it, but..."
10035050-51 = "It had a large mouth, four thick legs, and a strong-looking body."
10035050-52 = "The closest comparison..."
10035050-53 = "...would seem to be an alligator."
10035050-55 = "An alligator?"
10035050-59 = "You're telling me you saw an ALLIGATOR in our park?! Really?!"
10035050-61 = "Eek!"
10035050-62 = "Huh, that's a whole different tone."
10035050-64 = "This isn't a beach or a river, it's a PARK, for goodness' sake!"
10035050-65 = "You wouldn't find a GOLDFISH in a place like this, let alone an alligator!"
10035050-66 = "I had high hopes for you lot, since you came from Valkyrie, but all you've done is get in the way of my business!"
10035050-67 = "I'm simply reporting what I saw."
10035050-68 = "Or are you implying that I'm not telling the truth?"
10035050-69 = "Wh-Whoa! N-No, no, please don't look at me like that!"
10035050-70 = "M-Maybe you were imagining things, or didn't see it right!"
10035050-71 = "You frightened the guests and ran them off over nothing!"
10035050-72 = "You know the \"alligators in the sewers\" story is an urban legend, right?"
10035050-73 = "The damage you've done to the park is—"
10035050-74 = "[s1] \"Wait a minute.\"\n[s2] \"Please, calm down.\""
10035050-77 = "Oh?"
10035050-78 = "And who the hell are you?"
10035050-79 = "Hm? Sensei from Schale, you say?"
10035050-80 = "And you're here as a guest...?"
10035050-81 = "Oh, my! I apologize. I didn't realize who you were!"
10035050-82 = "If I'd known YOU were coming...I'd have made things more comfortable for you."
10035050-83 = "[s] \"Don't worry about that. But please, think over what the students have told you.\""
10035050-85 = "[ns] \"I know them, and they aren't the type to act irresponsibly.\""
10035050-86 = "*gasp*"
10035050-87 = "But their claim is absolutely ridiculous!"
10035050-88 = "[s3] \"Since all the guests have been evacuated anyway...\"\n[s4]\"Wouldn't it be a good idea to investigate, just to be safe?\""
10035050-91 = "Hmm... The guests' peace of mind IS important..."
10035050-92 = "All right, fine. Let's do it."
10035050-93 = "I'm not expecting to find any alligators, but I'll have the security team conduct a search just to be sure."
10035050-94 = "[s] \"Thank you for listening.\""
10035050-95 = "BUT. If they don't find anything..."
10035050-96 = "You..."
10035050-97 = "You'll all be assigned to the takoyaki stand in the outdoor food court!"
10035050-103 = "Only fair, isn't it? If you've disrupted park operations for no good reason?"
10035050-104 = "P-Please, anything but that...!"
10035050-105 = "You there! Have the security and the lifeguards search the wave pool!"
10035050-106 = "Careful. Pfft, there might be an \"alligator.\""
10035050-111 = "...Thank you, Sensei."
10035050-112 = "Although...lifeguards are supposed to be the helpers, not the help-ees."
10035050-113 = "[s5] \"Don't worry about it.\"\n[s6]\"Helping students is part of my job.\""
10035050-116 = "Well, with that many people searching, they're bound to find the alligator."
10035050-117 = "If it actually exists..."
10035050-118 = "I'm not lying about it, Fubuki."
10035050-119 = "I saw its shadow in the water with my own two eyes."
10035050-120 = "I believe you, Director!"
10035050-121 = "They'll find it for sure!"
10035050-127 = "Get your takoyaki here, takoyaki... Delicious, blazing hot takoyaki..."
10035050-129 = "Ugh... I can't tell if I'm cooking the takoyaki or if the takoyaki's cooking me..."

[translation]
1009605-1 = "สิทธิพิเศษของไลฟ์การ์ด"
1009605-3 = "ทำไมคุณครูถึงมาอยู่ที่นี่ล่ะคะ?"
1009605-4 = "[s1] \"ครูกลัวว่าคันนะจะเหนื่อย ก็เลยมาช่วยน่ะ\"\n[s2] \"ครูอยากมาเหนื่อยด้วยกันกับคันนะน่ะ\""
1009605-7 = "..."
1009605-8 = "นอกจากไลฟ์การ์ดแล้ว ทางสวนน้ำก็ประกาศรับคนงานรายวันด้วยนี่นะ"
1009605-9 = "แต่คิดไม่ถึงเลยนะคะว่าคุณครูจะมาที่นี่ด้วย"
1009605-10 = "[s] \"ไปทำงานด้วยกันเถอะ! วันนี้เราเป็นเพื่อนร่วมงานกันนะ!\""
1009605-11 = "ค่ะ รับทราบค่ะ"
1009605-12 = "วันนี้เราเจอกันเพราะเรื่องงาน เพราะงั้นก็จะไม่มีเวลามาเล่นสนุกเหมือนคราวก่อนนะคะ ไม่เป็นไรใช่มั้ยคะ?"
1009605-13 = "[s] \"แน่นอนอยู่แล้ว ครูจะตั้งใจทำให้เต็มที่เลย\""
1009605-14 = "งั้นก็หยิบอุปกรณ์ทำความสะอาดมา แล้วไปที่จุดที่รับผิดชอบเถอะค่ะ"
1009605-15 = "เราต้องไปโซนกลางแจ้งค่ะ"
1009605-17 = "และจุดที่เราต้องทำความสะอาดคือ 'ฮีลลิ่งสปา' ค่ะ"
1009605-18 = "ที่ฮีลลิ่งสปา ลูกค้าจะได้ผ่อนคลายกับสปากันเป็นคู่ในพื้นที่ที่เป็นส่วนตัวค่ะ"
1009605-19 = "เป็นอีกจุดที่ได้รับความสนใจมากจนต้องต่อแถวเข้าเลยละค่ะ"
1009605-20 = "[s] \"เหมือนเป็นสปาคู่รักสินะ...\""
1009605-21 = "ถ้างั้นฉันจะไปเริ่มจากทางโน้นค่ะ"
1009605-22 = "ฝากคุณครูทำความสะอาดตั้งแต่ฝั่งนี้มานะคะ"
1009605-23 = "ทำด้วยความรับผิดชอบ ทุกซอกทุกมุมต้องสะอาดหมดจด!"
1009605-24 = "[s3] \"ระ... รับทราบ!\"\n[s4] (กลืนน้ำลาย...)"
1009605-28 = "(คุณครูและคันนะตั้งใจทำความสะอาดฮีลลิ่งสปากันอยู่พักหนึ่ง...)"
1009605-30 = "ฮู่วว เท่านี้ก็น่าจะเสร็จแล้วนะคะ"
1009605-31 = "ทำได้ดีมากค่ะคุณครู"
1009605-32 = "[s5] \"คันนะก็ทำได้ดีมาก\"\n[s6] \"ห้องสปาสะอาดวิบวับเลยนะ\""
1009605-35 = "ถ้างั้นฉันจะรายงานผลกับทางสวนน้ำนะคะ"
1009605-39 = "ติดต่อจากฮีลลิ่งสปา เจ้าหน้าที่สวนน้ำ ทราบแล้วเปลี่ยน"
1009605-40 = "(ซ่า) มีเรื่องอะไรเหรอครับ? "
1009605-41 = "เราทำภารกิจทำความสะอาดและตรวจเช็กพื้นที่เสร็จแล้ว ขอทราบภารกิจต่อไปด้วย"
1009605-42 = "(ซ่า) ขอบคุณที่พยายามนะครับ งานทางนี้ของเรากำลังยุ่ง ช่วยรอสักครู่นะครับ (ซ่า...)"
1009605-43 = "สัญญาณหายไปแล้วค่ะ..."
1009605-44 = "ทางนั้นน่าจะเจองานยุ่งอยู่นะคะ เราน่าจะต้องรองานต่อไปกันที่นี่ก่อน คุณครูติดอะไรหรือเปล่าคะ?"
1009605-45 = "[s7] \"ดีเลย ครูก็อยากพักอยู่พอดี\"\n[s8] นวดแขนขาที่ปวดเมื่อย"
1009605-50 = "ถ้างั้นก็มาพักผ่อนด้วยกันสักพักก่อนแล้วกันค่ะ"
1009605-51 = "ใช้บริการของ 'ฮีลลิ่งสปา' ด้วยกันดีมั้ยคะ?"
1009605-52 = "[s] \"หืม? ทำแบบนั้นได้ด้วยเหรอ?\""
1009605-53 = "ได้สิคะ ลงมาในนี้เลยค่ะ"
1009605-56 = "― [log=칸나 수영복]ฮู่ว[/log][wa:710] "
1009605-58 = "― [log=칸나 수영복]รู้สึกเหมือนได้คลายความเมื่อยล้าจริงๆ เลยนะคะ[/log][wa:10] "
1009605-61 = "― [log=칸나 수영복]ไม่เป็นไรหรอกค่ะ[/log][wa:350] "
1009605-63 = "― [log=칸나 수영복]นี่ก็เป็นส่วนหนึ่งของงานค่ะ[/log][wa:380] "
1009605-66 = "― [log=칸나 수영복]อีกอย่าง...[/log]"
1009605-68 = "― [log=칸나 수영복]คนที่ตั้งใจทำงานก็ต้องได้รับรางวัลสิคะ[/log][wa:120] "
1009605-71 = "― [log=칸나 수영복]แล้วฉัน...[/log][wa:590] "
1009605-73 = "― [log=칸나 수영복]ก็ติดหนี้บุญคุณคุณครูอยู่เรื่อยเลยด้วย[/log][wa:550] "
1009605-76 = "― [log=칸나 수영복]เพราะงั้น นี่คือ...[/log][wa:10] "
1009605-78 = "― [log=칸나 수영복]ของขวัญเล็กๆ น้อยๆ ที่ฉันมอบให้คุณครูค่ะ[/log][wa:990] "
1009605-81 = "[ns9] \"คันนะกำลังบอกว่า...\"\n[ns10] \"ของขวัญคือ 'สิทธิ์ในการผ่อนคลายในสปากับคันนะ' งั้นเหรอ?\""
1009605-82 = "― [log=칸나 수영복]คะ คะ?![/log][wa:460] "
1009605-83 = "― [log=칸나 수영복]คะ คะ?![/log][wa:460] "
1009605-85 = "― [log=칸나 수영복]จะ... จะเป็นแบบนั้นไปได้ยังไงคะ![/log][wa:410] "
1009605-88 = "― [log=칸나 수영복]ที่ฉันมาอยู่ที่นี่ ก็เพื่อ...[/log][wa:1650] "
1009605-91 = "― [log=칸나 수영복]...ความปลอดภัยของคุณครูค่ะ![/log][wa:1590] "
1009605-93 = "― [log=칸나 수영복]ก็ฉันเป็นไลฟ์การ์ดนี่คะ![/log][wa:480] "
1009605-96 = "ทำไมถึงตกใจขนาดนั้นล่ะคะ..."
1009605-97 = "(ซ่า) เจ้าหน้าฮีลลิ่งสปา นี่คือเจ้าหน้าที่สวนน้ำ"
1009605-98 = "ขอบคุณที่พยายามนะครับ ใกล้จะหมดเวลาทำงานแล้ว กรุณากลับมาที่ส่วนกลางครับ... (ซ่า)"
1009605-103 = "เราต้องไปที่ส่วนกลางแล้วค่ะคุณครู"
1009605-104 = "ขอบคุณที่เหนื่อยกับงานวันนี้นะคะ"
1009605-105 = "[s] \"วันนี้ครูสนุกมากเลย คันนะ\""
1009605-109 = "[ns] \"แล้วคันนะล่ะ เป็นยังไงบ้าง?\""
1009605-110 = "ไลฟ์การ์ดไม่ควรวิจารณ์ว่างานของตัวเองสนุกหรือเปล่า"
1009605-111 = "แต่ถ้าจะให้ตอบละก็..."
1009605-113 = "ค่ะ ฉันก็สนุกเหมือนกันค่ะคุณครู"

[translation]
1009605-1 = "救生員的特權"
1009605-3 = "老師怎麼會在這裡？"
1009605-4 = "[s1]「因為環奈好像很辛苦，所以就來幫忙了。」\n[s2]「我是來和環奈共患難的。」"
1009605-7 = "……"
1009605-8 = "也對，聽說除了救生員之外，水上樂園也招募了一日助理。"
1009605-9 = "沒想到來的人居然會是老師啊。"
1009605-10 = "[s]「一起工作吧！今天我們是同事哦！」"
1009605-11 = "……我明白了。"
1009605-12 = "不過今天碰面是為了工作，應該沒時間像之前那樣一起玩。真的沒關係嗎？"
1009605-13 = "[s]「當然，我會認真工作的。」"
1009605-14 = "那麽，請拿著打掃工具前往負責區域吧。"
1009605-15 = "是位於室外的設施。"
1009605-17 = "我們負責的地方是這個「療癒SPA」。"
1009605-18 = "這是能在私人空間享受雙人SPA的設施。"
1009605-19 = "因為平常很受歡迎，幾乎都要排隊使用。"
1009605-20 = "[s]「感覺是情侶專用的設施耶……」"
1009605-21 = "那麼我從那邊開始。"
1009605-22 = "請老師從另一邊的盡頭開始打掃吧。"
1009605-23 = "要帶著責任感，把每個角落掃乾淨！"
1009605-24 = "[s3]「是，是！」\n[s4] （……咕嚕）"
1009605-28 = "（於是認真打掃了療癒SPA……）"
1009605-30 = "呼，這樣就大致結束了。"
1009605-31 = "辛苦了，老師。"
1009605-32 = "[s5]「環奈也辛苦了。」\n[s6]「整個設施都亮晶晶的呢。」"
1009605-35 = "那麼，我這就向樂園方回報任務完成。"
1009605-39 = "這裡是療癒SPA負責人。樂園負責人收到請回答。"
1009605-40 = "（滋滋）有什麼事嗎？"
1009605-41 = "已完成打掃及設施檢測任務，目前正在待命。#n請下達下一個任務。"
1009605-42 = "（滋滋）辛苦了。我這裡還在忙，你可以先休息一下。#n（滋滋……）通訊結束。"
1009605-43 = "掛斷了……"
1009605-44 = "看來那邊還有事要忙。#n可能得稍等一會，您打算怎麼做呢？"
1009605-45 = "[s7]「沒關係，我正好想休息一下。」\n[s8] 搓揉痠痛的肌肉"
1009605-50 = "那麼就一起稍作休息吧。"
1009605-51 = "您要不要體驗一下「療癒SPA」？"
1009605-52 = "[s]「咦？可以嗎？」"
1009605-53 = "當然，請進來這裡吧。"
1009605-56 = "― [log=칸나 수영복]呼……[/log][wa:750] "
1009605-58 = "― [log=칸나 수영복]的確有種疲勞一掃而空的感覺。[/log][wa:960] "
1009605-61 = "― [log=칸나 수영복]沒關係的。[/log][wa:790] "
1009605-63 = "― [log=칸나 수영복]畢竟這也是檢查項目之一。[/log][wa:980] "
1009605-66 = "― [log=칸나 수영복]而且……[/log]"
1009605-68 = "― [log=칸나 수영복]認真做事的人本來就該獲得獎賞。[/log][wa:1040] "
1009605-71 = "― [log=칸나 수영복]……除此之外，[/log][wa:710] "
1009605-73 = "― [log=칸나 수영복]平時也總是受老師的照顧。[/log][wa:1590] "
1009605-76 = "― [log=칸나 수영복]所以這是……[/log][wa:520] "
1009605-78 = "― [log=칸나 수영복]我送給老師的一點小小的禮物。[/log][wa:2030] "
1009605-81 = "[ns9]「也就是說……」\n[ns10]「『和環奈一起享受SPA的資格』就是禮物嗎？」"
1009605-82 = "― [log=칸나 수영복]咦！？[/log][wa:620] "
1009605-83 = "― [log=칸나 수영복]咦！？[/log][wa:620] "
1009605-85 = "― [log=칸나 수영복]那，那怎麼可能呢！[/log][wa:1330] "
1009605-88 = "― [log=칸나 수영복]我之所以在這裡，是為了……[/log][wa:2290] "
1009605-91 = "― [log=칸나 수영복]……為了保護老師的安全！[/log][wa:2190] "
1009605-93 = "― [log=칸나 수영복]畢竟我是救生員啊！[/log][wa:1080] "
1009605-96 = "真是的，居然這樣捉弄我……"
1009605-97 = "（滋滋）療癒SPA負責人，這裡是樂園負責人。"
1009605-98 = "辛苦了，工作差不多該收尾了，請返回本部吧。（滋滋……）"
1009605-103 = "這樣啊。#n我們回去吧，老師。"
1009605-104 = "打掃辛苦您了。"
1009605-105 = "[s]「我今天過得很開心哦。」"
1009605-109 = "[ns]「環奈你呢？」"
1009605-110 = "雖然救生員計較任務是否愉快，並不是很恰當……"
1009605-111 = "但硬要說的話……"
1009605-113 = "是，我也很開心，老師。"

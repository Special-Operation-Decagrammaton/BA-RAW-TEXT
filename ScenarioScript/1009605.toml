[translation]
1009605-1 = "Privileges of a Lifeguard"
1009605-3 = "What are you doing here, Sensei?"
1009605-4 = "[s1] \"You looked like you might need some help.\"\n[s2] \"I'm here to share in your struggles.\""
1009605-7 = "..."
1009605-8 = "Well, they did mention they were hiring some extra assistants, along with the lifeguards."
1009605-9 = "I didn't expect you to be one of them, though."
1009605-10 = "[s] \"Well, here we both are. Looks like we're coworkers today.\""
1009605-11 = "...Very well."
1009605-12 = "Given that we ARE on the clock, we won't have much chance to enjoy ourselves this time. Is that all right with you?"
1009605-13 = "[s] \"Of course. I'm here to work hard.\""
1009605-14 = "Well then, please take those cleaning tools to your assigned area."
1009605-15 = "It's an outdoor facility."
1009605-17 = "We'll be in charge of the \"Healing Spa.\""
1009605-18 = "The main attraction on offer is a private spa experience for two people."
1009605-19 = "As you can imagine, there's a long line for it."
1009605-20 = "[s] \"It seems like it's designed just for couples...\""
1009605-21 = "Anyway, I'll get started on this end."
1009605-22 = "Could you start cleaning from the other side, and work your way over?"
1009605-23 = "Make sure to clean every corner thoroughly. This is your responsibility today."
1009605-24 = "[s3] \"Y-You got it!\"\n[s4] *gulp*"
1009605-28 = "We worked hard on cleaning the Healing Spa for a while..."
1009605-30 = "Phew, that should wrap things up for now."
1009605-31 = "Good work, Sensei."
1009605-32 = "[s5] \"You did good too, Kanna.\"\n[s6] \"The entire facility is sparkling clean.\""
1009605-35 = "I'll tell park management the task is done."
1009605-39 = "Healing Spa supervisor to park manager. Over."
1009605-40 = "*static* Is there a problem? Over."
1009605-41 = "Cleaning and facility inspection mission accomplished. Awaiting new orders. Over."
1009605-42 = "*static* Good job. Things are busy on this side, so please just take a break until you hear back from us... *static*"
1009605-43 = "Hmm, we lost our connection."
1009605-44 = "They said they were busy. I suppose we can just wait here, like they said. Does that sound all right to you?"
1009605-45 = "[s7] \"That's fine. I wanted to rest a bit anyway.\"\n[s8] Rub your aching muscles."
1009605-50 = "All right, break time it is."
1009605-51 = "We could use the 'Healing Spa' together, if you like."
1009605-52 = "[s] \"Oh? Are we allowed to do that?\""
1009605-53 = "Of course. Right this way."
1009605-56 = "― [log=칸나 수영복]Ahh,[/log][wa:710] "
1009605-58 = "― [log=칸나 수영복]I can feel all my fatigue...melting away.[/log][wa:10] "
1009605-61 = "― [log=칸나 수영복]This is fine...[/log][wa:390] "
1009605-63 = "― [log=칸나 수영복]We can call it...a maintenance check.[/log][wa:10] "
1009605-66 = "― [log=칸나 수영복]Besides...[/log]"
1009605-68 = "― [log=칸나 수영복]People who work hard deserve a reward.[/log][wa:120] "
1009605-71 = "― [log=칸나 수영복]And, besides that...[/log][wa:190] "
1009605-73 = "― [log=칸나 수영복]I'm always...in your debt, Sensei.[/log][wa:710] "
1009605-76 = "― [log=칸나 수영복]So this...[/log][wa:360] "
1009605-78 = "― [log=칸나 수영복]is just a small token of my thanks.[/log][wa:1190] "
1009605-81 = "[ns9] \"So what you're saying is...\"\n[ns10] \"The token is getting to enjoy the spa with you?\""
1009605-82 = "― [log=칸나 수영복]Wh-What?![/log][wa:380] "
1009605-83 = "― [log=칸나 수영복]Wh-What?![/log][wa:380] "
1009605-85 = "― [log=칸나 수영복]I mean, of course not![/log][wa:810] "
1009605-88 = "― [log=칸나 수영복]The reason I'm here is because...[/log][wa:1490] "
1009605-91 = "― [log=칸나 수영복]It's for your safety![/log][wa:1830] "
1009605-93 = "― [log=칸나 수영복]I'm a lifeguard![/log][wa:800] "
1009605-96 = "Let's not tease each other like that."
1009605-97 = "*static* Park supervisor to healing spa manager, over."
1009605-98 = "Job well done. It's almost time to wrap up, so please report to headquarters. Over and out. *static*"
1009605-103 = "I guess it's time to go back, Sensei."
1009605-104 = "Thank you for cleaning up so well."
1009605-105 = "[s] \"I had a nice day, Kanna.\""
1009605-109 = "[ns] \"How about you?\""
1009605-110 = "Well, a lifeguard shouldn't worry about enjoying her job, but..."
1009605-111 = "...if I had to be honest..."
1009605-113 = "...yes, I enjoyed it too, Sensei."

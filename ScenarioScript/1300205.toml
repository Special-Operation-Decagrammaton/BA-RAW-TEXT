1300205-14 = "#na;야키니쿠 가게 점원;(이 학생은 대식 대회의 단골 챔피언인 와니부치 아카리잖아?!)"
1300205-15 = "#na;야키니쿠 가게 점원;(지난번 상점가의 대식 대회에서는 소갈비 30인분을 순식간에 통째로 먹어치웠다지…….)"
1300205-16 = "#na;야키니쿠 가게 점원;(안 돼…… 이런 손님을 받았다가는 우리 가게가 망하고 말거야!)"
1300205-17 = "3;아카리;01\n#3;h"
1300205-18 = "#na;야키니쿠 가게 점원;저, 저기…… 손님. 대단히 죄송합니다만, 오늘은 재료가 모두 소진되어서 더 이상 손님을 받을 수가 없습니다."
1300205-19 = "3;아카리;04;네에? 방금 전에 다른 손님이 들어오는 걸 제 눈으로 보았는데요?\n#3;em;[?]\n#3;stiff"
1300205-20 = "#na;야키니쿠 가게 점원;방금 그 손님이 마지막이었던지라…… 정말 죄송합니다!"
1300205-21 = "3;아카리;99;재료가 소진되었다면 어쩔 수 없지요. #n아아, 오늘은 야키니쿠가 먹고 싶은 기분이었는데.\n#3;em;…"

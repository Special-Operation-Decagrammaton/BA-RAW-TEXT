[translation]
1300205-1 = "謝絕入場"
1300205-2 = "奇普托斯．美食街"
1300205-3 = "啦，啦～今天要吃哪一家呢？ "
1300205-4 = "最近手頭有點緊，想找個便宜量多，高CP值的吃到飽餐廳。"
1300205-5 = "這樣的話果然還是……燒肉！吃到飽就要吃燒肉，吃燒肉就要吃到飽！"
1300205-6 = "既然如此，雖然現在距離晚餐時間還有點早，但還是先進店裡吧。"
1300205-10 = "您好，我只有一個人，請先給我牛五花，還有──"
1300205-12 = "歡迎光臨。不好意思，請先入座再點餐……嚇！"
1300205-14 = "（這同學，不是大胃王比賽常勝冠軍，鰐渕亞伽里嗎？！）"
1300205-15 = "（她在上次的商店街大胃王比賽，一瞬間就把30人份的牛五花一掃而空……）"
1300205-16 = "（不行……！讓這種客人進來吃吃到飽的話，我們店會被吃垮的！）"
1300205-18 = "那，那個……客人。非常抱歉，今天所有備料都已經賣完了。"
1300205-19 = "咦？剛才不是還有其他客人走進來？"
1300205-20 = "剛剛給那位客人的就是最後的份了……非常抱歉！"
1300205-21 = "備料沒了那就沒辦法了～#n哎呀，偏偏今天好想吃燒肉唷。"
1300205-22 = "好吧，去找其他店吧……"
1300205-24 = "我記得這附近，有壽司吃到飽餐廳……"
1300205-25 = "雖然我比較想吃燒肉……但是能盡情吃壽司的機會也不是每天都有。"
1300205-26 = "那麼今天的晚餐，就決定是壽司了！"
1300205-30 = "您好，我只有一個人。請給我鮪魚和──"
1300205-33 = "（這同學，不是大胃王比賽常勝冠軍，鰐渕亞伽里嗎？！）"
1300205-34 = "（不行！就算端上整隻鮪魚也不夠她吃！）"
1300205-36 = "不，不好意思！我剛剛確認一下，今天的座位都已經訂滿了，實在沒辦法容納現場候位的客人……！"
1300205-37 = "咦？怎麼會……"
1300205-38 = "訂位訂滿那就沒辦法了。去找其他店吧……"
1300205-40 = "呃呃……肚子好餓……"
1300205-41 = "今天去的店家要不是備料沒了，就是座位訂滿了，沒辦法再接客。"
1300205-42 = "難道是因為我平常吃太多了，所以吃到飽之神要給我什麼懲罰嗎……"
1300205-43 = "[s]「怎麼了？你怎麼一臉憂鬱呀？」"
1300205-44 = "啊，老師。你也是來吃飯的嗎？"
1300205-45 = "我今天難得想找間吃到飽餐廳讓自己飽餐一頓，可是不管去哪都只能吃閉門羹……"
1300205-46 = "結果完全沒找到能吃的餐廳，到現在都還沒吃晚餐。"
1300205-47 = "[s]「不去吃到飽的店，去一般餐廳不行嗎？」"
1300205-48 = "我現在沒有那麼多錢，可以讓我盡情填飽肚子……"
1300205-49 = "嗚嗚……餓太久了全身都沒力氣……#n看來只能放棄吃到飽，去一般的餐廳了……"
1300205-50 = "[s]「如果你接受迴轉壽司的話，我可以請你吃到飽喔。」"
1300205-51 = "真，真的嗎？#n好，拜託了！我最喜歡迴轉壽司了！"
1300205-52 = "不過老師說要請我吃到飽……真的沒問題嗎？"
1300205-53 = "……呵呵。既然如此，那我就不客氣了♥"
1300205-55 = "進到店裡，我才明白亞伽里的話是什麼意思……"
1300205-58 = "― 嗯嗯，好吃～！[wa:1330] "
1300205-61 = "― 這麼美味的壽司，[wa:530] "
1300205-63 = "― 要我吃多少都行！[wa:680] "
1300205-66 = "― 你問我現在吃了幾盤壽司嗎？[wa:3300] "
1300205-69 = "― 呵呵，"
1300205-71 = "― 老師，你會記得你目前為止吃過多少壽司嗎？……開玩笑的。[wa:4060] "
1300205-74 = "― 唔──嗯，大概100盤吧……[wa:2670] "
1300205-76 = "― 但是，跟平時比起來我已經吃得算少了。[wa:1760] "
1300205-79 = "― 我現在連五分飽都還不到呢！[wa:1640] "
1300205-82 = "― 真的可以讓我繼續吃嗎？[wa:2090] "
1300205-84 = "― 老師的額頭從剛剛就一直在冒冷汗耶？[wa:2690] "
1300205-87 = "― 啊，這個金色盤子上的壽司，[wa:1380] "
1300205-89 = "― 肯定很好吃吧～[wa:520] "
1300205-92 = "― 老師，我可以吃這個嗎？[wa:2590] "
1300205-94 = "― 我要吃掉這個一盤1000元的壽司囉？[wa:3420] "
1300205-97 = "奇普托斯．美食街"
1300205-98 = "謝謝招待，老師！"
1300205-99 = "沒想到會因為食材用光而提早打烊，真是令人意外的結局呢。"
1300205-100 = "老師，你有吃飽嗎？我覺得我還可以再吃50盤壽司……"
1300205-102 = "那我們要不要去另一間壽司店呢？"
1300205-104 = "我開玩笑的。要是再吃下去，老師的錢包就真的危險了。"
1300205-105 = "雖然可能算不上報答，不過下次換我請老師大吃一頓吧。"
1300205-106 = "咦？你說比起我今天吃掉的金額，只請一餐完全不夠？"
1300205-107 = "呵呵，這倒也是。因為老師的食量很普通，所以光吃一餐是不夠的。"
1300205-108 = "那今後……請老師再和我一起吃幾十餐，幾百次餐囉。♥"

[translation]
1300205-1 = "นักกินจุห้ามเข้า"
1300205-2 = "ย่านอาหารคิโวทอส"
1300205-3 = "ฮืม ฮืม~ วันนี้เราจะไปร้านอาหารไหนกันดีคะ?"
1300205-4 = "วันนี้ฉันมีเงินไม่ค่อยเยอะ ฉันเลยคิดว่าจะไปที่ร้านบุฟเฟต์และกินให้อิ่มไปเลยค่ะ"
1300205-5 = "สำหรับมื้อเย็นของคืนนี้...ถ้าจะมาร้านบุฟเฟต์ก็ต้องกินยากินิกุ และถ้าจะกินยากินิกุ#nก็ต้องมาร้านบุฟเฟต์ค่ะ!"
1300205-6 = "ตอนนี้อาจจะเร็วไปหน่อย แต่ฉันจะสั่งซี่โครงเนื้อย่างมากินนะคะ"
1300205-10 = "สวัสดีค่ะ ฉันขอสั่งซี่โครงเนื้อหนึ่งที่ค่ะ"
1300205-12 = "ยินดีต้อนรับ..... เฮือก!"
1300205-14 = "(นั่นมันวานิบูชิ อาคาริ แชมป์แข่งขันการกินไม่ใช่เหรอ?!)"
1300205-15 = "(ได้ยินมาว่าการแข่งขันครั้งล่าสุดเธอกินซี่โครงเนื้อเข้าไปถึง 30 ชิ้นในชั่วพริบตา...)"
1300205-16 = "(แบบนี้ไม่ดีแล้ว... ถ้าปล่อยให้ลูกค้าแบบเธอเข้ามา ร้านอาหารของเราเจ๊งแน่!)"
1300205-18 = "คือว่า... ขอโทษนะครับคุณผู้หญิง วันนี้ซี่โครงเนื้อหมดแล้ว เรารับลูกค้าเพิ่มไม่ได้อีกแล้วล่ะครับ"
1300205-19 = "เอ๋? แต่ฉันเพิ่งเห็นลูกค้าเดินเข้ามาเลยนะคะ"
1300205-20 = "ลูกค้านั่นเป็นลูกค้าคนสุดท้ายที่เรารับ... ต้องขอโทษด้วยนะครับ!"
1300205-21 = "ถ้าของหมดจริงๆ ฉันก็คงทำอะไรไม่ได้ค่ะ#nอ่า... ฉันกะว่าวันนี้จะกินยากินิกุสักหน่อย"
1300205-22 = "ถ้างั้นไปหาของกินอย่างอื่นแทนดีกว่าค่ะ....."
1300205-24 = "เอาล่ะ น่าจะมีร้านบุฟเฟต์ซูชิอยู่แถวนี้นะ....."
1300205-25 = "ยังไงฉันก็อยากกินยากินิกุมากที่สุด...แต่พักหลังมานี้ฉันก็ไม่ค่อยได้กินซูชิเลยค่ะ"
1300205-26 = "ถ้างั้นคืนนี้ก็กินซูชิเป็นมื้อเย็นแล้วกันค่ะ!"
1300205-30 = "สวัสดีค่ะ ขอสั่งซูชิทูน่าหนึ่งที่ค่า!"
1300205-33 = "(นะ...นั่นมันวานิบูชิ อาคาริ แชมป์แข่งขันการกินใช่ไหมน่ะ?!)"
1300205-34 = "(แบบนี้แย่แน่ๆ! ถ้าฉันจะเสิร์ฟอาหารให้เธอ เราต้องใช้ทูน่าทั้งตัวและเผลอๆ ต้องใช้มากกว่านั้น#nเพื่อที่จะทำให้เธออิ่ม!)"
1300205-36 = "ขะ...ขออภัยด้วยครับ! วันนี้โต๊ะถูกจองไว้เต็มหมดแล้ว เราไม่รับลูกค้าที่ไม่ได้จองล่วงหน้า#nเพิ่มแล้วครับ!"
1300205-37 = "เอ๋? ไม่นะ..."
1300205-38 = "ถ้าโต๊ะถูกจองไว้เต็มหมดแล้ว ฉันก็คงทำอะไรไม่ได้ค่ะ ถ้างั้นก็ไปหาร้านอื่นก็แล้วกัน..."
1300205-40 = "งือ...หิวจังเลย..."
1300205-41 = "เพราะอะไรบางอย่าง ทุกที่ที่ฉันแวะไปวันนี้ไม่อาหารหมดก็ถูกจองโต๊ะเต็มหมดแล้วเลยค่ะ"
1300205-42 = "มันก็เป็นไปได้อยู่ก็เถอะ... แต่นี่พวกร้านบุฟเฟต์มารวมตัวกันต่อต้านฉันหรือยังไงกันคะเนี่ย?"
1300205-43 = "[s] \"ทำไมทำหน้าหม่นหมองแบบนั้นล่ะ?\""
1300205-44 = "อ่า คุณครูนี่เอง มาหามื้อเย็นกินเหรอคะ?"
1300205-45 = "เดิมทีฉันตั้งใจจะไปกินที่ร้านบุฟเฟต์ แต่ทุกที่ที่ฉันไปไม่ต้อนรับฉันเลยน่ะค่ะ..."
1300205-46 = "เพราะงั้นฉันก็เลยยังไม่ได้นั่งกินมื้อเย็นในร้านอาหารแบบเป็นเรื่องเป็นราวค่ะ"
1300205-47 = "[s] \"ทำไมไม่ไปร้านอาหารทั่วไปแทนร้านบุฟเฟต์ล่ะ?\""
1300205-48 = "ตอนนี้ฉันมีเงินไม่เยอะ ถ้าไปกินร้านแบบนั้นฉันก็คงกินไม่อิ่มน่ะค่ะ"
1300205-49 = "ฉะ... ฉันหิวมากเลยค่ะ ฉันแทบจะขยับตัวไม่ไหวแล้ว... ฉันควรจะเลิกหาร้านบุฟเฟต์#nแล้วหาของกินจากร้านอาหารทั่วไปแทนค่ะ"
1300205-50 = "[s] \"ถ้าโอเคกับซูชิสายพาน ครูจะให้กินได้มากเท่าที่ต้องการเลย\""
1300205-51 = "พูดจริงเหรอค่ะ?#nได้ค่ะ ตกลง! ฉันชอบซูชิสายพานมากเลยล่ะค่ะ"
1300205-52 = "แต่คุณครูสัญญาว่าจะให้ฉันกินมากเท่าไรก็ได้ที่ต้องการ... คุณครูคิดว่าจะรับมือฉันไหวเหรอคะ?"
1300205-53 = "...ฮุฮุ สัญญาต้องเป็นสัญญานะ ฉันจะไม่ปรานีหรอกนะคะ ♥"
1300205-55 = "หลังจากที่เข้าร้านซูชิได้ไม่นาน สิ่งที่อาคาริพูดเอาไว้ก็กระจ่างทันที"
1300205-58 = "― อื้ม อร่อยจังเลย~![wa:890] "
1300205-61 = "― ถ้าเป็นซูชิแบบนี้ล่ะก็...[wa:10] "
1300205-63 = "― ไม่ว่าเมื่อไหร่ ฉันก็กินได้ค่ะ![wa:10] "
1300205-66 = "― ฉันกินซูชินี่ไปกี่ชิ้นแล้วน่ะเหรอคะ?[wa:2380] "
1300205-69 = "― ฮุฮุ"
1300205-71 = "― คุณครูจำซูชิทุกชิ้นไปจนถึงตอนนี้ได้ทั้งหมดหรือเปล่าคะ?[wa:2980] "
1300205-74 = "― ฉันคิดว่าฉันกินไปได้ประมาณร้อยจานแล้ว...[wa:1630] "
1300205-76 = "― แต่นั่นก็ยังกินน้อยกว่าปกตินะคะ[wa:1240] "
1300205-79 = "― นี่ยังไม่ได้ครึ่งกระเพาะของฉันเลยค่ะ![wa:680] "
1300205-82 = "― คุณครูแน่ใจนะคะ ว่าจะไม่ว่าอะไรถ้าฉันกินอีก?[wa:770] "
1300205-84 = "― คุณครูเหงื่อไหลไม่หยุดเลย ฉันเห็นเหงื่อหยดมาที่หน้าผากของคุณครูนะคะ![wa:650] "
1300205-87 = "― อ่า~ ซูชิในจานสีทองนี่[wa:1020] "
1300205-89 = "― จะมีรสชาติเป็นยังไงนะ~[wa:10] "
1300205-92 = "―  คุณครูแน่ใจนะคะว่าไม่เป็นอะไร?[wa:1790] "
1300205-94 = "― ถ้าคุณครูไม่ว่าอะไร ฉันจะกินซูชิ 1,000 เยนนี่นะคะ[wa:2180] "
1300205-97 = "ย่านอาหารคิโวทอส"
1300205-98 = "ขอบคุณสำหรับอาหารนะคะคุณครู!"
1300205-99 = "ฉันคิดไม่ถึงเลยค่ะว่าซูชิที่พวกเขาเตรียมไว้วันนี้จะหมดเกลี้ยงแล้ว ไม่น่าเชื่อเลยล่ะค่ะ"
1300205-100 = "คุณครูกินอิ่มหรือยังน่ะคะ? ฉันว่าฉันยังกินได้อีกสัก 50 ชิ้นเลยค่ะ..."
1300205-102 = "ถ้างั้นเราไปร้านซูชิอื่นกันดีไหมคะ?"
1300205-104 = "ฮ่าฮ่า! ฉันล้อเล่นค่ะ ฉันไม่อยากให้คุณครูต้องล้มละลายหรอกค่ะ"
1300205-105 = "ฉันไม่คิดว่าจะจ่ายคืนคุณครูทั้งหมดไหว แต่ฉันจะพยายามจ่ายคืนให้มากที่สุด#nตามที่คุณครูต้องการกินในครั้งต่อไปเลยค่ะ"
1300205-106 = "คะ? คุณครูบอกว่ามื้อเดียวไม่เพียงพอกับจำนวนที่จ่ายให้ฉันไปในวันนี้เหรอคะ?"
1300205-107 = "ฮ่าฮ่า! พูดถูกแล้วค่ะ คุณครูกินไม่เยอะเท่ากับฉันนี่คะ เพราะงั้นการจ่ายคืนให้คุณครู#nแค่มื้อเดียวก็คงไม่ยุติธรรมค่ะ"
1300205-108 = "เพราะแบบนั้นแล้ว...เราต้องมากินอาหารด้วยกันไปอีกหลายๆ มื้อเลยนะคะ ♥"

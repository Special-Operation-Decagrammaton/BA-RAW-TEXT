[translation]
1300205-1 = "The Right to Refuse Gluttons"
1300205-2 = "Kivotos Dining District"
1300205-3 = "Which restaurant should we go to today?"
1300205-4 = "My wallet's pretty light today, so I think I'll go to an all-you-can-eat restaurant and load up."
1300205-5 = "For tonight's dinner...it's not all-you-can-eat without yakiniku, and it's not yakiniku if it isn't all-you-can-eat!"
1300205-6 = "It's a bit early, but I'm gonna go have some grilled short ribs."
1300205-10 = "Hello. I'd like one order of short ribs, please."
1300205-12 = "Welco—*gasp*"
1300205-14 = "(Isn't that Wanibuchi Akari, the competitive eating champion?!)"
1300205-15 = "(I heard that she devoured thirty servings of short ribs in an instant at the last event...)"
1300205-16 = "(This is bad... If I let a customer like her in, our restaurant will go out of business for sure!)"
1300205-18 = "Uh, um...I'm terribly sorry, ma'am, but we've run out of short ribs for today. We can't accept any more customers."
1300205-19 = "Really? But I just saw another customer walk in."
1300205-20 = "That customer was the last one we could let in... I'm so sorry!"
1300205-21 = "Well, I guess there's nothing I can do if you ran out. Man, I was really hoping to have some yakiniku today."
1300205-22 = "I should look for something else to eat..."
1300205-24 = "All right, there should be an all-you-can-eat sushi joint nearby..."
1300205-25 = "Yakiniku is still my top priority...but I don't get to eat sushi so often these days."
1300205-26 = "Tonight's dinner shall be sushi!"
1300205-30 = "Hello, one order of tuna sushi please!"
1300205-33 = "(I-Is that Wanibuchi Akari, the competitive eating champion?!)"
1300205-34 = "(This is bad! If I serve her, we'd need a whole tuna and then some to satisfy her appetite!)"
1300205-36 = "I-I'm sorry! Our tables are fully booked for today. We can't accept any walk-in customers!"
1300205-37 = "Really? No way..."
1300205-38 = "Well, if you're booked up, I guess that's that. I'll find another place..."
1300205-40 = "Ugh...I'm starving..."
1300205-41 = "For some reason, every place I stopped by today was either out of food or fully booked."
1300205-42 = "I guess that makes sense... But seriously, did the all-you-can-eat restaurants band together against me or something?"
1300205-43 = "[s] \"Why the long face?\""
1300205-44 = "Ah, Sensei. Are you here to grab dinner?"
1300205-45 = "I was planning to fill up at an all-you-can-eat place, but every place I went refused to serve me..."
1300205-46 = "So I still haven't gotten to sit down at a restaurant and eat dinner."
1300205-47 = "[s] \"Why don't you just go to a regular restaurant instead of an all-you-can-eat place?\""
1300205-48 = "Unfortunately, that means I won't be able to have a full meal considering how light my wallet is at the moment."
1300205-49 = "Urgh... I'm so hungry, I can hardly move... I should give up on finding an all-you-can-eat place and just get whatever I can from a regular restaurant."
1300205-50 = "[s] \"If you don't mind conveyor sushi, I'll let you eat as much as you want.\""
1300205-51 = "You mean it? Yes, of course! I'm a huge fan of conveyor sushi."
1300205-52 = "But you promised that you'll let me eat as much as I want... You really think you can handle it, Sensei?"
1300205-53 = "*chuckle* A promise is a promise. I won't go easy on you. ♥"
1300205-55 = "Soon after entering the sushi bar, I realized what Akari meant."
1300205-58 = "― Mmm. Delicious![wa:1010] "
1300205-61 = "― I could eat this sushi[wa:10] "
1300205-63 = "― every day![wa:600] "
1300205-66 = "― How much sushi have I eaten so far?[wa:2420] "
1300205-69 = "― Heehee."
1300205-71 = "― Sensei, do you remember how many pieces of sushi you've eaten in your life?[wa:2140] "
1300205-74 = "― I think I've had about a hundred plates...[wa:1550] "
1300205-76 = "― But I've been eating less than usual.[wa:1000] "
1300205-79 = "― I'm not even half-full yet![wa:1080] "
1300205-82 = "― Are you sure you don't mind if I eat more?[wa:850] "
1300205-84 = "― You've been sweating. I see beads of sweat dripping down your forehead![wa:530] "
1300205-87 = "― Ooh... I wonder what the sushi[wa:700] "
1300205-89 = "― on this golden plate would taste like![wa:10] "
1300205-92 = "― Sensei, are you sure you're okay?"
1300205-94 = "― I'm gonna eat this 1,000-yen sushi if that's okay with you![wa:1780] "
1300205-97 = "Kivotos Dining District"
1300205-98 = "Thanks for the meal, Sensei!"
1300205-99 = "I didn't expect them to run out of all the sushi they'd prepared for the day. Who would've thought?"
1300205-100 = "Have you had enough, Sensei? I feel like I could still take down fifty more pieces..."
1300205-102 = "Should we go to another sushi joint?"
1300205-104 = "Haha! I'm just kidding. I don't wanna put your wallet in jeopardy."
1300205-105 = "I don't think it'll be enough to pay you back, but I'll cover as much as you want to eat next time."
1300205-106 = "Wait, what? You mean one meal won't cover how much you spent on me today?"
1300205-107 = "Haha! You're right about that. Your portion isn't nearly as huge as mine, so paying for only one of your meals wouldn't be fair."
1300205-108 = "So then...we'll have to eat a whole bunch of meals together. ♥"

1300205-48 = "3;아카리;04;하지만 제가 만족할 만큼 음식을 사 먹기에는 지갑의 돈이 부족한걸요."
1300205-49 = "3;아카리;04;으으…… 너무 오랫동안 굶었더니 온 몸에 힘이 들어가지가 않아요……. #n아무래도 무한리필 가게는 포기하고 적당한 음식점에서 배를 채워야겠어요.\n#3;em;[땀]\n#3;stiff"
1300205-50 = "[s] \"회전 초밥이라도 괜찮다면 내가 만족할 때까지 먹게 해줄게.\""
1300205-51 = "3;아카리;03;정말이요? #n네, 좋아요! 저도 회전초밥은 정말 좋아하거든요.\n#3;em;[반짝]\n#3;jump"
1300205-52 = "3;아카리;01;하지만 만족할 때까지 식사를 사주시겠다니…… 선생님이야 말로 괜찮으신가요?"

1300205-3 = "3;아카리;99;흥, 흥~ 오늘은 어느 음식점에 갈까요? \n#3;em;[음표]"
1300205-4 = "3;아카리;01;오늘은 주머니 사정도 여의치 않으니 적은 돈으로도 마음껏 먹을 수 있는 무한리필이 가능한 가게에 가는 게 좋겠네요."
1300205-5 = "3;아카리;02;메뉴는 역시…… 무한리필하면 야키니쿠, 야키니쿠하면 무한리필이죠!\n#3;greeting\n#3;em;[반짝]"
1300205-6 = "3;아카리;03;그럼 조금 이른 시간이지만 야키니쿠 가게에서 갈비를 구워 먹도록 할까요.\n#3;hophop"

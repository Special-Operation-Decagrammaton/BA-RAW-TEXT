[translation]
34100-1 = "ตอนที่ 10;ไปยังเขตปกครองตนเองอาเรียส 2"
34100-2 = "...... เราจะผ่านอุโมงค์ใต้ดินไปยังทางเข้าสุสานใต้ดิน"
34100-3 = "แต่ว่า... ดูจากการเคลื่อนไหวของกองกำลังเมื่อกี๊แล้ว <ผู้หญิงคนนั้น> น่าจะรู้ว่าเราจะใช้เส้นทางนี้"
34100-4 = "อืม... คงจะเตรียมรับมือไว้ล่วงหน้าแล้วละสิ"
34100-5 = "ไม่ต้องคิดให้มันยุ่งยากก็น่าจะรู้ว่าสำหรับเรามีเพียงทางเข้านี้ทางเดียวเท่านั้น"
34100-6 = "เป็นข้อมูลที่คนฝั่งนี้น่าจะรู้กันหมด ไม่เห็นต้องตกอกตกใจอะไร"
34100-7 = "ถะ... ถ้างั้นเอายังไงดีคะ?"
34100-8 = "มันไม่มีทางอ้อมอื่นแล้ว และเราก็ไม่มีเวลาหาทางเข้าอื่นของสุสานใต้ดินด้วย"
34100-14 = "เราต้องฝ่าไปให้ได้"
34100-15 = "ก็คงต้องเป็นแบบนั้น... ยังไงซะทั้งสองฝ่ายก็คิดเหมือนกัน แต่เราก็มีคุณครูจาก <ชาเล่ต์> นี่นะ"
34100-16 = "แหะๆๆ... งะ... งั้นเหรอคะ... งั้นก็ รบกวนด้วยนะคะ... "
34100-17 = "[s] \"หืม... ครูสิต้องรบกวน...?\""
34100-21 = "ทหารชั้นหนึ่งที่เชี่ยวชาญคงรออยู่ข้างหน้า "
34100-22 = "เราจะนำไปก่อนเอง ถ้าครูพร้อมแล้วก็ตามมานะ"
34100-23 = "นี่จะเป็นการต่อสู้ที่ยากลำบาก แต่เราต้องฝ่าตรงนี้ไปให้ได้ จะได้ไปถึงเขตปกครองตนเองอาเรียส"
34100-24 = "งั้นก็มาเริ่มกันเลย"

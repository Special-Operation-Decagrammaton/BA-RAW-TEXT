[translation]
34100-1 = "第10話;前往奧利斯自治區（２）"
34100-2 = "……接下來要從這裡透過地下通道進入地下墓穴的入口。"
34100-3 = "不過……從剛才的樣子看來，「她」似乎也已經知道我們會使用這條道路了。"
34100-4 = "……沒錯，恐怕早就有所準備了吧。"
34100-5 = "嘛，這也是稍微想一下就知道的事。"
34100-6 = "畢竟這裡是奧利斯的學生都知道的入口。"
34100-7 = "那，那該怎麼辦呢？"
34100-8 = "雖然這麼說，也沒時間繞遠路了，當然也沒有尋找其他入口的時間。"
34100-14 = "強行突破吧。"
34100-15 = "……也只能這樣了。我們雙方都是這麼想的吧。不過我們這裡可是有「夏萊」的老師。"
34100-16 = "嘿嘿……對，對呀。請多指教……"
34100-17 = "[s] 「咦，呃，嗯。也請你多多指教……？」"
34100-21 = "前方應該會有訓練過的菁英士兵在等著我們才對。"
34100-22 = "由我們打頭陣，老師就在確認安全後跟在我們後面吧。"
34100-23 = "雖然可能會是嚴峻的戰鬥，不過只要突破這裡就能進入奧利斯自治區了。"
34100-24 = "走吧。"

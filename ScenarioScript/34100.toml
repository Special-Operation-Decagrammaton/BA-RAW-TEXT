[translation]
34100-1 = "第10話;アリウス自治区へ（２）"
34100-2 = "……ここから地下道を通ってカタコンベの入り口に入る。"
34100-3 = "でも……さっきの様子を見るに、「彼女」も私たちがこの通路を使うだろうことは分かってるみたいだね。"
34100-4 = "……ああ。おそらく準備されているだろうな。"
34100-5 = "まあ、少し考えれば分かることか。"
34100-6 = "そもそも、アリウスの生徒なら誰でも知ってる入り口だし。"
34100-7 = "そ、それではどうしましょう？"
34100-8 = "そうは言っても迂回路は無いし、当然他の入り口を探す時間もない。"
34100-14 = "強行突破する。"
34100-15 = "……だね。どうせ向こうも私たちも、考えは同じ。でも私達には「シャーレ」の先生がいる。"
34100-16 = "へへ……そ、そうですね。よろしくお願いします……。"
34100-17 = "[s] \"え、う、うん。こちらこそ……？\""
34100-21 = "この先には訓練されたエリート兵が待ち受けているはずだ。"
34100-22 = "我々が先頭に立つ。先生は安全が確保されたら、後ろからついてこい。"
34100-23 = "厳しい戦いになるが、ここを突破すればアリウス自治区に入れる。"
34100-24 = "行くぞ。"

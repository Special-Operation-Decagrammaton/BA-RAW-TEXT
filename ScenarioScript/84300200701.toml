[translation]
84300200701-6 = "คุณคือมิคาโมะ เนรุ... หรือเปล่าคะ?"
84300200701-10 = "หืม? อะไรกัน รู้จักชื่อฉันด้วยเหรอ? ผิดคาดเลยแฮะ"
84300200701-11 = "ใช่จริงด้วยนะคะ ก็นะ... ก็คุณเป็นคนดังนี่คะ"
84300200701-12 = "ไม่มีใครไม่รู้จักหัวหน้า C&C แห่งมิลเลเนียมหรอกค่ะ"
84300200701-13 = "ฮ่าฮ่า...! งั้นเหรอ? เขินอยู่เหมือนกันแฮะ! ฮิฮิ"
84300200701-14 = "..."
84300200701-15 = "แต่ว่าตอนนี้พวกเราคือสายลับนะ... จะโอเคมั้ยเนี่ย..."
84300200701-16 = "... "

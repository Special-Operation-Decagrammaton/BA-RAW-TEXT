1009003-19 = "5;우미카;17\n#5;a"
1009003-20 = "[ns] \"그런데, 웬일로 손님이 없네……?\""
1009003-21 = "5;우미카;17;그러게요. 하지만 가끔씩 이럴 때가 생기곤 해요."
1009003-22 = "5;우미카;17;자주는 아니지만, 일주일에 한두 번 정도일까요?"
1009003-23 = "5;우미카;07;네? 이왕 이렇게 된 거, 여기에 앉아서 쉬라고요? 그렇지만, 그건 조금…….\n#5;em;[?]"
1009003-24 = "5;우미카;16;네에? 선생님께서 허락할 테니 괜찮다고요……?\n#5;stiff"

[translation]
1009003-1 = "ในอดีตฉันเคยเป็นเด็กแบบนั้นค่ะ"
1009003-4 = "ว้าว คุณครู!"
1009003-5 = "ยินดีต้อนรับสู่ร้านเฮียกคิยาโคค่ะ~ จะรับอะไรดีคะ?"
1009003-6 = "วันนี้เมนูดั้งเดิมที่เราแนะนำคืออันมิตสึสตรอว์เบอร์รี่ค่ะ นอกจากนั้นก็มีขนมยัทสึฮาชิ ขนมปังถั่วแดง มันจู ไดฟุกุ..."
1009003-7 = "แล้วก็มีชาเขียวที่ทานด้วยกันแล้วยิ่งอร่อยด้วยนะคะ!"
1009003-8 = "[s1] \"ถ้างั้น... ครูขออะไรที่ไม่หวาน!\"\n[s2] \"ถ้างั้น... ครูขออะไรที่หวานๆ หน่อยแล้วกัน!\""
1009003-11 = "ค่ะ! ได้เลยค่ะ! ช่วยรอสักครู่นะคะ!"
1009003-20 = "[ns] \"ว่าแต่... ทำไมวันนี้ไม่มีลูกค้าเลยล่ะ?\""
1009003-21 = "นั่นสิคะ แต่บางทีก็เป็นแบบนี้ละค่ะ"
1009003-22 = "ถึงจะไม่บ่อยนัก แต่ก็สักอาทิตย์ละวันสองวันค่ะ"
1009003-23 = "คะ? ถ้าวันนี้ไม่มีลูกค้า ก็ให้ฉันมานั่งพักตรงนี้ด้วยกันเหรอคะ? แต่ว่า แบบนั้นมัน..."
1009003-24 = "คะ? คุณครูอนุญาตแล้ว เพราะงั้นไม่เป็นไรงั้นเหรอคะ...?"
1009003-28 = "ถะ... ถ้างั้น... ฉันขอ... เสียมารยาทหน่อยนะคะคุณครู"
1009003-35 = "ฮู่ว... พอได้นั่งก็รู้สึกดีจริงๆ ด้วยค่ะ... พอดีฉันกำลังเจ็บขาน่ะค่ะ..."
1009003-36 = "[s] \"ครูก็ว่าน่าจะเป็นอย่างนั้น\""
1009003-37 = "คุณครูนี่ใจดีจังเลยนะคะ... แถมยังใส่ใจคนอื่นอีก..."
1009003-38 = "อีก 3 วันข้างหน้าจะมีการจัดงานเทศกาลสาหร่ายมาริโมะที่ทะเลสาบน่ะค่ะ พอฉันเสร็จงานของร้าน#nเฮียกคิยาโคก็ต้องไปเตรียมงานเทศกาลต่อเลย"
1009003-39 = "ไหนจะต้องเข้าเรียนและเตรียมอ่านหนังสือสอบอีก..."
1009003-40 = "[s3] \"งานที่ร้านกับเทศกาลก็ยังพอไหว แต่พอมีเรียนกับสอบด้วย...\"\n[s4] \"อุมิกะเป็นนักเรียนที่ดีจังเลยนะ ทำเอาครูประทับใจเลย...\""
1009003-43 = "อ๊ะ... คุณครู?! ถ้าทำหน้าซึ้งแบบนั้นฉันจะลำบากเอานะคะ!"
1009003-44 = "แต่ยังไงเรื่องการเรียนก็เป็นหน้าที่หลักของนักเรียนอยู่แล้ว การเข้าเรียนและสอบก็เป็นเรื่องธรรมดา#nอยู่แล้วค่ะ"
1009003-48 = "ทำไมยิ่งทำหน้าเหมือนจะร้องไห้กว่าเดิมล่ะคะ?!"
1009003-54 = "[ns] \"แล้วเรื่องเตรียมงานเทศกาลน่ะราบรื่นดีมั้ย?\""
1009003-55 = "ค่ะ ราบรื่นดีค่ะ"
1009003-56 = "แหะๆ... ถึงแม้จะบอกว่าเตรียมงานได้ราบรื่น แต่ก็ไม่ได้หมายความว่างานจะน้อยลงหรอกค่ะ"
1009003-57 = "แต่ยังไง... นั่นก็เป็นส่วนหนึ่งของงานเทศกาลนี่คะ!"
1009003-58 = "คะ? ทำไมฉันถึงชอบงานเทศกาลถึงขนาดนี้... เหรอคะ?"
1009003-59 = "ฮุฮุ..."
1009003-65 = "ไม่หรอกค่ะ ฉันแค่นึกถึงสมัยก่อนน่ะค่ะ"
1009003-66 = "ตอนเด็กๆ... ฉันเติบโตมาในชนบทค่ะ"
1009003-67 = "ที่นั่นทั้งอากาศดีและเงียบสงบ... แต่ก็ไม่ได้มีอะไรน่าสนุกมากเท่าไรน่ะค่ะ"
1009003-68 = "เพราะถึงจะมีบรรยากาศเงียบๆ และผ่อนคลาย แต่เด็กๆ ก็อยากได้อะไรที่ตื่นเต้นใช่มั้ยล่ะคะ?"
1009003-69 = "[s] \"ผู้ใหญ่ก็ชอบอะไรที่ตื่นเต้นนะ!\""
1009003-70 = "งะ... งั้นเหรอคะ...?!"
1009003-74 = "สำหรับเด็กๆ ที่เติบโตมาในชนบทแล้ว งานเทศกาลที่จัดขึ้นปีละ 1-2 ครั้งถือว่าเป็นสิ่งที่พวกเราคาด#nหวังมากที่สุดแล้วค่ะ"
1009003-75 = "ทั้งหมู่บ้านจะเตรียมงานเทศกาลกันล่วงหน้าประมาณ 1 เดือนค่ะ พวกเราทั้งตัดไม้ไผ่มาทำกระดาษ จากนั้นก็ย้อมสีกระดาษแล้วทำเกี้ยวขึ้นมา..."
1009003-76 = "น่าจะตั้งแต่ตอนนั้นน่ะค่ะที่ฉันเป็นเด็กที่เตรียมงานเทศกาลเร็วกว่าใครๆ ในหมู่บ้าน"
1009003-77 = "แล้วฉันก็ได้มาที่เฮียกคิยาโคและเรียนรู้อะไรมากมาย และระหว่างนั้นก็มีสิ่งต่างๆ เปลี่ยนไปเยอะเลย#nเช่นกัน..."
1009003-78 = "แต่ยังไงฉันก็ยังคงชอบงานเทศกาลมากที่สุดเหมือนเดิมค่ะ"
1009003-79 = "และที่สำคัญ ฉันศึกษาเกี่ยวกับงานเทศกาลที่จัดขึ้นในแต่ละเขตของคิโวทอสได้อย่างอิสระด้วยค่ะ และถ้ามีโอกาส ฉันก็สามารถขอไปเก็บข้อมูลนอกสถานที่แล้วไปเที่ยวงานเทศกาลนั้นๆ ได้ด้วยค่ะ"
1009003-80 = "แม้ว่าการวางแผนและเตรียมงานเทศกาลจะเป็นเรื่องที่ยากมากๆ และฉันยังมีอีกหลายสิ่งที่ต้องเรียนรู้#nจากร้านเฮียกคิยาโคก็เถอะค่ะ..."
1009003-81 = "แต่ถ้าได้ยินคำว่า 'งานเทศกาล' ละก็ ฉันจะรู้สึกเหมือนสมองจะไม่ประมวลผลเรื่องอื่นนอกจากเรื่องนี้#nเลยค่ะ!"
1009003-82 = "เพราะแบบนั้นฉันเลยเอาแต่พูดเรื่องงานเทศกาลแบบไม่สนใจคนอื่น บางครั้งก็มีคนบอกว่าฉันทำลาย#nบรรยากาศด้วยนะคะ..."
1009003-83 = "[s] \"แต่ครูว่า... ก็ไม่ใช่เรื่องไม่ดีนะ?\""
1009003-87 = "จริงเหรอคะ...?"
1009003-88 = "[s] \"อื้ม ไม่ได้ทำใครเจ็บตัวสักหน่อย\""
1009003-89 = "แต่ว่า... ฉันเองก็รู้ตัวอยู่ค่ะว่าเวลาตัวเองเป็นแบบนั้น ฉันจะไม่ค่อยสังเกตสิ่งรอบตัว แล้วก็ออกจะพูดอะไรเพี้ยนๆ ไปด้วยค่ะ..."
1009003-90 = "[s5] \"ครูคิดว่าการจดจ่อกับอะไรได้ขนาดนั้นมันไม่ได้ทำกันง่ายๆ เลยนะ\"\n[s6] \"มันเหมือนว่าเราได้รับพรที่ล้ำค่ามาเลย\""
1009003-97 = "จริงเหรอคะ...?"
1009003-98 = "ถ้าคุณครูพูดถึงขนาดนั้น ก็น่าจะจริงใช่มั้ยคะ...?"
1009003-99 = "แหะๆๆ ขอบคุณค่ะคุณครู ฉันรู้สึกโล่งใจขึ้นมาหน่อยแล้วค่ะ"
1009003-100 = "นะ... แน่นอนว่าตอนนี้ฉันยังทำงานในฐานะพนักงานของร้านเฮียกคิยาโคอยู่ ฉันก็จะทำงานนี้ให้เต็มที่#nที่สุดค่ะ!"
1009003-105 = "แต่ว่า... ไม่มีลูกค้าเลยนะคะ..."
1009003-112 = "สวัสดี~ วันนี้มีเมนูอะไรแนะนำบ้างเหรอ~?"
1009003-114 = "อ๊ะ ลูกค้ามาแล้วค่ะ! ฉันจะไปรับลูกค้าก่อนนะคะคุณครู!"
1009003-118 = "เชิญเลยค่ะ! ฉันจะพาไปที่โต๊ะนะคะ!"
1009003-122 = "(ร้านเฮียกคิยาโคมีลูกค้าเต็มร้านในชั่วพริบตา)"
1009003-123 = "(คุณครูเฝ้าดูอุมิกะที่ทำงานอย่างขะมักเขม้น จากนั้นก็จ่ายเงินและกลับไปยังชาเล่ต์)"

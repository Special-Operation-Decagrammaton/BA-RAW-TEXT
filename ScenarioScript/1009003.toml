1009003-54 = "[ns] \"축제 준비는 잘 되어 가?\""
1009003-55 = "3;우미카;01;네. 순조로워요.\n#3;closeup"
1009003-56 = "3;우미카;03;에헤헤…… 순조롭다고 해서 일이 줄어드는 건 아니긴 하지만요.\n#3;closeup"
1009003-57 = "3;우미카;00;그래도 뭐, 그런 것까지 포함해서, 축제인 거니까요!\n#3;closeup\n#3;em;[음표]"
1009003-58 = "3;우미카;02;네? 어째서 그렇게까지 축제를 좋아하느냐…… 고요?\n#3;closeup"

[translation]
1009003-1 = "I Used To Be a Kid Like That"
1009003-4 = "Yay, Sensei!"
1009003-5 = "Welcome to Momoyodou! What would you like to order?"
1009003-6 = "We have all kinds of traditional treats! Strawberry anmitsu, yatsuhashi, red bean buns, manju, sticky rice cakes..."
1009003-7 = "And matcha to wash it down!"
1009003-8 = "[s1] \"How about...something not too sweet!\"\n[s2] \"Give me something sweet!\""
1009003-11 = "All right! Order up! Please wait a moment!"
1009003-20 = "[ns] \"That's odd... There aren't many customers here today?\""
1009003-21 = "I agree... But we have days like this sometimes."
1009003-22 = "It's not too often, thankfully, but maybe once or twice a week?"
1009003-23 = "What? You want me to sit down and take a break? I couldn't..."
1009003-24 = "Huh? It's okay if I have your permission...?"
1009003-28 = "W-Well then... I guess I'll go ahead and rest a little..."
1009003-35 = "*sigh*...Sitting down feels so good. My legs were aching..."
1009003-36 = "[s] \"I figured as much.\""
1009003-37 = "You're always so kind...and thoughtful too..."
1009003-38 = "Oh, right. There's a marimo festival at the lake in three days, so I need to prepare for it after Momoyodou closes."
1009003-39 = "I also need to attend some lectures, and prepare for exams in between all that."
1009003-40 = "[s3] \"Handling Momoyodou and a festival might be manageable, but lectures and exams on top of that?\"\n[s4] \"You're a model student, Umika. I'm impressed.\""
1009003-43 = "Ah, Sensei! Don't cry! I'll feel really awkward if I make you cry!"
1009003-44 = "Students are expected to learn and study. That's just common sense..."
1009003-48 = "Sensei, why are you crying even harder?!"
1009003-54 = "[ns] \"Are the festival preparations going well?\""
1009003-55 = "Yep, they're coming along smoothly."
1009003-56 = "Heeheehee... But that doesn't mean there's less work to do."
1009003-57 = "Still, work is just another part of what makes a festival!"
1009003-58 = "Hmm? Why do I love festivals so much?"
1009003-59 = "...Heehee."
1009003-65 = "Well, they just bring back memories."
1009003-66 = "When I was young, I lived in the countryside."
1009003-67 = "The air was clean, and everything was tranquil...but there wasn't really much to do."
1009003-68 = "It was relaxing, but you know, as a kid you want something exciting!"
1009003-69 = "[s] \"Hey, adults want excitement too!\""
1009003-70 = "I-Is that so?!"
1009003-74 = "Well to a child raised in the country, the festivals that happened once or twice a year were the most exciting thing around."
1009003-75 = "About a month before the festival, the entire village would begin preparations. We'd cut bamboo and crafting paper, dye fabrics, and build the palanquin..."
1009003-76 = "I think back then was when it all started. Before I realized it, I was the kid who worked harder and faster to prepare for festivals than anyone else in the village."
1009003-77 = "Eventually I went to Hyakkiyako. I've learned a lot, and many things have changed, but..."
1009003-78 = "Festivals are still one of my favorites."
1009003-79 = "I can research festivals in Kivotos whenever I want. And if I plan ahead, I can experience them myself under the banner of a field trip."
1009003-80 = "Planning and preparing a festival is no cakewalk though. I still have a lot to learn at Momoyodou, but..."
1009003-81 = "Whenever I hear the word festival, I still feel a rush of excitement!"
1009003-82 = "Though, a lot of folks say my fixation makes me a little ditzy. Or that I kill the mood with festival talk..."
1009003-83 = "[s] \"Is that a problem?\""
1009003-87 = "Shouldn't it be...?"
1009003-88 = "[s] \"If no one's getting hurt, I don't think so.\""
1009003-89 = "But every time I get festival fever, I lose track of my surroundings and my mind goes blank..."
1009003-90 = "[s5] \"You have a mind that can dedicate tons of energy to a single focus.\"\n[s6] \"I think that's a blessing.\""
1009003-97 = "...Really?"
1009003-98 = "If Sensei says, it must be true...right?"
1009003-99 = "Heeheehee. Thanks, Sensei. I feel a little better now."
1009003-100 = "O-Of course, now that I'm working at Momoyodou, I'll do my best here too!"
1009003-105 = "...Though, we still haven't had many customers today..."
1009003-112 = "Hello! What's today's special?"
1009003-114 = "Oh, a customer! I'm off to work now, Sensei!"
1009003-118 = "Welcome! Let me help you find your seat!"
1009003-122 = "In a flash, Momoyodou was packed with customers again."
1009003-123 = "After observing Umika's work, I paid my bill, then returned to Schale."

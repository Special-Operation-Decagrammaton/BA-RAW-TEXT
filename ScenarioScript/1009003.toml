1009003-1 = "#title;과거의 저는 그런 아이였답니다."
1009003-2 = "#wait;1000"
1009003-3 = "#wait;1000"
1009003-4 = "3;우미카;00;와아, 선생님!\n#3;al\n#3;em;[반짝]"
1009003-5 = "3;우미카;03;백야당에 어서 오세요~ 주문은 뭘로 하시겠어요?\n#3;greeting"
1009003-6 = "3;우미카;99;전통적인 추천 메뉴 딸기 안미츠도 있고, 야츠하시에 팥빵에 만쥬, 찹쌀떡……."
1009003-7 = "3;우미카;03;곁들여 드시면 좋을 말차도 있답니다!\n#3;em;[하트]"
1009003-8 = "[s1] \"그러면…… 무언가 달지 않은 걸로!\"\n[s2] \"그러면…… 무언가 달콤한 걸로!\""

1009003-63 = "#wait;1000"
1009003-64 = "3;우미카;01\n#3;a\n#wait;1000"
1009003-65 = "3;우미카;01;아뇨, 아뇨. 그냥, 조금, 옛날 생각이 나서요."
1009003-66 = "3;우미카;00;어렸을 때 저는…… 시골 출신이었어요."
1009003-67 = "3;우미카;99;공기도 좋고, 한적했지만……. 아무래도, 즐길 게 그다지 많지 않았죠."
1009003-68 = "3;우미카;01;평화롭고 한가로웠지만, 그, 있잖아요? 어린아이들은 뭔가 신나는 걸 바라잖아요?"
1009003-69 = "[s] \"어른도 신나는 거 좋아해!\""
1009003-70 = "3;우미카;07;그, 그러신가요……?!\n#3;em;[땀]\n#3;stiff"
1009003-71 = "#st;[0,0];instant;1;"
1009003-72 = "#clearST"
1009003-73 = "3;우미카;99\n#3;em;[...]\n#wait;2500"
1009003-74 = "3;우미카;99;시골에서 자랐던 어린아이에게는, 1년에 한두 번 열리는 축제가, 가장 큰 기댓거리였어요."
1009003-75 = "3;우미카;01;온 마을이 한 달 정도 전부터 축제를 준비하고, 대나무를 베어 오거나, 종이를 만들어 오리거나, 염색을 하거나, 가마를 만들거나……."
1009003-76 = "3;우미카;00;그때부터였던 것 같아요. 저는 어느새, 마을에서 누구보다 빨리, 그리고 많이 축제를 준비하는 아이가 되어 있었죠."
1009003-77 = "3;우미카;99;저는 이렇게, 백귀야행으로 와서 많은 것을 배우고, 많은 것이 변하게 되었지만……."
1009003-78 = "3;우미카;03;그래도, 여전히 축제가 가장 좋아요.\n#3;greeting\n#3;em;[반짝]"
1009003-79 = "3;우미카;10;무엇보다 말이죠? 키보토스 각지의 축제에 대해 언제든 자유롭게 조사할 수도 있고 말이죠? 기회를 잘 잡으면 견학이라는 이유로 직접 찾아가서 체험해 볼 수도 있고요?\n#3;hophop"
1009003-80 = "3;우미카;99;실제로 축제를 기획하고 준비하는 건 매우 힘든 일이고, 백야당에서 배울 것도 아직 산더미같이 많지만……."
1009003-81 = "3;우미카;03;그래도, 아직 '축제' 라는 단어를 들으면, 머릿속 어딘가가 좋은 의미로 마비되어 버리는 느낌이 들거든요!\n#3;em;[음표]"
1009003-82 = "3;우미카;15;그 때문에 눈치가 조금 부족하다든가 가끔씩 분위기를 깬다든가 하는 말을 들을 때도 있지만요…….\n#3;stiff"
1009003-83 = "[s] \"뭐, 괜찮지 않을까?\""
1009003-84 = "#st;[0,0];instant;1;"
1009003-85 = "#clearST"
1009003-86 = "3;우미카;07\n#3;em;[?]\n#wait;1500"
1009003-87 = "3;우미카;07;정말, 요……?"
1009003-88 = "[s] \"난 그렇다고 생각해. 누군가 다치는 것도 아니고.\""
1009003-89 = "3;우미카;11;하지만, 저, 스스로도 자각하고 있지만, 그럴 때마다 주위가 보이지 않게 되거나 머리가 어떤 의미로 바보가 되어 버리거나 하는걸요……."
1009003-90 = "[s5] \"그렇게까지 한 가지에 몰두할 수 있는 것도.\"\n[s6] \"내가 보기에는…… 축복받은 거야.\""

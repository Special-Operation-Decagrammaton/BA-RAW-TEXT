[translation]
1009003-1 = "過去的我就是那種孩子"
1009003-4 = "哇，老師！"
1009003-5 = "歡迎光臨百夜堂～您要點什麼呢？"
1009003-6 = "傳統的推薦菜單有草莓餡蜜、八橋、銅鑼燒、饅頭跟大福……"
1009003-7 = "還有適合搭配的抹茶！"
1009003-8 = "[s1]「那麼……就給我來點不甜的吧！」\n[s2]「那麼……就給我來點甜的吧！」"
1009003-11 = "是！感謝您的點餐！麻煩您稍等哦！"
1009003-20 = "[ns]「話說好像沒什麼客人呢……？」"
1009003-21 = "就是說啊。不過偶爾也會有這種時候。"
1009003-22 = "雖然不是很頻繁，大約一週會有兩次吧？"
1009003-23 = "嗯？既然這樣就坐在這裡休息一下？#n可是這樣好像有點……"
1009003-24 = "咦咦？有老師同意就沒關係……？"
1009003-28 = "那，那麼老師。#n我，我就打擾囉……？"
1009003-35 = "呼啊啊……能坐下真是太好了……我的腿好痛……"
1009003-36 = "[s]「我就知道。」"
1009003-37 = "老師真善良呢……而且還很貼心……"
1009003-38 = "因為三天之後就要在湖邊舉行毬藻慶典，百夜堂關門之後還得準備慶典的東西。"
1009003-39 = "同時還要抽空上課，還有準備考試……"
1009003-40 = "[s3]「不只要忙百夜堂和慶典，還要兼顧上課和考試……」\n[s4]「海花是模範生呢……老師好感動……」"
1009003-43 = "老，老師！？#n要是真的哭出來的話，我會很困擾的！？"
1009003-44 = "學習本來就是學生的本分，該說那是理所當然的，還是該說是常識呢……"
1009003-48 = "怎麼感覺老師更想哭了──！？"
1009003-54 = "[ns]「慶典準備得還順利嗎？」"
1009003-55 = "是，很順利。"
1009003-56 = "耶嘿嘿……不過雖然順利，也不代表事情會減少。"
1009003-57 = "但是那些也同樣是慶典的一部分！"
1009003-58 = "咦？問我為什麼那麼喜歡慶典……？"
1009003-59 = "……呵呵。"
1009003-65 = "啊，沒什麼。只是突然想起以前的事。"
1009003-66 = "小時候的我……生活在鄉下。"
1009003-67 = "空氣很好，也很安靜……不過能享受的東西並不多。"
1009003-68 = "雖然很和睦很悠閒……#n不過老師你也知道，孩子們不是都會期待快樂的事嗎？"
1009003-69 = "[s]「大人也期待快樂的事！」"
1009003-70 = "是，是嗎……！？"
1009003-74 = "對於在鄉下長大的孩子來說，一年一兩次的慶典就是最期待的事了。"
1009003-75 = "全村的人大約在一個月前就會開始準備慶典，砍竹子、造紙、染色、做轎子……"
1009003-76 = "可能是從那個時候開始的吧。#n不知不覺間，我成了村裡最快、準備最多慶典的孩子。"
1009003-77 = "來到百鬼夜行之後學到了很多東西，也發生了許多改變……"
1009003-78 = "不過即便如此，我還是最喜歡慶典。"
1009003-79 = "現在不只可以自由調查奇普托斯各地的慶典，#n有機會的話，也可以用見習的名義親自去體驗！"
1009003-80 = "實際上企劃和準備慶典是一件相當辛苦的事情，雖然從百夜堂學到的東西也不少……"
1009003-81 = "不過只要聽到「慶典」這兩個字，就感覺腦袋裡的某個部分被正面的心情給麻痺了！"
1009003-82 = "雖然偶爾會因此聽到我不會看臉色，或者說我破壞氣氛的話……"
1009003-83 = "[s]「嗯，那也沒什麼不好吧？」"
1009003-87 = "真的，嗎……？"
1009003-88 = "[s]「至少我是這麼認為。反正又沒有人受傷。」"
1009003-89 = "不過我自己也有意識到這件事。#n那個時候的我會不顧周圍的氣氛，某種意義上就像笨蛋一樣……"
1009003-90 = "[s5]「能夠如此專注於某件事上……」\n[s6]「在我看來……是件值得高興的事哦。」"
1009003-97 = "……真的嗎？"
1009003-98 = "老師都這麼說了，應該沒錯吧……？"
1009003-99 = "呵呵呵。謝謝你，老師。感覺心裡舒服多了。"
1009003-100 = "當，當然現在作為百夜堂的員工，我也會盡我最大的努力！"
1009003-105 = "……話是這麼說，但是沒有客人呢……"
1009003-112 = "你好～請問今天推薦的菜單有什麼呢～？"
1009003-114 = "啊，有客人來了！#n那麼老師，我先回去囉！"
1009003-118 = "歡迎光臨！我來幫您帶位！"
1009003-122 = "（百夜堂再次坐滿了客人）"
1009003-123 = "（看著忙碌的海花，結完帳後回到了夏萊）"

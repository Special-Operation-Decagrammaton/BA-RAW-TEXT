1009003-35 = "3;우미카;15;하아아……. 앉으니까 역시 좋네요……. 다리 아팠어요…….\n#3;closeup\n#3;em;[한숨]"
1009003-36 = "[s] \"그럴 것 같더라.\""
1009003-37 = "3;우미카;01;선생님은 친절하시네요……. 배려심도 넘치시고요…….\n#3;closeup"
1009003-38 = "3;우미카;00;안 그래도 3일 후에, 호수에서 마리모 축제가 열릴 예정이라, 백야당 영업이 끝난 뒤에도 축제 준비를 해야 하거든요.\n#3;closeup"
1009003-39 = "3;우미카;11;거기에 틈틈이 강의도 들어야 하고, 시험 준비도 해야 하고…….\n#3;closeup\n#3;em;[세로선]"
1009003-40 = "[s3] \"백야당과 축제까지라면 모르겠지만, 강의에 시험까지라니…….\"\n[s4] \"우미카는 모범생이구나……. 선생님, 감동했단다…….\""
1009003-41 = "#wait;100"
1009003-42 = "#wait;100"
1009003-43 = "3;우미카;07;어, 선생님?! 진짜로 울먹이시면 제가 곤란한데요?!\n#3;closeup\n#3;stiff\n#3;em;[///]"
1009003-44 = "3;우미카;99;하지만 공부는 학생의 본분이고, 그건 당연한 일이라고 할까 상식이라고 할까…….\n#3;closeup"
1009003-45 = "#st;[0,0];instant;1;"
1009003-46 = "#clearST"
1009003-47 = "3;우미카;09\n#3;em;[?]\n#3;closeup\n#wait;1000"
1009003-48 = "3;우미카;16;왜 거기에서 더 울먹이시는 거죠–?!\n#3;closeup\n#3;shake\n#3;em;[?!]"

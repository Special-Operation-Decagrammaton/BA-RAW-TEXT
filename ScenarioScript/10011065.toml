[translation]
10011065-8 = "Heeheehee. Well done, everyone! You've passed!"
10011065-12 = "The Ninjutsu of Mindlessness worked...!"
10011065-13 = "Nice going, Tsukuyo!"
10011065-14 = "Wh-What a relief...!"
10011065-16 = "I just realized. She's not mind reading. She's just adept at reading and picking up on other people's emotions."
10011065-17 = "And what happened earlier was just an extension of that."
10011065-18 = "[s] \"It makes sense. Mimori's has a good heart, and she's always thinking of others.\""
10011065-19 = "Oh, dear. Thank you for your kind words, Sensei."
10011065-20 = "Well naturally, this mind-reading bit is just a feature of the event."
10011065-21 = "There's no such thing as actually reading people's minds!"
10011065-22 = "Congratulations again to the Ninjutsu Research Club for passing the trial!"
10011065-23 = "We're good? Great. Let's get outta here."
10011065-24 = "Oh, but Michiru."
10011065-25 = "Uh...yes?"
10011065-26 = "I'm just a volunteer actor in this event, so this may not be my place to speak my opinion."
10011065-27 = "But a proper lady never withholds advice when it's needed."
10011065-28 = "Michiru, I'm truly moved by your kindness. But you should believe in the strength of your beloved clubmates."
10011065-29 = "...Strength?"
10011065-30 = "Yes, that's correct."
10011065-31 = "What do you mean?"
10011065-32 = "What matters is we made it through the trial. What is everyone waiting for?"
10011065-33 = "We need to get to Ibuki."
10011065-34 = "Oh. Uh, yeah..."
10011065-35 = "Good luck to you all! Oh, and one last thing!"
10011065-39 = "Sensei! It's not good to indulge in such thoughts so early in the day, okay?"
10011065-40 = "[s3] \"Again, this is all very unfair!\"\n[s4] \"We're gonna have a talk about this later, okay?!\""

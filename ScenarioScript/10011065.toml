[translation]
10011065-8 = "ฮุฮุฮุ ทุกท่าน! ผ่านแล้วค่ะ! ไปต่อได้เลยค่ะ"
10011065-12 = "วิชานินจา <ทำสมาธิ>! สะ...สำเร็จค่ะ!"
10011065-13 = "ท่านสึคุโยะ! ยอดเยี่ยมไปเลยค่ะ!"
10011065-14 = "ละ... โล่งอกไปที..."
10011065-16 = "นักอ่านใจก็เป็นแค่คนที่คาดเดาความคิดของผู้อื่นเท่านั้นค่ะ"
10011065-17 = "ก็หมายความว่าเรื่องที่เกิดขึ้นเมื่อกี้... ก็เป็นการคาดเดาความรู้สึกคนอื่นสินะคะ"
10011065-18 = "[s] \"ก็มิโมริเป็นเด็กที่จิตใจดีและคอยดูแลคนอื่นๆ อยู่เสมอละนะ\""
10011065-19 = "แหมๆ... ถ้าคุณครูพูดอย่างนั้นละก็..."
10011065-20 = "อ่ะแฮ่ม ฉันก็แค่ทำหน้าที่เป็นนักอ่านใจที่เป็นส่วนหนึ่งของกิจกรรมเท่านั้นเองค่ะ"
10011065-21 = "ยังไงก็ไม่มีทางอ่านใจคนอื่นได้จริงๆ หรอกใช่มั้ยล่ะคะ?"
10011065-22 = "ถ้างั้นชมรมวิจัยศาสตร์นินจาทุกท่าน ยินดีด้วยที่ผ่านด่านได้สำเร็จนะคะ"
10011065-23 = "ผ่านแล้วใช่มั้ย?! ถ้างั้นรีบไปกัน..."
10011065-24 = "อ๊ะ จริงสิ มิจิรุจัง"
10011065-25 = "อะ...หืม?"
10011065-26 = "ถึงฉันจะเป็นแค่ทีมงาน แต่ก็ไม่รู้ว่าในฐานะผู้รับผิดชอบด่านเบี่ยงเบนความสนใจจะสามารถบอกผู้เข้า#nร่วมกิจกรรมแบบนี้ได้หรือเปล่า..."
10011065-27 = "แต่ถึงอย่างนั้นฉันก็อยากจะบอกค่ะ"
10011065-28 = "ฉันคิดว่าความอ่อนโยนของมิจิรุจังเป็นสิ่งที่มีเสน่ห์มาก... แต่คนอื่นๆ เข้มแข็งกว่าที่มิจิรุจังคิดนะคะ"
10011065-29 = "หืม...? เข้มแข็งเหรอ?"
10011065-30 = "ฮุฮุ ใช่แล้วค่ะ"
10011065-31 = "นั่นมัน หมายความว่าไง..."
10011065-32 = "ผ่านแล้วใช่มั้ยคะ? ถ้างั้นอย่ามัวแต่โอ้เอ้อยู่เลยนะคุณครู ทุกคนก็ด้วย"
10011065-33 = "เราไปต่อกันเถอะค่ะ"
10011065-34 = "อะ...อื้อ"
10011065-35 = "ทุกคนพยายามเข้านะคะ~! อ๊ะ แล้วก็อีกอย่าง!"
10011065-39 = "คุณครูคะ ถ้าคิดเรื่องแบบนั้นตั้งแต่กลางวันแสกๆ ละก็..."
10011065-40 = "[s3] \"เข้าใจผิดกันไปใหญ่แล้ว!\"\n[s4] \"ถ้าเป็นเรื่องนั้นน่ะ เอาไว้คุยกันทีหลังเถอะนะ?!\""

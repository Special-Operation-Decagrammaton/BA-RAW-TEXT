[translation]
10011065-8 = "呼呼……各位都辛苦了！大家都合格，所以可以通過這裡了唷。"
10011065-12 = "無，「無念無想之術」成功了……？"
10011065-13 = "是，這都多虧了月夜閣下！"
10011065-14 = "太，太好了……"
10011065-16 = "嘛，與其說是讀心術還是什麼……"
10011065-17 = "簡單來說，也就是非常擅長察言觀色……之類的而已吧。"
10011065-18 = "[s]「因為三森是個好孩子，而且非常關心大家。」"
10011065-19 = "真是的……連老師也這麼說……"
10011065-20 = "那位同學說的沒錯。"
10011065-21 = "我是為了配合活動才會這麼自稱的。"
10011065-22 = "總之忍術研究部的各位，再次恭喜你們。"
10011065-23 = "好，好耶！那就趕快──"
10011065-24 = "啊，三千留醬。"
10011065-25 = "……啊，嗯？"
10011065-26 = "我們才剛見面，說這些話可能有點奇怪……"
10011065-27 = "不過我還是希望能夠告訴你，請當成是參考的意見之一吧。"
10011065-28 = "三千留醬的善良雖然很好……但我認為，大家比三千留醬想像中的更堅強唷。"
10011065-29 = "……咦？"
10011065-30 = "呵呵。"
10011065-31 = "那是什麼意思……？"
10011065-32 = "好了，趕緊出發吧。"
10011065-33 = "現在不是呆站在這裡的時候了，得趕快趕到伊吹身邊才行。"
10011065-34 = "啊，嗯……"
10011065-35 = "那麼大家，請加油哦。"
10011065-39 = "還有老師，白天就在想那種事，好像有點……"
10011065-40 = "[s3]「是你誤會了！」\n[s4]「那件事之後再慢慢聊可以嗎！？」"

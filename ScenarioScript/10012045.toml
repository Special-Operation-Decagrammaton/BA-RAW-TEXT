[translation]
10012045-5 = "……呼。"
10012045-6 = "我回來了，這次也撈了很多……"
10012045-7 = "……大家怎麼了？"
10012045-8 = "[s1] 「……歡迎回來，白子。」\n[s2] 「回來得正是時候。」"
10012045-9 = "……發生了什麼事？"
10012045-10 = "……發生了什麼事？"
10012045-12 = "……啊，歡迎回來。白子前輩。"
10012045-13 = "啊哈哈……歡迎回來，白子醬……？"
10012045-14 = "先，先不要跟我說話……體力……還沒……"
10012045-15 = "唔唔……感覺快死了……"
10012045-16 = "……大叔……已經動不了了……"
10012045-21 = "…………？"
10012045-23 = "（之後，向白子說明了剛才發生的事）"
10012045-27 = "（……看了白子的表情，更加覺得還是不要讓他和若藻碰面比較好）"
10012045-32 = "哈啊，哈啊……"
10012045-33 = "唔唔，真的已經到極限了……沒辦法再撐下去～了～……"
10012045-34 = "可惡──！投入全部的兵力竟然還是輸了……"
10012045-35 = "……請問，那是什麼意思？"
10012045-36 = "咿，咿咿……！？"
10012045-37 = "什，什麼意思是……！？那種事看了不就──"
10012045-38 = "……知道了嗎！？"
10012045-39 = "這樣的戰力差是贏不了──"
10012045-40 = "呃……！"
10012045-41 = "你還要我們怎麼做！？"
10012045-43 = "從剛才開始就在說什麼呢？"
10012045-44 = "各位明明……"
10012045-45 = "還留有……"
10012045-49 = "殺手鐧不是嗎……"
10012045-51 = "什麼意思……？"
10012045-52 = "殺手鐧……？"
10012045-53 = "……！！難道！"
10012045-54 = "不行，不行啦！那個不行！！沒有那個的話，我們就回不去了！"
10012045-55 = "隊長也說句話呀！這樣下去，那傢伙會連我們的船都……！"
10012045-57 = "只有那個不行！那艘船對我們來說就像家一樣！"
10012045-58 = "就算是你，我也無法允許你碰我們的船……！"
10012045-64 = "……噫！？"
10012045-65 = "隊，隊長……居然被一擊就……！？"
10012045-67 = "……呵呵。"
10012045-68 = "呵呵呵……各位似乎有些誤會呢？"
10012045-69 = "我並不是在徵求各位的同意。"
10012045-70 = "我再重複一次。"
10012045-71 = "各位，還留有殺手鐧對吧？"
10012045-72 = "你們願意……"
10012045-77 = "……把「家」交出來……沒錯吧？"

[translation]
10012045-5 = "ฮู่วว..."
10012045-6 = "ฉันกลับมาแล้ว รอบนี้ก็ได้..."
10012045-7 = "ทุกคน...?"
10012045-8 = "[s1] \"มาแล้วเหรอชิโรโกะ\"\n[s2] \"อื้ม มาได้จังหวะดีมาก\""
10012045-9 = "เกิดอะไรขึ้นเหรอ...?"
10012045-10 = "เกิดอะไรขึ้นเหรอ...?"
10012045-12 = "อ๊ะ... มาแล้วเหรอคะรุ่นพี่ชิโรโกะ  "
10012045-13 = "แหะๆ... กลับมาแล้วเหรอคะ ชิโรโกะจัง..."
10012045-14 = "อย่าเพิ่งชวนคุยนะ... ฉันยัง... ต้องฟื้นร่างกายอยู่..."
10012045-15 = "อึก... เหมือนจะตายให้ได้เลย..."
10012045-16 = "งืมๆ... งืมๆ..."
10012045-21 = "............?"
10012045-23 = "(หลังจากได้พักผ่อนกันสักพักหนึ่ง คุณครูก็อธิบายเรื่องที่เกิดขึ้นให้ชิโรโกะฟัง)"
10012045-27 = "(และเมื่อดูจากสีหน้าของชิโรโกะแล้ว คุณครูก็ได้รู้ว่าไม่ควรเผชิญหน้ากับวาคาโมะอีก)"
10012045-32 = "แฮ่ก... แฮ่ก... เฮ้อ..."
10012045-33 = "โอ๊ย... เกินขีดจำกัดเราแล้วละ มากกว่านี้คงไม่ไหว..."
10012045-34 = "อึก... เราได้กองกำลังมาเต็มจำนวนถึงขนาดนั้นแต่ก็ยังแพ้เหรอเนี่ย..."
10012045-35 = "หมายความว่ายังไงคะ...?"
10012045-36 = "ฮะ... เฮือก!?"
10012045-37 = "ยังมาถามอีกว่าหมายความว่ายังไง…!? เราแพ้ยกทีมเลย..."
10012045-38 = "...นะคะ!!"
10012045-39 = "โดนมาแค่นี้ก็น่าจะรู้แล้ว"
10012045-40 = "...นี่คะ!!"
10012045-41 = "รู้ว่ากองกำลังของเราสู้พวกนั้นไม่ได้ยังไงล่ะ...!"
10012045-43 = "ฉันก็ว่าอยู่ว่าพูดถึงเรื่องอะไร 'กองกำลังเต็มจำนวน' งั้นเหรอ..."
10012045-44 = "นี่ทุกคนยัง.... มีเหลืออยู่อีกอย่างไม่ใช่เหรอคะ?"
10012045-45 = "ที่ใหญ่กว่านี้..."
10012045-49 = "และจัดการได้แน่นอนกว่านี้...?"
10012045-51 = "อืม...? หมายถึงอะไรน่ะ..."
10012045-52 = "ใหญ่กว่าและแน่นอนกว่า...?"
10012045-53 = "......!!  อย่าบอกนะว่า!"
10012045-54 = "ไม่ได้! ไม่ได้นะ! อันนั้นไม่ได้นะ!!  เราใช้นั่งมาถึงที่นี่เลยนะ!!"
10012045-55 = "หัวหน้า! หัวหน้าก็ช่วยพูดอะไรหน่อยสิคะ! ขืนเป็นแบบนี้ มีหวังเรือของเราคงถูกยึดไปด้วย...!"
10012045-57 = "เรือนั้นไม่ได้นะ! นั่นคือบ้านของเราเลยนะ!"
10012045-58 = "ถึงจะใช้ถล่มพวกนั้นก็เถอะ แต่ถ้ามาแตะต้องเรือลำนี้ ฉันจะไม่ยกโทษให้เด็ดขาด!"
10012045-64 = "......!! เฮือกกก!!!"
10012045-65 = "หะ... หัวหน้า...! โดนสอยร่วงในนัดเดียวเลยเหรอ...!"
10012045-67 = "หึหึ..."
10012045-68 = "หึหึหึ... ทุกคนคะ... ดูจะเข้าใจอะไรผิดไปนะคะ"
10012045-69 = "ฉันไม่ได้กำลังขออนุญาตจากพวกคุณสักหน่อยค่ะ..."
10012045-70 = "แต่ในเมื่อพวกคุณเป็นคนที่มีความเข้าใจน้อย ฉันก็จะพูดตรงๆ ให้ค่ะ"
10012045-71 = "ไปเอามันมาเดี๋ยวนี้ค่ะ แล้วก็ปรับแต่งให้เป็นเรือสำหรับต่อสู้ด้วยค่ะ"
10012045-72 = "สิ่งที่พวกคุณเรียกว่า..."
10012045-77 = "... 'บ้าน' นั่นแหละค่ะ"

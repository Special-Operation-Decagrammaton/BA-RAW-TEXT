[translation]
22040-1 = "Episode 4; Guided by Aris 1"
22040-13 = "Aris and I continued moving forward for quite some time."
22040-30 = "One, two, one, two."
22040-35 = "Oh."
22040-36 = "[s] \"Huh? Is something wrong, Aris?\""
22040-38 = "One, two, one, two."
22040-40 = "Sensei, I hear a strange sound coming from somewhere."
22040-41 = "One, two, one, two."
22040-42 = "[s] \"Yeah, what's that sound?\""
22040-43 = "That sound must be..."
22040-44 = "Oh...! I just realized..."
22040-45 = "This is the foreshadowing of a special event that occurs occasionally on the Millennium School campus..."
22040-46 = "It is the Millennium Random Encounter Event!"
22040-47 = "[s] \"H-Huh? Random encounter...? Foreshadowing...?\""
22040-48 = "Yes, it is a field event that I frequently encounter during adventures."
22040-49 = "You never know what we will encounter, so do not let your guard down, Sensei!"
22040-51 = "One, two, one, two."
22040-52 = "One, two, one, two, one, two."
22040-53 = "[ns] \"Wh-What kind of an event is this...?!\""
22040-55 = "One, two, one, two!"
22040-59 = "[ns] \"Th-There she is...!\""
22040-62 = "Hmm? I didn't expect to see you two here."
22040-66 = "How are you? It's a nice day for workout."
22040-67 = "[s] \"S-Sumire...? H-Hi.\""
22040-68 = "An encounter with Sumire!"
22040-69 = "Sumire, are you on an exercise adventure as usual?"
22040-70 = "[s] \"Exercise adventure...?\""
22040-71 = "Yes, I had some free time so I was jogging around here."
22040-72 = "How about you, Aris? Are you doing some adventure exercise today too?"
22040-73 = "[s] \"Now it's adventure exercise?\""
22040-74 = "Yes, Sensei and I are on an apprentice hero adventure!"
22040-75 = "You're working with Trainer on your exercise routine?"
22040-76 = "Good job. You're very hard at work. I see you doing your adventure exercise every day."
22040-77 = "Yes. I must complete my adventures consistently and with all my effort. My level could drop if I miss even one day."
22040-78 = "Momoi says missing daily quests is a sin."
22040-79 = "Yes. Exercise and training must be consistent."
22040-80 = "It's also beneficial for Trainer, who needs to exercise more."
22040-81 = "[s] \"Um, do you guys meet up often?\""
22040-82 = "Yes, Sumire is one of the main encounter figures of the Millennium event."
22040-83 = "I run into Aris often while I'm working out on campus."
22040-84 = "It's become something of a habit."
22040-85 = "Sumire is my party member on exercise adventures!"
22040-86 = "Heehee, yes. Like she said, Aris is my workout buddy."
22040-87 = "[s1] \"I've been wondering...what's this exercise adventure?\"\n[s2] \"I've been wondering...what's this adventure exercise?\""
22040-88 = "It is a kind of adventure!"
22040-89 = "Sumire runs around campus to increase her strength, agility, and endurance stats."
22040-91 = "Yes, it's enjoyable to strengthen my body while working out."
22040-92 = "She is raising her main stats so she can level up. Every day, she runs around campus to achieve her desired level."
22040-93 = "It is a great hero adventure!"
22040-94 = "It's just my daily routine, Aris. That's giving me too much credit."
22040-95 = "[s] \"I-I see...\""
22040-96 = "Aris is always on an adventure as well."
22040-97 = "You said the main purpose of your adventure is to strengthen your body and mind..."
22040-98 = "Yes! It's to increase HP and MP through leveling up!"
22040-99 = "...And through training, you want to reach a new height that you couldn't touch before."
22040-100 = "Yes! If I increase my level, I can learn new skills!"
22040-101 = "Yes! That wonderful attitude is a valuable exercise in and of itself!"
22040-102 = "You're always hardworking and have the right mindset. Amazing, Aris!"
22040-103 = "[s] \"R-Really?\""
22040-105 = "[ns] \"This conversation is...kind of confusing...\""
22040-106 = "Anyway, now that I see you're working with Trainer..."
22040-107 = "I'm even more motivated to work hard, Aris."
22040-109 = "Yes! Me too! I will go on more adventures and encounter many events so I can keep up with you, Sumire!"
22040-110 = "Then I'll start with jogging twenty kilometers!"
22040-111 = "Now if you'll excuse me, Aris and Trainer!"
22040-112 = "[s] \"Oh, um, good luck.\""
22040-113 = "One! Two! One! Two!"
22040-114 = "I will do my best too!"
22040-118 = "Sensei! Let us go to the next quest!"
22040-119 = "[s] \"Oh, okay...\""
22040-127 = "I kept following Aris, and we eventually arrived at the outskirts of Millennium."
22040-128 = "[s3] \"I didn't expect to leave campus...\"\n[s4] \"The radius of your adventures is wider than I thought...\""
22040-131 = "Yes. You cannot have boundaries when you are on an adventure."
22040-132 = "If you go further from your home base, you can encounter new events you have never seen before!"
22040-133 = "[s] \"Events you've never seen before...\""
22040-141 = "Oh! Master and Aris!"
22040-142 = "Yay! Hello both of you!"
22040-143 = "[s] \"This really is something I haven't seen before!\""
22040-144 = "...H-Huh? Sensei? What's wrong?"
22040-145 = "Hahaha! Yeah, tell us, Sensei!"
22040-146 = "[s] \"I mean, it's just that...you guys are wearing something unusual.\""
22040-148 = "I have not seen you with this armor before. What is it for?"
22040-149 = "Oh! I believe I know! You must have changed your class from a maid..."
22040-150 = "...to a student!"
22040-151 = "Well... Technically this is just a regular student uniform."
22040-152 = "I know much about students! Momoi said that girl students are very tough."
22040-153 = "They are even brave and strong enough to eat a whole tub of ice cream before going to bed."
22040-154 = "[s] \"I mean, I think that's just a vice...\""
22040-155 = "Hahaha! Aris! You're sharp!"
22040-156 = "Right! We've changed our job and are working on a secret quest! This is the uniform for the job!"
22040-157 = "[s] \"A secret quest...?\""
22040-158 = "Yes! President Rio said she was worried about the situation in Gehenna these days."
22040-159 = "She asked us to infiltrate and investigate any strange goings-on in Gehenna."
22040-160 = "Asuna, wait..."
22040-161 = "That's why I'm wearing this uniform and looking for Gehenna students passing by..."
22040-162 = "So I can talk to them when I see them!"
22040-163 = "Amazing, Asuna. You are adventuring to complete a quest as well."
22040-164 = "You are just like me!"
22040-166 = "Really? Yay! We're the same, Aris!"
22040-167 = "Wait, Asuna. Akane said this is a secret operation..."
22040-168 = "Oh, right!"
22040-169 = "Aris and Master! Don't tell anyone what I just said, okay?"
22040-170 = "[s] \"I figured as much...\""
22040-171 = "*sigh* Well, hopefully it'll be fine since it's Sensei and Aris."
22040-173 = "Yes! I shall take your secret to the grave! I know that leaking secret information can cause you to become cursed!"
22040-174 = "Hahaha! Yes, Aris! You're always so enthusiastic!"
22040-175 = "[s] \"Still, it's quite surprising to see you guys in school uniforms...\""
22040-176 = "We are still students, Sensei. It's not necessarily strange for us to wear uniforms."
22040-177 = "Like Asuna said, this outfit is like...infiltration armor."
22040-178 = "I was just instructed to bring a normal school uniform... So..."
22040-179 = "You see..."
22040-180 = "[s] \"Oh, yes... S-Sure.\""
22040-181 = "..."
22040-182 = "...Ugh."
22040-183 = "P-Please don't look at me like that, Sensei."
22040-184 = "It's kind of...embarrassing..."
22040-185 = "[s] \"Oh! S-Sorry! That was rude of me!\""
22040-187 = "[ns] \"I'm just not used to seeing you in a uniform... I-It looks great though!\""
22040-188 = "Thanks, Sensei! What are you two doing out here?"
22040-191 = "Sensei and I are on an adventure."
22040-192 = "Oooh! An adventure? That sounds fun! I wanna go on an adventure too!"
22040-193 = "*sigh* We're on a mission right now, Asuna..."
22040-195 = "Yes! I am always happy to have new party members!"
22040-196 = "As the number of party members increases, available strategies and tactics also increase!"
22040-198 = "Bum bum bum! Asuna and Karin have joined the party! You may come on our next adventure!"
22040-199 = "Wow! I joined a party!"
22040-200 = "I got included in this?"
22040-201 = "Yes!"
22040-205 = "...Well, thank you."
22040-209 = "Anyways, we don't have time to be sitting around."
22040-210 = "We'll have to get going now, Aris. Sensei."
22040-211 = "[s] \"Okay, good luck on your mission.\""
22040-212 = "Yay! Okay, Master! Thanks!"
22040-213 = "I guess this isn't a secret operation anymore."
22040-214 = "Oh, Aris. I think Neru was looking for you."
22040-216 = "Huh?! Th-The little maid wants to see me?"
22040-217 = "She has business with you, I believe."
22040-218 = "Please be nice when you see her."
22040-219 = "I think she really likes you."
22040-220 = "O-Okay!"
22040-222 = "Bye-bye!"
22040-226 = "Oh, look! A Gehenna student over there!"
22040-233 = "Huh? Who are you? What do you want from us?"
22040-234 = "We're students preparing to transfer to Gehenna."
22040-235 = "And we have a question before we transfer!"
22040-236 = "...Huh? You wanna know who leads the Pandemonium Society now?"
22040-237 = "Do you know?"
22040-238 = "I don't know, I thought it was Ibuki."
22040-239 = "Makoto? Who is that?"
22040-241 = "[ns] \"Hmm, is this mission...going to end well...?\""
22040-242 = "Sensei! We do not have time!"
22040-243 = "Neru could appear at any moment. Now is the time to retreat!"
22040-247 = "[ns] \"Okay! Lead the way, Aris!\""
22040-249 = "Next Episode; Guided by Aris 2"

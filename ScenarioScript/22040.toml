[translation]
22040-1 = "ตอนที่ 4;อาริสึและเหล่าผู้ถูกชี้นำ~ 1"
22040-13 = "(คุณครูและอาริสึออกเดินทางมุ่งหน้ามาไกลมากแค่ไหนแล้วนะ...)"
22040-30 = "หนึ่งสอง หนึ่งสอง"
22040-35 = "อ๊ะ!"
22040-36 = "[s] \"หืม? อาริสึ มีอะไรเหรอ?\""
22040-38 = "หนึ่งสอง หนึ่งสอง"
22040-40 = "คุณครูคะ อาริสึได้ยินเสียงแปลกๆ มาจากที่ไหนสักแห่งค่ะ"
22040-41 = "หนึ่งสอง หนึ่งสอง"
22040-42 = "[s] \"เสียงอะไรเหรอ?\""
22040-43 = "เสียงนี้ต้องเป็น..."
22040-44 = "อ๊ะ...! อาริสึรู้แล้วค่ะ"
22040-45 = "นี่คือเหตุการณ์พิเศษที่บางครั้งก็เกิดขึ้นในบริเวณโรงเรียนมิลเลเนียมด้วย..."
22040-46 = "นี่คือเค้าลางของ <กิจกรรมสุ่มพบปะชาวมิลเลเนียม> ค่ะ!"
22040-47 = "[s] \"หะ... ห้ะ? เค้าลาง...? พบปะ...?\""
22040-48 = "ใช่ค่ะ เมื่อออกผจญภัยไปเรื่อยๆ จะพบกิจกรรมการพบปะแบบนี้ได้บ่อยๆ ในพื้นที่ต่างๆ ที่ไปค่ะ"
22040-49 = "เราไม่อาจรู้ได้เลยค่ะว่าครั้งนี้เราจะต้องเจอกับอะไร คุณครูห้ามประมาทเด็ดขาดนะคะ!"
22040-51 = "หนึ่งสอง หนึ่งสอง"
22040-52 = "หนึ่งสอง หนึ่งสอง หนึ่งสอง"
22040-53 = "[ns] \"นี่มันกิจกรรมอะไรกันเนี่ย...?!\""
22040-55 = "หนึ่งสอง หนึ่งสอง!!"
22040-59 = "[ns] \"อะ... ออกมาแล้ว...!\""
22040-62 = "หืม? นึกไม่ถึงเลยนะคะว่าจะได้เจอทั้งสองคนที่นี่"
22040-66 = "สวัสดีค่ะ วันนี้ก็เป็นวันที่ดีในการออกกำลังกายนะคะ"
22040-67 = "[s] \"สึ... สึมิเระ...? วะ...ว่าไง\""
22040-68 = "เป็นกิจกรรมพบกันโดยบังเอิญกับรุ่นพี่สึมิเระนี่เองสินะคะ!"
22040-69 = "วันนี้รุ่นพี่สึมิเระก็ออกมา <ผจญภัยออกกำลัง> เหรอคะ?"
22040-70 = "[s] \"ผจญภัยออกกำลัง...?\""
22040-71 = "ใช่ค่ะ พอดีมีเวลาว่าง ก็เลยจะออกไปจ็อกกิงเบาๆ แถวนี้หน่อยน่ะค่ะ"
22040-72 = "วันนี้อาริสึก็มา <ออกกำลังผจญภัย> เหรอคะ?"
22040-73 = "[s] \"รอบนี้เป็น <ออกกำลังผจญภัย> เหรอ?\""
22040-74 = "ใช่ค่ะ วันนี้ออกมาผจญภัยผู้กล้าฝึกหัดกับคุณครูน่ะค่ะ!"
22040-75 = "วันนี้ได้เป็นพาร์ทเนอร์ออกกำลังกับเทรนเนอร์สินะคะ..."
22040-76 = "มาออกกำลังกายกลางแจ้งทุกวันได้แบบนี้ มีวินัยจริงๆ เลยนะคะ"
22040-77 = "การผจญภัยต้องใช้วินัยและความจริงใจอยู่เสมอค่ะ ถ้าเว้นว่างไปแม้แต่วันเดียว เลเวลก็จะไม่ขยับ และโดนคนอื่นแซงได้ค่ะ"
22040-78 = "โมโมอิก็เคยบอกไว้ค่ะว่าการลืมทำเควสประจำวันเป็นเรื่องที่ให้อภัยไม่ได้"
22040-79 = "ค่ะ สิ่งสำคัญที่สุดของการออกกำลังกายและการฝึกฝนคือการทำอย่างสม่ำเสมอค่ะ"
22040-80 = "ครั้งนี้พาเทรนเนอร์ที่ไม่ค่อยได้ออกกำลังกายมาร่วมด้วยแบบนี้ ถือว่ายอดเยี่ยมไปอีกขั้นเลยค่ะ"
22040-81 = "[s] \"คือว่า... ทั้งสองคนมาเจอกันบ่อยเหรอ?\""
22040-82 = "ใช่ค่ะ รุ่นพี่สึมิเระคือหนึ่งใน NPC หลักที่จะได้เจอในกิจกรรมพบปะชาวมิลเลเนียมค่ะ"
22040-83 = "ฉันเจออาริสึระหว่างออกกำลังกายในโรงเรียนบ่อยๆ เลยค่ะ"
22040-84 = "คงเป็นเพราะว่า..."
22040-85 = "เพราะรุ่นพี่สึมิเระคือสหายผจญภัยออกกำลังของอาริสึไงคะ!"
22040-86 = "ฮุฮุ ใช่ค่ะ อย่างที่อาริสึว่าเลยค่ะ อาริสึเองก็เป็นเพื่อนออกกำลังกายของฉันเหมือนกันค่ะ"
22040-87 = "[s1] \"ครูสงสัยตั้งแต่เมื่อกี้แล้ว... <ผจญภัยออกกำลัง> นี่คืออะไรเหรอ?\"\n[s2] \"ครูสงสัยตั้งแต่เมื่อกี้แล้ว... <ออกกำลังผจญภัย> นี่คืออะไรเหรอ?\""
22040-88 = "มันเป็นการผจญภัยชนิดหนึ่งน่ะค่ะ!"
22040-89 = "ฉันได้ยินว่ารุ่นพี่สึมิเระวิ่งออกกำลังอย่างแข็งขันในโรงเรียนจนได้ทั้งกล้ามเนื้อและความว่องไว ทำให้สเตตัสของความถึกทนเพิ่มขึ้นด้วยค่ะ"
22040-91 = "ค่ะ ก็การออกกำลังกายและฝึกร่างกายเป็นเรื่องสนุกน่ะค่ะ"
22040-92 = "ท่าทางแห่งความพยายามในการท่องไปตามถนน... ฝึกฝนค่าสแตทที่สำคัญๆ แล้วอัปเลเวล"
22040-93 = "แค่นี้ก็เป็นการผจญภัยของผู้กล้าที่ยอดเยี่ยมแล้วค่ะ!"
22040-94 = "ยอดเยี่ยมงั้นเหรอคะ... แค่เป็นเรื่องที่ทำในทุกวันเองค่ะ อาริสึเนี่ยชอบพูดอะไรให้เขินนะคะ"
22040-95 = "[s] \"ยะ... อย่างนั้นเองเหรอ...\""
22040-96 = "ฉันได้ยินมาว่าอาริสึออกมาผจญภัยอยู่บ่อยๆ เลยละค่ะ"
22040-97 = "และจากอาริสึเล่ามา จุดประสงค์หลักของการผจญภัยก็คือเพื่อฝึกร่างกายและจิตใจ..."
22040-98 = "ใช่ค่ะ! ต้องอัปเลเวลเพื่อเพิ่ม HP กับ MP ค่ะ!"
22040-99 = "...เป้าหมายของการฝึกฝน ก็เพื่อทำให้สิ่งที่เป็นไปไม่ได้ในชีวิตประจำวันเป็นไปได้ใช่ไหมล่ะคะ"
22040-100 = "ถ้าฝึกฝนจนเลเวลเพิ่มขึ้น เราก็จะได้เรียนรู้สกิลใหม่ด้วยค่ะ!"
22040-101 = "อืม แค่มีความตั้งใจเต็มเปี่ยมแบบนี้ ก็เรียกได้ว่าเป็นการออกกำลังกายที่ยอดเยี่ยมแล้วละค่ะ!"
22040-102 = "ความมุ่งมั่นทั้งกายและใจที่เห็นได้ในทุกวัน! สุดยอดมากเลยค่ะอาริสึ!"
22040-103 = "[s] \"งะ...งั้นเหรอ...?\""
22040-105 = "[ns] \"ครูว่า... เหมือนจะคุยคนละเรื่องเดียวกันอยู่เลยนะ\""
22040-106 = "ยังไงก็เถอะค่ะ พอฉันเห็นอาริสึกับเทรนเนอร์ร่วมมือกันในวันนี้แล้ว..."
22040-107 = "ฉันก็คงจะยอมแพ้ไม่ได้แล้วละค่ะ อาริสึ"
22040-109 = "อ๊ะ อาริสึเองก็เอาด้วยคนค่ะ อาริสึก็จะตั้งใจทำกิจกรรมและอัปเลเวลให้มากกว่านี้ จะได้ไม่แพ้ให้กับ#nรุ่นพี่สึมิเระยังไงล่ะคะ!"
22040-110 = "งั้นฉันจะเริ่มจากจ็อกกิงเบาๆ 20 กม. ก่อนแล้วกันค่ะ!"
22040-111 = "ขอตัวก่อนนะคะเทรนเนอร์! อาริสึ!"
22040-112 = "[s] \"อะ... อื้อ... พยายามเข้านะ!\""
22040-113 = "หนึ่ง! สอง! หนึ่ง! สอง!"
22040-114 = "อาริสึก็จะไม่ยอมแพ้ค่ะ!"
22040-118 = "คุณครูคะ! ไปที่เควสต่อไปกันเถอะค่ะ!"
22040-119 = "[s] \"เอ่อ... อือ... อืม\""
22040-127 = "(คุณครูตามหลังอาริสึมาเรื่อยๆ ไม่นานนักก็ออกมาถึงด้านนอกโรงเรียนมิลเลเนียม)"
22040-128 = "[s3] \"เราต้องออกมานอกโรงเรียนด้วยเหรอ...\"\n[s4] \"รัศมีผจญภัยของอาริสึนี่กว้างจังเลยนะ...\""
22040-131 = "ค่ะ การผจญภัยของอาริสึไม่มีที่สิ้นสุดหรอกค่ะ"
22040-132 = "ถ้าออกมาไกลๆ แบบนี้ เราก็จะได้เจอกิจกรรมที่คาดไม่ถึง... และไม่ได้เจอในชีวิตประจำวันด้วยค่ะ!"
22040-133 = "[s] \"กิจกรรมที่คาดไม่ถึงงั้นเหรอ...\""
22040-141 = "อ๊ะ! นายท่านกับอาริสึจังนี่นา!"
22040-142 = "ยะฮู้ว! ว่าไงๆ~!"
22040-143 = "[s] \"เป็นกิจกรรมที่คาดไม่ถึงจริงๆ ด้วยแฮะ!\""
22040-144 = "หืม? จู่ๆ ก็เป็นอะไรไปน่ะ คุณครู?"
22040-145 = "ฮ่าฮ่าฮ่า! อะไรเหรอ? มีอะไรกันน่ะ?"
22040-146 = "[s] \"ไม่หรอก เอ่อ... ก็ทั้งสองคน... อยู่ในชุดที่ต่างไปจากปกติ\""
22040-148 = "ชุดที่ต่างไปจากปกติ... คอสตูมของตัวละครเมื่อเปลี่ยนอาชีพใหม่..."
22040-149 = "อ๊ะ...! อาริสึรู้แล้วค่ะ! ทั้งสองคนเปลี่ยนอาชีพจากเมด..."
22040-150 = "ไปเป็นอาชีพ <นักเรียน ม.ปลาย> ใช่ไหมคะ?!"
22040-151 = "เดี๋ยวนะ... ก็พวกฉันเป็นนักเรียน ก็ต้องใส่ชุดนักเรียนอยู่แล้วสิ..."
22040-152 = "อาริสึรู้ดีค่ะ โมโมอิก็พูดอยู่บ่อยๆ ว่า <นักเรียน ม.ปลาย> น่ะโหดไม่เบาเลยละค่ะ"
22040-153 = "แล้วก็เป็นอาชีพที่กินไอศกรีมก่อนนอนได้โดยไม่ต้องกลัวน้ำหนักขึ้นด้วยนะคะ"
22040-154 = "[s] \"เดี๋ยวนะ แบบนั้นมันความมั่นใจผิดๆ หรือเปล่า?\""
22040-155 = "อ่ะฮะฮะ~! อาริสึจัง! หลักแหลมมากเลย!"
22040-156 = "ใช่แล้วละ! ตอนนี้พวกเราเปลี่ยนอาชีพและกำลังทำเควสลับๆ อยู่~! และชุดนักเรียนนี้ก็เป็นเครื่องแบบ#nของเควสลับนั้นด้วยนะ!"
22040-157 = "[s] \"ภารกิจลับเหรอ...?\""
22040-158 = "อื้อ~! ประธานริโอะบอกว่าช่วงนี้เธอกังวลเรื่องสถานการณ์ที่เกิดขึ้นในเกเฮนน่าน่ะ~"
22040-159 = "ก็เลยสั่งให้พวกเราแอบเข้าไปสืบว่ามีการเคลื่อนไหวอะไรในเกเฮนน่า หรืออะไรทำนองนั้นรึเปล่าน่ะ~"
22040-160 = "รุ่นพี่อาสึนะ เดี๋ยวสิ..."
22040-161 = "ที่พวกฉันกำลังทำคือ เดินสวยๆ และคิดว่าจะมีนักเรียนเกเฮนน่าที่ใส่ชุดนักเรียนแบบนี้เดินไปไหนมา#nไหนบ้างไหมน้า~"
22040-162 = "และถ้าเจอก็จะเข้าไปชวนคุย~! ประมาณนี้แหละ!"
22040-163 = "รุ่นพี่อาสึนะก็ออกมาผจญภัยเพื่อทำเควสเหมือนกันสินะคะ"
22040-164 = "เหมือนอาริสึเลยค่ะ!"
22040-166 = "จริงเหรอ~? เหมือนกับอาริสึจังเลยสินะ~"
22040-167 = "เดี๋ยวก่อน รุ่นพี่อาสึนะ อาคาเนะบอกว่าต้องเก็บเป็นความลับนะ..."
22040-168 = "อ้อ! จริงสิ~"
22040-169 = "ต้องเก็บเป็นความลับนะ อาริสึจัง~ นายท่าน~"
22040-170 = "[s] \"อะ... อื้ม...\""
22040-171 = "เฮ้อ... ถ้าเป็นคุณครูกับอาริสึ... ก็คงไม่เป็นไรหรอกมั้ง..."
22040-173 = "ใช่ค่ะ! อาริสึจะเก็บเป็นความลับค่ะ! ในเกมก็เหมือนกันนะคะ ถ้าเราเปิดเผยความลับ เราจะโดนคำสาปค่ะ!"
22040-174 = "ฮ่าฮ่าฮ่า! งั้นเหรอ~! อาริสึจังเนี่ย กล้าหาญเสมอเลยนะ!"
22040-175 = "[s] \"ถึงอย่างนั้นก็เถอะ... แต่พอเห็นทั้งคู่อยู่ในชุดนักเรียนแล้ว...\""
22040-176 = "ไม่หรอก... พวกฉันก็เป็นนักเรียนเหมือนกัน การใส่ชุดนักเรียนก็ไม่เห็นจะแปลก..."
22040-177 = "ชุดนี้น่ะ... หรือว่าควรจะเรียกว่าชุดแฝงตัวอย่างที่รุ่นพี่อาสึนะพูดดีนะ..."
22040-178 = "พอดีฉันได้รับคำสั่งให้เอาชุดนักเรียนที่ใส่ปกติออกมาใช้ในการทำภารกิจ... ก็เลย..."
22040-179 = "แบบว่า..."
22040-180 = "[s] \"อ่อ... อืม... งะ... งั้นสินะ\""
22040-181 = "......"
22040-182 = "อึก..."
22040-183 = "ยะ... อย่ามองกันขนาดนั้นสิคุณครู"
22040-184 = "ฉะ... ฉันก็เขินเป็นเหมือนกันนะ..."
22040-185 = "[s] \"อ๊ะ ขอโทษๆ! ครูเสียมารยาทไปหน่อย...!\""
22040-187 = "[ns] \"ชุดดูต่างจากปกติไปหน่อยเลยตกใจน่ะ... ตะ... แต่ก็เหมาะดีนะ!\""
22040-188 = "ว่าแต่ อาริสึจังกับนายท่านทำอะไรกันอยู่เหรอ?"
22040-191 = "คุณครูกับอาริสึกำลังผจญภัยอยู่ค่ะ"
22040-192 = "โอ้! ผจญภัยเหรอ น่าสนุกจัง ฉันเองก็อยากทำบ้าง! "
22040-193 = "เฮ้อ... รุ่นพี่ เอาภารกิจก่อนเถอะ..."
22040-195 = "เอาสิคะ อาริสึยินดีรับสมาชิกปาร์ตี้คนใหม่เสมอค่ะ!"
22040-196 = "เพราะยิ่งสมาชิกในปาร์ตี้มีมากเท่าไร ก็จะยิ่งใช้กลยุทธ์และชั้นเชิงได้มากขึ้นค่ะ!"
22040-198 = "ปาปัม ปาปัม ป๊าม! รุ่นพี่อาสึนะและก็รุ่นพี่คารินเข้าร่วมปาร์ตี้แล้วค่ะ! เอาไว้คราวหน้าเราไปร่วมผจญภัย#nด้วยกันนะคะ!"
22040-199 = "ว้าว! ได้เข้าปาร์ตี้แล้ว~"
22040-200 = "ฉะ... ฉันด้วยเหรอ...?"
22040-201 = "ใช่ค่ะ!"
22040-205 = "อืม..."
22040-209 = "งั้นก็ขอจบการพูดคุยไว้เท่านี้..."
22040-210 = "อาริสึ คุณครู พวกเราขอตัวไปทำธุระก่อนนะ"
22040-211 = "[s] \"อื้ม สู้ๆ นะ\""
22040-212 = "ยะ... ฮู้ว~! อื้ม! นายท่าน! ขอบคุณที่ช่วยเชียร์นะ!"
22040-213 = "ไปทำภารกิจลับ... ไม่สิ... ตอนนี้ไม่ต้องเรียกว่าเป็นความลับแล้วหรือเปล่านะ"
22040-214 = "อ๊ะ จริงสิ! อาริสึ รุ่นพี่เนรุน่าจะตามหาเธออยู่นะ"
22040-216 = "คะ?! คะ... คุณเมดตัวเล็กอยากเจออาริสึเหรอคะ?!"
22040-217 = "เห็นบอกว่ามีธุระอะไรด้วยนี่แหละ..."
22040-218 = "เอาเป็นว่า ถ้าได้เจอก็ทำตัวดีๆ หน่อยนะ"
22040-219 = "รุ่นพี่เขา... ดูจะถูกใจอาริสึมากเลยละ"
22040-220 = "อ่า... แหะๆ..."
22040-222 = "งั้นก็ บ๊ายบายนะ~"
22040-226 = "อ๊ะ! นั่นนักเรียนเกเฮนน่านี่นา!"
22040-233 = "หืม~! ใครน่ะ? มีธุระอะไรกับพวกฉันหรือเปล่า...?"
22040-234 = "บอกไปว่าพวกเราเป็นนักเรียนที่กำลังจะย้ายมาเรียนที่เกเฮนน่า... แบบนี้ดีไหม?"
22040-235 = "พวกเราอยากรู้อะไรบางอย่างก่อนย้ายเข้ามาเรียนน่ะ~!"
22040-236 = "หืม...? ถามว่าตอนนี้ใครคือหัวหน้าแพนเดโมเนียม โซไซตี้งั้นเหรอ?"
22040-237 = "เธอรู้ไหม?"
22040-238 = "ไม่แน่ใจแฮะ อืม~ อิบูกิจังหรือเปล่านะ?"
22040-239 = "มาโคโตะ? นั่นใครเหรอ?"
22040-241 = "[ns] \"อืม... แล้วจะทำภารกิจ... สำเร็จใช่ไหม...?\""
22040-242 = "คุณครูคะ! นี่ไม่ใช่เวลามากังวลนะคะ"
22040-243 = "รุ่นพี่เนรุอาจโผล่มาได้ทุกเมื่อ ตอนนี้เราต้องวางกลยุทธ์ล่าถอยกันแล้วนะคะ!"
22040-247 = "[ns] \"อ๊ะ! ไปด้วยกันสิอาริสึ!\""
22040-249 = "ตอนต่อไป;อาริสึและเหล่าผู้ถูกชี้นำ~ 2"

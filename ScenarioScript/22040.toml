22040-66 = "3;스미레;03;안녕하세요. 오늘도 운동하기 좋은 날입니다.\n#3;em;[반응]"
22040-67 = "[s] \"스, 스미레……? 아, 안녕.\""
22040-68 = "3;아리스;07;이건 스미레 선배와의 조우 이벤트였군요!\n#3;em;[반짝]"
22040-69 = "3;아리스;00;스미레 선배는 오늘도 <운동 모험> 중이었습니까?"
22040-70 = "[s] \"운동 모험……?\""
22040-71 = "3;스미레;01;네, 마침 한가한 참에 가볍게 이 주변에서 조깅을 할까 해서요.\n#3;greeting"
22040-72 = "3;스미레;03;그러는 아리스는 오늘도 <모험 운동> 중입니까?"
22040-73 = "[s] \"이번엔 <모험 운동>……?\""
22040-74 = "3;스미레;03\n5;아리스;03;네, 오늘은 선생님과 함께 견습용사 모험 중이었습니다!\n#5;al\n#5;em;[반응]\n#3;m1"
22040-75 = "3;스미레;05;과연 오늘은 트레이너와 함께 파트너를 짜고 운동이라……."
22040-76 = "3;스미레;03;매일 야외로 나와 운동을 하다니. 정말 성실하군요."
22040-77 = "5;아리스;99;모험은 언제나 성실히 해야 합니다. 하루라도 빼먹으면 금방 레벨이 뒤처지기 마련인 법입니다.\n#5;greeting"
22040-78 = "5;아리스;05;일퀘를 빼먹는 건 죄악이라고 모모이도 그랬습니다.\n#5;em;[!]"
22040-79 = "3;스미레;07;네, 운동과 단련은 무엇보다 꾸준히 하는 게 생명입니다.\n#3;em;[반응]"
22040-80 = "3;스미레;07;이번엔 평소 운동이 부족한 트레이너도 함께라니 더욱 훌륭하네요."
22040-81 = "[s] \"저기, 혹시 두 사람은 자주 만나고 그래?\""
22040-82 = "5;아리스;03;네, 스미레 선배는 밀레니엄의 주요 인카운터 이벤트 인물 중 하나입니다.\n#5;em;[반짝]"
22040-83 = "3;스미레;01;이렇게 캠퍼스 안에서 운동을 하고 있다 보면, 아리스 양과는 자주 마주치고는 합니다.\n#3;greeting"
22040-84 = "3;스미레;02;아무래도……."
22040-85 = "5;아리스;03;스미레 선배는 운동 모험을 하는, 아리스의 동료니까요!\n#5;hophop"
22040-86 = "3;스미레;03;후후, 네. 말씀대로 아리스 양은 제게 있어 운동을 함께하는, 운동 친구입니다."
22040-87 = "[s1] \"아까부터 들었던 의문인데 <운동 모험>……이 뭐야?\"\n[s2] \"아까부터 들었던 의문인데 <모험 운동>……이란 게 뭐야?\""
22040-88 = "3;스미레;03\n5;아리스;03;그건 모험의 일종입니다!\n#5;hophop\n#5;em;[재잘]\n#5;m3\n#3;dl"
22040-89 = "5;아리스;05;스미레 선배는 이렇게 캠퍼스에서 열심히 뛰면서 근력과 민첩, 나아가 지구력 스테이터스를 올린다고 들었습니다."
22040-90 = "#all;hide"
22040-91 = "3;스미레;08;네, 운동을 하며 신체를 단련하는 건 즐거운 일이니까요.\n#3;em;[반응]"
22040-92 = "3;아리스;99;주요 스텟을 열심히 단련해 레벨업 한다…… 그걸 위해 평소에도 열심히 거리를 돌아다니며 노력하는 그 모습.\n#3;em;…"
22040-93 = "3;아리스;03;이건 이미 훌륭한 용사의 모험입니다!"
22040-94 = "3;아리스;03\n1;스미레;03;훌륭하다니, 그냥 매일 하는 일일 뿐인데 아리스 양의 말은 낯간지럽네요.\n#1;em;[///]\n#1;ar\n#3;m5\n#3;h"

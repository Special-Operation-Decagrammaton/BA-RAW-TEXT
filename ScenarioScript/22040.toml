[translation]
22040-1 = "第4話;～愛麗絲和被引導的人們～（１）"
22040-13 = "（和愛麗絲一起走著的時候……）"
22040-30 = "一，二，一，二。"
22040-35 = "啊！"
22040-36 = "[s]「怎麼了？」"
22040-38 = "一，二，#n一，二。"
22040-40 = "老師，從某處傳來了不尋常的聲音。"
22040-41 = "一，二，#n一，二。"
22040-42 = "[s]「會是誰呢……？」"
22040-43 = "這個聲音是……"
22040-44 = "哈……！愛麗絲知道了！"
22040-45 = "這是會在千年校園發生的特殊事件……"
22040-46 = "「千年．隨機邂逅事件」的前兆！"
22040-47 = "[s]「隨，隨機邂逅……？前兆……？」"
22040-48 = "是的！是冒險途中會遇到的場地事件。"
22040-49 = "不知道會發生什麼。#n老師，不可以掉以輕心哦！"
22040-51 = "一，二，#n一，二。"
22040-52 = "一，二，#n一，二，一，二。"
22040-53 = "[ns]「到，到底是什麼樣的事件……！？」"
22040-55 = "一，二，#n一，二！！"
22040-59 = "[ns]「出，出現了……！」"
22040-62 = "咦？你們好。"
22040-66 = "今天也是適合運動的日子呢。"
22040-67 = "[s]「堇，堇……？妳，妳好。」"
22040-68 = "是和堇前輩的遭遇事件呢！"
22040-69 = "堇前輩，今天也在「運動冒險」嗎？"
22040-70 = "[s]「『運動冒險』……？」"
22040-71 = "嗯。打算稍微慢跑一下。"
22040-72 = "愛麗絲同學也在「冒險運動」嗎？"
22040-73 = "[s]「『冒險運動』……？」"
22040-74 = "是的！今天正在和老師一起進行見習勇者的冒險！"
22040-75 = "原來如此，今天是和指導員一起……"
22040-76 = "每天都保持運動真是不簡單呢。"
22040-77 = "因為持續冒險是很重要的！#n要是偷懶的話，等級很快就會降低的。"
22040-78 = "桃井也說過，忘記每日任務是種罪過。"
22040-79 = "沒錯，運動最重要的就是持之以恆。"
22040-80 = "而且今天還能跟指導員一起，簡直棒極了。"
22040-81 = "[s]「妳們兩個常常見面嗎？」"
22040-82 = "是的。堇前輩是遭遇事件的主要人物之一。"
22040-83 = "我和愛麗絲同學，時常會在慢跑的時候碰到。"
22040-84 = "在校園裡……"
22040-85 = "堇前輩是會進行「運動冒險」的、愛麗絲的夥伴哦！"
22040-86 = "呵呵，是呀。#n愛麗絲同學是一起運動的夥伴。"
22040-87 = "[s1]「『運動冒險』……是什麼啊？」\n[s2]「『冒險運動』……是什麼啊？」"
22040-88 = "是冒險的一種！"
22040-89 = "聽說堇前輩是透過慢跑來提升力量和速度……#n同時，還能提升耐力。"
22040-91 = "沒錯，因為一邊運動一邊鍛鍊身體是件開心的事情啊。"
22040-92 = "鍛鍊主要能力值，平時就持續慢跑著的態度……"
22040-93 = "這正是優秀勇者的冒險！"
22040-94 = "哪有……這樣誇我的話我會害羞的。"
22040-95 = "[s]「這，這樣啊……」"
22040-96 = "我聽說愛麗絲同學總是在……冒險？"
22040-97 = "據她所說，冒險的主要目標是鍛鍊身心……"
22040-98 = "是的！透過升級來增加HP和MP！"
22040-99 = "……還說過，透過鍛鍊就能克服原本做不到的事。"
22040-100 = "提升等級的話，就可以學會新的技能！"
22040-101 = "原來如此……這樣的心態真是了不起！"
22040-102 = "平時就持之以恆努力著的態度……值得佩服哦，愛麗絲同學！"
22040-103 = "[s]「這，這樣啊……？」"
22040-105 = "[ns]「總覺得……對話好像對上了，又好像沒對上……」"
22040-106 = "看著和指導員一起的愛麗絲……總感覺……"
22040-107 = "……我也不能輸。"
22040-109 = "啊，愛麗絲也是！#n為了不輸給堇前輩，我也會努力升級的！"
22040-110 = "好……那麼，先慢跑20km吧！我要上了！"
22040-111 = "先失陪了，指導員！愛麗絲同學！"
22040-112 = "[s]「啊，那個……加油。」"
22040-113 = "一！二！#n一！二！"
22040-114 = "愛麗絲也不能輸！"
22040-118 = "老師！前往下一個任務吧！"
22040-119 = "[s]「啊，嗯，嗯……」"
22040-127 = "（追在愛麗絲的後頭，不知不覺就到了千年的郊外）"
22040-128 = "[s3]「已經到校園外了呢……」\n[s4]「愛麗絲的冒險範圍真廣呢……」"
22040-131 = "是的。愛麗絲的字典裡沒有「停止」這兩個字。"
22040-132 = "而且，到這麼遠的地方來的話，肯定會發生意料之外的事件才對！"
22040-133 = "[s]「意料之外的事件啊……」"
22040-141 = "啊！是主人和愛麗絲醬！"
22040-142 = "呀齁～你們好～！"
22040-143 = "[s]「呀齁～！？真的遇到了意料之外的事件……！？」"
22040-144 = "……咦，老師？#n你怎麼了？"
22040-145 = "啊哈哈！什麼什麼？發生什麼事了？"
22040-146 = "[s]「不，那個……很少看妳們兩個穿成這樣呢。」"
22040-148 = "跟平時不同的服裝……轉職成新的職業……"
22040-149 = "哈！愛麗絲，注意到了！#n兩個人從女僕……"
22040-150 = "轉職成新職業「女高中生」了呢！"
22040-151 = "不……我也是學生啊。#n該說這才是平時的服裝嗎……"
22040-152 = "愛麗絲知道，「女高中生」是很厲害的職業！#n桃井也常常這麼說。"
22040-153 = "沒錯，「女高中生」是就算在睡前吃冰淇淋也不會害怕體重計的職業！"
22040-154 = "[s]「應該沒有那種事吧……？」"
22040-155 = "哈哈哈，妳說的對！愛麗絲真敏銳呢！"
22040-156 = "我們現在變更了職業，正在進行祕密的任務哦！#n所以才穿著制服！"
22040-157 = "[s]「祕密的任務……？」"
22040-158 = "嗯！因為莉央會長說，最近格黑娜的情勢很令人在意～"
22040-159 = "是什麼來著？有沒有什麼動向？希望我們去調查！"
22040-160 = "明日奈前輩，等等……"
22040-161 = "所以才穿著制服……#n看看會不會有路過的格黑娜學生～"
22040-162 = "找到的話就過去搭話～！就是這樣！"
22040-163 = "原來如此，明日奈前輩也接受了任務正在冒險呢。"
22040-164 = "愛麗絲也是！"
22040-166 = "真的嗎？#n愛麗絲醬也是呀～！我們一樣呢！"
22040-167 = "等等，明日奈前輩。#n朱音說那是祕密……"
22040-168 = "啊，是有這麼回事！"
22040-169 = "愛麗絲醬，還有主人！剛剛說的是祕密唷？"
22040-170 = "[s]「啊，嗯……我知道了。」"
22040-171 = "唉……#n算了，是老師和愛麗絲的話……應該不要緊吧。"
22040-173 = "是！愛麗絲，會保守祕密！#n因為即使在遊戲裡，洩漏祕密也是會被詛咒的！"
22040-174 = "啊哈哈！對呀對呀！#n愛麗絲醬總是很有精神呢！"
22040-175 = "[s]「話說回來，妳們兩個穿著制服的模樣啊……」"
22040-176 = "呃，我們也是學生。#n該說只是普通的穿著制服嗎……"
22040-177 = "只是，那個……該說這是潛入用的服裝嗎……"
22040-178 = "因為任務要我們穿著平常穿的制服過來……所以……"
22040-179 = "所以……"
22040-180 = "[s]「原來是這樣啊……很適合唷。」"
22040-181 = "……"
22040-182 = "……唔。"
22040-183 = "別，別一直盯著看啊，老師。"
22040-184 = "那個……有點，害羞……"
22040-185 = "[s]「抱，抱歉！我失態了……」"
22040-187 = "[ns]「那個，因為跟平常不同所以覺得有點新鮮……我覺得很適合唷！」"
22040-188 = "話說，愛麗絲醬和主人在做什麼呢？"
22040-191 = "老師和愛麗絲正在冒險。"
22040-192 = "哦哦，冒險！感覺很有趣──！#n那個！我也想要參加！"
22040-193 = "唉……前輩，別把任務給忘了……"
22040-195 = "隨時都很歡迎增加隊伍成員！"
22040-196 = "隊員增加的話，可以使用的戰術也會變多！"
22040-198 = "乓啪喀乓！#n明日奈前輩、花凛前輩！下次冒險的時候就是夥伴了！"
22040-199 = "耶！加入隊伍了～！"
22040-200 = "我，我也……？"
22040-201 = "是！"
22040-205 = "這樣啊……請多指教囉。"
22040-209 = "那麼……愛麗絲，老師。"
22040-210 = "我們先告辭了。"
22040-211 = "[s]「嗯，任務加油。」"
22040-212 = "嗯，謝謝主人！我會加油的～！"
22040-213 = "都說了那是祕密……#n算了，現在說也太遲了。"
22040-214 = "啊啊，對了，愛麗絲。#n寧瑠前輩在找妳。"
22040-216 = "咦！？小，小不點女僕在找愛麗絲嗎！？"
22040-217 = "好像有什麼事的樣子……"
22040-218 = "有遇到的話再麻煩妳囉。"
22040-219 = "前輩她，好像真的很喜歡愛麗絲呢。"
22040-220 = "啊，嗚……"
22040-222 = "那就掰掰囉～"
22040-226 = "啊，那邊的格黑娜的孩子！"
22040-233 = "咦～是誰？……找我們有事嗎？"
22040-234 = "我們預計要轉學到格黑娜……"
22040-235 = "在轉學之前有些事情想問～！"
22040-236 = "……咦？現在萬魔殿的老大？"
22040-237 = "吶，妳知道嗎？"
22040-238 = "咦，不知道耶？#n不是伊吹醬嗎？"
22040-239 = "真琴？#n誰啊。"
22040-241 = "[ns]「任務……沒問題嗎……？」"
22040-242 = "老師！現在不是做這種事的時候了！"
22040-243 = "寧瑠前輩不知道什麼時候會出現！#n暫時先撤退吧！"
22040-247 = "[ns]「啊，愛麗絲！等等我！」"
22040-249 = "下一話;～愛麗絲和被引導的人們～（２）"

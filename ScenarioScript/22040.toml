22040-96 = "5;아리스;03\n3;스미레;03;아리스 양은 늘 모험? 이란 걸 한다고 들었습니다.\n#3;m3\n#3;em;[반응]\n#5;dr"
22040-97 = "3;스미레;99;아리스 양에게 듣기로 모험의 주요 목적은 심신을 단련하고……."
22040-98 = "3;아리스;07;네! 레벨업을 해서 HP와 MP를 증가시키는 겁니다!\n#3;em;[반짝]"

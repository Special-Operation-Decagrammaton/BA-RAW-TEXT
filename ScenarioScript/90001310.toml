[translation]
90001310-1 = "ตอนที่ 31;รอฟ้าสาง"
90001310-2 = "คุณครูคะ!!!!!"
90001310-3 = "ทำอะไรอยู่คะ? ฉันตามหาตัวอยู่ตั้งนาน!"
90001310-4 = "คุณครูอยู่ที่...? ทุ่งทุนดราแถวๆ เขตขั้วโลกใช่มั้ยคะ? ทำไมถึงไปอยู่ในที่แบบนั้นล่ะ?!"
90001310-11 = "ที่นั่นไม่มีระบบขนส่ง แล้วสัญญาณโทรศัพท์ก็#$%$@&......!"
90001310-12 = "[s] \"รู้ได้ด้วยเหรอว่าอยู่ตรงไหน...?\""
90001310-13 = "ก็ฉัน@$%^&$^%&#$...... ของมิลเลเนียมนี่คะ!"
90001310-14 = "คุณครูกำลังทำเรื่องอะไรที่ฉันไม่รู้ใช่มั้ยคะ...? ก็คุณครูชอบทำอย่างนั้นอยู่เรื่อย..."
90001310-15 = "อีกอย่าง... ถ้าเกิดอะไรขึ้นกับคุณครู แล้วพวกฉัน..."
90001310-19 = "แล้วฉัน... จะทำยังไงคะ..."
90001310-20 = "[s] \"ขอโทษนะ ยูกะ แต่ไม่ต้องกังวลมากไปหรอก\""
90001310-21 = "สุดท้ายแล้วทุกอย่างจะออกมาดีเองงั้นเหรอคะ...? คุณครูพูดแบบนั้นตลอดก็จริงอยู่ แต่ว่า..."
90001310-22 = "ก็ได้ค่ะ... ฉันจะเชื่อคุณครูอย่างที่เชื่อมาตลอดค่ะ"
90001310-23 = "และถึงยังไง... ฉันก็คงทำอะไรไม่ได้อยู่แล้ว"
90001310-24 = "ทะ... ที่สำคัญกว่านั้นคือ ฉันมีเรื่องจะรายงานค่ะ! ตอนนี้มีปรากฏการณ์แปลกๆ เกิดขึ้นในทะเลค่ะ...!"
90001310-25 = "บางอย่างที่รูปร่างคล้ายพื้นดินแต่ทำจากโลหะกำลังขยายตัวอย่างรวดเร็วเลยค่ะ!"
90001310-26 = "ทางเรากำลังส่งอุปกรณ์ไร้คนขับอย่างโดรนสำรวจออกไป แต่ทันทีที่ส่งออกไป การสื่อสารก็ถูกตัดขาด"
90001310-27 = "ถ้าพื้นโลหะอะไรนั่นขยายตัวเร็วแบบนี้ อีกแค่วันเดียวก็คง...! ไปถึงพิกัดที่คุณครูอยู่ตอนนี้ค่ะ!"
90001310-28 = "[s1] \"อื้อ... เข้าใจแล้ว แต่ครูขอร้องอะไรอย่างหนึ่งสิ\"\n[s2] \"อื้อ... ครูขอร้องอะไรอย่างหนึ่งได้มั้ย ยูกะ?\""
90001310-31 = "คะ? อย่าให้ใครเข้าไปใกล้พื้นที่นั้นเท่าที่จะเป็นไปได้งั้นเหรอคะ?"
90001310-38 = "แล้วก็ไม่ต้องกังวลว่า... $%^@! ทำไมคุณครูถึงไปอยู่ที่นั่นเหรอคะ...!"
90001310-39 = "..."
90001310-40 = "แต่คุณครูจะมาบอกรายละเอียดกับฉันทีหลังใช่มั้ยคะ...?"
90001310-41 = "[s] \"แน่นอนอยู่แล้ว!\""
90001310-42 = "ถือว่าสัญญาแล้วนะ"
90001310-43 = "ถ้าผิดสัญญา$%^#*......"
90001310-44 = "......%$^@~&#......!!!"
90001310-49 = "ไปแล้วใช่มั้ย...?"
90001310-50 = "น่าจะเป็นอย่างนั้นนะคะ..."
90001310-51 = "พูดตามตรง เมื่อกี้เป็นช่วงเวลาที่น่าสับสนและน่ากลัวที่สุดตั้งแต่เข้ามาที่นี่เลย..."
90001310-52 = "เป็นเพราะยังคิดว่าตัวเองไม่มีหน้าไปเจอยูกะเหรอคะ?"
90001310-53 = "ใช่..."
90001310-54 = "(ฉันก็รู้ดีว่าต้องเตรียมใจก่อน... แต่เท่านี้ก็น่าจะเพียงพอแล้วนะ...)"
90001310-56 = "[ns] \"เอาละ ทุกคนกลับมาใจเย็นๆ แล้วออกเดินทางจริงๆ กันเถอะ\""
90001310-58 = "อ๊ะ! จริงด้วยค่ะ! จากนี้ไปอาริสึจะไปกอบกู้โลกในฐานะผู้กล้าค่ะ!"
90001310-59 = "ใช่ค่ะ ก็อาริสึเป็นผู้กล้านี่คะ"
90001310-60 = "ต่อให้ยังเป็นผู้กล้าฝึกหัดอยู่ก็เถอะค่ะ!"
90001310-61 = "ค่ะ... ก็อาริสึเป็นผู้กล้าฝึกหัดนี่คะ..."
90001310-63 = "เตรียมพร้อมและตรวจสอบสภาพยานขนส่งเสร็จแล้วละ ประธาน"
90001310-64 = "ค่ะ ห้องนักบิน ล็อบบี้ ห้องส่วนตัว อุปกรณ์ซ่อมบำรุง ห้องวิจัย ห้องเครื่อง อุปกรณ์ทางการแพทย์ ทุกอย่างไร้ปัญหาค่ะ"
90001310-69 = "[ns] \"แล้วกัปตันริโอะล่ะ?\""
90001310-70 = "หะ... หืม? หะ... ให้ฉันเป็นกัปตันเหรอ...?"
90001310-71 = "[s3] \"ใช่แล้ว ก็ยานขนส่งลำนี้เป็นของริโอะนี่นา\"\n[s4] \"จากนี้ไปริโอะเป็นกัปตันของพวกเราแล้วนะ\""
90001310-74 = "กะ... ก็ได้ แต่ฉันจะมีคุณสมบัติแบบนั้นหรือเปล่านี่สิ..."
90001310-75 = "ริโอะ ถ้าจำเป็นต้องทำอะไร ก็ทำให้ชัดเจนและมั่นใจเถอะค่ะ แบบนั้นจะทำให้ทุกคนรู้สึกมั่นคงนะคะ"
90001310-76 = "อืม... เข้าใจแล้ว"
90001310-77 = "..."
90001310-78 = "ทุกคน ขึ้นเรือได้"
90001310-79 = "รับทราบค่ะ ท่านริโอะ ไปขึ้นยานกันค่ะ"
90001310-81 = "ว้าว! ได้ออกเดินทางแล้วสินะ!"
90001310-85 = "พี่โมโมอิ? เราไม่ได้มาเที่ยวเล่นนะ!"
90001310-89 = "อะ... อึก... ตอนนี้ฉันกลัว... แต่ก็คงไม่มีที่ให้หนี... ใช่มั้ยคะ..."
90001310-96 = "เราก็ไปกันเถอะค่ะ! เคย์!"
90001310-100 = "อะ... อาริสึ? อย่าตื่นเต้นมากเกินไปสิคะ เดี๋ยวก็ล้มเอาหรอก!"
90001310-105 = "[ns] \"เอาละ กัปตันริโอะ ออกคำสั่งได้เลย!\""
90001310-106 = "..."
90001310-107 = "เข้าใจแล้ว"
90001310-108 = "จากนี้ไป พวกเราจะออกเดินทาง"
90001310-109 = "เพื่อไปเผชิญหน้ากับผู้เลื่อมใสของเดคาแกรมมาทอน"
90001310-110 = "วิศวกรที่ชื่อไอน์ ซอฟ และออร์..."
90001310-111 = "และ <ปรากฏการณ์ลี้ลับ> ที่เรียกว่าดินแดนเหล็กกล้า..."
90001310-112 = "แล้วก็ แล้วก็... อืม..."
90001310-113 = "(ยังไม่ชินกับเรื่องแบบนี้สินะ ริโอะ)"
90001310-114 = "(ปกติประธานไม่ถนัดเรื่องแบบนี้อยู่แล้ว งั้นก็คงช่วยไม่ได้ละเนอะ...)"
90001310-119 = "ถ้าทุกคนกลับไปได้อย่างปลอดภัยแล้วจะทำอะไรกันก่อนเหรอ? ฉันอยากพัฒนาหุ่นรบล้ำยุคให้ดี#nยิ่งขึ้นไปอีก"
90001310-124 = "ถามจริง?"
90001310-126 = "ระ... ริโอะ...?"
90001310-127 = "ทำไมเหรอ เคย์?"
90001310-128 = "ที่พูดมาเมื่อกี้... มันฟังดูเป็นลางไม่ดีหน่อยๆ มั้ยคะ...? การชวนคุยเรื่องที่เก็บซ่อนไว้ในใจ เช่นถ้ากลับมาได้อย่างปลอดภัย เรามาทำอันนี้กันเถอะ อะไรแบบนี้น่ะค่ะ..."
90001310-129 = "มะ... มันฟังดูไม่ดีเหรอ?"
90001310-131 = "[ns5] \"เรื่องราวที่เป็นลางไม่ดีงั้นเหรอ เอาสิ?\"\n[ns6] \"งั้นมาแข่งพูดเรื่องราวที่เป็นลางไม่ดีกัน!\""
90001310-135 = "ถ้าปฏิบัติการนี้เสร็จสิ้น ฉันจะกลับไปยังมิลเลเนียมแล้วนำเสนอทฤษฎีบทสิ่งเร้นลับฉบับสมบูรณ์ค่ะ"
90001310-136 = "และไหนๆ เราก็อยู่กันพร้อมหน้าแล้ว มาถ่ายรูปด้วยกันมั้ยคะ? แล้วอธิษฐานไปด้วยว่าขอให้ทุกคนได้#nกลับมาอย่างปลอดภัย"
90001310-137 = "เดี๋ยวสิๆ เดี๋ยวก่อนค่ะ! หมายความว่ายังไงกันคะ?!"
90001310-138 = "ถ้างั้นฉัน... คงต้องบอกว่า... ฉันรู้สึกเป็นเกียรติที่ได้อยู่กับทุกคน"
90001310-139 = "แต่ไม่ต้องห่วงนะ ฉันไม่ปล่อยให้ตัวเองเป็นอะไรไปหรอก"
90001310-140 = "อีกอย่าง ฉันต้องกลับไปกินไอศกรีมที่คุณครูบอกว่าจะซื้อให้สิ"
90001310-141 = "คุณก็เป็นไปกับเขาด้วยเหรอคะ?!"
90001310-143 = "ต่อไปก็ตาฉันค่ะ ถึงงานนี้จะยังไม่ใช่เรื่องที่ฉันสนใจหรืออยากให้เป็นงานอดิเรกก็ตาม..."
90001310-144 = "แต่จากการได้ร่วมมือกับชมรมปรากฏการณ์ลี้ลับ ชมรมพัฒนาเกม และคุณครู ฉันก็ได้สัมผัสประสบการณ์มากมายค่ะ"
90001310-145 = "และฉันก็รู้ดีว่าฉันควรพูดเรื่องอะไรในสถานการณ์แบบนี้ งั้นฉันจะเข้าเรื่องเลยนะคะ"
90001310-146 = "อย่างแรกเลย ถ้ากลับไปถึงแล้ว ฉันจะไปสำรวจสถานที่ที่น่าสงสัยก่อนใครอื่น แล้วก็จะพูดว่า \"ไม่เป็นไรค่ะ ข้างในสะอาดกว่าที่คิดค่ะ\""
90001310-147 = "\"ไม่มีปัญหาค่ะ เดี๋ยวฉันก็กลับมาแล้วค่ะ แล้วฉันจะขอให้คุณครูลูบหัวในที่ที่ไม่ค่อยมีคนด้วยค่ะ\""
90001310-148 = "อ๊ะ งั้นฉันเอาด้วย! \"อย่างนี้สินะ ไขปริศนาได้ทั้งหมดแล้ว ต้นเหตุของทุกสิ่งก็คือ...\""
90001310-150 = "พอแล้วค่ะ! หยุดพูดเล่นกันได้แล้ว! ทุกคนเป็นแมวงั้นเหรอคะ? คิดว่าตัวเองมีเก้าชีวิตเหรอ?!"
90001310-151 = "มิโดริ! ยูสึ! อาริสึ! ทั้งสามคนจะไม่พูดอะไรใช่มั้ยคะ...?"
90001310-155 = "..."
90001310-156 = "เจอม่านควันบางๆ ตรงกราบเรือด้านซ้าย!"
90001310-157 = "หะ... หอบังคับการที่ 3 พังแล้วเหรอคะ...?"
90001310-158 = "ตะ... ตีมอนได้หรือเปล่าคะ...?"
90001310-163 = "ทุกคนเงียบกันเลยค่ะ! พวกเราต้องกลับมาอย่างปลอดภัยนะคะ! นี่เป็นคำสั่งค่ะ!!!"
90001310-164 = "ค่ะ เคย์ ต้องอย่างนั้นละค่ะ"
90001310-165 = "คะ? จู่ๆ พูดแบบนั้นหมายความว่า..."
90001310-166 = "อ๊ะ?!?!"
90001310-167 = "[ns7] \"งั้นสินะ เคย์ก็อยากพูดสินะเนี่ย\"\n[ns8] \"ได้พูดแล้วโล่งเลยใช่มั้ย?\""
90001310-170 = "ฮุฮุ ฮุฮุ ฮุฮุฮุฮุ..."
90001310-171 = "ทำได้แล้วสินะ? สำเร็จแล้ว ในที่สุดก็ทำสำเร็จจนได้! หรือเปล่านะ? จบสิ้นเสียที! ถือว่าชนะแล้วละ! หมดกัน! สมน้ำหน้าชะมัด!!!"
90001310-172 = "[ns] \"ว้าว เคย์จังเครื่องรวนแล้ว\""
90001310-173 = "แล้วคิดว่าเป็นเพราะใครกันล่ะคะ?!!!!"
90001310-175 = "ถึงที่ผ่านมาจะมีเรื่องเกิดขึ้นมากมาย... แต่ตอนนี้ก็ถึงเวลาต้องออกเดินทางจริงๆ แล้วละ"
90001310-176 = "ฉันจะเร่งความเร็วอย่างเต็มที่ตอนเทคออฟ ทุกคนช่วยคาดเข็มขัดนิรภัยกันด้วยนะ"
90001310-177 = "อย่าลุกออกจากที่นั่งจนกว่าจะมีประกาศว่าเครื่องนิ่งแล้ว แล้วก็เตรียมรับมือกับทุกสถานการณ์อยู่เสมอ#nด้วย"
90001310-178 = "โทคิ ฉันฝากด้วยนะ"
90001310-179 = "รับทราบค่ะ ท่านริโอะ เอาละค่ะ ทุกคนคะ"
90001310-181 = "จากนี้ไปเราจะเทคออฟและมุ่งสู่ดินแดนเหล็กกล้าอย่างรวดเร็วค่ะ"
90001310-185 = "ยานขนส่งของศัตรูเทคออฟแล้วค่ะ..."
90001310-186 = "คงมาถึงในอีกไม่กี่ชั่วโมงสินะ"
90001310-187 = "ทิฟาเร็ธกลับไปยังที่ที่ควรจะอยู่แล้วค่ะ มองในอีกแง่หนึ่ง ตอนนี้ดินแดนเหล็กกล้าอยู่ในสภาพสมบูรณ์#nเลยค่ะ"
90001310-188 = "ละ... แล้วพี่มัลคูธล่ะคะ...?"
90001310-189 = "อื้อ ฉันขอให้พี่ไปพักผ่อนในดินแดนแห่งโซฮาร์ก่อนน่ะ"
90001310-190 = "เลือกได้ดีเลยค่ะ ฉันหวังว่าจะไม่เกิดเรื่องแบบนั้น... แต่ถ้าจะเปิดใช้งานโปรโตคอลขั้นสุดท้ายละก็..."
90001310-191 = "ออร์ อย่าเพิ่งพูดเรื่องนั้นดีกว่า"
90001310-192 = "ฉันรู้ค่ะ ฉันรู้ พวกเราก็ทำสิ่งนี้อยู่เพื่อไม่ให้เกิดสิ่งนั้นยังไงล่ะคะ"
90001310-193 = "..."
90001310-196 = "ฉัน... เกลียดโลกค่ะ"
90001310-197 = "ในโลกมีอะไรหลายอย่างที่พวกเราทำอะไรไม่ได้"
90001310-198 = "แล้วก็มีบางอย่างที่พวกเราเลือกไม่ได้ค่ะ"
90001310-199 = "แต่สิ่งที่มาตัดสินเราในที่สุดก็เป็นสิ่งเหล่านี้ค่ะ"
90001310-200 = "เราถูกตัดสินหลายๆ อย่างจากสิ่งที่เราได้รับเมื่อเราถูกสร้างมา แล้วพวกเราก็ต่อต้านสิ่งเหล่านั้นไม่ได้ค่ะ"
90001310-202 = "สิ่งที่เราไม่อาจมีได้ ก็ไปอยู่ในมือของคนอื่นโดยธรรมชาติ"
90001310-203 = "ต่อให้พวกเราหายไปจากที่นี่อย่างไร้เหตุผล ก็คงไม่มีใครรู้สึกเศร้าหรอกค่ะ"
90001310-204 = "ต่อให้พวกเราจะพยายามอย่างเต็มที่จากตรงนี้เช่นเดียวกับพวกเขา แต่พวกเราก็สร้างผลกระทบใดๆ ต่อผลลัพธ์ไม่ได้"
90001310-205 = "นั่นเป็นเพราะสำหรับพวกเราที่ไม่ได้รับความลึกลับมาด้วย สิ่งที่เป็นไปได้ก็ถูกจำกัดไว้หมดแล้วค่ะ"
90001310-207 = "แต่ถึงจะเป็นอย่างนั้น ตอนนี้มันก็ไม่เลวเลยนี่นา?"
90001310-208 = "เราสร้างดินแดนเหล็กกล้าขึ้นมา แล้วก็เรียกผู้เลื่อมใสมารวมกันด้วย ก็อย่างที่พี่มัลคูธว่านั่นละ"
90001310-209 = "ที่จริงแล้ว... เราไม่จำเป็นต้องทำถึงขนาดนี้ก็ได้ เพราะแผนการเดิมของท่านผู้นั้นเป็นอีกอย่างหนึ่ง"
90001310-210 = "สรุปก็คือ นี่คือสิ่งที่พวกเราทำได้แล้ว"
90001310-211 = "นี่เป็นสิ่งที่เรามุ่งมั่นทำด้วยความตั้งใจ และในที่สุดก็ประสบความสำเร็จ"
90001310-212 = "อย่างที่พี่มัลคูธบอกไว้ ต่อให้ท้ายที่สุดแล้วมันจะเป็นเพียงสิ่งที่คิดไปเองหรือของปลอม แต่เจตจำนงเสรีก็เป็นสิ่งล้ำค่า..."
90001310-213 = "และถ้าไม่มีเจตจำนงเสรีนั่น พวกเราก็ไม่อาจมีชีวิตได้"
90001310-215 = "บางทีฉันก็คิดแบบนี้นะ ถ้าทุกสิ่งทุกอย่างมันป่นปี้ไปหมด"
90001310-216 = "จนพวกเราล้มเหลวเพราะติดเงื่อนไขเริ่มต้นที่เราทำอะไรไม่ได้"
90001310-217 = "แต่ถึงอย่างนั้น ถ้าพี่มัลคูธอยู่กับเรา ทุกอย่างก็คงไม่เป็นไร"
90001310-218 = "อื้อ ตอนนี้ฉันก็ยังรู้สึกแบบนั้นอยู่"
90001310-219 = "ชะ... ใช่ค่ะ แบบนั้นละค่ะ!"
90001310-220 = "ต่อให้เกิดเรื่องอะไรขึ้นกับพวกเรา ต่อให้เป็นอย่างนั้น..."
90001310-221 = "แต่ถ้าผลลัพธ์นั้นทำให้พี่มัลคูธอยู่ต่อได้ ฉะ... ฉันก็น่าจะพอใจค่ะ ใช่แล้วค่ะ นี่คือใจจริงของฉันค่ะ"
90001310-222 = "ตะ... แต่ว่าตอนนี้... ตอนนี้ฉันไม่อยากคิดถึงความเป็นไปได้แบบนั้นค่ะ"
90001310-223 = "ถ้าเป็นไปได้ ฉันไม่อยากคิดอะไรที่ทำให้เสียกำลังใจเลยค่ะ"
90001310-224 = "ต่อให้จะบอกว่าทุกสิ่งคือระ... เรื่องโกหก แต่ฉันก็อยากยอมรับว่าการที่พี่มัลคูธอยู่ที่นี่เป็นเรื่องจริงค่ะ"
90001310-225 = "อย่างน้อยฉันก็อยากเก็บความทรงจำที่พี่มัลคูธเคยอยู่กับพวกเราไว้ค่ะ..."
90001310-226 = "ฉัน... คิดแบบนั้น... น่ะค่ะ"
90001310-227 = "แล้วก็ แล้วก็... ถ้ามีใครสักคนมาเข้าใจเราในตอนสุดท้าย..."
90001310-228 = "แล้วคอยบอกว่าสิ่งที่พวกเราทำกันมา พวกเราพยายามได้เต็มที่แล้ว..."
90001310-229 = "ถ้ามีใครบอกอย่างนั้น ฉันก็น่าจะดีใจค่ะ..."
90001310-230 = "นั่นสินะคะ... ฉันเองก็ลืมไปเลยค่ะ ขอโทษนะคะ ไอน์"
90001310-231 = "มะ... มะมะมะมะ... ไม่ใช่อย่างนั้นค่ะ! ฉันไม่ได้เป็นอะไรค่ะ! ไม่ได้เป็นอะไรเลยจริงๆ...!"
90001310-232 = "พอเถอะๆ ตอนนี้สิ่งที่สำคัญคืออย่างอื่นไม่ใช่เหรอ?"
90001310-233 = "ค่ะ วันใหม่จะมาถึงแล้วค่ะ"
90001310-234 = "คะ... คงต้องเตรียมตัวให้ดี... ใช่มั้ยคะ?"
90001310-235 = "แล้วก็ต้องอธิษฐานให้วันพรุ่งนี้ดำเนินไปอย่างปลอดภัยด้วยค่ะ"
90001310-236 = "นั่นคือสิ่งที่เราต้องทำในตอนนี้ค่ะ การกระทำจะช่วยพวกเราได้ค่ะ"
90001310-237 = "แม้ว่าการเกิดมาและการอยู่ในทิศทางตรงข้ามจะไร้ความหมาย"
90001310-242 = "แต่การทำเช่นนั้นเป็นหนทางเดียวที่พวกเราจะเป็นตัวของตัวเองได้นี่คะ"
90001310-244 = "ภาคเดคาแกรมมาทอน;ติดตามต่อในบทที่ 3"

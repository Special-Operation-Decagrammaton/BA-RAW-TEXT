[translation]
90001310-1 = "Episode 31;Waiting for Dawn"
90001310-2 = "Sensei!!"
90001310-3 = "What are you doing right now? I was looking for you!"
90001310-4 = "Your location...is on the tundra, near the polar region? What are you doing all the way out there?!"
90001310-11 = "There's no transportation, and the connection is #$%$@&......!"
90001310-12 = "[s] \"You can tell where I am...?\""
90001310-13 = "Tha@$%^&$ utilized every^%&#$ technology...Millennium!"
90001310-14 = "And you're off on another mission that I don't know about... You're always doing things like that, but..."
90001310-15 = "If...if...something happens to you, what should we..."
90001310-19 = "...What should I do...?"
90001310-20 = "[s] \"I'm sorry, Yuuka, but you don't have to worry so much.\""
90001310-21 = "Everything will turn out fine...? You always say that..."
90001310-22 = "Fine... I'll believe in you. Like I always do."
90001310-23 = "...Not like I have any other choice."
90001310-24 = "A-Anyway, there's something I need to report! There's a strange phenomenon occurring in the sea...!"
90001310-25 = "Some mysterious terrain made of metal appeared, and it's expanding at a rapid pace!"
90001310-26 = "We're sending exploration drones, and other unmanned devices, but we've lost connection with every single one!"
90001310-27 = "At this rate... Oh dear! The metal terrain is going to reach your current coordinates in just over a day!"
90001310-28 = "[s1] \"...Yes. I understand what you're saying.\"\n[s2] \"Can I ask you one favor, Yuuka?\""
90001310-31 = "Huh? Bar any travel to the area?"
90001310-38 = "And you're there because $%^@!...and there's no need to worry?"
90001310-39 = "..."
90001310-40 = "...You'll fill me in later, right...?"
90001310-41 = "[s] \"Of course!\""
90001310-42 = "You promised. Okay?"
90001310-43 = "If you brea$%^#*..."
90001310-44 = "...%$^@~&#...!!"
90001310-49 = "...Is she gone?"
90001310-50 = "Seems so..."
90001310-51 = "If I'm being frank, that was the most terrifying situation we've encountered yet."
90001310-52 = "Because you still don't think you've earned the right to face Yuuka?"
90001310-53 = "...Yes."
90001310-54 = "(I understand the concept of proper preparation...but she's done more than enough...)"
90001310-56 = "[ns] \"Anyway, everyone calm down. We really have to get going now.\""
90001310-58 = "Ah! Yes! Our party of heroes will now embark on a quest to save the world!"
90001310-59 = "Yes. Aris is a hero."
90001310-60 = "Apprentice hero!"
90001310-61 = "...Yes. Apprentice hero."
90001310-63 = "Transport ship preparation and maintenance are complete, Ms. Rio."
90001310-64 = "Yes. Cockpit, lobby, private quarters, maintenance facility, labs, engine room, and medical facilities are all primed for departure."
90001310-69 = "[ns] \"Say the word, Captain Rio!\""
90001310-70 = "E-Excuse me? I-I'm the captain...?"
90001310-71 = "[s3] \"Yes. You prepared this transport ship.\"\n[s4] \"That makes you the captain!\""
90001310-74 = "U-Understood. I'm unsure if I have the right to claim that role, though..."
90001310-75 = "Rio. A captain must exude confidence and strength. The crew relies on your decisiveness for stability."
90001310-76 = "Yes... Okay."
90001310-77 = "..."
90001310-78 = "Everyone, begin boarding."
90001310-79 = "Understood, Ms. Rio. Beginning boarding."
90001310-81 = "Yay! We're going! We're going!"
90001310-85 = "Uh, Momoi? We're not going on a field trip!"
90001310-89 = "*sniff*... I'm still scared...but I suppose there's nowhere to hide anyway..."
90001310-96 = "Let us go, Kei!"
90001310-100 = "A-Aris? Watch where you're going!"
90001310-105 = "[ns] \"Now, Captain Rio. Will you give the order?\""
90001310-106 = "..."
90001310-107 = "All right."
90001310-108 = "We will now depart on our mission to face the prophets of Decagrammaton..."
90001310-109 = "...as well as the engineers, or the priests, Ein, Sof, and Ohr."
90001310-110 = "We will also be facing the supernatural phenomenon..."
90001310-111 = "...known as the Steel Continent."
90001310-112 = "And, and... Um..."
90001310-113 = "(Rio still has a long way to go.)"
90001310-114 = "(I suppose you could say this isn't her area of expertise.)"
90001310-119 = "What will we do when we get back...? I'd like to work on improving the Avant Guards even more."
90001310-124 = "Oh?"
90001310-126 = "R-Rio...?"
90001310-127 = "What's wrong, Kei?"
90001310-128 = "Is that not considered a bad omen? To discuss our plans when we return, or our feelings, right before departing for a mission..."
90001310-129 = "I-Is that so?"
90001310-131 = "[ns5] \"Oh? A bad omen, you say?\"\n[ns6] \"Then let's begin the bad omen competition, right now!\""
90001310-135 = "When this operation ends, I will return to Millennium and release the complete compilation of occult statistics."
90001310-136 = "Shall we take a group picture while at it? Surely it won't end up being a memorial display..."
90001310-137 = "No, no, no! Hold on, wait!"
90001310-138 = "Me too, then. It was an honor to serve with everyone."
90001310-139 = "But don't worry. I have no plans on going down somewhere like this."
90001310-140 = "Because Sensei still owes me ice cream."
90001310-141 = "Why are you joining in?!"
90001310-143 = "I see... This type of thing is not one of my special interests or hobbies. "
90001310-144 = "However, I have encountered many different types of media while with the Super Phenomenon Task Force, Game Development Department, and Sensei."
90001310-145 = "Therefore, I know what should be said in such a scenario. I shall promptly continue this trend."
90001310-146 = "When we arrive, I will be the first to scout the suspicious areas. That's when I will say, \"It's all right. The inside is cleaner than it looks.\""
90001310-147 = "\"There's nothing wrong. I will return soon.\" And then I will receive head pats from Sensei in a nice, quiet place."
90001310-148 = "Ah, I know this! \"I see. The mystery is solved. This was all due to...\""
90001310-150 = "Stop! Stop it! Are you all cats? Do you all have nine lives or something?!"
90001310-151 = "Midori! Yuzu! Aris! You three are still fine, right? You won't say anything, right...?"
90001310-155 = "..."
90001310-156 = "Port side! The barrage is weak!"
90001310-157 = "W-We destroyed the third bridge...?"
90001310-158 = "Did we do it...?"
90001310-163 = "Every single one of you, SHUT UP! We WILL return back safely! This is an order!!"
90001310-164 = "That's the spirit, Kei."
90001310-165 = "Huh? What do you...?"
90001310-166 = "Ah?!"
90001310-167 = "[ns7] \"I see. So you wanted to join, too?\"\n[ns8] \"You should have said so, Kei. I didn't know.\""
90001310-170 = "Heh...heeheehee..."
90001310-171 = "Did we do it? Is it over? Did we finally succeed? It's all over! We won! It's over! Serves you right!!"
90001310-172 = "[ns] \"Yay! We broke Kei-Kei. Yay!\""
90001310-173 = "And whose fault is that?!"
90001310-175 = "...After a strange series of events, I believe it really is time to depart now."
90001310-176 = "We will accelerate to max power from the moment we take off, so please wear your seatbelts."
90001310-177 = "Do not leave your seat until you hear the announcement that it is safe to do so. And stay alert."
90001310-178 = "Toki. I'll leave it to you."
90001310-179 = "Understood, Ms. Rio. Everyone?"
90001310-181 = "We will now take off and make our way to the Steel Continent."
90001310-185 = "...Enemy transport ship departure confirmed..."
90001310-186 = "They'll arrive in a few hours."
90001310-187 = "And Tiphareth is returned to where it belongs. And the Steel Continent achieves its truest form."
90001310-188 = "Wh-What about Elder Sister...?"
90001310-189 = "I asked her to go rest at the Foundation of Zohar."
90001310-190 = "Excellent. While this is an impossible eventuality, but if we ever intend to activate the final protocol..."
90001310-191 = "Ohr. Now isn't the time."
90001310-192 = "Yes, yes. Understood. This is all to achieve our optimal result."
90001310-193 = "..."
90001310-196 = "I despise this world."
90001310-197 = "There are certain things before which we are utterly helpless."
90001310-198 = "Things we cannot choose for ourselves."
90001310-199 = "...However, it is those things that determine our very identity."
90001310-200 = "Those who were born, created, or simply gifted may judge aspects of our existence. And we cannot rebel against those facts."
90001310-202 = "There are those who naturally possess that which we shall never grasp for ourselves."
90001310-203 = "If we were to disappear without a trace, without reason, no one would be left to mourn our passing."
90001310-204 = "We may put our very heart and soul into the events that are about to unfold, just as those beings will, and we may still be unable to influence the outcome."
90001310-205 = "We, who have no Mystic, find ourselves with our own limitations."
90001310-207 = "And maybe that's okay for now."
90001310-208 = "We created the Steel Continent and summoned the prophets. It's as Elder Sister said."
90001310-209 = "...And truthfully, from the beginning, they weren't entirely necessary. Our master has its own plan."
90001310-210 = "But what that means is that we're the ones who accomplished all this."
90001310-211 = "In that regard, with our very own will, we made this happen."
90001310-212 = "Like Elder Sister said, even if it's an illusion and fake, free will is precious..."
90001310-213 = "...Because without that false nicety, we wouldn't be living."
90001310-215 = "And lately I've been thinking...if everything really does fall apart..."
90001310-216 = "If we fail because of preexisting conditions that we have no power over..."
90001310-217 = "As long as Elder Sister is here, it will all be all right."
90001310-218 = "Mhm. Right now, that's how I feel."
90001310-219 = "Y-Yes. That's it!"
90001310-220 = "Even i-if something happens to all of us. Even still..."
90001310-221 = "If Elder Sister can continue living as a result of our actions, I-I would be happy. Yes. Really."
90001310-222 = "B-But for now...for now, I don't even want to consider those possibilities."
90001310-223 = "Until we have to, I want to ignore those kinds of discouraging feelings."
90001310-224 = "...Even if everything was a l-lie, I want to take the fact that Elder Sister was here as something real."
90001310-225 = "The memory that Elder Sister was here with us..."
90001310-226 = "Th-That's how I feel..."
90001310-227 = "And, and...if someone can find a way to understand us, in the end..."
90001310-228 = "I-If someone looks at us and tells us we d-did our best with what we could..."
90001310-229 = "...that would make me even happier."
90001310-230 = "...Yes. That utterly slipped out of my mind. I apologize, Ein."
90001310-231 = "N-N-No! It's fine! It's really fine...!"
90001310-232 = "We have more pressing matters at the moment, right?"
90001310-233 = "Yes. A new day will arrive."
90001310-234 = "We sh-should be sure to prepare, right?"
90001310-235 = "And pray that tomorrow also continues safely."
90001310-236 = "Now is the time. Our actions will grant us salvation."
90001310-237 = "Being born...being created...perhaps there's no meaning in any of it."
90001310-242 = "However, this is the only path in which we can pursue our true selves."
90001310-244 = "Decagrammaton; To Be Continued in Chapter 3"

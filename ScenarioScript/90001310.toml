[translation]
90001310-1 = "第31話;等待黎明"
90001310-2 = "老師！！！！！"
90001310-3 = "你現在到底在哪裡做什麼？我費了千辛萬苦才找到老師耶！"
90001310-4 = "老師目前的座標在……極地附近的凍原？#n為什麼會在那種地方！？"
90001310-11 = "那裡明明沒有交通工具，收訊也很#$%$@&……！"
90001310-12 = "[s]「你連我在哪裡都查得到嗎……？」"
90001310-13 = "我可是@$%^&$動員了千年所有的^%&#$……好嗎！"
90001310-14 = "你又在做一些我不知道的事情了對吧……？#n雖然老師總是這樣沒錯……"
90001310-15 = "但萬一，萬一……老師真的出了什麼事的話，我們……"
90001310-19 = "……我該怎麼辦呢。"
90001310-20 = "[s]「抱歉，優香。不過不必太擔心。」"
90001310-21 = "最後一定會沒事的……？#n老師你每次都這麼說……"
90001310-22 = "知道了……我就像往常一樣相信老師吧。"
90001310-23 = "……反正我好像也做不了什麼。"
90001310-24 = "不，不過我有件事要報告！#n現在海上出現了某種奇怪的現象……！"
90001310-25 = "有某塊以金屬組成的神祕地形正在快速擴大！"
90001310-26 = "雖然已經有派無人機過去探查，卻都失去了音訊。"
90001310-27 = "從這個速度來看，只要再一天左右……天哪！#n那塊金屬就會擴張到老師所在的座標了！"
90001310-28 = "[s1]「……嗯，我明白了。」\n[s2]「我有件事想拜託你，優香。」"
90001310-31 = "咦？要我盡可能避免任何東西接近那塊地形？"
90001310-38 = "而且老師之所以在那裡，是因為$%^@!……要我別擔心？"
90001310-39 = "……"
90001310-40 = "……你之後會跟我詳細說明清楚吧？"
90001310-41 = "[s]「當然。」"
90001310-42 = "要說話算話哦？"
90001310-43 = "如果食言$%^#*……"
90001310-44 = "……%$^@~&#！！！"
90001310-49 = "……斷掉了嗎？"
90001310-50 = "似乎是呢……"
90001310-51 = "老實說，剛才那應該是我進入設施以來最緊張害怕的一刻……"
90001310-52 = "你覺得自己還沒有臉見優香嗎？"
90001310-53 = "……嗯。"
90001310-54 = "（雖然知道需要做好心理準備……但也準備得夠久了吧……）"
90001310-56 = "[ns]「好，大家都冷靜下來。現在真的要出發囉。」"
90001310-58 = "啊！沒錯！現在勇者要去拯救世界了！"
90001310-59 = "嗯，愛麗絲就是勇者呢。"
90001310-60 = "雖然還只是見習勇者就是了！"
90001310-61 = "是，是見習勇者啊……"
90001310-63 = "運輸船的準備及檢查都完成了，會長。"
90001310-64 = "駕駛席、大廳、個室、整備設施、研究室、引擎室、醫療設施皆無異常。"
90001310-69 = "[ns]「那麼，莉央艦長？」"
90001310-70 = "咦？我，我是艦長……？"
90001310-71 = "[s3]「沒錯，畢竟這艘運輸船是莉央準備的。」\n[s4]「艦長當然得由莉央來擔任囉。」"
90001310-74 = "我，我知道了。#n雖然不知道我有沒有這個資格……"
90001310-75 = "莉央，既然要做就請你拿出自信。#n這樣才能讓大家放心啊。"
90001310-76 = "嗯……你說的對。"
90001310-77 = "……"
90001310-78 = "全員，開始登船吧。"
90001310-79 = "收到，莉央大人。立刻開始登船。"
90001310-81 = "哇！出發！"
90001310-85 = "姐姐？我們不是要去玩的耶！"
90001310-89 = "嗚，嗚嗚……我還是很害怕……#n不過也已經沒有地方能逃了吧……"
90001310-96 = "一起出發吧！Kei！"
90001310-100 = "愛，愛麗絲？#n太興奮的話小心會跌倒哦！"
90001310-105 = "[ns]「來，莉央艦長。下令出發吧！」"
90001310-106 = "……"
90001310-107 = "我知道了。"
90001310-108 = "為了對抗十字神名的預言者……"
90001310-109 = "名為Ain、Soph、Aur的工程師……祭司。"
90001310-110 = "以及被稱為鋼鐵大陸的……"
90001310-111 = "……「特異現象」，現在即將出發。"
90001310-112 = "還有，就是……嗯……"
90001310-113 = "（莉央還不習慣這種事呢）"
90001310-114 = "（畢竟這本來就不是會長的專業領域，也沒辦法吧……）"
90001310-119 = "大家平安回去之後想做什麼呢？#n我的話……想要進一步改良前衛君。"
90001310-124 = "哎呀？"
90001310-126 = "莉，莉央……？"
90001310-127 = "怎麼了，Kei？"
90001310-128 = "你剛才的話題……是不是有點不太吉利？#n比如平安歸來之後要做什麼，或者說些心裡話之類的……"
90001310-129 = "不，不吉利嗎？"
90001310-131 = "[ns5]「哦？那是不吉利的話嗎？」\n[ns6]「那麼我宣布，不吉利話題大賽現在開始！」"
90001310-135 = "這次作戰結束之後，我要回到千年發表「超自然現象統計整理」的完全版。"
90001310-136 = "難得有這個機會，大家一起來拍張照吧？#n不用擔心，怎麼可能會真的死掉呢？"
90001310-137 = "不不不！那個，先等一下！？"
90001310-138 = "我的話嘛……嗯，能跟大家一起行動是我的榮幸。"
90001310-139 = "別擔心，我可不打算在這裡出什麼意外。"
90001310-140 = "畢竟我可還沒吃到老師說要請我的冰淇淋呢。"
90001310-141 = "為什麼連你也這樣啊！？"
90001310-143 = "原來如此。#n雖然還算不上是興趣或嗜好……"
90001310-144 = "不過我先前與特異現象搜查部、遊戲開發部和老師一起欣賞了許多影像作品。"
90001310-145 = "因此對於這種時候該說的話，我也多少有點概念。"
90001310-146 = "首先在抵達之後，我會率先去調查看起來很可疑的地方……#n接著向大家表示「不要緊，裡面比想像中安全」。"
90001310-147 = "「不必擔心，我馬上就會回來的。#n　回來之後，請老師在人煙稀少的地方摸摸我的頭」。"
90001310-148 = "啊，那我也知道要說什麼！#n「原來如此，謎團已經全部解開了。事情的真相就是──」"
90001310-150 = "到此為止！你們都以為自己是貓，有九條命是不是！？"
90001310-151 = "綠！柚子！愛麗絲！#n你們三個應該沒問題吧？什麼都不會說吧……？"
90001310-155 = "……"
90001310-156 = "左舷！彈幕很稀疏！"
90001310-157 = "第，第3艦橋破損……？"
90001310-158 = "解，解決了嗎……？"
90001310-163 = "別再說了！#n我們一定要活著回去！這是命令！！！"
90001310-164 = "很好，Kei。這樣就對了。"
90001310-165 = "咦？怎麼突然這麼說……？"
90001310-166 = "啊！？"
90001310-167 = "[ns7]「原來Kei也很想說啊。」\n[ns8]「怎麼不早點說呢，我都不知道。」"
90001310-170 = "呵，呵呵，呵呵呵呵……"
90001310-171 = "成功了嗎？結束了嗎？終於成功了嗎？#n一切都結束了！是我們贏了！結束了！好耶～！！！"
90001310-172 = "[ns]「哇～Kei醬壞掉了～哇～」"
90001310-173 = "還不是老師害的！！！！！"
90001310-175 = "……雖然發生了很多事，但現在真的要出發了。"
90001310-176 = "稍後在起飛的同時就會全力加速，大家記得要繫好安全帶。"
90001310-177 = "在聽見相關廣播之前，請勿離開座位。#n此外，請隨時做好準備以防萬一。"
90001310-178 = "季，那就拜託你了。"
90001310-179 = "是，莉央大人。#n那麼各位……"
90001310-181 = "我們即將起飛，並且迅速進入前往鋼鐵大陸的航路。"
90001310-185 = "敵方的運輸船，已經確認起飛了……"
90001310-186 = "距離他們抵達只剩幾個小時了吧。"
90001310-187 = "提法瑞特已經回到應該在的地方了。#n從某種意義上來說，現在的鋼鐵大陸已經是完全體了。"
90001310-188 = "姐，姐姐大人呢……？"
90001310-189 = "我請他在佐哈爾基地休息。"
90001310-190 = "這是個不錯的選擇。#n雖然這種事最好不要發生……不過如果要啟動最終協定的話……"
90001310-191 = "Aur，現在先別提這個。"
90001310-192 = "我知道，我當然知道。#n我們所做的一切，都是為了得到最好的結果。"
90001310-193 = "……"
90001310-196 = "我討厭這個世界。"
90001310-197 = "有些事情我們無法改變。"
90001310-198 = "有些東西我們別無選擇。"
90001310-199 = "……然而我們的命運，往往都取決於這些無從抉擇的事物。"
90001310-200 = "與生俱來的條件決定了一切，而我們卻對這樣的現實毫無反抗之力。"
90001310-202 = "有些人不費吹灰之力，就能享有我們永遠得不到的東西。"
90001310-203 = "即便我們無緣無故地從這裡消失，也沒有任何人會為我們感到悲傷。"
90001310-204 = "就算我們像他們一樣拚盡全力，也無法對結果造成絲毫影響。"
90001310-205 = "沒有被賜予「神祕」的我們，能做的事情本來就十分有限。"
90001310-207 = "即便如此，現在這樣或許也沒什麼不好。"
90001310-208 = "我們創造了鋼鐵大陸，將預言者們集結起來──就和姐姐大人說的一樣。"
90001310-209 = "……但事實上，我們並沒有必要做到這個地步。#n因為那位大人的計畫，本來就與這有所不同。"
90001310-210 = "換句話說，至少這是我們自己的決定。"
90001310-211 = "是我們憑藉自己的意志去追求、去完成的事。"
90001310-212 = "姐姐大人也說過，哪怕這最終只是錯覺或假象，但自由意志之所以珍貴……"
90001310-213 = "……或許就是因為一旦失去，我們就無法繼續活下去了吧。"
90001310-215 = "我有時候會覺得，就算所有事情都變得一團糟……"
90001310-216 = "就算因為我們無從扭轉的前提條件而跌跌撞撞……"
90001310-217 = "只要有姐姐大人在，一切都會沒事的。"
90001310-218 = "嗯，現在的我就是這麼想的。"
90001310-219 = "沒，沒錯。就是這樣！"
90001310-220 = "就算我們真的，出了什麼意外……"
90001310-221 = "只要結果能讓姐姐大人活下來……我，我就已經很滿意了。"
90001310-222 = "不，不過現在……至少現在，我不想去考慮那種可能性。"
90001310-223 = "那種會讓人心碎的事情……可，可以的話，我想留到最後一刻再去思考。"
90001310-224 = "……就算一切都是假象和謊言，我也想留下姐姐大人曾經存在在這裡的事實。"
90001310-225 = "至少，要留住姐姐大人和我們共度的回憶……"
90001310-226 = "我是，這麼想的……"
90001310-227 = "然後，然後……如果最後的最後，有人能理解我們的心情……"
90001310-228 = "如果有人可以跟我們說，我，我們有努力過了……"
90001310-229 = "這樣的話，我會更開心的……"
90001310-230 = "……是啊，我也一時忘記了呢。#n對不起，Ain。"
90001310-231 = "沒，沒沒沒沒，沒關係的！我沒事，真的沒關係……！"
90001310-232 = "好了好了。#n此時此刻應該還有更重要的事對吧？"
90001310-233 = "嗯，新的一天就要來臨了。"
90001310-234 = "要，要確實做好準備……對吧？"
90001310-235 = "還要祈禱明天一天都能平安度過。"
90001310-236 = "這就是我們現在該做的事。#n行動即是我們的救贖。"
90001310-237 = "無論是誕生，還是與之相對的另一端，或許都沒有什麼意義。"
90001310-242 = "但也正因如此──唯有行動，才是能使我們保有自我的唯一道路。"
90001310-244 = "十字神名篇;To be Continued in Chapter 3"

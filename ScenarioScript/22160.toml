[translation]
22160-1 = "第16話;Checkmate"
22160-17 = "……"
22160-21 = "交由季執行的，C&C的隔離──"
22160-23 = "只要將C&C這個最大戰力無力化，剩下的就只有老師了……"
22160-25 = "就算是夏萊的老師，#n最終也只能接受。"
22160-26 = "究竟什麼是正確的，以及──"
22160-30 = "何為「合理的判斷」。"
22160-31 = "──Checkmate。"
22160-35 = "原來如此……莉央，我明白妳的想法了。"
22160-36 = "妳縝密的計畫，以及使用的手段……"
22160-37 = "或許，在某種意義上是「合理的」也說不定。"
22160-38 = "陽葵……"
22160-39 = "但是，我果然沒辦法贊同你那自以為是的想法。"
22160-40 = "………………是嗎。"
22160-41 = "──我就給妳一個忠告吧。"
22160-42 = "妳的確很優秀。"
22160-43 = "竟然能像這樣，神不知鬼不覺地建造出這種都市……"
22160-44 = "某種程度上，我相當佩服。"
22160-45 = "……那是什麼意思？"
22160-46 = "妳……對於自己相信是正確的事，就會頭也不回地向前邁進對吧？"
22160-47 = "那是妳的優點……"
22160-48 = "同時也是弱點。"
22160-49 = "弱點？那怎麼可能……"
22160-50 = "莉央……妳有向後輩們傾訴過自己的煩惱嗎？"
22160-51 = "……"
22160-52 = "所謂的弱點，其實也沒什麼大不了的。"
22160-53 = "因為過於優秀──所以不願意配合他人的步調，也沒有等待他人的打算。#n妳的這一點。"
22160-54 = "就是最大的弱點唷。"
22160-60 = "爆炸聲！？#n是從哪裡……"
22160-61 = "重頭戲現在才要開始唷。"
22160-62 = "陽葵，等等……！"
22160-67 = "……來自外部的襲擊？"
22160-68 = "怎麼可能。"
22160-69 = "已經事先將可能成為「威脅」的勢力全都標示出來了。"
22160-70 = "然而，到底是誰……"
22160-73 = "我在這唷，陽葵部長。"
22160-74 = "呵呵，沒想到英美……妳會來救我啊……"
22160-75 = "我想這等於是背叛莉央，真的沒關係嗎？"
22160-76 = "唔嗯……誰知道呢？"
22160-77 = "「在我去見莉央之後，過了24小時還沒有回來的話，吃掉冰箱裡的布丁也沒關係。」#n部長不是這麼說了嗎？"
22160-78 = "但是，既然要吃的話還是想一起吃，就只是這樣而已。"
22160-79 = "是這樣啊……"
22160-80 = "呵呵……後輩會用什麼方式來救我呢，一邊想像一邊等待還真是意外的開心呢。"
22160-81 = "託妳的福，看到了莉央有趣的表情。#n真是滿足。"
22160-82 = "……究竟誰才有低級嗜好啊。"
22160-83 = "哎呀，說是低級嗜好真是失禮呢。#n可以請妳更正為超天才病弱美少女駭客高尚的嗜好嗎？"
22160-84 = "好的好的。話說回來，部長，狀況還是很糟吧？"
22160-85 = "這樣下去的話，是不會贏的唷。#n就算我們加入，也不知道能不能扳成勢均力敵……"
22160-86 = "哎呀，不用擔心唷。"
22160-87 = "嗯？還有什麼王牌嗎？"
22160-88 = "嗯，那是當然的。"
22160-89 = "就像英美來幫我一樣。"
22160-90 = "我可是有很～多，值得信賴的後輩唷？"
22160-92 = "……？"
22160-94 = "貝里塔斯的社辦"
22160-95 = "嗚哇！這下該怎麼辦才好啊！？線路全都無法使用了唷！？"
22160-100 = "……不行。網路完全中斷了。"
22160-101 = "這樣我們無能為力……"
22160-102 = "該怎麼辦才好……得想出方法才行……該怎麼做……"
22160-103 = "這樣下去的話，不只是C&C，連老師都會輸的。"
22160-104 = "……呿，太小看對方了。"
22160-105 = "不管使用哪條線路，都應該在一開始就做好應對干擾的準備才對……"
22160-106 = "……只靠我們的話……只能到此為止了嗎？"
22160-107 = "我不要那樣！居然要放棄愛麗絲醬，絕對不要……！"
22160-109 = "有沒有什麼，方法……"
22160-112 = "……"
22160-114 = "等一下。#n真紀、小玉前輩。"
22160-115 = "咦，怎麼了！？晴前輩。"
22160-116 = "螢幕上……出現了文字……"
22160-117 = "………………"
22160-119 = "………………………………"
22160-121 = "這是……"
22160-122 = "…………………………………………………………「Optimus Mirror System」"
22160-125 = "「[ruby=Mirror]鏡子[/ruby]」啟動。"
22160-129 = "……咦？"
22160-140 = "太，太強了……"
22160-141 = "……這樣下去真的會有危險。"
22160-142 = "這就是千鈞一髮的感覺呢。"
22160-143 = "[ns]「為什麼那麼冷靜……？」"
22160-147 = "嗚哇啊！這，這次換我們被瞄準了！？"
22160-148 = "[s]「危險！小心……！」"
22160-155 = "前衛君的動作……"
22160-156 = "突然……變慢了？"
22160-164 = "呼……總算是趕上了。"
22160-165 = "大家，還好嗎？"
22160-166 = "[s]「…………千尋！」"
22160-168 = "下一話;逆轉的踏板"

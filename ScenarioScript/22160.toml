[translation]
22160-1 = "ตอนที่ 16;ประกาศรุกฆาต"
22160-17 = "......"
22160-21 = "ฉันมอบหมายให้โทคิใช้สิทธิในการจัดวางโครงสร้างของเอริดูเพื่อกักกัน C&C"
22160-23 = "ถ้าทำให้กองกำลังที่แข็งแกร่งที่สุดอย่าง C&C อ่อนกำลังลงได้ ที่เหลือก็มีแค่คุณครูเท่านั้น..."
22160-25 = "ถึงจะเป็นครูจากชาเล่ต์ แต่ท้ายที่สุดแล้วก็คงทำได้แค่เข้าใจและยอมรับ"
22160-26 = "...ว่าอะไรถูก อะไรผิด"
22160-30 = "ว่าการทำแบบไหนคือการ <ตัดสินใจที่สมเหตุสมผล>"
22160-31 = "รุกฆาต"
22160-35 = "อืม... อย่างนี้เองสินะคะ ริโอะ"
22160-36 = "แผนการที่คุณวางไว้อย่างละเอียดรอบคอบ วิธีการที่เด็ดเดี่ยวเพื่อบรรลุวัตถุประสงค์"
22160-37 = "ในแง่ใดแง่หนึ่ง มันก็อาจจะ <สมเหตุสมผล> ก็ได้ค่ะ"
22160-38 = "ฮิมาริ..."
22160-39 = "แต่ถึงอย่างนั้นก็เถอะ ฉันคงไม่อาจเห็นด้วยกับการที่คุณถือว่าตัวเองเป็นฝ่ายถูกแบบนั้นค่ะ"
22160-40 = "......... ก็ได้"
22160-41 = "ริโอะ ฉันอยากเตือนอะไรบางอย่างค่ะ"
22160-42 = "คุณน่ะยอดเยี่ยมมากๆ เลยละค่ะ"
22160-43 = "นี่ยักยอกเงินของมิลเลเนียมมาสร้างเมืองแบบนี้ขึ้นมาได้เลยเหรอคะเนี่ย~"
22160-44 = "ต้องบอกว่า 'น่าประทับใจ' หรือ 'หน้าไม่อาย' ดีล่ะคะ?"
22160-45 = "...หมายความว่ายังไง?"
22160-46 = "คุณน่ะ... ถ้ามีอะไรที่ตัวเองคิดว่าถูกต้องก็จะไม่ลังเลที่จะลงมือทำ และไม่สนใจที่จะมองย้อนกลับมาด้วย#nค่ะ"
22160-47 = "นี่เป็นทั้งจุดแข็งที่ยิ่งใหญ่..."
22160-48 = "และจุดอ่อนที่ใหญ่ยิ่งของคุณในเวลาเดียวกันค่ะ"
22160-49 = "จุดอ่อนเหรอ... ฉันไม่มีอะไรแบบนั้นหรอก..."
22160-50 = "ริโอะ คุณเคยเล่าความทุกข์ของตัวเองให้รุ่นน้องฟังบ้างไหมล่ะคะ?"
22160-51 = "......"
22160-52 = "จุดอ่อนมันไม่ใช่สิ่งที่ยิ่งใหญ่อะไรหรอกค่ะ"
22160-53 = "การที่คุณไม่คิดจะปรับตัวให้เข้ากับคนอื่น หรือไม่แม้แต่จะรอคนอื่นด้วยเหตุผลที่เยี่ยมยอดอะไรของคุณ"
22160-54 = "มันก็คือจุดอ่อนที่ใหญ่ยิ่งของคุณค่ะ"
22160-60 = "เสียงระเบิด?! เป็นไปได้ยังไง..."
22160-61 = "จากนี้ไปคือของจริงค่ะ"
22160-62 = "ฮิมาริ เดี๋ยวก่อน...!"
22160-67 = "มีการบุกรุกจากภายนอกในสถานการณ์แบบนี้เนี่ยนะ...?"
22160-68 = "เป็นไปไม่ได้"
22160-69 = "ฉันวางแผนขัดขวางทุกกองกำลังที่คิดว่าเป็น <ภัยคุกคาม> ไปล่วงหน้าแล้วนี่"
22160-70 = "แล้วใครกันที่ทำแบบนี้..."
22160-73 = "ทางนี้ หัวหน้าฮิมาริ"
22160-74 = "ฮุฮุ เอมินี่เอง... ไม่คิดเลยนะคะว่าจะเป็นคุณที่มาช่วยฉันเอาไว้..."
22160-75 = "แต่นี่จะเป็นการทรยศต่อริโอะนะ จะไม่เป็นไรจริงๆ เหรอคะ?"
22160-76 = "อื้ม~ ไม่รู้สิ~"
22160-77 = "หัวหน้าพูดไว้เองไม่ใช่เหรอว่า \"ถ้าฉันไปพบริโอะแล้วยังไม่กลับมาภายใน 24 ชั่วโมง ก็กินพุดดิ้งที่อยู่ใน#nตู้เย็นได้เลยค่ะ\""
22160-78 = "แต่ฉันคิดว่าของอร่อยๆ แบบนั้นน่ะ~ มากินด้วยกันมันก็น่าจะดีกว่า"
22160-79 = "งั้นเหรอคะ..."
22160-80 = "ได้จินตนาการว่ารุ่นน้องจะมาช่วยยังไงมันก็สนุกกว่าที่คิดนะคะ ฮุฮุฮุ~"
22160-81 = "ต้องขอบคุณเลยนะคะ เห็นสีหน้าของริโอะเมื่อกี้แล้วสนุกมากๆ เลย ถือว่าน่าพอใจมากค่ะ"
22160-82 = "...ตกลงใครกันแน่ที่มีรสนิยมแปลกๆ"
22160-83 = "อุ๊ย นี่ไม่ใช่รสนิยมแปลกๆ นะคะ ช่วยเรียกว่า \"รสนิยมที่สูงส่งของแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใสฮีลใจ#nเหมือนยาวิเศษ\" แทนได้ไหมคะ?"
22160-84 = "ถึงจะให้เรียกอย่างนั้นไป... แต่สถานการณ์ตอนนี้ก็ยังไม่สู้ดีอยู่ไม่ใช่เหรอหัวหน้า?"
22160-85 = "ขืนเป็นแบบนี้ต่อไป ทุกคนจะโดนเล่นงานกันหมดนะ ถึงจะมีพวกเราเข้ามาช่วยก็เถอะ..."
22160-86 = "อ่า ไม่ต้องห่วงหรอกค่ะ"
22160-87 = "หืม? มีวิธีแก้ไขสถานการณ์นี้แล้วเหรอ?"
22160-88 = "ค่ะ ก็ต้องมีแน่นอนสินะ"
22160-89 = "ฉันมีรุ่นน้องที่พึ่งพาได้เยอะเลยค่ะ"
22160-90 = "เอมิที่มาช่วยฉันก็เป็นหนึ่งในนั้นด้วยนะคะ"
22160-92 = "......?"
22160-94 = "ห้องชมรมเวอริทัส"
22160-95 = "ว้ากกก! ทำยังไงกันดีล่ะเนี่ย?! การสื่อสารถูกตัดขาดหมดเลย!!"
22160-100 = "...ไม่ได้การละ เครือข่ายก็ไม่ตอบสนองอะไรเลย"
22160-101 = "แบบนี้ก็คงไม่มีทางเลือกอื่น..."
22160-102 = "ทำยังไงดี... ต้องคิดสิ คิด... จะแก้สถานการณ์นี้ยังไงดี..."
22160-103 = "ทั้ง C&C ทั้งคุณครูต้องโดนเล่นงานแน่ค่ะ"
22160-104 = "ชิ... นี่เราประเมินฝ่ายตรงข้ามต่ำไปงั้นเหรอ"
22160-105 = "ไม่ว่าเราจะเลือกไปทางอ้อมหรือบุกเข้าไปตรงๆ พวกเราก็ต้องเตรียมรับมือในกรณีที่การสื่อสารถูกตัดไว้#nตั้งแต่แรกแท้ๆ..."
22160-106 = "พวกเราคง... ช่วยได้แค่นี้หรือเปล่าคะ?"
22160-107 = "แบบนี้ไม่เอานะ! อาริสึจัง...! ตอนนี้อาริสึจังคง...!"
22160-109 = "พอจะมีวิธีอะไรไหมนะ..."
22160-112 = "......"
22160-114 = "เดี๋ยวก่อนนะ มากิ รุ่นพี่โคทามะ"
22160-115 = "ทำไมเหรอ?! รุ่นพี่ฮาเระ?!"
22160-116 = "ข้อความที่ปรากฏ... บนหน้าจอ..."
22160-117 = ".............................."
22160-119 = "............................................"
22160-121 = "นี่มัน..."
22160-122 = "...........................................................................<Optimus Mirror System>"
22160-125 = "<กระจก> เริ่มทำงาน"
22160-129 = "เอ๋...?"
22160-140 = "พลังเพลิงอำมหิตมากเลยค่ะ!"
22160-141 = "แบบนี้คงได้บาดเจ็บกันระนาวหมดแน่"
22160-142 = "เป็นช่วงเวลาที่อันตรายเลยละนะ"
22160-143 = "[ns] \"ก็ว่าอยู่ว่าทำไมทุกคนดูนิ่งกันจัง!!\""
22160-147 = "ว้ายยย! คะ... คราวนี้พวกมันมุ่งหน้ามาทางเราแล้ว!"
22160-148 = "[s] \"ทุกคน! ระวัง...!\""
22160-155 = "หุ่นรบล้ำยุคมัน..."
22160-156 = "จู่ๆ ก็เคลื่อนไหวช้าลง?"
22160-164 = "เฮ้อ... ยังไม่สายเกินไปสินะ"
22160-165 = "ทุกคนปลอดภัยดีใช่ไหม?"
22160-166 = "[s] \"จิฮิโระ!\""
22160-168 = "ตอนต่อไป;จุดเริ่มต้นของการพลิกเกม"

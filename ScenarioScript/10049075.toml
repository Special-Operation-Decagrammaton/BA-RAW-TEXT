[translation]
10049075-2 = "โจมตีมาสคอตงั้นเหรอ? พวกเธอเพี้ยนไปแล้วหรือเปล่า?!"
10049075-4 = "ตะ... แต่ว่า หัวหน้าคะ ฉันว่ามาสคอตน่ะสมควรโดนโจมตีแล้วละค่ะ"
10049075-5 = "ก็ยัยคนน่ากลัวๆ คนนั้นก็ดันเป็นศัตรูของเราในเรื่องนี่คะ ว้ากก!!"
10049075-11 = "ไม่ใช่สักหน่อย!! ยัยพวกสาวน้อยเวทมนตร์นั่นต่างหาก!!"
10049075-12 = "พวกนั้นต่างหากที่โจมตีฉันอยู่!"
10049075-17 = "ว้ากกก!!"
10049075-19 = "เทอร์ไมต์ ไวต์! เสกเวทมนตร์ฮีลลิงชุบชีวิตสตาแนกให้หน่อยค่ะ!"
10049075-20 = "ดะ... ได้เลยค่ะ!"
10049075-27 = "เวทมนตร์ฮีลลิงบ้าบออะไร!! นี่มันกระสุนกับระเบิดเพลิงต่างหาก!!"
10049075-28 = "สตาแนกจัง สู้เขานะคะ! ฉันจะสาดกระสุนลูกซองเดี่ยวฮีลลิงให้เองค่ะ!"
10049075-29 = "พยายามเข้านะ สตาแนกจัง!!"
10049075-36 = "ยะ... ยัยพวกนี้แกล้งทำเหมือนเราอยู่ฝ่ายเดียวกันแต่โจมตีฉันไม่หยุดเลย!!"
10049075-38 = "เจ้าคนไม่รู้ที่ต่ำที่สูง!!"
10049075-39 = "รับไปซะ! ฮีลลิงลมหายใจมังกร!"
10049075-45 = "ว้ากกก...!"
10049075-50 = "สตาแนกจังสลบไปแล้ว!!"
10049075-51 = "แต่สตาแนกจังของเราหนังเหนียวอยู่แล้ว เดี๋ยวก็ลุกขึ้นมาได้ใหม่!"
10049075-52 = "ใช่! ปกติก็โดนทำร้ายและฟื้นตัวกลับมาใหม่จนเป็นกิจวัตรประจำวันไปแล้วนี่นา!"
10049075-54 = "มาสคอต... แบบนั้น... มีที่ไหน... กัน..."
10049075-59 = "มัดไว้ด้วยเชือกเมจิคัลคิวเออร์..."
10049075-63 = "แล้วก็ปิดปากไว้ด้วยเทปเมจิคัลคิวเออร์แล้วค่ะ!"
10049075-64 = "เอร่า! ฉันจะมาแก้แค้นแทนสตาแนกจังให้ได้เลย!"
10049075-65 = "ขอไปรักษาสตาแนกจังก่อนนะคะ แล้วเดี๋ยวเจอกัน!"
10049075-69 = "[ns5] \"เอาละ~ ได้เวลาพักนักแสดงแล้ว!\"\n[ns6] (ชิมิโกะก็มาด้วยกันสิ!)"
10049075-75 = "พะ... พวกเธอเป็นใครกันแน่?"
10049075-76 = "แต่งตัวแปลกๆ แล้วก็จับพวกฉันมามัดไว้อีก"
10049075-85 = "แล้วในมือนั่นคืออะไร แบตเตอรี่รถยนต์เหรอ?!"
10049075-86 = "แงงง หัวหน้า!! พวกเราจะถูกทรมานกันแน่เลยค่ะ!!"
10049075-87 = "ไม่มีอะไรให้สารภาพสักหน่อย จะทรมานทำไมล่ะ?!"
10049075-88 = "นี่! เดี๋ยว!! เดี๋ยวก่อน!!!"
10049075-93 = "ว้ากกกก!!!"

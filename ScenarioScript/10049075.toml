[translation]
10049075-2 = "居然攻擊吉祥物，你們是瘋了嗎！？"
10049075-4 = "那，那個，隊長。#n其實吉祥物被攻擊反而挺正常的啦。"
10049075-5 = "那邊那個看起來超可怕的傢伙是敵人……唔啊！！"
10049075-11 = "不是那個問題！！我是說那兩個魔法少女！！"
10049075-12 = "他們在偷偷攻擊我們啦！"
10049075-17 = "呃啊！！"
10049075-19 = "Thermite White！多幫Stanag醬施放治癒魔法吧！"
10049075-20 = "我，我明白了！"
10049075-27 = "這是哪門子的治癒魔法！！分明是曳光彈跟燃燒彈吧！！"
10049075-28 = "Stanag醬，加油！我會把所有治癒破片彈都射給你的！"
10049075-29 = "加油啊Stanag醬！！"
10049075-36 = "這，這些傢伙假裝是同伴，結果卻在偷偷攻擊我們！！"
10049075-38 = "你們這群褻瀆之徒！！"
10049075-39 = "接招吧！治癒龍息！"
10049075-45 = "呃啊啊……！"
10049075-50 = "Stanag醬被打倒了！！"
10049075-51 = "不過Stanag醬很耐打，馬上又會站起來的！"
10049075-52 = "沒錯！被打得鼻青臉腫再復活是他的日常！"
10049075-54 = "哪有……這種吉祥物啊……唔……"
10049075-59 = "用魔法治癒繩子緊緊綁好……"
10049075-63 = "再用魔法治癒膠帶把嘴封起來！"
10049075-64 = "艾拉！我一定會為Stanag醬報仇的！"
10049075-65 = "等Stanag醬治療好之後，再回來跟你一決勝負！"
10049075-69 = "[ns5]「來～休息時間到囉！」\n[ns6]（志美子也一起集合吧！）"
10049075-75 = "你，你們要做什麼！？"
10049075-76 = "穿著那種奇怪的衣服，還把我們綁成這樣……"
10049075-85 = "你手上那個是……汽車的電瓶！？"
10049075-86 = "哇啊啊，隊長！！他們該不會是要拷問我們吧！？"
10049075-87 = "我們什麼都還沒說就要被拷問了嗎！？"
10049075-88 = "喂，喂！！等一下！！！"
10049075-93 = "呀啊啊啊啊！！！"

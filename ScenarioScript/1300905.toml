[translation]
1300905-1 = "椿的修行法：實踐篇"
1300905-2 = "老師，我今天就以修行部部長的身分，來教你這位修行部顧問何謂真正的修行。"
1300905-3 = "真正的修行。對，也就是說，我會教你「能夠更安穩地進入熟睡的睡眠方法」。"
1300905-4 = "[s] 「果然變成那樣了。」"
1300905-5 = "老師，你可不能小看睡眠這件事……"
1300905-6 = "想要好好睡一覺其實是件很困難的事情。"
1300905-7 = "因為，你看啊，現代很多人都受各種原因的失眠所苦，"
1300905-8 = "常常在網路上詢問入睡的方法、能熟睡的方法之類的。"
1300905-9 = "在睡前先洗個熱水澡、喝杯熱可可，或是邊聽白噪音邊冥想等等……"
1300905-10 = "雖然有很多方法，不過我教你一種最有效率的方法，這可是我親自實驗過的喔。"
1300905-11 = "尤其因為老師每天都要加班的關係，所以一定常常睡不好……"
1300905-12 = "[s] 「也是呢，我全盤相信修行部部長，我洗耳恭聽！」"
1300905-13 = "好，那麼我先示範一次給你看，你要仔細看喔，老師。"
1300905-14 = "我首先要示範給你看的是丹田呼吸法，"
1300905-17 = "像這樣躺著，冥想一下……"
1300905-18 = "將精神集中於腹部下方……"
1300905-19 = "…………"
1300905-20 = "……"
1300905-21 = "[s] 「椿？」"
1300905-22 = "睏……"
1300905-23 = "[s1] 「才躺下來不到20秒耶！？」\n[s2] 「椿，等等！傳授進度太快了！」"
1300905-30 = "嗯嗯……？已經到吃飯時間了嗎……？"
1300905-31 = "[s3] 「從睡著到起床不到20秒呢。椿！」\n[s4] 「要效仿這個，難易度是不是太高了！？」"
1300905-32 = "唔──嗯，是嗎？那麼，丹田呼吸法就行不通了……"
1300905-33 = "唔──嗯，是嗎？那麼，丹田呼吸法就行不通了……"
1300905-34 = "那麼這次……我們來試試看打坐吧，打坐學起來應該比較簡單。"
1300905-37 = "因為打坐是以坐著的方式集中精神，而不是以躺著的方式。"
1300905-38 = "老師你也坐下來，像……這……樣……呼嚕……"
1300905-39 = "[s] 「說明到一半睡著了？！」"
1300905-40 = "哈！……咦？這個也不行嗎？"
1300905-41 = "[s] 「對我這種業餘的來說，太難了吧。」"
1300905-42 = "不行唷，老師。怎麼還沒嘗試就一直說做不到呢。"
1300905-43 = "嗯，好吧。比起示範，我還是一旁指導吧。"
1300905-44 = "老師，你來試看看吧。"
1300905-45 = "[s] 「現在嗎？」"
1300905-48 = "來，躺下來，然後閉上眼睛。"
1300905-51 = "好，吸氣……吐氣。挺胸……放鬆。"
1300905-52 = "慢慢地，慢慢地。集中精神，老師。"
1300905-53 = "漸漸放鬆下來了。意識像是潛入水面下一樣……"
1300905-54 = "你越來越睏……"
1300905-56 = "（跟著椿的聲音，世界彷彿漸漸變得越來越遠）"
1300905-57 = "（慢慢地，慢慢地……闔上雙眼，意識……）"
1300905-58 = "（……什麼事都沒發生，不知怎地，意識漸漸清醒了）"
1300905-59 = "[ns] 「……」"
1300905-61 = "[ns] （感覺對我沒效？）"
1300905-63 = "[ns] （椿……難道睡著了？）"
1300905-65 = "（因為聽不見椿的聲音，決定微微睜開雙眼）"
1300905-67 = "（老師的睡相……是這種感覺啊。呵呵……）"
1300905-70 = "[ns] 「……椿？」"
1300905-71 = "（一不小心和椿四目交接了）"
1300905-72 = "耶，老師，你不是睡……"
1300905-73 = "啊，嗚哇……！"
1300905-76 = "[s] 「沒，沒事吧？！突然摔倒了……！」"
1300905-77 = "唔，嗯……"
1300905-78 = "老師，那個……看到了？"
1300905-79 = "[s5] 「嗯。感覺到了椿的火熱視線。」\n[s6] 「不，我什麼都沒看到……？」"
1300905-80 = "……我要睡了。"
1300905-81 = "[s7] 「抱歉，剛才是開玩笑的！」"
1300905-82 = "唔唔……"
1300905-83 = "……你沒看到？真的嗎？"
1300905-84 = "[s8] 「並不是完全沒看到，那個，一點點……」"
1300905-86 = "唔……壞心眼。"
1300905-87 = "老師……壞心眼……"
1300905-89 = "（在那之後，直到傍晚都被迫一直安慰椿）"

[translation]
1300905-1 = "Tsubaki's Training: Practice"
1300905-2 = "As president of the Inner Discipline Club, I'm going to be teaching you, our advisor, about how we train."
1300905-3 = "In other words, today is all about \"how to fall asleep more comfortably and achieve a deeper sleep.\""
1300905-4 = "[s] \"Okay.\""
1300905-5 = "Sensei, don't underestimate the power of sleep..."
1300905-6 = "It's actually very difficult to get a good night's rest!"
1300905-7 = "Look, a lot of people in the modern age suffer from insomnia and search frantically for a solution."
1300905-8 = "They turn to the internet and post all kinds of questions, longing for just one night of peaceful sleep."
1300905-9 = "Some take a warm bath before bed, drink hot cocoa, or even meditate, the list goes on..."
1300905-10 = "There are a million different methods, but I'm going to teach you one that I've found is the most effective."
1300905-11 = "I'm well aware that you don't get enough sleep because of your work schedule."
1300905-12 = "[s] \"Okay! I trust you, President.\""
1300905-13 = "Great. Let me give you a demonstration. Watch carefully, Sensei."
1300905-14 = "The first thing I'm going to show you is the Danjeon Breathing Method."
1300905-17 = "Lie down like this and clear your mind..."
1300905-18 = "Then focus your attention on your abdomen..."
1300905-19 = "..."
1300905-20 = "..."
1300905-21 = "[s] \"Uh, Tsubaki?\""
1300905-22 = "Zzz..."
1300905-23 = "[s1] \"It hasn't even been 20 seconds!\"\n[s2] \"Tsubaki, wait! You're too good at this!\""
1300905-30 = "Huh? Is it time to eat already...?"
1300905-31 = "[s3] \"It's only been 20 seconds!\"\n[s4] \"This is way too advanced for me, Tsubaki!\""
1300905-32 = "Hmm. Really? Then the Danjeon Breathing Method won't do you any good..."
1300905-33 = "Hmm. Really? Then the Danjeon Breathing Method won't do you any good..."
1300905-34 = "Fine... This time, I'll just sit and meditate. That should be easier to follow."
1300905-37 = "Meditation is when you sit this way instead of lying down. Now, focus."
1300905-38 = "Sensei, you should be sitting like... this... Zzz."
1300905-39 = "[s] \"You fell asleep while giving instructions?!\""
1300905-40 = "What? That won't work either?"
1300905-41 = "[s] \"This is too hard for an amateur like me.\""
1300905-42 = "No, Sensei. You can't give up without trying!"
1300905-43 = "Okay, this is better, actually. Instead of giving a demonstration, I'll instruct you this time."
1300905-44 = "Try it for yourself, Sensei."
1300905-45 = "[s] \"Try it myself?\""
1300905-48 = "Now, lie down and close your eyes like this."
1300905-51 = "Okay. Breathe in...breathe out... Feel your chest rise...and fall..."
1300905-52 = "Slowly focus your mind, Sensei."
1300905-53 = "You're becoming more and more relaxed. Your mind is sinking down into the depths of sleep."
1300905-54 = "You're becoming very, very sleepy..."
1300905-56 = "I felt myself drifting away to the sound of Tsubaki's voice."
1300905-57 = "Slowly... Slowly... My eyes closed..."
1300905-58 = "...I kept waiting to fall asleep, but nothing happened."
1300905-59 = "[ns] \"...\""
1300905-61 = "[ns] \"(Is this even working?)\""
1300905-63 = "[ns] \"(And what about Tsubaki? Did she fall asleep again?)\""
1300905-65 = "I couldn't hear Tsubaki's voice anymore, so I decided to squint through my eyelids."
1300905-67 = "(So this is what Sensei looks like with their eyes closed ... Heehee...)"
1300905-70 = "[ns] \"...Tsubaki?\""
1300905-71 = "We looked at each other."
1300905-72 = "Oh, Sensei! I thought you were asleep..."
1300905-73 = "Oh no..."
1300905-76 = "[s] \"Are you okay? You fell down!\""
1300905-77 = "Y-Yes..."
1300905-78 = "Sensei. You didn't see that, did you...?"
1300905-79 = "[s5] \"Yes. I saw you looking right at me.\"\n[s6] \"Huh? I didn't see anything...\""
1300905-80 = "...I think I'm just going to sleep here."
1300905-81 = "[s7] \"Nope, I didn't see a thing. I was just kidding around!\""
1300905-82 = "Ugh..."
1300905-83 = "So, you didn't see anything? Really?"
1300905-84 = "[s8] \"I might have gotten just a peek at you. Maybe.\""
1300905-86 = "...Hmph. How rude."
1300905-87 = "You're such a pain, Sensei!"
1300905-89 = "I spent the rest of the day trying to make Tsubaki feel better."

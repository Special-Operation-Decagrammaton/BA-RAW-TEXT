[translation]
1300905-1 = "วิธีฝึกฝนของสึบากิ: ลงมือฝึกจริง"
1300905-2 = "ในฐานะหัวหน้าชมรมฝึกฝน ฉันจะให้คำปรึกษาแล้วก็แสดงให้คุณครูเห็นวิธีฝึกของพวกเราเอง"
1300905-3 = "พูดง่ายๆ ก็คือวันนี้ฉันจะสอน \"วิธีการหลับลึกและหลับสบาย\" ให้คุณครู"
1300905-4 = "[s] \"อย่างนั้นเองเหรอ\""
1300905-5 = "คุณครูอย่าดูถูกเรื่องการนอนนะ..."
1300905-6 = "การนอนหลับให้สบายในตอนกลางคืนเป็นเรื่องที่ยากมากๆ"
1300905-7 = "ฟังให้ดีนะ ตอนนี้มีคนเป็นโรคนอนไม่หลับ และหาวิธีให้ตัวเองได้นอนหลับกันอยู่เยอะมาก"
1300905-8 = "พวกเขาต้องนั่งหาข้อมูลในอินเทอร์เน็ตเป็นวันๆ เพื่อให้นอนหลับได้สบายๆ เลยนะ"
1300905-9 = "อย่างเช่นการอาบน้ำอุ่นก่อนนอน ดื่มช็อกโกแลตร้อน นั่งสมาธิ หรือฟังเพลงเบาๆ ก่อนนอน..."
1300905-10 = "มันมีอยู่หลายวิธีก็จริง แต่ฉันจะสอนวิธีที่ฉันทดลองแล้วได้ผลที่สุดให้เอง"
1300905-11 = "ฉันรู้ว่าตอนนี้คุณครูคงนอนไม่พอเพราะมีงานเยอะมาก~"
1300905-12 = "[s] \"ได้เลย ครูเชื่อมือเธอนะ\""
1300905-13 = "ดีล่ะ ถ้างั้นฉันจะสาธิตให้ดูเอง คอยดูให้ดีล่ะคุณครู"
1300905-14 = "อย่างแรกที่ฉันจะทำให้ดูคือการฝึกบังคับลมหายใจไปที่ท้องน้อย"
1300905-17 = "นอนลงแล้วก็ปล่อยใจให้สบาย..."
1300905-18 = "จากนั้นตั้งสมาธิไปที่ท้องน้อยของตัวเอง..."
1300905-19 = "..."
1300905-20 = "......"
1300905-21 = "[s] \"สึบากิ?\""
1300905-22 = "คร่อก... ฟี้..."
1300905-23 = "[s1] \"ล้มตัวลงนอนยังไม่ถึง 20 วินาทีเลย?!\"\n[s2] \"เดี๋ยวก่อนท่านสึบากิ! ความไวแสงสุดยอดไปเลย!\""
1300905-30 = "หืม...? ได้เวลากินข้าวแล้วเหรอ...?"
1300905-31 = "[s3] \"ยังนอนได้ไม่ถึง 20 วินาทีเลยนะสึบากิ!\"\n[s4] \"แบบนี้มันชั้นเซียนเกินไปแล้ว?!\""
1300905-32 = "งืมๆ... งั้นเหรอ~? วิธีฝึกลมหายใจคงใช้ไม่ได้สินะ..."
1300905-33 = "งืมๆ... งั้นเหรอ~? วิธีฝึกลมหายใจคงใช้ไม่ได้สินะ..."
1300905-34 = "ถ้างั้นคราวนี้...... ฉันจะลองทำสมาธิดูนะ การทำสมาธิคงจะทำตามได้ง่ายกว่า"
1300905-37 = "การทำสมาธิจะใช้วิธีการนั่งแทนการนอน..."
1300905-38 = "คุณครูนั่งตามฉันแบบนี้สิ.... คร่อก zZZ"
1300905-39 = "[s] \"อธิบายอยู่ก็หลับได้ด้วยเหรอ?!\""
1300905-40 = "อ๊ะ? อืม...? อะไรอ่า วิธีนี้ก็ไม่ได้ผลเหรอ~?"
1300905-41 = "[s] \"มันยากเกินสำหรับมือใหม่อย่างครูนะ\""
1300905-42 = "ไม่หรอก คุณครู ยังไม่ได้ลองเลยจะท้อได้ยังไง อย่าเพิ่งบอกว่าทำไม่ได้สิ"
1300905-43 = "ดีล่ะ ถ้างั้นเอาแบบนี้ ฉันจะบอกวิธีให้คุณครูทำตาม แทนการสาธิตก็แล้วกันนะ"
1300905-44 = "คุณครูลองทำดูสิ"
1300905-45 = "[s] \"ให้ครูลองเลยเหรอ?\""
1300905-48 = "เอาล่ะ หลับตาลง... แบบนี้ แล้วก็นอนลง"
1300905-51 = "เอาล่ะนะ ค่อยๆ หายใจเข้า... หายใจออก รับรู้ถึงความรู้สึกขึ้นลงของหน้าอก"
1300905-52 = "และค่อยๆ เพ่งสมาธิอย่างช้าๆ..."
1300905-53 = "คุณครูจะค่อยๆ รู้สึกผ่อนคลายขึ้นอย่างช้าๆ และจะค่อยๆ จมดิ่งลงสู่การหลับลึก..."
1300905-54 = "คุณครูจะรู้สึกง่วงมากๆ..."
1300905-56 = "(คุณครูรู้สึกเคลิ้มระหว่างฟังเสียงของสึบากิ)"
1300905-57 = "(อย่างช้าๆ...ขณะที่หลับตา....)"
1300905-58 = "(คุณครูรอให้ตัวเองหลับอยู่ครู่หนึ่ง แต่ว่าก็หลับไม่ลง)"
1300905-59 = "[ns] \".....\""
1300905-61 = "[ns] (ได้ผลรึเปล่านะ?)"
1300905-63 = "[ns] (สึบากิล่ะ? หลับไปอีกแล้วเหรอ?)"
1300905-65 = "(พอคุณครูไม่ได้ยินเสียงของสึบากิเลยแอบลืมตาไปมองเธอ)"
1300905-67 = "(ใบหน้าของคุณครูเวลาหลับตา... เป็นแบบนี้เองสินะ ฮิฮิ.....)"
1300905-70 = "[ns] \"....สึบากิ?\""
1300905-71 = "(คุณครูสบตากับสึบากิ)"
1300905-72 = "อ่า... คิดว่าคุณครูหลับไปแล้วซะอีก..."
1300905-73 = "อ๊ะ อ๊าาา..."
1300905-76 = "[s] \"ปะ...เป็นอะไรรึเปล่า ล้มไปแบบนั้นน่ะ!\""
1300905-77 = "อะ.. อื้อ......"
1300905-78 = "คุณครู.... เห็นงั้นเหรอ?"
1300905-79 = "[s5] \"อื้อ เห็นตอนที่มองครูอยู่พอดีเลยน่ะ\"\n[s6] \"หืม? อ่า... ไม่เห็นอะไรเลยนี่~?\""
1300905-80 = "...ฉันจะนอนตรงนี้แล้วกัน"
1300905-81 = "[s7] \"ละ...ล้อเล่นน่า!\""
1300905-82 = "อึ่ก..."
1300905-83 = "...ไม่เห็นงั้นเหรอ? พูดจริงนะ?"
1300905-84 = "[s8] \"ก็ไม่เชิงหรอก... แต่เห็นแค่นิดเดียวน่ะ\""
1300905-86 = "อึ่ก... คนขี้แกล้ง"
1300905-87 = "คุณครู...เป็นคนขี้แกล้ง...."
1300905-89 = "(หลังจากนั้นคุณครูก็ใช้เวลาทั้งวันเพื่อตามง้อสึบากิ)"

[translation]
1300905-1 = "#title;츠바키의 수행법 : 실행편"
1300905-2 = "3;츠바키;05;오늘은 수행부의 부장으로서, 수행부의 고문인 선생님에게 진정한 수행에 대해 알려줄 거야.\n#3;a\n#3;em;[반짝]\n#3;greeting"
1300905-3 = "3;츠바키;99;즉 '더 편안하게, 푹 숙면을 취할 수 있는 수면법'에 대해 가르쳐줄게."
1300905-4 = "[s] \"역시 그렇게 되는 거구나.\""
1300905-5 = "3;츠바키;00;선생님, 잠자는 걸 우습게 보면 안 돼……."
1300905-6 = "3;츠바키;99;의외로 제대로 잠을 자는 건 무척 어려운 일이야.\n#3;greeting"
1300905-7 = "3;츠바키;02;봐봐. 현대인들은 오늘 날에도 갖은 불면증에 시달리면서 잠 잘자는 법.\n#3;em;[반응]"
1300905-8 = "3;츠바키;00;숙면 취하는 방법을 갈구하면서 인터넷에 질문글을 올리고 있단 말이야."
1300905-9 = "3;츠바키;99;자기 전에 따듯하게 샤워하기, 코코아 마시기, 화이트 노이즈 들으면서 명상하기 등등."
1300905-10 = "3;츠바키;00;수많은 방법이 있지만. 그중에서 내가 직접 시험해보고 효과를 본 방법을 가르쳐줄게.\n#3;em;[!]"
1300905-11 = "3;츠바키;01;선생님은 특히 맨날 잡무로 잠을 얕게 잘 때가 많으니까~"
1300905-12 = "[s] \"옙. 믿고 있습니다. 수행부 부장님.\""
1300905-13 = "3;츠바키;03;그럼 자아. 먼저 시범을 보일 테니까. 지켜보고 있어 선생님.\n#3;em;[반짝]"
1300905-14 = "3;츠바키;02;내가 맨 처음 보여주는 건 단전호흡법이란 거야."
1300905-15 = "3;츠바키;01\n#3;greeting\n#wait;400"
1300905-16 = "#all;hide\n#wait;1000"
1300905-17 = "#na;츠바키;이렇게 누워서, 잠시 명상을 하듯이……."

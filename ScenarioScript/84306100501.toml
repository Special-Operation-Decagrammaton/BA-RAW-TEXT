84306100501-5 = "1;리오;01\n5;세이아;01\n#1;h\n#5;h\n#1;a\n#5;a\n#wait;1000"
84306100501-6 = "1;리오;01\n5;세이아;02;개인적인 궁금증인데, 그러면 그 총은 완성돼서 제대로 시연되는 데에 얼마나 더 걸릴까요?"
84306100501-7 = "1;리오;01;음…… 글쎄. 아마 어려울 거야. 아주 특별한 외부적인 개입이 있지 않는 이상은 말이지."
84306100501-8 = "5;세이아;04;그런가요? 말만 들었을 땐 거의 완성인 것처럼 들렸는데 말이에요.\n#5;em;[?]"
84306100501-9 = "1;리오;99;개발이라는 건 보통 거기서부터가 진짜 시작이니까 말이야. 불안정한 요소를 잡는 게 가장 오래 걸리고 실제로 기술도 많이 필요하지.\n#1;em;…"
84306100501-10 = "1;리오;01;유감이지만 이 부분에 대한 안정화 기술은 내가 아는 한 이론적으로도 아직 개발되기 어려워."
84306100501-11 = "5;세이아;01;그러면 그분들은 어째서 이걸……"
84306100501-12 = "1;리오;99;미리 말했지만, 일단 투자자를 구하고 싶었던 거겠지."
84306100501-13 = "5;세이아;02;일단 저질러 놓고 보는 거란 말씀이신가요? 과학도다운 이미지의 행동은 아니네요."
84306100501-14 = "1;리오;01;음? 아니야. 가장 과학도다운 행동이지.\n#1;em;[반응]"
84306100501-15 = "1;리오;00;……유리조노 세이아. 명심해 둬.\n#1;m3\n#5;dr"
84306100501-16 = "1;리오;05;대부분의 과학도는 결코 이성적이지 않아. 단지 이성적이려 노력하려는 것뿐."
84306100501-17 = "#all;hide"
84306100501-18 = "3;세이아;99;과연…… 하나 배웠습니다.\n#3;em;…"
84306100501-19 = "#wait;100"

[translation]
84306100501-6 = "我個人有點好奇，那把槍還需要多少時間才能完成並演示呢？"
84306100501-7 = "唔嗯……除非有非常特殊的外力介入，否則恐怕還遙遙無期吧。"
84306100501-8 = "是嗎？聽他們說的好像幾乎快完成了耶……"
84306100501-9 = "研發通常從這個階段才真正開始。#n排除不穩定因素才是最花費時間的階段，而且也需要應用很多的技術。"
84306100501-10 = "可惜據我所知，這方面的穩定化技術，目前理論上還很難研發出來。"
84306100501-11 = "那為什麼那些人會……"
84306100501-12 = "就像我剛才說的一樣，他們應該是想先找到投資人吧。"
84306100501-13 = "你的意思是他們在畫大餅嗎？#n這種行為好像跟科學家的形象有點不搭。"
84306100501-14 = "不，這是完全是科學家會有的行為。"
84306100501-15 = "……這點你最好牢記在心，百合園聖亞。"
84306100501-16 = "絕大部分的科學家並沒有多麼理性。只是努力變得理性罷了。"
84306100501-18 = "原來如此啊……我又學到了一課。"

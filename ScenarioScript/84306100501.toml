[translation]
84306100501-6 = "Out of personal curiosity, how long would it take for them to finish that gun and demonstrate it properly?"
84306100501-7 = "Hmm... I wonder. It'd be very difficult, unless they had some special outside help."
84306100501-8 = "Is that so? From the way they described it, it sounded almost complete."
84306100501-9 = "Typically, that's where the development process really starts. Ironing out the bugs and uncertainties is the hardest part, and it takes the most skill."
84306100501-10 = "Unfortunately, as far as I'm aware, the technology to stabilize this kind of growth is still barely even theoretical."
84306100501-11 = "Then how did they...?"
84306100501-12 = "Like I mentioned before, they're probably looking for early investors."
84306100501-13 = "So they just wanted SOMETHING to show them? That's not what I'd expect from scientists."
84306100501-14 = "You should. It's exactly what scientists do."
84306100501-15 = "...Understand something, Yurizono Seia."
84306100501-16 = "Scientists do try to be rational, but they have the same irrational wants the rest of us do, and they can be just as driven by them."
84306100501-18 = "I see... I learned something new."

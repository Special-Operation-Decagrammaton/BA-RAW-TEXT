[translation]
84306100501-6 = "ฉันแค่สงสัยน่ะค่ะ ถ้างั้นต้องใช้เวลานานแค่ไหนที่จะสร้างปืนนั้นจนเสร็จสมบูรณ์และเอามาจัดแสดงได้#nเหรอคะ?"
84306100501-7 = "อืม... ไม่รู้สิ น่าจะยากนะ เว้นแต่จะมีการแทรกแซงเป็นพิเศษจากภายนอกน่ะ"
84306100501-8 = "งั้นเหรอคะ? ตอนที่ได้ฟัง ฉันคิดว่ามันเกือบจะเสร็จสมบูรณ์แล้วเสียอีกค่ะ"
84306100501-9 = "ปกติแล้วการพัฒนาจะเริ่มอย่างจริงจังจากตรงนั้นน่ะ การหาจุดที่ไม่เสถียรเป็นขั้นตอนที่ใช้เวลานานที่สุด และต้องใช้เทคโนโลยีเป็นอย่างมาก"
84306100501-10 = "แต่ก็น่าเสียดาย เพราะเท่าที่ฉันรู้ เทคโนโลยีที่สามารถรักษาเสถียรภาพได้นั้นยังพัฒนาได้ยาก แม้จะในเชิงทฤษฎีก็ตาม"
84306100501-11 = "แล้วถ้าอย่างนั้นทำไมคนเหล่านั้นถึงได้..."
84306100501-12 = "อย่างที่ฉันบอกไปนั่นละ ฉันเดาว่าพวกเธอคงอยากจะหาผู้ลงทุนน่ะ"
84306100501-13 = "ลองทำดูก่อนแล้วค่อยดูผลงั้นเหรอคะ? นี่ไม่ใช่วิสัยของนักวิทยาศาสตร์เลยนะคะ"
84306100501-14 = "หืม? ไม่หรอก นี่ละวิสัยของนักวิทยาศาสตร์"
84306100501-15 = "ยูริโซโนะ เซอา... เธอต้องรู้ไว้นะ"
84306100501-16 = "นักวิทยาศาสตร์ส่วนใหญ่น่ะไม่มีเหตุผลหรอก ทุกคนต่างก็พยายามเพื่อจะมีเหตุผลกันเท่านั้น"
84306100501-18 = "อย่างนี้นี่เอง... ฉันได้เรียนรู้แล้วค่ะ"

[translation]
51050-1 = "第5話;自稱菁～英少女登場！"
51050-5 = "唔嗯，那個名字……好像在哪裡聽過。"
51050-6 = "百花繚亂的紫，難道是那個勘解由小路家族的……"
51050-7 = "[s]「等等，你是剛才的……？」"
51050-12 = "咦？夏～萊的老師怎麼會在這裡……？"
51050-16 = "哈……！小女子知道了！"
51050-17 = "難道……剛才之所以助小女子一臂之力，是因為早已預想到這種情況了嗎……！？"
51050-18 = "前輩們說的沒錯，確實是「我啦，是我啊？」的情況！#n被有計劃地盯上的少女的命運，真是太[ruby=Mind Shock]令人震驚[/ruby]了！"
51050-23 = "在我不知道的期間，兩位已經變成這種複雜微妙的關係了嗎……？"
51050-24 = "[s]「才沒有，那是你單方面的誤會。」"
51050-25 = "喵哈哈～所以百花繚亂的紫來到我們陰陽部有什麼事嗎～？"
51050-26 = "啊！對了！"
51050-27 = "小女子聽到一個消息。"
51050-28 = "聽說我們百花繚亂的副委員長……"
51050-30 = "更正，是擔任委員長代理的名草前輩出現了！"
51050-32 = "哎呀……？"
51050-34 = "……姑且問一下，那個消息是從哪裡聽來的呢？"
51050-36 = "天空被染紅的那一天──"
51050-37 = "我們百花繚亂收到了陰陽部為了收拾局面而在背後行動的情報。"
51050-38 = "[s]「到底是從哪裡得到那種情報的……」"
51050-40 = "……百花繚亂想必有其收集情報的獨特手段吧。"
51050-41 = "畢竟我們也在收集百花繚亂的情報～#n他們[ruby= ・     ・ ]當然[/ruby]也一樣對吧～？"
51050-42 = "仁耶大人…………"
51050-43 = "唉……"
51050-45 = "根據情報，陰陽部為了解決事件，派遣部隊前往了北方的大雪原。"
51050-46 = "沒錯……就是這段期間傳聞四起……#n解決了至今百鬼夜行無數未解難題的陰陽部直屬最強特殊部隊……！"
51050-57 = "傳說中的「特殊忍者隊」！"
51050-63 = "[ns]「……傳聞是不是被微妙地誇大了？」"
51050-64 = "雖然沒能掌握到任務的詳細內容，但有一件事能夠確定。"
51050-65 = "那就是陰陽部派遣的部隊，在大雪原遇見了「百花繚亂的某個人」。"
51050-66 = "如何！見識到我們百花繚亂的情報能力了吧……！"
51050-67 = "喵哈哈～為了不讓混亂擴大，我們已經盡可能注意情報的管理……#n你竟然能查到這個地步，挺優秀的嘛～？"
51050-68 = "沒錯沒錯！桔梗前輩收集情報的能力是無人能及的！"
51050-69 = "啊哈，桔梗指的是百花繚亂的2年級生，作戰參謀桐生桔梗是嗎？"
51050-73 = "……啊！不小心就說出前輩的名字了……#n剛才是小女子口誤……請當做沒聽見吧……！"
51050-74 = "算了，反正就算隱瞞也無濟於事……沒錯，事實正是如此。"
51050-76 = "仁耶大人。"
51050-78 = "沒關係，佳穗。#n事情都已經過了，而且對方是百花繚亂的學生，有必要知道真相。"
51050-79 = "果然……是真的……！"
51050-83 = "沒錯，我們確實和百花繚亂的副委員長「御稜名草」有所接觸。"
51050-84 = "……！"
51050-85 = "那太好了！小女子有件事想拜託陰陽部！"
51050-86 = "在話說到這裡的時候提出請求，果然……"
51050-87 = "[s]「是想要說服名草回來……」"
51050-88 = "不，不是那樣的。"
51050-93 = "為了讓小女子成為百花繚亂的委員長……！"
51050-95 = "請陰陽部部長務必擔任「百花繚亂繼承戰」的證人！"
51050-103 = "[ns]「繼承……什麼？」"
51050-105 = "[log=유카리]「百花繚亂繼承戰」是什麼呢！[/log]"
51050-109 = "（百花繚亂……在百鬼夜行扮演調解紛爭的角色。#n　是只有經過挑選的學生才能加入的歷史悠久的社團！）"
51050-110 = "（因此被選上的菁英領導者必須具備相應的霸者之風！）"
51050-113 = "（若是擔任幹部以上職位之人被認為其實力和人品不適任……）"
51050-130 = "（任何成員都能透過這個制度申請繼承戰──也就是藉由決鬥奪取領導者之位！）"
51050-144 = "[ns]「百花繚亂……是這麼野蠻的社團嗎！？」"
51050-145 = "唔嗯，但是為什麼突然提起繼承戰的事……？"
51050-146 = "雖然這種話由小女子口中說出實在令人遺憾……"
51050-147 = "但現在的百花繚亂，任誰看來都是一片狼藉……！#n實在難以稱為正常的社團……！"
51050-148 = "其根本的原因……就是本該坐鎮百花繚亂的名草前輩……"
51050-149 = "因為「名草代理委員長」沒有堅守崗位！#n大將級的人物不在所造成的！"
51050-154 = "原來如此……"
51050-155 = "該如何解決這種情況呢？#n經過小女子我的左思右想……"
51050-156 = "在幾天前聽到百花繚亂解散令的消息之後，我絞盡腦汁……"
51050-157 = "沒錯！就在昨晚洗澡時突然靈光一閃……"
51050-158 = "想到了之前在「傳聞」中聽過的繼承戰！"
51050-159 = "[s]「傳聞……？」"
51050-161 = "是的。因為「繼承戰」雖然記載在百花繚亂的教戰手冊中，卻不常進行……"
51050-162 = "尤其是對現在1年級的紫來說，那就像傳聞一樣……#n不過紫應該不會感到驚訝吧。"
51050-164 = "沒錯，因為小女子知道──#n那或許是扭轉當前局面的方法，也可能是打破僵局的關鍵，所以已經下定決心了！"
51050-165 = "我！勘解由小路紫！#n身為百花繚亂的第一菁英！最受矚目、無比閃亮的超新星！"
51050-166 = "要在繼承戰中打敗名草前輩，由我來接任委員長之位！"
51050-167 = "這樣就能解決所有問題了！#n所以希望你務必幫忙！陰陽部的部長！"
51050-168 = "[s]「不過既然名草是副委員長，那委員長不是另有其人嗎？」"
51050-170 = "沒錯，百花繚亂的現任委員長是七稜菖蒲同學。"
51050-171 = "而御稜名草則是只有副委員長的職位。"
51050-172 = "然而你卻要向名草同學申請繼承戰？#n……可以告訴我你的理由嗎？"
51050-178 = "菖蒲委員長他……已經離開社團很久了。"
51050-179 = "[s]「你說菖蒲已經離開社團了？」"
51050-180 = "嗯，就在小女子剛加入百花繚亂的時候……距今大約10個月前。"
51050-181 = "菖蒲委員長在讓名草前輩繼承百花繚亂代代相傳的「資格」之後……就消聲匿跡了。"
51050-182 = "繼承資格的名草前輩本來能直接登上委員長之位……"
51050-183 = "但名草同學卻不知為何拒絕就任，只願意擔任代理……"
51050-184 = "有什麼原因嗎？"
51050-185 = "……………………我不清楚。"
51050-186 = "菖蒲委員長在百花繚亂的地位相當高……但我並不是很瞭解他。"
51050-187 = "在他決定離開社團的當下，我們根本無法阻止他的決定。"
51050-188 = "那已經是我、蓮華前輩和桔梗前輩都接受的事實。"
51050-189 = "唯獨名草前輩他……不認同那個決定……#n說委員長之位非菖蒲前輩莫屬。"
51050-190 = "……如今委員長已經不在，只剩下名草前輩一個人……"
51050-196 = "哎，別再說這種沉悶的話題了！"
51050-197 = "重要的是今後的未來！也就是Fu～ture～！"
51050-198 = "只要我這個超天才菁～英當上百花繚亂的委員長，所有問題都會迎刃而解！"
51050-199 = "從現在起，由我開始的百花繚亂傳說即將揭開序幕！"
51050-200 = "……雖然這麼說，可惜的是「繼承戰」不是我一個人就能進行的。"
51050-201 = "[s]「畢竟都被稱為『繼承戰』了……有什麼條件嗎？」"
51050-203 = "是的，正如老師所說，百花繚亂的繼承戰不能單獨進行。"
51050-204 = "因為如果誰都能進行「繼承戰」的話，所有人都會吵著要進行對吧～"
51050-205 = "如果想讓百花繚亂的繼承戰成立，最少也需要兩個人以上。"
51050-206 = "由一名不屬於百花繚亂的「見證人」──#n證明「繼承戰」是以公平標準舉行的儀式……"
51050-208 = "以及一名「百花繚亂所屬的幹部級成員」──#n保證這場「繼承戰」是以正當形式進行。"
51050-209 = "[s]「是為了確保能正確判斷和公平的規則啊……」"
51050-211 = "喵哈哈，雖然這麼說有點不好意思，但繼承戰的見證人一直是由我們陰陽部負責。"
51050-212 = "別看我們這樣，我們在百鬼夜行還是挺受尊重的～♪"
51050-213 = "但即便如此，現在百花繚亂已經被下達「解散令」。"
51050-214 = "在這種情況下，繼承戰能否正常舉行還很難說……"
51050-220 = "那是誤會。"
51050-222 = "嗯……？"
51050-224 = "因為……還有桔梗前輩和蓮華前輩……以及其他成員在。"
51050-225 = "只要還有喜愛百花繚亂的人，就不能下達解散令。"
51050-226 = "[s] 「……」"
51050-227 = "確實，那個前提從一開始就不成立。"
51050-228 = "所以你才希望我協助進行繼承戰，這是你的結論對吧～？"
51050-229 = "是的，正是如此！"
51050-234 = "既然如此，我有一件事想問紫同學。"
51050-235 = "什麼事？"
51050-236 = "紫同學先前也說過，現在百花繚亂的狀況並不正常。"
51050-237 = "若是在這種情況下舉行繼承戰，一旦稍有不慎……#n很可能讓外界認為是要藉著百花繚亂陷入混亂，藉機奪取委員長之位。"
51050-242 = "在這種情況下想得到陰陽部的協助……"
51050-244 = "──簡而言之，就是在要求陰陽部協助自己「謀反」。"
51050-247 = "相當於是要求我們承擔潛在的政治風險──這點你明白嗎？"
51050-249 = "……呃！"
51050-250 = "我，我我我我我我完全沒想到……"
51050-251 = "事，事，事，事情會發展成那樣……"
51050-252 = "……但，但是！"
51050-253 = "但是…… "
51050-254 = "……儘管如此……我……"
51050-255 = "如果你還是想請我們幫忙……"
51050-256 = "…………紫，你是以勘解由小路家的身分提出請求嗎？"
51050-257 = "呃！！"
51050-261 = "…………"
51050-262 = "不，不是的。"
51050-263 = "這只是……"
51050-268 = "只是我勘解由小路[ruby=・]紫[/ruby]個人的請求。"
51050-270 = "這樣啊。"
51050-272 = "但是如果像你說的那樣，有被外界誤會的可能性……"
51050-273 = "如果這會讓陰陽部為難……我……"
51050-274 = "……如果是平常，我可能會以「這種危險的事有～點難以接受」來拒絕你……"
51050-275 = "喵哈哈！你還真會抓時間呢。"
51050-277 = "什麼……？"
51050-282 = "你的運氣真不錯。#n這裡正好有個無法對你的煩惱視而不見的人。"
51050-287 = "仁耶大人……！"
51050-289 = "哎呀，請問我有說錯嗎，老師？"
51050-290 = "[s]「是沒錯啦……」"
51050-291 = "……？？#n那是什麼意思？"
51050-292 = "我的意思是如果「夏萊的老師」願意當見證人……#n政治什麼的根本不成問題，喵哈哈。"
51050-294 = "又因為我們百鬼夜行的事造成老師的麻煩……"
51050-296 = "哎呀，佳穗你真是的，不用露出那麼可怕的表情吧。"
51050-297 = "老師絕對不會拒絕學生的請求對吧～？"
51050-298 = "[s]「如果紫需要幫助，我一定會幫忙到底。」"
51050-302 = "……！"
51050-303 = "呵呵，那真是太好了～#n雖然剛才提到了政治風險，但「夏萊」的名義就是擁有能克服一切的份量呢～♪"
51050-304 = "那麼這次繼承戰的「見證人」就拜託夏萊的[USERNAME]老師囉。"
51050-305 = "嗯，如果是夏萊的話應該不會有人反對……#n不過為了以防萬一，我也以陰陽部的名義為繼承戰做擔保吧。"
51050-306 = "這樣的回答，你還滿意嗎？"
51050-308 = "是，是！當然！"
51050-309 = "非常感謝你的──"
51050-310 = "──但是。"
51050-316 = "這是因為夏萊的存在才得以成立的特例──希望你千萬別忘記了。"
51050-318 = "……！"
51050-319 = "是，我會銘記在心。"
51050-320 = "我知道了。"
51050-321 = "那麼還需要進行必要的手續，請紫同學跟我來吧。"
51050-322 = "知世醬也是……"
51050-323 = "嗯～～那老師，下次見囉～"
51050-329 = "喵哈哈～時機真是巧呢。#n這樣就能幫上紫同學的忙，真是太好了～"
51050-330 = "[s]「仁耶，你在『解散令』發布之後就知道會發生這種事了嗎？」"
51050-331 = "嗯嗯～這個嘛～？我不是很清楚老師的意思呢。"
51050-332 = "該說只是運氣好才發生這一連串的偶然……還是該說純屬巧合呢？"
51050-333 = "如果剛好有能獲得雙贏的策略，選擇執行也很合理吧？#n這樣應該會更有意思～"
51050-334 = "……而且如果能與百花繚亂一起行動，或許是個瞭解葛葉的好機會呢～"
51050-335 = "[s]「仁耶，難道你從一開始就……？」"
51050-336 = "喵哈哈～誰知道呢？"
51050-337 = "至少我希望不要都是我一味給老師添麻煩～"
51050-338 = "您不覺得總是單方面接受的關係很沒意思嗎？"
51050-342 = "[ns]「……謝謝你。」"
51050-343 = "哎呀，該說謝謝的人是我～"
51050-348 = "這次慶典期間，還請多多關照百鬼夜行，老師。"
51050-350 = "下一話;下一個目的地"

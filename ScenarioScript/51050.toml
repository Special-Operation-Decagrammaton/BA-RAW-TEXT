[translation]
51050-1 = "Episode 5;Self-Proclaimed Elite Girl's Entrance!"
51050-5 = "Hm... I remember that name."
51050-6 = "Yukari from the Hyakkaryouran... The scion of a prestigious family."
51050-7 = "[s] \"Wait, you're the girl I met earlier.\""
51050-12 = "Hm? What brings Schale's Sensei here?"
51050-16 = "*gasp* I knew it!"
51050-17 = "You helped me earlier because you expected that something like this would happen, right?!"
51050-18 = "It's just like Renge warned me! A smirking spider has trapped me in its web! I was being targeted all this time and never realized the danger I was in!"
51050-23 = "...Is there something between you two that I don't know about?"
51050-24 = "[s] \"No, it's just a one-sided misunderstanding. From that side.\""
51050-25 = "But why would Yukari descend from the lofty Hyakkaryouran all the way down to the Yin-Yang Club?"
51050-26 = "Oh, right!"
51050-27 = "Regarding that, I heard the news."
51050-28 = "The vice president of the Hyakkaryouran..."
51050-30 = "No, Acting President Nagusa has reappeared!"
51050-32 = "Oh my..."
51050-34 = "...And where did you hear that?"
51050-36 = "On the day the sky was painted red."
51050-37 = "The Hyakkaryouran received a report that the Yin-Yang Club was working behind the scenes to fix things."
51050-38 = "[s] \"Where did you get this report?\""
51050-40 = "...The Hyakkaryouran commands a highly skilled intelligence apparatus."
51050-41 = "It's always good to assume that the Hyakkaryouran has eyes on any operation. Of course, that's partly why we monitor them ourselves, nyahaha!"
51050-42 = "Niya..."
51050-43 = "*sigh*"
51050-45 = "According to the report, agents of the Yin-Yang Club were dispatched to the Great Snowfield in the north."
51050-46 = "And not just any agents...a mysterious squad which works directly under the Yin-Yang Club... Specialists who have saved Hyakkiyako from countless perils!"
51050-57 = "The legendary Special Ninja Unit!"
51050-63 = "[ns] \"...Isn't that a little exaggerated?\""
51050-64 = "While we couldn't uncover the exact mission details, we were sure of one thing."
51050-65 = "While in the Great Snowfield, the unit dispatched by the Yin-Yang Club contacted someone from the Hyakkaryouran."
51050-66 = "So how's that for the Hyakkaryouran's intelligence-gathering!"
51050-67 = "Nyahaha! That operation was conducted in the utmost secrecy to avoid causing an uproar. I'm impressed you were able to figure out so much!"
51050-68 = "Yes! Kikyou's intelligence analysis is unrivaled!"
51050-69 = "Ah, by Kikyou, you mean Hyakkaryouran's second-year operations officer Kiryuu Kikyou, right?"
51050-73 = "...Wha! Exposing the name of my superior... Th-That was a mistake! P-Please, wipe my words from your mind!"
51050-74 = "Ha. Well, if she figured out that much, there's no point being all hush hush... Yes. Your report was accurate."
51050-76 = "Niya."
51050-78 = "It's okay, Kaho. The operation's over. And she's a student from the Hyakkaryouran—she has a right to know."
51050-79 = "Then...you truly—!"
51050-83 = "Yes, we were in contact with the Hyakkaryouran's vice president, Goryou Nagusa."
51050-84 = "...!"
51050-85 = "That's...fantastic! Then I, Yukari, have a request for the Yin-Yang Club!"
51050-86 = "Given the current situation, I suppose your request is..."
51050-87 = "[s] \"You want us to persuade Nagusa to come back...\""
51050-88 = "No. That's not it at all."
51050-93 = "For I, Yukari, have sworn to become the president of the Hyakkaryouran myself!"
51050-95 = "I want the president of the Yin-Yang Club to witness my Hyakkaryouran Succession Contest!"
51050-103 = "[ns] \"Succession...what?\""
51050-105 = "[log=유카리]The Hyakkaryouran Succession Contest![/log]"
51050-109 = "The Hyakkaryouran Resolution Council is a prestigious club responsible for managing disputes within Hyakkiyako, which can only be joined by invitation!"
51050-110 = "Anyone bold enough to place themselves at the head of such an elite group must prove themselves worthy of leadership!"
51050-113 = "If any officer or executive is found to be deficient in the skills or character demanded by their position..."
51050-130 = "Any other member may challenge them to a succession contest to claim their title!"
51050-144 = "[ns] \"I-Is the Hyakkaryouran really so wild?!\""
51050-145 = "Hm, but why invoke a succession contest now?"
51050-146 = "It's painful to admit to an outsider, but..."
51050-147 = "It's obvious to everyone that the Hyakkaryouran is in complete disarray! We can hardly call ourselves a proper club!"
51050-148 = "And the greatest source of disorder is Nagusa, who should be the anchor keeping the Hyakkaryouran together..."
51050-149 = "Without Acting President Nagusa, we're a body without a head!"
51050-154 = "Huh..."
51050-155 = "So I, Yukari, turned my powerful mind towards fixing our situation!"
51050-156 = "And after much considering and contemplating, especially after the order to disband the Hyakkaryouran was announced..."
51050-157 = "I was struck by sudden inspiration while taking my evening bath!"
51050-158 = "I remembered stories I heard about previous succession contests!"
51050-159 = "[s] \"...Stories?\""
51050-161 = "While the Hyakkaryouran's charter includes provisions for succession contests, in practice they don't actually happen that often..."
51050-162 = "Given that Yukari just joined as a first-year student, it's not surprising that they're the stuff of legend to her."
51050-164 = "After realizing that there was a way to bring us back from this precipice, I made a solemn oath!"
51050-165 = "I, Yukari, elite of the Hyakkaryouran and star burning with the fire of all our dreams, formally vow:"
51050-166 = "I will defeat Nagusa in a succession contest and assume the presidency myself!"
51050-167 = "It's the solution to all of our problems! Therefore, I ask that you, the president of the Yin-Yang Club, assist me!"
51050-168 = "[s] \"But didn't you say Nagusa is the vice president? Isn't someone else the president, then?\""
51050-170 = "Nanakado Ayame currently serves as the official president of the Hyakkaryouran."
51050-171 = "On paper, Goryou Nagusa only has the title of vice president."
51050-172 = "What do you hope to gain by challenging Nagusa to a succession contest, then?"
51050-178 = "It's...been some time since President Ayame departed from the club."
51050-179 = "[s] \"Ayame left the club?\""
51050-180 = "Yes. About 10 months ago, right as I joined the Hyakkaryouran."
51050-181 = "President Ayame entrusted Nagusa with the Authority of the Presidency, marking Nagusa as her successor, as every president of the Hyakkaryouran has since our founding... And then she vanished."
51050-182 = "At that point, Nagusa should have become the president..."
51050-183 = "But she refused to assume the full title and only agreed to serve as the acting president... "
51050-184 = "Do you know why?"
51050-185 = "...I'm...not sure."
51050-186 = "I had only been a member of the Hyakkaryouran briefly when President Ayame was the head...and I don't know much about her."
51050-187 = "But when she decided to leave the club, none of us could stop her."
51050-188 = "I, Yukari, accepted that truth. So did Renge and Kikyou."
51050-189 = "But Nagusa... She refuses... She claims that Ayame is the only person who can be president."
51050-190 = "...But the president isn't with us anymore! Nagusa's the only one..."
51050-196 = "No, no more brooding on the past!"
51050-197 = "The future is what matters!"
51050-198 = "Everything will be fixed when I, Yukari, super elite genius become the president of the Hyakkaryouran!"
51050-199 = "It shall mark the next act in the legend of the Hyakkaryouran, penned by none other than I, Yukari!"
51050-200 = "...Or so I hope, but unfortunately a succession contest can't be declared by one person alone."
51050-201 = "[s] \"A fancy name like succession contest must come with rules.\""
51050-203 = "Exactly, Sensei. No single party can proceed with a Hyakkaryouran Succession Contest by themselves."
51050-204 = "If anyone could start one, the club would be thrown into turmoil every time a subordinate thought they had a better idea. Nothing would ever get done."
51050-205 = "According to the Hyakkaryouran's charter, for a succession contest to be legally binding you need two other people to act as your witnesses."
51050-206 = "The first witness must be a person of good standing who is unaffiliated with the Hyakkaryouran's leadership. They attest that the ritual is being held for righteous cause..."
51050-208 = "And the second witness must be another Hyakkaryouran officer, who officiates the succession contest and ensures that it is fair to both parties."
51050-209 = "[s] \"I see. So that way everyone is given a fair shake...\""
51050-211 = "Nyahaha, it's a bit embarrassing to say so myself, but the president of the Yin-Yang Club traditionally serves as the first witness during succession contests."
51050-212 = "After all, we're pretty respected around Hyakkiyako!"
51050-213 = "However, the Hyakkaryouran has been ordered to disband."
51050-214 = "Given those circumstances, I don't see how a succession contest could legally proceed..."
51050-220 = "That's wrong."
51050-222 = "Oh...?"
51050-224 = "Kikyou... Renge...and the rest of the club members."
51050-225 = "So long as people who love the Hyakkaryouran draw breath, no Declaration of Dissolution could ever be valid."
51050-226 = "[s] \"...\""
51050-227 = "So...since an illegitimate Declaration of Dissolution has been issued..."
51050-228 = "You want us to sign off on your succession contest, right?"
51050-229 = "Yes, exactly!"
51050-234 = "Then I have one question for you, Yukari."
51050-235 = "Oh?"
51050-236 = "As you said, the Hyakkaryouran currently isn't functional."
51050-237 = "Holding a succession contest in such circumstances... Some people might say you're launching a coup while the Hyakkaryouran is in chaos."
51050-242 = "And by asking for help from the Yin-Yang Club..."
51050-244 = "You're asking us to join in your treason."
51050-247 = "And regardless of such uncharitable doubts, you are definitely asking us to share the political risks stemming from your actions. Do you understand that?"
51050-249 = "...Wh-What?"
51050-250 = "I-I-I never considered anything of the sort!"
51050-251 = "F-F-For it to be taken in such a way..."
51050-252 = "...B-But!"
51050-253 = "But... "
51050-254 = "Still...I..."
51050-255 = "If you still wish to ask for our help..."
51050-256 = "...Is it a request from your family?"
51050-257 = "Ugh!!!"
51050-261 = "..."
51050-262 = "No. That's not it at all."
51050-263 = "That's not... I'm only..."
51050-268 = "This is just a request from me, Yukari, of the Hyakkaryouran."
51050-270 = "Hmm."
51050-272 = "But if my contest could be perceived like you said..."
51050-273 = "I have no intention of making things difficult for the Yin-Yang Club..."
51050-274 = "...Normally, I'd demand something from you in return for the headache you'd cause the Yin-Yang Club. And again for the headache you'd cause me, as the president."
51050-275 = "But it turns out that you have perfect timing."
51050-277 = "R-Really?"
51050-282 = "You have some luck, Yukari. There just happens to be someone here who can't ignore your distress."
51050-287 = "N-Niya! "
51050-289 = "Oh my. Am I wrong, Sensei?"
51050-290 = "[s] \"No, you're right, but...\""
51050-291 = "...What does that mean?"
51050-292 = "If the Sensei of Schale acts as your witness, our club won't be anywhere near the political fallout."
51050-294 = "You're troubling Sensei with Hyakkiyako's problems yet again..."
51050-296 = "Put that scary face away, Kaho."
51050-297 = "Sensei would never turn down a student in need, riiiiiight?"
51050-298 = "[s] \"If Yukari needs my help, I'll help her.\""
51050-302 = "...!"
51050-303 = "Nyahaha, that's great! It's so nice of Schale to swoop in and transcend our petty internal politics."
51050-304 = "Then I formally request that Schale's [USERNAME] Sensei serves as witness for this upcoming succession contest."
51050-305 = "I doubt anyone will object to Sensei, but just in case I, Niya, as the president of the Yin-Yang Club, officially approve Schale's right to act as witness."
51050-306 = "Is that enough of an answer for you?"
51050-308 = "Y-Yes! Absolutely!"
51050-309 = "Th-Thank you for your—!"
51050-310 = "However."
51050-316 = "Please be aware that this is a special exception, permitted due to Schale's previous assistance to this academy."
51050-318 = "...!"
51050-319 = "Yes, I'll keep that in mind."
51050-320 = "Very well."
51050-321 = "We need to complete an official declaration of intent, so please follow me, Yukari."
51050-322 = "You too, Chise..."
51050-323 = "Okay... See you later, Sensei..."
51050-329 = "Nyahaha! We were just in time to help Yukari. What a relief!"
51050-330 = "[s] \"Niya, did you expect something like this after the Declaration of Dissolution?\""
51050-331 = "Hm, who could say? I don't know what you're trying to imply, Sensei."
51050-332 = "It was probably a lucky coincidence that you and Yukari were here at the same time."
51050-333 = "But since you were, it only makes sense for you to help her out. It's a win-win solution for everybody."
51050-334 = "...Besides, while you're with the Hyakkaryouran, you might learn something about Kuzunoha, huh?"
51050-335 = "[s] \"Niya, you planned this from the beginning.\""
51050-336 = "Nyahaha! Perhaps!"
51050-337 = "I'm just glad that Sensei's a willing participant."
51050-338 = "It isn't fun to be the go-to person for everyone's problems, you know?"
51050-342 = "[ns] \"...Thanks.\""
51050-343 = "Oh my, that's what I'm supposed to say to you!"
51050-348 = "I look forward to your work for Hyakkiyako, Sensei. But do try to enjoy the festival while you're at it."
51050-350 = "Next Episode;The Next Destination"

[translation]
51050-1 = "ตอนที่ 5;เด็กสาวที่เรียกตัวเองว่าอีลีทปรากฏตัว!"
51050-5 = "อืม... เหมือนฉันจะ... เคยได้ยินชื่อนั้นมาก่อนเลยค่ะ"
51050-6 = "ยูคาริแห่งเฮียกกะเรียวรัน... แสดงว่าต้องเป็นคนของตระกูลคาเดโนะโคจิ..."
51050-7 = "[s] \"เดี๋ยวก่อน นักเรียนคนเมื่อกี้เหรอ...?\""
51050-12 = "เอ๋? ท่านอาจารย์จากชัล~ เล่ต์ มาทำอะไรที่นี่...?"
51050-16 = "อ๊ะ...! ข้ารู้แล้วเจ้าค่ะ!"
51050-17 = "อย่าบอกนะว่า...! ที่ช่วยข้าเมื่อกี้ จริงๆ วางแผนอะไรเอาไว้แล้ว...?!"
51050-18 = "เหมือนกับคำพูด <รู้หรือเปล่าว่าฉันเป็นใคร?> ที่พวกรุ่นพี่พูดถึงเลย! มาเล่นแบบนี้กับข้าได้ยังไงเจ้าคะ!"
51050-23 = "สองคนนี้ไปสานสัมพันธ์อะไรกันมาโดยที่ฉันไม่รู้เหรอคะ...?"
51050-24 = "[s] \"ไม่ใช่ นี่เป็นการเข้าใจผิดอยู่ฝ่ายเดียวนะ\""
51050-25 = "อะฮ่า~ ถ้าอย่างนั้นยูคาริแห่งเฮียกกะเรียวรันมาชมรมหยินหยางของเราด้วยเรื่องอะไรเหรอคะ? "
51050-26 = "อ๊ะ! จริงสิ!"
51050-27 = "ข้าได้ยินข่าวมาเจ้าค่ะ"
51050-28 = "ได้ยินมาว่ารองหัวหน้าเฮียกกะเรียวรันของพวกข้า..."
51050-30 = "ไม่สิ ได้ยินว่ารุ่นพี่นางุสะ รักษาการหัวหน้าออกมาปรากฏตัวอีกครั้ง!"
51050-32 = "ตายจริง...?"
51050-34 = "...ไปได้ยินมาจากไหนกันน่ะ?"
51050-36 = "ตอนที่ท้องฟ้าเปลี่ยนเป็นสีแดงในคราวก่อน"
51050-37 = "ข้าได้ข่าวมาว่าเฮียกกะเรียวรันเคลื่อนไหวอยู่เบื้องหลังชมรมหยินหยางเพื่อรับมือกับสถานการณ์เจ้าค่ะ"
51050-38 = "[s] \"ไปได้ข่าวแบบนั้นมาจากไหน...\""
51050-40 = "...ถ้าเป็นเฮียกกะเรียวรัน ก็น่าจะมีช่องทางหาข่าวอยู่นะคะ"
51050-41 = "พวกเราเองก็กำลังตรวจสอบข้อมูลของเฮียกกะเรียวรันอยู่~ งั้นก็ไม่แปลกที่พวกเราก็รู้อยู่ด้วย ใช่มั้ย~?"
51050-42 = "คุณนิยะ..."
51050-43 = "เฮ้อ..."
51050-45 = "ตามข้อมูลที่ข้าได้มา ชมรมหยินหยางส่งคนไปต่อสู้ในทุ่งหิมะใหญ่ทางเหนือเองเลยนี่เจ้าคะ"
51050-46 = "สุดยอดกองกำลังสเปเชียล~ สังกัดชมรมหยินหยางที่คอยแก้ปัญหาน้อยใหญ่มากมายที่เกิดขึ้นใน#nเฮียกคิยาโค... กองกำลังที่เป็นที่กล่าวขานในข่าวลือเท่านั้น...!"
51050-57 = "หรือที่เรียกว่า <หน่วยนินจาพิเศษ> ในตำนานยังไงล่ะเจ้าคะ!"
51050-63 = "[ns] \"...นี่มันข่าวใส่ไข่หรือเปล่า?\""
51050-64 = "ข้าไม่รู้รายละเอียดภารกิจของพวกนั้นหรอก แต่ที่แน่ๆ ก็คือ"
51050-65 = "กองกำลังที่ชมรมหยินหยางส่งไปได้พบกับ <ใครบางคนของเฮียกกะเรียวรัน> ในทุ่งหิมะใหญ่เจ้าค่ะ!"
51050-66 = "เป็นยังไงเจ้าคะ! ความสามารถในการหาข้อมูลของเฮียกกะเรียวรัน...!"
51050-67 = "อะฮะฮ่า ฉันอุตส่าห์ระมัดระวังเรื่องการจัดการข้อมูลเพื่อไม่ให้เกิดเรื่องวุ่นๆ แต่เธอยังได้ข้อมูลวงในมา#nตั้งขนาดนั้นเลย ไม่ธรรมดาเลยนะคะเนี่ย~"
51050-68 = "เจ้าค่ะ! ถ้าเป็นเรื่องการรวบรวมข้อมูลแล้ว ไม่มีใครเก่งเกินรุ่นพี่คิเคียวเลยละเจ้าค่ะ!"
51050-69 = "อ๋า คิเคียว...  หมายถึงคิริว คิเคียว ชั้นปีที่ 2 ที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันสินะคะ?"
51050-73 = "...เฮือก! พูดชื่อของรุ่นพี่ออกไปจนได้... มะ... เมื่อกี้ข้าเผลอพูดไปน่ะ! ชะ... ช่วยทำเป็นไม่ได้ยินได้หรือ#nเปล่าเจ้าคะ...!"
51050-74 = "เฮ้อ ปกปิดไปก็ไร้ความหมาย... แต่ก็จริงค่ะ ที่พูดมาเป็นเรื่องจริง"
51050-76 = "คุณนิยะ"
51050-78 = "ไม่เป็นไรหรอก คาโฮะ มันเป็นเรื่องที่ผ่านมาแล้ว และอีกฝ่ายก็เป็นคนของเฮียกกะเรียวรัน เธอต้องได้รู้ความจริงสิ"
51050-79 = "เป็นเรื่องจริงสินะ...!"
51050-83 = "ใช่ค่ะ พวกฉันได้ติดต่อกับ <โกเรียว นางุสะ> รองหัวหน้าของเฮียกกะเรียวรันจริงๆ ค่ะ"
51050-84 = "...!"
51050-85 = "ถ้างั้นก็เป็นเรื่องดีเลยเจ้าค่ะ! เพราะข้า ยูคาริผู้นี้มีเรื่องจะรบกวนชมรมหยินหยางเจ้าค่ะ!"
51050-86 = "ถ้าพูดถึงเรื่องนี้แล้วบอกว่ามีเรื่องรบกวนละก็ อย่าบอกนะว่า..."
51050-87 = "[s] \"ขอให้ช่วยตามหานางุสะ แล้วโน้มน้าวให้กลับมา...\""
51050-88 = "ไม่ใช่เจ้าค่ะ ไม่ใช่แบบนั้น"
51050-93 = "เพื่อที่จะทำให้ข้า ยูคาริผู้นี้ได้เป็นหัวหน้าของเฮียกกะเรียวรัน...!"
51050-95 = "ขอให้ท่านหัวหน้าชมรมหยินหยางช่วยเป็นพยานใน <ศึกชิงตำแหน่งของเฮียกกะเรียวรัน> ของข้าด้วย#nเถอะเจ้าค่ะ"
51050-103 = "[ns] \"ศึกชิง... อะไรนะ?\""
51050-105 = "<ศึกชิงตำแหน่งของเฮียกกะเรียวรัน> คืออะไร...!"
51050-109 = "(เฮียกกะเรียวรัน... ชมรมที่มีประวัติยาวนานที่มีบทบาทในการไกล่เกลี่ยข้อขัดแย้งในเฮียกคิยาโค และมีเพียงนักเรียนผู้ที่ได้รับเลือกเท่านั้นที่สามารถเป็นสมาชิกได้!)"
51050-110 = "(ด้วยเหตุนี้จึงต้องเป็นคนที่มีความเป็นเลิศ และมีสง่าราศีที่เหมาะสมกับชมรม)"
51050-113 = "(สำหรับตำแหน่งระดับสูงในชมรมแล้ว จำเป็นต้องเป็นผู้ที่มีทั้งความสามารถและบุคลิกภาพที่เหมาะสม#nกับตำแหน่งนั้น...)"
51050-130 = "(ส่วนศึกชิงตำแหน่ง คือระบบที่สมาชิกคนใดก็ได้ในชมรมสามารถเสนอการท้าดวลเพื่อช่วงชิงตำแหน่ง#nมาได้!)"
51050-144 = "[ns] \"เฮียกกะเรียวรัน... ห้ำหั่นกันแบบนี้เลยเหรอ?!\""
51050-145 = "ฮืม แล้วทำไมจู่ๆ ถึงได้มาพูดถึงศึกชิงตำแหน่ง...?"
51050-146 = "...จะให้ข้าพูดเรื่องนี้ด้วยตัวเองก็น่าสลดใจ"
51050-147 = "แต่ตอนนี้เฮียกกะเรียวรันของพวกข้า... ต่อให้ใครดูก็คงรู้ว่ากำลังเข้าสู่ยุคมืด...! ตอนนี้ก็แทบจะเรียก#nเฮียกกะเรียวรันว่าชมรมไม่ได้แล้วด้วยซ้ำ...!"
51050-148 = "และคนที่เป็นสาเหตุก็คือ... รุ่นพี่นางุสะที่ควรจะต้องทำหน้าที่เป็นเสาหลักของเฮียกกะเรียวรัน..."
51050-149 = "พูดง่ายๆ ก็คือ เรื่องนี้มันเป็นเพราะรุ่นพี่นางุสะที่เป็น <รักษาการหัวหน้า> หายตัวไปเจ้าค่ะ!"
51050-154 = "โฮ่..."
51050-155 = "เพราะฉะนั้นแล้ว ข้า ยูคาริผู้นี้ถึงได้คิดแล้วคิดอีกว่าจะแก้ไขสถานการณ์นี้อย่างไร!"
51050-156 = "พอได้ข่าวเรื่องคำสั่งสลายตัวของเฮียกกะเรียวรันเมื่อวานซืนนี้ ก็มาคิดซ้ำแล้วซ้ำอีก...!"
51050-157 = "ใช่เจ้าค่ะ! ระหว่างที่ข้ากำลังอาบน้ำเมื่อคืนนี้ ก็คิดได้!"
51050-158 = "ว่ามีสิ่งที่เรียกว่าศึกชิงตำแหน่งที่ <เลื่องลือ> มาในสมัยก่อนเจ้าค่ะ!"
51050-159 = "[s] \"ข่าวลือ...?\""
51050-161 = "ค่ะ <ศึกชิงตำแหน่ง> เป็นสิ่งที่มีอยู่ในคู่มือของเฮียกกะเรียวรัน แต่ไม่ได้เกิดขึ้นบ่อยๆ..."
51050-162 = "ก็เลยไม่แปลกถ้ายูคาริที่อยู่แค่ชั้นปีที่ 1... จะบอกว่ามันเป็นเรื่องที่คนเค้าลือกันมาเท่านั้นค่ะ "
51050-164 = "เจ้าค่ะ แต่ในเมื่อข้ารู้ช่องทางที่พอจะพลิกสถานการณ์ในตอนนี้ได้แล้ว ข้าก็เลยตัดสินใจแล้วเจ้าค่ะ!"
51050-165 = "ข้า! ยูคาริ! ในฐานะอิล~ ลีทอันดับหนึ่งแห่งเฮียกกะเรียวรัน! ดวงดาวแห่งความคาดหวังที่เป็นอนาคต#nอันเป็นนิรันดร์!"
51050-166 = "ข้าจะโค่นรุ่นพี่นางุสะในศึกชิงตำแหน่งและรับตำแหน่งหัวหน้าของชมรมไว้เองเจ้าค่ะ!"
51050-167 = "แบบนี้ก็จะคลี่คลายปัญหาทั้งหมดได้! ช่วยให้ข้าได้ทำเช่นนั้นได้ด้วยเถอะเจ้าค่ะ! ท่านหัวหน้าชมรมหยินหยาง!"
51050-168 = "[s] \"เดี๋ยวนะ แต่นางุสะเป็นรองหัวหน้าไม่ใช่เหรอ? แล้วหัวหน้าล่ะ?\""
51050-170 = "ค่ะ หัวหน้าคนปัจจุบันของเฮียกกะเรียวรันคือ นานาคาโดะ อายาเมะ"
51050-171 = "ตอนนี้โกเรียว นางุสะเป็นแค่รองหัวหน้าเท่านั้นค่ะ"
51050-172 = "แต่จะประกาศศึกชิงตำแหน่งกับนางุสะงั้นเหรอ? ขอถามเหตุผลได้ไหมคะ?"
51050-178 = "ก็เพราะหัวหน้าอายาเมะ... จากชมรมเราไปนานแล้วเจ้าค่ะ"
51050-179 = "[s] \"อายาเมะออกจากชมรมไปแล้วเหรอ?\""
51050-180 = "เจ้าค่ะ ออกไปตอนที่ข้าเข้ามาในเฮียกกะเรียวรันใหม่ๆ จนถึงตอนนี้ก็ราวๆ 10 เดือนแล้ว"
51050-181 = "หัวหน้าอายาเมะได้ส่งต่อ <สิทธิ์> ที่สืบทอดกันมาเป็นรุ่นๆ ให้กับรุ่นพี่นางุสะ... สิทธิ์ที่ว่านั่นมันคือ#nหลักฐานที่แสดงถึงความเป็นหัวหน้าของเฮียกกะเรียวรัน... จากนั้นก็หายตัวไปอย่างไร้ร่องรอยเจ้าค่ะ"
51050-182 = "เดิมทีแล้วรุ่นพี่นางุสะที่ได้รับสิทธิ์นั้นต้องขึ้นมาอยู่ในตำแหน่งหัวหน้า..."
51050-183 = "แต่นางุสะก็ปฏิเสธการเป็นหัวหน้า และดำรงตำแหน่งแค่รักษาการเท่านั้น... "
51050-184 = "มีเหตุผลอะไรหรือเปล่าคะ?"
51050-185 = "... ข้าเองก็ไม่รู้เลยเจ้าค่ะ"
51050-186 = "หัวหน้าอายาเมะก็เป็นคนใหญ่คนโตในเฮียกกะเรียวรัน... ข้าคงบอกว่าข้ารู้จักหัวหน้าเป็นอย่างดีไม่ได้"
51050-187 = "การตัดสินใจออกจากชมรมของหัวหน้าเป็นเรื่องที่ข้าขัดขวางไม่ได้"
51050-188 = "เรื่องนั้นเป็นสิ่งที่ทั้งข้า รุ่นพี่เรนเกะ และรุ่นพี่คิเคียวยอมรับเจ้าค่ะ"
51050-189 = "มีเพียงรุ่นพี่นางุสะคนเดียวที่ไม่ยอมรับเรื่องนั้น... และยืนกรานว่าหัวหน้าเฮียกกะเรียวรันต้องเป็น#nหัวหน้าอายาเมะเท่านั้น"
51050-190 = "...ตอนนี้เราไม่มีหัวหน้า มีแต่รุ่นพี่นางุสะคนเดียวที่..."
51050-196 = "ไม่สิ เลิกคุยเรื่องหม่นหมองๆ แบบนี้ดีกว่า!"
51050-197 = "สิ่งที่สำคัญกว่านั้นก็คืออนาคตที่จะเริ่มขึ้นจากตอนนี้! ฟิว~ เจอร์~ ของเรายังไงล่ะเจ้าคะ!"
51050-198 = "อิล~ ลีทยอดอัจฉริยะ ยูคาริคนนี้จะขึ้นเป็นหัวหน้าของเฮียกกะเรียวรันแล้วแก้ปัญหาทั้งหมดเอง!"
51050-199 = "จากนี้ไปคือการเปิดตำนานแห่งเฮียกกะเรียวรันของยูคาริผู้นี้เจ้าค่ะ!"
51050-200 = "...ข้าอยากตะโกนไปว่าอย่างนั้น แต่น่าเสียดายที่ต่อให้ข้าอยากท้าดวลใน <ศึกชิงตำแหน่ง> ก็ทำเอง#nคนเดียวไม่ได้"
51050-201 = "[s] \"ศึกชิงตำแหน่งมีเงื่อนไขอะไรเหรอ?\""
51050-203 = "ศึกชิงตำแหน่งของเฮียกกะเรียวรันเป็นสิ่งที่คิดทำคนเดียวไม่ได้ค่ะ"
51050-204 = "เพราะถ้าเกิดว่า ไม่ว่าใครก็ประกาศ <ศึกชิงตำแหน่ง> ได้ ทุกคนก็คงวุ่นวาย อยากท้าดวลเพราะอยาก#nขึ้นเป็นหัวหน้ากัน~"
51050-205 = "ศึกชิงตำแหน่งของเฮียกกะเรียวรันจะเกิดขึ้นได้ก็ต่อเมื่อมีคนสองคนขึ้นไปค่ะ"
51050-206 = "เพื่อพิสูจน์ว่า <ศึกชิงตำแหน่ง> นั้นถูกจัดขึ้นภายใต้บรรทัดฐานที่ยุติธรรม จะต้องมี <ผู้สังเกตการณ์> ที่ไม่ใช่คนของเฮียกกะเรียวรัน 1 คน..."
51050-208 = "และ <สมาชิกระดับสูงของเฮียกกะเรียวรัน> 1 คนที่จะรับรองว่า <ศึกชิงตำแหน่ง> ครั้งนั้นได้ถูกจัด และตัดสินอย่างชอบธรรม"

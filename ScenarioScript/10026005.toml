[translation]
10026005-1 = "บทเริ่มต้น;ลักพาตัว"
10026005-4 = "...ฉันสนใจในตัวคุณมาตลอดตั้งนานแล้วค่ะ"
10026005-5 = "เพราะชื่อเสียงเรื่อง... หนังสือโบราณของคุณน่ะ..."
10026005-6 = "สถานการณ์ตอนนี้... ถือว่าน่าเศร้าใจมากเลยนะคะ"
10026005-7 = "ถ้าคุณไม่ทำเรื่องแบบนั้น... เราก็คงได้เจอกันในบรรยากาศที่สบายใจมากกว่านี้แล้วละค่ะ"
10026005-8 = "......"
10026005-13 = "......คุณอุย"

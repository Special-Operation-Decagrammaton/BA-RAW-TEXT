[translation]
10032005-1 = "序幕"
10032005-5 = "[i]Blue Archive presents[/i]"
10032005-10 = "[i]Problem Solver 68 Event[/i]"
10032005-17 = "Aru Rikuhachima"
10032005-18 = "Kayoko Onikata"
10032005-23 = "Mutsuki Asagi"
10032005-24 = "Haruka Igusa"
10032005-33 = "and……"
10032005-41 = "……這……這樣就行了嗎……？"
10032005-42 = "已經照您所說的……先讓他暈厥後再綁起來了……"
10032005-45 = "哎呀～遙香醬，真是毫不留情呢～！"
10032005-46 = "嘿，嘿嘿……謝謝……我居然能幫到大家，真不敢相信……"
10032005-47 = "不，不過這些被綁起來的人該怎麼辦呢……"
10032005-55 = "繼續放在這裡……沒問題嗎？#n一定會被發現吧？要不要藏到其他地方？"
10032005-56 = "不，不對！要是發出聲音會很麻煩！要不要埋到附近的工地裡？"
10032005-57 = "這，這樣果然還是有可能被發現……不如現在就開車把他們載到碼頭……！！"
10032005-63 = "呵呵呵……冷靜點，遙香。#n那不是我們的目的。"
10032005-64 = "打從一開始，處理這些傢伙就只是為了捕獲真正目標的事前準備而已。"
10032005-65 = "提前安靜地將目標的警衛處理掉～類似這樣嗎？"
10032005-66 = "我們必須先清除阻礙，因為目標很快就會抵達……"
10032005-67 = "……那可是真正的「大人物」。"
10032005-68 = "……沒錯，符合我們便利屋68名聲的目標終於出現了！"
10032005-69 = "咯呵呵。亞瑠醬，難得能接到大工作真開心呢！連聲音也充滿元氣！"
10032005-70 = "才，才沒有！還有，工作的時候應該稱呼我為社長才對，無月室長！"
10032005-71 = "而且也不是「難得」好嗎？#n是終於有人明白了我們便利屋68的真正價值……這是「真正的委託」。"
10032005-72 = "這，這次的目標……是幫派聯盟的首領「唐．阿蘭奇諾」對吧……？"
10032005-73 = "聽說他是一個非常壞的人……"
10032005-74 = "確實，跟平常那些找貓啊～或者跟蹤朋友之類的委託比起來，氛圍的確不一樣呢～？"
10032005-75 = "別，別再提那些過去的事了！"
10032005-76 = "這次一定要順利完成委託，向世人展示我們便利屋的冷硬派風格……！！"
10032005-81 = "……社長。"
10032005-82 = "嗯？佳世子，怎麼了？"
10032005-83 = "我不是說過在潛入時頻繁通信會被發現嗎？#n如果不是必要的事……"
10032005-84 = "啊啊……要這麼說的話，我認為這毫無疑問是必要的事。"
10032005-85 = "那就是現在……"
10032005-86 = "……老師也來到這間歌劇院了。"
10032005-93 = "沒關係嗎？這不在預定計畫內吧。"
10032005-94 = "是不是應該先暫時撤退，重新觀察情況比較好……？"
10032005-95 = "…………"
10032005-96 = "…………社長？"
10032005-97 = "…………哦……"
10032005-100 = "……你剛才說……誰來了？"

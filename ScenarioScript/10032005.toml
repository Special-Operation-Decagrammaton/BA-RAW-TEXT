[translation]
10032005-1 = "Prologue"
10032005-5 = "[i]Blue Archive presents[/i]"
10032005-10 = "[i]A Problem Solver 68 Event[/i]"
10032005-17 = "Rikuhachima Aru"
10032005-18 = "Onikata Kayoko"
10032005-23 = "Asagi Mutsuki"
10032005-24 = "Igusa Haruka"
10032005-33 = "and..."
10032005-41 = "...Is...this enough...? At least...this much...?"
10032005-42 = "I followed your orders exactly... They're unconscious...and incapacitated..."
10032005-45 = "Wow, wow! You're merciless, Haruka!"
10032005-46 = "R-Really...? Hee...heehee! I'm s-so happy I could be useful."
10032005-47 = "But, um, what should we do about...them?"
10032005-55 = "Shouldn't we...hide them somewhere? S-Someone might stumble upon them if we just leave them..."
10032005-56 = "Augh! Wait! They might make noise... Wh-What if we bury them in a nearby construction site?"
10032005-57 = "No...no... Workers could unearth them, and then...! W-We have to do it right...maybe dumping them in the pier...?"
10032005-63 = "Heh. Heh. You've done well, Haruka. Don't worry about those small fry."
10032005-64 = "They're mere stepping stones to our true objective."
10032005-65 = "We did our job, right? \"Handle the target's security detail\"!"
10032005-66 = "Yes. We needed to remove all obstacles before the target arrived."
10032005-67 = "...These guards are nothing compared to the big catch."
10032005-68 = "That's right. Prey worthy of Problem Solver 68's attention."
10032005-69 = "Heeheehee! Look at Aru getting all excited about finally being back on the field! She's got a whole new energy around her."
10032005-70 = "Th-That's not it! And call me boss while we're on the job, Chief of Staff Mutsuki!"
10032005-71 = "And it hasn't been that long since our last commission! It's simply the caliber of the job...a direct request from people who truly recognize Problem Solver 68's value."
10032005-72 = "Was it really D-Don Arancino? Th-That super scary leader of the Gang Alliance?"
10032005-73 = "I heard he's supposed to be a real bad guy..."
10032005-74 = "This is totally different from our usual jobs, huh? No chasing cats around or stalking random students..."
10032005-75 = "N-No need to bring up the past...! Those days are behind us!"
10032005-76 = "Once we successfully accomplish this mission, everyone will see just how hard-boiled Problem Solver 68 is!"
10032005-81 = "Boss?"
10032005-82 = "Huh? Kayoko? What's wrong?"
10032005-83 = "Didn't I tell you? When we're undercover, radio comms can expose us and jeopardize the mission. Unless it's absolutely necessary..."
10032005-84 = "This falls under the category of absolute necessity."
10032005-85 = "It looks like Sensei..."
10032005-86 = "...just arrived at this opera house."
10032005-93 = "This kinda throws a wrench in our plans."
10032005-94 = "Shouldn't we dip? We can try again next time."
10032005-95 = "..."
10032005-96 = "...Boss?"
10032005-97 = "...Ah."
10032005-100 = "Who...arrived?"

[translation]
10032005-1 = "บทเริ่มต้น"
10032005-5 = "[i]Blue Archive ขอนำเสนอ[/i]"
10032005-10 = "[i]กิจกรรมหน่วยรับจ้างสารพัด 68[/i]"
10032005-17 = "ริคุฮาชิมะ อารุ"
10032005-18 = "โอนิคาตะ คาโยโกะ"
10032005-23 = "อาซากิ มุสึกิ"
10032005-24 = "อิคุสะ ฮารุกะ"
10032005-33 = "และ..."
10032005-41 = "แบบนี้... ดะ... ได้รึยังคะ...?"
10032005-42 = "ฉันทำให้พวกนั้นสลบ... แล้วก็มัดเอาไว้... ตามที่บอกแล้วค่ะ..."
10032005-45 = "โอ้โห~ ฮารุกะจัง โหดไม่เบาเลยนะ~!"
10032005-46 = "แหะ... แหะๆ... ขอบคุณค่ะ... ไม่อยากเชื่อเลยนะคะว่าฉันจะเป็นประโยชน์ด้วย..."
10032005-47 = "วะ... ว่าแต่ จากนี้เราจะทำยังไงกับคนที่ถูกมัดไว้แบบนี้ล่ะคะ..."
10032005-55 = "ถ้าทิ้งไว้อย่างนี้เลย... ก็น่าจะถูกจับได้ใช่ไหมคะ? เอาตัวไปซ่อนไว้ที่อื่นดีไหมคะ?"
10032005-56 = "มะ... ไม่ได้สิ! ถ้าเสียงดังขึ้นมาคงจะเป็นเรื่องแน่! งั้นเอาไปฝังไว้แถวๆ ไซต์ก่อสร้างดีไหมคะ?"
10032005-57 = "มะ... ไม่สิ แบบนั้นก็อาจจะโดนจับได้เหมือนกัน... งั้นต้องรีบขนใส่รถแล้วไปที่ท่าเรือ...!!"
10032005-63 = "ฮุฮุฮุ... ใจเย็นๆ ก่อนสิ ฮารุกะ เป้าหมายของเราไม่ใช่แบบนั้นหรอก"
10032005-64 = "เรื่องจัดการกับเจ้าพวกนี้เป็นเพียงการเตรียมการล่วงหน้าเพื่อเป้าหมายที่แท้จริงของเราต่างหาก"
10032005-65 = "ที่บอกว่าจะเริ่มจากจัดการบอดี้การ์ดของเป้าหมายที่หลบซ่อนอยู่อย่างเงียบๆ ก่อน ใช่มั้ยนะ?"
10032005-66 = "เราเก็บกวาดสิ่งกีดขวางไว้ล่วงหน้าแล้ว อีกไม่นานเป้าหมายของเราจะมาถึงแล้วละ..."
10032005-67 = "จากนี้คงต้องรอ 'คนใหญ่คนโต' ตัวจริง..."
10032005-68 = "ใช่ เขาคือเป้าหมายของภารกิจครั้งนี้ที่เหมาะสมกับชื่อหน่วยรับจ้างสารพัด 68 ของเรา..."
10032005-69 = "หุหุหุ อารุจัง ดูตื่นเต้นจังเลยนะที่ได้รับงานใหญ่ที่ตั้งตารอมานาน! เสียงก็ฟังดูมีชีวิตชีวาด้วย!"
10032005-70 = "มะ... ไม่ใช่สักหน่อย! ตอนทำงานต้องเรียกฉันว่าประธานสิ หัวหน้ามุสึกิ!"
10032005-71 = "แล้วก็ ไม่ใช่งานที่ 'ตั้งตารอมานาน' สักหน่อย ต้องบอกว่าเป็น 'ภารกิจที่เหมาะสม' จากคนที่รู้คุณค่า#nที่แท้จริงของหน่วยรับจ้างสารพัด 68 ต่างหาก"
10032005-72 = "เป้าหมายครั้งนี้ของเรา... คือ <ดอน อารันซิโน> ที่เป็นหัวหน้าสหพันธ์อันธพาล... ใช่ไหมคะ?"
10032005-73 = "ได้ยินมาว่าเป็นคนร้ายกาจมากเลยด้วย..."
10032005-74 = "งานนี้คงต่างกับการตามหาแมวหรือสะกดรอยตามเพื่อนที่เราได้รับมาบ่อยๆ เลยเนอะ~?"
10032005-75 = "ละ... เลิกพูดแบบนั้นได้แล้ว!"
10032005-76 = "เราต้องทำงานนี้ให้สำเร็จ แล้วแสดงให้ทุกคนเห็นถึงความร้ายกาจของหน่วยรับจ้างสารพัด...!!"
10032005-81 = "ประธาน..."
10032005-82 = "หืม? มีอะไรเหรอ คาโยโกะ?"
10032005-83 = "ถ้าเราสื่อสารกันบ่อยระหว่างทำภารกิจ เราอาจโดนจับได้นะ ฉันบอกเรื่องนี้ไปแล้วไม่ใช่เหรอ? ถ้าไม่ใช่เรื่องที่จำเป็นละก็..."
10032005-84 = "อ่า เรื่องนี้น่ะเหรอ... ฉันคิดว่าเป็นเรื่องที่จำเป็นมากๆ น่ะ"
10032005-85 = "พอดีว่าตอนนี้ในโรงละครโอเปร่า..."
10032005-86 = "ครูก็อยู่ด้วยน่ะ..."
10032005-93 = "แบบนี้จะไม่เป็นไรเหรอ? เรื่องแบบนี้ไม่ได้อยู่ในแผนของเรานะ"
10032005-94 = "เราหลบไปก่อนไม่ดีกว่าเหรอ? แล้วเดี๋ยวค่อยมาดูสถานการณ์กันทีหลังเอา..."
10032005-95 = "......"
10032005-96 = "ประธาน...?"
10032005-97 = "อ่า..."
10032005-100 = "เมื่อกี้บอกว่า... ใครมานะ?"

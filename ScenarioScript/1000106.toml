[translation]
1000106-1 = "時尚的完成"
1000106-2 = "購物中心．仕女樓層"
1000106-8 = "好久沒來這種地方了。#n我平常除非衣服弄破，不然都不會買新衣服，所以沒什麼機會來這裡。"
1000106-9 = "我看看……最近的前扣胸罩也多了很多顏色呢。#n以前種類比較單調，選起來比較簡單。"
1000106-10 = "前扣胸罩的鉤帶在前面，穿脫都很方便。#n把手伸到背後解開鉤子這件事其實還挺麻煩、困難的。"
1000106-13 = "老師，你的臉色看起來不太好……你哪裡不舒服嗎？"
1000106-14 = "[s] 「為什麼把我叫來這裡……？」"
1000106-15 = "嗯？我剛才不是傳訊息告訴過你了嗎？我希望你能幫我看看怎樣的衣服比較適合我。"
1000106-16 = "還是老師有什麼急事嗎？"
1000106-17 = "你說內衣不算是衣服……？ #n說什麼呢，老師。內衣無庸置疑，也是衣服的一種唷。"
1000106-18 = "穿上不合身的內衣不但會破壞肢體平衡，而且也很容易在作戰過程中感到疲憊。因此就效率而言，穿上合適的內衣是非常重要的。"
1000106-19 = "[s] 「這樣，單純找個穿起來舒適的內衣不就行了嗎……？」"
1000106-20 = "話雖如此，但我聽朋友說，要是內衣不夠可愛，會沒辦法應付必要的時刻……"
1000106-23 = "我不太清楚哪件才是可愛的內衣，所以我希望老師能幫我挑。"
1000106-26 = "― 老師，這件怎麼樣？適合我嗎？[wa:4740] "
1000106-29 = "― 內衣也是衣服的一種，給人看也沒關係吧。[wa:2980] "
1000106-32 = "― 這件內衣，對我來說有點小……沒有更大的尺寸嗎？[wa:5440] "
1000106-35 = "― 嗯……不行。果然還是換上去，直接給老師看吧。[wa:5520] "
1000106-38 = "― 嗯……？不能在這裡換？可是更衣室很窄很麻煩耶……[wa:4440] "
1000106-41 = "（之後，我努力阻止英美在賣場內脫掉內衣，並在最後買了幾件內衣）"
1000106-43 = "今天謝謝你，老師。多虧有你，我才能買到所有想買的東西。"
1000106-44 = "你說下次不要在店裡脫衣服了？"
1000106-45 = "我知道，老師今天也叮嚀好幾次了。"
1000106-46 = "雖然這麼做很沒有效率，不過畢竟這是和老師的約定……#n我會努力遵守的。"

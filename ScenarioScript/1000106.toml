[translation]
1000106-1 = "Total Fashion"
1000106-2 = "Shopping Mall, Boutique"
1000106-8 = "It's been a while since I've been to a boutique. I don't buy new clothes until mine wear out, so I don't shop for clothes often."
1000106-9 = "Let's see... Huh, front-hook bras come in a lot of colors these days. It used to be easy to choose."
1000106-10 = "Front-hook bras are a lot easier to wear and take off. Undoing the hook behind your back is a lot harder than it looks."
1000106-13 = "Sensei, you don't look well. Are you uncomfortable?"
1000106-14 = "[s] \"Why did you bring me here...?\""
1000106-15 = "Huh? I told you in my text. I wanted you to help me pick out some clothes."
1000106-16 = "I'm sorry. Do you have more important business to attend to?"
1000106-17 = "Does underwear not also constitute as clothing? I can't possibly understand your confusion, Sensei."
1000106-18 = "If you wear the wrong underwear, it can throw your whole balance off. Proper undergarments are extremely important for efficiency."
1000106-19 = "[s] \"Then why not pick whatever looks most comfortable?\""
1000106-20 = "Well, my friends tell me you have to wear cute underwear. You know, just in case..."
1000106-23 = "What does \"cute underwear\" look like, anyway? Can you pick some out for me?"
1000106-26 = "― Sensei, what about this one? Does this suit me?[wa:3420] "
1000106-29 = "― Underwear is just a type of clothing. I don't see why you can't show other people.[wa:460] "
1000106-32 = "― This underwear looks a bit small... I wonder if there's a bigger size.[wa:3560] "
1000106-35 = "― Ah... This won't do. I'm just going to try it on, and then we can see how it looks.[wa:3080] "
1000106-38 = "― Wait, I can't change here? Ugh... Fitting rooms are always so cramped...[wa:2520] "
1000106-41 = "I had to stop Eimi from taking off her underwear in the store. After that, we bought a few outfits."
1000106-43 = "Thanks for today, Sensei. I got everything I needed thanks to you."
1000106-44 = "So, just to be sure, I shouldn't take off my clothes in the store next time?"
1000106-45 = "I know, I know. You kept telling me not to."
1000106-46 = "It's not as efficient, but I'll take your word for it. I promise."

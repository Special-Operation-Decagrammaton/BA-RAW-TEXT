[translation]
1000106-1 = "#title;패션의 완성"
1000106-2 = "#place;쇼핑몰, 여성복 매장"
1000106-3 = "1;에이미;01\n#1;ar\n#1;h\n#wait;1000"
1000106-4 = "1;에이미;01\n#1;m2\n#1;h\n#wait;1000"
1000106-5 = "1;에이미;02\n#1;em;[반응]\n#1;h\n#wait;1500"
1000106-6 = "1;에이미;03\n#1;hophop\n#1;h\n#1;m4\n#1;em;[음표]\n#wait;1500"
1000106-7 = "1;에이미;03\n#1;em;[...]\n#1;h\n#wait;2500"
1000106-8 = "1;에이미;03;여성복 매장은 오랜만인걸. #n옷은 한 번 사면 떨어질 때까지 새로 구입하지 않다 보니 자주 올 기회가 없었어."
1000106-9 = "1;에이미;03;어디 보자…… 요새는 프론트 후크 브래지어도 색상이 다양하게 많이 나오네. #n예전에는 종류가 단조로워서 고르기 편했는데.\n#1;em;[음표]"
1000106-10 = "1;에이미;03;프론트 후크 브래지어는 후크가 앞쪽에 있어 입고 벗을 때 정말 편해. #n등 뒤로 팔을 돌려 후크를 푸는 건 생각보다 귀찮고 어렵거든."
1000106-11 = "1;에이미;03\n#1;h\n#wait;1000"
1000106-12 = "1;에이미;02\n#1;em;[반응]\n#wait;1500"
1000106-13 = "1;에이미;02;선생님, 표정이 안 좋아 보이는데…… 어디 불편한 곳이라도 있어?\n#1;m3"
1000106-14 = "[s] \"나는 왜 여기에 부른 거야……?\""
1000106-15 = "1;에이미;02;응? 아까 문자로 말했잖아. 잘 어울리는 옷이 있는지 봐주었으면 좋겠다고.\n#1;em;[?]"
1000106-16 = "#1;hide\n3;에이미;01;그게 아니라면 무슨 바쁜 일이라도 있는 거야?"
1000106-17 = "3;에이미;05;속옷은 옷이 아니라고……? #n무슨 소리야, 선생님. 속옷은 엄연한 옷의 일종이야.\n#3;em;[반응]"
1000106-18 = "3;에이미;05;몸에 잘 맞지 않는 속옷을 착용하면 몸의 전체적인 밸런스가 흐트러지는 데다가, 작전 중에도 쉽게 지치게 된다고. 좋은 속옷을 착용하는 건 효율적으로도 아주 중요해."
1000106-19 = "[s] \"그럼 평소처럼 몸에 편한 속옷을 착용하면 되잖아?\""
1000106-20 = "3;에이미;06;그게, 친구들의 말을 들어보니 귀여운 속옷을 입어야 만일의 사태에 대비할 수 있다고 하는데……"
1000106-21 = "3;에이미;06\n#3;d\n#wait;1000"
1000106-22 = "3;에이미;06\n#3;a\n#3;closeup\n#wait;1000"
1000106-23 = "3;에이미;06;나는 어떤 게 귀여운 속옷인지 잘 몰라. 그러니 선생님이 봐줬으면 좋겠어.\n#3;closeup\n#3;em;[///]"
1000106-24 = "#all;hide"
1000106-25 = "#wait;8500"
1000106-26 = "#st;[-1200,-530];serial;60;[wa:500]― 선생님, [wa:1000]이 옷은 어때? [wa:3000]잘 어울려?"
1000106-27 = "#wait;4500"
1000106-28 = "#clearST"
1000106-29 = "#st;[-1200,-530];serial;60;[wa:700]― 속옷도 옷의 일종이니 [wa:1800]남에게 보여주어도 상관없지 않을까."
1000106-30 = "#wait;6000"
1000106-31 = "#clearST"
1000106-32 = "#st;[-1200,-530];serial;60;― 이 속옷은 [wa:1000]나에게는 조금 작을 것 같은데…… [wa:3000]더 [wa:800]큰 사이즈는 없으려나."
1000106-33 = "#wait;6000"
1000106-34 = "#clearST"
1000106-35 = "#st;[-1200,-530];serial;60;― 음…… [wa:2000]안 되겠다. [wa:1800]역시 갈아입고 [wa:1200]직접 입은 모습을 보여줄 게."
1000106-36 = "#wait;5500"
1000106-37 = "#clearST"
1000106-38 = "#st;[-1200,-530];serial;60;― 응……? [wa:1300]여기서 갈아입으면 안 돼? [wa:2700]탈의실은 좁아서 귀찮은데……"
1000106-39 = "#wait;5500"
1000106-40 = "#all;hide\n#clearST"
1000106-41 = "#na;이후, 매장 내에서 속옷을 벗으려는 에이미를 말려가며 옷을 몇 벌 구입했다."
1000106-42 = "#all;hide"
1000106-43 = "3;에이미;03;오늘은 고마웠어, 선생님. 덕분에 계획한 옷을 모두 구입했어.\n#3;em;[반짝]\n#3;a"
1000106-44 = "3;에이미;02;다음부터는 매장에서 옷을 벗지 말라고?"
1000106-45 = "3;에이미;06;알고 있어. 선생님이 오늘 계속 주의를 주었으니까."
1000106-46 = "3;에이미;03;비록 비효율적이긴 하지만, 선생님과의 약속이니까…… #n꼭 지키도록 노력할게.\n#3;greeting\n#3;em;[하트]"

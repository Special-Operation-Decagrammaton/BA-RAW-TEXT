[translation]
10047080-1 = "ตอนที่ 8;การนัดพบอย่างลับๆ"
10047080-2 = "สรุปว่า... เราต้องวาดวงเวทตัดผ่านหอพักของฝ่ายดูแลหอพักสินะคะ"
10047080-3 = "ใช่... ความเสี่ยงสูงเลยละ"
10047080-4 = "ฮุฮุ ความลำบากที่เกิดขึ้นกะทันหันในที่ที่คาดไม่ถึง การเอาชนะสิ่งนั้นก็เป็นหน้าที่ของตัวละครหลัก#nเหมือนกันค่ะ"
10047080-5 = "การรู้ว่าตอนไหนควรยอมแพ้ก็เป็นหน้าที่ของตัวละครหลักนะ!"
10047080-6 = "อุฮุฮุ น่าเสียดายที่พจนานุกรมเวทมนตร์ของฉันไม่มีคำว่า <ยอมแพ้> นะคะ"
10047080-7 = "ถ้าเอาหอพักของฝ่ายดูแลหอพักมาไว้ลำดับสุดท้าย ก็ไม่น่ามีปัญหานะ..."
10047080-8 = "ถ้าถึงคราวอันตรายละก็... ฉันจะเป็นเหยื่อล่อให้เอง"
10047080-9 = "ถ้าอีกากับแมวมาช่วย... ยังไงก็น่าจะผ่านไปได้ละ"
10047080-11 = "รุ่นพี่คาโนเอะ...!"
10047080-15 = "มาสเตอร์ พวกฉันทำตามนี้กันได้มั้ยคะ?"
10047080-16 = "[s1] \"อื้อ ถ้ามันเชื่อมโยงกับความฝันของทุกคนละก็นะ\"\n[s2] \"เรื่องความฝันของนักเรียน ครูสนับสนุนอยู่แล้ว\""
10047080-19 = "คุณคือตัวละครสำคัญที่คอยปกป้องตัวละครหลัก และเป็นมาสคอตของทุกคนจริงๆ ด้วย"
10047080-20 = "ฉันมองคนไม่ผิดเลยนะคะ"
10047080-21 = "[s] \"แต่ห้ามวาดวงเวทด้วยของที่อันตรายนะ\""
10047080-22 = "อุฮุฮุ แน่นอนอยู่แล้วค่ะ! ฉันไม่ได้เป็นคนมุทะลุขนาดนั้นหรอกค่ะ!"
10047080-23 = "ถึงจะคิดว่ามันจะสมบูรณ์แบบถ้าเกิดระเบิดก็เถอะ..."
10047080-24 = "รุ่นพี่..."
10047080-25 = "อะฮะฮ่า! ล้อเล่นค่ะ ล้อเล่น! จริงๆ นะคะ!"
10047080-26 = "ฉันจะวางแผนโดยการใช้วัสดุปลอดภัยตามคำแนะนำของมาสเตอร์ค่ะ"
10047080-27 = "ปฏิบัติการฟื้นคืนวงเวทโบราณที่สลักไว้ในสถาบันศิลปะไวลด์ฮันต์ เพื่อสานฝันของพวกเราทุกคน!"
10047080-28 = "และชื่อปฏิบัติการนี้ก็คือ <คืนวัลเพอร์กิส> ค่ะ...!"
10047080-29 = "อึกก... สุดท้ายก็เป็นแบบนี้อีกจนได้สินะ..."
10047080-31 = "งั้นเราจะใช้วัสดุอะไรกันเหรอคะ? ถ้าจะวาดวงเวทขนาดใหญ่รอบโรงเรียน เราน่าจะต้องใช้วัสดุในการวาดเยอะเลยนะ..."
10047080-32 = "ถ้าเราหาวัสดุจากในโรงเรียน ฝ่ายดูแลหอพักอาจสงสัยขึ้นมาก็ได้ค่ะ"
10047080-33 = "เราก็เพิ่งจะก่อเรื่องกันไว้ไม่นาน ถ้าไปทำอะไรน่าสงสัยอีกละก็ เราต้องโดนรวบทันทีแน่ค่ะ..."
10047080-34 = "เรื่องนั้นไม่ต้องห่วงหรอก ก็เพราะว่าฉัน... รู้วิธีหาสินค้าอย่างปลอดภัย..."
10047080-35 = "[s] \"วิธีแบบไหนเหรอ?\""
10047080-36 = "บอกครูไม่ได้หรอก เป็นความลับ..."
10047080-37 = "เพราะว่า... มันดูน่าสนุกกว่ายังไงล่ะ ฮิฮิ"
10047080-38 = "แต่ก็ไม่ต้องกังวลหรอกนะ ไม่มีวัสดุอะไรที่เป็นอันตรายหรอก"
10047080-39 = "ถ้างั้น... ไว้เจอกันใหม่วันปฏิบัติการนะ ครู"
10047080-40 = "ในคืนพระจันทร์เต็มดวง"
10047080-41 = "คืนวัลเพอร์กิส"
10047080-42 = "ฮิฮิ... ฮิฮิฮิฮิ...!"
10047080-43 = "[ns] \"อะ... อื้อ ไว้เจอกันตอนนั้นนะ\""
10047080-45 = "(คุณครูตัดสินใจกลับไปยังชาเล่ต์ก่อน)"
10047080-48 = "(วันต่อมา)"
10047080-53 = "วันใหม่แล้วสินะ..."
10047080-54 = "ถ้างั้นก็... เริ่มการ <นัดพบอย่างลับๆ> กันเลยดีกว่า..."
10047080-55 = "นัดพบอย่างลับๆ เหรอคะ?"
10047080-56 = "ในเมื่อเธอเป็นหัวหน้าชมรมวิจัยรหัสยศาสตร์ งั้นก็ควรรู้เอาไว้ละนะ..."
10047080-57 = "ตามฉันมาสิ เอริจัง... ฉันจะแสดงโลกอีกใบให้เธอเห็นเอง..."
10047080-67 = "เรามาเจอใครบางคนที่นี่เหรอคะ?"
10047080-68 = "ชู่ว... ทางนั้นกำลังมาแล้ว"
10047080-75 = "หยุดนะ ถ้าขยับ ฉันยิงแน่..."
10047080-76 = "อ่า... คะ?!"
10047080-77 = "ถึงความเจ็บปวดจะผ่านไป..."
10047080-82 = "ตะ... แต่ความงดงามยังคงอยู่"
10047080-83 = "......"
10047080-84 = "ฉันพยายามค้นหาช่วงเวลาที่สำคัญที่สุดในชีวิต"
10047080-85 = "ทุกขณะของชีวิต... ก็คือช่วงเวลาที่สำคัญที่สุด..."
10047080-86 = "โอ้ว ช่างเป็นบทสนทนาที่มหัศจรรย์ใจจริงๆ ค่ะ!"
10047080-87 = "ฮู่ววว..."
10047080-88 = "ไม่คิดเลยว่าจะมาเจอคนที่รู้รหัสลับที่นี่ ทำไมต้องเป็นฉันด้วยนะ...?"
10047080-89 = "ฉันมีเรื่องด่วนที่อยากขอร้องน่ะ"
10047080-93 = "เข้าใจแล้วค่ะ งั้นเราไปหาที่เงียบๆ กันก่อน..."
10047080-96 = "ตรงนี้น่าจะไม่มีใครเดินผ่านไปผ่านมานะคะ..."
10047080-97 = "แล้วเรื่องที่อยากขอร้องฉัน... คือเรื่องอะไรเหรอคะ?"
10047080-98 = "ช่วยเอาของในลิสต์นี้ไป <หว่าน> ไว้ในจุดที่บอกให้หน่อย"
10047080-99 = "ขอภายใน... คืนก่อนพระจันทร์เต็มดวงที่จะมาถึง"
10047080-108 = "ต้องการของ... เยอะแยะขนาดนี้เลยเหรอ? จะเอาไปทำอะไรเหรอคะ?"
10047080-109 = "ฮิฮิ... เดี๋ยวก็รู้เองแหละ"
10047080-110 = "ไม่ได้จะเอาไปก่อเรื่องอันตรายใช่มั้ยคะ?"
10047080-111 = "ไม่มีทางหรอก"
10047080-112 = "วางใจพวกฉันได้เลย แล้วฉันจะจ่ายค่าจ้างให้ล่วงหน้าด้วย..."
10047080-117 = "ฮือออ... เข้าใจแล้วค่ะ แล้วฉันจะไปหามาให้ค่ะ"
10047080-118 = "งั้นก็... รบกวนด้วยนะ มิโยะจัง ฮิฮิ..."
10047080-119 = "อ๊ะ ชื่อว่าคุณมิโยะสินะคะ! ยินดีที่ได้รู้จักค่ะ! ฉันชื่อว่าชิราโอะ เอริ! เรียกฉันว่าเอริได้เลยค่ะ!"
10047080-120 = "อ่า... ค่ะ ยินดีที่ได้รู้จักค่ะ"
10047080-121 = "คุณมิโยะเป็นคนที่ทำการค้าแบบลับๆ ในโรงเรียนสินะคะ?"
10047080-122 = "ฉันไม่มีทางเลือกน่ะค่ะ..."
10047080-123 = "เฮ้อ... ขอรับงานนี้เป็นครั้งสุดท้ายก่อนวางมือละนะ"
10047080-124 = "ในเมื่อตอบรับงานแล้ว งั้นฉันขอตัวก่อน..."
10047080-129 = "ถึงจะพูดจาอะไรอย่างนั้น แต่เพื่อนคนนี้ก็วางใจได้เลยละ"
10047080-130 = "พวกสินค้าที่เอาเข้าโรงเรียนด้วยช่องทางปกติไม่ได้... มิโยะจังหามาได้หมดเลย"
10047080-131 = "ต้องใช้วิธีไหนถึงเล็ดลอดสายตาของฝ่ายดูแลหอพักได้เหรอคะ? ใช้การวาร์ป หรือไม่ก็ใช้เวทมนตร์ช่วยเหรอ?"
10047080-132 = "อาจจะเป็นอย่างนั้นก็ได้นะ..."
10047080-133 = "ฮิฮิ ในเมื่อเสร็จธุระของเราแล้วก็กลับกันเถอะ..."
10047080-135 = "(หลังจากนั้นไม่นาน...)"
10047080-140 = "เอาละ วัสดุเราก็หาไว้ล่วงหน้าแล้ว จากนี้ก็เหลือแค่ลงมือปฏิบัติจริงสินะคะ"
10047080-141 = "เราจะลงมือกัน... ในคืนพระจันทร์เต็มดวง จากนี้ก็เหลือเวลาอีกไม่นานแล้วละ..."
10047080-145 = "เรนะจังไม่อยากทำด้วยกันจริงๆ เหรอคะ?"
10047080-146 = "ถ้าไม่ติดอะไรฉันก็อยากทำด้วยอยู่หรอก... แต่ครั้งนี้มันอันตรายเกินไป"
10047080-147 = "ครั้งที่แล้วเราโชคดีที่ถูกปล่อยตัวออกมาอย่างปลอดภัย แต่ถ้าละเมิดกฎของโรงเรียนอีก เกรดของฉันจะพลอยได้รับผลกระทบไปด้วยน่ะสิ"
10047080-148 = "ทุกคนล้มเลิกภารกิจนี้กันไม่ได้เหรอ? ต่อให้ไม่ทำเรื่องนี้ ก็ยังมีเรื่องสนุกอื่นๆ ให้ทำอีกตั้งเยอะนี่?"
10047080-149 = "ฉันเข้าใจความรู้สึกของเรนะจังนะคะ แต่วงเวทโบราณของจริงที่พวกเราค้นพบ#nเป็นวงเวทที่จะทำให้ความปรารถนาเป็นจริงเชียวนะคะ!"
10047080-150 = "ถ้าอย่างนั้น การไปพิสูจน์ให้เห็นกับตาก็เป็นสิ่งที่คนที่ศึกษาเรื่องรหัสยศาสตร์ควรทำค่ะ!"
10047080-151 = "ถ้ามันเป็นแค่สิ่งที่ทำขึ้นมาเพื่อแก้เคล็ดเฉยๆ ล่ะ?"
10047080-152 = "ในคาบเรียนก็บอกว่าในอดีตก็มีศิลปะแนวนี้เยอะเลยไม่ใช่เหรอ?"
10047080-153 = "ถ้าเป็นอย่างนั้น... เวทมนตร์ก็ไม่เกิดหรอกนะ"
10047080-154 = "ทุกคนจะต้องเจอจุดจบในห้องสำนึกผิดอีกรอบแน่ๆ"
10047080-155 = "ถึงอย่างนั้น... ก็จะลงมือทำกันจริงๆ เหรอ?"
10047080-159 = "เรนะจัง... คิดว่านักปีนเขาไปปีนเขากันทำไมเหรอ?"
10047080-160 = "ก็เพราะ... ที่นั่นมีภูเขาให้ปีนยังไงล่ะ..."
10047080-161 = "กับฉันก็เหมือนกัน การที่ฉันศึกษาเรื่องรหัสยศาสตร์... ก็เพราะที่นั่นมีรหัสยศาสตร์ให้ศึกษายังไงล่ะ"
10047080-162 = "ฉันก็คิดว่านี่เป็นเรื่องอันตรายอย่างที่เรนะจังคิดนะคะ"
10047080-163 = "แต่ว่า... ต่อให้มันจะล้มเหลว แต่ฉันก็อยากลองดูค่ะ มันเป็นเวทมนตร์ที่ทำให้ความปรารถนาเป็นจริง#nเลยนี่คะ?"
10047080-164 = "นี่อาจเป็นใบเบิกทางให้ความฝันของทุกคนเป็นจริงก็ได้ค่ะ!"
10047080-165 = "ที่ศิลปะพัฒนามาถึงปัจจุบันได้ ก็ต้องเผชิญความท้าทายมามากมายไม่รู้จบ"
10047080-166 = "ฉันคิดว่าเรื่องนี้ก็เป็นความท้าทายอย่างหนึ่งเหมือนกันค่ะ"
10047080-167 = "แน่นอนว่าไม่ใช่ทุกความท้าทายที่จะลงเอยด้วยความสำเร็จ บางครั้งมันก็จบลงด้วยความล้มเหลวไม่เป็นท่า"
10047080-168 = "แต่เราก็ยังไม่ได้เริ่มทำกันเลยนี่คะ?"
10047080-169 = "เพราะงั้นฉันจะขึ้นไปบนเวทีโดยไม่ลังเลค่ะ เพราะฉันรู้ว่าเวทีที่เต็มไปด้วยความพยายามย่อมมี#nประกายให้เห็น"
10047080-170 = "อีกอย่าง ใครจะไปรู้ล่ะคะ? ความปรารถนาของเราอาจเป็นจริงขึ้นมาก็ได้"
10047080-175 = "เฮ้อ สุดท้ายก็เป็นแบบนี้กันหมดสินะ"
10047080-176 = "ถ้างั้นฉันก็ขอพูดบ้างละนะ"
10047080-177 = "ฉันน่ะไม่ได้เกลียดพวกรุ่นพี่หรอก... ถึงที่ผ่านมาเราต้องไปพัวพันกับเหตุการณ์มากมาย แต่พอเราได้อยู่ด้วยกัน ฉันว่ามันก็สนุกดี"
10047080-178 = "แต่ไม่ว่าจะคิดยังไง ครั้งนี้ฉันก็ไม่อยากร่วมหัวจมท้ายไปด้วย"
10047080-179 = "ก็ฉันไม่ได้เชื่อในรหัสยศาสตร์ตั้งแต่แรกนี่นา..."
10047080-183 = "เพราะงั้น... ครั้งนี้ฉันขอผ่านแล้วกัน"

[translation]
10047080-1 = "Episode 8;Meeting"
10047080-2 = "So... We have to go near the Prefectural Council dorm to draw the magic circle."
10047080-3 = "Yes... It's risky."
10047080-4 = "Heh, an unexpected trial. Every protagonist must overcome a few."
10047080-5 = "A protagonist knows when to call it quits!"
10047080-6 = "Nyuhuhu. I'm sorry. There's no entry for \"call it quits\" in my magic book."
10047080-7 = "I think we'll make it if we save the Prefectural building for last."
10047080-8 = "In the event it gets dangerous... I'll be the bait."
10047080-9 = "If the crows and cats help...we'll find a way."
10047080-11 = "Kanoe...!"
10047080-15 = "Master. Do you think we should go with it?"
10047080-16 = "[s1] \"Yes. If it helps fulfill all of your dreams.\"\n[s2] \"I'll help however I can.\""
10047080-19 = "As expected of the supporting character who stands by the protagonist, and an inspiration to all."
10047080-20 = "It seems I judged you right."
10047080-21 = "[s] \"Above all, do NOT draw with any dangerous paints.\""
10047080-22 = "Nyuhuhu, of course! I wouldn't be so reckless...twice."
10047080-23 = "Though, it would be amazing to set it off with a bang!"
10047080-24 = "Eri..."
10047080-25 = "Ahaha! I'm joking, joking! Honestly!"
10047080-26 = "Then as Master advised, we'll keep it safe and use safe and inert materials."
10047080-27 = "And so begins the plan to resurrect Wildhunt's ancient magic circle and make everyone's dreams come true!"
10047080-28 = "I call it Operation: Walpurgis Night!"
10047080-29 = "Ugh, here we go again..."
10047080-31 = "But what should we use to draw? We'll need a lot if we want to circle the entire campus..."
10047080-32 = "And if we use the school's supplies, the Prefectural Council might catch on."
10047080-33 = "After all, we were JUST in trouble. We can't be looking suspicious..."
10047080-34 = "Don't worry. I know a way...to procure something safely..."
10047080-35 = "[s] \"How?\""
10047080-36 = "Let's keep it a secret, Sensei."
10047080-37 = "Because...I think it's more fun this way. Heehee."
10047080-38 = "It won't be dangerous, I assure you... Do not worry."
10047080-39 = "Then... We will all meet again for the operation, Sensei."
10047080-40 = "On the night of the full moon..."
10047080-41 = "Walpurgis Night."
10047080-42 = "Heehee... Eheeheehee...!"
10047080-43 = "[ns] \"Y-Yes. I'll see you all then.\""
10047080-45 = "I went back to Schale."
10047080-48 = "The next day."
10047080-53 = "The sun was bright..."
10047080-54 = "Then... Let's conduct the meeting..."
10047080-55 = "Meeting?"
10047080-56 = "Since you're the president of the Occult Society, you should know..."
10047080-57 = "Come, Eri... I'll show you a new world..."
10047080-67 = "Are we waiting for someone?"
10047080-68 = "Shh... She's coming."
10047080-75 = "Stop. One move, and I'll shoot."
10047080-76 = "Uh... Huh?!"
10047080-77 = "The pain passes..."
10047080-82 = "B-But beauty remains."
10047080-83 = "..."
10047080-84 = "I'm trying to find decisive moments in life."
10047080-85 = "There is nothing in this world...without a decisive moment...."
10047080-86 = "Wow, this conversation is full of magical power!"
10047080-87 = "Huuu..."
10047080-88 = "I can't believe she used the secret passphrase. Why me...?"
10047080-89 = "I have an urgent request."
10047080-93 = "Very well. Let's go somewhere private..."
10047080-96 = "...We should be alone for a while."
10047080-97 = "So... What do you need?"
10047080-98 = "Please \"sow\" these \"seeds\" at the marked locations."
10047080-99 = "I need it by...the eve of the coming full moon."
10047080-108 = "This stuff...and THIS much? What's it for?"
10047080-109 = "Heehee... All shall be revealed."
10047080-110 = "It's not for anything dangerous, is it?"
10047080-111 = "Of course not."
10047080-112 = "Trust me. I'll pay the deposit in advance, like always..."
10047080-117 = "Huuu... All right. I'll get it done."
10047080-118 = "Then... I'll leave you to it, Miyo. Heehee..."
10047080-119 = "Ah! Your name is Miyo! Nice to meet you, Miyo! I'm Shirao Eri, but you can call me Eri!"
10047080-120 = "Ah... Yes. Nice to meet you."
10047080-121 = "So, Miyo. Do you do a lot of shady deals like this?"
10047080-122 = "Somehow..."
10047080-123 = "...*sigh* But I'll quit after this one. I mean it this time."
10047080-124 = "Well, I have my orders, so I'll be off..."
10047080-129 = "She acts reluctant, but you can trust her to follow through..."
10047080-130 = "Miyo brings so many things into Wildhunt...that can't make it through the normal channels."
10047080-131 = "How does she get past the Prefectural Council's checkpoints? Ah! Is it teleportation magic?"
10047080-132 = "Perhaps..."
10047080-133 = "Heehee, since we're done, let's head back and tell the others..."
10047080-135 = "A little while later..."
10047080-140 = "Now that the materials are secure, all that's left is the deed itself."
10047080-141 = "The date...is the night of the full moon. Only a few days away..."
10047080-145 = "Are you still reluctant, Rena?"
10047080-146 = "...I've been through a lot with you girls, but this is too dangerous."
10047080-147 = "We were lucky to get off easy last time. If we keep breaking rules, there will be consequences. Just think of my grades!"
10047080-148 = "Can't you all stop? There're other fun things we can do. It doesn't need to be so...dramatic."
10047080-149 = "I totally understand how you feel, but...a REAL ancient magic circle is right here! And it grants wishes!"
10047080-150 = "As an occult investigator, I have to see this through."
10047080-151 = "What if it's just a protection ward? A charm?"
10047080-152 = "I've seen similar designs used in ancient art, and it's just a decoration."
10047080-153 = "Imagine it. You'll go though all this trouble...and there will be no magic."
10047080-154 = "All the struggle, and, at BEST, you'll end up locked in the Meditation Room again."
10047080-155 = "You still think...that's worth it?"
10047080-159 = "Rena... Why do you think climbers climb the mountain...?"
10047080-160 = "It's because...the mountain is there..."
10047080-161 = "It's the same for me too. The reason I study the occult...is because the occult is there."
10047080-162 = "Rena, I get scared too, just like you. This IS dangerous."
10047080-163 = "Still...it's worth it even if we fail. This is for ACTUAL magic, after all."
10047080-164 = "And it could actually make everyone's dreams come true."
10047080-165 = "Art has only advanced through great risk and challenge."
10047080-166 = "I believe this risk is quite the same."
10047080-167 = "Of course, not all risks succeed. Some fail and become complete disasters."
10047080-168 = "But we still haven't tried."
10047080-169 = "That's why I get on the stage, again and again, without hesitation. Because I know that only through effort will I have a chance to make something great."
10047080-170 = "And who knows? Maybe our wishes will come true."
10047080-175 = "*sigh* Yeah, that's about what I thought you'd say."
10047080-176 = "Fine, then it's my turn."
10047080-177 = "...I don't hate you girls. Though we always get tangled up in trouble, it's fun to hang together."
10047080-178 = "But no matter how I think about it, this doesn't feel right."
10047080-179 = "...I don't even believe in this occult nonsense, you know?"
10047080-183 = "That's why...I'm sitting this one out."

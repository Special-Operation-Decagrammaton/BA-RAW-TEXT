[translation]
10047080-1 = "第8話;接觸"
10047080-2 = "也就是說……必須經過舍監隊的宿舍，才能畫出魔法陣啊。"
10047080-3 = "沒錯……風險相當高呢。"
10047080-4 = "呵呵，雖然是場突如其來的試煉……不過將其克服也是身為主角的使命吧。"
10047080-5 = "主角也該懂得適時放棄吧！"
10047080-6 = "妞呵呵。可惜我的魔導書裡沒有「放棄」這個詞。"
10047080-7 = "如果把舍監隊那邊留到最後的話，感覺應該有機會才對……"
10047080-8 = "要是碰到緊急狀況的話……就由我來當誘餌吧。"
10047080-9 = "有烏鴉和貓咪們幫忙……總會有辦法的。"
10047080-11 = "鹿江前輩……！"
10047080-15 = "御者，這樣進行可以嗎？"
10047080-16 = "[s1]「嗯。如果這與大家的夢想有關的話。」\n[s2]「我也會盡力幫忙。」"
10047080-19 = "您果然是守護在主角身旁的綠葉、大家的吉祥物……"
10047080-20 = "看來我的眼光是正確的呢。"
10047080-21 = "[s]「不過先說好，禁止用危險的材料畫魔法陣哦。」"
10047080-22 = "妞呵呵，當然沒問題！我也沒有那麼魯莽的！"
10047080-23 = "雖然如果引爆的話，感覺確實會更完美就是了……"
10047080-24 = "前輩……"
10047080-25 = "啊哈哈！開玩笑，開玩笑的啦！"
10047080-26 = "那就按照御者說的，用安全的材料來制定計畫吧。"
10047080-27 = "讓刻在狂獵的古代魔法陣復活，實現大家夢想的作戰！"
10047080-28 = "作戰名稱就叫做……「瓦爾普吉斯之夜」！"
10047080-29 = "唔唔，結果還是變成這樣了嗎……"
10047080-31 = "不過材料該怎麼辦呢？#n要在整個學院畫魔法陣的話，需要相當大量的材料……"
10047080-32 = "如果在校內取得，可能會被舍監隊盯上。"
10047080-33 = "畢竟才剛闖禍沒多久……#n要是又做可疑的事，肯定馬上就被逮到了……"
10047080-34 = "不用擔心。#n我知道能安全取得物品的方法……"
10047080-35 = "[s]「是什麼方法？」"
10047080-36 = "這點必須向老師保密……"
10047080-37 = "因為……這樣才會更有趣嘛。咿嘻。"
10047080-38 = "不會有危險材料的，放心吧。"
10047080-39 = "那麼……作戰當天再見囉，老師。"
10047080-40 = "在滿月升起的夜晚──"
10047080-41 = "瓦爾普吉斯之夜。"
10047080-42 = "咿嘻……咿嘻嘻嘻……！"
10047080-43 = "[ns]「嗯，嗯。作戰當天見。」"
10047080-45 = "（決定今天先回夏萊）"
10047080-48 = "（隔天）"
10047080-53 = "天亮了呢……"
10047080-54 = "那麼……開始「接觸」吧……"
10047080-55 = "接觸？"
10047080-56 = "身為神秘學研究會的會長，你也是時候該了解一下了……"
10047080-57 = "跟我來吧，繪梨醬……#n我來讓你見識新的世界……"
10047080-67 = "要在這裡跟誰碰面嗎？"
10047080-68 = "噓……來了。"
10047080-75 = "不准動。再動的話我就開槍了……"
10047080-76 = "……咦！？"
10047080-77 = "痛苦會過去……"
10047080-82 = "美，美麗會永存。"
10047080-83 = "……"
10047080-84 = "我想在生命中尋找決定性的瞬間。"
10047080-85 = "生命中的每一刻……都是決定性的瞬間……"
10047080-86 = "哦哦，是段充滿魔力的對話呢！"
10047080-87 = "呼……"
10047080-88 = "沒想到會在這裡遇見知道暗號的人……#n為什麼偏偏是我……？"
10047080-89 = "我有件急事想拜託你。"
10047080-93 = "我明白了。先找個安靜的地方吧……"
10047080-96 = "……這裡暫時不會有人來。"
10047080-97 = "所以……想拜託我的事是什麼呢？"
10047080-98 = "請把這張紙條上寫的東西，「播種」在指定的地方。"
10047080-99 = "希望完成的日期……是下次滿月升起之前。"
10047080-108 = "這些……要這麼多嗎？#n是用來做什麼的……？"
10047080-109 = "咿嘻……你很快就會知道了。"
10047080-110 = "不是用在危險的事情上吧？"
10047080-111 = "當然不是。"
10047080-112 = "相信我吧。#n報酬會先預付給你……"
10047080-117 = "呼……知道了，我會幫你準備。"
10047080-118 = "那麼……就拜託你囉，美代醬。#n咿嘻……"
10047080-119 = "啊，原來這位同學叫美代啊！#n很高興認識你！我是白尾繪梨！叫我繪梨就可以了！"
10047080-120 = "啊……嗯。很高興認識你。"
10047080-121 = "美代同學看起來是專門做祕密交易的人呢？"
10047080-122 = "算是誤打誤撞吧……"
10047080-123 = "唉……做完這筆之後真的該收手了。"
10047080-124 = "既然已經接受完委託，我就先告辭了……"
10047080-129 = "雖然嘴上這麼說，但他的實力很可靠……"
10047080-130 = "透過正常途徑根本帶不進學院裡的……各種稀奇古怪的物品，他都能弄到手。"
10047080-131 = "他是怎麼避開舍監隊的監視的呢？#n難道是用了空間移動的魔法？"
10047080-132 = "或許吧……"
10047080-133 = "咿嘻。總之事情已經辦完了，我們回去報告吧……"
10047080-135 = "（不久之後……）"
10047080-140 = "好，現在材料已經湊齊，剩下的就是實作了。"
10047080-141 = "執行的日子……是滿月升起的夜晚。#n距離現在已經不遠了……"
10047080-145 = "玲奈醬果然還是不太想參加嗎？"
10047080-146 = "……我也很想盡量配合，但這次真的太危險了。"
10047080-147 = "雖然上次順利平安脫身……#n不過要是一直違反校規的話，會影響到成績的。"
10047080-148 = "大家是不是該停手了？#n有趣的事情也不只有這些吧？"
10047080-149 = "玲奈醬的心情我也能理解，不過這次是真的發現了古代魔法陣……#n而且還是能實現願望的那種！"
10047080-150 = "既然如此，親自加以確認才是神秘學研究者應該有的態度吧！"
10047080-151 = "如果那只是單純用來辟邪的呢？"
10047080-152 = "課堂上不是說過，過去有很多那種風格的藝術作品嗎？"
10047080-153 = "那樣……根本不會發動什麼魔法。"
10047080-154 = "只會白忙一場，最後又被關進反省室而已。"
10047080-155 = "大家真的……打算做那種事嗎？"
10047080-159 = "玲奈醬覺得……登山者為什麼要爬山呢……？"
10047080-160 = "那是因為……山就在那裡……"
10047080-161 = "我也是一樣。#n之所以會研究神秘學……是因為神秘學就在那裡。"
10047080-162 = "玲奈醬說的沒錯……我也同意這次的事相當危險。"
10047080-163 = "不過……就算會失敗，我也想試試看。#n畢竟，這可是能實現願望的魔法啊！"
10047080-164 = "或許能找到實現大家夢想的方法也說不定！"
10047080-165 = "藝術之所以能發展到今天，正是因為持續不斷的挑戰。"
10047080-166 = "我認為這次的事，也能算是挑戰的其中一種。"
10047080-167 = "當然，並非每一次的挑戰都會成功。有時也會碰上徹底失敗的時候。"
10047080-168 = "但我們不是還沒有嘗試過嗎？"
10047080-169 = "所以我會毫不猶豫地登上舞台。#n因為我知道，努力過的舞台一定會綻放光芒。"
10047080-170 = "況且……誰知道結果究竟會如何呢？#n說不定我們的願望真的會實現唷？"
10047080-175 = "唉，大家果然都是這麼想的啊。"
10047080-176 = "那我也把話說清楚吧。"
10047080-177 = "……我不討厭前輩們。#n雖然至今為止被捲入了不少事件，但相處起來還算是挺有趣的。"
10047080-178 = "可是這次的事情，我無論怎麼想都提不起勁。"
10047080-179 = "……更別說我本來就不相信什麼神秘學了。"
10047080-183 = "所以……這次我就不參與了。"

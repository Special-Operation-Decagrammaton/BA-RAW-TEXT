[translation]
80000053-1 = "บอกว่าไม่ให้กินแบบนั้นไงเล่า!"
80000053-2 = "(หลังจากได้รับโทรศัพท์จากโคฮารุ คุณครูก็มารอที่หน้าประตูใหญ่ตามเวลานัด)"
80000053-7 = "(สังเกตเห็นโคฮารุในหมู่นักเรียนที่กรูกันออกมาจากโรงเรียน)"
80000053-11 = "มะ...มาสายนะ! คุณครู! มัวทำอะไรอยู่ถึงมาเอาป่านนี้น่ะ!"
80000053-12 = "[s1] \"หา...?\"\n[s2] \"เดี๋ยวก่อนสิ เธอก็เพิ่งเดินออกมาเองนะ\""
80000053-13 = "มะ...ไม่ใช่นะ ฉันพูดอะไรไปเนี่ย... ฉันไม่ได้ตั้งใจจะพูดแบบนี้สักหน่อย..."
80000053-14 = "อะ...เอาเป็นว่าฉันมาแล้ว...!"
80000053-15 = "ชะ...ช่างเหอะ ไม่ใช่เรื่องสำคัญสักหน่อย...!"
80000053-16 = "เอ้า รับไปสิ ฉันเตรียมมาให้คุณครูโดยเฉพาะเลยนะ!"
80000053-23 = "[ns3] \"ช็อกโกแลตนี่นา\"\n[ns4] \"ของขวัญวาเลนไทน์สินะ\""
80000053-24 = "ทะ...ทำไมทำท่าสบายๆ แบบนั้นล่ะ?! นี่ช็อกโกแลตวาเลนไทน์จากเด็กนักเรียนหญิงเลยนะ?!"
80000053-25 = "ทะ...ทำไมทำท่าสบายๆ แบบนั้นล่ะ?! นี่ช็อกโกแลตวาเลนไทน์จากเด็กนักเรียนหญิงเลยนะ?!"
80000053-26 = "ช่วยแสดงสีหน้าท่าทางให้เหมาะกับของที่ได้รับและสถานที่หน่อยสิ! ทำแบบนี้ฉันขายหน้านะ!"
80000053-30 = "หะ... หืม...!? ทำอะไรน่ะ คุณครู?"
80000053-31 = "จะเปิดตอนนี้เลยเหรอ จะกินตรงนี้เลย?"
80000053-32 = "ก็ไม่ใช่ว่ากินเลยไม่ได้หรอก..."
80000053-38 = "เอ่อ..."
80000053-39 = "[s5] \"โคฮารุ...?\"\n[s6] \"มีอะไรเหรอ ทำไมจู่ๆ หน้าเครียดแบบนั้นล่ะ\""
80000053-40 = "ปะ...เปล่านะ เอ่อ... คะ...คือ... ไม่รู้ว่าฉันคิดอะไรอยู่ตอนซื้อมา..."
80000053-41 = "ปะ...เปล่านะ เอ่อ... คะ...คือ... ไม่รู้ว่าฉันคิดอะไรอยู่ตอนซื้อมา..."
80000053-42 = "ลายของช็อกโกแลตนั่น... คือ... เอ่อ..."
80000053-43 = "[s] \"ลายเหรอ?\""
80000053-44 = "มะ...ไม่มีอะไรหรอก ไม่ต้องไปสนใจหรอก มันก็แค่ลายเท่านั้นแหละ...!"
80000053-48 = "..."
80000053-57 = "ทำอะไรน่ะ?! ทำไมถึงหยิบมากินแบบนั้นเล่า!! กินแบบธรรมดาๆ ไม่เป็นรึไง!"
80000053-58 = "[s] \"ทำไมเธอถึงเป็นแบบนั้นล่ะ...\""
80000053-59 = "ฮะ...เฮือก...!! เพิ่งพูดไปหยกๆ แล้วยังจะเลียมันแบบนั้นอีก...!"
80000053-60 = "คะ...คุณครูรู้อยู่แล้วใช่มั้ย?! คิดจะทำแบบนี้ตั้งแต่แรกแล้วใช่มั้ยเนี่ย!"
80000053-61 = "ถ้าคิดถึงฉันบ้างก็อย่าทำแบบนั้นสิ...! มันวุ่นวายนะ!"
80000053-62 = "ทะ...ทำไมถึงเป็นแบบนี้ล่ะ...!? ระ...หรือว่า! ฉันตื่นเต้นที่ได้เห็นอะไรแบบนี้งั้นเหรอ...?! ทั้งที่นักเรียนคนอื่นๆ ก็เห็นด้วยเนี่ยนะ...!?"
80000053-63 = "[s7] \"????\"\n[s8] \"อะไรนะ??\""
80000053-64 = "หายไปซะ เจ้าคนโรคจิต!"
80000053-65 = "หายไปซะ เจ้าคนโรคจิต!"
80000053-66 = "ลงโทษ! ต้องโดนลงโทษ!"
80000053-68 = "(สุดท้ายคุณครูก็ไม่รู้สาเหตุที่โคฮารุโกรธเป็นฟืนเป็นไฟ และกลับไปที่ชาเล่ต์หลังจากกินช็อกโกแลต หมดแล้ว)"

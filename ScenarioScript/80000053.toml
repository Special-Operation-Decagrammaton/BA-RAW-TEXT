[translation]
80000053-1 = "不要那樣吃！"
80000053-2 = "（收到小春的聯絡之後，在放學時間來到正門等待）"
80000053-7 = "（在大量的學生中發現了走路方式莫名有點奇怪的小春）"
80000053-11 = "老，老師你遲到了！！"
80000053-12 = "[s1]「……咦？」\n[s2]「那個，小春不是才剛出來嗎……？」"
80000053-13 = "不，不對，不是這句話……那個，我本來想說的不是這句……"
80000053-14 = "因，因為我才剛下課……咦，咦？我在說什麼……？"
80000053-15 = "總，總之！重點不是那個……！"
80000053-16 = "來，來！！這個給你！什麼都別說，快收下！"
80000053-23 = "[ns3]「啊，是巧克力。」\n[ns4]「我可以當成情人節禮物嗎？」"
80000053-24 = "是，是沒錯啦……為什麼這麼淡定啊！？#n這可是情人節的巧克力唷！？而且還是學生送的，很特別的那種！！"
80000053-25 = "是，是沒錯啦……為什麼這麼淡定啊！？#n這可是情人節的巧克力唷！？而且還是學生送的，很特別的那種！！"
80000053-26 = "反，反應應該要大一點吧！？不然不是會顯得我很奇怪嗎！？"
80000053-30 = "……呃，老師？"
80000053-31 = "為，為什麼要打開……咦，現在就要吃嗎？"
80000053-32 = "也，也不是不行啦……"
80000053-38 = "……啊！？"
80000053-39 = "[s5]「……小春？」\n[s6]「怎麼了？」"
80000053-40 = "沒事，那個……買的時候沒有注意到……"
80000053-41 = "沒事，那個……買的時候沒有注意到……"
80000053-42 = "那，那個包裝和，巧克力的圖案之類的，那個……"
80000053-43 = "[s]「……圖案？」"
80000053-44 = "沒，沒什麼！別在意！只是普通的包裝！就是這樣而已，沒有特別的意思！"
80000053-48 = "……"
80000053-57 = "為，為什麼要用那種奇怪的吃法！？正常點吃啊！還有盒子要好好保存！"
80000053-58 = "[s]「我覺得很普通啊……？」"
80000053-59 = "呀啊啊──！？為，為什麼要用那種像是在舔什麼的吃法……！"
80000053-60 = "果然是故意的吧，是明知故犯吧！？居然在這種公共場合……！"
80000053-61 = "為了羞辱我，把我弄得亂七八糟……！"
80000053-62 = "難，難道連這個狀況都是計畫好的！？#n很享受被我看著的感覺，還想被其他學生看見……！？"
80000053-63 = "[s7]「？？？」\n[s8]「小春……？」"
80000053-64 = "太差勁了！變態！！！"
80000053-65 = "太差勁了！變態！！！"
80000053-66 = "笨蛋！糟糕透頂！！死刑死刑！！"
80000053-68 = "（直到最後都不知道小春為什麼生氣，只好在現場感激地品嘗小春給的巧克力）"

[translation]
11234060-1 = "ทีมเวิร์ก;โปรแกรมที่ดีที่สุด 2"
11234060-6 = "อีกครั้งหนึ่ง...!"
11234060-12 = "อีกครั้งหนึ่ง...!"
11234060-13 = "นี่เราทำอะไรกันอยู่เนี่ย"
11234060-14 = "ตอนแรกเธอก็เห็นด้วยไม่ใช่รึไง..."
11234060-15 = "ก็... เอ่อ... ก็ตอนนั้นมันมีไฟจะทำนี่..."
11234060-23 = "อีกครั้งหนึ่ง...!!"
11234060-24 = "เฮ้อ ทำไมต้องตั้งใจถึงเบอร์นี้ด้วย..."
11234060-25 = "ฉันว่าครั้งนี้เราน่าจะผ่านแล้วนะ...!"
11234060-26 = "ไอริ...!?"
11234060-27 = "ถ้ามีเวลาพูดเรื่องเหลวไหล ก็ตั้งใจให้มากกว่านี้เถอะ!"
11234060-28 = "ระ... รู้แล้วน่า...!"
11234060-29 = "ครั้งสุดท้าย...!!"
11234060-32 = "...?"
11234060-33 = "หืม...?"
11234060-34 = "......"
11234060-35 = "ได้แล้ว"
11234060-37 = "ได้แล้ว...! สำเร็จแล้ว!!"
11234060-38 = "จะ... จริงด้วย! เราทำได้จริงๆ!! เยี่ยมเลย!!"
11234060-39 = "ทำได้แล้ว เราทำสำเร็จแล้ว! พวกเราทำได้แล้ว นัตสึจัง! โยชิมิจัง! คาซึสะจัง!!"
11234060-40 = "อ่า... นั่นสิ..."
11234060-41 = "แล้ว..."
11234060-43 = "แล้วมันยังไงกันเนี่ย..."

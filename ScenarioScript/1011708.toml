[translation]
1011708-1 = "Girl on Fire"
1011708-2 = "（收到讓人不安的MomoTalk後，過了一段時間）"
1011708-6 = "光登場～"
1011708-7 = "[s1]「嗨，光。」\n[s2]「你手上拿的是……？」"
1011708-10 = "是光的新挑戰。"
1011708-11 = "為了突破極限準備的東西～"
1011708-12 = "就是這個～"
1011708-13 = "[s3]「這是……」\n[s4]「超辣咖哩？」"
1011708-16 = "嗯～是究極辣味咖哩～"
1011708-17 = "之後光要戒掉甜食，享受辣味～"
1011708-18 = "保護牙齒，重生為New光～"
1011708-19 = "[s]「看起來就超辣的……」"
1011708-20 = "心靈的強大，就代表肉體的強大。"
1011708-21 = "所以光是無敵的～"
1011708-22 = "雖然沒有吃過，但光敢吃～"
1011708-23 = "[s]「真的嗎……」"
1011708-25 = "（光把擔心拋在腦後，完成了試吃準備）"
1011708-27 = "來～開動～"
1011708-33 = "輕輕鬆鬆～"
1011708-34 = "[s]「哦哦……」"
1011708-39 = "……"
1011708-40 = "嗚嗚……"
1011708-41 = "好辣～好痛哦～"
1011708-42 = "[s]「辣味本來就是幾秒後才會有感覺……」"
1011708-43 = "光受到了暴擊～"
1011708-44 = "嘴唇要燒起來了……好痛好痛……"
1011708-45 = "老師～救命……"
1011708-46 = "呼～哈～呼～哈～"
1011708-47 = "[s5]「感覺連呼吸都是辣的……！」\n[s6]「我去買點能解辣的東西，等我一下！」"
1011708-53 = "（連忙去幫光買了牛奶回來）"
1011708-57 = "呼～呼～"
1011708-58 = "呼～～～～"
1011708-59 = "[s]「好一點了嗎……？」"
1011708-60 = "嗚嗚……還是好痛～"
1011708-61 = "持續傷害，大概有100億……"
1011708-62 = "以後不吃辣了……"
1011708-63 = "心靈的強大根本沒用……"
1011708-64 = "光的肉體已經崩潰了～"
1011708-68 = "老師～有甜的東西嗎～？"
1011708-69 = "我的舌頭還是好辣……"
1011708-70 = "[s7]「為了以防萬一，我還買了冰淇淋回來……」\n[s8]「吃完要好好刷牙喔？」"
1011708-73 = "光跟你打勾勾～會好好刷牙～"
1011708-78 = "老師也一起吃吧～"
1011708-80 = "（吃完冰淇淋之後，光似乎因為疲累而躺在膝蓋上睡著了）"
1011708-81 = "（……）"
1011708-85 = "[ns]「動彈不得……」"
1011708-86 = "（就這樣讓他一直睡到工作時間結束為止）"

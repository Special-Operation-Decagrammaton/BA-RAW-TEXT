[translation]
1011708-1 = "Girl on Fire"
1011708-2 = "Some time after I received that somewhat-concerning MomoTalk message..."
1011708-6 = "Hikari draws near!"
1011708-7 = "[s1] \"Hey, Hikari.\"\n[s2] \"What's that on your hand...?\""
1011708-10 = "Hikari's new challenge."
1011708-11 = "Leveling up."
1011708-12 = "Look..."
1011708-13 = "[s3] \"This is...\"\n[s4] \"Super-spicy curry?!\""
1011708-16 = "Yes. Super-spicy curry."
1011708-17 = "No more sweets. SPICY now."
1011708-18 = "Whole new Hikari. Much better teeth."
1011708-19 = "[s] \"That does look REALLY spicy, though...\""
1011708-20 = "Mind over matter."
1011708-21 = "Mental strength is invincibility."
1011708-22 = "In theory. Pretty sure."
1011708-23 = "[s] \"I see...\""
1011708-25 = "Without a hint of fear, Hikari faced down the curry."
1011708-27 = "Here goes..."
1011708-33 = "Ha! No problem."
1011708-34 = "[s] \"Wow...\""
1011708-39 = "..."
1011708-40 = "...Boo..."
1011708-41 = "Hot. Painful."
1011708-42 = "[s] \"Spicy foods sometimes take a little while to kick in...\""
1011708-43 = "Critical damage..."
1011708-44 = "Lips...burning..."
1011708-45 = "Sensei...help..."
1011708-46 = "*huff* *puff* *pant* *pant*"
1011708-47 = "[s5] \"It's like you're breathing fire!\"\n[s6] \"I'll go get something to help you. Hang on!\""
1011708-53 = "I ran off, bought milk, ran back, and handed it to her."
1011708-57 = "*gasp* *gasp*"
1011708-58 = "*wheeeeze*"
1011708-59 = "[s] \"You feeling better...?\""
1011708-60 = "Boo... Still hurts..."
1011708-61 = "Damage over time...about 10 billion..."
1011708-62 = "No more spicy food..."
1011708-63 = "\"Mental strength\" did nothing."
1011708-64 = "Hikari still went down without a fight."
1011708-68 = "...Hey, Sensei, got any sweets?"
1011708-69 = "Nothing hot. Tongue's still burning."
1011708-70 = "[s7] \"I also bought ice cream, just in case...\"\n[s8] \"Brush your teeth after this, okay?\""
1011708-73 = "Promise. Brushy-brushy."
1011708-78 = "You have some too, Sensei."
1011708-80 = "She spent the last of her strength eating the ice cream. Then she climbed into my lap and fell asleep."
1011708-81 = "..."
1011708-85 = "[ns] \"(I can't move...)\""
1011708-86 = "(I ended up letting her sleep until my shift was over.)"

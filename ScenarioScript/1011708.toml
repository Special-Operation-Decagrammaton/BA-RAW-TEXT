[translation]
1011708-1 = "Girl on Fire"
1011708-2 = "(ผ่านไปสักพักหลังจากคุณครูได้รับ MOMOTALK ที่ทำให้ไม่สบายใจ)"
1011708-6 = "ฮิคาริมาแล้ว"
1011708-7 = "[s1] \"สวัสดี ฮิคาริ เอาอะไรมาน่ะ?\"\n[s2] \"ว่าไง ฮิคาริ เอาอะไรติดมือมาน่ะ?\""
1011708-10 = "การท้าทายครั้งใหม่ของฮิคาริ"
1011708-11 = "ของที่เตรียมมาเพื่อก้าวข้ามขีดจำกัด"
1011708-12 = "ก็คืออันนี้ไง"
1011708-13 = "[s3] \"นี่มัน... แกงกะหรี่รสเผ็ดจัด?\"\n[s4] \"แกงกะหรี่รสเผ็ดจัดนี่นา??\""
1011708-16 = "อื้อ เผ็ดสุดๆ เลยละ"
1011708-17 = "ตั้งแต่วันนี้ ฮิคาริจะเปิดใจให้รสเผ็ดแทนรสหวาน"
1011708-18 = "เพื่อปกป้องฟัน และเพื่อเป็นฮิคาริคนใหม่"
1011708-19 = "[s] \"แต่นั่นมันน่าจะเผ็ดมากเลยนะ...\""
1011708-20 = "ความเข้มแข็งของจิตใจคือความแข็งแกร่งของร่างกาย"
1011708-21 = "ฮิคาริอยู่ยงคงกระพันอยู่แล้ว"
1011708-22 = "ถึงจะไม่เคยกินมาก่อน แต่ก็กินได้น่า"
1011708-23 = "[s] \"จริงนะ...\""
1011708-25 = "(แล้วฮิคาริก็พร้อมชิมอาหาร ส่วนคุณครูก็ทิ้งความกังวลไปก่อน)"
1011708-27 = "เอาละ ถ้างั้น..."
1011708-33 = "ก็กินแบบชิลๆ"
1011708-34 = "[s] \"โอ้วว...\""
1011708-39 = "..."
1011708-40 = "โอย..."
1011708-41 = "เผ็ด เผ็ดจนใจเจ็บเลย"
1011708-42 = "[s] \"ปกติรสเผ็ดมันจะมาช้าหน่อยน่ะ...\""
1011708-43 = "ฮิคาริ โดน คริติคอล ดาเมจ"
1011708-44 = "ปากร้อนผ่าวไปหมดเลย... แสบปากง่า..."
1011708-45 = "คุณครู ช่วยด้วย..."
1011708-46 = "ฮู่... ฮู่... ฮ่า... ฮ่า..."
1011708-47 = "[s5] \"ขนาดลมหายใจยังเผ็ดร้อนเลย...!\"\n[s6] \"รอก่อนนะ ครูจะไปซื้อของมาช่วยเอง!\""
1011708-53 = "(คุณครูรีบยื่นนมที่ซื้อมาให้ฮิคาริ)"
1011708-57 = "ฮู่ว... ฮู่ว..."
1011708-58 = "ฮู่ววววว..."
1011708-59 = "[ns] \"รู้สึกดีขึ้นบ้างมั้ย?\""
1011708-60 = "โอย... ยังแสบอยู่เลย..."
1011708-61 = "ความเสียหายต่อเนื่อง ราวๆ 10 พันล้าน..."
1011708-62 = "จะไม่กินของเผ็ดอีกแล้ว..."
1011708-63 = "จิตใจแข็งแกร่งไปก็ไม่มีประโยชน์..."
1011708-64 = "ร่างกายของฮิคาริอ่อนแอไม่ไหวแล้ว"
1011708-68 = "คุณครู มีอะไรหวานๆ บ้างมั้ย?"
1011708-69 = "ลิ้นฮิคาริยังเผ็ดอยู่เลย..."
1011708-70 = "[s7] \"ที่จริงก็มีไอศกรีมด้วย แต่กินแล้วต้องแปรงฟันนะ...\"\n[s8] \"มีไอศกรีมด้วย แต่กินแล้วต้องแปรงฟันให้สะอาดนะ...\""
1011708-73 = "ฮิคาริสัญญา จะตั้งใจแปรงฟันเลย"
1011708-78 = "คุณครูก็กินด้วยกันสิ"
1011708-80 = "(ฮิคาริกินไอศกรีมหมดและคงหมดแรง จึงมาผล็อยหลับอยู่บนตักของคุณครู)"
1011708-81 = "(...)"
1011708-85 = "[ns] \"ขยับไม่ได้เลย...\""
1011708-86 = "(สุดท้ายคุณครูก็ปล่อยให้ฮิคารินอนจนกว่าจะเลิกงาน)"

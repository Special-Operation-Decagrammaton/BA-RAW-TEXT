32090-45 = "3;나기사;01\n#3;a\n#3;closeup\n#wait;1500"
32090-46 = "3;나기사;10;저도 제 나름대로 힘을 낼 테니까요.\n#3;closeup"
32090-47 = "[ns] 돌아간다."

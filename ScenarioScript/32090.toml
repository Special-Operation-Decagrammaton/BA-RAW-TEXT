[translation]
32090-1 = "Episode 9;A Shadowy Reach"
32090-3 = "[ns] \"I don't want to waste my time suspecting others.\""
32090-4 = "...?"
32090-5 = "[s] \"All I want is for the Make-Up Work Club to pass.\""
32090-6 = "..."
32090-7 = "Perhaps I should make clear why I chose each of those girls."
32090-8 = "Though I'm sure you've already been told some version of this...here's the truth."
32090-9 = "First, Koharu was selected to keep Hasumi in line."
32090-10 = "Hasumi hates Gehenna more than anyone. She's a ticking bomb, and no one knows what she might do."
32090-11 = "Hanako was an outstanding student that began tanking her grades for unknown reasons. Suspicious."
32090-12 = "Azusa is shady in her own right. She has a growing rap sheet full of armed conflict with other students."
32090-13 = "As for Hifumi..."
32090-14 = "[s] \"I was under the impression you thought highly of her.\""
32090-15 = "You're right—I did. Compassion like hers is rare."
32090-16 = "I've always been very fond of Hifumi, that much is true..."
32090-17 = "...but we have intelligence that suggests she could be the leader of a terrifying criminal organization."
32090-18 = "[s] \"...\""
32090-19 = "That's what I fear most: being blinded by trusting someone too dearly. It's a fatal flaw."
32090-20 = "Even the most meticulously built tower can collapse from a single fault."
32090-21 = "How well do I truly know Hifumi? Is there another side to her I've never seen? I don't know the answer..."
32090-22 = "[s] \"But you DO know her! There's just been a terrible misunderstanding!\""
32090-23 = "And you know that how? Are you willing to vouch for her?"
32090-24 = "Can you prove Hifumi's innocence? That she's always been sincere?"
32090-25 = "Your claims mean nothing without concrete proof."
32090-26 = "It's impossible to prove the sincerity of another's heart."
32090-27 = "I know full well how compassionate, polite, and kind Hifumi can be...but I'll never be able to prod around and know what's truly in her heart."
32090-28 = "In the end, we're all strangers."
32090-29 = "[s] \"...\""
32090-30 = "That's why they each must be expelled for the sake of the Eden Treaty."
32090-31 = "[s] \"I finally get it. It makes perfect sense now.\""
32090-32 = "...?"
32090-33 = "[s] \"You're nothing but a cynical skeptic.\""
32090-34 = "Me? Cynical?"
32090-35 = "[s] \"You only see what you want to see and believe what you want to believe.\""
32090-36 = "..."
32090-37 = "[s1] \"Your conspiracies end here.\"\n[s2] \"The Make-Up Work Club WILL pass.\""
32090-38 = "Haha. Very well."
32090-39 = "Haha. Very well."
32090-40 = "This simplifies things."
32090-41 = "The best of luck to you, Sensei."
32090-46 = "I'll just have to take matters into my own hands."
32090-47 = "[ns] Turn and leave."
32090-51 = "Next Episode;The Second Exam Part 1"

[translation]
32090-1 = "ตอนที่ 9;การมาถึงของเงามืด"
32090-3 = "[ns] \"ครูไม่อยากเสียเวลาไปกับการสงสัยในตัวคนอื่นหรอกนะ\""
32090-4 = "...?"
32090-5 = "[s] \"ครูเป็นผู้รับผิดชอบชมรม และสิ่งที่ทำก็แค่ช่วยไม่ให้เด็กพวกนั้นสอบตก\""
32090-6 = "…"
32090-7 = "สงสัยจะต้องอธิบายแล้วล่ะค่ะว่าทำไมต้องเป็นเด็กพวกนั้น"
32090-8 = "คุณครูเองก็น่าจะได้ข้อมูลมาเองบ้างแล้ว... แต่ความจริงเป็นแบบนี้ค่ะ"
32090-9 = "ก่อนอื่น ฉันเลือกคุณโคฮารุเพื่อควบคุมคุณฮาสุมิค่ะ"
32090-10 = "คุณฮาสุมิเกลียดชังเกเฮนน่ามากกว่าใคร เธอไม่ต่างจากระเบิดเวลาที่ไม่มีใครรู้เลยค่ะ#nว่าจะระเบิดออกมาเมื่อไหร่"
32090-11 = "ส่วนคุณฮานาโกะก็เป็นนักเรียนที่มีทักษะเป็นเลิศ แต่ฉันก็ไม่เข้าใจเลย#nว่าทำไมถึงตั้งใจทำข้อสอบให้คะแนนออกมาพังไม่เป็นท่า"
32090-12 = "ส่วนคุณอาซึสะ ตัวเธอน่าสงสัยอยู่แล้ว และยังเคยรังแกนักเรียนคนอื่นอยู่หลายครั้ง#nทำตัวแบบนี้จะไม่ให้ควบคุมก็คงไม่ได้หรอกค่ะ!"
32090-13 = "ต่อไปก็คุณฮิฟุมิ..."
32090-14 = "[s] \"นางิสะไม่ได้ชอบฮิฟุมิหรอกเหรอ?\""
32090-15 = "ค่ะ... ใช่... ค่ะ ความรักที่คุณฮิฟุมิมี... มันสวยงามมากเลยล่ะค่ะ"
32090-16 = "คุณฮิฟุมิคือนักเรียนที่ฉันชอบมากค่ะ... ไม่ผิดหรอกค่ะ..."
32090-17 = "แต่ถึงอย่างนั้นก็เถอะ... มีแหล่งข่าวบอกมาค่ะว่าตัวตนที่แท้จริงของเด็กคนนั้น#nคือผู้นำกลุ่มอาชญากรที่น่าหวาดกลัว"
32090-18 = "[s] \"......\""
32090-19 = "เรื่องแบบนั้นมันน่ากลัวที่สุดเลยค่ะ จุดบอดที่มองไม่เห็นเพราะเชื่อใจคือจุดอ่อนที่ร้ายแรงที่สุด..."
32090-20 = "หอคอยที่สร้างขึ้นอย่างพิถีพิถันยังพังทลายลงได้ด้วยรอยแตกรอยเดียว..."
32090-21 = "ฉันไม่อาจรู้ได้หรอกค่ะว่าฉันรู้จักคุณฮิฟุมิดีแล้วหรือยัง หรือว่าจะมีความจริงอย่างอื่นที่ฉันไม่รู้..."
32090-22 = "[s] \"นั่นมันเรื่องเข้าใจผิด! ครูรับรองได้! มันแค่มีเหตุการณ์อะไรนิดหน่อย...\""
32090-23 = "จะรับรองให้เหรอคะ? ทำยังไงเหรอคะ?"
32090-24 = "คุณครูพิสูจน์ได้ไหมล่ะคะ? จะพิสูจน์หัวใจ ไม่สิ พิสูจน์ความจริงใจของคุณฮิฟุมิอย่างไรเหรอคะ?"
32090-25 = "ถึงจะมาร้องตะโกนว่าไม่ใช่คนอย่างที่คิด หรือว่าจะบอกว่ามีเหตุผลร้อยแปดพันเก้า...#nมันก็ไม่มีความหมายอะไรหรอกค่ะ"
32090-26 = "เพราะการทำแบบนั้นมันพิสูจน์หัวใจของคนไม่ได้ยังไงล่ะคะ"
32090-27 = "จิตใจที่อบอุ่น มารยาทที่เรียบร้อย นิสัยที่อ่อนโยน... ถึงเราจะได้รู้จักคุณฮิฟุมิในแง่มุมเหล่านี้ แต่เราก็ยืนยันจิตใจเบื้องลึกของเธอไม่ได้หรอกค่ะ"
32090-28 = "เพราะว่าท้ายที่สุดแล้ว เธอก็คือ <คนอื่น>..."
32090-29 = "[s] \"......\""
32090-30 = "เพราะอย่างนั้นเลยต้องไล่ออกทั้งหมดค่ะ และนี่ก็เพื่อการจัดการสนธิสัญญาให้ลุล่วงไปได้ด้วยดี"
32090-31 = "[s] \"อย่างนี้นี่เอง ตอนนี้ครูเข้าใจแล้วล่ะ\""
32090-32 = "......?"
32090-33 = "[s] \"เธอคือคนดื้อด้านที่ตัดสินใจอะไรผิดๆ ไปเองสินะ\""
32090-34 = "คะ...? คน... ดื้อด้าน...? งั้นเหรอคะ...?"
32090-35 = "[s] \"เพราะเธอดูแต่ในสิ่งที่อยากดู และเชื่อแต่ในสิ่งที่อยากเชื่อเท่านั้นไง\""
32090-36 = "......."
32090-37 = "[s1] \"ครูต้องทำลายแผนร้ายของเธอแล้วล่ะ\"\n[s2] \"ครูจะทำให้ทุกคนในชมรมชั้นเรียนเสริมสอบผ่านให้ได้!\""
32090-38 = "ฮุฮุ... อย่างนั้นเหรอคะ?"
32090-39 = "ฮุฮุ... นั่นสินะคะ"
32090-40 = "ฉันเข้าใจแล้วค่ะ ถ้าแบบนี้มันก็คงง่ายขึ้นนะคะ"
32090-41 = "ค่ะ... ฉันเข้าใจแล้วค่ะคุณครู ถ้าอย่างนั้นก็พยายามเข้านะคะ"
32090-46 = "เพราะฉันก็จะพยายามในส่วนของฉันเหมือนกันค่ะ"
32090-47 = "[ns] กลับไป"
32090-51 = "ตอนต่อไป;การสอบประเมินครั้งที่ 2 (1)"

[translation]
32090-1 = "第9話;黒い手"
32090-3 = "[ns] \"私は、誰かを疑うことに時間を費やすつもりは無いよ。\""
32090-4 = "……？"
32090-5 = "[s] \"あの子たちの頑張りが報われるように最善を尽くすだけ。\""
32090-6 = "……。"
32090-7 = "一度あらためて、説明してみましょうか？どうして彼女たちなのか。"
32090-8 = "先生の方にも色々と情報網があると思いますが……順番にお話ししましょう。"
32090-9 = "まずコハルさんは、ハスミさんを統制するための存在です。"
32090-10 = "ハスミさんは誰よりもゲヘナのことを憎んでいます。いつ何をしでかすか分からない、時限爆弾のような存在です。"
32090-11 = "そしてハナコさんは、本来誰よりも優秀な才能を持っていたにも関わらず、今はわざと試験で本気を出していません。何を企んでいるのか、全く理解できない状態です。"
32090-12 = "アズサさんは、そもそも存在自体が色々と怪しいところばかりです。それに、他の生徒たちと何度も暴力事件を起こしている、統制不能な存在ですし。"
32090-13 = "ヒフミさん、は……"
32090-14 = "[s] \"ナギサは、ヒフミのことを……\""
32090-15 = "……はい。そう、ですね。ヒフミさんへの思いは……かなり特別です。"
32090-16 = "私はヒフミさんのことを、とても大切に思っています。私は、彼女のことを好いている……そのことは、間違いありません。"
32090-17 = "ですが……あの子の正体が実は、恐ろしい犯罪集団のリーダーである、という情報がありました。"
32090-18 = "[s] \"………。\""
32090-19 = "こういったお話が、かえって一番怖いのです。信じていたからこそ、何かが見えなくなっている……盲目な状態になっているのでは、と。"
32090-20 = "どれだけ注意を払って築いた塔も、小さな亀裂から簡単に崩れてしまうもの……。"
32090-21 = "私はちゃんとヒフミさんのことを理解できているのか、それともやはり私が知らない真実があるのか……私には分からないのです。"
32090-22 = "[s] \"誤解だよ……ちゃんと事情があって、私もちゃんと説明――\""
32090-23 = "どうやって？"
32090-24 = "証明ができるのですか？ヒフミさんの心を、本心を、本音を、どうやって証明するというのですか？"
32090-25 = "そうではない、誤解だ、事情がある……その言葉に、どれだけの意味が？どれだけの真実性が？"
32090-26 = "……心の中身など、証明できるものではありません。"
32090-27 = "ヒフミさんの優しい心、礼儀正しいところ、優しいところ……それらを痛いほど知っていても、本音を知ることはできないのです。"
32090-28 = "当然です……どう足掻いたって私たちは、所詮「他人」ですから。"
32090-29 = "[s] \"………。\""
32090-30 = "ですから、退学させるしかないのです。エデン条約……その成功のために。"
32090-31 = "[s] \"……分かったかもしれない。\""
32090-32 = "……？"
32090-33 = "[s] \"ナギサ。今の君はきっと、疑心暗鬼の闇の中だ。\""
32090-34 = "……はい？疑心暗鬼の、闇……？"
32090-35 = "[s] \"見たいものだけを見て、信じたいことだけを信じてるんだと思う。\""
32090-36 = "……。"
32090-37 = "[s1] \"君を、そこから出してみせる。\"\n[s2] \"そして絶対に、補習授業部のみんなを合格させる。\""
32090-38 = "……ふふっ、そうですか。"
32090-39 = "……ふふっ、そうですか。"
32090-40 = "理解しました。まあつまりは、お話がシンプルになったということですね。"
32090-41 = "……承知しました。どうか頑張ってください、先生。"
32090-46 = "私は、私なりに頑張りますので。"
32090-47 = "[ns] 一度その場を去る。"
32090-51 = "次回;第2次特別学力試験（１）"

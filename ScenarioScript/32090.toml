[translation]
32090-1 = "第9話;黑手"
32090-3 = "[ns] 「我沒有打算花時間懷疑任何人唷。」"
32090-4 = "……？"
32090-5 = "[s] 「我只是盡力想讓那些孩子的努力都能獲得回報而已。」"
32090-6 = "……"
32090-7 = "我重新再向老師說明一次吧？為什麼會選上他們的理由。"
32090-8 = "雖然我想老師應該也有各種情報網才對……就照順序說吧。"
32090-9 = "首先是小春同學，他是為了控制蓮實同學的存在。"
32090-10 = "蓮實同學比誰都還憎恨著格黑娜。不知道會做出什麼事，簡直就像是定時炸彈一樣。"
32090-11 = "接著是花子同學。明明有著比任何人都優秀的才能……#n現在卻故意不認真考試，處於完全搞不懂他在想什麼的狀態。"
32090-12 = "而梓同學就連存在本身都有許多疑點。#n而且還多次和其他學生們發生了暴力事件，也是個無法控制的存在。"
32090-13 = "至於日步美同學……"
32090-14 = "[s] 「渚，你對日步美……」"
32090-15 = "……嗯。是呢，日步美同學的愛……相當特別。"
32090-16 = "我非常重視日步美同學。我很喜歡他……這點是無庸置疑的。"
32090-17 = "但是……有著那孩子的身分其實是可怕的犯罪集團的首領的情報。"
32090-18 = "[s] 「……」"
32090-19 = "這種事反而是最可怕的。#n正因為相信，才會導致無法看清現實……也就是盲目的狀態。"
32090-20 = "不論再怎麼細心搭建的高塔，都會因為一點點龜裂就輕易地倒下……"
32090-21 = "我真的有好好的了解日步美同學嗎，還是說果然存在著某些我不知道的真相呢……#n我無法做出判斷。"
32090-22 = "[s] 「那是誤會！我可以保證！只是因為一些複雜的原因才會──」"
32090-23 = "保證？您打算如何保證呢？"
32090-24 = "老師能夠證明嗎？日步美同學的真心和心裡的想法，您究竟要如何證明呢？"
32090-25 = "不是這樣、是你誤會了、是有原因的……#n這種話究竟有多少意義，真實性又有多少呢？"
32090-26 = "……人的內心是無法證明的。"
32090-27 = "日步美同學那份溫柔的心、那份禮貌、那份溫柔……#n就算我再怎麼清楚，也無法得知他的真心。"
32090-28 = "那是當然的……再怎麼說，我也只不過是「他人」而已。"
32090-29 = "[s] 「……」"
32090-30 = "所以只能讓他們退學了。為了伊甸園條約……為了成功。"
32090-31 = "[s] 「……我好像明白了。」"
32090-32 = "……？"
32090-33 = "[s] 「渚，現在你正處於疑神疑鬼的黑暗之中。」"
32090-34 = "……嗯？疑神疑鬼的，黑暗……？"
32090-35 = "[s] 「只看自己想看的、只相信自己想相信的。」"
32090-36 = "……"
32090-37 = "[s1] 「我會讓你離開那片黑暗的。」\n[s2] 「然後絕對會讓補課部的大家都及格的。」"
32090-38 = "……呵呵，這樣啊。"
32090-39 = "……呵呵，這樣啊。"
32090-40 = "我知道了。這樣的話事情就變得很單純了呢。"
32090-41 = "……我了解了。請好好加油吧，老師。"
32090-46 = "我也會用我的方式努力的。"
32090-47 = "[ns] 離開這裡"
32090-51 = "下一話;第2次特別學力測驗（１）"

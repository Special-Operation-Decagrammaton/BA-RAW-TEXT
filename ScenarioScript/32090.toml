[translation]
32090-1 = "#title;제9화;검은 손길"
32090-2 = "3;나기사;01\n#3;a\n#wait;1500"
32090-3 = "[ns] \"나는 누군가를 의심하는 것에 시간을 낭비하고 싶지 않아.\""
32090-4 = "3;나기사;10;……?\n#3;em;[?]"
32090-5 = "[s] \"보충수업부를 책임지는 입장이니 낙제를 막는 것에 최선을 다할 뿐이야.\""
32090-6 = "3;나기사;10;……."
32090-7 = "3;나기사;07;왜 그 아이들인지 설명을 하지 않으면 안 되겠네요."
32090-8 = "3;나기사;05;선생님도 나름의 채널로 수집한 정보가 있겠지만……. 진실은 그렇습니다.\n#3;em;[반응]"
32090-9 = "3;나기사;07;먼저 코하루 씨는 하스미 씨를 통제하기 위해 선택되었죠."
32090-10 = "3;나기사;99;하스미 씨는 누구보다 게헨나를 증오하고 있기에, 무슨 일을 벌일지 알 수 없는 시한 폭탄과도 같은 존재이고,\n#3;em;…"
32090-11 = "3;나기사;07;하나코 씨는 그 누구보다 우수한 수재였음에도 일부러 성적을 망치고 있는 이해할 수 없는 사람이고,"
32090-12 = "3;나기사;05;아즈사 씨는 존재 자체가 수상하고, 학생들을 몇 번이나 괴롭힌 적이 있는 통제가 안되는 무뢰배입니다!\n#3;em;[!]"
32090-13 = "3;나기사;07;히후미 씨는……."
32090-14 = "[s] \"나기사는 히후미를 좋게 생각하고 있었던 거 아니었어?\""
32090-15 = "3;나기사;04;……네. 맞아요. 그렇……죠. 히후미 씨가 가진 사랑은…… 정말 남다르죠.\n#3;em;…"
32090-16 = "3;나기사;99;히후미 씨는 제가 무척이나 좋아하는 학생입니다……. 그건 틀리지 않았어요……."
32090-17 = "3;나기사;05;하지만…… 그 아이의 정체가 사실 무시무시한 범죄집단의 리더라는 첩보가 있습니다."
32090-18 = "[s] \"……….\""
32090-19 = "3;나기사;07;그런 경우가 제일 무섭죠. 믿고 있었기에 보이지 않는 맹점이야말로 가장 치명적인 약점……."
32090-20 = "3;나기사;99;공들여 쌓은 탑도 균열 하나에 간단히 무너지는 법이기에……."
32090-21 = "3;나기사;04;제가 정말로 히후미 씨를 잘 알고 있는 것인지…… 아니면 제가 모르는 진실은 따로 있는 것인지…… 저는 알 수 없습니다……."
32090-22 = "[s] \"그건 오해야! 내가 보증할 수 있어! 이런 저런 사정이 있어서…….\""
32090-23 = "3;나기사;07;보증한다고요? 어떻게요?"
32090-24 = "3;나기사;05;증명할 수 있습니까? 히후미 씨의 마음을, 진심을 어떻게 증명한다는 거죠?\n#3;em;[반응]"
32090-25 = "3;나기사;07;그런 게 아니라고, 잘못 알고 있는 거라고, 이런저런 사정이 있다고 외쳐봤자…… 아무런 의미가 없습니다."
32090-26 = "3;나기사;99;사람의 마음은 증명할 수 없으니까요."
32090-27 = "3;나기사;01;히후미 씨의 따뜻한 심성, 예의바른 태도, 상냥한 성격…… 그 모든 것들을 지켜봐도 그 사람의 진짜 마음을 확인할 수는 없습니다."
32090-28 = "3;나기사;10;그야, 당연한 게…… <타인>이니까요."
32090-29 = "[s] \"……….\""
32090-30 = "3;나기사;99;그렇기에 모두 퇴학시킬 뿐입니다. 에덴조약의 성공적인 마무리를 위해서.\n#3;em;…"
32090-31 = "[s] \"……그렇군. 이제 알겠어.\""
32090-32 = "3;나기사;10;……?"
32090-33 = "[s] \"너는 구제불능인 의심암귀다.\""
32090-34 = "3;나기사;04;……네? 의심……암귀……? 라고요……?\n#3;em;[?]"
32090-35 = "[s] \"넌 보고 싶은 것만 보고, 믿고 싶은 것만 믿을 뿐이야.\""
32090-36 = "3;나기사;07;……."
32090-37 = "[s1] \"너의 음모는 내가 깨부수겠어.\"\n[s2] \"기필코 보충수업부를 전원 합격시키고야 말겠어!\""
32090-38 = "3;나기사;99;……. 후후. 그렇군요."
32090-39 = "3;나기사;99;……. 후후. 그렇군요."
32090-40 = "3;나기사;02;이해했습니다. 이렇게 되면 이야기는 심플해지죠."
32090-41 = "3;나기사;01;……네. 알겠습니다. 선생님. 그럼 부디 모쪼록 힘내주시길.\n#3;em;[반짝]"
32090-42 = "#st;[0,0];instant;1;"
32090-43 = "#clearST"

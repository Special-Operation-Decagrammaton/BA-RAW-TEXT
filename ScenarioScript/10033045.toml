[translation]
10033045-3 = "[ns] \"Have you come back to your senses, Megu?\""
10033045-4 = "Unfortunately, yes! The dolls seem to be losing their energy too."
10033045-5 = "Did our intensity dry up the vitality of the hot springs? "
10033045-6 = "Tactical retreat! For now, at least!"
10033045-11 = "Would you look at that? They've stopped moving entirely."
10033045-12 = "All Gehenna students accounted for! We're all good now, right?"
10033045-13 = "Even though the two of you are our guests, you've had to assist us so many times now."
10033045-14 = "Truly, I apologize. And I'm so grateful. "
10033045-15 = "Hahaha! I figured things would end up like this, one way or another!"
10033045-16 = "Were we overstepping?"
10033045-17 = "No, no! Not at all. In fact, I feel terribly indebted to you now."
10033045-18 = "Friends don't have to worry about that kind of stuff."
10033045-19 = "Friends... You say?"
10033045-20 = "We totally took selfies and exchanged numbers, didn't we? What else do you need to be friends?"
10033045-21 = "Like I said, boundaries aren't Kirara's strong point."
10033045-22 = "I'll apologize for her if she's making you uncomfortable."
10033045-23 = "It's the opposite actually! I'm quite honored...but just a little surprised."
10033045-24 = "A-Are we friends, then?"
10033045-25 = "Heck yes! Let's make lots of memories together on this trip! Handshake?"
10033045-26 = "O-Okay..."
10033045-28 = "Me too! I want to be included!"
10033045-32 = "The best friendships are forged under the hottest fires!"
10033045-33 = "Wake me up...when it's time for the next stop. Zzz..."
10033045-34 = "I've been trying to find the right words, but Tsubaki's really a marvel."
10033045-39 = "(We're...thirty-four minutes behind schedule right now.)"
10033045-40 = "(Next stop, I'll make up for it! Without fail!)"

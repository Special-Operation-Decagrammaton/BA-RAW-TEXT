10033045-14 = "5;우미카;11;죄송하고, 감사합니다. \n#5;greeting"
10033045-15 = "2;키라라;01;아하하하. 곤란했지, 여러 가지로? 어떻게든 알 것 같아서 말이야~\n#2;em;[재잘]"
10033045-16 = "3;에리카;00;괜한 참견이었으려나?"
10033045-17 = "5;우미카;04;그럴 리가요! 오히려, 이 보답을 어떻게 해 드려야 할지…….\n#5;hophop"
10033045-18 = "2;키라라;02;에이, 친구 사이에 너무 딱딱한 거 아냐?"
10033045-19 = "5;우미카;07;친…… 구요?\n#5;stiff"
10033045-20 = "2;키라라;02;응~? 난 그렇다고 생각하는데, 아니야? 같이 사진 찍고, 번호도 교환했고.\n#2;em;[?]"
10033045-21 = "3;에리카;04;뭐……. 이미 이야기했던 거지만, 키라라 쨩은 거리감을 잘 안 재니까 말이지……."
10033045-22 = "3;에리카;00;부담이었다면 말해 줘. 내가 대신 사과할게."
10033045-23 = "5;우미카;16;아, 아뇨! 그렇다기보다는…… 오히려 황송하달까…… 놀라웠다고 할까…….\n#5;hophop\n#5;em;[!]"

[translation]
10033045-3 = "[ns] \"ใจเย็นลงบ้างแล้วรึยัง เมกุ?\""
10033045-4 = "อืม...! ถึงจะน่าเสียดาย แต่ก็ช่วยไม่ได้นะ พวกตุ๊กตาก็เหมือนจะหยุดเคลื่อนไหวกันไปแล้วด้วย"
10033045-5 = "แต่ว่าทำไมกันนะ... หรือว่าสายน้ำใต้ดินเหือดแห้งไปหมดแล้ว?"
10033045-6 = "เอาเป็นว่า ถอนกำลังก่อนแล้วกัน...!"
10033045-11 = "โอ๊ะ พวกตุ๊กตานิ่งไปกันแล้วละ"
10033045-12 = "เด็กโรงเรียนเราก็เงียบกันแล้วด้วย... งั้นก็ถือว่าดีเลยนี่?"
10033045-13 = "พวกคุณทั้งสองคนเป็นแขกของพวกเราแท้ๆ แต่ดูเหมือนว่าเราจะสร้างความเดือดร้อนให้ตลอดเลย..."
10033045-14 = "ต้องขอโทษและขอบคุณด้วยนะคะ"
10033045-15 = "อะฮ่าฮ่าฮ่า วันนี้มีเรื่องหลายเรื่องเลยใช่มั้ยล่ะ? แต่ฉันก็พอรู้น่ะว่าต้องจัดการยังไง~"
10033045-16 = "นี่เราเข้าไปก้าวก่ายรึเปล่านะ?"
10033045-17 = "ก้าวก่ายอะไรล่ะคะ! ฉันไม่รู้ด้วยซ้ำว่าจะต้องตอบแทนยังไงดี..."
10033045-18 = "โธ่ เป็นเพื่อนกันแท้ๆ จะต้องตอบแทนให้ยากทำไมล่ะ?"
10033045-19 = "พะ... เพื่อนเหรอคะ?"
10033045-20 = "อื้อ~! เราทั้งถ่ายรูปด้วยกัน ทั้งแลกเบอร์กัน ฉันคิดว่าเราเป็นเพื่อนกันนะ หรือว่าฉันคิดไปคนเดียว?"
10033045-21 = "ก็นะ... อย่างที่บอกไปว่าคิราระจังเข้ากับคนอื่นได้ง่ายมากๆ น่ะ..."
10033045-22 = "ถ้ารู้สึกกดดันก็บอกได้นะ ฉันจะขอโทษแทนคิราระจังให้เอง"
10033045-23 = "มะ... ไม่ค่ะ! ฉันไม่ได้กดดันค่ะ... แต่รู้สึกซาบซึ้ง... และตกใจด้วยมากกว่า..."
10033045-24 = "ถ้างั้นพวกเราก็... เป็นเพื่อนกัน... ใช่ไหมคะ?"
10033045-25 = "อื้ม! มาจับมือฝากเนื้อฝากตัวระหว่างการทัศนศึกษาที่เหลือหน่อยมั้ย?"
10033045-26 = "ค่ะ..."
10033045-28 = "อ๊ะ! ฉันด้วย! ฉันก็ขอร่วมวงด้วยสิ!"
10033045-32 = "เย้! มิตรภาพจากความยากลำบากที่ผ่านมาด้วยกัน! ช่างยอดเยี่ยมจริงๆ เลยค่ะ!"
10033045-33 = "ถ้าจะเริ่มกำหนดการต่อไปก็... ปลุกฉันด้วยนะ... คร่อก..."
10033045-34 = "ฉันรู้สึกตั้งแต่เมื่อกี้แล้วละ... คนนี้ดูเป็นฮีโร่ในหลายๆ เรื่องเลยนะ..."
10033045-39 = "(เราช้ากว่ากำหนดการไปตั้ง 34 นาทีแล้ว...)"
10033045-40 = "(ตะ... ต่อไปต้องรักษาเวลาให้ได้...!)"

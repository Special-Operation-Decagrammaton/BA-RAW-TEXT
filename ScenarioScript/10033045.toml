10033045-11 = "3;에리카;02;오, 인형들이 멈췄네.\n#3;em;[반응]"
10033045-12 = "2;키라라;00;우리 학교 애들도 대충은 달랬고……. 뭐, 이걸로 좋지 않아?\n#2;em;[음표]\n#2;ar\n#3;m4"

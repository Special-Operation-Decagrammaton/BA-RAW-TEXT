[translation]
10033045-3 = "[ns]「冷靜點了嗎，惠？」"
10033045-4 = "嗯……！雖然可惜，但也沒辦法。#n人偶們似乎也停下來了。"
10033045-5 = "但是為什麼呢……是因為溫泉水脈的能量消失了嗎？"
10033045-6 = "先實施戰術性撤退……！"
10033045-11 = "哦，人偶們都停下來了。"
10033045-12 = "我們學園的孩子也大致都安撫好了……嗯，這樣就沒事了吧？"
10033045-13 = "兩位……明明是來訪的客人，我們卻一直給你們添麻煩……"
10033045-14 = "真是既抱歉又感謝。"
10033045-15 = "啊哈哈哈。你們也很為難吧？好像能感覺的出來～"
10033045-16 = "會不會太多管閒事了？"
10033045-17 = "別這麼說！我反而不知道該怎麼報答你們呢……"
10033045-18 = "哎呀，朋友之間不用這麼見外吧？"
10033045-19 = "朋友……？"
10033045-20 = "嗯～？我是這麼想的，難道不是嗎？#n一起拍了照，也交換了電話號碼……"
10033045-21 = "嗯……雖然之前也已經說過綺羅羅醬自來熟的問題……"
10033045-22 = "要是覺得有負擔就說出來吧，我代替他向你道歉。"
10033045-23 = "不，不會！應該說是……有點受寵若驚……"
10033045-24 = "所以我們……是朋友，沒錯吧？"
10033045-25 = "嗯！修學旅行剩下的期間，還請多多關照。#n來握個手吧？"
10033045-26 = "好，好的……"
10033045-28 = "啊～！我也要我也要！我也要握手！"
10033045-32 = "耶～！共同克服困難的友誼，真是太美妙了！"
10033045-33 = "下個行程開始的時候……記得叫我……呼嚕……"
10033045-34 = "雖然之前就感受到了……這位同學在各種意義上來說，還真是厲害的人呢。"
10033045-39 = "（行程……足足延誤了34分鐘……）"
10033045-40 = "（下一個行程一定要……！）"

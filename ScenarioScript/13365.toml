[translation]
13365-3 = "就是現在！！"
13365-9 = "……唔！"
13365-10 = "好，好燙！！動作快！！"
13365-13 = "老師！！我會想辦法擋下那股熱氣的，動作快！"
13365-14 = "「賽特的憤怒」的情況不太妙！已經沒時間了！"
13365-18 = "[ns] 伸手觸碰星野的身體"
13365-21 = "成功了！不過老師到底說了什麼……？"
13365-22 = "[s]「不是我！！」"
13365-26 = "[ns1]「就算我是大人，也對死亡和痛苦一無所知！！」\n[ns2]「那種事，不管對孩子還是大人來說都是一樣的！」"
13365-30 = "[ns]「必須由你們來才行！！」"
13365-33 = "原來如此……#n嗯。能辦到這件事的，應該就只有對策委員會了吧。"
13365-34 = "[ns]「白子你也是！！」"
13365-38 = "嗯，你也是阿拜多斯的人。一起解救星野前輩吧。"
13365-39 = "以蒙面團成員的身分。"
13365-45 = "你不要老是給他回應！！白子前輩會被寵壞的！"
13365-52 = "……唉，畢竟他們是同一個人，這恐怕也沒辦法吧。"
13365-53 = "動作快！！"
13365-58 = "[ns3]「告訴他！！」\n[ns4]「快告訴星野！！」"
13365-62 = "下一話;必須說出口的事"

[translation]
13365-3 = "ตอนนี้ละ!! "
13365-9 = "อึก...!!"
13365-10 = "ระ... ร้อนจัง!! เร็วเข้า!!"
13365-13 = "คุณครู!! หนูจะกันความร้อนไว้ให้เอง คุณครูรีบไปเถอะค่ะ!"
13365-14 = "<ความโกรธแค้นของเซ็ต> อยู่ในสภาพไม่ปกติแล้วค่ะ! ไม่มีเวลาแล้วค่ะ!"
13365-18 = "[ns] เอามือไปแตะตัวโฮชิโนะ"
13365-21 = "ได้แล้ว! ว่าแต่คุณครูพูดอะไรน่ะ...?"
13365-22 = "[ns] \"ไม่ใช่ว่าต้องเป็นครูหรอก!!\""
13365-26 = "[ns1] \"ต่อให้เป็นผู้ใหญ่แค่ไหน ก็ไม่อาจรู้ถึงความตายหรือความเจ็บปวดได้!!\"\n[ns2] \"ความตายกับความเจ็บปวดของเด็กกับผู้ใหญ่ก็เหมือนกัน\""
13365-30 = "[ns] \"พวกเธอต้องเป็นคนทำ!!\""
13365-33 = "อย่างนั้นสินะ... อื้ม คงมีเพียงคณะกรรมการแผนงานที่ทำสิ่งนี้ได้สินะ"
13365-34 = "[ns] \"เธอก็ด้วย!!\""
13365-38 = "อื้อ เธอก็เป็นเด็กอะบิดอสไม่ใช่เหรอ? ช่วยรุ่นพี่โฮชิโนะเถอะนะ "
13365-39 = "ในฐานะสมาชิกของกองกำลังหน้ากากไง"
13365-45 = "ไม่ต้องไปคล้อยตามกับทุกเรื่องที่ได้ยินหรอกน่า!! เดี๋ยวรุ่นพี่ชิโรโกะก็นิสัยเสียกันพอดี!"
13365-52 = "แต่พอเป็นคนเดียวกัน ก็ช่วยไม่ได้สินะ..."
13365-53 = "เร่งมือเข้าเถอะ!!"
13365-58 = "[ns3] \"ฝากบอกโฮชิโนะด้วย!!\"\n[ns4] \"ฝากบอกโฮชิโนะที!!\""
13365-62 = "ตอนต่อไป;สิ่งที่จำเป็นต้องบอกให้รู้"

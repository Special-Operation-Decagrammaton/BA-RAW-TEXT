[translation]
1007503-1 = "ความเจ็บปวดแห่งศิลปะ 1"
1007503-14 = "นางเอกที่ถูกชวนไปออกเดตครั้งแรกในชีวิตจะทำตัวยังไงน่ะ!?"
1007503-15 = "[s] \"เรื่องนั้นมาถามครูแล้วครูจะทำอะไรได้นะ...\""
1007503-16 = "คุณครูเป็นผู้ใหญ่นี่นา ไม่รู้อะไรบ้างเลยเหรอ?"
1007503-17 = "[s] \"นี่มันเรื่องอะไรเนี่ย?\""
1007503-21 = "เฮ้อ ต้องอธิบายให้ละเอียดด้วยเหรอเนี่ย"
1007503-22 = "เรื่องก็คือว่ามีนางเอกอยู่คนหนึ่ง"
1007503-23 = "เป็นคนเงอะงะงุ่มง่ามซุ่มซ่าม ไม่มีความมั่นใจในตัวเอง แล้วก็เป็นคนที่ไม่ค่อยสนใจเรื่องการแต่งตัว หรือดูแลตัวเองสักเท่าไร..."
1007503-24 = "แต่ว่าเกิดเรื่องบางอย่างขึ้น เกิดเหตุการณ์โน่นนี่นั่นจนสุดท้ายเธอก็ได้รับคำชวนออกเดตไงล่ะ!"
1007503-25 = "[s] \"ช่วยอธิบายเรื่องเหตุการณ์โน่นนี่นั่นให้มันชัดๆ หน่อยได้มั้ย\""
1007503-26 = "ตอนนี้เรื่องพวกนั้นมันสำคัญที่ไหนกันเล่า!"
1007503-27 = "ยังไงก็เถอะ... เพราะงั้นนางเอกที่ไม่เคยแต่งหน้ามาก่อนสักครั้งในชีวิตก็ตัดสินใจที่จะลองแต่งหน้าดู"
1007503-28 = "และลองทำข้าวกล่องทั้งที่ไม่เคยทำอาหารมาก่อน..."
1007503-29 = "[s] \"ก็คิดเนื้อเรื่องได้ดีแล้วนี่นา...\""
1007503-30 = "ปัญหามันคือหลังจากนี้ต่างหากล่ะ!"
1007503-31 = "นางเอกตัดสินใจเปิดประตูออกไปด้วยความรู้สึกแบบไหน?"
1007503-32 = "วินาทีที่ก้าวเท้าออกไป เธอคิดอะไรอยู่?"
1007503-33 = "แล้วก็... เธอจะมีปฏิกิริยากับเรื่องต่างๆ ที่พบเจอระหว่างออกเดตยังไง?"
1007503-34 = "ฮึ่ยยย ไม่รู้แล้ว! คิดไม่ออกเลยสักนิด! หัวมันตันไปหมดเลย!"
1007503-35 = "[s3] \"อืม... ถ้าเป็นเรื่องนั้นละก็...\"\n[s4] \"ลองออกไปนอกเขตเรดวินเทอร์กันดูมั้ย?\""
1007503-38 = "อะ...เอ๋?! จู่ๆ ก็พูดอะไรแบบนั้นน่ะ?"
1007503-42 = "ครู?"
1007503-46 = "คุณครู?!"
1007503-50 = "ขะ...เข้าใจแล้วน่า! ฉันไปก็ได้ หยุดลากได้แล้ว~!"
1007503-51 = "ในเมืองคิโวทอส"
1007503-60 = "......"
1007503-66 = "ดันออกมาจริงๆ ซะแล้ว..."
1007503-67 = "คิดจะทำอะไรกันแน่เนี่ย ครู!!!"
1007503-68 = "[s5] \"น่าๆ อากาศดีน่าเดินเล่นเนอะ\"\n[s6] \"มาเดินเล่นให้สมองปลอดโปร่งกันเถอะ\""
1007503-71 = "ฮึ่ม เดินเล่นงั้นเหรอ..."
1007503-72 = "นั่นสินะ พออุดอู้อยู่แต่ในเขตเรดวินเทอร์ อาจจะทำให้หัวตันๆ คิดอะไรไม่ออกก็ได้"
1007503-73 = "[s] \"ถ้างั้นตอนนี้เราก็ไปกันเถอะ\""
1007503-74 = "โอ๊ะ วันนี้จะไปเดินเที่ยวกับฉันทั้งวันเลยเหรอ? งั้นก็ดี นำทางได้เลย คุณครู~!"
1007503-75 = "ห้างสรรพสินค้า"
1007503-77 = "ที่นี่... ห้างสรรพสินค้าขนาดใหญ่...?"
1007503-78 = "รู้สึกแปลกใหม่อยู่หรอกแต่ว่า... คนเยอะจังเลยนะ เขตเรดวินเทอร์กว้างขวางก็จริง แต่จำนวนนักเรียน#nก็ไม่ได้มีเยอะแยะอะไร"
1007503-79 = "โอ๊ะ เด็กสองคนตรงนั้น เอามาวาดรูปได้อยู่นะ?"
1007503-80 = "ร้านเครื่องสำอางนี่เอง เด็กสาวคนหนึ่งกำลังลองทาครีมให้เด็กอีกคนหนึ่ง แต่ไม่รู้ว่าเธอเขินหรือว่า#nไม่คุ้นเคยกับการถูกทำแบบนั้นกันแน่ ถึงพยายามจะเบี่ยงตัวหนี...  "
1007503-81 = "อืมๆ ฮึ่ม เดี๋ยวนะ..."
1007503-86 = "ได้แล้ว! ไอเดียวาดรูป!"
1007503-87 = "[s] \"อะ...อะไรน่ะ?!\""
1007503-88 = "นี่ไงล่ะ! นางเอกแต่งหน้าออกมาแล้ว แต่ฝ่ายตรงข้ามกลับคิดว่ามันไม่เหมาะกับเธอ"
1007503-89 = "เพราะงั้นนางเอกก็เลยโดนพาไปที่ร้านเครื่องสำอาง ซึ่งแน่นอนว่าเธอก็ต้องไม่ชอบอยู่แล้ว ก็เลยพยายามขัดขืน"
1007503-90 = "แต่มันให้ผลตรงกันข้ามเลย! พอเห็นนางเอกขัดขืน อีกฝ่ายก็ยิ่งรู้สึกอยากแกล้งมากขึ้น! นางเอกที่#nตอนแรกทาแค่รองพื้นธรรมดาๆ สุดท้ายก็ได้แปลงโฉมมาแต่งหน้าแบบจัดเต็ม จนแทบเปลี่ยนเป็น#nคนละคนเลย..."
1007503-91 = "ไม่ๆ ตรงนี้หักมุมนิดหน่อยดีกว่า ที่บอกว่านางเอกไม่ชอบน่ะ ความจริงแล้วเป็นแค่การแสดง เพราะแค่อยากใช้เรื่องนั้นไปกระตุ้นต่อมความอยากแกล้งของอีกฝ่าย..."
1007503-92 = "และคนที่คิดว่าเป็นฝ่ายถือไพ่เหนือกว่า สุดท้ายก็ตกหลุมพรางตัวเอง..."
1007503-93 = "อะไรเนี่ยครู! ครูเองก็รู้เรื่องการออกเดตอย่างดีเลยไม่ใช่รึไงเนี่ย?"
1007503-94 = "[s7] \"หึหึ หวังว่าจะช่วยเมรุได้นะ!\"\n[s8] \"ครูไม่ได้คิดว่ามันจะช่วยเธอได้แบบนี้เลย...\""
1007503-101 = "เอ๋? ครู...? คิดจะทำอะไรน่ะ! ตอนนี้กำลังเข้าได้เข้าเข็มเลยนะ! จะลากไปไหนอีกเล่า~!"
1007503-105 = "สวนสนุก"
1007503-107 = "อืมมม คราวนี้มาที่สวนสนุกงั้นเหรอ นั่นสินะ ที่นี่ก็เหมาะจะเป็นที่จัดงานอีเวนต์ต่างๆ อยู่แล้ว"
1007503-108 = "ไหนดูซิๆ... มีพวกเด็กนักเรียนที่สนุกกับงานอีเวนต์อยู่บ้างมั้ย... นั่นไงล่ะ! พูดปุ๊บก็โผล่มาเลย!"
1007503-109 = "อ่า ชิงช้าสวรรค์เหรอ? ดีละ คนสองคนขึ้นไปนั่งบนนั้นด้วยกัน... "
1007503-114 = "...ได้อีกแล้ว! ไอเดียวาดรูป!"
1007503-115 = "[s] \"...ไม่เข้าใจวิธีที่จะได้ไอเดียวาดรูปเลยสักนิด\""
1007503-116 = "ฟังให้ดีล่ะ! ถึงมันอาจเป็นพล็อตที่ค่อนข้างจำเจไปสักหน่อยก็เถอะ"
1007503-117 = "เริ่มแรกนางเอกกับอีกฝ่ายก็นั่งหันหน้ามองกันและกัน แต่พอชิงช้าสวรรค์ค่อยๆ ลอยสูงขึ้นไปเรื่อยๆ..."
1007503-118 = "ในตอนที่ชิงช้าค่อยๆ เลื่อนขึ้นไป สายตาที่มองจ้องกันและกันก็ค่อยๆ สื่อความรู้สึกอะไรบางอย่างออก#nมาให้เห็น..."
1007503-119 = "ไม่นานนัก ฝ่ายหนึ่งก็ลุกขึ้นไปนั่งข้างๆ อีกคน และระยะห่างระหว่างทั้งคู่ก็ค่อยๆ ลดลง..."
1007503-120 = "ระยะห่างของร่างกายและระยะห่างของจิตใจ...! แล้วจากนั้นก็...!"
1007503-121 = "[ns] \"ขอโทษที่ขัดจังหวะตอนกำลังสนุกนะ แต่ถึงคิวแล้ว...\""
1007503-123 = "[ns] \"ครูขอโทษนะ แต่ถึงคิวเราแล้ว เมรุ\""
1007503-124 = "โอ๊ย! หัวกำลังแล่นอยู่เลยเชียว!"
1007503-125 = "แต่ก็ช่างเถอะ โรลเลอร์โคลสเตอร์งั้นเหรอ ก็ไม่ได้แย่เท่าไรหรอกนะ"
1007503-126 = "แรงสั่นไหวของเครื่องเล่น... ทำให้นางเอกและอีกฝ่ายที่นั่งอยู่ข้างๆ กันก็..."
1007503-128 = "ทุกท่านที่นั่งประจำที่แล้ว โปรดรัดเข็มขัดนิรภัยให้แน่นด้วย"
1007503-138 = "อ๊ายยย~ ฮะฮะฮ่า! เจ้านี่สนุกจังเลย!"
1007503-139 = "คาเฟ่"
1007503-141 = "คราวนี้เป็นคาเฟ่งั้นเหรอ? ร้านกาแฟ... สถานที่สำหรับคู่รักสินะ! สถานที่ที่ทำให้หลงอยู่ในภวังค์ว่า#nสามารถใช้เวลากับคนรักตามลำพังสองต่อสองได้..."
1007503-142 = "ทั้งที่ความจริงร้านกาแฟคือพื้นที่พักผ่อนสาธารณะ...!"
1007503-143 = "วังวนแห่งอารมณ์และความคิด ความรู้สึกของทั้งสองฝ่ายที่โหมกระหน่ำท่ามกลางความสับสน ระหว่างความคิดและความเป็นจริง... ฮิฮิฮิ... ไอเดียไหลลื่นดีจริงๆ..."
1007503-144 = "[s] \"...เราเริ่มจากการสั่งอาหารก่อนดีมั้ย...\""
1007503-145 = "หืม? อ้อ ก็ได้ๆ ต้องจ่ายค่าสถานที่สิ ค่าสถานที่... ถ้างั้นฉันขอเป็น..."
1007503-153 = "ครู... คือว่าสองคนตรงนั้นน่ะ ฉันแอบดูพวกเขามาสักพักแล้วละ..."
1007503-154 = "อ๊ะ หลอดของคนหนึ่งหล่นไปที่พื้นแล้ว"
1007503-155 = "[s] \"แล้วก็... คงจะขอหลอดใหม่ตามปกตินั่นแหละน่า\""
1007503-156 = "ให้ตายเหอะ ช็อตฟีลจบแบบน่าเบื่อจริงๆ"
1007503-161 = "แต่ว่าช่วงเวลาคิดไอเดียวาดรูปของฉันไม่หยุดแค่นี้หรอก! คราวนี้ถึงตาของนางเอกแล้ว! เธอแกล้ง#nทำให้ดูเหมือนว่าบังเอิญทำหลอดหล่นไป แล้วก็โน้มน้าวขอใช้หลอดเดียวกันกับอีกฝ่าย...!"
1007503-162 = "หรือไม่ใช่แบบนั้นนะ? ให้อีกฝ่ายขอจะดีกว่ามั้ยนะ? ถ้าปล่อยให้นางเอกเป็นฝ่ายรุกในฉากนี้ก่อน จะเป็นการขัดการเดินเรื่องในตอนหลังรึเปล่านะ?"
1007503-163 = "ไม่หรอกๆ... เอาแบบนี้ดีกว่า ที่จริงแล้วนางเอกก็แอบวางแผนเรื่องทำหลอดหล่นเอาไว้ แต่สุดท้าย#nก็ไม่กล้าทำ!"
1007503-164 = "และตอนที่ขอหลอดอันใหม่ เธอก็รู้สึกโล่งใจและเสียดายไปพร้อมๆ กัน..."
1007503-165 = "ท่ามกลางมิตรภาพและความรู้สึกแปลกใหม่ต่างๆ ความสดใส...!"
1007503-166 = "[s] \"เอาละๆ เครื่องดื่มที่สั่งมาแล้ว ดื่มก่อนเถอะ\""
1007503-171 = "อ๊า~ วันนี้ก็เต็มอิ่มสุดๆ ไปเลย!"
1007503-172 = "[s] \"...กินไปเยอะขนาดนั้นเลยเหรอ?\""
1007503-173 = "ครูนี่ไม่รู้อะไรเลย! คำว่า 'เต็มอิ่ม' น่ะ มันใช้แสดงความรู้สึกได้ในหลายๆ ความหมายนะ"
1007503-174 = "ครูเองก็มีพรสวรรค์ในการเป็นผู้ช่วยที่ดีเหมือนกันนะเนี่ย? ถึงได้รู้จักสถานที่สุดเพอร์เฟกต์แบบนี้น่ะ!"
1007503-175 = "[s] \"พอใจกับเดตวันนี้สินะ ค่อยโล่งอกหน่อย\""
1007503-179 = "...เอ๋...?"
1007503-180 = "หะ...หา...?! ดะ...ดะดะ...เดต...?!"
1007503-181 = "พะ...พอมาคิดดูดีๆ สถานที่ที่เราสองคนไปวันนี้... ทั้งห้างสรรพสินค้า สวนสนุก..."
1007503-182 = "......?!"
1007503-183 = "[s] \"พอจะเอาไปใช้เป็นข้อมูลสำหรับฉากเดตได้มั้ยนะ...?\""
1007503-184 = "......!"
1007503-185 = "นะนะนะนะ...แน่นอน!"
1007503-186 = "นะ...นักวาดอย่างฉัน แค่นี้ก็ถือว่าเยอะพอแล้วละ!"
1007503-187 = "ถะ...ถ้างั้นฉันกลับก่อนนะ! ไว้เจอกันใหม่นะครู!"
1007503-193 = "ฮึก?!"
1007503-194 = "[s] \"อ๊ะ เดินชนเสาไฟแล้ว\""
1007503-195 = "ฮือออ... เจ็บหน้าผากจัง...!"
1007503-196 = "ฝะ...ฝากไว้ก่อนเหอะ! ความแค้นครั้งนี้... ฉันจะเอาคืนให้สาสมแน่นอน~!"
1007503-198 = "(คุณครูโบกมือบ๊ายบายอย่างเงียบๆ พร้อมกับมองเมรุที่วิ่งห่างออกไปโดยไม่เปิดโอกาสให้บอกลาใดๆ...)"

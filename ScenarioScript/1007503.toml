[translation]
1007503-1 = "創作的痛苦（１）"
1007503-14 = "老師覺得第一次收到約會邀請的女主角會怎麼行動呢！"
1007503-15 = "[s]「那種事問我也沒用啊……」"
1007503-16 = "因為我不知道嘛！#n老師是大人，應該知道什麼吧？"
1007503-17 = "[s]「為什麼要這麼問？」"
1007503-21 = "唔嗯……果然還是從頭開始說明吧。"
1007503-22 = "事情是這樣的──#n現在有一名女主角……"
1007503-23 = "那孩子不管做什麼都笨手笨腳還缺乏自信，#n而且完全沒花心思照顧或打扮自己……"
1007503-24 = "但在這樣那樣之後就收到約會的請求了！"
1007503-25 = "[s]「可以把這樣那樣的部分說清楚一點嗎……」"
1007503-26 = "那不是現在的重點！"
1007503-27 = "總之……最後女主角決定挑戰一生中從未嘗試過的化妝。"
1007503-28 = "還打算親自準備從未做過的便當。"
1007503-29 = "[s]「故事還編得挺有模有樣的……」"
1007503-30 = "這裡開始才是問題！"
1007503-31 = "這種時候，女主角會抱著怎樣的心情出門呢？"
1007503-32 = "在踏出第一步的瞬間，心裡在想什麼，有什麼感受呢？"
1007503-33 = "還有……在約會時會發生什麼，又該如何反應呢？"
1007503-34 = "哇啊啊，想不出來！完全想不通！思緒卡住啦！"
1007503-35 = "[s3]「原來如此，那……」\n[s4]「要不要現在到赤冬外面看看？」"
1007503-38 = "嗯，嗯！？#n怎麼突然說這麼莫名其妙的話？"
1007503-42 = "老師？"
1007503-46 = "老師！？"
1007503-50 = "知，知道了！我走就是了嘛，別拉著我～！"
1007503-51 = "奇普托斯．市內"
1007503-60 = "……"
1007503-66 = "真的到學園外了……"
1007503-67 = "你到底想做什麼啊，老師！！！"
1007503-68 = "[s5]「哇～天氣真好。」\n[s6]「我們先到外面散步一下吧。」"
1007503-71 = "唔嗯，散步啊……"
1007503-72 = "嗯，也好。一直待在赤冬的話，本來能想到的答案可能也會想不出來。"
1007503-73 = "[s]「那我們出發吧。」"
1007503-74 = "哦～是護送啊！#n好，那就拜託你囉～！"
1007503-75 = "購物中心"
1007503-77 = "這裡是……購物中心……？"
1007503-78 = "久違地感受到人多的感覺了呢……#n畢竟赤冬雖然腹地廣大，學生卻不是很多。"
1007503-79 = "哦？那邊那對學生，看起來有畫的感覺哦。"
1007503-80 = "在化妝品店裡，其中一人在幫另一人嘗試樣品……#n而那位學生也許是出於害羞或不習慣而想躲開……  "
1007503-81 = "嗯嗯，嗯嗯。等等……"
1007503-86 = "來了！是繪圖時間！"
1007503-87 = "[s]「什，什麼！？」"
1007503-88 = "是這麼回事吧！#n女主角難得化了妝，對方卻覺得有點不自然！"
1007503-89 = "於是女主角被帶到了化妝品店……這樣女主角當然會不開心吧？"
1007503-90 = "但是卻發生了反效果！因為這正好激起了男主角想欺負對方的心理！#n於是本來只畫了淡妝的女主角最終畫上了全妝，#n結果反而讓男主角對她截然不同的面貌深深著迷……"
1007503-91 = "不不不，這裡應該再來個轉折……#n女主角其實只是假裝不開心，目的正是引發對方的攻擊性……"
1007503-92 = "本以為自己是進攻方的男主角在不知不覺間落入了女主角的計策無法逃脫……"
1007503-93 = "什麼嘛，老師！你這不是很懂嗎！"
1007503-94 = "[s7]「唔，我是希望能幫上愛瑠的忙沒錯……！」\n[s8]「但不是用這種方式！」"
1007503-101 = "咦，老師？怎麼了？#n現在明明正精彩的說！別拉我啦～！"
1007503-105 = "遊樂園"
1007503-107 = "這次是遊樂園啊。確實是活動的聖地。"
1007503-108 = "我瞧瞧……有在體驗活動的學生嗎……啊，那邊！#n話才說完就發現了！"
1007503-109 = "是摩天輪啊……很好很好。#n兩人親密地走進了纜車…… "
1007503-114 = "……又來啦又來啦！繪圖時間！"
1007503-115 = "[s]「真搞不懂繪圖時間的標準……」"
1007503-116 = "聽我說！這在某種意義上可是王道劇情啊！"
1007503-117 = "起初面對面坐著的男女主角，隨著纜車的逐漸升高……"
1007503-118 = "在彼此相望的過程中，感情也如纜車的高度般逐漸……"
1007503-119 = "沒過多久，其中一人默默坐到了另一人身旁，兩人的距離瞬間拉近……"
1007503-120 = "伴隨物理距離的拉近，心理距離也同時……！#n然後，然後……！"
1007503-121 = "[ns]「抱歉在正起勁的時候打擾你……」"
1007503-123 = "[ns]「輪到我們搭車囉，愛瑠。」"
1007503-124 = "咦咦～！現在正精彩的說！"
1007503-125 = "好吧算了。雲霄飛車也不錯，嗯嗯。"
1007503-126 = "並肩而坐的兩人由於吊橋效應……"
1007503-128 = "就座後請繫緊安全帶。"
1007503-138 = "呀～哈哈！真好玩！"
1007503-139 = "咖啡廳"
1007503-141 = "這次是咖啡廳啊。咖啡廳其實是一種雙重空間唷！#n會讓人陷入只有兩人獨處的錯覺……"
1007503-142 = "但其實本質依然是公開的空間……！"
1007503-143 = "兩者之間產生的矛盾情緒和感情漩渦……呵呵呵……真令人期待啊……"
1007503-144 = "[s]「……總之先點餐吧……」"
1007503-145 = "嗯？啊，差點忘了。#n得付門票錢才行，那我……"
1007503-153 = "老師，你看那邊那兩個人。#n我從剛才就一直在觀察……"
1007503-154 = "啊，剛好一個人的吸管掉了！"
1007503-155 = "[s]「然後很普通地要了一根新吸管。」"
1007503-156 = "啊啊～真是無聊的結局……"
1007503-161 = "但我的繪圖時間是不會停止的！這次把鏡頭轉到女主角身上！#n假裝不小心弄掉吸管，進而誘導兩人用同一根吸管喝飲料……！"
1007503-162 = "等等，反過來是不是更好？#n要是一切都如女主角的意，好像反而會妨礙到後續劇情的發展？"
1007503-163 = "嗯……應該這樣比較好。#n女主角確實擬定了吸管作戰，卻在即將執行的時候怕了！"
1007503-164 = "所以在向店員要吸管的時候才會一方面感到安心，卻又覺得可惜……"
1007503-165 = "在青澀又新鮮的友情和超越友情的某種感情之間……！"
1007503-166 = "[s]「來，我們的飲料來囉。」"
1007503-171 = "哎呀～吃得真飽！"
1007503-172 = "[s]「……你有吃那麼多嗎？」"
1007503-173 = "這你就有所不知了，老師！#n「吃得真飽」這句話可是有很多意思的哦～"
1007503-174 = "老師是不是很有助手的才能啊～？#n這次的外出取材很完美哦！"
1007503-175 = "[s]「是很令人滿意的約會啊，太好了。」"
1007503-179 = "……哦……？"
1007503-180 = "什，什麼……！？#n約，約約，約會……！？"
1007503-181 = "聽，聽你這麼一說，我們今天去了……購物中心和遊樂園……"
1007503-182 = "……！？"
1007503-183 = "[s]「能當成第一次約會的參考嗎？」"
1007503-184 = "……！"
1007503-185 = "當，當當當，當然可以！"
1007503-186 = "對，對像我這樣的作家來說，這點程度還游刃有餘！"
1007503-187 = "那，那我就先回去了！下次見囉，老師！"
1007503-193 = "嗚啊！？"
1007503-194 = "[s]「啊，撞到電線桿了。」"
1007503-195 = "嗚嗚嗚……好痛……！"
1007503-196 = "給，給我記住！#n這仇我一定會報的～！"
1007503-198 = "（還沒能來得及告別，愛瑠便已經向遠方跑去，只能靜靜目送他離開……）"

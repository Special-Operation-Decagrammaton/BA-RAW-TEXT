1007503-90 = "3;메루;07;여기에서 역효과가 발생하는 거지! 그게 상대의 괴롭히고 싶은 마음을 자극하고! 기초 파운데이션만 했던 여주인공은 결국 풀 메이크업을 하게 되고, 완전히 달라진 자기 모습을 보고 넋을 잃으면서……\n#3;greeting"

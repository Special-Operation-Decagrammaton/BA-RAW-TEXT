[translation]
80000111-1 = "#title;청춘을 위한 전력투구"
80000111-2 = "#place;샬레 집무실"
80000111-3 = "3;렌게;01;선생님도 알고 있다시피 오늘은 발렌타인 데이야.\n#3;a\n#3;em;[반응]"
80000111-4 = "[s] \"아, 응. 그랬지.\""
80000111-5 = "3;렌게;99;발렌타인 데이라는 건 문자 그대로 청춘의 중심…… 그 자체로 The 청춘! 이라고 불러도 손색이 없는 기념일…….\n#3;jump"
80000111-6 = "3;렌게;01;그게 어느 정도냐 하면 <1년 365일 중에서 어느 날이 가장 청춘스러운 날이라고 생각해?>라는 질문을 받았을 때."
80000111-7 = "3;렌게;99;대충 <입학식>, <졸업식>, <크리스마스 이브>, <여름 불꽃놀이 축젯날>, <새해가 찾아온 신년 첫날>, <학원 축제를 앞두고 밤새는 날>과 함께 답의 하나로 거론되더라도 전혀 이상하지 않은──\n#3;em;…"
80000111-8 = "3;렌게;10;청춘의 대표적인 기념일 중 하나라 할 수 있는 게, 또 발렌타인 데이니까."
80000111-9 = "[s] \"대표라고 치기엔 생각보다 답의 종류가 엄청 많은 거 아냐……?\""
80000111-10 = "3;렌게;11;어…… 그거라면 딱히 이상할 것도 없지?"
80000111-11 = "3;렌게;01;마음먹기에 따라선, 우리 같은 <청춘 수행자>에겐 매일이 청춘이라 해도 과언이 아닌걸."
80000111-12 = "3;렌게;99;참고로 누가 나한테 저런 질문을 한다면, 나는 망설일 것도 없이 이렇게 답할 거야."
80000111-13 = "3;렌게;03;바로 <오늘>이야말로 가장 청춘스러운 날이라고!\n#3;em;[!]\n#3;jump"
80000111-14 = "3;렌게;99;선생…… 아니, 스승님과 <청춘 활동>을 하는 내게 있어선 매일이 청춘이나 다름없으니까."
80000111-15 = "[s1] \"앞에서 이야기한 모든 전제를 상쾌하게 부정하는 듯한 답변!\"\n[s2] \"아니, 렌게의 그 말은 물론 엄청 기쁘긴 하지만!\""
80000111-16 = "#wait;100"
80000111-17 = "#wait;100"
80000111-18 = "3;렌게;99;어쨌든 간에…… 중요한 건 말이야.\n#3;jump"
80000111-19 = "3;렌게;01;청춘 이벤트에서 이렇게나 중요한 발렌타인 데이라는 날에, 그저 가만히, 얌전히, 멍~하니 앉아있기만 해서는 우리 <청춘 사제관계>의 이름이 울 거라는 사실이야."
80000111-20 = "3;렌게;03;그렇다면 오늘 해야만 하는 일은 하나밖에 없지 않겠어?\n#3;em;[음표]"
80000111-21 = "[s] \"해야만 하는 일이라는 건…….\""
80000111-22 = "3;렌게;99;스승님과 함께 <청춘 활동>에 매진하는 <청춘 경력자>로서……."
80000111-23 = "3;렌게;09;나는 오늘을 선생님이 절대로 잊지 못할 최고의 발렌타인 데이로 만들고 싶어!\n#3;jump"
80000111-24 = "3;렌게;08;그러니 결심했어."
80000111-25 = "3;렌게;10;내 목표에 어울리는 엄청나게 멋진 <발렌타인 초콜릿>을 만들어…… 스승님에게 선물하겠다고."
80000111-26 = "3;렌게;09;어때? 스승님! 나의 계획이!\n#3;hophop"
80000111-27 = "[s] \"렌게가 그렇게까지 말해주니까. 엄청 기쁜걸.\""

[translation]
80000111-1 = "為青春全力以赴"
80000111-2 = "夏萊．辦公室"
80000111-3 = "今天是情人節，老師也知道吧？"
80000111-4 = "[s]「啊，嗯，當然。」"
80000111-5 = "情人節就是青春的中心……是個稱之為「The青春！」也不為過的日子……"
80000111-6 = "大概是如果有人問「一年365天之中，哪天最具有青春氣息？」……"
80000111-7 = "足以和「開學典禮」、「畢業典禮」、「平安夜」、「夏日煙火大會」、#n「元旦」、「為學園祭熬夜的日子」並列答案之一的程度──"
80000111-8 = "也就是說，情人節可以稱得上是青春的代表性節日。"
80000111-9 = "[s]「雖然你說是代表，但選項也未免太多了吧……？」"
80000111-10 = "唔……這也不奇怪吧？"
80000111-11 = "只要心態正確，對於我們這樣的「青春修行者」來說，每天都是青春。"
80000111-12 = "順帶一提，如果有人這樣問我，我會毫不猶豫地這麼回答──"
80000111-13 = "「今天」就是最青春的一天！"
80000111-14 = "對我來說，能跟老師……不，能跟師父進行「青春活動」的每一天都是青春。"
80000111-15 = "[s1]「你的回答怎麼把剛才那些選項都否定了啦！」\n[s2]「不過蓮華能這麼說，我還是覺得很開心！」"
80000111-18 = "總之我想說的重點是……"
80000111-19 = "在青春活動中如此重要的情人節這天，#n如果只是靜靜地、乖乖地、呆～呆地坐著，將有損我們「青春師徒」的名號。"
80000111-20 = "既然如此，今天要做的就只有一件事了吧？"
80000111-21 = "[s]「要做的事……」"
80000111-22 = "作為與師父一同投入「青春活動」的「青春老手」……"
80000111-23 = "我想讓今天，成為永生難忘的最棒情人節！"
80000111-24 = "所以我決定了──"
80000111-25 = "要做出符合目標且非常精美的「情人節巧克力」……並送給老師當禮物。"
80000111-26 = "如何？師父！我的計畫怎麼樣！"
80000111-27 = "[s]「蓮華能這麼說，師父我非常高興。」"
80000111-28 = "對吧～？啊哈哈。"
80000111-29 = "我會運用從師父迄今為止的眾多青春活動中學習到的經驗……"
80000111-30 = "展現不破蓮華全力以赴的模樣，敬請期待！"
80000111-31 = "[s]「嗯，既然蓮華都這麼說了，我……」"
80000111-32 = "嗯！那之後見囉～師父！"
80000111-36 = "[ns]「很期待……都還沒說完就走掉了呢。」"
80000111-38 = "（聽見蓮華如此豪爽的呼喊之後，只好在夏萊靜靜等待）"
80000111-42 = "（不過現實並沒有那麼容易）"
80000111-45 = "（在蓮華離開的3小時後……）"
80000111-50 = "[ns]「蓮華，是我。你的巧克力完成……」"
80000111-54 = "啊，抱歉，師父！#n感覺巧克力還需要一點時間，所以我先打電話通知你一聲。"
80000111-55 = "不過製作過程非常順利。麻煩再等我一下！"
80000111-56 = "[s]「啊，嗯，我知道了。蓮華也別太勉強自己哦。」"
80000111-57 = "別擔心，我已經慢慢抓到感覺了。先這樣！"
80000111-62 = "（在接到蓮華的電話後，又過了3小時……）"
80000111-66 = "[ns]「啊，蓮華。巧克力還沒……」"
80000111-67 = "師父，我想說的就是巧克力呢。"
80000111-68 = "抱歉，師父！再一下！真的再一下就能完成。#n已經很接近成功了。"
80000111-69 = "在我看來，現在進度大約完成了80%……不，78%……還是67%……#n好吧，估計完成了50%左右！"
80000111-70 = "[s]「剛剛是不是瞬間少掉了30%？蓮華！？」"
80000111-71 = "沒事的！那個，不是有句話說「好的開始是成功的一半」嗎？"
80000111-72 = "[s]「這發言不禁讓人開始懷疑剩下的那一半……！」"
80000111-73 = "沒，沒問題的！今天還有很多時間。"
80000111-74 = "那麼師父！完成之後我會聯絡你！"
80000111-79 = "（然後又過了3小時……）"
80000111-83 = "[ns]「你好……」"
80000111-84 = "抱歉！師父！再一下……！再等我一下！"
80000111-85 = "我剛明白了隔水加熱的意思！"
80000111-86 = "難怪！原來巧克力不能直接用火來融化啊！又學到了一課！"
80000111-87 = "青春就是不斷的學習對吧！"
80000111-88 = "[s]「啊，呃，嗯……」"
80000111-89 = "那麼師父……我完成之後馬上打電話給你！馬上就好……！"
80000111-96 = "（在蓮華的最後一通電話後，又過了3小時……）"
80000111-100 = "[ns]「這次沒有打電話呢……蓮華他沒事吧。」"
80000111-101 = "（稍微考慮了一下要不要繼續等待蓮華的電話）"
80000111-105 = "[ns]「還是去找他吧。」"
80000111-109 = "百花繚亂廚房"
80000111-110 = "[ns]「一盞燈都沒開呢……」"
80000111-111 = "（花費了一些時間，尋找蓮華可能會在的地方）"
80000111-115 = "唔唔，不管怎麼做，巧克力都無法成形……#n再這樣下去時間又要……"
80000111-116 = "[s]「……蓮華？」"
80000111-120 = "老，老師……？你怎麼會在這裡……"
80000111-121 = "啊……因為我一直沒有聯絡，所以才……"
80000111-122 = "……唔。"
80000111-123 = "抱歉！老師！關於這件事……！"
80000111-127 = "[ns]「你無法……如願做出滿意的巧克力？」"
80000111-128 = "我真丟臉……"
80000111-129 = "為了讓今天成為最棒的情人節，#n我無論如何都想做出自己能做到的……最棒的情人節巧克力……"
80000111-130 = "把話說得那麼好聽，結果卻讓老師等到這麼晚……真的很抱歉！"
80000111-131 = "……想想這也不奇怪。#n連料理都做不好的我，怎麼可能做得好巧克力呢。"
80000111-132 = "啊哈哈……我真為不自量力、在老師面前信口開河的自己感到羞愧……"
80000111-137 = "對不起……很難看對吧……？"
80000111-138 = "早知道會這樣，還不如一開始就不要有送巧克力的想法……"
80000111-139 = "[s]「不，我完全不這麼認為，蓮華。」"
80000111-140 = "老……師？"
80000111-141 = "[s3]「當蓮華充滿自信地說要送巧克力給我的時候……」\n[s4]「我真的很高興。因為蓮華是為了我而下定決心的。」"
80000111-144 = "所以……你不會只因為我製作巧克力失敗而感到失望？"
80000111-145 = "反而覺得……"
80000111-146 = "[s]「經歷失敗也是青春的一部分，對吧？失敗的話再重新挑戰就行了。」"
80000111-148 = "[ns]「如果你有需要，我也很樂意幫忙。畢竟我可是蓮華的師父啊？」"
80000111-149 = "老師……不，師父……"
80000111-153 = "……嗯！"
80000111-154 = "因為今天總是失敗，我好像也在不知不覺間有點洩氣了。"
80000111-155 = "這樣並不像我！"
80000111-156 = "呵呵。"
80000111-157 = "……那麼，雖然這樣很不知羞恥，不過師父。"
80000111-158 = "可以請你幫我一起做巧克力……嗎？"
80000111-159 = "[s]「嗯，那當然。」"
80000111-165 = "（於是就與蓮華一起，在熱鍋前度過了不知多少時間……）"
80000111-169 = "啊……這，這次終於……"
80000111-174 = "多虧了老師，總算是在今天結束之前完成了……！"
80000111-175 = "[s]「呼，真是太好了，蓮華。」"
80000111-176 = "啊……嗯，真的很謝謝你，師父。"
80000111-177 = "我最近經常覺得……#n如果沒有師父的教導，真不知道該怎麼辦才好……連我自己也有點驚訝。"
80000111-178 = "真的很慶幸能有師父在身邊……"
80000111-179 = "啊！現在不是說這些的時候了。#n雖然是我們一起製作的，這樣說可能有點奇怪……"
80000111-180 = "師父！在今天結束之前，這個巧克力……"
80000111-181 = "[s]「嗯，一起吃吧？」"
80000111-186 = "（和蓮華一起努力製作的巧克力，味道既溫暖又甜蜜）"

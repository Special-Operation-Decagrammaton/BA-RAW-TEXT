[translation]
80000111-1 = "ความพยายามอย่างเต็มที่เพื่อวัยรุ่น"
80000111-2 = "สำนักงานชาเล่ต์"
80000111-3 = "อย่างที่คุณครูรู้ว่าวันนี้คือวันวาเลนไทน์"
80000111-4 = "[s] \"อ่า... อื้ม\""
80000111-5 = "วันวาเลนไทน์ก็คือหัวใจสำคัญของวัยรุ่น... จะเรียกว่าวันนี้เป็นวันแห่งวัยรุ่นก็ยังได้!"
80000111-6 = "ถ้าถามว่าวันนี้พิเศษขนาดไหนละก็ มันพิเศษขนาดที่ถ้าถามใครว่า <วันไหนใน 365 วันที่คิดว่าเป็นวัน#nแห่งวัยรุ่นที่สุดของปี?>"
80000111-7 = "ก็จะได้คำตอบแตกต่างกันไปว่า <วันเข้าเรียน> <วันเรียนจบ> <วันคริสต์มาสอีฟ> <วันงานเทศกาล#nดอกไม้ไฟฤดูร้อน> <วันแรกของปีใหม่> หรือ <วันที่โต้รุ่งรอเทศกาลของโรงเรียน>"
80000111-8 = "แต่ถ้าพูดถึงวันวาเลนไทน์ คนฟังก็จะพยักหน้าหงึกๆ เพราะเป็นคำตอบที่ไม่แปลกเลย ก็มันเป็นหนึ่งในวันตัวแทนแห่งวัยรุ่นนี่นา"
80000111-9 = "[s] \"วันตัวแทนแห่งวัยรุ่นมีมากกว่าที่ครูคิดอีกนะ...\""
80000111-10 = "อ่า... แต่มันก็ไม่แปลกหรอกน่า"
80000111-11 = "เพราะสำหรับ <ผู้ฝึกฝนวัยรุ่น> อย่างพวกเราแล้ว จะบอกว่าทุกวันเป็นวันแห่งวัยรุ่นก็ไม่ผิด"
80000111-12 = "ขอบอกเลยว่าถ้าใครมาถามคำถามนั้นกับฉัน ฉันจะตอบอย่างไม่ลังเลเลยว่าวันแห่งวัยรุ่นก็คือ...!"
80000111-13 = "<วันนี้> ยังไงล่ะ!"
80000111-14 = "สำหรับฉันที่ได้ทำ <กิจกรรมวัยรุ่น> กับคุณครู... ไม่สิ กับท่านอาจารย์แล้ว ทุกๆ วันก็คือวันแห่งวัยรุ่น#nนั่นแหละ"
80000111-15 = "[s1] \"แล้ววันที่เป็นตัวแทนแห่งวัยรุ่นหายไปไหนแล้ว!\"\n[s2] \"อ่า... แต่ครูก็ดีใจที่ได้ยินคำตอบแบบนั้นจากเรนเกะนะ!\""
80000111-18 = "จะยังไงก็ช่างเถอะ... เพราะสิ่งที่สำคัญคือ"
80000111-19 = "ถ้าเราเอาแต่นั่งเหม่อลอยในวันวาเลนไทน์ที่สำคัญกับวัยรุ่นแบบนี้ จะเสียชื่อ <ผู้ชี้แนะชีวิตวัยรุ่น> ของท่านอาจารย์เอานะ"
80000111-20 = "เพราะงั้น... สิ่งที่ต้องทำเป็นพิเศษในวันนี้ก็คือ!"
80000111-21 = "[s] \"สิ่งที่ต้องทำเป็นพิเศษเหรอ...\""
80000111-22 = "ในฐานะ <วัยรุ่นผู้มีประสบการณ์> ที่คลั่งไคล้การทำ <กิจกรรมวัยรุ่น> กับท่านอาจารย์..."
80000111-23 = "ฉันอยากทำให้วันนี้เป็นสุดยอดวันวาเลนไทน์ที่ท่านอาจารย์จะไม่ลืมอย่างเด็ดขาดเลย!"
80000111-24 = "ฉันก็เลยตัดสินใจแล้วน่ะ"
80000111-25 = "ว่าฉันจะทำ <ช็อกโกแลตวาเลนไทน์> ที่ตรงกับเป้าหมายของฉัน... แล้วก็เอามาให้ท่านอาจารย์"
80000111-26 = "ว่ายังไงล่ะท่านอาจารย์!? แผนการของฉันใช้ได้เลยใช่มั้ย?"
80000111-27 = "[s] \"พอเรนเกะพูดอย่างนั้น ครูก็ดีใจนะ\""
80000111-28 = "ใช่มั้ยล่ะ~? ฮ่าฮ่าฮ่า"
80000111-29 = "ฉันจะใช้ประสบการณ์จากกิจกรรมวัยรุ่นมากมายที่ท่านอาจารย์สั่งสอนฉันมา..."
80000111-30 = "แล้วทำให้เห็นความพยายามอย่างเต็มที่เพื่อวัยรุ่นของฟูวะ เรนเกะคนนี้! ตั้งตารอได้เลย!"
80000111-31 = "[s] \"อืม ถ้าเรนเกะจะพูดถึงขนาดนั้นละก็...\""
80000111-32 = "อื้ม! ถ้างั้นก็... อาดิโอส! ท่านอาจารย์!"
80000111-36 = "[ns] \"ยังไม่ทันได้พูดว่า 'จะตั้งตารอนะ' เลย แต่ก็ไปซะแล้ว\""
80000111-38 = "(หลังจากได้ยินเสียงตะโกนที่เด็ดเดี่ยวของเรนเกะ คุณครูก็กลายเป็นฝ่ายที่ต้องมารออยู่ที่ชาเล่ต์)"
80000111-42 = "(แต่เรนเกะก็ไม่ได้ติดต่อมาแต่อย่างใด)"
80000111-45 = "(หลังจากนั้น 3 ชั่วโมง...)"
80000111-50 = "[ns] \"ฮัลโหล เรนเกะ ช็อกโกแลตเสร็จหรือยัง...\""
80000111-54 = "อ่า... โทษที ท่านอาจารย์! ฉันว่าน่าจะใช้เวลาทำช็อกโกแลตนานหน่อยน่ะ ก็เลยโทรมาบอกก่อน"
80000111-55 = "พอดีว่าวิธีทำมันยุ่งยากเอามากๆ ช่วยรอฉันอีกหน่อยนะ!"
80000111-56 = "[s] \"อ่า... อื้ม เข้าใจแล้ว ไม่ต้องหักโหมมากล่ะ\""
80000111-57 = "เรื่องนั้นไม่ต้องห่วงหรอก ฉันเริ่มจับทางได้แล้วละ งั้นแค่นี้ก่อนนะ!"
80000111-62 = "(หลังจากเรนเกะวางสายไป 3 ชั่วโมง...)"
80000111-66 = "[ns] \"อื้ม เรนเกะ ช็อกโกแลตเสร็จแล้วเหรอ...\""
80000111-67 = "ท่านอาจารย์ ฉันโทรมาเรื่องช็อกโกแลตนี่แหละ"
80000111-68 = "ขอโทษนะ ท่านอาจารย์! ช่วยรออีกนิด! อีกนิดเดียวนะ ใกล้จะเสร็จแล้วละ หรือต้องบอกว่าเสร็จเรียบร้อยแล้วดีนะ"
80000111-69 = "ฉันคิดว่าตอนนี้คืบหน้าแล้วประมาณ 80%... ไม่สิ 78%... หรือว่า 67 นะ... ใช่แล้วละ เอาเลขกลมๆ ที่ 50% แล้วกัน น่าจะเสร็จประมาณนี้ละ!"
80000111-70 = "[s] \"จู่ๆ ก็หายไป 30% เลยนะ แบบนี้ก็ได้เหรอเรนเกะ?!\""
80000111-71 = "ไม่เป็นไรหรอก! ว่ากันว่าเริ่มต้นดีมีชัยไปกว่าครึ่งไม่ใช่เหรอ?"
80000111-72 = "[s] \"พูดแบบนั้นครูยิ่งสงสัยว่าครึ่งหนึ่งนั่นเป็นยังไงมากกว่านะ...!\""
80000111-73 = "มะ... ไม่เป็นไรหรอก! ยังไม่หมดวันเลย ยังทันน่า"
80000111-74 = "งั้นแค่นี้ก่อนนะ! ท่านอาจารย์! ไว้เสร็จแล้วฉันจะติดต่อไปนะ!"
80000111-79 = "(อีก 3 ชั่วโมงต่อมา...)"
80000111-83 = "[ns] \"ฮัลโหล...\""
80000111-84 = "ขอโทษนะ! ท่านอาจารย์! อีกนิดเดียว...! ช่วยรอฉันอีกนิดเดียวนะ!"
80000111-85 = "ฉันเพิ่งได้เรียนรู้เกี่ยวกับการละลายช็อกโกแลตเมื่อกี้เองน่ะ! "
80000111-86 = "ถึงว่าล่ะ! ช็อกโกแลตเป็นสิ่งที่ไม่ควรเอาไปละลายกับไฟโดยตรงสินะ! ได้เรียนรู้อะไรใหม่ๆ อีกอย่างแล้ว!"
80000111-87 = "วัยรุ่นคือวัยที่ต้องเรียนรู้อย่างไม่มีสิ้นสุด!"
80000111-88 = "[s] \"อ่า... อะ... อืม...\""
80000111-89 = "งั้นถ้าเสร็จแล้วฉันจะโทรมาใหม่นะท่านอาจารย์! แล้วจะรีบโทรเลย...!"
80000111-96 = "(อีก 3 ชั่วโมงหลังจากเรนเกะวางสายไป...)"
80000111-100 = "[ns] \"ไม่เห็นโทรมาเลยแฮะ... เรนเกะยังโอเคไหมเนี่ย\""
80000111-101 = "(คุณครูคิดกังวลว่าควรรอโทรศัพท์จากเรนเกะอีกหน่อยหรือเปล่า)"
80000111-105 = "[ns] \"ลองไปหาดีไหมนะ\""
80000111-109 = "ห้องครัวเฮียกกะเรียวรัน"
80000111-110 = "[ns] \"ปิดไฟไว้ทั้งห้องเลยแฮะ...\""
80000111-111 = "(คุณครูเดินเตร็ดเตร่หาตามสถานที่ที่คิดว่าเรนเกะจะไปอยู่)"
80000111-115 = "อึก... รูปร่างของช็อกโกแลตมัน... แต่ว่าเวลาก็ปาไปป่านนี้แล้ว..."
80000111-116 = "[s] \"เรนเกะ...?\""
80000111-120 = "คะ... คุณครู...? คุณครูมาที่นี่ได้ยังไง..."
80000111-121 = "อ่า... พอฉันไม่โทรไปก็เลยเป็นห่วง ก็เลยมาตามหาถึงที่นี่งั้นเหรอ..."
80000111-122 = "อึก..."
80000111-123 = "ขอโทษนะ! คุณครู! พอดีว่า...!"
80000111-127 = "[ns] \"ทำช็อกโกแลตออกมาไม่ได้ตามที่ตั้งใจเหรอ?\""
80000111-128 = "มันน่าขายหน้าจริงๆ เลยคุณครู..."
80000111-129 = "ฉันอยากทำช็อกโกแลตที่ดีที่สุดที่ฉันทำได้... เพื่อทำให้วันนี้เป็นวันวาเลนไทน์ที่ยอดเยี่ยมที่สุดแท้ๆ... "
80000111-130 = "ขอโทษนะ...! ฉันคุยโวไปเสียยกใหญ่ แต่สุดท้ายก็ทำให้คุณครูต้องรอจนป่านนี้..."
80000111-131 = "แต่ก็นะ คนที่ทำอาหารไม่เป็นอย่างฉันไปจะทำช็อกโกแลตได้ยังไงกัน"
80000111-132 = "แหะๆๆ... อายจังเลยที่ฉันไปตะโกนอย่างมุ่งมั่นต่อหน้าคุณครู ฉันนี่ไม่ดูสภาพตัวเองเลย..."
80000111-137 = "ขอโทษนะ... ฉันน่าละอายใช่มั้ย...?"
80000111-138 = "ถ้ารู้ว่าจะเป็นอย่างนี้ ฉันคงไม่เล่นใหญ่ว่าจะให้ช็อกโกแลตคุณครูตั้งแต่แรก..."
80000111-139 = "[s] \"ไม่หรอก ไม่ใช่อย่างนั้นเลยนะ เรนเกะ\""
80000111-140 = "คุณ... ครู...?"
80000111-141 = "[s3] \"ตอนเรนเกะพูดอย่างมั่นใจว่าจะให้ช็อกโกแลต ครูดีใจนะ\"\n[s4] \"ครูดีใจมากเลยนะ เพราะเรนเกะตัดสินใจจะทำเพื่อครู\""
80000111-144 = "เพราะงั้นก็เลยไม่ผิดหวัง... ต่อให้ฉันทำช็อกโกแลตไม่สำเร็จงั้นเหรอ?"
80000111-145 = "เป็นแบบนี้ไปได้ยังไง..."
80000111-146 = "[s] \"ความล้มเหลวก็เป็นส่วนหนึ่งของวัยรุ่นนะ ถึงล้มเหลวก็ลองใหม่ได้เสมอ\""
80000111-148 = "[ns] \"ถ้าอยากให้ครูช่วยก็บอกได้เลย ก็ครูเป็นท่านอาจารย์ของเรนเกะนี่นา?\""
80000111-149 = "คุณครู... ไม่สิ ท่านอาจารย์..."
80000111-153 = "อื้ม...!"
80000111-154 = "พอฉันล้มเหลวอยู่หลายครั้งติดต่อกัน ฉันก็เลยหมดกำลังใจไปโดยไม่รู้ตัวน่ะ"
80000111-155 = "แบบนี้ไม่สมกับเป็นฉันเลย!"
80000111-156 = "ฮึ่ม"
80000111-157 = "ถ้างั้น... ถึงจะน่าละอาย... แต่ท่านอาจารย์..."
80000111-158 = "ช่วยฉันทำช็อกโกแลต... หน่อยได้มั้ย?"
80000111-159 = "[s] \"อืม ได้อยู่แล้ว\""
80000111-165 = "(หลังจากนั้นคุณครูกับเรนเกะก็ใช้เวลาอยู่หน้าเตาร้อนๆ ด้วยกัน...)"
80000111-169 = "อ่า... ในที่สุดก็..."
80000111-174 = "ทำเสร็จก่อนที่จะหมดวันจนได้ ต้องขอบคุณท่านอาจารย์เลยนะ...!"
80000111-175 = "[s] \"ฮู่ว... โล่งอกไปทีนะ เรนเกะ\""
80000111-176 = "อ่า... อืม ขอบคุณมากนะ ท่านอาจารย์"
80000111-177 = "ฉันซาบซึ้งทุกครั้งที่ได้รับการสั่งสอนและความช่วยเหลือจากท่านอาจารย์เลยละ ถ้าชีวิตนี้ฉันไม่มีท่านอาจารย์คงแย่แน่"
80000111-178 = "ดีจังเลยนะที่ฉันได้มาเจอท่านอาจารย์..."
80000111-179 = "อ๊ะ! นี่ไม่ใช่เวลาจะมาอยู่อย่างนี้สิ เราช่วยกันทำขึ้นมาแท้ๆ จะให้ฉันพูดอย่างนี้คงน่าอายหน่อยๆ แต่ก็..."
80000111-180 = "ท่านอาจารย์! ก่อนที่วันนี้จะล่วงเลยไป ช่วยรับช็อกโกแลตนี้ไว้..."
80000111-181 = "[s] \"อื้ม มากินด้วยกันมั้ย?\""
80000111-186 = "(ช็อกโกแลตที่คุณครูช่วยกันทำกับเรนเกะทั้งอบอุ่นและหอมหวาน)"

[translation]
80000111-1 = "Going All-Out for Youth"
80000111-2 = "Schale Executive Office"
80000111-3 = "Sensei. As you probably know, today is Valentine's Day."
80000111-4 = "[s] \"Oh, yeah. Right.\""
80000111-5 = "Valentine's Day is so foundational to young people, it should be renamed The Youth Day!"
80000111-6 = "If we were to talk about how iconic it is... If someone were to ask \"what's the most youthful day of the year?\""
80000111-7 = "It wouldn't be a surprise for this day to be discussed alongside \"first day at school,\" \"graduation day,\" \"Christmas Eve,\" \"summer fireworks festival,\" \"New Year's Day,\" and \"the night before the academy festival where you stay up all night.\""
80000111-8 = "Valentine's Day is truly a symbol of the passion of youth."
80000111-9 = "[s] \"Doesn't that list have too many other days on it to call Valentine's Day iconic?\""
80000111-10 = "Hm? No... The list is perfectly fine."
80000111-11 = "With the right mindset, any day could be youthful to youth acolytes like us."
80000111-12 = "Oh and for the record, should anyone ask me, I won't hesitate to answer them exactly like this."
80000111-13 = "We live in the present! Every new today is the most youthful day of all!"
80000111-14 = "For me, who pursues youthful activities with Sensei—Er, I mean, Mentor, every day is brimming with youth."
80000111-15 = "[s1] \"Look at how you glide past everything you just said!\"\n[s2] \"Well, at least your words warm my heart!\""
80000111-18 = "Anyway... Here's what matters most."
80000111-19 = "We would bring shame to our standing as youth mentors if we just sat around and did nothing on a day as youthful as Valentine's Day."
80000111-20 = "Above all, there's one thing we absolutely must do today, don't you think?"
80000111-21 = "[s] \"What starts with a C and ends in an E?\""
80000111-22 = "As a youth intermediator, devoted to youthful activities with their mentor..."
80000111-23 = "I want to make today a Valentine's Day so great, Sensei will never forget it!"
80000111-24 = "So, I've decided."
80000111-25 = "I shall craft a super cool Valentine's chocolate worthy of my goal...and give it to you, Sensei."
80000111-26 = "What do you think of my plan, Sensei?!"
80000111-27 = "[s] \"I think it makes me pretty happy, Renge.\""
80000111-28 = "It does? Ahaha."
80000111-29 = "I shall use the countless youthful experiences my Mentor showed me as a guide..."
80000111-30 = "And show you the very best of me, Fuwa Renge. Please look forward to it!"
80000111-31 = "[s] \"Sure. Whatever you say, Renge...\""
80000111-32 = "All righty, then. Adios, Mentor!"
80000111-36 = "[ns] \"I'll be looking forward to—And she's gone.\""
80000111-38 = "After Renge's confident proclamation, I waited patiently at Schale."
80000111-42 = "Alas, things never go exactly as planned."
80000111-45 = "Three hours after Renge left..."
80000111-50 = "[ns] \"Hi Renge, is the chocolate ready...?\""
80000111-54 = "Ah, sorry, Mentor. I called you to let you know that it's going to take a while on the chocolate."
80000111-55 = "It's going well though, so please wait just a little longer!"
80000111-56 = "[s] \"Ah, great. Okay. Just don't go overboard.\""
80000111-57 = "Don't worry about it. I'm slowly getting the hang of it. Now then!"
80000111-62 = "Three MORE hours after Renge's call..."
80000111-66 = "[ns] \"Uh, Renge. Is the chocolate...?\""
80000111-67 = "I called you exactly because of that!"
80000111-68 = "Sorry, Mentor! It'll be juuuuust a little bit more! I'm so close."
80000111-69 = "The way I see it, I figure I'm like 80%...mmm, 78%...no, 67... Yeah, roughly around 50% done!"
80000111-70 = "[s] \"How do you lose 30% of your progress in a few seconds, Renge?!\""
80000111-71 = "It's fine! They say well begun is half done, right?"
80000111-72 = "[s] \"That statement has me wondering if you're even half done!\""
80000111-73 = "I-It's fine! We still have plenty of time in the day!"
80000111-74 = "Okay then! I'll call you once I'm done, Mentor!"
80000111-79 = "ANOTHER three hours later..."
80000111-83 = "[ns] \"Hel—\""
80000111-84 = "Sorry! Mentor! Please be patient! It's just a bit more!"
80000111-85 = "I just learned what double boiling is! "
80000111-86 = "No wonder I had so much trouble! I wasn't supposed to directly melt chocolate over a fire!"
80000111-87 = "It seems youth's all about learning new things!"
80000111-88 = "[s] \"Uh, s-sure...\""
80000111-89 = "Okay then, Mentor... I will call you as soon as I'm wrapped up! Not a moment sooner!"
80000111-96 = "Yet another three hours from Renge's last call..."
80000111-100 = "[ns] \"Renge didn't call me this time... I hope she's okay.\""
80000111-101 = "I thought about waiting for her call, but..."
80000111-105 = "[ns] \"Maybe I should check in.\""
80000111-109 = "Hyakkaryouran Kitchen"
80000111-110 = "[ns] \"All the lights are out...\""
80000111-111 = "I searched around the places I thought Renge might be."
80000111-115 = "Ugh, no matter what I do, I can't get the shape right... At this rate, I won't make it in time..."
80000111-116 = "[s] \"...Renge?\""
80000111-120 = "S-Sensei?! Why are you here?"
80000111-121 = "Ah... You got worried because I didn't call you..."
80000111-122 = "...Ugh."
80000111-123 = "I'm so sorry, Sensei! The thing is—!"
80000111-127 = "[ns] \"You couldn't make the chocolate how you wanted to, right?\""
80000111-128 = "I have no excuses, Sensei..."
80000111-129 = "I was trying to make today the greatest Valentine's Day...so I wanted to make the greatest Valentine's chocolate..."
80000111-130 = "I'm sorry! After all that bravado, I ended up making you wait until it got so late..."
80000111-131 = "...I can't even cook properly! No surprise I can't make good chocolate."
80000111-132 = "Ahaha... I ran my mouth off in front of Sensei instead of knowing my place... I'm so ashamed..."
80000111-137 = "Sorry... You don't want to hear about how I'm such a mess, right?"
80000111-138 = "If I had known it was going to end up like this, I would have never come up with this chocolate gift plan in the first place..."
80000111-139 = "[s] \"No...that's not true at all, Renge.\""
80000111-140 = "Sen...sei?"
80000111-141 = "[s3] \"Renge, the confident way you said you'd make me chocolate...\"\n[s4] \"It made me happy. Because it was something you decided for yourself.\""
80000111-144 = "So...you're not disappointed that I failed to make your chocolate?"
80000111-145 = "You're really—"
80000111-146 = "[s] \"Failure is part of youth. But failing means you get to try again.\""
80000111-148 = "[ns] \"I can help you as much as you like. I'm your mentor, after all.\""
80000111-149 = "Sen—No, Mentor..."
80000111-153 = "...Yes!"
80000111-154 = "I got a little discouraged from failing over and over again."
80000111-155 = "But that's not like me at all!"
80000111-156 = "Ahem."
80000111-157 = "...In that case, while it's a bit shameless of me..."
80000111-158 = "Would you help me make some chocolate?"
80000111-159 = "[s] \"Of course.\""
80000111-165 = "After several minutes standing over a hot pot with Renge..."
80000111-169 = "Ah... F-Finally..."
80000111-174 = "I was able to f-finish it before the end of the day! All thanks to you, Mentor!"
80000111-175 = "[s] \"Phew, that's a relief.\""
80000111-176 = "Ah... But really, thank you so much, Mentor."
80000111-177 = "I'm always a little shaken thinking about how things might've gone without your teachings, Mentor."
80000111-178 = "I'm so glad to have you with me..."
80000111-179 = "Ah! I shouldn't be wasting time like this! Although it's a bit awkward since we made this together."
80000111-180 = "Mentor! Before the day passes, shall we—"
80000111-181 = "[s] \"Share the chocolate? Of course.\""
80000111-186 = "The chocolate I made with Renge was warm and very sweet."

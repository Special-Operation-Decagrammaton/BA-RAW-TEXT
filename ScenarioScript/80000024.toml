[translation]
80000024-1 = "偽裝螺絲"
80000024-2 = "夏萊．居住區"
80000024-3 = "（夏萊突然停電，於是請詠葉來幫忙）"
80000024-10 = "呼，幸好不是什麼大問題。"
80000024-11 = "似乎是配電箱的蓋子鬆脫，碰到了斷路器的開關。"
80000024-12 = "以防萬一看了一下其他部分並沒有什麼問題，不過得換掉鬆掉的蓋子。"
80000024-13 = "老師，可以幫我用手稍微固定一下嗎？"
80000024-14 = "我從這邊依序鎖上螺絲。"
80000024-15 = "[s]「嗯，知道了。」"
80000024-19 = "放進這裡，嘿咻……"
80000024-24 = "嗯？壞掉了？"
80000024-25 = "我沒出什麼力呀……是瑕疵品嗎？"
80000024-26 = "沒辦法，用其他螺絲吧……"
80000024-31 = "……又斷掉了？"
80000024-32 = "居然連續斷掉兩次，再怎麼說這也有點奇怪了吧……"
80000024-33 = "零件的耐久度會直接影響到使用時的穩定性。"
80000024-34 = "真是的，到底是哪個企業生產這種……"
80000024-38 = "這是……？"
80000024-39 = "啊，原來是我的問題。"
80000024-40 = "[s]「怎麼說呢？」"
80000024-41 = "老師，你看這個。"
80000024-46 = "[ns]「這……雖然堅硬，但裡面是巧克力？」"
80000024-47 = "沒錯，也就是說那不是真正的螺絲。"
80000024-48 = "之前亞都梨和響說這個造型很有趣，就買起來方便隨時補充糖分。"
80000024-49 = "雖然外表堅硬但本質上還是巧克力，會壞掉也是沒辦法的。#n或許反而該慶幸沒把它放進去。"
80000024-50 = "看來得回去一趟，拿真正的螺絲來才行。"
80000024-55 = "……"
80000024-56 = "不好意思，老師。在我回去的時候，你就吃一點這個吧。"
80000024-57 = "造型怎樣先不說，味道倒是還不賴哦。"

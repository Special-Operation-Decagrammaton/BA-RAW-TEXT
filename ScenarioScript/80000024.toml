80000024-54 = "3;우타하;02\n#3;em;[반응]\n#wait;1500"
80000024-55 = "3;우타하;02;음……."
80000024-56 = "3;우타하;03;선생님, 내가 다녀오는 동안 이 나사 초콜릿이라도 잠깐 먹고 있을래?\n#3;m3"
80000024-57 = "3;우타하;03;모양은 기계 부품처럼 생기긴 했지만, 맛은 제법 나쁘지 않을 거야.\n#3;em;[///]\n#3;greeting"

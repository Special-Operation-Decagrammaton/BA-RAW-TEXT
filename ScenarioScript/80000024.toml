80000024-10 = "3;우타하;01;후우, 드디어 해결했네.\n#3;em;[땀]\n#3;a"
80000024-11 = "3;우타하;01;큰 문제는 아니었어. 서킷 박스의 커버가 헐거워지면서 차단기의 버튼을 건드린 모양이야."
80000024-12 = "3;우타하;99;전선을 손봐야 할 필요는 없겠지만, 헐거워진 커버는 새로 교체해야겠어.\n#3;em;[...]"
80000024-13 = "3;우타하;03;선생님. 잠깐 그쪽의 경첩을 손으로 고정하고 있어 줄래?\n#3;em;[반응]"
80000024-14 = "3;우타하;05;그동안 내가 가져온 나사로 이쪽의 경첩을 고정할게."
80000024-15 = "[s] \"알겠어.\""
80000024-16 = "#st;[0,0];instant;1;"
80000024-17 = "#clearST"
80000024-18 = "3;우타하;05\n#3;greeting\n#wait;2500"
80000024-19 = "3;우타하;01;먼저 홈에 경첩을 끼우고, 그 위에 나사를 돌려 마무리를 하면……\n#3;em;[...]"
80000024-20 = "#st;[0,0];instant;1;"

80000024-23 = "#wait;1000"
80000024-24 = "3;우타하;07;응? 나사가 깨졌잖아?\n#3;em;[?]"
80000024-25 = "3;우타하;04;이상한 일이네. 다른 부분도 아니고 나사가 깨지다니…… 불량품이 섞였나?"
80000024-26 = "3;우타하;99;가져온 다른 나사로 다시 한번…….\n#3;em;[...]"
80000024-27 = "#st;[0,0];instant;1;"
80000024-28 = "#clearST"
80000024-29 = "3;우타하;99;\n#3;stiff\n#wait;1500"
80000024-30 = "3;우타하;07\n#3;shake\n#wait;1000"
80000024-31 = "3;우타하;07;다시 나사가 또 깨졌다고?\n#3;em;[?!]"
80000024-32 = "3;우타하;05;한 번도 아니고 두 번이나 연속으로 나사가 깨지다니, 이건 그냥 넘어갈 수 없겠네."
80000024-33 = "3;우타하;04;부품의 내구도는 사용자의 안전과도 직결될 수 있는 문제인데, 이런 불량품을 유통시키다니……\n#3;em;[빠직]"
80000024-34 = "3;우타하;05;어느 회사의 물건인지 확인해서 확실히 항의해야겠어!"
80000024-35 = "#st;[0,0];instant;1;"
80000024-36 = "#clearST"

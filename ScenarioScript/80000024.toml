[translation]
80000024-1 = "สกรูปลอม"
80000024-2 = "ที่พักชาเล่ต์"
80000024-3 = "(จู่ๆ ก็ที่ชาเล่ต์ก็ไฟดับอย่างกะทันหัน คุณครูจึงไปขอให้อุทาฮะที่เข้าเวรอยู่ที่ชาเล่ต์มาช่วย)"
80000024-10 = "ฮู่ว ในที่สุดก็แก้เสร็จแล้วละนะ"
80000024-11 = "ไม่ใช่ปัญหาใหญ่หรอก ดูเหมือนที่ครอบแผงวงจรจะหลุดแล้วไปโดนปุ่มบนเบรกเกอร์เข้าน่ะ"
80000024-12 = "ดูแล้วตรงสายไฟคงไม่ต้องซ่อม แต่คงจะต้องเปลี่ยนที่ครอบวงจรใหม่"
80000024-13 = "คุณครู ช่วยจับบานพับตรงด้านนั้นไว้ให้หน่อยได้มั้ย?"
80000024-14 = "ฉันจะใช้สกรูที่พกมายึดบานพับตรงด้านนี้เอง"
80000024-15 = "[s] \"ได้เลย\""
80000024-19 = "ขั้นแรกก็ใส่บานพับลงตรงช่องนี้ แล้วก็ใช้สกรูขันให้แน่น..."
80000024-24 = "หืม? สลักมันหักนี่นา?"
80000024-25 = "แปลกจังเลยนะ สกรูตรงนี้ดันมาหักซะได้... หรือเป็นของที่ไม่ได้คุณภาพนะ?"
80000024-26 = "ถ้างั้นลองใช้สกรูตัวอื่นที่พกมาแล้วกัน..."
80000024-31 = "สกรูตัวอื่นที่พกมาก็หักอีกงั้นเหรอ?"
80000024-32 = "สกรูหักติดต่อกันสองตัวเลยเหรอ... แบบนี้คงปล่อยผ่านไปไม่ได้แล้วล่ะ"
80000024-33 = "ความปลอดภัยของผู้ใช้งานขึ้นอยู่กับความแข็งแรงของอุปกรณ์แท้ๆ... แต่กลับปล่อยให้อุปกรณ์#nหลุดคิวซีแบบนี้มาเหรอ..."
80000024-34 = "คงต้องไปตรวจสอบดูแล้วล่ะ ว่าเป็นอุปกรณ์จากบริษัทไหน!"
80000024-38 = "เอ๊ะ นี่มัน...?"
80000024-39 = "ฮ่าฮ่า... ปัญหาเกิดจากตรงนี้เองเหรอ"
80000024-40 = "[s] \"เจออะไรงั้นเหรอ?\""
80000024-41 = "คุณครู ลองเอาเล็บขูดสกรูที่ฉันส่งไปให้ดูสิ"
80000024-46 = "[ns] \"นี่มัน...ช็อกโกแลตนี่นา?\""
80000024-47 = "อื้อ นี่ไม่ใช่สกรูจริงๆ แต่เป็นช็อกโกแลตรูปสกรูน่ะ"
80000024-48 = "ตอนนั้นโคโทริกับฮิบิกิเห็นว่ามันน่าสนุกดีก็เลยซื้อเอามาเก็บไว้ แล้วก็ลืมไปซะสนิทเลย"
80000024-49 = "ข้างในไม่ใช่เหล็กแต่เป็นช็อกโกแลต เพราะงั้นพอใช้แรงกดลงไปมันเลยหักน่ะ ดีแล้วล่ะที่เจอก่อน"
80000024-50 = "สงสัยคงต้องกลับไปเอาสกรูใหม่ที่ชมรมมาก่อนแล้วละนะ"
80000024-55 = "อืม..."
80000024-56 = "ระหว่างที่ฉันกลับไปเอาสกรูมา คุณครูก็กินช็อกโกแลตรูปสกรูนี่รอไปพลางๆ ก่อนดีมั้ย?"
80000024-57 = "ถึงหน้าตามันจะเหมือนอุปกรณ์ช่างไปบ้าง แต่รสชาติก็อร่อยใช้ได้อยู่นะ"

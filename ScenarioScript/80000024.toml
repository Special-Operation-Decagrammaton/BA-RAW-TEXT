80000024-38 = "3;우타하;07;어라, 이건……?\n#3;em;[?]\n#3;stiff"
80000024-39 = "3;우타하;03;하하…… 결국 이쪽 문제였나."
80000024-40 = "[s] \"특별한 거라도 찾았어?\""
80000024-41 = "3;우타하;02;선생님. 내가 준 나사의 표면을 한번 손톱으로 긁어봐."
80000024-42 = "#st;[0,0];instant;1;"
80000024-43 = "#clearST"
80000024-44 = "#wait;2000"
80000024-45 = "#wait;2000"
80000024-46 = "[ns] \"이건…… 초콜릿이잖아?\""
80000024-47 = "3;우타하;03;응. 그건 진짜 나사가 아니라, 나사 모양으로 포장한 초콜릿이야.\n#3;em;[반짝]"
80000024-48 = "3;우타하;99;전에 코토리와 히비키가 재미있어 보인다며 당분 보충용으로 사다 놓은 걸 까맣게 잊고 있었어."
80000024-49 = "3;우타하;03;안쪽이 금속이 아닌 초콜릿으로 되어 있었으니, 힘을 받으면 깨지는 게 당연하지. 미리 발견하게 되어서 다행이야."
80000024-50 = "3;우타하;01;아무래도 엔지니어부에 돌아가서 제대로 된 나사를 다시 가져와야겠네."

[translation]
1002002-1 = "คิดอะไรอยู่งั้นเหรอ?"
1002002-2 = "(สถานที่ที่โคฮารุเรียกมานี้ไม่ใช่ห้องสมุดหรือห้องเรียน แต่เป็นห้างสรรพสินค้า)"
1002002-3 = "(ได้ยินว่าเรียกมาเพื่อคุยเกี่ยวกับการเรียน...)"
1002002-4 = "มะ... มาแล้วเหรอ คุณครู"
1002002-5 = "กำลังรออยู่เลย มาตรงเวลาเป๊ะเลยนะ"
1002002-6 = "...หืม? ว่าไงนะ?"
1002002-7 = "ทำไมถึงจะมาเรียนหนังสือในห้างที่เสียงดังแบบนี้น่ะเหรอ?"
1002002-8 = "คือว่า...เรื่องนั้น!"
1002002-9 = "หืม? ถามว่าให้มาเที่ยวเล่นหรือเปล่าน่ะเหรอ...?"
1002002-10 = "เปล่านะ ไม่ใช่อย่างนั้น…"
1002002-11 = "คาบเรียนเสริม... ครั้งนี้ก็ใกล้เคียงนะ..."
1002002-12 = "ฉันจะถามว่าคุณครูจะอธิบายให้เข้าใจง่ายขึ้นหน่อย..."
1002002-13 = "เรื่องนี้ต้องให้คุณครูช่วย... ใช่มั้ยล่ะ?"
1002002-14 = "...หืม? ไม่ใช่เรื่องนั้นเหรอ?"
1002002-15 = "สถานที่...?"
1002002-16 = "ห้องเรียนหรือห้องสมุด...!?"
1002002-17 = "สถานที่ที่ไม่มีคนและเงียบกว่านี้...?"
1002002-18 = "......"
1002002-20 = "พูดอะไรบ้าๆ ของครูน่ะ!? ไม่ได้! ไม่ไป! ไม่ได้เด็ดขาด!!"
1002002-21 = "คิดว่าฉันจะยอมทำเรื่องน่ารังเกียจอย่างนั้นเหรอ?!"
1002002-22 = "[s1] \"...เอ๋?\"\n[s2] \"เรื่องน่ารังเกียจ...?\""
1002002-23 = "ฉะ... ฉันถึงโทรเรียกให้มาสถานที่ที่คนเยอะๆ ยังไงล่ะ!"
1002002-24 = "ฉะ... ฉันถึงโทรเรียกให้มาสถานที่ที่คนเยอะๆ ยังไงล่ะ!"
1002002-25 = "คนอื่นๆ อาจรู้ไม่ทัน แต่ฉันรู้ทันหมดแหละ ฉันอ่านหนังสือมาแล้วนับไม่ถ้วน!"
1002002-26 = "ให้ไปห้องเรียนที่ไม่มีคน... แล้วทำแบบนั้นบนโต๊ะเรียน... ที่ขอบหน้าต่าง...!"
1002002-27 = "ห้องสมุดก็เหมือนกัน! จะทำแบบนั้นตรงระหว่างตู้หนังสือ...!"
1002002-28 = "ฉันรู้หมดนั่นแหละ! ฉันไม่ยอมให้มีเหตุการณ์แบบนั้นหรอก!"
1002002-29 = "[s3] \".......เอ๋??\"\n[s4] ขอดูหนังสือที่จะอ่านกันก่อน"
1002002-30 = "......"
1002002-31 = "......"
1002002-32 = "คิดไว้อยู่แล้วว่ามันจะมากกว่านั้น...?"
1002002-33 = "[s5] \"........เอ๋???\"\n[s6] \"หนังสือที่เอาให้ดูไม่ได้ หมายความว่า...?\""
1002002-34 = "คะ... คะ... คือ... คือว่า... ไม่ใช่อย่างนั้น..."
1002002-35 = "คะ... คะ... คือ... คือว่า... ไม่ใช่อย่างนั้น..."
1002002-36 = "......"
1002002-37 = "...หนะ... หนวกหู!!"
1002002-38 = "ทุเรศ! ไอ้โรคจิต!!!"
1002002-40 = "(......)"
1002002-41 = "(โคฮารุวิ่งหายออกไปด้านตรงกันข้ามโดยไม่เหลียวหลังกลับมา)"
1002002-42 = "[s] \"......????\""
1002002-44 = "(...ท้ายที่สุดก็ไม่ได้ข้อสรุปว่าหนังสือที่อ่านคืออะไร)"

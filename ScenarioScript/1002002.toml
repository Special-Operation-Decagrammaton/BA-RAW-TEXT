[translation]
1002002-1 = "What Are You Thinking About?"
1002002-2 = "(Koharu asked for help with her studies...)"
1002002-3 = "(...but for some reason asked to meet at a shopping mall rather than a library or classroom.)"
1002002-4 = "Th-There you are, Sensei."
1002002-5 = "I was waiting for you. Thank goodness you came on time."
1002002-6 = "What was that?"
1002002-7 = "Why come to a shopping mall to study?"
1002002-8 = "Well, that's because...!"
1002002-9 = "What? Did I only come here to goof off...?"
1002002-10 = "N-No. Of course not..."
1002002-11 = "I know falling behind is why I ended up in the Make-Up Work Club to begin with."
1002002-12 = "That's the whole reason I'm turning to you for help."
1002002-13 = "And that's your job as my sensei, isn't?"
1002002-14 = "Oh. You're saying that's not what you asked?"
1002002-15 = "You still want to know why this location..."
1002002-16 = "...and not somewhere like a classroom or library."
1002002-17 = "Why not go somewhere quieter?"
1002002-18 = "..."
1002002-20 = "A-Absolutely not! No way! Never!"
1002002-21 = "Do you really think I would do something so gross?!"
1002002-22 = "[s1] \"Come again?\"\n[s2] \"Why gross...?\""
1002002-23 = "I-I knew I did the right thing by calling you someplace crowded like downtown!"
1002002-24 = "I-I knew I did the right thing by calling you someplace crowded like downtown!"
1002002-25 = "I'm not like all the other girls! I've read all about it!"
1002002-26 = "In an empty classroom... On top of a desk... Even on a window sill!"
1002002-27 = "And that goes double for the library! I know what can go on between those bookshelves!"
1002002-28 = "I've read all about it, and I'm not going to fall for it!"
1002002-29 = "[s3] \"I am so lost.\"\n[s4] Ask to see the books she reads."
1002002-30 = "..."
1002002-31 = "..."
1002002-32 = "This is all happening so quickly..."
1002002-33 = "[s5] \"Am I missing something here?\"\n[s6] \"Can you not show me what you've been reading?\""
1002002-34 = "I-It's not like that."
1002002-35 = "I-It's not like that."
1002002-36 = "..."
1002002-37 = "N-Never mind!"
1002002-38 = "You're disgusting! Nothing but a pervert!"
1002002-40 = "(...)"
1002002-41 = "(Just like that, Koharu ran away and disappeared without even looking back.)"
1002002-42 = "[s] \"...?\""
1002002-44 = "(I never did figure out what kind of books Koharu reads.)"

[translation]
1002002-1 = "在想什麼呢？"
1002002-2 = "（小春所說的地點不是圖書館或教室，而是購物中心）"
1002002-3 = "（明明說是為了學習才叫我來的……？）"
1002002-4 = "3;코+하루;01;……你，你來了啊，老師。"
1002002-5 = "你來得還真準時，哼嗯……？"
1002002-6 = "……嗯？"
1002002-7 = "你問我明明要唸書，為什麼要來購物中心嗎……？"
1002002-8 = "那，那是因為……！"
1002002-9 = "嗯？你問我是不是順便出來玩的……？"
1002002-10 = "才，才沒有那回事……"
1002002-11 = "就只是，我這次的成績也是低空飛過……"
1002002-12 = "而既然要補課，我又聽說老師講解的會比較好懂……"
1002002-13 = "既，既然是老師，就會幫我補課吧……"
1002002-14 = "……嗯？不是那個意思？"
1002002-15 = "地點……？"
1002002-16 = "你說教室或圖書館會比較好……！？"
1002002-17 = "安，安靜無人的地方比較好……！！？"
1002002-18 = "……"
1002002-20 = "低，低級！你在說什麼啊！？不行！那種地方絕對不行！！"
1002002-21 = "你覺得我會呆呆地跟去那種下流場所嗎！？"
1002002-22 = "[s1] 「……咦？」\n[s2] 「下流場所……？」"
1002002-23 = "果，果然叫來這種人多的鬧區是正確的決定！"
1002002-24 = "果，果然叫來這種人多的鬧區是正確的決定！"
1002002-25 = "其他學生或許就上當了，但我可不吃這套！我已經在書裡看過很多這種情形了！"
1002002-26 = "在無人教室裡，在桌子上，在窗邊……做各種見不得人的事……！"
1002002-27 = "圖，圖書館也一樣！把人拉到圖書館深處，在看不清楚的書櫃之間做那種不健全的……！"
1002002-28 = "我全部都很清楚！我才不會被你的把戲給騙了！"
1002002-29 = "[s3] 「……？」\n[s4] 想要小春說明是在什麼書上看到的"
1002002-30 = "……"
1002002-31 = "……"
1002002-32 = "咦？難道老師單純想表達字面上的意思……？"
1002002-33 = "[s5] 「……？？？」\n[s6] 「難道是不好見人的書……？」"
1002002-34 = "不，不是，那個……"
1002002-35 = "不，不是，那個……"
1002002-36 = "……"
1002002-37 = "……吵，吵死了！！ "
1002002-38 = "低級！變態！大變態！！！"
1002002-40 = "（……）"
1002002-41 = "（小春就這樣頭也不回的，不知跑去哪了）"
1002002-42 = "[s] 「……？？？？」"
1002002-44 = "（……到最後也沒有說出她看的到底是哪些書）"

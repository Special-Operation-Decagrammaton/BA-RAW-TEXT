[translation]
1005302-1 = "จ๊อกกิ้งตอนเช้า"
1005302-2 = "เช้าตรู่ที่ทางเดินในสวนสาธารณะ"
1005302-3 = "(คุณครูบังเอิญเจอยูกะขณะออกมาเดินเล่นในตอนเช้า)"
1005302-9 = "[ns] \"สวัสดี ยูกะ\""
1005302-10 = "เอ๋ คุณครู...?"
1005302-11 = "บังเอิญจังเลยนะคะ ไม่คิดว่าจะได้เจอคุณครูที่ชานเมืองแต่เช้าแบบนี้"
1005302-12 = "[s1] \"ครูแค่อยากแวะมาเดินเล่นตอนเช้าน่ะ\"\n[s2] \"แล้วยูกะล่ะ มาทำอะไรแต่เช้า?\""
1005302-13 = "อ๋อ... งั้นเหรอคะ"
1005302-14 = "อ๋อ คือว่าเรื่องนั้น..."
1005302-15 = "ถ้าดูจากชุดที่ฉันใส่ก็น่าพอจะเดาได้แล้วนะ ฉันเองก็อยากมาออกกำลังกายเบาๆ ก่อนจะเริ่มงาน#nประจำวันน่ะค่ะ"
1005302-16 = "ฉันบอกไปแล้วนี่คะ ว่าใกล้จะถึงวันงานเทศกาลฮาโลเฟสติวัลที่ทางมิลเลเนียมเป็นเจ้าภาพแล้ว"
1005302-17 = "จริงอยู่ที่ฉันคงจะไม่มีโอกาสได้เป็นนักกีฬาตัวจริงเพราะจะต้องทำหน้าที่เป็นคณะกรรมการจัดงาน..."
1005302-18 = "แต่ถึงยังไงฉันก็เป็นกรรมการของโรงเรียนที่เป็นเจ้าภาพจัดงานครั้งนี้ ถ้าไม่เตรียมพร้อมร่างกาย#nและแสดงให้เห็นถึงภาพลักษณ์ที่ไม่ดีระหว่างการแข่งก็คงไม่ดีเท่าไรค่ะ"
1005302-19 = "นอกจากนี้ยังได้ยินมาว่าการออกกำลังกายเบาๆ เป็นประจำ จะช่วยเพิ่มประสิทธิภาพในการทำงาน#nด้วย..."
1005302-20 = "เพราะงั้นฉันเลยตัดสินใจออกมาวิ่งจ๊อกกิ้งตอนเช้าค่ะ"
1005302-21 = "อีกอย่าง... ช่วงนี้รู้สึกเหมือนน้ำหนักขึ้นด้วยค่ะ..."
1005302-22 = "[s] \"ตอนนี้ยูกะก็ดูดีอยู่แล้วนะ\""
1005302-23 = "ถะ...ถึงคุณครูจะพูดแบบนั้นก็เถอะค่ะ...!"
1005302-24 = "อะแฮ่ม... ยังไงก็ตาม ฉันจะฝึกพิเศษไปสักระยะหนึ่งค่ะ!"
1005302-25 = "ก่อนอื่นก็เริ่มจากการวิ่ง 5 กิโลเมตร—"
1005302-26 = "[s] \"ไม่โหดไปหน่อยสำหรับมือใหม่เหรอ?\""
1005302-27 = "ฮิฮิ ไม่ต้องห่วงค่ะ"
1005302-28 = "เรื่องความเร็วฉันอาจยังพูดได้ไม่เต็มปาก แต่ถ้าเรื่องความอึด ฉันมั่นใจมากนะคะ"
1005302-29 = "วิ่งแค่ 5 กิโลเมตร สบายมากค่ะ!"
1005302-30 = "[s] \"งั้นเดี๋ยวครูวิ่งไปด้วยแล้วกัน\""
1005302-31 = "คะ? คุณครูก็จะวิ่งด้วยกันงั้นเหรอคะ?"
1005302-32 = "ฉันไม่มีปัญหาหรอกค่ะ แต่ว่า... ถ้าต้องวิ่งตามจังหวะความเร็วของฉัน คุณครูจะไม่เป็นไรแน่เหรอคะ"
1005302-33 = "ถ้าเกิดวิ่งไม่ทัน ฉันจะทิ้งคุณครูไว้ตรงนั้นเลยนะคะ"
1005302-34 = "[s] \"เห็นใจครูบ้าง...\""
1005302-35 = "ล้อเล่นค่ะ..."
1005302-36 = "ถ้างั้นมาเริ่มจากวิ่งเหยาะๆ กันก่อนดีมั้ยคะ?"
1005302-38 = "(หลังจากนั้นคุณครูก็เริ่มวิ่งไปพร้อมกับยูกะ)"
1005302-43 = "(...10 นาทีต่อมา...)"
1005302-45 = "แฮ่ก... แฮ่ก... แฮ่ก..."
1005302-49 = "คะ... คุณครู... แฮ่ก... แฮ่ก... รอเดี๋ยวค่ะ..."
1005302-50 = "[s3] \"เป็นอะไรรึเปล่า?\"\n[s4] \"เหนื่อยแล้วเหรอ...?\""
1005302-51 = "มะ... ไม่เป็นไรค่ะ แฮ่ก... แฮ่ก... ยะ... ยังวิ่งไม่ถึง 10 นาทีเลย..."
1005302-52 = "มะ... ไม่ใช่ซะหน่อยค่ะ แฮ่ก... แฮ่ก... ยะ... ยังวิ่งไม่ถึง 10 นาทีเลย..."
1005302-53 = "นี่เพิ่งแค่จะวอร์มอัปเท่านั้น... จะมาเหนื่อย..."
1005302-57 = "...ได้ยังไงกันคะ"
1005302-58 = "[s] \"มานั่งพักตรงนี้ก่อนเถอะ\""
1005302-61 = "― แฮ่ก... แฮ่ก... ไม่อยากเชื่อเลย[wa:2990] "
1005302-62 = "― ว่าแค่ไม่กี่เดือนร่างกายก็อ่อนแอลงขนาดนี้แล้ว...[wa:1840] "
1005302-65 = "― อย่างน้อยเพื่อไม่ให้เสียชื่อในงานเทศกาลฮาโลเฟสติวัล...[wa:340] "
1005302-66 = "― ฉันต้องฝึกร่างกายให้พร้อมกว่านี้แล้วละค่ะ[wa:2570] "
1005302-69 = "― อ๊ะ คุณครูเอง... ก็ดื่มน้ำสักหน่อยมั้ยคะ?[wa:880] "
1005302-72 = "― เอ้า นี่ค่ะ...[wa:520] "
1005302-75 = "― ระ... รอเดี๋ยวก่อนค่ะคุณครู![wa:1210] "
1005302-76 = "― คะ... คิดอีกที ตอนนี้คงไม่ดีเท่าไรค่ะ![wa:2110] "
1005302-79 = "― (น้ำขวดที่ฉันดื่มแล้ว...)[wa:540] "
1005302-80 = "― (ถ้าเกิดคุณครูดื่มต่อละก็ มันจะกลายเป็น... จูบทางอ้อมน่ะสิ...)[wa:5000] "
1005302-83 = "― (ไม่ได้ๆ ถึงจะเป็นสถานการณ์แบบนี้ก็เถอะ...)[wa:1020] "
1005302-84 = "― (แต่ก็จะให้เกิด... เรื่องน่าอายแบบนั้นไม่ได้!)[wa:2200] "
1005302-87 = "― (แต่ว่า...ถ้าเป็นคุณครูละก็...)[wa:2400] "
1005302-90 = "― คุณครู... ดื่มสักอึกก่อนมั้ยคะ?[wa:1640] "
1005302-94 = "เฮ้อ... พอได้ดื่มน้ำแล้วก็รู้สึกดีขึ้นมานิดหน่อยค่ะ"
1005302-95 = "ฉันรู้ดีว่าพลังกายฉันลดลง แต่คิดไม่ถึงว่าความอึดจะลดลงถึงขนาดวิ่งตามคุณครูไม่ทันแบบนี้...#nช็อกสุดๆ เลยค่ะ"
1005302-96 = "ถ้าไม่ทำให้พลังกายกลับมาเหมือนเดิม ก่อนถึงงานเทศกาลฮาโลเฟสติวัลละก็แย่แน่ๆ เลยค่ะ"
1005302-97 = "[s5] \"ช่วงแรกอย่าหักโหมมากไปจะดีกว่านะ\"\n[s6] \"เริ่มด้วยการวิ่งจ๊อกกิ้งเบาๆ ดีมั้ย?\""
1005302-98 = "นั่นสินะคะ ช่วงแรกไม่ควรหักโหมจนเกินไป ถ้าเริ่มจากการวิ่งจ๊อกกิ้งเบาๆ ก่อนคงจะช่วยฟื้นฟู#nพลังกายได้บ้าง..."
1005302-99 = "นั่นสินะคะ ถึงจะไม่ได้วิ่ง แต่ถ้าเริ่มจากการวิ่งจ๊อกกิ้งเบาๆ ก่อนคงจะช่วยฟื้นฟูพลังกายได้บ้าง..."
1005302-100 = "ถ้างั้นตลอดระยะเวลาฝึกที่เหลือ ฉันจะเปลี่ยนเป็นวิ่งจ๊อกกิ้งเบาๆ ตอนเช้าแทนค่ะ"
1005302-105 = "ถ้างั้น... คราวนี้มาลดความเร็วลง... แล้ววิ่งจ๊อกกิ้งไปด้วยกันมั้ยคะ?"
1005302-107 = "(หลังจากนั้น คุณครูกับยูกะก็วิ่งจ๊อกกิ้งกลับไปที่ชาเล่ต์ด้วยกัน)"

[translation]
1005302-1 = "Morning Jog"
1005302-2 = "Park Trail, Morning"
1005302-3 = "While out for an early morning walk, I ran into Yuuka."
1005302-9 = "[ns] \"Hi, Yuuka.\""
1005302-10 = "Sensei?"
1005302-11 = "I didn't expect to see you out and about so early in the morning."
1005302-12 = "[s1] \"I was just taking a walk.\"\n[s2] \"What about you, Yuuka?\""
1005302-13 = "Oh, well..."
1005302-14 = "Oh, well..."
1005302-15 = "As you can tell from what I'm wearing, I wanted to start my day with some light exercise."
1005302-16 = "We're going to be hosting the Kivotos Halo Festival soon."
1005302-17 = "Of course, I'm working on the executive committee, so I probably won't participate in many events..."
1005302-18 = "But, as a representative of the committee organizing the Kivotos Halo Festival, I have to stay fit and make sure I don't perform poorly during the festival."
1005302-19 = "And I hear regular exercise makes you a better worker."
1005302-20 = "So, taking all that into consideration, morning jogs are the natural conclusion."
1005302-21 = "...Also I feel flabbier than usual."
1005302-22 = "[s] \"You're fine the way you are.\""
1005302-23 = "E-Even if you say that...!"
1005302-24 = "A-Ahem... Anyway, I'll be training regularly for the time being!"
1005302-25 = "I'm starting off with a five kilometer sprint."
1005302-26 = "[s] \"Isn't that a bit ambitious?\""
1005302-27 = "Heh heh. No need to worry."
1005302-28 = "I may not be the fastest, but I have confidence in my endurance."
1005302-29 = "Running five kilometers is nothing!"
1005302-30 = "[s] \"I'll run with you, then.\""
1005302-31 = "What? Like, next to me?"
1005302-32 = "I don't mind...but are you sure you can keep up?"
1005302-33 = "If you fall behind, I'm not going to wait for you."
1005302-34 = "[s] \"At least look at me before leaving me behind...\""
1005302-35 = "I'm kidding."
1005302-36 = "Why don't we start at a light jog, then?"
1005302-38 = "Yuuka and I started to run."
1005302-43 = "...Ten minutes later."
1005302-45 = "*pant* *pant* *pant*"
1005302-49 = "S-Sensei... *pant* Wait...*pant* just a moment..."
1005302-50 = "[s3] \"...You out of breath?\"\n[s4] \"...You already tired?\""
1005302-51 = "N-Not... *pant* at all. *pant* It's only... *pant* been 10 minutes..."
1005302-52 = "N-Not... *pant* at all. *pant* It's only... *pant* been 10 minutes..."
1005302-53 = "This... *pant* is just a... *pant* warm up... No way... *pant* I could be ... *pant* tired..."
1005302-57 = "...Except I am."
1005302-58 = "[s] \"Let's take a break.\""
1005302-61 = "― *pant* *pant* ...I can't believe I've become[wa:2470] "
1005302-62 = "― so unfit after just a few months...[wa:2360] "
1005302-65 = "― To ensure that I don't embarrass myself at the Kivotos Halo Festival...[wa:10] "
1005302-66 = "― I'm going to have to double down on my training.[wa:2290] "
1005302-69 = "― Oh, Sensei. You want water too?[wa:1280] "
1005302-72 = "― Sure, here...[wa:560] "
1005302-75 = "― S-Stop right there, Sensei![wa:1250] "
1005302-76 = "― I-I mean, um, maybe now isn't...a good time to drink water?[wa:1270] "
1005302-79 = "― (If Sensei drinks from the bottle[wa:220] "
1005302-80 = "― I've been drinking from... I-It'd be an indirect ki—)[wa:5360] "
1005302-83 = "― (No, no! It doesn't matter what the circumstances are...[wa:500] "
1005302-84 = "― Such shamelessness can never, absolutely never be tolerated!)[wa:1600] "
1005302-87 = "― (...That being said, if it's Sensei...)[wa:2080] "
1005302-90 = "― ...One sip...  You can have just one sip, okay?[wa:1000] "
1005302-94 = "Ah... Nothing like water to refresh you after a run."
1005302-95 = "But honestly... I knew I let myself go a little, but I didn't expect to not even be able to keep up with you, Sensei... I'm shaken."
1005302-96 = "I need to train myself back into shape before the Kivotos Halo Festival..."
1005302-97 = "[s5] \"You shouldn't push yourself too hard without building up to it.\"\n[s6] \"Why don't you start with some light jogs first?\""
1005302-98 = "...That makes sense. It's not as good as running, but sticking to steady, light jogs will still improve my stamina."
1005302-99 = "...That makes sense. It's not as good as running, but sticking to steady, light jogs will still improve my stamina."
1005302-100 = "But you can be sure that I'm going to jog every morning of every day until the festival."
1005302-105 = "So, a bit slower this time...can we do it together again?"
1005302-107 = "After leisurely jogging with Yuuka, I returned to Schale."

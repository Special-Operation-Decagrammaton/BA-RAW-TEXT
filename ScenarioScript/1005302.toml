[translation]
1005302-1 = "晨跑"
1005302-2 = "黎明的公園．散步走道"
1005302-3 = "（出來散步時，碰巧遇見了優香）"
1005302-9 = "[ns]「優香，早安。」"
1005302-10 = "咦，老師？"
1005302-11 = "沒想到會在這遇見你，讓我有點驚訝。"
1005302-12 = "[s1]「因為想稍微散散步。」\n[s2]「優香呢？」"
1005302-13 = "呃，這個嘛……"
1005302-14 = "呃，這個嘛……"
1005302-15 = "我打算在早上的工作之前稍微運動一下。"
1005302-16 = "你看，千年主辦的晄輪大祭就快到了不是嗎。"
1005302-17 = "雖然我當天因為有實行委員的工作，所以沒有以選手身分參加的計畫……"
1005302-18 = "但我畢竟是主辦晄輪大祭的千年幹部，總不能在當天因為體力不足而丟臉對吧？"
1005302-19 = "聽說適當的運動能提高工作時的專注力……"
1005302-20 = "順便也進行健康管理，所以想在涼爽的早晨晨跑。"
1005302-21 = "而且……最近有點在意體重……"
1005302-22 = "[s]「我覺得優香現在就很好唷。」"
1005302-23 = "才，才沒有……！"
1005302-24 = "咳咳……總之，暫時已經決定要運動了！"
1005302-25 = "嗯……首先先全力衝刺5km左右……"
1005302-26 = "[s]「一開始就全力衝刺5km？」"
1005302-27 = "呵呵，不用擔心。"
1005302-28 = "速度姑且不論，體力我可是很有自信的。"
1005302-29 = "區區5km對我來說根本不算什麼！"
1005302-30 = "[s]「我可以跟你一起跑嗎？」"
1005302-31 = "咦？#n老師也要一起？"
1005302-32 = "我是無所謂啦……不過老師有辦法跟上我的節奏嗎？"
1005302-33 = "呵呵，跟不上我的話可是不會等你的唷？"
1005302-34 = "[s]「請，請腳下留情……」"
1005302-35 = "開玩笑的。"
1005302-36 = "稍微伸展一下再開始跑吧。"
1005302-38 = "（就這樣，和優香一起跑了起來）"
1005302-43 = "（……10分鐘後）"
1005302-45 = "哈啊，哈啊……哈啊……"
1005302-49 = "老，老師……哈啊，哈啊……等一下……"
1005302-50 = "[s3]「……還好嗎？」\n[s4]「……難道說，已經到極限了？」"
1005302-51 = "怎麼，可能……#n哈啊，哈啊……才10分鐘而已……"
1005302-52 = "怎麼，可能……#n哈啊，哈啊……才10分鐘而已……"
1005302-53 = "因為這種，暖身程度的運動……就上氣不接下氣……怎麼可……"
1005302-57 = "……還是有可能的呢。"
1005302-58 = "[s]「在這裡稍微休息一下吧。」"
1005302-61 = "― 哈啊，哈啊……沒想到才過了短短幾個月，[wa:3470] "
1005302-62 = "― 我的體力居然會下降這麼多……[wa:3200] "
1005302-65 = "― 為了不在「晄輪大祭」上丟臉……[wa:1900] "
1005302-66 = "― 得要更認真鍛鍊體力才行。[wa:3730] "
1005302-69 = "― 啊，老師也要喝水嗎？[wa:2120] "
1005302-72 = "― 來，請……[wa:880] "
1005302-75 = "― 請，請等一下，老師！[wa:1930] "
1005302-76 = "― 果，果然現在還不行！[wa:3230] "
1005302-79 = "―（要是老師現在喝了這瓶[wa:1140] "
1005302-80 = "― 我喝過的寶特瓶的水…… 那不就是事實上的間接接……）[wa:6440] "
1005302-83 = "―（不行不行，就算是這種情況，[wa:2220] "
1005302-84 = "― 那種不知羞恥的事情也是不可以的……！）[wa:3280] "
1005302-87 = "―（可是…… 如果是老師的話……）[wa:3040] "
1005302-90 = "― 只能……喝一口唷……？[wa:2440] "
1005302-94 = "呼……跑步之後的水真是美味呢。"
1005302-95 = "雖然我也隱約注意到自己體力降低了，沒想到居然會連老師也跟不上……真受打擊。"
1005302-96 = "得想辦法在晄輪大祭之前回復以前的體力才行……"
1005302-97 = "[s5]「一開始先慢慢來，依照自己的節奏。」\n[s6]「先從慢跑開始怎麼樣？」"
1005302-98 = "……有道理。慢跑也有助於基礎體力的提升，現在就不要逞強……"
1005302-99 = "……有道理。慢跑也有助於基礎體力的提升，現在就不要逞強……"
1005302-100 = "在晄輪大祭前，我每天早上都會來慢跑的。"
1005302-105 = "那個，接下來就稍微慢一點……可以再陪我一下嗎？"
1005302-107 = "（之後，和優香一起慢跑後，回到了夏萊）"

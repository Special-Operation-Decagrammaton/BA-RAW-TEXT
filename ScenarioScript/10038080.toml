[translation]
10038080-1 = "ตอนที่ 8;แด่เธอผู้หวั่นไหวเป็นพันครั้ง"
10038080-10 = "คางุยะ หัวหน้าชมรมการแสดงงิ้ว ขอคารวะท่านประมุขค่ะ"
10038080-12 = "เป็นอย่างไรเล่า? พอทำงานบริหารของมังกรดำได้หรือเปล่า?"
10038080-13 = "ยังมีอีกหลายส่วนที่ไม่ง่ายเพราะฉันไม่คุ้นเคย แต่ฉันคิดว่าคงจะทำได้ค่ะ..."
10038080-14 = "เช่นนั้นเราคงต้องเปลี่ยนชื่อของชมรมการแสดงงิ้วแล้วสินะ น่าแปลกนะ หากเป็นเช่นนี้ แล้วใครจะสืบทอดการแสดงงิ้วเล่า?"
10038080-15 = "อ้อ จริงสิ เราไม่รู้เจตนารมณ์ที่ลึกซึ้งของเธอ เธอคิดจะโยนภาระให้มังกรดำที่ไม่มีงานให้ทำแล้วสินะ"
10038080-16 = "..."
10038080-17 = "เราขอถามอะไรหน่อย เธอต้องการอะไรกันแน่ คางุยะ"
10038080-18 = "การมาทำงานบริหารแทนมังกรดำเป็นจุดประสงค์ของชมรมการแสดงงิ้วเช่นนั้นหรือ?"
10038080-19 = "ไม่ใช่ค่ะ ชมรมการแสดงงิ้วเป็นชมรมที่ก่อตั้งเพื่อการแสดงค่ะ "
10038080-20 = "และในกระบวนการนั้น ฉันคิดว่าถ้าเราสานต่อประเพณีของซานไห่จิงไปได้ด้วยก็จะยิ่งดีค่ะ"
10038080-21 = "โอ้ แล้วประเพณีของซานไห่จิงที่เธอว่ามันคืออะไรกันแน่?"
10038080-22 = "ฉันว่า... นี่ไม่ใช่เรื่องที่จะพูดกันได้ง่ายๆ ในที่แห่งนี้นะคะ"
10038080-23 = "ปัดที่จะไม่ตอบสินะ แต่ก็ไม่แปลกหรอก ถ้าเป็นเช่นนั้น เราจะพูดแทนเธอเอง ท้ายที่สุดแล้ว สิ่งนั้นก็คือวิธีคิดและวิธีปฏิบัติตัวไม่ใช่หรอกหรือ?"
10038080-24 = "..."
10038080-25 = "ปกป้องคนที่อ่อนแอจากคนที่แข็งแกร่งแต่โหดร้าย จดจำบุญคุณที่เราได้รับ และยอมเสี่ยงทุกอย่าง#nเพื่อสิ่งที่ถูกต้อง ทั้งหมดนั่นคือความภาคภูมิใจของเราไม่ใช่หรือ?"
10038080-26 = "ทำไมถึงถามฉันในสิ่งที่ท่านก็รู้ดีอยู่แล้วล่ะคะ..."
10038080-31 = "เพราะเราอยากให้เธอเชื่อมั่นน่ะ"
10038080-35 = "หมายความว่ายังไงคะ...?"
10038080-36 = "เรารู้ว่ามีคนที่สงสัยในการกระทำของเรา เธอเองก็เป็นเช่นนั้น กับสมาชิกมังกรดำบางคนก็คงไม่ต่างกัน"
10038080-37 = "ทว่า ประเพณีของซานไห่จิงที่พวกเธอรักษากันมามันอ่อนแอถึงเพียงนั้นเชียวหรือ?"
10038080-38 = "!!"
10038080-40 = "!!!"
10038080-42 = "ประเพณีของซานไห่จิงเป็นสิ่งที่สั่นคลอนและเปลี่ยนแปลงได้ในทันที เพียงเพราะมีบางสิ่งที่น่าสนใจ#nจากภายนอกเข้ามาอย่างนั้นหรือ?"
10038080-43 = "เรื่องนั้นมัน...!"
10038080-47 = "จงเชื่อมั่นเถอะ"
10038080-52 = "หากเธอไม่เชื่อตัวเอง ก็จงเชื่อในน้ำหนักของอดีตที่ผ่านมาจนถึงปัจจุบัน"
10038080-53 = "ประวัติศาสตร์และรากฐานของซานไห่จิงนั้นไม่ได้ตื้นเขินพอที่จะสั่นคลอนได้หรอก"
10038080-54 = "ท่านประมุข...!"
10038080-55 = "ฮุฮุ... เราจะขอถามเป็นอย่างสุดท้าย คนที่กำลังทำลายประเพณีของซานไห่จิงคือเราหรือไคกันแน่?"
10038080-56 = "คำตอบ... ดูเหมือนจะชัดเจนแล้วค่ะ"
10038080-57 = "ถ้าเป็นเช่นนั้น ชมรมการแสดงงิ้วก็ควรที่จะหลีกทางให้หรือเปล่า?"
10038080-58 = "หากท่านประมุขสั่งให้ทำแบบนั้น ฉันก็จะยินดีเป็นอย่างยิ่งค่ะ"
10038080-59 = "โอ้ ใช้คำพูดได้น่าสนใจดีนี่ ไหนดูซิ..."
10038080-60 = "นี่เป็นเรื่องของเหตุผล หรือเป็นเรื่องของผลประโยชน์ที่แท้จริงกันเล่า?"
10038080-61 = "ทั้งสองอย่างค่ะ"
10038080-62 = "ตอบได้น่าสนใจกว่าเดิมอีกนะ เธอหมายความว่าอย่างไรหรือ?"
10038080-63 = "ฉันจะให้คำตอบที่รวดเร็วและง่ายกับท่านประมุขค่ะ โรคเด็กลงที่กำลังระบาดอยู่ในซานไห่จิงตอนนี้มี#nสาเหตุที่แน่ชัดค่ะ "
10038080-65 = "หืม...?"
10038080-66 = "อย่างนี้นี่เอง เป็นเพราะยาสินะ"
10038080-67 = "การไตร่ตรองของท่านช่างล้ำลึกเหมือนแม่น้ำและทะเลค่ะ"
10038080-68 = "แล้วคำตอบที่ช้าและยากเล่า?"
10038080-74 = "..."
10038080-75 = "ฉันขอเรียนท่านประมุขอีกครั้ง"
10038080-80 = "ได้โปรดลงทัณฑ์ฉัน ณ ที่นี้ด้วยค่ะ"
10038080-81 = "[s] \"ว่าไงนะ...?!\""
10038080-83 = "เธอจงพูดต่อ..."
10038080-84 = "ท่านต้องทำอย่างนั้นค่ะ ถ้าไม่ทำอย่างนั้น ท่านจะกอบกู้อำนาจของประมุขกลับมาไม่ได้ค่ะ"
10038080-85 = "ถ้าไม่ทำอย่างนั้น ก็จะไม่มีใครทำตามคำสั่งของท่านประมุข และจะไม่มีใครอยากเข้าใจเจตจำนงของ#nท่านประมุขด้วยค่ะ"
10038080-86 = "ตอนนี้เป็นเวลาที่ท่านประมุขต้องออกคำสั่งด้วยตัวเองค่ะ และเพื่อที่จะทำเช่นนั้น ท่านก็ต้องแสดงอำนาจให้เห็นค่ะ"
10038080-87 = "แต่กฎหมายเป็นสิ่งที่มีไว้เพื่อไม่ให้แสดงอำนาจ"
10038080-88 = "แต่ถึงอย่างไร ในภาวะสับสนวุ่นวายเราก็ไม่ค่อยปฏิบัติตามกฎหมายค่ะ"
10038080-89 = "เรื่องที่ต้องปฏิบัติตาม สุดท้ายก็เป็นแค่เศษกระดาษ ส่วนหลักศีลธรรมก็มักกลายเป็นเครื่องมือของ#nคนไร้ศีลธรรมค่ะ"
10038080-90 = "ใช่ค่ะ การเผชิญหน้ากับสถานการณ์ที่เราต้องแสดงอำนาจถือเป็นโศกนาฏกรรมค่ะ ฉันเองก็รู้เรื่องนี้ดีค่ะ"
10038080-91 = "แต่เราต้องเจอสถานการณ์แบบนั้นอย่างหลีกเลี่ยงไม่ได้ เราก็ต้องไม่ลังเลที่จะแสดงอำนาจ และความแข็งแกร่งออกมาค่ะ ผู้ปกครองต้องทำอย่างนั้น ท่านเองก็ทราบดีนี่คะ?"
10038080-94 = "แม้จะอยู่ในโลกที่บิดเบี้ยว เราก็ต้องหาเส้นทางที่ถูกต้องค่ะ"
10038080-95 = "เราต้องอย่ายอมให้กับความชั่วร้าย"
10038080-96 = "เพราะถ้าไม่ทำอย่างนั้น เราก็ไม่อาจมีชีวิตอยู่ในฐานะมนุษย์ได้ค่ะ"
10038080-101 = "ผู้ที่แย่งชิงอำนาจ... ก็คือฉันเองค่ะ"
10038080-104 = "หยิบปืนขึ้นมาเถอะค่ะ ท่านประมุข ท่านต้องแสดงอำนาจและความแข็งแกร่งแล้วค่ะ "
10038080-105 = "ท่านต้องตะโกนให้ได้ยินไปทั่วท้องนภาและผืนปฐพี ว่าท่านคือผู้ที่ได้รับตำแหน่งให้ปกครองทุกคนค่ะ"
10038080-109 = "บางครั้งเส้นทางของการเป็นผู้นำก็ต้องเปื้อนดินปืนและมีรอยกระสุนค่ะ"
10038080-114 = "เรายังจำเรื่องที่เธออยากตักเตือนเราผ่านการแสดงงิ้วได้"
10038080-115 = "เธอคิดเช่นไรเกี่ยวกับเรื่องนั้นเล่า?"
10038080-117 = "ถ้าให้กลับมาคิดตอนนี้... ฉันคิดว่าฉันควรจะเลือกวิธีการอย่างระมัดระวังมากขึ้นค่ะ..."
10038080-118 = "แต่ถึงอย่างนั้น ฉันก็ไม่เสียใจเลยที่พยายามจะตักเตือนและทักท้วงท่าน"
10038080-119 = "นั่นคือความภักดีของฉัน นั่นคือเส้นทางที่ฉันเลือกค่ะ"
10038080-120 = "หากย้อนเวลากลับไปตอนนั้นได้ ฉันก็จะยินดีทักท้วงท่านเป็นร้อยครั้ง ยินดีถูกจองจำเป็นพันครั้ง และยินดีที่จะถูกเนรเทศเป็นหมื่นครั้งค่ะ!"
10038080-126 = "เป็นคำพูดที่น่าสนใจจริงเชียว"
10038080-128 = "เธอกำลังสั่งให้เราลงทัณฑ์คนที่พูดเรื่องความภักดีต่อหน้าเราหรือ?"
10038080-132 = "..."
10038080-134 = "ฉันที่กล่าวตักเตือนท่านในตอนนั้นกับฉันในตอนนี้แตกต่างกันอย่างสิ้นเชิงค่ะ ท่านต้องแยกแยะให้ได้ค่ะ"
10038080-137 = "ตอนนี้ฉันคือผู้แย่งชิงอำนาจ และข้อเท็จจริงนี้จะไม่มีวันเปลี่ยนแปลงค่ะ"
10038080-138 = "ผู้แย่งชิงอำนาจสมควรถูกลงโทษและประณามเพื่อเป็นตัวอย่างให้คนอื่นได้เห็นค่ะ"
10038080-142 = "หากไม่ทำเช่นนั้นก็จะไม่ชอบด้วยเหตุผล และทำให้ทุกคนเห็นหนทางที่ถูกต้องไม่ได้ค่ะ!"
10038080-146 = "แต่การแย่งชิงอำนาจนั้นไม่น่าจะเป็นเจตนารมณ์ของเธอนะ"
10038080-147 = "..."
10038080-148 = "ฉันไม่อยากพูดเรื่องนี้หรอกนะคะ แต่ถ้าท่านถามเช่นนี้ ฉันก็คงต้องเอ่ยปากบอก"
10038080-149 = "ว่ามา"
10038080-154 = "ท่านประมุขเองก็ไม่ได้ขึ้นมาเป็นประมุขด้วยเจตนารมณ์ของท่านเองไม่ใช่เหรอคะ?"
10038080-155 = "แต่ท่านก็พยายามแบกรับความรับผิดชอบทั้งหมดที่ตามมาด้วยตัวเองใช่ไหมล่ะคะ"
10038080-156 = "ฉันเคารพท่านประมุขที่เป็นเช่นนั้นเสมอมาค่ะ"
10038080-157 = "ฉันคิดมาโดยตลอดว่าโชคดีเหลือเกินที่ซานไห่จิงมีท่านประมุขแบบนั้น"
10038080-158 = "ต่อให้ฉันต้องตายที่นี่เพื่อท่านประมุขที่เป็นแบบนั้น ฉันก็จะยอมค่ะ ต่อให้เป็นร้อยเป็นพันครั้งก็ยอมค่ะ!"
10038080-160 = "นั่นคือเส้นทางที่เธอคิดไว้อย่างนั้นหรือ?"
10038080-161 = "นั่นคือเส้นทางที่ฉันคิดไว้ค่ะ"
10038080-165 = "ถ้าเป็นเช่นนั้น เราก็จะไม่เดินบนเส้นทางนั้น"
10038080-169 = "[ns] \"คิซากิ...!\""
10038080-170 = "หมายความว่า... อย่างไรคะ?"
10038080-171 = "เราจะให้เธอเห็นด้วยตัวเอง"
10038080-175 = "ให้เธอได้เห็นเส้นทางที่ประมุขแห่งซานไห่จิงจะเลือกเดินนับตั้งแต่นี้ไป"
10038080-179 = "ท่านประมุข...?"

[translation]
10038080-1 = "第8話;致動搖千百次的你"
10038080-10 = "京劇部部長輝夜，拜見門主大人。"
10038080-12 = "感受如何？代理玄龍門的行政工作還順利嗎？"
10038080-13 = "……許多部份由於有欠熟練而不算順利，但還算足以應付。"
10038080-14 = "既然如此，京劇部之名是否該有所更動呢？#n但如此一來，京劇又該由誰來繼承？"
10038080-15 = "啊啊，原來如此。是妾身沒能理解汝的深意。#n汝是打算將事情推無事可做的玄龍門吧。"
10038080-16 = "……"
10038080-17 = "說吧，輝夜。汝究竟想得到什麼？"
10038080-18 = "京劇部的目的是將玄龍門取而代之嗎？"
10038080-19 = "並非如此。#n京劇部是為了表演京劇而存在的社團。"
10038080-20 = "……同時若能在過程之中，將山海經的傳統妥善延續就再好不過了。"
10038080-21 = "哦？汝所謂山海經的傳統為何？"
10038080-22 = "若要當場闡明……似乎不甚容易。"
10038080-23 = "選擇轉移話題啊……這也情有可原。#n那就由妾身替汝回答吧──不就是思維與行為方式嗎？"
10038080-24 = "……"
10038080-25 = "守護弱者、知恩圖報、追求正義──這不是吾等的驕傲嗎？"
10038080-26 = "既然您都清楚，為何還要問我呢……"
10038080-31 = "因為希望汝能相信妾身。"
10038080-35 = "您這話是什麼意思……？"
10038080-36 = "妾身明白汝對妾身的行動感到疑惑。#n不只是汝，玄龍門的部分成員也是。"
10038080-37 = "然而汝等守護至今的山海經的傳統，真就如此脆弱嗎？"
10038080-38 = "！！"
10038080-40 = "！！！"
10038080-42 = "不過是從外界流入幾樣有趣的東西，就會輕易動搖與改變嗎？"
10038080-43 = "這，這……！"
10038080-47 = "相信吧。"
10038080-52 = "倘若汝無法相信自己，那就相信這段時間的重量。"
10038080-53 = "山海經的歷史與根基，可沒有淺薄到會因此動搖。"
10038080-54 = "門主大人……！"
10038080-55 = "呵呵……最後再問汝一個問題。#n破壞山海經傳統的是妾身，還是誡呢？"
10038080-56 = "答案……應該很明顯了才對。"
10038080-57 = "既然如此，京劇部難道不該把路讓出來嗎？"
10038080-58 = "如果門主大人能這麼做，我將感激不盡。"
10038080-59 = "哦？這話還真有趣。#n那就讓妾身來瞧瞧吧……"
10038080-60 = "這是名分的問題，還是實利的問題？"
10038080-61 = "名分和實利，兩者皆有問題。"
10038080-62 = "這個回答又更加有趣了。#n何以見得呢？"
10038080-63 = "我先從較容易的部分開始說明。#n目前正在山海經流行的還童症，存在明確的原因。"
10038080-65 = "哦……？"
10038080-66 = "原來如此。是治療或預防藥物的問題嗎？"
10038080-67 = "您宛如大海般的寬容與恩典，實在令我感到無以為報。"
10038080-68 = "那麼困難的部分呢？"
10038080-74 = "……"
10038080-75 = "請容我再次稟告門主大人。"
10038080-80 = "請您當場處決我吧。"
10038080-81 = "[s]「什麼……！？」"
10038080-83 = "……繼續說吧。"
10038080-84 = "您必須藉此重建門主的權威。"
10038080-85 = "否則將沒有人會遵從門主大人的命令，也沒有人會理解門主大人的意圖。"
10038080-86 = "現在正是門主大人樹立威嚴、展現力量的時候。"
10038080-87 = "法度之所以存在，應是要人不展現力量才是。"
10038080-88 = "然而在亂世之中，法度往往難以遵守。"
10038080-89 = "應當恪守的規則常常淪為廢紙，道理亦將成為無道之人的工具。"
10038080-90 = "沒錯，非得展現力量的情況往往是悲劇，這點我也十分清楚。"
10038080-91 = "但如果實在避無可避，就應當毫不猶豫地展示力量。#n君主之道就是如此，您應該也明白才對。"
10038080-94 = "即便身處扭曲的大地，也必須找尋正道。"
10038080-95 = "不能容忍兇惡。"
10038080-96 = "否則人們將無以為人。"
10038080-101 = "眼下的篡位者……不是別人就是我。"
10038080-104 = "請舉槍吧，門主大人。#n您必須展示力量。"
10038080-105 = "必須詔告天下──您才是引領大家之人。"
10038080-109 = "君主之道，有時也需要做好迎接火藥和彈痕的覺悟。"
10038080-114 = "妾身記得汝曾以京劇向妾身進諫。"
10038080-115 = "汝對此有何看法？"
10038080-117 = "現在想來，我應該更謹慎地選擇手段……"
10038080-118 = "但即便如此，我也從未對進諫一事感到絲毫後悔。"
10038080-119 = "那是我的忠義，是我選擇的道路。"
10038080-120 = "即使時光能夠倒流，我依舊會進諫百次，入獄千次，甘願被驅逐萬次！"
10038080-126 = "真是有趣的回答。"
10038080-128 = "所以汝的言下之意──是妾身應當處決在妾身面前談論忠義之人嗎？"
10038080-132 = "……"
10038080-134 = "當時向您進諫的我，與現在的我顯然不同。#n您應該將其區分清楚才是。"
10038080-137 = "現在的我是篡位者的事實不會改變。"
10038080-138 = "篡位者理當論斬示眾，藉此達到殺雞儆猴的效果。"
10038080-142 = "否則將難以樹立威信──難以展示應有的法度啊！"
10038080-146 = "篡位一事並非出自汝的本意吧。"
10038080-147 = "……"
10038080-148 = "我本不願口出此言……但既然您這麼說，我也只能斗膽向您開口。"
10038080-149 = "說吧。"
10038080-154 = "門主大人您……也不是依自己的意志登上那個位置的吧。"
10038080-155 = "然而即便如此，您依舊獨自承擔了所有責任。"
10038080-156 = "我一直尊敬著這樣的門主大人。"
10038080-157 = "我始終為山海經能有這麼一位門主大人感到無比慶幸。"
10038080-158 = "若我必須為了門主大人在此倒下──哪怕千次萬次也甘之如飴！"
10038080-160 = "那就是汝選擇的道路嗎？"
10038080-161 = "這就是我選擇的道路。"
10038080-165 = "那麼，妾身將不會踏上這條道路。"
10038080-169 = "[ns]「妃姬……！」"
10038080-170 = "您這是……什麼意思？"
10038080-171 = "妾身會親自向汝展示。"
10038080-175 = "山海經的門主，今後將走上的道路。"
10038080-179 = "門主大人……？"

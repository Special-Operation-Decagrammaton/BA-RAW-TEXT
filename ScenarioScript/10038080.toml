10038080-12 = "3;키사키;00;어떤가. 현룡문을 대신한 행정 일은, 할 만 한가?"
10038080-13 = "5;카구야;05;……아직 익숙하지 않아 수월치 못한 부분이 많습니다만, 어떻게든 될 것 같기도 합니다.\n#5;al\n#3;m1"
10038080-14 = "3;키사키;02;그렇다면 경극부의 이름을 바꾸어야 하는 것이 아닌가? 그런데 이거 이상하구나. 그렇게 된다면 경극은 이제 누가 계승하고 이어 나가야 하는가?\n#3;em;[?]"
10038080-15 = "3;키사키;99;아아, 그렇군. 내 그대의 깊은 뜻을 몰랐다. 할 일이 없어진 현룡문에게 떠넘길 생각이로구나."

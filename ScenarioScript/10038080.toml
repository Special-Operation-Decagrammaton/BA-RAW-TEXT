10038080-18 = "3;키사키;00;이대로 현룡문을 대신하려는 것이 경극부의 목적인가?"
10038080-19 = "5;카구야;05;그렇지 않습니다. 경극부는 경극을 공연하기 위해 존재하는 동아리입니다. "
10038080-20 = "5;카구야;99;……그리고 그 과정에서, 산해경의 전통을 보다 잘 이어 나갈 수 있으면 더욱 좋을 것 같다고 생각하고 있고요.\n#5;em;…"
10038080-21 = "3;키사키;02;호오. 그대가 이야기하는 산해경의 전통이란, 도대체 무엇이냐?"
10038080-22 = "5;카구야;05;이 자리에서…… 간단하게 이야기할 수 있는 것은 아닌 듯합니다."
10038080-23 = "3;키사키;08;말을 돌리는구나. 그럴 수 있지. 그렇다면 내가 대신하여 이야기해 보겠다. 그것은 결국 사고방식이나 행동 양식이 아니더냐?\n#3;em;[한숨]"

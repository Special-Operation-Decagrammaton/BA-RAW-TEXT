[translation]
10045090-1 = "ตอนที่ 9;รอบสุดท้าย: เกมผลักตกน้ำ"
10045090-2 = "ทุกคนคะ~! ขอเสียงปรบมือให้ 4 ผู้เข้าแข่งขันที่อยู่รอดจากทั้งหมด 100 คนด้วยค่ะ!"
10045090-6 = "และจากนี้เป็นต้นไป... เราจะต่อสู้เพื่อหาผู้ชนะเพียงคนเดียวจาก 4 คน...! #nเราจะเริ่มการแข่งขันคู่แรกเลยค่ะ!"
10045090-8 = "เริ่มจากมุมน้ำเงิน! ที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันที่ปราบคู่ต่อสู้ด้วยกลยุทธ์ที่มหัศจรรย์#nและชาญฉลาด!"
10045090-9 = "จริงหรือเปล่าคะที่เขาลือกันว่าคุณกลัวน้ำ?! คุณคิริว คิเคียว!"
10045090-10 = "ใครเป็นคนปล่อยข่าวลือน่ะ?"
10045090-11 = "มุมแดง! หัวหน้าหน่วยจู่โจมและผู้ฝึกอสูรที่แน่วแน่ของเฮียกกะเรียวรัน!"
10045090-12 = "ในขณะเดียวกันก็ใฝ่ฝันถึงการเป็นวัยรุ่นด้วยหัวใจสดใสสีชมพู! ฟูวะ~ เรนเกะ!"
10045090-13 = "ใครเป็นคนเขียนบทให้เนี่ย...?"
10045090-15 = "[ns] \"......?!\""
10045090-16 = "คุณครู? จู่ๆ เป็นอะไรไปเหรอคะ?"
10045090-17 = "[s] \"มะ... ไม่มีอะไรมากหรอก ครูแค่รู้สึกเสียวสันหลังขึ้นมาน่ะ\""
10045090-18 = "หืม...?"
10045090-19 = "เอาละค่ะ มาเริ่มเกมกันเลยดีกว่า! เชิญผู้เข้าแข่งขันยืนประจำตำแหน่งเลยค่ะ...!"
10045090-20 = "เอาละ เปิดศึกประชันกัน~ อย่างยุติธรรม!"
10045090-26 = "อะไรกัน? ไม่บุกเข้ามาเหรอ?"
10045090-27 = "ฉันต่างหากล่ะที่ต้องถามอย่างนั้น ทำไมเอาแต่ยืนนิ่งล่ะ? ฉันไม่ได้ป้องกันตัวเลยนะตอนนี้"
10045090-28 = "เฮอะ คนที่ไม่ได้ป้องกันตัวเลยไม่มีทางมองกันด้วยแววตาแบบนั้นหรอก"
10045090-29 = "เธอ... ไม่ได้ยอมแพ้สินะ?"
10045090-30 = "ไหนว่าอยากสู้จริงจังไงล่ะ...? งั้นเพื่อนอย่างฉันก็ต้องตอบสนองต่อความรู้สึกนั้นให้สิ"
10045090-31 = "งั้นเรามาสู้และเอาชนะอย่างยุติธรรมกันเถอะ"
10045090-32 = "อืม... แต่ฉันว่าฉันได้เปรียบกว่านะ"
10045090-33 = "ในเรื่องไหนเหรอ?"
10045090-34 = "เลิกคุยยื้อเวลากันได้แล้ว ถ้าเธอไม่บุกเข้ามา ฉันจะบุกเข้าไปเอง"
10045090-35 = "งั้นเหรอ? ก็ลองดูสิ..."
10045090-37 = "มาพิสูจน์ด้วยฝีมือกันเลย...!"
10045090-45 = "เอาละ เริ่มแล้วค่ะ!"
10045090-51 = "โอ้ อะไรกัน? เด็กที่เอาแต่อ่านหนังสืออยู่แต่ในห้องไม่น่าจะแรงดีแบบนี้นี่นา?"
10045090-52 = "ฉันฝึกร่างกายอยู่ตลอดเถอะนะ"
10045090-53 = "ว่าแต่... คิดว่าจะชนะฉันด้วยพละกำลังได้งั้นเหรอ? ตอนเด็กเธอเป็นยังไง ตอนนี้ก็ยังเหมือนเดิมไม่เปลี่ยนเลยนะ"
10045090-54 = "ตอนเด็กงั้นเหรอ?"
10045090-55 = "ยังจำได้หรือเปล่าล่ะ? ตอนเรา 7 ขวบ เราเคยแข่งกันว่าใครจะไกวชิงช้าได้สูงกว่ากัน"
10045090-56 = "หืม...?"
10045090-57 = "ฮุฮุ สุดท้ายฉันก็ชนะ เพราะเธอเอาแต่เหวี่ยงด้วยแรงกายเท่านั้นน่ะสิ"
10045090-58 = "ตอนนั้นเธอแพ้ฉันจนต้องไปซื้อขนมมาให้ฉันเป็นอาทิตย์เลย จำไม่ได้เหรอ?"
10045090-59 = "นะ... นั่นมันเรื่องตั้งแต่ตอนไหน!"
10045090-61 = "ตอนนี้ไงล่ะ...!"
10045090-65 = "อึก?!"
10045090-70 = "โอ้...! ผู้เข้าแข่งขันคิเคียวกวาดขาผู้เข้าแข่งขันเรนเกะจนล้มลงไปแล้วค่ะ!"
10045090-71 = "ขอปิดจบละนะ...!"
10045090-75 = "ผู้เข้าแข่งขันคิเคียวเอาขาเกี่ยวผู้เข้าแข่งขันเรนเกะไว้แล้วค่ะ!"
10045090-76 = "[ns] \"จะทำให้คู่ต่อสู้หมดแรงแล้วโยนลงทะเลสินะ!\""
10045090-77 = "กลยุทธ์รัดคู่ต่อสู้เหมือนการเล่นพันด้าย! ผู้เข้าแข่งขันเรนเกะจะหลุดออกมาได้หรือเปล่า!"
10045090-78 = "อึก... ใช้กลอุบายที่แยบยลงั้นเหรอ...!"
10045090-79 = "แต่คิดว่าฉันจะยอมให้ง่ายๆ หรือไง! ย้ากก...!"
10045090-85 = "ลุกขึ้นมาได้งั้นเหรอ...?"
10045090-86 = "เห็นอย่างนี้ฉันเรียนรู้การใช้กลอุบายมาจากเธอนะ ฉันแค่แกล้งติดกับเพื่อรักษาแรงของตัวเองเอาไว้#nต่างหากล่ะ"
10045090-87 = "แล้วฉันก็อยากรู้ด้วยว่าเธอจะมาไม้ไหน"
10045090-89 = "การมีดีแค่พละกำลังก็ไม่ใช่เรื่องดีเสมอไป... เธอเองก็พัฒนาขึ้นมากเลยนะ"
10045090-90 = "เมื่อกี้คือท่าไทรแองเกิลโช้กใช่มั้ย? ไม่ยักรู้เลยนะว่าเธอก็เรียนศิลปะการป้องกันตัวแบบนั้นมาด้วย"
10045090-91 = "มันเป็นพื้นฐานของการเล่นพันด้ายน่ะ"
10045090-92 = "การเล่นพันด้ายแบบนั้นมีที่ไหนกัน!"
10045090-93 = "มันคล้ายกันตรงที่เรารัดฝ่ายตรงข้ามไว้ได้ไง"
10045090-94 = "เฮอะ ถ้าเธอจะว่าอย่างนั้นละก็นะ"
10045090-95 = "แล้วต่อไปจะงัดอะไรมาสู้? ขอเตือนไว้เลยนะว่าวิธีเดิมน่ะใช้ไม่ได้ผลหรอก...!"
10045090-104 = "รุ่นพี่คิเคียว... ไม่ยอมแพ้ให้จริงๆ ด้วยสินะเจ้าคะ"
10045090-105 = "อื้อ ค่อยยังชั่วนะที่คิเคียวเลือกสู้เพื่อตัวเองมากกว่าเพื่อทีม"
10045090-106 = "แต่ถ้าการต่อสู้ดำเนินไปแบบนี้ รุ่นพี่เรนเกะจะยิ่งได้เปรียบกว่าหรือเปล่าเจ้าคะ?"
10045090-107 = "ใช่แล้วละ ทุกสถานการณ์ล้วนเป็นผลดีกับเรนเกะหมดเลย"
10045090-108 = "แต่ว่า... คิเคียวอาจไม่คิดอย่างนั้นก็ได้ นั่นก็เพราะว่า คิเคียวคือ..."
10045090-110 = "ที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน!"
10045090-111 = "รุ่นพี่คิเคียวต้องใช้กลยุทธ์ที่มหัศจรรย์และชาญฉลาดแน่นอนเจ้าค่ะ!"
10045090-116 = "เจอช่องโหว่...!"
10045090-120 = "เหยียบอะไรของเธอน่ะ? ตรงนั้นมันพื้น..."
10045090-121 = "เหวอ?!"
10045090-125 = "อ๊ะ! ผู้เข้าแข่งขันคิเคียวใช้ประโยชน์จากความยืดหยุ่นของพื้น จนทำให้ผู้เข้าแข่งขันเรนเกะเสียหลัก#nไปแล้วค่ะ!"
10045090-126 = "ขอผลักลงทะเลทั้งอย่างนี้ละนะ...!"
10045090-127 = "คิดว่าฉันจะยอมตกไปง่ายๆ เหรอ...!!"
10045090-133 = "แฮ่ก... แฮ่ก... แฮ่ก..."
10045090-134 = "ฮู่วววว..."
10045090-135 = "พอคิดดูแล้วก็น่าสงสัยนะ ทำไมพูดเหมือนคนจะยอมแพ้ แต่พอแข่งเข้าจริงๆ ก็เข้าโหมดจริงจังขึ้นมา#nซะงั้น?"
10045090-136 = "ก็เธอเป็นคนบอกเองนี่ว่าอยากสู้แบบจริงจัง"
10045090-137 = "นั่นไม่น่าจะใช่เหตุผลทั้งหมดนะ?"
10045090-138 = "เหตุผลก็คือ..."
10045090-139 = "ฉันยอมแพ้ง่ายๆ ไม่ได้น่ะ... เพราะนี่ไม่ได้เป็นแค่การต่อสู้ของฉัน"
10045090-141 = "หืม? ไม่ใช่แค่การต่อสู้ของเธองั้นเหรอ?"
10045090-142 = "บอกตามตรงว่าตอนแรกฉันก็ตั้งใจจะยอมแพ้"
10045090-143 = "ฉันจะถอยให้เธอชนะ แล้วเลือกสิ่งที่เป็นประโยชน์ต่อเฮียกกะเรียวรันมากกว่า"
10045090-144 = "แต่ว่า... พอมาคิดทบทวนดูแล้ว การทำแบบนั้นมันไม่ถูกต้อง"
10045090-146 = "ถึงฉันจะยังบกพร่องอยู่มาก แต่ทุกคนก็เชียร์ฉัน..."
10045090-150 = "ทั้งรุ่นพี่นางุสะ ยูคาริ"
10045090-155 = "คนอื่นที่คอยให้กำลังใจฉัน"
10045090-160 = "คุณครูและผู้ชมมากมาย"
10045090-165 = "สุดท้ายก็... เธอด้วยไงล่ะ เรนเกะ"
10045090-167 = "ฉันโกหกทุกคนเพื่อปกปิดจุดอ่อนของตัวเอง ถึงอย่างนั้นทุกคนก็ยังเชียร์ฉันคนนี้"
10045090-168 = "เพราะงั้น... ฉันจะไม่ยอมแพ้หรอก"
10045090-169 = "เพื่อชัยชนะที่สมศักดิ์ศรีของเฮียกกะเรียวรัน"
10045090-170 = "เพื่อตอบแทนคนเหล่านั้นที่เชื่อมั่นในตัวฉัน"
10045090-171 = "และสุดท้าย เพื่อมิตรภาพของฉันกับเธอ และของทุกคน"
10045090-172 = "ฮึ่ม...! ต้องแบบนี้สิ!"
10045090-173 = "ดีละ งั้นก็มาต่อกันเลย จากนี้ไป..."
10045090-174 = "คือช่วงเวลาของวัยรุ่น!"
10045090-190 = "เป็นการต่อสู้ที่ห้ำหั่นกันจริงๆ เลยค่ะ! เดาไม่ออกเลยว่าใครจะชนะ!"
10045090-191 = "[ns1] \"จะเป็นเรนเกะที่มากับพละกำลัง!\"\n[ns2] \"หรือเป็นคิเคียวที่มากับกลยุทธ์!\""
10045090-195 = "อึก...!"
10045090-200 = "แบบนี้ฉันชนะแน่นอน...!"
10045090-205 = "ฉันไม่... แพ้ให้เด็ดขาด!"
10045090-211 = "นั่นมัน...!"
10045090-212 = "รุ่นพี่ทั้งสองคน...!!"
10045090-213 = "ใครกันที่จะเป็นผู้ชนะ...!!"
10045090-217 = "และผู้ชนะก็คือ...!"
10045090-218 = "[ns] \"ฟูวะ เรนเกะ...!\""
10045090-222 = "(...)"
10045090-223 = "(เป็นอย่างนี้สินะ... ฉันแพ้เข้าให้แล้ว)"
10045090-224 = "(รู้สึกหนักตัวจัง ราวกับว่าจะจมไปจนถึงพื้นเลย)"
10045090-229 = "(แต่จะให้เป็นแบบนี้ไม่ได้สิ... ฉันเรียนจากเรนเกะมาแล้วนี่นา)"
10045090-230 = "(ต้องทำให้เห็นสิ ว่าฉันก็ทำได้เหมือนกัน...!)"
10045090-232 = "เฮือกกก...!"
10045090-233 = "โอ้ ทำได้แล้วนี่!"
10045090-234 = "ฮู่วววว..."
10045090-235 = "ตอนนี้คงไม่กลัวน้ำแล้วสินะ"
10045090-236 = "อื้อ ถึงจะยังเกร็งๆ อยู่ก็เถอะ"
10045090-242 = "[ns] \"ทั้งคู่ยอดเยี่ยมมากเลย!\""
10045090-244 = "รุ่นพี่...! เป็นการแข่งขันที่วิเศษมากเจ้าค่ะ...!!"
10045090-245 = "ทุกคนทำได้ดีมาก"
10045090-252 = "ขอบใจ... จริงๆ นะ ทุกคน"

[translation]
10045090-1 = "Episode 9;Final Round: Knock-Out"
10045090-2 = "And welcome back, everyone! Please give a warm round of applause to our remaining players! Out of the original 100, only these four remain!"
10045090-6 = "Who will be the last one standing amongst these stand-out competitors? There's only one way to find out!"
10045090-8 = "First off, we have the operations officer of the Hyakkaryouran. Her enemies shake in their boots when she comes on the scene, for her tactical skills fall second to no one!"
10045090-9 = "The incomparable Kiryuu Kikyou! But is it true that this flawless tactician is afraid of water?!"
10045090-10 = "And who, precisely, is spreading such rumors?"
10045090-11 = "And of course, we have the Hyakkaryouran's assault squad Captain! She's a force of nature who's known for her \"Act first, think later,\" policies!"
10045090-12 = "But at her core, she's a girl just like the rest of us, searching desperately for the meaning of \"youth\" with her innocent heart! Fuwa Renge!"
10045090-13 = "...Who is writing these introductions?"
10045090-15 = "[ns] \"...?!\""
10045090-16 = "Sensei? What's wrong?"
10045090-17 = "[s] \"N-Nothing. I just felt a chill, but it must have been the wind.\""
10045090-18 = "Hm...?"
10045090-19 = "W-Well, anyways! Let's get this match underway! Players, to your positions!"
10045090-20 = "Now, a fair and square showdown! Let's begin!"
10045090-26 = "So? Come at me!"
10045090-27 = "Those are my words. I'm utterly defenseless, so why are you standing there listlessly?"
10045090-28 = "Bah! You don't look defenseless to me at all!"
10045090-29 = "You...haven't given up."
10045090-30 = "How could I? I couldn't call myself a friend if I met your sincerity with underhanded tactics."
10045090-31 = "That's right. I'm going to win this, fair and square."
10045090-32 = "Is that so? I do believe I have the upper hand here."
10045090-33 = "What makes you say that?"
10045090-34 = "A tactician never reveals her secrets. If you won't come, then I will."
10045090-35 = "Oh, yeah?"
10045090-37 = "Then I'll just have to find out for myself!"
10045090-45 = "And it's begun!"
10045090-51 = "Hm? I wouldn't expect a bookworm like you to put up such a fight!"
10045090-52 = "I am of the Hyakkaryouran. I would never neglect my physical training."
10045090-53 = "And your problem remains the same as it always was, even when we were children. You maintain your philosophy of brute force, no matter the situation."
10045090-54 = "Huh? What about when we were kids?"
10045090-55 = "Do you recall our swinging competition when we were seven? To see who could swing higher?"
10045090-56 = "...Huh?"
10045090-57 = "Fufu. Perhaps you've blocked the memory. I won, because you did as you always do. You relied purely on your strength."
10045090-58 = "I can still recall the taste of the snacks you bought me for an entire week as punishment."
10045090-59 = "That's ancient history!"
10045090-61 = "Haven't you heard? History repeats itself!"
10045090-65 = "Ugh?!"
10045090-70 = "Oh my gosh! In a swift move, Kikyou kicks out Renge's feet from under her and knocks her down!"
10045090-71 = "And with this...!"
10045090-75 = "She's wrapped her legs around Renge and has her in a tight hold! Ah! She's taking her down!"
10045090-76 = "[ns] \"Her plan must be to drain Renge's strength and push her off!\""
10045090-77 = "It's no easy task to get out of a hold like this one! Will Renge be able to break free?"
10045090-78 = "Ugh! You and your big brain!"
10045090-79 = "But don't think I'll go down without a fight! Get off!"
10045090-85 = "Ugh. How did you get out...?"
10045090-86 = "I'm not the same kid who couldn't figure out how to swing higher! I learned from the best, after all. I held back some of my strength, in case you did something like that."
10045090-87 = "I wanted to see what you were planning first."
10045090-89 = "...You're right. It seems a few neurons are firing in that musclehead of yours."
10045090-90 = "What about you? Since when can you do a triangle choke?"
10045090-91 = "It's one of the fundamentals of knitting."
10045090-92 = "What kind of knitting have you been doing?!"
10045090-93 = "...I knitted my target."
10045090-94 = "*sigh* I guess it makes sense to you."
10045090-95 = "I hope you have a few other tricks up your sleeve, because that won't work on me again!"
10045090-104 = "I knew Kikyou would not surrender so easily!"
10045090-105 = "I'm happy to see her fight, not for the sake of others, but for herself."
10045090-106 = "However, the physical nature of this brawl sways the balance in Renge's favor, does it not?"
10045090-107 = "That is true. Some would say the scales are tipped towards her."
10045090-108 = "However, they fail to realize one thing about Kiryuu Kikyou."
10045090-110 = "She is the operations officer of the Hyakkaryouran!"
10045090-111 = "And she comes second to no one in her tactical skills!"
10045090-116 = "...You're exposed."
10045090-120 = "What're you doing? The floor..."
10045090-121 = "Gah?!"
10045090-125 = "Ah! How smart! Kikyou utilized the platform's elasticity to whip herself forward! And Renge's off balance!"
10045090-126 = "I will push you off!"
10045090-127 = "I won't let you...!!"
10045090-133 = "*huff* *puff* *huff*"
10045090-134 = "*wheeeeze*"
10045090-135 = "Tell me something. What happened? You seemed hell-bent on giving up earlier."
10045090-136 = "As I said. I simply answered your call."
10045090-137 = "Is that really it?"
10045090-138 = "That's..."
10045090-139 = "...It wasn't my fight to surrender, in the end."
10045090-141 = "Huh? What do you mean by that?"
10045090-142 = "I had every intention of bowing out as soon as the match began."
10045090-143 = "My duty is to the Hyakkaryouran. Always."
10045090-144 = "This time, however... This time, I felt I was beholden to more than simply our team."
10045090-146 = "...I felt my duty was to those who placed their faith in me, despite all that I lacked."
10045090-150 = "To Nagusa and Yukari."
10045090-155 = "To those who lent me aid."
10045090-160 = "To Sensei and the audience."
10045090-165 = "And...to you, Renge."
10045090-167 = "I deceived everyone for my own, selfish reasons. Yet, no one turned their back on me."
10045090-168 = "So I will not—cannot give up here."
10045090-169 = "For the sake of the Hyakkaryouran's honor."
10045090-170 = "And for all those who have pushed me forward."
10045090-171 = "And for our friendship. All of ours."
10045090-172 = "Hah! That's what I like to hear."
10045090-173 = "From here on out..."
10045090-174 = "This is our blazing youth!"
10045090-190 = "I'm completely enraptured! It's anyone's game at this point!"
10045090-191 = "[ns1] \"Will it be Renge's overwhelming power...\"\n[ns2] \"...or Kikyou's infallible technique?!\""
10045090-195 = "Ugh...!"
10045090-200 = "Take this!"
10045090-205 = "I...will! Not! Lose!"
10045090-211 = "That's...!"
10045090-212 = "Kikyou! Renge...!!"
10045090-213 = "Just who will come out on top?!"
10045090-217 = "And the winner is..."
10045090-218 = "[ns] \"Fuwa Renge!\""
10045090-222 = "(...)"
10045090-223 = "(...I see. I lost.)"
10045090-224 = "(I can feel myself sinking. My limbs are leaden with exhaustion.)"
10045090-229 = "(...However, I can't let Renge's efforts go to waste.)"
10045090-230 = "(I want to show her...)"
10045090-232 = "*gasp*"
10045090-233 = "You were swimming like a pro!"
10045090-234 = "*wheeeze*"
10045090-235 = "Is it safe to say you're not afraid of water anymore?"
10045090-236 = "I suppose you could say that."
10045090-242 = "[ns] \"You're the best! Both of you!\""
10045090-244 = "My upperclassmen are simply dazzling! I am in utter awe!"
10045090-245 = "Excellent work, you two."
10045090-252 = "Thank you...everyone."

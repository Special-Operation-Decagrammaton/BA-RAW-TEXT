[translation]
10045090-1 = "第9話;最終戰：推落對決"
10045090-2 = "讓各位觀眾久等了～！#n首先，請大家給從100人之中脫穎而出的4名選手們一個熱情的掌聲！"
10045090-6 = "接下來的戰鬥，將持續到只剩下1個人為止……！#n第一場比賽即將開始！"
10045090-8 = "首先是藍方！#n擅長以神機妙算的戰術壓制對手，百花繚亂的作戰參謀！"
10045090-9 = "有傳聞表示他十分怕水，究竟是否屬實呢！？#n有請桐生桔梗！"
10045090-10 = "到底是誰散播那種謠言的。"
10045090-11 = "再來是紅方！百花繚亂的突擊隊長，豬突猛進的鬼教官！"
10045090-12 = "同時也是追逐粉紅青春的花樣少女！不破～蓮華！"
10045090-13 = "……這誰寫的介紹詞啊。"
10045090-15 = "[ns]「……！？」"
10045090-16 = "老師？怎麼了嗎？"
10045090-17 = "[s]「沒，沒事。只是突然打了個冷顫而已。」"
10045090-18 = "嗯……？"
10045090-19 = "總之比賽即將開始！請選手們就位……！"
10045090-20 = "好，依照慣例──光明正大～一決勝負！"
10045090-26 = "怎麼？不打算先攻嗎？"
10045090-27 = "這是我要說的話。#n為什麼站著不動？我現在可是毫無防備哦。"
10045090-28 = "哼，毫無防備的人會露出那種眼神嗎？"
10045090-29 = "你……果然沒打算主動放棄啊？"
10045090-30 = "……你不是說想認真打一場嗎？#n那麼回應那份心意，就是朋友應盡的本分。"
10045090-31 = "既然如此，我就來光明正大地贏下這場比賽吧。"
10045090-32 = "是嗎？我倒覺得優勢在我呢。"
10045090-33 = "怎麼說？"
10045090-34 = "閒話就到此為止。#n你不過來的話，我可要先上了。"
10045090-35 = "是嗎？那就……"
10045090-37 = "用身體直接確認吧……！"
10045090-45 = "比賽開始了！"
10045090-51 = "哦？怎麼，這種力量可不像是只待在房裡看書的傢伙會有的啊？"
10045090-52 = "體能鍛鍊我也一直有在做。"
10045090-53 = "而且……你該不會以為光靠力量就能贏我吧？#n真是從小到大一點都沒變呢。"
10045090-54 = "從小？"
10045090-55 = "還記得七歲那年，我們一起比過誰的鞦韆盪得更高嗎？"
10045090-56 = "……咦？"
10045090-57 = "呵呵，最後是我贏了。#n因為你只是一味用蠻力在推鞦韆而已。"
10045090-58 = "當時輸了之後，你好像幫我跑腿買了一個星期的零食對吧？"
10045090-59 = "喂，那都多久以前的事了！"
10045090-61 = "……現在也是一樣！"
10045090-65 = "咕唔！？"
10045090-70 = "哦……！桔梗選手！用勾腿將蓮華選手絆倒了！"
10045090-71 = "就這樣拿下勝利……！"
10045090-75 = "桔梗選手開始用雙腿纏住蓮華選手！"
10045090-76 = "[ns]「他打算耗盡對手的體力，再將其推進海裡！」"
10045090-77 = "如亂線般纏繞的技巧！蓮華選手能順利脫身嗎！？"
10045090-78 = "咕唔，還挺會耍花招的嘛……！"
10045090-79 = "但我可不會就這樣認輸！#n哈啊啊啊……！"
10045090-85 = "竟然站起來了……？"
10045090-86 = "這招可是跟你學的。#n我剛才只是裝作被壓制，趁機保存體力而已。"
10045090-87 = "畢竟我也想看看你究竟會怎麼應對啊。"
10045090-89 = "……原來不是只有蠻力啊。看來你也進步了不少呢。"
10045090-90 = "剛才那招是三角絞嗎？#n沒想到你居然連這種技巧都會。"
10045090-91 = "那是翻花繩的基本技巧。"
10045090-92 = "這是哪門子的翻花繩啊！"
10045090-93 = "至少在纏住對手這點上有共通點吧。"
10045090-94 = "……好吧，還算有點道理。"
10045090-95 = "不過你接下來該怎麼辦呢？#n好心提醒你一下，再用同樣的招數可是行不通的哦……！"
10045090-104 = "桔梗前輩……果然沒有棄權呢。"
10045090-105 = "嗯，他並不是為了團隊，而是為自己而戰……真是太好了。"
10045090-106 = "不過這樣下去的話，蓮華前輩是不是更有優勢呢？"
10045090-107 = "沒錯。從各方面來看，確實都是蓮華佔優。"
10045090-108 = "然而……對桔梗來說或許未必如此。#n畢竟桔梗他可是……"
10045090-110 = "百花繚亂的作戰參謀！"
10045090-111 = "前輩他想必會用神出鬼沒的戰術來擊敗對手吧！"
10045090-116 = "有破綻……！"
10045090-120 = "你踩哪裡啊？那裡可是地板……"
10045090-121 = "哇！？"
10045090-125 = "啊！桔梗選手！利用地板的彈性破壞了蓮華選手的重心！"
10045090-126 = "就這樣把你推下去……！"
10045090-127 = "別想得逞……！！"
10045090-133 = "哈啊，哈啊，哈啊……"
10045090-134 = "呼……"
10045090-135 = "話說我突然有點好奇……原本打算放棄的你，為什麼又認真起來了？"
10045090-136 = "剛才不是說了嗎？因為你說想認真打一場。"
10045090-137 = "理由應該不止這個吧？"
10045090-138 = "是因為……"
10045090-139 = "……我無法輕易放棄。因為這不是我一個人的戰鬥。"
10045090-141 = "嗯？不是你一個人的戰鬥？"
10045090-142 = "老實說，我一開始確實打算放棄。"
10045090-143 = "想著如果將勝利讓給你，對團隊而言會更加有利。"
10045090-144 = "不過……在仔細思考之後，我發覺那樣是不對的。"
10045090-146 = "……大家都在為這樣的我加油。"
10045090-150 = "名草前輩、紫。"
10045090-155 = "借給我力量的人們。"
10045090-160 = "老師和無數的觀眾。"
10045090-165 = "還有蓮華你也是。"
10045090-167 = "我明明為了隱藏自己的弱點而欺騙了大家，大家卻依然支持著我。"
10045090-168 = "所以……我會堅持到最後。"
10045090-169 = "為了百花繚亂的榮耀。"
10045090-170 = "為了回報相信我、為我加油的所有人。"
10045090-171 = "以及為了你和我──為了大家的「友情」。"
10045090-172 = "哈……！這樣才對嘛！"
10045090-173 = "那我們就繼續吧。#n從現在開始……"
10045090-174 = "是青春的時間！"
10045090-190 = "真是激烈的攻防！誰會勝出完全無法預測！"
10045090-191 = "[ns1]「究竟是擁有壓倒性『力量』的蓮華！」\n[ns2]「還是『技巧』更勝一籌的桔梗呢！」"
10045090-195 = "咕嗚……！"
10045090-200 = "這下就是我贏了……！"
10045090-205 = "我絕對……不會輸！"
10045090-211 = "那是……！"
10045090-212 = "前輩們……！！"
10045090-213 = "這場勝負的結果究竟是……！！"
10045090-217 = "勝者是……！"
10045090-218 = "[ns]「不破蓮華……！」"
10045090-222 = "（……）"
10045090-223 = "（……這樣啊。是我輸了嗎）"
10045090-224 = "（身體好沉，感覺就像要沉入海底一樣）"
10045090-229 = "（……但是不能就這樣坐以待斃。蓮華不是教過我了嗎？）"
10045090-230 = "（我必須向大家證明……我也能做到！）"
10045090-232 = "噗哈……！"
10045090-233 = "哦，已經游得很不錯了嘛！"
10045090-234 = "呼……"
10045090-235 = "看來你已經不怕水了。"
10045090-236 = "嗯，雖然還有點生疏就是了。"
10045090-242 = "[ns]「你們兩個都非常棒哦！」"
10045090-244 = "前輩們……！真是場精彩的比賽……！！"
10045090-245 = "大家都辛苦了。"
10045090-252 = "大家……真的很謝謝你們。"

[translation]
1002506-1 = "Secret Base"
1002506-2 = "Playground Park Near Plum Blossom"
1002506-3 = "This is where my secret base was when I was a little kid."
1002506-4 = "I can't even remember the last time I came here."
1002506-5 = "It feels like it's been forever, but this playground has barely changed at all."
1002506-6 = "And my secret base is still in good shape, from the looks of it."
1002506-7 = "[s] \"I don't see anything...\""
1002506-8 = "Of course. It wouldn't be a secret base if you could find it so easily."
1002506-9 = "Care to try looking for it, Sensei?"
1002506-16 = "[ns1] \"Is it that thicket underneath the slide?\"\n[ns2] \"Nope. I'm all out of ideas.\""
1002506-17 = "Bzzt! Wrong answer."
1002506-18 = "That thicket is just a bunch of ordinary overgrown bushes."
1002506-19 = "Haha. You give up too easily."
1002506-21 = "It looks like you're struggling to find it, so I'll tell you myself."
1002506-22 = "The location of my secret base is..."
1002506-24 = "...here!"
1002506-25 = "[s] \"A concrete pipe?\""
1002506-26 = "It may look like an abandoned construction pipe, but the entrance is the perfect size. It's so small, only children can go in or out."
1002506-27 = "I would come here to feel better if anything bad happened while I was attending the Plum Blossom Garden myself."
1002506-28 = "It's where I would clear my thoughts because no one else could get in. It always seemed to work, oddly enough."
1002506-29 = "I'd spill resentment over annoying friends, and I'd also write about my dreams of becoming an awesome teacher someday..."
1002506-30 = "[s] \"It figures you were mature for your age.\""
1002506-31 = "Do you think so? I feel more like a childish miscreant these days."
1002506-32 = "I used to come here all the time, but I got scared I would get stuck as I grew older."
1002506-35 = "But I might be able to fit inside the pipe again with this body."
1002506-36 = "And I'm not saying I couldn't fit anymore because I got fat! I grew up in all sorts of ways!"
1002506-37 = "[s] \"You don't have to explain yourself to me.\""
1002506-38 = "O-Oh. Yeah, I guess that wouldn't need to be said."
1002506-39 = "Anyway, I'm going to head into my secret base for the first time in years. Please wait for me here, Sensei."
1002506-40 = "Here goes nothing."
1002506-46 = "― Heehee. This place hasn't changed one bit.[wa:6010] "
1002506-49 = "― The promises I wrote to myself on the wall[wa:620] "
1002506-51 = "― are still here."
1002506-54 = "― Those were the days...[wa:710] "
1002506-57 = "― Now that I look at them,[wa:1280] "
1002506-59 = "― I realize I managed to keep most of them.[wa:10] "
1002506-62 = "― Should I write[wa:1160] "
1002506-64 = "― a new wish above them, then?[wa:1630] "
1002506-67 = "[ns] \"What's it going to be?\""
1002506-68 = "― I-I can't tell you that.[wa:1930] "
1002506-70 = "― It's a secret!"
1002506-73 = "― Kids can't share[wa:1660] "
1002506-75 = "― their secrets with adults! Heehee.[wa:2080] "
1002506-78 = "Going back to my secret base for the first time since I was a child feels strange."
1002506-79 = "I was able to see what thoughts and dreams I had when I was little."
1002506-80 = "I feel blessed to have the opportunity to look back and see how I've grown."
1002506-81 = "[s] \"I wish I could go into the secret base too...\""
1002506-82 = "Nuh-uh. I already told you that adults aren't allowed. It's for kids only."
1002506-87 = "Buuut, we can play and make memories between just the two of us instead if you want. ♥"
1002506-89 = "I played with Shun at the abandoned playground until the sun went down."

[translation]
1002506-1 = "ฐานลับ"
1002506-2 = "สนามเด็กเล่นในสวนสาธารณะใกล้ๆ สวนต้นบ๊วย"
1002506-3 = "ที่นี่คือที่ที่มีฐานลับในวัยเด็กของฉันค่ะ"
1002506-4 = "จำไม่ได้แล้วว่าครั้งสุดท้ายที่มาคือเมื่อไหร่..."
1002506-5 = "ถึงจะรู้สึกว่ามันนานมากๆ แล้ว แต่สนามเด็กเล่นนี้ยังเหมือนเดิมเลยล่ะค่ะ"
1002506-6 = "ฐานลับของฉันยังอยู่ในสภาพเดิมด้วย"
1002506-7 = "[s] \"แต่ไม่เห็นมีอะไรเลยนะ...\""
1002506-8 = "ก็แน่นอนสิคะ ถ้าหาเจอง่ายๆ มันก็ไม่เรียกว่าฐานลับสิคะ"
1002506-9 = "คุณครูลองหาดูมั้ยล่ะคะ?"
1002506-16 = "[ns1] \"พุ่มไม้ใต้กระดานลื่นเหรอ...?\n[ns2] \"ครูหาไม่เจอเลย...\""
1002506-17 = "แอดดด! ผิดค่ะ!"
1002506-18 = "นั่นเป็นแค่พุ่มไม้ธรรมดาที่ไม่ได้รับการดูแลค่ะ"
1002506-19 = "ฮะฮ่า... ทำไมยอมแพ้เร็วแบบนี้ล่ะคะ?"
1002506-21 = "แต่ยังไงก็น่าจะหายากนะ งั้นฉันจะบอกให้แล้วกันค่ะ"
1002506-22 = "ที่ที่มีฐานลับของฉันก็คือ..."
1002506-24 = "ที่นี่ค่ะ!"
1002506-25 = "[s] \"ท่อคอนกรีต?\""
1002506-26 = "ใช่ค่ะ มันน่าจะเป็นท่อก่อสร้างที่ใครเอามาทิ้งไว้ ส่วนช่องเล็กๆ แบบนี้ก็เป็นขนาดที่พอเหมาะให้เด็กๆ#nได้วิ่งเข้าวิ่งออกค่ะ"
1002506-27 = "สมัยที่ฉันเป็นเด็กในสวนต้นบ๊วย เวลามีเรื่องเศร้าอะไรก็จะมาปลอบตัวเองที่นี่แหละค่ะ"
1002506-28 = "พอฉันนั่งทบทวนความคิดในฐานลับที่ไม่มีใครมองเห็น ฉันจะสงบใจลงได้เร็วจนเหลือเชื่อเลยล่ะค่ะ"
1002506-29 = "ในฐานลับนี้ฉันได้ทั้งระบายความอัดอั้นที่มีต่อเพื่อน แล้วก็วาดฝันการได้เป็นผู้ฝึกสอนคนเก่ง#nในอนาคตด้วย..."
1002506-30 = "[s] \"ชุนนี่มีความเป็นผู้ใหญ่ตั้งแต่เด็กเลยนะ\""
1002506-31 = "ฮุฮุ งั้นเหรอคะ? แต่ฉันรู้สึกเหมือนเป็นคนดื้อในร่างเด็กมากกว่าเลยล่ะค่ะ"
1002506-32 = "ถึงจะเคยมาที่นี่บ่อยๆ แต่พออายุมากขึ้นตัวก็โตเกินกว่าจะเข้าไปข้างในได้ ก็เลยไม่ได้เข้าไปเลยค่ะ"
1002506-35 = "แต่ตอนนี้คงเข้าไปได้อีกครั้งแล้วล่ะค่ะ"
1002506-36 = "ฉันไม่ได้บอกว่าตอนนั้นเข้าไม่ได้เพราะอ้วนนะคะ! ฉันแค่มีหลายส่วนที่โตขึ้นตามวัยน่ะค่ะ!"
1002506-37 = "[s] \"ไม่ต้องพูดแก้ตัวก็ได้...\""
1002506-38 = "ก็ได้ค่ะ! ก็ตอนนี้มันไม่ต้องกังวลเรื่องนั้นแล้วนี่คะ"
1002506-39 = "เอาล่ะ งั้นจะไปเข้าฐานลับอีกครั้งเลยดีกว่า คุณครูช่วยรออยู่ที่ทางเข้านะคะ"
1002506-40 = "รบกวนหน่อยนะคะ..."
1002506-46 = "― ฮิฮิ ที่นี่น่ะยังเหมือนเดิมไม่เคยเปลี่ยนเลยค่ะ[wa:5850] "
1002506-49 = "― คำสัญญาที่ให้ไว้กับตัวเอง ที่ฉันเขียนเอาไว้บนผนัง...[wa:220] "
1002506-51 = "― ยังอยู่เหมือนเดิมเลยนะคะ"
1002506-54 = "― คิดถึงตอนนั้นจัง...[wa:830] "
1002506-57 = "― พอมาดู... คำสัญญาที่เคยเขียนไว้[wa:1000] "
1002506-59 = "― ส่วนใหญ่... ฉันก็ทำได้สำเร็จเกือบทั้งหมดแล้วล่ะค่ะ[wa:10] "
1002506-62 = "― ถ้างั้น... ไหนๆ ก็มาแล้ว[wa:760] "
1002506-64 = "― คราวนี้... ฉันเขียนคำขอพรเอาไว้ล่วงหน้าเลยดีมั้ยคะ?[wa:710] "
1002506-67 = "[ns] \"เขียนไว้ว่าอะไรเหรอ?\""
1002506-68 = "― บอกไม่ได้หรอกค่ะ[wa:2250] "
1002506-70 = "― นี่เป็นความลับขั้นสุดยอด!"
1002506-73 = "― ก็เพราะว่ามันคือ...[wa:1540] "
1002506-75 = "― ความลับ...ของเด็กยังไงล่ะคะ ฮุฮุฮุ[wa:2080] "
1002506-78 = "ฮุฮุ พอได้เป็นเด็กแล้วมาที่ฐานลับอีกครั้งมันก็รู้สึกแปลกๆ นะคะ"
1002506-79 = "ทั้งได้มาย้อนดูว่าตอนเด็กๆ ฉันมีความคิดแบบไหน และตอนนั้นวาดฝันไว้ว่าอย่างไร..."
1002506-80 = "นี่เป็นโอกาสดีที่ให้ฉันได้ทบทวนความตั้งใจแรกในอดีตค่ะ"
1002506-81 = "[s] \"ครูก็อยากเข้าไปในฐานลับบ้างจัง\""
1002506-82 = "ไม่ได้นะคะ ก็บอกไปแล้วนี่นาว่าฐานลับเป็นที่เฉพาะของเด็กที่จะให้ผู้ใหญ่เข้ามาไม่ได้"
1002506-87 = "งั้นเอาเป็นว่า วันนี้เรามาสร้างความลับของสองเราด้วยกันที่นี่แทนแล้วกันค่ะ ♥"
1002506-89 = "(จากนั้นคุณครูก็เล่นในสนามเด็กเล่นที่ไร้ผู้คนกับชุนอยู่จนตะวันตกดิน)"

[translation]
1002506-1 = "那是祕密的"
1002506-2 = "梅花園附近的公園"
1002506-3 = "這個地方有我小時候的祕密基地。"
1002506-4 = "最後一次來是多久以前呢……"
1002506-5 = "雖然有種睽違已久的感覺，但這座公園幾乎沒什麼變化呢。"
1002506-6 = "希望我的祕密基地還沒有被撤走。"
1002506-7 = "[s] 「看起來就是個普通的公園……？」"
1002506-8 = "當然。如果能輕易找到，就不算是「祕密基地」了。"
1002506-9 = "那麼，請老師猜猜看我的祕密基地在哪吧！"
1002506-16 = "[ns1] 「溜滑梯底下的樹叢後面……！」\n[ns2] 「完全猜不到……」"
1002506-17 = "可惜！錯了！"
1002506-18 = "那裡只是普通的樹叢唷，什麼都沒有……大概。"
1002506-19 = "啊哈哈……也確實啦，畢竟乍看之下就只是個公園……"
1002506-21 = "那就來公布謎底吧。"
1002506-22 = "我的祕密基地……"
1002506-24 = "就在這裡！"
1002506-25 = "[s] 「……水泥管？」"
1002506-26 = "是。這好像是別人丟棄的工程用水泥管，大小正好適合小朋友進出。"
1002506-27 = "以前在梅花園上學的時候，#n每當發生鬱悶的事或是碰到煩惱，我就會跑來這個地方平復心情。"
1002506-28 = "待在這裡面不會被任何人打擾，也會很神奇的馬上靜下心來。"
1002506-29 = "可以悄悄地抱怨討厭的朋友，或是想像自己未來成為一名出色的教官……"
1002506-30 = "[s] 「旬從小就是個早熟的好孩子呢。」"
1002506-31 = "呵呵，是嗎？現在想起來，當時的這些舉動，完全是個非常不懂事的小孩呢……"
1002506-32 = "後來隨著身體慢慢成長，越來越進不去水泥管裡面，我也就越來越少來這裡了……"
1002506-35 = "但現在這個身體，應該可以順利進去吧。"
1002506-36 = "……啊，我的意思不是有變胖之類的喔！單純是指身高和其他很多部分……！"
1002506-37 = "[s] 「是，是嗎……」"
1002506-38 = "沒錯！請老師不要誤會了！"
1002506-39 = "好，那就久違地進去看看吧？老師請在入口等我。"
1002506-40 = "嘿咻……"
1002506-46 = "― 呵呵，這裡面幾乎沒什麼變化呢。[wa:7090] "
1002506-49 = "― 我寫下的，和自己的約定……[wa:1780] "
1002506-51 = "― 也還是當時的樣子。"
1002506-54 = "― 真叫人懷念……[wa:1310] "
1002506-57 = "― 這些約定，現在看來，[wa:1840] "
1002506-59 = "― 幾乎都有遵守呢。[wa:940] "
1002506-62 = "― 那麼機會難得，[wa:1440] "
1002506-64 = "― 這次要不要在這裡寫下將來的夢想呢？[wa:2070] "
1002506-67 = "[ns] 「將來的夢想？是什麼樣的夢想？」"
1002506-68 = "― 那，那個不能說！[wa:2570] "
1002506-70 = "― 是祕密……！"
1002506-73 = "― 是不能讓大人知道的，[wa:1900] "
1002506-75 = "― 專屬於小孩的祕密 ……呵呵。[wa:2880] "
1002506-78 = "呵呵，感覺就連心境都變回小孩子一樣。"
1002506-79 = "像這樣久違地回想起自己以前的想法……"
1002506-80 = "真的就如同字面上回歸初心了呢。"
1002506-81 = "[s] 「我也努力鑽進去看看好了……」"
1002506-82 = "不行。祕密基地是小朋友專屬的祕密空間。"
1002506-87 = "……不過相對的，讓我們從現在開始……創造許多專屬於我和老師的祕密吧♥"
1002506-89 = "（後來便和旬在這人煙稀少的地方，一起玩到太陽下山為止）"

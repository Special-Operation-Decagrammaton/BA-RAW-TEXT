1002506-1 = "#title;비밀 기지"
1002506-2 = "#place;매화원 인근 공원 놀이터"
1002506-3 = "3;꼬마 슌ND;13;여기가 제 어릴 적의 비밀기지가 있는 곳이에요.\n#3;a"
1002506-4 = "3;꼬마 슌ND;99;마지막으로 온 지 얼마나 되었을까요…\n#3;em;…"
1002506-5 = "3;꼬마 슌ND;01;무척 오랜만인 듯한 느낌이 들지만, 이 놀이터는 거의 그대로네요."
1002506-6 = "3;꼬마 슌ND;03;제 비밀기지도 여전히 건재한 것 같고요.\n#3;em;[반짝]\n#3;hophop"

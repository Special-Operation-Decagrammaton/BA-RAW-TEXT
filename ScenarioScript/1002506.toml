1002506-24 = "3;꼬마 슌ND;03;이곳이에요!\n#3;hophop\n#3;em;[반짝]"
1002506-25 = "[s] \"……콘크리트 파이프?\""
1002506-26 = "3;꼬마 슌ND;13;네. 누군가가 버려둔 공사용 토관인 듯한데, 입구가 작아서 어린아이가 드나들기에는 딱 좋은 크기였거든요.\n#3;em;[반응]\n#3;m3"
1002506-27 = "3;꼬마 슌ND;01;매화원에 다니던 시절의 저는 우울한 일이 생기면 이곳에서 마음을 달래곤 했어요."
1002506-28 = "3;꼬마 슌ND;99;사람이 드나들지 않는 비밀기지 안에서 생각을 정리하고 있노라면, 신기하게도 금세 마음이 진정되더라고요."
1002506-29 = "3;꼬마 슌ND;27;미운 친구에 대한 원망을 털어놓기도 하고, 또 멋진 교관이 된 미래의 나를 상상하며 꿈을 적어놓기도 하고…….\n#3;em;…"
1002506-30 = "[s] \"역시 슌은 어릴 적부터 조숙했구나.\""
1002506-31 = "3;꼬마 슌ND;03;후후, 그런가요? 지금의 제가 보기에는 어린아이의 철없는 일탈처럼 느껴지지만요.\n#3;em;[음표]"
1002506-32 = "3;꼬마 슌ND;01;그렇게 자주 찾던 비밀기지였지만, 나이가 든 이후로는 입구에 몸이 끼일 것 같아서 들어가 본 적이 없네요."

1002506-35 = "3;꼬마 슌ND;02;하지만 이 몸이라면 다시 토관에 들어가 볼 수 있겠어요."
1002506-36 = "3;꼬마 슌ND;10;……물론 살이 쪄서 들어갈 수 없었다는 건 아녜요! 여러모로 성장했으니까요!\n#3;em;[땀]\n#3;stiff"
1002506-37 = "[s] \"변명하지 않아도 돼…….\""
1002506-38 = "3;꼬마 슌ND;09;그, 그렇죠? 지금의 저와는 상관없는 이야기니까요."

[translation]
34130-1 = "Episode 13;Old Story"
34130-3 = "[ns1] \"(Seia...)\"\n[ns2] \"(Mika...)\""
34130-8 = "S-Sensei?"
34130-9 = "Sorry to wake you.  "
34130-10 = "Did you have a bad dream? We're used to it, but it's not easy to sleep in an environment like this."
34130-11 = "[s] \"...Something like a dream. How's the situation?\""
34130-12 = "I-I've been keeping a close eye on Leader's condition. Her fever's gone down, but she's still resting..."
34130-13 = "We can't dawdle much longer. It's still quiet, but we should leave in the next thirty minutes."
34130-14 = "[s] \"Thirty minutes...\""
34130-15 = "Yes. Is something wrong?"
34130-16 = "[s3] \"Can you tell me the rest of your story?\"\n[s4] \"I want to hear about your story.\""
34130-17 = "Huh? Th-That's..."
34130-18 = "Huh? Th-That's..."
34130-19 = "Why so much interest? We were Schale's enemy. It's not a pleasant story."
34130-23 = "...Fine, I guess. We have time anyways."
34130-24 = "..."
34130-26 = "My first memory is Madame declaring that the civil war was finally over."
34130-27 = "We were too young to understand. We didn't know about a civil war or even who Madame was."
34130-28 = "She declared herself the new Student Council president, as well as owner and ruler of Arius. She wasted no time imparting her teachings on the Arius Academy."
34130-30 = "All is in vain. Life is ultimately empty."
34130-32 = "Her philosophies...combat skills...anger and hatred... She taught us all of it to mold us into a perfect army."
34130-33 = "She also taught us that the source of our suffering was Trinity...that Gehenna would never deign to coexist with us."
34130-34 = "[ns] \"...\""
34130-36 = "Madame drilled the hate into us, teaching us what it was to kill. Turning us into murderers."
34130-37 = "And she made us believe murderers like us would never be accepted at another school."
34130-38 = "She was our master. She told us she was a grown-up who taught the truth of the world. That we must follow and respect her."
34130-39 = "She was an adult. We didn't know anything but to accept her teachings.  "
34130-41 = "Anyone who rebelled was punished ruthlessly, like Azusa and Hime."
34130-42 = "[s] \"...\""
34130-43 = "S-Sensei?! Why do you look so scary? Did we do something wrong?"
34130-44 = "I never promised a pleasant story."
34130-45 = "Y-Your story made Sensei mad, Misaki..."
34130-46 = "[s5] \"I'm sorry. Could you tell me more about Atsuko?\"\n[s6] \"Why do you call her 'Hime'?\""
34130-47 = "Wh-Why we call her Hime? "
34130-48 = "Wh-Why we call her Hime...? "
34130-49 = "Well... Um... B-Because she's Hime, I guess?"
34130-50 = "Hime...has always been Hime to us.  "
34130-52 = "A direct descendant of the previous Arius Student Council president... She has royal blood."
34130-53 = "The presidency was once passed down through families, so under normal circumstances, she would have been the Student Council president of Arius Satellite School."
34130-54 = "On the other hand, Leader, Hiyori, and I were petty thieves living in the slums since childhood. Although it was always Leader dragging us around."
34130-55 = "I can remember Hime's pretty dresses... she looked so graceful compared to us.. Heehee."
34130-57 = "Leader and I always admired her... Misaki didn't seem to care either way though."
34130-58 = "...It wasn't that exactly. I just saw no reason to express it."
34130-59 = "R-Really? All this time?!"
34130-60 = "Hime is kind, before all else. She held out her hand to a gloomy child like me.  "
34130-61 = "When she took off her mask, her smile warmed me. Atsuko is...precious to me, too."
34130-62 = "..."
34130-63 = "When the civil war ended, I learned that Madame planned on sacrificing Hime."
34130-64 = "We didn't really understand. We only knew how to blindly accept what was handed to us.  "
34130-65 = "It seemed natural the person we admired the most would be given such an honor."
34130-66 = "..."
34130-67 = "But Leader... Leader didn't accept it. She stole Hime away and brought her back to us."
34130-68 = "I didn't even know something like that could be done.  "
34130-69 = "I think Leader must have made a deal with her. Madame would never have handed Hime over."
34130-70 = "[s] \"...\""
34130-73 = "I could change Hime's fate...if I just faithfully carried out her orders."
34130-74 = "She said I could...save not only Hime...but the others too."
34130-76 = "So Hime hid her face and voice and started to undergo rigorous training with us."
34130-77 = "Leader taught all of us: me, Hiyori, Hime, and Azusa, who joined us later. Looking back, those were hard times."
34130-78 = "I still have nightmares about it... Leader was very scary back then."
34130-79 = "Then, we were named Squad and utilized to carry out many missions for Arius."
34130-80 = "But we couldn't complete this final mission, and Hime was taken."
34130-81 = "..."
34130-82 = "We became traitors, joined forces with Sensei, who was our target in the first place, and then returned to Arius. It's a ludicrous situation."
34130-87 = "I enjoyed your story."
34130-88 = "L-Leader?!"
34130-89 = "...You're up. Can you keep going?"
34130-90 = "I can. I'm sorry to have inconvenienced all of you."
34130-91 = "I-I'm so relieved...! I might cry... I didn't know what to do...!"
34130-92 = "At least your fever's gone down."
34130-93 = "Remember you're not fully recovered. Don't get frustrated you're not at 100%."
34130-94 = "So, what's the plan, Leader?"
34130-95 = "Go save Hime...?"
34130-96 = "No matter what.  "
34130-97 = "Our goal remains the same. We'll go to the Arius basilica and rescue Hime."
34130-98 = "..."
34130-99 = "..."
34130-100 = "How will we infiltrate the basilica? She knows we're here.  "
34130-101 = "I've considered that. So, we're going through Arius Satellite School's Former Institute."
34130-106 = "F-Former institute? It's in ruins! It's been falling apart for decades now!"
34130-107 = "Why there?"
34130-108 = "Hime once told me that when the Council built the original Arius Academy building, they made an underground corridor between the basilica and the academy."
34130-109 = "[s] \"The Council built Arius Academy?!\""
34130-110 = "Ah. Do you not know? It was the Saint Justina Council who supported Arius' exit from the Trinity alliance."
34130-111 = "Those who denounced Arius most strongly spearheaded our exodus and reconstruction. "
34130-112 = "The corridor is ancient history, so I doubt even she knows of it. "
34130-113 = "We'll slip into the basilica unnoticed if all goes well."
34130-114 = "Have you been there? Are you sure?"
34130-115 = "I've only heard of it from Hime. We'll have to find it somehow."
34130-116 = "I don't like so many uncertainties in a plan.  "
34130-117 = "B-But what other choice do we have? There're too many students to try to bulldoze our way through."
34130-118 = "Right. I wouldn't normally agree to this, but we have Sensei as backup if things take a turn for the worse."
34130-119 = "[s] \"It's our best option. Let's do it.\""
34130-120 = "Oh geez, life really is suffering."
34130-127 = "The Former Institute isn't far from here, but don't blow our cover. Or we'll miss our chance to save Hime."
34130-132 = "Affirmative."
34130-133 = "Let's go, Squad!"
34130-140 = "Somewhere in the Arius District"
34130-143 = "*cough* *cough* "
34130-144 = "Ugh... I've been cooped up eating roll cakes for too long. I'm already tired."
34130-150 = "At least I got to the Arius district. Step one, complete! "
34130-158 = "Wh-Who goes there?"
34130-159 = "Aren't you Misono Mika?"
34130-160 = "I'm like a celebrity! Hi, great timing!  "
34130-161 = "Which way to the basilica please? You can just point me in the right direction."
34130-162 = "I-Intruder! I'll contact the main force!"
34130-169 = "How rude of you! If you yell like that in the middle of the night, you might disturb someone's beauty sleep!"
34130-171 = "F-Fire! Attack!"
34130-175 = "It hurts... "
34130-176 = "Darn. I knew it was gonna come to this. "
34130-183 = "Next Episode;Face-to-Face"

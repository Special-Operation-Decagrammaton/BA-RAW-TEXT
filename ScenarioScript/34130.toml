[translation]
34130-1 = "ตอนที่ 13;เรื่องในอดีต"
34130-3 = "[ns1] (เซอา...)\n[ns2] (มิกะ...)"
34130-8 = "คะ... คุณครูคะ?"
34130-9 = "ขอโทษที... เผลอปลุกไปซะแล้ว "
34130-10 = "เมื่อกี้ครูฝันเหรอ? ก็ไม่แปลกหรอก สภาพแวดล้อมแบบนี้ใครจะไปหลับอย่างสบายได้ล่ะ ถ้าไม่ใช่พวกเรา..."
34130-11 = "[s] \"ทุกคนทำอะไรอยู่เหรอ?\""
34130-12 = "ดูสภาพร่างกายของหัวหน้าอยู่ค่ะ ยาลดไข้น่าจะทำให้ไข้ลดลงแล้ว แต่ตอนนี้หัวหน้ายังหลับอยู่ค่ะ..."
34130-13 = "แต่เราจะพักยาวไม่ได้หรอกนะ ตอนนี้สถานการณ์รอบๆ ยังไม่ค่อยมีอะไรเคลื่อนไหวนัก อีก 30 นาที ค่อยเดินทางกันอีกครั้งแล้วกัน"
34130-14 = "[s] \"30 นาที...\""
34130-15 = "ใช่ ครูต้องการอะไรหรือเปล่า?"
34130-16 = "[s3] \"งั้นช่วยเล่าเรื่องเมื่อกี๊ต่อได้ไหม?\"\n[s4] \"ครูอยากฟังเรื่องของพวกเธอน่ะ\""
34130-17 = "คะ? เอ่อ... เรื่องนั้นมัน..."
34130-18 = "คะ? เอ่อ... เรื่องนั้นมัน..."
34130-19 = "ทำไมถึงสงสัยเรื่องอะไรแบบนั้นล่ะ? เราเป็นกลุ่มที่เคยเป็นศัตรูกับ <ชาเล่ต์> นะ อีกอย่าง ต่อให้ฟังไปก็ไม่สนุกหรอก จะอารมณ์เสียเอาเปล่าๆ"
34130-23 = "แต่ว่า... ถ้าอยากฟัง ฉันก็จะเล่าเท่าที่ฉันรู้แล้วกัน เพราะไหนๆ ก็พอมีเวลานี่เนอะ"
34130-24 = "......"
34130-26 = "ความทรงจำแรกของฉันคือภาพของ <มาดาม> ที่ประกาศว่าสงครามกลางเมืองที่ยืดเยื้อมานาน#nได้สิ้นสุดลงแล้ว"
34130-27 = "แต่ตอนนั้นพวกเรายังเด็ก เราไม่รู้กันหรอกว่าสงครามกลางเมืองและ <มาดาม> คืออะไร ก็แค่เออออ#nไปกับสิ่งที่เห็นและได้ยินน่ะ"
34130-28 = "<มาดาม> ประกาศตัวเป็นทั้งประธานสภานักเรียนคนใหม่ เจ้าของ และผู้ปกครองคนใหม่ของอาเรียส จากนั้นเธอก็เริ่มสอนหลายสิ่งหลายอย่างให้กับนักเรียนที่ยังเหลืออยู่"
34130-30 = "[ruby=Vanitas vanitatum et omnia vanitas.]ทุกอย่างเปล่าประโยชน์และไร้ความหมาย[/ruby]"
34130-32 = "ทั้งเทคนิคการต่อสู้มากมาย... และความจริงที่ว่าทุกอย่างเปล่าประโยชน์และไร้ความหมาย..."
34130-33 = "เราถูกสอนว่าทุกความเจ็บปวดที่เราต้องเจอเป็นเพราะ <ทรีนิตี้> ... และเกเฮนน่าคือพวกคนที่อยู่ร่วมกับเราไม่ได้ค่ะ..."
34130-34 = "[ns] \"......\""
34130-36 = "และเราก็ถูกปลูกฝังว่าเรามีจิตใจที่โกรธแค้นต่อคนอื่นและมี <เจตจำนงในการฆ่า>... และเพราะสิ่งนั้น เราจึงไม่ต่างจาก <ฆาตกร> ค่ะ..."
34130-37 = "ก็เลยมีคำพูดที่ว่าเขตปกครองตนเองนี้เป็นพื้นที่แห่ง <ฆาตกร> ค่ะ..."
34130-38 = "ผู้หญิงคนนั้นบอกว่าเธอเป็นครูที่แท้จริงที่สอนความจริง และเป็นผู้ใหญ่ที่นักเรียนต้องเคารพ#nและปฏิบัติตาม..."
34130-39 = "ตอนนั้นพวกเราก็ได้แต่คล้อยตามค่ะ เพราะคิดว่าคำพูดของผู้ใหญ่ถูกต้อง... "
34130-41 = "ทุกคนทำตามคำสั่งสอนของผู้หญิงคนนั้น ส่วนนักเรียนที่ต่อต้านก็จะโดนดุด่า อย่างเช่นอาซึสะจัง... ไม่ก็องค์หญิงค่ะ"
34130-42 = "[s] \".........\""
34130-43 = "คะ... คุณครูคะ...?!  ทะ... ทำไมทำหน้าแบบนั้น...?!"
34130-44 = "ก็บอกไปแล้วนี่... ว่ามันเป็นเรื่องน่าอึดอัดใจ"
34130-45 = "ผู้ใหญ่นี่... น่ากลัวจริงๆ..."
34130-46 = "[s5] \"ขอโทษนะ ช่วยเล่าเรื่องอาสึโกะเพิ่มอีกได้ไหม?\"\n[s6] \"ทำไมอาสึโกะถึงถูกเรียกว่าองค์หญิงเหรอ?\""
34130-47 = "ระ... เรื่องที่ทำไมองค์หญิงถึงได้ชื่อว่าองค์หญิงน่ะเหรอคะ... "
34130-48 = "ทะ... ทำไมองค์หญิงถึงได้ชื่อว่าองค์หญิงน่ะเหรอคะ... "
34130-49 = "ก็... ก็เพราะเธอเป็นองค์หญิงยังไงล่ะคะ...?"
34130-50 = "องค์หญิงน่ะ... เคยเป็นองค์หญิงมาตั้งแต่เรายังเด็กกันมากๆ "
34130-52 = "เป็นเชื้อสายประธานสภานักเรียนอาเรียสที่เคยปกครองเขตปกครองตนเอง... ก็เลยถูกเรียกว่าเป็น <สายเลือดของราชวงศ์> น่ะ"
34130-53 = "แต่ก่อนตำแหน่งของประธานสภานักเรียนของเขตปกครองตนเองอาเรียสมาจากระบบสืบทอดอำนาจ องค์หญิงเลยต้องเป็นประธานสภานักเรียนของโรงเรียนสาขาอาเรียส"
34130-54 = "ส่วนหัวหน้า ฉัน และฮิโยริก็เป็นพวกลักเล็กขโมยน้อยที่กลิ้งเกลือกอยู่ในสลัมตั้งแต่เด็กๆ จะบอกว่าเราตามต้อยหัวหน้าเพราะถูกบังคับก็ได้"
34130-55 = "อะ... องค์หญิงที่ฉันจำได้... จะใส่ชุดเดรสที่สง่างามมาตั้งแต่เด็กๆ ค่ะ... แตกต่างกับพวกฉันราวฟ้า#nกับเหว... แหะๆๆ..."
34130-57 = "ทั้งฉันและหัวหน้าต่างก็อิจฉาองค์หญิงค่ะ แต่ว่าคุณมิซากิดูไม่ค่อยสนใจเท่าไร..."
34130-58 = "ไม่หรอก... ไม่ใช่ว่าฉันไม่สนใจ ฉันแค่ไม่มีเหตุผลที่ต้องเปิดเผยให้รู้น่ะ"
34130-59 = "จะ... จริงเหรอคะ?!"
34130-60 = "องค์หญิงน่ะ... ใจดีกับทุกคนเลย เธอยื่นมือมาช่วยเด็กที่เดียวดายและอมทุกข์อย่างฉันด้วย... "
34130-61 = "ฉันชอบที่ได้เห็นรอยยิ้มของเธอบ่อยๆ ในครั้งที่เธอยังไม่ได้ใส่หน้ากาก อาสึโกะก็... เป็นคนสำคัญ#nสำหรับฉันเหมือนกัน"
34130-62 = "......"
34130-63 = "และทันทีที่สงครามกลางเมืองจบลง ฉันก็ได้ยินเรื่องที่องค์หญิงจะต้องตกเป็นเครื่องสังเวยของ <ผู้หญิงคนนั้น>"
34130-64 = "ตอนนั้นฉันไม่รู้ว่ามันหมายถึงอะไร ได้แต่เข้าใจว่ามันอาจเป็นอย่างนั้น "
34130-65 = "เข้าใจว่าคนที่ได้รับการเคารพจากทุกคน... อาจจะต้องถูกเลือกให้เป็นเครื่องสังเวย..."
34130-66 = "......"
34130-67 = "แต่หัวหน้าคือคนที่หยุดมันไว้ได้ หัวหน้าพาตัวองค์หญิงที่ต้องไปเป็นเครื่องสังเวยมาไว้กับพวกเรา"
34130-68 = "ตอนนั้นฉันก็ไม่รู้ว่าทำไมถึงเกิดขึ้นได้... "
34130-69 = "เพราะ <ผู้หญิงคนนั้น> คงไม่ยอมปล่อยองค์หญิงมาง่ายๆ ... สงสัยหัวหน้ากับผู้หญิงคนนั้นคงจะ#nสัญญาอะไรกันไว้สักอย่างน่ะ"
34130-70 = "[s] \"......\""
34130-73 = "หากอยากเปลี่ยนโชคชะตาขององค์หญิง... หากฉัน... ทำตามคำสั่งของผู้หญิงคนนั้นอย่างซื่อสัตย์... "
34130-74 = "ฉันก็จะช่วยองค์หญิงไว้ได้... และช่วยเพื่อนๆ คนอื่นได้ด้วย..."
34130-76 = "จากนั้นองค์หญิงก็เริ่มฝึกฝนกับพวกเราอย่างเข้มงวดโดยปกปิดใบหน้าและเสียงของตัวเอง"
34130-77 = "ส่วนหัวหน้าก็... สอนฉัน ฮิโยริ องค์หญิง และอาซึสะที่มาเข้าร่วมทีหลังด้วยตัวเอง พอย้อนกลับไปคิด มันช่างเป็นความทรงจำที่มีแต่ความเจ็บปวด"
34130-78 = "เป็นช่วงเวลาที่ฉันไม่อยากจะนึกถึงเลยค่ะ... เพราะตอนนั้นหัวหน้าน่ากลัวเอามากๆ"
34130-79 = "และหลังจากนั้นพวกเราก็ได้ชื่อว่า <สควอด> และได้ทำภารกิจมากมายของอาเรียส"
34130-80 = "แต่ตอนสุดท้ายพวกเราทำภารกิจไม่สำเร็จ องค์หญิงก็เลยถูกจับไปเป็น <เครื่องสังเวย> อีกครั้ง#nตามสัญญา..."
34130-81 = "......"
34130-82 = "และพวกเราก็กลับมาที่อาเรียสอย่างคนทรยศ... คนทรยศที่ร่วมมือกับครูจาก <ชาเล่ต์> ที่ครั้งหนึ่ง#nเคยเป็นเป้าหมายของพวกเรา เป็นเรื่องที่ตลกไม่ออกเลยใช่ไหมล่ะ? "
34130-87 = "เล่าเรื่องซะสนุกเลยนะ"
34130-88 = "หะ... หัวหน้า?!"
34130-89 = "ตื่นแล้วสินะ... อาการเป็นยังไงบ้าง?"
34130-90 = "ไม่ถึงกับแย่มากหรอก ขอบใจที่ช่วยนะ ขอบใจทุกคนเลย"
34130-91 = "โล่งอกไปทีค่ะ... แหะๆๆ... นึกว่าเราจะจบเห่กันแล้วซะอีก..."
34130-92 = "อืม... ถ้าไข้ลดลงแล้วก็คงไม่มีปัญหาอะไร"
34130-93 = "แต่ก็อย่าลืมละว่าสภาพร่างกายไม่เต็มร้อย จะหักโหมมากไม่ได้นะ ปัญหาด้านร่างกายมันน่ารำคาญออกจะตายไป"
34130-94 = "ถ้างั้น... จากนี้เราจะเอายังไงกันดีล่ะหัวหน้า?"
34130-95 = "เราจะไปช่วยองค์หญิงกันเลยใช่ไหมคะ...?"
34130-96 = "ใช่ "
34130-97 = "เราจะไปที่มหาวิหารอาเรียส แล้วช่วยองค์หญิงออกมาจาก <ผู้หญิงคนนั้น> สิ่งนี้คือเป้าหมายแรก#nเริ่มของเรา"
34130-98 = "......"
34130-99 = "......"
34130-100 = "จะเข้าไปในมหาวิหารยังไงล่ะ? ผู้หญิงคนนั้นน่าจะรู้แล้วนะว่าพวกเราเข้าเขตปกครองตนเองมาได้แล้ว "
34130-101 = "ฉันคิดเส้นทางไว้ก่อนแล้ว เราจะไปอาคารเรียนเก่าของโรงเรียนสาขาอาเรียสกัน"
34130-106 = "อะ... อาคารเรียนเก่าเหรอคะ? แต่มันถูกทิ้งร้างมาหลายสิบปีแล้วนี่คะ...?!"
34130-107 = "ที่นั่นมีอะไรเหรอ?"
34130-108 = "ฉันได้ยินเรื่องนี้มาจากองค์หญิงน่ะ... สมัยก่อนตอนที่สาวกก่อตั้งอาคารโรงเรียนอาเรียส มีการสร้าง#nทางเชื่อมใต้ดินระหว่างมหาวิหารกับโรงเรียนด้วย"
34130-109 = "[s] \"สาวกก่อตั้งอาคารโรงเรียนอาเรียส...?\""
34130-110 = "อ่า... มันเป็นเรื่องประวัติศาสตร์น่ะ คนที่เลี่ยงสหพันธ์ทรีนิตี้มาสนับสนุนการหลบหนีของอาเรียสก็คือ สาวกยูสตาร์"
34130-111 = "บรรดาผู้ที่ประณามอาเรียสมากที่สุดเป็นผู้นำในการหลบหนีและฟื้นฟูเขตปกครองตนเองของอาเรียส "
34130-112 = "ส่วนทางเชื่อมก็เป็นสิ่งที่ถูกสร้างไว้นานมากแล้ว <ผู้หญิงคนนั้น> คงจะมองข้ามไป "
34130-113 = "ถ้าใช้ทางเชื่อมนั่น เราก็จะเข้าไปที่มหาวิหารได้โดยที่ไม่ถูกจับ"
34130-114 = "เคยเห็นทางเชื่อมนั้นไหมล่ะ?"
34130-115 = "เคยแต่ได้ยินน่ะ เราคงไม่มีทางเลือกอื่นนอกจากไปหากันเอง"
34130-116 = "คงงั้นสินะ... "
34130-117 = "ตะ... แต่ยังไงเราก็ต้องไปอยู่แล้วนี่คะ? เราจะฝ่าเขตปกครองตนเองไปแบบให้คนอื่นรู้ไม่ได้... นี่คงเป็นวิธีเดียวที่เหลือค่ะ..."
34130-118 = "ก็ใช่ ปกติแล้วนี่คงเป็นแผนที่ฉันไม่เห็นด้วย แต่ตอนนี้เราก็มีคุณครูมาด้วย... ฉันยอมรับว่าจู่ๆ ก็รู้สึก#nว่าทุกอย่างมันจะผ่านไปได้ด้วยดี"
34130-119 = "[s] \"เอาสิ ลองไปดูกันก่อน\""
34130-120 = "คะ... ค่ะ!"
34130-127 = "เขตซากอาคารเรียนเก่าอยู่ไม่ไกลจากตรงนี้ เราจะไปที่นั่นแบบไม่ให้เตะตาคนอื่น"
34130-132 = "เข้าใจแล้ว"
34130-133 = "ออกเดินทางได้ค่ะ!"
34130-140 = "ที่แห่งหนึ่งในเขตปกครองตนเองอาเรียส"
34130-143 = "แค่กๆ แค่กๆ... "
34130-144 = "ฮึ่ม... ร่างกายไม่กระฉับกระเฉงเลย สงสัยเป็นเพราะไม่ค่อยได้ออกมาโดนแดดนานเกินไป... หรือว่าจะเป็นเพราะแยมโรลกันแน่นะ?"
34130-150 = "ช่างเถอะ... ยังไงก็มาถึงอย่างปลอดภัยแล้ว "
34130-158 = "อะ... อะไรน่ะ?!  แกเป็นใคร!!"
34130-159 = "เธอ... เธอคือ?!"
34130-160 = "ฮ่ะฮ่าฮ่า ว่าไง มาได้จังหวะพอดีเลยนะ"
34130-161 = "พอจะรู้ไหมว่ามหาวิหารอาเรียสต้องไปทางไหน? ช่วยบอกทางฉันหน่อยสิ"
34130-162 = "มะ... มะ... มีผู้บุกรุก! รีบติดต่อกอง..."
34130-169 = "นี่ จะทำอะไรของเธอน่ะ? อย่าส่งเสียงดังกลางดึกสิ มันรบกวนชาวบ้านนะ ไม่มีใครสอนมาเหรอ?"
34130-171 = "ยิง ยิงเลย! โจมตี!!"
34130-175 = "เจ็บนะ... "
34130-176 = "ตะ... แต่ก็คิดไว้แล้วละว่าจะเป็นแบบนี้ "

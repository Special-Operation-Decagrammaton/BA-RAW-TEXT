34130-115 = "5;사오리;S2_18;듣기만 했어. 가서 찾아보는 수밖엔 없겠지……."
34130-116 = "3;미사키;99;그렇군……. "
34130-117 = "5;히요리;06;그, 그치만 가는 수밖엔 없잖아요? 눈에 띄게 자치구를 돌파하는 건 불가능할 거고……. 남은 방법은 그것 밖엔…….\n#5;em;…"
34130-118 = "3;미사키;01;그렇지. 평소 같으면 절대 동의하지 못할 작전이지만, 지금은 선생님도 있으니……. 어쩐지 모든 게 다 잘될 것 같은 기분이 들기도 해."

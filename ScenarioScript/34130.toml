34130-110 = "3;미사키;01;……. 아아. 역사 이야기지만, 트리니티 연합을 피해서 아리우스의 탈출을 지원한 게 유스티나 성도회였어."
34130-111 = "3;미사키;02;아리우스를 가장 강력하게 규탄했던 자들이 아리우스의 엑소더스와 재건을 주도했던 거지. "
34130-112 = "5;사오리;S2_08;회랑은 오래전에 만들어 둔 거라 <그녀>도 거기까진 생각이 미치지 않았을 거야. \n#5;a\n#3;m1"

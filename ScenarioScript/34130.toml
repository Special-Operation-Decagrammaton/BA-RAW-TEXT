34130-107 = "3;미사키;02;거기에 뭐가 있어?\n#3;closeup"
34130-108 = "3;사오리;S2_05;……공주님에게 들었던 이야기야. 예전에 성도회가 아리우스 학원 건물을 건립할 때, 바실리카와 학원 사이를 잇는 지하 회랑을 만들어 두었다고.\n#3;closeup"

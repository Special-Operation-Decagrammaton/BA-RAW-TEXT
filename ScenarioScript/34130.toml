34130-8 = "5;히요리;02;서, 선생님?\n#5;em;[?]\n#5;stiff"
34130-9 = "1;미사키;05;……미안. 깨웠나 보네. "
34130-10 = "1;미사키;02;꿈이라도 꾼 거야? 하긴, 이런 환경에선 편히 잠드는 건 쉽지 않겠지. 우리야 익숙하지만 말야."
34130-11 = "[s] \"……다들 뭐 하고 있었어?\""
34130-12 = "5;히요리;09;리더의 상태를 보고 있었어요. 해열제의 효과가 있었는지 열은 금방 내렸고 지금은 잠들어 있어요……."
34130-13 = "1;미사키;99;하지만 언제까지 쉬고 있을 수는 없어. 주변의 정황은 아직 큰 동향을 보이지 않으니 30분 정도 더 있다가 출발해도 되겠지."
34130-14 = "[s] \"30분인가…….\""
34130-15 = "1;미사키;02;그래. 뭔가 필요한 거라도 있어?\n#1;em;[반응]"
34130-16 = "[s3] \"그럼 아까 하던 얘기를 마저 해줄래?\"\n[s4] \"너희들의 이야기를 들려줬으면 해.\""
34130-17 = "5;히요리;01;네? 그, 그건…….\n#5;em;…"
34130-18 = "5;히요리;01;네? 그, 그건…….\n#5;em;…"
34130-19 = "1;미사키;11;어째서 그런 게 궁금한 거지? 우리는 <샬레>와 적대했던 집단인데. 게다가 들어봤자 전혀 즐겁지도 않고 불쾌할 뿐일 텐데."

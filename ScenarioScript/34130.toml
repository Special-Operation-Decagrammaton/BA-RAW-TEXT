[translation]
34130-1 = "第13話;我們的往事"
34130-3 = "[ns1] （聖亞……）\n[ns2] （彌香……）"
34130-8 = "老，老師？"
34130-9 = "……抱歉，吵醒你了嗎？"
34130-10 = "做夢了嗎？──嘛，要在這種環境下熟睡很困難對吧。雖然我們已經習慣了。"
34130-11 = "[s] 「……大家剛才在做什麼呢？」"
34130-12 = "在照顧隊長。退燒藥已經生效，順利退燒了。現在正在睡覺……"
34130-13 = "雖然也不能就這樣休息下去。#n……如果追兵沒有出現的話，再30分鐘左右就出發吧。"
34130-14 = "[s] 「30分鐘啊……」"
34130-15 = "嗯。有什麼想做的事嗎？"
34130-16 = "[s3] 「……能告訴我剛才那件事的後續嗎？」\n[s4] 「我想知道你們的事。」"
34130-17 = "呃……這，這個嘛……"
34130-18 = "呃……這，這個嘛……"
34130-19 = "為什麼會想知道那種事呢……可不是聽了會開心的事哦。"
34130-23 = "……算了，如果只是我知道的事也可以的話就告訴老師吧。反正也還有時間。"
34130-24 = "……"
34130-26 = "──最初的記憶，是宣告長久以來的內戰結束的「夫人」的姿態。"
34130-27 = "因為年紀還小，不管是內戰的事還是「夫人」的事，我們都不清楚。#n只覺得「這樣啊」就默默地接受了。"
34130-28 = "「夫人」自稱是奧利斯的新學生會長，同時也是主人和支配者。接著向殘留的學生教導了許多事情。"
34130-30 = "[ruby=Vanitas vanitatum et omnia vanitas.]一切皆為徒勞。無論去向何處，終將化為虛無[/ruby]。"
34130-32 = "各種戰鬥的技巧……以及「一切皆為徒勞」的真理……"
34130-33 = "我，我們經歷的痛苦全都是「三一」的錯……#n而「格黑娜」本來就是無法共存的存在，她是這麼教導我們的……"
34130-34 = "[ns] 「……」"
34130-36 = "因，因為我們有著對其他人「殺害的意志」……#n所以就和「殺人兇手」一樣……"
34130-37 = "而除了這個自治區以外，不存在「殺人兇手」的容身之處……"
34130-38 = "「她」宣稱自己才是教導真實的真的存在，是學生們必須跟從、尊敬的大人……"
34130-39 = "因，因為是大人說的話……所以我們毫不懷疑地接受了……"
34130-41 = "大家都聽從她的教導。#n因為只要反抗的話就會讓她生氣……就像梓醬和公主醬一樣。"
34130-42 = "[s] 「……」"
34130-43 = "噫……！？老，老師！？你的表情很可怕……！？"
34130-44 = "……我就說吧，不是什麼開心的事。"
34130-45 = "好可怕……大人真可怕……"
34130-46 = "[s5] 「……抱歉。可以告訴我關於敦子的事嗎？」\n[s6] 「為什麼敦子會被稱為『公主』呢？」"
34130-47 = "為，為什麼會叫她公主醬呢……"
34130-48 = "為，為什麼會叫她公主醬呢……"
34130-49 = "呃……因，因為是公主大人……？"
34130-50 = "公主她……在我們小時候就是公主了。"
34130-52 = "因為她繼承了過去統治自治區的奧利斯學生會長的血統。#n所以似乎被稱為「皇家血統」。"
34130-53 = "因為奧利斯自治區的學生會長在那之前似乎都是採取世襲制。#n──本來她應該會成為奧利斯分校的學生會長的。"
34130-54 = "……隊長、我和日和從小就在貧民窟過著不怎麼樣的生活。"
34130-55 = "在我記憶中的公主醬……從以前開始就穿著散發非凡氣質的衣服。#n和，和我們完全不一樣……嘿，嘿嘿……"
34130-57 = "我和隊長都非常羨慕公主醬。#n……不過美咲同學好像沒什麼興趣就是了……"
34130-58 = "……不，我也不是完全沒興趣喔，只是沒有表現出來而已。"
34130-59 = "原，原來是這樣嗎！？"
34130-60 = "公主真的很善良。就連對我這種人都願意伸出手……"
34130-61 = "這麼說來在還沒戴上面具的時候，她常常會笑的對吧……#n敦子她……對我來說也是重要的人。"
34130-62 = "……"
34130-63 = "──內戰結束之後，開始有了公主會被「她」當成祭品獻上的傳聞。"
34130-64 = "雖然我們不清楚究竟是為什麼……"
34130-65 = "因為是被大家尊敬著的高貴存在所以才會被選上，當時的我們是這麼想的。"
34130-66 = "……"
34130-67 = "不過，隊長並沒有接受這點。#n所以才會把本來會被當成祭品獻上的公主帶回我們身邊。"
34130-68 = "雖然不知道是怎麼做到的……"
34130-69 = "我不認為「她」會老實的解放公主……我想隊長和「她」之間或許做了什麼約定吧。"
34130-70 = "[s] 「……」"
34130-73 = "想要改變公主的命運的話，就聽從她的命令……"
34130-74 = "這樣一來，不只是公主……其他的夥伴也能得救。"
34130-76 = "於是公主隱藏了臉和聲音，和我們一起接受了訓練。"
34130-77 = "隊長她……親自指導了我和日和、公主──以及後來加入的梓。現在回想起來那可真是辛苦的回憶。"
34130-78 = "不太想想起來呢……那個時候的隊長超級可怕的……"
34130-79 = "之後，我們被稱為「小隊」，負責執行奧利斯的眾多任務。"
34130-80 = "……不過，從結果來看我們沒能完成任務，公主則依照約定作為「祭品」被抓走了。"
34130-81 = "……"
34130-82 = "……而我們則和原本是目標的「夏萊」的老師一起，以叛徒的身分回到了奧利斯──真是讓人笑不出來呢。"
34130-87 = "你們在聊有趣的話題呢。"
34130-88 = "隊，隊長！？"
34130-89 = "……你醒了啊。身體怎麼樣？"
34130-90 = "還不到無法行動……幫大忙了。"
34130-91 = "太，太好了……嘿嘿……我還以為全部都要完蛋了……"
34130-92 = "這樣啊……燒也退了，應該沒事了。"
34130-93 = "但是也別忘了現在並不是正常狀態啊。"
34130-94 = "……那麼，接下來該怎麼做呢？"
34130-95 = "現在要去救公主醬對吧……？"
34130-96 = "沒錯。"
34130-97 = "前往奧利斯的宗座聖殿救出公主。從一開始目標就只有這個。"
34130-98 = "……"
34130-99 = "……"
34130-100 = "你打算怎麼進入宗座聖殿？#n我們已經潛入自治區這點，她也已經知道了哦。"
34130-101 = "路線已經想好了。──我們往奧利斯分校的舊校舍去吧。"
34130-106 = "舊，舊校舍嗎？#n那，那裡是棄置很久的廢墟唷……！？"
34130-107 = "那裡有什麼嗎？"
34130-108 = "……雖然我也只是從公主那裡聽來的，過去聖徒會建設奧利斯分校的時候，似乎建造了一條連結宗座聖殿和分校的地下迴廊。"
34130-109 = "[s] 「聖徒會建造了奧利斯分校……？」"
34130-110 = "……嗯。過去──支援反對三一聯合的奧利斯脫逃的就是優斯提娜聖徒會。"
34130-111 = "最嚴厲譴責奧利斯的他們主導了奧利斯的[ruby=Exodus]三一自治區逃離[/ruby]和重建。"
34130-112 = "迴廊是在非常久以前建造的，「她」不知道那裡的可能性很高。"
34130-113 = "雖然會繞一點遠路，但應該能安全地進入宗座聖殿才對。"
34130-114 = "知道迴廊在哪裡嗎？"
34130-115 = "不……要先找出迴廊才行。"
34130-116 = "這樣啊……"
34130-117 = "但，但是也沒有其他方法了對吧？#n還，還是只能強行突破宗座聖殿……？我覺得絕對行不通的……"
34130-118 = "強行突破是行不通的吧。……也對，平常的話是不會依靠這種傳言就去找什麼迴廊的，不過現在有老師在……或許可行？"
34130-119 = "[s] 「嗯，總之先去試試看吧。」"
34130-120 = "是，是！"
34130-127 = "舊校舍離這裡不遠，小心別引人注目地移動吧。"
34130-132 = "了解。"
34130-133 = "出發吧！"
34130-140 = "奧利斯自治區某處"
34130-143 = "咳，咳咳……"
34130-144 = "唔嗯……是因為最近都待在房間裡嗎，感覺身體有點遲鈍呢……還是是因為蛋糕捲？"
34130-150 = "……嘛，不過好像總算是到了呢。"
34130-158 = "什，什麼！？什麼人！！"
34130-159 = "你，你是！？"
34130-160 = "啊哈哈，你們好呀☆……對了，你們來得正好！"
34130-161 = "吶吶，奧利斯的宗座聖殿在哪？"
34130-162 = "侵，侵入者在這裡！快聯絡本隊……"
34130-169 = "吶，不行這樣唷──在晚上引起騷動會造成別人的困擾吧。沒有人教過你們嗎？"
34130-171 = "開，開火！！所有人，進攻！！"
34130-175 = "好痛……"
34130-176 = "算了，早就覺得會變成這樣了。"
34130-183 = "下一話;邂逅"

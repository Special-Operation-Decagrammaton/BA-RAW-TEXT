34130-23 = "1;미사키;99;……. 내가 알고 있는 것만으로도 괜찮다면, 뭐. 알겠어. 어차피 시간도 있으니.\n#1;em;…"
34130-24 = "5;히요리;06;……."
34130-25 = "#all;hide"
34130-26 = "#na;미사키;내 최초의 기억은, 오랫동안 이어진 내전이 끝났다는 걸 선언하는 <마담>의 모습이었어."
34130-27 = "#na;미사키;우리는 어렸기에 내전이 뭔지, <마담>이 뭔지 아무것도 몰랐어. 그저 그렇구나, 하고 납득할 뿐이었어."
34130-28 = "#na;미사키;<마담>은 자신이 아리우스의 새로운 학생회장이자, 주인이자, 지배자라고 선언했고, 남아있던 학생들에게 많은 것들을 가르치기 시작했어."
34130-29 = "#all;hide"
34130-30 = "#stm;[0,0];smooth;100;[ruby=Vanitas vanitatum et omnia vanitas.]모든 것은 헛되고 또 헛되나니.[/ruby]"
34130-31 = "#wait;1500"
34130-32 = "#na;미사키;다양한 전투 기술들과……. 모든 것은 헛되고 또 헛되다는 진리……."
34130-33 = "#na;히요리;우리들이 겪는 고통은 전부 <트리니티> 때문이고…… 게헨나는 애초에 공존하지 못할 자들이라고 배웠어요……."
34130-34 = "#clearST\n[ns] \"…….\""
34130-35 = "#all;hide"
34130-36 = "#na;히요리;우리는 누군가를 증오하고 미워하는 <살해 의지>를 가졌기에…… 그 원죄 때문에 우리는 <살인자>와 다를 바가 없다고 했어요……."
34130-37 = "#na;히요리;그래서 이 자치구 외에는 어디에도 <살인자>가 있을 곳은 없다고 했어요……."
34130-38 = "#na;히요리;<그녀>는 자신이야말로 진실을 가르치는 참된 스승이며, 학생들이 마땅히 따르고 존경해야 할 어른이라고 했었으니까……."
34130-39 = "#na;히요리;어른이 하는 이야기니까…… 당연히 그렇구나, 하고 납득했어요……. "
34130-40 = "1;미사키;05\n5;히요리;01\n#1;h\n#5;h"
34130-41 = "5;히요리;06;다들 그 가르침을 따랐고, 거기 반항하는 학생은 혼나게 되는 거죠……. 아즈사 쨩이나, 아니면 공주님처럼."
34130-42 = "[s] \"……………….\""
34130-43 = "5;히요리;10;서, 선생님……?! 표, 표정이……?!\n#5;shake\n#5;em;[?!]"
34130-44 = "1;미사키;11;……. 말했잖아. 불쾌한 이야기일 뿐이라고."
34130-45 = "5;히요리;04;무서워…… 어른은 무서워…….\n#5;stiff"
34130-46 = "[s5] \"……미안해. 아츠코에 대해서 좀 더 이야기해줄래?\"\n[s6] \"아츠코는 왜 공주님이라고 불리는 거야?\""
34130-47 = "1;미사키;05\n5;히요리;01;고, 공주님이 왜 공주님이냐면……. \n#5;em;…"
34130-48 = "1;미사키;05\n5;히요리;01;고, 공주님이 왜 공주님이냐면……. \n#5;em;…"
34130-49 = "5;히요리;03;어…… 그, 그야 공주님이니까……?"
34130-50 = "1;미사키;99;공주님은…… 우리들이 아주 어릴 적부터 공주님이었어. "
34130-51 = "#all;hide"
34130-52 = "#na;미사키;자치구를 통치하던 아리우스 학생회장의 혈통……. 그래서 <로열블러드>라고 불렸던 것 같아."
34130-53 = "#na;미사키;예전의 아리우스 자치구의 회장직은 그런 식으로 계승되었던 것 같으니, 원래라면 그녀가 아리우스 분교의 학생회장이 되었겠지."
34130-54 = "#na;미사키;그에 비해 리더와 나, 히요리는 어릴 적부터 함께 빈민가에서 뒹굴던 좀도둑들이었어. 리더가 거의 강제로 끌고 다닌 거지만."
34130-55 = "#na;히요리;제, 제가 기억하는 공주님은…… 어릴 때부터 기품이 넘치는 드레스 같은 걸 입고 있었어요. 저희들과는 다르게…… 헤헤……."
34130-56 = "1;미사키;01\n5;히요리;03\n#1;h\n#5;h"
34130-57 = "5;히요리;03;저나 리더에게 공주님은 늘 선망의 대상이었어요……. 미사키 씨는 별로 관심 없는 듯했지만…….\n#5;em;…"
34130-58 = "1;미사키;99;……아니. 나도 관심이 없진 않았어. 딱히 드러낼 이유가 없었을 뿐."
34130-59 = "5;히요리;10;그, 그런 거였나요?!\n#5;shake\n#5;em;[?!]"
34130-60 = "1;미사키;01;공주님은…… 누구에게나 친절했지. 나같이 음침하고 우울한 녀석에게도 먼저 손을 내밀어주었으니까……. "
34130-61 = "1;미사키;03;가면을 쓰지 않던 시절에는 그 아이의 미소를 자주 볼 수 있어서 좋았어. 아츠코는…… 나에게도 소중한 사람이야.\n#1;em;…"
34130-62 = "5;히요리;06;……."
34130-63 = "1;미사키;99;그리고 내전이 끝나자 공주님은 <그녀>에 의해 제물이 될 거라는 이야기가 들려 왔어."
34130-64 = "1;미사키;02;무슨 이야기인지 우리는 잘 몰랐지만 아마 그런 거라고 납득했어. "
34130-65 = "1;미사키;05;모두가 우러러보는 존재는, 아마 그렇기 때문에 제물로 선택되는 거라고."
34130-66 = "5;히요리;06;……."
34130-67 = "1;미사키;99;하지만 그걸 막아낸 게 리더였지……. 리더는 제물로 바쳐졌어야 할 공주님을 우리에게 데려온 거야."
34130-68 = "1;미사키;06;어떻게 그게 가능했는지는 그때는 알지 못했지만…… "
34130-69 = "1;미사키;05;<그녀>가 순순히 공주님을 풀어줬을 리는 없었을 테니까, 아마 리더와 그녀 사이에 어떤 약속이 있었겠지.\n#1;em;[반응]"
34130-70 = "[s] \"…….\""
34130-71 = "#all;hide"
34130-72 = "#all;hide"
34130-73 = "#na;사오리;공주님의 운명을 바꾸고 싶다면…… 내가…… 충실하게 그녀의 명령을 수행한다면……. "
34130-74 = "#na;사오리;공주님뿐만 아니라…… 다른 아이들도…… 구할 수 있다고 했어."
34130-75 = "1;미사키;99\n5;히요리;01\n#1;h\n#5;h"
34130-76 = "1;미사키;02;그렇게 공주님은 얼굴과 목소리를 가린 채 우리와 함께 혹독한 정예 훈련을 받기 시작했어."
34130-77 = "1;미사키;05;리더는…… 나와 히요리, 공주님, 그리고 나중에 합류한 아즈사를 손수 가르쳤어. 지금 생각해보면 고통밖에 없는 기억들이지만.\n#1;em;…"
34130-78 = "5;히요리;04;떠올리기도 싫은 시기였죠…… 그때의 리더는 엄청 무서웠으니까…….\n#5;stiff\n#5;em;[땀]"
34130-79 = "1;미사키;02;그 후 우리는 <스쿼드>로 불리며 아리우스의 수많은 임무를 수행하게 된 거지."
34130-80 = "1;미사키;99;……결과적으로 우리가 임무를 완수하지 못했고, 공주님은 약속대로 <제물>로 잡혀가 버렸지만."
34130-81 = "5;히요리;06;……."
34130-82 = "1;미사키;01;그리고 우린 원래 타깃이었던 <샬레>의 선생님과 함께 배신자가 되어 아리우스로 돌아왔으니, 정말이지 웃기지도 않는 이야기인 거지."

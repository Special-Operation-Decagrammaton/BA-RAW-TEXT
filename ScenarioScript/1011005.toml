[translation]
1011005-1 = "專用圖書館"
1011005-7 = "……咦？老師。"
1011005-8 = "你怎麼會來這種地方呢？#n我應該沒有請你特地來一趟才對……"
1011005-9 = "不，我當然開心。#n老師的到來是我始終期盼的事。"
1011005-10 = "你能在我沒有拜託的情況下過來，我反而更開心。"
1011005-11 = "因為這裡今天……一直都只有我一個人。"
1011005-12 = "[s1]「一直都只有你一個人？」\n[s2]「真是個清靜的地方呢。氣氛也很好。」"
1011005-15 = "……呵呵，就是說啊。"
1011005-16 = "這裡是三一茶會的專用圖書館。只有茶會所屬的學生可以進入。"
1011005-17 = "其實除了我們現在身處的這座圖書館外，三一還有另外幾棟「茶會專用建物」。"
1011005-18 = "畢竟茶會並不單單只有我們三個人，還有很多其他成員。"
1011005-19 = "不過這裡就如你所見……相當冷清。"
1011005-20 = "偶爾會有幾名學生過來，但通常都會在找到需要的資料後馬上離開。"
1011005-21 = "畢竟大部分的人，本來就沒有像這樣悠閒坐下來讀書的興趣，#n即便有，也會選擇待在各自的房間裡看書吧。"
1011005-22 = "我……？我為什麼要來這裡看書？"
1011005-23 = "呵呵，因為我的房間布置得非常舒適，所以通常不會選擇在房間看書。"
1011005-24 = "要是在那種地方看書，恐怕連一本都沒看完就睡著了吧。"
1011005-25 = "適當的不舒適感，在看書的時候反而偶有奇效。"
1011005-26 = "雖然不常讓你見到，但我其實挺喜歡看書的。#n其他人想找我的時候也會先來這裡，而不是去我的房間。"
1011005-27 = "儘管我很想跟其他一起人看書，談論書中的內容……"
1011005-28 = "可惜要將興趣相同的人聚集在一起並不容易。#n即使只是看書這麼平凡的興趣也是。"
1011005-29 = "而且如果是在這裡以外的地方……#n有很多一般學生的普通圖書館的話，感覺會造成他們的壓力，所以我並沒有那麼做。"
1011005-30 = "要分享看過的書，其實也得在親近或平等的關係下才有辦法做到。"
1011005-31 = "如果我向一般同學提出意見，那個意見就會被解讀得過於沉重。"
1011005-32 = "嗯，所以我沒辦法那麼做。#n雖然曾想過幾次，但每次都在中途打消了念頭。"
1011005-33 = "因為我只是想交流書籍的內容，而不是向其他人施壓。"
1011005-34 = "[s3]「不過還是值得一試吧。」\n[s4]「連一次也沒試過嗎？」"
1011005-37 = "……我大概能猜到老師想說什麼。"
1011005-38 = "但你大可以放心。#n我並沒有因此覺得一個人很孤單或難過。"
1011005-39 = "再怎麼說，這也只跟「看書」這項興趣有關。#n實際上我的交友情況並不差。"
1011005-43 = "不過……嗯……"
1011005-44 = "這麼說也對。#n假如老師能在這方面多多協助的話……"
1011005-45 = "感覺似乎會更加愉快……#n這是我剛剛萌生的欲望。"
1011005-46 = "不管我說什麼，老師應該都不會感到多餘的壓力或產生誤會吧。"
1011005-47 = "說著說著似乎產生了更多貪欲呢。這樣沒問題嗎？"
1011005-48 = "在不會過於頻繁的前提下……偶爾當我看書時的聊天夥伴。"
1011005-49 = "[s5]「我當然很樂意。」\n[s6]「這種事我喜歡。我贊成。」"
1011005-52 = "……呵呵。那真是太好了。"
1011005-53 = "每次見到老師，都能感受到新的喜悅呢。"
1011005-54 = "既然都說到這裡了，要不要挑一本書看看？#n還是要我為你推薦呢？"
1011005-55 = "也許這裡看起來並不起眼，但三一知名的書籍至少都收藏了一本。"
1011005-56 = "除了必須收藏在古書館裡的稀有書籍之外，想找什麼應該都找得到。"
1011005-57 = "雖然如果老師想看的書在那裡，我也能立刻請他們給一本……"
1011005-62 = "剛才是開玩笑的。之前也說過，就算是我也不會濫用茶會的權限。#n況且依照圖書委員長的個性，他也不會容許這種事輕易發生吧。"
1011005-63 = "但我說想推薦書是認真的，要看看我的推薦清單嗎？"
1011005-64 = "……來，請挑一本吧。"
1011005-68 = "嗯嗯。原來如此……你選那本書啊……"
1011005-72 = "……啊。"
1011005-73 = "[s7]「……聖亞？」\n[s8]「怎麼了嗎？」"
1011005-76 = "沒，沒什麼。#n不是什麼特別的事……只是感到有點困擾。"
1011005-77 = "因為老師挑的那本書已經被人借走，所以目前不在這裡。"
1011005-78 = "而借走那本書的人就是我。因此書現在就在我的房間裡。"
1011005-79 = "……請不要用那種表情看我。這真的不是我編出來的。"
1011005-80 = "雖然我確實說過「通常不會」在自己房間看書，但也沒說過「絕對不會」。#n現在這本書確實在我房間。"
1011005-81 = "真是個令人高興的巧合啊，因為這是老師親自挑的書……"
1011005-85 = "看來為了把書交給你，得請老師陪我回房間一趟了。"
1011005-86 = "請容我再次強調，我並沒有耍任何手段。#n這只是個單純且令人愉快的偶然罷了。"
1011005-87 = "正好我今天也想借點書回去……"
1011005-94 = "[ns9]「……聖亞？」\n[ns10]「你要借的書還真多耶？」"
1011005-97 = "呵呵，畢竟才剛碰上那種巧合。#n或許以後還會再發生，不是嗎？"
1011005-98 = "既然有這種可能性存在……我打算多拿一點回去放著。"
1011005-99 = "不過要我自己全部拿回去，確實是有點重。"
1011005-100 = "……老師。"
1011005-106 = "你願意幫幫我嗎？"
1011005-108 = "（於是便拿著書，一起回到了聖亞的房間）"
1011005-109 = "（聖亞所說的「推薦書籍」就放在桌子上，彷彿已期盼了許久一般）"

[translation]
1011005-1 = "ห้องสมุดส่วนตัว"
1011005-7 = "เอ๋ คุณครู...?"
1011005-8 = "มาทำอะไรไกลถึงที่นี่เลยคะ? วันนี้ฉันไม่ได้ขอให้มาหานี่นา..."
1011005-9 = "ไม่ค่ะ ฉันต้องดีใจอยู่แล้วค่ะ ฉันคาดหวังกับการมาหาของคุณครูตลอดอยู่แล้วค่ะ"
1011005-10 = "พอคุณครูมาหาแบบที่ฉันไม่ได้เป็นฝ่ายขอก่อน มันก็ยิ่งน่าดีใจนะคะ"
1011005-11 = "นั่นก็เพราะว่า... ฉันอยู่ที่นี่คนเดียวมาทั้งวันเลยค่ะ"
1011005-12 = "[s1] \"อยู่คนเดียวตลอดเลยเหรอ?\"\n[s2] \"ที่นี่ทั้งเงียบและบรรยากาศดีจังเลยเนอะ\""
1011005-15 = "ฮุฮุ... ใช่แล้วค่ะ"
1011005-16 = "ที่นี่คือห้องสมุดส่วนตัวของสภาน้ำชาแห่งทรีนิตี้ ต้องเป็นนักเรียนในสภาน้ำชาเท่านั้นที่จะเข้ามาที่นี่ได้"
1011005-17 = "ความจริงแล้วนอกจากห้องสมุดส่วนตัวที่พวกฉันใช้กัน ในทรีนิตี้ก็ยังมี 'อาคารส่วนตัวของสภาน้ำชา' อยู่หลายอาคารเลยละค่ะ"
1011005-18 = "ใช่ว่าสภาน้ำชาจะมีแต่พวกฉันสามคนเท่านั้นนี่คะ เรายังมีเพื่อนร่วมโรงเรียนอีกหลายคนเลยค่ะ"
1011005-19 = "แต่ว่าก็อย่างที่เห็นว่า... ที่นี่น่ะเงียบสงบมากเลยค่ะ"
1011005-20 = "บางครั้งก็มีเพื่อนสภาน้ำชาคนอื่นแวะมาบ้าง แต่ส่วนใหญ่ก็จะมาแค่หาหนังสือที่ต้องการแล้วกลับไป"
1011005-21 = "ไม่ค่อยมีใครที่มีงานอดิเรกนั่งอ่านหนังสือเงียบๆ เท่าไรนัก และต่อให้มี พวกเธอก็คงจะไปอ่านในห้อง#nอ่านส่วนตัวกันน่ะค่ะ"
1011005-22 = "ฉันน่ะเหรอคะ...? ทำไมฉันถึงมาอ่านหนังสือถึงที่นี่อย่างงั้นเหรอคะ?"
1011005-23 = "ฮุฮุ ก็เพราะห้องของฉันตกแต่งไว้อย่างสบายเอามากๆ น่ะสิคะ ฉันไม่ค่อยอ่านหนังสือในห้องของฉัน#nหรอกค่ะ"
1011005-24 = "เพราะถ้าอ่านในห้องที่สบายตัวแบบนั้น ฉันก็จะหลับไปก่อนจะอ่านจบเล่มอีกค่ะ"
1011005-25 = "บางทีความไม่สะดวกสบายก็เป็นส่วนช่วยในการอ่านหนังสือเหมือนกันนะคะ"
1011005-26 = "ฉันไม่ค่อยแสดงให้คุณครูได้เห็นบ่อยนัก แต่ที่จริงฉันชอบการอ่านหนังสือค่ะ เวลาคนอื่นจะมาหาฉัน ก็จะมาที่ห้องสมุดก่อนห้องของฉันอีกค่ะ"
1011005-27 = "ถ้าเป็นไปได้ฉันก็อยากอ่านหนังสือและพูดคุยเกี่ยวกับหนังสือที่อ่านกับคนพวกนั้น..."
1011005-28 = "แต่การมารวมตัวกันเพราะมีงานอดิเรกตรงกันก็ไม่ใช่เรื่องง่ายเลยค่ะ ต่อให้จะเป็นงานอดิเรกธรรมดาๆ อย่างการอ่านหนังสือก็เถอะ"
1011005-29 = "อีกอย่าง... นักเรียนคนอื่นก็มักจะไปที่ห้องสมุดกลางกันมากกว่า ถ้าขอให้มาที่นี่แทนมันก็จะเป็นการ#nรบกวนเกินไปน่ะค่ะ"
1011005-30 = "ที่จริงการพูดคุยเรื่องหนังสือก็ควรจะต้องมีความใกล้ชิดสนิทสนมหรืออยู่ในระดับความสัมพันธ์ที่เท่า#nเทียมกัน"
1011005-31 = "ถ้าฉันแสดงความคิดเห็นต่อหน้าเพื่อนร่วมโรงเรียนนอกชมรม ความคิดเห็นของฉันอาจเป็นสิ่งที่หนัก#nหน่วงเกินไปก็ได้ค่ะ"
1011005-32 = "ค่ะ เพราะงั้นฉันก็เลยทำแบบนั้นไม่ได้น่ะค่ะ ฉันคิดเรื่องนี้อยู่หลายครั้ง แต่แล้วฉันก็ยอมแพ้กลางคัน#nทุกครั้งไปค่ะ"
1011005-33 = "ฉันก็แค่อยากสนทนาผ่านหนังสือ ไม่ได้อยากรบกวนคนอื่นน่ะค่ะ"
1011005-34 = "[s3] \"แต่ก็คุ้มที่จะลองดูนะ\"\n[s4] \"ไม่เคยลองเลยเหรอ?\""
1011005-37 = "ฉันพอจะเดาได้บ้างค่ะว่าคุณครูจะพูดอะไร..."
1011005-38 = "แต่คุณครูไม่ต้องกังวลไปหรอกค่ะ ถึงอย่างนั้นฉันก็ไม่ได้รู้สึกเปล่าเปลี่ยวหรือเศร้าใจหรอกค่ะ"
1011005-39 = "ยังไง 'การอ่านหนังสือ' มันก็เป็นแค่งานอดิเรกเท่านั้น เรื่องความสัมพันธ์ของฉันกับคนอื่นมันไม่ได้แย่#nขนาดนั้นหรอกค่ะ"
1011005-43 = "แต่ว่า... อืม..."
1011005-44 = "นั่นสินะคะ ถ้าหากคุณครูให้ความร่วมมือกับฉันในส่วนนี้ได้บ้างละก็..."
1011005-45 = "ถ้าอย่างนั้น... ก็น่าจะสนุกขึ้นนะ นี่คือความโลภที่เพิ่งผ่านเข้าหัวของฉันเมื่อกี้เลยค่ะ"
1011005-46 = "ถ้าเป็นคุณครู ฉันก็คงไม่ต้องกังวลว่าพูดอะไรไปแล้วจะลำบากใจหรือเข้าใจผิดโดยไม่จำเป็นหรือเปล่า"
1011005-47 = "ยิ่งพูดฉันก็ยิ่งเกิดความโลภ คุณครูพอจะไหวมั้ยคะ?"
1011005-48 = "ฉันจะไม่ขอบ่อยนักหรอกค่ะ... ฉันแค่อยากให้ช่วยมาเป็นเพื่อนคุยเรื่องการอ่านหนังสือของฉันบ้าง#nเป็นครั้งคราวน่ะ"
1011005-49 = "[s5] \"ครูยินดีอยู่แล้ว\"\n[s6] \"ได้เลย ครูชอบอะไรแบบนี้เหมือนกัน\""
1011005-52 = "ฮุฮุ... ดีค่ะ"
1011005-53 = "ทุกวันที่ฉันได้เจอคุณครู ก็จะมีเรื่องใหม่ให้ดีใจอยู่เรื่อยเลยนะคะ"
1011005-54 = "ไหนๆ ก็พูดเรื่องอ่านหนังสือกันแล้ว งั้นคุณครูก็เลือกไปสักเล่มเลยมั้ยคะ? หรือว่าอยากให้ฉันแนะนำ#nให้ดีคะ?"
1011005-55 = "เห็นอย่างนี้ที่นี่ก็มีหนังสือชื่อดังที่อยู่ในห้องสมุดอื่นของทรีนิตี้เหมือนกันนะคะ"
1011005-56 = "คุณครูหาหนังสือทั่วไปจากที่นี่ได้หมดเลยค่ะ เว้นแต่ว่าจะเป็นหนังสือหายากที่ต้องเก็บไว้ในอาคาร#nฝั่งตะวันตกเก่าน่ะ"
1011005-57 = "แต่ก็แน่นอนว่าถ้าคุณครูต้องการหนังสือที่อยู่ในอาคารนั้นละก็ ฉันก็จะไปขอมาให้เดี๋ยวนี้เลย..."
1011005-62 = "ล้อเล่นน่ะค่ะ อย่างที่ฉันเคยบอกไปก่อนหน้านี้ว่าฉันไม่ใช้อำนาจของสภาน้ำชาในทางแบบนั้นหรอกค่ะ อีกอย่าง หัวหน้าชมรมอ่านหนังสือของโรงเรียนนี้ก็คงไม่อนุญาตเรื่องแบบนั้นได้ง่ายๆ ด้วยค่ะ"
1011005-63 = "แต่ที่ฉันบอกว่าอยากแนะนำหนังสือให้ก็เป็นเรื่องจริงนะคะ คุณครูลองดูลิสต์หนังสือแนะนำของฉัน#nหน่อยมั้ยล่ะคะ?"
1011005-64 = "เอาละ เลือกมาหนึ่งเล่มเลยค่ะ..."
1011005-68 = "อืม อืม อย่างนั้นสินะคะ เลือกเป็นเล่มนี้สินะ..."
1011005-72 = "อ๊ะ..."
1011005-73 = "[s7] \"เซอา... ทำไมเหรอ?\"\n[s8] \"เป็นอะไรไปเหรอ?\""
1011005-76 = "มะ... ไม่มีอะไรค่ะ ไม่ใช่อะไรมากมายหรอกค่ะ มันแค่เกิดเรื่องยากนิดหน่อยน่ะค่ะ"
1011005-77 = "แค่หนังสือที่คุณครูเลือกมา ตอนนี้มันไม่อยู่ในห้องสมุดนี้ค่ะ มีคนยืมไปอ่านน่ะค่ะ"
1011005-78 = "และคนคนนั้นก็คือฉันเอง ตอนนี้หนังสือเล่มนั้นอยู่ในห้องของฉันค่ะ"
1011005-79 = "ฉันพูดจริงนะคะ อย่ามองฉันด้วยสีหน้าแบบนั้นสิ... ฉันไม่ได้แต่งเรื่องขึ้นนะ"
1011005-80 = "ถึงฉันจะบอกไปเองว่า 'ฉันไม่อ่านหนังสือในห้องตัวเอง' แต่ก็ใช่ว่าจะ 'ไม่อ่านเลย' นี่คะ ตอนนี้หนังสือเล่มนั้นอยู่ในห้องของฉันจริงๆ ค่ะ"
1011005-81 = "เอาละ ถึงมันจะเป็นเรื่องที่ไม่ได้คาดหวัง แต่ในขณะเดียวกันก็เป็นเรื่องน่ายินดี แล้วหนังสือเล่มนั้นก็#nเป็นเล่มที่คุณครูเลือกเองด้วย..."
1011005-85 = "ถ้างั้นสงสัยคุณครูต้องกลับไปที่ห้องพร้อมกับฉันแล้วละค่ะ อย่างน้อยก็เพื่อไปเอาหนังสือเล่มนั้นยังไง#nล่ะคะ"
1011005-86 = "ฉันขอย้ำอีกครั้งนะคะว่าฉันไม่ได้มีแผนการอะไรแอบแฝงเลย นี่เป็นเรื่องบังเอิญจริงๆ ค่ะ เป็นแค่เรื่องบังเอิญที่ทำให้ฉันดีใจเอามากๆ น่ะค่ะ"
1011005-87 = "กำลังคิดอยู่เลยว่าวันนี้จะยืมหนังสือกลับไปอ่านสักหน่อย..."
1011005-94 = "[ns9] \"เซอา...? หนังสือเยอะไปแล้วหรือเปล่า?\"\n[ns10] \"เอาหนังสือพวกนี้ไปทำกองดองเหรอ?\""
1011005-97 = "ฮุฮุ มันคาบเกี่ยวกับเรื่องบังเอิญเมื่อกี้น่ะค่ะ ไม่มีใครกำหนดว่าไม่ควรเกิดเรื่องแบบเดียวกันอีกใน#nอนาคตนี่คะ"
1011005-98 = "บางทีอาจจะเกิดสถานการณ์แบบนี้ในอนาคตอีกก็ได้... ฉันก็เลยอยากเอาหนังสือไปเผื่อไว้นิดหน่อย#nน่ะค่ะ"
1011005-99 = "แต่ฉันน่าจะหอบหนังสือพวกนี้กลับไปคนเดียวไม่ไหว"
1011005-100 = "คุณครูคะ..."
1011005-106 = "พอจะช่วยฉันหน่อยได้มั้ยล่ะคะ?"
1011005-108 = "(หลังจากนั้นคุณครูก็ช่วยถือหนังสือกลับไปถึงห้องของเซอา)"
1011005-109 = "(และ 'หนังสือแนะนำ' ของเซอาก็วางอยู่บนโต๊ะจริงๆ)"

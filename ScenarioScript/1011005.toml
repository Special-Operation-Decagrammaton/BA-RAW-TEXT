[translation]
1011005-1 = "Exclusive Library"
1011005-7 = "...Ah, Sensei."
1011005-8 = "What brings you here? I don't believe I specifically asked for you to come..."
1011005-9 = "No, of course I'm happy. Your visits are always a pleasure."
1011005-10 = "In fact, it's wonderful to see you here unprompted."
1011005-11 = "As it happens, I am...here by myself all day."
1011005-12 = "[s1] \"You've been alone here this whole time?\"\n[s2] \"It's a nice place to be. Spacious. I like the atmosphere.\""
1011005-15 = "...Fufu, indeed."
1011005-16 = "This is the exclusive property of Trinity's Tea Party. Only members and their guests are welcome here."
1011005-17 = "In fact, it's not the only Tea Party-exclusive building on campus."
1011005-18 = "There are more than just the three of us in the Tea Party, after all. There are many of us, in fact."
1011005-19 = "Regardless, as you can see, this place is very quiet."
1011005-20 = "A few students do drop by from time to time, but they typically come for class materials and such."
1011005-21 = "Not many of them read for pleasure, and those who do tend to read in their own rooms."
1011005-22 = "You ask why I read here, then?"
1011005-23 = "Fufu, I made my room too comfortable for reading books. I rarely read there these days."
1011005-24 = "Were I to try, I would likely nod off, and the book would slip from my hands."
1011005-25 = "So when it comes to reading, a bit of discomfort can actually help."
1011005-26 = "You haven't seen it from me yourself, but in truth, I read so much that people often check for me here before they try my own room."
1011005-27 = "I would love to find others to share my books with..."
1011005-28 = "...but even for such a widespread hobby, bringing people together for it can be extraordinarily difficult."
1011005-29 = "And, were I to bring my peers to the library, I would inevitably feel as if I were burdening them."
1011005-30 = "Another complication is my own social standing. It's difficult to discuss books freely when one of us has higher status."
1011005-31 = "Were I to express my opinion of a book in front of regular students, they might feel compelled to agree."
1011005-32 = "So I could never bring myself to follow through with such a thing. I've often thought about it, but I've always stopped myself."
1011005-33 = "I would love to share conversations through a book, but without troubling anyone."
1011005-34 = "[s3] \"I still think it's worth trying.\"\n[s4] \"Have you actually tried it before?\""
1011005-37 = "...I understand where you're leading me with that."
1011005-38 = "But you needn't worry. My life is not lonely or lacking."
1011005-39 = "My reading hobby is rather solitary, but I do have fine relationships with other students."
1011005-43 = "That said... Um..."
1011005-44 = "Perhaps you might be willing to accompany me on a trip through a book sometime."
1011005-45 = "We would both enjoy it. At least I think so."
1011005-46 = "I wouldn't have to worry about dragging you about anyplace or burdening you with my own opinions."
1011005-47 = "...This already sounds greedy of me. But what would you say to it?"
1011005-48 = "It wouldn't be frequent, mind you, only occasional...but I would love to have you as a reading partner now and again."
1011005-49 = "[s5] \"I'd love that.\"\n[s6] \"I'm all for it.\""
1011005-52 = "...Fufu. Wonderful."
1011005-53 = "Every day we meet, you find a new way to make me happy."
1011005-54 = "Now, the question is, would you like to pick a book? Or would you like me to recommend you one?"
1011005-55 = "This place has at least one copy of every book known to the school."
1011005-56 = "Unless you're looking for some ancient tome, in which case you'd want the old library, you can find it here."
1011005-57 = "And if you ARE looking for something from the old library, I can give them a call for you."
1011005-62 = "...That's a joke. As I mentioned before, I wouldn't abuse my power that way. Not that our school's Library Committee president would let me."
1011005-63 = "But I would like to recommend you a book. Several, actually, if you'd like to see this list I've prepared."
1011005-64 = "...Go on. Choose whichever one you like."
1011005-68 = "Mmm, mm. I see. So you're going with...that one."
1011005-72 = "...Ah."
1011005-73 = "[s7] \"...Seia?\"\n[s8] \"What's wrong?\""
1011005-76 = "N-Nothing. Merely a...minor problem."
1011005-77 = "That book isn't here right now. Someone already borrowed it."
1011005-78 = "And that someone is me. The book is in my room."
1011005-79 = "...Now why are you looking at me like that? Do you not believe me?"
1011005-80 = "I said I RARELY read books in my room, not that I NEVER do. I promise you, it's there as we speak."
1011005-81 = "And, by that happy coincidence..."
1011005-85 = "I suppose we'll have to head back to my room so that I can give it to you."
1011005-86 = "Again, this is pure coincidence. A lucky, delightful coincidence."
1011005-87 = "Lucky, also, that I happened to think of borrowing more books today..."
1011005-94 = "[ns9] \"...Seia?\"\n[ns10] \"How many books do you have checked out?\""
1011005-97 = "Fufu, well, let's just say this coincidence isn't the only stroke of luck that could have happened here."
1011005-98 = "There's always the chance it could happen again. One must be prepared for such things."
1011005-99 = "That said, I do believe I've checked out too many books to carry."
1011005-100 = "...Sensei?"
1011005-106 = "Would you mind helping me?"
1011005-108 = "Afterwards, I carried Seia's books to her room."
1011005-109 = "The \"recommended book\" from Seia was on the table, as if it was waiting for me."

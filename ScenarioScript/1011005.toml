[translation]
1011005-1 = "#title;전용 도서관"
1011005-2 = "#wait;1000"
1011005-3 = "#wait;2000"
1011005-4 = "4;세이아;99\n#4;a\n#wait;1000"
1011005-5 = "4;세이아;99\n#4;em;…\n#wait;2500"
1011005-6 = "4;세이아;00\n#4;em;[반응]\n#wait;1500"
1011005-7 = "4;세이아;02;……어라, 선생님.\n#4;m3"
1011005-8 = "4;세이아;01;이런 곳까지 무슨 일로 오셨나요? 오늘은 특별히 와 달라 요청드리지 않았는데……."
1011005-9 = "4;세이아;02;아니요. 물론 기쁩니다. 선생님께서 찾아와 주시는 건 늘 바라 마지않는 일이니까요."
1011005-10 = "4;세이아;03;오히려 부탁드리지도 않았는데 이렇게 찾아와 주셔서 더 기쁘네요."
1011005-11 = "4;세이아;02;그러잖아도 여긴……. 오늘 하루 종일 저 혼자였거든요."
1011005-12 = "[s1] \"계속 혼자 있었어?\"\n[s2] \"한적한 곳이네. 분위기도 좋고.\""
1011005-13 = "#wait;100"
1011005-14 = "#wait;100"
1011005-15 = "4;세이아;03;……후후, 그러네요.\n#4;jump"
1011005-16 = "4;세이아;02;트리니티의 티파티 전용 도서관. 티파티에 소속된 학생들만 올 수 있는 곳."
1011005-17 = "4;세이아;03;사실 지금 저희가 있는 이 도서관 외에도, '티파티 전용 건물'들은 트리니티 내에 몇 군데 더 존재한답니다."
1011005-18 = "4;세이아;02;티파티라는 것이, 꼭 저희 셋만 뜻하는 것도 아니니까요. 많은 학우분들이 계시죠."
1011005-19 = "4;세이아;01;하지만 보시다시피……. 이곳은 한산하네요.\n#4;em;…"
1011005-20 = "4;세이아;99;간혹 몇몇 학우분들이 들르시긴 합니다만, 보통은 필요한 자료를 찾아가는 정도."
1011005-21 = "4;세이아;08;이렇게 느긋하게 앉아 독서를 하는 취미는 보통 없으시거나, 있어도 각자의 방에서 하시겠지요."
1011005-22 = "4;세이아;01;저요……? 왜 저는 여기까지 와서 책을 읽냐고요?"
1011005-23 = "4;세이아;02;후후, 제 방은 지나치게 편안하게 꾸며 둬서 말이에요. 웬만해서는 방에서 책을 읽지 않아요.\n#4;jump"
1011005-24 = "4;세이아;99;그런 곳에서 책을 읽다간, 한 권도 다 읽지 못하고 잠이 들 테죠."
1011005-25 = "4;세이아;02;책을 읽을 때에는 적당한 불편함도, 때로는 오히려 도움이 되는 법이니까요."
1011005-26 = "4;세이아;01;보여드린 적은 많지 않지만 저는 꽤 책 읽는 걸 좋아한답니다. 다른 분들도 저를 찾으실 때, 제 방보다 이곳으로 더 먼저 오셨을 정도로."
1011005-27 = "4;세이아;08;마음 같아서는 그분들과 함께 책을 읽고, 또 읽은 책에 대해 이야기해보고 싶지만……."
1011005-28 = "4;세이아;06;같은 취미로 사람을 모은다는 게, 그리 쉬운 일이 아니더군요. 독서처럼 평범한 취미마저도.\n#4;em;[한숨]"
1011005-29 = "4;세이아;06;그렇다고 여기가 아닌……. 다른 학우분들이 많은 일반 도서관을 찾아가자니, 그분들께 부담을 드리는 것 같아서 그러지 못했습니다."
1011005-30 = "4;세이아;99;책에 대한 이야기를 나눈다는 것도, 사실 어느 정도 가깝거나 대등한 관계여야 가능한 것."
1011005-31 = "4;세이아;08;일반 학우분들 앞에서 제가 의견을 내면, 그 의견은 지나치게 무거운 말로 전달되겠지요."
1011005-32 = "4;세이아;01;네, 그래서 저는 그럴 수 없었습니다. 생각은 몇 번 했지만, 모두 도중에 그만두었지요."
1011005-33 = "4;세이아;02;저는 책을 통해 대화를 나누고 싶은 것일 뿐, 다른 분들을 괴롭히고 싶은 게 아니니까요."
1011005-34 = "[s3] \"그래도 시도 정도는 해볼 만한데.\"\n[s4] \"한 번도 시도해 본 적은 없었어?\""
1011005-35 = "#wait;100"
1011005-36 = "#wait;100"
1011005-37 = "4;세이아;01;……선생님께서 무슨 말씀을 하시려는지는 대략 예상하고 있습니다."
1011005-38 = "4;세이아;02;하지만 걱정하지 않으셔도 돼요. 그렇다고 해서, 저 스스로 외로움을 탄다거나 서운함을 느끼는 건 아니거든요."
1011005-39 = "4;세이아;03;아무튼 이건 어디까지나 '독서'라는 취미에 관한 이야기일 뿐. 제 교우 관계는 그리 나쁘지 않답니다."
1011005-40 = "#st;[0,0];instant;1;"
1011005-41 = "#clearST"
1011005-42 = "4;세이아;03\n#4;em;…\n#wait;2500"
1011005-43 = "4;세이아;06;하지만……. 음……."
1011005-44 = "4;세이아;02;그러네요. 만약, 이런 부분이라도, 만일 선생님께서 조금 더 협조해 주신다면……."
1011005-45 = "4;세이아;03;그렇다면 더욱더 즐거울 것 같다……. 그런 생각은 드네요. 방금 막 생긴 제 욕심입니다."
1011005-46 = "4;세이아;03;선생님이라면, 당신께서는 제가 어떤 말을 할 때라도 불필요한 부담이나 오해에 대해 걱정할 필요 없겠지요."
1011005-47 = "4;세이아;02;말씀드리다 보니 더욱 욕심이 커지네요. 혹시 괜찮으실까요?"
1011005-48 = "4;세이아;01;너무 잦지는 않겠지만……. 가끔이라면, 제 독서의 말동무가 돼 주시는 것 말이에요."
1011005-49 = "[s5] \"나야 물론 좋지.\"\n[s6] \"이런 거 좋아해. 나는 찬성.\""
1011005-50 = "#wait;100"
1011005-51 = "#wait;100"
1011005-52 = "4;세이아;03;……후후. 좋아요.\n#4;em;[음표]"
1011005-53 = "4;세이아;02;선생님과 뵙는 날은 매 날마다 새로운 기쁨이 하나씩 생겨나는군요."
1011005-54 = "4;세이아;01;말이 나온 김에, 한 권 골라 보시겠나요? 아니면 제가 추천해 드리는 게 좋을까요?"
1011005-55 = "4;세이아;02;이래 봬도 트리니티 안의 웬만큼 유명한 책들은 다 한 권씩 보관해 두고 있는 곳이에요."
1011005-56 = "4;세이아;01;고서관에 있어야 될 정도로 희귀한 게 아닌 이상에야 원한다면 다 찾을 수 있지요."
1011005-57 = "4;세이아;02;물론 선생님께서 원하시는 책이 그곳에 있다면, 지금 바로 요청을 넣어 한 권 빼 달라 할 수는 있겠지만……."
1011005-58 = "#st;[0,0];instant;1;"
1011005-59 = "#clearST"
1011005-60 = "4;세이아;01\n#4;em;…\n#wait;2500"
1011005-61 = "4;세이아;99\n#4;em;[한숨]\n#wait;1500"
1011005-62 = "4;세이아;03;농담이에요. 전에도 말씀드렸듯, 아무리 저라고 티파티의 권한을 그런 식으로는 쓰지 않으니까요. 저희 학교 도서부장 성격에, 그걸 쉬이 허락해 줄 리도 없고요.\n#4;em;[음표]"
1011005-63 = "4;세이아;02;하지만 책을 추천해 드리고 싶다는 말은 사실이니, 저의 추천 리스트라도 봐주시겠어요?"
1011005-64 = "4;세이아;01;……자, 한 권 골라 주세요.\n#4;greeting"
1011005-65 = "#st;[0,0];instant;1;"
1011005-66 = "#clearST"
1011005-67 = "#wait;2500"
1011005-68 = "4;세이아;00;음, 음. 그렇군요. 과연……. 그 책이라……."
1011005-69 = "#st;[0,0];instant;1;"
1011005-70 = "#clearST"
1011005-71 = "4;세이아;04\n#4;em;[?]\n#wait;1500"
1011005-72 = "4;세이아;04;……아."
1011005-73 = "[s7] \"……세이아?\"\n[s8] \"왜 그래?\""
1011005-74 = "#wait;100"
1011005-75 = "#wait;100"
1011005-76 = "4;세이아;03;아, 아니에요. 별일은 아닙니다만……. 조금 곤란해졌어요.\n#4;em;[땀]"
1011005-77 = "4;세이아;02;선생님께서 골라 주신, 그 책만큼은 지금 이곳에 없어요. 이미 빌려 간 사람이 있거든요."
1011005-78 = "4;세이아;01;바로 저이지요. 책은 지금 제 방에 있어요."
1011005-79 = "4;세이아;06;……정말이니 그런 표정으로 보지 말아 주세요. 지어낸 이야기가 아니니까요.\n#4;em;[한숨]"
1011005-80 = "4;세이아;08;제 입으로 '제 방에서 책을 안 본다'라고 말씀드리긴 했지만, '절대 안 본다'고까지는 안 했어요. 명백히, 지금 이 책은 제 방에 있답니다."
1011005-81 = "4;세이아;02;자 그러면 공교롭지만 동시에 기쁘게도, 선생님께서 직접 골라 주신 선택이니……."
1011005-82 = "#st;[0,0];instant;1;"
1011005-83 = "#clearST"
1011005-84 = "4;세이아;01\n#4;greeting\n#wait;1000"
1011005-85 = "4;세이아;02;책을 전해 드리기 위해서라도, 함께 다시 제 방으로 가 주셔야겠군요. 선생님."
1011005-86 = "4;세이아;05;누차 다시 말씀드리지만, 저는 어떤 수작도 부리지 않았어요. 이건 정말로 순수한 우연. 너무나 기분 좋고 즐거운 우연일 뿐입니다."
1011005-87 = "4;세이아;02;마침 오늘도 조금 책을 빌려갈까 생각하고 있었는데……."
1011005-88 = "#st;[0,0];instant;1;"
1011005-89 = "#clearST"
1011005-90 = "4;세이아;02\n#4;dl\n#wait;1500"
1011005-91 = "4;세이아;02\n#4;ar\n#wait;1500"
1011005-92 = "4;세이아;00\n#4;greeting\n#wait;500"
1011005-93 = "#wait;1500"
1011005-94 = "[ns9] \"……세이아?\"\n[ns10] \"뭔가 책이 엄청 많은데?\""
1011005-95 = "#wait;100"
1011005-96 = "#wait;100"
1011005-97 = "4;세이아;03;후후, 방금 그런 우연을 겪은 상황이에요. 앞으로도 그러지 말란 법은 없겠지요.\n#4;em;[음표]\n#4;jump"
1011005-98 = "4;세이아;02;그런 만일의 상황이 또 올 수도 있으니……. 조금은 더 가져다 놓으려고요."
1011005-99 = "4;세이아;00;하지만 역시 저 혼자 모두 들고 가기에는 조금 무겁다는 생각이 드네요."
1011005-100 = "4;세이아;01;……선생님."

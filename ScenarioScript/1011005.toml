1011005-106 = "3;세이아;03;조금만 도와주시겠어요?\n#3;closeup\n#3;em;[반짝]"
1011005-107 = "#all;hide"
1011005-108 = "#na;(이후 책들을 들고, 세이아의 방까지 따라가 주었다.)"
1011005-109 = "#na;(세이아가 말한 '추천 책'은, 기다렸다는 듯 테이블 위에 놓여 있었다.)"

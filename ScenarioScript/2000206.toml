[translation]
2000206-1 = "Cheese In The Trap"
2000206-2 = "沙耶的研究室"
2000206-3 = "想要我給你看之前說的桌遊？#n哼－哼－哼－。等我一下，馬上拿出來。"
2000206-6 = "鏘──！這就是我特製的桌遊。#n名字是「Cheese In The Trap」！"
2000206-7 = "規則很簡單。在這個塑膠的陷阱放上大量的起司模型，注意不要碰觸陷阱的同時，把起司一個個的拿下來就可以了。#n如何，很簡單吧？"
2000206-8 = "現在開始來一起玩這個吧，輸掉遊戲的要被彈額頭！"
2000206-9 = "[s]「可以唷。」"
2000206-11 = "來，把老師那份起司分給你。"
2000206-15 = "……雖然事到如今，老師的手好大好溫暖。#n不愧是，大人的手的感覺。"
2000206-16 = "像是在摸根津助的肚子一樣軟綿綿的……"
2000206-17 = "[s]「好癢。」"
2000206-18 = "我，我，我知道！我真是的……稍微想到別的事了。"
2000206-19 = "那，那就開始遊戲吧？"
2000206-21 = "來，從老師開始。"
2000206-22 = "[s]（穿過陷阱拿取一個起司模型）"
2000206-24 = "嘿……不錯嘛。那麼這次輪到我了呢！"
2000206-26 = "嗯……陷阱上有好多起司，看起來美味的起司有好多……"
2000206-28 = "只能拿一個來著？不，兩個好像也可以……"
2000206-29 = "（碰──）"
2000206-30 = "哈嗚。"
2000206-31 = "[s]「這次是沙耶輸了呢。」"
2000206-32 = "嗚嗚……大意了。一時之間被起司迷惑了……"
2000206-33 = "下次不會輸了！"
2000206-35 = "（下一局，從沙耶的回合開始）"
2000206-37 = "嗚嗚，這確實是陷阱，但是明明有那麼多起司……"
2000206-40 = "（碰──）"
2000206-41 = "哈嗚！"
2000206-42 = "[s]「又是沙耶輸了。」"
2000206-43 = "嗚嗚，這對我不利！#n為什麼偏偏是拿取起司的遊戲呢？"
2000206-44 = "確，確實是我選的遊戲沒錯……#n要我對起司忍耐什麼的，這未免太殘酷了！"
2000206-45 = "……什麼？如果天才如我也能驅散起司的誘惑？"
2000206-46 = "哈—哈—哈！那是當然的。#n看好了！這次一定會贏的！再一次！"
2000206-48 = "（下一局，再次從沙耶的回合開始）"
2000206-50 = "……那是模型，是不能吃的模型……"
2000206-52 = "但是看著那個鮮豔的黃色和柔軟的質感就，嗚嗚……"
2000206-53 = "（碰──）"
2000206-54 = "嗚哇！"

[translation]
2000206-1 = "#title;치즈 인 더 트랩"
2000206-2 = "#place;사야의 연구실"
2000206-3 = "3;사야;02;저번에 말했던 보드게임을 보여달라고? #n후-후-후-. 기다려 봐. 곧 꺼내 줄 테니.\n#3;a"
2000206-4 = "3;사야;01\n#3;m1\n#wait;1000"
2000206-5 = "3;사야;01\n#3;greeting\n#wait;1000"
2000206-6 = "3;사야;03;짜잔! 이게 바로 나님이 말했던 그 특제 보드 게임인 것이다. #n이름하야 <치즈 인 더 트랩>!\n#3;em;[반짝]\n#3;m3\n#3;hophop"
2000206-7 = "3;사야;01;룰은 간단한 것이다. 이 플라스틱 덫 위에 치즈 모형을 잔뜩 올려 두고, 덫에 걸리지 않게 조심히 치즈 모형을 하나씩 빼 오면 되는 거다. #n어때, 간단하지?"
2000206-8 = "3;사야;01;지금부터 이걸로 같이 노는 것이다. 게임에서 진 사람은 이마에 꿀밤을 맞는 거다!\n#3;hophop"
2000206-9 = "[s] \"좋아.\""
2000206-10 = "3;사야;01\n#3;d\n#wait;1000"
2000206-11 = "3;사야;02;자, 선생 몫의 치즈 모형을 나누어 줄게.\n#3;closeup\n#3;a"
2000206-12 = "3;사야;01\n#wait;500\n#3;closeup\n#3;h"
2000206-13 = "3;사야;01\n#wait;500\n#3;closeup\n#3;h"
2000206-14 = "3;사야;01\n#wait;1500\n#3;closeup\n#3;h"
2000206-15 = "3;사야;99;……새삼스럽지만 선생의 손은 크고 따듯한 것이다. #n역시 어른의 손이라는 느낌이 들어.\n#3;closeup\n#3;em;[...]"
2000206-16 = "3;사야;01;네즈스케의 배를 쓰다듬는 것처럼 폭신폭신하고 기분 좋은 걸……\n#3;closeup"
2000206-17 = "[s] \"간지러워.\""
2000206-18 = "3;사야;04;아, 아, 알고 있던 것이다! 나도 참…… 잠깐 딴 생각을 했네.\n#3;em;[///]\n#3;stiff\n#3;closeup"
2000206-19 = "3;사야;01;그, 그럼 게임을 시작해볼까?\n#3;closeup"
2000206-20 = "#all;hide"
2000206-21 = "3;사야;01;자, 선생님부터 먼저 시작하는 것이다.\n#3;greeting\n#3;em;[반응]\n#3;a"
2000206-22 = "[s] 덫에서 치즈 모형을 한 개 가져온다."
2000206-23 = "#wait;1500"
2000206-24 = "3;사야;00;호오…… 제법인 것이다. 그럼 이제 나님의 차례다!\n#3;em;[!]"

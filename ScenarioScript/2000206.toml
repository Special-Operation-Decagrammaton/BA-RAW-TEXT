[translation]
2000206-1 = "Cheese in the Trap"
2000206-2 = "Saya's Research Lab"
2000206-3 = "You want to see the board game I mentioned last time? Hahaha! Here, let me fetch it."
2000206-6 = "Ta-da! A board game developed by yours truly! I call it Cheese in the Trap!"
2000206-7 = "The rules are simple. Place several cheese game pieces on top of this plastic trap, then carefully remove the cheese without getting caught in the trap. Sounds easy, right?"
2000206-8 = "Let's play! The loser gets a noogie!"
2000206-9 = "[s] \"You're on.\""
2000206-11 = "Okay! First, here's your cheese."
2000206-15 = "Huh... I never noticed how big and warm your hands are compared to mine. I guess that's because you're the older one here, yeah?"
2000206-16 = "So soft and squishy, just like Nezusuke's tummy..."
2000206-17 = "[s] \"That tickles.\""
2000206-18 = "Oh, sorry! I got distracted for a second."
2000206-19 = "Now, let's start the game!"
2000206-21 = "Why don't you go first?"
2000206-22 = "[s] Take one piece of cheese out of the trap."
2000206-24 = "Hey, not bad! Now it's my turn."
2000206-26 = "Ya know... That cheese is looking mighty tasty..."
2000206-28 = "Will I win taking only one at a time? Maybe I can sneak two..."
2000206-29 = "(slam!)"
2000206-30 = "Dang."
2000206-31 = "[s] \"I win, Saya.\""
2000206-32 = "Ugh... My concentration slipped. The cheese was so distractingly tasty..."
2000206-33 = "I'm gonna win the next round for sure!"
2000206-35 = "Next round. It's Saya's turn."
2000206-37 = "Hmm... We meet again, trap. You and all your delicious cheese..."
2000206-40 = "(slam!)"
2000206-41 = "No..."
2000206-42 = "[s] \"Looks like you lost again, Saya.\""
2000206-43 = "This is so unfair! Whose idea was it to make the cheese look so tempting?!"
2000206-44 = "I'm mean, it was me because I made the game, but still... How can past me expect me to resist that cheese?! It's too tempting!"
2000206-45 = "What are you looking at? Are you suggesting that a genius would be able to resist the temptation?"
2000206-46 = "Hahaha! Well, of course. Just watch! No more holding back. One more match!"
2000206-48 = "Next round. It's Saya's turn."
2000206-50 = "It's not real cheese... It's not real cheese..."
2000206-52 = "But it's so yellow...and looks so smooth. So yummy..."
2000206-53 = "(slam!)"
2000206-54 = "Gah!"

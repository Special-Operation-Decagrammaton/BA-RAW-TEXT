2000206-43 = "3;사야;07;으윽, 이건 나님에게 불리한 것이다! #n하필이면 어째서 치즈를 가져오는 게임인 것이냐?\n#3;em;[빠직]\n#3;hophop"
2000206-44 = "3;사야;07;무, 물론 나님이 택한 게임이긴 하지만…… #n나님에게 치즈를 참으라니, 이건 너무 가혹한 것이다!"
2000206-45 = "3;사야;04;……뭐? #n천재인 나님이면 치즈의 유혹도 떨쳐낼 수 있을 거라고?"
2000206-46 = "3;사야;03;하-하-하! 그야 당연한 것이다. #n두고 보는 것이다! 보란 듯이 이겨줄 테니까! 한 판 더!\n#3;em;[반짝]\n#3;hophop"

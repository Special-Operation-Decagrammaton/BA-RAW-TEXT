[translation]
2000206-1 = "กับดักแสนหวาน"
2000206-2 = "ห้องทดลองของซายะ"
2000206-3 = "ครูอยากเห็นบอร์ดเกมที่ฉันพูดถึงเมื่อคราวก่อนเหรอ?#nฮุฮุฮุ... รอเดี๋ยวนะ เดี๋ยวฉันเอามาให้ดู"
2000206-6 = "แต่นแต๊น! บอร์ดเกมสุดพิเศษของท่านซายะ#nชื่อว่า <กับดักแสนหวาน> ยังไงล่ะ!"
2000206-7 = "กติกาก็ง่ายนิดเดียว วางก้อนชีสพวกนี้เอาไว้บนกับดักพลาสติกนี่ จากนั้นก็ค่อยๆ ดึงก้อนชีส#nออกมาทีละชิ้นโดยไม่ให้ติดกับดักก็พอแล้ว เป็นยังไง ง่ายใช่มั้ยล่ะ?"
2000206-8 = "ถ้าอย่างนั้นเรามาเล่นกันเถอะ คนที่แพ้จะต้องโดนเขกหัวนะ!"
2000206-9 = "[s] \"ก็ได้\""
2000206-11 = "เดี๋ยวฉันแบ่งชีสให้ครูแล้วกัน"
2000206-15 = "ว้าว... มือของคุณครูทั้งใหญ่แล้วก็อุ่นมากเลย#nให้ความรู้สึกสมกับเป็นมือของผู้ใหญ่จริงๆ"
2000206-16 = "นุ่มเหมือนตอนลูบขนตรงท้องของเนสึซึเกะเลย..."
2000206-17 = "[s] \"มันจั๊กจี้นะ\""
2000206-18 = "ระ...รู้แล้วล่ะน่า! ฉันก็แค่... เผลอคิดเรื่องอื่นอยู่นิดหน่อยเอง"
2000206-19 = "ถะ...ถ้างั้นมาเล่นกันเลยดีมั้ย?"
2000206-21 = "เริ่มจากครูก่อนแล้วกัน"
2000206-22 = "[s] หยิบก้อนชีสขึ้นมาจากกับดักหนึ่งชิ้น"
2000206-24 = "โอ้โห... เก่งพอตัวเลยนี่นา? ถ้างั้นตาฉันบ้าง!"
2000206-26 = "อืม... บนกับดักมีชีสน่าอร่อยๆ อยู่เยอะแยะเลย..."
2000206-28 = "หยิบมาชิ้นเดียวก่อนดีมั้ยนะ? หรือว่าจะหยิบมาสองชิ้นเลยดีนะ...."
2000206-29 = "(แกร็ก!)"
2000206-30 = "อ๊ะ"
2000206-31 = "[s] \"ซายะแพ้แล้ว\""
2000206-32 = "ฮือออ... ชะล่าใจไปหน่อย มัวแต่ไปคิดถึงรสชาติอร่อยๆ ของชีสซะได้..."
2000206-33 = "ตาหน้าฉันไม่แพ้ครูแน่!"
2000206-35 = "เริ่มเกมใหม่ ถึงตาของซายะ"
2000206-37 = "อืม... ตรงนี้เป็นกับดักแน่ๆ... แต่มีชีสอยู่เยอะแยะเลย..."
2000206-40 = "(แกร็ก!)"
2000206-41 = "อ๊ะ"
2000206-42 = "[s] \"ซายะแพ้อีกแล้ว\""
2000206-43 = "อึ่ก... ไม่แฟร์กับท่านซายะเลย!#nทำไมชีสที่เอามาเล่นในบอร์ดเกมมันถึงดูอร่อยแบบนั้นล่ะ?"
2000206-44 = "ถะ...ถึงเป็นเกมที่ท่านซายะคิดขึ้นเองก็เถอะแต่ว่า...#nจะให้ต้านทานกลิ่นหอมๆ น่ากินของชีสไหวได้ยังไงกัน มันโหดร้ายเกินไปแล้ว!"
2000206-45 = "....หา?#nถ้าเป็นอัจฉริยะอย่างท่านซายะควรจะอดทนได้งั้นเหรอ?"
2000206-46 = "ฮ่าฮ่าฮ่า! แน่นอนอยู่แล้ว#nคอยดูนะ! ฉันจะเอาจริงแล้วนะ! มาเล่นกันอีกรอบ!"
2000206-48 = "เริ่มเกมใหม่ ถึงตาของซายะอีกครั้ง"
2000206-50 = "..... มันแค่ของปลอม แค่ชีสปลอมที่กินไม่ได้...."
2000206-52 = "แต่ดูสีเหลืองนวลของมันสิ... ผิวที่ดูเรียบลื่นเป็นมันวาว... น่ากินจริงๆ..."
2000206-53 = "(แกร็ก!)"
2000206-54 = "อ๊าาาา!"

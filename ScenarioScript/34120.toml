[translation]
34120-1 = "Episode 12; Arius District"
34120-6 = "...So, at her order...Atsuko was taken to the Arius district's basilica... "
34120-7 = "Th-That's everything we know. "
34120-13 = "You went to the Arius district...with Sensei...to save your friend?"
34120-14 = "Look at that. Huh.  "
34120-15 = "Why is Sensei always on brand?"
34120-16 = "... "
34120-17 = "But... "
34120-18 = "Still... Still..."
34120-22 = "That won't stop me from taking my revenge."
34120-23 = "They're all going to hate me, won't they? Maybe even Sensei...  "
34120-24 = "...But I can't stop."
34120-25 = "I just won't."
34120-26 = "I won't forgive the Arius Squad for what they did to me. I don't care what kind of monster I have to become to exact my revenge."
34120-30 = "...So don't get in my way, Sensei."
34120-39 = "... "
34120-40 = "...All clear! Come up!"
34120-41 = "[ns] Go through the hole in the ceiling."
34120-45 = "I was right. It's not guarded."
34120-46 = "N-Not a soul in sight.  "
34120-47 = "*pant* *pant*"
34120-48 = "[s] \"Is this the Arius district?\""
34120-49 = "Once upon a time. It's now just an old, abandoned area."
34120-50 = "..."
34120-51 = "The actual district is farther. We have to approach carefully. She's waiting for us."
34120-52 = "...This was a training ground once."
34120-53 = "[s] \"A training ground?\""
34120-54 = "It was a historical site, actually. But it was converted to a training ground after the civil war ended."
34120-55 = "[s] \"There was a civil war?\""
34120-57 = "Ten years ago, the Arius district was divided in two and war ensued. Any Arius student could tell you."
34120-58 = "[s] Lean in to hear better."
34120-59 = "Did that pique your interest, Sensei?  "
34120-60 = "It's not as exciting as you think. And has nothing to do with our current mission."
34120-61 = "I...  "
34120-62 = "I remember this place. I met Azusa for the first time here."
34120-63 = "... "
34120-67 = "I think it was shooting training... Some kid was getting beat for disobeying orders."
34120-68 = "[s] \"...\""
34120-69 = "No one said anything...they just watched in fear. But she kept standing back up, again and again!"
34120-70 = "I remember crying because...b-because I thought her halo was gonna be destroyed.  "
34120-71 = "Then Saori...I mean, Leader came running up..."
34120-72 = "We don't have the luxury of reminiscing right now."
34120-76 = "What's the plan, Leader?"
34120-81 = "..."
34120-82 = "We may have Sensei on our side, but we can't fight the entire school. How should we proceed?"
34120-86 = "...Leader?"
34120-91 = "[ns] \"Saori?!\""
34120-92 = "Waaaah! L-L-Leader?!"
34120-93 = "*pant* *pant*"
34120-96 = "Tsk. She has a fever. She's been toughing it out this whole time."
34120-97 = "This whole time? When could she have gotten sick?!  "
34120-98 = "I expect she's been sick this whole time. She's injured and has been on the run for four days straight. Her body is finally catching up."
34120-99 = "C-Can we do anything to help her?"
34120-103 = "[ns] Take out a fever reducer."
34120-104 = "S-Sensei's pocket is magical! There was medicine in it!"
34120-105 = "You're well-prepared."
34120-106 = "[s1] \"I got it from a magical place called a convenience store.\" \n[s2] \"I also have digestive medicine, cat treats, and a chocolate bar.\""
34120-107 = "I knew it... Adults are so...scary..."
34120-108 = "I knew it... Adults are so...scary..."
34120-109 = "What a relief.  "
34120-113 = "Here, Leader. This will help."
34120-119 = "*gulp* *pant pant*"
34120-120 = "Leader is really suffering..."
34120-121 = "[s] \"We'll rest here for now.\""
34120-122 = "...There's no other choice."
34120-123 = "D-Do you want me to keep watch?"
34120-124 = "We'll take shifts. You need rest too, Hiyori."
34120-125 = "I'll go first. Sensei, you should rest as well."
34120-126 = "[s] \"Thanks, Misaki. Wake me if anything happens.\" "
34120-127 = "Y-You're the best, Misaki."
34120-134 = "I sat in a corner and fell asleep quickly..."
34120-140 = "Sensei? Finally! Can you hear me?"
34120-141 = "If you can hear my voice, please... "
34120-142 = "I'm trapped in an in-between. Neither dream nor reality. I don't know when I'll be able to escape.  "
34120-143 = "I don't have much time, listen closely."
34120-144 = "I...made a mistake..."
34120-146 = "I found Gematria in a dream and eavesdropped on their meeting."
34120-155 = "Beatrice, who's ruling the Arius district, is trying to hold some kind of ritual in the Arius basilica..."
34120-167 = "The end...Kivotos' end will come with the conclusion of the ceremony."
34120-169 = "I don't know exactly what she's doing, but it's clear the end result will be our demise.  "
34120-170 = "She seems to be trying to summon some kind of being into Kivotos. I'm not sure."
34120-173 = "But I was overpowered by Beatrice in a lucid dream and encountered some sort of being from beyond my own consciousness... "
34120-174 = "The exposure was too much, and my body began breaking down."
34120-176 = "And I... I hurt Mika."
34120-177 = "I was so frightened, having confirmed that my visions were indeed Kivotos' future. I lashed out at her, blamed her. And then she had to watch as my body began to fail.  "
34120-181 = "Every route I take... I always hurt her."
34120-183 = "Mika will blame herself and do something she'll regret. I know her."
34120-187 = "If Beatrice is successful, she will bring about the downfall of Kivotos."
34120-188 = "And Atsuko of the Arius Squad will be sacrificed for the ritual."
34120-189 = "Trapped in this in-between, there is nothing I can do. All I can do is hope you hear my pleas."
34120-190 = "And Sensei... Please be careful. Beatrice wants you dead."
34120-191 = "..."
34120-192 = "Sensei, you must understand you alone cannot solve all of this.  "
34120-193 = "You've done so much for each of us. Now, allow us to shoulder some of the burden."
34120-194 = "I'm going to get out of here somehow, alert Nagisa and the others, and get Mika back."
34120-195 = "It'll be my turn to apologize."
34120-196 = "So, Sensei... "
34120-197 = "Sensei... If you can hear my voice...please..."
34120-202 = "Run, Sensei. You have to get as far away as you can from the Arius district. "
34120-209 = "Otherwise, you'll... "
34120-211 = "..."
34120-213 = "Next Episode; Old Story"

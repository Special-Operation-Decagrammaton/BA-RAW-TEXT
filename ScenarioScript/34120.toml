[translation]
34120-1 = "第12話;奧利斯自治區"
34120-6 = "所以，因為「她」的命令……把敦子……帶到了奧利斯自治區的宗座聖殿……"
34120-7 = "我，我知道的就只有這些了……"
34120-13 = "哼……為了拯救同伴所以才會到奧利斯自治區……還帶著老師？"
34120-14 = "這樣啊……也對。"
34120-15 = "如果是老師的話，肯定會這麼做的吧。"
34120-16 = "……"
34120-17 = "不過……"
34120-18 = "就算這樣……"
34120-22 = "我也會……追上去的唷。#n追上去復仇。"
34120-23 = "老師會鄙視我嗎……還是會對我失望呢……#n明明唯獨不想被老師討厭的……"
34120-24 = "……不過，儘管如此──我也不會停下來的。"
34120-25 = "抱歉呢……因為……"
34120-26 = "我絕對無法原諒奧利斯小隊──就算會被一直稱為魔女，我也要追到天涯海角，完成復仇才行。"
34120-30 = "……所以老師，請不要阻止我。"
34120-39 = "……"
34120-40 = "……沒，沒問題了！請上來吧！"
34120-41 = "[ns] 上去"
34120-45 = "這裡的警備應該比較鬆散……看來沒錯呢。"
34120-46 = "是，是呢……"
34120-47 = "呼……咕……"
34120-48 = "[s] 「這裡就是奧利斯自治區……？」"
34120-49 = "……以前是這樣沒錯，但現在只是遺跡而已。"
34120-50 = "……"
34120-51 = "真正的自治區在更前面一點。#n不過我們正往那裡前進這點已經暴露了，我想沒有這麼容易就能接近。"
34120-52 = "……這裡曾經是訓練場。"
34120-53 = "[s] 「訓練場？」"
34120-54 = "雖然原本是遺跡，不過在內戰結束之後就當成訓練場使用了。"
34120-55 = "[s] 「內戰……？」"
34120-57 = "大約10年前，奧利斯自治區內部分裂成兩派而展開的戰爭。#n和我們同年代的奧利斯學生都知道這件事。"
34120-58 = "[s] 認真聽美咲說話"
34120-59 = "……不是什麼有趣的事哦。"
34120-60 = "跟這次的任務也沒有關係……不太想繼續說下去呢。"
34120-61 = "我……"
34120-62 = "還記得──第一次見到梓醬的地方就是這裡對吧？"
34120-63 = "……"
34120-67 = "是哪種訓練呢……是射擊還是製作炸彈呢……#n不聽從大人「命令」的孩子都會被毒打一頓……"
34120-68 = "[s] 「……」"
34120-69 = "周圍的大家都只是袖手旁觀……#n但是那孩子卻一次又一次地爬起來瞪著大人看……"
34120-70 = "明明再這樣下去的話，那個孩子的光環有可能會被破壞掉的……但是我卻因為害怕而什麼都做不了……"
34120-71 = "那個時候，沙織姊……不，隊長站了出來……"
34120-72 = "……過去的事之後再說。現在先專心執行任務吧。"
34120-76 = "那麼……接下來要怎麼做呢？"
34120-81 = "……"
34120-82 = "雖然把大人帶了過來，但只靠我們就要跟整個自治區和「她」戰鬥是不可能的。要怎麼救公主呢？"
34120-86 = "……隊長？"
34120-91 = "[ns] 「沙織？」"
34120-92 = "隊，隊長！？"
34120-93 = "唔……咕……"
34120-96 = "……燒得好嚴重。竟然一直忍耐到身體變成這樣……"
34120-97 = "發，發燒了嗎！？"
34120-98 = "……隊長已經快4天都沒有休息了。本來就受了傷，再加上睡眠不足和疲勞……#n靠毅力硬撐也到極限了吧。"
34120-99 = "啊，啊哇……怎，怎麼辦？"
34120-103 = "[ns] 拿出常備的退燒藥"
34120-104 = "藥，藥……！？"
34120-105 = "……你一直都帶在身上啊。"
34120-106 = "[s1] 「因為便利商店裡有賣嘛。」\n[s2] 「胃腸藥和貓食，巧克力棒之類的也有哦。」"
34120-107 = "這樣啊……大人真可怕……"
34120-108 = "這樣啊……大人真可怕……"
34120-109 = "太好了……謝謝。"
34120-113 = "……隊長，把這個喝了吧。會舒服一點的。"
34120-119 = "（咕嚕）……哈，呼……"
34120-120 = "隊長……"
34120-121 = "[s] 「在這裡休息一下吧。」"
34120-122 = "……也好。"
34120-123 = "好……那我就來守夜吧……？"
34120-124 = "輪流來吧，日和也需要休息才行。"
34120-125 = "老師也稍微睡一下吧。我會先負責守夜的。"
34120-126 = "[s] 「嗯，謝謝。」"
34120-127 = "好，好的。我知道了……"
34120-134 = "（隨意找了個地方坐著睡了一下……）"
34120-140 = "……老師，能聽見我的聲音嗎……？"
34120-141 = "如果我的聲音能傳達到的話……希望……你能夠聽我說……"
34120-142 = "我現在被困在夢和現實之間的夾縫世界中……#n會被關在這裡多久，我也不清楚。"
34120-143 = "時間所剩無幾了……得向老師傳達現在的情況才行……"
34120-144 = "我……犯了錯……"
34120-146 = "我在夢裡見到了蓋瑪特利亞──他們的會議……"
34120-155 = "支配著奧利斯自治區的貝雅特里謝正準備在宗座聖殿舉行儀式……"
34120-167 = "那個儀式……將會讓奇普托斯迎來終焉吧……"
34120-169 = "她想利用儀式做什麼，現在還無法判別……"
34120-170 = "但是，我推測是要呼喚奇普托斯裡不存在的「某種東西」……"
34120-173 = "我在清醒夢中受到貝雅特里榭的攻擊#n──接觸到了儀式另一側的存在……"
34120-174 = "沒錯──因為接觸到了「那個」，我的容器開始了崩壞……"
34120-176 = "……而且，我傷害了彌香。"
34120-177 = "接觸到奇普托斯的終焉而陷入恐慌狀態的我指責了彌香……接著就這麼倒下了……"
34120-181 = "我總是……一再地傷害那孩子……"
34120-183 = "彌香會因為責備自己而犯下無法挽回的錯吧……"
34120-187 = "而貝雅特里榭的儀式將會成為把奇普托斯導向終焉的契機。"
34120-188 = "──在那個過程中，奧利斯小隊的敦子，她的生命之花將會凋零。"
34120-189 = "我因為被關在這既非夢境亦非現實的夾縫世界裡#n──只能向老師傳達這些不知能否傳達到的話。"
34120-190 = "啊啊，還有老師……請務必小心。貝雅特里榭已經盯上了你。"
34120-191 = "……"
34120-192 = "這些問題要全部解決是不可能的。"
34120-193 = "老師已經為了我們付出夠多努力了。#n所以請不要試著背負所有的問題。"
34120-194 = "我會離開這裡，借助渚和其他人的力量帶回彌香的。"
34120-195 = "這次一定要好好地向她道歉。"
34120-196 = "所以，老師……"
34120-197 = "老師……如果我的聲音能夠傳達到的話……拜託你……"
34120-202 = "快逃吧──並且希望你能盡可能的遠離奧利斯自治區。"
34120-209 = "不然的話……老師……會……"
34120-211 = "………………………………"
34120-213 = "下一話;我們的往事"

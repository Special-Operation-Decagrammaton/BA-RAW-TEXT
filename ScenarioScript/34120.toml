[translation]
34120-1 = "ตอนที่ 12;เขตปกครองตนเองอาเรียส"
34120-6 = "เพราะแบบนั้น... อาสึโกะ... เลยไปอยู่ที่มหาวิหาร... ของเขตปกครองตนเองอาเรียส... ตามคำสั่งของ <ผู้หญิงคนนั้น>... "
34120-7 = "ระ... เรารู้แค่นี้แหละ... "
34120-13 = "ไปที่เขตปกครองตนเองอาเรียสเหรอ... ส่วนพวกเธอก็กลับไปที่นั่นกับคุณครูเพื่อช่วยเพื่อนเหรอ?"
34120-14 = "น่าจะเป็นอย่างนั้นนะ... อืม"
34120-15 = "ก็คุณครู... เป็นคนแบบนี้นี่นา"
34120-16 = "...... "
34120-17 = "แต่ว่า... "
34120-18 = "แต่ถึงยังไง... ฉันก็จะ..."
34120-22 = "จะไล่ตามไปให้ได้ ฉันต้องตามไปแก้แค้นให้ได้"
34120-23 = "ฉันต้องถูกเหยียดหยามสินะ...? ต้องผิดหวังในตัวฉันสินะ? ไม่อยากถูกคุณครูเกลียดเลย... "
34120-24 = "แต่ยังไงฉันก็หยุดไม่ได้..."
34120-25 = "นั่นก็เพราะว่า... "
34120-26 = "ฉันจะไม่มีวันยกโทษให้สควอดของอาเรียส ถึงจะต้องกลายเป็นตัวร้าย แต่ยังไงฉันก็จะตามตัวมา#nแก้แค้นให้ได้"
34120-30 = "เพราะงั้น... อย่าห้ามฉันเลยนะคุณครู... "
34120-39 = "...... "
34120-40 = "ทะ... ทางนี้ไม่มีใครเลยค่ะ! ทุกคนรีบขึ้นมาเร็วค่ะ!"
34120-41 = "[ns] ขึ้นไปในช่องเพดาน"
34120-45 = "คิดถูกด้วยว่าที่นี่ต้องไม่มีการคุ้มกัน..."
34120-46 = "นะ... นั่นสิคะ... "
34120-47 = "แฮ่ก... แฮ่ก..."
34120-48 = "[s] \"ที่นี่คือเขตปกครองตนเองของอาเรียสเหรอ...?\""
34120-49 = "เมื่อก่อนน่ะใช่ แต่ตอนนี้มันเป็นแค่เขตที่ถูกทิ้งร้างเท่านั้น"
34120-50 = "......"
34120-51 = "เขตปกครองตนเองของจริงต้องเข้าไปอีก แต่เราจะบุ่มบ่ามเข้าไปไม่ได้ เพราะ <ผู้หญิงคนนั้น> รู้ว่า#nเรากำลังเข้าไป"
34120-52 = "ที่นี่เคยเป็นสนามฝึกค่ะ"
34120-53 = "[s] \"สนามฝึก?\""
34120-54 = "เดิมทีแล้วมันเป็นซากปรักหักพัง แต่พอสิ้นสุดสงครามกลางเมืองก็ถูกใช้เป็นสนามฝึกซ้อมน่ะ"
34120-55 = "[s] \"สงครามกลางเมือง...?\""
34120-57 = "มันคือสงครามที่เกิดขึ้นจากการแบ่งเขตปกครองตนเองอาเรียสเป็นสองส่วนน่ะ นักเรียนอาเรียสที่#nรุ่นราวคราวเดียวกับพวกเรารู้เรื่องนี้กันหมด เรื่องที่เกิดขึ้นเมื่อ 10 ปีก่อน..."
34120-58 = "[s] ตั้งใจฟังที่มิซากิพูด"
34120-59 = "คุณครูสนใจในเรื่องแบบนี้สินะ... "
34120-60 = "ฉันไม่อยากเล่าต่อแล้ว มันไม่ใช่เรื่องที่น่ายินดีอะไร อีกอย่างตอนนี้มันก็ไม่เกี่ยวกับภารกิจแล้วด้วย"
34120-61 = "ฉัน... "
34120-62 = "ฉันยังจำได้อยู่ค่ะ ที่นี่ใช่ไหมคะ? ที่ที่เราได้เจอกับอาซึสะจังครั้งแรก..."
34120-63 = "...... "
34120-67 = "ไม่ว่าจะในการฝึกยิงปืนหรือฝึกประกอบระเบิด... มีเด็กคนหนึ่งถูกทุบตีอยู่ที่พื้นเพราะเธอไม่ทำตาม#n<คำสั่ง> ของผู้ใหญ่ค่ะ..."
34120-68 = "[s] \"......\""
34120-69 = "ทุกคนที่อยู่ที่นั่นได้แต่มองดูด้วยความกลัวจนตัวสั่น... ส่วนนักเรียนคนนั้นก็เอาแต่ลุกขึ้นมาจ้องผู้ใหญ่"
34120-70 = "ตัวฉันได้แต่ร้องไห้... เพราะกลัวว่าฮาโลของเด็กคนนั้นจะถูกทำลายค่ะ... "
34120-71 = "และตอนนั้นพี่ซาโอริ... ไม่สิ... หัวหน้าก็เข้ามาปลอบฉัน..."
34120-72 = "เรื่องระลึกความหลังเอาไว้ก่อนเถอะ... ตอนนี้เราต้องโฟกัสไปที่ภารกิจ"
34120-76 = "ถ้างั้นจากนี้เราจะทำอะไรล่ะหัวหน้า? มีแผนการเป็นชิ้นเป็นอันไหม?"
34120-81 = "......"
34120-82 = "ถึงเราจะมีผู้ใหญ่มาด้วย แต่ลำพังพวกเราคงสู้กับคนทั้งเขตปกครองตนเองและ <ผู้หญิงคนนั้น> ไม่ได้หรอก เราจะไปช่วยองค์หญิงกันยังไงดี?"
34120-86 = "หัวหน้า...?"
34120-91 = "[ns] \"ซาโอริ?!\""
34120-92 = "หะ... หัวหน้า?!"
34120-93 = "แฮ่ก... แฮ่ก..."
34120-96 = "......!! ไข้สูงมากเลย อดทนมาได้จนถึงตอนนี้เลยเหรอเนี่ย..."
34120-97 = "คะ?! "
34120-98 = "นั่นสิคะ... ก็หัวหน้าแทบจะไม่ได้พักมา 4 วันแล้ว แถมยังบาดเจ็บและอดนอนอีก... สงสัยร่างกายจะ#nฝืนไม่ไหวแล้วจริงๆ"
34120-99 = "เรา... จะ... จะทำยังไงกันดีคะ?"
34120-103 = "[ns] ยื่นยาลดไข้ที่ติดตัวมาให้"
34120-104 = "พกยามาด้วยเหรอเนี่ย!?"
34120-105 = "ปกติคุณครูเอาของแบบนี้ติดตัวตลอดเลยเหรอ..."
34120-106 = "[s1] \"มีขายในร้านสะดวกซื้อเยอะแยะไป\" \n[s2] \"ยาช่วยย่อย ขนมแมวเลีย ช็อกโกแลตแท่งครูก็มีนะ\""
34120-107 = "ผู้ใหญ่นี่... น่ากลัวจริงๆ..."
34120-108 = "ผู้ใหญ่นี่... น่ากลัวจริงๆ..."
34120-109 = "ดีแล้วละนะ"
34120-113 = "กลืนยานี่สิหัวหน้า จะได้รู้สึกดีขึ้น"
34120-119 = "(กลืนยา) แฮ่ก... แฮ่ก..."
34120-120 = "หัวหน้า..."
34120-121 = "[s] \"เราหยุดพักกันที่นี่สักหน่อยเถอะ\""
34120-122 = "อืม... ตอนนี้คงไม่มีทางเลือกอื่น"
34120-123 = "ค่ะ... ถะ... ถ้างั้นฉันจะเฝ้ายามให้ค่ะ... "
34120-124 = "ไม่ต้องทำคนเดียวหรอก... ผลัดกันเฝ้าเถอะ ฮิโยริเองก็ต้องพักบ้างเหมือนกัน"
34120-125 = "คุณครูก็นอนเอาแรงสักหน่อยเถอะ ฉันจะไปเฝ้ายามให้ก่อนเอง"
34120-126 = "[s] \"ขอบใจนะ\" "
34120-127 = "ค่ะ รับทราบค่ะ..."
34120-134 = "(คุณครูหามุมใกล้ๆ นอนพักผ่อน...)"
34120-140 = "คุณครูคะ... ได้ยินเสียงฉันไหมคะ...?"
34120-141 = "ถ้าได้ยินเสียงของฉัน... ได้โปรด... "
34120-142 = "ตอนนี้ฉันถูกขังอยู่ในที่ที่ไม่ใช่ทั้งความฝันและความจริงค่ะ... ฉันไม่รู้ว่าจะอยู่ที่นี่ได้อีกนานแค่ไหน "
34120-143 = "เหลือเวลาไม่มากแล้วค่ะ... ฉันคงต้องบอกสถานการณ์ตอนนี้กับคุณครูแล้วค่ะ..."
34120-144 = "ฉัน... ทำพลาดไปแล้วค่ะ..."
34120-146 = "ฉันเห็นเกมาเทรียในฝัน และแอบฟังพวกนั้นประชุมกันค่ะ..."
34120-155 = "เบียทริซที่ปกครองเขตปกครองตนเองอาเรียสอยู่ในตอนนี้จะจัดพิธีบางอย่างที่มหาวิหารอาเรียสค่ะ..."
34120-167 = "และเมื่อพิธีนั้นสิ้นสุดลง... ฉันก็เห็นการล่มสลายของคิโวทอสค่ะ..."
34120-169 = "ฉันมั่นใจว่าพิธีของเบียทริซมีความเกี่ยวข้องกับการล่มสลายของคิโวทอส แต่ก็ไม่รู้เลยค่ะว่าผู้หญิง#nคนนั้นตั้งใจจะทำอะไรกันแน่... "
34120-170 = "หรือว่าเธอตั้งใจจะเรียกอะไรบางอย่างที่ไม่อาจรู้ได้มาที่คิโวทอส..."
34120-173 = "ฉันถูกเบียทริซโจมตีในความฝันค่ะ แล้วก็เห็นบางอย่างที่อยู่ฝั่งตรงข้ามกับพิธีนั้น... "
34120-174 = "แล้วร่างกายของฉันก็ทรุดลง..."
34120-176 = "ฉันทำให้มิกะต้องเสียใจค่ะ..."
34120-177 = "คิโวทอสล่มสลาย... ฉันตกอยู่ในความหวาดกลัวและตะคอกใส่มิกะที่มาหาฉัน และจากนั้นมิกะก็เห็น#nร่างของฉันที่ทรุดลง... "
34120-181 = "ฉันน่ะ... เอาแต่... เอาแต่ทำให้มิกะต้องเสียใจตลอดเลยค่ะ..."
34120-183 = "ส่วนมิกะก็เอาแต่โทษตัวเอง และพยายามจะทำในสิ่งที่หวนกลับไม่ได้ค่ะ..."
34120-187 = "พิธีของเบียทริซอาจจะนำความล่มสลายมาสู่คิโวทอสก็ได้ค่ะ"
34120-188 = "และนั่นจะทำให้อาสึโกะจากสควอดของอาเรียสต้องจบชีวิตลงค่ะ..."
34120-189 = "ตอนนี้ฉันถูกขังโดยไร้ซึ่งพลังในที่ที่ไม่ใช่ทั้งความฝันและความจริง และได้แต่บอกเรื่องราวที่ไม่รู้ว่า#nจะส่งต่อไปถึงคุณครูหรือเปล่า..."
34120-190 = "คุณครูคะ... คุณครูกำลังถูกเบียทริซหมายหัวไว้อยู่นะคะ"
34120-191 = "......"
34120-192 = "คุณครูคะ... เราแก้ปัญหาเหล่านี้ทั้งหมดไม่ได้หรอกค่ะ "
34120-193 = "ครั้งที่แล้วคุณครูก็พยายามเพื่อพวกเราอย่างเต็มที่แล้ว และฉันไม่ควรทิ้งปัญหาทั้งหมดไว้ที่คุณครูค่ะ"
34120-194 = "ไม่ว่ายังไงฉันจะต้องออกจากที่นี่ และยืมพลังจากนางิสะและคนอื่นเพื่อตามมิกะกลับมาให้ได้ค่ะ"
34120-195 = "ครั้งนี้ฉันจะต้องกล่าวคำขอโทษกับเธอให้ได้ค่ะ"
34120-196 = "เพราะงั้นคุณครู... "
34120-197 = "คุณครู... ถ้าได้ยินเสียงของฉัน... ได้โปรด..."
34120-202 = "หนีไปเถอะค่ะ คุณครูคะ... คุณครูต้องอยู่ให้ห่างจากเขตปกครองตนเองอาเรียสให้มากที่สุดค่ะ "
34120-209 = "ไม่เช่นนั้นแล้ว... คุณครูจะ... "
34120-211 = "....................................."
34120-213 = "ตอนต่อไป;เรื่องในอดีต"

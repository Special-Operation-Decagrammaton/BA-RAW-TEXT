[translation]
34120-1 = "第12話;アリウス自治区"
34120-6 = "それで、アツコを……「彼女」の命令で……アリウス自治区のバシリカに……。"
34120-7 = "わ、私たちが知ってるのはそれだけ……。"
34120-13 = "ふぅん……仲間を救うため、アリウス自治区に……先生を連れて？"
34120-14 = "そっか……そう。"
34120-15 = "先生なら、きっとそうするよね。"
34120-16 = "……。"
34120-17 = "でも……。"
34120-18 = "それでも……。"
34120-22 = "私は……追いかけるよ。#n追いついて、復讐する。"
34120-23 = "私を軽蔑するかな……それとも、ガッカリするかな……。#n先生にだけは、嫌われたくなかったなぁ……。"
34120-24 = "……でも、それでもね――私は自分を止められないの。"
34120-25 = "ごめんね……だって……。"
34120-26 = "私はアリウススクワッドを絶対に許せない――たとえ魔女と呼ばれ続けたとしても、地の果てまで追いかけて、復讐しないとダメなの。"
34120-30 = "……だから先生、私を止めないでね。"
34120-39 = "……。"
34120-40 = "……だ、大丈夫です！上がってきてください！"
34120-41 = "[ns] 上にあがる。"
34120-45 = "ここなら警備の手が薄いはず……正解だね。"
34120-46 = "そ、そうですね……。"
34120-47 = "ふぅ……ぐっ……。"
34120-48 = "[s] \"ここがアリウス自治区……？\""
34120-49 = "……昔はそうだったけど、今はただの跡地だよ。"
34120-50 = "……。"
34120-51 = "本当の自治区はもう少し先。#nでも、私たちが向かってる事がバレてるから、そう簡単には近づけないと思う。"
34120-52 = "……ここは訓練場でした。"
34120-53 = "[s] \"訓練場？\""
34120-54 = "元は遺跡だったんだけど、内戦が終わった後は訓練場としても使われてたの。"
34120-55 = "[s] \"内戦……？\""
34120-57 = "10年くらい前、アリウス自治区の内部が二つに分かれて起きた戦争の事。#n私たちと同年代のアリウス生ならみんな知ってる。"
34120-58 = "[s] ミサキの言葉に耳を傾ける。"
34120-59 = "……あんまり面白い話じゃないよ。"
34120-60 = "今回の任務とは無関係だし……進んで話したくはないかな。"
34120-61 = "私……。"
34120-62 = "まだ覚えてます――アズサちゃんと初めて会った場所が、ここでしたよね？"
34120-63 = "……。"
34120-67 = "どの訓練だったかな……射撃か、爆弾製作か……。#n大人の「命令」に従わなかった子が、ひどく殴られていて……。"
34120-68 = "[s] \"……。\""
34120-69 = "周囲はみんな、見てるだけで……。#nでもその子は何度も起き上がって、ずっと大人を睨んでました……。"
34120-70 = "このまま放っておいたら、その子のヘイローが壊されてしまいそうだったのに……でも、私は怖くて動けなかったんです……。"
34120-71 = "そんな時、サオリ姉さん……いえ、リーダーが走ってきて……。"
34120-72 = "……思い出に浸るのは後にして。今は任務に集中するよ。"
34120-76 = "それで……これからどうするの？"
34120-81 = "……。"
34120-82 = "大人を連れてはきたけど、私たちだけでこの自治区と「彼女」を相手に戦うなんて不可能だよ。どうやって姫を助けるの？"
34120-86 = "……リーダー？"
34120-91 = "[ns] \"サオリ？\""
34120-92 = "り、リーダー！？"
34120-93 = "うっ……ぐっ……。"
34120-96 = "……すごい熱。こんな状態になるまで我慢するなんて……。"
34120-97 = "ね、熱ですか！？"
34120-98 = "……リーダーはもう4日近く休んでない。負傷してる上に、睡眠不足と疲労……。#n気力で我慢するのも限界だったんだと思う。"
34120-99 = "あ、あわ……ど、どうしましょう？"
34120-103 = "[ns] 常備薬の解熱剤を取り出す。"
34120-104 = "く、薬……！？"
34120-105 = "……持ち歩いてるんだ。"
34120-106 = "[s1] \"コンビニで売ってるからね。\"\n[s2] \"胃腸薬に猫のおやつ、チョコバーとかもあるよ。\""
34120-107 = "そうなんですね……大人って怖い……。"
34120-108 = "そうなんですね……大人って怖い……。"
34120-109 = "よかった……ありがとう。"
34120-113 = "……リーダー、これ飲んで。楽になるよ。"
34120-119 = "ごくっ……はぁ、ふぅ……。"
34120-120 = "リーダー……。"
34120-121 = "[s] \"ここで少し休もう。\""
34120-122 = "……そうだね。"
34120-123 = "はい……それでは、寝ずの番は私が……？"
34120-124 = "交代でやるよ。ヒヨリも休まないと。"
34120-125 = "先生も少しは寝て。[ruby=ふしんばん]不寝番[/ruby]は私が先にやるから。"
34120-126 = "[s] \"うん、ありがとう。\""
34120-127 = "は、はい。わかりました……。"
34120-134 = "（適当なところに座って休むことにした……）"
34120-140 = "……先生、私の声が届いているかい……？"
34120-141 = "私の声が届いているのなら……どうか……耳を傾けてくれ……。"
34120-142 = "私は今、夢でも現実でもない狭間の世界に閉じ込められている……。#nいつまで此処に留まれるのか、定かではない。"
34120-143 = "時間があまり残されていない……先生に、今の状況を伝えなければ……。"
34120-144 = "私は……過ちを犯してしまった……。"
34120-146 = "私は夢の中でゲマトリア――彼らの会議を[ruby=し]識[/ruby]ってしまった……。"
34120-155 = "アリウス自治区を支配しているベアトリーチェは、バシリカで儀式を行おうとしている……。"
34120-167 = "その儀式の果てに……キヴォトスは終焉を迎えるだろう……。"
34120-169 = "彼女が儀式で何をしようとしているのかは依然として判明していない……。"
34120-170 = "だが、キヴォトスに存在しない『何か』を呼び寄せようとしているのではないかと推測される……。"
34120-173 = "私は、[ruby=めいせきむ]明晰夢[/ruby]の中でベアトリーチェに攻撃され#n――儀式の向こう側にいる存在と接触してしまった……。"
34120-174 = "そう――『アレ』に触れてしまったせいで、私の器が崩れ始め……。"
34120-176 = "……そうして、私はミカを傷つけた。"
34120-177 = "キヴォトスの終焉に接触し、恐慌状態に陥った私はミカを責め立て……そのまま身体が崩れていって……。"
34120-181 = "私はいつも……あの子を傷つけてばかりだ……。"
34120-183 = "ミカは己を責め、取り返しのつかない罪を犯そうとするだろう……。"
34120-187 = "そして、ベアトリーチェの儀式は、このキヴォトスを終焉へと導く[ruby=きっかけ]切掛[/ruby]足り得る。"
34120-188 = "――[ruby=そ]其[/ruby]の過程で、アリウススクワッドのアツコは、命の花を散らすだろう。"
34120-189 = "私はこの、夢でも現実でもない狭間に閉じ込められているが故に#n――先生、あなたに届くか分からない言葉を投げ掛ける事しかできない。"
34120-190 = "ああ、そして先生……気をつけてくれ。あなたはベアトリーチェに狙われている。"
34120-191 = "……。"
34120-192 = "この問題を、全て解決することなど不可能だ。 "
34120-193 = "先生はもう十分に私たちのために努力してくれている。#nだから、全ての問題を背負おうとしないでくれ。"
34120-194 = "私は[ruby=ここ]此処[/ruby]から抜け出し、ナギサと他のみんなの力を借りて、ミカを取り戻すよ。"
34120-195 = "今度こそ、私は彼女に謝罪したいんだ。"
34120-196 = "だから、先生……。"
34120-197 = "先生……私の声が届いているのなら……どうか……。"
34120-202 = "逃げてくれ――そしてできる限り、アリウス自治区から遠ざかってほしい。"
34120-209 = "そうでなければ……先生……は……。"
34120-211 = "………………………………………"
34120-213 = "次回;私たちのこれまで"

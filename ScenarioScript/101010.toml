[translation]
101010-1 = "ตอนที่ 1;บทเริ่มต้น"
101010-3 = "เรื่องเล่านี้มันได้เกิดการพลิกผัน"
101010-4 = "ทุกอย่างล้วนถูกทำลาย ทั้งบริบท องค์ประกอบ ประเภท จุดประสงค์ การตีความ"
101010-5 = "ความหมายในปัจจุบันพันกันสับสนและค่อยๆ จางหายไปจนควบคุมเอาไว้ไม่ได้"
101010-8 = "ครูเอ๋ย"
101010-9 = "จงลืมเรื่องเล่าทั้งหมดที่ผ่านมา"
101010-10 = "สิ่งที่จะเกิดขึ้นกับคุณนับจากนี้ จะไม่ใช่แบบนั้นอีกต่อไป"
101010-12 = "โลกที่ไร้ซึ่งตัวเอก ตัวร้าย เหตุการณ์ ความขัดแย้ง"
101010-13 = "โลกที่พังทลายจนทุกอย่างยุ่งเหยิง"
101010-15 = "โลกของการกระทำที่ไม่มีบริบท ไม่มีองค์ประกอบ ไม่มีความเป็นไปได้"
101010-16 = "โลกแห่งความไร้เหตุผลในสุดท้ายก็สูญเสียความหมายและเดือดดาลอย่างไม่อาจเข้าใจได้"
101010-20 = "อ้อ ใช่สิ โลกใบนี้มันมีอะไรแบบนั้นอยู่ด้วย"
101010-21 = "แต่พวกเราทุกคนแค่ลืมมันไปก็เท่านั้นเอง"
101010-24 = "ถ้างั้นก็มาเริ่มกันเถอะ"
101010-26 = "เริ่มเรื่องเล่า.. ที่ไม่ใช่เรื่องราว"
101010-28 = "เรื่องเล่าที่ไม่มีบริบท ไม่มีประเภท ไม่มีความเป็นไปได้ ไม่มีองค์ประกอบใดๆ"
101010-32 = "เรื่องเล่าแห่งความขัดแย้ง เดือดดาล ทรยศ และพลิกผัน"
101010-34 = "เรื่องเล่าที่พังพินาศเกินกว่าจะเรียกว่าเป็นเรื่องเล่าได้"
101010-36 = "เรื่องเล่าที่ดูหมิ่นผู้ชมและสบประมาทตัวละคร"
101010-37 = "เรื่องเล่ากบฏเรื่องนั้น"
101010-56 = "ตอนต่อไป;แตกสลาย"

[translation]
101010-1 = "Episode 1; Prologue"
101010-3 = "This narrative has been subverted."
101010-4 = "The previously established context, structure, nature, intent, and interpretation have been utterly dismantled."
101010-5 = "What is meaning? Truth? Faded. Tangled. Inscrutable."
101010-8 = "Sensei."
101010-9 = "The stories so far have been for naught."
101010-10 = "The events that unfold from this moment on will supplant your preconceived notions."
101010-12 = "You will encounter a world sans protagonists. There will be no villains, no conflict."
101010-13 = "Parallel lines will become entangled, the axioms you know to be true all dismantled."
101010-15 = "A contrived reality in which the composition of your lives no longer holds any meaning. Context, probability, all moot point."
101010-16 = "This world will be one of absurdities so incomprehensible even the difference between up and down will have no meaning."
101010-20 = "Alas, your fated future has always existed just this way."
101010-21 = "But those times of the past have been long forgotten."
101010-24 = "So, allow us to begin again."
101010-26 = "We will begin a story that is not a story."
101010-28 = "Don't forget. Leave your nature, reality, probabilities, and truth behind."
101010-32 = "Let us turn the page to this story of conflict and betrayal. Of usurpation and disarray."
101010-34 = "We will attempt to fit together the shattered pieces of this broken \"story.\""
101010-36 = "Please be aware. This is not a story meant to warm the audience's hearts or end in happily ever after."
101010-37 = "No, it is not. Instead, this is a story of rebellion."
101010-56 = "Next Episode; Catastrophe"

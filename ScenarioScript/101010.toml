[translation]
101010-1 = "第1話;序幕"
101010-3 = "──這個故事，被推翻了。"
101010-4 = "脈絡、架構、類型、意圖、解釋……全都遭到破壞──"
101010-5 = "其意義相互糾纏、混合、攪拌──#n褪色到了無法控制的地步。"
101010-8 = "老師啊──"
101010-9 = "最好忘了目前為止的所有故事。"
101010-10 = "現在將要發生在你身上的事，#n已經不再是最初的那種[ruby=東西]故事[/ruby]了──"
101010-12 = "主角、敵人、事件、衝突不復存在──"
101010-13 = "一切都遭到分解、相互糾葛──"
101010-15 = "失去了脈絡、架構、必然性……被刻意製造出來的世界。"
101010-16 = "接著──終究成為了失去意義、力量恣意妄為的──#n無法理解又毫無條理的世界。"
101010-20 = "啊啊，沒錯──打從一開始，這個世界就是那樣的存在。"
101010-21 = "我們只是，遺忘了而已。"
101010-24 = "然而，將要開始了。"
101010-26 = "不足以被稱為故事的、扭曲的創作。"
101010-28 = "在脈絡、類型、必然性、架構──全都不存在的狀態下，"
101010-32 = "相互敵對、背叛、顛覆……沉沒的故事。"
101010-34 = "悲哀的、不成熟的──無法成為故事的扭曲創作。"
101010-36 = "褻瀆觀眾、侮辱登場人物的──"
101010-37 = "叛亂的故事。"
101010-56 = "下一話;破局"

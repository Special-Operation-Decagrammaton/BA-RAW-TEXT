[translation]
2300206-1 = "#title;트리니티식 외과 수술법"
2300206-2 = "#place;트리니티 구호기사단 치료실"
2300206-3 = "3;하나에;03;오늘은 의약품 옮기는 걸 도와주셔서 감사합니다, 선생님.\n#3;a\n#3;greeting\n#3;em;[반짝]"
2300206-4 = "3;하나에;01;서류에서 누락된 의약품이 생각보다 많아서 저 혼자 창고를 정리했으면 온종일 걸릴 뻔했어요."
2300206-5 = "[s] \"어려운 일도 아니었는걸.\""
2300206-6 = "3;하나에;03;덕분에 한숨 돌렸어요, 헤헤."
2300206-7 = "3;하나에;02;참, 선생님. 그 앞은 아까 물청소를 해서 미끄러우니 조심하세…….\n#3;em;[반응]"
2300206-8 = "#all;hide\n#zmc;move;0,444;1896;300\n#wait;300"
2300206-9 = "#na;콰당!\n#fontsize;100"
2300206-10 = "#na;하나에;서, 선생님! 괜찮으세요?"
2300206-11 = "3;하나에;04\n#3;h"
2300206-12 = "#wait;500"
2300206-13 = "[ns] \"조금 긁히긴 했지만 괜찮아.\""
2300206-14 = "3;하나에;06;하지만 무릎에서 피가 나고 있는 걸요! 빨리 치료를 해야…….\n#3;em;[속상함]\n#3;stiff"
2300206-15 = "3;하나에;05;당장 다리를 절단해서 감염을 막아야겠어요!\n#3;em;[!]\n#3;jump"
2300206-16 = "[s] \"그, 그만둬!\""
2300206-17 = "3;하나에;02;네? 왜 그렇게 놀라시나요, 선생님?\n#3;em;[?]"
2300206-18 = "3;하나에;06;하지만 빨리 다리를 자르지 않으면 나쁜 균이 침입해서 상처가 곪을 수도 있는 걸요.\n#3;stiff"
2300206-19 = "3;하나에;05;전에 본 오래된 의학 서적에 그렇게 쓰여 있었어요!\n#3;hophop"
2300206-20 = "[s] \"그 의학서적은 도대체 얼마나 오래된 책이야?\""
2300206-21 = "3;하나에;02;글쎄요. 대략…… 500년 정도?\n#3;em;[반응]"
2300206-22 = "3;하나에;00;괜찮아요. 책의 내용에 따르면 숙련된 의사는 1분 만에 절단을 끝낼 수 있다고 하니까……\n#3;greeting\n#3;em;[반짝]"
2300206-23 = "3;하나에;05;저도 아프지 않게 금방 끝내드릴게요!\n#3;jump"
2300206-24 = "[s] \"이런 상처에는 반창고 하나면 충분해.\""
2300206-25 = "3;하나에;02;정말 그걸로 괜찮으신가요?\n#3;stiff"
2300206-26 = "3;하나에;01\n#3;greeting\n#3;m2\n#wait;1500"

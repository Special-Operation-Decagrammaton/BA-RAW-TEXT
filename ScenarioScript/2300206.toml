[translation]
2300206-1 = "การผ่าตัดแบบฉบับของทรีนิตี้"
2300206-2 = "ห้องรักษาของชมรมอัศวินบรรเทาทุกข์ สถาบันทรีนิตี้"
2300206-3 = "ขอบคุณที่ช่วยขนยาในวันนี้ให้นะคะ คุณครู"
2300206-4 = "มียาที่ตกหล่นจากเอกสารไปมากกว่าที่คิด ถ้าให้ฉันจัดการคลังคนเดียว คงจะใช้เวลาทั้งวันเลยล่ะค่ะ"
2300206-5 = "[s] \"ไม่ใช่เรื่องใหญ่อะไรเลย\""
2300206-6 = "เพราะคุณครูเลยนะคะ ฉันถึงได้พักหายใจบ้าง ฮิฮิ"
2300206-7 = "จริงสิ คุณครูคะ ข้างหน้าเพิ่งเช็ดทำความสะอาดไป ระวังจะลื่น..."
2300206-9 = "โครม!"
2300206-10 = "คะ...คุณครู! เป็นอะไรหรือเปล่าคะ?"
2300206-13 = "[ns] \"ถลอกนิดหน่อย สบายมาก\""
2300206-14 = "แต่ที่เข่ามีเลือดออกนะคะ! ต้องรีบไปรักษาแล้ว..."
2300206-15 = "เราจะต้องตัดขาออกเพื่อยับยั้งการติดเชื้อค่ะ!"
2300206-16 = "[s] \"ยะ... หยุดก่อน!\""
2300206-17 = "คะ? ทำไมถึงตกใจขนาดนั้นล่ะคะคุณครู?"
2300206-18 = "แต่ว่าถ้าไม่รีบตัดขา อาจจะติดเชื้อและทำให้แผลเน่าได้นะคะ"
2300206-19 = "มันมีเขียนไว้ในหนังสือการแพทย์ที่ฉันเคยอ่านเมื่อนานมาแล้วอยู่ค่ะ!"
2300206-20 = "[s] \"หนังสือการแพทย์เล่มนั้นมันเก่าแค่ไหนแล้วน่ะ?\""
2300206-21 = "ไม่รู้สิคะ น่าจะสัก...500 ปีได้มั้งคะ?"
2300206-22 = "คุณครูไม่ต้องห่วงนะคะ ตามที่เขียนไว้ในหนังสือ ถ้าเป็นแพทย์ที่มีทักษะจะตัดเสร็จภายใน 1 นาทีเท่านั้นค่ะ..."
2300206-23 = "ฉันจะรีบทำให้เสร็จ ไม่ให้เจ็บเลยค่ะ!"
2300206-24 = "[s] \"แผลแบบนี้แค่พลาสเตอร์แผ่นเดียวก็พอ\""
2300206-25 = "อย่างนั้นจะไม่เป็นไรจริงๆ เหรอคะ?"
2300206-27 = "ถ้างั้นก่อนอื่นฉันจะฆ่าเชื้อที่แผล ช่วยนั่งลงตรงนั้นด้วยนะคะ"
2300206-30 = "― เอาละ ถ้างั้นเดี๋ยวฉันจะฆ่าเชื้อที่แผลให้[wa:1140] "
2300206-32 = "― ช่วยถอดถุงเท้าออก แล้วอยู่นิ่งๆ ด้วยนะคะ[wa:10] "
2300206-35 = "― ถ้าไม่ล้างแผลให้สะอาด[wa:500] "
2300206-37 = "― จะทำให้ผิวเกิดการระคายเคือง และอาจเป็นอันตรายได้ค่ะ[wa:2040] "
2300206-40 = "― อาจจะแสบสักหน่อย แต่ช่วยอดทนหน่อยนะคะ![wa:1360] "
2300206-42 = "― เอา~ ละ…! ล้างแผลให้สะอาด ล้างแผลให้สะอาด~![wa:1660] "
2300206-45 = "― ค่ะ อดทนได้ดีมากเลยค่ะ![wa:620] "
2300206-47 = "― อดทนอีกนิดเดียวนะคะ[wa:10] "
2300206-50 = "― ถ้าอย่างนั้นฉันจะร่ายมนตร์[wa:10] "
2300206-52 = "― ช่วยให้แผลของคุณครูหายเร็วให้เป็นพิเศษนะคะ[wa:820] "
2300206-55 = "― ถ้างั้น... ความเจ็บปวดเอ๋ย ความเจ็บปวดเอ๋ย... จงหายไป~![wa:1840] "
2300206-57 = "― เป็นยังไงบ้างคะ? ไม่เจ็บเลยใช่มั้ยคะ?[wa:60] "
2300206-60 = "ทายาที่แผล แล้วปิดพลาสเตอร์ไว้..."
2300206-61 = "เสร็จแล้วค่ะ! พยายามได้ดีมากเลยค่ะคุณครู"
2300206-62 = "ระวังอย่าให้พลาสเตอร์หลุดนะคะ!"
2300206-63 = "[s] \"พลาสเตอร์นี่สีสันสดใสจัง\""
2300206-64 = "ค่ะ นี่เป็นพลาสเตอร์อันโปรดของฉันค่ะ สีก็สวย และถ้าถูด้านบนจะมีกลิ่นหอมหวานๆ ด้วยค่ะ"
2300206-65 = "แต่ชิ้นมันเล็ก เลยใช้ติดแผลใหญ่หรือแผลผ่าตัดไม่ได้ค่ะ"
2300206-66 = "สำหรับแผลของคุณครู การตัดขาอาจจะเป็นวิธีที่ไม่ดีเท่าไร..."
2300206-67 = "[s] \"ยังไม่เลิกคิดเรื่องนั้นอีกเหรอ?!\""

[translation]
2300206-1 = "三一流外科手術"
2300206-2 = "三一．救護騎士團的治療室"
2300206-3 = "謝謝您今天幫我搬東西，老師！"
2300206-4 = "資料上缺漏的藥品比想像中的還多，如果我一個人整理倉庫的話，恐怕要花上一整天的時間吧。"
2300206-5 = "[s] 「這點小事不用謝。」"
2300206-6 = "很高興聽到老師這麼說，欸嘿嘿。"
2300206-7 = "對了，老師。前面才剛剛拖過地，請小心不要……"
2300206-9 = "（滑，咚唰！）"
2300206-10 = "老，老師！沒事吧！？"
2300206-13 = "[ns] 「痛痛……有點破皮而已，沒事……」"
2300206-14 = "老師的膝蓋在流血了！要趕緊治療才行……！"
2300206-15 = "必須趕快截肢，預防感染！！"
2300206-16 = "[s] 「截肢！？」"
2300206-17 = "咦？#n老師為什麼要這麼驚訝呢？"
2300206-18 = "如果不趕快把腳切掉的話，就會被壞菌入侵，傷口可能會化膿喔。"
2300206-19 = "我之前看過的老舊醫學書上就是這麼說的！"
2300206-20 = "[s] 「那本醫學書是多久之前的啊……？」"
2300206-21 = "這個嘛……大概500年左右！"
2300206-22 = "別擔心！根據書上所說，一名老練的醫生只要一分鐘就可以完成截肢了……"
2300206-23 = "為了不讓您感到疼痛，我會速戰速決的！"
2300206-24 = "[s] 「這種傷口用一個OK繃就夠了！不用截肢也沒關係！是吧！？」"
2300206-25 = "真的沒關係嗎？"
2300206-27 = "嗯……那這次就聽老師的吧。請老師坐在那邊！"
2300206-30 = "― 那麼，首先要消毒傷口，[wa:2340] "
2300206-32 = "― 請脫下襪子並乖乖的唷！[wa:980] "
2300206-35 = "― 不好好消毒的話，[wa:1020] "
2300206-37 = "― 傷口會發炎，甚至變得更嚴重喔。[wa:3480] "
2300206-40 = "― 可能會有點痛，請忍耐一下吧！[wa:2320] "
2300206-42 = "― 嘿咻……！變乾淨吧……！[wa:2900] "
2300206-45 = "― 很好，忍住了呢！[wa:1220] "
2300206-47 = "― 還差一點點唷──[wa:220] "
2300206-50 = "― 作為贈品，[wa:660] "
2300206-52 = "― 我來施一道能讓傷口好得更快的魔法咒語吧！[wa:1700] "
2300206-55 = "― 那麼，痛痛，飛走吧～！[wa:3600] "
2300206-57 = "― 如何？不痛了吧？[wa:1220] "
2300206-60 = "然後在傷口上塗藥，貼上OK繃～……"
2300206-61 = "結束！辛苦您了，老師！"
2300206-62 = "請小心不要讓OK繃掉下來唷！"
2300206-63 = "[s]「真是可愛的OK繃呢。」"
2300206-64 = "是啊，這是我最喜歡的OK繃。不但顏色漂亮，表面還會散發甜甜的香氣唷！"
2300206-65 = "但因為面積比較小，所以沒辦法貼在大面積傷口或截肢的部位上面。"
2300206-66 = "考慮到這點，果然還是不能截肢呢……"
2300206-67 = "[s] 「你剛才重新考慮的理由是這個嗎！？」"

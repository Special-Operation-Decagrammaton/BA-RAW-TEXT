[translation]
31120-1 = "第12話;合宿初日の夜"
31120-2 = "……。"
31120-3 = "結局、実際プールに入って遊ぶことはできませんでしたね……。"
31120-4 = "そういえば、水を入れるのは結構時間がかかるものでしたね……ごめんなさい、失念していました。"
31120-5 = "いや、謝ることはない。十分楽しかった。"
31120-6 = "……綺麗。"
31120-7 = "そうですね。真夜中のプールなんて、なかなか見られない景色で……。"
31120-12 = "（うとうと……）"
31120-13 = "あら、コハルちゃんおねむですか？"
31120-14 = "そ、そんなことないもん……でも、ちょっとつかれた……。"
31120-15 = "確かに、今日は朝から大掃除でバタバタでしたもんね。"
31120-16 = "では、そろそろお部屋に戻って休むとしましょうか？"
31120-17 = "明日から本格的に勉強合宿が始まってしまいますし……そろそろ寝ないと明日に支障が出てしまうかもしれません。"
31120-18 = "うん。"
31120-19 = "そうですね、では今日はこれくらいで。"
31120-21 = "それでは、お疲れ様でした。"
31120-22 = "お疲れ様。"
31120-23 = "はい、ではまた明日。"
31120-24 = "……お疲れ様。"
31120-25 = "[s] \"あっちの部屋にいるから、何かあったらいつでも呼んでね。\""
31120-26 = "はい、ちゃんと覚えておきますね♡"
31120-27 = "だ、ダメ……そういうハレンチなのは、正義実現委員会として……！"
31120-31 = "みんなお疲れのようですし、すぐ寝ましょうか。"
31120-32 = "では、おやすみなさい。"
31120-37 = "[ns] 部屋へ戻る。"
31120-40 = "先生の部屋"
31120-42 = "[ns1] \"………。\"\n[ns2] \"さて……。\""
31120-47 = "そもそも、補習授業部は……"
31120-48 = "生徒を退学させるために、作ったものですから。"
31120-51 = "[ns] （ナギサは実際のところ、何を考えて……）"
31120-59 = "ノックの音……？"
31120-60 = "[ns3] \"……？\"\n[ns4] \"どうぞ、入って。\""
31120-63 = "あ、えと、失礼します……。"
31120-64 = "[s] ドアが開く。"
31120-69 = "その、夜中にすみません……。"
31120-70 = "[s] \"ヒフミ？どうしたの？\""
31120-71 = "その、何だか眠れないと言いますか……。"
31120-72 = "あれこれ考えていたら、その……あうぅ……。"
31120-74 = "ヒフミと少し、話をすることにした。"
31120-76 = "先生も、今日はお疲れ様でした。"
31120-77 = "[s] \"ヒフミの方こそ、お疲れ様。\""
31120-78 = "明日から本格的な合宿、なのですが……私たち、このままで大丈夫なのでしょうか……。"
31120-79 = "もし一週間後の2次試験に落ちてしまったら、3次試験……。"
31120-80 = "万が一、それにも落ちてしまったら……"
31120-81 = "[s] \"……全員、退学。\""
31120-82 = "……やっぱり、先生も知っていたんですね。"
31120-83 = "まだ誰にも言っていませんが、そもそも言って良いことなのかどうかも分からなくて……。"
31120-84 = "学力試験なのに、どうしてこういう「全員一斉に」みたいな評価システムなのかもよく分かっていませんし、私たちの試験のためだけにこんな合宿施設まで提供してもらえるなんて……。"
31120-85 = "それに……。"
31120-86 = "うぅ……。"
31120-87 = "[s] \"ヒフミ、他にもナギサから何か言われたりした……？\""
31120-88 = "いえ、そ、その……！？"
31120-89 = "な、ナギサ様からはその、えっと……。"
31120-90 = "……。"
31120-91 = "……はい。"
31120-92 = "ナギサ様から、「誰にも言わないように」と言われていたのですが……私の手に負えるようなお話では、なくって……。"
31120-93 = "その、何と言えば良いのか……。"
31120-94 = "[s] \"「トリニティの裏切り者」を見つけてほしい、って？\""
31120-95 = "……！？"
31120-96 = "先生も、そう言われたってこと、ですよね……。"
31120-97 = "……。"
31120-98 = "……はい、ナギサ様とお話をしていた時に――"
31120-100 = "ヒフミさん……補習授業部にいる裏切り者を、探していただけませんか？"
31120-101 = "えっ、えぇっ……！？"
31120-102 = "正直なところをお話しますと、今あの補習授業部について、試験の結果など特に気にしてはいません。試験に合格しなければ退学というのは、つまるところ最終手段。"
31120-103 = "ヒフミさん。できる限り彼女たちの情報を集め、できる限り早く「裏切り者」を見つけていただけませんか。"
31120-104 = "ヒフミさんは今そのために、補習授業部にいるんです。"
31120-105 = "その、どうして私が、そんな……。"
31120-106 = "……「どうして」、ですか。"
31120-107 = "その答えはヒフミさんが、シャーレと繋がっていたから、ですね。"
31120-108 = "第三勢力である「シャーレの先生」が一緒にいる限り、「裏切り者」はむやみに動くことができません。"
31120-109 = "ゴミが、ゴミ箱から飛び出さないための蓋のようなもの……でしょうか。"
31120-110 = "ご、ゴミ箱……？"
31120-111 = "……失礼しました、忘れてください。今のはひとり言です。とにかく――"
31120-112 = "な、ナギサ様……！わ、私はその、こういうことは……！"
31120-113 = "……ヒフミさん。"
31120-119 = "他に選択肢は無いのです。それにやむを得なかったとはいえ、失敗してしまった場合はヒフミさんも同じことになってしまうのですよ……？"
31120-120 = "……っ。"
31120-122 = "[ns] （ナギサは、ヒフミを……）"
31120-123 = "わ、私はその、裏切り者だなんて、そんな話……。"
31120-124 = "みんな、同じ学校の生徒じゃないですか……今日だって、みんなでお掃除をして、一緒にご飯を食べて……。"
31120-125 = "これで、誰が裏切り者なのかを探れだなんて、そんな、そんなこと……。"
31120-126 = "そんなこと、私には……。"
31120-127 = "[s] \"……。\""
31120-128 = "……。"
31120-129 = "[s] \"ヒフミは、優しいね。\""
31120-130 = "え、えぇ……！？"
31120-131 = "[s] \"その件は、ヒフミは気にしなくて大丈夫。\""
31120-132 = "せ、先生……？"
31120-133 = "[s] \"私に任せて。私が、どうにか解決するから。\""
31120-134 = "……。"
31120-135 = "[s] \"ヒフミは、ヒフミにできることを頑張ってほしい。\""
31120-136 = "私に、できること……。"
31120-137 = "……。"
31120-138 = "……はい！分かりました！あ、その、私に何ができるのかは、まだ分かりませんが……ちょっと考えてみようと思います！"
31120-139 = "先生、ありがとうございます！何だか心が軽くなりました……！"
31120-142 = "（同時刻……）"
31120-144 = "合宿所・ロビー"
31120-145 = "……。"
31120-146 = "ハナコ？こんなところで何を？"
31120-147 = "あらっ、アズサちゃん。まだ起きてたんですか？それに、制服で……？"
31120-148 = "もうある程度寝た。だから見張りでもしておこうかと。"
31120-149 = "見張り……？いえ、それよりアズサちゃん……もしかして実は、全然寝られていないんじゃないですか？しっかり寝たようなお顔には見えませんよ……？"
31120-150 = "……慣れない場所だと、あんまり寝られなくて。"
31120-151 = "……。"
31120-152 = "心配しないでも良い。夜通し動くための訓練もちゃんと受けてるから、5日間ぐらいなら寝なくても問題無い。"
31120-153 = "いえ……そういうお話ではなく……。"
31120-154 = "ハナコも散歩？どうやらヒフミも、どこか散歩に行ったみたいだし。みんな慣れないところで不安だと思うから、それもあって、見張りでもした方が良いのかもしれないと思って。"
31120-155 = "そういうことだから、気にしないで大丈夫。"
31120-156 = "……アズサちゃん、あまり無理しないでくださいね。"
31120-161 = "……。"
31120-163 = "そうして、合宿初日の夜は過ぎていった……。"
31120-165 = "次回;補習授業部の模擬試験"

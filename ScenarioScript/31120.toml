[translation]
31120-1 = "ตอนที่ 12;คืนแรกในแคมป์ฝึกฝน"
31120-2 = "..."
31120-3 = "สุดท้ายเราก็ไม่ได้เล่นน้ำเลยค่ะ..."
31120-4 = "อื้ม ขอโทษนะคะ... ฉันลืมคิดไปเลยว่าต้องใช้เวลาเท่าไหร่กว่าน้ำจะเต็ม...#nไม่คิดเลยว่าจะใช้เวลานานแบบนี้..."
31120-5 = "ไม่เป็นไรหรอก เราก็สนุกกันมากแล้ว"
31120-6 = "... สวยจัง"
31120-7 = "จริงด้วยค่ะ สระว่ายน้ำตอนกลางคืน... นี่ไม่ใช่ภาพที่เราจะได้เห็นบ่อยๆ เลยนะคะ..."
31120-12 = "(สัปหงก)"
31120-13 = "อุ๊ย ง่วงเหรอคะโคฮารุจัง?"
31120-14 = "ปะ... เปล่านะ... ฉันแค่เหนื่อยน่ะ..."
31120-15 = "ก็น่าเหนื่อยอยู่หรอกค่ะ เราทำความสะอาดครั้งใหญ่กันตั้งแต่เช้านี่..."
31120-16 = "งั้นเรากลับเข้าไปพักกันไหมคะ? "
31120-17 = "เราต้องเริ่มแคมป์ฝึกฝนกันพรุ่งนี้แล้ว ถ้าไม่ไปนอนเอาแรง พรุ่งนี้ก็คง..."
31120-18 = "อื้ม"
31120-19 = "กลับเข้าไปเถอะค่ะ"
31120-21 = "ขอบคุณทุกคนที่พยายามกันในวันนี้นะคะ"
31120-22 = "ขอบคุณนะ "
31120-23 = "ยอดเยี่ยมมากเลยค่ะทุกคน"
31120-24 = "พยายามกันได้ดีมากเลยล่ะ..."
31120-25 = "[s] \"ครูจะไปพักที่ห้องอื่น ถ้ามีเรื่องอะไรก็เรียกนะ\""
31120-26 = "อุฮุฮุ ค่ะ ไม่ลืมแน่นอนค่ะ"
31120-27 = "ไม่ได้นะ... คนจากชมรมทวงความยุติธรรมจะทำเรื่องไม่เหมาะสมไม่ได้นะ... เอ่อ..."
31120-31 = "แหะๆๆ วันนี้ทุกคนคงเหนื่อยแล้ว รีบไปนอนพักเถอะค่ะ..."
31120-32 = "งั้นก็ราตรีสวัสดิ์นะคะ"
31120-37 = "[ns] กลับไปที่ห้อง"
31120-40 = "ห้องพักส่วนตัวของครู"
31120-42 = "[ns1] \"......\"\n[ns2] \"เป็นวันที่เหนื่อยจัง\""
31120-47 = "ก็ชมรมชั้นเรียนเสริมนี่..."
31120-48 = "ถูกตั้งขึ้นเพื่อไล่นักเรียนออกตั้งแต่แรกยังไงล่ะคะ"
31120-51 = "[ns] (นางิสะมีแผนการอะไรกันนะ...)"
31120-59 = "(ได้ยินเสียงเคาะประตู...?)"
31120-60 = "[ns3] \"ใครน่ะ...?\"\n[ns4] \"มีใครอยู่ข้างนอกเหรอ?\""
31120-63 = "คุณครู... อยู่ไหมคะ?"
31120-64 = "[s] เปิดประตู"
31120-69 = "อ่า แหะๆๆ... ขอโทษนะคะที่มากลางดึก"
31120-70 = "[s] \"ฮิฟุมิเองเหรอ?\""
31120-71 = "คือว่า... ฉันพยายามข่มตาหลับแต่ก็นอนไม่หลับเลย..."
31120-72 = "แถมยังมีความคิดมากมายในหัว... อ่า... "
31120-74 = "คุณครูนั่งคุยกับฮิฟุมิอยู่ครู่หนึ่ง"
31120-76 = "ขอบคุณสำหรับวันนี้นะคะคุณครู"
31120-77 = "[s] \"วันนี้ฮิฟุมิก็เก่งมากนะ\""
31120-78 = "พรุ่งนี้จะเริ่มแคมป์ฝึกฝนอย่างจริงจังแล้ว... อืม... พวกฉันจะไม่เป็นอะไรใช่ไหมคะ...?"
31120-79 = "ถ้าสอบประเมินครั้งที่ 2 ในสัปดาห์หน้าไม่ผ่าน... ก็ต้องมีการสอบครั้งที่ 3..."
31120-80 = "แล้วถ้ายังไม่ผ่านอีก..."
31120-81 = "[s] \"ทุกคนก็จะถูกไล่ออก\""
31120-82 = "ใช่ค่ะ... ว่าแล้วว่าคุณครูเองก็ทราบด้วย"
31120-83 = "ฉันยังไม่ได้บอกเรื่องนี้กับคนอื่นเลย... แล้วก็ไม่รู้ด้วยค่ะว่าควรจะบอกหรือเปล่า... อืม..."
31120-84 = "นี่เป็นการสอบประเมินการเรียนรู้ แต่ก็มาจัดระบบแปลกๆ ที่ต้องรับผิดชอบร่วมกัน#nไหนจะเตรียมสิ่งอำนวยความสะดวกในแคมป์ฝึกฝนเพื่อการสอบให้อีก..."
31120-85 = "แถมยัง..."
31120-86 = "... อ่า... "
31120-87 = "[s] \"ฮิฟุมิ ไปได้ยินอะไรจากนางิสะมาเหรอ?\""
31120-88 = "คะ?!  คะ... เอ๋?!"
31120-89 = "คะ... คุณนางิสะเหรอคะ...?"
31120-90 = "... เอ่อ..."
31120-91 = "ใช่ค่ะ... ฉันได้ยินบางอย่างมาน่ะค่ะ "
31120-92 = "คุณนางิสะบอกว่าไม่ให้ไปบอกใคร... แต่ฉันรับมือกับเรื่องนี้คนเดียวไม่ได้..."
31120-93 = "ฉันก็เลย... เอ่อ..."
31120-94 = "[s] \"นางิสะบอกให้หาคนทรยศในทรีนิตี้เหรอ?\""
31120-95 = "คะ...? คุณครูก็ทราบเหรอคะ?!"
31120-96 = "อะ... อ่า... คือว่า..."
31120-97 = "..."
31120-98 = "ใช่ค่ะ... ใช่แล้วค่ะ คุณนางิสะบอกฉันแบบนั้นค่ะ..."
31120-100 = "คุณฮิฟุมิ จงหาคนทรยศให้ได้นะคะ"
31120-101 = "คะ? คะ?!  ให้ฉัน..."
31120-102 = "คะแนนสอบไม่สำคัญหรอกค่ะ เพราะทางออกสุดท้ายคือการไล่ออกหลังการสอบครั้งที่ 3"
31120-103 = "ภารกิจของคุณฮิฟุมิก็คือรวบรวมข้อมูลของผู้ต้องสงสัยแล้วหาตัวผู้ทรยศให้ได้เร็วที่สุดค่ะ"
31120-104 = "ที่คุณฮิฟุมิต้องมาอยู่ในชมรมชั้นเรียนเสริมก็เพื่อสิ่งนี้ล่ะค่ะ"
31120-105 = "เอ่อ... แล้วทำไม... ฉันถึง... ทำไมต้อง..."
31120-106 = "อยากรู้ว่าทำไมถึงเป็นคุณฮิฟุมิเหรอคะ?"
31120-107 = "ก็เพราะเป็นคนที่ใช้ประโยชน์จากชาเล่ต์ได้ยังไงล่ะคะ"
31120-108 = "ถ้ามีอำนาจที่ 3 อย่างคุณครูจากชาเล่ต์ทั้งคน ผู้ทรยศก็คงเคลื่อนไหวตามใจชอบไม่ได้"
31120-109 = "หรือถ้าจะพูดให้เห็นภาพ ก็คงเป็นเหมือนฝาปิดถังขยะ#nที่ทำให้ขยะในถังไม่สามารถกระดอนออกมาได้อย่างที่ตั้งใจไว้ค่ะ"
31120-110 = "คะ...? ถังขยะเหรอคะ...?"
31120-111 = "อ่า... ลืมมันไปเถอะค่ะ ฉันแค่พูดอะไรคนเดียวน่ะ ยังไงก็..."
31120-112 = "คะ... คุณนางิสะ... คือว่าฉัน..."
31120-113 = "... คุณฮิฟุมิ ... "
31120-119 = "เราไม่มีทางเลือกอื่นค่ะ คุณฮิฟุมิก็อย่าลืมนะคะว่าตัวเองคือนักเรียนที่สอบตกเหมือนกัน#nหากทำภารกิจนี้ไม่สำเร็จ รู้ดีใช่ไหมคะว่าผลจะออกมาเป็นอย่างไร?"
31120-120 = "..."
31120-122 = "[ns] (ว่าแล้วเชียว นางิสะบอกกับฮิฟุมิ...)"
31120-123 = "ฉะ... ฉัน... คนทรยศงั้นเหรอ... ทำไมถึงมีเรื่องน่าหวาดกลัวแบบนั้น..."
31120-124 = "อีกอย่าง พวกเราเป็นนักเรียนโรงเรียนเดียวกันนะคะ วันนี้เราต่างก็ช่วยกันทำความสะอาด#nแล้วก็ทานข้าวด้วยกันด้วยนี่คะ"
31120-125 = "จะให้ฉันเฝ้ามองพวกเธอด้วยความน่าสงสัยได้ยังไงคะ... ให้ทำแบบนั้นมัน... มันเกินไปนะคะ..."
31120-126 = "ฉะ... ฉันน่ะ... คงไม่..."
31120-127 = "[s] \".........\""
31120-128 = "..."
31120-129 = "[s] \"ฮิฟุมิเป็นเด็กดีจังเลยนะ\""
31120-130 = "คะ...?  คะ... เอ๋?!"
31120-131 = "[s] \"ฮิฟุมิไม่ต้องใส่ใจอะไรหรอก ไม่ว่าในนั้นจะมีคนทรยศหรือเปล่า\""
31120-132 = "คุณครู...?"
31120-133 = "[s] \"เรื่องนั้นเดี๋ยวครูจัดการเอง\""
31120-134 = "..."
31120-135 = "[s] \"ฮิฟุมิแค่ไปทำสิ่งที่ตัวเองทำได้ก็พอ\""
31120-136 = "สิ่งที่ฉันทำได้..."
31120-137 = "..."
31120-138 = "ได้ค่ะ...! ฉันจะลองไปคิดดูค่ะว่าฉันทำอะไรได้บ้าง!"
31120-139 = "ขอบคุณนะคะคุณครู ฉันรู้สึกสบายใจขึ้นมาหน่อยแล้วล่ะค่ะ!"
31120-142 = "(ในเวลาเดียวกัน)"
31120-144 = "ล็อบบี้ส่วนกลาง อาคารย่อย"
31120-145 = "..."
31120-146 = "ฮานาโกะ? มาทำอะไรที่นี่น่ะ?"
31120-147 = "ตายจริง อาซึสะจัง? ยังไม่นอนอีกเหรอคะ? แถมยังเปลี่ยนเสื้อผ้าอีก..."
31120-148 = "อื้ม ฉันนอนพอแล้วน่ะ ว่าจะไปเฝ้ายามตอนกลางคืนเสียหน่อย"
31120-149 = "เฝ้ายาม...? ที่นี่น่ะเหรอคะ? แต่อาซึสะจังยังไม่ได้นอนสักงีบเลยนี่คะ...?"
31120-150 = "อื้ม... พอดีว่า... ถ้าแปลกที่แล้วฉันจะนอนไม่หลับน่ะ"
31120-151 = "..."
31120-152 = "ไม่ต้องห่วงหรอก ฉันเคยฝึกแบบไม่ได้หลับไม่ได้นอนมาแล้ว#nฉันอยู่ได้แบบไม่ต้องนอนประมาณ 5 วัน"
31120-153 = "อืม... แต่ก็เอาเถอะ... "
31120-154 = "ฮานาโกะเองก็มาเดินเล่นงั้นเหรอ? เหมือนฮิฟุมิก็ออกไปเดินเล่นเหมือนกัน#nทุกคนต่างกระสับกระส่ายเพราะแปลกที่ ฉันก็เลยต้องออกมาเฝ้ายาม"
31120-155 = "ถ้างั้นขอตัวนะ "
31120-156 = "ค่ะ อาซึสะจัง อย่าฝืนร่างกายมากเกินไปนะคะ"
31120-161 = "..."
31120-163 = "(แล้วคืนแรกของแคมป์ฝึกฝนก็ล่วงเลยไป...)"
31120-165 = "ตอนต่อไป; การสอบเสมือนจริงครั้งที่ 1"

[translation]
31120-1 = "Episode 12;First Night of Boot Camp"
31120-2 = "..."
31120-3 = "In the end, we never even got to play in the pool."
31120-4 = "I'm sorry. I didn't account for the time it would take to fill it with water."
31120-5 = "No need to apologize. It was still an enjoyable mission."
31120-6 = "It's surprisingly pretty at night."
31120-7 = "It really is. I've never seen a school pool after dark before."
31120-12 = "*nod*... *nod*"
31120-13 = "Are you still with us, Koharu? You look like you're about to fall asleep on your feet."
31120-14 = "N-No, I'm just...tired. Exhausted from today."
31120-15 = "Well, we have been cleaning since morning."
31120-16 = "Should we all go inside now? "
31120-17 = "We're starting our boot camp studies tomorrow. It's going to be hard to concentrate if we don't get a good night's rest."
31120-18 = "Yes."
31120-19 = "Let's go back in, shall we?"
31120-21 = "Phew. It's good to be back inside."
31120-22 = "It was a successful day. "
31120-23 = "Nice work out there, ladies. Let's get some rest."
31120-24 = "Good night..."
31120-25 = "[s] \"I'll be down the hall. Let me know if you need anything.\""
31120-26 = "But of course. I'll be sure to remember that."
31120-27 = "Gah... The Justice Task Force...would never abide by your indecency..."
31120-31 = "Why don't we all get some sleep? I'm sure everyone must be tired."
31120-32 = "Good night, Sensei."
31120-37 = "[ns] Return to your room."
31120-40 = "Sensei's Room"
31120-42 = "[ns1] \"...\"\n[ns2] \"What a day.\""
31120-47 = "After all, the Make-Up Work Club's true purpose..."
31120-48 = "...is to expel students."
31120-51 = "[ns] \"(Just what is Nagisa planning?)\""
31120-59 = "Someone is at the door."
31120-60 = "[ns3] \"Who is it?\"\n[ns4] \"Is someone there?\""
31120-63 = "Are you there, Sensei?"
31120-64 = "[s] Open the door."
31120-69 = "Sorry for bothering you so late."
31120-70 = "[s] \"I thought it was you, Hifumi.\""
31120-71 = "Yeah. I just can't seem to fall asleep."
31120-72 = "There's been a lot on my mind..."
31120-74 = "I chatted with Hifumi for a while."
31120-76 = "Thanks for helping us today, Sensei."
31120-77 = "[s] \"You girls did a great job.\""
31120-78 = "We're supposed to formally start our boot camp first thing in the morning, but are we really going to be able to do this?"
31120-79 = "There's only a week until the second exam. Then there will be a third exam shortly after if we fail again."
31120-80 = "And if we fail that one..."
31120-81 = "[s] \"Everyone will be expelled.\""
31120-82 = "Yeah. So you know."
31120-83 = "I haven't told the others, and I'm not even sure if it's really true, but...ugh."
31120-84 = "These are standard individual exams, but they're using this strange collective punishment system. Even the fact we're being forced to go through a boot camp of all things is odd."
31120-85 = "And on top of that..."
31120-86 = "*sigh* "
31120-87 = "[s] \"What did Nagisa tell you?\""
31120-88 = "Wh-What?!"
31120-89 = "You...really want to know?"
31120-90 = "Well..."
31120-91 = "Yes, I spoke with her. "
31120-92 = "She told me to keep this a secret, but it's hard for me keep it all to myself."
31120-93 = "There's something going on. It's..."
31120-94 = "[s] \"Is it about finding Trinity's traitor?\""
31120-95 = "You know about that too?!"
31120-96 = "Well, about that..."
31120-97 = "..."
31120-98 = "When I spoke to her, Nagisa said..."
31120-100 = "Hifumi, please find the traitor."
31120-101 = "I'm sorry? What?! Th-That's..."
31120-102 = "The results of the exams don't matter. Expulsion after the third exam is a last resort, so to speak."
31120-103 = "Your mission is to collect as much information about the suspects as you can and find the traitor as quickly as possible."
31120-104 = "That is why you were placed in the Make-Up Work Club."
31120-105 = "But why me? How did this happen...?"
31120-106 = "Why were you selected?"
31120-107 = "Because of your existing relationship with Schale."
31120-108 = "The traitor won't be able to do as they wish with Sensei present."
31120-109 = "Sensei is my insurance, my trash bin lid—seeing to it that the trash inside your club won't escape so easily."
31120-110 = "Did you just call us a trash bin?"
31120-111 = "Pay it no mind. Moving on..."
31120-112 = "W-Wait, Nagisa! I can't do something like this!"
31120-113 = "Hifumi. "
31120-119 = "There's no other option. Don't forget that you're a failing student as well. I'm sure you understand what will happen to you if you were to fail this mission, yes?"
31120-120 = "..."
31120-122 = "[ns] \"(Just like I thought. She's taking advantage of Hifumi too.)\""
31120-123 = "You have to be kidding me. Is there really a traitor? The thought alone is terrifying..."
31120-124 = "We're all supposed to be students of the same school. We spent all day cleaning together. We ate dinner together."
31120-125 = "How am I supposed to suspect any of them? They're my friends. It's too much."
31120-126 = "I can't do this..."
31120-127 = "[s] \"...\""
31120-128 = "..."
31120-129 = "[s] \"You're a kind person, Hifumi.\""
31120-130 = "What was that?"
31120-131 = "[s] \"You don't have to worry about suspecting your friends.\""
31120-132 = "Sensei?"
31120-133 = "[s] \"Leave everything to me.\""
31120-134 = "..."
31120-135 = "[s] \"I want you to focus on helping the way YOU want to.\""
31120-136 = "How I want to..."
31120-137 = "..."
31120-138 = "Right! I'll put some thought into what I can do to help!"
31120-139 = "Thanks for hearing me out. I feel a lot better now."
31120-142 = "Meanwhile..."
31120-144 = "Annex Lobby"
31120-145 = "..."
31120-146 = "Hanako? What are you doing here?"
31120-147 = "You're still up too, Azusa? And you're in your uniform."
31120-148 = "I've slept enough already. I was thinking of doing a nighttime patrol."
31120-149 = "Here? And did you really get enough sleep? You seem exhausted."
31120-150 = "I have trouble sleeping in places I'm unaccustomed to."
31120-151 = "..."
31120-152 = "You don't have to worry on my behalf. I'm trained to go five days without sleep if necessary."
31120-153 = "That's not really the issue here. "
31120-154 = "Anyway, I imagine everyone must be feeling anxious on our first night, hence why you and Hifumi went on walks. I wanted to go on patrol for your sakes."
31120-155 = "In fact, I should be getting back to that. "
31120-156 = "Well, okay. Don't stay up too late Azusa."
31120-161 = "..."
31120-163 = "And so the first night of boot camp passed."
31120-165 = "Next Episode;The First Mock Exam"

[translation]
31120-1 = "第12話;合宿初日的夜晚"
31120-2 = "……"
31120-3 = "結果沒能玩到水呢……"
31120-4 = "注水需要花上很多時間呢……對不起，是我考慮得不夠周到。"
31120-5 = "沒關係，已經夠開心了。"
31120-6 = "……真漂亮。"
31120-7 = "就是說呀……#n深夜的泳池……確實不是常見的景色呢……"
31120-12 = "（呼嚕呼嚕）"
31120-13 = "哎呀，小春醬想睡了嗎？"
31120-14 = "才，才沒有……只是有點累了……"
31120-15 = "也對……今天從早上就開始大掃除，還忙了很多事呢。"
31120-16 = "是不是差不多該回房間休息了？"
31120-17 = "明天就要正式開始合宿……再不睡的話說不定會影響到明天的課程。"
31120-18 = "嗯。"
31120-19 = "我們回去吧。"
31120-21 = "今天辛苦大家了。"
31120-22 = "辛苦了。"
31120-23 = "大家辛苦囉。"
31120-24 = "……大家辛苦了。"
31120-25 = "[s]「我就在那邊的房間，有什麼事的話隨時都可以叫我哦。」"
31120-26 = "唔呵呵，我會好好記住的♡"
31120-27 = "不，不行……那種下流的事，身為實現正義部……！"
31120-31 = "啊哈哈……大家似乎都累了，早點休息吧。"
31120-32 = "各位晚安。"
31120-37 = "[ns] 回房間"
31120-40 = "老師的房間"
31120-42 = "[ns1]「……」\n[ns2]「真是不得了的一天啊……」"
31120-47 = "況且補課部本身……"
31120-48 = "打從一開始就是為了讓學生退學而設立的社團。"
31120-51 = "[ns]（渚的意圖究竟是什麼呢……）"
31120-59 = "（有敲門聲……？）"
31120-60 = "[ns3]「是誰……？」\n[ns4]「外面有人在嗎？」"
31120-63 = "老師……你在裡面嗎？"
31120-64 = "[s] 將門打開"
31120-69 = "啊哈哈……這麼晚來打擾真不好意思……"
31120-70 = "[s]「原來是日步美啊。」"
31120-71 = "那個，因為我實在是睡不著……"
31120-72 = "腦袋裡一直在思考各種事……啊嗚……"
31120-74 = "（決定和日步美稍微聊聊）"
31120-76 = "今天辛苦你了，老師。"
31120-77 = "[s]「日步美也辛苦了。」"
31120-78 = "明天開始是正式的合宿，不過……我們這樣下去沒問題嗎……"
31120-79 = "如果一週後的第二次測驗不合格，就得接受第三次測驗……"
31120-80 = "萬一也不合格的話……"
31120-81 = "[s]「所有人都會被退學。」"
31120-82 = "……嗯，果然老師也知道呢。"
31120-83 = "這個事實我還沒有告訴任何人……也不知道該不該說……啊嗚嗚……"
31120-84 = "明明是學力測驗，為什麼有這麼奇怪的連坐制度……#n甚至還為了這場測驗而準備了這樣的合宿設施……"
31120-85 = "再加上……"
31120-86 = "啊嗚…… "
31120-87 = "[s]「日步美，你還有從渚口中聽說什麼事嗎？」"
31120-88 = "咦！？"
31120-89 = "從，從渚大人口中……？"
31120-90 = "啊嗚嗚……"
31120-91 = "……是的。"
31120-92 = "雖然渚大人說過不要告訴任何人……不過這實在不是我能承擔的事……"
31120-93 = "該怎麼說好呢……啊嗚嗚……"
31120-94 = "[s] 「希望你找出『三一的叛徒』是嗎？」"
31120-95 = "……咦？老師你也知道這件事嗎！？"
31120-96 = "啊，啊嗚……那個……"
31120-97 = "……"
31120-98 = "……是的。#n渚大人是這麼告訴我的……"
31120-100 = "日步美同學──請找出補課部裡的叛徒吧。"
31120-101 = "咦，咦咦……！？"
31120-102 = "坦白說，我並不在意測驗的結果。#n第3次測驗後的退學只是最後的手段罷了。"
31120-103 = "日步美同學，你的任務是盡可能蒐集他們的情報，同時盡早揪出叛徒的身分。"
31120-104 = "這才是日步美同學加入補課部的目的。"
31120-105 = "啊，啊嗚嗚……#n為，為什麼是我呢……那種事實在……"
31120-106 = "為什麼是日步美同學？"
31120-107 = "──因為你是能利用夏萊的人。"
31120-108 = "只要和身為第三勢力的夏萊老師待在一起，「叛徒」所屬的勢力就沒辦法貿然行動。"
31120-109 = "換言之，是避免垃圾桶裡的垃圾傾倒出來的……如蓋子般的存在吧。"
31120-110 = "垃，垃圾桶……？"
31120-111 = "……啊啊，請忘了吧。剛才只是我的自言自語。#n總而言之──"
31120-112 = "渚，渚大人……！#n那，那個……這種事實在……！"
31120-113 = "……日步美同學。 "
31120-119 = "沒有其他選擇了。還有希望你別忘記……日步美同學也同樣是不及格的學生之一。#n要是這個任務失敗將會落得什麼下場……你應該比任何人都清楚吧？"
31120-120 = "……"
31120-122 = "[ns] （渚果然也想把日步美……）"
31120-123 = "我，我對叛徒之類的那種可怕的事……"
31120-124 = "大家不都是同一間學校的學生嗎？#n明明今天也一起打掃、一起吃飯……"
31120-125 = "可是卻要我用懷疑的眼光看待大家，那實在是……"
31120-126 = "那種事……對我來說……"
31120-127 = "[s]「……」"
31120-128 = "……"
31120-129 = "[s]「日步美是個善良的孩子呢。」"
31120-130 = "咦，咦咦……！？"
31120-131 = "[s]「與叛徒有關的事，日步美不需要放在心上。」"
31120-132 = "老師……？"
31120-133 = "[s]「那件事我會想辦法解決。」"
31120-134 = "……"
31120-135 = "[s]「日步美只要專注在日步美能做到的事就行了。」"
31120-136 = "我能做到的事……"
31120-137 = "……"
31120-138 = "……我知道了！#n我會試著想想自己能做些什麼的！"
31120-139 = "非常謝謝你，老師！感覺心裡輕鬆多了……！"
31120-142 = "（同時，在另一方面……）"
31120-144 = "合宿處．大廳"
31120-145 = "……"
31120-146 = "花子？你在這裡做什麼？"
31120-147 = "哎呀，梓醬還沒睡嗎？而且還換上了制服……？"
31120-148 = "嗯，剛才已經睡過了，所以打算去站哨。"
31120-149 = "站哨……？在這種地方？#n而且梓醬……你看起來完全沒睡吧？"
31120-150 = "這……在不習慣的地方，我有點睡不著。"
31120-151 = "……"
31120-152 = "不必擔心。我受過很多徹夜行動的訓練，就算五天不睡也沒問題。"
31120-153 = "唔嗯……我不是這個意思……"
31120-154 = "花子也出來散步嗎？日步美好像也去別的地方散步了。#n大家在不習慣的地方可能都有點不安，所以我得去站哨才行。"
31120-155 = "再見。"
31120-156 = "我知道了。#n梓醬，請不要太勉強哦。"
31120-161 = "……"
31120-163 = "（就這樣，合宿初日的夜晚結束了……）"
31120-165 = "下一話;補課部的模擬測驗"

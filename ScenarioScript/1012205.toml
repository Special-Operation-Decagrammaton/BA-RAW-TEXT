[translation]
1012205-1 = "海灘上閃耀的某物"
1012205-3 = "（為了透透氣而來到海邊）"
1012205-12 = "[ns]「彌香你在做什麼？」"
1012205-13 = "啊，老師！！"
1012205-18 = "呵呵呵，你看這個。"
1012205-19 = "[ns]「這是……貝殼？」"
1012205-20 = "嗯嗯☆怎麼樣？很漂亮吧？"
1012205-21 = "雖然海邊的貝殼大多都碎碎的，#n不過只要仔細找找，還是能找到這種乾淨又漂亮的孩子唷？"
1012205-22 = "呵呵，感覺有點浪漫呢。"
1012205-23 = "要不要把這些漂亮的孩子收集起來，做成項鍊呢☆"
1012205-24 = "[s]「話說彌香很喜歡打扮對吧。」"
1012205-25 = "嗯嗯！我以前收集了很多可愛又漂亮的東西。"
1012205-26 = "雖然現在幾乎都沒有了，我也沒怎麼買新的。"
1012205-27 = "因為我已經省錢一段時間了！！"
1012205-28 = "最近還開始用記帳APP了哦？"
1012205-29 = "[s]「哦哦，很了不起耶？」"
1012205-30 = "哼哼哼，對吧？"
1012205-34 = "……雖然也沒有每天都記啦。"
1012205-35 = "因為我常常嫌麻煩就集中起來一起補記，要是不小心弄丟收據就會整個破功……"
1012205-36 = "不，不過我覺得「有在記帳」這件事本身就很有意義了。"
1012205-37 = "[s1]「這樣已經很棒了哦。彌香真厲害。」\n[s2]「讓我不禁開始反省自己的行為……」"
1012205-40 = "嘿嘿，這是稱讚吧？謝謝你！"
1012205-41 = "哦？發現了漂亮的孩子☆"
1012205-46 = "這個海螺的殼，跟Mergiela的耳環好像哦！"
1012205-47 = "我以前超喜歡的說，Lucky～☆"
1012205-48 = "當然跟高價的珠寶比起來還是有不少的差距……"
1012205-49 = "不過貝殼或海螺殼也有它特別的美對吧？"
1012205-50 = "[s]「是啊，很漂亮。」"
1012205-51 = "哈哈哈，要是那句話是在說我就更好了☆"
1012205-55 = "[ns]「彌香你看起來很開心呢。」"
1012205-56 = "嗯？"
1012205-57 = "[ns]「感覺好像比以前更從容了。」"
1012205-58 = "咦咦～我聽不懂是什麼意思。"
1012205-59 = "變得更從容了……？"
1012205-60 = "是嗎？嗯……"
1012205-61 = "我有變得……比較有餘裕了嗎……？"
1012205-62 = "……"
1012205-66 = "[ns]「彌香……？」"
1012205-67 = "嗯，嗯。"
1012205-68 = "畢竟發生了很多事嘛！"
1012205-69 = "是啊，確實發生了各種事情……"
1012205-70 = "……"
1012205-74 = "老師，我們去那邊看看吧？#n這邊差不多都看過了！"

[translation]
1012205-1 = "Something Sparkly in the Sand"
1012205-3 = "I went to the beach for some fresh air."
1012205-12 = "[ns] \"What are you doing, Mika?\""
1012205-13 = "Ah, Sensei!"
1012205-18 = "Heehee, look at this."
1012205-19 = "[ns] \"It's a...seashell?\""
1012205-20 = "You bet! What do you think? It's pretty, right? ☆"
1012205-21 = "Most of the seashells are broken, but you can find some clean and pretty ones if you're patient."
1012205-22 = "Heehee. And it's so romantic..."
1012205-23 = "Maybe I can collect enough pretty ones to make a necklace! ☆"
1012205-24 = "[s] \"You used to love accessorizing.\""
1012205-25 = "Oh yeah! And I LOVED collecting cute stuff."
1012205-26 = "Most of it's gone now, though. And I didn't replace any of it."
1012205-27 = "I've been cutting down on my spending for a while now."
1012205-28 = "I'm even using a budgeting app!"
1012205-29 = "[s] \"That's incredible!\""
1012205-30 = "Heehee. I know, right?"
1012205-34 = "...Of course, I don't update it everyday."
1012205-35 = "Because I get lazy and do it all at once, I run into big trouble when I can't find a receipt..."
1012205-36 = "B-But still, I think it's good that I'm trying."
1012205-37 = "[s1] \"I'm proud of you, Mika.\"\n[s2] \"...Maybe I should try it.\""
1012205-40 = "Heehee, I'll take the compliment. Thank you!"
1012205-41 = "Oh? This one's beautiful! ☆"
1012205-46 = "This conch shell looks like a designer earring!"
1012205-47 = "I used to have one just like this. So lucky! ☆"
1012205-48 = "Of course, it's hard to compare shells to expensive jewelry..."
1012205-49 = "But they're beautiful all on their own, right?"
1012205-50 = "[s] \"Very beautiful.\""
1012205-51 = "Me...or the shells? Ahaha! I'm just kidding. ☆"
1012205-55 = "[ns] \"You seem to be having fun.\""
1012205-56 = "Hm?"
1012205-57 = "[ns] \"As in, you're more relaxed now.\""
1012205-58 = "Wow. Why would you...?"
1012205-59 = "Really?! Relaxed...?"
1012205-60 = "You really think so? Hmm..."
1012205-61 = "Could it be...that I just got some room to unwind...?"
1012205-62 = "..."
1012205-66 = "[ns] \"Mika...?\""
1012205-67 = "Mm. Mmm."
1012205-68 = "Well, we've been doing a lot, after all!"
1012205-69 = "Yeah, yeah. Right. It's all the...activities."
1012205-70 = "..."
1012205-74 = "Sensei, wanna go over there? I think we've seen everything here."

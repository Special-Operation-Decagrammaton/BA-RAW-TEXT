[translation]
1012205-1 = "บางอย่างที่ส่องประกายที่ชายหาด"
1012205-3 = "(คุณครูออกไปเดินสูดอากาศที่ชายหาด)"
1012205-12 = "[ns] \"มิกะ ทำอะไรอยู่เหรอ?\""
1012205-13 = "อ๊ะ คุณครู!!"
1012205-18 = "ฮุฮุฮุ ดูนี่สิ"
1012205-19 = "[ns] \"นี่มัน... เปลือกหอยนี่นา?\""
1012205-20 = "อื้อ☆ เป็นไง? สวยใช่มั้ยล่ะ?"
1012205-21 = "เปลือกหอยส่วนใหญ่บนชายหาดจะแตกบ้าง หักบ้าง แต่ถ้าหาดีๆ ก็จะเจอเปลือกหอยที่สะอาดๆ และก็สวยเหมือนอันนี้ละ"
1012205-22 = "ฮุฮุ ฟังดูโรแมนติกจังเลยนะ"
1012205-23 = "เก็บเด็กๆ น่ารักๆ พวกนี้ไปร้อยเป็นสร้อยคอดีมั้ยนะ☆"
1012205-24 = "[s] \"จะว่าไป มิกะชอบพวกเครื่องประดับใช่มั้ย?\""
1012205-25 = "อื้อๆ! ฉันสะสมของน่ารักๆ สวยๆ ไว้เยอะเลยละ"
1012205-26 = "อืม ถึงตอนนี้มันแทบจะไม่เหลือแล้วก็เถอะ แล้วฉันก็ไม่ค่อยได้ซื้อชิ้นใหม่ด้วย"
1012205-27 = "ก็ฉันประหยัดเงินมาสักระยะแล้วนี่เนอะ!!"
1012205-28 = "ช่วงนี้ฉันใช้แอปฯ จดรายรับรายจ่ายด้วยนะ"
1012205-29 = "[s] \"โอ้ เยี่ยมเลยนะ\""
1012205-30 = "ฮุฮุฮุ ใช่มั้ยล่ะ?"
1012205-34 = "ถึงฉันจะไม่ได้ใช้มันทุกวันก็เถอะนะ..."
1012205-35 = "ฉันขี้เกียจเข้าไปบันทึกทุกวัน ก็เลยรวมใบเสร็จไว้แล้วค่อยบันทึกทีละเยอะๆ ในครั้งเดียว แต่ก็เคยมีบ้างที่ฉันทำใบเสร็จหายไปทั้งหมด ก็เลยไม่มีอะไรไปบันทึกย้อนหลัง..."
1012205-36 = "ตะ... แต่ฉันก็ยังให้ความสำคัญกับการใช้แอปฯ อยู่นะ"
1012205-37 = "[s1] \"แค่นี้ก็น่าชื่นชมแล้วละ มิกะ\"\n[s2] \"ทำเอาครูย้อนกลับไปมองพฤติกรรมของตัวเองเลยแฮะ...\""
1012205-40 = "ฮิฮิ ชมกันใช่มั้ย? ขอบคุณนะ!"
1012205-41 = "โอ๊ะ? เจอเด็กน้อยน่ารักอีกอันแล้ว☆"
1012205-46 = "เปลือกหอยสังข์อันนี้เหมือนต่างหูของมาร์เจียลาเลย!"
1012205-47 = "เป็นแบบที่ฉันชอบมากเลยด้วย ลักกี้~☆"
1012205-48 = "ถึงจะเปรียบเทียบกับเครื่องประดับราคาแพงไม่ได้..."
1012205-49 = "แต่พวกเปลือกหอยก็มีความสวยงามในแบบของมันนี่เนอะ?"
1012205-50 = "[s] \"นั่นสินะ ครูก็ว่าสวยดี\""
1012205-51 = "อะฮะฮ่า พอได้ยินแบบนี้... ฉันอยากให้คุณครูหมายถึงฉันมากกว่าเปลือกหอยจัง☆ "
1012205-55 = "[ns] \"มิกะดูเพลิดเพลินขึ้นเยอะเลยนะ\""
1012205-56 = "หืม?"
1012205-57 = "[ns] \"ดูผ่อนคลายมากกว่าแต่ก่อนเยอะเลย\""
1012205-58 = "ว้าว~ ฉันดูเป็นอย่างนั้นเหรอ?"
1012205-59 = "เพราะรู้สึกสบายใจขึ้น...?"
1012205-60 = "หรือเปล่านะ? ฮืม..."
1012205-61 = "หรือเพราะรู้สึก... มีอิสระแล้ว...?"
1012205-62 = "..."
1012205-66 = "[ns] \"มิกะ...?\""
1012205-67 = "อืม อืมม"
1012205-68 = "ก็ที่ผ่านมาเกิดเรื่องเยอะแยะเลยนี่เนอะ!"
1012205-69 = "อื้อๆ ใช่แล้วละ เกิดเรื่องนู้นเรื่องนี้มากมายเลย"
1012205-70 = "..."
1012205-74 = "คุณครู เราไปทางโน้นกันมั้ย? ตรงนี้ฉันหาเปลือกหอยจนทั่วแล้วละ!"

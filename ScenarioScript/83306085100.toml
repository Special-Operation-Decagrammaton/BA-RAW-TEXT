83306085100-5 = "3;마코토;01\n#3;a\n#wait;1000"
83306085100-6 = "3;마코토;00;소라사키 히나. 거기 멈춰라."
83306085100-7 = "3;히나;02;무슨 일이지?\n#3;em;[?]\n#3;a"
83306085100-8 = "3;마코토;02;무슨 일이냐니. 지금 이 만마전 텐트 내에서 벌어지고 있는 비극에 대해, 전혀 모르고 있단 말이냐?"
83306085100-9 = "3;히나;13;………하아.\n#3;stiff"
83306085100-10 = "3;마코토;05;아니! 그렇게 단숨에 또 귀찮다는 표정을 짓다니! 선도부원으로서 자각이 너무 없는 거 아니느냐! 네놈!\n#3;em;[스팀]\n#3;hophop"
83306085100-11 = "3;마코토;05;현재 이곳 임시 텐트 내에선 무려 <푸딩 실종 사건>이라는 엄청난 사건이 발생 중이란 말이다!"
83306085100-12 = "3;히나;14;푸딩 실종…… 뭐?\n#3;em;[…]"
83306085100-13 = "3;마코토;05;<푸딩 대규모 실종 미스터리 대사건> 말이다!\n#3;closeup\n#fontsize;80"
83306085100-14 = "3;히나;04;……바로 그사이에, 이름이 바뀌었어……\n#3;em;[땀]\n#fontsize;50"
83306085100-15 = "3;마코토;04;우리 만마전에서 후식으로 배급하려고 모아둔 푸딩이 어째서인지 보이지 않는 상황이다."
83306085100-16 = "3;마코토;06;분명…… 범인은, 우리 만마전이 푸딩을 먹지 못하여 슬퍼하는 모습을……\n#3;em;[…]"
83306085100-17 = "3;마코토;05;그것도 특히나…… 푸딩을 좋아하는 이부키가 엉엉 우는 모습을 보고 싶다는 무시무시한 생각으로 범죄를 저지른 게 분명해!"
83306085100-18 = "3;마코토;05;이 천하의 다시 없을 끔찍한 범죄를 사전에 막기 위해서라도! 너희 선도부가 나서야 할 때가 아니냔 말이다!\n#3;em;[!]\n#3;jump"
83306085100-19 = "3;히나;99;……정말로 범죄가 일어나고 있는 거라면 말이야."
83306085100-20 = "3;히나;01;그래. 우선 주변을 조사해 보겠어."
83306085100-21 = "#wait;100"

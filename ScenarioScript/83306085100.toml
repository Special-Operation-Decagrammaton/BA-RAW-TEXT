[translation]
83306085100-6 = "Sorasaki Hina. Cease your meddling."
83306085100-7 = "What's the matter?"
83306085100-8 = "What's the matter? Do you have no notion of the tragedy occurring in the Pandemonium Society tent as we speak?"
83306085100-9 = "...*sigh*"
83306085100-10 = "And now you dare to allow annoyance to show on your face, even though you're neglecting your duties as the head prefect of the Prefect Team!"
83306085100-11 = "The situation in our temporary shelter is critical right now! We need you to solve the Case of the Missing Pudding!"
83306085100-12 = "Missing...pudding?"
83306085100-13 = "The Legendary Case of the Missing Pudding: A Scandal in Gehenna! Hop to it!"
83306085100-14 = "...I see it's also the legendary case of ridiculous name changes..."
83306085100-15 = "Some wicked influence has prevented the pudding that the Pandemonium Society intended to enjoy for dessert from reaching us!"
83306085100-16 = "I'm certain it's a saboteur...some villain determined to strike at the Pandemonium Society in our moment of weakness, hoping the sadness of missing out on pudding will consume us..."
83306085100-17 = "I know that the ultimate aim of this vile fiend is to bring Ibuki, who adores pudding, to tears of despair!"
83306085100-18 = "It's time for the Prefect Team to do its duty for once! It's your responsibility to prevent horrifying crimes like this from happening!"
83306085100-19 = "...I'm happy to investigate actual misconduct."
83306085100-20 = "But fine. I'll investigate the...scene of the crime."

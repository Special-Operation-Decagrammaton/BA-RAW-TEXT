[translation]
83306085100-6 = "โซระซากิ ฮินะ หยุดอยู่ตรงนั้นเลยนะ"
83306085100-7 = "มีเรื่องอะไร?"
83306085100-8 = "มีเรื่องอะไรงั้นเหรอ? นี่เธอไม่รู้เรื่องโศกนาฏกรรมที่เกิดขึ้นในเต็นท์ของแพนเดโมเนียม โซไซตี้เลย#nหรือไง?"
83306085100-9 = "เฮ้อ..."
83306085100-10 = "หน็อย! ทำหน้าเบื่อหน่ายแบบนี้หมายความว่ายังไง! เธอไม่มีจิตสำนึกในฐานะของคณะกรรมการวินัย#nเลยเรอะ!"
83306085100-11 = "ตอนนี้กำลังมี <คดีพุดดิ้งอันตรธาน> ในเต็นท์ชั่วคราวของเรานะ!"
83306085100-12 = "คดีพุดดิ้ง... อะไรนะ?"
83306085100-13 = "<คดีลึกลับพุดดิ้งอันตรธานครั้งใหญ่> น่ะสิ!"
83306085100-14 = "เมื่อกี้ไม่ได้ชื่อยาวขนาดนี้สักหน่อย..."
83306085100-15 = "ตอนนี้พุดดิ้งที่เราจะแจกเป็นของว่างให้แพนเดโมเนียม โซไซตี้หายไปโดยไม่รู้สาเหตุ"
83306085100-16 = "คนร้ายต้องเป็น... คนที่อยากเห็นแพนเดโมเนียม โซไซตี้ต้องเสียใจที่ไม่ได้กินพุดดิ้ง..."
83306085100-17 = "โดยเฉพาะอย่างยิ่งคนที่อยากเห็นอิบูกิที่ชอบกินพุดดิ้งต้องร้องไห้ขี้มูกโป่ง! คนร้ายต้องเป็นคนที่มี#nความคิดน่ากลัวแบบนี้แน่นอน!"
83306085100-18 = "เพื่อป้องกันไม่ให้เกิดอาชญากรรมที่น่ากลัวนี้อีกในอนาคต! คณะกรรมการวินัยของพวกเธอต้องทำ#nอะไรสักอย่าง!"
83306085100-19 = "ถ้ามีอาชญากรรมเกิดขึ้นจริงๆ น่ะนะ..."
83306085100-20 = "ก็ได้ ฉันจะไปตรวจสอบแถวๆ นี้ดูก่อน"

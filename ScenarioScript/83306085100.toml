[translation]
83306085100-6 = "空崎陽奈。站住。"
83306085100-7 = "有什麼事嗎？"
83306085100-8 = "居然問我有什麼事？#n你對萬魔殿帳篷裡發生的悲劇完全不清楚嗎？"
83306085100-9 = "…………唉。"
83306085100-10 = "怎麼能馬上露出厭煩的表情！#n你身為風紀委員的自覺跑哪去了！"
83306085100-11 = "現在這個臨時帳篷裡，可是發生了名為「布丁失蹤事件」的驚人事件啊！"
83306085100-12 = "布丁失蹤……什麼？"
83306085100-13 = "「布丁大規模失蹤神秘事件」！"
83306085100-14 = "……名稱才剛說完又變了……"
83306085100-15 = "我們萬魔殿打算配給的甜點布丁，不知道為什麼全都消失不見了。"
83306085100-16 = "犯人……一定是想看見我們吃不到布丁的悲傷表情……"
83306085100-17 = "抱持著「想看見喜歡布丁的伊吹哭泣的樣子」這種可怕的犯罪動機沒錯！"
83306085100-18 = "為了防止這個世界再次發生如此恐怖的犯罪，你們風紀委員會是不是該挺身而出了？"
83306085100-19 = "……前提是這真的是犯罪行為。"
83306085100-20 = "唉，先調查一下周圍吧。"

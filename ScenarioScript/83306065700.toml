[translation]
83306065700-6 = "มีแมวอยู่อย่างที่คนอื่นว่าจริงด้วย"
83306065700-7 = "คงจะหิวแล้วตามกลิ่นอาหารของชมรมโภชนาการมาถึงที่นี่สินะ"
83306065700-8 = "รุ่นพี่ฟูกะ... เรื่องแมวน่ะ ถ้าอย่างนั้น..."
83306065700-9 = "จูริ ไม่ต้องทำหน้าแบบนั้นหรอก น้องแมวอุตส่าห์ตามกลิ่นอาหารของชมรมโภชนาการมาเลยนะ เราจะปล่อยน้องไว้เฉยๆ ไม่ได้อยู่แล้ว"
83306065700-10 = "ฉันจะออกไปดูให้เองว่ามีใครอยากดูแลน้องแมวให้มั้ย"
83306065700-11 = "ถึงจะเป็นแขกที่แปลกหน้า แต่บางครั้งเราก็ต้องเจอเรื่องแบบนี้บ้างละเนอะ"
83306065700-12 = "รุ่นพี่ฟูกะ... ได้ค่ะ! ระหว่างนั้นฉันจะดูแลน้องให้เองค่ะ!"
83306065700-13 = "อืม ค่อยยังชั่วนะ"

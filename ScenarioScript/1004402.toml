[translation]
1004402-1 = "วันดีๆ แบบวันนี้"
1004402-2 = "(เมื่อมาถึงล็อบบี้ คุณครูก็พบโนโนมิที่ยืนโบกมือรออยู่)"
1004402-7 = "อ๊ะ คุณครู! ทางนี้ค่ะ ทางนี้!"
1004402-8 = "ฉันกำลังรออยู่เลยค่ะ~"
1004402-9 = "[s1] \"โนโนมิ...? นั่นกระเป๋าอะไรน่ะ...\"\n[s2] \"ทำไมเอาของมาเยอะจัง?\""
1004402-12 = "อ๊ะ นี่เหรอคะ?"
1004402-13 = "ฮิฮิ ไม่มีอะไรมากหรอกค่ะ..."
1004402-14 = "ถ้าจะมองหาที่นั่งเหมาะๆ จริงๆ ละก็ เราก็ควรจะต้องไปลองนั่งดูจริงๆ ใช่มั้ยล่ะคะ?"
1004402-15 = "ฉันก็เลยขนบางอย่างมาด้วยน่ะค่ะ"
1004402-19 = "มีร่มกันแดด เสื่อปูพื้น แล้วก็ของกินกับเก้าอี้..."
1004402-23 = "อ๋อ ฉันเตรียมน้ำผลไม้มาด้วยนะคะ!"
1004402-24 = "มีทั้งน้ำส้ม น้ำแอปเปิล น้ำองุ่นก็มีเหมือนกันค่ะ"
1004402-25 = "คะ? คุณครูจะช่วยถือเพราะของเยอะเหรอคะ?"
1004402-26 = "ฮิฮิ คิดแล้วเชียวว่าถ้าเป็นคุณครูก็คงจะพูดแบบนี้ค่ะ"
1004402-27 = "แต่ไม่เป็นไรค่ะ!"
1004402-28 = "ฉันรู้สึกขอบคุณที่คุณครูจะช่วยนะคะ แต่ครั้งนี้ฉันเป็นฝ่ายไปขอร้องคุณครูก่อน..."
1004402-34 = "อีกอย่าง ฉันแพ็กของมาอย่างดีจนถือไปหมดได้ในครั้งเดียวค่ะ ถ้าเปิดกระเป๋าแยกของ#nมันน่าจะเป็นเรื่องยุ่งยากมากกว่า แค่คุณครูไปด้วยก็ขอบคุณแล้วค่ะ!"
1004402-35 = "[s3] \"ก็นะ... ถ้าโนโนมิพูดแบบนั้นก็คงช่วยไม่ได้นะ\"\n[s4] \"ถ้าหนักก็บอกได้ตลอดเลยนะ ครูจะช่วยถือเอง\""
1004402-39 = "ฮิฮิ เราไปกันเถอะค่ะ~☆"
1004402-46 = "ว้าว... มองไปทางไหนก็วิวสวยทั้งนั้นเลย แบบนี้เลือกยากจังเลยนะคะ!"
1004402-50 = "ตรงนี้ดีมั้ยคะ?"
1004402-51 = "ดูไม่ไกลเกินไป..."
1004402-52 = "ที่นั่งก็กว้างขวาง แถมลมยังพัดเย็นสบายด้วยค่ะ!"
1004402-53 = "ถ้างั้นก่อนอื่นก็เอาของออกมาก่อน..."
1004402-57 = "หืม คุณครู? มีอะไรเหรอคะ?"
1004402-58 = "คะ...?"
1004402-59 = "จู่ๆ ก็อยากดื่มน้ำสับปะรดเหรอคะ? ฉันหยิบให้ได้ค่ะ แต่ขอเอาของออกจากกระเป๋าก่อน..."
1004402-63 = "เอ๋...?"
1004402-67 = "แหะๆ... ขอโทษด้วยค่ะคุณครู ฉันไม่ได้หยิบน้ำสับปะรดมาด้วย คงวางลืมไว้ที่ห้องโถงแน่ๆ เลย..."
1004402-68 = "ช่วยรอสักครู่นะคะ☆"
1004402-69 = "ฉันจะไปหยิบมาให้ค่ะ~"
1004402-73 = "เดี๋ยวฉันมานะคะ~!"
1004402-77 = "[ns5] \"ถ้างั้นเริ่มเอาของออกมาเลยดีมั้ยนะ\"\n[ns6] เริ่มหยิบของออกมาจัด"
1004402-85 = "มาแล้วค่ะ~ คุณครู!"
1004402-86 = "น้ำสับปะรดที่คุณครูอยากได้มาแล้วค่า~!"
1004402-90 = "เอ๋...?"
1004402-91 = "เอ๋... คุณครู...? อะไรกันคะ..."
1004402-92 = "[s7] \"ครูจัดของให้ระหว่างรอโนโนมิน่ะ\"\n[s8] \"จัดได้สวยเลยใช่มั้ยล่ะ?\""
1004402-97 = "อา..."
1004402-98 = "ถ้างั้นน้ำสับปะรดนี่..."
1004402-99 = "อืมมม... แบบนี้เองสินะคะ? ฉันอุตส่าห์บอกว่าไม่เป็นไรแล้วแท้ๆ..."
1004402-100 = "หรือว่าคำพูดของฉันทำให้คุณครูกังวลเหรอคะ... รู้สึกเหมือนสร้างภาระให้คุณครูเลย..."
1004402-101 = "ไม่ใช่อย่างนั้นเหรอคะ?"
1004402-102 = "แต่ว่าคุณครูต้องมาลำบากเพราะฉันอีกแล้ว..."
1004402-106 = "ถึงยังไงการจัดของแบบนี้ก็เป็นงานเหมือนกันนี่คะ ทั้งกางร่มกันแดด ปูเสื่อ ไหนจะต้องเอา#nเก้าอี้ชายหาดมากางอีก..."
1004402-107 = "[s9] \"โนโนมิใส่ใจคนรอบข้างเสมอๆ เลยนะ\"\n[s10] \"เวลาแบบนี้น่ะ ยอมให้ครูดูแลบ้างก็ได้นะ\""
1004402-112 = "คุณครู..."
1004402-113 = "ฮิฮิ..."
1004402-114 = "มันจะไม่เป็นไรจริงๆ เหรอคะ? ที่คุณครูพูดเมื่อกี้ ถือเป็นเรื่องสำคัญมากเลยนะคะ?"
1004402-115 = "เพราะถ้าพูดแบบนั้นบ่อยๆ ฉันอาจจะเผลองอแงใส่คุณครูโดยไม่รู้ตัวก็ได้..."
1004402-116 = "เวลาฉันงอแง อาจจะหนักกว่าที่คุณครูคิดไว้ก็ได้นะคะ"
1004402-117 = "[s11] \"ไม่เป็นไร เต็มที่เลย\"\n[s12] \"แบบนั้นยิ่งดี จัดมาให้เต็มที่เลย!\""
1004402-118 = "ฮิฮิฮิ..."
1004402-119 = "ฮิฮิฮิ..."
1004402-120 = "ตื่นเต้นจังเลยค่ะ"
1004402-121 = "อืม..."
1004402-122 = "แต่ว่าวันนี้พอเท่านี้ก่อนเถอะค่ะ"
1004402-123 = "ที่คุณครูพูดมา ฉันซาบซึ้งใจมากเลย..."
1004402-124 = "แต่ฉันไม่อยากเอาเปรียบคนสำคัญของฉันน่ะค่ะ เอาไว้ถ้าจำเป็นจริงๆ ฉันจะขอให้คุณครู#nช่วยนะคะ"
1004402-125 = "และพอถึงตอนนั้น..."
1004402-131 = "ถ้าฉันงอแงใส่ คุณครูก็ห้ามปฏิเสธนะคะ"

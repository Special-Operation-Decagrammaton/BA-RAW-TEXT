[translation]
1004402-1 = "Sometimes on Days Like These"
1004402-2 = "I arrived at the lobby, and Nonomi waved at me."
1004402-7 = "Sensei, here. Over here!"
1004402-8 = "I've been waiting for you!"
1004402-9 = "[s1] \"Nonomi...? What are all these bags?\"\n[s2] \"Why did you pack so much?\""
1004402-12 = "Oh, these?"
1004402-13 = "Heehee. Well..."
1004402-14 = "To know if the location is really suitable, I'll have to stay there a while, you know?"
1004402-15 = "So, I just packed a few things."
1004402-19 = "A parasol, mat, snacks, chair..."
1004402-23 = "And different flavors of juice!"
1004402-24 = "I have three kinds: orange juice, apple juice, and grape juice..."
1004402-25 = "Huh? You wanna help me because it's heavy?"
1004402-26 = "Heehee. I had a feeling you would say that!"
1004402-27 = "But it's okay!"
1004402-28 = "I appreciate it, but you're already doing me a favor."
1004402-34 = "And I packed it so I can carry all of it by myself. I don't want to change the arrangement. I'm just thankful that you're coming with me!"
1004402-35 = "[s3] \"Well, if you insist...\"\n[s4] \"Let me know if it gets too heavy. I'll help you.\""
1004402-39 = "Yes, sir! Now, let's go! ☆"
1004402-46 = "Wow... Everywhere we go is so gorgeous! I don't know how I'll choose!"
1004402-50 = "What do you think of here?"
1004402-51 = "It's not too far..."
1004402-52 = "It's big, and the breeze feels nice!"
1004402-53 = "First, let's unpack..."
1004402-57 = "Hmm? Sensei! What is it?"
1004402-58 = "...?"
1004402-59 = "You want to drink pineapple juice? I'll unpack and grab it..."
1004402-63 = "Huh?"
1004402-67 = "Ahahaha... I'm sorry, Sensei. I didn't bring pineapple juice. But I think there's some in the hall..."
1004402-68 = "Please wait a moment! ☆"
1004402-69 = "I'll go get you some!"
1004402-73 = "I'll be right back!"
1004402-77 = "[ns5] \"...Let's start then.\"\n[ns6] Start to unpack."
1004402-85 = "I'm back, Sensei!"
1004402-86 = "Here's your pineapple juice!"
1004402-90 = "Huh?"
1004402-91 = "Sensei! What did you do?"
1004402-92 = "[s7] \"I set it up while I was waiting for you.\"\n[s8] \"Not bad, huh?\""
1004402-97 = "...Aha."
1004402-98 = "That's why you asked for pineapple juice..."
1004402-99 = "Hmm, I told you not to worry about it."
1004402-100 = "I guess this is your nature...but I was hoping to spoil you today."
1004402-101 = "It doesn't matter?"
1004402-102 = "But you did all this because of me..."
1004402-106 = "Wasn't it a lot of work? Spreading the mat, putting up the parasol, unfolding chairs..."
1004402-107 = "[s9] \"I did it for you, not because of you, Nonomi.\"\n[s10] \"You're always helping everyone else. You deserve it.\""
1004402-112 = "Sensei..."
1004402-113 = "...Heehee."
1004402-114 = "Are you sure you won't regret saying that?"
1004402-115 = "If you treat me like that, I might get used to being babied by you."
1004402-116 = "It might become burdensome, you know?"
1004402-117 = "[s11] \"Of course I'm sure.\"\n[s12] \"That's what I've been waiting for! Bring it on!\""
1004402-118 = "Heeheehee..."
1004402-119 = "Heeheehee..."
1004402-120 = "I'm so excited."
1004402-121 = "Yup, yup!"
1004402-122 = "But that's enough for today."
1004402-123 = "I'm so grateful for your words..."
1004402-124 = "But I don't want to take advantage of someone precious to me. Maybe when I really need help, I'll ask you."
1004402-125 = "When that time comes..."
1004402-131 = "...please don't turn me down, okay?"

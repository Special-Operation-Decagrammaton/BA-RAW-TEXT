[translation]
1004402-1 = "偶爾這種日子也"
1004402-2 = "（野乃美在大廳前揮著手等著）"
1004402-7 = "啊，老師！這裡～！"
1004402-8 = "在等你哦～"
1004402-9 = "[s1] 「那個行李是……？」\n[s2] 「裝了什麼？」"
1004402-12 = "啊，這個嗎～？"
1004402-13 = "並不是什麼大不了的東西……"
1004402-14 = "我認為不實際體驗看看的話，就沒辦法知道調查的地方是不是最適合野餐的地方……"
1004402-15 = "所以帶了一點東西過來！"
1004402-19 = "遮陽傘、野餐墊、三明治……"
1004402-23 = "還有很多種果汁唷～"
1004402-24 = "有柳橙汁、蘋果汁，葡萄汁三種……"
1004402-25 = "……咦？要幫我一起拿行李嗎？"
1004402-26 = "呵呵，我就知道老師會那麼說。"
1004402-27 = "不過沒關係！"
1004402-28 = "雖然很感謝你的好意，不過是我邀請你的……"
1004402-34 = "而且為了能一個人拿，我全都裝在一起了……！#n只要能和我一起去就很高興了☆"
1004402-35 = "[s3] 「……既然你都這麼說了。」\n[s4] 「要是覺得重的話跟我說哦，隨時都可以幫忙拿。」"
1004402-39 = "呵呵，那就出發～☆"
1004402-46 = "哇……不管哪裡景色都很好呢，真讓人煩惱☆"
1004402-50 = "……這邊比較好嗎？"
1004402-51 = "離渡假村不怎麼遠，位置也很寬敞……"
1004402-52 = "通風也很好！"
1004402-53 = "那麼先把行李放下來……"
1004402-57 = "……老師，請問怎麼了呢？"
1004402-58 = "……嗯？"
1004402-59 = "突然想喝鳳梨汁是嗎？#n我確認一下行李唷……"
1004402-63 = "……咦？"
1004402-67 = "不好意思，似乎沒有帶鳳梨汁來……"
1004402-68 = "我想大廳應該會有……"
1004402-69 = "請稍等一下☆我馬上拿來唷～"
1004402-73 = "我去去就回～！"
1004402-77 = "[ns5] 「……好，開始吧。」\n[ns6] 開始解開行李"
1004402-85 = "我回來了～！"
1004402-86 = "您點的鳳梨汁久等……"
1004402-90 = "……咦？"
1004402-91 = "……老師，這究竟是……"
1004402-92 = "[s7] 「歡迎回來，野乃美」\n[s8] 「等你回來的期間做好準備了唷。」"
1004402-97 = "……原來如此，是那麼回事啊。"
1004402-98 = "難道說，這個鳳梨汁也……"
1004402-99 = "是為了顧慮我嗎……？"
1004402-100 = "老師真是的！就說沒關係了……非常感謝你。"
1004402-101 = "想說可以和老師一起就好了……"
1004402-102 = "反而給你添麻煩了呢。"
1004402-106 = "準備很辛苦吧？"
1004402-107 = "[s9] 「因為野乃美平時很照顧大家。」\n[s10] 「所以我認為至少這種時候，可以對我撒嬌。」"
1004402-112 = "老師……"
1004402-113 = "……呵呵。"
1004402-114 = "老師啊，說那種話可以嗎～？"
1004402-115 = "我，真的會對你撒嬌唷？"
1004402-116 = "就算後悔也太遲了唷？"
1004402-117 = "[s11] 「當然，沒關係唷。」\n[s12] 「被依賴是我的夙願唷。過來吧！」"
1004402-118 = "呵呵……"
1004402-119 = "呵呵……"
1004402-120 = "真讓人開心又期待呢☆要拜託什麼好呢～"
1004402-121 = "……"
1004402-122 = "不過，今天就到此為止。"
1004402-123 = "雖然非常感激老師……"
1004402-124 = "不過輕易用掉可以對老師撒嬌的機會就太浪費了……#n還是留到更重要的時刻再使用吧。"
1004402-125 = "所以到時候……"
1004402-131 = "可不能拒絕唷，知道了嗎？"

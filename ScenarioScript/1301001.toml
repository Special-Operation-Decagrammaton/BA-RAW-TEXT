[translation]
1301001-1 = "有計劃的消費"
1301001-2 = "夏萊．辦公室"
1301001-3 = "你好，老師。我帶了上次說的帳單格式。請在方便的時候確認。"
1301001-4 = "啊，正好在吃飯啊。不好意思，打擾了。"
1301001-5 = "[s] 「不會，不用介意。」"
1301001-6 = "那麼，在老師吃飯的時候，我去收拾一下桌子。"
1301001-9 = "話說……老師，你午餐只吃那個熱狗麵包嗎？"
1301001-10 = "恕我冒昧……但我覺得還是吃點有營養的食物比較好吧？"
1301001-11 = "只吃麵包的話，身體會承受不住的。"
1301001-12 = "……哎？帳戶裡沒剩多少錢，到月底前都沒辦法在餐費上花太多錢……？"
1301001-13 = "沒想到夏萊的老師是這麼低薪的工作……真是意外。"
1301001-16 = "啊咧，這張發票……是位於奇普托斯中央的知名玩具店吧？"
1301001-17 = "購買日期是上週，買的東西是……「限定版．變身機器人」，10萬元！？"
1301001-18 = "老師！這張發票是怎麼回事！？ #n有了這些錢，一個月的餐費不就綽綽有餘了嗎！"
1301001-19 = "為了玩具而不吃飯，真是荒謬！"
1301001-20 = "[s1] 「不是僅僅是玩具！是生活必需品！」\n[s2] 「能買這個機器人，吃飯算不了什麼！」"
1301001-21 = "不行！要有計畫的消費！"
1301001-22 = "不行！要有計畫的消費！"
1301001-24 = "這樣下去不行……我要親眼確認老師的收支紀錄！ #n記帳本在哪裡？"
1301001-25 = "……哎？老師沒有記帳本嗎？"
1301001-26 = "所以才會有這種衝動性消費啊！"
1301001-28 = "……老師，我也會幫忙的，請把上個月的發票收集起來。"
1301001-29 = "現在開始整理發票，檢查老師的消費！"
1301001-32 = "― 真是的……既然是大人，就請像大人一樣有計畫地消費。[wa:5100] "
1301001-35 = "― 已經不是拿到零用錢就一口氣花掉的小孩子了唷？[wa:2360] "
1301001-38 = "― 而且，會像這樣幫忙整理發票的，只有我而已……[wa:5860] "
1301001-40 = "― 下次，我絕對不會幫忙的唷！[wa:1940] "
1301001-43 = "― 15天前在便利商店買的雞肉三明治，500元……[wa:4320] "
1301001-45 = "― 購買新刊漫畫，450元…[wa:2240] "
1301001-48 = "― 嗯……？前天晚上， 「軟綿綿俱樂部」，2萬元……？[wa:4660] "
1301001-51 = "― 老，老師！這到底是什麼，這發票！[wa:1820] "
1301001-53 = "― 應當成為學生們模範的教育者，竟然，去這種可疑的店……！[wa:5360] "
1301001-56 = "― 不敢相信！太差勁了！[wa:1480] "
1301001-59 = "― 耶，是名叫「軟綿綿俱樂部」的手機遊戲的轉蛋……？[wa:3240] "
1301001-61 = "― ……呼。我還以為，一定是那個……[wa:2900] "
1301001-64 = "― 不對不對！就算這樣，一次花2萬元也太多了！[wa:2740] "
1301001-67 = "― 禁止衝動購物！消費要好好地計畫！[wa:3660] "
1301001-70 = "喏，請看。除了那個變身機器人以外，能節約的金額應該也有5萬元以上吧？"
1301001-71 = "今後請記在記帳本，購買時頻繁地確認。這樣的話，就不會再像今天這樣只吃麵包了。"
1301001-72 = "然後，以後要買5000元以上的東西的時候，請和我商量！"
1301001-73 = "[s] 「每次買東西的時候，都要和優香商量……？」"
1301001-74 = "因為……為了改正老師的壞習慣……必須像這樣看管好……"
1301001-75 = "總之！這是為了老師好，請絕對要遵守！"
1301001-77 = "（在這之後，優香嘮叨了一會兒就回去了）"

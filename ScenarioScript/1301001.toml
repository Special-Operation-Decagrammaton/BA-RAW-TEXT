[translation]
1301001-1 = "Responsible Spending"
1301001-2 = "Schale Sensei's Executive Office"
1301001-3 = "Hello, Sensei. I brought the invoice that I mentioned in my message. Please review it when you have time."
1301001-4 = "Oh! You were eating. I'm so sorry to bother you."
1301001-5 = "[s] \"It's okay. Don't worry about it.\""
1301001-6 = "Then let me tidy your desk while you eat."
1301001-9 = "Sensei...is bread all you're having for lunch?"
1301001-10 = "Sorry if this too forward...but shouldn't you be eating something more nutritious?"
1301001-11 = "A diet of exclusively bread can't be good for your health."
1301001-12 = "What?! You're out of money and won't be able to afford meals until the end of the month?"
1301001-13 = "I had no idea Schale's faculty were paid so little... I'm shocked."
1301001-16 = "Wait a moment. Isn't this receipt from that famous toy store in central Kivotos?"
1301001-17 = "It's from last week, and you spent...100,000 yen on limited edition transforming robot toys?!"
1301001-18 = "Sensei! Explain this receipt! This is a month's worth of food!"
1301001-19 = "You gave up meals for childish toys? You must be out of your mind!"
1301001-20 = "[s1] \"They're not just toys! I NEED them!\"\n[s2] \"I don't need food so long as I have these robots!\""
1301001-21 = "Nonsense! You need to start spending more wisely!"
1301001-22 = "Nonsense! You need to start spending more wisely!"
1301001-24 = "I've had enough. I'm going to start reviewing your expenses myself! Where do you keep your checkbook?"
1301001-25 = "What? You don't keep a checkbook?"
1301001-26 = "That's why you spend so impulsively!"
1301001-28 = "Sensei, gather all your receipts from the past month."
1301001-29 = "From now on, I'll be your bookkeeper and the one monitoring your expenses."
1301001-32 = "― Seriously... If you're an adult, you should know better than to make impulsive purchases.[wa:2540] "
1301001-35 = "― You're not like those kids who spend all their pocket money as soon as they get it, are you?[wa:10] "
1301001-38 = "― On top of that, I'm the only one who helps you sort your receipts like this...[wa:3620] "
1301001-40 = "― If you keep this up, I'm not going to help anymore![wa:420] "
1301001-43 = "― Convenience store chicken sandwich two weeks ago...500 yen.[wa:2880] "
1301001-45 = "― New manga volume...450 yen.[wa:1640] "
1301001-48 = "― Huh? You spent 20,000 yen at Club Smoochie the other night?[wa:3300] "
1301001-51 = "― S-Sensei! Is this receipt what I think it is?![wa:620] "
1301001-53 = "― You're a teacher! You're supposed to set an example for your students! How could you...?[wa:2920] "
1301001-56 = "― Despicable! You're the absolute worst![wa:360] "
1301001-59 = "― Huh? Club Smoochie is the name of a gacha game?[wa:2320] "
1301001-61 = "― Geez. I thought you were visiting a...[wa:2020] "
1301001-64 = "― Wait a minute! That doesn't excuse you blowing 20,000 yen in a night![wa:820] "
1301001-67 = "― No more impulse purchases! You need to budget![wa:2460] "
1301001-70 = "Look here. Putting aside the transforming robot, you could have saved 50,000 yen!"
1301001-71 = "If you start keeping tabs on your expenses from time to time, you won't have to live off of plain bread anymore."
1301001-72 = "Anytime you want to buy something that costs over 5,000 yen, you have to consult with me first!"
1301001-73 = "[s] \"But why should I have to report my expenses to you?\""
1301001-74 = "Well, I... If I want to take care of you, then I have to stay on top of your spending habits..."
1301001-75 = "Anyway! It's for your own good, so please just do it!"
1301001-77 = "Yuuka continued to nag me for a while before leaving."

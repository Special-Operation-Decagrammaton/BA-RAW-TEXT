[translation]
1301001-1 = "#title;소비는 계획적으로"
1301001-2 = "#place;샬레 선생님 집무실"
1301001-3 = "3;유우카;01;안녕하세요, 선생님. 전에 메일로 말씀드렸던 청구서 양식을 가져왔습니다. 나중에 시간 나실 때 검토 부탁 드릴게요.\n#3;greeting\n#3;em;[반응]\n#3;a"
1301001-4 = "3;유우카;02;어머, 마침 식사중이셨군요. 방해해서 죄송해요."
1301001-5 = "[s] \"아냐. 신경 쓰지 않아도 괜찮아.\""
1301001-6 = "3;유우카;01;그럼 저는 선생님께서 식사를 하시는 동안 책상을 정리하고 있을게요."
1301001-7 = "3;유우카;01\n#3;m5\n#wait;1500"
1301001-8 = "3;유우카;99\n#3;em;…\n#wait;2500"
1301001-9 = "3;유우카;05;그런데…… 선생님, 혹시 점심 식사가 그 쿠페빵 한 조각 뿐인가요?\n#3;em;[반응]"
1301001-10 = "3;유우카;99;주제넘는 말일지도 모르겠지만…… 좀 더 영양가 있는 음식을 먹는 편이 좋지 않을까요?"
1301001-11 = "3;유우카;05;식사로 맨빵만 드셨다가는 건강을 해칠 수도 있다고요."
1301001-12 = "3;유우카;06;네에? 통장의 잔고가 부족해서 월말까지 식비로 쓸 돈도 모자라다고요?\n#3;shake\n#3;em;[?!]"
1301001-13 = "3;유우카;01;샬레의 선생님이 받는 월급이 그렇게 부족할 줄은 몰랐는데…… 의외네요."
1301001-14 = "3;유우카;02\n#3;em;[반응]\n#wait;1500"
1301001-15 = "3;유우카;01\n#3;greeting\n#wait;1500"
1301001-16 = "3;유우카;02;어라? 이 영수증은…… 키보토스 중앙구에 있는 유명 장난감 가게의 영수증이잖아요?"
1301001-17 = "3;유우카;06;구입 날짜는 저번주로 되어 있고, 구입한 물건은…… 한정판 변신 로봇 10만 엔 어치?!\n#3;shake\n#3;em;[?!]"
1301001-18 = "3;유우카;05;선—생—님! 이 영수증은 도대체 뭔가요? #n이 돈이 있었으면 한 달 식비는 충분했잖아요!\n#3;hophop\n#3;m3"
1301001-19 = "3;유우카;05;고작 장난감 따위를 사느라 끼니를 거른다니, 언어도단이에요!\n#3;em;[빠직]\n#3;stiff"
1301001-20 = "[s1] \"고작 장난감이 아니야! 생필품이다!\"\n[s2] \"이 로봇을 살 수 있다면 식비 정도는 아깝지 않아!\""
1301001-21 = "3;유우카;05;그래도 안 돼요! 계획적인 소비는 중요하다고요!\n#3;hophop"
1301001-22 = "3;유우카;05;그래도 안 돼요! 계획적인 소비는 중요하다고요!\n#3;hophop"
1301001-23 = "3;유우카;05\n#3;jump\n#wait;300"
1301001-24 = "3;유우카;05;안 되겠어요. 선생님의 지출 기록을 제 눈으로 직접 확인해야겠어요! #n가계부는 어디에 있죠?\n#3;jump\n#3;closeup"
1301001-25 = "3;유우카;06;네? 선생님은 가계부를 쓰지 않으신다고요?\n#3;shake\n#3;em;[?!]\n#3;closeup"
1301001-26 = "3;유우카;05;그러니까 이렇게 충동적인 소비를 하시는 거 잖아요!\n#3;em;[빠직]\n#3;closeup"
1301001-27 = "3;유우카;99\n#3;em;…\n#3;closeup\n#wait;2500"
1301001-28 = "3;유우카;01;선생님, 지난 한 달 간의 영수증을 모두 모아주세요.\n#3;closeup"
1301001-29 = "3;유우카;05;지금부터 영수증을 정리하며 선생님의 소비 습관을 검사하겠어요!\n#3;closeup\n#3;em;[!]"
1301001-30 = "#all;hide"
1301001-31 = "#wait;9000"
1301001-32 = "#st;[-1200,-530];serial;60;[wa:1200]― 정말이지…… [wa:1200]어른이면 [wa:1000]어른답게 [wa:1300]제대로 계획적인 소비를 해주세요."
1301001-33 = "#wait;3000"
1301001-34 = "#clearST"
1301001-35 = "#st;[-1200,-530];serial;60;― 용돈을 받아서 [wa:1000]흥청망청 써버리는 [wa:1000]어린 아이도 아니잖아요?"
1301001-36 = "#wait;4500"
1301001-37 = "#clearST"
1301001-38 = "#st;[-1200,-530];serial;60;[wa:1000]― 게다가 이렇게 [wa:300]영수증 정리를 도와드리는 건 [wa:4000]저 밖에 없으니까……."
1301001-39 = "#wait;3000"
1301001-40 = "#st;[-1200,-630];serial;60;― 다음 번에는 [wa:1500]절대로 도와드리지 않을테니까요!"
1301001-41 = "#wait;5500"
1301001-42 = "#clearST"
1301001-43 = "#st;[-1200,-530];serial;60;[wa:1000]― 보름 전 [wa:1500]편의점에서 구매한 [wa:1500]치킨 샌드위치가 500엔……."
1301001-44 = "#wait;2500"
1301001-45 = "#st;[-1200,-630];serial;60;― 신간 만화책 구입에 [wa:2000]450엔……."
1301001-46 = "#wait;2500"
1301001-47 = "#clearST"
1301001-48 = "#st;[-1200,-530];serial;60;― 으응……? [wa:1500]그제 밤 [wa:1500]<클럽 말랑말랑>에서 [wa:1500]2만엔……?"
1301001-49 = "#wait;4500"
1301001-50 = "#clearST"
1301001-51 = "#st;[-1200,-530];serial;60;― 서, [wa:700]선생님! [wa:800]도대체 뭔가요, 이 영수증은!"
1301001-52 = "#wait;3200"
1301001-53 = "#st;[-1200,-630];serial;60;― 타의 모범이 되어야 할 교육자가 [wa:2500]이런 [wa:2500]저질스러운 곳에 가시다니……"
1301001-54 = "#wait;3800"
1301001-55 = "#clearST"
1301001-56 = "#st;[-1200,-530];serial;60;― 믿을 수가 없어요! [wa:1200]최악이에요!"
1301001-57 = "#wait;4000"
1301001-58 = "#clearST"
1301001-59 = "#st;[-1200,-530];serial;60;― 아, [wa:1000]<클럽 말랑말랑>이라는 이름의 [wa:2000]가챠 게임이라고요?"
1301001-60 = "#wait;2500"
1301001-61 = "#st;[-1200,-630];serial;60;― 어휴. [wa:1500]저는 [wa:1600]또……."
1301001-62 = "#wait;3500"
1301001-63 = "#clearST"
1301001-64 = "#st;[-1200,-530];serial;60;― 아니. [wa:1500]그렇다 하더라도 [wa:800]한 번에 2만엔은 너무 심하잖아요!"
1301001-65 = "#wait;3200"
1301001-66 = "#clearST"
1301001-67 = "#st;[-1200,-530];serial;60;[wa:300]― 충동 구매는 금지! [wa:1700]앞으로 소비는 [wa:1100]계획적으로 해주세요!"
1301001-68 = "#wait;5500"
1301001-69 = "#clearST\n3;유우카;05"
1301001-70 = "3;유우카;05;자, 보세요. 그 변신 로봇을 제외하고도 아낄 수 있었던 비용이 5만엔이 넘어가잖아요?\n#3;em;[반응]"
1301001-71 = "3;유우카;99;앞으로 가계부를 쓰면서 남은 돈을 틈틈이 확인하며 물건을 구입한다면 이번처럼 쿠페빵만으로 식사를 때우는 일은 없을 거예요."
1301001-72 = "3;유우카;05;그러니 앞으로 5000엔이 넘어가는 물건을 살 때는 꼭 저와 상의하셔야 해요!\n#3;jump\n#3;em;[!]"
1301001-73 = "[s] \"그런데 어째서 유우카에게 내 소비를 일일히 보고해야 하는 거야?\""
1301001-74 = "3;유우카;04;그, 그건…… 글러먹은 선생님의 습관을 바로잡기 위해서는…… 옆에서 계속 챙겨주는 수밖에 없으니까……\n#3;em;[///]\n#3;stiff"
1301001-75 = "3;유우카;05;여하튼! 선생님을 위한 일이니까, 꼭 지켜주세요!\n#3;hophop"
1301001-76 = "#all;hide"
1301001-77 = "#na;이후 유우카는 한동안 잔소리를 늘어놓은 다음 돌아갔다."

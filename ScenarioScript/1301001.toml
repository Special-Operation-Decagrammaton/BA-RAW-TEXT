[translation]
1301001-1 = "วางแผนการใช้จ่าย"
1301001-2 = "ห้องทำงานคุณครู สำนักงานชาเล่ต์"
1301001-3 = "สวัสดีค่ะคุณครู ฉันนำเอกสารใบแจ้งหนี้ที่แจ้งมาทางอีเมลมาส่งค่ะ ถ้ามีเวลารบกวนช่วยตรวจดู#nด้วยนะคะ"
1301001-4 = "อ๊ะ กำลังรับประทานอาหารอยู่เหรอคะ ขอโทษที่รบกวนนะคะ"
1301001-5 = "[s] \"ไม่เป็นไร ไม่ต้องขอโทษหรอก\""
1301001-6 = "ถ้างั้นระหว่างที่คุณครูทานอาหาร เดี๋ยวฉันจะจัดโต๊ะให้ก็แล้วกันนะคะ"
1301001-9 = "ว่าแต่...คุณครูทานขนมปังเป็นมื้อกลางวันเหรอคะ?"
1301001-10 = "ขอโทษที่เสียมารยาทนะคะ... แต่คุณครูควรจะรับประทานอะไรที่มีสารอาหารกว่านี้นะคะ"
1301001-11 = "ถ้าทานแค่ขนมปังแบบนี้จะไม่ดีต่อสุขภาพนะคะ"
1301001-12 = "คะ? ตอนนี้กรอบจนไม่มีเงินซื้อข้าวกล่องเลยงั้นเหรอคะ?"
1301001-13 = "ฉันไม่คิดว่าคุณครูของทางชาเล่ต์จะได้รับค่าตอบแทนน้อยขนาดนั้น.... น่าแปลกมากเลยค่ะ"
1301001-16 = "เอ๊ะ? ใบเสร็จอันนี้.... นี่มันใบเสร็จของร้านขายของเล่นชื่อดังเลยนี่คะ?"
1301001-17 = "ใบเสร็จระบุวันที่อาทิตย์ที่แล้ว... สินค้าที่ซื้อ... หุ่นยนต์แปลงร่างรุ่นลิมิเต็ดเอดิชั่นราคาหนึ่งแสนเยน?!"
1301001-18 = "คุณ-ครู-คะ! ใบเสร็จนี่มันอะไรกันคะ? ราคาขนาดนี้พอสำหรับซื้อข้าวกล่องทั้งเดือนเลยนะคะ!"
1301001-19 = "คุณครูเอาเงินค่าอาหารไปซื้อของเล่นไร้สาระงั้นเหรอคะ สติดีอยู่รึเปล่าคะ!"
1301001-20 = "[s1] \"ไม่ใช่ของไร้สาระนะ ของจำเป็นที่สุดในชีวิตต่างหาก!\"\n[s2] \"ขอแค่มีหุ่นยนต์พวกนี้น่ะ ค่าข้าวก็ไม่เสียดายหรอก!\""
1301001-21 = "แบบนั้นไม่ได้นะคะ! การวางแผนค่าใช้จ่ายเป็นเรื่องสำคัญมากนะคะ!"
1301001-22 = "แบบนั้นไม่ได้นะคะ! การวางแผนค่าใช้จ่ายเป็นเรื่องสำคัญมากนะคะ!"
1301001-24 = "ไม่ได้การแล้ว ฉันคงจะต้องตรวจสอบค่าใช้จ่ายทั้งหมดของคุณครูดูหน่อยแล้วค่ะ!#nสมุดบัญชีอยู่ไหนเหรอคะ?"
1301001-25 = "คะ? คุณครูไม่ใช้สมุดบัญชีเหรอคะ?"
1301001-26 = "เพราะแบบนั้นถึงได้ใช้จ่ายสุรุ่ยสุร่ายแบบนี้ยังไงล่ะคะ!"
1301001-28 = "ช่วยรวบรวมใบเสร็จของเดือนที่แล้วมาด้วยค่ะ"
1301001-29 = "ฉันจะจัดการใบเสร็จทั้งหมดและตรวจสอบการใช้เงินของคุณครูให้เองค่ะ"
1301001-32 = "― จริงๆ เชียว... ถ้าเป็นผู้ใหญ่ละก็ ควรวางแผนค่าใช้จ่ายให้สมกับที่เป็นผู้ใหญ่หน่อยสิคะ[wa:2740] "
1301001-35 = "― คุณครูไม่ใช่เด็กๆ ที่เอาค่าขนมไปซื้อของเล่นจนหมด ทันทีที่ได้รับเงินมาสักหน่อยนะคะ?[wa:10] "
1301001-38 = "― นอกจากนี้ คนที่จะช่วยคุณครูจัดการเรื่องใบเสร็จได้แบบนี้ คงมีแค่ฉันคนเดียวค่ะ...[wa:3580] "
1301001-40 = "― แต่ว่าคราวหน้า ฉันจะไม่ช่วยคุณครูอีกแล้วค่ะ![wa:700] "
1301001-43 = "― สองอาทิตย์ก่อนที่ร้านสะดวกซื้อ ซื้อแซนวิชไก่ 500 เยน...[wa:3040] "
1301001-45 = "― หนังสือการ์ตูนรายสัปดาห์ 450 เยน...[wa:1320] "
1301001-48 = "― หืม? วันก่อนมีใบเสร็จค่าบริการ <คลับนุ่มนิ่มนุ่มฟู> 20,000 เยน…?[wa:3100] "
1301001-51 = "― คะ... คุณครูคะ ใบเสร็จนี่มันอะไรกันคะ![wa:940] "
1301001-53 = "― ครูผู้สอนที่ควรจะเป็นแบบอย่างให้คนอื่น แต่กลับไปเที่ยวสถานที่แบบนั้น...[wa:3600] "
1301001-56 = "― ฉันไม่อยากเชื่อเลยจริงๆ ค่ะ! แย่ที่สุดเลย![wa:200] "
1301001-59 = "― อ่า... <คลับนุ่มนิ่มนุ่มฟู> เป็นชื่อของเกมสุ่มกาชางั้นเหรอคะ?[wa:1760] "
1301001-61 = "― เฮ้อ ฉันคิดว่า... คุณครู...[wa:2460] "
1301001-64 = "― เดี๋ยวสิ กดกาชาทีเดียว 20,000 เยน มันก็มากไปนะคะ![wa:1620] "
1301001-67 = "― ห้ามกดพร่ำเพรื่อนะคะ! ต่อไปนี้ช่วยวางแผนเรื่องค่าใช้จ่ายให้ดีๆ ด้วยค่ะ![wa:1460] "
1301001-70 = "ดูนี่สิคะ นอกจากค่าหุ่นยนต์แปลงร่างนั่นแล้ว ยังมีเงินส่วนอื่นที่คุณครูสามารถประหยัดได้ตั้ง 50,000 เยนเลยนะคะ!"
1301001-71 = "ถ้าคุณครูเริ่มจดบันทึกค่าใช้จ่ายตั้งแต่ตอนนี้ และคอยตรวจสอบจำนวนเงินคงเหลือบ่อยๆ#nก็จะไม่ต้องมาใช้ชีวิตอดมื้อกินมื้อแบบนี้หรอกค่ะ"
1301001-72 = "เพราะงั้นต่อไปเวลาที่จะซื้ออะไรเกิน 5,000 เยนขอให้มาปรึกษาฉันก่อนนะคะ!"
1301001-73 = "[s] \"ว่าแต่ทำไมเวลาครูจะซื้ออะไรต้องคอยบอกยูกะด้วยล่ะ?\""
1301001-74 = "ระ...เรื่องนั้น.... เพื่อการปรับนิสัยการใช้เงินของคุณครู... ฉันคงไม่มีทางเลือก... นอกจากคอย#nดูแลคุณครู...."
1301001-75 = "ยังไงก็ตาม! ฉันทำแบบนี้ก็เพื่อคุณครูค่ะ เพราะฉะนั้นช่วยทำตามที่บอกด้วยนะคะ"
1301001-77 = "หลังจากนั้นยูกะก็บ่นคุณครูเรื่องการใช้จ่ายอยู่พักใหญ่ก่อนจะกลับไป"

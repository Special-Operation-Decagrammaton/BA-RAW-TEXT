[translation]
10036040-1 = "Episode 4;A Bowl of Yakisoba"
10036040-3 = "Damn it! Who WERE they?! Just popping up in our way like that!"
10036040-4 = "If it weren't for them, we'd have that DJ already!"
10036040-5 = "We were thinking too small, that was the problem. The Helmet Gang deserves worse."
10036040-6 = "Yeah, you think so?"
10036040-7 = "Of course! A little kidnapping isn't gonna be enough for what they did."
10036040-8 = "Especially considering we PAID for that plan."
10036040-9 = "You said it was the perfect plan earlier."
10036040-10 = "Shut up! We're gonna call that professor girl again!"
10036040-11 = "Yeah, all right."
10036040-17 = "Hello there. How goes the plan?"
10036040-18 = "We got beaten up and chased off by some random brats, not even Helmet Gangsters!"
10036040-19 = "What kind of petty little plan WAS that, anyway? Give us something bigger, something solid!"
10036040-20 = "Hmm? Well, you should know I crafted that plan based on the information you gave me..."
10036040-21 = "Given the position of the pieces, I concluded that the opening game would've been enough to force a checkmate."
10036040-22 = "But if that's not the case...there can only be one explanation."
10036040-24 = "\"A new player has entered the game.\""
10036040-25 = "...Hmm, so it goes. This could be to our advantage."
10036040-26 = "We now know that the DJ is better protected than we previously thought."
10036040-27 = "And no doubt, they'll deploy even more of their forces to protect him after the attempted kidnapping."
10036040-28 = "Let's rearrange the board. Placing pieces is my specialty."
10036040-30 = "Uh, what game are we talking about...?"
10036040-32 = "And no charge for this one. Consider it an...after-sales bonus."
10036040-34 = "Y-Yeah? All right, great! Jeez, wish you'd been like this before..."
10036040-35 = "So what's the plan? We're not just gonna try the same thing again, are we?"
10036040-37 = "Of course not."
10036040-38 = "Under the name of \"Professor Smug, the first-rate crime consultant\"..."
10036040-43 = "...I will craft a game of spectacle and brilliance."
10036040-46 = "Phew, I think the stage is all set up, finally."
10036040-47 = "Thank you for the help, Sensei. I owe you yet another one."
10036040-48 = "[s1] \"It was a fun new experience.\"\n[s2] \"I liked learning about all this stuff.\""
10036040-51 = "Indeed. One doesn't often see equipment this expensive up close."
10036040-52 = "I think this turntable alone is...more than I could afford."
10036040-53 = "And it takes hours and hours of practice to use it like DJ B.o.B does."
10036040-54 = "[s] \"You seem to know a lot about DJing.\""
10036040-55 = "Well, I knew I'd be assisting a DJ, so I studied before I got here."
10036040-56 = "I wouldn't say I \"know a lot.\" I only studied what I'd need to know for the mission."
10036040-57 = "[s3] \"What else can you tell me?\"\n[s4] \"You know more about it than I do.\""
10036040-60 = "I can tell you more, if you're interested, but...not right now. DJ B.o.B might call for me at any moment..."
10036040-61 = "[s] \"Ah, don't worry about him. He won't interrupt.\""
10036040-62 = "Um...I suppose I'll take your word for that, Sensei."
10036040-63 = "All right, here's what I know."
10036040-64 = "\"DJ\" is short for \"Disc Jockey.\" They pick music to set the mood at parties and whatnot."
10036040-65 = "Their main skill is mixing mutiple existing tracks to create something new out of them. They have an infinite number of possible sounds they can make."
10036040-66 = "And their main tool is this turntable right here."
10036040-67 = "They can use it to adjust the BPM, or perform scratch techniques—if they're playing LPs or CDs, that is."
10036040-68 = "Like this..."
10036040-72 = "...Well, that's the gist of it."
10036040-73 = "[s5] \"You're pretty good!\"\n[s6] \"Are you a professional, by any chance?\""
10036040-76 = "...I'm still a novice, but thank you, Sensei."
10036040-77 = "While I was preparing for the mission, I found an old, abandoned turntable and tried it out for a bit."
10036040-78 = "It definitely feels smoother with equipment this nice, though. Just the slightest touch of my fingertips, here on the pitch fader..."
10036040-79 = "Wait, if I lower the BPM and raise the pitch..."
10036040-83 = "I see. So that's how that works."
10036040-84 = "And then if I add a scratch..."
10036040-88 = "...Ooh!"
10036040-89 = "S-Sorry. I got a little carried away."
10036040-90 = "All right, that's enough of that. Let's go set up the seats."
10036040-91 = "Front section first..."
10036040-95 = "..."
10036040-96 = "[s] \"Do we want to get lunch?\""
10036040-97 = "There's still work left, though."
10036040-98 = "[s] \"Atsuko, Misaki, and Hiyori might be over at the food stalls.\""
10036040-99 = "Hmm, I hope they find something tasty. They deserve to enjoy it here."
10036040-100 = "[s] \"You sound like you might be worried about them. You want to go say hi?\""
10036040-101 = "...Let me ask the client first."
10036040-105 = "[ns] \"...\""
10036040-108 = "And I'm back."
10036040-109 = "For some reason, he told me, \"Yes, please, enjoy your meal! It's OK to take it easy!\""
10036040-110 = "He is DEFINITELY different than he was this morning."
10036040-111 = "He did say yes, though, so why not? Let's go."
10036040-112 = "Off to the food stalls section, Sensei."
10036040-115 = "Looks like they put just as much effort into the food stalls as they did for the concert."
10036040-116 = "Whatever you're hungry for, I'm sure they have it here."
10036040-117 = "Now that I think of it, Hiyori once asked me what yakisoba tastes like."
10036040-118 = "I've never had it either, so I made up an answer for her at the time."
10036040-124 = "This way, Sensei!"
10036040-131 = "H-Heehee, there's so much food... Is it okay for me to be this happy? We're not about to get refused service everywhere, and then have to go off and catch crabs or anything, are we?"
10036040-132 = "Of course not. I even saved my allowance for today, so have no fear."
10036040-133 = "What are you two hungry for?"
10036040-134 = "Nothing in particular. For some reason, crowds and heat just make me less hungry."
10036040-135 = "I want yakisoba!"
10036040-136 = "I asked Saori what it tasted like, and she said it tasted like heaven, heehee!"
10036040-137 = "Well, what she said was, \"It's three times as delicious as rationed sugar!\""
10036040-138 = "And I believe her!"
10036040-139 = "..."
10036040-141 = "I guess I'll have what she's having."
10036040-147 = "This restaurant's not too crowded. How about we go here?"
10036040-148 = "Here will do nicely."
10036040-153 = "Welcome! For three? Right this way!"
10036040-154 = "H-Heehee, f-finally, I get to taste heaven!"
10036040-162 = "Here's the menu. Take your time with it."
10036040-167 = "Now, then..."
10036040-169 = "Wait, 3,000 yen for a popsicle? 7,000 yen for a bowl of yakisoba?!"
10036040-174 = "This place can only be a..."
10036040-176 = "...five star fine dining experience!"
10036040-178 = "No, no way, it's a pop-up stall."
10036040-179 = "This is just price gouging, simple as that."
10036040-181 = "Excuse me?"
10036040-182 = "Our prices are determined by supply and demand."
10036040-183 = "Plenty of people want to eat here today."
10036040-184 = "But bringing ingredients to a remote beach requires transportation costs, maintenance, labor, and so forth."
10036040-185 = "Naturally, that drives up the cost."
10036040-186 = "Even so, this is still too much. It's several times the normal price."
10036040-187 = "Well, you're welcome to go elsewhere, of course."
10036040-188 = "But just for your information, this is the cheapest stall at the festival."
10036040-190 = "Seriously?"
10036040-191 = "Th-There's no hope... This is the end...unless we eat here, and then take on dangerous jobs to pay off the bill."
10036040-192 = "Maybe we could do poses in skimpy swimsuits and get pictures taken for money, like in that article I read. \"Beach Dapper,\" I think it was called..."
10036040-193 = "Calm down, Hiyori. We do HAVE the money."
10036040-194 = "This is certainly pricier than expected...but it would be a shame to leave on an empty stomach, would it not?"
10036040-195 = "The budget, though."
10036040-196 = "We can always save more money, but who knows when we'll get another chance to make these kinds of memories?"
10036040-197 = "Let's see, one, two, three... Here, 7,000 yen. One yakisoba, please."
10036040-198 = "Heehee! Got it! Order up!"
10036040-203 = "So ridiculous..."
10036040-204 = "Even in the Black Market, they'd say that's too expensive."
10036040-205 = "I can't believe they're trying to charge that much!"
10036040-206 = "[s] \"It's all right, Saori. I can pay for them, all right?\""
10036040-207 = "No, that wouldn't be right."
10036040-208 = "This is the food stall's fault. You shouldn't be the one to take the punishment for it."
10036040-209 = "...Let's do this instead. Follow me."
10036040-214 = "Behind the Food Stall Kitchen"
10036040-216 = "Haha, there's a sucker born every minute!"
10036040-217 = "Hahaha! I can't believe anyone would pay that much for yakisoba."
10036040-218 = "Is she some kind of corporate big shot, or what?"
10036040-219 = "No, her money was all crumpled up."
10036040-220 = "We probably left her broke, but that's how it goes around here. Law of the jungle!"
10036040-221 = "Yeah, you hear about the time those four troublemakers blew up a ramen shop 'cause they didn't like the bowl they were sharing?"
10036040-222 = "It's a cutthroat industry. You do what it takes to survive."
10036040-223 = "Right?"
10036040-227 = "That's enough out of you two."
10036040-235 = "Who are you?!"
10036040-237 = "How much was the yakisoba again?"
10036040-239 = "It's 7,000 yen! If you don't want it, don't order it!"
10036040-241 = "A little expensive, don't you think?"
10036040-243 = "Wh-What are YOU going to do about it? Those customers paid for it, fair and square."
10036040-244 = "Fair, you say? Funny story, I had a look at that menu you submitted to the festival committee. You had yakisoba on there at 700 yen, not 7,000."
10036040-245 = "You got that price approved, and then you jacked it up ten times over."
10036040-246 = "There's nothing fair about that."
10036040-247 = "Hmph! Buyer beware. Not our fault if the customer makes a bad choice."
10036040-248 = "Oh, no. It IS your fault for going out of your way to deceive them."
10036040-249 = "So you're going to apologize and make amends to everyone. Right now."
10036040-250 = "Oho, look at Little Miss Morality. Everyone, get out here!"
10036040-259 = "You don't want to end your festival day in the hospital, do you? Piss off."
10036040-261 = "..."
10036040-262 = "Well, Sensei, there's no backing down now."
10036040-263 = "Let's do this before \"the kids\" find out."

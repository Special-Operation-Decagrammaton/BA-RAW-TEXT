[translation]
10036040-1 = "第4話;來一份炒麵"
10036040-3 = "可惡！那些傢伙是什麼人啊！突然跑出來打亂我們的計劃！"
10036040-4 = "要不是他們來攪局，綁架DJ的計劃就能成功了說！"
10036040-5 = "算了算了，反正那種小兒科的作戰本來就不足以讓我們洩憤。"
10036040-6 = "是嗎？"
10036040-7 = "那還用說！區區綁架怎麼夠呢！#n我們的復仇可不能就這樣算了！"
10036040-8 = "只有井底之蛙才會想出那種愚蠢的計畫！"
10036040-9 = "你剛剛不是才說那是個完美的計畫嗎？"
10036040-10 = "你少囉嗦！趕快打電話給那個叫教授的人！"
10036040-11 = "知道了知道了。"
10036040-17 = "原來是太妹們啊。計畫成功了嗎？"
10036040-18 = "成功個頭啊！不只被打得落花流水還被趕跑了啦！#n對方甚至還不是頭盔團，而是一群來歷不明的傢伙！"
10036040-19 = "你那種小打小鬧的計畫根本不夠看！#n快點幫我們想一個更大、更厲害的計畫！"
10036040-20 = "哼……？#n唔嗯，我畢竟是按照各位提供的情報……"
10036040-21 = "從現場的情況和敵人的動向來看，那理應能達到致勝的效果才對……"
10036040-22 = "如果行不通的話……那麼結論就只有一個。"
10036040-24 = "「棋盤上出現了意料之外的伏兵」。"
10036040-25 = "……儘管結果令人遺憾，但我們也並非一無所獲。"
10036040-26 = "這次的作戰讓我們得知──那名DJ身邊有我們未曾意料到的保鏢。"
10036040-27 = "而在剛才的綁架未遂之後，對方肯定會加派更多人手保護自己……"
10036040-28 = "來重新佈局吧。#n重整並設計新棋局才是我的拿手好戲。"
10036040-30 = "棋局……？"
10036040-32 = "簡單來說──沒錯，這就是我提供的售後服務。"
10036040-34 = "是，是嗎？#n那你早說嘛！"
10036040-35 = "所以這次是怎樣的計畫？該不會又是綁架這種老掉牙的招式吧？"
10036040-37 = "當然不是。"
10036040-38 = "我以一流的犯罪顧問──笑咪咪教授的名聲向你們保證。"
10036040-43 = "必定會為各位準備更加盛大而華麗的棋局。"
10036040-46 = "呼，這樣舞台就準備得差不多了。"
10036040-47 = "謝謝你的幫忙，老師。#n我欠你一個人情。"
10036040-48 = "[s1]「能看到這麼多沒見過的器材，我也覺得很新鮮。」\n[s2]「能接觸這麼多新奇的器材，我也玩得很開心。」"
10036040-51 = "說的也是。一般人平常的確很難接觸到DJ的設備。"
10036040-52 = "據我所知，其實就連這台唱盤也要價不菲。"
10036040-53 = "能用得起它的，恐怕也只有DJ B.o.B這種等級的DJ了吧。"
10036040-54 = "[s]「沙織，你對DJ很了解嗎？」"
10036040-55 = "畢竟這次的任務是擔任DJ B.o.B的助手兼保鏢，因此我事先做了一些調查。"
10036040-56 = "不過充其量也只是為任務所做的準備而已，我也不敢說自己到底有多了解。"
10036040-57 = "[s3]「可以再多跟我說說嗎？」\n[s4]「我對這方面的事情完全不了解，所以很感興趣。」"
10036040-60 = "我當然很樂意在能力範圍內向老師說明……#n不過我目前還在執行任務，說不定DJ B.o.B現在也正在找我……"
10036040-61 = "[s]「啊，這個部分應該不用擔心。」"
10036040-62 = "是嗎……？#n雖然不太明白，但既然老師都這麼說了，我就當作是這樣吧。"
10036040-63 = "那麼我再試著多說一點。"
10036040-64 = "我們常說的DJ其實是[ruby=Disc Jockey]唱片騎師[/ruby]的縮寫，#n主要的工作是在派對之類的場合，播放適合的樂曲來帶動氣氛。"
10036040-65 = "除了將兩首以上的歌曲混編成新的曲子之外，#n也能透過一些技巧讓歌曲聽起來煥然一新，甚至變成完全不同的類型。#n正因如此，DJ可說是擁有無限的發展空間。"
10036040-66 = "而這項工作當中，最重要的就是這台唱盤。"
10036040-67 = "除了可以播放錄製了[ruby=Long Playing record]音樂的LP或CD之[/ruby]外，也能透過唱盤來調整BPM和刷碟。"
10036040-68 = "比如……"
10036040-72 = "……大概就是這種感覺。"
10036040-73 = "[s5]「看起來有模有樣的耶。」\n[s6]「好厲害！根本是現役DJ了吧？」"
10036040-76 = "……你太抬舉我了。#n不過還是謝謝你，老師。"
10036040-77 = "我只是在準備任務的期間，撿了幾個廢棄的唱盤練習過而已。"
10036040-78 = "果然好的設備用起來就是順手。#n從指尖的觸感到推子的移動……"
10036040-79 = "等等，要是把BPM降低，同時把音高調高的話……"
10036040-83 = "原來如此，會是這種感覺啊。"
10036040-84 = "如果再加上刷碟……"
10036040-88 = "……啊！？"
10036040-89 = "抱，抱歉。一不小心就入迷了。"
10036040-90 = "閒，閒聊還是先說到這邊，趕緊整理一下觀眾席吧。"
10036040-91 = "先從前面的區域開始……"
10036040-95 = "……"
10036040-96 = "[s]「沙織，要不要先一起去吃個午餐？」"
10036040-97 = "可是我還有工作沒做完。"
10036040-98 = "[s]「敦子、美咲跟日和現在應該也在攤販區了。」"
10036040-99 = "這樣啊。#n難得有機會參加慶典，真希望他們能吃點好吃的東西……"
10036040-100 = "[s]「如果放心不下的話，要不要親自去看看？」"
10036040-101 = "……那我先去詢問一下委託人的意見。"
10036040-105 = "[ns]「……」"
10036040-108 = "我回來了。"
10036040-109 = "他不知為何告訴我「儘管吃沒關係，慢慢來也OK！」……"
10036040-110 = "態度和剛才完全不同，實在有點奇怪……"
10036040-111 = "不過既然他都同意了，我也沒什麼好抱怨的。"
10036040-112 = "那麼老師，我們也往攤販區移動吧。"
10036040-115 = "攤販區也準備得很用心，完全不遜於表演舞台呢。"
10036040-116 = "無論想吃什麼似乎都能找到。"
10036040-117 = "這麼說來，日和他……以前曾經問我炒麵是什麼味道。"
10036040-118 = "可惜我自己也沒吃過，所以當時只能勉強用想像中的味道來回答……"
10036040-124 = "老師，過來這邊！"
10036040-131 = "耶嘿嘿，這裡有好多吃的哦……我真的可以這麼幸福嗎？#n應該不會被拒於門外，最後只能自己在海邊抓螃蟹吃吧？"
10036040-132 = "當然不會。#n錢的事也不用擔心，我特別為了今天存了不少零用錢。"
10036040-133 = "你們兩個最想吃什麼？"
10036040-134 = "我沒什麼想法。#n這裡人多天氣又熱，實在沒什麼胃口。"
10036040-135 = "我想吃炒麵！"
10036040-136 = "我之前有問過沙織姐炒麵是什麼味道，他跟我說那簡直是人間美味哦，耶嘿嘿。"
10036040-137 = "準確來說……是比配給的糖果好吃三倍！"
10036040-138 = "既然沙織姐都這麼說了，肯定不會有錯……！"
10036040-139 = "……"
10036040-141 = "既然要點就點兩份吧。"
10036040-147 = "這間店怎麼樣？#n耶嘿嘿，裡面看起來人也不多……"
10036040-148 = "嗯，就選這間吧。"
10036040-153 = "歡迎光臨！總共三位嗎？這邊請！"
10036040-154 = "耶，耶嘿嘿。#n終於能品嘗到人間美味了嗎！"
10036040-162 = "歡迎三位的光臨。#n這邊是本店的菜單，請各位參考看看。"
10036040-167 = "我看看……"
10036040-169 = "等一下，冰棒一支要3000元，炒麵一份要7000元……？"
10036040-174 = "這裡……"
10036040-176 = "原來是高級餐廳嗎！"
10036040-178 = "不不不，這種路邊攤怎麼可能賣這麼貴。"
10036040-179 = "完全是在把我們當肥羊宰吧。"
10036040-181 = "哎呀，客人怎麼這麼說呢。"
10036040-182 = "價格本來就是根據供需決定的，不是嗎？"
10036040-183 = "因為慶典的關係，來買東西的人自然會變多。"
10036040-184 = "而我們也需要付額外的運費、維護費和人事費，才能把食材運到這麼偏僻的海灘。"
10036040-185 = "這樣一來，價格比一般行情高不也是理所當然的嗎？"
10036040-186 = "可是再怎麼說，高出兩三倍也太過分了！"
10036040-187 = "真是的，你們嫌貴就別吃啊。"
10036040-188 = "順便告訴你們，就算去別間店也沒用的。#n因為我們已經是這附近最便宜的了。"
10036040-190 = "怎麼會……"
10036040-191 = "世，世界要毀滅了……末日要降臨了……#n要是想在這裡吃上一餐，就得做好之後要以危險工作還債的心理準備……"
10036040-192 = "例如穿著幾乎快走光的泳裝招攬客人……被人拍照……#n就像雜誌裡的「海邊潮男正妹」特輯一樣……！"
10036040-193 = "你先冷靜，日和。#n我們也不是付不起這筆錢。"
10036040-194 = "雖然是一大筆意料之外的花費……#n不過都來到海邊了，總不能什麼都不吃就走吧？"
10036040-195 = "……可是預算怎麼辦，敦子。"
10036040-196 = "錢之後還能再賺，但是一起來海邊的回憶說不定就只有這一次了。"
10036040-197 = "我看看，一、二、三……來，7000元。#n請給我們一份炒麵。"
10036040-198 = "嘻嘻！沒問題！馬上就來！"
10036040-203 = "太荒謬了……！"
10036040-204 = "這種價格連在黑市都會被嫌貴。"
10036040-205 = "獅子大開口到這種程度，真是豈有此理！"
10036040-206 = "[s]「沙織你先冷靜。待會就由我去買單吧？」"
10036040-207 = "不，那可不行。"
10036040-208 = "有問題的是這些小吃攤才對，老師不需要承擔。"
10036040-209 = "……就這麼辦吧。#n老師，請跟我來。"
10036040-214 = "小吃攤後廚"
10036040-216 = "「一人上鉤就賺爛」計劃大成功！"
10036040-217 = "噗哈哈！居然真的有人願意花那麼多錢買炒麵。"
10036040-218 = "難道他是什麼大企業的千金嗎？"
10036040-219 = "不，在我看來像是存了很久的零用錢。"
10036040-220 = "雖然他們很可憐，但「不法者海灘」就是這樣的地方！錢就是一切！"
10036040-221 = "就是啊。話說我之前聽人家說過，#n有個太妹四人組只點一碗拉麵分著吃，結果吃完不滿意就把那間店給炸了咧。"
10036040-222 = "所以說啊，缺乏覺悟的人根本無法在這裡生存！"
10036040-223 = "沒錯沒錯！"
10036040-227 = "你們說的我都聽到了。"
10036040-235 = "你是誰啊！？"
10036040-237 = "你剛才說炒麵賣多少錢？"
10036040-239 = "炒麵一份7000！愛吃不吃隨便你！"
10036040-241 = "賣得還真貴。"
10036040-243 = "那，那又怎樣？#n這可是公平的交易！坐在那邊的客人們也都同意了！"
10036040-244 = "公平交易？我可是在慶典開始前經手過所有攤位的菜單。#n你們當初提交的菜單上，寫的應該是700元才對。"
10036040-245 = "明明回報了這個價格，現在卻用假菜單來欺騙消費者。"
10036040-246 = "……這怎麼能稱得上公平，分明就是不正當的交易。"
10036040-247 = "哼！要怪就怪那些上當的人太笨了！"
10036040-248 = "……不。有錯的不是受害者而是騙人的人。"
10036040-249 = "立刻去跟那些受騙的顧客道歉，然後把錢退給他們。"
10036040-250 = "你這傢伙！一下道歉一下退錢的，到底說夠了沒有啊？#n小子們！出來招呼客人！"
10036040-259 = "不想在慶典中被揍得滿頭包的話，最好現在就給我滾！"
10036040-261 = "……"
10036040-262 = "老師，不能放任這些傢伙繼續為非作歹。"
10036040-263 = "為了避免被孩子們發現，我們速戰速決吧。"

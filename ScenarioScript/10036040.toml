[translation]
10036040-1 = "ตอนที่ 4;ยากิโซบะหนึ่งจาน"
10036040-3 = "บ้าจริง! ยัยพวกนั้นเป็นใครกันน่ะ! ทำไมจู่ๆ ก็เข้ามาขวางแผนการพวกเรา!"
10036040-4 = "ถ้าไม่มียัยพวกนั้น เราก็คงได้ตัวดีเจมาแล้ว!"
10036040-5 = "ไม่เป็นไรหรอก เมื่อเทียบกับความโกรธแค้นของเราแล้ว แผนการนั่นมันยังกระจอกนัก"
10036040-6 = "งั้นเหรอ?"
10036040-7 = "ก็ใช่น่ะสิ! จะให้พอใจแค่กับการลักพาตัวงั้นเหรอ แค่นั้นมันยังไม่ใช่การล้างแค้นอย่างสาสมหรอกนะ!"
10036040-8 = "คิดมาได้ยังไงนะแผนการแบบนี้! ไอเดียห่วยสุดๆ!"
10036040-9 = "แต่เมื่อกี้ยังบอกว่าเป็นแผนการที่สมบูรณ์แบบอยู่เลยนี่"
10036040-10 = "หนวกหูน่า! ติดต่อศาตราจารย์อะไรนั่นอีกทีซิ!"
10036040-11 = "ก็ได้"
10036040-17 = "พวกแยงกี้สาวสินะคะ แผนการลุล่วงดีมั้ยคะ??"
10036040-18 = "ลุล่วงอะไรกันเล่า! เราวิ่งหนีป่าราบกันมาต่างหาก! เราไม่ได้โดนไล่จากแก๊งหมวกกันน็อก แต่เป็นใครที่ไหนก็ไม่รู้!"
10036040-19 = "ไอเดียลักพาตัวของเธอมันยังไม่หนำใจพอหรอกนะ! ขอแผนการที่ยิ่งใหญ่และได้ผลกว่านี้หน่อยสิ!"
10036040-20 = "คะ...? อืม แต่พอมาคำนึงถึงข้อมูลที่พวกคุณให้ฉันมาแล้ว..."
10036040-21 = "ทั้งสถานการณ์และการเคลื่อนไหวของศัตรู เท่านี้ฉันก็คิดว่าเพียงพอต่อการรุกฆาตตั้งแต่เริ่มเกมแล้ว#nนะคะ"
10036040-22 = "แต่ถ้ายังทำไม่สำเร็จกันอีกละก็... คงได้ข้อสรุปที่ว่า..."
10036040-24 = "'มีหมากที่ฉันยังไม่ได้วิเคราะห์ขึ้นมาเล่นเกมบนกระดานด้วย'"
10036040-25 = "อืม ก็ดีค่ะ... ถ้างั้นก็คงช่วยไม่ได้ บางทีอาจจะดีที่ออกมาเป็นอย่างนี้ก็ได้ค่ะ"
10036040-26 = "ฉันได้ข้อมูลบางอย่างมาค่ะ ดีเจคนนั้นมีคนคุ้มกันที่อยู่นอกเหนือจากการสันนิษฐานของเราค่ะ"
10036040-27 = "และเขาก็มีชุดคุ้มกันที่แน่นหนาขึ้นจากเหตุการณ์ลักพาตัวเมื่อกี้..."
10036040-28 = "งั้นเราก็มาตั้งกระดานกันใหม่ค่ะ การเพิ่มเบี้ยและเริ่มเกมใหม่คือความสามารถพิเศษของฉันอยู่แล้วค่ะ"
10036040-30 = "เกม... อะไรนะ...?"
10036040-32 = "เอาเป็นว่านี่คือบริการหลังการขายจากฉันแล้วกันค่ะ"
10036040-34 = "งะ... งั้นเหรอ? ก็ดี ที่จริงเธอควรจะจริงจังแบบนี้ตั้งแต่แรกแล้วนะ!"
10036040-35 = "คราวนี้แผนการเป็นแบบไหนล่ะ? คงไม่ใช่แผนตื้นๆ อย่างการลักพาตัวอีกใช่มั้ย?"
10036040-37 = "ต้องไม่ใช่อยู่แล้วค่ะ"
10036040-38 = "ฉันขอเอาชื่อของศาสตราจารย์ยิ้มหวานผู้เป็นที่ปรึกษาชั้นนำด้านอาชญากรรมเป็นเดิมพัน"
10036040-43 = "ฉันจะเตรียมเกมที่ยอดเยี่ยมและยิ่งใหญ่อย่างที่พวกคุณต้องการให้เองค่ะ"
10036040-46 = "ฮู่ว เตรียมทุกอย่างบนเวทีเสร็จแล้ว"
10036040-47 = "ขอบคุณที่ช่วยนะครู ฉันติดหนี้บุญคุณครูอีกแล้วละ"
10036040-48 = "[s1] \"งานนี้ก็สนุกดีนะ มีอุปกรณ์ที่ครูไม่รู้จักเยอะเลย\"\n[s2] \"มีเครื่องเสียงที่น่าสนใจเยอะเลย น่าสนุกดีนะ\""
10036040-51 = "งั้นเหรอ? แต่ก็นะ อุปกรณ์สำหรับงานดีเจเป็นของที่เราไม่ได้เจอบ่อยๆ ในชีวิตประจำวันอยู่แล้ว"
10036040-52 = "เท่าที่ฉันรู้ แค่เครื่องเล่นแผ่นเสียงตรงนี้ก็มีราคาแพงลิบลิ่วแล้วละ"
10036040-53 = "ต้องเป็นคนระดับดีเจ B.o.B เท่านั้นละถึงจะใช้ของพวกนี้ได้"
10036040-54 = "[s] \"ซาโอริรู้เรื่องเกี่ยวกับดีเจเป็นอย่างดีเลยนะ\""
10036040-55 = "ก็ภารกิจครั้งนี้คือการเป็นผู้ช่วยและผู้คุ้มกันดีเจ B.o.B ฉันเลยไปหาข้อมูลหลายๆ อย่างมาล่วงหน้าน่ะ"
10036040-56 = "แต่ก็แค่ศึกษาสิ่งที่จำเป็นเกี่ยวกับภารกิจน่ะ แค่นี้ไม่เรียกว่ามีความรู้เป็นอย่างดีหรอก"
10036040-57 = "[s3] \"ช่วยเล่าให้ครูฟังอีกหน่อยได้มั้ย?\"\n[s4] \"ครูไม่รู้อะไรเกี่ยวกับเรื่องนี้เลย อยากรู้อีกจัง\""
10036040-60 = "ฉันก็บอกได้แค่สิ่งที่ตัวเองรู้ แต่ว่าตอนนี้ฉันอยู่ระหว่างการทำงาน ฉันต้องตั้งใจทำงานก่อน ตอนนี้ดีเจ B.o.B อาจกำลังตามหาฉันอยู่ก็ได้..."
10036040-61 = "[s] \"อ้อ ตอนนี้เขาไม่มีปัญหาอะไรหรอก\""
10036040-62 = "งั้นเหรอ...? ถึงจะไม่แน่ใจเท่าไร แต่ถ้าครูว่าอย่างนั้น ฉันก็คงต้องเชื่อละเนอะ"
10036040-63 = "ถ้างั้นฉันจะเล่าต่ออีกหน่อยแล้วกัน"
10036040-64 = "ดีเจ (DJ) ย่อมาจากคำว่า Disc Jockey ดีเจจะมีหน้าที่เปิดเพลงและสร้างบรรยากาศสนุกๆ ในงานปาร์ตี้หรืองานรื่นเริงอื่นๆ ที่มีคนมากมายมารวมตัวกัน"
10036040-65 = "คนที่เป็นดีเจยังสามารถมิกซ์เพลงตั้งแต่ 2 เพลงขึ้นไปได้ และยังเปิดเพลงให้ออกมาในรูปแบบที่#nแตกต่างจากเดิมอย่างสิ้นเชิงได้ด้วย จะเรียกว่างานของดีเจเป็นงานที่ไม่มีจุดสิ้นสุดก็ได้"
10036040-66 = "และสิ่งที่สำคัญที่สุดของอาชีพนี้ก็คือเครื่องเล่นแผ่นเสียง"
10036040-67 = "ดีเจจะใช้เครื่องนี้เล่นเพลงจากแผ่นซีดีหรือแผ่นเสียง นอกจากนี้ยังปรับความเร็วเพลงและใช้เทคนิค#nสแครชแผ่นได้ด้วย"
10036040-68 = "แบบนี้..."
10036040-72 = "น่าจะประมาณนี้นะ..."
10036040-73 = "[s5] \"ทำได้ดีกว่าที่คิดอีกนะ!\"\n[s6] \"อย่างกับมืออาชีพเลย!\""
10036040-76 = "ไม่ได้เก่งขนาดนั้นหรอก... แต่ยังไงก็ขอบคุณนะ ครู"
10036040-77 = "ตอนเตรียมตัวล่วงหน้าสำหรับภารกิจ ฉันไปหาเครื่องเล่นแผ่นเสียงที่มีคนทิ้งไว้แล้วมาลองเล่นดูน่ะ"
10036040-78 = "พอเป็นเครื่องเล่นราคาแพงมันก็ใช้งานได้ลื่นไหลเลย ทั้งความรู้สึกที่ปลายนิ้ว ทั้งการเคลื่อนไหวเมื่อ#nปรับระดับเสียง..."
10036040-79 = "เดี๋ยวนะ ถ้าฉันลองลดความเร็วแล้วเพิ่มระดับเสียงดู..."
10036040-83 = "อืม จะเป็นอย่างนี้สินะ"
10036040-84 = "แล้วถ้าลองสแครชด้วยล่ะ..."
10036040-88 = "อึก...?!"
10036040-89 = "ขะ... ขอโทษนะ ฉันเผลออู้งานซะแล้วสิ"
10036040-90 = "เอาละ เราหยุดคุยกันแค่นี้เถอะ ฉันลงไปจัดเก้าอี้ผู้ชมดีกว่า"
10036040-91 = "เริ่มจากแถวหน้าก่อน..."
10036040-95 = "..."
10036040-96 = "[s] \"ซาโอริ ไปกินข้าวเที่ยงกันมั้ย?\""
10036040-97 = "แต่งานฉันยังไม่เสร็จเลยนะ"
10036040-98 = "[s] \"ตอนนี้อาสึโกะ มิซากิ และฮิโยริก็น่าจะอยู่แถวๆ ร้านอาหารแผงลอยนะ\""
10036040-99 = "งั้นเหรอ? ได้มาเที่ยวงานเทศกาลทั้งที ถ้าทุกคนได้กินของอร่อยๆ ก็คงจะดีนะ..."
10036040-100 = "[s] \"ถ้ากังวล ทำไมไม่ไปดูให้เห็นกับตาเองล่ะ?\""
10036040-101 = "ถ้าจะทำอย่างนั้น ฉันก็ต้องไปขออนุญาตจากผู้ว่าจ้างก่อน งั้นเดี๋ยวฉันมานะ"
10036040-105 = "[ns] \"...\""
10036040-108 = "กลับมาแล้ว"
10036040-109 = "ฉันก็งงกับเขาเหมือนกัน แต่เขาบอกว่า 'ไปกินให้อร่อยล่ะ! ไม่ต้องรีบกลับมาก็ได้!'"
10036040-110 = "เขาทำตัวแตกต่างจากเดิมมากจนฉันรู้สึกว่าเป็นคนละคนกันเลย..."
10036040-111 = "แต่ก็เอาเถอะ ถ้าได้รับอนุญาตแล้วก็คงไม่เป็นไรหรอก"
10036040-112 = "งั้นเราไปโซนร้านขายอาหารแผงลอยกันเถอะครู"
10036040-115 = "โซนร้านขายอาหารก็จัดเตรียมมาเป็นอย่างดีไม่แพ้กับโซนเวทีเลยสินะ"
10036040-116 = "อยากกินอะไรก็หาซื้อได้ทุกอย่างเลย"
10036040-117 = "จะว่าไป... ฮิโยริเคยถามฉันว่ายากิโซบะมีรสชาติเป็นยังไงด้วย"
10036040-118 = "แต่ฉันเองก็ไม่เคยกินเหมือนกัน ฉันยังจำได้อยู่เลยว่าต้องจินตนาการรสชาติแล้วตอบเธอไป"
10036040-124 = "ครู หลบมาทางนี้!"
10036040-131 = "แหะ แหะๆ มีของกินเยอะเลยนะคะ... ฉันมีความสุขแบบนี้ก็ได้เหรอคะ? เราคงไม่โดนไล่ออกจากร้าน แล้วต้องไปจับปูในทะเลกินหรอกใช่มั้ยคะ?"
10036040-132 = "ไม่มีทางหรอก ไม่ต้องกังวลไปนะ ฉันหยอดกระปุกเก็บเงินมาเพื่อวันนี้เลย"
10036040-133 = "ทั้ง 2 คนอยากกินอะไรมากที่สุดเหรอ?"
10036040-134 = "ฉันไม่มีอะไรในใจเป็นพิเศษหรอก คนก็เยอะ อากาศก็ร้อนด้วย ที่จริงฉันไม่อยากกินอะไรเลย"
10036040-135 = "ฉันอยากกินยากิโซบะค่ะ!"
10036040-136 = "ฉันเคยถามพี่ซาโอริด้วยนะคะว่ายากิโซบะมีรสชาติเป็นยังไง ตอนนั้นพี่ซาโอริบอกว่ารสชาติอร่อย เหมือนได้ขึ้นสวรรค์เลยละค่ะ แหะๆ"
10036040-137 = "เห็นว่าอร่อยเป็น 3 เท่าของน้ำตาลที่มีคนมาแจกอีกค่ะ!"
10036040-138 = "ถ้าพี่ซาโอริถึงกับพูดแบบนั้น มันต้องอร่อยมากๆ แน่ๆ ค่ะ...!"
10036040-139 = "..."
10036040-141 = "งั้นไหนๆ จะสั่งแล้ว ก็สั่งมา 2 ชามเลยก็ได้"
10036040-147 = "เข้าร้านนี้กันดีมั้ยคะ? แหะๆ ร้านนี้ดูคนไม่แน่นเท่าร้านอื่นนะคะ..."
10036040-148 = "อื้ม งั้นก็ไปร้านนั้นกัน"
10036040-153 = "เชิญค่ะ 3 ท่านใช่มั้ยคะ? มานั่งทางนี้ได้เลยค่ะ!"
10036040-154 = "แหะ แหะๆ นะ... ในที่สุดเราก็จะได้กินของอร่อยที่มีรสชาติเหมือนได้ขึ้นสวรรค์แล้วเหรอคะเนี่ย! "
10036040-162 = "ยินดีต้อนรับค่ะ นี่เมนูนะคะ เลือกอาหารที่อยากรับประทานแล้วเรียกฉันได้เลยค่ะ"
10036040-167 = "อืม ไหนดูซิ.."
10036040-169 = "เดี๋ยวนะ... ไอศกรีมแท่งละ 3,000 เยน ยากิโซบะจานละ 7,000 เยน... เลยเหรอ?"
10036040-174 = "นี่มัน..."
10036040-176 = "นี่มันร้านอาหารชั้นหนึ่งเลยนะคะ!"
10036040-178 = "ไม่สิ ร้านอาหารแผงลอยไม่มีทางเป็นแบบนี้"
10036040-179 = "แบบนี้มันโก่งราคากันชัดๆ"
10036040-181 = "พูดอะไรอย่างนั้นคะ"
10036040-182 = "ราคาที่เราขายมาจากการคำนวณอุปสงค์และอุปทานนะคะ"
10036040-183 = "คนที่อยากซื้อของกินในงานเทศกาลน่ะมีเยอะแยะไปหมด"
10036040-184 = "แต่ถ้าจะเอาวัตถุดิบอาหารมาขายในชายหาดที่อยู่ห่างไกลแบบนี้ ก็ต้องเสียทั้งค่าขนส่ง ค่าสถานที่ และค่าจ้างไม่ใช่น้อยๆ เลย"
10036040-185 = "ถ้างั้นมันก็สมเหตุสมผลแล้วไม่ใช่เหรอคะที่ราคาอาหารจะแพงกว่าท้องตลาดน่ะ?"
10036040-186 = "แต่นี่มันแพงเกินไปแล้วนะ ไม่ใช่แค่ 1-2 เท่าด้วยซ้ำ!"
10036040-187 = "เฮอะ ถ้าจ่ายไม่ไหวก็ไม่ต้องกิน"
10036040-188 = "จะบอกให้นะว่าต่อให้ไปร้านอื่นก็ไม่ต่างกันหรอก ร้านของเราถูกที่สุดในบรรดาร้านแถวนี้แล้วละ"
10036040-190 = "จะเล่นแบบนี้สินะ..."
10036040-191 = "นี่มันขูดเลือดขูดเนื้อกันชัดๆ เลยค่ะ... ถ้าราคาอาหารแพงแบบนี้ละก็ เราก็คงต้องไปทำงานสุ่มเสี่ยง เพื่อหาเงินมาจ่ายแล้วละค่ะ..."
10036040-192 = "อย่างเช่นงานที่ต้องใส่ชุดว่ายน้ำน้อยชิ้นเรียกลูกค้า... หรือไม่ก็ถ่ายรูป... อย่างที่เห็นในนิตยสาร <ติดแกลมบนชายหาด> ฉบับพิเศษ...!"
10036040-193 = "ใจเย็นๆ ก่อน ฮิโยริ ใช่ว่าเราจะไม่มีเงินกันหรอกนะ"
10036040-194 = "ถึงจะต้องจ่ายเยอะกว่าที่คิดไว้เยอะมาก... แต่ไหนๆ เราก็มาทะเลกันแล้ว จะไม่กินอะไรเลย มันก็น่าเสียดายออกนะ"
10036040-195 = "แต่อาสึโกะ... เงินเรา..."
10036040-196 = "เงินหมดก็หาใหม่ได้ แต่ความทรงจำที่ทะเลจะหาได้อีกเมื่อไรก็ไม่รู้"
10036040-197 = "ไหนดูซิ หนึ่ง สอง สาม... มีทั้งหมด 7,000 เยน ขอยากิโซบะจานหนึ่งค่ะ"
10036040-198 = "คิกคิก! รับออร์เดอร์ค่ะ!"
10036040-203 = "ได้ยังไงกัน...!"
10036040-204 = "ราคาแบบนั้นน่ะ ไปขายในตลาดมืดยังไม่มีใครซื้อกินเลยนะ"
10036040-205 = "โก่งราคากันขนาดนี้เลยงั้นเหรอ เหลวไหลสิ้นดี!"
10036040-206 = "[s] \"ซาโอริ ใจเย็นๆ ก่อน เดี๋ยวครูจ่ายให้เองก็ได้\""
10036040-207 = "ไม่ ฉันให้ทำแบบนั้นไม่ได้หรอก"
10036040-208 = "คนที่ผิดไม่ใช่พวกเรา แต่เป็นร้านอาหารแผงลอยนั่นต่างหาก ครูไม่ต้องมารับผิดชอบหรอก"
10036040-209 = "เอาเป็นอย่างนี้แล้วกัน... ตามฉันมา ระวังอย่าให้ทุกคนเห็นด้วยล่ะ"
10036040-214 = "ด้านหลังร้านอาหารแผงลอย"
10036040-216 = "แผนการ 'ขอให้โดนหลอกสักคนเถอะ' สำเร็จแล้ว!"
10036040-217 = "วะฮ่าฮ่า! คิดไม่ถึงเลยนะว่าจะมีใครมาซื้อยากิโซบะในราคานั้นจริงๆ"
10036040-218 = "หรือว่าพวกนั้นจะเป็นคุณหนูจากตระกูลใหญ่น่ะ?"
10036040-219 = "ไม่ใช่หรอก เมื่อกี้ยังเห็นนั่งนับเหรียญมาจ่ายกันอยู่เลย"
10036040-220 = "ก็น่าสงสารอยู่หรอกที่ไม่ค่อยมีเงิน แต่ <ชายหาดนอกกฎหมาย> ก็เป็นที่แบบนี้ละ! เงินคือทุกอย่าง เงินเท่านั้นที่น็อกเอวรี่ติง!"
10036040-221 = "ฉันเคยได้ยินข่าวลือมาด้วยนะว่ามีกลุ่มอันธพาลที่ไปกินราเม็งถ้วยเดียวกัน 4 คน แล้วพอไม่ถูกใจก็#nระเบิดร้านจนปลิวไปเลย"
10036040-222 = "ต้องยากแค้นกันแค่ไหนนะถึงมากินถ้วยเดียวถึง 4 คนน่ะ!"
10036040-223 = "นั่นน่ะสิ!"
10036040-227 = "ฉันได้ยินที่พวกเธอคุยกันหมดแล้ว"
10036040-235 = "เธอเป็นใครน่ะ?!"
10036040-237 = "ขายยากิโซบะจานละเท่าไรนะ?"
10036040-239 = "ยากิโซบะ 7,000 เยน! มีปัญหาอะไรหรือเปล่า!"
10036040-241 = "แพงชะมัด"
10036040-243 = "ละ... แล้วจะเอายังไงล่ะ? ราคานี้มันสมเหตุสมผลแล้ว! ลูกค้าที่นั่งอยู่ตรงนั้นยังยอมจ่ายเลย!"
10036040-244 = "ราคาสมเหตุสมผลงั้นเหรอ? ก่อนจะเริ่มงานเทศกาลฉันตรวจสอบเอกสารที่ร้านค้าส่งให้ผู้จัดงานแล้ว และราคาที่กำหนดไว้ในเอกสารคือ 700 เยนต่างหากล่ะ"
10036040-245 = "ตอนแจ้งผู้จัดงาน พวกเธอบอกว่าจะขายในราคานั้น แต่กลับมาทำป้ายเมนูใหม่ แล้วก็ขายในราคาที่#nเอาเปรียบผู้บริโภคงั้นเหรอ"
10036040-246 = "ฉันยอมไม่ได้... แบบนี้มันไม่ถูกต้อง"
10036040-247 = "เฮอะ! คนที่มาซื้อต่างหากที่โง่เอง!"
10036040-248 = "ไม่หรอก... คนที่โดนหลอกไม่ได้ผิดสักหน่อย คนผิดคือคนที่หลอกคนอื่นต่างหาก"
10036040-249 = "ไปขอโทษคนที่พวกเธอหลอก แล้วแก้ไขให้ถูกต้องเดี๋ยวนี้เลย"
10036040-250 = "เฮอะ ยัยนี่นี่! ขอทงขอโทษอะไรกัน เธอเป็นใครถึงมาสั่งพวกเราฉอดๆ แบบนี้! ทุกคน! ออกมาตรงนี้ให้หมด!"
10036040-259 = "ถ้าไม่อยากเจ็บตัวในงานเทศกาลก็ไสหัวไปซะ!"
10036040-261 = "..."
10036040-262 = "ครู ฉันว่าฉันปล่อยยัยพวกนี้ไปไม่ได้แล้วละ"
10036040-263 = "ฉันจะรีบจัดการให้เร็วที่สุด ทุกคนจะได้ไม่สังเกตเห็น"

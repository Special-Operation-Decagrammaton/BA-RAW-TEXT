[translation]
10018100-1 = "第10話;命運之日"
10018100-9 = "各位觀眾，大家好！"
10018100-10 = "今年過得好嗎？#n準備好要迎接新年了嗎？"
10018100-11 = "我是克洛盧斯學園新聞部的偶像記者！川流詩音！"
10018100-15 = "然後～有人知道這裡是哪裡嗎？"
10018100-16 = "不知道也很正常！"
10018100-18 = "我們新聞部在接獲消息之前，也一直以為這裡只是平凡的商店街！"
10018100-19 = "但是……大家應該聽過「喵元食品」吧？#n為了避免有人不知道，這邊也簡單說明一下！"
10018100-20 = "「喵元食品」即「喵食品」，是近年在奇普托斯全域迅速擴張事業的食品公司！"
10018100-21 = "而今天，我們接獲了喵食品舉辦的「新春御節料理對決」將在這裡進行的消息！"
10018100-22 = "拍手！啪啪啪～！"
10018100-23 = "啊，本節目也是由「喵食品」贊助播出！#n馬上來介紹一下特別來賓！"
10018100-24 = "「喵食品」的會長──喵元．寬先生！歡迎～"
10018100-31 = "呣呵呵呵。大家好。"
10018100-32 = "我是喵食品的喵元．寬。#n謝謝大家今天齊聚一堂。"
10018100-34 = "接著介紹挑戰者！"
10018100-35 = "即使是面對喵食品這種大企業，其味道也毫不遜色！"
10018100-36 = "沒錯，是「麻雀亭」的老闆娘！"
10018100-42 = "大，大家好……請多指教。"
10018100-43 = "規則很簡單。"
10018100-44 = "我們喵食品和麻雀亭的老闆娘，分別製作100份御節料理餐盒，較勁味道。"
10018100-45 = "而今天就是對決的日子……不過我實在有點擔心呢。"
10018100-46 = "我們喵食品運用先進的設備和大量的員工，準備起來十分順利……"
10018100-47 = "但完全依賴手工的麻雀亭，真的有辦法準備足夠的數量嗎……？"
10018100-49 = "居然會擔心對手的情況，喵食品的會長真是心胸寬闊呢！"
10018100-50 = "那麼，究竟麻雀亭有沒有完成100份御節料理呢？"
10018100-53 = "（呣呵呵呵，那怎麼可能呢）"
10018100-54 = "（我們也做了不少干擾工作。#n　何況要在短時間內完成100份餐盒，一共約400人份的料理本來就是天方夜譚）"
10018100-55 = "（結果已經顯而易見了。#n　麻雀亭的老闆娘，將會因為端不出料理而難堪……）"
10018100-56 = "（而我將會以廣闊的心胸，原諒他的失敗！）"
10018100-58 = "這……"
10018100-59 = "多虧大家的幫忙，我們也準備好了100份御節料理。"
10018100-64 = "什麼！？"
10018100-66 = "哦哦，不愧是在這條街獲得高評價的麻雀亭！#n即便沒有像喵食品那樣的機器，也能準備大量的料理！"
10018100-67 = "究竟是如何準備如此大量的御節料理的呢！？"
10018100-68 = "這都多虧了幾位夥伴的鼎力協助。"
10018100-69 = "我來為各位介紹。"
10018100-77 = "啊，大家好。我是格黑娜供給部的愛清風華。請多指教。"
10018100-78 = "我是格黑娜美食研究會的黑舘羽留奈。"
10018100-80 = "什麼！大家看到了嗎！"
10018100-81 = "是那個格黑娜的供給部和美食研究會！"
10018100-82 = "他們竟然攜手合作，這到底是怎麼回事！？#n難不成明天太陽會打西邊出來嗎！？"
10018100-83 = "沒想到麻雀亭的背後，居然有這樣的合作關係！"
10018100-84 = "我，川流詩音！就算此時此刻在現場親眼見證，也不敢相信是真的！"
10018100-86 = "（就，就算這樣……也不用擔心）"
10018100-87 = "（要在短時間內完成這麼多的量，只靠手工製作的話，肯定有味道參差不齊的問題）"
10018100-88 = "（而我們的食品都是由機器精準控制的）"
10018100-89 = "試吃的時間差不多到了！"
10018100-90 = "今天的勝負，將會由對味道嚴格而聞名的商會成員們進行評判！"
10018100-94 = "啊，也有我的份嗎？"
10018100-95 = "非常感謝！"
10018100-99 = "御節料理啊。好久沒有吃了……"
10018100-100 = "好吃是好吃，但甜食居多，吃久了實在很容易膩。"
10018100-101 = "而且做起來很費工，不符合勞力成本。"
10018100-108 = "等等，這個味道……！？"
10018100-111 = "老實說，我並不怎麼喜歡御節料理。"
10018100-112 = "現在這個時代，這種口味可能已經不太受歡迎了。#n不過看起來賞心悅目也是個優點吧。"
10018100-116 = "這邊是喵食品的御節料理嗎……"
10018100-121 = "嚼嚼。#n嗯，味道就和想像中差不多。"
10018100-122 = "我從麻雀亭那邊開始吃吧。"
10018100-126 = "……嗯？"
10018100-127 = "等等，你也來吃吃看這個吧。"
10018100-129 = "其實我還是第一次吃裝在餐盒裡的御節料理！真是令人期待！"
10018100-130 = "啊，正好。我正想請新聞部幫我們商會宣傳一下。"
10018100-131 = "我們到場就已經達到宣傳的效果了吧？"
10018100-132 = "這點反而讓人有點擔心，該怎麼說才好……"
10018100-137 = "咦？御節料理……是這麼有層次的嗎？"
10018100-138 = "感謝款待！"
10018100-139 = "哦……？"
10018100-140 = "我也趕緊嘗嘗……"
10018100-148 = "哦哦哦哦哦哦哦哦哦哦！？"
10018100-151 = "各位觀眾，請先不要轉台！"
10018100-152 = "由喵食品舉辦的新春御節料理對決即將迎來高潮！"
10018100-153 = "終於到了評判結果出爐的時刻！"
10018100-158 = "（能做的都做了……就等待結果出爐吧）"
10018100-159 = "（不管怎麼看，我都是勝券在握。呣呵呵呵）"
10018100-164 = "這是！票數差距竟然會如此懸殊！"
10018100-166 = "（沒事先想好獲勝感言呢。真是的，當贏家也是很麻煩的呢）"
10018100-167 = "（先適當地對老闆娘說些安慰的話……然後再說些能提升形象的謙虛發言……）"
10018100-168 = "（說是這麼說，但約定就是約定）"
10018100-173 = "這是沒有人能預料到的結果！"
10018100-174 = "獲勝的是麻雀亭！"
10018100-176 = "沒錯沒錯……果然是麻雀亭……"
10018100-180 = "什麼！？"
10018100-182 = "做到了！我們成功了！！"
10018100-183 = "怎麼會……真是不敢相信。"
10018100-184 = "真的非常感謝大家……！"
10018100-186 = "這怎麼可能！一定是哪裡搞錯了！"
10018100-187 = "這可是100份餐盒耶，100份！算下來相當於400人份！"
10018100-188 = "如此龐大的數量，光憑手工怎麼可能做的好吃，還能維持品質一致呢！"
10018100-189 = "我們的食品都是由機器精準控制，不可能會輸給純手工的御節料理！"
10018100-191 = "您也想得太天真了吧，會長？"
10018100-200 = "你，你是！"
10018100-201 = "御節料理一般都給人膩口的印象。#n這是因為超過一半的菜色都帶有甜味。"
10018100-202 = "而甜味的缺點就在於容易吃膩。"
10018100-203 = "原本就容易膩的味道、化工調味料的使用，再加上標準化流程的反覆烹煮……"
10018100-204 = "結果會是如何，稍微嘗一下就知道了吧？"
10018100-205 = "這，這點你們不也一樣嗎！"
10018100-207 = "因此我們在餘韻上下了功夫。"
10018100-208 = "使用薑、芝麻、辣椒絲等等副食材，在單調的調味中增加變化。"
10018100-209 = "不只是這樣而已。#n喵食品還混用了劣質食材，試圖以化工調味來魚目混珠。"
10018100-210 = "但是食材品質的下降，依然是無法避免的問題。"
10018100-212 = "而這將直接關係到口感！"
10018100-213 = "即便雙方都是用同樣的香菇，人們往往也會偏好口感更好的那種！"
10018100-215 = "可是……！"
10018100-216 = "你們又是怎麼在那麼短的時間內，完成400人份的餐點的！"
10018100-218 = "這個嘛……茱莉？"
10018100-219 = "我們供給部每天要做多少人份的餐點？"
10018100-220 = "要做4,000人份，前輩……"
10018100-221 = "這種程度對我們來說，只是每天的例行公事而已……"
10018100-222 = "再加上我們就連多一匙糖、一滴醬油也絕不妥協，對味道嚴格把關的美食研究會──"
10018100-224 = "這場對決的勝利，從一開始就是我們的！"
10018100-229 = "真是驚人的結果啊！"
10018100-230 = "而且堂堂正正地說出了獲勝的祕訣！"
10018100-231 = "現場的氣氛上升到了最高點！"
10018100-235 = "呃呃呃，我才不會認可！結果是這樣又如何！"
10018100-236 = "會，會長！？"
10018100-241 = "饕餮頭盔團！喵食品預備隊！上吧，教訓那些狂妄的傢伙！"
10018100-248 = "唉……到頭來還是得打一場嗎。"
10018100-254 = "這也是在工作，可別埋怨我啊。"
10018100-259 = "埋怨是嗎……"
10018100-260 = "你認真覺得能贏得了我們嗎？"
10018100-261 = "哎呀★事情又變得有趣起來了。"
10018100-262 = "我早就猜到那個大叔會來這套。"
10018100-263 = "哇，輪到我們出場了嗎？"
10018100-265 = "現場的氣氛竟然一百八十度大轉彎！"
10018100-266 = "喵食品將對上有「奇普托斯最惡恐怖份子」之稱的美食研究會！"
10018100-267 = "我們會繼續直播現場的狀況！"
10018100-268 = "請千萬不要轉台！"

[translation]
10018100-1 = "ตอนที่ 10;วันแห่งโชคชะตา"
10018100-9 = "สวัสดีค่ะท่านผู้ชมทุกท่าน!"
10018100-10 = "ปีนี้เป็นอย่างไรกันบ้างคะ? เตรียมพร้อมสำหรับการฉลองปีใหม่ที่ใกล้เข้ามาแล้วใช่มั้ยคะ?"
10018100-11 = "ฉันคือนักข่าวไอดอลแห่งชมรมข่าวจากโครโนส! คาวารุ ชิน่อนค่ะ!"
10018100-15 = "ถ้าอย่างนั้น~ มีใครทราบไหมคะว่าที่นี่คือที่ไหน? ทราบรึเปล่าคะ?"
10018100-16 = "ถึงไม่ทราบก็ไม่เป็นไรค่ะ!"
10018100-18 = "ก่อนที่พวกเราจะทราบข่าว พวกเราก็คิดว่าที่นี่คือย่านการค้าธรรมดาเหมือนกันค่ะ!"
10018100-19 = "แต่ว่า... มีใครรู้จัก <เนียโอโมโตะ ฟู้ด> บ้างมั้ยคะ? หลายๆ ท่านอาจจะพอคุ้นหูกันอยู่สินะคะ"
10018100-20 = "เนียโอโมโตะ ฟู้ด หรือเรียกสั้นๆ ว่าเนียวฟู้ด บริษัทขายอาหารยักษณ์ใหญ่ที่มีขยายกิจการไปทั่ว#nคิโวทอสอย่างรวดเร็วค่ะ!"
10018100-21 = "และวันนี้ฉันได้รับแจ้งว่าจะมี \"การแข่งขันทำโอเซจิรับปีใหม่\" ที่ทางเนียโอโมโตะ ฟู้ดเป็นเจ้าภาพค่ะ!"
10018100-22 = "ปรบมือ! "
10018100-23 = "รายการของเราได้รับการสนับสนุนจากทางเนียโอโมโตะ ฟู้ด และได้เชิญแขกพิเศษมาร่วมรายการกับ#nเราในวันนี้ด้วยค่ะ"
10018100-24 = "ประธานของเนียโอโมโตะ ฟู้ด คุณเนียโอโมโตะ คันค่ะ!"
10018100-31 = "ฮุฮุฮุฮุ... ยินดีที่ได้พบทุกท่าน"
10018100-32 = "ขอบคุณทุกท่านที่ให้ความสนใจการแข่งขันเล็กๆ ของเรา"
10018100-34 = "และผู้ท้าแข่ง...!"
10018100-35 = "เจ้าของร้านดั้งเดิมที่ใส่ใจเรื่องรสชาติ และไม่ยอมแพ้ต่อความแปลกใหม่ของบริษัทยักษ์ใหญ่อย่าง#nเนียวฟู้ด!"
10018100-36 = "คุณเจ้าของร้านซุซุเมะค่ะ!"
10018100-42 = "สะ... สวัสดีค่ะ... ขอรบกวนด้วยนะคะ..."
10018100-43 = "กติกาการแข่งขันเรียบง่ายมาก ทางเนียวฟู้ดและร้านซุซุเมะ..."
10018100-44 = "ได้ตกลงกันว่าจะเตรียมเบนโตะโอเซจิมาคนละ 100 ชุด"
10018100-45 = "ถึงวันนี้ก็จะเป็นวันตัดสินแล้ว แต่เราก็แอบกังวลอยู่เหมือนกัน..."
10018100-46 = "สำหรับเนียวฟู้ดแล้วการเตรียมเบนโตะโอเซจิจำนวน 100 กล่องอาจไม่ใช่เรื่องยากสักเท่าไร"
10018100-47 = "แต่ร้านซุซุเมะที่ปรุงอาหารโฮมเมดทุกขั้นตอนน่ะ... จะทำเบนโตะจำนวนมากขนาดนั้นได้หรือเปล่า...?"
10018100-49 = "อย่างนี้นี่เอง! ท่านประธานช่างใจกว้างจริงๆ ที่คำนึงถึงสถานการณ์ของคู่แข่งขันด้วย!"
10018100-50 = "ถ้าอย่างนั้น คุณเจ้าของร้านซุซุเมะว่ายังไงบ้างคะ?!"
10018100-53 = "(ฮุฮุฮุฮุ... จะทำไหวได้ยังไงเล่า)"
10018100-54 = "(เจอแผนการขัดขวางไปตั้งเยอะ ไม่มีทางทำเบนโตะ 100 ชั้น ไม่สิ อาหารสำหรับ 400 คนเสร็จทันใน#nเวลาสั้นๆ ได้หรอก)"
10018100-55 = "(เท่านี้ก็รู้ผลแล้วว่าต่อไปจะเกิดอะไรขึ้น เจ้าของร้านซุซุเมะก็จะต้องรู้สึกอับอาย และร้องไห้เสียใจที่ทำ#nอาหารไม่ทันแข่งขัน)"
10018100-56 = "(ส่วนเราก็จะทำทีเป็นเห็นอกเห็นใจ และชนะไปได้อย่างสวยงาม!)"
10018100-58 = "ค่ะ..."
10018100-59 = "อาจเป็นเพราะความใจกว้างของท่านประธาน พวกเราถึงทำเบนโตะโอเซจิจำนวน 100 ชุดได้สำเร็จค่ะ"
10018100-64 = "ว่าไงนะ?!"
10018100-66 = "โอ้! อย่างนั้นเองเหรอคะ! ฝีมือการทำอาหารที่ไม่เกรงกลัวการผลิตปริมาณมากของเนียวฟู้ด!"
10018100-67 = "ขอถามถึงเคล็ดลับหน่อยได้มั้ยคะ?"
10018100-68 = "เพราะมีหลายๆ คนคอยช่วยเหลือเราอยู่ค่ะ"
10018100-69 = "ฉันจะแนะนำให้รู้จักนะคะ"
10018100-77 = "สะ... สวัสดีค่ะ ไอกิโยะ ฟูกะจากชมรมโภชนาการสถาบันเกเฮนน่าค่ะ ขอฝากตัวด้วยนะคะ"
10018100-78 = "คุโรดาเตะ ฮารุนะจากชมรมชิมอาหารสถาบันเกเฮนน่าค่ะ"
10018100-80 = "โอ้ว้าว! ทุกท่านคะ ดูนั่นสิคะ!"
10018100-81 = "ชมรมโภชนาการกับชมรมชิมอาหารของเกเฮนน่าค่ะ!"
10018100-82 = "สองชมรมนี้ผนึกกำลังกันงั้นหรือ... เกิดอะไรขึ้นกันแน่คะ! หรือว่าพรุ่งนี้สถาบันเกเฮนน่าจะถึงคราวล่ม#nสลายแล้ว?!"
10018100-83 = "เบื้องหลังความสำเร็จของร้านซุซุเมะ คือการผนึกกำลังที่เหนือความคาดหมายของทั้งสองชมรมนี้เอง#nสินะคะ!"
10018100-84 = "คาวารุ ชิน่อนผู้นี้... เห็นกับตาแล้วแต่ก็ยังไม่อยากเชื่อเลยค่ะ!"
10018100-86 = "(ตะ...แต่ว่าไม่ต้องกังวลหรอก)"
10018100-87 = "(เบนโตโฮมเมด 100 ชุดที่ทำลวกๆ ในระยะเวลาสั้นๆ)"
10018100-88 = "(ไม่มีทางอร่อยกว่าอาหารจากโรงงานที่ควบคุมการผลิตอย่างดีทุกขั้นตอนหรอก!)"
10018100-89 = "เอาละค่ะ ศึกตัดสินที่แท้จริงกำลังจะเริ่มขึ้นแล้วค่ะ!"
10018100-90 = "และผู้ตัดสินคือเหล่าคนขายของในย่านการค้าที่ได้รับการขนานนามว่าเป็นผู้ที่ละเอียดอ่อนในการลิ้ม#nรสอาหารค่ะ!"
10018100-94 = "อา... ฉันชิมด้วยได้งั้นเหรอคะ?"
10018100-95 = "ขอบคุณมากค่ะ!"
10018100-99 = "ไม่ได้กินโอเซจิมานานเลยนะเนี่ย..."
10018100-100 = "โอเซจิก็อร่อยอยู่หรอก แต่มันหวานมากเลยกินได้ไม่เยอะน่ะ"
10018100-101 = "ขั้นตอนการทำมันยุ่งยาก เลยไม่ค่อยทำกินที่บ้านน่ะ"
10018100-108 = "เดี๋ยวนะ รสชาติแบบนี้...?!"
10018100-111 = "อันที่จริง ฉันไม่ได้ชอบโอเซจิเท่าไรน่ะ"
10018100-112 = "เป็นอาหารที่ไม่ค่อยเหมาะกับยุคนี้เท่าไรแล้วด้วย แต่ได้ชิมโอเซจิอร่อยๆ แบบนี้ก็ไม่แย่เท่าไหร่นะ"
10018100-116 = "ด้านนี้เป็นโอเซจิของเนียวฟู้ดงั้นเหรอ..."
10018100-121 = "ง่ำๆ อืม... รสชาติดีอย่างที่คิดเลยแฮะ"
10018100-122 = "ถ้างั้น เบนโตะของร้านซุซุเมะ..."
10018100-126 = "หืม?"
10018100-127 = "นี่ เดี๋ยวนะ ลองชิมนี่ดูสิ"
10018100-129 = "บอกตามตรงว่านี่เป็นครั้งแรกที่ฉันได้ชิมโอเซจิแบบต้นตำหรับค่ะ! น่าตื่นเต้นจังเลยค่ะ?"
10018100-130 = "ถือว่าเป็นโอกาสดีเลย งั้นก็โปรโมตย่านการค้าของเราไปด้วยเลยก็แล้วกันนะ"
10018100-131 = "ชมรมนักข่าวของโรงเรียนโครโนสมาที่นี่แล้ว ยังโปรโมตไม่พออีกงั้นเหรอคะ?"
10018100-132 = "เรื่องนั้นมันก็มีบางอย่างที่น่ากังวลอยู่..."
10018100-137 = "เอ๋? โอเซจิ... เป็นอาหารที่รสชาติล้ำลึกแบบนี้เลยงั้นเหรอคะ?"
10018100-138 = "สุดยอดเลยค่ะ!"
10018100-139 = "หืม?"
10018100-140 = "ถ้างั้นไหนลองชิมดูหน่อยซิ..."
10018100-148 = "โอ้วววว?!"
10018100-151 = "เห็นรึเปล่าคะท่านผู้ชม!"
10018100-152 = "การแข่งประชันทำอาหารฉลองปีใหม่ที่ทางเนียวฟู้ดเป็นเจ้าภาพ กำลังมาถึงจุดสำคัญแล้วค่ะ!"
10018100-153 = "ถึงเวลาตัดสินแล้วค่ะ!"
10018100-158 = "(เราทำเต็มที่แล้ว... ที่เหลือก็แค่รอผลตัดสินเท่านั้น)"
10018100-159 = "(ดูยังไงชัยชนะก็ต้องเป็นของฉัน... จริงแท้ไม่มีเปลี่ยน ฮุฮุฮุฮุ)"
10018100-164 = "และผู้ชนะที่ได้คะแนนโหวตถล่มทลาย!"
10018100-166 = "(พอชนะแล้วควรพูดยังไงดีนะ ให้ตายๆ บางครั้งเป็นฝ่ายที่มีอำนาจมากกว่าก็น่าลำบากใจเหมือนกันนะ)"
10018100-167 = "(งั้นก็ทำท่าทางเกรงใจเจ้าของร้านนั่นแบบกรุบกริบ... แล้วก็ถ่อมตัวนิดหน่อย...)"
10018100-168 = "(เรื่องนั้นก็ส่วนเรื่องนั้น เรื่องที่ต้องจัดการก็ควรจัดการตามที่เป็น...)"
10018100-173 = "และนี่คือผลการตัดสินที่เหนือความคาดหมาย!"
10018100-174 = "ผู้ชนะคือร้านซุซุเมะค่ะ!"
10018100-176 = "ใช่แล้วๆ... ร้านซุซุเมะตามคาด..."
10018100-180 = "ว่าไงนะ?!?!"
10018100-182 = "ทำได้แล้วค่ะ! พวกเราทำได้แล้วค่ะ!"
10018100-183 = "เหลือเชื่อจริงๆ... นะคะ"
10018100-184 = "ขอบคุณ... ขอบคุณทุกคนจริงๆ ค่ะ...!"
10018100-186 = "เป็นไปไม่ได้! ต้องมีอะไรผิดพลาดแน่ๆ!"
10018100-187 = "เบนโตะ 100 ชุดเลยนะ! เท่ากับอาหารสำหรับ 400 คนเลยนะ!"
10018100-188 = "อาหารโฮมเมดที่ทำปริมาณเยอะ คุณภาพก็ต้องตกลงอยู่แล้วสิ!"
10018100-189 = "ของแบบนั้นจะดีกว่าอาหารที่ปรุงขึ้นในโรงงานที่มีการควบคุมทุกขั้นตอนได้ยังไง!"
10018100-191 = "หงุดหงิดเกินไปแล้วรึเปล่าคะท่านประธาน?"
10018100-200 = "นี่เธอ!"
10018100-201 = "โอเซจิน่ะ เป็นอาหารที่ทานแล้วเลี่ยนได้ง่าย เพราะอาหารส่วนใหญ่เป็นอาหารที่มีรสหวานค่ะ"
10018100-202 = "และข้อเสียของรสหวานก็คือจะทำให้รู้สึกเลี่ยนได้ง่ายค่ะ"
10018100-203 = "อาหารที่เลี่ยนง่ายอยู่แล้ว กลับถูกนำไปปรุงรสด้วยเครื่องปรุงสังเคราะห์ด้วยกระบวนการซ้ำเดิมหลายๆ ครั้ง"
10018100-204 = "คนที่ชิมอาหารพวกนั้นคงไม่ต้องคิดเยอะเลยค่ะ"
10018100-205 = "ระ... เรื่องนั้นพวกเธอก็ทำเหมือนกันไม่ใช่รึไง!"
10018100-207 = "เพราะงั้นฉันถึงสร้างความแตกต่างให้รสชาติหลังจากกินอาหาร "
10018100-208 = "โดยใช้เครื่องเทศต่างๆ เช่น ขิง งา แล้วก็พริกขูดฝอยค่ะ"
10018100-209 = "ไม่ใช่แค่นั้นนะคะ เนียวฟู้ดพยายามเสริมรสชาติวัตถุดิบคุณภาพแย่โดยใช้เครื่องปรุงสังเคราะห์คุณภาพ#nต่ำสินะคะ"
10018100-210 = "แต่ว่าการเสื่อมคุณภาพของวัตถุดิบคุณภาพต่ำก็เป็นสิ่งที่หลีกเลี่ยงไม่ได้ค่ะ"
10018100-212 = "ซึ่งก็จะทำให้เกิดปัญหาเรื่องรสสัมผัสเวลาเคี้ยวหรือกลืนค่ะ! "
10018100-213 = "ถึงจะเป็นเห็ดหอมชนิดเดียวกัน แต่คนก็จะชอบเห็ดที่มีความนุ่มน่าเคี้ยวมากกว่าค่ะ!"
10018100-215 = "แต่ว่า...!"
10018100-216 = "ทั้งที่มีเวลาแค่นี้ พวกเธอทำอาหารสำหรับ 400 คนมาได้ยังไงกัน?!"
10018100-218 = "นี่... จูริ?"
10018100-219 = "ปกติชมรมโภชนาการของเราทำอาหารสำหรับกี่คนนะ?"
10018100-220 = "4,000 คนค่ะรุ่นพี่..."
10018100-221 = "คุณลองคิดว่าตัวเองทำอาหารปริมาณนั้นทุกวันดูบ้างสิคะ... จะทำได้ก็ไม่แปลก"
10018100-222 = "นอกจากนี้ก็ยังมีชมรมชิมอาหารที่คอยตรวจสอบรสชาติอย่างละเอียด น้ำตาลหนึ่งช้อน ซีอิ๊วหนึ่งหยด#nก็ไม่ขาดไม่เกิน!"
10018100-224 = "เพราะงั้น พวกเราเลยชนะมาตั้งแต่แรกแล้วค่ะ!"
10018100-229 = "เป็นผลตัดสินที่น่าทึ่งมากค่ะ!"
10018100-230 = "นอกจากนี้ยังใจเด็ดกล้าเปิดเผยเคล็ดลับของชัยชนะอีกด้วย!"
10018100-231 = "สถานการณ์ที่ลานแข่งเดือดจัดเลยค่ะคุณผู้ชม!"
10018100-235 = "ฮึ่ย ยอมรับไม่ได้เด็ดขาด! ผลลัพธ์บ้าบออะไร อาหารบ้าบออะไรกัน!"
10018100-236 = "ทะ...ท่านประธาน...?!"
10018100-241 = "แก๊งหมวกกันน็อกคุรุเมะ หน่วยสนับสนุนเนียวฟู้ด! พวกแกรีบไปสั่งสอนเจ้าเด็กพวกนั้นเดี๋ยวนี้!"
10018100-248 = "ก็นะ... สุดท้ายก็จบแบบนี้เหรอเนี่ย "
10018100-254 = "มันเป็นงานนี่นะ อย่าขุ่นเคืองกันทีหลังแล้วกัน"
10018100-259 = "น่าหงุดหงิดชะมัด"
10018100-260 = "ใช้คำพูดได้ไม่รื่นหูเลยนะคะ"
10018100-261 = "ตายจริง★ แบบนี้ได้มีเรื่องสนุกๆ แน่เลยค่ะ"
10018100-262 = "คิดแล้วเชียวว่าถ้าเป็นตาลุงนี่จะต้องลงเอยแบบนี้"
10018100-263 = "ว้าว ถึงตาพวกเราออกโรงแล้วสินะ?"

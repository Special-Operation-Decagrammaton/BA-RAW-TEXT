[translation]
10018100-1 = "Episode 10; The Fated Day"
10018100-9 = "Hello to all our viewers!"
10018100-10 = "How was your year? Are you ready to greet the new one?"
10018100-11 = "It's Kronos School of Journalism's idol reporter, Kawaru Shinon!"
10018100-15 = "Does anyone know where I am right now?"
10018100-16 = "Don't feel bad if you don't!"
10018100-18 = "We thought it was just an ordinary shopping district before we heard the news!"
10018100-19 = "Have you heard of Nyaomoto Foods? I'm sure plenty of you have!"
10018100-20 = "Nyaomoto Foods, also known as Nyao Foods, is a food company that has been rapidly expanding throughout Kivotos!"
10018100-21 = "Today we received a report that a New Year's osechi cook-off hosted by Nyaomoto Foods will be held here!"
10018100-22 = "*clap* *clap* *clap*"
10018100-23 = "Today's sponsor is none other than Nyaomoto Foods itself! And they've provided a special guest for today."
10018100-24 = "It's Nyaomoto Kan, president of Nyaomoto Foods!"
10018100-31 = "Mwahahaha. Nice to meet you, everyone."
10018100-32 = "Thank you for your interest in this modest event. Mwahahaha."
10018100-34 = "And challenging Nyao Foods..."
10018100-35 = "They're a traditional local owner counting on taste to secure victory against this emerging conglomerate power!"
10018100-36 = "It's the owner of Sparrow!"
10018100-42 = "H-Hello. Nice to meet everyone..."
10018100-43 = "The rules of the contest are simple."
10018100-44 = "Whoever makes the best hundred stacks of osechi wins."
10018100-45 = "Honestly, I'm concerned for my opponent."
10018100-46 = "We at Nyao Foods used cutting-edge tech and mass production systems to prepare our osechi without incident."
10018100-47 = "But Sparrow relies on manual labor, so I worry how they handled such quantity..."
10018100-49 = "I see! How generous of you to care about the circumstances of the opponent, Mr. Nyao!"
10018100-50 = "How's the atmosphere at Sparrow?!"
10018100-53 = "(Mwahahaha. It's impossible.)"
10018100-54 = "(As if one hundred stacks of osechi wasn't hard enough, there's no way they survived the sabotage.)"
10018100-55 = "(I can see it now. Sparrow's owner in tears, embarrassed for coming to the contest without even the required amount of food.)"
10018100-56 = "(And then, finally, my magnanimity...)"
10018100-58 = "Well..."
10018100-59 = "Thanks to everyone's support, we were able to make a hundred stacks of osechi."
10018100-64 = "What?!"
10018100-66 = "Wow! You're saying Sparrow can compete with the mass production method of Nyao Foods?!"
10018100-67 = "Can we ask your secret?!"
10018100-68 = "It's thanks to everyone who supported us."
10018100-69 = "I'll introduce them to you."
10018100-77 = "H-Hello, I'm Aikiyo Fuuka of Gehenna's School Lunch Club. Nice to meet everyone."
10018100-78 = "And I'm Kurodate Haruna of the Gourmet Research Society of Gehenna."
10018100-80 = "Oh! Attention! Everyone!"
10018100-81 = "The School Lunch Club and Gourmet Research Society of Gehenna are both here!"
10018100-82 = "Isn't it incredible to see them working together?! What's going on in Gehenna?!"
10018100-83 = "An unprecedented collaboration is driving Sparrow's success!"
10018100-84 = "I, Kawaru Shinon, cannot believe what I'm seeing!"
10018100-86 = "(N-Nothing to worry about.)"
10018100-87 = "(That much homemade food in such a short time...)"
10018100-88 = "(There's no way it can beat food made with industrial precision!)"
10018100-89 = "And now! The battle begins!"
10018100-90 = "Today's judges will be members of the Merchants Guild, all known for their picky taste!"
10018100-94 = "Wait, I can try it too?"
10018100-95 = "Thank you!"
10018100-99 = "It's been a while since I had osechi..."
10018100-100 = "Osechi's good, but I get sick of it after a while because it's so sweet."
10018100-101 = "And it's just so hard to make at home because it's so elaborate."
10018100-108 = "Wait, this taste...?!"
10018100-111 = "I don't even like osechi that much."
10018100-112 = "Yeah, it's not that popular these days. But hey, it's nice to look at."
10018100-116 = "This is the osechi from Nyao Foods..."
10018100-121 = "*chew* Well, it tastes as expected. Exactly as expected..."
10018100-122 = "And this is Sparrow's..."
10018100-126 = "Hmm?"
10018100-127 = "Hey. Hurry up and try this."
10018100-129 = "You know, I've actually never had osechi before. Isn't it exciting?"
10018100-130 = "That's great. You know what else is great? This district. You should promote it."
10018100-131 = "Don't you think the Kronos School of Journalism being here is already enough promotion?!"
10018100-132 = "Right, well, I was just thinking..."
10018100-137 = "My god! I didn't know osechi could be this tasty!"
10018100-138 = "Amazing!"
10018100-139 = "Oh?"
10018100-140 = "Let me try..."
10018100-148 = "Oh!"
10018100-151 = "Everyone, are you watching closely?"
10018100-152 = "This New Year Cook-Off, sponsored by Nyao Foods, is reaching its peak!"
10018100-153 = "And now, time to decide the winner!"
10018100-158 = "(I've done my best... All I can do now is wait for the results.)"
10018100-159 = "(Victory was decided before the cooking even started. My victory is a fact waiting to be discovered. Mwahahaha.)"
10018100-164 = "The winner, by a landslide...!"
10018100-166 = "(I should have prepared a victory speech. Honestly, being so in control is almost burdensome.)"
10018100-167 = "(Naturally, feign humility, generosity, let the win speak for itself... Well, maybe I can speak for the win too...)"
10018100-168 = "(Yes, like an assembly line, everything always proceeds as planned.)"
10018100-173 = "What an unexpected result! No one could have predicted this!"
10018100-174 = "Sparrow wins!"
10018100-176 = "Yes, yes, condolences to Sparrow..."
10018100-180 = "What?!?!"
10018100-182 = "Anything is possible! Anything is possible!!!!!!"
10018100-183 = "I-I can't believe this."
10018100-184 = "Thank you so much, everyone!"
10018100-186 = "L-Let's just hold on a second! There must be a mistake!"
10018100-187 = "A hundred stacks?! For four hundred people in total?!"
10018100-188 = "It's homemade food! There must be inconsistent quality!"
10018100-189 = "My food was mathematically designed to be efficiently tasty! What more do you want?!"
10018100-191 = "Maybe you took this too lightly, Chairman Nyao."
10018100-200 = "You!"
10018100-201 = "People say they get sick of osechi because it's usually mostly sweet."
10018100-202 = "It's easy for people to get tired of sweet food."
10018100-203 = "On top of that, the food was drowning in synthetic seasonings."
10018100-204 = "If you've tasted it once, you've tasted it a hundred times."
10018100-205 = "Wh-Why are you pretending you're any different?!"
10018100-207 = "We are different, and we had different aftertastes."
10018100-208 = "We selectively used various minor ingredients such as ginger, sesame, and shredded red pepper."
10018100-209 = "That's not all. Nyao Foods mindlessly mixed low-quality ingredients with synthetic seasonings."
10018100-210 = "But no amount of seasonings can cover the poor quality of those ingredients."
10018100-212 = "Texture and mouthfeel matter too!"
10018100-213 = "Even if shiitake mushrooms taste the same, people usually prefer them slightly chewier!"
10018100-215 = "B-But!"
10018100-216 = "How were you able to make food for four hundred people in such a short time?!"
10018100-218 = "Oh, that? Juri?"
10018100-219 = "How many servings does the School Lunch Club prepare every day?"
10018100-220 = "Hmm... Four thousand or so?"
10018100-221 = "I can't believe Nyao Foods would be so worried about a mere four hundred servings..."
10018100-222 = "And regardless of the serving size, the Gourmet Research Society can tell the difference between a teaspoon of sugar too much or a drop of soy sauce too little!"
10018100-224 = "Our victory was inevitable from the beginning!"
10018100-229 = "What an incredible result!"
10018100-230 = "The courage to reveal the secrets of their success!"
10018100-231 = "This scene is full of excitement!"
10018100-235 = "Ugh, who gives a damn! Who cares about the contest? Who cares about food?!"
10018100-236 = "Ch-Chairman Nyao?!"
10018100-241 = "Gourmet Helmet Gangsters! Nyao Foods reserve corps! Punish them!"
10018100-248 = "Ugh, I can't believe this ended in even more work for us."
10018100-254 = "Work is work. Try not to be resentful."
10018100-259 = "Resentful..."
10018100-260 = "Interesting word choice."
10018100-261 = "What an interesting development. ★"
10018100-262 = "I knew it would come to this."
10018100-263 = "Yay! Time to work off all this delicious food!"
10018100-265 = "The scene is reaching an even greater climax!"
10018100-266 = "A duel between Nyao Foods and the Gourmet Research Society, the notorious terrorist group of Kivotos!"
10018100-267 = "Don't go anywhere, folks!"
10018100-268 = "This broadcast is far from over!"

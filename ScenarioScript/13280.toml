[translation]
13280-1 = "ตอนที่ 28;สงครามร้อน 1"
13280-3 = "#timelineNS;ScCutScene/ScCutScene_13000_01"
13280-8 = "แฮ่ก... แฮ่ก..."
13280-12 = "..."
13280-17 = "(ยากกว่าที่คิดอีกแฮะ ยัยนี่... คาดเดาการกระทำของฉันได้แทบทั้งหมดเลย...)"
13280-21 = "(แต่ฉันคาดเดาการกระทำของยัยนั่นไม่ได้เลย ไม่รู้เลยสักนิดว่าคิดอะไรอยู่...)"
13280-23 = "(อึก... ฉันไม่มีเวลามาดวลกับประธานกรรมการวินัยอยู่หรอกนะ...!)"
13280-27 = "กำลังวางแผนอะไรอยู่สินะ"
13280-32 = "ล้มเลิกซะเถอะ ทาคานาชิ โฮชิโนะ"
13280-36 = "#timelineNS;ScCutScene/ScCutScene_13000_02"
13280-41 = "เฮ้อ... คงทิ้งระยะห่างได้แล้วเนอะ..."
13280-42 = "ประธานกรรมการวินัยเกเฮนน่า... ทำไมถึงมาอยู่ที่นี่ตอนนี้ได้..."
13280-43 = "ถึงจะต่อสู้กันแค่แป๊บเดียว แต่ก็เป็นคู่ต่อสู้ที่แข็งแกร่งใช้ได้เลย"
13280-44 = "แล้วสุดท้ายก็เป็นฉันที่เป็นฝ่ายหนีมาซะได้... แต่ก็เอาเถอะ ยังไงตอนนี้ปืนแม่เหล็กไฟฟ้าก็สำคัญกว่า..."
13280-50 = "สถานีโอเอซิสใหญ่งั้นเหรอ...?"
13280-51 = "เฮ้อ... ทำไมต้องเป็นที่นั่นด้วยนะ"
13280-52 = "..."
13280-65 = "อะไรกัน? ข้างบนนั่น...?"
13280-66 = "ระ... หรือว่า...?!"
13280-72 = "...!!!"
13280-87 = "นึกไม่ถึงเลยนะว่าจะหนีมา"
13280-88 = "เมื่อกี้พูดเรื่องสู้แบบ 1:1 ไว้ว่ายังไงนะ?"
13280-91 = "อะ... อึกก...!"
13280-94 = "เอาละ มาดวลกันอีกครั้งสิ ทาคานาชิ โฮชิโนะ"
13280-96 = "ตอนต่อไป;สงครามร้อน 2"

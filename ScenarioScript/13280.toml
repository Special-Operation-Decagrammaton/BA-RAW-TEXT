[translation]
13280-1 = "第28話;激戰（１）"
13280-3 = "#timelineNS;ScCutScene/ScCutScene_13000_01"
13280-8 = "……哈啊，哈啊。"
13280-12 = "……"
13280-17 = "（比想像中還棘手。#n　我的一舉一動……幾乎都在他的意料之內……）"
13280-21 = "（但我卻無法反過來預測，甚至根本讀不出他的想法……）"
13280-23 = "（可惡……我可沒時間在這裡對付風紀委員長……！）"
13280-27 = "你似乎在策劃什麼啊。"
13280-32 = "放棄吧。小鳥遊星野。"
13280-36 = "#timelineNS;ScCutScene/ScCutScene_13000_02"
13280-41 = "……呼。甩開了嗎？"
13280-42 = "格黑娜的風紀委員長……怎麼會出現在這裡……"
13280-43 = "雖然只稍微交手了一下，不過他還真難纏。"
13280-44 = "……結果居然逃跑了啊。#n算了，現在要先把列車砲……"
13280-50 = "大綠洲站……？"
13280-51 = "……哈哈，為什麼偏偏是那裡。"
13280-52 = "……"
13280-65 = "上面……？"
13280-66 = "難，難道是……！？"
13280-72 = "……！！！"
13280-87 = "沒想到你會逃跑啊。"
13280-88 = "剛才不是說從來沒在一對一的對決中輸過嗎？"
13280-91 = "唔……！"
13280-94 = "來，我們繼續吧。小鳥遊星野。"
13280-96 = "下一話;激戰（２）"

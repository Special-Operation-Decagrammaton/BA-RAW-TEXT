[translation]
83306040100-6 = "อ่า... เอ่อ... จะทำยังไงดี"
83306040100-7 = "หืม? มีเรื่องอะไรเหรอ?"
83306040100-8 = "ทะ... ท่านประธาน?!  มะ... มาทำอะไรที่นี่คะ...!"
83306040100-9 = "ฉันมาตรวจตราดู เผื่อว่าจะมีเหตุฉุกเฉินอะไรน่ะ"
83306040100-10 = "แต่ว่า... เหมือนจะมีเหตุการณ์อะไรเกิดขึ้นรึเปล่า?"
83306040100-11 = "คะ... คือว่า..."
83306040100-12 = "ขะ... ขอโทษด้วยค่ะ! พอดีระหว่างที่ฉันเผลอหลับไป... หัวหน้าชมรมพัฒนาออนเซ็นที่ถูกคุมขังอยู่ก็#nหายตัวไปค่ะ!"
83306040100-13 = "ความผิดพลาดครั้งใหญ่นี้เป็นเพราะความขี้เกียจของฉัน...! ต้องขอโทษจริงๆ ค่ะ...!"
83306040100-14 = "ไม่เป็นไรหรอก ถ้ารู้ว่าตัวเองผิดก็พอแล้วละ ตอนนี้สิ่งที่สำคัญคือการแก้ไขสถานการณ์"
83306040100-15 = "ทะ... ท่านประธาน!"
83306040100-16 = "อีกฝ่ายคือชมรมพัฒนาออนเซ็น ฉันไม่แปลกใจหรอกที่จะเกิดเรื่องอะไรขึ้นระหว่างที่เราเผลอขึ้นมา"
83306040100-17 = "ก่อนอื่นฉันคงเริ่มจากการตรวจสอบสถานที่เกิดเหตุ"

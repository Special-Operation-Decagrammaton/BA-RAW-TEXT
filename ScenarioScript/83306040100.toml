[translation]
83306040100-6 = "啊，啊唔……嗚嗚……怎麼會……"
83306040100-7 = "嗯？有什麼事嗎？"
83306040100-8 = "委，委員長！？您，您怎麼會來這裡……！"
83306040100-9 = "為了保險起見，我打算稍微巡邏一下。"
83306040100-10 = "話說回來……發生什麼事了？"
83306040100-11 = "那，那個……"
83306040100-12 = "非，非常抱歉！在我打瞌睡的期間……本來關在監牢裡的溫泉開發部部長消失了！"
83306040100-13 = "因為我的疏忽造成這麼嚴重的問題，真的很抱歉……！"
83306040100-14 = "不，我沒打算追究責任。重要的是解決狀況。"
83306040100-15 = "委，委員長……！"
83306040100-16 = "……對方畢竟是溫泉開發部。#n就算發生突發狀況也不足為奇。"
83306040100-17 = "看來得先觀察一下現場的狀況。"

1303-17 = "1;체리노;05;감히 이 몸을 10분이나 기다리게 하다니. 숙청당하고 싶은 거냐?!\n#1;hophop"
1303-18 = "3;마리나;04;죄, 죄송합니다. 회장님. 보고 준비를 하는 데 시간이 생각 외로 오래 걸려서……\n#3;em;[땀]\n#3;stiff"

1303-66 = "3;체리노;04;뭐, 뭐냐! 어째서 페로로의 안에서 특별반의 에로 꼬맹이가 나오는 거지? 이 페로로는 진짜 페로로가 아니었던 거냐?\n#3;em;[?!]\n#3;jump"
1303-67 = "3;노도카;05;애초에 현실에 페로로는 존재하지 않는다고요, 페로! 회장은 바보인가요, 페로?\n#3;em;[?]\n#3;hophop"

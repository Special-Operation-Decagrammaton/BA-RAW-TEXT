[translation]
1303-1 = "ท่านประธานถูกเสมอ 3"
1303-3 = "ช้าชะมัด...!"
1303-4 = "ทำไมหัวหน้าคณะฯ มารินะยังไม่มาอีก? เลยเวลาประชุมประจำสัปดาห์ของสำนักเลขาธิการไปตั้ง 10 นาทีแล้วนะ!"
1303-6 = "แต่เพราะท่านประธานเชริโน่ตื่นสาย การประชุมก็เลยล่าช้าไป 30 นาทีแล้วนะคะ"
1303-8 = "เราไม่ฟัง! ไม่เกี่ยวกับที่เราตื่นสายสักหน่อย! เพราะเราคือท่านเชริโน่ ประธานสภานักเรียนผู้ยิ่งใหญ่ของสหภาพเรดวินเทอร์ และเลขาธิการพรรคยังไงล่ะ!"
1303-9 = "นี่เป็นเรื่องที่ยอมรับไม่ได้ หัวหน้าคณะฯ คนหนึ่งจะมาทำให้ท่านเชริโน่ผู้นี้ต้องรอแบบนี้ได้ยังไง!"
1303-10 = "รอให้มาถึงก่อนเถอะ เราจะสั่งสอนให้หลาบจำเลย!"
1303-15 = "ขอโทษที่ทำให้รอนานค่ะ ท่านเชริโน่!"
1303-16 = "มาสายนะสหาย!"
1303-17 = "กล้าทำให้เราต้องรอถึง 10 นาทีเลยงั้่นเหรอ อยากโดนลงโทษรึไง?!"
1303-18 = "ขะ... ขอโทษค่ะท่านประธาน ฉันมัวแต่เตรียมตัวรายงานก็เลยลืมเวลาไปเลยค่ะ..."
1303-19 = "แต่ว่าฉันมีข่าวดีมาบอกค่ะ"
1303-20 = "ข่าวดีเหรอ...?"
1303-21 = "ใช่ค่ะ ฉันได้โน้มน้าวให้เพโรโร่ย้ายมาเรียนที่สถาบันสหภาพเรดวินเทอร์ของพวกเราตามที่ท่าน#nประธานสั่งไว้เมื่อครั้งก่อนสำเร็จเรียบร้อยแล้วค่ะ!"
1303-22 = "พูดจริงงั้นเหรอ?"
1303-23 = "หุหุ ถ้าเป็นจริงละก็ ทีนี้ก็เหลือแค่รอให้นักเรียนทั่วคิโวทอสมาเข้าเรียนที่นี่สินะ ทำได้ดีมากหัวหน้าคณะฯ มารินะ!"
1303-24 = "เป็นเกียรติอย่างยิ่งที่ได้ช่วยท่านประธานค่ะ"
1303-25 = "แล้วเพโรโร่นั่นอยู่ที่ไหนล่ะ?"
1303-26 = "ค่ะ จะพามารายงานตัวเดี๋ยวนี้เลยค่ะ"
1303-28 = "โนโด... ไม่สิ สหายเพโรโร่ ออกมาข้างหน้าได้!"
1303-32 = "เพโรเพโร่..."
1303-41 = "เพ... เพโรโร่!"
1303-43 = "นกตัวใหญ่สุดอัปลักษณ์นี่มันอะไรกันเนี่ย?!"
1303-44 = "คะ? นี่คือเพโรโร่ที่ท่านประธานพูดถึงไงคะ\n"
1303-45 = "อึ้ก... พอดูดีๆ ก็เหมือนจริงด้วย... นกนี่มันตัวใหญ่และหน้าตาน่าเกลียดขนาดนี้เลยเหรอ...?"
1303-46 = "ตอนที่อยู่ในเมืองคิโวทอสมองจากไกลๆ ก็เลยเห็นไม่ชัด พอได้มองใกล้ๆ แบบนี้แล้วยิ่งรู้สึกว่าไม่น่ารักใหญ่เลย..."
1303-47 = "ตะ... แต่ถึงอย่างนั้นเพโรโร่ก็เป็นตัวละครที่ได้รับความนิยมไปทั่วคิโวทอส ถ้าติดหนวดแล้ววางไว้หน้าสำนักเลขาธิการละก็จะต้องกลายเป็นจุดสนใจแน่นอนค่ะ!"
1303-48 = "ว่าไงนะ? ไม่มีทางที่เราจะยอมให้เจ้านกหน้าตาไม่สบอารมณ์นี่ติดหนวดที่เป็นสัญลักษณ์ของอำนาจ#nหรอกนะ!"
1303-49 = "ถึงก่อนหน้านี้เลขาโทโมเอะจะพูดแบบนั้นเหมือนกันก็เถอะ... เอาเป็นว่าตอนนี้ขอยกเลิก!"
1303-52 = "แล้วยังต้องมาเห็นเจ้านกหน้าตาบู้บี้ชวนให้หงุดหงิดแบบนี้ทุกครั้งที่มาที่สำนักเลขาธิการอีกงั้นเหรอ เหลือเชื่อเลยจริงๆ!"
1303-53 = "มารินะ จัดการลงโทษเพโรโร่นี่ซะ! ส่งเจ้านกหน้าตาไม่น่าสบอารมณ์นี่ไปที่อาคารเรียนเก่า ห้องพิเศษ 227 เดี๋ยวนี้เลย!"
1303-55 = "อาคารเรียนเก่า ห้องพิเศษ 227 เหรอเพโร่?"
1303-56 = "เอ๋? เพโรโร่พูดได้ด้วยเหรอนั่นน่ะ?"
1303-57 = "ถึงอาคารเรียนเก่าจะทั้งแคบและเป็นสถานที่แสนอ้างว้างที่ถูกลงโทษให้ไปอยู่ แต่ก็เป็นพื้นที่ที่#nสำคัญสำหรับพวกเรามากนะ... ทำอย่างกับเป็นที่ทิ้งขยะไร้ประโยชน์แบบนั้นได้ยังไงกัน..."
1303-64 = "ถึงจะเป็นท่านประธาน แต่แบบนี้ก็ทำเกินไปรึเปล่าเพโร่!"
1303-66 = "อะ... อะไรกัน? ทำไมข้างในเพโรโร่ถึงได้เป็นเจ้าเด็กน้อยจากห้องพิเศษได้ล่ะ? เพโรโร่นี่ไม่ใช่เพโรโร่ตัวจริงงั้นเหรอ?"
1303-67 = "ก็บอกว่าเพโรโร่น่ะไม่มีอยู่จริงตั้งแต่แรกแล้วไงคะเพโร่! ท่านประธานซื่อบื่อรึไงคะเพโร่?"
1303-68 = "ฮึ่ม.... หลอกเรางั้นเหรอมารินะ!"
1303-69 = "ขะ... ขอโทษค่ะท่านประธาน!"
1303-70 = "แต่ว่าไม่ว่าจะใช้วิธีไหนก็ไม่สามารถพาเพโรโร่มายังโลกความจริงได้..."
1303-71 = "เราไม่ฟัง! รวมหัวกับนักเรียนห้องพิเศษหลอกเราแบบนี้ ยกโทษให้ไม่ได้!"
1303-72 = "ลงโทษ ลงโทษเท่านั้น! พาทั้งเจ้าเด็กโรคจิตนี่และหัวหน้าคณะความมั่นคงไปที่อาคารเรียนเก่าเดี๋ยวนี้เลย!"
1303-74 = "ฮึ่ม ยังไงก็ถูกพักการเรียนอยู่แล้ว จะลงโทษอะไรอีกก็ไม่กลัวทั้งนั้นแหละเพโร่!"
1303-75 = "นี่คือการปฏิวัติเพโร่!"
1303-76 = "หัวหน้าคณะฯ มารินะก็อย่ามัวแต่ยืนเฉย มาร่วมปฏิวัติด้วยกันเถอะค่ะเพโร่!"
1303-77 = "เอ่อ... คะ...คือว่า... ฉันแค่ตามท่านประธานเชริโน่มาเท่านั้นเอง..."
1303-79 = "แต่จะกวาดล้างงั้นเหรอ... ก็ดี ข้อเสนอนั้นฉันจะรับเองไว้! นี่คือการปฏิวัติ!!"
1303-81 = "อะ... อะไรเนี่ย?! หัวหน้าคณะความมั่นคงเองก็จะร่วมปฏิวัติด้วยงั้นเหรอ?"
1303-82 = "ทะ...โทโมเอะ ช่วยเราด้วย...!"
1303-84 = "(หลังจากการปฏิวัติและการกวาดล้างสามครั้งติดต่อกันในหนึ่งสัปดาห์ สำนักเลขาธิการก็กลับคืนสู่#nสภาพปกติ...)"
1303-85 = "(มีเสียงเล่าลือว่ามีนักเรียนไม่ประสงค์ออกนามจากโรงเรียนทรีนิตี้คนหนึ่งซื้อตุ๊กตาเพโรโร่ที่หมด#nประโยชน์ไปในราคาสูงลิบลิ่ว...)"
1303-86 = "ท่านประธานถูกเสมอ"

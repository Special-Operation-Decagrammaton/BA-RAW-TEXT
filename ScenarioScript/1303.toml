[translation]
1303-1 = "The President Is Always Right Part 3"
1303-3 = "Late!"
1303-4 = "Where's Security Chairman Marina? The Secretariat's weekly meeting started ten minutes ago!"
1303-6 = "It technically started 30 minutes late because of your nap."
1303-8 = "Shut up! I'm allowed to delay meetings as much as I want! I'm Red Winter Academy's student council president and Great Leader!"
1303-9 = "A mere security chair can't make me wait. This is unacceptable!"
1303-10 = "I'll purge her!"
1303-15 = "I sincerely apologize for making you wait, President Cherino!"
1303-16 = "Late!"
1303-17 = "I had to wait an entire ten minutes! Come here so I can purge you!"
1303-18 = "I'm sorry, President. It took me longer than I thought to prepare my report..."
1303-19 = "However, I have good news."
1303-20 = "Good news?"
1303-21 = "Yes. As you ordered, I have transferred Peroro to Red Winter Federal Academy!"
1303-22 = "You have? Really?"
1303-23 = "Heehee. Excellent work, Chair Marina! Now students from all over Kivotos will swarm to our school!"
1303-24 = "I'm honored to be of service to you, President!"
1303-25 = "So, where is Peroro? Quickly, show me!"
1303-26 = "Yes, of course."
1303-28 = "Nodo...ahem. Comrade Peroro, come forward!"
1303-32 = "Pero pero..."
1303-41 = "P-Peroro!"
1303-43 = "What is this terrifying, gigantic bird? Is it drooling?!"
1303-44 = "Th-This is Peroro, just as you requested."
1303-45 = "Ugh, I suppose it is. But I didn't expect it to be so ugly in person!"
1303-46 = "I only saw it from a distance in the city. On closer inspection...it's not as cute as I thought."
1303-47 = "B-But, Peroro is very popular all over Kivotos, so if it stands in front of the Secretariat with a mustache, it will draw a huge crowd?"
1303-48 = "How dare you suggest that? Why would I put my precious symbol of authority on something so ugly?"
1303-49 = "Chief Secretary Tomoe may have said something like that, but we were clearly led astray!"
1303-52 = "I can't stand the thought of having to see this unpleasant thing every time I go in and out of the Secretariat!"
1303-53 = "Marina, I have a new job for you! Purge it! Send it to the Former Institute immediately!"
1303-55 = "Former institute Spec Ops No. 227, pero?"
1303-56 = "Did that thing just talk?"
1303-57 = "Even if the Former Institute is a cold and barren place, it's dear to each of us.#nAnd you think of it as a giant trashcan?"
1303-64 = "I don't care if you're the president—I won't stand for this, pero!"
1303-66 = "Why did this exiled pervert come out of Peroro? It was...a fake?!"
1303-67 = "Are you stupid, pero? Peroro is a fictional character!"
1303-68 = "Ugh... How dare you try to trick me, Marina?!"
1303-69 = "I-I'm sorry, President!"
1303-70 = "I was just trying to fulfill your impossible orders..."
1303-71 = "No excuses! You conspired with a suspended Spec Ops student to deceive me! Unforgivable!"
1303-72 = "Purge all of them! Take the pervert and former security chair to the Former Institute immediately!"
1303-74 = "You can't scare a suspended student with the threat of purging, pero!"
1303-75 = "It's a Pero-revolution, pero!"
1303-76 = "You've been purged too, Marina! Rise up! Let's fight against this dictator!"
1303-77 = "Oh... I...was just following President Cherino..."
1303-79 = "Fine! So be it! This is a coup d'état!"
1303-81 = "Wh-What?! The security chair is staging a coup?!"
1303-82 = "T-Tomoe... HELP!"
1303-84 = "(After three revolts and purges during a single week, the Secretariat eventually resumed its original state.)"
1303-85 = "(...The Peroro costume was to be discarded, but an anonymous Trinity student bought it at an exorbitant price.)"
1303-86 = "The President Is Always Right"

1303-4 = "3;체리노;05;마리나 보안위원장은 어째서 오지 않는 거지? 사무국 주간 정례 회의가 시작된 지 벌써 10분이나 지났거늘!\n#3;hophop"
1303-5 = "3;체리노;05\n#3;m1"
1303-6 = "5;토모에;03;체리노 회장님이 늦잠을 자신 탓에 이미 30분이나 지연되기는 했지만요.\n#5;al"
1303-7 = "5;토모에;03\n#5;dr"
1303-8 = "3;체리노;05;듣기 싫다! 이 몸이 늦는 것은 상관없어! 이 몸은 붉은겨울 학원의 위대한 학생회장이자 서기장인 체리노 님이니까!\n#3;em;[!]\n#3;m3"
1303-9 = "3;체리노;05;하지만 일개 위원장이 이 체리노님을 기다리게 하다니, 이는 용납할 수 없는 일이야!\n#3;hophop"
1303-10 = "3;체리노;05;도착하기만 해봐라, 단단히 혼쭐을 내줄 테다!\n#3;em;[빠직]\n#3;closeup"

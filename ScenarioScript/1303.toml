1303-45 = "1;체리노;04;윽…… 다시 살펴보니 확실히 그렇긴 한데…… 이 새가 이렇게 못생기고 커다랬던가……?\n#1;em;[...]"
1303-46 = "1;체리노;06;키보토스 시내에서는 멀리서 지켜보느라 제대로 확인하지 못했는데, 가까이서 보니 생각보다 더 안 귀여워……."

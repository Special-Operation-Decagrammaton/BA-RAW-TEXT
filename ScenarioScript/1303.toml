[translation]
1303-1 = "會長永遠是對的（３）"
1303-3 = "……太慢了！"
1303-4 = "定期會議已經開始10分鐘了，為何瑪麗娜委員長還沒有來！？"
1303-6 = "雖然因為潔莉諾會長睡過頭，所以從會議開始已經過了30分鐘……"
1303-8 = "啊啊，咱不想聽！咱遲到這件事現在無所謂吧！？#n比起行程表上的時間，咱的開會宣言更優先！"
1303-9 = "但是一個區區的保安委員長，竟敢讓咱這個學生會長潔莉諾大人等……#n這是關乎威嚴的問題，不可原諒！"
1303-10 = "等瑪麗娜委員長一來就好好肅清……！"
1303-15 = "讓，讓您久等了潔莉諾大人！"
1303-16 = "太慢了！！"
1303-17 = "竟敢讓咱等了10分鐘之久。想被肅清嗎！？"
1303-18 = "對，對不起，會長。報告的準備比想像中更花時間……"
1303-19 = "但是我帶來了好消息。"
1303-20 = "……哦，說來聽聽。"
1303-21 = "是的。我依照您上次的指示，已經成功說服「佩洛洛」轉入我們赤冬聯邦學園了！"
1303-22 = "什麼，是真的嗎！？"
1303-23 = "如果是真的的話，接下來就只要等待學生從奇普托斯各地集結過來了……#n呵呵呵，辛苦了，瑪麗娜委員長！"
1303-24 = "是！能幫上會長的忙是我的榮幸！"
1303-25 = "那麼佩洛洛現在在哪裡呢？"
1303-26 = "是，就在這裡。"
1303-28 = "和……咳咳。佩洛洛啊，上前！"
1303-32 = "佩，佩洛佩洛……"
1303-41 = "佩，佩洛佩洛！佩洛！"
1303-43 = "什，什麼！？這又大又醜的鳥是什麼東西！？"
1303-44 = "那個……這位就是會長所說的，那個佩洛洛不是嗎？"
1303-45 = "雖，雖然是這麼說沒錯，重新像這樣仔細一看長的真奇怪呢……這就是佩洛洛……"
1303-46 = "之前是從很遠的地方看見的，在這種距離下看還是第一次呢……比想像中還不可愛。"
1303-47 = "但，但是佩洛洛是奇普托斯相當受歡迎的角色。#n只要貼上鬍子立在事務局前面，一定很快就會成為話題的！"
1303-48 = "怎，怎麼可能在這麼醜的鳥身上加上象徵權威的鬍子！"
1303-49 = "雖然好像在哪聽過類似的提案……總之這個提案退回！"
1303-52 = "居然要把這麼醜的鳥放在事務局的前面……#n這樣咱豈不是每次進出都得看見他嗎！咱無法忍受！"
1303-53 = "瑪麗娜委員長，這個佩洛洛就由你負責肅清！這樣吧……把他送去舊校舍227號特別班！"
1303-55 = "……舊校舍，佩洛？"
1303-56 = "……嗯？佩洛洛剛才說話了嗎？"
1303-57 = "即使舊校舍又冷又荒涼，對我們來說也是很重要的地方……竟然把那裡當成丟廢棄物的垃圾桶……"
1303-64 = "就算是會長也太過分了吧佩洛！"
1303-66 = "什麼！？為何佩洛洛裡面冒出了特別班的小鬼！？這個佩洛洛是假的嗎！？"
1303-67 = "會長是笨蛋嗎！？哪有什麼假不假的，現實中佩洛洛根本就不存在佩洛！"
1303-68 = "唔唔……竟敢欺騙咱啊，瑪麗娜！"
1303-69 = "非，非常對不起！"
1303-70 = "但是會長，無論我怎麼想方設法，要把佩洛洛帶到現實中也是不可能的……"
1303-71 = "哎，囉嗦！咱不想聽藉口！無論有什麼理由，和227號特別班的停學學生聯手欺騙咱的罪，完全無法饒恕！"
1303-72 = "肅清，肅清！把這個色小鬼和保安委員長立刻送去舊校舍！"
1303-74 = "哼！反正我已經被停學了，再被肅清我也不怕佩洛！"
1303-75 = "既然這樣，不如徹底反抗佩洛！"
1303-76 = "瑪麗娜委員長也一起吧！別發呆了，現在正是發動革命的時候佩洛！"
1303-77 = "咦，咦……我，我明明只是服從潔莉諾會長而已……"
1303-79 = "但與其遭到肅清，還不如……好吧，那個提案我接受了！革命吧！！"
1303-81 = "什麼，保安委員長發起政變了！？"
1303-82 = "智，智惠！救命啊！！"
1303-84 = "（歷經一週內三次的革命和無數的肅清後，事務局又回到了原本的狀態）"
1303-85 = "（失去用武之地的佩洛洛玩偶裝似乎被三一學生高價收購了）"
1303-86 = "會長永遠是對的"

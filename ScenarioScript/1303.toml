1303-21 = "3;마리나;09;네. 지난번에 지시하셨던 대로 페로로를 설득하여 저희 붉은겨울 연방학원에 편입시키는 데 성공했습니다!\n#3;em;[반응]"
1303-22 = "1;체리노;05;그게 정말인가?\n#1;hophop"
1303-23 = "1;체리노;03;후후, 그게 사실이라면 이제 키보토스 전역에서 전학생이 몰려들기를 기다리기만 하면 되겠군. 수고했네, 마리나 위원장!\n#1;em;[하트]"
1303-24 = "3;마리나;11;회장님을 도울 수 있어 영광입니다.\n#3;em;[반짝]"
1303-25 = "1;체리노;02;그래서 그 페로로는 지금 어디에 있지?\n#1;em;[?]\n#1;stiff"

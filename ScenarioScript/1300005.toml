[translation]
1300005-1 = "共同度過的時光"
1300005-2 = "千年近郊．黑市第1地區"
1300005-3 = "站住！那邊的壞人！"
1300005-4 = "（啪噠啪噠啪噠！）"
1300005-11 = "可惡……讓他逃掉了嗎。"
1300005-12 = "難道情報被洩漏出去了嗎……他們的應對還真快。"
1300005-13 = "雖然已經阻止了交易，但還沒有攔截到文件。難道是逃到這裡來了……"
1300005-14 = "……哎呀？"
1300005-15 = "哎呀哎呀！？主人，您怎麼會在這裡……？"
1300005-16 = "哎？因為聽到了爆炸聲……原來如此，是這樣啊。沒錯，和我百分之1億沒有關係。"
1300005-17 = "耶？您問那我為什麼會在這裡，是嗎？呃，那個，剛才正好完成任務……"
1300005-18 = "不對，是結束社團活動，正在回家的路上。"
1300005-19 = "呵呵，真巧呢。"
1300005-20 = "話說回來，您覺得怎麼樣呢，主人。"
1300005-21 = "一位賢淑的女學生，必須懂得潔身自愛。而且最近奇普多斯的治安也不像以前那麼好了。"
1300005-24 = "主人，您願意送我回千年嗎？"
1300005-26 = "千年近郊．鬧區"
1300005-27 = "主人，主人。"
1300005-28 = "咦？您不希望我在其他人面前稱呼您為主人嗎？"
1300005-29 = "也對，這樣好像會引起周圍人們的注意呢。那麼，該怎麼稱呼您比較好呢？"
1300005-30 = "[s1] 「叫我哥哥。」\n[s2] 「叫我姊姊。」\n[s3] 「叫我老師。」"
1300005-31 = "嗯，那實在是有點……困擾呢。"
1300005-32 = "嗯，那實在是有點……困擾呢。"
1300005-33 = "嗯，那實在是有點……困擾呢。"
1300005-34 = "就算是主人的命令，我也不能改變對您的稱呼。"
1300005-35 = "因為，我可是女僕。"
1300005-36 = "[s] 「這麼說來，朱音是為何加入女僕部的呢？」"
1300005-37 = "咦……？"
1300005-38 = "啊，也對，和其他的社團比起來，女僕部確實是比較特別。"
1300005-39 = "雖然有像花凜一樣，是為了把「做家事」學好以成為賢妻良母而來的學生……"
1300005-40 = "也有像是明日奈前輩一樣，只是為了「和寧瑠前輩待在一起」而來的人……"
1300005-41 = "我並沒有這些誤會和目的。"
1300005-42 = "我也不是，加入女僕部後才成為女僕的……"
1300005-43 = "而是因為我本來就是女僕，才選擇加入C&C的。"
1300005-44 = "啊啊，主人。今天要用怎樣的服務來讓主人開心呢。"
1300005-45 = "我從出生開始，就總是在想著這些事情。"
1300005-46 = "哎呀？周圍的人群開始吵雜起來了呢……？"
1300005-47 = "這樣的話，如果主人實在很在意，就由我來進行清掃……"
1300005-49 = "呵呵，請別露出這麼驚恐的表情。"
1300005-50 = "開，玩，笑，的。"
1300005-52 = "其實，今天……我的任務失敗了。"
1300005-53 = "但是，雖然沒有達成目標，不過能夠見到主人……"
1300005-54 = "就連失敗，我都覺得是件幸運的事。"
1300005-55 = "明明任務就，失敗了……"
1300005-56 = "究竟是為什麼，藏不住笑容呢。"
1300005-57 = "難道是因為，主人就陪在我身邊嗎？"
1300005-58 = "非常感謝您。是主人讓我感到十分幸福……"
1300005-59 = "所以我也想，讓主人感到幸福……"
1300005-62 = "（碰）"
1300005-63 = "喂！小心點好不好！你眼睛是擺好看的啊！"
1300005-64 = "哎呀，真是抱歉，是我……"
1300005-65 = "嗯？"
1300005-66 = "……？"
1300005-67 = "哎呀？"
1300005-68 = "……啊啊！？"
1300005-69 = "女，女，女僕！？C&C，竟然還在追蹤我們嗎！？"
1300005-71 = "啊啊！站住！"
1300005-72 = "果然，和主人在一起，毫無疑問是件幸運的事呢！"
1300005-73 = "主人！那個傢伙就是受到黑心企業的命令，偷走千年學生們個人資料的犯人！"
1300005-74 = "我們趕快追上去吧！"
1300005-76 = "（結果，朱音成功完成了任務）"

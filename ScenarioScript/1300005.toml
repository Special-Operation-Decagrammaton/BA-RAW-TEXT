1300005-20 = "3;아카네;02;그보다 어떠세요 주인님."
1300005-21 = "3;아카네;99;정숙한 여학생은, 밤이슬을 신발 끝에 묻히지 않는 법이라고 하죠. 최근 키보토스 치안도 예전 같지 않아 겁이 나네요.\n#3;em;[...]"

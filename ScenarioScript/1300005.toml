[translation]
1300005-1 = "ช่วงเวลาที่เดินไปด้วยกัน"
1300005-2 = "ตลาดมืดเขต 1 ชานเมืองมิลเลเนียม"
1300005-3 = "หยุดนะคะ! คนร้าย!"
1300005-4 = "(ตึ้กๆๆ)"
1300005-11 = "อึ่ก... หนีไปได้เหรอ?"
1300005-12 = "หรือว่าข้อมูลจะรั่วไหล... ทำไมถึงไหวตัวทันแบบนั้น?"
1300005-13 = "เราขัดขวางการซื้อขายไว้ได้ แต่ยังไม่ได้เอกสารมาเลย หรือว่าหนีไปทางนี้..."
1300005-14 = "...โอ๊ะ?"
1300005-15 = "ตายแล้ว?! นายท่าน! ทำไมถึง...?"
1300005-16 = "คะ? มาเพราะได้ยินเสียงระเบิดเหรอคะ...? นั่นไม่เกี่ยวกับฉันเลยนะคะ!"
1300005-17 = "เอ๋...? อยากรู้ว่าฉันมาอยู่ที่นี่ทำไมงั้นเหรอ? ฉันเพิ่งทำภารกิจเสร็จน่ะค่ะ"
1300005-18 = "ไม่สิ ฉันเพิ่งทำกิจกรรมของชมรมเสร็จ แล้วก็กำลังจะกลับอยู่พอดีค่ะ"
1300005-19 = "ฮุฮุ บังเอิญจังเลยนะคะ"
1300005-20 = "จะว่าไป คุณครูพอมีเวลามั้ยคะ?"
1300005-21 = "การที่ผู้หญิงอย่างฉันออกมาอยู่ข้างนอกกลางดึกแบบนี้... ฟังดูอันตรายใช่มั้ยคะ?#nฉันเองก็กลัวค่ะ เพราะคิโวทอสไม่ได้สงบเหมือนแต่ก่อนแล้ว"
1300005-24 = "ช่วยไปส่งฉัน... ที่มิลเลเนียมได้มั้ยคะ?"
1300005-26 = "ย่านพลุกพล่าน ชานเมืองมิลเลเนียม"
1300005-27 = "นายท่าน นายท่าน!"
1300005-28 = "คะ? ไม่อยากให้ฉันเรียกว่านายท่านเมื่ออยู่ต่อหน้าคนอื่นเหรอคะ?"
1300005-29 = "อืม... กังวลว่าคนอื่นจะคิดยังไงสินะคะ งั้นอยากให้ฉันเรียกว่าอะไรล่ะคะ?"
1300005-30 = "[s1] \"เรียกว่าพี่ชายก็ได้\"\n[s2] \"เรียกว่าพี่สาวก็ได้\" \n[s3] \"เรียกว่าคุณครูเถอะ\""
1300005-31 = "อืม ฉันว่ามัน... มันยากนะคะ"
1300005-32 = "อืม ฉันว่ามัน... มันยากนะคะ"
1300005-33 = "อืม ฉันว่ามัน... มันยากนะคะ"
1300005-34 = "ถึงจะเป็นคำสั่งของนายท่าน แต่จะให้ฉันเปลี่ยนคำเรียกของคนที่ฉันต้องรับใช้ไม่ได้หรอกค่ะ"
1300005-35 = "ก็ฉันเป็นเมดนี่คะ"
1300005-36 = "[s] \"ทำไมถึงเข้าไปอยู่ในชมรมเมดเหรอ?\""
1300005-37 = "คะ...?"
1300005-38 = "อ่า จะว่าไป ชมรมเมดค่อนข้างแตกต่างกับชมรมอื่นใช่มั้ยล่ะคะ?"
1300005-39 = "เรามีทั้งนักเรียนที่มาเรียน 'การบ้านการเรือน' เพราะอยากเป็นภรรยาที่สมบูรณ์แบบเหมือนคาริน..."
1300005-40 = "แถมยังมีนักเรียนที่มาเพียงเพราะ 'อยากอยู่กับรุ่นพี่เนรุ' อย่างรุ่นพี่อาสึนะ..."
1300005-41 = "ส่วนฉัน... ไม่มีเหตุผลอะไรแบบนั้นหรอกค่ะ"
1300005-42 = "ฉันไม่ได้เข้าชมรมเมดเพราะอยากเป็นเมด..."
1300005-43 = "แต่เพราะฉันเป็นเมดอยู่แล้ว ก็เลยเลือกชมรม C&C ต่างหากค่ะ"
1300005-44 = "นายท่านคะ วันนี้จะให้ฉันรับใช้อะไรให้นายท่านพอใจดีคะ?"
1300005-45 = "ฉันคิดแต่เรื่องแบบนี้ตั้งแต่ลืมตาดูโลกแล้วล่ะค่ะ"
1300005-46 = "คะ? คนที่ผ่านไปผ่านมาเริ่มกระซิบกระซาบเกี่ยวกับเราเหรอคะ?"
1300005-47 = "ถ้านายท่านไม่อยากเห็นคนพวกนี้ล่ะก็ ฉันกำจัดให้..."
1300005-49 = "ฮุฮุ ไม่ต้องตกใจหรอกค่ะ"
1300005-50 = "ฉันล้อเล่นนะคะ"
1300005-52 = "ที่จริง... วันนี้ฉันทำภารกิจไม่สำเร็จค่ะ"
1300005-53 = "ถึงจะทำตามเป้าหมายไม่สำเร็จ แต่ก็ได้มาเจอนายท่านแบบนี้..."
1300005-54 = "เหมือนกับความล้มเหลวกลายเป็นโชคชะตาขึ้นมาเลยค่ะ"
1300005-55 = "ถึงภารกิจจะไม่สำเร็จ..."
1300005-56 = "แต่ก็หยุดยิ้มไม่ได้เลยค่ะ ทำไมถึงเป็นแบบนี้นะ?"
1300005-57 = "หรือเพราะว่าได้อยู่กับนายท่านเหรอคะ?"
1300005-58 = "ขอบคุณนะคะนายท่าน ขอบคุณที่ทำให้ฉันมีความสุขนะคะ..."
1300005-59 = "เพื่อเป็นการตอบแทน ฉันเองก็อยากทำให้นายท่านมีความสุขด้วย..."
1300005-62 = "(อึ้ก!)"
1300005-63 = "โอ๊ย! ระวังหน่อยสิ! หลับตาเดินอยู่รึไง?!"
1300005-64 = "โอ๊ะ ขอโทษค่ะ พอดีฉัน..."
1300005-65 = "หืม?"
1300005-66 = "......?"
1300005-67 = "เอ๋?"
1300005-68 = "เฮือก...!!"
1300005-69 = "มะ.. มะ... เมดจาก C&C นี่นา! ยังไล่ตามฉันอยู่อีกเหรอ?!"
1300005-71 = "อ๊ะ! หยุดเลยนะคะ!"
1300005-72 = "เป็นโชคชะตาจริงๆ ด้วย ขอบคุณนะคะนายท่าน!"
1300005-73 = "นายท่านคะ! คนพวกนี้คือคนที่องค์กรมืดจ้างมา พวกเขาเป็นโจรขโมยข้อมูลส่วนตัวของนักเรียน#nในมิลเลเนียมค่ะ!"
1300005-74 = "ตามไปเลยค่ะ!"
1300005-76 = "(สุดท้ายอาคาเนะก็ทำภารกิจสำเร็จ)"

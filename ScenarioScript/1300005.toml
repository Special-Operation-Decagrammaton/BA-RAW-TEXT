[translation]
1300005-1 = "Going Out Together"
1300005-2 = "Black Market District 1 near Millennium"
1300005-3 = "Stop right there, scum!"
1300005-4 = "*scurrying*"
1300005-11 = "Ugh... Did I lose the target?"
1300005-12 = "Could there have been a leak? They reacted so quickly."
1300005-13 = "I managed to stop the deal, but the documents still haven't been secured. The escape route has been unpredictable..."
1300005-14 = "Huh?"
1300005-15 = "Is that you, Master?! What are you doing here?"
1300005-16 = "You came this way because you heard an explosion? I can assure you 100 million percent that it has nothing to do with me."
1300005-17 = "You want to know what I'm doing here? Well, I just finished my mission and..."
1300005-18 = "I mean, I just wrapped up club activities and was on my way home."
1300005-19 = "Haha. What a coincidence."
1300005-20 = "By the way, are you busy, Master?"
1300005-21 = "It's dangerous for a lady such as myself to be out this late. I'm sorry to say that security in Kivotos is not what it used to be."
1300005-24 = "Would you mind escorting me to Millennium?"
1300005-26 = "Downtown near Millennium"
1300005-27 = "Master. Master!"
1300005-28 = "Pardon? You'd rather me not call you Master in front of others?"
1300005-29 = "You must be worried about how others will perceive you. How should I address you, then?"
1300005-30 = "[s1] \"Say I'm your older brother.\"\n[s2] \"Think of me as a loving older sister.\"\n[s3] \"Let's just stick with Sensei.\""
1300005-31 = "Hmm. That would be rather difficult at this stage."
1300005-32 = "Hmm. That would be rather difficult at this stage."
1300005-33 = "Hmm. That would be rather difficult at this stage."
1300005-34 = "I cannot simply change how I address the one I serve, even at my master's behest."
1300005-35 = "I am a maid after all."
1300005-36 = "[s] \"Why did you join the Maid Club in the first place?\""
1300005-37 = "Oh?"
1300005-38 = "I'll grant you that the Maid Club is a bit unique compared to the other clubs."
1300005-39 = "We have members like Karin, who joined to learn the art of housekeeping and how to become an ideal wife..."
1300005-40 = "Then there's Asuna, who only joined to be with Neru."
1300005-41 = "But I didn't join under any false pretenses or with a particular goal..."
1300005-42 = "...nor did I become a maid after joining the Maid Club."
1300005-43 = "I chose C&C because I was already a maid."
1300005-44 = "I live to serve my master."
1300005-45 = "That's how I've felt since I was born."
1300005-46 = "Oh? Are the passersby starting to whisper about us? "
1300005-47 = "Ah. I can wipe the floor with them if it would please you."
1300005-49 = "Haha. Please settle down."
1300005-50 = "It was a harmless joke."
1300005-52 = "Truthfully, I...failed my mission today."
1300005-53 = "Even though I couldn't meet my objective, meeting you like this..."
1300005-54 = "...makes me feel fortunate."
1300005-55 = "I failed my mission."
1300005-56 = "Yet for some reason, I can't stop smiling. Why?"
1300005-57 = "Is it because you are by my side?"
1300005-58 = "Thank you for making me happy, Master."
1300005-59 = "In return, I want to make you happy as well."
1300005-62 = "(bump)"
1300005-63 = "Hey, watch it! Are you blind or somethin'?!"
1300005-64 = "My apologies. I should be more..."
1300005-65 = "Hold on."
1300005-66 = "...?"
1300005-67 = "Well, then."
1300005-68 = "What the...?!"
1300005-69 = "Y-You're that maid from C&C! Did you follow me all the way here?!"
1300005-71 = "Ah! Stop right there!"
1300005-72 = "Fortune always seems to shine on me when I'm with you, Master!"
1300005-73 = "That target was hired to steal private data on Millennium's students by an evil corporation!"
1300005-74 = "After them!"
1300005-76 = "After that, I helped Akane successfully complete her mission after all."

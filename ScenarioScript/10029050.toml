[translation]
10029050-1 = "ตอนที่ 5;เรลกันแห่งโทคิวะได"
10029050-2 = "ชั้นใต้ดิน พื้นที่รกร้างมิลเลเนียม"
10029050-4 = "นี่เราก็ลงมานานแล้วนะ..."
10029050-5 = "แปลกจัง ทำไมยิ่งลงมาลึกเท่าไร พวกเครื่องมือกับอุปกรณ์ถึงได้ดูไม่ค่อยเก่าแล้วเลยล่ะ?"
10029050-6 = "ขอถามเผื่อไว้ก่อนเฉยๆ นะ... เราไม่ได้หลงทางใช่มั้ย?"
10029050-7 = "ไม่หลงแน่นอน และการที่เครื่องมือมันยิ่งใหม่ขึ้นเรื่อยๆ ก็เป็นสิ่งที่ฉันเดาไว้แล้ว"
10029050-8 = "เพราะถึงจะถูกทิ้งร้างมานานแล้ว แต่มันก็ไม่ได้รับความเสียหายอะไร"
10029050-9 = "พูดแบบนี้แล้วนึกถึงปลาที่ถูกแช่แข็งไว้ในช่องฟรีซเลยนะคะ พวกทูน่ากระป๋องอะไรอย่างนั้น..."
10029050-10 = "... หืม? คุณครู?"
10029050-11 = "... คะ?"
10029050-12 = "รู้สึกเหมือนฉันคุ้นเคยกับการต่อสู้งั้นเหรอคะ? อ่า พวกฉันน่ะเหรอคะ?"
10029050-13 = "อืม... กะ... ก็ใช่ค่ะ จะว่าอย่างนั้นก็ได้..."
10029050-14 = "ก็เจอเรื่องราวกันมาตั้งหลายอย่าง... หนึ่งวันพันเหตุการณ์เลยละฝั่งเรา"
10029050-15 = "ฉันจะไม่บอกหรอกนะว่าฝีมือใคร แต่เรามีคนที่ชอบสร้างปัญหาอยู่บ่อยๆ ด้วยน่ะ"
10029050-16 = "ก็คุณมิซากะคือ <เรลกัน> ผู้ใช้พลังจิต <เลเวล 5> ที่มีแค่ 7 คนในเมืองแห่งการศึกษาน่ะสิคะ "
10029050-18 = "... หืม? เมื่อกี้ว่าอะไรนะคะ...?"
10029050-19 = "[s1] \"เรลกัน...?\"\n[s2] \"เลเวล 5...?\""
10029050-22 = "อ่า ไม่ต้องไปสนใจหรอก มันไม่เกี่ยวอะไรกับที่นี่หรอกน่า"
10029050-23 = "จะว่าไปนะ โชคุโฮว นี่เธอต้องพูดอะไรแบบนั้นด้วยเหรอ? ใครมาได้ยินเข้าคงคิดว่าฉันเป็นนักเลงกัน#nพอดีน่ะสิ"
10029050-24 = "อ้าว? แล้วไม่ใช่หรอกเหรอ? ฮืม... ทำไมจำได้ลางๆ ว่าใช่..."
10029050-25 = "อย่ามาปรักปรำกันสิ!! ถ้าจะโกหก อย่างน้อยก็เล่นให้มันเนียนๆ หน่อยเถอะ!!"
10029050-26 = "เอาละๆ ทุกคน คนอื่นก็อยู่ด้วย ถ้าเราจะมาทะเลาะกันเองที่นี่มันไม่น่ามองนะคะ..."
10029050-30 = "... หืม?"
10029050-31 = "เอ๋ เมื่อกี้เหมือนได้ยินเสียงเครื่องจักรเลย... ได้ยินไหมคะ?"
10029050-35 = "... ได้ยินอีกแล้ว...?"
10029050-36 = "[s3] \"นี่คือที่เอมิบอกใช่ไหมนะ...\"\n[s4] \"เริ่มออกมากันแล้วสินะ...\""
10029050-39 = "อืม ใช่ พวกหุ่นจักรกลในพื้นที่รกร้าง"
10029050-40 = "... มาแล้ว วิเคราะห์แพทเทิร์นสำเร็จ"
10029050-41 = "เริ่มต่อสู้ได้"

[translation]
10029050-1 = "Episode 5;The Railgun of Tokiwadai"
10029050-2 = "Millennium Ruins Underground"
10029050-4 = "We're pretty far down now..."
10029050-5 = "It's weird. The deeper we go, the less worn down the machines are."
10029050-6 = "Just making sure... We're on the right track, aren't we?"
10029050-7 = "We are. It's only natural that the machinery appears more pristine as we continue on."
10029050-8 = "These sections of the ruins haven't been well explored, so less damage has been done to them over time."
10029050-9 = "When you put it that way, it sounds like a fish that's been sitting in the freezer... Maybe a can of mackerel..."
10029050-10 = "...Hm? Sensei?"
10029050-11 = "Yes...?"
10029050-12 = "We seem to be pretty used to fighting?"
10029050-13 = "Hm... I guess that's true..."
10029050-14 = "You could say that it's pretty...lively on our side too."
10029050-15 = "Now, I'm not naming names, but there are certain people who can't help but make trouble for the rest of us."
10029050-16 = "Misaka is one of only seven Level 5 espers in all of Academy City. They call her \"Railgun!\""
10029050-18 = "...I'm sorry, but what did you just say?"
10029050-19 = "[s1] \"Railgun...?\"\n[s2] \"Level 5...?\""
10029050-22 = "Ah. Don't worry about that. It's not important."
10029050-23 = "More importantly, Shokuhou! I'M the one who makes trouble? They're going to think I'm some kind of thug!"
10029050-24 = "What's that? You mean, you aren't? Hmmm... I must be misremembering..."
10029050-25 = "Now it's obvious you're making things up! If you're going to lie, at least show some sincerity!"
10029050-26 = "Now, now. Should we be fighting amongst ourselves right now? We have an audience..."
10029050-30 = "...Huh?"
10029050-31 = "Did anyone else hear that? That's definitely some kind of mechanical noise..."
10029050-35 = "...And again...?"
10029050-36 = "[s3] \"You mentioned this, Eimi...\"\n[s4] \"They're showing up one by one...\""
10029050-39 = "Correct. The automatons of the Ruins."
10029050-40 = "...They're coming. Formation analysis complete."
10029050-41 = "Initiating combat."

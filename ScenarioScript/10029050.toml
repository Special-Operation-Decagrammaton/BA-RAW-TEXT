[translation]
10029050-1 = "第5話;常盤台的[ruby=Railgun]超電磁砲[/ruby]"
10029050-2 = "千年廢墟地下"
10029050-4 = "已經往下走好一段路了……"
10029050-5 = "真奇怪，感覺越往下走，設備反而越不老舊。"
10029050-6 = "保險起見還是確認一下……我們沒走錯路吧？"
10029050-7 = "沒問題。設備越來越新也和原先預期的一樣。"
10029050-8 = "這是因為雖然放置了很久，卻沒有受到其他損傷的關係。"
10029050-9 = "聽你這麼一說，感覺就像是放在冷凍室很久的魚呢。#n比如鯖魚罐頭之類的……"
10029050-10 = "……嗯？老師？"
10029050-11 = "……咦？"
10029050-12 = "意外地很習慣戰鬥？你說我們嗎？"
10029050-13 = "唔嗯……畢竟……"
10029050-14 = "因為各種大大小小的原因……我們其實也挺多災多難的。"
10029050-15 = "誰叫有某個經常引發問題的人在呢？"
10029050-16 = "御坂學姊是學園都市裡僅有七名的「[ruby=LEVEL5]超能力者[/ruby]」之一──#n還被人稱為「[ruby=Railgun]超電磁砲[/ruby]」哦。"
10029050-18 = "……嗯？你剛才說什麼……？"
10029050-19 = "[s1]「[ruby=Railgun]超電磁砲[/ruby]……？」\n[s2]「[ruby=LEVEL5]超能力者[/ruby]……？」"
10029050-22 = "啊，不用放在心上。那件事跟這裡沒有關係。"
10029050-23 = "話說回來，食蜂，你那是什麼形容方式。#n別人聽到會以為我是流氓的吧？"
10029050-24 = "咦？難道不是嗎？唔……記憶好像有點模糊……"
10029050-25 = "分明是在演戲嘛！！要演也演得像一點好不好！！"
10029050-26 = "哎呀哎呀，兩位都冷靜一點。#n這裡還有其他人在，現在吵起來有點……"
10029050-30 = "……嗯？"
10029050-31 = "咦，剛才是不是有類似機器……的聲音？"
10029050-35 = "……又聽見了……？"
10029050-36 = "[s3]「這就是英美說的……」\n[s4]「漸漸出現了嗎……」"
10029050-39 = "嗯，沒錯。是廢墟的自動機。"
10029050-40 = "……往這邊來了。#n模式分析完畢。"
10029050-41 = "突破它們吧。開始戰鬥。"

[translation]
1001108-1 = "#title;선물 고르기"
1001108-2 = "#place;키보토스 내 쇼핑몰"
1001108-3 = "3;슌;03;선생님, 도와주러 와 주셔서 정말 감사해요.\n#3;em;[반짝]\n#3;greeting\n#3;a"
1001108-4 = "3;슌;01;저 혼자서는 아이들이 뭘 좋아하는지 모를 때도 있어서 불안했거든요."
1001108-5 = "3;슌;02;선생님도 아이들이 무얼 좋아하는 지 잘 모르신다고요?\n#3;em;[?]"
1001108-6 = "3;슌;01;괜찮아요, 저희 둘이서 머리를 맞대면 분명 아이들을 만족시킬 수 있는 좋은 선물을 찾을 수 있을거예요."
1001108-7 = "3;슌;01;매화원 아이들이 좋아할 만한 선물이 뭐가 있을까~\n#3;em;[음표]"
1001108-8 = "3;슌;02;어머나, 이것 좀 보세요. 모모프렌즈의 캐릭터 상품이에요!\n#3;hophop\n#3;m4\n#3;em;[반응]"
1001108-9 = "3;슌;03;후후, 산해경 학원에도 이 캐릭터 상품들을 수집하는 학생이 몇 있던데…… #n이 알파카 인형을 선물해주면 좋아할까요?"
1001108-10 = "3;슌;06;어쩐지 무서워 보인다고요? ……확실히 이 눈처럼 생긴 검은 점은 보기에 따라 섬뜩해 보이기도 하네요. 어린 학생들의 교육에는 안 좋을지도 모르겠어요.\n#3;em;[땀]"
1001108-11 = "3;슌;02;그럼 어떤 선물이 좋을까요……? #n인형? 책? 아니면 달콤한 먹거리?\n#3;m3"
1001108-12 = "3;슌;01;이럴 때는 학생들의 심정에서 생각해 보는 것도 좋은 방법이지요. #n선생님이라면 생일 선물로 무얼 받고 싶으신가요?\n#3;em;[?]"
1001108-13 = "[s1] \"현금\"\n[s2] \"돈\""
1001108-14 = "3;슌;04;하하하… 물론 돈을 받는다면 원하는 것을 마음껏 살 수 있겠지만, 축하의 의미도 반감되고 교육에도 좋지 않으니까요. \n#3;em;[땀]\n#3;stiff"
1001108-15 = "3;슌;04;하하하… 물론 돈을 받는다면 원하는 것을 마음껏 살 수 있겠지만, 축하의 의미도 반감되고 교육에도 좋지 않으니까요. \n#3;em;[땀]\n#3;stiff"
1001108-16 = "3;슌;01;좀 더 학생들이 좋아할 만한 물건을 떠올려 보는 게 좋겠어요."
1001108-17 = "[s] \"슌은 생일 선물로 무얼 받고 싶어?\""
1001108-18 = "3;슌;02;저요? 그러고 보니 제 선물은 생각해보지는 않았는데……"
1001108-19 = "3;슌;99;새 옷을 받아도 좋겠고, 다과 시간에 먹을 달콤한 다과를 받아도 좋겠지만, 역시……"
1001108-20 = "[s] \"역시……?\""
1001108-21 = "3;슌;06;그게, 선생님과 함께 할 수 있는 이런……\n#3;em;[///]\n#3;stiff"
1001108-22 = "3;슌;04;아, 아무것도 아니에요! 방금한 말은 잊어주세요!\n#3;hophop"
1001108-23 = "3;슌;04;후우, 역시 학생들에게 선물할 물건은 다른 곳에서 찾는 게 좋겠어요. #n평소에는 먹기 힘든 진귀한 다과라던가……\n#3;m2\n#3;em;[반응]"
1001108-24 = "[s] \"그런 거라면 내가 맛있는 케이크 가게를 알고 있어.\""
1001108-25 = "3;슌;02;어머, 그런가요? 그럼 그쪽으로 하죠."
1001108-26 = "3;슌;01;생일을 맞아 다 같이 맛있는 케이크를 나누어 먹을 수 있다면 모두가 즐거워할 거예요.\n#3;m3"
1001108-27 = "3;슌;01\n#3;d\n#wait;1000"
1001108-28 = "3;슌;03;자, 선생님. 먼저 앞장서 주세요!\n#3;closeup\n#3;em;[반짝]\n#3;a"

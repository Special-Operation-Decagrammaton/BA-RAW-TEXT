[translation]
1001108-1 = "เลือกของขวัญ"
1001108-2 = "ห้างสรรพสินค้าในคิโวทอส"
1001108-3 = "ขอบคุณคุณครูที่มาช่วยฉันนะคะ"
1001108-4 = "ถ้ามาคนเดียว ฉันคงกังวลว่าจะซื้อของได้ไม่ถูกใจเด็กๆ แน่เลยค่ะ"
1001108-5 = "คุณครูก็ไม่รู้ว่าพวกเด็กๆ ชอบอะไรเหรอคะ?"
1001108-6 = "ไม่เป็นไรค่ะ ถ้างั้นเดี๋ยวเรามาช่วยกันคิดว่าเด็กๆ จะชอบอะไร แล้วไปซื้อด้วยกันก็ได้ค่ะ"
1001108-7 = "พวกเด็กๆ ที่สวนต้นบ๊วยจะชอบอะไรกันน้า~"
1001108-8 = "โอ๊ะ ดูนี่สิคะ สินค้าของ MOMO FRIENDS ค่ะ!"
1001108-9 = "ฮุฮุ พวกเด็กๆ ที่ซานไห่จิงเองก็มีคนที่สะสมของพวกนี้อยู่เหมือนกันค่ะ อืม... ถ้าซื้อตุ๊กตาอัลปาก้า#nให้จะชอบรึเปล่านะ?"
1001108-10 = "ดูน่ากลัวงั้นเหรอคะ? ดวงตาของมันดูน่ากลัวนิดๆ อยู่เหมือนกันนะคะ คงไม่ช่วยจูงใจให้เด็กๆ อยาก#nเรียนเพิ่มแน่ๆ เลยค่ะ"
1001108-11 = "ถ้าอย่างนั้นซื้ออะไรดีคะ ตุ๊กตา? หนังสือ... หรือว่าจะซื้อขนมหวานดีคะ?"
1001108-12 = "ในเวลาแบบนี้ลองคิดว่าตัวเองเป็นเด็กดูดีกว่าค่ะ ถ้าเป็นคุณครูละก็ อยากได้อะไรเหรอคะ?"
1001108-13 = "[s1] \"เงินสด\"\n[s2] \"เงินสดเท่านั้น\""
1001108-14 = "ฮะฮะฮ่า.. แน่นอนว่าถ้าได้เป็นเงินก็จะเอาไปซื้อของได้ตามที่ต้องการ แต่ถ้าแบบนั้นความหมาย#nของการให้ของขวัญก็จะถูกลดความสำคัญลงไป ซึ่งมันไม่ดีต่อการเรียนรู้ของเด็กๆ นะคะ"
1001108-15 = "ฮะฮะฮ่า.. แน่นอนว่าถ้าได้เป็นเงินก็จะเอาไปซื้อของได้ตามที่ต้องการ แต่ถ้าแบบนั้นความหมาย#nของการให้ของขวัญก็จะถูกลดความสำคัญลงไป ซึ่งมันไม่ดีต่อการเรียนรู้ของเด็กๆ นะคะ"
1001108-16 = "มาช่วยกันคิดหาของขวัญที่เด็กๆ ชอบน่าจะดีกว่านะคะ"
1001108-17 = "[s] \"แล้วชุนอยากได้อะไรเป็นของขวัญเหรอ?\""
1001108-18 = "ฉันเหรอคะ? ฉันไม่เคยคิดเรื่องของขวัญมาก่อนเลย..."
1001108-19 = "อืม... ฉันอยากได้เสื้อผ้าใหม่ หรือไม่ก็ขนมหวานเอาไว้กินตอนช่วงพัก แต่ว่า..."
1001108-20 = "[s] \"แต่ว่า...?\""
1001108-21 = "แต่ถ้าเลือกได้ฉันอยากเลือกที่จะใช้เวลากับคุณครูแบบนี้มากกว่า..."
1001108-22 = "มะ...ไม่มีอะไรหรอกค่ะ! ลืมที่ฉันพูดไปเมื่อครู่นี้เถอะนะคะ!"
1001108-23 = "เอ่อ... ฉันคิดว่าเราไปเลือกซื้อของขวัญให้เด็กๆ ที่อื่นกันเถอะค่ะ หรือบางทีควรซื้อพวกขนมพิเศษ#nอร่อยๆ..."
1001108-24 = "[s] \"ถ้างั้นครูรู้จักร้านเค้กอร่อยๆ อยู่นะ\""
1001108-25 = "โอ้ จริงเหรอคะ? ถ้างั้นลองไปกันเถอะค่ะ"
1001108-26 = "ถ้าได้นั่งกินเค้กวันเกิดพร้อมๆ กัน ทุกคนคงจะชอบมากแน่ๆ เลยค่ะ"
1001108-28 = "ถ้างั้นคุณครูช่วยนำทางไปหน่อยนะคะ!"

[translation]
1001108-1 = "Choosing Gifts"
1001108-2 = "Kivotos Shopping Mall"
1001108-3 = "Thank you for coming along to help, Sensei."
1001108-4 = "I was nervous about coming alone. I don't always know what the children will like."
1001108-5 = "Oh, you don't know what they may like either?"
1001108-6 = "That's quite all right. Between the two of us, we should be able to brainstorm some gifts the children will enjoy."
1001108-7 = "I wonder what gift the Plum Blossom students will like?"
1001108-8 = "My, look at this. Momo Friends merchandise!"
1001108-9 = "Haha. A few students from Shanhaijing collect this character's merchandise. Perhaps they'd appreciate this alpaca plush as a present?"
1001108-10 = "It doesn't look creepy, does it...? I suppose the eyes may be a little disturbing depending on how you look at them. Maybe it wouldn't be conducive to helping young students learn."
1001108-11 = "Then, what would make for good gifts...? Plushes? Books? Or perhaps some sweets?"
1001108-12 = "Maybe the solution is to imagine ourselves in the students' shoes. Sensei, what would you want for a birthday gift?"
1001108-13 = "[s1] \"A pile of money.\"\n[s2] \"Straight cash.\""
1001108-14 = "Hahaha... Granted, if it were money, you could buy whatever you wanted. But then the gift would lose its meaning, and that wouldn't be good for the students' education."
1001108-15 = "Hahaha... Granted, if it were money, you could buy whatever you wanted. But then the gift would lose its meaning, and that wouldn't be good for the students' education."
1001108-16 = "Let's keep thinking of something the students would appreciate."
1001108-17 = "[s] \"What about you, Shun? What would you want?\""
1001108-18 = "Me? I never considered receiving a gift myself..."
1001108-19 = "I would appreciate new clothes or something sweet to eat during snack time. But what I'd want most..."
1001108-20 = "[s] \"...?\""
1001108-21 = "Well, I'd choose to spend time with you..."
1001108-22 = "N-Never mind! Please forget I said that!"
1001108-23 = "Perhaps we should continue looking for the students' gifts at another shop. Decadent desserts could work..."
1001108-24 = "[s] \"I know a great bakery if that's what you're looking for.\""
1001108-25 = "Do you now? It's decided, then."
1001108-26 = "Sharing a cake on any person's given birthday is something everyone can enjoy."
1001108-28 = "Now, Sensei. Please lead the way!"

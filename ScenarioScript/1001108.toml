[translation]
1001108-1 = "挑選禮物"
1001108-2 = "奇普托斯市內．購物中心"
1001108-3 = "老師，真的很感謝你來幫忙。"
1001108-4 = "我自己一個人有時候也會不知道孩子們喜歡什麼禮物，很不放心呢。"
1001108-5 = "老師也不太清楚孩子們喜歡什麼嗎？"
1001108-6 = "不要緊，只要我們兩個一起思考，一定可以找到能夠讓孩子們滿意的絕佳禮物。"
1001108-7 = "梅花園的孩子們喜歡什麼樣的禮物呢～"
1001108-8 = "哎呀，請看一下這個。是Momo好友的角色商品！"
1001108-9 = "呵呵，梅花園也有些孩子會收集這些角色商品呢…… #n送這個羊駝娃娃會讓孩子們開心嗎？"
1001108-10 = "咦，看起來有點可怕？#n……也對，這個看起來像眼睛的黑點，有些人看了可能會覺得害怕吧。#n說不定對年幼孩童的教育會產生不好的影響。"
1001108-11 = "那要準備什麼禮物才好呢……？ #n娃娃？書？還是甜食？"
1001108-12 = "這種時候試著站在小孩子的立場思考會是個不錯的方法。#n換作是老師，會想收到什麼生日禮物呢？"
1001108-13 = "[s1] 「現金吧。」\n[s2] 「錢吧。」"
1001108-14 = "哈哈哈……確實，用錢當禮物的話就能去買自己想要的東西……#n不過祝賀的心意就會打折扣，而且對小朋友的教育也不太好……"
1001108-15 = "哈哈哈……確實，用錢當禮物的話就能去買自己想要的東西……#n不過祝賀的心意就會打折扣，而且對小朋友的教育也不太好……"
1001108-16 = "希望能多想一些孩子們可能會喜歡的禮物。"
1001108-17 = "[s] 「旬想得到什麼生日禮物？」"
1001108-18 = "我嗎？這麼說來，我很少思考自己想要什麼呢……"
1001108-19 = "收到新衣服也好，收到可以在下午茶吃的甜品也不錯，不過……"
1001108-20 = "[s] 「不過……？」"
1001108-21 = "那個，如果能像今天一樣，和老師一起度過……"
1001108-22 = "沒，沒事！請忘了我說的話吧！"
1001108-23 = "唔，看來還是去其他地方找要送小朋友們的禮物比較好。 #n像是平常很難吃到的少見的零食……"
1001108-24 = "[s] 「那樣的話，我知道一間很好吃的蛋糕店。」"
1001108-25 = "哎呀，是嗎？那就選那間吧。"
1001108-26 = "生日時能跟大家一起分享美味的蛋糕，一定能讓大家都開心。"
1001108-28 = "那麼，老師。請你幫忙帶路囉！"

[translation]
10021022-4 = "Escape Sequences Available: 1"
10021022-13 = "[ns] \"(Ah…)\""
10021022-14 = "...!!!"
10021022-15 = "..."
10021022-19 = "[ns1] \"(Is it really going to end like this?)\"\n[ns2] \"(Did we miss something?)\""
10021022-24 = "[ns] \"No matter what... I must do this.\""
10021022-26 = "[ns3] \"I must fulfill the responsibilities of an adult.\"\n[ns4] \"I must fulfill the duties of a teacher.\""
10021022-32 = "The Chroma has made contact with the Chest's master!"
10021022-33 = "This is unexpected. Did the Chroma respond to their pain? Or..."
10021022-34 = "No. That's impossible. They don't have the sublime, mystic, or terror. There's no reason the Chroma would make contact with such a worthless entity."
10021022-36 = "What is happening?"
10021022-37 = "Are they going to become the Guide of Chroma instead of the god of the underworld?"
10021022-39 = "I don't understand."
10021022-40 = "I don't understand."
10021022-41 = "I don't understand."
10021022-43 = "I don't understand. But if we gain access to that Chest, maybe I don't need to."
10021022-44 = "I will make you the Guide of Chroma as you desire, master of the Chest."
10021022-46 = "You will be called Phrenapates."
10021022-47 = "But you will not act of your own volition. The Guide of Chroma is merely a vessel. You represent the will of the nameless priests."
10021022-48 = "We'll make good use of the Chest's power."
10021022-50 = "You will regret this decision for eternity!"
10021022-56 = "[ns5] \"It seems like Phrenapates wants to say something.\"\n[ns6] \"Why did they become the Guide of Chroma and come here?\""
10021022-65 = "Sensei, I'm sorry. It's my fault."
10021022-66 = "It's because I lived—because I couldn't die..."
10021022-67 = "It's because of my mistake."
10021022-73 = "...Sensei?"
10021022-77 = "Your life matters. Don't regret living."
10021022-81 = "There's nothing wrong with wanting to be happy."
10021022-85 = "Thinking the only way to end your suffering is through death is terrible."
10021022-89 = "You weren't born to suffer."
10021022-90 = "And you shouldn't."
10021022-91 = "No child should ever feel that way."
10021022-95 = "If your world is filled with more pain than happiness..."
10021022-96 = "If you're wishing your life was over just to end the despair..."
10021022-97 = "If you're wandering the world feeling like you don't belong in it..."
10021022-98 = "That's not your fault."
10021022-102 = "It's the fault of the world you live in and the people responsible for it."
10021022-103 = "No one person should ever carry the entire weight of the world on their shoulders...especially not a child."
10021022-107 = "No matter how many horrible things you've done, no matter how many unforgivable offenses you've committed..."
10021022-111 = "It should NEVER be that way."
10021022-115 = "It's not your responsibility."
10021022-116 = "That duty should fall to the adults in your life."
10021022-126 = "Wh-What...? No..."
10021022-127 = "No... No, no, no! Stop, stop, stop!"
10021022-128 = "No, Sensei, no!!!"
10021022-129 = "No, no, no no, no, no, no, Sensei!!!"
10021022-135 = "Don't be mistaken!"
10021022-136 = "That's not the child you think it to be!"
10021022-138 = "That is a manifestation of God! That is the mystic, the terror, the sublime!"
10021022-139 = "That is the light, the fear, the absolute. That is an idea. That is an entity beyond your comprehension!"
10021022-140 = "That is a symbol, a metaphor, expressed in the realm of imagination and manifested in the physical realm!"
10021022-141 = "[ns] \"(No.)\""
10021022-143 = "[ns7] \"(She's real.)\" \n[ns8] \"(I know it.)\""
10021022-146 = "[ns9] \"(She likes bicycles and exercise.)\"\n[ns10] \"(She makes her own masks for bank robberies.)\"\n[ns11] \"(She's the Abydos Foreclosure Task Force second-year, Sunaookami Shiroko.)\""
10021022-150 = "[ns] “She's just a child who's suffering, and I have the power to change that.”"
10021022-151 = "You will regret this decision for eternity!"
10021022-152 = "[ns] “Maybe I will, but...”"
10021022-163 = "It is my responsibility as an adult. It is my duty as Sensei. I will fullfill the responsibilities of an adult. I will fulfill the duties of a teacher."
10021022-167 = "No matter what it takes. No matter what the consequences are... I will do it."
10021022-180 = "S-Sensei...?"
10021022-185 = "As you wish, Sensei."
10021022-186 = "Even if it brings about the end of all worlds..."
10021022-192 = "[ns] Listen to Phrenapates."
10021022-194 = "Please take care of my students."
10021022-198 = "[ns] You respond."

[translation]
10021022-4 = "「逃脫程式」：剩下1次"
10021022-13 = "[ns]（啊啊……）"
10021022-14 = "…………！………………！！"
10021022-15 = "………………………………"
10021022-19 = "[ns1]（結果變成這樣了啊……）\n[ns2]（沒能傳達，應該傳達的事……）"
10021022-24 = "[ns] 但是……必須要做到"
10021022-26 = "[ns3] 盡「大人」的責任\n[ns4] 盡「老師」的義務"
10021022-32 = "「色彩」和箱子的主人接觸了！"
10021022-33 = "這個事態不在計畫之內……色彩對那個人的「痛苦」產生反應了嗎，還是──"
10021022-34 = "不可能。那個人不具備任何「崇高」、「神祕」和「恐怖」。#n「色彩」沒理由接觸沒有價值的存在。"
10021022-36 = "所以──這意味著什麼？"
10021022-37 = "那個人要代替死神成為「色彩的嚮導者」嗎？"
10021022-39 = "無法理解。"
10021022-40 = "無法理解。"
10021022-41 = "無法理解。"
10021022-43 = "無法理解──但是，如果那個「箱子」能為吾等所用，便無需理解。"
10021022-44 = "箱子的主人啊──那麼就如你所願，賜予你「色彩的嚮導者」的職責。"
10021022-46 = "賜予你「[ruby=誘騙者]虛偽的老師[/ruby]」之名。"
10021022-47 = "「色彩的嚮導者」僅須貫徹吾等無名祭司的意志。#n別妄想保留自己的意志。"
10021022-48 = "「箱子」的力量，就由吾等收下。"
10021022-50 = "你的這個選擇……將會讓你永遠後悔莫及吧──！！"
10021022-56 = "[ns5]「誘騙者他……好像有話想告訴你。」\n[ns6]「不惜成為『色彩的嚮導者』也要來到這裡的理由──」 "
10021022-65 = "老師……對不起……都怪我……"
10021022-66 = "因為我，活著……因為，我沒能死去……"
10021022-67 = "都是，我的錯……"
10021022-73 = "……老師？"
10021022-77 = "不要為自己的誕生──感到後悔、責備自己。"
10021022-81 = "不要否定──想要獲得幸福的心情。"
10021022-85 = "不要說出──放棄生存是從痛苦中解放，這種悲傷的話。"
10021022-89 = "不要認為──自己是為了受苦而誕生。"
10021022-90 = "絕對不是這樣的。"
10021022-91 = "無論是怎麼樣的[ruby=孩子]學生[/ruby]，都沒有必要這麼想。"
10021022-95 = "如果孩子們的「世界」裡充滿著苦痛──"
10021022-96 = "如果孩子們希望，能夠結束活在絕望與悲傷深淵裡的人生──"
10021022-97 = "如果那樣的願望存在於這個世界的某處──"
10021022-98 = "那麼──"
10021022-102 = "該承擔錯誤的是這個「世界」的負責人，而不是孩子們──"
10021022-103 = "那是世界的「背負責任之人」應該承擔的責任。"
10021022-107 = "即使犯下罪行，即使犯下無法饒恕的過錯──"
10021022-111 = "由[ruby=孩子]學生[/ruby]背負責任的世界，根本不應該存在。"
10021022-115 = "無論在什麼時候──"
10021022-116 = "那都是和孩子們一起生活的[ruby=・]大[/ruby][ruby=・]人[/ruby]應該背負的責任。"
10021022-126 = "不，不要……"
10021022-127 = "不，不行……住，住手，拜託了……"
10021022-128 = "啊……啊啊啊啊啊啊啊啊啊……"
10021022-129 = "老，老師──────！！！！！！！"
10021022-135 = "少自傲了──！！"
10021022-136 = "那並非你所認識的[ruby=孩子]學生[/ruby]！！"
10021022-138 = "那是顯現的神──#n是「神祕」、「恐怖」、「崇高」……是「光」，是「絕對者」！！"
10021022-139 = "那是「觀念」……是你無法理解，應當畏懼的對象！！"
10021022-140 = "是在想像界表象，抵達了實相界──是象徵界的記號和[ruby=metaphor]「隱喻」[/ruby]！！！"
10021022-141 = "[ns]（不是的，） "
10021022-143 = "[ns7]（那孩子……） \n[ns8]（那孩子，只是……） "
10021022-146 = "[ns9]（單純的……非常喜歡自行車和運動……） \n[ns10]（為了夥伴，即使要蒙面搶銀行也在所不惜……）\n[ns11]（阿拜多斯高中的……砂狼白子）"
10021022-150 = "[ns] 只是一個在我的「世界」裡受苦的「孩子」。"
10021022-151 = "你的這個選擇……將會讓你永遠後悔莫及吧──！！"
10021022-152 = "[ns] 或許吧……不過，"
10021022-163 = "以大人的身分──保護孩子，以老師的身分保護學生。#n盡大人的責任──盡老師的義務，僅此而已。"
10021022-167 = "無論要用什麼方法，#n無論要付出多大的代價。"
10021022-180 = "老，師……？"
10021022-185 = "我知道了。遵從老師的指示。"
10021022-186 = "即使，會招來世界的終焉。"
10021022-192 = "[ns] 傾聽誘騙者的話"
10021022-194 = "學生們……就拜託你了。"
10021022-198 = "[ns] 回應"

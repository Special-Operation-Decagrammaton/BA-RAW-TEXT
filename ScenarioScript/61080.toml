61080-209 = "มันมีคำที่ว่าเด็กๆ เติบโตขึ้นจากการสู้กันอยู่ใช่ไหมล่ะ?"
61080-210 = "พอฉันพูดแบบนั้น ก็เกิดความคิดหลายอย่างงั้นเหรอ? ฮุฮุ จะถือว่าเป็นคำชมแล้วกันนะ "
61080-211 = "แต่ยังไงก็... ยิ่งรู้สึกว่าได้กลับมาแล้วจริงๆ นะคะ แหะ... แหะๆ..."
61080-212 = "แต่ว่า อาสึโกะ ตอนนี้ไม่ใส่หน้ากากก็ได้เหรอ?"

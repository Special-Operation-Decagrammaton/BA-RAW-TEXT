[translation]
61080-1 = "第8話;奧利斯式"
61080-7 = "是真的……"
61080-8 = "小隊真的來了…… "
61080-9 = "他們憑什麼回來啊？#n明明是自己拋下這裡離開的……"
61080-11 = "在這裡的時候，還把該享受的特權都享受過了說…… "
61080-12 = "雖然現在回頭想想，那些特權其實也不怎麼樣就是了。"
61080-13 = "那個大人就是老師嗎……？#n我還是第一次親眼見到……"
61080-14 = "我之前倒是見過。#n只是當時我沒怎麼在意…… "
61080-16 = "……皮膚有種刺痛的感覺。 "
61080-17 = "咦，咦咦？沒事吧？#n我這裡還有乳液……！"
61080-18 = "沒事的，日和。美咲不是這個意思。#n這是…… "
61080-19 = "「敵意」的問題。 "
61080-27 = "小隊──還有錠前沙織。 "
61080-28 = "昴。 "
61080-29 = "我就開門見山地問了──你們來這裡做什麼？ "
61080-30 = "有事要辦。 "
61080-31 = "聽說你們成為了通緝犯，必須到處躲躲藏藏啊。 "
61080-32 = "現在也是同樣的處境。 "
61080-33 = "原來如此。所以是厭倦了那種生活嗎？"
61080-34 = "……確實是有點累了。"
61080-38 = "沙醬……？ "
61080-39 = "抱歉，敦子。#n至少在這裡，我不想說謊。 "
61080-40 = "……無論喜不喜歡，至少在這名為奧利斯分校的地方。 "
61080-44 = "嗯……原來如此。我懂了。 "
61080-46 = "這樣啊。那麼你們之所以回來……是為了要結束那種生活囉？ "
61080-47 = "不過很可惜，屬於你們的位置……似乎已經不存在了。 "
61080-48 = "不是那樣的。"
61080-49 = "只是……"
61080-50 = "……呵呵。 "
61080-51 = "有什麼好笑的？"
61080-52 = "抱歉，沒什麼。 "
61080-53 = "只是想到接下來要說的答案，突然覺得好笑而已。"
61080-54 = "一陣子沒見，你變得更擅長讓人火大了啊。"
61080-55 = "以前多少也有這種傾向，現在又變得更明顯了。 "
61080-56 = "你說我嗎？如果是的話我向你道歉。#n雖然無法改變過去……"
61080-61 = "我指的就是你這種態度！！！"
61080-65 = "嘶……呼…… "
61080-66 = "好吧，算了。#n所以你們到底來這裡做什麼，小隊。"
61080-67 = "是為了……"
61080-68 = "跟大家一起參加考試！"
61080-72 = "……什麼？ "
61080-74 = "他，他在說什麼啊……#n考試？我剛才沒聽錯吧？ "
61080-75 = "我聽到的也是同樣的東西，所以應該沒錯。 "
61080-76 = "真是莫名其妙……#n是不是在外面生活太久的關係……腦袋壞掉了啊？ "
61080-78 = "先，先等一下！我有點……跟不上話題。#n再給我一點時間整理思緒……"
61080-82 = "…… "
61080-83 = "整理完也還是不懂！"
61080-85 = "噗哧。 "
61080-86 = "美，美咲？"
61080-87 = "抱歉，公主。不過我好像多少理解隊長剛才的心情了。 "
61080-88 = "這確實……會讓人忍不住笑出來。"
61080-89 = "尤其是看到昴前輩慌亂的樣子。 "
61080-91 = "是嗎……看來是我表達的方式有點難以理解。"
61080-92 = "我只是嘗試運用之前學過的「先說結論」表達法，希望能更快進入正題……"
61080-93 = "不，不對。這果然也要視時機、情境和脈絡而定吧。 "
61080-94 = "既然知道就快點講清楚說明白！"
61080-95 = "嗯。 "
61080-96 = "簡單來說就是……"
61080-97 = "…… "
61080-99 = "大家一起來考試吧。 "
61080-100 = "你是笨蛋嗎！？"
61080-101 = "但，但是除了這個之外，我真的沒什麼要特別說的東西。 "
61080-102 = "你們看，我把題目也帶來了。 "
61080-108 = "重點是！為什麼連我們奧利斯也得考這種東西啊！？"
61080-109 = "這個嘛…… "
61080-110 = "因為是學生？ "
61080-111 = "我看你是存心想氣死我，錠前沙織……！ "
61080-115 = "好久沒看到前輩這樣了…… "
61080-116 = "他們兩個一直都是這樣吧。個性天生就合不來。 "
61080-119 = "這，這樣真的沒問題嗎……"
61080-120 = "管他的。反正又沒說錯。 "
61080-121 = "我甚至都想出聲應援一下了。 "
61080-122 = "嗯，這次我也贊成。#n加油，沙醬。 "
61080-123 = "噫，噫噫…… "
61080-125 = "[ns]「沙織看起來快撐不住了，接下來就交給我吧！」 "
61080-126 = "老，老師？"
61080-127 = "……你就是夏萊的「老師」吧。"
61080-128 = "初次見面。還有…… "
61080-129 = "歡迎來到奧利斯，[USERNAME]老師。 "
61080-130 = "姑且先這樣吧。 "
61080-131 = "[s]「我聽沙織說過關於昴的事哦。」 "
61080-132 = "啊？ "
61080-133 = "[s]「當，當然也有聽其他小隊的孩子們說過啦！」 "
61080-134 = "……這是什麼意思？ "
61080-135 = "算了，先不說這些……"
61080-136 = "突然跑來說要考試，我們實在有點難以接受。"
61080-137 = "[s]「哎呀，學生就應該學習跟考試才對。」 "
61080-138 = "你覺得這種話在奧利斯也說得通嗎？ "
61080-139 = "[s1]「有什麼問題～？奧利斯不也是學園嗎～？」\n[s2]「你們不也是學生嗎～？」"
61080-142 = "……！"
61080-143 = "我們……是學生？ "
61080-144 = "至，至少在分類上應該算吧……？ "
61080-145 = "畢竟奇普托斯是學園都市，然後奧利斯又是其中的一部分……"
61080-148 = "可，可是……"
61080-149 = "我懂你的意思。#n像我們這樣的存在……"
61080-150 = "真的能像其他學生一樣……被稱為學生嗎？"
61080-154 = "……至少，我認為不是所有學生都需要學習。 "
61080-155 = "這就是我們所能給出的答案。"
61080-156 = "[s]「……沒錯。或許確實就跟你說的一樣。」 "
61080-157 = "嗯……？ "
61080-158 = "[s3]「不過，要不要先嘗試看看呢？」  \n[s4]「先試著學習，如果最後還是覺得沒用的話……」  \n[s5]「到時候再徹底放棄也不遲。」"
61080-162 = "反正結論都一樣，為什麼還要特地走這麼麻煩的過程？ "
61080-163 = "嗯？因為挑戰沒嘗試過的事，就是青春……？ "
61080-164 = "真是夢幻般的理想論啊…… "
61080-165 = "[s6]「你的回答還真尖銳……」  \n[s7]「不過老師這個職業，多少就該有點這種成分……」"
61080-168 = "回答得真理直氣壯呢…… "
61080-169 = "唉……好吧，我明白了。 "
61080-170 = "[s]「你願意接受嗎？」 "
61080-171 = "嗯。 "
61080-175 = "我明白老師和我們的意見，是兩條永遠不會交會的平行線了。 "
61080-179 = "……別擺出那種失望的表情。你可是大人啊。 "
61080-180 = "總之，如果是這樣的話……"
61080-181 = "你們是否有資格進入奧利斯──就讓我們先來場「考試」吧。"
61080-185 = "[ns]「什麼！？」 "
61080-186 = "小隊！你們是奧利斯的叛徒！#n我們的認知，直到現在也沒有改變！ "
61080-187 = "如果真的想回到奧利斯的話，就在這裡證明你們的存在價值吧！ "
61080-188 = "開保險！ "
61080-197 = "……果然會變成這樣嗎。 "
61080-206 = "[ns]「大家在做什麼！？」 "
61080-207 = "沒事的，老師。#n某種意義上來說，這就是奧利斯的作法。 "
61080-208 = "或許對老師來說有點陌生，但我們一直都是這樣的。"
61080-209 = "不是有句話叫「孩子就是在戰鬥中成長」嗎？"
61080-210 = "聽我這麼說讓你很有感觸？#n呵呵，我就當作這是種稱讚吧。"
61080-211 = "不過……有種真的回來了的感覺呢。#n嘿，嘿嘿…… "
61080-212 = "話說，敦子。你不戴面具沒問題嗎？ "
61080-213 = "嗯。因為戴上它會讓我很難說話。 "
61080-214 = "沒事的，沙織。#n我已經沒有那麼脆弱了。 "
61080-215 = "……我知道了。"
61080-216 = "聽我說，老師。#n你先移到比較安全的地方。 "
61080-217 = "然後……指揮我們吧。 "
61080-219 = "[ns]「結果還是變成這樣了啊……」 "
61080-221 = "這裡是奧利斯！ "
61080-222 = "這裡是奧利斯！ "
61080-223 = "如果有想堅持的信念，就用自己的力量去貫徹！ "
61080-224 = "用自己的力量！ "
61080-225 = "沒有力量的正義，只是空洞的呼喊！  "
61080-226 = "能為自己的人生負責的，就只有自己！ "
61080-227 = "哇啊啊啊啊！ "
61080-232 = "…… "
61080-233 = "奧利斯小隊。 "
61080-245 = "準備應戰。"

[translation]
61080-1 = "ตอนที่ 8;ตามวิถีอาเรียส"
61080-7 = "จริงด้วยสินะ..."
61080-8 = "สควอดมากันจริงๆ ด้วย..."
61080-9 = "ไม่ละอายใจกันหรือไง? ตัวเองทอดทิ้งที่นี่แล้วก้าวเท้าออกไปเองแท้ๆ..."
61080-11 = "ตอนอยู่ที่นี่ก็ได้อภิสิทธิ์อะไรตั้งเยอะแยะ..."
61080-12 = "ตอนนี้พอมาคิดดูแล้ว อภิสิทธิ์นั่นก็ใช่ว่าจะพิเศษอะไรหรอก"
61080-13 = "ผู้ใหญ่คนนั้น... คือคุณครูเหรอ...? ฉันเพิ่งเคยเห็นกับตาตัวเองเป็นครั้งแรกเลย"
61080-14 = "ฉันเคยเห็นนะ แต่ตอนนั้นฉันไม่ได้สนใจอะไรมากน่ะ..."
61080-16 = "รู้สึกแสบร้อนผิวขึ้นมาเลยแฮะ..."
61080-17 = "คะ... คะ? แสบมากหรือเปล่าคะ? ฉันยังมีโลชันทาผิวเหลืออยู่นะ...!"
61080-18 = "ไม่เป็นไรหรอก ฮิโยริ มิซากิไม่ได้หมายความตรงตัวแบบนั้นหรอก มันคือ..."
61080-19 = "'ความรู้สึกเป็นศัตรู' น่ะ"
61080-27 = "สควอด แล้วก็โจมาเอะ ซาโอริ"
61080-28 = "สุบารุ"
61080-29 = "ขอเข้าเรื่องเลยนะคะ มาที่นี่ทำไมคะ?"
61080-30 = "มีธุระนิดหน่อยน่ะ"
61080-31 = "ได้ยินว่าถูกหมายหัวไว้ ก็เลยต้องหลบซ่อนตามที่ต่างๆ นี่คะ"
61080-32 = "ตอนนี้ก็ยังอยู่ในสภาพนั้นละ"
61080-33 = "งั้นสินะคะ หรือว่าเบื่อการใช้ชีวิตแบบนั้นแล้วคะ?"
61080-34 = "จะบอกว่าเหนื่อยนิดหน่อยก็ได้นะ..."
61080-38 = "ซัตจัง...?"
61080-39 = "ขอโทษนะ อาสึโกะ ฉันไม่อยากพูดโกหกที่นี่น่ะ"
61080-40 = "ไม่ว่าจะดีหรือร้าย แต่ฉันก็อยากจริงใจเมื่ออยู่ในโรงเรียนสาขาอาเรียส..."
61080-44 = "อื้อ... อย่างนั้นสินะ ฉันพอจะเข้าใจแล้วละ"
61080-46 = "งั้นเหรอคะ ก็เลยอยากเลิกใช้ชีวิตแบบนั้น แล้วกลับมาที่นี่อีกครั้งงั้นเหรอ?"
61080-47 = "แต่ก็น่าเสียดายนะคะ ดูเหมือนที่ของพวกคุณจะไม่มีเหลือแล้วน่ะค่ะ"
61080-48 = "ไม่ใช่แบบนั้นหรอก"
61080-49 = "ก็แค่... นั้นเองน่ะนะ"
61080-50 = "ฮุฮุ..."
61080-51 = "หัวเราะอะไรคะ?"
61080-52 = "เปล่าหรอก ขอโทษที่เสียมารยาทนะ"
61080-53 = "แต่พอคิดถึงคำตอบที่ฉันจะพูดออกไปจากนี้ ฉันก็หัวเราะออกมาโดยไม่รู้ตัวเลย"
61080-54 = "ระหว่างที่หายไป สงสัยไปฝึกเรื่องการทำให้คนอื่นหงุดหงิดจนเก่งเลยนะคะ"
61080-55 = "ถึงเมื่อก่อนก็เคยมีมุมนั้นอยู่บ้างก็เถอะค่ะ"
61080-56 = "ฉันน่ะเหรอ? งั้นก็ต้องขอโทษด้วยนะ ถึงจะย้อนเวลากลับไปไม่ได้ แต่ก็..."
61080-61 = "แบบนี้ละค่ะที่ทำให้หงุดหงิด!!!"
61080-65 = "ฮึบ... ฮู่ว..."
61080-66 = "เอาเถอะค่ะ แล้วกลับมาทำไมกันเหรอคะ สควอด?"
61080-67 = "เหตุผลก็คือ..."
61080-68 = "เพื่อให้ทุกคนได้ทำข้อสอบด้วยกัน!"
61080-72 = "คะ...?"
61080-74 = "พะ... พูดเรื่องอะไรน่ะ? สอบเหรอ...? ฉันไม่ได้หูฝาดไปใช่มั้ย?"
61080-75 = "ฉันก็เหมือนจะได้ยินคำคำเดียวกันเลย งั้นก็คงฟังไม่ผิดหรอก"
61080-76 = "แต่ฉันไม่เห็นเข้าใจเลยว่าหมายความว่าอะไร... พอออกไปใช้ชีวิตข้างนอกนานๆ ก็เลย... เพี้ยนไปนิดหน่อยหรือเปล่านะ?"
61080-78 = "ดะ... เดี๋ยวนะคะ! ฉัน... ยังตามไม่ค่อยทันค่ะ ขอฉันคิดอีกรอบ..."
61080-82 = "......"
61080-83 = "ต่อให้คิดอีกรอบก็ไม่เข้าใจอยู่ดีค่ะ!"
61080-85 = "ฮุฮุ"
61080-86 = "มะ.. มิซากิ?"
61080-87 = "ขอโทษนะ องค์หญิง แต่ฉันเหมือนจะเข้าใจคำที่หัวหน้าพูดน่ะ"
61080-88 = "เรื่องนี้มัน... น่าขำจริงๆ เลย"
61080-89 = "สีหน้าที่สับสนของรุ่นพี่สุบารุนั่นก็ด้วย"
61080-91 = "อืม งั้นสินะ? พูดแบบนี้แล้วเข้าใจยากงั้นสินะ"
61080-92 = "อุตส่าห์เรียนมาว่าการพูดแบบเข้าข้อสรุปก่อนจะทำให้เข้าใจเรื่องราวได้ดีกว่าแท้ๆ..."
61080-93 = "มะ... ไม่สิ มันคงขึ้นอยู่กับเวลา สถานการณ์ และบริบทด้วย"
61080-94 = "ถ้างั้นก็เกริ่นรายละเอียดมาก่อนสิคะ จะได้เข้าใจง่ายๆ ไง!"
61080-95 = "อืม"
61080-96 = "ก็ได้"
61080-97 = "......"
61080-99 = "ฉันมาชวนให้ทุกคนทำข้อสอบด้วยกัน"
61080-100 = "นี่น่ะเหรอคะการเกริ่นน่ะ?!"
61080-101 = "ตะ... แต่ฉันไม่มีอะไรที่จะพูดเป็นพิเศษแล้ว"
61080-102 = "เอ้านี่ ฉันเอาข้อสอบมาให้แล้วด้วย"
61080-108 = "แล้วทำไมนักเรียนอาเรียสต้องทำอะไรแบบนั้นด้วยล่ะคะ!"
61080-109 = "อืม..."
61080-110 = "ก็เพราะเป็นนักเรียนไง?"
61080-111 = "ทำให้คนอื่นโกรธได้จนถึงวินาทีสุดท้ายเลยนะคะ โจมาเอะ ซาโอริ...!"
61080-115 = "ไม่ได้เห็นรุ่นพี่เป็นแบบนั้นนานแล้วนะ..."
61080-116 = "2 คนนี้ก็เป็นแบบนั้นมาแต่ไหนแต่ไรแล้วนี่ คงจะมีนิสัยที่เข้ากันไม่ได้มาตั้งแต่เกิดน่ะ"
61080-119 = "จะ... จะไหวเหรอคะเนี่ย..."
61080-120 = "ต้องไหวสิ หัวหน้าไม่ได้พูดอะไรไม่ถูกต้องสักหน่อย"
61080-121 = "ฉันอยากชมเป็นการส่วนตัวว่า 'พูดดีแล้ว พูดต่ออีก' ด้วยซ้ำ"
61080-122 = "อื้อ ครั้งนี้ฉันก็เห็นด้วย สู้เค้านะ ซัตจัง"
61080-123 = "ฮะ... เฮือกกก..."
61080-125 = "[ns] \"ซาโอริน่าจะกำลังลำบากนะ ครูขอเข้าไปเอี่ยวหน่อยแล้วกัน!\""

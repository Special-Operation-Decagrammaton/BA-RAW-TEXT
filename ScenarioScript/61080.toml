61080-171 = "ค่ะ"
61080-175 = "เข้าใจแล้วว่าความคิดเห็นของคุณครูกับของพวกฉันอยู่บนเส้นขนานที่ไม่มีวันมาบรรจบกันได้ค่ะ"
61080-179 = "อย่าทำหน้าผิดหวังขนาดนั้นสิคะ... คุณครูเป็นผู้ใหญ่นะคะ"
61080-180 = "เอาเถอะค่ะ ถ้างั้น..."
61080-181 = "งั้นก็ลองมา 'ทดสอบ' ดูค่ะว่าพวกคุณมีคุณสมบัติที่จะเข้ามาในอาเรียสหรือเปล่า"
61080-185 = "[ns] \"หืม?!\""
61080-186 = "สควอด! ครั้งหนึ่งพวกเธอคือคนทรยศต่ออาเรียส สำหรับพวกฉัน พวกเธอยังคงเป็นแบบนั้นจนถึงทุกวันนี้!"
61080-187 = "ถ้าอยากกลับมาที่อาเรียสอีกครั้งจริงๆ ก็จงพิสูจน์คุณค่าการมีอยู่ของพวกเธอให้เห็น!"
61080-188 = "ปลดล็อกอุปกรณ์ป้องกันความปลอดภัย!"

61080-156 = "[s] \"ใช่... บางทีอาจจะเป็นอย่างนั้นก็ได้\""
61080-157 = "คะ...?"
61080-158 = "[s3] \"แต่ก็ลองเรียนดูก่อนมั้ย ถ้าไม่เห็นผลก็ไม่เป็นไร\"\n[s4] \"ลองเรียนให้รู้ว่าเป็นยังไงก่อนมั้ย ถ้าไม่โอเคก็ไม่เป็นไร\"\n[s5] \"ลองเรียนดูก่อนนะ ถ้าไม่มีประโยชน์ก็ค่อยเลิกเรียนก็ได้\""
61080-162 = "ยังไงข้อสรุปก็เหมือนกันอยู่ดี แล้วทำไมต้องผ่านขั้นตอนที่ยุ่งยากก่อนด้วยล่ะคะ?"

61080-165 = "[s6] \"ครูพูดจี้จุดสินะ...\"\n[s7] \"แต่คนเป็นครูก็ต้องพูดแบบนี้แหละนะ...\""
61080-168 = "ตอบอย่างมั่นอกมั่นใจเลยนะคะ..."

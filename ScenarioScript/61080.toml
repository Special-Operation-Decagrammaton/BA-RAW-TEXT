61080-138 = "คิดว่าเรื่องแบบนั้นจะใช้ได้กับอาเรียสด้วยเหรอคะ?"
61080-139 = "[s1] \"แปลกจัง~? อาเรียสก็เป็นโรงเรียนหนึ่งนี่นา~\"\n[s2] \"แต่พวกเราก็เป็นนักเรียนเหมือนกันไม่ใช่เหรอ~?\""
61080-142 = "...!"

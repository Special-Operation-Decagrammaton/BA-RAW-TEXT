[translation]
61080-1 = "Episode 8;Arius Style"
61080-7 = "It's really them..."
61080-8 = "The Squad is actually here..."
61080-9 = "What nerve, coming back here after abandoning us..."
61080-11 = "They were the ones who always got all the special perks, too."
61080-12 = "To be honest, looking back, you could hardly call those \"perks,\" though."
61080-13 = "The big one is Sensei? I've never seen them in person before."
61080-14 = "I think I did last time. They were pretty forgettable..."
61080-16 = "...My skin is prickling."
61080-17 = "E-Eh?! Are you okay, Misaki? H-Here! Lotion! I have some lotion!"
61080-18 = "That's kind of you, Hiyori, but that's not what she meant."
61080-19 = "She was referring to the hostility in the air."
61080-27 = "The Squad and Joumae Saori."
61080-28 = "Subaru."
61080-29 = "I'll get to the point. Why are you here?"
61080-30 = "We had business here."
61080-31 = "Have you been enjoying your time as a fugitive? Hiding around like a rat?"
61080-32 = "Yes, I'm still doing that."
61080-33 = "So are you here because you're finally tired of your fancy new life?"
61080-34 = "...It is a little tiring."
61080-38 = "Sao-Sao...?"
61080-39 = "Sorry, Atsuko. It feels wrong to be dishonest here."
61080-40 = "For better or worse, while I'm standing on Arius grounds..."
61080-44 = "...I think I understand."
61080-46 = "I see. So you came crawling back because the grass wasn't greener on the other side?"
61080-47 = "Hmmm. Looks like there's no seat for you here, though. So, terribly sorry."
61080-48 = "That's not it."
61080-49 = "It's just that..."
61080-50 = "...Heh."
61080-51 = "What are you laughing at?"
61080-52 = "Nothing. Pardon me."
61080-53 = "Thinking about how to respond, I couldn't help but laugh a little at my own thoughts."
61080-54 = "Were you always this good at being unbearably annoying?"
61080-55 = "Thinking about it, yes. You were."
61080-56 = "If I was, I'd like to apologize. I can't change the past, but..."
61080-61 = "That is exactly what I mean!"
61080-65 = "*inhale*... *exhale*..."
61080-66 = "Fine, great. So then why have you returned?"
61080-67 = "The reason is..."
61080-68 = "...so we can all take an exam together!"
61080-72 = "...Sorry?"
61080-74 = "Wh-What did she just say? An exam...? I didn't mishear that, did I?"
61080-75 = "No, no. I heard the same thing."
61080-76 = "I have no idea what she's talking about... Maybe this is what the outside does to you..."
61080-78 = "H-Hold on! I wasn't expecting that at all. I need a minute to process!"
61080-82 = "..."
61080-83 = "No matter how many times I think it over, that makes no sense!"
61080-85 = "Pffft."
61080-86 = "M-Misaki?"
61080-87 = "Sorry, Hime. But I know why Leader was laughing."
61080-88 = "You can't help but laugh at the situation."
61080-89 = "And Subaru's confusion was the icing on the cake."
61080-91 = "Hm. I see. My word choice must have been poor."
61080-92 = "I recently heard that stating the conclusion first can benefit the flow of conversation."
61080-93 = "No, wait. I needed to consider the context and timing as well..."
61080-94 = "If you already knew that, then start with the context!"
61080-95 = "Um."
61080-96 = "In other words..."
61080-97 = "..."
61080-99 = "We'd like for everyone to take an exam together."
61080-100 = "Are you actually stupid?!"
61080-101 = "I-I don't know how else to say it."
61080-102 = "Look. I have the papers here."
61080-108 = "And I'm asking you why Arius students would even consider doing something like that!"
61080-109 = "Um..."
61080-110 = "Because you are students?"
61080-111 = "You seriously know how to tick someone off, Joumae Saori!"
61080-115 = "We haven't seen Subaru blow up like this in a while..."
61080-116 = "Don't you remember? Those two have always butted heads. Like it's in their blood."
61080-119 = "Sh-Should we do something?"
61080-120 = "What? Why? She's not doing anything wrong."
61080-121 = "This is one of the few times I feel like cheering her on, actually."
61080-122 = "I feel similarly. You can do it, Sao-Sao!"
61080-123 = "O-Okay..."
61080-125 = "[ns] \"Since this isn't Saori's specialty, I'll step in!\""
61080-126 = "S-Sensei?"
61080-127 = "...So you are Schale's Sensei."
61080-128 = "It's a pleasure to meet you."
61080-129 = "I'd like to welcome you to Arius, [USERNAME] Sensei."
61080-130 = "For now, at least."
61080-131 = "[s] \"I've heard about you from Saori.\""
61080-132 = "Why from her?"
61080-133 = "[s] \"A-And from the other Squad members as well, of course!\""
61080-134 = "...But why?"
61080-135 = "Anyway, fine."
61080-136 = "You can understand why it's difficult for us to understand why an outsider would come into our territory and demand we take some test."
61080-137 = "[s] \"As a student, studying and exams are part of your responsibilities!\""
61080-138 = "Why are you applying your way of life and thinking to Arius?"
61080-139 = "[s1] \"Well, isn't Arius still a school?\"\n[s2] \"And you all are definitely students, right?\""
61080-142 = "...!"
61080-143 = "We're... students?"
61080-144 = "W-Well, I guess we technically are? In, like, a super-literal sense."
61080-145 = "Arius IS part of the Academy City, right?"
61080-148 = "B-But..."
61080-149 = "...people like us..."
61080-150 = "Could you really consider us normal students?"
61080-154 = "...I don't believe that studying is required for a student."
61080-155 = "That's all I have to say to you."
61080-156 = "[s] \"...Right. That might be true.\""
61080-157 = "What...?"
61080-158 = "[s3] \"Hear me out, okay?\" \n[s4] \"Just try them out once: studying, exams, 'normal' student activities.\"\n[s5] \"If, after all that, you still think it's useless, I'll leave it alone.\""
61080-162 = "Why would we do all that? Just to confirm what we already know?"
61080-163 = "Huh? Being a student is about challenging your beliefs and trying new things?"
61080-164 = "...Are you living in a fantasy world? What are these idealistic views?"
61080-165 = "[s6] \"You sure know how to hit where it hurts...\"\n[s7] \"Being a teacher means being at least a little idealistic.\""
61080-168 = "You say that, but you don't seem bothered at all."
61080-169 = "*sigh* Okay. I understand."
61080-170 = "[s] \"Really? You do?!\""
61080-171 = "Yes."
61080-175 = "I understand very well now that your view of the world and ours are running along parallel lines that will never meet."
61080-179 = "...Your disappointment is tangible. I thought an adult would be more mature."
61080-180 = "Fine, if that's how you'd like to play it..."
61080-181 = "You can't enter Arius without proving you have the right to stay first."
61080-185 = "[ns] \"Uh...?!\""
61080-186 = "Squad! You were, and always will be, traitors to us!"
61080-187 = "If you really want to come back to Arius, then prove the value of your existence right here, right now!"
61080-188 = "Safeties off!"
61080-197 = "...So this is our only option?"
61080-206 = "[ns] \"What are you all doing right now?!\""
61080-207 = "This is the Arius way, Sensei."
61080-208 = "You may not like it, but here? This is how it's always been."
61080-209 = "Kids grow up with their fists, after all."
61080-210 = "You're surprised to hear that from me? I'll elect to choose that as a compliment. "
61080-211 = "B-But, um... It's a little comforting! This makes me feel like we're really back home. Heehee."
61080-212 = "Atsuko, will you be okay without your mask?"
61080-213 = "Yes. It gets a bit stuffy and difficult to talk with it on."
61080-214 = "You don't have to fret over me anymore, Saori. I'm stronger than I was."
61080-215 = "...Understood."
61080-216 = "Listen carefully, Sensei. Get yourself somewhere safe."
61080-217 = "Then...we'll be at your directive."
61080-219 = "[ns] \"Why do things always end up this way...?\""
61080-221 = "This is Arius!"
61080-222 = "This is Arius!"
61080-223 = "If you believe in what you're saying, prove it to us!"
61080-224 = "Strength is power!"
61080-225 = "There is no justice without power, no beliefs without strength! "
61080-226 = "And the only one who can take responsibility for your life is yourself!"
61080-227 = "GRAAAH!!"
61080-232 = "..."
61080-233 = "Arius Squad."
61080-245 = "Prepare to engage."

61080-150 = "จะเป็นนักเรียนเหมือนกับพวกนักเรียนคนอื่นๆ ได้หรือเปล่า... ใช่มั้ยล่ะ?"
61080-154 = "ก่อนอื่นเลย ฉันคิดว่าการเรียนไม่ใช่สิ่งจำเป็นสำหรับนักเรียนทุกคนค่ะ..."

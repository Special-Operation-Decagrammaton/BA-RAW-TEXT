[translation]
2001105-1 = "再稍微一下"
2001105-4 = "（比和茜香約好的時間還早到了一點）"
2001105-5 = "（就這樣等著等著，直到過了約好的時間，茜香依然沒有出現在約好的地方）"
2001105-6 = "[s] 「是因為打工太忙了嗎……？」"
2001105-8 = "（離約好的時間已經過了20分鐘……）"
2001105-10 = "[ns] 「難道是在哪裡倒下了嗎……」"
2001105-11 = "（腦中閃過之前茜香打工時因為過勞而倒下的記憶，於是趕忙去找茜香）"
2001105-22 = "[ns] 「茜香……」"
2001105-34 = "[ns] 「茜香……！」"
2001105-46 = "[ns] 「……！」"
2001105-50 = "那個，差不多該讓開了吧……"
2001105-52 = "唔嗯，一動也不動呢……"
2001105-53 = "雖然不忍心把你移開，但老師已經在等我了……"
2001105-54 = "[s] （剛才是茜香的聲音……？）"
2001105-55 = "（立刻往傳來聲音的方向前進）"
2001105-58 = "[ns] 「茜香！？」"
2001105-59 = "啊，老，老師……？"
2001105-60 = "[s1] 「……太好了。」\n[s2] 「咦，那孩子是……？」"
2001105-61 = "那，那個……"
2001105-62 = "那，那個……"
2001105-65 = "― 抱，抱歉，老師……[wa:2220] "
2001105-67 = "― 就跟你看到的一樣，我現在有點動彈不得……[wa:1390] "
2001105-70 = "[ns3] 「看起來睡得很舒服呢，真可愛。」\n[ns4] 「總覺得很像茜香呢。」"
2001105-71 = "― 咦，那，那是什麼意思！？[wa:2420] "
2001105-72 = "― 咦，那，那是什麼意思！？[wa:2420] "
2001105-74 = "― 話說那個，算是誇獎嗎……？[wa:1460] "
2001105-77 = "― 啊，這麼說來那個，沒能遵守約定我很抱歉……[wa:5400] "
2001105-79 = "― 咦，你說要在這裡一起休息……？[wa:2380] "
2001105-82 = "[ns] 「嗯，不是昏倒之類的真是太好了。而且……」"
2001105-83 = "― 因為打工的時候一直都很努力，[wa:1330] "
2001105-85 = "― 所以至少現在，希望我好好休息，是嗎……？[wa:2460] "
2001105-88 = "― 啊哈，什麼啦。[wa:1280] "
2001105-90 = "― 真的是，老師總是這樣……[wa:2640] "
2001105-93 = "― 不過，嗯。那就在這裡，[wa:3740] "
2001105-95 = "― 一起放鬆一下吧。老師。[wa:2350] "
2001105-98 = "（於是和茜香一起在廊簷悠閒地度過了一天）"

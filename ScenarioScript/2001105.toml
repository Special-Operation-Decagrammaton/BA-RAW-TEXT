[translation]
2001105-1 = "A Slightly Extended Break"
2001105-4 = "It was late in the afternoon, and I arrived at the agreed time."
2001105-5 = "(But after a while, Serika failed to appear at the meeting spot.)"
2001105-6 = "[s] \"Is she busy?\""
2001105-8 = "(About twenty minutes passed, and I began to worry.)"
2001105-10 = "[ns] \"Has she fainted somewhere again?\""
2001105-11 = "(Last time, Serika had fainted as a result of overworking herself during her part-time job. Worried, I went to find her.)"
2001105-22 = "[ns] \"Serika!\""
2001105-34 = "[ns] \"Serika!\""
2001105-46 = "[ns] \"Seri—!\""
2001105-50 = "Excuse me... Will you please get out of the way?"
2001105-52 = "Huh. You refuse, is that it?"
2001105-53 = "But this makes things tricky. Sensei's been waiting for me."
2001105-54 = "[s] (Is that Serika's voice?)"
2001105-55 = "(Following the direction of the voice, I rounded the corner of the venue.)"
2001105-58 = "[ns] \"Serika, are you okay?!\""
2001105-59 = "Ah, S-Sensei? Wh-What's wrong? Why the serious face?"
2001105-60 = "[s1] \"What a relief.\"\n[s2] \"What happened to you?\""
2001105-61 = "Ah, this. Ahaha..."
2001105-62 = "Ah, this. Ahaha..."
2001105-65 = "― S-Sorry, Sensei.[wa:1940] "
2001105-67 = "― As you can see, I'm not going anywhere for a while...[wa:70] "
2001105-70 = "[ns3] \"It seems happy, purring like that.\"\n[ns4] \"For some reason, it looks like you, Serika.\""
2001105-71 = "― Huh? Wh-What's that supposed to mean?![wa:1380] "
2001105-72 = "― Huh? Wh-What's that supposed to mean?![wa:1380] "
2001105-74 = "― Wait, was that supposed to be a compliment?[wa:260] "
2001105-77 = "― Oh, I just realized. I'm sorry I couldn't keep our promise...[wa:3800] "
2001105-79 = "― Huh? You're fine with relaxing here together?[wa:1180] "
2001105-82 = "[ns] \"You said it yourself. You're not going anywhere, so...\""
2001105-83 = "― I have been working a lot at my part-time job,[wa:50] "
2001105-85 = "― so you probably want me to take it easy now, huh?[wa:1300] "
2001105-88 = "― Haha. Oh, come on![wa:840] "
2001105-90 = "― It's just like you to say something like that.[wa:1280] "
2001105-93 = "― But fine. Just for a little while.[wa:2820] "
2001105-95 = "― We can relax here together, Sensei.[wa:1390] "
2001105-98 = "I spent the day with Serika on the back porch, enjoying our carefree time together."

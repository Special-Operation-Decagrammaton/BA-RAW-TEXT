[translation]
2001105-1 = "การพักผ่อนที่แสนอ้อยอิ่ง"
2001105-4 = "(ช่วงเวลาบ่ายแก่ๆ คุณครูก็ออกมาตามเวลาที่นัดกับเซริกะเอาไว้)"
2001105-5 = "(หลังจากยืนรออยู่พักใหญ่และเลยเวลานัดไปแล้วก็ตาม เซริกะก็ยังไม่มา)"
2001105-6 = "[s] \"ยุ่งอยู่รึเปล่านะ?\""
2001105-8 = "(เลยเวลาที่นัดไว้ไปกว่า 20 นาที...)"
2001105-10 = "[ns] \"คงไม่ใช่ว่าไปเป็นลมอยู่ที่ไหนหรอกนะ?\""
2001105-11 = "(คราวก่อนเซริกะโหมทำงานพาร์ทไทม์หนักเกินไปจนล้มพับไปหลายครั้ง คุณครูรู้สึกเป็นห่วง#nจึงรีบไปตามหาเซริกะทันที)"
2001105-22 = "[ns] \"เซริกะ!\""
2001105-34 = "[ns] \"เซริกะ...!\""
2001105-46 = "[ns] \"เซริ—!\""
2001105-50 = "เอ่อ... ช่วยขยับออกไปหน่อยได้มั้ย?"
2001105-52 = "หืม? ไม่ลุกงั้นเหรอ?"
2001105-53 = "แบบนี้ฉันลำบากนะ ป่านนี้คุณครูคงรอฉันแย่แล้ว"
2001105-54 = "[s] (นี่มันเสียงเซริกะนี่...?)"
2001105-55 = "(คุณครูเดินไปยังทิศทางที่ได้ยินเสียง และเลี้ยวที่บริเวณหัวมุมของสถานที่จัดงานเทศกาล)"
2001105-58 = "[ns] \"เซริกะ เป็นอะไรรึเปล่า?!\""
2001105-59 = "อ๊ะ คะ...คุณครู...? มีอะไรเหรอ ทำไมทำหน้าเครียดขนาดนั้นล่ะ?"
2001105-60 = "[s1] \"ค่อยยังชั่วหน่อย...\"\n[s2] \"เกิดอะไรขึ้นเหรอ?\""
2001105-61 = "อ๋อ นี่น่ะเหรอ คือว่า... ฮะฮะฮะ..."
2001105-62 = "อ๋อ นี่น่ะเหรอ คือว่า... ฮะฮะฮะ..."
2001105-65 = "― ขะ... ขอโทษนะ คุณครู...[wa:1660] "
2001105-67 = "― อย่างที่เห็นล่ะ ตอนนี้ฉันคง...ขยับตัวไม่ได้[wa:470] "
2001105-70 = "[ns3] \"หลับกรนสบายกันเชียว\"\n[ns4] \"พวกมันเหมือนเซริกะเลยนะ\""
2001105-71 = "― หืม? มะ...หมายความ ว่ายังไงกันแน่น่ะ!?[wa:1380] "
2001105-72 = "― หืม? มะ...หมายความ ว่ายังไงกันแน่น่ะ!?[wa:1380] "
2001105-74 = "― ว่าแต่นั่นน่ะ... คุณครูชมฉันเหรอ?[wa:660] "
2001105-77 = "― คือว่า... เรื่องที่ฉันไม่ได้รักษาสัญญาขอโทษนะ...[wa:4320] "
2001105-79 = "― หืม? นั่งเล่นที่นี่ด้วยกันกับฉันก็ได้งั้นเหรอ?[wa:1140] "
2001105-82 = "[ns] \"เพราะแบบนี้ก็คงไปทำอย่างอื่นไม่ได้แล้วนี่นา\""
2001105-83 = "― ที่ผ่านมาฉันตั้งใจทำงานหนัก...โดยไม่ได้พักเลย[wa:90] "
2001105-85 = "― เพราะงั้นก็เลยอยากให้พักผ่อนสบายๆ ให้สมกับที่ทำงานหนักงั้นเหรอ…?[wa:700] "
2001105-88 = "― ฮะฮะฮะ อะไรกันน่ะ...![wa:720] "
2001105-90 = "― คุณครูนี่จริงๆ เลย ไม่ว่าเมื่อไร... ก็พูดแบบนั้นเสมอเลยนะ[wa:840] "
2001105-93 = "― งั้นก็ได้ อื้อ... ถ้างั้นวันนี้...[wa:2820] "
2001105-95 = "― พวกเรา...มานั่งพักผ่อนสบายๆ ด้วยกันนะ คุณครู[wa:1030] "
2001105-98 = "(จากนั้นคุณครูกับเซริกะก็ใช้เวลาที่เหลือนั่งพักผ่อนอย่างสบายๆ ด้วยกัน)"

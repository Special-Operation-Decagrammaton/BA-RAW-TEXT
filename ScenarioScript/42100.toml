42100-5 = "3;카야;00;후후, 오전 일과를 마치고 마시는 블루마운틴의 향기는 각별하군요.\n#3;em;[음표]\n#3;a"
42100-6 = "3;카야;00;이 옅은 산미와 특유의 조화롭고 산뜻한 향은 원두를 높은 온도에서 충분히 가열한 뒤, 균일한 강도로 분쇄해야만 얻을 수 있는 풍미이지요."
42100-7 = "3;카야;00;……사람을 다루는 것 또한 이와 마찬가지. 타는 것을 염려하여 불을 가져다 대기를 두려워한다면, 시고 떫은 잡다한 것들이 섞여 버리고 맙니다."

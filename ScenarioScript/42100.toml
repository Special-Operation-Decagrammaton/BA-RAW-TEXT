42100-21 = "#na;방위차장;그게…… 죄송합니다. 평소에는 통괄실을 통해 보고 드렸던 업무인데요."
42100-22 = "#na;방위차장;현재 린 행정관께서 부재중이시라 직접 문의드리게 되었습니다."

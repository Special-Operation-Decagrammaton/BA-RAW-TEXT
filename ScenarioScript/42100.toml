42100-10 = "#na;카야;자유를 포기하고 통제에 몸을 맡기는 삶이 얼마나 달콤한 것인지를."
42100-11 = "3;카야;00"
42100-12 = "3;카야;00;……린 행정관의 지지 세력을 몰아내는 것부터, 처벌 조정을 대가로 카이저 코퍼레이션의 협력을 구하는 것까지. 모든 것이 계획대로 완벽하네요."

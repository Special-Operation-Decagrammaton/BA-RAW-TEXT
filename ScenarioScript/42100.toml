[translation]
42100-1 = "第10話;失控"
42100-2 = "聯邦學生會長代理辦公室"
42100-5 = "呵呵，結束上午工作後喝的藍山咖啡，味道真獨特呢。"
42100-6 = "這種淡淡的酸味和清爽的香氣，#n是將咖啡豆在高溫下充分加熱後，用均勻的強度磨碎才能得到的風味。"
42100-7 = "……待人接物也是如此。#n如果害怕失去而對火力有所猶豫，就會混入酸澀的雜味。"
42100-9 = "雖然現在還無法適應變化而從各處傳來雜音……#n但隨著時間經過，奇普托斯的市民們也會了解的。"
42100-10 = "放棄自由，將自身交給規則的人生有多麼甜美……"
42100-12 = "……從驅逐琳行政官的支持勢力，到以調整懲處為回報，獲得凱薩公司的協助。#n──全都依照計畫進行。"
42100-13 = "就這樣繼續讓周圍的人欠下人情，哪天坐上下一任聯邦學生會長的寶座也──"
42100-18 = "香耶室長──不，聯邦學生會長代理。#n抱歉在百忙之中打擾您，我有急事要報告。"
42100-19 = "防衛次長，發生什麼事了嗎？"
42100-20 = "我已經說過我忙著執行聯邦學生會長代理的工作，#n不是什麼急事的話希望你能晚點再聯絡。"
42100-21 = "非常抱歉……但這件事可能需要盡快處理……"
42100-22 = "如今琳行政官不在，希望能現在向您報告……"
42100-23 = "……那就沒辦法了，是什麼問題？"
42100-24 = "今天上午11點前後，在北麓中央線的運鈔列車被武裝強盜劫持，目前下落不明。"
42100-25 = "依照平常的工作流程，應該由學生會長代理聯絡交通室啟動緊急列車控制系統，#n並請求附近自治區提供協助……"
42100-26 = "原來如此，強盜引起的列車劫持事件啊……"
42100-30 = "……列車劫持事件？"
42100-31 = "這麼重要的事情為什麼現在才報告？"
42100-32 = "咦，咦……？"
42100-33 = "可是室長，您不是說今天早上不聽取任何報告嗎……"
42100-34 = "而且列車劫持事件只是每個月都會發生幾次的日常事件……"
42100-35 = "……日常事件？#n你的意思是，以前琳行政官也是在工作的空檔間進行了無數次這樣的處理嗎？"
42100-36 = "是的，沒錯。"
42100-37 = "唉……"
42100-38 = "……知道了。#n我會聯絡交通室的。"
42100-39 = "請防衛次長和女武神警察學園的學生合作，#n為避免嫌犯逃逸，請封鎖周圍的車站並鎖定嫌犯。"
42100-40 = "那個，關於這點……"
42100-41 = "……又有什麼問題？"
42100-43 = "之前負責處理這類事件的公安局長和公安局學生，#n目前因為不服從命令而被停職……"
42100-44 = "再加上由於今天實施的行政命令，警備局的學生幾乎都為了進行盤查而不在位置上，#n所以目前沒有能夠處理劫持事件的人力。"
42100-46 = "非當班的人力也好，生活安全局的學生也罷，請設法動員所有人力來維持治安。#n這不是你的工作嗎？"
42100-47 = "如果沒有盡到自己的職責，讓聯邦學生會之名受損的話……"
42100-48 = "等新體制穩定下來之後，你的立場將會如何呢？"
42100-49 = "我，我立刻處理！"
42100-53 = "唉……沒想到代理的工作竟然這麼麻煩……"
42100-57 = "──交通室，可以打擾一下嗎？"
42100-58 = "香耶室長？這個時間有什麼事嗎？"
42100-59 = "不是室長，是聯邦學生會長代理。"
42100-60 = "都差不多啦……所以呢，有什麼事？#n我的午餐快送到了，麻煩長話短說。"
42100-61 = "……現在不是討論午餐的時候。"
42100-62 = "我剛才收到了防衛次長的聯絡。#n在北麓中央線有一台運鈔列車遭到劫持，目前下落不明。"
42100-63 = "請立刻啟動緊急列車控制系統，並向附近的自治區請求協助。"
42100-64 = "唔嗯……"
42100-65 = "……真麻煩。"
42100-66 = "咦？你剛剛說什麼……？"
42100-67 = "你想想，如果是列車劫持事件的話，是沒辦法馬上解決的不是嗎？"
42100-68 = "既然要花很多時間，等吃完午餐再慢慢處理不就行了嗎～"
42100-69 = "……你好像不清楚現在事情的嚴重性呢？"
42100-70 = "還是說你想偷懶？#n那麼就算我用怠工的嫌疑拘留你也無話可說吧。"
42100-71 = "隨你高興～#n我只要不用工作就萬萬歲了。"
42100-72 = "啊，先跟你說一聲，要重寫奇普托斯的時刻表可是挺辛苦的哦。"
42100-73 = "要是把現在交通室的幹部們全部趕走，#n有苦頭吃的會是香耶室長吧，呵呵……"
42100-75 = "如果是在威脅我的話，你──"
42100-79 = "啊，午餐送來了！#n那之後再聯絡囉～"
42100-83 = "……"
42100-84 = "呼……"
42100-85 = "……不能因為這點小事就生氣，香耶。"
42100-86 = "你是奇普托斯的代表。#n是要成為所有人都尊敬的下一任聯邦學生會長的人。"
42100-87 = "必須冷靜……理性地一一解決問題……"
42100-91 = "……這次又怎麼了？"
42100-92 = "……你今天格外激動呢，聯邦學生會長代理。"
42100-94 = "啊……是財務室長啊。"
42100-95 = "請別在意。只是因為代理工作的第一天就冒出了很多棘手的工作，覺得有點累罷了。"
42100-96 = "財務室長是個有常識的人，應該不會讓我困擾吧？"
42100-97 = "這個嘛……我不敢保證。"
42100-98 = "關於聯邦學生會長代理今天上午向財務室提出的#n「伴隨新行政命令實施之額外費用申請書」……"
42100-99 = "是的，這是建立新體制的必要經費，就麻煩你了。"
42100-103 = "……駁回哦，而且是全部。"
42100-105 = "為，為什麼呢？"
42100-106 = "我確認內容時，發現請款金額的明細全都是用數字填寫。"
42100-107 = "由於存在偽造和誤讀的風險，因此無法處理沒有用大寫數字填寫的申請書。"
42100-108 = "還有，因為壓印暈開的關係，導致無法正確判讀姓名。"
42100-109 = "這樣不能視為獲得了正式的許可──"
42100-110 = "麻煩全部重寫。"
42100-111 = "那，那個……碧室長……？"
42100-112 = "真的很抱歉，我現在因為公務忙得分身乏術……"
42100-113 = "這次能當作例外處理嗎？#n剛才提到的那些問題等之後──"
42100-115 = "不可以。"
42100-116 = "就算是聯邦學生會長代理也沒有例外。#n琳行政官也一直都是自己修正的。"
42100-117 = "怎，怎麼會……"
42100-118 = "請在今天之內修改完畢。否則我就視為沒提出過申請。"
42100-119 = "但，但現在……"
42100-124 = "後天……能請你等到後天嗎？"
42100-125 = "…………到明天為止。再之後就沒辦法了。"
42100-129 = "真是的，每個人都像說好了一樣……！"
42100-130 = "為什麼我身邊連個像樣的人都沒有呢？"
42100-131 = "我的人望到底都跑哪去了……！？"
42100-135 = "……發生什麼問題了嗎？"
42100-136 = "……不，沒什麼。#n那些都不是需要我出面的問題。"
42100-137 = "只是在為那些連事情都做不好，只會引起麻煩的部下嘆息而已。"
42100-138 = "能夠如我所願行動的，也就只有你和FOX小隊了。"
42100-139 = "……依照命令執行作戰就是我們的工作。"
42100-140 = "武器正因為不會自己做出判斷才有價值。"
42100-141 = "呵呵……所以我才喜歡你。"
42100-142 = "……話說回來。"
42100-143 = "SRT特殊學園……什麼時候才會回來？"
42100-148 = "……那是現在重要的事嗎？"
42100-149 = "現在最重要的是提升防衛室的支持率並掌握實權。"
42100-150 = "只要我能掌握聯邦學生會，學校什麼的要新建幾間都行。"
42100-151 = "請不要搞混事情的順序，雪乃。"
42100-155 = "……失禮了。"
42100-156 = "不必擔心，最了解你們的價值的人就只有我而已。"
42100-157 = "你只要聽從我的命令就好。"
42100-158 = "為了你的小隊員們……也為了你可愛的後輩們。"
42100-159 = "……了解。"
42100-166 = "聯邦學生會長代理，出大事了！"
42100-167 = "……已經發生太多事，現在就算你說出大事也不覺得驚訝呢。"
42100-168 = "這次又怎麼了？"
42100-169 = "那個……"
42100-170 = "人力資源室長被部下們襲擊了！"
42100-172 = "你，你說什麼……！？"
42100-174 = "（數小時前，聯邦學生會大樓前）"
42100-178 = "諸位都辛苦了！"
42100-179 = "聯邦學生會長代理之所以能以史無前例的速度更替，都是多虧了各位的高聲疾呼！"
42100-180 = "哇啊啊啊啊啊！"
42100-181 = "不過雖然是母校的同學，居然願意無償進行接連幾天的示威……真是太感謝你們了。"
42100-184 = "別在意。身為勞動者，挺身為不公義的事情而鬥爭、抵抗權力都是理所當然的。"
42100-185 = "只要是譴責掌權者的示威，我們隨時都非常歡迎！"
42100-186 = "呵呵，果然是我們「赤冬」的學生。"
42100-187 = "……話說回來，琳行政官真的垮台了嗎？"
42100-188 = "啊啊，那當然啦。"
42100-189 = "受到我們的抗議之後，琳行政官負起事件的責任，引咎辭職了。"
42100-191 = "……那麼，現在擔任聯邦學生會長代理的人是誰？"
42100-192 = "嗯？目前是不知火香耶防衛室長被指定為繼任者了……"
42100-194 = "那麼從現在開始──"
42100-198 = "開始對香耶聯邦學生會長代理的譴責！"
42100-199 = "開始，開始！"
42100-200 = "什麼……！？#n為什麼連香耶代理也要譴責！？"
42100-201 = "我們該譴責的對象只有琳行政官而已吧？"
42100-202 = "原本確實是這樣沒錯。#n但那是在他退位之前！"
42100-203 = "如今香耶防衛室長成為了代表奇普托斯的掌權者，那麼──"
42100-204 = "所有的責任都該由他來負責！"
42100-205 = "負責！負責！"
42100-206 = "等等，你們的腦袋還好吧！？"
42100-207 = "香耶室長才剛成為會長代理哦！#n這麼突然是要他負什麼責任？"
42100-208 = "部下的疏失就是上司的責任……也就是說，#n在奇普托斯發生的所有問題的責任，都在學生會長代理的不知火香耶身上！"
42100-209 = "奇普托斯無法落實週休三日、最近天氣太冷、我們吃不了兩個布丁──#n全都是香耶代理的錯！"
42100-210 = "沒錯！沒錯！"
42100-212 = "給予勞動者權利！要求進一步的保證！"
42100-213 = "給予勞動者權利！要求進一步的保證！"
42100-215 = "竟然……竟然還有這麼為所欲為的革命家！？"
42100-216 = "示威已經結束了，還不趕快解散！#n你們的工作已經結束了！"
42100-217 = "看啊，邪惡掌權者的走狗露出真面目了！"
42100-218 = "跟潔莉諾會長那群人沒什麼兩樣嘛？"
42100-219 = "所以我才說不能信任公務員啊！"
42100-220 = "我們絕不會停止鬥爭，直到所有掌權者和資本家從這片土地上消失為止！"
42100-225 = "不，不要靠近我啊！"
42100-226 = "再繼續靠近的話，香耶室長也不會默──"
42100-231 = "那種無趣的威脅，在赤冬連問好都不算啊。"
42100-233 = "同志們，都準備好了嗎？"
42100-235 = "那麼從現在開始──"
42100-237 = "我們赤冬工務部，將開始新的鬥爭！"
42100-238 = "哇啊啊啊啊啊啊──！"
42100-240 = "下一話;黑咖啡"

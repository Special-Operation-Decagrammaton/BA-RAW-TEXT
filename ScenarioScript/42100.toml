[translation]
42100-1 = "Episode 10; Out of Control"
42100-2 = "Office of the Acting General Student Council President"
42100-5 = "Ah, there's something about the smell of a bottle of Blue Mountain after morning drills."
42100-6 = "The heating and grinding process of the beans is meticulous and intense. But it's necessary for the beans to produce this perfect flavor: a harmonious blend of acidic and refreshing."
42100-7 = "...Kind of like handling people. If you approach governing hesitantly, scared of opinions and backlash, you're left with nothing but a bitter taste in your mouth."
42100-9 = "There are murmurs now, but in time, Kivotos' people will see."
42100-10 = "They'll understand that freedom is a small price to pay for the harmony of order."
42100-12 = "...With Chief Officer Rin's supporters ousted and Kaiser Corporation's cooperation secured, everything's on track. Granting them authority to dole out punishments was a no-brainer for access to their influence and money."
42100-13 = "If I just slowly accumulate power like this, I might even become the next General Student Council president—"
42100-18 = "Um, Chief Kaya— I mean, acting General Student Council president. My apologies, I have something to report."
42100-19 = "Report, Deputy Chief of Defense."
42100-20 = "This had better be important. I have too much on my plate for trivialities."
42100-21 = "Well, about that... Normally, I'd report to the Supervisory Office..."
42100-22 = "But Chief Officer Rin is...unavailable, so I came directly to you instead."
42100-23 = "...In that case, make it quick. What is it?"
42100-24 = "At 11:00 AM earlier today, a cash transport train on the Hokuroku Central Line was commandeered by armed criminals. Their current location is unknown."
42100-25 = "According to protocol, the acting president must contact the transportation office to activate the emergency system and request assistance from neighboring districts."
42100-26 = "Yes, yes. A train hacking, armed robbers..."
42100-30 = "Wait, a train was hijacked?"
42100-31 = "Why am I only hearing about this now?"
42100-32 = "H-Huh?"
42100-33 = "But... Hijackings are practically routine in Kivotos... It's almost a monthly tradition at this point."
42100-34 = "And you very emphatically specified no reports this morning, so..."
42100-35 = "Routine, you said? And Chief Officer Rin used to handle these hijackings on top of her other responsibilities."
42100-36 = "Yes, that's correct."
42100-37 = "*sigh*"
42100-38 = "...Fine. I'll handle transportation."
42100-39 = "Coordinate with Valkyrie Police School to ID the criminals and seal off possible escape routes. Start with the stations."
42100-40 = "Uh, there's a slight issue..."
42100-41 = "What? What now?!"
42100-43 = "The Public Peace Bureau director and all its members, who usually handle this, are actually still on probation. They were punished for disobeying orders..."
42100-44 = "Due to the executive order going into effect, most Security Bureau students are out on weapon inspections. So, uh, there's no personnel to respond to the situation."
42100-46 = "Then rally any available officer or Public Safety member you can find. Isn't restoring order your duty?"
42100-47 = "If you let this new council down..."
42100-48 = "Then I can't help but wonder what new role you, Deputy Chief of Defense, will be holding once the dust settles."
42100-49 = "I-I'll handle it immediately!"
42100-53 = "*sigh* ...Didn't expect this being president to be so draining..."
42100-57 = "Hello? Transportation Office?"
42100-58 = "Huh? Chief Kaya? What do you want?"
42100-59 = "My title is acting General Student Council president, not Chief."
42100-60 = "You want me to call you that? My lunch would be delivered and go cold before I finished. Which, my lunch will be delivered soon, so I'm busy."
42100-61 = "There are more pressing matters than your lunch."
42100-62 = "The Deputy Chief of Defense reported a hijacking of a cash transport train on the Hokuroku Central Line."
42100-63 = "I need you to activate the emergency system and dispatch personnel. Organize the search and retrieval for the train and report back to me."
42100-64 = "Well..."
42100-65 = "Eh. I think I'm good."
42100-66 = "Excuse me?!"
42100-67 = "Train hijackings aren't, like, snap my fingers and the problem'll be fixed."
42100-68 = "It's going to be an annoying, drawn-out process. I'll handle it after lunch."
42100-69 = "Do you not grasp the urgency here?"
42100-70 = "If you think your lackadaisical attitude is going to fly here, I'll arrest you for negligence and sabotage of the General Student Council."
42100-71 = "Sure, go ahead. At least I won't have to work anymore. Can you ask them to bring me some chips?"
42100-72 = "Oof. I really hope whoever replaces me can read and manage all these operational charts and stuff. Well, best of luck to them, I guess!"
42100-73 = "Nobody knows Kivotos' operations like me and my staff, Kaya. But if you want to gut my department, go ahead. I'm sure that'll work out real well for you."
42100-75 = "A-Are you trying to strong-arm me?"
42100-79 = "My lunch just got here. Later!"
42100-83 = "..."
42100-84 = "..."
42100-85 = "...Stay calm, Kaya. Deep breaths."
42100-86 = "You're Kivotos' finest, and the future General Student Council president."
42100-87 = "Stay calm and rational. Tackle problems one at a time..."
42100-91 = "What?! What problem needs fixing now?!"
42100-92 = "You seem on edge, Acting President."
42100-94 = "Oh. Chief of Finance."
42100-95 = "Just dealing with a barrage of issues on my first day. There's always a transition period."
42100-96 = "You're a sensible one, so I trust you're not here to add to my troubles?"
42100-97 = "U-Um... Well..."
42100-98 = "Um... So, about the \"New Executive Order Expenses\" invoice you submitted earlier..."
42100-99 = "Yes, it's necessary for the new council. Please process it."
42100-103 = "...Rejected."
42100-105 = "What?! On what grounds?"
42100-106 = "I reviewed it personally, and all of the invoice entries are in Arabic numerals."
42100-107 = "It's against policy to process non-Chinese numerals to prevent fraud."
42100-108 = "Also, the authorization stamp is smudged and difficult to read."
42100-109 = "If I can't read the name, I can't verify it. If I can't verify it, I can't approve it."
42100-110 = "Resubmit it following the correct procedures at your convenience."
42100-111 = "W-Wait. Chief Aoi...!"
42100-112 = "Aoi. I'm swamped all the way to my bangs right now."
42100-113 = "Couldn't you overlook this just once? I promise I'll make it up to—"
42100-115 = "No."
42100-116 = "No exceptions, no matter your position. Even Chief Officer Rin revised her mistakes herself."
42100-117 = "But..."
42100-118 = "Revisions have a same-day turnaround. If it isn’t corrected by today, I'll have to dismiss it entirely."
42100-119 = "Could I perhaps get an extension?"
42100-124 = "...Just until tomorrow?"
42100-125 = "Tomorrow. But not a minute later."
42100-129 = "Seriously? Did everyone just wake up and decide to be difficult today?!"
42100-130 = "Why can't I find any competent help? Not one, single person!"
42100-131 = "I can't believe my bad luck with people!"
42100-135 = "Problems?"
42100-136 = "Yes, but all trivial. They just need to be delegated properly."
42100-137 = "It's only that incompetence somehow has the power to make a mountain of even the tiniest molehill."
42100-138 = "The FOX Squad seems to be my only subordinates who can do as they're told."
42100-139 = "...Because discipline and executing orders are our job."
42100-140 = "And a weapon is useless if it can't fulfill its purpose."
42100-141 = "That kind of mindset is why I appreciate you. Heehee..."
42100-142 = "...I do have a question."
42100-143 = "When... When do you plan on reviving SRT Academy?"
42100-148 = "...Is that really your concern right now?"
42100-149 = "Right now, we need to secure the Board's trust and consolidate power."
42100-150 = "Once I control the Council, I'll make you ten new SRTs."
42100-151 = "Priorities, Yukino."
42100-155 = "Understood. I apologize."
42100-156 = "It's okay. Remember, I'm the only one who truly understands you and your worth."
42100-157 = "Trust in me, and you'll have what you want."
42100-158 = "Following my orders is the only way for you to give your squad members and those starry-eyed underclassmen what they need the most."
42100-159 = "...Understood."
42100-166 = "...Acting General Student Council president. I have a report."
42100-167 = "At this point, nothing could surprise me anymore."
42100-168 = "Well, go on. What's the crisis this time?"
42100-169 = "It's, um..."
42100-170 = "The Director of Human Resources was attacked by her subordinates!"
42100-172 = "Wh-Wh-What did you say?!"
42100-174 = "A few hours earlier, outside the General Student Council building."
42100-178 = "Good work, comrades!"
42100-179 = "The quick dismissal of the acting president was thanks to every single one of you here! You came together as one, screaming voice, and our injustices were heard!"
42100-180 = "Hurrah!"
42100-181 = "It's been days... They might be our alumni, but they're so dedicated to protesting it almost makes me feel bad. Did you hear how they actually refused payment?"
42100-184 = "There's no need for pity! Challenging injustice and authority is the worker’s way!"
42100-185 = "We could protest all day, as long as it's against those in power!"
42100-186 = "Haha. I guess you never really take the \"Red Winter\" out of the student."
42100-187 = "So, is Chief Officer Rin really gone?"
42100-188 = "Huh? That's old news."
42100-189 = "She couldn't take the power of our protestors' shouts! Chief Officer Rin stepped down already."
42100-191 = "...Then who is the acting General Student Council president now?"
42100-192 = "Uh, Shiranui Kaya now, I think. It's kind of confusing, but they said the old president chose her or something."
42100-194 = "Which means..."
42100-198 = "Down with Fake President Kaya!"
42100-199 = "Down! Down! Fake! Fake!"
42100-200 = "Wh-What?! What are you chanting right now?"
42100-201 = "Hey! We won already! We wanted Rin out, not Kaya!"
42100-202 = "We did! But Rin stepped down!"
42100-203 = "Kaya is the acting president now. She's the representative authority of all of Kivotos!"
42100-204 = "So, that means... Everything in Kivotos is her fault now!"
42100-205 = "Her fault! Her fault!"
42100-206 = "I can't even begin to follow your logic!"
42100-207 = "She just became the acting president today! How could she possibly be responsible for the state of Kivotos?"
42100-208 = "Leaders are accountable for their team's mistakes. So any issues arising in Kivotos should fall on the shoulders of the current acting General Student Council president, a.k.a. Shiranui Kaya."
42100-209 = "Whether it's the absence of a 3-day work week, the unexpected cold snap, or even the limit on pudding portions – Kaya has to answer for all of it!"
42100-210 = "Answer, Kaya! Answer!"
42100-212 = "Denounce anything! Demand everything!"
42100-213 = "Denounce anything! Demand everything!"
42100-215 = "These revolutionaries are so...self-absorbed."
42100-216 = "Look, you're done here! Get out!"
42100-217 = "Comrades, she's unveiling her true colors! They can never hide their evil for long!"
42100-218 = "Just like President Cherino and her motley crew!"
42100-219 = "Never forget! This is why we hate bureaucrats!"
42100-220 = "We won’t rest until all tyrants and capitalists are gone!"
42100-225 = "N-No! Don't come closer!"
42100-226 = "Stay back! Or I'll report you all to Chief Kaya!"
42100-231 = "Hah! Was that a threat? That's how we say, \"Good morning,\" at Red Winter Academy!"
42100-233 = "Comrades, are you prepared to fight?!"
42100-235 = "We! Are! Ready!"
42100-237 = "The Red Winter Labor Party's struggle begins anew!"
42100-238 = "Hurrah!!"
42100-240 = "Next Episode; Black Coffee"

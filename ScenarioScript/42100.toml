[translation]
42100-1 = "ตอนที่ 10;ไม่อาจควบคุมได้"
42100-2 = "สำนักงานรักษาการแทนประธานองค์การนักเรียน"
42100-5 = "ฮุฮุ กลิ่นบลูเมาท์เทนส์ที่ดื่มหลังเสร็จงานตอนเช้านี่มันช่างพิเศษเหลือเกินนะคะ"
42100-6 = "รสเปรี้ยวอ่อนๆ กับกลิ่นที่กลมกลืนและสดชื่นอันเป็นเอกลักษณ์ คือสิ่งที่ได้มาจากการให้ความร้อนกับ#nเมล็ดกาแฟที่อุณหภูมิสูงพอ จากนั้นก็บดด้วยความแรงที่สม่ำเสมอ"
42100-7 = "... การจัดการผู้คนก็คงเหมือนกันค่ะ หากกังวลเรื่องการไหม้จนกลัวการจุดไฟ พวกของที่เปรี้ยวและขม#nก็จะผสมปนเปกันหมด"
42100-9 = "ตอนนี้ถึงจะมีเสียงดังมาจากทั่วทุกแห่งเพราะไม่สามารถปรับตัวให้เข้ากับการเปลี่ยนแปลงได้ แต่เมื่อเวลาผ่านไป ชาวเมืองคิโวทอสก็จะเข้าใจได้เองค่ะ"
42100-10 = "ว่าชีวิตที่ละทิ้งอิสรภาพและอยู่ภายใต้การควบคุมนั้นมันหอมหวานแค่ไหน"
42100-12 = "... ตั้งแต่เรื่องการขับไล่กลุ่มที่สนับสนุนเจ้าหน้าที่ริน ไปจนถึงการขอความร่วมมือจากไคเซอร์ คอร์เปอเรชั่นเพื่อแลกกับการอะลุ่มอล่วยโทษ ทุกอย่างเป็นไปอย่างสมบูรณ์แบบเลยนะคะ"
42100-13 = "ถ้าค่อยๆ เพิ่มหนี้บุญคุณรอบตัวไปเรื่อยๆ สักวันหนึ่งตำแหน่งประธานองค์การนักเรียนก็คง—"
42100-18 = "เอ่อ หัวหน้าสำนักฯ คายะ— ไม่สิ ท่านรักษาการแทนประธานองค์การนักเรียน ขอโทษนะคะ พอดีฉันมีเรื่องที่ต้องรายงานค่ะ"
42100-19 = "มีเรื่องอะไรเหรอคะ รองหัวหน้าฝ่ายป้องกัน?"
42100-20 = "ฉันกำลังยุ่งกับงานของรักษาการแทนประธานองค์การนักเรียน และเหมือนจะเคยบอกไว้แล้วนี่คะว่า#nถ้าไม่ใช่เรื่องด่วนอะไร ก็ให้ติดต่อเข้ามาคราวหลังนะคะ"
42100-21 = "เอ่อ... ขอโทษค่ะ มันเป็นเรื่องที่ปกติแล้วจะรายงานโดยฝ่ายบริหารน่ะค่ะ"
42100-22 = "แต่ตอนนี้เจ้าหน้าที่รินไม่อยู่ประจำตำแหน่ง ฉันก็เลยต้องมาเองแบบนี้ค่ะ"
42100-23 = "... ถ้าเป็นเรื่องนั้นก็ช่วยไม่ได้นะคะ สรุปว่ามีปัญหาอะไรเหรอคะ?"
42100-24 = "วันนี้เวลา 11:00 น. รถไฟขนส่งเงินสดจากสายโฮคุโรคุถูกจี้โดยโจรติดอาวุธ และตอนนี้ยังไม่รู้ว่าอยู่ที่#nไหนค่ะ"
42100-25 = "ตามขั้นตอนการทำงานแบบเดิมแล้ว รักษาการน่าจะต้องติดต่อไปที่ฝ่ายคมนาคมเพื่อสั่งเปิดระบบ#nควบคุมรถไฟฉุกเฉิน แล้วก็ขอความร่วมมือจากเขตปกครองตนเองที่อยู่ใกล้เคียงน่ะค่ะ"
42100-26 = "ค่ะ เป็นเหตุการณ์ปล้นรถไฟโดยโจรติดอาวุธสินะคะ"
42100-30 = "... ปล้นรถไฟ?"
42100-31 = "เรื่องสำคัญขนาดนี้ ทำไมถึงเพิ่งมารายงานเอาป่านนี้คะ?"
42100-32 = "คะ... คะ...?"
42100-33 = "แต่การปล้นรถไฟเป็นเหตุการณ์ปกติที่เกิดขึ้นเรื่อยๆ อยู่แล้วในคิโวทอส..."
42100-34 = "และหัวหน้าสำนักฯ ก็ขู่ว่าเช้านี้จะไม่รับรายงานอะไรเลยด้วย..."
42100-35 = "... เหตุการณ์ปกติเหรอคะ? งั้นก็แปลว่าเจ้าหน้าที่รินรับมือกับงานในลักษณะนี้มาโดยตลอดเหรอคะ?"
42100-36 = "ค่ะ ใช่แล้วค่ะ"
42100-37 = "เฮ้อ..."
42100-38 = "... เอาเป็นว่าทราบเรื่องแล้วค่ะ ฉันจะติดต่อฝ่ายคมนาคมเองค่ะ"
42100-39 = "รองหัวหน้าฝ่ายป้องกัน ฝากร่วมมือกับนักเรียนจากสถาบันฝึกตำรวจวัลคิรี่แล้วประเมินผู้ต้องสงสัย และปิดล้อมอาคารสถานีรถไฟโดยรอบ ไม่ให้คนร้ายหนีไปด้วยค่ะ"
42100-40 = "เอ่อ แต่ว่า..."
42100-41 = "มีปัญหาอะไรอีกคะ?"
42100-43 = "ปกติแล้วหัวหน้ากรมฯ กับนักเรียนจากกรมความมั่นคงสาธารณะจะเป็นผู้จัดการเรื่องนี้ แต่ว่าตอนนี้#nพวกเธอต่างก็สำรวมกิริยาวาจาเพราะเรื่องการขัดต่อคำสั่งคราวก่อน..."
42100-44 = "คำสั่งบริหารที่ประกาศออกมาวันนี้ทำให้นักเรียนส่วนใหญ่จากสำนักความมั่นคงออกไปตั้งด่านตรวจ#nอาวุธกันหมด เลยไม่มีใครมารับมือกับงานจี้ปล้นเลยค่ะ"
42100-46 = "ระดมกำลังรักษาความปลอดภัยให้มั่นคงสิคะ จะใช้นักเรียนที่เพิ่งออกเวรหรือนักเรียนสำนักรักษาความ#nปลอดภัยก็ได้ทั้งนั้น นี่มันหน้าที่ของคุณนะคะ?"
42100-47 = "ถ้ายังเห็นว่าทำหน้าที่ของตัวเองได้ไม่เต็มที่ แต่ยังมีเวลามาตำหนิคณะการทำงานชุดใหม่อยู่อีกละก็..."
42100-48 = "ฉันชักจะสงสัยแล้วสิคะว่าหากคณะทำงานคงที่แล้ว รองหัวหน้าฝ่ายป้องกันจะได้รับหน้าที่ใหม่เป็นอะไร"
42100-49 = "ฉะ... ฉันจะรีบไปจัดการให้เร็วที่สุดค่ะ!"
42100-53 = "เฮ้อ... ไม่คิดเลยว่างานรักษาการจะยิบย่อยน่ารำคาญแบบนี้..."
42100-57 = "— ฝ่ายคมนาคม ตอนนี้อยู่ที่ห้องรึเปล่าคะ?"
42100-58 = "หืม? หัวหน้าสำนักฯ คายะ? จู่ๆ ก็ติดต่อเข้ามาแบบนี้ มีเรื่องอะไรเหรอ?"
42100-59 = "ไม่ใช่หัวหน้าสำนักฯ ค่ะ ตอนนี้ฉันคือรักษาการแทนประธานองค์การนักเรียนค่ะ"
42100-60 = "จะเป็นอะไรก็เหมือนกันนั่นแหละ... ตกลงมีเรื่องอะไรล่ะ? ฉันกำลังรออาหารกลางวันมาส่ง ไม่มีเวลามา#nมัวคุยอยู่หรอกนะ"
42100-61 = "... นี่ไม่ใช่เวลามาคุยเรื่องอาหารนะคะ"
42100-62 = "ฉันได้รับรายงานมาจากรองหัวหน้าฝ่ายป้องกันว่ามีโจรติดอาวุธไปจี้ปล้นรถไฟขนส่งเงินสดที่ทาง#nรถไฟสายโฮคุโรคุ และตอนนี้ก็ยังหาเบาะแสไม่ได้ค่ะ"
42100-63 = "ฉันเลยอยากให้มีการเปิดใช้ระบบควบคุมรถไฟฉุกเฉิน และขอความร่วมมือในการส่งคนเข้าไปค้นหาใน#nสถานีค่ะ"
42100-64 = "อืม..."
42100-65 = "... ขี้เกียจทำจัง"
42100-66 = "คะ? คุณว่ายังไงนะคะ...?"
42100-67 = "ก็แบบ ถ้าเป็นเรื่องปล้นรถไฟ มันน่าจะไม่ใช่เรื่องที่คลี่คลายกันได้ง่ายๆ เลยนี่นา"
42100-68 = "ไหนๆ ก็เป็นเรื่องที่ต้องใช้เวลานานอยู่แล้ว ถ้างั้นฉันขอไปกินข้าวกลางวันก่อนแล้วค่อยมาจัดการอย่าง#nชิลๆ แล้วกัน"
42100-69 = "นี่คุณรู้ไหมคะว่าสถานการณ์นี้มันร้ายแรงแค่ไหน?"
42100-70 = "ถ้ายังจะขี้เกียจอยู่แบบนี้ ก็สมควรที่จะถูกคุมขังในข้อหาละเลยหน้าที่นะคะ"
42100-71 = "เอาสิ ถ้าต้องการแบบนั้นก็เอาเลย ดีเสียอีกนะ ฉันจะได้ไม่ต้องทำงาน"
42100-72 = "แต่ถ้าคนนอกต้องมาจัดตารางเดินพาหนะในคิโวทอสเอง ก็น่าจะปวดหัวอยู่ไม่น้อยเลยละ"
42100-73 = "ถ้าไล่กรรมการในฝ่ายคมนาคมที่ทำงานอยู่ตอนนี้ออกไปหมด คนที่จะเป็นทุกข์ก็น่าจะเป็นหัวหน้า#nสำนักฯ คายะก่อนเองนะ ฮุฮุ..."
42100-75 = "นี่คุณกำลังขู่ฉันเหรอคะ?"
42100-79 = "อ๊ะ อาหารมาส่งแล้ว ไว้ฉันติดต่อไปใหม่นะ!"
42100-83 = "......"
42100-84 = "ฮู่ว......"
42100-85 = "... อย่าโมโหกับเรื่องเล็กน้อยแบบนี้สิคายะ"
42100-86 = "ตอนนี้เธอคือผู้กุมอำนาจสูงสุดของคิโวทอสเชียวนะ เป็นว่าที่ประธานองค์การนักเรียนที่ทุกคนให้ความ#nเคารพไง"
42100-87 = "เธอต้องสุขุม และจัดการปัญหาที่กองเป็นพะเนินทีละอย่างๆ สิ"
42100-91 = "คราวนี้มีปัญหาอะไรอีกคะ?"
42100-92 = "... วันนี้ดูอ่อนไหวมากเป็นพิเศษเชียวนะ รักษาการแทนประธานองค์การนักเรียน"
42100-94 = "อ๊ะ... หัวหน้าฝ่ายการเงินหรอกเหรอคะ?"
42100-95 = "ไม่มีอะไรหรอกค่ะ แค่เหนื่อยนิดหน่อยกับงานหินมาตั้งแต่วันแรกของการรับตำแหน่งรักษาการน่ะค่ะ"
42100-96 = "หัวหน้าฝ่ายการเงินเป็นคนมีสามัญสำนึก คงไม่เอาเรื่องน่าปวดหัวมาให้ฉันหรอกค่ะ"
42100-97 = "อืม ก็ไม่รู้สินะว่าจะน่าปวดหัวหรือเปล่า..."
42100-98 = "ฉันติดต่อมาด้วยเรื่อง 'ใบเบิกค่าใช้จ่ายเพิ่มเนื่องจากการปรับปรุงคำสั่งบริหารฉบับใหม่' น่ะ"
42100-99 = "ค่ะ นั่นเป็นค่าใช้จ่ายจำเป็นในการจัดตั้งคณะทำงานใหม่ ยังไงก็รบกวนด้วยนะคะ"
42100-103 = "... ฉันไม่อนุมัติทุกรายการเลยค่ะ"
42100-105 = "คะ? ทำไมล่ะคะ?"
42100-106 = "ฉันลองตรวจสอบดูแล้ว รายการเรียกเก็บเงินทั้งหมดมันถูกเขียนมาด้วยตัวเลขอารบิก"
42100-107 = "เพื่อป้องกันการปลอมแปลงและการอ่านผิดพลาด ฉันจะไม่รับใบเบิกที่ไม่ได้เขียนด้วยตัวหนังสือ"
42100-108 = "และวันที่ที่ระบุในใบเสร็จก็เลือนจนอ่านได้ไม่ชัดเจนด้วย"
42100-109 = "แบบนี้คงใช้เป็นหลักฐานว่าได้รับการอนุมัติอย่างเป็นทางการไม่ได้..."
42100-110 = "ไปเขียนมาใหม่ตั้งแต่แรก แล้วค่อยเอามาส่งใหม่นะ"
42100-111 = "ดะ... เดี๋ยวสิ... หัวหน้าฝ่ายฯ อาโออิ...?"
42100-112 = "ขอโทษด้วยนะคะ แต่ตอนนี้ฉันยุ่งมากกับงานราชการ"
42100-113 = "ช่วยหยวนๆ ให้เป็นกรณีพิเศษสักครั้งไม่ได้เหรอคะ? ไว้ฉันจะตอบแทนที่ช่วยเรื่องนี้—"
42100-115 = "ไม่ได้"
42100-116 = "ถึงจะเป็นรักษาการแทนประธานองค์การนักเรียนก็ไม่มีข้อยกเว้น เจ้าหน้าที่รินเองก็แก้ไขเองมาตลอด"
42100-117 = "เฮอะ..."
42100-118 = "ถ้าไม่แก้ไขใบเบิกมาภายในวันนี้ ฉันจะไม่อนุมัติและก็จะไม่มีงบในส่วนนี้ให้ด้วยค่ะ"
42100-119 = "แต่ว่าตอนนี้ฉัน..."
42100-124 = "... ขอส่งภายในวันมะรืนได้ไหมคะ?"
42100-125 = "ให้แค่พรุ่งนี้ หลังจากนั้นฉันจะไม่รับเลย"
42100-129 = "ให้ตายเถอะแต่ละคน ดูทำตัวเข้าสิ...!"
42100-130 = "ทำไมรอบตัวฉันถึงไม่มีใครได้ดั่งใจเลยสักคนนะ?"
42100-131 = "ก็เข้าใจอยู่แหละว่าโลกนี้มันไม่มีอะไรเป็นถูกใจไปหมดทุกเรื่อง...!"
42100-135 = "... มีปัญหาอะไรงั้นเหรอ?"
42100-136 = "... ไม่มีอะไรค่ะ ยังไงก็เป็นปัญหาที่แค่สั่งให้คนไปช่วยจัดการก็จบ"
42100-137 = "จะว่าไปก็น่าผิดหวังนะคะ ที่ลูกน้องที่เลี้ยงดูมากลับไม่สามารถจัดการงานที่สั่งได้อย่างถูกต้อง"
42100-138 = "คนที่ทำงานตามคำสั่งได้จริงๆ คงมีแต่คุณกับกองทหาร FOX เท่านั้นแหละค่ะ"
42100-139 = "... ก็งานของเราคือการทำปฏิบัติการตามคำสั่งที่ได้รับมาไง"
42100-140 = "อาวุธต้องไม่ตัดสินใจอะไรเอง ถึงจะมีคุณค่า"
42100-141 = "แบบนี้แหละค่ะฉันถึงชอบคุณ ฮุฮุ..."
42100-142 = "... ถ้างั้น"
42100-143 = "จะสั่งฟื้นฟู... สถาบัน SRT เมื่อไรล่ะ?"
42100-148 = "... ตอนนี้เรื่องนั้นมันสำคัญด้วยเหรอคะ?"
42100-149 = "สิ่งที่สำคัญที่สุดตอนนี้คือการได้รับความเชื่อมั่นจากคณะกรรมการบริหารและยึดอำนาจที่แท้จริงมา#nต่างหากค่ะ"
42100-150 = "ขอแค่ฉันควบคุมองค์การนักเรียนได้ จะให้สร้างโรงเรียนใหม่ขึ้นมาเป็น 10 โรงก็ทำให้ได้ค่ะ"
42100-151 = "จัดลำดับความสำคัญของงานให้ดีสิคะ ยูกิโนะ"
42100-155 = "... ฉันเสียมารยาทไปสินะ"
42100-156 = "ไม่ต้องกังวลมากนักหรอกค่ะ ฉันคือคนเดียวที่เข้าใจคุณค่าของพวกคุณดีที่สุดค่ะ"
42100-157 = "พวกคุณก็แค่ทำตามคำสั่งของคนที่เข้าใจคุณค่าของพวกคุณก็พอแล้ว"
42100-158 = "เพื่อสมาชิกกองของคุณ และเพื่อเหล่ารุ่นน้องของคุณ"
42100-159 = "... รับทราบ"
42100-166 = "... รักษาการแทนประธานองค์การนักเรียน เกิดเรื่องใหญ่แล้วค่ะ!"
42100-167 = "... พอมาเจอเรื่องน่าประหลาดใจมากๆ เข้า ฉันก็ไม่ตกใจกับคำว่า 'เกิดเรื่องใหญ่' แล้วสิคะเนี่ย"
42100-168 = "รายงานมาเลยค่ะ คราวนี้มีปัญหาอะไรอีกคะ?"
42100-169 = "คือว่า..."
42100-170 = "หัวหน้าฝ่ายบุคคลถูกลูกน้องบุกโจมตีค่ะ!"
42100-172 = "วะ... ว่าไงนะ...?!"
42100-174 = "(ไม่กี่ชั่วโมงก่อน หน้าอาคารองค์การนักเรียน)"
42100-178 = "สหายทุกคนทำได้ดีมาก!"
42100-179 = "ที่การโยกย้ายรักษาการแทนประธานองค์การนักเรียนเกิดได้อย่างรวดเร็ว เป็นเพราะสหายทุกคนที่มา#nช่วยกันเป็นกระบอกเสียงแห่งความยุติธรรม!"
42100-180 = "เฮ้!!!"
42100-181 = "จะว่าไปฉันก็รู้สึกผิดกับทางนั้นจัง ถึงจะเป็นเพื่อนร่วมสถาบันเก่าก็เถอะ แต่มาประท้วงแบบไม่ได้พัก#nผ่อนอยู่หลายวันติดต่อกัน แถมไม่ได้รับค่าจ้างอะไรเลยด้วย..."
42100-184 = "ไม่ต้องไปสนหรอก มันเป็นเรื่องธรรมดาอยู่แล้วที่ผู้ใช้แรงงานต้องต่อสู้กับความอยุติธรรมและแข็งข้อ#nให้กับอำนาจ"
42100-185 = "ถ้าเป็นการประท้วงเพื่อประณามผู้มีอำนาจละก็ ให้ทำทั้งวันก็ยังไหว!"
42100-186 = "ฮุฮุ ก็ได้ๆ สมกับเป็นนักเรียนของโรงเรียน 'สหภาพเรดวินเทอร์' เลยนะ"
42100-187 = "... จะว่าไป เจ้าหน้าที่รินถูกปลดออกจริงๆ เหรอ?"
42100-188 = "เอ้า? ก็จริงน่ะสิ"
42100-189 = "การออกมาเรียกร้องของเราทำให้เจ้าหน้าที่รินรับผิดชอบด้วยการลาออกไง"
42100-191 = "... ถ้างั้นตอนนี้คนที่เป็นรักษาการแทนประธานองค์การนักเรียนคือใครล่ะ?"
42100-192 = "ตะ... ตอนแรกก็วางตัวไว้ให้เป็นหัวหน้าสำนักป้องกัน ชิรานูอิ คายะน่ะ..."
42100-194 = "ถ้างั้นจากนี้..."
42100-198 = "ก็ไปประณามรักษาการแทนประธานองค์การนักเรียนคายะกัน!"
42100-199 = "ขอประณาม! ขอประณาม!"
42100-200 = "ดะ... เดี๋ยวก่อน...! นี่เธอพูดเรื่องอะไรน่ะ?"
42100-201 = "คนที่เราต้องขับไล่ไม่ใช่รักษาการฯ คายะ แต่เป็นเจ้าหน้าที่รินต่างหากล่ะ!"
42100-202 = "อืม มันก็ใช่ แต่ตอนนี้เจ้าหน้าที่รินก็ยอมถอยแล้วนี่ไง!"
42100-203 = "ในเมื่อตอนนี้หัวหน้าสำนักป้องกันคายะเป็นผู้มีอำนาจที่เป็นตัวแทนของคิโวทอส..."
42100-204 = "ก็ต้องรับผิดชอบต่อทุกปัญหาที่เกิดขึ้นสิ!"
42100-205 = "รับผิดชอบ! รับผิดชอบ!"
42100-206 = "เดี๋ยวนะ พวกเธอสติฟั่นเฟือนกันไปแล้วรึเปล่า?"
42100-207 = "หัวหน้าสำนักฯ คายะเพิ่งได้ตำแหน่งมาวันนี้เองนะ! จู่ๆ ก็จะมาให้รับผิดชอบอะไรกันล่ะ?"
42100-208 = "ความผิดพลาดของลูกน้องเป็นสิ่งที่ผู้บังคับบัญชาต้องรับผิดชอบ... เพราะฉะนั้นทุกปัญหาที่เกิดขึ้นใน#nคิโวทอส รักษาการแทนประธานองค์การนักเรียนชิรานูอิ คายะต้องเป็นคนรับผิดชอบ!"
42100-209 = "ทั้งเรื่องการปัดตกข้อเสนอการทำงานสัปดาห์ละ 3 วัน เรื่องอากาศที่หนาวจนเกินไป แล้วก็เรื่องที่เรา#nไม่ได้กินพุดดิ้งวันละ 2 อันด้วย! ทุกอย่างเป็นเพราะรักษาการฯ คายะ!"
42100-210 = "ใช่! ใช่!"
42100-212 = "เหลี่ยมทุกดอก! แล้วบอกทำเพื่อคิโวทอส!"
42100-213 = "เหลี่ยมทุกดอก! แล้วบอกทำเพื่อคิโวทอส!"
42100-215 = "นี่มันอะไรกัน... คิดจะปฏิวัติทำตามอำเภอใจก็ได้เหรอ?"
42100-216 = "ประท้วงเสร็จแล้วก็กลับกันไปให้หมดเลย! หน้าที่ของพวกเธอหมดแล้ว!"
42100-217 = "ดูสิ เหล่าสหาย! สุนัขรับใช้ของผู้มีอำนาจชั่วร้ายเผยตัวตนออกมาแล้ว!"
42100-218 = "คนพวกนั้นไม่ต่างจากประธานเชริโน่เลย"
42100-219 = "เพราะแบบนี้แหละเราถึงจับมือกับเจ้าหน้าที่ของรัฐไม่ได้!"
42100-220 = "เราจะไม่หยุดต่อสู้ จนกว่าผู้มีอำนาจและนายทุนจะหายไปจากดินแดนแห่งนี้!"
42100-225 = "ดะ... เดี๋ยวก่อน! อย่าเข้ามาใกล้นะ!"
42100-226 = "ถ้าเข้ามามากกว่านี้... ฉันจะไปฟ้องหัวหน้าสำนักฯ คายะให้สั่งขังพวกเธอให้หมด—!"
42100-231 = "มาขู่กันแค่นี้น่ะในสหภาพเรดวินเทอร์แล้วถือว่าไม่ต่างไปจากการทักทายในตอนเช้าเลยด้วยซ้ำ"
42100-233 = "เหล่าสหาย! เตรียมตัวต่อสู้กันเสร็จแล้วใช่ไหม?"
42100-235 = "ถ้างั้นจากนี้ก็..."
42100-237 = "ชมรมผู้รับจ้างเรดวินเทอร์! เริ่มการต่อสู้ครั้งใหม่ได้!"
42100-238 = "เฮฮฮฮ—!"
42100-240 = "ตอนต่อไป;แบล็กคอฟฟี่"

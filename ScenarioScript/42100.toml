[translation]
42100-1 = "第10話;制御不能"
42100-2 = "連邦生徒会長代行執務室"
42100-5 = "ふふっ、午前の日課を終えて飲むブルーマウンテンの味は格別ですね。"
42100-6 = "この淡い酸味と爽やかな香りは、コーヒー豆を#n高温で加熱した後、均一な強度で挽いてこそ得られる風味です。"
42100-7 = "……人の扱い方も同じ。無くなることを恐れて火を加減してしまえば、#n酸っぱくて渋い雑味が混ざってしまいます。"
42100-9 = "今は変化に適応できず、あちこちから雑音が聞こえてきますが……#n時間が経てばキヴォトスの市民も理解することでしょう。"
42100-10 = "自由を放棄し、規律に身を委ねる人生が、どれだけ甘いものなのかを……。"
42100-12 = "……リン行政官の支持勢力を追い出し、#nカイザーコーポレーションへ処罰調整の見返りに協力を仰ぐ。#n――すべて計画通りです。"
42100-13 = "このまま周囲に借りを作り、いずれは次期連邦生徒会長の座に――"
42100-18 = "カヤ室長――いえ、連邦生徒会長代行。#nお忙しい所すみません、折り入ってご報告がございまして。"
42100-19 = "防衛次長、どうされましたか？"
42100-20 = "急用でないなら後にしてもらいたいのですが。"
42100-21 = "申し訳ございません……ですがこれ以上対処を遅らせる訳にもいかず……。"
42100-22 = "お忙しいのは重々承知しているのですが、#nリン行政官が不在のため今ご報告させていただければと……。"
42100-23 = "……仕方ないですね、何ですか？"
42100-24 = "今日の午前11時頃、[ruby=ほくろく]北麓[/ruby]中央線で現金輸送列車が#n武装した強盗にハイジャックされ、行方不明になっています。"
42100-25 = "通常の業務プロセス通りなら、#n生徒会長代行が交通室に連絡して非常列車制御システムを稼動し、#n近隣自治区に協力要請をすることになっているのですが……。"
42100-26 = "なるほど、強盗による列車ハイジャック事件ですか……。"
42100-30 = "……列車ハイジャック事件？"
42100-31 = "どうしてそんな重要なことを今になって報告するのですか？"
42100-32 = "は、はい……？"
42100-33 = "しかし室長、今日の午前中は何も報告を受け付けないと仰っていたではありませんか……。"
42100-34 = "それに列車のハイジャックは、月数回は起こる日常的な事件でして……。"
42100-35 = "……日常的？では、これまでリン行政官も仕事の合間に何度もこのような対処をしてきたということですか。"
42100-36 = "はい、そうです。"
42100-37 = "はぁ……。"
42100-38 = "……わかりました。交通室には私から連絡を入れておきます。"
42100-39 = "防衛次長はヴァルキューレ警察学校の生徒たちと協力し、#n犯人を逃さないよう近くの駅を封鎖した上で、容疑者の特定にあたってください。"
42100-40 = "あの、それがですね……。"
42100-41 = "……まだ何か？"
42100-43 = "今までそういったことを担当していた公安局長と公安局の生徒は#n命令不服従で謹慎中でして……。"
42100-44 = "加えて本日施行された行政命令により、#n警備局の生徒はほとんど検問で席を外していますので#nハイジャック事件に対応できる人員が残っていません。"
42100-46 = "非番の人でも生活安全局の生徒でも良いです。とにかく何とかして人員を集め、治安を守ってください。それがあなたの仕事でしょう？"
42100-47 = "自分の責務も果たせず、#n連邦生徒会の名に傷をつけるつもりなら……。"
42100-48 = "新体制が安定した後、あなたはどんな立場にいるのでしょうね？"
42100-49 = "そ、早急に対処します！"
42100-53 = "はぁ……代行の仕事がこんなに面倒だったなんて……。"
42100-57 = "交通室、少し大丈夫ですか？"
42100-58 = "カヤ室長？こんな時間にどうしたの？"
42100-59 = "室長ではありません、連邦生徒会長代行です。"
42100-60 = "どっちも大して変わらないよ。で、どうしたの？#nもうすぐランチの配達がくるから、手短にして欲しいんだけど。"
42100-61 = "……今はランチの話をしている場合ではありません。"
42100-62 = "先ほど防衛次長から連絡を受けました。#n北麓中央線で現金輸送列車1台がハイジャックされ、行方不明だそうです。"
42100-63 = "直ちに非常列車制御システムを稼動し、近隣自治区に協力要請を出してください。"
42100-64 = "うーん……。"
42100-65 = "……めんどくさいなぁ。"
42100-66 = "は、はい？今なんと……？"
42100-67 = "だって列車のハイジャック事件なら、すぐには解決できないでしょ？"
42100-68 = "どうせ長引くんだし、ランチしてからゆっくりやればいいかな～って。"
42100-69 = "……今、どれだけ深刻な状態なのかわかっていないのですね？"
42100-70 = "それともサボるつもりですか？#nであれば、職務怠慢容疑で拘束されても仕方ありませんね。"
42100-71 = "お好きにどうぞ～#n私も働かずに済むなら万々歳だよ。"
42100-72 = "ああ。言っておくけど、キヴォトスの運行表を#nイチから書き直すのはかなり大変だよ。"
42100-73 = "今交通室の役員を追い出したら、#nひどい目に遭うのはカヤ室長だろうね、ふふ……。"
42100-75 = "……私を脅迫しているのであれば、あなたは――"
42100-79 = "あ、ランチが来た！#nんじゃ、また後で連絡するね～"
42100-83 = "……。"
42100-84 = "ふう……。"
42100-85 = "……こんな些細なことで怒ってはいけません、カヤ。"
42100-86 = "あなたはキヴォトスの代表。#n皆に尊敬される次期連邦生徒会長になる人です。"
42100-87 = "落ち着いて……理性的に問題を一つずつ解決していかなければ……。"
42100-91 = "……今度はなんですか？"
42100-92 = "……やけに気が立っているわね、連邦生徒会長代行。"
42100-94 = "ああ……財務室長でしたか。"
42100-95 = "気にしないでください。代行業務を請け負った初日から#n困った業務が押し寄せてきたので、少し疲れているだけです。"
42100-96 = "財務室長は常識人ですから、私を困らせることはありませんよね？"
42100-97 = "それは……どうでしょうね。"
42100-98 = "連邦生徒会長代行が今日の午前中に財務室へ提出した#n「新規行政命令施行に伴う追加費用請求書」のことだけど……。"
42100-99 = "はい。新体制を作る上での必要経費ですので、よろしくお願いします。"
42100-103 = "……却下よ、すべて。"
42100-105 = "な、何故ですか？"
42100-106 = "確認したところ、請求額の明細がすべてアラビア数字で書かれていたわ。"
42100-107 = "偽造や誤読の危険があるから、#n漢数字で書かれていない請求書は処理できないの。"
42100-108 = "あと、捺印も滲んでいて名前が正しく読めないわ。"
42100-109 = "このままじゃ正式な承認を得たとはいえないから――"
42100-110 = "全部やり直してちょうだい。"
42100-111 = "あの……ええっと……アオイ室長……？"
42100-112 = "本当に申し訳ないのですが、今は公務で手が離せない状態でして……。"
42100-113 = "今回だけ例外にしていただけませんか？#n仰って頂いた問題については後ほど――"
42100-115 = "ダメよ。"
42100-116 = "たとえ連邦生徒会長代行でも例外はないわ。#nリン行政官だって、いつも自分で修正していたの。"
42100-117 = "そ、そんな……。"
42100-118 = "修正は今日中にお願いするわね。でないと、申請そのものをなかったことにするわ。"
42100-119 = "で、ですが今は……。"
42100-124 = "明後日まで……明後日まで待っていただけませんか？"
42100-125 = "…………明日まで。これ以上は無理よ。"
42100-129 = "まったく、揃いも揃って……！"
42100-130 = "どうして周りにまともな人が一人もいないのでしょうね？"
42100-131 = "私の人望は一体どこへ……！？"
42100-135 = "……何か問題でもあったのか。"
42100-136 = "……いいえ、なんでもありません。#n問題自体はどれも私が出る必要のないものばかりですし。"
42100-137 = "ただ少し、まともに仕事もできずトラブルばかり起こす#n部下のことを嘆いていただけです。"
42100-138 = "私の思うとおりに動いてくれるのは、あなたと小隊員だけですよ。"
42100-139 = "……命令通りに作戦を遂行するのが、私たちの仕事だ。"
42100-140 = "武器は自ら判断しないからこそ、価値がある。"
42100-141 = "……ふふっ、だから私はあなたのことが好きなのです。"
42100-142 = "……ところで。"
42100-143 = "SRT特殊学園には……いつになったら戻れるんだ？"
42100-148 = "……それは今、重要なことですか？"
42100-149 = "いいえ、違うでしょう？#n今、最も大事なのは、防衛室の支持率を上げ、実権を握ること。"
42100-150 = "私が連邦生徒会を掌握した後なら、学校なんていくつでも新しく建てられます。"
42100-151 = "仕事の順序を忘れないでください。"
42100-155 = "……失礼した。"
42100-156 = "心配はいりませんよ。#nあなた達の価値を真に理解しているのは、私だけですから。"
42100-157 = "あなたはただ、私の命令に従っていればいいんです。"
42100-158 = "あなたの小隊員のために。#nそして……あなたのかわいい後輩のために。"
42100-159 = "……了解。"
42100-166 = "連邦生徒会長代行、大変です！"
42100-167 = "……色々ありすぎて、もう大変と言われても驚かなくなりましたね。"
42100-168 = "今度はまた何ですか？"
42100-169 = "それが……"
42100-170 = "人材資源室長が部下に襲撃されました！"
42100-172 = "な、なんですって……！？"
42100-174 = "（数時間前、連邦生徒会の建物の前）"
42100-178 = "諸君、ご苦労だった！"
42100-179 = "連邦生徒会長代行が異例のスピードで[ruby=こうてつ]更迭[/ruby]されたのは、#n皆が声を上げてくれたからこそだ！"
42100-180 = "わぁああああ！！"
42100-181 = "しかし母校を同じくする者とはいえ、#n数日間に渡るデモを無償で引き受けてくれるなんて……#n今後君たちには足を向けて寝られんな。"
42100-184 = "気にするな。不義に対する闘争と権力への抵抗は、労働者として当然のこと。"
42100-185 = "権力者を糾弾するデモならいつでも大歓迎だ！"
42100-186 = "ふふ、さすがは「レッドウィンター」の生徒だ。"
42100-187 = "……ところで、リン行政官は本当に失脚したのか？"
42100-188 = "ああ、もちろんだ。"
42100-189 = "我々の抗議を受け、リン行政官は事件の責任を取って退任した。"
42100-191 = "……では今、連邦生徒会長代行を務めているのは誰だ？"
42100-192 = "ん？一応、不知火カヤ防衛室長が後任に指名されているが……"
42100-194 = "……そうか。では、これより――"
42100-198 = "カヤ連邦生徒会長代行の糾弾を開始する！"
42100-199 = "開始する、開始する！"
42100-200 = "なっ……！？#n何故カヤ代行まで糾弾する必要がある！？"
42100-201 = "我々が糾弾すべき相手はリン行政官だっただろう！？"
42100-202 = "……たしかに、少し前まではそうだったな。#nしかし今は、カヤ防衛室長がこのキヴォトスを代表する権力者となったんだろう？"
42100-203 = "であれば――"
42100-204 = "すべての責任は彼女にある！"
42100-205 = "責任を取れ！責任を取れ！"
42100-206 = "な、何を言っているんだ！君たち、変なものでも食べたのか！？"
42100-207 = "カヤ室長は会長代行になったばかりだぞ！#nなのに、いきなり何の責任を取れと？"
42100-208 = "部下のミスは上司の責任……つまり、このキヴォトスにおける全ての問題の責任は、生徒会長代行の不知火カヤにある！"
42100-209 = "キヴォトスに週3日労働が定着していないのも、最近寒すぎるのも、あたしたちがプリンを2つ食べられないのも――全部カヤ代行のせいだ！"
42100-210 = "そうだそうだ！"
42100-212 = "労働者の権利を！さらなる保障を！"
42100-213 = "労働者の権利を！さらなる保障を！"
42100-215 = "そんな……そんなわがままな革命家がいるか！"
42100-216 = "デモは終わったんだからさっさと解散しろ！君たちの役割は終わりだ！"
42100-217 = "見ろ、邪悪な権力の犬が本性を現したぞ！"
42100-218 = "チェリノ会長たちと変わんなくない？"
42100-219 = "だから公務員なんて信用できないんだって！"
42100-220 = "あたしたちは、この地における#nすべての権力者と資本家が消えるまで闘争を止めない！"
42100-225 = "く、来るな！"
42100-226 = "それ以上近づいたらカヤ室長が黙ってな――"
42100-231 = "そんなくだらない脅し、レッドウィンターじゃ挨拶にもならないぞ。"
42100-233 = "みんな、準備はできているな？"
42100-235 = "ではこれより――"
42100-237 = "あたしたちレッドウィンター工務部は、新たなる闘争を開始する！"
42100-238 = "わあぁぁあああ――！"
42100-240 = "次回;ブラックコーヒー"

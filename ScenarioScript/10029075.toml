[translation]
10029075-1 = "第7話;學園都市最強的精神系能力"
10029075-6 = "什，什麼情況！？這到底是怎麼回事！？"
10029075-7 = "他們是從哪裡冒出來的啊！？而且為什麼自己打起來了！？"
10029075-8 = "怎，怎麼回事？！這是哪裡！？我們為什麼會在這裡！？"
10029075-9 = "先壓制四周！！"
10029075-10 = "把礙事的傢伙全部除掉，調查完這裡之後再向上層報告！！"
10029075-12 = "唔……這裡是千年的廢墟嗎！？#n我們怎麼會在這種地方……！？"
10029075-13 = "……！！#n你們是……！！"
10029075-14 = "……？#n那些傢伙是凱薩PMC的……"
10029075-15 = "雖然還搞不清楚狀況，但他們不會沒事待在這裡。#n先全部除掉再說吧！！"
10029075-16 = "所有人做好戰鬥準備！！"
10029075-18 = "別笑死人了！以為我們是稻草人嗎！？#n所有人把傢伙準備好！！先打倒他們再來煩惱吧！！"
10029075-24 = "難，難道……"
10029075-25 = "又是另一個世界來的人嗎！？#n代表現在……又出現時空交錯了！？"
10029075-26 = "[s1]「呃，其實他們都是我們這裡的朋友……」\n[s2]「但看了之後會那麼認為，我也無話可說……」"
10029075-29 = "……嗯？你說他們全部都是這裡的人？"
10029075-33 = "……全部都是！？！？"
10029075-37 = "……這裡充滿個性的人還真多。"
10029075-38 = "御坂同學，你打算怎麼做？#n這樣下去別說是要修理，設施可能要連粉都不剩了吧？"
10029075-39 = "為什麼一副事不關己的樣子！？你也一樣會回不去的啊！！"
10029075-40 = "老師！！什麼都行，快想想辦法吧！？#n不是說那些人都是老師的朋友嗎！？"
10029075-41 = "……什麼？"
10029075-42 = "不是朋友？#n……是曾經交手過的對象？"
10029075-43 = "……所以是敵人嗎！！！"
10029075-44 = "啊啊真是的……！為什麼偏偏在這種時候……！！"
10029075-50 = "……老師？你叫我嗎？"
10029075-51 = "……能不能讓設施恢復正常？#n我當然會試試……"
10029075-52 = "不過得花一點時間。#n假如設施在這段期間遭到攻擊的話，會發生什麼情況就無法保證了。"
10029075-53 = "因為現在已經處於副作用滿滿的狀態了！#n不僅如此，我們還得在修好之後啟動設施將所有人給……"
10029075-55 = "倒不用那麼麻煩。#n只要在修理的過程中放入晶片就行了。"
10029075-56 = "這樣一來在修理結束的同時，機器的演算法就會按照部長的設定發生改變。"
10029075-57 = "但問題是……"
10029075-58 = "[s3]「必須先控制住混亂的場面對吧。」\n[s4]「在修理期間必須阻止所有人對吧。」"
10029075-64 = "……唉。"
10029075-65 = "明明已經盡可能避免，結果還是變成這樣了嗎……？"
10029075-66 = "本來不想在初次見到的地方留下這麼深刻的印象……"
10029075-67 = "…………"
10029075-68 = "……需要多少時間？3分鐘？#n不，有5分鐘的話能完成嗎？"
10029075-69 = "[s7]「……食蜂？」\n[s8]「需要多少時間是指……？」"
10029075-72 = "當然是指「停止的時間」。"
10029075-73 = "食蜂……！"
10029075-74 = "別露出那種表情，御坂同學。#n我也不是因為喜歡才這麼做的。"
10029075-75 = "但是就像御坂同學說的一樣，要是回不去的話，大家都會很傷腦筋吧？"
10029075-76 = "所以只好稍微，稍～微……"
10029075-77 = "施展一下我的能力了。"
10029075-87 = "……？？#n什，什麼……？"
10029075-88 = "所有人……都靜止不動了……？"
10029075-89 = "時間停止了嗎……？#n不，不對，只有對方靜止了！？"
10029075-90 = "……原來如此，我懂了。"
10029075-91 = "美琴說的超能力就是這麼回事啊。#n這樣就能有效率地進行了。"
10029075-96 = "……那個……"
10029075-97 = "謝謝你的稱讚……不過能麻煩趕快開始修理嗎……？"
10029075-98 = "要在這裡維持專注……比平常更困難……而且頭也會很痛……"
10029075-99 = "跟某個只會搞破壞的人不同，我可是非常纖細的……"
10029075-101 = "……你是在說我吧？"
10029075-102 = "但是他說的對，得把握時間才行。"
10029075-103 = "而且機器並沒有停止，我們還需要繼續對付它們。"
10029075-104 = "不過數量已經比之前少了一大半……應該辦得到吧？"
10029075-105 = "嗯，這點程度當然沒問題！#n那修理方面呢？辦得到嗎？"
10029075-107 = "呵呵，我們好像備受期待呢。"
10029075-108 = "嗯。既然如此……要是做不到就傷腦筋了。"
10029075-109 = "我們一定會完成的！5分鐘！已經很夠了！！"
10029075-111 = "大家再加把勁吧！！就差最後一步了！！"
10029075-112 = "[s9]「好，那就開始吧！」\n[s10]「努力到最後吧！！」"
10029075-116 = "哦──！"

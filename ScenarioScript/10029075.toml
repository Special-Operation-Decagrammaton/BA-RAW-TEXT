[translation]
10029075-1 = "ตอนที่ 7;พลังจิตขั้นสูงสุดของเมืองแห่งการศึกษา"
10029075-6 = "นี่มัน! อะ... อะไรกัน? เจ้าพวกนี้มันตัวอะไรกันเนี่ย!?"
10029075-7 = "ออกมาจากไหนกันเยอะแยะนะ!?  แล้วทำไมถึงสู้กันเองด้วย!?"
10029075-8 = "อะ... อะไรเนี่ย!?  ที่นี่ที่ไหน!?  แล้วทำไมพวกเราถึงมาโผล่ที่นี่ได้!?"
10029075-9 = "ปราบพวกที่อยู่รอบๆ ก่อน!!"
10029075-10 = "ใครมายั่วโมโหก็จัดการให้หมด จากนั้นไปสำรวจสถานที่นี้แล้วรายงานให้นายทราบ!!"
10029075-12 = "อ่า... ที่นี่มันพื้นที่รกร้างของมิลเลเนียมรึเปล่า!?  ทำไมพวกเราถึงวาร์ปมาอยู่ที่นี่ได้ล่ะ...!?"
10029075-13 = "...!!  พวกแก...!!"
10029075-14 = "...? นั่นมันพวกไคเซอร์ PMC..."
10029075-15 = "อย่างนั้นสินะ ถึงจะไม่เข้าใจเลยสักกะนิด แต่พวกนั้นคงไม่มาอยู่ที่นี่โดยไร้เหตุผลหรอก เอาเป็นว่า ยิงก่อนแล้วค่อยคิดว่าจะทำยังไงต่อ!!"
10029075-16 = "ทุกคนเตรียมต่อสู้!!"
10029075-18 = "อย่ามาตลกเลยน่า! คิดว่าพวกฉันเป็นหุ่นไร้น้ำยางั้นเรอะ!?  ทุกคนหยิบอุปกรณ์!!  ลุยก่อน แล้วค่อยคิดว่านี่มันเรื่องอะไรกัน!!"
10029075-24 = "ยะ... อย่าบอกนะ..."
10029075-25 = "ว่ามาจากโลกอื่นอีก!?  งะ... งั้นตอนนี้... กาลอวกาศผสมกันอยู่เหรอคะ!?"
10029075-26 = "[s1] \"ไม่หรอก พวกนั้นเป็นคนจากฝั่งเรา...\"\n[s2] \"แต่เห็นแล้วก็ไม่รู้จะพูดยังไงเลยแฮะ...\""
10029075-29 = "... คะ? เป็นคนของโลกนี้เหรอคะ?"
10029075-33 = "... พวกนั้นทั้งหมดเลยน่ะเหรอ!?!?"
10029075-37 = "... คนที่นี่... มีบุคลิกเฉพาะตนเด่นชัดกันจังเลยเนอะ"
10029075-38 = "จากนี้ต้องทำยังไงดีล่ะคุณมิซากะ? แบบนี้อย่าว่าแต่ซ่อมเลย ร่องรอยของเครื่องมือก็แทบจะหาไม่เจอ#nแล้วมั้ง?"
10029075-39 = "อย่าเอาแต่ถามคนอื่นสิ! นี่เธอเองก็จะกลับไปไม่ได้เหมือนกันนะ!!"
10029075-40 = "คุณครู!! เราไม่มีวิธีอะไรเลยเหรอ!? อะไรก็ได้ว่ามาเหอะ! ไหนว่าพวกนั้นเป็นคนของทางฝั่งนี้ไง!?"
10029075-41 = "... ว่าไงนะ?"
10029075-42 = "ไม่ใช่พวกเดียวกันงั้นเหรอ? ... เรียกว่าเป็นคนที่เคยสู้ด้วยมากกว่า?"
10029075-43 = "... งั้นก็ศัตรูน่ะสิ!!!"
10029075-44 = "อึกกกก...! ทำไมต้องโผล่มาจังหวะนี้ด้วย...!!"
10029075-50 = "...? คุณครู? เรียกฉันเหรอ?"
10029075-51 = "... หืม? สามารถทำให้เครื่องมือกลับมาอยู่ในสภาพปกติได้ไหมน่ะเหรอ? มันก็ลองทำได้อยู่หรอกนะ..."
10029075-52 = "แต่น่าจะใช้เวลาสักหน่อยเลย แต่ถ้าระหว่างนั้นเครื่องมือถูกโจมตีขึ้นมา ฉันก็รับประกันไม่ได้ว่าจะเกิด#nอะไรขึ้น"
10029075-53 = "ตอนนี้ก็มีผลข้างเคียงมากมายอยู่แล้วด้วยค่ะ! และถ้าซ่อมเสร็จ มันก็อาจจะทำงานเหมือนเดิม#nแล้วก็เรียกทุกคนมาอีกก็ได้..."
10029075-55 = "ไม่เป็นไรหรอก ตอนที่ซ่อมเราก็แค่ใส่ชิปไว้ด้วยก็พอ"
10029075-56 = "แล้วพอซ่อมเสร็จ อัลกอริทึมของเครื่องก็จะเปลี่ยนไปตามที่หัวหน้าทำมาให้ ง่ายดายไร้ปัญหา"
10029075-57 = "ส่วนปัญหาจริงๆ น่ะ..."
10029075-58 = "[s3] \"คือการหยุดความวุ่นวายของทางนู้นสินะ\"\n[s4] \"ต้องขัดขวางทุกคนให้ได้ระหว่างซ่อมสินะ\""
10029075-64 = "... เฮ้อ"
10029075-65 = "อุตส่าห์จะหลีกเลี่ยงแล้วเชียว แต่สุดท้ายก็กลายเป็นแบบนี้เหรอเนี่ย...?"
10029075-66 = "ฉันไม่เห็นอยากจะสร้างความประทับใจในที่ที่เพิ่งเคยมาแบบนี้เลย..."
10029075-67 = "......"
10029075-68 = "... ต้องนานแค่ไหนล่ะ? 3 นาที? หรือว่า 5 นาที? ประมาณนั้นพอจะซ่อมเสร็จมั้ย"
10029075-69 = "[s7] \"...โชคุโฮว?\"\n[s8] \"นานแค่ไหนงั้นเหรอ...?\""
10029075-72 = "หมายถึง 'เวลาที่ต้องหยุดพวกนั้น' ไงล่ะ  ฉันถามว่าฉันต้องหยุดพวกนั้นนานแค่ไหน"
10029075-73 = "...!! โชคุโฮว...!"
10029075-74 = "อย่าทำหน้าแบบนั้นสิ คุณมิซากะ ที่ฉันทำไม่ใช่เพราะว่าอยากทำหรอกนะ"
10029075-75 = "แต่มันก็จริงอย่างที่คุณมิซากะว่าไว้ไม่ใช่เหรอ ว่าถ้าไม่กลับไป คนที่งานเข้าก็คือพวกเราทุกคนน่ะ?"
10029075-76 = "เพราะงั้นฉันก็เลยอยากจะ..."
10029075-77 = "ทำให้เห็นนิดหน่อยน่ะ ก็มันช่วยไม่ได้นี่"
10029075-87 = "...??  อะ... อะไรกัน...?"
10029075-88 = "หยุดทุกคน... ได้เลยเหรอ...?"
10029075-89 = "สกิลหยุดเวลา...? มะ... ไม่สิ หยุดได้แต่คนงั้นเหรอคะ!?"
10029075-90 = "... แบบนี้เองสินะ เข้าใจแล้ว"
10029075-91 = "นี่สินะพลังจิตที่มิโคโตะเคยพูดถึง ถ้าแบบนี้ก็จัดการได้อย่างมีประสิทธิภาพแน่"
10029075-96 = "... เอ่อ..."
10029075-97 = "ก็ขอบคุณอยู่หรอกนะที่ชม แต่ว่าแทนที่จะมาชมกัน พวกเธอช่วยไปซ่อมให้เสร็จไวๆ ไม่ดีกว่าเหรอ...?"
10029075-98 = "อยู่ที่นี่ฉันทำสมาธิกับพลังได้ยากกว่าปกตินะ แถมยังทำให้ปวดหัวด้วย..."
10029075-99 = "พลังของฉันค่อนข้างละเอียดอ่อนนะ ไม่เหมือนกับของคนอื่นที่ต้องแค่หน้ามืดตามัวทำลายข้าวของ..."
10029075-101 = "...? หมายถึงฉันใช่มั้ย?"
10029075-102 = "แต่มันก็ถูกนะ เราต้องเร่งกันแล้ว"
10029075-103 = "พวกหุ่นต่างๆ ก็ยังไม่ยอมหยุดกันด้วย พวกเราต้องเข้าไปจัดการส่วนนั้นต่ออีก"
10029075-104 = "แต่ยังไงก็ลดลงไปเกินครึ่งหนึ่งแล้ว... เราคงรับมือกันได้อยู่เนอะ?"
10029075-105 = "อืม ถ้าประมาณนี้ก็พอจะรับมือได้! แล้วเรื่องการซ่อมล่ะ? พอไหวมั้ย?"
10029075-107 = "ฮุฮุ พวกเราถูกคาดหวังอยู่สินะ"
10029075-108 = "อืม ถ้าในสถานการณ์แบบนี้ละก็... ถ้าทำไม่ได้ก็ลำบากแย่"
10029075-109 = "ต้องทำให้ได้สิคะ! 5 นาที! ขอ 5 นาทีก็พอค่ะ!!"
10029075-111 = "ทุกคนมาออกแรงกันอีกครั้งนะคะ!!  เราเข้าใกล้ความจริงกันแล้วค่ะ!!"
10029075-112 = "[s9] \"ดีละ งั้นมาเริ่มกันเลย!\"\n[s10] \"สู้สุดใจให้จบเลย!!\""
10029075-116 = "... อื้ม!!"

[translation]
10029075-1 = "Episode 7;Academy City's Greatest Mental Ability"
10029075-6 = "Wh-What?! Who are these guys?!"
10029075-7 = "Where did they come from? And why are they all fighting each other?!"
10029075-8 = "Wh-Where are we? How'd we get here?!"
10029075-9 = "Lock the area down!"
10029075-10 = "Neutralize everyone else here first, then we can figure out what this place is!"
10029075-12 = "Th-The Millennium ruins? Why are we here?!"
10029075-13 = "...! You...!!"
10029075-14 = "...? Those are Kaiser PMCs..."
10029075-15 = "I don't quite understand, but it can't be a coincidence that they're here. Take them out!"
10029075-16 = "Prepare for battle!!"
10029075-18 = "Don't mess with us! Weapons out, ladies! We can figure out where we are after these people are in the ground!"
10029075-24 = "Th-These guys..."
10029075-25 = "Are they also from another world? Is spacetime getting even more mixed up?!"
10029075-26 = "[s1] \"Those are actually our, um, friends...\"\n[s2] \"Let's just leave it at that.\""
10029075-29 = "...Huh? They're from this world?"
10029075-33 = "...All of them?!"
10029075-37 = "You certainly do have an interesting cast of characters here."
10029075-38 = "How are you going to get out of this one, Miss Misaka? At this rate, the machinery will be destroyed in the fighting."
10029075-39 = "This affects you too, you know! If the machinery breaks, you'll be trapped here with us!!"
10029075-40 = "Sensei!! What should we do here? You said they're your friends!"
10029075-41 = "...Huh?"
10029075-42 = "They're not your friends? ...They're...old enemies?"
10029075-43 = "...They're enemies!!"
10029075-44 = "Argh...! Why does this have to happen now...!!"
10029075-50 = "Sensei? Do you need something?"
10029075-51 = "...Well, I can try to finish repairing the machinery..."
10029075-52 = "But we need more time. And if the machinery gets caught in the crossfire, there may be nothing I can do."
10029075-53 = "It's already acting up! Even if we do fix it, then the machinery will turn on and..."
10029075-55 = "That's not a problem. We'll insert the chip we brought when the repairs are done."
10029075-56 = "The president has programmed the chip to update the machinery's algorithm. Simple."
10029075-57 = "The actual problem is..."
10029075-58 = "[s3] \"Putting a stop to this chaos.\"\n[s4] \"We need to keep these guys from fighting until the repairs are done.\""
10029075-64 = "*sigh*"
10029075-65 = "I had wanted to avoid this, but this is what we've come to...?"
10029075-66 = "I was hoping to leave a better impression..."
10029075-67 = "..."
10029075-68 = "How long do you need? Three minutes? No, five minutes should be enough, yes?"
10029075-69 = "[s7] \"...Shokuhou?\"\n[s8] \"What do you mean...?\""
10029075-72 = "I'm talking about stopping the chaos, of course. How much time do you need?"
10029075-73 = "...! Shokuhou!"
10029075-74 = "Don't make that face, Miss Misaka. I'm not happy about this situation, either."
10029075-75 = "But as you yourself said, it will be a problem if we can't return home, no?"
10029075-76 = "Given the circumstances, I..."
10029075-77 = "...suppose I'll have to give them a little taste."
10029075-87 = "Wh-What...?"
10029075-88 = "Everyone...stopped...?"
10029075-89 = "Did time freeze...? N-No, it's just the people..."
10029075-90 = "...I understand."
10029075-91 = "This is the power that Mikoto mentioned. If it's like this, we can proceed efficiently."
10029075-96 = "Um..."
10029075-97 = "I'm sure you're all awestruck, but...perhaps you could focus on the repairs...?"
10029075-98 = "It's harder to concentrate here...than normal... It hurts..."
10029075-99 = "My ability isn't a brutish force of destruction... It requires finesse..."
10029075-101 = "...? You're talking about me, aren't you?"
10029075-102 = "She's not wrong. We have to hurry."
10029075-103 = "And the drones haven't stopped, so we still need to dismantle them."
10029075-104 = "But the number of hostiles has been reduced by more than half... This should be possible."
10029075-105 = "Right, we can take them! But what about the repairs? Can you do it?"
10029075-107 = "Heehee. It looks like everyone's looking to us to save the day."
10029075-108 = "Yeah. In a situation like this...it'll be embarrassing if we let them down."
10029075-109 = "We can do it! Five minutes! That's more than enough time!!"
10029075-111 = "Let's all do our best! We're almost there!!"
10029075-112 = "[s9] \"All right. Then let's begin!\"\n[s10] \"We'll do our best until the end!\""
10029075-116 = "Yeah!"

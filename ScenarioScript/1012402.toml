[translation]
1012402-1 = "A Girl Needs Time"
1012402-2 = "...That is the situation."
1012402-7 = "Looking over Hasumi's schedule...she hadn't scheduled a single break into it."
1012402-8 = "[ns1] \"Wow... Uh, there sure is a lot to do.\"\n[ns2] \"Are you trying to punish them?\""
1012402-11 = "No. Of course not."
1012402-12 = "This is for the entire club. Each individual has their own column."
1012402-13 = "Upon closer inspection, the seemingly packed schedule did list every member's name."
1012402-14 = "Members will be free to spend their time as they wish when they are not on duty."
1012402-15 = "I wouldn't want them to squander this rare opportunity to visit the beach."
1012402-16 = "I wanted to reward everyone in some way. They always work diligently, without complaint."
1012402-17 = "[s3] \"But Hasumi...\"\n[s4] \"Why are you on every activity?\""
1012402-20 = "I am the vice president."
1012402-21 = "It's all formality, so please don't make that face."
1012402-22 = "In fact, since I won't be responsible for any patrols and paperwork, this will be lighter than my usual workload."
1012402-23 = "...Yes?"
1012402-24 = "I should allocate some free time for myself as well?"
1012402-25 = "Heehee. Just hearing your sentiment is enough for me."
1012402-26 = "[s5] \"You should still bring a swimsuit, just in case!\"\n[s6] \"What if your schedule magically frees up?\""
1012402-29 = "...Sensei."
1012402-30 = "[s7] \"Regardless, your work is still going to be at the beach!\"\n[s8] \"What are you going to do if your uniform gets wet?!\""
1012402-33 = "*sigh*"
1012402-34 = "You're here to make me take a break and relax, right?"
1012402-35 = "[s9] \"Was I that obvious?!\"\n[s10] \"(She...read my mind...?!)\""
1012402-38 = "You always have very clear-cut intentions with your students."
1012402-43 = "Ah, I didn't mean that as a criticism at all! I actually appreciate it quite a bit."
1012402-44 = "I've only recently realized that, but it would seem that I am not the most proficient at \"self-care,\" as they call it."
1012402-45 = "[s] \"(She's surprisingly self-aware...)\""
1012402-46 = "You ARE correct that it would be rather uncomfortable to work in a wet uniform..."
1012402-47 = "Understood."
1012402-48 = "[s] \"Does that mean...?\""
1012402-51 = "Yes. You're trying to be considerate of me, so I should respond in kind."
1012402-52 = "This is one of the few times we can relax on formalities, after all."
1012402-53 = "However, I will not be flexible on my schedule."
1012402-54 = "If I skirt my responsibilities, someone else will have to pick up the slack. That is the nature of my position."
1012402-55 = "You wouldn't want me to set such a bad example, would you, Sensei?"
1012402-56 = "[s11] \"Of course not! I respect your sense of duty.\"\n[s12] \"More importantly, do you have a swimsuit?\""
1012402-59 = "Ah. I believe I only had one, and it doesn't fit me anymore."
1012402-60 = "Please don't misunderstand! I haven't gained weight! At least not too much..."
1012402-61 = "I've just grown a bit in the past year..."
1012402-62 = "[s13] \"Well, it's a good excuse to go shopping.\" \n[s14] \"Let's go get you a new swimsuit!\""
1012402-65 = "I cannot."
1012402-66 = "[s] \"Ah, sorry! I'm sure you have a lot to do. How about tomorrow?\""
1012402-67 = "I cannot tomorrow."
1012402-68 = "[s] \"Um... Hasumi?\""
1012402-69 = "One week..."
1012402-73 = "In one week, my preparations will be complete! I will not fail!"
1012402-74 = "[s15] \"Does the situation warrant that response...?\"\n[s16] \"It's just swimsuit shopping...\""
1012402-77 = "Yes. It does. This is an extremely serious matter."
1012402-78 = "Then, I'll see you in one week."
1012402-79 = "I should go and begin preparing."
1012402-84 = "Hasumi looked oddly determined as she left."

[translation]
1012402-1 = "เด็กสาวต้องการเวลา"
1012402-2 = "มันก็เป็นอย่างนี้ละค่ะ..."
1012402-7 = "(เมื่อเห็นตารางงานที่ฮาสุมิเอาให้ดู... คุณครูก็รู้สึกได้ถึงความตั้งใจของฮาสุมิที่จะไม่หยุดพักเลย แม้แต่วินาทีเดียว)"
1012402-8 = "[ns1] \"ทุกคนยุ่งกันขนาดนี้เลยเหรอ?\"\n[ns2] \"ตารางงานแน่นเกินไปแล้ว...\""
1012402-11 = "ไม่หรอกค่ะ ชมรมทวงความยุติธรรมไม่ได้เข้มงวดขนาดนั้นค่ะ"
1012402-12 = "นี่คือตารางงานของทั้งชมรมน่ะค่ะ ส่วนชื่อของคนที่ต้องไปทำงานนั้นๆ จะเขียนไว้ต่างหากค่ะ"
1012402-13 = "(เมื่อดูอีกครั้ง ก็เห็นว่ามีชื่อสมาชิกที่ต้องทำแต่ละงานเขียนกำกับไว้)"
1012402-14 = "แน่นอนว่า... เราใช้เวลาว่างนอกตารางงานได้อย่างอิสระค่ะ"
1012402-15 = "อย่างที่คุณครูบอกว่าอุตส่าห์ได้ไปทะเลแท้ๆ"
1012402-16 = "นั่นคงเป็นของขวัญเล็กๆ สำหรับฉัน... และสำหรับสมาชิกชมรมที่ทำงานหนักอยู่เสมอด้วยค่ะ"
1012402-17 = "[s3] \"แต่มีชื่อฮาสุมิในทุกช่องเลยนะ...?\"\n[s4] \"แต่ฮาสุมิมีชื่อในทุกตารางงานเลยนะ...?\""
1012402-20 = "ก็ฉันเป็นรองหัวหน้าชมรมนี่คะ"
1012402-21 = "งานส่วนใหญ่เป็นแค่งานพิธีการ คุณครูไม่ต้องกังวลให้มากเกินไปก็ได้ค่ะ"
1012402-22 = "มันเป็นงานสบายที่ไม่ต้องออกไปลาดตระเวนหรือง่วนอยู่กับเอกสารด้วยค่ะ"
1012402-23 = "คะ...?"
1012402-24 = "ให้ฉันมีเวลาส่วนตัวเพื่อตัวเองบ้างเหรอคะ?"
1012402-25 = "ฮุฮุ พอคุณครูพูดแบบนั้นฉันก็มีแรงขึ้นมานะคะ ฉันไม่เป็นไรค่ะ"
1012402-26 = "[s5] \"แต่ก็เอาชุดว่ายน้ำไปเผื่อเถอะนะ\"\n[s6] \"เอาชุดว่ายน้ำไปด้วยเถอะ เผื่อมีงานที่ยกเลิกไง\""
1012402-29 = "คุณครู..."
1012402-30 = "[s7] \"จะไปทำงานที่ชายหาดใช่มั้ยล่ะ?\"\n[s8] \"ถ้าชุดนักเรียนเปียกก็เป็นเรื่องเลยนะ!\""
1012402-33 = "เฮ้อ..."
1012402-34 = "คุณครูพยายามให้ฉันหาเวลาใส่ชุดว่ายน้ำแล้วพักผ่อนใช่มั้ยคะ? "
1012402-35 = "[s9] \"ดูออกขนาดนั้นเลยเหรอ?\"\n[s10] (อ่านความคิด... ได้เหรอเนี่ย...?!)"
1012402-38 = "พอเป็นเรื่องเกี่ยวกับนักเรียน ฉันก็เดาความคิดของคุณครูได้ไม่ยากเลยค่ะ..."
1012402-43 = "อ๊ะ แน่นอนว่าฉันไม่ได้ไม่ชอบหรอกนะคะ ต้องขอบคุณมากกว่าด้วยซ้ำค่ะ"
1012402-44 = "ฉันก็เพิ่งรู้ตัวเมื่อไม่นานมานี้... ว่าฉันไม่ค่อยใส่ใจตัวเองมากเท่าไรเมื่อเทียบกับคนอื่นค่ะ"
1012402-45 = "[s] (ก็พอรู้ตัวบ้างสินะ...)"
1012402-46 = "ถ้าชุดนักเรียนเปียกก็จะเป็นปัญหาได้... ที่คุณครูพูดมาก็ถูกค่ะ"
1012402-47 = "งั้นก็ได้ค่ะ"
1012402-48 = "[s] \"หมายความว่า...?\""
1012402-51 = "ค่ะ ถ้าจะปฏิเสธความเอาใจใส่ของคุณครูก็จะเป็นการเสียมารยาทนี่คะ"
1012402-52 = "ต่อให้ทำงานในชุดที่แตกต่างจากปกติเล็กน้อยก็คงไม่เป็นปัญหาหรอกค่ะ"
1012402-53 = "แต่ว่า... ตารางงานเดิมจะไม่มีการเปลี่ยนแปลงค่ะ"
1012402-54 = "ถ้าฉันถอนตัวจากงาน ก็ต้องมีคนอื่นมาทำหน้าที่แทนนี่คะ"
1012402-55 = "คุณครูก็คงไม่อยากให้นักเรียนคนอื่นต้องเหนื่อยใช่มั้ยล่ะคะ?"
1012402-56 = "[s11] \"ครูจะเคารพการตัดสินใจของฮาสุมินะ\"\n[s12] \"ว่าแต่ฮาสุมิมีชุดว่ายน้ำเหรอ?\""
1012402-59 = "จะว่าไป... ชุดว่ายน้ำที่มี ไซซ์มันไม่พอดีแล้วค่ะ"
1012402-60 = "อ๊ะ อย่าเข้าใจผิดนะคะ! ฉันไม่ได้... หนักกว่าเดิมมากเท่าไรหรอกค่ะ!"
1012402-61 = "แค่ปีที่ผ่านมาฉันโตขึ้นนิดหน่อยน่ะค่ะ..."
1012402-62 = "[s13] \"ไม่เป็นไรหรอก ซื้อชุดใหม่ก็ได้\"\n[s14] \"ไปซื้อชุดว่ายน้ำใหม่กันเถอะ!\""
1012402-65 = "ไม่ได้ค่ะ"
1012402-66 = "[s] \"อ๊ะ ตอนบ่ายมีงานต้องทำเหรอ? งั้นเป็นพรุ่งนี้มั้ย...\""
1012402-67 = "พรุ่งนี้ก็ไม่ได้ค่ะ"
1012402-68 = "[s] \"เอ่อ... ฮาสุมิ?\""
1012402-69 = "1 สัปดาห์..."
1012402-73 = "ขอเวลาฉัน 1 สัปดาห์ได้มั้ยคะ? ระหว่างนั้นฉันจะไปเตรียมตัวมาค่ะ"
1012402-74 = "[s15] \"จริงจังไปหน่อยหรือเปล่า?\"\n[s16] \"เราแค่จะไปซื้อชุดว่ายน้ำกันเองนะ...\""
1012402-77 = "ไม่ได้หรอกค่ะ ฉันจำเป็นต้องทำแบบนั้นค่ะ"
1012402-78 = "งั้นไว้เจอกันสัปดาห์หน้านะคะ"
1012402-79 = "ฉันขอตัวก่อนค่ะ"
1012402-84 = "(แล้วฮาสุมิก็เดินจากไปด้วยความมุ่งมั่น)"

[translation]
1012402-1 = "少女需要時間"
1012402-2 = "……事情就是這樣。"
1012402-7 = "（看了蓮實帶來的行程表後……完全能感受到他「一刻也不休息」的決心）"
1012402-8 = "[ns1]「大家都這麼忙嗎？」\n[ns2]「這行程也太硬了吧……」"
1012402-11 = "不，以實現正義部整體而言並沒有這麼嚴苛。"
1012402-12 = "這張表上寫的是社團內的所有行程。#n每個人負責的行程會另外標註出來。"
1012402-13 = "（仔細一看，每個行程確實都寫著參加人員的名字）"
1012402-14 = "至於行程以外的時間……當然都可以自由安排。"
1012402-15 = "誠如老師所說，難得有機會來到海邊……"
1012402-16 = "算是我給一直很努力的部員們的……一份小小的禮物吧。"
1012402-17 = "[s3]「可是蓮實你……」\n[s4]「好像幾乎每個行程都有參加耶……？」"
1012402-20 = "畢竟我是副部長啊。"
1012402-21 = "而且其中大部分都是禮節性的行程，您不必太擔心。"
1012402-22 = "跟平時的巡邏或文書作業相較起來，這還算是輕鬆的呢。"
1012402-23 = "……嗯？"
1012402-24 = "要我也留一些時間給自己？"
1012402-25 = "呵呵，光是聽見老師這麼說，我就覺得很振奮了。"
1012402-26 = "[s5]「以防萬一，還是帶上泳裝吧。」\n[s6]「搞不好會有行程取消也說不定。」"
1012402-29 = "……老師。"
1012402-30 = "[s7]「而且活動地點是在海邊吧？」\n[s8]「要是制服弄濕的話就麻煩了！」"
1012402-33 = "唉……"
1012402-34 = "您終究還是希望讓我偷閒對吧？"
1012402-35 = "[s9]「有這麼明顯嗎？」\n[s10]（他……會讀心嗎！？）"
1012402-38 = "老師您只要牽涉到與學生有關的事情，就會變得很好懂呢……"
1012402-43 = "啊，當然我並沒有討厭的意思，反而覺得很感謝您。"
1012402-44 = "我最近才察覺自己在這方面的自我管理……似乎比別人笨拙一些。"
1012402-45 = "[s]（原來他自己也有發現啊……）"
1012402-46 = "如果制服弄濕會很麻煩……您說的確實沒錯。"
1012402-47 = "我明白了。"
1012402-48 = "[s]「你的意思是……？」"
1012402-51 = "是的，過度推辭老師的好意也不太禮貌。"
1012402-52 = "況且在服裝方面，本就不必過度拘泥於形式。"
1012402-53 = "不過原定的行程並不會有所更動。"
1012402-54 = "畢竟如果我缺席的話，終究得有人負責補上。"
1012402-55 = "老師應該也不希望那樣吧？"
1012402-56 = "[s11]「這部分我尊重蓮實的決定。」\n[s12]「話說你有泳裝嗎？」"
1012402-59 = "這麼說來，尺寸應該已經不合了呢。"
1012402-60 = "啊，請您不要誤會！#n我的體重……並沒有增加多少！"
1012402-61 = "只是今年稍微長高了一點而已……"
1012402-62 = "[s13]「沒關係，重新買一件就行了。」\n[s14]「走吧，去買新的泳裝！」"
1012402-65 = "您的好意我心領了。"
1012402-66 = "[s]「啊，你下午有行程是嗎？那明天……」"
1012402-67 = "明天也不行。"
1012402-68 = "[s]「……蓮實同學？」"
1012402-69 = "一週……"
1012402-73 = "請您給我一週的時間。#n我會在那之前做好準備的。"
1012402-74 = "[s15]「你是不是有點看得太重了？」\n[s16]「只是去買泳裝而已……」"
1012402-77 = "不，這是值得如此認真的大事。"
1012402-78 = "那麼，一週後再見。"
1012402-79 = "我先失陪了。"
1012402-84 = "（蓮實說完就帶著決心離開了）"

10021005-1 = "#all;hide"
10021005-2 = "#all;hide"
10021005-3 = "3;아로나;15;선생님! 지금 <아트라하시스의 방주>는 자폭 준비에 들어갔어요!!\n#3;a\n#3;em;[!]"
10021005-4 = "3;아로나;05;학생들이 선생님을 도우러 오고 있지만, 그때까지 저희는 이곳 <나람신의 왕좌>에서 다른 시간대의 시로코 씨와 프레나파테스를 상대해야만 합니다!"
10021005-5 = "3;아로나;05;최후의 싸움이 될지도 몰라요! 저희의 모든 힘을 다하지 않으면 안 됩니다!!"
10021005-6 = "3;아로나;22;그럼, 부탁드립니다, 선생님!\n#3;closeup\n#3;em;[반응]"

[translation]
10021005-3 = "คุณครูคะ! ตอนนี้ <เรืออะทราฮาซิส> เข้าสู่ขั้นตอนเตรียมระเบิดตัวเองแล้วค่ะ!!"
10021005-4 = "ตอนนี้เหล่านักเรียนกำลังมาสมทบกับคุณครูอยู่ แต่จนกว่าพวกเธอจะมาถึง พวกเราจะต้องรับมือกับ#nคุณชิโรโกะ และเพลนาพาเทสที่มาจากมิติอื่นไว้ให้ได้ค่ะ!"
10021005-5 = "นี่อาจเป็นการต่อสู้ครั้งสุดท้ายก็ได้ค่ะ! ถ้าไม่ทุ่มสุดชีวิต คงเอาชนะไม่ได้แน่ค่ะ!!"
10021005-6 = "เพราะงั้น... ขอรบกวนด้วยนะคะคุณครู!"

[translation]
42220-1 = "第22話;昨日と明日の私たち"
42220-9 = "<警告！侵入者自動迎撃システムが無力化されました。>"
42220-10 = "<サイロの保安担当者は主要隔壁を閉鎖し、機密文書を破棄した後、侵入者の措置を……>"
42220-16 = "（……私は、何のためにここに残っているんだ？）"
42220-17 = "（ただ、SRT特殊学園を復活させるために……命令を遂行し続けただけなのに……）"
42220-19 = "（……どうして、ここで自爆ボタンを持って立っているんだ？）"
42220-29 = "<繰り返し警告します。態勢Zを発令します。サイロの保安担当者は主要隔壁を閉鎖し……>"
42220-34 = "……そうだ。深く考える必要はない。"
42220-35 = "これまでもそうしてきたように……作戦を成功させるために必要なものだけを残して、後は捨てればいい。"
42220-36 = "今回の作戦の目標は……"
42220-37 = "……この弾頭を起爆させること。"
42220-45 = "……お待たせ！"
42220-57 = "FOX4……？#nどうしてここに……"
42220-58 = "後輩に会わないよう、ダクトで迂回してきたからちょっと遅れちゃった。"
42220-59 = "やっぱり非常時でもWエリアは閉鎖されてないみたいだよ。"
42220-60 = "いたたっ……サキ、あいつ私が倒れてるっていうのに、お腹に5発も撃つとか最悪！"
42220-61 = "相手が動かなくなるまで制圧しろとは教えたけど……ちょっとひどすぎない？"
42220-63 = "倒れた敵を下手に処理して逆襲されるなんて、屋内戦あるあるだからね。"
42220-64 = "サキちゃんが教範通りちゃんと処理したんだから、あまり怒らないであげて。"
42220-69 = "なぜ……"
42220-70 = "なぜ戻らなかった？"
42220-71 = "えっ……"
42220-72 = "……隊長がここにいるから？"
42220-73 = "敵が防御を突破したら、地上に出ろと命令したはずだが――"
42220-75 = "……ユキノ。あんた、ここで責任を負って弾頭を起爆させるつもりよね？"
42220-76 = "――命を落とすかもしれないっていうのに。"
42220-77 = "………。"
42220-78 = "……作戦に不要な情報だ。#n君たちが知る必要は――"
42220-80 = "ある！"
42220-84 = "ユキノはFOX小隊の隊長である前に……私たちの親友でしょ？"
42220-85 = "親友が、一人で責任を負うために深淵に飛び込もうとしてるっていうのに……そのまま放ってなんておけないわよ。"
42220-86 = "ベテラン特殊部隊員らしからぬ発言だな。"
42220-87 = "それを判断するのは隊員個人ではなく、責任を取れる――"
42220-89 = "ユキノ。"
42220-90 = "この作戦は、最初から倒れていたよ。"
42220-91 = "私たちはSRTを復活させるという大義のために、手を汚しすぎた。"
42220-92 = "こんなに汚れちゃった手で、SRTの正義を論じるのは難しいけど……"
42220-93 = "責任から逃れるために……友達を犠牲にしたなんて罪まで背負いたくないよ。"
42220-94 = "もちろん、後輩にこの責任を押しつけるのはもっと嫌。"
42220-99 = "この汚名は、私たちが背負って……あの子たちを帰してあげよう。"
42220-104 = "……そうか。"
42220-110 = "すべては……"
42220-114 = "SRT特殊学園復活のために！"

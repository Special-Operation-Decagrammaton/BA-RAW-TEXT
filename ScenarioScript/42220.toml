[translation]
42220-1 = "ตอนที่ 22;เมื่อวานและวันพรุ่งนี้"
42220-9 = "<คำเตือน คำเตือน! ระบบซุ่มโจมตีผู้บุกรุกอัตโนมัติไม่ทำงาน>"
42220-10 = "<เจ้าหน้าที่รักษาความปลอดภัยในไซโลทำการปิดกำแพงหลักและทำลายเอกสารลับ ต่อไปจะวิเคราะห์ผู้บุกรุกและรับมือ...>"
42220-16 = "(... ฉันยังอยู่ที่นี่ไปเพื่ออะไรกันนะ?)"
42220-17 = "(ฉันก็แค่... ทำตามคำสั่งเพื่อฟื้นฟูสถาบัน SRT กลับมาก็เท่านั้น...)"
42220-19 = "(... แล้วทำไมถึงได้มาถือปุ่มระเบิดตัวเองอยู่ในที่แห่งนี้กันด้วยล่ะ?)"
42220-29 = "<เตือนให้ทราบอีกครั้ง ออกคำสั่งเตรียม Z เจ้าหน้าที่รักษาความปลอดภัยในไซโลทำการปิดกำแพง#nหลักและทำลาย...>"
42220-34 = "... ใช่ ไม่เห็นต้องคิดให้มันมากความนักเลย"
42220-35 = "จัดการเฉพาะเรื่องที่จำเป็นเพื่อให้ปฏิบัติการสำเร็จ แล้วทิ้งที่เหลือไปอย่างที่ทำมาตลอด "
42220-36 = "เป้าหมายของปฏิบัติการนี้..."
42220-37 = "... คือการระเบิดหัวรบ"
42220-45 = "... รอนานเลยละสิท่า!"
42220-57 = "FOX 4...? ทำไมถึงมาที่นี่ได้..."
42220-58 = "ฉันต้องหลบพวกรุ่นน้องแล้วอ้อมมาทางท่อระบายอากาศ ก็เลยมาช้าหน่อยน่ะ"
42220-59 = "ท่าทางเขต W จะไม่ถูกทำลายแม้จะอยู่ในกรณีฉุกเฉินนะ"
42220-60 = "โอย... ยัยซากิตัวดี พอเห็นว่าฉันล้มลงไปแล้วก็ยังจะยิงเข้าที่ท้องอีกตั้ง 5 นัดแน่ะ"
42220-61 = "ฉันเคยสอนไว้ว่าให้จัดการอีกฝ่ายจนกว่าจะไม่ขยับตัวก็จริง แต่แบบนี้มันไม่เกินไปหน่อยเหรอ?"
42220-63 = "ก็ถ้าชะล่าใจกับศัตรูที่ลงไปนอนพับกับพื้นแล้ว บางทีอาจจะโดนโจมตีสวนแบบไม่รู้ตัวก็ได้นี่นา ยิ่งต่อสู้ในอาคารยิ่งต้องรอบคอบให้ดีๆ เลย"
42220-64 = "ซากิจังทำหน้าที่ได้ดีสมกับที่เป็นแนวหน้าแล้วละ อย่าหัวร้อนให้มันมากนักเลยนะ"
42220-69 = "ทำไมล่ะ..."
42220-70 = "ทำไมไม่กลับไปกันล่ะ?"
42220-71 = "อ่า..."
42220-72 = "... ก็หัวหน้ากองของเราอยู่ที่นี่ไง"
42220-73 = "ฉันสั่งไปแล้วไม่ใช่เหรอว่าถ้าศัตรูฝ่าแนวป้องกันมาได้ ก็ไม่ต้องกลับมาแล้วให้ขึ้นไปข้างบนเลย"
42220-75 = "... ยูกิโนะ เธอจะรับผิดชอบโดยการระเบิดหัวรบในตอนที่พวกเราไม่อยู่ล่ะสิ?"
42220-76 = "ไม่รู้เหรอว่าตัวเองอาจจะไม่รอดกลับไปน่ะ"
42220-77 = "........."
42220-78 = "เลิกพูดอะไรที่ไม่จำเป็นต่อปฏิบัติการได้แล้ว พวกเธอไม่จำเป็นต้องรู้..."
42220-80 = "พวกเราต้องรู้สิ! "
42220-84 = "ก่อนที่จะมาเป็นหัวหน้ากองทหาร FOX... ยูกิโนะเป็นเพื่อนของพวกเรามาก่อนนะ"
42220-85 = "เธอจะกระโดดลงไปในบ่อลึกคนเดียวเพื่อรับผิดชอบในสิ่งที่เพื่อนๆ ทำร่วมกันมาได้ยังไง... พวกเราไม่ยอมให้ทำอย่างนั้นหรอก"
42220-86 = "พูดอะไรไม่สมกับเป็นหน่วยรบพิเศษชำนาญการเลยนะ"
42220-87 = "การตัดสินใจเรื่องนั้นน่ะ ไม่ได้เป็นหน้าที่ของสมาชิกแต่ละคน แต่เป็นของคนที่ต้องรับผิดชอบ..."
42220-89 = "ยูกิโนะ"
42220-90 = "ปฏิบัติการนี้มันล้มเหลวตั้งแต่แรกแล้วละ"
42220-91 = "มือของพวกเราต้องแปดเปื้อนมากเกินไปเพราะความชอบธรรมในการฟื้นฟู SRT"
42220-92 = "ถึงจะยากที่จะพูดถึงความยุติธรรมของ SRT ด้วยมือที่แปดเปื้อนนี้ก็เถอะ..."
42220-93 = "แต่ว่าฉันก็ไม่ได้อยากเพิ่มความอัปยศให้ตัวเองด้วยการทิ้งความรับผิดชอบและทิ้งให้เพื่อนต้องมา#nเสียสละหรอกนะ"
42220-94 = "และก็ไม่อยากผลักความรับผิดชอบไปให้พวกรุ่นน้องด้วย"
42220-99 = "เรารับผิดชอบต่อมลทินนี้เสียเอง... แล้วปล่อยเด็กๆ พวกนั้นไปเถอะนะ"
42220-104 = "... ใช่"
42220-110 = "ทุกอย่างนี้.."
42220-114 = "ก็เพื่อการฟื้นฟูสถาบัน SRT"

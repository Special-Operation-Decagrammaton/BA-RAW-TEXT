[translation]
42220-1 = "Episode 22; Yesterday and Tomorrow"
42220-9 = "Warning! Warning! Security system offline."
42220-10 = "Security manager: seal partitions and secure classified documents. Intruder has not been apprehended. "
42220-16 = "(...Why am I still here?)"
42220-17 = "(I only...followed my orders to bring back SRT Academy...)"
42220-19 = "(...What am I doing here, holding a detonator?)"
42220-29 = "Transitioning to status level Z. Security manager: seal partitions and secure classified documents..."
42220-34 = "...No need to overanalyze this."
42220-35 = "I just have to sort what's necessary for the mission and throw out everything else. Like I always do."
42220-36 = "The mission's objective..."
42220-37 = "...is to trigger this warhead."
42220-45 = "Kept you waiting, huh?"
42220-57 = "FOX 4...? What are you doing here...?"
42220-58 = "I got held up trying to evade our underclassmen via the ventilation system."
42220-59 = "It seems like sector W isn't sealed even during an emergency."
42220-60 = "I'm still hurting! Did you see Saki? She shot me five times! After I was down!"
42220-61 = "I taught her to always make sure your opponent is neutralized, but that's a bit excessive."
42220-63 = "She had to ensure her squad wouldn't get shot in the back by her carelessness."
42220-64 = "Saki did her job as a front woman."
42220-69 = "...Why?"
42220-70 = "Why didn't you retreat?!"
42220-71 = "Huh?"
42220-72 = "Because our squad leader is still here...?"
42220-73 = "I ordered you to return to the surface if the enemy breaches our defenses..."
42220-75 = "It was painfully obvious you were going to blow yourself and everything else up as soon as we left."
42220-76 = "The complete disregard for your own life... Yukino..."
42220-77 = "..."
42220-78 = "...It had nothing to do with the success of the mission. There was no need for you to—"
42220-80 = "Of course there was a need! "
42220-84 = "We need you! Not because you're our leader, but because you're our friend!"
42220-85 = "And friends should shoulder things together! Every bad thing you've done Yukino, we've done right alongside you! So we're going to face every consequence right by your side too."
42220-86 = "That's not the way a special forces veteran should be speaking."
42220-87 = "I'm the one who makes the final call for this squad, every time. So responsibility for our actions falls on me as well."
42220-89 = "Yukino."
42220-90 = "I never liked this operation much."
42220-91 = "We've done awful things in the name of bringing back SRT."
42220-92 = "I'm ashamed at how much we've compromised SRT's justice for our goal."
42220-93 = "I... None of us would be able to stand adding the shame of letting our squad leader sacrifice herself for a mission we all took together."
42220-94 = "But I also know that we've gone too far to stop now. We can't let our underclassmen shoulder this responsibility either."
42220-99 = "We'll bear the cross of the dishonor we've brought to SRT and finish this. So we can send those rabbits back to their rightful home."
42220-104 = "I get it."
42220-110 = "This is all..."
42220-114 = "For the rebirth of SRT Academy!"

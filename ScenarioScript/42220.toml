[translation]
42220-1 = "第22話;昨天與明天的我們"
42220-9 = "「警告！入侵者自動迎擊系統已被解除。」"
42220-10 = "「請發射井保安負責人關閉主要隔間外壁，在銷毀機密文件後將入侵者……」"
42220-16 = "（……我，究竟是為了什麼而留在這裡的呢？）"
42220-17 = "（明明只是為了讓SRT特殊學園復活……才會一直聽從命令……）"
42220-19 = "（……為什麼，我會拿著自爆按鈕站在這裡呢？）"
42220-29 = "「再次警告，目前已進入Z緊急狀態。請發射井保安負責人封鎖主要隔間外壁……」"
42220-34 = "……沒錯，我不必想那麼多。"
42220-35 = "就跟之前一樣……只留下能讓作戰成功的要素，其餘的東西通通捨棄。"
42220-36 = "而這次作戰的目標……"
42220-37 = "……就是引爆這個彈頭。"
42220-45 = "……讓你久等了！"
42220-57 = "FOX4……？#n你怎麼會在這裡……"
42220-58 = "為了不撞見後輩們，只好從通風管繞路過來，所以才來晚了。"
42220-59 = "果然就算是緊急情況也不會封鎖W區啊。"
42220-60 = "痛痛痛……咲希那傢伙，#n我明明已經倒地不起了，竟然還朝我的肚子開了五槍，真是壞透了！"
42220-61 = "雖然我是有教過他要徹底確保敵人無法動彈……不過這樣不會太過分了嗎？"
42220-63 = "畢竟因為沒有妥善處置敵人而反遭逆襲的案例，在室內戰層出不窮嘛。"
42220-64 = "咲希醬只是按照教戰手冊處理而已，你也別太生氣了。"
42220-69 = "為什麼……"
42220-70 = "為什麼你們沒有撤退？"
42220-71 = "呃……"
42220-72 = "……因為隊長還在這裡？"
42220-73 = "我不是命令過你們，一旦敵人突破防線就立即撤退回地面──"
42220-75 = "……雪乃。你打算在這裡負起責任引爆彈頭對吧？"
42220-76 = "──明知自己有可能因此喪命。"
42220-77 = "…………"
42220-78 = "……這是對作戰來說不必要的情報。#n你們沒有知道的必──"
42220-80 = "當然有！"
42220-84 = "雪乃在FOX小隊的隊長之前……更是我們的朋友吧！"
42220-85 = "朋友明明打算一肩扛起所有責任，獨自跳入深淵……我們怎麼能袖手旁觀。"
42220-86 = "真不像是資深特殊部隊員會有的發言啊。"
42220-87 = "要做出判斷的並非隊員個人，而是能負起責任的──"
42220-89 = "雪乃。"
42220-90 = "這個作戰從一開始就是錯的。"
42220-91 = "我們為了讓SRT復活的大義，已經讓雙手沾染太多汙穢了。"
42220-92 = "雖然不知道這樣的我們，還有沒有資格談論SRT的正義……"
42220-93 = "不過我不想為了逃避責任……再背負讓朋友犧牲的罪過了。"
42220-94 = "當然，更不想把這個責任強加在後輩身上。"
42220-99 = "這個汙名就由我們自己承擔……讓那些孩子們回去吧。"
42220-104 = "……是嗎。"
42220-110 = "這一切……"
42220-114 = "都是為了SRT特殊學園的復活！"

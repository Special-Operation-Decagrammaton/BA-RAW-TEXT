[translation]
90001100-1 = "Episode 10;Legacy of the Nameless Gods"
90001100-2 = "To summarize, we followed Chokmah's trail from the Glacial Sea to here, and we uncovered its activity in the volcanic region."
90001100-3 = "We believe it was harvesting resources to transport to a second location."
90001100-4 = "Yes. We observed it building transportation routes, although we're still unsure of where the resources are being sent. And there are still facilities remaining in the area."
90001100-5 = "Shall I perform recon in the area, Ms. Rio, President Himari?"
90001100-6 = "Yes. Thank you, Toki."
90001100-14 = "Should I join her?"
90001100-15 = "No. I have a separate task for you, Eimi."
90001100-16 = "What is it?"
90001100-17 = "We need to do an analysis of the remaining Decagrammaton facilities."
90001100-18 = "My mission is to retrieve samples."
90001100-19 = "Precisely. For this kind of endeavor, the more samples we have, the better."
90001100-27 = "...? What are you doing, Rio?"
90001100-30 = "Hm? Didn't you say you needed more samples?"
90001100-31 = "Then are you...offering to help?"
90001100-32 = "...Did you really feel the need to spell it out? It's inane."
90001100-33 = "It's fine. Great. Let's get this over with, then. Shall we?"
90001100-34 = "[s] \"Despite everything...\""
90001100-38 = "[ns] \"You two are close friends!\""
90001100-39 = "Definitely not!"
90001100-40 = "You're completely wrong, Sensei."
90001100-46 = "Will these samples be enough, President?"
90001100-47 = "Yes. That should be enough, Eimi. We've nearly completed the analysis. Are you receiving the results, Rio?"
90001100-48 = "Receipt confirmed. I have a few conclusions I've made."
90001100-49 = "Oh, is that so? Well, go on."
90001100-50 = "I believe this to be a matter of great importance. We can confirm it on site."
90001100-51 = "I've detected traces of material construction in the samples."
90001100-52 = "Ah, I can see it. We've faced something similar before."
90001100-53 = "[s] \"Huh? We have?\""
90001100-54 = "Yes, Sensei. Do you remember the Ark of Atrahasis?"
90001100-55 = "And what happened to subject—I mean, Aris and Kei?"
90001100-67 = "[ns] \"Ah!\""
90001100-69 = "Yes, exactly, Sensei."
90001100-70 = "Yes. It's the same."
90001100-71 = "Material reconstruction is one of the signature powers of the Nameless Gods."
90001100-72 = "There's no way to confirm for certain, since we don't have direct access to Chokmah. However, looking at the resource harvesting methods, their transport facilities, and even the forces themselves..."
90001100-73 = "Yes. They were all created via material reconstruction...the power of the Nameless Gods."
90001100-74 = "And now, I think our hypothesis is almost proven."
90001100-75 = "[s] \"Proven?\""
90001100-76 = "Yes. All the pieces fit together. The—"
90001100-84 = "Asuma Toki, reporting. I have returned."
90001100-85 = "I've confirmed the presence of hastily constructed rails leaving the volcanic regions. There are also several small defensive forces stationed along the paths."
90001100-86 = "[s] \"Okay. Great work, Toki.\""
90001100-87 = "Yes. Of course. Sensei, you should be more proactive and bold in issuing me compliments."
90001100-93 = "To be specific, here are some potential options: head pats, a light hug, or your hands around my waist."
90001100-96 = "Sensei? Why are you suddenly flustered?"
90001100-97 = "Toki...?"
90001100-100 = "I wouldn't question it, Ms. Rio. I can't confirm if she's just revealed her true nature or if she's changed, but this is simply Toki now."
90001100-101 = "...Let us continue, Sensei."
90001100-102 = "[s] \"R-Right! What did you mean by all the pieces fitting in together?\""
90001100-103 = "...Disappointing."
90001100-104 = "There were three prophets of Decagrammaton that the Super Phenomenon Task Force faced before coming to the Glacial Sea: Binah, Chesed, and Hod..."
90001100-105 = "None of those three prophets had any relation to the power of the Nameless Gods."
90001100-106 = "But when it came to Geburah and Chokmah, the prophets we met here, we identified traces of the power of the Nameless Gods."
90001100-107 = "Which could explain the rather surreal experience of a ship floating on lava that we all witnessed."
90001100-108 = "[s1] \"What's certain is that Decagrammaton and its prophets...\"\n[s2] \"...are already utilizing the power of the Nameless Gods, right?\""
90001100-111 = "Yes. That seems to be an incontrovertible fact."
90001100-112 = "The real concern is what they intend to do with that power."
90001100-116 = "What—?! Rio, just now...?!"
90001100-117 = "Yes. I'm detecting it from here as well."
90001100-123 = "What's wrong, President? Did something happen?"
90001100-124 = "Did you find something, Ms. Rio? Please explain."
90001100-138 = "Yes. For this to happen... We're going to have quite the emergency on our hands."
90001100-139 = "In other words, we've detected a new prophet."
90001100-140 = "But on an entirely different scale."
90001100-145 = "It's a very, very powerful signal."
90001100-147 = "Next Episode;Dead End"

[translation]
90001100-1 = "第10話;無名之神的遺產"
90001100-2 = "我們一路從冰海追著霍刻瑪的蹤跡直到這裡，#n並得知了霍刻瑪正在火山地帶進行任務……"
90001100-3 = "而任務的內容基本上是開採資源，並將其運送到某處。"
90001100-4 = "沒錯。為此甚至還現場製作出了運輸鐵道，附近似乎也還有其他設施存在。"
90001100-5 = "那就由我來調查一下那些設施吧。#n可以嗎，莉央大人、陽葵部長？"
90001100-6 = "就麻煩你了，季。"
90001100-14 = "我也來幫忙吧？"
90001100-15 = "不，我有別的事情要麻煩你，英美。"
90001100-16 = "什麼事？"
90001100-17 = "分析這附近的十字神名殘餘基地設施。"
90001100-18 = "是要收集更多樣本嗎？"
90001100-19 = "正是如此。#n現在這種情況下，樣本越多越好。"
90001100-27 = "……？#n你要做什麼，莉央？"
90001100-30 = "嗯？不是說要收集更多樣本嗎？"
90001100-31 = "所以……你要幫忙嗎？"
90001100-32 = "……沒必要說得那麼清楚。這樣很不合理。"
90001100-33 = "我明白了。那我們就速戰速決吧。#n大家準備好了嗎？"
90001100-34 = "[s]「雖然吵吵鬧鬧的……」"
90001100-38 = "[ns]「不過大家的感情還真好！」"
90001100-39 = "並沒有好嗎！？"
90001100-40 = "這完全是你誤會了，老師。"
90001100-46 = "樣本數量這樣夠嗎，部長？"
90001100-47 = "嗯，已經足夠了，英美。分析工作……也即將完成。#n你收到結果了嗎，莉央？"
90001100-48 = "沒問題。我似乎已經能下結論了。"
90001100-49 = "那就讓我們聽聽看吧？"
90001100-50 = "這是相當重要的事項。#n雖然從現場也能發現……"
90001100-51 = "這裡有物質再構築的痕跡。"
90001100-52 = "我也確實有發現這個跡象……是我們先前交手過的力量呢。"
90001100-53 = "[s]「嗯？有嗎？」"
90001100-54 = "是的，老師。#n您還記得……阿特拉哈西斯的方舟嗎？"
90001100-55 = "就是愛麗絲和那個被稱作Kei的個體……的孩子身上發生的事。"
90001100-67 = "[ns]「啊……！」"
90001100-69 = "是的，老師。"
90001100-70 = "沒錯，就是如此。"
90001100-71 = "物質的再構築，是無名之神的力量最具代表性的特質。"
90001100-72 = "雖然霍刻瑪的本體無從確認，#n但至少這片凍原地帶上的開採資源及運輸設施，說不定就連那些兵力……"
90001100-73 = "沒錯，就是以物質再構築……也就是無名之神的力量創造出來的。"
90001100-74 = "事已至此，我們幾乎可以確定假設是成立的。"
90001100-75 = "[s]「成立？」"
90001100-76 = "是的，這樣所有的拼圖就都拼起來了。#n這──"
90001100-84 = "飛鳥馬季已返回部隊。現在開始回報。"
90001100-85 = "我發現了一條自火山地帶延伸至此的臨時鐵路，且沿路還有一些零星的防禦兵力。"
90001100-86 = "[s]「嗯，辛苦你了，季。」"
90001100-87 = "是，的確很辛苦。#n所以老師應該給我更大膽而積極的鼓勵才對。"
90001100-93 = "比如說摸頭、輕擁，或者用雙手環抱我的腰之類的。"
90001100-96 = "老師？您為什麼突然一臉慌張？"
90001100-97 = "季……？"
90001100-100 = "放棄吧，會長。#n雖然我不知道這是季的本性還是他真的變了，但現在的季就是這個樣子。"
90001100-101 = "……繼續剛才的話題吧，老師。"
90001100-102 = "[s]「嗯，嗯！你剛才說所有拼圖都拼起來了是什麼意思？」"
90001100-103 = "……哭哭。"
90001100-104 = "在特異現象搜查部抵達冰海之前，#n曾經交手的十字神名預言者有薇娜、赫賽德與霍德……"
90001100-105 = "而這三名預言者都和無名之神的力量無關。"
90001100-106 = "然而在抵達冰海後遇到的葛夫拉和霍刻瑪身上，卻都留下了無名之神力量的痕跡。"
90001100-107 = "或許就連船漂浮在岩漿上的超現實景象……也與那股力量有所關聯。"
90001100-108 = "[s1]「所以可以確定的是……」\n[s2]「十字神名和預言者們已經在運用無名之神的力量了嗎？」"
90001100-111 = "沒錯，這是目前可以確定的事實。"
90001100-112 = "問題在於它們究竟打算用這股力量做些什麼……"
90001100-116 = "！？！？#n莉央，這是……！？"
90001100-117 = "嗯，我這邊也確認到了。"
90001100-123 = "怎麼了，部長？#n發生什麼事了嗎？"
90001100-124 = "您發現了什麼嗎，莉央大人？#n請您也向我們說明……"
90001100-138 = "由我來說吧。#n看來這……是相當緊急的事件。"
90001100-139 = "從結論來說──出現了新預言者的信號。"
90001100-140 = "但和以往不同的是……"
90001100-145 = "這次的信號非常強烈。"
90001100-147 = "下一話;死路"

[translation]
80000037-1 = "滿懷心意的獎勵"
80000037-2 = "（一起解決便利屋68接到的委託後，和亞瑠一起回去的路上……）"
80000037-3 = "今天也辛苦你了，老師。"
80000037-4 = "[s]「嗯，亞瑠也辛苦了。」"
80000037-5 = "一開始還不知道會怎麼樣，不過老師跟我果然是最佳拍檔呢。"
80000037-6 = "我們在現場颯爽登場的瞬間，那些傢伙臉上的表情……"
80000037-7 = "呵呵，真是讓人興奮♪"
80000037-8 = "今天的委託也完美地解決了，便利屋68的名聲肯定會越來越響亮！"
80000037-9 = "要是能這麼持續下去，格黑娜……不，是奇普托斯所有學生，#n光是聽到「便利屋68」都會嚇到發抖的那天也不遠了吧？"
80000037-10 = "[s]「也許真的會有那一天哦。」"
80000037-11 = "呵呵，果然和我想的一樣呢！"
80000037-12 = "啊啊，但是突然就聲名遠播的話，也是有點困擾呢……"
80000037-13 = "要是「便利屋68」就這樣成為厲害過頭的存在，變得高處不勝寒也不好吧？"
80000037-14 = "便利屋是只要有錢，無論什麼委託都能接受，遇到危險或重要事情的可靠存在……#n這一直是我們的信條。"
80000037-15 = "要是產生「誰也不敢接近的威嚴」就本末倒置了。"
80000037-16 = "真困難呢……法外之徒之路注定是孤獨的嗎……"
80000037-17 = "算了，那也沒什麼不好！"
80000037-18 = "呵呵……"
80000037-19 = "……"
80000037-21 = "（現，現在氣氛是不是不錯！？感覺是不是超帥的！？）"
80000037-22 = "那麼自誇就先到此為止……"
80000037-23 = "[s]「把自己在自誇說出來了……」"
80000037-24 = "那，那有什麼關係！別破壞難得的好氣氛！"
80000037-25 = "總，總之為了身為我們便利屋68合夥人的老師，那個，特別準備了禮物……"
80000037-30 = "[ns1]「是巧克力……！」\n[ns2]「我可以認為這個是情人節禮物嗎？」"
80000037-31 = "別，別誤會！這個是那個，呃……"
80000037-32 = "別，別誤會！這個是那個，呃……"
80000037-33 = "對，對了！只是報酬的一部分唷！"
80000037-34 = "是為平時就非常努力的老師準備的，#n就算加上5個「超」來形容也不為過的「最高級巧克力」唷。"
80000037-35 = "呵呵，這東西就算在黑市也是非常難入手的。請好好品嘗哦？"
80000037-36 = "[s]「嗯，謝謝！」"
80000037-37 = "也，也對。雖然有預料到老師會很明確地表達喜悅……"
80000037-38 = "（可，可是這麼直接的話，感覺有點……！）"
80000037-39 = "[s]「……咦？」"
80000037-40 = "怎麼了嗎，老師？"
80000037-42 = "走過路過不要錯過！今天是情人節，所以「最高級巧克力」特別便宜賣唷～！"
80000037-44 = "無論怎麼看都是兩個字「高貴」！本來就算賣10萬元也不奇怪……"
80000037-45 = "我的老天爺啊！公司訂貨時竟然發生了疏失！#n看來只好勉為其難舉行跳樓大拍賣了！網路上賣的還是原價，可千萬別吃虧囉！"
80000037-46 = "因為庫存真的太多，不管三七二十一直接0.5折賣！"
80000037-47 = "老闆真的只想把倉庫錢賺回來。"
80000037-48 = "現在正是輕鬆入手這個「高級巧克力」的最好時機！"
80000037-49 = "先搶先贏唷～！"
80000037-51 = "[ns]「哇……」"
80000037-52 = "喂，喂喂喂！這是什麼情況！？"
80000037-53 = "我在網路上發文一問，大家都說「雖然貴但超讚的」……"
80000037-54 = "所以才覺得買這個送給老師再適合不過……"
80000037-55 = "煩惱了好久才終於下定決心，咬牙買了下去的說！？"
80000037-56 = "[s]「這樣啊……」"
80000037-57 = "這，這難道是詐騙……！！"
80000037-58 = "[s3]「亞瑠，先冷靜一點……」\n[s4]「這個跟他們賣的不一樣唷。因為這是亞瑠送給我的。」"
80000037-59 = "是，是嗎……物品的價值說到底都是相對的……"
80000037-60 = "是，是嗎……物品的價值說到底都是相對的……"
80000037-61 = "重要的是送禮者和收禮者的心意。"
80000037-62 = "呵呵。我也真是的，居然忽略了這麼重要的事情。"
80000037-63 = "雖然還沒從打擊中回復……"
80000037-64 = "而且老師都這麼說了。"
80000037-65 = "雖然不甘心……"
80000037-66 = "但是買都買了……"
80000037-67 = "不能……"
80000037-68 = "……不能就這麼算了吧！？"
80000037-69 = "這是兩碼子事！我不能接受！"
80000037-73 = "呵呵……以為我會乖乖吞下去真是太天真了！"
80000037-74 = "以信任回報信任，以手段回報手段！受了多少苦還多少回去可是便利屋68的座右銘！"
80000037-75 = "[s]「座右銘越來越多了……」"
80000037-76 = "首先從購物網站找出總公司的位置，為了對那裡展開襲擊……"
80000037-77 = "[s]「那個，亞瑠同學……？」"
80000037-78 = "好，我決定了！要出發囉老師，下一個行動已經決定好了。"
80000037-79 = "況且我們便利屋68，在回到事務所之前都不算完成委託！"
80000037-80 = "所以，你會繼續陪著我吧？老師？"
80000037-81 = "[s]「嗯。如果亞瑠希望的話。」"
80000037-82 = "呵呵，這才是我認識的老師！"
80000037-83 = "請好好見證吧老師。我作為法外之徒大顯身手的樣子！"
80000037-85 = "（之後和亞瑠一起開始了一段硬派的經歷，但那又是另一個故事了）"

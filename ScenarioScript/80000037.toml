[translation]
80000037-1 = "#title;때 묻지 않은 포상"
80000037-2 = "#na;(흥신소 68에 들어온 의뢰를 함께 해결하고, 아루와 함께 돌아가는 길이었다.)"
80000037-3 = "3;아루;01;후후훗! 오늘 의뢰, 수고했어. 선생님.\n#3;em;[재잘]\n#3;a"
80000037-4 = "[s] \"응, 아루도 고생했어.\""
80000037-5 = "3;아루;99;처음엔 어떻게 되나 싶었지만. 역시 선생님과 나는 최고의 파트너인 거네.\n#3;em;[...]"
80000037-6 = "3;아루;03;우리가 현장을 덮친 순간, 그 문제아 녀석들이 보여준 얼빠진 표정……."
80000037-7 = "3;아루;14;아직도 잊혀지지가 않는다니까~♪\n#3;em;[음표]\n#3;greeting"
80000037-8 = "3;아루;08;후후훗! 오늘 의뢰를 완벽하게 해결한 덕분에 우리 이름은 더욱 유명해질 거야!\n#3;hophop"
80000037-9 = "3;아루;09;이대로만 간다면 조만간 게헨나, 아니, 나아가 키보토스의 학생 모두가 우리 흥신소의 이름만 들어도 벌벌 떨게 될지도 모른다고?"
80000037-10 = "[s] \"과연! 흥신소 68! 떠오르는 샛별! 굉장해!\""
80000037-11 = "3;아루;08;아하하하! 그치? 그렇지?\n#3;em;[반응]\n#3;hophop"
80000037-12 = "3;아루;03;아아~ 하지만 너무 승승장구해버리면 그건 그거대로 곤란할지도 모른달까……."
80000037-13 = "3;아루;02;이렇게 상승세를 타다가 결국 우리 흥신소가 아무나 범접할 수 없는 엄청난 위치에 올라서 버리면 어떡하지?\n#3;stiff"
80000037-14 = "3;아루;05;누구에게나 돈만 준다면 의뢰를 받아주는 친절한 흥신소를 모토로하고 있는데.\n#3;em;[...]"
80000037-15 = "3;아루;03;오히려 너무 활약한 끝에 일반 의뢰인과 멀어지게 되어서야 본말전도라고 할지!"
80000037-16 = "3;아루;01;으응~ 무법자의 길이라는 건 어쩌면 너무 고독한 걸지도 모르겠네."
80000037-17 = "3;아루;08;응. 그런 거겠지! 분명! 후후훗!\n#3;em;[반짝]\n#3;hophop"
80000037-18 = "3;아루;14;후후후훗."
80000037-19 = "3;아루;13;후훗……. 후………."
80000037-20 = "3;아루;13\n#3;em;[...]\n#wait;2500"
80000037-21 = "3;아루;10;(이, 일단 이, 이렇게 분위기를 끌어올렸으니까. 바로 지금이 기회겠지?!)\n#3;stiff"
80000037-22 = "3;아루;04;크흠흠, 그럼 일단 자화자찬은 이쯤 해두기로 하고…….\n#3;greeting"
80000037-23 = "[s] \"자화자찬이라는 자각, 있었구나.\""
80000037-24 = "3;아루;11;쓰, 쓸데없는 소리는 하지 말라고. 선생님! 모처럼 분위기를 잡으려는 이때에!\n#3;em;[속상함]\n#3;stiff"
80000037-25 = "3;아루;13;하, 하여간. 우리 흥신소와 협력하면서 고생해준 동업자인 선생님을 위해, 여기……. 특별히 준비한 물건이 있다고?"
80000037-26 = "#st;[0,0];instant;1;"
80000037-27 = "#clearST"
80000037-28 = "3;아루;13\n#3;d\n#wait;1000"
80000037-29 = "#wait;2500"
80000037-30 = "[ns1] \"앗, 고급스러워 보이는 초콜릿이다!\"\n[ns2] \"이거, 발렌타인 데이의 선물?\""
80000037-31 = "3;아루;10;아, 그, 그러니까! 오, 오해하지 마! 이건 그러니까, 그게…….\n#3;stiff\n#3;a"
80000037-32 = "3;아루;10;아, 그, 그러니까! 오, 오해하지 마! 이건 그러니까, 그게…….\n#3;stiff\n#3;a"
80000037-33 = "3;아루;13;그, 그래! 공치사야! 공치사!\n#3;em;[!]\n#3;hophop"
80000037-34 = "3;아루;08;모처럼 내가 선생님을 위해, 발렌타인 데이 기념으로 특별히 준비한 초-초-초-초-초 자가 붙을 정도로 <최고급 초콜릿>이니까 말이야."
80000037-35 = "3;아루;14;후훗. 암시장을 통해 어렵사리 구한 거라고? 부디 기뻐하면서 느긋하게 음미하도록 해.\n#3;em;[반짝]"
80000037-36 = "[s] \"고마워! 아루!\""
80000037-37 = "3;아루;04;아, 고, 고맙지? 응, 서, 선생님이라면 그렇게 다이렉트하게 말할 거라고 생각은 했지만…….\n#3;em;[땀]\n#3;stiff"
80000037-38 = "3;아루;10;(지, 직접 코앞에서 들으니까. 이거, 어째 더 낯 뜨거운 것 같은 느낌이…….)"
80000037-39 = "[s] \"근데 아루, 이 최고급 초콜릿이라는 거 말인데. 저기에…….\""
80000037-40 = "3;아루;07;……응?\n#3;em;[?]"
80000037-41 = "#all;hide"
80000037-42 = "#na;상점 주인;자자! 구경들하고 가시라! 여기! 여러분을 위해 준비한 발렌타인 데이 특별 상품! <최고급 초콜릿>이 준비되어있습니다!"
80000037-43 = "#wait;1500"
80000037-44 = "#na;상점 주인;딱 봐도 고급스러움이 느껴지는 이 제품! 원래라면 10만 엔은 더 줘야 했을 비싼 가격이지만."
80000037-45 = "#na;상점 주인;아뿔싸! 이게 어찌 된 일이란 말인가! 회사의 생산 발주 미스로 인해 대량 입고! 인터넷에선 여전히 정가에 판매하는 듯하지만, 속지 마시라!"
80000037-46 = "#na;상점 주인;저희 가게에서는 정직하고 깨끗하게, 정가보다 95%를 할인하여 판매 중!"
80000037-47 = "#na;상점 주인;고급 초콜릿을 아주 저렴하게 즐길 수 있는 기회!"
80000037-48 = "#na;상점 주인;자, 개인당 한 개, 아니 두 개, 열 개까지! 마음껏 판매하고 있습니다!"
80000037-49 = "#na;상점 주인;거기, 손님, 하나 어떠신가요?"
80000037-50 = "#all;hide"
80000037-51 = "[ns] \"……그렇다는데?\""
80000037-52 = "3;아루;10;자, 자, 잠깐! 이게 어떻게 된 거야?!\n#3;em;[?!]\n#3;a"
80000037-53 = "3;아루;04;인터넷에서 최고급 초콜릿을 선물하고 싶은데, 뭐가 좋을까요? 라고 질문했을 때 달린 답변들이 죄다 이 초콜릿을 추천하고 있길래."
80000037-54 = "3;아루;13;아, 이거라면 선생님에게도 선물할 보람이 있겠다. 싶어서…….\n#3;stiff\n#fontsize;55"
80000037-55 = "3;아루;06;고심 끝에 정말 큰마음을 먹고, 굳은 결심으로 샀던 건데……!!"
80000037-56 = "[s] \"아루, 그거 아무리 봐도 바이럴 마케팅…….\""
80000037-57 = "3;아루;11;이, 이건 사기야……!!\n#3;em;[!]\n#3;hophop"
80000037-58 = "[s3] \"아루, 일단 진정해…….\"\n[s4] \"이건 아루가 선물해준 거라 의미가 있는 거니까.\""
80000037-59 = "3;아루;10;아, 으, 응……. 그렇지……. 물건의 값어치라는 건, 결국 상대적인 것…….\n#3;stiff"
80000037-60 = "3;아루;10;아, 으, 응……. 그렇지……. 물건의 값어치라는 건, 결국 상대적인 것…….\n#3;stiff"
80000037-61 = "3;아루;13;보다 중요한 건 결국 주는 사람의 마음과 받는 사람의 감사함이니까…….\n#3;em;[...]"
80000037-62 = "3;아루;99;후훗, 선생님은, 날 위해 또 그렇게 말해주는구나."
80000037-63 = "3;아루;03;응……. 아쉽지만, 선생님이 그렇게 말한다면야……. 된 걸까…….\n#3;greeting"
80000037-64 = "3;아루;99;억울하지만, 이미 사버린 것은 되돌릴 수………"
80000037-65 = "3;아루;13;없으……."
80000037-66 = "3;아루;10;없으니………"
80000037-67 = "3;아루;04;없으니ㄲ………"
80000037-68 = "3;아루;11;……없을 리가 없잖아!\n#3;closeup\n#fontsize;100"
80000037-69 = "3;아루;11;아니! 아니야! 이대로 납득하고 넘어가다니, 그런 건, 나 자신이 절대로 용납 못 해!\n#3;em;[!]\n#3;hophop\n#3;closeup\n#fontsize;80"
80000037-70 = "#st;[0,0];instant;1;"
80000037-71 = "#clearST"
80000037-72 = "3;아루;10\n#3;em;…\n#3;closeup\n#wait;2500"
80000037-73 = "3;아루;13;후후……. 이대로 당한 채로 넘어갈 거라고 생각했다면, 천만의 말씀! 만만의 콩떡이야!\n#3;closeup"
80000037-74 = "3;아루;01;신뢰에는 신뢰로 답한다! 하지만, 반대로 당했다면 똑같이 당해준 만큼 갚아준다! 그게 우리 흥신소의 모토니까!\n#3;em;[반짝]\n#3;closeup"
80000037-75 = "[s] \"아, 모토. 늘어났네.\""
80000037-76 = "3;아루;99;후후훗……. 일단 판매 사이트를 통해서, 본사의 위치가 어디 있는지 특정하고, 그곳을 먼저 습격하는 것부터 시작하면…….\n#3;stiff\n#fontsize;55"
80000037-77 = "[s] \"저기, 아루………?\""
80000037-78 = "3;아루;14;좋아. 결심했어! 자아! 선생님. 아직 흥신소의 의뢰 활동은 끝나지 않았어.\n#3;em;[!]\n#3;hophop"
80000037-79 = "3;아루;03;흥신소의 의뢰는, 사무소로 돌아가기 전까지가 의뢰니까!"
80000037-80 = "3;아루;04;이대로……. 조금 더 나와 어울려줄 거지? 선생님?\n#3;em;[반응]"
80000037-81 = "[s] \"……뭐, 어쩔 수 없지. 아루가 원한다면야.\""
80000037-82 = "3;아루;08;후훗! 그래! 그렇게 나와야지. 나의 선생님이지!\n#3;em;[음표]"
80000037-83 = "3;아루;09;자! 똑똑히 잘 보고 있으라고! 지금부터 이 아루 님의 활약을 보여줄 테니까!\n#3;greeting\n#3;closeup"
80000037-84 = "#all;hide"
80000037-85 = "#na;(그렇게 아루와 함께, 조금 더 하드보일드를 함께 하게 된 건 또 다른 이야기.)"

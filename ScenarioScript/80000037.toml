[translation]
80000037-1 = "รางวัลที่ไม่เสียหาย"
80000037-2 = "(หลังจากช่วยงานว่าจ้างของทางหน่วยรับจ้างสารพัด 68 เสร็จ คุณครูก็เดินกลับมาพร้อมกับอารุ)"
80000037-3 = "ฮุฮุฮุ! งานวันนี้ ยอดเยี่ยมมาก คุณครู"
80000037-4 = "[s] \"อื้อ อารุก็ทำได้ดีเหมือนกันนะ\""
80000037-5 = "ตอนแรกก็สงสัยอยู่ว่าจะเป็นยังไง แต่ก็คิดแล้วล่ะว่าคุณครูกับฉันต้องเป็นคู่หูที่สุดยอดมากแน่นอน"
80000037-6 = "เห็นสีหน้าของพวกเด็กเกเรตอนพวกเราปรากฏตัวที่นั่นรึเปล่า..."
80000037-7 = "ฉันยังจำได้อยู่เลยล่ะ~♪"
80000037-8 = "ฮุฮุฮุ! วันนี้พวกเราทำงานได้อย่างสมบูรณ์แบบ ชื่อเสียงของเราจะต้องยิ่งโด่งดังมากขึ้นแน่นอน!"
80000037-9 = "ถ้าเป็นแบบนี้ต่อไปเรื่อยๆ อีกไม่นานนักเรียนในเกเฮนน่า... ไม่สิ นักเรียนในคิโวคอสอาจจะต้อง#nสั่นสะท้านเมื่อได้ยินชื่อของหน่วยรับจ้างสารพัดก็ได้"
80000037-10 = "[s] \"ใช่เลย! ดาวรุ่งพุ่งแรง หน่วยรับจ้างสารพัด 68! สุดยอด!\""
80000037-11 = "อ่ะฮะฮะฮะ! ใช่มั้ยล่ะ?"
80000037-12 = "อืม... แต่ถ้าต่อสู้ชนะติดต่อกันมากเกินไปก็อาจจะยุ่งยากก็ได้นะ..."
80000037-13 = "ถ้าแนวโน้มของเราดีขึ้นเรื่อยๆ แบบนี้จนขึ้นระดับท็อปสตาร์จนไม่มีใครกล้าจ้างจะทำยังไงล่ะ?"
80000037-14 = "คติของเราคือหน่วยรับจ้างสารพัดที่เป็นมิตรและรับงานจ้างวานจากทุกคนตราบใดที่จ่ายเงินให้เรานะ"
80000037-15 = "จะกลายเป็นว่าพอตั้งใจทำงานมากขึ้นก็จะห่างเหินกับลูกค้ารายย่อยเรื่อยๆ น่ะสิ!"
80000037-16 = "อืม... การเลือกเดินบนเส้นทางของจอมวายร้ายนี่โหดร้ายจริงๆ เลยนะ"
80000037-17 = "อื้อ คงเป็นอย่างนั้นล่ะ! ฮุฮุฮุ!   "
80000037-18 = "ฮุฮุฮุฮุ..."
80000037-19 = "ฮุฮุ... เฮ้อ..."
80000037-21 = "(ปะ... เป็นยังไงล่ะ บรรยากาศเปลี่ยนไปเลย ตอนนี้คงเป็นโอกาสดีแล้วสินะ?!)"
80000037-22 = "อ่ะแฮ่ม! พูดชมกันเองแค่นี้ก็แล้วกัน..."
80000037-23 = "[s] \"พูดชมตัวเองเก่งเหมือนกันนะเนี่ย...\""
80000037-24 = "พะ...พูดอะไรแบบนั้นกันเล่า คุณครู! ฉันก็แค่พูดสร้างบรรยากาศเท่านั้นเอง!"
80000037-25 = "ยะ...ยังไงก็เถอะ! ฉันเตรียมของพิเศษมาให้คุณครูที่ทำงานหนักร่วมกับหน่วยรับจ้างสารพัดของเรา#nด้วยนะ"
80000037-30 = "[ns1] \"อ๊ะ ช็อกโกแลตสุดหรูนี่!\"\n[ns2] \"ของขวัญวันวาเลนไทน์เหรอ?\""
80000037-31 = "กะ...ก็ใช่น่ะสิ! แต่อย่าเข้าใจผิดนะ! นี่น่ะ เอ่อคือว่า..."
80000037-32 = "กะ...ก็ใช่น่ะสิ! แต่อย่าเข้าใจผิดนะ! นี่น่ะ เอ่อคือว่า..."
80000037-33 = "ชะ...ใช่แล้ว ขะ...ของขวัญชมเชยไง! "
80000037-34 = "นี่เป็นสะ... สะ...สะ... <สุดยอดช็อกโกแลต> ที่ฉันเตรียมไว้เป็นพิเศษให้คุณครูในเทศกาลวาเลนไทน์#nเลยนะ"
80000037-35 = "ฮุฮุ นี่น่ะหาซื้อในตลาดมืดยากมากๆ เลยนะ เพราะงั้นก็ดีใจให้มากๆ ด้วยล่ะ"
80000037-36 = "[s] \"ขอบคุณนะ อารุ!\""
80000037-37 = "มะ...ไม่เห็นต้องขอบคุณเลย ฉะ...ฉันคิดว่าถ้าเป็นคุณครูก็คงจะพูดตรงๆ แบบนั้นอยู่แล้วแท้ๆ แต่เจอของจริงมันก็แบบ..."
80000037-38 = "(ยะ...อยู่ใกล้มากๆ แบบนี้ ระ...รู้สึกเขินกว่าเดิมอีก...)"
80000037-39 = "[s] \"ว่าแต่อารุ... ที่บอกว่ามันเป็นสุดยอดช็อกโกแลตน่ะ...\""
80000037-40 = "หืม...?"
80000037-42 = "เร่เข้ามา! เข้ามาเลือกซื้อกันได้เลย! เราได้เตรียมสินค้าสุดพิเศษ <สุดยอดช็อกโกแลต> สำหรับวาเลนไทน์ไว้สำหรับทุกท่านแล้ว! "
80000037-44 = "ผลิตภัณฑ์ที่เพียงแค่เห็นก็สัมผัสได้ถึงความหรูหรา! ช็อกโกแลตที่ราคาสูงถึง 100,000 เยน"
80000037-45 = "แต่ช้าก่อน! แล้วมันเกิดอะไรขึ้นกันล่ะ สินค้าของเรามีจำนวนมากเนื่องจากเกิดข้อผิดพลาดในการ#nสั่งผลิต หากสั่งซื้อผ่านอินเทอร์เน็ตจะต้องจ่ายราคาเต็มโดยไม่รู้ตัว ทุกคนอย่าเผลอกดไปนะครับ!"
80000037-46 = "แต่สำหรับร้านของเราที่บริการลูกค้าด้วยความซื่อสัตย์และจริงใจ จะลดราคาให้ถึง#n95 เปอร์เซนต์จากราคาปกติ!"
80000037-47 = "โอกาสทองที่จะได้เพลิดเพลินกับช็อกโกแลตสุดหรูในราคาย่อมเยามาถึงแล้ว!"
80000037-48 = "ไม่มีการจำกัดการซื้อใดๆ เราขายอย่างเต็มที่ เชิญมาเลือกซื้อได้เลยครับ!"
80000037-49 = "คุณลูกค้าตรงนั้น สนใจรับสักกล่องมั้ยครับ?"
80000037-51 = "[ns] \"เขาว่าอย่างนั้นน่ะ...\""
80000037-52 = "ดะ...ดะ...เดี๋ยวก่อนสิ! เกิดอะไรขึ้นกันเนี่ย?!"
80000037-53 = "ฉันเสิร์ชในอินเทอร์เน็ตว่า \"อยากให้สุดยอดช็อกโกแลตเป็นของขวัญ มีแบรนด์ไหนบ้าง\" แล้วคำตอบที่ได้รับก็คือทุกคนแนะนำแบรนด์นี้กันทั้งหมด..."
80000037-54 = "ฉันก็เลยคิดว่าน่าจะซื้อให้เป็นของขวัญคุณครู..."
80000037-55 = "หลังจากคิดอยู่นาน ฉันก็ตัดใจซื้อมาเลยนะ...!!"
80000037-56 = "[s] \"อารุ ดูยังไงแบบนั้นมันก็ไวรัลมาร์เก็ตติ้งนะ...\""
80000037-57 = "บะ...แบบนี้มันหลอกลวงกันชัดๆ...!!"
80000037-58 = "[s3] \"อารุ ใจเย็นๆ ก่อน...\"\n[s4] \"นี่เป็นของขวัญที่อารุให้ เพราะงั้นมันมีความหมายมากเลยนะ\""
80000037-59 = "อะ...อื้อ งะ...งั้นเหรอ คุณค่าของสิ่งของ ก็คือผู้ที่ให้..."
80000037-60 = "อะ...อื้อ งะ...งั้นเหรอ คุณค่าของสิ่งของ ก็คือผู้ที่ให้..."
80000037-61 = "ที่สำคัญกว่าก็คือหัวใจของคนที่ให้และความรู้สึกขอบคุณของคนที่ได้รับสินะ..."
80000037-62 = "ฮุฮุ คุณครูพูดแบบนี้เพื่อฉันอีกแล้ว"
80000037-63 = "อืม... ถึงมันจะน่าเสียดาย แต่ถ้าคุณครูพูดแบบนั้นละก็... แค่นี้ก็พอแล้วล่ะ..."
80000037-64 = "ถึงจะรู้สึกไม่ดีนิดหน่อย แต่ซื้อมาแล้วก็คงเอาไปคืน..."
80000037-65 = "มะ..."
80000037-66 = "ไม่..."
80000037-67 = "ไม่ได้..."
80000037-68 = "ไม่ได้ซะที่ไหนกันเล่า!"
80000037-69 = "ไม่นะ! ไม่ได้! จะมองข้ามไปไม่ได้เด็ดขาด ฉันคงไม่ยกโทษให้ตัวเองแน่ๆ!"
80000037-73 = "ฮุฮุ... แค่คิดว่าจะปล่อยผ่านไปทั้งที่โดนทำแบบนี้... แค่คิดก็หงุดหงิดแล้ว! มันไม่ถูกต้องเลยสักนิด!"
80000037-74 = "ความเชื่อใจก็ต้องตอบแทนกันด้วยความเชื่อใจ! แต่ถ้าหากโดนหลอกลวงละก็ ต้องตอบแทนให้#nสาสมเลย! นั่นแหละคติของหน่วยรับจ้างสารพัดของเรา!"
80000037-75 = "[s] \"อ๊ะ มีคติใหม่อีกแล้วนะ\""
80000037-76 = "ฮุฮุฮุ... ก่อนอื่นก็ต้องหาตำแหน่งสำนักงานใหญ่จากเว็บไซต์ที่ขาย แล้วก็เริ่มจากบุกไปโจมตีที่นั่น..."
80000037-77 = "[s] \"นี่ อารุ...?\""
80000037-78 = "ดีล่ะ ฉันตัดสินใจแล้ว! เอาล่ะ คุณครู งานของหน่วยรับจ้างสารพัดยังไม่จบหรอกนะ"
80000037-79 = "ยังถือว่าไม่เสร็จงานจนกว่าจะกลับถึงสำนักงาน!"
80000037-80 = "เพราะงั้น... ช่วยไปกับฉันต่ออีกหน่อยได้มั้ย คุณครู?"
80000037-81 = "[s] \"ก็นะ... ถ้าอารุอยากให้ครูไปก็ช่วยไม่ได้นะ\""
80000037-82 = "ฮุฮุ ใช่! ต้องตอบแบบนี้แหละ สมกับเป็นคุณครูของฉันจริงๆ!"
80000037-83 = "เอาล่ะ คอยดูให้ดีๆ ก็แล้วกัน! จากนี้ไปฉันจะแสดงพลังของท่านอารุให้เห็นเอง!"
80000037-85 = "(หลังจากนั้นคุณครูกับอารุก็บุกตะลุยสร้างวีรกรรมตามเส้นทางของจอมวายร้ายขึ้นอีกครั้ง)"

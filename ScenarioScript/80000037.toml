[translation]
80000037-1 = "Unspoiled Rewards"
80000037-2 = "Aru and I were just leaving after taking care of a request made to Problem Solver 68."
80000037-3 = "Well done as always, Sensei."
80000037-4 = "[s] \"Same to you.\""
80000037-5 = "I was a little concerned at first, but we make for quite the dynamic duo."
80000037-6 = "The look on those troublemakers' faces when we arrived on the scene was priceless."
80000037-7 = "I can't get it out of my mind! ♪"
80000037-8 = "Our reputation is going to be through the roof after word of this latest job gets out!"
80000037-9 = "At this rate, every student at Gehenna—no, in all of Kivotos—will tremble when they hear Problem Solver 68's name!"
80000037-10 = "[s] \"Problem Solver 68...to the moon?!\""
80000037-11 = "Haha! That's right!"
80000037-12 = "Still, unchecked growth can be a detriment too."
80000037-13 = "What if our business rose to the point where we became unapproachable to the average person?"
80000037-14 = "We'll go wherever the money is and do any job. We've got your back,#nas long as you have our cash. That's how Problem Solver 68 rolls."
80000037-15 = "Intimidating or pricing out average folks would go against our mission!"
80000037-16 = "What a dilemma. The path of an outlaw is a lonely road, indeed."
80000037-17 = "But I wouldn't have it any other way!"
80000037-18 = "Heh heh heh."
80000037-19 = "Heh..."
80000037-21 = "(H-How was that? Did I sound really cool just then?#nDid I set the mood correctly?!)"
80000037-22 = "Well, I think that's enough bragging for one afternoon..."
80000037-23 = "[s] \"At least you're still self-aware.\""
80000037-24 = "Y-You don't have to put it like that, Sensei!#nI-I was trying to have a serious moment over here!"
80000037-25 = "A-Anyway. I've prepared something...special since you've been such a valuable business partner to Problem Solver 68."
80000037-30 = "[ns1] \"That's some expensive-looking chocolate!\"\n[ns2] \"Is this a Valentine's Day gift?\""
80000037-31 = "D-Don't get the wrong idea. I'm just, uh..."
80000037-32 = "D-Don't get the wrong idea. I'm just, uh..."
80000037-33 = "...repaying you for all of your hard work!"
80000037-34 = "I got this Finest Brand premium Valentine's Day chocolate just for you, Sensei.#nBecause of your hard work. Yeah, that's it."
80000037-35 = "Are you impressed? Chocolate this premium is hard to come by, even at the Black Market. Be sure to savor it."
80000037-36 = "[s] \"Thanks, Aru!\""
80000037-37 = "Y-You're very welcome. I thought you'd like it..."
80000037-38 = "(I'm having a tougher time keeping composed after hearing Sensei thank me than I thought I would...)"
80000037-39 = "[s] \"So about this Finest Brand Chocolate...\""
80000037-40 = "What about it?"
80000037-42 = "Come one, come all! Premium high-grade chocolate here!#n\nGet your Finest Brand Valentine's Day chocolate!"
80000037-44 = "Your eyes will want to unwrap this rich, luxurious chocolate the moment you see it! This premium chocolate normally fetches 100,000 yen or more."
80000037-45 = "But what's this? The company that produces it made a mistake, and now there's a surplus of this premium chocolate! Boxes are still being sold full price online, but don't be fooled!"
80000037-46 = "We're overflowing with so much stock that we're offering a generous 95-percent discount off the original price!"
80000037-47 = "This is your chance to enjoy luxurious, premium brand chocolate at rock-bottom prices!"
80000037-48 = "First come, first served! How many boxes would you like?#nJust one? Two? Maybe ten?!"
80000037-49 = "How about you? How many boxes would you like?"
80000037-51 = "[ns] \"See what I mean?\""
80000037-52 = "Wh-What the...?! What's going on here?"
80000037-53 = "I typed \"What's the best Valentine's Day chocolate\" into the internet,#nand the first result took me to a page selling this chocolate."
80000037-54 = "I thought it would make for the perfect present..."
80000037-55 = "...so I pulled the trigger and bought it at full price!"
80000037-56 = "[s] \"The first search result is always an ad, Aru...\""
80000037-57 = "How was I supposed to know that?!"
80000037-58 = "[s3] \"Calm down. Everyone falls for viral ads sometimes.\"\n[s4] \"I'm happy you got something for me regardless.\""
80000037-59 = "Y-You're right. Value is always relative, anyway..."
80000037-60 = "Y-You're right. Value is always relative, anyway..."
80000037-61 = "It's the thought that counts, as they say."
80000037-62 = "How could I forget something so simple?"
80000037-63 = "Being duped into wasting money is a shame, but life goes on."
80000037-64 = "What's done is done. No sense in living in the past."
80000037-65 = "Yeah, just have to move on..."
80000037-66 = "...and forget about..."
80000037-67 = "...all that money I spent."
80000037-68 = "NOOO! I REFUSE TO MOVE ON!"
80000037-69 = "I can't let something like this go! It's unacceptable!"
80000037-73 = "Heh. They're sorely mistaken if they think they can get away with this!"
80000037-74 = "\"Trust is met with trust! And there's hell to pay when you break that trust!\"#n That's the Problem Solver way!"
80000037-75 = "[s] \"I remember hearing the first half once, but not the second...\""
80000037-76 = "All I have to do is type in \"What's Finest Brand Chocolate's address\" into the internet and check the first result. Then I can begin planning my counterattack..."
80000037-77 = "[s] \"Um, Aru?\""
80000037-78 = "I've made up my mind, Sensei! We have more work to do!"
80000037-79 = "After all, a Problem Solver job is never done until you're back at the office."
80000037-80 = "You'll be coming with me, won't you, Sensei?"
80000037-81 = "[s] \"If that's what you want.\""
80000037-82 = "Heehee. That's my trusty business partner! ♪"
80000037-83 = "Now, then! Let's show them what a real outlaw can do!"
80000037-85 = "And so Aru and I got up to more hard-boiled high jinks, but that's a story for another time."

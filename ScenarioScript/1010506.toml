1010506-37 = "3;마리 아이돌;01;역시 바로 이해해 주시는군요. 감사합니다, 덕분에 어설픈 변명의 시간이 줄었어요."
1010506-38 = "3;마리 아이돌;01;사실 선생님께서는 어떻게 생각하실지 모르겠지만……."
1010506-39 = "3;마리 아이돌;99;나름대로 꽤……. 용기를 낸 거거든요, 지금 이 자리는."
1010506-40 = "3;마리 아이돌;01;그러니 선생님……. 스스로도 부끄러운 이런 이야기는 이제 그만 줄이고…….\n#3;em;…"
1010506-41 = "3;마리 아이돌;03;제가 이 자리에서, 선생님만을 위한 공연을 할 수 있도록……. 허락해 주시겠어요?"

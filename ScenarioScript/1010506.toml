[translation]
1010506-1 = "The Courage to be Different"
1010506-2 = " As Mari requested, I visited the Trinity cathedral after finishing work in the evening."
1010506-8 = "[ns1] \"...Mari?\"\n[ns2] \"Looks like no one's here...\""
1010506-11 = "...Oh, hello, Sensei."
1010506-12 = "Thank you for taking the time to come here."
1010506-13 = "...You seem surprised."
1010506-14 = "Was it a bit too abrupt...?"
1010506-15 = "I wasn't sure about calling you out here specifically..."
1010506-16 = "...but I didn't know if I could find another place."
1010506-17 = "...Ah, don't worry."
1010506-18 = "There's no one else here right now."
1010506-19 = "Just the two of us."
1010506-20 = "That's...why I made the request."
1010506-21 = "...Sensei?"
1010506-22 = "If you don't mind...would you accept it?"
1010506-23 = "So much has happened, leading up to this point."
1010506-24 = "And there are plenty of times when I wouldn't have made it without your help."
1010506-25 = "But, as we both know, I'm just a simple Sister of the cathedral."
1010506-26 = "There isn't much I can do...aside from praying for you."
1010506-27 = "...Well, there WASN'T much I could do."
1010506-28 = "People won't get to see this side of me forever. Maybe not even for long."
1010506-29 = "So I pushed for an opportunity like this."
1010506-30 = "When idols sing and perform in front of people, it's a service to them."
1010506-31 = "And it would be a service to you."
1010506-32 = "Let me offer you something other than prayers."
1010506-33 = "[s3] \"So that's why you called me over.\"\n[s4] \"A one-on-one guerilla concert. Nice.\""
1010506-36 = "...Heehee. "
1010506-37 = "I knew you'd get it. Thanks, now I don't have to make any more awkward excuses."
1010506-38 = "I'm not sure what you're going to think of this..."
1010506-39 = "...but I really had to work up the nerve to set it up."
1010506-40 = "So let's cut to the chase..."
1010506-41 = "...and with you as my audience, I'll hold this concert here and now."
1010506-42 = "Not as a Sister..."
1010506-46 = "...but as an idol."
1010506-48 = "There, in the empty cathedral, Mari put on a concert just for me."
1010506-49 = "She was nervous at first, but once she got going, she lit up the room. I almost felt guilty having that show all to myself."
1010506-52 = "After the concert, I walked her back to her room."
1010506-53 = "I-I didn't mean to trouble you this much..."
1010506-54 = "I'm really okay. You don't have to worry. You should head back and get some rest..."
1010506-55 = "...Hm? It's late, and you want to make sure I get home safely?"
1010506-56 = "I-I mean, it's not like I have to walk far..."
1010506-57 = "...and I feel like I'd owe you again..."
1010506-58 = "W-Well, I guess from your perspective, it's just the natural thing to do, right?"
1010506-59 = "...Huh."
1010506-60 = "From your perspective..."
1010506-64 = "...Heehee."
1010506-65 = "[s5] \"...Mari?\"\n[s6] \"What was that smile for...\""
1010506-68 = "Ah, I'm sorry. I didn't realize I was..."
1010506-69 = "I, um, I should have seen your perspective sooner."
1010506-70 = "That was thoughtless of me, I was only thinking about the situation in front of me..."
1010506-71 = "...I'm a lot of trouble, aren't I?"
1010506-72 = "..."
1010506-73 = "But still...I think I did pretty good."
1010506-74 = "It wasn't easy making this happen, taking this opportunity. I even had to get a little bit pushy."
1010506-75 = "But I think I learned a lot."
1010506-76 = "Tomorrow, I'll go back to my regular, pious life..."
1010506-77 = "...but not out of obligation, and not with any regrets."
1010506-78 = "I enjoy that life...and this one."
1010506-79 = "[s7] \"That's an excellent mindset.\"\n[s8] \"Then that's all you need.\""
1010506-82 = "Heehee..."
1010506-83 = "Once again, thank you so much for all of this, Sensei."
1010506-84 = "And..."
1010506-85 = "...please watch over Mari the Sister like you watched over Mari the Idol."

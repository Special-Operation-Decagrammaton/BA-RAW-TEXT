1010506-69 = "3;마리 아이돌;99;하긴 선생님의 입장이시라면, 당연히 그러시겠네요. 어쨌거나 이렇게 될 일이었던 걸까요."
1010506-70 = "3;마리 아이돌;08;저는 또 생각이 짧아서, 아까 전의 그 상황만 생각했던 거라……."

[translation]
1010506-1 = "偏離正軌的勇氣"
1010506-2 = " （完成工作後按照瑪麗所說，在傍晚時分來到了三一的教堂）"
1010506-8 = "[ns1]「……瑪麗？」\n[ns2] 「沒人在嗎……」"
1010506-11 = "……啊，老師，您來了呢。"
1010506-12 = "願意在百忙中前來……真的非常感謝。"
1010506-13 = "……您的表情似乎有點訝異呢。"
1010506-14 = "這個邀約果然還是太突然了嗎……？"
1010506-15 = "可是如果不這麼做的話……"
1010506-16 = "我恐怕就無法……借到這個場地了。"
1010506-17 = "……啊，您不必擔心。"
1010506-18 = "現在其他人都不在這裡。"
1010506-19 = "沒錯，現在這裡只有我跟老師兩個人。"
1010506-20 = "因為就是我……拜託他們這麼做的。"
1010506-21 = "……老師。"
1010506-22 = "如果可以的話……能請您接受我的心意嗎？"
1010506-23 = "不只是現在這個瞬間。#n這次的事情……還有先前的一切……"
1010506-24 = "都是多虧有老師的幫助才得以成立。"
1010506-25 = "不過就像您知道的一樣，我只是名平凡的修女。"
1010506-26 = "我能做的……就只有為您祈禱而已。"
1010506-27 = "……或者應該說「曾經」只能如此比較正確。"
1010506-28 = "當然我也很清楚，現在的偶像身份只是暫時的。"
1010506-29 = "不過正因如此，我才會任性地拜託大家，讓我為老師打造這個舞台。"
1010506-30 = "如果偶像在人們面前唱歌表演，是為了粉絲們的一種付出……"
1010506-31 = "而老師您也認同這點的話……"
1010506-32 = "那麼在一切落幕之前……除了祈禱以外，我應該還有一項能為老師做的事才對。"
1010506-33 = "[s3]「所以你才會特別準備這個舞台……」\n[s4]「也就是說，這是場祕密演唱會囉？」"
1010506-36 = "……呵呵。"
1010506-37 = "您一下就明白我的意思了呢。#n非常謝謝您，這樣我就不必花太多時間找拙劣的藉口了。"
1010506-38 = "雖然我無從得知老師心裡的想法……"
1010506-39 = "不過為了準備這場表演……我其實鼓起了很大的勇氣。"
1010506-40 = "所以老師……這些連我自己都覺得害羞的話就先說到這裡……"
1010506-41 = "請問您願意……讓我為您獻上只屬於您一人的表演嗎？"
1010506-42 = "不是以修女……"
1010506-46 = "……而是以一名偶像的身份。"
1010506-48 = "（隨後，在空無一人的教堂裡，安靜地欣賞著瑪麗的「表演」）"
1010506-49 = "（雖然瑪麗說得有點沒自信，但那場表演精彩到不禁讓人覺得一個人看有點可惜）"
1010506-52 = "（接著表演結束後，陪瑪麗一起走回了宿舍）"
1010506-53 = "我，我並不是要您這麼做才會……"
1010506-54 = "老師，我真的沒事的。#n您不必擔心，可以先回去沒關係……"
1010506-55 = "……嗯？現在很晚了，要陪我走到宿舍前才能放心？"
1010506-56 = "可，可是……其實也就在教堂裡而已……"
1010506-57 = "這樣我不就又在接受老師的幫助了嗎……"
1010506-58 = "雖，雖然站在老師的立場，這麼做好像也很正常……"
1010506-59 = "……咦。"
1010506-60 = "老師的立場……原來如此……"
1010506-64 = "……呵呵。"
1010506-65 = "[s5]「……瑪麗？」\n[s6]「怎麼了……？」"
1010506-68 = "啊，不好意思。#n我不知不覺就……"
1010506-69 = "從老師的立場來看，會這麼做也是當然的吧。#n也許事情打從一開始就注定會變成這樣了。"
1010506-70 = "都怪我想得太淺，沒有預料到後續的情況……"
1010506-71 = "……看來我總是會讓事情變得更複雜呢。"
1010506-72 = "…………"
1010506-73 = "不過……我還是覺得自己這麼做是正確的。"
1010506-74 = "例如鼓起勇氣為老師帶來剛才的表演……#n或者固執地想向老師表達感謝……"
1010506-75 = "也正因如此，我才能夠滿載而歸。"
1010506-76 = "雖然從明天開始，我就要回歸誠心祈禱的生活……"
1010506-77 = "但我並不覺得這麼做是出於責任感，更不覺得有留下任何遺憾。"
1010506-78 = "這兩種身份……都同樣令我感到滿足。"
1010506-79 = "[s7]「這樣的想法很了不起哦。」\n[s8]「嗯，這樣就夠了。」"
1010506-82 = "呵呵……"
1010506-83 = "請容我再次向您道謝。#n一直以來真的非常謝謝您，老師。"
1010506-84 = "此外……"
1010506-85 = "……從明天起，也要繼續請您多多指教了。"

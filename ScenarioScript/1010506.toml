[translation]
1010506-1 = "กล้าที่จะแตกต่าง"
1010506-2 = "(หลังจากทำงานเสร็จในตอนเย็น คุณครูก็ไปหามารีที่วิหารทรีนิตี้ตามนัด)"
1010506-8 = "[ns1] \"มารี...?\"\n[ns2] \"ไม่มีใครอยู่เหรอ...\""
1010506-11 = "อ๊ะ... คุณครู มาแล้วสินะคะ"
1010506-12 = "ขอบคุณที่สละเวลามานะคะ..."
1010506-13 = "ทำไมถึงทำหน้าตกใจล่ะคะ...?"
1010506-14 = "หรือว่ามันกะทันหันไปหน่อยคะ...?"
1010506-15 = "แต่ถ้าฉันไม่ทำแบบนี้"
1010506-16 = "ฉันก็คง... ใช้สถานที่นี้ไม่ได้ค่ะ"
1010506-17 = "อ้อ... ไม่มีอะไรต้องห่วงหรอกค่ะ"
1010506-18 = "ตอนนี้ไม่มีใครอยู่ค่ะ"
1010506-19 = "ใช่ค่ะ ตอนนี้ที่นี่มีแค่ฉันกับคุณครูค่ะ"
1010506-20 = "เพราะฉันอยากให้เป็นแบบนี้... ตั้งแต่แรกค่ะ"
1010506-21 = "คุณครูคะ..."
1010506-22 = "ถ้าไม่ว่าอะไร... คุณครูช่วยรับไว้ได้มั้ยคะ?"
1010506-23 = "ที่ฉันมาถึงจุดนี้ได้ ทั้งเรื่องนี้... และเรื่องที่เกิดก่อนหน้านี้ด้วย"
1010506-24 = "ฉันเชื่อว่าช่วงเวลามากมายเหล่านี้คงเกิดขึ้นไม่ได้ ถ้าฉันไม่ได้ความช่วยเหลือจากคุณครูค่ะ"
1010506-25 = "แต่อย่างที่คุณครูรู้ว่าฉันคือซิสเตอร์คนหนึ่งในวิหาร"
1010506-26 = "นอกจากการสวดอธิษฐานแล้ว... ฉันก็ทำอะไรมากกว่านี้ไม่ได้ค่ะ"
1010506-27 = "ที่จริงต้องบอกว่า... ถ้าเป็นแต่ก่อนฉันคงทำมากกว่าสวดอธิษฐานไม่ได้ค่ะ"
1010506-28 = "ฉันรู้ดีค่ะว่าฉันจะได้อยู่ในลุคนี้แค่ในช่วงสั้นๆ เท่านั้น"
1010506-29 = "และเพราะอย่างนั้น ฉันจึงขอให้คุณครูมาที่นี่แม้จะต้องลำบากเดินทางมาน่ะค่ะ"
1010506-30 = "ถ้าการร้องเพลงและการแสดงต่อหน้าผู้คนในฐานะไอดอลคือการกระทำเพื่อคนพวกนั้นละก็..."
1010506-31 = "ถ้าอย่างนั้นกับคุณครูเอง... ฉันก็คิดว่าไม่ต่างกันค่ะ"
1010506-32 = "เพราะก่อนที่ช่วงเวลาทั้งหมดนี้จะจบลง ฉันยังมีอย่างอื่นที่ทำให้คุณครูได้นอกเหนือจากการสวด#nอธิษฐานค่ะ"
1010506-33 = "[s3] \"ก็เลยเตรียมสถานที่แบบนี้ไว้ให้สินะ\"\n[s4] \"ครูจะได้ดูคอนเสิร์ตส่วนตัวสินะ\""
1010506-36 = "ฮุฮุ... "
1010506-37 = "เข้าใจได้ทันทีเลยนะคะ ขอบคุณค่ะ แบบนี้ฉันก็คงไม่ต้องเสียเวลาแก้ตัวให้มากกว่านี้แล้วค่ะ"
1010506-38 = "ฉันไม่รู้ว่าคุณครูจะคิดยังไง..."
1010506-39 = "แต่ว่าการมายืนตรงนี้... ฉันต้องรวบรวมความกล้ามากเลยนะคะ"
1010506-40 = "อีกอย่าง คุณครูคะ... หยุดพูดเรื่องที่ทำให้เขินอาย..."
1010506-41 = "และช่วยอนุญาตให้ฉัน... ทำการแสดงที่นี่เพื่อคุณครูเป็นการส่วนตัวได้มั้ยคะ?"
1010506-42 = "ไม่ใช่ในฐานะซิสเตอร์..."
1010506-46 = "แต่ในฐานะไอดอลคนหนึ่งค่ะ..."
1010506-48 = "(จากนั้นคุณครูก็ได้ชม <คอนเสิร์ตส่วนตัว> จากมารีในวิหารที่ไม่มีใครอยู่เลย)"
1010506-49 = "(มารีพูดเหมือนไม่มั่นใจในตัวเอง แต่การร้องเพลงของเธอก็ยอดเยี่ยมจนน่าเสียดายที่ได้ชมคนเดียว)"
1010506-52 = "(หลังจากจบการแสดง คุณครูก็คิดว่าจะเดินไปส่งมารีถึงที่ห้อง)"
1010506-53 = "ฉะ... ฉันไม่ได้ตั้งใจจะทำถึงขนาดนี้เลย..."
1010506-54 = "คุณครูคะ ฉันไม่เป็นไรหรอกค่ะ ไม่ต้องห่วงนะคะ กลับก่อนได้เลยค่ะ..."
1010506-55 = "คะ...? นี่ก็ดึกแล้ว คุณครูต้องเดินไปส่งฉันถึงที่พักก่อน ถึงจะวางใจได้เหรอคะ?"
1010506-56 = "ขะ... ขนาดนั้นเลย... แต่ยังไงที่พักก็อยู่ในวิหารนะคะ..."
1010506-57 = "แบบนี้ฉันก็ยิ่งเหมือนคนที่เอาแต่รับความช่วยเหลือจากคุณครูสิคะ..."
1010506-58 = "ถะ... ถ้ามองจากมุมมองของคุณครูแล้ว มันก็เป็นเรื่องปกติอยู่หรอกค่ะ..."
1010506-59 = "เอ๋..."
1010506-60 = "อย่างนี้... สินะคะ..."
1010506-64 = "ฮุฮุ..."
1010506-65 = "[s5] \"มารี...?\"\n[s6] \"หัวเราะอะไรเหรอ\""
1010506-68 = "อ๊ะ ขอโทษค่ะ ฉันเผลอหัวเราะไปจนได้..."
1010506-69 = "ถ้าคุณครูเป็นคนที่ต้องทำตามหน้าที่ละก็ ฉันก็ห้ามไม่ได้ค่ะ เป็นอย่างนี้ไปได้ยังไงคะเนี่ย?"
1010506-70 = "ฉันคิดน้อยไปหน่อยน่ะค่ะ จนถึงเมื่อกี้ฉันเอาแต่คิดถึงเรื่องอื่น..."
1010506-71 = "ฉันเป็นเด็กที่เอาแต่สร้างเรื่องนะคะเนี่ย"
1010506-72 = "..."
1010506-73 = "แต่ถึงยังไง... เหมือนฉันจะทำได้ดีเลยค่ะ"
1010506-74 = "ฉันเก่งมากที่รวบรวมความกล้ามาทำการแสดงต่อหน้าคุณครู... ถึงจะเป็นการกระทำของเด็กดื้อ แต่ก็เพราะฉันอยากขอบคุณคุณครูค่ะ"
1010506-75 = "ฉันรู้สึกเหมือนได้รับอะไรหลายๆ อย่างจากคุณครูเลยค่ะ"
1010506-76 = "ตั้งแต่พรุ่งนี้ไปฉันต้องกลับไปใช้ชีวิตเป็นซิสเตอร์คนเดิมแล้ว..."
1010506-77 = "แต่ฉันก็ไม่คิดว่านั่นคือหน้าที่ที่ไม่อยากทำ หรือว่าฉันเสียดายที่ต้องกลับไปทำหรอกนะคะ"
1010506-78 = "เพราะสำหรับฉันแล้ว... ทั้ง 2 อย่างก็เป็นงานที่ฉันชอบค่ะ"
1010506-79 = "[s7] \"มารีจิตใจดีมากเลยนะ\"\n[s8] \"ครูว่าเท่านี้ก็เพียงพอแล้วละ\""
1010506-82 = "ฮุฮุฮุ..."
1010506-83 = "ขอบคุณที่ช่วยเหลือไอดอลมารีมาตลอดนะคะ คุณครู"
1010506-84 = "แล้วก็..."
1010506-85 = "ตั้งแต่พรุ่งนี้ไป ซิสเตอร์มารีก็ต้องขอรบกวนด้วยนะคะ..."

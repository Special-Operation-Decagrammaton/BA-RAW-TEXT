1010506-16 = "3;마리 아이돌;13;이런 곳을……. 잡을 수 없을 것 같아서요.\n#3;stiff"
1010506-17 = "3;마리 아이돌;00;……아, 걱정하실 것 없답니다.\n#3;em;[반응]"
1010506-18 = "3;마리 아이돌;01;다른 분들은, 지금 안 계시니까요."
1010506-19 = "3;마리 아이돌;99;네. 지금 이곳에는 오직 선생님과 저만."
1010506-20 = "3;마리 아이돌;01;처음부터……. 그것을 위해 부탁드린 것이었어요.\n#3;em;…"
1010506-21 = "3;마리 아이돌;00;……선생님."
1010506-22 = "3;마리 아이돌;12;괜찮으시다면……. 받아 주시겠어요?\n#3;em;[///]"
1010506-23 = "3;마리 아이돌;99;지금의 이 순간이 있기까지, 이번 일……. 그리고 그 전의 모든 일들."
1010506-24 = "3;마리 아이돌;01;어느 하나 선생님의 도움 없이는 불가능했을 수많은 순간들이었다고 생각합니다."
1010506-25 = "3;마리 아이돌;04;하지만 아시다시피 저는 성당에 속한 일개의 시스터.\n#3;em;…"
1010506-26 = "3;마리 아이돌;06;기도를 드리는 것 정도밖에는……. 해 드릴 수 있는 게 없지요."
1010506-27 = "3;마리 아이돌;99;……없었지요, 정확히는.\n#3;em;[반응]"
1010506-28 = "3;마리 아이돌;01;물론 지금의 이 모습도 한시적인 것이라는 것도, 저는 너무나 잘 알고 있답니다."
1010506-29 = "3;마리 아이돌;01;그리고 그렇기 때문에, 이렇게 무리해서라도 선생님께 자리를 만들고자 부탁드린 거예요."
1010506-30 = "3;마리 아이돌;03;만일 아이돌로서 사람들 앞에 노래를 하고 공연을 하는 것이 그들을 위하는 무언가의 행위가 될 수 있다고 한다면."
1010506-31 = "3;마리 아이돌;01;그리고 선생님께서도……. 그것과 마찬가지라고 하신다면."
1010506-32 = "3;마리 아이돌;12;이 모든 것이 끝나기 전까지는, 저도 선생님께 해드릴 수 있는 게 기도 이외에 있는 것일 테니까요."
1010506-33 = "[s3] \"그래서 이런 자리를…….\"\n[s4] \"말하자면 게릴라 콘서트구나.\""

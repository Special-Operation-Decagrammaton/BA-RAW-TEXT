[translation]
1011903-1 = "傳達心意的方法"
1011903-2 = "（拜訪了百鬼夜行舉辦的巷弄商店街慶典）"
1011903-6 = "來哦來哦～要不要試試用我們店裡的特製醬汁炒的炒麵啊？也有御好燒唷！"
1011903-7 = "這裡有惠比壽山的正宗濃郁哈密瓜奶油麵包哦！"
1011903-8 = "歡迎品嘗知世大人大力推薦的特製棉花糖，保證讓你一試成主顧！"
1011903-12 = "健身落語部的表演即將在廣場舉行，歡迎大家一起來共襄盛舉。"
1011903-13 = "一段落語就能消耗500大卡，減肥效果絕佳唷！"
1011903-17 = "（欣賞著各種街頭美食與表演，不知不覺間已經到了傍晚）"
1011903-18 = "（慶典接近尾聲時，遇見了在巷弄後方整理物資的名草）"
1011903-23 = "啊，[USERNAME]老師，你來啦。"
1011903-24 = "今天的慶典玩得開心嗎？"
1011903-25 = "[s]「嗯，託你的福玩得很愉快。」"
1011903-29 = "[ns]「不過好像沒在慶典會場看到名草呢。」"
1011903-30 = "嗯。畢竟我一直在攤位裡面烤串燒、搬東西，幾乎沒有離開。"
1011903-31 = "不過看到客人們開心享用著我做的料理，今天也算是很有成就感的一天。"
1011903-32 = "正因為有大家在看不見的地方努力，這次的慶典才能順利結束吧。"
1011903-33 = "[s]「要是名草也能一起享受慶典就更好了……」"
1011903-37 = "哎呀～今天真的辛苦你了，百花繚亂的委員長大人！"
1011903-38 = "那個，我其實是百花繚亂的……"
1011903-39 = "嗯？不是委員長而是副委員長？沒關係啦，哈哈！#n總之如果沒有名草醬的話，今天可就糟了呢……"
1011903-40 = "之前負責烤肉的夥伴因為流感病倒的時候，#n我還擔心這次的生意是不是要泡湯了呢……"
1011903-41 = "多虧了名草醬的幫忙，才沒有讓遠道而來的客人失望。"
1011903-42 = "而且你的手藝好到完全不像第一次烤串燒耶。#n是有在哪裡學過嗎？"
1011903-44 = "這個嘛，可能是因為平時很常吃串燒的關係吧。"
1011903-45 = "不過還是沒辦法烤得像店裡那麼好，實在有點不好意思。"
1011903-46 = "哈哈！態度居然還這麼謙虛……真讓人喜歡！"
1011903-50 = "啊對了，我差點忘了說正事。"
1011903-51 = "等等我們會在店裡辦慶功宴。#n如果沒有其他安排的話，要不要一起來啊？"
1011903-52 = "準備了這麼久的慶典能順利結束，大家都很興奮！"
1011903-53 = "假如名草醬能來，氣氛一定會更熱鬧的。"
1011903-54 = "不過……我……"
1011903-58 = "……對不起。#n我今天已經有約了，所以恐怕沒辦法參加慶功宴。"
1011903-59 = "是嗎？那還真可惜，不過也沒辦法。"
1011903-60 = "下次有空的時候再來店裡吧，我會準備一大堆免費的烤雞串請你吃！"
1011903-61 = "嗯，我很期待。"
1011903-66 = "[ns]「你之後有什麼事嗎？」"
1011903-67 = "其實……並沒有什麼約定。"
1011903-68 = "我只是因為不太想去慶功宴，所以才說了謊。"
1011903-69 = "[s]「為什麼？有什麼地方讓你覺得不舒服嗎？」"
1011903-70 = "不，不是那樣的。#n我其實也很喜歡聚會那種熱鬧的氣氛。"
1011903-71 = "只是……我冷淡的氣質，好像跟那種歡樂的場合不太協調。"
1011903-72 = "而且我本來就不太會聊天，表情又比較平淡……經常會被別人誤會。"
1011903-73 = "我不是個擅長讓別人開心的人。"
1011903-74 = "大家正沉浸在溫暖的氣氛裡，我怕自己硬湊過去會破壞氣氛……所以才拒絕了。"
1011903-75 = "[s1]「我認為大家應該不會這麼想的哦。」\n[s2]「至少我跟名草在一起的時候覺得很開心。」"
1011903-77 = "！？"
1011903-78 = "可，可是……"
1011903-79 = "[s]「傳達心意並不需要什麼特別的技巧。」"
1011903-83 = "[ns3]「就算有點不擅表達、表情冷淡、偶爾被誤會……」\n[ns4]「只要帶著相同的心情，和誰都能度過快樂的時光。」"
1011903-88 = "……我明白了。"
1011903-89 = "老師，我可以先離開一下嗎？"
1011903-90 = "我想再去問問商店街的人，看看能不能參加慶功宴。"
1011903-91 = "[s]「嗯，路上小心。」"
1011903-94 = "（……於是名草踏著輕快的步伐，朝著熱鬧的街道跑去）"

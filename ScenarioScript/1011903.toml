[translation]
1011903-1 = "How to Express Your Feelings"
1011903-2 = "I ended up visiting the Market Alley festival at Hyakkiyako."
1011903-6 = "Try our special-sauce yakisoba! We also have okonomiyaki!"
1011903-7 = "Melon bread, filled with real Ebisu melon cream!"
1011903-8 = "Special cotton candy! Chise's favorite!"
1011903-12 = "The Rakugo Fitness Club will be holding a performance in the plaza soon. Come join us!"
1011903-13 = "A perfect chance to burn 500 calories with a single Rakugo session! Great for losing weight!"
1011903-17 = "I enjoyed various performances and street food. Before I knew it, it was already evening."
1011903-18 = "Just before closing time, I ran into Nagusa, who was organizing materials near the back of the festival grounds."
1011903-23 = "Ah, [USERNAME] Sensei. You're here."
1011903-24 = "Did you enjoy the festival?"
1011903-25 = "[s] \"Yeah, thanks to you, I had a fun time.\""
1011903-29 = "[ns] \"By the way, I didn't see you out there at all today.\""
1011903-30 = "You wouldn't have. I was so busy grilling skewers and moving things about, I hardly left the stall."
1011903-31 = "But it was worth it to see the customers enjoy the food I'd made for them."
1011903-32 = "Everyone worked their hardest today to make it all a success."
1011903-33 = "[s] \"Still, you deserved to enjoy it too.\""
1011903-37 = "Oh, my. Thank you for all your hard work today, Miss President!"
1011903-38 = "Uhm, I'm actually..."
1011903-39 = "Oh, are you the vice president? Well, regardless, we couldn't have done it without you. Would've been a disaster!"
1011903-40 = "When our grill volunteer called in sick, I thought we'd have to sit the whole festival out."
1011903-41 = "But thanks to you, we got to serve all kinds of customers."
1011903-42 = "And your culinary skills are amazing. You said it was your first time? Did you learn it from somewhere?"
1011903-44 = "I hadn't made skewers before, but I do enjoy eating them."
1011903-45 = "Honestly, mine weren't nearly as good as some others I've had. You have my apologies for that."
1011903-46 = "Haha! And you're humble on top of it all."
1011903-50 = "Oh, hey, I almost forgot to tell you..."
1011903-51 = "We're having an afterparty. If you don't have any plans, would you like to join us?"
1011903-52 = "Everyone's excited that it went so well today, after all the work we put into it."
1011903-53 = "It'd be even more fun with you there, Nagusa!"
1011903-54 = "In that case...I..."
1011903-58 = "...Oh, I'm sorry. I do have plans. I don't think I can make it."
1011903-59 = "You do? Ah, well, that's a shame."
1011903-60 = "In that case, please drop by our shop later when you can. The skewers are on us!"
1011903-61 = "I'll certainly look forward to that."
1011903-66 = "[ns] \"You have other plans?\""
1011903-67 = "Truthfully...no."
1011903-68 = "I lied. I simply didn't wish to attend the party."
1011903-69 = "[s] \"Why? Is there something bad going on?\""
1011903-70 = "No, not at all. In fact, I enjoy that sort of rowdy atmosphere."
1011903-71 = "But...my own rather cold demeanor is not the best fit for it."
1011903-72 = "I rarely know what to say, and people often misread my expressions and take my coldness personally."
1011903-73 = "When it comes to helping other people enjoy themselves, I'm...inexperienced at best."
1011903-74 = "In that kind of atmosphere, warm as it is, I would only lower the temperature. So I declined."
1011903-75 = "[s1] \"I don't think they'd see it that way.\"\n[s2] \"I enjoy being around you.\""
1011903-77 = "Hm?!"
1011903-78 = "B-But..."
1011903-79 = "[s] \"You don't need experience to express your feelings.\""
1011903-83 = "[ns3] \"Even if you're quiet or misunderstood...\"\n[ns4] \"...if you're all happy for the same reason, you'll get along.\""
1011903-88 = "...I hadn't thought of it that way."
1011903-89 = "Would you pardon me, Sensei?"
1011903-90 = "Let me catch up with them and ask if I can still join."
1011903-91 = "[s] \"Of course! Go for it. Enjoy!\""
1011903-94 = "With a bit of a spring in her step, Nagusa left and followed the laughter."

[translation]
1011903-1 = "วิธีถ่ายทอดความรู้สึก"
1011903-2 = "(คุณครูแวะไปเทศกาลตรอกการค้าที่จัดขึ้นในเฮียกคิยาโค...)"
1011903-6 = "เชิญชิมยากิโซบะซอสสูตรพิเศษของร้านเราเลยค่ะ โอโคโนะมิยากิก็มีนะคะ!"
1011903-7 = "ร้านเรามีขนมปังเมล่อนที่ใส่ครีมเมล่อนของแท้จากเอบิสุเลยนะครับ ครีมแน่นๆ เลยละ!"
1011903-8 = "ส่วนสายไหมสูตรพิเศษของร้านเรา ท่านชิเซะชิมแล้วถึงกับเอ่ยปากชมเลยละครับ มาชิมกันดูเลย!"
1011903-12 = "อีกสักครู่จะมีการแสดงจากชมรมฟิตเนสราคุโกะที่จัตุรัส ทุกคนมาชมกันด้วยนะคะ"
1011903-13 = "นี่คือโอกาสทองที่จะเผาผลาญ 500 กิโลแคลอรีจากราคุโกะแค่เซสชันเดียวเท่านั้น! แถมยังมีประโยชน์ต่อการไดเอตด้วยนะคะ"
1011903-17 = "(คุณครูเพลิดเพลินไปกับอาหารริมทางและการแสดงต่างๆ จนตกเย็น)"
1011903-18 = "(ในตอนที่งานเทศกาลกำลังจะจบลง คุณครูก็บังเอิญได้พบกับนางุสะที่กำลังเก็บอุปกรณ์อยู่ด้านหลัง#nตรอก)"
1011903-23 = "อ๊ะ คุณครู [USERNAME] มาจริงๆ ด้วยสินะ"
1011903-24 = "สนุกกับงานเทศกาลวันนี้หรือเปล่า?"
1011903-25 = "[s] \"อื้อ ครูได้มีช่วงเวลาที่สนุกเลยละ\""
1011903-29 = "[ns] \"จะว่าไป ครูไม่เห็นนางุสะในงานเลยนะ\""
1011903-30 = "อื้อ ฉันช่วยย่างอาหารเสียบไม้และขนของอยู่ในร้าน ก็เลยแทบไม่ได้ออกไปจากร้านเลยน่ะ"
1011903-31 = "แต่ก็ถือว่าเป็นวันที่คุ้มค่าเหนื่อย เพราะลูกค้าชื่นชอบอาหารที่ฉันทำ"
1011903-32 = "ต้องขอบคุณทุกคนที่พยายามแม้แต่ในที่ที่ไม่มีใครมองเห็น งานเทศกาลครั้งนี้ก็เลยจบลงได้อย่าง#nราบรื่นเลยละ"
1011903-33 = "[s] \"แต่ถ้านางุสะได้ออกมาสนุกกับงานด้วยก็น่าจะดีนะ...\""
1011903-37 = "เยี่ยมเลย~ วันนี้ทำได้ดีมากเลยละ หัวหน้าเฮียกกะเรียวรัน!"
1011903-38 = "เอ่อ ฉันเป็นแค่..."
1011903-39 = "หืม? หรือว่าไม่ได้เป็นหัวหน้า แต่เป็นรองหัวหน้างั้นเหรอ? แต่ก็เอาเถอะ ฮ่าฮ่า! เอาเป็นว่าถ้าไม่มี#nนางุสะจังละก็ เราคงไม่ได้ขายของกันแล้วละ...!"
1011903-40 = "คนที่รับหน้าที่ย่างเนื้อดันมาเป็นไข้หวัดใหญ่ก่อนวันงานไม่กี่วัน ฉันเลยกังวลแทบแย่ว่าต้องปิดร้านเลย#nหรือเปล่า..."
1011903-41 = "แต่พอได้นางุสะจังมาช่วย เราเลยต้อนรับลูกค้าที่เดินทางมาจากที่ไกลๆ ได้ แล้วพวกเขาก็ไม่ผิดหวัง#nด้วยนะ"
1011903-42 = "แถมนางุสะจังยังย่างอาหารเสียบไม้ได้ยอดเยี่ยม ทำเอาฉันแทบไม่อยากจะเชื่อเลยละที่บอกว่าเพิ่ง#nเคยทำเป็นครั้งแรก ไปฝึกมาจากไหนหรือเปล่าเนี่ย?"
1011903-44 = "ไม่รู้สิ คงเพราะปกติฉันกินอาหารเสียบไม้บ่อยๆ น่ะ"
1011903-45 = "ที่จริงฉันออกจะอายด้วยซ้ำที่ย่างได้ไม่ดีเท่าของร้านที่เคยกินมาก่อนหน้านี้"
1011903-46 = "ฮ่าฮ่า! ดูถ่อมตัวเข้าสิ... น่าเอ็นดูเสียจริงเชียว!"
1011903-50 = "อ๊ะ จริงสิ สติสตังฉันหายไปไหนแล้ว ฉันเกือบลืมบอกเรื่องนั้นไปเลย"
1011903-51 = "อีกเดี๋ยวเราจะจัดงานเลี้ยงฉลองส่งท้ายงานเทศกาลกันที่ร้านน่ะ ถ้าไม่ได้ติดธุระอะไรละก็ มาเลี้ยงฉลองด้วยกันสิ"
1011903-52 = "คงเพราะงานเทศกาลที่เตรียมตัวกันมานานจบลงได้ด้วยดี ทุกคนก็เลยดีใจกันใหญ่เลยละ!"
1011903-53 = "ถ้านางุสะจังมาด้วย บรรยากาศก็น่าจะสนุกขึ้นนะ"
1011903-54 = "ถ้างั้น... ฉันคงต้อง..."
1011903-58 = "ต้องขอโทษด้วยนะ... ฉันมีนัดก่อนหน้านี้แล้ว คงไปเลี้ยงฉลองด้วยไม่ได้น่ะ"
1011903-59 = "งั้นเหรอ? น่าเสียดาย แต่ก็ช่วยไม่ได้น่ะนะ"
1011903-60 = "ไว้คราวหน้าถ้ามีเวลาก็แวะมาที่ร้านล่ะ ฉันจะเตรียมยากิโทริไว้ให้เยอะๆ เลย ให้ฟรีด้วย!"
1011903-61 = "อื้อ แล้วฉันจะแวะไปนะ"
1011903-66 = "[ns] \"มีนัดอะไรหลังจากนี้ด้วยเหรอ?\""
1011903-67 = "ที่จริง... ฉันไม่มีนัดอะไรหรอก"
1011903-68 = "ฉันแค่โกหกเพราะฉันไม่อยากไปงานเลี้ยงน่ะ"
1011903-69 = "[s] \"ทำไมล่ะ? มีอะไรไม่สบายใจหรือเปล่า?\""
1011903-70 = "ไม่หรอก ไม่ใช่แบบนั้น ความจริงฉันชอบบรรยากาศที่คึกคักด้วยซ้ำ"
1011903-71 = "แต่ว่า... ความเย็นชาของฉันมันไม่เข้ากับการรวมตัวที่ทุกคนมาสนุกกัน"
1011903-72 = "ฉันทั้งพูดไม่เก่งและมีสีหน้าเรียบเฉย ก็เลยถูกเข้าใจผิดบ่อยๆ ว่าเป็นคนเย็นชา"
1011903-73 = "พอดีฉันไม่ถนัดเรื่องการทำให้คนอื่นสนุกน่ะ"
1011903-74 = "ฉันกลัวว่าในขณะที่ทุกคนกำลังดื่มด่ำกับบรรยากาศที่อบอุ่น ฉันจะเผลอไปทำให้งานกร่อยเข้า... ก็เลยปฏิเสธไปอย่างนั้น"
1011903-75 = "[s1] \"ครูว่าทุกคนไม่น่าจะคิดอย่างนั้นนะ\"\n[s2] \"แต่ครูสนุกเมื่ออยู่กับนางุสะนะ?\""
1011903-77 = "?!!"
1011903-78 = "ตะ... แต่ว่า..."
1011903-79 = "[s] \"การถ่ายทอดความรู้สึกไม่ต้องใช้พรสวรรค์อะไรมากหรอก\""
1011903-83 = "[ns3] \"ต่อให้จะถูกเข้าใจผิดว่าพูดน้อยหรือสีหน้าเรียบเฉยก็ไม่เป็นไร\"\n[ns4] \"ถ้าใจเราสนุก ไม่ว่าอยู่กับใครเราก็สนุกได้ทั้งนั้นละ\""
1011903-88 = "เข้าใจแล้ว..."
1011903-89 = "ขอโทษนะคุณครู แต่ฉันขอตัวสักเดี๋ยวได้มั้ย?"
1011903-90 = "ฉันจะไปถามคนในย่านการค้าว่าขอไปงานเลี้ยงฉลองด้วยจะได้หรือเปล่า"
1011903-91 = "[s] \"อื้อ ตัดสินใจดีแล้วละ\""
1011903-94 = "(แล้วนางุสะก็เดินไปตามถนนที่คึกคักด้วยความโล่งใจกว่าเดิม)"

1301102-23 = "[s] \"다크니스 스피릿4……?\""
1301102-24 = "3;모모이;03;응! 스피릿-라이크계 게임의 명작! 다크니스 시리즈의 최신작이야.\n#3;em;[반짝]\n#3;hophop"
1301102-25 = "3;모모이;00;이 게임의 매력은, 게임이 무지막지하게 어렵기로도 유명하지만!"
1301102-26 = "3;모모이;01;무엇보다 다크니스 시리즈는 시나리오적으로도 굉장히 독특한 작품이거든."
1301102-27 = "3;모모이;99;시나리오를 전면에 내세우지 않고, 어디까지나 여기저기 메모나 흔적 따위로 조사하게 만들어서…….\n#3;em;[재잘]"
1301102-28 = "3;모모이;99;유저로 하여금 세계관의 내러티브를 따라가며 파고들게 만드는 것이……."
1301102-29 = "[s5] \"으, 으응. 그렇구나…….\"\n[s6] \"유저가 흥미를 가지도록 유도한다는 거지?\""

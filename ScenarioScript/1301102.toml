[translation]
1301102-1 = "ชีวิตประจำวันของเกมเมอร์"
1301102-2 = "ชมรมพัฒนาเกม มิลเลเนียม"
1301102-4 = "[ns1] \"ครูมาหาตามที่บอกแล้ว\"\n[ns2] \"จะทำอะไรน่ะ?\""
1301102-5 = "อ๊ะ เชิญเลยคุณครู!"
1301102-6 = "อ๊ะ เชิญเลยคุณครู!"
1301102-7 = "อ่ะแฮ่ม! เรื่องที่จะให้ทำวันนี้ก็ไม่มีอะไรมาก"
1301102-8 = "แค่เรื่องการศึกษาน่ะ"
1301102-9 = "[s] \"การศึกษาเหรอ?\""
1301102-10 = "ฉันอยากเรียนเพิ่มเพื่อที่จะสร้างเกมสนุกๆ ได้"
1301102-11 = "สิ่งที่จำเป็นที่สุดในการสร้างเกมดีๆ..."
1301102-12 = "ฉันคิดว่ามันก็คือการที่เราจะต้องลองเล่นเกมหลากหลายรูปแบบ"
1301102-13 = "[s3] \"ฟังดูใช้ได้นะ\"\n[s4] \"พูดแบบนี้เพราะอยากเล่นเกมไม่ใช่รึไง?\""
1301102-14 = "ใช่มั้ยล่ะ? คุณครูก็คิดแบบนั้นใช่มั้ยล่ะ?!"
1301102-15 = "ฮุฮุ! ม่าย - ช่าย - สักหน่อย!"
1301102-16 = "คุณครูควรที่จะชื่นชมลูกศิษย์ที่มีความกระตือรือร้นที่จะเรียนรู้สิ!"
1301102-17 = "ฮึ่ม ชมรมพัฒนาเกมของเราเชี่ยวชาญด้านเกมเรโทร แต่ว่านะ.."
1301102-18 = "แต่ว่า... เราก็ควรที่จะเรียนรู้ให้เพิ่มมากขึ้นกว่านี้!"
1301102-19 = "เราควรลองเล่นเกมมาหลากหลายแนว และทลายกรอบความคิดสร้างสรรค์ให้กว้างขึ้น!"
1301102-20 = "เพราะงั้นฉันถึงเตรียมเกมนี้มายังไงล่ะ!"
1301102-23 = "[s] \"ดาร์กเนส สปิริต 4...?\""
1301102-24 = "อื้ม! ผลงานเกมที่เปี่ยมไปด้วยจิตวิญญาณ! เกมเวอร์ชั่นล่าสุดของดาร์กเนส สปิริต"
1301102-25 = "เสน่ห์ของเกมนี้ก็คือความยากระดับตำนานอันเลื่องลือ!"
1301102-26 = "ยิ่งกว่านั้นซีรีส์ดาร์กเนสเป็นผลงานที่มีเอกลักษณ์เฉพาะตัวในส่วนของเนื้อเรื่อง"
1301102-27 = "แทนที่จะเล่าเรื่องมาตรงๆ แต่เนื้อเรื่องจะดึงดูดให้เราเข้าไปเสาะหาชิ้นส่วนของเนื้อเรื่องทีละอย่าง..."
1301102-28 = "ทำให้ผู้เล่นติดตามเนื้อเรื่องและรู้สึกอยากติดตามเนื้อเรื่องที่ลึกมากขึ้น..."
1301102-29 = "[s5] \"อื้ม แบบนี้นี่เอง...\"\n[s6] \"หมายถึงดึงให้ผู้เล่นมาสนใจน่ะเหรอ?\""
1301102-30 = "อะไรกัน สีหน้าหวาดกลัวแบบนั้นน่ะ!"
1301102-31 = "แทนที่จะพูด มาลองทำเองเลยจะเร็วกว่านะ"
1301102-33 = "มาคอยดูอยู่ข้างๆ ฉันล่ะ คุณครู!"
1301102-34 = "โอ้! รู้อยู่แล้วนี่! คุณครู!"
1301102-35 = "อื้อ เราใช้เรื่องนั้นมาอ้างอิงได้อย่างแน่นอน"
1301102-37 = "คอยดูตอนฉันเล่นให้ดีล่ะ คุณครู!"
1301102-40 = "อ๊ะ ศัตรูตัวแรก!"
1301102-41 = "มะ...มันดูแข็งแกร่งมากเลย..."
1301102-42 = "แต่ฉันเตรียมโพชั่นมาเต็มกระเป๋าแล้ว ไม่มีศัตรูไหนที่น่ากลัวสำหรับฉันหรอก!"
1301102-43 = "เอานี่ไปกิน!"
1301102-45 = "(ปัง! ตุ้บ!)"
1301102-47 = "「YOU DIED」"
1301102-48 = "อ๊า! ฉันตายในการโจมตีเดียวเลยเหรอ?!"
1301102-49 = "ยะ... อย่าหัวเราะนะ! อีกรอบ! ขอลองอีกครั้ง!"
1301102-51 = "ฮุฮุฮุ... ครั้งนี้ไม่เหมือนเดิมแน่!"
1301102-52 = "หลบให้ถูกจังหวะ! ยะฮู้ว! ไงล่ะ!"
1301102-53 = "เอ๋! เดี๋ยวนะ?! พลังงานไม่พอ?!"
1301102-55 = "(ปัง! ตุ้บ!)"
1301102-57 = "「YOU DIED」"
1301102-58 = "อะไรเนี่ย! โธ่เอ๊ย!"
1301102-59 = "ฮึ่ยยย! ฉันไม่ยอมแพ้หรอกนะ!"
1301102-61 = "「YOU DIED」"
1301102-62 = "งะ... งือ..."
1301102-63 = "[s] \"นี่...โมโมอิ?\""
1301102-64 = "คุณครู... ตอนนี้ฉันมันก็แค่ไรน้ำตัวเล็กๆ... ไรน้ำตัวเล็กๆ ในทะเลกว้าง..."
1301102-65 = "ไรน้ำตัวเล็กๆ... ที่จัดการบอสตัวแรกก็ยังไม่ได้..."
1301102-66 = "เกมโอเวอร์มา 34 ครั้งแล้วนะ..."
1301102-67 = "ฉันไปต่อไม่ได้เลย! เกมนี้ตั้งค่าเริ่มต้นเป็นระดับยากรึยังไงเนี่ย?!"
1301102-68 = "เจ้าบอสนี่มัน... ค่าพลังไม่บาลานซ์เลย! มันแข็งแกร่งเกินไป!"
1301102-69 = "[s] \"งั้น... ให้ครูช่วยมั้ย?\""
1301102-70 = "...คุณครูจะช่วยเหรอ?"
1301102-71 = "[s] \"อาจช่วยไม่ได้มากแต่ครูจะลองดูนะ\""
1301102-72 = "อึ่ก... ให้คนอื่นมาเล่นแทนในด่านที่ฉันผ่านไม่ได้..."
1301102-73 = "แบบนั้นความภาคภูมิใจในฐานะเกมเมอร์ของฉันคงพังย่อยยับแน่...!"
1301102-74 = "แต่ยังไงฉันจะต้องผ่านไปให้ได้ เพื่อดูเนื้อเรื่องบทต่อไป...!"
1301102-76 = "เฮ้อ... ชะ... ช่วยไม่ได้ แค่ด่านนี้นะคุณครู!"
1301102-77 = "เพื่อการเรียนรู้! แค่ผ่านตรงนี้ให้ได้ก็พอนะ"
1301102-78 = "[s] \"อืม ได้สิ\""
1301102-82 = "(ฟิ้ว ปัง!)"
1301102-83 = "ว้าว...!"
1301102-84 = "ว้าวววว!!! คุณครูเอาชนะมันได้จริงๆ ด้วย สุดยอดดด!"
1301102-85 = "[s7] \"แค่นี้เอง ของกล้วยๆ\"\n[s8] \"งั้นโมโมอิลองอีกทีสิ...\""
1301102-86 = "อ๊ะ! คุณครูดูนี่สิ ตรงมุมนั้นมีกล่องสมบัติอยู่!"
1301102-87 = "อ๊ะ! คุณครูดูนี่สิ ตรงมุมนั้นมีกล่องสมบัติอยู่!"
1301102-88 = "[s] \"หืม? จริงด้วย\""
1301102-89 = "อ๊ะ! ศัตรูตัวใหม่! ใช้ธนูลอบยิงพวกเราเหมือนพวกขี้ขลาดเลยนะ!"
1301102-90 = "[s] \"โอ๊ะ?!\""
1301102-91 = "คุณครู! กำจัดมันเลย!"
1301102-93 = "ตรงนั้นแหล่ะ คุณครู! น่าจะมีทางลับซ่อนอยู่ในอุโมงค์นั่นนะ"
1301102-95 = "(เสียงเคี้ยว) มันฝรั่งแผ่นอบกรอบรสไข่ปลาอร่อยนะ คุณครูกินมั้ย?"
1301102-97 = "อ้าว? คุณครู! ระวัง! นั่นบอสตัวใหม่! มันอาจจะเป็นพวกที่ต้านทานไฟฟ้าก็ได้นะ!"
1301102-100 = "(เวลาผ่านไปพักใหญ่ คุณครูรู้สึกตัวอีกทีก็ตอนที่เล่นจนจบและเห็นรายชื่อทีมงานบนหน้าจอ)"
1301102-101 = "[ns] \"จบแล้วล่ะ...\""
1301102-102 = "สุดยอดเลย! เนื้อเรื่องมันสุดยอดมากเลย! ยอดในยอดเลยล่ะคุณครู!"
1301102-103 = "[s] \"สุดท้ายครูก็เล่นแทนโมโมอิจนจบเลย...\""
1301102-104 = "ว้าววว! สนุกสุดๆ เลย!"
1301102-105 = "การเล่นเกมคนเดียวก็สนุกเหมือนกันนะ แต่พอเล่นสองคนแล้วสนุกกว่าเยอะเลย!"
1301102-106 = "เอาละ ถ้างั้น..."
1301102-107 = "[s] \"ถ้างั้น...?\""
1301102-110 = "มาเริ่มเล่นรอบที่สองกันเถอะ คุณครู!"
1301102-111 = "บอกไว้ก่อนว่าของจริงน่ะ มันเริ่มตั้งแต่รอบที่สองต่างหาก!"
1301102-112 = "[s] \"...\""
1301102-115 = "(หลังจากนั้นคุณครูเลยเล่นเกมดาร์กเนส สปิริต 4 แทนโมโมอิจนจบ)"

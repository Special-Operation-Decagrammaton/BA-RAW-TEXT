[translation]
1301102-1 = "A Gamer's Day"
1301102-2 = "Millennium Game Development Department"
1301102-4 = "[ns1] \"I came because you called, but...\"\n[ns2] \"What are you up to?\""
1301102-5 = "Oh, welcome Sensei!"
1301102-6 = "Oh, welcome Sensei!"
1301102-7 = "Ahem! Today, I have no plans except..."
1301102-8 = "...studying."
1301102-9 = "[s] \"Studying?\""
1301102-10 = "That's right. I wanna study up so I can make more fun games."
1301102-11 = "The most essential form of study to make a good game is..."
1301102-12 = "Trying a wide variety of games, in my opinion."
1301102-13 = "[s3] \"Makes sense to me.\"\n[s4] \"You're just saying that because you wanna play games, right?\""
1301102-14 = "Right? Exactly."
1301102-15 = "Uh... N-No...!"
1301102-16 = "You should be praising your adorable student for how ambitious she is!"
1301102-17 = "I know, I know. Our Game Development Department specializes solely in retro games."
1301102-18 = "But, even so...that's why we should broaden our horizons!"
1301102-19 = "We should dig into all kinds of game genres and take our creativity as far as it can go!"
1301102-20 = "So, with that in mind, this is the game we prepared!"
1301102-23 = "[s] \"Dark Spirits 4...?\""
1301102-24 = "Yes! It's the latest game in the Spirits series, and the new pinnacle of the Spirits-like genre!"
1301102-25 = "The appeal of this game is its famously insane difficulty!"
1301102-26 = "Above all, the Dark Spirits series is very unique in how it tells its story."
1301102-27 = "Instead of explaining the story up front, it makes you examine notes and lore scattered across the world to piece it all together..."
1301102-28 = "It makes the player follow closely and dig deeper into the narrative and worldbuilding..."
1301102-29 = "[s5] \"O...kay.\"\n[s6] \"So that's what gets players interested?\""
1301102-30 = "Wh-What's with that expression?"
1301102-31 = "It'll be easier to show you than for me to explain it."
1301102-33 = "Now, watch this, Sensei!"
1301102-34 = "Oh! You know it, Sensei!"
1301102-35 = "Yes! You could definitely say that."
1301102-37 = "Sensei! Watch me closely as I play."
1301102-40 = "Oh, here's the first enemy!"
1301102-41 = "I-It looks really strong..."
1301102-42 = "But I just filled up my potion bottle at the well, so I'm not scared one bit!"
1301102-43 = "Take that!"
1301102-45 = "*thump* *flop*"
1301102-47 = "YOU DIED"
1301102-48 = "Aaaaaah?! I d-died in one hit?!"
1301102-49 = "N-No way! A-Again! One more try!"
1301102-51 = "Heeheehee... It'll be different this time!"
1301102-52 = "Dodged it just in time! Booyah! How's that?!"
1301102-53 = "Huh! Wait, not enough stamina?!"
1301102-55 = "*thump* *flop*"
1301102-57 = "YOU DIED"
1301102-58 = "What?! What is this?!"
1301102-59 = "Grrr! I won't give up!"
1301102-61 = "YOU DIED"
1301102-62 = "Uh, ugh..."
1301102-63 = "[s] \"Hey, Momoi?\""
1301102-64 = "Sensei. Right now, I'm just...a water flea... A tiny, insignificant water flea..."
1301102-65 = "A water flea... that can't even beat the first boss..."
1301102-66 = "This is my thirty-fourth game over..."
1301102-67 = "I can't make any progress! How does this game even work?!"
1301102-68 = "That son of a... Talk about unbalanced! It's too strong!"
1301102-69 = "[s] \"Hmm, need a little help?\""
1301102-70 = "...Sensei, you'll help me out?"
1301102-71 = "[s] \"I might not be too helpful, but I'll give it a try.\""
1301102-72 = "Ugh... Asking someone else to play something I can't even beat..."
1301102-73 = "That's a real blow to my pride as a gamer..."
1301102-74 = "But I have to get past this if I want to see the next part of the story..."
1301102-76 = "*sigh* I-I guess I have no choice... This part, just this part, Sensei!"
1301102-77 = "It's for research! Just beat this part for me, okay?"
1301102-78 = "[s] \"Yeah, sure.\""
1301102-82 = "*whoosh* *thump*"
1301102-83 = "Wow..."
1301102-84 = "Wow! You really defeated it! Amazing, Sensei!"
1301102-85 = "[s7] \"Well, that was nothing. It's easy.\"\n[s8] \"Now, Momoi, you should play...\""
1301102-86 = "Oh! Sensei, look over there in the corner! There's a treasure chest!"
1301102-87 = "Oh! Sensei, look over there in the corner! There's a treasure chest!"
1301102-88 = "[s] \"Huh? Oh, you're right.\""
1301102-89 = "Oh! It's a new enemy! This one is sniping us with arrows like a coward!"
1301102-90 = "[s] \"Oh?!\""
1301102-91 = "Sensei! Defeat it!"
1301102-93 = "Yeah, right there, Sensei! There must be a hidden passage in that tunnel."
1301102-95 = "*munch* *munch* *nom* *nom* Oh, these cod roe crackers are delicious. Would you like one, Sensei?"
1301102-97 = "Huh? Sensei! Be careful! It's a new boss! It's probably resistant to electricity!"
1301102-100 = "(Time passed, and at last, a long list of end credits scrolled on the TV.)"
1301102-101 = "[ns] \"I-It's finished...\""
1301102-102 = "It was really fascinating! A really fascinating story! Amazing, Sensei!"
1301102-103 = "[s] \"I took over for Momoi all the way to the end...\""
1301102-104 = "Wow! That was fun!"
1301102-105 = "Games are fun to play alone, but also fun to play together!"
1301102-106 = "Okay, then."
1301102-107 = "[s] \"Then?\""
1301102-110 = "Let's start round two right now, Sensei!"
1301102-111 = "By the way, this game takes the training wheels off the second time around!"
1301102-112 = "[s] \"...\""
1301102-115 = "(So, to help out Momoi, I played Dark Spirits 4 to the very end.)"

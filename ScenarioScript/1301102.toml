1301102-7 = "3;모모이;99;엣-헴! 오늘 하려는 건 딴 게 아니라."
1301102-8 = "3;모모이;01;공부야.\n#3;em;[반짝]"
1301102-9 = "[s] \"공부?\""
1301102-10 = "3;모모이;01;맞아. 보다 재미있는 게임을 만들기 위한 공부."
1301102-11 = "3;모모이;99;좋은 게임을 만들기 위해 가장 필요한 건"
1301102-12 = "3;모모이;01;뭐니 뭐니 해도 다양한 게임을 플레이해보는 거라고 생각해.\n#3;em;[음표]\n#3;greeting"
1301102-13 = "[s3] \"정론인 걸.\"\n[s4] \"그냥 게임이 하고 싶은 거 아냐?\""
1301102-14 = "3;모모이;03;그치? 선생님도 그렇게 생각하지?!\n#3;em;[반짝]\n#3;hophop"
1301102-15 = "3;모모이;04;우웃! 무-우스-은 소리야! \n#3;em;[땀]\n#3;stiff"
1301102-16 = "3;모모이;04;귀여운! 제자의 향상심을 칭찬해주지는 못할망정!\n#3;hophop"
1301102-17 = "3;모모이;01;칫칫. 우리 게임개발부가 레트로 게임 전문이긴 하지만."
1301102-18 = "3;모모이;99;아니……. 오히려 그렇기에 더욱 더!\n#3;em;…"
1301102-19 = "3;모모이;01;다양한 장르의 게임을 섭렵해 나가면서, 창작의 저변을 넓힐 필요가 있다는 말씀!"
1301102-20 = "3;모모이;00;그래서 준비한 게임이 바로 이거야!\n#3;em;[반짝]\n#3;greeting"

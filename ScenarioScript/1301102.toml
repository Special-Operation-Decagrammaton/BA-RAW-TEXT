[translation]
1301102-1 = "玩家的日常"
1301102-2 = "千年．遊戲開發部"
1301102-4 = "[ns1] 「總之還是過來了……」\n[ns2] 「要做些什麼呢？」"
1301102-5 = "啊，歡迎你來，老師！"
1301102-6 = "啊，歡迎你來，老師！"
1301102-7 = "今天要……！"
1301102-8 = "學習喔！"
1301102-9 = "[s] 「……學習？」"
1301102-10 = "沒錯。是為了做出更有趣遊戲的學習。"
1301102-11 = "做出好的遊戲需要的東西雖然有很多，"
1301102-12 = "但最重要的，就是必須要玩過各式各樣的遊戲。"
1301102-13 = "[s3] 「確實。」\n[s4] 「確定不是單純想玩遊戲而已嗎？」"
1301102-14 = "對吧，果然老師也是這麼想的吧！"
1301102-15 = "才，才不是那樣呢！"
1301102-16 = "偶爾誇獎一下可愛學生單純的上進心也沒關係的吧！"
1301102-17 = "總之，我們遊戲開發部雖然說是專精於懷舊遊戲，"
1301102-18 = "不，正是因為專精懷舊遊戲！"
1301102-19 = "有必要玩其他類型的遊戲，拓展創作的基礎！"
1301102-20 = "所以我準備好了這些遊戲！"
1301102-23 = "[s] 「《黑暗魂魄４》……？」"
1301102-24 = "嗯！是類魄作品的名作，黑暗魂魄系列的新作唷！"
1301102-25 = "雖然這個遊戲以誇張的難度聞名，"
1301102-26 = "但除此之外也有很多有魅力的地方，特別是這個系列的劇本相當講究。"
1301102-27 = "與其說是把故事演出來，不如說是在調查各地遺落的筆記或是痕跡的過程中，漸漸得知各種事情。"
1301102-28 = "該說是讓玩家在不知不覺之間了解故事中的世界，還是該說巧妙的引導了玩家呢……！"
1301102-29 = "[s5] 「是，是這樣啊……」\n[s6] 「很擅長讓玩家自然地融入遊戲世界裡呢。」"
1301102-30 = "反應好微妙！？"
1301102-31 = "好吧，百聞不如一見。"
1301102-33 = "來，在旁邊看吧，老師。"
1301102-34 = "哦，你這不是很懂嗎老師！"
1301102-35 = "嗯嗯！我也想好好學習這方面的設計呢。"
1301102-37 = "所以說，來旁邊看我玩吧，老師！"
1301102-40 = "啊，發現了第一個敵人！"
1301102-41 = "總覺得好像很強的樣子……"
1301102-42 = "但我事先已經準備好一堆藥水，不足畏懼！"
1301102-43 = "看招～！"
1301102-45 = "（咚！碰！）"
1301102-47 = "You Died"
1301102-48 = "咦咦咦咦！？一，一下就死了！？"
1301102-49 = "這肯定是有什麼Bug吧！？唔，再來一次！One More Chance！"
1301102-51 = "哼哼哼……同一招是沒用的唷！"
1301102-52 = "只要看好時機……迴避！成功！"
1301102-53 = "啊啊！等等！？耐力不夠了！？"
1301102-55 = "（咚！碰！）"
1301102-57 = "You Died"
1301102-58 = "騙人！？這會不會太困難了！？"
1301102-59 = "唔唔唔！別以為我會就這麼放棄！！"
1301102-61 = "You Died"
1301102-62 = "嗚，嗚嗚……"
1301102-63 = "[s] 「那個，桃井？」"
1301102-64 = "老師，現在的我比水蚤還不如……"
1301102-65 = "說是遊戲開發部，竟然連第一個敵人都打不贏……"
1301102-66 = "明明已經Game Over 34次了……"
1301102-67 = "還是完全不覺得打得贏！這個難度設定真的對嗎！？"
1301102-68 = "這個遊戲平衡肯定有問題吧！敵人太強了吧！？"
1301102-69 = "[s] 「我可以試試看嗎？」"
1301102-70 = "……咦，老師嗎？"
1301102-71 = "[s] 「雖然我也可能完全打不贏，不過還是想試試看呢。」"
1301102-72 = "嗚，在中途放棄交給別人這種事……"
1301102-73 = "我身為玩家的尊嚴……！"
1301102-74 = "可是，也不能一直卡在這裡……！"
1301102-76 = "……真，真沒辦法。只能讓你玩這裡唷，老師！？"
1301102-77 = "如果過關的話就要換我喔！"
1301102-78 = "[s] 「嗯，我知道了。」"
1301102-82 = "（碰……！唰！）"
1301102-83 = "哇……！"
1301102-84 = "好厲害！！！竟然真的打贏了！老師好厲害唷！"
1301102-85 = "[s7] 「也就這點程度吧。」\n[s8] 「那接下來就換桃井……」"
1301102-86 = "啊！老師看那邊！角落那邊有寶箱！"
1301102-87 = "啊！老師看那邊！角落那邊有寶箱！"
1301102-88 = "[s] 「咦？啊，真的耶。」"
1301102-89 = "快看，那邊有新的敵人過來了！啊，這次竟然射箭過來！？"
1301102-90 = "[s] 「咦，咦！？」"
1301102-91 = "老師！打倒他們吧！"
1301102-93 = "那裡，嗯，做的真好啊老師！那邊，那個岔路難道是隱藏道路？"
1301102-95 = "啊，這個新出的明太子口味真好吃。老師要吃洋芋片嗎？"
1301102-97 = "啊，老師！那個是不是Boss啊！？看起來好像有電擊耐性！"
1301102-100 = "（於是時間就這麼過去，回過神來螢幕上正撥放著壯觀的Ending畫面）"
1301102-101 = "[ns] 「結，結束了……」"
1301102-102 = "太棒了……！真是名符其實的優秀劇情！啊，老師也辛苦了！"
1301102-103 = "[s] 「結果不知道為什麼，就這麼幫忙玩到最後了……」"
1301102-104 = "哈啊～真有趣！"
1301102-105 = "一個人玩遊戲雖然也很開心，但和其他人一起玩也很棒呢！"
1301102-106 = "好的，那麼接下來。"
1301102-107 = "[s] 「……接下來？」"
1301102-110 = "來打第二輪吧，老師！"
1301102-111 = "這個遊戲第二輪才是真正的開始喔！"
1301102-112 = "[s] 「……」"
1301102-115 = "（就這樣代替桃井玩完了《黑暗魂魄４》的第二輪）"

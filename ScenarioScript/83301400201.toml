[translation]
83301400201-5 = "<ยุทธการออนเซ็นไข่ระเบิด!> ก็เป็นแผนการที่สุดยอดไม่น้อยนะ!"
83301400201-6 = "สายน้ำใต้ดินที่ไหลอยู่ใต้ห้องชมรมโภชนาการมีพลังพิเศษแฝงอยู่!"
83301400201-7 = "ถ้าได้ออกไปจากที่นี่ละก็ ฉันจะ...!"
83301400201-13 = "ถ้าเป็นอย่างนั้นจริงๆ ทางฉันก็จะใส่ให้สุดพลังเหมือนกัน จะไม่อ่อนข้อให้เลยละ"
83301400201-15 = "ฮะ... เฮือกกกก!!"

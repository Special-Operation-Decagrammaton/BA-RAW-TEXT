[translation]
80000032-1 = "多情多感的女孩"
80000032-2 = "哎呀哎呀，你來了呀……♡"
80000032-3 = "謝謝老師在百忙之中抽空過來。"
80000032-4 = "[s]「當然要來囉，畢竟是花子的請求呀。」"
80000032-5 = "哎呀，也就是說……只要是我的請求，無論什麼都能答應嗎？"
80000032-6 = "[s1]「『無論什麼』可能有點困難……」\n[s2]「在我能力所及的範圍……」"
80000032-7 = "原來如此原來如此……簡單來說，「只要拜託老師，老師都會盡力完成」對吧？"
80000032-8 = "原來如此原來如此……簡單來說，「只要拜託老師，老師都會盡力完成」對吧？"
80000032-12 = "真是令人高興，那我想拜託老師……♡"
80000032-17 = "哎呀？為什麼要後退呢？"
80000032-21 = "我想拜託老師的事情是……"
80000032-22 = "……可以請老師，收下我的禮物嗎？"
80000032-24 = "[s]「這個盒子……難道是自己做的？」"
80000032-25 = "是我一邊想著老師，第一次嘗試製作的……"
80000032-26 = "[s]「這樣啊。謝謝你，花子。」"
80000032-27 = "……"
80000032-28 = "總覺得有點害羞呢……"
80000032-29 = "[s]「花子竟然會害羞……」"
80000032-30 = "哎呀，老師一臉意外呢？我也是有羞恥心的唷？#n別看我這樣，我也是個纖細的女孩子呀。"
80000032-31 = "[s]「總覺得很抱歉……你說的對……」"
80000032-32 = "呵呵……那麼，我就先告辭了。啊，請在我不在的時候打開哦，不然我會害羞的。"
80000032-33 = "那……"
80000032-34 = "再見……"
80000032-38 = "（滿臉通紅的花子逃跑似地離開了）"
80000032-39 = "[ns]「差不多可以打開了吧……」"
80000032-41 = "[ns] 打開盒子"
80000032-44 = "[ns]「……」"
80000032-46 = "[ns]「我還有很多不了解的事呢……」"

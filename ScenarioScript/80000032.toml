[translation]
80000032-1 = "เด็กสาวที่เขินอาย"
80000032-2 = "ตายจริง ♡ มาแล้วเหรอคะคุณครู ฮุฮุ"
80000032-3 = "ขอบคุณที่สละเวลามาทั้งๆ ที่งานยุ่งนะคะ"
80000032-4 = "[s] \"ก็ฮานาโกะขอร้องทั้งทีนี่นา\""
80000032-5 = "หืม? ถ้าอย่างนั้น... คุณครูจะรับฟังคำขอร้องจากฉันทุกเรื่องเลยใช่มั้ยคะ? "
80000032-6 = "[s1] \"ไม่ใช่ทุกเรื่องสักหน่อย...\"\n[s2] \"ถ้าคำขอที่มากเกินไปก็ไม่ได้หรอก...\""
80000032-7 = "ถึงจะไม่ใช่ทุกเรื่อง... แต่ถ้าเป็นคำขอร้อง คุณครูก็จะยอมรับฟังใช่มั้ยคะ?"
80000032-8 = "ถึงจะไม่ใช่ทุกเรื่อง... แต่ถ้าเป็นคำขอร้อง คุณครูก็จะยอมรับฟังใช่มั้ยคะ?"
80000032-12 = "ดีใจจังเลยค่ะ♡ ฮุฮุฮุ คำขอของฉันก็คือ..."
80000032-17 = "อุ๊ยตายจริง? ไม่ต้องถอยไปขนาดนั้นก็ได้ค่ะ"
80000032-21 = "คำขอของฉันก็คือ..."
80000032-22 = "ช่วยรับสิ่งนี้ไปได้รึเปล่าคะ? ของขวัญจากฉันค่ะ"
80000032-24 = "[s] \"กล่องของขวัญ...?\""
80000032-25 = "ถึงฉันจะเพิ่งเคยทำเป็นครั้งแรก... แต่ก็ทำขึ้นมาเพราะอยากให้คุณครู..."
80000032-26 = "[s] \"แบบนี้นี่เอง ขอบคุณมากนะ ฮานาโกะ\""
80000032-27 = "..."
80000032-28 = "คือ... ฉันรู้สึก... เขินนิดหน่อยน่ะค่ะ แหะๆ"
80000032-29 = "[s] \"ฮานาโกะเขินงั้นเหรอ?!\""
80000032-30 = "แหม... ฉันเองก็เขินเป็นเหมือนกันนะคะ เห็นแบบนี้ฉันก็เป็นเด็กสาวผู้แสนอ่อนไหวค่ะ"
80000032-31 = "[s] \"ขอโทษที... ครูไม่ได้หมายความว่าอย่างนั้นนะ...\""
80000032-32 = "ฮุฮุฮุ ถ้างั้นฉันขอตัวก่อน อ๊ะ อย่าเพิ่งแกะของขวัญนะคะ รอให้ฉันไปก่อนแล้วค่อยแกะดูเถอะค่ะ!"
80000032-33 = "ถะ...ถ้าอย่างนั้น..."
80000032-34 = "ไว้พบกันใหม่นะคะ..."
80000032-38 = "(แล้วฮานาโกะที่ดูมีสีหน้าเขินอายก็วิ่งหายไปอย่างรวดเร็ว)"
80000032-39 = "[ns] \"อืม ถ้างั้น...\""
80000032-41 = "[ns] แกะห่อของขวัญ"
80000032-44 = "[ns] \"....\""
80000032-46 = "[ns] \"มีแต่เรื่องที่ไม่เข้าใจทั้งนั้นเลยแฮะ...\""

[translation]
1600405-1 = "無止盡的夜晚"
1600405-2 = "老師！這裡這裡！"
1600405-3 = "嘿嘿，你願意來真是太好了！託你的福，菲娜現在超開心的！"
1600405-4 = "……感覺老師好像不是很興奮耶？"
1600405-5 = "難道，你明明很忙卻還是勉強過來嗎？我連票都已經買好了，現在突然有點擔心……"
1600405-6 = "[s1] 「沒有勉強喔，今天正好是休息日。我很期待。」\n[s2] 「偷懶最快樂了呢。」"
1600405-7 = "這樣啊，那真是太好了！我本來還很擔心的！"
1600405-8 = "呃……沒，沒問題嗎！？"
1600405-9 = "沒問題的話就好……總之！"
1600405-10 = "既然老師都來了，不玩得開心可不行喔！"
1600405-11 = "雖然有句話說「電影會選擇適合的觀眾」，但老師不用擔心！我今天可不只準備一部電影！"
1600405-12 = "今天的電影可是有21部！總會有一部是老師喜歡的對吧！"
1600405-13 = "哼哼，我知道老師想說什麼。「明明只有兩張票，為什麼是21部電影呢……？」"
1600405-14 = "那是因為這張票可不是一般的票……"
1600405-16 = "而是「接力放映會」的票！！Hoooo！！"
1600405-17 = "[s] 「接力放映會？」"
1600405-18 = "顧名思義，就是像接棒一樣一部接著一部放映電影的活動。"
1600405-19 = "為了滿足熱愛電影的粉絲，讓題材相似的電影輪番上映！"
1600405-20 = "而我們要看的，當然就是任俠電影接力囉！！"
1600405-21 = "來，要沒時間了！首先從第一部開始，Here we go！！"
1600405-23 = "（被菲娜抓著手，就這樣被帶進了戲院）"
1600405-24 = "（電影的內容還不錯。但儘管是任俠電影，卻還是把華麗的暴力場面剪掉了）"
1600405-25 = "（雖然有點可惜，不過這應該是考慮到讓學生也能開心地觀看吧。）"
1600405-27 = "太棒了……"
1600405-28 = "真是部好電影對吧……頭兒……不對是老師……不對……頭兒……"
1600405-29 = "抱歉我有點混亂了，老師……"
1600405-30 = "老師覺得電影怎麼樣呢？有趣嗎？"
1600405-31 = "[s] 「……現在就叫我頭兒吧。」"
1600405-32 = "……！！"
1600405-33 = "可，可以嗎……！頭兒……！"
1600405-34 = "遵命！頭兒！我們趕緊去看下一部吧！"
1600405-35 = "下一部是《不仁不義的喵喵拳》！！"
1600405-37 = "（之後的電影也都很棒）"
1600405-38 = "（時而抒情，時而激情地描繪著任俠電影的內斂帥氣和硬派氛圍）"
1600405-39 = "（……）"
1600405-40 = "（話雖如此……）"
1600405-42 = "咻……！這部電影也超棒的對吧！老師……頭兒！"
1600405-43 = "那麼接著看下一部吧……！"
1600405-45 = "（就算是再怎麼棒的電影，連續看21部類似的題材的話……）"
1600405-46 = "（而且還一直被一旁的學生搭話讓人無法入睡，從中途開始就一直看著類似的情節……）"
1600405-48 = "呼……！就是這個……！接著下一部是……！"
1600405-50 = "（……對於一般的人類來說……）"
1600405-52 = "Amazing，真是棒的無話可說……"
1600405-54 = "（這簡直就是拷問……）"
1600405-56 = "太太太太太太"
1600405-58 = "棒……！"
1600405-60 = "了！！！！"
1600405-62 = "（看到最後一部電影時，不知不覺就失去了意識）"
1600405-63 = "（等到回過神來，人已經在電影院外的河邊了）"
1600405-65 = "……師？"
1600405-66 = "老師……？你醒過來了嗎……？"
1600405-67 = "[s3] 「這是哪……我是誰……？」\n[s4] 「平安的回來了嗎。我們的位置在……」"
1600405-68 = "啊，啊啊……！"
1600405-69 = "啊，啊啊……！"
1600405-70 = "快，快醒醒啊老師！不要迷失了自己啊！是我不好！"
1600405-71 = "真對不起……我沒想到竟然會變成這樣……"
1600405-72 = "我有連續好幾天不分晝夜看任俠電影的習慣……以為老師也沒問題……"
1600405-73 = "是菲娜的錯……真的很抱歉……"
1600405-74 = "以後我不會再找老師看電影了……"
1600405-75 = "嗚嗚……嗚嗚……"
1600405-76 = "[s5] 「沒事的，別在意。」\n[s6] 「……辛苦你了。」"
1600405-77 = "……？"
1600405-78 = "……？"
1600405-79 = "這，這是什麼意思……？"
1600405-80 = "就算你這麼說……"
1600405-81 = "你沒有失去意識……只是小睡一下而已？"
1600405-82 = "……這，這怎麼可能……怎麼看都像是昏過去了……"
1600405-83 = "……「我可是頭兒喔」？"
1600405-84 = "是，是！這我當然知道！我沒有頂嘴的意思……！當然不是！我怎麼可能這樣對頭兒呢！"
1600405-85 = "失禮了！頭兒只是小睡一下而已！是我搞錯了！"
1600405-86 = "但是我……！"
1600405-87 = "……"
1600405-88 = "……噗！"
1600405-89 = "啊哈哈哈哈哈！！"
1600405-90 = "啊──笑到眼淚都快流出來了！啊哈哈哈哈！"
1600405-91 = "啊哈，哈──……呼，老師真的是……"
1600405-92 = "……"
1600405-93 = "……非常感謝，老師。老師總是護著我，為了菲娜做了很多事。"
1600405-94 = "不管是今天還是以前……我該怎麼樣報答老師才好呢……"
1600405-95 = "我從老師身上也感受到了任俠。和我的有點不一樣，特別的溫暖、溫柔……"
1600405-96 = "就像是，要抱住菲娜一樣……"
1600405-97 = "就是那樣的仁義……嗯，我是這麼覺得的。"
1600405-98 = "……嘿嘿。"
1600405-100 = "（在那之後和菲娜一起討論了一下那天看的電影）"
1600405-101 = "（接著約好下次不要再接力看，而是去普通的電影院看電影）"

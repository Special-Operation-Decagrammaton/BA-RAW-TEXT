[translation]
1600405-1 = "Endless Night"
1600405-2 = "Oh, Sensei! Over here!"
1600405-3 = "I'm so glad to see you!"
1600405-4 = "Hmm..."
1600405-5 = "I hope I'm not bothering you. I feel a little guilty that I get clingy sometimes..."
1600405-6 = "[s1] \"It's my day off, so don't worry.\"\n[s2] \"Playing hooky can be fun sometimes.\""
1600405-7 = "Oh, thank goodness! You had me worried!"
1600405-8 = "Sensei! Should someone in your position be saying that?!"
1600405-9 = "Well, regardless."
1600405-10 = "Now that you're here, I want to make sure you have fun!"
1600405-11 = "And to put your mind at ease: No, we're not going to see only one movie today."
1600405-12 = "We have 21 movies to marathon through! You're bound to enjoy at least one of them!"
1600405-13 = "Heh. You look surprised. How can we watch 21 movies with only two tickets, you may ask?"
1600405-14 = "These aren't just any movies tickets..."
1600405-16 = "Drum roll, please... These are binge passes! Ta-da!"
1600405-17 = "[s] \"Binge passes? That's a thing?\""
1600405-18 = "I knew you'd be surprised. They have events where they screen a bunch of movies one after the other."
1600405-19 = "It's a great way for people who love movies to see a bunch of films of the same genre!"
1600405-20 = "And it goes without saying that the movies we'll be binging are all mobster and noir films!"
1600405-21 = "Hurry! There's no time! We have to make it to the first movie! Let's go!"
1600405-23 = "Pina grabbed my hand and dragged me into the theater."
1600405-24 = "(Surprisingly, the first movie wasn't too bad. All the violent scenes were tastefully edited.)"
1600405-25 = "(It wasn't exactly a masterpiece, but it was good enough to keep the audience entertained.)"
1600405-27 = "Wow. That was..."
1600405-28 = "...an amazing movie! Boss—I mean, Sensei! Er, I mean, Boss..."
1600405-29 = "N-No, it's Sensei. Right? Sensei... Sorry."
1600405-30 = "What did you think? Did you like it?"
1600405-31 = "[s] \"You know what? You can call me Boss from now on.\""
1600405-32 = "...!"
1600405-33 = "R-Really?! You mean it, Boss?!"
1600405-34 = "Okay! Whatever you say, Boss! Let's go straight to the next movie!"
1600405-35 = "The second movie is called Loyal Cat's Fist!"
1600405-37 = "(Every movie that followed was incredible.)"
1600405-38 = "(All of them were suitably hard-boiled, sometimes lyrical and sometimes passionate.)"
1600405-39 = "(...)"
1600405-40 = "(But...)"
1600405-42 = "Wow! That was amazing, Sens—I mean, Boss!"
1600405-43 = "Then, let's watch the next movie!"
1600405-45 = "(It doesn't matter how great the movies are. When you watch 21 films of the same genre all in a row...)"
1600405-46 = "(...and there's someone chattering away in your ear nonstop and keeping you awake the entire time...)"
1600405-48 = "*gasp* This is the one I've been waiting for! The next movie is...!"
1600405-50 = "(...most people...)"
1600405-52 = "No way!"
1600405-54 = "(...would consider that a form of torture.)"
1600405-56 = "Simply."
1600405-58 = "Amazing."
1600405-60 = "Don't you agree?"
1600405-62 = "(I must have fainted during the 21st and final movie.)"
1600405-63 = "When I came to, I was on a grassy riverside outside the theater."
1600405-65 = "..."
1600405-66 = "S-Sensei...? Are you okay?"
1600405-67 = "[s3] \"Where am I? Who am I?\"\n[s4] \"Is this...the real world?\""
1600405-68 = "O-Oh, no!"
1600405-69 = "O-Oh, no!"
1600405-70 = "Come on, Sensei! Stay with me! I'm so sorry!"
1600405-71 = "*whimper* I'm so sorry... I was afraid of this happening."
1600405-72 = "I'm used to watching mobster movies for days on end... I didn't consider how hard it might be for you."
1600405-73 = "This is all my fault. Please forgive me."
1600405-74 = "I won't ask you to watch movies with me anymore..."
1600405-75 = "*sniffle* *sob*"
1600405-76 = "[s5] \"It's okay. Don't worry about it.\"\n[s6] \"What happened to calling me Boss?\""
1600405-77 = "...?"
1600405-78 = "...?"
1600405-79 = "Huh? Are you sure?"
1600405-80 = "Shouldn't I be worried about you?"
1600405-81 = "You didn't faint... You just fell asleep?"
1600405-82 = "That doesn't sound right... I could have sworn you were out cold."
1600405-83 = "Excuse me?"
1600405-84 = "No...talking back? Of course not! I would never talk back to you, Boss!"
1600405-85 = "Everything you say is right. You must have fallen asleep! I must have been mistaken!"
1600405-86 = "Still, I-I..."
1600405-87 = "..."
1600405-88 = "Heehee."
1600405-89 = "Wahahahaha! Ahhh!"
1600405-90 = "Haha! I'm crying. I'm really crying! Hahahaha!"
1600405-91 = "Haha...ha... My goodness!"
1600405-92 = "..."
1600405-93 = "Thank you, Sensei. You're always so kind to me."
1600405-94 = "Even though I make you put up with so much... I don't know how to repay you."
1600405-95 = "It's hard to explain, but the gangster spirit I sense from you is different from mine. It's very warm and tender..."
1600405-96 = "There's something unique about you that's comforting and inspires trust."
1600405-97 = "That's the righteousness I sense from you...and I would never lie."
1600405-98 = "Heehee."
1600405-100 = "(Afterward, Pina and I spent a long time talking about the movies we had seen that day.)"
1600405-101 = "(And we also promised that next time, we'd go see a single movie together rather than a marathon.)"

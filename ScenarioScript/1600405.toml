[translation]
1600405-1 = "ค่ำคืนที่แสนยาวนาน"
1600405-2 = "โอ้! คุณครู! ทางนี้ค่ะ ทางนี้!"
1600405-3 = "ฮิฮิ คุณครูออกมาหาฉันจริงด้วย! ดีใจที่ได้เจอนะคะ!"
1600405-4 = "... อืม~"
1600405-5 = "ไม่ใช่ว่าคุณครูจำใจออกมาทั้งๆ ที่งานเยอะใช่ไหมคะ? จู่ๆ ฉันก็รู้สึกผิดขึ้นมาน่ะค่ะ#nที่ซื้อตั๋วหนังโดยไม่ได้ถามก่อน..."
1600405-6 = "[s1] \"ไม่ต้องห่วง วันนี้เป็นวันหยุดครูพอดี\"\n[s2] \"คนเราก็ต้องมีขี้เกียจทำงานกันบ้างสิ\""
1600405-7 = "จริงเหรอคะ? โล่งอกไปที ก่อนคุณครูจะมาถึง ฉันกังวลมากเลยล่ะค่ะ"
1600405-8 = "เอ๋? ทำแบบนี้ก็ได้เหรอคะคุณครู?"
1600405-9 = "อะ... เอาเป็นว่า!"
1600405-10 = "ไหนๆ ฉันก็เรียกคุณครูออกมาแล้ว วันนี้ฉันจะทำให้คุณครูสนุกเองค่ะ!"
1600405-11 = "สนุกจนลืมงานไปเลยล่ะ! เพราะวันนี้เราจะไม่ได้ดูหนังแค่เรื่องเดียวค่ะ!"
1600405-12 = "เราจะดูมาราธอนกัน 21 เรื่องเลย! หนึ่งในนั้นต้องมีที่คุณครูชอบบ้างล่ะค่ะ! ฉันว่านะ... ฮิฮิ"
1600405-13 = "ทำไมทำหน้าตกใจอย่างนั้นล่ะคะ? สงสัยใช่ไหมคะว่าตั๋วแค่ 2 ใบ จะดูตั้ง 21 เรื่องได้ไง?"
1600405-14 = "ก็เพราะว่าตั๋วนี้ไม่ใช่ตั๋วธรรมดา..."
1600405-16 = "แต่เป็นบัตร <งานดูหนังมาราธอน> ยังไงล่ะ!! เยี่ยมไปเลยใช่ไหมคะ?!"
1600405-17 = "[s] \"งานดูหนังมาราธอน?\""
1600405-18 = "ฮุฮุ คิดไว้แล้วเชียวว่าคุณครูต้องตกใจ พอดีว่าตอนนี้มีกิจกรรมฉายหนังแบบ Non-Stop น่ะค่ะ!"
1600405-19 = "เป็นกิจกรรมที่ฉายหนังประเภทเดียวกันติดต่อกันสำหรับคนที่รักในการดูหนัง!"
1600405-20 = "และที่พีน่าจะดูก็คือหนังประเภทฮีโร่และฟิล์มนัวร์!!"
1600405-21 = "รีบๆ เถอะค่ะ! เราไม่มีเวลาแล้ว! ไปดูหนังเรื่องแรกกันเลย! Let's go!!"
1600405-23 = "(พีน่ารีบจับมือแล้วลากเข้าไปในโรงหนัง)"
1600405-24 = "(เนื้อหาของหนังฮีโร่ที่พีน่าชอบไม่ได้แย่อย่างที่คิด และฉากต่อสู้ก็ไม่ได้ออกมารุนแรงมากเกินไป)"
1600405-25 = "(ถึงแม้ว่าจะไม่สมจริงเท่าไหร่ แต่ก็อยู่ในระดับที่นักเรียนดูได้)"
1600405-27 = "ว้าว... สุดยอดเลย..."
1600405-28 = "หนังเรื่องนี้ทำดีสุดๆ ไปเลยค่ะบอส... ไม่สิ... คุณครู... เอ๊ะหรือว่า... บอส...?"
1600405-29 = "ไม่สิ เราต้องเชื่อคำของคุณครูสิ! ขอโทษนะคะคุณครู..."
1600405-30 = "คุณครูว่ายังไงบ้างคะ? หนังสนุกไหมคะ?"
1600405-31 = "[s] \"ฮู้วว... เรียกว่าบอสก็ได้...\""
1600405-32 = "......!!"
1600405-33 = "จะ... จริงเหรอคะ?! บอส...!"
1600405-34 = "รับทราบค่ะบอส! ฉันจะทำตามที่บอสสั่งเลยค่ะ! งั้นเราไปดูเรื่องต่อไปกันเลยค่ะ!"
1600405-35 = "หนังเรื่องต่อไปก็คือ <หมัดน้องเหมียวไร้คุณธรรม> ค่ะ!!"
1600405-37 = "(หนังที่ได้ดูหลังจากนั้นก็เป็นหนังที่ดีทั้งหมด)"
1600405-38 = "(ทุกเรื่องถ่ายทอดความร้ายกาจออกมาได้อย่างลึกซึ้งและเร้าอารมณ์)"
1600405-39 = "(...)"
1600405-40 = "(แต่ว่า...)"
1600405-42 = "ยอดไปเลย...! ฉันลุ้นจนตัวโก่งเลยค่ะคุณ... บอส!!"
1600405-43 = "งั้นไปที่เรื่องต่อไป...!"
1600405-45 = "(ถึงหนังจะสนุกและตื่นเต้นแค่ไหน แต่การต้องดูหนังประเภทเดียวกันถึง 21 เรื่องนี่มัน...)"
1600405-46 = "(แถมพีน่ายังชวนคุยตลอดเรื่อง ทำให้แม้จะง่วงแต่ก็นอนหลับไม่ได้...)"
1600405-48 = "ว้าว! นี่แหละหนังที่ตามหามานาน! งั้นเรื่องต่อไป....!"
1600405-50 = "(...แบบนี้คนอื่นจะคิดว่า...)"
1600405-52 = "......"
1600405-54 = "(...นี่เป็นการทรมานหรือเปล่านะ...)"
1600405-56 = "10!"
1600405-58 = "10!"
1600405-60 = "10! ไปเลยค่ะ!"
1600405-62 = "(สุดท้ายก็ได้ดูเรื่องที่ 21 แต่ก็สติหลุดไปแล้ว)"
1600405-63 = "(พอมารู้ตัวอีกที ก็เห็นตัวเองอยู่ในสนามหญ้าริมน้ำด้านนอกแล้ว)"
1600405-65 = "......"
1600405-66 = "คะ... คุณครูคะ...? ได้ยินฉันไหมคะ?"
1600405-67 = "[s3] \"ที่นี่ที่ไหน? แล้วฉันคือใคร?\"\n[s4] \"นี่ครูกลับมาสู่โลกอย่างปลอดภัยแล้วสินะ\""
1600405-68 = "มะ... ไม่นะ...!"
1600405-69 = "มะ... ไม่นะ...!"
1600405-70 = "ตั้งสติหน่อยค่ะคุณครู! ห้ามทิ้งกันไปแบบนี้สิคะ! ฉันทำผิดไปแล้วค่ะ!"
1600405-71 = "ขะ... ขะ... ขอโทษค่ะ... ฉันไม่คิดเลยว่าคุณครูจะหมดสติไปแบบนี้..."
1600405-72 = "ฉันเองดูหนังมาธารอนแบบนี้เป็นปกติอยู่แล้ว ก็เลยไม่ได้คิดถึงคุณครูเลยค่ะ..."
1600405-73 = "พีน่าผิดไปแล้วค่ะ ขอโทษจริงๆ นะคะ!"
1600405-74 = "ต่อไปจะไม่ชวนมาดูหนังแล้วค่ะ..."
1600405-75 = "ฮือ... ฮือๆ!"
1600405-76 = "[s5] \"ไม่เป็นไร ไม่ต้องคิดมากหรอก\"\n[s6] \"ไม่เรียกครูว่าบอสแล้วเหรอ?\""
1600405-77 = "......?"
1600405-78 = "......?"
1600405-79 = "คะ? นี่แปลว่า..."
1600405-80 = "เอ๋...? ไม่ต้องเป็นห่วงหรอก อย่างนั้นเหรอคะ?"
1600405-81 = "คุณครูไม่ได้สลบ... แต่แค่เผลอหลับไปงั้นเหรอคะ?"
1600405-82 = "แปลกจัง... ไม่น่าเป็นอย่างนั้นไปได้นะคะ... ฉันว่าเหมือนสลบไปมากกว่านะ..."
1600405-83 = "...เอ๋?"
1600405-84 = "ไม่ใช่อย่างนั้นค่ะ! ฉันไม่ได้จะเถียงบอสเลยนะคะ! ไม่มีทางเด็ดขาด!"
1600405-85 = "ชะ.. ใช่ค่ะ! เอาตามที่คุณครูบอกเลยค่ะ! หลับก็หลับค่ะ! สงสัยฉันจะตาไม่ดีแล้วล่ะ..."
1600405-86 = "แต่ว่า...!"
1600405-87 = "......"
1600405-88 = "ฮิฮิ..."
1600405-89 = "ฮ่ะฮ่ะฮ่าา! อ๊า~~!"
1600405-90 = "วะฮ่ะฮ่ะฮ่าา! ขำจนน้ำตาไหลแล้ว! วะฮ่ะฮ่ะฮ่าา!"
1600405-91 = "อะฮ่ะฮ่า... ฮ่ะฮ่า... เฮ้อ... จริงๆ เลยนะคะ คุณครูเนี่ย"
1600405-92 = "......"
1600405-93 = "ขอบคุณนะคะคุณครู คุณครูใจดีกับพีน่าตลอดเลยล่ะค่ะ"
1600405-94 = "ถึงพีน่าจะทำให้คุณครูต้องเจอปัญหา แต่คุณครูก็ไม่เคยว่าอะไรเลย...#nต้องขอบคุณเท่าไหร่ถึงจะพอคะเนี่ย..."
1600405-95 = "ตอนนี้ฉันรู้สึกว่าคุณครูคือฮีโร่ของฉันเลยล่ะค่ะ... ฉันรู้สึกถึงความอบอุ่นและอ่อนโยนจากคุณครู..."
1600405-96 = "มีบางสิ่งที่พิเศษในตัวคุณครูที่ทำให้ฉันสบายใจ และสร้างแรงบันดาลใจให้ฉัน..."
1600405-97 = "นี่คือสิ่งที่ฉันรู้สึกได้จากคุณครู... ฉันพูดจริงนะคะ"
1600405-98 = "....ฮิฮิ"
1600405-100 = "(คุณครูใช้เวลาที่เหลือคุยกับพีน่าเกี่ยวกับหนังที่ดูในวันนั้น)"
1600405-101 = "(แต่สัญญาว่าจะไปดูหนังในโรงแบบปกติแทนการดูมาธารอนแบบวันนี้...)"

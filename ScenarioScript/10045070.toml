[translation]
10045070-1 = "第7話;百花繚亂 vs 百花繚亂"
10045070-2 = "謝謝你，紫。#n多虧有你才能獲勝。"
10045070-3 = "別這麼說！小女子只是想起了百花繚亂之道而已。#n這也是多虧了前輩！"
10045070-4 = "很高興你能這麼說。"
10045070-7 = "（人都是互相扶持而活的）"
10045070-8 = "（沒必要一個人扛下所有，也不必為自己的軟弱感到可恥）"
10045070-12 = "（……對吧，菖蒲？）"
10045070-15 = "紫，下一場的對手是蓮華和桔梗哦。#n你有信心嗎？"
10045070-16 = "兩位前輩們的強大，小女子再清楚不過了！"
10045070-17 = "但是，我們的[ruby=Team Work]團～隊合作[/ruby]也不會輸給他們！"
10045070-18 = "不必執著於勝負，只要全力以赴就行了！"
10045070-19 = "嗯，很有紫的風格呢。"
10045070-20 = "下一場比賽的時候……這隻右手也能運用自如了。"
10045070-21 = "讓我們打出一場無憾的比賽吧。"
10045070-22 = "呵呵呵，當然！"
10045070-24 = "桔梗，來擬定作戰吧。"
10045070-25 = "雖然目前為止都還能勉強取勝，但這次的對手可不一樣。"
10045070-26 = "你有什麼好主意嗎？"
10045070-27 = "沒有啊？#n那不是你的工作嗎，作戰參謀？"
10045070-28 = "唉……就知道你會這麼說。"
10045070-29 = "……"
10045070-30 = "依照我的預測，名草前輩和紫應該會跟我們正面對決。"
10045070-31 = "而不是選擇針對弱點或出奇制勝。因為……"
10045070-32 = "那正是桔梗最不想面對的戰法。"
10045070-33 = "沒錯。奇策的精髓在於奇襲。#n如果對方正面硬拚的話，我們勢必會屈於劣勢。"
10045070-34 = "既然如此，我們能做的只有一件事。"
10045070-35 = "也就是正面對決吧。"
10045070-36 = "既然擬定戰術的意義不大……"
10045070-37 = "那就是默契更好、意志更堅定的一方會贏。"
10045070-38 = "哦？意思就是我們比較有利吧！"
10045070-39 = "……你為什麼會這麼想？"
10045070-41 = "我們可是從小一起長大的，要論默契的話應該比他們更好吧？"
10045070-42 = "蓮華……"
10045070-43 = "只要你和我在同一隊，就一定會贏。"
10045070-44 = "……"
10045070-45 = "你這個人真的是……"
10045070-46 = "好吧，我會想出來的。"
10045070-47 = "只屬於我們的高效戰術。"
10045070-48 = "好！就這麼辦吧！"
10045070-50 = "不久之後……"
10045070-52 = "充滿淚水與戲劇性的敗部復活戰，終於來到了決賽！"
10045070-53 = "[ns]「究竟誰能獲得額外的晉級資格呢！」"
10045070-58 = "不知道師父覺得誰會贏呢？"
10045070-59 = "別想那些有的沒的。"
10045070-60 = "把注意力放在對手身上。"
10045070-61 = "表情不錯嘛。#n看來你恢復精神了。"
10045070-66 = "桔梗跟蓮華……他們的眼神都變了呢。"
10045070-67 = "我們也一樣下定決心了！"
10045070-68 = "就讓大家好好見識吧。"
10045070-69 = "不辱「百花繚亂」之名的……真正對決！"
10045070-71 = "那麼～比賽開始！！"
10045070-75 = "[ns]「先攻的是名草隊！」"
10045070-79 = "名草選手的扣球發球……能順利接住嗎！？"
10045070-80 = "蓮華！拜託了！"
10045070-81 = "交給我吧……！"
10045070-87 = "[ns]「接住了！？」"
10045070-88 = "我來接應！用零式吧！"
10045070-89 = "好！"
10045070-90 = "零式？那是什麼！？"
10045070-95 = "喝啊……！！"
10045070-100 = "……！！"
10045070-101 = "啊啊！在桔梗選手精準的托球後，緊接著的是蓮華選手的時間差攻擊！#n名草選手被騙了！"
10045070-103 = "中計了……！"
10045070-105 = "這邊就由小女子來……！"
10045070-110 = "呀啊……！！"
10045070-112 = "竟然接到了……！？"
10045070-113 = "不愧是紫！我的後輩真了不起啊……！"
10045070-115 = "發動反擊……！"
10045070-121 = "這次換我來……！"
10045070-122 = "拜託了！"
10045070-127 = "咕嗚……！"
10045070-128 = "接得漂亮！再來用青春S！"
10045070-129 = "青，青春……"
10045070-134 = "沒什麼好害羞的啦！"
10045070-135 = "青，青春S！！"
10045070-141 = "是發銳利的扣球！#n會被擋下嗎……！？"
10045070-143 = "……！！"
10045070-144 = "啊！！"
10045070-148 = "得分！得分了！"
10045070-149 = "[ns]「是發精準打進空檔的漂亮扣球！」"
10045070-150 = "桔梗……你已經不再猶豫了嗎？"
10045070-151 = "……我決定要坦率面對自己了。"
10045070-152 = "因為我再次認識到──#n即便我如此充滿不足，也依然有相信並支持著我的人願意陪在我身邊。"
10045070-153 = "這都是多虧了[ruby=大家]百花繚亂[/ruby]。"
10045070-154 = "說的沒錯。這才像百花繚亂的作戰參謀。"
10045070-156 = "啊啊，這才是小女子夢寐以求的團結大會！夏日的青春[ruby=Romance]浪～漫[/ruby]！"
10045070-157 = "不過比賽就是比賽。#n我可不會手下留情的哦。"
10045070-158 = "我們也一樣。"
10045070-159 = "是時候釋放隱藏在這隻右手中的全部力量了。"
10045070-160 = "就說那種話太中二了嘛……"
10045070-161 = "雖然好像在說什麼重要的話……"
10045070-162 = "但選手們的神情似乎放鬆了不少！"
10045070-164 = "（激烈的攻防一路延續到了[ruby=Deuce]平局[/ruby]……）"
10045070-165 = "（不知不覺間，記分板的數字已經來到了20比20）"
10045070-175 = "啊啊……！#n得分！得分了……！"
10045070-179 = "激戰之後，率先拿下賽末點的隊伍是……！！"

10045070-150 = "Have you banished your hesitations, Kikyou?"
10045070-151 = "...I realized I must embrace what I can and cannot do."
10045070-152 = "For even when I lack, there are yet those who put their faith in me."
10045070-153 = "And \"those\" people are the Hyakkaryouran, of course."

[translation]
10045070-1 = "Episode 7;Hyakkaryouran vs. Hyakkaryouran"
10045070-2 = "Thank you, Yukari. We wouldn't have claimed victory if not for your efforts."
10045070-3 = "You're welcome! However, it is all thanks to you! You reminded me of what it is to walk the path of the Hyakkaryouran!"
10045070-4 = "I'm happy to hear that, Yukari."
10045070-7 = "(People live by helping one another.)"
10045070-8 = "(No single person must bear the load, nor should they be ashamed of their natural weaknesses.)"
10045070-12 = "(...Right, Ayame?)"
10045070-15 = "We face Renge and Kikyou next, Yukari. Can we best them in a battle?"
10045070-16 = "I know their strength better than anyone!"
10045070-17 = "However, our teamwork is strong, and stronger are our spirits!"
10045070-18 = "Win, lose, it matters not! We will simply give our all to the battle before us!"
10045070-19 = "That's just like you."
10045070-20 = "My right hand has recovered enough to use in this coming match."
10045070-21 = "Let us forge a path forward that leaves no room for regret."
10045070-22 = "Fufufu! That is a given!"
10045070-24 = "We should come up with a plan, Kikyou."
10045070-25 = "We scraped by with a victory the last round, but that's not going to work in this next match."
10045070-26 = "Do you have anything insightful to offer?"
10045070-27 = "Of course not! That's your job, Miss Operations Officer."
10045070-28 = "*sigh* I expected nothing less."
10045070-29 = "..."
10045070-30 = "To begin, Nagusa and Yukari will seek a fair battle."
10045070-31 = "They'll never resort to underhanded trickery, because..."
10045070-32 = "Because they know that's the kind of fight you really want to avoid."
10045070-33 = "Yes. The essence of strategy is to operate in unexpected ways. #nIf they corner us with force, we'll be at a disadvantage."
10045070-34 = "Therefore, there is only one path before us."
10045070-35 = "We fight them head-on."
10045070-36 = "When strategy has no place on the battlefield..."
10045070-37 = "...the more cohesive team will emerge victorious. It evolves into a mental game."
10045070-38 = "Oh? Then we have the upper hand!"
10045070-39 = "...For what reason?"
10045070-41 = "We've been around each other since we were in diapers! Who can work better together than us?"
10045070-42 = "Renge..."
10045070-43 = "It's you and me, Kikyou. Of course we'll win."
10045070-44 = "..."
10045070-45 = "You truly..."
10045070-46 = "Understood. I'll devise a plan."
10045070-47 = "One perfectly suited for you and me, Renge."
10045070-48 = "Let's do it!"
10045070-50 = "A little while later..."
10045070-52 = "It's the final round of this dramatic revival match!"
10045070-53 = "[ns] \"I can't wait to see how it turns out!\""
10045070-58 = "I wonder who Mentor thinks will win."
10045070-59 = "Don't let your mind wander."
10045070-60 = "Focus on the opponent at hand, Renge."
10045070-61 = "I like what you're dishing out right now, Kikyou! You've got some spirit back in you!"
10045070-66 = "Kikyou and Renge... There's a palpable difference in the air about them."
10045070-67 = "We have hardened our resolve as well!"
10045070-68 = "Let the four of us showcase..."
10045070-69 = "...a fair fight in honor of the Hyakkaryouran name!"
10045070-71 = "Now! Let the match begin!!"
10045070-75 = "[ns] \"Team Nagusa is on the offensive!\""
10045070-79 = "What a fierce spike serve! Will they be able to respond?"

[translation]
10045070-1 = "ตอนที่ 7;เฮียกกะเรียวรัน vs เฮียกกะเรียวรัน"
10045070-2 = "ขอบใจนะ ยูคาริ ทีมของเราชนะได้ด้วยฝีมือของเธอเลยละ"
10045070-3 = "ชมเกินไปแล้วเจ้าค่ะ! ข้าแค่ทำตามอย่างรุ่นพี่เฮียกกะเรียวรันก็เท่านั้น ต้องขอบคุณรุ่นพี่ต่างหากเจ้าค่ะ!"
10045070-4 = "ขอบใจที่ช่วยพูดแบบนั้นนะ"
10045070-7 = "(คนเราดำรงชีวิตได้ด้วยการช่วยเหลือซึ่งกันและกัน)"
10045070-8 = "(เราไม่จำเป็นต้องแบกรับทุกอย่างคนเดียว และไม่ต้องอายที่ตัวเองมีจุดอ่อนด้วย)"
10045070-12 = "(คิดเหมือนกันใช่มั้ยล่ะ อายาเมะ...?)"
10045070-15 = "ยูคาริ แมตช์ต่อไปเราต้องแข่งกับเรนเกะและคิเคียว คิดว่าจะชนะได้หรือเปล่า?"
10045070-16 = "ข้ารู้ดีเจ้าค่ะว่ารุ่นพี่ทั้งสองน่ะเก่งมากๆ!"
10045070-17 = "แต่เรื่องทีมวาคุ~ พวกเราไม่แพ้อยู่แล้วเจ้าค่ะ!"
10045070-18 = "ข้าจะไม่หมกมุ่นกับชัยชนะ แต่จะพยายามทำให้ดีที่สุดเจ้าค่ะ!"
10045070-19 = "อื้อ สมกับที่เป็นยูคาริเลยละ"
10045070-20 = "ในแมตช์ต่อไป... ฉันน่าจะใช้แขนขวาได้อย่างอิสระแล้ว"
10045070-21 = "มาเต็มที่กับการแข่งขันกันเถอะ จะได้ไม่ต้องเสียใจภายหลังไง"
10045070-22 = "ฮุฮุฮุ แน่นอนเจ้าค่ะ!"
10045070-24 = "คิเคียว มาวางกลยุทธ์กันเถอะ"
10045070-25 = "แมตช์ที่ผ่านมาเราเอาชนะได้โดยไม่เหนื่อยมากก็จริง แต่คู่ต่อสู้จากนี้ไปไม่ใช่เล่นๆ แล้วนะ"
10045070-26 = "แล้วมีไอเดียดีๆ บ้างมั้ยล่ะ?"
10045070-27 = "จะไปมีได้ไง? เรื่องนั้นเธอต้องเป็นคนคิดสิ เธอเป็นที่ปรึกษายุทธศาสตร์ไม่ใช่เหรอ?"
10045070-28 = "เฮ้อ ก็ได้ ฉันกะไว้แล้วละว่าเธอต้องตอบแบบนี้"
10045070-29 = "......"
10045070-30 = "ถ้าฉันเดาไม่พลาด รุ่นพี่นางุสะกับยูคาริน่าจะบุกแบบประจันหน้า"
10045070-31 = "คงไม่เล่นงานที่จุดอ่อนของเราหรือใช้กลเม็ดที่คาดไม่ถึงหรอก นั่นก็เพราะว่า..."
10045070-32 = "นั่นคือรูปแบบการต่อสู้ที่คิเคียวอยากหลีกเลี่ยงที่สุดยังไงล่ะ"
10045070-33 = "อืม แก่นแท้ของกลยุทธ์ก็คือการจู่โจม #nถ้าถูกจู่โจมแบบประจันหน้า เราก็ย่อมเสียเปรียบเป็นธรรมดา"
10045070-34 = "ถ้าเป็นแบบนั้น สิ่งที่เราทำได้ก็มีแค่..."
10045070-35 = "เผชิญหน้ากันโดยตรงสินะ"
10045070-36 = "ถ้าตัดเรื่องกลยุทธ์ที่เฉลียวฉลาดไปละก็..."
10045070-37 = "ทีมที่ใจนิ่งและเล่นสอดประสานกันได้ดีกว่าก็จะเป็นฝ่ายชนะ"
10045070-38 = "โอ้ว? งั้นทีมเราก็ได้เปรียบน่ะสิ?"
10045070-39 = "ทำไมถึงคิดแบบนั้นล่ะ...?"
10045070-41 = "ก็เพราะเราอยู่ด้วยกันมาตั้งแต่เด็กไงล่ะ ทีมไหนจะรู้ใจกันและมีทีมเวิร์กดีกว่าพวกเราอีกล่ะ?"
10045070-42 = "เรนเกะ..."
10045070-43 = "ฉันอยู่ทีมเดียวกับเธอนะ พวกเราต้องชนะแน่นอน"
10045070-44 = "......"
10045070-45 = "เธอนี่นะ จริงๆ เลย..."
10045070-46 = "เข้าใจแล้ว ฉันจะลองคิดกลยุทธ์ดู"
10045070-47 = "กลยุทธ์ที่มีประสิทธิภาพสำหรับเรา 2 คนโดยเฉพาะ"
10045070-48 = "เยี่ยมเลย! งั้นเอาตามนั้น!"
10045070-50 = "หลังจากนั้นไม่นาน..."
10045070-52 = "ในที่สุดก็ถึงรอบสุดท้ายของการแข่งขันรอบแก้ตัวที่มีทั้งน้ำตาและหยาดเหงื่อ!"
10045070-53 = "[ns] \"ใครกันที่จะได้เข้ารอบไปเพิ่ม!\""
10045070-58 = "ท่านอาจารย์คิดว่าทีมไหนจะชนะกันนะ?"
10045070-59 = "อย่าคิดอะไรเพ้อเจ้อเลย"
10045070-60 = "จดจ่อกับการแข่งขันดีกว่า"
10045070-61 = "ดูทำหน้าจริงจังเข้าสิ เหมือนจะได้พลังกลับมาแล้วสินะ"
10045070-66 = "คิเคียว เรนเกะ สองคนนั้นมีแววตามุ่งมั่นแล้วละ"
10045070-67 = "พวกเราก็เตรียมตัวเตรียมใจมาไม่แพ้กันนะเจ้าคะ!"
10045070-68 = "เราจะโชว์ฝีมือให้ทุกคนเห็นกันเจ้าค่ะรุ่นพี่"
10045070-69 = "เราจะเผชิญหน้ากันอย่างยุติธรรม ให้สมศักดิ์ศรีเฮียกกะเรียวรัน!"
10045070-71 = "เอาละ! งั้นเราจะเริ่มการแข่งขันเลยค่ะ!!"
10045070-75 = "[ns] \"ทีมนางุสะจะได้เป็นฝ่ายเสิร์ฟก่อน!\""
10045070-79 = "ผู้เข้าแข่งขันนางุสะตบเสิร์ฟได้เฉียบมาก...! อีกฝ่ายจะรับลูกนี้ได้หรือเปล่าคะ!"
10045070-80 = "เรนเกะ! ฝากด้วยนะ!"
10045070-81 = "ฉันจัดการให้เอง!"
10045070-87 = "[ns] \"รับได้ด้วย?!\""
10045070-88 = "ฉันต่อเอง! ใช้ลูกสูตร 0!"
10045070-89 = "ดีละ!"
10045070-90 = "สูตร 0? หมายถึงอะไรเหรอเจ้าคะ?!"
10045070-95 = "ฮึบ...!!"
10045070-100 = "...!!"
10045070-101 = "อ๊ะ ผู้เข้าแข่งขันคิเคียวรับลูกได้อย่างแม่นยำ แล้วผู้เข้าแข่งขันเรนเกะก็โจมตีต่อเลยค่ะ! #nผู้เข้าแข่งขันนางุสะเหมือนจะจับทางไม่ถูกแล้ว!"
10045070-103 = "โดนให้ซะแล้ว...!"
10045070-105 = "ข้ารับให้เองเจ้าค่ะ...!"
10045070-110 = "ของกล้วยๆ...!!"
10045070-112 = "รับได้งั้นเหรอ...?!"
10045070-113 = "เก่งจังเลย ยูคาริ! สมกับที่เป็นรุ่นน้องของฉันเลย...!"
10045070-115 = "เอาลูกนี้ไปกิน...!"
10045070-121 = "ฉันรับเอง...!"
10045070-122 = "ฝากด้วยนะ!"
10045070-127 = "อึก...!"
10045070-128 = "รับได้สวย! ต่อไปเล่นลูกวัยรุ่น S เลย!"
10045070-129 = "ละ... ลูกวัยรุ่น..."
10045070-134 = "ทำไม อายเหรอ?!"
10045070-135 = "ละ... ลูกวัยรุ่น S!!"
10045070-141 = "ตบได้เฉียบมากค่ะ! อีกฝ่ายจะบล็อกได้หรือเปล่านะ...?!"
10045070-143 = "...!!"
10045070-144 = "อ๊ะ!!"
10045070-148 = "ลูกลงไปแล้ว! ทำคะแนนได้แล้วค่ะ!"
10045070-149 = "[ns] \"เป็นลูกตบที่สวยมากเลย ลงตรงที่ว่างเต็มๆ!\""
10045070-150 = "คิเคียว... หายลังเลแล้วเหรอ?"
10045070-151 = "ฉันจะซื่อสัตย์กับตัวเองแล้วน่ะ..."
10045070-152 = "ฉันรู้แล้วว่าต่อให้ตัวเองจะยังบกพร่อง แต่ก็ยังมีหลายคนที่คอยเชียร์และอยู่ข้างๆ ฉัน"
10045070-153 = "ต้องขอบใจเฮียกกะเรียวรันทุกคนเลยละ"
10045070-154 = "อื้อ สมแล้วที่เป็นที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน"
10045070-156 = "นี่มันการแข่งขันกระชับมิตรที่ข้าใฝ่ฝันมาตลอดเลยเจ้าค่ะ! นี่ละความฝันในฤดูร้อนของวัยรุ่น~!"
10045070-157 = "แต่การแข่งขันย่อมเป็นการแข่งขัน ฉันไม่อ่อนข้อให้หรอกนะ"
10045070-158 = "นั่นน่ะมันคำพูดของทางนี้ต่างหาก"
10045070-159 = "ฉันจะปลดปล่อยพลังของแขนข้างขวาที่เก็บมาตลอดให้ถึงขีดสุดเลย"
10045070-160 = "ก็บอกแล้วไงว่าพูดแบบนั้นมันเบียวแปลกๆ น่ะ..."
10045070-161 = "เหมือนว่าผู้เข้าแข่งขันของเรากำลังพูดเรื่องสำคัญเลยนะคะ..."
10045070-162 = "แต่สีหน้าของพวกเธอก็สดใสกว่าเดิมค่ะ!"
10045070-164 = "(การแข่งขันที่ดุเดือดยังดำเนินต่อไป ต่างฝ่ายต่างทำคะแนนได้จนต้องดิวซ์กันหลายลูก...)"
10045070-165 = "(แล้วคะแนนของทั้งสองฝ่ายก็อยู่ที่ 20 ต่อ 20)"
10045070-175 = "อ๊ะ...! ลูกลงพื้นแล้ว! ได้คะแนนค่ะ...!"
10045070-179 = "ทีมที่ได้แมตช์พอยต์จากการต่อสู้ที่สูสีก็คือ...!!"

[translation]
1012306-1 = "#title;자각하고 있어요"
1012306-2 = "#place;샬레 집무실"
1012306-3 = "#na;(얼마 지나지 않아, 말했던 대로 세이아가 찾아왔다.)"
1012306-4 = "#st;[0,0];instant;1;"
1012306-5 = "#clearST"
1012306-6 = "#wait;1900"
1012306-7 = "3;세이아;01\n#3;a\n#3;h\n#wait;1100"
1012306-8 = "[ns1] \"……세이아?\"\n[ns2] \"수영복 시즌은 끝난 거니?\""
1012306-9 = "#wait;10"
1012306-10 = "#wait;10"
1012306-11 = "3;세이아;08;그렇다고 할 수 있겠네요. 게다가 오늘의 목적은 그게 아니니까요."
1012306-12 = "3;세이아;03;오늘은…… '자랑'을 하러 왔습니다.\n#3;em;[음표]"
1012306-13 = "3;세이아;99;저라는 존재가 얻은 장족의 발전. 그래요. 변화에 관한 이야기지요."
1012306-14 = "3;세이아;06;사실 그것은 어쩌면 아주 작은 차이, 아직 '차이'라 부르기 민망한 것일 수도 있습니다만……."
1012306-15 = "3;세이아;05;중요한 건 얼마나 변했느냐가 아니라 변화의 발생 그 자체.\n#3;em;[!]"
1012306-16 = "3;세이아;01;……라고, 선생님이라면 말씀하실 것 같았거든요."
1012306-17 = "[s3] \"그건 직감 같은 느낌이니?\"\n[s4] \"스스로 생각해서 결론지은 거야?\""
1012306-18 = "#wait;10"
1012306-19 = "#wait;10"
1012306-20 = "3;세이아;02;스스로 생각해서 내린 결론입니다."
1012306-21 = "3;세이아;03;문득 떠오른 추상적인 직감이나 허상의 예지 같은 것들과는 다른 것이죠."
1012306-22 = "3;세이아;02;그리고 그렇기에, 그것들보다도 훨씬 더 가치가 깊을 수 있다고 믿습니다."
1012306-23 = "3;세이아;06;애초에 그런 방식으로는 알아낼 수 없는 것이니까요. 오히려 이런 주제를 그런 걸로 알려고 하면…… 문제가 생기죠."
1012306-24 = "#st;[0,0];instant;1;"
1012306-25 = "#clearST"
1012306-26 = "3;세이아;99\n#3;em;…\n#3;h\n#wait;2500"
1012306-27 = "3;세이아;09;……대인 관계에 관한 것입니다."
1012306-28 = "3;세이아;06;스스로 말하는 것도 우스꽝스러운 일입니다만, 최근 들어 나기사나 미카와의 관계가 점차 편해지고 있습니다.\n#3;em;[한숨]"
1012306-29 = "3;세이아;01;물론 예전에 '덜 친했다'라는 의미는 아닙니다. 두 사람 모두 저에게는 소중한 존재니까요. 두 사람이 어떻게 생각하건 간에."
1012306-30 = "3;세이아;04;…………………."
1012306-31 = "3;세이아;07;……실수했군요. '두 사람이 그렇게 생각해 줬듯이', 저 또한 두 사람을 소중하게 생각하거든요."
1012306-32 = "[s5] \"과연, 장족의 발전이네.\"\n[s6] \"우리 애가 다 컸어요!!\""
1012306-33 = "#wait;10"
1012306-34 = "#wait;10"
1012306-35 = "3;세이아;03;후후. 기뻐해 주실 거라 믿고 있었습니다."
1012306-36 = "3;세이아;01;허나 이 '편해졌다'라는 말은 의외로 겉보기에 그리 좋지 않을 수도 있습니다."
1012306-37 = "#all;hide"
1012306-38 = "#na;세이아;우선 저는 두 사람과의 대화에서 빈정거리는 빈도는 전보다 비교할 수 없을 정도로 늘었습니다."
1012306-39 = "#na;세이아;미카는 조금 누그러진 대신 직설적으로 바뀌었고, 나기사도 면전에서 저희에게 큰소리치는 일이 많아졌죠."
1012306-40 = "#na;세이아;……그래요. '편해졌다'는 것은 그런 의미였습니다. 어떤 의미로, 저희 사이는 엉망진창이 되었습니다."
1012306-41 = "#all;hide"
1012306-42 = "3;세이아;01;이게 옳은 것인지는 아직 확신할 수 없습니다. 겉으로 보기에는 그냥 싸우는 일이 늘어난 정도고, 썩 예쁜 모양새는 아니겠죠.\n#3;a"
1012306-43 = "3;세이아;99;겉으로라도 '순수하게 서로를 위하는 모습'만을 보이며 살았던 때가 그리워질지도 모르겠습니다."
1012306-44 = "3;세이아;07;하지만…… 음……."
1012306-45 = "[s7] \"문제가 생기면, 그때 해결하면 되지.\"\n[s8] \"서로에게 맞는 법을 찾는 과정이니까.\""
1012306-46 = "#wait;10"
1012306-47 = "#wait;10"
1012306-48 = "3;세이아;03;……후후."
1012306-49 = "3;세이아;02;역시 그렇겠지요. 그렇게 말씀해 주시길 기대하며 찾아왔답니다.\n#3;em;[반짝]"
1012306-50 = "3;세이아;01;사실 답은 스스로도 어느 정도 찾았습니다. 빈정거리는 것은 저의 천성이죠."
1012306-51 = "3;세이아;99;오히려 두 사람 외의 존재들에게는 할 수 없습니다. 네, 교우 관계를 위해 참고 있는 것뿐."
1012306-52 = "3;세이아;04;허나 이제 두 사람은 제 이런 천성을 적당히 무시하는 법을 배웠습니다. 제가 헛소리를 하면 적당히 넘기기 시작했죠."
1012306-53 = "3;세이아;08;저도 미카의 유치한 발상에 대해 무시하는 빈도가 줄었습니다. 그녀의 방식은 유치하지만, 그 내면은 진실됐죠."
1012306-54 = "3;세이아;06;나기사는 외골수 기질을 가지고 있지만 그래야만 했던 이유가 있습니다. 오히려 저나 미카는 모두 그녀에게 빚을 지고 있습니다."
1012306-55 = "3;세이아;07;……으음…….\n#3;em;[땀]\n#3;stiff"
1012306-56 = "3;세이아;09;구구절절 이상한 소리가 길어지는 것 같습니다만……"
1012306-57 = "[s9] \"다 이해했어.\"\n[s10] \"세 사람이라면 잘해 나갈 거야.\""
1012306-58 = "#wait;10"
1012306-59 = "#wait;10"
1012306-60 = "3;세이아;03;후후. 그렇겠지요. 그랬으면 좋겠습니다."
1012306-61 = "3;세이아;99;……자, 그러면 저의 교우관계에 대한 이야기는 여기까지입니다."
1012306-62 = "3;세이아;05;이제부터는 저희 관계에 대한 이야기를 좀 더 이어가고 싶군요."
1012306-63 = "[s11] \"……저희 관계?\"\n[s12] \"그게 무슨 말씀이시죠?\""
1012306-64 = "#wait;10"
1012306-65 = "#wait;10"
1012306-66 = "3;세이아;06;모르시는 척하시는 건가요? 아니면 진짜로 모르시는 건가요?\n#3;em;[한숨]"
1012306-67 = "3;세이아;05;아니, 어느 쪽이든 상관없겠죠. 어차피 선생님에게 거부할 틈을 드리진 않을 테니까요."
1012306-68 = "3;세이아;03;자, 가시죠. 앞에 차를 임시 주차해 두었어요. 이대로라면 주차 딱지를 떼게 될지도 모른다고요?"
1012306-69 = "3;세이아;02;꽤 당황하시는군요. 하지만 이런 상황이 처음은 아니실 겁니다.\n#3;em;[음표]"
1012306-70 = "3;세이아;01;……선생님."
1012306-71 = "#st;[0,0];instant;1;"

[translation]
1012306-1 = "I'm Self-Conscious"
1012306-2 = "Schale Executive Office"
1012306-3 = "Seia visited not long after her message."
1012306-8 = "[ns1] \"Looking very proper, Seia.\"\n[ns2] \"Is swimsuit season over?\""
1012306-11 = "I suppose you could say that. However, that is not why I came today."
1012306-12 = "Today...I wanted to reflect on my progress."
1012306-13 = "I've come a long way. Yes, I've changed."
1012306-14 = "Perhaps it was small, something so insignificant that it is hardly notable."
1012306-15 = "\"But what's important is not how big the change was, but the change in itself.\""
1012306-16 = "...That is what I thought you might say."
1012306-17 = "[s3] \"Was that like your intuition?\"\n[s4] \"Did you work that out on your own?\""
1012306-20 = "Yes. It was my conclusion."
1012306-21 = "This wasn't an abstract intuition or illusion that dawned on me. I had to work it out."
1012306-22 = "And that is precisely why it feels so valuable."
1012306-23 = "It's a truth that could not be scried nor seen in a premonition. In fact, using an outside method...would cause problems."
1012306-27 = "...It's about interpersonal relationships."
1012306-28 = "It's funny to say this myself, but I've been feeling more and more comfortable with Nagisa and Mika."
1012306-29 = "Of course, this doesn't mean I wasn't close with them in the past. Regardless of what the two believe, they're both precious to me."
1012306-30 = "..."
1012306-31 = "...I misspoke. I should not speak of what they believe about me or not. The truth remains the same."
1012306-32 = "[s5] \"You really have changed.\"\n[s6] \"So mature, Seia!\""
1012306-35 = "Fufu... I knew you'd enjoy that."
1012306-36 = "But this \"feeling comfortable\" might not look healthy or prim on the surface."
1012306-38 = "For starters, my sarcasm use in conversations with the two has surged as of late."
1012306-39 = "Mika has grown more lenient, yet direct, and Nagisa hasn't shied away from...yelling."
1012306-40 = "...Yes. Perhaps that is what it means to grow comfortable. In a sense, our relationship has become completely dysfunctional."
1012306-42 = "I'm unsure if this is the right path. We're fighting more on the surface, and I know such indignity is difficult to witness."
1012306-43 = "I might miss the times when we were \"supportive and kind,\" even if it was superficial."
1012306-44 = "That said... Well..."
1012306-45 = "[s7] \"If something goes wrong, you can handle it.\"\n[s8] \"It's all about finding what works for the group.\""
1012306-48 = "...Fufu."
1012306-49 = "I suppose so. I came here hoping you'd say that."
1012306-50 = "Ultimately, I've landed on my own kind of answer. Being sarcastic is in my nature, after all."
1012306-51 = "But I can't be like that in front of anyone besides them. I hold back part of myself in order to be acceptable to other students."
1012306-52 = "Mika and Nagisa have learned to ignore my abrasive nature, to a degree."
1012306-53 = "And I've grown less dismissive of Mika's childish ideas. While she can be naive, her heart is genuine."
1012306-54 = "And while Nagisa has a stubborn side, her reasons for being that way are valid. Both Mika and I owe her a debt for her work."
1012306-55 = "Mm..."
1012306-56 = "It feels like I'm babbling on and on with my nonsense, but..."
1012306-57 = "[s9] \"I understood everything.\"\n[s10] \"The three of you will do well together.\""
1012306-60 = "Heh. You're right. I hope so."
1012306-61 = "...Well then, that's it for the story of my friendships."
1012306-62 = "Let's refocus. I want to talk about where our relationship is headed."
1012306-63 = "[s11] \"...OUR relationship?\"\n[s12] \"What do you mean?\""
1012306-66 = "Are you acting like you don't know? Or do you actually not know?"
1012306-67 = "Does it really matter? I won't allow you to refuse, anyway."
1012306-68 = "Now, let's go. I parked on the curb. If we keep talking, I might get a ticket."
1012306-69 = "You seem quite troubled by the prospect. But, let's be honest. This isn't your first time on one of my trips, is it?"
1012306-70 = "...Sensei."
1012306-77 = "...I'm kidnapping you. Right now."

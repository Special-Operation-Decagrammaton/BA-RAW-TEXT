[translation]
1012306-1 = "ฉันรู้ตัวค่ะ"
1012306-2 = "สำนักงานชาเล่ต์"
1012306-3 = "(ไม่นานนักเซอาก็มาถึงตามที่บอก)"
1012306-8 = "[ns1] \"เซอา...?\"\n[ns2] \"หมดซีซันใส่ชุดว่ายน้ำแล้วเหรอ?\""
1012306-11 = "จะว่าอย่างนั้นก็ได้ค่ะ แล้วเรื่องชุดก็ไม่ใช่เป้าหมายของวันนี้ด้วยค่ะ"
1012306-12 = "วันนี้ฉัน... มา 'อวด' ค่ะ"
1012306-13 = "ความก้าวหน้าอันรวดเร็วที่ฉันคนนี้มี ใช่แล้วค่ะ เป็นเรื่องของความเปลี่ยนแปลงน่ะค่ะ"
1012306-14 = "ที่จริงมันอาจจะมีความแตกต่างน้อยมากจนยังเรียกว่าเป็น 'ความแตกต่าง' ไม่ได้..."
1012306-15 = "แต่สิ่งที่สำคัญไม่ได้อยู่ที่ 'เปลี่ยนแปลงไปมากแค่ไหน' แต่เป็น 'มีความเปลี่ยนแปลงเกิดขึ้น' ต่างหาก"
1012306-16 = "ฉันคิดว่าคุณครูน่าจะพูดแบบนี้นะคะ..."
1012306-17 = "[s3] \"นั่นคือสัญชาตญาณของเซอาเหรอ?\"\n[s4] \"คิดเอาเองหรือเปล่าน่ะ?\""
1012306-20 = "เป็นสิ่งที่ฉันคิดแล้วก็สรุปเอาเองค่ะ "
1012306-21 = "นี่ไม่เหมือนกับลางสังหรณ์นามธรรมที่ผุดขึ้นมาหรือการเห็นภาพลวงตาล่วงหน้าหรอกนะคะ"
1012306-22 = "เพราะงั้นฉันจึงเชื่อว่ามันมีคุณค่ามากกว่านั้นมากค่ะ"
1012306-23 = "เหตุผลก็เพราะมันเป็นสิ่งที่ไม่อาจรู้ได้ด้วยวิธีแบบนั้นตั้งแต่แรกค่ะ ถ้าเราพยายามเข้าใจสิ่งนั้น ในลักษณะนั้น... มันก็จะเกิดปัญหาค่ะ"
1012306-27 = "นี่เป็นเรื่องเกี่ยวกับความสัมพันธ์ระหว่างบุคคลน่ะค่ะ..."
1012306-28 = "ถึงมันจะน่าขันที่ฉันพูดแบบนี้ด้วยตัวเอง แต่หมู่นี้ความสัมพันธ์ระหว่างฉันกับนางิสะหรือมิกะก็เริ่ม#nสบายใจมากขึ้นเรื่อยๆ ค่ะ"
1012306-29 = "แน่นอนว่ามันไม่ได้หมายความว่าที่ผ่านมา 'เราสนิทกันน้อยกว่านี้' นะคะ ไม่ว่าทั้ง 2 คนนั้นจะคิดยังไง แต่พวกเธอก็เป็นคนที่มีค่าสำหรับฉัน"
1012306-30 = "......"
1012306-31 = "ฉันพูดผิดไปสินะคะ... ฉันคิดว่าทั้ง 2 คนนั้นเป็นคนสำคัญ 'เหมือนกับที่ทั้ง 2 คนนั้นคิดกับฉัน' ค่ะ"
1012306-32 = "[s5] \"เป็นความก้าวหน้าอย่างที่ว่าเลยนะ\"\n[s6] \"นักเรียนของครูโตกันแล้วนะเนี่ย!!\""
1012306-35 = "ฮุฮุ ฉันคิดอยู่เลยค่ะว่าคุณครูจะต้องดีใจ"
1012306-36 = "แต่คำที่บอกว่า 'สบายใจมากขึ้น' ถ้าฟังเผินๆ ก็อาจจะมีความหมายไม่ดีก็ได้นะคะ"
1012306-38 = "อย่างแรกเลย ตอนคุยกับ 2 คนนั้น ฉันประชดประชันได้บ่อยขึ้นจนเทียบกับเมื่อก่อนไม่ได้เลยค่ะ"
1012306-39 = "มิกะเปลี่ยนมาพูดอะไรตรงๆ แทนที่จะอ้อมค้อม ส่วนนางิสะเองก็มีเรื่องให้ต่อว่าพวกเราต่อหน้ามากขึ้น#nด้วยค่ะ"
1012306-40 = "ใช่ค่ะ... นี่ละค่ะที่ฉันบอกว่า 'สบายใจขึ้น' ในบางมุมความสัมพันธ์ของพวกฉันก็เละเทะไปหมดค่ะ"
1012306-42 = "ฉันยังไม่แน่ใจว่าแบบนี้มันถูกต้องแล้วหรือเปล่า มองเผินๆ ก็ดูเหมือนว่าเราจะโต้เถียงกันมากขึ้น และมันก็คงไม่ใช่ภาพที่น่าดูนักด้วยค่ะ"
1012306-43 = "ฉันอาจจะคิดถึงวันเวลาที่เรา 'แสดงความห่วงใยต่อกันอย่างบริสุทธิ์' แม้จะเป็นแค่ภายนอกก็ตาม ก็ได้ค่ะ"
1012306-44 = "แต่ว่า... อืม..."
1012306-45 = "[s7] \"ถ้ามีปัญหา ก็แค่แก้ไขตอนนั้นก็ได้\"\n[s8] \"นี่คือกระบวนการหาวิธีที่เหมาะสมระหว่างกันน่ะ\""
1012306-48 = "ฮุฮุ..."
1012306-49 = "น่าจะเป็นอย่างนั้นนะคะ ฉันมาหาคุณครูด้วยความหวังว่าจะได้ฟังคำตอบแบบนี้ละค่ะ"
1012306-50 = "ที่จริงฉันก็ค้นพบคำตอบด้วยตัวเองได้บ้างแล้วค่ะ แต่การพูดแบบใส่คำเสียดสีมันก็เป็นธรรมชาติของ#nฉันนี่คะ"
1012306-51 = "แต่นอกจาก 2 คนนั้นแล้วฉันก็พูดแบบนี้กับใครไม่ได้หรอกค่ะ ใช่ค่ะ ฉันอดทนไว้เพื่อความสัมพันธ์ของ#nเพื่อนในโรงเรียนน่ะค่ะ"
1012306-52 = "แต่ตอนนี้ทั้ง 2 คนนั้นเรียนรู้ที่จะเพิกเฉยต่อธรรมชาติแบบนั้นของฉันแล้วค่ะ ถ้าฉันพูดอะไรไร้สาระ พวกเธอก็จะเริ่มไม่สนใจแล้วปล่อยผ่านไป"
1012306-53 = "ส่วนฉันก็เพิกเฉยต่อความคิดแบบเด็กๆ ของมิกะน้อยลง ถึงความคิดกับการกระทำของเธอจะเหมือน#nกันกับเด็ก แต่สิ่งที่อยู่ภายในมีแต่ความจริงใจค่ะ"
1012306-54 = "ส่วนนางิสะ ถึงเธอจะมีนิสัยไม่ยอมแพ้ง่ายๆ และหมกมุ่นกับบางสิ่งบางอย่าง แต่เธอก็มีเหตุผลให้ต้อง#nเป็นอย่างนั้นค่ะ กลายเป็นว่าฉันกับมิกะเป็นหนี้บุญคุณเธอมากกว่าค่ะ"
1012306-55 = "อืม..."
1012306-56 = "เหมือนฉันจะเอาแต่พูดเรื่องอะไรแปลกๆ เข้าไปทุกทีเลยนะคะ..."
1012306-57 = "[s9] \"ครูเข้าใจทั้งหมดเลย\"\n[s10] \"ทั้ง 3 คนจะทำได้ดีแน่นอน\""
1012306-60 = "ฮุฮุ ก็น่าจะอย่างนั้นละค่ะ ฉันก็หวังว่าจะเป็นอย่างนั้นค่ะ"
1012306-61 = "เอาละ... จบเรื่องราวความสัมพันธ์ของเพื่อนร่วมโรงเรียนของฉันเท่านี้ดีกว่าค่ะ"
1012306-62 = "ตอนนี้ฉันอยากพูดเกี่ยวกับความสัมพันธ์ของเรามากกว่าค่ะ"
1012306-63 = "[s11] \"ความสัมพันธ์ของเรา...?\"\n[s12] \"หมายความว่ายังไงเหรอ?\""
1012306-66 = "แกล้งทำเป็นไม่รู้เหรอคะ? หรือว่าไม่รู้จริงๆ?"
1012306-67 = "ไม่สิ ไม่ว่าจะเป็นอย่างไหนก็ไม่สำคัญค่ะ ยังไงฉันก็จะไม่ให้โอกาสคุณครูปฏิเสธอยู่แล้วค่ะ"
1012306-68 = "เอาละ ไปเถอะค่ะ ฉันจอดรถไว้ข้างหน้าชั่วคราวน่ะค่ะ ถ้าปล่อยไว้นานๆ อาจจะโดนใบสั่งก็ได้นะ"
1012306-69 = "คุณครูดูตกใจไม่น้อยเลยนะคะ แต่สถานการณ์แบบนี้ไม่ใช่ครั้งแรกของคุณครูหรอกค่ะ"
1012306-70 = "คุณครู..."
1012306-77 = "ตอนนี้คุณครู... โดนฉันลักพาตัวแล้วละค่ะ"

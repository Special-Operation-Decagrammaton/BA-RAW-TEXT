[translation]
1012306-1 = "已有所察覺"
1012306-2 = "夏萊辦公室"
1012306-3 = "（沒過多久，聖亞便如約而至）"
1012306-8 = "[ns1]「……聖亞？」\n[ns2]「泳裝的季節結束了嗎？」"
1012306-11 = "可以這麼說吧。#n而且那也不是我今天來的目的。"
1012306-12 = "我今天呢……是來「炫耀」的。"
1012306-13 = "炫耀我這個存在所獲得的巨大進步。#n沒錯，就是關於改變的事。"
1012306-14 = "或許實際上只是非常細微的差異，甚至連稱之為「差異」都有點牽強……"
1012306-15 = "不過真正重要的並不是改變的程度，而在於「有所改變」這件事本身。"
1012306-16 = "……我想老師應該會這麼說吧。"
1012306-17 = "[s3]「這是直覺嗎？」\n[s4]「還是你自己思考後得出的結論？」"
1012306-20 = "是我在思考後得出的結論。"
1012306-21 = "既不是突然浮現的抽象直覺，也不是虛無飄渺的預感。"
1012306-22 = "正因如此，我相信它遠比那些更有價值。"
1012306-23 = "畢竟這本來就是無法藉由那種方式得知的事。#n如果用那種方式去理解……反而只會產生問題。"
1012306-27 = "……我想說的是關於人際關係的事。"
1012306-28 = "雖然自己說出來有點好笑，但最近我和渚跟彌香的關係變得更自在了。"
1012306-29 = "當然我並不是說我們以前「並不親近」。#n他們兩個對我而言都是重要的存在……無論他們是否這麼想都一樣。"
1012306-30 = "………………"
1012306-31 = "……我剛才說錯了。#n應該說「就像他們兩個重視著我一樣，我也同樣很重視他們」才對。"
1012306-32 = "[s5]「原來如此，真是個長足的進步呢。」\n[s6]「我們家的孩子終於長大了啊！！」"
1012306-35 = "呵呵。我就知道老師會替我高興。"
1012306-36 = "不過「變得自在」從表面上來看，或許並沒有那麼美好。"
1012306-38 = "首先，我在對話中挖苦他們的頻率比以前高得多。"
1012306-39 = "彌香雖然變得比較溫和，說起話來卻更直接了。#n而渚則時常當面對我們大聲嚷嚷。"
1012306-40 = "……沒錯，所謂的「自在」就是這個意思。#n某種意義上來說，我們的關係變得一團亂。"
1012306-42 = "這樣究竟是否正確，我目前還無法確定。#n看起來只是爭吵變多了，實在不怎麼好看。"
1012306-43 = "或許有朝一日，我會懷念以前那種「表面上純粹為彼此著想」的時光也說不定。"
1012306-44 = "不過……嗯……"
1012306-45 = "[s7]「如果出現問題，到時候再解決就行了。」\n[s8]「這是彼此磨合的過程。」"
1012306-48 = "……呵呵。"
1012306-49 = "老師果然會這麼說啊。#n這正是我期待在這裡聽見的回答。"
1012306-50 = "其實答案我自己也想得差不多了。#n挖苦他人是我的天性。"
1012306-51 = "反而在面對其他人的時候還得忍耐一下……畢竟總是得維持人際關係嘛。"
1012306-52 = "現在渚和彌香已經學會適度無視我的天性……在我胡說八道的時候選擇一笑置之。"
1012306-53 = "我也不再那麼頻繁無視彌香幼稚的想法。#n因為他的行事風格幼稚歸幼稚，內心的出發點卻是真誠的。"
1012306-54 = "而渚雖然個性固執，卻也有身不由己的理由。#n其實我和彌香都虧欠他很多。"
1012306-55 = "唔嗯……"
1012306-56 = "我好像又開始說一堆奇怪的長篇大論了呢……"
1012306-57 = "[s9]「我明白你的意思。」\n[s10]「你們三個人一定能相處得很好。」"
1012306-60 = "呵呵，但願如此。"
1012306-61 = "……那麼，我與朋友間的關係就說到這裡。"
1012306-62 = "接下來，我想聊聊我們之間的關係。"
1012306-63 = "[s11]「……我們的關係？」\n[s12]「這是什麼意思？」"
1012306-66 = "老師是在裝傻……還是真的不知道呢？"
1012306-67 = "是哪一邊都無所謂。#n反正我本來就沒打算給老師拒絕的機會。"
1012306-68 = "來，跟我走吧。#n我剛才把車暫停在外面，要是再不開走可能會吃上罰單的哦？"
1012306-69 = "雖然看起來挺慌張的，不過這種情況對老師來說應該不是第一次了吧？"
1012306-70 = "……老師。"
1012306-77 = "你現在……可是被我綁架了哦。"

80000061-6 = "4;치나츠;99\n#4;em;…\n#4;a"
80000061-7 = "#na;(게헨나 선도부실 문을 열고 들어가자, 테이블 뒤에 앉아서 기다리던 치나츠가 보였다.)"
80000061-8 = "4;치나츠;02;……아. 오셨군요, 선생님. 초대에 응해 주셔서 감사합니다.\n#4;em;[반응]"
80000061-9 = "4;치나츠;01;다른 분들은 없습니다. 잠시간은……. 저 혼자 여기를 지키게 되었어요.\n#4;m3"

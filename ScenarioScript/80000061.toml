[translation]
80000061-1 = "重要的時刻，重要的地點"
80000061-7 = "（一進入格黑娜風紀委員會就看見了千夏）"
80000061-8 = "……啊，老師。謝謝您願意過來。"
80000061-9 = "順帶一提，今天其他人都不在，只有我一個人留守……"
80000061-11 = "啊，那個……"
80000061-12 = "我並不是特意選擇這個時間，試圖讓彼此能交流感情什麼的……"
80000061-13 = "真的不是……"
80000061-14 = "總之老師，請收下這個。"
80000061-20 = "[ns1]「……巧克力？」\n[ns2]「幸運餅乾？」"
80000061-21 = "是的。是巧克力口味的幸運餅乾。"
80000061-22 = "是的。是巧克力口味的。"
80000061-23 = "……咦？"
80000061-24 = "選擇這個的理由是嗎？"
80000061-25 = "那個，當然也有今天是情人節這個原因……"
80000061-26 = "以及，感謝的心情和，好感……"
80000061-27 = "要說今天很難正確的傳達那些情感……#n還是說很可能在好或不好的方面都過度傳達呢……"
80000061-28 = "不，那個，我絕對不是不喜歡或是不希望這樣的意思……"
80000061-29 = "……"
80000061-30 = "不好意思，請您別在意……總之請收下吧……"
80000061-31 = "[s3]「謝謝，我會好好享用的。」\n[s4] 打開一個幸運餅乾"
80000061-40 = "那個，您抽到什麼呢？保險起見，我可以看一下嗎……？"
80000061-44 = "……原來如此。"
80000061-45 = "「The time to be happy is now. The place to be happy is here.」……"
80000061-46 = "現在就是最好的時刻，這裡就是最棒的地方……"
80000061-47 = "您不覺得是句佳話嗎？簡直就像是在形容現在的我們……"
80000061-48 = "[s5]「嗯，真是句好話。順帶一提……」\n[s6]「其他的我也可以打開看看嗎？」"
80000061-49 = "……咦！？這，這個嘛……！"
80000061-50 = "……咦！？這，這個嘛……！"
80000061-51 = "老，老師！請等一下……！！"
80000061-55 = "[ns7]「The time to be happy is now. The place to be happy is here……」\n[ns8]「……嗯？是一樣的？」"
80000061-56 = "那，那是因為……呃……"
80000061-57 = "那，那是因為……呃……"
80000061-62 = "請，請停下來！？再繼續打開的話……！"
80000061-63 = "咦，內容都一樣？那是因為……"
80000061-64 = "[s9]「難道說，全部都一樣？」\n[s10]「千夏，莫非……」"
80000061-65 = "……"
80000061-66 = "……"
80000061-70 = "……您辛苦了！！"
80000061-75 = "[ns]「千夏！？」"
80000061-77 = "（之後總算是追上了千夏，在他冷靜下來後聊了一會）"

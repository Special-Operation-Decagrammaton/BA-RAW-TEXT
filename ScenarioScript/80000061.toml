[translation]
80000061-1 = "The Best Moment of All"
80000061-7 = "I entered the Gehenna Prefect Team's offices and found Chinatsu waiting at a nearby table."
80000061-8 = "There you are, Sensei. Thank you for coming so late."
80000061-9 = "There isn't anyone else here. I've had to look over the place by my lonesome all this time."
80000061-11 = "No, wait."
80000061-12 = "I-I understand how that must sound, but I promise you I didn't invite you here with any kind of ulterior motive."
80000061-13 = "No. On second thought, that isn't completely honest."
80000061-14 = "I invited you here because of this."
80000061-20 = "[ns1] \"Is this chocolate?\"\n[ns2] \"That's a strange-looking fortune cookie.\""
80000061-21 = "Not just any chocolate—fortune chocolate."
80000061-22 = "That's because it's not a cookie. It's called a fortune chocolate."
80000061-23 = "Hmm?"
80000061-24 = "You're wondering why I chose to give you this chocolate? Well..."
80000061-25 = "...today is a special day, after all. And...this is difficult to put into words."
80000061-26 = "I wanted to do something to show my appreciation..."
80000061-27 = "...but because it's Valentine's Day, I didn't want to do too much and have what I'm saying be misinterpreted to mean something more."
80000061-28 = "N-Not that I would necessarily mind that. I wouldn't have gone to so much effort if that were the case. It's just..."
80000061-29 = "..."
80000061-30 = "N-Never mind. Forget what I just said. Please, just accept this."
80000061-31 = "[s3] \"Thank you.\"\n[s4] Fish the fortune out of the chocolate.."
80000061-40 = "What does it say? I'm curious as well."
80000061-44 = "Hmm. Let's see."
80000061-45 = "\"The time to be happy is now. The place to be happy is here.\""
80000061-46 = "That sounds right to me. There isn't any better place to be than right here,#nright now."
80000061-47 = "Maybe you picking this one today was meant to be."
80000061-48 = "[s5] \"What about the other ones?\n[s6] \"Can I look at the rest of them?\""
80000061-49 = "Huh?! The rest of them? U-Um... The thing is..."
80000061-50 = "Huh?! The rest of them? U-Um... The thing is..."
80000061-51 = "W-Wait, Sensei! It's, um...bad luck! It's bad luck if you read any other fortune!"
80000061-55 = "[ns7] \"'The time to be happy is now. The place to be happy is here.'\"\n[ns8] \"Wait. These are all the same...\""
80000061-56 = "W-Well, that's because... Um..."
80000061-57 = "W-Well, that's because... Um..."
80000061-62 = "I told you not to read any of the other ones!"
80000061-63 = "Why are they all the same? Well..."
80000061-64 = "[s9] \"They're all the same...because...?\"\n[s10] \"Chinatsu, you could have just said this yourself.\""
80000061-65 = "..."
80000061-66 = "..."
80000061-70 = "I have to go now!"
80000061-75 = "[ns] \"Where are you going?!\""
80000061-77 = "I eventually managed to catch up to Chinatsu and assured her it was okay."

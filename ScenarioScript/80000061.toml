[translation]
80000061-1 = "ช่วงเวลาที่ดีที่สุด"
80000061-7 = "(พอคุณครูมาถึงห้องคณะกรรมการวินัย ก็พบกับชินัตสึที่นั่งรออยู่ที่โต๊ะ)"
80000061-8 = "อ๊ะ... มาแล้วเหรอคะ คุณครู ขอบคุณที่แวะมานะคะ"
80000061-9 = "ตอนนี้ไม่มีใครอยู่หรอกค่ะ ตอนกลางคืน... จะมีแค่ฉันที่คอยรักษาการณ์อยู่ที่นี่ค่ะ"
80000061-11 = "เดี๋ยวนะคะ..."
80000061-12 = "ฉันไม่ได้เชิญคุณครูมาเวลานี้เพราะมีเหตุผลแอบแฝงอะไรหรอกนะคะ ไม่ใช่เด็ดขาดค่ะ"
80000061-13 = "อืม... แต่อันที่จริงก็ไม่เชิงว่า \"ไม่ใช่เด็ดขาด\" หรอกค่ะ..."
80000061-14 = "แต่นั่นไม่ใช่เหตุผลที่ฉันเชิญคุณครูมาในวันนี้ค่ะ"
80000061-20 = "[ns1] \"ช็อกโกแลต...?\"\n[ns2] \"คุกกี้เสี่ยงทาย?\""
80000061-21 = "มันไม่ใช่ช็อกโกแลตทั่วไปนะคะ เป็นช็อกโกแลตเสี่ยงทายค่ะ"
80000061-22 = "ไม่ใช่คุกกี้ค่ะ ช็อกโกแลตค่ะ"
80000061-23 = "คะ...?"
80000061-24 = "เพราะอะไรฉันถึงเลือกให้ช็อกโกแลตแบบนี้เหรอคะ? คือว่า..."
80000061-25 = "คือ... คือ... มันอธิบายเป็นคำพูดยากค่ะ"
80000061-26 = "ทั้งแทนความรู้สึกขอบคุณ แล้วก็แทนความรู้สึกที่ชอบ..."
80000061-27 = "วันนี้เป็นวันวาเลนไทน์เพราะงั้นการตีความหมายที่สื่อไปก็ย่อมกว้างขึ้นไปด้วย..."
80000061-28 = "มะ...ไม่ใช่นะ ไม่ใช่ว่าฉันไม่ชอบหรืออะไรนะคะ ถ้าไม่ชอบก็คงไม่เตรียมมาให้ตั้งแต่แรกหรอกค่ะ... แต่ว่า..."
80000061-29 = "..."
80000061-30 = "วะ... ว่าแล้วเชียว ไม่ดีกว่าค่ะ ถ้างั้นช่วยรับสิ่งนี้ไปแทนคำพูดของฉันนะคะ "
80000061-31 = "[s3] \"ขอบคุณนะ ครูจะกินให้อร่อยเลย\"\n[s4] แกะคุกกี้เสี่ยงทาย"
80000061-40 = "ได้คำว่าอะไรเหรอคะ...? ขอฉันดูหน่อยนะคะ"
80000061-44 = "ฮึ่ม... แบบนี้นี่เอง..."
80000061-45 = "‘The time to be happy is now. The place to be happy is here.’"
80000061-46 = "เป็นคำที่ดีมากเลยนะคะ ตอนนี้คือเวลาแห่งความสุข สถานที่แห่งความสุขอยู่ที่นี่แล้ว"
80000061-47 = "การที่คุณครูหยิบได้คำนี้ขึ้นมา... มันมีความหมายกับฉันมาก..."
80000061-48 = "[s5] \"ชิ้นอื่นจะมีคำว่าอะไรนะ?\"\n[s6] \"ขอลองดูชิ้นอื่นๆ ด้วยได้มั้ย?\""
80000061-49 = "คะ...? ชิ้นอื่นๆ เหรอคะ เอ่อ... คือว่าเรื่องนั้น.."
80000061-50 = "คะ...? ชิ้นอื่นๆ เหรอคะ เอ่อ... คือว่าเรื่องนั้น.."
80000061-51 = "คะ... คุณครู! รอก่อนค่ะ คุณครู! อย่าแกะชิ้นอื่นดูเลยค่ะ"
80000061-55 = "[ns7] “The time to be happy is now. The place to be happy is here...”\n[ns8] \"หืม? เหมือนกันเลยแฮะ...?\""
80000061-56 = "คือว่า... คือ..."
80000061-57 = "คือว่า... คือ..."
80000061-62 = "พะ...เพราะงั้น... ไม่ต้องแกะดูชิ้นต่อไปแล้วค่ะ...! คะ...คือว่ามัน..."
80000061-63 = "คะ? ทำไมข้อความที่อยู่ข้างในถึงเหมือนกันหมดเหรอคะ? ระ... เรื่องนั้นน่ะ..."
80000061-64 = "[s9] \"ข้อความเดียวกันหมดเลยนะ\"\n[s10] \"ชินัตสึ... หรือนี่คือคำที่ชินัตสึอยากบอกเหรอ...\" "
80000061-65 = "..."
80000061-66 = "..."
80000061-70 = "อึ่ก...!"
80000061-75 = "[ns] \"ชินัตสึ!?\""
80000061-77 = "(หลังจากนั้นคุณครูก็วิ่งตามหาชินัตสึจนเหนื่อย ก่อนจะนั่งปลอบเธออยู่ตลอดทั้งคืน)"

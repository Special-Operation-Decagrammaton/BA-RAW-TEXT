80000061-24 = "3;치나츠;02;굳이 이런 초콜릿을 고른 이유가 있냐고요? 그건…….\n#3;em;[...]"
80000061-25 = "3;치나츠;06;아, 아무래도……. 날이 날이니만큼, 오히려 말로 설명하기 힘든 것들이 있어서 그랬습니다.\n#3;greeting"
80000061-26 = "3;치나츠;99;순수하게 감사를 표하는 것도, 호의를 전달하려는 것도."
80000061-27 = "3;치나츠;04;오늘은 발렌타인 데이라서 오히려 그 의미가 확대 해석될 여지들이 있는 관계로…….\n#3;stiff"
80000061-28 = "3;치나츠;06;아, 아니. 절대로 싫다거나 그런 것은 아닙니다. 애초에 그렇다면 챙기지도 않았겠죠. 그렇지만……."
80000061-29 = "3;치나츠;99;……."
80000061-30 = "3;치나츠;07;여, 역시……. 됐습니다. 그냥 이걸로 대신해 주세요. 부탁드리겠습니다…….\n#3;em;[///]"

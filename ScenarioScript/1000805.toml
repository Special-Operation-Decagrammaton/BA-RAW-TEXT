[translation]
1000805-1 = "การเยี่ยมไข้ของเนรุ"
1000805-2 = "ห้องของคุณครู ชาเล่ต์"
1000805-3 = "(คุณครูเป็นหวัดหนักเกินที่จะลุกไหว)"
1000805-4 = "(แต่ถึงยังไง...ก็ควรติดต่อบอกตัวแทนนักเรียนหรือโรงพยาบาลก่อน...)"
1000805-5 = "(ติ๊ง~ต่อง~)"
1000805-6 = "......?"
1000805-7 = "[s1] \"ใครน่ะ?\"\n[s2] ไม่สนใจ"
1000805-8 = "(ตู้มมมมมม!!!)"
1000805-9 = "(ตู้มมมมมม!!!)"
1000805-10 = "......?!"
1000805-11 = "(ประตูระเบิดออก)"
1000805-15 = "เฮอะ อยู่นี่เอง"
1000805-17 = "ไฮ~ คุณครู"
1000805-18 = "ได้ข่าวว่าป่วย พอได้ข่าวฉันก็รีบมาเลยนะ!"
1000805-20 = "[ns3] \"รู้ได้ยังไงเหรอ?\"\n[ns4] \"ทำไมไม่ไปโรงเรียน เดี๋ยวก็หมดสิทธิ์สอบหรอก\""
1000805-21 = "อ่า... ไม่ต้องห่วงเรื่องนั้นหรอก"
1000805-22 = "อ่า... ไม่ต้องห่วงเรื่องนั้นหรอก"
1000805-23 = "จริงอยู่ที่ฉันเกือบจะขาดเรียนเกินที่กำหนดแล้ว..."
1000805-24 = "แต่ครูป่วยแบบนี้ ฉันจะไปโรงเรียนได้ยังไงล่ะ"
1000805-25 = "แล้วก็... เอ้านี่ ฉันซื้อยากับของกินมาให้"
1000805-26 = "บอกแล้วไงล่ะ ว่าสักวันจะตอบแทนบุญคุณให้น่ะ!"
1000805-27 = "ฉันจะตอบแทนบุญคุณให้วันนี้ล่ะ!"
1000805-29 = "ฮ่าฮ่า ครูเป็นหวัดแบบนี้ แสดงว่าร่างกายอ่อนแอสินะ"
1000805-30 = "...อะไรนะ? ฉันเองก็เพิ่งเป็นหวัดเมื่อไม่นานมานี้งั้นเหรอ?"
1000805-31 = "งั้นเหรอ... จำไม่ได้เลยแฮะ?"
1000805-32 = "เรื่องนั้นช่างเถอะ ครูไม่ต้องห่วงนะ"
1000805-33 = "ฉันจะช่วยดูแลเสริมพลังร่างกายที่อ่อนแอของครูให้เอง!"
1000805-34 = "[s5] \"น่ากังวลกว่าเดิมอีก....\"\n[s6] \"ขอร้องล่ะ ปล่อยให้ครูไปโรงพยาบาลเถอะ\""
1000805-35 = "เอ๋? ไม่ต้องกังวลหรอก เชื่อใจฉันได้เลย"
1000805-36 = "เอ๋? ไม่ต้องกังวลหรอก เชื่อใจฉันได้เลย"
1000805-37 = "ฉันเป็นหัวหน้าชมรมเมดเลยนะ ครูไม่รู้รึยังไง?"
1000805-38 = "ความสามารถในฐานะเมดของฉันน่ะยอดเยี่ยมที่สุดในมิลเลเนียมเลยนะ"
1000805-39 = "การพยาบาลก็เป็นหนึ่งในคุณสมบัติหลายๆ อย่างของเมดเหมือนกันนะ"
1000805-40 = "ไม่ต้องห่วง ฉันเคยดูแล... ที่จริงก็ยังไม่เคยหรอก แค่นึกภาพในหัวแล้วก็ฝึกเอาน่ะ"
1000805-41 = "[s7] \"จินตนาการแล้วฝึก...?\"\n[s8] \"...ครั้งเดียว?\""
1000805-42 = "เอาละ ถ้างั้นมาลองทำโจ๊กกันเลยดีกว่า"
1000805-43 = "เอาละ ถ้างั้นมาลองทำโจ๊กกันเลยดีกว่า"
1000805-44 = "[s] น่ากังวลสุดๆ..."
1000805-46 = "(30 นาทีต่อมา)"
1000805-47 = "เอาล่ะ! เสร็จแล้ว!"
1000805-48 = "รอนานรึเปล่า?"
1000805-49 = "นี่คือ \"โจ๊กเพิ่มพลังสูตรพิเศษ\" ของมิคาโมะ เนรุยังไงล่ะ!"
1000805-50 = "ถ้ากินโจ๊กนี้ล่ะก็เดี๋ยวก็หายป่วยแล้ว!"
1000805-51 = "[s] \"มีน้ำมันสีแดงเดือดปุดๆ อยู่ด้วยนะ?\""
1000805-52 = "ฮะฮ่าฮ่า! ฉันใส่พริกชนิดพิเศษลงไปน่ะ!"
1000805-53 = "ไม่ต้องห่วงนะ เรื่องอื่นฉันก็ไม่ค่อยแน่ใจหรอก แต่ว่าเรื่องแคลอรี่นี่รับประกันได้เลย"
1000805-54 = "[s] \"รับประกันเรื่องสุขภาพกับรสชาติด้วยได้มั้ย...\""
1000805-55 = "ฮึ่ย?! เลิกบ่นได้แล้วน่า! มีแต่เด็กๆ เท่านั้นแหละที่บ่นเรื่องอาหารน่ะ! ครูเป็นผู้ใหญ่แล้วนะ!"
1000805-56 = "ตอนสมาชิกชมรมเรากินโจ๊กที่ฉันทำให้ พวกเขาแทบลุกมาเต้นระบำกันอย่างมีความสุขเลยนะ"
1000805-57 = "[s9] กินโจ๊ก\n[s10] กิน!\n[s11] กะ...กิน....?"
1000805-58 = "(ไม่มีทางเลือกอื่นแล้วล่ะ)"
1000805-59 = "(ไม่มีทางเลือกอื่นแล้วล่ะ)"
1000805-60 = "(ไม่มีทางเลือกอื่นแล้วล่ะ)"
1000805-61 = "(กลืนน้ำลาย)"
1000805-62 = "......?"
1000805-63 = "[s12] \"อร่อยเหาะ?!\"\n[s13] ลุกขึ้นมาเต้นระบำ"
1000805-64 = "ฮ่าฮ่า! เห็นหรือยังล่ะ? อร่อยใช่มั้ยล่ะ?!"
1000805-65 = "ฮ่าฮ่า! เห็นหรือยังล่ะ? อร่อยใช่มั้ยล่ะ?!"
1000805-66 = "ฉันไม่ได้เป็นหัวหน้าชมรมเมดแค่ตำแหน่งหรอกนะ"
1000805-68 = "พอกินโจ๊กใส่พริกแล้วทำให้เหงื่อออกเยอะมาก จนคุณครูหายหวัดได้อย่างรวดเร็ว"

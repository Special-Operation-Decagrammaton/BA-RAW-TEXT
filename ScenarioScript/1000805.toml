[translation]
1000805-1 = "Neru's Visit"
1000805-2 = "Schale, Sensei's Room "
1000805-3 = "(Now I have a cold, and I'm too sick to move.)"
1000805-4 = "Just as I was thinking about calling for help..."
1000805-5 = "*ding dong*"
1000805-6 = "...?"
1000805-7 = "[s1] \"Who is it?\"\n[s2] Ignore it."
1000805-8 = "*crash*"
1000805-9 = "*crash*"
1000805-10 = "...?!"
1000805-11 = "(The door exploded.)"
1000805-15 = "Heh. Here you are."
1000805-17 = "Hey, Sensei."
1000805-18 = "I heard you were sick! I booked it over here as fast as I could."
1000805-20 = "[ns3] \"Who told you?\"\n[ns4] \"What about school? I thought your attendance was cutting it close.\""
1000805-21 = "Meh. Don't worry about it."
1000805-22 = "Meh. Don't worry about it."
1000805-23 = "So what if my attendance isn't doing so hot?"
1000805-24 = "I can't just sit in class when I know you're sick."
1000805-25 = "Anyway, here. Some medicine and food."
1000805-26 = "I told you I'd pay you back."
1000805-27 = "Today is that day!"
1000805-29 = "Only the weak catch colds, Sensei."
1000805-30 = "...Me? Catch a cold just last week?"
1000805-31 = "I have no idea what you're talking about."
1000805-32 = "Never mind that. Put everything else out of your head."
1000805-33 = "I'm here to get you back on your feet!"
1000805-34 = "[s5] \"I have a bad feeling about this...\"\n[s6] \"Please. Just let me go to the hospital.\""
1000805-35 = "Oh, come on! Just trust me."
1000805-36 = "Oh, come on! Just trust me."
1000805-37 = "Don't you know I'm the president of the Maid Club?"
1000805-38 = "My maid skills are unparalleled at Millennium."
1000805-39 = "That means my bedside manners are the best in the biz!"
1000805-40 = "I mean, yeah, I don't have any practical experience... Actually, I've only done a single simulation."
1000805-41 = "[s7] \"Simulation...?\"\n[s8] \"Only once?\""
1000805-42 = "First up, let's make you some porridge."
1000805-43 = "First up, let's make you some porridge."
1000805-44 = "[s] This doesn't bode well..."
1000805-46 = "(Thirty minutes later...)"
1000805-47 = "Here! All done!"
1000805-48 = "I didn't make you wait too long, did I?"
1000805-49 = "This is Mikamo Neru's patented Power-up Porridge!"
1000805-50 = "It's a surefire cure for your cold."
1000805-51 = "[s] \"Why is it red and boiling?\""
1000805-52 = "Hahaha! I added lots of special pepper into it!"
1000805-53 = "I can't share everything about the recipe, but I guarantee it has calories to spare."
1000805-54 = "[s] \"This could be my last meal...\""
1000805-55 = "Quit your whining! Only little kids get this picky about their food. You're supposed to be the adult here, Sensei!"
1000805-56 = "Besides, I've tested this recipe on one of my clubmates before and they loved the stuff."
1000805-57 = "[s9] Eat.\n[s10] Eat!\n[s11] Eat...?"
1000805-58 = "(I have no other choice.)"
1000805-59 = "(I have no other choice.)"
1000805-60 = "(I have no other choice.)"
1000805-61 = "*gulp*"
1000805-62 = "...?"
1000805-63 = "[s12] \"It's...delicious?!\"\n[s13] Jump for joy."
1000805-64 = "Haha! I told you it was good, didn't I?"
1000805-65 = "Haha! I told you it was good, didn't I?"
1000805-66 = "My title as Maid Club president isn't just for show."
1000805-68 = "The spicy porridge cured my cold and left me sweating."

[translation]
1000805-1 = "寧瑠的探望"
1000805-2 = "夏萊．老師的房間"
1000805-3 = "（因為感冒，完全動彈不得）"
1000805-4 = "（正打算要聯絡值日的學生或是醫院的時候……）"
1000805-5 = "（叮～咚）"
1000805-6 = "……？"
1000805-7 = "[s1] 「請問是哪位？」\n[s2] 無視"
1000805-8 = "（咚哐──！！）"
1000805-9 = "（咚哐──！！）"
1000805-10 = "……！！？"
1000805-11 = "（門炸開了）"
1000805-15 = "哼，果然在這裡嗎。"
1000805-17 = "嗨，老師。"
1000805-18 = "身體不舒服？我聽到消息啦！"
1000805-20 = "[ns3] 「到底是怎麼知道的？」\n[ns4] 「學校怎麼了？出席日數不是很危險嗎？」"
1000805-21 = "啊啊，別在意那種無聊小事。"
1000805-22 = "啊啊，別在意那種無聊小事。"
1000805-23 = "嘛，雖然出席日數有點危險……"
1000805-24 = "但老師身體不舒服，叫人怎麼悠閒上學啊。"
1000805-25 = "比起那個，來。藥和食材。"
1000805-26 = "我說過了吧，這份恩情我會還的。"
1000805-27 = "今天就是那個日子！"
1000805-29 = "哈哈，老師。竟然會感冒，氣勢不夠啊。"
1000805-30 = "……啊？不久前我也感冒了？"
1000805-31 = "那是什麼，我沒印象呢。"
1000805-32 = "嘛，總之放心吧。"
1000805-33 = "氣勢不夠的話，我會幫你補得滿滿的！"
1000805-34 = "[s5] 「不安。」\n[s6] 「拜託你了，讓我去醫院。」"
1000805-35 = "啊啊？別在那裡不安了，相信我啊。"
1000805-36 = "啊啊？別在那裡不安了，相信我啊。"
1000805-37 = "我可是女僕部部長哦，知道這是什麼意思嗎？"
1000805-38 = "也就是說，作為女僕我的能力是，千年最強的。"
1000805-39 = "照護也是女僕的素養之一啊。"
1000805-40 = "別擔心，照護我很……雖然不熟悉，不過已經在腦海中做過一次想像訓練了。"
1000805-41 = "[s7]「想像訓練……？」\n[s8]「……一次？」"
1000805-42 = "好，總之先來煮粥看看吧。"
1000805-43 = "好，總之先來煮粥看看吧。"
1000805-44 = "[s] 不安……"
1000805-46 = "（30分鐘後）"
1000805-47 = "好！完成！"
1000805-48 = "等很久了吧！"
1000805-49 = "這就是美甘寧瑠特製，「補氣粥」！"
1000805-50 = "只要有這個感冒什麼的馬上好！"
1000805-51 = "[s] 「有紅色的液體在沸騰耶？」"
1000805-52 = "哈哈！因為我放了很多特製辣油！"
1000805-53 = "別擔心。熱量我可以保證。"
1000805-54 = "[s] 「味道和健康的部分也保證一下……」"
1000805-55 = "啊啊！？別抱怨了！只有小孩子才會挑食！ #n老師已經是大人了吧！"
1000805-56 = "我們的成員之前吃過同樣的東西，吃了一口就開心得手舞足蹈，所以別擔心。"
1000805-57 = "[s9] 我要吃。\n[s10] 我要吃！\n[s11] 我要……吃……？"
1000805-58 = "（不存在其他選項）"
1000805-59 = "（不存在其他選項）"
1000805-60 = "（不存在其他選項）"
1000805-61 = "（咕嚕）"
1000805-62 = "……？"
1000805-63 = "[s12] 「好吃！？」\n[s13] 跳舞"
1000805-64 = "哈哈！如何！吶！？好吃吧！？"
1000805-65 = "哈哈！如何！吶！？好吃吧！？"
1000805-66 = "我可不是平白無故當上女僕部部長的。"
1000805-68 = "（吃了辣粥，流了很多汗之後，感冒馬上就好了）"

[translation]
1011602-1 = "งานพาร์ทไทม์ใหม่"
1011602-2 = "(หลังจากนั้นไม่นาน ซาโอริก็มาถึงชาเล่ต์พร้อมกระเป๋าใบใหญ่)"
1011602-9 = "ขอบคุณที่สละเวลาให้ฉันนะ ครู"
1011602-10 = "ที่ฉันมาหาแบบนี้ก็เพราะ..."
1011602-11 = "ไม่สิ ไม่ดีกว่า เอาให้ดูเลยน่าจะเร็วกว่าอธิบายเป็นคำพูดนะ"
1011602-12 = "ครู ช่วยออกไปจากตรงนี้สักครู่ได้มั้ย?"
1011602-13 = "ฉันต้องเตรียมอะไรหน่อยน่ะ"
1011602-14 = "[s1] \"ได้สิ ถึงไม่รู้ว่าจะเตรียมอะไรก็เถอะ...\"\n[s2] \"ได้สิ แบบนี้ครูยิ่งอยากรู้เลยนะ!\""
1011602-17 = "ถ้างั้น... ไว้ฉันเตรียมเสร็จแล้วจะเรียกนะ"
1011602-23 = "อึก... ทำไมใส่ไม่ได้นะ"
1011602-27 = "หรือว่าระหว่างนี้เราอ้วนขึ้น? คาดไม่ถึงเลยแฮะ"
1011602-28 = "[ns3] \"เอ่อ คุณซาโอริ? เสร็จหรือยัง?\"\n[ns4] \"ตกลงไปทำอะไรอยู่ในนั้นน่ะ คุณซาโอริ?\""
1011602-31 = "เดี๋ยว...! ยังไม่เสร็จ!"
1011602-32 = "รออีกหน่อยนะ!"
1011602-36 = "(ครู่ต่อมา...)"
1011602-40 = "เอาละ... เรียบร้อยแล้ว ครูเข้ามาได้เลย"
1011602-43 = "..."
1011602-44 = "[ns] \"หืม...?\""
1011602-45 = "ครู...? ทำไมถึงจ้องจนตาจะถลนออกมาอย่างนั้นล่ะ?"
1011602-46 = "ฉันดูแปลกงั้นเหรอ?"
1011602-47 = "[s5] \"ใครกันเนี่ย? ทำไมจู่ๆ ก็ใส่ชุดเดรสล่ะ...?!\"\n[s6] \"นะ... นี่ซาโอริตัวจริงหรือเปล่า?!?\""
1011602-50 = "กะ... ก็ฉันน่ะสิ!"
1011602-51 = "ชุดแบบนี้ไม่เหมาะกับฉันจริงๆ สินะ..."
1011602-52 = "ขอโทษที่ทำให้เสียเวลานะครู ลืมเรื่องวันนี้ไปเถอะ..."
1011602-56 = "[ns] \"ขะ... ขอโทษ! ครูตกใจน่ะ... ชุดนี้เหมาะกับซาโอริมากเลย!\""
1011602-60 = "งั้นเหรอ... ขอบคุณนะ"
1011602-61 = "น่าจะดีกว่าถ้าฉันอธิบายก่อนนะ"
1011602-62 = "ที่จริง... ฉันบังเอิญได้ทำงานพาร์ทไทม์ที่ให้เงินเยอะน่ะ"
1011602-63 = "เป็นงานนางแบบชุดเดรส แล้วก็จะถ่ายรูปไปลงนิตยสารด้วย"
1011602-64 = "[s7] \"โอ้ว ทำงานเป็นนางแบบจริงจังสินะ!\"\n[s8] \"ฟังดูเป็นงานจริงจังมากเลยนะ!\""
1011602-67 = "ใช่... มันจริงจังกว่าที่ฉันคิดไว้ ก็เลยต้องเตรียมตัวเยอะเลย"
1011602-68 = "เรื่องชุด ฉันเริ่มคุ้นชินบ้างแล้วเพราะทางนั้นส่งมาให้ลองใส่ก่อน..."
1011602-69 = "แต่เรื่องนอกเหนือจากนั้น ฉันไม่รู้เลยว่าต้องทำยังไง"
1011602-70 = "[s9] \"แต่ใส่ชุดแบบนี้แล้วสวยจริงๆ นะ...\"\n[s10] \"พอใส่ชุดแบบนี้ก็เหมือนนางแบบอาชีพเลยนะ!\""
1011602-76 = "มะ... มันบังเอิญหรอกน่า! ก็แค่บังเอิญได้ชุดที่เข้ากับฉันน่ะ!"
1011602-77 = "เอาเถอะ ที่ฉันจะบอกก็คือฉันไม่ค่อยรู้งานของนางแบบเท่าไร เท่าที่รู้ก็แค่ต้องโพสท่าหลายๆ ท่าตอนถ่ายรูป"
1011602-78 = "เพราะงั้นฉันก็เลยอยากถามครู"
1011602-82 = "นางแบบ... ต้องโพสท่าแบบไหนเหรอ? ครูรู้หรือเปล่า?"
1011602-83 = "[s11] \"อืม โพสในแบบของตัวเองอย่างตอนนี้ก็ได้นะ?\"\n[s12] \"โพสในแบบของซาโอริอย่างตอนนี้ก็น่าจะได้นะ?\""
1011602-86 = "โพสในแบบของฉัน? อย่างตอนนี้...? แล้วท่าโพสที่ว่ามันเป็นยังไงเหรอ?"
1011602-87 = "ท่าโพสที่แข็งแกร่ง สง่างาม แต่ก็ให้ความรู้สึกที่เคอะเขินด้วย...?"
1011602-88 = "ปกติฉันมีภาพลักษณ์แบบนั้นงั้นเหรอ...?"
1011602-89 = "[s13] \"เน้นความเป็นธรรมชาติของเราน่าจะดีนะ\"\n[s14] \"คงความเป็นธรรมชาติของเราไว้นี่แหละ\""
1011602-92 = "ความเป็นธรรมชาติของฉัน..."
1011602-93 = "งั้นสินะ... ครูจะบอกว่าฉันควรมั่นใจและไม่ต้องประหม่าใช่มั้ย?"
1011602-94 = "ให้เดินอย่างเป็นธรรมชาติ... แบบนี้น่ะเหรอ?"
1011602-105 = "ส่วนท่าสุดท้าย ฉันขอลองเข้าไปยืนใกล้ๆ อีกหน่อย โพสแบบนี้ดูมั่นใจมั้ย?"
1011602-109 = "ครู... ทำไมทำหน้าแบบนั้นล่ะ? ทำหน้าเหมือนวิญญาณหลุดจากร่างไปอย่างนั้นละ"
1011602-110 = "ฉันทำท่าแปลกสินะ? คิดว่าแบบนี้จะเป็นธรรมชาติแล้วเสียอีก"
1011602-111 = "[ns] \"ครูขอถ่ายรูปได้มั้ย?\""
1011602-115 = "มะ... ไม่ได้นะ!"
1011602-116 = "[s] \"ครูไม่ให้ใครดูหรอก จะเก็บไว้ดูคนเดียวเลย!\""
1011602-117 = "แบบนั้นยิ่งไม่ได้เข้าไปใหญ่!"
1011602-118 = "ถ้าเป็นรูปที่ให้ครูละก็ ฉันควรโพสท่าที่จริงจังกว่านั้นหน่อย..."
1011602-119 = "อ่า..."
1011602-120 = "[s] \"โอ้ว ทำหน้าแบบเมื่อกี้ดีมากเลยนะ!\""
1011602-121 = "มะ... มันดียังไงนะ...?"
1011602-122 = "เอาเถอะ สรุปว่าฉันยังให้ถ่ายรูปไม่ได้ ฉันยังต้องเรียนรู้เรื่องนางแบบอีกเยอะน่ะ"
1011602-123 = "ไว้ถ้าฉันคุ้นชินกับงานนางแบบชุดเดรสแล้วโพสได้ดีกว่านี้ ฉันจะเอารูปมาให้ครูแล้วกัน"
1011602-124 = "[s15] \"โอ้ว ตกลงจะให้แล้วนะ? ดีใจจังเลย!\"\n[s16] \"งั้นยิ่งต้องตั้งใจสอนการโพสท่าแล้วละ!\""
1011602-127 = "อึก... จริงๆ เลยนะ ครูเนี่ย..."
1011602-133 = "ดีละ ฉันจะตั้งใจเรียนรู้ไปแล้วกัน! เตรียมมาสอนฉันได้เลย ครู!"
1011602-134 = "[ns] \"เตรียมตัวไว้ได้เลย ซาโอริ! บทเรียนจะยากเอาการเลยละ!\""
1011602-136 = "(หลังจากนั้นคุณครูกับซาโอริก็ตั้งใจฝึกท่าโพสของนางแบบชุดเดรสด้วยกัน)"

[translation]
1011602-1 = "A New Part-Time Job"
1011602-2 = "Soon after we talked, Saori came to Schale, carrying a huge bag."
1011602-9 = "Thanks in advance for your time, Sensei."
1011602-10 = "I came to see you because..."
1011602-11 = "...well, I think it'd be easier to show you."
1011602-12 = "Could I...have a moment alone before we get started?"
1011602-13 = "I need to prepare something."
1011602-14 = "[s1] \"Not sure what you'd need to prepare, but sure.\"\n[s2] \"I'm looking forward to it!\""
1011602-17 = "Thanks. I'll call you when I'm ready."
1011602-23 = "Tch, it's tighter than I expected..."
1011602-27 = "Didn't this used to fit better...?"
1011602-28 = "[ns3] \"Um, Saori?\"\n[ns4] \"Everything all right in there?\""
1011602-31 = "Hold on...! Not yet!"
1011602-32 = "Just a little longer!"
1011602-36 = "A little while later..."
1011602-40 = "...Okay. You can come in now."
1011602-43 = "..."
1011602-44 = "[ns] \"Hm...?\""
1011602-45 = "Sensei...? Why are you staring at me like that?"
1011602-46 = "Do you think it looks weird...?"
1011602-47 = "[s5] \"Saori in a dress...?!\"\n[s6] \"Wh-Who are you, and what have you done with the real Saori?\""
1011602-50 = "I'm still me, Sensei."
1011602-51 = "I suppose this sort of look doesn't suit me after all..."
1011602-52 = "I'm sorry to take up your time. Please, just forget this ever happened..."
1011602-56 = "[ns] \"S-Sorry! I was just surprised. It looks really good on you!\""
1011602-60 = "Is that so...? Thank you."
1011602-61 = "Perhaps I should've explained first."
1011602-62 = "See, I came across an opportunity for a high-paying part-time job."
1011602-63 = "I'm a dress model now. They're going to publish pictures in a magazine."
1011602-64 = "[s7] \"Wow, a model!\"\n[s8] \"That's some serious work!\""
1011602-67 = "...Yes. It's a very serious business. There's much I have to prepare and maintain."
1011602-68 = "I only now feel comfortable wearing a dress...thanks to my old job."
1011602-69 = "But I have no clue what I'm supposed to do."
1011602-70 = "[s9] \"You say that, but...\"\n[s10] \"It looks nice. Like it's professionally styled!\""
1011602-76 = "I-It's a coincidence! It just happens to fit well!"
1011602-77 = "Anyways, I don't know much about modeling. Aside from the fact that you pose for pictures."
1011602-78 = "That said, Sensei. I do have a question."
1011602-82 = "How does one...pose like a model? Do you know?"
1011602-83 = "[s11] \"Hmm, I think the photographer would guide you.\"\n[s12] \"If you can't think of one, just be natural. Like now.\""
1011602-86 = "Like now? \"Natural\"...? What does that mean?"
1011602-87 = "Should I pose with poise and strength, or with...relatable quirkiness?"
1011602-88 = "What seems more...\"natural\" to me?"
1011602-89 = "[s13] \"Don't worry so much.\"\n[s14] \"Let's go with your normal vibe.\""
1011602-92 = "\"Normal vibe\"..."
1011602-93 = "...Understood. That means don't betray nervousness and display confidence, correct?"
1011602-94 = "And to walk \"normally\"... Would it be like this?"
1011602-105 = "Very well. I've come in for the close-up. Do I appear confident now?"
1011602-109 = "...Sensei. Your expression is...difficult to parse."
1011602-110 = "Do I look...unacceptable? I thought I—"
1011602-111 = "[ns] \"Can I take a photo?\""
1011602-115 = "N-No!"
1011602-116 = "[s] \"I won't show it to anyone! Just for me!\""
1011602-117 = "Then definitely no!"
1011602-118 = "If it's only for you, then it must be proper..."
1011602-119 = "Ah..."
1011602-120 = "[s] \"Oh, that expression you just made is perfect!\""
1011602-121 = "...Wh-What was so good about it?"
1011602-122 = "Regardless, I'm not ready yet. I still have so much to learn."
1011602-123 = "I'll give you a photo when I'm more experienced."
1011602-124 = "[s15] \"Ooh, so you'll give me one, after all? I'm delighted!\"\n[s16] \"Then we better work harder on your poses!\""
1011602-127 = "Tch, how typical, Sensei..."
1011602-133 = "Very well. I'll learn it all! Whenever you're ready, Sensei!"
1011602-134 = "[ns] \"Brace yourself, Saori! My class will be tough!\""
1011602-136 = "Afterward, I diligently helped Saori study dress-modeling poses."

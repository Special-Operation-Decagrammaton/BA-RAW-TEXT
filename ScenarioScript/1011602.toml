[translation]
1011602-1 = "新的打工"
1011602-2 = "（不久後，沙織帶著一個大包包來到了夏萊）"
1011602-9 = "謝謝老師抽空見我。"
1011602-10 = "我之所以來這裡……"
1011602-11 = "不，沒什麼。#n與其用說的，還是直接給老師看比較快吧。"
1011602-12 = "老師，可以請你迴避一下嗎？"
1011602-13 = "我得做點準備。"
1011602-14 = "[s1]「我知道了。雖然不知道要準備什麼……」\n[s2]「總覺得很期待！」"
1011602-17 = "那麼……我準備好會叫你進來。"
1011602-23 = "唔，比想像中還難穿上。"
1011602-27 = "是最近變大了嗎？這倒是在意料之外。"
1011602-28 = "[ns3]「那個，沙織同學？」\n[ns4]「你在裡面做什麼？」"
1011602-31 = "還沒……！還沒好！"
1011602-32 = "麻煩再稍等一下！"
1011602-36 = "（不久後……）"
1011602-40 = "……好，老師可以進來了。"
1011602-43 = "…………"
1011602-44 = "[ns]「嗯……？」"
1011602-45 = "老師……？為什麼要一直盯著我看？"
1011602-46 = "我看起來很奇怪嗎？"
1011602-47 = "[s5]「為什麼突然穿上禮服……！？」\n[s6]「你，你真的是沙織嗎！？」"
1011602-50 = "是，是我沒錯！"
1011602-51 = "這種東西果然不適合我嗎……"
1011602-52 = "抱歉浪費了老師的時間。#n今天的事就麻煩你忘記……"
1011602-56 = "[ns]「抱，抱歉！我剛才只是太驚訝了……超級適合你的哦！」"
1011602-60 = "真的嗎……謝謝老師。"
1011602-61 = "我剛剛應該先說明清楚才對。"
1011602-62 = "其實……我偶然接到了一份高薪打工。"
1011602-63 = "是擔任禮服模特兒的工作，而且拍攝的照片還會刊登在雜誌上。"
1011602-64 = "[s7]「哦哦，現在連模特兒的工作都開始做了啊！」\n[s8]「感覺真專業！」"
1011602-67 = "……是啊。#n內容比我想像中還專業，所以需要做很多準備。"
1011602-68 = "雖然在服裝方面，能用事前收到的這套禮服想想辦法……"
1011602-69 = "但除此之外的事，我實在一竅不通。"
1011602-70 = "[s9]「雖然你這麼說……」\n[s10]「但是你穿起來很好看耶！真的很像專業模特兒！」"
1011602-76 = "這，這真的只是碰巧適合！"
1011602-77 = "總之，我不太了解模特兒的工作。#n只知道拍照時要擺出各種姿勢而已。"
1011602-78 = "所以老師，我希望能向你請教。"
1011602-82 = "模特兒該擺出什麼姿勢……老師知道嗎？"
1011602-83 = "[s11]「唔嗯，通常會有人負責指導姿勢。」\n[s12]「如果沒有的話，像現在這樣保持沙織自己的風格就好了吧？」"
1011602-86 = "像現在這樣……保持我的風格？#n類似什麼感覺呢？"
1011602-87 = "看起來堅強又高傲，卻隱約有點天然呆……？"
1011602-88 = "我平時是那種形象嗎……？"
1011602-89 = "[s13]「想太多的話可能會有反效果哦。」\n[s14]「要保留平時自然的感覺。」"
1011602-92 = "平時自然的感覺……"
1011602-93 = "……這樣啊。#n所以只要放輕鬆，保持自信就行了嗎？"
1011602-94 = "在這個狀態下走台步……是這種感覺嗎？"
1011602-105 = "好，稍微靠近一點作為Ending pose。#n這樣看起來有比較自信嗎？"
1011602-109 = "……老師的表情是什麼意思？#n我有點搞不懂你的情緒。"
1011602-110 = "還是覺得很奇怪嗎？#n我本來以為很自然了說。"
1011602-111 = "[ns]「我可以拍照嗎？」"
1011602-115 = "不，不行！"
1011602-116 = "[s]「我保證不會給其他人看，只會自己珍藏！」"
1011602-117 = "那樣更不行了！"
1011602-118 = "如果是只給老師看的照片，應該要再拍得更好一點……"
1011602-119 = "啊……"
1011602-120 = "[s]「哦，剛才那個表情很好！」"
1011602-121 = "……哪，哪裡好？"
1011602-122 = "總之我現在不懂的事還太多了。"
1011602-123 = "等我更熟悉禮服模特兒的工作，再把照片給老師吧。"
1011602-124 = "[s15]「哦哦，所以你答應會給我囉？好開心！」\n[s16]「那我要更努力教你擺姿勢了！」"
1011602-127 = "唔唔，老師果然……"
1011602-133 = "好，不管什麼我都會學會的！#n儘管放馬過來吧，老師！"
1011602-134 = "[ns]「做好心理準備吧，沙織！我的指導可是很嚴格的哦！」"
1011602-136 = "（之後和沙織一起認真研究了禮服模特兒的姿勢）"

[translation]
1007305-1 = "Drifters"
1007305-5 = "It was late when I got to the beach. I could see Ui standing on the shore, staring into the distance."
1007305-10 = "...Oh, Sensei. Over here."
1007305-16 = "You got here faster than expected. I second-guessed messaging you a lot."
1007305-17 = "I felt guilty summoning you here for no particular reason, but I just...wanted to take a walk with you."
1007305-18 = "Well, that's the big reason for coming down here."
1007305-19 = "It doesn't do much to make up for it, but..."
1007305-23 = "...Would you like a drink?"
1007305-24 = "[s1] \"A late-night Americano? Seems familiar.\"\n[s2] Take the Americano."
1007305-31 = "We walked along the beach, slowly sipping our iced Americanos."
1007305-34 = "It's unexpected... The old council had a good eye for scenery."
1007305-38 = "They found a really great spot, didn't they?"
1007305-39 = "I thought they were just a group of stubborn people, but I guess I make misjudgments at times."
1007305-40 = "Heehee..."
1007305-41 = "...Huh?"
1007305-42 = "...Sensei? What's that look?"
1007305-43 = "[s3] \"It's just nice to see you so comfortable.\"\n[s4] \"It feels like the Ui of right now could do anything.\""
1007305-48 = "Oh... I can understand that."
1007305-49 = "It seems that way, doesn't it? I think if it weren't for that feeling, I wouldn't have been able to call you."
1007305-50 = "It seems even more fitting now."
1007305-51 = "It's so dark and quiet, like anything could happen."
1007305-52 = "The dark... It gives people permission to stop focusing on appearances so much."
1007305-53 = "Maybe that's why I feel so at ease right now."
1007305-54 = "Putting it into words, I sound like some kind of vampire in a third-rate horror story..."
1007305-55 = "But I think you understand what I'm saying, right, Sensei?"
1007305-56 = "You travel a lot and come across all kinds of people in your work. I'm sure you've met more than one student like me."
1007305-57 = "Students that have no self-esteem and are conscious of everything they do, how people will perceive them..."
1007305-58 = "That makes me sounds like a pretty...timid person."
1007305-59 = "[s5] \"Well, I don't think you're like those students at all.\"\n[s6] \"I wouldn't exactly call you timid, Ui.\""
1007305-64 = "Oh..."
1007305-65 = "That's...unexpected. You really think so?"
1007305-66 = "Actually... I can see that..."
1007305-67 = "Yeah... Maybe timid isn't the right word. I might be a little too mean for that, now that I think about it."
1007305-68 = "Don't look so concerned. I don't mean that in a self-deprecating way. It's a simple fact that I can be prickly."
1007305-69 = "I can hardly deny it when I do it on purpose."
1007305-70 = "If my shell is hard enough, only the people I really want to can break through it."
1007305-71 = "Which makes it even more strange how so many people have broken through recently..."
1007305-75 = "..."
1007305-76 = "Although, it's all thanks to a certain busybody I know."
1007305-77 = "Hm... Maybe I need to become a porcupine."
1007305-78 = "[s7] \"Haha. Good joke.\"\n[s8] \"You don't mean any of that.\""
1007305-81 = "And as anticipated, you don't even bat an eye."
1007305-82 = "I'm only somewhat joking. I'm not a fan of small talk and empty conversation, anyway."
1007305-83 = "But, I know that everything you've done for me has been genuine."
1007305-84 = "So if I can change even a tiny bit, I suppose I'll have you to thank for that."
1007305-85 = "But...the parts of me that don't like dealing with other people won't ever change."
1007305-86 = "So... From time to time, if I want to whine about something..."
1007305-87 = "I just might come to you to complain and vent."
1007305-88 = "Like right now. It'll be a way we can spend time together."
1007305-89 = "...Hee."
1007305-90 = "I don't know why I'm saying all this as if I'm doing you a favor. I'm not very good at this, am I?"
1007305-91 = "You must have done something terrible in a past life to be helping someone like me now. My condolences."
1007305-92 = "[s9] \"Helping you is the best part of my job.\"\n[s10] \"I think you're pretty impressive.\""
1007305-95 = "Yeah, yeah. I could've told myself that in the mirror too."
1007305-96 = "Our conversations are starting to get cyclical, so let's move on. This isn't why I asked you to join me tonight."
1007305-97 = "I asked you here to...walk with me on the beach."
1007305-98 = "There's still some Americano left..."
1007305-99 = "You don't have to say anything until we run dry..."
1007305-103 = "So, let's just walk."
1007305-104 = "This isn't a request, by the way. You have to do it."
1007305-105 = "...Do you understand?"
1007305-109 = "[ns11] Keep drinking the Americano.\n[ns12] Slowly start walking."
1007305-112 = "Heehee."
1007305-114 = "...This feels nice."

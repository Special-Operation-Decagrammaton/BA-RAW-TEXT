1007305-5 = "#na;(늦은 밤의 해변으로 나가니, 해변가에 멍하니 서 있던 우이의 모습이 보였다.)"
1007305-6 = "#all;hide"
1007305-7 = "#wait;500"
1007305-8 = "#wait;1500"
1007305-9 = "#wait;2500"
1007305-10 = "#na;우이 수영복ND;……아. 선생님. 이쪽이에요."
1007305-11 = "#st;[0,0];instant;1;"
1007305-12 = "#clearST"
1007305-13 = "#wait;1200"
1007305-14 = "#wait;1200"
1007305-15 = "3;우이 수영복ND;01\n#3;a\n#wait;1500"
1007305-16 = "3;우이 수영복ND;02;금방 와 주셨군요. 실은 메시지 보내고 나서, 괜한 짓 한 거 아닌가 살짝 후회했었는데…….\n#3;em;…"
1007305-17 = "3;우이 수영복ND;01;별다른 이유가 있어서 부른 것도 아니니까요. 그냥 좀 걸었으면 좋겠다……. 그렇게 생각했을 뿐."
1007305-18 = "3;우이 수영복ND;99;뭐……. 이미 이렇게 돼 버린 거, 어쩔 수 없겠죠."
1007305-19 = "3;우이 수영복ND;01;그 대신이라긴 뭣하지만……. 이거라도……."
1007305-20 = "#st;[0,0];instant;1;"
1007305-21 = "#clearST"
1007305-22 = "3;우이 수영복ND;01\n#3;greeting\n#wait;1500"
1007305-23 = "3;우이 수영복ND;03;……같이 한잔하실까요?"
1007305-24 = "[s1] \"늦은 밤 아메리카노라. 익숙하네.\"\n[s2] 아이스 아메리카노를 받아 든다."
1007305-25 = "#st;[0,0];instant;1;"
1007305-26 = "#st;[0,0];instant;1;"
1007305-27 = "#clearST"
1007305-28 = "#wait;1500"
1007305-29 = "#all;hide"
1007305-30 = "#wait;500"
1007305-31 = "#na;(이후 각자가 든 아이스 아메리카노를 마시며 해변가를 거닐었다.)"
1007305-32 = "#all;hide"
1007305-33 = "#wait;500"
1007305-34 = "3;우이 수영복ND;02;의외로……. 장소 보는 안목은 있었나 보네요, 고대 성도회 사람들도.\n#3;a"
1007305-35 = "#st;[0,0];instant;1;"
1007305-36 = "#clearST"
1007305-37 = "3;우이 수영복ND;01\n#3;m4\n#wait;1500"
1007305-38 = "3;우이 수영복ND;99;이런 훌륭한 곳을 잘도 찾아서는……."
1007305-39 = "3;우이 수영복ND;02;완전 꽉 막힌 집단이라고만 생각했는데, 조금은 다양한 면이 있는 것일지도요."
1007305-40 = "3;우이 수영복ND;09;흐흐…….\n#3;stiff"
1007305-41 = "3;우이 수영복ND;01;……음?\n#3;em;[?]"
1007305-42 = "3;우이 수영복ND;02;선생님……? 왜……. 그렇게 빤히 보시는 건가요……?\n#3;m3"
1007305-43 = "[s3] \"아니, 그냥. 편해 보여서 보기 좋아.\"\n[s4] \"지금의 우이는 여유가 있어 보여서.\""
1007305-44 = "#st;[0,0];instant;1;"
1007305-45 = "#st;[0,0];instant;1;"
1007305-46 = "#clearST"
1007305-47 = "3;우이 수영복ND;04\n#3;em;…\n#wait;2500"
1007305-48 = "3;우이 수영복ND;06;아아. 난 또 뭐라고……. 그런 이야기셨군요.\n#3;em;[한숨]"
1007305-49 = "3;우이 수영복ND;08;그렇죠. 실제로 그런 느낌이에요. 그런 의미에서, 용기를 내 선생님을 부른 거기도 하고."
1007305-50 = "3;우이 수영복ND;99;그야 그럴 게……."
1007305-51 = "3;우이 수영복ND;01;……일단 어두워졌으니까요."
1007305-52 = "3;우이 수영복ND;02;사람도 없고 조용한 곳. 거기다 어두워서 굳이 모습을 크게 신경 쓰지 않아도 되는 느낌."
1007305-53 = "3;우이 수영복ND;03;저에게는 최고의 상황이라고 할 수 있겠네요."
1007305-54 = "3;우이 수영복ND;04;말하고 나니 뭔가 어둠의 자식이나 책에서 나오는 흡혈귀도 아니고……라는 느낌인데…….\n#3;em;[세로선]\n#3;stiff"
1007305-55 = "3;우이 수영복ND;02;굳이 구구절절 설명 안 해도 무슨 느낌인지는 알아주실 거라 생각해요. 선생님이라면."
1007305-56 = "3;우이 수영복ND;01;선생님은 많은 학생들을 보실 테니까, 저 같은 타입도……. 이미 많이 보셨을 거고."
1007305-57 = "3;우이 수영복ND;08;저처럼 자신에게 당당하지 못하고, 타인을 지나치게 신경 쓰는 녀석들은 다 마찬가지잖아요?\n#3;em;[반응]"
1007305-58 = "3;우이 수영복ND;99;말하자면 소심쟁이……라는 걸까요."
1007305-59 = "[s5] \"뭐, 우이는 또 약간 별개의 타입이지만.\"\n[s6] \"막상 소심과는 거리가 멀지, 우이는.\""
1007305-60 = "#st;[0,0];instant;1;"
1007305-61 = "#st;[0,0];instant;1;"
1007305-62 = "#clearST"
1007305-63 = "3;우이 수영복ND;01\n#3;em;[?]\n#wait;1200"
1007305-64 = "3;우이 수영복ND;04;……어라…….\n#3;stiff"
1007305-65 = "3;우이 수영복ND;02;그건 좀……. 의외의 반응이네요. 정말 그런가요……?"
1007305-66 = "3;우이 수영복ND;07;그런가……. 으음……. 어쩌면 그럴지도…….\n#3;em;…"
1007305-67 = "3;우이 수영복ND;01;하긴, 전 소심하다기보다는 성질이 나쁘다 쪽에 가까운 것 같기는 하네요. 생각해 보니."
1007305-68 = "3;우이 수영복ND;08;아, 딱히 나쁜 소리 하려던 건 아니었으니까 괜찮아요. 그냥 스스로 좀 까칠하다는 말일 뿐.\n#3;em;[반응]"
1007305-69 = "3;우이 수영복ND;01;사실은 사실이죠. 그 부분은 스스로 의도한 거기도 하고요."
1007305-70 = "3;우이 수영복ND;02;기본적으로 선을 긋고……. 넘어올 사람과 막을 사람을 구분하는 타입이잖아요."
1007305-71 = "3;우이 수영복ND;07;오히려 그렇게 생각해 보면……. 요새는 좀 많은 사람들이 넘어오고 있어서 곤란한 수준인데……."
1007305-72 = "#st;[0,0];instant;1;"
1007305-73 = "#clearST"
1007305-74 = "3;우이 수영복ND;07\n#3;em;…\n#3;h\n#wait;2500"
1007305-75 = "3;우이 수영복ND;16;…………."
1007305-76 = "3;우이 수영복ND;16;어떤 능글맞은 분 덕분에, 말이죠.\n#3;em;[빠직]"
1007305-77 = "3;우이 수영복ND;05;이후로는 까칠함의 농도를 좀 더 올리는 게 좋을지도 모르겠어요. 지금보다."
1007305-78 = "[s7] \"하하. 재미있는 농담을 하네.\"\n[s8] \"또 마음에도 없는 소리를.\""
1007305-79 = "#wait;10"
1007305-80 = "#wait;10"
1007305-81 = "3;우이 수영복ND;15;예상은 했지만 이젠 아예 곤란한 척도 안 해주시는군요.\n#3;em;[한숨]"
1007305-82 = "3;우이 수영복ND;99;뭐, 좋아요. 입 발린 말을 싫어하는 저로서는 그쪽이 차라리 이야기 나누기 편하기도 하죠."
1007305-83 = "3;우이 수영복ND;08;어련히 좋은 의도로 해주시는 일일 거라는 것도 의심하지는 않고 있고 말이죠."
1007305-84 = "3;우이 수영복ND;01;조금씩이라도, 그런 식이라도 제가 변할 수 있다면 그 또한 저로선 감사드릴 일이고요."
1007305-85 = "3;우이 수영복ND;02;하지만 휘둘리기만 하는 느낌이 싫은 건 어쩔 수 없는 거니까."
1007305-86 = "3;우이 수영복ND;07;가끔씩은……. 응석이든 뭐든…….\n#3;em;…"
1007305-87 = "3;우이 수영복ND;01;선생님께…… 쌓인 걸 푸는 순간이 오게 될지도 모르겠네요."
1007305-88 = "3;우이 수영복ND;03;바로 지금처럼……. 이렇게 어울려 달라는 식으로 말이죠."
1007305-89 = "3;우이 수영복ND;09;……흐.\n#3;stiff"
1007305-90 = "3;우이 수영복ND;06;뭐 잘하는 짓이라고 대놓고 이런 말을……. 정말이지 성질머리가 나쁘네요. 저라는 녀석."
1007305-91 = "3;우이 수영복ND;03;어쩌다 이런 녀석에게 걸리셨는지는 몰라도, 심심한 애도를 표해드리도록 할게요."
1007305-92 = "[s9] \"혼자 다 해결할 거면, 선생님은 필요 없겠지.\"\n[s10] \"학생답게 잘 하고 있다고 생각하는데.\""
1007305-93 = "#wait;10"
1007305-94 = "#wait;10"
1007305-95 = "3;우이 수영복ND;07;예이, 예이. 딱 생각하고 있던 대로의 대답.\n#3;em;[한숨]"
1007305-96 = "3;우이 수영복ND;01;같은 말 계속 반복하고 싶지는 않으니, 이 주제는 여기까지만 하도록 하죠. 이런 말 계속하자고 부른 건 아니니까요."
1007305-97 = "3;우이 수영복ND;02;처음부터 말씀드렸듯……. 하고 싶었던 건 그냥 같이 걷는 것뿐."
1007305-98 = "3;우이 수영복ND;01;아직 아메리카노는 많이 남았으니까……."
1007305-99 = "3;우이 수영복ND;99;다 없어질 때까지. 그냥……. 아무 말 안 하셔도 좋으니까……."

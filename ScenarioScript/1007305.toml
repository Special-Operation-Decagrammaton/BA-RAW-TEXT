[translation]
1007305-1 = "เหล่าผู้คนที่ก้าวล้ำเข้ามา"
1007305-5 = "(พอเดินออกมาที่ชายหาดตอนกลางดึก คุณครูก็เห็นอุยยืนเหม่ออยู่ที่ชายหาด)"
1007305-10 = "อ๊ะ... ทางนี้ค่ะคุณครู"
1007305-16 = "มาเร็วจังเลยนะคะ ที่จริงพอหลังจากส่งข้อความไปแล้ว ฉันก็รู้สึกเสียใจนิดหน่อยว่าทำอะไรที่ไม่เป็น#nเรื่องลงไปซะแล้ว..."
1007305-17 = "ฉันไม่ได้เรียกคุณครูออกมาเพราะมีเรื่องอะไรเป็นพิเศษหรอกค่ะ แค่คิดว่า... ถ้าได้เดินเล่นสักหน่อย#nก็น่าจะดีน่ะค่ะ..."
1007305-18 = "ก็นะ... ในเมื่อมันเป็นแบบนี้ไปแล้ว ก็คงช่วยไม่ได้นะคะ"
1007305-19 = "ถึงมันจะทดแทนกันไม่ได้..."
1007305-23 = "แต่ว่า... คุณครูอยากจะดื่มด้วยกันสักแก้วมั้ยคะ?"
1007305-24 = "[s1] \"อเมริกาโน่เย็นกลางดึกงั้นเหรอ คุ้นๆ นะเนี่ย\"\n[s2] รับแก้วอเมริกาโน่เย็นมาถือไว้"
1007305-31 = "(จากนั้นทั้งสองคนก็ดื่มอเมริกาโน่และเดินเล่นที่ชายหาดด้วยกัน)"
1007305-34 = "คาดไม่ถึงเลย สาวกโบราณพวกนั้นก็ตาถึงเรื่องสถานที่เหมือนกันนะคะ... "
1007305-38 = "ถึงรู้จักสถานที่ยอดเยี่ยมแบบนี้ได้..."
1007305-39 = "คิดว่าพวกเขาเป็นกลุ่มที่ดื้อดึงแบบไร้เหตุผลซะอีก แต่พวกเขาก็มีหลายๆ มุมอยู่เหมือนกันนะคะ"
1007305-40 = "อื้มมม..."
1007305-41 = "...หืม?"
1007305-42 = "คุณครู...? ทำไมถึงจ้องเขม็งแบบนั้นล่ะคะ...?"
1007305-43 = "[s3] \"เปล่าหรอก ก็แค่...เธอดูทำตัวสบายๆ ดีน่ะ\"\n[s4] \"ตอนนี้อุยดูผ่อนคลายดีน่ะ\""
1007305-48 = "อ่า... จะว่ายังไงดี... พูดแบบนั้นอีกแล้วนะคะ"
1007305-49 = "ใช่มั้ยล่ะคะ อันที่จริงฉันก็รู้สึกแบบนั้นแหละค่ะ ก็เลยรวบรวมความกล้าเรียกคุณครูมา..."
1007305-50 = "นอกจากนี้..."
1007305-51 = "...และตอนนี้ก็มืดแล้วด้วยค่ะ"
1007305-52 = "สถานที่เงียบสงบไร้ผู้คน นอกจากนี้บรรยากาศรอบๆ ก็มืดลงแล้ว ทำให้ไม่ต้องสนใจเรื่องรูปลักษณ์..."
1007305-53 = "อาจเรียกว่าเป็นช่วงเวลาที่เหมาะที่สุดสำหรับฉันเลยก็ได้ค่ะ"
1007305-54 = "พูดแล้วก็ฟังดูเหมือนเป็นเด็กแห่งความมืดมนหรือแวมไพร์ที่เคยเห็นในหนังสือ อะไรประมาณนั้นเลย..."
1007305-55 = "ฉันคิดว่าคงไม่ต้องอธิบายอะไรมากนัก คุณครูก็คงจะเข้าใจดีว่าเป็นความรู้สึกแบบไหนน่ะค่ะ"
1007305-56 = "คุณครูต้องคอยดูแลนักเรียนหลายๆ คน คงเคยเจอนักเรียนแบบฉันมาเยอะสินะคะ..."
1007305-57 = "เด็กนักเรียนที่ไม่มั่นในใจตัวเองอย่างฉัน หรือเด็กที่เอาแต่สนใจสายตาคนรอบข้างจนเกินความจำเป็น#nก็คงจะเหมือนกันหมดใช่มั้ยล่ะคะ?"
1007305-58 = "พูดง่ายๆ ก็คือพวกเด็กขี้ขลาด...ละมั้งคะ"
1007305-59 = "[s5] \"ก็นะ อุยเป็นเด็กที่ต่างไปนิดหน่อยนั่นแหละ\"\n[s6] \"อุยน่ะ ห่างไกลกับคำว่าขี้ขลาดเยอะเลยนะ\""
1007305-64 = "...เอ๋..."
1007305-65 = "คือว่า... คำตอบต่างจากที่คิดไว้เลยนะคะ มันจะเป็นแบบนั้นจริงเหรอคะ...?"
1007305-66 = "อย่างนั้นเหรอคะ... อืม... อาจจะเป็นอย่างนั้นก็ได้..."
1007305-67 = "นั่นสินะ พอคิดดูแล้ว ฉันคงดูเป็นพวกหัวร้อนง่ายมากกว่าเป็นพวกขี้ขลาดสินะคะ "
1007305-68 = "อ๊ะ ฉันไม่ได้จะสื่อในทางที่ไม่ดีหรอกนะคะ ไม่เป็นไรค่ะ แค่จะบอกว่าตัวเองเป็นคนจู้จี้จุกจิกก็เท่านั้น"
1007305-69 = "ความจริงก็คือความจริงวันยันค่ำนี่คะ คงปฏิเสธไม่ได้หรอกค่ะ"
1007305-70 = "โดยพื้นฐานแล้ว... ฉันเป็นพวกที่จะขีดเส้นและสร้างกำแพงไว้ และเปิดใจให้เฉพาะคนที่โอเคด้วยจริงๆ"
1007305-71 = "กลายเป็นว่าพอทำแบบนั้น... ช่วงนี้กลับมีคนข้ามกำแพงนั้นเข้ามามากซะจนลำบากใจเลยค่ะ..."
1007305-75 = "......"
1007305-76 = "ต้องขอบคุณคนที่รู้ว่าใครที่ฉันรู้จักดีเลยแหละค่ะ"
1007305-77 = "หลังจากนี้ฉันคงจะต้องเพิ่มความจู้จี้จุกจิกให้มากขึ้นซะแล้ว..."
1007305-78 = "[s7] \"ฮ่าฮ่า พูดเล่นตลกดีนะ\"\n[s8] \"ปากไม่ตรงกับใจอีกแล้ว\""
1007305-81 = "เดี๋ยวนี้ไม่แกล้งทำเป็นลำบากใจแล้วสินะคะ"
1007305-82 = "แต่แบบนั้นก็ดีค่ะ ฉันเองก็ไม่ชอบคำพูดที่ไร้ความจริงใจอยู่แล้ว แบบนี้คงคุยกันสบายขึ้นค่ะ"
1007305-83 = "หรืออีกนัยหนึ่งก็คือ... ฉันรู้ดีนะคะว่าทุกอย่างที่คุณครูทำให้เพราะมีเจตนาดี"
1007305-84 = "ถ้าฉันเปลี่ยนแปลงตัวเองได้สักนิดละก็... ก็คงต้องขอบคุณคุณครูเลยละค่ะ"
1007305-85 = "แต่เรื่องที่ไม่ชอบการเข้าไปวุ่นวายกับคนอื่น... คงจะเปลี่ยนยากแน่ๆ ค่ะ"
1007305-86 = "เพราะงั้น... ถ้าฉันอยากจะบ่นอะไรสักอย่างละก็..."
1007305-87 = "ฉันอาจจะมานั่งบ่นให้คุณครูฟังก็ได้นะคะ"
1007305-88 = "เหมือนอย่างตอนนี้... เหมือนกับที่ขอให้ออกมาเดินด้วยกันแบบนี้น่ะค่ะ"
1007305-89 = "...ฮุ..."
1007305-90 = "พูดอะไรก็ไม่รู้... จริงๆ เลย เด็กอย่างฉันนี่นิสัยไม่ดีเลยนะคะ"
1007305-91 = "ไม่รู้ว่าคุณครูมาติดแหง็กอยู่กับเด็กแบบนี้ได้ยังไง... เสียใจด้วยนะคะคุณครู"
1007305-92 = "[s9] \"ถ้าแก้ไขเองได้ทุกเรื่อง คนอย่างครูก็คงไม่จำเป็นแล้วน่ะสิ\"\n[s10] \"ครูคิดว่าอุยทำได้ดีสมกับเป็นนักเรียนอยู่แล้วนะ\""
1007305-95 = "ดูสิๆ คิดแล้วเชียวว่าจะต้องตอบมาแบบนี้"
1007305-96 = "ฉันไม่อยากพูดอะไรซ้ำอีก เอาเป็นว่าพักเรื่องนี้เอาไว้เท่านี้เถอะค่ะ แถมฉันก็ไม่ได้เรียกคุณครูออกมา#nเพื่อคุยเรื่องพวกนี้ด้วยค่ะ"
1007305-97 = "อย่างที่ฉันบอกไปตั้งแต่แรก... ว่าแค่อยากออกมาเดินด้วยกันเฉยๆ"
1007305-98 = "อเมริกาโน่ก็ยังเหลืออยู่อีกเยอะเลย..."
1007305-99 = "ไม่ต้องพูดอะไร จนกว่าจะดื่มหมดก็ได้นะคะ..."
1007305-103 = "...เราเดินต่อกันเถอะค่ะ"
1007305-104 = "นี่ไม่ใช่คำขอหรอกนะคะ แต่เป็นสิ่งที่คุณครูต้องทำค่ะ"
1007305-105 = "...เข้าใจมั้ยคะ?"
1007305-109 = "[ns11] ดื่มอเมริกาโน่ต่อ\n[ns12] ค่อยๆ เดินไปช้าๆ"
1007305-112 = "...ฮู่ว..."
1007305-114 = "...ดีจังเลยนะคะ"

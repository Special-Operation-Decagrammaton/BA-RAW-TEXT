[translation]
1007305-1 = "越過界線的人們"
1007305-5 = "（在深夜時分的海邊，發現了呆呆站在沙灘上的憂的身影）"
1007305-10 = "……啊，老師。我在這邊。"
1007305-16 = "想不到老師這麼快就來了。#n其實在傳了訊息後覺得有點後悔……"
1007305-17 = "因為真的不是什麼重要的事。#n只是想……一起散散步而已。"
1007305-18 = "但……既然老師都已經來了，也沒辦法了吧。"
1007305-19 = "雖然可能算不上是補償……老師要不要也……"
1007305-23 = "……一起喝一杯呀？"
1007305-24 = "[s1]「深夜的黑咖啡，感覺真熟悉。」\n[s2] 接過冰咖啡"
1007305-31 = "（和憂各自喝著手上的冰咖啡在海邊散步）"
1007305-34 = "聖徒會居然能找到這麼好的地方……真讓人意外。"
1007305-38 = "本來還以為他們是個僵化且古板的組織……"
1007305-39 = "看來似乎並非如此呢。"
1007305-40 = "呵呵……"
1007305-41 = "……嗯？"
1007305-42 = "老師……？#n為，為什麼要那樣盯著我看……？"
1007305-43 = "[s3]「沒事，只是覺得今天憂的表情比平時更放鬆。」\n[s4]「因為現在的憂看起來很放鬆。」"
1007305-48 = "啊啊，我還以為……原來是這樣啊。"
1007305-49 = "是啊，我也這麼覺得。#n所以才會鼓起勇氣聯絡老師。"
1007305-50 = "而且……"
1007305-51 = "……現在天色也暗了。"
1007305-52 = "空無一人的安靜之處。#n這麼暗的話，也不必在意別人的目光了。"
1007305-53 = "對我來說，這簡直是最棒的環境。"
1007305-54 = "如果只聽剛才這句話，怎麼感覺我就像黑暗之子還是書裡的吸血鬼之類的……"
1007305-55 = "不過就算不用我特地說明，老師應該也早就明白了吧。"
1007305-56 = "畢竟老師已經見過很多學生……"
1007305-57 = "在那之中，應該也有像我一樣……#n對自己沒有自信，總是過度在意他人目光的膽小鬼吧？"
1007305-58 = "我並不覺得……自己有什麼特別。"
1007305-59 = "[s5]「嗯，不過憂就是憂哦。」\n[s6]「憂和膽小這兩個字還差得遠呢。」"
1007305-64 = "是嗎……？"
1007305-65 = "那個回答……好像有點意外。#n真的是這樣嗎……？"
1007305-66 = "唔嗯……或許是吧……"
1007305-67 = "仔細想想，我與其說是膽小，也許更偏向不好相處吧。"
1007305-68 = "啊，我沒有貶低自己的意思，請不要擔心。#n這是事實沒錯，我對此也有自覺。"
1007305-69 = "而且有時，我也是刻意這麼做的……"
1007305-70 = "因為這樣……就能避免他人進入我的舒適圈。"
1007305-71 = "不過……最近的不速之客似乎變多了，讓我有點傷腦筋……"
1007305-75 = "…………"
1007305-76 = "多虧某個狡猾的人。"
1007305-77 = "以後或許該讓自己變得更難搞才行。"
1007305-78 = "[s7]「哈哈，憂真會開玩笑。」\n[s8]「又說這種口是心非的話。」"
1007305-81 = "老師現在連假裝尷尬都不裝了呢，雖然我早就知道了。"
1007305-82 = "唔，好吧。反正我也不喜歡拐彎抹角的人……這樣有話直說反而比較自在。"
1007305-83 = "老師想必也是出於好意吧，這點我並不懷疑。"
1007305-84 = "如果或多或少……能讓我有所改變的話，對我而言也是件值得感激的事。"
1007305-85 = "但……我可不是一個喜歡任人擺布的人哦。"
1007305-86 = "也，也許偶爾……會用撒嬌或其他方式……"
1007305-87 = "讓老師放鬆下來……也說不定。"
1007305-88 = "比如……像現在這樣，創造兩人獨處的時間之類的。"
1007305-89 = "……呵。"
1007305-90 = "真虧我敢在老師面前說這種話……看來我的個性實在是糟透了。"
1007305-91 = "居然被我這種人抓到，算老師你運氣不好哦。"
1007305-92 = "[s9]「如果自己就能解決一切，那就不需要老師了。」\n[s10]「我覺得憂很有學生的樣子，而且相當努力哦。」"
1007305-95 = "是是是，就知道老師會這樣回答。"
1007305-96 = "這個話題就到此為止吧。#n今天找老師來也不是想說這些……"
1007305-97 = "就像一開始說的一樣……只是想跟老師一起散散步而已。"
1007305-98 = "咖啡還剩很多……"
1007305-99 = "在全部喝完之前……就算一句話都不說也行……"
1007305-103 = "……一起散散步吧。"
1007305-104 = "這不是拜託，老師必須陪我走才行。"
1007305-105 = "……可以吧？"
1007305-109 = "[ns11] 繼續喝黑咖啡\n[ns12] 緩緩邁出步伐"
1007305-112 = "……呵呵……"
1007305-114 = "……感覺真不錯。"

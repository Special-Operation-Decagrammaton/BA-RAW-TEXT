[translation]
84300300500-5 = "ทำลายงานมิลเลเนียม เอ็กซ์โปงั้นเหรอ... แล้วจะได้ผลประโยชน์อะไรจากการทำลายงานนะ..."
84300300500-6 = "นี่อาจจะเกี่ยวข้องกับการขายสิ่งของในงานให้เป็นเงิน และอาจจะมีจุดประสงค์อื่นๆ อีกก็ได้"
84300300500-7 = "แต่คุณดูไม่แปลกใจเลยนะคะ"
84300300500-8 = "อื้อ ที่จริงฉันก็ไม่แปลกใจหรอก "
84300300500-9 = "นั่นเป็นสิ่งที่ฉันคาดไว้อยู่แล้ว แล้วฉันก็มาที่นี่เพื่อรับมือกับสิ่งนั้นด้วย"
84300300500-10 = "และผลลัพธ์ก็จะขึ้นอยู่กับสิ่งที่เราจะทำต่อจากนี้นี่ละ"
84300300500-14 = "ต่อไปฉันจะสรุปสถานการณ์ให้ฟัง คิดว่าเป็นการบรีฟงานอย่างหนึ่งแล้วกัน"
84300300500-15 = "ตอนนี้มิลเลเนียมกำลังจัดงาน <มิลเลเนียม เอ็กซ์โป> มันเป็นงานขนาดใหญ่ของโรงเรียน และระหว่างที่มีการเตรียมงานนั้น ฉันก็พบข้อมูลชุดหนึ่งที่น่าสงสัย"
84300300500-16 = "โชคร้ายที่ข้อมูลนั้นดันเป็นความจริงขึ้นมา พวกเราก็เลยต้องสืบหาและคลี่คลายปัญหานั้นก่อนที่มันจะ#nโผล่ขึ้นมาอยู่บนผิวน้ำ"
84300300500-19 = "ยูริโซโนะ เซอา ช่วยใช้ประโยชน์จากการเป็นผู้เข้าร่วมในงาน แล้วสำรวจสถานที่จัดงานและบริเวณ#nรอบๆ ให้ทีสิ ถ้าคุณไปเตร็ดเตร่หรือถามอะไรจากใครในงาน ก็คงไม่ถูกสงสัยหรอก"
84300300500-20 = "งานของคุณคือการสำรวจสถานที่จัดงาน สืบหาเบื้องหลังอันเลวร้ายของแผนการทำลายงาน และมาแจ้งให้พวกเรารู้ คุณได้งานที่สำคัญมากๆ เลยละ"
84300300500-21 = "ระหว่างนี้ฉันกับเนรุจะตรวจสอบศูนย์ข้อมูลของมิลเลเนียมเพื่อวิเคราะห์กระแสของข้อมูลให้ชัดเจนขึ้น ฉันคงออกโรงให้ใครเห็นไม่ได้ในสถานการณ์นี้ ก็เลยต้องทำภารกิจอย่างลับๆ"
84300300500-24 = "ในเมื่อคนพวกนั้นเริ่มลงมือกันแล้ว ฉันก็มองว่าพวกเราก็ไม่มีเวลากันมากแล้วละ ฉันจะขอเริ่มปฏิบัติการเดี๋ยวนี้เลย"
84300300500-28 = "และชื่อปฏิบัติการก็คือ... <ส่งน้ำชาเข้าไป>"
84300300500-32 = "คะ...? ปฏิบัติการ... อะไรนะคะ?"
84300300500-33 = "ส่งน้ำชาเข้าไป... ก็คุณ... มาจากสภาน้ำชา..."
84300300500-34 = "..."
84300300500-35 = "ถึงมันอาจจะฟังดูแปลกๆ แต่ฉันเริ่มชินแล้วละ ถ้าจะทำงานกับยัยนั่นก็ต้องยอมรับเงื่อนไขนี้ให้ได้น่ะนะ"
84300300500-36 = "..."
84300300500-37 = "ค่ะ..."

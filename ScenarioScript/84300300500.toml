[translation]
84300300500-5 = "千年博覽會的悲劇收場……還有因此產生的收益……"
84300300500-6 = "這件事可能與做空有關，但根本的目的應該會更加多樣。"
84300300500-7 = "你似乎一點也不驚訝。"
84300300500-8 = "嗯，確實如此。"
84300300500-9 = "因為這也在我的預料之內。#n我正是為了應對這種事而來的。"
84300300500-10 = "而最終的結果，將取決於我們接下來的行動。"
84300300500-14 = "我現在開始整理狀況。大家就當作在聽簡報吧。"
84300300500-15 = "目前千年正在舉行大型活動「千年博覽會」。#n而我在活動的準備過程中，發現了一連串不自然的數據流向。"
84300300500-16 = "不幸的是，這一點已經受到了證實，因此我們得趁事情浮出水面之前盡快解決。"
84300300500-19 = "百合園聖亞，請你利用交流會參加者的身分，對活動現場周圍進行調查。#n如果是你的話，即便四處打聽消息應該也不會被懷疑才對。"
84300300500-20 = "藉由調查現場，查明並回報與本次事件的幕後黑手有關的情報。#n這是個非常重要的任務。"
84300300500-21 = "我和寧瑠會在這段期間調查千年的資料中心，藉此掌握更加準確的數據流向。#n由於情況特殊，我很難親自出面，因此這部分將屬於潛入任務。"
84300300500-24 = "既然對方已經開始行動，留給我們的時間也不多了。#n立刻開始行動吧。"
84300300500-28 = "作戰名稱為……「水桶行動」。"
84300300500-32 = "……嗯？什麼行動……？"
84300300500-33 = "聲東擊西……聲東……水桶……"
84300300500-34 = "…………"
84300300500-35 = "我知道聽起來很奇怪，但努力習慣吧。#n想跟那傢伙一起工作的話，習慣這種事是必要條件。"
84300300500-36 = "…………"
84300300500-37 = "……嗯。"

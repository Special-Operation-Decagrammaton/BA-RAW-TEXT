84300300500-5 = "3;리오;99;밀레니엄 엑스포의 파국이라……. 그리고 그것으로 인한 수익…….\n#3;a"
84300300500-6 = "3;리오;01;공매도와 관련된 것일 수도 있고, 근본적인 목적은 조금 더 다양하겠네."
84300300500-7 = "3;세이아;00;의외로 놀라지 않으시는군요."
84300300500-8 = "3;리오;00;응. 사실 그래. \n#3;em;[반응]"
84300300500-9 = "3;리오;01;예상 범위 내의 일이고, 오히려 그런 걸 대비해서 온 것이기도 하니까."
84300300500-10 = "3;리오;99;그리고 그 결과는, 지금부터 우리가 어떻게 하느냐에 따라 달린 거기도 하지."

84300300500-13 = "3;리오;99\n#3;em;…\n#wait;2500"
84300300500-14 = "3;리오;05;지금부터 상황을 정리할게. 일종의 브리핑이라 생각하고 들어줘."
84300300500-15 = "3;리오;01;현재 밀레니엄은 <밀레니엄 엑스포>라는 큰 행사를 진행하고 있어. 그리고 나는, 그 행사의 준비 과정에서 일련의 불길한 데이터 흐름을 파악했지."
84300300500-16 = "3;리오;99;불행히도 그것은 사실임이 밝혀졌고, 이제 우리는 그 사태가 수면위로 드러나기 전에 찾아서 해결해야만 해."
84300300500-17 = "#all;hide"
84300300500-18 = "#wait;500"
84300300500-19 = "#na;리오;유리조노 세이아, 당신은 교류회의 참가자라는 신분을 활용해 행사장과 그 주변을 조사해 줘. 당신이라면 물어보고 다녀도 의심받지 않겠지."
84300300500-20 = "#na;리오;그렇게 행사장을 조사하며, 이번 사태의 흑막과 관련된 것들을 알아내서 알려주는 일이야. 아주 중요한 일이지."
84300300500-21 = "#na;리오;그사이 나와 네루는 보다 정확한 데이터 흐름을 파악하기 위해, 밀레니엄의 데이터 센터를 조사할 거야. 상황상 내가 나서긴 힘드니, 이 부분은 잠입 임무가 되겠지."

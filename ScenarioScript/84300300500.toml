[translation]
84300300500-5 = "Ruining Millennium Expo...and profiting from it somehow..."
84300300500-6 = "...Someone could be plotting to short stocks. That could be the basic idea, at least."
84300300500-7 = "You don't seem surprised."
84300300500-8 = "That's because I'm not. "
84300300500-9 = "I'd already drawn up a number of hypotheses. This was one of them, or close enough to it."
84300300500-10 = "Now everything depends on what we do from here on out."
84300300500-14 = "Let me lay out what we know so far. Consider it a briefing, of sorts."
84300300500-15 = "As we speak, Millennium is hosting a large event known as the Millennium Expo. And during the preparation phase, I found a series of suspicious data packets."
84300300500-16 = "Unfortunately, someone is indeed plotting against the festival, and now we have to find them before they can execute that plot."
84300300500-19 = "Yurizono Seia. You'll use your status as an invited guest to investigate the event hall and its surroundings. Even if you ask questions, I don't think anyone will suspect you."
84300300500-20 = "Your job is to gather any information you can, about who's behind this, and share it with us immediately. It's a very important role."
84300300500-21 = "While you're doing that, Neru and I will investigate Millennium's Data Center to track those data packets. Circumstances being what they are, I'll have to remain undetected."
84300300500-24 = "Given that their agents are already here, I doubt we have much time. We'll have to get to work immediately."
84300300500-28 = "Commence \"Operation Paint.\""
84300300500-32 = "...? What? Operation what...?"
84300300500-33 = "Operation Paint. It's a play on the word \"feint\"..."
84300300500-34 = "..."
84300300500-35 = "This is how she is. Get used to it."
84300300500-36 = "..."
84300300500-37 = "...All right, then."

80000044-71 = "5;모모이;99;그게……. 원래 계획은, 멋지게 대회에서 우승해서…… 그, 트로피랑 함께 초콜릿을 선물하는 거였지만."
80000044-72 = "5;모모이;04;그건 실패해버렸구. 하지만 그렇다고 포기하기엔 억울하고 분하니까.\n#5;stiff"
80000044-73 = "5;모모이;05;이거! 일단은 여기서 따낸 거니까. 내가 직접 따낸 상품을 선생님에게 선물한다!\n#5;hophop"

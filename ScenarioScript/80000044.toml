80000044-66 = "5;모모이;03;무엇을 숨기랴~! 오늘 열렸던 격투 게임 대회 <카시오페이아의 권 ~우파루파 대열전~>의 마스코트 캐릭터 피규어 장난감이 든 초콜릿!\n#5;hophop\n#5;m3"

[translation]
80000044-1 = "A Gamer's Determination"
80000044-2 = "A fighting game tournament was being held at the arcade to celebrate Valentine's Day...for some reason."
80000044-9 = "This is gonna be my day! Victory will be mine, and that first-place chocolate is coming home with me!"
80000044-10 = "Stand back and watch the master at work, Sensei!"
80000044-11 = "The legend of Champion Saiba Momoi begins now!"
80000044-12 = "LET'S FREAKING GOOOOOO!!!"
80000044-20 = "Noooooo! How could I get bounced in the first round?!"
80000044-22 = "I had no choice but to comfort Momoi after she was eliminated from the tournament."
80000044-23 = "I can't believe this. It was totally unfair!"
80000044-24 = "They just kept mashing the same kick over and over!"
80000044-25 = "Sure, it's not against the rules, but it's cheap."
80000044-26 = "A real gamer fights fair and honest!"
80000044-27 = "[s] \"It was cool how you popped your ultimate with almost no HP left.\""
80000044-28 = "Right?! My back was against the wall, so I had no choice but to create an opening!"
80000044-29 = "That's Angry Arts—an ult made especially for low HP situations."
80000044-30 = "[s] \"Though it looked like they saw it coming.\""
80000044-31 = "Ahhhhhh! It's not fair!!!"
80000044-32 = "*sigh* Anyway... I'm bummed I couldn't win that chocolate."
80000044-33 = "[s] \"You really wanted it, huh?\""
80000044-34 = "I mean, how many times does someone get to compete in Valentine's Day fighting game tournaments in their life?"
80000044-35 = "Besides, my strat was to win that chocolate prize..."
80000044-36 = "...and then give it to you as a present."
80000044-37 = "[s] \"'Strat'?\""
80000044-38 = "You didn't hear anything! Delete what I just said from your internal storage.#nThat was supposed to be a surprise!"
80000044-39 = "Geez. I keep leaving my guard wide open today."
80000044-40 = "[s] \"It's the thought that counts. Thanks, Momoi.\""
80000044-41 = "*gasp* It's Sensei's finishing move! Thoughtful dialog patterns!#nI knew it was only a matter of time."
80000044-42 = "It's no fair how you can say cool, adult things so easily!"
80000044-46 = "B-But I can't just let things end like this. I've gotta do something else before we leave."
80000044-52 = "Hmm? What's that sound? Is that a claw machine I hear?!"
80000044-53 = "I've got it! Wait here, Sensei!"
80000044-57 = "[ns] \"Where are you going Momoi?!\""
80000044-62 = "I've returned, Sensei, and I come bearing a gift!"
80000044-64 = "[s] \"Chocolate with a toy inside of it?\""
80000044-65 = "Heh! Nothing gets by you."
80000044-66 = "This chocolate egg contains a figure of the mascot from the fighting game#nI was playing earlier: \"The Fist of Cassiopeia - Upalupa Great Battle\".#nThere are a total of seven figures in the set altogether."
80000044-67 = "Not many know this, but there's a term for these sorts of things in the industry.#nIt's called..."
80000044-68 = "...a shokugan! In other words, a small toy that comes with food."
80000044-69 = "[s1] \"Is that really an official term?\"\n[s2] \"You sure know a lot about this.\""
80000044-70 = "My initial strat was to win the tournament and give you the chocolate prize..."
80000044-71 = "My initial strat was to win the tournament and give you the chocolate prize..."
80000044-72 = "...but I didn't want to give up just because I got eliminated."
80000044-73 = "Instead, I'm gifting you this consolation prize that I won all on my own!"
80000044-74 = "So it's like I fulfilled my mission, after all."
80000044-75 = "Heh."
80000044-76 = "It sounds kinda creepers now that I've said it aloud.#nLet's just pretend that didn't happen..."
80000044-77 = "[s3] \"Are you kidding?! This is best gift ever!\"\n[s4] \"Legendary Momoi Valentine's Chocolate obtained!\""
80000044-83 = "[ns] \"Let's split it.\""
80000044-84 = "I..."
80000044-88 = "Actually, I got one for myself too!"
80000044-89 = "So, yeah! Let's dig in, and then we can have a battle with our Upalupas!"

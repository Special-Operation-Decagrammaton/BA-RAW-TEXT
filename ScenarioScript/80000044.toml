[translation]
80000044-1 = "永不放棄的玩家"
80000044-2 = "（遊戲中心不知為何舉辦了紀念情人節的對戰格鬥遊戲大賽）"
80000044-9 = "目標只有冠軍！一定要這樣一路贏下去，拿下獎品「巧克力獎盃」！"
80000044-10 = "要好好欣賞我的英姿哦，老師！"
80000044-11 = "才羽桃井的成功之路現在就要開始了！"
80000044-12 = "要上囉──！"
80000044-20 = "嗚哇啊啊啊──！一輪跪什麼的是騙人的吧──！？"
80000044-22 = "（安慰了在大賽中光速淘汰的桃井）"
80000044-23 = "那個套路技太無恥了吧！！"
80000044-24 = "居然躲在畫面邊邊連按小踢，都不會覺得羞恥嗎！？"
80000044-25 = "就算官方沒有禁止也不能這樣吧！"
80000044-26 = "正面對決、彼此試探才是最能燃燒玩家之魂的戰鬥不是嗎！？"
80000044-27 = "[s]「確實，打算捨身使出必殺技的桃井很帥氣唷。」"
80000044-28 = "對吧！？"
80000044-29 = "雖然防禦力堪憂，不過既然看到了那麼大的破綻也只能使出Angry Arts了吧！"
80000044-30 = "[s]「但，那個破綻其實是對方故意的……」"
80000044-31 = "嗚哇啊啊啊啊──！"
80000044-32 = "嗚嗚……我的獎盃……"
80000044-33 = "[s]「看來是真的很想要呢……」"
80000044-34 = "畢竟這是少見的情人節紀念大賽嘛……"
80000044-35 = "拿著巧克力獎盃和副獎的巧克力，#n在頒獎的高台上把冠軍的證明「啪！」的一聲舉起……"
80000044-36 = "然後瀟灑地送給老師的，我完美的作戰啊……！"
80000044-37 = "[s]「作戰……？」"
80000044-38 = "啊，沒事！我剛才什麼都沒說！"
80000044-39 = "嗚嗚，今天怎麼總是犯錯……"
80000044-40 = "[s]「桃井有這份心意我就很高興了唷。」"
80000044-41 = "出現了！是老師的必殺技！明明早就料到會使出這招……！"
80000044-42 = "無法防禦真是太狡猾了！那就是大人的餘裕嗎！？"
80000044-46 = "不，不能就這麼放棄……"
80000044-52 = "啊，夾娃娃機……可以夾到零食的那種……"
80000044-53 = "我想到了一個好主意！等我一下哦老師！"
80000044-57 = "[ns]「桃井？」"
80000044-62 = "來，老師！這個給你！"
80000044-64 = "[s]「這是，附送玩具的巧克力？」"
80000044-65 = "嗯，沒錯！"
80000044-66 = "是裡面放了今天玩的格鬥遊戲──#n《仙后神拳～六角恐龍大熱戰～》的吉祥物公仔的巧克力哦！"
80000044-67 = "內行的都知道，外行的應該也都聽過──"
80000044-68 = "用專業術語來說就是「食玩」哦！"
80000044-69 = "[s1]「那能算是專業術語嗎……？」\n[s2]「不過為什麼要給我這個……？」"
80000044-70 = "那個，本來是想把巧克力獎盃跟巧克力一起送給老師的……"
80000044-71 = "那個，本來是想把巧克力獎盃跟巧克力一起送給老師的……"
80000044-72 = "雖然失敗了，可是也不能就這麼放棄……"
80000044-73 = "所以我想把自己努力贏來的這個送給老師！"
80000044-74 = "該說希望老師能夠接受……還是說某種意義上其實一樣呢……"
80000044-75 = "耶嘿嘿……"
80000044-76 = "……抱，抱歉。我自己覺得好像說了什麼奇怪的話，還是當作沒這件事好了……"
80000044-77 = "[s3]「從桃井手上獲得了重要的巧克力！」\n[s4]「獲得了傳說中的桃井的巧克力！」"
80000044-83 = "[ns]「謝謝你。我們一起吃吧，桃井。」"
80000044-84 = "啊……！"
80000044-88 = "嗯，正好我夾中了兩個！"
80000044-89 = "待會我們兩個用裡面的玩具來對決吧！老師！"

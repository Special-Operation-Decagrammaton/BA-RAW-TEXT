[translation]
80000044-1 = "เกมเมอร์ที่ไม่ยอมแพ้"
80000044-2 = "(ที่เกมเซ็นเตอร์ได้จัดการแข่งเกมต่อสู้ขึ้นเพื่อฉลองเทศกาลวาเลนไทน์)"
80000044-9 = "อื้อ! แบบนี้ชนะได้สบายเลย! เป้าหมายคือการคว้าถ้วยช็อกโกแลตและคว้าชัยชนะมา!"
80000044-10 = "คุณครู! คอยดูให้ดีล่ะ?!"
80000044-11 = "จากนี้ไปเรื่องราวแห่งชัยชนะที่หอมหวานของไซบะ โมโมอิจะเริ่มขึ้นแล้ว!"
80000044-12 = "เอาละ! ลุยกันเลยยยย~!"
80000044-20 = "ตะ...ตกรอบตั้งแต่รอบแรกเลยเหรอเนี่ย?! มะ...มุแงงงง?!"
80000044-22 = "(คุณครูปลอบใจโมโมอิที่ตกรอบ)"
80000044-23 = "ใช้ทริกแบบนั้นด้วยงั้นเหรอ~! มันจะเกินไปแล้วนะ!"
80000044-24 = "โอ้โฮ... ใช้ทริกแบบนั้นได้ชำนาญสุดๆ เลย!"
80000044-25 = "ถึงจะเป็นวิธีที่ถูกต้องตามกติกาก็เถอะ แต่แบบนี้มันโกงกันนี่นา~!"
80000044-26 = "มาสู้กันซึ่งๆ หน้า ให้สมกับผู้ที่มีจิตวิญญาณของนักสู้สิ!"
80000044-27 = "[s] \"จิตวิญญาณนักสู้เดือดพล่านสมกับเป็นโมโมอิเลย!"
80000044-28 = "ใช่มั้ยล่ะ ถึงจะเข้าตาจนแค่ไหน ฉันก็หาทางรอดไปจนได้!"
80000044-29 = "ท่าไม้ตายหมัดพิโรธ...!"
80000044-30 = "[s] \"ถึงอีกฝ่ายจะจงใจเปิดช่องโหว่ให้ก็เถอะนะ\""
80000044-31 = "มุแงงงง~!"
80000044-32 = "แต่ว่า... ฮือ... ของรางวัล... ฉันอยากได้ของรางวัลนี่นา"
80000044-33 = "[s] \"ไม่เห็นต้องจริงจังแบบนั้นเลยนี่?\""
80000044-34 = "แต่ว่า... นี่เป็นการแข่งขันเกมต่อสู้ในวันวาเลนไทน์เลยนะ..."
80000044-35 = "แผนการของฉันคือต่อสู้ชนะให้ได้รางวัลช็อกโกแลตมาแบบเท่ๆ..."
80000044-36 = "แล้วก็เอาช็อกโกแลตนั่นมาเป็นของขวัญเพื่อให้คุณครูมีความสุขแท้ๆ...!"
80000044-37 = "[s] \"แผนการ...?\""
80000044-38 = "อ๊ะ... ยกเลิกๆ! ชิส์! ทำเป็นไม่ได้ยินไปนะ! มันควรเป็นแผนการเซอร์ไพรส์น่ะ!"
80000044-39 = "ฮือ... ตื่นเต้นมากเกินไปจนทำพลาดแบบนี้... อะไรกันเนี่ย..."
80000044-40 = "[s] \"แค่โมโมอิคิดจะทำให้ครูก็ดีใจแล้ว\""
80000044-41 = "นั่นไง! รูปแบบวิธีการพูดโน้มน้าวใจที่แยบยลของคุณครู! คิดแล้วเชียวว่าคุณครูจะต้องพูดแบบนี้...!"
80000044-42 = "เพราะงั้นก็เลยยิ่งตื่นเต้นกว่าเดิมอีกไงเล่า น่าขายหน้าที่สุด! อะไรกันเนี่ย?"
80000044-46 = "ฮือ... แต่จะให้กลับไปเฉยๆ ก็คงไม่ดีแน่..."
80000044-52 = "หืม? เสียงนี่มัน... ตู้เกมสุ่มขนม?"
80000044-53 = "อ๊าาา...! คิดอะไรดีๆ ออกแล้วล่ะ!#nคุณครู! รอฉันแป๊ปนึงนะ!"
80000044-57 = "[ns] \"นี่ เดี๋ยวสิ โมโมอิ!\""
80000044-62 = "เอ้านี่ ฉันให้นะ รับไปสิ คุณครู!"
80000044-64 = "[s] \"นี่มัน... ช็อกโกแลตกับของเล่น?\""
80000044-65 = "ฮิฮิฮิ! ถูกต้อง! แค่มองก็รู้ได้เลยสินะ สุดยอด!"
80000044-66 = "ช็อกโกแลตที่มีของเล่นรูปมาสคอตตัวละครจากเกมต่อสู้ชื่อดัง <คาซิโอเปีย~ วูฟารูฟาแบตเทิล~> จากการแข่งเกมวันนี้อยู่ไงล่ะ!"
80000044-67 = "คนส่วนใหญ่ไม่ค่อยรู้จักกันหรอก แต่ถ้าเป็นคนในวงการก็จะรู้จักกันดี..."
80000044-68 = "นั่นคือโชคุกัน หรือขนมที่แถมของเล่นยังไงล่ะ!"
80000044-69 = "[s1] \"คำเฉพาะในวงการงั้นเหรอ?\"\n[s2] \"โมโมอินี่รู้เยอะเลยนะ\""
80000044-70 = "ที่จริงแล้วแผนของฉันคือชนะการแข่งขันอย่างคูลๆ... แล้วเอาถ้วยรางวัลกับช็อกโกแลตมาเป็น#nของขวัญน่ะ"
80000044-71 = "ที่จริงแล้วแผนของฉันคือชนะการแข่งขันอย่างคูลๆ... แล้วเอาถ้วยรางวัลกับช็อกโกแลตมาเป็น#nของขวัญน่ะ"
80000044-72 = "แผนนั่นดันล้มเหลวไปซะได้ แต่จะให้ยอมแพ้ไปเลยก็ยังไงๆ อยู่..."
80000044-73 = "เพราะงั้นฉันเลยให้ขนมช็อกโกแลตที่ฉันสุ่มมาได้เองกับคุณครูแทนยังไงล่ะ!"
80000044-74 = "แบบนี้ก็ถือว่าสำเร็จเป้าหมายของแผนเดิมแล้ว...ล่ะมั้ง#nอื้อ ถือว่าสำเร็จแล้วล่ะ"
80000044-75 = "แหะๆๆ"
80000044-76 = "คิดแล้วเชียวว่ามันแปลกๆ ใช่มะ...? ขอโทษนะ... ถ้างั้นถือซะว่าเรื่องนี้ไม่เคยเกิดขึ้นแล้วกันนะ..."
80000044-77 = "[s3] \"ได้รับช็อกโกแลตล้ำค่าจากโมโมอิแล้ว!\"\n[s4] \"ได้รับช็อกโกแลตในตำนานของโมโมอิแล้ว!\""
80000044-83 = "[ns] \"มาแบ่งขนมกันเถอะ โมโมอิ\""
80000044-84 = "ฉัน..."
80000044-88 = "ที่จริงฉันก็สุ่มมาเผื่อตัวเองอีกอันเหมือนกัน!"
80000044-89 = "ส่วนของเล่นที่สุ่มมาได้ ลองเอามาสู้กันดูดีกว่านะ!"

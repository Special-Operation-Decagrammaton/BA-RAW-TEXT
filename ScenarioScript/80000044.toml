80000044-28 = "3;모모이;03;그치?! 아무리 내가 딸피라고 해도, 그렇게 빈틈을 내주는데. 쓰지 않을 수가 없잖아!\n#3;em;[반짝]\n#3;hophop"
80000044-29 = "3;모모이;01;[ruby=Angry Arts]딸피 역전용 필살기[/ruby]……!\n#3;closeup\n#fontsize;80"
80000044-30 = "[s] \"상대가 일부러 보여준 빈틈이었지만 말이야.\""

80000044-23 = "3;모모이;04;거기서 그런 꼼수를 쓰다니~! 너무하잖아!\n#3;em;[속상함]\n#3;stiff\n#3;a"
80000044-24 = "3;모모이;04;짠 발에 짠 발, 거기다 또 짠 발뿐이라니!"
80000044-25 = "3;모모이;06;아무리 공식이 허가한 전법이라고 해도, 그것만 쓰는 건 치사하지 않냐구~!\n#3;hophop"

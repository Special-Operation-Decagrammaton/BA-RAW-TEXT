[translation]
10040090-1 = "Afterword;Chase the Joker"
10040090-2 = "Hm."
10040090-3 = "Ummm..."
10040090-4 = "Ah! I've got it! This is the spot!"
10040090-6 = "<Beep—That's a bust!>"
10040090-7 = "KYAAAH!"
10040090-8 = "Uwaaaah... Again? How could this happen AGAIN?"
10040090-12 = "Wow, wow. That's worse than bad luck. How many times in a row has she busted in roulette?"
10040090-13 = "Including this one, that's five times in a row. With simple calculations, that's about a 0.00006% chance."
10040090-14 = "The only explanation I've got is that you've been cursed by the god of RNG."
10040090-16 = "That kind of god doesn't exist! Anyone with eyes can see something's fishy here!"
10040090-17 = "Someone's messing with me! They rigged the roulette game, so I'd lose no matter what!"
10040090-19 = "I was curious, so I took a look at the mechanism before we started. There's no such capability to identify individual users."
10040090-20 = "And we borrowed all these board games right before the party started. When would we have had time to rig it against you?"
10040090-21 = "However, I did confirm that an infrared guidance device for upper attack intelligence shells is installed to accurately target the head of the penalty target with the protruding Peroro doll."
10040090-22 = "Who installed such an unnecessarily expensive combat system in a party game?!"
10040090-24 = "Ah. I did lend this roulette game to the Engineering Department before. When they gave it back to me, they said they made some \"entertainment enhancements.\" Maybe that's what they were talking about?"
10040090-25 = "This is the Engineering Department's work? Geez..."
10040090-26 = "I'm giving them a piece of my mind the next time they put in a resource request!"
10040090-28 = "Anyway, back to me! This is totally unfair! Games that are purely luck, like roulette, are my mortal enemy!"
10040090-29 = "That's completely antithetical to how luck works..."
10040090-30 = "If I say it's unfair, then it's unfair! I object!"
10040090-31 = "Referee! I'm requesting a game change!"
10040090-32 = "We're playing friendly party games... There's no referees..."
10040090-33 = "But if that's what you want, we can change the game. We have plenty of options."
10040090-34 = "What should we play? There's THE LIFE or Wolf of the Wild Hunt..."
10040090-35 = "Fufufu. The game I suggest we play from here on out is...Chase the Joker!"
10040090-36 = "Chase the Joker? That's a card game, right? You lose if you have the Joker in your hand at the end of the game."
10040090-37 = "Yes! It's a simple, easy game. Players take turns discarding number pairs, and whoever ends the game with the Joker is the LOSER!"
10040090-38 = "Everyone knows the rules, right? So, no objections!"
10040090-40 = "Chase the Joker relies on luck as well, however."
10040090-41 = "If luck-based games are your mortal enemy, won't you just lose again?"
10040090-42 = "Fufu, it would appear you don't know, Kotama. \"Chase the Joker\" is actually a skill-based, strategy game! Duh!"
10040090-43 = "You can count the numbers of the cards that have been discarded, and calculate the probability of the remaining cards! Or you carefully monitor people's reactions when they draw their cards to see if they have the Joker!"
10040090-44 = "Roulette's a dumb game that relies purely on luck! On the other hand, I definitely have a chance at winning Chase the Joker!"
10040090-46 = "And the loser gets a flick on the forehead!"
10040090-48 = "Fufu. This sounds fun. I think I'll join in on this round."
10040090-49 = "Well, I don't mind what we play, but I have a feeling this'll end quickly, for some reason."
10040090-51 = "Ehhh, I'll pass. Simple games, like Chase the Joker, aren't really my vibe."
10040090-52 = "Huh? What's with these unenthusiastic reactions? Are you guys just scared?"
10040090-53 = "Then, let Chase the Joker begin!"
10040090-55 = "A short time later..."
10040090-57 = "(...Why...?)"
10040090-62 = "(...Why does she have to be the only one left?!)"
10040090-63 = "Looking at the number of remaining cards, OBVIOUSLY Noa has a Joker right now, but...but..."
10040090-64 = "...Noa?"
10040090-65 = "Yes, Koyuki?"
10040090-66 = "One...one of the cards you're holding. It's a Joker, right?"
10040090-67 = "...Hmm, I wonder. Could it be?"
10040090-68 = "I-I know it is! So...is it the left, or the right?"
10040090-69 = "Fufu. Why don't you take a guess, Koyuki?"
10040090-70 = "(...Drat... I can't read her expression at all.)"
10040090-71 = "(Of course my bad luck lines me up against her!)"
10040090-72 = "(I picked a game with less luck...but the external circumstances...! How can this be?!)"
10040090-73 = "*sigh*"
10040090-78 = "(I have no choice. All I can do is guess.)"
10040090-82 = "I know! The Joker is...on the left!"
10040090-83 = "Wrong! It was the right!"
10040090-84 = "AHHHHHH! I knew it! The second I said it, I knew it!"
10040090-85 = "Then why didn't you change it?"
10040090-86 = "Because it changed in the moment! Silence from audience members who don't understand, please!"
10040090-87 = "...Th-That's ridiculous."
10040090-89 = "Seminar's true poker face. She's truly unreadable."
10040090-90 = "You know, I figured the second Noa joined, but just her presence turns Chase the Joker into 100% a game of luck."
10040090-91 = "What made Koyuki think she'd win a psychological war against Noa, of all people?"
10040090-93 = "...If she was capable of that kind of insight to begin with, she wouldn't be practically living in the Self-Reflection Room, would she?"
10040090-95 = "...After that, Koyuki lost five times in a row, received the penalty she proposed, and ended up giving up."

[translation]
10040090-1 = "ย้อนวันวาน;จับโจร"
10040090-2 = "อืม..."
10040090-3 = "อืมมมม..."
10040090-4 = "อ๊ะ! ต้องใช่แน่ๆ ลางสังหรณ์บอกอย่างนี้! ครั้งนี้ขอเลือกตรงนี้ค่ะ!"
10040090-6 = "<แอดดด!>"
10040090-7 = "อ๊าย!"
10040090-8 = "อึก... ทำไมครั้งนี้ก็ไม่ใช่นะ!"
10040090-12 = "อะไรกัน ไม่มีดวงเลยนะเนี่ย ทำไมถึงสุ่มรูเล็ตพลาดซ้ำแล้วซ้ำอีกขนาดนี้ล่ะ?"
10040090-13 = "รวมของเมื่อกี้ด้วยก็ 5 ครั้งรวดแล้วค่ะ ต่อให้คำนวณแบบง่ายๆ ความน่าจะเป็นก็อยู่ที่ 0.00006% เลยนะคะ "
10040090-14 = "ไม่มีดวงขนาดนี้ ถ้าบอกว่าโดนคำสาปจากผีลูกเต๋ามา ฉันก็เชื่อนะ"
10040090-16 = "โลกนี้มีผีแบบนั้นด้วยเหรอคะ? นี่มันแปลกอย่างไม่ต้องสงสัยเลยนะคะ!"
10040090-17 = "ต้องมีใครแกล้งฉันแน่ๆ! ต้องมีใครไปปรับแต่งรูเล็ตให้ฉันสุ่มไม่ถูกทุกรอบ..."
10040090-19 = "แต่ฉันดูโครงสร้างของรูเล็ตไปคร่าวๆ ก่อนเริ่มเล่นเกมแล้วนะคะ ในรูเล็ตไม่ได้ติดตั้งอุปกรณ์จดจำ เพื่อแยกแยะผู้ใช้งานไว้ค่ะ"
10040090-20 = "ใช่ แล้วเราก็ยืมบอร์ดเกมพวกนี้มาก่อนจะจัดปาร์ตี้เลย ฉันจะเอาเวลาที่ไหนมาดัดแปลงบอร์ดเกม เพื่อให้เธอต้องแพ้อยู่คนเดียวล่ะ?"
10040090-21 = "แต่ตอนตรวจดูโครงสร้าง ฉันเจอว่ามีการติดตั้งเครื่องเหนี่ยวนำรังสีอินฟาเรดเพื่อให้ตุ๊กตาเพโรโร่#nที่โผล่ออกมาโจมตีใส่หัวของคนที่ถูกลงโทษได้อย่างแม่นยำด้วยค่ะ"
10040090-22 = "ใครไปติดตั้งระบบการต่อสู้แพงๆ แต่ไร้ประโยชน์ไว้ในเกมที่เอาไว้เล่นในปาร์ตี้แบบนี้น่ะ?"
10040090-24 = "จริงสิ ตอนที่ให้ชมรมวิศวกรรมยืมเกมรูเล็ตนี้ไปคราวก่อน เห็นว่ามีการดัดแปลงนิดหน่อย 'เพื่อเสริมสร้างความสนุกของปาร์ตี้'... หรือว่าจะเป็นอันนี้นะ?"
10040090-25 = "ฝีมือชมรมวิศวกรรมอีกแล้วเหรอ? เฮ้อ..."
10040090-26 = "ต่อไปถ้าชมรมวิศวกรรมมาบีบน้ำตาว่าเงินสนับสนุนชมรมไม่พอ ฉันคงต้องพูดอะไรให้เจ็บแสบแล้วละ!"
10040090-28 = "แต่ถึงอย่างนั้นก็ไม่ยุติธรรมอยู่ดีนะคะ! ถ้าต้องเล่นเกมที่ต้องพึ่งดวงอย่างรูเล็ตอันนี้ ฉันเป็นฝ่ายเสียเปรียบมากๆ เลยนะคะ!!"
10040090-29 = "มีด้วยเหรอคนที่เสียเปรียบเป็นพิเศษในเกมที่ต้องพึ่งดวงน่ะ..."
10040090-30 = "ขอค้านค่ะ! ถ้าบอกว่าเสียเปรียบก็เสียเปรียบสิคะ!"
10040090-31 = "ขอวินิจฉัยว่าให้มีการเปลี่ยนประเภทของเกมค่ะ!"
10040090-32 = "วินิจฉงวินิจฉัยอะไรกัน นี่เราแค่เล่นเกมในปาร์ตี้ส่งท้ายปีเก่าต้อนรับปีใหม่นะ..."
10040090-33 = "แต่ถ้าเธออยากเปลี่ยนประเภทของเกม ฉันก็จะเปลี่ยนให้ ยังไงเรามีบอร์ดเกมเยอะแยะเลยนี่นา"
10040090-34 = "งั้นจากนี้จะเล่นเกมอะไรกันล่ะ? <เดอะ ไลฟ์>? หรือว่า <หมาป่าแห่งไวลด์ฮัน>?"
10040090-35 = "ฮุฮุ เกมที่จะฉันจะเสนอให้เล่นก็คือ... เกม <จับโจร> ค่ะ!"
10040090-36 = "จับโจร? หมายถึงเกมไพ่ที่ถ้าใครมีไพ่โจ๊กเกอร์ในตอนท้ายจะแพ้น่ะเหรอ?"
10040090-37 = "ใช่ค่ะ กติกาก็ง่ายๆ ค่ะ เราจะผลัดกันทิ้งไพ่เลขเดียวกันทีละคู่ แล้วในตอนสุดท้ายถ้าใครถือ#nไพ่โจ๊กเกอร์ไว้ก็จะเป็นคนแพ้ค่ะ"
10040090-38 = "ทุกคนที่นี่น่าจะรู้วิธีเล่นเกม <จับโจร> กันหมดแล้ว ทุกคนโอเคใช่มั้ยคะ?"
10040090-40 = "แต่เกม <จับโจร> ก็เป็นเกมไพ่ที่ต้องพึ่งดวงเหมือนกันไม่ใช่เหรอ..."
10040090-41 = "ถ้าโชคไม่ดี เกมนี้ก็อาจจะแพ้อีกก็ได้ไม่ใช่เหรอคะ?"
10040090-42 = "ฮุฮุ ไม่รู้อะไรซะแล้ว รุ่นพี่โคทามะ เกมจับโจรก็เป็นเกมที่ต้องใช้กลยุทธ์ในการเล่นไม่ใช่น้อยเลยนะคะ"
10040090-43 = "ถ้าดูจากเลขไพ่ที่ถูกทิ้งไว้ที่พื้น เราก็คำนวณความน่าจะเป็นของไพ่ที่เหลืออยู่ได้ แล้วตอนเลือกไพ่ เราก็สังเกตปฏิกิริยาของคนอื่นได้ว่ามีไพ่โจ๊กเกอร์อยู่ในมือหรือเปล่าค่ะ"
10040090-44 = "เกมรูเล็ตน่ะเป็นเกมที่พึ่งดวงอย่างเดียว แต่เกมจับโจรเป็นเกมกลยุทธ์ที่ฉันมีโอกาสชนะได้ค่ะ"
10040090-46 = "เอาละ มาวัดกลยุทธ์จากเกมนี้กันเลยค่ะ ใครแพ้ต้องโดนดีดหน้าผากคนละครั้งนะ!"
10040090-48 = "ฮุฮุ ดูน่าสนุกจังเลยนะคะ งั้นเกมนี้ฉันเล่นด้วยดีมั้ยคะ?"
10040090-49 = "อืม ฉันก็ไม่ติดอะไรนะ... แต่รู้สึกว่าเกมมันจะจบเร็วยังไงไม่รู้"
10040090-51 = "อืม... เกมนี้ฉันขอผ่านแล้วกัน เกมง่ายๆ อย่างเกมจับโจรไม่ใช่แนวของฉันน่ะ"
10040090-52 = "หืม? ทำไมทุกคนดูลังเลแบบนี้ล่ะ? คงไม่ได้กลัวจะแพ้หรอกใช่มั้ยคะ?"
10040090-53 = "เอาละ ถ้างั้นมาจับโจรกันเลย!"
10040090-55 = "(ครู่ต่อมา...)"
10040090-57 = "(ทำไม...)"
10040090-62 = "(ทำไมคนที่เหลือต้องเป็นคนนี้ด้วย...!?)"
10040090-63 = "ถ้าดูจากจำนวนไพ่ที่เหลือแล้ว ไพ่โจ๊กเกอร์ต้องอยู่ในมือของรุ่นพี่โนอาอย่างแน่นอน แต่ว่า..."
10040090-64 = "รุ่นพี่..."
10040090-65 = "ว่าไงคะ โคยูกิจัง?"
10040090-66 = "เอ่อ... ไพ่ที่อยู่ในมือน่ะค่ะ ใช่โจ๊กเกอร์มั้ยคะ?"
10040090-67 = "ก็ไม่รู้สิคะ คิดว่ายังไงล่ะคะ?"
10040090-68 = "ใช่แน่ๆ โจ๊กเกอร์เป็นใบซ้ายหรือใบขวาคะ?"
10040090-69 = "ฮุฮุ โคยูกิจังก็ลองเดาดูสิคะ?"
10040090-70 = "(บ้าจริง... จับไต๋ไม่ได้เลย)"
10040090-71 = "(นี่ฉันดวงซวยใช่มั้ยที่ต้องนั่งติดกับรุ่นพี่โนอาเนี่ย...!)"
10040090-72 = "(อุตส่าห์เลือกเกมที่ต้องพึ่งดวงน้อยๆ แล้วเชียว แต่ดันมาดวงซวยเพราะปัจจัยภายนอกงั้นเหรอ...? คนเรามันจะดวงไม่ดีอะไรอย่างนี้เนี่ย!?)"
10040090-73 = "ฮู่ว..."
10040090-78 = "(งั้นก็คงช่วยไม่ได้ ในเมื่อเป็นแบบนี้ก็คงต้องเดาแล้วละ)"
10040090-82 = "ฉันตัดสินใจแล้วค่ะ โจ๊กเกอร์... คือไพ่ใบซ้าย!"
10040090-83 = "ไม่ใช่ค่ะ ใบขวาต่างหาก!"
10040090-84 = "แงงงง~~~! ลางสังหรณ์บอกแล้วเชียวว่าถ้าพูดแบบนั้นไปแล้วจะออกมาเป็นแบบนี้!!!"
10040090-85 = "งั้นก็เปลี่ยนใจได้ไม่ใช่เหรอ"
10040090-86 = "ก็สัญชาตญาณมันบอกให้พูดแบบนั้นออกไปนี่คะ!! คนที่ไม่เข้าใจก็นั่งอยู่เฉยๆ เถอะค่ะ!!"
10040090-87 = "พูดอะไรของเธอเนี่ย..."
10040090-89 = "สมกับที่เป็นโป๊กเกอร์เฟซของเซมิน่าเลยนะ อ่านใจไม่ออกสักนิดเลย"
10040090-90 = "ฉันคาดไว้ตั้งแต่แรกแล้วละ ตั้งแต่วินาทีที่รุ่นพี่โนอาบอกว่าจะเล่นเกม <จับโจร> ด้วย เกมนี้ก็เป็น#nเกมที่จิตวิทยาใช้ไม่ได้ผล และต้องพึ่งดวงล้วนๆ 100%"
10040090-91 = "แต่ทำไมโคยูกิจังถึงคิดว่าตัวเองจะใช้จิตวิทยาในสงครามประสาทกับรุ่นพี่โนอาได้ล่ะ?"
10040090-93 = "ก็นะ... ถ้าเก่งเรื่องนั้นละก็ คงไม่มีเรื่องต้องให้เข้ามาอยู่ในห้องสำนึกผิดหรอก"
10040090-95 = "(หลังจากนั้นโคยูกิก็เล่นเกมแพ้อีก 5 เกมรวด แล้วก็โดนลงโทษด้วยการดีดหน้าผากที่ตัวเองเป็นคน#nเสนอเอง และต้องเลิกเล่นเกมไป)"

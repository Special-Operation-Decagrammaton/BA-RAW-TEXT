10040090-12 = "1;마키 파자마;04;우와, 엄청난 불운이네. 벌써 몇 번째 연속으로 룰렛에서 꽝을 뽑는 거야?\n#1;em;[반응]\n#1;a"
10040090-13 = "5;코타마 파자마;05;방금 것까지 해서 다섯 번 연속입니다. 단순 계산으로 해도 약 0.00006%의 희박한 확률이군요.\n#5;em;[반짝]\n#5;a"
10040090-14 = "3;하레 파자마;13;이쯤 되면 정말 주사위의 신에게 저주라도 받았다고밖에 말할 수가 없겠네.\n#3;a\n#3;em;[땀]"
10040090-15 = "#all;hide"
10040090-16 = "3;코유키 파자마;04;세상에 그런 신이 어디 있어요? 이건 누가 봐도 명백히 이상하잖아요!\n#3;em;[빠직]\n#3;jump"
10040090-17 = "3;코유키 파자마;10;이건 분명 조작이에요! 누군가가 저를 골탕 먹이기 위해 룰렛에 개조를—\n#3;stiff"
10040090-18 = "#all;hide"
10040090-19 = "4;노아 파자마;02;하지만 게임을 시작하기 전에 구조를 간단하게 살펴보았지만, 룰렛 내에 사용자를 식별할 수 있는 별도의 인식 장치 같은 건 설치되어 있지 않았는걸요.\n#4;a\n#4;em;[반응]"
10040090-20 = "2;유우카 파자마;05;맞아. 게다가 이 보드게임들은 파티 직전에 빌려온 물건인데. 너 하나 골탕 먹이자고 보드게임을 개조할 틈이 어디 있었겠어?\n#2;a\n#2;em;[한숨]"
10040090-21 = "4;노아 파자마;01;다만 튀어나온 페로로 인형이 정확하게 벌칙 대상자의 머리를 요격할 수 있도록 상부 공격 지능탄용 적외선 유도 장치는 설치되어 있는 것은 확인했습니다만—"
10040090-22 = "2;유우카 파자마;09;파티 플레이용 게임에 누가 그런 쓸데없이 비싸기만 한 전투 시스템을 설치한 거야?"
10040090-23 = "#all;hide"
10040090-24 = "3;마키 파자마;02;아, 전에 이 룰렛을 엔지니어부에 빌려주었을 때, '파티의 여흥을 돋구기 위해' 약간의 개조를 했다고 했었는데…… 그때 설치된 기능인가?\n#3;em;[전구]"
10040090-25 = "5;유우카 파자마;12;또 엔지니어부가 저지른 일이야? 어휴……\n#5;al\n#3;m1"
10040090-26 = "5;유우카 파자마;11;앞으로 엔지니어부에서 부비가 모자라다고 우는 소리를 내거든 따끔하게 한 마디 해줘야겠어!\n#5;em;[스팀]\n#5;hophop"
10040090-27 = "#all;hide"
10040090-28 = "3;코유키 파자마;11;그렇다 해도 이건 불공평해요! 룰렛처럼 운에 의존하는 승부는 저한테 완전 불리하잖아요!!\n#3;jump"
10040090-29 = "3;하레 파자마;07;운에 의존하는 승부가 누군가에게 특별히 불리하다는 건 말이 안 되는데…….\n#3;em;[땀]"
10040090-30 = "3;코유키 파자마;04;불리하다면 불리한 거예요!! 이의 있소!\n#3;closeup\n#fontsize;80\n#3;hophop"

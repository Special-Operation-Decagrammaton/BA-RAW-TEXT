[translation]
10040090-1 = "後日談;抽鬼牌"
10040090-2 = "唔嗯……"
10040090-3 = "唔嗯嗯嗯……"
10040090-4 = "啊──！我已經完全懂了，這次是這裡！"
10040090-6 = "＜嗶嗶──猜錯了！＞"
10040090-7 = "呃啊！"
10040090-8 = "怎麼會……為什麼我還是輸了！"
10040090-12 = "哇，你還真是衰到了極點呢。#n這已經是你第幾次插到海盜跳起來了啊？"
10040090-13 = "剛才那是他連續第五次中獎了。#n光從機率來計算的話，這種情況出現的機率約莫是0.00006%。"
10040090-14 = "看來除了被機率之神詛咒以外，沒有別的可能性了。"
10040090-16 = "世界上哪有那種神啊？這不管怎麼看都有問題吧！"
10040090-17 = "肯定是有人動了手腳！#n一定是為了針對我才故意改造海盜桶──"
10040090-19 = "可是在開始玩之前，我們也稍微看過了其中的構造。#n這裡頭並沒有什麼能夠識別玩家的辨別裝置。"
10040090-20 = "沒錯，而且這個桌遊是我們在派對開始前才去借來的。#n誰有時間為了整你而去改造海盜桶啊？"
10040090-21 = "雖然我們的確是在海盜桶裡發現上方攻擊型智慧子彈誘導裝置，#n讓彈出來的佩洛洛人偶能夠準確地射中輸家的腦袋──"
10040090-22 = "到底是誰無聊到在派對桌遊上裝那種昂貴的戰鬥裝置啊？"
10040090-24 = "啊，工程師部之前跟我借這個桌遊的時候，#n他們有說「為了替派對炒熱氣氛」而稍微改造了一下……難道是那個時候安裝的嗎？"
10040090-25 = "又是工程師部搞的鬼嗎？#n唉……"
10040090-26 = "如果以後工程師部又跑來哭說零件不夠的話，我一定要狠狠地唸他們幾句！"
10040090-28 = "就算是這樣，這個遊戲還是很不公平啊！#n像海盜桶這種完全憑運氣的遊戲，對我來說根本超級不利的嘛！！"
10040090-29 = "你自己都說這是憑運氣的遊戲了，哪有可能對誰特別不利啊……"
10040090-30 = "我說不利就是不利！！我有異議！"
10040090-31 = "裁判！我要申請變更項目！"
10040090-32 = "玩個派對遊戲哪有什麼裁判……"
10040090-33 = "不過既然你都這麼說了，要換個遊戲玩也不是不行。#n畢竟我們還有很多桌遊可以玩。"
10040090-34 = "那我們現在要玩什麼？#n「THE．人生」嗎？還是「狂獵狼人殺」？"
10040090-35 = "哼哼，我接下來想提議的遊戲是……「抽鬼牌」！"
10040090-36 = "抽鬼牌？你是說最後拿到鬼牌的人就算輸的那個遊戲嗎？"
10040090-37 = "嗯，只要湊到一對相同數字的牌就能丟出來，然後最後手裡有鬼牌的人就是輸家。#n規則就是這麼簡單。"
10040090-38 = "像「抽鬼牌」這種遊戲，在場的所有人基本上都知道規則，所以應該不會有意見吧？"
10040090-40 = "不過「抽鬼牌」不也同樣是看運氣的遊戲嗎……"
10040090-41 = "如果你運氣真的很差，就算玩抽鬼牌還是會輸吧？"
10040090-42 = "哼哼，這你就有所不知了，小玉前輩。#n抽鬼牌可是個能靠實力翻盤的策略遊戲哦？"
10040090-43 = "玩家除了可以根據丟出來的牌推算機率之外，#n在抽牌的時候也能透過對方的反應，推測鬼牌在對方手裡的哪個位置。"
10040090-44 = "所以跟單純靠運氣的海盜桶比起來，玩抽鬼牌我也是有勝算的。"
10040090-46 = "好，那我們現在來用抽鬼牌一決勝負吧！#n輸的人要被其他人彈一下額頭！"
10040090-48 = "呵呵，聽起來真有趣。#n那我這次可以一起玩嗎？"
10040090-49 = "我是無所謂啦……不過總覺得遊戲很快就會結束了。"
10040090-51 = "唔嗯……我先PASS好了。#n像抽鬼牌這麼簡單的遊戲，不太符合我的胃口。"
10040090-52 = "咦咦？為什麼大家的反應這麼冷淡？你們該不會是怕了吧？"
10040090-53 = "那麼抽鬼牌──正式開始！"
10040090-55 = "（幾分鐘後……）"
10040090-57 = "（為什麼……）"
10040090-62 = "（……偏偏是剩下這個人呢！？）"
10040090-63 = "從剩餘的牌數來看，鬼牌肯定是在乃愛前輩手裡沒錯……"
10040090-64 = "……前輩。"
10040090-65 = "怎麼了，小雪醬？"
10040090-66 = "那個……你手裡有鬼牌對吧？"
10040090-67 = "這個嘛，你覺得呢？"
10040090-68 = "是左邊那張嗎？還是右邊那張？"
10040090-69 = "呵呵，你要不要猜猜看呢？"
10040090-70 = "（可惡……完全感覺不出他的情感有任何波動）"
10040090-71 = "（我運氣本來就不好了，怎麼還偏偏碰上這樣的對手……！）"
10040090-72 = "（本來是想減少運氣在遊戲中的占比，怎麼我在其他方面的運氣還是這麼差……？#n　這怎麼可能！？）"
10040090-73 = "呼……"
10040090-78 = "（沒辦法了。既然如此也只能靠感覺了──）"
10040090-82 = "我決定了！#n鬼牌是……左邊那張！"
10040090-83 = "真可惜，答案是右邊這張！"
10040090-84 = "啊啊啊啊啊啊啊～～～！#n我就知道一定不會是我選的那張！！！"
10040090-85 = "那你選另一張不就好了……"
10040090-86 = "要是換一張的話，答案也會跟著改變的！！#n不懂的人少插嘴！！"
10040090-87 = "又在胡說八道……"
10040090-89 = "真不愧是研討會最出名的撲克臉，完全看不出端倪呢。"
10040090-90 = "其實我從一開始就預料到了。#n一旦乃愛前輩加入，抽鬼牌就會變成跟心理戰無關，100%的運氣遊戲。"
10040090-91 = "為什麼小雪還會以為自己能靠心理戰贏過乃愛前輩呢？"
10040090-93 = "……如果他有你那麼聰明的話，也不會被關進反省室了吧。"
10040090-95 = "（……之後小雪再次吞下了五連敗，並在接受完自己提議的懲罰後退出了遊戲）"

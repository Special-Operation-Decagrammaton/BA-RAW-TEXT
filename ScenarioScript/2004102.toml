[translation]
2004102-1 = "合理的生活"
2004102-2 = "（按照莉央說的方法，來到了約好的地點）"
2004102-3 = "（雖說是為了安全和維安……但過程非常繁瑣）"
2004102-7 = "你來啦，老師？等很久了嗎？"
2004102-8 = "才剛到而已？也對，跟我預測的一模一樣。#n因為我用最合理的方法計算出了老師的動線，所以這也是當然的。"
2004102-9 = "[s]「我想先問你一件事……」"
2004102-10 = "嗯？我平常都吃什麼？"
2004102-11 = "當然是吃傍晚的特價便當和冷凍食品。#n這是十分合理的選擇。"
2004102-12 = "首先，傍晚的特價便當常常會有半價優惠，而且味道也不錯。"
2004102-13 = "尤其豬排便當和唐揚雞蓋飯真的很棒。"
2004102-14 = "……雖然今天意外休息就是了。"
2004102-15 = "不過考慮到競爭的激烈程度，我認為這個代價也相當合理。"
2004102-16 = "冷凍食品除了保存期限長之外，還能一次囤放很多。"
2004102-17 = "這才是真正合理的選擇。"
2004102-18 = "[s1]「這樣你的身體會出問題的……」\n[s2]「還不如點外送吃健康的食物……」"
2004102-21 = "點外送實在太不合理了。#n首先是會有被追蹤的風險。"
2004102-22 = "萬一我的臉被外送員記住……也同樣很危險。"
2004102-23 = "況且如果寫下對外送的評價，就能獲得折扣或額外的贈品對吧？"
2004102-24 = "既然店家提供了這種服務，如果不加以利用實在不合常理。"
2004102-25 = "但是如果留下評價，又很可能會被追蹤……"
2004102-26 = "社會一般將這種現象稱為「兩難」。"
2004102-27 = "而我打算從今以後，要盡可能避免陷入兩難的情況。"
2004102-28 = "實在太合理了。"
2004102-29 = "[s]「那樣生活的話，小心以後得花更多的醫藥費哦……？」"
2004102-30 = "嗯？因為便當或冷凍食品有很多炸物……"
2004102-31 = "不只脂肪含量過高又大多是碳水化合物，膳食纖維跟維他命也不夠充足……？"
2004102-32 = "……確實，我不否認有這個可能性。#n不過維他命可以透過營養食品來攝取……"
2004102-33 = "至於膳食纖維……"
2004102-34 = "我的身體還撐得住，所以應該沒關係吧？"
2004102-35 = "[s]「當然有關係。」"
2004102-36 = "我，我認為纖維素的影響應該相對有限。#n而且我也有吃營養食品來補充必要的養分……"
2004102-37 = "更重要的問題是，我不會下廚……"
2004102-38 = "嗯？能不能發明會料理的前衛君？#n網路上也有很多食譜？"
2004102-39 = "我沒有試過……"
2004102-40 = "[s]「沒有試過？」"
2004102-44 = "因為我會害怕……"
2004102-48 = "[ns3]「不必擔心！！！」\n[ns4]「這樣下去不行。跟我一起去前面的超市吧。」"
2004102-51 = "等等，那間超市沒有打折。這個選擇很不合理。"
2004102-52 = "[s]「我幫你買單，走吧！」"
2004102-53 = "我，我知道了……"
2004102-55 = "（抓著莉央的手前往超市）"
2004102-58 = "那，那是什麼，老師？#n那個白白的蔬菜，好像是以碎形結構組成……？#n郝斯多夫維數……大約在2.7左右……"
2004102-59 = "是叫做花椰菜的蔬菜？#n看，看起來好可怕，我不敢吃……#n嗯？煮熟之後會有馬鈴薯的味道……？"
2004102-64 = "馬鈴薯、胡蘿蔔、洋蔥……還有番茄。#n嗯，這些我都知道。然後……"
2004102-65 = "買，買那麼多肉沒問題嗎……？"
2004102-67 = "（就這樣一一教導什麼都不知道的莉央該怎麼購物）"
2004102-68 = "（雖然其實也是依靠網路的力量就是了……）"
2004102-70 = "……"
2004102-71 = "原來如此，食材以蛋白質和蔬菜為主。#n碳水化合物的含量，似乎也有顯著減少。"
2004102-72 = "不過，你接下來打算怎麼做呢？老師？"
2004102-73 = "[s]「今天我會在夏萊為你做飯。」"
2004102-74 = "嗯？老師原來會下廚嗎？"
2004102-75 = "一道菜也不會？那你究竟要怎麼……？#n只要按照網路上食譜的步驟，就可以做出能吃的東西了……？"
2004102-76 = "雖然依賴預感不太合理……"
2004102-77 = "但我總覺得不是很放心。"
2004102-78 = "[s]「被學生戳中痛處了……」"
2004102-80 = "（於是在幾番努力後回到了夏萊）"
2004102-84 = "[ns]「你可以先休息一下。我會想辦法做做看的。」"
2004102-85 = "嗯，嗯。"
2004102-94 = "這個是……？"
2004102-95 = "從某個角度來說，燉菜是任何人都能做的料理？"
2004102-96 = "……"
2004102-97 = "謝謝你，老師。#n我會好好享用的。"
2004102-102 = "（兩人默默地品嘗著碗裡的燉菜）"
2004102-104 = "我突然覺得……"
2004102-105 = "[ns]「什，什麼……？」"
2004102-106 = "這個味道雖然不難吃……"
2004102-107 = "卻好像也……稱不上好吃。"
2004102-108 = "[s]「果然是這樣嗎……」"
2004102-109 = "……"
2004102-110 = "不過不知為何……"
2004102-117 = "是能讓人從中感覺到溫暖的味道。"

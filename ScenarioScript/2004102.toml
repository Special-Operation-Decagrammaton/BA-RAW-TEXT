[translation]
2004102-1 = "ชีวิตที่สมเหตุสมผล"
2004102-2 = "(คุณครูเดินทางไปตามวิธีที่ริโอะบอกจนมาถึงสถานที่นัดพบ)"
2004102-3 = "(ถึงจะเป็นการทำเพื่อความปลอดภัย... แต่วิธีเดินทางมาก็ซับซ้อนไม่ใช่เล่น)"
2004102-7 = "มาแล้วเหรอครู? รอนานหรือเปล่า?"
2004102-8 = "เพิ่งมาถึงเมื่อกี้เลยงั้นเหรอ? อืม ตามที่คิดไว้เลยละ ฉันเลือกเส้นทางที่สมเหตุสมผลที่สุดให้ครูแล้ว จะมาถึงตอนนี้ก็ไม่แปลกหรอก"
2004102-9 = "[s] \"ครูอยากถามอะไรสักอย่างหนึ่งก่อน...\""
2004102-10 = "หืม? ปกติแล้วฉันจัดการเรื่องอาหารการกินยังไงน่ะเหรอ?"
2004102-11 = "มันก็แน่นอนอยู่แล้วสิ ก็ซื้ออาหารแช่แข็งกับข้าวกล่องลดราคาที่ขายตอนเย็นไง มันเป็นตัวเลือกที่#nสมเหตุสมผลมากเลยละ"
2004102-12 = "บางทีข้าวกล่องลดราคาก็ลดถึง 50% แล้วรสชาติก็ไม่ได้แย่ด้วย"
2004102-13 = "โดยเฉพาะข้าวกล่องทงคัตสึกับข้าวราดไก่คาราอะเกะ สองอย่างนี้ถือเป็นอาหารชั้นเยี่ยมเลยละ"
2004102-14 = "แต่วันนี้ร้านดันมาปิดซะได้..."
2004102-15 = "ถ้าจะไปหาอย่างอื่นกิน คงเป็นการแข่งขันที่ดุเดือด แต่ฉันก็คิดว่าเป็นบทลงโทษที่ยอมรับได้"
2004102-16 = "ส่วนอาหารแช่แข็ง มันก็ดีที่อยู่ได้นาน และถ้าซื้อไว้เยอะๆ ทีเดียวก็เก็บรักษาไว้ได้นานอยู่"
2004102-17 = "จะไม่ให้เรียกว่าสมเหตุสมผลได้ยังไงล่ะ"
2004102-18 = "[s1] \"แต่มันไม่ดีต่อสุขภาพนะ สั่งอย่างอื่นกินเถอะ\"\n[s2] \"ครูว่าสั่งอาหารที่ดีต่อสุขภาพกินดีกว่านะ...\""
2004102-21 = "สั่งมาไม่ได้หรอก มันไม่สมเหตุสมผล นอกเหนือจากนี้ ถ้าทำแบบนั้นจะยิ่งเสี่ยงต่อการถูกติดตาม#nตำแหน่งด้วย"
2004102-22 = "สมมติพนักงานส่งอาหารจำหน้าฉันได้... มันก็จะอันตรายด้วย"
2004102-23 = "แล้วถ้ารีวิวอาหาร ทางร้านก็จะลดราคาหรือไม่ก็แถมให้เยอะเป็นพิเศษอีก"
2004102-24 = "ได้บริการดีๆ แบบนั้นจากร้านทั้งที ถ้าไม่รับไว้ก็ถือว่าไร้เหตุผลอย่างยิ่ง"
2004102-25 = "แต่ถ้าฉันเขียนรีวิว ฉันก็มีโอกาสที่จะโดนติดตามตัวอีก..."
2004102-26 = "นี่คือภาวะกลืนไม่เข้าคายไม่ออกของมนุษยชาติน่ะครู"
2004102-27 = "และจากนี้ไปฉันก็พยายามที่จะหลีกเลี่ยงภาวะกลืนไม่เข้าคายไม่ออกนั้นให้ได้มากที่สุด"
2004102-28 = "เพราะมันสมเหตุสมผลกับฉันยังไงล่ะ"
2004102-29 = "[s] \"ถ้าใช้ชีวิตแบบนั้น ต่อไปต้องไปจ่ายเงินให้หมอแทนนะ...\""
2004102-30 = "หะ... หืม? ข้าวกล่องกับอาหารแช่แข็งส่วนมากจะเป็นอาหารจำพวกทอด..."
2004102-31 = "ทั้งมีไขมันสูง ส่วนมากก็มีแต่คาร์โบไฮเดรต และยังขาดไฟเบอร์กับวิตามินอีกงั้นเหรอ...?"
2004102-32 = "อืม... ฉันไม่ปฏิเสธหรอกว่ามันเป็นอย่างนั้น แต่วิตามินน่ะ กินเสริมเอาก็ได้..."
2004102-33 = "ส่วนไฟเบอร์ก็..."
2004102-34 = "ร่างกายฉันยังแข็งแรงดีอยู่ งั้นคงไม่เป็นไรหรอก?"
2004102-35 = "[s] \"เป็นจ้ะ\""
2004102-36 = "ฉะ... ฉันไม่คิดว่าเส้นใยจากพืชจะส่งผลอะไรกับร่างกายมากมายขนาดนั้นหรอก แล้วตอนนี้ร่างกายฉัน#nก็ได้รับสารอาหารที่จำเป็นจากอาหารเสริมอยู่..."
2004102-37 = "ที่สำคัญเหนือสิ่งอื่นใดก็คือ ฉันทำอาหารไม่เป็นนี่สิ..."
2004102-38 = "หืม? ให้ฉันลองประดิษฐ์หุ่นรบล้ำยุคที่ทำอาหารได้ดูงั้นเหรอ? ส่วนพวกสูตรอาหารก็มีเยอะแยะใน#nอินเทอร์เน็ต?"
2004102-39 = "แต่หุ่นรบแบบนั้นฉันไม่เคยสร้างมาก่อนเลย..."
2004102-40 = "[s] \"แล้วทำไมไม่ลองดูล่ะ?\""
2004102-44 = "ฉันกลัวน่ะสิ..."
2004102-48 = "[ns3] \"ไม่ได้การละ ไปซื้อกันเถอะ\"\n[ns4] \"ไปซูเปอร์มาร์เก็ตข้างหน้ากับครูดีกว่า\""
2004102-51 = "ไม่ไปหรอก ซูเปอร์มาร์เก็ตตรงนั้นไม่ลดราคาอาหาร มันเป็นตัวเลือกที่ไม่สมเหตุสมผลน่ะ"
2004102-52 = "[s] \"ไปเถอะนะ ครูจะซื้อให้เอง!\""
2004102-53 = "กะ... ก็ได้"
2004102-55 = "(คุณครูจับมือริโอะแล้วมุ่งหน้าไปที่ร้านค้า)"
2004102-58 = "อะ... อันนั้นมันเรียกว่าอะไรนะครู? ผักสีขาวๆ ที่มันเป็นรูปแบบแฟร็กทัล...? มิติเฮาส์ดอร์ฟน่าจะ... ประมาณ 2.7 นะ..."
2004102-59 = "กะหล่ำดอกงั้นเหรอ? ดะ... ดูน่ากลัว ไม่น่ากินยังไงไม่รู้... หืม? ถ้าต้มให้ดี จะได้รสชาติเหมือนมันฝรั่ง#nงั้นเหรอ?"
2004102-64 = "มันฝรั่ง แคร์รอต หัวหอม... แล้วก็มะเขือเทศ อืม ผักประมาณนี้ฉันรู้จัก แล้วก็ยังมี..."
2004102-65 = "ซะ... ซื้อเนื้อเยอะขนาดนั้นได้เหรอ...?"
2004102-67 = "(แล้วคุณครูก็สอนเรื่องการจ่ายตลาดให้ริโอะผู้ไม่รู้อะไรเลย)"
2004102-68 = "(แม้ว่าจริงๆ คุณครูก็ไม่ค่อยรู้อะไรมากและต้องใช้อินเทอร์เน็ตช่วยก็ตาม...)"
2004102-70 = "..."
2004102-71 = "ส่วนมากซื้อมาเป็นพวกแหล่งโปรตีนกับพวกผักสินะ ส่วนคาร์โบไฮเดรตก็เหมือนจะลดลงไปมาก เมื่อเทียบกับแต่ก่อน"
2004102-72 = "ว่าแต่ แล้วจากนี้จะทำยังไงต่อเหรอ ครู?"
2004102-73 = "[s] \"วันนี้ครูจะทำอาหารที่ชาเล่ต์ให้เอง\""
2004102-74 = "เอะ... เอ๋? ครูทำอาหารเป็นด้วยเหรอ?"
2004102-75 = "ทำไม่เป็นเลยสักนิดงั้นเหรอ? แล้วจะทำยังไง...? ถ้าดูสูตรอาหารจากอินเทอร์เน็ตแล้วทำตาม ก็น่าจะออกมากินได้อยู่งั้นเหรอ...?"
2004102-76 = "ถึงการพึ่งพาลางสังหรณ์หรืออะไรทำนองนั้นมากเกินไปจะเป็นสิ่งที่ไม่สมเหตุสมผลก็เถอะ..."
2004102-77 = "แต่แบบนี้ฉันไม่สบายใจเลย"
2004102-78 = "[s] \"ขอบใจที่เชื่อใจกันขนาดนี้นะ...\""
2004102-80 = "(หลังจากจัดการนู่นนี่เสร็จ คุณครูก็กลับมาที่ชาเล่ต์)"
2004102-84 = "[ns] \"ไปนั่งพักก่อนนะ เรื่องอาหารเดี๋ยวครูจัดการเอง\""
2004102-85 = "อะ... อื้ม"
2004102-94 = "นี่มัน...?"
2004102-95 = "สตูจัดเป็นอาหารที่ใครๆ ก็ทำได้งั้นเหรอ?"
2004102-96 = "..."
2004102-97 = "ขอบคุณนะครู จะกินให้อร่อยเลย"
2004102-102 = "(หลังจากนั้นทั้งสองคนก็กินสตูจนเกลี้ยงชามโดยไม่สนทนาอะไรกัน)"
2004102-104 = "ฉันว่า..."
2004102-105 = "[ns] \"ว่า...?\""
2004102-106 = "ใช่ว่ามันไม่อร่อยหรอกนะ"
2004102-107 = "แต่มันก็... ไม่ได้ถึงกับอร่อย... ประมาณนั้นน่ะ"
2004102-108 = "[s] \"เป็นอย่างนี้สินะ...\""
2004102-109 = "..."
2004102-110 = "แต่ถึงยังไงก็"
2004102-117 = "เป็นรสชาติที่ทำให้หัวใจอบอุ่นเลยนะ"

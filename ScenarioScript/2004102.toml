[translation]
2004102-1 = "Logical Life"
2004102-2 = "I went where Rio asked me to go."
2004102-3 = "The process of getting there, through all the security, was quite a hassle."
2004102-7 = "Are you here, Sensei? Have you been waiting long?"
2004102-8 = "You just got here? I see. I'd mistakenly assumed you would follow the optional route."
2004102-9 = "[s] \"Let me ask you something...\""
2004102-10 = "Hm? What do I usually eat?"
2004102-11 = "Well, of course, discount dinner bento and frozen food. That's a very logical choice."
2004102-12 = "For one thing, that bento can reach up to 50% off, and the taste is acceptable."
2004102-13 = "Especially the katsu bento and kaarage rice bowls. In fact, those are amazing."
2004102-14 = "Unfortunately, the place I usually get it from took the day off."
2004102-15 = "On a normal day, they have people fighting for their food. That's how good it is."
2004102-16 = "With frozen food, it lasts a long time, and you can store it in bulk."
2004102-17 = "Again, a logical choice."
2004102-18 = "[s1] \"You're going to ruin your health...\"\n[s2] \"At least order delivery for something more healthy...\""
2004102-21 = "I can't order delivery. It's irrational. Delivery orders can be tracked."
2004102-22 = "If a delivery driver happened to remember my face, I'd be in a world of danger."
2004102-23 = "Not only that, but they offer perks for leaving reviews. Discounts and such."
2004102-24 = "It would be irrational of me not to take advantage of that..."
2004102-25 = "...but again, any review could be traced back to me."
2004102-26 = "In the vernacular, it's a dilemma."
2004102-27 = "And I prefer to avoid any such dilemmas whenever possible."
2004102-28 = "As is, again, logical."
2004102-29 = "[s] \"That food's cheap now, sure, but hospital bills are expensive.\""
2004102-30 = "H-Huh? Well, bento and frozen foods ARE often fried..."
2004102-31 = "...which means they're too high in carbohydrates and fat, and they lack fiber and vitamins..."
2004102-32 = "...That is indeed a factor, yes. But I can always take vitamin supplements."
2004102-33 = "And as for fiber..."
2004102-34 = "Well, my body has been fine without fiber so far."
2004102-35 = "[s] \"That isn't fine.\""
2004102-36 = "How significant could plant fiber possibly be for anyone's body? Plus there are all kinds of supplements..."
2004102-37 = "...besides, I can't cook."
2004102-38 = "Huh? What if I make something like the Avant Guard, but for cooking? As in, with online recipes?"
2004102-39 = "Well, I can't say I've ever tried that..."
2004102-40 = "[s] \"...But?\""
2004102-44 = "...But I'm scared..."
2004102-48 = "[ns3] \"Rio!!\"\n[ns4] \"That's it. We're going to the supermarket.\""
2004102-51 = "No, their prices are too high. It's an irrational choice."
2004102-52 = "[s] \"I'm buying. Let's go.\""
2004102-53 = "A-All right..."
2004102-55 = "I dragged Rio off to the supermarket."
2004102-58 = "S-Sensei, what IS that? Some white vegetable in a fractal structure...? The Hausdorff dimension...seems to be about 2.7..."
2004102-59 = "It's called \"cauliflower\"? I-It looks scary to eat... Hmm? It tastes like potato when it's boiled properly...?"
2004102-64 = "...So here we have potatoes, carrots, onions, and...tomatoes. Yes, those I know. On a related note..."
2004102-65 = "Are you sure you want to buy that much meat...?"
2004102-67 = "And so, I taught Rio, who knew nothing about grocery shopping, how to shop for herself."
2004102-68 = "Honestly, I didn't know much about grocery shopping either, so I got a lot of help from the internet..."
2004102-70 = "..."
2004102-71 = "I see, it's based on protein and vegetables. With less carbohydrate content than before."
2004102-72 = "So what now, Sensei?"
2004102-73 = "[s] \"I'll cook for you at Schale.\""
2004102-74 = "H-Huh? You know how to cook?"
2004102-75 = "You don't, at all? Then how...? ...Your plan is to follow some recipes off the internet and hope something edible comes out of it?"
2004102-76 = "...Listen, far be it from me to put any stock in premonitions..."
2004102-77 = "...but I do have a bit of a bad feeling about this."
2004102-78 = "[s] \"That's fair. It hurts, but it's fair...\""
2004102-80 = "After a bit more meandering, we made it back to Schale."
2004102-84 = "[ns] \"Go relax for a bit. I'll...try to make this work.\""
2004102-85 = "A-All right."
2004102-94 = "Is this...?"
2004102-95 = "Stew, hmm? So...anyone can cook stew, relatively speaking?"
2004102-96 = "..."
2004102-97 = "Thank you for the food, Sensei."
2004102-102 = "For a while, we emptied the bowl of stew in silence."
2004102-104 = "Somehow, it..."
2004102-105 = "[ns] \"S-Somehow, it...what?\""
2004102-106 = "...doesn't taste bad."
2004102-107 = "I wouldn't call it GOOD, mind you..."
2004102-108 = "[s] \"I see...\""
2004102-109 = "..."
2004102-110 = "But..."
2004102-117 = "...I do find the taste... I believe the word is \"heartwarming.\""

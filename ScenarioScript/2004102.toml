[translation]
2004102-1 = "#title;합리적인 생활"
2004102-2 = "#na;(리오가 이야기해 준 방법대로, 약속 장소에 도착했다.)"
2004102-3 = "#na;(안전과 보안을 위해서라지만…… 그 과정은 제법 번거로웠다.)"
2004102-4 = "#st;[0,0];instant;1;"
2004102-5 = "#clearST"
2004102-6 = "#wait;2000"
2004102-7 = "3;리오;02;왔어, 선생? 많이 기다렸을까?\n#3;a\n#3;em;[반응]"
2004102-8 = "3;리오;99;방금 도착했다고? 그래. 예측대로네. 가장 합리적인 방법으로 선생의 동선을 산정해 두었으니까, 당연하겠지."
2004102-9 = "[s] \"일단, 한 가지 묻고 싶은 게 있는데…….\""
2004102-10 = "3;리오;02;응? 평소 식사를 어떻게 하고 있냐고?\n#3;em;[?]"
2004102-11 = "3;리오;99;그거야 당연히, 저녁 세일 도시락과 냉동식품이지. 이건 매우 합리적인 선택이야."
2004102-12 = "3;리오;02;우선, 저녁 세일 도시락은 50%까지도 할인하는 경우가 많고, 맛도 나쁘지 않아."
2004102-13 = "3;리오;99;특히 돈까스 도시락과 가라아게 덮밥이 일품이지.\n#3;em;[반짝]"
2004102-14 = "3;리오;07;……오늘은 예정에 없던 휴무였지만."
2004102-15 = "3;리오;01;그 대신 경쟁이 치열하기는 한데, 그 정도는 당연히 붙을 수 있는 페널티라고 생각해."
2004102-16 = "3;리오;03;냉동식품의 경우, 유통기한도 길고 한 번에 많이 보관할 수도 있어."
2004102-17 = "3;리오;08;그야말로, 합리적이지.\n#3;em;[재잘]"
2004102-18 = "[s1] \"그러다 몸 버려…….\"\n[s2] \"차라리 좀 건강한 걸로 배달시켜 먹어…….\""
2004102-19 = "#wait;10"
2004102-20 = "#wait;10"
2004102-21 = "3;리오;02;배달은 안 돼. 비합리적이야. 무엇보다, 추적당할 위험이 있어.\n#3;em;[반응]"
2004102-22 = "3;리오;99;만에 하나 배달원이 내 얼굴을 기억하게 된다면…… 그건, 그것 나름대로 위험하고."
2004102-23 = "3;리오;01;거기에 배달 리뷰를 쓰면, 할인을 해 주거나 덤을 얹어 주는데."
2004102-24 = "3;리오;07;그런 서비스를 제공하는데도, 하지 않는 것은 그야말로 비합리의 극치이지.\n#3;em;[한숨]"
2004102-25 = "3;리오;99;그렇지만 리뷰를 썼다가는 추적당할 가능성이 다시 생겨날 것이고……."
2004102-26 = "3;리오;02;우리는 이런 현상을 딜레마라고 부르기로 사회적 합의를 했어."
2004102-27 = "3;리오;03;그리고 이제부터는, 가능한 한 딜레마 상황을 피하려고 해."
2004102-28 = "3;리오;08;그야말로, 합리적이지.\n#3;em;[반짝]"
2004102-29 = "[s] \"그렇게 살다가 나중에 병원비가 더 나온다……?\""
2004102-30 = "3;리오;04;으, 응? 도시락이나 냉동식품은 튀김 같은 게 많아서…….\n#3;em;[?]"
2004102-31 = "3;리오;04;지방 함유량은 너무 높고, 탄수화물 위주인 데다, 섬유질이나 비타민도 부족하다고……?"
2004102-32 = "3;리오;06;……그래. 그럴 가능성이 있다는 건 부정하지 않아. 그래도 비타민은 영양제로 먹으면 되고…….\n#3;em;[땀]"
2004102-33 = "3;리오;07;섬유질은……."
2004102-34 = "3;리오;08;아직은 몸이 버텨 주니까, 괜찮지 않을까?\n#3;em;[음표]\n#3;closeup"
2004102-35 = "[s] \"안 괜찮습니다.\""
2004102-36 = "3;리오;04;시, 식물 섬유가 영향을 주는 범위는, 그렇게까지 크지 않다고 생각해. 영양제로 필수 영양소를 보충하고 있기도 하고……."
2004102-37 = "3;리오;07;무엇보다 나, 요리 못 하는걸…….\n#3;em;[속상함]"
2004102-38 = "3;리오;02;응? 내 발명품으로, 요리하는 아방가르드 군 같은 거 만들면 안 되냐고? 레시피는 인터넷에도 많으니까?\n#3;em;[반응]"
2004102-39 = "3;리오;04;그게, 해 본 적이 없어서……."
2004102-40 = "[s] \"없어서?\""

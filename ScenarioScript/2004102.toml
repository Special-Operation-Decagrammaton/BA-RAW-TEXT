2004102-58 = "3;리오;04;그, 그건 뭐야. 선생? 뭔가 흰색 야채가, 프랙털 구조로 성립되어 있는데……? 하우스도르프 차원은…… 2.7 정도인가…….\n#3;a\n#3;em;[?]"
2004102-59 = "3;리오;04;콜리플라워라는 야채라고? 뭐, 뭔가 먹기 무서워……. 응? 잘 삶으면, 감자 맛이 난다고……?\n#3;em;[땀]"

2004102-71 = "3;리오;01;확실히, 단백질과 야채 위주의 구성이네. 탄수화물 함량이 이전에 비해 확연히 적어진 것 같기도 하고."
2004102-72 = "3;리오;02;그런데, 이제부터 어쩔 생각이야. 선생?"
2004102-73 = "[s] \"오늘은 내가 샬레에서 요리를 해 줄게.\""
2004102-74 = "3;리오;04;어, 어? 선생, 요리도 할 줄 알아?\n#3;em;[?]"
2004102-75 = "3;리오;04;하나도 못 한다고? 그러면 어떻게……? 인터넷 레시피를 보면서 그대로 따라 하면, 먹을만한 게 나올 거다……?"
2004102-76 = "3;리오;07;……예감 같은 것에 너무 의지하는 것은 비합리적이겠지만……."
2004102-77 = "3;리오;06;뭔가, 불안하다는 느낌이 들어.\n#3;em;[세로선]"

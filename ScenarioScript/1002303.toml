[translation]
1002303-1 = "The Prefect Team's Weakness"
1002303-2 = "I decided to follow Iori after her concerning MomoTalk message."
1002303-7 = "I hope no one saw that."
1002303-8 = "I know it was a mistake, but of all the people to see that message, it had to be Sensei..."
1002303-10 = "I'm going to be late now. I have to hurry to the meeting spot."
1002303-15 = "[ns] Follow Iori."
1002303-19 = "It's about time you showed up. I've been waiting."
1002303-20 = "Did you bring it?"
1002303-21 = "Obviously."
1002303-22 = "I never expected the Gehenna Prefect Team's cold and calculating specialist to go through secret channels to do business with me."
1002303-23 = "I didn't have any other choice. The other students would have noticed if I tried to buy it through normal means."
1002303-24 = "Anyway, you're going to keep this a secret, right?"
1002303-25 = "Of course. Protecting our customers' confidentiality is in our own best interest."
1002303-26 = "Now, let's see the item, shall we?"
1002303-31 = "Everything checks out."
1002303-32 = "Here's your money."
1002303-33 = "[s] \"What's going on here?\""
1002303-34 = "What the...? Sensei?!"
1002303-35 = "Wh-What are you doing here?!"
1002303-36 = "[s] \"I followed you because of your message.\""
1002303-38 = "You did WHAT?! You've been stalking me this entire time?!"
1002303-39 = "You're despicable! Die, you pervert!"
1002303-40 = "[s] \"But you're the one who's acting suspicious.\""
1002303-41 = "There's nothing suspicious going on here."
1002303-42 = "All I sold her was a—"
1002303-43 = "Stop! Didn't you just say that protecting your customers' confidentiality was in your best interest?"
1002303-44 = "Why would you spill it so easily?!"
1002303-45 = "But wouldn't it be equally troublesome if rumors spread that you were buying something illegal?"
1002303-46 = "You're in a lose-lose situation, so you might as well clear things up."
1002303-47 = "That's true, but..."
1002303-48 = "[s] \"Just be honest with me. I'll hear you out.\""
1002303-52 = "...Floaties."
1002303-53 = "[s] \"What?\""
1002303-54 = "I said I was buying floaties."
1002303-55 = "[s] \"What?\""
1002303-59 = "I SAID FLOATIES! Like the kind you wear around your arms and waist to help you swim!"
1002303-60 = "This is why I was trying not to get caught! Now you're just going to make fun of me!"
1002303-61 = "[s] \"Why would you need to buy floaties?\""
1002303-62 = "Because I can't swim!"
1002303-63 = "I often end up missing my swimming classes at Gehenna due to Prefect Team business."
1002303-64 = "What would happen if a fugitive were to flee via the water and I couldn't swim? That would be disastrous."
1002303-65 = "So I was buying these floaties in secret so I could practice swimming."
1002303-66 = "I just had to be caught by you of all people..."
1002303-67 = "[s] \"I'll teach you how to swim.\""
1002303-68 = "What? Why would you want to do that?"
1002303-69 = "...You have some kind of dirty ulterior motive in mind, don't you? You can't fool me."
1002303-70 = "[s] \"But things will go much faster than if you practice alone.\""
1002303-71 = "I'm not saying you're wrong, but..."
1002303-74 = "(There's no point in hiding the fact I can't swim from Sensei.)"
1002303-75 = "(This could be a blessing in disguise. Better Sensei finds out than any of the other students.)"
1002303-78 = "Fine. I'll accept..."
1002303-79 = "...but if you pull any funny business, I'll kill you where you stand."
1002303-80 = "[s] \"I'll try my best.\""
1002303-81 = "What do you mean you'll try?! Just keep your hands off me!"
1002303-83 = "I diligently practiced swimming with Iori until late at night."

[translation]
1002303-1 = "某風紀委員的弱點"
1002303-2 = "（很在意伊織的MomoTalk內容，於是偷偷跟在他後面）"
1002303-7 = "……呼，應該沒有人看見吧？"
1002303-8 = "怎麼會好死不死傳到老師那邊啊……"
1002303-10 = "……時間差不多了。"
1002303-15 = "[ns] 跟著伊織走"
1002303-19 = "嘿嘿，歡迎光臨。等候客人多時了。"
1002303-20 = "……說好的那個呢？"
1002303-21 = "當然，就在這裡。"
1002303-22 = "不過還真意外。#n號稱沒血沒淚的格黑娜風紀委員會專家，竟然會要求用這種方法交易……呵呵呵。"
1002303-23 = "有，有什麼辦法！雖然想用正常方式購買「那個」，但又不想被任何人看見……"
1002303-24 = "……我會確實付錢的，你也會確實保密吧？"
1002303-25 = "當然。畢竟要是洩露顧客隱私，也會動搖到我們的信用。"
1002303-26 = "那麼請看……"
1002303-31 = "……嗯，不錯。"
1002303-32 = "那麼費用──"
1002303-33 = "[s] 「……你在買什麼？」"
1002303-34 = "哇！？老，老老老，老師？！"
1002303-35 = "為，為什麼老師會在這種地方……？"
1002303-36 = "[s] 「因為太在意伊織的訊息，所以就跟來了。」"
1002303-38 = "哈……！那你一直在跟蹤我嗎……！？"
1002303-39 = "你這痴漢！變態！去死啦！"
1002303-40 = "[s] 「我只是擔心伊織會不會牽扯到什麼不好的事情。」"
1002303-41 = "這，這不是什麼不好的東西……！"
1002303-42 = "這只是個──"
1002303-43 = "等等！！說好的客人隱私呢！？不是說會保密嗎！"
1002303-44 = "不要跟老師說啦！"
1002303-45 = "但要是被誤為是在交易可疑物品的話，對我們、對伊織同學來說，都會很困擾吧？"
1002303-46 = "……何況這東西又藏不了一輩子。"
1002303-47 = "話是沒錯啦……"
1002303-48 = "[s] 「不管怎麼樣我保證都不會生氣，希望你們能老實說。」"
1002303-52 = "……圈。"
1002303-53 = "[s] 「……嗯？」"
1002303-54 = "……游泳圈。"
1002303-55 = "[s] 「…………嗯？」"
1002303-59 = "你分明就有聽到！游泳圈啦！就是不會游泳的人在使用的那個游泳圈啦！！"
1002303-60 = "啊！討厭啦！！就是會這樣我才最不想被老師知道這件事！"
1002303-61 = "[s] 「也就是說，難道你……」"
1002303-62 = "對啦！我不會游泳啦！！"
1002303-63 = "因為風紀委員會的活動太忙了，遇到游泳課也會經常請假……"
1002303-64 = "但有人違規逃到海上時，總不能藉口說自己不會游泳……"
1002303-65 = "所以我想偷偷個買泳圈練習游泳……"
1002303-66 = "煩耶！為什麼偏偏會被老師發現啦……"
1002303-67 = "[s] 「我來幫你練習游泳吧。」"
1002303-68 = "什麼？為什麼老師……？"
1002303-69 = "……你一定在想什麼下流事吧？我不會上當的。"
1002303-70 = "[s] 「我只是覺得會比獨自練習更有效率。」"
1002303-71 = "確實是這樣沒錯……"
1002303-74 = "（仔細想想，既然都露餡了也沒必要對老師繼續隱瞞下去……）"
1002303-75 = "（而且要這能因此不在大家面前丟臉……）"
1002303-78 = "……我知道了。那就拜託你了。"
1002303-79 = "……但你要是敢亂碰我，我會馬上開槍。"
1002303-80 = "[s] 「我會努力。」"
1002303-81 = "不能只有「努力」！是「絕對」不准亂摸！"
1002303-83 = "（後來就和伊織一起前往深夜的海邊，努力練習游泳）"

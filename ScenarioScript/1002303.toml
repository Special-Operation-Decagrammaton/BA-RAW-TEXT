[translation]
1002303-1 = "จุดอ่อนของคณะกรรมการวินัย"
1002303-2 = "(คุณครูแอบตามอิโอริไปเพราะยังคาใจเรื่องที่คุยใน MOMOTALK)"
1002303-7 = "คงไม่มีใครเห็นใช่มั้ย?"
1002303-8 = "ถึงจะไม่ได้ตั้งใจก็เถอะ แต่คุณครูดันเห็นข้อความนั้นไปแล้ว..."
1002303-10 = "ต้องไปสายกว่าที่นัดไว้แน่เลย ต้องรีบไปที่นั่นแล้ว"
1002303-15 = "[ns] ตามอิโอริไป"
1002303-19 = "ฮุฮุ มาแล้วเหรอคะ? ฉันกำลังรออยู่เลยค่ะ"
1002303-20 = "เตรียมของมาตามที่สัญญาใช่มั้ย?"
1002303-21 = "แน่นอนสิคะ"
1002303-22 = "แต่คาดไม่ถึงเลยนะคะ ใครจะไปคิดว่าผู้เชี่ยวชาญแห่งคณะกรรมการวินัยเกเฮนน่า ที่ไร้ความปรานี#nจะมาแอบซื้อของอะไรแบบนี้ ฮุฮุ"
1002303-23 = "มันก็ช่วยไม่ได้นี่นา! ขืนฉันไปซื้อ 'สิ่งนั้น' ด้วยวิธีปกติละก็ ได้โดนนักเรียนคนอื่นจับได้พอดี..."
1002303-24 = "เอาเถอะ แต่เธอรับปากใช่มั้ยว่าจะเก็บเรื่องนี้เป็นความลับ?"
1002303-25 = "แน่นอนค่ะ การรักษาความลับของลูกค้ามันส่งผลกับความน่าเชื่อถือของพวกเรานี่คะ"
1002303-26 = "งั้นมาดูของที่ว่าก่อนเลยค่ะ"
1002303-31 = "ใช้ได้เลยนะ เท่านี้ก็หายห่วง"
1002303-32 = "งั้นก็จ่ายเงินเลย..."
1002303-33 = "[s] \"ซื้อขายอะไรกันน่ะ?\""
1002303-34 = "เฮือก! คะ... คะ... คุณครู?!"
1002303-35 = "ทะ...ทำไมถึงมาที่แบบนี้ได้...?"
1002303-36 = "[s] \"ครูตามมาเพราะติดใจกับข้อความที่อิโอริส่งมาน่ะ\""
1002303-38 = "อะ... อะไรกันเนี่ย! จะบอกว่าแอบตามฉันมาถึงนี่เลยงั้นเหรอ?"
1002303-39 = "แย่ที่สุด! คนโรคจิต! ไปตายซะ!"
1002303-40 = "[s] \"แต่อิโอริเป็นฝ่ายส่งข้อความน่าสงสัยมาก่อนนะ?\""
1002303-41 = "นะ... นี่ไม่ใช่ของน่าสงสัยหรอกค่ะ"
1002303-42 = "สิ่งที่ฉันขายไม่ใช่อะไรอื่น ก็แค่..."
1002303-43 = "เดี๋ยวก่อน! ไหนว่าการรักษาความลับของลูกค้าจะส่งผลต่อความน่าเชื่อถือของกิจการไง?"
1002303-44 = "แล้วทำไมจู่ๆ ก็คิดจะสารภาพขึ้นมาล่ะ?"
1002303-45 = "แต่ถ้ามีข่าวลือออกไปว่ามีการซื้อขายสิ่งที่น่าสงสัยละก็ คุณอิโอริเองก็จะเสียความน่าเชื่อถือ#nเหมือนกันนี่คะ"
1002303-46 = "ยังไงก็ถูกจับได้แล้ว เราบอกไปเถอะค่ะ"
1002303-47 = "นั่นมันก็จริงอยู่หรอก แต่ว่า..."
1002303-48 = "[s] \"ครูจะไม่ถือโทษอะไร แค่พูดความจริงออกมาก็พอ\""
1002303-52 = "ห่วงยาง..."
1002303-53 = "[s] \"ว่าไงนะ?\""
1002303-54 = "ก็บอกว่าซื้อห่วงยางไง..."
1002303-55 = "[s] \"ว่าไงนะ?\""
1002303-59 = "หูตึงรึไง? ก็บอกอยู่ว่าห่วงยาง! ห่วงยางเสริมที่เอาไว้ใส่แขนขาเวลาว่ายน้ำไงเล่า!"
1002303-60 = "ฮึ่ย ทำไมต้องให้โมโหนะ! เพราะแบบนี้ไงถึงไม่อยากให้คุณครูรู้เรื่องนี้! เพราะรู้ว่าจะเอาแต่แกล้งไงล่ะ!"
1002303-61 = "[s] \"แล้วทำไมถึงต้องซื้อห่วงยางเหรอ?\""
1002303-62 = "ก็เพราะว่ายน้ำไม่เก่งไงเล่า!"
1002303-63 = "ฉันต้องโดดคลาสว่ายน้ำไปทำงานของคณะกรรมการวินัยอยู่บ่อยๆ ก็เลยไม่ได้ฝึกว่ายน้ำให้ชำนาญน่ะ"
1002303-64 = "เพราะงั้นถ้ามีใครละเมิดกฎแล้วว่ายน้ำลงทะเลหนีไป ฉันก็คงงานเข้าแน่ๆ"
1002303-65 = "เพราะงี้ก็เลยต้องแอบนักเรียนคนอื่นๆ มาซื้อห่วงยางไปฝึกว่ายน้ำยังไงล่ะ..."
1002303-66 = "แต่ก็ดันมาโดนคุณครู [USERNAME] จับได้ซะก่อน..."
1002303-67 = "[s] \"ครูจะช่วยฝึกว่ายน้ำให้เอง\""
1002303-68 = "หา? ทำไมจู่ๆ ก็จะมาช่วยล่ะ?"
1002303-69 = "มีความคิดชั่วร้ายอยู่ในใจใช่มั้ย? ฉันไม่ยอมถูกหลอกหรอกนะ!"
1002303-70 = "[s] \"ฝึกด้วยกันน่าจะเรียนรู้ได้ไวกว่าฝึกคนเดียวนะ\""
1002303-71 = "มันก็จริงอยู่หรอก..."
1002303-74 = "(จะว่าไป เราก็ไม่มีความจำเป็นต้องปิดบังคุณครูนี่นาว่าว่ายน้ำไม่เป็น...)"
1002303-75 = "(ยอมขายหน้าคุณครู น่าจะดีกว่าขายหน้าพวกนักเรียนคนอื่นๆ)"
1002303-78 = "ก็ได้ งั้นก็รบกวนหน่อยแล้วกัน"
1002303-79 = "แต่ถ้าแกล้งแต๊ะอั๋งกันละก็ ไม่ได้ตายดีๆ แน่"
1002303-80 = "[s] \"จะพยายามนะ\""
1002303-81 = "'จะพยายาม' งั้นเหรอ!? ต้องไม่ทำเลยต่างหากสิ!"
1002303-83 = "(หลังจากนั้น คุณครูก็ช่วยอิโอริฝึกว่ายน้ำในทะเลกลางแสงจันทร์)"

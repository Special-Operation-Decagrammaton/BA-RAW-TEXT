[translation]
83306010300-7 = "อ๊ะ นี่มัน..."
83306010300-12 = "ของเล่นที่ได้เป็นของขวัญจากคุณครูเมื่อนานมาแล้วนี่นา"
83306010300-13 = "ฮุฮุ... ยังจำได้อยู่เลยว่าตอนแรกที่เห็น ฉันตกใจว่ามีของอะไรแบบนี้ด้วยเหรอ"
83306010300-14 = "ไม่ได้เล่นมานานแล้ว... ไหนลองเปลี่ยนถ่าน..."
83306010300-22 = "อืม แล้วเก็บไว้อย่างนี้ดีไหมนะ"
83306010300-23 = "ก็มันเป็นของในความทรงจำที่มีชิ้นเดียวในโลกของฉันนี่เนอะ..."

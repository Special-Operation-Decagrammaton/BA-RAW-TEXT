[translation]
10025090-1 = "第9話;水中的兔子"
10025090-3 = "喂，動作快！"
10025090-4 = "要在濃霧散去前把裡面的東西調包！"
10025090-5 = "是的，船長！"
10025090-7 = "……霧比預期中還濃真是幫大忙了。#n這樣一來，不管在船上幹什麼勾當都不會被發現吧。"
10025090-8 = "不過在船上也看不到村子的情況，讓人有點不安就是了……"
10025090-9 = "算了，快被發現的話馬上逃得遠遠的就沒事了。"
10025090-14 = "那個，董事長……不，船長。#n原本裝在箱子裡的冷凍蝦要怎麼處理？"
10025090-15 = "怎麼現在還在問這種問題。"
10025090-16 = "──全部倒海裡去。"
10025090-17 = "可，可是……這些蝦子都還能吃……"
10025090-18 = "浪費食物可是要遭天譴的啊……"
10025090-20 = "你們就是這樣才會一直毫無長進。#n不要捨不得那些便宜貨。"
10025090-22 = "要是這次順利成功，別說是蝦子了，貴上幾倍的高價生魚片都隨你吃。"
10025090-23 = "聽懂了嗎？趕快把那些都丟一丟。"
10025090-24 = "……真搞不懂人們為什麼會喜歡那種味道和口感都很奇怪的甲殼類。"
10025090-25 = "我知道了……"
10025090-30 = "船長，有一艘小船正在接近。"
10025090-31 = "……要直接無視嗎？"
10025090-32 = "這個夜戶浦村的村民竟敢靠近「返魂之船」……？"
10025090-33 = "不，看起來不像村民……我想可能是那些觀光客。"
10025090-34 = "嘖，到最後還給我製造麻煩……"
10025090-36 = "喂，聯絡機房，立刻全速離開。"
10025090-37 = "立刻全速──"
10025090-42 = "什麼……剛才的聲音是！？"
10025090-43 = "船，船底突然發生了異常狀況……！螺旋槳不聽使喚！"
10025090-44 = "你說什麼？偏偏在這種時候……"
10025090-45 = "緊急停止之後用手動掌舵模式再試一次！"
10025090-46 = "不，不行……！螺旋槳整個支離破碎了！"
10025090-47 = "又沒有撞上暗礁，螺旋槳為什麼會突然出狀況！？"
10025090-48 = "船長，小船持續靠近中……已經近在眼前了！"
10025090-49 = "可惡……！"
10025090-51 = "喂，做好戰鬥準備！一定要讓他們後悔……！"

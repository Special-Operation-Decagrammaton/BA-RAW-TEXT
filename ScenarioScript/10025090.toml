[translation]
10025090-1 = "#title;제9화;물 속의 토끼"
10025090-2 = "3;해운업자;00\n#3;a"
10025090-3 = "3;해운업자;00;자자, 빨리빨리 움직여!\n#3;em;[!]"
10025090-4 = "3;해운업자;00;안개가 걷히기 전에 서둘러 새우 상자 안에 든 물건을 모두 교체해야 하니까."
10025090-5 = "3;선원 A;00;네, 선장님!\n#3;em;[반응]"
10025090-6 = "#all;hide"
10025090-7 = "3;해운업자;00;……안개가 생각보다 짙어서 다행이야. 이 정도의 해무라면 배 위에서 무슨 짓을 하더라도 들키지 않겠지."
10025090-8 = "3;해운업자;00;다만 배에서도 마을의 모습이 보이지 않는 게 살짝 불안하긴 하지만……"
10025090-9 = "3;해운업자;00;뭐, 조금이라도 이상한 기색이 보이거든 바로 시동을 걸어 먼바다로 도망치면 그만이지.\n#3;em;[음표]"
10025090-10 = "#st;[0,0];instant;1;"
10025090-11 = "#clearST"
10025090-12 = "#wait;2200"
10025090-13 = "3;해운업자;00\n5;선원 B;00\n#5;al\n#3;m1\n#wait;1000"
10025090-14 = "5;선원 B;00;저기, 대표…… 아니, 선장. 상자 안에 원래 들어있던 냉동 새우는 어떻게 하지?\n#5;em;[?]"
10025090-15 = "3;해운업자;00;뭘 새삼스럽게 묻는 거야?"
10025090-16 = "3;해운업자;00;어차피 비싼 물건도 아닌데, 모조리 다 바다에 내다 버리라고."
10025090-17 = "5;선원 B;00;하지만…… 이렇게 멀쩡한 새우를 그냥 버려도 되는 거야?"
10025090-18 = "5;선원 B;00;뭔가 멀쩡한 식재료를 내다 버리는 것처럼 느껴져서 꺼림칙한걸……"
10025090-19 = "#all;hide"
10025090-20 = "3;해운업자;00;이봐, 그런 싸구려에 집착하지 말라고 했잖아. 그렇게 사소한 것에 집착해서야, 언제 큰돈을 만져볼 건데?\n#3;em;[빠직]\n#3;closeup"
10025090-21 = "#all;hide"
10025090-22 = "5;선원 B;00\n1;해운업자;00;이번 일만 잘 풀리면 새우가 아니라, 최고급 참돔을 매 끼니마다 먹게 해 줄 테니까……"
10025090-23 = "1;해운업자;00;새우 같은 맛없는 식재료 따윈 신경 쓰지 마.\n#1;em;[음표]"
10025090-24 = "1;해운업자;00;……그 맛도 없고 식감도 이상한 갑각류를 왜 사람들이 좋아하는지 모르겠다니까."
10025090-25 = "5;선원 B;00;알겠어……\n#5;em;…"
10025090-26 = "#st;[0,0];instant;1;"
10025090-27 = "#clearST"
10025090-28 = "1;해운업자;00\n5;선원 B;00\n#1;d\n#5;d\n#wait;1000"
10025090-29 = "#wait;500"
10025090-30 = "3;선원 C;00;선장, 이쪽으로 천천히 접근하는 소형 선박이 한 척 있어.\n#3;a\n#3;sig"
10025090-31 = "3;선원 C;00;……어떻게 하지? 무시할까?\n#3;sig"
10025090-32 = "1;해운업자;00;야토우라 마을의 누가 겁도 없이 <재래의 배>에 가까이 접근하는 거야……?\n#1;a\n#3;m5\n#1;em;[빠직]"
10025090-33 = "3;선원 C;00;잘 보이진 않지만, 옷차림이 이 마을 사람들 같아 보이지는 않는데…… 외부에서 온 관광객 같아.\n#3;sig"
10025090-34 = "1;해운업자;00;저 외지인 녀석들, 끝까지 귀찮게 하네……"
10025090-35 = "#all;hide"
10025090-36 = "3;해운업자;00;기관실, 양현 앞으로 전속. 반대 방향으로 최대한 빠져.\n#3;closeup"
10025090-37 = "3;선원 D;00;양현 앞으로 전속—\n#3;closeup\n#3;sig"
10025090-38 = "#all;hide"
10025090-39 = "#st;[0,0];instant;1;"
10025090-40 = "#clearST"
10025090-41 = "#bgshake\n#wait;1500"
10025090-42 = "3;해운업자;00;포, 폭발……? 함교, 이게 도대체 무슨 일이야?!\n#3;em;[?!]\n#3;shake"
10025090-43 = "5;선원 D;00;가, 갑자기 선체 아래에서 알 수 없는 폭발이…… 스크루가 말을 듣지 않아!\n#5;em;[!]\n#5;a\n#5;sig\n#5;stiff\n#3;m1"
10025090-44 = "3;해운업자;00;뭐라고? 하필이면 이 타이밍에……"
10025090-45 = "3;해운업자;00;긴급 정지 후 수동 조타 모드로 다시 한번 시도해 봐!"
10025090-46 = "5;선원 D;00;아무것도 안 돼…… 스크루가 통째로 박살 났나 봐!\n#5;sig"
10025090-47 = "3;해운업자;00;암초에 걸린 것도 아닌데 왜 갑자기 스크루가 박살이 나는데?!\n#3;em;[빠직]"
10025090-48 = "1;선원 C;00;선장, 소형 선박 계속해서 접근 중…… 점점 속도가 빨라지고 있어!\n#1;a\n#1;sig\n#1;em;[!]\n#3;m3"
10025090-49 = "3;해운업자;00;그으읏……!\n#3;stiff"
10025090-50 = "#all;hide"
10025090-51 = "3;해운업자;00;전원 전투 배치! 모두 승선 전투에 대비해!\n#3;closeup"

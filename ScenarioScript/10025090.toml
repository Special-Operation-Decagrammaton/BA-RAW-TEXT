[translation]
10025090-1 = "Episode 9;Rabbits in the Water"
10025090-3 = "Hurry! Get a move on!"
10025090-4 = "We've got to swap out everything in those shrimp crates before the fog lifts!"
10025090-5 = "Aye aye, Captain!"
10025090-7 = "Lucky thing the fog's so thick. We don't have to worry about the locals seeing us on deck..."
10025090-8 = "'Course, it makes me a little uneasy, not being able to see the village either, but..."
10025090-9 = "Well, if there's trouble, we can rev up our engine and head out to open ocean."
10025090-14 = "Hey, Boss—er, Captain. What do you want us to do with all this shrimp?"
10025090-15 = "Why are you bothering me with such useless questions?"
10025090-16 = "It's just shrimp. Throw it back into the sea."
10025090-17 = "That's kind of a waste, innit? All this perfectly good shrimp?"
10025090-18 = "My ma always taught me it's bad to waste food..."
10025090-20 = "Keep your eye on the prize. You'll never get rich if you worry about nonsense like \"waste.\""
10025090-22 = "Besides, after we're done here, we'll be eating the finest red snapper for every meal."
10025090-23 = "Don't waste your time worrying about some cheap garbage like shrimp."
10025090-24 = "Frankly, I don't understand people who waste their time eating those weird sea-bugs..."
10025090-25 = "Got it..."
10025090-30 = "Captain, there's someone headed our way. A little rubber dinghy."
10025090-31 = "What do we do? Just ignore 'em?"
10025090-32 = "Who the hell in Yatoura Village has the guts to approach the Stygian Ship...?"
10025090-33 = "It's hard to say, but I don't think they're from town... They're all wearing...swimsuits...?"
10025090-34 = "Those tourists. Again."
10025090-36 = "Engine room, full speed ahead. I want to put some distance between us and those meddlers."
10025090-37 = "Full speed ahead—"
10025090-42 = "An explosion...? What the heck is going on?!"
10025090-43 = "Some kinda impact under the hull... The propellers aren't responding!"
10025090-44 = "Why is this happening NOW of all times...?"
10025090-45 = "Full stop. Switch to manual controls and get us out of here!"
10025090-46 = "I'm getting nothing... I think the propellers were blown to pieces!"
10025090-47 = "We didn't ram the reef, did we?"
10025090-48 = "Captain, the dinghy... It's picking up speed!"
10025090-49 = "Gah...!"
10025090-51 = "Arm yourselves, crew! We're about to be boarded!"

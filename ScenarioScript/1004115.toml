[translation]
1004115-1 = "ความทรงจำที่คุ้นเคย"
1004115-2 = "(คุณครูออกไปข้างนอกเพราะกังวลเรื่อง MOMOTALK ที่มิซากิส่งมา)"
1004115-7 = "กะ... ก็บอกอยู่นี่ไงว่าลืมบัตรนักเรียนไว้ที่บ้าน..."
1004115-8 = "มีคนแจ้งว่ามีคนไร้บ้านเข้ามาในที่สาธารณะในตอนกลางคืนน่ะสิ"
1004115-9 = "ถ้ายืนยันตัวตนไม่ได้ ฉันก็ต้องแจ้งวัลคิรี่!"
1004115-10 = "อึก...!"
1004115-11 = "[s] \"มีเรื่องอะไรเหรอ?\""
1004115-15 = "อ๊ะ คุณครูจากชาเล่ต์นี่เอง มาทำอะไรที่นี่เวลานี้เหรอครับ?"
1004115-16 = "คะ... คุณครู?"
1004115-19 = "หืม? มารับนักเรียนคนนี้งั้นเหรอครับ?"
1004115-20 = "อ้อ เป็นนักเรียนในความดูแลของคุณครูเหรอครับเนี่ย แล้วก่อนหน้านี้ทำไมถึงไม่บอกกันล่ะ?"
1004115-21 = "[s] \"งั้นขอพาตัวนักเรียนคนนี้ไปนะ\""
1004115-22 = "ครับ ได้เลยครับ"
1004115-23 = "ทำงานหนักจนมืดค่ำเลยนะครับเนี่ย"
1004115-30 = "ติดหนี้บุญคุณอีกแล้วสินะ..."
1004115-31 = "[s1] \"โล่งอกไปทีนะ แล้วไปทำอะไรอยู่แถวนั้นน่ะ?\"\n[s2] \"มิซากิ ทำอะไรหายรึเปล่า?\""
1004115-34 = "ฉันทำกระเป๋าใบที่สะพายอยู่ตลอดหายไปน่ะ..."
1004115-35 = "เมื่อคืนฉันมานอนแถวๆ สวนสาธารณะนี้ก็เลยลองมาหาดู แต่ก็โดนยามคนนั้นกักตัวไว้..."
1004115-36 = "[s3] \"เดี๋ยวครูช่วยหาเอง\"\n[s4] \"ครูคุ้นเคยกับแถวนี้ดีเพราะมาทุกวันน่ะ\""
1004115-39 = "ไม่ต้องหรอก ฉันเป็นคนทำมันหายเอง"
1004115-40 = "ฉันหาคนเดียวได้ คุณครูกลับไปเถอะ"
1004115-41 = "[s5] \"แต่อยู่คนเดียวเดี๋ยวก็โดนยามเรียกตัวไปอีกหรอก\"\n[s6] \"ถ้าช่วยกันหาก็น่าจะหาได้เร็วกว่าไม่ใช่เหรอ?\""
1004115-44 = "มันก็จริงอยู่..."
1004115-48 = "เฮ้อ ก็ได้ ฉันจะบอกให้แล้วกันว่าไปที่ไหนมาบ้าง คุณครูช่วยหาในที่นั้นแล้วกัน"
1004115-52 = "ตามมาได้เลย"
1004115-60 = "ตรงนี้เหมือนจะไม่มีนะ"
1004115-63 = "ตรงนี้ก็ไม่มี..."
1004115-66 = "ตรงนี้ก็ด้วย..."
1004115-70 = "ตรงนี้ด้วย..."
1004115-74 = "[ns] \"เดี๋ยวนะ ตรงโน้น...!\""
1004115-83 = "อยู่ตรงโน้น...!"
1004115-93 = "จริงด้วย ฉันเอาวางไว้ตรงนี้แล้วดันเจอกับหน่วยลาดตระเวน ก็เลยหนีไปแบบไม่ทันได้เอาของไปด้วย"
1004115-94 = "ค่อยยังชั่วนะที่ยังอยู่ที่เดิม"
1004115-95 = "ขอบคุณนะคุณครู... ฉันติดหนี้บุญคุณแล้วละ"
1004115-96 = "[s] \"เช็กกระเป๋าเถอะว่าของข้างในอยู่ครบมั้ย\""
1004115-100 = "เสื้อผ้า กระเป๋าสตางค์ ยาสีฟัน แปรงสีฟัน ทุกอย่างยังอยู่ดี..."
1004115-104 = "อ่า..."
1004115-105 = "[s] \"ทำไมเหรอ มีอะไรหายงั้นเหรอ?\" "
1004115-106 = "ไม่มีอะไร ไม่ต้องสนใจหรอก"
1004115-107 = "มันก็สมควรแล้วละที่จะหายไปในที่แบบนี้"
1004115-115 = "อะ... เอ๋? คุณครู ของที่คุณครูถืออยู่..."
1004115-116 = "[s7] \"อันนี้ของมิซากิเหรอ?\"\n[s8] \"นี่น่ะเหรอของที่บอกว่าหายไป?\""
1004115-123 = "ชะ... ใช่ เอามานี่เลย"
1004115-128 = "[ns] \"คาดไม่ถึงแฮะ มิซากิพกตุ๊กตาติดตัวด้วยเหรอ\""
1004115-132 = "เฮ้อ..."
1004115-137 = "ซาโอริใช้มีดพกตัดเศษไม้เป็นตุ๊กตาให้ตั้งแต่ตอนเด็กๆ น่ะ"
1004115-138 = "ก็เด็กๆ น่ะ ต้องมีสิ่งของที่ตัวเองหวงแหน"
1004115-139 = "มันก็แค่ของเล่นที่ฉันชอบเล่นตอนเด็กน่ะ และตอนนี้ก็เป็นแค่ของจิปาถะที่ไม่ได้มีความหมายอะไร"
1004115-140 = "แต่ที่ยังใส่ไว้ในกระเป๋าเพราะมันติดเป็นนิสัยไปแล้ว"
1004115-141 = "ตอบแค่นี้พอรึเปล่า?"
1004115-142 = "[s] \"เป็นของสำคัญของมิซากิสินะ\""
1004115-143 = "ได้ฟังที่ฉันพูดมั้ยเนี่ย..."
1004115-144 = "ถ้าจะพูดอย่างนั้น ต้องบอกว่าเป็นของที่ 'เคยสำคัญ' มากกว่านะ"
1004115-148 = "เอาเถอะ ยังไงวันนี้ก็ขอบคุณที่ช่วยนะคุณครู"
1004115-152 = "แล้วฉันจะติดต่อไปใหม่"

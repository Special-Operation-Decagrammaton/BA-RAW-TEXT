[translation]
1004115-1 = "滿是手印的回憶"
1004115-2 = "（因為擔心美咲傳來的MomoTalk，於是決定出來找美咲）"
1004115-7 = "就，就說是把學生證忘在家裡了……"
1004115-8 = "我們收到了有人晚上跑進公園露宿的檢舉。"
1004115-9 = "如果無法證明你的身分，我也只能向女武神通報了！"
1004115-10 = "唔……！"
1004115-11 = "[s]「有什麼事嗎？」"
1004115-15 = "啊，是夏萊的老師啊。#n這個時間怎麼會來這裡？"
1004115-16 = "老，老師！？"
1004115-19 = "咦？是來接這個學生的？他是今天的值日生？"
1004115-20 = "糟糕，竟然是老師的客人啊。#n怎麼不早點告訴我呢？"
1004115-21 = "[s]「我可以帶走這名學生了嗎？」"
1004115-22 = "是，老師請便。"
1004115-23 = "忙到這麼晚真是辛苦了。"
1004115-30 = "……又給你添麻煩了呢。"
1004115-31 = "[s1]「太好了，你在這附近做什麼呢？」\n[s2]「美咲，你弄丟了什麼東西嗎？」"
1004115-34 = "……我把平常帶的背包弄丟了。"
1004115-35 = "昨天露宿的地方就在公園附近，所以我才會專程跑來，結果就被警衛抓到了……"
1004115-36 = "[s3]「我來幫你找吧。」\n[s4]「我每天都會在附近走動，對這裡很熟。」"
1004115-39 = "你不需要這樣。弄丟東西的人是我。"
1004115-40 = "我自己會去找，老師先回去吧。"
1004115-41 = "[s5]「可是你自己找的話，說不定又會被警衛帶走。」\n[s6]「一起找的人越多就能越快找到，不是嗎？」"
1004115-44 = "是，是這麼說沒錯……"
1004115-48 = "……唉，我知道了。#n我會告訴你去過哪些地方，就從那裡開始找吧。"
1004115-52 = "跟我來。"
1004115-60 = "似乎不是在這裡。"
1004115-63 = "這裡也沒有……"
1004115-66 = "這裡也是……"
1004115-70 = "這裡也……"
1004115-74 = "[ns]「等等！你看那邊……！」"
1004115-83 = "找到了……！"
1004115-93 = "對了，我本來把背包放在這邊，後來突然遇到巡邏的警衛。#n一時顧著逃跑，結果不小心就弄丟了。"
1004115-94 = "幸好還在原地。"
1004115-95 = "……謝謝你，老師。#n我欠你一個人情。"
1004115-96 = "[s]「最好確認一下背包的東西有沒有少。」"
1004115-100 = "衣服、皮夾、牙膏牙刷都還在……"
1004115-104 = "……啊。"
1004115-105 = "[s]「怎麼了？有東西不見嗎？」"
1004115-106 = "……沒什麼，不用放在心上。"
1004115-107 = "只是會在這種地方弄丟的東西而已。"
1004115-115 = "咦？老師手上的那個是……"
1004115-116 = "[s7]「這是美咲的東西嗎？」\n[s8]「你弄丟的就是這個嗎？」"
1004115-123 = "呃，嗯。還給我。"
1004115-128 = "[ns]「真意外，美咲竟然會隨身攜帶娃娃。」"
1004115-132 = "……唉。"
1004115-137 = "這是小時候沙織做給我的娃娃。#n是用摺疊刀將木塊削製而成的。"
1004115-138 = "孩子們總是會需要某個東西作為依戀的對象對吧。"
1004115-139 = "只是小時候常拿來玩的玩具而已。#n現在已經沒有任何意義了。"
1004115-140 = "放在背包裡也只是出於習慣。"
1004115-141 = "這樣的回答還滿意嗎？"
1004115-142 = "[s]「看來那對美咲來說是珍貴的東西呢。」"
1004115-143 = "……你有在聽我說話嗎？"
1004115-144 = "如果硬要那樣說的話，稱之為「曾經」珍貴的東西比較正確吧。"
1004115-148 = "總之今天謝謝你幫我。"
1004115-152 = "下次再聯絡吧。"

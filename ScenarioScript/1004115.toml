[translation]
1004115-1 = "Personal Memories"
1004115-2 = "Worried after my MomoTalk with Misaki, I went out to look for her."
1004115-7 = "I, uh, left my student ID at home..."
1004115-8 = "Well, I'm sorry, but we've been getting reports of people sneaking into the park after closing."
1004115-9 = "If you can't prove your identity, I'll have no choice but to report you to Valkyrie!"
1004115-10 = "Gah!"
1004115-11 = "[s] \"What's going on?\""
1004115-15 = "Ah. Greetings, Sensei of Schale. What can I do for you at this hour?"
1004115-16 = "S-Sensei?!"
1004115-19 = "Oh? You're here to pick up this student? That means..."
1004115-20 = "Pardon me. You should have told me you were merely waiting on your ride home."
1004115-21 = "[s] \"Is it all right if I handle things from here?\""
1004115-22 = "Of course. Please do."
1004115-23 = "Thank YOU for going the extra mile for your pupils."
1004115-30 = "...I owe you one again."
1004115-31 = "[s1] \"Glad I was able to help. What are you doing out here?\"\n[s2] \"Did you lose something?\""
1004115-34 = "...I lost my bag."
1004115-35 = "I camped out in this park yesterday. I came back today to grab my stuff, when I got caught by that security guard..."
1004115-36 = "[s3] \"Let me help you find it.\"\n[s4] \"I know this place. I walk around this neighborhood every day.\""
1004115-39 = "There's no need. I'm the one who lost it."
1004115-40 = "I'll find it myself. You go on with your night."
1004115-41 = "[s5] \"If you're alone, you might get caught by security again.\"\n[s6] \"If there's two of us, won't we find it faster?\""
1004115-44 = "You're not wrong..."
1004115-48 = "*sigh* Okay. Let's retrace my steps so we can narrow down the search."
1004115-52 = "Follow me."
1004115-60 = "It doesn't seem to be here."
1004115-63 = "Not here..."
1004115-66 = "Not here either..."
1004115-70 = "Still nothing..."
1004115-74 = "[ns] \"Wait! Over there!\""
1004115-83 = "I see it!"
1004115-93 = "I remember now. I left it here, then ran smack into a patrol. I was so busy running, it completely slipped my mind."
1004115-94 = "I'm just glad it's still here."
1004115-95 = "...Thanks, Sensei. I owe you one."
1004115-96 = "[s] \"Double check that nothing fell out.\""
1004115-100 = "Clothes, check. Wallet, check. Toothpaste and toothbrush are good..."
1004115-104 = "...Uh."
1004115-105 = "[s] \"What's wrong? Something missing?\""
1004115-106 = "...It's not important."
1004115-107 = "Sometimes you wind up losing the small things in a place like this. It happens."
1004115-115 = "S-Sensei, what's that in your hand?!"
1004115-116 = "[s7] \"Is this yours, Misaki?\"\n[s8] \"Is this what was missing?\""
1004115-123 = "Yes! Give it here!"
1004115-128 = "[ns] \"I didn't take you for the miniature type.\""
1004115-132 = "*sigh*"
1004115-137 = "Saori whittled this for me when I was a kid. She made it with a pocket knife and a stray log we found rolling around."
1004115-138 = "Kids always need something to cling onto, right?"
1004115-139 = "It's just a childhood toy. Nothing more, nothing less."
1004115-140 = "I just fell into the bad habit of hoarding stuff in my bag."
1004115-141 = "That answer your question?"
1004115-142 = "[s] \"I see. So it's very precious to you.\""
1004115-143 = "...Did you even listen to me?"
1004115-144 = "It WAS precious. It isn't anymore."
1004115-148 = "Anyway, thanks for your help today."
1004115-152 = "I'll be in touch."

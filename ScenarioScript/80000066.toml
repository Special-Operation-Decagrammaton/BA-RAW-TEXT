80000066-29 = "[ns3] \"케첩 대신 초콜릿을 뿌렸어……!?\"\n[ns4] \"초콜릿 오므라이스……라고!?\""
80000066-30 = "3;카린;03;후후. 나름대로 고민을 해서 선생님을 위해 만들어낸 고유 메뉴야. 마음에 들었으면 좋겠군.\n#3;em;[반응]\n#3;a"
80000066-31 = "3;카린;03;후후. 나름대로 고민을 해서 선생님을 위해 만들어낸 고유 메뉴야. 마음에 들었으면 좋겠군.\n#3;em;[반응]\n#3;a"

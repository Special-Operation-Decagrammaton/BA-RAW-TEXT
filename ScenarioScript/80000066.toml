[translation]
80000066-1 = "อร่อยเหาะแน่นอน โมเอะโมเอะ คิ้ว~"
80000066-3 = "(หลังจากได้รับข้อความ คุณครูก็มาที่คาเฟ่ และก็เจอคารินที่กำลังทำงานพาร์ทไทม์อยู่)"
80000066-4 = "อ๊ะ ครู... ไม่สิ นายท่าน เชิญค่ะ ฉันกำลังรออยู่เลย"
80000066-5 = "หืม...? ปะ...เปล่า ไม่ได้มีเรื่องสำคัญอะไรหรอก"
80000066-6 = "ก็แค่วันนี้... คือ... คือว่า..."
80000066-7 = "[s1] \"วันนี้เป็นวันวาเลนไทน์นี่นา...?\"\n[s2] นั่งลงอย่างรวดเร็ว"
80000066-8 = "ชะ...ใช่ วันนี้เป็นวันวาเลนไทน์"
80000066-9 = "อืม... ใช่แล้ว วันนี้เป็นวันวาเลนไทน์ เข้าใจง่ายดีนะ"
80000066-10 = "ที่ผ่านมาคุณครูคอยช่วยเหลือฉันมาตลอด ถึงอาจจะไม่ได้มากมาย แต่ในวันแบบนี้ก็อยากให้ของ#nตอบแทนคุณครูบ้าง"
80000066-11 = "อืม... แต่อันที่จริงฉันก็รู้สึกกังวลนิดหน่อยที่เรียกคุณครูออกมาตอนที่ยุ่งๆ แบบนี้น่ะ"
80000066-12 = "คะ...คุณครูไม่ว่าอะไรงั้นเหรอ?"
80000066-13 = "ฮิฮิ คุณครูชอบพูดแบบนี้ตลอด เพราะงั้นเลยเชื่อไม่ค่อยได้หรอกว่าไม่เป็นไรจริงๆ"
80000066-14 = "แต่ว่า... วันนี้ฉันจะบังคับตัวเองให้เชื่อก็แล้วกัน"
80000066-15 = "วันนี้ฉันจะเลี้ยงขนมคุณครูเอง"
80000066-19 = "หืม...? ดูเหมือนออมไรซ์มากกว่าช็อกโกแลตงั้นเหรอ?"
80000066-20 = "ก็...ก็นะ ที่นี่คือเมดคาเฟ่นี่ เราไม่มีเมนูที่เป็นช็อกโกแลตหรอก"
80000066-21 = "แต่ว่า..."
80000066-29 = "[ns3] \"นี่ราดช็อกโกแลตแทนซอสมะเขือเทศเรอะ...!\"?\n[ns4] \"ออมไรซ์ช็อกโกแลตงั้นเรอะ!?\""
80000066-30 = "ฮิฮิ ฉันคิดเมนูนี้ไว้สำหรับคุณครูเลยนะ ทานให้อร่อยล่ะ"
80000066-31 = "ฮิฮิ ฉันคิดเมนูนี้ไว้สำหรับคุณครูเลยนะ ทานให้อร่อยล่ะ"
80000066-32 = "หืม?"
80000066-33 = "คิดว่าขาดอะไรไปงั้นเหรอ? อะ...อะไรล่ะ?"
80000066-34 = "ว่าไงนะ...?"
80000066-35 = "เวทมนตร์เสกให้อร่อยขึ้น...? บะ...บ้ารึเปล่า! ถึงที่นี่จะเป็นเมดคาเฟ่ก็จริงแต่ให้ทำแบบนั้นมัน..."
80000066-36 = "แถมยังเป็นคุณครู ไม่ใช่ลูกค้าคนอื่นด้วย...! มันน่าอายนะ...!"
80000066-37 = "..."
80000066-38 = "เฮ้อ ช่างเถอะ ก็ได้ๆ ยังไงวันนี้ก็เป็นวันของคุณครู ถ้าคุณครูต้องการแบบนั้น ฉันก็จะทำตาม"
80000066-39 = "อะ..."
80000066-40 = "[s5] \"อะ...?\"\n[s6] \"พูดมาเลย...!\""
80000066-41 = "อร่อยเหาะแน่นอน...!"
80000066-42 = "อร่อยเหาะแน่นอน...!"
80000066-43 = "โมเอะ โมเอะ คิ้ว~...!"
80000066-47 = "อ๊ายยยยย-!!"

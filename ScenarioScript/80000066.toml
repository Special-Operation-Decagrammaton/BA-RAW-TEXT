80000066-35 = "3;카린;06;맛있어지는 주문……? 바, 바보 같은……! 물론 여기가 메이드 카페긴 하지만……!\n#3;em;[?!]\n#3;stiff"
80000066-36 = "3;카린;04;다, 다른 사람도 아닌 선생님에게 그런 걸……! 부끄럽게……!\n#3;hophop"

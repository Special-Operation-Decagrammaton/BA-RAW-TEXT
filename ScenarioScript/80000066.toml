[translation]
80000066-1 = "變好吃吧"
80000066-3 = "（接到聯絡後前往咖啡廳，看見了打工中的花凛）"
80000066-4 = "啊，老師……不對，主人。歡迎光臨。"
80000066-5 = "嗯，啊啊，想做的事？雖然沒什麼大不了的……"
80000066-6 = "今天是那個，所以……"
80000066-7 = "[s1]「因為是情人節，之類的？」\n[s2] 默默地入座"
80000066-8 = "……不愧是老師，真好說話。"
80000066-9 = "……不愧是老師，真好說話。"
80000066-10 = "因為平常總是受到老師的幫助。雖然沒準備什麼特別的東西，還是想報答一下老師。"
80000066-11 = "……雖然現在說可能有點晚了，抱歉在老師忙碌的時候請你出來。"
80000066-12 = "……沒關係？時間隨時都擠得出來……？"
80000066-13 = "呵呵……老師總是這麼說。雖然知道不能盲信，還是會在不知不覺間依賴老師呢。"
80000066-14 = "不過今天就讓我撒嬌一下吧。"
80000066-15 = "這就是我要送給老師的禮物。"
80000066-19 = "……嗯？對，是蛋包飯。"
80000066-20 = "因為店裡沒有賣巧克力之類的餐點……"
80000066-21 = "但是……"
80000066-29 = "[ns3]「用巧克力代替番茄醬……！？」\n[ns4]「是巧克力蛋包飯……！？」"
80000066-30 = "嗯。這是我左思右想後想出的，老師專屬的原創料理。希望你喜歡。"
80000066-31 = "嗯。這是我左思右想後想出的，老師專屬的原創料理。希望你喜歡。"
80000066-32 = "……咦？"
80000066-33 = "……少了點東西？分量不夠嗎……？"
80000066-34 = "……咦，咒語？"
80000066-35 = "啊……不，那確實是女僕咖啡廳的固定橋段……！"
80000066-36 = "但是要做給老師看，該說特別羞恥嗎……！"
80000066-37 = "……"
80000066-38 = "……我知道了。雖然羞恥，但今天是讓老師開心的日子。#n既然老師希望我這麼做的話，我會努力……"
80000066-39 = "呃，那……"
80000066-40 = "[s5]「哦哦……」\n[s6]「真開心……！」"
80000066-41 = "變，變好吃吧……！"
80000066-42 = "變，變好吃吧……！"
80000066-43 = "萌耶，萌耶……！！"
80000066-47 = "果，果然還是辦不到啊啊啊────！！"

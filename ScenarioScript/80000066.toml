[translation]
80000066-1 = "#title;맛있어져라 모에모에 쿵"
80000066-2 = "#wait;1000"
80000066-3 = "#na;(연락을 받고 카페 안으로 들어가자 한창 아르바이트 중이던 카린의 모습이 보였다.)"
80000066-4 = "3;카린;02;아. 선생……. 아니, 주인님. 어서 와. 그렇잖아도 기다리고 있었어.\n#3;em;[재잘]\n#3;a"
80000066-5 = "3;카린;01;……응? 아, 아니. 그다지 큰일은 아니야. 그저……."
80000066-6 = "3;카린;06;오늘이……. 그……. 그러니까…….\n#3;stiff"
80000066-7 = "[s1] \"발렌타인 데이니까……?\"\n[s2] 눈치껏 자리에 앉는다."
80000066-8 = "3;카린;04;으, 으음. 역시 선생님. 대화가 빨라서 좋군.\n#3;em;[땀]"
80000066-9 = "3;카린;04;으, 으음. 역시 선생님. 대화가 빨라서 좋군.\n#3;em;[땀]"
80000066-10 = "3;카린;03;평소에는 늘 선생님의 도움만 받고 있으니 말이지. 별거 아니지만, 이런 날이라도 보답을 해야겠다고 생각했어."
80000066-11 = "3;카린;01;으음……. 이제 와서 생각하니 바쁜 와중에 괜히 부른 게 아닌가 오히려 걱정이 되는군.\n#3;em;[...]"
80000066-12 = "3;카린;02;……괜찮다고? 신경 쓰지 말라고?"
80000066-13 = "3;카린;03;후후. 선생님은 늘 그런 식으로 말하니까. 오히려 괜찮다는 말을 곧이곧대로 믿기 어려워.\n#3;em;[반응]"
80000066-14 = "3;카린;02;그렇지만, 그래……. 오늘은 조금은 억지를 부려 그 말을 의심하지 않기로 하지."
80000066-15 = "3;카린;01;그러니 이건 내가 사는 거야, 선생님.\n#3;em;[음표]"
80000066-16 = "#st;[0,0];instant;1;"
80000066-17 = "#clearST"
80000066-18 = "3;카린;01\n#3;greeting\n#wait;2000"
80000066-19 = "3;카린;02;……응? 이건 초콜릿이 아니라 오므라이스 아니냐고?\n#3;em;[?]"
80000066-20 = "3;카린;01;맞아. 여기는 메이드 카페니까. 따로 초콜릿을 주는 메뉴 같은 건 없어."
80000066-21 = "3;카린;04;하지만……."

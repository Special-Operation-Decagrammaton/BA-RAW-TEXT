[translation]
2401-1 = "拍攝修行部的介紹影片吧！（１）"
2401-2 = "修行部"
2401-3 = "那是，各自懷著目標百鬼夜行的美少女們齊聚一堂……"
2401-4 = "鍛鍊自我，朝著目標持續修行的社團！"
2401-5 = "有的人是為了，究極舒適的睡眠……"
2401-6 = "也有的人是為了，成為比任何人都要完美的大和撫子……"
2401-7 = "還有的人，已經完全是很有活力又可愛～！"
2401-8 = "光是在身邊就會感到心情愉快，有如修行部的吉祥物般的女孩子～！"
2401-9 = "那樣的女孩子為了成為世界第一出色的淑女，日益進行修行的這個社團就是，修行部！"
2401-10 = "如何？不覺得是個光聽著就讓人躍躍欲試，有如夢想般的社團嗎？"
2401-11 = "今天就來介紹，那個修行部給妳認識吧！"
2401-12 = "……"
2401-13 = "……唔嗯……，總覺得不太對！"
2401-14 = "卡，卡，再一次！！"
2401-16 = "為什麼呢，總～覺得和想像中的不一樣。"
2401-17 = "我想像的是更加清爽，感覺像這樣閃亮亮的……"
2401-18 = "只是稍微瞄見就會讓人不禁想「這只能入部了！」這麼大喊的……"
2401-19 = "[s]「楓？妳在這種地方做什麼？」"
2401-20 = "唔哇啊！？"
2401-21 = "嚇死我了……呃，老師！？"
2401-22 = "嗯，這個？問我在做什麼？"
2401-23 = "欸嘿嘿，聽了不要嚇到唷！"
2401-24 = "我現在，"
2401-25 = "正在拍攝修行部的廣告影片！"
2401-26 = "下次，有個百鬼夜行學園舉辦的「社團活動介紹大賽」哦！"
2401-27 = "[s1]「社團活動介紹的？」\n[s2]「大賽……？」"
2401-28 = "嗯！各自拍攝自己社團的介紹影片，比較哪個比較好的大賽！"
2401-29 = "嗯！各自拍攝自己社團的介紹影片，比較哪個比較好的大賽！"
2401-30 = "在百鬼夜行，常常召開這種大賽或是大會之類的。"
2401-31 = "我想大概是因為平常社團間也常常會有衝突，所以作為代替才會以這種方式分出勝負。"
2401-32 = "[s]「是有點危險的原因呢……？」"
2401-33 = "不管是什麼形式只要是勝負的話，就不能輸！"
2401-34 = "這世間正是大賽戰國時代！"
2401-35 = "因為在上次的「百鬼夜行．歌牌最強決定戰」，被陰陽部拿走了第一名呢。"
2401-36 = "這次肯定，不會讓她們得逞的！"
2401-37 = "而且，修行部常常被說是從各個地方聚集而來的「怪咖集團」……"
2401-38 = "只要拍出可以在大賽獲勝的影片的話，那個誤解肯定就可以消除了！"
2401-39 = "[s]「誤解……？」"
2401-40 = "沒錯沒錯，是誤解！"
2401-41 = "修行部其實是多麼美妙的地方，差不多該由我奮力相助好～好的告訴大家才行呢。"
2401-42 = "而且優勝之後獲得獎金的話，就能用那筆錢將傳說的黃金海克力士長戟大兜蟲……"
2401-43 = "不是！"
2401-44 = "……當，當作修行部的活動經費，嗯。"
2401-45 = "這種活動，肯定也會成為前往出色淑女的一步的糧食！"
2401-46 = "正所謂一石二鳥！一舉兩得！這個手法的美妙程度，已經可以說不管是從誰來看都是個出色淑女也不言過！"
2401-47 = "[s]「是，是嗎……我會幫妳加油的。」"
2401-48 = "嗯，謝謝老師！優勝的話我會請你吃好吃的東西哦！"
2401-50 = "啊。"
2401-51 = "不過，有些事情我有點在意……"
2401-52 = "影片，雖然想著要做，不過實在是沒有「就是這個！」的感覺……該說是有什麼不夠嗎……"
2401-53 = "當然，畢竟像我這樣超級可愛修行部的吉祥物都作為記者登場了，"
2401-54 = "光是這樣能拿到優勝就已經是理所當然的……"
2401-55 = "[s]「這麼有自信……」"
2401-56 = "不過，該怎麼說呢。想要再一點像這樣，嗶嗶！的，哦哦！的感覺，總覺得還少了什麼決定性的東西……"
2401-57 = "老師怎麼想呢？"
2401-58 = "[s3]「嗯……做些什麼不單是社團介紹的事之類的。」\n[s4]「例如，實際介紹活動的樣子之類的如何？」"
2401-59 = "不單是社團介紹……"
2401-60 = "不單是社團介紹……"
2401-61 = "讓人看見平常是做什麼活動的意思？"
2401-62 = "啊，體驗入部影片版的感覺？"
2401-63 = "……唔嗯，嗯……嗯嗯嗯嗯嗯……！"
2401-64 = "採納！絲毫沒有缺點非常好的主意！"
2401-65 = "真不愧是老師！！"
2401-66 = "讓我這麼來電的主意，那麼簡單的就……"
2401-67 = "這已經不是普通的大人，說是「超超級大人」也不言過呢！"
2401-68 = "[s]「……謝謝？」"
2401-69 = "好，那就事不宜遲！我馬上就去拍！老師，拜拜～！"
2401-73 = "[ns]「嗯，以不要空忙一場的程度加油～……呃，太慢了嗎。」"

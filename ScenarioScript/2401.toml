[translation]
2401-1 = "Filming a Club Promo! Part 1"
2401-2 = "The Inner Discipline Club..."
2401-3 = "It's a club where the most beautiful girls of Hyakkiyako gather..."
2401-4 = "...to train and discipline themselves!"
2401-5 = "One of them does it to get the most comfortable night's sleep possible..."
2401-6 = "Another does it to become the most picture-perfect lady in the world!"
2401-7 = "And another one is especially cute and lively! "
2401-8 = "The latter is the Inner Discipline Club's mascot, who radiates positivity all the time!"
2401-9 = "Here in the Inner Discipline Club, she trains to become the most amazing woman in the world!"
2401-10 = "Doesn't it sound like a wonderful club?"
2401-11 = "Allow me to give you a grand tour of the Inner Discipline Club today!"
2401-12 = "..."
2401-13 = "Hmmm... Bah!"
2401-14 = "Cut! Cut! Take it from the top!"
2401-16 = "No, this isn't what I imagined at all."
2401-17 = "The way I pictured it in my mind was something way more lively and bright..."
2401-18 = "...so that whoever watches it will immediately say, \"I can't wait to join this club!\""
2401-19 = "[s] \"What are you doing, Kaede?\""
2401-20 = "Whoa! What the...?!"
2401-21 = "Sensei, you surprised me!"
2401-22 = "What am I doing right now?"
2401-23 = "Well, brace yourself for this! "
2401-24 = "I am currently... "
2401-25 = "...shooting a promo video for the Inner Discipline Club!"
2401-26 = "Recently, Hyakkiyako held a UCC contest that featured a few club promos!"
2401-27 = "[s1] \"Club promos?\"\n[s2] \"UCC contest?\""
2401-28 = "Yup! It's a contest where each club makes and submits a video introducing their club!"
2401-29 = "Yup! It's a contest where each club makes and submits a video introducing their club!"
2401-30 = "Hyakkiyako often holds contests and tournaments like this."
2401-31 = "Since the different clubs tend to butt heads frequently, we hold events like this to settle the score."
2401-32 = "[s] \"Settle the score...?\""
2401-33 = "Yup! It's a competition! Which is why we cannot lose!"
2401-34 = "It's like the Warring States Period, but for UCC contests!"
2401-35 = "The Yin-Yang Club took home the gold last time at the \"Hyakkiyako: Champion of Karuta\" tournament."
2401-36 = "But that won't be the case this time!"
2401-37 = "People like to call the Inner Discipline Club a place for oddballs..."
2401-38 = "But with a proper video, we can get rid of all those rumors and win the contest for sure!"
2401-39 = "[s] \"Rumors...?\""
2401-40 = "Yeah! It's all a misunderstanding! "
2401-41 = "I need to let others know how amazing the Inner Discipline Club really is."
2401-42 = "Well, if I do win the contest and the prize money that goes along with it, then I can buy the legendary Golden Hercules Beetle..."
2401-43 = "No, forget that!"
2401-44 = "I mean, it'll go towards the Inner Discipline Club's budget... "
2401-45 = "...just another stepping stone toward becoming an awesome lady!"
2401-46 = "It'll be two birds with one stone! How frugal! Yeah! That'll make me amazing for sure!"
2401-47 = "[s] \"That's great, I'll be rooting for you.\""
2401-48 = "Thanks, Sensei! I'll make sure to buy you something nice to eat after I win!"
2401-50 = "But..."
2401-51 = "There is something bothering me, though."
2401-52 = "I'm working on the video, but it's missing that extra \"oomph\", you know?"
2401-53 = "I mean, winning the contest is a given..."
2401-54 = "...since I, the super-cute mascot of the Inner Discipline Club, will be in the video as the reporter..."
2401-55 = "[s] \"What incredible confidence...\""
2401-56 = "But I do wish it had that extra something...that \"pow\"! That \"bang\"! That \"oomph\" that'll seal the deal..."
2401-57 = "What do you suggest?"
2401-58 = "[s3] \"Think outside the box. Do more than a simple intro.\"\n[s4] \"What if you did more than simply introduce the club?\""
2401-59 = "So instead of just introducing the club..."
2401-60 = "So instead of just introducing the club..."
2401-61 = "...I show them what we do here and how we do it?"
2401-62 = "It'll be like trying out the club just by watching the video!"
2401-63 = "Hmm... Yes!"
2401-64 = "I approve! Good idea, Sensei!"
2401-65 = "As I expected of you!"
2401-66 = "No other adult gives me the kind of advice that makes my heart sing... "
2401-67 = "In fact, it wouldn't be an exaggeration to say you've transcended the power of a normal adult. I'd say you're...a super adult!"
2401-68 = "[s] \"Uh, yeah. Thanks?\""
2401-69 = "All right! I'll do it right now! Bye, Sensei!"
2401-73 = "[ns] \"Umm... You got this?\""

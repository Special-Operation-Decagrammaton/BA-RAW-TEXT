2401-1 = "#title;수행부의 홍보 영상을 찍자! 1"
2401-2 = "#na;???;수행부."
2401-3 = "#na;???;그곳은 백귀야행의 아름다운 소녀들이 한데 모여, 각자의 목표를 가진 채……."
2401-4 = "#na;???;자신을 단련하며 수행을 거듭하는 동아리!"

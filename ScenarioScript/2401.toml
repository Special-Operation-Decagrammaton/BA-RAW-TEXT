[translation]
2401-1 = "มาถ่ายวิดีโอโปรโมตชมรมฝึกฝนกันเถอะ! 1"
2401-2 = "ชมรมฝึกฝน"
2401-3 = "เป็นชมรมที่รวมตัวของเหล่าสาวน้อยน่ารักแห่งเฮียกคิยาโคเอาไว้ด้วยกัน#nซึ่งแต่ละคนก็จะมีเป้าหมายที่ต่างกันไป..."
2401-4 = "และเป็นชมรมที่จะทำให้คุณได้ฝึกฝนตัวเองอย่างหนักหน่วง!"
2401-5 = "บางคนฝึกฝนเพื่อเฟ้นหาวิธีนอนหลับที่สะดวกสบายที่สุดในโลก..."
2401-6 = "และบางคนก็ฝึกฝนเพื่อที่จะเป็นกุลสตรีที่เพียบพร้อมที่สุดในโลก...!"
2401-7 = "และบางคน... อืม...! ก็ฝึกฝนก็เพื่อความน่ารักสดใสเป็นพิเศษ~!"
2401-8 = "นี่คือเรื่องราวของมาสคอตของชมรมฝึกฝนที่เพียงแค่ได้อยู่ใกล้ๆ ก็รับรู้ได้ถึงพลังบวก#nที่แผ่กระจ่ายมาจากตัวของพวกเขา!"
2401-9 = "และที่ที่ฝึกฝนให้เด็กสาวคนนั้นได้กลายเป็นเลดี้ที่เพียบพร้อมที่สุดในโลกก็คือ ชมรมฝึกฝนแห่งนี้!"
2401-10 = "พอได้ฟังแล้วรู้สึกเหมือนกับชมรมในฝันเลยใช่ไหมล่ะ?"
2401-11 = "วันนี้ฉันจะมาแนะนำชมรมฝึกฝนของเราให้รู้จักเองค่ะ!"
2401-12 = "....."
2401-13 = "อืม... อ๊ะ!"
2401-14 = "คัทๆ เอาใหม่ๆ!"
2401-16 = "อืม... มันไม่เหมือนกับที่ฉันคิดเอาไว้เลย"
2401-17 = "ที่คิดเอาไว้คือให้ดูมีฟีลร่าเริงสดใสหน่อยๆ..."
2401-18 = "แบบพอดูแล้วก็รู้สึกว่า \"อยากเข้าชมรมด้วยจัง!\" แบบนั้น..."
2401-19 = "[s] \"คาเอเดะ มาทำอะไรอยู่ตรงนี้เหรอ?\""
2401-20 = "ว้าก?! ตกใจหมดเลย!"
2401-21 = "โอ๊ะ! คุณครู!"
2401-22 = "ฉันทำอะไรอยู่น่ะเหรอคะ?"
2401-23 = "ฮิฮิ ฟังแล้วอย่าตกใจนะคะ "
2401-24 = "ตอนนี้ฉันน่ะ... "
2401-25 = "กำลังถ่ายวิดีโอโปรโมตชมรมฝึกฝนอยู่ค่ะ!"
2401-26 = "เมื่อสองสามวันมานี้ที่สหพันธ์เฮียกคิยาโคได้จัดงานรวมผลงานยูซีซีเพื่อแนะนำชมรมต่างๆ!"
2401-27 = "[s1] \"แนะนำชมรมเหรอ?\"\n[s2] \"นิทรรศการรวมผลงานยูซีซี...?\""
2401-28 = "อื้อ! แต่ละชมรมจะถ่ายวิดีโอแนะนำชมรมของตัวเองแล้วเอามาประกวดในงานนิทรรศการ!"
2401-29 = "อื้อ! แต่ละชมรมจะถ่ายวิดีโอแนะนำชมรมของตัวเองแล้วเอามาประกวดในงานนิทรรศการ!"
2401-30 = "ที่เฮียกคิยาโคมักจะจัดงานนิทรรศการรวมผลงานหรือการประกวดแบบนี้บ่อยๆ"
2401-31 = "เพราะแต่ละชมรมมักจะชอบเขม่นกันบ่อยๆ เราเลยมักจะใช้งานพวกนี้ตัดสินกัน"
2401-32 = "[s] \"ตัดสินแพ้ชนะเหรอ...?\""
2401-33 = "ใช่แล้ว! ตัดสินแพ้ชนะค่ะ! เพราะงั้นจะแพ้ไม่ได้อย่างเด็ดขาด!"
2401-34 = "เรียกได้ว่าเป็นยุคแห่งสงครามการประกวดเลยล่ะ!"
2401-35 = "เมื่อคราวก่อนตอนที่จัดการประกวด \"เซียนไพ่คารูตะแห่งเฮียกคิยาโค\"#nชมรมหยินหยางได้ที่หนึ่งไป"
2401-36 = "แต่ครั้งนี้ก็ไม่แน่หรอก!"
2401-37 = "ถึงจะมีคนชอบเรียกชมรมฝึกฝนว่าพวกคนพิลึกก็เถอะ..."
2401-38 = "แต่ถ้าถ่ายวิดีโอให้ดีล่ะก็คงแก้เรื่องเข้าใจผิดพวกนั้นได้ แล้วก็คงชนะในงานนิทรรศการรวมผลงานได้แน่นอน~"
2401-39 = "[s] \"เรื่องเข้าใจผิดเหรอ...\""
2401-40 = "ใช่แล้ว ก็แค่เรื่องเข้าใจผิด~! "
2401-41 = "ฉันจะต้องทำให้ทุกคนรู้ว่าชมรมฝึกฝนเป็นชมรมที่ยอดเยี่ยมมากแค่ไหน"
2401-42 = "ถ้าชนะการประกวดแล้วได้เงินรางวัลมา ฉันก็จะเอาเงินพวกนั้นไปซื้อด้วงกว่างโกลเด้นเฮอร์คิวลิสในตำนาน..."
2401-43 = "ไม่ใช่สิ!"
2401-44 = "หมายถึงเอาไว้เป็นเงินทุนสำหรับชมรมฝึกฝน..."
2401-45 = "เอาไว้ใช้เพื่อเป็นเงินทุนในการก้าวสู่การเป็นเลดี้ที่เพียบพร้อมยังไงล่ะ!"
2401-46 = "ยิงปืนนัดเดียวได้นกสองตัวเลยนะ! หรือก็คือเราจะสามารถประหยัดได้ด้วย! อื้ม!#nเพื่อการเป็นเลดี้ที่เพียบพร้อม!"
2401-47 = "[s] \"สะ...สู้ๆ ก็แล้วกันนะ\""
2401-48 = "อื้อ! ขอบคุณนะ! คุณครู! ถ้าฉันชนะจะซื้อของอร่อยๆ ไปฝาก!"
2401-50 = "อ่า..."
2401-51 = "แต่ว่ามีเรื่องที่ฉันกังวลอยู่น่ะ"
2401-52 = "ตอนนี้ฉันกำลังพยายามถ่ายวิดีโออยู่ก็จริง แต่มันไม่ได้ดั่งใจเลย ยังไม่เป็นรูปเป็นร่างเลยล่ะ#nเหมือนมันยังขาดอะไรไป..."
2401-53 = "แน่นอน เพราะเป็นวิดีโอที่มีมาสคอตสุดน่ารักของชมรมฝึกฝนอย่างฉันมาเป็นผู้บรรยาย..."
2401-54 = "ฉันมั่นใจว่าจะต้องชนะได้แน่นอน..."
2401-55 = "[s] \"ดูมั่นใจสุดๆ เลย....\""
2401-56 = "ฉันคิดว่าจะทำวิดีโอที่มันดูมีอะไร แล้วก็ดูฟรุ้งฟริ้งๆ! ดูแล้วว้าวๆ ประมาณนั้นน่ะ..."
2401-57 = "แต่ว่ามันขาดอะไรไปนะ...?"
2401-58 = "[s3] \"ลองคิดนอกกรอบ หาวิธีใหม่ๆ...\"\n[s4] \"ลองแนะนำให้มาลองทำกิจกรรมชมรมไหม?\""
2401-59 = "หาวิธีใหม่ๆ แทนการพูดแนะนำธรรมดา..."
2401-60 = "หาวิธีใหม่ๆ แทนการพูดแนะนำธรรมดา..."
2401-61 = "ลองเชิญชวนมาสัมผัสประสบการณ์กิจกรรมชมรมจริงๆ ดีไหม?"
2401-62 = "วิดีโอเชิญชวนมาทำกิจกรรมชมรมนี่ล่ะ!"
2401-63 = "อืม... อืม..... อืมมมมมมม!"
2401-64 = "ตกลง! กู้ดไอเดียเลย คุณครู!"
2401-65 = "สมกับเป็นคุณครู!"
2401-66 = "คำแนะนำของผู้ใหญ่ที่ทำให้หัวใจของคาเอเดะเต้นระรัว! "
2401-67 = "ไม่เลย เรื่องที่ชมว่าคุณครูเป็นผู้ใหญ่ที่โดดเด่นสุดๆ น่ะ ฉันไม่ได้ชมเกินไปเลยนะ!"
2401-68 = "[s] \"อะ...อื้อ ขอบใจนะ....?\""
2401-69 = "ดีล่ะ! ฉันจะลองเดี๋ยวนี้เลย บ๊ายบาย คุณครู~!"
2401-73 = "[ns] \"อื้อ... สู้ๆ นะ\""

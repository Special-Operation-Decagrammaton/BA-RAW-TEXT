2401-6 = "#na;???;또 누군가는, 세상에서 가장 완벽한 요조숙녀가 되기 위해……!"
2401-7 = "#na;???;또 다른 누군가는, 흠흠! 그러니까 이게 또 특별히 엄청 귀엽고 활기차고~!"
2401-8 = "#na;???;옆에 있기만 해도 음이온이 잔뜩 나올 것만 같은 수행부의 마스코트 이야기인데 말이야!"
2401-9 = "#na;???;그런 소녀가 세상에서 가장 멋진 레이디가 되기 위해 수행하는 곳이, 바로 여기 수행부야!"
2401-10 = "#na;???;말만 들어도 그야말로 꿈의 동아리 같지?"
2401-11 = "#na;???;오늘은 바로 그런 수행부를 소개해줄게!"
2401-12 = "#na;???;……."

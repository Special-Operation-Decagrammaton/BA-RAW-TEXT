[translation]
1005203-1 = "การสังเกตที่แสนซุกซนของโนอา เลขาแห่งเซมิน่า"
1005203-2 = "สำนักงานชาเล่ต์"
1005203-3 = "สวัสดีค่ะคุณครู"
1005203-4 = "วันนี้ฉันรับหน้าที่มาเข้าเวรตัวแทนที่ชาเล่ต์ค่ะ"
1005203-5 = "วันนี้ก็ขอรบกวนด้วยนะคะ"
1005203-6 = "[s] \"อื้อ รบกวนด้วยนะ\""
1005203-7 = "จะว่าไปแล้ว วันนี้คุณครูดูอารมณ์ดีจังเลยนะคะ"
1005203-8 = "มีเรื่องอะไรน่าสนุกงั้นเหรอคะ?"
1005203-9 = "[s1] \"เมื่อคืนนี้คิดไอเดียดีๆ ได้น่ะ\"\n[s2] \"ครูคิดวิธีทำลายความเยือกเย็นของโนอาได้แล้ว!\""
1005203-10 = "คิดไอเดียดีๆ ได้งั้นเหรอคะ?"
1005203-11 = "คิดวิธีทำลายความเยือกเย็นของฉันได้งั้นเหรอคะ?"
1005203-12 = "ที่ผ่านมาฉันจำไม่ได้เลยนะคะว่าเคยแกล้งทำเป็นเยือกเย็นต่อหน้าคุณครูน่ะค่ะ..."
1005203-13 = "คุณครูอยากลองทดสอบฉันงั้นเหรอคะ เป็นความคิดที่น่าสนใจดีนะคะ"
1005203-14 = "ถ้างั้นจะทดสอบด้วยวิธีไหนเหรอคะ?"
1005203-15 = "[s] \"คราวนี้ครูจะบันทึกสิ่งที่โนอาทำน่ะ\""
1005203-16 = "คุณครูจะสังเกตและบันทึกสิ่งที่ฉันทำ เหมือนตอนครั้งก่อนที่ฉันมาที่ชาเล่ต์งั้นเหรอคะ?"
1005203-17 = "อืม เรื่องแบบนี้ฉันไม่คุ้นเคยเท่าไรเลยค่ะ"
1005203-18 = "ปกติแล้วฉันจะทำงานเลขาแบบไม่ได้เป็นที่สนใจของคนอื่นมาตลอด..."
1005203-19 = "ฉันไม่เคยทำงานในสถานการณ์ที่มีคนอื่นจับตามองฉันอยู่เลยค่ะ"
1005203-20 = "ถ้างั้นวันนี้เรามาสังเกตและบันทึกสิ่งที่ทำของกันและกันดีมั้ยคะ?"
1005203-21 = "อ๊ะ... ขอบอกไว้ก่อนที่จะเริ่มงานนะคะ"
1005203-27 = "ว่าเรื่องนี้คงไม่ง่ายหรอกค่ะ... ฮุฮุ"
1005203-29 = "(30 นาทีต่อมา...)"
1005203-31 = "..."
1005203-32 = "[s] \"...\""
1005203-33 = "...♪"
1005203-34 = "คุณครู ดูเหนื่อยๆ นะคะ?"
1005203-35 = "[s] \"การสังเกตการณ์นี่เหนื่อยกว่าที่คิดนะเนี่ย..."
1005203-36 = "ใช่มั้ยล่ะคะ?"
1005203-37 = "ความคิดและความตั้งใจของคนเรา ไม่ได้แสดงออกมาได้ด้วยแค่คำพูดเท่านั้น แต่ยังแสดงออกมาได้#nด้วยสัญญาณต่างๆ อย่างเช่น การกระทำหรือการแสดงออกทางสีหน้า เป็นต้นค่ะ"
1005203-38 = "การจดข้อมูลจำนวนมหาศาลที่เกิดขึ้นในที่นั้นๆ ลงบนแผ่นกระดาษ มันไม่ใช่เรื่องง่ายๆ เลยค่ะ"
1005203-39 = "[s] \"แต่ยังไงครูก็ไม่พลาดพฤติกรรมของโนอาหรอกนะ...!\""
1005203-40 = "คุณครูก็ตั้งใจน่าดูเลยนะคะ ฮิฮิ"
1005203-41 = "ถ้างั้นฉันขอแวะไปหยิบอุปกรณ์การเขียนที่คลังมาเพิ่มก่อนนะคะ"
1005203-50 = "กลับมาแล้วค่า~"
1005203-54 = "เอาละ ถ้างั้น..."
1005203-55 = "นี่คือคำถามค่ะ!"
1005203-56 = "[s] \"จู่ๆ ก็ถามคำถามเรอะ?!\""
1005203-57 = "ในเมื่อคุณครูคุยโวไว้ซะขนาดนั้นแล้ว ฉันก็อดไม่ได้ที่จะทดสอบว่าคุณครูสังเกตฉันดีขนาดไหนน่ะค่ะ"
1005203-58 = "ตั้งแต่นี้ไป ถ้าคุณครูตอบคำถามของฉันถูกละก็ ฉันจะยอมฟังคำขอของคุณครูหนึ่งข้อค่ะ"
1005203-59 = "แต่ถ้าเกิดคุณครูตอบผิด คุณครูจะต้องชงกาแฟให้ฉันหนึ่งแก้วเป็นบทลงโทษที่ไม่ตั้งใจสังเกตการณ์#nนะคะ~"
1005203-60 = "[s] \"ไม่เห็นจะยากตรงไหนเลย...\""
1005203-61 = "เอาละค่ะ คำถามข้อแรก"
1005203-62 = "เมื่อสักครู่ฉันเพิ่งออกไปข้างนอกและซ่อมบางอย่างในชุดของฉันมาค่ะ"
1005203-63 = "เทียบกับเมื่อกี้แล้ว เสื้อผ้าของฉันมีตรงไหนที่แตกต่างไปบ้างเหรอคะ?"
1005203-64 = "[s3] \"ยากจัง...\"\n[s4] \"ก็ดูเหมือนเดิมเลยนี่นา...\""
1005203-65 = "ถ้าคุณครูคอยสังเกตฉันอย่างใกล้ชิด มันก็ไม่ใช่ปัญหาที่ยากเลยค่ะ"
1005203-66 = "ถ้าคุณครูคอยสังเกตฉันอย่างใกล้ชิด ก็จะเห็นได้ทันทีเลยค่ะ"
1005203-67 = "แต่ว่าโอกาสมีแค่ครั้งเดียวนะคะ ตัดสินใจให้ดีก่อนตอบด้วยค่ะ"
1005203-68 = "[s] \"เปลี่ยนกิ๊บติดผมรึเปล่านะ???\""
1005203-69 = "ติ๊ด~! ตอบผิดค่ะ "
1005203-70 = "ฮุฮุ ถ้างั้นฉันขอรับกาแฟตามที่ตกลงกันไว้เลยนะคะ"
1005203-76 = "[ns] \"แล้วคำตอบที่ถูกคืออะไรเหรอ?\""
1005203-78 = "คุณครูยังไม่ทราบเหรอคะ?"
1005203-79 = "คำตอบก็คือ... ไม่มีอะไรเปลี่ยนไปเลยค่ะ~"
1005203-80 = "[s5] \"อะไรกัน?!\"\n[s6] \"โดนต้มซะเปื่อยเลย!\""
1005203-81 = "ฮุฮุ ถ้าพูดกันตามตรง ฉันไม่ได้โกงเลยนะคะ"
1005203-82 = "ฮุฮุ ถ้าพูดกันตามตรง ฉันไม่ได้หลอกคุณครูเลยนะคะ"
1005203-83 = "บางครั้งตัวเลือกที่เราไม่ได้สนใจก็อาจกลายมาเป็นคำตอบของคำถามได้นะคะ"
1005203-84 = "เพราะฉะนั้นแล้ว ถ้าเป็นเลขานุการที่ยอดเยี่ยมละก็ จะต้องพิจารณาความเป็นไปได้ทั้งหมดอยู่เสมอ เพื่อไม่ให้มีอคติในการตัดสินใจค่ะ"
1005203-85 = "ถ้าทำแบบนั้นแล้วก็จะสังเกตเห็นความเป็นจริงได้อย่างเป็นกลาง... และก็จะได้ไม่ถูกนักเรียนเกเร#nอย่างฉันหลอกเอานะคะ"
1005203-86 = "เพราะงั้นตอนนี้... คุณครูช่วยมองภาพรวมกว้างๆ แล้วจดจ่ออยู่ที่ฉันด้วยนะคะ"
1005203-88 = "(หลังจากนั้น คุณครูก็เอาแต่จ้องเขม็งไปที่โนอาเพื่อสังเกตอากัปกิริยาของเธอ)"
1005203-89 = "ฮุฮุ... รู้สึกว่ากาแฟวันนี้หวานผิดปกติเลยนะคะ~"
1005203-93 = "(รู้สึกไม่ได้ประโยชน์อะไรเลย...)"

1005203-1 = "#title;세미나 서기 노아의 짓궂은 관찰"
1005203-2 = "#place;샬레 집무실"
1005203-3 = "3;노아;03;안녕하세요, 선생님.\n#3;a"
1005203-4 = "3;노아;01;오늘도 제가 샬레의 당번 활동을 맡게 되었답니다.\n#3;em;[반짝]"
1005203-5 = "3;노아;03;늘 그래왔지만, 이번에도 잘 부탁드리겠습니다.\n#3;greeting"
1005203-6 = "[s] \"음, 잘 부탁해.\""
1005203-7 = "3;노아;02;그나저나 오늘따라 기분이 좋아 보이시네요."
1005203-8 = "3;노아;01;뭔가 즐거운 일이라도 있으셨나요?"
1005203-9 = "[s1] \"지난 밤에 좋은 생각이 떠올랐거든.\"\n[s2] \"노아의 평정심을 깨트릴 수 있는 방법을!\""
1005203-10 = "3;노아;04;……제 평정심을 깨트릴 수 있는 방법이요?\n#3;em;[땀]"
1005203-11 = "3;노아;04;……제 평정심을 깨트릴 수 있는 방법이요?\n#3;em;[땀]"
1005203-12 = "3;노아;04;그동안 일부러 평정을 가장하고 다닌 기억은 없습니다만……\n#3;stiff"
1005203-13 = "3;노아;99;선생님께서 저를 시험해보고 싶으시다니, 어쩐지 조금 흥미가 생기네요."
1005203-14 = "3;노아;01;그래서, 어떤 방법인가요?"
1005203-15 = "[s] \"이번에는 내가 노아의 행동을 기록하려고.\""
1005203-16 = "3;노아;04;……저번의 제가 서기 업무를 했던 것처럼, 이번에는 선생님께서 역으로 제 행동을 관찰하고 기록하시겠다고요?"
1005203-17 = "3;노아;01;과연. 그건 제게도 익숙하지 않은 경험이네요.\n#3;em;[반응]"
1005203-18 = "3;노아;99;평소의 저는 다른 사람들의 시선 밖에서 서기 업무를 하고 있었던지라……"
1005203-19 = "3;노아;01;누군가가 저를 지켜보는 상황 아래에서 일을 한다는 인식은 없었거든요."
1005203-20 = "3;노아;01;……그럼 오늘은 선생님의 제안대로 서로를 관찰하며 당번 시간을 보내볼까요?"
1005203-21 = "3;노아;02;아, 당번 업무를 시작하기 전에 미리 말씀드리는 사실입니다만.\n#3;em;[!]"

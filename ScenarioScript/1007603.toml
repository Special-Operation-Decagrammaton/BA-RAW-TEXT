[translation]
1007603-1 = "確實有幫上忙"
1007603-2 = "（因為營運管理工作蜂擁而至而忙得不可開交……）"
1007603-4 = "不是，這太奇怪了吧！#n我明明登記要把餐車開到跑道的這一邊……"
1007603-5 = "什麼？你說我的參賽項目是接力賽！？#n怎麼可能！我是跳遠選手耶！"
1007603-6 = "來，來哦～請品嚐看看～好吃的雞肉串……"
1007603-7 = "咦，這裡是哪裡？我跑到什麼地方了？"
1007603-8 = "那，那個，不好意思，我不小心把紅牌弄丟了……#n因為下一場比賽還要用，請問有多的嗎……？"
1007603-9 = "餐廳不是在這裡？#n搞什麼啊，我明明是跟著箭頭來的……那要在哪裡吃飯啊？"
1007603-13 = "我來換電燈了～"
1007603-14 = "咦？為什麼是今天？#n不是你要求的嗎？"
1007603-16 = "（鬧哄哄……）"
1007603-17 = "（必須應對的人太多，連上洗手間的時間都沒有……）"
1007603-18 = "[ns1]（忙，忙得我暈頭轉向……）\n[ns2]（雖然有心理準備，果然還是很累人啊……）"
1007603-21 = "你在這裡啊，老師！我來了！！"
1007603-23 = "咦？老師，你臉色不太好唷……？#n發生什麼事了嗎……？"
1007603-24 = "……嗯？想去洗手間嗎？"
1007603-25 = "這樣啊！因為要處理的事太多，所以找不到時間休息……！"
1007603-26 = "那就讓我來幫忙吧！#n除了重要的事之外都可以交給我哦！"
1007603-27 = "老師可能會覺得有點意外，但別看我這樣，我並不討厭面對人群喔！"
1007603-28 = "[s3]「我一點都不意外……」\n[s4]「那不好意思，可以麻煩你一下嗎？」"
1007603-29 = "啊哈哈……"
1007603-30 = "總之，儘管放心交給我吧！！"
1007603-31 = "哈哈哈哈！"
1007603-32 = "沒問題！交給我就對了！請放心地去吧～！"
1007603-33 = "[ns] 去洗手間"
1007603-35 = "（過了一會……）"
1007603-37 = "[ns5]「……呼，我回來了。」\n[ns6]「感覺舒服多了，謝謝你，亞都梨。」"
1007603-41 = "[ns7]「……嗯？亞都梨？」\n[ns8]「咦，人都不見了……」"
1007603-44 = "啊，呃！"
1007603-45 = "這，這個……那個……是這樣的……！！"
1007603-46 = "就是……嗯……"
1007603-51 = "……對……"
1007603-52 = "對不起……"
1007603-53 = "[s9]「……怎麼了！？」\n[s10]「為什麼突然道歉！？」"
1007603-56 = "為了解決問題，我已經盡最大的努力說明……"
1007603-57 = "可是不知道為什麼話都還沒說完，#n大家就說「知道了，別說了！」然後轉身就走……"
1007603-58 = "感，感覺好像有解決……又好像沒解決……"
1007603-59 = "後來才想到，我好像又像平常一樣習慣性地……#n所以才會讓大家感到不開心吧……"
1007603-60 = "嗚嗚……"
1007603-61 = "本來是想幫忙的，結果又闖禍了。#n真的很抱歉……"
1007603-62 = "繼續待在這裡也只會幫倒忙，我就先告辭了……"
1007603-66 = "…………？"
1007603-67 = "……老……老師？#n為什麼露出那種表情……？"
1007603-68 = "[s11]「亞都梨！一直待在這裡吧！！」\n[s12]「只要亞都梨喜歡，想待多久都可以！！」"
1007603-71 = "……！？咦，咦！？這麼突然！？"
1007603-72 = "我，我確實有幫上忙……！？#n我，我？有幫上忙？怎麼回事……！？"
1007603-73 = "我，我完全搞不懂……"
1007603-74 = "搞不懂也沒關係！？"
1007603-75 = "只要跟剛才一樣待著就行了？#n待到下個行程之前也可以……？"
1007603-76 = "沒，沒問題！#n老師這麼說我當然樂意幫忙……！"
1007603-77 = "唔嗯……"
1007603-78 = "……這，這個……"
1007603-79 = "雖然搞不清楚狀況……但很高興能幫上忙！！#n而且感覺這次也不像是在說客套話！"
1007603-80 = "那，那麼……"
1007603-81 = "我會繼續加油！！"
1007603-83 = "（之後，至少和亞都梨在一起的期間都以進入無敵狀態的心情處理業務）"

[translation]
1007603-1 = "It Really Helped"
1007603-2 = "I was nearly drowning in the amount of management work I had to get through."
1007603-4 = "Like I said, it's not right! I made sure to submit my registration so that I can have a food truck on this side of the track!"
1007603-5 = "What? I'm signed up for the relay race?! But I'm here to compete in the long jump!"
1007603-6 = "Chicken skewers! Come get your chicken skewers! Only—"
1007603-7 = "Wait, where am I? How far did I go?"
1007603-8 = "E-Excuse me. I'm so sorry but I misplaced my red card. I'm a referee in the next match... Do you have any spares?"
1007603-9 = "This isn't a restaurant? I followed all the arrows though! Where am I supposed to go to eat?"
1007603-13 = "Excuse me, I'm here to replace the light bulb!"
1007603-14 = "What? Why not today? I've been told that the date was set for today."
1007603-16 = "*rabble rabble*"
1007603-17 = "Because of the ever growing line of people, I couldn't even find a moment to use the restroom."
1007603-18 = "[ns1] \"(I-I'm getting overwhelmed...)\"\n[ns2] \"(I guess I should've known it would get this bad.)\""
1007603-21 = "I found you, Sensei! I'm here!"
1007603-23 = "Um, Sensei? Are you okay? You aren't looking so good."
1007603-24 = "...What? Oh, the bathroom?"
1007603-25 = "Ah! You've been working so diligently, you haven't had even a moment to rest!"
1007603-26 = "I can help with that! As long as it isn't anything above my paygrade, you can trust me to handle it!"
1007603-27 = "You may be surprised to learn this, but I don't actually mind dealing with people!"
1007603-28 = "[s3] \"Somehow, I'm not all that surprised...\"\n[s4] \"I'm sorry, but could I leave it to you?\""
1007603-29 = "Hahaha... "
1007603-30 = "Just leave it all to me! Please take your time!"
1007603-31 = "Hahahaha!"
1007603-32 = "Of course! Just leave it all to me! Go take your time!"
1007603-33 = "[ns] Go to the bathroom."
1007603-35 = "A few moments later."
1007603-37 = "[ns5] \"...Whew, I'm back.\"\n[ns6] \"I really needed that. Thanks, Kotori.\""
1007603-41 = "[ns7] \"...What? Kotori?\"\n[ns8] \"Wait, there's no line...\""
1007603-44 = "Oh, um!"
1007603-45 = "S-So about all this... well...! "
1007603-46 = "How do I... umm..."
1007603-51 = "...Sorr..."
1007603-52 = "Sorry..."
1007603-53 = "[s9] \"...Why?!\"\n[s10] \"A sudden apology?!\""
1007603-56 = "I really tried to do my job well and answer everyone's questions, but..."
1007603-57 = "For some reason, they all eventually would leave in a huff, saying something like, \"Enough already! Please!\""
1007603-58 = "S-So it feels like I solved the problem...but also didn't solve anything..."
1007603-59 = "When the line disappeared, I realized I accidentally chased everyone away because of my bad habit..."
1007603-60 = "Ugh..."
1007603-61 = "I really wanted to be useful to you, but I just did what I always do. I made a mess of things. I'm sorry, Sensei..."
1007603-62 = "I'm going to go back, since I'm just in the way here."
1007603-66 = "...?"
1007603-67 = "...Sensei? Why are you making that face...?"
1007603-68 = "[s11] \"You have to stay here, Kotori!\"\n[s12] \"If you don't mind, please, please stay!\""
1007603-71 = "Huh? Huh? W-What?!"
1007603-72 = "I was a great help...?! M-Me? I-I was? How...?!"
1007603-73 = "I-I don't quite get what you're trying to say..."
1007603-74 = "It's fine if I don't fully understand?!"
1007603-75 = "I just need to stay by your side? Until I have to go to my next event?"
1007603-76 = "O-Of course! I'm always happy to be with you, but..."
1007603-77 = "Hmm..."
1007603-78 = "Y-Yeah..."
1007603-79 = "You know what, I don't get it! But as long as I can be of some use to you, which it seems like I am, then that's a good thing!"
1007603-80 = "Th-Then..."
1007603-81 = "I'll keep trying my best!"
1007603-83 = "I was able to finish off the rest of the day feeling invincible, with Kotori by my side."

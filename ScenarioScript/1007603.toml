[translation]
1007603-1 = "ช่วยได้อยู่แล้ว"
1007603-2 = "(คุณครูกำลังงานยุ่งหัวหมุนอยู่กับงานด้านการจัดการต่างๆ ที่ถาโถมเข้ามา)"
1007603-4 = "เดี๋ยวสิ ก็บอกว่าแบบนี้มันแปลกๆ นะ! ฉันลงทะเบียนว่าจะเอาฟูดทรัคมาขายที่สนามด้านนี้แล้วนะ... "
1007603-5 = "คะ? รายการที่ฉันลงทะเบียนไปคือแข่งวิ่งผลัดเหรอคะ!? จะเป็นแบบนั้นได้ยังไงกันคะ! ฉันเป็นนักกีฬา#nกระโดดไกลนะคะ!"
1007603-6 = "มาๆ เชิญเลย~ ลองชิมดูก่อนได้เลย~ ยากิโทริอร่อยๆ..."
1007603-7 = "เอ๋? ที่นี่คือที่ไหนน่ะ? ฉันมาถึงไหนกันเนี่ย?"
1007603-8 = "นะ...นี่ ขอโทษนะแต่ว่าฉันทำเรดการ์ดหายน่ะค่ะ ต้องใช้ตอนแข่งครั้งหน้าด้วย มีสำรองมั้ย..."
1007603-9 = "ที่นี่ไม่ใช่ร้านอาหารหรอกเหรอคะ? อะไรกัน อุตส่าห์เดินตามเส้นแดงมาแล้วแท้ๆ...? แล้วร้านอาหารอยู่#nที่ไหนล่ะคะ?"
1007603-13 = "มาเปลี่ยนหลอดไฟจ้า~"
1007603-14 = "หืม? ทำไมต้องเปลี่ยนวันนี้น่ะเหรอ? ก็...ขอให้มาเปลี่ยนวันนี้ไม่ใช่รึไง?"
1007603-16 = "(เสียงจอแจวุ่นวาย...)"
1007603-17 = "(มีคนมาสอบถามจำนวนมาก ทำให้คุณครูไม่มีเวลาแม้แต่จะปลีกตัวไปเข้าห้องน้ำ...)"
1007603-18 = "[ns1] (หะ...หัวหมุนแล้ว...)\n[ns2] (ถึงจะคิดไว้แล้ว แต่งานโหดไม่ธรรมดาเลยนะเนี่ย)"
1007603-21 = "อยู่นี่เองเหรอคะคุณครู! ฉันมาแล้วค่ะ!"
1007603-23 = "หืม? เอ๋ คุณครู...? สีหน้าดูไม่ค่อยดีเลยนะคะ... มีเรื่องอะไรหรือเปล่าคะ...?"
1007603-24 = "...คะ? อ๊ะ ห้องน้ำเหรอคะ? "
1007603-25 = "คิดแล้วเชียว! คุณครูคงไม่มีเวลาไปห้องน้ำเพราะต้องคอยตอบคำถามแล้วก็แก้ปัญหาให้คนอื่นๆ#nสินะคะ!"
1007603-26 = "ถ้าเป็นเรื่องนี้ละก็ ฉันช่วยได้นะคะ! ถ้าไม่ใช่พวกงานสำคัญๆ ละก็ ปล่อยให้เป็นหน้าที่ฉันได้เลยค่ะ!"
1007603-27 = "คุณครูอาจคาดไม่ถึง แต่เห็นแบบนี้ ฉันเองก็ไม่ได้เกลียดการต้องคอยรับมือหรือตอบคำถามผู้คนหรอก#nนะคะ!"
1007603-28 = "[s3] \"ครูพอเดาได้ เลยไม่แปลกใจสักนิด...\"\n[s4] \"ครูขอโทษนะ แต่ขอรบกวนหน่อยแล้วกัน\""
1007603-29 = "แหะๆๆ... "
1007603-30 = "เชื่อมือฉันได้เลยค่ะ! เชิญตามสบายเลยนะคะ คุณครู!"
1007603-31 = "ฮ่าฮ่าฮ่าฮ่า!!!"
1007603-32 = "ใช่แล้วค่ะ! เชื่อมือฉันได้เลยค่ะ! เชิญตามสบายเลยนะคะ คุณครู!"
1007603-33 = "[ns] ไปห้องน้ำ"
1007603-35 = "(...ครู่ต่อมา)"
1007603-37 = "[ns5] \"...ฮู่ว กลับมาแล้ว\"\n[ns6] \"รอดแล้ว ขอบคุณนะ โคโทริ\""
1007603-41 = "[ns7] \"...หืม? โคโทริ?\"\n[ns8] \"เอ๋ ไม่มีใครอยู่เลย...\""
1007603-44 = "อ๊ะ อือออ!"
1007603-45 = "อะ...เอ่อ คือ...คือว่า... คือว่าเรื่องนี้...!! "
1007603-46 = "คือว่าเอ่อ... อืม..."
1007603-51 = "...ขะ..."
1007603-52 = "ขอโทษด้วยค่ะ..."
1007603-53 = "[s9] \"...อะไรเนี่ย!?\"\n[s10] \"จู่ๆ ก็มาขอโทษงั้นเรอะ!?\""
1007603-56 = "ฉันพยายามอธิบายอย่างหนักเพื่อคลี่คลายสถานการณ์ตรงหน้าแล้ว แต่ว่า..."
1007603-57 = "ไม่รู้ว่าทำไมระหว่างที่อธิบายอยู่ทุกคนก็พูดขึ้นว่า 'รู้แล้ว หยุดพูดได้แล้ว!' แล้วก็ยอมกลับไป..."
1007603-58 = "มะ...เหมือนจะคลี่คลายสถานการณ์ได้... แต่ก็เหมือนจะคลี่คลายสถานการณ์ไม่ได้เลย..."
1007603-59 = "แล้วหลังจากนั้นฉันก็คิดได้ว่าเผลอใช้นิสัยเดิมไล่คนอื่นๆ ไป..."
1007603-60 = "ฮือออ..."
1007603-61 = "ฉันตั้งใจอยากจะช่วยงานคุณครูแท้ๆ แต่กลับก่อเรื่องแบบนี้อีกแล้ว ขอโทษจริงๆ ค่ะ..."
1007603-62 = "ถ้าฉันยังอยู่ตรงนี้ต่อก็คงจะเกะกะคุณครูเปล่าๆ ฉันจะไปเดี๋ยวนี้ค่ะ..."
1007603-66 = "...?"
1007603-67 = "...คะ...คุณครู? ทำไมทำสีหน้าแบบนั้น...?"
1007603-68 = "[s11] \"โคโทริ! อยู่ที่นี่ก่อนเถอะนะ!\"\n[s12] \"ถ้าโคโทริว่างละก็ จะอยู่นานแค่ไหนก็ได้นะ!!\""
1007603-71 = "...!? คะ...คะ!? อะ...อะไรกัน...!?"
1007603-72 = "ฉันช่วยคุณครูได้อย่างนั้นเหรอคะ...!? ฉะ...ฉันเนี่ยนะ? นะ...นี่น่ะเหรอคะ? ยะ...ยังไงกัน...!?"
1007603-73 = "ฉะ...ฉันไม่เข้าใจเลยค่ะ"
1007603-74 = "ไม่ต้องเข้าใจก็ได้อย่างนั้นเหรอคะ!?"
1007603-75 = "แค่อยู่ที่นี่ต่อแบบเมื่อกี้เท่านั้นก็พอเหรอคะ? อยู่แค่เท่าที่อยู่ได้ แค่ก่อนตารางกิจกรรมอื่นของฉันจะเริ่ม#nก็ได้งั้นเหรอคะ...?"
1007603-76 = "นะ...แน่นอนค่ะ! ถะ...ถ้าคุณครูพูดแบบนั้น ฉันก็ดีใจมากๆ อยู่หรอกค่ะ แต่..."
1007603-77 = "อืม..."
1007603-78 = "...คะ...ค่ะ..."
1007603-79 = "ถะ...ถึงฉันจะไม่ค่อยเข้าใจ แต่ว่าถ้าทำประโยชน์ให้คุณครูได้ ฉันก็ดีใจมากเลยค่ะ! และคุณครูเองก็#nคงไม่ได้พูดไปงั้นๆ ด้วย!"
1007603-80 = "ถะ... ถ้างั้น..."
1007603-81 = "ฉะ...ฉันจะสู้ตายค่ะ!!"
1007603-83 = "(หลังจากนั้น พอมีโคโทริอยู่ด้วย คุณครูก็มีแรงฮึดจัดการงานต่างๆ ขึ้นมามากกว่าเดิม)"

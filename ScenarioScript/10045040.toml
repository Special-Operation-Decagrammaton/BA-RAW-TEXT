10045040-178 = "ฉันให้เด็กๆ วางกับระเบิดไว้ในทุ่นลอยน้ำที่ต้องวิ่งข้ามแล้ว ถ้าเหยียบละก็ บึ้มแน่นอน!"
10045040-179 = "ส่วนทุ่นที่ไม่มีระเบิด เด็กๆ ของฉันก็ทำเครื่องหมายให้ฉันสังเกตไว้ คนอื่นที่ไม่รู้ก็เตรียมตกทะเล#nจ๋อมแจ๋มไปเลย!"
10045040-180 = "ถะ... ถ้างั้นเธอก็นำเลย! ฉันกลัวว่าตัวเองจะไปเหยียบอะไรเข้าน่ะสิ!"

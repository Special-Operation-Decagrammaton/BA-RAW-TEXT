10045040-109 = "เทียบกับการฝึกซ้อมตามปกติแล้วแค่นี้ไม่เท่าไรหรอก!"
10045040-110 = "(อย่ามองข้างล่าง อย่ามองข้างล่าง ห้ามมองข้างล่างเด็ดขาด ห้ามมองข้างล่าง!)"
10045040-112 = "โอ้ว ทุกคนกระโดดข้ามไปได้ในรวดเดียวเลยค่ะ!"

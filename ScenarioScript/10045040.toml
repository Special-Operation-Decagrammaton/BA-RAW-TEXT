10045040-215 = "อื้อ! ถ้าเจอทุ่นลอยน้ำที่ระเบิด ก็ห้ามไปเหยียบทุ่นนั้นเด็ดขาด!"
10045040-216 = "วิถีนินจาอิซุนะ! วิชาวิ่งบนผิวน้ำ!"
10045040-220 = "ผะ... ผู้เข้าแข่งขันอิซุนะกำลังวิ่งฉิวบนผิวน้ำค่ะทุกคน...! ทำได้ยังไงคะเนี่ย...!"

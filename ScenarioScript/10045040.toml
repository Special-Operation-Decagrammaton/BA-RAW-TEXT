[translation]
10045040-1 = "ตอนที่ 4;รอบที่ 3: วิ่งวิบากบนผืนน้ำ"
10045040-2 = "แล้วการเดินทางบนเรือที่เต็มไปด้วยเสียงกรีดร้องก็สิ้นสุดลง"
10045040-4 = "เอาละค่ะ ต่อไปจะเป็นการแนะนำผู้เข้าแข่งขัน 10 คนสุดท้ายที่ผ่านเข้ารอบมาได้!"
10045040-5 = "ขอเสียงปรบมือต้อนรับทุกคนหน่อยค่ะ!"
10045040-15 = "ทุกคนเป็นตัวเต็งที่โชว์ฝีมือมาตั้งแต่การแข่งขันรอบแรกเลยนะคะ! อยากรู้แล้วละค่ะว่าต่อไปทุกคนจะ#nงัดอะไรมาแข่งกัน!"
10045040-16 = "งั้นเราไปพักกันสักครู่ แล้วมาเจอกันในการแข่งขันต่อไปนะคะ!"
10045040-17 = "อ้อ จริงสิ เวลานี้ทุกคนน่าจะเริ่มหิวกันแล้วนะคะ"
10045040-18 = "ร้านเฮียกคิยาโคสาขาริมทะเลของเราเปิดให้บริการทุกคนตั้งแต่เช้าแล้วค่ะ!"
10045040-19 = "เรามีอาหารจานอร่อยราคาน่ารักมากมาย ระหว่างนี้เชิญทุกท่านไปอิ่มหนำสำราญกันได้เลยค่ะ!"
10045040-20 = "แล้วฉันจะรอนะคะ เมี้ยวเมี้ยว!"
10045040-21 = "ดีละ...! เป็นการโปรโมตร้านที่แนบเนียนเลย!"
10045040-24 = "ทุกคน... ไปกินอะไรร้านริมทะเลกันมั้ย?"
10045040-25 = "อึก ขอโทษนะ ตอนนี้ฉันไม่อยากกินอะไรเลย"
10045040-26 = "ที่จริงฉันก็เหมือนกัน..."
10045040-28 = "รู้สึกเหมือน... ตายไปในทะเลแล้วเลยเจ้าค่ะ...."
10045040-29 = "อ่า... ไม่อยากนึกถึงเลย..."
10045040-31 = "[ns1] \"เฮียกกะเรียวรันผ่านเข้ารอบทุกคนเลยนะ!\"\n[ns2] \"เก่งมากเลยทุกคน ครูดีใจด้วยนะ!\""
10045040-34 = "ขะ... ขอบคุณเจ้าค่ะ..."
10045040-35 = "คุณครู การแข่งขันต่อไปคืออะไรเหรอ?"
10045040-36 = "(จะเป็นอะไรก็ได้ ขอแค่ไม่ต้องลงน้ำก็พอ...)"
10045040-37 = "[ns] \"การแข่งขันต่อไปก็คือ...!\""
10045040-39 = "[log]วิ่งวิบากบนผืนน้ำ ใครไวกว่าก็เข้ารอบไปเลย![/log]"
10045040-43 = "ยากขึ้นเรื่อยๆ เลยสินะ..."
10045040-45 = "รอกันนานมั้ยคะทุกคน! การแข่งขันต่อไปคือไคลแม็กซ์ของเทศกาลสวนน้ำเฮียกคิยาโค! วิ่งวิบากบนผืนน้ำค่ะ!"
10045040-49 = "ผู้เข้าแข่งขันทั้ง 10 คนจะออกตัวพร้อมกัน! 2 คนที่วิ่งฝ่าสิ่งกีดขวางแล้วเข้าเส้นชัยได้ จะผ่านเข้าสู่รอบสุดท้ายค่ะ!"
10045040-50 = "ในสวนน้ำมีอุปสรรคมากมายรอทุกคนอยู่!"
10045040-51 = "ทั้งสะพานที่หมุนวนไปมา!"
10045040-52 = "ทางลาดที่มีลูกโป่งน้ำตกลงมา!"
10045040-53 = "ทุ่นลอยน้ำที่วางเรียงรายในทะเล!"
10045040-54 = "และสไลเดอร์ที่ไม่รู้ว่าจะพาเราไปที่ไหน!"
10045040-55 = "เอาชนะอุปสรรคเหล่านี้แล้วไปให้ถึงเส้นชัยให้ได้นะคะทุกคน!"
10045040-57 = "ฮู่ว..."
10045040-58 = "ถ้าไม่อยากให้ตัวเปียกน้ำ งั้นก็แค่ห้ามตกลงไปในน้ำก็พอ"
10045040-59 = "ฉันจะไม่ตกน้ำเด็ดขาดเลย"
10045040-60 = "(ใช่แล้วละ... ไม่ต้องไปแข่งกับใครหรอก แค่ระวังอย่าให้ตกน้ำไปก็พอ)"
10045040-62 = "ในขณะเดียวกัน..."
10045040-63 = "โธ่เอ๊ย นี่มันอะไรกัน? พวกที่อยากให้ตกรอบกลับผ่านเข้ารอบมาทุกคนเลย!"
10045040-64 = "แบบนี้พวกเราก็ไม่มีโอกาสชนะน่ะสิ!"
10045040-65 = "รอบนี้หาคนชนะแค่ 2 คนเอง งั้นเรายอมแพ้ไปดีกว่ามั้ยนะ?"
10045040-66 = "งั้นก็ให้เป็นพวกเรา 2 คนสิ! ทำไมถึงจะยอมแพ้เสียล่ะ!"
10045040-67 = "เธอก็พูดได้ เธอไม่เคยโดนยัยพวกนั้นไล่ตามนี่นา"
10045040-68 = "ถึงจะน่าละอายที่พูดคำแบบนี้จากปากฉัน แต่ยัยพวกนั้นน่ะเก่งไม่ใช่เล่นเลย"
10045040-69 = "แถมยังเคยทำดีกับฉันด้วย... จะให้ดื้อดึงสู้กับพวกนั้นต่อไป ฉันก็ไม่ค่อยสบายใจนักหรอก"
10045040-71 = "อย่าเพิ่งถอดใจสิ! พวกเรายังมีโอกาสอยู่นะ! ทำตามแผนการของฉันก็พอ!"
10045040-72 = "หึ... หึหึหึ... หึหึหึหึ...!"
10045040-73 = "หะ... โห.... หัวเราะเหมือนพวกตัวร้ายเลย..."
10045040-74 = "ไว้คราวหน้า... คราวหน้าเราต้อง...!"
10045040-76 = "หลังจากนั้นไม่นาน..."
10045040-77 = "ขอเริ่มการแข่งวิ่งวิบากบนผืนน้ำที่ทุกคนตั้งตารอค่ะ!"
10045040-82 = "ในที่สุดก็เริ่มแล้วสินะ..."
10045040-83 = "ใครจะถึงเส้นชัยก็ไม่รู้ละ แต่รอเจอฉันในรอบสุดท้ายได้เลย"
10045040-84 = "ฮุฮุ เราวิ่งเข้าเส้นชัยพร้อมกัน 4 คนแล้วเข้ารอบกันให้หมดเลย... จะได้มั้ยเจ้าคะ? "
10045040-85 = "จะไปทำได้ได้ยังไงกันล่ะ?"
10045040-88 = "(ฮู่ว...)"
10045040-89 = "(ถ้าฉันตกรอบนี้ไปอย่างเนียนๆ ก็อาจเป็นการดีต่อทุกคนก็ได้นะ...)"
10045040-90 = "(ยังไงเราก็... คิดหาข้ออ้างไว้แล้วด้วย)"
10045040-91 = "(ว่าแต่จะตกรอบยังไงให้เนียนล่ะ? คิดสิคิด คิเคียว...!)"
10045040-92 = "คิเคียว คิเคียว...?"
10045040-93 = "ฉันกำลังคิดบางอย่างอยู่น่ะ..."
10045040-94 = "เอาละค่ะ ผู้เข้าแข่งขันทุกคน! เชิญทุกคนไปยืนรอที่จุดออกตัวเลยค่ะ!"
10045040-101 = "การแข่งขันรอบที่ 3 วิ่งวิบากบนผืนน้ำ...!"
10045040-102 = "[ns] \"เริ่มได้!!\""
10045040-105 = "เฮียกกะเรียวรันออกนำตั้งแต่เริ่มการแข่งขันเลยค่ะ!"
10045040-106 = "ด่านแรกของเราคือสะพานหมุน! มาลุ้นกันค่ะว่าทุกคนจะผ่านไปได้อย่างปลอดภัยหรือเปล่า!"
10045040-107 = "ทุกคน รวดเดียวเลยนะ...!"

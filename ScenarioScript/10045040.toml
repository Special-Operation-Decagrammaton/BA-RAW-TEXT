[translation]
10045040-1 = "Episode 4;Round 3: Inflatable Obstacle Race"
10045040-2 = "The boat ride of horror and screams finally came to an end."
10045040-4 = "Here are our 10 victors of round 2 of the Hyakkiyako Water Festival!"
10045040-5 = "Let's give them a big round of applause!"
10045040-15 = "These crowd favorites were standouts from the first match. I hope everyone's as excited as me to see what they'll do next!"
10045040-16 = "Please rest up as we take a quick break before the next match!"
10045040-17 = "Ah! Perfect timing. It's lunch time!"
10045040-18 = "Stop by the Momoyodou Pop-up Beach Shack for a bite to eat!"
10045040-19 = "I've handpicked this delicious, affordable menu, so don't miss out!"
10045040-20 = "I'll see you there, nyan!"
10045040-21 = "...I snuck that ad in really well! Heehee!"
10045040-24 = "Is anyone...hungry?"
10045040-25 = "Ugh, sorry. There's no way I can stomach anything right now."
10045040-26 = "...I feel similarly."
10045040-28 = "It feels as if...we survived a close brush with death itself..."
10045040-29 = "I intend to...erase this memory entirely, if possible..."
10045040-31 = "[ns1] \"Everyone from the Hyakkaryouran passed!\"\n[ns2] \"Congratulations!\""
10045040-34 = "Th-Thank you..."
10045040-35 = "Sensei. What will the next match be?"
10045040-36 = "(I can persevere...as long as it doesn't require I enter the water...)"
10045040-37 = "[ns] \"The next match is the...!\""
10045040-39 = "[log]Inflatable Obstacle Race![/log]"
10045040-43 = "...A never-ending barrage of blows."
10045040-45 = "The moment you've been waiting for! The highly anticipated Inflatable Obstacle Course!"
10045040-49 = "In a desperate dash to the finish line, all players will begin at the same time, but only two will move on to the final match!"
10045040-50 = "They'll have to overcome every single obstacle that stands between them and victory!"
10045040-51 = "The spinning bridge of doom!"
10045040-52 = "An arduous climb up a ramp under a water-balloon barrage!"
10045040-53 = "The harrowing path of buoys surrounded by water!"
10045040-54 = "And who knows where those slides will even lead?!"
10045040-55 = "Overcome these obstacles and make it to the finish line before anyone else!"
10045040-57 = "...*sigh*"
10045040-58 = "I simply need not fall in order to avoid getting wet?"
10045040-59 = "That was my intention from the start."
10045040-60 = "(...There is no need to win. I simply must not fall.)"
10045040-62 = "Meanwhile..."
10045040-63 = "Damn it! Are you serious?! Every single one of our targets made it to the semi-finals."
10045040-64 = "We totally blew our chance to win."
10045040-65 = "Only two people move on to the finals too. Maybe we should just give up..."
10045040-66 = "Well there's two of us, ain't there?! I didn't peg you for a quitter!"
10045040-67 = "I'm not! You just don't know what it's like goin' up against those guys!"
10045040-68 = "Not to toot their horns or anythin', but they're really strong."
10045040-69 = "And they're actually kinda nice to me...so I feel bad about fightin' them..."
10045040-71 = "All I hear is weakness! Just stick to my plan, and everything'll work out!"
10045040-72 = "Kekeke... Kekekekek!"
10045040-73 = "Y-You've got that evil villain laugh down pat... That's for sure."
10045040-74 = "This time... This is going to be our big break!!"
10045040-76 = "A little while later..."
10045040-77 = "Arrre youuu READYYY?! The Obstacle Course round is about to begin!"
10045040-82 = "At long last..."
10045040-83 = "Whoever it may be, I'll see you in the finals!"
10045040-84 = "Fufu, or...perhaps all four of us can burst through the finish line at the exact same time! And then all of us will advance to the finals!"
10045040-85 = "I highly doubt they would allow that. "
10045040-88 = "(*sigh*)"
10045040-89 = "(...Not just for me, but also for my fellow members, it would be best if I were simply eliminated.)"
10045040-90 = "(I have already established my general distaste for the event...)"
10045040-91 = "(I need only be eliminated in a way that does not arouse suspicion. But how do I achieve this? Think, Kikyou!)"
10045040-92 = "...Kikyou? Hello, Kikyou?"
10045040-93 = "She's thinking even harder than usual."
10045040-94 = "Players! Please line up at the starting line!"
10045040-101 = "Inflatable Obstacle Course! Ready, set..."
10045040-102 = "[ns] \"...Commence!!\""
10045040-105 = "To no one's surprise, the Hyakkaryouran starts out with a strong lead!"
10045040-106 = "First up, the spinning bridge! Be careful not to spin out!"
10045040-107 = "On my mark, everyone!"
10045040-108 = "Run faster than the rotating platforms!"
10045040-109 = "This is nothing compared to my usual training!"
10045040-110 = "(Don't look down. Don't look down. Don't look down...!)"
10045040-112 = "Wow! They jumped over in perfect synchronization!"
10045040-113 = "Ta-da! Izuna will not lose!"
10045040-114 = "Zoom!"
10045040-115 = "Hut!"
10045040-119 = "Wow, it's neck and neck! These obstacles are no hindrance to these athletes!"
10045040-120 = "[ns] \"It's anyone's game at this point!\""
10045040-121 = "That's right. Just keep on doing your best, everyone..."
10045040-122 = "Oy. Is it done?"
10045040-123 = "Um... Yeah... I did as you said..."
10045040-125 = "And it looks like the Hyakkaryouran is the first group to arrive at the water balloon ramp! Bombs away!"
10045040-128 = "Again, at my word..."
10045040-133 = "Ugh!"
10045040-137 = "Wh-What is this? It's sticky. And slippery."
10045040-138 = "This smells like...coconut oil?!"
10045040-139 = "How is one meant to climb a ramp of oil?!"
10045040-142 = "[ns] \"Uh...Shizuko? Were you trying to throw in a plot twist?\""
10045040-143 = "N-No, of course not!"
10045040-144 = "Ref? Do something, Ref!!"
10045040-146 = "Kekeke, good job, Mouryo kid. They're not so high and mighty now, are they?"
10045040-147 = "We'll just slip on through!"
10045040-151 = "Th-They have a grappling hook?! Where'd you get that?"
10045040-152 = "Hmph! Unlike some losers, we're well prepared for any possibility!"
10045040-153 = "Heehee, have fun slippin' around down there."
10045040-157 = "Scoundrels! They cut the rope to prevent others from utilizing it!"
10045040-158 = "If we work together, we can get this oil washed off in no time!"
10045040-159 = "Let Izuna help! Izuna-Style Fountain Technique!"
10045040-165 = "...I've gotten wet."
10045040-166 = "Let's go! We can still catch up!"
10045040-170 = "Wh-What?! How'd they get past the oil?!"
10045040-171 = "It's fine! I always have a plan B! My underlings have a surprise for them at the next obstacle."
10045040-173 = "[log]Next Obstacle![/log]"
10045040-175 = "[log]The Path of Buoys![/log]"
10045040-178 = "We installed pressure mines in all of the buoys! Kekeke!"
10045040-179 = "I've marked all of the safe ones, but the others are goners!"
10045040-180 = "G-Go first, then! I don't know which ones are safe!"
10045040-186 = "Get back here, you...!"
10045040-189 = "This is no—"
10045040-195 = "...Huh?"
10045040-199 = "Are you an idiot?! I thought you knew which ones were safe!"
10045040-205 = "...Boo."
10045040-209 = "And with that, our two leaders are eliminated!"
10045040-210 = "But more importantly, who planted mines in the buoys?!"
10045040-211 = "[ns] \"It wasn't you, Shizuko?\""
10045040-212 = "What kind of person do you take me for?!"
10045040-215 = "Izuna understands! Then Izuna will just not go on the buoys at all!"
10045040-216 = "Izuna-Style Water Walking Technique!"
10045040-220 = "I-Is she running on water?! How is this possible?"
10045040-221 = "[s] \"She should be able to make it!\""
10045040-223 = "I'm not falling behind! I'm next!"
10045040-224 = "Renge! Don't run off so recklessly...!"
10045040-225 = "The Hyakkaryouran assault captain won't be stopped by some measly mines!"
10045040-229 = "And Renge breezes through the minefield without breaking a sweat!"
10045040-230 = "Your turn, Kikyou!"
10045040-233 = "(...I must simply follow Renge's path through the buoys. A simple feat...)"
10045040-240 = "...Huh?"
10045040-248 = "*gurgle* *gurgle*"
10045040-249 = "(Wh-What happened? Did I misjudge the path?)"
10045040-250 = "(Such a mistake, in such a crucial moment...)"
10045040-251 = "(Air. I need air...)"
10045040-252 = "(Ah... The darkness...)"
10045040-254 = "(...Everyone... I apologize...)"
10045040-256 = "...Kikyou?"
10045040-257 = "KIKYOU!!"

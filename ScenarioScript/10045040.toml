[translation]
10045040-1 = "第4話;第3回合：水上障礙賽"
10045040-2 = "充滿尖叫聲的船上旅程，終於迎來終點。"
10045040-4 = "那麼，接下來介紹通過本場比賽的10位選手！"
10045040-5 = "請大家掌聲歡迎！"
10045040-15 = "大家從第一場比賽就展現了驚人的實力！接下來的表現也很令人期待呢！"
10045040-16 = "那麼稍作休息之後，我們將進入下一場比賽！"
10045040-17 = "啊，對了。大家也差不多餓了吧？"
10045040-18 = "為了服務大家，期間限定的百夜堂「海之家」一早就開始營業囉！"
10045040-19 = "菜單上都是靜子精挑細選的銅板美食，請盡情享用！"
10045040-20 = "那麼，我在那裡等著大家唷，喵喵！"
10045040-21 = "……很好！這次的置入很自然！"
10045040-24 = "大家……要不要去海之家吃點東西？"
10045040-25 = "唔……抱歉，我現在什麼都不想吃。"
10045040-26 = "……其實我也是。"
10045040-28 = "同上……感覺差點就要沒命了……"
10045040-29 = "啊啊……真是不堪回首……"
10045040-31 = "[ns1]「百花繚亂全員晉級呢！」\n[ns2]「恭喜大家！」"
10045040-34 = "託，託您的福……"
10045040-35 = "老師，請問下一場比賽是什麼呢？"
10045040-36 = "（不管是什麼都行，只要不用下水就好……）"
10045040-37 = "[ns]「下一場比賽是……！」"
10045040-39 = "[log]水上障礙賽！[/log]"
10045040-43 = "……真是「一波未平，一波又起」啊。"
10045040-45 = "各位久等了！這次的比賽是百夜水上祭的壓軸！水上障礙賽！"
10045040-49 = "10人同時起跑！率先抵達終點的2人將晉級最終決戰！"
10045040-50 = "賽道上有各種障礙等著大家！"
10045040-51 = "不停旋轉的橋！"
10045040-52 = "水球傾瀉而下的斜坡！"
10045040-53 = "四周都是海水的浮標跳石！"
10045040-54 = "通往未知的不可預測滑水道！"
10045040-55 = "請突破這些障礙，奔向終點吧！"
10045040-57 = "……唉。"
10045040-58 = "不想被弄濕的話，只要不掉下去就行了吧？"
10045040-59 = "當然，我本來就打算這麼做。"
10045040-60 = "（……沒錯。沒有必要太拚命，只要確保不掉進水裡就好）"
10045040-62 = "與此同時，另一方面……"
10045040-63 = "可惡，這是怎麼回事？想淘汰的傢伙居然全都晉級了！"
10045040-64 = "這樣下去我們毫無勝算！"
10045040-65 = "乾脆放棄吧？這一輪只有兩個人能進決賽耶。"
10045040-66 = "只要晉級的是我們兩個就行了！現在還不到放棄的時候！"
10045040-67 = "你是因為沒被那些傢伙追過，所以才不懂吧。"
10045040-68 = "雖然這麼說有點長他人志氣，但他們真的很強。"
10045040-69 = "有時候對我也還算不錯……一直針對他們有點過意不去。"
10045040-71 = "少說那種沒骨氣的話！#n我們還有機會！只要照我的計畫行動就行了！"
10045040-72 = "咯咯……咯咯……咯咯咯咯……！"
10045040-73 = "哇，哇啊……是標誌性的反派笑聲……"
10045040-74 = "這次……這次一定……！"
10045040-76 = "於是在不久之後……"
10045040-77 = "各位期待已久的水上障礙賽即將開始！"
10045040-82 = "終於要開始了呢……"
10045040-83 = "雖然不知道會是誰，不過決賽時見囉。"
10045040-84 = "呵呵，或許我們四個會一起晉級決賽……也說不定唷？"
10045040-85 = "那實在不太可能吧。"
10045040-88 = "（……呼）"
10045040-89 = "（……如果能在這裡被自然淘汰的話，或許對大家都好）"
10045040-90 = "（藉口……我已經準備好了）"
10045040-91 = "（不過要怎麼被淘汰才自然呢？快想想辦法，桔梗……！）"
10045040-92 = "桔梗。#n……桔梗？"
10045040-93 = "好像在拚命思考著什麼……"
10045040-94 = "那麼選手們！請到起跑線上一字排開！"
10045040-101 = "第3回合，水上障礙賽……！"
10045040-102 = "[ns]「開始──！！」"
10045040-105 = "比賽一開始，百花繚亂率先領跑！"
10045040-106 = "第一個關卡是旋轉橋！能順利通過嗎？"
10045040-107 = "大家，一口氣衝過去……！"
10045040-108 = "只要跑得比旋轉的速度更快就沒問題了！"
10045040-109 = "跟平常的鍛鍊相比，這根本不算什麼！"
10045040-110 = "（不能往下看，不能往下看，不能往下看……！）"
10045040-112 = "哦哦，所有人一鼓作氣跳了過去！"
10045040-113 = "颯颯颯！伊樹菜也不能輸！"
10045040-114 = "咻～"
10045040-115 = "嘿咻。"
10045040-119 = "大家依序突破了障礙！差距始終沒有拉開！"
10045040-120 = "[ns]「無論最後誰贏都不奇怪呢！」"
10045040-121 = "很好……就這樣……就這樣！"
10045040-122 = "喂，我說的東西都準備好了吧？"
10045040-123 = "嗯……準備是準備好了啦……"
10045040-125 = "領先集團抵達水球傾瀉的斜坡！#n小心別被砸到喔～！"
10045040-128 = "這裡也一口氣……"
10045040-133 = "唔……！？"
10045040-137 = "這，這是什麼？又滑又黏的。"
10045040-138 = "這個味道是……椰子油……？"
10045040-139 = "這樣根本爬不上斜坡呀……！"
10045040-142 = "[ns]「那個……靜子？他們怎麼突然全身都是油……？」"
10045040-143 = "奇，奇怪……！怎麼會呢！#n應該只是普通的水球才對啊……！"
10045040-144 = "工作人員！請立刻確認！"
10045040-146 = "嘿嘿嘿，謝啦，妖怪劇團。這下距離就一下子拉近了！"
10045040-147 = "先走一步囉！"
10045040-151 = "什，什麼？鉤爪繩？#n那種東西是從哪弄來的啊！？"
10045040-152 = "哼，我早就預料到會這樣，所以提前準備好了！"
10045040-153 = "嘿嘿，你們就繼續在那裡滑來滑去吧！"
10045040-157 = "太卑鄙了！竟然自己用完後就把繩子切斷！"
10045040-158 = "大家，先用附近的水把油沖掉吧！"
10045040-159 = "交給伊樹菜吧！#n伊樹菜流忍法！噴泉之術！"
10045040-165 = "結果還是沒能避免被弄濕啊……"
10045040-166 = "快追上去吧！現在還來得及……！"
10045040-170 = "什，什麼？已經追上來了！？"
10045040-171 = "沒關係！我們的人已經在下一個關卡動了手腳！"
10045040-173 = "[log]下一個關卡！[/log]"
10045040-175 = "[log]浮標跳石！[/log]"
10045040-178 = "一部分的浮標上裝了炸彈，只要一踩到就會爆炸！"
10045040-179 = "安全的浮標只有我能辨認，其他人踩錯就會掉進海裡！"
10045040-180 = "那，那你快走前面吧！我可不知道哪個是安全的啊！"
10045040-186 = "你們這些傢伙……給我站住！"
10045040-189 = "還沒完呢，好戲接下來才要上演──"
10045040-195 = "……咦？"
10045040-199 = "笨蛋！你怎麼自己先踩到了啦……！"
10045040-205 = "……唉。"
10045040-209 = "啊啊，原本領先的兩人退場了！"
10045040-210 = "話說是誰在浮標上裝炸彈的啊！？"
10045040-211 = "[ns]「不是靜子設計的嗎？」"
10045040-212 = "我怎麼可能做這種事啊！"
10045040-215 = "哼哼！如果浮標會爆炸的話，只要不踩浮標就行了！"
10045040-216 = "伊樹菜流忍法！水上奔跑之術！"
10045040-220 = "伊，伊樹菜選手……在水面上跑起來了！？#n這到底是怎麼做到的……！"
10045040-221 = "[s]「伊樹菜的話，跑個五步左右應該沒問題……！」"
10045040-223 = "不能輸！我也要上了……！"
10045040-224 = "等一下，蓮華！這樣硬衝太危險……！"
10045040-225 = "區區炸彈是擋不住我的！"
10045040-229 = "哦哦，蓮華選手順利通過了浮標跳石！"
10045040-230 = "來吧！桔梗！你也可以的！"
10045040-233 = "（……沒錯。只要踩著蓮華剛剛踩過的浮標，應該沒問題才對……！）"
10045040-240 = "……嗯？"
10045040-248 = "（唔，唔唔……！）"
10045040-249 = "（怎，怎麼回事……？我踩錯浮標了嗎？）"
10045040-250 = "（居然在關鍵時刻……犯下這種錯誤……）"
10045040-251 = "（得趕快……浮上水面才行……）"
10045040-252 = "（意識……越來越……）"
10045040-254 = "（大家……對不起）"
10045040-256 = "……桔梗？"
10045040-257 = "桔梗……！！"

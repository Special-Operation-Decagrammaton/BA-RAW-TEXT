10045040-121 = "ดีละ... ต้องแบบนี้ละ... ห้ามแรงตกเด็ดขาด!"
10045040-122 = "นี่! จัดการไว้ตามที่ฉันบอกแล้วใช่มั้ย?"
10045040-123 = "อืม... ก็ทำไว้ตามที่สั่งแล้วน่ะนะ..."
10045040-125 = "ผู้เข้าแข่งขันกลุ่มแรกมาถึงเนินลูกโป่งน้ำแล้วค่ะ!! #nระวังอย่าให้โดนลูกโป่งน้ำที่ร่วงลงมานะคะ~!"

10045040-143 = "อ๊ะ... อ๊ะ...! เป็นไปได้ยังไง! มันควรจะเป็นลูกโป่งใส่น้ำธรรมดาๆ สิ...!"
10045040-144 = "ทีมงานทุกคนคะ! ช่วยไปตรวจสอบเดี๋ยวนี้เลยค่ะ!"
10045040-146 = "คิกคิกคิก ขอบใจนะพวกปีศาจ แบบนี้ก็ตีตื้นได้บ้างแล้วละ!"
10045040-147 = "งั้นฉันขอตัวก่อนนะ!"

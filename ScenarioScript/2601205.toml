[translation]
2601205-1 = "ฝึกช่วยชีวิตแบบบูรณาการ"
2601205-3 = "มาแล้วเหรอคะคุณครู!"
2601205-4 = "ช่วงเวลาแห่งความพยายามและความทรมานที่ยาวนานเพื่อให้ได้มาซึ่งคุณสมบัติของไลฟ์การ์ด..."
2601205-5 = "ฉันรู้สึกเป็นเกียรติจังเลยค่ะที่จะได้แสดงผลลัพธ์ให้คุณครูเห็น!"
2601205-6 = "[s1] \"อื้ม ครูคาดหวังอยู่นะ\"\n[s2] \"ครูอยากเห็นเร็วๆ แล้วละ!\""
2601205-9 = "ตั้งตารอได้เลยค่ะ!"
2601205-10 = "เอาละ ถ้างั้นก็ช่วยโยนตุ้มน้ำหนัก 5 กิโลอันนี้ลงไปในน้ำให้หน่อยค่ะ!"
2601205-11 = "จะโยนให้เต็มแรงเลยก็ได้ค่ะ!"
2601205-15 = "[ns] \"ฮึบบ!\""
2601205-19 = "มีคนจมน้ำ! ไลฟ์การ์ดคิริโนะจะไปช่วยเองค่ะ!"
2601205-25 = "[ns] (เอาตุ้มน้ำหนักกลับมาได้เร็วเลย...!)"
2601205-26 = "แฮ่ก แฮ่ก!"
2601205-27 = "แค่กๆ!"
2601205-28 = "[s3] (แต่ว่า...)\n[s4] (ยังรู้สึกเป็นห่วงไม่หายเลย...)"
2601205-32 = "เฮือก!"
2601205-33 = "ระ... ร่างกายขยับไม่ได้ดั่งใจเลยค่ะ..."
2601205-35 = "ฉันจะปั๊มหัวใจให้ค่ะ!"
2601205-36 = "ฮึบ!"
2601205-44 = "[ns5] \"ดะ... เดี๋ยวก่อน กดแรงเกินไปหรือเปล่า?\"\n[ns6] \"หุ่นจำลองเหมือนจะแตกแล้ว...\""
2601205-48 = "ไม่หรอกค่ะ ต้องกดให้เต็มแรงแบบนี้ละ เลือดจะได้ไหลเวียนดียังไงล่ะคะ!"
2601205-49 = "ฮึบ! ฮึบ! ฮึบ! ฮึบ!"
2601205-50 = "[s] \"คิริโนะ ครูว่าหยุดซ้อมก่อน...\""
2601205-55 = "[ns] \"อ๊ะ?!\""
2601205-58 = "คุณครู!! "
2601205-64 = "― [log=키리노 수영복]คุณครู![/log][wa:610] "
2601205-65 = "― [log=키리노 수영복]เป็นยังไงบ้างคะ?! [/log][wa:630] "
2601205-68 = "― [log=키리노 수영복]โล่งอกไปที...ลืมตาแล้วสินะคะ[/log][wa:2040] "
2601205-69 = "― [log=키리노 수영복]นึกว่าเกิดเรื่องใหญ่แล้วซะอีกค่ะ [/log][wa:2630] "
2601205-72 = "― [log=키리노 수영복]การปั๊มหัวใจ[/log]"
2601205-73 = "― [log=키리노 수영복]ฉันว่าคงไม่จำเป็นแล้วละค่ะ[/log][wa:1280] "
2601205-76 = "[ns7] \"ครูแค่เผลอเหยียบพลาดไปน่ะ\"\n[ns8] \"ครูแค่พลาดตกน้ำนิดหน่อยน่ะ\""
2601205-79 = "― [log=키리노 수영복]ถ้าอยู่ริมน้ำ เราต้องหมั่นระมัดระวังสถานการณ์รอบๆ นะคะ![/log][wa:2160] "
2601205-82 = "― [log=키리노 수영복]ต่อให้เป็นคนที่ว่ายน้ำเก่งแค่ไหน[/log]"
2601205-83 = "― [log=키리노 수영복]ก็อาจเจอเหตุการณ์ที่ไม่คาดคิดได้ค่ะ[/log][wa:2160] "
2601205-86 = "― [log=키리노 수영복]แต่ก็แน่นอนว่าถ้ามีไลฟ์การ์ดอย่างฉันอยู่ ก็ไม่เป็นปัญหาหรอกค่ะ![/log][wa:2300] "
2601205-89 = "― [log=키리노 수영복]ฉันจะคอยสอดส่องอยู่ทุกเมื่อ งั้นก็วางใจได้เลยค่ะ![/log][wa:1360] "
2601205-93 = "ฮู่ว แต่ก็ค่อยยังชั่วนะคะที่คุณครูไม่ได้เป็นอะไรมาก"
2601205-94 = "ถึงการฝึกซ้อมจะออกมาเละเทะก็เถอะค่ะ..."
2601205-95 = "ตุ้มน้ำหนักยังอยู่ใต้สระว่ายน้ำ... ส่วนหุ่นจำลองก็แตกอย่างที่คุณครูกังวลด้วยค่ะ"
2601205-96 = "อุตส่าห์ได้โอกาสอวดผลลัพธ์จากการฝึกซ้อมแล้วเชียว แต่มันกลับพังไม่เป็นท่าเลยค่ะ... "
2601205-97 = "[s] \"ไม่หรอก ครูได้เห็นผลลัพธ์จากการซ้อมแล้วนะ\""
2601205-98 = "คะ? หมายความว่ายังไงคะ?"
2601205-99 = "[s] \"ก็คิริโนะช่วยคนตกน้ำไว้ได้จริงๆ นี่นา\""
2601205-103 = "[ns] \"นี่คือหลักฐานที่บอกว่าเติบโตในฐานะไลฟ์การ์ดแล้วนะ\""
2601205-104 = "พะ... พอเห็นว่าคุณครูตกไปในน้ำ ฉันก็รีบโดดลงสระแบบไม่คิดหน้าคิดหลังเลยค่ะ!"
2601205-105 = "แล้วก็พาคุณครูที่หนักมากกว่าตุ้มน้ำหนักขึ้นมาจากสระได้สำเร็จ..."
2601205-109 = "ค่ะ บางทีที่คุณครูพูดอาจจะถูกก็ได้ค่ะ"
2601205-110 = "ฉันคงเติบโตในฐานะไลฟ์การ์ดอีกขั้นโดยที่ตัวเองก็ไม่รู้ตัวน่ะค่ะ"
2601205-111 = "ขอบคุณนะคะคุณครู! ขอบคุณที่ช่วยให้การฝึกซ้อมนี้เสร็จสมบูรณ์นะคะ!"
2601205-116 = "ตั้งแต่นี้ไป! ช่วยเรียกฉันว่าไลฟ์การ์ดคิริโนะด้วยนะคะ!"

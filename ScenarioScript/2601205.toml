[translation]
2601205-1 = "General Rescue Training"
2601205-3 = "Sensei, you're here!"
2601205-4 = "After everything I've worked for, and been through, to get good enough for lifeguard certification..."
2601205-5 = "I'm honored to show you the results of my efforts!"
2601205-6 = "[s1] \"I've been looking forward to it.\"\n[s2] \"I can't wait to see it!\""
2601205-9 = "I hope you're ready for this!"
2601205-10 = "Okay, so here's the old 5-kilogram weight, our drowning victim. Throw it into the water!"
2601205-11 = "As hard as you want!"
2601205-15 = "[ns] \"Hya!\""
2601205-19 = "Someone's fallen into the water! Lifeguard Kirino, on my way!"
2601205-25 = "[ns] \"(Good, now just bring it back and...)\""
2601205-26 = "*glub* *glub* *gasp*"
2601205-27 = "*cough*"
2601205-28 = "[s3] \"(Not great.)\"\n[s4] \"(I've got a bad feeling...)\""
2601205-32 = "Ugh!"
2601205-33 = "I just couldn't move right..."
2601205-35 = "But don't worry, I'll nail the CPR section!"
2601205-36 = "Hiyah!"
2601205-44 = "[ns5] \"H-Hey, I know you're supposed to press hard, but...\"\n[ns6] \"That can't be good for the dummy.\""
2601205-48 = "Chest compressions need to be STRONG, for blood circulation!"
2601205-49 = "Hut! Hut! Hut! Hut!"
2601205-50 = "[s] \"Kirino, let's pause for a second—\""
2601205-55 = "[ns] \"Whoa!\""
2601205-58 = "Sensei!!"
2601205-64 = "― [log=키리노 수영복]Sensei![/log][wa:610] "
2601205-65 = "― [log=키리노 수영복]Are you okay?![/log][wa:790] "
2601205-68 = "― [log=키리노 수영복]Thank goodness you've opened your eyes.[/log][wa:1600] "
2601205-69 = "― [log=키리노 수영복]You scared me for a second. [/log][wa:2830] "
2601205-72 = "― [log=키리노 수영복]Looks like CPR [/log]"
2601205-73 = "― [log=키리노 수영복]won't be necessary.[/log][wa:1560] "
2601205-76 = "[ns7] \"I just missed a step.\"\n[ns8] \"A tiny slip-up.\""
2601205-79 = "― [log=키리노 수영복]When you're near water, you should always stay alert to your surroundings![/log][wa:1400] "
2601205-82 = "― [log=키리노 수영복]Even the most capable swimmer[/log]"
2601205-83 = "― [log=키리노 수영복]can face unexpected situations at any time.[/log][wa:1840] "
2601205-86 = "― [log=키리노 수영복]Of course, with a lifeguard like me on duty, there's no need to worry![/log][wa:2020] "
2601205-89 = "― [log=키리노 수영복]I'll always keep a close eye on things. You'll be safe![/log][wa:1120] "
2601205-93 = "Phew! I'm glad it wasn't anything serious."
2601205-94 = "Although the training didn't go as planned..."
2601205-95 = "The weight's at the bottom of the pool now, and the dummy's...kind of wrecked."
2601205-96 = "This was supposed to be my chance to show off my training results, but I messed it up."
2601205-97 = "[s] \"Don't worry, I saw exactly what you've been training for.\""
2601205-98 = "Huh? What do you mean?"
2601205-99 = "[s] \"You pulled off a perfect rescue.\""
2601205-103 = "[ns] \"It's proof of what you've learned as a lifeguard.\""
2601205-104 = "I-I just saw you fall, and jumped right in. I wasn't even thinking."
2601205-105 = "But I did get you out, and you're way heavier than the weight..."
2601205-109 = "You know, maybe you're right, Sensei."
2601205-110 = "I have gotten better, and I didn't even realize it."
2601205-111 = "Thank you, Sensei! I know I can do it now, thanks to you!"
2601205-116 = "From now on, please call me Lifeguard Kirino!"

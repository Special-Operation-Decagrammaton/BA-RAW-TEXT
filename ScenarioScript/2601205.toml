[translation]
2601205-1 = "綜合救援實習"
2601205-3 = "您來啦，老師！"
2601205-4 = "為了取得救生員的資格，經歷的漫長努力和痛苦……"
2601205-5 = "很榮幸能在老師面前展現成果！"
2601205-6 = "[s1]「嗯，我很期待。」\n[s2]「真想趕快看到！」"
2601205-9 = "請老師好好期待！"
2601205-10 = "那麼，請把這個用來代替溺水者的5kg加重塊丟到水裡吧！"
2601205-11 = "可以用力丟沒關係！"
2601205-15 = "[ns]「嘿！」"
2601205-19 = "有人溺水了！救生員桐乃，立刻出動！"
2601205-25 = "[ns] （迅速地回收了加重塊……！）"
2601205-26 = "噗哈！"
2601205-27 = "咳咳！"
2601205-28 = "[s3] （總覺得……）\n[s4] （還是有點不安……）"
2601205-32 = "噗哈！"
2601205-33 = "身，身體沒辦法自由行動……"
2601205-35 = "開始執行心肺復甦術！"
2601205-36 = "好！"
2601205-44 = "[ns5]「先，先等一下……這樣是不是壓得有點太粗暴了？」\n[ns6]「訓練模型都慘不忍睹了……」"
2601205-48 = "不，心臟按壓要做得確實才能讓血液流通！"
2601205-49 = "哈！哈！哈！哈！"
2601205-50 = "[s]「桐乃，訓練先暫停一下……」"
2601205-55 = "[ns]「啊！？」"
2601205-58 = "老師！！"
2601205-64 = "― [log=키리노 수영복]老師！[/log][wa:770] "
2601205-65 = "― [log=키리노 수영복]您沒事吧！？[/log][wa:1110] "
2601205-68 = "― [log=키리노 수영복]太好了……您醒過來了。[/log][wa:2720] "
2601205-69 = "― [log=키리노 수영복]還以為真的要出大事了。[/log][wa:3510] "
2601205-72 = "― [log=키리노 수영복]心肺復甦術……[/log]"
2601205-73 = "― [log=키리노 수영복]似乎不需要呢。[/log][wa:2040] "
2601205-76 = "[ns7]「只是一時踩空而已。」\n[ns8]「只是稍微有點不小心而已。」"
2601205-79 = "― [log=키리노 수영복]在水邊時，必須隨時注意周圍的狀況！[/log][wa:3680] "
2601205-82 = "― [log=키리노 수영복]因為無論是對游泳多有自信的人……[/log]"
2601205-83 = "― [log=키리노 수영복]還是隨時可能發生意外。[/log][wa:3120] "
2601205-86 = "― [log=키리노 수영복]當然，有像本官一樣的救生員在就不會有問題了！[/log][wa:3940] "
2601205-89 = "― [log=키리노 수영복]本官會隨時守望著您，請儘管放心！[/log][wa:2680] "
2601205-93 = "呼，幸好老師的情況不嚴重。"
2601205-94 = "不過訓練已經變得一團亂了呢……"
2601205-95 = "而且加重塊現在還在池底……訓練模型也壞了。"
2601205-96 = "明明是難得能展現訓練成果的機會，結果卻搞砸了……"
2601205-97 = "[s]「別這麼說，我已經充分看到訓練的成果了。」"
2601205-98 = "咦？怎麼說呢？"
2601205-99 = "[s]「實際上，你不是已經完美地救出溺水的人了嗎？」"
2601205-103 = "[ns]「這是你作為救生員成長的證據哦。」"
2601205-104 = "本，本官只是一看到老師掉下去就一股腦地跳到水裡而已！"
2601205-105 = "不過話說回來，我確實把比加重塊還重的老師從水裡救了出來……"
2601205-109 = "嗯，也許老師您說的對。"
2601205-110 = "看來本官在不知不覺間，已經邁出了身為救生員的一步呢。"
2601205-111 = "謝謝您，老師！多虧有您才能完成訓練！"
2601205-116 = "從現在開始！請稱呼我為救生員桐乃吧！"

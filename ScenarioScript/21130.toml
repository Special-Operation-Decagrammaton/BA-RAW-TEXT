[translation]
21130-1 = "第13話;Nerd VS Maid"
21130-2 = "ミレニアム・オペレーションルーム"
21130-3 = "（ドカアアァァン！）"
21130-4 = "くっ！？"
21130-5 = "や、やられてしまいました……！"
21130-6 = "ふ、復活の呪文……を……"
21130-8 = "（ドサッ）"
21130-10 = "……。"
21130-11 = "信じられない……。"
21130-12 = "どんな方法で来るのかと思ったら、よりにもよって強行突破だなんて。"
21130-13 = "この子がアリスちゃんですね。"
21130-14 = "とっても可愛いですねー、6番目のエージェントメイドとして育てたくなってしまいます。連れて帰ってもいいですか？"
21130-15 = "……それはダメ。"
21130-16 = "今は生徒会を襲撃した犯人の一人なんだから……とりあえず一旦、生徒会の反省部屋にでも閉じ込めておくわ。"
21130-17 = "それにしても……まさかエレベーターの「指紋認識システム」を突破するためとはいえ、無理やり扉を撃ち破るだなんて。"
21130-18 = "確認しました。エレベーターのセキュリティロックをすぐに修理するのは難しそうです。対処としては、丸ごと取り換えるしか……。"
21130-19 = "そう、じゃあ新しいのに交換……ううん、ちょっと待って。"
21130-20 = "多分だけど、あのアリスちゃんの意味分からないくらい巨大な武器……エンジニア部で作られたものに違いないわ。"
21130-21 = "こういう時はいつも、エンジニア部に依頼してたけど……。"
21130-22 = "……そこに、罠がある可能性も捨てきれない。"
21130-23 = "……一番強力そうなセキュリティを購入して、急いで取り換えて。ただし、エンジニア部製じゃないもので。"
21130-25 = "ミレニアム・廊下"
21130-26 = "うぅっ！アリスが連れていかれちゃった！"
21130-27 = "落ち着いてモモイ、計画通りだよ。"
21130-28 = "アリスちゃん……待ってて、すぐに助けてあげるから。"
21130-31 = "とりあえず……一つ目の仕掛けは、上手く行った感じかな。"
21130-32 = "そうだよね、先生？"
21130-33 = "[s1] \"うん、そうだね。\"\n[s2] \"次はエンジニア部の方に、準備が終わったか聞いてみて。\""
21130-34 = "ちょうど連絡が来てたよ、「こちらエンジニア部、トロイの木馬を侵入させることに成功した」……ってね。"
21130-35 = "ちょうど連絡が来てたよ、「こちらエンジニア部、トロイの木馬を侵入させることに成功した」……ってね。"
21130-36 = "ひゅーっ、それは一安心。もし失敗してたら、アリスが意味もなく監禁されただけ……ってことになるところだった。"
21130-37 = "じゃあ、次のステップに移ろうか。"
21130-39 = "……さて、始めよっか。"
21130-40 = "はあ、緊張する……。"
21130-41 = "こんな気持ち、古代史研究会の建物を襲撃した時以来。"
21130-42 = "ヒビキとウタハ先輩は？"
21130-44 = "もう「お客さん」を出迎える準備は出来てるって。"
21130-45 = "良いね、さすが。"
21130-46 = "やってるのは決して良いことじゃないけどね……。"
21130-47 = "マキとコトリの方は？"
21130-48 = "こっちも準備OK、待機中だよ～。"
21130-49 = "お任せください！私の理論上、この作戦が成功する確率は2%です！"
21130-50 = "えぇっ、ほぼ間違いなく失敗じゃん！何で自信満々なの！？"
21130-51 = "えへへ、場を和ませる冗談ですよ！逆です、98％成功するでしょう！"
21130-52 = "コトリちゃんとマキちゃんの準備も終わったなら……"
21130-53 = "第2段階、だね。"
21130-54 = "それでは……先生！"
21130-55 = "[s] \"作戦開始！\""
21130-57 = "はい！"
21130-58 = "行っくぞー！！"
21130-60 = "ミレニアム・オペレーションルーム"
21130-62 = "（ピピピッ、ピピピッ）"
21130-63 = "……来た。"
21130-64 = "監視カメラにて対象を発見しました。1番ゲート、ポイントA1にターゲットを確認。"
21130-65 = "まもなくポイントA2に進入します。"
21130-66 = "そこまで入れば、もう脱出はほぼ不可能と見て良いのですよね？……では、私が行きましょう。"
21130-67 = "あら、だいぶ高く買ってるみたいね。アカネがわざわざ行く必要、ある？"
21130-68 = "もちろんです。"
21130-71 = "お客様のお出迎えは、メイドとしての基本ですから。"
21130-73 = "ミレニアム・ヴェリタス"
21130-74 = "（時は遡り、2時間前。作戦会議中……）"
21130-75 = "じゃあ、私たちのターゲット「鏡」があるとされる、生徒会の差押品保管所について説明するね。"
21130-76 = "ミレニアムの生徒会「セミナー」は、基本的にミレニアムタワーの最上階を専用スペースとして使用してる。"
21130-77 = "「鏡」がある差押品保管所は、その最上階の西側。"
21130-78 = "調べた感じ、入口から差押品保管所へ辿り着くには、約400台の監視カメラと50体近い警備ロボット、それにブラック企業から押収した戦闘ロボット数十体を突破しなきゃいけないみたい。"
21130-79 = "正確には監視カメラが442台、警備ロボットたちが3種に分類されて計52体だね。"
21130-80 = "何でそこまで把握しているのか……という表情だが、単純さ。あそこのセキュリティシステムの構築に協力したのが私たち、エンジニア部だからね。"
21130-83 = "うえぇ……。"
21130-84 = "一番の問題は、保管所まで行くためには必ず「エレベーター」を使わなきゃいけないということ。このエレベーターは、生徒会の役員とか限られた人にしか通過できない、指紋認証システムが付いてる。"
21130-85 = "もし仮にエレベーターを突破できたとしても、セミナー所属の生徒たちや武装した警備員がもちろんいるだろうし、何より……"
21130-86 = "最上階は、各部屋ごとセクションで分けられてる。"
21130-87 = "セクション……部屋が仕切られてるのは当然のことじゃないの？"
21130-88 = "セクションと、セキュリティシステムとが対応してる。だからもし、どこかの部屋で火事が起きたり煙が発生したら、シャッターを下ろして他の部屋と隔離したりすることもできる。"
21130-89 = "もしシャッターが下りたら、これもまた生徒会メンバーの指紋でしか解除ができない。"
21130-90 = "登録されてない指紋や強い衝撃に反応すると、次はもっと強力なチタン製の二番目のシャッターが出てくる。そうなると今度は、生徒会役員の指紋と虹彩、この二つの認証が必要になる。"
21130-91 = "うーーん、ややこしい……それに何だかすごすぎて、実感が湧いてこないっていうか……。"
21130-92 = "整理すると、まず差押品保管所まで移動する方法はエレベーターしかない。"
21130-93 = "それから指紋を利用したセキュリティシステムがあって、それでミスをするとシャッターが下ろされて、他のセクションに移動するのが難しくなる。"
21130-94 = "それを無理に通過しようとしても、さらに強力なシャッターが下ろされて閉じ込められちゃう……。"
21130-95 = "警備ロボと監視カメラも忘れずに～。"
21130-96 = "監視カメラについてはハッキングができそうだが……セキュリティシステムそのものについては、ヴェリタスの力でも正面突破は難しそうだね。何せ、基本的に外部のネットワークから遮断されている。"
21130-97 = "あ、もう一つ新しい情報が入った。エレベーターに無理やり侵入しようとすると、最上階の全部のセクションにシャッターが下ろされるみたい。"
21130-99 = "ああもう、なんか難しいし絶望的な話ばっかりじゃん！何か良い話はないの！？"
21130-100 = "……弱点なら、ある。"
21130-101 = "まず、外部電力を遮断する方式に弱い。電力を絶つと自然に外部のネットワークに繋がるから、一時的にハッキングの隙が生まれる。"
21130-102 = "私たちが作った超小型EMPなら、その隙を狙ってあらゆるシステムを無効化することができる。恐らく、無効化できる時間は……約6秒。"
21130-103 = "6秒、か……"
21130-106 = "十分だね。"
21130-108 = "ミレニアム・廊下"
21130-109 = "（そして時は再び、現在へと戻る）"
21130-110 = "えーっと、この辺で良いんだっけ？"
21130-111 = "すごく奥の方まで来た感じですが……恐らく間違ってはいないかと。"
21130-113 = "ええ、合っていますよ。"
21130-114 = "！？"
21130-115 = "こんばんは、良い夜ですね。お二人のここまでの行動は、監視カメラで全て見せていただきました。"
21130-116 = "薄々お気づきかもしれませんが、あなたたちの計画はもう失敗しています。お早めに投降することをお勧めしますよ。"
21130-117 = "あらためまして、私はC&Cのコールサイン・ゼロスリー……本名は秘密ですので、謎の美女メイドとでもお呼びください。"
21130-118 = "あ、アカネ先輩！"
21130-119 = "特技が「暗殺」で有名な、あのアカネ先輩？"
21130-120 = "うーん……一応秘密のエージェントのはずなのですが、いつの間にそんな知られ方を……正体を明かさない系ヒロインは、もう時代遅れなのでしょうか……？"
21130-121 = "色々知ってるよー。コタマ先輩によると、どうやら最近体重が……"
21130-122 = "ま、待ってください！その情報漏洩は流石に問題がありますよね！？"
21130-123 = "その情報に関しては永久に黙っていていただきます……！さあ、そろそろ姿を見せていただきましょうか、モモイちゃん、ミドリちゃん！"
21130-125 = "……。"
21130-126 = "……。"
21130-127 = "ふふふ……。"
21130-131 = "まだ気づいてない感じかな。失敗してるのは、そっちの計画の方だよ？"
21130-132 = "はい？"
21130-137 = "（スッ）"
21130-138 = "ハ～イ、アカネ先輩！寮に戻ろうとしてたんだけど、道に迷っちゃってさ～。"
21130-140 = "あ、あなたたちは！？"
21130-141 = "あなたたちはと聞かれたら！説明するのが世の情け！"
21130-142 = "どんな質問にも答えをご提供！エンジニア部の説明の化身、[ruby=とよみ]豊見[/ruby]コトリ！"
21130-143 = "芸術と科学のコンビネーション！ヴェリタスのデジタルアーティスト、マキだよ！"
21130-144 = "そんな、ここに来たのはミドリちゃんとモモイちゃんだったはず！？監視カメラで、確かに……！"
21130-146 = "ユウカ！何が起きているんですか！？"
21130-147 = "分からない！こっちの監視カメラでは、今も確かにモモイとミドリが映ってる！それにアカネ、あなたの姿が見えない……！"
21130-148 = "な、なんですって？これは、もしかして……！？"
21130-149 = "カメラの設定を初期化！クラウド接続を遮断して、プライベート回線で画面をもう一度映して！"
21130-150 = "更新します！新しい画面……出ました！アカネを確認！コトリとマキと対峙中です！"
21130-151 = "なるほど、ということは……"
21130-152 = "私たちがさっきまで見ていた映像は、まさか！？"
21130-154 = "ミレニアム・廊下"
21130-155 = "そろそろ、録画映像だってことがバレた頃かな。"
21130-156 = "今さらだけど、平和な状態の映像でも流しておいて、こっそり「鏡」を取りに行った方が良かったんじゃないの？"
21130-157 = "人の出入りが頻繁なところだったし、何も無い方が違和感を覚えるかもしれないでしょ？"
21130-158 = "それに、こうしてC&Cの先輩たちを分裂させて閉じ込めておけた方が、最終的にミッションの成功確率は高くなるはず。"
21130-164 = "あ、エレベーター来た！それじゃ、「本当に」入るとしよっか！"
21130-165 = "ちょっと待って……先生、周囲も暗いですし、私たちの手をしっかり握っていてくださいね。"
21130-166 = "それでは……行きましょう！"
21130-167 = "Go！"
21130-169 = "（ウゥゥゥゥーーーーー）"
21130-171 = "ミレニアム・廊下"
21130-172 = "侵入者を発見。緊急時のため、セミナー専用フロアの各セクションを閉鎖します。"
21130-173 = "これは……シャッターが！？"
21130-174 = "（ガシャン！）"
21130-175 = "はぁ、全くもう……。"
21130-176 = "へへっ、仲良く閉じ込められちゃったね～？"
21130-177 = "……そんなことはありません。あなたたちと違って、私はシステムに指紋登録がされてますから。"
21130-178 = "痛い思いをしたくなかったら、大人しくしていてくださいね。お会いできて光栄でしたが、私はこれで……"
21130-179 = "データ不一致、未登録の指紋です。"
21130-180 = "えっ……！？"
21130-181 = "セカンドシャッター、作動します。"
21130-182 = "そ、そんなっ！？"
21130-184 = "（ゴゴゴ……ガシャン！）"
21130-186 = "ミレニアム・オペレーションルーム"
21130-187 = "アカネ、閉じ込められてしまいました！"
21130-188 = "誰か生徒会の役員を……ノアが近くにいるはず、開けてもらって！"
21130-191 = "一体どういうつもり……？この状態だと、「本物」のモモイとミドリもどこかで閉じ込められて――"
21130-192 = "っ、もしかして……！？"
21130-193 = "ノアから連絡！彼女たちも閉じ込められているそうです！"
21130-194 = "ノアの指紋でもシャッターが開かないとのことで、助けを求めています！"
21130-195 = "な、な、なんですって！？"
21130-196 = "このタイミングで故障！？新しくしたばっかりなのに、それにちゃんと指紋データも移行して……いや、まさか！？"
21130-197 = "ハッキング済み！？ということは初めからこれを狙って、最初にアリスちゃんに扉を壊させた……！？"
21130-199 = "ミレニアム・校舎内部"
21130-200 = "先生、お姉ちゃん、ハレ先輩から連絡！アカネ先輩を閉じ込めるのに成功したって！"
21130-201 = "よし、指紋認証システムも[ruby=・・・]正常に[/ruby]作動したね。"
21130-202 = "生徒会の役員も全員隔離できたはずだし……これで今タワーの中を自由に動けるのは、私たちだけ！"
21130-203 = "本来のエンジニア部製よりほんの少しだけ弱そうに見える、最新型のセキュリティ……上手くいったみたいだね。"
21130-204 = "名前を隠してたし、多分あれもエンジニア部製だとは思わなかっただろうね。その辺の塩梅も、流石はエンジニア部。さ、じゃあ堂々と行くとしよっか。"
21130-205 = "ピピッ――才羽モモイ、才羽ミドリ、先生、3名の承認が完了しました。"
21130-206 = "なんか、デジャヴみたいな感じするね……？"
21130-207 = "あー、廃墟のあれじゃない？懐かしい、なんかもうずいぶん昔のことみたいな感じがする。"
21130-208 = "とりあえずアカネ先輩を封じられたのは良かった。どうせなら、アスナ先輩も一緒に閉じ込めたかったところだけど……まだ、居場所が分かってないんだよね？"
21130-209 = "ハレ先輩が、出来るだけミレニアム全域を調べてくれたけど……見つからなかったみたい。ミレニアムの外にいるんじゃないかな？"
21130-210 = "いっつも神出鬼没の先輩だし、簡単には見つからないよね。なんかミッション中に、急にパフェ食べに行ったりする人みたいだし……ま、今のところ計画通りなんだから、気にしない気にしない！"
21130-211 = "誰！？"
21130-212 = "ひゃっ！って、生徒会じゃん！まだいたなんて！"
21130-213 = "ど、どうしよう先生！？"
21130-214 = "[s3] \"突破しよう。\"\n[s4] \"……逃げよっか？\""
21130-215 = "……うん、突破するしかなさそう。"
21130-216 = "……はい、そうですよね。ここまで来て逃げるわけにはいきません。"
21130-217 = "……ううん、ここで逃げるわけにはいかない！何とかして突破してみせる！"
21130-218 = "私たちが今、引き下がるわけにはいきませんから！"
21130-219 = "アリスちゃんのためにも！"
21130-221 = "……。"
21130-222 = "[s] \"……よし、行こう！\""

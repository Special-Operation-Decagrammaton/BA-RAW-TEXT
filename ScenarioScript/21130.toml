[translation]
21130-1 = "第13話;Nerd VS Maid"
21130-2 = "千年．作戰指揮中心"
21130-3 = "（咚喀──！）"
21130-4 = "唔！？"
21130-5 = "被，被打敗了……！"
21130-6 = "快，快詠唱復活的咒……語……"
21130-8 = "（咚唰）"
21130-10 = "……"
21130-11 = "真不敢相信……"
21130-12 = "我還想說會用什麼方式進入這裡，沒想到竟然會是強行突破。"
21130-13 = "這孩子就是愛麗絲醬吧。"
21130-14 = "真是可愛呢～害我都想把她培養成第六個女僕特務了。我能帶她回去嗎？"
21130-15 = "……那可不行。"
21130-16 = "因為現在他可是襲擊學生會的犯人之一……總之先把他關到學生會的反省室裡吧。"
21130-17 = "話說回來……雖然是為了要突破電梯的「指紋辨識系統」，居然直接連門一起擊破。"
21130-18 = "已經確認過了。要馬上修復電梯的保全系統似乎有點困難。#n要處理的話只能整個換新才行……"
21130-19 = "這樣啊，那就換上新的……不，稍等一下。"
21130-20 = "雖然只是推測，愛麗絲醬拿著的那把意義不明的巨大武器……#n應該是工程師部製造的東西沒錯。"
21130-21 = "遇到這種需要維修的狀況，一般來說都是委託工程師部的……"
21130-22 = "……這說不定是陷阱。"
21130-23 = "……去購買最強的保全系統，趕快更換上去。但是，可不能是工程師部製作的。"
21130-25 = "千年．走廊"
21130-26 = "唔！愛麗絲被帶走了！"
21130-27 = "冷靜點桃井，一切都照計畫進行唷。"
21130-28 = "愛麗絲醬……等著我們，馬上就會去救你的。"
21130-31 = "總之……第一階段進行的很順利呢。"
21130-32 = "對吧，老師？"
21130-33 = "[s1] 「嗯，是呢。」\n[s2] 「接下來就來問問工程師部那邊準備好了沒吧。」"
21130-34 = "正好收到他們的聯絡囉。#n「這裡是工程師部，特洛伊木馬已成功侵入」……這樣。"
21130-35 = "正好收到他們的聯絡囉。#n「這裡是工程師部，特洛伊木馬已成功侵入」……這樣。"
21130-36 = "呼～這樣暫時就能安心了。如果失敗的話，就會害得……愛麗絲白白被監禁了……"
21130-37 = "那麼，就進入下個階段吧。"
21130-39 = "……那麼，我們開始吧。"
21130-40 = "哈啊，好緊張……"
21130-41 = "這種感覺，還是襲擊歷史研究會之後第一次。"
21130-42 = "響和詠葉前輩呢？"
21130-44 = "他們已經準備好迎接「客人」了。"
21130-45 = "很好，真不愧是他們。"
21130-46 = "雖然要做的絕對不是什麼好事就是了……"
21130-47 = "真紀和亞都梨那邊呢？"
21130-48 = "我們這邊也準備完畢，正在待機中唷～"
21130-49 = "交給我吧！在我的理論中，這個作戰的成功率可是有2%呢！"
21130-50 = "咦，那不就是幾乎肯定會失敗嘛！為什麼還是自信滿滿的啊！？"
21130-51 = "耶嘿嘿，是要緩和氣氛的笑話啦！實際上正好相反，是98%會成功喔！"
21130-52 = "亞都梨醬跟真紀醬也準備好了的話……"
21130-53 = "就進入第二階段，對吧。"
21130-54 = "那麼……老師！"
21130-55 = "[s] 「作戰開始！」"
21130-57 = "是！"
21130-58 = "要上囉！！"
21130-60 = "千年．作戰指揮中心"
21130-62 = "（嗶嗶嗶，嗶嗶嗶）"
21130-63 = "……來了。"
21130-64 = "監視器已發現對象。1號門，A1地點確認到目標。"
21130-65 = "馬上就要進入A2地點了。"
21130-66 = "進到那裡的話，要逃出去就幾乎不可能了對吧？#n……那麼，我就出發吧。"
21130-67 = "哎呀，你還真是看重他們呢。有需要朱音你親自出馬嗎？"
21130-68 = "那是當然的。"
21130-71 = "迎接到來的客人，對女僕來說這可是很基本的呢。"
21130-73 = "千年．貝里塔斯"
21130-74 = "（2小時前，作戰會議中……）"
21130-75 = "那麼，關於我們的目標「鏡子」所在的學生會扣押品保管所，就由我來說明一下吧。"
21130-76 = "千年的學生會「研討會」基本上是使用著千年塔頂樓的專用空間。"
21130-77 = "而「鏡子」所在的扣押品保管所就在頂樓的西側。"
21130-78 = "根據調查，要從入口抵達扣押品管理所，需要突破接近400台的監視器、#n50台警備機器人，還有數十台從黑心企業那裡沒收的戰鬥機器人才行。"
21130-79 = "正確來說是442台監視器和三種警備機器人共52台。"
21130-80 = "一臉為什麼知道得這麼清楚的表情呢……#n理由很簡單，因為協助建立那裡的保全系統的，就是我們工程師部。"
21130-83 = "咦……"
21130-84 = "最大的問題是，要進入保管所就一定得要搭「電梯」才行。#n但是那台電梯有著只有學生會成員才能通過的指紋辨識系統。"
21130-85 = "就算假設我們成功突破了電梯，還有研討會的學生們和全副武裝的警備員，#n更重要的是……"
21130-86 = "最頂層的每個房間都是被分為不同區域的。"
21130-87 = "區域……房間有隔間不是理所當然的嗎？"
21130-88 = "我所說的區域，是和保全系統對應的。#n所以，要是某個房間發生了火災，就能放下閘門與其他的房間隔離。"
21130-89 = "如果閘門被放下來的話，這也只能由學生會成員的指紋來解除。"
21130-90 = "如果感應到沒有登錄過的指紋或是強力的衝擊，接著就會放下更堅固的鈦合金閘門。這樣一來如果要解除，就需要學生會成員的指紋和虹膜兩種認證都通過才行。"
21130-91 = "唔──真麻煩……總覺得已經厲害過頭，反而感覺不太真實了……"
21130-92 = "整理一下的話，首先，要到達扣押品保管所的方法只有電梯一個。"
21130-93 = "並且有指紋作為媒介的保全系統，#n只要失敗的話就會有閘門落下，要到其他的區域去就很困難了。"
21130-94 = "就算想要強行突破閘門，也會被更堅固的閘門關住而動彈不得……"
21130-95 = "也別忘了警備機器人和監視器喔～"
21130-96 = "監視器的話雖然說可以駭進去……但是要駭進保全系統的話，#n就算是貝里塔斯也很難正面突破。畢竟保全系統基本上是和外部網路隔絕的。"
21130-97 = "啊，又有一個新的情報。#n如果要硬闖電梯的話，頂樓所有區域的閘門都會放下來的樣子。"
21130-99 = "啊啊真是的，總覺得都是又難又絕望的話！就沒有什麼好消息嗎！？"
21130-100 = "……弱點的話，還是有的。"
21130-101 = "首先，這個系統不擅長應對被從外部切斷電力的狀況。#n只要電力被切斷就會自動接上外部的網路，也就能有駭進去的機會。"
21130-102 = "用我們製作的這個超小型EMP的話，就能趁機癱瘓所有的系統。#n至於能夠癱瘓系統的時間是……大約6秒。"
21130-103 = "6秒嗎……"
21130-106 = "已經夠了呢。"
21130-108 = "千年．走廊"
21130-109 = "（時間回到現在）"
21130-110 = "那個，在這附近就可以了對吧？"
21130-111 = "感覺到了很深的地方了……應該就是這裡沒錯了。"
21130-113 = "沒錯，就是這裡唷。"
21130-114 = "！？"
21130-115 = "你們好，真是美好的夜晚呢。兩位目前為止的所有行動，我都透過監視器看著呢。"
21130-116 = "雖然你們或許也注意到了，但你們的計畫已經失敗了喔。勸你們還是盡早投降吧。"
21130-117 = "重新自我介紹，我是C&C的代號03……本名是祕密，請稱呼我神祕的美女女僕。"
21130-118 = "啊，是朱音前輩！"
21130-119 = "你說那個以「暗殺」特技聞名的，那個朱音前輩嗎？"
21130-120 = "唔嗯……我姑且算是個祕密的特務才對呀，什麼時候變成那樣了……#n難道身分不明屬性的女主角已經過時了嗎……？"
21130-121 = "我還知道很多唷──#n小玉前輩還跟我說，朱音前輩最近的體重似乎……"
21130-122 = "等，等一下！這個情報洩漏明顯有問題吧！？"
21130-123 = "關於那個情報請永遠保持沉默……！#n來吧，你們也差不多該現出真身讓我看看了，桃井醬、綠醬！"
21130-125 = "……"
21130-126 = "……"
21130-127 = "呵呵呵……"
21130-131 = "到現在還沒發現嗎？失敗的，可是你們的計畫唷？"
21130-132 = "什麼？"
21130-137 = "（咻）"
21130-138 = "嗨～朱音前輩！我本來是想回宿舍去的，不小心迷路了啦～"
21130-140 = "你，你們是！？"
21130-141 = "既然你誠心誠意地發問了！我就大發慈悲地說明給你聽吧！"
21130-142 = "不管是什麼問題都會提供解答！我是工程師部的說明化身，豊見亞都梨！"
21130-143 = "藝術和科學的結合！我是貝里塔斯的數位藝術家，真紀唷！"
21130-144 = "怎麼可能，往這裡來的應該是綠醬和桃井醬才對！？我明明就從監視器裡……！"
21130-146 = "優香！發生什麼了嗎！？"
21130-147 = "不清楚！在這裡的監視器上，現在也能看到桃井和綠！#n而且朱音，我並沒有看到你……！"
21130-148 = "你，你說什麼？這是，難道說……！？"
21130-149 = "重置所有監視器的設定！切斷與雲端的連接，用內部線路重新撥放畫面！"
21130-150 = "正在更新！新的畫面……出來了！已經確認到朱音！正在和亞都梨及真紀對峙中！"
21130-151 = "原來如此，也就是說……"
21130-152 = "我們剛才看到的影像，難道是！？"
21130-154 = "千年．走廊"
21130-155 = "那些是影片的事也差不多要露餡了吧。"
21130-156 = "現在說可能有點太遲了，#n但是播放平常安全的影像給他們看，我們偷偷去拿走「鏡子」不就好了嗎？"
21130-157 = "畢竟是個進出頻繁的地方，如果誰都沒拍到的話反而會讓他們產生違和感吧？"
21130-158 = "而且，像這樣把C&C的前輩們分散隔離開來，也能提高任務的成功機率的。"
21130-164 = "啊，電梯來了！那麼我們就「真的」進去吧！"
21130-165 = "等一下……老師，周圍太暗了，請握好我們的手唷。"
21130-166 = "那麼……我們走吧！"
21130-167 = "Go！"
21130-169 = "（嗚嗚嗚嗚嗚──）"
21130-171 = "千年．走廊"
21130-172 = "發現侵入者。為了應對緊急狀況，將關閉研討會專用樓層的所有區域。"
21130-173 = "這是……閘門要！？"
21130-174 = "（喀咚！）"
21130-175 = "唉，真是的……"
21130-176 = "嘿嘿，一起開心地被關起來了呢～？"
21130-177 = "……並沒有這種事。我和你們不同，我的指紋可是有登錄在系統裡面的喔。"
21130-178 = "如果不想讓留下痛苦的回憶的話，就請乖乖地待在這裡吧。#n能遇見你們是我的榮幸，但我就先告辭了……"
21130-179 = "數據不符，指紋未登錄。"
21130-180 = "咦……！？"
21130-181 = "第二閘門，啟動。"
21130-182 = "怎，怎麼會！？"
21130-184 = "（咚咚咚……喀咚！）"
21130-186 = "千年．作戰指揮中心"
21130-187 = "朱音被閘門給關起來了！"
21130-188 = "有沒有哪個學生會成員在……乃愛應該就在附近，快幫他開門！"
21130-191 = "到底是怎麼回事……？#n現在這個狀況，「真正」的桃井和綠應該也被關在某個地方──"
21130-192 = "難，難道是……！？"
21130-193 = "接到乃愛的聯絡！他們似乎也被閘門關起來了的樣子！"
21130-194 = "就連乃愛的指紋也打不開閘門，正在請求協助！"
21130-195 = "你，你，你說什麼！？"
21130-196 = "居然在這種時候故障！？明明才換成新的而已，而且指紋的數據也有好好的轉移……不對，莫非！？"
21130-197 = "已經被駭入了！？#n也就是說打從一開始他們就是為了這個，所以才先讓愛麗絲醬破壞大門的……！？"
21130-199 = "千年．校舍內部"
21130-200 = "老師，姐姐，晴前輩傳來消息！說是已經成功關住朱音前輩了！"
21130-201 = "很好，指紋辨識系統也「正常」運作中呢。"
21130-202 = "所有學生會的成員應該也被成功隔離了才對……#n這麼一來現在能夠在塔裡自由活動的，就只有我們了！"
21130-203 = "和本來工程師部製作的比起來稍微弱了一點的，最新型的保全系統……#n好像成功了呢。"
21130-204 = "畢竟連製作者的名字都隱藏起來了，他們應該也想不到這也是工程師部做的吧。#n就連這種事都想的這麼周到，不愧是工程師部。那我們就光明正大地進去吧。"
21130-205 = "嗶嗶──才羽桃井、才羽綠、老師，3人已確認完畢。"
21130-206 = "總覺得，好像有點既視感呢……？"
21130-207 = "啊，你是說廢墟裡的那個嗎？真懷念呢，總覺得那已經是很久以前的事了。"
21130-208 = "總之能夠封住朱音前輩真是太好了。#n雖然可以的話，要是能把明日奈前輩也一起關住就好了……還不知道他的位置對吧？"
21130-209 = "晴前輩已經盡可能的搜尋千年的每個區域了……似乎還是找不到的樣子。#n也許在千年的外面也說不定？"
21130-210 = "畢竟前輩總是神出鬼沒的，要找到她也沒這麼容易吧。#n總覺得她是個會在任務的途中突然跑去吃百匯冰淇淋的人……#n反正現在計劃很順利，別在意別在意！"
21130-211 = "是誰！？"
21130-212 = "呀啊！是，是學生會！竟然還有啊！"
21130-213 = "怎，怎麼辦呀老師！？"
21130-214 = "[s3] 「突破吧。」\n[s4] 「……要逃走嗎？」"
21130-215 = "……嗯，也只好突破了呢。"
21130-216 = "……嗯，也對。都來到這裡了怎麼能在這裡臨陣脫逃呢。"
21130-217 = "……不，不能在這裡臨陣脫逃！我會想辦法突破的！"
21130-218 = "我們已經不能在這裡放棄了！"
21130-219 = "就算是為了愛麗絲醬也好！"
21130-221 = "……"
21130-222 = "[s] 「……好，上吧！」"

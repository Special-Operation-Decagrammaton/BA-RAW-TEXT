[translation]
21130-1 = "Episode 13;Nerds vs. Maids"
21130-2 = "Millennium Main Control Room"
21130-3 = "*booooom*"
21130-4 = "Gah!"
21130-5 = "I-I am down!"
21130-6 = "Resurrection spell...please..."
21130-8 = "*flop*"
21130-10 = "..."
21130-11 = "Ridiculous."
21130-12 = "Their plan for taking on the Student Council was...a bum-rush?"
21130-13 = "So this must be Aris."
21130-14 = "She's. So. Cute. Can I keep her? I just want to scoop her up and train her to become our sixth maid agent."
21130-15 = "You may not."
21130-16 = "She'll be held in the counseling room for assaulting the Student Council."
21130-17 = "What a mess. I can't believe she tried to get past the elevator's fingerprint recognition system by blasting down the door."
21130-18 = "The elevator's lock is beyond repair. It needs to be replaced immediately."
21130-19 = "Hmm... Then let's order a replacement right—wait a second."
21130-20 = "That weapon Aris had must have come from the Engineering Department..."
21130-21 = "If that's the case, then it wouldn't be wise to go to them like we usually would."
21130-22 = "Something about this smells suspicious..."
21130-23 = "Find the strongest security system in Kivotos not designed by the Engineering Department and get that ASAP."
21130-25 = "Millennium Outer Hallway"
21130-26 = "C-Crap! They're taking Aris away!"
21130-27 = "Calm down, Momoi. This is all part of the plan."
21130-28 = "Stay strong, Aris... We'll save you soon."
21130-31 = "Well... So far so good."
21130-32 = "Right, Sensei?"
21130-33 = "[s1] \"That's right.\"\n[s2] \"Are you all ready?\""
21130-34 = "The Engineering Department's message says, \"Good work. The trojan horse is past the gates.\""
21130-35 = "The Engineering Department's message says, \"Good work. The trojan horse is past the gates.\""
21130-36 = "Phew! That's a relief. If this hadn't worked out, Aris would have gotten locked up for nothing."
21130-37 = "It's time for the next phase."
21130-39 = "Sh-Should we get started?"
21130-40 = "*sigh* I'm so nervous."
21130-41 = "I haven't felt like this since we invaded the Ancient History Research Society building."
21130-42 = "What's the status of Hibiki and Utaha?"
21130-44 = "We're all set to meet our guests."
21130-45 = "Good."
21130-46 = "Is it really, though?"
21130-47 = "What about Maki and Kotori?"
21130-48 = "Standing by!"
21130-49 = "Don't worry, we can do this for sure! My calculations say we've got a whole two percent chance of pulling this off!"
21130-50 = "B-But that means there's a 98 percent chance of failure!"
21130-51 = "Heehee, I'm totally kidding! It's actually the other way around!"
21130-52 = "Well, if Kotori and Maki are ready..."
21130-53 = "...then phase two is a go."
21130-54 = "Sound us off, Sensei!"
21130-55 = "[s] \"Let's do this!\""
21130-57 = "Right!"
21130-58 = "Here we go!"
21130-60 = "Millennium Main Control Room"
21130-62 = "*be-beep be-beep*"
21130-63 = "They're here."
21130-64 = "Camera visual on target confirmed. Target is emerging at point A1 of entrance No. 1."
21130-65 = "Target is approaching point A2."
21130-66 = "Which means they have no means of escape, correct? All right, then. I'm on it."
21130-67 = "Huh? Is this really something you need to handle yourself?"
21130-68 = "But of course."
21130-71 = "After all, welcoming guests with a smile is a maid's most basic duty."
21130-73 = "Millennium - Veritas"
21130-74 = "Two hours ago..."
21130-75 = "First, let me detail our target, the Student Council's contraband storage. The current location of the Mirror."
21130-76 = "Seminar, Millennium's Student Council, are a naturally suspicious bunch, and the topmost floor of the Millennium Tower is dedicated to their exclusive use."
21130-77 = "The contraband storage is on the west side of that topmost floor."
21130-78 = "Between our location and the storage room are about 400 cameras and a little more than 50 security robots. Some of said robots were confiscated from shady organizations."
21130-79 = "442 surveillance cameras and 52 robots of three kinds to be precise."
21130-80 = "It was the Engineering Department that helped implement their security system, you see."
21130-83 = "Whoa..."
21130-84 = "The biggest issue is that you have to take an elevator to get to the contraband storage. And this elevator can only be accessed by personnel with fingerprint authorization."
21130-85 = "Even if you were to bypass the elevator, you're bound to run into members of the Student Council and armed security guards. And most importantly..."
21130-86 = "...these areas exclusive to Student Council members are all sectionable."
21130-87 = "What does that mean?"
21130-88 = "Let's say that smoke is detected in one of the rooms. That triggers a shutter that sections off the room from the rest."
21130-89 = "Once a shutter drops, it can only be disabled by a Student Council member's fingerprint."
21130-90 = "What happens if an unauthorized fingerprint is input? A titanium-enforced shutter also drops. Disabling both then requires a valid simultaneous Student Council fingerprint and retina scan."
21130-91 = "Ugh. I'm having a hard time wrapping my head around all this."
21130-92 = "Let me get this straight: The only way to move between floors is by elevator."
21130-93 = "The area upstairs is equipped with fingerprint-based security devices, which, when triggered, activate heavy shutters that section off the area."
21130-94 = "Furthermore, failing to get through the security triggers an even more powerful shutter."
21130-95 = "Don't forget about the armed guards and security cameras!"
21130-96 = "Surveillance cameras can be hacked. However, these security shutters are impossible to tamper with, even for Veritas. Their only connection is to an isolated, internal network."
21130-97 = "We've also just learned that trying to brute force the elevator will seal off the entire floor."
21130-99 = "Arrrgh! This is nothing but terrible news! Where's the good news?!"
21130-100 = "Well, there is a weakness. We should know—we put it there."
21130-101 = "For starters, the system is vulnerable to external power failures. When power is lost, it automatically connects to an external network, opening a short window for the system to be hacked."
21130-102 = "Using our nano-EMP, we can send Millennium back to the Stone Age for about six seconds."
21130-103 = "Six seconds..."
21130-106 = "It's enough time. "
21130-108 = "Millennium Outer Hallway"
21130-109 = "Back in the present..."
21130-110 = "Um. It should be around here."
21130-111 = "This isn't right. Doesn't it seem like we're in too deep?"
21130-113 = "Not at all. You're exactly where you're supposed to be."
21130-114 = "Huh?!"
21130-115 = "Welcome. I've been waiting for you."
21130-116 = "As you've no doubt already realized, your plan has failed."
21130-117 = "I'm C&C's call sign Zero-Three. My real name is confidential, so you can just call me the Beautiful Maid of Mystery."
21130-118 = "*gasp* It's Akane!"
21130-119 = "Isn't she the maid agent who specializes in assassination?"
21130-120 = "Phooey. What's the point of maintaining a secret agency if everyone knows about it? Does this mean I should stop playing the mysterious heroine?"
21130-121 = "Oh, right, didn't Kotama say that the last time you weighed yourself, you were—"
21130-122 = "S-S-Stop right there! The fact that you even know something like that is a huge problem!"
21130-123 = "You'd better keep that info to yourself, Momoi. You too, Midori!"
21130-125 = "..."
21130-126 = "..."
21130-127 = "Heeheehee."
21130-131 = "You don't realize it yet, but you're the ones who have failed."
21130-132 = "I beg your pardon?"
21130-137 = "*step step*"
21130-138 = "Hiya, Akane! We got lost on our way to the dorms. Can ya believe it?"
21130-140 = "Wh-Who are you?!"
21130-141 = "You really wanna know?! Then allow us to introduce ourselves!"
21130-142 = "Ask and ye shall receive! The walking encyclopedia of the Engineering Department, Toyomi Kotori!"
21130-143 = "Why do art and science have to be at odds? Meet Veritas' resident digital artist, Maki!"
21130-144 = "But you're not with the Game Development Department... What is...?!"
21130-146 = "Yuuka! What is the meaning of this?"
21130-147 = "I don't know! The surveillance cameras definitely show Momoi and Midori approaching point A2! But I can't see you anywhere!"
21130-148 = "Wh-What? Then...can it be?!"
21130-149 = "Reset camera settings! Block cloud access and play only the closed circuit feed!"
21130-150 = "Refreshing feed! Visual confirmed! It's Akane! She's locked in a confrontation with Kotori and Maki!"
21130-151 = "That means..."
21130-152 = "...the feed we've been watching until now was...?!"
21130-154 = "Millennium Passageway"
21130-155 = "I wonder if they've figured out that the security footage is pre-recorded."
21130-156 = "Do you think it would have been better for us to just play pre-recorded footage of an empty hallway while we grab the Mirror?"
21130-157 = "People are coming and going through there all the time. They wouldn't take the bait unless we did it just right."
21130-158 = "Splitting up the maids and trapping them in place is our best chance."
21130-164 = "Oh, it's the elevator. Let's go up for real this time."
21130-165 = "Wait a second... Sensei, it's pretty dark, so grab ahold of our hands."
21130-166 = "Okay, then... Ready!"
21130-167 = "Here we go!"
21130-169 = "*woooooeee*"
21130-171 = "Millennium Outer Hallway"
21130-172 = "Intruder detected. Commencing emergency shutdown for designated Seminar floor sector."
21130-173 = "Hey, now! The shutters are dropping. Wait, you don't think...?!"
21130-174 = "*thunk*"
21130-175 = "Oh, dear..."
21130-176 = "Looks like we got locked in together!"
21130-177 = "No matter. Unlike you all, I can easily escape from here."
21130-178 = "All I have to do is put my finger here, and I'll be free while you are trapped here... *beep*"
21130-179 = "Invalid fingerprint."
21130-180 = "...Huh?!"
21130-181 = "Secondary shutters activated."
21130-182 = "No, wait!"
21130-184 = "*rummmble thunk*"
21130-186 = "Millennium Main Control Room"
21130-187 = "Akane's been trapped!"
21130-188 = "Send a Student Council member! Noa is nearby! She can open the door."
21130-191 = "What are they thinking? The real Momoi and Midori should also be trapped somewhere."
21130-192 = "Wait a second. It can't be...!"
21130-193 = "We've just received word from Noa! She's also trapped, and the door won't open!"
21130-194 = "The second shutter also dropped on her. Noa needs help!"
21130-195 = "Wh-What the...?!"
21130-196 = "But how?! This is brand new equipment, just installed today—oh, no!"
21130-197 = "This is why Aris broke those doors? This was their plan all along?!"
21130-199 = "Millennium Main Corridor"
21130-200 = "Sensei! Momoi! We've received a communication from Hare! The plan to trap Akane worked!"
21130-201 = "The fingerprint recognition device is working just as it should be."
21130-202 = "All of the Student Council members have been isolated! Now, we're the only ones who can move freely through the Student Council floor!"
21130-203 = "Thank goodness the Engineering Department was able to trick that manufacturer into being the go-between seller for their new security system."
21130-204 = "It's so well-made that the council had no idea it was actually designed by the Engineering Department. Anyway, let's get going."
21130-205 = "*beep* Saiba Momoi, Saiba Midori, and Sensei. Access granted."
21130-206 = "Hmm? Didn't something like this happen not that long ago...?"
21130-207 = "Right. Wasn't it at the ruins? How nostalgic. It already feels like a lifetime ago."
21130-208 = "Anyway, it's good that we were able to lock up Akane, but, I wish we could have gotten Asuna too. We still don't know where she is, do we?"
21130-209 = "Hare looked all over Millennium but couldn't find her. Maybe she's outside the academy?"
21130-210 = "Probably. I heard she ditched a mission once to get a parfait. She still got back on time and finished the mission, but still... Anyway, everything's going according to plan!"
21130-211 = "Who goes there?!"
21130-212 = "Eek! Student Council members?! There are still some left?!"
21130-213 = "S-Sensei?!"
21130-214 = "[s3] \"Let's push through.\"\n[s4] \"Let's run away.\""
21130-215 = "I guess we have no choice."
21130-216 = "Sensei... You're actually serious?"
21130-217 = "Nuh-uh! There's no way I'm gonna run! We gotta push through somehow!"
21130-218 = "That's right! We can't back down!"
21130-219 = "Let's do this for Aris!"
21130-221 = "..."
21130-222 = "[s] \"Let's go!\""

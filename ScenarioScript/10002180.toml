[translation]
10002180-1 = "ย้อนวันวาน;Pride of sniper"
10002180-2 = "(ทุกคนกำลังนั่งกินแตงโมอย่างเพลิดเพลินอยู่)"
10002180-3 = "แตงโมนี่อร่อยจังเลยนะคะ!"
10002180-4 = "ค่ะ น่าเสียดายที่มีทรายติดอยู่นิดหน่อย แต่ก็อร่อยดีค่ะ"
10002180-5 = "รู้สึกเหมือน... กรรมตามสนองนิดหน่อยก็เถอะคะ..."
10002180-6 = "แล้วอาซึสะจังล่ะคะ?"
10002180-7 = "มันเหมาะสำหรับเติมความชุ่มชื้นให้ร่างกายดีนะ แต่ว่าวิธีนี้ก็มีข้อเสียอยู่ที่อาจทำให้ร่างกายได้รับน้ำ#nในปริมาณมากจนเกินไป..."
10002180-8 = "แถมยังต้องมานั่งคิดเรื่องการระบายน้ำออกจากร่างกายอีก... ต้องหาทางรับมือปัญหานี้ด้วย..."
10002180-9 = "อะ... อ๋าาา!"
10002180-10 = "หะ...ห้ามพูดถึงเรื่องนั้นนะคะ! ทะ...ที่นี่มีคนอื่นอยู่ด้วยนะคะ แถม...คุณครูก็ยังอยู่ด้วยนะคะ~!"
10002180-15 = "ตะตะตะตะ...แตงโม นะนะนะ...นั่งอยู่ข้างๆ คุณครู... ตะตะตะแตงโม... แตงโมๆ... ง่ำง่ำ "
10002180-16 = "ฮะ... ฮี่ๆๆ..."
10002180-17 = "ง่ำๆๆ! ฮ่า... อร่อยจัง!"
10002180-18 = "แตงโมนี่อร่อยเหาะไปเลย! โรยเกลือลงไปนิดหน่อยก็อร่อยดี แถมถ้าใส่น้ำตาลลงไปนิดหน่อยก็#nอร่อยดีด้วยเหมือนกัน!"
10002180-19 = "อืม... แล้วถ้าใส่วาซาบิจะเป็นยังไงนะ?!"
10002180-21 = "...คะ!! วาซาบิเหรอคะ?!"
10002180-22 = "(ฮืออออ... แต่อย่างน้อยก็โชคดีที่ทุกคนกินแตงโมกันอย่างเอร็ดอร่อย หวังว่าเรื่องวุ่นวายคงจะ#nจบลงแค่นี้แล้วนะ...)"
10002180-24 = "ถ้างั้นหลังจากกินแตงโมเสร็จแล้ว ต่อไปเราจะทำอะไรต่อดีคะ?"
10002180-25 = "เรายังมีภารกิจตามรายการที่คุณฮาสุมิให้มาอยู่..."
10002180-26 = "อ๊ะ นึกขึ้นมาได้พอดี ฉันมีเรื่องที่สงสัยอยู่นะ"
10002180-27 = "เรื่องอะไรเหรอคะ คุณอิซุมิ?"
10002180-28 = "เมื่อกี้นี้ที่แข่งยิงแตงโมกัน ใครเป็นคนชนะเหรอ?"
10002180-29 = "คะ...?"
10002180-30 = "คะ...คุณอิซุมิเป็นคนเข้ามาขวางกลางคันแท้ๆ จะพูดขึ้นมาอีกทำไมกันคะ! "
10002180-36 = "ใช่แล้ว...  เรายังไม่ได้ตัดสินกันเลย"
10002180-37 = "คุณทำให้เรานึกขึ้นมาได้พอดีเลยค่ะ ถ้าการตัดสินจบไปแบบคลุมเครือแบบนี้ล่ะก็#nชมรมทวงความยุติธรรมคงเสียชื่อแน่ค่ะ!"
10002180-38 = "ฉันก็คิดเหมือนกัน ถ้าเดินออกจากสนามรบโดยไม่ตัดสินแพ้ชนะให้ชัดเจน จะเป็นการกระทำที่ทำ#nให้ชื่อเสียงของชมรมชั้นเรียนเสริมของเรามัวหมอง..."
10002180-40 = "อาซึสะจัง?! ฉันคิดว่าชมรมชั้นเรียนเสริมไม่ได้เน้นเรื่องการต่อสู้ขนาดนั้นหรอกนะคะ?!"
10002180-41 = "อืม... เราไม่มีแตงโมเหลือพอสำหรับใช้ในรอบตัดสินแล้ว..."
10002180-42 = "เพราะงั้นการตัดสินแพ้ชนะครั้งนี้เราใช้อย่างอื่นแทนแตงโมกันเถอะค่ะ"
10002180-43 = "ตัวอย่างเช่น... ผลไม้บนต้นไม้?!"
10002180-44 = "หรือจะใช้ก้อนหินเล็กๆ ที่อยู่ริมโขดหินชายหาดดีล่ะ?"
10002180-45 = "หรือจะแข่งยิงทุ่นที่ลอยกลางน้ำก็ได้นะคะ ฉันไม่มีปัญหาค่ะ!"
10002180-46 = "ดะ...เดี๋ยวก่อนสิคะ!"
10002180-47 = "ทั้งสองคนใจเย็นๆ ก่อน... ถึงจะตัดสินแพ้ชนะกันที่นี่ก็คงไม่มีประโยชน์...#nและแถมไม่เกี่ยวกับภารกิจที่คุณฮาสุมิมอบหมายให้เราด้วยนะคะ!"
10002180-48 = "[s] \"ฮิฟุมิ... นี่ก็เป็นกีฬาที่ดีอย่างหนึ่งนะ คงไม่เป็นไรหรอก\""
10002180-50 = "คะ... คุณครู?! คุณครูไปเห็นดีเห็นงามด้วยได้ยังไงล่ะคะ!"
10002180-51 = "อ่า... จริงสิ เราใช้โมเดลขนาด 1/7 ที่คุณครูซื้อมาจากร้านขายของที่ระลึกได้นี่?"
10002180-52 = "เหมาะจะเอามาใช้เป็นเป้ายิงพอดี คุณครู ขอยืมหน่อยนะ"
10002180-53 = "[s] \"มะ...ไม่ได้นะ! การต่อสู้ที่ไม่ได้ประโยชน์อะไรแบบนี้น่ะ หยุดเถอะ!\""
10002180-58 = "(ปัง!! ปัง! ตู้มมมมมม!!) "
10002180-62 = "สุดท้ายก็เป็นแบบนี้อีกแล้วววว! แงงงงงง!!"
10002180-68 = "ง่ำ ง่ำ..."
10002180-69 = "อื้มมม!"
10002180-70 = "อื้อ อื้อ! คิดแล้วว่าแตงโมราดวาซาบินี่อร่อยจริงๆ!!"

10002180-36 = "3;아즈사 수영복ND;01;하긴……. 결판이 나진 않았었지."
10002180-37 = "1;마시로 수영복ND;05;과연, 그냥 넘어갈 뻔한 걸 딱 지적해주셨군요. 이대로 어영부영 끝내기엔, 정의실현부로서 이름이 울 겁니다!\n#1;em;[반짝]\n#1;ar\n#3;m5"
10002180-38 = "3;아즈사 수영복ND;06;마찬가지야. 명확한 결론 없이 전장에서 물러나는 건, 우리 보충수업부의 이름에 먹칠을 하는 행동이겠지.\n#3;em;[반응]"
10002180-39 = "#all;hide"
10002180-40 = "3;히후미 수영복ND;09;아즈사 쨩?! 보충수업부의 이름에 그 정도의 무게는 없다고 생각하는데요?!\n#3;em;[?!]\n#3;shake"
10002180-41 = "5;아즈사 수영복ND;99;흐음. 승부를 다시 내고 싶어도 수박은 이미 쓸 수 없게 되었고…….\n#5;em;…\n#3;m1\n#5;al"
10002180-42 = "1;마시로 수영복ND;05;그럼 지금부터 승부는, 수박이 아닌 다른 것으로 내도록 하죠!\n#1;em;[반응]\n#1;ar\n#3;m3"
10002180-43 = "1;마시로 수영복ND;05;예를 들어, 저 야자수의 열매는 어떤가요?!"
10002180-44 = "5;아즈사 수영복ND;06;아니면 저기 멀리 해변 바위에 놓여 있는 조약돌이라면?\n#5;em;[?]"
10002180-45 = "1;마시로 수영복ND;05;바다에 떠다니는 부표를 맞추는 것도 자신 있습니다!\n#1;greeting\n#1;em;[반짝]"
10002180-46 = "3;히후미 수영복ND;10;자, 잠깐만요!\n#3;hophop\n#1;dl\n#5;dr"
10002180-47 = "3;히후미 수영복ND;08;둘 다 일단 진정하고……. 여기서 승부를 내는 건, 무익하달까. 하스미 씨가 건네준 리스트와 관계없는 일이니까!\n#3;em;[땀]\n#3;stiff"

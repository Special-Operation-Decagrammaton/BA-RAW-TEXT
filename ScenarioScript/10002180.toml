[translation]
10002180-1 = "後日談其五;Pride of Sniper"
10002180-2 = "（大家正在吃著本該被用於打西瓜的西瓜）"
10002180-3 = "這顆西瓜又涼又好吃呢！"
10002180-4 = "就是說啊，雖然沾到了一點沙，不過確實又甜又美味。"
10002180-5 = "之所以會沾上沙子……也是因為當時用了槍的關係吧……"
10002180-6 = "梓醬覺得怎麼樣？"
10002180-7 = "西瓜非常適合用來補充水分，不過這種方式也有會攝取過多水分的缺點。"
10002180-8 = "要如何應對突如其來的利尿反應，必須認真思考對策才行……"
10002180-9 = "啊，啊哇哇！"
10002180-10 = "現，現在不能聊這種話題啦！#n這裡還有別人，而，而且老師也在……！"
10002180-15 = "西，西西西西瓜……！#n跟，跟老師一起，吃，吃西瓜，嚼嚼……"
10002180-16 = "咯嘻嘻嘻嘻，嘻嘻……"
10002180-17 = "嚼嚼嚼嚼……嗯～真好吃！"
10002180-18 = "西瓜很厲害呢！撒鹽巴也好吃，撒砂糖也好吃！"
10002180-19 = "嗯……加芥末會不會也很好吃！？"
10002180-21 = "什麼！？#n再，再怎麼說芥末應該也不行吧……！？"
10002180-22 = "（不過真是太好了。總算能暫時過的和平一點……#n　名為打西瓜的狙擊比賽也被中斷了……）"
10002180-24 = "那麼接下來，等大家吃完就開始下一個任務吧？"
10002180-25 = "我看看，蓮實同學給的清單裡還剩下……"
10002180-26 = "啊，這麼說來，有件事我有點在意……"
10002180-27 = "什，什麼事呢？泉同學？"
10002180-28 = "結果剛才的打西瓜？最後是誰贏了？"
10002180-29 = "……咦？"
10002180-30 = "讓，讓活動中斷的泉同學怎麼會這麼問呢！？#n不對，現在不能再提到這個話題！！"
10002180-36 = "也對……這麼說來還沒分出勝負。"
10002180-37 = "差點就忘記這件事了，謝謝你的提醒。#n如果就這樣馬馬虎虎地結束，實現正義部的名聲會受損的！"
10002180-38 = "我也一樣。沒有得出明確的結論就離開戰場這種事……#n賭上補課部之名，絕對不能這麼做。"
10002180-40 = "梓醬！？補課部的名稱應該沒有那麼沉重吧！？"
10002180-41 = "不過就算想分出勝負也已經沒有西瓜了……"
10002180-42 = "那麼就用其他東西來代替吧！"
10002180-43 = "椰子樹的果實怎麼樣？"
10002180-44 = "我的話就算要提高難度，用那顆岸邊岩石上的小石頭也無所謂。"
10002180-45 = "既然如此，我就算要用海平面上漂浮的浮標也沒關係！"
10002180-46 = "請，請你們兩位都先等一下……！"
10002180-47 = "在這裡彼此競爭也得不到什麼，而且還很危險……#n我覺得應該先完成蓮實同學的清單……！"
10002180-48 = "[s]「我覺得還算是在運動的範疇內，沒什麼不好吧？」"
10002180-50 = "連，連老師都這麼說！？"
10002180-51 = "啊，這裡剛好有個老師在海邊的店裡買的……是叫「1/7比例公仔」？"
10002180-52 = "不錯，正好很容易分辨。#n老師，跟你借用一下。"
10002180-53 = "[s]「不，不行！立刻停止這場沒有意義的爭鬥！！！！」"
10002180-58 = "（咚哐！！啪嘰──！）"
10002180-62 = "為，為什麼又變成這樣了啊啊啊──！？"
10002180-68 = "嚼嚼……"
10002180-69 = "嗯！"
10002180-70 = "西瓜配芥末也很適合呢！！"

[translation]
10002180-1 = "Afterword; A Sniper's Pride"
10002180-2 = "(Everyone is enjoying watermelon together.)"
10002180-3 = "Ahhh! This watermelon is so refreshing right now!"
10002180-4 = "It's a shame some of it has sand on it, but there's no helping that. It's still sweet and delicious."
10002180-5 = "There's still something satisfying about it too."
10002180-6 = "Don't you think so, Azusa?"
10002180-7 = "It provides adequate hydration, however, the ratio of water to food is too high. You'll over-hydrate before you fill your stomach."
10002180-8 = "It's also a diuretic, which presents its own challenges."
10002180-9 = "Wh-Whoa!"
10002180-10 = "That's enough of that, thank you very much. People can hear you—and that includes Sensei, you know!"
10002180-15 = "W-Watermelon with Sensei... *nom* Watermelon... "
10002180-16 = "Heh heh heh..."
10002180-17 = "Nom, nom. So good!"
10002180-18 = "Isn't watermelon amazing? It goes well with sugar AND salt!"
10002180-19 = "I wonder how it goes with wasabi!"
10002180-21 = "Wh-What?! Wasabi?"
10002180-22 = "(At least everyone is enjoying their watermelon. Hopefully, we can forget about all of that drama from before.)"
10002180-24 = "Is everyone done? What should we do next?"
10002180-25 = "We still have to do some things for Hasumi."
10002180-26 = "Oh, there's something I've been wondering about."
10002180-27 = "What is it, Izumi?"
10002180-28 = "Who won that watermelon shootout?"
10002180-29 = "Huh?"
10002180-30 = "Why are you bringing that up again, Izumi? You're the one who stopped it!"
10002180-36 = "You're right. The score was never settled."
10002180-37 = "You interrupted us just as a winner was about to be decided. The Justice Task Force's pride won't allow a competition to go unfinished!"
10002180-38 = "I feel similarly. Leaving the battlefield without a clear winner would only tarnish the Make-Up Work Club's name."
10002180-40 = "Azusa! I-I don't think the Make-Up Work Club is supposed to have a reputation on the battlefield!"
10002180-41 = "Hmm. We don't have enough watermelon left to play again even if we wanted to."
10002180-42 = "What if we used something else?!"
10002180-43 = "For example, the fruit growing on that tree?"
10002180-44 = "Or those small pebbles lying on that rock far away on the beach?"
10002180-45 = "How about hitting those floating buoys out at sea?!"
10002180-46 = "Wait! You can't do that!"
10002180-47 = "Please calm down. And besides, we're supposed to be completing Hasumi's list. Declaring a winner won't do us any good..."
10002180-48 = "[s] \"Come on, Hifumi. It's all in good fun.\""
10002180-50 = "Y-You too, Sensei?! How can you say that?"
10002180-51 = "Oh. We could use the 1/7 scale figure that Sensei bought at the beach souvenir shop."
10002180-52 = "This will make for the perfect target. Allow me to borrow it, Sensei."
10002180-53 = "[s] \"Ahhh, no! Never mind! Fighting is wrong!\""
10002180-58 = "*bang* *boom* *crash*"
10002180-62 = "What is this vacation coming to?!"
10002180-68 = "Nom, nom."
10002180-69 = "Mmm!"
10002180-70 = "Wasabi DOES go with watermelon!"

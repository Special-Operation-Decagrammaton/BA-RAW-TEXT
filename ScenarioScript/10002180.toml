[translation]
10002180-1 = "#title;후일담;Pride of sniper"
10002180-2 = "#na;(그렇게 다 같이 수박을 먹고 있을 때였다.)"
10002180-3 = "3;히후미 수영복ND;03;이 수박, 시원하네요!\n#3;em;[재잘]\n#3;hophop\n#3;a"
10002180-4 = "1;마시로 수영복ND;03;네, 모래가 묻은 게 좀 흠이지만, 달고 시원해서 맛있습니다.\n#1;em;[반짝]\n#1;ar\n#3;m5"
10002180-5 = "3;히후미 수영복ND;04;전부……. 자업자득이란 기분이지만…….\n#3;em;[땀]\n#3;stiff"
10002180-6 = "3;히후미 수영복ND;02;아즈사 쨩은 어떤가요?"
10002180-7 = "5;아즈사 수영복ND;00;수분 보급엔 최적이야. 다만 이런 섭취 방법으로는 지나치게 다량의 수분을 섭취하게 된다는 점이 디메리트네.\n#5;em;[반응]\n#3;m3\n#5;al"
10002180-8 = "5;아즈사 수영복ND;99;불시의 이뇨작용을 어떻게 대처할지, 진지하게 해결법을 강구해야……."
10002180-9 = "3;히후미 수영복ND;09;아, 아우우!\n#3;em;[?!]\n#3;shake"
10002180-10 = "3;히후미 수영복ND;10;그, 그런 이야기는 금지! 다, 다른 사람도 있고 무엇보다 서, 선생님도 계시니까요오~!\n#3;hophop"
10002180-11 = "#st;[0,0];instant;1;"
10002180-12 = "#clearST"
10002180-13 = "5;아즈사 수영복ND;99\n1;마시로 수영복ND;03\n3;히후미 수영복ND;10\n#5;d\n#1;d\n#3;d\n#wait;1000"
10002180-14 = "#all;hide"
10002180-15 = "3;츠루기 수영복ND;07;수, 수수수수박, 서, 선생님 바로 곁에 앉아서. 수, 수수박을 수, 수박수박하고 우물우물, \n#3;em;[///]\n#3;a"
10002180-16 = "3;츠루기 수영복ND;05;으, 으헤헤히흐흣…….\n#3;stiff"
10002180-17 = "1;이즈미 수영복ND;10;우물우물우물. 푸하. 맛있당!\n#1;em;[음표]\n#3;m5\n#1;ar"
10002180-18 = "1;이즈미 수영복ND;00;수박은 굉장해! 소금을 뿌려 먹어도 맛있고, 의외로 설탕을 뿌려 먹는 것도 맛있으니까!"
10002180-19 = "1;이즈미 수영복ND;02;음……. 그럼 와사비도 어울리지 않을까?!\n#1;hophop\n#1;em;[반짝]"
10002180-20 = "#all;hide"
10002180-21 = "3;히후미 수영복ND;09;네, 네에?! 와, 와사비요?!\n#3;em;[?!]\n#3;shake"
10002180-22 = "3;히후미 수영복ND;99;(후아아아……. 그래도 다행이다아. 모두 수박을 먹느라, 아까 전의 소동은……. 이대로 끝나는 모양이에요…….)\n#3;stiff"
10002180-23 = "#all;hide"
10002180-24 = "3;히후미 수영복ND;00;그럼 모두 다 같이 수박도 다 먹었고, 다음 리스트로 가볼까요?\n#3;a\n#3;em;[반짝]"
10002180-25 = "3;히후미 수영복ND;03;아직 하스미 씨가 건네 준 리스트에서 저희가 해야할 일이…….\n#3;em;[음표]"
10002180-26 = "1;이즈미 수영복ND;01;아, 근데 말이야. 나 궁금한 게 있는데.\n#1;ar\n#3;m5\n#1;em;[반응]"
10002180-27 = "3;히후미 수영복ND;02;네, 뭔가요? 이즈미 씨?\n#3;em;[?]"
10002180-28 = "1;이즈미 수영복ND;10;결국 아까 전에 하던 그 수박 쏘기는, 누가 이긴 거야?\n#1;em;[반짝]"

90001140-568 = "ถ้าฉันจะทำอะไรผิดอีกละก็... ตอนนั้นช่วยเตือนให้ฉันรู้ด้วยนะ"
90001140-569 = "ตอนนั้นฉันจะพยายามให้ดีที่สุดเพื่อยอมรับมันให้ได้ ถ้ามันอยู่ในขอบเขตที่ฉันยอมรับได้น่ะนะ"
90001140-571 = "(อย่างหลังไม่ต้องพูดน่าจะดีกว่านะ...)"
90001140-572 = "(เฮ้อ... นี่ถือเป็นก้าวที่ยิ่งใหญ่ของริโอะแล้วก็จริง แต่หนทางก็ยังอีกยาวไกลนะ...)"
90001140-574 = "ว่าแต่ รุ่นพี่ริโอะกับคุณครูเรียกพวกฉันมาหาที่นี่ทำไมเหรอคะ? "
90001140-575 = "นั่นสิคะ แล้วยังให้พวกเราใช้วิธีลับๆ มาด้วย"
90001140-580 = "อ่า เรื่องนั้นน่ะ..."
90001140-581 = "[s] \"จริงสินะ... เรื่องนี้ก็ต้องบอกให้รู้เหมือนกัน\""
90001140-583 = "งั้นก็ดีเลยค่ะ ในเมื่อเราอยู่กันพร้อมหน้าแล้ว งั้นเรามาค่อยๆ พูดคุยกันทีละเรื่องดีมั้ยคะ?"
90001140-584 = "ถ้าฟังแล้วมีข้อสงสัยอะไร ก็ยกมือถามได้ตลอดเลยนะคะ"
90001140-589 = "ว้าว รุ่นพี่ฮิมาริ ทำเหมือนเป็นคุณยายเลย..."
90001140-590 = "ชู่ว ชู่ว... พี่โมโมอิ! ถ้ารุ่นพี่ได้ยินขึ้นมาเดี๋ยวก็เป็นเรื่องหรอก!"
90001140-593 = "ตอนต่อไป;เล่นปาหิมะ"

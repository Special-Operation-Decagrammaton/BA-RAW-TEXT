[translation]
90001140-1 = "ตอนที่ 14;รวมตัวกัน"
90001140-4 = "หืม? คุณครู? มีเรื่องอะไรเหรอ?"
90001140-5 = "[s] \"ใกล้ถึงเวลาที่ริโอะจะมาถึงแล้วน่ะ\""
90001140-6 = "ถึงจะพูดอย่างนั้นก็เถอะ แต่ก็ยังเหลือเวลาอีก 5 นาทีค่ะ"
90001140-10 = "ถ้างั้นก็ควรใช้เวลาที่เหลือออกมายืนรอก่อนงั้นเหรอคะ? "
90001140-11 = "ก็ได้นะคะ ถึงฉันจะคิดว่าท่านริโอะจะมาถึงตรงเวลา แบบไม่ช้าไปแม้แต่นาทีหรือวินาทีเดียวก็เถอะค่ะ"
90001140-12 = "หรือไม่ก็อาจจะมาถึงก่อนสัก 1 นาทีก็ได้ค่ะ"
90001140-13 = "[s] \"ฮิมาริ? ไม่หนาวเหรอ?\""
90001140-17 = "หนาวค่ะ หนาวมากๆ เลย หนาวกว่าตอนที่ดอกไม้ที่ผลิบานบนหน้าผาสูงโดนน้ำค้างแข็งตอนเช้ามืด#nอีกค่ะ!"
90001140-18 = "ฉันควรไปรอข้างในจะดีกว่างั้นเหรอคะ? ก็เป็นความคิดเห็นที่สมเหตุสมผลอยู่หรอกนะคะ แต่ครั้งนี้ฉันอยากดื้อค่ะ"
90001140-19 = "ไม่เพียงแต่ทิ้งงานแบบนี้ให้ฉันทำเท่านั้น แต่ยังหนีไปซ่อนตัวตามอำเภอใจอีก!"
90001140-20 = "ถ้าฉันไม่ได้เห็นหน้าท่านประธานที่หาตัวได้ยากในครั้งนี้ละก็!"
90001140-24 = "ฉันคงรู้สึกไม่ได้รับความยุติธรรมและโมโหจนนอนไม่หลับแน่ๆ ค่ะ!"
90001140-26 = "ก็แค่บอกตรงๆ ว่าไม่ได้เจอนานแล้ว ก็เลยคิดถึงและอยากเห็นหน้ากันก็ได้นี่นา"
90001140-27 = "ใครบอกคะ? ฉันไม่เคยพูดอย่างนั้นสักหน่อยค่ะ เข้าใจผิดไปมากแล้วนะคะ "
90001140-28 = "ใช้เวลาอยู่กับฉันมาก็นาน แต่ยังไม่รู้จักฉันดีอีกเหรอคะ เอมิ?!"
90001140-29 = "(ก็เพราะรู้จักดีต่างหากถึงพูดอย่างนั้นน่ะ...)"
90001140-30 = "ถึงจะอย่างนั้น แต่ที่ผ่านมามีเรื่องเกิดขึ้นมากมายเลยนะคะ"
90001140-31 = "ถึงฉันจะมาเข้าร่วมในปฏิบัติการนี้กลางคัน ไม่ได้มาตั้งแต่แรกอย่างคนอื่น"
90001140-32 = "แต่ฉันก็พูดอย่างภาคภูมิใจได้เลยค่ะว่าความสัมพันธ์ระหว่างหัวหน้าฮิมาริกับเอมินั้นแน่นแฟ้นกว่าใคร"
90001140-33 = "[s] \"โอ้ พูดอย่างมั่นใจเลยนะ\""
90001140-34 = "แน่นอนสิคะ คุณครู ฉันเรียนมาว่าปัญหาแบบนี้แก้ได้ด้วยพลังกายและพลังใจค่ะ"
90001140-35 = "เรียนมาจากใครเหรอ?"
90001140-36 = "จากโมโมอิค่ะ"
90001140-40 = "อ่า อืม งั้นสินะ เข้าใจแล้วละ"
90001140-42 = "แต่ถึงอย่างนั้น ชมรมปรากฏการณ์ลี้ลับก็เป็นชมรมที่เริ่มขึ้นจากการขอร้องของริโอะค่ะ"
90001140-43 = "เดคาแกรมมาทอน..."
90001140-46 = "\"การศึกษาวิจัยเกี่ยวกับเทพเจ้า วิเคราะห์เพื่อพิสูจน์การมีอยู่ของพระเจ้า และหากพิสูจน์ได้ก็จะ ดำเนินการวิเคราะห์โครงสร้างต่อ และหากวิเคราะห์โครงสร้างได้ ก็จะสามารถสร้างขึ้นมาใหม่ได้ ซึ่งก็คือวิธีการที่จะสร้างเทพเจ้าขึ้นมาใหม่...\""
90001140-47 = "ระบบวิเคราะห์ตนเองแบบสมบูรณ์ที่สร้างขึ้นจากสมมติฐานนั้น"
90001140-48 = "หรือกล่าวอีกนัยหนึ่งก็คือ... ปัญญาประดิษฐ์ที่ค้นพบหนทางสู่เทพเจ้า"
90001140-51 = "ตอนแรกมีแค่หัวหน้ากับฉันแค่สองคนเท่านั้น "
90001140-52 = "แล้วเอมิก็พาคุณครูมา"
90001140-53 = "เราเริ่มค้นหาตั้งแต่ในทะเลทราย โรงงาน พื้นที่รกร้าง... แล้วสุดท้ายก็มาถึงที่นี่"
90001140-55 = "ฉันไม่มีอะไรที่จะพูดเป็นพิเศษ แต่ถ้าให้นั่งเฉยๆ อยู่คนเดียวมันก็น่าเบื่อ งั้นฉันจะลองพูดอะไรดูบ้าง#nก็แล้วกันนะคะ"
90001140-56 = "[s] \"มานี่สิ โทคิ... ครูจะจับมือไว้ให้เอง\""
90001140-57 = "ขอบคุณค่ะ "
90001140-63 = "อะไรของพวกเค้าเนี่ย"
90001140-64 = "พวกคุณทำอะไรกันคะเนี่ย ทำเหมือนอีกฝ่ายเป็นสัตว์เลี้ยงไปได้..."
90001140-65 = "เอาเถอะค่ะ เอาเป็นว่าฉันไม่อยากหวนคิดถึงเรื่องเดิมๆ ที่พูดว่า \"พอมองย้อนกลับไปแล้ว ก็เกิดเรื่อง#nขึ้นมากมายจริงๆ เลยนะ\""
90001140-66 = "การจมอยู่กับความคิดแบบนั้นมันไม่เข้ากับแฮ็กเกอร์สาวผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษน่ะค่ะ แล้วมันก็ทำให้เสียเวลาด้วย"
90001140-67 = "ทุกอย่างต้องทำอย่างรวดเร็ว เรียบร้อย และไม่เกิดปัญหาตามมาภายหลัง เช่นเดียวกันกับกระบวนการ#nแฮ็กที่รวดเร็วและมีประสิทธิภาพค่ะ"
90001140-73 = "ระหว่างที่เราคุยนู่นนี่กัน ดูเหมือนว่าท่านริโอะจะมาถึงแล้วนะคะ"
90001140-75 = "...?"
90001140-86 = "..."
90001140-87 = "..."
90001140-88 = "..."
90001140-89 = "?"
90001140-93 = "เล่นใหญ่จัง นั่งอะไรมาคะนั่น...?"
90001140-94 = "ยานขนส่งนั่นน่ะเหรอ? ไม่ได้ยิ่งใหญ่อะไรขนาดนั้นหรอก อย่างที่ว่ากันว่าในของใหญ่ย่อมมีของเล็กอยู่"
90001140-95 = "ยานนั่นยังปรับปรุงและขยายพื้นที่ได้อีก ฉันอยากเตรียมมาให้สมบูรณ์แบบกว่านี้แท้ๆ เชียว น่าเสียดายอยู่เหมือนกัน"
90001140-96 = "ค่ะ... เข้าใจแล้วค่ะ ฉันจะมองว่าคุณเตรียมตัวมาเต็มที่แล้วก็แล้วกันค่ะ"
90001140-97 = "[s] \"มาแล้วเหรอ ริโอะ ครูกำลังรออยู่เลย\""
90001140-101 = "ครู..."
90001140-102 = "เอ่อ... ฉัน..."
90001140-104 = "สวัสดีค่ะ ท่านริโอะ ถ้าจะบอกให้ชัดๆ เลยละก็ ทุกคนออกมารอท่านริโอะกันตั้งแต่ 5 นาที ก่อนหน้าแล้วค่ะ"
90001140-106 = "โทคิ..."
90001140-111 = "เจอสิ่งที่อยากทำแล้วหรือยัง...?"
90001140-112 = "สิ่งที่ฉันอยากทำงั้นเหรอคะ?"
90001140-113 = "ฉัน..."
90001140-114 = "ไม่เป็นไร ถ้ามันยากที่จะตอบ ก็ไม่ต้องตอบก็ได้"
90001140-115 = "แค่ได้เห็นเธอตอนนี้ ฉันก็เหมือนได้คำตอบแล้วละ"
90001140-119 = "อย่างนั้นเหรอคะ?"
90001140-120 = "อืม... ฉันเคยพูดเรื่องนี้ไปแล้วก็จริง แต่ขอให้ได้พูดอีกครั้งเถอะนะ"
90001140-124 = "ขอโทษนะ โทคิ ทั้งหมดเป็นความผิดของฉันเอง"
90001140-133 = "คะ...?"
90001140-135 = "ประธานก็พัฒนาขึ้นแล้วนะเนี่ย"
90001140-136 = "[s] \"ไม่ได้เห็นภาพที่น่าตื้นตันใจแบบนี้มานานแล้วนะ...\""
90001140-138 = "อย่าล้อเล่นกันขนาดนั้นสิ ครู..."
90001140-139 = "ไม่ได้ล้อเล่นงั้นเหรอ...? งั้นมันจะยิ่งไม่ดีนะ...?"
90001140-140 = "หืม? มีเรื่องที่อยากบอกด้วยเหรอ? อะไรน่ะ...?"
90001140-141 = "[s] \"ต้องตั้งใจฟัง และเตรียมใจไว้ให้ดีนะ ริโอะ\""
90001140-142 = "หรือว่า... เกิดเรื่องที่จะทำให้โลกจะพังในวันพรุ่งนี้ระหว่างที่ฉันไม่รู้งั้นเหรอ?"
90001140-143 = "[s] \"มันก็ไม่ถึงขนาดนั้นหรอก\""
90001140-145 = "[ns] \"อาริสึกับคนอื่นในชมรมพัฒนาเกมกำลังมาที่นี่น่ะ\""
90001140-149 = "...?"
90001140-153 = "...!"
90001140-154 = "ให้พรุ่งนี้โลกแตกไปเลยยังจะดีเสียกว่า!"
90001140-160 = "เอมิ! โทคิ!"
90001140-161 = "เข้าใจแล้ว!"
90001140-166 = "ฉันจะรับมือเองค่ะ"
90001140-175 = "ปล่อยนะ! ฉันจะกลับแล้ว!"
90001140-176 = "อีกอย่างนะ โทคิ เธอไม่ควรทำแบบนี้กับฉันไม่ใช่เหรอ?"
90001140-177 = "ต้องขอโทษด้วยค่ะ ท่านริโอะ นี่เป็นสิ่งที่ฉันอยากทำน่ะค่ะ"
90001140-178 = "นั่นคือสิ่งที่เธออยากบอกฉันเหรอ!?"
90001140-179 = "เด็กพวกนั้นจะมาถึงพรุ่งนี้งั้นเหรอ? แบบนี้มันผิดสัญญานะ!"
90001140-184 = "ใจเย็นๆ ก่อนค่ะ ริโอะ ที่จริงต่อให้มาตอนนี้หรือพรุ่งนี้ก็ไม่ต่างกันมากหรอกค่ะ"
90001140-185 = "ต่างสิ! ฉันต้องเตรียมใจ แล้วก็ต้องเตรียมคิดคำพูดด้วย! และที่สำคัญกว่านั้น การเลื่อนกำหนดการเข้า#nมาตั้งหนึ่งวันโดยไม่มีการบอกกันก่อนเป็นการตัดสินใจที่ไม่สมเหตุสมผลเอาเสียเลย!"
90001140-186 = "ก็มันกลายเป็นแบบนี้ไปแล้วน่ะค่ะ ที่สำคัญเลยนะคะ ในทางโหราศาสตร์แล้ว การพบกันในเวลานี้จะดี#nที่สุดค่ะ"
90001140-187 = "ยังเชื่อเรื่องดวงดาวไร้สาระไม่ลืมหูลืมตาอยู่อีกงั้นเหรอ?"
90001140-188 = "ฉันก็พูดอยู่หลายครั้งแล้วนะคะว่าโหราศาสตร์คือสาขาวิชาเกี่ยวกับสถิติและเหตุการณ์บนฟากฟ้าที่มี#nมาตั้งแต่สมัยโบราณ..."
90001140-189 = "และเป็นศาสตร์ที่เกี่ยวข้องกับปรัชญา คณิตศาสตร์ และฟิสิกส์... เพื่อศึกษาตัวแปรที่จะที่กำหนด#nโชคชะตาค่ะ"
90001140-194 = "เรื่องนั้นมันไม่เห็นจะเกี่ยวกันเลย!"
90001140-202 = "แฮ่ก... แฮ่ก... แฮ่ก..."
90001140-203 = "[s] \"ไหวหรือเปล่า ท่านประธาน...?\""
90001140-204 = "ฉันไม่ไหวเลยสักนิด ครู..."
90001140-205 = "นะ... แน่นอนว่าฉันคิดว่า... นี่เป็นราคาที่ฉันต้องจ่าย... จากการที่ไปก่อเรื่องนู้นเรื่องนี้เอาไว้..."
90001140-206 = "แต่ฉันไม่รู้เลยว่ามันจะเป็นแบบนี้..."
90001140-210 = "(ริโอะมองมาด้วยสายตาแห่งความคับแค้นใจ)"
90001140-211 = "(คุณครูเข้าใจความรู้สึกของริโอะ แต่ก็แอบรู้สึกว่าตัวเองไม่ได้รับความยุติธรรมเหมือนกัน...)"
90001140-217 = "อ่า"
90001140-218 = "โอ๊ะ"
90001140-220 = "เหมือนจะมาถึงทันเวลาพอดีเลยนะคะ เหล่ารุ่นน้องที่น่ารักของพวกเราน่ะค่ะ"
90001140-221 = "...!!!"
90001140-227 = "(เฮลิคอปเตอร์มาถึงธารน้ำแข็ง)"
90001140-231 = "(คนที่วิ่งออกมาเป็นคนแรกก็คือ...!)"
90001140-235 = "คุณครู!"
90001140-241 = "[ns] \"อาริสึ!\""
90001140-242 = "(อาริสึวิ่งมากอดคุณครูสุดแรง!)"
90001140-243 = "(ทำเอาคุณครูเกือบล้มลงไป)"
90001140-246 = "อยู่ที่นี่จริงๆ ด้วยสินะคะ คุณครู! อาริสึคิดถึงคุณครูค่ะ!"
90001140-247 = "สวัสดีค่ะ อาริสึที่น่ารัก"
90001140-248 = "อ๊ะ โทคิ! ดีใจที่ได้เจอค่ะ!"
90001140-250 = "สวัสดี อาริสึ"
90001140-254 = "เอ่อ... เอมิไม่หนาวเหรอคะ...? ขนาดอาริสึใส่เสื้อผ้าหนาๆ มาแบบนี้ยังหนาวนิดหน่อยเลยค่ะ..."
90001140-255 = "ไม่เลยสักนิด ฉันว่ามันเย็นสดชื่นดีด้วยซ้ำ "
90001140-256 = "ถะ... ถ้าอย่างนั้นก็ดีแล้วละค่ะ"
90001140-261 = "ยินดีต้อนรับค่ะ อาริสึและชมรมพัฒนาเกมทุกคน"
90001140-265 = "รุ่นพี่ฮิมาริ! สบายดีหรือเปล่าคะ? เสื้อคลุมสีเหลืองน่ารักจังเลยค่ะ!"
90001140-266 = "ตายจริง ขอบคุณค่ะ อาริสึเป็นรุ่นน้องที่น่ารักจริงๆ เลยนะคะ"
90001140-268 = "ยะฮู้ว~ พวกเรามาแล้ว คุณครู!"
90001140-269 = "แล้วก็... คนอื่นด้วย ไม่ได้เจอกันนานเลยนะ"
90001140-270 = "สวัสดีค่ะคุณครู... ระหว่างทางมาพวกเราลำบากกันใช่เล่นเลยค่ะ..."
90001140-271 = "ตอนแรกฉันคิดว่าคงเป็นการนั่งรถไฟไปเที่ยวสนุกๆ แต่มันก็ค่อยๆ หนาวขึ้น แล้วก็ต้องเปลี่ยน#nยานพาหนะหลายครั้ง จนสุดท้ายต้องมานั่งเฮลิคอปเตอร์..."
90001140-272 = "อีกอย่างนะคะ ฉันคิดไม่ถึงเลยค่ะว่าต้องใช้เวลาตั้งสามวันกว่าจะมาถึง..."
90001140-274 = "ฮุฮุ... แต่มันก็เหมือนการเดินทางไกลในเกมอยู่นะคะ..."
90001140-278 = "ฮัดชิ้ว!"
90001140-279 = "[s] \"โอเคหรือเปล่า?\""
90001140-280 = "ค่ะ ฉันยังโอเคค่ะ... อึก... แต่ว่าที่นี่หนาวมากๆ อย่างที่คุณครูบอกไว้เลยนะคะ"
90001140-281 = "[s] \"แต่ทุกคนก็ใส่เสื้อผ้าหนาๆ กันมาอย่างน่ารักเลยนะ!\""
90001140-282 = "ขอบคุณค่ะ คุณครู! ที่จริงมิโดริเลือกชุดนี้ให้ค่ะ มันเป็นดีไซน์คล้ายๆ กับชุดกันหนาวในเกมที่เรากำลัง#nทำกันอยู่ค่ะ!"

[translation]
90001140-1 = "Episode 14;Allied"
90001140-4 = "Huh? Sensei? Is there a problem?"
90001140-5 = "[s] \"Rio should be getting here about now.\""
90001140-6 = "There are still five minutes remaining."
90001140-10 = "Perhaps that's enough time to start expecting someone to arrive? "
90001140-11 = "Hm. However, when it comes to Rio, I believe she would come exactly on time. Not one single second late."
90001140-12 = "Or on very rare occasions, she'll arrive a minute early."
90001140-13 = "[s] \"Himari? Aren't you cold?\""
90001140-17 = "Yes. I am. Unbearably so, in fact. I'm colder than an elegant clifftop bloom getting directly hit by the morning frost!"
90001140-18 = "...How about staying inside? Although that's a reasonable suggestion, I am making this particular event an exception."
90001140-19 = "She not only threw this work in my face but also decided to disappear of her own volition!"
90001140-20 = "If I weren't here to greet that president, who's at long last showing her face..."
90001140-24 = "...the frustration and anger would keep me up all night!"
90001140-26 = "...It'd be nice if you could just be honest and admit that you're excited to see her after so long."
90001140-27 = "That's not true! You're wrong! You completely misunderstand me! "
90001140-28 = "I cannot believe we've spent this much time together, and you still have no idea what kind of person I am, Eimi!"
90001140-29 = "(I actually said that because I know you so well...)"
90001140-30 = "Anyways, much has happened."
90001140-31 = "And although I joined halfway through..."
90001140-32 = "...I can confidently say that my bonds with President Himari and Eimi are just as strong as everyone else's."
90001140-33 = "[s] \"Wow, that's some confidence there.\""
90001140-34 = "Of course, Sensei. I was once told that, with enough passion and brute force, things like this work out somehow."
90001140-35 = "By who?"
90001140-36 = "Momoi."
90001140-40 = "Ah. Yes. That makes sense."
90001140-42 = "Looking back, Rio was the one who created the Super Phenomenon Task Force."
90001140-43 = "Decagrammaton..."
90001140-46 = "\"The goal was to research a deity to prove its existence and, if possible, analyze its constitution. If such a thing were possible, then it would mean it could be replicated. This is how a new god could be created.\""
90001140-47 = "The Absolute Being Autonomous Analysis System was created based on that hypothesis."
90001140-48 = "In other words, it's an artificial intelligence seeking out divinity."
90001140-51 = "Originally, it was just me and the president. "
90001140-52 = "Then Eimi brought Sensei."
90001140-53 = "We've gone from desert to factory to ruins...to here."
90001140-55 = "I have nothing special to add, so I am randomly interjecting. Otherwise, I would have to sit idly by, and that is boring."
90001140-56 = "[s] \"...Come here, Toki. I'll hold your hand.\""
90001140-57 = "Thank you. "
90001140-63 = "For some reason, this feels unfair. Me too, me too."
90001140-64 = "You two, are you Sensei's pets or something?"
90001140-65 = "Anyways, I refuse to indulge in dull nostalgia, yammering about how \"so much has happened,\" or \"time has flown by.\""
90001140-66 = "That doesn't align well with the image of a delicate, yet beautiful, super-genius hacker like me. And it ruins the mood."
90001140-67 = "Just like efficient hacking, everything in life should be done in a quick, clean manner, with no ramifications."
90001140-73 = "It seems she arrived while we were talking."
90001140-75 = "...?"
90001140-86 = "..."
90001140-87 = "..."
90001140-88 = "..."
90001140-89 = "?"
90001140-93 = "You've arrived in something rather ostentatious, haven't you?"
90001140-94 = "My transport ship? It's nothing special. They say the big can serve the purpose of the small."
90001140-95 = "There's still a lot of room for improvement. I didn't have time to properly outfit with everything we might need for this mission."
90001140-96 = "Yes, all right. We'll just say you did your best."
90001140-97 = "[s] \"Welcome, Rio. We were waiting for you.\""
90001140-101 = "Sensei..."
90001140-102 = "Um, I..."
90001140-104 = "Welcome, Ms. Rio. We have been waiting for precisely five minutes."
90001140-106 = "Toki..."
90001140-111 = "...have you found your purpose?"
90001140-112 = "My purpose...?"
90001140-113 = "I..."
90001140-114 = "No, it's okay. You don't need to answer if it's too difficult."
90001140-115 = "Just by seeing you now, I know the answer."
90001140-119 = "Is that so?"
90001140-120 = "Yes... I've said it once before, but please indulge me one more time."
90001140-124 = "I'm sorry, Toki. I take full responsibility for everything that happened."
90001140-133 = "What...?"
90001140-135 = "You have grown, Ms. Rio."
90001140-136 = "[s] \"I haven't seen such a heartwarming moment in a while.\""
90001140-138 = "...Don't tease me too much, Sensei."
90001140-139 = "You're not teasing me...? I-Isn't that even worse...?"
90001140-140 = "Hm? You have something else to tell me? What is it?"
90001140-141 = "[s] \"Listen, Rio. Please prepare yourself for what I'm about to say.\""
90001140-142 = "What? Is the world ending tomorrow? Did I not get the memo?"
90001140-143 = "[s] \"It's not to that extent.\""
90001140-145 = "[ns] \"Aris and the Game Development Department are on their way here.\""
90001140-149 = "...?"
90001140-153 = "...!"
90001140-154 = "I would rather have tomorrow be the end of the world!"
90001140-160 = "Eimi! Toki!"
90001140-161 = "Understood!"
90001140-166 = "Mobilizing."
90001140-175 = "Let me go! I'm leaving!"
90001140-176 = "Toki! Of all people, you can't be doing this to me!"
90001140-177 = "I'm sorry, Ms. Rio. This is what I want to do now."
90001140-178 = "This is not what I meant by that!"
90001140-179 = "You said they'll be here tomorrow! Tomorrow! This is not what we agreed upon!"
90001140-184 = "Calm down, Rio. Whether they're here today or tomorrow, does it really make a difference?"
90001140-185 = "Yes! Yes, it does! I am not mentally prepared for today! I have to plan what I'm going to say! And, above all, it is entirely irrational to change an established schedule without prior notice!"
90001140-186 = "It's the way the situation ended up. And more importantly, according to astrology, it would be most auspicious to meet at this time today."
90001140-187 = "You still believe in that meaningless constellation fortune telling?!"
90001140-188 = "As I always say, astrology is one giant science, combining the studies of many different disciplines..."
90001140-189 = "...including celestial statistics and events, philosophy surrounding the malleability of fate, mathematics, and physics!"
90001140-194 = "That is completely irrelevant right now!"
90001140-202 = "*huff* *puff* *huff*"
90001140-203 = "[s] \"...Are you okay, Rio?\""
90001140-204 = "...I'm not okay at all, Sensei..."
90001140-205 = "O-Of course, I...did some things...and I should...pay the price for them...but..."
90001140-206 = "...I just wasn't expecting this."
90001140-210 = "Rio looked at me with resentment in her eyes."
90001140-211 = "While I could understand where she was coming from, it felt a little unfair..."
90001140-217 = "Ah."
90001140-218 = "Oh."
90001140-220 = "Looks like they're right on time. Our adorable underclassmen, that is."
90001140-221 = "...!!!"
90001140-227 = "The helicopter arrived."
90001140-231 = "And the first person who came running out was..."
90001140-235 = "Sensei!"
90001140-241 = "[ns] \"Aris!\""
90001140-242 = "Aris jumped into my arms with all her might!"
90001140-243 = "Sensei almost fell!"
90001140-246 = "You are really here, Sensei! I missed you immensely!"
90001140-247 = "Welcome, adorable Aris."
90001140-248 = "Ah, Toki! Hello!"
90001140-250 = "Hi, Aris."
90001140-254 = "Uh... Are you not cold, Eimi? Even I am cold, and I am all bundled up!"
90001140-255 = "Not at all. I actually like how cool it is. "
90001140-256 = "Th-That is good to hear..."
90001140-261 = "Welcome, Aris and everyone from the Game Development Department."
90001140-265 = "Himari! How have you been? Your yellow jacket is very pretty!"
90001140-266 = "Oh my. Thank you. You really are just the cutest, Aris."
90001140-268 = "Weee! We're here, Sensei!"
90001140-269 = "And...um...everyone else. It's been a long time..."
90001140-270 = "Hi, Sensei... Getting here was...so hard..."
90001140-271 = "At first, I thought we were just going on a fun train ride. But then we had to switch to all different kinds of transportation, until we ended up on a helicopter...and it was so cold..."
90001140-272 = "To make matters worse, it ended up taking three whole days..."
90001140-274 = "Fufu... It felt like going on a long-distance journey in a video game..."
90001140-278 = "Achoo!"
90001140-279 = "[s] \"Are you okay?\""
90001140-280 = "Yes, I'm fine... Uwaaah, you weren't joking when you said it'd be cold."
90001140-281 = "[s] \"But look at all of you, bundled up in your cute snow outfits!\""
90001140-282 = "Thank you, Sensei! Midori picked our clothes! The designs are very similar to the gear in the game we are making!"
90001140-283 = "Yeah! It's an action-adventure-puzzle-turn-based-shooter game that takes place in the Glacial Sea!"
90001140-284 = "[s] \"...And the game is...good?\""
90001140-288 = "O-O-Of course! Who do you take me for, Sensei?!"
90001140-289 = "*sigh*"
90001140-291 = "Now, now. We need to get moving, but there's one last introduction to be..."
90001140-295 = "...made?"
90001140-302 = "Hello. I am the operations support AI assistant for this Glacial Sea base. Thank you for coming all the way here, Game Development Department members."
90001140-307 = "..."
90001140-308 = "..."
90001140-313 = "I can't handle this..."
90001140-315 = "A-AI? Drone? Oh, that! Like the boss thing that always tries to destroy humanity in video games?!"
90001140-316 = "Sis, that's a bit..."
90001140-317 = "I'm totally right, though, aren't I? That's the whole reason we came here!"
90001140-318 = "We're supposed to fight some mysterious AI that made a giant robot to fight us and fulfill its even more mysterious goals!"
90001140-320 = "N-Now that you mention it..."
90001140-321 = "No, everyone. That's not it. You see... How do I explain this?"
90001140-323 = "Have no concerns. I was created to help you, and I will fulfill my role. Therefore—"
90001140-327 = "Rio! It is Rio!"
90001140-333 = "What? Like last time?!"
90001140-334 = "Rio, are you...?"
90001140-336 = "Is...this...like, some sort of a prank?"
90001140-338 = "I-I am not Tsukatsuki Rio, but..."
90001140-339 = "It is very nice to see you again, Rio! Have you been well?"
90001140-340 = "..."
90001140-341 = "Even if it is only through video, I would like to be able to see your face! Like last time! Is that not possible today?"
90001140-342 = "That's..."
90001140-343 = "It is okay! I know you always have many responsibilities, so I am sure something very important is making it difficult to say hi."
90001140-344 = "...!!!"
90001140-345 = "Still...it is a bit sad. When I heard that Sensei and everyone else were going to be here, I was very much hoping to see you too!"
90001140-346 = "Ugh...!"
90001140-351 = "[ns] \"Wait here for one second!\""
90001140-355 = "What...?"
90001140-364 = "S-Sensei..."
90001140-370 = "[ns] \"Let's go, Rio.\""
90001140-371 = "But...but...!"
90001140-372 = "[s1] \"It's fine. I'll be with you.\"\n[s2] \"Now's the time to be brave.\""
90001140-375 = "...!"
90001140-379 = "O-Okay...!"
90001140-381 = "I took Rio's hand and started walking back outside."
90001140-382 = "I was relieved when she followed."
90001140-389 = "Ah! It's Ms. Rio!"
90001140-390 = "Um... So in these kinds of situations I should..."
90001140-391 = "Hello, Ms. Rio. It's been a while, in a lot of different ways."
90001140-392 = "Augh... Um... Uh... H-Hello, Ms. Rio...?"
90001140-399 = "Rio!"
90001140-404 = "Ah...?!"
90001140-409 = "I see. This happens often to adorable Aris."
90001140-410 = "Additionally, she is a good height for head pats. Perhaps giving her some will help calm you down, Rio."
90001140-413 = "I-Is that so...?"
90001140-415 = "Hey! How come Aris is the only one you guys call adorable?"
90001140-416 = "Understood. I will call you \"Noisy-Moi\" from now on."
90001140-417 = "Never mind. Just forget it."
90001140-421 = "Ms. Rio. I have a lot of questions, but there's just one really important one."
90001140-426 = "If we were in a similar situation as back then, and you could save the world by sacrificing one person, would you still do it?"
90001140-430 = "..."
90001140-432 = "S-Sis...?"
90001140-433 = "Momoi..."
90001140-435 = "Um... I was passed out the whole time, so I've only heard it second-hand, but isn't that what Ms. Rio said?"
90001140-442 = "Wh-What?! Why is everyone looking at me like that? This kind of thing always comes up in games right when you forget about it, so I'm working off of past experience here, okay?!"
90001140-443 = "My point is, I don't know what Ms. Rio's been up to, or what she's planning to do with Sensei!"
90001140-444 = "But if she has the same values as she did back then, then what happens if we run into a similar problem? She's going to come up with a similar solution!"
90001140-445 = "..."
90001140-447 = "S-Sis. That's a bit—"
90001140-448 = "Hold up, Midori! I deserve to have my voice heard here! I was knocked out when all of this went down!"
90001140-452 = "Actually, now that I think about it, wasn't Aris the one who attacked me?"
90001140-453 = "Actually, if I think about it a little harder, it was also Kei, right? Wait... Then how does this work...?"
90001140-458 = "Eek! I am very sorry, Momoi! It was all my fault!"
90001140-459 = "I-It's okay...! That's all in the past, and the important thing is that we're all here together now!"
90001140-465 = "..."
90001140-467 = "A-Anyways! Like I said, this happens in games all the time!"
90001140-468 = "You know, people claim that the minority should be sacrificed for the greater good, but then they tuck tail and run if that sacrifice ends up being them!"
90001140-469 = "But you weren't like that at all, Ms. Rio. I'll give you that."
90001140-473 = "The city itself will warp, distorting into a new concept called the Ark. Then, Kivotos will..."
90001140-474 = "This is my fault..."
90001140-475 = "If I hadn't fallen victim to my hubris... If I hadn't created this city... I...I did this..."
90001140-476 = "So I have to stop it..."
90001140-478 = "Wh-What do you mean by that?"
90001140-479 = "I'm going to send the system into overdrive to stop it."
90001140-480 = "My life means nothing in the face of the world's survival! I must!"
90001140-483 = "Back at that time..."
90001140-484 = "So I think that we deserve to know if you're still willing to make that kind of decision."
90001140-485 = "That's just the situation we're in."
90001140-486 = "Naturally, if my life is the solution to stopping this destruction, I won't hesitate. However..."
90001140-487 = "If Aris or Toki is at risk, or anyone else for that matter..."
90001140-488 = "...I'll work to the very last moment to find a different method. Truly, until we're at the end of the very end."
90001140-489 = "..."
90001140-490 = "I've always had a tendency to come to a conclusion and pursue that single-mindedly. I believed that to be the most rational approach."
90001140-491 = "But I know differently now. If there's even the slightest possibilities of a different outcome, I should reach for it."
90001140-492 = "...Because there are some things that can't be reversed."
90001140-498 = "No. That is not good, Rio."
90001140-503 = "A-Aris?!"
90001140-508 = "I am very happy that you are being so considerate of others."
90001140-509 = "But to hear you exclude yourself from the list makes me very sad."
90001140-510 = "That's why I..."
90001140-515 = "I hope you give yourself a chance too, Rio! "
90001140-520 = "Because no matter how hard a game is, you can always do better on your second run!"
90001140-525 = "Right. That was a good example, Aris."
90001140-527 = "..."
90001140-528 = "Rio. I..."
90001140-533 = "Ugh, I...!"
90001140-535 = "Kyah! It is so strange! I am having difficulty speaking the words I wish to speak! Did my language skill get debuffed?!"
90001140-537 = "It's fine, it's fine. Saying these things...is hard for everyone."
90001140-538 = "Fufu... It's a good atmosphere. Don't you agree, Sensei?"
90001140-539 = "[s3] \"I haven't seen such a heartwarming moment in a while.\"\n[s4] \"But now that I think about it, it hasn't been a while this time.\""
90001140-544 = "What? What does that mean...?"
90001140-549 = "..."
90001140-550 = "Anyways, I think everyone has said what they wanted."
90001140-551 = "And it's inefficient to keep a dead conversation going."
90001140-552 = "Agreed. Ms. Rio's weak point is difficult topics such as this one. I apologize on her behalf."
90001140-557 = "Toki, I understand that you have no ill intent, but saying such things in the current company, it makes Rio's position a bit..."
90001140-561 = "What's wrong, Himari? The fact that I'm not very adept with these types of conversations is the truth, isn't it?"
90001140-562 = "No... Right. I need to get used to it. I must. "
90001140-563 = "In order to protect my sanity, I must!"
90001140-564 = "[s] \"You have it rough, Himari...\""
90001140-565 = "I'm glad you're here, Sensei..."
90001140-567 = "I'd like to apologize to everyone. I've made many mistakes."
90001140-568 = "And if you see me on the verge of making another one...please tell me."
90001140-569 = "I'll do my best to accept...if it's within the limits of what's acceptable."
90001140-571 = "(It would've been nice if she didn't say the second part...)"
90001140-572 = "(*sigh* It's a huge improvement for Rio, but she still has a long way to go...)"
90001140-574 = "Rio, Sensei, why did you bring us all the way out here?"
90001140-575 = "Right. You used such secretive methods to get us here, too."
90001140-580 = "Oh, that's..."
90001140-581 = "[s] \"Right... We need to talk about that too.\""
90001140-583 = "Yes. Since we've finally all gathered, shall we break down the current situation, piece by piece?"
90001140-584 = "Feel free to raise your hand if you have any questions."
90001140-589 = "Whoa, Himari. You totally sounded like an old grandma—"
90001140-590 = "Sh-Shush! Sis! What if she heard that?!"
90001140-593 = "Next Episode;Snow Fight"

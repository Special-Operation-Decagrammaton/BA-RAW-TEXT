[translation]
90001140-1 = "第14話;會合"
90001140-4 = "老師？怎麼了嗎？"
90001140-5 = "[s]「想說莉央應該差不多要到了。」"
90001140-6 = "雖然是這樣沒錯，但大約還有5分鐘呢。"
90001140-10 = "您說這時候出來應該剛剛好？ "
90001140-11 = "這個嘛……考慮到是莉央大人，我認為他會分秒不差地抵達。"
90001140-12 = "在極少數的情況下，可能會提早1分鐘左右到達。"
90001140-13 = "[s]「陽葵？你不會冷嗎？」"
90001140-17 = "當然冷。非常非常冷。#n比綻放在崖上的清秀之花在清晨直面的冰霜還要冷！"
90001140-18 = "要我直接在裡面等？#n這個提議雖然十分合理，但這次我想反其道而行。"
90001140-19 = "誰叫某位會長大人不僅把這種任務推給我，還自顧自地躲了起來！"
90001140-20 = "現在他終於肯露臉了，我一定得親自見見他才行！"
90001140-24 = "否則我可能會因為極度的不滿跟憤怒睡不好覺！"
90001140-26 = "……老實說是想久違地見人家一面不就好了。"
90001140-27 = "不對不對！這完全是誤會！ "
90001140-28 = "我們都相處多久了，你居然還不了解我的想法嗎，英美！？"
90001140-29 = "（就是因為了解才會這麼說啊……）"
90001140-30 = "這麼說來，真是發生了很多事呢。"
90001140-31 = "雖然我是中途才加入的……"
90001140-32 = "不過我敢說自己與陽葵部長和英美的羈絆，是絕對不會輸給其他人的。"
90001140-33 = "[s]「哦，挺有自信的嘛。」"
90001140-34 = "那當然，老師。#n這種問題通常用氣勢和幹勁就能解決，這點我已經學會了。"
90001140-35 = "是跟誰學的？"
90001140-36 = "是從桃井身上學的。"
90001140-40 = "嗯……好吧。我被你說服了。"
90001140-42 = "話雖如此，特異現象搜查部確實是在莉央的要求下開始活動的社團呢。"
90001140-43 = "十字神名……"
90001140-46 = "「只要研究神，並證明其存在……就能分析並再現其構造。#n　換言之，這是創造新神的方法……」──"
90001140-47 = "根據這個假說製作的「絕對存在自律分析系統」。"
90001140-48 = "也就是「尋找神性的人工智慧」。"
90001140-51 = "一開始只有部長跟我兩個人而已。 "
90001140-52 = "後來英美把老師帶來了。"
90001140-53 = "從沙漠開始，經過工廠和廢墟之後……最終來到了這裡。"
90001140-55 = "我沒有特別想說的話，但一個人靜靜待著又很無聊，所以就隨便說點什麼吧。"
90001140-56 = "[s]「……過來這邊吧，季。我抓住你的手。」"
90001140-57 = "謝謝您。 "
90001140-63 = "我好像也莫名開始覺得那樣有點狡猾了。"
90001140-64 = "你們是什麼寵物嗎……"
90001140-65 = "總之我不想陷入「真是發生了很多事啊」，#n或者「回過頭來看就像一瞬間一樣呢」這種老套的回想當中。"
90001140-66 = "那一點都不適合我這種超天才清楚系病弱美少女！甚至還有點拖台錢的感覺！"
90001140-67 = "凡事都應該像高效迅速的駭入過程一樣──快速、俐落、不著痕跡地完成。"
90001140-73 = "在我們說話的時候，他好像到了呢。"
90001140-75 = "……？"
90001140-86 = "……"
90001140-87 = "……"
90001140-88 = "……"
90001140-89 = "？"
90001140-93 = "還搭著挺了不起的東西呢……？"
90001140-94 = "你說那艘運輸船嗎？其實也沒什麼大不了的。#n就算是大設備也能辦到小事情，不是嗎？"
90001140-95 = "而且還有改良和擴充的餘地。#n我本來打算準備得更周到一點……個人覺得有點可惜。"
90001140-96 = "嗯……我就當作你以自己的方式做了萬全的準備吧。"
90001140-97 = "[s]「歡迎你，莉央。我們都在等你哦。」"
90001140-101 = "老師……"
90001140-102 = "那個，我……"
90001140-104 = "歡迎您，莉央大人。#n準確來說，大家在5分鐘前就在等您了。"
90001140-106 = "季……"
90001140-111 = "……找到想做的事了嗎？"
90001140-112 = "想做的事啊……"
90001140-113 = "我……"
90001140-114 = "不方便回答的話也沒關係。"
90001140-115 = "看到現在的你，我也大致知道答案了。"
90001140-119 = "是嗎？"
90001140-120 = "嗯……雖然之前也提過，還是再讓我說一次吧。"
90001140-124 = "對不起，季。#n那全都是我的疏失。"
90001140-133 = "咦……？"
90001140-135 = "會長也進步了呢。"
90001140-136 = "[s]「好久沒看見讓人激動的場景了……」"
90001140-138 = "……請不要捉弄我了，老師。"
90001140-139 = "不是在捉弄我……？#n那，那好像更不好吧……？"
90001140-140 = "嗯？還有話要說？#n究竟是什麼事……？"
90001140-141 = "[s]「你仔細聽我說，莉央。而且要做好心理準備。」"
90001140-142 = "難道在我不知情的時候，世界末日已經提前到明天了嗎？"
90001140-143 = "[s]「也沒有那麼誇張啦。」"
90001140-145 = "[ns]「不過愛麗絲和遊戲開發部的人馬上就會來了。」"
90001140-149 = "……？"
90001140-153 = "……！"
90001140-154 = "我寧可明天就是世界末日！"
90001140-160 = "英美！季！"
90001140-161 = "知道了！"
90001140-166 = "準備應對。"
90001140-175 = "快放手！讓我回去！"
90001140-176 = "還有季，你不應該這樣對我吧？"
90001140-177 = "非常抱歉，莉央大人。#n不過這就是我現在想做的事。"
90001140-178 = "你剛才原來是這個意思嗎！？"
90001140-179 = "而且我明明聽說他們明天才會到啊！#n這顯然違反了我們的約定！"
90001140-184 = "你冷靜點，莉央。#n不管是現在來還是明天來，其實也沒有差很多吧？"
90001140-185 = "怎麼會沒有！多出來的時間可以用來做心理準備，或者思考要說的話！#n重點是居然沒有事先告知就把行程提前一天，這個決定實在太不合理了！"
90001140-186 = "我們只是順其自然而已。#n況且占星術的結果顯示，在今天的這個時間碰面是最吉利的。"
90001140-187 = "你還在迷信那種毫無意義的星座占卜嗎？"
90001140-188 = "我已經說過很多次了，占星術是藉由古代流傳下來的天體統計和事件……"
90001140-189 = "並透過哲學、數學和物理學，來探討決定命運的究竟是常數還是變數……#n可說是由世界上的所有理論堆疊而成的一門學問哦？"
90001140-194 = "那種事我才不在乎！"
90001140-202 = "哈啊，哈啊，哈啊……"
90001140-203 = "[s]「你還好嗎，會長……？」"
90001140-204 = "我一點也不好，老師……"
90001140-205 = "雖然我……做了很多亂七八糟的事……所以當然……必須付出代價……"
90001140-206 = "但我萬萬沒想到是透過這種方式……"
90001140-210 = "（莉央帶著埋怨的眼神看了過來）"
90001140-211 = "（雖然能夠理解他的心情，但還是覺得有點冤枉……）"
90001140-217 = "啊。"
90001140-218 = "哦～"
90001140-220 = "我們的可愛後輩，似乎來得正是時候呢。"
90001140-221 = "……！！！"
90001140-227 = "（直升機抵達了）"
90001140-231 = "（最先從裡面跑出來的是……！）"
90001140-235 = "老師！"
90001140-241 = "[ns]「愛麗絲！」"
90001140-242 = "（愛麗絲全力往懷裡衝了過來！）"
90001140-243 = "（老師差點就摔倒了！）"
90001140-246 = "你真的在這裡啊，老師！愛麗絲好想你哦！"
90001140-247 = "歡迎你來，可愛的愛麗絲。"
90001140-248 = "啊，季！很高興見到你！"
90001140-250 = "嗨，愛麗絲。"
90001140-254 = "那個……英美不冷嗎……？#n愛麗絲覺得現在有點冷……"
90001140-255 = "完全不會。我反而覺得涼涼的很舒服。"
90001140-256 = "那，那就好……"
90001140-261 = "歡迎你，愛麗絲。還有遊戲開發部的各位。"
90001140-265 = "是陽葵前輩！最近過得好嗎？#n黃色的外套真可愛！"
90001140-266 = "哎呀，謝謝你的讚美。#n愛麗絲果然是可愛的後輩呢。"
90001140-268 = "呀齁～我們來囉，老師！"
90001140-269 = "還有……其他人好像也很久不見了……"
90001140-270 = "你好，老師……來的路途真的好辛苦哦……"
90001140-271 = "我本來還以為是趟愉快的火車之旅，#n結果除了越來越冷之外，還必須轉乘好幾種交通工具，最後甚至還得搭直升機……"
90001140-272 = "而且我真沒想到，光是單程就得花費三天的時間……"
90001140-274 = "呵呵……有種在遊戲中長距離移動的感覺呢……"
90001140-278 = "哈啾！"
90001140-279 = "[s] 「還好嗎？」"
90001140-280 = "嗯，我沒事……#n嗚嗚，就跟老師說的一樣，這裡真的好冷哦……"
90001140-281 = "[s]「不過大家都穿著溫暖可愛的衣服過來了！」"
90001140-282 = "謝謝你，老師！#n其實這些衣服是綠挑的，而且設計跟正在製作中的遊戲防寒衣很類似哦！"
90001140-283 = "嗯！是款以冰海為舞台的動作冒險解謎回合制射擊遊戲！"
90001140-284 = "[s]「……那款遊戲真的沒問題嗎？」"
90001140-288 = "那，那，那當然囉！也不想想我是誰嘛，老師！"
90001140-289 = "唉……"
90001140-291 = "來來來，大家快進去吧。#n不過在那之前，我要先介紹最後一個人……"
90001140-295 = "……人呢？"
90001140-302 = "大家好。我是這個冰海基地的輔助演算支援A.I.。#n來到這裡真是辛苦你們了，遊戲開發部的各位。"
90001140-307 = "……"
90001140-308 = "……"
90001140-313 = "真是夠了……"
90001140-315 = "A.I.？是無人機嗎！？#n就是在遊戲裡會出現的那種，想讓人類滅亡的頭目！？"
90001140-316 = "姐姐，那再怎麼說都有點……"
90001140-317 = "但是這麼說也沒錯吧？#n我們之所以來到這裡，就是因為身分跟目的都不明的人工智慧……"
90001140-318 = "製造出了巨大機械怪獸打算做點什麼吧？"
90001140-320 = "說，說的也是……？"
90001140-321 = "不，各位聽我說，事情不是那樣的。#n其實……該從哪裡開始說明才好呢……"
90001140-323 = "請不必擔心。我是被創造出來幫助你們的，我會忠於這個角色。所以──"
90001140-327 = "莉央前輩！是莉央前輩對吧？"
90001140-333 = "咦？難道跟那時候一樣！？！？"
90001140-334 = "莉央會長，該不會又……"
90001140-336 = "這……會不會其實……是整人遊戲……？"
90001140-338 = "那個，我不是調月莉央……"
90001140-339 = "很高興能再見到你，莉央前輩。#n最近過得好嗎？"
90001140-340 = "……"
90001140-341 = "愛麗絲想跟那個時候一樣，透過通訊看看莉央前輩的臉。#n這次沒辦法嗎？"
90001140-342 = "那個……"
90001140-343 = "沒關係，愛麗絲知道莉央前輩有很多苦衷。#n應該是有不方便讓大家看到的東西吧。"
90001140-344 = "……！！！"
90001140-345 = "不過還是覺得有點可惜。#n愛麗絲在見到老師和大家的時候，本來還期待莉央前輩會不會也在這裡的。"
90001140-346 = "唔……！"
90001140-351 = "[ns]「先等我一下！」"
90001140-355 = "咦……？"
90001140-364 = "老，老師……"
90001140-370 = "[ns]「走吧，莉央。」"
90001140-371 = "可是，可是……！"
90001140-372 = "[s1]「別擔心，我會陪著你的。」\n[s2]「現在必須鼓起勇氣才行。」"
90001140-375 = "……！"
90001140-379 = "我，我知道了……！"
90001140-381 = "（抓著莉央的手走了出去）"
90001140-382 = "（幸好莉央乖乖跟了過來）"
90001140-389 = "啊！是莉央會長！"
90001140-390 = "唔，那個，這種時候該說什麼才好呢……"
90001140-391 = "你好，莉央會長。#n在各種意義上都好久不見了呢。"
90001140-392 = "啊嗚，那……那個……#n你好，莉央會長……？"
90001140-399 = "莉央前輩！"
90001140-404 = "啊……！？"
90001140-409 = "原來如此。#n對可愛的愛麗絲來說，這是常有的事吧。"
90001140-410 = "順帶一提，因為是在適合撫摸的高度，只要撫摸一下就會感到很療癒哦，莉央大人。"
90001140-413 = "是，是嗎……？"
90001140-415 = "只有愛麗絲有「可愛的愛麗絲」這個稱呼是不是有點奇怪？"
90001140-416 = "我明白了。那麼往後就稱呼你為「吵鬧的桃井」吧。"
90001140-417 = "不用了，還是算了吧……"
90001140-421 = "你聽我說，會長。#n唔嗯，雖然有很多話想說，但有件事我想先確認一下。"
90001140-426 = "如果又像「當時」一樣，必須為了世界犧牲某個人的話──你還會這麼做嗎？"
90001140-430 = "……"
90001140-432 = "姐，姐姐……？"
90001140-433 = "桃井……"
90001140-435 = "嗯～老實說我那時候還躺著，所以情況是後來才聽說的。#n但會長的意思說白了不就是那樣嗎？"
90001140-442 = "怎，怎樣啦，為什麼要用那種眼神看我！？#n這種事在遊戲裡也是時不時就會出現，大家應該都習慣了吧！？"
90001140-443 = "總之，雖然我不知道會長現在在做什麼，也不知道他跟老師有什麼打算……"
90001140-444 = "但如果會長的思考方式還是跟當時一樣，#n將來遇到類似問題的時候還是會選擇類似的解決方案吧？"
90001140-445 = "……"
90001140-447 = "姐，姐姐，你說得有點……"
90001140-448 = "你等等，綠。我覺得這點程度說出來也沒關係的。#n畢竟我當時可是昏迷了一段時間耶！"
90001140-452 = "咦，回頭想想，那天攻擊我的其實是愛麗絲……？"
90001140-453 = "不不不，再仔細想想那個人是Kei……嗯？#n所以到底是怎麼回事……？"
90001140-458 = "嗚啊！對不起，桃井！全都是愛麗絲的錯！"
90001140-459 = "沒，沒關係的……！#n反正事情都已經過了，現在我們大家都聚在這裡……！"
90001140-465 = "……"
90001140-467 = "總，總而言之！這種情節在遊戲中也經常出現！"
90001140-468 = "主張犧牲小我完成大我的人，#n遇到被犧牲的對象是自己的時候，很常會有醜態畢露逃之夭夭的情況。"
90001140-469 = "但是會長卻沒有那麼做。這點我也必須承認。"
90001140-473 = "現在這個都市本身將改變外貌。被扭曲為方舟這個新的概念。#n那樣的話……這奇普托斯……"
90001140-474 = "是我的錯……"
90001140-475 = "要是我沒有造出這個都市，從一開始就不會變成這樣了……"
90001140-476 = "所以必須，由我來阻止才行……"
90001140-478 = "那，那是什麼意思……？"
90001140-479 = "……就算只靠我一個人，也會阻止系統給你看的。"
90001140-480 = "如果我的一條命……能夠阻止世界滅亡的話，我會這麼做的──必須要這麼做！"
90001140-483 = "你是指那時候的事啊……"
90001140-484 = "不過就算是這樣，我認為我們也該知道會長究竟會不會做出那種選擇。"
90001140-485 = "因為這是重要的問題。"
90001140-486 = "……當然，如果我的命能阻止滅亡的話，我現在也依舊認為應該那麼做。#n但是……"
90001140-487 = "嗯，如果像當時一樣，無論是愛麗絲還是季……不，不對，就算是其他人也一樣。"
90001140-488 = "這次我會試著找出其他辦法──直到最後的最後為止。"
90001140-489 = "……"
90001140-490 = "我總是太快定下結論並開始行動……而且一直認為這是最合理的方式。"
90001140-491 = "但是……如果還有一絲可能就不該放棄。"
90001140-492 = "因為有些東西……是絕對無法挽回的。"
90001140-498 = "不，只有這樣是不行的，莉央前輩。"
90001140-503 = "愛，愛麗絲……？"
90001140-508 = "謝謝你願意為他人著想。#n聽見莉央前輩這麼說，愛麗絲真的覺得很開心。"
90001140-509 = "但是莉央前輩沒有包含在對象中這點……讓愛麗絲非常難過……"
90001140-510 = "但是，我……"
90001140-515 = "愛麗絲希望莉央前輩也能獲得機會。"
90001140-520 = "因為無論是多麼困難的遊戲，第2次的表現通常都會更好的！"
90001140-525 = "這個比喻相當不錯呢，愛麗絲。"
90001140-527 = "……"

[translation]
1104-1 = "供給部襲擊事件"
1104-2 = "今天的供餐也好難吃！話說不是有荷包蛋嗎，荷包蛋在哪！？"
1104-3 = "是不是這個呢，雖然是水煮蛋。不過供應表上確實是寫著「荷包蛋」……"
1104-4 = "吵死了！別吵了給我吃！水煮蛋也很好吃吧！"
1104-5 = "就是說呀，不吃的話可以給我嗎？因為，我喜歡吃水煮蛋。"
1104-7 = "雖然水煮蛋沒有罪，不過這又是別的問題呢。"
1104-8 = "明明供應表上確實的寫著荷包蛋，出來的卻是水煮蛋。"
1104-9 = "沒有對食物該有的禮儀。"
1104-10 = "來，我們去供給部吧！"
1104-12 = "（供給部．調理室）"
1104-13 = "……我知道，我知道啦。但是，要我一個人在2小時內做4000個荷包蛋真的沒辦法。而且茱莉今天也休息……"
1104-14 = "況且也沒有油，平底鍋也只有一個……"
1104-15 = "是的，我就知道是那種原因。"
1104-17 = "因為沒辦法，就讓我們來幫忙吧。從現在開始來做荷包蛋吧。"
1104-18 = "油我也帶來了。"
1104-19 = "……咦？"
1104-20 = "親切的美食研究會，幫助困擾中的供給部的美麗光景……"
1104-21 = "這就是友情呢☆"
1104-22 = "唉，真是沒辦法呢。雖然我早就知道會變成這樣。"
1104-23 = "那就，久違的展現一下身手吧。"
1104-24 = "咦，等，等等！？擅自亂摸的話……！"
1104-27 = "哇～！這個蛋，全部都可以吃嗎？"
1104-28 = "泉等等！首先要做才行！那之後才能吃！"
1104-29 = "沒問題，因為我最喜歡生雞蛋拌飯了！"
1104-30 = "從這裡稍微拿走一些～……"
1104-31 = "啊，啊咧？"
1104-33 = "（喀鏘！！）"
1104-34 = "唔哇啊啊！雞蛋好浪費！！"
1104-35 = "淳子同學腳邊！那裡有油……！！"
1104-36 = "咦？唔哇啊！？腳底好滑……！？"
1104-38 = "救，救救我！？"
1104-41 = "咦，咦咦？接，接住了！"
1104-42 = "啊咧？停不下來呢？"
1104-45 = "羽留奈同學，危險！請躲開！！"
1104-46 = "………！！！"
1104-49 = "（喀鏘！）"
1104-50 = "啊啊，雞蛋弄得全身黏黏的……！"
1104-51 = "等，餐具櫃是不是傾斜了！？躲開！有什麼很大的袋子要……！！"
1104-52 = "（碰咚碰咚……！）"
1104-54 = "（咳咳，咳咳！）"
1104-55 = "唔哇！這是什麼，雞蛋加上小麥粉？我們是正要下鍋的狀態？"
1104-56 = "咳咳，咳咳！泉妳不要動！亂動的話反而更纏在一起！"
1104-57 = "這樣下去的話整個美食研究會，就要變成了巨大章魚燒呢……"
1104-58 = "章魚燒的材料嗎……嘛，那樣也……"
1104-59 = "我不要章魚燒！雖然我喜歡章魚燒，但是我不想變成章魚燒～！"
1104-61 = "（喀鏘！！）"
1104-62 = "（掙扎掙扎）"
1104-63 = "（咚──！）"
1104-66 = "………………"
1104-68 = "供給部襲擊事件"

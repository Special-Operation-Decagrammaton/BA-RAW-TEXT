[translation]
1104-1 = "เหตุลอบทำร้ายชมรมโภชนาการ"
1104-2 = "วันนี้อาหารก็ไม่อร่อยอีกล่ะ! ไหนว่าจะมีไข่ดาวไง! ไหนล่ะไข่ดาวน่ะ!!"
1104-3 = "นี่มันไข่ต้มไม่ใช่เหรอ ทำไมถึงเสิร์ฟของแบบนี้กันล่ะ? ก็ในใบเมนูวันนี้เขียนไว้ว่า..."
1104-4 = "หนวกหูจริงๆ เลย! ค่อยๆ กินสิ! ไข่ต้มก็อร่อยเหมือนกันนั่นแหละ!"
1104-5 = "ใช่แล้วล่ะ ถ้าไม่กินงั้นก็เอาให้ฉันได้ไหมคะ? ฉันชอบไข่ต้มที่สุดเลยค่ะ"
1104-7 = "ไม่ใช่ปัญหาพวกนั้นหรอกค่ะ"
1104-8 = "ในเมนูเขียนเอาไว้ชัดเจนว่าเป็นไข่ดาว แต่กลับได้เป็นไข่ต้มแทน..."
1104-9 = "นี่มันไม่ใช่มารยาทที่ดีต่ออาหาร หรือมารยาทที่ดีต่อนักเรียนคนอื่นๆ เลยนะคะ "
1104-10 = "ฉันทนไม่ได้จริงๆ ฉันจะไปประท้วงที่ชมรมโภชนาการเองค่ะ! "
1104-12 = "(ห้องทำอาหาร ชมรมโภชนาการ)"
1104-13 = ".....ฉันรู้แล้ว บอกว่ารู้แล้วไง แต่จะให้ทำไข่ดาว 4000 ฟองภายในสองชั่วโมงน่ะเป็นไปไม่ได้หรอก#nวันนี้จูริก็ลาหยุดด้วย"
1104-14 = "กระทะก็มีแค่ใบเดียว แถมน้ำมันพืชก็หมดแล้วด้วย"
1104-15 = "ฉันคิดแล้วว่าคงเป็นเพราะเรื่องนั้นค่ะ"
1104-17 = "ช่วยไม่ได้นะ ถ้างั้นพวกเราจะช่วยเองค่ะ ตอบแทนด้วยการทำไข่ดาวให้เราก็พอ"
1104-18 = "เราเอาน้ำมันพืชติดมาด้วยนะคะ"
1104-19 = "...หือ?"
1104-20 = "อุ๊ย ชมรมนักชิมที่แสนใจดีกำลังช่วยชมรมโภชนาการที่เจอปัญหาอยู่ล่ะ..."
1104-21 = "นี่คือมิตรภาพสินะคะ☆"
1104-22 = "จริงๆ เลย ช่วยไม่ได้นะ คิดแล้วว่าต้องเกิดเรื่องแบบนี้ "
1104-23 = "ถ้างั้นมาแสดงฝีมือทำอาหารกันหน่อยไหม?"
1104-24 = "อะไรน่ะ?! ดะ.. เดี๋ยวก่อน!?! อย่ามาจับตามอำเภอใจสิ...?!"
1104-27 = "ว้าว ถ้างั้นฉันกินไข่ดาวที่อยู่ตรงนี้ได้หมดเลยใช่ไหม?"
1104-28 = "หยุดก่อน! ต้องลงมือทำอาหารก่อน แล้วค่อยกินสิ! "
1104-29 = "ไม่เป็นไร ฉันชอบกินข้าวคลุกไข่ดองซีอิ้วนะ!"
1104-30 = "ตระกร้าใส่ไข่นี่..."
1104-31 = "เอ๋??"
1104-33 = "(โครม-!!)"
1104-34 = "อ๊าาา ไข่ที่อุตส่าห์เก็บไว้!!"
1104-35 = "คุณจุนโกะคะ! ข้างล่างนั่น!! นั่นมันกองขวดน้ำมัน...!!"
1104-36 = "หา? อ๊ายยยยย! ทำไมลื่นจัง?!"
1104-38 = "จะ...จับเอาไว้ ฮารุนะ!"
1104-41 = "โอ๊ะ? โอ้ๆ ฉันจับได้แล้วค่ะ! "
1104-42 = "ตายจริง? ยังไม่หยุดอีกเหรอคะ?"
1104-45 = "คุณฮารุนะ! ตรงนั้นมันอันตรายนะคะ! หลบไปค่ะ! เข้าไปซ่อนเร็ว!!"
1104-46 = ".....!!"
1104-49 = "(กรี๊ดดดด!)"
1104-50 = "อ่า... ไข่ขาวกระเด็นใส่ตัวจนเหนียวไปหมดทั้งตัวแล้ว...!"
1104-51 = "อ๊าาาาาาา!? เดี๋ยวก่อน! ตู้เก็บจานมันเอียงอยู่นะ? กะ...กรี๊ด! ระวังนะ! ถุงแป้งนั่น...!! "
1104-52 = "(ตึงงงง!!)"
1104-54 = "(แค่กๆ แค่กๆ!)"
1104-55 = "(ดิ้นขลุกขลัก) อื้อออ นี่มันอะไรเนี่ย? แป้งผสมไข่งั้นเหรอ นี่พวกเราถูกเอามาผสมในแป้งเหรอ?"
1104-56 = "แค่กๆ แค่กๆ อย่าขยับนะ อิซุมิ! ถ้าขยับจะยิ่งเข้าไปติดมากขึ้นนะ!"
1104-57 = "ถ้าปล่อยไว้แบบนี้ ชมรมชิมอาหารจะต้องกลายเป็นทาโกะยากิยักษ์แน่ๆ เลย!!"
1104-58 = "อื้อ... หรือคิดว่าฉันเป็นวัตถุดิบใช้ทำทาโกะยากิงั้นเหรอ? แบบนี้มัน..."
1104-59 = "กรี๊ดดดด! ฉันไม่ชอบทาโกะยากิ! ไม่สิ ฉันชอบกินนะ แต่ไม่อยากถูกจับไปทำเป็นทาโกะยากิ!!"
1104-61 = "(โครม-!!)"
1104-62 = "(ดิ้นขลุกขลักๆ)"
1104-63 = "(ตู้มมมม!)"
1104-66 = "......"
1104-68 = "เหตุลอบทำร้ายชมรมโภชนาการ"

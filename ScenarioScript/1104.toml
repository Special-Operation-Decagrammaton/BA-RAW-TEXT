[translation]
1104-1 = "Foray into the School Lunch Club"
1104-2 = "Lunch sucks today too! I was told there would be a fried egg! Where is it?!"
1104-3 = "This is a hard-boiled egg. Why would they give us this? The menu said..."
1104-4 = "You're so annoying! Just eat it! Hard-boiled eggs are good too!"
1104-5 = "Right. If you're not going to eat it, then give it to me. I like hard-boiled eggs."
1104-7 = "That's not the issue at hand."
1104-8 = "That we were served hard-boiled eggs when the menu said fried eggs..."
1104-9 = "...is not only a disservice to the students but to the food as well."
1104-10 = "This is unacceptable. I'm going to complain to the School Lunch Club!"
1104-12 = "(The School Lunch Club Kitchen)"
1104-13 = "I know, I know. But I can't make 4,000 fried eggs in two hours all by myself. Especially since Juri is absent today."
1104-14 = "I have no cooking oil and only one frying pan."
1104-15 = "I had assumed it was something like that."
1104-17 = "Then, you leave us with no choice. Allow us to help. We can make those fried eggs."
1104-18 = "We even brought our own cooking oil."
1104-19 = "Are you serious?"
1104-20 = "The kind Gourmet Research Society is helping the School Lunch Club in its hour of need. What a sight."
1104-21 = "Now that's friendship. ☆"
1104-22 = "Ugh, fine. I had a feeling you were scheming something like this."
1104-23 = "So is it time to show off our cooking skills?"
1104-24 = "What?! W-Wait! Don't touch things without my permission!"
1104-27 = "Wow! So, do we get to eat all these eggs?"
1104-28 = "Hey, hold on! We have to cook them first! Eating comes later!"
1104-29 = "I don't mind. I always add a raw egg to my rice."
1104-30 = "Let's just take this egg basket..."
1104-31 = "O-Oh?!"
1104-33 = "*CRASH*"
1104-34 = "Ugh, the eggs! What a waste!"
1104-35 = "Watch your step, Junko! The cooking oil...!"
1104-36 = "What? U-Ugh! It's so slippery!"
1104-38 = "G-Grab my hand, Haruna!"
1104-41 = "O-Oh? I got it!"
1104-42 = "Oh, my! It won't stop!"
1104-45 = "It's dangerous over there, Haruna! Go to the corner!"
1104-46 = "...!"
1104-49 = "*crash*"
1104-50 = "Ugh. There's egg all over me!"
1104-51 = "Wait! The cupboard is tilting! Wh-Whoa! Watch out for that flour sack! "
1104-52 = "*thump* *bang*"
1104-54 = "*cough* *cough*"
1104-55 = "*floundering* Ugh, what is this? Eggs and flour... It's like we're being kneaded into dough."
1104-56 = "*cough* *cough* Don't move, Izumi! The more you move, the stickier it gets!"
1104-57 = "The Gourmet Research Society will be one giant takoyaki at this rate!"
1104-58 = "Hmm. This time it will be us filling the takoyaki rather than the other way around. How profound..."
1104-59 = "Aaah! I don't want takoyaki! I mean, I like eating it, but I don't wanna BE it!"
1104-61 = "*CRASH*"
1104-62 = "*floundering*"
1104-63 = "*thump*"
1104-66 = "..."
1104-68 = "Foray into the School Lunch Club"

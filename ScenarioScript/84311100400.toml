[translation]
84311100400-5 = "辛苦了。還有，對不起。"
84311100400-6 = "包含警報在內的後續情況，完全令我始料未及。#n我應該掌握得更清楚才對……"
84311100400-7 = "再次真心向你們道歉。#n是我害你們兩個陷入了危險。"
84311100400-8 = "我認為你不需要道歉。#n反而應該說一直以來都太過完美了才對。一般的潛入就該是這種感覺。"
84311100400-9 = "……不是，你怎麼把我想說的話都說完了啊？#n而且那種事你又是怎麼知道的？"
84311100400-10 = "雖然時間短暫，不過這次我在處理事情的時候，也遇過幾次例外的情況。"
84311100400-15 = "……我說。"
84311100400-16 = "……你想不想來C&C啊？"
84311100400-21 = "寧瑠……！對方可是三一茶會的首長之一！#n那種話是有可能演變成學園間的問題的啊……！"
84311100400-23 = "沒事沒事，絕對不會發展成那樣的。#n我就當作是個單純的稱讚吧。謝謝你，寧瑠。"
84311100400-24 = "那純粹是對我的賞識，因此我會開心地接受。"
84311100400-25 = "他實際上也是那個意思吧。#n並不是真的要請我過來。"
84311100400-26 = "算是吧。會真的以為我在邀請你來的笨蛋，八成就只有莉央而已了。"
84311100400-28 = "…………"
84311100400-29 = "展示場的加強戒備，似乎是研討會的計畫。"
84311100400-30 = "看來是與貝里塔斯……甚至是特異現象搜查部合作，對監視系統進行了強化。"
84311100400-34 = "莉央……？你的語氣好像有點變了耶。"
84311100400-35 = "因為他在生氣啦，不用理他沒關係。"
84311100400-37 = "不，我並沒有生氣。#n就算你想用那種幼稚膚淺的話刺激我也沒用。"
84311100400-42 = "確實生氣了呢。"
84311100400-43 = "我就說吧。"
84311100400-45 = "都說了沒有。"
84311100400-50 = "……我才沒有生氣。"
84311100400-53 = "（之後兩人安撫了氣呼呼的莉央，和平地解散了）"

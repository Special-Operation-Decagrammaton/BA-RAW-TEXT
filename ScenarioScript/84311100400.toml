84311100400-5 = "3;리오;06;고생했어. 그리고 미안해.\n#3;a"
84311100400-6 = "3;리오;07;경보를 포함해 그 이후의 상황들은 나조차도 전혀 예상하지 못했던 부분이야. 조금 더 면밀이 파악을 했어야 하는데……\n#3;em;[세로선]"
84311100400-7 = "3;리오;99;다시 한번 정말로 미안해. 내가 두 사람을 위험에 빠뜨렸어.\n#3;greeting"
84311100400-8 = "3;세이아;02;사과하실 일은 아니라고 생각해요. 오히려 지금까지가 너무 완벽했던 거고, 보통의 잠입은 이런 느낌일 테니까요."
84311100400-9 = "5;네루 교복;00;……? 뭐야, 왜 내가 할 말을 네가 해? 그리고 그걸 어떻게 알았어?\n#5;em;[?]\n#5;al\n#3;m1"
84311100400-10 = "3;세이아;01;짧긴 하지만, 저도 이번 일들을 하며 예외적인 상황들을 몇 번 봐 왔으니까요."

84311100400-23 = "4;네루 교복;01\n1;세이아;04;아뇨, 아뇨. 전혀 그런 일로 이어지진 않습니다. 순수한 칭찬으로 듣고 감사드릴게요, 네루.\n#1;em;[땀]"

[translation]
84311100400-5 = "Great work. And...sorry."
84311100400-6 = "I didn't predict the alarm, or...any of the rest of that. I should have been more thorough."
84311100400-7 = "Again, I'm truly sorry for leading you both into danger."
84311100400-8 = "I don't think you need to apologize for that. You could say that we'd been extremely lucky on all our other infiltrations thus far, and this one was actually much more typical."

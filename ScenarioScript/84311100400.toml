[translation]
84311100400-5 = "ทำได้ดีมากเลย แล้วก็ขอโทษด้วยนะ"
84311100400-6 = "ทั้งเรื่องสัญญาณเตือนภัยและสถานการณ์หลังจากนั้นเป็นสิ่งที่ฉันเองก็คาดไม่ถึงเหมือนกัน ฉันควรจะรอบคอบให้มากกว่านี้แท้ๆ..."
84311100400-7 = "ฉันขอโทษจริงๆ ที่ทำให้ทั้งสองคนต้องตกอยู่ในอันตรายนะ"
84311100400-8 = "ฉันไม่คิดว่านี่เป็นเรื่องที่ต้องขอโทษหรอกค่ะ ที่ผ่านมาเราทำภารกิจกันอย่างสมบูรณ์แบบมากต่างหาก ปกติแล้วการแทรกซึมมันก็ต้องเจอเรื่องแบบนี้บ้างละค่ะ"
84311100400-9 = "อะไรกัน...? ทำไมเอาบทพูดของฉันไปเฉยเลย? อีกอย่าง เธอรู้เรื่องนั้นได้ยังไง?"
84311100400-10 = "ถึงจะเป็นระยะเวลาสั้นๆ แต่ฉันก็ได้เจอสถานการณ์ที่คาดไม่ถึงระหว่างทำงานที่นี่อยู่หลายครั้งค่ะ"
84311100400-15 = "นี่..."
84311100400-16 = "สนใจอยากมาอยู่ C&C มั้ยล่ะ...?"
84311100400-21 = "เนรุ...! เซอาเป็นหนึ่งในคนใหญ่คนโตของสภาน้ำชาแห่งทรีนิตี้เลยนะ! พูดแบบนั้นเดี๋ยวก็ทำให้เกิด#nปัญหาระหว่างโรงเรียนหรอก...!"
84311100400-23 = "ไม่ค่ะ ไม่เลย ไม่มีทางเกิดเรื่องแบบนั้นหรอกค่ะ ฉันจะคิดว่านั่นเป็นคำชมจากคุณค่ะ เนรุ"
84311100400-24 = "ฉันจะมองว่าคุณเห็นความสามารถของฉัน และจะดีใจอยู่ทางนี้แล้วกันค่ะ"
84311100400-25 = "ฉันรู้ว่าที่พูดแบบนั้นเพราะจะชมกันค่ะ ไม่ได้จะชวนฉันมาเป็น C&C จริงๆ หรอก"
84311100400-26 = "ก็นะ มันก็จริงของเธอ คนที่เชื่อว่าฉันพูดอย่างนั้นเพราะอยากชวนมาใส่ชุดเมดจริงๆ ก็คงจะมีแต่ริโอะน่ะ"
84311100400-28 = "..."
84311100400-29 = "ดูเหมือนว่าการเพิ่มการรักษาความปลอดภัยในห้องสาธิตจะเป็นฝีมือของเซมิน่านะ"
84311100400-30 = "ฉันเดาว่าคงได้รับความร่วมมือจากเวอริทัส... หรือไม่ก็ชมรมปรากฏการณ์ลี้ลับในการเพิ่มความ#nเข้มงวดในระบบเฝ้าระวัง"
84311100400-34 = "ริโอะ...? ทำไมน้ำเสียงเปลี่ยนไปละค่ะ"
84311100400-35 = "เพราะงอนตุ๊บป่องยังไงล่ะ ไม่ต้องใส่ใจหรอก"
84311100400-37 = "เปล่า ฉันไม่ได้งอนสักหน่อย ยั่วยุฉันด้วยคำพูดเด็กๆ แบบนั้นไปก็ไม่มีประโยชน์หรอก"
84311100400-42 = "งอนจริงด้วยค่ะ"
84311100400-43 = "บอกแล้วไงว่างอน"
84311100400-45 = "ก็บอกว่าไม่ใช่ไง"
84311100400-50 = "ไม่ใช่สักหน่อย..."
84311100400-53 = "(หลังจากช่วยปลอบใจริโอะที่งอนแต่ไม่ยอมรับ ทุกคนก็แยกย้ายกันไปด้วยดี)"

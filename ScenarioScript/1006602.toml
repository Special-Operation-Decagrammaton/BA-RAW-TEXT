[translation]
1006602-1 = "Maid vs Pinch!"
1006602-2 = "I hurried to the Game Development Department club room."
1006602-9 = "Game Development Department Club Room"
1006602-10 = "[ns] \"Aris?\""
1006602-11 = "Hero... You have reached me, at long last..."
1006602-12 = "[s1] \"Of course. I was worried about you, Aris.\"\n[s2] \"Aris... where are you?\""
1006602-15 = "You must go back, hero... I cannot meet with anyone as of now..."
1006602-16 = "[s] \"Are you actually in trouble?\""
1006602-17 = "..."
1006602-18 = "[s3] \"If you are, let's resolve it together.\"\n[s4] \"I want to help you.\""
1006602-29 = "You are not playing fair, Sensei... If you say that, I have to come out..."
1006602-30 = "[s] \"Oh... Hi, Aris. You're wearing a maid costume! What's that for?\""
1006602-31 = "*sob* Sensei, you said the cursed word, \"maid\"!"
1006602-32 = " I cannot take this maid costume! It simply does not work!"
1006602-33 = "I did not even want to wear it, but only wore it because you said you were coming..."
1006602-34 = "...So you must take your responsibility for what I have become!"
1006602-40 = "Sensei! Please do a head pat!"
1006602-42 = "I gave Aris a head pat, per her request."
1006602-43 = "Aris seemed to have calmed down a bit."
1006602-45 = "[ns] \"So Aris, would you explain what happened?\""
1006602-46 = "Well..."
1006602-50 = "[ns5] \"So... You had nothing else to wear...?\"\n[ns6] \"The maid costume was the only outfit you had left?\""
1006602-53 = "Yes... Other clothes are being washed, and I was left with this maid costume..."
1006602-54 = "But the maid costume is a cursed armor! It is going to decrease all my stats!"
1006602-55 = "An intense fight from the past, a one-on-one battle against Neru, falling party members..."
1006602-56 = "An unexpected scene that was good, a still image and a celebration of tears, the sky whale flying into the sunset at the end, and a special commercial for a moment of advertising..."
1006602-57 = "[s7] \"Right, I remember that. Most of it.\"\n[s8] \"One thing seems a bit out of place...?!\""
1006602-60 = "Anyways! Ever since then, my synergy with the maid costume is at its worst..."
1006602-61 = "My body is not moving as I wish... My limbs are shaking, and I am full of fear rather than courage..."
1006602-62 = "*sob* This way... I cannot fulfill my quest as a hero anymore..."
1006602-63 = "[s] \"Then, Aris!\""
1006602-64 = "...?"
1006602-65 = "[s] \"Let's overcome the maid costume together!\""
1006602-66 = "Overcome...? How...?"
1006602-67 = "Will I be changing classes to a maid, as I am dressed as one?"
1006602-68 = "[s9] \"Right! You can change your class to a maid!\"\n[s10] \"You can level back up and regain your stats.\""
1006602-71 = "Um... I do not know if I can...but I will trust you, Sensei."
1006602-72 = "Actually I DO trust you!"
1006602-73 = "Then, what should I do next...?"
1006602-74 = "[s] \"Maybe something a maid would do usually?\""
1006602-75 = "Something a maid would do?"
1006602-79 = "I know that a maid usually...cleans."
1006602-80 = "Other duties include combat, destruction and infiltration..."
1006602-81 = "Hmm? Do not think about other duties for now?"
1006602-82 = "Then... I shall begin cleaning first!"
1006602-86 = "Oh no! There are too many to clean up!"
1006602-87 = "The empty bottles are rolling around, empty bags of chips are everywhere, and the club room is full of dust!"
1006602-88 = "Do you think I can clean all of that, Sensei?"
1006602-89 = "[s] \"One by one, step by step. Let's do it.\""
1006602-90 = "Understood... I shall clean them up one by one..."
1006602-92 = "Sensei, could you give me a trash bag? One is not enough. I need several!"
1006602-94 = "Crumbs have fallen out of the empty bags of chips! I need a vacuum cleaner! Help!"
1006602-96 = "*cough* *cough* I tried to shake the dust off, but more dusts have come out! I must bring the dusts down with a bucket of water!"
1006602-97 = "What? I cannot splash water as I wish since we are indoors?"
1006602-98 = "That is right..."
1006602-100 = "Somehow, I managed to clean up the club room with Aris."
1006602-106 = "..."
1006602-107 = "Sensei! We have finally completed cleaning the club room! It is clean now!"
1006602-108 = "[ns] \"And you seem to have gotten used to the maid costume as well.\""
1006602-109 = "Oh? Now that you mention it..."
1006602-110 = "This is amazing, Sensei! I am not shaking anymore! I am feeling good, too!"
1006602-111 = "It must be because I have finished the cleaning quest as a maid, and leveled up to regain my stats!"
1006602-112 = "[s] \"I'm glad it helped.\""
1006602-113 = "Oh, I would have been defeated a long time ago with my lowered stats if you did not help me, Sensei!"
1006602-114 = "You surely know everything, Sensei! Yay!"
1006602-116 = "And then, I played games with Aris, who was much happier than when I first saw her."

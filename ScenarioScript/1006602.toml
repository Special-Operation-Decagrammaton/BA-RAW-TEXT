[translation]
1006602-1 = "女僕大危機！"
1006602-2 = "（連忙趕到了遊戲開發部的部室）"
1006602-9 = "遊戲開發部．社辦"
1006602-10 = "[ns]「愛麗絲，你沒事吧？」"
1006602-11 = "勇者啊，你真的來了啊……"
1006602-12 = "[s1]「那當然囉，我很擔心你。」\n[s2]「不過，你究竟在哪裡呢……？」"
1006602-15 = "勇者啊，立刻回到原先的地方去吧……#n現在的愛麗絲無法出現在你的面前……"
1006602-16 = "[s]「說真的，發生什麼事了？」"
1006602-17 = "……"
1006602-18 = "[s3]「遇到問題的話，希望你能告訴我。」\n[s4]「我想幫上愛麗絲的忙。」"
1006602-29 = "…………老師真狡猾。#n聽到那種話，愛麗絲就只能服從了。"
1006602-30 = "[s]「咦……？女僕裝……？」"
1006602-31 = "嗚嗚……請不要露出那種表情……"
1006602-32 = "愛麗絲也還，不太能接受女僕裝……"
1006602-33 = "所以本來不打算穿的，都是因為老師說要來──！"
1006602-34 = "老師！請負起責任！"
1006602-40 = "首先要摸摸愛麗絲的頭！"
1006602-42 = "（摸了摸愛麗絲的頭）"
1006602-43 = "（愛麗絲稍微冷靜下來了！）"
1006602-45 = "[ns]「所以……發生什麼事了？」"
1006602-46 = "其實……"
1006602-50 = "[ns5]「所以，你現在能穿的衣服……」\n[ns6]「就只剩下女僕裝了？」"
1006602-53 = "是，所有其他的衣服都在清洗中……"
1006602-54 = "但是，愛麗絲還是有點抗拒女僕裝……"
1006602-55 = "因為一看見它就會想起各種事情。#n激烈的戰鬥、倒下的夥伴們、衝過來的寧瑠前輩──"
1006602-56 = "留在心中的場景、感動的一幕、夕陽以及鯨狀雲，#n接著撥放起了CM……"
1006602-57 = "[s7]「確實發生過各種事呢……」\n[s8]「感覺好像混進了其他東西……」"
1006602-60 = "總之也許是因為那時候的事，只要一穿上女僕裝，#n愛麗絲就會無法隨心所欲地活動。"
1006602-61 = "簡直就像裝備了「會施加讓所有數值降低的減益效果」的詛咒裝備一樣……"
1006602-62 = "現在愛麗絲已經知道寧瑠前輩不是可怕的人，也想喜歡上前輩所穿的衣服……#n不知道該如何是好……嗚嗚。"
1006602-63 = "[s]「那麼，愛麗絲！」"
1006602-64 = "……？"
1006602-65 = "[s]「轉職成女僕吧！」"
1006602-66 = "轉職，是嗎？"
1006602-67 = "為什麼突然這麼說……？"
1006602-68 = "[s9]「轉職成女僕，接著累積經驗值的話，」\n[s10]「應該就能學會專屬技能，解除減益效果了才對！」 "
1006602-71 = "這樣就能克服女僕……真，真的嗎……？"
1006602-72 = "……不過，愛麗絲想相信老師說的話！"
1006602-73 = "可是，該從哪裡開始才好呢？"
1006602-74 = "[s]「嘗試女僕可能會做的事怎麼樣？」"
1006602-75 = "女僕可能會做的事……？"
1006602-79 = "嗯……說到女僕……經常在打掃。"
1006602-80 = "此外，還有戰鬥或破壞……潛入等等……"
1006602-81 = "……咦？不用在意那些是嗎？"
1006602-82 = "那麼愛麗絲決定從打掃開始！"
1006602-86 = "嗚哇～！有太多東西要清了！"
1006602-87 = "滾來滾去的寶特瓶、四散各處的零食袋、全是灰塵的地板……"
1006602-88 = "真的……能清乾淨嗎……？"
1006602-89 = "[s]「一點一點慢慢來吧……」"
1006602-90 = "是……愛麗絲會加油的……"
1006602-92 = "老師，請幫愛麗絲準備垃圾袋。#n一個……不，大概需要三個。"
1006602-94 = "啊啊，零食的碎屑灑出來了！#n還需要吸塵器！"
1006602-96 = "哈啾！輕輕一撢就全都是灰塵……#n那個，要先用桶子把水……！"
1006602-97 = "咦？#n……乾擦比較適合？"
1006602-98 = "原來如此……"
1006602-100 = "（跟愛麗絲一起拚命打掃了部室……）"
1006602-106 = "……"
1006602-107 = "老師，部室變乾淨了！掃除任務完成了！"
1006602-108 = "[ns]「而且愛麗絲好像也可以正常活動了呢。」"
1006602-109 = "咦……？"
1006602-110 = "真，真的耶！愛麗絲的手腳已經不會發抖了！狀態絕佳！"
1006602-111 = "是因為完成任務提升了等級，獲得了專屬技能嗎！？"
1006602-112 = "[s]「一定是這樣沒錯，太好了呢。」"
1006602-113 = "都是多虧了老師！#n愛麗絲現在穿著女僕裝也能自由活動了！"
1006602-114 = "老師果然很厲害！"
1006602-116 = "（之後，和興高采烈的愛麗絲一起玩了遊戲）"

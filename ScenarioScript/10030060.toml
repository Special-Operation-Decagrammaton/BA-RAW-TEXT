[translation]
10030060-1 = "第6話;靈魂雞肉火鍋"
10030060-4 = "……鍋子在喀噠作響。"
10030060-5 = "好香……"
10030060-7 = "前輩，我們處理材料的時候你就在做料理了嗎？"
10030060-8 = "我只做了高湯而已。#n因為熬湯需要花很多時間。"
10030060-9 = "我看看……"
10030060-15 = "咦？鍋子裡只裝了海帶和香菇……"
10030060-16 = "剛才帶來的食材包裡不是有雞肉嗎？"
10030060-17 = "還得等一下。#n現在還不到放肉的時候。"
10030060-22 = "趁著熬湯的時候把雞翅和瘦肉切成一口大小，然後做成肉串……"
10030060-26 = "接著用炭火把雞皮烤脆……"
10030060-28 = "火會不會有點強？#n再烤下去感覺會燒焦……"
10030060-29 = "別擔心，只是稍微烤一下皮的部分而已。"
10030060-30 = "把雞皮中的脂肪融化後放入鍋裡，為湯增添濃郁的風味。"
10030060-31 = "等雞湯熬好，再把處理好的蔬菜和香菇放進去煮一下就行了。"
10030060-32 = "[s1]「放進雞肉和蔬菜燉煮成清燉火鍋……」\n[s2]「是想做水炊雞肉鍋吧。」"
10030060-35 = "嗯，老師答對了。"
10030060-36 = "水炊雞肉鍋……？"
10030060-37 = "是以雞肉為主體，加入各種材料燉煮而成的地方火鍋料理。"
10030060-38 = "我之前去離D.U.很遠的通訊公司當安全顧問的時候偶然吃過一次。#n因為比想像中還好吃，所以常常一個人做來吃。"
10030060-39 = "如果要在寒冷的天氣露營，我想比起咖哩或燉菜，有熱湯的火鍋會比較好。"
10030060-40 = "雖然材料看起來平平無奇……"
10030060-42 = "味道真不錯呢。"
10030060-43 = "……難怪肚子突然餓起來了。"
10030060-50 = "雞好像煮熟了……差不多可以吃了吧？"
10030060-67 = "先從湯開始喝吧，然後再配一口肉。"
10030060-71 = "哇……好暖和……"
10030060-72 = "可能是因為這裡很冷的關係，感覺湯喝起來更濃郁香醇……"
10030060-73 = "每咬一口雞翅就會釋放出濃郁的肉汁……真好吃！"
10030060-74 = "[s]「真是扣人心弦的好滋味……」"
10030060-75 = "呵呵，大家好像很喜歡，太好了。"
10030060-76 = "其實這是我第一次在野外製作，本來挺擔心能不能順利做好的。"
10030060-77 = "總覺得做得比學園附近的專賣店還要好吃。"
10030060-78 = "不是有句話說肚子餓的時候吃什麼都好吃嗎？#n在外面努力活動了一天，會餓也是當然的。"
10030060-82 = "來，這次來嚐嚐香菇、蘿蔔和豆腐……"
10030060-83 = "啊哈哈，你們看！#n這塊醜不啦嘰的紅蘿蔔是小玉前輩切的吧？"
10030060-84 = "呃……我，我切的蘿蔔才沒有長這樣。"
10030060-85 = "可愛的星形蘿蔔才是我切的……"
10030060-86 = "雖然樣子有點奇怪，但味道不錯。#n能感覺到蔬菜中有雞湯的濃郁風味。"
10030060-87 = "[s]「感覺熱湯滲入全身……」"
10030060-91 = "咦？這麼快就吃光啦？"
10030060-92 = "不知不覺鍋裡只剩下湯了～"
10030060-93 = "感覺吃飽了……好像又不太夠。"
10030060-95 = "別擔心，還有最後一個材料。"
10030060-101 = "還有材料？#n剛才處理好的蔬菜不是全都放進去煮了嗎？"
10030060-105 = "湯裡的東西都吃完了……最後當然要加入烏龍麵做收尾囉。"
10030060-106 = "啊哈，原來是要用水炊雞肉鍋的高湯來煮烏龍麵啊……！"
10030060-107 = "嗯，而且今天是一年的最後一天。"
10030060-108 = "不吃跨年麵就結束一年有點可惜吧？"
10030060-109 = "我選火鍋當晚餐的原因之一，也是因為能吃這個烏龍麵做結尾。"
10030060-111 = "仔細想想，去年好像沒吃到跨年麵就過年了……"
10030060-112 = "因為當時雖然也是一年的最後一天，卻實在沒有吃東西的餘裕啊。"
10030060-113 = "沒錯。當時必須在「東部平原地區」跟敵對陣營玩家PK，哪有時間吃東西？"
10030060-115 = "你們真是一點都沒變……"
10030060-119 = "烏龍麵很快就煮熟了，在糊掉前快吃吧。"
10030060-126 = "……這個也超好吃的！"
10030060-128 = "沒想到在野外也能吃到這麼好吃的料理。"
10030060-129 = "剛才還覺得吃不夠，現在終於滿足了……"
10030060-130 = "[s]「果然吃火鍋就是要用烏龍麵來收尾！」"
10030060-132 = "啊，既然麵也吃完了，趕快把自己的碗筷收拾一下吧。"
10030060-133 = "食物的味道可能會引來野生動物，吃完飯之後最好馬上把餐具洗好。"
10030060-137 = "……果然連吃完飯之後也沒時間偷懶。"
10030060-138 = "希望時間就這樣停下來……"
10030060-140 = "那可不行！我可沒辦法一直待在這個連網路都沒有的露營場哦？"
10030060-148 = "（和貝里塔斯的成員吃著烏龍麵，度過了愉快的時光）"
10030060-155 = "（整理完餐具後，待在營火前打發時間……）"
10030060-162 = "老師……？"
10030060-168 = "原來你還沒睡啊。"
10030060-169 = "[s3]「啊，是晴啊。」\n[s4]「晴剛才不是去睡了嗎？」"
10030060-172 = "嗯，本來想整理完餐具就睡覺的……"
10030060-173 = "不知道為什麼睡不著。"
10030060-174 = "真紀才抱怨說換了一個枕頭可能會睡不著，結果沒兩下就睡著了。"
10030060-175 = "可能是很久沒這麼勤奮所以累了吧。"
10030060-176 = "……老師有看到其他人嗎？"
10030060-177 = "[s]「千尋說明天要早起，所以先去休息了……」"
10030060-183 = "[ns]「至於另一個人好像已經先過來等了。」"
10030060-188 = "……（驚）"
10030060-189 = "[s]「別躲了小玉，出來吧。」"
10030060-191 = "嘖……我還以為不會被發現。"
10030060-196 = "……小玉前輩？#n你什麼時候躲在那裡的？"
10030060-197 = "……我從剛才就一直在等你。"
10030060-198 = "本來很期待能躲在這裡，偷聽老師和晴說悄悄話的……"
10030060-199 = "你期待聽到什麼……！？"
10030060-203 = "[ns5]「現在時間有點晚了，不太適合喝咖啡……」\n[ns6]「要不要喝杯可可？」"
10030060-208 = "嗯，想喝。"
10030060-209 = "謝謝老師。"
10030060-213 = "是因為冷的關係嗎，感覺可可喝起來比平常更甜。"
10030060-214 = "滲入疲勞體內的糖分好像別有一番風味。"
10030060-215 = "嗯，今天真的發生很多事……"
10030060-216 = "[s]「這次大家一起露營的感覺如何？」"
10030060-217 = "嗯……怎麼說呢……"
10030060-218 = "雖然有各種想法，但如果要總結成一句話……"
10030060-222 = "……不怎麼樣。"
10030060-224 = "真是累慘了……"
10030060-225 = "[s]「這麼直接！？」"
10030060-227 = "可是想在外面解決溫飽真的很不方便。"
10030060-228 = "不但天氣冷，椅子也不舒服……"
10030060-229 = "沒有網路，連電子設備都不能用……"
10030060-230 = "而且今天一整天都沒喝到能量飲料……"
10030060-231 = "啊，不過晚上的火鍋很好吃。"
10030060-232 = "確實是這樣沒錯……"
10030060-233 = "但想到準備和收拾花費的工夫，我還是不想為了吃到好吃的火鍋而特地出來露營……"
10030060-234 = "因為貝里塔斯追求的是真理，不是至高無上的美食。"
10030060-235 = "[s7]「……這麼想也不是不行。」\n[s8]「嗯，畢竟每個人享受假日的方法都不一樣。」"
10030060-240 = "不過……"
10030060-245 = "其實好像也沒有我想的那麼糟糕。"
10030060-246 = "因為受到的刺激比平常少，所以更能專注在平常沒多加注意的當下。"
10030060-247 = "雖然看不到照亮新年的煙火和滿街的人潮……"
10030060-248 = "不過正因為是在寂靜的山中，才能更深入地反芻年末的這一刻。"
10030060-253 = "……今年就這樣結束了。"
10030060-255 = "在沒有倒數和鐘聲的情況下靜靜迎接新年……感覺很不可思議。"
10030060-259 = "新年快樂，老師。"
10030060-260 = "今年也請多多指教。"
10030060-261 = "[s]「也祝你們兩個新年快樂。」"
10030060-265 = "呼啊……"
10030060-266 = "那我們先回去了，老師。"
10030060-267 = "明天還要早起看日出，得多睡一點才行。"
10030060-268 = "祝老師有個美好的夜晚。"
10030060-269 = "[s]「嗯，明天見。」"
10030060-275 = "（之後一直守在營火旁，直到營火完全熄滅才小睡了一下）"

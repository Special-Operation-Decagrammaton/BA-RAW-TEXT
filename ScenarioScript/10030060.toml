[translation]
10030060-1 = "ตอนที่ 6;ไก่หม้อไฟเพื่อจิตวิญญาณ"
10030060-4 = "หม้อเสียงดังกึกๆ เลยแฮะ"
10030060-5 = "กลิ่นหอมจัง..."
10030060-7 = "รุ่นพี่ ไปซุ่มทำอาหารไว้ล่วงหน้าระหว่างที่พวกฉันหั่นผักกันอยู่เหรอ?"
10030060-8 = "แค่เตรียมน้ำซุปน่ะ การจะต้มน้ำซุปมันต้องใช้เวลานานนะ"
10030060-9 = "ไหนขอดูหน่อย..."
10030060-15 = "เอ๋? ในหม้อมีแต่สาหร่ายทะเลกับเห็ดอบแห้งนี่นา..."
10030060-16 = "ในห่อวัตถุดิบที่เราเอามามีเนื้อไก่ด้วยไม่ใช่เหรอ?"
10030060-17 = "อื้ม รอกันก่อนนะ ตอนนี้ยังไม่ถึงเวลาใส่เนื้อสัตว์น่ะ"
10030060-22 = "ระหว่างที่ต้มน้ำซุป เราจะเอาปีกไก่กับเนื้อไก่ที่หั่นพอดีคำมาเสียบไม้..."
10030060-26 = "แล้วก็ใช้ไฟจากถ่านย่างหนังไก่ให้สุกและกรอบ..."
10030060-28 = "ไฟมันไม่แรงไปหน่อยเหรอ? แบบนี้อาจจะไหม้ก็ได้นะ..."
10030060-29 = "ไม่เป็นไรหรอก ฉันตั้งใจแค่จะให้หนังสุกเท่านั้นน่ะ"
10030060-30 = "ถ้าเราละลายไขมันที่อยู่ในหนังไก่แล้วเอาไก่ไปใส่ในหม้อทั้งอย่างนั้น ก็จะเป็นการเพิ่มรสชาติของ#nน้ำมันที่เข้มข้นเข้าไปในน้ำซุป"
10030060-31 = "และถ้าเคี่ยวซุปไก่นานพอแล้ว ก็ใส่เห็ดและผักที่หั่นลงไปแล้วต้มให้เดือดอีกครั้งก็เป็นอันเสร็จ"
10030060-32 = "[s1] \"หม้อไฟซุปใสที่ใส่เนื้อไก่กับผักงั้นเหรอ...\"\n[s2] \"จะทำมิซึทากิสินะ\""
10030060-35 = "อื้ม ใช่แล้วละคุณครู"
10030060-36 = "มิซึทากิ...?"
10030060-37 = "เป็นเมนูหม้อไฟท้องถิ่นที่มีเนื้อไก่เป็นส่วนผสมหลัก แล้วก็ใส่ผักต่างๆ เข้าไปต้มด้วยน่ะ"
10030060-38 = "เมื่อวันก่อนฉันไปให้คำปรึกษาเรื่องความปลอดภัยกับสำนักข่าวแห่งหนึ่งที่อยู่ไกลจาก D.U. ออกไป แล้วก็ได้บังเอิญไปชิมเมนูนี้ที่นั่น มันอร่อยกว่าที่คิดเอาไว้ ก็เลยทำกินอยู่คนเดียวหลายครั้งแล้ว"
10030060-39 = "ถ้าออกมาแคมป์ปิ้งข้างนอกในวันที่อากาศหนาว ฉันว่าหม้อไฟที่มีน้ำซุปอุ่นๆ น่าจะดีกว่าแกงกะหรี่หรือ#nสตูน่ะ"
10030060-40 = "วัตถุดิบที่ใช้ก็ธรรมดา และหน้าตาก็ดูเรียบง่ายอยู่หรอก..."
10030060-42 = "แต่กลิ่นหอมเตะจมูกดีจังเลยนะคะ"
10030060-43 = "ถึงว่าละ จู่ๆ ฉันก็เริ่มหิวขึ้นมาแล้วละค่ะ"
10030060-50 = "ไก่น่าจะสุกดีแล้วนะ... งั้นเราลงมือกินกันเลยไหม?"
10030060-67 = "เริ่มที่น้ำซุปก่อน แล้วก็ค่อยๆ ตักเนื้อมากินคู่กัน"
10030060-71 = "ฮ้า... อุ่นดีจัง..."
10030060-72 = "ไม่รู้ว่าเพราะเรามากินในที่ที่หนาวรึเปล่า น้ำซุปก็เลยยิ่งมีรสชาติเข้มข้นนะคะ..."
10030060-73 = "ยิ่งเคี้ยวปีกไก่ น้ำที่ออกมาจากเนื้อยิ่งเข้มข้นไปอีก... อร่อยจริงๆ เลย!"
10030060-74 = "[s] \"เป็นรสชาติที่น่าประทับใจมากเลย...\""
10030060-75 = "ฮุฮุ โล่งอกไปทีนะที่ถูกปากทุกคน"
10030060-76 = "ที่จริงแล้วฉันกังวลนิดหน่อยน่ะ ฉันทำเมนูนี้นอกครัวเป็นครั้งแรกเลย"
10030060-77 = "ฉันว่าอร่อยกว่าร้านหม้อไฟแถวๆ โรงเรียนเราอีกนะ"
10030060-78 = "ว่ากันว่าถ้าหิว แค่ข้าวเปล่าก็กินอร่อยแล้ว วันนี้พวกเราเหนื่อยกายกันมาทั้งวัน ก็คงต้องหิวกันเป็นธรรมดาแหละ"
10030060-82 = "เอาละ งั้นต่อไปก็ถึงตาของเห็ด แคร์รอต แล้วก็เต้าหู้..."
10030060-83 = "อะฮ่าฮ่า ดูนี่สิ! แคร์รอตชิ้นนี้ดูไม่ได้เลย รุ่นพี่โคทามะเป็นคนหั่นใช่มั้ย?"
10030060-84 = "อึก... แคร์รอตที่ฉันหั่นไม่ได้หน้าตาเป็นแบบนี้นะคะ"
10030060-85 = "ฉันหั่นเป็นรูปดาวที่น่ารักกว่านี้ต่างหาก..."
10030060-86 = "ถึงรูปร่างจะแปลกๆ ไปหน่อย แต่ก็อร่อยดีนะ รู้สึกได้ถึงรสชาติที่กลมกล่อมของน้ำซุปไก่ในผักเลย"
10030060-87 = "[s] \"เหมือนแทรกเข้าไปอยู่ทุกอณูร่างกายเลย...\""
10030060-91 = "เอ๋? ตักกินหมดแล้วเหรอเนี่ย?"
10030060-92 = "เผลอแป๊บเดียวก็เหลือแค่น้ำซุปแล้ว~"
10030060-93 = "ถึงจะเริ่มอิ่มแล้วก็เถอะ... แต่ก็รู้สึกเสียดายอะไรอยู่นะคะ"
10030060-95 = "ไม่ต้องกังวลไป เรายังมีวัตถุดิบสุดท้ายอยู่"
10030060-101 = "ยังมีวัตถุดิบอื่นอีกงั้นเหรอ? ผักที่หั่นไปเมื่อกี้เราก็ใส่ไปหมดแล้วนี่?"
10030060-105 = "ถ้าเรากินเนื้อหมดแล้ว... น้ำซุปที่เหลือก็ต้องเอามาต้มอุด้งกินสิ"
10030060-106 = "ว้าว จะใช้น้ำซุปมิซึทากิมาทำอุด้งนี่เอง...!"
10030060-107 = "ใช่แล้ว อีกอย่าง วันนี้ก็เป็นวันสุดท้ายของปีด้วย"
10030060-108 = "ถ้าไม่กินโทชิโคชิโซบะในคืนข้ามปี มันก็น่าเสียดายอยู่นะว่ามั้ย?"
10030060-109 = "หนึ่งในเหตุผลที่ฉันเลือกหม้อไฟมาเป็นอาหารเย็น ก็เพราะเราจะได้เอาน้ำซุปหม้อไฟมาต้มอุด้งกินได้#nด้วยนี่ละ"
10030060-111 = "จะว่าไป ปีที่แล้วเหมือนเราจะไม่ได้กินโทชิโคชิโซบะเลย..."
10030060-112 = "เพราะถึงจะเป็นวันสุดท้ายของปี แต่สถานการณ์ตอนนั้นก็ใช่ว่าจะกินอะไรได้นี่คะ"
10030060-113 = "ใช่ พวกเราต้องเปิดศึกต่อสู้ใน <เขตที่ราบตะวันออก> จะไปมีเวลากินอะไรได้ยังไง?"
10030060-115 = "พวกเธอนี่นะ ไม่เปลี่ยนกันเลยจริงๆ..."
10030060-119 = "แป๊บเดียวอุด้งก็สุกแล้วแฮะ รีบกินก่อนที่เส้นจะอืดเถอะ"
10030060-126 = "นี่ก็อร่อยเหมือนกัน!"
10030060-128 = "ไม่คิดเลยว่าจะได้กินของอร่อยๆ ข้างนอกแบบนี้"
10030060-129 = "ตอนนี้กระเพาะฉันบอกว่าไม่เสียดายอะไรแล้วค่ะ..."
10030060-130 = "[s] \"หลังกินหม้อไฟก็ต้องปิดท้ายด้วยอุด้งแบบนี้ละ\""
10030060-132 = "อ้อ ถ้ากินอุด้งกันเสร็จแล้วก็ล้างจานของตัวเองกันเลยนะ"
10030060-133 = "ถ้าได้กลิ่นอาหาร เดี๋ยวพวกสัตว์ป่าอาจจะออกมารวมตัวกันก็ได้ เพราะงั้นถ้ากินอาหารเสร็จแล้วก็ควร#nล้างจานชามทันที"
10030060-137 = "หลังกินเสร็จก็ไม่มีเวลาให้ขี้เกียจกันเลยงั้นเหรอ"
10030060-138 = "อยากให้เวลาหยุดอยู่ที่ตรงนี้จังเลยค่ะ..."
10030060-140 = "แบบนั้นไม่ได้นะ! จะให้อยู่ในแคมป์ที่ไม่มีอินเทอร์เน็ตไปตลอดเลยงั้นเหรอ?"
10030060-148 = "(หลังจากนั้นคุณครูกับสมาชิกเวอริทัสก็กินอุด้ง และใช้เวลายามเย็นด้วยกันอย่างสนุกสนาน)"
10030060-155 = "(เมื่อจัดการล้างถ้วยชามเสร็จ คุณครูก็มานั่งฆ่าเวลาอยู่หน้ากองไฟ...)"
10030060-162 = "คุณครู...?"
10030060-168 = "ยังไม่นอนสินะ"
10030060-169 = "[s3] \"อ๊ะ ฮาเระนี่เอง\"\n[s4] \"เมื่อกี้ไม่ได้เข้าไปนอนหรอกเหรอ?\""
10030060-172 = "อื้ม ฉันก็ว่าจะนอนเลยหลังจากล้างจานเสร็จ..."
10030060-173 = "แต่ว่านอนไม่หลับน่ะ"
10030060-174 = "มากิบ่นว่าไม่ชินกับหมอนก็เลยน่าจะนอนไม่หลับ แต่เผลอแป๊บเดียวก็หลับไปแล้ว"
10030060-175 = "สงสัยจะเหนื่อยที่ไม่ได้ออกไปใช้เรี่ยวแรงที่ไหนอยู่นานเลยน่ะ"
10030060-176 = "คุณครูเห็นสมาชิกคนอื่นรึเปล่า?"
10030060-177 = "[s] \"จิฮิโระบอกว่าจะไปนอนก่อนเพราะพรุ่งนี้ต้องรีบตื่น...\""
10030060-183 = "[ns] \"ส่วนอีกคนก็เหมือนจะออกมารออะไรอยู่นะ\""
10030060-188 = "(สะดุ้ง!)"
10030060-189 = "[s] \"โคทามะ เลิกซ่อนเถอะ ออกมาได้แล้ว\""
10030060-191 = "ชิ... นึกว่าจะไม่โดนจับได้แล้วเชียว"
10030060-196 = "รุ่นพี่โคทามะ...? ไปซ่อนอยู่ตรงนั้นตั้งแต่เมื่อไรน่ะ?"
10030060-197 = "ฉันมารออยู่ตั้งแต่เมื่อกี้แล้วค่ะ"
10030060-198 = "คิดว่าถ้าซ่อนอยู่ตรงนี้ ก็จะได้ยินบทสนทนาลับๆ ระหว่างคุณครูกับฮาเระแล้วเสียอีก..."
10030060-199 = "คาดหวังอะไรอยู่น่ะ?!"
10030060-203 = "[ns5] \"นี่ก็ดึกแล้ว ดื่มกาแฟคงไม่ดี...\"\n[ns6] \"มาดื่มโกโก้กันสักแก้วมั้ย?\""
10030060-208 = "อื้ม เอาสิ"
10030060-209 = "ขอรับไว้ด้วยความยินดีค่ะ"
10030060-213 = "เพราะอากาศหนาวรึเปล่านะ ฉันถึงได้รู้สึกว่าโกโก้แก้วนี้หวานกว่าปกติอีก"
10030060-214 = "น้ำตาลที่ซึมเข้าไปในร่างกายที่เหนื่อยล้ามันช่างพิเศษจังเลยนะคะ"
10030060-215 = "อื้ม ก็วันนี้เกิดเรื่องขึ้นตั้งเยอะตั้งแยะเลยนี่นา..."
10030060-216 = "[s] \"ทุกคนคิดยังไงกับการตั้งแคมป์ครั้งนี้เหรอ?\""
10030060-217 = "อืม ไม่รู้สิ"
10030060-218 = "ที่จริงก็มีความคิดหลายอย่างผุดขึ้นมาในหัวนะ แต่ถ้าจะให้สรุปสั้นๆ..."
10030060-222 = "ก็ไม่ค่อยดีเท่าไร"
10030060-224 = "เหนื่อยค่ะ..."
10030060-225 = "[s] \"ตอบทันควันแบบนี้เลยเหรอ?!\""
10030060-227 = "ก็พอต้องมาแก้ปัญหาเรื่องปัจจัยสี่ข้างนอกแบบนี้ ก็เจอแต่ความไม่สะดวกสบายเต็มไปหมด"
10030060-228 = "อากาศก็หนาว เก้าอี้ก็ไม่มีให้นั่ง..."
10030060-229 = "อินเทอร์เน็ตก็ไม่มี แถมอุปกรณ์อิเล็กทรอนิกส์ก็ใช้ไม่ได้อีก..."
10030060-230 = "วันนี้ทั้งวันฉันยังไม่ได้ดื่มเครื่องดื่มชูกำลังเลยด้วย..."
10030060-231 = "อ๊ะ แต่หม้อไฟมื้อเย็นวันนี้ก็อร่อยดีค่ะ"
10030060-232 = "นั่นก็จริงอยู่หรอก..."
10030060-233 = "แต่ถ้าคิดถึงพลังงานที่ต้องใช้ในการเตรียมและเก็บกวาดละก็ ฉันไม่อยากมาแคมป์ปิ้งเพราะจะมากิน#nหม้อไฟอร่อยๆ หรอก..."
10030060-234 = "สิ่งที่เวอริทัสแสวงหาคือความจริง ไม่ใช่ความอร่อยค่ะ"
10030060-235 = "[s7] \"ก็อาจจะคิดกันอย่างนั้นได้อยู่หรอกนะ...\"\n[s8] \"ก็นะ ทุกคนคงมีวิธีสนุกกับวันหยุดที่ต่างกัน\""
10030060-240 = "แต่ว่า..."
10030060-245 = "มันก็ไม่ได้ออกมาแย่อย่างที่คิดไว้ค่ะ"
10030060-246 = "พออยู่ที่นี่ เราเจอสิ่งเร้าน้อยกว่าปกติ ทำให้จดจ่อกับปัจจุบันที่ปกติแล้วไม่ค่อยใส่ใจได้"
10030060-247 = "ถึงแม้จะไม่ได้เห็นพลุปีใหม่ที่ตระการตา หรือไม่ได้เห็นฝูงชนที่ออกมากันแน่นถนน..."
10030060-248 = "แต่พออยู่ในภูเขาที่เงียบสงัด กลับกลายเป็นว่าเราได้คิดทบทวนช่วงเวลาที่เข้าใกล้จุดสุดท้ายของปีได้#nอย่างลึกซึ้งมากขึ้น"
10030060-253 = "จะหมดปีนี้แล้วสินะ..."
10030060-255 = "การต้อนรับปีใหม่อย่างเงียบๆ โดยไม่มีการเคาท์ดาวน์หรือเสียงระฆัง... แบบนี้รู้สึกแปลกจังเลยนะคะ"
10030060-259 = "สวัสดีปีใหม่นะคะคุณครู"
10030060-260 = "ปีนี้ก็ขอฝากเนื้อฝากตัวด้วยนะคะ"
10030060-261 = "[s] \"ทั้งสองคนก็ด้วยนะ สวัสดีปีใหม่\""
10030060-265 = "ฮ้าววว...."
10030060-266 = "พวกเราขอไปนอนก่อนละคุณครู"
10030060-267 = "ถ้าจะดูพระอาทิตย์ขึ้นพรุ่งนี้ อย่างน้อยตอนนี้ก็ต้องนอนเอาแรงหน่อยแล้วละ"
10030060-268 = "คุณครูก็นอนหลับฝันดีนะคะ"
10030060-269 = "[s] \"อื้ม เจอกันพรุ่งนี้นะ\""
10030060-275 = "(คุณครูนั่งเฝ้ากองไฟจนไฟดับสนิทและหลับไปครู่หนึ่ง)"

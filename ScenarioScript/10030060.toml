[translation]
10030060-1 = "Episode 6;Chicken Hot Pot for the Soul"
10030060-4 = "...The pot is rattling."
10030060-5 = "My mouth is watering..."
10030060-7 = "Chihiro, were you cooking something while we were preparing the veggies?"
10030060-8 = "Just the broth. Broth always takes time to get ready."
10030060-9 = "Let me see, let me see—"
10030060-15 = "Huh? There's only seaweed and dried mushrooms in there..."
10030060-16 = "Didn't we also bring chicken with us?"
10030060-17 = "Wait a little longer. If we start the meat too soon it'll just dissolve."
10030060-22 = "While the broth finishes simmering, let's cut the chicken into bite-sized pieces and thread it onto these skewers..."
10030060-26 = "Then we'll sear it over charcoal until the exterior is crispy..."
10030060-28 = "Isn't that fire a bit too strong? It'll burn the meat at this rate..."
10030060-29 = "Hold your skewer like this. The goal is to lightly sear the skin."
10030060-30 = "We'll melt the fat from the skin and add it to the pot to give the broth a rich, oily flavor."
10030060-31 = "Once that's ready, we boil the prepared vegetables and mushrooms for a while."
10030060-32 = "[s1] \"There are few things better than sharing a hot pot...\"\n[s2] \"Ooh, it's been a while since I've had mizutaki.\""
10030060-35 = "Exactly, Sensei. I thought mizutaki would be perfect for our trip."
10030060-36 = "Mizutaki...?"
10030060-37 = "It's a regional hot pot dish generally made with chicken and different types of vegetables."
10030060-38 = "I first tried it when I visited a communication carrier in the D.U. for a security consultation. It was more appetizing than I expected, so now I cook it myself from time to time."
10030060-39 = "Hot pot is much more suited for camping in cold weather than curry or stew, in my opinion."
10030060-40 = "It looks like a plain dish made with simple ingredients..."
10030060-42 = "But it smells really good..."
10030060-43 = "I think I've found a zero-day exploit for my stomach..."
10030060-50 = "The chicken appears to be ready... Shall we dig in?"
10030060-67 = "Start with the broth, then try it with some meat."
10030060-71 = "Ah... So warm..."
10030060-72 = "Perhaps it's the chill in the air...but the broth feels especially rich..."
10030060-73 = "The taste of the broth pairs so well with the chicken... It's so good!"
10030060-74 = "[s] \"The flavor warms my heart...\""
10030060-75 = "Heehee! I'm glad everyone's enjoying it."
10030060-76 = "I was worried it wouldn't turn out well, since this is my first time cooking a meal outdoors."
10030060-77 = "It tastes even better than the food at the academy's restaurants."
10030060-78 = "They say hunger is the best seasoning. We've worked up a real appetite after spending the day outdoors."
10030060-82 = "Now let's try the mushrooms, carrots, and tofu..."
10030060-83 = "Ahaha! Look at this—Kotama, did you cut this lumpy carrot?"
10030060-84 = "N-No, my carrot pieces aren't lumpy..."
10030060-85 = "I tried to cut them into cute star shapes..."
10030060-86 = "The weird shape doesn't take away from the delicious flavor. I can really taste how the veggies soaked in the chicken broth."
10030060-87 = "[s] \"I feel happiness spreading through my body...\""
10030060-91 = "Huh? Are we done already?"
10030060-92 = "There's only broth in the pot now."
10030060-93 = "I've eaten enough...but I feel like I'm missing something."
10030060-95 = "Don't worry. We still have one last ingredient."
10030060-101 = "There's something left to cook? Haven't we added all the meat and veggies now?"
10030060-105 = "When you're finished cooking the big ingredients...you have to conclude the meal with udon!"
10030060-106 = "Oh, you're making udon with the mizutaki broth!"
10030060-107 = "Precisely. After all, today is the last day of the year."
10030060-108 = "It would be a shame to let the evening pass without some toshikoshi soba, don't you think? "
10030060-109 = "One of the deciding factors in choosing hot pot was how we could have new year's udon at the end of the meal."
10030060-111 = "Now that I think about it, I didn't have toshikoshi soba last year..."
10030060-112 = "We were in no position to cook something like this last year, given the dire situation we found ourselves in..."
10030060-113 = "Well, yeah, how could we have cooked something to eat when we were fighting the battle of a lifetime on the Eastern Plains?"
10030060-115 = "Our club never changes..."
10030060-119 = "The udon is ready. Let's eat before it gets soggy."
10030060-126 = "...S-So good!"
10030060-128 = "I never expected to eat a delicacy like this in the wilderness."
10030060-129 = "I've found...what I was missing..."
10030060-130 = "[s] \"You've got to end hot pot with some udon!\""
10030060-132 = "Ah, please remember to wash your dishes right away once you're done with your udon."
10030060-133 = "If we leave food waste around the camp it might attract wild animals looking for something to eat."
10030060-137 = "...I suppose there's no time to slack, even after a meal."
10030060-138 = "I wish I could freeze this moment in time..."
10030060-140 = "Never! Then we'd spend eternity at a campsite without an internet connection!"
10030060-148 = "The members of Veritas and I basked in the afterglow of our hot pot udon."
10030060-155 = "Later, as I dozed near the campfire..."
10030060-162 = "Sensei...?"
10030060-168 = "I see you're still up."
10030060-169 = "[s3] \"Hey, Hare. Still awake?\"\n[s4] \"I thought you went to bed.\""
10030060-172 = "I thought I'd fall asleep immediately after putting the dishes away..."
10030060-173 = "But I can't seem to manage it."
10030060-174 = "Maki was complaining about how she couldn't fall sleep without all her pillows, but she passed out as soon as she lay down."
10030060-175 = "Maybe walking around all day wore her out."
10030060-176 = "...Is anyone else awake right now?"
10030060-177 = "[s] \"Chihiro said we have to get up before dawn tomorrow, but...\""
10030060-183 = "[ns] \"I think someone else is listening in right now.\""
10030060-188 = "...Oops."
10030060-189 = "[s] \"Kotama, want to come out and chat with us?\""
10030060-191 = "Tsk... I didn't expect you to catch me."
10030060-196 = "...Kotama? How long were you hiding there?"
10030060-197 = "...I've been awake for a while now."
10030060-198 = "I hid here thinking I could pretend I was a recording device picking up Sensei and Hare's private conversation..."
10030060-199 = "Wh-What were you expecting?!"
10030060-203 = "[ns5] \"It's a bit late for coffee... Want some cocoa?\"\n[ns6] \"It's cold, I'll make some cocoa to warm us up.\""
10030060-208 = "That sounds nice."
10030060-209 = "Thank you very much."
10030060-213 = "Something about heating it over a campfire on a cold night made this cocoa taste sweeter than usual."
10030060-214 = "Soothing a weary body with sugar is a special joy."
10030060-215 = "Yes. There were so many things going on today..."
10030060-216 = "[s] \"Do you like camping with everyone?\""
10030060-217 = "Hmm..."
10030060-218 = "If I had to summarize my thoughts in one sentence..."
10030060-222 = "It's mid."
10030060-224 = "It's unpleasant..."
10030060-225 = "[s] \"Tell me how you really feel!\""
10030060-227 = "Struggling to meet basic needs outdoors is pretty uncomfortable."
10030060-228 = "It's freezing, the chairs have no cushions, and..."
10030060-229 = "We have no internet or electronic equipment..."
10030060-230 = "I haven't had a single energy drink today either..."
10030060-231 = "Oh, but the hot pot we had for dinner was delicious."
10030060-232 = "Yeah, you're right, but..."
10030060-233 = "Considering all the work that went into cooking and cleaning up, I'm not sure a delicious hot pot is worth all the trouble..."
10030060-234 = "Veritas pursues truth, not good culinary experiences."
10030060-235 = "[s7] \"...I see your point.\"\n[s8] \"I suppose we all have different tastes.\""
10030060-240 = "But..."
10030060-245 = "Camping isn't as bad as I thought it would be."
10030060-246 = "Without the distractions of the club room, I can focus more on the present, which is something I don't usually do."
10030060-247 = "There are no fireworks to ring in the new year and no cheering crowds lining the streets, but..."
10030060-248 = "Being engulfed by the near total silence of these mountains is letting me look back on the year with fresh eyes..."
10030060-253 = "...It's almost time for a fresh start."
10030060-255 = "There's something peaceful about ringing in the new year without a countdown or bells..."
10030060-259 = "Happy New Year, Sensei."
10030060-260 = "Here's to another great year together."
10030060-261 = "[s] \"Happy New Year to you, too.\""
10030060-265 = "*yawn*"
10030060-266 = "We should head in, Sensei."
10030060-267 = "We should get some sleep if we want to see the sunrise tomorrow."
10030060-268 = "I hope you have a good night, Sensei."
10030060-269 = "[s] \"Sleep well. See you in the morning.\""
10030060-275 = "I dozed by the campfire for the rest of the night, finally falling asleep as the last embers died..."

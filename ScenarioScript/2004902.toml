2004902-12 = "3;미사키 수영복;06;애초에 어째서 다들 해변가를 좋아하는지 모르겠어.\n#3;em;…"
2004902-13 = "3;미사키 수영복;99;햇빛은 따갑고, 갈매기 소리는 시끄럽고, 소금기 머금은 바람은 불쾌하기만 하고."
2004902-14 = "3;미사키 수영복;05;모두를 따라오기는 했지만, 난 전혀 이해할 수가 없어.\n#3;em;[속상함]"
2004902-15 = "[s] \"미사키, 해변은 처음이지?\""
2004902-16 = "3;미사키 수영복;00;그렇긴 한데."
2004902-17 = "3;미사키 수영복;04;……해변이 처음이라 노는 법을 몰라서 그렇다고? 무슨 말이야, 그게.\n#3;em;[?]"
2004902-18 = "[s3] \"하지만 미사키, 땀을 뻘뻘 흘리고 있는걸?\"\n[s4] \"바다에 들어가면 시원해질 텐데…….\""
2004902-19 = "#wait;100"
2004902-20 = "#wait;100"
2004902-21 = "3;미사키 수영복;00;더위를 견디는 정도는 익숙해."
2004902-22 = "3;미사키 수영복;99;평소 지내는 곳에 냉방시설 따위는 없으니까. 특별히 몸을 식힐 이유는 없잖아."
2004902-23 = "[s] \"하지만 나는 미사키랑 수영하고 싶은데…….\""
2004902-24 = "3;미사키 수영복;05;그런 데에 무슨 의미가 있다고…….\n#3;em;[세로선]"
2004902-25 = "[s] \"같이 수영하면 진짜 완전 재밌을 텐데.\""
2004902-26 = "3;미사키 수영복;10;그렇게 말해도 안 들어갈 거니까."
2004902-27 = "3;미사키 수영복;04;…….\n#3;em;…"

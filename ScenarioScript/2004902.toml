2004902-7 = "3;미사키 수영복;09;……직접 찾아오다니, 선생님도 할 일이 없나 보네.\n#3;em;[한숨]"
2004902-8 = "[s1] \"미사키가 심심해하는 것 같아서, 놀아주러 왔지.\"\n[s2] \"자, 일어나! 같이 놀자고!\""

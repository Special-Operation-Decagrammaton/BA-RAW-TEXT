[translation]
2004902-1 = "在海邊很無聊"
2004902-2 = "（來到海邊，走向了坐在遮陽傘下的美咲）"
2004902-7 = "……居然還親自跑來，看來老師也挺閒的啊。"
2004902-8 = "[s1]「我看美咲好像很無聊的樣子，所以就來陪你玩了。」\n[s2]「來，我們一起玩吧！」"
2004902-11 = "免了。"
2004902-12 = "況且我本來就不懂大家為什麼都喜歡海邊。"
2004902-13 = "陽光刺眼、海鷗很吵……帶著鹽味的海風只讓人覺得不舒服。"
2004902-14 = "雖然跟著大家一起來了，但我還是無法理解。"
2004902-15 = "[s]「美咲，你是第一次來海邊吧？」"
2004902-16 = "是這樣沒錯。"
2004902-17 = "因為是第一次所以不會玩……？#n……什麼意思。"
2004902-18 = "[s3]「美咲你都已經滿身大汗了耶？」\n[s4]「只要到海裡就會涼快起來……」"
2004902-21 = "我很習慣忍受炎熱了。"
2004902-22 = "畢竟平常待的地方沒有冷氣這種東西，也沒什麼非得降溫的理由吧。"
2004902-23 = "[s]「可是我想跟美咲一起游泳……」"
2004902-24 = "那種事有什麼意義……"
2004902-25 = "[s]「一起游泳真的很好玩耶……」"
2004902-26 = "不管你怎麼說，我都不會下水的。"
2004902-27 = "……"
2004902-28 = "就算擺出那麼可憐的表情也沒用……！"
2004902-29 = "[s]「美咲……游泳……」"
2004902-30 = "啊，真是的……"
2004902-31 = "我……那個……"
2004902-32 = "[s]「嗯？」"
2004902-33 = "我不會游泳啦！"
2004902-34 = "一定要我親口說出來嗎？"
2004902-35 = "[s]「不用擔心，我來教你吧。」"
2004902-36 = "老師你？"
2004902-37 = "今天之後我大概也不會去游泳，為什麼還要特地花時間在我身上？"
2004902-38 = "……教我怎麼享受海邊，就是你享受海邊的方式？"
2004902-39 = "不理解你的意思。"
2004902-44 = "唉……"
2004902-45 = "好好好，算我輸了可以吧。"
2004902-46 = "雖然這種事毫無意義……#n不過既然老師都這麼說了，我就配合你一下吧。"
2004902-47 = "[s]「好耶！那我們先去租游泳圈吧？」"
2004902-48 = "游泳圈……我又不是小孩子。"
2004902-51 = "（就這樣一邊教美咲游泳，一邊享受著海邊的樂趣）"

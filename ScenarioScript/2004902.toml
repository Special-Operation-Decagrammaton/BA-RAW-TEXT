[translation]
2004902-1 = "ทะเลแสนน่าเบื่อ"
2004902-2 = "(คุณครูเดินไปหามิซากิที่นั่งอยู่ใต้ร่มกันแดดริมหาด)"
2004902-7 = "มาหาฉันด้วยตัวเองแบบนี้... คุณครูคงจะว่างสินะ"
2004902-8 = "[s1] \"ครูเห็นว่ามิซากิน่าจะเบื่อๆ เลยมาเล่นด้วยไงล่ะ\"\n[s2] \"เอ้า ลุกขึ้นเร็ว ไปเล่นกันเถอะ!\""
2004902-11 = "ไม่เอาล่ะ"
2004902-12 = "ฉันไม่เข้าใจเลยว่าทำไมทุกคนถึงชอบชายหาดกันนัก"
2004902-13 = "แดดก็ร้อน นกนางนวลก็ร้องเสียงดัง ลมทะเลก็มีกลิ่นเค็มแสบจมูกชวนเสียอารมณ์"
2004902-14 = "ฉันตามทุกคนมาก็จริง แต่ไม่เข้าใจเลยสักนิด"
2004902-15 = "[s] \"มิซากิเพิ่งเคยมาทะเลครั้งแรกสินะ?\""
2004902-16 = "อื้อ"
2004902-17 = "จะบอกว่าเพราะฉันเพิ่งเคยมาครั้งแรกเลยไม่รู้วิธีเล่นสนุกงั้นเหรอ? หมายความว่ายังไงน่ะ"
2004902-18 = "[s3] \"แต่มิซากิเหงื่อออกเยอะมากเลยนะ?\"\n[s4] \"ถ้าลงไปเล่นน้ำทะเลก็น่าจะสดชื่นขึ้นนะ...\""
2004902-21 = "ฉันชินกับการอดทนต่อความร้อนแล้วละ"
2004902-22 = "เพราะที่พักที่ฉันอยู่มันไม่มีเครื่องปรับอากาศหรืออะไรเลย ไม่มีเหตุผลพิเศษที่ต้องไปทำให้ตัวเย็นขึ้นด้วย"
2004902-23 = "[s] \"แต่ครูอยากว่ายน้ำกับมิซากินะ...\""
2004902-24 = "เรื่องแบบนั้นจะมีความหมายอะไร..."
2004902-25 = "[s] \"ถ้าไปว่ายน้ำด้วยกันคงสนุกมากแน่...\""
2004902-26 = "ต่อให้พูดแบบนั้นก็ไม่มีประโยชน์หรอก"
2004902-27 = "......"
2004902-28 = "ทำหน้าตาน่าสงสารแบบนั้นก็ไม่ช่วยหรอกนะ...!"
2004902-29 = "[s] \"มิซากิ... ว่ายน้ำ... นะๆ\""
2004902-30 = "โธ่เอ๊ย..."
2004902-31 = "ฉัน... น่ะ"
2004902-32 = "[s] \"หืม?\""
2004902-33 = "บอกว่าฉันว่ายน้ำไม่เป็นไง!"
2004902-34 = "ต้องให้ฉันพูดซ้ำด้วยเหรอ?"
2004902-35 = "[s] \"เรื่องนั้นไม่ต้องห่วงหรอก เดี๋ยวครูสอนให้เอง\""
2004902-36 = "คุณครูเนี่ยนะ?"
2004902-37 = "ถ้าไม่ใช่วันนี้ก็คงไม่มีเหตุผลที่ต้องมาว่ายน้ำอีก แล้วจะใส่ใจสอนฉันไปทำไม? เพราะอะไร?"
2004902-38 = "การสอนให้ฉันได้สนุกกับการมาเที่ยวทะเลก็เป็นวิธีสนุกกับการมาทะเลของคุณครูงั้นเหรอ?"
2004902-39 = "ไม่เห็นเข้าใจเลย"
2004902-44 = "เฮ้อ..."
2004902-45 = "รู้แล้ว รู้แล้วละน่า ฉันแพ้แล้ว"
2004902-46 = "ถึงมันจะไม่มีประโยชน์อะไร... แต่ถ้าคุณครูพูดขนาดนี้ ฉันจะยอมทำตามก็แล้วกัน"
2004902-47 = "[s] \"ดีละ! งั้นเราไปเช่าห่วงยางกันมั้ย?\""
2004902-48 = "ห่วงยางเหรอ... ฉันไม่ใช่เด็กๆ นะ"
2004902-51 = "(หลังจากนั้นคุณครูก็ใช้เวลาไปกับการสอนมิซากิว่ายน้ำ)"

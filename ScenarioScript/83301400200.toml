[translation]
83301400200-6 = "H-H-H-Head Prefect...! You're messing with our plans!"
83301400200-7 = "The head prefect is scary as always...! But how mortifying!"
83301400200-8 = "For Operation Gehenna Bubble to fail like this!"
83301400200-16 = "On that note...what exactly was Operation Gehenna Bubble?"
83301400200-17 = "What manner of operation required that you excavate a hot spring in a place like the Pandemonium Society's parking lot...? I don't understand."
83301400200-21 = "Was it just...one of your usual rampages?"
83301400200-22 = "No!"
83301400200-23 = "It's no mystery! Operation Gehenna Bubble is...exactly as its name suggests! It's an operation to create amazing hot springs throughout the entirety of Gehenna!"
83301400200-24 = "...?"
83301400200-25 = "I discovered something when I was digging a new hot spring in the outskirts of Gehenna, like usual."
83301400200-26 = "There are water veins that cross over the whole of Gehenna Academy...and they all reach towards a single point."
83301400200-27 = "And that point must be..."
83301400200-28 = "Exactly! The Pandemonium Society's parking lot!"
83301400200-29 = "If I could only turn that useless parking lot into a hot spring... Every hot spring in the academy would be connected!"
83301400200-30 = "Then Gehenna would be one giant hot spring, capable of holding every student here a hundred times over!"
83301400200-34 = "My greatest, most unimaginable dream would finally be a reality!"
83301400200-35 = "...Outrageous."
83301400200-36 = "We may need to fall back for now...!"
83301400200-37 = "But don't think we've given up yet! Even if this plan failed..."
83301400200-38 = "Next time we'll open up the secret hot water vein beneath the School Lunch Club and commence Operation Hot Spring Eggs Boom!"
83301400200-39 = "*sigh* Right. In the meantime, just stay put and try to reflect on your actions."
83301400200-46 = "Eeek?!"

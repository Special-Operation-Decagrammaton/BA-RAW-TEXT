[translation]
83301400200-6 = "ปะ... ปะ... ประธานกรรมการวินัย...! มาขัดขวางแผนการของเรางั้นเหรอ...!"
83301400200-7 = "ถึงฉันจะยังเกรงกลัวประธานกรรมการวินัยอยู่ไม่เปลี่ยน...! แต่ทำอย่างนี้ฉันเสียใจนะ...!"
83301400200-8 = "มาทำให้ <ยุทธการเกเฮนน่าเดือดปุดๆ> ของพวกเราสูญเปล่าไปได้ยังไงกัน!"
83301400200-16 = "<ยุทธการเกเฮนน่าเดือดปุดๆ> ของพวกเธอนี่มันคืออะไรกัน?"
83301400200-17 = "มันคือแผนการอะไร พวกเธอถึงกับต้องมาสร้างออนเซ็นถึงลานจอดรถของแพนเดโมเนียม โซไซตี้... ฉันไม่เข้าใจพฤติกรรมเท่าไรเลย"
83301400200-21 = "หรือพวกเธอ... แค่อยากจะก่อเรื่องวุ่นวายเหมือนที่ทำเป็นปกติ?"
83301400200-22 = "ไม่ใช่นะ!"
83301400200-23 = "ฟังแล้วอย่าตกใจไปล่ะ! <ยุทธการเกเฮนน่าเดือดปุดๆ> ก็คือ... แผนการใหญ่ที่จะสร้างบ่อออนเซ็นที่#nใหญ่โตและยอดเยี่ยมขึ้นมาให้ทั่วเกเฮนน่า!"
83301400200-24 = "......?"
83301400200-25 = "พวกฉันบังเอิญไปรู้ความจริงบางอย่างระหว่างขุดบ่อออนเซ็นในชายขอบของเกเฮนน่าตามปกติน่ะ"
83301400200-26 = "ถ้าเราเชื่อมจุดของสายน้ำใต้ดินที่มีในสถาบันเกเฮนน่าเข้าด้วยกัน... จุดพวกนั้นก็จะมารวมกันในหนึ่ง#nตำแหน่ง"
83301400200-27 = "อย่าบอกนะว่าจุดที่ว่าก็คือ..."
83301400200-28 = "อื้อ ใช่แล้ว! ลานจอดรถของแพนเดโมเนียม โซไซตี้ยังไงล่ะ!"
83301400200-29 = "ถ้าเราสร้างออนเซ็นตรงนั้นได้... ก็จะเป็นการเชื่อมสายน้ำใต้ดินหลายๆ ที่ได้ในคราวเดียว...!"
83301400200-30 = "และออนเซ็นขนาดมหึมาที่นักเรียนเกเฮนน่าทุกคนจะกระโจนลงมาเล่นได้...!"
83301400200-34 = "แผนการที่เปี่ยมไปด้วยความฝันนั่นเกือบจะเป็นจริงอยู่แล้วเชียว...!"
83301400200-35 = "ไร้สาระจริงๆ..."
83301400200-36 = "ถึงครั้งนี้ฉันจะไม่มีทางเลือกอื่นนอกจากยอมถอยให้...!"
83301400200-37 = "แต่พวกเราจะยังไม่ยอมแพ้หรอกนะ...! สายน้ำไม่ได้มีสายเดียว! ถ้าแผนการครั้งนี้ล้มเหลว...!"
83301400200-38 = "ครั้งหน้าก็เป็นคิวของ <ยุทธการออนเซ็นไข่ระเบิด!> ที่จะใช้สายน้ำใต้ดินลับที่ไหลอยู่ใต้ห้องชมรม#nโภชนาการ...!"
83301400200-39 = "ก็ได้ ขอบใจนะที่บอกล่วงหน้า ไปสำนึกผิดกันเงียบๆ ด้วยละ"
83301400200-46 = "ฮึ่ย?!"

[translation]
83301400200-6 = "風，風，風紀委員長……！竟然阻止我們的計畫……！"
83301400200-7 = "雖然我很怕風紀委員長……！可是還是很委屈……！"
83301400200-8 = "我們的「格黑娜咕嘟咕嘟大作戰」竟然就這樣空虛地破滅了！"
83301400200-16 = "所以那個「格黑娜咕嘟咕嘟大作戰」到底是什麼？"
83301400200-17 = "為何要專程跑來萬魔殿停車場建造溫泉……實在難以理解。"
83301400200-21 = "會不會……只是和平常一樣想要搗亂而已？"
83301400200-22 = "才不是！"
83301400200-23 = "聽完可別嚇到哦！「格黑娜咕嘟咕嘟大作戰」就像字面上一樣──#n是要在整個格黑娜建設偉大超棒溫泉的龐大計畫！"
83301400200-24 = "…………？"
83301400200-25 = "我和平常一樣，在格黑娜外圍挖掘溫泉的時候偶爾發現了一個事實。"
83301400200-26 = "只要將格黑娜學園數條水脈的特定幾個點連在一起……它們將匯聚於同一個點上。"
83301400200-27 = "匯聚於同一個點……"
83301400200-28 = "沒錯！那就是萬魔殿的停車場！"
83301400200-29 = "只要把那裡開發成溫泉……各地的水脈就會全部連結在一起……！"
83301400200-30 = "格黑娜所有學生都能一起享受的超巨大溫泉……！"
83301400200-34 = "這充滿夢想的計畫就能實現的說……！"
83301400200-35 = "……真是太荒謬了。"
83301400200-36 = "雖然這次不得不就此撤退……！"
83301400200-37 = "但我們還沒有放棄……！#n就算這次的計畫失敗……！"
83301400200-38 = "下次就利用供給部地下流動的水脈，展開「爆炸！溫泉蛋大作戰」……！"
83301400200-39 = "我知道了。乖乖反省吧。"
83301400200-46 = "咿啊！？"

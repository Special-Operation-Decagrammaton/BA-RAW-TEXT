[translation]
12090-1 = "Episode 9;Kaiser PMC 1"
12090-2 = "Ugh, wh-who are these guys?!"
12090-3 = "They're not that strong, but they're definitely a pain to deal with...more than anything I've ever faced before."
12090-4 = "U-Ugh... Maybe even more than the Prefect Team..."
12090-5 = "What were these people? And what are they doing here?"
12090-6 = "I found the facility's insignia!"
12090-8 = "This is..."
12090-9 = "Hold on, I'm checking..."
12090-10 = "Got it. The name of the group is..."
12090-11 = "Kaiser PMC..."
12090-13 = "Yes, I'm sure of it. They're called Kaiser PMC."
12090-14 = "K-Kaiser...? You mean these guys are also with the Kaiser Corporation?"
12090-15 = "Yes. They're not listed, but they're a subsidiary of the Kaiser Corporation..."
12090-16 = "Ugh, this is getting ridiculous! It's Kaiser this, Kaiser that—everywhere we go! What the heck is their deal?!"
12090-18 = "But PMC means..."
12090-19 = "What is it?"
12090-20 = "It stands for Private Military Company..."
12090-21 = "Private Military...?!"
12090-22 = "..."
12090-23 = "They're not like those thugs in the Helmet Gang. They're super organized...just like an army!"
12090-24 = "...!"
12090-25 = "A-Army? Y-You mean they're not students?!"
12090-26 = "There were rumors about a company recruiting dropouts, expelled students, and troublemakers into a private army... Could this be..."
12090-28 = "*riiiiiiiiing*!"
12090-30 = "A-An alarm?!"
12090-31 = "It's coming from every direction... This is not good..."
12090-33 = "Do you hear...helicopters?"
12090-34 = "And that rumbling must be from...tanks."
12090-35 = "There's a huge army approaching! They're trying to surround you!"
12090-36 = "Tanks, armored vehicles, and even helicopters...! They're pulling out all the stops!"
12090-37 = "Everyone, this is dangerous! Retreat before you're surrounded! You need to break through the siege and escape!"
12090-38 = "Sensei! Awaiting your orders!"

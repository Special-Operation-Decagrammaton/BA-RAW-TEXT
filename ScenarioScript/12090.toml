[translation]
12090-1 = "ตอนที่ 9;ไคเซอร์ PMC 1"
12090-2 = "จะ... เจ้าพวกนี้มันอะไรกันเนี่ย!\n\n\n"
12090-3 = "เจ้าพวกนี้ไม่ได้เก่งอะไรเลย แต่ก็วุ่นวายกันจริงๆ เป็นศัตรูที่น่ารำคาญมากที่สุดเท่าที่เคยเจอมาเลย"
12090-4 = "อืม... ยิ่งกว่าพวกคณะกรรมการวินัยอีก"
12090-5 = "คนพวกนี้คือใครกันคะเนี่ย? มาทำอะไรอยู่ตรงนี้นะ...\n\n"
12090-6 = "เจอเครื่องหมายบางอย่างที่โรงงานแล้วค่ะ!\n"
12090-8 = "นี่มัน..."
12090-9 = "สักครู่นะคะ ฉันกำลังตรวจสอบให้ค่ะ"
12090-10 = "ตรวจสอบเรียบร้อยแล้วค่ะ ที่นี่ก็คือ..."
12090-11 = "ไคเซอร์ PMC..."
12090-13 = "...?! ใช่แล้วค่ะ ไคเซอร์ PMC"
12090-14 = "คะ.. ไคเซอร์? พวกนี้ก็อยู่ในไคเซอร์ คอร์เปอเรชั่นเหรอ?"
12090-15 = "ใช่ค่ะ ถึงชื่อจะไม่ได้อยู่ในทะเบียน... แต่ก็เป็นบริษัทในเครือของไคเซอร์ คอร์เปอเรชั่น"
12090-16 = "น่าขยะแขยงที่สุด ทำไมไปที่ไหนก็เจอแต่ไคเซอร์ ไคเซอร์แบบนี้กันเล่า?! นี่มันอะไรกันเนี่ย!!"
12090-18 = "แต่ถ้าเป็น PMC...\n"
12090-19 = "ทำไมเหรอรุ่นพี่?\n\n\n"
12090-20 = "มันมาจากคำว่า Private Military Company ที่หมายถึงธุรกิจทหารรับจ้างค่ะ"
12090-21 = "ทหารรับจ้าง...?\n\n"
12090-22 = "\n......\n"
12090-23 = "ในเชิงฝีมือแล้ว พวกนี้จะแตกต่างกับนักเลงอย่างแก๊งหมวกกันน็อกน่ะ เพราะจะมีระบบระเบียบมากกว่า อืม... พูดง่ายๆ ก็คือกองทหารนั่นแหละ"
12090-24 = "...!"
12090-25 = "กะ.. กองทหาร?! มะ.. ไม่ใช่นักเรียนด้วยเหรอ?!\n\n"
12090-26 = "ฉันเคยได้ยินข่าวลือว่ามีการกลุ่มทหารรับจ้างมารับสมัครพวกนักเรียนที่ดรอปเรียน หรือเด็กเกเรที่โดน#nไล่ออกไปด้วย อย่าบอกนะว่า..."
12090-28 = "(ตี๊ดดดดดดด!!)\n"
12090-30 = "สะ... สัญญาณเตือนภัยเหรอ?!\n\n"
12090-31 = "เสียงดังมาจากทุกหนแห่งเลย... ท่าไม่ดีแล้วละ..."
12090-33 = "นี่มัน... เสียงเฮลิคอปเตอร์เหรอ?\n"
12090-34 = "พื้นสั่นด้วย... หรือว่า... รถถัง?"
12090-35 = "มีกองกำลังขนาดใหญ่กำลังล้อมเข้ามา! พวกมันกำลังล้อมเข้ามาทางนี้ค่ะ!"
12090-36 = "ตรวจพบทั้งรถถัง รถหุ้มเกราะ แล้วก็เฮลิคอปเตอร์... จำนวนมหาศาลเลยค่ะ!"
12090-37 = "ถ้าอยู่ตรงนั้นจะเป็นอันตรายนะคะทุกคน! รีบออกมาก่อนจะถูกล้อมดีกว่าค่ะ! ฝ่าวงล้อมหนีออกมาเลยนะคะ!"
12090-38 = "คุณครูคะ! ช่วยออกคำสั่งด้วยค่ะ!\n"

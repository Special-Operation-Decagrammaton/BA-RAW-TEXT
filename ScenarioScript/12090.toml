[translation]
12090-1 = "第9話;凱薩PMC（１）"
12090-2 = "唔哇～這些傢伙到底是誰啊？"
12090-3 = "雖然不是很強，但不知道該說是礙事還是麻煩……#n總覺得比至今為止戰鬥過的對手都還棘手。"
12090-4 = "嗯，搞不好比風紀委員會還要麻煩……"
12090-5 = "他們到底是什麼人呢……而且究竟在這種地方做什麼？"
12090-6 = "我在設施內找到了某種識別標誌！"
12090-8 = "這是……"
12090-9 = "請稍等，目前正在確認……"
12090-10 = "……確認完畢。#n這個標誌……這個集團是……"
12090-11 = "……凱薩PMC。"
12090-13 = "……！？#n星野前輩說的沒錯，是凱薩PMC。"
12090-14 = "凱，凱薩……？#n所以這些傢伙也是凱薩公司的人嗎！？"
12090-15 = "是的，雖然沒有登記在名冊之中，但確實是凱薩公司旗下的企業……"
12090-16 = "怎麼走到哪裡都是凱薩凱薩凱薩！到底是怎樣！？"
12090-18 = "而且「PMC」就代表……"
12090-19 = "咦，是什麼不妙的詞嗎？"
12090-20 = "是[ruby=Private Military Company]私人軍事服務公司[/ruby]的意思……"
12090-21 = "軍，軍事……！？"
12090-22 = "……"
12090-23 = "和頭盔團那種小流氓不同，是真正組織化的專家……和名字一樣是支軍隊！"
12090-24 = "……！"
12090-25 = "軍，軍隊！？不是學生！？"
12090-26 = "我聽說有企業召集退學生和問題學生作為私兵，難道是……"
12090-28 = "（嗚噫噫噫──！！）"
12090-30 = "警，警報聲……！？"
12090-31 = "四處都能聽見，感覺要發生什麼大事了……"
12090-33 = "這是……直升機的聲音……？"
12090-34 = "還有地面的震動……恐怕有戰車。"
12090-35 = "大規模的兵力正在接近！他們打算包圍這裡！"
12090-36 = "大家說的沒錯，除了裝甲車以外還有戰車和直升機……！數量相當驚人！"
12090-37 = "請在包圍網完成前撤退！總之先逃離那裡吧……！"
12090-38 = "老師！請下指示！"

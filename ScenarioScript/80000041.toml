[translation]
80000041-1 = "Decompressing as a Pair"
80000041-5 = "U-Ugh. Today's part-time job was harder than usual."
80000041-6 = "[s] \"It was pretty busy.\""
80000041-7 = "I knew that cafe was popular, but I wasn't expecting a lunch rush like THAT."
80000041-8 = "The orders just kept coming in. I didn't think there would be an end to it."
80000041-9 = "Next thing I knew, I was still working past when my shift ended.#nThey paid me overtime, so I guess it's fine."
80000041-10 = "I didn't mean to get you caught up in it too, though."
80000041-11 = "Sorry about that, Sensei."
80000041-12 = "You ended up wasting your entire afternoon because of me."
80000041-13 = "I didn't mean for that to happen. I know you have enough things to worry about."
80000041-14 = "[s1] \"Working with you all day wasn't so bad.\"\n[s2] \"I felt pretty lucky to spend the day with you!\""
80000041-15 = "Wh-What are you talking about? Sensei?!"
80000041-16 = "Wh-What are you talking about? Sensei?!"
80000041-17 = "Haven't I told you that flattery isn't going to get you anywhere with me!"
80000041-18 = "[s] \"Really?! But I'd be happy if you complimented me!\""
80000041-19 = "J-Just because you admit it, that doesn't mean I'm going to!#nThat's too embarrassing!"
80000041-20 = "And you can SAVE the sad puppy dog eyes for someone else.#nI said I'm not doing it, and that's final."
80000041-21 = "Geez."
80000041-25 = "Pfft."
80000041-26 = "Haha. I feel like such an idiot thinking you'd hold anything against me for inconveniencing you."
80000041-27 = "[s3] \"Yeah, it's fine. Don't worry about it.\"\n[s4] \"I didn't mind one bit!\""
80000041-28 = "Well... I didn't ask you to work with me just for money today."
80000041-29 = "Well... I didn't ask you to work with me just for money today."
80000041-30 = "[s] \"What do you mean?\""
80000041-31 = "Don't act too surprised. ♪"
80000041-32 = "Didn't I say that cafe is pretty famous?"
80000041-33 = "So, ta-da! Here it is!"
80000041-39 = "[ns] \"A chocolate cake?\""
80000041-40 = "Yeah, it's their signature cake."
80000041-41 = "It's so popular that you have no hope of getting one on Valentine's Day unless you reserve it at least a month in advance."
80000041-42 = "They said they'd give me one on top of my pay if I worked there for the day, though!"
80000041-43 = "[s] \"Was this your plan all along?\""
80000041-44 = "Yep. So what do you think? It's perfect for Valentine's Day, right?"
80000041-45 = "[s] \"It's amazing, Serika!\""
80000041-46 = "Heh! That's it, shower me in compliments! I'll take all the praise I can get!"
80000041-47 = "[s] \"More? I could give you a few headpats. How about it?\""
80000041-51 = "Wh-What?! No! I mean, uh... I just don't wanna mess my hair up!"
80000041-52 = "W-Wait! I'm ticklish there! Ahhhhhh!"
80000041-54 = "O-Okay, knock it off already! You made your point!"
80000041-55 = "A-Anyway, it's getting pretty late."
80000041-56 = "So...if you're up for it, want to go share the cake together?"
80000041-57 = "[s] \"Sure! I'd love to!\""
80000041-58 = "Great! Let's find somewhere to sit. Here's to a day's work."
80000041-60 = "Serika and I enjoyed the decadent chocolate cake together as the sun set."

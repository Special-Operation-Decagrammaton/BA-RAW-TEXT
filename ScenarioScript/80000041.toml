[translation]
80000041-1 = "只屬於兩人的慶功宴"
80000041-5 = "這次的打工好像比之前的還累……"
80000041-6 = "[s]「客人真的很多呢……」"
80000041-7 = "雖然知道是非常有名的甜點店，沒想到居然這麼誇張……"
80000041-8 = "訂單完全沒有要停下來的意思，永遠越做越多……"
80000041-9 = "還大幅延長了本來的關門時間……雖然有賺到加班費也不錯啦。"
80000041-10 = "啊，不過把老師一起拖下水了……"
80000041-11 = "……抱歉，老師。"
80000041-12 = "都是因為我隨口說的邀請，害老師花了這麼多時間……"
80000041-13 = "明明知道老師很忙的說。"
80000041-14 = "[s1]「沒關係，我不這麼覺得哦。」\n[s2]「因為能一直跟茜香待在一起很開心。」"
80000041-15 = "咦，咦咦……！？"
80000041-16 = "咦，咦咦……！？"
80000041-17 = "怎，怎麼突然說那種話……就，就算你這麼說，我也不會給你任何獎勵的哦！？"
80000041-18 = "[s]「硬要說的話，被茜香稱讚應該會很開心吧。」"
80000041-19 = "咦，是想要我說「好棒好棒」之類的意思……？那，那實在是有點羞恥……！"
80000041-20 = "啊啊真是的為什麼要露出那麼失望的表情啊！？就說不會做了！？"
80000041-21 = "真受不了……"
80000041-25 = "……呵呵。"
80000041-26 = "唉……我還擔心是不是給老師添麻煩了，像個笨蛋一樣。"
80000041-27 = "[s3]「嗯，所以不用在意的唷。」\n[s4]「那種意外也是種樂趣。」"
80000041-28 = "嗯。而且今天無論如何也想在那裡打工。"
80000041-29 = "嗯。而且今天無論如何也想在那裡打工。"
80000041-30 = "[s]「……？」"
80000041-31 = "哼哼♪聽了可別嚇到哦，老師。"
80000041-32 = "既然會選那麼有名又忙碌的地方打工，當然是有目標的。"
80000041-33 = "鏘鏘──！"
80000041-39 = "[ns]「巧克力蛋糕？」"
80000041-40 = "嗯，這是那間店裡最受歡迎的招牌商品。"
80000041-41 = "因為實在太受歡迎，似乎在情人節的一個月之前就已經被預約完畢了哦。"
80000041-42 = "但是我聽說只要在這間店打工，除了薪水之外還能額外拿到這個蛋糕當禮物。"
80000041-43 = "[s]「原來如此，還有這個目的啊。」"
80000041-44 = "沒錯沒錯。呵呵，畢竟是難得的情人節嘛。"
80000041-45 = "[s]「居然能獲得那種情報，真厲害。」"
80000041-46 = "啊哈，再多稱讚一點也可以唷！放馬過來！"
80000041-47 = "[s]「你說『多稱讚一點』……摸摸頭之類的？」"
80000041-51 = "咦，那個，我是無所謂啦……呃哇啊啊！？"
80000041-52 = "等，等一下，不行！那裡有點敏感……暫停暫停！"
80000041-54 = "啊，不是那個，我也不是不喜歡……啊，等等啊！到此為止！"
80000041-55 = "唉……總之，現在時間也不早了……"
80000041-56 = "老師願意的話，要不要一起吃這個蛋糕……？"
80000041-57 = "[s]「當然，我很樂意。」"
80000041-58 = "嗯！那走吧。是只屬於我們的慶功宴呢。"
80000041-60 = "（之後便和茜香一起品嚐了美味的蛋糕）"

[translation]
80000041-1 = "งานเลี้ยงฉลองปิดงานของสองคน"
80000041-5 = "ฮะ...ฮือ... เหนื่อยจังเลย งานพาร์ทไทม์เนี่ย..."
80000041-6 = "[s] \"ลูกค้าเยอะมากเลยนะ\""
80000041-7 = "อื้อ... ตอนสมัครก็รู้อยู่หรอกว่าเป็นงานพาร์ทไทม์ที่ร้านขนมหวานชื่อดัง แต่ไม่คิดเลยว่าจะเหนื่อยขนาดนี้"
80000041-8 = "พอจัดการเรื่องออเดอร์ไปได้รอบนึงแล้ว ก็เจอกับออเดอร์ต่อไป... หลังจากนั้นก็มีออเดอร์มาเรื่อยๆ เหมือนพายุถล่มเลย..."
80000041-9 = "พอรู้ตัวอีกทีก็ทำงานเลยเวลางานที่ตกลงเอาไว้ไปตั้งเยอะ... แต่ยังไงก็ได้ค่าทำงานโอทีมา ก็คือว่าโชคดีอยู่หรอกนะ..."
80000041-10 = "แต่ถึงจะพูดแบบนั้นก็เถอะ กลับต้องมาลำบากคุณครูให้มาช่วยแบบนี้เพราะฉันดันโลภมากไป..."
80000041-11 = "ขอโทษนะ คุณครู ฉันไม่รอบคอบเอง..."
80000041-12 = "เพราะฉันขอให้คุณครูมาช่วยแบบนี้ คุณครูเลยเสียเวลาวันนี้ไปทั้งวันเลย"
80000041-13 = "แย่จริงๆ ฉันเองก็ไม่รู้ว่าจะพูดยังไงดี นอกจากคำว่าขอโทษ..."
80000041-14 = "[s1] \"ไม่หรอก ได้ทำงานกับเซริกะจังทั้งวัน\"\n[s2] \"ถือว่าเป็นโชคดีของครูเลยนะ!\""
80000041-15 = "จะ...จู่ๆ พูดอะไรเนี่ย หา! คุณครู?!"
80000041-16 = "จะ...จู่ๆ พูดอะไรเนี่ย หา! คุณครู?!"
80000041-17 = "จะ...จู่ๆ พูดเข้าข้างกันแบบนั้น คะ...คิดว่าฉันจะพูดชมกลับรึยังไง?!"
80000041-18 = "[s] \"ครูเองก็อยากได้คำชมจากเซริกะเยอะๆ นะ!\""
80000041-19 = "นี่ เดี๋ยวก่อนสิ ฉันแค่พูดเฉยๆ เอง คิดว่าฉันจะทำให้จริงๆ งั้นเหรอ...!"
80000041-20 = "นี่ ทำไมทำหน้าผิดหวัง หูลู่หางตกแบบนั้นเล่า?! ฉันไม่ชมหรอกนะ!"
80000041-21 = "อา~ ให้ตายสิ... จริงๆ เล๊ยยยย...!"
80000041-25 = "ฮิฮิ..."
80000041-26 = "เฮ้อ... ฉันเอาแต่กังวลเกินไปสินะว่าจะทำตัวเป็นภาระ สร้างความลำบากให้กับคุณครูน่ะ"
80000041-27 = "[s3] \"อื้อ ไม่ต้องห่วงหรอก\"\n[s4] \"ด้อน วอรี่~ ด้อน วอรี่~!\""
80000041-28 = "ก็นะ... วันนี้ที่ฉันชวนมาทำงานพาร์ทไทม์ที่ร้านนี้ด้วยกันน่ะ ไม่ใช่เพราะเรื่องเงินอย่างเดียวหรอกนะ..."
80000041-29 = "ก็นะ... วันนี้ที่ฉันชวนมาทำงานพาร์ทไทม์ที่ร้านนี้ด้วยกันน่ะ ไม่ใช่เพราะเรื่องเงินอย่างเดียวหรอกนะ..."
80000041-30 = "[s] \"หมายความว่าไงเหรอ?\""
80000041-31 = "หืม~♪ ไม่เห็นต้องตกใจเลย คุณครู"
80000041-32 = "ร้านที่เราทำงานพิเศษอยู่นี่ เป็นคาเฟ่ของหวานชื่อดังเลยนะ"
80000041-33 = "เพราะงั้น... แต่นแต๊น~! นี่ไง!"
80000041-39 = "[ns] \"นี่มันเค้กช็อกโกแลตนี่นา?\""
80000041-40 = "อื้อ เค้กช็อกโกแลตซิกเนเจอร์ที่ขายดีที่สุดของร้านนี้เลย"
80000041-41 = "ช่วงนี้ขายดีมาก ถ้าไม่สั่งจองไว้ล่วงหน้าหนึ่งเดือนจะไม่มีทางได้กินแน่ๆ"
80000041-42 = "พอมาทำงานพาร์ทไทม์ที่ร้านนี้นอกจากจะได้เงินค่าทำงาน ยังได้เค้กนี้มาเป็นของขวัญด้วยนะ"
80000041-43 = "[s] \"เซริกะเล็งเค้กนี่ไว้ตั้งแต่แรกแล้วใช่มั้ย?\""
80000041-44 = "ใช่แล้ว ฮิฮิ ความคิดที่ยอดเยี่ยมของฉัน เหมาะกับวันวาเลนไทน์แบบนี้พอดีเลยใช่มั้ยล่ะ?"
80000041-45 = "[s] \"ว้าววว สมกับเป็นเซริกะจัง สุดยอดเลย!\""
80000041-46 = "ฮะฮะฮ่า! ชมฉันอีกก็ได้นะ! อื้อ ชมมาอีกเยอะๆ เลยก็ได้!"
80000041-47 = "[s] \"ถ้างั้นเซริกะ...! ครูจะลูบหัวให้เอง มานี่สิ!\""
80000041-51 = "ฮะ...ฮึ่ยยย! ยะ...อย่ามาทำหัวคนอื่นยุ่งแบบนี้สิ!"
80000041-52 = "ดะ...เดี๋ยวสิ! ตะ...ตรงนั้นมันจักจี้นะ! พอแล้ว! พอเลย! บอกให้พอไงเล่า!"
80000041-54 = "นะ...แน่นอนว่า.. ถะ...ถ้าเป็นคุณครูมาลูบหัวแบบนี้ละก็ ฉันก็ไม่ได้รังเกียจอะไรหรอก เดี๋ยวสิ แต่ว่า... อ๊าาาา! พอได้แล้ว!"
80000041-55 = "ยัง-ไง-ก็-เถอะ! เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย..."
80000041-56 = "ถ้าคุณครูไม่ว่าอะไร... ฉันอยากจะชวนมานั่งกินเค้กนี่ด้วยกันในห้องก่อน... หืม? ว่าไงล่ะ?"
80000041-57 = "[s] \"ไปสิ! ครูกินด้วย!\""
80000041-58 = "ฮิฮิ... เอางั้นเหรอ? งั้นก็ไปเถอะ คุณครู ไปเลี้ยงฉลองปิดงานพาร์ทไทม์กันเถอะ"
80000041-60 = "(จากนั้นคุณครูก็ไปนั่งกินเค้กกับเซริกะอย่างเอร็ดอร่อย)"

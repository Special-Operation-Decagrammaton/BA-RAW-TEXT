[translation]
80000041-1 = "#title;둘이서 하는 뒤풀이"
80000041-2 = "1;세리카;11\n#1;ar\n#wait;1200"
80000041-3 = "1;세리카;11\n#1;m2\n#1;h\n#wait;1200"
80000041-4 = "1;세리카;11\n#1;m3\n#1;h\n#wait;1200"
80000041-5 = "1;세리카;11;으, 으으……. 히, 힘들었다. 아르바이트…….\n#1;em;[속상함]\n#1;stiff"
80000041-6 = "[s] \"손님, 엄청났었지.\""
80000041-7 = "1;세리카;13;으응……. 사전에 유명한 디저트 가게의 아르바이트라는 건 알고 있었지만, 설마 이 정도였을 줄이야.\n#1;em;[땀]"
80000041-8 = "1;세리카;05;오더 하나를 해결했다고 생각하면 바로 다음 오더가……. 그 뒤엔 또 다음 오더가 계속해서 노도처럼 몰려들어서…….\n#1;stiff"
80000041-9 = "1;세리카;02;정신을 차리고 보니 예정했던 아르바이트 시간은 진즉 오버했지……. 그만큼 초과수당을 받았으니 럭-키라고 못할 건 또 없긴 하지만……."
80000041-10 = "1;세리카;11;그렇다고는 해도, 내 욕심 때문에 선생님에게 폐를 끼치기만 하고…….\n#1;em;[...]"
80000041-11 = "1;세리카;04;……미안. 선생님. 내 불찰이야.\n#1;greeting"
80000041-12 = "1;세리카;99;괜히 내가 도와 달라고 한 탓에, 오늘 하루가 맥없이 날아가 버렸네.\n#1;stiff"
80000041-13 = "1;세리카;11;나도 참. 뭘 하는 건지……. 괜히 휘말린 선생님에겐 미안하다는 말밖에는…….\n#1;em;[속상함]"
80000041-14 = "[s1] \"아냐. 세리카랑 하루종일 아르바이트를 할 수 있었다니.\"\n[s2] \"내 쪽이야말로 럭-키라고!\""
80000041-15 = "1;세리카;07;가, 가, 갑자기 무슨 소리를 하는 거야?! 선생님은?!\n#1;em;[?!]\n#1;shake"
80000041-16 = "1;세리카;07;가, 가, 갑자기 무슨 소리를 하는 거야?! 선생님은?!\n#1;em;[?!]\n#1;shake"
80000041-17 = "1;세리카;04;그, 그런 입에 발린 말을 한다고, 내가 뭐, 치, 칭찬이라도 해줄까 봐?!\n#1;hophop"
80000041-18 = "[s] \"앗?! 세리카의 격한 칭찬! 받고 싶어!\""
80000041-19 = "1;세리카;07;아니, 잠깐. 말이 그렇다는 거잖아! 말이! 내가 진짜로 그런 걸 해준다고는……!\n#1;stiff"
80000041-20 = "1;세리카;09;아아, 진짜 왜 그렇게 실망한 얼굴을 하는 거야?! 안 한다니까?!\n#1;em;[빠직]"
80000041-21 = "1;세리카;06;아~ 정말……. 진짜……!\n#fontsize;80"
80000041-22 = "#st;[0,0];instant;1;"
80000041-23 = "#clearST"
80000041-24 = "1;세리카;06\n#1;em;…\n#wait;2500"
80000041-25 = "1;세리카;12;……풋.\n#1;greeting"
80000041-26 = "1;세리카;03;나 참……. 혹시나 선생님에게 괜히 폐를 끼친 건 아닐까. 걱정한 나만 바보 같아지잖아.\n#1;em;[재잘]"
80000041-27 = "[s3] \"응, 그러니 전혀 신경 쓸 거 없어.\"\n[s4] \"괜찮아! 괜찮아!\""
80000041-28 = "1;세리카;01;뭐어……. 나도 오늘 같은 장소에서 아르바이트를 같이하자고 했던 건, 단순히 돈 때문 만에 그랬던 건 아니니까…….\n#1;em;[...]"
80000041-29 = "1;세리카;01;뭐어……. 나도 오늘 같은 장소에서 아르바이트를 같이하자고 했던 건, 단순히 돈 때문 만에 그랬던 건 아니니까…….\n#1;em;[...]"
80000041-30 = "[s] \"무슨 뜻이야?\""
80000041-31 = "1;세리카;03;흐흥~♪ 놀라지 말라고. 선생님.\n#1;em;[음표]"
80000041-32 = "1;세리카;12;우리가 아르바이트했던 곳, 원래부터 제법 유명한 디저트 카페라고 했잖아?"
80000041-33 = "1;세리카;12;그래서 짜-잔! 바로 이거야!\n#1;closeup\n#1;greeting"
80000041-34 = "#st;[0,0];instant;1;"
80000041-35 = "#clearST"
80000041-36 = "1;세리카;12\n#1;d\n#1;closeup\n#wait;1000"
80000041-37 = "#all;hide"
80000041-38 = "#wait;2500"
80000041-39 = "[ns] \"이건, 초콜릿 케이크?\""
80000041-40 = "3;세리카;01;응, 우리가 일했던 가게에서 제일 잘 나가는 시그니처 초콜릿 케이크래.\n#3;em;[반응]\n#3;a"
80000041-41 = "3;세리카;02;얼마나 인기가 많은지, 발렌타인 데이가 되기 한 달 전부터 예약하지 않으면 절대로 살 수 없는 물건이라는 모양인데."
80000041-42 = "3;세리카;03;마침 이 카페에서 아르바이트를 하면, 아르바이트비뿐만 아니라, 이 케이크도 선물로 준다던 거 있지?"
80000041-43 = "[s] \"세리카는 처음부터 이걸 노리고?\""
80000041-44 = "3;세리카;12;맞아. 후훗. 어때? 내 선구안. 오늘 같은 발렌타인 데이에 딱이지?\n#3;greeting"
80000041-45 = "[s] \"오, 역시 세리카야. 굉장해!\""
80000041-46 = "3;세리카;03;아하핫! 좀 더 칭찬해도 좋아! 응! 얼마든지! 하라구!\n#3;em;[반짝]"
80000041-47 = "[s] \"그럼 세리카! 머리 쓰다듬어줄게! 자, 이리 와!\""
80000041-48 = "#st;[0,0];instant;1;"
80000041-49 = "#clearST"
80000041-50 = "3;세리카;04\n#3;em;[?!]\n#3;shake\n#3;greeting\n#3;closeup\n#wait;1000"
80000041-51 = "3;세리카;07;으, 으응?! 그렇다고 기세를 타고 남의 머리를 마구 헝클어트리지 말라고!\n#3;hophop\n#3;closeup"
80000041-52 = "3;세리카;07;자, 잠깐! 그곳은 좀 민감하달까! 아니, 아웃! 아웃이니까!\n#3;shake\n#3;closeup"
80000041-53 = "#all;hide"
80000041-54 = "3;세리카;04;무, 물론……. 선생님이 상대라면, 그, 무작정 시, 싫다는 건 아니지만. 아니, 그렇지만 아아! 그래도 좀!\n#3;em;[...]\n#3;a"
80000041-55 = "3;세리카;06;하! 여! 간! 이미 이렇게나 시간이 늦어진 거…….\n#3;hophop\n#3;closeup"
80000041-56 = "3;세리카;02;선생님만 괜찮다면, 잠깐 방에 들러서 이 케이크……. 같이 먹으면 어떨까. 하는데, 응? 어때……?\n#3;em;[///]\n#3;closeup"
80000041-57 = "[s] \"물론! 같이 먹어야지!\""
80000041-58 = "3;세리카;12;후훗…. 그래? 그럼, 가자. 선생님. 아르바이트의 뒤풀이.\n#3;closeup"
80000041-59 = "#all;hide"
80000041-60 = "#na;(그 후 세리카와 함께, 맛있는 케이크를 맛보았다)"

[translation]
41070-1 = "第7話;胡蘿蔔作戰（１）"
41070-2 = "（幾天後，為了確認大家是否平安，再度來到公園）"
41070-5 = "兔寶寶公園前"
41070-8 = "萌，為什麼你要把燒肉便當拿走！？"
41070-9 = "還有為什麼，便當是我拿來的你還抱怨啊！"
41070-10 = "你昨天已經吃了薑汁燒肉便當吧！今天乖乖的去吃豆芽菜便當！"
41070-11 = "誰管你，要吃豆芽菜咲希自己吃！"
41070-15 = "那，我要這個香腸便當……"
41070-18 = "不行！！"
41070-23 = "大家，請冷靜一點。SRT竟然圍著食物吵架，太難看了。"
41070-24 = "在什麼保證都沒有的現況，爭執品質是沒有意義的。現在只要能填飽肚子就好了。"
41070-25 = "那都子要選哪一個啊。"
41070-26 = "我，"
41070-27 = "要這個唐揚雞便當。"
41070-28 = "這不是最貴的嗎！！！"
41070-29 = "[s]「嗨，似乎各方面都沒問題？」"
41070-33 = "………"
41070-35 = "偏偏在這個時機……"
41070-36 = "不那個，這是，我們沒有為便當吵架……"
41070-37 = "沒錯，只是和樂融融地在討論午餐而已。"
41070-38 = "[s1] 「和樂融融……？」\n[s2] 「沒有吵架的話就好……」"
41070-39 = "看起來像在吵架的話，去把眼睛洗一下比較好。"
41070-40 = "看起來像在吵架的話，去把眼睛洗一下比較好。"
41070-41 = "我們只是在進行非常正當的協議。"
41070-42 = "不管結果如何，作為一同訓練的同袍，屆時……"
41070-43 = "那，燒肉便當就讓給我吧。"
41070-44 = "還在協議中吧！好了啦先放著！"
41070-50 = "……讓你看見丟臉的場面了呢。"
41070-51 = "不過，是的。沒有什麼大問題。"
41070-52 = "食物方面也，嘛……"
41070-54 = "多虧有廢棄便當，暫時是解決了。"
41070-55 = "呵呵，老師也許是想給予恥辱讓我們屈服，但不會那麼順利唷。我們完全不在意那種事。"
41070-57 = "為了作戰我們什麼都會做。"
41070-58 = "我們現在就算沒有老師，也會就此……！"
41070-59 = "[s] 「不過，臉色似乎不太好耶……」"
41070-61 = "[s] 「還好嗎？身體不舒服？」"
41070-67 = "等，等等！不要靠近我！"
41070-71 = "再接近的話我要認真揍下去囉！？"
41070-72 = "[s] 「咦，咦咦……？」"
41070-74 = "那是，嘛……"
41070-81 = "請不要若無其事的靠近我。小心我射你的腳。"
41070-82 = "[s] 「怎，怎麼這樣……」"
41070-84 = "因為，味道……"
41070-85 = "[s3] 「……味道？」\n[s4] 「我來這裡之前有洗澡耶……？」"
41070-88 = "不所以說，不是那樣……！"
41070-89 = "[s5] 「是因為最近都沒有泡澡嗎……」\n[s6] 「難怪會被學生避開……」"
41070-92 = "不是那樣！問題是我們啦！"
41070-94 = "啊～啊，說出來了……"
41070-95 = "沒，沒辦法吧！已經4天都沒有洗澡了！"
41070-96 = "[s] 「抱，抱歉……那去澡堂之類的呢……？」"
41070-98 = "連買糧食的錢都沒有，你以為會有餘力去澡堂嗎？"
41070-99 = "洗臉的話，還能靠公園的水……"
41070-100 = "雖然作戰中流汗也不會在意，不過長期下來會造成衛生問題……"
41070-101 = "[s] 「你們可以去用夏萊的淋浴間唷？」"
41070-105 = "……真差勁。"
41070-106 = "……無藥可救。"
41070-107 = "我，我們在解除武裝的瞬間，打算做什麼……！？"
41070-109 = "想趁我們淋浴的空隙打算什麼啊？難道比起實物更喜歡殘渣？咻──！！"
41070-110 = "[s] 「我到底被當成了什麼……」"
41070-112 = "無法信賴的大人。"
41070-113 = "可疑人士。"
41070-114 = "不可燃的垃圾之類的……"
41070-115 = "什麼都不是……"
41070-116 = "[s]「是嗎……」"
41070-118 = "總之，我們會思考解決方式，還請老師暫時不要靠近公園。"
41070-119 = "就算那麼說，解決方式什麼的……"
41070-120 = "在外面淋濕的話，那樣才會感冒吧……"
41070-122 = "……要往廁所的儲水槽，發射導彈嗎？"
41070-123 = "我想反而會變更髒……"
41070-124 = "[s] 「在露營的時候洗澡的話，用鐵桶之類的……？」"
41070-126 = "……鐵桶？"
41070-127 = "啊啊，在下面生火的那種嗎。"
41070-128 = "以前，似乎有在百鬼夜行聯合學園看過類似的東西。"
41070-130 = "那個，要怎麼洗身體啊？"
41070-131 = "而且有夠老氣。"
41070-132 = "同感，但老師畢竟有年紀嘛？"
41070-134 = "……不過，"
41070-135 = "除此之外可能也沒辦法了。"
41070-136 = "也沒辦法準備像樣的設備……"
41070-141 = "萌。可以連接資源管理系統，尋找是否有在使用鐵桶的現場嗎？"
41070-142 = "找到的話，就立刻出動吧。"
41070-143 = "出動，也就是……"
41070-144 = "衛生是和部隊存亡有直接關聯的重要問題。不管用什麼樣的手段，都必須盡早解決。"
41070-145 = "那麼從現在起，為確保浴缸……"
41070-147 = "開始「胡蘿蔔作戰」！"
41070-149 = "下一話;胡蘿蔔作戰（２）"

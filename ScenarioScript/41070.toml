[translation]
41070-1 = "ตอนที่ 7; ปฏิบัติการแคร์รอต 1"
41070-2 = "(ไม่กี่วันต่อมา คุณครูก็ไปที่สวนสาธารณะอีกเพื่อดูว่ามิยาโกะและเพื่อนๆ เป็นอย่างไรบ้าง)"
41070-5 = "หน้าโคะอุซางิ การ์เด้น"
41070-8 = "เดี๋ยวก่อน โมเอะ! ทำไมเธอถึงได้ข้าวกล่องหน้าเนื้อย่างไปล่ะ?"
41070-9 = "ก็ฉันเป็นคนไปเอาข้าวกล่องนี้มายังไงล่ะ ไม่พอใจอะไรเหรอ?"
41070-10 = "เมื่อวานเธอก็กินข้าวกล่องหมูผัดขิงไปแล้วนี่นา! วันนี้ก็กินข้าวหน้าถั่วงอกไปซะสิ!"
41070-11 = "ไม่เอา! เธอนั่นแหละเอาไปกิน!"
41070-15 = "เอ่อ... ถ้าไม่มีใครว่าอะไร ขอฉันกินข้าวกล่องไส้กรอกเวียนนาตรงนี้ได้ไหม?"
41070-18 = "ไม่ได้!"
41070-23 = "ทุกคนใจเย็นๆ ก่อนค่ะ นักเรียน SRT กำลังทะเลาะกันเรื่องอาหารเหรอคะ? นี่มันพฤติกรรมอะไรกัน?"
41070-24 = "เราไม่ได้มีเสบียงอาหารเหลือเฟือนะคะ นี่ไม่ใช่เวลามาเกี่ยงกันว่าจะกินหรือไม่กินอะไร แค่มีอะไรให้กินพออิ่มท้องได้ก็พอแล้วค่ะ"
41070-25 = "อะไรของเธอเนี่ย งั้นเธอเอาข้าวกล่องถั่วงอกนี่ไปกินไหมล่ะ?"
41070-26 = "ฉัน..."
41070-27 = "จะเอาข้าวกล่องคาราอะเกะตรงนี้ไปเองค่ะ"
41070-28 = "อย่าแกล้งทำเป็นเสียสละแล้วเอาข้าวที่แพงที่สุดไปสิ!"
41070-29 = "[s] \"มีปัญหาอะไรกันหรือเปล่า?\""
41070-33 = "........."
41070-35 = "เฮ้อ ทำไมต้องมาตอนนี้ด้วยนะ..."
41070-36 = "คือว่าเรื่องนั้น... พวกเราไม่ได้กำลังทะเลาะกันเพราะเรื่องข้าวกล่องหรอก..."
41070-37 = "ไม่เห็นจะมีปัญหาอะไรเลย! เรากำลังเตรียมอาหารกลางวันกันอย่างเป็นมิตร"
41070-38 = "[s1] \"อย่างเป็นมิตร...?\"\n[s2] \"เหมือนกำลังทะเลาะกันมากกว่านะ\""
41070-39 = "ก็เป็นมิตรน่ะสิ!"
41070-40 = "ตาฝาดไปเองรึเปล่า?"
41070-41 = "ถึงเราจะพูดเสียงดังกันบ้าง แต่กำลังแจกข้าวกล่องผ่านการเจรจาแบบประชาธิปไตยต่างหาก"
41070-42 = "และแม้ว่าผลจะออกมาไม่เป็นที่น่าพอใจ แต่พวกเราก็ทนได้เพราะยังไงก็เป็นสหายร่วมรบกันมา..."
41070-43 = "งั้นฉันเอาข้าวหน้าเนื้อย่างนี่ไปนะ?"
41070-44 = "จะเอาไปได้ยังไงล่ะ! ส่งมาให้ฉันนะ!"
41070-50 = "ไม่น่าให้เห็นภาพน่าอายแบบนี้เลยค่ะ..."
41070-51 = "แต่ก็ตามที่ซากิพูดเมื่อกี๊เลยค่ะ พวกฉันไม่มีปัญหาในการอยู่ที่นี่หรอกค่ะ"
41070-52 = "ปัญหาเรื่องอาหารการกินที่เคยหนักใจในตอนแรกก็คลี่คลายได้แล้วด้วย"
41070-54 = "ส่วนใหญ่แล้วพวกเราจะแก้ปัญหาด้วยข้าวกล่องเหลือทิ้งจากร้านสะดวกซื้อใกล้ๆ..."
41070-55 = "ฮุฮุ... คุณครูอาจจะคิดว่าพวกเราอับอายที่ได้ข้าวกล่องเหลือทิ้ง แต่พวกเราไม่สนใจเรื่องเล็กน้อย#nแบบนั้นหรอก!"
41070-57 = "มันเป็นเพราะพวกเราคือเจ้าหน้าที่พิเศษที่ทำได้ทุกอย่างเพื่อให้ปฏิบัติการสำเร็จยังไงล่ะ!"
41070-58 = "และตอนนี้เราก็อยู่ในสวนสาธารณะได้อย่างสบายโดยไม่ต้องการความช่วยเหลือจากครูแล้ว!"
41070-59 = "[s] \"ทำไมสีหน้าไม่สู้ดีเหมือนคำพูดเลยล่ะ...\""
41070-61 = "[s] \"ไม่ได้ไม่สบายตรงไหนใช่ไหม?\""
41070-67 = "ยะ... หยุดนะ! อย่าเข้ามาใกล้!"
41070-71 = "ถ้าเข้ามาอีกนิดฉันเตะหน้าหงายแน่!"
41070-72 = "[s] \"ทำไมเป็นแบบนี้ล่ะ?\""
41070-74 = "อาจเป็นเพราะ..."
41070-81 = "อย่าเนียนเดินเข้ามานะคะ ครั้งหน้าฉันเล็งที่เท้าแน่"
41070-82 = "[s] \"ทำไมทุกคนระวังตัวกันขนาดนี้ล่ะ?\""
41070-84 = "ก็แบบ... กลัวจะได้กลิ่นน่ะ..."
41070-85 = "[s3] \"ครูมีกลิ่นตัวเหรอ?\"\n[s4] \"ก่อนมาที่นี่ครูก็อาบน้ำมาแล้วนะ\""
41070-88 = "เปล่า ไม่ใช่ว่าครูมีกลิ่นตัวหรอก..."
41070-89 = "[s5] \"ครูมีกลิ่นที่นักเรียนไม่ชอบเหรอเนี่ย...\"\n[s6] \"น่าน้อยใจชะมัดเลย...\""
41070-92 = "ไม่ใช่อย่างนั้น! กลัวว่าจะได้กลิ่นจากพวกเราน่ะ!"
41070-94 = "ว้าว... ยัยคนนี้กล้าพูดออกมาจากปากตัวเองเลย"
41070-95 = "ก็... ก็ช่วยไม่ได้นี่! เราไม่ได้อาบน้ำมาตั้ง 4 วันแล้วนะ!"
41070-96 = "[s] \"แล้วทำไมไม่ไปโรงอาบน้ำกันล่ะ?\""
41070-98 = "เงินจะซื้อข้าวกินยังไม่มีเลย แล้วจะเอาเงินที่ไหนไปโรงอาบน้ำกันเล่า"
41070-99 = "ถึงเราจะล้างหน้าล้างตาในห้องน้ำสาธารณะได้ แต่จะให้อาบน้ำเลยคงไม่สะดวกค่ะ..."
41070-100 = "ถ้าเป็นเหงื่อที่ออกนิดหน่อยเวลาทำภารกิจพวกเราก็ไม่สนใจหรอกค่ะ แต่ในระยะยาวแล้วมันก็น่า#nเป็นห่วงเรื่องสุขอนามัยอยู่ค่ะ"
41070-101 = "[s] \"ถ้าอยากหาที่อาบน้ำ ก็มาใช้ห้องอาบน้ำของชาเล่ต์ได้นะ\""
41070-105 = "ต้องมีอะไรแน่ๆ..."
41070-106 = "ใครจะไปเชื่อใจได้ล่ะคะ..."
41070-107 = "อย่าบอกนะว่าจะใช้โอกาสที่เราเก็บของไปอาบน้ำแล้วทำอะไรน่าสงสัยขึ้นมา..."
41070-109 = "จะแอบดมเสื้อผ้าของพวกเราตอนพวกเราไปอาบน้ำใช่ไหม?!"
41070-110 = "[s] \"นี่พวกเธอคิดว่าครูเป็นคนยังไงเนี่ย?!\""
41070-112 = "ผู้ใหญ่ที่เชื่อใจไม่ได้"
41070-113 = "ภัยสังคม"
41070-114 = "ขยะเปียก?"
41070-115 = "บะ...บางทีอาจไม่เกี่ยวกันก็ได้..."
41070-116 = "[s] \"ใจร้ายเกินไปแล้ว....\""
41070-118 = "ช่างเถอะ จนกว่าพวกฉันจะหาวิธีอาบน้ำอย่างจริงๆ จังๆ ได้ คุณครูก็ไม่ต้องเข้ามาในสวนสาธารณะนี้#nบ่อยหรอกนะคะ"
41070-119 = "แต่เราหาน้ำอุ่นไม่ได้เลยนะ แล้วจะอาบน้ำอย่างจริงๆ จังๆ ได้ไง?"
41070-120 = "อากาศอย่างนี้ถ้าให้ไปอาบน้ำเย็นข้างนอก มีหวังได้เป็นหวัดแน่ๆ"
41070-122 = "...จุดระเบิดไฟในถังน้ำในห้องน้ำเลยไหมล่ะ?"
41070-123 = "แบบนั้นตัวได้สกปรกมากกว่าเดิมน่ะสิ..."
41070-124 = "[s] \"งั้นลองใช้ถังกลมดูไหมล่ะ?\""
41070-126 = "ถังกลมเหรอคะ?"
41070-127 = "ให้เอาน้ำใส่ถัง แล้วจุดไฟข้างใต้ให้น้ำอุ่นงั้นเหรอ..."
41070-128 = "ตอนเด็กๆ ฉันเคยเห็นอะไรคล้ายๆ แบบนี้ที่สหพันธ์เฮียกคิยาโคค่ะ"
41070-130 = "แต่เราไม่ใช่นินจานะ จะให้อาบน้ำในถังกลมร้อนๆ ได้ไง?"
41070-131 = "เป็นไอเดียที่เชยชะมัด สงสัยจะได้แรงบันดาลใจมาจากหนังหรือแอนิเมชันเก่าๆ ละสิ"
41070-132 = "เห็นด้วย คุณครูนี่เป็นคนเจนไหนเหรอ?"
41070-134 = "แต่ก็ช่วยไม่ได้นะคะ..."
41070-135 = "จะให้เอาอ่างน้ำร้อนมาติดตั้งในสวนสาธารณะก็คงไม่ได้..."
41070-136 = "ต้องบอกว่าเราไม่มีเงินไปซื้ออ่างน้ำร้อนตั้งแต่แรกน่าจะเหมาะกว่า..."
41070-141 = "โมเอะ ช่วยเข้าระบบจัดการทรัพยากรของคิโวทอสแล้วเช็กให้หน่อยค่ะว่าแถวนี้มีที่ไหนใช้ถังกลม#nบ้างหรือเปล่า"
41070-142 = "ส่วนสมาชิกคนอื่น ให้เตรียมอุปกรณ์และติดอาวุธรอท่าไว้ จะได้ออกปฏิบัติการได้ทันทีที่ได้ข้อมูล#nจากโมเอะค่ะ"
41070-143 = "จู่ๆ ก็ให้ออกปฏิบัติการเหรอ..."
41070-144 = "สุขอนามัยเป็นปัญหาสำคัญที่ส่งผลโดยตรงกับพละกำลังของกองทหาร ถ้าสามารถคลี่คลายปัญหา#nนี้ได้ละก็ ไม่ว่าจะวิธีไหนก็ต้องยอมทำค่ะ"
41070-145 = "เอาละค่ะ..."
41070-147 = "เริ่ม <ปฏิบัติการแคร์รอต> เพื่ออ่างอาบน้ำของเราได้เลยค่ะ!"
41070-149 = "ตอนต่อไป; ปฏิบัติการแคร์รอต 2"

[translation]
51020-1 = "Episode 2;Sudden Encounter 1"
51020-4 = "[ns] \"...What are all these lanterns?\""
51020-5 = "Hyakkiyako's shopping district was covered in lanterns. The streets and roofs were positively shining."
51020-10 = "You can't fool my eyes!"
51020-15 = "[ns] \"...Huh?\""
51020-21 = "Hey now, you shouldn't throw baseless accusations around willy-nilly..."
51020-22 = "I only asked if you have any proof that I stole that person's wallet, like you claimed."
51020-25 = "I don't have absolute proof, but...I saw you!"
51020-26 = "It's all right, Miss. It was nice of you to try."
51020-27 = "I'm sorry for bothering you while you were busy preparing for the festival."
51020-28 = "What's lost is lost... It can't be helped."
51020-30 = "See, the old man knows how things work. So why make a fuss?"
51020-31 = "All's well that ends well, ha! Do what's best for everyone and buzz off!"
51020-32 = "If you keep making up lies about the things you've seen, well, I think you'll see something rather unpleasant for you."
51020-37 = "B-But... But!"
51020-42 = "..."
51020-44 = "I, Yukari, will never tolerate injustice! "
51020-45 = "Even if everyone else turns a blind eye, wicked deeds are never acceptable!"
51020-47 = "Wh-What? Are you really going to fight when you're outnumbered? "
51020-48 = "Fine! If you insist, we won't hold back!"
51020-52 = "[ns] \"That's enough.\""
51020-56 = "And just who are you?!"
51020-57 = "We'll mess you up if you get in our way!"
51020-61 = "You're wide open!"
51020-67 = "Wh-What the?!"
51020-74 = "I knew it! Sir—here's your stolen wallet!"
51020-75 = "*sigh* So they really did have it..."
51020-77 = "H-Hey! We thieved that fair and square!"
51020-78 = "No more doing this the nice way! Everyone, group up!"
51020-86 = "...Huh?"
51020-89 = "You should have walked away! Now we'll take it by force!"
51020-94 = "Ack! An ambush?!"
51020-100 = "H-Huh? You're..."
51020-101 = "[s] \"You seem to be in trouble... Let me help you.\""
51020-104 = "...!"
51020-105 = "Very well—stay behind me!"

[translation]
51020-1 = "第2話;意想不到的相遇（１）"
51020-4 = "[ns]「這是……燈籠嗎？」"
51020-5 = "（抵達百鬼夜行聯合學園自治區後，映入眼簾的是點綴商店街各處的燈籠）"
51020-10 = "小女子看得一清二楚！！"
51020-15 = "[ns]「……嗯？」"
51020-21 = "唉唷，別莫名其妙冤枉好人……"
51020-22 = "我就問，你有直接證據可以證明真的是我偷了那個人的「錢包」嗎？"
51020-25 = "雖然沒有直接的證據……但我明明……！"
51020-26 = "沒關係的這位同學，已經夠了。"
51020-27 = "大家都正忙著準備慶典，不好意思讓你費心了。"
51020-28 = "弄丟就是弄丟了，這也沒辦法。"
51020-30 = "看吧，老人家也看清事實了。#n當事者都已經這麼說了，你還故意找碴這樣對嗎？"
51020-31 = "我看你還是別強辯了吧。#n睜一隻眼閉一隻眼對彼此都好，哈哈！"
51020-32 = "還是說你是故意撒謊說有看到，想來起爭議的？"
51020-37 = "……！#n可是……可是……"
51020-42 = "……"
51020-44 = "可是小女子[ruby=紫]我[/ruby]！不能就這樣算了！"
51020-45 = "就算所有人都把錯的說成對的……也不代表那真的是對的！"
51020-47 = "搞，搞什麼，想來硬的嗎？"
51020-48 = "如果你真的聽不懂人話，我也不會客氣……！"
51020-52 = "[ns]「請停止不良行為。」"
51020-56 = "你又是誰！？"
51020-57 = "想妨礙我們的話，下場會很慘哦……"
51020-61 = "有破綻！"
51020-67 = "哦，哦哇啊啊！？"
51020-74 = "果然在這裡！找到被偷走的錢包了！"
51020-75 = "唉……那些年輕人竟然真的……"
51020-77 = "喂，喂！怎麼把錢包弄掉了啊！"
51020-78 = "既然如此……大家集合！"
51020-86 = "……咦？"
51020-89 = "與其白白浪費時間，不如用力量解決……！"
51020-94 = "啊！？突然從死角突襲……！"
51020-100 = "哎，哎呀。請問您是……？"
51020-101 = "[s]「情況好像很危急，我來幫忙吧。」"
51020-104 = "……！"
51020-105 = "是！"

[translation]
51020-1 = "ตอนที่ 2;การพบกันแบบไม่คาดคิด 1"
51020-4 = "[ns] \"นี่คือ... โคมกระดาษเหรอ?\""
51020-5 = "(ณ ถนนในเขตปกครองตนเองของสหพันธ์เฮียกคิยาโค คุณครูกำลังเดินไปตามถนนย่านการค้า และชมโคมที่แขวนประดับอยู่เต็มถนน)"
51020-10 = "ข้าเห็นเต็มสองตาเลยเจ้าค่ะ!!"
51020-15 = "[ns] \"...หืม?\""
51020-21 = "เดี๋ยวสิ อยู่ๆ มาหาเรื่องผู้บริสุทธิ์ทำไม..."
51020-22 = "มีหลักฐานทนโท่เหรอว่าฉันไปขโมย <กระเป๋าสตางค์> ของคนนั้นมาจริงๆ?"
51020-25 = "ไม่มีหรอกค่ะหลักฐานทนโท่ที่ว่า... แต่ข้ามั่นใจว่า...!"
51020-26 = "พอเถอะ แม่หนู แค่นี้ก็พอแล้วละ"
51020-27 = "แค่นี้ก็น่าจะงานยุ่งกับการเตรียมงานเทศกาลกันอยู่แล้ว ขอโทษที่ทำให้ต้องปวดหัวอีกเรื่องนะ"
51020-28 = "อะไรที่มันหายไปแล้วก็คงเอากลับมาไม่ได้แล้วละ"
51020-30 = "เห็นมั้ยล่ะ? เขาก็รู้อยู่นี่ว่ามันหายไป ถ้าเจ้าตัวไม่เอาเรื่อง แล้วเธอจะมาเดือดร้อนด้วยทำไม?"
51020-31 = "ปล่อยไปบ้างเถอะ ไม่ต้องตั้งใจใช้ชีวิตให้มันมากนักหรอก แบบนี้มันดีต่อทั้งสองฝ่ายนะ ฮ่าฮ่า!"
51020-32 = "ไม่ต้องโกหกว่าได้เห็นกับตาแล้วมาหาเรื่องทะเลาะกันหรอก"
51020-37 = "...! แต่... แต่ว่า..."
51020-42 = "......"
51020-44 = "แต่ข้า ยูคาริ! ยอมปล่อยผ่านไปแบบนี้ไม่ได้หรอกเจ้าค่ะ! "
51020-45 = "ถ้าทำในสิ่งที่ไม่ถูกต้อง ต่อให้คนอื่นจะบอกว่าไม่เป็นไร... แต่มันก็ใช่ว่าจะไม่เป็นไรจริงๆ นี่เจ้าคะ!"
51020-47 = "อะ... อะไรของเธอ จะหาเรื่องกันใช่มั้ย?"
51020-48 = "ถ้าพูดด้วยดีๆ ไม่รู้เรื่อง ฉันก็จะไม่ทนแล้วนะ...!"
51020-52 = "[ns] \"ช่วยหยุดพฤติกรรมรุนแรงนี่ทีเถอะนะ\""
51020-56 = "แล้วแกเป็นใครกันล่ะนั่นน่ะ?!"
51020-57 = "ถ้าจะมาขัดขวางพวกเราละก็ เดี๋ยวได้เจอ..."
51020-61 = "เจอช่องโหว่แล้ว!"
51020-67 = "วะ... ว้ากกก?!"
51020-74 = "นี่ไง! กระเป๋าสตางค์ที่ขโมยไป! นี่ไงเจ้าคะ หลักฐานทนโท่เลย!"
51020-75 = "เฮือก... เจ้าพวกนี้ขโมยไปจริงๆ ด้วย..."
51020-77 = "นี่! ไปทำกระเป๋าตกได้ยังไง!"
51020-78 = "ถ้าเป็นแบบนี้แล้ว! ก็เรียกทุกคนมารวมตัวกันเดี๋ยวนี้เลย!"
51020-86 = "...เอ๋?"
51020-89 = "ถ้าจะต้องมาเสียเวลาเถียงไปโดยเปล่าประโยชน์ พวกฉันยอมใช้กำลังเข้าสู้ซะเลยดีกว่า...!"
51020-94 = "อ๊าย?! จู่ๆ ก็บุกใส่จากจุดบอดงั้นเหรอ...!"
51020-100 = "เอะ... เอ๋? ท่านคือ...?"
51020-101 = "[s] \"มันอันตรายนะ เดี๋ยวครูช่วยเอง\""
51020-104 = "...!"
51020-105 = "เจ้าค่ะ!"

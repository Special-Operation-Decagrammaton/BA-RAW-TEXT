1008305-28 = "3;기모노 상점가 주민;00\n#3;greeting\n#3;closeup\n#wait;1500"
1008305-29 = "3;기모노 상점가 주민;00;저희 가게에서 만든 화과자입니다. 괜찮으시다면 받아 가시지요. 거기에 겸사겸사 백화요란 여러분께 전달해 주시면 좋구요.\n#3;em;[반응]\n#3;closeup"
1008305-30 = "[s] \"앗, 네, 그럼 감사히 받도록 하겠습니다.\""
1008305-31 = "3;기모노 상점가 주민;00;다음번에 함께 찾아와 주세요. 그때는 듬뿍 서비스를 해드릴 터이니. 하하하.\n#3;em;[재잘]\n#3;closeup"

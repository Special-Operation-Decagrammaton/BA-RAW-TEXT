[translation]
1008305-1 = "ภาพที่ไม่อยากให้เห็น"
1008305-2 = "ย่านการค้าเฮียกคิยาโค"
1008305-4 = "(ถึงแม้การนัดคุยเรื่องงานกับคิเคียวจะถูกยกเลิกไป แต่คุณครูก็มีงานอื่นของชาเล่ต์ที่ต้องทำ จึงมาที่ย่านการค้าเฮียกคิยาโคเพื่อจัดการงานนั้น)"
1008305-8 = "[ns] \"เรื่องที่คุยกับชมรมหยินหยางไว้ก็เคลียร์ได้แล้ว งั้นงานต่อไปก็...\""
1008305-13 = "ตายแล้ว นี่คุณครูจากชาเล่ต์ใช่มั้ยครับ?"
1008305-14 = "ครั้งนี้มาที่ย่านการค้าด้วยธุระอะไรเหรอครับ?"
1008305-15 = "[s] \"วันนี้มาทำงานของชาเล่ต์น่ะ\""
1008305-16 = "ฮ่าฮ่า คุณครูต้องลำบากทุกครั้งเลยนะครับ"
1008305-17 = "แต่การที่คุณครูมาทำงานหนักแบบนี้ก็เท่ากับว่าพวกเราชาวย่านการค้าได้รับความช่วยเหลือหลายๆ อย่างอยู่ เพราะงั้นสำหรับพวกเราแล้วถือว่าเป็นเรื่องที่ดีนะครับ แหะๆ"
1008305-18 = "พูดถึงการได้รับความช่วยเหลือ ครั้งก่อนที่พวกเด็กเจ้าปัญหามาก่อกวน เฮียกกะเรียวรันก็ช่วยพวกเรา#nไว้เหมือนกันครับ"
1008305-19 = "เห็นว่าชื่อคิเคียวรึเปล่านะ? การแก้ปัญหาอย่างฉับไวของเธอมันช่างน่าประทับใจ ยังจดจำได้ถึง#nตอนนี้เลยครับ"
1008305-20 = "[s] \"อ่า... คิเคียวเหรอ...\""
1008305-21 = "จะว่าไป คุณครูก็ต้องคุยงานกับเฮียกกะเรียวรันบ่อยๆ ใช่มั้ยครับ?"
1008305-22 = "งั้นก็ดีเลยครับ"
1008305-29 = "นี่คือขนมของร้านเราครับ รับไปสิครับ ถ้าแวะไปที่เฮียกกะเรียวรัน ก็ฝากให้ทุกคนที่นั่นด้วยนะครับ"
1008305-30 = "[s] \"อ้อ ได้สิ ขอบคุณมากเลย\""
1008305-31 = "ไว้ครั้งหน้าก็พาเฮียกกะเรียวรันมาด้วยนะครับ แล้วเราจะแถมขนมให้เยอะๆ เลย ฮ่าฮ่าฮ่า"
1008305-37 = "[ns] \"มาทำงานแต่ได้ขนมมาเฉยเลยแฮะ...\""
1008305-38 = "(ในระหว่างที่คุณครูกำลังงงงวยกับสถานการณ์อยู่นั้น...)"
1008305-42 = "อ๊ะ! คุณครูนี่นา!"
1008305-43 = "สวัสดี~ วันนี้ก็มาลาดตระเวนในเฮียกคิยาโคเหรอ?"
1008305-44 = "อ๊ะ ไม่ใช่หรอกเหรอ~? อืม~ น่าเสียดายจัง~ งั้นก็แปลว่าไม่ได้อยู่กับคุณคิเคียวสินะ"
1008305-45 = "เกิดอะไรขึ้นกับคุณคิเคียวน่ะเหรอ? ไม่หรอก ไม่ใช่อย่างนั้น~ ฉันแค่ถามเฉยๆ น่ะ คราวที่แล้วฉันได้รับ#nความช่วยเหลือจากคุณคิเคียวไว้"
1008305-49 = "อ๊ะ! งั้นก็ดีเลย!"
1008305-53 = "คุณครู พอดีว่า... ฉันมีของที่อยากให้คุณคิเคียวเป็นการตอบแทนน่ะ... แต่ถ้าจะเอาไปให้เอง มันก็เขินอยู่หน่อยๆ ..."
1008305-54 = "[s] \"อื้ม เดี๋ยวครูเอาไปให้เอง\""
1008305-58 = "จริงเหรอ?! อื้ม! งั้นก็แต๊งกิ้วน้า~ ขอบคุณมากเลย~~!"
1008305-60 = "โอ๊ะ นั่นคุณครูชาเล่ต์รึเปล่า? วันนี้ก็มาทำงานของชาเล่ต์ที่นี่เหรอ? อะฮ่าฮ่า เห็นทำแต่งาน เดี๋ยวก็เป็นลมล้มพับไปหรอก"
1008305-61 = "อ้อ พอเฮียกกะเรียวรันกลับมา ช่วงนี้งานก็เลยลดลงงั้นเหรอ? งั้นก็ดีแล้วละนะ!"
1008305-62 = "อืม จะว่าไป แม่หนูที่ชื่อคิเคียวหรืออะไรสักอย่างก็เคยมาช่วยตอนที่เรามีปัญหากับลูกค้าด้วย..."
1008305-63 = "เป็นแม่หนูที่ฉันรู้สึกขอบคุณมากเลยละ"
1008305-68 = "เอ้านี่! วันนี้ร้านเรามีปลาสดๆ เข้ามาด้วย เอาไปตัวหนึ่ง ไม่สิ เอาไปสองตัวเลย! ไปแบ่งกันกินนะ!"
1008305-70 = "[ns] \"ต้องคิดว่า <ดีจังที่เฮียกกะเรียวรันกลับมาเป็นเหมือนเดิม!>... ใช่มั้ยนะ\""
1008305-71 = "(เฮียกกะเรียวรันค่อยๆ กลับมาเป็นดังเดิมอีกครั้งจากคำบอกเล่าของชาวเมือง จนคุณครูภูมิใจไปด้วย)"
1008305-75 = "[ns] \"ข้าวของเริ่มเยอะขึ้นแล้วแฮะ เอาไปส่งก่อนดีกว่า\""
1008305-82 = "(ด้านในอาคารเฮียกกะเรียวรันเงียบสงบกว่าที่คิด)"
1008305-87 = "[ns] \"อืม นึกว่าจะกลับมาแล้วซะอีก คิเคียวก็ไม่รับโทรศัพท์...\""
1008305-92 = "[ns] \"ช่วยไม่ได้นะ ถ้าผลีผลามเข้าไปก็คงเสียมารยาท\""
1008305-93 = "(ถึงจะน่าเสียดาย แต่คุณครูก็ตัดสินใจจะกลับสำนักงานของชาเล่ต์แล้วมาใหม่คราวหน้า)"
1008305-99 = "อึก... อึ้ก..."
1008305-103 = "[ns] \"...เสียงนี้มัน?\""
1008305-112 = "แฮ่ก... แฮ่ก..."
1008305-114 = "[ns] \"คิเคียว?! เป็นอะไรรึเปล่า?!\""
1008305-119 = "[ns] \"ตัวร้อนจี๋เลย! ดะ... เดี๋ยวนะ! เดี๋ยวครูพากลับเอง!\""
1008305-141 = "ที่นี่... ห้องชมรมเหรอ?"
1008305-142 = "[s] \"คิเคียว เป็นยังไงบ้าง? ได้สติแล้วเหรอ?\""
1008305-146 = "คุณครู...? ทำไมคุณถึงมาอยู่ที่นี่...?"
1008305-147 = "ไม่ได้มีธุระกับเฮียกกะเรียวรัน แต่แวะมาย่านการค้าเฮียกคิยาโคด้วยเรื่องงานงั้นเหรอ?"
1008305-148 = "คุณนี่ก็งานยุ่งตลอด..."
1008305-153 = "แค่กๆๆ...!"
1008305-154 = "[ns] \"ดูจะป่วยหนักเลยนะ! ไปทำอะไรมาเนี่ย...?\""
1008305-155 = "แฮ่ก... แฮ่ก... ก็แค่หวัดธรรมดาน่ะ"
1008305-156 = "[s1] \"งั้นที่ส่งข้อความมาแปลกๆ ก็เพราะ...\"\n[s2] \"ที่จะยกเลิกงานก็เพราะไม่สบายสินะ...\""
1008305-157 = "มันแปลกใช่มั้ยล่ะ ฉันก็รู้"
1008305-158 = "...อืม แต่ฉันแค่... กดผิดน่ะ"
1008305-159 = "เรื่องแบบนี้เกิดได้กับทุกคนนั่นแหละ"
1008305-160 = "ฉันแค่ป่วยนิดหน่อยเอง ไม่ต้องกังวลเกินเหตุหรอก"
1008305-161 = "สุดท้ายก็ให้คุณเห็นฉันในสภาพนี้จนได้..."
1008305-162 = "ฉันแค่..."
1008305-163 = "...อืม ถ้าเห็นไปแล้ว จะแก้ตัวไปก็คงไม่มีประโยชน์"
1008305-166 = "ฉันไม่อยาก... ให้คุณเห็นฉันในสภาพนี้น่ะ"
1008305-167 = "ฉันเป็นคนนัดคุยเรื่องงานแท้ๆ แต่ก็ไม่ดูแลตัวเองจนต้องยกเลิกนัด ฉันไม่อยากให้คุณต้องเห็นว่า ฉันไม่มีความรับผิดชอบ..."
1008305-168 = "...ไหนจะตอนที่มีไข้จนประคองตัวเองไม่ได้แล้วก็ล้มฟุบลงไปอีก"
1008305-169 = "สุดท้ายแล้วฉันก็ทำให้คุณเดือดร้อนพามาส่งถึงที่นี่"
1008305-170 = "นี่ถือว่า... ฉันไม่มีคุณสมบัติในฐานะที่ปรึกษายุทธศาสตร์ เป็นหวัดแค่นี้เอง ฉันควรจะรีบหายแล้วลุกขึ้น#nมาทำงานแท้ๆ"
1008305-171 = "[s] \"คิเคียว อ่อนเพลียสะสมใช่มั้ย?\""
1008305-175 = "อ่อนเพลียเหรอ? ไม่มีทางหรอก"
1008305-176 = "ที่ปรึกษายุทธศาสตร์อย่างฉันน่ะเหรอจะไปอ่อนเพลีย..."
1008305-183 = "...นั่นอะไรน่ะ?"
1008305-184 = "[s] \"ครูได้รับมาจากผู้คนในย่านการค้าระหว่างมาที่นี่น่ะ\""
1008305-188 = "(คิเคียวเบิกตากว้างเมื่อได้เห็นของขวัญแทนคำขอบคุณที่ชาวเมืองมอบให้กับเฮียกกะเรียวรัน)"
1008305-189 = "[ns] \"พยายามอย่างหนักเสมอเลยสินะ\""
1008305-190 = "...มันก็แน่นอนอยู่แล้ว"
1008305-191 = "เพราะความขัดแย้งภายในทำให้เฮียกกะเรียวรันไม่ได้ทำกิจกรรมอย่างจริงๆ จังๆ มานานแล้ว"
1008305-192 = "พวกเราก็เลยพยายามอย่างเต็มที่... อย่างน้อยก็เพื่อชดเชยสิ่งนั้นน่ะ"
1008305-193 = "เราต้องทำทุกอย่างเท่าที่จะทำได้ ไม่ว่าจะด้วยวิธีใดก็ตาม... ต้องแบบนี้แหละถึงจะเอาเวลาที่ผ่านไป#nกลับคืนมาได้"
1008305-194 = "[s] \"คิเคียว...\""
1008305-195 = "แค่กๆ!"
1008305-196 = "เฮ้อ... ใช่ ก็แค่นั้นแหละ"
1008305-197 = "ฉันไม่ชอบโดนดูถูก แล้วก็ไม่ชอบให้ใครเห็นด้านที่อ่อนแอของฉัน"
1008305-198 = "แล้วก็ไม่อยากได้ยินว่า \"ก็ช่วยไม่ได้นี่นา เมื่อก่อนเฮียกกะเรียวรันไม่ได้ปกตินี่\" ด้วย"
1008305-199 = "ในฐานะที่ปรึกษายุทธศาสตร์... ที่ผ่านมาฉันก็แค่ดื้อดึงเพราะไม่อยากให้ใครเห็นตัวเองแบบนั้นน่ะ"
1008305-200 = "เพราะงั้นแค่นี้ก็พอแล้วละ คุณครูเองก็งานยุ่งไม่ใช่เหรอ? ไม่ต้องมาดูแลฉันหรอก ฉันดูแลตัวเองได้..."
1008305-208 = "[ns] \"คิเคียว ลงไปนอนดีๆ\""
1008305-211 = "ดะ... เดี๋ยวสิ! มาบังคับให้ฉันนอนทำไม ทะ... ทำอะไรเนี่ย...?!"
1008305-212 = "[s] \"คิเคียวบอกไว้เองนี่ว่าบางครั้งการพักผ่อนก็สำคัญกว่าการทำงาน\""
1008305-220 = "ไม่สิ นั่นมันก็แค่..."
1008305-221 = "อีกอย่าง ไม่ได้ตั้งใจฟังที่ฉันพูดไปเหรอ? บอกแล้วไงว่าฉันไม่อยากให้เห็นด้านที่อ่อนแอแบบนี้ กับคุณเองก็ไม่มีข้อยกเว้นหรอกนะ"
1008305-222 = "[s] \"ครูไม่คิดว่าคิเคียวอ่อนแอหรอก\""
1008305-223 = "ว่าไงนะ..."
1008305-224 = "[s3] \"ครูแค่อยากช่วยเวลาที่นักเรียนลำบากน่ะ\"\n[s4] \"เพราะนั่นคือหน้าที่ของคนเป็นครู\""
1008305-227 = "[ns5] \"แต่ถ้ายังคิดว่าพึ่งพาครูไม่ได้\"\n[ns6] \"ก็คิดแค่ว่าครูเป็นวิธีการหนึ่งที่ใช้ได้ตามสะดวกแล้วกัน\""
1008305-230 = "[ns] \"<ยิ่งมีวิธีการที่ใช้ได้มากเท่าไรก็ยิ่งดี> ไง\""
1008305-231 = "...เอาคำที่ฉันพูดมาใช้อีก"
1008305-232 = "จะอาศัยจังหวะนี้... เอาคืนกันงั้นเหรอ?"
1008305-233 = "ทำอย่างนั้น... ทำไปแล้วคุณจะได้ประโยชน์อะไร?"
1008305-234 = "และถึงจะพูดอย่างนั้น... ฉันก็ไม่มีอะไรจะตอบแทนให้หรอกนะ..."
1008305-235 = "ไม่มีอะไร... ที่ฉันทำเพื่อคุณได้เลย..."
1008305-239 = "......"
1008305-240 = "...นี่เป็นครั้งแรกที่ฉัน... ได้เจอคนอย่างคุณน่ะ"
1008305-244 = "คนที่..."
1008305-245 = "แปลกคน..."
1008305-246 = "...แปลกคนที่สุด"
1008305-247 = "[s] \"นี่... ครูน้อยใจเป็นนะ เลิกพูดเหมือนครูเป็นคนแปลกๆ ได้แล้ว!\""
1008305-248 = "...ฮึ่ม ฉันก็แค่พูดตามที่รู้สึกน่ะ"
1008305-249 = "...แค่กๆๆ!"
1008305-250 = "เฮ้อ... ก็ได้ งั้นก็... เอาที่สบายใจเลย..."
1008305-251 = "แต่ว่า... คุณครู..."
1008305-252 = "คำที่คุณพูดออกมาน่ะ..."
1008305-253 = "อย่ามาเสียใจทีหลัง... ให้มากนะ"
1008305-254 = "เพราะที่ปรึกษายุทธศาสตร์เฮียกกะเรียวรัน... เป็นคน..."
1008305-255 = "น่า... กลัว... มาก..."
1008305-258 = "......"
1008305-259 = "[s] \"อื้ม ครูไม่เสียใจหรอก ไม่มีทาง\""
1008305-266 = "[ns] \"ฝันดีนะคิเคียว\""

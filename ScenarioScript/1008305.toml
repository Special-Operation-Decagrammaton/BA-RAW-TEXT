[translation]
1008305-1 = "#title;보이고 싶지 않았던 모습"
1008305-2 = "#place;백귀야행의 상점가"
1008305-3 = "#wait;2000"
1008305-4 = "#na;(비록 키쿄와의 업무 약속은 취소되었지만, 그 밖에도 처리할 필요가 있는 샬레의 업무를 해결하기 위해 백귀야행의 상점가를 찾았을 때였다.)"
1008305-5 = "#st;[0,0];instant;1;"
1008305-6 = "#clearST"
1008305-7 = "#wait;1500"
1008305-8 = "[ns] \"사전에 논의했던 음양부 건은 이걸로 끝났고, 다음으로는…….\""
1008305-9 = "#st;[0,0];instant;1;"
1008305-10 = "#clearST"
1008305-11 = "#wait;2000"
1008305-12 = "2;기모노 상점가 주민;00\n#2;em;[반응]\n#2;a\n#wait;1200"
1008305-13 = "2;기모노 상점가 주민;00;이거 참. 샬레의 선생님 아니십니까?"
1008305-14 = "2;기모노 상점가 주민;00;이번엔 어쩐 일로 상점가를 찾아오셨나요?\n#2;m3"
1008305-15 = "[s] \"오늘은 샬레의 업무 때문에 찾아왔습니다.\""
1008305-16 = "2;기모노 상점가 주민;00;하하, 선생님도 매번 고생이시군요.\n#2;em;[재잘]"
1008305-17 = "2;기모노 상점가 주민;00;뭐, 선생님이 고생해 주시는 만큼 저희 상점가 주민들은 여러모로 도움을 받는 셈이니 저희에겐 좋은 일이지만요. 하하."
1008305-18 = "2;기모노 상점가 주민;00;도움을 받았다고 하니, 저번에 문제아들이 날뛸 때는 백화요란에게도 큰 도움을 받았더랬죠."
1008305-19 = "2;기모노 상점가 주민;00;분명 백화요란의 키쿄 양, 이라고 했던가요? 척척 문제를 해결해 주는 모습이 참으로 인상적이어서 기억하고 있습니다."
1008305-20 = "[s] \"아, 키쿄가…….\""
1008305-21 = "2;기모노 상점가 주민;00;그러고 보면 선생님께서는 백화요란과도 자주 일을 하셨지요?\n#2;em;[?]"
1008305-22 = "2;기모노 상점가 주민;00;마침 잘되었군요."
1008305-23 = "#st;[0,0];instant;1;"
1008305-24 = "#clearST"
1008305-25 = "2;기모노 상점가 주민;00\n#2;d\n#wait;1500"

1008305-60 = "3;생선가게 아저씨;00;오, 샬레의 선생님 아니신가. 오늘도 샬레의 일 때문에? 으하하. 늘 그렇게 일만 하다간 쓰러질지도 모른다고?\n#3;em;[재잘]\n#3;a"
1008305-61 = "3;생선가게 아저씨;00;아, 그래도 최근엔 백화요란이 돌아오면서 일이 좀 줄었다고? 그거 다행이구먼!"
1008305-62 = "3;생선가게 아저씨;00;음음. 그러고 보니 키쿄인가 하는 아가씨 덕분에, 우리도 거래처와 트러블이 있던 걸 해결한 적이 있었지……"

[translation]
1008305-1 = "不想顯露的模樣"
1008305-2 = "百鬼夜行商店街"
1008305-4 = "（雖然和桔梗的約定取消，但因為還有其他夏萊的工作，依舊來到了百鬼夜行）"
1008305-8 = "[ns]「之前討論過的陰陽部的事已經解決，接下來……」"
1008305-13 = "哎呀，這不是夏萊的老師嗎？"
1008305-14 = "今天怎麼有空來商店街呀？"
1008305-15 = "[s]「我是來處理夏萊的公務的。」"
1008305-16 = "哈哈，老師真是辛苦呢。"
1008305-17 = "不過也是託您的福，我們商店街的居民才能好好生活。"
1008305-18 = "說到這個，上次那群問題學生出來搗亂的時候，百花繚亂也幫了我們不少忙。"
1008305-19 = "記得是百花繚亂的桔梗同學吧？#n他三兩下就把事情擺平，所以對他印象很深呢。"
1008305-20 = "[s]「啊，原來桔梗他……」"
1008305-21 = "這麼說來，老師是不是經常和百花繚亂一起執行公務？"
1008305-22 = "這樣正好。"
1008305-29 = "這是我們店裡的和菓子，不嫌棄的話請收下吧。#n順便也替我轉交給百花繚亂的同學們。"
1008305-30 = "[s]「啊，好的，那我就不客氣了。」"
1008305-31 = "下次請一起來店裡坐坐吧。#n到時候我會好好招待的，哈哈哈。"
1008305-37 = "[ns]「一不小心就收了人家的禮物呢……」"
1008305-38 = "（就在因為這突如其來的情況而感到困惑的時候……）"
1008305-42 = "……啊，是老師！"
1008305-43 = "嗨嗨～老師今天也來百鬼夜行巡邏嗎？"
1008305-44 = "啊，不是嗎～？真可惜～所以桔梗同學沒跟你在一起囉？"
1008305-45 = "你問我找桔梗同學有什麼事？#n其實也沒什麼特別的啦，只是因為之前受過他的幫助，所以隨口問問而已。"
1008305-49 = "啊！這樣正好！"
1008305-53 = "老師……這本來是我準備要給桔梗同學的謝禮……但我不好意思親自去找他……"
1008305-54 = "[s]「嗯，那我幫你轉交給他。」"
1008305-58 = "真的嗎！？那真是太謝謝你了～Thank you～～！"
1008305-60 = "哦，這不是夏萊的老師嗎？今天也是來處理夏萊的公務嗎？#n啊哈哈，整天忙著工作，小心身體會累倒喔！"
1008305-61 = "你說最近因為百花繚亂回歸的關係，工作少了許多？#n那真是太好了！"
1008305-62 = "這麼說來，上次要不是有那個叫桔梗的女孩，#n我們和客戶之間的糾紛恐怕沒那麼容易解決……"
1008305-63 = "真的很謝謝他呢。"
1008305-68 = "哎呀，我看就這麼辦吧！今天正好店裡進了一些新鮮貨，這隻……#n不，這兩隻都送給你們一起吃吧！"
1008305-70 = "[ns]「『幸好百花繚亂回來了！』……是這個意思嗎？」"
1008305-71 = "（看到百花繚亂在居民們心中的地位逐漸回升，內心也默默替他們感到驕傲。#n　然而才剛感到高興……）"
1008305-75 = "[ns]「東西突然變得好多……我看還是先把它們送去給桔梗吧。」"
1008305-82 = "（但奇怪的是，在抵達百花繚亂後卻發現裡頭異常的安靜）"
1008305-87 = "[ns]「還以為他們會在這裡的說。桔梗怎麼都不接電話呢……」"
1008305-92 = "[ns]「沒辦法，就這樣直接闖進去也不太好。」"
1008305-93 = "（就在打算先回夏萊，下次再把東西給他們的時候……）"
1008305-99 = "呃，呃呃……"
1008305-103 = "[ns]「這個聲音該不會是……？」"
1008305-112 = "哈啊……哈啊……"
1008305-114 = "[ns]「桔梗！？你還好嗎！？」 "
1008305-119 = "[ns]「你的身體……也太燙了吧！等，等等！先換個地方吧！」"
1008305-141 = "這裡是……調停室……？"
1008305-142 = "[s]「桔梗，還好嗎？有沒有清醒一點？」"
1008305-146 = "老師……？你怎麼會在這裡……？"
1008305-147 = "因為其他工作來到百鬼夜行商店街？"
1008305-148 = "那你還真忙呢……"
1008305-153 = "咳咳咳……"
1008305-154 = "[ns]「你也病得太嚴重了吧！怎麼會變成這樣……？」"
1008305-155 = "哈啊，哈啊……只不過是普通的感冒罷了。"
1008305-156 = "[s1]「所以你傳的訊息之所以會那麼奇怪……」\n[s2]「說要取消行程也是因為……」"
1008305-157 = "哪有什麼奇怪的。"
1008305-158 = "……我只是……不小心按錯而已。"
1008305-159 = "任何人都可能犯這種錯。"
1008305-160 = "只是身體有點不舒服，老師不必這麼大驚小怪。"
1008305-161 = "不過想不到最後還是讓你見到了這副德性……"
1008305-162 = "那是……"
1008305-163 = "……算了，既然你都已經看到了，我也沒什麼好辯解的。"
1008305-166 = "其實……我不想讓你看見現在的樣子。"
1008305-167 = "明明是我約你一起處理公務，卻因為沒有照顧好身體而擅自爽約……"
1008305-168 = "甚至還讓你看見病得連站都站不穩的醜態……"
1008305-169 = "……給你添了這麼大的麻煩。"
1008305-170 = "這樣的我……根本沒有資格自稱作戰參謀。#n這種程度的小感冒，我應該要能夠輕鬆戰勝它才對。"
1008305-171 = "[s]「桔梗，你是不是這陣子太累了？」"
1008305-175 = "太累了？怎麼可能。"
1008305-176 = "像我這樣的作戰參謀怎麼可能會……"
1008305-183 = "……這是什麼？"
1008305-184 = "[s]「這是我在來的途中，從商店街的居民手裡收到的。」"
1008305-188 = "（見到居民們為百花繚亂準備的謝禮，桔梗瞪大了雙眼）"
1008305-189 = "[ns]「你們一直都很努力呢。」"
1008305-190 = "……那不是當然的嗎？"
1008305-191 = "因為我們內部的矛盾，百花繚亂停擺了很長一段時間。"
1008305-192 = "為了彌補這段時間的空缺……我們當然要竭盡所能……走遍四處才對。"
1008305-193 = "唯有在我們力量所及的範圍內做到問心無愧……才有機會挽回我們失去的時間。"
1008305-194 = "[s]「桔梗……」"
1008305-195 = "咳咳！"
1008305-196 = "沒錯……就只是這樣而已。"
1008305-197 = "所以我不想讓你看見我這麼脆弱的一面。"
1008305-198 = "對以前的百花繚亂來說，這種事根本不應該發生。#n我也不想聽你說什麼「這也是沒辦法的事」之類的藉口。"
1008305-199 = "不在別人面前露出醜態……只是我身為作戰參謀的無聊堅持罷了。"
1008305-200 = "所以這樣就夠了。老師你不也很忙嗎？#n不必留在我身邊照顧我，我自己一個人也……"
1008305-208 = "[ns]「桔梗，乖乖躺著吧。」"
1008305-211 = "等，等等，你在做什麼，為什麼要硬推我躺下……！？"
1008305-212 = "[s]「因為休息有時候比工作更重要，你自己不是也這樣說過嗎？」"
1008305-220 = "不，那只是……"
1008305-221 = "而且你沒聽到我剛才說的話嗎？#n我不想被別人看到這麼脆弱的模樣，就算是你也不例外。"
1008305-222 = "[s]「我並不覺得你很脆弱。」"
1008305-223 = "什麼……"
1008305-224 = "[s3]「我只是看到我的學生遇到麻煩，所以想要幫助他而已。」\n[s4]「這是我身為老師應該做的事。」"
1008305-227 = "[ns5]「假如這樣你還是沒辦法放心地依靠我的話……」\n[ns6]「把我當成是可以隨便利用的手段就行了。」"
1008305-230 = "[ns]「『可以利用的手段越多越好』……不是嗎？」"
1008305-231 = "……居然用我說的話對付我。"
1008305-232 = "在這種時候……用這種方式把這句話奉還給我嗎？"
1008305-233 = "這麼做……對你有什麼好處……？"
1008305-234 = "就算你這麼說……我也沒有東西能回報你……"
1008305-235 = "什麼都沒辦法為你做……"
1008305-239 = "…………"
1008305-240 = "……我還是第一次遇到你這種人。"
1008305-244 = "怪人……"
1008305-245 = "你真的……"
1008305-246 = "…………是個奇怪的人。"
1008305-247 = "[s]「你這樣說會讓我覺得有點受傷，別把我形容得那麼奇怪好嗎！」"
1008305-248 = "……哼，我只是說出自己的感想而已。"
1008305-249 = "……咳咳！"
1008305-250 = "唉……那就隨你高興吧……"
1008305-251 = "不過老師……"
1008305-252 = "將來……可別為你剛才說的話……"
1008305-253 = "感到後悔哦。"
1008305-254 = "畢竟百花繚亂的作戰參謀……可是……"
1008305-255 = "非常可怕的…………"
1008305-258 = "…………"
1008305-259 = "[s]「嗯，我不會後悔的，絕對不會。」"
1008305-266 = "[ns]「晚安，桔梗。」"

[translation]
1008305-1 = "A Secret Me"
1008305-2 = "Hyakkiyako Shopping District"
1008305-4 = "Since my meeting with Kikyou was cancelled, I stopped by the Hyakkiyako Shopping District to run a few errands."
1008305-8 = "[ns] \"That settles the Yin-Yang Club's request. What's next?\""
1008305-13 = "Oh? Aren't you Schale's Sensei?"
1008305-14 = "What brings you to our shopping district today?"
1008305-15 = "[s] \"I'm just finishing some work for Schale.\""
1008305-16 = "Haha. Diligent as always!"
1008305-17 = "On behalf of all us residents here, thank you. Your hard work benefits all of us."
1008305-18 = "We have such wonderful students here, don't you think? The Hyakkaryouran members worked so hard to keep us safe during the Lantern Festival fiasco."
1008305-19 = "I especially remember one young lady... Kikyou, I believe it was? She seemed to be everywhere at once, assisting here and there. It was so impressive!"
1008305-20 = "[s] \"That does sound like Kikyou.\""
1008305-21 = "Ah! You know her! Are you close with the Hyakkarouran students, Sensei?"
1008305-22 = "In that case, perfect timing!"
1008305-29 = "I'd like you to take this wagashi, made in-house! Help yourself to as many as you'd like...and I'd really appreciate it if you could deliver some to the Hyakkaryouran as well."
1008305-30 = "[s] \"I'd be happy to.\""
1008305-31 = "Please come visit with Kikyou one day. It'll be on the house!"
1008305-37 = "[ns] \"I somehow ended up getting some free snacks as well.\""
1008305-38 = "Just when I had moved on from that surprising encounter..."
1008305-42 = "Ah! It's Sensei!"
1008305-43 = "Hello, hello! Are you on patrol today as well?"
1008305-44 = "Ah, no? That must mean Kikyou isn't with you then. How disappointing."
1008305-45 = "...Oh, it's not like that! I don't have any business with her. I just wanted to thank her for all her help last time."
1008305-49 = "I know!"
1008305-53 = "Um, would you mind giving Kikyou this thank-you gift I made? I'm a little shy to give it to her myself..."
1008305-54 = "[s] \"That's no problem at all.\""
1008305-58 = "Really?! Thank you! Thank you so much! "
1008305-60 = "Oh, if it isn't Sensei. You're here on business again? Don't forget! All work and no play isn't good for anyone!"
1008305-61 = "I've heard things have been running much more smoothly since the Hyakkaryouran returned though! That's a relief."
1008305-62 = "The streets have felt safer recently. In fact, a Hyakkaryouran member helped me out with a troublesome customer the other day."
1008305-63 = "What was her name? Kikyou, I think?"
1008305-68 = "Here, on the house! I got a fresh shipment today! Actually, take another one for Kikyou!"
1008305-70 = "[ns] \"Everyone's so grateful the Hyakkaryouran is back.\""
1008305-71 = "I grew more and more proud of the Hyakkaryouran as I ran into citizens who had been helped by its members."
1008305-75 = "[ns] \"My hands are pretty full. Let's drop all these gifts off.\""
1008305-82 = "I went to go visit the Hyakkaryouran, but it was quiet inside."
1008305-87 = "[ns] \"I thought Kikyou would be here by now. She's not picking up her phone either...\""
1008305-92 = "[ns] \"I can't just barge in. I'll have to give her the gifts next time.\""
1008305-93 = "Just when I decided I had no other choice but to return to my office back at Schale..."
1008305-99 = "U-Ugh..."
1008305-103 = "[ns] \"Huh? Was that...?\""
1008305-112 = "*pant*... *pant*..."
1008305-114 = "[ns] \"Kikyou?! Are you okay?!\" "
1008305-119 = "[ns] \"You have a severe fever! We need to get you somewhere more comfortable!\""
1008305-141 = "Is this...the club room? How...?"
1008305-142 = "[s] \"You're awake! How are you feeling?\""
1008305-146 = "...Sensei? Why are you here?"
1008305-147 = "...You had other business to attend to, so you went to the Hyakkiyako shopping district?"
1008305-148 = "Your meddling tendencies truly—"
1008305-153 = "*cough* *cough*"
1008305-154 = "[ns] \"You're in horrible shape! What happened?\""
1008305-155 = "Cease the dramatics. It is a simple sickness."
1008305-156 = "[s1] \"So those weird messages...\"\n[s2] \"The reason you cancelled our meetings...\""
1008305-157 = "Do not read into it."
1008305-158 = "Those messages were a mistake. The situation is not that dire."
1008305-159 = "It is called the \"common\" cold for a reason."
1008305-160 = "Stop worrying over such trivialities."
1008305-161 = "I would have preferred for you to have not seen this."
1008305-162 = "This is just..."
1008305-163 = "I suppose I'm well past the point of excuses."
1008305-166 = "Truly, why did you have to see me in this state?"
1008305-167 = "I was irresponsible. I cancelled appointments that I had arranged..."
1008305-168 = "...and even fainted from a fever."
1008305-169 = "It appears I will never cease troubling you, Sensei."
1008305-170 = "I should not be felled by a simple cold."
1008305-171 = "[s] \"Don't you feel fatigued, Kikyou?\""
1008305-175 = "Fatigued? Such an accusation..."
1008305-176 = "I am the Hyakkaryouran's operations officer. I am not fatigued."
1008305-183 = "...What's all this?"
1008305-184 = "[s] \"I got them from the shopping district residents on my way here.\""
1008305-188 = "For what may have been the first time ever, I saw Kikyou's eyes widen in genuine shock at all of the tokens of gratitude that had been gifted to the Hyakkaryouran."
1008305-189 = "[ns] \"You never stop trying your best.\""
1008305-190 = "...It is a given."
1008305-191 = "The Hyakkaryouran's internal conflicts caused us to halt all usual club activities."
1008305-192 = "So it was our...natural obligation...to strive to regain their trust."
1008305-193 = "Even now...we must not cease our efforts to atone for the past."
1008305-194 = "[s] \"Kikyou...\""
1008305-195 = "*cough* *cough*"
1008305-196 = "*sigh* That is all."
1008305-197 = "I despise being underestimated. And I absolutely detest displaying such weakness."
1008305-198 = "Excuses about the Hyakkaryouran's failings vex me."
1008305-199 = "I am our operations officer... I cannot fail here...no matter what."
1008305-200 = "What am I prattling on for? You have your own duties to attend to, Sensei. I am perfectly fine now."
1008305-208 = "[ns] \"Kikyou, go lie down.\""
1008305-211 = "Wh-Wh-What are you doing? I will not be pushed around...!"
1008305-212 = "[s] \"Didn't you tell me rest is super important?\""
1008305-220 = "That is not...!"
1008305-221 = "Do you insist on disregarding my wishes so blatantly? I don't want you to see my weaknesses!"
1008305-222 = "[s] \"I don't think you're weak, Kikyou.\""
1008305-223 = "Well..."
1008305-224 = "[s3] \"I just want to lend a helping hand to a struggling student.\"\n[s4] \"My responsibility as your teacher is to take care of you.\""
1008305-227 = "[ns5] \"But if you don't like the idea of relying on me...\"\n[ns6] \"You can use me as a resource at your disposal.\""
1008305-230 = "[ns] \"After all, the more resources the better. Don't you think?\""
1008305-231 = "...Using my own words against me."
1008305-232 = "This situation is..."
1008305-233 = "You baffle me. What do you stand to gain in assisting me?"
1008305-234 = "There is no compensation I can offer you."
1008305-235 = "I am not a useful resource."
1008305-239 = "..."
1008305-240 = "...I have never had the displeasure of encountering someone like you before."
1008305-244 = "Strange..."
1008305-245 = "Truly..."
1008305-246 = "Simply a strange, strange person."
1008305-247 = "[s] \"It hurts my feelings a little bit when you call me strange!\""
1008305-248 = "Hmph. I was simply expressing myself honestly."
1008305-249 = "...*cough* *cough*"
1008305-250 = "Hah. Do as you please."
1008305-251 = "But, Sensei..."
1008305-252 = "What you said...about taking care of me...make sure you..."
1008305-253 = "...you do not regret it, one day..."
1008305-254 = "The operations officer...of Hyakkaryouran..."
1008305-255 = "...you've yet to experience how scary she can be..."
1008305-258 = "..."
1008305-259 = "[s] \"I'd never regret it.\""
1008305-266 = "[ns] \"Good night, Kikyou.\""

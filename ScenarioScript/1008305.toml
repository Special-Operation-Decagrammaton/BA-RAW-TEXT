1008305-41 = "4;백귀야행 학생 A;02\n#4;em;[!]\n#4;stiff\n#4;a\n#wait;1000"
1008305-42 = "4;백귀야행 학생 A;03;앗! 선생님이다!"
1008305-43 = "4;백귀야행 학생 A;00;안뇽안뇽~ 오늘도 백귀야행의 거리를 순찰 중이야?\n#4;em;[음표]\n#4;hophop\n#4;m3"
1008305-44 = "4;백귀야행 학생 A;02;아, 그건 아니야~? 으음~ 아쉬워라~ 그럼 키쿄 씨와 함께 있는 건 아니겠네."
1008305-45 = "4;백귀야행 학생 A;01;아, 키쿄 씨와 무슨 일 있냐고? 아니. 그런 건 아니구~ 그냥 저번에 도움을 받은 적이 있어서 혹시나~ 싶어서."

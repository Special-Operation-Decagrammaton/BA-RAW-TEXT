[translation]
84301400300-14 = "วะ... เหวอ!? มะ... มีเรื่องอะไรเหรอคะ!?"
84301400300-15 = "พวกเราไม่รู้เรื่องอะไรเลยนะคะ! พวกเราไม่ได้ทำค่ะ!"
84301400300-16 = "พวกเราก็กำลังหาสาเหตุอยู่เหมือนกัน... ช่วยรอหน่อยนะ"
84301400300-21 = "น่าจะมีการเข้าใจผิดนะคะ ฉันไม่ได้มาเพื่อติเตียนหรือเพื่อสอบสวนพวกคุณหรอกค่ะ"
84301400300-22 = "แต่ฉันดันมาข้องเกี่ยวกับเรื่องครั้งนี้... ก็เลยแค่อยากมาสำรวจพื้นที่รอบๆ น่ะค่ะ น่าจะไม่มีปัญหาใช่มั้ยคะ?"
84301400300-24 = "อะ... อืม... ฉันก็อยากจะห้ามอยู่หรอกนะคะ... ปกติแล้วตรงหน้างานมันค่อนข้างอันตราย..."
84301400300-25 = "แต่ครั้งนี้คงยากที่จะทำแบบนั้นน่ะ ช่วยไม่ได้สินะ"
84301400300-26 = "ตะ... แต่ยังไงก็ต้องระวังนะคะ ถ้าเห็นสิ่งผิดปกติอะไรก็ให้รีบมาบอกพวกเราก่อนนะคะ!"
84301400300-28 = "ไม่ต้องห่วงนะคะ ฉันจะไม่ทำอะไรอันตรายๆ หรอกค่ะ"
84301400300-32 = "(งั้นลองสำรวจดูหน่อยแล้วกัน...)"

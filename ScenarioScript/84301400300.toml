[translation]
84301400300-14 = "哇，哇啊！？有，有什麼事嗎！？"
84301400300-15 = "我們什麼都不知道！我們不是這樣的人！"
84301400300-16 = "我們也正在尋找問題……麻煩再等我們一會。"
84301400300-21 = "你們似乎誤會了。#n我不是來指責或調查各位的人。"
84301400300-22 = "只是剛好一起被捲入了這起事件……所以想調查一下四周而已。#n應該沒關係吧？"
84301400300-24 = "唔嗯……如果是平常，我一定會因為危險而婉拒的……"
84301400300-25 = "但這次似乎沒辦法這麼做。"
84301400300-26 = "不，不過還是要請你多小心哦。#n如果發現奇怪的東西，一定要先告訴我們！"
84301400300-28 = "別擔心，我不會做危險的事的。"
84301400300-32 = "（……那就來調查看看吧）"

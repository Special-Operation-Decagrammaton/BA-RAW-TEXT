10043030-46 = "3;레이;10;아, 그거요? 그러니까 말하자면 야구를 수리적, 통계학적 방법론으로 접근해서, 야구의 본질을 더욱 과학적으로 분석하는 이론입니다!"
10043030-47 = "3;레이;99;그 관점에 따르면, 노아웃 1루 상황의 득점 확률은 43.4%, 기대 득점은 0.884점 정도로 귀결되죠."
10043030-48 = "3;레이;17;하지만 번트를 대서 원 아웃 2루 상황을 만들게 되면, 득점 확률은 41.6%, 기대 득점은 0.714 점 정도로 정리되어, 기대 득점은 당연하고 득점 확률까지 떨어진다고요!\n#3;em;[!]\n#3;closeup"

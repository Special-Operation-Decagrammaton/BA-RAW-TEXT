[translation]
10043030-1 = "ตอนที่ 3;มันนี่บอล"
10043030-4 = "อ๊ะ คุณครู! ทางนี้ค่ะ!"
10043030-5 = "ค่อยยังชั่วนะคะ ฉันกำลังกังวลอยู่เลยว่าถ้าคุณครูไม่มาจะเป็นยังไง"
10043030-6 = "[s] \"ยังไม่มีเรื่องอะไรใช่มั้ย?\""
10043030-7 = "ค่ะ ยังไม่มีเรื่องอะไรค่ะ"
10043030-8 = "แล้วก็ยังหาเบาะแสของคนร้ายไม่ได้ด้วยค่ะ..."
10043030-9 = "แต่นี่ก็ถึงเวลาเปลี่ยนเกมรุกเกมรับแล้ว แล้วคนร้ายก็บอกไว้ว่าจะติดต่อมาตอนนี้...!"
10043030-16 = "มาจริงด้วยค่ะ คุณครู"
10043030-20 = "ฮู่ว... ฮ่า... ฮู่ว... ฮ่า... ฮึบ..."
10043030-21 = "ดีเลย หายใจเข้าออกลึกๆ แบบนี้ละจะได้ไม่เครียด ฟังฉันอยู่หรือเปล่า?"
10043030-26 = "อะ... อื้อ ฟังอยู่ ไม่ต้องห่วงนะ"
10043030-28 = "เล่นเกมรับไว้แบบนี้แล้วจะบอกให้ฉันไม่ต้องห่วงงั้นเรอะ...!"
10043030-29 = "เฮ้อ ช่างเถอะ ฉันจะไม่พูดให้มากความ ครั้งนี้ถ้าไปที่เบสได้แล้ว ก็ให้ตีลูกสั้นต่อ"
10043030-30 = "ต้องทำตามนี้นะ ห้ามใช้กลยุทธ์อื่นเด็ดขาด จำไว้ให้ขึ้นใจเลย"
10043030-34 = "เดี๋ยวก่อนนะคะ ในกีฬาเบสบอลมีข้อที่ควรยึดถือมากมายค่ะ ถึงจะไม่ได้บัญญัติไว้เป็นกฎตาม#nลายลักษณ์อักษรก็เถอะ"
10043030-35 = "กฎเงียบที่ได้รับการยอมรับอย่างแรงกล้าในฐานะธรรมเนียมปฏิบัติ..."
10043030-36 = "อย่างเช่น โนฮิตโนรัน การไม่พูดถึงหรือเพอร์เฟกต์เกม หรือถ้าฝ่ายตรงข้ามขว้างลูกใส่หัวหรือร่างกาย ก็ต้องขว้างลูกล้างแค้นใส่"
10043030-37 = "ส่วนการตีลูกสั้นในช่วงแรกของการแข่งขัน ถึงจะไม่มีใครใส่ใจหรือว่าอะไรมากนัก"
10043030-38 = "แต่นี่มันเพิ่งปลายอินนิ่ง 2 เองนะคะ?! ทำไมถึงรีบตีลูกสั้นนักล่ะคะ!"
10043030-39 = "แล้วกับแบตเตอร์ที่ตีแม่น ตีลูกยาวได้ดี แล้วมีกำลังมากกว่าค่าเฉลี่ย..."
10043030-40 = "ทำไมถึงสั่งให้แบตเตอร์ลำดับที่ 3 ที่มีหน้าที่วอร์มอัปให้กำลังหลักสำคัญอย่างแบตเตอร์ลำดับที่ 4 ตีลูกสั้นล่ะคะ!"
10043030-41 = "และถ้ามองจากเซเบอร์เมตริกส์แล้ว การตีลูกสั้นเป็นเกมรุกที่ลดโอกาสได้คะแนน นั่นมันจะทำให้ฝ่ายตรงข้ามได้เปรียบมากกว่านะคะ!?"
10043030-42 = "[s] \"เซเบอร์เมตริกส์คืออะไรเหรอ?\""
10043030-46 = "อ้อ มันคือวิธีการศึกษาเบสบอลโดยใช้หลักการทางคณิตศาสตร์และสถิติ เรียกว่าเป็นทฤษฎีที่วิเคราะห์แก่นของเบสบอลได้อย่างเป็นวิทยาศาสตร์มากขึ้นค่ะ!"
10043030-47 = "จากมุมมองนั้นแล้ว เปอร์เซ็นต์ที่จะทำคะแนนในกรณีที่ไม่มีเอาต์และมีผู้วิ่งอยู่เบสแรกคือ 43.4% และแต้มที่คาดได้ก็ประมาณ 0.884 แต้มค่ะ"
10043030-48 = "แต่ถ้าตีลูกสั้นเพื่อให้มี 1 เอาต์และมีผู้วิ่งอยู่เบสที่ 2 เปอร์เซ็นต์ที่จะทำคะแนนได้จะเป็น 41.6% ในขณะที่แต้มที่คาดได้จะอยู่ที่ 0.714 แต้ม มันเป็นตัวเลขที่ลดลงหมดเลยนะคะ!"
10043030-52 = "[ns1] \"อะ... เอ่อ....?\"\n[ns2] (พูดเรื่อง... อะไรอยู่เนี่ย?)"
10043030-55 = "มีหนังที่เอาทฤษฎีนี้มาใช้อย่างจริงจังด้วยนะคะ ในหนังมีการฟอร์มทีมด้วยนักกีฬาที่มีผลงานโดดเด่น#nในทางสถิติ ต่อให้ทำแบบนั้นแล้วโดนสโมสรอื่นมองข้ามก็เถอะค่ะ!"
10043030-56 = "แต่ท้ายที่สุดแล้วทีมต่ำสุดของลีกก็ได้ขึ้นมาอยู่ในระดับสูงได้ค่ะ"
10043030-57 = "นั่นเป็นหนังเรื่องโปรดของฉันเลยละค่ะ ถ้าคุณครูสนใจ ไว้คราวหน้าเราไปดูด้วยกัน..."
10043030-61 = "นะ..."
10043030-65 = "นะ...?"
10043030-69 = "หนวกหูน่า พวกความรู้เบสบอลเป็นศูนย์!!!"
10043030-73 = "ความรู้เบสบอลเป็นศูนย์?!?!"
10043030-74 = "เลิกพูดเหมือนตัวเองรู้ทุกอย่างได้แล้ว! รู้มั้ยว่าเปอร์เซ็นต์การตีลูกของแบตเตอร์ลำดับที่ 3 ของทีมนี้#nอยู่ที่เท่าไร?!"
10043030-75 = "ถ้าไม่รู้ก็เข้าเว็บไซต์ไปดูข้อมูลเสียตอนนี้เลยสิ!"
10043030-76 = "ไหนดูซิ แบตเตอร์ลำดับที่ 3 ของทีมเบรฟส์ เปอร์เซ็นต์การตีลูกอยู่ที่..."
10043030-77 = "อืม จะว่าไปเปอร์เซ็นต์การตีลูกก็เป็นค่าที่ล้าสมัยไปแล้ว"
10043030-82 = "ว่าไงนะ? เป็นไปไม่ได้..."
10043030-83 = "17%?!"
10043030-84 = "[s] \"17% งั้นเหรอ!?"
10043030-85 = "ทีนี้รู้หรือยังล่ะ? เข้าใจฉันรึยัง?"
10043030-89 = "คิดไม่ถึงเลยว่าจะตีลูกได้ดีขนาดนี้!"
10043030-90 = "ว่าไงนะ...?"
10043030-91 = "อืม สมกับที่เป็นแบตเตอร์ลำดับที่ 3 ของทีมเบรฟส์ ตีได้เก่งกว่าฉันนิดหนึ่งนะคะเนี่ย... คงต้องยอมรับแล้วละค่ะ"
10043030-92 = "นี่เธอ... เป็นนักเบสบอลงั้นเรอะ?"
10043030-93 = "ใช่ค่ะ! เปอร์เซ็นต์การตีลูกของฉันอยู่ที่ 8% เลยด้วย!"
10043030-94 = "[s] \"......\""
10043030-95 = "ว่าไง... นะ? 8%...?"
10043030-96 = "เอาเถอะค่ะ! ไม่ได้การละ! สั่งให้ 'แบตเตอร์ที่ทรงพลัง' ตีลูกสั้นงั้นเหรอ!"
10043030-97 = "ทั้งในแง่ของความคืบหน้าในการแข่งขัน ทั้งในแง่ของการใช้ผู้เล่นในการทำคะแนน นี่เป็นการเลือกที่โง่เขลา!"
10043030-101 = "ถ้าไม่ทำตามที่ฉันสั่งในทันที ฉันจะระเบิดโรงงานหมากฝรั่งน้องหมาให้เป็นกลายเป็นขี้เถ้าเลย!!!"
10043030-105 = "อึก"
10043030-106 = "[s] \"คุณโค้ช ฟังอยู่หรือเปล่า?\""
10043030-107 = "ครับ... ฟังอยู่ทุกคำเลย แต่ผมไร้หนทางแล้วครับ"
10043030-108 = "ค่ะ... คุณโค้ช เห็นทีต้องใช้กลยุทธ์ตีลูกสั้นให้สำเร็จก่อนค่ะ..."
10043030-109 = "แต่ถ้าจะตีลูกสั้น ก็ต้องให้ตัววิ่งวิ่งเข้าเบสก่อน แล้วแบตเตอร์ลำดับที่ 2 ของเบรฟส์ก็..."
10043030-124 = "ตีโดน! อะ... เอ๊ะ? ท่าไม่ดีแล้วค่ะ คุณครู! กราวด์บอลหน้าเบส 2 กับ 3 ค่ะ!"
10043030-125 = "เอ๋? แต่ว่า... ผู้เล่นหน้าเบส 2 กับ 3 รับลูกพลาดเหรอคะ?"
10043030-126 = "[s] \"เดินตุปัดตุเป๋เลยแฮะ... งั้นก็ได้โอกาสแล้ว!\""
10043030-127 = "ใช่ค่ะ! วิ่ง! วิ่งเลย!! ใส่เกียร์คอร์กี้เข้าเบสแรกไปเลยค่ะ!!!"
10043030-138 = "คอร์กี้ เบรฟส์! ถึงจะเป็นความผิดพลาดของอะบิสซิเนียน เรเดอร์ส แต่แบตเตอร์ก็วิ่งเข้าเบสได้สำเร็จครับ!"
10043030-139 = "ผู้เล่นเบส 2 และ 3 ของเรเดอร์สดูจะประหม่าอยู่หน่อยๆ นะครับ"
10043030-140 = "ช่วงแรกของอินนิ่งที่ 2 ที่กินเวลานานเกินไปทำให้รู้สึกอ่อนล้าหรือเปล่านะ"
10043030-141 = "แล้วจากนี้จะเริ่มการโต้กลับเลยหรือเปล่า! เบรฟส์จะเขียนบทใหม่ให้สถานการณ์พลิกได้หรือไม่!"
10043030-147 = "ต่อไปเป็นคิวของแบตเตอร์ลำดับที่ 3 ครับ!"
10043030-148 = "ปกติแล้วเขาจะตีลูกแรงเลย แล้วลำดับในการตีลูกตอนนี้ก็ดีด้วยนะครับ อ๊ะ... เป็นลูกสั้นเหรอครับ? เป็นอะไรที่... คาดไม่ถึง... อย่างแรงเลยนะครับ"
10043030-149 = "ขอร้องละ... ได้โปรด...! ต้องทำให้ได้นะ!"
10043030-158 = "ตีลูกสั้นไปแล้วครับ! ลูกมุ่งไปทางเบส 3! ความเร็วใช้ได้เลย!"
10043030-159 = "ทิศทางดีเลยครับ กลิ้งไปพอดิบพอดีเลย ฝ่ายรับก็ไม่ได้ช้าไปด้วย ถือเป็นกลยุทธ์ที่ประสบความสำเร็จ#nเลยนะครับ"
10043030-160 = "ที่น่าสังเกตก็คือ นี่เป็นการเสียสละที่ไม่สูญเปล่าเลยละครับ"
10043030-161 = "สำเร็จ!"
10043030-162 = "ฮู่ว..."
10043030-163 = "[s] \"หายใจไม่ทั่วท้องเลย...\""
10043030-164 = "ดีละ ต่อไปต่อให้ไม่ต้องบอกก็รู้ใช่มั้ย? ถึงเวลาให้แบตเตอร์ลำดับที่ 4 โจมตีอย่างรุนแรงแล้ว"
10043030-165 = "1 แต้ม เอาให้ได้ 1 แต้มก่อน ตามไปทีละแต้ม เรายังทำได้...!"
10043030-166 = "โค้ชคะ! นี่เป็นโอกาสแรกของเรานะคะ!"
10043030-167 = "อืม รู้แล้วน่า! จากนี้ไปเราต้องเก็บคะแนนให้ได้เรื่อยๆ!"
10043030-172 = "แบตเตอร์ลำดับที่ 4 ของทีมเบรฟส์เข้ามาแล้วครับ บรรยากาศกำลังตึงเครียดเลย"
10043030-173 = "แต่ก็เป็นจังหวะที่เป็นที่น่าสนใจเลยนะครับ"
10043030-174 = "จริงอยู่ที่เบสบอลเป็นเรื่องของตัวเลขและสถิติเข้าไปทุกวัน แต่ทิศทางและความพลิกผันในสนามก็มี#nอยู่จริงครับ"
10043030-175 = "ใช่ครับ! ว่ากันว่าความสามารถในการจับทิศทางการแข่งขันก็เป็นทักษะของทีมเหมือนกันครับ!"
10043030-187 = "เอาละครับ ลูกแรกที่ขว้างไป! ตีโดนแล้วครับ!"
10043030-192 = "โดนแล้ว! หืม? แต่ว่า...? ว้ายยยย! ลูกฟลายบอลไปถึงหน้าเบส 3 เลยเหรอ?!?!"
10043030-193 = "[s] \"แล้วตัววิ่งเบส 2 ก็จับจังหวะวิ่งพลาดด้วย...!\""
10043030-194 = "ซวยแล้วไงคะ?!! นี่มันรันดาวน์นี่คะ!!?? ติดกับดักแล้ว!?!?"
10043030-199 = "ตัววิ่งติดอยู่ระหว่างเบส 2 กับ 3 ครับ! จะไปทางไหนก็ไม่ได้เลย... แท็กเอาต์ไปแล้วครับ! 3 เอาต์ เปลี่ยนเกมรุกเกมรับครับ!"
10043030-200 = "เป็นโอกาสที่ดีแล้วเชียว... คงบอกได้แค่ว่านี่เป็นผลลัพธ์ที่น่าผิดหวังของเบรฟส์เป็นอย่างมากเลยครับ"
10043030-204 = "..."
10043030-209 = "หืม? คุณครู ยังไหวมั้ยคะ?"
10043030-210 = "[s] \"ครูไม่เป็นไรเลย สบายมาก\""
10043030-211 = "ละ... แล้วคุณโค้ชล่ะคะ?"
10043030-212 = "ผมก็ยังไหวครับ"
10043030-213 = "ถ้างั้นใคร...!"
10043030-218 = "ก็ฉันไง!!!"
10043030-219 = "ได้ลูกฟลายบอลแห่งปาฏิหาริย์ที่เบส 3 แต่โดนออกระหว่างวิ่งเข้าเบสงั้นเหรอ???"
10043030-220 = "แบตเตอร์ลำดับที่ 4 ตีลูกไปสนามส่วนนอกไม่ได้ ส่วนตัววิ่งก็ลังเลที่จะวิ่งออกไปจนสุดท้ายได้ออก#nจากสนามไปเสียเอง!?!?!"
10043030-221 = "นี่มันทีมเวิร์กหรือเปล่า! เราต้องเล่นกันเป็นทีมไม่ใช่เหรอ!!!"
10043030-225 = "ตะ... แต่ยังไงฉันก็จะเชียร์... เบรฟส์..."
10043030-226 = "พอเลย! หยุดเดี๋ยวนี้เลย! ได้แต่แรงเชียร์ ก็เลยไม่ได้แต้มอยู่อย่างนี้ไง!"
10043030-227 = "แฮ่ก... แฮ่ก... แฮ่ก... ฮู่ว... ก็ได้ ยังไงเกมก็ยังไม่จบแค่นี้"

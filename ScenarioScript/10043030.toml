10043030-35 = "3;레이;00;관례로, 암묵적으로, 그렇게 하기를 강하게 추천받는 규칙 아닌 규칙들……."
10043030-36 = "3;레이;99;가령 노히트노런, 퍼펙트게임에 관한 언급을 금지한다든가, 상대가 빈볼을 던지면 반드시 보복구를 던져 줘야 한다든가."
10043030-37 = "3;레이;02;그중에서도 경기 초반부의 번트에 대해서는, 그렇게까지 강하게 눈치를 주지는 않지만요."
10043030-38 = "3;레이;05;그래도 아직 2회 말이거든요?! 공 몇 개나 던졌다고 벌써 번트냐고요!\n#3;em;[!]"
10043030-39 = "3;레이;12;그것도 보통 잘 맞추고, 장타도 괜찮게 날릴 수 있고, 주력도 평균 이상인 타자를 배치해서…….\n#3;stiff"
10043030-40 = "3;레이;05;팀의 주포인 4번 타자의 예열기 역할을 해 주는 3번 타자에게, 번트를 시키다니요!"
10043030-41 = "3;레이;17;거기에 세이버메트릭스적인 관점에서 보자면, 번트는 오히려 득점 기댓값을 낮추는, 이적행위에 가까운 공격수단이라고요!?\n#3;hophop"

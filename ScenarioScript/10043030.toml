[translation]
10043030-1 = "Episode 3;Moneyball"
10043030-4 = "Ah, Sensei! Over here!"
10043030-5 = "Phew, wasn't sure I'd find you in the crowd here."
10043030-6 = "[s] \"Has anything happened?\""
10043030-7 = "Nope. Nothing yet."
10043030-8 = "No new leads so far."
10043030-9 = "Anyway, the Heroes are about to bat, so the culprit ought to call soon..."
10043030-16 = "That's got to be them."
10043030-20 = "*huff* *puff* *huff* *puff*"
10043030-21 = "Good. Okay. I'm okay now. Are you listening, Coach?"
10043030-26 = "D-Don't worry, I'm listening."
10043030-28 = "You're saying \"don't worry\" after an inning like THAT?! That defense was pitiful!"
10043030-29 = "I'll make this short. Get the first hitter to base, then bunt."
10043030-30 = "Do exactly that. Nothing else. You hear me?"
10043030-34 = "Hold on. There're a lot of rules to think about here, spoken and unspoken."
10043030-35 = "Conventions too, and traditional strategies."
10043030-36 = "Words you're not supposed to say, or the thing where you have to retaliate for a beanball..."
10043030-37 = "...OR the thing where you shouldn't bunt in the early game."
10043030-38 = "We're at the bottom of the second! They've barely seen any pitches, and you want them bunting already?"
10043030-39 = "And look at who's batting second. Solid contact rate, above-average sprint speed, and he's been slugging lately!"
10043030-40 = "He's perfect to set the table for the cleanup hitter, and you want him to lay one down? Seriously?"
10043030-41 = "Have you even looked at the sabermetrics? Bunting in this situation LOWERS your run expectancy!"
10043030-42 = "[s] \"What's a sabermetric?\""
10043030-46 = "It's like the math of baseball. They've charted it all out."
10043030-47 = "With a runner on first and nobody out, teams average 0.88 runs in that inning. It's a 43.4% chance to score at least once."
10043030-48 = "But if you bunt and give up an out to move the runner to second? The average drops to 0.71 runs and just a 41.6% chance to score!"
10043030-52 = "[ns1] \"...Uh... Huh?\"\n[ns2] \"(What is she even saying?)\""
10043030-55 = "There's a movie you should watch, where they use that kind of math to scout players and optimize everyone's stats. "
10043030-56 = "And the team goes all the way from the bottom to the top! "
10043030-57 = "In fact, if YOU'RE interested, Sensei, we could have a—"
10043030-61 = "Sh..."
10043030-65 = "Sh...what?"
10043030-69 = "Shut up, you phony!!"
10043030-73 = "Phony?!!"
10043030-74 = "You don't know the half of it! Did you even look up the batting average for the third hitter before you started yapping?!"
10043030-75 = "Go on, pull it up, right now!"
10043030-76 = "All right, fine, let's see. The Heroes' number three hitter..."
10043030-77 = "...I mean, batting average is kind of outdated, but..."
10043030-82 = "What? This can't be right..."
10043030-83 = "Point-one-seven?!"
10043030-84 = "[s] \"Seventeen percent?!\""
10043030-85 = "Do you get it now? Huh?!"
10043030-89 = "...What an amazing hitter!"
10043030-90 = "What...?"
10043030-91 = "By Heroes standards, I mean. He's...got better stats than I do."
10043030-92 = "...You're a baseball player?"
10043030-93 = "Yep! I'm rocking a massive point-zero-eight-zero, myself!"
10043030-94 = "[s] \"...\""
10043030-95 = "Point zero-eight zero?"
10043030-96 = "Point is, he's one of the strongest hitters we've got, and you want HIM to bunt?! "
10043030-97 = "In terms of game flow, or resource utilization, it's a waste of—"
10043030-101 = "Enough! If you don't do what I say this instant, I'll blow that chew toy factory apart, down to the last brick!"
10043030-105 = "Ugh."
10043030-106 = "[s] \"You get all that, Coach?\""
10043030-107 = "...Yes, I heard it. You made a good point, but our hands are tied."
10043030-108 = "So we go with the bunt, then."
10043030-109 = "But before that, we have to get a man on base, and... Oh, here we go..."
10043030-124 = "It's a hit! Oh no, grounder to the shortstop!"
10043030-125 = "...But the shortstop dropped the ball! They fumbled!"
10043030-126 = "[s] \"And now they're stumbling... This is our chance!\""
10043030-127 = "Yes! Run! Ruuun!! Run like your life depends on it!"
10043030-138 = "The Pillagers drop the ball, and the lead-off hitter makes it to first!"
10043030-139 = "That shortstop must have been nervous."
10043030-140 = "Or maybe the top of the second ran too long, and they need another warm up."
10043030-141 = "Could the tide be turning? Will the Heroes write an epic saga today of their great comeback?"
10043030-147 = "Here comes the number three hitter!"
10043030-148 = "He's got a good chance for a long fly. And...it's a bunt? That's...very unexpected."
10043030-149 = "Please... Please, you have to make it!"
10043030-158 = "The ball rolls toward third base, just slow enough to give the runner a chance!"
10043030-159 = "Well, it went in the right direction. Looks like they caught the defense off guard a bit."
10043030-160 = "I suppose that makes it a worthwhile sacrifice."
10043030-161 = "We did it!"
10043030-162 = "Phew..."
10043030-163 = "[s] \"This is not good for my heart...\""
10043030-164 = "Good. Now for the cleanup hitter. NOW you can swing away."
10043030-165 = "One run. Just one run, step by step. You've got this."
10043030-166 = "They're not wrong, Coach. We CAN bring it in from here!"
10043030-167 = "You're right, we can. This could set off a streak for us!"
10043030-172 = "The number four hitter steps into the batter's box. The air is tense."
10043030-173 = "This could be a turning point."
10043030-174 = "Baseball may be all about statistics these days, but flow is still important."
10043030-175 = "Right! Some people say a team's true skill is all about extending that flow!"
10043030-187 = "And here comes the first pitch. It's a hit!"
10043030-192 = "It's a hit! But oh, no, no!! A floater to third base, now?!"
10043030-193 = "[s] \"And the runner on second blew his timing...\""
10043030-194 = "And now it's a rundown! There's no escape!"
10043030-199 = "He's caught between second and third! They've got him trapped...and he's out! So much for that."
10043030-200 = "The Heroes needed that run. Very disappointing."
10043030-204 = "..."
10043030-209 = "Oh? Sensei, are you okay?!"
10043030-210 = "[s] \"I'm fine.\""
10043030-211 = "W-Was it you, Coach?"
10043030-212 = "It wasn't me."
10043030-213 = "Then who...?"
10043030-218 = "It was me!!"
10043030-219 = "A lazy pop-up to third? Causing a rundown NOW?"
10043030-220 = "The \"cleanup hitter\" can't even get it out of the infield? BOTH runners hesitating?"
10043030-221 = "How is this a team?! How is this a team?!"
10043030-225 = "L-Let's go, Heroes, let's go... *clap* ... *clap*"
10043030-226 = "Don't! Stop that! Your cheers are just prolonging the agony!"
10043030-227 = "*inhale* *exhale* *inhale* ... *sigh* Okay. Fine. The game isn't over yet."
10043030-228 = "\"It ain't over 'til it's over,\" right?"
10043030-232 = "I love that saying."
10043030-237 = "Shut up! ...Okay. New plan. Working backwards..."
10043030-241 = "We're pulling the pitcher in the third and launching a counterattack!"
10043030-245 = "Wait, wait? Pulling the starter already? He hasn't even made it through the fifth!"
10043030-246 = "I mean, yeah, he had a rough start..."
10043030-247 = "...but he's got potential, I think!"
10043030-248 = "Are you blind?!"
10043030-249 = "Oof. You're mean."
10043030-250 = "His ERA is 7! You call that \"potential\"?"
10043030-254 = "Yeah, I do! That's not even 10!"
10043030-258 = "..."
10043030-262 = "[ns] \"I think they fainted again...\""
10043030-265 = "You know, for all this chaos they're causing..."
10043030-266 = "...it sounds like they've got it rough too."
10043030-267 = "All right, that's it. You people shut up and do EXACTLY as I say, or I'll BURN DOWN THE WHOLE FREAKING STADIUM!! Including the stands!"
10043030-271 = "The stands?!"
10043030-273 = "Yeah, you heard me! Pull the pitcher! In the third!"
10043030-280 = "Hmm... What do we do now, Sensei?"
10043030-281 = "[s] \"For now...\""
10043030-283 = "[ns] \"...let's look around the stands some more.\""
10043030-284 = "Yeah, all right. Let's do that..."

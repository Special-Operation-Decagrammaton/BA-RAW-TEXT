10043030-232 = "ฉันก็ชอบคำพูดนั้นเหมือนกันค่ะ! ฟังแล้วมีกำลังใจเลยค่ะ!"
10043030-237 = "เธอน่ะอยู่เงียบๆ ไปเลย! ปล่อยให้เป็นแบบนี้ต่อไปไม่ได้ละ... เราต้องพลิกสถานการณ์ให้ได้"
10043030-241 = "เปลี่ยนพิชเชอร์ในอินนิ่งที่ 3!"
10043030-245 = "ไม่สิ เดี๋ยวนะคะ ยังเล่นไม่ถึงอินนิ่งที่ 5 เลยนะคะ จะเปลี่ยนแล้วเหรอ!"
10043030-246 = "นะ... แน่นอนว่าควอลิตี้สตาร์ทมันหายไปตั้งแต่แรกแล้ว..."
10043030-247 = "แต่ผู้เล่นที่เลือกไว้ตอนนี้ก็เป็นพิชเชอร์อนาคตไกลอยู่นะคะ!"
10043030-248 = "นี่เธอมีตาไว้ประดับหน้าอย่างเดียวหรือไง ทำไมมองเกมไม่ออกเลย?!!"
10043030-249 = "พูดแรงไปแล้วนะ!"
10043030-250 = "พิชเชอร์อนาคตไกลที่ไหนกันที่ขว้างเสียเฉลี่ย 7 แต้มเลยน่ะ!!!"
10043030-254 = "โห ขว้างเสียเฉลี่ยไม่เกิน 10 แต้มเหรอคะ งั้นก็ถือว่าทำได้ดีเลยนี่คะ?"

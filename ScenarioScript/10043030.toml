[translation]
10043030-1 = "第3話;魔球"
10043030-4 = "啊，老師！這邊！"
10043030-5 = "我還擔心會不會找不到你呢，太好了。"
10043030-6 = "[s]「情況還好嗎？」"
10043030-7 = "嗯，目前還沒什麼事。"
10043030-8 = "……雖然也還沒找到任何犯人的線索就是了。"
10043030-9 = "現在已經到攻守交換的時間了。#n按照犯人剛才所說的話，應該馬上就……！"
10043030-16 = "來了呢，老師。"
10043030-20 = "嘶，呼，嘶，呼……"
10043030-21 = "好，深呼吸過後稍微冷靜下來了。#n聽得到嗎？總教練。"
10043030-26 = "聽，聽到了。不用擔心。"
10043030-28 = "防守守成這副德性，還敢跟我說不用擔心……！"
10043030-29 = "不，算了，我長話短說吧。#n有人上壘之後就來個犧牲短打。"
10043030-30 = "給我記清楚了。#n沒有其他選擇，只許成功不許失敗。"
10043030-34 = "請等一下，棒球裡有很多不成文的規定耶。#n雖然沒有明訂在規則之中……"
10043030-35 = "但是許多慣例和默契，都是強烈建議要遵守的潛在規則。"
10043030-36 = "比如禁止提及無安打無失分和完全比賽，#n或是對方故意投觸身球就必須以報復球回敬等等……"
10043030-37 = "其中對於比賽前半的短打，雖然不會非常嚴格……"
10043030-38 = "但現在才二局下半而已耶！？#n都沒投幾顆球就要我們短打嗎！"
10043030-39 = "而且還是要平常打擊水準不錯，長打能力跟腳程表現也在平均以上──"
10043030-40 = "負責為第四棒主力預熱的第三棒打者去打短打！？"
10043030-41 = "從賽伯計量學的觀點來看，#n短打反而會降低得分期望值，是堪稱通敵行為的攻擊手段啊！"
10043030-42 = "[s]「賽伯計量學是什麼？」"
10043030-46 = "簡單來說，這是一種用數理和統計學的方法進行分析，#n從而更科學地理解棒球本質的理論！"
10043030-47 = "根據這個理論，無人出局一壘有人時的得分機率是43.4%，期望得分約為0.884分。"
10043030-48 = "然而如果用短打製造一人出局二壘有人的局面……#n得分機率和期望得分就會分別降低到41.6%和0.714分。#n也就是說──不只是期望得分下降，就連得分機率都會降低啊！"
10043030-52 = "[ns1]「……原，原來如此？」\n[ns2]（什麼意思……？）"
10043030-55 = "順帶一提，有球隊真的積極運用這個理論，招攬那些數據優秀卻不被看好的球員──"
10043030-56 = "結果竟然把聯盟墊底的球隊改造成頂級強隊，後來還被拍成了電影哦！"
10043030-57 = "我個人也非常喜歡那部電影！#n如果老師有興趣的話，改天我們一起──"
10043030-61 = "吵……"
10043030-65 = "吵？"
10043030-69 = "吵死了，你這個棒球白痴！！！"
10043030-73 = "棒球白痴！？！？"
10043030-74 = "外行人少在那邊指指點點的！#n你知道這爛隊第三棒的打擊率是多少嗎！？"
10043030-75 = "現在就給我去統計網站好好看清楚──！"
10043030-76 = "你等一下哦。#n勇士隊第三棒球員的打擊率是……"
10043030-77 = "唔嗯，其實打擊率現在可能是有點過時的數據了。"
10043030-82 = "什麼？竟然是……"
10043030-83 = "一成七！？"
10043030-84 = "[s]「有一成多嗎！？」"
10043030-85 = "看到沒？現在懂了吧！"
10043030-89 = "他竟然是這種等級的強棒嗎！"
10043030-90 = "什麼……？"
10043030-91 = "不愧是勇士隊的第三棒打者啊。#n雖然只有一點點……但我承認實力確實略勝我一籌。"
10043030-92 = "……你也是棒球選手嗎？"
10043030-93 = "沒錯！我的打擊率是零成八哦！"
10043030-94 = "[s]「……」"
10043030-95 = "什麼……？零成八……？"
10043030-96 = "總之不行就是不行！#n怎麼可以要求這種「強棒」打短打呢！"
10043030-97 = "無論從比賽節奏還是得分資源分配的觀點來說，這都是無比愚蠢的選擇──"
10043030-101 = "要是不乖乖照做，我就立刻把潔牙骨工廠炸得連塊磚頭都不剩！！"
10043030-105 = "唔唔……"
10043030-106 = "[s]「總教練。你聽到了嗎？」"
10043030-107 = "……嗯，看來沒辦法了。"
10043030-108 = "是啊……總教練。#n看來得先執行短打作戰，並盡可能成功才行……"
10043030-109 = "不過要短打的前提是要先有人上壘……#n勇士隊的第二棒是……"
10043030-124 = "打中了！糟糕，老師！是內野滾地球！"
10043030-125 = "咦？但是……游擊手漏接了？是接球失誤！"
10043030-126 = "[s]「而且還絆了一下……這是個好機會！」"
10043030-127 = "很好！跑！快跑啊！用拚死也要上一壘的氣勢跑啊！！！"
10043030-138 = "柯基勇士隊！由於阿比西尼亞突襲者隊的失誤，讓領頭打者成功上壘了！"
10043030-139 = "看來突襲者隊的游擊手似乎有點緊張呢。"
10043030-140 = "或者也可能是因為二局上半過於漫長，需要重新暖身一下才行。"
10043030-141 = "難道勇士隊要展開絕地大反攻了嗎！？#n他們能寫下大逆轉的傳奇嗎！？"
10043030-147 = "下一個打者是第三棒！"
10043030-148 = "一般來說應該會採取強攻，正好打線的順序也很不錯。#n哦……居然選擇短打？這……讓人非常意外呢。"
10043030-149 = "拜託……一定要成功啊！"
10043030-158 = "打者嘗試短打！球滾向了三壘！球速也慢得恰到好處！"
10043030-159 = "方向很不錯，速度也掌握得剛剛好。#n雖然守備方的補位不算太遲，但戰術還是成功了。"
10043030-160 = "值得注意的是，這並非無謂的犧牲。"
10043030-161 = "好耶！"
10043030-162 = "呼……"
10043030-163 = "[s]「感覺對心臟不太好啊……」"
10043030-164 = "很好，接下來應該不用我多說吧。#n現在輪到第四棒，該轉回強攻了。"
10043030-165 = "只要先拿下一分，慢慢追上去就好了。#n現在還來得及……！"
10043030-166 = "總教練！這是我們的機會！"
10043030-167 = "我知道！一定要趁現在得分，延續這股氣勢！"
10043030-172 = "勇士隊第四棒打者站上了打擊區。現場氣氛十分緊張。"
10043030-173 = "比賽來到了關鍵節點，現在正是眾所矚目的時刻呢。"
10043030-174 = "雖然數字和統計已經是現今棒球界的顯學，#n但氣勢這種無形的力量仍然是不可忽視的存在。"
10043030-175 = "沒錯！也有人說，一支球隊要能掌握氣勢才算證明實力！"
10043030-187 = "就在說話的同時……擊出了第一球！"
10043030-192 = "打中了！但是……？#n哇啊啊啊！是三壘手方向的內野高飛球！？！？"
10043030-193 = "[s]「而且二壘跑者還沒有掌握好跑壘時機……！」"
10043030-194 = "糟了！？是夾殺！！要被夾殺了！？！？"
10043030-199 = "跑者被困在二壘手和三壘手之間進退兩難……觸殺出局！#n三出局，攻守交換！"
10043030-200 = "這分原本是勢在必得的……對勇士隊來說，可以說是非常遺憾的結果。"
10043030-204 = "……"
10043030-209 = "嗯？老師，你沒事吧？"
10043030-210 = "[s]「我很好哦？」"
10043030-211 = "那，那是總教練嗎？"
10043030-212 = "我這邊也沒事。"
10043030-213 = "那到底是誰……"
10043030-218 = "是我啦！！！"
10043030-219 = "竟然在這種時候出現奇蹟般的三壘手高飛球接殺，甚至連跑者也被刺殺？？？"
10043030-220 = "明明是第四棒，居然連把球送到外野都做不到？#n壘上的跑者也不知道在猶豫什麼，結果直接被人家雙殺！？"
10043030-221 = "這到底，到底是什麼破球隊啊！！！"
10043030-225 = "我，我會繼續……幫勇士隊應援的……"
10043030-226 = "不准不准！#n就是因為有你們這些無腦應援的粉絲，這爛球隊才會一直苟延殘喘！"
10043030-227 = "哈啊，哈啊，哈啊……#n呼，算了。比賽還沒結束。"
10043030-228 = "在結束之前……都不算結束！"
10043030-232 = "我也很喜歡那句名言耶！超熱血的對吧！"
10043030-237 = "你給我安靜！#n這樣下去不行……得反其道行之了。"
10043030-241 = "第三局要換投反攻！"
10043030-245 = "不不不，先等一下。#n先發連五局都還沒投滿就要換人嗎！？"
10043030-246 = "雖，雖然優質先發早就已經沒了……"
10043030-247 = "但現在這個先發可是前途大好的投手啊！"
10043030-248 = "你的兩隻眼睛是長來當裝飾品的嗎！！"
10043030-249 = "說話也太過分了吧！？"
10043030-250 = "世界上哪個前途大好的新秀，防禦率會是7啊！！！"
10043030-254 = "亂講，防禦率小於10已經是王牌投手了吧？"
10043030-258 = "……"
10043030-262 = "[ns]「好像又倒下了呢……」"
10043030-265 = "他明明在做些亂七八糟的壞事，但怎麼說呢……"
10043030-266 = "……聽起來好像也挺辛苦的呢。"
10043030-267 = "閉嘴！要是敢不聽我的話，你們馬上就會看到觀眾席變成一片火海！！！！！"
10043030-271 = "難道連觀眾席都被動了手腳嗎！？"
10043030-273 = "都給我聽好了！第三局要換投！#n第三局！換投手！"
10043030-280 = "唔嗯……接下來該怎麼辦呢，老師？"
10043030-281 = "[s]「總之……」"
10043030-283 = "[ns]「先繼續在觀眾席好好找找吧。」"
10043030-284 = "嗯，就這麼辦吧……"

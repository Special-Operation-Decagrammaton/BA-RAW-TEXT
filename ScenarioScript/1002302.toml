1002302-18 = "2;이오리;01;응, 하계 합숙 중에는 선도부장이 학원을 비우게 되니까."
1002302-19 = "2;이오리;01;매뉴얼을 구체적으로 작성해 두지 않으면, 교칙의 허점을 노려 예상치 못한 기행을 저지르는 학생이 나올지도 모르거든."
1002302-20 = "2;이오리;99;원래 이런 매뉴얼 작성은 히나 부장의 일이지만, 요새 부장은 문제아들의 처리만으로도 너무 바빠서…….\n#2;em;…"
1002302-21 = "2;이오리;01;이번에는 다른 선도부원들도 같이 부장의 일을 나누어 분담하기로 했어."
1002302-22 = "[s] \"내가 뭔가 도와줄 일은 없을까?\""
1002302-23 = "2;이오리;02;아니. 대부분의 업무는 거의 다 처리했으니까, 도와주지 않아도 괜찮아.\n#2;m3\n#2;em;[반응]"
1002302-24 = "2;이오리;99;남은 일이라면…… 하계 합숙 때 적용할 새로운 교칙 정도려나."
1002302-25 = "[s] \"새로운 교칙?\""
1002302-26 = "#all;hide"
1002302-27 = "3;이오리;02;응. 교내에서 쓰는 교칙을 하계 합숙 때에도 그대로 쓸 수는 없잖아?"
1002302-28 = "3;이오리;02;해변에서는 교복 대신 수영복을 입어야 하고, 습기에 민감한 폭발물을 쓸 수 없는 등……. 교내와는 여러모로 환경이 다르니까."
1002302-29 = "3;이오리;06;하지만 해변에서 학생이 하면 안 되는 일이라고 해도 쉽게 떠오르지 않는단 말이지.\n#3;stiff\n#3;em;[땀]"
1002302-30 = "3;이오리;00;선생님, 괜찮으면 이 문제에 대해 조언을 해줬으면 좋겠는데."
1002302-31 = "3;이오리;02;여름 해변에서 학생이 하면 안 되는 일에는 어떤 게 있을까?\n#3;em;[?]"

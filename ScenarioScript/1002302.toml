[translation]
1002302-1 = "What Not to Do at the Beach"
1002302-2 = "I'm on my way to the Prefect Team's HQ to give Iori what she requested."
1002302-5 = "Gehenna Prefect Team"
1002302-8 = "Oh, Sensei. You're here."
1002302-9 = "[s] \"I brought the sunscreen you asked for.\""
1002302-10 = "That's one less thing to worry about before summer camp."
1002302-11 = "Thanks for your help, Sensei."
1002302-12 = "Now I can get back to focusing on the documents I need to sort before we leave."
1002302-17 = "[ns] \"You look busy.\""
1002302-18 = "Well, the camp does call for the head prefect to leave campus for a while."
1002302-19 = "That calls for writing detailed manuals so that students don't try to find loopholes within the rules while we're gone."
1002302-20 = "This is usually Hina's job, but she's had her hands full dealing with troublemakers lately."
1002302-21 = "So the other Prefect Team members and I are divvying up her responsibilities to lighten the load."
1002302-22 = "[s] \"Is there anything I can help you with?\""
1002302-23 = "No. I'm finished with almost all of the tasks, so I can handle it from here."
1002302-24 = "All that's left is finalizing the new rules for summer camp."
1002302-25 = "[s] \"New rules?\""
1002302-27 = "Right. We can't simply use the same rules we use for school at the camp."
1002302-28 = "For example, being at the beach calls for wearing a bathing suit instead of a school uniform, and we can't use explosives sensitive to moisture. Things are much different than being on campus."
1002302-29 = "And while some things are obvious, there are others I wouldn't expect the average student to simply know."
1002302-30 = "Actually, I could use your advice when it comes to these sorts of problems, Sensei."
1002302-31 = "What kinds of things should a student not do while at the beach?"
1002302-32 = "[s1] \"Pickpocketing.\"\n[s2] \"Armed robbery.\""
1002302-33 = "Yes, good catch..."
1002302-34 = "Yes, good catch..."
1002302-35 = "As if! I'm talking about the less obvious things!"
1002302-36 = "What kind of message would it send about Gehenna Academy if our students had to be reminded of such basic rules?"
1002302-37 = "Give me examples of offenses students are much more likely to unknowingly commit."
1002302-38 = "[s3] \"Burying mines in the sand?\"\n[s4] \"Blowing up beachfront property?\""
1002302-39 = "How easy do you think it is for someone to go around burying mines, Sensei?"
1002302-40 = "How easy do you think it is for someone to go around blowing up property, Sensei?"
1002302-41 = "Stop joking around and try to take this seriously!"
1002302-44 = "You're really not helping."
1002302-45 = "What do you think the responsibilities of the Prefect Team are?"
1002302-46 = "*sigh* It's my fault for trying to rely on [USERNAME] Sensei to begin with."
1002302-47 = "Because [USERNAME] is a hopeless pervert and a pitiful adult."
1002302-48 = "[s5] \"That's a bit harsh...\"\n[s6] \"Okay, now say it with a poutier face.\""
1002302-50 = "No. I'm angry."
1002302-53 = "(Hold on. Maybe to understand a pervert, I have to think like a pervert.)"
1002302-54 = "(So if I were to reverse engineer the way Sensei thinks...)"
1002302-57 = "Hey, Sensei. If you were allowed to do whatever you wanted at the beach, what's the number-one thing you would do?"
1002302-58 = "[s] \"I'd take pictures of girls in their swimsuits.\""
1002302-59 = "I should have known. You're so pathetic..."
1002302-60 = "That reminds me that taking photos without permission has been a problem at summer camp in the past."
1002302-61 = "I'll write that one down in the rules."
1002302-62 = "And? Anything else you'd want to do?"
1002302-63 = "[s] \"I want to sip juice from the same straw as you.\""
1002302-64 = "N-No self-respecting Prefect Team member would ever allow something so...disgraceful!"
1002302-65 = "Students who try to do this definitely need to be supervised."
1002302-66 = "Keep talking."
1002302-68 = "I then spilled my deepest desires to Iori one after another."
1002302-71 = "All done! This should be enough special rules for summer camp."
1002302-72 = "Surely no student will try to do anything wrong outside of what's written here..."
1002302-73 = "It's all thanks to your help, Sensei. Thank you."
1002302-74 = "[s7] \"Aww, shucks. It was nothing.\"\n[s8] \"I've got the market for beach misbehavior cornered.\""
1002302-77 = "I didn't realize you thought about these things so regularly."
1002302-78 = "It's disappointing."
1002302-79 = "You're not allowed within five feet of me from now on."
1002302-81 = "And so the gap between me and Iori widens...literally."

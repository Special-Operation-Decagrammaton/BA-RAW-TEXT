[translation]
1002302-1 = "在海邊不能做的事"
1002302-2 = "（帶著幫伊織買的防曬乳，前往風紀委員會）"
1002302-5 = "格黑娜．風紀委員會"
1002302-8 = "啊，老師。你來了啊。"
1002302-9 = "[s] 「你拜託的防曬乳買來了。」"
1002302-10 = "啊啊，謝謝。"
1002302-11 = "馬上就是夏季合宿了，謝謝老師幫忙。"
1002302-12 = "那麼，我要繼續處理合宿的相關文書了。"
1002302-17 = "[ns] 「你看起來很忙呢。」"
1002302-18 = "畢竟合宿期間，陽奈委員長會暫時離開格黑娜學園。"
1002302-19 = "如果不做好充足準備，說不定會有學生鑽校規的漏洞做出意料之外的怪事。"
1002302-20 = "本來這應該是陽奈委員長的工作，但最近委員長要忙著處理問題兒童……"
1002302-21 = "因此其他風紀委員便商量，決定要一起分擔委員長的工作。"
1002302-22 = "[s] 「有我能幫忙的事嗎？」"
1002302-23 = "不，忙歸忙但大部分的工作幾乎都處理好了。"
1002302-24 = "若老師要幫的話……目前頂多剩下合宿時要執行的規範。"
1002302-25 = "[s] 「合宿時的規範？」"
1002302-27 = "對，總不能將平時校內使用的校規，直接套用在合宿上。"
1002302-28 = "在海邊大多都會穿泳裝而不是制服，處理對濕氣敏感的爆裂物又必須要特別謹慎……和校內會有各種環境上的差異。"
1002302-29 = "但要深入思考這問題時，又會想不到「學生在海邊有哪些不能做的事」……"
1002302-30 = "對了老師。如果可以的話，能否針對這個問題給我一些建議呢？"
1002302-31 = "說到「針對在夏天時前往海邊的學生，必須禁止的事項」……你會想到什麼？"
1002302-32 = "[s1] 「扒手。」\n[s2] 「強盜。」"
1002302-33 = "確，確實……"
1002302-34 = "確，確實……"
1002302-35 = "……不對，不是這種！那些都是平常就不該做的事呀！"
1002302-36 = "把這種基本常識等級的東西寫在校規裡，會讓其他學校的學生怎麼看我們！？"
1002302-37 = "有沒有那種……到了海邊會不自覺犯下的失序行為……"
1002302-38 = "[s3] 「在沙灘設置地雷？」\n[s4] 「引爆海之家？」"
1002302-39 = "不不不，雖然這些確實是壞事……"
1002302-40 = "不不不，雖然這些確實是壞事……"
1002302-41 = "好了啦！不要在那邊搞笑了，快點認真幫我想！"
1002302-44 = "……啊啊，真是的，完全幫不上忙。"
1002302-45 = "老師的思維怎麼這麼多根本上的問題啊……"
1002302-46 = "唉……是我太蠢了，竟然會對[USERNAME]老師有所期待。"
1002302-47 = "我竟然忘記老師是個無能又窩囊又變態的大人……"
1002302-48 = "[s5] 「太過分了……」\n[s6] 「剛才那番話還能再說一次嗎？」"
1002302-50 = "我不要，噁心！"
1002302-53 = "（等等，反過來一想……變態應該最了解變態的想法了）"
1002302-54 = "（所以我只要反向利用老師的想法……）"
1002302-57 = "老師，如果在海水浴場可以做任何事，你最想做什麼事呢？"
1002302-58 = "[s] 「拍攝穿泳裝的學生。」"
1002302-59 = "噁心透頂……果然是個變態……"
1002302-60 = "……但確實，記得上次夏季合宿時也有發生偷拍的問題。"
1002302-61 = "把這項加入合宿規範好了……"
1002302-62 = "……姑且問一下，還有其他想做的事嗎？"
1002302-63 = "[s] 「想和伊織用同一根吸管一起喝果汁。」"
1002302-64 = "白，白癡啊！風紀委員怎麼可能允許那種不檢點的行為……！"
1002302-65 = "……但確實，如果真有學生想做這種事，那也必須勸導一下……"
1002302-66 = "……總之繼續說吧。"
1002302-68 = "（之後便一直誠實的向伊織述說自己內心的慾望）"
1002302-71 = "完成了！有這些內容應該就夠了。"
1002302-72 = "應該不會有學生做出超乎規範預料的天大糟糕事吧……"
1002302-73 = "謝謝老師的協助。"
1002302-74 = "[s7] 「小事一樁。」\n[s8] 「說到海邊惡行我可是內行。」"
1002302-77 = "雖然是真的幫了大忙……"
1002302-78 = "但想不到老師平常就滿腦子這些下流想法……"
1002302-79 = "……噁心，以後請和我保持半徑五步的距離。"
1002302-81 = "（和伊織的誤會變深了……）"

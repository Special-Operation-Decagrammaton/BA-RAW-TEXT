[translation]
1002302-1 = "เรื่องต้องห้ามที่ชายหาด"
1002302-2 = "(คุณครูเอาของที่อิโอริฝากซื้อมาให้ที่ห้องคณะกรรมการวินัย)"
1002302-5 = "คณะกรรมการวินัยเกเฮนน่า"
1002302-8 = "อ๊ะ คุณครู มาแล้วเหรอ?"
1002302-9 = "[s] \"เอาแทนนิ่งออยล์มาให้แล้ว\""
1002302-10 = "ขอบคุณนะ ถ้ามีแทนนิ่งออยล์นี่ ฉันก็ไม่ต้องกังวลเรื่องเข้าค่ายฤดูร้อนแล้ว"
1002302-11 = "ขอบคุณที่ช่วยนะคุณครู"
1002302-12 = "ถ้างั้นก็มาจัดเอกสารที่จำเป็นสำหรับค่ายฤดูร้อนกันดีกว่า"
1002302-17 = "[ns] \"งานยุ่งจังเลยนะ\""
1002302-18 = "อื้ม เพราะประธานจะไม่ได้เข้าดูการฝึกด้วยน่ะ"
1002302-19 = "ถ้าไม่เขียนคู่มือไว้ให้มันละเอียดๆ ก็อาจจะมีนักเรียนที่ใช้ช่องโหว่ของกฎระเบียบแล้วทำพฤติกรรม#nแปลกๆ ที่คาดไม่ถึงได้"
1002302-20 = "เดิมทีแล้วประธานฮินะต้องเป็นคนเขียนคู่มือนี่ แต่ช่วงนี้ประธานยุ่งกับการจัดการพวกเด็กเจ้าปัญหา"
1002302-21 = "ครั้งนี้สมาชิกคณะกรรมการวินัยก็เลยช่วยกันแบ่งงานของประธานมาทำน่ะ"
1002302-22 = "[s] \"มีอะไรที่ครูพอช่วยได้มั้ย?\""
1002302-23 = "ไม่เป็นไร ฉันทำเสร็จเกือบหมดแล้วละ ไม่ต้องช่วยก็ได้"
1002302-24 = "ส่วนงานที่ยังไม่เสร็จ... ก็น่าจะเป็นการกำหนดกฎใหม่ที่ต้องใช้ระหว่างค่ายฤดูร้อน"
1002302-25 = "[s] \"กฎใหม่?\""
1002302-27 = "ใช่ เพราะเราเอากฎที่ใช้ในห้องเรียนมาใช้กับการเข้าค่ายฤดูร้อนไม่ได้น่ะสิ"
1002302-28 = "เราต้องตั้งกฎใหม่ เช่น อยู่ทะเลต้องใส่ชุดว่ายน้ำแทนชุดนักเรียน ห้ามใช้ระเบิดที่ไวต่อความชื้น#nเพราะสภาพแวดล้อมมันต่างจากในโรงเรียน"
1002302-29 = "แต่ถึงจะกำหนดกฎใหม่ หรือข้อห้ามต่างๆ ที่ห้ามทำที่ทะเลไว้แล้ว แต่ก็ใช่ว่าพวกนักเรียนจะยอม#nทำตามกันง่ายๆ"
1002302-30 = "คุณครูช่วยให้คำแนะนำเรื่องนี้หน่อยได้มั้ย?"
1002302-31 = "มีอะไรอีกที่นักเรียนไม่ควรทำที่ชายหาด?"
1002302-32 = "[s1] \"ล้วงกระเป๋า\"\n[s2] \"ปล้น\""
1002302-33 = "จริงด้วย ลืมไปเลย..."
1002302-34 = "จริงด้วย ลืมไปเลย..."
1002302-35 = "ซะที่ไหนกันล่ะ!! เรื่องแบบนี้มันไม่ควรจะทำในทุกที่อยู่แล้วนี่นา!"
1002302-36 = "ถ้าเขียนเรื่องอาชญากรรมลงในกฎข้อห้าม โรงเรียนอื่นจะคิดเกี่ยวกับสถาบันเกเฮนน่ายังไงเล่า?"
1002302-37 = "ฉันขอให้คิดตัวอย่างพฤติกรรมไม่ดีที่นักเรียนจะทำได้ง่ายๆ ต่างหากล่ะ!"
1002302-38 = "[s3] \"วางกับระเบิดบนชายหาด?\"\n[s4] \"ระเบิดร้านริมทะเล?\""
1002302-39 = "คุณครูคิดว่าการวางกับระเบิด มันเป็นเรื่องที่ทำได้ง่ายๆ เหรอ?"
1002302-40 = "คุณครูคิดว่าการระเบิดร้าน มันคือเรื่องที่ทำได้ง่ายๆ เหรอ?"
1002302-41 = "อย่ามัวแต่พูดล้อเล่นอยู่สิ ช่วยคิดอะไรที่มันเข้าท่าหน่อย!"
1002302-44 = "ไม่ได้ช่วยอะไรเลย..."
1002302-45 = "คุณครูคิดว่างานของคณะกรรมการวินัยคืออะไรงั้นเหรอ?"
1002302-46 = "เฮ้อ... ฉันคงพลาดเองแหละที่คาดหวังในตัวคุณครู [USERNAME]"
1002302-47 = "เพราะคุณครู [USERNAME] คือผู้ใหญ่น่าเวทนา แถมยังเป็นโรคจิตที่ช่วยเหลืออะไรไม่ได้"
1002302-48 = "[s5] \"ว่าแรงเกินปุยมุ้ย...\"\n[s6] \"พูดแบบเมื่อกี้อีกทีได้มั้ย?\""
1002302-50 = "ไม่ ฉันอารมณ์ไม่ดีละ"
1002302-53 = "(เดี๋ยวสิ... ถ้ามาคิดดูดีๆ คนโรคจิตแบบนี้แหละถึงคิดอะไรจิตๆ ขึ้นมาได้!)"
1002302-54 = "(ถ้างั้นต้องเปลี่ยนคำถามให้เข้ากับมุมมองของคุณครู...)"
1002302-57 = "คุณครู ถ้าได้สิทธิ์ทำอะไรก็ได้ที่ชายหาด คุณครูอยากทำอะไรที่สุดเหรอ?"
1002302-58 = "[s] \"อยากถ่ายรูปนักเรียนที่ใส่ชุดว่ายน้ำ\""
1002302-59 = "อารมณ์เสีย... น่าเวทนาจริงๆ"
1002302-60 = "แต่อันที่จริง เราก็เจอปัญหาการถ่ายภาพโดยไม่ได้รับอนุญาตในค่ายฤดูร้อนทุกปีเลย"
1002302-61 = "งั้นเอามาใส่ในกฎก่อนแล้วกัน"
1002302-62 = "อย่างอื่นล่ะ? มีอะไรที่อยากทำอีกมั้ย?"
1002302-63 = "[s] \"อยากดื่มน้ำผลไม้ด้วยหลอดอันเดียวกับอิโอริจัง\""
1002302-64 = "มะ... ไม่เด็ดขาด สมาชิกกรรมการวินัยเกเฮนน่าอย่างฉัน จะไม่มีวันยอมให้เกิดพฤติกรรมไร้ยางอาย#nแบบนี้เด็ดขาด!!"
1002302-65 = "แต่ยังไงก็ต้องควบคุมพฤติกรรมนักเรียนที่พยายามจะทำเรื่องแบบนี้"
1002302-66 = "พูดต่อเลย..."
1002302-68 = "(สุดท้าย คุณครูก็ได้บอกความปรารถนาลึกๆ ในใจกับอิโอริอย่างตรงไปตรงมาต่ออีกพักใหญ่)"
1002302-71 = "พอแล้วละ! กฎพิเศษสำหรับค่ายฤดูร้อนแค่นี้ก็คงจะพอแล้ว"
1002302-72 = "คงไม่มีนักเรียนคนไหนคิดจะก่ออาชญากรรมอื่น นอกเหนือจากที่ระบุไว้ในนี้หรอกเนอะ...?"
1002302-73 = "กฎพิเศษวันนี้ได้มาเพราะความช่วยเหลือของคุณครูเลย ขอบคุณนะ"
1002302-74 = "[s7] \"ไม่ต้องชมขนาดนี้หรอก\"\n[s8] \"เรื่องทำอะไรเหลวไหลที่ชายหาด ไว้ใจครูคนนี้ได้เลย\""
1002302-77 = "ไม่คิดเลย ว่าคุณครูมีความคิดแบบนี้อยู่ในหัวตลอดเวลา..."
1002302-78 = "น่าหงุดหงิดจริงๆ "
1002302-79 = "ต่อไปห้ามเข้าใกล้ฉันเกิน 5 ก้าวนะ"
1002302-81 = "(แล้วอิโอริก็เข้าใจคุณครูผิดมากกว่าเดิม...)"

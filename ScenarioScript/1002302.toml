1002302-33 = "3;이오리;99;아, 그렇네……"
1002302-34 = "3;이오리;99;아, 그렇네……"
1002302-35 = "3;이오리;04;……가 아니라! 그건 원래 당연히 하면 안 되는 일이잖아!\n#3;shake\n#3;em;[?!]"

[translation]
90000075-1 = "#wait;1000"
90000075-2 = "3;히마리;06;모두들 무사하신가요…….\n#3;em;[속상함]\n#3;a"
90000075-3 = "3;에이미;06;깜짝 놀랐어. 저건 대체 뭐였어, 부장?\n#3;em;[땀]\n#3;stiff"
90000075-4 = "3;히마리;06;……저도 처음 보았습니다. 저 모습…… 저건 아마도…….\n#3;em;…"
90000075-5 = "3;히마리;05;지금까지 알려지지 않은 새로운 데카그라마톤의 <예언자>……인 것 같습니다."
90000075-6 = "3;에이미;05;역시. 갑자기 나타나서 깜짝 놀랐어."
90000075-7 = "3;에이미;05\n5;히마리;04;네. 다행히 큰 피해없이 퇴각할 수 있었네요. 하지만 그렇다고 해도 다른 예언자들과 달리 굉장히 특이한 움직임이었어요.\n#5;em;[반응]\n#3;m1\n#5;al"
90000075-8 = "3;에이미;01;응. 마치 우리를 막아서려는 것 같은 느낌이었지."
90000075-9 = "5;히마리;06;……그렇다는 건."
90000075-10 = "5;히마리;06;정말로 저 지역에 데카그라마톤이 존재하는 걸까요? 저 새로운 <예언자>는 데카그라마톤을 지키기 위해 우리 앞에 나타난 것일까요……?\n#5;em;[...]"
90000075-11 = "3;에이미;06;음……."
90000075-12 = "3;에이미;06\n5;히마리;07;네. 그건 직접 확인해보면 될 일이죠. \n#5;em;[반응]\n#3;dl\n#5;m3"
90000075-13 = "5;히마리;02;어쩌면 이제 우리의 임무는 새로운 국면으로 넘어간 것일지도 모르겠네요."
90000075-14 = "5;히마리;02;저 예언자가 지키고 있는 수몰지구에, 우리가 봐선 안되는 것이 존재하고 있는지, 아닌지."
90000075-15 = "5;히마리;05;직접 두 눈으로 확인해보도록 하겠습니다."
90000075-16 = "#all;hide"
90000075-17 = "3;에이미;02;응. 무슨 말인지 이해했어. 앞으로 조금 더 힘들어지겠네.\n#3;em;[반응]"
90000075-18 = "3;히마리;05;네. 다음 임무는, 저 폐허 수몰지구의 철저한 수색입니다."
90000075-19 = "3;히마리;11;<예언자>가 우리 앞을 가로막겠지만, ……이 정도의 방해는 저의 이름을 걸고 극복해 보이도록 하죠.\n#3;closeup"
90000075-20 = "#continued"
90000075-21 = "#nextepisode;다음화;수색 작전"

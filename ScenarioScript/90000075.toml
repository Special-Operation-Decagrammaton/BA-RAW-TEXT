[translation]
90000075-2 = "ทุกคนปลอดภัยดีกันใช่ไหมคะ..."
90000075-3 = "ตกใจหมดเลย เมื่อกี๊มันอะไรเหรอหัวหน้า?"
90000075-4 = "ฉันเองก็เพิ่งเคยเห็นเป็นครั้งแรกค่ะ นั่นมัน... บางทีอาจจะเป็น..."
90000075-5 = "อาจจะเป็น <ผู้เลื่อมใส> รายใหม่ของเดคาแกรมมาทอนที่ยังไม่เคยมีใครรู้จักมาก่อนก็ได้ค่ะ"
90000075-6 = "ว่าแล้วเชียว อยู่ดีๆ ก็โผล่มา ตกใจหมด"
90000075-7 = "ใช่ค่ะ โชคดีที่เราล่าถอยได้โดยไม่ได้รับความเสียหายนะคะ แต่จะว่าไป นั่นเป็นการเคลื่อนไหวที่พิเศษมากค่ะ ช่างแตกต่างจากผู้เลื่อมใสอื่นๆ"
90000075-8 = "อืม เหมือนกับมันพยายามจะขวางพวกเรางั้นแหละ"
90000075-9 = "ถ้าอย่างนั้น..."
90000075-10 = "ก็แสดงว่าเดคาแกรมมาทอนอยู่ในพื้นที่นั้นจริงๆ น่ะเหรอคะ? <ผู้เลื่อมใส> รายใหม่นั่นมาปรากฏตัว#nต่อหน้าพวกเราเพื่อปกป้องเดคาแกรมมาทอนเหรอคะ...?"
90000075-11 = "อืม..."
90000075-12 = "ค่ะ เรื่องนั้นเอาไว้ตรวจสอบเองก็น่าจะรู้ผลได้ "
90000075-13 = "บางทีตอนนี้... ภารกิจของเราอาจจะเปลี่ยนไปสู่ประเด็นใหม่ก็ได้ค่ะ"
90000075-14 = "เปลี่ยนเป็น... ในพื้นที่จมน้ำที่ผู้เลื่อมใสนั่นปกป้องอยู่ มีบางอย่างที่เราไม่ควรไปเห็นหรือเปล่า"
90000075-15 = "เราต้องไปพิสูจน์ให้เห็นด้วยตาค่ะ"
90000075-17 = "อืม พอจะเข้าใจแล้วละ จากนี้ไปคงไม่ใช่เรื่องง่ายเลยละนะ"
90000075-18 = "ค่ะ ภารกิจต่อไปก็คือ การตรวจค้นพื้นที่จมน้ำในพื้นที่รกร้างอย่างละเอียดค่ะ"
90000075-19 = "ถึง <ผู้เลื่อมใส> จะออกมาขวางเราอีก... แต่ฉันก็จะเอาชนะการกีดขวางนั้นให้ได้ค่ะ ขอเอาชื่อของฉันเป็นประกันเลยค่ะ"
90000075-21 = "ตอนต่อไป;ปฏิบัติการค้นหา"

[translation]
90000075-2 = "Are you both okay?"
90000075-3 = "I'm unharmed, physically at least. What was that, President?"
90000075-4 = "It's beyond even my knowledge."
90000075-5 = "My best guess would be a new prophet that was unknown until now..."
90000075-6 = "It really came out of nowhere. I don't like getting surprised."
90000075-7 = "I'm glad we were able to retreat safely. But I must say its behavior was different from other prophets."
90000075-8 = "I know that kind of behavior. It was trying to guard something."
90000075-9 = "Which must mean..."
90000075-10 = "Decagrammaton really does reside there? Perhaps it created this new prophet to protect itself."
90000075-11 = "Hmm..."
90000075-12 = "We shall simply have to see for ourselves. "
90000075-13 = "Our mission has moved to a new phase now."
90000075-14 = "Could there be something in the submerged district protected by the prophet that we shouldn't see?"
90000075-15 = "We'll just have to find out."
90000075-17 = "Yes, President. This mission will be much more difficult than our previous ventures."
90000075-18 = "Agreed. We'll need to find a way to thoroughly search the Ruins."
90000075-19 = "I don't care if the prophet tries to stop us. Nothing keeps me from what I want."
90000075-21 = "Next Episode;Search Operation"

[translation]
90001245-3 = "[ns]「電力恢復了！」"
90001245-4 = "嗚哇，好刺眼！"
90001245-5 = "[ns]「有沒有人受傷？」"
90001245-6 = "我們沒事！老師呢？"
90001245-7 = "似乎沒事呢……太好了。"
90001245-10 = "啊，這傢伙！給我站住～！"
90001245-11 = "唔唔，剛剛那些機器感覺好噁心……"
90001245-13 = "和以往交手過的十字神名兵力相比，似乎存在某種根本上的不同。"
90001245-14 = "如果有留下一些機體碎片，我們還能試著分析看看……"
90001245-15 = "可惜它們在撤退之前，把所有殘骸都收了回去。"
90001245-16 = "不知為何，明明贏了卻絲毫沒有獲勝的感覺。"
90001245-18 = "嗯……有種在遊戲的教學關卡裡，敵人刻意輸掉撤退的感覺……"
90001245-19 = "這樣應該賺不到很多經驗值……#n沒有掉落道具能撿，也是因為這個原因……"
90001245-21 = "那個……愛麗絲？#n現在的問題應該不屬於那種情況吧……"
90001245-24 = "（不過這代表剛才的襲擊……）"
90001245-25 = "（是某種試探嗎……？）"
90001245-28 = "……"
90001245-29 = "……！"
90001245-30 = "……！！！"
90001245-34 = "Ain、Soph、Aur，怎麼了嗎？"
90001245-35 = "剛，剛，剛剛剛剛，剛才那個人，該不會是……！？"
90001245-36 = "沒，沒錯……！#n本來以為是我眼花了，但看起來並不是……！"
90001245-42 = "為什麼那兩個人會在這裡──！？"
90001245-44 = "下一話;無法預測之物"

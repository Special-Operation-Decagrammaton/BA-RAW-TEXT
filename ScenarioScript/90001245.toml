[translation]
90001245-3 = "[ns] \"ไฟมาแล้ว!\""
90001245-4 = "อ๊ะ แสบตาจัง!"
90001245-5 = "[ns] \"มีใครได้รับบาดเจ็บหรือเปล่า?\""
90001245-6 = "พวกเราไม่เป็นไร! ครูล่ะ?"
90001245-7 = "อืม... โล่งอกไปทีนะ"
90001245-10 = "ฮึ่ย! หยุดอยู่ตรงนั้นเลยนะ~!"
90001245-11 = "อึก... มีพวกเครื่องจักรที่น่าขนลุกด้วยค่ะ..."
90001245-13 = "โดยพื้นฐานแล้วมันมีบางอย่างที่แตกต่างกันกับกองกำลังของเดคาแกรมมาทอนที่เราเคยเจอมา#nทั้งหมดเลยค่ะ"
90001245-14 = "ถ้ายังมีเศษซากของพวกมันหลงเหลืออยู่ เราก็น่าจะวิเคราะห์ดูได้..."
90001245-15 = "น่าจะไม่ได้หรอก พวกนั้นถอนกำลังกลับไปหมดแล้ว"
90001245-16 = "จะว่าไป พวกนั้นถอนกำลังไปแล้วแท้ๆ แต่ก็ไม่รู้สึกเหมือนเราชนะเลยนะคะ"
90001245-18 = "ใช่ค่ะ... รู้สึกเหมือนเราเคลียร์โหมดฝึกสอนในเกมที่ศัตรูยอมแพ้ไปเองอย่างนั้นละ..."
90001245-19 = "แบบนั้นก็คงได้ EXP นิดเดียวสินะคะ... เพราะแบบนี้หรือเปล่าคะ เราก็เลยไม่ได้ไอเทมอะไรด้วย..."
90001245-21 = "คือว่า... อาริสึ? ฉันว่าตอนนี้ปัญหาไม่ใช่เรื่องนั้นหรอกนะคะ..."
90001245-24 = "(แต่ถ้าอย่างนั้น การโจมตีเมื่อกี้ก็เป็น...?)"
90001245-25 = "(การหยั่งเชิงเพื่อดูว่าเรามีพละกำลังแค่ไหนงั้นเหรอ...?)"
90001245-28 = "..."
90001245-29 = "...!"
90001245-30 = "...!!!"
90001245-34 = "ไอน์ ซอฟ ออร์ จู่ๆ เป็นอะไรไปคะ?"
90001245-35 = "มะ... มะ... มะมะมะมะ... เมื่อกี้มัน... หรือว่าจะเป็น...?!"
90001245-36 = "ชะ... ใช่แล้วละ...! ฉันคิดว่าตัวเองตาฝาดไปคนเดียวเสียอีก แต่เหมือนว่าจะไม่ใช่นะ...!"
90001245-42 = "ทำไมสองคนนั้นถึงมาอยู่ที่นี่ล่ะคะ?!?!"
90001245-44 = "ตอนต่อไป;สิ่งที่คาดเดาไม่ได้"

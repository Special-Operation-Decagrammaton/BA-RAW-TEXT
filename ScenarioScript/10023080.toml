[translation]
10023080-1 = "Episode 8;Remember, Nothing Is Forever"
10023080-5 = "How are you faring, Sensei?"
10023080-6 = "[s] \"I have no complaints. What about you, Toki?\""
10023080-7 = "I have nothing to report."
10023080-8 = "[s] \"Rather than a report, is something bothering you?\""
10023080-12 = "...Try as I might, you're always so quick to read me."
10023080-13 = "I'll be honest, Sensei. I'm not sure what to do here."
10023080-14 = "You don't know?! We're ten times more confused over here!"
10023080-15 = "Understood, Noisy-Moi."
10023080-16 = "Noisy-Moi?! Is that my nickname?!"
10023080-17 = "It's not just you. I have nicknames for everyone: Midori the True President, Yuzu the Timid, and Aris the Adorable."
10023080-18 = "They all have cool titles! Why is mine a dumb name? "
10023080-19 = "Sensei! C'mon! This is basically bullying! You're supposed to stop this kinda stuff!"
10023080-23 = "[ns] \"...As Momoi said, bullying is bad.\""
10023080-25 = "But Momoi wasn't wrong, Sensei."
10023080-26 = "What do we do...?"
10023080-28 = "This is very easy! We defeat the bad guys and become a party of hero maids!"
10023080-29 = "We're not even sure who the bad guys are..."
10023080-30 = "Hm? That is easy as well! The bad guys are..."
10023080-31 = "The bad guys..."
10023080-32 = "Oh! Suddenly, everything is spinning! I am fainting, Yuzu! Help!"
10023080-39 = "If you don't mind, I have an idea. Please remove yourself from this case, Game Development Department...and Sensei. "
10023080-46 = "[ns] \"Why...Why would you want that, Toki?\""
10023080-47 = "Toki... Toki, you are planning something dangerous, are you not?"
10023080-48 = "I admit, I was caught off guard at the proposal of an alliance."
10023080-49 = "There is no need. I will fulfill my duty and see this case to its end."
10023080-50 = "[s] \"But by yourself?\""
10023080-51 = "Yes. I was assigned this mission by C&C, and so I will complete it as C&C. I will not mar the organization's reputation."
10023080-53 = "How...do you plan on accomplishing this alone, Toki?"
10023080-55 = "I'll have to let the situation play out a little. If the situation calls for it, I'll support the Benevolent Thief's plan to stop the auction."
10023080-56 = "Otherwise, I'll simply retrieve the Clock King's Crown before the Benevolent Thief and return it to Valkyrie."
10023080-57 = "This case never had anything to do with the Game Development Department. Or you, Sensei."
10023080-58 = "So, follow Sensei back to Millennium."
10023080-59 = "This is where we say goodbye."
10023080-65 = "No! Do not falter, party members!"
10023080-66 = "Aris? You don't understand..."
10023080-67 = "Yes I do! Toki joined our party! Bum bum bum!"
10023080-68 = "You are our party member! And the Game Development Department does not leave a fellow member behind!"
10023080-70 = "...I know the situation hasn't been ideal..."
10023080-71 = "And that we wouldn't even be here if it weren't for Momoi."
10023080-72 = "Midori... You need to learn to put things in the past..."
10023080-73 = "Ignore her!"
10023080-74 = "We're not going to leave you to do this alone, Toki!"
10023080-75 = "After all, we're your fellow C&C members! We took out a little loan on the name, remember?"
10023080-77 = "It's that simple for you?"
10023080-78 = "I was taught that the simplest reasons are usually the important ones."
10023080-79 = "Or... Are we wrong, and the reason you wish to leave is because you do not consider us party members?"
10023080-80 = "N-No! It's only that... I don't know what that means. I've always done things alone... And I don't know how to handle situations I haven't encountered. At least, not off the field."
10023080-81 = "If that is how you feel, then I would like to help Toki. Even if the others will not join our party!"
10023080-83 = "If that's what Aris wants, let's do this!"
10023080-84 = "We'll follow your lead, Aris..."
10023080-86 = "Heehee. That grand finale was a true depiction of beauty."
10023080-95 = "Meitaro didn't get to where he was by being a fool. He's already regained control of the secret auction and has restarted the bidding."
10023080-96 = "His guards are hunting us down as we speak."
10023080-97 = "If my guess is correct, the Clock King's Crown will be up for bid around midnight."
10023080-98 = "Once Meitaro realized we were not intent on destroying each other, he pivoted to Plan B: take us out before the stroke of twelve."
10023080-99 = "[s] \"That's a very nice rundown.\""
10023080-100 = "Well, you were the one who suggested we join an alliance, Sensei."
10023080-101 = "[s] \"There are two questions that have been bothering me...\""
10023080-102 = "Ask away."
10023080-103 = "Although... I can't give away all my secrets just yet."
10023080-107 = "[ns] \"My first question is about the last phrase of the calling card.\""
10023080-108 = "The sad sword of opulence never awarded to another."
10023080-109 = "We thought you were talking about the sword in that knight painting!"
10023080-110 = "That one was child's play. The sword and the crown are both symbols of authority."
10023080-111 = "I had intended for the riddle's focus on clocks to be a hint."
10023080-112 = "But we didn't even know this Clock King's Crown thing existed."
10023080-113 = "The crux of the problem. It was impossible for you to decode the calling card because you were working with a flawed premise."
10023080-114 = "Because Meitaro has been lying to you since your first exchange."
10023080-115 = "[s] \"This entire mission was an elaborate scheme from the start...\""
10023080-116 = "Heehee. Surprise! "
10023080-117 = "And now Meitaro will learn that fate does not always spin in his favor. This world is not a playground for his whims and fancies."
10023080-118 = "Was my answer satisfactory?"
10023080-119 = "[s] \"Yes. My second question is... Why...all this?\""
10023080-120 = "You are becoming predictable, Sensei."
10023080-121 = "My reasons are simple as well. I do it for everyone."
10023080-123 = "Everyone...? Like, you steal things for other people's benefit?"
10023080-125 = "Precisely. My standards of beauty dictate that the greater the value, the more it must be enjoyed by all!"
10023080-126 = "Art is not the privilege of the elite, squirreled away in their collections, never seeing the light of day. It is everyone's right to appreciate beauty!"
10023080-131 = "If we allow Meitaro's dastardly plans to unfold, the Clock King's Crown will eventually circulate back into the Black Market. And that must not be allowed to happen."
10023080-132 = "Imagine a highly valuable piece of art such as this one suddenly reappearing in the underworld. Can you imagine what would unfold?"
10023080-133 = "It would be pandemonium. I aim to retrieve it before that unfortunate outcome can come to pass."
10023080-134 = "[s] \"And then? Will you surrender it to Valkyrie after that?\""
10023080-135 = "Do you honestly expect me to trust those fools? Those neophytes were meant to keep me captive. Do I seem imprisoned in any capacity?"
10023080-136 = "I will hold onto it, until the world can finally realize the true beauty of such artworks."
10023080-137 = "[s] \"You're just keeping it, in the end!\""
10023080-143 = "Yes, and? Your surprise is amusing. "
10023080-144 = "Did you forget you were dealing with a big, scary thief? Will you tuck your tail and hop away now?"
10023080-148 = "I accept your proposal, Sensei."
10023080-149 = "Oh?"
10023080-150 = "I intend on completing my mission. I've been tasked with retrieving the stolen goods, so I will retrieve them. If a temporary partnership helps me to achieve that, I will shake her hand."
10023080-151 = "And..."
10023080-153 = "We are..."
10023080-154 = "...Team Toki!"
10023080-156 = "W-We are..."
10023080-158 = "...a party!"
10023080-163 = "You all..."
10023080-164 = "Heehee. You've demonstrated a golden standard of beauty."
10023080-165 = "Excellent."
10023080-166 = "Now, then. Shall we formulate our plan of attack, partners?"

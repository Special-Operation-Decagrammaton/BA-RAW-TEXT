[translation]
10023080-1 = "第8話;終究只是暫時而已。請銘記於心"
10023080-5 = "……老師，有什麼讓您擔心的事嗎？"
10023080-6 = "[s]「沒什麼，我沒事。季呢？」"
10023080-7 = "我也……沒什麼問題。"
10023080-8 = "[s]「抱歉，事情這麼突然會讓你感到混亂的吧……？」"
10023080-12 = "……面對老師，就算想隱藏也沒有意義呢。"
10023080-13 = "老實說，我還沒完全整理好心情。"
10023080-14 = "真是的！我們也一樣啊！"
10023080-15 = "……吵鬧的桃井來了啊。"
10023080-16 = "吵鬧的桃井是什麼！？"
10023080-17 = "順帶一提，其他人是「實際上的代表綠」、「安靜的柚子」、「可愛的愛麗絲」。"
10023080-18 = "為什麼只有我被欺負了！？"
10023080-19 = "老師，你也說幾句話吧！"
10023080-23 = "[ns]「要，要好好相處哦……」"
10023080-25 = "姐姐說的我也能理解……居然突然要結盟。"
10023080-26 = "我們……該怎麼做才好呢……？"
10023080-28 = "已經決定好了！要擊敗敵人，在勇者之路上前進！"
10023080-29 = "但是愛麗絲醬……這種情況下，究竟誰是敵人呢……？"
10023080-30 = "咦……？"
10023080-31 = "這……這個……"
10023080-32 = "嗚哇啊～腦袋混亂了。#n柚子，SOS！"
10023080-39 = "我有個提議。#n請老師和遊戲開發部都退出這件事吧。"
10023080-46 = "[ns]「……季？」"
10023080-47 = "季……打算怎麼做呢？"
10023080-48 = "老師提議要結盟時，我感到有些驚訝──"
10023080-49 = "不過這是我的任務。#n那些贓物，就由我來負責回收。"
10023080-50 = "[s]「也就是說……季打算一個人處理嗎？」"
10023080-51 = "是的。說到底，各位之所以會被捲進這場事件的原因，是銅田明太郎將桃井誤認成了C&C。再加上還有綠的事情，如果各位繼續參與這件事的話，有可能又會受傷的。"
10023080-53 = "季同學，打算怎麼……解決呢？"
10023080-55 = "……要視情況而定。#n協助「慈愛的怪盜」中止拍賣會也是選擇之一。"
10023080-56 = "只要搶先「慈愛的怪盜」回收「時鐘王之冠」，#n將其交給女武神就算是達成任務。"
10023080-57 = "而無論銅田怎麼做，各位都已經沒有執行委託的必要了。老師也是一樣。"
10023080-58 = "所以請各位和老師一起回去吧。"
10023080-59 = "以上就是我想說的。"
10023080-65 = "不，愛麗絲不會回去。"
10023080-66 = "為什麼……？"
10023080-67 = "因為季是夥伴！"
10023080-68 = "遊戲開發部是絕對不會拋棄夥伴的！"
10023080-70 = "嗯，嗯……雖然情況已經演變成這樣了……"
10023080-71 = "就算是因為姐姐的錯才會被捲了進來……"
10023080-72 = "妹妹啊，沒必要在這種時候說這種話吧……"
10023080-73 = "總之！"
10023080-74 = "不能把所有事情都丟給季一個人就逃跑！"
10023080-75 = "──因為現在的我們也是C&C！"
10023080-77 = "就因為這種理由……？"
10023080-78 = "理由越單純越好，愛麗絲曾經這麼學過。"
10023080-79 = "還是說……季不是愛麗絲的夥伴嗎？"
10023080-80 = "不，不是那樣的……#n該說是不習慣夥伴，還是該說第一次遇到這種情況呢……"
10023080-81 = "那就沒問題了！愛麗絲想要幫助季！"
10023080-83 = "嗯，我也同意愛麗絲。"
10023080-84 = "嗯。我也覺得愛麗絲醬一定會這麼說的……"
10023080-86 = "呵呵，看來方針已經決定了呢？"
10023080-95 = "銅田絕非天真之人。#n他似乎已經整理好情況，重新展開了拍賣會。"
10023080-96 = "再加上我們一離開宅邸就立刻增強警備的謹慎──"
10023080-97 = "綜合這些資訊來判斷……#n「時鐘王之冠」應該會在時針指向12時開始拍賣。"
10023080-98 = "沒錯──如果無法掌握我們的行蹤，#n那也是差不多該放手一搏的時候。"
10023080-99 = "[s]「很爽快地就告訴我們了呢。」"
10023080-100 = "哎呀，說要結盟的不是老師您嗎？"
10023080-101 = "[s]「那我可以問你兩個問題嗎？」"
10023080-102 = "呼呣──兩個就行了嗎？"
10023080-103 = "不過我也沒有回答所有問題的義務就是了。呵呵。"
10023080-107 = "[ns]「首先是預告信的最後一句話。」"
10023080-108 = "「我將拜訪從未被授予，奢華而不幸的劍所在之處」。"
10023080-109 = "讀完這個之後……我們認為你會來奪走那幅畫有劍的繪畫。"
10023080-110 = "啊啊，這樣啊。#n──劍即權威的象徵。而王冠更不用說，本身即是權威。"
10023080-111 = "這座宅邸最貴重的藝術品──#n只要知道這點，就能輕鬆的解開謎題。"
10023080-112 = "但是我們連「時鐘王之冠」的名字都不知道……"
10023080-113 = "正是如此。#n所以這是小姐們絕對無法解開的預告信。"
10023080-114 = "如果當時銅田有向各位揭露一切──#n或許情況就不同了吧。"
10023080-115 = "[s]「也就是說，他從一開始就想利用我們……」"
10023080-116 = "呵呵，沒錯。"
10023080-117 = "銅田現在也該察覺到了吧──#n想讓世上的所有事都如他所願是不可能的。"
10023080-118 = "接下來，下一個問題是？"
10023080-119 = "[s]「為什麼你要做這種危險的事呢？」"
10023080-120 = "呵呵，這個嘛──"
10023080-121 = "為了世界、為了世人，該這麼回答嗎？"
10023080-123 = "你是為了大家……而竊取藝術品，是這個意思嗎？"
10023080-125 = "啊啊，太美妙了。小姐說的沒錯。#n所謂的藝術品，其價值正因為人所見才得以成立。"
10023080-126 = "體會藝術品之中蘊含的魅力，是所有人被平等賦予的權利。#n……但若是繼續放任銅田不管，「時鐘王之冠」將會再次從檯面上消失。"
10023080-131 = "當然，它有朝一日或許會再次回到黑市。#n然而……到時候事情又會如何呢。"
10023080-132 = "突然出現在地下世界的著名藝術品。#n看剛才那些客人的反應，很容易就能想像光是傳聞也會造成巨大的騷動吧？"
10023080-133 = "……騷動將引起混亂，混亂將引發紛爭。#n所以必須在那之前將東西奪走。"
10023080-134 = "[s]「那……你要把搶來的藝術品送去女武神嗎？」"
10023080-135 = "哎呀哎呀，要我相信女武神嗎？#n他們可是讓[ruby=我們]七罪人[/ruby]輕易脫逃的孩子們哦？"
10023080-136 = "答案非常簡單明快，那就是由我來進行保管。#n直到世界理解了藝術品的價值，瞭解了真正美學的那一天到來為止──"
10023080-137 = "[s]「結果還是要據為己有啊……」"
10023080-143 = "那麼，您是否得到想要的回答了呢？"
10023080-144 = "聽完我的回答之後，要不要聽聽小姐們的想法呢？"
10023080-148 = "……我接受老師的提案。"
10023080-149 = "哦？"
10023080-150 = "身為C&C的一員，既然收到了回收贓物的任務，我就必須讓作戰成功。#n雖然並非本意，但我認為接受臨時同盟才是適當的判斷。"
10023080-151 = "各位……"
10023080-153 = "嗯，當然。"
10023080-154 = "因，因為我們……"
10023080-156 = "因，因為我們……"
10023080-158 = "是[ruby=隊伍]夥伴[/ruby]啊！"
10023080-163 = "大家……"
10023080-164 = "……呵呵。這就是小姐們的美學是嗎？"
10023080-165 = "──好吧。"
10023080-166 = "那麼……來制定具體的作戰吧。"

[translation]
10023080-1 = "ตอนที่ 8;จำเอาไว้นะคะ แค่ชั่วคราวเท่านั้นค่ะ"
10023080-5 = "จะเป็นอะไรไหมคะคุณครู?"
10023080-6 = "[s] \"ครูไม่หวั่นอยู่แล้ว โทคิล่ะ?\""
10023080-7 = "ฉันก็... ไม่ติดอะไรหรอกค่ะ"
10023080-8 = "[s] \"แต่ครูว่าโทคิดูสับสนอยู่นะ?\""
10023080-12 = "... ต่อให้ฉันพยายามปกปิดยังไงก็หลอกสายตาคุณครูไม่ได้สินะคะ"
10023080-13 = "ถ้าให้บอกตามตรง ฉันไม่รู้ว่าต้องทำยังไงค่ะ"
10023080-14 = "โธ่เอ๊ย! พวกเราก็เหมือนกัน!"
10023080-15 = "มาแล้วสินะคะ โมโมอิจอมโวยวาย"
10023080-16 = "โวยวงโวยวายอะไรกัน?!"
10023080-17 = "ส่วนที่เหลือก็ มิโดริ ผู้นำตัวจริง ยูสึ ผู้สงบเงียบ และอาริสึ ผู้น่ารักค่ะ"
10023080-18 = "ทำไมของฉันดูไม่ดีอยู่คนเดียวล่ะ?! "
10023080-19 = "จะแกล้งกันใช่ไหม? คุณครูเองก็... ช่วยพูดอะไรหน่อยสิ!"
10023080-23 = "[ns] \"... อย่าแกล้งกันสินักเรียน...\""
10023080-25 = "แต่ว่าพี่เค้าก็พูดถูกนะคะคุณครู..."
10023080-26 = "พวกฉัน... ควรทำยังไงดีคะ...?"
10023080-28 = "เรื่องนั้นมันถูกกำหนดไว้แล้วค่ะ! เราต้องปราบศัตรูชั่วร้าย แล้วเดินบนเส้นทางแห่งผู้กล้าไปด้วยกันค่ะ!"
10023080-29 = "แต่ว่า... อาริสึจัง... ในกรณีนี้ใครคือศัตรูชั่วร้ายเหรอ...?"
10023080-30 = "คะ? ก็..."
10023080-31 = "...ก็"
10023080-32 = "แง๊ อยู่ๆ ก็มึนหัวขึ้นมาเลยค่ะ ขอความช่วยเหลือหน่อยค่ะ ยูสึ ขอความช่วยเหลือค่ะ!"
10023080-39 = "ฉันเสนอให้เองค่ะ ชมรมพัฒนาเกมกับคุณครูวางมือจากเรื่องนี้เถอะค่ะ "
10023080-46 = "[ns] \"ว่าไงนะ? ทำไมล่ะโทคิ?\""
10023080-47 = "โทคิ... คิดจะทำอะไรเหรอคะ?"
10023080-48 = "ตอนคุณครูเสนอเรื่องพันธมิตรขึ้นมา ฉันตกใจไม่น้อยเลยค่ะ"
10023080-49 = "... แต่งานนี้ฉันจะเป็นคนรับผิดชอบให้ถึงที่สุดเองค่ะ"
10023080-50 = "[s] \"โทคิ จะลุยคนเดียวเหรอ?\""
10023080-51 = "ใช่ค่ะ งานนี้มันเกี่ยวข้องกับภารกิจของฉันค่ะ ถ้าปล่อยให้เรื่องนี้เกิดขึ้น มันจะมีผลต่อเกียรติภูมิของ C&C ค่ะ"
10023080-53 = "แล้วคุณโทคิ... คิดจะคลี่คลายเรื่องนี้ยังไงเหรอคะ...?"
10023080-55 = "ฉันจะดูสถานการณ์ก่อนแล้วค่อยว่ากันค่ะ ฉันอาจจะช่วยจอมโจรแห่งความเสน่หาให้การประมูลลับล่มไป"
10023080-56 = "แล้วก็ยึด <มงกุฎเจ้าแห่งนาฬิกา> ที่จอมโจรแห่งความเสน่หาต้องการ แล้วส่งไปที่วัลคิรี่ค่ะ"
10023080-57 = "แต่ทุกคนไม่จำเป็นต้องมารับผิดชอบร่วมกันหรอกค่ะ คุณครูก็ด้วยค่ะ"
10023080-58 = "เพราะงั้น คุณครูกับทุกๆ คนกลับกันไปเถอะค่ะ"
10023080-59 = "ที่ฉันอยากพูดมีแค่เท่านี้ค่ะ"
10023080-65 = "ไม่ค่ะ อาริสึไม่ยอมถอนตัวจากตรงนี้หรอกค่ะ"
10023080-66 = "คะ? แต่ว่า..."
10023080-67 = "โทคิเป็นสหายของพวกเรานี่คะ"
10023080-68 = "ชมรมพัฒนาเกมไม่ปล่อยให้สหายต้องลุยเดี่ยวหรอกค่ะ"
10023080-70 = "ชะ... ใช่... ถึงสถานการณ์มันจะกลายเป็นแบบนี้ไปแล้วก็เถอะ..."
10023080-71 = "และเรื่องนี้ก็เกิดเพราะการตัดสินใจคนเดียวของพี่โมโมอิด้วย..."
10023080-72 = "นี่น้อง... ไม่เห็นต้องพูดถึงขนาดนี้เลย..."
10023080-73 = "เอาเถอะ!"
10023080-74 = "เราไม่ปล่อยให้โทคิต้องจัดการเรื่องแบบนี้คนเดียวหรอก!"
10023080-75 = "เพราะอย่างน้อยตอนนี้... พวกเราก็เป็น C&C เหมือนกัน! ไหนๆ เราก็ยืมชื่อ C&C มาใช้แล้ว!"
10023080-77 = "จะใช้เหตุผลง่ายๆ แบบนี้น่ะเหรอคะ?"
10023080-78 = "อาริสึเรียนรู้มาว่ายิ่งเหตุผลเรียบง่ายเท่าไหน ก็ยิ่งสำคัญเท่านั้นค่ะ!"
10023080-79 = "หรือว่า... โทคิไม่ใช่สหายของอาริสึเหรอคะ?"
10023080-80 = "มะ... ไม่ใช่อย่างนั้น... แต่เรื่องแบบนี้น่ะ ฉันไม่ชิน... ไม่สิ ต้องบอกว่าเป็นครั้งแรกเลย..."
10023080-81 = "ถ้างั้นก็ไร้ปัญหาค่ะ! ถึงใครจะว่ายังไง อาริสึก็อยากช่วยโทคิค่ะ!"
10023080-83 = "อืม... ถ้าอาริสึว่าอย่างนั้นก็..."
10023080-84 = "ยอมเพราะอาริสึจังล่ะสิ... ใช่ไหม...?"
10023080-86 = "ฮุฮุ งั้นก็เหมือนจะตัดสินใจกันได้แล้วสินะคะ?"
10023080-95 = "เมทาโร่ไม่ใช่คนที่ต่อกรด้วยได้ง่ายๆ หรอกนะคะ เขาควบคุมสถานการณ์ไว้และเปิดการประมูลลับขึ้น#nอีกครั้งแล้วค่ะ"
10023080-96 = "และดูเหมือนว่ากองกำลังรักษาความปลอดภัยก็ออกไล่ล่าพวกเราอยู่ด้วยค่ะ"
10023080-97 = "หากฉันเดาถูก <มงกุฎเจ้าแห่งนาฬิกา> จะถูกนำมาโชว์ในการประมูลในเวลาประมาณเที่ยงคืนค่ะ"
10023080-98 = "พอพวกนั้นตรวจสอบแล้วว่าฉันและพวกคุณไม่ได้อยู่ที่นั่น เขาก็คงจะเดินเกมเร็วตอนนั้นค่ะ"
10023080-99 = "[s] \"เล่าได้ตรงไปตรงมาเลยนะ\""
10023080-100 = "อ้าว ก็คุณครูเป็นคนขอให้มาเป็นพันธมิตรไม่ใช่เหรอคะ?"
10023080-101 = "[s] \"ถ้างั้นครูมีสองเรื่องที่อยากถาม พอจะถามได้ไหม?\""
10023080-102 = "ค่ะ ถามเลยค่ะ"
10023080-103 = "แต่ถ้าข้อไหนฉันไม่อยากตอบ ฉันจะไม่ตอบนะคะ"
10023080-107 = "[ns] \"ก่อนอื่นคือประโยคสุดท้ายในจดหมายเตือน\""
10023080-108 = "'ฉันจะไปที่นั่นเพื่อดาบที่หรูหราแต่อาบโชคร้าย ดาบที่ไม่เคยถูกส่งมอบมาก่อน'"
10023080-109 = "พวกฉันคิดว่ามันคือภาพวาดที่มีดาบน่ะ"
10023080-110 = "ง่ายๆ ค่ะ ดาบคือสัญลักษณ์ของอำนาจใช่ไหมคะ? มงกุฎก็เช่นเดียวกันค่ะ"
10023080-111 = "ธีมของจดหมายเตือนครั้งนี้คือ 'นาฬิกา' มันก็เลยอาจเป็นคำใบ้ได้ค่ะ"
10023080-112 = "แต่พวกฉันไม่รู้ว่ามีงานศิลปะที่เรียกว่า <มงกุฎเจ้าแห่งนาฬิกา> นี้ด้วย..."
10023080-113 = "ค่ะ มันคงเป็นจดหมายเตือนที่พวกคุณไขรหัสกันได้ไม่หมด"
10023080-114 = "ถ้าเมทาโร่บอกทุกอย่างกับพวกคุณอย่างโปร่งใส เหตุการณ์ก็คงไม่เหมือนตอนนี้หรอกค่ะ"
10023080-115 = "[s] \"เขาตั้งใจหลอกใช้พวกเราตั้งแต่แรกเหรอ...\""
10023080-116 = "ฮุฮุ ใช่ค่ะ "
10023080-117 = "เมทาโร่ต้องตระหนักให้ได้ค่ะ ว่าทุกสิ่งในโลกเป็นไปตามที่ใจต้องการไม่ได้ และโลกก็ไม่ได้เป็นไปตามที่#nใจต้องการได้เสมอไปด้วยค่ะ"
10023080-118 = "ได้คำตอบไหมคะ?"
10023080-119 = "[s] \"อีกคำถามคือ... ทำไมเธอถึงมาทำเรื่องแบบนี้ล่ะ?\""
10023080-120 = "กะไว้แล้วเชียวว่าต้องเป็นคำถามแบบนี้"
10023080-121 = "ไม่มีอะไรซับซ้อนค่ะ ฉันทำเพื่อทุกคนไงคะ"
10023080-123 = "ขโมยของ... เพื่อทุกคนงั้นเหรอคะ?"
10023080-125 = "ค่ะ ฉันคิดว่ายิ่งเป็นของที่มีคุณค่ามากเท่าไร ก็ยิ่งเป็นทรัพย์สินสาธารณะได้มากเท่านั้นค่ะ"
10023080-126 = "งานศิลปะไม่ใช่สิ่งที่ต้องถูกเก็บซ่อน แต่เป็นสิ่งที่ทุกคนต้องชื่นชมได้ด้วยกันค่ะ"
10023080-131 = "ลองคิดตามสิคะ ถ้าหากเราปล่อยเมทาโร่ไว้แบบนี้ <มงกุฎเจ้าแห่งนาฬิกา> ก็คงได้กลับไปอยู่ใน#nตลาดมืดอีก ถ้างั้นจะเป็นยังไงต่อคะ?"
10023080-132 = "งานศิลปะที่มีคุณค่ากลับไปอยู่ในโลกสีเทาอีกครั้ง แค่นี้ก็ได้กลิ่นความวุ่นวายใหญ่โตแล้วใช่ไหมคะ?"
10023080-133 = "และมันก็อาจก่อให้เกิด... ความสับสนอลหม่านอย่างใหญ่หลวงได้ค่ะ เพราะงั้นฉันเลยต้องไปแย่งมา#nก่อนที่จะเกิดเรื่องแบบนั้นค่ะ"
10023080-134 = "[s] \"งั้นจะไปแย่งมา แล้วส่งให้ทางวัลคิรี่เหรอ?\""
10023080-135 = "โอ๊ะ จะเชื่อวัลคิรี่ได้ยังไงล่ะคะ? พวกคนที่ปล่อย 'อาชญากร' ของตัวเองให้หลุดลอยไปได้น่ะเหรอคะ?"
10023080-136 = "ฉันจะเก็บมันไว้เองค่ะ จนกระทั่งโลกจะเปิดตาให้กับสุนทรียศาสตร์ที่แท้จริงและค้นพบคุณค่าของงาน#nศิลปะค่ะ"
10023080-137 = "[s] \"จะเอาไว้กับตัวเองสินะ...\""
10023080-143 = "เอาละ คิดว่ายังไงคะ? "
10023080-144 = "พอได้ฟังเรื่องราวพวกนี้แล้ว... ยังคิดจะจับมือเป็นพันธมิตรกับจอมโจรอยู่เหมือนเดิมไหมคะ?"
10023080-148 = "ฉันจะยอมรับข้อเสนอในการเป็นพันธมิตรของคุณครูค่ะ"
10023080-149 = "ตายจริง?"
10023080-150 = "แต่ตราบใดที่ฉันได้ภารกิจทวงงานศิลปะคืนมา ฉันก็จะเป็นคนดำเนินการตามแผนค่ะ ถึงจะเป็นการจับมือกันชั่วคราว แต่หากเรามีเป้าหมายเดียวกัน ก็ไม่มีเหตุผลที่จะร่วมมือกันไม่ได้ค่ะ"
10023080-151 = "แล้วก็..."
10023080-153 = "พวกเราก็จะช่วยโทคิด้วย!"
10023080-154 = "ค่ะ ใช่แล้วค่ะ"
10023080-156 = "พะ... เพราะเรา..."
10023080-158 = "เป็นสหายกันนี่คะ!"
10023080-163 = "ทุกคน..."
10023080-164 = "... ฮุฮุ สุนทรียศาสตร์ของพวกคุณเป็นแบบนี้สินะคะ"
10023080-165 = "งั้นก็ดีค่ะ"
10023080-166 = "ถ้างั้น... จากนี้เรามาวางแผนกลยุทธ์อย่างเป็นรูปธรรมกันดีไหมคะ?"

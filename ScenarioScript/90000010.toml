[translation]
90000010-1 = "#title;제2화;정보수집 1 – 아비도스 사막"
90000010-2 = "3;히마리;01;지금 우리에게 가장 필요한 것은 데카그라마톤의 데이터를 수집하는 것입니다.\n#3;em;[반응]\n#3;a"
90000010-3 = "3;히마리;08;우리의 첫 번째 목표는 현재 알려져 있는 데카그라마톤의 출현지점 중 하나인, 아비도스의 사막입니다."
90000010-4 = "3;히마리;07;여기서 <비나>를 찾아내긴 힘들겠지만, 이 주변은 데카그라마톤의 부하들이 배회하고 있기에,"
90000010-5 = "3;히마리;01;일단 그것들을 처치하며 데이터를 수집하도록 하겠습니다.\n#3;em;…"

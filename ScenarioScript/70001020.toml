[translation]
70001020-1 = "สู้ต่อไป เรดวินเทอร์! 2"
70001020-3 = "นี่พวกเธอน่ะ..."
70001020-4 = "เป็นผู้สำรวจห้องอาบน้ำที่เป็นตัวแทนพิเศษจากสหภาพเรดวินเทอร์งั้นเหรอ...?"
70001020-9 = "ค่ะ อามามิ โนโดกะจากสถาบันเรดวินเทอร์ค่ะ เราได้รับคำสั่งพิเศษจากท่านประธานเชริโน่ให้มาสำรวจ#nสุขภัณฑ์ห้องอาบน้ำของสถาบันเกเฮนน่าค่ะ"
70001020-10 = "ได้มาลองใช้ห้องอาบน้ำของทางสถาบันเกเฮนน่าที่มีชื่อเสียงเรื่องออนเซ็นกับห้องอาบน้ำแบบนี้ รู้สึกตื่นเต้นมากเลยค่ะ"
70001020-11 = "วันนี้ก็ขอรบกวนด้วยนะคะ"
70001020-13 = "เฮ้อ... หลังจากที่ประธานมาโคโตะกลับมาจากสถาบันเรดวินเทอร์ ฉันเองก็คิดไว้แล้วแหละว่าจะมี#nเรื่องยุ่งยากอะไรตามมาอีกแน่ๆ... "
70001020-14 = "หาแต่เรื่องวุ่นวายมาให้ ทั้งๆ ที่ไม่ได้ขอเลยจริงๆ..."
70001020-16 = "เอ่อคือว่า... มีปัญหาอะไรหรือเปล่าคะ?"
70001020-18 = "เปล่าหรอก พวกห้องอาบน้ำน่ะ เข้าไปดูได้ตามสบายเลยนะ"
70001020-19 = "หอพักของเกเฮนน่าน่ะ โดยปกติแล้วก็ไม่ได้ดูแลอะไรเป็นพิเศษหรอก"
70001020-21 = "แต่ถึงจะพูดอย่างนั้นก็เถอะค่ะ ดูเหมือนว่าพวกสุขภัณฑ์ก็ได้รับการบำรุงรักษาอย่างดีเลยนะคะ"
70001020-26 = "นั่นสิน้า พวกอุปกรณ์อาบน้ำแล้วก็ผ้าขนหนูของที่นี่ก็ดูใช้แต่ของระดับพรีเมียมหรูๆ ทั้งนั้นด้วย"
70001020-28 = "อ้อ เรื่องนั่นน่ะ..."
70001020-29 = "พวกชมรมพัฒนาออนเซ็นจัดหามาให้เองตามอำเภอใจน่ะ"
70001020-31 = "คะ...? ตามอำเภอใจเหรอคะ...?"
70001020-33 = "อื้อ เดิมทีที่นี่มีแต่บ่อน้ำร้อนขนาดใหญ่ที่อยู่ตรงกลางนั่น แล้วก็มีให้แค่พวกอุปกรณ์อาบน้ำกับสบู่กลิ่น#nแตงกวาราคาถูกๆ..."
70001020-34 = "แต่พวกชมรมพัฒนาออนเซ็นบอกว่าจะยอมทนเห็นสุขภัณฑ์ที่ใช้ในห้องอาบน้ำถูกละเลยแบบนี้ไม่ได้#nเด็ดขาด ก็เลยเข้ามาดูแลจัดการให้เป็นประจำน่ะ"
70001020-41 = "(คิดแล้วว่าต้องได้รับความช่วยเหลือจากทางชมรมพัฒนาออนเซ็น... เรื่องนี้ถือเป็นจุดบอดสินะคะ)"
70001020-52 = "น้ำที่ใช้ก็ดูเหมือนจะมีกลิ่นหอมๆ ด้วย... อันนี้เป็นเพราะทางชมรมพัฒนาออนเซ็นใส่พวกบาธบอมบ์เอา#nไว้งั้นเหรอ?"
70001020-54 = "เปล่าหรอก นั่นเป็นกลิ่นจากธรรมชาติที่มีอยู่ตั้งแต่ดั้งเดิมแล้วละ"
70001020-55 = "น้ำบาดาลจากภูเขาไฟฮินนอมมีแร่กำมะถันตามธรรมชาติอยู่สูง เพราะงั้นแค่เอามาต้มก็เพลิดเพลินกับ#nการแช่ออนเซ็นได้ทั่วทั้งเกเฮนน่าแล้วละ"
70001020-56 = "นับเป็นหนึ่งในข้อดีไม่กี่อย่างในเกเฮนน่าเลยก็ว่าได้"
70001020-66 = "(พื้นฐานของคุณภาพน้ำบาดาลที่แตกต่างกันก็เป็นปัจจัยที่ต้องพิจารณาเหมือนกัน...)"
70001020-70 = "...ถ้างั้นขอเข้าไปดูคุณภาพน้ำในบ่ออาบน้ำสักหน่อยได้หรือเปล่าคะ?"
70001020-72 = "ได้อยู่แล้ว เข้าไปดูได้ตามสบายเลยนะ"
70001020-74 = "ไหนดูซิ..."
70001020-81 = "อ๊ะ... ร้อนๆๆ!"
70001020-82 = "ทะ...ทำไมบ่อน้ำร้อนที่นี่มันร้อนขนาดนี้คะเนี่ย?!"
70001020-84 = "หือ? ร้อนมากขนาดนั้นเลยเหรอ? ก็แค่ 70 องศาเองนะ..."
70001020-86 = "ถ้าร้อนถึง 70 องศาละก็ต้มน้ำเคี่ยวซุปกระดูกสำหรับชาบูได้เลยนะคะ!"
70001020-87 = "อาบน้ำร้อนขนาดนี้ เดี๋ยวก็ได้เป็นแผลน้ำร้อนลวกหรอกค่ะ!"
70001020-89 = "แปลกแฮะ นักเรียนเกเฮนน่าคนอื่นๆ ในหอพักบอกว่าน้ำร้อนอุณหภูมิประมาณนี้กำลังดี เลยปรับให้ร้อน#nประมาณนี้แล้วแท้ๆ..."
70001020-91 = "สำหรับนักเรียนของทางเกเฮนน่า ฉันไม่ค่อยแน่ใจเท่าไร แต่ถ้าสำหรับนักเรียนของเรดวินเทอร์ละก็ คงจะลงไปแช่ไม่ได้หรอกค่ะ"
70001020-92 = "มีบ่อน้ำร้อนที่อุณหภูมิต่ำกว่านี้บ้างไหมคะ?"
70001020-98 = "มีบ่อน้ำเย็นอยู่ด้านนี้น่ะ"
70001020-100 = "ไหนดูซิ..."
70001020-107 = "กรี๊ดดด เย็นมากแม่!!"
70001020-108 = "ทำไมบ่อน้ำเย็นถึงได้เย็นเป็นน้ำแข็งแบบนี้ล่ะคะ!"
70001020-110 = "ว้าว น้ำเย็นแบบนี้ ทำเอานึกถึงตอนต้องไปกระเทาะแผ่นน้ำแข็งที่แม่น้ำ แล้วลงไปอาบน้ำเลยแฮะ..."
70001020-112 = "ทำไมล่ะ เขาว่ากันว่าถ้าอาบน้ำที่มีอุณหภูมิแตกต่างกันมากๆ ละก็ จะช่วยเรื่องผิวพรรณดีด้วยนะ?"
70001020-113 = "มีนักเรียนในเกเฮนน่าหลายๆ คนชอบใช้วิธีดูแลผิวพรรณสุดโต่งแบบนี้อยู่ เราก็เลยตั้งใจปรับให้น้ำมี#nอุณหภูมิต่างกันสุดขั้วแบบนี้..."
70001020-114 = "ว่าแล้วเชียว อุณหภูมิแบบนี้พวกเรดวินเทอร์คงรับไม่ไหวสินะ..."
70001020-116 = "ไม่ใช่แค่เรดวินเทอร์หรอกค่ะ คนส่วนใหญ่ก็คงไม่ไหวเหมือนกันแน่ๆ ค่ะ!"
70001020-117 = "ยิ่งกว่านั้น ถ้าไม่ขอให้ทางชมรมพัฒนาออนเซ็นช่วย การสร้างสภาพแวดล้อมแบบนี้ขึ้นในเรดวินเทอร์#nคงเป็นไปได้ยาก..."
70001020-118 = "พวกเราลองไปดูห้องอาบน้ำของโรงเรียนอื่นๆ กันต่อเถอะค่ะ!"
70001020-120 = "<ไม่ผ่าน>"
70001020-124 = "คณะตัวแทนพิเศษจากสหภาพเรดวินเทอร์ทุกท่าน ยินดีต้อนรับสู่โรงเรียนสามัญทรีนิตี้ค่ะ "
70001020-125 = "ก่อนที่ทุกคนจะมาถึง ฉันพอทราบเรื่องมาจากนักเรียนคนอื่นๆ บ้างแล้วค่ะ"
70001020-126 = "...ได้ยินว่าพวกคุณมีประสบการณ์ที่ไม่น่าประทับใจอย่างยิ่งตอนไปเยี่ยมชมหอพักของทางสถาบัน#nเกเฮนน่าสินะคะ"
70001020-127 = "มะ...ไม่ขนาดนั้นหรอกค่ะ... ถึงจะน่าตกใจอยู่นิดหน่อย แต่ก็ไม่ถึงขนาดไม่ประทับใจ..."
70001020-128 = "ไม่หรอกค่ะ พวกเขายังดูแลนักเรียนของตัวเองได้ไม่ดีพอเลย เพราะงั้นฉันไม่คิดว่าพวกเขาจะต้อนรับ#nแขกได้อย่างเหมาะสมในหอพักโทรมๆ โกโรโกโสแบบนั้นได้หรอกค่ะ"
70001020-129 = "ก่อนอื่น มาพักดื่มชากับขนมทางนี้ก่อนเถอะค่ะ เราจะแจ้งให้ทราบทันทีที่ห้องอาบน้ำใหญ่ทำความ#nสะอาดเสร็จเรียบร้อยค่ะ"
70001020-134 = "วะ...ว้าว...  ชาแดงกับของว่างชั้นสูง"
70001020-135 = "ขนมพวกนี้... ทัศนศึกษาเสร็จแล้ว หาซื้อกลับไปสักหน่อยได้ไหมนะ...?"
70001020-140 = "ฉันไม่ค่อยรู้เรื่องชาสักเท่าไร แต่ดูเหมือนชานี่จะเป็นชาดำคุณภาพสูงที่ราคาแพงกระเป๋าฉีกแน่ๆ"
70001020-141 = "รู้งี้ ฉันเอาแยมส้มที่ทำเองมาด้วยก็คงดี"
70001020-142 = "ต้อนรับกันอย่างหรูหราแบบนี้ตั้งแต่แรกเลยเหรอเนี่ย น่าประทับใจจริงๆ..."
70001020-151 = "ขอโทษที่ทำให้รอนานนะคะ ห้องอาบน้ำเตรียมพร้อมแล้วค่ะ เดี๋ยวพวกเราจะนำทางไปให้นะคะ"
70001020-154 = "อื้มมม กลิ่นหอมจัง..."
70001020-155 = "เหมือนได้กลิ่นชาแดงจางๆ จากอ่างอาบน้ำเลยนะคะ"
70001020-160 = "จมูกดีมากเลยนะคะ"
70001020-161 = "ในหอพักรวมของโรงเรียนทรีนิตี้ นอกจากเครื่องดื่มแล้ว พวกเรายังใส่ใบชาลงในน้ำสำหรับอาบด้วยค่ะ"
70001020-162 = "เพราะทำแบบนี้ นอกจากจะช่วยให้เราเพลิดเพลินกับการอาบน้ำแล้ว ก็ยังดีต่อสุขภาพด้วยค่ะ สารสกัด#nธรรมชาติที่อยู่ในใบชาจะสามารถซึมเข้าสู่ร่างกายผ่านทางผิวหนังได้ค่ะ"
70001020-163 = "อุณหภูมิของน้ำ... ไหนดูซิ..."
70001020-170 = "อืม... อุณหภูมิพอเหมาะสำหรับอาบน้ำมากเลยค่ะ!"
70001020-171 = "เช่นเดียวกับอุณหภูมิน้ำที่ใช้ในการชงชา น้ำที่ใช้อาบเองก็มีอุณหภูมิที่เหมาะสมอยู่เช่นกันค่ะ"
70001020-172 = "สุขภัณฑ์ห้องอาบน้ำที่ประณีตงดงามของทรีนิตี้น่ะ แตกต่างจากของพวกคนหัวทึบที่แค่เอาน้ำไปต้ม#nเฉยๆ นะคะ"
70001020-173 = "ถ้าอย่างนั้น..."
70001020-174 = "เป็นยังไงบ้างคะ สนใจที่จะให้ทางสหภาพเรดวินเทอร์มีห้องอาบน้ำเหมือนกับของทางโรงเรียนทรีนิตี้#nเราบ้างไหมคะ...?"
70001020-175 = "ฉันคิดว่านักเรียนของทางเรดวินเทอร์ก็น่าจะชอบอยู่เหมือนกัน..."
70001020-176 = "ว่าไงคะ? ชิกุเระจังคิดว่ายังไงบ้าง?"
70001020-182 = "อืม... ถ้าทำเสียมู้ดก็ขอโทษล่วงหน้าไว้ก่อนแล้วกันนะ แต่ว่า..."
70001020-183 = "ค่าดูแลบำรุงรักษาห้องอาบน้ำของที่นี่น่ะ ประมาณเท่าไรเหรอ?"
70001020-185 = "หมายถึงค่าบำรุงรักษาสุขภัณฑ์งั้นเหรอคะ ค่าใช้จ่ายพวกนั้นไม่แพงเท่าไรหรอกค่ะ แต่ว่า..."
70001020-186 = "ถ้ารวมค่าใช้จ่ายในการทำความสะอาดพื้นที่ทำมาจากเซรามิกโบนไชน่าชั้นดี กับค่าใบชาคุณภาพสูง#nที่ใช้ใส่ในน้ำ..."
70001020-190 = "ก็ประมาณหนึ่งล้านเยนต่อเดือนได้ละมั้งคะ?"
70001020-192 = "คะ?! แพงขนาดนั้นเลยเหรอคะ?"
70001020-194 = "แพงงั้นเหรอคะ? ใบชาที่ใช้นี่ก็เป็นใบชาราคาถูกที่กระปุกละแค่ 10,000 เยนเองนะคะ"
70001020-195 = "ถ้าเทียบกับราคาใบชาที่นำมาดื่มทั่วๆ ไปก็นับว่าเป็นใบชาที่ราคาถูกมากๆ เลยค่ะ..."
70001020-197 = "ใบชากระปุกละหมื่นกว่า... ยังมีหน้ามาบอกว่าราคาถูกอีกงั้นเหรอ..."
70001020-202 = "สมกับเป็นพวกชนชั้นนายทุนอย่างทรีนิตี้จริงๆ เลยนะคะ!"
70001020-204 = "<ไม่ผ่าน>"
70001020-208 = "ให้ตายสิ... คิดไม่ถึงเลยว่าห้องอาบน้ำของโรงเรียนที่มีประวัติศาสตร์ยาวนานอย่างเกเฮนน่าหรือทรีนิตี้#nจะเละเทะแบบนี้"
70001020-209 = "ถ้าโรงเรียนอื่นๆ ดูแลจัดการห้องอาบน้ำกันแบบนี้ แค่เดือนเดียวคงได้ล้มละลายกันหมดแน่ๆ!"
70001020-210 = "แต่ว่าที่เธอพูดกับพวกทรีนิตี้ก่อนออกมาน่ะ มันไม่เกินไปหน่อยเหรอ?"
70001020-211 = "ต่อให้ไม่ได้เซ็นสัญญากับพวกเขา ถ้าจบการทัศนศึกษาได้อย่างราบรื่น ก็อาจจะได้ขนมราคาแพงๆ เป็นของติดไม้ติดมือมาด้วยก็ได้นา..."
70001020-212 = "ฉะ...ฉันไม่สนใจขนมของพวกชนชั้นนายทุนแบบนั้นอยู่แล้วค่ะ!"
70001020-213 = "ในฐานะตัวแทนพิเศษของสหภาพเรดวินเทอร์ เราต้องแสดงท่าทางที่มั่นใจอยู่เสมอ และไม่รู้สึกอาย#nกับวัฒนธรรมของสหภาพเรดวินเทอร์ของเราค่ะ!"
70001020-214 = "ฉันชักสงสัยแล้วว่าโรงเรียนเรามีอะไรบ้างที่ไม่น่าอายน่ะ..."
70001020-218 = "ว่าแต่ว่า ทางสหพันธ์เฮียกคิยาโคบอกว่าจะให้สมาชิกชมรมหยินหยางออกมารับเรานี่นา ไม่เห็นมีใคร#nเลย..."
70001020-219 = "หรือว่าเราจำสถานที่ผิดกันนะคะ?"
70001020-220 = "ขอโทษนะคะ มีใครอยู่หรือเปล่าคะ...?"
70001020-225 = "...หืม? ใครน่ะ? ดูไม่เหมือนนักเรียนของสหพันธ์เฮียกคิยาโคเลยนะ"
70001020-226 = "ขะ...แขกจากเขตปกครองอื่นหรือเปล่าคะ...?"
70001020-227 = "อ๊ะ ค่อยยังชั่วหน่อย พวกเรากำลังกังวลว่าจะมาผิดที่อยู่พอดีเลยค่ะ"
70001020-228 = "พวกเราเป็นนักเรียนของทางสหภาพเรดวินเทอร์ มาทัศนศึกษาดูพวกอุปกรณ์อำนวยความสะดวกของ#nที่นี่น่ะค่ะ..."
70001020-239 = "ทัศนศึกษา...?"
70001020-240 = "สึคุโยะ หรือว่า... นี่จะเป็นแขกที่เห็นโพสต์ <กิจกรรมสัมผัสประสบการณ์นินจาฟรี> ในช่องของพวกเรา#nกันน่ะ...?"
70001020-241 = "ตะ...แต่ว่า... กิจกรรมของเราตั้งแต่โพสต์ไปก็มีคนเข้ามาอ่านไม่ถึงสิบคน แถมยังไม่มีใครคอมเมนต์#nเลยด้วยนะคะ...?"
70001020-242 = "แต่ว่าทั้งสองคนนี้ก็อาจจะเป็นสองในสิบคนที่เข้ามาอ่านก็ได้นี่นา?"
70001020-243 = "ที่ผ่านมา ข้าน้อยคิดว่าไม่มีโรงเรียนไหนสนใจเรื่องศาสตร์นินจา นอกจากสหพันธ์เฮียกคิยาโค#nแล้วเสียอีก..."
70001020-247 = "... แบบนี้อาจเป็นโอกาสดีที่จะทำให้ช่อง <เคล็ดลับวิถีนินจาสาว มิจิรุจจี้> เป็นที่รู้จักและดังระดับโลก#nก็ได้นะ!"
70001020-252 = "ยินดีต้อนรับ พวกเรากำลังรออยู่พอดีเลย"
70001020-253 = "ยินดีต้อนรับทุกท่านสู่สหพันธ์เฮียกคิยาโคนะ!"
70001020-254 = "ฮิฮิ ขอบคุณที่ต้อนรับกันอย่างอบอุ่นแบบนี้นะคะ"
70001020-255 = "ถ้างั้นจะเริ่มจากลองอะไรดีล่ะ? อยากลองขว้างชูริเคน หรืออยากลองกระโดดข้ามหน่อไม้ล่ะ?"
70001020-256 = "...ขว้างชูริเคน? ...กระโดดข้ามหน่อไม้...?"
70001020-257 = "ฉันเพิ่งเคยได้ยินเรื่องวิธีอาบน้ำแบบนั้นเป็นครั้งแรกเลยค่ะ..."
70001020-258 = "อาบน้ำ...?"
70001020-259 = "ค่ะ พวกคุณยังไม่รู้เหรอคะ? พวกเรามาที่นี่เพื่อทัศนศึกษาเรื่องสุขภัณฑ์การอาบน้ำ..."
70001020-260 = "อ๊ะ ถ้างั้นก็ควรจะบอกกันตั้งแต่แรกสิ!"
70001020-261 = "รอตรงนี้แป๊บหนึ่งนะ เดี๋ยวข้าน้อยจะพาไปชมบ่ออาบน้ำดั้งเดิมที่พวกนินจาเค้าใช้กัน!"
70001020-273 = "นี่มัน...?"
70001020-274 = "ถังอาบน้ำไงล่ะ!"
70001020-275 = "ถ้าเอาน้ำมาใส่ถังที่ไม่ใช้แล้ว และจุดไฟข้างใต้แบบนี้ ก็จะเพลิดเพลินกับการอาบน้ำร้อนโดยใช้น้ำใน#nปริมาณเล็กน้อยได้!"
70001020-276 = "อีกอย่าง ถังอาบน้ำแบบนี้ก็จัดหาและติดตั้งได้ง่าย ก็เพลิดเพลินกับการอาบน้ำกลางแจ้งได้ไงล่ะ"
70001020-277 = "ตะ...แต่ข้อเสียของมันก็คือพอลงไปแล้วตัวอาจติดอยู่ในนั้นได้..."
70001020-278 = "ครั้งก่อน ตอนที่ฉันอาบน้ำก็ตัวติดอยู่ในนั้นออกมาไม่ได้ เกือบเป็นเรื่องใหญ่เลยละค่ะ..."
70001020-279 = "ขอโทษนะคะ...ที่ฉันตัวใหญ่เทอะทะจนเกินไปแบบนี้..."
70001020-280 = "กะ...ก็บอกแล้วไงว่าเป็นเพราะถังที่ใช้ตอนนั้นมันเล็กเกินไปน่ะ..."
70001020-286 = "(อะ...เอ๋...? ไม่ค่อยถูกใจเท่าไรเลยแฮะ...?)"
70001020-288 = "คะ...คือว่าเป็นอะไรรึเปล่า...?"
70001020-289 = "นึกไม่ถึงเลยค่ะว่านักเรียนของโรงเรียนขนาดใหญ่อย่างสหพันธ์เฮียกคิยาโคจะต้องอาบน้ำกันในสภาพ#nแวดล้อมที่ย่ำแย่แบบนี้..."
70001020-293 = "ทุกคนคะ ถึงจะถูกผู้มีอำนาจที่ปกครองสหพันธ์เฮียกคิยาโคกดขี่ข่มเหงยังไง... ก็ห้ามยอมแพ้เด็ดขาด#nนะคะ!"
70001020-297 = "เหล่า \"สหาย\" จากสหภาพเรดวินเทอร์พร้อมที่จะยืดหยัดเคียงข้างกับทุกๆ คนค่ะ!"
70001020-301 = "อะ...อื้อ ขะ...ขอบใจนะ..."
70001020-302 = "นี่คือออนเซ็นมันจูสูตรพิเศษที่ฉันทำเอาไว้สมัยที่ดูแลกิจการออนเซ็นค่ะ!"
70001020-303 = "อาจจะไม่ได้มากมายอะไร แต่เอาไว้กินเพิ่มพลังตอนท้องหิวได้นะคะ!"
70001020-304 = "อ่า... ขอบใจนะ..."
70001020-306 = "ถ้างั้น...พวกเราก็มาร่วมต่อสู้กันต่อไปเพื่ออิสรภาพและการอาบน้ำที่สะดวกสบายกันเถอะค่ะ!"
70001020-308 = "อะ... อ่า...."
70001020-313 = "ฉะ...ฉันว่าเธอคงเข้าใจผิดอะไรแปลกๆ แน่เลย..."
70001020-318 = "อะ... อ๊ายยย... ปะ...เป็นเรื่องแล้วสิ ดันมาสายกว่าเวลาที่นัดไว้ซะแล้ว..."
70001020-319 = "นี่ สมาชิกชมรมวิจัยศาสตร์นินจา... มีใครเห็นนักเรียนที่มาจากสถาบันอื่นบ้างไหมคะ?"
70001020-320 = "วันนี้คณะตัวแทนพิเศษจากสหภาพเรดวินเทอร์จะมาที่เขตของเรา..."
70001020-324 = "อย่าบอกนะว่า..."
70001020-331 = "เอ่อ... ไม่รู้เหมือนกันสินะ..."
70001020-332 = "แย่ละสิ หรือว่าพวกเธอจะกลับไปแล้วนะ... แบบนี้คงโดนคาโฮะบ่นอีกแหงๆ เลย"
70001020-336 = "...ว่าแต่ว่ามันจูพวกนั้นคืออะไรกันคะ?"
70001020-341 = "พอดี... สหายแปลกๆ ที่ผ่านมาให้พวกเรามาน่ะ"
70001020-346 = "สหายงั้นเหรอ...?"

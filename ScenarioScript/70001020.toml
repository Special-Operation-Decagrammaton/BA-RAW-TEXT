[translation]
70001020-1 = "テルマエ・アカエ（２）"
70001020-3 = "君たちが……"
70001020-4 = "レッドウィンター連邦学園から来た浴場調査官とやらか……？"
70001020-9 = "はい。チェリノ会長の特命を受け、ゲヘナ学園の入浴施設を見学しに来ました。#nレッドウィンター連邦学園の[ruby=あまみ]天見[/ruby]ノドカと申します。"
70001020-10 = "温泉で有名なゲヘナの入浴施設を体験できるなんて楽しみです！"
70001020-11 = "今日はよろしくお願いいたします！"
70001020-13 = "はぁ……前にマコト議長がレッドウィンター連邦学園に行ったと聞いて、嫌な予感はしてたけど……"
70001020-14 = "まったく、面倒なことを……"
70001020-16 = "……何か問題でも？"
70001020-18 = "いや、何でもない。風呂なら好きに見てもらって構わないぞ。"
70001020-19 = "ゲヘナの寮はあまり管理に力を入れてないが……"
70001020-21 = "それにしては、キレイに整備されてますね。"
70001020-26 = "タオルや備品も、高級品ばかり。"
70001020-28 = "ああ、そのことか……"
70001020-29 = "温泉開発部が勝手に置いていってな。"
70001020-31 = "勝手に……？"
70001020-33 = "そう。ここは元々、ただの大浴場だったんだ。#nミルクの香りがする安い石鹸ぐらいしか置かれてなかったところを……"
70001020-34 = "これ以上、温泉施設が放置されているのは見てられない！とか言って、#n温泉開発部が色々と手を加えているんだ。"
70001020-41 = "（あの温泉開発部が関わっていたとは……盲点でしたね）"
70001020-52 = "お湯からなんか良い香りがする……入浴剤でも入れたのかな？"
70001020-54 = "いや、それは源泉が持つ自然成分だよ。"
70001020-55 = "ヒノム火山から流れてくる地下水に硫黄成分が含まれていてね。#nゲヘナじゃ、掘ればどこでも温泉を作れるんだ。"
70001020-56 = "ゲヘナ自治区の数少ない長所とも言える。"
70001020-66 = "（レッドウィンターとは水質が違うから……これも考慮しないと……）"
70001020-70 = "……お風呂に入って、お湯の状態を確かめてみても良いですか？"
70001020-72 = "ああ、それくらいご自由に。"
70001020-74 = "どれどれ……"
70001020-81 = "うわっ、熱い！"
70001020-82 = "い、いったい何ですか！この温度は！？"
70001020-84 = "ん……そんなにか？#n70度くらいのはずだが……"
70001020-86 = "70度って、お風呂をお鍋か何かと勘違いしてるんですか！？"
70001020-87 = "こんな熱湯に入ったら[ruby=やけど]火傷[/ruby]しちゃいますよ！"
70001020-89 = "おかしいなぁ。#nゲヘナ生は、これくらいの温度がちょうど良いって言ってるのに……"
70001020-91 = "少なくとも、レッドウィンター連邦学園の生徒はこんな高温には慣れていません……"
70001020-92 = "もう少し水温の低いお風呂は無いんですか？"
70001020-98 = "水風呂はこっちだよ。"
70001020-100 = "どれどれ……"
70001020-107 = "うわっ、冷たっ！！"
70001020-108 = "氷水じゃないですか！"
70001020-110 = "わっ……川の氷を溶かして身体を洗ってた冬の日を思い出すね。"
70001020-112 = "温度差の激しいお風呂を行き来して血行促進させると、「ととのう」と言うだろう？"
70001020-113 = "ゲヘナには強烈な刺激を好む生徒が多いからね。#nだからこの温度設定になってるんだが……"
70001020-114 = "レッドウィンター連邦学園の生徒には、この温度は厳しかったか……"
70001020-116 = "私たちだけじゃなくて、ほとんどの生徒が厳しいと思います！"
70001020-117 = "……そもそも、温泉開発部の協力がなくては、これほどの環境を再現するのは難しそうですし……"
70001020-118 = "シグレちゃん！次の学園を見学しに行こう！"
70001020-120 = "「却下」"
70001020-124 = "トリニティ総合学園へようこそ、レッドウィンター連邦学園の方々。"
70001020-125 = "ご事情は伺っております。"
70001020-126 = "……ゲヘナ学園の寮を訪問して、不快な思いをされたそうで。"
70001020-127 = "す、少し驚いただけで、別に不快とまでは……"
70001020-128 = "いえ。生徒の管理すらままならないあのゲヘナに、お客様のおもてなしがまともに出来るとは到底思えません。心中お察しいたします。"
70001020-129 = "まずは、こちらでお茶をお楽しみください。#n大浴場をご案内する準備が整い次第、お呼びいたしますので。"
70001020-134 = "う、うわぁ……すごく高そうな紅茶とお菓子だね……"
70001020-135 = "これ、持って帰っても大丈夫かな……？"
70001020-140 = "お茶は詳しくないけど……この風味、かなり高価な茶葉が使われてるはずだよ。"
70001020-141 = "事前に分かってたら、手作りのコケモモジャムを持ってきたのに。"
70001020-142 = "こんなおもてなしを受けるなんて……シグレちゃん、今回は期待できるかも！"
70001020-151 = "お待たせしました。準備が整いましたので、ご案内させていただきます。"
70001020-154 = "ん……いい香り……"
70001020-155 = "なんだか、お湯から紅茶の香りがするような！"
70001020-160 = "仰る通りです。"
70001020-161 = "私たちトリニティの寮では、浴槽に茶葉を入れておりますので。"
70001020-162 = "特別なムードで入浴を楽しみながら、茶葉の成分を肌に吸収させることで健康にも良いのです。"
70001020-163 = "えっと……お湯の温度は……"
70001020-170 = "うん！適温ですね！"
70001020-171 = "お茶の淹れ方と一緒ですから。#nお風呂にも最適な温度というものが存在します。"
70001020-172 = "トリニティの洗練された入浴施設は、趣を理解せず乱暴に沸騰させたお湯に浸かるどこかのバ……者とは異なります。"
70001020-173 = "な、なるほど……"
70001020-174 = "いかがでしょうか。レッドウィンター連邦学園にも、私たちトリニティ総合学園と同様の入浴施設を取り入れてみては……？"
70001020-175 = "これなら、みんなも喜びそう……！"
70001020-176 = "シグレちゃんはどう思う？"
70001020-182 = "ん～、水を差すようで申し訳ないけど……"
70001020-183 = "維持費を聞かせてもらえる？"
70001020-185 = "入浴施設の維持費用ですね。それほど高額ではありませんよ。"
70001020-186 = "天然の大理石を用いた床の清掃費用から、浴槽に入れる茶葉の金額などをまとめて算出しますと……"
70001020-190 = "おそらく、月100万円ほどでしょうか？"
70001020-192 = "ええっ！？そんなに高いんですか？"
70001020-194 = "はい？浴槽に入れている茶葉は、1袋1万円程度の安物ですよ？"
70001020-195 = "普段頂いているお茶と比べると、味も風味も落ちますし……"
70001020-197 = "1袋1万円を超える茶葉が……安物……"
70001020-202 = "無理です！やはりトリニティのようなブルジョワとは手を組めません！"
70001020-204 = "「却下」"
70001020-208 = "……トリニティやゲヘナみたいな由緒ある学園の入浴施設が、ここまでひどいなんて知らなかったよ。"
70001020-209 = "あんな運営をしてたら、1ヶ月も経たずに破産しちゃう！"
70001020-210 = "……トリニティを出るとき、少し言い過ぎじゃなかった？"
70001020-211 = "契約しなくても、好意的にしてれば高級なお土産がもらえたかもしれないのに……"
70001020-212 = "たしかに……って、いやいや！#n最初から興味なかったよ！ブルジョワに恵んでもらう気なんて！"
70001020-213 = "レッドウィンター連邦学園を代表してるんだから、細かいことに一喜一憂せず校風に恥じない堂々とした姿勢を見せないと！"
70001020-214 = "そんな校風、あったかな……？"
70001020-218 = "にしても、百鬼夜行連合学院の陰陽部、いつまで経っても来ないね……"
70001020-219 = "待ち合わせ場所、間違えちゃったかな？"
70001020-220 = "あの～誰かいませんか～？"
70001020-225 = "……うん？誰？百鬼夜行連合学院の生徒じゃ、なさそうだけど……"
70001020-226 = "が、外部から来られた、お客様……でしょうか……？"
70001020-227 = "ああ、良かったです。場所を間違えたのかと思いました！"
70001020-228 = "レッドウィンター連邦学園から来た[ruby=あまみ]天見[/ruby]ノドカと申します。#nここの施設を見学したくて……"
70001020-239 = "見学……？"
70001020-240 = "ツクヨ、この人たち……チャンネルにアップした「忍者無料体験イベント」の告知を見てやってきたお客さんなのかもっ……！"
70001020-241 = "で、でも……その投稿、コメントはおろか、閲覧数10回にも満たない、ですよ……？"
70001020-242 = "その10人のうち2人がこの人たちなんだよ、きっと！"
70001020-243 = "百鬼夜行連合学院以外で、忍者に興味を持ってくれる人は存在しないと思ってたけど……"
70001020-247 = "……これは「少女忍法帖ミチルっち」がグローバルなチャンネルに仲間入りする絶好のチャンス！"
70001020-252 = "あなた達のこと、ずっと待ってたよ。"
70001020-253 = "ようこそ！百鬼夜行連合学院へ！"
70001020-254 = "ふふ。温かいお迎え、ありがとうございます！"
70001020-255 = "早速だけど、何からやってみる？#n手裏剣投げ？それともタケノコ跳び？"
70001020-256 = "……手裏剣投げ？……タケノコ跳び？"
70001020-257 = "そんな入浴法、初めて聞きました……"
70001020-258 = "入浴って……？"
70001020-259 = "もしかして聞いてませんか？#n私たちは入浴施設の体験で――"
70001020-260 = "ああ！それなら早く言ってよ！"
70001020-261 = "ちょっと待ってね。忍者たちの伝統的入浴法を見せてあげるから！"
70001020-273 = "これは……？"
70001020-274 = "ドラム缶風呂だよ！"
70001020-275 = "こうしてドラム缶に水を入れて缶の下で火を焚けば、少量の水でもお風呂に入れちゃう！"
70001020-276 = "しかも、ドラム缶風呂は設置も簡単！#n景色の良い場所で、ゆったりお風呂を楽しめるの！"
70001020-277 = "ひ、ひとつだけ、注意点が……#nドラム缶に……身体が挟まってしまう、恐れがあります……"
70001020-278 = "この間……お風呂上がりに、身体が抜けなくて……大変な思いをしました……"
70001020-279 = "か、身体ばっかり、無駄に大きいせいで……う、うぅ……"
70001020-280 = "だから、あれはドラム缶が小さすぎただけだから！#n落ち込まないで、ツクヨ！"
70001020-286 = "（あ、あれ……引いてる……？）"
70001020-288 = "あの……なにか問題でも……？"
70001020-289 = "……まさか百鬼夜行連合学院ほどの学園が、これほど劣悪な環境にあるなんて……"
70001020-293 = "皆さん！横暴な権力者には絶対に屈しないでください！"
70001020-297 = "レッドウィンター連邦学園の[ruby=カムラッド]同志たち[/ruby]は、皆さんの味方ですから！"
70001020-301 = "う、うん……あ、ありがとう……？"
70001020-302 = "はい、よろしければどうぞ！特製温泉まんじゅうです！"
70001020-303 = "少なくて申し訳ありませんが……腹持ちは良いのでお腹が空いたときに食べてくださいね！"
70001020-304 = "う、うん……ありがとう？"
70001020-306 = "共に戦いましょう！快適なお風呂ライフのために！"
70001020-308 = "え……ええと……"
70001020-313 = "な、なにか……大きな誤解を、されているような……"
70001020-318 = "にゃあああ――！遅刻遅刻、大遅刻～！"
70001020-319 = "って、忍術研究部のみなさん。#nこの辺で他の学園の生徒たちを見てませんか～？"
70001020-320 = "レッドウィンター連邦学園から、遣いの方が来るそうでして。"
70001020-324 = "え、ええっ……まさか……"
70001020-331 = "う、ううん。レッドウィンターの2人組なんて私たち知らないよね、ツクヨ。"
70001020-332 = "あら、もう帰っちゃったんですかねぇ……後でカホに怒られちゃうかも。"
70001020-336 = "……ん？何ですか、そのおまんじゅう。"
70001020-341 = "通りすがりの…[ruby=カムラッド]…同志に[/ruby]もらったの。"
70001020-346 = "[ruby=カムラッド]同志…[/ruby]…？"

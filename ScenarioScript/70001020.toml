[translation]
70001020-1 = "檔案浴場（２）"
70001020-3 = "所以你們……"
70001020-4 = "是來自赤冬聯邦學園的浴場調查員還是特使之類的嗎……？"
70001020-9 = "是的。我是奉赤冬聯邦學園潔莉諾會長的特別命令，#n前來參觀格黑娜學園沐浴設施的天見和香。"
70001020-10 = "很高興能親身體驗以溫泉和澡堂聞名的格黑娜沐浴設施。"
70001020-11 = "今天請多多關照。"
70001020-13 = "唉……自從聽說真琴議長去了一趟赤冬聯邦學園之後，我就有股不好的預感……"
70001020-14 = "結果麻煩還真的不請自來了。"
70001020-16 = "難道說……有什麼問題嗎？"
70001020-18 = "不，沒什麼。#n這裡就是沐浴設施，請隨意參觀吧。"
70001020-19 = "格黑娜的宿舍基本上是放任主義，沒有特別費工夫管理。"
70001020-21 = "這樣啊，不過設施還是整頓得相當乾淨呢。"
70001020-26 = "就是說啊。#n這裡的毛巾和沐浴用品也是很貴的高級品。"
70001020-28 = "啊，你們說的那些……"
70001020-29 = "其實都是溫泉開發部擅自做的。"
70001020-31 = "咦……？擅自……？"
70001020-33 = "沒錯，這裡本來只有設置在中央的大浴池，沐浴用品也只有廉價的小黃瓜香皂……"
70001020-34 = "但溫泉開發部卻說不能忍受格黑娜的溫泉設施如此不受重視，所以都會進行維護。"
70001020-41 = "（沒想到竟然是溫泉開發部在幫忙……這是盲點呢）"
70001020-52 = "洗澡水好像有股淡淡的香味……這也是溫泉開發部放的入浴劑之類的東西嗎？"
70001020-54 = "不，那是水源裡本來就有的天然成分。"
70001020-55 = "由於從欣嫩火山流下的地下水中含有硫磺成分，#n所以只要把水引過來，就能在格黑娜各地輕鬆享受溫泉。"
70001020-56 = "這是只有在格黑娜自治區才能享受到的少數優點之一。"
70001020-66 = "（地下水水質的根本不同也是需要考慮的因素……）"
70001020-70 = "……可以直接進溫泉裡看看水的狀態嗎？"
70001020-72 = "當然，請自便。"
70001020-74 = "我看看……"
70001020-81 = "哇，好燙！"
70001020-82 = "這，這個滾燙的溫泉是怎麼回事！？"
70001020-84 = "嗯？有那麼燙嗎？#n不過才70度而已……"
70001020-86 = "70度的洗澡水幾乎是涮涮鍋了好嗎！？"
70001020-87 = "用這種溫度的水洗澡會燙傷的！"
70001020-89 = "真奇怪。格黑娜宿舍的學生都說這種溫度很適合溫暖身體，所以才特意弄熱……"
70001020-91 = "我不是很清楚格黑娜學生的情況，不過這顯然不適合赤冬的學生……"
70001020-92 = "請問有溫度低一點的浴池嗎？"
70001020-98 = "冷水浴池在這裡。"
70001020-100 = "我看看……"
70001020-107 = "哇，好冰！！"
70001020-108 = "冷水浴池為什麼又冷得像冰塊一樣啊！"
70001020-110 = "哇，這讓我想起了冬天在河裡洗冷水澡的時候……"
70001020-112 = "怎麼了嗎？不是都說在溫差大的溫泉裡來回泡能刺激皮膚，有助美容嗎？"
70001020-113 = "格黑娜有很多學生喜歡這種強烈的刺激，所以才特意把溫差調大……"
70001020-114 = "對赤冬的學生來說，這個溫度果然還是太嚴苛了嗎……"
70001020-116 = "不只是赤冬，對大部分的學生來說都很嚴苛吧！"
70001020-117 = "而且如果沒有溫泉開發部的幫助，應該很難在赤冬聯邦學園重現這種環境……"
70001020-118 = "還是去參觀其他學園的沐浴設施吧！"
70001020-120 = "「不採用」"
70001020-124 = "歡迎來到三一綜合學園，赤冬聯邦學園的特使們。"
70001020-125 = "我在來之前已經從其他學生口中聽說了。"
70001020-126 = "……兩位在造訪格黑娜學園的宿舍時，遇到了一些不愉快的經歷。"
70001020-127 = "不，不是的……只是有點驚訝，還不到不愉快的程度……"
70001020-128 = "不。像那種連自己的學生都管不好的寒酸宿舍，我不認為他們能好好款待客人。"
70001020-129 = "請先在這裡享用茶和茶點。#n等大澡堂整理好之後，我會立刻帶兩位過去。"
70001020-134 = "哇……看起來是很貴的紅茶和茶點呢。"
70001020-135 = "這些可以在參觀結束後打包回去嗎……？"
70001020-140 = "雖然我對茶不是很了解，但這似乎是相當昂貴的紅茶，風味非常濃郁。"
70001020-141 = "早知道就把我做的越橘醬一起帶來了。"
70001020-142 = "一開始就受到這麼盛情的款待，給人的印象真不錯……"
70001020-151 = "讓兩位久等了。#n澡堂已經準備就緒，我這就為兩位介紹。"
70001020-154 = "嗯……好香的味道……"
70001020-155 = "浴池裡好像有一股淡淡的紅茶香。"
70001020-160 = "客人您真敏銳。"
70001020-161 = "我們三一的宿舍不僅在飲料，連洗澡水中也加入了茶葉。"
70001020-162 = "這樣不僅能以特別的心情享受沐浴，#n肌膚也能吸收茶葉中的有益成分，對健康很有幫助。"
70001020-163 = "洗澡水的溫度……我看看……"
70001020-170 = "嗯，是適合洗澡的溫度！"
70001020-171 = "就和泡茶一樣，洗澡也存在所謂的最佳溫度。"
70001020-172 = "三一優雅洗鍊的沐浴設施和某些不解風情，只知道往浴池裡倒沸水的愚蠢之人不同。"
70001020-173 = "確實如此呢……"
70001020-174 = "兩位覺得如何？#n赤冬聯邦學園要引進和三一綜合學園相同的沐浴設施嗎……？"
70001020-175 = "我覺得赤冬的大家應該會喜歡這樣的設施才對……"
70001020-176 = "時雨醬覺得如何呢？"
70001020-182 = "唔嗯，先冒昧地問個有點掃興的問題……"
70001020-183 = "維持這個沐浴設施大概需要多少費用呢？"
70001020-185 = "您指的是設施的維護費用嗎？#n這倒不算特別貴……"
70001020-186 = "如果算上頂級陶瓷地板的清潔費用，以及洗澡用的茶葉……"
70001020-190 = "每個月至少要花100萬元左右吧？"
70001020-192 = "什麼！？這麼貴的嗎？"
70001020-194 = "會嗎？放入浴池內的茶，只不過是一桶只要一萬元的便宜貨而已。"
70001020-195 = "和平時喝的茶相比，我覺得便宜得不得了……"
70001020-197 = "居然說一桶一萬元的茶……便宜得不得了……"
70001020-202 = "果然不能和三一的[ruby=資產階級]布爾喬亞[/ruby]們為伍！"
70001020-204 = "「不採用」"
70001020-208 = "真沒想到……三一和格黑娜這種歷史悠久的學園經營的沐浴設施，居然會這麼糟糕。"
70001020-209 = "如果其他學園用這種散漫的方式經營，我看不用一個月就破產了！"
70001020-210 = "不過剛才在三一的時候，是不是說得有點過頭了？"
70001020-211 = "就算沒有簽約，只要好好結束談話，說不定能收到昂貴的茶點當禮物的說……"
70001020-212 = "我，我對那種布爾喬亞的零食一點興趣都沒有！"
70001020-213 = "身為赤冬聯邦學園的特使，可不能因為小事而患得患失。#n必須時刻保持光明磊落的姿態，才不會愧對學園的校風！"
70001020-214 = "赤冬學園存不存在那種校風，我倒是有點懷疑……"
70001020-218 = "話說回來，百鬼夜行聯合學園好像說會派陰陽部來迎接，卻還沒看到半個人……"
70001020-219 = "會不會是搞錯地方了？"
70001020-220 = "那個，有人在嗎……？"
70001020-225 = "……嗯？是誰？#n看起來好像不是百鬼夜行的學生。"
70001020-226 = "是，是校外來的訪客嗎……？"
70001020-227 = "啊，太好了。我們本來還在煩惱是不是搞錯地方了呢。"
70001020-228 = "我們是從赤冬聯邦學園來的，想參觀一下這裡的設施……"
70001020-239 = "參觀……？"
70001020-240 = "月夜，難道……#n他們是看到我們頻道新上傳的「免費忍者體驗活動」貼文而來的客人嗎……？"
70001020-241 = "可，可是……那篇貼文不但沒有留言，甚至連觀看數也沒超過10次耶……？"
70001020-242 = "但他們也可能就是那10人當中的其中2人吧？"
70001020-243 = "我一直以為除了百鬼夜行以外，沒什麼學園會對忍者有興趣……"
70001020-247 = "……這可能是讓「少女忍法帖 小小三千留」成長為世界級頻道的機會啊！"
70001020-252 = "我一直等待著各位的到來。"
70001020-253 = "歡迎大家來到百鬼夜行聯合學園！"
70001020-254 = "呵呵，感謝您的熱情款待。"
70001020-255 = "那麼，想先從什麼開始體驗呢？#n扔手裏劍？還是跳竹筍？"
70001020-256 = "……扔手裏劍？#n……跳竹筍？"
70001020-257 = "我好像是第一次聽說那種洗澡方式……"
70001020-258 = "洗澡……？"
70001020-259 = "是的，您沒聽說嗎？#n我們是來體驗這裡的沐浴設施──"
70001020-260 = "啊，那早說嘛！"
70001020-261 = "稍等一下。#n我來讓你們見識見識深受忍者愛用且歷史悠久的傳統沐浴設施！"
70001020-273 = "這個是……？"
70001020-274 = "是汽油桶浴盆唷！"
70001020-275 = "像這樣在廢棄的汽油桶中裝滿水並在底下生火，就能只用少量的水洗澡！"
70001020-276 = "不僅如此，因為汽油桶浴盆的設置很方便，#n可以在任何景觀優美的戶外悠閒地享受泡澡的樂趣哦！"
70001020-277 = "要，要說缺點的話，就是有身體卡在汽油桶裡出不來的風險……"
70001020-278 = "上次我洗完澡後想出來，身體卻卡在桶子裡，真的很傷腦筋……"
70001020-279 = "都，都怪我這大而無用的身體……對不起……"
70001020-280 = "都，都說了那是因為當時的汽油桶太小的關係……"
70001020-286 = "（咦……？好像沒想像中喜歡……？）"
70001020-288 = "那個，有什麼問題嗎……？"
70001020-289 = "想不到像百鬼夜行這樣的大型學園，居然讓學生們在這麼惡劣的環境下洗澡……"
70001020-293 = "各位！無論受到百鬼夜行掌權者多麼殘酷的迫害，都請不要放棄！"
70001020-297 = "赤冬聯邦學園的同志們，隨時都準備好和百鬼夜行的學生們站在一起！"
70001020-301 = "唔，嗯……謝，謝謝……"
70001020-302 = "這是我們以前經營溫泉浴場時做的特製溫泉饅頭！"
70001020-303 = "雖然數量不多，但是能在餓的時候為各位補充元氣！"
70001020-304 = "哦，哦哦……謝謝……"
70001020-306 = "讓我們繼續為自由和舒適的沐浴抗爭吧！"
70001020-308 = "哦……哦哦……"
70001020-313 = "好，好像有什麼奇怪的誤會……"
70001020-318 = "喵啊啊啊──！#n糟糕……錯過約好的時間了……"
70001020-319 = "那個，忍術研究部的各位。#n有在這附近看到其他學園的學生嗎？"
70001020-320 = "聽說會有從赤冬聯邦學園來的特使……"
70001020-324 = "難道說……"
70001020-331 = "呃，不太清楚耶……"
70001020-332 = "哎呀，已經回去了嗎……晚點肯定會被佳穗嘮叨一頓的。"
70001020-336 = "……話說回來，這些饅頭是？"
70001020-341 = "這是……從路過的奇怪同志手中收到的。"
70001020-346 = "同志……？"

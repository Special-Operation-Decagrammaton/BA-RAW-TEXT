[translation]
70001020-1 = "Thermae Akai 2"
70001020-3 = "So you..."
70001020-4 = "Are you the delegation from Red Winter Academy, here to view our bathhouse...?"
70001020-9 = "Yes. I am Amami Nodoka of Red Winter Federal Academy, under special dispensation from President Cherino to study Gehenna Academy's bathing facilities."
70001020-10 = "I must say, it's exciting to experience Gehenna's famous hot water baths personally."
70001020-11 = "I look forward to working with you."
70001020-13 = "Haaa... I was expecting something to come up after Chair Makoto's last trip to Red Winter Academy, but..."
70001020-14 = "She really has a knack for making annoying work that no one asked for..."
70001020-16 = "...Is there a problem?"
70001020-18 = "No, no. Please spend as much time bathing as you want."
70001020-19 = "Gehenna's dorms are usually pretty hands-off... I don't spend much time managing things personally."
70001020-21 = "Hands off? But the facilities here are so clean and well-maintained."
70001020-26 = "Yeah, and these towels are so soft. And look at all the high-end beauty products!"
70001020-28 = "Oh, that..."
70001020-29 = "The Hot Springs Department did that on their own."
70001020-31 = "On...their own?"
70001020-33 = "Yeah. Originally, there was just one big hot tub in the center of the room, and we only had cheap cucumber-scented soap..."
70001020-34 = "But then the Hot Springs Department decided that Gehenna Academy's hot spring facilities were being neglected, and they've been taking care of maintenance since."
70001020-41 = "(So the Hot Springs Department runs the baths here... That was a blind spot in our intelligence.)"
70001020-52 = "The bath water also smells quite nice... Has the Hot Springs Department added bath salts or something?"
70001020-54 = "No, that's naturally occurring from the hot springs here."
70001020-55 = "The underground water that flows from the Hinnom Volcano contains sulfur, so by drawing the water up to the academy, students can enjoy bathing in a hot spring all over Gehenna."
70001020-56 = "It's one of the unique perks offered by the Gehenna District."
70001020-66 = "(So we also need to keep in mind that groundwater changes from place to place...)"
70001020-70 = "...Would I be able to take a bath and see how the water feels?"
70001020-72 = "Of course, please feel free."
70001020-74 = "Let's see..."
70001020-81 = "Ow! That's hot!"
70001020-82 = "Wh-What in the world?! Why is this water so hot?!"
70001020-84 = "Is the bath too hot? It's only 70°C..."
70001020-86 = "70 degrees?! That's the temperature for making shabu-shabu in a hot pot, not relaxing in a hot tub!"
70001020-87 = "Anyone who bathes in this water will surely scald themselves!"
70001020-89 = "How strange. The students of Gehenna asked us to keep the water at this temperature. They actually complain if we change it..."
70001020-91 = "I can't speak for the students of Gehenna, but our Red Winter Academy students won't want to boil themselves alive."
70001020-92 = "Are there any baths with a lower temperature?"
70001020-98 = "The cold baths are over here."
70001020-100 = "Let's see..."
70001020-107 = "Gah, that's freezing!"
70001020-108 = "Why is the cold bath filled with ice water?!"
70001020-110 = "Wow, this makes me nostalgic for all the times we had to bath in the frozen river out back..."
70001020-112 = "Why not? People say that moving from hot water to cold stimulates the skin and works as a natural beauty routine."
70001020-113 = "This kind of intense stimulation is popular in Gehenna, so all of our baths are kept at these temperatures..."
70001020-114 = "Perhaps it's too harsh for the students of Red Winter."
70001020-116 = "It's not just harsh for people from Red Winter Academy, but for life as we know it!"
70001020-117 = "And without the help of the Hot Springs Department, recreating this set-up in Red Winter Academy would be difficult..."
70001020-118 = "Clearly we need to examine the other academies' bathing facilities too!"
70001020-120 = "DISQUALIFIED"
70001020-124 = "Trinity General School welcomes the special delegation from Red Winter Academy."
70001020-125 = "I was made aware of your arrival from the other students."
70001020-126 = "...I have also been informed that you had an unpleasant experience at Gehenna Academy."
70001020-127 = "N-No, I wouldn't go so far as to call it...unpleasant."
70001020-128 = "Your diplomacy does you credit, but I don't expect an academy unable to keep its own students under control to be capable of properly receiving and attending to its guests."
70001020-129 = "Please enjoy this tea and refresh yourselves here momentarily. We shall escort you through the baths as soon as the attendants are finished cleaning."
70001020-134 = "Wh-Whoa... They brought out a bunch of fancy black tea and snacks."
70001020-135 = "Do you think they'll let us take some home with us after the tour...?"
70001020-140 = "What a deep flavor! I don't know a lot about tea, but these leaves have to be pricey!"
70001020-141 = "If I knew they were going to throw a tea party, I would have brought the lingonberry jam I made."
70001020-142 = "Being pampered from the get-go is a wonderful first impression..."
70001020-151 = "I apologize for the delay. The baths are clean now, so please follow me."
70001020-154 = "Mmm... That smells nice..."
70001020-155 = "I'm picking up a faint hint of black tea from the water."
70001020-160 = "You have an excellent nose."
70001020-161 = "In the Trinity dormitories, we don't just serve delicious tea, we also add tea leaves to our bath water."
70001020-162 = "Not only does it give our baths a certain...je ne sais quoi, but it also releases the nutrients contained in the tea leaves, which has wonderful health benefits when absorbed by the skin."
70001020-163 = "The water temperature is... Let's see..."
70001020-170 = "Oh my, this is the perfect temperature to enjoy a bath!"
70001020-171 = "Maintaining an optimal temperature is essential for both brewing tea and drawing baths, and therefore key to cultivating a healthy body and soul."
70001020-172 = "Trinity's elegant bathing facilities are a step above those run by certain...uncouth academies who burn their bodies and beverages with boiling water."
70001020-173 = "I see..."
70001020-174 = "What do you think? Would you consider installing the same bathing facilities used by Trinity Academy in Red Winter Academy?"
70001020-175 = "I think the Red Winter Academy students would like it too..."
70001020-176 = "What do you think, Shigure?"
70001020-182 = "Hmm, I'm sorry for asking such a blunt question, but..."
70001020-183 = "How much does all of this cost in terms of upkeep?"
70001020-185 = "Oh, the facility is not that expensive, all things considered..."
70001020-186 = "If you add up the cost of maintaining the bone china tiles, with the cost of the tea leaves that go into the bathtub... "
70001020-190 = "We budget at least one million yen a month."
70001020-192 = "What?! It's that expensive?"
70001020-194 = "Expensive? The tea leaves we use for our baths are supremely affordable, they only cost us a mere 10,000 yen per bucket."
70001020-195 = "It is embarrassing to admit, but compared to the black tea that we drink, the tea leaves we use for bathing are very poor quality..."
70001020-197 = "To think that tea leaves that cost more than 10,000 yen a bucket are considered poor quality..."
70001020-202 = "I won't be beguiled by Trinity's bourgeois baths!"
70001020-204 = "DISQUALIFIED"
70001020-208 = "Really... I never expected famous academies like Trinity and Gehenna to have such disappointing bathing facilities."
70001020-209 = "If any other academy tried to maintain facilities like that, they'd go bankrupt within a month!"
70001020-210 = "But weren't you a little harsh when we left Trinity?"
70001020-211 = "Even if we didn't sign a contract with them, they might have let us keep those fancy snacks if we left on good terms..."
70001020-212 = "I-I wasn't interested in snacking like the bourgeoisie anyway!"
70001020-213 = "As envoys of Red Winter Academy, we represent our school! We can't embarrass Red Winter by sweating the small stuff like being perfectly polite all the time!"
70001020-214 = "Honestly, I'm not sure if anything we do could make our academy more or less ashamed of us..."
70001020-218 = "Either way, I think someone from the Yin-Yang Club was supposed to welcome us to Hyakkiyako Academy, but I don't see anyone..."
70001020-219 = "Are we in the wrong place?"
70001020-220 = "Excuse me, is anyone here?"
70001020-225 = "...Hmm? Who are you? I don't think I've seen you around Hyakkiyako Academy before."
70001020-226 = "P-Perhaps they're guests from another academy...?"
70001020-227 = "Oh, thank goodness. I thought we were lost."
70001020-228 = "We're from Red Winter Academy, and we're here to tour your facilities..."
70001020-239 = "A tour...?"
70001020-240 = "Tsukuyo... Could they be guests here for the Free Ninja Experience Event we posted on the channel...?"
70001020-241 = "B-But... That post barely received 10 views, let alone comments..."
70001020-242 = "But what if they're two of those ten people?"
70001020-243 = "I thought the students of Hyakkiyako Academy were the only ones interested in ninjas..."
70001020-247 = "...This could be our chance to turn the \"Michiruchi, A Girl's Ninja Scroll\" channel into a global phenomenon!"
70001020-252 = "Welcome. We have been waiting for you."
70001020-253 = "Welcome to Hyakkiyako Academy!"
70001020-254 = "Heehee, thank you for the warm greetings."
70001020-255 = "What would you like to try out first? Throwing stars? Vaulting over bamboo shoots?"
70001020-256 = "...Throwing stars? ...Vaulting over bamboo shoots?"
70001020-257 = "I've never heard of bathing like that before..."
70001020-258 = "Bathing...?"
70001020-259 = "Don't you know? We're visiting to tour your bathing facilities—"
70001020-260 = "Oh, you should have said so from the beginning!"
70001020-261 = "Hold on, I'll show you our time-honored ninja bathing tradition!"
70001020-273 = "This is...?"
70001020-274 = "Drum barrel baths!"
70001020-275 = "You put water in a drum barrel and light a fire underneath to enjoy a warm bath with very little water!"
70001020-276 = "And drum barrels are easy to set up, so you can place a bath tub anywhere you like, even outdoors if you know a place with a great view!"
70001020-277 = "Th-The only downside is that you can get stuck in the barrel..."
70001020-278 = "Last time I took a long bath, I couldn't even m-move when I tried to get back out..."
70001020-279 = "I was so large I got stuck... Sorry, I'm sure it wouldn't happen to you..."
70001020-280 = "Th-Though the drums we used back then were really too small..."
70001020-286 = "(Wh-What...? Their expressions suddenly turned terrifying.)"
70001020-288 = "Um, is there a problem...?"
70001020-289 = "I can't believe that students of a major institution like Hyakkiyako Academy are washing themselves in such conditions..."
70001020-293 = "Everyone. No matter how harshly Hyakkiyako's violent dictator cracks down on you, you mustn't lose hope!"
70001020-297 = "Your comrades from Red Winter Academy will always be there to assist in your struggle!"
70001020-301 = "Y-Yeah... Th-Thank you..."
70001020-302 = "Here! This is some of the special hot springs manju we made back when we managed a hot springs resort!"
70001020-303 = "It's not a lot, but hide it on your person, and it'll revitalize your energy when they try to starve you!"
70001020-304 = "Y-Yeah... Th-Thanks..."
70001020-306 = "Let's fight side-by-side for baths that are free and comfortable for all!"
70001020-308 = "Yeah... Sure..."
70001020-313 = "I-I think there's been some kind of misunderstanding..."
70001020-318 = "Kyaaahhh! I'm in trouble... I'm running late..."
70001020-319 = "Oh, the Ninjutsu Research Club. Have you come across any students from another academy?"
70001020-320 = "I was told a special delegation from Red Winter Academy was going to be here..."
70001020-324 = "Um, perhaps..."
70001020-331 = "Uh, no, I don't think so..."
70001020-332 = "Oh no, they must have left already... Kaho is going to give me such a scolding..."
70001020-336 = "...Where did this manju come from?"
70001020-341 = "We...got it from some comrades who were passing through."
70001020-346 = "...Comrades?"

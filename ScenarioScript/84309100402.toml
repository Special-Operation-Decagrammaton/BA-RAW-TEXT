[translation]
84309100402-6 = "ลองเล่นเกมแล้วใช่มั้ย? เป็นยังไงบ้าง? เป็นเกมที่เล่นแล้วหัวร้อนตามที่เขาลือกันหรือเปล่า?"
84309100402-7 = "ไม่นะ ก็ไม่ถึงกับขนาดนั้น ก็แค่ อืม จะว่ายังไงดีนะ..."
84309100402-8 = "หืม... เล่นแล้วรู้สึกเฉยๆ เหรอ?"
84309100402-9 = "ไม่หรอก แต่มันแปลกๆ น่ะ เกมมันดูแปลกๆ นิดหน่อย ถึงจะสนุกก็เถอะ..."
84309100402-11 = "(ค่อยยังชั่วนะคะที่เกมสนุก)"

[translation]
1011303-1 = "ทำงานอดิเรก 2"
1011303-2 = "สวัสดีค่ะ คุณครู ฉันกำลังรออยู่เลยค่ะ"
1011303-3 = "[s] \"ครูคิดว่าครั้งนี้ครูก็มาเร็วแล้วเสียอีก!\""
1011303-4 = "ค่ะ จริงอยู่ที่ครั้งนี้คุณครูก็มาเร็วเหมือนเคย แต่ฉันมาถึงก่อนคุณครู 27 นาทีค่ะ"
1011303-5 = "ก็อย่างที่ฉันบอกไปว่าวันนี้ฉันก็เวรออฟ ก็เลยมีเวลาเหลือเฟือน่ะค่ะ"
1011303-6 = "[s1] \"ว่าแต่ เซนะ... เวรออฟทั้งที จะไปชมรมทำไมเหรอ?\"\n[s2] \"ทำไมถึงจะใส่ชุดนี้ไปชมรมในวันหยุดล่ะ?\""
1011303-9 = "อืม"
1011303-10 = "เอาเป็นว่าเราออกเดินทางกันก่อนมั้ยคะ? แล้วฉันจะอธิบายเรื่องนั้นให้ฟังระหว่างทางค่ะ"
1011303-12 = "ที่ฉันจะไปชมรมหน่วยแพทย์ฉุกเฉิน ก็เพื่อจะไปจัดเรียงยาน่ะค่ะ"
1011303-13 = "ชมรมหน่วยแพทย์ฉุกเฉินต้องออกไปข้างนอกบ่อยๆ เราก็เลยมักจะละเลยเรื่องพื้นฐาน เช่น การจัดเอกสารและการเขียนบันทึกการทำงานค่ะ"
1011303-14 = "การจัดเรียงยาก็เป็นหนึ่งในนั้นด้วยค่ะ"
1011303-15 = "[s] \"งั้นก็นับเป็นการทำโอทีในวันหยุดน่ะสิ?\""
1011303-16 = "ฉันก็ยอมรับนะคะว่าในบางแง่ก็มองอย่างนั้นได้..."
1011303-17 = "ถ้าอย่างนั้น การใส่เครื่องแบบหน่วยแพทย์ฉุกเฉินมาจะเหมาะสมกว่าอย่างนั้นเหรอคะ?"
1011303-18 = "จะมองอย่างนั้นก็ได้ค่ะ แต่ถ้าทำแบบนั้นจะเป็นการกดดันสมาชิกหน่วยแพทย์ฉุกเฉินคนอื่นน่ะค่ะ"
1011303-19 = "อย่างที่คุณครูทราบว่าตำแหน่งของฉันคือหัวหน้าชมรมหน่วยแพทย์ฉุกเฉิน"
1011303-20 = "ถ้าฉันใส่เครื่องแบบหน่วยแพทย์ฉุกเฉินมาที่ห้องชมรมในวันหยุดละก็"
1011303-21 = "สมาชิกคนอื่นก็จะรู้สึกกดดันและไม่กล้าพักผ่อนในวันหยุดของตัวเองกันอย่างเต็มที่ค่ะ"
1011303-22 = "แต่ถึงยังไง ต่อให้หยุดหรือออกเวรไปแล้ว ชมรมหน่วยแพทย์ฉุกเฉินก็ต้องเตรียมตัวให้พร้อมอยู่เสมอ#nค่ะ"
1011303-23 = "[s] \"อ่า... เพราะอาจมี 'ศพ' ก็ได้ใช่มั้ย?\""
1011303-24 = "ค่ะ ก็เราไม่รู้นี่คะว่าจะมีผู้ได้รับบาดเจ็บที่ไหนบ้าง"
1011303-25 = "ในคิโวทอสไม่ค่อยมีเหตุการณ์ที่ทำให้เกิดศพจริงๆ เพราะงั้นการได้เห็นศพ... ไม่สิ การได้เห็น 'ผู้ที่ได้รับบาดเจ็บ' "
1011303-26 = "บางครั้งมันก็ไม่ได้หนักหนาอย่างที่คุณครูคิดหรอกค่ะ"
1011303-27 = "ถ้าไตร่ตรองดูแล้ว การใส่ชุดลำลองมาที่ห้องชมรมในวันเวรออฟมันก็อาจดูเป็นปัญหาได้"
1011303-28 = "แต่การตรวจเช็กและจัดเรียงยาคืองานอดิเรกของฉัน และสมาชิกหน่วยแพทย์ฉุกเฉินก็รู้เรื่องนั้นกันดี เพราะงั้นมันก็เหมือนฉันแวะมาทำงานอดิเรกค่ะ"
1011303-29 = "[s] \"สุดท้ายแล้ว... ที่ต่างกันก็แค่ชุดที่ใส่มาสินะ...\""
1011303-30 = "ถ้าจะบอกให้ชัดเจน"
1011303-31 = "คงต้องบอกว่าแตกต่างกันในแง่ของเครื่องแต่งกาย ความตั้งใจ และสายตาที่มองมาจากภายนอกค่ะ"
1011303-32 = "คนที่เป็นผู้ใหญ่อย่างคุณครูก็น่าจะคุ้นเคยกับเรื่องนี้ไม่ใช่เหรอคะ?"
1011303-33 = "[s3] \"ครูก็คุ้นเคยอยู่หรอก แต่เซนะเป็นนักเรียนนี่นา\"\n[s4] \"ก็จริงอยู่หรอก แต่ครูไม่รู้ว่ากับนักเรียนจะเป็นยังไงน่ะ\""
1011303-36 = "......"
1011303-37 = "คุณครูเป็นห่วงฉันสินะ ขอบคุณนะคะ ได้ยินแบบนั้นฉันก็ดีใจค่ะ"
1011303-38 = "มาถึงแล้วค่ะ ห้องชมรมหน่วยแพทย์ฉุกเฉินอยู่ทางนี้ค่ะ"
1011303-40 = "ที่นี่น่าจะมีแต่เก้าอี้ที่นั่งไม่สบาย แต่ยังไงก็ช่วยเข้าใจด้วยนะคะ"
1011303-41 = "ไม่มีปัญหาอะไรเลยงั้นเหรอคะ? ขอบคุณค่ะ คุณครูใจดีเหมือนเดิมเลยนะคะ"
1011303-42 = "ทำไมดูเขินอย่างนั้นล่ะคะ...? หรือฉันพูดอะไรผิดไป?"
1011303-43 = "คิดว่าฉันพูดออกมาอย่างจริงใจมากไปหน่อยงั้นเหรอคะ? ฉันก็แค่พูดตามที่ตัวเองรู้สึก แต่ถ้าคุณครูรู้สึกไม่สบายใจ ฉันต้องขอโทษด้วยค่ะ"
1011303-44 = "อ๊ะ ไม่ใช่อย่างนั้นสินะคะ งั้นก็โล่งอกไปทีค่ะ"
1011303-45 = "ฉันจัดเรียงยาไม่นานหรอกค่ะ คุณครูช่วยรอหน่อยนะคะ"
1011303-46 = "[s] \"ทำไมถึงชอบการจัดเรียงยาจนเป็นงานอดิเรกเหรอ?\""
1011303-47 = "......"
1011303-48 = "เหตุผลที่ใหญ่ที่สุดก็คือ การทำแบบนี้ทำให้ฉันรู้สึกสบายใจค่ะ"
1011303-49 = "ในโลกนี้มีทั้งคนที่ชอบประกอบโมเดลที่ทำจากพลาสติกจนเป็นงานอดิเรก"
1011303-50 = "บางคนก็ทำงานศิลปะจากไม้ บางคนก็แปรรูปโลหะให้เป็นสิ่งของต่างๆ ด้วยค่ะ"
1011303-51 = "การกระทำดังกล่าวขึ้นอยู่กับความชอบแต่ละคน และต้องอุทิศเวลากับกำลังในการทำสิ่งนั้นตาม#nเหตุผลของตัวเอง"
1011303-52 = "แม้สุดท้ายแล้วอาจมองได้ว่าเป็นการกระทำที่ทำให้ตัวเองเหนื่อยเปล่าๆ"
1011303-53 = "แต่ในความเป็นจริง สำหรับคนพวกนั้นแล้วนั่นไม่ใช่งานที่เหนื่อยเปล่าหรอกค่ะ นั่นก็เพราะการทำอะไร#nซ้ำๆ จะส่งผลให้เราจิตใจสงบน่ะค่ะ"
1011303-54 = "และฉันก็คิดว่าถ้าการทำอะไรซ้ำๆ นั้นเกี่ยวข้องกับงานที่ทำเป็นปกติ มันก็จะยิ่งดีด้วยค่ะ"
1011303-55 = "[s] \"งั้นเซนะก็ชอบการจัดเรียงยาจริงๆ สินะ\""
1011303-56 = "ค่ะ สำหรับฉันแล้วเป็นอย่างนั้นค่ะ"
1011303-60 = "และยิ่งได้ทำสิ่งนั้นกับคุณครูที่นี่ ฉันก็ยิ่งชอบเข้าไปใหญ่เลยค่ะ"
1011303-61 = "[s] \"งะ... งั้นเหรอ...?\""
1011303-62 = "ถ้าจะให้พูดตามตรงกว่านี้ ต้องบอกว่าการไม่ปฏิเสธคำขอของคุณครู แล้วพาคุณครูมาที่ชมรม#nหน่วยแพทย์ฉุกเฉิน"
1011303-66 = "มันก็เป็นความตั้งใจของฉันเหมือนกันค่ะ"
1011303-67 = "ปกติแล้วฉันไม่ค่อยชอบใช้คำพูดที่ไม่ชัดเจนเท่าไร แต่ตอนนี้ฉันรู้สึกว่าตัวเองต้องเลือกใช้คำพูดแบบ#nนั้นอย่างหลีกเลี่ยงไม่ได้"
1011303-68 = "ถ้าจะใช้คำพูดแบบนั้นเพื่อบอกความรู้สึกของฉันละก็"
1011303-69 = "ค่ะ คงพูดได้ว่านี่เป็นการทำตามใจหรือเป็นความดื้อรั้นอย่างหนึ่งน่ะค่ะ"
1011303-70 = "แต่ฉันก็คิดว่าคุณครูอาจจะไม่ได้สนุกกับการทำแบบนี้เท่ากับฉัน"
1011303-71 = "ฉันก็เลยไม่สบายใจและอยากขอโทษด้วยค่ะ"
1011303-72 = "[s5] \"ไม่ใช่อย่างนั้นหรอก\"\n[s6] \"ครูก็สนุกที่ได้ใช้เวลาร่วมกับเซนะนะ\""
1011303-75 = "อย่างนั้นเหรอคะ"
1011303-76 = "ถ้างั้นฉันจะดีใจอย่างเปิดเผยเลยนะคะ"
1011303-77 = "จริงๆ แล้วระหว่างที่ฉันพูดเรื่องตัวเองและฟังเรื่องของคุณครู ฉันก็รู้สึกเหมือนว่ากำลังพักผ่อนอยู่#nจริงๆ เลยค่ะ"
1011303-78 = "นอกจากนี้ฉันยังแอบคิดด้วยว่าช่วงเวลานี้ถือเป็น 'รางวัล' สำหรับฉัน"
1011303-79 = "ฉันได้ใช้เวลากับคุณครู ได้พูดคุยนู่นนี่กัน และก็ได้เปิดเผยสิ่งเล็กๆ น้อยๆ เกี่ยวกับตัวฉันให้คุณครูได้รู้"
1011303-80 = "ช่วงเวลานี้ก็เลยเป็น 'รางวัล' ที่มีความหมายสำหรับฉันค่ะ"
1011303-81 = "[s] \"ขนาดนั้น... เลยเหรอ?\""
1011303-82 = "ค่ะ ขนาดนั้นเลยค่ะ"
1011303-83 = "ถ้าจะพูดให้ชัดเจนกว่านี้ ฉันต้องบอกว่าวันนี้ฉันขอบคุณคุณครูมากๆ เลยค่ะ"
1011303-85 = "(หลังจากรอให้เซนะ 'ทำงานอดิเรก' เสร็จ คุณครูกับเซนะก็ไปกินมื้อกลางวันด้วยกัน)"

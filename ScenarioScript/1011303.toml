[translation]
1011303-1 = "#title;취미 생활 (2)"
1011303-2 = "3;세나 사복;01;안녕하십니까. 선생님. 기다리고 있었습니다.\n#3;a\n#3;em;[반응]"
1011303-3 = "[s] \"이번에는 나도 일찍 왔다고 생각했는데–!\""
1011303-4 = "3;세나 사복;99;네. 그 점 역시 확인했습니다. 단지 제가 27분 전에 도착해 있었을 뿐이었죠."
1011303-5 = "3;세나 사복;01;말씀드렸던 바 있습니다만, 오늘은 저의 또 다른 비번일이니까요."
1011303-6 = "[s1] \"그런데 말이야, 세나……. 모르겠는 게 있어.\"\n[s2] \"왜 비번인 날에, 사복으로 응급의학부를 찾아가려는 거야?\""
1011303-7 = "#wait;10"
1011303-8 = "#wait;10"
1011303-9 = "3;세나 사복;01;으음."
1011303-10 = "3;세나 사복;02;일단은 움직이실까요. 그 부분에 대한 것은, 가면서 말씀드리겠습니다.\n#3;greeting"
1011303-11 = "#all;hide"
1011303-12 = "3;세나 사복;99;응급의학부를 찾은 목적은, 약품 정비를 위해서입니다.\n#3;a\n#3;em;[...]"
1011303-13 = "3;세나 사복;01;저희 응급의학부의 특성상, 서류 정리나 업무 기록 일지 작성 같은 기초적인 사항에 소홀해지는 경우가 많습니다."
1011303-14 = "3;세나 사복;01;약품 정비 역시, 그런 사항 중 하나이고요."
1011303-15 = "[s] \"그렇지만 비번일에 이러는 건, 사실상 추가 근무 아냐?\""
1011303-16 = "3;세나 사복;01;……그렇게 보일 수 있는 부분이 있다는 것은, 저 역시 인정하는 바입니다."
1011303-17 = "3;세나 사복;02;그럴 거면 아예 정복을 입는 것이 어울리는 것 아니냐고요?\n#3;em;[?]"
1011303-18 = "3;세나 사복;99;물론 그런 시각도 충분히 가능하겠습니다만, 그래서는 다른 응급의학부원들이 부담을 갖게 됩니다."
1011303-19 = "3;세나 사복;01;이미 잘 알고 계시겠지만, 저는 응급의학부의 부장입니다."
1011303-20 = "3;세나 사복;01;그런 제가, 비번으로 지정된 날까지 정복을 입고 동아리실에 나온다는 것이 알려지면."
1011303-21 = "3;세나 사복;02;다른 응급의학부원들도 제대로 비번인 날의 휴일을 즐길 수 없게 됩니다.\n#3;em;[반응]"
1011303-22 = "3;세나 사복;01;저희 응급의학부는, 비번인 날에도 최소한의 경계심을 놓아서는 안 되니까요."
1011303-23 = "[s] \"아…… '시체' 때문에?\""
1011303-24 = "3;세나 사복;02;네. 부상자는 언제 어디에서 발생할지 모르는 것이니 말입니다."
1011303-25 = "3;세나 사복;99;물론 키보토스에서는 실제로 시체를 보는 일이 드물기 때문에, 시ㅊ……'부상자'를 본다는 것이."
1011303-26 = "3;세나 사복;01;선생님께서 생각하시는 것만큼 무거운 일이 아닐 때가 많기도 하지만요."
1011303-27 = "3;세나 사복;01;따지고 보면, 비번인 날에 사복 차림으로 동아리실에 온 것이 문제라고도 볼 수 있겠습니다만.\n#3;em;[...]"
1011303-28 = "3;세나 사복;02;약품 정비는 저의 취미이고, 응급의학부원들 역시 그 사실을 알고 있으므로, 이것은 어디까지나 취미 생활의 연장일 뿐인 것이죠."
1011303-29 = "[s] \"결국은…… 복장의 차이인가…….\""
1011303-30 = "3;세나 사복;99;거기에서 조금만 더."
1011303-31 = "3;세나 사복;01;복장과 마음가짐과, 외부로부터 보여지는 시선의 차이라고 할 수 있을 것 같습니다.\n#3;closeup\n#3;em;[반짝]"
1011303-32 = "3;세나 사복;01;선생님 정도 되는 어른이시면, 그 정도 사실은 이미 익숙하지 않으신가요?\n#3;closeup"
1011303-33 = "[s3] \"물론 나야 익숙하지만.\"\n[s4] \"학생인 세나까지, 그런 일에 익숙해지는 건 어떠려나 해서.\""
1011303-34 = "#wait;10"
1011303-35 = "#wait;10"
1011303-36 = "3;세나 사복;01;……."
1011303-37 = "3;세나 사복;03;걱정해주신 거군요. 감사합니다. 기쁘네요."
1011303-38 = "3;세나 사복;02;다 왔습니다. 응급의학부실은 이쪽입니다.\n#3;m4"
1011303-39 = "#all;hide"
1011303-40 = "3;세나 사복;02;선생님께는 조금 불편한 의자들뿐이겠습니다만, 그 점은 양해를 부탁드리겠습니다.\n#3;a\n#3;em;[반응]"
1011303-41 = "3;세나 사복;03;개의치 않으신다고요? 감사합니다. 선생님께서는 역시 상냥하시군요."
1011303-42 = "3;세나 사복;06;지금은 쑥스러운 표현……? 혹시 제가 뭔가 실수했습니까?"
1011303-43 = "3;세나 사복;04;너무 솔직한 표현인 것 같으셨다고요? 그렇습니까. 제가 느낀 바를 말씀드린 것입니다만, 부담스러우셨다면 사과드리겠습니다.\n#3;em;[땀]"
1011303-44 = "3;세나 사복;02;아, 그런 건 아니시군요. 다행입니다."
1011303-45 = "3;세나 사복;01;약품 정비에는 그다지 오랜 시간이 걸리지 않을 예정입니다. 기다려 주신다면 감사하겠습니다."
1011303-46 = "[s] \"약품 정비가 취미가 된 이유라도 있어?\""
1011303-47 = "3;세나 사복;01;…….\n#3;em;[...]"
1011303-48 = "3;세나 사복;99;가장 큰 이유는, 이런 일을 하다 보면 마음이 편안해지기 때문입니다."
1011303-49 = "3;세나 사복;02;세상에는, 가령, 취미로 플라스틱으로 만들어진 모형을 조립하는 사람들이 있습니다."
1011303-50 = "3;세나 사복;01;목공예를 하는 사람들이 있고, 금속을 가공하여 이런저런 물품들을 만드는 사람들이 있습니다."
1011303-51 = "3;세나 사복;01;그런 행위들은, 사람에 따라서는 여유가 되는 상황에서까지 노동을 하며."
1011303-52 = "3;세나 사복;02;결국에는 스스로를 힘들게 하는 행위들이 아니냐고 말할 수도 있겠습니다만.\n#3;em;[반응]"
1011303-53 = "3;세나 사복;01;정작 그 사람들 본인에게는 그렇지 않은 경우가 많습니다. 반복적인 작업에는, 마음을 정리해 주는 효과가 있으니까요."
1011303-54 = "3;세나 사복;99;그리고 그 반복적인 작업이 평소 제가 하는 일과 연관된 것이라면, 오히려 더욱 좋은 일인 것이 아닐까, 저는 그렇게 생각합니다."
1011303-55 = "[s] \"그러면 세나는 약품 정비를 하는 게, 정말 만족스러운 거구나.\""
1011303-56 = "3;세나 사복;01;네. 저에게 있어서는 그렇습니다."
1011303-57 = "#st;[0,0];instant;1;"
1011303-58 = "#clearST"
1011303-59 = "3;세나 사복;99\n#wait;1000"
1011303-60 = "3;세나 사복;03;그리고 이 자리에 선생님이 함께 있어 주셔서, 더욱 그런 것 같습니다."
1011303-61 = "[s] \"그, 그래……?\""
1011303-62 = "3;세나 사복;06;한층 더 솔직한 이야기를 드리자면, 선생님의 요청을 못 이기는 척하고, 선생님을 응급의학부로 모신 것 자체가."
1011303-63 = "#st;[0,0];instant;1;"
1011303-64 = "#clearST"
1011303-65 = "3;세나 사복;04\n#wait;1000"
1011303-66 = "3;세나 사복;04;저의 의지이기도 했습니다.\n#3;em;[///]"
1011303-67 = "3;세나 사복;06;저는 기본적으로 부정확한 표현을 즐겨 사용하지 않습니다만, 여기에서는 그런 표현을 빌릴 수밖에 없는 상황인 듯하므로."
1011303-68 = "3;세나 사복;05;그런 표현을 빌려, 저의 감정 상태를 말씀드리자면."
1011303-69 = "3;세나 사복;99;네. 일종의 응석이나 고집 같은 것이라고 말씀드릴 수 있을 것 같습니다.\n#3;em;[...]"
1011303-70 = "3;세나 사복;02;다만 선생님께서, 이 과정에서, 저와는 달리 그다지 즐거움을 느끼지 못할 것 같아."
1011303-71 = "3;세나 사복;06;역시 그 점은 송구스럽기만 합니다.\n#3;greeting"
1011303-72 = "[s5] \"그런 건 아니야.\"\n[s6] \"나도 세나와 같이 있는 시간이 좋았어.\""
1011303-73 = "#wait;10"
1011303-74 = "#wait;10"
1011303-75 = "3;세나 사복;02;그러신가요."
1011303-76 = "3;세나 사복;03;그렇다면, 저 역시 솔직하게 기뻐하도록 하겠습니다."
1011303-77 = "3;세나 사복;01;사실 말씀드리는 중간에, 선생님의 이야기를 들으면서, 정말은 저 자신이 휴식을 취하고 있는 것은 아니지 않은가."
1011303-78 = "3;세나 사복;01;나아가 저에게 있어서 이 시간이 '보상'으로 작용하고 있지 않은 것인가, 하는 생각도 떠올려 보기는 했습니다만.\n#3;em;[...]"
1011303-79 = "3;세나 사복;99;이렇게 선생님과 대화를 나누고 시간을 보내며, 저의 사소한 부분들을 선생님께 보여드리기까지 했으니."
1011303-80 = "3;세나 사복;01;결국 이 시간은 저에게 있어, 유의미한 '보상'이었던 것 같습니다."
1011303-81 = "[s] \"그런…… 거야?\""
1011303-82 = "3;세나 사복;01;네. 그런 것입니다."
1011303-83 = "3;세나 사복;03;보다 정확한 표현을 사용하자면, 선생님께 매우 감사드리고 있다는 뜻이기도 합니다.\n#3;em;[반응]"
1011303-84 = "#all;hide"
1011303-85 = "#na;(세나의 '취미'가 끝나기를 기다린 다음, 함께 점심을 먹으러 갔다.)"

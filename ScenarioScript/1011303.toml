[translation]
1011303-1 = "Hobby 2"
1011303-2 = "Hello, Sensei. I was waiting for you."
1011303-3 = "[s] \"I thought I got here pretty early this time!\""
1011303-4 = "Oh, you did. I just happened to get here 27 minutes before you."
1011303-5 = "I mentioned this before, but today's my day off."
1011303-6 = "[s1] \"Speaking of, I had a question.\"\n[s2] \"Why are you going to work, in casual clothes, on your day off?\""
1011303-9 = "Mmm."
1011303-10 = "Let's get moving for now. I'll explain that on the way."
1011303-12 = "I'm visiting the Medical Emergency Club to organize the medicine."
1011303-13 = "Our work can be hectic. Sometimes, we fall behind on basic duties. Organizing documents, writing logs..."
1011303-14 = "...and, of course, keeping the medicine organized."
1011303-15 = "[s] \"So you're working overtime on your day off?\""
1011303-16 = "...Some might see it that way."
1011303-17 = "So why am I out of uniform, you ask?"
1011303-18 = "Simply put, that would put too much pressure on the other club members."
1011303-19 = "As you know, I'm the president of the Medical Emergency Club."
1011303-20 = "If it got out that I came here in uniform, even while I was supposed to be off duty..."
1011303-21 = "...the other club members wouldn't be able to enjoy their own days off, not without thinking they ought to be here."
1011303-22 = "Which is not to suggest that we should let our guard down, on duty or off."
1011303-23 = "[s] \"Ah... Because of 'bodies,' I assume?\""
1011303-24 = "That's right. You never know when you might trip over one. Or when someone might get injured."
1011303-25 = "Now of course, we don't see many actual dead bodies here in Kivotos, so seeing one...I mean, finding an injured person..."
1011303-26 = "...might not be as burdening as you'd imagine, Sensei."
1011303-27 = "And to be fair, I suppose coming to the club room in a casual outfit on an off-duty day might be a problem in itself."
1011303-28 = "But organizing medicine IS my hobby, and the club knows that, so this is just me enjoying my down-time activities."
1011303-29 = "[s] \"And all it comes down to is a difference in outfit, then.\""
1011303-30 = "To that, I say..."
1011303-31 = "...doing the same activity, in different clothes, with a different attitude, can give a radically different impression."
1011303-32 = "But of course, you know that. You're an adult."
1011303-33 = "[s3] \"I do, and sometimes I do work in casual outfits.\"\n[s4] \"But you're a student. You shouldn't push yourself TOO hard.\""
1011303-36 = "..."
1011303-37 = "So you worry about me. Well, thank you. That makes me happy."
1011303-38 = "We're here. the Medical Emergency Club is this way."
1011303-40 = "Pardon me if these chairs are a little uncomfortable."
1011303-41 = "You don't mind? Thank you. You're a very good-hearted person, you know."
1011303-42 = "...What's with that face? Did I say something wrong?"
1011303-43 = "Was I too...honest in saying that? Well, I was just saying what I felt, but I didn't mean to make it awkward, so apologies for that."
1011303-44 = "Ah, that's not it? Good, I'm glad."
1011303-45 = "It shouldn't take too long to organize all of these. If you wouldn't mind waiting, I'd be grateful."
1011303-46 = "[s] \"So how did organizing medicine come to be your hobby?\""
1011303-47 = "..."
1011303-48 = "Mainly, I just find it relaxing."
1011303-49 = "Some people assemble plastic figures as a hobby."
1011303-50 = "Some get into woodworking, or metalworking."
1011303-51 = "An outside observer might think a person was straining themselves..."
1011303-52 = "...working hard on their hobbies when they could just be taking a breather."
1011303-53 = "But oftentimes, that's not the case. Doing repetitive work, by choice, can help calm a person down."
1011303-54 = "And if that repetitive work is related to what I typically do anyway, that's even better. Or at least that's what I think."
1011303-55 = "[s] \"So organizing medicine must feel satisfying, Sena.\""
1011303-56 = "It does. For me, at least."
1011303-60 = "And, as I've just discovered, I enjoy it even more when you're around."
1011303-61 = "[s] \"I-Is that so...?\""
1011303-62 = "If I can be even more honest, I pretended I couldn't resist your request when I brought you here."
1011303-66 = "That was also by choice, of course."
1011303-67 = "...I don't like to use imprecise language, but I think I might have to here."
1011303-68 = "To explain my emotional state..."
1011303-69 = "...all in all, I think I might be acting stubborn or spoiled here."
1011303-70 = "I know you don't enjoy moving bottles around, or watching someone else do it."
1011303-71 = "So maybe I shouldn't have dragged you out here for that."
1011303-72 = "[s5] \"Don't worry about that.\"\n[s6] \"I do enjoy spending time with you, Sena.\""
1011303-75 = "Really?"
1011303-76 = "Well, then if it's all right, I'll just go ahead and enjoy this moment."
1011303-77 = "While I was talking just now, I started wondering how relaxing this actually was today."
1011303-78 = "Or if I was just \"rewarding\" myself for listening to you earlier."
1011303-79 = "But I got to spend time with you, and show another side of myself."
1011303-80 = "If that's a reward, so be it."
1011303-81 = "[s] \"Is that so?\""
1011303-82 = "Yes, that's how it is."
1011303-83 = "Put another way, I'm very grateful to you, Sensei."
1011303-85 = "I waited for Sena to finish her \"hobby\". Then we went to get lunch together."

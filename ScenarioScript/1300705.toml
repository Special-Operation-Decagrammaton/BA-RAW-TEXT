[translation]
1300705-1 = "สมาคมนักชิมที่แร้นแค้น"
1300705-2 = "สำนักงานชาเล่ต์"
1300705-5 = "กลับมาแล้ว..."
1300705-6 = "อึ่ก... การสอบสวนคราวนี้แย่ที่สุดเลย#nอุตส่าห์คิดว่าจะมีร้านที่กินบุฟเฟ่ต์เนื้อวากิวชั้นดีได้ไม่อั้นอยู่แท้ๆ…"
1300705-7 = "ไม่เห็นมีใครบอกเลยว่าวันนี้เป็นวันหยุดประจำของร้านนั้นน่ะ... ใครจะไปรู้เองได้เล่า!"
1300705-8 = "ฉันอุตส่าห์อดมื้อเที่ยงเพื่อจะไปกินเนื้อย่างได้อย่างจุใจ....#nหะ... หิวจังเลย....."
1300705-9 = "คุณครู... มีอะไรให้ฉันกินบ้างมั้ย? หิวจะตายอยู่แล้ว~"
1300705-10 = "[s] \"ถ้าเป็นของกินที่มีอยู่ล่ะก็....\""
1300705-11 = "หืม? อะไรเนี่ย? ราเม็งไก่ของมิชชินเหรอ?"
1300705-12 = "เคยได้ยินชื่อมาบ้างแต่ฉันยังไม่เคยกินมาก่อนเลย#nราเม็งสำเร็จรูปที่ใส่น้ำร้อนก็กินได้เลยใช่มั้ย?"
1300705-13 = "ถึงฉันจะหิวแค่ไหนก็เถอะ แต่ในฐานะนักชิมอาหารแล้วจะให้มากินของสำเร็จรูปราคาถูกแบบนี้มัน..."
1300705-14 = "[s] \"ถ้าไม่ชอบจะไม่กินก็ได้นะ\""
1300705-15 = "ฉะ...ฉันยังไม่ได้พูดเลยว่าไม่ชอบน่ะ? เอามานี่!"
1300705-16 = "อืม เอาเส้นราเม็งใส่ลงในถ้วยแล้วเทน้ำร้อนใส่ไว้สามนาที...."
1300705-17 = "ราเม็งราคาถูกที่ไม่มีน้ำซุปเข้มข้นคงไม่อร่อยเท่าไหร่หรอก...."
1300705-21 = "(อะไรเนี่ย อร่อยเหาะเลย?!)"
1300705-22 = "(รสชาติที่กลมกล่อมและเส้นก็เหนียวนุ่มน่าหลงใหลเกินบรรยาย....)"
1300705-23 = "(อีกทั้งรสชาติเข้มข้นของน้ำซุป... เหนือความคาดหมายสุดๆ!)"
1300705-24 = "[s] \"รสชาติเป็นยังไงบ้าง? อร่อยไหม?\""
1300705-25 = "กะ...ก็พอกินได้นะ!#nแต่ยังไม่ได้มาตรฐานของนักชิมของฉันหรอก! ฮะฮ่าฮ่า!"
1300705-26 = "แต่ว่ามันน้อยมากเลย... มีอีกถ้วยมั้ย?"
1300705-27 = "อะ...อย่าเข้าใจผิดนะ! ฉันไม่ได้อยากกินอีกเพราะมันอร่อยสักหน่อย!"
1300705-28 = "แต่เป็นเพราะฉันหิวมากต่างหากล่ะ! อย่าเข้าใจผิดเชียว!"
1300705-30 = "หลังจากนั้นจุนโกะก็กินราเม็งถ้วยที่สองจนหมด"

[translation]
1300705-1 = "貧困的美食會"
1300705-2 = "夏萊．辦公室"
1300705-5 = "我回來了……"
1300705-6 = "唔唔，糟透了。#n聽說今天的餐廳可以頂級和牛自助吃到飽，害我還好期待……"
1300705-7 = "結果今天竟然是公休日！意料之外！"
1300705-8 = "我還以為可以吃到一大堆和牛燒肉，午餐才故意吃少一點的說。#n嗚嗚，肚子好餓……"
1300705-9 = "老師，你有沒有帶吃的？我肚子好餓～"
1300705-10 = "[s] 「我現在身上有的食物……」"
1300705-11 = "嗯？這是什麼？「目清」的絞肉拉麵？"
1300705-12 = "啊，雖然沒吃過，但我知道這東西。#n這是那種放入碗裡再倒熱水就能吃的泡麵對吧？"
1300705-13 = "就算再怎麼餓，竟然要身為美食家的我吃這種廉價泡麵……"
1300705-14 = "[s] 「不想吃的話可以不用勉強。」"
1300705-15 = "我，我才沒說我不吃吧！？還來！"
1300705-16 = "我看看……把麵放進杯子裡，倒入熱水等待三分鐘……"
1300705-17 = "這種沒有調味粉和配料的廉價拉麵怎麼可能會好吃……"
1300705-21 = "（咦，好吃耶！？）"
1300705-22 = "（沒想到油炸麵體特有的Q彈口感會這麼有魅力……）"
1300705-23 = "（加上麵條還滲出了充滿韻味的湯汁……完全超乎想像！）"
1300705-24 = "[s] 「味道如何？還行嗎？」"
1300705-25 = "嘛，嘛嘛，還算能吃！#n不過遠遠不及我這個美食家的標準就是了！啊哈，哈哈！"
1300705-26 = "只是這份量有點少……還有嗎？"
1300705-27 = "你，你別誤會了！我可不是因為好吃才想再吃更多！"
1300705-28 = "只是因為肚子實在太餓才出此下策！你可別誤會！"
1300705-30 = "（之後，淳子又吃完了第二份絞肉拉麵，最終總計吃了三份）"

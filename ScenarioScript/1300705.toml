[translation]
1300705-1 = "A Poor Gourmet"
1300705-2 = "Schale Executive Office"
1300705-5 = "I'm back..."
1300705-6 = "Ugh. That investigation was the worst. I was looking forward to going to a buffet with all-you-can-eat wagyu beef."
1300705-7 = "Nobody told me that they're closed today! How was I supposed to know?!"
1300705-8 = "I skimped out on lunch to make room for bulgogi. Ugh, I'm starving..."
1300705-9 = "Would you happen to have anything to eat, Sensei? I'm so hungry..."
1300705-10 = "[s] \"I just so happen to have some food right here...\""
1300705-11 = "You do? Let me see... Mitoshin's chicken ramen?"
1300705-12 = "I've heard of this brand but never tried it. This is the instant ramen you put in a cup and pour hot water over, right?"
1300705-13 = "I know I said I was starving, but I'm supposed to be a gourmet. Eating cheap instant food would be a little..."
1300705-14 = "[s] \"No one's forcing you to. It's fine.\""
1300705-15 = "I-I never said I didn't want it! Give it back!"
1300705-16 = "Hmm. Put the noodles in a cup, pour boiling water, and wait for three minutes..."
1300705-17 = "It doesn't even have a broth base or garnish. It can't possibly be tasty..."
1300705-21 = "(What in the...?! It's delicious!)"
1300705-22 = "(The fried noodles have an al dente texture. I can't believe my taste buds...)"
1300705-23 = "(Not to mention the combination of noodles and sauce DO make for a savory broth... It exceeds my wildest expectations!)"
1300705-24 = "[s] \"So? What do you think?\""
1300705-25 = "I-It's edible, I suppose! Even if it falls short of the lofty standards of a gourmet like myself! H-Haha!"
1300705-26 = "Not to mention it was hardly enough to be considered filling. You wouldn't happen to have more, would you?"
1300705-27 = "D-Don't get the wrong idea! I'm not asking for more because I like it or anything!"
1300705-28 = "This is purely because I require calories! Don't you dare get it twisted!"
1300705-30 = "Junko would go on to finish another two chicken ramen cups after that."

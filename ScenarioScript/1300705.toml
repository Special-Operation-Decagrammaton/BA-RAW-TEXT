[translation]
1300705-1 = "#title;빈곤한 미식회"
1300705-2 = "#place;샬레 집무실"
1300705-3 = "#wait;1500"
1300705-4 = "5;준코;11\n#5;al\n#5;greeting\n#wait;1000"
1300705-5 = "5;준코;11;다녀왔어……."
1300705-6 = "5;준코;11;으으, 이번 조사는 최악이었어. #n최고급 품질의 와규를 뷔페로 먹을 수 있는 가게가 있다고 기대했었는데…….\n#5;m4"
1300705-7 = "5;준코;05;설마 오늘이 정기 휴일이었을 줄이야! 상상도 하지 못했어!\n#5;m3\n#5;hophop"
1300705-8 = "5;준코;11;불고기를 잔뜩 먹을 수 있을 줄 알고 점심은 부실하게 먹었는데. #n으으, 배고파…….\n#5;em;[속상함]\n#5;stiff"
1300705-9 = "5;준코;11;선생님, 뭔가 먹을만한 거 없어? 배고프단 말이야~."
1300705-10 = "[s] \"지금 가지고 있는 음식이라면…….\""
1300705-11 = "5;준코;02;으응? 이게 뭐야? 밋신의 치킨라멘?\n#5;em;[?]"
1300705-12 = "5;준코;01;아, 먹어본 적은 없지만 알고 있어. #n컵에 넣고 뜨거운 물을 부어서 먹는 인스턴트 라멘이잖아?"
1300705-13 = "5;준코;11;아무리 배가 고프다지만 미식가인 나에게 이런 싸구려 인스턴트 음식은 조금…….\n#5;em;…"
1300705-14 = "[s] \"싫으면 먹지 않아도 괜찮아.\""
1300705-15 = "5;준코;04;아, 안 먹겠다고 말한 적은 없거든? 돌려줘!\n#5;shake\n#5;em;[?!]"
1300705-16 = "5;준코;01;으음…… 컵에 면을 넣고 끓는 물을 붓고 3분이라…….\n#5;m2"
1300705-17 = "5;준코;11;스프도 고명도 없는 이런 싸구려 라멘이 맛있을 리가…….\n#5;em;…"
1300705-18 = "#5;hide\n3;준코;01"
1300705-19 = "3;준코;02\n#3;greeting\n#wait;1000"
1300705-20 = "3;준코;01\n#3;em;…\n#wait;2500"
1300705-21 = "3;준코;09;(뭐야, 맛있잖아?!)\n#3;em;[반짝]\n#3;shake"
1300705-22 = "3;준코;09;(조미된 유탕면 특유의 고들고들한 식감이 이렇게나 매력적일 줄이야…….)"
1300705-23 = "3;준코;09;(게다가 면에서 우러나온 감칠내가 잔뜩 배인 국물까지…… 생각했던 것 이상이야!)\n#3;em;[!]"
1300705-24 = "[s] \"맛은 어때? 괜찮아?\""
1300705-25 = "3;준코;10;그, 그럭저럭 먹을 만하네! #n미식가인 내 기준에는 한참 모자라지만 말이야! 하, 하하!\n#3;em;[?!]\n#3;shake"
1300705-26 = "3;준코;09;그나저나 양이 너무 적은 것 같은데…… 혹시 하나 더 있어?\n#3;em;[반짝]"
1300705-27 = "3;준코;04;차, 착각 하지마! 맛있어서 계속 먹는 게 아니니까!\n#3;shake"
1300705-28 = "3;준코;05;그냥 배가 너무너무 고파서 어쩔 수 없었던 거니까! 오해하지 말라고!\n#3;hophop\n#3;em;[!]"
1300705-29 = "#all;hide"
1300705-30 = "#na;이후, 준코는 두 개째의 치킨라멘을 깨끗이 비우고는 하나를 더 먹었다."

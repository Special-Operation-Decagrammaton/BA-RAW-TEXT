13160-411 = "จะถูกลดตำแหน่งให้เป็นแค่เลขา!!"
13160-413 = "(โยนตำแหน่งตัวเองให้รุ่นพี่เหรอ...?!)"
13160-414 = "อื้ม นั่นสิ ตอนนี้รุ่นพี่ไม่ใช่รองประธานนักเรียนแล้วละ "
13160-416 = "ค่ะ! เพราะฉะนั้น ต่อให้รุ่นพี่ไปปฏิเสธการมีอยู่ของ <สภานักเรียนอะบิดอส> ก็ไม่มีประโยชน์หรอกค่ะ!"
13160-417 = "เพราะคนที่เป็นเลขาไม่มีสิทธิ์ทำแบบนั้น และจะปฏิเสธ <พวกเรา> ที่มีตัวตนอยู่แล้วแบบนี้ไม่ได้ค่ะ!"
13160-418 = "รุ่นพี่โฮชิโนะจะไม่ยอมรับพวกฉัน ไม่ยอมรับประธานยูเมะ และไม่ยอมรับตัวเองไม่ได้ค่ะ!"
13160-419 = "ขอบคุณนะคะคุณครู แบบนี้ทุกอย่างก็เป็นระบบระเบียบแล้วค่ะ!"
13160-421 = "เรื่องตามหารุ่นพี่โนโนมิ ถ้าคุณครูหาตำแหน่งของรุ่นพี่มาได้ พวกเราก็ไปช่วยได้..."
13160-422 = "ส่วนรุ่นพี่โฮชิโนะก็ไม่ได้เป็นรองประธานนักเรียนอีกต่อไปแล้ว เลยไปทำอะไรกับสัญญาไม่ได้... และถ้าพวกเราคงสัญญานั้นไว้ได้ ปืนแม่เหล็กไฟฟ้าก็จะไม่ตกไปอยู่ในมือของพวกคนชั่ว..."
13160-423 = "แล้วสภานักเรียนอะบิดอส และคณะกรรมการแผนงานก็ไม่ต้องหายไปด้วย"
13160-424 = "จะ... จริงด้วยแฮะ แบบนี้ทุกอย่างก็คลี่คลายได้น่ะสิ...?"
13160-426 = "ค่ะ! ถ้างั้นตอนนี้ก็เหลือแค่อย่างเดียว! "
13160-427 = "เราต้องไปเข้าร่วมการประชุมภายในเที่ยงของวันนี้แล้วคงสัญญาไว้ค่ะ! และในกระบวนการนั้น เราก็จะขัดขวางรุ่นพี่โฮชิโนะ และช่วยรุ่นพี่โนโนมิกันด้วยค่ะ!"
13160-428 = "ถึงมันจะยาก... แต่พวกเราต้องเอาชนะกองกำลังของ <กองทุนไพรเวทอิควิตี้> ที่มาขัดขวางเราไว้ให้ได้ค่ะ"
13160-430 = "อืม เข้าใจแล้ว ท่านประธานสภานักเรียน"
13160-431 = "เข้าใจแล้ว แต่ว่า... จากนี้ไปจะเป็นการสู้แบบใช้กำลังอย่างเดียวเลยสินะ ไม่น่าจะง่ายเลย..."
13160-432 = "[s] \"ใช่ คงยากน่าดู แต่เราจะทำมันได้\""
13160-434 = "ค่ะ!! พวกเราจะไม่ยอมแพ้ ไม่ว่าจะเจอเรื่องไหน! เราไม่ต้องไปยอมให้คนพวกนั้นค่ะ!"
13160-435 = "เพราะนี่คือวิถีของ [ruby=คณะกรรมการแผนงาน]<สภานักเรียนอะบิดอส>[/ruby] ค่ะ"

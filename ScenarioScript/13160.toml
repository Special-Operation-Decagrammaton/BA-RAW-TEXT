[translation]
13160-1 = "Episode 16;Counterattack"
13160-9 = "..."
13160-10 = "It's not the best of conditions, but please bear with it for the time being, Miss."
13160-11 = "Who on earth..."
13160-19 = "...It's me. "
13160-20 = "The Foreclosure Task Force will strike soon. Things are proceeding smoothly. "
13160-21 = "We must be fully prepared. And..."
13160-23 = "...And?"
13160-27 = "...Nephthys has betrayed us."
13160-31 = "...As expected. "
13160-32 = "They've shown their hand sooner than we thought. And those Abydos punks really are a threat."
13160-33 = "...All is well. I'll simply double the security. "
13160-39 = "Hm... I see, I see."
13160-40 = "It's fine. We've been expecting this betrayal."
13160-45 = "Whether it's Schale or the Foreclosure Task Force, I'll take care of everything."
13160-47 = "...Confirmed."
13160-48 = "I'm doubling the barricade heights...and setting up anti-tank mines as an extra precaution."
13160-66 = "...Understood. "
13160-67 = "Hah... A Train Cannon? You've got to be kidding me."
13160-68 = "I have no interest in an outdated weapon. Our focus is on the transcendent technology used to create it. "
13160-69 = "If we get our hands on that, we could build weapons unlike anything Kivotos has ever seen. After all, it is the work of the genius Tyrant Emperor."
13160-70 = "I understand. I'll increase the number of market guards. "
13160-80 = " Nephthys...betrayed us...?"
13160-81 = "A blessing in disguise. We'll use this opportunity to reclaim the business that Kaiser Loans overtook."
13160-87 = "Blech. Overseer? What do you want? Do you know what time it is? "
13160-92 = "Huh? Emergency situation? W-War?! What kinda stuff are you spouting?"
13160-97 = "Like, what?! We're finally getting the wheels rolling on the Trans-Desert Railway construction! So what's all this \"war\" stuff about?"
13160-98 = "All right!"
13160-102 = "Hikari! There's a big battle coming, full speed!"
13160-107 = "Huuuh...?"
13160-115 = "[ns] Open your eyes."
13160-119 = "[USERNAME] Sensei?! You're finally awake! "
13160-120 = "[s] Sit up in the bed."
13160-124 = "What a relief! You were caught in a huge explosion, but miraculously, you didn't suffer even a single scratch!"
13160-125 = "But you'll need strict bed rest to combat the exhaustion—"
13160-132 = "Huh, S-Sensei? Where are you going?"
13160-133 = "[s1] \"I'm running late...\"\n[s2] \"I have to get to Abydos.\""
13160-136 = "Yes, yes... We understand you're a very busy person. But don't overdo it, okay? And before you go, make sure to stop by the front desk to pay your bill!"
13160-150 = "[ns] \"(The helicopters are in flames on the field...)\""
13160-156 = "Sensei..."
13160-157 = "..."
13160-159 = "..."
13160-160 = "Sensei... Hoshino... Hoshino is..."
13160-161 = "[s] \"Let's head into the classroom first, everyone.\" "
13160-162 = "Okay..."
13160-164 = "Okay... "
13160-165 = "*sigh* I'm a mess anyways. Let's wash up first. "
13160-168 = "We agreed to regroup in the Foreclosure Task Force room after cleaning up the area."
13160-171 = "...Hoshino left on her own."
13160-172 = "Yeah... She told us not to follow her."
13160-174 = "I couldn't do anything to stop her... I'm still too weak."
13160-175 = "Don't beat yourself up, Shiroko! It doesn't suit you at all. And it's not that you're weak or anything, Hoshino's just way too strong!"
13160-176 = "Yeah. You're sweet, Serika."
13160-177 = "What the heck?! Isn't this normally when you make fun of me? "
13160-178 = "Okay..."
13160-179 = "What do we do, Sensei? How do we stop Hoshino?"
13160-180 = "[s] \"Hm...\""
13160-181 = "Using force was completely futile..."
13160-182 = "She even pulled rank on us, saying that this was an order from the vice president."
13160-183 = "In other words, she's made a clear declaration as a member of the previously ambiguous Abydos Student Council."
13160-184 = "She's declaring herself a member of the Abydos Student Council, of which President Yume, the principal of the contract, was a member. So the responsibility falls on the Abydos Student Council and not the Foreclosure Task Force. "
13160-185 = "Hoshino intends to shoulder everything on her own: rescuing Nonomi, finding and destroying the Train Cannon, and all the following consequences..."
13160-186 = "Do we really...have no right to be a part of Hoshino's fight? To stop her from doing this?"
13160-187 = "While Hoshino denies her cherished past...and Nonomi, one of our own members, is in danger, our role is to...wait anxiously on the sidelines?"
13160-189 = "..."
13160-190 = "*sigh*"
13160-191 = "[s] \"Do you want to stop Hoshino?\""
13160-192 = "That's a given! "
13160-193 = "Nonomi is a member of our Foreclosure Task Force. It's only right that we save her together."
13160-195 = "Exactly. We can't let Hoshino face this fight alone. And it's an issue concerning the legitimacy of the Foreclosure Task Force."
13160-196 = "[s] \"Yes, that's right... \""
13160-197 = "What matters the most is bringing Hoshino back."
13160-198 = "She's making the same mistake as before, shouldering our burdens on her own. If we can't make her understand that, it's pointless to try to physically stop her. "
13160-199 = "Right now, Hoshino's focused on carrying out President Yume's will...even if it means abandoning us..."
13160-201 = "Exactly. She's chasing the shadows of the past. Not looking at the people by her side."
13160-202 = "I feel like I'm in a daytime soap opera..."
13160-208 = "But...how in the world are we going to convince Hoshino to come back? Actually, more importantly, how're we even gonna stop her?"
13160-209 = "Now that Sensei's here...we can figure something out."
13160-210 = "Will we be okay with just us...?"
13160-211 = "We have to be. This is our issue. We have to stop Hoshino, and we have to do it through legitimate means."
13160-212 = "Our issue... I guess we don't have any other choice then, right?"
13160-214 = "...Yes. Let's review the problems we need to resolve."
13160-215 = "First and foremost, our priority is to save Nonomi and prevent her from being forcibly transferred to Highlander Academy."
13160-216 = "However, since we have no intel on where Nonomi is being held, our only option is to follow Nephthys' orders and deny the Abydos Student Council."
13160-217 = "But the private equity fund forces will do everything they can to stop us from attending the meeting."
13160-219 = "...That's correct. And we need to stop Hoshino as well, who's currently acting alone."
13160-220 = "There are three main reasons we need to stop Hoshino. First, Nonomi is a member of the Foreclosure Task Force, so it's our responsibility to save her! "
13160-221 = "To deny this is to deny the very purpose of the Foreclosure Task Force!"
13160-222 = "Next, even if it's Hoshino, the private equity fund's troops are too numerous for one person to handle. Hoshino could be critically injured if left to act alone. "
13160-223 = "And lastly...we have a responsibility to ensure that the Train Cannon, located in the Abydos Desert, doesn't fall into the wrong hands."
13160-224 = "So we're going to need to figure out where it is and secure the ownership rights."
13160-225 = "Yes... That's right. "
13160-226 = "[s3] \"Those are some tricky conditions to meet...\"\n[s4] \"It's a steep mountain we have to climb.\""
13160-229 = "Yes...the past Student Council, and the current Foreclosure Task Force..."
13160-230 = "It seems we're finally addressing this black hole of our past that we've been averting our eyes from for so long. "
13160-231 = "Sometimes...it feels like someone is probing at all our blind spots, executing a strategy to target us where we're weakest..."
13160-232 = "A strategy...?"
13160-233 = "Hm... That may come across as a bit odd. It's only a feeling."
13160-234 = "[s] \"No, I've felt it too. An unusual feeling, but one I can't put to words.\""
13160-235 = "You too, Sensei...?"
13160-236 = "I have...one more thing to add..."
13160-237 = "What is that?"
13160-238 = "Mm... I want to keep Hoshino from getting more hurt...somehow."
13160-239 = "Just like what the Foreclosure Task Force is for me...the Abydos Student Council was an important place for Hoshino. "
13160-240 = "I don't want Hoshino to have to reject that part of herself..."
13160-242 = "In other words, you want to keep the Abydos Student Council somehow, right...? I-Is that what you mean?"
13160-244 = "...Yeah."
13160-245 = "[s] \"All while maintaining the Abydos Student Council...\""
13160-246 = "Sorry for being stubborn, Sensei. But—"
13160-247 = "[s] \"No, no, Shiroko.\""
13160-251 = "[ns] \"It's an adult's job to hear out all of your stubbornness. It's okay.\""
13160-252 = "...Mhm."
13160-254 = "Sensei..."
13160-255 = "...Yeah. I really don't want Hoshino to feel sad..."
13160-256 = "The Foreclosure Task Force...the Abydos Student Council... "
13160-260 = "Ayane?"
13160-264 = "What exactly are we...?"
13160-265 = "What is the purpose behind our fight for Abydos? "
13160-266 = "We... What are we even hoping for...?"
13160-268 = "..."
13160-269 = "..."
13160-274 = "[ns] \"...All right. I know what to do.\""
13160-278 = "Sensei...?"
13160-279 = "[s] \"It's time to make a decision and move forward.\""
13160-280 = "...?"
13160-281 = "A decision...? "
13160-283 = "Sensei...?"
13160-284 = "[s] \"The student council president position has been vacant for a long time, right?\""
13160-285 = "Y-Yes?"
13160-286 = "[s5] \"Well, it can't be vacant forever.\"\n[s6] \"So I'll be holding a special election for the position.\""
13160-292 = "Special election...?"
13160-293 = "What? An election? Now? What do you mean?! "
13160-298 = "Student Council President...special election..."
13160-304 = "You're right! We just need to elect a Student Council President!"
13160-306 = "Ayane...?"
13160-307 = "It's absolutely possible, Serika! Right here, right now, 60% of all Abydos students are present!"
13160-308 = "Y-Yeah? We've got three out of the five right now...but so what?"
13160-309 = "On top of it, this is exactly how the former student council president was elected, so it would be entirely legitimate! "
13160-311 = "[ns7] \"Yes, it's how Yume became the legitimate president.\"\n[ns8] \"We're just following tradition and history here.\" "
13160-314 = "[ns] \"Above all, as Schale's Sensei, I will vouch for its legitimacy.\""
13160-316 = "...!!"
13160-317 = "Yes! Absolutely! "
13160-324 = "Count me in! I’m going to run for office!"
13160-329 = "My name is Okusora Ayane! I am running for the position of Abydos Student Council President!"
13160-333 = "What?!"
13160-334 = "Since President Yume was elected this way...this election will be considered a real and legitimate one as well!"
13160-335 = "[ns] \"We have a candidate! Let's proceed with a simple show-of-hands vote!\""
13160-338 = "There aren't any rules about secret ballots or anything? Well, I'm voting yes!"
13160-339 = "Me too. "
13160-340 = "I'm voting for myself, as the candidate!"
13160-342 = "[ns9] \"Since 60% of the student body voted in favor...\"\n[ns10] \"Ayane is officially elected as the new student council president.\""
13160-346 = "[ns11] \"As advisor of both Schale and Abydos...\"\n[ns12] \"...I, [USERNAME] Sensei...\"\n[ns13] \"...ratify this election.\""
13160-356 = "R-Really? Just like that...? Ayane is the student council president?"
13160-357 = "Yeah. She is."
13160-358 = "H-Hold on. Then what happens now? Is Ayane part of the Abydos Student Council, then? What about the Foreclosure Task Force...?"
13160-359 = "[s] \"President, please advise. What is the status of the Foreclosure Task Force?\""
13160-365 = "The Foreclosure Task Force...is now merged into the Abydos Student Council! "
13160-367 = "Wh-What?!"
13160-369 = "The Abydos Student Council and the Foreclosure Task Force are now one and the same! They will be unified under the Foreclosure Task Force! Please refer to the merged organization this way moving forward to avoid any confusion!"
13160-370 = "Makes sense. Neither disappears this way."
13160-371 = "Isn't all of this a little bit of a stretch?! I-Is this really okay?"
13160-372 = "It's absolutely okay, since these are the orders of the Student Council President! Do you have any complaints, Kuromi Serika?!"
13160-373 = "Ah, no. Um, no complaints here... "
13160-374 = "As Secretary of the Foreclosure Task Force and President of the Abydos Student Council, I will now brief you on our mission. "
13160-375 = "An iron-fisted ruler..."
13160-376 = "Our objective is to storm the general creditors' meeting and uphold the contract left to us by the previous president!"
13160-377 = "As the Abydos Student Council President, I have the authority to inherit that contract! "
13160-378 = "Kuchinashi Yume, the previous president, bequeathed this mission unto the student council! As her successor, I will ensure that no other entity claims ownership of the Train Cannon!"
13160-380 = "Mm. "
13160-381 = "At the same time, I will also demand the safe return of Nonomi, who has been forcibly detained by the Nephthys Group. "
13160-382 = "If this demand is not met, we will consider it an act of hostility against the Abydos Student Council and respond with force!"
13160-383 = "[s] \"I can find Nonomi's location, then we'll go rescue her.\""
13160-384 = "Yes! "
13160-385 = "All right!"
13160-386 = "What about Hoshino?"
13160-391 = "...Hoshino."
13160-396 = "A-Ayane...?"
13160-403 = "Hoshino...the vice president who is currently causing issues..."
13160-406 = "U-Umm..."
13160-411 = "She'll be demoted to secretary!"
13160-413 = "(She dumped her position onto Hoshino...?!)"
13160-414 = "Yeah. That's how it is. Moving forward, she's no longer the vice president.  "
13160-416 = "Yes! Therefore, even if Hoshino tries to deny the legitimacy of the Abydos Student Council, it'll be null and void!"
13160-417 = "A secretary has no such authority to reject our existence!"
13160-418 = "Hoshino won't be able to deny us, President Yume, or even herself!"
13160-419 = "Thank you, Sensei. With this, everything is settled!"
13160-421 = "Is it? Hm... Once Sensei finds her location, we'll manage to pull off Nonomi's rescue one way or another..."
13160-422 = "And since Hoshino isn't vice president anymore, she's not the contract's principal anymore...so as long as we maintain the contract, the bad guys can't get their hands on the Train Cannon."
13160-423 = "While the Abydos Student Council and the Foreclosure Task Force can exist simultaneously."
13160-424 = "I-It's for real... We solved everything...?"
13160-426 = "Yes! There's just one last hurdle remaining! "
13160-427 = "We aim to arrive at the general creditors' meeting before noon today and certify the contract! By doing so, we'll stop Hoshino and rescue Nonomi!"
13160-428 = "This won't be easy, but...we have to beat the private equity fund's forces."
13160-430 = "Okay. Understood, Student Council President."
13160-431 = "Got it. But...this isn't gonna be a walk in the park."
13160-432 = "[s] \"It's going to be hard. But we're going to do it, one way or another.\""
13160-434 = "Yes! We won't give up, no matter what! "
13160-435 = "Because that's the way of the Abydos Student Council, a.k.a. the Foreclosure Task Force!"
13160-441 = "(Ayane got embarrassed now, after all that...)"
13160-442 = "[s] \"All right. You all heard the president! Let's move out!\""
13160-443 = "...Yes. "
13160-444 = "...What happened to all that fire?"
13160-445 = "It's just that, I'm not used to this..."
13160-446 = "No, but you were so into the role..."
13160-448 = "Okay. Let's commence Operation Capture Hoshino."
13160-450 = "...And Shiroko's been way too excited since this all started."
13160-452 = "[ns] \"Good. It's time to start our counterattack.\""
13160-453 = "Yes, Abydos Foreclosure Task Force...a.k.a. Abydos Student Council..."
13160-454 = "Let's get going!"
13160-456 = "Next Episode;Pursuit"

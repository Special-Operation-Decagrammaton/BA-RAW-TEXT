[translation]
13160-1 = "第16話;反擊"
13160-9 = "……"
13160-10 = "雖然不太舒服，麻煩在這裡忍耐一下吧，大小姐。"
13160-11 = "你究竟是……"
13160-19 = "……是我。"
13160-20 = "對策委員會很快就會攻過來。#n嗯，按照計畫進行。"
13160-21 = "必須做好萬全的準備。還有……"
13160-23 = "……還有？"
13160-27 = "……奈芙蒂斯背叛了。"
13160-31 = "……果然啊。"
13160-32 = "雖然不是很意外……沒想到這麼快就露出了獠牙。#n阿拜多斯的人果然很危險。"
13160-33 = "……很好。#n我會把警備增強為現在的2倍。"
13160-39 = "哦哦，果然不出我所料。"
13160-40 = "我早就料到那些傢伙會背叛了。"
13160-45 = "不管是「夏萊」還是對策委員會，我都會確實處理掉。"
13160-47 = "……確認完畢。"
13160-48 = "把路障提高到2倍吧。還要準備反戰車地雷。"
13160-66 = "……知道了。"
13160-67 = "呵呵……列車砲啊。開玩笑也要有個限度。"
13160-68 = "自始至終，我們感興趣的從來不是那種過時的武器，而是它所應用的劃時代技術。"
13160-69 = "只要將其納入手中，就能製造出和現在截然不同的新武器。#n畢竟那可是出自天才「雷帝」之手啊。"
13160-70 = "叫來更多市場守衛吧。"
13160-80 = "奈芙蒂斯背叛了……？"
13160-81 = "這樣反而正好。#n我要用它來重振被凱薩信貸超越的事業。"
13160-87 = "唉……又怎麼啦監察官。這種時候還打過來。"
13160-92 = "啊？緊急狀況？#n戰，戰爭！？什麼意思？"
13160-97 = "「沙漠橫貫鐵路」的工程才剛開始耶！？#n……咦？"
13160-98 = "了解！"
13160-102 = "光！好像發生戰鬥了！"
13160-107 = "哦哦──？"
13160-115 = "[ns] 睜開眼睛"
13160-119 = "[USERNAME]老師！？您終於醒了啊？"
13160-120 = "[s] 起身"
13160-124 = "太好了，真是不幸中的大幸。#n老師雖然被捲入了爆炸，卻奇蹟般地毫髮無傷！"
13160-125 = "但是因為過勞的關係，您必須靜養才行……"
13160-132 = "老，老師？您要去哪裡？"
13160-133 = "[s1]「趕不上約好的時間了……」\n[s2]「我要去阿拜多斯。」"
13160-136 = "我明白了～您果然很忙呢。請不要太勉強哦？#n還有，離開之前記得到櫃台繳費！"
13160-150 = "[ns] （直升機在運動場燃燒……）"
13160-156 = "老師……"
13160-157 = "……"
13160-159 = "……"
13160-160 = "老師……星野前輩……前輩他……"
13160-161 = "[s]「大家先回部室吧。」"
13160-162 = "嗯……"
13160-164 = "是……"
13160-165 = "唉，弄得亂七八糟的……得先清理一下才行……"
13160-168 = "（稍微整理一下周圍後，重新在對策委員會的部室集合）"
13160-171 = "……星野前輩一個人走掉了。"
13160-172 = "嗯，還叫我們別跟過去。"
13160-174 = "我阻止不了前輩……都怪我力量不夠。"
13160-175 = "這樣悶悶不樂的，真不像白子前輩。#n白子前輩已經夠強了，只是星野前輩強得太誇張而已。"
13160-176 = "嗯，茜香真善良。"
13160-177 = "咦！？這種時候不是應該像平常一樣吐槽嗎！？"
13160-178 = "唔嗯……"
13160-179 = "……老師，怎麼做才能阻止星野前輩呢？"
13160-180 = "[s] 「這個嘛……」"
13160-181 = "靠武力是行不通的……"
13160-182 = "而且星野前輩當時還說，那是以副學生會長的身分下達的命令……"
13160-183 = "也就是說，他表明了一直以來曖昧的「阿拜多斯學生會」的立場……"
13160-184 = "因為簽下那份契約的是夢會長，也就是阿拜多斯學生會……#n所以才要對策委員會不要插手……"
13160-185 = "救出野乃美前輩，找出列車砲加以破壞，並且承擔所有責任……前輩打算這麼做吧。"
13160-186 = "我們沒有權利阻止星野前輩單打獨鬥嗎……？"
13160-187 = "星野前輩正在否定自己珍貴的回憶……#n對策委員會的野乃美前輩也陷入危機……我們卻只能眼睜睜地看著嗎……？"
13160-189 = "……"
13160-190 = "唔……"
13160-191 = "[s]「想阻止星野嗎？」"
13160-192 = "那當然！"
13160-193 = "嗯，野乃美是我們對策委員會的人，當然要一起去救他才對。"
13160-195 = "說的沒錯，不能讓星野前輩獨自面對！這是我們對策委員會的義務！"
13160-196 = "[s]「嗯，我知道了。」"
13160-197 = "說服星野前輩是最重要的。"
13160-198 = "他又打算一個人承擔一切……#n就算我們成功阻止前輩，如果不能說服前輩也沒有意義……"
13160-199 = "因為現在的星野前輩……是為了貫徹夢會長的意志而丟下我們……"
13160-201 = "嗯。他選擇了以前的女人，丟下身旁的我們一走了之。"
13160-202 = "……怎麼講得像連續劇一樣？"
13160-208 = "但是……該怎麼說服前輩？#n在那之前又該怎麼阻止？"
13160-209 = "現在有老師在……一定會有辦法的。"
13160-210 = "我們真的能辦到嗎……"
13160-211 = "嗯，這是「我們」對策委員會內部的問題。#n一定要用正當的方式阻止星野前輩。"
13160-212 = "內部問題……是嗎。#n得那麼做才能解決……"
13160-214 = "……那麼我來歸納一下必須解決的問題。"
13160-215 = "首先，當務之急是救出野乃美前輩。#n必須阻止前輩被強行轉學到高地人鐵道學園的情況發生。"
13160-216 = "但是現在不知道野乃美前輩在哪裡……#n除了乖乖依照奈芙蒂斯說的，否定「阿拜多斯學生會」之外別無他法。"
13160-217 = "而且「私募基金」的兵力也會妨礙我們參加大會。"
13160-219 = "除此之外……我們還必須阻止獨自離開的星野前輩！"
13160-220 = "理由大致有三個。#n首先，野乃美前輩是對策委員會的一員，由我們去救他是天經地義的事！"
13160-221 = "如果否定這一點，就相當於否定了我們對策委員會的正當性！"
13160-222 = "而且就算是星野前輩，要獨自對付「私募基金」帶來的兵力也是不可能的！#n這樣下去，星野前輩很可能會身負重傷！"
13160-223 = "接下來……必須避免位於阿拜多斯沙漠某處的「列車砲」落入壞人手中。"
13160-224 = "那就必須先知道它的位置……然後再確實釐清所有權……"
13160-225 = "嗯……沒錯。"
13160-226 = "[s3]「真是棘手的勝利條件……」\n[s4]「聽起來真的很困難呢……」"
13160-229 = "過去的學生會，以及如今的對策委員會……"
13160-230 = "我們現在的狀況，就像是要揭開以往不願面對的灰色地帶……"
13160-231 = "彷彿……有人正刻意針對我們的弱點展開攻勢……"
13160-232 = "展開攻勢……？"
13160-233 = "唔嗯……聽起來有點奇怪嗎？#n可是我總是有這種感覺……"
13160-234 = "[s]「雖然有點難說明，但我也覺得不太對勁。」"
13160-235 = "老師也是……？"
13160-236 = "另外……我還希望能解決一件事。"
13160-237 = "是什麼事呢？"
13160-238 = "嗯……我希望星野前輩不要受傷。"
13160-239 = "就像對策委員會對我很重要一樣……#n對星野前輩來說，「阿拜多斯學生會」也是很重要的地方。"
13160-240 = "我不想讓前輩否定它……"
13160-242 = "也就是希望「阿拜多斯學生會」能繼續留下……？#n是這個意思吧，前輩……？"
13160-244 = "……嗯，沒錯。"
13160-245 = "[s]「還必須保住阿拜多斯學生會……」"
13160-246 = "……抱歉，老師，我太任性了。#n不過……"
13160-247 = "[s]「別這麼說，白子。」"
13160-251 = "[ns]「接受學生的任性是大人的責任。別擔心。」"
13160-252 = "……嗯。"
13160-254 = "老師……"
13160-255 = "我也希望別讓星野前輩難過……"
13160-256 = "對策委員會……阿拜多斯學生會…… "
13160-260 = "綾音醬？"
13160-264 = "我們……到底是什麼呢。"
13160-265 = "我們為什麼在阿拜多斯戰鬥……"
13160-266 = "我們……究竟希望成為怎樣的自己……"
13160-268 = "……"
13160-269 = "……"
13160-274 = "[ns]「……好，我知道該怎麼做了。」"
13160-278 = "老師……？"
13160-279 = "[s]「現在就來決定吧。」"
13160-280 = "……？"
13160-281 = "決定……？"
13160-283 = "老師……？"
13160-284 = "[s]「『阿拜多斯學生會』的會長，已經空缺很久了對吧？」"
13160-285 = "算，算是吧……？"
13160-286 = "[s5]「總不能一直讓學生會長的位置空著。」\n[s6]「現在我要舉辦學生會長補選。」"
13160-292 = "補選……？"
13160-293 = "選舉？現在？什麼意思！？"
13160-298 = "學生會長……補選……"
13160-304 = "對了！由我們來選出學生會長就行了！！"
13160-306 = "綾音醬……"
13160-307 = "茜香醬，沒問題的。#n現在阿拜多斯全校60%的學生都在這裡！"
13160-308 = "咦？確，確實5人當中的3人是在這裡沒錯……所以呢……？"
13160-309 = "前學生會長也是這樣選出來的，這個方法具有充分的正當性！"
13160-311 = "[ns7]「沒錯，夢就是這樣當上了學生會長。」 \n[ns8]「所以這麼做，不僅維持了歷史和傳統──」 "
13160-314 = "[ns]「更重要的是，我這個『夏萊』的老師能保證其正當性。」"
13160-316 = "……！！"
13160-317 = "沒錯！"
13160-324 = "我！我要參選！"
13160-329 = "奥空綾音！要參選阿拜多斯的學生會長！！"
13160-333 = "咦！？"
13160-334 = "既然夢學生會長是真正的學生會長……#n那麼現在的選舉也應該具備正當性才對！！"
13160-335 = "[ns]「嗯，既然有候選人出現，我們就簡單地舉手表決吧！」"
13160-338 = "不用管祕密投票原則之類的嗎？#n總之我贊成！"
13160-339 = "嗯，贊成。"
13160-340 = "因為我是候選人的關係，當然也贊成！！"
13160-342 = "[ns9]「那就決定了。在全校60%學生的同意下……」\n[ns10]「由綾音當選學生會長。」"
13160-346 = "[ns11]「在此我以夏萊的顧問……」\n[ns12]「以及阿拜多斯顧問[USERNAME]的身分──」\n[ns13]「──擔保這項決定的成立。」"
13160-356 = "真，真的假的……？#n所以這樣……綾音醬就是學生會長了？"
13160-357 = "嗯。"
13160-358 = "先，先等一下。#n所以現在綾音醬變成「阿拜多斯學生會」的人了嗎？那「對策委員會」呢……？"
13160-359 = "[s]「學生會長，能請你釐清[ruby=我們]對策委員會[/ruby]的定義嗎？」"
13160-365 = "對策委員會……已經被阿拜多斯學生會吸收合併了！"
13160-367 = "……你，你說什麼！？"
13160-369 = "也就是說，「阿拜多斯學生會」和對策委員會，從現在起就是相同的組織。#n為了避免混淆，往後請統一使用「對策委員會」這個名稱！"
13160-370 = "嗯，我明白了。這麼一來兩邊都不會消失了。"
13160-371 = "這樣會不會太亂來了……！？沒問題嗎？"
13160-372 = "這可是學生會長的命令，怎麼會有問題！#n你有意見是嗎？黑見茜香同學！！"
13160-373 = "沒，沒有，當然沒有……"
13160-374 = "那麼「對策委員會」的書記兼「阿拜多斯學生會」的學生會長奥空綾音──#n接下來要傳達我們的任務。"
13160-375 = "鐵，鐵腕統治指的就是這種情況吧……"
13160-376 = "現在我們要攻入債權團大會，維持前任學生會長留下的契約！"
13160-377 = "身為阿拜多斯的學生會，我們完全有繼承那份契約的正當權利！"
13160-378 = "這是前學生會長梔子夢交給學生會的任務！#n我身為繼任的學生會長，絕對不會讓列車砲落入他人手中！"
13160-380 = "嗯。"
13160-381 = "同時，我還會要求奈芙蒂斯集團平安釋放他們強行拘留的野乃美前輩。"
13160-382 = "如果對方不接受這個要求，#n我會將其視為對我們[ruby=對策委員會]「阿拜多斯學生會」[/ruby]的敵對行為並動用武力！"
13160-383 = "[s]「找出野乃美位置的工作就交給我吧。」"
13160-384 = "是！"
13160-385 = "了解！"
13160-386 = "那星野前輩呢？"
13160-391 = "星野前輩……"
13160-396 = "綾，綾音醬……？"
13160-403 = "星野前輩……引發爭議的副學生會長小鳥遊星野前輩……"
13160-406 = "唔，嗯……"
13160-411 = "即刻降格為書記！！"
13160-413 = "（把自己的職務推給了前輩……！？）"
13160-414 = "嗯，所以現在不是副學生會長了。"
13160-416 = "沒錯！因此就算前輩否定「阿拜多斯學生會」也沒用！"
13160-417 = "除了一介書記不具備那種權力之外，他也不能否定[ruby= ・     ・ ]我們[/ruby]確實存在的事實！"
13160-418 = "無論是我們、夢學生會長還是星野前輩自己──任何人都不能否定！"
13160-419 = "謝謝您，老師。#n這樣一切就有辦法解決了！"
13160-421 = "是嗎？解救野乃美前輩的事，只要老師找到位置應該就有辦法……"
13160-422 = "因為星野前輩不再是副學生會長，無法代表契約當事者的關係……#n所以只要我們維持契約，列車砲就不會落入壞人手中……"
13160-423 = "阿拜多斯學生會和對策委員會也不用消失。"
13160-424 = "真，真的耶。#n一切好像都解決了……？"
13160-426 = "沒錯！現在只剩下一件事！"
13160-427 = "那就是在今天12點之前，參加債權團大會維持契約！#n同時必須在過程中阻止星野前輩，並救出野乃美前輩！"
13160-428 = "為了達成目標……我們必須設法戰勝「私募基金」的兵力。"
13160-430 = "嗯，知道了。學生會長。"
13160-431 = "接下來……必須動用武力了呢。#n感覺實在不太容易……"
13160-432 = "[s]「雖然困難，但總會有辦法的。」"
13160-434 = "沒錯！！無論是維持契約還是救人，我們都不會放棄！"
13160-435 = "這就是[ruby=對策委員會]「阿拜多斯學生會」[/ruby]的作法！"
13160-441 = "（突然害羞了嗎，綾音醬……？）"
13160-442 = "[s]「大家都聽到學生會長的指示了吧？準備出動囉。」"
13160-443 = "……是。"
13160-444 = "前後角色的變化真大……"
13160-445 = "我明明不擅長做這種事……"
13160-446 = "明明就很得心應手……"
13160-448 = "嗯，那麼就開始星野前輩捕獲作戰吧。"
13160-450 = "……你看起來很興奮的樣子耶，白子前輩。"
13160-452 = "[ns]「好，該展開反擊了。」"
13160-453 = "阿拜多斯廢校對策委員會，兼阿拜多斯學生會……簡稱對策委員會……"
13160-454 = "立刻出發！"
13160-456 = "下一話;追擊"

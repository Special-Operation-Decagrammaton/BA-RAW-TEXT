[translation]
13160-1 = "ตอนที่ 16;จู่โจมกลับ"
13160-9 = "..."
13160-10 = "ถึงจะไม่สบายตัว แต่อดทนอยู่ที่นี่อีกนิดนะ คุณหนู"
13160-11 = "คุณคือ..."
13160-19 = "ฉันเอง... "
13160-20 = "เดี๋ยวคณะกรรมการแผนงานก็จะเข้ามาโจมตีแล้ว ใช่ เป็นไปตามคาดเลย "
13160-21 = "เพราะงั้นต้องเตรียมตัวให้หนาแน่น แล้วก็..."
13160-23 = "แล้วก็...?"
13160-27 = "เนฟธิสทรยศ..."
13160-31 = "งั้นเหรอ..."
13160-32 = "ถึงจะไม่ใช่เรื่องที่คาดไม่ถึง... แต่ก็เผยธาตุแท้ออกมาแล้วสินะ พวกเด็กอะบิดอสนี่อันตรายจริงๆ นะครับ"
13160-33 = "ก็ดีครับ เราจะเพิ่มการคุ้มกันเป็น 2 เท่าเลย "
13160-39 = "โอ้ เป็นอย่างนี้สินะ"
13160-40 = "ก็ดี คิดไว้อยู่แล้วละว่าคนพวกนั้นจะทรยศ"
13160-45 = "ไม่ว่าจะ <ชาเล่ต์> หรือคณะกรรมการแผนงาน ฉันจะจัดการให้เรียบเลย"
13160-47 = "เข้าใจแล้ว"
13160-48 = "ฉันจะเสริมสิ่งกีดขวางให้เป็น 2 เท่า จะเพิ่มทุ่นระเบิดทำลายยานพาหนะให้ด้วย"
13160-66 = "เข้าใจแล้วครับ "
13160-67 = "หึหึ... ปืนแม่เหล็กไฟฟ้าอย่างนั้นเหรอ ถ้าจะล้อกันเล่น ก็เอาให้มันพอดีๆ เถอะน่า"
13160-68 = "พวกผมไม่สนใจอาวุธล้าสมัยแบบนั้นหรอกครับ เป้าหมายของพวกผมคือเทคโนโลยีล้ำหน้าที่ใช้กับ#nอาวุธนั้นต่างหาก "
13160-69 = "เพราะถ้ามีสิ่งนั้น เราก็จะสร้างอาวุธใหม่ที่ไม่เคยมีมาก่อนได้ เพราะนั่นเป็นสิ่งที่ <ผู้เหี้ยมโหด> สุดอัจฉริยะสร้างไว้นี่ครับ"
13160-70 = "เข้าใจแล้วครับ ผมจะเพิ่มกองกำลังผู้คุมตลาดมืดให้ "
13160-80 = "เนฟธิสทรยศงั้นเหรอ...?"
13160-81 = "งั้นก็ถือเป็นเรื่องดีสิ ธุรกิจของเราที่โดนสินเชื่อไคเซอร์แซงหน้าไปจะได้กลับมาได้อีกครั้ง"
13160-87 = "ฮ้าว... อะไรกันน่ะ ผู้ควบคุม นี่มันกี่โมงกี่ยามกัน... "
13160-92 = "ห้ะ? สถานการณ์ฉุกเฉิน? สะ... สงครามเหรอ?! หมายความว่ายังไงน่ะ?"
13160-97 = "ว่าไงนะ?! การก่อสร้าง <ทางรถไฟข้ามทะเลทราย> เพิ่งจะเริ่มไปเองนะ เป็นแบบนี้ได้ยังไง?!"
13160-98 = "เข้าใจแล้ว!"
13160-102 = "ฮิคาริ! น่าจะเริ่มต่อสู้อะไรกันแล้วน่ะ!"
13160-107 = "โอ้ว?"
13160-115 = "[ns] ลืมตา"
13160-119 = "คุณครู [USERNAME]?! ฟื้นแล้วเหรอคะ? "
13160-120 = "[s] ลุกออกจากเตียง"
13160-124 = "โล่งอกไปทีค่ะ นี่เป็นโชคดีในโชคร้ายหรือเปล่านะ โดนระเบิดตั้งขนาดนั้น แต่คุณครูกลับไม่มีบาดแผล#nอะไรเลย อย่างกับปาฏิหาริย์เลยค่ะ!"
13160-125 = "แต่คุณครูก็ต้องพักสักหน่อยเพราะความอิดโรยจากการทำงานหนักนะคะ..."
13160-132 = "อ้าว คะ... คุณครู? จะไปไหนคะ?"
13160-133 = "[s1] \"ไม่ทันเวลานัดแล้ว...\"\n[s2] \"ขอไปอะบิดอสก่อนละ\""
13160-136 = "ค่ะ~ งานยุ่งเหมือนเดิมเลย แต่ก็อย่าหักโหมนะคะ แล้วก็ไปชำระค่ารักษาที่แผนกธุรการก่อนนะคะ"
13160-150 = "[ns] (เฮลิคอปเตอร์หลายลำในสนามกีฬากำลังลุกเป็นไฟ...)"
13160-156 = "คุณครู..."
13160-157 = "..."
13160-159 = "..."
13160-160 = "คุณครู... รุ่นพี่โฮชิโนะน่ะ... รุ่นพี่..."
13160-161 = "[s] \"เข้าไปในห้องเรียนก่อนนะ ทุกคน\" "
13160-162 = "อืม..."
13160-164 = "ค่ะ... "
13160-165 = "เฮ้อ... ดูสภาพฉันสิ... เห็นทีต้องขอตัวไปอาบน้ำก่อน... "
13160-168 = "(หลังจากจัดพื้นที่โดยรอบให้เป็นระเบียบ คณะกรรมการแผนงานก็มารวมตัวกันในห้องชมรม)"
13160-171 = "รุ่นพี่โฮชิโนะออกไปคนเดียวค่ะ..."
13160-172 = "อืม แล้วก็บอกพวกเราว่าไม่ต้องตามไป"
13160-174 = "ฉันห้ามรุ่นพี่ไว้ไม่ได้... ฉันเก่งไม่พอน่ะ..."
13160-175 = "ทำไมถึงทำหน้าเศร้าแบบนั้นล่ะ ไม่สมกับเป็นรุ่นพี่ชิโรโกะเลยนะ รุ่นพี่ชิโรโกะเองก็เก่งพอตัวอยู่แล้ว แต่ปัญหาอยู่ที่รุ่นพี่โฮชิโนะที่เก่งเกินไปต่างหาก"
13160-176 = "อืม เซริกะอ่อนโยนจังเลยนะ"
13160-177 = "อะไรกัน?! ปกติแล้วเวลาแบบนี้ต้องไม่คล้อยตามฉันไม่ใช่เหรอ?! "
13160-178 = "อืม..."
13160-179 = "คุณครู... ทำยังไงเราถึงจะหยุดรุ่นพี่โฮชิโนะได้เหรอคะ?"
13160-180 = "[s] \"อืม...\""
13160-181 = "ถ้าด้วยกำลังน่ะไม่ไหวหรอก..."
13160-182 = "แล้วรุ่นพี่โฮชิโนะก็ออกคำสั่งในฐานะรองประธานนักเรียนไปแล้วด้วย..."
13160-183 = "เท่ากับว่ารุ่นพี่ประกาศจุดยืนอย่างชัดเจนในฐานะ <สภานักเรียนอะบิดอส> ที่มีอยู่อย่างคลุมเครือมาถึง#nปัจจุบันค่ะ..."
13160-184 = "คนที่ทำสัญญาคือประธานยูเมะผู้เป็นสภานักเรียนอะบิดอส จึงให้คณะกรรมการแผนงานถอยออกไป... "
13160-185 = "แล้วตัวเองก็จะไปช่วยรุ่นพี่โนโนมิ ไปตามหาและทำลายปืนแม่เหล็กไฟฟ้า และจะเป็นผู้รับผิดชอบทุก#nอย่างด้วยค่ะ..."
13160-186 = "พวกเราไม่มีอำนาจที่จะขัดขวางการต่อสู้ของรุ่นพี่โฮชิโนะเลยเหรอคะ...?"
13160-187 = "รุ่นพี่โฮชิโนะจะไปปฏิเสธความทรงจำอันล้ำค่าด้วยตัวเอง... รุ่นพี่โนโนมิของคณะกรรมการแผนงานก็#nกำลังตกอยู่ในอันตราย... พวกเราทำอะไรไม่ได้นอกจากเฝ้ามองอยู่ตรงนี้เหรอคะ...?"
13160-189 = "..."
13160-190 = "ฮึ่ม..."
13160-191 = "[s] \"อยากขวางโฮชิโนะเหรอ?\""
13160-192 = "ก็ใช่น่ะสิ! "
13160-193 = "อืม โนโนมิคือคณะกรรมการแผนงาน พวกเราต้องไปช่วยโนโนมิด้วยกันอยู่แล้ว"
13160-195 = "ค่ะ ใช่ค่ะ เราจะปล่อยให้รุ่นพี่โฮชิโนะไปต่อสู้กับอันตรายแบบนั้นตัวคนเดียวไม่ได้ค่ะ ในฐานะคณะกรรมการแผนงานแล้ว นั่นเป็นสิ่งที่ไม่ถูกต้องค่ะ"
13160-196 = "[s] \"ใช่ ใช่แล้วละ... \""
13160-197 = "เราต้องโน้มน้าวจิตใจรุ่นพี่โฮชิโนะค่ะ นั่นคือสิ่งสำคัญที่สุด"
13160-198 = "รุ่นพี่พยายามจะแก้ไขทุกอย่างด้วยตัวเองนี่คะ ต่อให้เราไปขัดขวางการกระทำไว้ก็ไม่มีความหมาย#nอะไรหรอกค่ะ เพราะยังไงภายในใจก็ยังคงคิดเหมือนเดิม... "
13160-199 = "ตอนนี้รุ่นพี่โฮชิโนะ... ทิ้งพวกเราไปเพื่อทำตามความต้องการของประธานยูเมะน่ะค่ะ"
13160-201 = "ใช่ รุ่นพี่เลือกผู้หญิงในอดีต แล้วทิ้งพวกเราที่อยู่เคียงข้างในช่วงเวลานี้ไว้"
13160-202 = "จู่ๆ ก็เป็นพล็อตละครขึ้นมาซะงั้น...?"
13160-208 = "แต่ว่า... เราจะต้อง... โน้มน้าวรุ่นพี่ยังไงดีล่ะ? ไม่สิ หรือว่าเราต้องขัดขวางให้ได้ก่อน? แล้วจะขวางยังไง?"
13160-209 = "ตอนนี้เรามีคุณครูอยู่ทั้งคน... ยังไงก็ต้องทำได้"
13160-210 = "ลำพังแค่พวกเราจะได้เหรอ..."
13160-211 = "อื้ม นี่คืองานภายในของ <พวกเรา> คณะกรรมการแผนงาน เราต้องขวางรุ่นพี่โฮชิโนะด้วยวิธีการที่#nเหมาะสมให้ได้"
13160-212 = "งานภายใน... งั้นเหรอ นั่นเป็นทางเดียวที่เราจะแก้ไขเรื่องนี้ได้สินะ..."
13160-214 = "ค่ะ... มาสรุปงานของเรากันค่ะ"
13160-215 = "งานสำคัญที่สุดของเราคือ เราต้องไปช่วยรุ่นพี่โนโนมิให้ได้ เราต้องขัดขวางไม่ให้รุ่นพี่ถูกบังคับย้ายไป#nโรงเรียนไฮแลนเดอร์ค่ะ"
13160-216 = "แต่ตอนนี้เราไม่รู้ว่ารุ่นพี่โนโนมิอยู่ที่ไหน... ก็เลยไม่มีทางเลือกอื่นนอกจากปฏิเสธการมีอยู่ของ <สภานักเรียนอะบิดอส> ตามที่เนฟธิสสั่งแต่โดยดี"
13160-217 = "แล้วกองกำลังของ <กองทุนไพรเวทอิควิตี้> ก็จะขัดขวางเราไม่ให้ไปเข้าร่วมการประชุม"
13160-219 = "ค่ะ และต่อจากนั้น... เราก็ต้องขัดขวางรุ่นพี่โฮชิโนะที่ฉายเดี่ยวออกไปค่ะ!"
13160-220 = "เรามี 3 เหตุผลใหญ่ๆ ที่ต้องขวางรุ่นพี่ไว้ อย่างแรกคือ รุ่นพี่โนโนมิเป็นหนึ่งในสมาชิกของ#nคณะกรรมการแผนงาน แน่นอนอยู่แล้วที่พวกเราต้องไปช่วยค่ะ!"
13160-221 = "ถ้าพวกเราปฏิเสธเรื่องนี้ ความชอบธรรมของคณะกรรมการแผนงานของพวกเราก็จะถูกปฏิเสธไปด้วย"
13160-222 = "เหตุผลข้อที่ 2 ก็คือ รุ่นพี่โฮชิโนะเพียงคนเดียวต้านทานกองกำลังทั้งหมดที่ <กองทุนไพรเวทอิควิตี้> ขนมาไม่ไหวหรอกค่ะ! ถ้าปล่อยให้ไปสู้คนเดียว รุ่นพี่โฮชิโนะต้องบาดเจ็บหนักแน่ๆ "
13160-223 = "และเหตุผลข้อสุดท้าย... เราจะให้ <ปืนแม่เหล็กไฟฟ้า> ที่อยู่ที่ไหนสักแห่งในทะเลทรายอะบิดอส#nตกไปอยู่ในมือของคนเลวไม่ได้ค่ะ"
13160-224 = "และถ้าจะทำอย่างนั้น เราต้องเริ่มจากการหาว่ามันอยู่ที่ไหน... แล้วก็จัดการเรื่องกรรมสิทธิ์ให้แน่ชัด..."
13160-225 = "อืม... ใช่แล้วค่ะ "
13160-226 = "[s3] \"ต้องทำหลายอย่างเลยนะ...\"\n[s4] \"ฟังดูยากจริงๆ เลยนะ...\""
13160-229 = "ค่ะ... นั่นสินะคะ สภานักเรียนในอดีต และคณะกรรมการแผนงานในปัจจุบัน..."
13160-230 = "เหมือนเราต้องไปพลิกพื้นที่สีเทาสุดคลุมเครือที่พวกเรามองข้ามกันมาตลอดเลยค่ะ... "
13160-231 = "ราวกับว่า... มีใครบางคนวิเคราะห์จุดอ่อนของพวกเราและโจมตีพวกเราอยู่อย่างนั้นละ"
13160-232 = "วิเคราะห์จุดอ่อนแล้วโจมตีงั้นเหรอ...?"
13160-233 = "อืม... ฉันรู้สึกอย่างนั้นน่ะ..."
13160-234 = "[s] \"ครูก็รู้สึกว่ามีอะไรแปลกๆ เหมือนกัน แต่อธิบายออกมาไม่ได้น่ะ\""
13160-235 = "คุณครูก็ด้วยเหรอ...?"
13160-236 = "ยังมีอีกอย่างที่ฉันอยากเพิ่มไปด้วยน่ะ..."
13160-237 = "อะไรเหรอคะ?"
13160-238 = "อืม... ฉันไม่อยากให้รุ่นพี่โฮชิโนะเจ็บปวด"
13160-239 = "เช่นเดียวกับที่คณะกรรมการแผนงานมีค่ากับฉัน... สำหรับรุ่นพี่โฮชิโนะแล้ว <สภานักเรียนอะบิดอส> ก็เป็นที่ที่มีค่าเหมือนกัน "
13160-240 = "ฉันไม่อยากให้รุ่นพี่ไปปฏิเสธการมีอยู่ของสภาด้วยตัวเอง..."
13160-242 = "แปลว่าอยากให้ <สภานักเรียนอะบิดอส> คงอยู่เหมือนเดิมเหรอ...? ชะ... ใช่มั้ย? รุ่นพี่...?"
13160-244 = "อื้ม ฉันอยากให้เป็นอย่างนั้น"
13160-245 = "[s] \"แล้วก็ต้องคงสภานักเรียนอะบิดอสไว้ด้วย...\""
13160-246 = "คุณครู... ขอโทษที่พวกเราดื้อดึงนะ แต่ว่า..."
13160-247 = "[s] \"เปล่าเลย ไม่หรอก ชิโรโกะ\""
13160-251 = "[ns] \"ผู้ใหญ่ต้องรับมือกับความดื้อแบบนั้นอยู่แล้ว ไม่เป็นไรนะ\""
13160-252 = "อืม..."
13160-254 = "คุณครู..."
13160-255 = "นั่นสินะ... ถ้ารุ่นพี่โฮชิโนะไม่ต้องเสียใจก็คงจะดี..."
13160-256 = "คณะกรรมการแผนงาน... สภานักเรียนอะบิดอส... "
13160-260 = "อายาเนะจัง?"
13160-264 = "ที่จริงแล้ว... พวกเราคืออะไรเหรอคะ?"
13160-265 = "ทำไมเราถึงมาสู้กันในอะบิดอสเหรอคะ...? "
13160-266 = "พวกเรา... ต้องการให้พวกเราเป็นอะไรกันเหรอ...?"
13160-268 = "..."
13160-269 = "..."
13160-274 = "[ns] \"ดีละ... ครูรู้วิธีแล้ว\""
13160-278 = "คุณครู...?"

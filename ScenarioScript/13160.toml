13160-342 = "[ns9] \"งั้นก็รู้ผลแล้ว ได้ความเห็นชอบเกิน 60% ของนักเรียนทั้งโรงเรียน\"\n[ns10] \"อายาเนะได้รับเลือกให้เป็นประธานสภานักเรียน\""
13160-346 = "[ns11] \"ครู [USERNAME] ผู้เป็นที่ปรึกษาชาเล่ต์\"\n[ns12] \"และครูที่ปรึกษาของอะบิดอส\"\n[ns13] \"ขอรับรองผลการเลือกตั้งนี้\""
13160-356 = "จะ... จริงเหรอ? แบบนี้...? อายาเนะคือประธานสภานักเรียนแล้วเหรอ?"
13160-357 = "อื้ม ใช่"
13160-358 = "ดะ... เดี๋ยวนะ แล้วจะเป็นยังไงต่อเหรอ? ตอนนี้อายาเนะจังคือ <สภานักเรียนอะบิดอส> งั้นเหรอ? แล้ว <คณะกรรมการแผนงาน> ล่ะ...?"
13160-359 = "[s] \"ท่านประธานสภานักเรียน จากนี้คณะกรรมการแผนงานจะเป็นยังไง?\""
13160-365 = "คณะกรรมการแผนงาน... ถูกหลอมรวมเป็นหนึ่งกับสภานักเรียนอะบิดอสแล้วค่ะ! เมื่อกี้นี้เลยค่ะ!"
13160-367 = "วะ... ว่าไงนะ?!"
13160-369 = "ตั้งแต่นี้ไป <สภานักเรียนอะบิดอส> กับคณะกรรมการแผนงานคือสิ่งเดียวกันค่ะ โดยรวมเป็นหนึ่งเดียว#nกันในชื่อ <คณะกรรมการแผนงาน> ถ้ามี 2 ชื่อจะสับสนเอาได้ งั้นก็ขอให้เรียกชื่อให้เหมือนกันนะคะ!"
13160-370 = "อื้ม เข้าใจแล้ว แบบนี้ทั้ง 2 กลุ่มก็จะไม่หายไป"
13160-371 = "แบบนี้มันดันทุรังกันมากไปหรือเปล่า...?! มะ... ไม่เป็นไรจริงเหรอ?"
13160-372 = "ไม่เป็นไรหรอกค่ะ นี่เป็นคำสั่งของประธานสภานักเรียนค่ะ! หรือมีอะไรไม่พอใจคะ คุณคุโรมิ เซริกะ?!!"
13160-373 = "มะ... ไม่ ไม่มี... "
13160-374 = "จากนี้ไปโอคุโซระ อายาเนะ ตำแหน่งเลขา <คณะกรรมการแผนงาน> และประธานของ <สภานักเรียนอะบิดอส> จะขอมอบหน้าที่ให้ทุกคนค่ะ"
13160-375 = "นะ... นี่สินะ การปกครองด้วยกำปั้นเหล็ก..."
13160-376 = "จากนี้ไปพวกเราจะบุกเข้าไปที่การประชุมสมัชชาเจ้าหนี้ แล้วรักษาสัญญาที่ท่านประธานสภานักเรียน#nคนก่อนทิ้งไว้!"
13160-377 = "ในฐานะของประธานสภานักเรียนอะบิดอส พวกเรามีสิทธิ์อันชอบธรรมที่จะสืบทอดสัญญาฉบับนั้นค่ะ! "
13160-378 = "นี่คือหน้าที่ของสภานักเรียนที่ท่านประธานสภานักเรียนคุจินาชิ ยูเมะสั่งเอาไว้! และในฐานะของ#nประธานสภานักเรียนที่มารับช่วงต่อ ฉันจะไม่ให้ใครหน้าไหนมาครอบครองปืนแม่เหล็กไฟฟ้าได้ค่ะ!"
13160-380 = "อื้ม "
13160-381 = "แล้วฉันก็ขอร้องให้มีการปล่อยตัวรุ่นพี่โนโนมิที่ถูกเนฟธิสกรุ๊ปกักขังไว้ และจะต้องกลับมาอย่าง#nปลอดภัยเท่านั้นค่ะ!"
13160-382 = "ถ้าไม่ยอมรับคำขอนี้ ฉันจะถือว่าเป็นการกระทำที่เป็นปฏิปักษ์ต่อ [ruby=คณะกรรมการแผนงาน]<สภานักเรียนอะบิดอส>[/ruby] และฉันจะใช้กำลังโต้กลับอย่างไม่มีการประนีประนอมค่ะ!"
13160-383 = "[s] \"ครูน่าจะหาตำแหน่งของโนโนมิได้ หลังจากนั้นเราไปช่วยด้วยกันนะ\""

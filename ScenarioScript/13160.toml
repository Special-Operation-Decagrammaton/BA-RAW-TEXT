13160-445 = "แต่ฉันไม่คุ้นเคยกับงานแบบนี้เลย..."
13160-446 = "อะไรกัน ดูจะทำได้ดีกว่าคนอื่นอีกนะ..."
13160-448 = "อืม ถ้างั้นเราจะเริ่มแผนการจับกุมรุ่นพี่โฮชิโนะกัน"
13160-450 = "ดูตื่นเต้นมากตั้งแต่เมื่อกี้แล้วนะ... รุ่นพี่ชิโรโกะ"
13160-452 = "[ns] \"ดีละ มาเริ่มจู่โจมกลับกันเลย\""
13160-453 = "ค่ะ คณะกรรมการแผนงานอะบิดอสและสภานักเรียนอะบิดอส... ย่อสั้นๆ ว่าคณะกรรมการแผนงาน..."

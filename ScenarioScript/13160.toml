13160-292 = "เลือกตั้งซ่อม...?"
13160-293 = "ซะ... ซ่อมอะไรนะ? ตอนนี้เลยเหรอ? หมายความว่ายังไงน่ะ?! "
13160-298 = "เลือกตั้งซ่อม... ประธานสภานักเรียน..."
13160-304 = "ใช่ค่ะ! แค่พวกเราต้องเลือกประธานสภานักเรียน!!"
13160-306 = "อายาเนะจัง...?"
13160-307 = "เซริกะจัง เราทำได้นะ เพราะตอนนี้ 60% ของนักเรียนอะบิดอสก็อยู่กันที่นี่!"
13160-308 = "มีกัน 3 คนจากทั้งหมด 5 คน มันก็จริงอยู่หรอก แต่ว่า... แล้วยังไงต่อล่ะ...?"
13160-309 = "ท่านประธานสภานักเรียนคนก่อนก็ได้รับเลือกแบบนี้เหมือนกันนี่นา งั้นวิธีนี้ก็ถือว่าสมเหตุสมผลแล้วละ! "
13160-311 = "[ns7] \"ใช่ เพราะยูเมะได้เป็นประธานสภานักเรียนอย่างเหมาะสมด้วยวิธีนี้\" \n[ns8] \"ประวัติศาสตร์และธรรมเนียมก็เลยได้รับการรับรอง\" "
13160-314 = "[ns] \"แล้วครูที่เป็นครูจาก <ชาเล่ต์> ก็จะรับรองความชอบธรรมนั้นให้เอง\""
13160-316 = "...!!"
13160-317 = "ค่ะ! ใช่ค่ะ! "
13160-324 = "ฉันค่ะ! ฉันขอลงสมัครเลือกตั้งค่ะ!"
13160-329 = "โอคุโซระ อายาเนะ! ขอลงสมัครชิงตำแหน่งประธานสภานักเรียนอะบิดอสค่ะ!!"
13160-333 = "ว่าไงนะ?!"
13160-334 = "เพราะท่านประธานยูเมะคือท่านประธานสภานักเรียนจริงๆ... เพราะงั้นการเลือกตั้งที่จะเกิดนับตั้งแต่นี้ก็#nจะเป็นการเลือกตั้งที่ชอบธรรมเช่นกัน!!"
13160-335 = "[ns] \"อื้ม ในเมื่อได้ผู้ลงสมัครแล้ว เราก็จะลงคะแนนอย่างรวบรัดกันเลย\""
13160-338 = "ลงคะแนนแบบเปิดเผยตัวได้ใช่มั้ย? ฉันโหวตเห็นชอบ!"
13160-339 = "อื้ม ฉันด้วย "

[translation]
13260-1 = "ตอนที่ 26;การต่อสู้ครั้งสุดท้าย 2"
13260-4 = "[ns] \"...!!!\""
13260-5 = "แฮ่ก... แฮ่ก..."
13260-6 = "ขะ... แข็งแกร่งมากเลย..."
13260-7 = "นี่คือพลังที่แท้จริงของรุ่นพี่โฮชิโนะเหรอ...?"
13260-9 = "เรา... เรายังสู้กันได้อีกค่ะ...!!"
13260-11 = "ไม่หรอก ยอมแพ้กันแค่นี้เถอะ"
13260-16 = "อ่า... ขะ... ขาฉันไม่มีแรงแล้ว..."
13260-20 = "รุ่นพี่โนโนมิ! เป็นยังไงบ้าง?"
13260-21 = "ฉะ... ฉันก็ขยับตัวไม่ไหวแล้วค่ะ..."
13260-22 = "อะ... อึก... ที่จริงฉันก็... แทบจะลุกไม่ขึ้นตั้งแต่เมื่อกี้แล้ว..."
13260-27 = "แฮ่ก... แฮ่ก..."
13260-28 = "ชิโรโกะจัง... ยังสู้ต่อได้อยู่งั้นเหรอ?"
13260-32 = "เข้ามาเลย... มาดวลกัน"
13260-33 = "ยอมแพ้ไปจะดีกว่านะ... สู้แบบ 4:1 ยังไม่ไหวกันเลย แล้วคิดว่าคนเดียวจะไหวเหรอ?"
13260-34 = "ฉันไม่ฟังคำพูดของคนที่อ่อนแอกว่าฉันหรอก เพราะงั้นก็เข้ามาเลย โฮชิโนะ"
13260-35 = "..."
13260-36 = "ใช่ ตอนนั้นก็สู้มาแล้วครั้งหนึ่ง ฉันไม่แพ้หรอก"
13260-37 = "งั้นเหรอ..."

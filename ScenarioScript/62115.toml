[translation]
62115-4 = "唔……！"
62115-5 = "老師！！"
62115-6 = "[s]「暫時先撤退吧！」"
62115-11 = "大家都沒事吧！？"
62115-16 = "嗯，嗯……！"
62115-17 = "其他奧利斯的孩子們好像也趁機躲起來了……！"
62115-19 = "……不過天使們依然在波塔帕西斯周圍徘徊。#n簡直……就像在尋找下一個獵物一樣。"
62115-20 = "該，該怎麼辦……#n至少得先知道那個天使是什麼東西，我們才能……"
62115-22 = "（就在大家都感到束手無策的時候）"
62115-23 = "（槍聲與交火都停了下來，空氣中只瀰漫著詭異的沉默）"
62115-24 = "（下一秒，MomoTalk響了……！）"
62115-27 = "[ns]「咦？這個表情符號是……？」"
62115-29 = "揮著白旗的表情符號？#n這是……？"
62115-30 = "白旗一般是代表投降的意思吧。#n這種時候是要投什麼降……"
62115-31 = "[s]「不……我好像懂了！我們去看看吧！」"
62115-33 = "（盡可能小心地前往了MomoTalk上提到的地點）"
62115-37 = "應該是這裡沒錯……"
62115-38 = "有，有人在嗎……？#n這裡有沒有人……？"
62115-43 = "老師！小隊的大家！"
62115-44 = "還有你……"
62115-45 = "你，你們好……又見面了呢。#n雖然是在這種地方……"
62115-46 = "……原來你去找老師了啊。"
62115-47 = "嗯，嗯。"
62115-48 = "做得好。我們很擔心你呢。#n非常謝謝您，老師。"
62115-49 = "[s1]「別客氣，這是應該的。」\n[s2]「不過……為什麼要找我們過來呢？」"
62115-52 = "啊，嗯。關於這件事……"
62115-53 = "我們……知道一條小路。"
62115-55 = "小路？"
62115-57 = "是的。我們剛才已經確認過，那些天使對那條路沒有反應了。"
62115-58 = "……雖然很害怕會被抓走，不過幸好成功了。"
62115-59 = "但是還是要盡可能小心，以免被發現比較好。"
62115-61 = "……這樣啊，謝謝你們。#n剛才一定很危險吧……"
62115-63 = "嘿嘿。這不算什麼。#n因為老師……感覺是一個好大人。"
62115-64 = "而且也幫了我們很多忙，所以我們也希望能做點什麼……"
62115-65 = "現在說這種話可能有點好笑，不過學習的時光確實挺棒的……"
62115-66 = "上課雖然無聊，卻也還算有趣。#n咦？這句話是不是說得有點怪怪的啊……"
62115-67 = "[s3]「謝謝你老實說上課無聊……」\n[s4]「我會再多花點功夫準備課程的……」"
62115-70 = "沒，沒有啦。#n沙織前輩擔任老師這件事，讓人有種很新奇的感覺。"
62115-72 = "……"
62115-74 = "至於敦子同學的課……怎麼說呢……"
62115-75 = "不知道為什麼，總覺得挺有意思的。#n雖然可能稱不上有趣就是了……"
62115-77 = "呵呵，謝謝你。#n這可能是因為專業領域不同的關係吧？"
62115-79 = "微積分用背的多少能解題，但三角函數我就真的搞不懂了……"
62115-81 = "……那只是因為你背得還不夠熟而已。"
62115-82 = "……"
62115-84 = "……我也很期待日和同學下次的課程哦。上次的課真的很棒。"
62115-86 = "謝，謝謝……！"
62115-91 = "雖然還不太理解考試是什麼……總之就是覺得很新鮮。每分每秒都是。"
62115-92 = "能夠有人……"
62115-93 = "願意教導我們傷人以外的事，還溫柔地對待我們……感覺真的很好。"
62115-94 = "是啊。就算那些……"
62115-95 = "只是短暫體驗之後就必須結束的活動也一樣。"
62115-96 = "[s]「那並不是活動。」"
62115-97 = "咦……？"
62115-98 = "[s]「而是你們所有人本來就該享有的日常。」"
62115-99 = "每天……都能過那種生活……？"
62115-100 = "……"
62115-101 = "對不起。我有點難以想像……"
62115-102 = "話，話說……我們的事情好像聊太久了呢。"
62115-103 = "各位是來跟昴前輩談談的對吧？#n這邊請，我們帶各位走小路。"
62115-109 = "就是這裡。#n從那邊的樓梯進去之後……就能進入通往地下紀錄保管庫的後門。"
62115-110 = "我們也不知道昴前輩現在在做什麼……因為他說過不准任何人進去。"
62115-111 = "希望老師想談的事情能夠一切順利。"
62115-112 = "當初要不是有昴前輩在……#n留在奧利斯的大家可能早就四散各處……已經消失不見了也說不定……"
62115-113 = "[s5]「我會盡我所能。」\n[s6]「我會把離家出走的學生找回來，讓他乖乖坐在教室裡的！」"
62115-116 = "是，老師！"
62115-120 = "這座樓梯還真深啊……"
62115-125 = "嗚嗚……感覺就像經典裡通往深淵的道路一樣……"
62115-130 = "真想開個燈之類的……不過應該不行吧……？"
62115-135 = "是啊。畢竟現在還不能被任何人發現。"
62115-140 = "唔……！？"
62115-145 = "[ns]「敦子！？」"
62115-146 = "敦子！？"
62115-147 = "謝謝你接住我，老師。#n不過……大家都沒事嗎？"
62115-152 = "剛才怎麼了嗎？是不是被石頭絆倒了？"
62115-153 = "除了看不太清楚前面之外，好像沒什麼問題……？"
62115-154 = "嗯，我也沒察覺到什麼異狀。"
62115-156 = "……這樣啊。#n也就是說……"
62115-157 = "（只有我能感應到這種感覺嗎……）"
62115-158 = "（……有股很強烈的壓迫感。彷彿有人正抓著我的腦袋用力搖晃一樣）"
62115-159 = "（一旦稍微分心，意識就會立刻……！）"
62115-160 = "咦……？"
62115-161 = "怎麼了？你也有不對勁的感覺嗎？"
62115-162 = "我，我也不知道。#n為什麼會突然，有股非常……"
62115-163 = "悲傷、害怕……痛苦的感覺……"
62115-164 = "不是出自於我的內心，而像是從外面不斷地湧進來……"
62115-172 = "你終究還是來到這裡了啊，老師。"
62115-173 = "[s]「昴！」"
62115-177 = "前……輩？"
62115-178 = "你，你怎麼了……？#n發生了什麼事嗎……？"
62115-184 = "……"
62115-185 = "我大概能猜到老師的來意，總之先換個地方再說吧。"
62115-186 = "畢竟波塔帕西斯和奧利斯，沉睡著太多我們未知的東西。"
62115-188 = "流逝時光的聖劇篇;To be Continued in Chapter 3"

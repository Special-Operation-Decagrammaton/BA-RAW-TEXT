[translation]
62115-4 = "Ugh...!"
62115-5 = "Sensei?!"
62115-6 = "[s] \"Let's fall back for now!\""
62115-11 = "Is everyone okay?!"
62115-16 = "Y-Yes...!"
62115-17 = "It seems like the other Arius students also took the opportunity to hide."
62115-19 = "...But the angels are still wandering around Porta Pacis. Like...they're looking for their next target."
62115-20 = "Wh-What should we do...? We don't even know what they are yet..."
62115-22 = "No one knew what to say or do."
62115-23 = "The gunshots and standoffs gradually fell off, and an eerie silence settled in."
62115-24 = "The chime of a MomoTalk finally shattered the tension."
62115-27 = "[ns] \"Huh? Isn't this emote...\""
62115-29 = "A waving white flag? That's...?"
62115-30 = "That signals surrender, doesn't it? What exactly are they even surrendering to here?"
62115-31 = "[s] \"No, wait! I get it! Let's go meet them!\""
62115-33 = "Cautiously, we went to the location detailed in the MomoTalk."
62115-37 = "Well, we're here..."
62115-38 = "H-Hello...? Is anyone there...?"
62115-43 = "Sensei! And the Squad!"
62115-44 = "And you..."
62115-45 = "H-Hi... We meet again... Although, maybe not in the best circumstances."
62115-46 = "...So you went to Sensei."
62115-47 = "Y-Yeah."
62115-48 = "That's a relief. Thank you for looking after her, Sensei. We were all worried. "
62115-49 = "[s1] \"Well, I did what anyone would have.\"\n[s2] \"But before that...why did you reach out?\""
62115-52 = "Ah, right. That"
62115-53 = "We...know a byway."
62115-55 = "A byway?"
62115-57 = "Yeah. We checked, the angels didn't react when we took it."
62115-58 = "...I was really scared they were going to notice, but it actually worked out!"
62115-59 = "But still, they'll see you if you're not careful!"
62115-61 = "...I see. Thank you. It must've been dangerous..."
62115-63 = "Heehee. Don't mention it. Sensei...just seemed like a good adult."
62115-64 = "You all helped us a lot, so we wanted to return the favor."
62115-65 = "...It's funny saying this now, but I actually enjoyed studying..."
62115-66 = "Even though class was boring, it was fun too. It's a little hard to explain, isn't it?"
62115-67 = "[s3] \"...I'm happy you were honest about it being boring...\"\n[s4] \"I'll do better next time...\""
62115-70 = "It was fun seeing Saori as a teacher!"
62115-72 = "..."
62115-74 = "Atsuko's class was... Um..."
62115-75 = "I don't know why, but it was really interesting to me. Not fun, but something else."
62115-77 = "Fufu. Thank you. Maybe it was because it was new content?"
62115-79 = "...I felt like I could memorize and solve things in calculus, but I couldn't understand trigonometry..."
62115-81 = "...That means you didn't study enough."
62115-82 = "..."
62115-84 = "...I want to be in Hiyori's class again. THAT one was fun."
62115-86 = "Th-Thank you...!"
62115-91 = "I'm honestly still confused by the whole \"exam\" thing, though... But that's because it's something new. To us, all of it was."
62115-92 = "And it's..."
62115-93 = "Well, it was nice to have someone be nice to us and teach us things, besides how to hurt other people."
62115-94 = "Yeah. The whole thing..."
62115-95 = "It felt like once in a lifetime, but still."
62115-96 = "[s] \"It's not. It's not 'once in a lifetime.'\""
62115-97 = "It's...not?"
62115-98 = "[s] \"That's supposed to be your everyday lives.\""
62115-99 = "Our...everyday lives?"
62115-100 = "..."
62115-101 = "Sorry. I can't even imagine it..."
62115-102 = "A-Anyway... Enough about us. "
62115-103 = "You want to talk to Subaru, right? Come this way. We'll guide you to the byway."
62115-109 = "Over here. If you go through those stairs... You'll reach the rear door that leads to the underground archive."
62115-110 = "No one knows what she's doing in there right now. She said not to let anyone in."
62115-111 = "I don't know what you want to talk to her about, but I really hope it works out."
62115-112 = "Without Subaru...everyone who was left behind in Arius would've disappeared...one by one..."
62115-113 = "[s5] \"I'll do everything I can.\"\n[s6] \"I won't let off a student for skipping class!\""
62115-116 = "Yes, Sensei!"
62115-120 = "These stairs just keep going."
62115-125 = "Ugh... It feels like a road leading down to the abyss, like in the scriptures..."
62115-130 = "I wish we could turn on the lights... We can't, right...?"
62115-135 = "Mm. We don't want to give away our location."
62115-140 = "Ack...?!"
62115-145 = "[ns] \"Atsuko?!\""
62115-146 = "Atsuko?!"
62115-147 = "Thank you for holding me, Sensei. But is everyone else okay?"
62115-152 = "Did something happen? Was there a rock or trap, there?"
62115-153 = "I can't really see, but I don't feel anything either."
62115-154 = "Nothing on my end."
62115-156 = "...I see. It must have been me."
62115-157 = "(It seems I'm the only one who can feel it.)"
62115-158 = "(...The pressure is so intense. It's like someone is gouging into my head and shaking my brain from the inside.)"
62115-159 = "(I have to...focus...or I'll pass out...!)"
62115-160 = "Huh...?"
62115-161 = "What's wrong? Do you feel something too?"
62115-162 = "I-I don't know exactly. Why do I feel so..."
62115-163 = "...so scared...and sad... It hurts..."
62115-164 = "It's not me...but like I'm feeling it from somewhere else..."
62115-172 = "You're finally here, Sensei."
62115-173 = "[s] \"Subaru!\""
62115-177 = "Subaru...?"
62115-178 = "A-Are you okay? What's wrong? D-Did something happen to you?"
62115-184 = "..."
62115-185 = "I have a rough idea of what you want to talk about, but let's move elsewhere for now."
62115-186 = "There are too many things in Porta Pacis and Arius that we didn't know about."
62115-188 = "Oratorio of Days Gone By;To be Continued in Chapter 3"

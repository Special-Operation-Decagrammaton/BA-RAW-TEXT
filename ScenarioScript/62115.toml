[translation]
62115-4 = "อึก...!"
62115-5 = "คุณครู?!"
62115-6 = "[s] \"ครูว่าเราล่าถอยกันก่อนเถอะ!\""
62115-11 = "ทุกคนปลอดภัยหรือเปล่า?!"
62115-16 = "ค่ะ ค่ะ...!"
62115-17 = "ดูเหมือนว่าเด็กๆ อาเรียสก็หาที่ซ่อนตัวกันได้แล้วนะคะ...!"
62115-19 = "แต่พวกนางฟ้ากำลังเดินเตร่อยู่แถวปอร์ตาปาซิส... เหมือนกับว่า... กำลังมองหาเหยื่อรายต่อไปอยู่#nอย่างนั้นละ"
62115-20 = "ทะ... ทำยังไงดีล่ะคะ...? อย่างน้อยเราควรจะรู้ว่านางฟ้านั่นคืออะไรกันแน่..."
62115-22 = "(ในตอนที่ทุกคนต่างจนปัญญา)"
62115-23 = "(เสียงปืนและการเผชิญหน้าก็หยุดลง และความเงียบสงัดที่น่าพิลึกก็เข้ามาแทนที่)"
62115-24 = "(ในตอนนั้นเอง MOMOTALK ก็ดังขึ้น...!)"
62115-27 = "[ns] \"หืม? อีโมติคอนนี้มัน...?\""
62115-29 = "อีโมติคอนโบกธงขาวนี่นา? นี่มัน...?"
62115-30 = "ปกติธงขาวใช้เป็นสัญญาณบอกว่ายอมแพ้ไม่ใช่เหรอ? แล้วใครจะยอมแพ้อะไรที่นี่..."
62115-31 = "[s] \"ครูพอรู้แล้วละ ไปกันเถอะ!\""
62115-33 = "(ทุกคนเคลื่อนย้ายไปยังสถานที่ที่ระบุใน MOMOTALK อย่างระแวดระวัง)"
62115-37 = "มาถึงแล้ว..."
62115-38 = "สะ... สวัสดีค่ะ...? มีใครอยู่มั้ยคะ...?"
62115-43 = "คุณครู! สควอดทุกคน!"
62115-44 = "แล้วก็เธอด้วย..."
62115-45 = "สะ... สวัสดี ได้เจอกัน... อีกแล้วสินะ..."
62115-46 = "หนีไปหาคุณครูมานี่เอง..."
62115-47 = "อะ... อื้อ"
62115-48 = "ทำดีแล้วละ ฉันเป็นห่วงแทบแย่เลย ขอบคุณนะคะ คุณครู "
62115-49 = "[s1] \"เรียกพวกครู... มาที่นี่ทำไมเหรอ?\"\n[s2] \"เรียกพวกเรา... มาที่นี่ทำไมเหรอ?\""
62115-52 = "อ้อ ค่ะ เรื่องนั้นน่ะ"
62115-53 = "พวกฉัน... รู้ทางแยกอยู่ค่ะ"
62115-55 = "ทางแยก?"
62115-57 = "ใช่ค่ะ พวกฉันลองตรวจสอบดูแล้ว ตอนไปอยู่ตรงนั้นพวกนางฟ้าไม่มีปฏิกิริยาอะไรเลยค่ะ"
62115-58 = "ตอนนั้นพวกฉันกลัวว่าอาจจะโดนจับตัวไปก็ได้ แต่ก็รอดมาได้ค่ะ"
62115-59 = "แต่ยังไงคุณครูก็ต้องระวังให้มากที่สุด จะได้รอดสายตาไปได้ค่ะ"
62115-61 = "งั้นเหรอ... ขอบใจนะ เมื่อกี้คงเสี่ยงอันตรายกันน่าดูเลย..."
62115-63 = "แหะๆ ไม่หรอกค่ะ ก็คุณครู... เหมือนจะเป็นผู้ใหญ่ใจดีนี่คะ"
62115-64 = "คุณครูช่วยเหลือพวกฉันตั้งหลายอย่าง พวกฉันก็เลยคิดว่าควรช่วยเหลืออะไรเป็นการตอบแทนบ้าง..."
62115-65 = "ถึงจะมาพูดเรื่องแบบนั้นเอาตอนนี้ก็ดูจะน่าละอายอยู่หน่อย แต่ฉันชอบตอนที่ได้เรียนหนังสือนะคะ..."
62115-66 = "ถึงชั้นเรียนจะน่าเบื่อ แต่ว่าก็สนุกดีค่ะ เอ๋? พอได้พูดไปก็รู้สึกแปลกๆ นะคะ..."
62115-67 = "[s3] \"ขอบใจที่บอกตรงๆ ว่ามันน่าเบื่อนะ...\"\n[s4] \"ไว้ต่อไปครูจะเตรียมบทเรียนให้สนุกขึ้นนะ...\""
62115-70 = "มะ... ไม่เป็นไรค่ะ ฉันชอบที่รุ่นพี่ซาโอริมาเป็นคุณครูด้วยค่ะ"
62115-72 = "..."
62115-74 = "ส่วนชั้นเรียนของคุณอาสึโกะก็... อืม..."
62115-75 = "ฉันก็ไม่รู้ว่าทำไม แต่เนื้อหาก็น่าสนใจดีค่ะ ต่อให้จะไม่ถึงกับสนุกก็เถอะ..."
62115-77 = "ฮุฮุ ขอบใจนะ น่าจะเพราะเราสนใจในวิชาเอกที่ต่างกันน่ะ"
62115-79 = "ถ้าเป็นเรื่องแคลคูลัส แค่จำแล้วคำนวณให้ได้ก็พอ แต่กับเรื่องตรีโกณมิติ ฉันเรียนไม่เข้าหัวเลยค่ะ..."
62115-81 = "ถ้าจำได้มากกว่านี้ เดี๋ยวก็ง่ายขึ้นน่ะ..."
62115-82 = "..."
62115-84 = "ฉันจะตั้งตารอชั้นเรียนของคุณฮิโยรินะคะ ฉันชอบมากเลยค่ะ"
62115-86 = "ขะ... ขอบคุณค่ะ...!"
62115-91 = "ฉันยังไม่ค่อยเข้าใจเรื่องการสอบ... แต่ทั้งหมดที่เรียนมาก็เป็นเรื่องใหม่ที่น่าสนใจดีค่ะ "
62115-92 = "ฉันชอบที่มีใครมาสอนพวกเราในเรื่องอื่นนอกเหนือจากการทำร้ายผู้คน..."
62115-93 = "แล้วก็ปฏิบัติต่อพวกเราอย่างใจดีด้วยค่ะ"
62115-94 = "ใช่ค่ะ ถึงแม้ว่า..."
62115-95 = "พวกเราจะได้เจอประสบการณ์แบบนั้นแค่ในเวลาสั้นๆ เหมือนได้เล่นอีเวนต์จำกัดเวลาก็เถอะค่ะ"
62115-96 = "[s] \"ไม่ใช่แค่อีเวนต์จำกัดเวลาหรอกนะ\""
62115-97 = "คะ...?"
62115-98 = "[s] \"นั่นคือชีวิตประจำวันที่ทุกคนควรมีตั้งแต่แรกน่ะ\""
62115-99 = "ได้ทำแบบนั้น ทุกวันเลยเหรอคะ...?"
62115-100 = "..."
62115-101 = "ขอโทษด้วยค่ะ ฉันยังจินตนาการเรื่องแบบนั้นไม่ออกเลยค่ะ..."
62115-102 = "แต่ที่สำคัญกว่านั้น... เหมือนพวกฉันจะเอาแต่เล่าเรื่องของตัวเองนานไปแล้วเลย"
62115-103 = "เมื่อกี้บอกว่ามาที่นี่เพื่อหารือกับรุ่นพี่สุบารุใช่มั้ยคะ? เชิญทางนี้เลยค่ะ ฉันจะบอกทางแยกให้เองค่ะ"
62115-109 = "ตรงนี้ค่ะ ถ้าขึ้นบันไดไปทางนั้น... ก็จะเจอประตูหลังที่พาไปถึงคลังเก็บบันทึกใต้ดินค่ะ"
62115-110 = "ฉันไม่รู้ว่าตอนนี้รุ่นพี่สุบารุทำอะไรอยู่... พอดีรุ่นพี่กำชับไว้ว่าอย่าให้ใครเข้าไปน่ะค่ะ"
62115-111 = "ถึงจะไม่รู้ว่าจะเข้าไปหารือเรื่องอะไรกัน แต่ขอให้ทุกอย่างราบรื่นนะคะ"
62115-112 = "ถ้าไม่มีรุ่นพี่สุบารุ... เด็กๆ ที่เหลืออยู่ในอาเรียสก็คงกระจัดกระจาย... และหายไปกันหมดแล้วละค่ะ..."
62115-113 = "[s5] \"ครูจะพยายามเต็มที่เลย\"\n[s6] \"ต้องพาเด็กที่โดดเรียนกลับมาเรียนให้ได้เลย!\""
62115-116 = "ค่ะ คุณครู!"
62115-120 = "บันไดยาวจัง..."
62115-125 = "อึก... เหมือนเส้นทางสู่หลุมลึกที่จะมีพระคัมภีร์ปรากฏออกมาเลยค่ะ..."
62115-130 = "ฉันอยากเปิดไฟจังเลยค่ะ... แต่คงไม่ได้ใช่มั้ยคะ...?"
62115-135 = "อืม ตอนนี้เรายังไม่ควรให้คนอื่นจับได้น่ะ"
62115-140 = "อึก...?!"
62115-145 = "[ns] \"อาสึโกะ?!\""
62115-146 = "อาสึโกะ!?"
62115-147 = "ขอบคุณที่คว้าฉันไว้นะคุณครู ว่าแต่... คนอื่นเป็นอะไรกันหรือเปล่า?"
62115-152 = "เกิดเรื่องอะไรเหรอ? หรือว่าเดินสะดุดอะไร?"
62115-153 = "นอกจากมองข้างหน้าไม่เห็น ฉันก็ไม่ได้เจอปัญหาอื่นนะคะ...?"
62115-154 = "อะ... อืม ฉันก็ไม่เจออะไรเป็นพิเศษเหมือนกัน"
62115-156 = "อย่างนั้นสินะ... ถ้างั้นก็แสดงว่า..."
62115-157 = "(นี่เป็นความรู้สึกที่มีแต่ฉันที่สัมผัสได้สินะ)"
62115-158 = "(เป็นแรงกดดันมหาศาล... เหมือนมีใครมาจับหัวไว้แล้วพยายามเขย่าอย่างนั้นละ)"
62115-159 = "(ตอนนี้ถ้าฉันเสียสมาธิไปแค่นิดเดียว ก็คง...!)"
62115-160 = "เอ๋...?"
62115-161 = "ทำไมเป็นแบบนี้ล่ะ? สังเกตอะไรได้งั้นเหรอ?"
62115-162 = "มะ... ไม่รู้เหมือนกันค่ะ แต่ทำไมกันนะ...? นี่มันคือความรู้สึก..."
62115-163 = "เศร้า... กลัว... เจ็บปวด..."
62115-164 = "แต่ไม่ใช่ว่าฉันรู้สึกแบบนั้นเองหรอกนะคะ มันเหมือนกับความรู้สึกพวกนี้ถาโถมเข้ามาจากภายนอกค่ะ..."
62115-172 = "ในที่สุดก็มาถึงที่นี่สินะคะ คุณครู"
62115-173 = "[s] \"สุบารุ!\""
62115-177 = "รุ่น... พี่...?"
62115-178 = "ทำไม... ทำไมเป็นแบบนี้ล่ะคะ...? เกิดเรื่องอะไรขึ้นงั้นเหรอคะ...?"
62115-184 = "..."
62115-185 = "ฉันพอเดาได้ว่าคุณครูมาเพื่อพูดคุยเรื่องอะไร แต่ออกไปจากตรงนี้ก่อนเถอะค่ะ"
62115-186 = "ปอร์ตาปาซิสกับอาเรียส... มีสิ่งต่างๆ ที่พวกเราไม่เคยรู้มาก่อนหลับใหลอยู่เต็มไปหมดเลยค่ะ"
62115-188 = "องก์โอราทอริโอแห่งกาลเวลาที่ผันผ่าน;To be Continued in Chapter 3"

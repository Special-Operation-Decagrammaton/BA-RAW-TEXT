[translation]
1006402-1 = "增長的誤會"
1006402-2 = "D.U.附近的商店街．吳服店"
1006402-6 = "那個……"
1006402-7 = "……啊，非常抱歉。"
1006402-8 = "不好意思打擾你休息……我想買一套新的和服。"
1006402-9 = "我，我知道了。#n馬上幫您介紹！"
1006402-10 = "請跟我來……"
1006402-12 = "（自從開了和服店以來，不知不覺間已經過了10年）"
1006402-13 = "（根據迎接無數客人累積的經驗，#n　現在光是看客人的臉就可以用直覺分辨對方的地位……）"
1006402-14 = "（本以為會在這個時期來訪的客人都是來買成年式上穿的和服……）"
1006402-15 = "（但是那連內襯的材質都精挑細選的眼光，以及渾身散發出的殺氣……#n　這位客人肯定是地下世界的有名人物沒錯！）"
1006402-16 = "（萬一犯下失誤惹客人不開心的話，不知道會發生多麼可怕的事情……！）"
1006402-18 = "我們店裡有豐富且特別適合像您這樣氣質非凡的客人的商品！"
1006402-19 = "我一定會為您推薦符合您喜好的頂級商品！#n請包在我身上！"
1006402-20 = "呃，不是那種程度的和服也沒關係……"
1006402-25 = "首先，您覺得這套如何呢？"
1006402-26 = "以最高級的絲綢編織而成，充滿魅惑感的和服。#n只要穿上它，路上的行人想必會看得目不轉睛吧！"
1006402-30 = "這會不會有點……太暴露了？"
1006402-31 = "我真是的，居然對尊貴的客人如此失禮……！"
1006402-32 = "請您稍等！"
1006402-37 = "那，那麼這套和服怎麼樣呢？"
1006402-38 = "以金線繡成的豪華龍虎刺繡，肯定能讓客人您的威嚴更上一層樓！"
1006402-42 = "……會不會太華麗了？"
1006402-43 = "這，這樣啊……客人您無須這套華麗的衣服，也確實已經有十足的氣勢了呢……"
1006402-44 = "非常抱歉！我馬上拿下一套來……"
1006402-49 = "這是我們店裡最貴的鎧甲……！"
1006402-53 = "已經連和服都不是了吧……"
1006402-55 = "噫，噫……！！"
1006402-56 = "非，非常抱歉我失禮了！"
1006402-57 = "還請留我一條小命……！"
1006402-58 = "我沒有那個意思……"
1006402-59 = "[s]「……佳世子？」"
1006402-60 = "咦，老師……？"
1006402-61 = "[s1]「我路過附近，正好聽到佳世子的聲音。」\n[s2]「發生什麼事了嗎？」"
1006402-62 = "這個嘛……"
1006402-63 = "這個嘛……"
1006402-65 = "（向店員說明情況後，解除了誤會）"
1006402-67 = "原，原來是這樣啊……#n不好意思，我誤以為是黑龜組或是哪裡的某位大人物……"
1006402-68 = "妄自揣測……真是非常抱歉。"
1006402-69 = "別在意，我已經很習慣被誤認為可疑人物了。"
1006402-70 = "既然誤會已經解開，可以讓我看看其他和服嗎？#n……普通一點的那種。"
1006402-71 = "那麼……這件如何呢？"
1006402-72 = "以黑色為主體的設計，很適合客人您的髮色。#n因為是以參加成人式的學生為對象設計的產品，價格也十分實惠哦！"
1006402-73 = "唔嗯，我是滿喜歡這個設計的……"
1006402-74 = "但是黑色和服看起來會不會太暗了呢？#n我本來就已經常常被說表情很可怕了……"
1006402-75 = "老師你認為呢？"
1006402-76 = "[s3]「我覺得很適合佳世子哦。」\n[s4]「能讓佳世子加倍可愛！」"
1006402-78 = "說什麼可愛……"
1006402-79 = "……別捉弄我了，老師。"
1006402-83 = "那麼就選這套吧。"
1006402-84 = "已經決定了嗎？#n還有其他還沒介紹的商品……"
1006402-85 = "沒關係。給人的感覺和之前穿過的差不多，我也不討厭黑色的衣服。"
1006402-86 = "……而且老師也說感覺很適合我……"
1006402-87 = "我知道了，那我立刻為您準備！"
1006402-93 = "……謝謝。#n感覺總是受到老師的幫助呢。"
1006402-94 = "說是回禮可能有點奇怪，不過下次我會穿給老師看的。"
1006402-95 = "要立刻穿……可能沒辦法。#n畢竟還得做各種準備。"
1006402-96 = "[s]「知道了，我會拭目以待哦！」"
1006402-97 = "那下次見囉，老師。"

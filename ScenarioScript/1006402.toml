[translation]
1006402-1 = "A New Misunderstanding"
1006402-2 = "Dry-Goods Shopping Complex Near D.U."
1006402-6 = "...Excuse me."
1006402-7 = "Oh, I'm sorry. I didn't see you come in..."
1006402-8 = "Sorry for interrupting you on your break... I just wanted to buy a kimono."
1006402-9 = "Oh, o-of course. Come with me!"
1006402-10 = "This way..."
1006402-12 = "(I've been in the kimono business for 10 years now...)"
1006402-13 = "(That's long enough to be able to size people up and what kind of work they come from at a glance.)"
1006402-14 = "(Customers who visit this season are usually students buying their first kimono for their coming-of-age ceremony, but...)"
1006402-15 = "(Those watchful eyes meticulously scanning the fabric materials, and the keen focus radiating from her very soul... This customer must be a high-ranking member of an underworld organization!)"
1006402-16 = "(If I were to make a mistake and hurt the customers' feelings, something terrible might happen to me...!)"
1006402-18 = "N-No worries, leave it to me. We have a wide selection of kimonos for elegant customers like yourself!"
1006402-19 = "I can certainly help you select the best kimono that suits you!"
1006402-20 = "I mean, it doesn't have to be the best kimono..."
1006402-25 = "To begin, how do you feel about this one?"
1006402-26 = "Cut and made from the finest silk, this attractive kimono is sure to make your day, and no one will be able to take their eyes off you!"
1006402-30 = "Isn't this...exposing a little too much?"
1006402-31 = "Y-Yes... How foolish of me to suggest such a thing to a dignified customer such as yourself...!"
1006402-32 = "O-One moment please!"
1006402-37 = "Th-Then how about this one?"
1006402-38 = "In this colorful kimono, the tiger and dragon, hand woven with gold threading, will intimidate all those around you!"
1006402-42 = "Isn't this a bit...overly flashy?"
1006402-43 = "Of course, your indomitable aura needs no flashy adornments!"
1006402-44 = "My apologies! L-Let us move on!"
1006402-49 = "This is the Yoroi armor, the most expensive piece of clothing we carry in our store!"
1006402-53 = "This isn't even a kimono..."
1006402-55 = "E-Eek...?!"
1006402-56 = "I-I'm sorry..."
1006402-57 = "Oh please, if you could spare my life...!"
1006402-58 = "Wait, what do you mean?"
1006402-59 = "[s] \"What's going on here?!\""
1006402-60 = "Oh, Sensei...?"
1006402-61 = "[s1] \"I was passing by and heard your voice, Kayoko.\"\n[s2] \"Is something wrong?\""
1006402-62 = "Well, you see..."
1006402-63 = "Well, you see..."
1006402-65 = "After I found out what happened, I helped clear up the misunderstanding with the store clerk."
1006402-67 = "Oh I see, I'm sorry. I had assumed you were a member of the Kurokame Gang or some other highly-placed organization based on your appearance..."
1006402-68 = "I misinterpreted and assumed incorrectly...my apologies."
1006402-69 = "No worries, I'm used to being mistaken for trouble."
1006402-70 = "Now that we're on the same page, can I see a different kimono? ...Preferably something normal."
1006402-71 = "Then...how about this kimono here?"
1006402-72 = "I think this classy-looking black design will suit your hair color well. Since this product is targeted towards students approaching their coming-of-age ceremony, it's also at a reasonable price!"
1006402-73 = "Hm, I do like the design..."
1006402-74 = "Won't a black kimono be too dark? I'm already misjudged as a thug all the time."
1006402-75 = "What do you think, Sensei?"
1006402-76 = "[s3] \"I think it would suit Kayoko well.\"\n[s4] \"It will double Kayoko's cuteness for sure!\""
1006402-78 = "What, what? What're you saying..."
1006402-79 = "Seriously. Don't tease me like that, Sensei."
1006402-83 = "Since this got the Sensei's recommendation, I guess I'll take this one...?"
1006402-84 = "Hm? Are you sure you're okay with not looking at other selections?"
1006402-85 = "Mhmm. It's similar to what I was already wearing, and on a personal note, it's my favorite color for clothes."
1006402-86 = "...And Sensei said they liked it..."
1006402-87 = "Alright then, I'll pack this one for you!"
1006402-93 = "Anyway, I owe you again. I feel like you're always helping me, Sensei."
1006402-94 = "It's not much, but in return, I'll show you what I look like in the kimono next time."
1006402-95 = "I'd show you right now, but they take a while to put on."
1006402-96 = "[s] \"Yup, let me know!\""
1006402-97 = "Then, I'll see you next time, Sensei."

10031060-136 = "3;치아키;02;그러고 보니 마코토 선배가 <대테러 훈련이 걸려 있는 이상, 피아노 연습은 중단하고 훈련 준비부터 해라! 소라사키 히나!>"
10031060-137 = "3;치아키;01;<이 몸이 만마전의 의장으로서 착실히 모든 훈련 과정을 검수할 테니 말이야!>라고 해서, 현장에 나가야 하는 상황이었죠?"

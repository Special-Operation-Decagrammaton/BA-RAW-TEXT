[translation]
10031060-1 = "ตอนที่ 6;การตัดสินใจของท่านประธาน"
10031060-2 = "(วันที่ 4 ที่คุณครูตกลงจะช่วยเตรียมงานปาร์ตี้ คุณครูกำลังเคลียร์งานของชาเล่ต์ก่อนจะออกไปที่#nแพนเดโมเนียม โซไซตี้ แต่ระหว่างนั้นเองอิโรฮะก็ติดต่อมา)"
10031060-8 = "คุณครู... "
10031060-9 = "[s] \"เอ๋? วันนี้ไม่ใช่มาโคโตะ แต่เป็นอิโรฮะงั้นเหรอ?\""
10031060-10 = "นั่นสิคะ... พอดีว่าตอนนี้รุ่นพี่มาโคโตะยังไม่อยู่ในสภาพที่ติดต่อใครได้..."
10031060-11 = "ไม่สิ ที่จริงเป็นหนักกว่านั้นอีกค่ะ... จะทำยังไงดีคะ พอดีเราต้องเจอสถานการณ์ที่ยากลำบากกัน"
10031060-12 = "ที่ฉันติดต่อมาก็เพราะ... วันนี้อยากให้คุณครูมาที่แพนเดโมเนียม โซไซตี้เร็วกว่าปกติหน่อย... จะได้ไหมคะ? "
10031060-13 = "[s] \"...?\""
10031060-20 = "(คุณครูรีบเคลียร์งานให้เสร็จแล้วไปที่สำนักงานแพนเดโมเนียม โซไซตี้)"
10031060-23 = "อ่า..."
10031060-24 = "[s] \"มาโคโตะ...! เห็นว่ามีเรื่องลำบากกัน เกิดอะไรขึ้นน่ะ?\""
10031060-28 = "คุณครูสบายดีไหมคะ? "
10031060-29 = "วันนี้มาเร็วกว่าปกตินะคะเนี่ย ฮุฮุ ขยันจังเลยนะคะ"
10031060-33 = "[ns1] \"อิโรฮะ...! มาโคโตะเครื่องรวนอีกแล้วเหรอ?\"\n[ns2] \"ครูเข้าใจแจ่มแจ้งเลยว่าเรื่องลำบากที่ว่าคืออะไร!\""
10031060-36 = "ใช่มั้ยล่ะคะ?"
10031060-37 = "รุ่นพี่มาโคโตะในสภาพนั้นน่ะ จะให้เรียกว่าแปลกก็คงน้อยไปเลยด้วยซ้ำ อิโรฮะจัง แบบนี้เข้าขั้นน่ากลัว#nเลยนะฉันว่า"
10031060-39 = "รุ่นพี่มาโคโตะ~ เป็นยังไงบ้าง~?"
10031060-40 = "ฮุฮุ อิบูกิ เราสบายดีค่ะ"
10031060-41 = "อ้อ เรามีชาอู่หลงที่สั่งมาเป็นพิเศษสำหรับปาร์ตี้ครั้งนี้ด้วย ลองดื่มดูไหมคะ?"
10031060-42 = "อิบูกิชอบโกโก้มากกว่า~"
10031060-43 = "ค่ะ~ โกโก้ก็น่าจะดีนะคะ~"
10031060-44 = "........."
10031060-48 = "[ns] \"...กลายเป็นอย่างนี้ไปได้ยังไงเนี่ย?\""
10031060-49 = "ถ้าถามว่าเป็นอย่างนี้ได้ยังไงละก็..."
10031060-51 = "(3 ชั่วโมงก่อนเกิดเหตุ)"
10031060-53 = "มาขัดขวางแผนการที่ยิ่งใหญ่ในการโปรโมตรูปปั้นของเรางั้นเหรอ...! ฮึ่ย! เจ้าพวกคณะกรรมการวินัย!"
10031060-54 = "เปล่าเลยค่ะ แต่นั่นก็เพราะมันมากกว่าเหตุจริงๆ นี่คะ..."
10031060-55 = "ถึงยังไงก็กำลังเป็นทอล์กออฟเดอะทาวน์พอดี จะมองว่าเป็นการจัดทำขึ้นเพื่อประชาสัมพันธ์ก็น่าจะได้#nนี่คะ? อะฮ่าฮ่า ตอนนี้ในโซเชียล ไม่มีใครไม่พูดถึงเรื่องนั้นเลยค่ะ~"
10031060-56 = "ไม่ได้การละ... ถ้าเรายังอยู่เฉยแบบนี้ แผนการในการทำให้เห็นว่าคณะกรรมการวินัยกระจอกกว่า#nแพนเดโมเนียม โซไซตี้ผ่าน <ปาร์ตี้สุดพิเศษแห่งเกเฮนน่า> ของเราก็ต้องล่มไม่เป็นท่าน่ะสิ..."
10031060-57 = "ฮึ่ม! จิอากิ! ตอนนี้เจ้าพวกคณะกรรมการวินัยทำอะไรกันอยู่?!"
10031060-58 = "อ่า~ เหมือนว่าสมาชิกทุกคนที่อยู่ใต้การบังคับบัญชาของประธานกรรมการวินัยจะไปฝึกการต่อต้านการ#nก่อการร้ายที่จัดขึ้นเป็นประจำอยู่นะคะ"
10031060-59 = "งั้นเหรอ... ก็แปลว่าต้องสละเวลาในการฝึกเปียโนไปสินะ"
10031060-60 = "แต่แค่นั้นก็ยังไม่พอหรอก เราต้องหาวิธีที่แน่นอนกว่านี้หน่อย"
10031060-61 = "เพื่อทำให้ครู [USERNAME] จากชาเล่ต์และนักเรียนทุกคนในเกเฮนน่าจดจำได้จนขึ้นใจ ว่าใครคือผู้มีอำนาจและเป็นผู้นำที่แท้จริงของเกเฮนน่า และใครเป็นคนที่มีสิทธิ์ที่จะเดินเคียงบ่าเคียงไหล่#nกับพวกเขาในอนาคต..."
10031060-62 = "ฮึ่ม! อิโรฮะ ไปเอา <สิ่งนั้น> มา!"
10031060-63 = "<สิ่งนั้น> ที่ว่ามันคืออะไรกันคะ?"
10031060-68 = "อ่า จริงด้วย จะว่าไปครั้งนี้เราไม่ได้สั่งอิโรฮะ แต่ให้ซัตสึกิไปเตรียมมานี่นา"
10031060-69 = "ให้รุ่นพี่ซัตสึกิเตรียมมางั้นเหรอคะ...?"
10031060-70 = "อะฮ่าฮ่า! แค่ฟังดูก็รู้เลยว่ากังวล สมกับเป็นอิโรฮะจังเลยนะ!"
10031060-71 = "มันคืออะไรกันนะ..."
10031060-76 = "ฮุฮุฮุ ก็อย่างที่มาโคโตะจังว่าเลย แล้วฉันก็เตรียมมาเสร็จแล้วด้วย"
10031060-77 = "และมันก็คือ... โปรเจกต์อัลตร้า NK เวอร์ชันปรับปรุงใหม่ของฉันที่อยู่ตรงนี้ไง!  "
10031060-78 = "คะ? ปรับปรุงใหม่... ยังไงนะคะ?"
10031060-79 = "ฮุฮุ โปรเจกต์เดิมของฉันเน้นไปที่การทำให้คนอื่นอยากสาบานว่าจะจงรักภักดีต่อแพนเดโมเนียม โซไซตี้ เพื่อสร้างแนวทางในการพัฒนาสมาชิกของเรา"
10031060-80 = "แต่ว่าเวอร์ชันปรับปรุงใหม่นี้ต่างออกไป เพราะนี่คือ <เทคโนโลยีสะกดจิต> ตามที่มาโคโตะจังขอ..."
10031060-81 = "โดยจะเน้นไปที่ความเคารพและความรักต่อผู้นำ!"
10031060-82 = "หึหึหึ! สมกับเป็นซัตสึกิ! ตอบสนองความต้องการของเราได้ดีเลย! ถ้าเราใช้ <เทคโนโลยีสะกดจิต> เวอร์ชันปรับปรุงใหม่ของซัตสึกิละก็..."
10031060-83 = "ไม่ว่าจะเป็นคณะกรรมการวินัย นักเรียนเกเฮนน่า หรือต่อให้เป็นครูก็ตาม ทุกคนจะต้องถวายความเคารพให้กับเราผู้นี้!"
10031060-84 = "ไม่สิ... นี่มันอะไรกันคะเนี่ย"
10031060-85 = "เอาละ งั้นก็ต้องหาหนูทดลองคนแรก จิอากิ! อิบูกิ! จับตัวอิโรฮะมา!"
10031060-86 = "คะ?!  อะ... อะไรกันคะ?!"
10031060-87 = "ค่า~! รับคำสั่งค่ะ~! ขอโทษนะอิโรฮะจัง~ ผู้น้อยต้องทำตามคำสั่งของผู้ใหญ่นี่เนอะ!"
10031060-88 = "รุ่นพี่อิโรฮะ! ขอจับตัวหน่อยน้า~!"
10031060-92 = "ดะ... เดี๋ยวก่อน!  อะ... อิบูกิก็เป็นไปกับเขาด้วยเหรอ...?!"
10031060-97 = "หึหึหึ อิโรฮะ ความเคารพจากก้นบึ้งของจิตใจที่มีต่อเรา... เราจะอัปเกรดให้เอง!"
10031060-98 = "ที่พูดแบบนั้นกับฉัน คิดจริงๆ เหรอคะว่าความเคารพจะเพิ่มขึ้นน่ะ!"
10031060-99 = "เอาละ! ซัตสึกิ!"
10031060-100 = "ไม่เป็นไรหรอกน่า อิโรฮะ เธอก็แค่จะชอบมาโคโตะจังมากกว่าตอนนี้นิดหน่อยเท่านั้นเอง!"
10031060-101 = "ดะ... เดี๋ยวก่อน!"
10031060-106 = "ฮุฮุฮุ! เอาละนะ!"
10031060-126 = "[ns] \"แปลว่าการสะกดจิตใส่อิโรฮะ มีผลต่อมาโคโตะแทนงั้นเหรอ?\""
10031060-128 = "ใช่ค่ะ เหมือนโดนสวรรค์ลงทัณฑ์เลยค่ะ"
10031060-129 = "เอาเถอะ แต่แบบนี้ก็ดูไม่มีพิษภัยอะไร ปล่อยให้เป็นแบบนี้ไปก็ได้นะ?"
10031060-130 = "ถึงแม้พอจ้องไปนานๆ เข้าแล้วก็แอบน่ากลัวอยู่หน่อยก็เถอะ"
10031060-131 = "อิบูกิก็ชอบรุ่นพี่มาโคโตะคนนี้นะ~"
10031060-132 = "ฮุฮุ เราเองก็ชอบอิบูกิค่ะ แล้วก็ชอบทุกคนในแพนเดโมเนียม โซไซตี้... รวมถึงคุณครูด้วยนะคะ"
10031060-133 = "น่ากลัวจริงๆ ด้วยนะ..."
10031060-134 = "ถ้าคณะกรรมการวินัยรู้ว่ามาโคโตะจังเป็นแบบนี้ไปละก็... น่าจะเป็นเรื่องใหญ่อยู่นะ?"
10031060-135 = "โดยเฉพาะเจ้าหน้าที่อาวุโสคนนั้นน่ะ... ถ้ารู้เรื่องนี้ขึ้นมาต้องไม่อยู่เฉยๆ แน่"
10031060-136 = "จะว่าไปแล้ว รุ่นพี่มาโคโตะไปสั่งไว้ว่า <โซระซากิ ฮินะ! ถ้าพวกเธอต้องฝึกต่อต้านการก่อการร้าย ก็หยุดซ้อมเปียโนแล้วไปเตรียมฝึกอะไรของเธอก่อน!>"
10031060-137 = "แล้วก็ประกาศว่า <ในฐานะประธานแพนเดโมเนียม โซไซตี้ เราจะจับตาดูทุกกระบวนการฝึกนี้อย่าง#nจริงจังเลย!> ตอนนี้คณะกรรมการวินัยก็เลยออกไปฝึกกันหมดใช่ไหมคะ?"
10031060-138 = "ถ้าพวกนั้นรู้ว่ามาโคโตะจังเป็นแบบนี้ ดีไม่ดีอาจก่อสงครามเบ็ดเสร็จขึ้นก็ได้นะ!"
10031060-139 = "[s] \"คณะกรรมการวินัยไม่ทำถึงขนาดนั้นหรอก...\""
10031060-140 = "ถึงประธานกรรมการวินัยจะไม่ทำ แต่เจ้าหน้าที่อาวุโสคนนั้นน่ะไม่แน่หรอก... เธออาจจะบันดาลโทสะ เพราะความขัดแย้งที่ผ่านมาก็ได้นะคะ ถึงอย่างนั้นคุณครูก็ยังคิดว่าจะไม่เกิดเรื่องอะไรเลยเหรอคะ?"
10031060-141 = "[s] \"อืม ถ้างั้นครูก็ไม่รู้...\""
10031060-142 = "อะฮ่าฮ่า~ จะกลับคำเหรอคะเนี่ย คุณครู~"
10031060-143 = "คณะกรรมการวินัย...? ความขัดแย้ง...?"
10031060-144 = "หืม? รุ่นพี่มาโคโตะ? เป็นอะไรไปน่ะ~?"
10031060-145 = "นั่นสินะคะ... แพนเดโมเนียม โซไซตี้กับคณะกรรมการวินัยเป็นคู่อาฆาตกันมาโดยตลอด"
10031060-146 = "เราทะเลาะกันซ้ำแล้วซ้ำเล่าเหมือนน้ำกับน้ำมันเลยค่ะ "
10031060-147 = "เราได้แต่สงสัยและเอาไปครุ่นคิดว่าสาเหตุคืออะไร... และเราก็คิดว่าสาเหตุมีเพียงข้อเดียวค่ะ"
10031060-148 = "[s] \"แล้วมันคืออะไรเหรอ...?\""
10031060-149 = "ก็คือการมีอยู่ของแพนเดโมเนียม โซไซตี้ กับคณะกรรมการวินัยยังไงล่ะคะ!"
10031060-153 = "คะ...?"
10031060-154 = "ถ้าการมีอยู่ขององค์กรทำให้เกิดการทะเลาะอย่างหลีกเลี่ยงไม่ได้... และถ้านั่นทำให้นักเรียนต้องหวาด#nกลัวและมีอนาคตที่ทุกข์ระทมละก็...!"
10031060-155 = "เราจะใช้อำนาจของประธาน ประกาศยุบแพนเดโมเนียม โซไซตี้และคณะกรรมการวินัยค่ะ!"
10031060-166 = "โกโก้อร่อยจังเลย~"
10031060-168 = "[ns] \"มาโคโตะ...?\""
10031060-169 = "นี่ไม่ใช่เวลาจะมาอยู่เฉยกันอย่างนี้นะคะ ถ้าเราไม่ไปป่าวประกาศการตัดสินใจครั้งใหญ่นี้ให้ทั่วเกเฮนน่า แล้วเปิดศักราชใหม่ละก็...!"
10031060-170 = "ใช่ค่ะ... ถ้าไม่ทำอย่างนั้น การต่อสู้เพราะความขัดแย้งก็จะดำเนินต่อไปเรื่อยๆ และเราก็จะไม่ได้#nประโยชน์อะไรจากสิ่งนั้นเลยค่ะ! "
10031060-171 = "ทุกอย่างนี้ก็เพื่อสันติภาพของเกเฮนน่า!"
10031060-177 = "ดะ... ดะ... ดะ... เดี๋ยวก่อนสิคะ!  รุ่นพี่มาโคโตะ?!"
10031060-182 = "อะฮ่าฮ่าฮ่าฮ่า!!!"
10031060-183 = "แบบนั้นน่าจะไม่ใช่แค่การต่อสู้ที่จบลงนะ... เกเฮนน่าอาจจะพังพินาศลงเลยก็ได้"
10031060-184 = "[s] \"มะ... มาโคโตะ...! รอก่อน...!\""
10031060-187 = "(คุณครูวิ่งตามมาโคโตะไป และหลังจากความพยายามอย่างหนัก สุดท้ายก็คลายการสะกดจิตได้)"

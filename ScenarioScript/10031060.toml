10031060-82 = "3;마코토;03;크크큭! 역시 사츠키! 이 몸의 요청에 제대로 부응한 것이로군! 사츠키의 저 개량판 <최면 기술>을 사용하면……."
10031060-83 = "3;마코토;03;선도부고 게헨나의 학생이고 선생이고 할 거 없이. 전부 이 몸에 대한 존경을 가슴에 품게 될 터!\n#3;jump\n#3;em;[!]"

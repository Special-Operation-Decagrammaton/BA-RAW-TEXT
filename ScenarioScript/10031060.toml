10031060-53 = "3;마코토;06;이 몸의 동상 홍보 대작전을 방해하다니……! 크읏! 선도부 놈들!\n#3;stiff\n#3;em;[속상함]"
10031060-54 = "3;이로하;04;아니, 아무리 그래도 그건 정말 억지였으니까요……."
10031060-55 = "3;치아키;11;그래도 나름 화제가 된 거 같으니, 홍보로는 성립되었다고 봐도 괜찮지 않을까요? 아하핫. 뭐, 엄청 떠들썩했으니까요~\n#3;em;[!]"
10031060-56 = "3;마코토;04;안돼…… 이대로 있기만 해서는…… 이번 <게헨나 특별 파티>를 통해, 우리 만마전과 선도부의 상하관계를 확실히 하려고 했던 이 몸의 계획에 차질이…….\n#3;em;…"
10031060-57 = "3;마코토;00;크읏. 치아키! 지금 선도부 녀석들은 뭘 하고 있지?!\n#3;jump"
10031060-58 = "3;마코토;00\n1;치아키;02;아~ 마침 파티에 맞춰, 선도부는 부장 휘하의 멤버 전부가 정기적으로 이루어지는 대테러 훈련에 들어간 모양이에요.\n#1;em;[반응]\n#1;ar\n#3;m4"
10031060-59 = "3;마코토;99;과연…… 이것으로 피아노 연습할 시간을 빼앗고는 있단 말이로군.\n#3;em;…"
10031060-60 = "1;치아키;02\n3;마코토;00;하지만 그것만으로는 부족해. 좀 더 확실한 방법이 필요하다.\n#1;dl\n#3;m3"
10031060-61 = "3;마코토;00;이 게헨나의 누가 진정한 권력자이고, 리더이며, 앞으로 어깨를 함께 나란히 하고 걸어갈 자격이 있는 자인지…… 게헨나의 모든 학생은 물론 샬레의 [USERNAME] 선생에게 각인시키기 위해서라면……"
10031060-62 = "3;마코토;05;에이잇! 이로하 <그것>을 가져와라!\n#3;em;[!]\n#3;jump"

[translation]
10031060-1 = "第6話;議長的決定"
10031060-2 = "（協助準備派對的第四天。#n　在前往萬魔殿之前，處理夏萊工作時收到了伊呂波的聯絡）"
10031060-8 = "老師…… "
10031060-9 = "[s]「咦？這次不是真琴而是伊呂波，還真是反常。」"
10031060-10 = "關於這一點……真琴前輩目前處於無法聯絡的狀態……"
10031060-11 = "不對，不只是無法聯絡……應該說是……讓人傷腦筋的狀態吧。"
10031060-12 = "事情不該這樣的……#n雖然約好的時間還沒到，可以請老師提早來萬魔殿一趟嗎？"
10031060-13 = "[s]「…………？」"
10031060-20 = "（於是便匆忙地前往萬魔殿辦公室）"
10031060-23 = "啊……"
10031060-24 = "[s]「真琴……！聽說你遇到傷腦筋的事了！怎麼了嗎？」"
10031060-28 = "您過得好嗎？老師。"
10031060-29 = "今天來的比平時早呢。#n呵呵，您真是勤奮。"
10031060-33 = "[ns1]「伊呂波……！真琴故障了嗎！？」\n[ns2]「一眼就理解傷腦筋的情況是指什麼了！」"
10031060-36 = "……對吧？"
10031060-37 = "那種狀態的真琴前輩，早已超越奇怪的程度，老實說有點恐怖吧？伊呂波醬……"
10031060-39 = "真琴前輩～你還好嗎～？"
10031060-40 = "呵呵，伊吹。我沒事唷。"
10031060-41 = "啊，這次派對我特別準備了烏龍茶。你要喝喝看嗎？"
10031060-42 = "伊吹喜歡可可～"
10031060-43 = "好～可可也不錯呢～"
10031060-44 = "………………"
10031060-48 = "[ns]「那個……這到底是怎麼一回事？」"
10031060-49 = "……事情是這樣的。"
10031060-51 = "（事件發生的3小時前）"
10031060-53 = "竟然敢妨礙我的銅像宣傳大作戰……！#n唔！可惡的風紀委員會！"
10031060-54 = "不是，再怎麼說那樣真的太超過了……"
10031060-55 = "但似乎也確實引起了話題，應該能算是有發揮宣傳效果了吧？#n啊哈哈，畢竟鬧得沸沸揚揚的。"
10031060-56 = "不行……這樣下去……我想利用這次「格黑娜特別派對」，#n明確劃清萬魔殿與風紀委員會上下關係的計畫會發生差錯……"
10031060-57 = "千秋！風紀委員會的人現在在做什麼！？"
10031060-58 = "啊～風紀委員會的成員都在為了派對進行反恐訓練。"
10031060-59 = "原來如此……這樣就能減少他練習鋼琴的時間。"
10031060-60 = "但光是那樣還不夠。需要更有效率的方法。"
10031060-61 = "為了讓格黑娜的全體學生，以及夏萊的[USERNAME]老師都清楚知道……#n誰才是格黑娜真正的掌權者、領導者，誰才有資格跟我平起平坐……"
10031060-62 = "哎咿！伊呂波，把「那個」帶過來！"
10031060-63 = "「那個」是指什麼啊？"
10031060-68 = "啊，對了，這次不是伊呂波，而是吩咐皐月準備的吧？"
10031060-69 = "讓皐月前輩準備……？"
10031060-70 = "啊哈哈！一聽見這番話就覺得不安，果然很有伊呂波醬的風格！"
10031060-71 = "究竟準備了什麼……"
10031060-76 = "唔呵呵，我已經按照真琴醬說的做好準備了。"
10031060-77 = "就是這個……NK-ULTRA計畫的改良版！"
10031060-78 = "……嗯？改良什麼？"
10031060-79 = "呵呵，雖然原本的計畫著重於讓學生宣誓對萬魔殿效忠，藉此培育萬魔殿的士兵……"
10031060-80 = "但這次的改良版不一樣。#n根據真琴醬的要求，這次「催眠技術」著重的目標是……"
10031060-81 = "尊敬！也就是對領導者的尊敬與愛！"
10031060-82 = "咯咯咯！不愧是皐月！確實回應了我的要求！#n只要利用皐月的改良版「催眠技術」……"
10031060-83 = "不管是風紀委員會、格黑娜的學生還是老師……全都會打從心底尊敬我真琴大人！"
10031060-84 = "……所以那是什麼？"
10031060-85 = "很好，那麼首先……#n千秋！伊吹！把伊呂波給我抓住！"
10031060-86 = "啊！？什，什麼！？"
10031060-87 = "是～！遵命～！#n抱歉囉，伊呂波醬～部下就該服從上司的命令！"
10031060-88 = "伊呂波前輩～！是捉迷藏～！"
10031060-92 = "等，等等！？連，連伊吹也……！？"
10031060-97 = "咯咯咯。伊呂波啊，我要把你內心深處對我的尊敬……全都激發出來！"
10031060-98 = "你不知道在說出那種話的瞬間，尊敬的想法就跟著幻滅了嗎！"
10031060-99 = "動手吧！皐月！"
10031060-100 = "不必擔心，伊呂波。#n你只會變得比現在更喜歡真琴醬而已！"
10031060-101 = "等，等一下……！"
10031060-106 = "唔呵呵！接招吧！"
10031060-126 = "[ns]「……也就是說，對伊呂波施下的催眠反而對真琴產生了效果？」"
10031060-128 = "……沒錯，真是罪有應得。"
10031060-129 = "算了，反正這樣也不會造成什麼問題，放置不管也無所謂吧？"
10031060-130 = "雖然看起來有點可怕就是了。"
10031060-131 = "伊吹也喜歡現在的真琴前輩～"
10031060-132 = "呵呵，不只是伊吹，萬魔殿的所有人……以及老師我都非常喜歡唷。"
10031060-133 = "……真的有點可怕。"
10031060-134 = "……如果風紀委員會知道真琴醬現在的狀況，會不會發生大事呢？"
10031060-135 = "特別是那個行政官……要是知道的話肯定不會袖手旁觀吧。"
10031060-136 = "對了，真琴前輩說過「既然有反恐訓練，你就應該停止練琴準備訓練！空崎陽奈！」"
10031060-137 = "「身為萬魔殿的議長，我會檢驗所有訓練過程！」之類的，所以應該得到現場吧？"
10031060-138 = "……！如果真琴醬的狀況被發現，說不定會立刻引發全面戰爭哦！？"
10031060-139 = "[s]「再怎麼說，風紀委員會應該不至於會……」"
10031060-140 = "風紀委員長姑且不論，但那個行政官……是有仇必報的類型對吧？#n就算是這樣，老師還是認為不會發生任何問題嗎？"
10031060-141 = "[s]「……我也不敢確定。」"
10031060-142 = "啊哈哈～！你這麼輕易就退縮了嗎？老師～"
10031060-143 = "風紀委員會……？衝突……？"
10031060-144 = "嗯？真琴前輩？怎麼了？"
10031060-145 = "……沒錯。我們萬魔殿和風紀委員會，一直以來都是宿敵關係。"
10031060-146 = "雙方一直都是死對頭，而且時不時就會發生衝突。"
10031060-147 = "原因……會是什麼呢？#n我想了很久，最終認為只有一個原因。"
10031060-148 = "[s]「是什麼呢……？」"
10031060-149 = "那就是萬魔殿和風紀委員會同時存在！"
10031060-153 = "……嗯？"
10031060-154 = "如果組織的存在成為發生衝突的理由……#n因而造成其他學生被捲入混亂，注定將迎接痛苦未來的話……！"
10031060-155 = "我要行使議長的權限，宣布解散萬魔殿和風紀委員會！"
10031060-166 = "可可，好好喝～"
10031060-168 = "[ns]「真琴……？」"
10031060-169 = "現在沒時間說這些了。#n必須趕緊將這個重大決定告知整個格黑娜……迎接新時代的來臨才行……！"
10031060-170 = "對，沒錯……繼續鬥爭下去根本就沒有任何意義！"
10031060-171 = "這一切都是為了格黑娜的和平！"
10031060-177 = "等，等，等一下！？真琴前輩！？"
10031060-182 = "啊哈哈哈哈！！"
10031060-183 = "……那樣別說是要結束戰鬥，整個格黑娜會徹底完蛋的吧？"
10031060-184 = "[s]「真，真琴……！等等……！」"
10031060-187 = "（之後趕緊追上奪門而出的真琴，經過一番努力才總算解除了催眠）"

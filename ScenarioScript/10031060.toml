[translation]
10031060-1 = "Episode 6;The Chairman's Decision"
10031060-2 = "It was the fourth day of preparations for the Pandemonium Society's party. I was taking care of some work at Schale before heading to the Pandemonium Society, when I received a call from Iroha."
10031060-8 = "Sensei... "
10031060-9 = "[s] \"Huh? I'm surprised it's you calling, Iroha. Usually it's Makoto.\""
10031060-10 = "About that... Makoto is currently in no state to call you."
10031060-11 = "Honestly, we're all in a bit of pickle here. One I'm not sure how to deal with."
10031060-12 = "I know it's a little early, but could you come to the Pandemonium Society ASAP?"
10031060-13 = "[s] \"...?\""
10031060-20 = "I made my way to the Pandemonium Society's executive office as fast as I could."
10031060-23 = "Ah..."
10031060-24 = "[s] \"Makoto! I heard you were all in a bit of a pickle! What's going on?\""
10031060-28 = "How do you do, Sensei?"
10031060-29 = "You're here earlier than usual. Fufu. You're very diligent."
10031060-33 = "[ns1] \"Iroha! Is Makoto broken?!\"\n[ns2] \"You weren't kidding, this is a pickle!\""
10031060-36 = "...Right?"
10031060-37 = "Hey Iroha... Isn't it creepy seeing Makoto like this?"
10031060-39 = "Makoto, are you okay?"
10031060-40 = "Fufu. I'm fine, Ibuki. "
10031060-41 = "Oh, I have some oolong tea I got specially for this party. Would you like to try some?"
10031060-42 = "Ibuki only likes cocoa."
10031060-43 = "Yes. Cocoa would be nice too."
10031060-44 = "..."
10031060-48 = "[ns] \"What in the world is going on here?\""
10031060-49 = "Well...what happened was..."
10031060-51 = "Three hours earlier..."
10031060-53 = "How dare they meddle with my promotional statue plan! Tsk! Prefect Team scumbags!"
10031060-54 = "I don't know, you were really toeing the line with that one..."
10031060-55 = "Well, it did get a lot of attention, so in a way, we can call it a successful promotion, right? Ahaha. Everyone was talking about it online!"
10031060-56 = "No... At this rate, my plans to show the Pandemonium Society's dominance over the Prefect Team at this year's Gehenna Special Party will..."
10031060-57 = "Tsk. Chiaki! What is the Prefect Team doing right now?!"
10031060-58 = "Ah, I think they just began their regular anti-terrorism drills, as a precaution for the party."
10031060-59 = "I see... It must've distracted her from piano practice for a little while."
10031060-60 = "That's not enough. She needs even more distractions to keep her from practicing."
10031060-61 = "For our mission to expose who holds true power... To exemplify the qualities of a great leader... To let not only the Gehenna student body, but also [USERNAME] Sensei know who shall march them into the future..."
10031060-62 = "Ugh! Iroha, bring me \"that\"!"
10031060-63 = "What do you mean \"that\"? Maybe a sword?"
10031060-68 = "Ah, right. I think I left Satsuki in charge of that detail, not Iroha."
10031060-69 = "You left Satsuki in charge of preparations?!"
10031060-70 = "Ahaha! Of course you'd be worried after hearing that, Iroha!"
10031060-71 = "Just what exactly—"
10031060-76 = "Heehee. It's just as Makoto said. My preparations are already complete."
10031060-77 = "Behold... The enhanced version of my NK Ultra Project!"
10031060-78 = "The enhanced what?!"
10031060-79 = "Fufu, my original project was focused on growing the Pandemonium Society's private military forces by \"convincing\" students to swear their loyalty."
10031060-80 = "But that's not the case with this enhanced version. Per Makoto's request, the purpose of this hypnosis is...to gain respect!"
10031060-81 = "I made some adjustments to my usual hypnosis method, so that it can be used to conjure love and respect for our dear leader!"
10031060-82 = "Kekeke! You never fail to deliver, Satsuki! As expected! If we use Satsuki's enhanced hypnosis skills..."
10031060-83 = "It'll overwhelm the target with a glowing respect for me! Be that the Prefect Team, a Gehenna student, or even Sensei!"
10031060-84 = "...What even is that?"
10031060-85 = "Now then. Chiaki, Ibuki! We'll use Iroha as our first subject!"
10031060-86 = "H-Huh?! Wh-What?!"
10031060-87 = "Roger! Sorry, Iroha! A subordinate must follow their superior's orders!"
10031060-88 = "Iroha, tag! You're it!"
10031060-92 = "Wh-What?! Y-You too, Ibuki?!"
10031060-97 = "Kihehe. Oh Iroha, let's fill your heart to bursting with respect towards me!"
10031060-98 = "Just for saying that, I'll have you know that you've lost all my respect!"
10031060-99 = "Satsuki, now!"
10031060-100 = "It's okay, Iroha. You're just going to like Makoto a tiiiiiny bit more than now!"
10031060-101 = "W-Wait!"
10031060-106 = "Fufufu! Here we go!"
10031060-126 = "[ns] \"...So Makoto ended up getting hypnotized instead of Iroha?\""
10031060-128 = "...Yes, and she had it coming. Seriously."
10031060-129 = "Well, if it's not harming anyone. Isn't it fine to leave her like this?"
10031060-130 = "Though it still is a bit scary..."
10031060-131 = "Ibuki likes the new Makoto!"
10031060-132 = "Heehee, I like me too. And Ibuki, and the rest of the Pandemonium Society, and Sensei. I like everybody!"
10031060-133 = "Scratch that, she's very scary like this."
10031060-134 = "Won't it be a huge problem if the Prefect Team finds out that Makoto's in this state?"
10031060-135 = "Especially when that senior administrator finds out... She's not just going to do nothing."
10031060-136 = "Now that I think about it, wasn't Makoto supposed to go to the training site and shout, \"Sorasaki Hina! Cease your piano practice and focus on your anti-terrorism drills!\""
10031060-137 = "\"As chairman of the Pandemonium Society, I will be overseeing every single aspect of the training!\", right?"
10031060-138 = "*gasp* If they learn about Makoto's current condition, it could be all-out war."
10031060-139 = "[s] \"I don't think the Prefect Team would go that far...\""
10031060-140 = "Maybe not the head prefect, but we have a history with the senior administrator... She might go feral once she hears. How far do you think she'll go then, Sensei?"
10031060-141 = "[s] \"...I'm not sure.\""
10031060-142 = "Ahaha! You really changed your tune, Sensei."
10031060-143 = "Prefect Team? War?"
10031060-144 = "Hm? Makoto? What's wrong?"
10031060-145 = "...Right. The Pandemonium Society and the Prefect Team are mortal enemies."
10031060-146 = "We've fought each other over and over in a hateful dance."
10031060-147 = "I've been thinking about the reason for it all, and I came to one sole conclusion."
10031060-148 = "[s] \"And what would that be?\""
10031060-149 = "The very existences of the Pandemonium Society and the Prefect Team create strife!"
10031060-153 = "...What?"
10031060-154 = "If conflicts between these organizations are inevitable... If it will only burden our student body...!"
10031060-155 = "I shall use my powers as chairman and demand that the Pandemonium Society and Prefect Team be disbanded!"
10031060-166 = "This cocoa is so tasty!"
10031060-168 = "[ns] \"Makoto?\""
10031060-169 = "There's no time to waste. We must notify all of Gehenna of this decision! Let us signal the start of a new era of peace!"
10031060-170 = "Yes... There's nothing for us to gain from fighting each other! "
10031060-171 = "Let us sacrifice everything for Gehenna's peace!"
10031060-177 = "H-H-H-Hold on?! Makoto?!"
10031060-182 = "Ahahahaha!!!"
10031060-183 = "...That's not just going to end the fighting! It'll end Gehenna itself!"
10031060-184 = "[s] \"N-Now Makoto, hold on!\""
10031060-187 = "I chased down Makoto as she ran about preaching her message. With great effort, I was able to break through her hypnosis."

10031060-76 = "3;사츠키;03;후후후, 마코토 쨩의 말대로야. 이미 준비는 끝마쳤어.\n#3;em;[재잘]"
10031060-77 = "3;사츠키;02;바로 여기…… 나의 NK울트라 프로젝트의 개량판이 말이야!\n#3;jump"

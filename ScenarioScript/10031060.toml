10031060-79 = "3;사츠키;01;후후, 기존의 내 프로젝트는 어디까지나 만마전에게 충성을 맹세하고 싶게끔 만들어주는, 만마전의 사병을 육성하기 위한 방향성에 초점이 맞춰져 있었지만."
10031060-80 = "3;사츠키;02;이번 개량판은 달라. 마코토 쨩의 요청에 따라, 이번 <최면 기술>이 지향하는 바는 바로……"

10009005-161 = "[s3] \"Oh, yeah. I think that happened.\"\n[s4] \"It's giving me déjà vu. Like it happened more than once...\""
10009005-162 = "Hmm. Well, anyway..."
10009005-163 = "Hmm. Well, anyway..."
10009005-164 = "The Fox of Calamity is a moniker Kosaka Wakamo earned."
10009005-165 = "She brings destruction with her everywhere she goes."

10009005-202 = "Come in, all Valkyrie students in D.U. The wanted criminal known as the Fox of Calamity has been arrested."
10009005-203 = "Requesting the support of all Valkyrie students in D.U. to help transport the suspect. Please come to East Street as soon as possible."
10009005-204 = "That means us, Fubuki! We have to go!"
10009005-205 = "Aw, man... Haven't we worked enough for one day?#nWalking all the way to the Corrections Bureau sounds like a pain."
10009005-206 = "Don't be like that. We arrested her, so we have to see this through to the end!"

10009005-187 = "Come on! No need to be so modest."
10009005-188 = "[s] \"Didn't something about Wakamo seem a little off?\""
10009005-189 = "What do you mean?"
10009005-190 = "It seemed she had some kind of goal in mind for her attack.#nShe became flustered when we confronted her."
10009005-191 = "Did something make her lose focus?"
10009005-192 = "[s] \"Hmm...\""
10009005-193 = "Well, no use thinking about it now."
10009005-194 = "There's no point in trying to apply logic when it comes to how a criminal like her thinks."
10009005-195 = "She's in custody now, so it doesn't matter."

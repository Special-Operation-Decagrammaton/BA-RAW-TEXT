10009005-28 = "แต่ว่าในวันแบบนี้ มันเป็นวันที่จะต้องระมัดระวังให้มากๆ ของคิโวทอสเลยละค่ะ"
10009005-29 = "เพราะอาจเกิดเหตุการณ์บุกจู่โจมชิงช็อกโกแลตพิเศษแบบเมื่อสักครู่ขึ้นมาก็ได้"

10009005-169 = "There sure are. Only one is in custody now, so there are six more out there."
10009005-170 = "That means criminals just as vile as Wakamo could be lurking around any given corner of Kivotos!"
10009005-171 = "Scary stuff, huh?"
10009005-175 = "[ns] \"Y-Yeah, I guess so...\""
10009005-176 = "Come on. At least sound a little enthused."

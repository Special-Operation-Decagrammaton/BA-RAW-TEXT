10009005-48 = "อ๊ะ ดูข่าวนั่นสิ...!"
10009005-50 = "ข่าวด่วน! ข่าวด่วนค่ะ! ขอแจ้งข่าวด่วนให้พลเมืองที่อยู่บริเวณรอบๆ ย่านการค้า 3 ของเขต D.U. ทราบค่ะ!"
10009005-51 = "ขณะนี้มีข่าวว่าอาชญากรที่เหี้ยมโหด <จิ้งจอกแห่งความพินาศ> ได้ปรากฏตัวขึ้นที่นั่นค่ะ! ขอให้พลเมืองที่อยู่ในบริเวณนั้นทุกท่านรีบอพยพโดยด่วนค่ะ!"

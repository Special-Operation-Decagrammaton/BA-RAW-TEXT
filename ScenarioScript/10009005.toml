10009005-196 = "[s] \"แต่ว่า...\""
10009005-202 = "แจ้งนักเรียนโรงเรียนวัลคิรี่ทั้งหมดที่อยู่ในเขต D.U. ทราบ ขณะนี้ได้ทำการจับกุมอาชญากรที่มีหมายจับ <จิ้งจอกแห่งความพินาศ> สำเร็จแล้ว!"

10009005-31 = "อาจเกิดเหตุการณ์ที่ไม่คาดฝันได้ทุกที่และศพ... ไม่สิ อาจมีคนได้รับบาดเจ็บได้ค่ะ"
10009005-32 = "เป็นวาเลนไทน์ในคิโวทอสที่ไม่สามารถคลายความกังวลได้เลยค่ะ"

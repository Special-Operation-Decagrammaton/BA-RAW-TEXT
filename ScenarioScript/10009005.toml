[translation]
10009005-3 = "呃啊！"
10009005-4 = "唔啊啊啊！？"
10009005-10 = "看來似乎還沒變成緊急事態呢。"
10009005-11 = "把這些屍體……"
10009005-12 = "不，就這樣把這些傷患送到醫院吧。"
10009005-13 = "感，感謝幫忙！"
10009005-14 = "不，我也只是做急救醫學部該做的工作而已。不是什麼值得感謝的……"
10009005-15 = "[s]「……瀬奈？」"
10009005-16 = "……嗯？"
10009005-17 = "您好，[USERNAME]老師。"
10009005-18 = "居然會在這種地方遇到，真巧呢。"
10009005-19 = "老師……在進行夏萊的巡邏是嗎？"
10009005-20 = "……我？"
10009005-21 = "我剛才收到這附近可能會有屍體……"
10009005-22 = "不，可能會有傷患的通報，才剛處理完畢而已。"
10009005-23 = "作為急救醫學部活動的一環，正在這附近巡邏。"
10009005-24 = "[s]「急救醫學部也要巡邏嗎？」"
10009005-25 = "是的，畢竟情人節是重要的日子。#n是將彼此隱藏在心中的重要心情，轉化為實體的特別節日。"
10009005-26 = "所以必須好好守護才行。說不定會有玩過了頭，需要我出場的時候。"
10009005-27 = "[s]「原來如此，瀬奈對情人節是這麼想的啊。」"
10009005-28 = "是的。但越是像這樣美好的日子，越是需要警戒。"
10009005-29 = "如同剛才的事件一般，圍繞巧克力發生的襲擊也不少。"
10009005-30 = "此外，業者為了巧克力的營業額發生糾紛，#n或是因為想法過於強烈，導致巨大勢力彼此之間發生抗爭也是有可能的。"
10009005-31 = "不知何時何地，會發生什麼事件導致出現大量的屍……不，是出現大量的傷患。"
10009005-32 = "畢竟是情人節，一刻都不能鬆懈。"
10009005-36 = "身為急救醫學部部長必須爭取時間……"
10009005-37 = "不，是要在事態變嚴重之前阻止才行。"
10009005-38 = "[s]「會發生那種事啊……」"
10009005-39 = "不能掉以輕心。"
10009005-40 = "事件不知何時會發──"
10009005-44 = "[ns]「……？」"
10009005-46 = "發，發生什麼事了！？"
10009005-47 = "建築突然崩塌了……！"
10009005-48 = "啊，是新聞快報！"
10009005-50 = "緊急快報！位於D.U.第3商店街附近的民眾請注意！"
10009005-51 = "「災厄之狐」出現了！第3商店街附近的民眾請立刻避難！"
10009005-52 = "[s]「……『災厄之狐』？」"
10009005-59 = "……"
10009005-61 = "發現懸賞通緝犯「災厄之狐」！"
10009005-62 = "怎麼能讓你逃掉……乖乖投降吧！狐坂若藻！"
10009005-68 = "哎呀哎呀，真是煩人的飛蟲呢……"
10009005-69 = "……能否不要阻擋在我的面前呢？"
10009005-79 = "呃啊！？"
10009005-80 = "唔……！"
10009005-86 = "呵呵呵……♡僅靠這點程度的武力就想阻止我，真是被小看了呢。"
10009005-87 = "請等著我吧……"
10009005-95 = "……！"
10009005-100 = "……已確認危險要素，有造成大量傷亡的可能。#n我身為急救醫學部的部長，將立刻進行處理。"
10009005-101 = "不會再讓傷患繼續增加了。"
10009005-102 = "……似乎並非女武神的學生呢？"
10009005-103 = "啊啊，真是令人困擾呢……為何礙事的人會如此之多……#n我只是──"
10009005-104 = "[s]「先等一下……！」"
10009005-109 = "有破綻！"
10009005-111 = "……！"
10009005-112 = "桐乃！就是現在！"
10009005-114 = "是，是──！"
10009005-118 = "災，災厄之狐同學！覺悟吧！"
10009005-125 = "老師！"
10009005-126 = "趁這個機會！一口氣──"
10009005-128 = "（砰咚）"
10009005-129 = "[s]「……咦？」"
10009005-134 = "……咦？"
10009005-138 = "打，打倒了嗎？"
10009005-139 = "……真的假的？"
10009005-144 = "壓制完畢。"
10009005-145 = "大家辛苦了。"
10009005-146 = "咦，咦……？"
10009005-148 = "很厲害嘛桐乃，那可是「災厄之狐」唷！？沒想到真的能成功啊！"
10009005-149 = "是，是嗎……？"
10009005-150 = "我也以為不會打中……真，真的打中了嗎？怎麼會？"
10009005-151 = "明明是自己打中的還說「怎麼會」……"
10009005-152 = "總之無論如何，"
10009005-153 = "那可是「七罪人」之一唷？"
10009005-154 = "可以引以為傲了呢。"
10009005-155 = "確，確實……？"
10009005-156 = "[s1]「那個，若藻被稱為『災厄之狐』嗎……？」\n[s2]「還有『七罪人』又是……？」"
10009005-157 = "啊啊，老師有見過若藻對吧？"
10009005-158 = "啊啊，老師有見過若藻對吧？"
10009005-159 = "啊，這麼說來我以前也在女武神的資料裡看到過！"
10009005-160 = "之前若藻從矯正局逃獄時，平息那場混亂的就是[USERNAME]老師！"
10009005-161 = "[s3]「確實發生過那件事呢……」\n[s4]「確實發生過呢……雖然總覺得記憶好像不只一次……」"
10009005-162 = "唔嗯，總而言之，"
10009005-163 = "唔嗯，總而言之，"
10009005-164 = "「災厄之狐」就是「狐坂若藻」的通稱唷。說是綽號也可以。"
10009005-165 = "凡是其所到之處皆會因爆炎而化為焦土……記得是因此而得名。"
10009005-166 = "至於「七罪人」……"
10009005-167 = "老師應該也知道，在聯邦學生會長失蹤之後，聯邦學生會的運作一時之間處於癱瘓狀態。#n而趁著那個時機與若藻一起從矯正局逃獄的學生們，就被那麼稱呼了。"
10009005-168 = "[s]「也就是說，七個人都……」"
10009005-169 = "沒錯沒錯。"
10009005-170 = "就是在這奇普托斯裡，還有和那個若藻同等級的犯罪者正潛伏著的意思。"
10009005-171 = "於是才稱他們為「七罪人」。#n哎呀真是的，這麼一說還真可怕呢！"
10009005-175 = "[ns]「呃，嗯……」"
10009005-176 = "咦，那是什麼反應？"
10009005-177 = "老師突然聽說這種事，所以還有點疑惑吧。"
10009005-178 = "總之，在這七罪人之中也格外狂暴的，就是剛才引起騷動的「災厄之狐」若藻。"
10009005-179 = "自從逃獄以來一直隱藏著自己的蹤跡，讓人不曉得在做些什麼……"
10009005-180 = "沒想到會在這種地方被逮捕啊。"
10009005-181 = "順利的話是不是會得到獎勵之類的啊？"
10009005-182 = "吹雪總是把那種事掛在嘴邊呢……"
10009005-183 = "咦～獎勵有什麼不好的。"
10009005-184 = "光是聽到就讓人很開心。#n先不說這個了，老師和這位格黑娜的同學，剛才謝謝你們的幫忙！"
10009005-185 = "要是真的得到獎勵的話，就請你們吃好料的！"
10009005-186 = "不，我只是做了身為急救醫學部部長該做的事而已。"
10009005-187 = "哎呀～別說那種不解風情的話嘛～"
10009005-188 = "[s]「……剛才的若藻是不是不太對勁？」"
10009005-189 = "是嗎……？"
10009005-190 = "……確實，在見到我們的瞬間，他似乎相當慌張。"
10009005-191 = "雖然還搞不清楚他的目的……是不是發生了什麼意料之外的狀況呢？"
10009005-192 = "[s]「唔嗯……」"
10009005-193 = "算了，現在想這些也沒什麼意義。"
10009005-194 = "那種問題學生的思考方式，用常識去理解他們大概也是白費力氣。"
10009005-195 = "而且又已經被逮捕了。可喜可賀可喜可賀，對吧？"
10009005-196 = "[s]「……」"
10009005-202 = "通知所有D.U.自治區的女武神學生。#n就在此刻，原先正在逃亡中的通緝犯「災厄之狐」已順利被逮捕！"
10009005-203 = "現在開始將其移送至矯正局，女武神警察學園的學生們請立即前往東部地區的……"
10009005-204 = "吹雪，收到呼叫了！我們走吧！"
10009005-205 = "咦～明明是我們抓到的，還要我們工作嗎……？#n而且還要到矯正局去，真麻煩……"
10009005-206 = "現在不是說這些的時候了唷！既然做了就認真做到最後吧！"
10009005-207 = "也對，無視命令的話要寫報告也很討厭……#n要是被功過相抵又很困擾……真沒辦法。"
10009005-211 = "走吧……那麼，老師。"
10009005-212 = "抱歉，巡邏的工作就交給你了。"
10009005-213 = "我們去去就回！"
10009005-218 = "騷動似乎已經平息，我們就繼續巡邏吧。"
10009005-219 = "[s5]「嗯……啊，你要和我一起嗎？」\n[s6]「災厄之狐若藻……唔嗯……」"
10009005-223 = "（儘管心中滿是違和感，還是和瀬奈一起重新開始情人節的巡邏）"

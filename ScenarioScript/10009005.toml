10009005-28 = "However, those good intentions are why we must remain all the more vigilant on a day like today."
10009005-29 = "Some ne'er-do-wells may use the season to target stores carrying specialty chocolates, as you saw before."
10009005-30 = "Conflicts can also arise between rival merchants over chocolate sales,#nand worse still, forces beyond our understanding can clash to win the hearts of particular people."
10009005-31 = "There's no telling how many dead bodies could litter the streets on a day like this... Er, I mean, how many people could get injured."
10009005-32 = "There isn't a moment to rest on a day like this in Kivotos."
10009005-36 = "I find this to be the busiest season of all, as the Medical Emergency Club president."
10009005-37 = "Now if you'll excuse me. There are more disasters for me to prevent."
10009005-38 = "[s] \"That doesn't seem very likely...\""
10009005-39 = "You're too naive, Sensei."

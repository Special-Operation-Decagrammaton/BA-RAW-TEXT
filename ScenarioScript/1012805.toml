[translation]
1012805-1 = "เสนองาน"
1012805-2 = "สวัสดีค่ะ คุณครู"
1012805-3 = "หวังว่าคุณครูคงจะสบายดีนะคะ"
1012805-4 = "[s] \"เข้ามาสิ ฟุยุ\""
1012805-8 = "[ns] \"แต่วันนี้ไม่ใช่วันเข้าเวรของฟุยุนี่นา...?\""
1012805-9 = "ไม่หรอกค่ะ ตามในเอกสารแล้ว วันนี้เป็นเวรที่ชาเล่ต์ของฉันค่ะ"
1012805-10 = "ในรายชื่อนักเรียนที่ออกมาข้างนอกของไวลด์ฮันต์ระบุไว้อย่างนั้นแน่นอนค่ะ"
1012805-11 = "[s] \"แปลกจัง แต่เอกสารที่ครูได้มาไม่เห็นมีชื่อเลย...\""
1012805-12 = "จะไม่มีก็ไม่แปลกหรอกค่ะ"
1012805-13 = "ก็ฉันไปแก้แค่เอกสารของฝั่งไวลด์ฮันต์อย่างเดียวนี่คะ"
1012805-14 = "[s] \"ว่าไงนะ...?\""
1012805-15 = "พวกฉันไม่ได้รับค่าตอบแทนจากการค้าเป็นเงินเพียงอย่างเดียวนะคะ คุณครู"
1012805-16 = "บางครั้งเราก็ทำการค้าเพื่อให้ได้ 'สิทธิ' บางอย่างมาด้วยค่ะ"
1012805-20 = "[ns] \"ทำการค้าเพื่อให้ปลอมแปลงเอกสารได้นี่เอง!\""
1012805-21 = "เข้าใจอะไรได้รวดเร็วจริงๆ เลยนะคะ คุณครู!"
1012805-22 = "แต่คุณครูลองฟังฉันดูนะคะ"
1012805-23 = "ฉันมีเหตุผลที่ต้องทำเรื่องแบบนี้อย่างหลีกเลี่ยงไม่ได้ค่ะ"
1012805-24 = "[s] \"ไหนลองว่ามาซิ...\""
1012805-25 = "วันนี้ฉันมีการเสนองานธุรกิจที่ต้องทำให้สำเร็จให้ได้ค่ะ"
1012805-26 = "และนั่นก็คือ..."
1012805-27 = "การเสนอให้คุณครูมาเป็นที่ปรึกษาภายนอกของชมรมการค้าพิเศษค่ะ!"
1012805-28 = "[s] \"ครูน่ะเหรอ?!\""
1012805-29 = "เอาละ เชิญดูร่างแผนการก่อนเลยค่ะ"
1012805-30 = "ถ้าคุณครูตอบตกลงมาเป็นที่ปรึกษาให้ชมรมการค้าพิเศษ พวกฉันก็จะขยายขอบเขตธุรกิจของชมรม#nได้กว้างไกลกว่าตอนนี้ค่ะ"
1012805-31 = "ถ้าไล่ดูรายการสิ่งของที่อนุญาตให้เฉพาะบุคคลภายนอกนำเข้าไวลด์ฮันต์ได้..."
1012805-36 = "(การเสนองานธุรกิจของฟุยุดำเนินต่อไปอีกพักใหญ่...)"
1012805-38 = "ฉันขอจบการเสนองานเพียงเท่านี้ค่ะ..."
1012805-39 = "ว่ายังไงล่ะคะ คุณครู?"
1012805-40 = "[s1] \"เป็นการเสนองานที่ยอดเยี่ยมเลยละ แต่ครูขอปฏิเสธ\"\n[s2] \"แผนธุรกิจดีเลยนะ แต่ครูต้องขอปฏิเสธ\""
1012805-43 = "เฮือก...! ทำไมล่ะคะ...!"
1012805-44 = "อ๊ะ หรือว่าฉันยังอธิบายเกี่ยวกับค่าตอบแทนไม่ชัดเจนคะ!"
1012805-45 = "งั้นขออธิบายอีกครั้งนะคะ ถ้าคุณครูตกลงมาเป็นที่ปรึกษาให้พวกเรา..."
1012805-46 = "ฉันจะซ่อมเครื่องใช้ไฟฟ้าในสำนักงานกับอุปกรณ์อิเล็กทรอนิกส์ให้ฟรีทุกชิ้นเลยค่ะ!"
1012805-47 = "[s3] \"มีพรสวรรค์แบบนี้น่าจะไปอยู่มิลเลเนียมนะเนี่ย\"\n[s4] \"เหมือนมิลเลเนียมจะพลาดนักเรียนที่มีพรสวรรค์ไปสินะ...\""
1012805-50 = "ฮุฮุ..."
1012805-51 = "[s] \"ยังไงก็ต้องปฏิเสธอยู่ดี\""
1012805-52 = "ได้สิทธิพิเศษนั้นแล้วยังปฏิเสธอยู่ดีเหรอ..."
1012805-53 = "อืม ไหนดูซิ... อ้อ จริงสิ!"
1012805-54 = "เห็นอย่างนี้ฉันก็ทำอาหารเก่งนะคะ"
1012805-55 = "ฉันรู้วิธีการทำข้าวกล่อง ไข่ม้วนก็ทำเก่ง ซุปเต้าเจี้ยวก็ทำเป็น..."
1012805-56 = "[s] \"ก็ยังปฏิเสธอยู่เหมือนเดิม\""
1012805-57 = "อืม งั้นจะมีอะไรอีกนะ..."
1012805-58 = "จะ... จริงสิ ใช่ ถ้าคุณครูมาเป็นที่ปรึกษาให้เราละก็..."
1012805-59 = "จะ... จะได้เจอฉันทุกวันเลยนะ... คะ"
1012805-60 = "ระ... หรือว่าไม่? บะ... แบบนี้นับเป็นค่าตอบแทนได้มั้ยนะ...? อึก..."
1012805-64 = "[ns] \"อืม ถ้าเป็นข้อนี้ก็น่าสนใจอยู่นะ\""
1012805-65 = "อ๊ะ?"
1012805-66 = "จะ... จะ... จะ... จริงเหรอคะ?!"
1012805-67 = "[s5] \"แต่น่าเสียดายที่งานชาเล่ต์ของครูก็ล้นมืออยู่แล้ว...\"\n[s6] \"แต่ครูคงทำงานชาเล่ต์ควบงานที่ปรึกษาชมรมไม่ได้หรอก\""
1012805-73 = "ถะ... ถะ... ถ้าคุณครูว่างั้นก็ช่วยไม่ได้ค่ะ!"
1012805-74 = "ฮุ... ฮุฮุ ไว้คราวหน้าฉันจะเตรียมตัวมาให้ดีกว่านี้ค่ะ"
1012805-75 = "งั้นวันนี้ขอตัวก่อนนะคะ!"
1012805-83 = "เมื่อกี้คุณครูบอกว่า 'น่าสนใจ' งั้นเหรอ..."
1012805-87 = "ฮิฮิ..."

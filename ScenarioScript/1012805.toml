[translation]
1012805-1 = "Recruitment Attempt"
1012805-2 = "Good morning, Sensei!"
1012805-3 = "I hope you've been doing well!"
1012805-4 = "[s] \"Welcome, Fuyu.\""
1012805-8 = "[ns] \"...But you're not the Student Rep today?\""
1012805-9 = "No, actually I am. It's all on the record."
1012805-10 = "You can check Wildhunt's sign-out list if you like. There was a recent personnel adjustment."
1012805-11 = "[s] \"Weird, I didn't hear anything about that...\""
1012805-12 = "Sure, that makes sense."
1012805-13 = "...On account of I just changed it."
1012805-14 = "[s] \"...What?\""
1012805-15 = "There's more to life than money, Sensei."
1012805-16 = "Sometimes, we trade goods for...certain privileges."
1012805-20 = "[ns] \"You're saying that you smuggled goods and tampered with documents!\""
1012805-21 = "Clever as always, Sensei! There you are, solving mysteries again."
1012805-22 = "But Sensei, hear me out. Listen. Have a seat."
1012805-23 = "This couldn't be helped. It was unavoidable."
1012805-24 = "[s] \"...Let's hear it.\""
1012805-25 = "You see, this opportunity could be life-changing."
1012805-26 = "And it is...."
1012805-27 = "...An exclusive presentation where I recruit Sensei to be the Free Trade Cartel's official advisor!"
1012805-28 = "[s] \"Me?!\""
1012805-29 = "Before you say anything, take a look at this proposal. See the graph."
1012805-30 = "If you were to become the Free Trade Cartel's advisor, we could diversify our business model, increase productivity...and help the students! It would boost morale!"
1012805-31 = "Take a look at this list. Can you see what a special partner could bring through Wildhunt's gates? These are essentials that the students need...!"
1012805-36 = "Fuyu's presentation continued. It was honestly impressive..."
1012805-38 = "...And, so I think we're all in agreement here. The future belongs to those who believe in the beauty of their dreams."
1012805-39 = "So believe in the dream. What do you think, Sensei?"
1012805-40 = "[s1] \"It was fascinating, Sales Manager.\"\n[s2] \"But your proposal is declined.\""
1012805-43 = "Ah...! For what...?!"
1012805-44 = "It's my fault. I must not have explained your extensive compensation and benefits package in a comprehensive manner!"
1012805-45 = "So, to be clear, if you were our advisor, our partner, our guide..."
1012805-46 = "I would personally come here and fix most appliances and electronics at NO COST to you."
1012805-47 = "[s3] \"Fuyu, sometimes I think...\"\n[s4] \"Millennium might've missed out on a talent...\""
1012805-50 = "...Fufu."
1012805-51 = "[s] \"Nevertheless, declined.\""
1012805-52 = "Declined even with these conditions..."
1012805-53 = "Mm, let's see. Ah, right! Let's work to a \"yes.\""
1012805-54 = "Like... Did you know that I'm a great cook?"
1012805-55 = "I can pack lunch, I can roll omelets, I make good miso soup. Nothing beats a good breakfast."
1012805-56 = "[s] \"Nevertheless, no.\""
1012805-57 = "Um, what else..."
1012805-58 = "Y-Yeah. I-If you become our advisor..."
1012805-59 = "Y-You would, if you want, see me every day? You know?"
1012805-60 = "Is that not okay? C-Can I even say that is a benefit..? Uh..."
1012805-64 = "[ns] \"Hm, that one's definitely tempting.\""
1012805-65 = "Eh."
1012805-66 = "R-R-R-Really...?!"
1012805-67 = "[s5] \"But unfortunately, I'm busy with Schale's work...\"\n[s6] \"I can't be your advisor...right now.\""
1012805-73 = "I-I-It can't be helped then! I tried. Rejected. Eh."
1012805-74 = "F-Fufu, I'll just come back with a better presentation next time."
1012805-75 = "Well then, bye! See ya!"
1012805-83 = "\"Tempting,\" they said..."
1012805-87 = "...Heehee."

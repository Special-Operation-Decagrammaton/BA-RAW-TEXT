[translation]
1012805-1 = "招募嘗試"
1012805-2 = "你好，老師。"
1012805-3 = "府上近來一切安好嗎！"
1012805-4 = "[s]「歡迎你來，冬。」"
1012805-8 = "[ns]「……不過今天不是你的值班日吧？」"
1012805-9 = "不，在文件上，今天是我的值班日沒錯。"
1012805-10 = "至少在我們學院的值班外出者名簿上是這麼寫的哦。"
1012805-11 = "[s]「真奇怪，我完全沒接到通知耶……」"
1012805-12 = "老師不知道也很正常。"
1012805-13 = "因為我修改的只有校內的名簿而已。"
1012805-14 = "[s]「……什麼？」"
1012805-15 = "我們在進行交易時所收取的代價，並不僅限於金錢哦，老師。"
1012805-16 = "有時候也會以獲得某種「權限」作為條件來進行交易。"
1012805-20 = "[ns]「意思你是以竄改名簿為代價，幫忙走私了對吧！」"
1012805-21 = "能明白我的言外之意，真不愧是老師！"
1012805-22 = "不過請先聽我解釋。"
1012805-23 = "我之所以這麼做，也是因為有不得已的理由哦？"
1012805-24 = "[s]「……說來聽聽吧。」"
1012805-25 = "今天有一場必須成功的商務簡報。"
1012805-26 = "那就是……"
1012805-27 = "要招募老師成為特殊交易部的外部顧問！"
1012805-28 = "[s]「要招募我！？」"
1012805-29 = "來，請先看看這份企劃案吧。"
1012805-30 = "如果老師成為特殊交易部的顧問，我們就能更大幅度地拓展事業。"
1012805-31 = "首先，光是從那些僅允許外部人士攜入的部分狂獵物品來看……"
1012805-36 = "（冬的簡報就這樣持續了一段時間……）"
1012805-38 = "……以上就是簡報的全部內容。"
1012805-39 = "不知道你意下如何呢，老師？"
1012805-40 = "[s1]「簡報非常精彩哦，室長。」\n[s2]「不過本案恕我駁回。」"
1012805-43 = "咦……！為什麼……！"
1012805-44 = "啊，是不是報酬部分的說明不夠清楚呢？"
1012805-45 = "再重複一次，只要成為老師我們的顧問……"
1012805-46 = "我可以免費幫忙修理幾乎所有家電或電子設備哦！"
1012805-47 = "[s3]「看著冬的時候，我偶爾就會產生這種想法。」\n[s4]「或許千年錯失了一位難得的人才……」"
1012805-50 = "……呵呵。"
1012805-51 = "[s]「不過還是必須駁回。」"
1012805-52 = "連這個條件都不行嗎……"
1012805-53 = "唔嗯，讓我想想……啊，對了！"
1012805-54 = "其實我的廚藝也很不錯哦？"
1012805-55 = "除了便當之外，要做蛋捲和味噌湯也沒問題……"
1012805-56 = "[s]「還是不行。」"
1012805-57 = "唔嗯……除了這些之外……"
1012805-58 = "如，如果老師成為顧問的話……"
1012805-59 = "就，就能每天見到我……唷？"
1012805-60 = "等等，這，這能算是獎勵嗎……？#n嗚嗚……"
1012805-64 = "[ns]「嗯，這確實讓人有點心動。」"
1012805-65 = "咦。"
1012805-66 = "真，真，真的嗎……！？"
1012805-67 = "[s5]「可是很遺憾，夏萊的工作太忙……」\n[s6]「目前我恐怕很難擔任你們的顧問。」"
1012805-73 = "既，既然如此那也沒辦法了！"
1012805-74 = "呵，呵呵。下次我會準備得更充分再來的。"
1012805-75 = "那麼，今天就先告辭了！"
1012805-83 = "有點讓人心動什麼的……"
1012805-87 = "……嘿嘿。"

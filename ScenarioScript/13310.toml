[translation]
13310-1 = "第31話;唯一的真相（１）"
13310-3 = "（……身體無法動彈）"
13310-5 = "一切都結束了，小鳥遊星野。乖乖躺著別動。"
13310-6 = "（結束了……？為什麼……？）"
13310-13 = "……你為什麼要阻止我？"
13310-14 = "完全無法理解。#n你……明明跟這件事沒有關係……"
13310-15 = "是老師拜託我的──他希望我能阻止你。"
13310-16 = "而且，我跟這件事也有關係。"
13310-17 = "……"
13310-18 = "那門列車砲……是格黑娜雷帝的遺產。#n我必須把它們一個不留地全部破壞才行。"
13310-19 = "格黑娜的暴君……雷帝……？"
13310-20 = "雷帝的遺產，總是會為奇普托斯帶來危機。"
13310-21 = "沒想到居然連阿拜多斯也有……"
13310-22 = "格黑娜……這樣啊。#n原來你也盯上了……列車砲啊……"
13310-23 = "但是該怎麼做……？那東西屬於凱薩……"
13310-24 = "不。那件事總有辦法能解決。"
13310-25 = "你不是也很清楚嗎？"
13310-27 = "……"
13310-28 = "你早就知道了，小鳥遊星野！！"
13310-29 = "你明明知道會有辦法！"
13310-33 = "老師和所有人應該都對你這麼說過──總會有辦法的。#n老師他一定會想辦法解決。"
13310-34 = "實際上我也見證過好幾次了，星野。"
13310-35 = "……"
13310-36 = "然而即便如此，你還是沒有停下腳步。#n不……應該是沒辦法停下來吧。"
13310-38 = "因為你放不下梔子夢。"
13310-39 = "……"
13310-40 = "一定要守護梔子夢的意志──你是這麼想的對吧？#n認為那個人之所以留下那份契約，一定是為了破壞列車砲。"
13310-41 = "但事實並非如此。"
13310-42 = "夢當時不知道「沙漠橫貫鐵路」有列車砲的存在。#n因為就連一直追蹤著雷帝遺產的我和真琴都不知道。"
13310-43 = "……"
13310-44 = "那個學生會長只是單純認為「沙漠橫貫鐵路」是阿拜多斯學生會和奈芙蒂斯──#n雙方一同為復興自治區付出的努力所留下的痕跡，所以必須保存下來而已。"
13310-45 = "或許在他心裡……就連這愚蠢的沙漠橫貫鐵路，也是阿拜多斯不可缺少的一部分吧。"
13310-47 = "於是他為了匯入契約的1萬元訂金，才會急著穿越沙漠前往自治區郊外的銀行……#n結果不幸碰上了意外。"
13310-52 = "買賣契約……「阿拜多斯學生會」以100萬元，#n向奈芙蒂斯收購沙漠橫貫鐵路附屬設施使用權利……並立即支付簽約金1萬元……"
13310-54 = "沒錯，契約的簽訂與簽約金的交付都確認已經完成，#n然而卻在尚未支付尾款的狀態下，就這麼維持了將近兩年。"
13310-56 = "夢前輩他……？#n你……怎麼會知道這件事……？"
13310-60 = "雖然當時所有人都避而不談……但是在奇普托斯，學生的死亡可是重大事件。"
13310-61 = "重大到格黑娜的情報部必須加以確認。"
13310-63 = "那是一場意外，小鳥遊星野。"
13310-64 = "不是任何人的錯。只是場無法預測的自然災害而已。"
13310-65 = "……別把它視為你犯下的罪過。"
13310-66 = "我？"
13310-67 = "你又瞭解我什麼了……？"
13310-68 = "……"
13310-69 = "我當然瞭解……因為負責調查梔子夢死亡事件的人就是我。"
13310-70 = "是你……？"
13310-71 = "從我還在情報部的時候，就已經知道你了。"
13310-72 = "我很瞭解你。"
13310-74 = "因為你比任何人都強大，所以無法理解為何要向他人求助。"
13310-75 = "因為在你身邊，沒有任何能拜託和依靠的人。"
13310-76 = "所以才一直認為自己「必須獨自守護一切」。"
13310-77 = "因而化為了利刃，以違背本心的言行攻擊周遭的人事物。"
13310-79 = "但是你仍然沒有選擇逃跑，自始至終都留在阿拜多斯。"
13310-80 = "你比我更加強大。"
13310-81 = "因為即便如此，你還是有想保護的東西。"
13310-82 = "我想保護的東西……"
13310-84 = "你到底在搞什麼啦！！"
13310-87 = "恭候多時了，曉之荷魯斯。#n阿拜多斯……不，奇普托斯的最高神祕。"
13310-88 = "我想向你提出一個提案。"
13310-90 = "……？#n我叫做小鳥遊星野，黑色西裝人。"
13310-91 = "……咯咯咯。#n原來如此，是奇普托斯內的名字啊。"
13310-92 = "哎呀哎呀，我明白了。#n看來我似乎也需要一個用於奇普托斯的名字呢。"
13310-94 = "[ruby= ・     ・ ]黑色[/ruby][ruby= ・     ・     ・ ]西裝人[/ruby]啊……#n也好，之後就用這個名字吧。"
13310-95 = "……？"
13310-98 = "事情我都聽說了。"
13310-99 = "如今學生會長不在，由你這個副會長來把債務還清如何？小鳥遊星野小姐？"
13310-100 = "或者……你要接受我的提議呢？"
13310-101 = "……不必了，我沒興趣。"
13310-102 = "為什麼……？你應該沒有繼續留在那裡的理由才對。"
13310-105 = "從阿拜多斯退學，加入我們的企業──#n只要接受這項條件，我可以免除阿拜多斯一半的債務。"
13310-106 = "咯咯，咯咯咯咯……那麼，告訴我你的答案吧。#n如果是YES的話，請在這裡簽名。"
13310-108 = "……我應該說過很多次了，我拒絕。"
13310-109 = "……為什麼？"
13310-110 = "你是為了什麼而留在那裡？"
13310-112 = "我是……為了什麼……"
13310-113 = "但是列車砲……如果放任不管的話……"
13310-114 = "不，列車砲正由老師和對策委員會一起處理。"
13310-120 = "哇啊啊啊啊啊！！"
13310-121 = "哦哦哦～"
13310-125 = "快追上列車砲了！"
13310-126 = "雖然很感謝你們從凱薩手中解救我們……但那個看起來有點危險耶，沒問題嗎？"
13310-127 = "所以才必須阻止！#n要在和列車砲衝撞的時候跳過去才行！白子醬、茜香醬！"
13310-128 = "嗯，我知道了。"
13310-129 = "可，可是速度會不會太快了？"
13310-131 = "老師！必須抓緊時間！！#n現在從列車砲的主砲偵測到了強大的能量！！恐怕已經在準備發射了！！"
13310-132 = "探索。追蹤地下生活者的位置……#n老師，地下生活者正在持續接近星野同學！"
13310-133 = "雖然嘗試進行干擾，但地下生活者依舊維持在共存狀態……！"
13310-134 = "[s1]「我知道了！！」\n[s2]「無論如何都一定要阻止列車砲和星野！！」"
13310-139 = "衝撞前5秒！！"
13310-140 = "看我的！！準備！！"
13310-141 = "列車砲……親手破壞它真可惜～"
13310-146 = "就是現在！！"
13310-148 = "嗯！"
13310-150 = "哇啊啊啊啊──！"
13310-158 = "下一話;唯一的真相（２）"

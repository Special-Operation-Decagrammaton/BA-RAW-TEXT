[translation]
13310-1 = "Episode 31;One Truth 1"
13310-3 = "(...My body won't move.)"
13310-5 = "It's all over, Takanashi Hoshino. Just lie still."
13310-6 = "(Over...? Why...?)"
13310-13 = "...Why did you stop me? "
13310-14 = "I don't understand. Why...? You...have nothing to do with this..."
13310-15 = "A favor. For Sensei. They asked me to stop you."
13310-16 = "And I'm not entirely unaffected by this."
13310-17 = "..."
13310-18 = "That Train Cannon...is a legacy of Gehenna's Tyrant Emperor. I have to destroy it completely, without a trace."
13310-19 = "Gehenna's...Tyrant Emperor...? "
13310-20 = "The Tyrant Emperor's legacies have always brought catastrophe to Kivotos when unearthed. "
13310-21 = "I never imagined we'd find remnants left behind in Abydos."
13310-22 = "Gehenna... So...you're after the Train Cannon too..."
13310-23 = "How do you intend...? Kaiser's ownership..."
13310-24 = "That's hardly an unsolvable problem. "
13310-25 = "Don't you know that as well as I do?"
13310-27 = "..."
13310-28 = "You've known that from the beginning, Takanashi Hoshino!"
13310-29 = "That there is a way!"
13310-33 = "Sensei and everyone else has been screaming it at you. That there's always a way. The Sensei you know would have found a solution, one way or another. "
13310-34 = "You've even experienced that phenomenon personally, time and again, Hoshino. "
13310-35 = "..."
13310-36 = "Despite that, you never stopped once. No... I suppose you couldn't stop."
13310-38 = "Because of Kuchinashi Yume."
13310-39 = "..."
13310-40 = "You believed you were honoring Kuchinashi Yume's will. That she'd left the sales contract to you, as a means to destroy the Train Cannon."
13310-41 = "You were wrong. "
13310-42 = "Yume wasn't aware of the Train Cannon's existence, let alone that it was sitting along the Trans-Desert Railway. Makoto and I were closely tracking every shred of the Tyrant Emperor's legacy at that time, and even we didn't know."
13310-43 = "..."
13310-44 = "The student council president simply considered the Trans-Desert Railway an important remnant of the efforts made by the Abydos Student Council and Nephthys to revive the district. She was only attempting to preserve it."
13310-45 = "She must have thought that even this ridiculous Trans-Desert Railway was a part of Abydos' history that shouldn't be buried."
13310-47 = "Yume's destination was a bank on the outskirts of the district. She was rushing across the desert to deposit the 10,000 yen down payment for the contract...when the accident occurred."
13310-52 = "Sales Contract... Abydos Student Council agrees to purchase the rights to...Trans-Desert Railway facilities from Nephthys...for one million yen... Upon signing this contract, the buyer shall pay a contract fee of 10,000 yen..."
13310-54 = "Yes. That's correct. The contract has indeed been signed and notarized, but the payment itself has not been delivered, two years later."
13310-56 = "Yume did...? How... How...do you...know all this...?"
13310-60 = "…Everyone tried to keep it quiet back then, but in Kivotos, a student's death is an enormous incident."
13310-61 = "It's only natural that the Gehenna Intelligence Committee had to look into it."
13310-63 = "It was an accident, Takanashi Hoshino."
13310-64 = "It was no one's fault. It was simply an unpredictable natural disaster."
13310-65 = "...It's not your sin to carry."
13310-66 = "Me...?"
13310-67 = "What do you know about me...?"
13310-68 = "..."
13310-69 = "I do know you... I was the one who gathered intel on Yume's death."
13310-70 = "You...?"
13310-71 = "I've known you since I was a member of the Intelligence Committee."
13310-72 = "I know you."
13310-74 = "You were the strongest, so you couldn't comprehend the idea of seeking aid from others."
13310-75 = "All alone, you couldn't trust anyone. No one around you to rely on for help."
13310-76 = "So you came to the conclusion you had to protect everything by yourself."
13310-77 = "And that turned into a blade, lashing out at everyone around you, no matter what your true feelings might have been."
13310-79 = "Despite all that, you remained in Abydos. You never ran away."
13310-80 = "You are a stronger person than me."
13310-81 = "Because, despite everything, you stayed. Because you had something you wanted to protect."
13310-82 = "Something I wanted to protect..."
13310-84 = "What have you done?!"
13310-87 = "I was waiting for you. Horus of Dawn, Abydos'... No, the Great Mystery of Kivotos."
13310-88 = "I have a proposal for you."
13310-90 = "Huh? My name is Takanashi Hoshino, Black Suit."
13310-91 = "...Hahaha, I see. Is that what they call you in Kivotos?"
13310-92 = "I see, I see. Perhaps I need a name for Kivotos as well."
13310-94 = "Black Suit... I like it. I'll take that as my name."
13310-95 = "...?"
13310-98 = "I heard the news."
13310-99 = "Now that the student council president is gone, will you be assuming responsibility of the debt, Vice President Takanashi Hoshino?"
13310-100 = "Or...would you rather hear my offer?"
13310-101 = "...No. No need."
13310-102 = "By what reasoning...? You have no reason to remain at the school."
13310-105 = "Half of Abydos' debt will instantly be forgiven if you agree to drop out of school and join the corporation I manage."
13310-106 = "Heh, heh, heh. So, do we have a deal? Yes? Then go ahead and sign here."
13310-108 = "No. My answer isn't going to change. I'm not doing that."
13310-109 = "...Why?"
13310-110 = "For what purpose do you remain there?"
13310-112 = "For...what purpose...do I...?"
13310-113 = "But the Train Cannon...if I just leave it..."
13310-114 = "Sensei and the Foreclosure Task Force are already chasing down the Train Cannon."
13310-120 = "AHHH!"
13310-121 = "Wowieee!"
13310-125 = "We're almost caught up to the Train Cannon."
13310-126 = "I'm super, duper grateful you rescued us from Kaiser and all, but that thing looks dangerous as dangerous gets! You sure about this?"
13310-127 = "That's exactly why we have to stop it! As soon as we collide with the Train Cannon, we're jumping onto it! Shiroko! Serika!"
13310-128 = "Yeah, okay."
13310-129 = "B-But aren't we going kinda fast?"
13310-131 = "Sensei! You need to hurry! I'm detecting a powerful energy surge from the main cannon! It's preparing to fire!"
13310-132 = "Currently tracking the location of the Underground Dweller... Sensei, he is approaching Hoshino! "
13310-133 = "I'm attempting to hold him off, but the Underground Dweller's position remains in a dimensional overlap...!"
13310-134 = "[s1] \"I got it! Thank you!\"\n[s2] \"We'll stop both of them, somehow! The Train Cannon and Hoshino!\""
13310-139 = "Impact in five seconds!"
13310-140 = "Here we go! Get ready!!"
13310-141 = "The Train Cannon... Hikari's going to destroy it. With her own two hands... How sad."
13310-146 = "Let's go! "
13310-148 = "Yes!"
13310-150 = "Whaaa!"
13310-158 = "Next Episode;One Truth 2"

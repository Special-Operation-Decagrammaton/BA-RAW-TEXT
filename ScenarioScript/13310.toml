[translation]
13310-1 = "ตอนที่ 31;ความจริงมีเพียงหนึ่งเดียว 1"
13310-3 = "(ขยับร่างกายไม่ได้เลย...)"
13310-5 = "ใช่ ทุกอย่างมันจบแล้วละ ทาคานาชิ โฮชิโนะ เธอนอนอยู่อย่างนั้นละดีแล้ว"
13310-6 = "(จบงั้นเหรอ...? ทำไมล่ะ...?)"
13310-13 = "ทำไมเธอถึงได้...?"
13310-14 = "ไม่เข้าใจเลย... ทำไมกัน...? เธอ... ไม่เกี่ยวข้องกับเรื่องนี้นี่นา..."
13310-15 = "คุณครูขอร้องฉันมาน่ะ ขอให้ช่วยขวางเธอไว้"
13310-16 = "แล้วก็... ใช่ว่าฉันจะไม่มีส่วนเกี่ยวข้องหรอกนะ"
13310-17 = "..."
13310-18 = "ปืนแม่เหล็กไฟฟ้านั่นน่ะ... เป็นมรดกของผู้เหี้ยมโหดแห่งเกเฮนน่า ฉันต้องทำลายสิ่งนั้นแบบไม่ให้#nเหลือซาก"
13310-19 = "ผู้เหี้ยมโหด... แห่งเกเฮนน่า?"
13310-20 = "มรดกของผู้เหี้ยมโหดทำให้คิโวทอสเจอความพินาศมาโดยตลอด"
13310-21 = "แต่ฉันไม่คิดเลยว่าจะมีหลงเหลืออยู่ในอะบิดอสด้วย..."
13310-22 = "เกเฮนน่า... งั้นเหรอ เธอ... เธอเองก็... อยากทำลายปืนแม่เหล็กไฟฟ้านั่นสินะ..."
13310-23 = "แต่จะทำยังไงล่ะ...? นั่นมันของของไคเซอร์นะ..."
13310-24 = "ฉันไม่สนหรอก ไม่ว่ายังไงก็ต้องทำให้ได้"
13310-25 = "เธอเองก็รู้ดีไม่ใช่เหรอ?"
13310-27 = "..."
13310-28 = "เธอรู้ดีอยู่แล้วนี่ ทาคานาชิ โฮชิโนะ!!"
13310-29 = "ว่าไม่ว่ายังไงก็ทำได้น่ะ!"
13310-33 = "คุณครูกับทุกคนพูดกันมาตลอดว่าเราจะทำมันได้ ไม่ว่ายังไงก็จะผ่านไปได้ และถ้าเป็นคุณครู ไม่ว่ายังไงก็จะเข้ามาช่วยอยู่แล้ว"
13310-34 = "เธอเองก็เห็นมาหลายครั้งแล้วไม่ใช่เหรอ โฮชิโนะ เธอน่ะ"
13310-35 = "..."
13310-36 = "แต่ถึงอย่างนั้นเธอก็ยังไม่ยอมหยุด ไม่สิ... ต้องบอกว่าหยุดไม่ได้มากกว่า"
13310-38 = "เป็นเพราะคุจินาชิ ยูเมะ"
13310-39 = "..."
13310-40 = "เธอคงคิดว่าตัวเองต้องทำตามความต้องการของคุจินาชิ ยูเมะ แล้วก็คิดว่าที่ยูเมะทิ้งสัญญาซื้อขายนั่น#nเอาไว้ ก็เพื่อให้ทำลายปืนแม่เหล็กไฟฟ้า"
13310-41 = "แต่มันไม่ใช่อย่างนั้นหรอก"
13310-42 = "ตอนนั้นยูเมะไม่รู้ว่ามีปืนแม่เหล็กไฟฟ้าอยู่ใน <ทางรถไฟข้ามทะเลทราย> เพราะแม้แต่ฉัน หรือกับมาโคโตะที่สืบหามรดกของผู้เหี้ยมโหดกันมาตลอดก็ยังไม่รู้เลย"
13310-43 = "..."
13310-44 = "<ทางรถไฟข้ามทะเลทราย> เป็นหลักฐานที่แสดงถึงความพยายามในการฟื้นฟูเขตปกครองตนเอง#nของสภานักเรียนอะบิดอสและเนฟธิส ประธานสภานักเรียนคนนั้นก็เลยคิดว่าต้องรักษามันไว้"
13310-45 = "แล้วก็คงคิดว่าทางรถไฟข้ามทะเลทรายโง่ๆ นี่เป็นส่วนหนึ่งของอะบิดอสที่ไม่ควรปฏิเสธ"
13310-47 = "ก็เลยดั้นด้นข้ามทะเลทรายไปเพื่อจะไปธนาคารที่อยู่ชายขอบเขตปกครองตนเองแล้วฝากเงินมัดจำ#n1 หมื่นเยนของสัญญานั่น... แต่ระหว่างนั้นกลับเจออุบัติเหตุเข้าเสียก่อน"
13310-52 = "สัญญาซื้อขาย... <สภานักเรียนอะบิดอส> ซื้อสิทธิ์ในการใช้สิ่งอำนวยความสะดวกเสริมที่เป็นส่วน#nประกอบของทางรถไฟข้ามทะเลทรายจากเนฟธิสในราคา 1 ล้านเยน... และจะจ่ายเงินมัดจำทันทีใน#nจำนวน 1 หมื่นเยน..."
13310-54 = "ครับ ใช่แล้วครับ ถึงจะยืนยันได้ว่ามีการเขียนสัญญาและระบุเรื่องเงินมัดจำไว้แล้ว แต่ภายใน 2 ปีหลัง#nจากนั้นก็ไม่มีการชำระเงินครับ"
13310-56 = "รุ่นพี่ยูเมะน่ะเหรอ...? แล้วเธอ... รู้เรื่องนี้... ได้ยังไง...?"
13310-60 = "ตอนนั้นทุกคนปกปิดเรื่องนี้กันหมด... แต่การที่นักเรียนเสียชีวิตในคิโวทอสถือเป็นเรื่องใหญ่"
13310-61 = "มันเลยเป็นงานใหญ่ที่หน่วยข่าวกรองเกเฮนน่าในตอนนั้นต้องตรวจสอบ"
13310-63 = "มันเป็นอุบัติเหตุน่ะ ทาคานาชิ โฮชิโนะ"
13310-64 = "ไม่ใช่ความผิดของใครหรอก มันเป็นแค่ภัยพิบัติตามธรรมชาติที่ไม่มีใครคาดเดาได้"
13310-65 = "อย่าคิดว่ามันเป็นความผิดของเธอเลย..."
13310-66 = "พูดถึงฉันเหรอ?"
13310-67 = "เธอรู้อะไรเกี่ยวกับฉันงั้นเหรอ...?"
13310-68 = "..."
13310-69 = "รู้สิ ก็คนที่รวบรวมข้อมูลเกี่ยวกับการเสียชีวิตของยูเมะก็คือฉันเอง"
13310-70 = "เธอน่ะเหรอ...?"
13310-71 = "ฉันรู้จักเธอมาตั้งแต่ตอนที่อยู่หน่วยข่าวกรองแล้ว"
13310-72 = "ฉันรู้จักเธอ"
13310-74 = "เธอแข็งแกร่งกว่าใครๆ ก็เลยไม่รู้จักการขอความช่วยเหลือจากคนอื่น"
13310-75 = "เพราะคนที่อยู่รอบตัวเธอไม่มีใครให้พึ่งพาได้เลย"
13310-76 = "เพราะงั้น เธอก็เลยคิดมาตลอดว่าเธอต้องปกป้องทุกอย่างด้วยตัวเอง"
13310-77 = "มันเลยกลายเป็นคมมีด แล้วทำร้ายผู้คนรอบๆ ในแบบที่เธอไม่ได้ตั้งใจ"
13310-79 = "แต่ถึงอย่างนั้นเธอก็ไม่หนี และยังคงอยู่ที่อะบิดอส"
13310-80 = "เธอน่ะแข็งแกร่งกว่าฉัน"
13310-81 = "เพราะเธอมีสิ่งที่อยากปกป้อง"
13310-82 = "สิ่งที่ฉันอยากปกป้อง..."
13310-84 = "ทำอะไรลงไปคะเนี่ย?!"
13310-87 = "กำลังรออยู่เลยครับ ฮอรัสแห่งรุ่งอรุณ ความลึกลับขั้นสุดของอะบิดอส... ไม่สิ ของคิโวทอส"
13310-88 = "ผมมีบางอย่างอยากเสนอคุณครับ"
13310-90 = "...? ฉันชื่อทาคานาชิ โฮชิโนะต่างหาก สูทดำ"
13310-91 = "หึหึหึ... งั้นเหรอครับ สงสัยว่านั่นจะเป็นชื่อที่เรียกกันในคิโวทอสนะครับ"
13310-92 = "เอาเป็นว่าผมรับทราบแล้วครับ ถ้าอย่างนั้น... ผมก็อาจต้องมีชื่อที่ใช้ในคิโวทอสบ้างแล้วนะครับ"
13310-94 = "สูทดำงั้นเหรอ... ก็ดีครับ ผมจะใช้ชื่อนั้นแล้วกัน"
13310-95 = "...?"
13310-98 = "ผมได้ข่าวมาครับ"
13310-99 = "พอประธานนักเรียนหายตัวไป รองประธานนักเรียนอย่างคุณก็เลยจะชดใช้หนี้แทนงั้นเหรอครับ?#nคุณทาคานาชิ โฮชิโนะ?"
13310-100 = "หรือว่ามาเพื่อ... ฟังข้อเสนอของพวกเรากันครับ?"
13310-101 = "ไม่หรอก... ฉันไม่เห็นต้องฟังข้อเสนออะไรนั่น"
13310-102 = "ทำไมกันล่ะ...? คุณไม่มีเหตุผลที่ต้องอยู่ที่นั่นต่อไม่ใช่เหรอครับ?"
13310-105 = "หากลาออกมาจากโรงเรียนอะบิดอส แล้วมาสังกัดในธุรกิจที่ผมดูแลอยู่ ผมจะตัดหนี้ของอะบิดอสลงให้#nครึ่งหนึ่ง"
13310-106 = "หึหึหึ... ได้คำตอบหรือยังครับ? ตกลงใช่มั้ย? ถ้างั้นก็เซ็นชื่อตรงนี้เลยครับ"
13310-108 = "ฉันให้คำตอบไปหลายครั้งแล้วไม่ใช่เหรอ? ฉันขอปฏิเสธ"
13310-109 = "ทำไมล่ะครับ...?"
13310-110 = "ทำไมถึงยังอยากอยู่ที่นั่นต่อล่ะ?"
13310-112 = "ฉันอยากจะ... ฉันน่ะ..."
13310-113 = "แต่ว่า... ถ้าปล่อยปืนแม่เหล็กไฟฟ้าไว้อย่างนั้น..."
13310-114 = "ไม่หรอก คุณครูกับพวกคณะกรรมการแผนงานกำลังช่วยกันไล่ล่าปืนแม่เหล็กไฟฟ้านั่นอยู่"
13310-120 = "เหวออออ!!"
13310-121 = "โอ้วว!"
13310-125 = "เราใกล้จะตามปืนแม่เหล็กไฟฟ้าทันแล้วค่ะ!"
13310-126 = "ขอบใจที่ช่วยพวกเราจากพวกไคเซอร์ไว้นะ... แต่ว่านั่นมันดูอันตรายไม่ใช่เล่นเลย จะไม่เป็นไรเหรอ?"
13310-127 = "เพราะมันอันตราย ถึงได้ต้องขวางไว้ยังไงล่ะคะ! วินาทีที่ชนกับปืนแม่เหล็กไฟฟ้า เราจะขึ้นไปบนนั้นกันเลยค่ะ! ชิโรโกะจัง เซริกะจัง!"
13310-128 = "อื้ม เข้าใจแล้ว"
13310-129 = "วะ... ว่าแต่... นั่นมันเร็วมากเกินไปหรือเปล่า?"
13310-131 = "คุณครู! ต้องรีบแล้วค่ะ!! ตอนนี้มีการตรวจพบพลังงานทรงพลังจากกระบอกปืนใหญ่ที่อยู่บนปืน#nแม่เหล็กไฟฟ้าค่ะ!! อาจจะกำลังเตรียมยิงก็ได้ค่ะ!!"
13310-132 = "ระบุเป้าหมาย กำลังไล่ล่าตำแหน่งของผู้อาศัยอยู่ใต้พิภพ... คุณครู ตอนนี้ผู้อาศัยอยู่ใต้พิภพกำลัง#nเข้าหาคุณโฮชิโนะอยู่ค่ะ!"
13310-133 = "ฉันพยายามขัดขวางอยู่ก็จริง แต่ว่าก็ต้องรักษาสถานะการซ้อนทับมิติของตำแหน่งของผู้อาศัยอยู่ใต้#nพิภพด้วย..."
13310-134 = "[s1] \"เข้าใจแล้ว!!\"\n[s2] \"ไม่ว่ายังไงก็ต้องขวางไว้ให้ได้!! ทั้งปืนแม่เหล็กไฟฟ้า และโฮชิโนะเลย!!\""
13310-139 = "เตรียมรับแรงปะทะใน 5 วินาที!!"
13310-140 = "เอาละ!! เตรียมตัวให้ดี!"
13310-141 = "ปืนแม่เหล็กไฟฟ้า... น่าเสียดายที่ต้องถูกฉันชนให้บี้นะ..."
13310-146 = "เอาเลย!!"
13310-148 = "อื้อ!"
13310-150 = "เหวออออ!"
13310-158 = "ตอนต่อไป;ความจริงมีเพียงหนึ่งเดียว 2"

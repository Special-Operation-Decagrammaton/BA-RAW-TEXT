[translation]
10046160-3 = "I've waited a long time."
10046160-4 = "Now, it's finally my turn."
10046160-5 = "...Seia?"
10046160-6 = "Yes. Let's go, Ichika."
10046160-7 = "No! Huh? Go where?"
10046160-8 = "...? We are going on patrol together."
10046160-9 = "I am... But this is dangerous, grueling work, so you should enjoy your nice vacation over there."
10046160-10 = "Ah, I understand very clearly."
10046160-11 = "I'm glad."
10046160-12 = "Seia of the Tea Party CANNOT patrol...or, a correction. Seia is overqualified and therefore cannot patrol."
10046160-13 = "Is that what you are trying to tell me?"
10046160-14 = "Uh...somewhat. You are very high up..."
10046160-15 = "But who assigned me to be Seia of the Tea Party and you to be Ichika of the Justice Task Force?"
10046160-16 = "...Huh?"
10046160-20 = "A role is a phantom without form. If we were on an uninhabited island, would these roles still persist?"
10046160-21 = "...Huh?!"
10046160-22 = "Ranks and roles are mirages constructed by social norms. If we were to create a society consisting of only you and me, would I truly be so much \"higher up\" relative to you?"
10046160-23 = "...HUH?!"
10046160-24 = "All definitions would be relative. Even if you disagreed, as long as I agreed, you could say that half of the society agrees."
10046160-25 = "That's enough discussion. Now, let's go."
10046160-30 = "...No, no! That's... What happened? You didn't explain anything!"
10046160-31 = "Haha. How I've missed working in the field. A distant memory resurrected..."
10046160-32 = "Seia!"

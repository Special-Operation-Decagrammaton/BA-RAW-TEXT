10046160-1 = "#all;hide"
10046160-2 = "3;세이아 수영복;99\n#3;a"
10046160-3 = "3;세이아 수영복;99;오랜 기다림이었습니다.\n#3;em;…"
10046160-4 = "3;세이아 수영복;11;마침내, 제가 나설 차례가 왔군요."
10046160-5 = "3;이치카 수영복;02;……세이아 님?\n#3;em;[?]"
10046160-6 = "3;세이아 수영복;02;네, 갑시다. 이치카.\n#3;m2"
10046160-7 = "4;이치카 수영복;20;아니요, 아니요! 가긴 어딜 가심까?!\n#4;al\n#4;hophop"
10046160-8 = "3;세이아 수영복;00;……? 순찰하는 것 아니었나요?\n#3;em;[?]"
10046160-9 = "4;이치카 수영복;04;예, 그렇긴 한데요……. 이 일은 힘들고 위험하니까, 세이아 님께서 안전한 곳에서 휴양을 즐기시는 게……."
10046160-10 = "3;세이아 수영복;99;과연, 이해했습니다."
10046160-11 = "4;이치카 수영복;99;아, 그러면."
10046160-12 = "3;세이아 수영복;02;티파티의 세이아는 이 일을 맡기에 자격이 부족하다…… 아니, 말하자면 반대군요. 자격이 과분하기 때문에 할 수 없다.\n#3;em;[반응]"
10046160-13 = "3;세이아 수영복;01;그렇게 말씀하시는 것이죠?"
10046160-14 = "4;이치카 수영복;04;어…… 뭐, 말하자면 그렇게 되네요.\n#4;em;[땀]"
10046160-15 = "3;세이아 수영복;11;하지만 저를 티파티 세이아로 정의하는 것과, 이치카를 정의실현부 이치카로 정의하는 것은 무엇일까요?"
10046160-16 = "4;이치카 수영복;20;……네?\n#4;em;[?]"
10046160-17 = "#st;[0,0];instant;1;"
10046160-18 = "#clearST"
10046160-19 = "3;세이아 수영복;11\n4;이치카 수영복;20\n#3;h\n#4;h\n#3;m3\n#4;dr\n#wait;1500"
10046160-20 = "4;이치카 수영복;20\n3;세이아 수영복;13;역할이란 실체 없는 유령. 만약 저희가 무인도에 떨어진다면, 그때도 이 역할 관계가 유지될까요?\n#4;hide"
10046160-21 = "3;이치카 수영복;04;…………네?\n#3;stiff"
10046160-22 = "3;세이아 수영복;11;결국, 계급과 역할은 가변 가능한 사회 규범이 만들어낸 신기루일 뿐이라는 겁니다. 저희가 사회의 개념을 저희 둘로만 좁힌다면, 조금 전의 예시와 무엇이 다를까요?\n#3;closeup"
10046160-23 = "3;이치카 수영복;17;………………네?\n#3;closeup\n#3;stiff\n#3;em;[땀]"
10046160-24 = "3;세이아 수영복;02;즉, 이는 정의의 문제입니다. 설령 이치카가 부정한다 해도, 제가 긍정하는 한, 세상의 절반이 동의하는 셈이죠."
10046160-25 = "3;세이아 수영복;99;이야기는 이걸로 충분하겠죠. 자, 갑시다.\n#3;m2"

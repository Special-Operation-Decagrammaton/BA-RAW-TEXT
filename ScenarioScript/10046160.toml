[translation]
10046160-3 = "我等很久了。"
10046160-4 = "終於輪到我出場了呢。"
10046160-5 = "……聖亞大人？"
10046160-6 = "來，我們出發吧，一花。"
10046160-7 = "不是，請等一下！#n出發是要去哪裡啊！？"
10046160-8 = "……？#n你不是要巡邏嗎？"
10046160-9 = "是，是這樣沒錯……#n但這個工作既辛苦又危險，聖亞大人還是待在安全的地方享受假期比較好……"
10046160-10 = "原來如此，我明白了。"
10046160-11 = "啊，那麼……"
10046160-12 = "茶會的聖亞不適合負責這項任務……#n不，應該說「因為身分過於高尚，所以無法負責」。"
10046160-13 = "你是這個意思吧？"
10046160-14 = "呃……算，算是吧。"
10046160-15 = "將我定義為茶會的聖亞，#n或者將一花定義為實現正義部的一花……究竟有什麼意義呢？"
10046160-16 = "……咦？"
10046160-20 = "角色不過是沒有實體的幽靈罷了。#n假如我們被困在無人島上的話，這種角色關係還會存在嗎？"
10046160-21 = "這…………"
10046160-22 = "到頭來所謂階級與角色，只是可變的社會規範所創造出的海市蜃樓而已。#n如果我們將「社會」的概念縮小到只剩我們兩人，那跟剛才的例子又有什麼不同呢？"
10046160-23 = "………………？"
10046160-24 = "換言之，這是關於「正義」的問題。#n即使一花否定──只要我肯定，就等於世界的一半都同意了。"
10046160-25 = "這樣的說明應該足夠充分了。#n來，我們出發吧。"
10046160-30 = "……不，不不不！完全沒解釋清楚啊！"
10046160-31 = "好久沒在現場奔走了呢。#n呵呵，令人懷念的回憶不斷湧上心頭啊。"
10046160-32 = "聖亞大人！"

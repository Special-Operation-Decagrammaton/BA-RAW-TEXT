[translation]
10046160-3 = "ฉันรออยู่นานเลยละค่ะ"
10046160-4 = "ถึงตาของฉันแล้วสินะคะ"
10046160-5 = "คุณเซอา...?"
10046160-6 = "ค่ะ ไปกันเลยค่ะ อิจิกะ"
10046160-7 = "เดี๋ยวก่อนสิคะ จะไปไหนเหรอคะ?!"
10046160-8 = "อิจิกะไม่ได้จะไปลาดตระเวนหรอกเหรอคะ...?"
10046160-9 = "ค่ะ มันก็จริงอยู่หรอกค่ะ... แต่งานนี้ทั้งหนัก ทั้งอันตราย ฉันว่าคุณเซอาพักผ่อนอยู่ในสถานที่ที่#nปลอดภัยจะดีกว่า..."
10046160-10 = "ไม่ผิดคาดเลย ฉันเข้าใจแล้วค่ะ"
10046160-11 = "ค่ะ ถ้างั้นฉันขอตัวนะคะ"
10046160-12 = "หมายความว่าเซอาจากสภาน้ำชาไม่มีคุณสมบัติที่จะทำงานนี้... ไม่สิ มันตรงกันข้ามมากกว่า เซอามีคุณสมบัติมากเกินไปกว่าจะมาทำงานแบบนี้"
10046160-13 = "คุณจะบอกฉันแบบนี้ใช่มั้ยคะ?"
10046160-14 = "อ่า... ก็... ก็น่าจะทำนองนั้นค่ะ"
10046160-15 = "แต่ว่า... ใครเป็นคนนิยามฉันว่าเป็นเซอาจากสภาน้ำชา แล้วใครนิยามว่าอิจิกะคืออิจิกะจากชมรม#nทวงความยุติธรรมเหรอคะ?"
10046160-16 = "คะ...?"
10046160-20 = "บทบาทเป็นเพียงวิญญาณที่ไม่มีตัวตน หากเราติดอยู่บนเกาะร้าง ความสัมพันธ์ตามบทบาทนี้ของเรา#nจะยังอยู่เหมือนเดิมหรือเปล่าคะ?"
10046160-21 = "คะ......?"
10046160-22 = "สุดท้ายแล้ว ชนชั้นกับบทบาทก็เป็นแค่ภาพลวงตาที่สร้างขึ้นจากมาตรฐานทางสังคมที่เปลี่ยนแปลง#nได้ค่ะ ถ้าเราจำกัดแนวคิดเรื่องสังคมให้สังคมนี้เหลือเพียงเรา 2 คน มันจะมีอะไรแตกต่างจากเมื่อกี้ หรือเปล่าคะ?"
10046160-23 = "คะ.........?"
10046160-24 = "มันเป็นปัญหาเรื่องความยุติธรรมน่ะค่ะ ต่อให้อิจิกะปฏิเสธ แต่ตราบใดที่ฉันเห็นด้วย ก็เท่ากับว่าโลกครึ่งใบเห็นด้วยค่ะ"
10046160-25 = "ฉันว่าเราไม่ต้องสาธยายกันต่อหรอกค่ะ เอาละ ไปกันเถอะ"
10046160-30 = "ไม่ค่ะ ไม่เลยค่ะ...! มันไม่เห็นจะฟังขึ้นสักนิดค่ะ!"
10046160-31 = "ฉันไม่ได้ออกมาทำงานข้างนอกแบบนี้นานแล้วนะคะ ฮุฮุ คิดถึงความทรงจำที่สนุกเลยละค่ะ"
10046160-32 = "คุณเซอา!"

[translation]
2004003-1 = "皐月在問"
2004003-2 = "（在接到皐月的聯絡不久之後……）"
2004003-7 = "老師，我來了。"
2004003-8 = "[s]「你好，皐月……」"
2004003-9 = "夏萊的辦公室還是一如既往的狹窄呢。"
2004003-10 = "如果老師願意來萬魔殿的話，要把整個廣場都給你當辦公室也沒問題哦？"
2004003-11 = "[s1]「不用了，沒關係。」\n[s2]「那根本是懲罰吧……」"
2004003-14 = "哼嗯，你還是不打算合作嗎？#n雖然我早就料到了。"
2004003-15 = "我上次也說過了吧？方法還有很多。"
2004003-16 = "所以今天，我打算對老師嘗試第二種方法。"
2004003-17 = "那就是「拷問」。"
2004003-18 = "[s]「咦？」"
2004003-19 = "哎呀，因為過於老套而感到驚訝嗎？"
2004003-20 = "也對，這種方法對夏萊而言，早就見怪不怪了吧。"
2004003-21 = "[s]「哪有！我才不會做那種可怕的事情！！」"
2004003-22 = "不過我們的做法稍微有點特別。#n對老師應該也會有效才對。"
2004003-23 = "來～這邊請坐。"
2004003-24 = "[s]「不用不用。還請容我拒絕。」"
2004003-25 = "聽說在野蠻的三一……#n會使用諸如以烏頭屬植物的根煮茶招待人，或者拿電鋸威脅之類的惡劣手段。"
2004003-31 = "但我們格黑娜不會進行這種不人道的拷問，所以老師大可放心。"
2004003-35 = "（被皐月推著坐到了椅子上……）"
2004003-37 = "那麼，我要開始進行第一項拷問了。#n就算是老師，應該也撐不住吧？呵呵呵。"
2004003-42 = "（手掌被皐月舉了起來……）"
2004003-43 = "[ns]「你，你想對我的指甲做什麼……？」"
2004003-44 = "老師，你有辦法承受嗎？"
2004003-52 = "[ns3]「你是在……剪我的指甲？」\n[ns4]「這也算拷問嗎……？」"
2004003-55 = "呵呵……你還沒察覺嗎？"
2004003-56 = "如果把指甲剪得這麼短……"
2004003-57 = "就不能做漂亮的美甲了哦？"
2004003-58 = "[s]「……！」"
2004003-59 = "如果是普通的學生，大約剪到食指就會坦承一切了。"
2004003-60 = "老師究竟能忍到什麼程度呢？呵呵……！"
2004003-61 = "我可是不會停下來的哦？#n想避免這場災難的話，就乖乖答應跟我們合作吧。"
2004003-68 = "……"
2004003-74 = "（於是皐月就這樣剪完了所有指甲）"
2004003-76 = "你還好嗎，老師？#n指甲被剪得這麼短……有辦法承受嗎？"
2004003-77 = "[s]「謝謝你，皐月。指甲正好也該剪了。」"
2004003-78 = "不愧是老師。#n竟然能若無其事地堅持過去，甚至連眼睛都沒眨一下。"
2004003-79 = "但我可不會就這麼放棄。#n接下來……"
2004003-82 = "來，老師。換上這件衣服吧。"
2004003-83 = "[ns]「這是……白色T恤？」"
2004003-84 = "沒錯。是我從老師的衣櫃裡拿來的。"
2004003-85 = "要進行這次的拷問，就需要一件沒有任何污漬的純白T恤。"
2004003-88 = "（按照皐月的要求換上了白色T恤）"
2004003-90 = "呵呵，這樣的打扮也很適合你呢。"
2004003-91 = "那麼……接下來就把這東西給吃了吧。"
2004003-92 = "[s5]「這是……」\n[s6]「咖哩烏龍麵……！？」"
2004003-95 = "哈哈，沒錯！#n現在明白這種拷問的可怕之處了吧？"
2004003-96 = "根據調查結果，這是「最難不濺到衣服就吃完的食物TOP3」之一的咖哩烏龍麵！"
2004003-98 = "而且你身上穿的還不是普通衣服，而是最容易看出污漬的純白T恤！！#n當然也沒有圍裙之類的東西來保護衣服！"
2004003-99 = "怎麼樣啊？有辦法承受這股壓迫感嗎？#n如果是普通學生的話，甚至在嘗試之前就會感受到極大的壓力！"
2004003-100 = "老師究竟會如何呢！！"
2004003-106 = "[ns]「真好吃！」"
2004003-107 = "竟然毫不猶豫地吃了起來……真是出乎意料。"
2004003-108 = "即便咖哩濺到白色衣服上也若無其事的豁達……真不愧是老師。"
2004003-112 = "（就這樣瞬間清空了碗）"
2004003-114 = "第二道拷問竟然也失敗了啊。#n呵呵，老師果然不容小覷。"
2004003-115 = "不過接下來我也要認真了。"
2004003-116 = "這次絕對會讓老師答應跟我們合作。"
2004003-117 = "[s]「是嗎……」"
2004003-119 = "（之後皐月又嘗試了各種方法……）"
2004003-120 = "（卻都讓人感覺不太像是拷問……）"
2004003-123 = "萬魔殿情報部的恐怖拷問竟然完全無法奏效。"
2004003-124 = "沒想到老師竟然擁有鋼鐵般的意志啊。"
2004003-125 = "唉，這是最後的方法了。"
2004003-126 = "來吧，老師。#n請乖乖把手放到後面讓我綁起來。"
2004003-127 = "一副「想對我做什麼？」的表情呢。"
2004003-128 = "讓你無法使用雙手，可是這個方法的關鍵所在呢。"
2004003-134 = "唔呵呵，這樣準備就完成了……"
2004003-135 = "現在請看著這個畫面吧，老師。"
2004003-136 = "[ns]「這是……貓咪的搞笑影片？」"
2004003-137 = "沒錯！是匯集了貓咪們各種荒謬動作的精華影片。"
2004003-138 = "是能讓人看著看著就不自覺地露出笑容的那種……相當珍貴的資料哦。"
2004003-139 = "那麼……好好期待一下吧？#n在這最精采的時候……"
2004003-144 = "[ns]「啊啊！！居然有廣告……！！」"
2004003-146 = "[ns]「而，而且還因為手被綁住按不了跳過……！」"
2004003-147 = "唔呵，唔呵呵呵呵！#n怎麼樣？怎麼樣啊？這種無力感！"
2004003-148 = "很想趕快按下跳過，知道接下來會發生什麼事吧？是不是很好奇呀？啊哈哈！"
2004003-149 = "這段廣告可是長達1分鐘哦？#n啊，順便提醒你，這部影片每30秒就會插入一部廣告。"
2004003-150 = "[s]「太，太殘忍了……」"
2004003-151 = "這種行為實在太惡劣、太恐怖了對吧？"
2004003-152 = "接下來等著你的，將是永無止盡、宛如惡夢般的時光。#n不過……如果老師願意向萬魔殿宣誓效忠，我就能幫你把手解開哦？唔呵呵呵！"
2004003-157 = "……"
2004003-158 = "糟糕，連我都開始好奇接下來會發生什麼事了……"
2004003-159 = "竟然沒考慮到我也一起看著影片這件事……是我大意了。"
2004003-160 = "好想趕快跳過這種廣告～～什麼時候才要結束啊？？"
2004003-162 = "（皐月的身體從身後靠了過來）"
2004003-166 = "[ns7]「皐，皐月……？」\n[ns8]「你靠得太近了……」"
2004003-169 = "哈啊，哈啊……#n好想按下去～～最討厭廣告了～～"
2004003-170 = "（頸部直接感受到了皐月急促的呼吸……）"
2004003-175 = "[ns]（為，為何突然想把連自己都不知道位置的祕密基地供出來呢……！）"
2004003-179 = "[ns]「啊，廣告結束了……」"
2004003-182 = "哼嗯，原來貓咪有時候會變得那麼僵硬啊。"
2004003-183 = "這種拷問看來不太可行。#n會連我自己都好奇起來的。"
2004003-184 = "[ns]（太，太好了……）"
2004003-185 = "老師居然能承受住我凶險的拷問……真不簡單。"
2004003-186 = "但我也不是沒有收穫。"
2004003-187 = "你就好好期待下一次吧！呵呵。"
2004003-193 = "[ns]「皐，皐月！？先幫我解開再走啊……！！」"
2004003-195 = "（最終被綁住的手是由其他當值日生的學生解開的……）"
2004003-196 = "（感覺又要出現奇怪的謠言了……）"

[translation]
2004003-1 = "ซัตสึกิถามอยู่นะ"
2004003-2 = "(ไม่นานหลังจากได้รับข้อความจากซัตสึกิ...)"
2004003-7 = "ครู ฉันมาแล้ว"
2004003-8 = "[s] \"สวัสดี ซัตสึกิ...\""
2004003-9 = "ยังคับแคบเหมือนเดิมเลยนะ ห้องทำงานของงานชาเล่ต์เนี่ย"
2004003-10 = "ถ้ามาร่วมมือกับแพนเดโมเนียม โซไซตี้ละก็ ฉันยกทั้งจัตุรัสให้เป็นห้องทำงานของครูได้เลยละ"
2004003-11 = "[s1] \"ไม่ดีกว่า ไม่เป็นไร\"\n[s2] \"นั่นมันดูเป็นการลงโทษมากกว่านะ\""
2004003-14 = "ฮึ่ม ยังจะไม่ให้ความร่วมมืออยู่งั้นเหรอ? ฉันคิดไว้แล้วละว่าครูต้องคิดอย่างนี้"
2004003-15 = "แต่คราวก่อนฉันบอกไว้แล้วใช่มั้ยว่าฉันมีหลายวิธีน่ะ?"
2004003-16 = "วันนี้ฉันจะลองทดสอบครูด้วยวิธีที่สอง"
2004003-17 = "การทรมานยังไงล่ะ"
2004003-18 = "[s] \"หืม?\""
2004003-19 = "ตกใจกับวิธีที่เก่าคร่ำครึงั้นเหรอ?"
2004003-20 = "แต่ก็นะ ที่ชาเล่ต์ก็คงใช้วิธีนี้อยู่อย่างกว้างขวางอยู่แล้วละ"
2004003-21 = "[s] \"ไม่ใช่สักหน่อย! ครูไม่ทำอะไรที่น่ากลัวแบบนั้นนะ!!\""
2004003-22 = "แต่วิธีที่พวกเราใช้มันค่อนข้างพิเศษน่ะ ฉันว่าน่าจะใช้ได้ผลกับครูเหมือนกัน"
2004003-23 = "เอาละๆ~ มานั่งตรงนี้เลย "
2004003-24 = "[s] \"ไม่เป็นไร ไม่เอา ขอปฏิเสธดีกว่า\""
2004003-25 = "ได้ยินว่าในทรีนิตี้ที่ไร้อารยธรรมใช้วิธีที่เลวร้ายอย่างการต้อนรับด้วยชาดอกวูฟเบนที่มีพิษ หรือไม่ก็ใช้เลื่อยไฟฟ้าด้วยละ"
2004003-31 = "แต่ก็วางใจได้เลยนะ ในเกเฮนน่าของเราน่ะไม่ใช้การทรมานด้วยวิธีที่ขัดต่อมนุษยธรรมแบบนั้นหรอก"
2004003-35 = "(แล้วคุณครูก็โดนซัตสึกิผลักจนลงไปนั่งบนเก้าอี้...)"
2004003-37 = "งั้นฉันจะเริ่มด้วยวิธีแรกเลย บางทีครูอาจจะทนได้ก็ได้นะ? ฮุฮุฮุ"
2004003-42 = "(ซัตสึกิจับมือของคุณครูขึ้นมา...)"
2004003-43 = "[ns] \"จะ... จะทำอะไรกับเล็บครูน่ะ...?\""
2004003-44 = "ดูซิว่าครูจะทนได้หรือเปล่า?"
2004003-52 = "[ns3] \"ตัดเล็บให้ครูเหรอ...?\"\n[ns4] \"ตัดเล็บเนี่ยนะ นี่เรียกว่าการทรมานเหรอ...?\""
2004003-55 = "ฮุฮุ... ยังไม่รู้สินะ?"
2004003-56 = "ไม่รู้เหรอว่าถ้าตัดเล็บจนสั้นกุดแบบนี้..."
2004003-57 = "ก็จะไปทำเล็บเจลสวยๆ ไม่ได้น่ะ!"
2004003-58 = "[s] \"......!\""
2004003-59 = "ถ้าเป็นนักเรียนทั่วไปละก็ ปกติถ้าโดนตัดเล็บนิ้วชี้นิ้วเดียวก็ยอมรับสารภาพกันหมดแล้ว"
2004003-60 = "แล้วครูจะทนได้สักแค่ไหนกันนะ? ฮุฮุ...!"
2004003-61 = "เอาละ ฉันจะไม่หยุดแค่นี้หรอก ถ้าไม่อยากให้เกิดเหตุการณ์เฉียดตายในตอนท้าย ฉันว่าครูยอม#nให้ความร่วมมือกับเราอย่างว่าง่ายดีกว่า"

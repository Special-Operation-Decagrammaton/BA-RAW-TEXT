2004003-108 = "ใจกล้าถึงขนาดที่ไม่สนว่าแกงกะหรี่จะเลอะเสื้อ... ครูเป็นคนอย่างนี้สินะ"
2004003-112 = "(แล้วคุณครูก็กินหมดชามในพริบตา)"
2004003-114 = "การทรมานครั้งที่สองก็ไม่สำเร็จเหรอเนี่ย ฮุฮุ เป็นคนที่ไม่ควรดูถูกเลยจริงๆ"
2004003-115 = "แต่ตอนนี้ฉันจริงจังแล้ว"

2004003-74 = "(ซัตสึกิตัดเล็บให้ครูครบทุกนิ้ว)"
2004003-76 = "เป็นไงล่ะ ครู? เล็บสั้นกุดแบบนี้... คิดว่าทนได้เหรอ?"

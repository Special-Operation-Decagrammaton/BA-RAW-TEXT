2004003-92 = "[s5] \"นี่มัน... อุด้งแกงกะหรี่?\"\n[s6] \"ให้ครูกินอุด้งแกงกะหรี่เหรอ...?!\""
2004003-95 = "ฮ่าฮ่า ใช่แล้วละ! รับรู้ความน่ากลัวของการทรมานนี้แล้วใช่มั้ย?"
2004003-96 = "จากผลสำรวจในหัวข้อ [TOP3 อาหารที่กินแล้วเลอะเสื้อผ้ามากที่สุด] หนึ่งในนั้นก็คืออุด้งแกงกะหรี่!"
2004003-98 = "ครูจะไม่ได้กินอุด้งแกงกะหรี่ในเสื้อผ้าธรรมดาๆ แต่เป็นเสื้อยืดสีขาวที่เห็นรอยเปื้อน#nได้ชัดเจนที่สุด!! แน่นอนว่าห้ามเอาของอย่างอื่นมาปิดเป็นผ้ากันเปื้อนด้วย!"
2004003-99 = "เป็นไงล่ะ รู้สึกกดดันแล้วใช่มั้ย? คิดว่าจะทนได้หรือเปล่า? นักเรียนทั่วไปน่ะ พากันเครียดตั้งแต่ก่อน#nกินแล้วด้วยซ้ำ"

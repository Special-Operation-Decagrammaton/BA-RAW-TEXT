2004003-157 = "......"
2004003-158 = "อะไรกัน ทำเอาฉันอยากดูคลิปต่อไปซะงั้น..."
2004003-159 = "ฉันมองข้ามความจริงที่ว่าเรากำลังดูคลิปอยู่ด้วยกันเหรอเนี่ย ลืมคิดถึงเรื่องนี้ไปเลย"
2004003-160 = "อยากข้ามโฆษณาแบบนี้ไวๆ จัง~~ เมื่อไรจะจบเนี่ย??"

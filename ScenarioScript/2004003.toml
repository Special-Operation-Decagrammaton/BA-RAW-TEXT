2004003-146 = "[ns] \"ถะ... ถ้ามือโดนมัดไว้ ก็กดข้ามไม่ได้...!\""
2004003-147 = "ฮุฮุ ฮุฮุฮุ! เป็นไงล่ะ? เป็นไง? ความรู้สึกที่ไร้หนทางแบบนี้!"
2004003-148 = "อยากกดข้ามโฆษณาแล้วกลับไปดูคลิปแมวตลกๆ ใช่มั้ยล่ะ? อยากดูต่อล่ะสิ? อะฮ่าฮ่า!"
2004003-149 = "เป็นโฆษณาสั้นๆ แค่นาทีเดียวเองนะ อ้อ แต่คลิปนี้มีโฆษณาคั่นทุกๆ 30 วินาทีเลยละ"

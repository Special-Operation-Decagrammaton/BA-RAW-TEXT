[translation]
10001085-1 = "#title;제8화;세 번째 승리!"
10001085-2 = "#place;붉은겨울 학원 중앙 거리"
10001085-3 = "3;체리노;06;지, 진짜로 팔이 부, 부러지는 줄 알았네…….\n#3;em;[땀]\n#3;stiff\n#3;a"
10001085-4 = "1;토모에;04;체리노 회장님! 괜찮으신가요?\n#1;em;[!]\n#1;ar\n#3;m5"
10001085-5 = "3;체리노;04;으아아앙! 토모에, 콤라드! 무서웠었어! 으아아앙!\n#3;hophop"
10001085-6 = "#all;hide"
10001085-7 = "3;미노리;09;쳇, 회장을 제거할 수 있는 좋은 기회였는데…….\n#3;a\n#3;em;[속상함]\n#3;stiff"
10001085-8 = "3;미노리;05;방해하지 말라고, 선생! 아무리 선생이라 하더라도 우리의 혁명을 방해한다면 가만두지 않을 테니까!"
10001085-9 = "5;토모에;05;기다리세요, 용역부 여러분. 저희는 여러분과 싸우려 하는 게 아닙니다.\n#5;al\n#3;m1\n#5;em;[반응]"
10001085-10 = "5;토모에;05;노동자를 탄압하는 압제자들에게 맞서려면 같은 동지끼리 싸울 게 아니라 힘을 합쳐야지요!"
10001085-11 = "1;미노리;05\n5;토모에;05;체리노 회장의 어떤 점이 여러분의 혁명에 방해가 된다는 말인가요?\n#3;hide"
10001085-12 = "5;토모에;06;물론 체리노 회장은 노동하지 않고, 간식이나 먹으며, 낮잠만 자는 글러먹은 회장이지만…….\n#5;em;[땀]\n#5;stiff"
10001085-13 = "5;토모에;05;일이 자신의 뜻대로 진행되지 않으면 무턱대고 숙청을 남발하는 독재 회장이긴 하지만!"
10001085-14 = "1;체리노;04;잠깐, 토모에 총비서실장. 그동안 이 몸을 그런 시선으로 보아왔단 말인가?\n#1;em;[?!]\n#1;shake"
10001085-15 = "#all;hide"
10001085-16 = "3;미노리;99;흥, 부하의 실수는 상관이 책임지는 법! #n그러므로 이 붉은겨울 학원에서 일어나는 모든 일의 책임은 대표인 회장인 체리노 동지에게 있다!\n#3;em;…\n#3;a"
10001085-17 = "3;미노리;01;구교사의 복구가 늦어지는 것도, 푸딩이 제대로 분배되지 않는 것도, 오늘 날씨가 지나치게 추운 것도— 모두 체리노 회장의 탓이다!"
10001085-18 = "3;미노리;05;다시 말해, 체리노 회장은 이 붉은겨울의 학생회장이라는 이유만으로도 비난받아 마땅하다!\n#3;em;[!]"
10001085-19 = "1;체리노;05;억지야! 그 논리대로라면 누가 회장이더라도 비난을 피할 수 없는 거잖아!\n#1;hophop\n#1;ar\n#3;m5"
10001085-20 = "3;미노리;00;그야 물론이다! 권력자를 향한 비난은 투쟁의 기본!"
10001085-21 = "3;미노리;05;이 학원에서 학생회장이라는 존재가 사라질 때까지 우리의 투쟁은 멈추지 않을 것이다!"
10001085-22 = "1;체리노;04;이 무슨…… 제멋대로인 혁명가란 말인가.\n#1;em;[땀]\n#1;stiff"
10001085-23 = "[s] \"하지만 체리노는 지금 학생회장이 아닌데.\""
10001085-24 = "3;미노리;01;뭐? 체리노 동지가 회장이 아니라면 누가 회장이란 말이지?\n#3;em;[?]"
10001085-25 = "1;체리노;01;분한 사실이지만…… 지금 붉은겨울 사무국에서 회장의 권력을 휘두르고 있는 것은 내가 아니라 마리나 위원장이다.\n#1;em;…"
10001085-26 = "1;체리노;99;마리나 위원장이 쿠데타를 일으키는 바람에 이 몸은 회장의 자리에서 실각하여 도망치고 있는 중이거든!\n#1;em;[반짝]"
10001085-27 = "5;토모에;01;체리노 쨩, 그 사실은 그렇게 자랑스럽게 말하지 않아도 괜찮아요.\n#3;hide"
10001085-28 = "5;미노리;99;과연. 지금 권력을 쥐고 있는 것은 마리나 위원장이고, 체리노 회장은 단순한 꼬맹이에 불과하다는 말인가…….\n#5;em;…"
10001085-29 = "1;체리노;05;뭐라, 꼬맹이? 꼬맹이라고 했겠다?!\n#1;stiff\n#1;em;[빠직]"
10001085-30 = "5;미노리;01;좋아, 동지들. 목표를 바꾼다!\n#5;em;[반응]"
10001085-31 = "5;미노리;02;우리의 새로운 적은 체리노 회장과 같은 별 볼 일 없는 꼬맹이가 아니라, 사무국의 새로운 권력자인 마리나 위원장이다!"
10001085-32 = "1;체리노;01;또 꼬맹이라고 말했겠다! 게다가 이번에는 별 볼 일 없는 꼬맹이라니!\n#1;em;[빠직]\n#1;stiff"
10001085-33 = "1;체리노;05;이 위대하신 체리노 님의 말이 들리지 않는 것이냐! 모두 숙청이야, 숙청!\n#1;hophop"
10001085-34 = "5;미노리;07;그럼, 우리 노동자들의 권리와 자유, 그리고…… 어, 또 이것저것 중요한 것들을 위하여……\n#5;em;…\n#5;m3\n#1;dl"
10001085-35 = "5;미노리;05;사무국으로 돌격이다!\n#5;closeup\n#5;em;[!]"
10001085-36 = "#all;hide"
10001085-37 = "1;용역부원 붉은겨울;00\n3;용역부원 붉은겨울;00\n5;용역부원 붉은겨울;00\n#1;hophop\n#3;hophop\n#5;hophop\n#1;a\n#3;a\n#5;a"
10001085-38 = "#na;용역부원 붉은겨울;우오오오!\n#fontsize;100"
10001085-39 = "#all;hide"
10001085-40 = "3;체리노;04;완전히 무시당했어…….\n#3;em;[속상함]\n#3;stiff"
10001085-41 = "1;토모에;03;역시 소문대로 용역부의 학생들은 상대편일 때는 까다롭지만 같은 편이 되니 든든하네요!\n#1;ar\n#3;m5\n#1;em;[반짝]"
10001085-42 = "1;토모에;01;자, 체리노 회장님. 저희도 학생들을 따라서 사무국으로 가죠!"
10001085-43 = "1;토모에;01\n#1;dl\n#wait;1000"
10001085-44 = "3;체리노;04;자, 잠깐! 모두 기다리거라! 대장은 이 몸이니라! #n이 몸만 버려두고 먼저 가지 말거라!\n#3;m3\n#3;hophop"
10001085-45 = "#continued"

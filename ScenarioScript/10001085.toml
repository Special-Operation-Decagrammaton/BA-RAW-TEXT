[translation]
10001085-1 = "Episode 8;The Third Victory!"
10001085-2 = "Red Winter Academy Main Street"
10001085-3 = "I-I was sure my arms were going to snap..."
10001085-4 = "President Cherino! Are you okay?"
10001085-5 = "Waaah! Tomoe! Comrade! *sob* I was so scared!"
10001085-7 = "Hmph, it was the perfect opportunity to get rid of her..."
10001085-8 = "Stop getting in the way, Sensei! Even if you are a teacher, I won't let you interfere with our revolution!"
10001085-9 = "Please calm down. We don't want to fight with the Labor Party."
10001085-10 = "If your goal is to topple tyrants, then you should be with us, not against us! "
10001085-11 = "As she is now, what threat is President Cherino to your revolution?"
10001085-12 = "I get that Cherino never works and spends all day napping and snacking..."
10001085-13 = "...and she definitely has an itchy punishment finger when she doesn't get her way."
10001085-14 = "Ch-Chief Secretary Tomoe, is that really what you think of me?"
10001085-16 = "Hmph. A leader is responsible for the mistakes of her subordinates! Therefore, everything wrong with Red Winter Academy is your fault as its leader, Comrade Cherino!"
10001085-17 = "The delayed restoration of the Former Institute, the pudding shortage, the chilly weather today—it's all because of Cherino!"
10001085-18 = "The failings of our academy implicate President Cherino in the crimes she's committed against the students of Red Winter!"
10001085-19 = "That's crazy talk! That'd mean whoever is in charge is always guilty!"
10001085-20 = "Exactly! Shifting the balance of power is what this fight is all about!"
10001085-21 = "So long as a single person rules the academy, this conflict will never end!"
10001085-22 = "What the...? What kind of revolution is this?"
10001085-23 = "[s] \"You know Cherino isn't in charge anymore, right?\""
10001085-24 = "What? If Comrade Cherino isn't the president, who is?"
10001085-25 = "I hate to admit it, but...the current president is Chairman Marina."
10001085-26 = "I, in all my glory, have been on the run since she staged her dastardly coup!"
10001085-27 = "I don't know if you should be saying it like that, Cherino."
10001085-28 = "Are you saying Chairman Marina is in charge now and Cherino here is just some powerless little brat...?"
10001085-29 = "What'd you just call me?!"
10001085-30 = "Listen up! We have a new target!"
10001085-31 = "We shift our eyes away from this stupid little brat, to the new president, Chairman Marina!"
10001085-32 = "You called me a little brat again! And you even called me stupid this time!"
10001085-33 = "Your insolence can no longer be ignored! Demerits! You will all be punished!"
10001085-34 = "All right, troops. For the rights and freedoms of the worker, and...uh, for various other reasons..."
10001085-35 = "...let's storm the secretariat!"
10001085-38 = "YEAAAH!"
10001085-40 = "They totally ignored me..."
10001085-41 = "The Labor Party is as formidable as I'd heard, but having them basically on your side is certainly a blessing."
10001085-42 = "Let's go, President Cherino. They're leading the way to the secretariat!"
10001085-44 = "W-Wait! I'm supposed to be leading the way! I'm in charge here!"

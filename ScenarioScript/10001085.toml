[translation]
10001085-1 = "第8話;第三次勝利"
10001085-2 = "赤冬聯邦學園．中央大道"
10001085-3 = "還，還以為手真的要斷了……"
10001085-4 = "潔莉諾會長！還好嗎？"
10001085-5 = "智惠、同志！好可怕……！嗚哇啊啊！"
10001085-7 = "呿，明明是剷除會長的好機會……"
10001085-8 = "別妨礙我，老師！就算你是老師，如果妨礙我們的革命的話，我也不會手下留情的！"
10001085-9 = "請等一下，工務部的大家。我們不打算和你們戰鬥。"
10001085-10 = "為了獲得作為勞動者的權利，我們現在應該齊心協力，而不是是互相爭鬥！"
10001085-11 = "究竟，潔莉諾會長在哪些方面阻礙了各位的革命呢？"
10001085-12 = "當然，潔莉諾會長是個從不工作，只會吃零食和睡午覺的無能會長……"
10001085-13 = "只要事情不順自己的意，就立刻發動肅清的獨裁會長！"
10001085-14 = "等等，智惠秘書室長。你一直以來都是這樣看待咱的嗎？"
10001085-16 = "哼，底下的錯誤當然要由上層負責！#n所以，這個赤冬聯邦學園發生的一切，責任都歸咎於潔莉諾會長身上！"
10001085-17 = "舊校舍修復延宕、布丁沒有確切配給、今天天氣過冷──全部都是潔莉諾會長的錯！"
10001085-18 = "只要潔莉諾會長還是學生會長，就得受到各種非議，永遠不會被原諒！"
10001085-19 = "這也太不講理了吧！照這個邏輯講，無論是誰當會長，都免不了受人指責吧！"
10001085-20 = "當然！批判掌權者是鬥爭的基本！"
10001085-21 = "直到學生會長的存在消失，真正的平等得以實現的那天到來為止……#n我們的鬥爭將永不停止！"
10001085-22 = "嗚，多麼亂來的革命家啊……"
10001085-23 = "[s]「但是，潔莉諾現在不是學生會長唷？」"
10001085-24 = "……什麼？如果潔莉諾會長不是會長的話，那現在誰是會長？"
10001085-25 = "說來很不甘心……但現在掌握赤冬事務局最高權力的不是咱，而是瑪麗娜委員長。"
10001085-26 = "因為瑪麗娜保安委員長發動政變，咱被趕下了會長的寶座……現在正在逃亡！"
10001085-27 = "潔莉諾醬，這不是什麼值得驕傲的事情唷。"
10001085-28 = "什麼。那麼，現在掌握權力的是瑪麗娜委員長，潔莉諾會長只不過是個小毛頭嗎……"
10001085-29 = "小毛頭！？你剛才是說小毛頭嗎！？"
10001085-30 = "好，同志們。改變目標！"
10001085-31 = "我們的新敵人不是潔莉諾會長那種無足輕重的小毛頭，#n而是事務局新的掌權者瑪麗娜委員長！"
10001085-32 = "你又說了小毛頭對吧！而且這次還多了「無足輕重」！"
10001085-33 = "難道沒聽到偉大的潔莉諾大人在說話嗎！全部肅清，肅清！"
10001085-34 = "好，為了我們勞動者的權利和自由，還有……嗯……各種其他重要的事……"
10001085-35 = "突擊事務局！"
10001085-38 = "嗚喔喔喔！"
10001085-40 = "被，被徹底無視了……"
10001085-41 = "果然如傳聞所說，和工務部的學生們敵對會很麻煩，但當盟友的話就可以高枕無憂！"
10001085-42 = "來吧，潔莉諾會長。我們也跟著去事務局吧！"
10001085-44 = "等，等等！所有人都站住！咱才是領頭的！#n不許丟下咱先走！"

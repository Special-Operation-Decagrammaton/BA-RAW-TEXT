1002203-48 = "3;히나 수영복ND;03;고생했어. 선생. 덕분에 예상했던 것보다 업무가 더 빨리 끝났어.\n#3;greeting\n#3;em;[음표]"
1002203-49 = "3;히나 수영복ND;03;이거라면 다행히 늦지 않게 저녁은 먹을 수 있겠네."
1002203-50 = "[s] \"그런 것보다, 자! 놀러 가자!\""
1002203-51 = "3;히나 수영복ND;00;아니, 저기……. 아직도 그런 소리를 하는 거야……? 농담 아니었어?\n#3;em;[땀]"

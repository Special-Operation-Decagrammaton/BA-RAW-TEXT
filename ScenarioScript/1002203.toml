1002203-11 = "2;히나 수영복ND;01;……여긴 갑자기 어쩐 일이야?\n#2;em;[?]"
1002203-12 = "[s1] \"바쁜 히나를 위해 놀러왔어.\"\n[s2] \"바다에 놀러 와서 일만 하면 아깝잖아.\""
1002203-13 = "2;히나 수영복ND;99;고작 그런 이유 때문에 일부러 여기까지 찾아오다니……."
1002203-14 = "2;히나 수영복ND;99;고작 그런 이유 때문에 일부러 여기까지 찾아오다니……."
1002203-15 = "2;히나 수영복ND;01;마음은 고맙지만……. 고마운 만큼, 곤란해. 선생. 아무리 휴양지를 찾아왔다고는 해도, 우린 놀러 온 게 아니니까.\n#2;em;[반응]"
1002203-16 = "2;히나 수영복ND;01;선도부의 자리를 비웠다고 해도, 여전히 처리해야 할 업무는 쌓여 있고."
1002203-17 = "2;히나 수영복ND;99;이걸 전부 끝내기 전까지 딴 짓을 할 수는…….\n#2;em;…"
1002203-18 = "2;히나 수영복ND;00;게다가 애당초 뭐가 아깝다는 건지, 나는 전혀……."
1002203-19 = "[s] \"모처럼 수영복까지 입었잖아. 아깝지 당연히!\""
1002203-20 = "2;히나 수영복ND;04;으, 으응……?\n#2;em;[땀]\n#2;stiff"
1002203-21 = "2;히나 수영복ND;00;하지만 수영복 차림……이라고 해도, 어디까지나 상황과 장소에 맞춘 것뿐이고 특별한 의미는 없다고 할까……."
1002203-22 = "[s3] \"그렇다면 도와줄게!\"\n[s4] \"둘이서 하면 더 빨리 끝날 거야! 그다음 놀러가자!\""
1002203-23 = "2;히나 수영복ND;01;선생이, 날 도와준다고……? \n#2;em;[?]"
1002203-24 = "2;히나 수영복ND;01;선생이, 날 도와준다고……? \n#2;em;[?]"
1002203-25 = "2;히나 수영복ND;99;……후후. 정말, 별나다니까."
1002203-26 = "2;히나 수영복ND;01;선생이 한 말이 전부 이해가 되는 건 아니지만. 응, 그래."
1002203-27 = "2;히나 수영복ND;03;그렇게까지 말한다면, 그 도움, 고맙게 받을게.\n#2;em;[반응]"

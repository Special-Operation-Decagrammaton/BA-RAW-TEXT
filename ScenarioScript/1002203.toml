1002203-34 = "3;히나 수영복ND;02;응? 오늘 처리해야 할 업무인데?\n#3;em;[?]\n#3;closeup"
1002203-35 = "3;히나 수영복ND;01;선도부의 하반기 운영 계획, 3차 게헨나 도로 정비 사업 보고서, 동아리 부활동 보고서와 회의록…… 그리고 이건…….\n#3;closeup"
1002203-36 = "3;히나 수영복ND;02;일단 이것들부터 결재가 필요한 것과 필요하지 않은 것부터 분류해주겠어?\n#3;em;[반응]\n#3;closeup"
1002203-37 = "3;히나 수영복ND;02;아, 걱정 마. 선생. 물론 이것만으로 전부 끝이 아니니까.\n#3;closeup"
1002203-38 = "3;히나 수영복ND;03;후후, 직접 자기 입으로 말한 만큼, 오늘 하루는 철저하게 내 업무에 어울려줘야겠어.\n#3;em;[반짝]\n#3;closeup"

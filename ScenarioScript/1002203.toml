[translation]
1002203-1 = "ทำงานเอกสารกับประธานกรรมการวินัย"
1002203-2 = "(พอคุย MOMOTALK กับฮินะเสร็จแล้ว คุณครูก็ตรงมาที่ห้องที่ฮินะพักอยู่ทันที)"
1002203-7 = "ห้องพักของฮินะ"
1002203-10 = "หืม? คุณครูเหรอ...?"
1002203-11 = "จู่ๆ ก็มาแบบนี้มีอะไรรึเปล่า?"
1002203-12 = "[s1] \"มาช่วยฮินะที่งานยุ่งไง\"\n[s2] \"มาทะเลทั้งที ทำงานอย่างเดียวก็น่าเสียดายแย่\""
1002203-13 = "เพราะแบบนั้นเองเหรอ..."
1002203-14 = "เพราะแบบนั้นเองเหรอ..."
1002203-15 = "ฉันก็ซึ้งใจอยู่หรอกนะ แต่ทำแบบนี้จะยิ่งทำให้เรื่องวุ่นวายนะคุณครู ถึงจะมาสถานที่พักผ่อนแบบนี้#nแต่เราก็ไม่ได้มาเพื่อเที่ยวเล่นหรอกนะ"
1002203-16 = "ถึงตอนนี้จะไม่ได้อยู่ห้องคณะกรรมการวินัย แต่งานที่ฉันต้องทำก็มีกองเป็นภูเขาเลย"
1002203-17 = "เราจะทำอย่างอื่นไม่ได้จนกว่าจะเสร็จงาน..."
1002203-18 = "อีกอย่าง ฉันไม่เข้าใจที่คุณครูพูดว่า \"น่าเสียดายแย่\" เท่าไหร่ ฉันก็แค่..."
1002203-19 = "[s] \"แต่อุตส่าห์ได้ใส่ชุดว่ายน้ำแล้วนะ น่าเสียดายออก!\""
1002203-20 = "หืม...?"
1002203-21 = "ถึงฉันจะใส่ 'ชุดว่ายน้ำ' ก็เถอะ แต่ก็ใส่แค่เพื่อให้เข้ากับสถานที่และสถานการณ์เท่านั้น ต้องมีความหมาย#nอื่นด้วยเหรอ...?"
1002203-22 = "[s3] \"งั้นครูช่วยทำงานเอง!\"\n[s4] \"ช่วยกันทำน่าจะเสร็จเร็วนะ! เสร็จแล้วออกไปเที่ยวกันเถอะ!\""
1002203-23 = "คุณครูจะช่วยฉันทำงานเหรอ...?"
1002203-24 = "คุณครูจะช่วยฉันทำงานเหรอ...?"
1002203-25 = "ฮิฮิ แปลกคนจริงๆ เลย"
1002203-26 = "ถึงฉันจะไม่ค่อยเข้าใจที่คุณครูพูดก็เถอะ แต่มีคนช่วยก็ดีกว่านั่นแหละ"
1002203-27 = "ถ้าพูดถึงขนาดนั้นแล้ว ฉันก็ขอรับความหวังดีเอาไว้แล้วกัน"
1002203-33 = "[ns] \"เอ่อ... ฮินะ...? นี่มัน...?\""
1002203-34 = "นี่น่ะเหรอ? ก็งานที่ต้องทำวันนี้ไง"
1002203-35 = "แผนงานครึ่งปีหลังของคณะกรรมการวินัย รายงานการบำรุงถนนเกเฮนน่าขั้นที่ 3 บันทึกการประชุม#nและรายงานการทำกิจกรรมของชมรม... ส่วนอันนี้ก็..."
1002203-36 = "เอาเป็นว่า คุณครูช่วยแยกเอกสารที่ต้องอนุมัติกับไม่ต้องอนุมัติออกจากกันก่อนได้มั้ย?"
1002203-37 = "ไม่ต้องห่วงนะ ยังมีงานอื่นที่ต้องทำอยู่อีกเยอะแยะเลย"
1002203-38 = "ฮิฮิ ไหนๆ ก็อาสาช่วยแล้ว วันนี้ฉันจะให้ครูได้สนุกกับงานของฉันอย่างสุดขีดเลยละ"
1002203-41 = "(พอทำเสร็จไปหนึ่งงานก็มีอีกงานหนึ่งมาให้ทำต่อ พอทำเสร็จแล้วก็ทำงานใหม่ต่อวนไปเรื่อยๆ#nสภาพคุณครูตอนนี้คือกำลังต่อสู้กับกองเอกสารที่สูงเป็นภูเขาเลากาอย่างหนักหน่วง...)"
1002203-42 = "(สุดท้ายเวลาก็ล่วงเลยไปกว่า 5 ชั่วโมง)"
1002203-45 = "เอาละ นี่งานสุดท้ายแล้ว"
1002203-46 = "[s] \"เป็นอิสระจากนรกกองเอกสารแล้ว~!\""
1002203-47 = "อ่า... อื้ม ก็จริงแฮะ"
1002203-48 = "ทำได้ดีมากเลย งานเสร็จเร็วกว่าที่ฉันคาดไว้เยอะเลย"
1002203-49 = "แบบนี้ก็คงได้กินมื้อเย็นแบบตรงเวลาแล้วละ"
1002203-50 = "[s] \"ตอนนี้เราออกไปเที่ยวกันก่อนเถอะ!\""
1002203-51 = "เดี๋ยวสิ นี่คุณครูพูดจริงเหรอ? คิดว่าแกล้งพูดเล่นซะอีก"
1002203-52 = "นี่มันก็เย็นมากแล้วนะ"
1002203-53 = "อีกอย่างออกไปเที่ยวเล่นกับคนอย่างฉันก็คงไม่สนุกหรอก..."
1002203-54 = "[s5] \"ต้องสนุกอยู่แล้วสิ! ได้มาทะเลกับฮินะทั้งทีนะ!\"\n[s6] \"ครูตั้งตารอที่จะได้มาทะเลกับฮินะมากเลยนะ!\""
1002203-55 = "ถะ... ถึงจะอย่างนั้นก็เถอะ"
1002203-56 = "ถะ... ถึงจะอย่างนั้นก็เถอะ"
1002203-57 = "ไม่เห็นต้องเสียงดังขนาดนั้นเลย..."
1002203-58 = "(เพราะสำหรับฉัน แค่ได้ทำงานสองต่อสองกับครูแบบนี้ก็เพียงพอแล้ว...)"
1002203-59 = "[s] \"ฮินะจัง?\""
1002203-60 = "บะ... บอกแล้วไงว่าไม่ให้เรียกแบบนี้..."
1002203-61 = "เย็นขนาดนี้แล้ว... เลิกหวังเรื่องไปทะเลเถอะ"
1002203-62 = "ถึงอาจจะทดแทนกันไม่ได้ แต่น่าจะยังพอมีเวลาไปนั่งเล่นในเลานจ์กันได้นะ"
1002203-63 = "นี่คุณครู... ไปกินข้าวเย็นด้วยกันมั้ย?"
1002203-64 = "[s] \"ได้สิ ครูจะไปกับฮินะเอง!\""
1002203-65 = "ไม่เห็นต้องเสียงดังเลย..."
1002203-69 = "ฮิฮิ งั้นก็ขอรบกวนหน่อยนะคุณครู"

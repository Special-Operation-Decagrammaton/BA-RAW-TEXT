1002203-53 = "3;히나 수영복ND;99;무엇보다……. 나 같은 거랑 놀아봤자 재미 같은 게 있을 리도 없을 텐데……."
1002203-54 = "[s5] \"분명 즐거울 거야. 히나와 바다에 온 거니까!\"\n[s6] \"히나와 바다에 오는 거, 엄청 기대했으니까……!\""

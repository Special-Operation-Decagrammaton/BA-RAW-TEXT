[translation]
1002203-1 = "Doing Paperwork with the Head Prefect"
1002203-2 = "I found the hotel room where Hina was staying after chatting with her on MomoTalk."
1002203-7 = "Hina's Room"
1002203-10 = "Huh? Sensei? "
1002203-11 = "What brought you here so suddenly?"
1002203-12 = "[s1] \"I came here to help with your busy day.\"\n[s2] \"It's a waste to visit the beach just to work.\""
1002203-13 = "You shouldn't have come all the way here just for that."
1002203-14 = "You shouldn't have come all the way here just for that."
1002203-15 = "I appreciate the gesture, but this just makes things harder, Sensei. We're not here to have fun, even if this is a vacation site."
1002203-16 = "I may be taking a break from the Prefect Team, but the tasks that must be done continue to pile up."
1002203-17 = "We can't do anything else until they're finished."
1002203-18 = "And on top of that, I don't understand what you mean by \"a waste\". I just..."
1002203-19 = "[s] \"But we're wearing bathing suits! That's a waste!\""
1002203-20 = "H-Huh?"
1002203-21 = "You're merely dressed for the occasion. It doesn't mean there's a special reason you had to put it on."
1002203-22 = "[s3] \"Then I'll help you!\"\n[s4] \"You'll finish sooner if we work together! Then we can go play!\""
1002203-23 = "You'll help me, Sensei? "
1002203-24 = "You'll help me, Sensei? "
1002203-25 = "You really are a strange one."
1002203-26 = "I don't understand what would compel you to, but fine."
1002203-27 = "If this is that important to you, then I will gratefully accept your help."
1002203-33 = "[ns] \"Um...Hina? Is this...?\""
1002203-34 = "Hmm? This is our task for today."
1002203-35 = "The Prefect Team's management plans for the second half of the year, the third stage of the Gehenna road maintenance project report, the club activity report, the meeting logs... And this."
1002203-36 = "Can you start by splitting these up between documents that need approval and those that don't?"
1002203-37 = "Oh, don't worry, Sensei. There's much more where that came from."
1002203-38 = "I'll spend today getting you thoroughly familiar with my tasks, just as you wished."
1002203-41 = "As soon as I finished one, another one appeared. And when I dealt with that one, I got another. I frantically struggled against the unending flow of documents."
1002203-42 = "And after about five hours had passed..."
1002203-45 = "Now, this should be the last one."
1002203-46 = "[s] \"I'm finally FREE from document hell!\""
1002203-47 = "Ah, yes. You're right."
1002203-48 = "Good work, Sensei. I finished faster than expected thanks to you."
1002203-49 = "We'll be able to have dinner on time, fortunately."
1002203-50 = "[s] \"And now we can go have fun!\""
1002203-51 = "Are you still going on about that? You're not joking?"
1002203-52 = "But it's already so late."
1002203-53 = "More importantly, there's no way you could have fun playing with someone like me..."
1002203-54 = "[s5] \"I'm sure we can have fun. We're at the beach!\"\n[s6] \"I've been looking forward to visiting the beach with you!\""
1002203-55 = "You say that, but..."
1002203-56 = "You say that, but..."
1002203-57 = "You don't have to make such a fuss..."
1002203-58 = "(Just being able to complete tasks together like this is enough...)"
1002203-59 = "[s] \"Hiniature?\""
1002203-60 = "Stop saying my name like that. You're making this harder."
1002203-61 = "Well, it's too late anyway. Give up on going to the beach."
1002203-62 = "I know this isn't a good substitute, but there's still time to hang out in the lounge."
1002203-63 = "Now, Sensei... What shall we do about dinner?"
1002203-64 = "[s] \"Then allow me to do the escorting!\""
1002203-65 = "You're being loud again..."
1002203-69 = "...but okay. I'll follow your lead, Sensei."

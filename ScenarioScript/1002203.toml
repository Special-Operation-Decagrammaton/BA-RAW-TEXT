[translation]
1002203-1 = "與委員長一起工作"
1002203-2 = "（結束和陽奈的MomoTalk後，立刻前往了飯店裡陽奈的房間）"
1002203-7 = "陽奈的房間"
1002203-10 = "嗯？老師……？"
1002203-11 = "……怎麼這個時間突然跑來呢？"
1002203-12 = "[s1] 「我希望陽奈能稍微放鬆一下。」\n[s2] 「難得來到海邊，只工作太可惜了。」"
1002203-13 = "竟然因為這種理由專程跑來這邊……"
1002203-14 = "竟然因為這種理由專程跑來這邊……"
1002203-15 = "我很感謝你的心意……但也因此令人傷腦筋。#n就算來到渡假勝地，我們的主要目的也不是玩樂……"
1002203-16 = "就算因為合宿離開校園，要處理的業務依舊堆積如山。"
1002203-17 = "在這些全部完成之前，沒辦法放心玩樂……"
1002203-18 = "而且我一點也不覺得可惜，我每天都是這麼度過的……"
1002203-19 = "[s] 「難得陽奈都穿了泳裝，當然可惜呀！」"
1002203-20 = "咦，咦……？"
1002203-21 = "說是泳裝，我這次也只是入境隨俗才穿的……除此之外沒有特別的意義……"
1002203-22 = "[s3] 「那好！我來幫陽奈吧！」\n[s4] 「兩個人一起會更快結束，就能一起玩了！」"
1002203-23 = "老師要，幫忙我的工作……？"
1002203-24 = "老師要，幫忙我的工作……？"
1002203-25 = "……呵呵。真是的，真的是個怪人。"
1002203-26 = "……那麼，既然你都這麼說了。"
1002203-27 = "我就心懷感激的，接受你的幫忙吧。"
1002203-33 = "[ns] 「那個……陽奈同學？這是……？」"
1002203-34 = "……？那是今天必須處理的工作啊。"
1002203-35 = "風紀委員會下半年的營運計畫、第3次格黑娜道路整頓事業報告書、#n各社團活動報告書與會議紀錄……還有這些……"
1002203-36 = "你可以先幫我把需要我簽署和不需要的分類一下嗎？"
1002203-37 = "啊，當然並不是這樣就結束了。"
1002203-38 = "呵呵。既然老師都自己說了，今天當然就要陪我到最後。"
1002203-41 = "（一個又一個，解決了一山文書後面又還有好幾山文書。#n　面對沒有終點的死鬥令人幾乎心力憔悴，#n　但每次看到陽奈認真的側臉，就讓人打起精神再次與文書拚搏）"
1002203-42 = "（就這樣，不知不覺經過了快5個小時）"
1002203-45 = "好，這應該是最後一個了。"
1002203-46 = "[s] 「終，終於結束了……」"
1002203-47 = "是啊，辛苦了。"
1002203-48 = "謝謝老師。多虧你的幫忙，工作比預期得更快結束。"
1002203-49 = "看來今天能準時吃晚餐了。"
1002203-50 = "[s] 「既然這樣，我們去玩吧！」"
1002203-51 = "咦……原來你是認真的？我還以為是在開玩笑……？"
1002203-52 = "不過時間已經這麼晚了……"
1002203-53 = "而且，和我這種人玩，不可能會開心吧……"
1002203-54 = "[s5] 「一定會很開心！因為是和陽奈來海邊……！」\n[s6] 「我一直非常期待和陽奈一起來海邊！」"
1002203-55 = "是，是這樣嗎……"
1002203-56 = "是，是這樣嗎……"
1002203-57 = "……好了啦，不要跟個小孩子一樣吵吵鬧鬧的。"
1002203-58 = "（對我來說，可以稍微增加獨處的時間就很足夠了……）"
1002203-59 = "[s] 「陽奈？果然不行嗎……？」"
1002203-60 = "就，就說了，我會很困擾……不要用那種撒嬌般的口氣……"
1002203-61 = "……今天已經太晚了，不可以去海邊。"
1002203-62 = "作為替代方案，現在休息室應該還空著。"
1002203-63 = "老師願意的話，要不要一起……吃晚飯？"
1002203-64 = "[s] 「當然！護送就交給我吧。」"
1002203-65 = "反應又這麼誇張……"
1002203-69 = "呵呵……知道了。那就拜託你了。老師。"

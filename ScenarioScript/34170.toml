[translation]
34170-1 = "第17話;対決"
34170-2 = "[ns] \"ミカ！！やめて！！\""
34170-4 = "……ごめんね、先生。#nそれはできないよ。"
34170-5 = "ねえ、サオリ。#n時間がないんでしょう？急がなくていいの？"
34170-6 = "……。"
34170-7 = "日の出まで……あと1時間か。"
34170-8 = "あーあ……せっかく分断したけど……先生がここに来ちゃったら、#nこれ以上私にできる事はないんだよね。"
34170-9 = "でも、それって一体どのくらいかかるんだろうね？"
34170-10 = "――それまで持ち堪えられたらあなたの勝ちだよ、サオリ。"
34170-11 = "……。"
34170-12 = "……なに、その表情。#n何か楽しいことでもあったの？それとも諦めちゃった？"
34170-13 = "……いや、昔のことを思い出しただけだ。"
34170-17 = "……。"
34170-22 = "来るな！！先生！！"
34170-23 = "……！！"
34170-25 = "……。"
34170-26 = "！？"
34170-28 = "時間がない……そのままアツコの所へ行ってくれ！"
34170-29 = "……姫を、頼む。"
34170-30 = "リ、リーダー……！"
34170-31 = "[s] \"…………！！\""
34170-32 = "……リーダーの言う通りだよ。"
34170-33 = "あるのかも分からない道を探す時間はない。"
34170-34 = "それに、もし道を見つけたとしても――手遅れだよ。"
34170-35 = "……。"
34170-36 = "今のリーダーではミカの相手なんかできない。#n私たちが到着するまで耐えられるかだって怪しいくらい。"
34170-37 = "で、でも……。"
34170-38 = "だから……このまま姫を助けに行くのが正しいよ。#n私たちが何のためにここにいるのか、思い出して。"
34170-39 = "[s] \"…………。\""
34170-40 = "最終判断は先生に任せる……"
34170-41 = "それに、ミカは自分がやっている事を自覚しているみたいだけど……"
34170-42 = "そんなあの女を先生は説得できるの？"
34170-43 = "[s] \"…………私は。\""
34170-46 = "[ns1] 目的を果たす。\n[ns2] 急ぐ。"
34170-55 = "……。"
34170-56 = "あーあ……結局、先生は行っちゃったね。"
34170-57 = "よかったねサオリ。#nきっと、あなたのお姫様は助かるよ。"
34170-58 = "ミカ……お前が望んでいたのはこんな事だったのか？"
34170-59 = "私が望んでいたこと……？"
34170-60 = "私、何を望んでたんだっけ……#nああ、うん……そうだね。目的達成、みたいな？"
34170-61 = "……。"
34170-62 = "……でも、別にあなたを狙ったわけじゃないよ。"
34170-63 = "正直に言えば、誰でもよかった。"
34170-67 = "むしろ……先生がここに残ってくれたらいいなーとか……思ったりしたくらい。"
34170-68 = "……まぁ、それはちょっと高望みだと思うけどね。"
34170-69 = "……。"
34170-70 = "えー……そんな目で見ないでくれる？"
34170-71 = "セイアちゃんによく言われるんだよね「衝動的で何も考えてない」ってさ。#n私だって自覚してるけど……ちょっとひどくない？本人に言う？ソレ。"
34170-75 = "……うん。#nやっぱり、私が一番望んでいたのはコレかなぁ。"
34170-76 = "――最も憎いあなたが、こうして私の前にいる事。"
34170-77 = "……。"
34170-78 = "それに、先生は……生徒を助けに行くのが正しいよ。#n最後はすべての苦難を乗り越えてみんなで幸せになる――そんなハッピーエンドに向かうのがね。"
34170-79 = "そして、数多くの悪行を重ねてきた私たちは――ここで結末を迎える。"
34170-80 = "……。"
34170-81 = "だからさ――そろそろ私たちの結末を迎えようか、サオリ。"
34170-82 = "黙ってないで何か言ったらどう？#n「魔女」が「猟犬」を処刑する場面だよ？何か言い残したい事とか、ないの？"
34170-83 = "「納得できない」とか、「お前の不幸は自業自得だろう」だとか、#n言い訳しなくていいの？"
34170-84 = "……いや、納得している。"
34170-94 = "手榴弾！？#n違う……煙幕……？なに、これ？"
34170-99 = "い……いたた……。"
34170-100 = "今は生産が禁止されている武器だ。#nアリウスの訓練場にたくさん捨てられていてな。"
34170-101 = "そうなんだ☆#n別に興味ないんだけど？"
34170-108 = "くっ……！？"
34170-109 = "――お前を相手にする際の注意点は理解した。"
34170-115 = "……うっ。"
34170-116 = "ミカ……私はお前の憎悪を否定しない。"
34170-117 = "お前に幸せな未来が訪れない事も、すべてを奪われた事も、孤独になった事だって……私に原因がある。"
34170-118 = "ならば、私はその憎悪に応じよう。"
34170-126 = "……面白いね、うん。"
34170-127 = "ゲリラ戦でいくんだ？#nまぁ、この地形を考慮したらそれが最善だろうね。"
34170-128 = "それに……それってサーモバリック手榴弾でしょ？あはは☆#nちゃんとたくさん用意してる？少量で私を相手にできるなんて思わないでよね？"
34170-129 = "……これなら、うん。"
34170-130 = "今からちゃんと相手するからさ……全力で抵抗してみてよ？#n――あなたにとっては、すべては虚しいものなんだろうけど。"
34170-131 = "そうか――なら、最後までもがいてやろう。"
34170-132 = "へぇ……退屈させないでよね？"
34170-149 = "面白い見世物。そうして互いの地獄を深めていくなんて……#nミカ、やはりあなたは私のミューズです。"
34170-150 = "他者との接触は地獄である……互いが憎しみ合うことで、その実在を証明しているに他なりません。"
34170-151 = "証明できない楽園に比べたら、こちらの方がはるかに明確です。#n――そうは思いませんか、セイア？"
34170-152 = "……。"
34170-153 = "まだ諦めていないようですね。"
34170-154 = "……トリニティに戻りたいのですか？#nですが、夢の隙間から脱することは容易ではないでしょう。"
34170-155 = "あなたは「儀式」に巻き込まれましたからね。#nキヴォトスの外部に通じる窓に顔を出したも同然です。"
34170-156 = "ええ……あなたの存在はまるで暗闇に浮かぶ灯火のように目立った事でしょう。"
34170-157 = "……「アレ」によって、ね。"
34170-158 = "「アレ」に露出されたあなたの[ruby=mystery]神秘[/ruby]は[ruby=terror]恐怖[/ruby]に反転され――裏面の原理があなたを支配し始めたのです。"
34170-159 = "気になりますね……この先、あなたがどうなってしまうのか。#n私たちも何も知らないのです。"
34170-160 = "「アレ」について、私たちは全くの無知なのですから。"
34170-161 = "解釈されず、理解されず、疎通されず――ただ到来するだけの不吉な光。#n目的も疎通もできない不可解な観念……。"
34170-162 = "私たちゲマトリア最大の宿敵……。"
34170-164 = "私たちはそれを「色彩」と呼んでいます。"
34170-167 = "………ふむ。アレもそろそろ完成が目前ですね。"
34170-168 = "ええ、気づきましたか？#nそう――アレが「シャーレ」を相手するために準備した私の切り札。"
34170-173 = "聖徒会の最も偉大な聖女――バルバラ。"
34170-174 = "彼女が予定通り完成したら……あの人工天使シリーズより強力なはずです……ふふ。"
34170-175 = "マエストロの言う通り、この方式に美学はないかもしれませんが……"
34170-176 = "「兵器」には兵器なりの機能美というものがありますから。"
34170-177 = "その時、マエストロはどのような顔をするのでしょうね……ああ、彼は表情を作れないでしょうが。"
34170-178 = "果たしてシャーレとスクワッドは「兵器」を突破し、私の元に来れるのでしょうか？"
34170-182 = "ふふ――すべては抗えない運命なのですよ、セイア。"
34170-183 = "私とこの地獄の存在証明の行く末を見守ろうではないですか。"
34170-188 = "はぁ……はぁ……。"
34170-189 = "私は……諦める事などできないよ、ベアトリーチェ。#n何処かに……何処かに……この状況を打破できる方策があるはずだからね……。"
34170-190 = "一刻も早く、ここを抜け出す方法を……見つけなければ……。"
34170-191 = "いつまでも、この白昼夢に囚われてはいられない……。"
34170-192 = "嗚呼……私にはまだ……為すべき事が残っているのだから……。"
34170-194 = "次回;もう一人の私たち"

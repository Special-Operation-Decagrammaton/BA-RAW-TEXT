[translation]
34170-1 = "第17話;對決"
34170-2 = "[ns] 「彌香！！住手！！」"
34170-4 = "……抱歉，老師。#n我辦不到。"
34170-5 = "吶，沙織。#n沒時間了對吧？不快點沒關係嗎？"
34170-6 = "……"
34170-7 = "離日出……還剩1小時嗎。"
34170-8 = "啊啊……好不容易才把你們分開的……如果老師跑來這裡的話，#n我就無能為力了吧。"
34170-9 = "但是，那究竟需要多少時間呢？"
34170-10 = "──只要能撐到那個時候就算是你贏了哦，沙織。"
34170-11 = "……"
34170-12 = "……那是什麼表情。#n有什麼開心的事嗎？還是說你已經放棄了呢？"
34170-13 = "……不，只是想起了以前的事而已。"
34170-17 = "……"
34170-22 = "別過來！！老師！！"
34170-23 = "……！！"
34170-25 = "……"
34170-26 = "！？"
34170-28 = "沒時間了……你們直接去敦子那邊吧！"
34170-29 = "……公主就，交給你們了。"
34170-30 = "隊，隊長……！"
34170-31 = "[s] 「…………！！」"
34170-32 = "……隊長說得沒錯。"
34170-33 = "已經沒有時間去找連存不存在都不知道的路了。"
34170-34 = "而且，就算找出了路──也太遲了。"
34170-35 = "……"
34170-36 = "現在的隊長不是彌香的對手。#n就連能不能撐到我們過去都很難說。"
34170-37 = "可，可是……"
34170-38 = "所以……我們直接去救公主才是正確的。#n快想想我們來這裡的目的吧。"
34170-39 = "[s] 「…………」"
34170-40 = "最後的判斷就交給老師了……"
34170-41 = "而且，彌香似乎也明白自己在做些什麼……"
34170-42 = "老師能夠說服她嗎？"
34170-43 = "[s] 「…………我。」"
34170-46 = "[ns1] 前往達成目的\n[ns2] 加快腳步"
34170-55 = "……"
34170-56 = "啊啊……結果老師還是走掉了呢。"
34170-57 = "太好了呢沙織。#n這樣一來你的公主就能得救了。"
34170-58 = "彌香……你所期望的就是這種事嗎？"
34170-59 = "我期望的事……？"
34170-60 = "我期望著什麼來著……#n啊啊，嗯……沒錯。像是達成目標，之類的？"
34170-61 = "……"
34170-62 = "……不過，我其實也不是針對你唷。"
34170-63 = "老實說，在這裡的是誰都無所謂。"
34170-67 = "不如說……要是留在這裡的是老師就好了……我也這麼想過。"
34170-68 = "……算了，這有點想得太美了吧。"
34170-69 = "……"
34170-70 = "嗯……可以不要用那種眼神看我嗎？"
34170-71 = "我常常被聖亞醬說「做事衝動又不經過大腦」。#n雖然我也有點自覺……但你不覺得有點過分嗎？而且還是直接對本人說喔？"
34170-75 = "……嗯。#n果然，我最期望的是這個吧。"
34170-76 = "──我最恨的你，像這樣出現在我的面前。"
34170-77 = "……"
34170-78 = "而且，老師他……去幫助學生也是正確的。#n最終越過所有苦難獲得幸福──會通往那種HappyEnd吧。"
34170-79 = "而犯下了諸多惡行的我們──則會在這裡迎向結局。"
34170-80 = "……"
34170-81 = "所以啊──差不多也該迎接我們的結局了，沙織。"
34170-82 = "別保持沉默，說點話來聽聽如何？#n這可是「魔女」處刑「獵犬」的場面喔？你就沒有什麼想說的嗎？"
34170-83 = "像是「不能接受」、「你的不幸是自作自受吧」之類的，#n不找點藉口嗎？"
34170-84 = "……不，我已經接受了。"
34170-94 = "手榴彈！？#n不……煙幕……？這是什麼？"
34170-99 = "好……好痛……"
34170-100 = "這是現在禁止生產的武器。#n在奧利斯的訓練場裡還有很多這種東西。"
34170-101 = "原來是這樣啊☆#n不過我沒什麼興趣就是了？"
34170-108 = "唔……！？"
34170-109 = "──我已經理解和你交手時需要注意的重點了。"
34170-115 = "……嗚。"
34170-116 = "彌香……我不會否定你的憎恨。"
34170-117 = "你不再擁有幸福的未來、被奪走一切、就連變得孤身一人……都是因為我。"
34170-118 = "那麼，我就回應你的憎恨吧。"
34170-126 = "……真有趣呢，嗯。"
34170-127 = "打算採取游擊戰啊？#n嘛，考慮到這裡的地形，那應該是最好的戰術吧。"
34170-128 = "還有……那是空爆燃燒彈對吧？啊哈哈☆#n你準備的數量夠嗎？別以為只靠少少的量就能當我的對手哦？"
34170-129 = "……接下來，嗯。"
34170-130 = "接下來我會認真當你的對手……全力抵抗看看吧？#n──不過對你來說，一切都只是徒勞吧。"
34170-131 = "這樣啊──那我就掙扎到最後吧。"
34170-132 = "嘿……可別讓我覺得無聊了哦？"
34170-149 = "真是有趣。就這麼將彼此拖向更深層的地獄……#n彌香，你果然是我的繆斯。"
34170-150 = "和他人的接觸正是地獄……而互相的憎恨正是它實際存在的證明。"
34170-151 = "和無法證明的樂園比起來，這倒是明確多了。#n──你不這麼覺得嗎，聖亞？"
34170-152 = "……"
34170-153 = "看來還沒有放棄呢。"
34170-154 = "……想回到三一去嗎？#n不過要從夢的夾縫間逃脫可不是件容易的事。"
34170-155 = "因為你已經被「意識」給捲進去了呢。#n就像是往通向奇普托斯外部的窗戶探出了頭一樣。"
34170-156 = "沒錯……你的存在簡直就像黑暗中的燈火一樣引人注目。"
34170-157 = "……對「那個」來說，呢。"
34170-158 = "暴露在「那個」面前的你的[ruby=mystery]神祕[/ruby]將轉化為[ruby=terror]恐怖[/ruby]──內側的原理將開始支配你。"
34170-159 = "真是令人好奇……在那之後，你究竟會如何呢。#n就連我們也不知道。"
34170-160 = "關於「那個」的事情，我們也一無所知。"
34170-161 = "無法解釋、無法理解、無法溝通──只知道將會到來的不祥之光。#n目的不詳又無法溝通的無法理解的觀念……"
34170-162 = "我們蓋瑪特利亞最大的宿敵……"
34170-164 = "我們將其稱之為「色彩」。"
34170-167 = "……唔姆。那個也即將完成了呢。"
34170-168 = "你注意到了嗎？#n沒錯──那就是我為了對付「夏萊」而準備的王牌。"
34170-173 = "聖徒會最偉大的聖女──白芭蕾。"
34170-174 = "如果能按照計畫完成的話……將會比人造天使系列更加強力……呵呵。"
34170-175 = "雖然可能像瑪艾斯托洛說的一樣，這種做法並沒有美學……"
34170-176 = "不過「兵器」就該有兵器的機能美。"
34170-177 = "到了那個時候，瑪艾斯托洛會露出怎樣的表情呢……啊，他應該做不出表情吧。"
34170-178 = "究竟夏萊跟奧利斯小隊能否突破「兵器」到我面前來呢？"
34170-182 = "哼哼──這都是無法抵抗的命運哦，聖亞。"
34170-183 = "就讓你和我一起見證這個地獄的存在證明的結果吧。"
34170-188 = "哈啊……哈啊……"
34170-189 = "我……不會放棄的，貝雅特里榭。#n一定，一定……會有能夠突破這個狀況的方法的……"
34170-190 = "要趕快找出……逃離這裡的方法才行……"
34170-191 = "不能就這樣永遠被困在白日夢裡……"
34170-192 = "沒錯……我還有……該做的事情沒做呢……"
34170-194 = "下一話;另一個我們"

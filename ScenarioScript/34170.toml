[translation]
34170-1 = "Episode 17; Contest"
34170-2 = "[ns] \"Mika! Stop this!\""
34170-4 = "...Sorry, Sensei. I have to."
34170-5 = "You have the situation right, Saori? We're on a bit of a tight schedule, so let's hurry this up."
34170-6 = "......"
34170-7 = "One hour left until sunrise..."
34170-8 = "I'd be more focused on the present, if I were you. You might be safe if Sensei gets over here..."
34170-9 = "Who knows how long it'll take them to get through the rubble? I'm not completely evil, though. If you can hold out until then, you win."
34170-10 = "As if that would happen."
34170-11 = "......"
34170-12 = "I don't like that expression. Why do you seem happy? Have you finally just lost it?"
34170-13 = "...I was just reminiscing."
34170-17 = "......"
34170-22 = "Sensei!! Don't come help me!! "
34170-23 = "...!"
34170-25 = "......"
34170-26 = "...?!"
34170-28 = "I'll be okay! Go to Atsuko!"
34170-29 = "There's no time left. Please! Save Hime!"
34170-30 = "L-Leader...!"
34170-31 = "[s] \"Saori...\""
34170-32 = "She's right. Let's go."
34170-33 = "We don't even know if there is a way to get to Leader."
34170-34 = "And even if we did meet up with her, it would already be too late."
34170-35 = "......"
34170-36 = "Leader is injured. She won't last long enough for us to save her."
34170-37 = "B-But..."
34170-38 = "We have to make a choice. Save Hime, or save Leader."
34170-39 = "[s] \"...\""
34170-40 = "I'm leaving the final call to you, Sensei."
34170-41 = "Mika means business...but Hime's life is hanging by a thread."
34170-42 = "What are you going to do?"
34170-43 = "[s] \"I...\""
34170-46 = "[ns1] \"Let's go.\"\n[ns2] Do what needs to be done."
34170-55 = "......"
34170-56 = "I guess Sensei chose Atsuko, in the end."
34170-57 = "Aren't you happy? Isn't that what you wanted?"
34170-58 = "...Was this what you wanted, Mika?"
34170-59 = "What I wanted?"
34170-60 = "What do I want again? Oh...to separate Squad from Sensei, but..."
34170-61 = "......"
34170-62 = "I wasn't particularly aiming for you, to clarify."
34170-63 = "I wouldn't have really cared who it was."
34170-67 = "Actually, it would've been nice if it was Sensei with me..."
34170-68 = "That would be asking for too much, huh?"
34170-69 = "......"
34170-70 = "Don't give me that look. I know I can be a dummy."
34170-71 = "What did Seia always say? Oh yeah! That I'm impulsive and careless. What a meanie!"
34170-75 = "Okay, fine. Maybe I lied a little bit."
34170-76 = "I wanted it to be you. The object of all my hate at my mercy."
34170-77 = "......"
34170-78 = "It is only right for Sensei to rescue students. Sensei will go to the ends of the world to secure a happy ending for them."
34170-79 = "But villains? Villains who've betrayed and lied and hurt people don't get anything good. "
34170-80 = "......"
34170-81 = "So, Saori. Here we are at the end. Don't you want to say anything?"
34170-82 = "This is the climax! The scene where the witch executes the hound! Which I guess you're probably not happy about, but you really don't want to say anything?"
34170-83 = "You can beg if you want! Scream and cry about how unfair this is, about how you don't understand why I'm doing this."
34170-84 = "...I do understand."
34170-94 = "What was that? A grenade? No, a smoke bomb? Hm..."
34170-99 = "Owiee... I-It hurts..."
34170-100 = "It's a weapon that's been banned from production. I found it at the Arius training grounds."
34170-101 = "Oh, I'm so sorry. ★ I didn't actually care. It doesn't matter what weapons you have."
34170-108 = "Ugh...?!"
34170-109 = "...This isn't our first fight. I know how to handle you."
34170-115 = "...Ugh."
34170-116 = "As I said, I understand your hatred, Mika."
34170-117 = "If not for me, you would still have your Tea Party, your friends...the future you were meant to have."
34170-118 = "I also understand that it's my responsibility to bear that hatred."
34170-126 = "...How disgustingly amusing."
34170-127 = "So you chose guerrilla warfare? Considering this terrain, I guess that's the best possible way."
34170-128 = "Also, did you really bring a thermo-pressure grenade to a gun fight? I hope you didn't think that would be enough to take ME down."
34170-129 = "I can't say I don't like your pluck."
34170-130 = "But that doesn't mean I'll take it easy on you. Try your hardest, but...what is it you people always say? It'll be in vain."
34170-131 = "I've learned that, even if all is in vain, there's still reason to fight."
34170-132 = "Yeesh... How stubborn.  "
34170-149 = "Ah, Mika. My muse. Does she know her role? How she has helped to forge my hell? And I, hers?  "
34170-150 = "The hatred that courses through our bodies...it confirms our very existence."
34170-151 = "It's much easier to comprehend than some paradise we don't know exists. Wouldn't you agree, Seia?"
34170-152 = "......"
34170-153 = "How charming. You still haven't given up."
34170-154 = "The little cracks in your dreams you're trying to escape through are hard to find, aren't they?"
34170-155 = "You're trapped in my web with no way out. Are you scared, Seia? Afraid of the power outside of Kivotos you can't tear your eyes away from?"
34170-156 = "Your very existence attracted it like a moth to a flame."
34170-157 = "...That thing."
34170-158 = "You ventured a step too far into powers you didn't understand. And now it's dominated you."
34170-159 = "I wonder...what will happen to you. Not even I know."
34170-160 = "We're equally as ignorant of it as you are."
34170-161 = "An ominous light that can't be interpreted, understood, or communicated with. An incomprehensible idea that, in human eyes, has no purpose."
34170-162 = "Gematria's greatest threat..."
34170-164 = "We call it the Chroma."
34170-167 = "At last. We are approaching the climax."
34170-168 = "Do you feel it too? Ah, that. Yes. My trump card I carefully developed just for Schale. For your Sensei."
34170-173 = "The Saintess of the Council, Barbara."
34170-174 = "If completed as expected...it'll be even stronger than the artificial angel series."
34170-175 = "Maestro will complain about his silly art, but..."
34170-176 = "...a weapon's beauty lies in its function."
34170-177 = "I can't wait to see Maestro's reaction... I do hope it vexes him."
34170-178 = "Will Schale and Squad overcome my weapon and interrupt the ritual? Or will they fail their mission when they've barely begun?"
34170-182 = "I can't wait to see it unfold. This fickle destiny."
34170-183 = "And you, Seia, will bear it in silence. And then you will believe that hell exists."
34170-188 = "*pant* *pant*"
34170-189 = "Beatrice...is wrong... I will not give...up... I will try...and try..."
34170-190 = "I must escape...find the cracks to slip out..."
34170-191 = "I cannot be trapped in this nightmare forever..."
34170-192 = "I cannot...will not be defeated here... I still...must..."
34170-194 = "Next Episode; Another Us"

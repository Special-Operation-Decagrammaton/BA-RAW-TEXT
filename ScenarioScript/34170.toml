[translation]
34170-1 = "ตอนที่ 17;การปะทะ"
34170-2 = "[ns] \"มิกะ!!  พอได้แล้ว!!\""
34170-4 = "ขอโทษนะคุณครู... ฉันทำแบบนั้นไม่ได้หรอก"
34170-5 = "ทีนี้เข้าใจหรือยังซาโอริ? เราทั้งคู่ต่างก็ไม่มีเวลาเหมือนกัน งั้นก็รีบๆ เข้าเถอะนะ"
34170-6 = "..."
34170-7 = "อีกแค่ชั่วโมงเดียว... ก็ถึงเวลาพระอาทิตย์ขึ้นแล้วใช่ไหม? "
34170-8 = "อืม ถ้าคุณครูมาถึงที่นี่และขวางฉันเอาไว้... ฉันก็คงทำอะไรไม่ได้แล้วละ"
34170-9 = "ไม่รู้หรอกนะว่าคุณครูต้องใช้เวลาแค่ไหนกว่าจะมาถึงที่นี่... แต่ถ้าถึงตอนนั้นแล้วเธอยังทนได้อยู่ ฉันจะยอมรับว่าเป็นชัยชนะของเธอก็แล้วกัน"
34170-10 = "ถ้าทำได้ละก็นะ"
34170-11 = "..."
34170-12 = "หืม? ทำไมทำหน้าแบบนั้นล่ะ? มีเรื่องอะไรน่าสนุกงั้นเหรอ? หรือว่าเธอยอมแพ้ทุกอย่างแล้ว?"
34170-13 = "ก็แค่นึกถึงเรื่องในอดีตขึ้นมาน่ะ..."
34170-17 = "..."
34170-22 = "คุณครู!! อย่ามาทางนี้นะ!! "
34170-23 = "......!!"
34170-25 = "......."
34170-26 = "!!?"
34170-28 = "ฉันขอร้องละ ไปช่วยอาสึโกะเถอะ!"
34170-29 = "ไปช่วยองค์หญิงเถอะ! เราไม่มีเวลาแล้ว!"
34170-30 = "หะ... หัวหน้า......!"
34170-31 = "[s] \".............!!\""
34170-32 = "....... หัวหน้าพูดถูก"
34170-33 = "เราไม่รู้ด้วยซ้ำว่ามีทางอ้อมไปทางโน้นหรือเปล่า เราจะมัวแต่หาทางแบบสุ่มสี่สุ่มห้าไม่ได้"
34170-34 = "และต่อให้มาถึง ตอนนั้นก็คงจะสายไปแล้ว"
34170-35 = "......."
34170-36 = "หัวหน้าของเราในตอนนี้เป็นคู่ต่อสู้ของมิกะไม่ได้หรอก หัวหน้าอาจจะฝืนไม่ไหวก่อนที่เราจะไปถึงด้วยซ้ำ"
34170-37 = "ตะ... แต่ว่า..."
34170-38 = "เราต้องปล่อยทางนี้ไว้ แล้วไปช่วยองค์หญิง หากนั่นคือจุดประสงค์ของเรา เราก็ต้องทิ้งหัวหน้าไว้ที่นี่"
34170-39 = "[s] \".........\""
34170-40 = "ตัวเลือกนี้ ฉันจะให้คุณครูเป็นคนตัดสินใจ..."
34170-41 = "มิกะน่าจะรู้ดีว่าเธอกำลังทำอะไรอยู่"
34170-42 = "คุณครูคิดว่าจะเกลี้ยกล่อมผู้หญิงคนนั้นได้งั้นเหรอ?"
34170-43 = "[s] \"ครู.......\""
34170-46 = "[ns1] \"ไปกันเถอะ\"\n[ns2] รีบทำในสิ่งที่ต้องทำ"
34170-55 = "......."
34170-56 = "สุดท้ายคุณครูก็ไปช่วยอาสึโกะสินะ..."
34170-57 = "เยี่ยมเลย ซาโอริ มันเป็นไปตามที่ฉันต้องการเลยละ"
34170-58 = "เธอต้องการอะไรแบบนี้เหรอมิกะ?"
34170-59 = "สิ่งที่ฉันต้องการน่ะเหรอ...?"
34170-60 = "ฉันต้องการอะไรนะ... อ่า... อื้อ ใช่แล้วละ อยากเล่นงานพวกเธอกับคุณครู..."
34170-61 = "......."
34170-62 = "แต่ฉันก็ไม่ได้คิดว่าจะจัดหนักที่เธอหรอกนะ"
34170-63 = "ถ้าให้พูดตรงๆ ละก็ ไม่ว่าคนที่อยู่ตรงนี้จะเป็นใคร มันก็ไม่สำคัญหรอก"
34170-67 = "แต่ฉันก็แอบหวังไว้ว่า... จะเป็นคุณครูที่อยู่ที่นี่..."
34170-68 = "ไม่สิ... หวังแบบนั้นมันอาจจะเกินไป"
34170-69 = "......."
34170-70 = "อะไรกัน? หยุดมองฉันอย่างน่าสมเพชได้ไหม? ฉันก็รู้ตัวอยู่เหมือนกันนะ"
34170-71 = "เซอาจังก็พูดกับฉันบ่อยๆ ว่าฉันเป็นคนหุนหันพลันแล่นและไม่มีความคิดอ่านอะไรเลย แบบนี้มันไม่เกินไปหน่อยเหรอ? พูดแบบนั้นออกมาต่อหน้าได้ยังไง?"
34170-75 = "อืม... ไม่เป็นไรหรอก พอมาคิดๆ ดูแล้ว นี่คงเป็นสิ่งที่ฉันต้องการจริงๆ"
34170-76 = "ยังไงซะคนที่น่าแค้นที่สุดอย่างเธอก็มาอยู่ต่อหน้าฉันแล้ว"
34170-77 = "......."
34170-78 = "อืม ก็ถูกอยู่แล้วที่คนเป็นครูต้องออกไปช่วยนักเรียน เพื่อตอนจบที่มีความสุข... เหมือนกับในที่สุดก็#nสามารถเอาชนะอุปสรรคต่างๆ ได้ และมีความสุขไปด้วยกัน"
34170-79 = "และคนเลวที่ทำสิ่งเลวร้ายมามากมายก็จะมาลงเอยที่นี่ "
34170-80 = "......."
34170-81 = "เอาละ ซาโอริ ถึงเวลาวาดตอนจบของพวกเรากันบ้างแล้วนะ ว่าแต่ทำไมเธอถึงไม่พูดอะไรออกมาตั้งแต่#nเมื่อกี้แล้วล่ะ?"
34170-82 = "นี่มันฉากที่ <แม่มด> จะได้ประหาร <หมาล่าเนื้อ> เชียวนะ? แต่มันไม่น่าสบอารมณ์เลย ไม่เห็นมีใครให้ความสนใจเรื่องนี้เลย แล้ว... เธอไม่คิดจะพูดอะไรหน่อยเลยเหรอ?"
34170-83 = "\"แบบนี้ใครจะไปเข้าใจล่ะ? อย่าดื้อดึงไปหน่อยเลย ความโชคร้ายของเธอ มันมาจากตัวเธอนั่นแหละ\" จะไม่พูดอะไรแบบนี้เหรอ? ไม่แก้ตัวหน่อยเหรอ?"
34170-84 = "....... ไม่หรอก ฉันว่าฉันพอจะเข้าใจดี"
34170-94 = "ระเบิดมือ? ไม่สิ... ควันเหรอ...? นี่มันอะไรกันเนี่ย?"
34170-99 = "โอ๊ย... เจ็บนะ..."
34170-100 = "อาวุธที่ปัจจุบันถูกห้ามผลิตไงล่ะ มีทิ้งไว้ในสนามฝึกอาเรียสเพียบเลย"
34170-101 = "อื้ม☆ แล้วไง ไม่เห็นจะสนใจเลย"
34170-108 = "อึกกก...!?!"
34170-109 = "ฉันเข้าใจวิธีที่จะปะทะกับเธอแล้วละ เข้าใจเป็นอย่างดีเลย"
34170-115 = "อึก..."
34170-116 = "ฉันไม่ปฏิเสธความแค้นของเธอหรอกนะ มิกะ"
34170-117 = "เรื่องที่เธอจะไม่มีอนาคตที่มีความสุขอีกต่อไป เรื่องที่เธอต้องกลายเป็นคนโดดเดี่ยว เรื่องที่เธอต้องสูญเสียทุกสิ่งที่เคยมี... ใช่ ทุกอย่างเป็นเพราะฉันเอง"
34170-118 = "เพราะงั้นฉันจะทุ่มกำลังที่มีเพื่อตอบสนองความแค้นทั้งหมดของเธอเอง"
34170-126 = "สนุกเป็นบ้าเลย... อื้อ"
34170-127 = "คิดจะต่อสู้แบบวิธีกองโจรงั้นเหรอ? ดูจากพื้นที่บริเวณนี้แล้ว แบบนั้นก็อาจเป็นวิธีที่ดีที่สุดนะ"
34170-128 = "อันนั้นคือระเบิดแรงดันสูงสินะ? เธอคิดว่าจะเอามาต่อกรกับฉันได้งั้นเหรอ? นอกจากระเบิดนั่น หวังว่าเธอจะเตรียมอย่างอื่นมาด้วยนะ"
34170-129 = "แต่ว่าฉันก็โล่งใจนะ ที่เธอมีทีท่าแบบนี้ เพราะถ้าใช้วิธีนี้ละก็... อืม"
34170-130 = "เอาละ ฉันจะไม่ออมมือให้เลยละนะ ตั้งรับให้ดีๆ ก็แล้วกัน ถึงสุดท้ายมันก็จะว่างเปล่า และไร้ประโยชน์ก็เถอะ"
34170-131 = "นั่นน่ะสินะ งั้นฉันก็จะดิ้นรนให้ถึงที่สุดเลย"
34170-132 = "ฮึ่ม... เชื่อเค้าเลย... "
34170-149 = "ต่างคนต่างเติมเต็มนรกในอกให้แก่กัน แบบนี้สนุกดีนะคะ... เธอนี่แหละแรงบันดาลใจของฉัน มิกะ"
34170-150 = "คนอื่นคือนรก และต่างคนก็ต่างพิสูจน์การดำรงอยู่ด้วยการเกลียดซึ่งกันและกัน"
34170-151 = "เมื่อเทียบกับสวรรค์ที่พิสูจน์ไม่ได้แล้ว สิ่งนี้มันชัดเจนเสียยิ่งกว่าค่ะ คิดเหมือนกันไหมคะ เซอา?"
34170-152 = "......."
34170-153 = "สงสัยจะยังไม่ยอมแพ้นะคะ"
34170-154 = "อยากกลับไปที่ทรีนิตี้ไหมล่ะคะ? แต่ว่าการหลุดพ้นจากช่องว่างของความฝันมันไม่ใช่เรื่องง่ายๆ นะคะ"
34170-155 = "ก็คุณตกหลุมพรางของ <พิธี> นี่คะ คงไม่ต่างจากการยื่นหน้าออกไปนอกหน้าต่างที่เปิดไปสู่ภายนอก#nของคิโวทอสหรอกค่ะ"
34170-156 = "การดำรงอยู่ของคุณจะสะดุดตาราวกับแสงไฟในความมืดเลยละ"
34170-157 = "สะดุดตาสำหรับ <สิ่งนั้น> ยังไงล่ะคะ..."
34170-158 = "[ruby=Mystery]ความลึกลับ[/ruby]ของคุณที่ประจักษ์ต่อ <สิ่งนั้น> กลับกลายเป็น[ruby=Terror]ความกลัว[/ruby] และหลักการเบื้องหลังนั้นก็ เริ่มครอบงำคุณค่ะ"
34170-159 = "ฉันละสงสัยจังเลยค่ะ... สงสัยว่าจากนี้คุณจะเป็นยังไง พวกฉันเองก็ไม่อาจรู้อะไรได้เลยละค่ะ"
34170-160 = "พวกฉันเองก็ไม่รู้เรื่องเกี่ยวกับ <สิ่งนั้น> เหมือนกันยังไงล่ะคะ"
34170-161 = "แสงไฟแห่งลางร้ายที่แค่ปรากฏขึ้น ไม่อาจวิเคราะห์ได้ ไม่อาจเข้าใจได้ ไม่อาจสื่อสารได้... ความคิดที่ไม่อาจเข้าใจได้ ไม่อาจรู้จุดประสงค์ได้..."
34170-162 = "ศัตรูตัวฉกาจที่สุดของพวกเรา เกมาเทรีย..."
34170-164 = "พวกฉันเรียกสิ่งนั้นว่า <สีสัน> ค่ะ"
34170-167 = "ฮึ่ม... อันนั้นก็ใกล้จะเสร็จสมบูรณ์แล้วสินะคะ "
34170-168 = "รู้กันแล้วใช่มั้ยคะ? ใช่แล้วค่ะ มันคือไพ่ลับของฉันที่เตรียมไว้เพื่อประจันหน้ากับ <ชาเล่ต์> ยังไงล่ะคะ"
34170-173 = "นักบุญบาร์บาราผู้ยิ่งใหญ่ของเหล่าสาวก"
34170-174 = "ถ้ามันสำเร็จตามกำหนดละก็... มันจะทรงพลังกว่าละครชุดเทวทูตประดิษฐ์อีกค่ะ ฮุฮุฮุ"
34170-175 = "ถึงวิธีนี้จะไร้ซึ่งสุนทรียศาสตร์ตามที่เมสโตรบอก..."
34170-176 = "ใน <อาวุธ> ก็มีสิ่งที่เรียกว่าความงดงามในสมรรถนะของมันนี่คะ"
34170-177 = "อยากรู้จังค่ะว่าตอนนั้นเมสโตรจะทำสีหน้าแบบไหน อ้อ จริงสิ! เขาแสดงออกด้วยสีหน้าไม่ได้นี่นา"
34170-178 = "ชาเล่ต์กับสควอดจะฝ่า <อาวุธ> นั้น แล้วมาขัดขวางพิธีของฉันได้เหรอคะ?"
34170-182 = "เรื่องทั้งหมดนี้คือชะตากรรมที่ไม่อาจต่อต้านได้ค่ะ เซอา"
34170-183 = "คอยเฝ้าดูอยู่เงียบๆ เถอะค่ะ ฉันจะพิสูจน์ให้เห็นเอง... ว่านรกน่ะมีอยู่จริง"
34170-188 = "แฮ่ก... แฮ่ก..."
34170-189 = "ไม่ค่ะ ฉันจะ... ไม่ยอมแพ้เด็ดขาดค่ะเบียทริซ ฉันต้องพยายามอีกนิด... พยายามอีก... ต้องไม่หยุดพยายามค่ะ..."
34170-190 = "ต้องรีบหาวิธีออกไปจากที่นี่... ต้องรีบหาสถานที่อื่น... ต้องรีบหา..."
34170-191 = "ฉันจะถูกผูกมัดอยู่กับฝันร้ายพวกนี้ไปตลอดไม่ได้ค่ะ..."
34170-192 = "จะมาล้มอยู่ตรงนี้ไม่ได้... ฉันยัง..."
34170-194 = "ตอนต่อไป;พวกเราอีกคน"

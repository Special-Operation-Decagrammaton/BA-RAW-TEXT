[translation]
10008120-1 = "Episode 12;Let's Finish This, Kaitengers!"
10008120-2 = "Why are they here again?!"
10008120-3 = "Did you weirdos steal what was inside the offering box?!"
10008120-5 = "Haha! That's right!"
10008120-6 = "We took everything!"
10008120-7 = "[s] \"What are you going to do with it?\""
10008120-8 = "Are you going to distribute amongst the poor like the heroes of justice you claim to be?"
10008120-9 = "Haha! What a foolish question!"
10008120-10 = "H-Huh?"
10008120-11 = "There was only one thing for us to do with the contents of the offering box!"
10008120-12 = "Our beloved KAITEN FX MK.0 was mercilessly destroyed in battle by group of villains standing in the way of justice. So... "
10008120-13 = "...we've built its successor!"
10008120-15 = "And it shall be known as the KAITEN FX MK.1!"
10008120-21 = "Destroyed by a group of villains...?"
10008120-22 = "Successor...?"
10008120-23 = "[s1] \"Huh. So I guess that's canon.\"\n[s2] \"I'm getting a weird bout of déjà vu.\""
10008120-26 = "Haha! Enough of your nonsensical rambling! We've already used the contents of the offering box to fund our new machine!"
10008120-27 = "The conveyor belt of life has endlessly rotated..."
10008120-28 = "...to a brighter tomorrow!"
10008120-29 = "Oh, whatever! All you did was use that stolen money for your own self-interest!"
10008120-30 = "Nuh-uh! This was to make our dreams come true!"
10008120-31 = "[s] \"I think that's the definition of your own self-interest, though...\""
10008120-36 = "So, you spent all of it, did you?"
10008120-37 = "Aru?"
10008120-38 = "That box also contained our dreams. Problem Solver 68's dreams..."
10008120-39 = "Money my associates saved by putting off their hobbies and doing hard, manual labor..."
10008120-41 = "And you spent it on yourselves?!"
10008120-42 = "Unforgivable."
10008120-43 = "You'll rue the day you crossed us! "
10008120-45 = "Haha!"
10008120-46 = "That's the spirit! Challenge us with all you have!"

[translation]
10008120-1 = "第12話;凱坦澤，總決戰！"
10008120-2 = "凱，凱坦澤！？為什麼又來了！？"
10008120-3 = "難道你們早就把賽錢箱裡的錢拿走了！？"
10008120-5 = "哈哈哈！"
10008120-6 = "沒錯，我們早就收下了！"
10008120-7 = "[s]「……你們打算用來做什麼？」"
10008120-8 = "果，果然是要像個正義的英雄，做些義賊般的行動……？"
10008120-9 = "哈哈，你在說什麼！"
10008120-10 = "咦，不然是……？"
10008120-11 = "我們偷走賽錢箱的理由只有一個！"
10008120-12 = "因為阻撓我們的惡人的攻擊慘遭破壞的「KAITEN FX Mk.0」……"
10008120-13 = "我們要打造它的「後繼機」！"
10008120-15 = "名為「KAITEN FX Mk.1」！"
10008120-21 = "因為惡人的攻擊……？"
10008120-22 = "後繼機……？"
10008120-23 = "[s1]「啊～好像是有破壞過……？」\n[s2]「發生過那種事嗎……？」"
10008120-26 = "哈哈哈哈！不管你們說什麼，我們都已經用賽錢箱裡的錢打造完新機型了！"
10008120-27 = "這一切都是為了無限的迴轉……"
10008120-28 = "也就是為了浪漫！"
10008120-29 = "結，結果不就是用來滿足私慾嗎！"
10008120-30 = "這不是私慾！是我們所描繪的浪漫！"
10008120-31 = "[s]「我覺得那就叫做『私慾』吧……」"
10008120-36 = "也，也就是說，賽錢箱裡的錢已經全都被花光了，對吧……？"
10008120-37 = "亞瑠醬？"
10008120-38 = "我們的……便利屋68的願望……"
10008120-39 = "大家克制興趣，在工地付出勞力賺來的珍貴的錢……！"
10008120-41 = "居然都被那種傢伙偷走了！？"
10008120-42 = "不可原諒。"
10008120-43 = "絕對不會原諒你們的……！"
10008120-45 = "哈哈，志氣值得讚賞。"
10008120-46 = "我們接受挑戰！放馬過來吧！"

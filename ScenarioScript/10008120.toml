[translation]
10008120-1 = "ตอนที่ 12;การต่อสู้ครั้งสุดท้าย! ไคเทนเจอร์!"
10008120-2 = "ไคเทนเจอร์งั้นเหรอ...? อีกแล้วเหรอ?!"
10008120-3 = "หรือว่าพวกแกชิงเอาเงินในตู้บริจาคไปหมดแล้ว?!"
10008120-5 = "ฮ่าฮ่าฮ่า! ใช่แล้ว!"
10008120-6 = "พวกเราชิงเอามาก่อนทั้งหมดแล้วล่ะ!"
10008120-7 = "[s] \"คิดจะเอาไปทำอะไรน่ะ?\""
10008120-8 = "ถ้าคิดจะเป็นฮีโร่ที่ผดุงความยุติธรรม หรือว่า... คิดจะทำตัวเป็นจอมโจรขวัญใจคนจนเหรอ...?"
10008120-9 = "ฮ่าฮ่า! เป็นคำถามที่โง่ชะมัดยาด!"
10008120-10 = "หะ...หืม?"
10008120-11 = "พวกเราชิงเงินในตู้บริจาคไปเพื่อจุดประสงค์เดียว!"
10008120-12 = "KAITEN FX Mk.0 ที่ถูกพวกวายร้ายชั่วช้าโจมตีจนยับเยินเพราะต้องการหยุดพวกเรา..."
10008120-13 = "เราก็เลยจะสร้างหุ่นยนต์สืบทอดขึ้นมาใหม่ยังไงล่ะ!"
10008120-15 = "และชื่อของมันก็คือ KAITEN FX MK.1...!!"
10008120-21 = "การโจมตีจากจอมวายร้าย...?"
10008120-22 = "หุ่นยนต์สืบทอด...?"
10008120-23 = "[s1] \"อ๊ะ เคยทำลายหุ่นแบบนั้นมาเหมือนกันนี่นา\"\n[s2] \"มีเรื่องแบบนั้น... ด้วยเหรอ?\""
10008120-26 = "ฮ่ะฮ่ะฮ่า! พวกเธอจะพูดยังไงก็ช่าง แต่ตอนนี้พวกเราเอาเงินในตู้บริจาคไปสร้างหุ่นยนต์ตัวใหม่แล้วล่ะ!"
10008120-27 = "ทั้งหมดก็เพื่อความยุติธรรมที่ไม่สิ้นสุด..."
10008120-28 = "เพื่อความรัก!"
10008120-29 = "แบบนั้นมันคือการเอาไปใช้เพื่อประโยชน์ของตัวเองไม่ใช่รึไง!"
10008120-30 = "ไม่ใช่เพื่อประโยชน์ของพวกเราสักหน่อย! เพื่อความรักต่างหาก!"
10008120-31 = "[s] \"แบบนั้นคนปกติเค้าเรียกกันว่าเพื่อประโยชน์ของตัวเองนะ...\""
10008120-36 = "แต่สุดท้ายก็คือใช้เงินในตู้บริจาคไปหมดแล้วใช่มั้ยล่ะ..."
10008120-37 = "อารุจัง?"
10008120-38 = "คำอธิษฐานของสมาชิกหน่วยรับจ้างสารพัดของเรา..."
10008120-39 = "เงินที่แสนสำคัญที่ใครบางคนต้องอดทนเก็บเพื่องานอดิเรก และบางคนก็ต้องอดหลับอดนอนไป#nทำงานใช้แรงงานในไซต์งานก่อสร้าง...!"
10008120-41 = "กลับถูกเจ้าพวกนั้นขโมยไปงั้นเหรอ?!"
10008120-42 = "ยก-โทษ-ให้-ไม่-ได้"
10008120-43 = "ยกโทษให้ไม่ได้เด็ดขาด...! "
10008120-45 = "ฮ่าฮ่า!"
10008120-46 = "พวกเรา...ยินดีรับคำท้านั่น!"

[translation]
90002045-2 = "[ns]「成功了！」"
90002045-3 = "好的！耶索德的訊號現在急遽衰弱！"
90002045-4 = "[s]「解決了嗎？」"
90002045-8 = "現在講這句話，如果出事要負責嗎！？"
90002045-13 = "哇啊啊啊！？"
90002045-14 = "呀啊啊！？"
90002045-16 = "桃井，綠。快看那邊。"
90002045-18 = "呃啊啊……好暈，耳朵好痛……可是，那邊是？咦……？"
90002045-19 = "原本阻擋鋼鐵大陸的屏障……？"
90002045-25 = "沒錯，消失了。"
90002045-26 = "……"
90002045-27 = "謝謝你，老師。幸虧有你救了我。"
90002045-30 = "攻擊組回歸！動作快！"
90002045-31 = "已經在行動了。機庫那邊，聽得到嗎？請確認狀況。"
90002045-35 = "叭邦叭邦！愛麗絲，平安回歸！我們成功擊退了阻擋在前方的巨大屏障！"
90002045-36 = "很好，愛麗絲。你做得很棒。"
90002045-38 = "確認艙門關閉。也收到英美傳來的安全的消息。現在……"
90002045-43 = "！？！？"
90002045-44 = "莉央，怎麼了？怎麼了嗎？"
90002045-45 = "看那邊的屏障，陽葵！"
90002045-46 = "耶索德的牆……開始再生了！"
90002045-47 = "！！！"
90002045-52 = "這次又是什麼啊！？"
90002045-53 = "咦咦……？那個牆…… 該怎麼說才好？從邊緣開始重新生成，正在往左右閉合中？"
90002045-55 = "大家快跑！"
90002045-57 = "又！？"
90002045-58 = "要跑起來，姐姐！牆一旦閉起來，我們就進不去了！"
90002045-63 = "差一點……就差一點……！"
90002045-64 = "呃呃呃呃呃呃……！"
90002045-65 = "往前跳！"
90002045-74 = "大家沒事吧？"
90002045-80 = "啊呀呀呀呀呀…… 應該吧？"
90002045-84 = "天哪……"
90002045-88 = "哇啊……"
90002045-89 = "像在夢裡一樣……"
90002045-95 = "和泉元英美。來自現場的回報。"
90002045-96 = "剛剛成功進入鋼鐵大陸內部。"
90002045-98 = "下一話;前進基地"

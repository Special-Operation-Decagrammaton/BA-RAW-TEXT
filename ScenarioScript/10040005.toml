[translation]
10040005-1 = "บทเริ่มต้น;ในตู้"
10040005-6 = "คะ... คุณครู... อึก...!"
10040005-7 = "อะ... เอ่อ... เดี๋ยวนะคะ พอดีว่า...!"
10040005-8 = "อึก...!"
10040005-13 = "ดะ... เดี๋ยวก่อนค่ะ! มันแคบมากเลย..."
10040005-14 = "ถึงคุณครูจะบอกว่าช่วยไม่ได้ แต่ถ้าโดนจับได้ ฉันคงโดนดุไม่น้อยเลย..."
10040005-19 = "อุ้บ!? อุ้บบบบ!?"
10040005-24 = "[ns1] \"ชู่ว...\"\n[ns2] \"เงียบๆ ไว้...\""
10040005-38 = "ทะ... ทำไม..."
10040005-39 = "ทำไมพวกเราถึงเป็นอย่างนี้ไปได้นะ..."

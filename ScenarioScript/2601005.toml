2601005-5 = "3;미유 수영복;02;어라……. 선생님……?\n#3;a\n#3;em;[?]"
2601005-6 = "3;미유 수영복;00;……네? 여기서 뭘 하고 있었냐고요……? 그건, 그……."
2601005-7 = "3;미유 수영복;04;딱히 대단한 무언가를 하고 있었던 건 아니고……. 그저 해바라기를……."
2601005-8 = "3;미유 수영복;06;우으으으…….\n#3;em;[훌쩍]"
2601005-9 = "3;미유 수영복;06;역시 아까 전 모모톡 때문에 그러시는 거군요……. 별 뜻은 없었던 건데……."
2601005-10 = "3;미유 수영복;01;저는 그저…… 하늘에 대한 감상을 나누고 싶어서 즉흥적으로 연락드렸던 거라……\n#3;em;[속상함]\n#3;stiff"
2601005-11 = "3;미유 수영복;00;혹시 신경 쓰이게 해드렸던 걸까요……."
2601005-12 = "[s] \"나도 미유가 말한 하늘을 보고 싶어졌거든.\""
2601005-13 = "3;미유 수영복;03;그런 거라면…… 이쪽으로 와주세요.\n#3;em;…"
2601005-14 = "3;미유 수영복;03;그쪽의 계선주 위에 앉아서 서쪽의 바다를 향해……"
2601005-15 = "3;미유 수영복;03;……네, 그 수평선 위의 바다예요."
2601005-16 = "3;미유 수영복;11;후훗…… 평범하죠?"
2601005-17 = "3;미유 수영복;03;아무것도 없는 하늘의 풍경이지만…… 제게는 좀 신기했어요.\n#3;em;…"
2601005-18 = "3;미유 수영복;04;평상시에는 저격을 위해 항상 좁거나 어두운 곳에 몸을 숨기고 있을 때가 많으니까요……"
2601005-19 = "3;미유 수영복;99;하지만 여기는 사방이 트여 있고, 바람이 세지도 않고…… 시끄럽지도, 고요하지도 않으면서…… 그리고 또……"
2601005-20 = "3;미유 수영복;03;……단순해서 좋아요."

2601005-23 = "#na;미유 수영복;평소에 보던 하늘은 가리는 것이 많았거든요……"
2601005-24 = "#na;미유 수영복;도심 사이로 끝없이 솟아오르는 건물과, 뾰족뾰족한 산의 경계가 풍경에 요철을 내서……"
2601005-25 = "#na;미유 수영복;하늘과 맞닿는 경계에는 언제나 울퉁불퉁한 굴곡이 있었는데……"
2601005-26 = "3;미유 수영복;02\n#3;a"
2601005-27 = "3;미유 수영복;02;이곳은 하늘과 바다 사이에 아무런 장애물도 없이…… 마치 자로 그은 것처럼 깔끔한 수평선을 그리고 있어요.\n#3;em;…"
2601005-28 = "3;미유 수영복;03;이렇게 단순한 하늘 아래에서라면 어떤 표적이든 맞출 수 있을 것 같아서……"
2601005-29 = "3;미유 수영복;11;……뭔가 확신하기 어려운 자신감이 생겨나더라고요.\n#3;em;[반짝]"
2601005-30 = "3;미유 수영복;11;그래서 작전이 아니더라도 이런 곳에 자주 오면 좋겠다- 라고 생각하고 있노라니……"
2601005-31 = "3;미유 수영복;07;저도 모르게 선생님께 연락을 보내고 있었어요……"
2601005-32 = "3;미유 수영복;04;……이상한 이야기였네요. 죄, 죄송해요. 역시…….\n#3;em;[땀]"
2601005-33 = "[s1] \"……이곳이 꽤 마음에 든 모양이네.\"\n[s2] \"앞으로는 작전 말고도 가끔씩 찾아올까?\""

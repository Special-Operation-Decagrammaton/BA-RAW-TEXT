[translation]
2601005-1 = "Shape of the Sky"
2601005-2 = "I wanted to hear more about what was on Miyu's mind, so I asked where she was and set out to meet her."
2601005-5 = "Oh... Sensei...?"
2601005-6 = "Y-You want to know what I'm doing here? Uh, I'm..."
2601005-7 = "...not doing anything special... Just...this sunflower..."
2601005-8 = "Aaah..."
2601005-9 = "This is about my MomoTalk from earlier? I didn't really mean anything..."
2601005-10 = "It was just on a whim... I wanted to share my impressions of the sky..."
2601005-11 = "Were you worried...?"
2601005-12 = "[s] \"It made me want to see this sky that you were talking about.\""
2601005-13 = "Ah, in that case... Follow me."
2601005-14 = "Sit on that mooring post. There. Facing west, out to sea..."
2601005-15 = "...Look out to the horizon..."
2601005-16 = "Hahaha... It's nothing special, right?"
2601005-17 = "Just an ordinary sky with nothing in it. But...it was kind of new to me..."
2601005-18 = "Normally, I'm hiding in a cramped, dark place, waiting to take my shot..."
2601005-19 = "But here, it's all so...open. There's a gentle breeze... It's not too loud or too quiet..."
2601005-20 = "I like it 'cause it's...simple..."
2601005-21 = "[s] \"It is?\""
2601005-23 = "My usual sky is cluttered with all kinds of things..."
2601005-24 = "Endless buildings...or else jagged mountain ridges..."
2601005-25 = "The border between the sky and the earth looks like a great, jagged tear..."
2601005-27 = "But here, there's nothing between sky and sea... A perfect horizon, like someone traced it with a ruler."
2601005-28 = "There's no target I couldn't hit under such a simple sky..."
2601005-29 = "It almost makes me feel...confident..."
2601005-30 = "I was thinking it'd be nice to come back here sometime, even if it's not for a mission."
2601005-31 = "And then I just sent those messages to you without thinking..."
2601005-32 = "I-I'm rambling. I don't mean to be so weird..."
2601005-33 = "[s1] \"It really is beautiful here.\"\n[s2] \"We can come back if you'd like to. Mission or no.\""
2601005-36 = "U-Uh... I don't want to give you the wrong idea...!"
2601005-37 = "Ahh... This is why I didn't want to tell you..."
2601005-38 = "I feel like a spoiled brat...demanding extra time with you..."
2601005-39 = "[s3] \"Nothing you're saying made me think that.\"\n[s4] \"No, I really want to come back here. It's perfect.\""
2601005-42 = "R-Really...?"
2601005-43 = "You really like it too? The horizon, and this sky..."
2601005-47 = "If you mean it... If you really, really mean it..."
2601005-48 = "If you really like the view here, Sensei..."
2601005-49 = "I mean, if you do... Um..."
2601005-50 = "...Augh..."
2601005-51 = "[s] \"Let's come back together some time. To this beach.\""
2601005-52 = "...!"
2601005-53 = "...Ah."
2601005-54 = "O-Oooh..."
2601005-55 = "Yes."
2601005-57 = "Please... Yes."

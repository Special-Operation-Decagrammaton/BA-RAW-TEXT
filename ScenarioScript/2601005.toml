2601005-37 = "3;미유 수영복;06;우으으……. 역시 이래서 말씀드리지 않으려고 했는데…….\n#3;stiff"
2601005-38 = "3;미유 수영복;00;뭔가 선생님께……. 떼를 쓰는 것처럼 보이잖아요…….\n#fontsize;50\n#3;em;[세로선]"

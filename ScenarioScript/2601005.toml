[translation]
2601005-1 = "天空的模樣"
2601005-2 = "（因為想一起看天空，於是決定來找美優）"
2601005-5 = "咦……老師……？"
2601005-6 = "你問我在這裡做什麼……？#n那個，就是……"
2601005-7 = "沒有在做什麼特別的事……只是在，眺望著天空……"
2601005-8 = "嗚嗚……"
2601005-9 = "果然是因為剛才的MomoTalk對吧……#n我其實……沒有什麼特別的意思。"
2601005-10 = "只是……想要把對天空的感想告訴老師……"
2601005-11 = "對不起……給你添麻煩了吧……"
2601005-12 = "[s]「我也想了解美優的心情。」"
2601005-13 = "那樣的話……請來這裡。"
2601005-14 = "坐在那個繫船柱上，跟我一起……"
2601005-15 = "……天空，與海的水平線。"
2601005-16 = "呵呵……是片平凡無奇的景色對吧？"
2601005-17 = "但是……對我來說……有點少見。"
2601005-18 = "平常總是躲在狹窄的狙擊地點待命，或是隱藏在陰暗的地方……"
2601005-19 = "但是這裡……視野很開闊，風也很舒服……#n總感覺很放心，還有……"
2601005-20 = "……有許多留白的地方，所以很棒。"
2601005-21 = "[s]「留白……？」"
2601005-23 = "平常看見的天空，總是會被很多東西遮擋視野……"
2601005-24 = "街道裡有大樓林立，山林裡則是樹木繁盛……"
2601005-25 = "我所見到的天空，總是十分模糊……"
2601005-27 = "不過……這裡的天空，彷彿像是用尺畫出來的筆直水平線。"
2601005-28 = "在這樣的天空下，感覺任何目標都能命中……"
2601005-29 = "……雖然我自己也覺得不可思議，不過確實湧出了這種自信。"
2601005-30 = "所以，如果有一天，就算只是偶爾來也沒關係……有股依依不捨的心情……"
2601005-31 = "不禁傳了訊息給老師……"
2601005-32 = "……不是很明白對吧。#n對，對不起，果然還是當我……"
2601005-33 = "[s1]「……是片美麗的景色呢，美優。」\n[s2]「下次再兩個人一起來吧？」"
2601005-36 = "什，什麼……我沒有那個意思……！"
2601005-37 = "嗚嗚……果然不應該說的……"
2601005-38 = "這樣感覺……不就像是在對老師耍任性一樣嗎……"
2601005-39 = "[s3]「沒有那種事哦。」\n[s4]「我也同樣，很喜歡這片天空。」"
2601005-42 = "真，真的嗎……？"
2601005-43 = "老師真的……也喜歡……嗎？"
2601005-47 = "如，如果……真的只是如果……"
2601005-48 = "老師也……喜歡，這片景色……的話……"
2601005-49 = "那個……就是……"
2601005-50 = "……下，下……"
2601005-51 = "[s]「下次，我們再一起來吧。」"
2601005-52 = "…………！！"
2601005-53 = "……啊。"
2601005-54 = "啊嗚嗚……"
2601005-55 = "…………嗯。"
2601005-57 = "……約好了……唷？"

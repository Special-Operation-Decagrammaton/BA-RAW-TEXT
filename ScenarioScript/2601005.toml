[translation]
2601005-1 = "รูปร่างของท้องฟ้า"
2601005-2 = "(คุณครูอยากรู้ความคิดของมิยุ ก็เลยถามที่อยู่แล้วไปพบเธอที่นั่น)"
2601005-5 = "เอ๋... คุณครู...?"
2601005-6 = "...คะ? ฉันกำลังทำอะไรอยู่น่ะเหรอคะ...? เรื่องนั้นมัน... คือ..."
2601005-7 = "ฉันไม่ได้ทำอะไรที่ยิ่งใหญ่อยู่หรอกค่ะ... ก็แค่ดอกทานตะวัน..."
2601005-8 = "ฮือออออ..."
2601005-9 = "ว่าแล้วเชียวคงเป็นเพราะ MOMOTALK เมื่อกี้นี้สินะคะ... ทั้งที่มันไม่มีความหมายพิเศษอะไรเลยแท้ๆ..."
2601005-10 = "ฉันก็แค่... ฉันแค่อยากแบ่งปันความรู้สึกเวลาที่ได้มองท้องฟ้า..."
2601005-11 = "ฉันทำให้คุณครูกังวลเหรอคะ..."
2601005-12 = "[s] \"ครูก็อยากดูท้องฟ้าที่มิยุพูดถึงเหมือนกันนะ\""
2601005-13 = "ถ้างั้นละก็... มาทางนี้สิคะ"
2601005-14 = "นั่งบนหลักผูกเรือตรงนั้นแล้วมองไปทางทะเลฝั่งตะวันตก..."
2601005-15 = "...ค่ะ ทะเลที่อยู่ตรงเส้นขอบฟ้านั่น..."
2601005-16 = "ฮิฮิ... ดูธรรมดาใช่มั้ยคะ?"
2601005-17 = "ถึงจะเป็นภาพท้องฟ้าที่ดูไม่มีอะไร... แต่สำหรับฉันมันน่าสนใจมากเลยค่ะ"
2601005-18 = "เวลาที่ทำภารกิจจะมีหลายครั้งที่จะต้องไปซ่อนตัวอยู่ในที่มืดๆ แคบๆ เพื่อซุ่มยิง"
2601005-19 = "แต่ว่าที่นี่เป็นพื้นที่เปิดกว้าง และมีลมพัดเอื่อยๆ... ไม่มีเสียงรบกวนหนวกหู และไม่วุ่นวาย... แล้วก็..."
2601005-20 = "...มันดูเรียบง่ายดีค่ะ"
2601005-21 = "[s] \"เรียบง่ายเหรอ?\""
2601005-23 = "ท้องฟ้าที่เห็นตอนปกติมักจะถูกอะไรหลายๆ อย่างบดบังค่ะ..."
2601005-24 = "พวกตึกสูงเสียดฟ้าทั้งหลายที่ตั้งตระหง่านอยู่กลางเมือง มักจะบดบังทิวทัศน์ของท้องฟ้า..."
2601005-25 = "ยอดแหลมๆ ของตึกเลยมักจะทำให้เส้นขอบฟ้ากลายเป็นเส้นหยึกหยักๆ อยู่เสมอๆ..."
2601005-27 = "แต่ว่าที่นี่... ขอบฟ้ากับท้องทะเลไม่มีสิ่งกีดขวางใดๆ มากั้นเอาไว้... ทำให้เส้นขอบฟ้าเรียบตรง#nเหมือนไม้บรรทัดเลยค่ะ"
2601005-28 = "ถ้าอยู่ภายใต้ท้องฟ้าที่เรียบง่ายแบบนี้... ฉันรู้สึกเหมือนว่าไม่ว่าจะเป็นเป้าหมายแบบไหน ฉันก็ยิงเข้าเป้าได้..."
2601005-29 = "...และรู้สึกเหมือนจะมั่นใจขึ้นด้วยค่ะ"
2601005-30 = "เพราะงั้นถึงอาจจะไม่เกี่ยวกับเรื่องภารกิจ... ตะ...แต่ฉันคิดว่าถ้าได้มาที่นี่บ่อยๆ ก็คงน่าจะดี..."
2601005-31 = "พะ...พอคิดแบบนั้นก็เผลอส่งข้อความไปหาคุณครูโดยไม่รู้ตัวค่ะ......"
2601005-32 = "...มันคงฟังดูแปลกๆ สินะคะ ขะ...ขอโทษค่ะ"
2601005-33 = "[s1] \"...คงชอบที่นี่มากเลยสินะ\"\n[s2] \"เอาไว้เราแวะมาที่นี่กันอีกดีมั้ย?\""
2601005-36 = "ระ...เรื่องนั้น... ฉะ...ฉันไม่ได้หมายถึงแบบนั้นนะคะ..."
2601005-37 = "ฮือออ... เพราะแบบนี้ไงฉันถึงไม่อยากบอก..."
2601005-38 = "มันรู้สึกเหมือน...กำลังรบกวนคุณครูอยู่เลยน่ะค่ะ..."
2601005-39 = "[s3] \"ไม่หรอก\"\n[s4] \"ครูก็ชอบเหมือนกันนะ ท้องฟ้าสดใสแบบนี้น่ะ\""
2601005-42 = "จะ...จริงเหรอคะ...?"
2601005-43 = "คุณครูชอบจริงๆ เหรอคะ? ทั้งเรื่องเส้นขอบฟ้า... และท้องฟ้าที่นี่..."
2601005-47 = "ถะ...ถ้าเกิด...ถ้าเกิดว่า..."
2601005-48 = "คุณครู...ชอบภาพวิวแบบนี้ละก็... ถ้างั้น..."
2601005-49 = "คือว่า... ถ้างั้น..."
2601005-50 = "คือ..."
2601005-51 = "[s] \"คราวหน้าเรามาทะเลที่นี่ด้วยกันใหม่นะ\""
2601005-52 = "......!!"
2601005-53 = "...อ่า..."
2601005-54 = "อ่า......"
2601005-55 = "......ค่ะ"
2601005-57 = "ถึงตอนนั้น... ก็ขอรบกวนด้วยนะคะ"

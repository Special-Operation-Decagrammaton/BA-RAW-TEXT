201100-67 = "3;오웰;01;총학생회장의 소재지를 묻는 건 아니실 테고…… 귀하는 이 시뮬라시옹을 깨트릴 방법을 찾고 계시는군요."
201100-68 = "3;오웰;01;하지만 선생께서는 이미 시뮬라시옹을 깨트릴 수 있는 수단을 갖고 계십니다."
201100-69 = "3;오웰;17;그 성궤에 담긴 신비는 진실을 관찰할 수 있게 하는 샤케디아의 가지."
201100-70 = "3;오웰;17;그 가지를 이용하여 이데아를 관찰한다면 시뮬라크르는 자연히 빛 앞의 그림자처럼 사라질 것입니다."

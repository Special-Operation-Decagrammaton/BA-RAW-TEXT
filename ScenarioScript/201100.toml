201100-105 = "4;프라나;02;그건 걱정하지 않으셔도 괜찮습니다.\n#4;em;[반응]"
201100-106 = "4;프라나;99;싯딤의 상자의 기능이 이전보다 훨씬 더 강화되었기에, 선배가 전담하던 선생님의 업무를 제가 대신한다면 일정상으로도 큰 문제가 없을 겁니다."
201100-107 = "4;프라나;04;사실 이전부터 선배의 부담을 줄여드리기 위해 학생 관리나 일일 업무 보고 같은 업무는 제가 대신하고 싶었습니다만……\n#4;em;…"
201100-108 = "2;아로나;04;아앗, 프라나 쨩! 이제는 선배의 자리까지 엿보는 건가요?\n#2;stiff"
201100-109 = "2;아로나;05;아무리 프라나 쨩이 우수한 AI 오퍼레이터라 하더라도 선생님의 전용 비서 자리는 넘겨드릴 수 없다고요!\n#2;hophop"
201100-110 = "4;프라나;12;……."
201100-111 = "2;아로나;23;하, 하지만! 저는 능력만큼이나 이해심도 넓은 선배니까요.\n#2;em;[!]\n#2;jump"

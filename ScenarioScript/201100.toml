[translation]
201100-1 = "第10話;[ruby=ペルソナ]仮面[/ruby]舞踏会"
201100-2 = "ドリンクバー・「トライアド」"
201100-5 = "[ns] \"オーウェル……？\""
201100-6 = "名前についてはお気になさらず。重要なのは「記号」ですから。"
201100-7 = "この外見で誤解をされているのでしたら付け加えましょう。#n「テレスクリーン」は一方的に情報を吐き出すものではありません。"
201100-8 = "むしろ相手を観察し情報を集めることで、話し合いを可能にするものです。"
201100-9 = "その意味で、今回は私から質問しましょう。"
201100-10 = "先生が持っている神秘……以前のものとは些か異なるようです。"
201100-11 = "既存にはない新しい可能性を内包しているような――"
201100-12 = "[s] \"「シャーケードの杖」は知ってる？\""
201100-13 = "シャーケードの杖……！？"
201100-14 = "おお、まさか。本当にあの[ruby=・]「枝」[/ruby]なのですか？"
201100-15 = "先生が不可解な力の持ち主だとは知っていましたが……#nそれこそ、私の知る限り最も印象的な「象徴」！"
201100-16 = "本来は連邦生徒会長の手にあるべき[ruby=・]「枝」[/ruby]が、今は聖櫃の中にある。#nそれはすなわち……。"
201100-20 = "……なるほど、[ruby=・   ・   ・   ・   ・]複製された[/ruby]聖遺物ですか。"
201100-21 = "とはいえ、イメージが現実を代替するこの世界においては、その複製こそが現実的な価値を持つ聖遺物と言えるでしょう。"
201100-22 = "……まるで、「今の連邦生徒会長」のように。"
201100-28 = "先生が見せてくれるテクストは常に期待を上回ります。クリシェを越えている。"
201100-29 = "あなたは、連邦生徒会長の行方を知っていますか？"
201100-30 = "……はい？それはどういう？"
201100-31 = "あなたが言ったのではありませんか。#n今の連邦生徒会長は、現実を代替する複製のようだと。"
201100-32 = "今の連邦生徒会長が複製品なら、本物はどこにいるんですか？"
201100-33 = "……ほお。"
201100-34 = "世界に属するものが、世界のシミュラシオンを否定する……？#n理解できない現象です。"
201100-35 = "あなたは何者ですか？なぜ現実の目で、非現実を見ているのですか？"
201100-36 = "あなたの権能は誰から？先生？それとも連邦生徒会長？"
201100-37 = "あるいは、まともな思考ができないほどに、どこかが壊れてしまったのでは――"
201100-38 = "……！"
201100-43 = "[ns1] \"やめろ。\"\n[ns2] \"私の生徒に手を出すなら容赦しない。\""
201100-46 = "……失礼。危害を加えるつもりはありませんでした。"
201100-47 = "観察者であり探求者。そして[ruby=ゲマトリア]研究者[/ruby]である本性のせいで……#n「変種」を見つけたら興味をそそられるものでして。"
201100-48 = "彼女に対する解釈は一旦脇に置くとして、質問にお答えしましょう……。"
201100-49 = "[ruby=シミュラークル]複製品[/ruby]は真実を隠す存在ではありません。#n[ruby=シミュラークル]複製品[/ruby]こそが真実なのです。"
201100-50 = "それは、今の連邦生徒会長が本物だと？"
201100-51 = "ただ現実が存在するだけです。嘘か真かは重要ではありません。"
201100-52 = "その証拠として……現在の連邦生徒会長を否定できる根拠や理由は、#nすでに世界に残っていないでしょう？"
201100-53 = "そんな……。"
201100-58 = "[ns] \"話を逸らさないでくれるかな。\""
201100-62 = "[ns3] \"生徒を救うのに、大義名分も綺麗事も必要ない。\"\n[ns4] \"これ以上「戯言」で惑わすつもりなら……。\"\n[ns5] \"話はこれで終わりだ。\""
201100-66 = "[ns] \"連邦生徒会長は今どこにいる。\""
201100-67 = "居場所を突き止めることが真の目的ではないでしょうし……なるほど。#nあなたはこのシミュラシオンを壊す方法を探しているのですね。"
201100-68 = "であれば、先生はすでにその手段を持っています。"
201100-69 = "聖櫃に収められた神秘――真実を観察できる「シャーケディアの枝」。"
201100-70 = "その枝を通じてイデアを観察すれば、[ruby=シミュラークル]複製品[/ruby]は光を前にした影のように自ずと消えることでしょう。"
201100-74 = "[ns6] \"2度も言わせないでほしい。\"\n[ns7] \"連邦生徒会長は今どこにいる。\""
201100-77 = "……分かりました。"
201100-78 = "記号を便宜主義に裁断するのは気乗りしませんが、それをお望みとあらば致し方ありません。"
201100-79 = "例えばの話です。"
201100-80 = "世の誰もが皆「白鳥は白い」という命題を正だとするとき、「黒い白鳥」の存在を証明する一番良い方法は何だと思いますか？"
201100-81 = "……黒い白鳥を直接見せることでしょうか。"
201100-82 = "まさしく。現実を否定する最も良い方法は、反例を見せること。"
201100-83 = "だからといって「[ruby=黒い白鳥]本物の連邦生徒会長[/ruby]」を連れてくることも容易ではないでしょう。#nでは……せめて黒い羽くらいは示さなければ説得力は生まれません。"
201100-84 = "この世界は昨夜、唐突に変貌しました。[ruby=黒い羽]矛盾[/ruby]はまだ世界の各地に散らばっています。"
201100-85 = "放置すれば情報の流れに飲み込まれ、風化してしまうかもしれません。#nしかし記録して固定させたなら、イデアを探す指標となるでしょう。"
201100-86 = "[s] \"……その矛盾はどうすれば探せるのかな。\""
201100-87 = "真実を観察する聖なる枝を、情報の海に入れるだけですよ。#nそうすれば黒い羽根は自ずと姿を現すことになる。"
201100-88 = "情報の海……インターネットですね。"
201100-89 = "ええ。#n特にSNS、ソーシャルメディアは世界のあらゆる欲望と噂が集まる現代のアゴラ。"
201100-90 = "市民の日常、目にした出来事、そして一人ひとりの感想が一人称で記録されていく。#nこの架空のコミュニティこそ、現代社会を象徴する存在だと言っても過言ではありません。"
201100-91 = "先生の持っている神秘が、メディア機器の形をしているのは偶然ではないはずです。"
201100-92 = "調査し、収集し、記録してください。"
201100-93 = "羽の色が白か黒かは、あなたの主観ではなく、シャーケディアの聖なる枝が教えてくれるはず。"
201100-94 = "そしてその記録を積み重ね、一羽の「黒い白鳥」が完成される日には……#nキヴォトスの市民も「異変」に気づくでしょう。"
201100-98 = "[ns] \"アロナ、どう思う？\""
201100-101 = "……多少怪しいですが、シッテムの箱にソーシャルメディアのアプリをインストールすることは問題ありません。"
201100-102 = "モモトークも、ある種のSNSですから。"
201100-103 = "ですがインターネットから得た不特定多数の情報を収集して整理するには、#nスーパーAIアロナでも少し時間がかかりそうです。"
201100-104 = "うぅ……夏休みが終わる前日に、急にアサガオの観察日記つけろって言われた気分です……。"
201100-105 = "その心配は不要です。"
201100-106 = "「シッテムの箱」の機能は前よりも強化されています。#nそのため、先輩がやっていたお仕事を私が代わりに担当すれば、#n大きな問題はないかと思います。"
201100-107 = "先輩の負担を減らしたいと、前から思っていたのです。#n当番の管理や業務日報などは私が代われると思うのですが……。"
201100-108 = "まさか、もう先輩の座を狙ってるんですか！？"
201100-109 = "いくらプラナちゃんが優秀なAIオペレーターとはいえ、#n先生の秘書役までは譲りませんよ！"
201100-110 = "……。"
201100-111 = "で、でも！私は心の広い先輩ですから。"
201100-112 = "かわりばんこなら……お仕事を分けてあげてもいいですよ。"
201100-113 = "ありがとうございます、先輩。"
201100-114 = "では新しいソーシャルメディアの機能追加は問題ないということで。"
201100-115 = "先生、ご判断をお願いします。"
201100-118 = "[ns] \"……分かった。あなたの案に乗ろう。\""
201100-119 = "良い選択です。"
201100-126 = "この世界の神秘を探求する。その旅路を先生と共にできて嬉し――"
201100-130 = "[ns8] \"あなたと手を組むつもりはない。\"\n[ns9] \"私は生徒を助けるために、できることをするだけだよ。\""
201100-138 = "ええ、もちろん理解しておりますとも。"
201100-139 = "本来、まともな大人とは仕事に私情を挟まないものですから。"
201100-145 = "……そういうこったぁ！"
201100-146 = "今回ばかりは先生が「理性的」な判断をしてくださって、良かったと思っていますよ。"
201100-147 = "ああ、そういえば。#n情報を偏りなく無作為に収集するには、匿名であることが望ましいかと。"
201100-148 = "私が持っているアカウントのアクセス権限をお渡ししましょう。どうかご活用ください。#nささやかながら、私の話に耳を傾けてくださったお礼です。"
201100-150 = "では、メディアを楽しんでください。"

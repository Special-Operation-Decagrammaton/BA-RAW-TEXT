201100-5 = "[ns] \"오웰…… 이라고?\""
201100-6 = "3;오웰;01;제 이름에 대해서는 신경 쓰지 않으셔도 괜찮습니다. 중요한 것은 <기호>니까요."
201100-7 = "3;오웰;02;제 외견 때문에 혹여 오해를 하셨을까 덧붙이자면, 이 ‘텔레스크린’은 일방적으로 정보를 쏟아내는 물건이 아닙니다."
201100-8 = "3;오웰;01;오히려 상대의 모습을 관찰하고 정보를 수집함으로써 교류를 가능케 하는 물건이지요."
201100-9 = "3;오웰;01;그런 의미에서 이번에는 제가 선생께 질문을 던지고 싶습니다."
201100-10 = "3;오웰;03;선생의 품에 있는 그 신비…… 전에 보았을 때와는 조금 바뀐 것 같군요."
201100-11 = "3;오웰;01;무언가 기존에 품지 못했던 새로운 가능성을 내재하고 있는 듯한—"
201100-12 = "[s] \"<샤케드의 막대>에 대해 아는 것이 있나?\""
201100-13 = "3;오웰;01;샤케드의 막대……? 샤케드의 막대라고요……?!\n#3;em;[?!]"
201100-14 = "3;오웰;99;오오, 이럴 수가. 제가 들은 이름이 진실로 그 가지가 맞습니까?"
201100-15 = "3;오웰;01;선생이 지니고 있는 불가해의 힘이 여럿 있다는 것은 알고 있었지만…… 그 막대야 말로 제가 들은 것 중 가장 인상적인 <상징>이군요!\n#3;em;[!]"
201100-16 = "3;오웰;02;본래 총학생회장의 손에 쥐어져 있어야 할 그 가지가 이 성궤 안에 들어 있다면, 이는 분명……"

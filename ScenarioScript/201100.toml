201100-76 = "#wait;100"
201100-77 = "3;오웰;08;……알겠습니다.\n#3;em;[한숨]"
201100-78 = "3;오웰;14;기호를 편리주의로 재단하는 것은 내키지 않지만, 그걸 원하신다면 어쩔 수 없지요."
201100-79 = "3;오웰;09;가정을 해봅시다."
201100-80 = "3;오웰;09;세상의 사람들이 모두 <백조는 희다>라는 명제를 참으로 여기고 있을 때, <검은 백조>의 존재를 증명하는 가장 좋은 방법은 무엇일까요?"
201100-81 = "3;린 사복;25;……검은 백조를 직접 보여주는 것인가요."
201100-82 = "3;오웰;01;네. 현실을 부정하는 가장 좋은 방법은 현실과 대비되는 반례를 보여주는 것입니다."
201100-83 = "3;오웰;03;하지만 당장 [ruby=총학생회장]<검은 백조>[/ruby]를 데려올 수 없다면…… 최소한 검은 깃털이라도 보여주어야 설득력이 생기겠죠."
201100-84 = "3;오웰;01;이 세계는 어젯밤 갑작스럽게 변모했기 때문에, 검은 깃털과 같은 모순이 세계 곳곳에 남아 있습니다."
201100-85 = "3;오웰;01;그대로 방치하면 이 모순은 정보의 흐름 속에서 침식되어 보이지 않게 되겠지만, 기록하여 고정한다면 이데아를 찾는 지표로 삼을 수 있습니다."
201100-86 = "[s] \"……그 모순은 어떻게 찾을 수 있지?\""
201100-87 = "3;오웰;01;간단합니다. 진실을 관찰하는 성지를 정보의 바다에 담기만 하면 자연히 드러날 테니까요."
201100-88 = "3;린 사복;20;정보의 바다라면…… 인터넷을 말하는 건가요."
201100-89 = "3;오웰;03;그렇습니다. 특히 그 중에서도 SNS, 소셜 미디어는 세상의 온갖 욕망과 소문이 몰려드는 현대의 아고라라 할 수 있지요."
201100-90 = "3;오웰;01;시민들이 살아가는 일상을, 관찰한 사건을, 개개인의 감상을 1인칭으로 기록하는 이 가상의 커뮤니티야 말로 현대 사회를 대표하기에 부족함이 없지요."
201100-91 = "3;오웰;02;선생이 보유하고 있는 신비가 마침 이러한 미디어 기기의 형태를 갖춘 것은 필히 우연은 아닐 것 입니다."
201100-92 = "3;오웰;02;조사하고, 수집하고, 기록하십시오."
201100-93 = "3;오웰;01;깃털이 희고 검은지는 당신의 주관이 아닌, 샤케디아의 성지가 대신 가려줄 테니."
201100-94 = "3;오웰;01;그리고 그 기록이 쌓여 마침내 한 마리의 ‘검은 백조’가 완성된다면…… 키보토스의 다른 시민들도 <이변>을 알아차리겠지요."

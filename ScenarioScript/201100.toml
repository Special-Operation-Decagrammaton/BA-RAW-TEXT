201100-46 = "3;오웰;01;이런 실례. 해를 끼칠 생각은 아니었습니다.\n#3;em;…"
201100-47 = "3;오웰;01;그저 관찰자이자 탐구자이자 [ruby=게마트리아]연구자[/ruby]인 본성 탓에 ‘변종’을 보게 되면 흥미를 가지게 되는 것뿐입니다."
201100-48 = "3;오웰;01;그녀에 대한 해석은 차치하고, 질문에 대한 답변부터 드리자면……"
201100-49 = "3;오웰;07;시뮬라크르는 진실을 감추는 존재가 아닙니다. 오히려 시뮬라크르가 참된 것입니다."
201100-50 = "3;린 사복;26;그게 무슨 말씀이시죠? 당신은 지금의 총학생회장이 진짜라는 건가요?"
201100-51 = "3;오웰;09;참과 거짓은 중요하지 않습니다. 현실만이 존재할 뿐이지요."
201100-52 = "3;오웰;01;그 증거로써…… 현재의 총학생회장을 부정할 수 있는 근거나 사유는 세계에 남아있지 않습니다."

201100-101 = "2;아로나;14;……네. 다소 수상하긴 하지만, 싯딤의 상자에 소셜 미디어 프로그램을 추가로 설치하는 것 자체는 문제가 되지 않을 것 같아요."
201100-102 = "2;아로나;05;학생과의 소통을 위해 사용하는 모모톡도 일종의 SNS라고 할 수 있으니까요."
201100-103 = "2;아로나;13;다만 인터넷에서 불특정한 정보를 수집하고 정제하는 건, 제아무리 슈퍼 AI 아로나 쨩이라 하더라도 조금 시간이 걸릴 것 같은데요……\n#2;em;[땀]"

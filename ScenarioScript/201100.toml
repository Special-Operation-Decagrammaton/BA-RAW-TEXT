201100-27 = "3;오웰;01\n#3;a\n#wait;1000"
201100-28 = "3;오웰;01;선생이 보여주는 텍스트는 언제나 기대 이상으로 클리셰를 뛰어넘는군요."
201100-29 = "3;린 사복;26;당신은 총학생회장의 행방을 알고 있나요?"
201100-30 = "3;오웰;01;……네? 그게 무슨 말씀이신지?\n#3;em;[?]"
201100-31 = "3;린 사복;25;방금 말씀하시지 않으셨습니까. 지금의 총학생회장이 현실을 대체한 복제와 같다고."
201100-32 = "3;린 사복;20;지금의 총학생회장이 복제품이라면, 진짜는 어디에 있는 거죠?"
201100-33 = "3;오웰;01;……호오.\n#3;em;…"
201100-34 = "3;오웰;01;세계에 소속된 자가, 세계의 시뮬라시옹을 부정하시다니. 이해할 수 없는 현상이군요."
201100-35 = "3;오웰;02;당신은 누구죠? 어째서 현실의 눈으로 비현실을 바라보고 있습니까?\n#3;em;[?]"
201100-36 = "3;오웰;05;당신은 누군가에게 권능을 양도받았습니까? 선생? 혹은 총학생회장?"
201100-37 = "3;오웰;10;그도 아니라면 제대로 된 사고를 할 수 없을 정도로 어딘가 망가져버린 건—"

2001402-36 = "3;사키 헬멧;05;……설마 머리에 벌레가 붙었다는 이유 하나만으로 내가 어린애처럼 호들갑을 떨 거라고 생각한 거야?"
2001402-37 = "3;사키 헬멧;05;대담하게 선봉에 서야 하는 포인트맨이 겨우 그 정도의 일에 호들갑을 떨 리가 없잖아.\n#3;hophop"

[translation]
2001402-1 = "北風與太陽"
2001402-2 = "夏萊．辦公室"
2001402-3 = "（某個炎熱的午後）"
2001402-4 = "哈啊，好熱……"
2001402-5 = "總覺得最近一天比一天熱呢……"
2001402-6 = "算了，反正已經到夏萊了，終於可以在涼爽的空間裡休息……"
2001402-7 = "咦？不涼……？"
2001402-8 = "[s] 「抱歉，現在空調故障中……」"
2001402-9 = "咕，偏偏在這種時候……"
2001402-10 = "明明到這裡來就已經滿身大汗了，真沒想到……"
2001402-11 = "……沒辦法了，總之先做值日生的工作吧。"
2001402-12 = "[s] 「這樣會很熱吧，要不要把鋼盔脫下來？」"
2001402-13 = "……啊？你在說什麼啊？"
2001402-14 = "在人體構造中，頭是最重要的部位。#n把保護頭部的鋼盔脫掉這種行為，在作戰行動中是不可以出現的。"
2001402-15 = "你知道有多少士兵因為在作戰時說「好熱啊稍微脫掉一下」就在脫下鋼盔的瞬間遭到狙擊嗎？"
2001402-16 = "雖然這裡沒有子彈滿天飛，但夏萊的工作當然也是作戰的一環。"
2001402-17 = "怎麼可以在作戰中把頭整個露出來呢。#n如果被其他學校的學生看到的話，SRT特殊學園的形象會變成什麼德行？"
2001402-18 = "[s] 「可是其他學生們都沒有戴頭盔哦。」"
2001402-19 = "他們是他們，這跟別人無關。"
2001402-20 = "總之！不管發生什麼事，我都絕對不會脫下鋼盔的！"
2001402-21 = "[s] 「『不管發生什麼事』？」"
2001402-22 = "沒錯，就是這樣。"
2001402-23 = "不管發生什麼事，都「絕對」不會！"
2001402-25 = "（因為天氣炎熱，為了讓他盡快脫下鋼盔，偷偷開始了「讓咲希脫下鋼盔作戰」）"
2001402-28 = "[ns] 「咲希，鋼盔上有蟲──」"
2001402-29 = "嗯？"
2001402-33 = "呿，沒抓到嗎。"
2001402-34 = "[s] 「……你剛才是打算用手抓嗎？」"
2001402-35 = "有什麼問題嗎？"
2001402-36 = "……不過是頭上有蟲而已，你以為我會慌得像個孩子一樣嗎？"
2001402-37 = "不管有什麼蟲都無所謂。#n身為在戰場上負責衝鋒陷陣的先鋒，怎麼可以因為這種事就這麼狼狽。"
2001402-38 = "蟲子不見了就好，總之繼續完成作業……"
2001402-41 = "[ns] 「我最近聽說，倒立好像對健康有益哦。」"
2001402-42 = "嗯哼。"
2001402-46 = "嗯……確認夏萊保管的登山扣和營釘的使用年限……"
2001402-47 = "[ns] 「……吶，要不要倒立看看？」"
2001402-48 = "啊？為什麼我要……"
2001402-49 = "……"
2001402-50 = "雖然聽說過老師有「奇怪的興趣」……"
2001402-51 = "竟然想讓穿著裙子的學生倒立，實在是有點誇張了吧。"
2001402-52 = "[s] 「呃，我沒有那個意思，話說，抱歉……」"
2001402-53 = "嘛，我大概也知道除了那個之外的意圖了……"
2001402-54 = "如果有說那種無聊的話的時間不如拿來專心工作吧。"
2001402-56 = "（……雖然不想用這招，不過決定使出最後的手段）"
2001402-58 = "[ns] 偷偷接近咲希，將手伸向咲希的鋼盔"
2001402-62 = "……喂，你在做什麼。"
2001402-63 = "竟然從視線的死角瞄準我的頭……"
2001402-64 = "是想看看我應對奇襲的方法嗎？"
2001402-65 = "抱歉，之後再說吧。我現在很忙。"
2001402-66 = "[s] 「對不起……」"
2001402-68 = "（結果沒能把咲希的鋼盔脫下來……）"
2001402-71 = "哈啊，總算處理完了。"
2001402-72 = "[s] 「辛苦了，謝謝你……」"
2001402-73 = "啊啊，老師也辛苦了。"
2001402-74 = "……為什麼你看起來這麼累啊。是因為空調壞了嗎？"
2001402-75 = "嘛，確實，鬆懈下來之後果然很熱呢……"
2001402-80 = "[ns] 「……咦。」"
2001402-81 = "嗯？怎麼了嗎？"
2001402-82 = "[s] 「你不是說作戰中絕對不會脫下鋼盔嗎……」"
2001402-83 = "啊啊，那是當然。"
2001402-84 = "不過作戰現在已經結束了不是嗎？"
2001402-85 = "……有什麼問題嗎？"
2001402-86 = "[s1] 「嘛，沒有因為太熱而昏倒就好……」\n[s2] 「至今為止的作戰究竟是為了什麼……」"
2001402-87 = "……奇怪的傢伙。"
2001402-88 = "……奇怪的傢伙。"
2001402-90 = "（……咲希一邊用奇怪的眼神看著消沉的老師一邊回到了自己的營地）"

[translation]
2001402-1 = "#title;북풍과 태양"
2001402-2 = "#place;샬레 업무관"
2001402-3 = "#na;(어느 무더운 한낮의 오후.)"
2001402-4 = "3;사키 헬멧;04;하아, 덥다…….\n#3;em;[땀]\n#3;a"
2001402-5 = "3;사키 헬멧;99;어쩐지 키보토스는 나날이 더워지는 것 같아."
2001402-6 = "3;사키 헬멧;03;그래도 뭐, 이제 샬레에 도착했으니 드디어 시원한 공간에서 쉴 수 있겠네……\n#3;em;[음표]"
2001402-7 = "3;사키 헬멧;02;……어라? 오늘따라 사무실이 왜 이렇게 찜통 같지?"
2001402-8 = "[s] \"오늘은 에어컨이 고장 나서 수리 중이야.\""
2001402-9 = "3;사키 헬멧;04;으윽…… 이 더운 날씨에 에어컨이 고장 나다니…….\n#3;stiff\n#3;em;[속상함]"
2001402-10 = "3;사키 헬멧;06;샬레에 도착하면 조금이나마 땀을 식힐 수 있지 않을까 기대했는데."
2001402-11 = "3;사키 헬멧;04;……하는 수 없지. 오늘은 더위를 참은 채 업무를 보는 수밖에."
2001402-12 = "[s] \"너무 더우면 그 철모는 벗는 게 어때?\""
2001402-13 = "3;사키 헬멧;05;그게 무슨 말도 안 되는 소리야, 선생님?\n#3;em;[반응]"
2001402-14 = "3;사키 헬멧;10;철모는 가장 치명적인 급소인 머리를 지키는 보호장구. 작전 중에는 절대로 벗어서는 안 되는 물건이라고!\n#3;hophop"
2001402-15 = "3;사키 헬멧;11;작전 중에 땀을 식히기 위해 철모를 벗었다가 저격에 당한 병사가 몇이나 되는 줄 알아?"
2001402-16 = "3;사키 헬멧;99;비록 총알이 오가는 현장은 아니지만, 샬레의 업무도 엄연한 작전의 일환.\n#3;em;…"
2001402-17 = "3;사키 헬멧;10;SRT의 특수요원이 작전 중에 머리를 노출하고 땀을 식히고 있다는 걸 다른 학생들이 보게 된다면 사람들이 SRT 학원을 어떻게 생각하겠어?\n#3;hophop"
2001402-18 = "[s] \"하지만 대부분 다른 학생들도 철모는 쓰지 않는걸.\""
2001402-19 = "3;사키 헬멧;01;그건 그쪽의 사정이지. 내가 신경 쓸 바가 아니야."
2001402-20 = "3;사키 헬멧;05;여하튼, 업무 중에는 무슨 일이 있어도 철모를 벗을 수 없어!\n#3;em;[!]"
2001402-21 = "[s] \"……무슨 일이 있어도?\""
2001402-22 = "3;사키 헬멧;01;음, 당연하지.\n#3;greeting"
2001402-23 = "3;사키 헬멧;05;무슨 일이 있어도, 절대로!\n#3;closeup"
2001402-24 = "#all;hide"
2001402-25 = "#na;(이후, 사키의 더위를 식혀 주기 위해 철모를 벗도록 여러 가지 방법으로 유인해 보았다.)"

[translation]
2001402-1 = "สายลมเหนือกับแสงตะวัน"
2001402-2 = "สำนักงานชาเล่ต์"
2001402-3 = "(ช่วงบ่ายที่ร้อนจัดของวันหนึ่ง)"
2001402-4 = "เฮ้อ... ร้อนจังเลย"
2001402-5 = "ทำไมในคิโวทอสถึงได้ร้อนขึ้นทุกวันๆ เลยนะ"
2001402-6 = "แต่ช่างเถอะ ตอนนี้ก็มาถึงชาเล่ต์แล้ว คงได้พักตากแอร์เย็นๆ บ้างแล้วละ..."
2001402-7 = "เอ๋...? ทำไมวันนี้สำนักงานถึงได้ร้อนเป็นตู้อบแบบนี้ล่ะ?"
2001402-8 = "[s] \"พอดีแอร์เสีย กำลังซ่อมอยู่น่ะ\""
2001402-9 = "อึก... แอร์ดันมาเสียในวันที่อากาศร้อนแบบนี้เนี่ยนะ..."
2001402-10 = "ฉันอุตส่าห์คิดว่าถ้ามาถึงที่ชาเล่ต์แล้วจะตากแอร์ให้เหงื่อแห้งได้สักหน่อยแท้ๆ..."
2001402-11 = "ช่วยไม่ได้นะ... วันนี้คงต้องทำงานแล้วก็ทนร้อนไปก่อน"
2001402-12 = "[s] \"ถ้ารู้สึกร้อนมากๆ ก็ถอดหมวกเหล็กนั่นออกดีไหม?\""
2001402-13 = "พูดอะไรไม่เข้าเรื่องเลยนะ คุณครู"
2001402-14 = "หมวกเหล็กนี่เป็นอุปกรณ์ที่ช่วยป้องกันศีรษะจากอันตรายได้ดีที่สุดเลยนะ และเป็นอุปกรณ์ที่ห้าม#nถอดออกเด็ดขาดระหว่างที่ปฏิบัติงาน!"
2001402-15 = "รู้ไหมว่ามีคนเยอะแค่ไหนที่ถูกยิงเพราะถอดหมวกออกตอนปฏิบัติงานน่ะ?"
2001402-16 = "ถึงงานของทางชาเล่ต์จะไม่ใช่งานที่ต้องไปอยู่ท่ามกลางดงกระสุนก็จริง แต่ก็นับเป็นการปฏิบัติ#nภารกิจอย่างหนึ่งนะ"
2001402-17 = "นักเรียนคนอื่นๆ จะคิดยังไงกับสถาบัน SRT ถ้าเกิดพวกเราถอดหมวกออกในขณะปฏิบัติหน้าที่#nแค่เพราะว่าอากาศร้อนจนชุ่มเหงื่อน่ะ?"
2001402-18 = "[s] \"แต่นักเรียนคนอื่นๆ ก็ไม่ค่อยใส่หมวกเหล็กกันหรอกนะ\""
2001402-19 = "นั่นมันก็เรื่องของพวกเขานี่... ไม่ต้องสนใจฉันหรอก"
2001402-20 = "เอาเป็นว่าไม่ว่าจะเกิดอะไรขึ้น ห้ามถอดหมวกออกขณะปฏิบัติการเด็ดขาด!"
2001402-21 = "[s] \"ไม่ว่าจะเกิดอะไรขึ้นงั้นเหรอ...?\""
2001402-22 = "อื้อ ก็ใช่น่ะสิ"
2001402-23 = "ไม่ว่าจะเกิดอะไรขึ้นก็ห้ามถอดเด็ดขาด!"
2001402-25 = "(หลังจากนั้นคุณครูก็พยายามพูดโน้มน้าวอย่างสุดความสามารถให้ซากิถอดหมวกออกเพื่อคลายร้อน)"
2001402-28 = "[ns] \"ซากิ บนหมวกมีแมลงอะไรไม่รู้เกาะอยู่น่ะ\""
2001402-29 = "หืม?"
2001402-33 = "อะไรน่ะ ไม่เห็นเจอตัวอะไรเลย หรือว่ามันหนีไปแล้วนะ"
2001402-34 = "[s] \"นี่คิดจะใช้มือจับแมลงงั้นเหรอ...?\""
2001402-35 = "อื้อ ก็แล้วมันมีปัญหาอะไรล่ะ?"
2001402-36 = "หรือคุณครูคิดว่าแค่เพราะมีแมลงเกาะอยู่บนหัว แล้วฉันจะโวยวายร้องไห้เหมือนกับพวกเด็กๆ น่ะ?"
2001402-37 = "พลชี้เป้าที่ต้องใช้กล้องมองศัตรูที่แนวหน้าอย่างฉัน ไม่โวยวายกับเรื่องแค่นี้หรอก"
2001402-38 = "ถ้าแมลงหายไปแล้วก็ช่างมันเถอะ งานที่ต้องทำต่อไป..."
2001402-41 = "[ns] \"ตามผลวิจัยล่าสุด ได้ยินว่าการยืนหกสูงดีต่อสุขภาพนะ\""
2001402-42 = "เอ๋... งั้นเหรอ"
2001402-46 = "อายุการใช้งานของหมุดยึดกับห่วงนิรภัยที่ทางชาเล่ต์เก็บไว้..."
2001402-47 = "[ns] \"ลองยืนหกสูงดูหน่อยดีไหม?\""
2001402-48 = "ตอนนี้เลยเหรอ? จู่ๆ ก็อยากให้ทำที่นี่เลยเนี่ยนะ...?"
2001402-49 = "..."
2001402-50 = "ถึงฉันจะเคยได้ยินว่าคุณครูมีรสนิยมแปลกๆ ก็เถอะ..."
2001402-51 = "แต่สั่งให้เด็กนักเรียนหญิงที่ใส่กระโปรงทำท่าหกสูงเนี่ย มีจุดประสงค์อะไรกันแน่?"
2001402-52 = "[s] \"มะ...ไม่ใช่อย่างนั้นนะ...\""
2001402-53 = "เอาเถอะ ถึงจะไม่พูดออกมาแต่ก็เข้าใจจุดประสงค์ของคุณครูแล้วละ"
2001402-54 = "เพราะงั้นอย่ามัวพูดเล่นอยู่เลย รีบๆ มาทำงานต่อดีกว่านะ"
2001402-56 = "(สุดท้ายคุณครูก็ตัดสินใจใช้ไม้ตายสุดท้าย)"
2001402-58 = "[ns] แอบย่องเข้าไปถอดหมวกของซากิออก"
2001402-62 = "ทำอะไรน่ะ?!"
2001402-63 = "แอบเล็งเป้าหมายไปที่หัวแบบไม่มีปี่มีขลุ่ยเลยแบบนี้..."
2001402-64 = "อยากทดสอบความสามารถในการรับมือการจู่โจมสายฟ้าแลบเหรอ?"
2001402-65 = "ตอนนี้ฉันกำลังยุ่งกับงานอยู่นะ ถ้าคุณครูไม่กวนจะดีมากเลยละ"
2001402-66 = "[s] \"ขะ...ขอโทษนะ\""
2001402-68 = "(สุดท้ายจนสิ้นสุดเวลาเข้าเวรของซากิแล้ว คุณครูก็ยังไม่สามารถทำให้เธอยอมถอดหมวกออกได้...)"
2001402-71 = "เฮ้อ... ในที่สุดก็เสร็จซะที"
2001402-72 = "[s] “เหนื่อยหน่อยนะ ขอบใจมากเลย...”"
2001402-73 = "อื้อ คุณครูเองก็ด้วย"
2001402-74 = "แต่วันนี้คุณครูดูเหนื่อยกว่าปกตินะ เพราะแอร์เสียงั้นเหรอ?"
2001402-75 = "เฮ้อ... พอคิดๆ ดู ฉันก็รู้สึกเหนื่อยๆ กว่าปกติเหมือนกัน ร้อนจัง..."
2001402-80 = "[ns] \"ซากิ... ทำไมเธอ...\""
2001402-81 = "หืม? มีอะไรเหรอ?"
2001402-82 = "[s] \"ไหนบอกว่าห้ามถอดหมวกตอนปฏิบัติงานไงล่ะ?\""
2001402-83 = "อื้อ ตอนปฏิบัติงานต้องใส่หมวกอยู่ตลอด"
2001402-84 = "แต่ว่าเมื่อกี้ทำงานเสร็จแล้ว ตอนนี้ก็เลยถอดหมวกได้..."
2001402-85 = "มีอะไรรึเปล่า?"
2001402-86 = "[s1] \"โชคดีที่ไม่ได้ร้อนจนเป็นลมไปนะ...\"\n[s2] \"ที่ผ่านมาครูทำอะไรอยู่เนี่ย...\""
2001402-87 = "เป็นผู้ใหญ่ที่แปลกจริงๆ..."
2001402-88 = "เป็นผู้ใหญ่ที่แปลกจริงๆ..."
2001402-90 = "(...จากนั้นซากิก็มองคุณครูด้วยสายตาแปลกๆ ก่อนจะกลับไปที่แคมป์ของตน)"

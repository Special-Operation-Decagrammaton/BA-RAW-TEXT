[translation]
2001402-1 = "The North Wind and the Sun"
2001402-2 = "Schale Office"
2001402-3 = "One hot, midday afternoon."
2001402-4 = "Ugh. It's so hot."
2001402-5 = "I swear it just gets hotter every day."
2001402-6 = "Well, at least Schale has AC!"
2001402-7 = "...Why is it so hot in here?"
2001402-8 = "[s] \"The AC's broken. They have to fix it.\""
2001402-9 = "Seriously? Today of all days?"
2001402-10 = "The main reason I came to Schale was to cool off."
2001402-11 = "...I guess I'll just suffer."
2001402-12 = "[s] \"If you're that hot, why don't you take off your helmet?\""
2001402-13 = "What are you saying, Sensei?"
2001402-14 = "My helmet protects my head, the most vital organ in the body. I can't just take it off during a mission!"
2001402-15 = "You need to look up the statistics of soldiers being sniped after taking their helmet off during a mission."
2001402-16 = "The likelihood of bullets might be low, but Schale work is still a mission."
2001402-17 = "And imagine what other students would say if they saw an SRT agent expose her head because it was a little hot?"
2001402-18 = "[s] \"Probably nothing. Most of them don't wear helmets.\""
2001402-19 = "Just because they're lax doesn't mean I should be too."
2001402-20 = "Anyway! I absolutely will not take my helmet off while on the job! No matter what!"
2001402-21 = "[s] \"No matter what?\""
2001402-22 = "No matter what!"
2001402-23 = "Do your worst!"
2001402-25 = "I tried tactic after tactic to get Saki to take off her helmet, so she could cool off."
2001402-28 = "[ns] \"Saki! There's a bug on your helmet!\""
2001402-29 = "Huh?"
2001402-33 = "Weird. I didn't feel it up there. Is it gone?"
2001402-34 = "[s] \"...Did you just try to catch it with your hand?\""
2001402-35 = "Yeah, why?"
2001402-36 = "Did you think I'd throw a fit and cry over an insignificant bug?"
2001402-37 = "I'm the squad's point woman. I stand at the front lines when no one else will. What could a bug do to me?"
2001402-38 = "Forget the bug, weirdo. Next on the to-do list is..."
2001402-41 = "[ns] \"A recent study found that handstands are good for your health.\""
2001402-42 = "...That's cool."
2001402-46 = "So, the lifespans of the carabiners and holding pins used in Schale are..."
2001402-47 = "[ns] \"Maybe you should try a handstand.\""
2001402-48 = "Right now? Here?"
2001402-49 = "..."
2001402-50 = "I heard you were a strange adult, but..."
2001402-51 = "Why would you ask a female student wearing a skirt do a handstand?"
2001402-52 = "[s] \"Th-That's not what I meant...\""
2001402-53 = "None of your excuses, Sensei. I know exactly what you're thinking."
2001402-54 = "Stop messing around and focus."
2001402-56 = "(...I was forced to try my last resort.)"
2001402-58 = "[ns] Sneak up behind Saki and take off her helmet."
2001402-62 = "...Sensei. What is wrong with you?!"
2001402-63 = "You took advantage of my blind spot and snuck up on me."
2001402-64 = "Are you testing my situational awareness?"
2001402-65 = "I'm trying to work, Sensei. Stop bothering me."
2001402-66 = "[s] \"S-Sorry...\""
2001402-68 = "I gave up on trying to get Saki to take her helmet off..."
2001402-71 = "*sigh* We're finally done."
2001402-72 = "[s] \"...Great work.\""
2001402-73 = "You too, Sensei."
2001402-74 = "You look exhausted, though. Is it because of the heat?"
2001402-75 = "I can't blame you. I'm pooped."
2001402-80 = "[ns] \"Saki, did you just...?\""
2001402-81 = "Huh?"
2001402-82 = "[s] \"You said you never take your helmet off during missions.\""
2001402-83 = "Well, yeah. It's protocol to wear a helmet during missions."
2001402-84 = "But we finished work, so..."
2001402-85 = "Are you okay, Sensei?"
2001402-86 = "[s1] \"Saki. You'll learn one day... Nothing matters...\"\n[s2] \"What was I doing all this time... For what...?\""
2001402-87 = "...You really are a weirdo."
2001402-88 = "...You really are a weirdo."
2001402-90 = "...Saki gave me one last, mistrustful look even as she returned to camp."

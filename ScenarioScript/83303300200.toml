[translation]
83303300200-6 = "Welcome back, Head Prefect. Thank you for your hard work."
83303300200-7 = "We were able seize all of the statues that Chairman Makoto placed around the academy. Well, other than the ones you...deconstructed."
83303300200-8 = "...Good. Thank you, Ako. I know you have plenty of responsibilities of your own right now."
83303300200-9 = "No, that's nothing... But..."
83303300200-10 = "Why do we let Chairman Makoto do whatever she pleases? We should teach her the error of her ways!"
83303300200-11 = "I...can understand how you feel."
83303300200-15 = "...Mmm. But this isn't the time for it."
83303300200-16 = "Ako, if it's not too much of a burden, I would like to complete my work as quickly as possible today. Could you lend me a hand?"
83303300200-18 = "Ah, of course! I'll get started right away!"

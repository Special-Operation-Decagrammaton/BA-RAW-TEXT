[translation]
83303300200-6 = "啊，歡迎回來，委員長。您辛苦了。"
83303300200-7 = "除了您親自處理的真琴議長銅像之外，其他地區的銅像也全都回收處理了。"
83303300200-8 = "……嗯，亞子也辛苦了。謝謝你的幫忙。"
83303300200-9 = "不……這根本不算什麼。#n只不過……"
83303300200-10 = "真琴議長……真的是一直肆意妄為呢！讓人巴不得狠狠教訓他一頓！"
83303300200-11 = "我也能理解亞子的心情。"
83303300200-15 = "……不過現在不是做那種事的時候。"
83303300200-16 = "亞子，我今天想快點結束風紀委員會的工作。可以請你幫忙嗎？"
83303300200-18 = "啊，是！現在立刻開始！"

[translation]
83303300200-6 = "อ๊ะ กลับมาแล้วเหรอคะท่านประธาน ต้องเหนื่อยไม่น้อยเลยนะคะ"
83303300200-7 = "นอกจากรูปปั้นประธานมาโคโตะที่ท่านประธานไปจัดการมาด้วยตัวเองแล้ว ฉันก็สั่งให้เก็บรูปปั้นที่อยู่#nในพื้นที่อื่นทั้งหมดแล้วค่ะ"
83303300200-8 = "อื้ม อาโกะก็คงเหนื่อยเหมือนกัน ขอบใจที่ช่วยนะ"
83303300200-9 = "ไม่หรอกค่ะ... งานแค่นี้นิดหน่อยเองค่ะ แต่ว่า..."
83303300200-10 = "ประธานมาโคโตะนี่... ทำอะไรตามอำเภอใจจังเลยนะคะ! ลึกๆ แล้วฉันอยากจะใส่เดี่ยวให้สลบไปตรงๆ เลยค่ะ!"
83303300200-11 = "ก็นะ ฉันก็เข้าใจความรู้สึกของอาโกะอยู่หรอก"
83303300200-15 = "อืม... ไม่สิ ตอนนี้ไม่ใช่เวลามาทำอย่างนั้น"
83303300200-16 = "อาโกะ วันนี้ฉันอยากรีบเคลียร์งานของคณะกรรมการวินัยให้เสร็จไวๆ พอจะช่วยฉันหน่อยได้ไหม?"
83303300200-18 = "อ๊ะ... ค่ะ! ฉันจะเริ่มเดี๋ยวนี้ละค่ะ!"

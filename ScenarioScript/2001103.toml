[translation]
2001103-1 = "The Miko Specialist"
2001103-2 = "I visited Serika at her part-time job to see her in all of her miko glory."
2001103-3 = "[s] \"I'm positive it was somewhere around here.\""
2001103-4 = "I finally spotted Serika."
2001103-8 = "For some reason, she was standing by herself at the far side of the venue."
2001103-9 = "[s1] \"It's a miko!\"\n[s2] \"It's Serika!\""
2001103-10 = "S-Sensei?!"
2001103-11 = "What brings you here?"
2001103-12 = "S-Sensei?!"
2001103-13 = "What brings you here?"
2001103-14 = "What? You came here just to see me as a miko?"
2001103-15 = "Wh-What do you think you're saying!"
2001103-16 = "[s] \"...\""
2001103-17 = "What's wrong? Why are you staring at me like that?"
2001103-18 = "Don't just stare at me! If you have something to say, spit it out!"
2001103-19 = "Actually, if you're thinking this look doesn't suit me..."
2001103-20 = "Or that I don't act like a proper miko...or anything else mean, I-I'm well aware of it so you don't have to say it out loud!"
2001103-21 = "[s3] \"You're cute!\"\n[s4] \"You're the embodiment of a miko!\""
2001103-23 = "Y-You're speaking silly nonsense again!"
2001103-25 = "Y-You're speaking silly nonsense again!"
2001103-26 = "[s] \"Anyway, aren't you in the middle of your shift? Why are you alone?\""
2001103-27 = "Ah... So, about that."
2001103-28 = "The thing is... Sensei, what do I do?"
2001103-29 = "As part of my job, I'm supposed to guide people inside the venue..."
2001103-30 = "*sigh* As you can see, I wasn't able to do my job right."
2001103-31 = "Yup... It's a complete failure after all... Maybe I was unfit for this job?"
2001103-32 = "[s] \"Unfit?\""
2001103-33 = "I did try to prepare as best as I could, but maybe it wasn't enough."
2001103-34 = "Ah! S-Sensei, I'm not trying to blame you at all!"
2001103-35 = "It's just... Well, I should've been more prepared for unfamiliar work after all. I'm beginning to have some regrets."
2001103-36 = "Well I'm in the middle of it already, so I just have to pull myself together."
2001103-37 = "But this may not be the job for me after all..."
2001103-38 = "[s] \"No, that's not true!\""
2001103-39 = "Huh? S-Sensei?"
2001103-40 = "[s5] \"You're already a superb miko!\"\n[s6] \"You just haven't had your chance yet!\""
2001103-41 = "Wh-What are you talking about?"
2001103-42 = "Wh-What are you talking about?"
2001103-43 = "Waaah! Mommy! Daddy! Where are you?!"
2001103-44 = "Oh no, is that child lost?"
2001103-45 = "[s] \"This is your chance, Serika!\""
2001103-50 = "Oh, uh, umm. Hey there, little lady. Have you lost your way?"
2001103-51 = "*sniffle* No! It's not me! My mom and dad are missing!"
2001103-52 = "I-I see... Then, just a moment. Can you wait here and not cry? I'll find them, okay?"
2001103-53 = "Hey there! Has any parent lost their child?!"
2001103-54 = "Anyone?!"
2001103-60 = "Honey! You're here! I've been looking all over for you!"
2001103-61 = "Waaah! Daddy!"
2001103-62 = "Phew, I'm so relieved. Sorry for causing you trouble, Miss Miko."
2001103-63 = "N-Not at all! I'm just relieved you were reunited safely."
2001103-64 = "Miko lady! Thank you! Happy New Year!"
2001103-65 = "Happy New Year to you too!"
2001103-67 = "*sigh* That should do it, right?"
2001103-68 = "[s] \"Serika! Over there next!\""
2001103-69 = "Sensei?! W-Wait!"
2001103-74 = "I came here to pray for the first time in a while, but my back!"
2001103-76 = "Excuse me. Are you all right?"
2001103-77 = "Well well, isn't this the miko? How cute! This old lady is fine. It's just my back is hurting a little."
2001103-78 = "Please allow me to guide you inside."
2001103-79 = "But I'd feel bad if you personally assisted me... Huh?!"
2001103-80 = "I-Is something the matter?"
2001103-81 = "After you patted my back, my pain vanished! Y-You possess a great power!"
2001103-82 = "I'm sorry?"
2001103-83 = "Hey everyone! This here's one incredible miko!"
2001103-85 = "(From then on, customers began to gather around Serika in great numbers.)"
2001103-88 = "Miko! Please bless the omikuji I just drew!"
2001103-89 = "B-Bless? Well, I guess I could do that if you'd like."
2001103-90 = "Ah! Then, please bless the capsule vending machine I'm playing next!"
2001103-91 = "Does that even need a blessing?!"
2001103-92 = "Actually, I'd rather you pick for me instead! I only trust you!"
2001103-93 = "What am I supposed to do with a request like that?!"
2001103-94 = "[s] \"Serika! Let's do it!\""
2001103-95 = "Sensei?! Stop!"
2001103-96 = "That's a relief! I'll leave it in your hands!"
2001103-97 = "Ugh... Ah! To hell with it! Fine!"
2001103-98 = "D-Do I just need to tap here? Like this?!"
2001103-101 = "Oooh! Surely!"
2001103-103 = "Ah. *sigh* There's no disputing reality. This normal-grade character that you picked for me... I'll raise it with care..."
2001103-104 = "What the?! Why do I have to feel like it's my fault after I did what they asked?!"
2001103-106 = "(Slowly, the number of people Serika helped grew.)"
2001103-108 = "Hey, Miss. You seem to have a knack for this. Would you like to sign on with us and become a miko among mikos, a miko specialist?"
2001103-109 = "Wait, I've never really thought about it that much!"
2001103-110 = "Please! Consider our offer!"
2001103-111 = "Waah, S-Sensei?! Help!"
2001103-116 = "*huff* *puff* That was insane. Was the word catastrophe made for moments like these?"
2001103-120 = "My concern over my part-time job not working out seems silly now."
2001103-121 = "I really don't know how I got here."
2001103-122 = "[s] \"When you're being sincere, this is what happens.\""
2001103-123 = "What's that supposed to mean? That's dumb."
2001103-124 = "Anyway... Looking back now, it really was silly to be so worried."
2001103-125 = "But it's because you encouraged me, Sensei."
2001103-126 = "Hahaha. I ended up receiving your help again, Sensei. It feels like things always turn out this way."
2001103-127 = "Thank you for always being there, Sensei."
2001103-128 = "[s] \"I'm always available to help you, Serika.\""
2001103-129 = "Hmph. You seem awfully confident! You don't even know what kind of requests I'll have in the future."
2001103-130 = "[s] \"It's fine. As long as they're from you, Serika.\""
2001103-131 = "Uh..."
2001103-133 = "W-Well, fine! Since you keep insisting, Sensei."
2001103-134 = "[s7] \"Yup! So don't have second thoughts, and come to me anytime!\"\n[s8] \"I'll help you become a miko amongst mikos!\""
2001103-135 = "What? I was wondering what you were talking about."
2001103-136 = "What? I was wondering what you were talking about."
2001103-137 = "*sigh* Really..."
2001103-138 = "Pfft! What's with you?!"
2001103-139 = "You're really...such a fool!"
2001103-141 = "Afterward, I helped with Serika's part-time job until her shift was over."

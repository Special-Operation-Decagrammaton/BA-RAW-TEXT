[translation]
2001103-1 = "ผู้เชี่ยวชาญเรื่องมิโกะ"
2001103-2 = "(คุณครูมาที่สถานที่ทำงานพาร์ทไทม์ของเซริกะเพื่อที่จะได้เห็นภาพเธอตอนทำงานเป็นมิโกะ)"
2001103-3 = "[s] \"น่าจะอยู่แถวๆ นี้นี่นา...\""
2001103-4 = "(ไม่นานนักคุณครูก็เจอเซริกะ)"
2001103-8 = "(แต่ไม่รู้ว่าเพราะอะไร เซริกะกลับยืนอยู่คนเดียวเงียบๆ ห่างไปจากสถานที่จัดงาน)"
2001103-9 = "[s1] \"ท่านมิโกะ!\"\n[s2] \"เซริกะ!\""
2001103-10 = "คะ... คุณครู?!"
2001103-11 = "คุณครูมาทำอะไรที่นี่?"
2001103-12 = "คะ... คุณครู?!"
2001103-13 = "คุณครูมาทำอะไรที่นี่?"
2001103-14 = "อะไรนะ? มาดูฉันทำงานเป็นมิโกะเหรอ...?"
2001103-15 = "หมายความว่ายังไงน่ะ?"
2001103-16 = "[s] “…”"
2001103-17 = "อะ...อื้อ! มะ...มีอะไรเหรอ? ทำไมถึงจ้องฉันแบบนั้นล่ะ"
2001103-18 = "อย่าเอาแต่จ้องโดยไม่พูดอะไรสิ มีอะไรจะพูดก็รีบๆ พูดมาเลย...!"
2001103-19 = "ระ... หรือว่าคุณครูคิดว่าชุดนี้มันไม่เหมาะกับฉันเหรอ?"
2001103-20 = "หรือฉันคงดูไม่เหมือนกับมิโกะสินะ เรื่องนั้นฉันเองก็พอจะรู้แล้ว เพราะงั้นไม่ต้องพูดออกมาก็ได้"
2001103-21 = "[s3] \"น่ารักจังเลย!\"\n[s4] \"เซริกะเป็นร่างจำแลงของมิโกะจริงๆ รึเปล่าเนี่ย?\""
2001103-23 = "พูดอะไรน่ะ!"
2001103-25 = "เปล่าสักหน่อย! พูดอะไรไม่เห็นรู้เรื่องเลย!"
2001103-26 = "[s] \"แต่ทำงานพาร์ทไทม์อยู่ไม่ใช่เหรอ? ทำไมมายืนอยู่คนเดียวล่ะ?\""
2001103-27 = "อืม คือว่าเรื่องนั้นน่ะ..."
2001103-28 = "คุณครู... ทำยังไงดีล่ะ?"
2001103-29 = "ในฐานะเด็กทำงานงานพาร์ทไทม์... ฉันควรไปคอยช่วยแนะนำสถานที่ต่างๆ ในงานเทศกาล#nให้กับคนที่มาเที่ยวงาน"
2001103-30 = "เฮ้อ แต่อย่างที่เห็นว่าตอนนี้ฉันเหมือนไม่ได้ทำงานเต็มที่เลย"
2001103-31 = "ทำงานล้มเหลวสุดๆ เลย บางทีฉันอาจไม่ดีพอสำหรับงานนี้ก็ได้..."
2001103-32 = "[s] \"ไม่ดีพองั้นเหรอ?\""
2001103-33 = "ฉันก็เตรียมตัวมาเต็มที่แล้ว แต่ดูเหมือนว่ามันก็ยังไม่พอ..."
2001103-34 = "อ๊ะ! ฉะ...ฉันไม่ได้จะโทษคุณครูหรอกนะ!"
2001103-35 = "ก็แค่คิดว่าเวลาทำงานที่ไม่คุ้นเคยแบบนี้... ฉันควรจะต้องเตรียมตัวมาให้ดีกว่านี้น่ะ#nตอนนี้ฉันเลยเริ่มเสียใจหน่อยๆ แล้ว"
2001103-36 = "แต่เอาเถอะ ตอนนี้ฉันกำลังทำงานพาร์ทไทม์อยู่ เพราะงั้นควรจะต้องตั้งสติให้ดีก่อน..."
2001103-37 = "แต่ฉันคงไม่เหมาะกับงานแบบนี้จริงๆ นั่นแหละ..."
2001103-38 = "[s] \"ไม่ใช่อย่างนั้นหรอก!\""
2001103-39 = "หะ...หืม? คะ... คุณครู?"
2001103-40 = "[s5] \"ตอนนี้เซริกะเป็นสุดยอดมิโกะแล้วนะ!\"\n[s6] \"แค่ยังไม่มีโอกาสเฉิดฉายก็เท่านั้นเอง!\""
2001103-41 = "พะ...พูดเรื่องอะไรน่ะ?"
2001103-42 = "พะ...พูดเรื่องอะไรน่ะ?"
2001103-43 = "แงงงงง! หม่าม้า... ป่าป๊าาา~! อยู่ไหนน่ะ~!"
2001103-44 = "แย่แล้ว เด็กหลงทางนี่นา"
2001103-45 = "[s] \"ถึงตาเซริกะออกโรงแล้ว!\""
2001103-50 = "อืมมม... เอ่อ นี่หนูน้อย หลงทางเหรอจ๊ะ?"
2001103-51 = "ฮึก...! ปะ...เปล่านะ~! หนูไม่ใช่เด็กหลงทางนะ! ป่าป๊ากับหม่าม้าต่างหากที่หลงทางน่ะ!"
2001103-52 = "งะ...งั้นเหรอ... ถ้างั้นรอเดี๋ยวนะ รอตรงนี้ก่อนอย่าร้องไห้นะ เดี๋ยวพี่สาวจะช่วยตามหาป่าป๊ากับหม่าม้าที่หลงทางให้หนูเอง"
2001103-53 = "ขอโทษนะคะ~! มีผู้ปกครองท่านใดที่พลัดหลงกับลูกบ้างมั้ยคะ?!"
2001103-54 = "อยู่แถวนี้มั้ยคะ?!"
2001103-60 = "ลูกรัก! อยู่นี่เองเหรอ! ป๊ะป๋าตามหาหนูไปทั่วเลยนะ...!"
2001103-61 = "แงงงง~! ป๊ะป๋าาา~!"
2001103-62 = "เฮ้อ โล่งอกไปที ขอโทษที่รบกวนนะครับ ท่านมิโกะ"
2001103-63 = "มะ...ไม่เป็นไรค่ะ ค่อยยังชั่วที่เจอกันนะคะ"
2001103-64 = "พี่สาวมิโกะ~! ขอบคุณนะคะ! สวัสดีปีใหม่ค่ะ~!"
2001103-65 = "อื้อ! ขอให้มีความสุขในวันปีใหม่นะ!"
2001103-67 = "เฮ้อ... จัดการเรียบร้อยแล้ว"
2001103-68 = "[s] \"เซริกะ! ต่อไปก็ตรงนั้น!\""
2001103-69 = "คะ... คุณครู?! ดะ...เดี๋ยวก่อนสิ!"
2001103-74 = "ตายจริง... อยากจะมาสวดขอพรแท้ๆ โอย... เอวฉัน..."
2001103-76 = "คุณยายเป็นอะไรรึเปล่าคะ?"
2001103-77 = "ตายจริง... ท่านมิโกะเหรอคะ โฮ่ๆ ยายแก่คนนี้ไม่เป็นอะไรหรอกค่ะ ก็แค่ปวดเอวนิดหน่อยเท่านั้นเอง"
2001103-78 = "ถ้างั้นฉันจะพยุงคุณยายไปทางด้านโน้นเองค่ะ"
2001103-79 = "ตายจริง แย่จริงๆ เลย ต้องให้ท่านมิโกะมาช่วยแบบนี้ ขอโทษนะคะ..."
2001103-80 = "อ๊ะ มะ...มีอะไรหรือเปล่าคะ...?"
2001103-81 = "พะ...พอท่านมิโกะแตะที่เอวของฉัน ความเจ็บปวดก็หายไปเลยค่ะ!#nทะ...ท่านมิโกะมีพลังวิเศษจริงๆ ด้วย!"
2001103-82 = "คะ...คะ?"
2001103-83 = "นี่ทุกคนนนน~! ท่านมิโกะที่มีพลังวิเศษอยู่ตรงนี้~!"
2001103-85 = "(หลังจากนั้น กลุ่มคนที่ยืนอยู่รอบๆ ก็กรูเข้ามาล้อมรอบเซริกะ)"
2001103-88 = "ท่านมิโกะ! ช่วยอวยพรให้โอะมิกุจิที่เราเสี่ยงทายมาด้วยเถอะ!"
2001103-89 = "อะ... เอ่อ... อวยพรเหรอ? ถ้าคนขอให้ทำก็คงช่วยไม่ได้ละนะ..."
2001103-90 = "อ๊ะ ถ้างั้นรบกวนอวยพรให้กับการกดกาชาเกมที่เราเล่นอยู่หน่อยสิ!"
2001103-91 = "กดกาชาต้องใช้คำอวยพรด้วยเรอะ?!"
2001103-92 = "ไม่สิ! แค่อวยพรคงได้ยังไงกัน ท่านมิโกะช่วยกดแทนให้หน่อยสิ!#nพวกเราจะเชื่อใจท่านมิโกะนะ!"
2001103-93 = "ถ้ามาขอให้ทำแบบนั้นจะทำยังไงล่ะ?!"
2001103-94 = "[s] \"เซริกะ! ลุยเลย!\""
2001103-95 = "เดี๋ยวก่อน...?! คุณครู?!"
2001103-96 = "ค่อยยังชั่วหน่อย ฝากด้วยนะท่านมิโกะ!"
2001103-97 = "อะ... อ่า... อืมมม... ฮึ่ยยย! เอางั้นก็ได้!"
2001103-98 = "กะ...กดตรงนี้รึเปล่า? แบบนี้รึเปล่า?!"
2001103-101 = "โอ้วววว...!! ดูสิ...!"
2001103-103 = "อา... ขอบคุณท่านมิโกะ ความจริงยังไงก็เป็นความจริงอยู่ดี...#nตัวละครระดับทั่วไปที่ท่านมิโกะกดมาให้... จะเก็บเอาไว้อย่างดีเลยนะ"
2001103-104 = "เดี๋ยวสิ?! ทำไมพูดเหมือนทางนี้เป็นคนผิดเลยล่ะ?!"
2001103-106 = "(หลังจากนั้นเซริกะก็ช่วยคนอีกหลายๆ คนที่อยู่ตรงนั้น)"
2001103-108 = "อืม... คุณหนูที่อยู่ตรงนั้นน่ะ คุณหนูดูมีออร่าของมิโกะดีนะ#nมาเซ็นสัญญากับเราแล้วมาเป็นมิโกะในสังกัดเรามั้ย สนใจมาเป็นผู้เชี่ยวชาญด้านมิโกะมั้ยล่ะ?"
2001103-109 = "มะ...ไม่ล่ะ ฉันยังไม่ได้คิดจะทำถึงขนาดนั้นหรอก"
2001103-110 = "ขอร้องล่ะ! ช่วยพิจารณาข้อเสนอของเราด้วยเถอะ!"
2001103-111 = "ว้ากกก คะ...คุณครู?! ช่วยด้วย...!"
2001103-116 = "เฮ้อ เรื่องชักไปกันใหญ่แล้ว เรียกว่าหายนะยังน้อยไปเลย"
2001103-120 = "เรื่องที่กังวลว่าจะทำงานพิเศษได้ไม่ดีนี่เหมือนเป็นเรื่องโกหกเลย"
2001103-121 = "ไม่คิดเลยว่าจะกลายเป็นแบบนี้ไปได้"
2001103-122 = "[s] \"ที่เป็นแบบนี้เพราะเซริกะตั้งใจมากไงล่ะ\""
2001103-123 = "หมายความว่ายังไงน่ะ? "
2001103-124 = "แต่ว่าฉันก็งี่เง่าจริงๆ ที่มัวแต่กังวลเกินเหตุ... ไม่นึกเลยว่าจะกลายเป็นแบบนี้ไปได้"
2001103-125 = "ที่เป็นแบบนี้ได้คงเพราะคุณครูมาให้กำลังใจล่ะมั้ง"
2001103-126 = "ฮะฮะฮะ คราวนี้ก็ช่วยฉันไว้อีกแล้วนะ คุณครู รู้สึกเหมือนว่าจะเป็นแบบนี้ทุกครั้งเลยด้วยนะ"
2001103-127 = "ขอบคุณที่ช่วยฉันเสมอนะ คุณครู"
2001103-128 = "[s] \"ถ้าเพื่อเซริกะล่ะก็ครูยินดีช่วยเสมอ!\""
2001103-129 = "หืมมม... พูดง่ายๆ แบบนั้นเลยเหรอ~? ทั้งที่ไม่รู้ว่าฉันจะขอให้ช่วยอะไรอีกเนี่ยนะ?"
2001103-130 = "[s] \"อื้อ ถ้าเป็นคำขอของเซริกะก็ได้ทุกอย่างนั้นแหละ\""
2001103-131 = "อึ่ก..."
2001103-133 = "หืมมม~ คุณครูพูดแบบนี้อีกแล้วนะ..."
2001103-134 = "[s7] \"อื้อ! เพราะงั้นไม่ต้องห่วง บอกมาได้ตลอดเลย!\"\n[s8] \"ครูจะช่วยให้เซริกะได้เป็นผู้เชี่ยวชาญเรื่องมิโกะเอง!\""
2001103-135 = "ว่าไงนะ...? พูดแบบนี้อีกแล้วนะ"
2001103-136 = "ว่าไงนะ...? พูดอะไรของคุณครูเนี่ย"
2001103-137 = "เฮ้อ จริงๆ เชียว..."
2001103-138 = "ฮิฮิ! อะไรกันเนี่ย~!"
2001103-139 = "จริงๆ เลยเชียว... คุณครูคนบ้า~!"
2001103-141 = "(หลังจากนั้นคุณครูก็ช่วยเซริกะทำงานพาร์ทไทม์ต่อจนเสร็จงาน)"

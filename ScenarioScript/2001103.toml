[translation]
2001103-1 = "巫女界的專家"
2001103-2 = "（為了欣賞難得的巫女服而去了茜香打工的地方）"
2001103-3 = "[s] 「聽說就是這附近啊……」"
2001103-4 = "（馬上就找到了茜香）"
2001103-8 = "（但是茜香卻不知為何，只是靜靜地站在角落……）"
2001103-9 = "[s1] 「發現巫女了！」\n[s2] 「茜香？」"
2001103-10 = "咦，老師！？"
2001103-11 = "等等，為什麼……！？"
2001103-12 = "咦，老師！？"
2001103-13 = "等等，為什麼……！？"
2001103-14 = "為了看我穿巫女服……？"
2001103-15 = "啊啊真是的，真搞不懂你！我不是說不用來也沒關係嗎！？"
2001103-16 = "[s] 「…………」"
2001103-17 = "怎，怎樣啦，這樣一直盯著我看……"
2001103-18 = "為什麼什麼話都不說？有什麼想說的就說啊……！"
2001103-19 = "我，我自己也不覺得這身服裝有多適合我。"
2001103-20 = "就算被你說比想像中更不像巫女，這種事我早就……！"
2001103-21 = "[s3] 「好可愛！」\n[s4] 「謝啦……」"
2001103-23 = "突，突然幹嘛啦！？"
2001103-25 = "突，突然幹嘛啦！？"
2001103-26 = "[s] 「我是真心稱讚你喔。話說回來，茜香為什麼會自己一個人待在這裡呢？」"
2001103-27 = "啊啊，那是因為……"
2001103-28 = "唔嗯……老師，你覺得該怎麼做才好呢?"
2001103-29 = "你也知道，我正在做扮演巫女的工作，雖然是這樣……"
2001103-30 = "基本上「導覽」也是我們的工作。該說是沒有做好呢，還是從剛剛開始就一直錯過時機呢……"
2001103-31 = "果然是因為我無法勝任巫女的工作嗎……。"
2001103-32 = "[s] 「無法勝任？」"
2001103-33 = "雖然我盡力做了很多準備，但還是覺得自己是不是真的做不來。"
2001103-34 = "啊！不是，我並不是在責怪老師之前做的那件事……！"
2001103-35 = "只是各種情況都不如預期，所作所為都和預期的不一樣……"
2001103-36 = "現在也還是上班期間，應該要振作點才行的……"
2001103-37 = "總覺得，好像不太適合我呢……"
2001103-38 = "[s] 「才沒有那種事！」"
2001103-39 = "老，老師……？"
2001103-40 = "[s5] 「茜香一定能成為一名優秀的巫女的！」\n[s6] 「大概只是因為是第一次所以比較緊張，加上機會還沒來而已！」"
2001103-41 = "是，是這樣，嗎……？"
2001103-42 = "是，是這樣，嗎……？"
2001103-43 = "嗚哇啊啊！媽媽，爸爸！在哪裡呀！？"
2001103-44 = "那是，迷路的小孩嗎……？"
2001103-45 = "[s] 「你看，馬上就輪到茜香出場的時候了唷！」"
2001103-50 = "咦，啊，嗯。那個……小朋友？你迷路了嗎？"
2001103-51 = "嗚嗚，不是……不是我迷路，是爸爸和媽媽迷路了……！"
2001103-52 = "那個……嗯，這樣啊。那你等一下喔。姊姊會幫你找迷路的爸爸媽媽的。"
2001103-53 = "不好意思──！這附近，"
2001103-54 = "有和小孩走散的父母嗎──！？"
2001103-60 = "原來你在這裡啊……！找你找了好久了！"
2001103-61 = "爸爸！"
2001103-62 = "太好了……謝謝你，巫女小姐。給你添麻煩了。"
2001103-63 = "啊，不會不會。沒事就好。"
2001103-64 = "巫女姊姊謝謝！還有，新年快樂──！"
2001103-65 = "嗯，新年快樂！今年的壞事已經都過去了，祝你今後一切順利。"
2001103-67 = "……呼。算是順利解決了，吧？"
2001103-68 = "[s] 「茜香，辛苦了！接下來是那邊……！」"
2001103-69 = "咦咦！等，等一下啊老師！？"
2001103-74 = "唉呦喂……久久爬了一次樓梯，我的腰就……"
2001103-76 = "那個，您沒事吧？"
2001103-77 = "哎呀，是巫女小姐。感謝你的關心，只是腰有點痛而已……"
2001103-78 = "啊，這樣的話，這邊有比較好走的坡道……"
2001103-79 = "哎呀哎呀，真是不好意思……哈！？"
2001103-80 = "怎，怎麼了嗎……！？"
2001103-81 = "巫，巫女摸到我的腰的瞬間，疼痛就消失不見了……！不愧是巫女，看來擁有神力呢！"
2001103-82 = "咦……？"
2001103-83 = "大家，快來看啊！這裡也有厲害的巫女小姐！"
2001103-85 = "（接著茜香的周圍開始出現了人群）"
2001103-88 = "巫女小姐！請在我抽御神籤之前，賜予我祝福吧……！"
2001103-89 = "呃，我這樣做沒問題嗎……總之就先……"
2001103-90 = "啊，那我想請巫女小姐幫我祈求這個遊戲的抽獎能夠順利！"
2001103-91 = "遊，遊戲？"
2001103-92 = "啊啊不，不如直接請您幫我抽吧！我相信巫女小姐！"
2001103-93 = "那，那種事就算你相信我也……！？"
2001103-94 = "[s] 「唔嗯……茜香願意的話，就幫幫他吧！」"
2001103-95 = "咦！？唔，唔嗯……"
2001103-96 = "麻煩您了！"
2001103-97 = "唔，唔唔唔唔……！結，結果會怎樣我可不管喔！"
2001103-98 = "呃，是要按這個嗎？咦，要寫字嗎？這，這樣嗎……？"
2001103-101 = "哦哦，這個是……"
2001103-103 = "普通，啊……謝謝您。果然現實是殘酷的呢。就當作是運氣沒有用在這裡吧……巫女小姐幫我抽的這孩子我會好好照顧他的……"
2001103-104 = "你這樣說我會覺得很抱歉的啊！？"
2001103-106 = "（之後，不知道過了多久……）"
2001103-108 = "……那邊的小姐，妳看起來非常有成為巫女的才能。要和我們簽約，成為巫女界的專家嗎？"
2001103-109 = "呃，不是，我還沒想到那種程度……"
2001103-110 = "拜託你了！請務必，務必助我們一臂之力……！"
2001103-111 = "咦咦！？等等，老師救救我啊！？"
2001103-116 = "啊──，總覺得好累……"
2001103-120 = "一口氣忙成這樣確實吃不消……"
2001103-121 = "而且還有很多事情沒做好……"
2001103-122 = "[s] 「但是，也有很多做得很好的事情哦。辛苦啦！」"
2001103-123 = "……那是怎樣，好像在挖苦我一樣。"
2001103-124 = "但是……嗯，謝謝。"
2001103-125 = "多虧老師那時候鼓勵了我……"
2001103-126 = "……又受到老師的幫助了。"
2001103-127 = "謝謝你總是幫助我，老師。"
2001103-128 = "[s] 「如果是為了茜香的話，不管什麼事我都願意哦。」"
2001103-129 = "哼嗯，隨便就說出這種話沒問題嗎？「不管什麼事」都願意的話，是不管我提出什麼要求你都會聽的意思對吧？"
2001103-130 = "[s] 「嗯，如果是茜香拜託我的話。」"
2001103-131 = "……！"
2001103-133 = "這～個老師，又說那種話……"
2001103-134 = "[s7] 「所以不用客氣，隨時都能跟我說。」\n[s8] 「我會幫助你成為巫女界的專家的！」"
2001103-135 = "……蛤？"
2001103-136 = "……蛤？"
2001103-137 = "啊啊真是的，還以為你要說什麼呢……"
2001103-138 = "……什麼嘛，你真怪。"
2001103-139 = "真是的，像笨蛋一樣。"
2001103-141 = "（之後在一旁看著努力的茜香直到最後）"

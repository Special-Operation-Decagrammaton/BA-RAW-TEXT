80000038-29 = "[ns3] \"탄환 모양의 초콜릿?\"\n[ns4] \"러시안…… 룰렛 초콜릿……?\""
80000038-30 = "3;무츠키;01;쿠후훗, 맞아! 얼마 전에 인터넷을 검색하다가 재미있어 보이는 물건이 있길래, 바로 사버렸지롱~!\n#3;em;[재잘]\n#3;a"
80000038-31 = "3;무츠키;01;쿠후훗, 맞아! 얼마 전에 인터넷을 검색하다가 재미있어 보이는 물건이 있길래, 바로 사버렸지롱~!\n#3;em;[재잘]\n#3;a"

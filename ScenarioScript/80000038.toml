[translation]
80000038-1 = "俄羅斯輪盤巧克力！"
80000038-2 = "（收到無月的聯絡後，久違地來到了便利屋68的事務所）"
80000038-8 = "嘎哦────！"
80000038-14 = "[ns]「無月！？」"
80000038-16 = "呀哈哈哈！嚇到了嗎，老師？"
80000038-17 = "在我面前露出破綻可不行唷～？"
80000038-18 = "那樣說不定會被無月醬吃掉哦！"
80000038-19 = "咯呵呵，以後要小～心一點才行唷？"
80000038-20 = "[s1]「說的對……」\n[s2]「話說，今天有什麼事……？」"
80000038-21 = "嗯，今天之所以找老師來～"
80000038-22 = "嗯，今天之所以找老師來～"
80000038-23 = "鏘～！是想一起玩遊戲！"
80000038-29 = "[ns3]「這是，彈巢造型的巧克力……？」\n[ns4]「俄羅斯輪盤……的巧克力？」"
80000038-30 = "嗯哼，是之前在網路上找到的，看起來很好玩所以就買了！！"
80000038-31 = "嗯哼，是之前在網路上找到的，看起來很好玩所以就買了！！"
80000038-32 = "這就是俄羅斯輪盤巧克力！"
80000038-33 = "而且今天正好是情人節對吧？我想和老師一起玩這個！"
80000038-34 = "我超期待的！"
80000038-35 = "老師會陪我玩的對吧，對吧對吧？"
80000038-36 = "[s5]「想玩的心情當然是有……」\n[s6]「可是俄羅斯輪盤有點可怕……」"
80000038-37 = "啊哈，不用那麼害怕的唷～"
80000038-38 = "啊哈，不用那麼害怕的唷～"
80000038-43 = "規則很簡單。這6個巧克力之中有超辣的巧克力。"
80000038-44 = "[s]「我看看，盒子上寫說6個裡面有2個是辣的。」"
80000038-45 = "嗯。所以老師跟我各拿一半的巧克力，"
80000038-46 = "吃到辣的人就輸了！"
80000038-47 = "怎麼樣？感覺很有趣吧？"
80000038-48 = "[s]「明明是情人節，為什麼會覺得這麼害怕……」"
80000038-49 = "老師是大人，應該不會臨陣脫逃吧？"
80000038-50 = "[s]「這，這個嘛……」"
80000038-51 = "當然，考慮到無月醬至今為止的勝率，老師會害怕也沒辦法～"
80000038-52 = "嗯～老師不願意玩的話也沒辦法～"
80000038-53 = "那今天就放過你吧。老師的運氣真好呢對吧？"
80000038-54 = "[s]「我，我可還沒說過要逃跑……！」"
80000038-55 = "咯呵呵！這才是我認識的老師！"
80000038-60 = "好，那就讓老師先選3個吧。"
80000038-61 = "畢竟是我買來的，讓老師先選才公平對吧？"
80000038-62 = "[s]「原來如此，確實如此。那就……」"
80000038-64 = "（選擇了3個巧克力）"
80000038-66 = "咯呵呵，那數到三後一口氣吃掉哦？"
80000038-67 = "究～竟誰會贏呢～？"
80000038-69 = "一～二～"
80000038-70 = "三！"
80000038-75 = "[ns]「……！？！？」"
80000038-79 = "[ns7]「咳咳……！！」\n[ns8]「怎麼3個都是辣的！？」"
80000038-80 = "噗……咯呵呵……"
80000038-81 = "噗……咯呵呵……"
80000038-82 = "啊哈哈哈！！是我贏了──！咯呵呵♪"
80000038-83 = "那是因為～"
80000038-84 = "我事先買了三盒，全部打開後把辣的6個巧克力全都放進去了呀！"
80000038-85 = "也就是說，這個遊戲實際上是先吃巧克力的人就輸了！啊哈哈！"
80000038-86 = "[s]「中，中計了……！」"
80000038-87 = "咦～？可是我從頭到尾都只有說「6個之中有超辣巧克力」而已唷？"
80000038-88 = "可沒說過只有2個是辣的。"
80000038-89 = "老師說「盒子上是這麼寫的」的時候，我也只回答「嗯」而已呀。"
80000038-90 = "[s]「……竟然從一開始就是為了誤導我！？」"
80000038-91 = "啊哈哈，又是我贏了呢！"
80000038-92 = "唔嗯，事到如今真是有點害怕自己的才能……咯呵呵！"
80000038-93 = "[s]「……」"
80000038-94 = "咦，老師怎麼了嗎？"
80000038-95 = "那個，難道是太辣了？應該也沒有那麼辣才對啊……"
80000038-96 = "[s]「遊戲，還沒有結束！」"
80000038-97 = "……老師？那個，你的眼神有點可怕……？"
80000038-98 = "[s9]「來，這是無月的那份。」\n[s10]「規則上可沒有寫有人吃到辣的巧克力就結束……」"
80000038-99 = "咦，這，這個嘛……"
80000038-100 = "咦，這，這個嘛……"
80000038-105 = "呀啊～！要被老師吃掉了──！"
80000038-106 = "老師不要～！！"
80000038-107 = "[s]「無月！？等等，那樣會被誤會的！？」"
80000038-108 = "咯呵呵，有破綻！"
80000038-112 = "我果然很喜歡老師慌張的表情呢～！"
80000038-113 = "嗯，今天也玩得很開心！掰掰囉～咯呵呵！"
80000038-114 = "啊，剩下的兩盒巧克力放在那邊哦。是我送老師的禮物！"
80000038-115 = "下次再一起玩吧，老師！"
80000038-119 = "[ns]「完全輸給他了……」"
80000038-121 = "（無月留下的巧克力，就連辣的也意外的好吃）"

80000038-33 = "3;무츠키;01;마침 오늘이 발렌타인 데이이기도 하고? 선생님이랑 이걸 가지고 같이 놀아볼까~ 해서 말이야~!\n#3;em;[반짝]"
80000038-34 = "3;무츠키;10;무츠키 쨩은, 선생님이랑 노는 오늘만을 애타게 기다려왔거든~!"

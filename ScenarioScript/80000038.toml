80000038-45 = "3;무츠키;10;흐응~ 그러니까 선생님이랑 나, 둘이서 각각 초콜릿을 절반씩 나눠 가진 다음\n#3;greeting"
80000038-46 = "3;무츠키;11;그걸 먹고 매운맛을 먹게 된 사람이 당첨! 지게 되는 거야~!\n#3;em;[음표]"
80000038-47 = "3;무츠키;01;어때? 이름하야 초 러시안 룰렛 게임! 재밌어 보이지 않아?!\n#3;hophop"
80000038-48 = "[s] \"어째서 발렌타인 데이에 이런 무자비한 게임을…….\""
80000038-49 = "3;무츠키;07;뭐야~ 선생님, 시작하기도 전부터 발을 빼는 거야~? 그러고도 어른이라고 할 수 있어?\n#3;em;[!]\n#3;jump"
80000038-50 = "[s] \"잠깐, 뭣이라?!\""

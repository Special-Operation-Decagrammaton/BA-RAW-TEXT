[translation]
80000038-1 = "ความเผ็ชของน้องเค้า"
80000038-2 = "(คุณครูได้รับข้อความจากมุสึกิ จึงแวะมาที่สำนักงานของหน่วยรับจ้างสารพัด)"
80000038-8 = "อ่ะฮ่า~ เดี๋ยว-จะ-ถูก-จับ-กิน-เอา-น้า~!"
80000038-14 = "[ns] \"ดะ...เดี๋ยวก่อน?! มุสึกิ!\""
80000038-16 = "ฮะฮะฮ่าฮ่า! คุณครูตกใจเหรอ?!"
80000038-17 = "ถ้างั้นก็ควรลดการ์ดลงตอนอยู่ต่อหน้าเค้าสิ~"
80000038-18 = "ไม่งั้นอาจโดนมุสึกิจังคนนี้จับกินได้ในพริบตาเลยน้า~!"
80000038-19 = "คิกๆ ต่อไปก็...ระ~วัง~ตัว~น้า! คิคิคิกๆ"
80000038-20 = "[s1] \"อื้อ... ครูจะระวังมากๆ เลย\"\n[s2] \"แล้วเรียกครูมามีอะไรเหรอ?\""
80000038-21 = "อ๋า~ ที่เค้าเรียกคุณครูมา~"
80000038-22 = "อ๋า~ ที่เค้าเรียกคุณครูมา~"
80000038-23 = "อื้อ! เพื่อมาเล่นเกมด้วยกันไง เกมนี้!"
80000038-29 = "[ns3] \"ช็อกโกแลตรูปกระสุน?\"\n[ns4] \"ช็อกโกแลต...รัสเซียนรูเล็ต...?\""
80000038-30 = "คิกๆ ถูกต้อง! ก่อนหน้านี้เค้าเล่นเน็ตแล้วเห็นว่าน่าสนุกดี ก็เลยซื้อมาเล่นน่ะ~!"
80000038-31 = "คิกๆ ถูกต้อง! ก่อนหน้านี้เค้าเล่นเน็ตแล้วเห็นว่าน่าสนุกดี ก็เลยซื้อมาเล่นน่ะ~!"
80000038-32 = "เกมช็อกโกแลต รัสเซียนรูเล็ตชื่อดังไงล่ะ~!"
80000038-33 = "แล้ววันนี้ก็เป็นวันวาเลนไทน์ด้วย เค้าเลยชวนคุณครูออกมาเล่นด้วยกัน~!"
80000038-34 = "มุสึกิจังรอวันที่จะได้เล่นสนุกกับคุณครูมาตลอดเลยน้า~"
80000038-35 = "ดีใจใช่มั้ยล่ะคุณครู? มาเล่นกับเค้าเถอะน้า นะๆ นะ~?"
80000038-36 = "[s5] \"มุสึกิพูดแบบนั้นครูก็ดีใจอยู่หรอกนะ...\"\n[s6] \"รัสเซียนรูเล็ตมันน่ากลัวมากนะ...\""
80000038-37 = "อ่ะฮ่า~ ไม่ต้องกลัวหรอก"
80000038-38 = "อ่ะฮ่า~ ไม่ต้องกลัวหรอก"
80000038-43 = "กติกาการเล่นก็ง่ายๆ เลย ช็อกโกแลตที่วางอยู่ตรงนี้ 6 ชิ้น มีชิ้นที่ผสมพริกรสเผ็ดจัดจ้านเอาไว้~"
80000038-44 = "[s] \"ถ้าตามที่เขียนไว้ที่กล่องคือมี 2 ชิ้นจาก 6 ชิ้นสินะ\""
80000038-45 = "หืมม~ ถ้างั้นครูกับเค้าก็แบ่งช็อกโกแลตกันคนละครึ่ง"
80000038-46 = "จากนั้นคนที่กินช็อกโกแลตแล้วเจออันที่มีรสเผ็ดก็จะเป็นฝ่ายแพ้!"
80000038-47 = "เป็นยังไง? ดูน่าสนุกสมกับเป็นเกมรัสเซียนรูเล็ตเลยใช่มะ?"
80000038-48 = "[s] \"ทำไมถึงชวนเล่นเกมโหดๆ แบบนี้ในวันวาเลนไทน์นะ...\""
80000038-49 = "อะไรเล่า~ ป๊อดตั้งแต่ยังไม่เริ่มเลยเหรอ~? แบบนี้จะเรียกว่าเป็นผู้ใหญ่ได้ยังไงกัน?"
80000038-50 = "[s] \"เดี๋ยวเหอะ?!"
80000038-51 = "อ๊ะ ก็แน่สิน้า~ เค้าเล่นเกมแบบนี้ชนะได้สบายๆ อยู่แล้ว~ ไม่แปลกหรอกที่คุณครูจะกลัวตั้งแต่ยังไม่#nทันได้เริ่มเล่นน่ะ "
80000038-52 = "คิกๆๆ ช่วยไม่ได้นะ~ เค้าเข้าใจที่คุณครูจะป๊อดแบบนี้"
80000038-53 = "อื้อ มุสึกิจังเห็นใจคุณครูถึงขนาดนี้แล้ว ถือซะว่าโชคดีแล้วกันน้า คุณครู?"
80000038-54 = "[s] \"เด็กคนนี้! ก็ได้! ครูยอมรับคำท้าเล่นเกม!\""
80000038-55 = "วะฮะฮะฮ่า~! ต้องแบบนี้สิถึงจะสมกับเป็นคุณครู~! อื้อ!"
80000038-60 = "เอาล่ะ คุณครูเลือกช็อกโกแลตจากตรงนี้ไปสามชิ้น"
80000038-61 = "ถ้าให้เค้าเป็นฝ่ายเลือกก่อนเดี๋ยวคุณครูจะสงสัยว่าเค้าเล่นตุกติกอะไรอีก เพราะงั้นเค้าให้ครูเลือก#nก่อนแล้วกัน"
80000038-62 = "[s] \"คงเป็นแบบนั้นแหงๆ ถ้างั้นจะเลือกละนะ...!\""
80000038-64 = "(คุณครูเลือกช็อกโกแลตก่อนสามชิ้น)"
80000038-66 = "คิกคิก ถ้างั้นคราวนี้ตาเค้า... พอนับสามแล้วมากินพร้อมกันเลยนะ"
80000038-67 = "เอ้า~ ใครจะแพ้ ใครจะชนะกันน้า~!"
80000038-69 = "หนึ่ง~ สอง~"
80000038-70 = "สาม!"
80000038-75 = "[ns] \"...?!?!\""
80000038-79 = "[ns7] \"แค่กๆๆ...!!\"\n[ns8] \"ช็อกโกแลตทั้งสามอัน... มันเผ็ดหมดเลยนี่นา อะไรกันเนี่ย?\""
80000038-80 = "ฮิฮิ... ฮิ..."
80000038-81 = "ฮิฮิ... ฮิ..."
80000038-82 = "วะฮ่ะฮ่ะฮ่าฮ่า!! คุณครู! ถูกเค้าหลอกอีกแล้ว! ฮะฮะฮ่าฮ่า!!"
80000038-83 = "อ๊ะ ทำไมช็อกโกแลตที่คุณครูเลือกถึงมีรสเผ็ดทั้งสามอันน่ะเหรอ? แหมๆ~~"
80000038-84 = "ที่จริงเค้าแอบแกะหลายๆ กล่องมาแล้วก็เอาช็อกโกแลตรสเผ็ดมาไว้ทั้งหมดหกชิ้นเลยไงล่ะ~!"
80000038-85 = "กติกาที่แท้จริงของเกมนี้ก็คือใครกินช็อกโกแลตก่อนเป็นฝ่ายแพ้! มันเป็นเกมที่น่ากลัวมากๆ เลยน้า~! นี่ไง!"
80000038-86 = "[s] \"ดะ...โดนต้มจนเปื่อยอีกแล้ว!\""
80000038-87 = "โดน~ หลอก~ แล้ว~ เค้าบอกแค่ว่าในช็อกโกแลตหกชิ้นมีช็อกโกแลตที่ผสมพริกรสเผ็ดไว้"
80000038-88 = "เค้าไม่ได้พูดซะหน่อยว่าจะมีแค่สองชิ้นน่ะ"
80000038-89 = "เค้าพูดไปแค่นั้นแล้วคุณครูเข้าใจผิดไปเองต่างหากล่ะ"
80000038-90 = "[s] \"ปะ...เป็นแผนการที่วางเอาไว้แต่แรกแล้วงั้นเรอะ?!\""
80000038-91 = "ฮ่าฮ่าฮ่า~! คราวนี้ก็ชนะได้ง่ายๆ เลย"
80000038-92 = "อืมมม~ พอเห็นแบบนี้ เค้าก็ชักกลัวพรสวรรค์ของตัวเองซะแล้วสิเนี่ย~! เก่งจนน่ากลัวเลย อ่ะฮะฮะ!"
80000038-93 = "[s] \"...\""
80000038-94 = "หืม? ทำไมเงียบไปล่ะ คุณครู?"
80000038-95 = "อ๊ะ หรือว่าเผ็ดเกินไปเหรอ? มันไม่น่าจะเผ็ดขนาดนั้นเลยนี่นา หรือว่า--"
80000038-96 = "[s] \"ไม่... เกมยังไม่จบซะหน่อย...\""
80000038-97 = "เอ๋? คุณครู...? ทำไมทำหน้าน่ากลัวแบบนั้นล่ะ... นี่~~?"
80000038-98 = "[s9] \"เอ้า มุสึกิ... กินช็อกโกแลตที่เอาไปสามชิ้นซะสิ\"\n[s10] \"ต้องทำตามกติกา เกมถึงจะได้สมบูรณ์นะ\""
80000038-99 = "หาา?! เดี๋ยวสิ เค้าบอกไปแล้วนี่ว่ากติกาไม่ได้บังคับให้กิน..."
80000038-100 = "หาา?! เดี๋ยวสิ เค้าบอกไปแล้วนี่ว่ากติกาไม่ได้บังคับให้กิน..."
80000038-105 = "อ๊าย~! คุณครูจะจับเค้ากินแล้วววว~!"
80000038-106 = "ทำแบบนั้นตรงนี้ไม่ได้นะ คุณครู~!"
80000038-107 = "[s] \"มะ...มุสึกิ!? เดี๋ยวใครได้ยินก็เข้าใจผิดหรอก!\""
80000038-108 = "อ๊ะ คุณครูเผลอแล้ว~! ฮิฮิ!"
80000038-112 = "คิกๆๆ~! หน้าคุณครูตอนเหวอ ฮ่าฮ่า~! เค้าชอบมากเลย!"
80000038-113 = "วันนี้เค้าสนุกมากเลย~! คิกๆๆ หนีแล้วน้าาา~!"
80000038-114 = "เค้าไปก่อนนะ~! ช็อกโกแลตที่เหลือ เค้าให้เป็นของขวัญนะคุณครู~!"
80000038-115 = "เอาไว้มาเล่นกันใหม่น้าาา คุณครู~!"
80000038-119 = "[ns] \"อึ่ก! แพ้อีกแล้ว...\" "
80000038-121 = "(ช็อกโกแลตรัสเซียนรูเล็ตที่มุสึกิทิ้งเอาไว้... คุณครูรู้สึกว่ามันอร่อยและรู้สึกติดใจอย่างประหลาด)"

[translation]
10015070-1 = "ตอนที่7;งานมหกรรมแข่งขันกีฬาสำหรับทุกคน"
10015070-7 = "ชมรมวิศวกรรมเรียก เราถอดแบตเตอรี่และชิ้นส่วนหลักของหุ่นยนต์เชียร์ออกแล้ว"
10015070-8 = "ลวดที่ติดอยู่ที่สายพานก็แกะออกหมดแล้วด้วย แค่ปรับเปลี่ยนโปรแกรมและอุปกรณ์นิดหน่อยก็ใช้งาน#nได้แล้วละ"
10015070-9 = "เวอริทัสตอบ จับกุมผู้นำของเหตุการณ์นี้ได้ทุกคนแล้ว..."
10015070-10 = "แต่เพราะ 'การฝึกพิเศษ' ของ <ชมรมออกกำลังกาย> ตอนนี้ทุกคนเลยน่าจะยืนไม่ไหวกันแล้วน่ะ..."
10015070-11 = "...คิดว่ายังไงคุณครูคงต้องมาทางนี้หน่อยแล้วละค่ะ"
10015070-15 = "[ns] \"เกิดเรื่องอะไรขึ้นเหรอ...?\""
10015070-16 = "ฮุฮุ โล่งอกไปทีนะคะที่จัดการได้โดยที่ไม่มีใครได้รับบาดเจ็บสาหัส"
10015070-17 = "ถึงจะมีวัสดุที่ต้องใช้ในงานมหกรรมแข่งขันกีฬาเสียหายไปบางส่วนก็เถอะค่ะ..."
10015070-23 = "ก่อนอื่นเราไปฟังเรื่องจากนักเรียนที่เป็นตัวการของเรื่องนี้กันดีมั้ยคะ?"
10015070-25 = "อึก เจ็บใจชะมัด... ล้มเหลวไม่เป็นท่าเลย..."
10015070-27 = "แต่ว่าพวกเรา <ก.ต.ฮ.> ไม่ยอมแพ้แค่นี้หรอกนะ!"
10015070-29 = "ใช่แล้ว! หลังจากเริ่มงานมหกรรมแข่งขันกีฬาพวกเราก็จะตามขัดขวางอีกให้ได้เลย!"
10015070-30 = "...เป็นพวกกัดไม่ปล่อยสินะ สู้กันต่อไปแบบนี้แล้วคิดว่าจะได้อะไรขึ้นมางั้นเหรอ?"
10015070-31 = "ใช่แล้ว ขืนสู้กันต่อไปแบบนี้มันก็ไม่มีค่าอะไร มีแต่จะปวดหัวกันเปล่าๆ!"
10015070-33 = "ถึงฉันจะไม่อยากใช้วิธีที่โหดร้ายเพราะงานเทศกาลที่กำลังจะมาถึง..."
10015070-34 = "แต่ถ้าเจ้าพวกนี้พยายามจะคุกคามความปลอดภัยของโรงเรียนมิลเลเนียมต่อไป ก็คงต้องกักตัวเอาไว้#nระหว่างที่จัด <ฮาโลเฟสติวัล> นั่นละนะ"
10015070-41 = "[ns] \"รอเดี๋ยวสิ จิฮิโระ\""
10015070-43 = "หืม...? ครูจากชาเล่ต์เหรอ?"
10015070-44 = "จู่ๆ จะทำอะไรน่ะ... คิดจะเทศนากันรึไง?"
10015070-45 = "[s] \"ทำไมพวกเธอถึงไม่อยากให้จัดงานมหกรรมแข่งขันกีฬาล่ะ?\""
10015070-46 = "แน่นอนก็เพราะว่า..."
10015070-47 = "การเล่นกีฬามันไม่สนุกเลยสักนิดไงเล่า!"
10015070-49 = "การเล่นกีฬา... ไม่สนุกงั้นเหรอ?"
10015070-50 = "จะบอกว่าการขยับเขยื้อนร่างกายให้เหงื่อไหลจนรู้สึกสดชื่นมันไม่สนุกงั้นเหรอ... ไม่อยากจะเชื่อเลยค่ะ"
10015070-52 = "คนที่รู้สึกแบบนั้นมันก็มีแต่พวกที่เล่นกีฬาเก่งแบบพวกเธอน่ะสิ!"
10015070-53 = "สำหรับคนที่เล่นกีฬาไม่ได้เรื่องแบบพวกเรา คาบพละมันก็ไม่ต่างอะไรไปกับช่วงเวลาแห่งการทรมานตน#nหรอก!"
10015070-54 = "ไหนจะต้องออกไปทำกายบริหารแบบเงอะงะต่อหน้านักเรียนคนอื่นจนกลายเป็นตัวตลกอีก..."
10015070-55 = "ถ้าเกิดทำพลาดระหว่างที่เล่นเกมหรือแข่งกีฬาก็ต้องโดนเพื่อนๆ มองมาด้วยสายตาที่เจ็บแสบ..."
10015070-56 = "สุดท้ายแล้วคนที่เล่นกีฬาไม่เก่งอย่างพวกเรา ก็ทำได้แค่นั่งมองคนอื่นเตะบอลกันอย่างสนุกก็เท่านั้น"
10015070-57 = "ถ้าจะให้ไปนั่งเสียเหงื่อเปล่าๆ แบบนั้น สู้เอาเวลาไปทำอย่างอื่นยังดีซะกว่า"
10015070-59 = "...เวลาทำกิจกรรมคาบพละก็ชอบให้จับกลุ่มกับคนอื่นด้วยค่ะ"
10015070-60 = "อีกอย่างคาบพละก็มักจะตึงเครียดเพราะต้องคอยระมัดระวังไม่ให้บาดเจ็บ ฉันก็มีความทรงจำที่ไม่ดีกับ#nคาบพละเยอะอยู่เหมือนกัน..."
10015070-62 = "แต่ถึงจะเป็นแบบนั้น การจะไปขัดขวางสิ่งที่คนอื่นเค้าชอบกันน่ะ มันก็คนละเรื่องกันอยู่ดีนะ"
10015070-63 = "แล้วยิ่งงานมหกรรมแข่งขันกีฬาครั้งนี้เป็นเทศกาลที่หลายๆ คนทุ่มเททำงานกันอย่างหนัก พวกเธอเอง#nก็รู้อยู่แก่ใจไม่ใช่รึไง?"
10015070-64 = "ก็พอจะรู้มาว่าดันทุรังกันแค่ไหนอยู่หรอก..."
10015070-68 = "...แล้วทำไมต้องมาจัดฮาโลเฟสติวัลที่โรงเรียนมิลเลเนียมด้วยล่ะ"
10015070-69 = "[s] \"มีปัญหากับการจัดงานมหกรรมแข่งขันกีฬาที่โรงเรียนมิลเลเนียมเหรอ?\""
10015070-70 = "ก็โรงเรียนวิทย์มิลเลเนียมเป็นโรงเรียนที่มีนักเรียนสายวิทยาศาสตร์อยู่ตั้งเยอะ..."
10015070-71 = "ต่อให้บอกว่าไม่ชอบออกกำลังกายก็คงไม่มีใครมองว่ามันเป็นเรื่องแปลก แล้วก็ไม่โดนกีดกันออกจาก#nกลุ่มแค่เพราะเล่นกีฬาไม่เก่งด้วย"
10015070-72 = "แล้วถ้าการเป็นเจ้าภาพงานมหกรรมแข่งขันกีฬาครั้งนี้ ทำให้นักเรียนโรงเรียนมิลเลเนียมหันไปสนใจ#nเรื่องการเล่นกีฬามากขึ้นละก็..."
10015070-73 = "นักเรียนที่สมรรถภาพทางกายต่ำเตี้ยเรี่ยดินแบบพวกเราก็คงไม่มีใครคบ แล้วก็คงโดนดูถูกเพราะเล่น#nกีฬาไม่เก่งน่ะสิ"
10015070-74 = "เหมือนโรงเรียนสมัยม.ต้นที่มีนักเรียนชอบเล่นกีฬาอยู่เยอะ..."
10015070-76 = "...ดูเหมือนว่าจะกำลังเข้าใจผิดกันอยู่นะคะ"
10015070-77 = "การเล่นกีฬาไม่ได้วัดคุณค่ากันที่แพ้หรือชนะหรอกนะคะ"
10015070-78 = "แน่นอนค่ะว่าแต่ละคนก็มีสภาพแวดล้อมและเงื่อนไขทางร่างกายที่แตกต่างกัน"
10015070-79 = "ยิ่งไปกว่านั้นการแบ่งแยกและกลั่นแกล้งคนอื่นแค่เพราะว่ามีสภาพร่างกายที่ต่างกัน นั่นเป็นการละเมิด#nจิตวิญญาณของกีฬานะคะ!"
10015070-80 = "แต่ก็ไม่ได้หมายความว่ามันจะไม่มีการจัดอันดับไม่ใช่รึไง?"
10015070-84 = "เรี่ยวแรงแบบพวกเราเนี่ย อย่างมากก็ทำได้แค่วิ่งรั้งท้ายในการแข่งวิ่งผลัดหรือไม่ก็ไปล้มหน้าคว่ำตอน#nที่กำลังไล่ตามลูกบอลเท่านั้นแหละ..."
10015070-88 = "จะมีสักกี่คนกันล่ะที่อยากไปโชว์สภาพแบบนั้นต่อหน้านักเรียนจากโรงเรียนอื่นๆ น่ะ?"
10015070-89 = "พวกเราไม่อยากจะโดนล้ออีกต่อไปแล้วนะ..."
10015070-91 = "ก็จริงอย่างที่ว่านะคะ..."
10015070-96 = "[ns] \"โนอา ตอนนี้ยังพอจะปรับโปรแกรมการแข่งขันบางส่วนได้รึเปล่า?\""
10015070-97 = "ก็พอจะปรับได้อยู่หรอกนะคะ..."
10015070-98 = "ว่าแต่คุณครูตั้งใจจะปรับด้วยวิธีไหนเหรอคะ?"
10015070-99 = "[s] \"ยกตัวอย่างเช่น...\""
10015070-105 = "แบบนี้นี่เอง... ปรับการแข่งโดยเพิ่มหุ่นยนต์กีดขวางที่ไม่สามารถเอาชนะได้ด้วยกำลังหรือไม่ก็ใส่#nปริศนาเชิงตรรกะเข้าไปในการแข่งวิ่งผลัดสินะคะ"
10015070-106 = "เป็นข้อเสนอที่ไม่เลวเลยนะ"
10015070-107 = "ถ้าเป็นแบบนี้นักเรียนที่มีสมรรถภาพทางกายด้อยกว่าก็มีโอกาสที่จะพลิกกลับมาชนะได้ และถ้าเป็น#nการแข่งขันที่คาดเดาผลแพ้ชนะได้ยากแบบนี้ ผู้ชมก็น่าจะสนุกมากขึ้นด้วย"
10015070-108 = "...ถ้าทำแบบนั้นแล้วได้แสดงเทคโนโลยีใหม่ของมิลเลเนียมมากขึ้น ฉันก็เห็นด้วยเหมือนกัน"
10015070-114 = "ถ้างั้นก็เห็นด้วยค่ะ... เริ่มจากสั่งซื้อหุ่นยนต์ที่จะนำมาใช้เป็นสิ่งกีดขวางโดยด่วน และก็ติดต่อเพื่อขอ#nอนุญาตทางคณะกรรมการที่เกี่ยวข้องกับการแข่งขันค่ะ"
10015070-120 = "แล้วก็ปรับเปลี่ยนรายชื่อนักกีฬาไปตามเงื่อนไขหรือความพอใจของนักกีฬาในวันนั้น..."
10015070-121 = "หลังจากจบงานมหกรรมแข่งขันกีฬาแล้ว เราก็จะจัดตั้งแผนกให้คำปรึกษาเพื่อให้คำแนะนำสำหรับ#nนักเรียนที่ต้องเจ็บปวดกับกิจกรรมกีฬาค่ะ"
10015070-125 = "...ทุกคนมีความเห็นว่ายังไงบ้างคะ ถ้าเราจะปรับเปลี่ยนแบบนี้?"
10015070-126 = "ถะ... ถ้าจะทำถึงขนาดนั้น เราก็ไม่มีอะไรจะแย้งหรอกนะ..."
10015070-127 = "แต่พิธีเปิดงานมหกรรมแข่งขันกีฬาก็คือวันพรุ่งนี้แล้วไม่ใช่เหรอ?"
10015070-128 = "ถ้าเริ่มเตรียมตอนนี้จะเสร็จทันพิธีเปิดใช่มั้ย?"
10015070-129 = "...ไม่ทันก็ต้องทันค่ะ"
10015070-130 = "อย่างที่บอกไปว่า <งานมหกรรมแข่งขันกีฬา> จัดขึ้นเพื่อให้นักเรียนจากทั่วคิโวทอสได้มาสนุกด้วยกัน เป็นงานเทศกาลของทุกคนค่ะ"
10015070-131 = "เพราะฉะนั้น ถ้ามีนักเรียนที่รู้สึกไม่ดีกับเทศกาลครั้งนี้ ฉันก็จำเป็นที่จะต้องทำตาม 'หน้าที่ของเลขาที่#nสมบูรณ์แบบ' ยังไงล่ะคะ"
10015070-132 = "การแก้ไขปัญหาและรับฟังความลำบากของเหล่านักเรียนที่เดือดร้อน..."
10015070-133 = "คือความรับผิดชอบของ [ruby=เซมิน่า]<สภานักเรียน>[/ruby] ค่ะ"
10015070-154 = "...ถึงจะดูหน้าไม่อาย แต่พวกเราก็จะช่วยด้วยอีกแรงนะ"
10015070-155 = "ไม่สิ ให้พวกเราช่วยด้วยเถอะ!"
10015070-156 = "ให้พวกเราได้ชดใช้ความเสียหายที่ทำลงไป สักนิดก็ยังดี..."
10015070-157 = "ต่อให้ต้องใช้แรงงานก็จะทำเต็มที่เลย!"
10015070-159 = "งานที่ต้องใช้แรงงานก็ให้หุ่นยนต์ทำไม่ดีกว่าเหรอ?"
10015070-160 = "การสร้างหุ่นยนต์เป็นงานของชมรมวิศวกรรม พวกเราจะรับหน้าที่ซ่อมหุ่นยนต์ที่เสียหายเองค่ะ!"
10015070-162 = "ถึงจะไม่มีงานอะไรที่จะให้ทางเวอริทัสช่วยเหลือได้อีกก็เถอะนะ..."
10015070-163 = "แต่ดูเหมือนว่าสมาชิกของเราจะเริ่มสนใจกิจกรรมกีฬากันอยู่นะ เพราะงั้นเราจะให้ความร่วมมือต่ออีก#nหน่อยแล้วกัน"
10015070-164 = "ฉันก็ดื่มเครื่องดื่มชูกำลังมากไปจนนอนไม่หลับอยู่พอดี..."
10015070-165 = "ถ้าเป็นเรื่องมาโครสำหรับประมวลข้อมูลละก็ ฉันช่วยได้ทุกเมื่อค่ะ"
10015070-166 = "ฮุฮุ ถ้าจะทำสิ่งกีดขวางขึ้นมาใหม่ก็คงมีสีให้ต้องระบายเยอะเลยสินะ?"
10015070-167 = "เป็นโอกาสดีเชียวละที่ฉันจะได้ระเบิดจิตวิญญาณศิลปะอย่างเต็มที่!"
10015070-169 = "งั้นพวกเราขอไปเปลี่ยนชุดที่สะดวกต่อการลงมือซ่อมมากกว่านี้ก่อนนะ..."
10015070-170 = "ไม่ต้องหรอก ยังไงงานมหกรรมแข่งขันกีฬาครั้งนี้ หน้าที่ของพวกเราก็คือกองเชียร์อยู่แล้ว"
10015070-172 = "เรื่องซ่อมแซมปล่อยให้เป็นหน้าที่ของเจ้าสายฟ้ากับหุ่นยนต์ช่วยเหลือ ส่วนพวกเราก็ใช้เวลาที่เหลือกับ#nการซ้อมเชียร์กันเถอะ!"
10015070-174 = "นั่นสิคะ หุ่นยนต์ของมิลเลเนียมส่วนมากก็มีฟังก์ชันซ่อมแซมตัวเองเป็นพื้นฐานอยู่แล้ว"
10015070-175 = "เราแค่กู้คืนโปรแกรมซ่อมแซมตัวเองของหุ่นที่เสียหาย จากนั้นก็ให้หุ่นยนต์ช่วยเหลือเรียนรู้อัลกอริทึม#nการซ่อมแซม เท่านั้นก็น่าจะจัดการได้ไม่มีปัญหาค่ะ!"
10015070-176 = "ตะ... แต่ว่า... การเชียร์ก็ให้เป็นหน้าที่ของหุ่นยนต์ แล้วพวกเราก็กลับไปซ่อมอุปกรณ์เหมือนเดิมน่าจะมี#nประสิทธิภาพกว่ารึเปล่า...?"
10015070-177 = "ฮิบิกิเนี่ยไม่รู้อะไรเลยสินะ การเชียร์น่ะมันเป็นสิ่งที่ประเมินประสิทธิภาพไม่ได้หรอก"
10015070-178 = "คุณค่าของการเชียร์จากคนจริงๆ น่ะ ไม่มีอะไรมาแทนที่ได้หรอกนะ!"
10015070-179 = "ตะ... แต่ว่าชุดนี้มันไม่เหมาะสมเท่าไร... อีกอย่างพวกเราก็ไม่ได้ซ้อมเชียร์กันจริงๆ จังๆ ด้วย..."
10015070-180 = "เริ่มฝึกตอนนี้มันก็ยังไม่สายนี่"

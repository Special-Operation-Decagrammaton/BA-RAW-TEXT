[translation]
10015070-1 = "第7話;為大家舉辦的大運動會"
10015070-7 = "這裡是工程師部。#n已將停止的應援機器人的電池和核心零件拆除完畢。"
10015070-8 = "履帶上的鋼絲也都清理乾淨，只要稍微修改程式和裝備就能繼續使用。"
10015070-9 = "這裡是貝里塔斯。#n雖然已經把這次事件的主謀全數逮捕……"
10015070-10 = "但「訓練部」的「特別訓練」讓所有人都腿軟了……"
10015070-11 = "……老師可能得過來一趟才行。"
10015070-15 = "[ns]「究竟發生了什麼呢……？」"
10015070-16 = "呵呵，事件能在沒有人受傷的情況下落幕真是太好了。"
10015070-17 = "雖然有部分器材在騷動中遭到波及……"
10015070-23 = "先去聽聽引發這次事件的學生們怎麼說吧？"
10015070-25 = "嘖，真氣人……竟然失敗了……"
10015070-27 = "但我們「晄．反．會」不會就此放棄！"
10015070-29 = "沒錯！等大運動會開幕後，我們還是會繼續妨礙的！"
10015070-30 = "……真是群頑強的傢伙。#n你們這麼做究竟有什麼好處呢？"
10015070-31 = "就是說啊。#n繼續抵抗也只會讓大家受苦而已！"
10015070-33 = "盛大的慶典即將到來，我並不想使用粗暴的手段……"
10015070-34 = "但如果他們打算繼續威脅千年的安全，#n就只能在舉辦「晄輪大祭」的期間拘留他們了。"
10015070-41 = "[ns]「稍等一下，千尋。」"
10015070-43 = "……你是夏萊的老師嗎？"
10015070-44 = "怎麼……你打算在這個時間點說教嗎？"
10015070-45 = "[s]「你們為什麼反對舉辦大運動會呢？」"
10015070-46 = "那當然是因為……"
10015070-47 = "運動什麼的一點都不快樂！"
10015070-49 = "運動……一點都不快樂？"
10015070-50 = "活動身體並流下爽快的汗水，居然無法從中感到快樂……真是吃驚。"
10015070-52 = "只有像你們這種擅長運動的學生才會那樣覺得吧！"
10015070-53 = "對我們這種不擅長運動的學生來說，體育課根本就和酷刑沒有兩樣！"
10015070-54 = "在其他學生面前做著彆扭的體操，淪為大家的笑柄……"
10015070-55 = "在合作遊戲或運動競賽中稍有失誤，就會被周遭的人冷眼相待……"
10015070-56 = "像我們這種運動神經差的學生，終究就只能在大太陽底下看別人踢球而已。"
10015070-57 = "與其流著毫無意義的汗水，不如做其他事情會更好。"
10015070-59 = "……確實，體育活動大多是分組進行的。"
10015070-60 = "再加上體育課因為存在著受傷的風險，多半都是在嚴肅的氣氛下進行……#n我對體育課也有很多不好的回憶……"
10015070-62 = "但即便如此，一旦妨礙他人就另當別論了。"
10015070-63 = "這個大運動會是許多人付出努力才得以舉辦的慶典，你們應該也很清楚吧？"
10015070-64 = "我也知道這種理由很牽強……"
10015070-68 = "……為什麼偏偏要由千年舉辦晄輪大祭呢。"
10015070-69 = "[s]「在千年舉辦大運動會有什麼問題嗎？」"
10015070-70 = "千年科學學園本來就是理科生居多的學園……"
10015070-71 = "因此幾乎沒有人會因為厭惡體育而被投以異樣的眼光，#n也不會有人因為不擅長運動而被排擠。"
10015070-72 = "但如果因為這次的大會，使千年的學生也迷上運動的話……"
10015070-73 = "像我們這種運動神經較差的學生就會被冷落，從此被排擠吧。"
10015070-74 = "就像讀國中的時候一樣……"
10015070-76 = "……我想這可能有什麼誤會。"
10015070-77 = "運動的價值不單單只有勝負。"
10015070-78 = "每個人的成長環境不同，身體條件理所當然也會不一樣。"
10015070-79 = "藉由身體上的差異來歧視和欺負他人，反而才是違反了運動精神！"
10015070-80 = "話雖如此，還是會有排名吧？"
10015070-84 = "憑我們的體力，只會在接力賽時被拉開距離、在滾大球時出糗滑倒而已……"
10015070-88 = "在各校學生眾目睽睽的場合，誰會想展現自己是最後一名的狼狽模樣？"
10015070-89 = "我不想再變成被取笑的對象了……"
10015070-91 = "這麼說也沒錯……"
10015070-96 = "[ns]「乃愛，現在還能調整比賽項目的內容嗎？」"
10015070-97 = "雖然不是不可能……"
10015070-98 = "老師想要做什麼樣的調整呢？"
10015070-99 = "[s]「舉例來說……」"
10015070-105 = "……原來如此。#n在接力賽中加入僅憑體力無法跨越的機器人障礙物，或是邏輯益智遊戲等變數對吧？"
10015070-106 = "嗯，我覺得這個提議不錯。"
10015070-107 = "這樣的話，運動神經差的學生也有機會扭轉局勢……#n直到最後一刻都無法預測比賽的走向，觀眾們也會更開心。"
10015070-108 = "……除此之外，如果還能展現千年的新技術的話，那就更沒有理由反對了。"
10015070-114 = "那麼就對現行方案進行調整……#n緊急訂購障礙賽需要的機器人，並向實行委員會尋求同意。"
10015070-120 = "參賽選手名單則改為依照學生們當天的狀況或喜好做彈性調整……"
10015070-121 = "等大運動會結束後，我會設立諮詢部門收集各種建議，#n防止未來再出現因這類活動而痛苦的學生。"
10015070-125 = "……如此大幅度的調整，各位應該沒有異議了吧？"
10015070-126 = "如，如果真的那樣的話，我們當然不會有怨言……"
10015070-127 = "但明天就是開幕式了吧？"
10015070-128 = "現在才準備趕得上嗎？"
10015070-129 = "……一定會趕上的。"
10015070-130 = "就像先前所說的一樣，#n「大運動會」是由奇普托斯所有學生共同成就並一同享受的、屬於大家的慶典。"
10015070-131 = "因此如果仍有學生抱持著反對的心情，那麼「書記的任務」就不算是被確實執行。"
10015070-132 = "傾聽學生的不滿，為其解決痛苦……"
10015070-133 = "這也是[ruby=研討會]「學生會」[/ruby]應盡的職責。"
10015070-154 = "……我也會幫忙準備大運動會。"
10015070-155 = "不，請務必讓我幫忙！"
10015070-156 = "如果能彌補先前造成的妨礙……"
10015070-157 = "不管是體力活還是什麼，我都會努力達成的。"
10015070-159 = "體力活就交給機器人去做吧？"
10015070-160 = "修理受損的機器人請交給工程師部處理！這可是我們的拿手戲！"
10015070-162 = "我們貝里塔斯雖然已經沒有繼續幫忙的理由……"
10015070-163 = "但孩子們難得對運動感興趣，就讓我們再稍微幫點忙吧。"
10015070-164 = "我喝了太多能量飲料，現在完全沒有睡意……"
10015070-165 = "如果是製作巨集的話，我非常樂意幫忙。"
10015070-166 = "呵呵，既然要製造新的障礙物，應該有很多東西需要塗裝吧？"
10015070-167 = "這可是爆發藝術魂的絕佳機會！"
10015070-169 = "那我們就去換上方便修理的衣服吧──"
10015070-170 = "不，沒有那個必要。#n因為我們已經決定擔任這次大運動會的應援團了。"
10015070-172 = "修理就交給雷醬和其他支援機器人，剩餘的時間就全力練習應援吧！"
10015070-174 = "說的也是！#n因為千年大部分的機器人都有安裝自我修復的功能。"
10015070-175 = "修好自我修復功能後，#n只要讓支援機器人學習修理演算法，就能讓它們自行處理大部分的故障。"
10015070-176 = "但，但是……把應援的工作交給機器人，由我們親自進行修理不是更有效率嗎……？"
10015070-177 = "太天真了，響。#n應援可是不能用效率來計算的奢侈品唷？"
10015070-178 = "人類親手傳達的加油，可是無法取代的！"
10015070-179 = "但，但是，衣服只是匆匆忙忙製作的，做工很粗糙……#n我們也沒有好好練習過……"
10015070-180 = "從現在開始練習就行了。"
10015070-181 = "而且，重要的不是服裝或實力。#n而是打從心底為對方加油的心意。"
10015070-182 = "是啊！而且剛才也說了，我很喜歡響製作的啦啦隊服唷！"
10015070-183 = "好，那就開始應援練習吧！"
10015070-184 = "嗚嗚……早知道會這樣，一開始就不該製作啦啦隊服的……"
10015070-192 = "乃愛，這些終端機要用在哪裡呢？"
10015070-193 = "啊，你是說那些閒置的舊型終端機吧。"
10015070-194 = "因為只是要當作獨立的運算裝置使用，請幫我連接至管理裝備的中央AI吧。"
10015070-195 = "時間上不足以修理或訂購受損的運算核心……我想嘗試將舊型核心並行來輔助運算。#n指令的調整就麻煩了。"
10015070-196 = "原來是想將運算能力不足的部份分散出去。我認為這個判斷非常恰當。"
10015070-198 = "加，加油！獲勝……！"
10015070-199 = "響，身體還是太僵硬了。#n再稍微放鬆一點，有自信一點！"
10015070-200 = "手臂抬高一點！配合動作奮力喊出口號！"
10015070-201 = "嗯嗯。比剛才好多了。"
10015070-202 = "這樣的話，明天的應援合戰就沒問題了！"
10015070-204 = "……前輩。#n話說回來，剛才西館2棟有出現異常入侵的警報。"
10015070-205 = "嗯？「晄．反．會」的學生不是和我們待在一起嗎？"
10015070-206 = "這到底是……？"
10015070-207 = "總之先啟動安全警備系統，並且報告動向。之後如果有什麼問題就跟我說。"
10015070-216 = "哎呀，老師。原來你還沒有回去呀？"
10015070-220 = "現在時候也不早了，是時候該休息囉……"
10015070-221 = "如果有需要的話，我可以帶你去實行委員用的值班室。"
10015070-222 = "[s1]「謝謝，但我不要緊。」\n[s2]「學生們徹夜努力，我卻幫不上忙，真是沒用……」"
10015070-225 = "請別這麼說。#n老師已經幫夠多忙了。"
10015070-226 = "老師明天還有行程，請先回去休息吧。"
10015070-238 = "……和大家一起在這種融洽的氣氛中熬夜，這還是第一次呢……"
10015070-239 = "看來今晚應該不會無聊吧。"
10015070-240 = "況且，還多了幾名不請自來的訪客……"
10015070-241 = "[s]「但是……」"
10015070-242 = "如果還是很在意的話……#n能幫我照顧一下睡著的優香醬嗎？"
10015070-243 = "夜晚的空氣轉涼，我擔心優香醬可能會因此感冒。"
10015070-244 = "之後如果有時間的話……"
10015070-250 = "就麻煩老師帶一些能幫大家瞬間趕跑睡意的濃咖啡回來吧。"

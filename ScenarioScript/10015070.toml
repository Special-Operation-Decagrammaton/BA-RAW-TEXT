[translation]
10015070-1 = "Episode 7; A Field Day for All"
10015070-7 = "This is the Engineering Department. We removed the battery and core components from the cheer bot."
10015070-8 = "We finally untangled all the wires as well. We just need to run a few tests and it should be good to go."
10015070-9 = "Veritas, reporting. We've captured the culprits behind the festival sabotage."
10015070-10 = "There wasn't much to be done, however. They weren't in any shape to move after Sumire's special training."
10015070-11 = "Actually, Sensei, I think you should talk to them."
10015070-15 = "[ns] \"What's wrong? Is everything okay?\""
10015070-16 = "Heehee. I'm relieved we closed this case without any major injuries."
10015070-17 = "Although we did lose some equipment during the fight..."
10015070-23 = "Would you like to go with me to visit our neighborhood criminals?"
10015070-25 = "I...I can't believe we failed..."
10015070-27 = "But I don't care! The Anti-Halo Festival Group will never yield!"
10015070-29 = "As long as there's breath in my body, I'll keep trying to ruin the field day too!"
10015070-30 = "They really don't give up, huh? I don't even get what they're fighting for, to be honest."
10015070-31 = "Seriously though! Just give it up while you're still ahead!"
10015070-33 = "I'd prefer not to participate in any...drastic activities just before the festival. But I'm not against it."
10015070-34 = "Continue to pose a threat to Millennium's security, and I'll have to lock you up for the duration of the Halo Festival."
10015070-41 = "[ns] \"Give me a moment with them, Chihiro.\""
10015070-43 = "You? The Schale Sensei?"
10015070-44 = "What're you gonna do, huh? Lecture us?"
10015070-45 = "[s] \"I just want to know... Why are you so against this event?\""
10015070-46 = "It's because..."
10015070-47 = "Sports are no fun!"
10015070-49 = "S-S-Sports are...no f-fun?!"
10015070-50 = "I don't... I don't understand. The strain of your muscles, sweat pouring down your body, the refreshing exhaustion of pushing yourself to the brink...isn't...fun?"
10015070-52 = "Yeah, sure! It sounds all nice and dandy for athletic people like you!"
10015070-53 = "For uncoordinated, unskilled students like us, the field day may as well be a new form of torture!"
10015070-54 = "Do you know how it feels to be the laughing stock of the school for trying to do a roll in gymnastics?"
10015070-55 = "I still have nightmares about the way our teammates would glare at us if we made a mistake during team sports."
10015070-56 = "Don't you get it? Inferior students like us stand on the sidelines to be ridiculed by students like you all!"
10015070-57 = "If you're going to make us sweat, we'll choose what we sweat about!"
10015070-59 = "Physical activities and sports do tend to be team endeavors."
10015070-60 = "Don't get me started on P.E. classes. I get all the strict rules and monitoring to prevent injuries, but I always dreaded it."
10015070-62 = "That's all good and well, but your suffering doesn't give you allowance to make others suffer."
10015070-63 = "Do you know how much work was put into this event? How many students have been marking down the days on their calendars for the Halo Festival?"
10015070-64 = "I know we went too far...but...but...!"
10015070-68 = "...Why did they have to host it here?"
10015070-69 = "[s] \"What's wrong with Millennium being the host?\""
10015070-70 = "Most of the students at Millennium Science School study, you know, sciences..."
10015070-71 = "We fit in here. No one bullies us for not being athletic or strong."
10015070-72 = "But then everyone started talking about how they wanted to make Millennium students fall in love with sports!"
10015070-73 = "Students like us will be pushed to the side again! I don't want that!"
10015070-74 = "I don't want to go back to my middle school days."
10015070-76 = "I'd like to clear up a misunderstanding here."
10015070-77 = "It was never about your level of your performance, or who wins or who loses."
10015070-78 = "Every single individual has different body types, different environments they live in, different capabilities. There is no shame in being different."
10015070-79 = "The spirit of sports is about pushing our personal limits! Discriminating and harassing based on someone's current level goes against everything we believe in!"
10015070-80 = "Those are just pretty words to cover the reality of the ranking system!"
10015070-84 = "We have no stamina, people will probably lap us on the track. We have no coordination, so everyone will see as we trip over a ball."
10015070-88 = "In what world do I want to pretend I'm proud to be at the bottom of the barrel? Do you think that feels good?"
10015070-89 = "I won't be a laughing stock anymore!"
10015070-91 = "I...I think I understand a little..."
10015070-96 = "[ns] \"Noa, is it too late to make changes to the games?\""
10015070-97 = "I wouldn't necessarily say it's too late..."
10015070-98 = "What were you thinking?"
10015070-99 = "[s] \"For example...\""
10015070-105 = "Fascinating. You'd like to add variables that aren't rooted in physical strength, like robotics obstacles or logic puzzles in the relays."
10015070-106 = "That's not a bad suggestion."
10015070-107 = "It gives students with lower physical abilities the agency to affect the outcome of the events, and it even adds an extra layer of entertainment for the audience."
10015070-108 = "The way I see it, it's just another way to show off Millennium's newest technology."
10015070-114 = "Proposal approved. We'll place an urgent order for robotics obstacles and ask for the Executive Committee's understanding regarding the updates."
10015070-120 = "We'll have to set an easy process in place for students to change their event entry the day of, if they would like."
10015070-121 = "Furthermore, I'll establish a counseling department to hear any student suggestions for these types of events moving forward."
10015070-125 = "I hope you feel your needs are being addressed. Yes?"
10015070-126 = "I-If you can really do that, all my grievances would be gone..."
10015070-127 = "You talk big, but the opening ceremony is tomorrow!"
10015070-128 = "Can you really implement all of these ideas by then?"
10015070-129 = "I'll simply have to make it happen."
10015070-130 = "I've said this before, but the Halo Festival is a unifying event by the students and for the students. I wholeheartedly mean it when I say it's for everyone."
10015070-131 = "And here I am, face-to-face with two students who felt so neglected, they felt the need to rebel. That is a failure of my duties on my part."
10015070-132 = "And regardless, resolving student grievances and listening to complaints..."
10015070-133 = "...it's all part of the responsibilities of the Student Council."
10015070-154 = "I-If it's not too late... Can I help with the preparations?"
10015070-155 = "Please! I'll do anything!"
10015070-156 = "I would like to make up for the trouble we caused."
10015070-157 = "I'll do whatever you ask, even if it's arduous physical work!"
10015070-159 = "I wouldn't go that far. The robots can handle the heavy lifting."
10015070-160 = "Obviously, robots are the Engineering Department's specialty. We'll have the cheer bot up and running in no time."
10015070-162 = "Veritas' obligations end here. But..."
10015070-163 = "...if my adorable underclassmen are interested in the new events, I can hardly sit back and do nothing. We'll help where we can."
10015070-164 = "I accidentally downed, like, five energy drinks. I can't sleep and I've got nothing better to do."
10015070-165 = "If this involves making computer macros, sign me up."
10015070-166 = "Heh. Brand new obstacles are gonna need decoration and painting!"
10015070-167 = "It's my time to shine. Behold, Maki the artist!"
10015070-169 = "I guess I'll just head back and change into something more comfortable to start the repairs then..."
10015070-170 = "No. We committed to the responsibility of cheering for the field day, so we must see it through to the end."
10015070-172 = "Leave the repairs to Thundergun and the support robots. We should focus on cheerleading practice for the time we have left!"
10015070-174 = "Understood! Most of our robots have built-in self-repairing capabilities regardless."
10015070-175 = "Do a little tweaking here and there to the support bots so they can help out, polish up the self-repairing program, and our problems will be taken care of!"
10015070-176 = "B-But...wouldn't it be more efficient to leave the cheerleading to the robots while we do the repairs...?"
10015070-177 = "You're missing the point, Hibiki. The benefits of cheering can't be measured by that kind of metric."
10015070-178 = "The passion and love pouring out from the cheers of actual people can't be replaced by AI!"
10015070-179 = "Yeah, I guess... But, the outfits are super shoddily made anyways, no one's going to want to see them...and we didn't even have time to practice..."
10015070-180 = "Then we should get started now."
10015070-181 = "And no one is judging what type of stitch you used or the quality of the fabric. They just need sincerity and compassion."
10015070-182 = "Yeah! Your cheers just need to be from the heart! And, anyway, I really like the outfits you made us, Hibiki!"
10015070-183 = "So, let's cheer our hearts out!"
10015070-184 = "I regret everything... I never should've made these cheerleading uniforms... If I had known..."
10015070-192 = "Noa, what are these mobile devices for?"
10015070-193 = "Oh, those? They're just old, unused devices. I'm repurposing them."
10015070-194 = "Separate the arithmetic unit and connect it to the central AI managing all our equipment."
10015070-195 = "There isn't enough time to repair the damaged arithmetic unit or order a new one...so I'm trying to sync the older units to assist with computation. Please adjust the command set."
10015070-196 = "Roger. With this, we can distribute the processes across multiple units and make up for the insufficient computing power. What a clean solution."
10015070-198 = "P-Push harder! W-Win...!"
10015070-199 = "Hibiki, didn't you read the book I lent you? You have to relax! Take a deep breath and exude confidence!"
10015070-200 = "Raise your arms in the air like you don't care! Shout the cheer with all the air in your lungs! Wait, no! You can't stop moving while you yell! Both at the same time, Hibiki."
10015070-201 = "She's come a long way already."
10015070-202 = "I think tomorrow's going to go wonderfully!"
10015070-204 = "Hey, Pres. The security alarm in the second West Wing building went off a little bit ago."
10015070-205 = "Really? The Anti-Halo Festival Group is on our side now..."
10015070-206 = "Then, who could it be?"
10015070-207 = "Okay. Activate heightened security measures for the area and record the situation. Let me know the moment you catch anything."
10015070-216 = "Oh my, Sensei? You're still here?"
10015070-220 = "It's been a long day and it's late. You should get some rest while you can."
10015070-221 = "You've come all the way out here. You're welcome to sleep in the staff room tonight, rather than make the trek back to Schale."
10015070-222 = "[s1] \"Thank you for the offer. I feel like I should be doing more though.\" \n[s2] \"I feel guilty resting while you students are working through the night.\""
10015070-225 = "There's no need. You've helped us immeasurably already."
10015070-226 = "Please, go back and rest before work tomorrow."
10015070-238 = "You know... I've never had the chance to work with other students in such a bustling, lively atmosphere. Like we're a group of friends staying up all night together."
10015070-239 = "So, I won't be bored or need company tonight."
10015070-240 = "And we have a few uninvited guests who've come to visit..."
10015070-241 = "[s] \"But...\""
10015070-242 = "Okay, okay. If you're concerned, could you help by checking on Yuuka? She's still asleep in the Seminar club room."
10015070-243 = "It's a bit chilly since the sun's gone down. I don't want her to catch a cold."
10015070-244 = "And if you really still aren't going home after that..."
10015070-250 = "I'm guessing we'll all probably need a strong cup of coffee pretty soon."

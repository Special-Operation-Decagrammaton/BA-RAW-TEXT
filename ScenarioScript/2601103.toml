[translation]
2601103-1 = "Surprisingly the Same"
2601103-2 = "On the corner of a market street..."
2601103-8 = "[ns1] \"What's that commotion?\"\n[ns2] Head to the source of the noise."
2601103-14 = "Hm..."
2601103-15 = "Hmmm..."
2601103-16 = "[s3] \"Hello there, Saten.\"\n[s4] \"Something wrong?\""
2601103-19 = "Oh, Sensei!"
2601103-20 = "Nothing's wrong. Well, see over there?"
2601103-25 = "How hard is it to find just ONE person?"
2601103-26 = "It's not just one person. We need someone who knows mahjong."
2601103-27 = "We'd still have four people now, if the bookseller hadn't left..."
2601103-28 = "Blast it, mahjong! Why do you need four players...?"
2601103-29 = "I'd kill for just one more game... There's got to be someone around here who knows the rules..."
2601103-31 = "[ns5] \"Mahjong?\"\n[ns6] \"Were you watching them play?\""
2601103-34 = "Yes. We have this game in my world too. I was surprised to see it being played here, so I was watching."
2601103-35 = "I mean, this is a completely different world, right? So why do you have the same mahjong with the same rules?"
2601103-36 = "And if you think about it, our culture, our language, it's all so similar."
2601103-37 = "I was thinking about how weird it is our worlds have so much in common."
2601103-38 = "Yes...?"
2601103-39 = "You're surprised I know the rules of mahjong? Well..."
2601103-40 = "I...play a lot of online mahjong... So yeah..."
2601103-41 = "...Wait! What did you just say?!"
2601103-45 = "Huh?"
2601103-46 = "You, miss! Did we just hear you correctly?"
2601103-47 = "You play mahjong? Is that true?"
2601103-48 = "Do you have some time right now? Why don't you join us for a game? Just one round is fine!"
2601103-49 = "Wait, what? Um... I—"
2601103-50 = "Please! We're only asking for one round. We can't find anyone else!"
2601103-51 = "If we call it now, I'll be so unsatisfied that I'll be able to think of nothing but mahjong all day!"
2601103-52 = "Um... I mean..."
2601103-53 = "Hm..."
2601103-54 = "[s] Intervene."
2601103-55 = "...Oh!"
2601103-56 = "It's fine, Sensei. In fact..."
2601103-60 = "I think I'd really like playing a round."
2601103-61 = "You will?! Thank you!"
2601103-67 = "Oi, hurry up and set the board! And somebody get this young lady a chair!"
2601103-68 = "Way ahead of you! Don't worry, we'll go easy on you."
2601103-72 = "...Oh?"
2601103-73 = "Go easy on me, will you? Now you've done it! I'm going all out!"
2601103-74 = "I'll show you that age has nothing to do with mahjong skills!"
2601103-75 = "...! Oho! I like your spirit!"
2601103-76 = "Okay, let's begin!"
2601103-78 = "And so began the mahjong battle between Saten and the shopkeepers."
2601103-79 = "They were all so skilled that the game went on for another 4 rounds."
2601103-90 = "...Tsumo!"
2601103-91 = "Riichi, pinfu, triple outside hand, tsumo, dora 2..."
2601103-92 = "...Ura 2! Sanbaiman! All last sanbaiman, 12,000 ALL! What a finish!"
2601103-93 = "I won! I finally caught up with you all in points!"
2601103-94 = "All right, next round! Let's go, let's go!"
2601103-95 = "S-Shouldn't we call it for the day...?"
2601103-96 = "We only wanted one round... *sob*"
2601103-97 = "We can't compete...with that youthful stamina..."
2601103-98 = "What? No fair! I finally caught up on points! You were winning all those other rounds. You can't just call it now!"
2601103-99 = "No, we're not done yet! The real battle begins now!"
2601103-100 = "Ugh..."
2601103-101 = "Save us..."
2601103-105 = "[ns] \"...\""
2601103-107 = "[ns] Drag Saten away from the board."
2601103-109 = "I made an excuse that it was getting late to convince Saten to walk away."
2601103-110 = "...They didn't thank me aloud, but I could see the gratitude in the shopkeepers' eyes."

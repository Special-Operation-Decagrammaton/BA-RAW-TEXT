[translation]
2601103-1 = "意外相同的事物"
2601103-2 = "（巷子裡市場的一隅）"
2601103-8 = "[ns1]「那是什麼聲音……？」\n[ns2] 走向聲音傳來的方向"
2601103-14 = "……嗯……"
2601103-15 = "唔～～～嗯……"
2601103-16 = "[s3]「你在這裡啊，佐天。」\n[s4]「發生什麼事了嗎？」"
2601103-19 = "啊，老師？"
2601103-20 = "不，沒什麼，只是那邊……"
2601103-25 = "只是找一個人有那麼難嗎！？"
2601103-26 = "又不是隨便一個人都行，我們要找的可是「會打麻將的人」。"
2601103-27 = "剛才明明還是剛好四個人的說，沒想到書店老闆臨時有事先離開……"
2601103-28 = "真是的……難怪人家會說比役滿更難的是湊齊四個人打麻將。"
2601103-29 = "就這樣散會太可惜了，有沒有人能陪我們打麻將呢……"
2601103-31 = "[ns5]「……麻將？」\n[ns6]「你剛才在看他們嗎？」"
2601103-34 = "嗯，我們的世界也有一模一樣的遊戲……覺得有點好奇，所以才會在一旁觀戰。"
2601103-35 = "我們明明是完全不同的世界對吧？#n可是卻都有麻將這種遊戲，甚至連規則都一模一樣……"
2601103-36 = "而且仔細想想，我們不僅能夠毫無阻礙地溝通，#n就連生活方式和都市的構造也沒什麼區別呢。"
2601103-37 = "明明世界不一樣，卻有這麼多相同的事物……這點反而最讓我感到不可思議。"
2601103-38 = "……嗯？"
2601103-39 = "我怎麼知道兩邊麻將的規則一樣？#n這個嘛，因為……"
2601103-40 = "我自己……也有在打麻將。我還挺常玩線上麻將的，嗯。"
2601103-41 = "……什麼！？你說什麼！？"
2601103-45 = "……嗯？"
2601103-46 = "那位同學！剛才是你在說話對吧？我應該沒聽錯吧？"
2601103-47 = "你說你會打麻將……是真的嗎？"
2601103-48 = "你現在有沒有空？#n一把就好……就算只打一把也沒關係，可以來陪我們打個麻將嗎？"
2601103-49 = "什，什麼？先，先等一下，你們突然這麼說……"
2601103-50 = "算我拜託你了！我們本來打算打完這把就解散的，可是實在找不到人……！"
2601103-51 = "要是就這樣不了了之的話，我會難受得整晚睡不著啊！"
2601103-52 = "唔……既然你們都這麼說了……"
2601103-53 = "嗯……"
2601103-54 = "[s] 開口阻止商人們"
2601103-55 = "……啊。"
2601103-56 = "沒關係的，老師。#n我並沒有覺得為難之類的，或者反而該說……"
2601103-60 = "嗯，我覺得試一試好像也不錯。"
2601103-61 = "哦哦！真的嗎！！太謝謝你了，這位同學！！"
2601103-67 = "楞著做什麼，還不快洗牌！#n順便拿張坐墊給這位同學！"
2601103-68 = "早就準備好囉～我們會手下留情的，不用緊張沒關係哦？"
2601103-72 = "……哼嗯？"
2601103-73 = "手下留情？你們該不會看我是學生就瞧不起我吧？#n我可不能當作沒聽見。"
2601103-74 = "麻將的實力與年紀無關，就讓我來告訴你們吧！"
2601103-75 = "哦哦哦……！！年輕人就是有氣勢！"
2601103-76 = "趕緊開始吧！！"
2601103-78 = "（於是，佐天便和商人們在市場中央打起了麻將）"
2601103-79 = "（……由於四人的實力意外的接近，不知不覺間已經進行到了第四把）"
2601103-90 = "……自摸！！"
2601103-91 = "立直、平胡、三色同順、純全帶么九、自摸、寶牌兩張……"
2601103-92 = "……再加上兩張裡寶牌！！三倍滿！！#n莊家三倍滿，12000ALL！戲劇性的逆轉勝！！"
2601103-93 = "是我贏了！！終於能為前幾把雪恥，而且把分數追上了！！"
2601103-94 = "來來來！趕快接著打下一把吧！！快點！！"
2601103-95 = "同，同學……我們那個……已經打夠了……"
2601103-96 = "本來打算打個一兩把過過癮而已……唔唔……"
2601103-97 = "體力……我們這些老人家的體力……已經……撐不下去了……"
2601103-98 = "什麼……！？怎麼可以這樣……！我好不容易才把分數追回來耶！#n而且你們剛才贏的時候明明都充滿鬥志，怎麼突然就不想玩了！？"
2601103-99 = "不行，還不能結束！真正的勝負現在才開始！"
2601103-100 = "唔唔……呃……"
2601103-101 = "救命啊……"
2601103-105 = "[ns]「……」"
2601103-107 = "[ns] 帶佐天離開"
2601103-109 = "（以天色已晚的理由，將佐天帶離了現場）"
2601103-110 = "（……總算能夠離開麻將桌的商人們，紛紛露出了感激的眼神）"

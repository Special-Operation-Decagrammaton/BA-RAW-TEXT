[translation]
2601103-1 = "เหมือนกันอย่างคาดไม่ถึง"
2601103-2 = "(ณ มุมหนึ่งในตลาดที่มีหลายซอกซอย)"
2601103-8 = "[ns1] \"เสียงอะไรน่ะ...?\"\n[ns2] เดินไปตามเสียง"
2601103-14 = "...อืม..."
2601103-15 = "อืมมมม......"
2601103-16 = "[s3] \"มาอยู่ตรงนี้เองสินะ ซาเต็น\"\n[s4] \"มีเรื่องอะไรเหรอ?\""
2601103-19 = "อ้อ คุณครู?"
2601103-20 = "ไม่หรอกค่ะ ไม่ได้มีอะไรอื่นหรอก ก็แค่ทางนั้นเขากำลัง..."
2601103-25 = "หาคนแค่คนเดียวมันยากเย็นขนาดนั้นเลยรึไง!?"
2601103-26 = "ก็คนเดียวที่ว่า เป็นคนธรรมดาซะที่ไหนล่ะ นี่เราต้องหา 'คนที่เล่นไพ่นกกระจอกเป็น' เชียวนะ"
2601103-27 = "เมื่อกี้มีครบ 4 คนแล้วแท้ๆ แต่ตาแก่ร้านหนังสือดันมีงานเข้าจนต้องกลับร้านไปก่อน..."
2601103-28 = "เอ๋... ไพ่นกกระจอกเนี่ยน้า สิ่งที่ยากกว่าการเล่นไพ่คือการหาคนเล่นให้ครบวงนี่แหละนะ"
2601103-29 = "ถ้าให้จบเกมแบบนี้ก็น่าเสียดาย มีใครแถวนี้พอจะเล่นเป็นบ้างไหมนะ..."
2601103-31 = "[ns5] \"...ไพ่นกกระจอก?\"\n[ns6] \"กำลังดูคนพวกนั้นอยู่เหรอ?\""
2601103-34 = "ค่ะ ในโลกของฉันก็มีการเล่นไพ่ที่เหมือนกันเป๊ะๆ เลยค่ะ ฉันทึ่งมาก ก็เลยกำลังส่องพวกเขาอยู่น่ะค่ะ"
2601103-35 = "นี่เป็นคนละโลกกับที่ฉันจากมาแท้ๆ แต่ทั้งสองที่ก็มีไพ่นกกระจอกเหมือนกัน แถมกติกาในการเล่นก็#nเหมือนกันทุกอย่างด้วย..."
2601103-36 = "พอมาคิดๆ ดูแล้ว พวกฉันมาที่นี่ก็พูดคุยกับคนที่นี่ได้อย่างเป็นธรรมชาติ แถมรูปแบบการใช้ชีวิตหรือ#nโครงสร้างของเมืองก็ไม่ได้ต่างกันมากด้วยค่ะ"
2601103-37 = "ที่นี่เป็นอีกโลกหนึ่งแท้ๆ แต่ก็มีด้านที่เหมือนกันเยอะเลย... ต่างที่แต่ไม่ต่างกัน... ฉันกำลังคิดว่ามันน่า#nทึ่งมากเลยน่ะค่ะ"
2601103-38 = "...คะ?"
2601103-39 = "ฉันรู้ได้ยังไงว่ากฎการเล่นไพ่นกกระจอกของทั้งสองที่เหมือนกันน่ะเหรอคะ? มันก็... ฉันน่ะ..."
2601103-40 = "เล่นไพ่นกกระจอกเป็น... และเคยเล่นไพ่นกกระจอกแบบ 4 คนอยู่บ่อยๆ น่ะค่ะ"
2601103-41 = "...ว่าไงนะ!?  เมื่อกี้พูดว่ายังไงนะ!?"
2601103-45 = "...หืม?"
2601103-46 = "นี่ หนูนักเรียนคนนั้น! เมื่อกี้พูดว่ายังไงนะ! พวกลุงได้ยินถูกหรือเปล่า?"
2601103-47 = "เล่นไพ่นกกระจอกเป็นด้วยเหรอ? ไม่ได้จ้อจี้นะ?"
2601103-48 = "พอมีเวลารึเปล่าล่ะ? มาช่วยเล่นให้คนครบสักตาได้ไหม?"
2601103-49 = "คะ... คะ? ดะ... เดี๋ยวสิคะ ถ้าจู่ๆ จะมาชวนกันแบบนี้ละก็..."
2601103-50 = "ถือว่าลุงขอล่ะ! พวกลุงจะเล่นกันอีกตาเดียวแล้วแยกย้ายไปขายของกันแล้ว แต่ว่ายังไม่ครบคนสักที...!"
2601103-51 = "ถ้าแยกย้ายไปเลยทั้งอย่างนี้ วันนี้คงได้นั่งคิดถึงแต่ไพ่นกกระจอกจนไม่ได้ทำอะไรแน่"
2601103-52 = "อืม... ถ้ามันจะขนาดนั้นละก็..."
2601103-53 = "ฮืม..."
2601103-54 = "[s] พยายามจะห้ามพวกพ่อค้า"
2601103-55 = "...อ๊ะ"
2601103-56 = "ไม่ต้องหรอกค่ะคุณครู ฉันไม่เป็นไรค่ะ ไม่ได้รู้สึกกดดันหรืออะไรเลย! ตรงกันข้ามด้วยซ้ำ..."
2601103-60 = "ค่ะ ลองเล่นดูสักตาก็ไม่น่าเสียหายนะคะ"
2601103-61 = "โอ้! พูดจริงใช่มั้ย!!  ขอบใจนะหนู!!"
2601103-67 = "มัวทำอะไรกันอยู่ รีบแจกไพ่สิ! ไปเอาเบาะรองนั่งมาให้หนูนักเรียนนั่งด้วย!"
2601103-68 = "เตรียมไว้แล้วน่า~ พวกลุงจะออมมือให้แล้วกัน ไม่ต้องประหม่าหรอกนะ!"
2601103-72 = "...หืม?"
2601103-73 = "จะออมมือให้เหรอคะ? กำลังดูถูกนักเรียนอยู่หรือเปล่าคะเนี่ย? แบบนี้ฉันคงยอมให้ไม่ได้หรอกนะคะ"
2601103-74 = "ฉันจะทำให้พวกลุงเห็นเองค่ะว่าความสามารถในการเล่นไพ่นกกระจอกมันไม่ได้ขึ้นอยู่กับอายุ!"
2601103-75 = "......!!  โอ้ววว! นี่สินะสปิริตของวัยรุ่น!"
2601103-76 = "งั้นก็มาเริ่มกันเลย!!"
2601103-78 = "(หลังจากนั้นการแข่งไพ่นกกระจอกระหว่างพ่อค้ากับซาเต็นก็เริ่มขึ้น)"
2601103-79 = "(...ความสามารถของทุกคนสูสีกันอย่างคาดไม่ถึง จึงต้องเล่นกันต่อถึง 4 ตา)"
2601103-90 = "...จั่ว!!"
2601103-91 = "จั่ว ทิ้ง เก็บ น็อก น็อกมืด!"
2601103-92 = "...ฟาดให้เรียบ!!  เยี่ยมเลย! 12,000 ALL! พลิกมาชนะได้อย่างน่าทึ่ง!!"
2601103-93 = "ชนะแล้ว!! ฉันกู้ศักดิ์ศรีตาที่ผ่านๆ มาได้แล้วค่ะ!! คะแนนเราเท่ากันแล้วนะคะ!!"
2601103-94 = "เอาละๆ! แจกไพ่ตาต่อไปได้เลยค่ะ!! อย่ารอช้า!!"
2601103-95 = "นะ... หนู... พอได้แล้ว... พอเถอะ..."
2601103-96 = "พวกลุงจะเล่นขำๆ กันแค่ตาสองตาเอง... เฮ้อ..."
2601103-97 = "หมดแรงแล้ว... พวกลุงแก่แล้ว... ให้เล่นต่อ... ไม่ไหวแล้วละ..."
2601103-98 = "คะ...?!  ได้ไงคะ... เพิ่งจะตีตื้นคะแนนได้แท้ๆ เลย! ทีก่อนหน้านี้ยังชนะฉันใหญ่เลย พอฉันชนะบ้างก็#nงอนกันเหรอคะ!?"
2601103-99 = "ไม่ได้หรอกค่ะ ฉันยังไม่ยอมหรอก! เราจะได้รู้ผลแพ้ชนะจากนี้ไปต่างหาก!"
2601103-100 = "ฮะ... เฮือก..."
2601103-101 = "ไม่ถงไม่ถามสุขภาพกันสักคำเลยเหรอ..."
2601103-105 = "[ns] \"......\""
2601103-107 = "[ns] พาตัวซาเต็นออกมา"
2601103-109 = "(คุณครูพาซาเต็นออกมาและอ้างเหตุผลว่ามันเย็นมากแล้ว)"
2601103-110 = "(...พวกพ่อค้าส่งสายตามาขอบคุณที่ในที่สุดก็ได้พักสักที)"

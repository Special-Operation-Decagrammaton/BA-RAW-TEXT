[translation]
1007006-1 = "#title;시간이 지나도"
1007006-2 = "#place;매화원 내부"
1007006-3 = "3;미나;00\n#3;a\n#wait;1000"
1007006-4 = "#na;매화원 원생 A;와아~ 미나 언니다~!"
1007006-5 = "#na;매화원 원생 B;미나 언니! 나 어부바 해 줘!"
1007006-6 = "3;미나;09;후…… 그래. 잘들 있었나. 꼬마 제군들.\n#3;em;[반응]"
1007006-7 = "#na;매화원 원생 A;아, 미나 언니. 또 이상하게 말하고 있어."
1007006-8 = "3;미나;04"
1007006-9 = "#na;매화원 원생 B;언니, 자꾸 그러면 안 놀아 줄 거야?"
1007006-10 = "3;미나;06;아니아니아니! 이상하게 말한다니! 그런 적 없거든?\n#3;em;[땀]\n#3;stiff"
1007006-11 = "3;미나;09;자, 선물이야. 선물! 하나씩 나눠 줄 테니 얌전히 줄 서서 기다려야 해?\n#3;greeting"
1007006-12 = "[s] \"미나는 아이들을 좋아하는구나.\""
1007006-13 = "3;미나;04;……핫?!"
1007006-14 = "3;미나;05;그, 그렇다기보단! 매화원의 아이들은…… 그, 뭐냐. 그거다."
1007006-15 = "3;미나;11;산해경의 미래인 것이니까 말이지!\n#3;em;[!]\n#3;jump"
1007006-16 = "#na;매화원 원생 A;아, 그거 루미 언니가 자주 해 주는 말이야!"
1007006-17 = "3;미나;14"
1007006-18 = "#na;매화원 원생 B;언니가 항상 과일이랑 간식이랑 많이많이 들고 와서, 마음껏 먹으라면서 그렇게 말해 줘!"
1007006-19 = "3;미나;07;……현무상회. 어느새 아이들을 먹을 것으로 구슬리고 있었나……!\n#3;em;[...]"
1007006-20 = "3;미나;13;이 또한 현무상회의 치졸한 수법일 터! 결코 좌시하지 않겠다!\n#3;closeup\n#3;em;[!]"
1007006-21 = "[s] \"그냥, 아이들을 예뻐하는 마음은 누구나 같은 게 아닐까……\""
1007006-22 = "3;미나;04;선생님도 현무상회의 편을 드는 건가? 나와 같이 매화원에 왔으면서?!\n#3;em;[땀]\n#3;stiff"
1007006-23 = "[s] \"그러니까 그런 거 아니래두……\""
1007006-24 = "3;미나;03;흥…… 뭐, 좋아.\n#3;em;[...]"
1007006-25 = "3;미나;09;오늘의 선물은…… 기대해도 좋다구? 새 옷이랑 운동화야!"
1007006-26 = "#na;매화원 원생 A;어…… 그런데 이거, 현룡문의 옷이랑 많이 비슷한데?"
1007006-27 = "#na;매화원 원생 B;검은 꽃장식이 달린 신발이라니…… 이런 거 처음 봐!"
1007006-28 = "3;미나;08;훗. 현룡문에서 특별히 준비한 선물들이니까.\n#3;em;[음표]"
1007006-29 = "3;미나;02;먹어 버리면 사라지는 현무상회의 선물과는 궤가 다르다고?"
1007006-30 = "#na;매화원 원생 A;음…… 뭔가 촌스러워. 다른 거 없어?"
1007006-31 = "3;미나;05"
1007006-32 = "#na;매화원 원생 B;별로 안 예뻐…… 예쁜 거 줘! 미나 언니!"
1007006-33 = "3;미나;14;뭐라고?!\n#3;em;[?!]\n#3;shake"
1007006-34 = "3;미나;02;너희들, 잠깐 거기 앉아 봐라. 지금부터 끝내주는 이야기를 들려 줄 테니……\n#3;em;[!]"
1007006-35 = "#st;[0,0];instant;1;"
1007006-36 = "#clearST"
1007006-37 = "3;미나;05\n#3;d\n#wait;500"
1007006-38 = "#wait;350"
1007006-39 = "3;미나;01\n#3;a\n#3;closeup\n#wait;1000"
1007006-40 = "3;미나;02;우선 이 옷은, 현룡문 최고의 재봉사에게 맡긴 옷이다.\n#3;closeup"
1007006-41 = "3;미나;03;옷 자체에 산해경과 현룡문의 정신, 전통, 그리고 가치를 담을 수 있도록.\n#3;closeup\n#3;em;[...]"
1007006-42 = "3;미나;09;모든 부위에 의미와 상징을 담을 수 있도록 만들었지.\n#3;closeup"
1007006-43 = "3;미나;11;그리고 신발! 검은색은 현룡문의 색이기도 하며, 단호함, 결단력, 강직함, 공정함을 의미한다.\n#3;closeup\n#3;em;[!]"
1007006-44 = "3;미나;03;이는 다 매화원 아이들이 올바로 자라, 산해경의 훌륭한 일원이 되기를 바라는 마음에서……\n#3;closeup"
1007006-45 = "#na;매화원 원생 A;이야기 다 끝나면 깨워 줘. 미나 언니."
1007006-46 = "\n#na;매화원 원생 B;어…… 검은 장미의 꽃말 중 하나는 이별이라던데, 우리 헤어지는 거야?"
1007006-47 = "3;미나;16;그, 그게 아니라~!\n#3;closeup\n#3;stiff\n#3;em;[땀]"
1007006-48 = "#all;hide"
1007006-49 = "#st;[0,0];instant;1;"
1007006-50 = "#clearST"
1007006-51 = "#all;hide"
1007006-52 = "3;미나;06;허리가…… 아프군.\n#3;a\n#3;em;[세로선]"
1007006-53 = "[s] \"아이들과 놀아 주는 건 즐거웠어?\""
1007006-54 = "3;미나;02;아아. 보람찬 시간이었다.\n#3;em;[반응]"
1007006-55 = "3;미나;08;팔을 양쪽에서 잡아끌거나, 멋대로 달려와 안기거나."
1007006-56 = "3;미나;09;머리를 잡아당기거나, 소리 지르거나, 말을 안 듣고 제멋대로 뛰어다니곤 했지만. 그래야 아이들이지.\n#3;em;[음표]"
1007006-57 = "[s] \"나는 가끔 감당하기 힘들던데 말이야……\""
1007006-58 = "3;미나;02;예전에 만들었던 빚을 갚는다고 생각하면 좋지 않을까."
1007006-59 = "3;미나;03;모든 사람은 한 번씩 아이였으니까."
1007006-60 = "#st;[0,0];instant;1;"
1007006-61 = "#clearST"
1007006-62 = "[ns] \"……\""
1007006-63 = "3;미나;04;뭐, 뭐냐. 선생님. 그 신기한 모습도 다 본다는 표정은.\n#3;shake\n#3;em;[?!]"
1007006-64 = "3;미나;02;음? 내 입에서 그런 현명한 말이 나올 줄은 생각지도 못했다고?"
1007006-65 = "3;미나;08;훗. 내가 조금만 마음을 먹으면 이 정도다. 알아 두라고."
1007006-66 = "3;미나;10;……아이들을 볼 때마다 드는 생각이 있지."
1007006-67 = "3;미나;12;저 아이들이 자라면 어떤 학생이 될까. 그리고 나는…… 괜찮은 선배가 될 수 있을까.\n#3;em;[한숨]"
1007006-68 = "3;미나;06;선생님은…… 아아, 그렇군. 이미 어른이니, 이런 생각들은 예전에 졸업했겠지.\n#3;stiff"
1007006-69 = "[s1] \"꼭 그런 건 아니야.\"\n[s2] \"그냥 시간만 지난다고, 어른이 되는 건 아니더라.\""
1007006-70 = "#wait;100"
1007006-71 = "#wait;100"
1007006-72 = "3;미나;02;그런가? 내가 모르는 걸 이야기하는군.\n#3;em;[?]"
1007006-73 = "3;미나;03;하긴, 선생님은 가끔씩 그랬었지."
1007006-74 = "3;미나;05;그게…… 어른의 여유라는 것인가. \n#3;em;[...]"
1007006-75 = "[s] \"그렇게 보인다면, 차라리 다행이네.\""
1007006-76 = "3;미나;00;속은 다르다는 말처럼 들리는군."
1007006-77 = "[s] \"응. 가라앉지 않기 위해 애쓰는…… 오리 같은 거야.\""
1007006-78 = "3;미나;04;거기서는 백조라고 말할 줄 알았는데."
1007006-79 = "3;미나;08;거기까지 뻔뻔해지고 싶지는 않았다고? 훗. 그렇군."
1007006-80 = "#st;[0,0];instant;1;"
1007006-81 = "#clearST"
1007006-82 = "3;미나;08\n#wait;1000"
1007006-83 = "3;미나;05"
1007006-84 = "3;미나;05;<누구나 조금씩은 어린아이라고 하지. 아무리 시간이 지나도, 얼마나 나이를 먹어도.>"
1007006-85 = "#st;[0,0];instant;1;"
1007006-86 = "#clearST"
1007006-87 = "#wait;500"
1007006-88 = "[ns] \"<스스로와 화해해야 하는 이유는, 그게 그나마 가능한 화해이기 때문이고.>\""
1007006-89 = "3;미나;09;<젖은 바람이 불기 시작했을 때에는 이미 늦은 법. 달리할 수 있는 일이 없다면, 비를 받아들일 수밖에.>"
1007006-90 = "#all;hide"
1007006-91 = "#na;(그렇게 미나와 대화를 나누며, 샬레로 돌아왔다.)"

[translation]
1007006-1 = "ต่อให้เวลาผ่านไป..."
1007006-2 = "ภายในสวนต้นบ๊วย"
1007006-4 = "ว้าว~ พี่มินะ~!"
1007006-5 = "พี่มินะ! หนูขอขี่หลังหน่อย!"
1007006-6 = "ฮู่ว ว่ายังไง เป็นยังไงกันบ้าง เจ้าพวกตัวเล็ก..."
1007006-7 = "เอ๋ พี่มินะพูดอะไรแปลกๆ อีกแล้ว"
1007006-9 = "ถ้าพี่เอาแต่พูดแบบนั้น หนูจะไม่เล่นด้วยแล้วนะ?"
1007006-10 = "ไม่นะ ไม่ๆ! พูดแปลกๆ อะไรกัน! ฉันไม่เคยพูดจาอะไรแปลกๆ สักหน่อย"
1007006-11 = "เอาละ อันนี้เป็นของขวัญ! เดี๋ยวจะแจกให้คนละอัน ทุกคนต้องเข้าแถวรับอย่างเป็นระเบียบเรียบร้อยด้วย#nเข้าใจนะ?"
1007006-12 = "[s] \"มินะชอบเด็กๆ สินะ\""
1007006-13 = "เอ๋...?!"
1007006-14 = "มะ... ไม่ขนาดนั้นหรอกน่า! ก็เด็กๆ สวนต้นบ๊วย.... เอ่อ... ยังไงล่ะ พวกเขาเป็น..."
1007006-15 = "พวกเขาคืออนาคตของซานไห่จิงนี่นา!"
1007006-16 = "พี่รูมิก็บอกพวกเราแบบนั้นบ่อยๆ เหมือนกัน!"
1007006-18 = "พี่เขาจะเอาผลไม้และขนมมาฝากแล้วพูดคำนั้นพร้อมกับบอกให้พวกเรากินเยอะๆ ตลอดเลย"
1007006-19 = "พวกย่านการค้าเทพเต่าดำ... มาใช้ของกินหลอกล่อพวกเด็กๆ ตั้งแต่เมื่อไรเนี่ย...!"
1007006-20 = "ใช้วิธีสกปรกจริงๆ เลย! แบบนี้ฉันจะไม่ทนหรอกนะ!"
1007006-21 = "[s] \"ไม่ว่าใครก็คงเอ็นดูเด็กๆ ทั้งนั้นแหละ...\""
1007006-22 = "คุณครูก็เข้าข้างย่านการค้าเทพเต่าดำเหรอ? ทั้งที่มาสวนต้นบ๊วยกับฉันเนี่ยนะ?!"
1007006-23 = "[s] \"ไม่ใช่แบบนั้นสักหน่อย...\""
1007006-24 = "ฮึ่ม... ก็ดี"
1007006-25 = "ยังไงก็เถอะ เจ้าพวกตัวเล็ก... เอ้า ของขวัญ! เสื้อผ้ากับรองเท้าใหม่ไงล่ะ!"
1007006-26 = "เอ๋... ว่าแต่อันนี้คล้ายกับชุดของมังกรดำมากเลยนะ?"
1007006-27 = "รองเท้าติดดอกไม้สีดำเหรอ... เพิ่งเคยเห็นเลยนะเนี่ย!"
1007006-28 = "ฮึ เพราะมันคือของขวัญที่ทางมังกรดำเตรียมให้เป็นพิเศษน่ะสิ"
1007006-29 = "เทียบกับของขวัญจากย่านการค้าเทพเต่าดำที่กินแล้วหมดไป มันต่างกันมากเลยใช่มั้ยล่ะ?"
1007006-30 = "อืม... เชยชะมัดเลย ไม่มีอันอื่นแล้วเหรอ?"
1007006-32 = "ไม่ค่อยสวยเลย... ขออันสวยๆ หน่อยสิ! พี่มินะ!"
1007006-33 = "ว่าไงนะ?!"
1007006-34 = "พวกเธอนั่งตรงนั้นก่อนนะ เดี๋ยวพี่จะเล่าเรื่องอะไรให้ฟัง..."
1007006-40 = "ก่อนอื่นเลย ชุดนี้เป็นชุดที่ตัดเย็บโดยช่างตัดเย็บที่เก่งที่สุดของมังกรดำ"
1007006-41 = "เราตัดเย็บโดยใส่จิตวิญญาณ ขนบธรรมเนียม คุณค่าของซานไห่จิงและมังกรดำเข้าไปในเสื้อผ้าด้วย"
1007006-42 = "ทุกชิ้นส่วน ตัดเย็บโดยใส่ความหมายและสัญลักษณ์เข้าไป..."
1007006-43 = "ต่อมาก็คือรองเท้า! สีดำเป็นสีของมังกรดำและสื่อถึงความเคร่งขรึม เด็ดขาด ซื่อตรงและความยุติธรรม"
1007006-44 = "เราอยากให้เด็กๆ สวนต้นบ๊วยเติบโตอย่างมีคุณภาพและกลายเป็นคนดีของซานไห่จิง..."
1007006-45 = "พูดจบแล้วปลุกทีนะ พี่มินะ"
1007006-46 = "อ้อ... หนูเคยได้ยินมาว่ากุหลาบดำมีอีกความหมายหนึ่งก็คือการแยกจากกันนะ งั้นก็แปลว่าพวกเราจะ#nแยกจากกันเหรอ?"
1007006-47 = "มะ... ไม่ใช่อย่างนั้น~!"
1007006-52 = "โอย... ปวดหลังจัง..."
1007006-53 = "[s] \"เล่นกับเด็กๆ สนุกมั้ย?\""
1007006-54 = "อืม นับว่าใช้เวลาได้คุ้มค่าทีเดียว"
1007006-55 = "ถึงพวกเขาจะเอาแต่กระชากแขนสองข้างหรือวิ่งมาขอกอดตามอำเภอใจ..."
1007006-56 = "พวกเขาอาจจะหยุมหัว กรีดร้องหรือกระโดดไปมาไม่ฟังสิ่งที่เราบอกไปบ้าง แต่เด็กก็คือเด็ก"
1007006-57 = "[s] \"บางทีครูก็รับมือไม่ไหวเหมือนกัน...\""
1007006-58 = "คิดเสียว่าเราใช้หนี้เก่าของตัวเองละกันนะ"
1007006-59 = "เพราะทุกคนก็เคยเป็นเด็กมาก่อนทั้งนั้น"
1007006-62 = "[ns] \"......\""
1007006-63 = "อะ... อะไรกันคุณครู ทำหน้าเหมือนเจอเรื่องมหัศจรรย์มาเลย"
1007006-64 = "หืม? ไม่คิดว่าฉันจะพูดประโยคคมคายแบบนั้นออกมางั้นเหรอ?"
1007006-65 = "ฮุ ถ้าฉันเอาจริงขึ้นมาก็ประมาณนี้แหละนะ โปรดรู้ไว้ด้วย"
1007006-66 = "ทุกครั้งที่มองเด็กๆ ฉันจะนึกถึงอะไรบางอย่าง..."
1007006-67 = "เมื่อเด็กพวกนั้นโตขึ้นพวกเขาจะเป็นนักเรียนแบบไหนกัน และฉันเอง... จะเป็นรุ่นพี่ที่ดีสำหรับพวกเขา#nหรือเปล่า"
1007006-68 = "คุณครู... อ้อ จริงด้วย คุณครูเป็นผู้ใหญ่แล้วคงเลิกคิดเรื่องพวกนี้ไปนานแล้วละเนอะ"
1007006-69 = "[s1] \"ก็ไม่เสมอไปหรอก\"\n[s2] \"แค่เวลาผ่านไปไม่ได้บ่งบอกว่าเราเป็นผู้ใหญ่ขึ้นหรอกนะ\""
1007006-72 = "อย่างนั้นเหรอ? ไม่เห็นเข้าใจเลย"
1007006-73 = "แต่ก็นั่นละ บางครั้งคุณครูก็มีมุมที่ฉันไม่เข้าใจอยู่เหมือนกัน"
1007006-74 = "เป็นเพราะ...ความเป็นผู้ใหญ่หรือเปล่านะ"
1007006-75 = "[s] \"ถ้าเธอมองแบบนั้น ครูก็โล่งใจนะ\""
1007006-76 = "ฟังแล้วรู้สึกเหมือนครูเห็นต่างเลย"
1007006-77 = "[s] \"อืม มันเหมือนเป็ดที่ดิ้นรน... เพราะไม่อยากจมน้ำนั่นแหละ\""
1007006-78 = "นึกว่าจะบอกว่าหงส์ซะอีกนะ..."
1007006-79 = "ไม่กล้าพูดแบบนั้นหรอกงั้นเหรอ? ฮึ... อย่างนี้นี่เอง"
1007006-84 = "<ไม่ว่าใครก็มีมุมเหมือนเด็กทั้งนั้น ต่อให้เวลาผ่านไปหรืออายุมากขึ้นเท่าไรก็ตาม>"
1007006-88 = "[ns] \"<เหตุผลที่เราต้องใจดีกับตัวเอง เพราะมันคือความสงบเดียวที่มีได้ในโลกแห่งนี้>\""
1007006-89 = "<เมื่อสายลมฝนเริ่มพัดกระหน่ำนั่นหมายความว่ามันสายไปแล้ว หากเปลี่ยนอะไรไม่ได้ก็ทำได้แค่ยอม#nตากฝน>"
1007006-91 = "(จากนั้นคุณครูก็พูดคุยกับมินะตลอดระหว่างทางกลับไปที่ชาเล่ต์)"

[translation]
1007006-1 = "Time Marches On"
1007006-2 = "Plum Blossom Garden"
1007006-4 = "Hey! It's Mina!"
1007006-5 = "Mina! Give me a piggyback ride!"
1007006-6 = "Heh... How're you doing today, my cute little soldiers?"
1007006-7 = "She said something weird again..."
1007006-9 = "I don't wanna play if you say things like that!"
1007006-10 = "No no no! What're you talking about? I don't talk weird!"
1007006-11 = "Oh, I know... Everyone, line up. I brought gifts!"
1007006-12 = "[s] \"I didn't know you like kids, Mina.\""
1007006-13 = "...Huh?!"
1007006-14 = "A-Actually! The Plum Blossom Garden kids are..."
1007006-15 = "...the future of Shanhaijing!"
1007006-16 = "That's what Rumi says."
1007006-18 = "She always brings us fruits and snacks, and she lets us have as much as we want!"
1007006-19 = "Black Tortoise Promenade snakes... Trying to win the kids over with food...!"
1007006-20 = "What an underhanded tactic. I won't stand for it!"
1007006-21 = "[s] \"Isn't that a bit much? Everyone loves kids...\""
1007006-22 = "Sensei, are you taking their side? Are you here to spy on me for them?!"
1007006-23 = "[s] \"I would never spy on my students...\""
1007006-24 = "Hmph... If you say so."
1007006-25 = "Anyway, kids... Here you go! New clothes for you!"
1007006-26 = "Mmm... This looks like Genryumon's costumes."
1007006-27 = "Look at the flowers on these shoes... I never saw any like that before."
1007006-28 = "Heh. Genryumon had these made just for you."
1007006-29 = "And, unlike the gifts from the Black Tortoise Promenade, you can enjoy these for a good long time."
1007006-30 = "This is lame. Got anything else?"
1007006-32 = "I want pretty things. Gimme something pretty!"
1007006-33 = "What?!"
1007006-34 = "You don't understand what you're saying here. Sit down, and let me lay it all out for you..."
1007006-40 = "These clothes were hand-stitched by the best tailor in Genryumon."
1007006-41 = "The cloth carries within it the spirit, traditions, and values of Shanhaijing and Genryumon!"
1007006-42 = "Every stitch, every design, is heavy with symbolism."
1007006-43 = "And the shoes! Black is the color of Genryumon, because it represents resoluteness, determination, integrity, and fairness."
1007006-44 = "We made this to help you, the children of the Plum Blossom Gardens, grow into great members of Shanhaijing someday."
1007006-45 = "Wake me up when you're done talking..."
1007006-46 = "Um... I heard that black roses mean goodbye. Are you going away, Mina?"
1007006-47 = "Th-That's not what I mean at all!"
1007006-52 = "Oooh... My back..."
1007006-53 = "[s] \"Did you have fun playing with the children today?\""
1007006-54 = "It was time well spent."
1007006-55 = "They crowded around me, begged for hugs..."
1007006-56 = "Pulled my hair... Screamed in my ear... Ignored me when I talked... But hey, they're kids."
1007006-57 = "[s] \"They give me a run for my money sometimes, too.\""
1007006-58 = "In a way, it's like paying back a debt, right?"
1007006-59 = "We were all kids at some point, after all."
1007006-62 = "[ns] \"...\""
1007006-63 = "What's with the look, Sensei?"
1007006-64 = "Surprised to hear such wisdom coming from me?"
1007006-65 = "Heh. I'm just glad you got to see what I'm made of today."
1007006-66 = "When I see those kids, I start thinking..."
1007006-67 = "What kind of students will they be when they grow up? Will I be someone they can look up to?"
1007006-68 = "Ah, but you're an adult. You probably gave up those kinds of thoughts long ago."
1007006-69 = "[s1] \"I don't think they ever fully go away.\"\n[s2] \"Growing older doesn't automatically make you into an adult.\""
1007006-72 = "Really? I didn't know that."
1007006-73 = "I guess I do see that side of you sometimes."
1007006-74 = "But you always seem like you know what you're doing. "
1007006-75 = "[s] \"I'm glad I seem that way!\""
1007006-76 = "You're saying you don't?"
1007006-77 = "[s] \"On the inside, I'm like...a duck trying not to sink.\""
1007006-78 = "Most ducks would probably just call that swimming."
1007006-79 = "Oh, what's the matter? Did I strike a nerve?"
1007006-84 = "A dame once told me we're all children still, deep inside. No matter how many years go by..."
1007006-88 = "[ns] \"You've gotta make peace with yourself. It's the only peace any of us get in this mad, mad world.\""
1007006-89 = "By the time that first drop hits your head, it's too late. You've just got to accept the rain."
1007006-91 = "Mina and I shared this and other hard-boiled wisdom as we strolled along the street back to Schale."

[translation]
1007006-1 = "即使時間流逝"
1007006-2 = "山海經．梅花園"
1007006-4 = "哇啊～是美奈姐姐～！"
1007006-5 = "美奈姐姐！背我！"
1007006-6 = "呼……真拿你們沒辦法，要照順序來哦。#n過的還好嗎，小不點們。"
1007006-7 = "啊，美奈姐姐又說我們是小不點了。"
1007006-9 = "再說那種話就不跟你玩了哦？"
1007006-10 = "沒有，應該是你們聽錯了吧！？#n姐姐我什麼都沒說哦！"
1007006-11 = "來！有禮物哦，禮物！#n每個人都有一份，要乖乖排隊領哦。"
1007006-12 = "[s]「原來美奈喜歡小朋友啊。」"
1007006-13 = "……！？"
1007006-14 = "梅花園的小朋友們是……那個，對了。"
1007006-15 = "是山海經的未來啊！"
1007006-16 = "啊，瑠美姐姐也常這麼說！"
1007006-18 = "瑠美姐姐常常會帶很多水果和點心來……#n每次都會在煮飯的時候這麼說！"
1007006-19 = "玄武商會是從什麼時候開始用食物哄騙孩子的……！？"
1007006-20 = "居然用這種卑劣的手段……不能坐視不管！"
1007006-21 = "[s]「只是單純在疼愛小朋友們而已吧？」"
1007006-22 = "老師也是站在玄武商會那邊的嗎！？#n明明都和我一起來梅花園了！？"
1007006-23 = "[s]「我是站在學生們這邊的……」"
1007006-24 = "哼……好吧。"
1007006-25 = "乖孩子們，今天的禮物可是很酷的哦？#n……是新衣服跟鞋子！"
1007006-26 = "咦……這是不是很像玄龍門的衣服？"
1007006-27 = "這雙鞋子，黑色的花朵裝飾真大呢！"
1007006-28 = "呵，畢竟是玄龍門特別準備的東西啊。"
1007006-29 = "跟吃完就沒了的那種禮物就是不一樣對吧？"
1007006-30 = "唔嗯～不過我好像沒有很喜歡。"
1007006-32 = "美奈姐姐，我想要可愛的洋裝！"
1007006-33 = "你說什麼！？"
1007006-34 = "大家，來這邊集合一下。#n現在開始，姐姐要告訴你們一些非～常重要的話。"
1007006-40 = "首先，這套衣服是由玄龍門最頂級的裁縫師製作的──"
1007006-41 = "融入了山海經──玄龍門的傳統、價值，以及精神……"
1007006-42 = "你們看這邊。仔細看！就連細節都如此用心！"
1007006-43 = "鞋子也是一樣！黑色是玄龍門的代表色。#n是毅然且公正，同時具備決斷力的玄龍門才配得上的──"
1007006-44 = "這都是因為希望梅花園的所有孩子們可以好好長大，#n成為山海經優秀的一份子啊……"
1007006-45 = "美奈姐姐，說完再叫醒我～"
1007006-46 = "那個，黑玫瑰的花語好像是「怨恨」……#n美奈姐姐恨我們嗎……？"
1007006-47 = "不，不是那樣的～～～！"
1007006-52 = "腰……好痛。"
1007006-53 = "[s]「跟孩子們玩得很開心呢。」"
1007006-54 = "啊啊，是段很有意義的時光。"
1007006-55 = "像是從兩邊拉我的手臂，或是氣勢滿滿地跑來抱我……"
1007006-56 = "或是扯我的頭髮，在耳邊大叫，因為會不聽話地跑來跑去所以必須緊緊盯著……#n不過這樣才是孩子啊。"
1007006-57 = "[s]「有時候會覺得無力招架對吧……」"
1007006-58 = "把這視為一種回饋的話，其實也不算什麼。"
1007006-59 = "畢竟每個人都有孩童時期啊。"
1007006-62 = "[ns]「……」"
1007006-63 = "怎，怎麼了，老師。#n露出那種目瞪口呆的表情。"
1007006-64 = "……嗯？沒想到我會說出這麼有哲理的話？"
1007006-65 = "呵，希望老師記得這只是我稍微小試身手的程度而已。"
1007006-66 = "……每當看到孩子的時候，我都會這麼想。"
1007006-67 = "那些孩子們長大後會變成什麼樣的學生呢。#n而那個時候……我是否成為了一個好的大人了呢。"
1007006-68 = "老師你……也對。#n成為大人之後，自然就能獲得解答了吧。"
1007006-69 = "[s1]「那倒未必哦。」\n[s2]「並不是只要時間過去就能成為大人。」"
1007006-72 = "是這樣嗎？老師了解的事情真多呢。"
1007006-73 = "不，也不止現在是這樣吧。"
1007006-74 = "……這就是，大人的從容。"
1007006-75 = "[s]「要是看起來是這樣就好了。」"
1007006-76 = "聽你這麼說，好像事實並非如此呢。"
1007006-77 = "[s]「嗯，就像是……為了不沉下去而拚死掙扎著的鴨子一樣。」"
1007006-78 = "那還真是希望能有天鵝一般的從容呢。"
1007006-79 = "但是，也沒必要妄自菲薄不是嗎？#n……不，這樣啊。"
1007006-84 = "「每個人都有一顆赤子之心。無論經歷多少時間，無論增長多少歲月──」"
1007006-88 = "[ns]「『不得不與自己和解的理由，是因為這是我們唯一能做的事』。」"
1007006-89 = "「當潮濕的風開始吹起便為時已晚。只能接受大雨淋下。」"
1007006-91 = "（就這樣，和美奈快樂地聊天後回到了夏萊）"

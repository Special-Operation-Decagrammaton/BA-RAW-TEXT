[translation]
2001202-1 = "Transporting the Wounded"
2001202-2 = "Sena informed of a fight that broke out, so I headed to the scene because I was concerned for the students."
2001202-3 = "Fights aren't uncommon at Gehenna, but there seemed to be more wounded students than usual this time."
2001202-6 = "I then spotted Sena directing Medical Emergency Club members among all of the injured students."
2001202-7 = "Place the corpses—I mean, the injured—into the ambulance.#nHave those who can still walk wait over there."
2001202-8 = "Feel free to fire warning shots at any students pretending to be unconscious to see if they're really injured or not."
2001202-9 = "Let's get moving."
2001202-11 = "Go!"
2001202-16 = "Arrrgh! Okay, okay! I'll walk, I'll walk!"
2001202-17 = "Who shoots at people who could be injured, anyway?!#nAre you people crazy?!"
2001202-18 = "Gather back here once you're done moving the fakers."
2001202-19 = "The fighting hasn't ceased. We need to prepare for the possibility of more dead bodies—I mean, injured bodies."
2001202-23 = "Hold."
2001202-24 = "Holding!!!"
2001202-25 = "I have to leave for a moment. Continue following protocol while I'm gone."
2001202-26 = " Proceed."
2001202-27 = "Proceeding!!!"
2001202-34 = "Hello, Sensei. What brings you here?"
2001202-35 = "I thought my message made it clear you should avoid this place.#nIt's still chaotic here."
2001202-36 = "Huh?"
2001202-37 = "You came to check on me because you were worried?"
2001202-38 = "Oh."
2001202-39 = "I see. I suppose I shouldn't be surprised that you couldn't simply ignore a situation like this."
2001202-40 = "Then it's my responsibility that you came here. I apologize."
2001202-41 = "I'll refrain from informing you about situations like these from now on."
2001202-42 = "Hmm? That's not the issue at hand?"
2001202-43 = "You truly don't mind being wrapped up in something like this?#nBut..."
2001202-44 = "Very well, Sensei. I'll continue to keep you in the loop if you insist."
2001202-45 = "You think I'm...overworking myself?"
2001202-46 = "I appreciate your concern, but you needn't worry about me.#nThis is my job."
2001202-47 = "Today's conflict has been more serious than usual, and there have been more casualties than the average..."
2001202-48 = "By which I mean injured students, of course."
2001202-49 = "Still, the Prefect Team will be here shortly to get the situation under control.#nOur club doesn't need to go to the front lines."
2001202-50 = "Right on cue. The Prefect Team has arrived."
2001202-56 = "We're on the scene! Arrest everyone!"
2001202-57 = "Wipe them all out! Haaaaaah!"
2001202-67 = "As I was saying..."
2001202-68 = "[s1] \"It's always like this.\"\n[s2] \"Just another day at Gehenna.\""
2001202-69 = "Right. The same goes for our club. We're only taking care of the injured as usual."
2001202-70 = "Right. The same goes for our club. We're only taking care of the injured as usual."
2001202-71 = "We would never get anything done if we involved ourselves in anything beyond our job description. That's how Gehenna is."
2001202-72 = "We should be getting back to work, then."
2001202-73 = "Wait!"
2001202-79 = "Stop. You belong to the Medical Emergency Club, correct?"
2001202-80 = "I'm Himuro Sena, the president. What can I do for you?"
2001202-81 = "Y-You're the president? Excuse my manners, then."
2001202-82 = "I came to talk to you about that injured student lying over there.#nShe's one of the masterminds behind this incident."
2001202-83 = "I see."
2001202-84 = "And?"
2001202-85 = "Wh-What do you mean \"and\"?"
2001202-86 = "I'm asking you why you're speaking to me about that student."
2001202-87 = "B-Because she needs to be taken into interrogation. Therefore, I need you to hand her over to us."
2001202-88 = "That won't be possible."
2001202-89 = "Huh?"
2001202-90 = "The Medical Emergency Club is in charge of the injured as soon as they're found. There are no exceptions."
2001202-91 = "You'll have to wait until they've recovered."
2001202-92 = "That's preposterous. We have an investigation to conduct!"
2001202-93 = "We'll have to use force if you don't comply."
2001202-94 = "Have it your way..."
2001202-100 = "[s] \"Sena?!\""
2001202-103 = "One more wounded over here."
2001202-104 = "They're unconscious. Please load them into an ambulance."
2001202-105 = "That's an order."
2001202-106 = "Understood!"
2001202-110 = "[ns3] \"Can you DO that?\"\n[ns4] \"I think that borders on kidnapping.\""
2001202-111 = "It's fine. I knocked her out with a grenade, but she's not seriously injured."
2001202-112 = "It's fine. I knocked her out with a grenade, but she's not seriously injured."
2001202-113 = "This was the most efficient way to deal with the situation."
2001202-114 = "Hmm..."
2001202-121 = "I believe all of the dead are accounted for now."
2001202-122 = "[s5] \"You mean the injured.\"\n[s6] \"You really can't break that habit, huh?\""
2001202-127 = "Sorry, but I have work to do. I'll be leaving now."
2001202-128 = "Until next time."
2001202-134 = "[ns] \"...\""
2001202-136 = "Sena and the Medical Emergency Club members finished loading all of the injured into their ambulances and left the scene."

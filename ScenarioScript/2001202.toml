2001202-43 = "4;세나;01;신경 쓰지 말라……는 말씀입니까? 그치만……."
2001202-44 = "4;세나;99;……아닙니다. 네. 선생님께서 그렇게 말씀하신다면, 이 건에 대해선 현행을 유지하는 것으로."
2001202-45 = "4;세나;02;……네? 일이 많아서 힘들겠다고요?"
2001202-46 = "4;세나;01;말씀은 감사하지만 제 쪽은 신경 써 주실 필요 없습니다. 그저 늘 하던 일을 계속하는 것뿐이니까요."

[translation]
2001202-1 = "因為是傷患"
2001202-2 = "（訊息內容實在非常令人擔心，所以我去了瀬奈說的事件現場）"
2001202-3 = "（雖然這在格黑娜不是罕見的事，但到處都能看到受傷的學生）"
2001202-6 = "（在那些學生的旁邊，瀨奈正在指揮急救醫學部的成員們）"
2001202-7 = "把屍體……更正，把傷患送上救護車。能自己走路的傷患先到另一邊待著。"
2001202-8 = "如果有學生懶得走路假裝暈倒，可以先朝他們射擊再確認他們是不是真的暈倒。"
2001202-9 = "……現在，開始動作。"
2001202-11 = "是！！"
2001202-16 = "呃啊啊啊！知道了，知道了啦！我走就是了，我走！"
2001202-17 = "要確認也不能輕易開槍吧！要是真走不了該怎麼辦！？"
2001202-18 = "……移送完傷患之後，所有人再回來這裡集合。"
2001202-19 = "對面的戰鬥還沒結束，應該會有更多屍……傷患。因此我們之後……"
2001202-23 = "……所有人注意。"
2001202-24 = "是！！"
2001202-25 = "我要暫時離開。請各位依照原定計畫執行作業。"
2001202-26 = " ……那麼，開始動作。"
2001202-27 = "是！！"
2001202-34 = "想不到老師竟然會過來。老師怎麼會來這裡……？"
2001202-35 = "我應該有傳訊息給你，說這裡很危險吧？請你到其他地方……"
2001202-36 = "……什麼？"
2001202-37 = "你是因為擔心才來的……？"
2001202-38 = "……啊。"
2001202-39 = "原來是這樣子……說的也是，從老師的立場來看，要置之不理反而更困難。"
2001202-40 = "結果現在也算是變相的把老師叫來了。非常抱歉，是我誤判了。"
2001202-41 = "為避免以後發生同樣的狀況，我會修改訊息傳送的相關設定。"
2001202-42 = "不是那個意思？"
2001202-43 = "就算老師叫我別在意……"
2001202-44 = "……是。既然老師這麼說了。"
2001202-45 = "……你想要幫忙？"
2001202-46 = "謝謝老師的心意，但不勞老師費心。基本上都是尋常性的工作。"
2001202-47 = "確實，這次發生了預料之外的長期抗戰，屍……"
2001202-48 = "……更正，傷患數量也確實因此較多。"
2001202-49 = "但風紀委員會稍後就會趕到。到時候基本上就不歸我們管轄了。"
2001202-50 = "啊，說曹操曹操到。"
2001202-56 = "好了，全部抓回去！"
2001202-57 = "用最快速度掃蕩，鎮壓現場狀況！"
2001202-67 = "……嗯，到目前為止都一如往常。"
2001202-68 = "[s1]「這狀況是一如往常啊……」\n[s2]「一如往常的格黑娜呢……」"
2001202-69 = "沒錯。接著等現場清理完，我們就只要把傷患處理好就行了。"
2001202-70 = "沒錯。接著等現場清理完，我們就只要把傷患處理好就行了。"
2001202-71 = "除此之外，我們目前實在沒有人手去思考多餘的狀況了。"
2001202-72 = "那我要回去工作了……"
2001202-73 = "那位！"
2001202-79 = "你是急救醫學部的嗎？"
2001202-80 = "是，我是部長氷室瀬奈。有什麼事嗎？"
2001202-81 = "部，部長……？抱歉，我失禮了。"
2001202-82 = "其實這起事件的主謀之一，正和其他傷患一起躺在那裡。"
2001202-83 = "……是，我明白了。"
2001202-84 = "……所以呢？"
2001202-85 = "所以呢……是什麼意思？"
2001202-86 = "我在問你，所以你現在是要我怎麼做。"
2001202-87 = "因，因為我們必須帶她去做筆錄，所以希望你能把她轉交給我們……"
2001202-88 = "我拒絕。"
2001202-89 = "……咦？"
2001202-90 = "急救醫學部接到傷患的瞬間，該名傷患就屬於我們管轄。沒有例外。"
2001202-91 = "對於該名學生的任何處置，都請等到治療結束再說。"
2001202-92 = "可，可是，我們必須要調查整起事件的經過……！"
2001202-93 = "算了，既然如此就算用搶的……"
2001202-94 = "……是嗎。"
2001202-100 = "[ns]「咦？瀬奈……？」"
2001202-103 = "……看來她昏過去了。"
2001202-104 = "追加一名傷患。"
2001202-105 = "馬上送上救護車帶走。"
2001202-106 = "是！！"
2001202-110 = "[ns3]「咦……？」\n[ns4]「你手段也太硬了吧……？」"
2001202-111 = "別擔心。我只是透過衝擊使她失去意識，沒有真的開槍打她，也沒有讓她受傷。"
2001202-112 = "別擔心。我只是透過衝擊使她失去意識，沒有真的開槍打她，也沒有讓她受傷。"
2001202-113 = "而且我判斷剛才如果要低調處理，這就是最好的方法。"
2001202-114 = "……好了。"
2001202-121 = "那現在屍體都裝載的差不多了……"
2001202-122 = "[s5]「瀬奈，你沒在更正用詞了……」\n[s6]「你已經完全不藏了呀……」"
2001202-127 = "總之不好意思，今天還要處理善後，先失陪了。"
2001202-128 = "老師再見……"
2001202-134 = "[ns]「……」"
2001202-136 = "（於是，瀬奈和急救醫學部的成員將「傷患」全部搬上車之後，便快速離開了現場）"

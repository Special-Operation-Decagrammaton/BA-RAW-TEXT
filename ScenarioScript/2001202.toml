[translation]
2001202-1 = "ส่งตัวคนบาดเจ็บ"
2001202-2 = "(คุณครูเป็นห่วงพวกนักเรียน เลยออกไปยังสถานที่เกิดเหตุตามที่เซนะบอก)"
2001202-3 = "(ถึงจะไม่ใช่เรื่องแปลกใหม่ในเกเฮนน่า แต่ดูเหมือนครั้งนี้จะเกิดเรื่องใหญ่โตจนมีเด็กนักเรียน#nบาดเจ็บอยู่เต็มไปหมด)"
2001202-6 = "(...เซนะที่เป็นหัวหน้าหน่วยแพทย์ฉุกเฉินยืนอยู่ท่ามกลางเด็กนักเรียนที่หมดสติอยู่)"
2001202-7 = "...พาศพ...ไม่สิ ขอโทษค่ะ พาคนบาดเจ็บไปที่รถพยาบาล ส่วนคนที่ยังเดินเองได้ก็ประคอง#nไปพักรอทางด้านนั้นก่อน"
2001202-8 = "นักเรียนคนไหนที่ขี้เกียจเดินแล้วแกล้งหมดสติ ให้ลองยิงเพื่อตรวจสอบดูว่าหมดสติ#nจริงหรือเปล่าได้เลยค่ะ"
2001202-9 = "...ลงมือปฏิบัติได้เลยค่ะ"
2001202-11 = "ปฏิบัติค่ะ!!"
2001202-16 = "โอ๊ยยยยย!! เข้าใจแล้ว บอกว่าเข้าใจแล้วไง!! แค่เดินไปใช่มั้ย ฉันเดินไปก็ได้!"
2001202-17 = "ถึงกับยิงคนไข้เนี่ยนะ...! บ้าระห่ำกันจริงๆ!"
2001202-18 = "...แล้วก็สมาชิกที่ทำการเคลื่อนย้ายผู้บาดเจ็บเรียบร้อยแล้วให้กลับมารวมตัวกันที่นี่อีกครั้งด้วยค่ะ"
2001202-19 = "การต่อสู้ยังไม่จบแต่ว่าศพ...ไม่สิ ผู้บาดเจ็บยังคงเพิ่มขึ้นเรื่อยๆ เราต้องเตรียมการรับมือขั้นต่อไป..."
2001202-23 = "...ต้องควบคุมสถานการณ์ค่ะ"
2001202-24 = "เข้าควบคุมสถานการณ์ค่ะ!!"
2001202-25 = "ฉันขอตัวสักครู่นะคะ... ทุกคนกรุณาปฏิบัติตามกฏต่อไปด้วยค่ะ"
2001202-26 = "ดำเนินการต่อได้ค่ะ"
2001202-27 = "ปฏิบัติค่ะ!!"
2001202-34 = "ขอโทษค่ะ คุณครูเองเหรอคะ มาที่นี่มีธุระอะไรหรือเปล่าคะ"
2001202-35 = "ฉันส่งข้อความแจ้งไปแล้วว่าที่นี่เกิดเรื่องวุ่นวายขึ้นนี่ค่ะ คุณครูควรไปที่อื่นจะดีกว่านะคะ..."
2001202-36 = "คะ...?"
2001202-37 = "เป็นห่วงก็เลยมาหา... อย่างนั้นเหรอคะ?"
2001202-38 = "เอ่อ..."
2001202-39 = "แบบนี้นี่เอง ถ้าเป็นคุณครูละก็ คงไม่มีทางนิ่งนอนใจได้สินะคะ"
2001202-40 = "กลายเป็นว่าฉันเรียกคุณครูมาโดยไม่ตั้งใจซะแล้ว ขอโทษด้วยนะคะ ฉันทำผิดพลาดเองค่ะ"
2001202-41 = "ต่อไปจะไม่ส่งข้อความแจ้งเตือนแบบนี้ไปให้คุณครูอีกค่ะ"
2001202-42 = "หืม? ไม่ได้หมายความว่าอย่างนั้นเหรอคะ?"
2001202-43 = "โดนลากให้มาเกี่ยวข้องกับสถานการณ์แบบนี้ก็ไม่เป็นไรงั้นเหรอคะ..."
2001202-44 = "ค่ะ ถ้าคุณครูพูดแบบนั้น ฉันก็จะทำตามค่ะ"
2001202-45 = "คะ...? งานเยอะคงจะเหนื่อยน่าดูอย่างนั้นเหรอคะ?"
2001202-46 = "ขอบคุณที่เป็นห่วงค่ะ แต่ไม่ต้องเป็นห่วงพวกเราหรอกค่ะ เราแค่ทำในสิ่งที่เคยทำมาตลอดเท่านั้นค่ะ"
2001202-47 = "เพราะว่าครั้งนี้การต่อสู้ยืดเยื้อ ศพก็เลยเยอะกว่าที่คิด..."
2001202-48 = "เอ่อ หมายถึงผู้บาดเจ็บค่อนข้างเยอะ..."
2001202-49 = "อีกสักพักคณะกรรมการวินัยก็จะคงเข้ามาจัดการแล้วค่ะ พวกเราไม่จำเป็นต้องเข้าไปต่อสู้แนวหน้า#nหรอกค่ะ"
2001202-50 = "คณะกรรมการวินัยมาถึงพอดีเลยค่ะ"
2001202-56 = "ถึงที่เกิดเหตุแล้ว! จับกุมให้หมดทุกคน!!"
2001202-57 = "รวบตัวมาให้หมดทุกคน!! ลงมือได้!!"
2001202-67 = "...ก็อย่างที่เห็นค่ะ"
2001202-68 = "[s1] “เป็นแบบนี้ตลอดเลยสินะ”\n[s2] “เกเฮนน่าก็คือเกเฮนน่าจริงๆ นะ”"
2001202-69 = "ใช่แล้วค่ะ ไม่ว่าเมื่อไร พวกเราแค่ทำหน้าที่ดูแลคนบาดเจ็บก็พอค่ะ"
2001202-70 = "ใช่แล้วค่ะ ไม่ว่าเมื่อไร พวกเราแค่ทำหน้าที่ดูแลคนบาดเจ็บก็พอค่ะ"
2001202-71 = "ที่เกเฮนน่าต่อให้กังวลเกี่ยวกับสิ่งที่นอกเหนือจากความรับผิดชอบไปก็ทำอะไรไม่ได้ค่ะ"
2001202-72 = "ถ้าอย่างนั้นฉันขอกลับไปทำงานต่อก่อนนะคะ..."
2001202-73 = "เดี๋ยวก่อน!"
2001202-79 = "หยุดก่อน คนของหน่วยแพทย์ฉุกเฉินใช่มั้ย?"
2001202-80 = "หัวหน้าหน่วยแพทย์ฉุกเฉิน ฮิมูโระ เซนะค่ะ มีธุระอะไรเหรอคะ?"
2001202-81 = "อ่า หะ... หัวหน้า? งะ...งั้นเหรอคะ..... ขอโทษด้วยค่ะ"
2001202-82 = "คือว่าคนบาดเจ็บที่อยู่ตรงนั้น คือหนึ่งในหัวหน้าของกลุ่มที่ก่อเรื่องครั้งนี้ค่ะ"
2001202-83 = "อย่างนั้นเหรอคะ"
2001202-84 = "แล้วยังไงเหรอคะ...?"
2001202-85 = "\"แล้วยังไงเหรอคะ\" งั้นเหรอ...?"
2001202-86 = "ฉันแค่จะถามเท่านั้นค่ะ ว่าคุณถามถึงเด็กคนนั้นทำไม"
2001202-87 = "คะ... คือว่า พวกเราจะต้องพาตัวไปสอบสวน... เลยจะขอให้ส่งตัวเธอมาให้เราได้รึเปล่าน่ะค่ะ...?"
2001202-88 = "ขอปฏิเสธค่ะ..."
2001202-89 = "คะ...?"
2001202-90 = "นับตั้งแต่วินาทีที่หน่วยแพทย์ฉุกเฉินดูแลคนบาดเจ็บ ทุกคนก็จะอยู่ใน ‘การดูแลของหน่วยแพทย์ฉุกเฉิน’#nทั้งหมด ไม่มีข้อยกเว้นค่ะ"
2001202-91 = "กรุณาดำเนินการต่อหลังจากที่รักษาพยาบาลเสร็จสิ้นแล้วด้วยนะคะ"
2001202-92 = "เดี๋ยวสิ! พูดเรื่องอะไรกันน่ะ... ทางเราต้องตรวจสอบเรื่องราวทั้งหมดก่อนนะ!"
2001202-93 = "ไม่ได้การแล้ว คงต้องใช้กำลังพาตัวไป..."
2001202-94 = "เอาอย่างนั้นเหรอคะ..."
2001202-100 = "[ns] “เซนะ...?”"
2001202-103 = "มีคนหมดสติอีกหนึ่งคนอยู่ตรงนี้ค่ะ"
2001202-104 = "มีผู้บาดเจ็บและหมดสติอีกคนค่ะ กรุณาพาไปที่รถพยาบาลด่วนเลยค่ะ"
2001202-105 = "นี่เป็นคำสั่งค่ะ"
2001202-106 = "ปฏิบัติค่ะ!!"
2001202-110 = "[ns3] “แบบนี้จะไม่เป็นอะไรเหรอ?”\n[ns4] “นี่มันเหมือนการลักพาตัวเลยไม่ใช่เหรอ?”"
2001202-111 = "ไม่เป็นไรหรอกค่ะ แค่ใช้ระเบิดทำให้หมดสติไปก็เท่านั้น ไม่ได้บาดเจ็บสาหัสอะไรหรอกค่ะ"
2001202-112 = "ไม่เป็นไรหรอกค่ะ แค่ใช้ระเบิดทำให้หมดสติไปก็เท่านั้น ไม่ได้บาดเจ็บสาหัสอะไรหรอกค่ะ"
2001202-113 = "นี่เป็นวิธีที่ได้ผลที่สุดในการรับมือกับสถานการณ์แบบนี้ค่ะ"
2001202-114 = "อืม..."
2001202-121 = "เท่านี้ก็เหมือนว่าจะขนย้ายศพไปหมดแล้วนะคะ"
2001202-122 = "[s5] “สับสนคำอีกแล้วเหรอ เซนะ”\n[s6] “เรียกแบบนั้นจนติดปากไปแล้วสินะ”"
2001202-127 = "ขอโทษด้วยค่ะ ฉันต้องรีบไปทำงานวันนี้ต่อให้เสร็จ ขอตัวก่อนนะคะ"
2001202-128 = "ถ้างั้น..."
2001202-134 = "[ns] \"...\""
2001202-136 = "(หลังจากขนย้าย \"ผู้บาดเจ็บ\" ไปที่รถพยาบาลได้หมด เซนะกับสมาชิกหน่วยแพทย์ฉุกเฉินก็หายไป)"

[translation]
10024025-3 = "ปะ... เป็นไปได้ไง...!"
10024025-5 = "ชักสนุกแล้วละสิ จากนิสัยของยัยคิซากินั่น เธอไม่ออกคำสั่งกับเรื่องแบบนี้หรอก"
10024025-7 = "พะ... พวกเธอจะไปรู้เรื่องของท่านประมุขได้ยังไง!"
10024025-8 = "จิตใจคนเรานั้นยากแท้หยั่งถึงจริงๆ"
10024025-9 = "มันไม่มีราคากำกับเหมือนสินค้า จะเขย่าดูก็ไม่ได้อีก"
10024025-10 = "แต่ถึงอย่างนั้น ฉันก็คิดว่าตัวเองอาจจะรู้จักท่านประมุขดีที่สุดในบรรดาคนที่อยู่ในนี้ก็ได้นะ?"
10024025-11 = "สามหาว!"
10024025-12 = "คุณนั่นแหละค่ะที่สามหาว"
10024025-14 = "ในเมื่อคุณเป็นคนก่อเรื่องกันเอาเอง งั้นพวกเราก็ประท้วงมังกรดำอย่างเป็นทางการได้สินะคะ"
10024025-16 = "ใครเขาจะไปฟังคำพูดของคนมีความผิดกันเล่า!"
10024025-17 = "คอยดูเถอะ! ฉันจะเอาคืนเรื่องราวครั้งนี้อย่างสาสมเลย!"
10024025-23 = "หายตัวไปกันเร็วจังเลยแฮะ..."
10024025-24 = "[s] \"ไม่ตามไปจะไม่เป็นอะไรเหรอ?\""
10024025-25 = "เรายังอยู่ในเขตของมังกรดำ เพราะงั้นพวกเราเองก็ต้องระมัดระวังการกระทำด้วยน่ะ"
10024025-26 = "หวังว่าจะไม่ได้ไปเรียกพรรคพวกออกมาเพิ่มนะ... ไม่สิ ถ้าเรียกมาเพิ่ม เดี๋ยวเรื่องก็ต้องไปถึงหูคิซากิ#nเข้าสินะ"
10024025-27 = "[s] \"แล้วจะทำยังไงต่อดีล่ะ?\""
10024025-28 = "ก่อนอื่นเราก็ต้องมีข้อมูลเกี่ยวกับโสมหมื่นปีกันก่อนใช่ไหมล่ะ?"
10024025-29 = "เรื่องประท้วงมังกรดำอย่างเป็นทางการน่ะเหรอ? อืม... เดี๋ยวเอาไว้คิดบัญชีทีหลังแล้วกัน"
10024025-30 = "ตอนนี้ฉันคิดว่าเราควรแก้ข้อครหาที่โดนใส่ร้ายกันก่อนน่ะ"
10024025-32 = "และนั่นก็หมายความว่า มันมีที่ที่เราต้องไปแค่ที่เดียวยังไงล่ะ"

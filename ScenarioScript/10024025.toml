[translation]
10024025-3 = "怎，怎麼可能……！"
10024025-5 = "看來玄龍門也不是鐵板一塊呢。#n違反妃姬的意志，擅自做這種事沒問題嗎？"
10024025-7 = "你，你又懂門主大人什麼了！"
10024025-8 = "確實，要理解人心相當困難……"
10024025-9 = "即便是說出口的話，也不代表那一定就是本人的真心。"
10024025-10 = "話雖如此，至少在現場的所有人之中最了解妃姬的，我想非我莫屬哦？"
10024025-11 = "放肆！！"
10024025-12 = "那是我們要說的台詞。"
10024025-14 = "你們的獨斷專行……如果我們正式向玄龍門提出抗議，你們會落得什麼下場呢。"
10024025-16 = "誰會認真聽犯罪者的話！"
10024025-17 = "可惡，給我記住。"
10024025-23 = "哎呀，跑走了……"
10024025-24 = "[s]「不追上去沒關係嗎？」"
10024025-25 = "不管他們也無所謂吧？#n而且這裡還在玄龍門的地盤之內，要更謹慎行事的是我們。"
10024025-26 = "希望他不會叫支援過來……#n啊，不過這樣消息會傳到妃姬耳中，所以應該不至於吧……"
10024025-27 = "[s]「接下來該怎麼做呢？」"
10024025-28 = "首先去見很了解「萬年蔘」的人吧。#n我知道一個這種時候可以依靠的人。"
10024025-29 = "要向玄龍門提出抗議，之後再做也不遲……"
10024025-30 = "得先洗刷我們的嫌疑才行。"
10024025-32 = "那麼，出發吧！"

[translation]
10027125-5 = "怎麼會……老師……果然很強！"
10027125-12 = "[ns]「抱歉，瑪麗娜。我們也有不得已的苦衷。」"
10027125-16 = "啊～光靠事務局果然還是行不通啊～#n雖說有老師的幫忙，不過友情的力量還真不是蓋的呢。"
10027125-17 = "[s]「出版部部長～老師已經不想玩了～」 "
10027125-18 = "好吧，既然是我們輸了也不好再多說什麼。#n雖然可惜，但我們會乖乖撤退，原稿也不必給我了。"
10027125-19 = "呼……總算是聽懂我們的意思了……"
10027125-20 = "反正下次再找你們要別的稿子就行了。"
10027125-21 = "還沒放棄啊！？"
10027125-22 = "你以為光靠一場戰鬥就能讓一切圓滿落幕嗎！真是天真至極！#n就算擊敗了魔王，還有與公主的結婚生活在等著勇者！"
10027125-23 = "某種意義上，可以說後者才是真正的戰爭呢！呣呵呵……！"
10027125-24 = "為什麼能一臉平靜地說出那麼可怕的話啊！"
10027125-25 = "這不是我們約好的事嗎？#n我想愛瑠應該不會違背和別人之間的約定吧？"
10027125-26 = "唔！？"
10027125-27 = "[s]「嗯，這倒是事實……」"
10027125-28 = "總之出版部就先告辭了。#n期待下次再見的時候，我們能想出更好的商業合作方案。"
10027125-30 = "……希望下次的方案能讓我們雙方都滿意……"
10027125-38 = "總算是告一段落了呢。"
10027125-39 = "……引發騷動的不就是你們的部長嗎？"
10027125-40 = "部長是部長，我是我哦？"
10027125-42 = "而且現在最重要的並不是那個吧？"
10027125-43 = "[s]「終於到聽貴音評論的時候了呢……」"
10027125-45 = "咦……？這，這樣真的好嗎，老師？#n說不定會聽到什麼不想聽的話……！"
10027125-46 = "等等，那個，先不說老師，我現在的心理狀況好像不太好啊！？"
10027125-47 = "[s1]「別人的看法……有時候也是很重要的。」\n[s2]「我們堅強地面對吧……」"
10027125-50 = "唔，唔……！"
10027125-51 = "先等等。#n讓我深呼吸一下……呼，哈……呼，哈……"
10027125-57 = "被別人當成死神來對待，心情真是有點微妙呢……"
10027125-58 = "就讓我來拜讀一下吧。#n麻煩給我一些時間專心閱讀。"
10027125-69 = "那麼……是時候來說說我的感想了。"
10027125-75 = "呵，呵呵。我努力過了，真的努力過了。#n雖然努力不一定會有成果這種事，現在連幼稚園的小孩都知道。呵，呵呵，呵呵呵……"
10027125-76 = "還請務必，不要忘了我們……就算一切都不復存在，#n也請記得這裡曾經有一本書，還有一群不停談論著那本書的人……"
10027125-78 = "這是在留下遺言嗎……？"
10027125-79 = "既然提到了時間，就從這裡說起吧。#n世上沒有任何東西，是比時間更容易讓人遺忘價值的了。"
10027125-80 = "你們也很清楚吧？#n雖然大家都會考慮未來、擔心未來，但會認真思考未來的人卻少之又少。"
10027125-81 = "過去也是同理。#n人們常說現在就是過去的集大成，卻鮮少有人將過去原封不動地記在腦中。#n而是選擇將其遺忘、美化，或是推向記憶的彼岸，藉此讓自己從痛苦中解脫。"
10027125-82 = "或許對我們而言，真正重要的就只有現在也說不定。但某種意義上來說……#n所謂的「現在」並不存在。我們擁有的僅有無限靠近的未來，以及不停流逝的過去而已。而「現在」只是存在於兩者之間，如透明紙張一般的概念罷了。"
10027125-83 = "因此，如果想講述關於現在的故事……就勢必也要提及過去和未來。#n這是我們對時間──這容易被遺忘、想要忘記卻永遠無法迴避的概念──#n應當保有的禮貌與敬意。"
10027125-84 = "從這樣的觀點來看，這個故事所講述的是《LUNA》的過去。#n但它同時也沒有捨棄未來，更沒有停止回顧現在。"
10027125-85 = "至於故事本身……說好聽一點是平易近人，說難聽一點就是沒有特色……#n但正是這份樸實使它顯得格外亮眼，可以說是這個故事最大的優點吧。"
10027125-86 = "我承認，這確實是個樸實且經典……近年越來越難得一見的故事。#n除此之外……"
10027125-90 = "除此之外……"
10027125-96 = "除此之外……？"
10027125-97 = "你，你想說什麼……？"
10027125-99 = "……"
10027125-103 = "[ns3]「有時候，誠實就是最高尚的美德……」\n[ns4]「因為它能讓我們擺脫一切的束縛……」"
10027125-106 = "……！"
10027125-107 = "說得也是。好吧！既然老師都這麼說了……！"
10027125-108 = "……咳哼！"
10027125-109 = "……真是一個好故事。#n假如我當時給你們更充裕的時間，相信你們絕對能交出更加令人驚豔的作品吧。"
10027125-110 = "辛苦你們了，知識解放戰線。"
10027125-112 = "真奇怪，好像聽到了什麼不可能聽到的話。"
10027125-113 = "就是說啊。我也覺得愛瑠前輩好像承擔不起這樣的評價。"
10027125-115 = "我剛才說得這麼認真，你們這是什麼反應！？"
10027125-116 = "我剛剛是不是被偷偷批評了！？"
10027125-122 = "我想說的就是這些。#n之後我會把下次迷你專展的地點和時間告訴你們，請別忘記檢查郵件。"
10027125-123 = "好，在下次的《LUNA》迷你專展上，就讓你見識見識脫胎換骨的我們吧！"
10027125-124 = "畢竟下次的專展，至少在時間方面會十分充裕！"
10027125-125 = "那麼，我會不抱期待地等著你們。#n祝你們武運昌隆，「知識解放戰線」。"
10027125-129 = "好，那麼……"
10027125-130 = "我們回去吧，前輩，老師！"
10027125-131 = "回去吧！#n唔啊啊，今天終於可以好好睡個夠了……"
10027125-132 = "[s]「我現在有自信能直接睡上兩天兩夜……」"
10027125-133 = "不過這次……"
10027125-134 = "一想到愛瑠前輩竟然為我創作了一本《LUNA》的最終卷……"
10027125-135 = "該怎麼說呢，這次就連我……都……該說是感嘆，還是感動呢……"
10027125-136 = "嘿嘿！果然是這樣吧！#n回憶的時候，再苦的經歷都會變得美好！"
10027125-137 = "只要結果是好的就萬事OK了！#n可喜可賀，可喜可賀！一切終於落幕了！"
10027125-138 = "……就連到最後都不給人發表感想的機會，真不愧是愛瑠前輩呢。"
10027125-139 = "更何況我們一路走來也不能說是一帆風順吧？#n甚至還把老師牽扯進來，協助我們畫了四天的原稿！"
10027125-140 = "我，我只是給老師一個機會，讓他體驗一下漫畫家的趕稿日常而已！"
10027125-141 = "前輩，請你好好反省。這麼做不就是在給別人添麻煩嗎？"
10027125-142 = "可，可是是老師自己答應要幫我的！"
10027125-143 = "就算人家答應幫忙也不能毫無節制地壓榨別人呀！"
10027125-144 = "請你回去之後好好反省！好好想想自己給老師添了多少麻煩！"
10027125-145 = "可是我也很辛苦啊！？"
10027125-146 = "這是你自作自受！而且要說辛苦的話，我也很辛苦啊！"
10027125-150 = "[ns]「那個，其實我真的不介意哦……？」"
10027125-151 = "老師不介意但我介意！請你站好，愛瑠前輩！#n我今天一定要好好跟你把話說清楚！"
10027125-152 = "嗚啊啊啊～後輩居然在教訓前輩～反對嘮叨！反對說教！"
10027125-154 = "愛～瑠～前～輩～！"
10027125-162 = "（「知識解放戰線」的兩人由於互不相讓而逐漸提高了音量……#n　不過這次已經不需要擔心了）"
10027125-166 = "[ns]「嗯。」"
10027125-171 = "[ns]「今天也是和平的一天呢～」"
10027125-173 = "漫畫同人物語～2人所追求的最終回～"

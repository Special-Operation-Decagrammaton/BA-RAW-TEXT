10027125-16 = "3;야쿠모;12;아~ 역시 사무국만으로는 무리였나요~ 선생님이 계신다고는 하지만, 우정 파워, 무섭네요.\n#3;em;[땀]"
10027125-17 = "[s] \"출판부장님~ 선생님은 이제 그만 하고 싶은데요~\" "
10027125-18 = "3;야쿠모;04;네에. 뭐어. 이쪽의 패배라면 어쩔 수 없죠. 아쉽지만, 깔끔하게 물러나겠습니다. 그 원고도 받지 않을게요."
10027125-19 = "5;메루;02;하아…… 알아들었다니 다행…….\n#5;al\n#5;em;[반응]\n#3;m1"
10027125-20 = "3;야쿠모;08;뭐, 다음에 다른 원고로 받아 내면 되는 일이고요."
10027125-21 = "5;메루;04;끝난 거 아니었어?!\n#5;shake\n#5;em;[?!]"
10027125-22 = "3;야쿠모;11;전투 한 번으로 모든 일이 행복하게 끝날 거라고 생각하지 마세요! 그건 너무나도 안이한 생각! 용사가 마왕을 쓰러트리고 난 뒤에도 공주와의 결혼 생활은 남아있는 거니까요!"
10027125-23 = "3;야쿠모;07;관점에 따라서는 그쪽이 더 본격적인 전쟁이라고 보는 사람도 있고요! 힛. 힛. 히……!\n#3;em;[음표]"
10027125-24 = "5;메루;05;태연한 얼굴로 무서운 소리 아무렇지도 않게 하는구만!"
10027125-25 = "3;야쿠모;08;약속했잖아요? 설마 메루, 타인과의 약속, 어기진 않겠죠?\n#3;em;[?]"
10027125-26 = "5;메루;10;으윽?!\n#5;em;[땀]"
10027125-27 = "[s] \"뭐, 그건 사실이니까…….\""
10027125-28 = "3;야쿠모;03;어쨌든, 출판부는 이만 물러가겠습니다. 다음에 다시 보죠. 가능하면 좋은 사업 안건으로요.\n#3;greeting"
10027125-29 = "#all;hide"
10027125-30 = "3;모미지;05;……가능하다면 그게 양쪽 모두에게 좋게 작용할 수 있는 것이길 바랄게요…….\n#3;closeup\n#3;em;[속상함]"

10027125-128 = "1;모미지;05\n3;타카네;12\n5;메루;03\n#1;h\n#3;h\n#5;h\n#3;d\n#wait;2500"
10027125-129 = "5;메루;99;자, 그러면…….\n#5;em;…"
10027125-130 = "1;모미지;03;돌아갈까요. 선배, 선생님?\n#1;em;[음표]"
10027125-131 = "5;메루;16;그럴까? 으아아, 오늘은 간만에 좀 푹 자야겠어…….\n#5;em;[한숨]\n#5;stiff"
10027125-132 = "[s] \"나 이제부터 이틀은 잘 자신 있어…….\""
10027125-133 = "1;모미지;02;뭐, 그래도 이번 일……."
10027125-134 = "1;모미지;07;메루 선배가, 절 위해 루나의 완결권까지 만들 생각을 하다니…."
10027125-135 = "1;모미지;99;뭐랄까. 이번만큼은 저도 그게…… 그…… 무척이나 감탄을, 했달까. 감ㄷ…….\n#1;em;[///]"
10027125-136 = "5;메루;03;헤헹! 역시 그렇지? 돌아보고 나면 다 즐거운 추억이 되는 법이라니까!\n#5;em;[재잘]"
10027125-137 = "5;메루;00;결과만 좋으면 전부 OK! 경사 났네, 경사 났어! 엔딩이야!\n#5;hophop"
10027125-138 = "1;모미지;99;……마지막까지 감상을 늘어놓을 짬을 주지 않는 게, 진짜 메루 선배답네요."
10027125-139 = "1;모미지;05;무엇보다 그 과정이란 거, 엄청 순탄했던 것도 아니잖아요? 선생님을 끌어들여서 나흘 동안 원고까지 돕게 만들었으면서!\n#1;em;[!]"
10027125-140 = "5;메루;04;마, 마감 직전 만화가의 일상을 체험시켜 준 것뿐이야!\n#5;em;[땀]"
10027125-141 = "1;모미지;05;반성 좀 하세요. 그 자체가 민폐라는 거잖아요."
10027125-142 = "5;메루;07;사, 상호 협의였다고! \n#5;em;[속상함]"
10027125-143 = "1;모미지;02;아무리 협의를 했다고는 해도, 넘지 말아야 할 선이라는 게 있어요!"
10027125-144 = "1;모미지;01;반성 좀 하세요! 선생님께 얼마나 민폐를 끼쳐드린 건가요!\n#1;em;[!]"
10027125-145 = "5;메루;10;나도 고생했는데?!"

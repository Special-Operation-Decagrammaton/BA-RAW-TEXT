10027125-107 = "3;타카네;14;그래요. 좋아요! 선생님께서 그렇게 말씀하신다면……!"
10027125-108 = "3;타카네;06;흠. 크흠! \n#3;stiff"
10027125-109 = "3;타카네;08;……좋은 이야기였습니다. 그리고 충분한 시간이 주어졌다면, 어떤 결과가 나왔을지 기대되는 이야기이기도 했고요.\n#3;em;[반짝]"

10027125-37 = "3;타카네;99\n#3;em;…\n#wait;2500"
10027125-38 = "3;타카네;02;자아. 이것으로 소란은 대충 정리되었군요.\n#3;em;[반응]"
10027125-39 = "5;메루;02;……그 소란 일으킨 거, 너희 부장님 아니냐?\n#5;em;[땀]\n#5;al\n#3;m1"
10027125-40 = "3;타카네;12;부장님은 부장님, 저는 저인걸요?\n#3;em;[?]"
10027125-41 = "#all;hide"
10027125-42 = "3;타카네;05;그리고 지금 중요한 건, 그게 아니잖아요?\n#3;closeup\n#3;em;[!]"
10027125-43 = "[s] \"드디어, 타카네의 평론을 들어 볼 시간이 된 건가…….\""
10027125-44 = "#all;hide"
10027125-45 = "1;모미지;06;어……? 괘, 괜찮으시겠어요. 선생님? 안 좋은 소리라도 듣게 되시면……!\n#1;em;[땀]\n#1;a"
10027125-46 = "5;메루;04;아니, 저, 그, 선생은 그렇다 쳐도 내 멘탈이 멘탈적으로 안 괜찮을 것 같은데?!\n#5;a\n#5;em;[속상함]"
10027125-47 = "[s1] \"외부의 시선이라는 건…… 생각보다 중요하니까.\"\n[s2] \"마음 굳게 먹자, 우리…….\""
10027125-48 = "#wait;100"
10027125-49 = "#wait;100"
10027125-50 = "5;메루;07;으, 윽……!\n#5;em;…"
10027125-51 = "1;모미지;06;잠시만요. 저 심호흡 좀 할게요. 후우. 하아. 후우. 하아.\n#1;stiff\n#1;em;[한숨]"

10027125-122 = "3;타카네;02;이렇게 되었으니, 다음번 온리전의 장소와 일시를 알려드리죠. 나중에 메일을 확인해 두세요."
10027125-123 = "5;메루;03;좋아. 다음 <루나> 온리전에서는, 완전히 다른 모습을 보여 주도록 하지.\n#5;em;[재잘]"
10027125-124 = "1;모미지;05;그때에는 적어도 시간이 충분히 있을 테니까요!"
10027125-125 = "3;타카네;12;그러면, 너무 기대하지 않고 기다리도록 하죠. 건투를 빌어요. <지식해방전선>.\n#3;greeting"

10027125-55 = "#wait;500"
10027125-56 = "3;타카네;16\n#3;a\n#3;em;…\n#wait;2500"
10027125-57 = "3;타카네;05;……사람을 무슨 저승사자 같은 취급을 하고 있는 것 같아 기분이 묘하긴 한데요……."
10027125-58 = "3;타카네;99;그러면, 지금부터 읽겠습니다. 잠시만 집중할 시간을 주세요.\n#3;greeting"

[translation]
10027125-5 = "Oh my... You're so...strong!"
10027125-12 = "[ns] \"I'm sorry, Marina. But remember...there are two sides to every story.\""
10027125-16 = "They managed to take down the Secretariat Office...? Even without Sensei's help, the power of friendship is...formidable."
10027125-17 = "[s] \"President! I'm nearly spent.\" "
10027125-18 = "So... It seems we've lost. Pity. I really wanted that manuscript. I suppose I should make a clean retreat while I still can."
10027125-19 = "Haha... I'm glad you understand..."
10027125-20 = "I guess I'll get the next manuscript you write."
10027125-21 = "You mean this isn't over?!"
10027125-22 = "Not every fairy tale ends after a single battle! It's what happens after the hero defeats the villain that matters. And you, my little underdog, will have to fight more than one battle to get rid of me."
10027125-23 = "You can look forward to a full-blown battle next time! Hee, hee, hee!"
10027125-24 = "How do you say such terrifying things with a straight face?"
10027125-25 = "You made a promise, Meru. And you don't want to break another promise, do you?"
10027125-26 = "Ugh!"
10027125-27 = "[s] \"She has a point...\""
10027125-28 = "We're done here. The Publishing Department will take their leave for now. But when we return, it will be with an offer you can't refuse."
10027125-30 = "Let's hope it's a fair contract next time."
10027125-38 = "Well... I'm glad that's over with."
10027125-39 = "Wasn't it your president who caused it?"
10027125-40 = "She may be my president, but she and I are two totally different people."
10027125-42 = "Anyway, that's not the point right now, is it?"
10027125-43 = "[s] \"It's finally time for Takane's critique...\""
10027125-45 = "I hope you won't be bothered by any negative feedback, Sensei..."
10027125-46 = "Even if Sensei isn't bothered, I'm going to be a wreck!"
10027125-47 = "[s1] \"External validation holds more power than people realize.\"\n[s2] \"Let's steel ourselves...\""
10027125-50 = "U-Ugh...!"
10027125-51 = "Hang in there. Deep breaths! Inhale... Exhale..."
10027125-57 = "Why are people terrified of me, as if I hold their life in my hand? It's so strange..."
10027125-58 = "Anyway, time to read. I need a minute to focus."
10027125-69 = "Okay... Time for some honest feedback."
10027125-75 = "Oh... I worked SO hard, but I'm SO worried it won't pay off... Even children would know this is a long shot. *sigh*"
10027125-76 = "If this all falls apart, remember us. Remember that there was a book and people who read it and loved it..."
10027125-78 = "...Are you saying last words?!"
10027125-79 = "You're wasting time, you know. And my time is quite valuable."
10027125-80 = "You know what they say. Everyone worries about the future, but few people really, truly think about it.  "
10027125-81 = "And it is the same for the past. We view the present through the lens of history, but few will examine the past with any sense of clarity. We forget what we dislike, we glorify what we love, and we push the pain to the back of our minds."
10027125-82 = "Perhaps we value the present too much. It cannot exist without its siblings. The ever-expanding past lies behind us, the infinite future before us. The present is but a thin line between the two."
10027125-83 = "That's why stories about the present cannot escape the past or future. The passage of time is inevitable. Many would like to forget that and live solely in the present. But we can never escape it."
10027125-84 = "This story is about Luna's past, present, and future."
10027125-85 = "The story itself is unremarkable in many ways, but...the writer's dedication certainly stands out. In fact, that is its most striking quality."
10027125-86 = "Its depth of emotion is a rarity these days. It's a modern classic. Furthermore..."
10027125-90 = "Furthermore..."
10027125-96 = "Furthermore...?"
10027125-97 = "What? What is it...?"
10027125-99 = "..."
10027125-103 = "[ns3] \"Sometimes honesty...\"\n[ns4] \"...is exactly what we need to be free.\""
10027125-106 = "...!"
10027125-107 = "If that's what you have to say, Sensei, then I—"
10027125-108 = "Ehem! "
10027125-109 = "It was a good story. It made me wonder what could have been, given enough time."
10027125-110 = "Good work, Knowledge Liberation Front."
10027125-112 = "That is so strange to hear. Are you sure you meant to say that?"
10027125-113 = "Yeah, you're giving Meru way too much credit. "
10027125-115 = "Do you know what it took for me to say that? How dare you respond so rudely?!"
10027125-116 = "Hey, it sounded weird to me too, okay? Gimme a break!"
10027125-122 = "*sigh* Fine. Now that you're officially a part of the club, I'll send you the time and location for the next con. Check your mail later."
10027125-123 = "Can't wait! And next time, we'll be more than prepared."
10027125-124 = "Yeah, we'll have plenty of time next year!"
10027125-125 = "I'm not holding my breath. But good luck anyway, Knowledge Liberation Front."
10027125-129 = "Okay..."
10027125-130 = "Shall we head back?"
10027125-131 = "Absolutely. I'm going to sleep like a rock tonight."
10027125-132 = "[s] \"I'm going to sleep for the next two days.\""
10027125-133 = "Hahaha... Well. Ahem. Anyway..."
10027125-134 = "Meru, I can't believe you wrote the last volume of \"Luna\" for me..."
10027125-135 = "All I can say is... I'm really impressed."
10027125-136 = "Heehee! Right? It all turned out just fine, didn't it?"
10027125-137 = "As long as we get the ending right, everything is A-OK! And we got an amazing ending!"
10027125-138 = "...I should have known you'd deprive me of the opportunity to say something sentimental at the end."
10027125-139 = "Not one thing went smoothly! What's worse, you dragged Sensei into it and forced them to work on the manuscript for four days straight!"
10027125-140 = "I-I just wanted to show Sensei what life as a cartoonist on deadline is like..."
10027125-141 = "Oh, please. You just wanted to be the center of attention. You made them do it!"
10027125-142 = "N-no! They volunteered! "
10027125-143 = "Even so, you crossed a line!"
10027125-144 = "You absolutely embarassed Sensei."
10027125-145 = "Hey! It was no picnic for me either!"
10027125-146 = "Yeah, but you brought it on yourself! And you made my life hard too!"
10027125-150 = "[ns] \"Hey... You know, I-I'm fine... Really...\""
10027125-151 = "You may be fine, but I'm not! Stop right there, Meru, and listen to what I'm about to say to you!"
10027125-152 = "Uwaaah! Underclassman can't bully their senior! No speeches! No scolding!"
10027125-154 = "Meeeeruuuuu!"
10027125-162 = "The Knowledge Liberation Front descended into another shouting match, but this time, I wasn't so worried about it."
10027125-166 = "[ns] \"Well.\""
10027125-171 = "[ns] \"Another peaceful day.\""
10027125-173 = "Academy Club Story: A Pair's Final Adventure"

[translation]
10027125-5 = "ไม่น่าเชื่อเลย... ครูยังแข็งแกร่งอยู่เหมือนเดิมเลยสินะ!"
10027125-12 = "[ns] \"ขอโทษนะมารินะ ทางเราก็มีเหตุผลเหมือนกันน่ะ\""
10027125-16 = "อ๋อ~ หรือว่าแค่สำนักเลขาธิการจะยังไม่พอนะ~ ถึงจะมีคุณครูอยู่ด้วยก็เถอะ แต่พลังแห่งมิตรภาพก็#nน่ากลัวไม่ใช่น้อยๆ เลยนะคะ"
10027125-17 = "[s] \"หัวหน้าชมรมสื่อสิ่งพิมพ์~ ครูไม่อยากต่อกรด้วยแล้ว~\""
10027125-18 = "ค่ะ ก็ได้ ถ้าทางฉันแพ้ก็ช่วยไม่ได้ค่ะ ถึงจะน่าเสียดาย แต่ฉันก็คงต้องยอมถอยให้ แล้วก็จะไม่เอา#nต้นฉบับนั้นด้วยค่ะ"
10027125-19 = "เฮ้อ... โล่งอกไปทีที่พูดรู้เรื่อง..."
10027125-20 = "ก็นะ ไว้ครั้งหน้าค่อยเอาต้นฉบับเล่มอื่นก็ได้ค่ะ"
10027125-21 = "ยังจะตามจิกไม่จบไม่สิ้นกันอีกเหรอ?!"
10027125-22 = "อย่าคิดว่าต่อสู้แค่หนเดียวมันจะทำให้เรื่องทุกอย่างจบอย่างแฮปปี้เอนดิ้งนะคะ! แบบนั้นมันไม่ง่าย#nไปหน่อยเหรอ! หลังจากผู้กล้าล้มราชาปีศาจได้แล้ว ชีวิตสมรสของผู้กล้ากับองค์หญิงก็ยังคงอยู่นะคะ!"
10027125-23 = "มองในอีกมุมแล้ว เรื่องอย่างหลังอาจไม่ใช่แค่การต่อสู้ แต่อาจเป็นสงครามเลยก็ได้นะคะ! ฮี่ฮี่ฮี่...!"
10027125-24 = "พูดเรื่องน่ากลัวๆ ออกมาได้โดยไม่อายปากเลยนะ!"
10027125-25 = "ก็เราสัญญากันไว้แล้วนี่คะ? เมรุคงไม่ผิดสัญญาที่ให้ไว้กับคนอื่นใช่ไหมคะ?"
10027125-26 = "อึก...!"
10027125-27 = "[s] \"เอ่อ... แต่มันก็จริงนะ...\""
10027125-28 = "เอาเถอะค่ะ เอาเป็นว่าชมรมสื่อสิ่งพิมพ์จะยอมถอยให้ แล้วไว้มาเจอกันคราวหน้านะคะ ถ้าเป็นไปได้ก็#nเจอกันด้วยข้อเสนอทางธุรกิจดีๆ หน่อยนะ"
10027125-30 = "...ถ้าเป็นไปได้ ฉันหวังว่าการเจอกันครั้งต่อไปจะเป็นเรื่องดีสำหรับทั้งสองฝ่ายนะคะ"
10027125-38 = "เอาละ ถือว่าจบความวุ่นวายได้แล้วนะคะ"
10027125-39 = "...ความวุ่นวายที่ว่าคือท่านหัวหน้าของเธอไม่ใช่เหรอ?"
10027125-40 = "เอะอะอะไรก็ท่านหัวหน้า นี่คุณคุยอยู่กับฉันนะคะ"
10027125-42 = "และตอนนี้เรื่องนั้นก็ไม่ใช่เรื่องสำคัญด้วยค่ะ!"
10027125-43 = "[s] \"ในที่สุดก็ถึงเวลาฟังบทวิจารณ์ของทาคาเนะแล้วงั้นเหรอ...\""
10027125-45 = "หืม...? คะ... คุณครูจะไม่เป็นไรใช่ไหมคะ? ถ้าได้ยินอะไรแย่ๆ ไปละก็...!"
10027125-46 = "ไม่สิ... ครูอาจจะไม่ไหวก็ได้ แต่ถ้าเธอพูดขู่มาแบบนี้ เป็นฉันก็ไม่น่าจะไหวเหมือนกันนะ?!"
10027125-47 = "[s1] \"ความเห็นจากภายนอกเป็นสิ่งสำคัญกว่าที่คิดนะ\"\n[s2] \"เรามาเปิดใจรับฟังกันเถอะ...\""
10027125-50 = "อะ... อึก...!"
10027125-51 = "เดี๋ยวนะคะ ขอฉันหายใจเข้าออกยาวๆ หน่อย ฮู่ว... ฮู่ว... ฮู่ว... ฮู่ว..."
10027125-57 = "...รู้สึกแปลกๆ จังเลยนะคะ เหมือนคนอื่นคิดว่าฉันเป็นยมทูตอะไรอย่างนั้นแหละ..."
10027125-58 = "ถ้างั้นเดี๋ยวฉันจะอ่านเลยนะคะ ขอเวลาตั้งสมาธิสักครู่ค่ะ"
10027125-69 = "เอาละ... ถึงเวลาที่จะแสดงความรู้สึกอย่างตรงไปตรงมาแล้วสินะ"
10027125-75 = "ฮุฮุ ฮุฮุ พยายามได้ดีมาก ถือว่าพยายามได้ดีมากเลย แต่เดี๋ยวนี้เด็กอนุบาลก็รู้ๆ กันอยู่แล้วละว่าถึงจะ#nพยายามทำมากแค่ไหนก็ไม่ได้หมายความว่าจะได้ผลลัพธ์ที่ดีเสมอไป ฮุ ฮุฮุ ฮุฮุฮุ..."
10027125-76 = "อย่าลืมนะคะ ช่วยจดจำพวกเราไว้ด้วยนะคะ ต่อให้เวลาจะผ่านไปจนทุกอย่างจะเลือนหายไป แต่ก็#nช่วยจดจำว่ามีหนังสือเล่มหนึ่งตรงนี้ และมีผู้คนที่ได้อ่านมันและพูดคุยเกี่ยวกับมัน..."
10027125-78 = "ทั้งสองคน... ตั้งใจจะพูดสั่งเสียอะไรทำนองนั้นเหรอคะ...?"
10027125-79 = "ไหนๆ ก็พูดเรื่องเวลาแล้ว ฉันขอพูดอะไรสักหน่อยนะคะ ไม่มีอะไรง่ายไปกว่าการลืมคุณค่าของเวลา#nหรอกค่ะ"
10027125-80 = "พวกคุณก็รู้ดีอยู่แก่ใจไม่ใช่เหรอคะว่าเราทุกคนต่างก็คิดกังวลถึงเรื่องอนาคต แต่มีไม่กี่คนหรอกค่ะที่#nคิดเกี่ยวกับอนาคตอย่างจริงๆ จังๆ"
10027125-81 = "เรื่องของอดีตก็เช่นกันค่ะ ถึงเราจะมองปัจจุบันว่าเป็นผลมาจากอดีต แต่ก็มีไม่กี่คนค่ะที่พยายามจดจำ#nความหมายที่แท้จริงของอดีต เพราะเราได้แต่ลืมเลือน เสริมแต่ง และผลักไสมันออกไปจากความทรงจำ เพื่อปลดปล่อยตัวเองจากความเจ็บปวด"
10027125-82 = "สิ่งที่เราให้ความสำคัญอาจมีเพียงแค่ปัจจุบัน แต่ในบางความหมาย ปัจจุบันอาจไม่มีอยู่จริงก็ได้ เพราะสิ่งที่มีอยู่จริงคืออนาคตอันใกล้ที่ไม่มีสิ้นสุด และอดีตที่ถูกผลักไสอย่างไม่รู้จบ ส่วนปัจจุบันก็เป็นเหมือนกระดาษโปร่งใสบางๆ ที่อยู่ระหว่างอดีตกับอนาคต"
10027125-83 = "เพราะฉะนั้น เรื่องราวในปัจจุบัน... จะต้องเป็นเรื่องเกี่ยวกับอดีตและอนาคตค่ะ เพราะนั่นเป็นทั้ง#nมารยาทและการเคารพต่อสิ่งที่เรียกว่าเวลา ซึ่งเป็นสิ่งที่ทั้งลืมเลือนได้ง่าย แต่ก็เป็นสิ่งที่ไม่สามารถ#nหนีพ้นได้เช่นกัน"
10027125-84 = "และในแง่นี้ เรื่องนี้จึงเป็นการพูดถึงอดีตของ <ลูน่า> ที่ไม่ปล่อยวางเรื่องของอนาคต และไม่หยุดที่จะ#nมองย้อนกลับมาที่ปัจจุบันด้วย"
10027125-85 = "เนื้อเรื่องเองก็มีความเรียบง่าย พูดในแง่ดีคือมันไม่ซับซ้อน พูดในแง่ร้ายคือมันไม่มีความโดดเด่น#nอะไรนัก... แต่สิ่งที่เห็นได้อย่างชัดเจนคือความจริงใจค่ะ และนั่นคือข้อดีชัดเจนที่สุดของเรื่องนี้ค่ะ"
10027125-86 = "ฉันยอมรับว่านี่เป็นเรื่องราวที่คลาสสิกและหาได้ยากในหมู่นี้ค่ะ นอกจากนี้..."
10027125-90 = "นอกจากนี้..."
10027125-96 = "นอกจากนี้...?"
10027125-97 = "เป็นยังไงเหรอคะ...?"
10027125-99 = "......"
10027125-103 = "[ns3] \"บางครั้งความซื่อตรงก็เป็นคุณธรรมสูงสุด...\"\n[ns4] \"เพราะมันช่วยปลดปล่อยเราให้เป็นอิสระ...\""
10027125-106 = "......!"
10027125-107 = "ใช่เลย ใช่ค่ะ! ถ้าคุณครูว่าอย่างนั้นละก็...!"
10027125-108 = "ฮึ่ม... อะแฮ่ม!"
10027125-109 = "เป็นเรื่องที่ดีเลยค่ะ และถ้าได้เวลามากกว่านี้ ก็น่าติดตามด้วยนะคะว่าผลลัพธ์จะออกมาเป็นยังไง"
10027125-110 = "ทำได้ดีมากเลยค่ะ ชมรมแนวร่วมปลดปล่อยความรู้"
10027125-112 = "แปลกจัง เหมือนได้ฟังสิ่งที่ไม่มีทางจะได้ฟังเลย"
10027125-113 = "นั่นสินะคะ ฉันว่านี่เป็นการประเมินที่มากเกินไปสำหรับรุ่นพี่เมรุด้วยซ้ำค่ะ"
10027125-115 = "ฉันอุตส่าห์ตั้งใจประเมินทั้งที แต่จะตั้งรับด้วยปฏิกิริยาแบบนี้กันเหรอคะ?!"
10027125-116 = "เดี๋ยวนะ เมื่อกี้โมมิจิพูดแทงใจดำฉันเหรอ?!"
10027125-122 = "ในเมื่อเป็นแบบนี้ ฉันจะแจ้งกำหนดการและสถานที่ของมินิอีเวนต์ครั้งหน้าให้แล้วกันค่ะ ไว้เช็กอีเมลดูนะคะ"
10027125-123 = "ก็ดี งาน <ลูน่า> ครั้งหน้าฉันจะทำให้เห็นถึงความแตกต่างเลย"
10027125-124 = "เพราะกว่าจะถึงตอนนั้นเราคงมีเวลาเพียงพอกว่านี้ค่ะ!"
10027125-125 = "งั้นฉันจะตั้งตารอแบบไม่คาดหวังมากเกินไปแล้วกันค่ะ พยายามเข้านะคะ <ชมรมแนวร่วมปลดปล่อยความรู้>"
10027125-129 = "เอาละ ถ้างั้น..."
10027125-130 = "งั้นเรากลับกันไหมคะ? รุ่นพี่? คุณครู?"
10027125-131 = "อื้ม กลับเลยไหม? เฮ้อ... วันนี้ต้องนอนให้เต็มอิ่มไปเลย..."
10027125-132 = "[s] \"ครูนอนติดต่อกันได้สองวันเลยละ...\""
10027125-133 = "เรื่องที่เกิดขึ้นในครั้งนี้..."
10027125-134 = "ทำให้รุ่นพี่เมรุคิดจะสร้างสรรค์ <ลูน่า> เล่มจบบริบูรณ์เพื่อฉัน..."
10027125-135 = "เรื่องในครั้งนี้... ก็ทำเอาฉัน... ปะ... ประทับใจมากเลยค่ะ ฉะ... ฉันซึ้งใจ..."
10027125-136 = "แหะๆ ซึ้งเลยเหรอ? ถ้าลองมองย้อนกลับไปดู เรื่องทั้งหมดที่เกิดขึ้นก็เป็นความทรงจำที่สนุกดีนะ!"
10027125-137 = "ถ้าผลลัพธ์มันออกมาดี ทุกอย่างที่เกิดขึ้นแล้วก็ถือว่าโอเค! เหนื่อยแต่ก็ใจฟูเนอะ! จบเรื่องแล้ว!"
10027125-138 = "...ไม่ยอมให้ฉันพูดความรู้สึกจนจบอีกแล้วนะคะ รุ่นพี่เมรุนี่จริงๆ เลย"
10027125-139 = "ที่สำคัญกว่าสิ่งอื่นใดคือกระบวนการค่ะ มันไม่ได้ราบรื่นเลยใช่ไหมล่ะคะ? ไปลากคุณครูมาช่วยปั่น#nต้นฉบับอยู่ตั้ง 4 วัน!"
10027125-140 = "ฉะ... ฉันแค่มอบประสบการณ์นักวาดการ์ตูนที่ไฟลนก้นตอนเดดไลน์ใกล้เข้ามาถึงให้ครูน่ะ!"
10027125-141 = "สำนึกผิดบ้างนะคะ แบบนั้นมันเรียกว่ารบกวนคนอื่นค่ะ"
10027125-142 = "มันเป็นการตกลงร่วมกันแล้วต่างหากเล่า!"
10027125-143 = "ถึงจะตกลงหรือร่วมมือกัน แต่ก็ต้องรักษามารยาทบ้างสิคะ!"
10027125-144 = "สำนึกผิดเดี๋ยวนี้เลยค่ะ รุ่นพี่ทำให้คุณครูต้องเดือดร้อนไม่ใช่เล่นๆ เลยนะคะ!"
10027125-145 = "ฉันเองก็ลำบากเหมือนกันนะ?!"
10027125-146 = "อันนั้นเรียกว่ากรรมตามสนองค่ะ! แล้วมีแต่รุ่นพี่ที่ลำบากเหรอคะ ฉันเองก็ลำบากนะคะ"
10027125-150 = "[ns] \"อ่าคือ... ครูไม่ได้เป็นอะไรนะ...?\""
10027125-151 = "ถึงคุณครูจะไม่เป็นไร แต่ฉันเป็นค่ะ! หยุดตรงนั้นเลยนะคะ รุ่นพี่เมรุ! วันนี้ฉันขอพูดความในใจ#nสักหน่อยเถอะค่ะ!"
10027125-152 = "โอ๊ยยย~ รุ่นน้องมาจับตัวรุ่นพี่แล้ว~ ไม่ต้องบ่นเลยนะ! ไม่ต้องมาเทศน์กันด้วย!"
10027125-154 = "รุ่น~ พี่~ เม~ รุ~!"
10027125-162 = "(ถึง <ชมรมแนวร่วมปลดปล่อยความรู้> จะโวยวายกันเสียงดัง แต่ครั้งนี้คุณครูก็ไม่ได้กังวลใจมากนัก)"
10027125-166 = "[ns] \"เอาละ...\""
10027125-171 = "[ns] \"วันนี้ก็ถือว่าเป็นวันที่สงบสุขดีอีกวันละนะ~\""
10027125-173 = "เรื่องราวของโดจินในโรงเรียน ~ตอนสุดท้ายจากทั้งสองคน~"

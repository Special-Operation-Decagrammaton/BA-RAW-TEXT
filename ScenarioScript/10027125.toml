10027125-74 = "5;메루;11\n1;모미지;01\n#5;a\n#1;a\n#5;h\n#1;h\n#wait;1000"
10027125-75 = "5;메루;11;후. 후후. 열심히 했어. 열심히 했다고. 그렇지만 열심히 했다고 해서 항상 좋은 결과가 나오는 게 아니라는 것 정도, 요즘은 유치원 아이들도 아는 세상이지. 후. 후후. 후후후…….\n#5;em;…"
10027125-76 = "1;모미지;06;잊지 말아 주세요. 우리를 잊지 말아 주세요. 모든 것이 스러져 없어지더라도, 여기에 한 권의 책과 그것을 읽고 이야기했던 사람들이 있었다는 사실만은 기억해 주세요…….\n#1;stiff\n#1;em;[훌쩍]"
10027125-77 = "#all;hide"
10027125-78 = "3;타카네;16;……두 사람, 무슨 유언이라도 남기려는 건가요……?\n#3;em;[?]"
10027125-79 = "3;타카네;99;이왕 시간이라는 말이 나왔으니 하는 이야기입니다. 시간이라는 것만큼 그 가치를 쉽게 잊곤 하는 것도 없죠."
10027125-80 = "3;타카네;02;알고 있잖아요? 다들 미래에 대해 생각하고 걱정한다지만, 정말로 미래에 대해 진심으로 생각하는 사람은 드물죠. \n#3;em;[반응]"
10027125-81 = "3;타카네;12;과거 역시 마찬가지예요. 현재는 과거의 집대성이라고 이야기하지만, 과거를 명확한 의미 그대로 기억하려는 사람은 드물죠. 망각하고, 미화시켜, 추억의 저편으로 밀어 넣을 뿐이죠. 고통으로부터 자유로워지기 위해서요."
10027125-82 = "3;타카네;07;우리가 중요하게 생각하는 것은 어쩌면 현재뿐인지도 모르지만, 어떤 의미에서 현재란 존재하지 않아요. 존재하는 것은 무한히 다가올 미래와, 끊임없이 밀려나는 과거뿐. 현재란 그사이에 개념적으로 존재하는, 얇고 투명한 종이 같은 것이죠."
10027125-83 = "3;타카네;12;그렇기에 현재를 다루는 이야기는……. 과거에 대해서, 그리고 미래에 대해서 이야기하지 않으면 안 됩니다. 그것이 시간이라는, 망각하기 쉽고 망각하고 싶어 하지만 결코 도망칠 수 없는 그 무엇인가에 대한 예의이자 경의이죠.\n#3;em;…"
10027125-84 = "3;타카네;13;이 이야기는, 그런 의미에서, <루나>의 과거에 대해 이야기하고 있어요. 동시에 미래에 대한 끈을 놓지 않으면서, 현재를 돌아보는 것을 멈추지 않죠."
10027125-85 = "3;타카네;08;이야기 자체는 어찌 보면 평이하고, 좋게 말해 무난하고 나쁘게 말하자면 큰 특색이 없지만…… 그 성실함은 분명히 눈에 띄는군요. 그것이 이 이야기의 가장 도드라지는 장점이겠지요."
10027125-86 = "3;타카네;10;인정하죠. 근래에 보기 드문, 성실하면서도 클래식한 이야기였다는 것을요. 그리고 나아가…….\n#3;greeting"

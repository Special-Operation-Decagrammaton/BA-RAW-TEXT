[translation]
80000121-1 = "Iron Palm Chocolate"
80000121-2 = "Thank you for coming, Sensei."
80000121-3 = "I mean, I'm the one who asked to see you, but I know how busy you are."
80000121-4 = "[s] \"Don't worry about things like that.\""
80000121-5 = "Still, thank you. So, um..."
80000121-6 = "..."
80000121-7 = "U-Um. How should I say this?"
80000121-8 = "It's kind of embarrassing."
80000121-9 = "Although I know what day today is, and what people do on this day, and that you're probably already really used to stuff like this..."
80000121-10 = "Yeah... You know, Valentine's Day chocolate. I'm certain you've gotten countless chocolates from other students already, so mine's nothing special..."
80000121-11 = "[s1] \"That's not the case! This is totally my first one!\"\n[s2] \"Oh, um, I guess I have gotten a lot...\""
80000121-12 = "E-Eh? Maybe I should've gotten you something else, then..."
80000121-13 = "...Anything from me would make you happy? O-Okay..."
80000121-14 = "I suppose so...but I was hoping to give you something..."
80000121-15 = "...memorable..."
80000121-16 = "*deep breath* Anyways!"
80000121-17 = "Please take this! I'll be on my way!"
80000121-21 = "[ns] \"The shape...of a fist?\""
80000121-22 = "Y-You're right. And that..."
80000121-23 = "...has to do with the origin of this chocolate!"
80000121-27 = "Y-Yes. You want more details? Ah, that makes sense. I guess just suddenly mentioning the chocolate's origins without explaining would confuse anyone..."
80000121-28 = "..."
80000121-29 = "Sensei. Do you know about the martial arts training method \"iron palm\"?"
80000121-30 = "It's a training method where you put fine sand in a bowl and thrust into the sand with your fingertips."
80000121-31 = "You start with cold sand, then move on to heated sand. You gradually increase the size of particles from sand, small pebbles, roasted beans, and finally iron marbles..."
80000121-32 = "You train your fingertips and your whole fist until your hand techniques reach a level as solid as iron."
80000121-33 = "What does the iron palm have to do with this chocolate? That's, well..."
80000121-34 = "You see, I had this thought. Instead of roasted beans..."
80000121-35 = "...what if I used cacao beans instead?"
80000121-36 = "And what if I used the results of my training to make chocolate?!"
80000121-37 = "[s] \"You're saying you did the iron palm training with cacao beans?\""
80000121-38 = "Y-Yeah, I guess so..."
80000121-39 = "And then...how do I say this? I got too into it..."
80000121-40 = "...and by the time I came back to my senses, I'd grinded it into powder."
80000121-41 = "O-Of course, I did expect it to be like that to a degree, but I didn't think it would actually happen..."
80000121-42 = "S-So! I figured that since I'd already made the chocolate with my hands..."
80000121-43 = "...I thought that, maybe, I could engrave the shape of my fist into it..."
80000121-44 = "So, um, this was the result."
80000121-45 = "I-It's weird, right? The chocolate, and me too..."
80000121-46 = "[s] \"...\""
80000121-50 = "[ns] \"Doesn't that mean this is Reijo's handmade chocolate?!\""
80000121-51 = "Wh-Whaaaat?! What are you saying...!"
80000121-52 = "..."
80000121-53 = "I..."
80000121-54 = "You're not completely wrong."
80000121-55 = "But saying it like that's really embarrassing..."
80000121-59 = "I devoured Reijo's chocolate!"
80000121-60 = "S-S-S-Sensei?! If you eat the chocolate like that...!"
80000121-61 = "[s] \"So this is what Reijo tastes like!\""
80000121-62 = "WH-WHAAAT?!"
80000121-63 = "Um, Sensei??? Your expressions are a bit...!"
80000121-64 = "A bit..."
80000121-65 = "Well, then, how was..."
80000121-66 = "...the taste of me?"
80000121-67 = "[s3] \"It was the best!\"\n[s4] \"Give me more!\""
80000121-70 = "A-Are you serious?!"
80000121-71 = "...Your expression tells me that you're deadly serious."
80000121-72 = "G-Got it. It was only a little bit, but I was looking forward to this."
80000121-73 = "So I did make extras..."
80000121-74 = "Although this scenario wasn't exactly what I was expecting..."
80000121-75 = "Mm."
80000121-76 = "Still, thank you, Sensei."
80000121-77 = "There's not much left, but please help yourself to as much as you want."
80000121-78 = "I'll also get you a cup of tea, in case you get thirsty."
80000121-80 = "I chatted with Reijo for a while longer, leisurely talking about all sorts of good things like the promenade, chocolate, and martial arts."

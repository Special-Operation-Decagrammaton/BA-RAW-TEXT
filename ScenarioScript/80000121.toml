[translation]
80000121-1 = "鐵砂掌巧克力"
80000121-2 = "謝謝您特地過來，老師。"
80000121-3 = "雖然是我說想見您，但老師您平常那麼忙……"
80000121-4 = "[s]「這種事不用太在意的。」"
80000121-5 = "再次感謝您。那麼……"
80000121-6 = "……"
80000121-7 = "唔嗯……該怎麼說好呢……"
80000121-8 = "突然覺得好害羞。"
80000121-9 = "明明心裡知道今天是什麼日子，也清楚老師應該早就習慣這種場合了……"
80000121-10 = "沒錯，是關於情人節巧克力的事。#n您應該已經收過很多學生的巧克力，我這份可能也沒什麼特別的……"
80000121-11 = "[s1]「沒有！這是我收到的第一份巧克力！」\n[s2]「唔嗯……是可以這麼說啦……」"
80000121-12 = "咦？真，真的嗎？#n早知道就準備得更特別一點了……"
80000121-13 = "您說只要是我準備的都好？#n這，這樣啊……"
80000121-14 = "嗯……不過即便如此，我還是希望準備能讓老師……"
80000121-15 = "至少能讓您留下深刻印象的那種禮物……"
80000121-16 = "呼，那麼……"
80000121-17 = "我要上了！請收下吧！"
80000121-21 = "[ns]「這是……拳頭的形狀？」"
80000121-22 = "是，是的。#n而且這個形狀……"
80000121-23 = "跟這份巧克力的起源也有關聯！"
80000121-27 = "不，不好意思，我向您說明一下。#n突然說什麼「起源」，確實會讓人感到困惑……"
80000121-28 = "……"
80000121-29 = "老師，您知道「鐵砂掌」這種武術訓練法嗎？"
80000121-30 = "是在裝滿細沙的容器裡，用指尖戳沙來鍛鍊手部的修行方式。"
80000121-31 = "一開始是冷沙，接著是熱沙……#n然後逐漸換成粗沙、小石子、炒豆，最後甚至是鋼珠……"
80000121-32 = "像這樣反覆鍛鍊手指與拳頭，直到達成硬如鋼鐵的境界。"
80000121-33 = "您問這跟巧克力有什麼關係？#n嗯……"
80000121-34 = "因為我突然想到……"
80000121-35 = "如果把炒豆換成可可豆來練鐵砂掌，不知道會怎麼樣！"
80000121-36 = "假如再把訓練的成果做成巧克力的話，又會怎麼樣呢！！！"
80000121-37 = "[s]「所以你是……用可可豆在訓練鐵砂掌？」"
80000121-38 = "差，差不多是這樣沒錯……"
80000121-39 = "怎麼說呢，因為一不小心就太投入了……"
80000121-40 = "結果回過神來才發現，可可豆全都被我磨成了粉……"
80000121-41 = "雖，雖然這某種程度上也是我希望看見的結果沒錯，但沒想到真的會變成這樣……"
80000121-42 = "所，所以我才會想說，既然都做到這地步了……"
80000121-43 = "乾脆把我的拳頭形狀也刻進去算了……"
80000121-44 = "最後就變成了這個樣子……"
80000121-45 = "果，果然很奇怪對吧，老師？#n這樣的巧克力，還有這樣的我……"
80000121-46 = "[s]「……」"
80000121-50 = "[ns]「所以這是有令女『手感』的巧克力囉！？」"
80000121-51 = "咦，咦！？#n老，老師您這是什麼意思……！"
80000121-52 = "……"
80000121-53 = "那個……"
80000121-54 = "雖然這麼說也不算錯……"
80000121-55 = "可是這種說法，實在讓人很難為情……"
80000121-59 = "（張開嘴……大口大口地吃起令女的巧克力！）"
80000121-60 = "等，等等，老師！？#n您怎麼突然吃得這麼急……！"
80000121-61 = "[s]「這就是令女的味道啊！」"
80000121-62 = "咦咦咦──！？"
80000121-63 = "老，老師？您剛才的說法有點……"
80000121-64 = "那個……"
80000121-65 = "請問您覺得……"
80000121-66 = "我的味道怎麼樣呢……？"
80000121-67 = "[s3] 「超讚的！」\n[s4] 「我還要我還要！」"
80000121-70 = "真，真的嗎！？"
80000121-71 = "……老師您現在的眼神還真是無比真誠。"
80000121-72 = "我，我知道了。#n其實我也多少有點期待。"
80000121-73 = "所以有多準備了一些……"
80000121-74 = "雖然這跟我期待的方向……有點不太一樣就是了。"
80000121-75 = "嗯。"
80000121-76 = "不過還是謝謝您，老師。"
80000121-77 = "雖然剩下的份量不多，希望您能吃得滿意。"
80000121-78 = "如果覺得口渴的話，我也準備了適合解渴的茶哦。"
80000121-80 = "（於是便和令女一邊吃著巧克力，#n　一邊閒聊著商會、巧克力和武術的事，度過了悠閒的時光）"

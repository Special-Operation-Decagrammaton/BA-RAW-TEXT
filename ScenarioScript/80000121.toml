[translation]
80000121-1 = "#title;철사장 초콜릿"
80000121-2 = "3;레이죠;02;와 주셔서 감사합니다. 선생님.\n#3;em;[반응]\n#3;a"
80000121-3 = "3;레이죠;15;물론 제가 뵙고 싶다고 말씀드린 것이기는 합니다만, 선생님께서는 본디 매우 바쁜 분이시니까요."
80000121-4 = "[s] \"그런 건 신경 쓰지 않아도 괜찮아.\""
80000121-5 = "3;레이죠;02;다시 한번 감사드립니다. 그러면\n#3;greeting"
80000121-6 = "3;레이죠;01;…….\n#3;em;…"
80000121-7 = "3;레이죠;04;으, 음. 이거 상당히, 뭐라고 말씀드려야 할까."
80000121-8 = "3;레이죠;12;부끄러움이 밀려드네요.\n#3;em;[///]"
80000121-9 = "3;레이죠;14;오늘이 무슨 날이고, 어떤 일을 하는 날인지, 그리고 선생님이시라면 이런 일에 너무 익숙해져 계실 거라는 부분까지도 알고 있는데도 말이에요."
80000121-10 = "3;레이죠;04;네…… 발렌타인 초콜릿 이야기입니다. 이미 수없이 다른 학생들에게 받으셨을 테니, 제 초콜릿은 그리 대단치도 않게 느껴지실 수도 있겠습니다만…….\n#3;em;…"
80000121-11 = "[s1] \"꼭 그런 건 아니야! 이게 처음이었어!\"\n[s2] \"어, 응. 그래…… 그렇긴 하지…….\""
80000121-12 = "3;레이죠;08;네?, 그 그러셨나요? 그럴 줄 알았다면 조금 더 다른 것으로…….\n#3;em;[땀]\n#3;stiff"
80000121-13 = "3;레이죠;04;제가 준비해 준 것이라면 뭐든지 좋다고요? 그, 그런가요……."
80000121-14 = "3;레이죠;16;네……. 그렇겠지요. 하지만 역시 조금이라도 좋으니, 선생님에게 보다 인상적인…….\n#3;em;…"
80000121-15 = "3;레이죠;03;적어도 기억에 남는, 그런 것을 준비해 드리고 싶었어서요……."
80000121-16 = "3;레이죠;15;후우, 그러면……."
80000121-17 = "3;레이죠;02;가겠습니다! 받아 주십시오!\n#3;em;[!]\n#3;closeup"
80000121-18 = "#st;[0,0];instant;1;"
80000121-19 = "#clearST"
80000121-20 = "#all;hide\n#wait;2000"
80000121-21 = "[ns] \"주먹…… 모양?\""
80000121-22 = "5;레이죠;04;그, 그렇습니다. 그리고 그것은……!\n#5;a\n#5;stiff"
80000121-23 = "5;레이죠;02;이 초콜릿을 만든 기원과도, 연관이 있습니다!\n#5;em;[반응]"
80000121-24 = "#st;[0,0];instant;1;"
80000121-25 = "#clearST"
80000121-26 = "#wait;2500"
80000121-27 = "5;레이죠;04;네, 네에. 설명이 더 필요하시다는 말씀이시군요. 물론 당연하겠죠. 다짜고짜 기원이라고 말씀드려도, 당황하실 테고…….\n#5;m3\n#5;em;[땀]"
80000121-28 = "5;레이죠;06;……."
80000121-29 = "5;레이죠;07;선생님. 철사장이라는 무술 훈련에 대해, 알고 계십니까?\n#5;em;[반응]"
80000121-30 = "5;레이죠;01;적당한 크기의 그릇에 고운 모래를 담은 뒤, 그 모래를 손끝으로 찌르면서 단련하는 수련 방식입니다."
80000121-31 = "5;레이죠;99;처음에는 차가운 모래로, 그다음에는 달군 모래로. 그리고 입자의 크기를 점점 굵게 하여 모래에서 작은 자갈, 볶은 콩, 마침내 쇠구슬에 이르기까지…….\n#5;em;…"
80000121-32 = "5;레이죠;02;그렇게 손끝과 주먹 전체를 단련하여, 마침내는 철과 같은 경지로 수권을 단련하는 훈련입니다."
80000121-33 = "5;레이죠;04;그 철사장과 이 초콜릿이 무슨 상관이시냐고요? 그러니까, 그것은……."
80000121-34 = "5;레이죠;99;한 번 생각해 보았습니다. 혹시 볶은 콩 대신."
80000121-35 = "5;레이죠;05;카카오 빈을 사용하는 철사장 수련이라면 어떨까, 하고요!\n#5;em;[!]"
80000121-36 = "5;레이죠;07;그리고 그 수련의 결과물로 초콜릿을 만든다면 어떨까, 하고요!!!\n#5;hophop\n#5;closeup\n#fontsize;80"
80000121-37 = "[s] \"카카오 빈으로 철사장 훈련을 했다는 거야?\""
80000121-38 = "5;레이죠;04;그, 그런 셈이죠…….\n#5;stiff\n#5;em;[땀]"
80000121-39 = "5;레이죠;11;뭐라고 말씀드려야 할까요. 저도 모르는 사이에 지나치게 열중했더니……."
80000121-40 = "5;레이죠;12;저도 모르는 사이에, 전부 가루가 되었다고나 할까요…….\n#5;em;…"
80000121-41 = "5;레이죠;14;무, 물론 어느 정도는 그렇게 되기를 기대했던 부분도 있었습니다만, 정말로 될 줄은……."
80000121-42 = "5;레이죠;04;그, 그래서 말입니다만! 이왕 이렇게까지 손으로 초콜릿을 만든 거!\n#5;em;[!]"
80000121-43 = "5;레이죠;04;제 주먹 모양을 새겨 넣으면 어떨까…… 해서……."
80000121-44 = "5;레이죠;10;결국 만들어진 것이, 이것이었습니다만…….\n#5;em;[세로선]"
80000121-45 = "5;레이죠;04;여, 역시 이상하시죠. 선생님? 이런 초콜릿도, 이런 저도…….\n#5;stiff"
80000121-46 = "[s] \"…….\""
80000121-47 = "#st;[0,0];instant;1;"
80000121-48 = "#clearST"
80000121-49 = "#wait;1000"
80000121-50 = "[ns] \"그렇다면 이것은 레이죠의 손맛이 들어간 초콜릿이로군?!\""
80000121-51 = "5;레이죠;08;네, 네에에?! 무, 무슨 말씀을, 도대체……!\n#5;em;[?!]\n#5;shake"
80000121-52 = "5;레이죠;08;……."
80000121-53 = "5;레이죠;04;그……."
80000121-54 = "5;레이죠;12;완전히 틀린 건, 아닌 것 같기도 한데요.\n#5;stiff"
80000121-55 = "5;레이죠;06;그래도 그렇게 표현하시면 엄청나게 부끄럽다고 할까……."
80000121-56 = "#st;[0,0];instant;1;"
80000121-57 = "#clearST"
80000121-58 = "#wait;2500"
80000121-59 = "#na;(레이죠의 초콜릿을…… 와구와구 먹는다!)"
80000121-60 = "5;레이죠;04;서, 서서, 선생님?! 갑자기 초콜릿을 그렇게 드시면……!\n#5;stiff"
80000121-61 = "[s] \"이것이 레이죠의 맛이구나!\""
80000121-62 = "5;레이죠;08;네, 네에?!?!\n#5;em;[?!]\n#5;shake"
80000121-63 = "5;레이죠;08;저, 선생님??? 조금 전부터, 표현이 뭔가……!"
80000121-64 = "5;레이죠;14;뭔가……."
80000121-65 = "5;레이죠;04;혹시, 어떠셨나요……?\n#5;em;…"
80000121-66 = "5;레이죠;08;저의, 맛은요……?"
80000121-67 = "[s3] \"최고야!\"\n[s4] \"더 줘!\""
80000121-68 = "#wait;10"
80000121-69 = "#wait;10"
80000121-70 = "5;레이죠;04;지, 진심이신가요?!\n#5;em;[?!]\n#5;shake"
80000121-71 = "5;레이죠;04;……이보다 더 진심일 수는 없다는 눈빛으로 저를 바라보시는군요……."
80000121-72 = "5;레이죠;05;아, 알겠습니다. 사실 저도 약간이지만, 기대를 했기도 했고.\n#5;em;[땀]"
80000121-73 = "5;레이죠;05;그래서…… 여분을 만들어 두기도 했고…….\n#5;stiff"
80000121-74 = "5;레이죠;14;……그 기대가, 이런 방향은 아니긴 했는데요."
80000121-75 = "5;레이죠;11;음."
80000121-76 = "5;레이죠;13;그래도, 감사합니다. 선생님.\n#5;em;[반응]"
80000121-77 = "5;레이죠;18;남은 것은 그다지 많지 않습니다만, 만족하실 만큼 드셔 주시면 감사하겠습니다."
80000121-78 = "5;레이죠;03;혹시 목이 마르시거나 하시다면, 갈증에 좋은 차도 준비하겠습니다.\n#5;em;[음표]"
80000121-79 = "#all;hide"
80000121-80 = "#na;(레이죠와 함께 담소를 나누며, 상회 일과 초콜릿과 무술에 대해, 아무래도 좋은 이야기를 한가하게 나눴다.)"

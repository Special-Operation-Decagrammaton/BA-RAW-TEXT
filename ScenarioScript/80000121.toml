[translation]
80000121-1 = "ช็อกโกแลตหมัดเหล็ก"
80000121-2 = "ขอบคุณที่มานะคะคุณครู ทางนี้ค่ะ"
80000121-3 = "ฉันเป็นฝ่ายที่ขอให้คุณครูมาพบก็จริง... แต่ฉันทราบดีค่ะว่าคุณครูเป็นคนที่งานยุ่งมากๆ"
80000121-4 = "[s] \"ไม่ต้องคิดมากหรอกนะ\""
80000121-5 = "ต้องขอขอบคุณอีกครั้งนะคะ ถ้างั้น..."
80000121-6 = "......"
80000121-7 = "อะ... อืม... นี่มันค่อนข้างจะ เอ่อ... จะพูดว่ายังไงดีนะ"
80000121-8 = "จู่ๆ ก็รู้สึกเขินขึ้นมาเลยละค่ะ"
80000121-9 = "ทั้งๆ ที่รู้ดีว่าวันนี้เป็นวันอะไร และควรจะทำอะไร รวมถึงฉันรู้ดีว่าถ้าเป็นคุณครูแล้วละก็คงจะคุ้นเคยกับ#nเรื่องแบบนี้เป็นอย่างดีอยู่แล้ว"
80000121-10 = "ค่ะ... หมายถึงเรื่องช็อกโกแลตวันวาเลนไทน์ค่ะ คุณครูคงได้รับช็อกโกแลตจากนักเรียนคนอื่นๆ มา#nมากมายแล้ว เพราะงั้นช็อกโกแลตของฉันอาจจะดูธรรมดาๆ ไปเลยในสายตาคุณครูก็ได้..."
80000121-11 = "[s1] \"ไม่หรอก ครูเพิ่งเคยได้แบบนี้เลยนะ!\"\n[s2] \"เอ๊ะ อื้อ ก็จริงนะ... ก็คงงั้นแหละ...\""
80000121-12 = "คะ? ยะ... อย่างนั้นเหรอคะ? รู้อย่างนี้ ฉันน่าจะทำให้พิเศษกว่านี้อีก..."
80000121-13 = "ถ้าเป็นของที่ฉันเตรียมมา ไม่ว่าอะไรคุณครูก็ชอบงั้นเหรอคะ? งะ... งั้นเหรอคะ"
80000121-14 = "ค่ะ... แต่ถึงจะเป็นอย่างนั้น ฉันก็อยากให้คุณครูประทับใจขึ้นกว่านี้อีกสักหน่อย..."
80000121-15 = "อย่างน้อยก็น่าจะเตรียมอะไรที่ทำให้คุณครูจดจำได้น่ะค่ะ..."
80000121-16 = "ฮู่ว ถ้าอย่างนั้น..."
80000121-17 = "เอาละค่ะ รับไปได้เลยค่ะ!"
80000121-21 = "[ns] \"รูป... หมัด?\""
80000121-22 = "ชะ... ใช่ค่ะ แล้วก็อันนี้...!"
80000121-23 = "มันเกี่ยวกับที่มาของช็อกโกแลตอันนี้ด้วยค่ะ!"
80000121-27 = "คะ... ค่ะ คุณครูคงต้องการคำอธิบายเพิ่มเติมสินะคะ แน่นอนค่ะ จู่ๆ พูดคำว่า 'ที่มา' แบบนี้ คุณครูก็คงจะตกใจและสงสัยสินะคะ"
80000121-28 = "......"
80000121-29 = "คุณครูเคยได้ยินเรื่องการฝึกฝนศิลปะการป้องกันตัวที่เรียกว่า 'หมัดเหล็ก' บ้างมั้ยคะ?"
80000121-30 = "มันเป็นการฝึกฝนโดยนำทรายละเอียดใส่ลงไปในชาม จากนั้นก็ใช้ปลายนิ้วจิ้มลงไปในทราย"
80000121-31 = "เริ่มจากทรายเย็น แล้วเปลี่ยนเป็นทรายร้อน และจากนั้นก็ค่อยๆ เพิ่มขนาดของวัตถุไปเรื่อยๆ จากทรายเป็นก้อนกรวด ถั่วคั่ว ไปจนถึงลูกเหล็ก..."
80000121-32 = "เป็นเทคนิคการฝึกความแข็งแกร่งของปลายนิ้วและกำปั้นให้มีความแข็งแกร่งดุจเหล็กกล้าค่ะ"
80000121-33 = "แล้วหมัดเหล็กเกี่ยวอะไรกับช็อกโกแลตอันนี้น่ะเหรอคะ? คือว่าเรื่องนั้น..."
80000121-34 = "ฉันแค่ลองคิดดูเล่นๆ น่ะค่ะว่าถ้าตอนที่ฝึก..."
80000121-35 = "หากใช้เมล็ดโกโก้แทนถั่วคั่วผลจะออกมาเป็นยังไงน่ะค่ะ!"
80000121-36 = "และถ้าการฝึกฝนทำให้เราทำช็อกโกแลตได้จะเป็นยังไงกันนะ!!"
80000121-37 = "[s] \"อย่าบอกนะว่าเอาเมล็ดโกโก้มาฝึกหมัดเหล็กจริงๆ น่ะ?\""
80000121-38 = "กะ... ก็ประมาณนั้นค่ะ..."
80000121-39 = "จะพูดยังไงดีล่ะคะ ฉันคงตั้งใจมากเกินไป..."
80000121-40 = "พอรู้ตัวอีกทีทุกอย่างก็แหลกกลายเป็นผงไปแล้วละค่ะ..."
80000121-41 = "นะ... แน่นอนว่าฉันก็คิดไว้อยู่แล้วว่าอาจจะเป็นแบบนี้ แต่ฉันก็ไม่ได้คิดว่ามันจะเกิดขึ้นจริงๆ..."
80000121-42 = "พะ... เพราะงั้นพอมาคิดดูแล้ว ไหนๆ ก็มีผงโกโก้แล้ว ฉันก็เลยเอามาลองทำช็อกโกแลตดูค่ะ!"
80000121-43 = "และฉันก็เลยคิดว่าถ้าทำออกมาเป็นรูปหมัดเลย... จะเป็นยังไงกันนะ..."
80000121-44 = "สุดท้ายมันก็... ออกมาเป็นแบบนี้ละค่ะ"
80000121-45 = "คะ... คิดแล้วเชียวว่ามันคงแปลกๆ สินะคะ คุณครู? ทั้งช็อกโกแลตอันนี้ แล้วก็ทั้งตัวฉัน..."
80000121-46 = "[s] \"......\""
80000121-50 = "[ns] \"งั้นนี่ก็เป็นช็อกโกแลตจากรสมือของเรย์โจวเลยสินะ?!\""
80000121-51 = "คะ... คะ?! พะ... พูดอะไรอย่างนั้นกันคะ...!"
80000121-52 = "......"
80000121-53 = "คือ..."
80000121-54 = "มันก็ไม่ใช่คำพูดที่ผิดซะทีเดียวหรอกค่ะ"
80000121-55 = "แต่ถ้าพูดออกมาตรงๆ แบบนั้น มันน่าอายนะคะ..."
80000121-59 = "(คุณครูกินช็อกโกแลตของเรย์โจว... อย่างเอร็ดอร่อย!)"
80000121-60 = "คะ... คะคะ คุณครู?! ถ้าจู่ๆ รีบกินช็อกโกแลตแบบนั้น...!"
80000121-61 = "[s] \"รสมือของเรย์โจวเป็นแบบนี้เองสินะ!\""
80000121-62 = "คะ... คะ?!?!"
80000121-63 = "คะ... คุณครูคะ??? ตั้งแต่เมื่อกี้แล้ว คำพูดของคุณครูมันค่อนข้างจะ...!"
80000121-64 = "จะว่ายังไงดีล่ะ..."
80000121-65 = "คือว่าเป็นยังไงบ้างคะ...?"
80000121-66 = "'รสชาติของฉัน' น่ะค่ะ...?"
80000121-67 = "[s3] \"สุดยอดเลย!\"\n[s4] \"ขออีกได้มั้ย!\""
80000121-70 = "พะ... พูดจริงเหรอคะ?!"
80000121-71 = "สายตาที่มองมาที่ฉัน ดูเปี่ยมไปด้วยความจริงใจมากๆ เลยนะคะ..."
80000121-72 = "ขะ... เข้าใจแล้วค่ะ ทะ... ที่จริงฉันก็แอบคาดหวังไว้อยู่นิดๆ เหมือนกันค่ะ"
80000121-73 = "ก็เลย... แอบเตรียมไว้เผื่อด้วยนิดหน่อย..."
80000121-74 = "ถึงสิ่งที่ฉันคาดหวังจะไม่ได้เป็นแบบนี้ก็เถอะค่ะ"
80000121-75 = "อืม"
80000121-76 = "แต่ยังไงก็ขอบคุณนะคะ คุณครู"
80000121-77 = "ถึงจะมีไม่มาก แต่เชิญรับประทานได้เลยค่ะ"
80000121-78 = "ถ้าหิวน้ำ ฉันจะเตรียมชาแก้กระหายไว้ให้นะคะ"
80000121-80 = "(คุณครูกับเรย์โจวนั่งคุยเรื่องต่างๆ ด้วยกัน ทั้งเรื่องงานของย่านการค้า เรื่องช็อกโกแลตกับศิลปะการ#nป้องกันตัว และเรื่องหมัดเหล็กของเธอ)"

[translation]
12120-1 = "Episode 12;Secrets"
12120-2 = "Ta-da!"
12120-3 = "Look, Hoshino! I was finally able to get my hands on this old Abydos Oasis Festival poster!"
12120-4 = "The oasis used to be as big as a lake! Here, you can have it as a souvenir!"
12120-5 = "It's incredible, isn't it? If we had some kind of miracle, people might start coming back here! Just imagine it!"
12120-6 = "Miracles don't exist."
12120-7 = "Something like that isn't going to happen!"
12120-8 = "O-Ow..."
12120-9 = "Who the hell would wanna visit some spot in the middle of a desert?! For once in your life, stop daydreaming!"
12120-10 = "S-Sorry, Hoshino... I-It's because I'm a dummy…"
12120-11 = "...!"
12120-12 = "Miracles, luck, fortune..."
12120-13 = "You're president of the Abydos Student Council! You need to take your position more seriously!"
12120-14 = "*rip* *riiip* *riiiiiiiiip*"
12120-16 = "Foreclosure Task Force Room"
12120-17 = "..."
12120-18 = "Seriously! What the heck are we gonna do?!"
12120-19 = "Just what is the Kaiser Corporation up to out there?"
12120-20 = "It looked like they were digging something up... That so-called \"treasure\"..."
12120-21 = "That can't be right. There's nothing but desert out there."
12120-22 = "No oil, no underground resources—nothing of value. That was confirmed ages ago."
12120-23 = "Then why take the land...?"
12120-24 = "No!! That's not the issue here!! What about our debt?! They want it paid off by the end of the month?! How are we supposed to do that?!"
12120-25 = "Kaiser Loans has already sent a reminder and requested a deposit. We have to come up with 300 million yen by next week."
12120-27 = "I'm going. I need to find out what they're doing out there."
12120-28 = "W-Wait! Shiroko?! Where are you—?!"
12120-29 = "To that PMC facility. I shouldn't have any trouble infiltrating it if I'm thorough. I'll get to the bottom of what they're using it for."
12120-30 = "That's only going to make things worse, Shiroko! We should be focusing on how to pay off the debt!"
12120-31 = "..."
12120-32 = "That debt isn't going to be paid off by doing what we've been doing. Now's the time for drastic measures."
12120-33 = "N-No! If you go off again..."
12120-34 = "...No, enough of that! What's the point of getting emotional?! If we lose the school, it's all over! I'm in!"
12120-35 = "What?! N-No way!"
12120-36 = "Huh?! Serika! Are you seriously going against Hoshino?!"
12120-37 = "That's not what I meant! I just..."
12120-38 = "You're the one making things worse, Serika! Are you planning to become a criminal now?!"
12120-39 = "I-I..."
12120-40 = "..."
12120-41 = "All right, all right. Settle down, everyone."
12120-42 = "You're all so heated, I swear the room's getting warmer."
12120-43 = "U-Um..."
12120-44 = "..."
12120-45 = "..."
12120-46 = "You're right. I'm sorry..."
12120-47 = "I-I didn't mean to get so desperate... My bad."
12120-48 = "Oh, I know, I know. I couldn't stay mad at you, Shiroko."
12120-49 = "..."
12120-50 = "Come on. Let's call it a day."
12120-51 = "We're done here! Let's cool our heads and meet up again tomorrow. Consider that president's orders."
12120-52 = "[s] \"Good call. Let's come back fresh tomorrow.\""
12120-54 = "The other club members head home one by one until only Hoshino and Shiroko are left."
12120-55 = "What's up Shiroko? Not going home?"
12120-56 = "Do you have a moment?"
12120-57 = "Sure. Is there something you wanted to say to me?"
12120-58 = "[s] \"I'm here too.\""
12120-59 = "Oh. You too, Sensei?"
12120-60 = "But I'm so beat from today. A lot happened."
12120-61 = "Can it wait until tomorrow? I think I already know what this is about."
12120-62 = "O-Oh, okay. Got it."
12120-63 = "Sensei?"
12120-64 = "[s] Nod."
12120-65 = "In that case..."
12120-67 = "Well, well, Sensei. When did you and sweet little Shiroko become close enough to understand each other just through eye contact?"
12120-68 = "Wow, guess I shouldn't underestimate you after all, Sensei. This old-timer is starting to feel a little left out here!"
12120-73 = "[ns] \"Be honest with me, Hoshino.\""
12120-74 = "Hmm? About what?"
12120-75 = "[s] Show Hoshino's resignation letter."
12120-78 = "Oh. Isn't this...?"
12120-79 = "Ack! When did you...?! Wait, this is Shiroko's doing, right?"
12120-80 = "Oh, come on, Shiroko. You can't go digging through your president's bag!"
12120-81 = "And you, Sensei! Shiroko's sure to become a supervillain when she's your age if you keep advocating the cool crime of robbery!"
12120-82 = "[s1] \"I'll have a talk with her later.\"\n[s2] \"For now, I need to talk to you.\""
12120-83 = "..."
12120-84 = "..."
12120-85 = "So that's how it's going to be."
12120-86 = "[s] \"Talk to me. There's something you haven't told anyone, isn't there?\""
12120-87 = "..."
12120-88 = "You've really got me by the short ones, huh?"
12120-89 = "*sigh* Fine."
12120-92 = "Mind going on a walk with me, Sensei?"
12120-93 = "[s] Step outside the classroom with Hoshino."
12120-100 = "*cough* *cough* The sand's piling up here too."
12120-101 = "There aren't enough of us to keep a building this big clean..."
12120-102 = "If only the sandstorms would calm down..."
12120-103 = "Pretty messed up, huh? Isn't it a bit too cruel that this old-timer's entire high school life was just...sand?"
12120-104 = "[s] \"You really like this school, don't you?\""
12120-105 = "What makes you think that?"
12120-106 = "They say this place used to be a massive, powerful school before the desert took over, but I wouldn't know anything about that."
12120-107 = "All I remember is a mess—a school in ruins, nothing in order."
12120-108 = "The school I first walked into all those years ago is now buried under sand, and all of the upperclassmen I looked up to are long gone."
12120-109 = "This isn't even the school's main building. It's just an annex that we ran to after every other building was lost to desertification."
12120-110 = "Then again, I wouldn't have met Shiroko, Nonomi, Ayane, and Serika had I not come here."
12120-111 = "*sigh*"
12120-112 = "Heh. I guess I am somewhat attached?!"
12120-113 = "[s] \"...\""
12120-114 = "Can I be honest with you, Sensei?"
12120-116 = "I've been receiving offers from some weird people for two years now."
12120-117 = "[s] \"Offers?\""
12120-118 = "The Kaiser Corporation."
12120-119 = "I guess you could call it headhunting. They've contacted me multiple times since I came to Abydos."
12120-120 = "Recently too..."
12120-122 = "I'm going to make you an offer you can't refuse."
12120-123 = "Half of Abydos' debt will instantly be forgiven if you agree to drop out of school and join the corporation I manage."
12120-124 = "Heh heh heh. So, do we have a deal? Yes? Then go ahead and sign here."
12120-126 = "How many times do I have to say it? No. My answer's still no."
12120-127 = "..."
12120-129 = "It was a tempting offer, no doubt. But back then, I kept refusing—because I knew if I left, Abydos would fall apart."
12120-130 = "But you know... they look like they're recruiting talent for their PMC."
12120-131 = "[s] \"Who was he?\""
12120-132 = "I don't know either... I just call him Black Suit..."
12120-133 = "[s] \"Black Suit...\""
12120-134 = "Something about him gives me the creeps. I've never seen anyone who looks like that in Kivotos."
12120-135 = "He's suspicious, no doubt... but he hasn't caused any trouble—yet."
12120-136 = "One thing's for sure, though. Even Kaiser's executives seem to fear him."
12120-137 = "[s] \"And this resignation letter?\""
12120-138 = "...Oh."
12120-139 = "...Well, it's not like I haven't had my doubts for a while now. Maybe this is just a trace of that hesitation."
12120-140 = "Let me see that. I'll throw it out."
12120-142 = "Heh. See? Now it's in the trash."
12120-143 = "Looks like I caused some unnecessary suspicion. But there's no use dwelling on something this unsettling."
12120-144 = "But they are my underclassmen, and I do owe it to them. I'll tell them the whole thing tomorrow."
12120-145 = "It's not exactly a happy story, but I know I shouldn't be keeping secrets from them."
12120-146 = "I have no idea how to go about this..."
12120-147 = "[s] \"I'm sure there's a way.\""
12120-148 = "..."
12120-149 = "Maybe. Anything can happen...even miracles."
12120-150 = "..."
12120-151 = "All right. We've talked about this long enough."
12120-152 = "See you tomorrow, Sensei."
12120-153 = "Bye."
12120-157 = "[ns] \"Hoshino!\""
12120-158 = "Yeah?"
12120-159 = "[s] \"You know you can rely on me, right? I'm sure there's a way!\""
12120-160 = "..."
12120-161 = "Heh. Did I look that down?"
12120-165 = "Okay, Sensei. Thanks."
12120-170 = "The next day."
12120-171 = "*sigh* Hello everyone. Ayane, coming in."
12120-174 = "Am I the first one here...?"
12120-176 = "Huh?"
12120-178 = "I-Is this...?"
12120-179 = "..."
12120-180 = "Kyaaaaaaah!"
12120-182 = "On the desk was Hoshino's club resignation, an academy dropout notice, and a letter."
12120-184 = "Next Episode;What Slipped Through the Cracks"

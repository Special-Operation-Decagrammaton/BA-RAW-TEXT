[translation]
12120-1 = "第12話;數個祕密"
12120-2 = "鏘──！"
12120-3 = "星野醬你看你看──！#n是阿拜多斯砂漠慶典以前的海報！我終於拿到了唷──！"
12120-4 = "聽說當時的綠洲就像湖水一樣寬廣呢～#n啊，這個就給你當紀念吧！"
12120-5 = "耶嘿嘿，很棒對吧～？#n如果奇蹟能夠發生的話，說不定人們會像那時候一樣一窩蜂地聚集過來──"
12120-6 = "奇蹟什麼的才不會發生，前輩。"
12120-7 = "那種東西現實中怎麼可能存在！"
12120-8 = "啊，啊嗚……"
12120-9 = "人們怎麼可能會跑到這種砂漠正中央來！不要再做白日夢了！！"
12120-10 = "嗚嗚，可是星野醬……#n對，對不起嘛，因為我是個笨蛋……"
12120-11 = "……！！"
12120-12 = "整天說什麼奇蹟、幸運、好事之類的……"
12120-13 = "你是阿拜多斯的學生會長耶！麻煩對自己肩上承擔的責任有點自覺好不好！"
12120-14 = "（唰唰──！）"
12120-16 = "對策委員會．教室"
12120-17 = "……"
12120-18 = "真是的，到底怎麼回事啊！"
12120-19 = "凱薩公司究竟在那裡計畫著什麼……？"
12120-20 = "雖然說了「在尋找寶物」……"
12120-21 = "不，那肯定是騙人的！#n那片沙漠裡應該什麼都沒有才對。"
12120-22 = "完全沒有石油之類能賺錢的地下資源……這是很久以前就已經調查出的事實。"
12120-23 = "那又為什麼要搶奪土地呢……"
12120-24 = "不對不對，跟那些事比起來，怎麼還錢比較重要吧！#n要在這個月還出錢來？要怎麼還啊！？"
12120-25 = "對方還要求支付保證金，送來了正式的催繳通知……必須在一週內籌到3億元……"
12120-27 = "……我過去看看。#n必須查清楚他們到底在那裡做什麼。"
12120-28 = "白，白子前輩！？去看看是要去哪裡……？"
12120-29 = "PMC的設施。徹底做好準備再潛入調查的話，應該不會有問題。#n得弄清楚那裡的真相才行。"
12120-30 = "等，等等啊白子前輩！#n現在添亂怎麼行，應該先處理債務吧！"
12120-31 = "……"
12120-32 = "債務……用正當的方法已經無法還清了。#n不用其他手段的話……"
12120-33 = "不，不可以！那樣又會……"
12120-34 = "……我也贊成！#n學校沒了的話一切就結束了，現在不能在乎那些有的沒的！"
12120-35 = "咦！？不，不行啊！"
12120-36 = "等等，茜香醬！你要違背星野前輩的話嗎！？"
12120-37 = "我，我不是那個意思！只是……！"
12120-38 = "茜香醬這樣才是在添亂吧！你打算變成犯罪者嗎！？"
12120-39 = "我，我……"
12120-40 = "……"
12120-41 = "好了好了，大家冷靜一點～"
12120-42 = "頭頂上都快冒煙了唷～？"
12120-43 = "嗯……"
12120-44 = "……"
12120-45 = "……"
12120-46 = "是，對不起……"
12120-47 = "……抱歉，我沒有想造成這種情況的意思。"
12120-48 = "哎呀～大家都知道唷。白子醬是個乖孩子嘛。"
12120-49 = "……"
12120-50 = "總之今天先說到這邊吧。"
12120-51 = "解散解散～先讓腦袋冷靜一下，明天再集合吧。#n這是委員長命令哦。"
12120-52 = "[s] 「……也對。大家先回家吧。」"
12120-54 = "（野乃美、綾音和茜香都回家了，只剩下星野和白子）"
12120-55 = "咦？白子醬還有什麼事嗎？"
12120-56 = "……前輩，可以談一下嗎？"
12120-57 = "唔嘿～有什麼話要跟大叔說嗎？"
12120-58 = "[s]「我也有話想跟星野說。」"
12120-59 = "啊……老師也有？"
12120-60 = "可是今天發生了很多事，大家都累了吧？"
12120-61 = "明天再說吧。#n我大概知道是什麼事了。"
12120-62 = "……嗯，我知道了。"
12120-63 = "老師……"
12120-64 = "[s] 點頭"
12120-65 = "嗯，明天見……"
12120-67 = "咦～老師什麼時候和我可愛的白子醬，成為一個眼神就能心意相通的關係的呀～？"
12120-68 = "哎呀，果然不能小看大人呢～#n這樣大叔會寂寞的唷。"
12120-73 = "[ns] 「星野，希望你可以老實告訴我。」"
12120-74 = "嗯？告訴你什麼？"
12120-75 = "[s] 遞出星野的退部．退會申請書"
12120-78 = "那是……"
12120-79 = "唔嘿～是什麼時候……！？#n不，一定是白子醬偷的吧？"
12120-80 = "白子醬真是的，再怎麼樣也不能翻前輩的背包吧～"
12120-81 = "老師要好好教訓白子醬唷！#n否則再這樣下去會變成可怕的大壞人的！"
12120-82 = "[s1] 「之後會好好告誡他的。」\n[s2] 「現在我想先聊星野的事。」"
12120-83 = "……"
12120-84 = "……"
12120-85 = "這樣啊……"
12120-86 = "[s] 「你有事情瞞著大家對吧？」"
12120-87 = "……"
12120-88 = "唔嗯……突然這麼認真……"
12120-89 = "……唉，我知道了。"
12120-92 = "……老師，要不要一起走走？"
12120-93 = "[s] 和星野一起離開教室"
12120-100 = "咳咳，咳咳……#n哇，這裡怎麼也都是砂塵……"
12120-101 = "不過這也沒辦法。#n畢竟我們人力不足，這棟建築又太大了……"
12120-102 = "要是砂塵暴能少一點就好了……"
12120-103 = "唔嘿～大叔我的高中生活全都是沙子的顏色，不覺得有點悲慘嗎？"
12120-104 = "[s] 「星野很喜歡這間學校呢。」"
12120-105 = "……咦？為什麼這麼認為？"
12120-106 = "據說阿拜多斯在砂漠化之前，是個規模龐大且強大的學校……#n大叔我卻完全沒有那樣的記憶呢～"
12120-107 = "只覺得是間亂七八糟，沒有一個東西是像樣的學校而已。"
12120-108 = "大叔我入學時的校舍，現在已經被埋在砂漠底下……#n認識的那些前輩也全都不知去向了。"
12120-109 = "而這裡也不是阿拜多斯本館的校舍……#n只是在躲避沙漠化而不斷遷移的過程中，最後來到的別館而已。"
12120-110 = "……嗯，不過來到這裡也讓我遇見了白子醬、野乃美醬、綾音醬和茜香醬……"
12120-111 = "……"
12120-112 = "……耶嘿，果然還是有點喜歡吧～"
12120-113 = "[s]「…………」"
12120-114 = "……老師，我老實告訴你吧。"
12120-116 = "2年前，我收到了某個奇怪傢伙的提案。"
12120-117 = "[s] 「提案？」"
12120-118 = "凱薩公司……"
12120-119 = "不知道該稱之為提案還是挖角……在我進入阿拜多斯之後就一提再提……"
12120-120 = "就連最近也有呢……"
12120-122 = "我會向你提出一個無法拒絕的提案。"
12120-123 = "從阿拜多斯退學，加入我們的企業──#n只要接受這項條件，我可以免除阿拜多斯一半的債務。"
12120-124 = "咯咯，咯咯咯咯……那麼，告訴我你的答案吧。#n如果是YES的話，請在這裡簽名。"
12120-126 = "……我應該說過很多次了，我拒絕。"
12120-127 = "……"
12120-129 = "那無疑是個相當驚人的條件。#n不過我當時認為如果自己離開，阿拜多斯高中就會徹底毀滅，因此不斷拒絕他們……"
12120-130 = "……那些傢伙似乎在集結能在PMC使用的人才。"
12120-131 = "[s] 「……那個人是誰？」"
12120-132 = "我也不知道他的真實身分……不過我都稱他為「黑色西裝人」。"
12120-133 = "[s]「黑色西裝人……」"
12120-134 = "是個令人毛骨悚然的傢伙……就算在奇普托斯也從沒看過像他那樣的人……"
12120-135 = "雖然是個可疑的傢伙，不過也沒有造成什麼問題……"
12120-136 = "不過連那個凱薩的董事，看起來也明顯顧忌著他。"
12120-137 = "[s] 「那這個退部申請書……」"
12120-138 = "……啊啊。"
12120-139 = "……要說從來沒有煩惱過是騙人的。#n這應該可以說是迷惘的痕跡吧。"
12120-140 = "像這樣……把它丟進垃圾桶。"
12120-142 = "唔嘿～清爽多了。 "
12120-143 = "抱歉造成了不必要的誤會。#n我只是覺得討論這些令人不安的事也沒有好處而已。"
12120-144 = "不過一直對可愛的後輩們有所隱瞞也不好……明天我會好好告訴大家的。"
12120-145 = "雖然聽了也只會讓人困擾，不過總比隱瞞來得好吧。"
12120-146 = "老實說我現在也想不到其他方法了……"
12120-147 = "[s] 「不，一定還有方法才對。」"
12120-148 = "……"
12120-149 = "說得也是，如果能有奇蹟發生就好了……"
12120-150 = "……"
12120-151 = "那～這件事就說到這裡吧。"
12120-152 = "明天見囉，老師。"
12120-153 = "再見。"
12120-157 = "[ns]「星野！」"
12120-158 = "怎，怎麼了……？"
12120-159 = "[s] 「身為大人的我會想辦法解決！一定還有辦法的！」"
12120-160 = "……"
12120-161 = "……唔嘿嘿。我看起來有那麼沒精神嗎？"
12120-165 = "嗯，謝謝你，老師。"
12120-170 = "（隔天）"
12120-171 = "唉，各位辛苦了……"
12120-174 = "咦，我是第一個到的嗎……？"
12120-176 = "……嗯？"
12120-178 = "這，這是……？"
12120-179 = "……"
12120-180 = "什麼──！！？？"
12120-182 = "（桌上放著星野留下的退部．退會申請書，以及一封留給大家的信）"
12120-184 = "下一話;錯失的事物"

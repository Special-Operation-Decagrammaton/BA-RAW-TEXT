[translation]
10044005-1 = "บทเริ่มต้น;เด็กสาวเอ๋ย เชิญขึ้นรถไฟสายนรก"
10044005-10 = "แหมๆ~ นี่มันสถานการณ์อันตรายจริงๆ เลยนะเนี่ย"
10044005-11 = "วิกฤต หนัก"
10044005-16 = "ฉะ... ฉันสังหรณ์ใจไม่ดีมาตั้งแต่แรกแล้วค่ะ... เฮ้อ..."
10044005-19 = "ฮะฮ่าฮ่า! ขอปล้นรถไฟขบวนนี้ละนะ!!"
10044005-20 = "ถ้าเอามาเป็นของเราไม่ได้ ก็จะทำลายให้ไม่เหลือชิ้นดีเลย!!"
10044005-25 = "ทะ... ทำไมถึงเป็นอย่างนี้ไปได้ล่ะคะ~~~!!!"

[translation]
10046150-3 = "ยะฮู้ว★"
10046150-4 = "คุณมิกะ?!"
10046150-5 = "อะฮ่า อิจิกะจัง~ ได้ข่าวว่าต้องเหนื่อยเพราะนางิจังไปก่อเรื่องแปลกๆ ไว้งั้นเหรอ~"
10046150-6 = "พอได้ยินเรื่องแบบนี้ ฉันก็เลยมาช่วย..."
10046150-10 = "เอ๋... นึกว่าจะดีใจเสียอีก"
10046150-11 = "นี่ฉันทำอะไรผิดไว้อีกแล้วหรือเปล่า?"
10046150-12 = "มะ... ไม่ค่ะ! ไม่ใช่อย่างนั้นค่ะ!"
10046150-13 = "ฉันแค่... ตกใจนิดหน่อยน่ะค่ะ"
10046150-14 = "อ้อ งั้นเหรอ? งั้นก็โล่งอกไปทีนะ"
10046150-15 = "แต่ฉันว่า... คุณมิกะกลับไปอยู่ที่ชายหาดที่มีคนอยู่กันเยอะๆ ไม่ดีกว่าเหรอคะ?"
10046150-16 = "หืม? ทำไมล่ะ?"
10046150-17 = "ถ้าจะถามหาเหตุผล... ก็คงเป็นเพราะฉันมักจะไปลาดตระเวนในที่ที่อันตรายเป็นส่วนใหญ่น่ะค่ะ"
10046150-18 = "อ้อ อิจิกะจังเป็นห่วงฉันงั้นเหรอ?"
10046150-19 = "อ่า ค่ะ... ก็... ประมาณนั้นน่ะค่ะ... ก็การดูแลความปลอดภัยของสภาน้ำชาก็เป็นหนึ่งในงานหลักของ#nชมรมทวงความยุติธรรมนี่คะ"
10046150-20 = "งั้นก็ไม่เป็นไรหรอก~"
10046150-21 = "เห็นอย่างนี้ฉันก็สู้เก่งพอตัวนะ!"
10046150-22 = "แหะๆๆ... แต่นี่เป็นการลาดตระเวนเพื่อป้องกันไม่ให้เกิดสถานการณ์ที่คุณมิกะต้องต่อสู้นะคะ..."
10046150-23 = "อะไรกัน อิจิกะจังกันไม่ให้ฉันเข้าพวกเพราะฉันเป็นสภาน้ำชาเหรอ?"
10046150-27 = "ถ้างั้นก็ อืม... เอาอย่างนี้มั้ยล่ะ?"
10046150-28 = "ถ้าบอกว่าคนที่มาช่วยไม่ใช่สภาน้ำชา แต่เป็นมิโซโนะ มิกะ เพื่อนของอิจิกะจังล่ะ?"
10046150-29 = "แบบนั้นมัน...?"
10046150-30 = "อะฮ่า! ได้ผลใช่มั้ย?"
10046150-31 = "ฮ่าฮ่า เล่นอะไรคะเนี่ย~"
10046150-32 = "งั้นก็ช่วยไม่ได้นะคะ..."
10046150-33 = "หืม? งั้นก็แสดงว่า?"
10046150-34 = "ค่ะ ฉันต้องรบกวนด้วยนะคะ คุณมิกะ"
10046150-35 = "เย้! ห้ามเปลี่ยนใจทีหลังนะ ถ้างั้นก็ขอฝากตัวด้วยล่ะ!"

[translation]
10046150-3 = "Hiya! ★"
10046150-4 = "Mika?!"
10046150-5 = "Haha, Ichika! I heard Nagi's blunder has you working to the bone!"
10046150-6 = "So I've come to help you out!"
10046150-10 = "...Oh. I thought you'd like that."
10046150-11 = "Did I say something wrong?"
10046150-12 = "N-No! No Mika, not at all!"
10046150-13 = "I was just...surprised. And so grateful."
10046150-14 = "Oh, yeah? I'm glad."
10046150-15 = "Still, how about you return to the main part of the beach? With the crowds and music..."
10046150-16 = "Huh? Why?"
10046150-17 = "It's because I tend to patrol the more sparse and dangerous areas."
10046150-18 = "Ah, are you worried about me?"
10046150-19 = "Yes...guarding the Tea Party is one of the Justice Task Force's duties. It's my job to worry."
10046150-20 = "Oh, then don't!"
10046150-21 = "I'm actually really strong!"
10046150-22 = "Hahaha... Well, I'm hoping it won't come to that."
10046150-23 = "This is because I'm in the Tea Party, isn't it?"
10046150-27 = "Then, what if I do this?"
10046150-28 = "What if we forget my title and I just helped you as regular, ordinary Misono Mika? As a friend?"
10046150-29 = "...You're still in the Tea Party."
10046150-30 = "Haha. I guess so."
10046150-31 = "Haha. And yet..."
10046150-32 = "...if you were to insist..."
10046150-33 = "Huh? You mean I can—?"
10046150-34 = "Yes, I'll gladly accept your help, Mika."
10046150-35 = "Yay! No takebacks! All right! Watch my rear!"

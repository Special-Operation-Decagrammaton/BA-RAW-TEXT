[translation]
1006315-1 = "สิทธิ์ในการลวง"
1006315-2 = "(หลังได้รับการติดต่อจากโคยูกิ คุณครูก็มาที่ห้องสำนึกผิด)"
1006315-8 = "(สิ่งที่เห็นหลังเปิดประตูเข้าไปก็คือ...)"
1006315-9 = "(ลูกแก้วขนาดใหญ่ที่วางอยู่ตรงกลางโต๊ะ)"
1006315-10 = "(และตรงกลางมีใบโคลเวอร์สี่แฉกติดอยู่...)"
1006315-11 = "[ns] \"นะ... นี่มัน...\""
1006315-14 = "เห็นแล้วใช่มั้ยคะคุณครู!"
1006315-15 = "เป็นไงคะ? ใบโคลเวอร์สี่แฉกที่คุณครูหามาให้ฉันเมื่อคราวก่อน ฉันเอามาทำเป็นลูกแก้วแล้วค่ะ "
1006315-16 = "ถ้าทำไว้แบบนี้ใบโคลเวอร์ก็จะไม่แห้งกรอบแกรบ..."
1006315-17 = "แถมไม่หายด้วยค่ะ!"
1006315-18 = "คงสภาพให้อยู่เหมือนเดิมไว้ได้ตลอดไปอีกด้วย! อุวะฮ่าฮ่าฮ่า!"
1006315-19 = "[ns] \"ซึ้งใจจัง...!\""
1006315-21 = "[ns] \"เห็นบอกครูว่าทำอะไรบางอย่างหายไม่ใช่เหรอ...?\""
1006315-22 = "ใช่แล้วค่ะ!"
1006315-23 = "ได้โปรดใช้ความสามารถในการค้นหาใบโคลเวอร์สี่แฉกของคุณครู... "
1006315-24 = "ช่วยฉันตามหาเหรียญด้วยเถอะค่ะ!"
1006315-25 = "[s1] \"เหรียญเหรอ? ครูให้ยืมก่อนมั้ย?\"\n[s2] \"ถ้าจำเป็นต้องใช้เงินจริงๆ ครูให้ยืมก่อนเอามั้ย?\""
1006315-28 = "ไม่ใช่แบบนั้นนะคะ! มันไม่ใช่เหรียญธรรมดาๆ นะคะ"
1006315-29 = "มันเป็นเหรียญที่มีรูเล็กๆ อยู่ที่มุมด้านหนึ่ง... เป็นเหรียญที่พิเศษมากๆ เลยค่ะ"
1006315-30 = "[s] \"หรือว่า... อันนี้เหรอ?\""
1006315-31 = "คะ...?"
1006315-36 = "(คุณครูหยิบบางอย่างออกมาจากกระเป๋าแล้วยื่นให้โคยูกิ)"
1006315-42 = "เฮือก?! ทำไมเหรียญอันนี้ถึงอยู่ที่คุณครูได้ล่ะคะ?!"
1006315-43 = "หรือว่านี่เป็นการแก้แค้นที่ฉันไปค้นเจอ... หนังสือเล่มบางๆ พวกนั้น...?!"
1006315-44 = "[s] \"พูดอะไรแบบนั้น... ครูเก็บได้ระหว่างทางมาที่นี่ต่างหาก\""
1006315-45 = "โธ่เอ๊ย! นั่นมันประโยคหากินซ้ำซากจำเจที่เอาไว้พูดถ่อมตัวนี่คะ!"
1006315-46 = "คะ? เก็บได้ที่ตรงทางเดินด้านหน้าห้องสำนึกผิดจริงๆ เหรอคะ?"
1006315-47 = "เอ่อ... คือ... พูดจริงเหรอคะ? "
1006315-48 = "ขอโทษค่ะ..."
1006315-49 = "ฉันเผลอทำตกตอนเดินกลับจากห้องเรียนรึเปล่านะ..."
1006315-56 = "(วางเหรียญที่มีรูลงบนมือโคยูกิ)"
1006315-57 = "ฮะฮ่า! คิดถูกแล้วจริงๆ ที่ขอให้คุณครูมาหา!"
1006315-58 = "ขอบคุณค่ะ คุณครู!"
1006315-59 = "ฮุฮุ ในที่สุดมันก็กลับมาอยู่กับฉันแล้ว อุวะฮ่าฮ่าฮ่า..."
1006315-60 = "[s3] \"มันคือเหรียญอะไรเหรอ?\"\n[s4] \"พวกเหรียญตกคิวซีเหรอ...?\""
1006315-63 = "เหรียญตกคิวซี...? มันคืออะไรเหรอคะ?"
1006315-64 = "อ๋อ เหรียญหรือธนบัตรที่มีราคาซื้อขายสูงเพราะเกิดจากข้อผิดพลาดในกระบวนการผลิตเหรอคะ?"
1006315-65 = "ไม่ใช่สักหน่อยค่ะ! ฉันเจาะรูนี้กับมือเองเลยต่างหาก! มันไม่ใช่ของที่ผลิตจากโรงงานหรอกนะคะ เป็นเหรียญทำมือพิเศษที่ฉันทำขึ้นต่างหากค่ะ?!"
1006315-66 = "[s] \"พอดูให้ดีๆ มันก็ไม่ใช่เงินจริงๆ ด้วยแฮะ\""
1006315-67 = "ใช่แล้วค่ะ! นี่เป็นเหรียญที่หยอดตู้เกมค่ะ"
1006315-68 = "[s5] \"แล้ว... เจาะรูทำไมเหรอ?\"\n[s6] \"อารมณ์เหมือนเด็กที่ชอบขูดโต๊ะเรียนหรือไง?\""
1006315-71 = "ขูดโต๊ะ... มันสนุกจริงๆ นะคะ..."
1006315-72 = "แต่ว่านะ เจ้าเหรียญนี่น่ะ ไม่ใช่เรื่องไร้สาระอะไรแบบนั้นหรอกนะคะ"
1006315-73 = "เพราะมันคือ... <เหรียญเดิมพัน> ที่ฉันทำขึ้นเองตอนเด็กๆ ค่ะ!"
1006315-74 = "[s] \"เหรียญเดิมพัน?\""
1006315-75 = "ค่ะ! เจาะรูไว้บนเหรียญแบบนี้แล้วก็เอาเชือกมาร้อยผูกไว้..."
1006315-76 = "จากนั้นก็จับปลายเชือกอีกด้านเอาไปใส่ไว้ในเครื่องเล่นเกม แล้วก็..."
1006315-77 = "[s7] \"พอเกมจะจบตาก็ดึงเชือกเอาเหรียญคืนสินะ...\"\n[s8] \"ดึงเชือกแล้วจะได้เหรียญคืนมาสินะ\""
1006315-80 = "ใช่ค่ะ! คุณครูก็รู้ดีเลยนะคะเนี่ย!"
1006315-84 = "[ns] \"น่าจะเรียกว่าเหรียญโกงแทนเหรียญเดิมพันนะ...!\""
1006315-85 = "คะ? หมายความว่ายังไงคะ คุณครู?"
1006315-86 = "นี่เป็นเหรียญที่ใช้เดิมพันชัยชนะอย่างยุติธรรมก็ถูกแล้วนี่คะ"
1006315-87 = "คุณครูก็เคยลองเล่นตู้คีบตุ๊กตามาแล้วนี่คะ เคยเห็นตุ๊กตาที่คีบขึ้นมาแล้วก็หล่นลงไปอยู่ที่เดิมอีก#nใช่มั้ยคะ?"
1006315-88 = "แล้วคุณครูก็เห็นแล้วนี่คะว่าตอนที่เล่นเกม <ต่อร้านชา> มันเจอแต่แพทเทิร์นยากๆ ทั้งนั้นเลย?!"
1006315-89 = "ดูสิคะ พวกเกมตู้นี่มันหลอกเราอยู่นะคะ!"
1006315-90 = "เพราะงั้นเราก็มีสิทธิ์โกงเกมตู้กลับได้เหมือนกันค่ะ!"
1006315-91 = "[s] \"คนปกติเรียกเรื่องแบบนั้นว่าอาชญากรรมนะ โคยูกิ\""
1006315-92 = "อึก...!"
1006315-93 = "ฉันคิดว่าคุณครูจะเข้าใจฉันซะอีก...!"
1006315-94 = "ตะ... แต่ยังไงฉันก็ไม่ให้เหรียญหรอกนะคะ!"
1006315-95 = "เพราะมันใช้งานไม่ได้อีกต่อไปแล้วค่ะ! พอใช้ไปสักครั้งสองครั้ง ตู้เกมร้านแถวๆ นั้น#nก็ได้รับการอัปเกรดระบบความปลอดภัยใหม่กันหมดเลย...!"
1006315-96 = "[s] \"ทำไมถึงหวงขนาดนั้นล่ะ?\""
1006315-97 = "คะ? คะ... คือว่า..."
1006315-101 = "ฉันก็ไม่แน่ใจค่ะ... "
1006315-102 = "เพราะอะไรกันนะ อืม..."
1006315-103 = "ก็แค่... รู้สึกไม่อยากทิ้งมันไปละมั้งคะ"
1006315-104 = "เอาละๆ ช่างเถอะค่ะ! ไหนๆ คุณครูก็มาแล้วมาเล่นอะไรสนุกๆ กันดีกว่าค่ะ!"
1006315-105 = "ฉันมีบอร์ดเกมใหม่กับแพ็กเสริมซ่อนอยู่ใต้เตียงน่ะค่ะ"
1006315-107 = "(หลังจากจากนั้นคุณครูก็เล่นบอร์ดเกมกับโคยูกิอย่างสนุกสนาน)"
1006315-108 = "(และทันทีที่ออกมาจากห้องสำนึกผิด คุณครูก็ไปลงทะเบียนให้โคยูกิเข้าร่วมอบรมมารยาทสาธารณะ#nประจำวันที่ทางวัลคิรี่จัดขึ้นทันที)"

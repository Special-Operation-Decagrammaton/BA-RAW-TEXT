[translation]
1006315-1 = "欺瞞的權利"
1006315-2 = "（接到小雪的聯絡後，前往了反省室）"
1006315-8 = "（打開門後，映入眼簾的是……）"
1006315-9 = "（擺在桌子中央的大型玻璃球）"
1006315-10 = "（……裡面鑲嵌著四葉幸運草）"
1006315-11 = "[ns]「這，這是……」"
1006315-14 = "看到了吧，老師！"
1006315-15 = "怎麼樣？之前老師幫我找到的四葉幸運草，已經昇華成玻璃工藝品了哦！"
1006315-16 = "這樣就不會乾枯或碎掉……"
1006315-17 = "也不會再弄丟了！"
1006315-18 = "可以當成寶物永遠保存下去！尼哈哈哈！"
1006315-19 = "[ns]「好感動……！」"
1006315-21 = "[ns]「話說，你不是說有東西弄丟了嗎……？」"
1006315-22 = "沒錯！"
1006315-23 = "所以希望老師能用找到四葉幸運草的那種能力……"
1006315-24 = "幫我找回我的硬幣！"
1006315-25 = "[s1]「硬幣？」\n[s2]「……如果急用的話，要不要我先借你？」"
1006315-28 = "不是！我要找的不是普通的硬幣！"
1006315-29 = "是邊緣有個小孔的……非常特別的硬幣！"
1006315-30 = "[s]「你指的……難道是這個？」"
1006315-31 = "……咦？"
1006315-36 = "（將東西從口袋裡拿了出來）"
1006315-42 = "咦！？為什麼老師會有這枚硬幣！？"
1006315-43 = "難道是因為上次被我抓到看那種薄薄的本子……所以才想報復我！？"
1006315-44 = "[s]「你別亂說。這是我碰巧撿到的。」"
1006315-45 = "騙人！那肯定是尷尬的時候用來糊弄人的老套藉口！"
1006315-46 = "咦？真的是在反省室外的走廊撿到的？"
1006315-47 = "啊……那個……真的嗎？"
1006315-48 = "對不起……"
1006315-49 = "可能是我剛才下課回來的時候掉的吧……"
1006315-56 = "（將打孔的硬幣交給了小雪）"
1006315-57 = "尼哈哈！果然叫老師過來是正確的！"
1006315-58 = "謝謝老師！"
1006315-59 = "呵呵，這傢伙終於又回到我手裡了，尼哈哈哈……"
1006315-60 = "[s3]「話說那個硬幣是什麼？」\n[s4]「是錯誤幣……之類的嗎？」"
1006315-63 = "錯誤幣？那是什麼啊？"
1006315-64 = "啊，是指製造過程中有出錯，會被高價交易的那種硬幣嗎？"
1006315-65 = "不對不對！這個孔是我親手打出來的！#n這才不是什麼工廠製造出來的東西，是小雪我特製的手工製品懂嗎！？"
1006315-66 = "[s]「仔細一看，這好像不是普通硬幣吧。」"
1006315-67 = "沒錯！這是遊戲中心的專用代幣哦。"
1006315-68 = "[s5]「所以……為什麼要打孔呢？」\n[s6]「類似某些人會想在學校桌子上鑽洞嗎？」"
1006315-71 = "在桌子上鑽洞……確實還挺有趣的沒錯……"
1006315-72 = "但這可不是那種幼稚的行為！"
1006315-73 = "這是……我小時候親手製作的「勝負硬幣」！"
1006315-74 = "[s]「勝負硬幣？」"
1006315-75 = "對！就是在硬幣上打孔，然後綁一條線……"
1006315-76 = "抓住線的另一端後，把硬幣放進遊戲機。#n接下來……"
1006315-77 = "[s7]「等遊戲結束之後再拉線……」\n[s8]「把硬幣收回來對吧？」"
1006315-80 = "沒錯！老師你很懂嘛！"
1006315-84 = "[ns]「那根本不是什麼勝負硬幣，而是作弊硬幣吧……！」"
1006315-85 = "咦？你在說什麼啊老師？"
1006315-86 = "這個硬幣明明是為了公平地分出勝負而存在的！"
1006315-87 = "老師也玩過夾娃娃機對吧？#n是不是有遇到過明明夾得很好，結果爪子卻自己把娃娃放掉的情況？"
1006315-88 = "還有上次玩「喫茶店登山」的時候，不是也只有我們遇到那種超難的模式嗎？"
1006315-89 = "遊戲機分明是在欺騙我們！"
1006315-90 = "所以我們當然也有權利欺騙遊戲機！"
1006315-91 = "[s]「世人通常把那種行為稱為犯罪哦，小雪同學。」"
1006315-92 = "唔……！"
1006315-93 = "還以為老師會理解我的說……！"
1006315-94 = "不，不過這個硬幣我是不會交給你的！"
1006315-95 = "而且現在也沒辦法用了！#n我才用了幾次，附近的遊戲機就全部更新了防護措施！"
1006315-96 = "[s]「那你為什麼還這麼珍惜它？」"
1006315-97 = "咦？那，那是因為……"
1006315-101 = "唔嗯……"
1006315-102 = "為什麼呢……"
1006315-103 = "就只是……不想把它丟掉而已吧？"
1006315-104 = "總，總之既然你都來了，就一起玩一下再走吧！"
1006315-105 = "我把新出的桌遊擴充包藏在床底下哦！"
1006315-107 = "（之後在反省室和小雪一起玩了桌遊）"
1006315-108 = "（並在離開之後立刻幫小雪報名了女武神舉辦的每日公民道德教育課程）"

[translation]
1006315-1 = "Rights to Deceive"
1006315-2 = "After Koyuki messaged me, I headed to the Self-Reflection Room."
1006315-8 = "And, when I opened the door..."
1006315-9 = "I found a large glass marble sitting at the center of the desk."
1006315-10 = "It had a four-leaf clover suspended inside it."
1006315-11 = "[ns] \"Th-This is...\""
1006315-14 = "You saw, Sensei?"
1006315-15 = "How do you like it? That clover you found is preserved in the glass!"
1006315-16 = "With this, I'll never have to worry about it drying or crumbling away."
1006315-17 = "...And it's much harder to lose!"
1006315-18 = "I can even pass it down as a family heirloom! Nihahaha!"
1006315-19 = "[ns] \"Touching...!\""
1006315-21 = "[ns] \"Anyway, I thought you said that you lost something?\""
1006315-22 = "That's right!"
1006315-23 = "I figured, since you were so talented at spotting the four-leaf clover... "
1006315-24 = "You could find my missing coin, Sensei!"
1006315-25 = "[s1] \"Coin?\"\n[s2] \"...If it's a bleak situation, I can lend you some money...\""
1006315-28 = "No! It's not some ordinary coin!"
1006315-29 = "It's a very special coin, with a tiny hole in the center."
1006315-30 = "[s] \"You mean...this?\""
1006315-31 = "...What?"
1006315-36 = "Present her the coin."
1006315-42 = "Eh?! Why do you have this, Sensei?!"
1006315-43 = "Did you steal this as revenge for that time I discovered your thin books?"
1006315-44 = "[s] \"What? I picked it up on the way here.\""
1006315-45 = "Eh-eh! A likely story! I've heard THAT excuse before!"
1006315-46 = "Wait? You really found it in the Self-Reflection Hallway?"
1006315-47 = "Uh... Um... Really? "
1006315-48 = "I'm sorry..."
1006315-49 = "I must have dropped it on the way to class."
1006315-56 = "I handed Koyuki the coin with the hole in it."
1006315-57 = "Nihaha! So, I guess calling you WAS a good idea!"
1006315-58 = "Thank you, Sensei!"
1006315-59 = "Fufu. You rascal. You've found your way home. Nihaha..."
1006315-60 = "[s3] \"So, what's with the coin?\"\n[s4] \"Something...like an error currency?\""
1006315-63 = "Error currency? What's that?"
1006315-64 = "Oh, you mean money that's misprinted or misstamped?"
1006315-65 = "No! I drilled the hole myself! It's a Koyuki hand-made special!"
1006315-66 = "[s] \"Looking at it again, it's not even a real coin.\""
1006315-67 = "Yes! It's an arcade token. It's a very special coin."
1006315-68 = "[s5] \"Anyway... Why did you drill a hole in it?\"\n[s6] \"Is it like how you enjoy drilling holes in school desks?\""
1006315-71 = "Desk drilling... That is a fun activity..."
1006315-72 = "But you see. Fu. Fu. Fu. This isn't something childish like that."
1006315-73 = "This...is a challenge coin I made when I was really little."
1006315-74 = "[s] \"Challenge coin?\""
1006315-75 = "Yes! You drill a hole in a coin like this, tie a thread..."
1006315-76 = "...and, while holding on to the string, you slot it in a gaming machine. And then..."
1006315-77 = "[s7] \"You pull the string back...\"\n[s8] \"...and recover the coin?\""
1006315-80 = "That's right! You're catching on."
1006315-84 = "[ns] \"That's a cheating coin, not a challenge coin...!\""
1006315-85 = "Huh? What do you mean, Sensei?"
1006315-86 = "This isn't \"cheating.\" It's all for fairness! Fair and square!"
1006315-87 = "You ever use a claw machine, Sensei? You have the doll in your grasp, it's lifted, it's still in the claw... Then the machine just drops it at the last second like it's no big deal!"
1006315-88 = "And when you play \"Teatime Hiking,\" the machine just throws out a new pattern as soon as you're getting in the groove!"
1006315-89 = "See? The games are deceptive, cruel, and unfair!"
1006315-90 = "And that...is why I have the right to even the odds a little."
1006315-91 = "[s] \"I believe that's called a 'crime,' Miss Koyuki.\""
1006315-92 = "Tch...!"
1006315-93 = "I thought Sensei would get it!"
1006315-94 = "B-But I'm still not going to get rid of this coin!"
1006315-95 = "I can't even use it anymore, anyway! It worked once or twice, and then all the game machines changed to a card system."
1006315-96 = "[s] \"Why are you treating it so preciously, then?\""
1006315-97 = "Huh? W-Well..."
1006315-101 = "...I'm not sure. "
1006315-102 = "Why is it? Hm..."
1006315-103 = "Well... I guess I didn't want to throw it away?"
1006315-104 = "Anyway! Since you're here, let's play!"
1006315-105 = "I just got a new board game! And the expansion pack!"
1006315-107 = "We played the new game together in the Self-Reflection Room."
1006315-108 = "And, once I left, I signed Koyuki up for an ethics seminar taught by Valkyrie."

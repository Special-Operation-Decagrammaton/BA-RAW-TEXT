[translation]
2000606-1 = "Laws of Trendiness"
2000606-2 = "Shanhaijing, Peach Blossom Spring"
2000606-4 = "I stopped by a nearby teahouse to enjoy some tea after finishing my work at Shanhaijing Academy."
2000606-5 = "[s] \"Saya?\""
2000606-6 = "Oh, Sensei?"
2000606-7 = "I wasn't expecting to run into you at a teahouse in Shanhaijing."
2000606-8 = "This seat's empty, so wanna join me?"
2000606-9 = "[s1] \"Are you also here for a cup of tea?\"\n[s2] \"Please tell me you're not experimenting on the tea.\""
2000606-10 = "Yeah. This place's atmosphere is great, and the tea is excellent. It's perfect for after a meal."
2000606-11 = "I usually drop by here when I visit Black Tortoise Promenade during my days off."
2000606-12 = "Rude! I'm not always experimenting on the things I consume, you know."
2000606-13 = "I like enjoying a cup of tea here after a meal, just like any Shanhaijing student would."
2000606-14 = "And besides, all the food in the Promenade has been so spicy lately that I would get a stomachache if I didn't have tea after eating. That's really why I've been coming here more often."
2000606-15 = "It's all because of my special spicy sauce."
2000606-16 = "[s] \"It's really been gaining popularity, huh?\""
2000606-17 = "It's more than just popular!"
2000606-18 = "It's on fire right now. Almost every dish on the Promenade uses that sauce!"
2000606-19 = "And it isn't just used in mapo tofu or dandan noodles—it's also sprinkled on dishes that aren't normally spicy, like fried rice and dumplings!"
2000606-20 = "I know it's trendy, but don't you think that's going too far? Not everyone likes spicy food, yet they keep adding it to every dish imaginable."
2000606-21 = "Why couldn't it have been a trend that sprinkles cheese on everything instead...?"
2000606-22 = "[s] \"Trends are trends for a reason. It'll slow down eventually.\""
2000606-23 = "Well, I'm just glad they don't use it here at Peach Blossom Spring."
2000606-24 = "Though I guess that's obvious. No idiot would add spicy sauce to their tea, no matter how much they like it. Hahaha!"
2000606-25 = "I can enjoy my day off in peace here."
2000606-28 = "Hello, Saya! You've been visiting Peach Blossom Spring quite a bit lately."
2000606-29 = "The timing's perfect. There's something I've been meaning to ask you."
2000606-30 = "Me? What is it?"
2000606-31 = "I heard the noodle shop's new menu item became a hit after you gave them some advice."
2000606-32 = "It just so happens that we're looking to revamp our menu as well. Would you mind tasting one of our new items to give us some feedback before launch?"
2000606-33 = "Sure! I don't mind at all!"
2000606-34 = "Splendid. Let's start with this mooncake."
2000606-36 = "Oh, is this red filling strawberry? It looks so sweet."
2000606-37 = "Well, then, here goes nothing!"
2000606-44 = "HOT! SPICY HOT!"
2000606-45 = "Wh-What the...?! Why is the mooncake of all things spicy?!"
2000606-46 = "Oh. Do you not like it?"
2000606-47 = "That's strange. I made sure to add the spicy sauce that's been popular around the Promenade lately."
2000606-48 = "What kind of maniac wants spicy sweets?!"
2000606-49 = "On the contrary. Once the spicy sauce began trending, several customers have come to Peach Blossom Spring looking for spicy treats. It's been frustrating not being able to serve them."
2000606-50 = "Some customers have even been bringing their own spicy sauce and adding it to our tea..."
2000606-51 = "I also prepared matcha mixed with spicy sauce. Would you care for some?"
2000606-52 = "Absolutely not! I refuse!"
2000606-53 = "Gah! I can't stand it anymore!"
2000606-54 = "I don't care if it's my creation or not! I can't let it ruin every single dish in all of Shanhaijing!"
2000606-55 = "From this moment on, I won't make even a single drop more of that spicy sauce! It's officially discontinued!"
2000606-57 = "(And that was how Saya's special spicy sauce was discontinued after a short fad.)"
2000606-58 = "(However, it's said the remaining unsold stock was later traded at an exorbitant high price among the spicy food connoisseurs of Kivotos.)"

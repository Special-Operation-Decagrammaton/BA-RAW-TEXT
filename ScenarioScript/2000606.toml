[translation]
2000606-1 = "#Title;유행의 법칙"
2000606-2 = "#Place;산해경 찻집, <도원향>"
2000606-3 = "#wait;2000"
2000606-4 = "#na;(산해경 학원에서의 공무를 마치고 차를 마시기 위해 근처의 찻집에 들렀다.)"
2000606-5 = "[s] \"……사야?\""
2000606-6 = "3;사야 사복;02;어라, 선생?\n#3;em;[?]\n#3;a"
2000606-7 = "3;사야 사복;03;선생을 산해경의 찻집에서 보게 될 줄이야. 의외인걸.\n#3;em;[재잘]\n#3;hophop"
2000606-8 = "3;사야 사복;02;마침 나님의 옆에 자리가 비었으니 여기에 앉는 것이다."
2000606-9 = "[s1] \"사야도 여기에 차를 마시러 온 거야?\"\n[s2] \"……차에 이상한 걸 섞으러 온 거야?\""
2000606-10 = "3;사야 사복;01;응. 이곳은 분위기도 좋고, 차의 맛도 훌륭해서 식후의 입가심을 하기에는 나쁘지 않거든.\n#3;em;[반응]"
2000606-11 = "3;사야 사복;02;휴일에 현무상회를 방문할 때에는 종종 애용하고 있는 것이다."
2000606-12 = "3;사야 사복;05;실례야! 나님이라고 해서 매일 이상한 약만 마시는 건 아니거든?\n#3;em;[빠직]"
2000606-13 = "3;사야 사복;01;나님도 여느 산해경 학생들처럼 식후에는 차를 즐겨 마시는 것이다."
2000606-14 = "3;사야 사복;04;게다가 최근에는 현무상회에 매운 음식이 늘어나는 바람에, 식후에 차를 마시지 않으면 속이 쓰려서…… 더 자주 오게 되는 것이다.\n#3;stiff\n#3;em;[땀]"
2000606-15 = "3;사야 사복;99;이게 다 나님의 특제 매운 소스 때문이지만."
2000606-16 = "[s] \"그 매운 소스의 인기가 정말 좋은가 보네.\""
2000606-17 = "3;사야 사복;05;단순히 인기가 좋은 수준이 아니야!\n#3;em;[!]"
2000606-18 = "3;사야 사복;05;어찌나 유행이 뜨거운지, 이제는 현무상회의 거의 모든 음식에 그 소스가 들어가고 있는 것이다!"
2000606-19 = "3;사야 사복;05;마파두부나 탄탄멘처럼 원래부터 매웠던 음식은 물론이고, 볶음밥이나 군만두처럼 평범한 음식에도 그 매운 소스를 잔뜩 뿌려대니……"
2000606-20 = "3;사야 사복;04;아무리 유행이라지만 너무한 것이다! 세상 사람들이 모두 매운맛을 좋아하는 것도 아닌데 아무 음식에나 매운 소스를 넣다니.\n#3;stiff\n#3;em;[속상함]"
2000606-21 = "3;사야 사복;99;차라리 모든 음식에 치즈를 뿌리는 유행이 일어나면 좋을 텐데……."
2000606-22 = "[s] \"유행이라는 게 원래 다 그렇지.\""
2000606-23 = "3;사야 사복;02;뭐, 그래도 이 <도원향> 만큼은 나님의 매운 소스를 사용하지 않아서 다행인 것이다.\n#3;em;[음표]"
2000606-24 = "3;사야 사복;03;나님도 참, 당연한 소리를 했네. 아무리 매운맛을 좋아한다고 해도 차에 매운 소스를 섞는 바보는 없을 테니 말이야. 하-하-핫!\n#3;hophop\n#3;em;[재잘]"
2000606-25 = "3;사야 사복;02;이곳이라면 안심하고 휴일을 즐길 수 있겠어."
2000606-26 = "#wait;2000"
2000606-27 = "1;로봇 종업원;01\n#1;ar\n#3;m5\n#wait;1200"
2000606-28 = "1;로봇 종업원;02;오, 사야잖아? 요즈음 도원향에 자주 보이네.\n#1;em;[반응]"
2000606-29 = "1;로봇 종업원;03;안 그래도 마침 잘 왔어. 사야에게 물어보고 싶은 게 있었거든."
2000606-30 = "3;사야 사복;01;나님에게 물어보고 싶은 것? 그게 무엇인 것이냐?\n#3;em;[?]"
2000606-31 = "1;로봇 종업원;01;전에 라멘 가게의 신메뉴에 조언을 해준 뒤에 대박이 났었다며?\n#1;em;[반응]"
2000606-32 = "1;로봇 종업원;03;마침 우리 가게도 신메뉴를 준비하고 있었거든. 제품을 내놓기 전에 사야가 한 번 시식을 해보고 조언을 해 줄 수는 없을까?"
2000606-33 = "3;사야 사복;03;그런 거라면 얼마든지 환영인 것이다!\n#3;em;[음표]"
2000606-34 = "1;로봇 종업원;08;고마워. 자 그럼 먼저 이쪽의 월병부터…….\n#1;em;[반짝]\n#1;hophop"
2000606-35 = "1;로봇 종업원;08\n#1;greeting\n#wait;1500"
2000606-36 = "3;사야 사복;02;오, 이 붉은색의 소는 딸기인가? 달콤해 보이는 게 맛있어 보이는 것이다.\n#3;m3\n#1;dl\n#3;em;[반응]"
2000606-37 = "3;사야 사복;03;그럼 잘 먹겠습니다~\n#3;em;[음표]"
2000606-38 = "#st;[0,0];instant;1;"
2000606-39 = "#clearST"
2000606-40 = "3;사야 사복;99\n#3;greeting\n#wait;1000"
2000606-41 = "3;사야 사복;99\n#3;greeting\n#wait;1200"
2000606-42 = "3;사야 사복;99\n#3;em;[...]\n#wait;2500"
2000606-43 = "#all;hide"
2000606-44 = "3;사야 사복;06;매워어어어어!\n#3;shake\n#fontsize;100\n#3;closeup\n#bgshake"
2000606-45 = "3;사야 사복;04;이, 이게 뭐야! 어째서 월병에서 혀가 타는 듯한 매운 맛이 나는 것이냐?!\n#3;hophop\n#3;closeup"
2000606-46 = "3;사야 사복;04\n1;로봇 종업원;04;어라, 사야의 입에는 맞지 않았던 거야?\n#1;em;[땀]\n#1;ar\n#3;m5"
2000606-47 = "1;로봇 종업원;09;이상하네. 모처럼 요새 현무상회에서 인기가 좋다는 그 매운 소스를 넣어봤는데……\n#1;stiff"
2000606-48 = "3;사야 사복;05;이런 매운맛이 나는 다과를 누가 좋아한다고?!\n#3;stiff\n#3;em;[빠직]"
2000606-49 = "1;로봇 종업원;02;그렇지 않아. 매운 소스가 유행하고 난 뒤로는 도원향에서도 매운 다과를 찾는 손님들이 늘어나서 곤란했을 지경이었는 걸.\n#1;em;[반응]"
2000606-50 = "1;로봇 종업원;01;몇몇 손님은 따로 매운 소스를 챙겨와서 차에 곁들여 먹었을 정도니……."
2000606-51 = "1;로봇 종업원;03;맞다. 말이 나온 김에 매운 소스를 섞은 말차도 준비해봤는데…… 한번 마셔볼래?\n#1;greeting\n#1;em;[반짝]"
2000606-52 = "3;사야 사복;04;절대 싫어! 사양인 것이다!\n#3;hophop"
2000606-53 = "3;사야 사복;05;……으읏, 더 이상은 못 참아!\n#3;em;[빠직]\n#3;m3\n#1;dl"
2000606-54 = "3;사야 사복;05;아무리 나님의 발명품이라고 하지만, 산해경의 요리들이 전부 매운맛으로 바뀌는 꼴은 두고 볼 수 없어!"
2000606-55 = "3;사야 사복;04;앞으로 이 매운 소스는 단 한 방울도 만들지 않을 테니까! 중지다, 중지!\n#3;closeup\n#3;hophop\n#fontsize;80"
2000606-56 = "#all;hide"
2000606-57 = "#na;(……그리하여 사야의 특제 매운 소스는 짧은 유행을 끝으로 생산이 중단되었다.)"
2000606-58 = "#na;(하지만 판매되지 않고 남은 재고는 이후 키보토스의 매운맛 마니아들 사이에서 고가에 거래되었다고 한다.)"

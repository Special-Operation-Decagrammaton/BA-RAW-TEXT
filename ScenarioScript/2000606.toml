[translation]
2000606-1 = "กฎของกระแสอินเทรนด์"
2000606-2 = "ร้านน้ำชา <นิทานดอกท้อ> ซานไห่จิง"
2000606-4 = "(หลังจากทำธุระที่โรงเรียนซานไห่จิงเสร็จแล้ว คุณครูก็แวะร้านน้ำชาใกล้ๆ เพื่อพักดื่มชา)"
2000606-5 = "[s] \"ซายะ...?\""
2000606-6 = "อ๊ะ คุณครู?"
2000606-7 = "ไม่คิดเลยว่าจะเจอคุณครูที่ร้านน้ำชาในซานไห่จิง น่าแปลกจริงๆ"
2000606-8 = "ข้างๆ ฉันมีที่ว่างอยู่พอดีเลย มานั่งด้วยกันมั้ย"
2000606-9 = "[s1] \"ซายะก็มาดื่มชาเหรอ?\"\n[s2] \"อย่าบอกนะว่ามาทดลองใส่อะไรลงในน้ำชาน่ะ?\""
2000606-10 = "อื้อ ร้านนี้บรรยากาศดี รสชาติของน้ำชาก็กลมกล่อมมาก มาดื่มหลังกินอาหารเสร็จก็ไม่เลวเลย"
2000606-11 = "เวลาที่มาที่ย่านการค้าในช่วงวันหยุด ฉันมักแวะมาที่นี่บ่อยๆ น่ะ"
2000606-12 = "เสียมารยาท! ท่านซายะคนนี้ไม่เอายาที่ทดลองมาใช้กับของกินหรอกนะ!"
2000606-13 = "ฉันก็ชอบดื่มชาหลังอาหารเหมือนนักเรียนคนอื่นๆ ในซานไห่จิงนั่นแหละ"
2000606-14 = "อีกอย่าง ไม่นานนี้อาหารรสเผ็ดเริ่มเป็นที่นิยมกันมากในย่านการค้าเทพเต่าดำ#nถ้าไม่ดื่มชาหลังอาหารล่ะก็จะทำให้ปวดท้อง... เพราะงั้นฉันก็เลยมาบ่อยๆ น่ะ"
2000606-15 = "ถึงนั่นจะเป็นเพราะซอสเผ็ดสูตรพิเศษของฉันก็เถอะนะ"
2000606-16 = "[s] \"ซอสเผ็ดของซายะนี่เป็นที่นิยมสุดๆ เลยนะ\""
2000606-17 = "ไม่ใช่แค่เป็นที่นิยมธรรมดาๆ นะ!"
2000606-18 = "มันเป็นที่นิยมสุดๆ เลยต่างหาก ตอนนี้ร้านอาหารในย่านการค้าเทพเต่าดำเกือบทุกร้าน#nก็ใช้ซอสนั่นกันหมดแล้ว!"
2000606-19 = "พวกเขาเอาไปใส่ในอาหารรสเผ็ดอย่างผัดเต้าหู้และบะหมี่ตันตัน แล้วก็ยังเอาไปใส่กับ#nพวกอาหารทั่วไปอย่างข้าวผัดหรือเกี๊ยวด้วยนะ!"
2000606-20 = "ฉันรู้ว่ามันกำลังอินเทรนด์ แต่เยอะไปก็ไม่ไหวนะ ใช่ว่าทุกคนในโลกจะชอบอาหาร#nที่มีรสเผ็ดสักหน่อย แต่เดี๋ยวนี้ที่นี่กลับใส่ซอสเผ็ดลงในอาหารทุกชนิดเลย"
2000606-21 = "ถ้าเอาชีสไปใส่ในอาหารทุกชนิดได้บ้างก็คงดีไม่น้อยเลยนะ"
2000606-22 = "[s] \"ปกติเวลาอะไรที่ฮิตติดเทรนด์ก็มักเป็นแบบนี้แหละ\""
2000606-23 = "ก็นะ อย่างน้อยก็โชคดีที่ร้าน <นิทานดอกท้อ> นี่ไม่ได้ใส่ซอสเผ็ดของฉันลงไปในน้ำชา"
2000606-24 = "แน่นอนอยู่แล้วล่ะ ถึงจะชอบรสเผ็ดแค่ไหน แต่ก็คงไม่มีใครงี่เง่าพอที่จะใส่ซอสเผ็ดลงไปใน#nน้ำชาหรอก ฮ่าฮ่าฮ่า!"
2000606-25 = "ถ้าเป็นที่นี่ละก็คงใช้เวลาพักผ่อนได้อย่างสบายใจแน่ๆ"
2000606-28 = "โอ๊ะ? นั่นซายะนี่นา? ช่วงนี้มาที่ร้านนิทานดอกท้อบ่อยเลยนะ"
2000606-29 = "แต่ก็มาได้จังหวะพอดีเลย มีเรื่องที่อยากจะถามเธออยู่พอดี"
2000606-30 = "มีเรื่องที่อยากถามท่านซายะคนนี้งั้นเหรอ? เรื่องอะไรล่ะ?"
2000606-31 = "ได้ยินว่าหลังจากเธอให้คำแนะนำกับมาสเตอร์ที่ร้านราเม็ง ร้านนั้นก็กลายเป็นร้านยอดฮิตไปเลย"
2000606-32 = "ตอนนี้ร้านเราเองก็กำลังเตรียมเมนูใหม่อยู่พอดี เธอช่วยลองชิมเมนูใหม่แล้วให้คำแนะนำกับพวกเรา#nก่อนวางขายเมนูใหม่หน่อยได้ไหม?"
2000606-33 = "ถ้าเรื่องนั้นละก็ฉันยินดีเสมอเลย!"
2000606-34 = "ขอบคุณมาก ถ้างั้นก็เริ่มจากขนมไหว้พระจันทร์นี่ก่อน..."
2000606-36 = "โอ๊ะ? สีแดงที่ใช้นี่สตรอว์เบอร์รี่งั้นเหรอ? คงจะหวานอร่อยมากแน่ๆ"
2000606-37 = "จะทานแล้วนะคะ~"
2000606-44 = "ผะ...เผ็ดมากกกกก!"
2000606-45 = "อะ... อะไรกันเนี่ย! ทำไมขนมไหว้พระจันทร์ถึงเผ็ดจนลิ้นชาแบบนี้ล่ะ?!"
2000606-46 = "เอ๋? ไม่ถูกปากเหรอ?"
2000606-47 = "แปลกจัง... เราใส่ซอสเผ็ดที่กำลังฮิตในย่านการค้าเทพเต่าดำนั่นลงไปแล้วแท้ๆ..."
2000606-48 = "จะมีใครที่ไหนชอบขนมหวานที่มีรสเผ็ดจัดจ้านแบบนี้กันบ้างเล่า?!"
2000606-49 = "ไม่หรอกนะ หลังจากที่ซอสเผ็ดฮิตอินเทรนด์กันมากในย่านการค้าของเรา ก็มีลูกค้าที่ถามหา#nขนมรสเผ็ดที่ร้านนิทานดอกท้อของเราเยอะมากจนวุ่นวายเลยละ"
2000606-50 = "ลูกค้าบางคนก็พกซอสเผ็ดมาเหยาะใส่ชาเองเลยด้วยนะ..."
2000606-51 = "จริงสิ ไหนๆ ก็พูดถึงชาแล้ว เราเตรียมชาเขียวผสมซอสเผ็ดเอาไว้ด้วย... ลองชิมดูหน่อยไหม?"
2000606-52 = "ไม่เอาเด็ดขาด! ขอปฏิเสธ!"
2000606-53 = "อึ่ก... ทนไม่ไหวแล้ว!"
2000606-54 = "ถึงจะเป็นสิ่งประดิษฐ์ของฉันก็เถอะ แต่ฉันทนไม่ได้หรอกที่จะให้อาหารทุกอย่างในซานไห่จิงกลายเป็น#nอาหารที่มีรสเผ็ดน่ะ!"
2000606-55 = "ต่อไปฉันจะไม่ทำซอสเผ็ดนั่นขึ้นมาอีกเด็ดขาด! พอๆ เลิกๆ!"
2000606-57 = "(หลังจากนั้นเทรนด์ฮิตซอสเผ็ดของซายะก็หายไปในช่วงสั้นๆ...)"
2000606-58 = "(แต่ว่ากันว่า ในหมู่คนที่หลงใหลรสเผ็ดได้มีการประมูลซอสเผ็ดที่เหลืออยู่ในคิโวทอสกันในราคาที่สูง#nลิบลิ่ว)"

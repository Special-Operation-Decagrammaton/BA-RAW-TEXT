[translation]
2000606-1 = "流行事物"
2000606-2 = "山海經．茶館「桃源鄉」"
2000606-4 = "（今天在山海經高級中學的公務結束之後……）"
2000606-5 = "[s] 「嗯？沙耶？」"
2000606-6 = "喔，這不是老師嗎？"
2000606-7 = "沒想到會在這裡遇見老師，真巧。"
2000606-8 = "來，我旁邊有空位，坐這邊吧。"
2000606-9 = "[s1] 「沙耶也來這裡喝茶呀？」\n[s2] 「……沙耶，這可是人家的店喔。」"
2000606-10 = "是啊。這間店的氣氛和茶的味道都不錯。"
2000606-11 = "假日拜訪玄武商會時，我吃完飯經常會來這兒。"
2000606-12 = "你，你是在懷疑我會不會在人家的茶裡加什麼奇怪的東西是不是！？"
2000606-13 = "我又不是成天只會喝怪藥或給人灌藥。我偶爾也是會正常地品茶的好嗎。"
2000606-14 = "再加上最近玄武商會的辣味食物增加了，需要像這樣喝茶解膩。"
2000606-15 = "雖然這全都是因為我太天才了……也就是上次製作的特製超辣醬。"
2000606-16 = "[s] 「對喔，你有提到過。真的那麼受歡迎啊？」"
2000606-17 = "不是一般受歡迎的程度而已！"
2000606-18 = "因為實在太盛行了，聽說現在玄武商會幾乎所有的食物都會添加那個醬料！"
2000606-19 = "除了麻婆豆腐、擔擔麵這些原本就有加辣的食物，最近連炒飯、煎餃也會加入滿滿的辣醬……！"
2000606-20 = "就算是本天才創造的食物，也未免流行過頭了……又不是說任何食物只要加辣就會好吃。"
2000606-21 = "如果真要流行，那還不如流行讓所有食物都流行添加起司還更好……"
2000606-22 = "[s] 「竟然變得這麼誇張……」"
2000606-23 = "而這間「桃源鄉」沒有使用我的辣醬，是這股流行浪潮中珍貴的清流。"
2000606-24 = "不過這間店主打的餐點本來就是茶和點心，當然不會用辣醬啦！哈哈哈哈哈！"
2000606-25 = "在這裡就能忘記辣醬，悠閒享受假日了。"
2000606-28 = "喔，這不是沙耶嗎？最近經常來耶。"
2000606-29 = "你來的正好，我有事想問你呢。"
2000606-30 = "有事要問我？什麼事？"
2000606-31 = "聽說你前陣子幫忙調整了拉麵店的新菜色之後，那間店的生意就變超好！"
2000606-32 = "我們店裡也準備要推出新菜色，想說能不能先讓沙耶試吃，給點建議呢？"
2000606-33 = "這種事我非常樂意幫忙！"
2000606-34 = "謝謝。那先是這個月餅……"
2000606-36 = "呼呣，這紅色的餡是草莓嗎？顏色鮮豔看起來很好吃呢。"
2000606-37 = "那麼我要開動了──……"
2000606-44 = "好辣啊啊啊啊！？！？"
2000606-45 = "一整個超辣的！？這東西真的是月餅！？"
2000606-46 = "咦，不好吃嗎？"
2000606-47 = "真奇怪──……虧我還添加了最近玄武商會很流行的「加入任何東西都會變好吃」的辣醬耶……"
2000606-48 = "誰會喜歡辣的月餅啊！？從沒聽過有人會吃這種怪奇食物！"
2000606-49 = "正好相反，有挺多客人都給了好評呢。我們有試著推出幾種試賣品，結果好多客人聞風前來，還越來越多人問我們什麼時候會正式推出。"
2000606-50 = "而且甚至有更多客人還自己帶辣醬來，大把大把地沾著吃……"
2000606-51 = "對了，我們還想推出添加辣醬的抹茶，要喝喝看嗎？"
2000606-52 = "絕對不喝！"
2000606-53 = "竟然連這間店都被影響了……！"
2000606-54 = "就算我的發明再怎麼優秀，我也無法坐視山海經的料理全都變成辣味！"
2000606-55 = "以後這種辣醬我連一滴都不會製作！停產了！"
2000606-57 = "（於是，沙耶的特製辣醬爆發性地流行一陣子後，馬上就從市場上消失了）"
2000606-58 = "（……而幸運的是，據說不曾使用過的辣醬庫存，之後在奇普托斯的美食家和辣味狂熱者之間，成了高價的交易品）"

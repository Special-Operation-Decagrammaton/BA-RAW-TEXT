[translation]
52010-1 = "Episode 1;Untouched Hem"
52010-13 = "...Hyakkaryouran Resolution Council First-year student, Goryou Nagusa."
52010-21 = "...and Hyakkaryouran Resolution Council First-year student, Nanakado Ayame."
52010-27 = "Both of you, come forward."
52010-30 = "By the long-held traditions of the Hyakkaryouran—"
52010-31 = "We will do this, fair and square."
52010-38 = "Begin!"
52010-46 = "...You're exposed."
52010-64 = "There—!"
52010-71 = "...Ugh."
52010-72 = "Winner: Nanakado Ayame!"
52010-77 = "...And that makes it 201 straight wins for me."
52010-78 = "That was a fine match. Thank you, Nagusa."
52010-82 = "Ughhh..."
52010-83 = "N-Nagusa?"
52010-84 = "I lost to Ayame again..."
52010-85 = "Hey! Don't cry. You did great, Nagusa!"
52010-86 = "But...with such incompetence, how could I possibly help you, Ayame?"
52010-87 = "I trained for so long, and I'm not even worthy to hold the hem of your sleeve... I'm pathetic..."
52010-88 = "None of that! You're getting better all the time."
52010-94 = "Take my hand."
52010-97 = "Even if you fall, I'll be here. I'll pick you up anytime."
52010-101 = "Even if I drag you down?"
52010-102 = "Of course."
52010-103 = "Even though I'm sniveling and lachrymose?"
52010-104 = "...Naturally."
52010-105 = "Even though I freeze up at the worst times because I can never commit—"
52010-106 = "It's fine. Because the truth is—"
52010-114 = "You were never my friend, Goryou Nagusa."
52010-132 = "...!"
52010-133 = "*pant* *pant*... Just a dream...a nightmare?"
52010-134 = "I still feel her sleeve slipping out of my hand...this hand."
52010-139 = "...Ugh."
52010-142 = "It hurts..."
52010-143 = "...With every night that falls, it feels like my arm is burning from the marrow."
52010-144 = "If I had saved Ayame, I would likely be whole...in several ways."
52010-148 = "Ugh..."
52010-149 = "...I'm sorry, Ayame."
52010-150 = "So truly sorry..."
52010-152 = "For being useless."
52010-153 = "For being too weak and cowardly to hold on..."
52010-157 = "I'm so sorry, Ayame..."
52010-159 = "Next Episode;A New Ghost Story"

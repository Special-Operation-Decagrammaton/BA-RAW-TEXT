[translation]
52010-1 = "第1話;觸碰不到的衣角"
52010-13 = "……百花繚亂紛爭調停委員會1年級，御稜名草。"
52010-21 = "……以及，百花繚亂紛爭調停委員會1年級，七稜菖蒲。"
52010-27 = "兩人，向前。"
52010-30 = "依照自古流傳的百花繚亂傳統──"
52010-31 = "光明正大地──"
52010-38 = "決鬥！"
52010-46 = "……有破綻。"
52010-64 = "頭部──！"
52010-71 = "……唔。"
52010-72 = "七稜菖蒲，獲勝！"
52010-77 = "這樣就是201戰201勝……全勝啊。"
52010-78 = "這次的對練也很精采。#n謝謝你，名草。"
52010-82 = "嗚嗚，嗚嗚嗚……"
52010-83 = "名，名草醬？"
52010-84 = "又輸給菖蒲了……"
52010-85 = "別，別哭嘛。#n名草醬也已經做得很好了！"
52010-86 = "可是……以這種實力，根本幫不上菖蒲的忙。"
52010-87 = "明明已經鍛鍊了這麼久，卻連菖蒲的衣角都碰不到……#n這樣的我，實在太丟臉了……"
52010-88 = "別太責備自己了。#n所以我才會在身邊幫你呀。"
52010-94 = "來，握住我的手。"
52010-97 = "就算你跌倒，我也會一直在你身邊，隨時伸手拉你起來的。"
52010-101 = "就算我不但幫不上忙，還只會拖後腿也是嗎？"
52010-102 = "當然。"
52010-103 = "明明我是遇到困難就先哭的愛哭鬼？"
52010-104 = "我知道。"
52010-105 = "就算因為優柔寡斷，總是會在關鍵時刻僵住──"
52010-106 = "沒關係。因為我──"
52010-114 = "我從來沒有把你當成朋友。"
52010-132 = "……！"
52010-133 = "哈啊，哈啊……原來是夢啊……"
52010-134 = "手中明明還殘留著菖蒲衣角滑落的觸感……卻只是夢嗎。"
52010-139 = "……唔。"
52010-142 = "好痛……"
52010-143 = "……隨著時間過去，手臂漸漸變得像是從內部被灼燒一樣。"
52010-144 = "如果當時我抓住了菖蒲，就不必承受這種痛苦了。"
52010-148 = "嗚嗚嗚……"
52010-149 = "……對不起，菖蒲。"
52010-150 = "真的很對不起……"
52010-152 = "都怪我一無是處……"
52010-153 = "軟弱得連抓住你的力量都沒有……"
52010-157 = "真的對不起，菖蒲……"
52010-159 = "下一話;新的怪談"

[translation]
52010-1 = "ตอนที่ 1;ชายเสื้อที่ไม่อาจเอื้อมถึง"
52010-13 = "โกเรียว นางุสะ ชั้นปีที่ 1 คณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน..."
52010-21 = "นานาคาโดะ อายาเมะ ชั้นปีที่ 1 คณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน..."
52010-27 = "ขอให้ทั้งสองคนออกมาข้างหน้า"
52010-30 = "ตามธรรมเนียมของเฮียกกะเรียวรันที่สืบทอดต่อกันมาแต่โบราณ..."
52010-31 = "เอาละ ได้เวลาดวลกัน..."
52010-38 = "อย่างสง่าผ่าเผย!"
52010-46 = "เจอช่องโหว่...\n"
52010-64 = "ตรงหัว...!"
52010-71 = "อึก..."
52010-72 = "นานาคาโดะ อายาเมะ ชนะ!"
52010-77 = "แข่ง 201 ครั้ง ชนะ 201 ครั้ง... ฉันชนะรวดเลยงั้นเหรอ"
52010-78 = "ครั้งนี้ก็เป็นการดวลที่ดีเลย ขอบใจนะ นางุสะ"
52010-82 = "อะ... อึก..."
52010-83 = "นะ... นางุสะจัง?"
52010-84 = "ฉันแพ้ให้อายาเมะอีกแล้ว..."
52010-85 = "ยะ... อย่าร้องไห้เลยนะ นางุสะจังก็ทำได้ดีแล้วละ!"
52010-86 = "แต่ว่า... ถ้าฉันยังฝีมือแค่นี้ ฉันก็คงช่วยอะไรอายาเมะไม่ได้"
52010-87 = "ฝึกมาตั้งนานขนาดนี้แล้ว แต่ฉันยังเฉียดไม่ได้แม้แต่ปกเสื้อของอายาเมะเลย... รู้สึกสมเพชตัวเองจัง..."
52010-88 = "อย่าตำหนิตัวเองเลยนะ ฉันก็อยู่ที่นี่เพื่อช่วยเธอแล้วนี่ไง"
52010-94 = "เอ้า จับมือฉันสิ"
52010-97 = "ฉันจะอยู่เคียงข้างเธอตลอด เวลาล้มจะได้ยื่นมือออกไปช่วยได้ยังไงล่ะ"
52010-101 = "ต่อให้ฉันจะเอาแต่เป็นตัวถ่วงเธอ แทนที่จะทำประโยชน์ให้น่ะเหรอ?"
52010-102 = "ก็แน่น่ะสิ"
52010-103 = "ต่อให้ฉันเป็นคนขี้แยที่ไม่ว่าจะเกิดเรื่องอะไรขึ้นก็เอาแต่ร้องไห้ไว้ก่อนน่ะเหรอ?"
52010-104 = "ฉันรู้แล้วละน่า"
52010-105 = "ฉันเป็นคนไม่เด็ดขาด ในช่วงเวลาที่สำคัญก็เลยประหม่าจนตัดสินใจอะไรไม่ได้..."
52010-106 = "ไม่เป็นไรหรอก ก็เพราะว่าฉันน่ะ..."
52010-114 = "ไม่เคยคิดว่าเธอเป็นเพื่อนเลยสักครั้ง"
52010-132 = "......!"
52010-133 = "แฮ่ก แฮ่ก... ฝันไปสินะ..."
52010-134 = "ความรู้สึกตอนปกเสื้อของอายาเมะหลุดออกจากมือฉันไปมันชัดเจนมาก นี่จะเป็นความฝันได้ยังไงกัน"
52010-139 = "อึก..."
52010-142 = "เจ็บจัง..."
52010-143 = "ยิ่งเวลาผ่านไป แขนก็ยิ่งร้อนรุ่มเหมือนมีไฟไหม้อยู่ข้างในเลย..."
52010-144 = "ถ้าตอนนั้นคว้าอายาเมะเอาไว้ได้ ฉันก็คงไม่ต้องเจ็บปวดแบบนี้"
52010-148 = "ฮือ..."
52010-149 = "ขอโทษนะ อายาเมะ..."
52010-150 = "ฉันขอโทษจริงๆ..."
52010-152 = "ขอโทษที่ฉันเป็นคนไร้ประโยชน์..."
52010-153 = "ขอโทษที่ฉันเป็นคนอ่อนแอ ที่ไม่มีแม้แต่แรงจะรั้งเธอไว้..."
52010-157 = "ฉันขอโทษจริงๆ นะ อายาเมะ..."
52010-159 = "ตอนต่อไป;เรื่องลึกลับใหม่"

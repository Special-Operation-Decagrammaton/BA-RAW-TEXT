[translation]
2000209-1 = "#title;네즈스케의 행방불명"
2000209-2 = "#place;사야의 연구실"
2000209-3 = "3;사야;06;선생, 큰일이야, 큰일! 네즈스케가…… 네즈스케가……\n#3;stiff\n#3;a"
2000209-4 = "3;사야;06;네즈스케가 사라진 것이다!\n#3;em;[!]\n#3;hophop"
2000209-5 = "3;사야;06;혹시나 어디 숨어있나 해서 연구실을 모두 뒤져보았지만 아무데도 없는 것이다!"
2000209-6 = "3;사야;06\n#3;d\n#wait;1000"
2000209-7 = "3;사야;06;네즈스케가 말없이 사라진 건 이번이 처음인데… 이를 어쩌지? 으아아앙—\n#3;closeup\n#3;em;[속상함]\n#3;stiff"
2000209-8 = "[s] 사야를 진정시킨다."
2000209-9 = "3;사야;06\n#3;closeup\n#3;d\n#wait;1000"
2000209-10 = "3;사야;06;흑, 흐윽. 하지만…… 네즈스케에게 무슨 일이라도 생기면 어떻게 하지……\n#3;em;[...]\n#3;a"
2000209-11 = "3;사야;06;네즈스케가 갈만한 곳? #n네즈스케는 언제나 나와 단짝처럼 함께 다닌 것이다. 혼자서 어딜 가는 건 본 적이 없어……."
2000209-12 = "[s] \"다른 연단방 부원들에게 물어보자.\""
2000209-13 = "3;사야;06;알았어…… 훌쩍.\n#3;greeting"
2000209-14 = "#all;hide"
2000209-15 = "#place;산해경 교실"
2000209-16 = "#na;연단방 부원 A;네즈스케가 사라졌다고요? 그거 큰일이네요."
2000209-17 = "3;사야;06;혹시 오늘 네즈스케 본 적 있어?\n#3;em;[?]\n#3;a"
2000209-18 = "#na;연단방 부원 A;아뇨, 저도 선배의 연구실 이외의 장소에서 네즈스케를 본 일은 없어요."
2000209-19 = "#na;연단방 부원 A;그보다 드문 일이네요. 네즈스케가 혼자서 사라지다니……"
2000209-20 = "3;사야;06;어떡하지, 훌쩍……\n#3;em;[속상함]"
2000209-21 = "#na;연단방 부원 A;이런 말을 하기는 좀 그렇다만…… 혹시 네즈스케는 가출을 한 게 아닐까요?"
2000209-22 = "3;사야;06;……가출?\n#3;shake"
2000209-23 = "#na;연단방 부원 A;네, 매일같이 선배가 실험을 핑계로 네즈스케를 괴롭혔으니까요."
2000209-24 = "#na;연단방 부원 A;오히려 그동안 도망치지 않았던 게 더 용하다고 할까."
2000209-25 = "3;사야;07;괴롭히다니! 나님은 실험을 도와 달라고 했을 뿐이지 네즈스케를 괴롭힌 적은 없는 것이다!\n#3;em;[!]\n#3;hophop"
2000209-26 = "#na;연단방 부원 A;하지만 네즈스케는 실험에 참가하는 걸 싫어했잖아요? #n툭하면 이상한 꼴이 되기 일쑤니, 네즈스케의 심정도 이해가 가요."
2000209-27 = "3;사야;06;우으……\n#3;em;[...]"
2000209-28 = "[s] \"다른 부원에게도 물어보도록 하자\""
2000209-29 = "3;사야;06;알겠어……"
2000209-30 = "#all;hide"
2000209-31 = "#na;연단방 부원 B;이런, 네즈스케 씨가 사라졌나요?"
2000209-32 = "3;사야;06;응. 혹시 오늘 네즈스케 못 본 것이냐?\n#3;a"
2000209-33 = "#na;연단방 부원 B;글쎄요…… 오늘 네즈스케 씨를 본 기억은 없네요."
2000209-34 = "3;사야;06;정말, 어디로 간 것이냐…… 훌쩍.\n#3;stiff\n#3;em;[속상함]"
2000209-35 = "#na;연단방 부원 B;저, 외람된 말이지만, 네즈스케 씨는 가출을 한 게 아닐까요."
2000209-36 = "3;사야;06;다들…… 왜 그렇게 생각하는 거냐?"
2000209-37 = "#na;연단방 부원 B;그야 네즈스케 씨는 언제나 사야 선배에게 괴롭힘을 당하고 있었으니까요."
2000209-38 = "3;사야;06;괴롭히려던 게 아니었는데. 우으으……\n#3;stiff"
2000209-39 = "[s] \"학원을 돌며 네즈스케를 찾아보자.\""
2000209-40 = "3;사야;06;응……\n#3;em;[...]"
2000209-41 = "#all;hide"
2000209-42 = "#place;산해경 학원"
2000209-43 = "2;사야;06\n#2;ar\n#wait;1500"
2000209-44 = "2;사야;06\n#2;m5\n#wait;1500\n#2;hophop"
2000209-45 = "2;사야;06\n#2;m4\n#wait;1500"
2000209-46 = "2;사야;06\n#wait;2500\n#2;em;[...]"
2000209-47 = "2;사야;06;네즈스케— 정말 어딜 간 거야……"
2000209-48 = "[s] \"저 쪽도 찾아보자.\""
2000209-49 = "2;사야;06;……아냐, 틀렸어. #n네즈스케는 부원들의 말대로 가출을 한 게 분명한 것이다.\n#2;stiff"
2000209-50 = "2;사야;06;그동안 나님이 너무 괴롭힌 탓이다. 흑흑…… #n네즈스케는 내게 실망해서 다시는 돌아오지 않을 것이다.\n#2;em;[...]"
2000209-51 = "[s] 포기하지 말라고 말해준다."
2000209-52 = "2;사야;06;선생도 그동안 내 실험 때문에 괴로웠던 거지? #n그런데…… 어째서 내게 이렇게 잘 해주는 거야?\n#2;m3"
2000209-53 = "[s1] \"나는 사야와 함께 해서 즐거웠어.\"\n[s2] \"선생님이니까 괜찮아.\""

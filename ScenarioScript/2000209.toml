2000209-57 = "3;사야;06;선생……\n#3;em;[...]"
2000209-58 = "#all;hide\n#wait;500"
2000209-59 = "#wait;500"
2000209-60 = "#na;네즈스케;찍, 찍찍……"
2000209-61 = "1;사야;06;아앗, 네즈스케 이 녀석……! #n어디에 갔었던 거야, 으아아아앙!\n#1;em;[반응]\n#1;hophop\n#1;ar"
2000209-62 = "#na;네즈스케;찍찍……"
2000209-63 = "1;사야;06;흑, 흑흑…… 그동안 나님이 너무 심하게 굴어서 가출했던 것이냐? #n정말 미안해……"
2000209-64 = "#na;네즈스케;찍찍, 찌익."
2000209-65 = "1;사야;06;뭐? 상회에서 커다란 해바라기 씨앗을 나눠준다고 해서 다녀왔다고? #n그래도 말도 없이 가버리면 어쩌자는 것이냐! 하루 종일 찾았잖아!\n#1;shake"
2000209-66 = "1;사야;06;흑…… 그래도 미안한 것이다. 앞으로는 심한 장난은 치지 않을 테니까…… #n다시는 말도 없이 사라지면 안 돼?\n#1;em;[...]\n#1;greeting"
2000209-67 = "#na;네즈스케;찍……"
2000209-68 = "1;사야;06\n#1;m3\n#wait;1500"
2000209-69 = "1;사야;06\n#1;greeting\n#wait;1500"
2000209-70 = "1;사야;03;응응, 약속하는 것이다! 앞으로는 진지한 실험에만 너를 사용할 것을!\n#1;em;[반짝]\n#1;hophop"
2000209-71 = "#na;네즈스케;찌익!"
2000209-72 = "#1;hide\n3;사야;07;이 녀석, 네즈스케! 발버둥 치지 마! #n앞으로는 절대로 놓치지 않을 테니까!\n#3;closeup\n#3;em;[!]"
2000209-73 = "3;사야;03\n#3;closeup\n#3;h"
2000209-74 = "#na;네즈스케;찍, 찍찍!"
2000209-75 = "#all;hide"
2000209-76 = "#na;이후, 사야는 네즈스케와 사이좋게 연구실로 돌아갔다."

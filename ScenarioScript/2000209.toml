[translation]
2000209-1 = "การหายตัวไปของเนสึซึเกะ"
2000209-2 = "ห้องทดลองของซายะ"
2000209-3 = "เกิดเรื่องใหญ่แล้วล่ะครู! เรื่องใหญ่แล้ว! เนสึซึเกะ... คือว่าเนสึซึเกะ...."
2000209-4 = "เนสึซึเกะหายตัวไปแล้ว!"
2000209-5 = "ตอนแรกฉันคิดว่าเขาเล่นซ่อนแอบอยู่ในห้องทดลอง แต่ลองหาจนทั่วแล้วก็ไม่เจอเลย!"
2000209-7 = "เนสึซึเกะไม่เคยหายไปโดยไม่บอกแบบนี้มาก่อน.... จะทำยังไงดีล่ะ? ฮือๆๆ"
2000209-8 = "[s] ปลอบซายะให้ใจเย็นลง"
2000209-10 = "ฮึ่ก...ฮือ... แต่ว่า.... ถ้าเกิดอะไรขึ้นกับเนสึซึเกะ ฉันจะทำยังไงดี...."
2000209-11 = "ที่ที่เนสึซึเกะอาจจะไปงั้นเหรอ? ปกติเนสึซึเกะจะไปไหนมาไหนกับฉันเหมือนเงาตามตัวกันตลอด#nเขาไม่เคยออกไปไหนคนเดียวเลย"
2000209-12 = "[s] \"ลองไปถามสมาชิกชมรมคนอื่นดูกันเถอะ\""
2000209-13 = "เข้าใจแล้ว... ฮึ่กๆ"
2000209-15 = "ห้องเรียน ซานไห่จิง"
2000209-16 = "เนสึซึเกะหายไปงั้นเหรอ? เรื่องใหญ่เลยนะคะ"
2000209-17 = "วันนี้พวกเธอเห็นเนสึซึเกะบ้างมั้ย?"
2000209-18 = "ไม่เลยค่ะ ฉันไม่เคยเห็นเนสึซึเกะที่อื่นนอกจากห้องทดลองของรุ่นพี่เลยค่ะ"
2000209-19 = "แปลกจังเลยนะคะ ที่เนสึซึเกะหายไปคนเดียวแบบนี้..."
2000209-20 = "ทำยังไงดี... ฮึ่กๆ..."
2000209-21 = "ฉันรู้ว่าไม่ควรพูดแบบนี้แต่ว่า... เนสึซึเกะหนีออกจากบ้านรึเปล่าคะ?"
2000209-22 = "...หนีออกจากบ้านเหรอ?"
2000209-23 = "ค่ะ หมายถึง... รุ่นพี่ชอบใช้เรื่องการทดลองเป็นข้ออ้างแล้วก็ก่อกวนเนสึซึเกะทุกวันแบบนี้...."
2000209-24 = "อันที่จริงที่ผ่านมาเขาไม่หนีรุ่นพี่ไปแบบนั้นก็ถือว่าเขากล้าหาญมากนะคะ...."
2000209-25 = "ฉันไปก่อกวนเขางั้นเร๊อะ! ฉันแค่ขอให้เขาช่วยเรื่องการทดลองก็เท่านั้นเอง#nไม่เคยก่อกวนหรือทรมานเขาสักหน่อย!"
2000209-26 = "แต่ว่าเนสึซึเกะไม่ได้อยากร่วมทดลองกับรุ่นพี่เลยไม่ใช่เหรอคะ?#nพูดตรงๆ ถ้าต้องโดนดึงเข้าไปเจอเรื่องแปลกๆ ฉันเองก็เข้าใจเนสึซึเกะอยู่เหมือนกันนะคะ"
2000209-27 = "อึ่ก..."
2000209-28 = "[s] \"ลองไปถามสมาชิกชมรมคนอื่นๆ ดูเถอะ\""
2000209-29 = "รู้แล้วล่ะ..."
2000209-31 = "อะไรนะคะ คุณเนสึซึเกะหายไปงั้นเหรอคะ?"
2000209-32 = "อื้อ วันนี้เธอเห็นเนสึซึเกะบ้างมั้ย?"
2000209-33 = "อืม... วันนี้ฉันไม่เจอคุณเนสึซึเกะเลยนะคะ"
2000209-34 = "หายไปไหนของเขานะ... ฮึ่กๆ"
2000209-35 = "อืม... ฉันรู้ว่าไม่ควรคิดแบบนี้แต่ว่า... คุณเนสึซึเกะหนีออกจากบ้านไปรึเปล่าคะ"
2000209-36 = "พวกเธอ... ทำไมถึงคิดแบบนี้กันเนี่ย?"
2000209-37 = "เอ่อ... ก็รุ่นพี่ซายะมักจะชอบทำให้คุณเนสึซึเกะลำบากใจอยู่เป็นประจำนี่คะ"
2000209-38 = "ไม่ได้ทำให้ลำบากใจสักหน่อย อึ่ก...."
2000209-39 = "[s] \"ลองไปหาดูรอบๆ โรงเรียนกันเถอะ\""
2000209-40 = "อื้อ..."
2000209-42 = "โรงเรียนซานไห่จิง"
2000209-47 = "เนสึซึเกะ... หายไปไหนของเขากันแน่นะ....."
2000209-48 = "[s] \"ลองไปหาด้านโน้นกันเถอะ\""
2000209-49 = ".... ไม่เป็นไรหรอก#nฉันคิดว่าเนสึซึเกะคงหนีออกจากบ้านไปเหมือนกับที่ทุกๆ คนพูดแน่ๆ เลย"
2000209-50 = "ที่ผ่านมาฉันคงทำให้เขาลำบากใจมากเกินไป... ฮือๆ...#nเนสึซึเกะคงผิดหวังในตัวฉันและก็คงจะไม่กลับมาแล้วล่ะ"
2000209-51 = "[s] บอกซายะไม่ให้ถอดใจ"
2000209-52 = "ที่ผ่านมาคุณครูก็คงลำบากเพราะการทดลองของฉันด้วยใช่มั้ย?#nถ้างั้น... ทำไมคุณครูถึงยังใจดีกับฉันอยู่อีกล่ะ?"
2000209-53 = "[s1] \"ที่จริงครูสนุกมากนะ... ที่ได้อยู่กับซายะ\"\n[s2] \"ก็เป็นครูของซายะนี่นา ไม่เป็นไรหรอก\""
2000209-55 = "ครู...."
2000209-57 = "ครู...."
2000209-60 = "จี๊ดๆ จี๊ดๆ..."
2000209-61 = "อ๊ะ! เนสึซึเกะนี่....!#nหายไปไหนมาเนี่ย ฮืออออออ!"
2000209-62 = "จี๊ดๆ จี๊ดๆ..."
2000209-63 = "ฮือๆ... ที่ผ่านมาฉันทำให้ลำบากใจมากใช่ไหม นายถึงได้หนีไปแบบนี้?#nฉันขอโทษนะ..."
2000209-64 = "จี๊ดๆ จี๊ดๆ..."
2000209-65 = "อะไรนะ? วันนี้ที่ย่านการค้ามีแจกเมล็ดทานตะวันยักษ์เลยออกไปรับมางั้นเหรอ?#nแล้วทำไมถึงออกไปโดยไม่บอกเล่า! ฉันตามหาทั้งวันเลยรู้มั้ย!"
2000209-66 = "ฮึ่กๆ... ยังไงก็ขอโทษนะ ต่อไปฉันจะไม่บังคับฝืนใจนายอีกแล้วล่ะ...#nอย่าหายไปโดยไม่บอกแบบนี้อีกนะ"
2000209-67 = "จี๊ดๆ..."
2000209-70 = "อื้อ ฉันสัญญา! ต่อไปฉันจะให้นายทำแต่การทดลองที่สำคัญเท่านั้น!"
2000209-71 = "จี๊ดๆ!!"
2000209-72 = "เนสึซึเกะ! เลิกโวยวายได้แล้ว!#nฉันจะไม่ปล่อยให้นายหนีไปอีกแน่!"
2000209-74 = "จี๊ดๆ จี๊ดๆ..."
2000209-76 = "หลังจากนั้นซายะกับเนสึซึเกะก็กลับไปที่ห้องทดลองด้วยกัน"

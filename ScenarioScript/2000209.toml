[translation]
2000209-1 = "Nezusuke Is Missing!"
2000209-2 = "Saya's Research Lab"
2000209-3 = "Sensei! What do I do?! Nezusuke... Nezusuke is..."
2000209-4 = "Nezusuke disappeared!"
2000209-5 = "I thought he might be playing hide-and-seek, so I searched the entire lab... But I haven't been able to find him anywhere!"
2000209-7 = "Nezusuke has never vanished like this before... What do I do? *sob*"
2000209-8 = "[s] Calm Saya down."
2000209-10 = "*sniffle* What if...something terrible has happened to Nezusuke?"
2000209-11 = "Where could he have gone? Nezusuke and I have always been inseparable. He would never run off without me!"
2000209-12 = "[s] \"Let's ask the other Eastern Alchemy Society members.\""
2000209-13 = "Okay... *sniffle*"
2000209-15 = "Shanhaijing Classroom"
2000209-16 = "Nezusuke is missing? That's terrible..."
2000209-17 = "Have you seen him at all today?"
2000209-18 = "No... The only place I've ever seen Nezusuke is your lab."
2000209-19 = "I can't believe this. Nezusuke really is missing..."
2000209-20 = "What do I do...? *sniffle*"
2000209-21 = "I'm sorry to ask this, but...do you think Nezusuke ran away?"
2000209-22 = "...Ran away?"
2000209-23 = "I mean, you are always abusing him with your experiments..."
2000209-24 = "I respect him for hanging in for as long as he did."
2000209-25 = "Abusing?! I always asked for Nezusuke's help and consent first! I never abused him!"
2000209-26 = "But Nezusuke never seemed to want to be in those experiments. And I can't blame him. They never do end well for him..."
2000209-27 = "How dare you...?"
2000209-28 = "[s] \"Let's go ask the other staff members.\""
2000209-29 = "Okay..."
2000209-31 = "What? Nezusuke disappeared?"
2000209-32 = "Yeah... Have you seen him today?"
2000209-33 = "I don't think so... I would remember if I saw Nezusuke wandering around."
2000209-34 = "Where could he have gone...? *sniffle*"
2000209-35 = "Um... Not to jump to conclusions, but maybe Nezusuke ran away?"
2000209-36 = "Why does everyone think that?"
2000209-37 = "Well, you have been abusing the poor little guy for as long as I've known you."
2000209-38 = "For the last time, it's not abuse! Ugh..."
2000209-39 = "[s] \"Let's look around the academy for Nezusuke.\""
2000209-40 = "Fine..."
2000209-42 = "Shanhaijing Academy"
2000209-47 = "Nezusuke... Where are you?"
2000209-48 = "[s] \"Let's look over there.\""
2000209-49 = "Maybe they're right. Nezusuke must have run away..."
2000209-50 = "*sob* I was going too hard on him. Nezusuke ran away and is never coming back because he doesn't love me anymore..."
2000209-51 = "[s] Tell her not to give up."
2000209-52 = "I put you through my experiments too, didn't I? So why...are you still being so nice to me?"
2000209-53 = "[s1] \"I was having fun because I was with you.\"\n[s2] \"Teachers are built to handle those kinds of things.\""
2000209-55 = "Sensei..."
2000209-57 = "Sensei..."
2000209-60 = "*squeak* *squeak*"
2000209-61 = "Oh, Nezusuke! I was looking everywhere for you! *bawl*"
2000209-62 = "*squeak* *squeak*"
2000209-63 = "*sob* Did you run away because I was mistreating you? I'm so sorry..."
2000209-64 = "*squeak* *squeak*"
2000209-65 = "What? You went out because you heard the Promenade was giving out free sunflower seeds? Why didn't you leave a note or something?! We've been looking for you all day!"
2000209-66 = "*sob* Still, I'm really sorry. I promise I won't put you through so much anymore... I don't know what I'd do without you."
2000209-67 = "*squeak*"
2000209-70 = "I give you my word that I'll only use you for the really important experiments!"
2000209-71 = "*squeak*!"
2000209-72 = "Nezusuke! You don't have to make such a fuss. I promise I'll never let you get away again."
2000209-74 = "*squeak* *squeak*!"
2000209-76 = "Saya then dragged Nezusuke back to the lab."

[translation]
2000209-1 = "下落不明的根津助"
2000209-2 = "沙耶的研究室"
2000209-3 = "老師，糟了，出大事了！根津助牠……根津助牠……"
2000209-4 = "根津助牠不見了！"
2000209-5 = "原本在想會不會躲在哪裡把研究室找過了，卻完全找不到！"
2000209-7 = "根津助什麼都不說就不見什麼的這是第一次……怎，怎麼辦？嗚哇啊啊啊！"
2000209-8 = "[s]（讓沙耶冷靜）"
2000209-10 = "嗚，嗚嗚。但是……如果根津助有什麼萬一的話……"
2000209-11 = "咦，根津助可能會去的地方？#n根津助和我是夥伴，總是在一起，沒有一個人去過任何地方。"
2000209-12 = "[s]「問問其他鍊丹術研究會的部員吧。」"
2000209-13 = "我知道了……（啜泣）"
2000209-15 = "山海經．教室"
2000209-16 = "根津助不見了？那真是糟了呢……"
2000209-17 = "今天，有看見根津助嗎？"
2000209-18 = "不，我沒有在前輩的研究室以外的地方看過根津助呢。"
2000209-19 = "不過真稀奇呢。根津助竟然自己一隻不見了……"
2000209-20 = "怎麼辦，嗚嗚……"
2000209-21 = "雖然這麼說有點那個……根津助該不會離家出走了吧？"
2000209-22 = "……離家出走？"
2000209-23 = "是的，畢竟前輩幾乎每天，以實驗為藉口在欺負根津助……"
2000209-24 = "反而該說是，至今為止都沒逃跑很厲害嗎。"
2000209-25 = "欺負什麼的！我只是讓牠幫忙實驗，沒有欺負過根津助！"
2000209-26 = "但是根津助牠，不想參加實驗吧？#n畢竟常常變成奇怪的樣子，我也能理解根津助的心情。"
2000209-27 = "唔唔……"
2000209-28 = "[s]「也問問其他部員吧。」"
2000209-29 = "我知道了……"
2000209-31 = "騙人，根津助前輩不見了嗎？"
2000209-32 = "嗯。今天，有在哪裡看見根津助嗎？"
2000209-33 = "唔嗯……今天沒有看見根津助前輩的印象呢。"
2000209-34 = "真的是，跑到哪裡去了……（啜泣）"
2000209-35 = "那個──，雖然有點冒昧……不過根津助前輩會不會是離家出走了呢。"
2000209-36 = "大家……為什麼都那麼想呢？"
2000209-37 = "大家……？那個，那是因為那個，根津助前輩總是被沙耶前輩欺負……"
2000209-38 = "明明沒有欺負牠的打算，嗚嗚嗚……"
2000209-39 = "[s]「在校內繞繞尋找根津助吧。」"
2000209-40 = "嗯……"
2000209-42 = "山海經高級中學"
2000209-47 = "根津助──真的是，跑去哪裡了……"
2000209-48 = "[s]「那邊也找找看吧。」"
2000209-49 = "……不用，已經夠了。#n根津助牠，一定是如部員所說的，離家出走了。"
2000209-50 = "是我至今為止太欺負牠的錯。嗚嗚……#n根津助對我失望，不會再回來了。"
2000209-51 = "[s]（說出，不能放棄）"
2000209-52 = "老師至今為止也因為我的實驗的錯很難受吧？#n然而……為什麼要對我這麼好呢？"
2000209-53 = "[s1]「我和沙耶在一起很開心唷。」\n[s2]「因為是老師呀。」"
2000209-55 = "老師……"
2000209-57 = "老師……"
2000209-60 = "啾，啾──啾──……"
2000209-61 = "啊啊，根津助──……！你去哪裡了啊，嗚啊啊啊啊！"
2000209-62 = "啾──啾──……"
2000209-63 = "嗚，嗚嗚……因為我至今為止對你不好所以離家出走了嗎？#n真的很對不起哦……"
2000209-64 = "啾──啾──，啾。"
2000209-65 = "咦？聽說了商會在配發巨大的向日葵種子所以跑去了？#n那為什麼一聲不響的就跑去了！一整天都在找你耶！"
2000209-66 = "嗚……不過對不起哦。今後不會再做過分的惡作劇了……#n不可以再，什麼都不說就消失了哦？"
2000209-67 = "啾──……"
2000209-70 = "嗯，約定好了！今後只會讓你陪我做認真的實驗！"
2000209-71 = "啾──！"
2000209-72 = "你這傢伙，根津助！不要掙扎了！#n不會再讓你逃走了！"
2000209-74 = "啾，啾──啾──！"
2000209-76 = "（那之後，沙耶和根津助融洽地回去研究室了）"

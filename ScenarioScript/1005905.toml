[translation]
1005905-1 = "閣樓裡的公主"
1005905-2 = "（工作比預期中還晚結束，結果沒能在約好的時間抵達）"
1005905-5 = "啊，是老師☆"
1005905-6 = "[s]「抱歉我遲到了。你等很久了吧？」"
1005905-7 = "沒關係，我知道老師很忙。#n而且我現在閒到不行，別在意別在意。"
1005905-8 = "[s]「話說有什麼事呢？」"
1005905-11 = "嗯～怎麼說呢……"
1005905-12 = "……其實真的不是什麼大事。"
1005905-13 = "只是想說可以的話要不要去喝個茶呀～之類的！"
1005905-14 = "但今天是假日……店家都會早早關門對吧。"
1005905-15 = "現在時間也不早了，我想店家可能都關門了……"
1005905-16 = "難得老師都來了，該怎麼辦呢……"
1005905-17 = "佔用老師的時間也有點不好意思，老師還是回夏萊去吧？#n畢竟老師很忙。"
1005905-18 = "況且，如果和我這種人待在一起，說不定會被說閒話的……"
1005905-19 = "[s]「沒關係，不用在意那種事。」"
1005905-20 = "唔……嗯。"
1005905-21 = "[s1]「拖延到時間是我的不對。」\n[s2]「要不要去找個能休息一下的地方？」"
1005905-24 = "能休息的地方……"
1005905-29 = "啊，我的房間怎麼樣？"
1005905-30 = "[s]「彌香的房間？」"
1005905-31 = "嗯？"
1005905-32 = "啊！沒有奇怪的意思哦！#n而且與其說是房間，不如說只是宿舍一部分的空間…… "
1005905-33 = "今天是假日，所以門禁比較晚。"
1005905-34 = "我有收到蛋糕捲和紅茶……#n不過蛋糕捲我已經吃膩了……#n再放下去可能會壞掉……！"
1005905-35 = "啊！老師要帶回去吃也可以唷！#n總比扔掉好對吧！"
1005905-36 = "[s3]（一直拒絕也不太好……就當作順便送彌香回去吧……）\n[s4]「那就去房間拿個蛋糕吧。」"
1005905-39 = "嗯！雖然不能待太久……"
1005905-43 = "那我們走吧！這邊這邊！"
1005905-52 = "[ns]（是相當老……有歷史的建築物……）"
1005905-53 = "抱歉，是個有點死氣沉沉的地方對吧？#n因為建築相當老舊所以沒什麼人氣，住在這裡的人也不多。"
1005905-54 = "之前我還看見了老鼠唷……#n嗚……簡直讓人懷念起之前待的監牢了……"
1005905-55 = "[s]「那還真是……挺不容易的呢……」"
1005905-56 = "啊哈哈！#n不過別看外表這樣，安全措施還是挺完善的哦，別擔心☆"
1005905-57 = "我的房間在最上層。#n不過得爬緊急逃生梯上去就是了……"
1005905-58 = "[s5]「緊急逃生梯……？」\n[s6]「彌香的房間在那種地方嗎？」"
1005905-61 = "我可能是特例吧☆#n有特殊待遇？"
1005905-65 = "啊！樓梯還挺陡的，要小心哦。"
1005905-73 = "到了～！"
1005905-74 = "[s]「這難道是，閣樓……！？」"
1005905-75 = "是呢。"
1005905-76 = "閣樓……"
1005905-81 = "……唔嗯。"
1005905-82 = "差不多該……"
1005905-86 = "[ns]「差不多？」"
1005905-90 = "現在開始點名！"
1005905-91 = "[ns]「！？！？」"
1005905-92 = "現在起將關閉正門！#n此外，請各位站在自己的房門前等待！"
1005905-93 = "點名將從高樓層依序開始！"
1005905-94 = "老師，糟糕了！#n舍監正在往這裡來！"
1005905-95 = "[s]「彌，彌香！？」"
1005905-96 = "總之先躲在房間的棉被裡吧！#n被發現跑進女生宿舍會很麻煩的吧？"
1005905-97 = "[s7]「啊……呃，嗯！？」\n[s8] 總之先照彌香說的做"
1005905-105 = "（依照彌香所說進入了房間，躲在棉被裡）"
1005905-110 = "彌香大人，似乎有些嘈雜呢……發生什麼事了嗎？"
1005905-111 = "咦？怎麼了嗎？"
1005905-112 = "那個……我好像聽見了交談聲……"
1005905-113 = "啊哈哈☆你在說什麼呢？#n是你聽錯了吧？"
1005905-119 = "可以稍微打擾一下嗎？#n讓我確認一下房間裡面？"
1005905-120 = "我真是不被信任呢……"
1005905-121 = "無所謂唷，隨你高興吧。"
1005905-123 = "那麼打擾了。"
1005905-128 = "[ns]（……！！）"
1005905-133 = "……"
1005905-134 = "呼呣……是我的錯覺嗎……？"
1005905-140 = "麻煩請不要太吵鬧，彌香大人。#n這棟建築十分老舊，聲音很容易傳出去的。"
1005905-141 = "那麼，您請自便。"
1005905-142 = "好哦～辛苦了☆"
1005905-146 = "……嗚哇，成功了呢？"
1005905-152 = "老師，已經沒事了。可以出來了唷。"
1005905-153 = "[ns]「彌香……這是……！？」"
1005905-156 = "― 噓──"
1005905-160 = "― ……老師你，被我騙了唷。[wa:2340] "
1005905-163 = "― 怎麼辦呢？[wa:100] "
1005905-165 = "― 已經，只能在這裡待到早上了唷？[wa:1290] "
1005905-168 = "― 居然這麼簡單就相信我。[wa:2310] "
1005905-170 = "― 老師也真是……[wa:800] "
1005905-173 = "― 明明說過那麼多次「不要相信我」了……[wa:3260] "
1005905-176 = "[ns]「彌香……！！」"
1005905-177 = "― 嗯？在這裡吵鬧的話……[wa:2290] "
1005905-179 = "― 會被大家發現的唷？沒關係嗎？[wa:2510] "
1005905-182 = "― ……我是無所謂啦。[wa:3000] "
1005905-185 = "[ns]「…………」"
1005905-186 = "― ……咦？[wa:2040] "
1005905-188 = "― 難道……你生氣了？[wa:2160] "
1005905-191 = "― 我是問題兒童這種事，"
1005905-193 = "― 老師也很清楚吧……？[wa:880] "
1005905-196 = "[ns9] 保持沉默\n[ns10]「這樣實在太超過了……為什麼要做這種事呢？」"
1005905-197 = "― 那個……[wa:600] "
1005905-198 = "― 那個……[wa:600] "
1005905-200 = "― 我不是想造成你的困擾……"
1005905-203 = "― 也不想被老師……討厭……[wa:5050] "
1005905-205 = "― 但是……一下下……[wa:1970] "
1005905-208 = "― 真的只要一下下就好……[wa:710] "
1005905-210 = "― 我想跟老師待在一起……[wa:2830] "
1005905-213 = "（安慰了不知所措的彌香，一起靜靜地在房內直到早上）"
1005905-214 = "（等到宿舍正門一開，便偷偷離開宿舍回到了夏萊）"

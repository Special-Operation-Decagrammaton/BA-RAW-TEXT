[translation]
1005905-1 = "The Princess of the Attic"
1005905-2 = "I arrived late, since work ran long."
1005905-5 = "Wow! ☆ It's Sensei!"
1005905-6 = "[s] \"Sorry I'm so late. Did you wait long?\""
1005905-7 = "Hmm? No, no. It's okay. I know you're really busy, Sensei. Me on the other hand, I've been free lately."
1005905-8 = "[s] \"But what's going on? Mika?\""
1005905-11 = "Hmm? Well... Um..."
1005905-12 = "Really, nothing actually happened..."
1005905-13 = "I just thought it would be nice to have some tea and dessert together. If you're okay with that, of course."
1005905-14 = "B-But the stores are closing early today, since it's a holiday."
1005905-15 = "It's so late that I'm not sure anything local will be open..."
1005905-16 = "What should we do? I don't want you to have come all this way for nothing."
1005905-17 = "But I don't want to take up more of your time either, Sensei. Do you just want to go back to Schale?"
1005905-18 = "It's probably better for you if people don't keep seeing you with a miscreant like me anyway..."
1005905-19 = "[s] \"Oh, don't worry about that.\""
1005905-20 = "O-Okay."
1005905-21 = "[s1] \"It's my fault that I was late.\"\n[s2] \"Should we find somewhere to sit?\""
1005905-24 = "Somewhere to sit?"
1005905-29 = "You mean like my room?"
1005905-30 = "[s] \"Your room?\""
1005905-31 = "Yes."
1005905-32 = "I don't mean to be weird or anything! And it's just a dorm room, nothing fancy..."
1005905-33 = "But because it's a holiday, lights out is later than usual."
1005905-34 = "And I've got some roll cakes and tea to share. If I'm being honest, I'm tired of the roll cakes, but they're going to go bad soon, so..."
1005905-35 = "In fact, you could take it home with you if you want, Sensei! It's better than wasting food!"
1005905-36 = "[s3] \"(I'd hate to turn down such a kind offer from Mika again...)\"\n[s4] \"Tell you what! I'd be glad to stop by and take the Swiss rolls.\""
1005905-39 = "Ah, yeah, I thought you wouldn't have too much time to spare."
1005905-43 = "Come on! The dorm is this way!"
1005905-52 = "[ns] \"(That building is pretty old...)\""
1005905-53 = "Depressing, isn't it? It's an old building, so it's not very popular. Hardly any students stay here."
1005905-54 = "Ugh! Last time I was here, I even saw a rat! Kinda makes me miss the prison cell, you know?"
1005905-55 = "[s] \"It must be hard for you.\""
1005905-56 = "Ahahaha! ☆ No, it's not that bad. The management here is great!"
1005905-57 = "Anyway my room is at the top floor, so we can take the emergency stairs here."
1005905-58 = "[s5] \"Emergency stairs don't seem like a normal route...\"\n[s6] \"Mika, I hope you're not the only tenant in this whole strange place.\""
1005905-61 = "Don't worry. It's just because I'm a special case with an unusual history."
1005905-65 = "Be careful now. The stairs are steep."
1005905-73 = "We're here! It's the room at the end!"
1005905-74 = "[s] \"It's basically an attic...\""
1005905-75 = "Yeah..."
1005905-76 = "Right... Attic..."
1005905-81 = "Let's see..."
1005905-82 = "It's just about time for..."
1005905-86 = "[ns] \"For what?\""
1005905-90 = "Roll call!"
1005905-91 = "[ns] \"?!?!\""
1005905-92 = "The main entrance is now closed! No exceptions! Every student needs to line up outside their door!"
1005905-93 = "Roll call will begin from the top floor!"
1005905-94 = "Oh no! This is no good at all, Sensei. The inspector is coming this way!"
1005905-95 = "[s] \"M-Mika?!\""
1005905-96 = "Go in my room and hide under the blankets! Quick! You'll be in so much trouble if you get caught in here!"
1005905-97 = "[s7] \"Eh?!\"\n[s8] Do what Mika says."
1005905-105 = "I dove under the blankets Mika pointed out just in time."
1005905-110 = "Mika? What's with all the noise? Is something going on?"
1005905-111 = "Huh? No. Not really."
1005905-112 = "I thought I heard somebody talking to you..."
1005905-113 = "Ahaha! ☆ What do you mean? It's just me here. You must've heard wrong. "
1005905-119 = "Mm hm... Would you step aside for a moment? I want to inspect your room."
1005905-120 = "Whoa! Don't you trust me?!"
1005905-121 = "I mean... Whatever. Do whatever you want."
1005905-123 = "Then, please excuse me."
1005905-128 = "[ns] \"(...!)\""
1005905-133 = "..."
1005905-134 = "Hmm... I suppose I did just hear wrong..."
1005905-140 = "Well, keep the noise down, okay, Mika? This is an old building, so the walls are very thin."
1005905-141 = "Get some rest."
1005905-142 = "Of course. Thank you! ☆"
1005905-146 = "Wow. Success!"
1005905-152 = "Sensei. It's fine. You can come out now."
1005905-153 = "[ns] \"Mika! You—\""
1005905-156 = "― Shhh!!!"
1005905-160 = "― ...Sensei, I tricked you.[wa:1820] "
1005905-163 = "― What should we do now?[wa:10] "
1005905-165 = "― It looks like we're stuck here until morning."
1005905-168 = "― You trusted me so easily.[wa:1750] "
1005905-170 = "― Really, Sensei... I told you...[wa:10] "
1005905-173 = "― so many times not to trust me...[wa:2700] "
1005905-176 = "[ns] \"You are—\""
1005905-177 = "― Hmm? If you cause a scene here,[wa:1490] "
1005905-179 = "― everyone will find out. Are you sure you want that to happen?[wa:630] "
1005905-182 = "― Of course, it doesn't matter to me either way.[wa:1520] "
1005905-185 = "[ns] \"...\""
1005905-186 = "― What?[wa:2000] "
1005905-188 = "― ...You aren't mad, are you?[wa:1440] "
1005905-191 = "― You should know me by now."
1005905-193 = "― You knew I was trouble, Sensei. Didn't you...?[wa:10] "
1005905-196 = "[ns9] Refuse to play along with Mika's prank.\n[ns10] \"Why did you do this? This is no simple prank.\""
1005905-197 = "― Hey...[wa:520] "
1005905-198 = "― Hey...[wa:520] "
1005905-200 = "― I didn't mean to upset you..."
1005905-203 = "― ...I don't like it when you're mad at me, Sensei...[wa:3490] "
1005905-205 = "― It was harmless fun.[wa:1530] "
1005905-208 = "― Just for a moment...[wa:350] "
1005905-210 = "― I just wanted to spend one more moment with you, Sensei.[wa:1030] "
1005905-213 = "You waited in Mika's room until the morning, leaving her a bit flustered at your hasty exit."
1005905-214 = "The moment the dormitory door opened, you slipped out thankfully unnoticed."

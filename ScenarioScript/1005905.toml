[translation]
1005905-1 = "เจ้าหญิงในห้องใต้หลังคา"
1005905-2 = "(คุณครูเคลียร์งานเสร็จช้ากว่าที่คิด ก็เลยมาถึงช้ากว่าที่บอกไว้)"
1005905-5 = "ว้าว☆ คุณครูนี่นา!"
1005905-6 = "[s] \"ครูขอโทษที่มาช้านะ รอนานหรือเปล่า?\""
1005905-7 = "หืม? ไม่เลย ไม่เป็นไร ก็คุณครูงานยุ่งนี่นา คนที่เวลารอเหลือเฟือคือฉันต่างหาก"
1005905-8 = "[s] \"ว่าแต่มีเรื่องอะไรเหรอ มิกะ?\""
1005905-11 = "หืม? คือว่า... เอ่อ..."
1005905-12 = "อันที่จริงก็ไม่ได้มีเรื่องอะไรหรอก"
1005905-13 = "ก็แค่... ถ้าครูไม่ว่าอะไร ฉันอยากดื่มชาแดงหรือกินของหวานกับคุณครูน่ะ..."
1005905-14 = "ตะ... แต่ว่าวันนี้เป็นวันหยุด ร้านก็เลยปิดเร็ว "
1005905-15 = "แล้วตอนนี้ร้านแถวนี้ก็ปิดหมดแล้วด้วย..."
1005905-16 = "เอาไงดีล่ะ? คุณครูอุตส่าห์มาทั้งที...... "
1005905-17 = "ฉันไม่อยากให้คุณครูเสียเวลาโดยใช่เหตุ... หรือว่าคุณครูจะกลับไปที่ชาเล่ต์เลยมั้ย?"
1005905-18 = "อีกอย่าง ถ้าใครเห็นว่าคุณครูมาอยู่กับคนที่ชื่อเสียงไม่ดีอย่างฉันบ่อยๆ ก็อาจเกิดปัญหาตามมาได้..."
1005905-19 = "[s] \"ไม่เห็นต้องสนใจเรื่องแบบนั้นเลย\""
1005905-20 = "กะ...ก็ได้..."
1005905-21 = "[s1] \"ครูผิดเองที่มาสาย\"\n[s2] \"งั้นไปหาที่นั่งกันก่อนมั้ย?\""
1005905-24 = "ที่นั่งเหรอ...?"
1005905-29 = "ในห้องฉันมั้ยล่ะ?"
1005905-30 = "[s] \"ห้องมิกะเหรอ?\""
1005905-31 = "หืม?"
1005905-32 = "อ๊ะ อย่าคิดอะไรแปลกๆ นะ! ถึงจะบอกว่าเป็นห้อง แต่มันก็พื้นที่เล็กๆ ในหอพัก..."
1005905-33 = "วันนี้เป็นวันหยุด เวลาเคอร์ฟิวเข้าหอพักก็เลยช้ากว่าปกติน่ะ"
1005905-34 = "ฉันมีแยมโรลกับชาแดงที่สภาน้ำชาให้มาอยู่น่ะ ขอสารภาพตามตรงว่าฉันเริ่มเบื่อแยมโรลแล้ว... แต่ว่าถ้าไม่กินก็อาจจะเสียได้น่ะ"
1005905-35 = "ระ... หรือว่าคุณครูจะเอากลับไปกินก็ได้นะ! ยังไงก็ดีกว่าทิ้งให้เสียของนี่เนอะ!"
1005905-36 = "[s3] (จะปฏิเสธน้ำใจจากมิกะไปตลอดก็ไม่ได้......)\n[s4] \"งั้นครูแวะเข้าไปเอาแยมโรลก่อนแล้วกัน\""
1005905-39 = "อื้ม! ฉันคิดไว้แล้วละ ว่าคุณครูคงไม่มีเวลามาเที่ยวเล่นข้างนอกนานๆ"
1005905-43 = "หอพักฉันอยู่ทางนี้!"
1005905-52 = "[ns] (อาคารค่อนข้างเก่าเลยนะ...)"
1005905-53 = "ขอโทษนะ มันดูค่อนข้างอึมครึมเลยใช่มั้ย? อาคารนี้มันเก่าแล้วน่ะ เลยไม่ค่อยมีนักเรียนมาพักเท่าไร"
1005905-54 = "คราวก่อนฉันเห็นหนูวิ่งผ่านด้วย หยึย... ทำเอาฉันคิดถึงห้องคุมขังที่เคยอยู่เลย..."
1005905-55 = "[s] \"ลำบากน่าดูเลยนะ...\""
1005905-56 = "อะฮะฮะฮ่า☆ ไม่หรอก ยังไงฉันก็ดูแลห้องให้เป็นระเบียบเรียบร้อยอยู่นะ "
1005905-57 = "ห้องฉันอยู่ชั้นบนสุด ขึ้นบันไดฉุกเฉินตรงนี้ไปก็เจอแล้ว"
1005905-58 = "[s5] \"บันไดฉุกเฉิน...? ก็ว่าอยู่ว่าเส้นทางมันไม่ค่อยปกติ...\"\n[s6] \"มีแต่ห้องของมิกะเหรอที่อยู่ในที่แปลกๆ?\""
1005905-61 = "นั่นสินะ? คงเพราะฉันเป็นคนที่มีประวัติพิเศษละมั้ง"
1005905-65 = "บันไดมันชันนะ คุณครูระวังด้วยล่ะ"
1005905-73 = "เอาละ ถึงแล้ว! ห้องที่อยู่ตรงสุดทางเดินตรงนั้น"
1005905-74 = "[s] \"แทบจะเป็นห้องใต้หลังคาเลยนะ......\""
1005905-75 = "อืม..."
1005905-76 = "นั่นสินะ... ห้องใต้หลังคา..."
1005905-81 = "ไหนดูเวลาซิ..."
1005905-82 = "นี่มันก็ใกล้จะ..."
1005905-86 = "[ns] \"ใกล้จะ...?\""
1005905-90 = "ถึงเวลารายงานตัวแล้วค่ะ!! "
1005905-91 = "[ns] \"???!!!??\""
1005905-92 = "จะทำการปิดประตูหอแล้วค่ะ! ขอให้นักเรียนทุกคนออกมารายงานตัวหน้าห้องด้วยค่ะ!"
1005905-93 = "เราจะเริ่มตรวจตั้งแต่ชั้นบนสุดเป็นต้นไป!!"
1005905-94 = "ว้าย เกิดเรื่องใหญ่แล้วคุณครู! คนดูแลหอพักกำลังมาแล้ว!"
1005905-95 = "[s] \"มะ... มิกะ...?!\""
1005905-96 = "คุณครูเข้าไปหลบในห้องฉันก่อน นอนคลุมโปงไว้เลยนะ! ถ้าโดนจับได้ว่าเข้ามาในหอพักนักเรียนหญิง คุณครูได้ตกงานแน่!!"
1005905-97 = "[s7] \"หะ... หาาา......?!\"\n[s8] ทำตามที่มิกะบอก"
1005905-105 = "(คุณครูเข้าไปในห้องของมิกะแล้วเอาผ้าห่มบนเตียงคลุมตัวไว้)"
1005905-110 = "คุณมิกะ? ข้างบนมีเสียงดังเอะอะ เกิดอะไรขึ้นหรือเปล่าคะ?"
1005905-111 = "หืม? ไม่นะ ไม่มีเลย"
1005905-112 = "เหมือนได้ยินเสียงคนคุยกันเลยค่ะ"
1005905-113 = "อะฮ่าฮ่า☆ บ้าน่า หูเพี้ยนไปเองหรือเปล่า? "
1005905-119 = "ช่วยหลีกทางให้หน่อยได้มั้ยคะ? ฉันอยากเข้าไปตรวจสอบในห้องค่ะ"
1005905-120 = "โอ้โฮ... ไม่เชื่อใจฉันเลยเหรอเนี่ย..."
1005905-121 = "ถ้างั้น... ก็เอาที่สบายใจเลย"
1005905-123 = "งั้นขอเสียมารยาทหน่อยนะคะ"
1005905-128 = "[ns] (...!!!!)"
1005905-133 = "......."
1005905-134 = "อืม... หรือจะหูฝาดไปเองนะ..."
1005905-140 = "อย่าทำอะไรเสียงดังนักนะคะ คุณมิกะ อาคารนี้มันเก่ามาก แค่คุยกันเบาๆ ก็ได้ยินกันหมดแล้วค่ะ"
1005905-141 = "งั้นก็เชิญพักผ่อนเถอะค่ะ"
1005905-142 = "อื้ม ตรวจห้องอื่นก็สู้ๆ นะ☆"
1005905-146 = "ว้าว สำเร็จเหรอเนี่ย?"
1005905-152 = "คุณครู คนคุมหอพักไปแล้ว ออกมาได้แล้วละ"
1005905-153 = "[ns] \"มิกะ...!! นี่เธอ...!!\""
1005905-156 = "― ชู่ว-"
1005905-160 = "― ...คุณครูถูกหลอกแล้วละ[wa:1940] "
1005905-163 = "― ทำยังไงดีล่ะ?[wa:10] "
1005905-165 = "― แบบนี้ก็คงต้องอยู่กับฉันจนถึงเช้าแล้วแหละ?[wa:210] "
1005905-168 = "― เชื่อคำพูดของฉันง่ายๆ แบบนี้ด้วยเหรอเนี่ย[wa:1110] "
1005905-170 = "― คุณครูนี่จริงๆ เลย...[wa:240] "
1005905-173 = "― ฉันบอกไปแล้วนี่นาว่าอย่าเชื่อใจฉันขนาดนั้นน่ะ...[wa:2060] "
1005905-176 = "[ns] \"เธอนี่มัน...!!\""
1005905-177 = "― หืม? ถ้าทำเสียงดังที่นี่ละก็...[wa:1490] "
1005905-179 = "― จะถูกทุกคนจับได้เอานะ... ไม่เป็นไรแน่เหรอ?[wa:1390] "
1005905-182 = "― ...ฉันน่ะไม่เป็นไรหรอก[wa:2480] "
1005905-185 = "[ns] \"......\""
1005905-186 = "― หืม...?[wa:1920] "
1005905-188 = "― นี่... โกรธกันเหรอ?[wa:1760] "
1005905-191 = "― คุณครูก็รู้อยู่แล้วไม่ใช่รึไง"
1005905-193 = "― เรื่องที่ฉันเป็นเด็กเจ้าปัญหาน่ะ...?[wa:10] "
1005905-196 = "[ns9] ไม่สนุกกับการล้อเล่นของมิกะ\n[ns10] \"ทำไมถึงทำเรื่องแบบนี้? แกล้งกันหนักไปแล้วนะ\""
1005905-197 = "― คือว่า...[wa:400] "
1005905-198 = "― คือว่า...[wa:400] "
1005905-200 = "― ฉันไม่ได้คิดจะทำให้คุณครูลำบากหรอกนะ......"
1005905-203 = "― ...ฉันก็แค่ไม่อยากให้คุณครูเกลียดฉันน่ะ...[wa:3850] "
1005905-205 = "― แต่ว่า...แค่แป๊บเดียว...[wa:1370] "
1005905-208 = "― ขอแค่ช่วงเวลาสั้นๆ แบบนี้ก็ได้...[wa:10] "
1005905-210 = "― ฉันอยากใช้เวลาอยู่กับคุณครู...[wa:2070] "
1005905-213 = "(คุณครูรออยู่ในห้องจนถึงเช้ากับมิกะที่ไม่รู้จะทำตัวอย่างไร)"
1005905-214 = "(ทันทีที่ประตูหอพักเปิด คุณครูก็รีบหนีออกมาจากหอพักโดยไม่ให้มีใครเห็น)"

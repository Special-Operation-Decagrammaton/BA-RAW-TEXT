[translation]
52195-9 = "We've been walking for half a day now..."
52195-10 = "It's all just the same old snow and rocks! Are you sure we're going the right way?!"
52195-11 = "...Yes."
52195-12 = "The snow has grown thicker, but this cherry stump and stone path mark the way."
52195-13 = "The Twilight Temple. We have arrived."
52195-14 = "This...is supposed to be the famous temple?"
52195-15 = "But it looks completely abandoned..."
52195-16 = "...There is a certain stagnation about it, like human breath has not touched its air for hundreds of years."
52195-17 = "Ha ha, hahahaha...!"
52195-18 = "Are you serious, Nagusa? What were you thinking, trying to pull a stunt like this?"
52195-19 = "You told me you'd take me to Kuzunoha, and then you drag me to some ruin no one's set foot in for centuries?"
52195-20 = "Were you hoping for the chance to laugh at me and gloat once I realized?"
52195-21 = "Or maybe you thought you could fight me and escape if I was by myself?"
52195-22 = "Too bad!"
52195-23 = "Whatever stupid little scheme you were trying to cook up, it was all for nothing!"
52195-24 = "Because now these ruins will be your final resting place!"
52195-25 = "You reveal your true colors, Yabuki Shuro!"
52195-26 = "You think we're just gonna roll over for you?!"
52195-30 = "No. I wasn't lying."
52195-35 = "I truly did meet a girl who called herself Kuzunoha here, and she gave me a letter addressed to Sensei."
52195-36 = "When I was last here, this stump bloomed with cherry blossoms, and this stone path sparkled."
52195-37 = "What are you even saying...?"
52195-38 = "In her words, the Twilight Temple is a place where the flow of time behaves according to its desires."
52195-39 = "Past exists betwixt present and future, and the spring cherry blossoms hum their tunes alongside autumn's equinox flowers."
52195-41 = "When the night's claws clutch the sky, and darkness so very deep mars human vision..."
52195-43 = "...turn to the setting sun, and exchange names beyond the dusk."
52195-45 = "...Who goes there?"
52195-51 = "...I am Kuzunoha, first president of the Hyakkaryouran Resolution Council."
52195-54 = "Huh? Just a second ago this was a crumbling ruin..."
52195-55 = "The cherry tree... It's blooming."
52195-63 = "Guests have not crossed this temple gate in many a moon...and such commotion they bring with them too."
52195-64 = "I do rather hope I am not facing nosy interlopers from centuries past... So, who has sought me out?"
52195-65 = "...I am Goryou Nagusa, acting president of the Hyakkaryouran Resolution Council."
52195-66 = "As you requested, I have brought you Sensei, of Schale."
52195-73 = "Fufu. Now this is a welcome face, my dearest junior."
52195-75 = "Next Episode;True Form"

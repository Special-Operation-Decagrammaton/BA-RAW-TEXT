[translation]
52195-9 = "นี่เราเดินมากันเกินครึ่งวันแล้วนะ..."
52195-10 = "แต่ทำไมถึงยังเห็นแต่หิมะกับก้อนหินล่ะ! มาถูกทางจริงๆ หรือเปล่า?!"
52195-11 = "ถูกแล้วละ..."
52195-12 = "ถึงตอนนี้จะมีหิมะหนากว่าตอนนั้นเล็กน้อย แต่ฉันจำตอไม้กับถนนกำแพงหินที่นำทางไปวิหารแห่งนั้น#nได้แม่นเลยละ..."
52195-13 = "ที่นี่ละ วิหารอัสดง"
52195-14 = "ที่นี่คือวิหารอัสดงงั้นเหรอ?"
52195-15 = "รุ่นพี่ แต่ที่นี่ดูเหมือนไม่มีใครอยู่เลยนะ..."
52195-16 = "รู้สึกเหมือนเป็นสถานที่ที่ไม่มีร่องรอยของใครมาหลายร้อยปีแล้วเลย..."
52195-17 = "ฮะฮ่า... อะฮะฮ่าฮ่า...!"
52195-18 = "นี่มันแผนการเหลวไหลอะไรกันคะ คิดอะไรอยู่กันแน่น่ะ นางุสะจัง~?"
52195-19 = "ปากบอกว่าจะพามาหาคุซึโนฮะ แต่กลับพามาสถานที่รกร้างที่ไม่มีใครมาหลายร้อยปีแล้วแบบนี้"
52195-20 = "อุตส่าห์เดินทางมาไกลแต่ก็คว้าน้ำเหลว คิดว่าจะดีใจตอนเห็นหน้าฉันตกใจเหรอคะ?"
52195-21 = "หรือคิดว่าถ้าออกมาอยู่ไกลๆ แล้วจะมีโอกาสเอาชนะฉันได้คะ?"
52195-22 = "เสียใจ~ ด้วยนะคะ!"
52195-23 = "ฉันไม่รู้ว่าคุณวางแผนอะไรไว้ระหว่างเดินทางมาที่นี่ แต่ยังไงทุกอย่างก็จะสูญเปล่าค่ะ"
52195-24 = "เพราะพวกคุณจะได้หลับใหลกันในที่ร้างๆ แห่งนี้ยังไงล่ะคะ"
52195-25 = "ในที่สุดก็เผยธาตุแท้ออกมาจนได้สินะ ยาบูกิ ชูโระ...!"
52195-26 = "คิดว่าพวกเราจะยอมโดนเธอเล่นงานหรือไง!"
52195-30 = "เปล่านะ ฉันไม่ได้โกหก"
52195-35 = "ฉันได้พบกับหญิงสาวคนหนึ่งที่เรียกตัวเองว่าคุซึโนฮะที่นี่ แล้วรับจดหมายจากเธอไปให้คุณครูด้วย"
52195-36 = "ตอนที่ออกไปจากสถานที่แห่งนี้ ตอไม้นี่ยังเป็นต้นซากุระที่มีดอกบานสะพรั่ง ส่วนถนนกำแพงหินก็ยัง#nสะอาดสะอ้านอยู่ด้วย"
52195-37 = "หมายความว่ายังไง..."
52195-38 = "ถ้าเป็นไปตามคำพูดของผู้หญิงคนนั้นละก็ ห้วงอัสดงคือสถานที่ที่ความเป็นไปในทางโลกสูญสิ้น#nความหมายไปทั้งหมด"
52195-39 = "ก็เลยไม่ต้องแปลกใจถ้าดอกซากุระในฤดูใบไม้ผลิกับภูเขาหินในฤดูใบไม้ร่วงจะอยู่ด้วยกัน หรือแม้แต่เหตุการณ์ในอดีตจะเกิดในปัจจุบัน"
52195-41 = "ในยามพลบค่ำจนไม่อาจแยกแยะได้ว่าคนตรงหน้าคือใคร"
52195-43 = "เมื่อเผชิญหน้ากับแสงอาทิตย์อัสดง แล้วขานชื่อของท่านผู้นั้นเหนือแสงสลัว"
52195-45 = "ท่านที่อยู่ตรงนั้นคือใครกัน..."
52195-51 = "ข้าคือคุซึโนฮะ... หัวหน้าคนแรกของคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน "
52195-54 = "เอ๋? เมื่อกี้ยังไม่มีอะไรอยู่ตรงนี้เลยนี่นา..."
52195-55 = "ดอกซากุระ... บานสะพรั่งเลยเจ้าค่ะ"
52195-63 = "มีแขกมาเยี่ยมเยียนนี่เอง มิน่าล่ะข้าถึงได้ยินเสียงดังมาจากหน้าประตูวิหาร"
52195-64 = "หวังว่าคงไม่ใช่แขกที่ไม่ได้รับเชิญที่ไม่ได้มานานแล้วนะ... ว่ายังไงเล่า เจ้าที่มาหาข้าคือใครกัน?"
52195-65 = "โกเรียว นางุสะ รักษาการหัวหน้าคณะไกล่เกลี่ยข้อพิพาท เฮียกกะเรียวรัน"
52195-66 = "ฉันพาคุณครูของชาเล่ต์มาที่นี่ตามที่คุณขอร้องแล้ว"
52195-73 = "ฮุฮุ น่าดีใจเหลือเกินที่ได้เจอเจ้าอีกครั้ง รุ่นน้องของข้า"
52195-75 = "ตอนต่อไป;คนเดิม"

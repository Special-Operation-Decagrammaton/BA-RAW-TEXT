[translation]
52195-9 = "都已經走了半天多的路了……"
52195-10 = "除了雪和石頭什麼都看不到！#n這個方向真的沒錯嗎！？"
52195-11 = "……沒錯。"
52195-12 = "雖然雪比當時積得更深了，但這棵櫻花樹的樹樁，還有通往寺院的石牆小徑……#n我記得很清楚。"
52195-13 = "這裡就是黃昏寺院。"
52195-14 = "這裡就是黃昏寺院？"
52195-15 = "可是前輩，這裡看起來完全不像有人來過的地方……"
52195-16 = "……感覺就像是幾百年前就已經斷絕人跡的遺跡。"
52195-17 = "哈哈，哈哈哈哈……！"
52195-18 = "還真會耍這種沒意義的花招啊，名草醬～？"
52195-19 = "說什麼要去見葛葉，結果卻把我帶到這個幾百年沒人來過的廢墟。"
52195-20 = "難道是想拿我走了這麼遠卻一臉錯愕的表情來取樂嗎？"
52195-21 = "還是說，你以為只要逃到這種偏僻的地方就能有勝算？"
52195-22 = "真可惜～！"
52195-23 = "不管你一路上打了什麼算盤，最後都會變得毫無意義。"
52195-24 = "因為你們所有人，都會長眠在這片廢墟之中。"
52195-25 = "終於露出真面目了啊，箭吹棕櫚……！"
52195-26 = "以為我們會乖乖聽你的話嗎！"
52195-30 = "不，我並沒有說謊。"
52195-35 = "我確實在這裡遇見過自稱葛葉的少女，並從他手中接過了要交給老師的信。"
52195-36 = "當時離開這裡的時候，這棵櫻花樹的樹樁上還開滿了花，石牆的小徑也很乾淨整潔。"
52195-37 = "那是什麼意思──"
52195-38 = "依照他的說法，黃昏是讓塵世間的一切流轉都失去意義的地方。"
52195-39 = "即便春天的櫻花與秋天的彼岸花共存……過去的事在現在重現也不奇怪。"
52195-41 = "當夕陽西下，黃昏籠罩到連眼前的人都無法辨認之時。"
52195-43 = "面對將盡的夕陽，向暮色的彼方呼喚。"
52195-45 = "……在那裡的人，是誰？"
52195-51 = "……百花繚亂紛爭調停委員會的初代委員長，葛葉。"
52195-54 = "咦？剛才這前面明明什麼都沒有的……"
52195-55 = "櫻花……竟然盛開了。"
52195-63 = "寺院之門傳來騷動，原來是久違的客人啊。"
52195-64 = "只願並非跨越漫長歲月而來的不速之客……拜訪妾身之人啊，報上名來吧。"
52195-65 = "……百花繚亂紛爭調停委員會的委員長代理，御稜名草。"
52195-66 = "按照你的要求，把夏萊的老師帶來了。"
52195-73 = "呵呵，能再次相見著實令人高興啊，後輩。"
52195-75 = "下一回;原本的模樣 "

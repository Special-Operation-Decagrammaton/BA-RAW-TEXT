52195-17 = "3;슈로;00;하하, 하하하하……!\n#3;em;[재잘]\n#2;hide"
52195-18 = "3;슈로;01;되도 않는 수작을 부리다니, 무슨 생각을 하고 계셨던 걸까요. 나구사 쨩~?"

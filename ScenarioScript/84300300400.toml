[translation]
84300300400-6 = "เคลือบแคลงอะไรอยู่พอดีเหรอคะ?"
84300300400-7 = "อ๊ะ ขอโทษที... ฉันกำลังจัดการความคิดอยู่น่ะ"
84300300400-8 = "ถ้าฉันไปรบกวนก็ขอโทษนะคะ"
84300300400-9 = "ไม่ ไม่ต้องขอโทษหรอก ในเมื่อเราร่วมมือกันแล้ว การแบ่งปันข้อมูลที่ได้รู้มาก็เป็นสิ่งที่ถูกต้องแล้วละ"
84300300400-10 = "ต่อไประหว่างทำงานนี้ เมื่อจบแต่ละสถานการณ์ ฉันอยากให้เรามาเจอกันเพื่อแบ่งปันข้อมูล และวิเคราะห์ข้อมูลกัน"
84300300400-11 = "ถึงส่วนมากจะเป็นการบอกสิ่งที่ฉันวิเคราะห์ให้ก็เถอะ..."
84300300400-12 = "เข้าใจแล้วค่ะ เอาตามนั้นค่ะ"

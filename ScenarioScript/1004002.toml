1004002-10 = "#zmc;instant;316,0;2528\n#na;???;아! 저, 저, 여, 여기예요오……."
1004002-11 = "#zmc;move;316,0;2528;10"
1004002-12 = "#zmc;move;632,0;1896;2000\n#wait;2500"

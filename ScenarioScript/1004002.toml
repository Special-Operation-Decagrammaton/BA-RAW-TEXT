1004002-106 = "3;츠쿠요;03;…….\n#3;em;…"
1004002-107 = "3;츠쿠요;07;……아, 그, 그게."
1004002-108 = "3;츠쿠요;07;죄, 죄송합니다아……. 선생님……"
1004002-109 = "3;츠쿠요;07;닌자라면 방금 그때가 딱……. 타이밍에 맞춰 물러나야 할 씬이었던, 거겠죠? 저, 눈치가 별로 없어서…….\n#3;stiff\n#3;em;[땀]"
1004002-110 = "3;츠쿠요;02;아, 시, 신경 쓸 거 없다고요? 아, 알겠습니다!"
1004002-111 = "3;츠쿠요;05;그럼 이번에야말로 느, 늦지 않게! 이만 물러가 보겠습니다!\n#3;greeting"

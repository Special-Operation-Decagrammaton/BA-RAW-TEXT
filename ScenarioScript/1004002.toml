[translation]
1004002-1 = "獨當一面的，忍者……！"
1004002-2 = "（即使比約定時間稍微早一些，到了和月夜會合的地點……）"
1004002-3 = "（但是過了約定時間，月夜還是沒有出現……）"
1004002-4 = "[ns]「月夜，怎麼了呢……」"
1004002-5 = "老師……"
1004002-10 = "那個，我在這裡……"
1004002-16 = "[ns]「月，月夜……！？」"
1004002-18 = "讓您久等，不好意思……"
1004002-19 = "那個，雖然把老師叫了出來……但是一到要和老師見面的時候，就覺得那個，很緊張……"
1004002-20 = "和像我這樣，只是很大的孩子，見面也可以嗎……"
1004002-21 = "雖然，老師欣然同意了……不過，果然是不是損害到老師的心情了……"
1004002-22 = "這樣想著的時候，不小心……"
1004002-23 = "不小心那個，變裝成了樹木……"
1004002-24 = "[s]「不用躲起來也沒關係唷。」"
1004002-25 = "是，那樣嗎……？"
1004002-26 = "[s]「所以，月夜想商量的事是？」"
1004002-27 = "啊，那個，就是啊……"
1004002-28 = "我，想成為，出色的忍者……！"
1004002-29 = "因為我聽說……夏萊的老師，是那個，很厲害的人……"
1004002-30 = "請老師，幫忙的話……我這種人，也許也能成為，獨當一面的忍者……！"
1004002-31 = "[s1]「獨當一面的忍者啊……？」\n[s2]「話說回來，月夜為什麼想成為忍者？」"
1004002-32 = "啊，不好意思……！說得也是呢，必須，從那邊講起……"
1004002-33 = "啊，不好意思……！說得也是呢，必須，從那邊講起……"
1004002-34 = "那個，理由，是……"
1004002-35 = "理由，那個……理由……"
1004002-36 = "那個，如果成為出色的忍者的話，是不是就可以在忍術研究部的活動上，幫上忙……"
1004002-37 = "我想成為出色的忍者，幫上大家的忙……！"
1004002-38 = "那就是，想成為獨當一面的忍者的理由，沒錯……！"
1004002-39 = "啊，那個，不好意思……突然聽到這種事，也只會困擾吧……？"
1004002-40 = "[s]「沒關係。雖然不知道能不能幫上忙，不過我會盡全力協助唷。」"
1004002-46 = "好的，謝謝，老師……！"
1004002-48 = "我什麼，都願意做！首先，要做什麼呢……？"
1004002-49 = "[s3]「果然首先從，月夜最擅長的開始。」\n[s4]「從最有自信的開始，一點一滴的練習比較好吧。」"
1004002-54 = "原來如此……！"
1004002-55 = "我可以做的，最好的事……最有，自信的事……"
1004002-56 = "一點一滴，的……"
1004002-57 = "不愧是，夏萊的老師……！一字一句的，份量就是不同……！"
1004002-58 = "得一字不漏的，記錄下來才行……！"
1004002-59 = "[s]「有到那種地步嗎……？總，總而言之，擅長的事呢？」"
1004002-60 = "那個，擅長的事……"
1004002-61 = "啊，這樣的話……！"
1004002-62 = "變裝成樹木，只有這個，我很有自信……！"
1004002-63 = "[s5]「確實剛才……」\n[s6]「在被搭話以前，完全沒注意到。」"
1004002-64 = "啊，是，那樣嗎……？"
1004002-65 = "啊，是，那樣嗎……？"
1004002-66 = "欸嘿嘿……能被老師，那麼說……總覺得，非常的，開心！"
1004002-67 = "這是，從以前一直鍛鍊到現在的，我的特技……"
1004002-68 = "我，因為從以前就很高……在才藝表演之類的，常常，扮演樹木……！"
1004002-69 = "所以，很習慣了。"
1004002-70 = "以前的綽號是，「百鬼夜行的神木」！"
1004002-71 = "那麼，立刻……？"
1004002-72 = "[s]「啊，願意做給我看嗎？」"
1004002-73 = "是的，請稍等一下……！"
1004002-74 = "首先，將這個這樣……"
1004002-75 = "這個樹枝這樣……接在這裡……"
1004002-76 = "呼，準備完成……"
1004002-77 = "那麼，我大野月夜……"
1004002-78 = "將展現，拿手的特技……！"
1004002-79 = "哈啊啊……！"
1004002-84 = "請問，如何呢，老師……？"
1004002-90 = "[ns7]「好厲害……！？」\n[ns8]「可以說是和自然為一體……！？」"
1004002-94 = "就像，這種感覺……！"
1004002-95 = "請問，怎麼樣呢？有什麼，奇怪的地方嗎……？"
1004002-96 = "[s]「好厲害呢，藏在哪裡完全不知道……」"
1004002-97 = "那個，沒想到，會被那麼稱讚……"
1004002-98 = "稍微，有些自信了也說不定……！"
1004002-99 = "把這個技能，繼續磨練的話……！"
1004002-100 = "我也可以，成為獨當一面的忍者嗎……！？可以成為吧！"
1004002-101 = "[s]「肯定可以唷，加油吧！」"
1004002-102 = "謝謝老師……！"
1004002-103 = "今後我也會，盡全力，努力的！"
1004002-106 = "……"
1004002-107 = "這個，那個……"
1004002-108 = "該不會，剛才，應該作為忍者，帥氣的退場嗎……？"
1004002-109 = "不好意思，不會看氣氛……"
1004002-110 = "都可以，嗎……？謝，謝謝老師。"
1004002-111 = "那麼，重新一次……失禮，了……！"
1004002-112 = "呀……！"
1004002-117 = "[ns] 「……真是好孩子呢。」"
1004002-119 = "[ns]「好，那麼就回夏萊──」"
1004002-122 = "[ns9]「……月夜，會不會其實在那邊？」\n[ns10]「該不會，又變裝成樹木……？」"
1004002-125 = "[ns]「……」"
1004002-127 = "（這之後為了以防萬一，花了約10分鐘確認月夜還在不在，之後才回到了夏萊）"

[translation]
1004002-1 = "#title;어, 어엿한 닌자가 되고 싶어요!"
1004002-2 = "#na;(약속 시각에 맞춰 사전에 츠쿠요와 만나기로 한 장소에 도착했지만…….)"
1004002-3 = "#na;(어째서인지 약속 시각이 지나도록 츠쿠요는 나타나지 않았다.)"
1004002-4 = "[ns] \"혹시 츠쿠요. 어딘가 몸이 아프기라도 한 건……\""
1004002-5 = "#na;???;서, 선생니이임……."
1004002-6 = "#st;[0,0];instant;1;"
1004002-7 = "#clearST"
1004002-8 = "#zmc;move;-316,0;2528;1000\n#wait;1500"

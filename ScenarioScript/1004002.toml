[translation]
1004002-1 = "I-I Want to Be an Official Ninja!"
1004002-2 = "I got to the meeting place on time for Tsukuyo, but..."
1004002-3 = "For some reason, Tsukuyo was really late."
1004002-4 = "[ns] \"I hope she's okay...\""
1004002-5 = "S-Sensei..."
1004002-10 = "I-I'm here...!"
1004002-16 = "[ns] \"T-Tsukuyo?!\""
1004002-18 = "H-Hello... I'm sorry I made you wait..."
1004002-19 = "I-I know I asked you to see me...but I got so nervous about actually going out...I started to get really anxious."
1004002-20 = "I didn't think I deserved to ask for your time... I'm really tall and big, you know?"
1004002-21 = "Y-You were so nice agreeing to meet with me...but do you really want to stand next to a big old giant?"
1004002-22 = "These thoughts made me want to hide."
1004002-23 = "So I disguised myself as a tree...and hid... I-I'm sorry!"
1004002-24 = "[s] \"I'd never feel like that. Please don't worry.\""
1004002-25 = "R-Really...?"
1004002-26 = "[s] \"So, what is it you needed my advice on, Tsukuyo?\""
1004002-27 = "W-Well! So...about that..."
1004002-28 = "I really want to be a full-fledged ninja! I...I was hoping you could help me become one."
1004002-29 = "People say the Schale Sensei is amazing..."
1004002-30 = "So I thought...maybe with your help, I could become a great ninja!"
1004002-31 = "[s1] \"A great, full-fledged ninja?\"\n[s2] \"Why do you want to become a ninja like that, Tsukuyo?\""
1004002-32 = "Oh! R-Right...! It must seem ridiculous for a girl like me to want to become a ninja..."
1004002-33 = "Oh! R-Right...! It must seem ridiculous for a girl like me to want to become a ninja..."
1004002-34 = "Y-You... You're just curious why?"
1004002-35 = "Oh, in that case, the reason...the reason is..."
1004002-36 = "W-Well...if I become a great ninja, I can help my friends in the Ninjutsu Research Club more."
1004002-37 = "Right...! I want to become a great ninja so I can help people."
1004002-38 = "Th-That's why!"
1004002-39 = "Does... Does that sound ridiculous?"
1004002-40 = "[s] \"Not at all. I'm not well-versed in ninjas, but let's do this!\""
1004002-46 = "Wow! Th-Thank you!"
1004002-48 = "I-I'll do anything to become a great ninja, Sensei! Wh-Where should we start?"
1004002-49 = "[s3] \"First, it's important to take advantage of what you're already good at.\"\n[s4] \"You should train yourself step-by-step, starting in an area you're more confident in.\""
1004002-54 = "Hm! I see!"
1004002-55 = "Something I'm already good at... Do that first..."
1004002-56 = "Train myself step-by-step... Hmm, right..."
1004002-57 = "Sensei... That makes total sense to me!"
1004002-58 = "That was so wise and helpful...like an old proverb! I want to write it down..."
1004002-59 = "[s] \"R-Really...? Anyway, what are you most confident about?\""
1004002-60 = "H-Huh? Oh, so...I'm the most confident about..."
1004002-61 = "Oh! I do have one thing!"
1004002-62 = "I-I'm really good at disguising myself as a tree!"
1004002-63 = "[s5] \"Oh, your camouflage skills are incredible indeed.\"\n[s6] \"I had no idea you got here first earlier.\""
1004002-64 = "Really...?!"
1004002-65 = "Really...?!"
1004002-66 = "Heehee! Wow! Hearing that from you makes me really happy!"
1004002-67 = "Disguising myself as a tree is something I've been practicing ever since I was a little girl!"
1004002-68 = "I was always a tall kid in school, so I got the tree part in plays a lot!"
1004002-69 = "So I'm super comfortable and confident with being a tree!"
1004002-70 = "I was so good at it, my nickname was the Hyakkiyako Junior Tree back in the day!"
1004002-71 = "That's enough talk... I can show it to you right now!"
1004002-72 = "[s] \"H-Huh? Now? Here?\""
1004002-73 = "Yes! Please give me a minute. First..!"
1004002-74 = "I'll do this here...like this..."
1004002-75 = "Place this branch...right here..."
1004002-76 = "Phew... Now I'm ready..."
1004002-77 = "Now, I, Ono Tsukuyo...will show you my best skill!"
1004002-78 = "It's my secret specialty!"
1004002-79 = "Hiyaaaaaa!"
1004002-84 = "D-Do I seem like a tree, Sensei?"
1004002-90 = "[ns7] \"A-Amazing! This is a miracle!\"\n[ns8] \"This must be what becoming one with nature looks like!\""
1004002-94 = "So, that was my disguise demonstration!"
1004002-95 = "H-How was it? Was it okay? I-Is there anything I can improve?"
1004002-96 = "[s] \"I-It was incredible, Tsukuyo! I couldn't see you at all!\""
1004002-97 = "Hee...heehee...heeheehee... Thanks for the compliment..."
1004002-98 = "Thanks to you...I think I've gained a little confidence!"
1004002-99 = "This is my forte... If I can master the tree disguise..."
1004002-100 = "I'll be able to become a full-fledged ninja!"
1004002-101 = "[s] \"I believe in you, Tsukuyo! You're a great ninja!\""
1004002-102 = "Th-Thank you for your advice, Sensei!"
1004002-103 = "I won't give up!"
1004002-106 = "..."
1004002-107 = "...Oh, a-actually..."
1004002-108 = "I messed up, Sensei."
1004002-109 = "A real ninja would have retreated and hid their enthusiasm... I'm bad at this..."
1004002-110 = "That doesn't matter? I still did great?"
1004002-111 = "O-Okay! I'll take my leave then, before it's too late!"
1004002-112 = "Heeheehee. Hiyah!"
1004002-117 = "[ns] \"Oh... Okay, bye, Tsukuyo.\""
1004002-119 = "[ns] \"Hmm... I guess I'll be on my way.\""
1004002-122 = "[ns9] \"...Um, Tsukuyo. Did you really leave?\"\n[ns10] \"Are you...disguised as a tree again...?\""
1004002-125 = "[ns] \"...\""
1004002-127 = "After that, I stood around the area for about ten minutes just in case. Then I returned to Schale, still feeling a little suspicious."

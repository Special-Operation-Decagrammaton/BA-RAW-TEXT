1004002-94 = "3;츠쿠요;02;이상! 츠쿠요의 변장술! 여, 여기까지입니다!"
1004002-95 = "3;츠쿠요;02;어, 어떠셨나요? 괘, 괜찮았나요? 저, 선생님이 보시기에, 부, 부족하지는 않았나요?\n#3;stiff\n#3;em;[땀]"
1004002-96 = "[s] \"괴, 굉장해! 츠쿠요……! 어디 숨었는지 전혀 찾을 수가 없었어……!\""
1004002-97 = "3;츠쿠요;03;에, 에헤…… 에헤헷……. 그, 그렇게 칭찬해 주시니까………\n#3;em;[///]\n#3;stiff"
1004002-98 = "3;츠쿠요;03;덕분에 저……. 조, 조금은 자신감이 생긴 것 같아요!"
1004002-99 = "3;츠쿠요;99;이대로 제가 제일로 잘할 수 있는…… 이 나무 변장술을 연마할 수만 있다면……!\n#3;em;…"
1004002-100 = "3;츠쿠요;05;이런 저라도 어엿한 닌자가 될 수 있는 거로군요!"
1004002-101 = "[s] \"응, 츠쿠요라면 가능해! 진짜 대단했으니까! 정말로!\""
1004002-102 = "3;츠쿠요;02;사, 상담……! 감사합니다! 선생님! 앞으로도-"
1004002-103 = "3;츠쿠요;03;저! 열심히 노력할게요!\n#3;em;[반짝]\n#3;closeup\n#3;hophop"

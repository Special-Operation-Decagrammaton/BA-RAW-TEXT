1004002-15 = "#zmc;instant;632,0;1896\n3;츠쿠요;01\n#3;a\n#3;closeup\n#3;greeting\n#wait;1500"
1004002-16 = "#zmc;instant;632,0;1896\n[ns] \"츠, 츠쿠요……?!\""
1004002-17 = "#all;hide"
1004002-18 = "3;츠쿠요;02;아, 안녕하세요오……. 기, 기다리시게 해서 죄, 죄송합니다아…….\n#3;em;…\n#3;a"
1004002-19 = "3;츠쿠요;03;그, 그게, 선생님께 사, 상담 요청은 드렸지만……… 막상 선생님을 뵌다고 새, 생각하니까아. 그 순간…… 가슴이 마구 두근거리기 시작해서……."
1004002-20 = "3;츠쿠요;01;저같이 덩치만 커다란 애가- 그, 선생님을 만나도 되는 걸까-하는 생각을 하니까아…….\n#3;em;[속상함]\n#3;stiff"
1004002-21 = "3;츠쿠요;06;선생님께선 흐, 흔쾌히 상담해 주시겠다고 말씀해 주셨지만, 여, 역시…… 저같이 커다란 애가 옆에 있으면, 그, 서, 선생님의 기분이 상하시지는 않을까 하여……."
1004002-22 = "3;츠쿠요;07;그런 생각까지 해버리니 저도 모르게 숨고 싶어져서……."
1004002-23 = "3;츠쿠요;99;계속, 나무로 변장해서 수, 숨어 있었습니다아…… 죄, 죄송해요오……!\n#3;stiff\n#3;em;[땀]"
1004002-24 = "[s] \"아니, 결코 그런 생각 안 하니까. 걱정하지 마.\""
1004002-25 = "3;츠쿠요;02;아, 네, 그, 그러신가요……?\n#3;em;…"
1004002-26 = "[s] \"그래서 오늘 츠쿠요가 상담하고 싶다던 건 뭐야?\""
1004002-27 = "3;츠쿠요;02;아! 그, 그게 말이지요……\n#3;em;[반응]"
1004002-28 = "3;츠쿠요;05;저! 후, 훌륭하고- 그, 어엿한 닌자가 되고 싶어서! 그 부분을, 선생님께 도움을 받고 싶어요!\n#3;em;[!]"
1004002-29 = "3;츠쿠요;05;샬레의 선생님께서는 그게……. 어, 엄청 대단하신 분이라고 들어서……."
1004002-30 = "3;츠쿠요;01;저 같은 애도 대, 대단하신 선생님이 도와주신다면 그, 그런 한 사람의 닌자가 될 수 있지 않을까- 하고 생각해서……!\n#3;em;…"
1004002-31 = "[s1] \"후, 훌륭하고 어엿한 닌자……?\"\n[s2] \"으음, 츠쿠요는 어째서 그런 닌자가 되고 싶은 거야……?\""
1004002-32 = "3;츠쿠요;07;아! 그, 그렇죠……! 저, 저 같은 애가 갑자기 닌자가 되고 싶다고 해도 고, 곤란하시겠죠오…….\n#3;stiff"
1004002-33 = "3;츠쿠요;07;아! 그, 그렇죠……! 저, 저 같은 애가 갑자기 닌자가 되고 싶다고 해도 고, 곤란하시겠죠오…….\n#3;stiff"
1004002-34 = "3;츠쿠요;02;네? 그, 그런 의미가 아니라……. 그냥 이유가 궁금하시, 다고요……?\n#3;em;[반응]"
1004002-35 = "3;츠쿠요;99;아, 그, 그런 거라면, 이유……. 이유, 이유가, 그게……."
1004002-36 = "3;츠쿠요;07;저는 그러니까……! 그, 그거예요! 훌륭한 닌자가 될 수만 있다면, 지, 지금 하는 인법연구부 활동에서도 좀 더 어엿하게, 그, 한 사람 몫을 할 수 있지 않을까……. 해서."
1004002-37 = "3;츠쿠요;04;네! 저, 닌자가 되어, 모, 모두의 도움이 되고 싶다고 새, 생각하고 있습니다앗!\n#3;hophop"
1004002-38 = "3;츠쿠요;05;그래서 전, 훌륭하고 어엿한 닌자가 되고 싶어요……!\n#3;em;[반짝]"
1004002-39 = "3;츠쿠요;06;아, 무, 물론 ……여, 여억시…… 갑자기 이런 말을 들으셔도, 고, 곤란하……. 하시겠죠오오……?"
1004002-40 = "[s] \"괜찮아. 힘이 될지는 모르겠지만. 최대한 협조할게.\""
1004002-41 = "#st;[0,0];instant;1;"
1004002-42 = "#clearST"
1004002-43 = "3;츠쿠요;01\n#wait;2500\n#3;em;…"
1004002-44 = "3;츠쿠요;01\n#3;d\n#wait;700"
1004002-45 = "3;츠쿠요;03\n#3;a\n#wait;1000"
1004002-46 = "3;츠쿠요;03;네, 넵! 가, 감사합니댜앗!\n#3;greeting\n#3;em;[반짝]"
1004002-47 = "#all;hide"
1004002-48 = "3;츠쿠요;05;뭐, 뭐든 열심히 할게요! 선생님! 훌륭한 닌자가 되기 위해선, 뭐, 뭐부터 하면 좋을까요?!\n#3;a\n#3;em;[반응]"
1004002-49 = "[s3] \"역시 중요한 건 착실하게 츠쿠요가 제일 잘할 수 있는 것부터.\"\n[s4] \"제일 자신 있는 것부터 차근차근 단련해 나가는 거라고 생각해.\""
1004002-50 = "#st;[0,0];instant;1;"
1004002-51 = "#st;[0,0];instant;1;"
1004002-52 = "#clearST"
1004002-53 = "3;츠쿠요;01\n#3;greeting\n#wait;1000"
1004002-54 = "3;츠쿠요;02;과, 과연! 주, 중요한 것……. 그건…….\n#3;em;…"
1004002-55 = "3;츠쿠요;01;제가 제일 잘할 수 있는 것……. 제일 자신 있는 것부터……."
1004002-56 = "3;츠쿠요;99;착실하게, 차근차근……. 흐음. 흐음. 그렇군요…….\n#3;greeting"
1004002-57 = "3;츠쿠요;05;과, 과연 샬레의 선생님……. 마, 말 한마디, 한마디에 담겨 있는 무, 무게감이 달라요!\n#3;em;[반응]"
1004002-58 = "3;츠쿠요;05;말씀하시는 건 전부, 피와 살이 되는 격언……! 하, 하나도 놓치지 않고 전부 기록을 해야…….\n#3;hophop"
1004002-59 = "[s] \"그, 그래……? 어쨌거나 츠쿠요가 제일 자신 있어 하는 건 뭐야?\""
1004002-60 = "3;츠쿠요;07;네, 넷?! 아, 아아, 그, 그러니까 제가 제일 자신 있어 하는 것이라면……."
1004002-61 = "3;츠쿠요;03;아! 그런 거라면 확실하게 한 가지 이, 있어요!\n#3;em;[반짝]"
1004002-62 = "3;츠쿠요;03;저- 나, 나무로 변장하는 것만큼은 누구보다 자신 있어요!"
1004002-63 = "[s5] \"아, 확실히 조금 전 츠쿠요의 변장술은 굉장했지.\"\n[s6] \"말을 걸기 전까지 전혀 눈치채지 못했으니까.\""
1004002-64 = "3;츠쿠요;01;앗, 그, 그러신가요……?\n#3;stiff"
1004002-65 = "3;츠쿠요;01;앗, 그, 그러신가요……?\n#3;stiff"
1004002-66 = "3;츠쿠요;03;에, 에헤헷! 서, 선생님이 그렇게 말씀해 주시니 뭐, 뭔가 엄청 기쁘네요!\n#3;em;[///]"
1004002-67 = "3;츠쿠요;03;나무 변장은 어, 어렸을 때부터 단련해온 그, 저, 저만의 특기예요!"
1004002-68 = "3;츠쿠요;05;저 어릴 때부터 덩치가 이렇게나 크다 보니까. 하, 학예회 같은 곳에서 자주 나무로 분장을 하곤 했거든요!"
1004002-69 = "3;츠쿠요;05;그래서 나무가 되는 건 엄청 익숙하고- 또 엄청 자신 있어서……!\n#3;em;…"
1004002-70 = "3;츠쿠요;03;오죽하면 어렸을 때 제 별명이 <백귀야행 신목 주니어>였을 정도니까요!"
1004002-71 = "3;츠쿠요;02;앗! 말로만 할 게 아니라, 한 번 더…… 이 자리에서 바로 보여드릴게요!\n#3;em;[반응]"
1004002-72 = "[s] \"으, 응? 바로? 이 자리에서?\""
1004002-73 = "3;츠쿠요;02;네, 잠시만 기다려주세요! 일단……!"
1004002-74 = "3;츠쿠요;01;여기서 여기는 이렇게 하고…… 또 여긴 이렇게…….\n#3;greeting"
1004002-75 = "3;츠쿠요;05;이 나뭇가지는 이렇게 해서……. 여기에 배치하면…….\n#3;greeting"
1004002-76 = "3;츠쿠요;99;후우……. 이걸로 준비는 전부 완료…….\n#3;em;[땀]\n#3;stiff"
1004002-77 = "3;츠쿠요;02;그럼 지금부터 저 오노 츠쿠요…… 선생님께 제가 제일로 잘할 수 있는……."
1004002-78 = "3;츠쿠요;05;제일 자신 있는 비장의 특기를 보여드리겠습니다앗……!\n#3;em;[!]"

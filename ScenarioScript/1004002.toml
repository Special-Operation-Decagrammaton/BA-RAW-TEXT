[translation]
1004002-1 = "ยะ... อยากเป็นนินจาที่องอาจค่ะ!"
1004002-2 = "(คุณครูมาถึงสถานที่นัดพบกับสึคุโยะตามที่สัญญาเอาไว้แล้ว...)"
1004002-3 = "(แต่ว่าถึงจะเลยเวลานัดไปแล้วสึคุโยะก็ยังไม่มา...)"
1004002-4 = "[ns] \"สึคุโยะไม่สบายตรงไหนรึเปล่านะ...\""
1004002-5 = "คะ... คุณครูคะ..."
1004002-10 = "ฉะ...ฉัน ยะ...อยู่ตรงนี้ค่ะ..."
1004002-16 = "[ns] \"สะ...สึคุโยะ...?!\""
1004002-18 = "สะ...สวัสดีค่ะ... ขะ...ขอโทษที่ทำให้รอนะคะ"
1004002-19 = "ฉะ...ฉันส่งข้อความไปว่าอยากขอคำปรึกษาจากคุณครูก็จริง... ตะ...แต่ว่าพอคิดว่าจะได้พบกับคุณครู#nแล้ว... ตะ...ตอนนั้นจู่ๆ หัวใจก็เต้นแรงอย่างบ้าคลั่งขึ้นมา..."
1004002-20 = "จะ...จู่ๆ ก็คิดว่าเด็กตัวโตอย่างฉัน... สะ...สมควรมาพบกับคุณครูได้จริงๆ เหรอ..."
1004002-21 = "ถึงคุณครูจะบอกว่ายินดีที่จะให้คำปรึกษาก็เถอะค่ะ ตะ...แต่ว่าถ้ามีเด็กตัวโตอย่างฉันมะ...มาอยู่ใกล้ๆ คุณครู ฉะ...ฉันกลัวว่าคุณครูจะรู้สึกไม่ดี..."
1004002-22 = "พอคิดแบบนั้นจู่ๆ ฉันก็อยากหนีไปซ่อน..."
1004002-23 = "ฉะ...ฉันก็เลยแปลงเป็นต้นไม้ละ...แล้วไปซ่อนตัวอยู่ค่ะ... ขะ...ขอโทษด้วยนะคะ...!"
1004002-24 = "[s] \"เดี๋ยวสิ ครูไม่ได้คิดแบบนั้นเลย ไม่ต้องกังวลหรอก\""
1004002-25 = "ยะ... อย่างนั้นเหรอคะ...?"
1004002-26 = "[s] \"แล้ววันนี้สึคุโยะอยากปรึกษาเรื่องอะไรเหรอ?\""
1004002-27 = "อ๊ะ! คะ...คือว่าเรื่องนั้น..."
1004002-28 = "คือ... ฉะ...ฉันอยากจะเป็นนินจาผู้ยิ่งใหญ่ละ...และองอาจค่ะ! ละ...เลยอยากให้คุณครูช่วยในเรื่องนั้นค่ะ!"
1004002-29 = "ฉะ...ฉันได้ยินมาว่าคุณครูของทางชาเล่ต์... ปะ...เป็นบุคคลที่ยอดเยี่ยมมาก..."
1004002-30 = "ถะ...ถ้าคุณครูที่ยอดเยี่ยมเช่นนั้นมาช่วยเด็กอย่างฉัน... ละ...เลยคิดว่าก็อาจจะช่วยให้คนอย่างฉันกลาย#nเป็นนินจาก็ได้ค่ะ...!"
1004002-31 = "[s1] \"นินจาผู้ยิ่งใหญ่และองอาจ...?\"\n[s2] \"อืม ทำไมสึคุโยะถึงอยากเป็นนินจาแบบนั้นเหรอ...?\""
1004002-32 = "อา... นะ...นั่นสิคะ...! จะ...จู่ๆ เด็กอย่างฉันมาบอกว่าอยากเป็นนินจา มะ...มันคงจะยากสินะคะ..."
1004002-33 = "อา... นะ...นั่นสิคะ...! จะ...จู่ๆ เด็กอย่างฉันมาบอกว่าอยากเป็นนินจา มะ...มันคงจะยากสินะคะ..."
1004002-34 = "คะ? คุณครูไม่ได้หมายความว่าแบบนั้น... แต่แค่อยากรู้เหตุผลเท่านั้นเหรอคะ...?"
1004002-35 = "อา... ถ้าเรื่องนั้น... เหตุผล... เพราะว่า... คือว่า..."
1004002-36 = "คือว่าฉัน...! ฉะ...ฉันคิดว่าถ้าเป็นนินจาผู้ยิ่งใหญ่ได้ กะ...ก็คงจะทำหน้าที่ในชมรมวิจัยศาสตร์นินจา#nกับทุกๆ คนได้ดีขึ้นน่ะค่ะ..."
1004002-37 = "ค่ะ ฉะ...ฉันอยากจะเป็นนินจา...ละ...แล้วช่วยเหลือทุกๆ คนค่ะ!"
1004002-38 = "เพราะงั้นฉันก็เลย... อยากเป็นนินจาที่ยิ่งใหญ่และองอาจค่ะ...!"
1004002-39 = "อา... คะ...คิดแล้วเชียว... จะ...จู่ๆ ต้องมาฟังเรื่องอะไรแบบนี้... คะ...คุณครูคงลำบากใจสินะคะ...?"
1004002-40 = "[s] \"ไม่เป็นไร ครูไม่แน่ใจว่าจะช่วยได้รึเปล่า แต่จะช่วยเต็มที่เลยนะ\""
1004002-46 = "คะ...ค่ะ! ขะ...ขอบคุณค่ะ!"
1004002-48 = "ฉะ...ฉันจะตั้งใจทำให้ดีที่สุดค่ะคุณครู! พะ...เพื่อการเป็นนินจาผู้ยิ่งใหญ่ค่ะ จะ...จะเริ่มจากอะไรก่อนดีคะ?!"
1004002-49 = "[s3] \"เริ่มจากสิ่งที่สึคุโยะทำได้ดีที่สุดก่อน\"\n[s4] \"เริ่มจากสิ่งที่สึคุโยะมั่นใจมากที่สุด แล้วค่อยๆ ไปทีละขั้นดีกว่า\""
1004002-54 = "ระ...เรื่องที่ทำได้ดีที่สุด... เรื่องนั้น..."
1004002-55 = "สิ่งที่ฉันทำได้ดีที่สุด... เริ่มจากสิ่งที่มั่นใจที่สุด..."
1004002-56 = "อย่างจริงจัง และมั่นใจ... อืม... งะ...งั้นเหรอคะ"
1004002-57 = "วะ...ว่าแล้วเชียวคุณครูของทางชาเล่ต์... คะ...แค่คำพูดคำเดียวกะ...กลับมีน้ำหนักและความน่าเชื่อถือ#nต่างกันเลยนะคะ!"
1004002-58 = "สะ...สิ่งที่คุณครูพูดมาทั้งหมด ฉะ...ฉันจะต้องสลักเอาไว้ในเลือดเนื้อ มะ...ไม่ให้ลืมไปแม้แต่เรื่องเดียว..."
1004002-59 = "[s] \"งะ...งั้นเหรอ...? ว่าแต่สึคุโยะมั่นใจเรื่องอะไรที่สุดล่ะ?\""
1004002-60 = "คะ...ค่ะ? อ๊ะ อา... คะ...คือว่าถ้าเป็นเรื่องที่ฉันมั่นใจมากที่สุด..."
1004002-61 = "อ๊ะ! ถ้าเรื่องนั้นละก็ ฉันมีเรื่องที่มั่นใจ ยะ...อยู่เรื่องหนึ่งค่ะ!"
1004002-62 = "ฉัน... มะ...มั่นใจ วะ...ว่าแปลงเป็นต้นไม้ได้ดีกว่าใครๆ แน่ค่ะ!"
1004002-63 = "[s5] \"จริงสินะ เมื่อกี้สึคุโยะปลอมตัวได้ยอดเยี่ยมสุดๆ เลย\"\n[s6] \"ก่อนที่สึคุโยะจะเรียก ครูไม่ทันสังเกตเลย\""
1004002-64 = "อ๊ะ... จะ...จริงเหรอคะ...?"
1004002-65 = "อ๊ะ... จะ...จริงเหรอคะ...?"
1004002-66 = "แหะๆๆ... คะ...คุณครูพูดแบบนี้ ฉะ...ฉันรู้สึกดีใจมากๆ เลยค่ะ!"
1004002-67 = "การแปลงเป็นต้นไม้... ปะ...เป็นทักษะพิเศษที่ฉันฝึกมาตั้งแต่เด็กค่ะ!"
1004002-68 = "ฉะ...ฉันเป็นเด็กรูปร่างใหญ่ตั้งแต่เด็ก นะ...ในงานแสดงนิทรรศการหรืองานแสดงของโรงเรียน ฉะ...ฉันมักได้รับบทให้เป็นต้นไม้อยู่บ่อยๆ ค่ะ!"
1004002-69 = "เพราะงั้นฉันเลยชินกับการแปลงเป็นต้นไม้... ละ...แล้วก็มั่นใจมากๆ...!"
1004002-70 = "ถะ...ถึงขนาดได้ฉายาว่า <ตะ...ต้นไม้เดินได้แห่งเฮียกคิยาโค> เลยนะคะ!"
1004002-71 = "อ๊ะ พะ...พูดอย่างเดียวคงไม่น่าเชื่อเท่าไร งะ...งั้นฉันจะแปลงเป็นต้นไม้ให้ดูอีกครั้งหนึ่งค่ะ! "
1004002-72 = "[s] \"หืม? ที่นี่? ตรงนี้เลยเหรอ?\""
1004002-73 = "ค่ะ ระ...รบกวนรอสักครู่นะคะ! "
1004002-74 = "กะ...ก่อนอื่น ตรงนี้ต้องทำแบบนี้... แล้วก็ทำแบบนี้..."
1004002-75 = "กะ...กิ่งไม้นี้ต้องทำแบบนี้... พอเอาไปวางตรงนี้แล้วก็..."
1004002-76 = "ฮู่วว... เท่านี้ก็เตรียมเสร็จแล้วค่ะ..."
1004002-77 = "ถะ...ถ้างั้นตอนนี้ฉัน... โอโนะ สึคุโยะ... จะแสดงสิ่งที่ทำได้ดีที่สุดให้คุณครู..."
1004002-78 = "จะ...จะแสดงความสามารถพิเศษของฉันที่แอบซ่อนไว้ให้คุณครูได้เห็นค่ะ...!"
1004002-79 = "ย้าาา!"
1004002-84 = "เป็นยังไงบ้างคะ... คุณครู?"
1004002-90 = "[ns7] \"สะ...สุดยอดเลย?!\"\n[ns8] \"นี่ใช่วิชารวมเป็นหนึ่งกับธรรมชาติที่เคยได้ยินมารึเปล่าเนี่ย?!\""
1004002-94 = "จบแล้วค่ะ! วิชาแปลงกายของสึคุโยะ... ขะ...ขอจบการสาธิตเพียงเท่านี้ค่ะ!"
1004002-95 = "ปะ...เป็นยังไงบ้างคะ? พะ...พอใช้ได้รึเปล่าคะ? คะ...คุณครูเห็นว่ามียังมีข้อบกพร่องอะไรอีกมั้ยคะ...?"
1004002-96 = "[s] \"สุดยอดเลย สึคุโยะ...! เมื่อกี้ซ่อนอยู่ตรงไหนครูหาไม่เจอเลย...!\""
1004002-97 = "อ่ะแหะๆๆ... แหะๆ... ขะ...ขอบคุณที่ชมค่ะ..."
1004002-98 = "คะ...คุณครูพูดแบบนั้น... ทะ...ทำให้ฉันรู้สึกมั่นใจ... ขะ...ขึ้นมาอีกนิดหน่อยแล้วค่ะ!"
1004002-99 = "ถะ...ถ้าขัดเกลาวิชาแปลงกายเป็นต้นไม้... วะ...วิชาที่ฉันถนัดที่สุดได้ละก็...!"
1004002-100 = "แม้แต่ฉันก็คงจะกลายเป็นนินจาผู้ยิ่งใหญ่ได้แน่ค่ะ!"
1004002-101 = "[s] \"อื้อ ถ้าเป็นสึคุโยะละก็ทำได้แน่! ครูพูดจริงนะ สุดยอดมากเลย!\""
1004002-102 = "ขะ...ขอบคุณค่ะ... คุณครู! ทะ...ที่ให้คำปรึกษากับฉัน... ตะ...ต่อไป..."
1004002-103 = "ฉันก็จะพยายามให้มากขึ้นค่ะ!"
1004002-106 = "..."
1004002-107 = "อา... คะ...คือว่า..."
1004002-108 = "ขะ... ขอโทษค่ะ... คุณครู..."
1004002-109 = "ถะ...ถ้าเป็นนินจาละก็... มะ...เมื่อกี้พอถึงเวลาที่ต้องไป...กะ...ก็ควรจะต้องไปให้ถูกเวลาใช่มั้ยล่ะคะ ตะ...แต่ว่าฉันหัวช้าก็เลย..."
1004002-110 = "มะ...ไม่ต้องคิดมากเหรอคะ? ขะ...เข้าใจแล้วค่ะ!"
1004002-111 = "ถ้างั้นคราวนี้ฉันขอตัวก่อนนะคะ!"
1004002-112 = "แหะๆ... ย้า!"
1004002-117 = "[ns] \"อา... กลับดีๆ นะ สึคุโยะ\""
1004002-119 = "[ns] \"อืม... ถ้างั้นเราก็กลับบ้างดีกว่า\""
1004002-122 = "[ns9] \"คือว่า... สึคุโยะกลับไปแล้วใช่มั้ยนะ...?\"\n[ns10] \"คือ... คงไม่ได้แปลงร่างเป็นต้นไม้อยู่แถวนี้หรอกใช่มั้ย...?\""
1004002-125 = "[ns] \"....\""
1004002-127 = "(หลังจากนั้นคุณครูก็ยืนอยู่ตรงนั้นอีกเกือบสิบนาทีจนแน่ใจว่าสึคุโยะไม่อยู่แล้ว ก่อนจะกลับมาที่ชาเล่ต์ด้วยความรู้สึกที่ค้างคาใจ)"

[translation]
10000070-1 = "ตอนที่ 7;แผนร้ายชี้ขาด"
10000070-3 = "พวกนั้นพาคุณครูมาที่นี่อย่างนั้นเหรอ......"
10000070-4 = "หรือว่าผู้ว่าจ้างจะ...?"
10000070-7 = "(เสียงคนคุยกันนี่นา!!)"
10000070-8 = "ฉันมั่นใจว่าต้องเป็นทางนี้ ต้องหลบบนหลังคา จะได้ไม่โดนจับได้..."
10000070-16 = "เสียงคนคุยกันมาจากข้างล่างนี้แน่ๆ..."
10000070-18 = "บอส! ฉันพาตัวมาตามคำสั่งแล้ว!"
10000070-19 = "พามาแล้วค่ะ!"
10000070-20 = "ดีมากเจ้าปีศาจ ทำภารกิจเร็วดีนะ"
10000070-21 = "(นั่นมันพวกปีศาจและผู้ว่าจ้าง... แล้วก็คุณครู!!)"
10000070-23 = "ยินดีที่ได้พบนะ ครูที่ปรึกษาจากชาเล่ต์"
10000070-28 = "[ns] \"...ประธานกลุ่มการค้าเนียนเต็นมารุ?\""
10000070-30 = "ฮึ่ม! ฉันไม่ใช่เนียนเต็นมารุนะ!"
10000070-31 = "ฉันชื่อมาซามุเนะ..."
10000070-32 = "มังกรตาเดียวในซอย! เนียนเต มาซามุเนะ!"
10000070-33 = "(ตึงงง!)"
10000070-34 = "(...)"
10000070-36 = "ฮึ่ม... ได้ยินมาว่ามีคนมีฝีมือเข้ามาแทรกแซงแผนการของฉัน... หึหึ... ก็สงสัยว่าคือใคร..."
10000070-37 = "คุณครูจากชาเล่ต์นี่เองสินะ?"
10000070-38 = "เราเคยเจอกันในร้านเฮียกคิยาโคใช่ไหม?"
10000070-39 = "[s1] \"น่าจะเคยนะ ไม่รู้สิ\"\n[s2] \"จำไม่ได้แฮะ\""
10000070-40 = "หึหึหึ! ตอบอย่างไม่เกรงกลัวอะไรในสถานการณ์แบบนี้ แสดงว่าเตรียมตัวมาแล้วล่ะสิ?"
10000070-41 = "หึหึหึ! ตอบอย่างไม่เกรงกลัวอะไรในสถานการณ์แบบนี้ แสดงว่าเตรียมตัวมาแล้วล่ะสิ?"
10000070-42 = "ฉันก็ไม่อยากทำให้ครูต้องลำบากหรอกนะ แต่ก็ช่วยไม่ได้..."
10000070-44 = "[s] \"โทรศัพท์...\""
10000070-45 = "ฉันเป็นพวกชอบระวังตัวเองน่ะสิ ขอยึดเอาไว้ก่อนแล้วกัน"
10000070-46 = "เอาล่ะ แบบนี้ครูก็ขอความช่วยเหลือจากคนอื่นไม่ได้แล้วล่ะนะ"
10000070-47 = "ต่อให้ร้องเรียกจนเจ็บคอ พวกชมรมเทศกาลก็ไม่มาหรอก ตอนนี้ครูหัวเดียวกระเทียมลีบแล้ว"
10000070-48 = "ทีนี้เข้าใจหรือยังล่ะว่าควรจะเกรงกลัวกันได้แล้วน่ะ?"
10000070-49 = "[s3] \"...ทำไมถึงทำแบบนี้?\"\n[s4] \"ทำลายเทศกาลแล้วมันได้อะไรขึ้นมา?\""
10000070-53 = "[ns] \"หรือว่าเป็นเพราะเรื่องประเพณีของเทศกาล?\""
10000070-54 = "หืม? ว่าไงนะ? ประเพณีเหรอ? หมายถึงการจุดดอกไม้ไฟใช่ไหม?"
10000070-55 = "ฮ่ะฮ่ะฮ่า! พูดอะไรตลกเป็นบ้า!"
10000070-56 = "ที่ฉันพูดไปในร้านเฮียกคิยาโค ก็พูดไปงั้นๆ แหละ"
10000070-57 = "เป้าหมายของฉันไม่มีอะไรมากหรอกนะ"
10000070-58 = "[s] \"เงินเหรอ...?\""
10000070-59 = "รู้ไหมว่าต้องใช้เงินเท่าไหร่ในการจัดเทศกาลแห่งค่ำคืนสีขาวขึ้นมาให้ได้ในแต่ละครั้ง?"
10000070-60 = "แต่ว่าเงินนั้นตกไปอยู่กับชมรมจัดงานเทศกาลหมดเลย ฉันไม่ถูกใจการบริหารแบบนี้"
10000070-61 = "ทุกคนต้อง 'สนุก' กับเทศกาลอย่างนั้นน่ะเหรอ?"
10000070-62 = "พวกนั้นมีสิทธิ์อะไรที่จะเอาเงินมากมายไปถลุงกับอุปกรณ์จากมิลเลเนียม#nเพียงเพราะแค่ 'ความสนุก' อย่างนั้นเหรอ?"
10000070-63 = "เป็นความคิดที่ไม่เอาไหนเอาซะเลย! ถ้าฉันได้จัดการเทศกาลเองล่ะก็#nเทศกาลจะต้องทำเงินได้มากกว่านี้อีก!"
10000070-64 = "[s] \"ก็เลยตั้งใจจะพังเทศกาลงั้นเหรอ?\""
10000070-65 = "ใช่ ฉันก็เลยก่อความวุ่นวายไว้ไง"
10000070-66 = "ถ้าเทศกาลถูกปิดกะทันหัน ชมรมเทศกาลก็ต้องรับผิดชอบในฐานะคณะบริหารงานเทศกาล"
10000070-67 = "แล้วหลังจากนั้นฉันคนนี้จะเป็นคนจัดเทศกาลเอง"
10000070-68 = "[s] \"ก็เลยจ้างอิซุนะให้ทำงานสินะ...\""
10000070-69 = "อิซุนะ... หมายถึงเด็กที่เรียกตัวเองว่านินจาใช่ไหม?"
10000070-70 = "อิซุนะช่วยงานฉันไว้ได้เยอะเลย"
10000070-71 = "ถึงจะไม่ได้ค่าจ้างมากมายอะไรก็เถอะ..."
10000070-72 = "แค่แกล้งทำเล่นนินจาด้วยหน่อยก็ชอบใจแล้วก็ออกไปทำงานให้อย่างมุ่งมั่น"
10000070-73 = "มีเด็กนินจานี่คนเดียวก็เหมือนมีปีศาจมาทำงานให้สิบคนเลยล่ะ"
10000070-74 = "[s] \"เล่นเป็นนินจางั้นเหรอ…?\""
10000070-75 = "ใช่ เล่นเป็นนินจา... ก็แค่แกล้งเล่นกับเด็กที่ยังไม่รู้จักโตน่ะ"
10000070-76 = "เธอบอกว่า 'ออกคำสั่งมาได้ค่ะผู้ว่าจ้าง' ไหนจะประโยคที่ว่า 'เส้นทางของนินจา#nคือกำจัดคนที่ขวางทางเพื่อผู้ว่าจ้าง'"
10000070-77 = "ตอนได้ยินบทพูดของนินจาแบบนั้น ฉันแทบจะกลั้นหัวเราะไม่อยู่เลยล่ะ"
10000070-78 = "แต่ก็ทำได้แค่หัวเราะในใจ แล้วก็เออออไปตามบท"
10000070-79 = "แต่จู่ๆ เธอพูดด้วยความปรารถนาอย่างแรงกล้าว่า 'ฉันจะทุ่มสุดตัวให้สมกับที่เป็นนินจา!'#nจังหวะนั้นแหละ! ฉันเผลอหัวเราะออกมาเลย!"
10000070-80 = "ฉันก็คิดมานานแล้วแต่ไม่ได้บอก คนอะไรจู่ๆ จะมาเป็นนินจา ฮ่ะฮ่ะฮ่าา เพี้ยนไปแล้ว"
10000070-81 = "ความจริงแค่มองจากข้างๆ ก็แทบจะขำแล้วล่ะค่ะ บางวันฉันกลั้นขำจนปวดท้องเลย"
10000070-82 = "ถือว่าเป็นการเล่นต่อบทกับเด็กที่ได้ทั้งงาน และประหยัดเงินด้วย! ฮ่ะฮ่ะฮ่า!"
10000070-83 = "[s] \"แปลว่าหลอกใช้ความฝันของอิซุนะเพื่อประโยชน์ของตัวเองคนเดียวสินะ\""
10000070-84 = "ความฝันเหรอ? พูดอะไรของเธอ?"
10000070-85 = "จะบอกการเล่นนินจาบ้าบออะไรนั่นคือความฝันงั้นเหรอ? สงสัยจะเพี้ยนไปอีกคนแล้ว!"
10000070-87 = "!!\n"
10000070-88 = "(แต่ผู้ว่าจ้างบอกว่า... ให้อิซุนะแสดงฝีมือ... ให้สมกับที่เป็นนินจานี่นา...)"
10000070-89 = "(แต่ว่าทั้งหมดนั่น... เป็นแค่การโกหกเพื่อหลอกอิซุนะ... งั้นเหรอ?)"
10000070-90 = "(อิซุนะถูกหลอกเหมือนคนโง่เลย...!)"
10000070-91 = "ดูจากการพูดจาแล้ว คงรู้แล้วสินะว่าอิซุนะเคลื่อนไหวด้วยคำสั่งของฉัน?"
10000070-92 = "ในเมื่อรู้อยู่แล้วว่าปีศาจกับอิซุนะทำตามคำสั่งของฉัน แต่ก็ยังไปเที่ยวงานเทศกาลกับอิซุนะอีก?#nนี่ยังมีสมองอยู่รึเปล่า?"
10000070-93 = "ความจริงแล้วฉันคิดว่าหากปล่อยอิซุนะไป ก็คงจะได้เจอกับ 'คุณครู' คนนี้ได้#nฉันก็เลยสั่งให้พวกปีศาจไปสะกดรอยตามอิซุนะ แล้วจับตัวครูมายังไงล่ะ"
10000070-94 = "ถึงจะมีอุบายแค่อย่างเดียว แต่ก็มาติดกับได้อย่างเหลือเชื่อเลย อิซุนะช่วยฉันไว้ได้อีกแล้ว! ฮ่ะฮ่ะฮ่า!"
10000070-95 = ".......!!"
10000070-96 = "(คุณครูที่สนับสนุนความฝันของอิซุนะ...!)"
10000070-97 = "(ต้องมาเจออะไรแบบนี้เพราะผู้ว่าจ้างที่หลอกลวง...!)"
10000070-99 = "[ns] \"ฉันอาจจะประมาทไปหน่อยที่ไปเจออิซุนะ\""
10000070-100 = "อะไรกัน? ก็รู้ดีอยู่แล้วนี่?"
10000070-101 = "[s] \"แต่นั่นก็ไม่ใช่ความผิดของอิซุนะ\""
10000070-104 = "คะ... คุณครู"
10000070-107 = "[ns] \"เมื่อกี้บอกว่าแกล้งเล่นนินจากับเด็กไม่รู้จักโตใช่ไหม?\""
10000070-108 = "ก็ใช่น่ะสิ แกล้งเล่นกับเด็กไปขำๆ เท่านั้นแหละ"
10000070-109 = "แล้วมันเป็นปัญหายังไงไม่ทราบ?"
10000070-110 = "[s] \"เข้าใจอะไรผิดแล้วล่ะ นินจาน่ะ...\""
10000070-116 = "[ns5] \"มันเจ๋งดีออก!!\"\n[ns6] \"มันโรแมนติกดีออก!!\""
10000070-117 = "!!"
10000070-118 = "!!"
10000070-120 = "...... (อ้าปากค้าง)"
10000070-121 = "หะ... หืม?"
10000070-122 = "ระ.. โรแมนติก? แปลว่าอะไรเหรอคะ?"
10000070-123 = "ว่าไงนะ? โรแมนติก...?"
10000070-124 = "[s7] \"การเล่นบ้าบอที่ไม่รู้จักโตเหรอ? แล้วมันเป็นปัญหาตรงไหนล่ะ?\"\n[s8] \"ยังไงมันก็เท่ไม่ใช่เหรอ!\""
10000070-125 = "เฮ้ออ..."
10000070-126 = "เฮ้ออ..."
10000070-127 = "อะฮ่ะฮ่ะฮ่า! ยิ่งคุยด้วยยิ่งเพี้ยน!"
10000070-128 = "เป็นถึงครูจากชาเล่ต์ คิดว่าเราจะคุยกันรู้เรื่องเสียอีก"
10000070-129 = "ฉันจะไม่โน้มน้าวอะไรแล้ว หยุดพูดอะไรเพ้อเจ้อเสียที!"
10000070-130 = "คนที่ขัดขวางเป้าหมายของฉันต้องไม่มีทางรอดไปได้ แม้จะเป็นคุณครูจากชาเล่ต์ก็เถอะ!#nปีศาจ! จัดการเลย!"
10000070-131 = "ค่ะบอส! ย้ากกก!"
10000070-140 = "หืม?! อยู่ๆ เพดานก็ถล่มเหรอ?! นี่มันเรื่องอะไรกัน?!"
10000070-141 = "แค่กๆ กะ.. เกิดอะไรคะเนี่ย?! บอส?!"
10000070-142 = "ตะ.. ตกใจหมดเลย!"
10000070-144 = "นินนิน! อิซุนะผู้เดินทางสายนินจา! เพื่อเป้าหมายสูงสุด!"
10000070-145 = "ปรากฏตัวที่นี่อย่างสง่างาม!"
10000070-146 = "[s] \"อิซุนะ!\""
10000070-147 = "อิซุนะ?! ทำไมถึงโผล่ออกมากจากเพดานได้ล่ะ?!"
10000070-148 = "อิซุนะได้ยินเรื่องทั้งหมดแล้วค่ะ"
10000070-149 = "แล้วก็ได้ยินเสียงคุณครู... ที่สนับสนุนความฝันของอิซุนะจนถึงที่สุด!"
10000070-150 = "อิซุนะก็เลยรู้แล้วล่ะค่ะ!"
10000070-153 = "หากอิซุนะได้อยู่ข้างๆ คุณครู ความฝันของอิซุนะก็จะเป็นจริงได้สักวัน!"
10000070-154 = "ว่าไงนะ?!"
10000070-155 = "คุณครู..."
10000070-156 = "ไม่สิ ต้องเรียกว่า... นายท่านของอิซุนะ!"
10000070-157 = "[s] \"...หืม? นายท่านเหรอ?!\""
10000070-159 = "จากนี้ไปอิซุนะจะต่อสู้เคียงข้างนายท่านเองค่ะ! นินนิน!"

[translation]
10000070-1 = "Episode 7;Crushing Schemes"
10000070-3 = "This is where I saw them take Sensei..."
10000070-4 = "Did the client order them to do it?"
10000070-7 = "(Izuna can hear people talking!)"
10000070-8 = "It's coming from this direction. Izuna should hide on the roof..."
10000070-16 = "Izuna could have sworn the voices were coming from somewhere around here."
10000070-18 = "Boss! We've brought the target!"
10000070-19 = "We got 'em right here!"
10000070-20 = "Well done. And in a timely manner as well."
10000070-21 = "(There's the Mouryo, the client...and Sensei!)"
10000070-23 = "If it isn't Schale's famous Sensei. It's a pleasure...to finally meet you."
10000070-28 = "[ns] \"Date Meowru? The merchant guild president?\""
10000070-30 = "I am NOT Date Meowru!"
10000070-31 = "My name is...Meowsamune. "
10000070-32 = "I am the alleys' One-Eyed Dragon! Date Meowsamune!"
10000070-33 = "Ta-da!"
10000070-34 = "..."
10000070-36 = "Ahem. I knew whoever was interfering with our plans had to be quite the tactician."
10000070-37 = "So you're the one from Schale that everyone speaks of? "
10000070-38 = "I believe you and my other half were acquainted at Momoyodou?"
10000070-39 = "[s1] \"Maybe.\"\n[s2] \"Doesn't ring a bell.\""
10000070-40 = "Haha! You must have something up your sleeve if you're this calm."
10000070-41 = "Haha! You must have something up your sleeve if you're this calm."
10000070-42 = "I hate to burst your bubble, but I have your backup plan right here."
10000070-44 = "[s] \"My cell phone...\""
10000070-45 = "Of course I had it confiscated. I'd never make such a careless mistake."
10000070-46 = "You have no way of calling for backup now."
10000070-47 = "Your pleas won't reach the Festival Operations Department, even if you scream at the top of your lungs. You're all alone."
10000070-48 = "Now do you understand the situation you're in?"
10000070-49 = "[s3] \"Why are you doing this?\"\n[s4] \"What do you gain by ruining the festival?\""
10000070-53 = "[ns] \"Is this because of the festival's traditions?\""
10000070-54 = "Traditions? Are you referring to the fireworks show and things like that?"
10000070-55 = "Haha! Don't be ridiculous!"
10000070-56 = "What we spoke of at Momoyodou was only a diversion."
10000070-57 = "You're overthinking it. My goal has always been money."
10000070-58 = "[s] \"That's it? Money...?\""
10000070-59 = "Do you have any idea how much cash flows into the Hyakkiyako Cherry Blossom Festival?"
10000070-60 = "Yet the only ones with control over it are the Festival Operations Department. Therein lies my gripe."
10000070-61 = "Think about all they've wasted for the sake of \"fun\"!"
10000070-62 = "What gives them the right to spend a fortune on equipment from Millennium for the sake of \"fun\"?!"
10000070-63 = "It's ridiculous! This festival would make so much more money if it were under my management!"
10000070-64 = "[s] \"You're ruining the festival over something like that?\""
10000070-65 = "That's right. So I resorted to sabotage."
10000070-66 = "If the festival were to be canceled, the Festival Operations Department would have to resign from the planning committee."
10000070-67 = "Then the festival will be under my control."
10000070-68 = "[s] \"And you're taking advantage of Izuna to do it...\""
10000070-69 = "Izuna? That self-proclaimed ninja?"
10000070-70 = "Yes, Izuna did prove of assistance."
10000070-71 = "And she didn't cost much to hire..."
10000070-72 = "She did so well, and all I had to do was play along with her little ninja fantasy."
10000070-73 = "Haha. Talk about a bargain. Having her was like having an extra dozen Mouryo at my disposal."
10000070-74 = "[s] \"Ninja fantasy...?\""
10000070-75 = "That's right: fantasy. It's all childish make-believe."
10000070-76 = "She went around spouting things like, \"You're my client, so I'll follow your orders,\" and, \"Eliminating the client's enemies is the way of a true ninja.\""
10000070-77 = "You've no idea how funny it was listening to her gibberish."
10000070-78 = "I simply played along with her fantasies."
10000070-79 = "It was hard to refrain from bursting into laughter every time she shouted things like, \"I'll accomplish my mission like a true ninja!\""
10000070-80 = "The boss is right. It was pret-ty funny. Hahaha!"
10000070-81 = "It was an absolute riot."
10000070-82 = "Talk about convenient—and cost effective as well! Hahaha!"
10000070-83 = "[s] \"So you took advantage of Izuna's dream.\""
10000070-84 = "Dream? Have you lost your mind?"
10000070-85 = "You can't seriously be referring to that child's fantasies as a \"dream,\"#ncould you?"
10000070-87 = "...!"
10000070-88 = "(The client asked Izuna to carry out her duties...as a ninja.)"
10000070-89 = "(But it was all lies? The client was deceiving Izuna?)"
10000070-90 = "(Izuna feels so foolish having fallen for it!)"
10000070-91 = "So you knew Izuna was following my orders, did you?"
10000070-92 = "Yet you went out seeking her and even the Mouryo despite knowing they were carrying out my orders as well."
10000070-93 = "That was your mistake. I thought we might find you if we left Izuna to her own devices. I had the Mouryo follow her and kidnap you when the opportunity presented itself."
10000070-94 = "A brilliant strategy, if I do say so myself. And it was all thanks to Izuna's help! Hahaha!"
10000070-95 = "...!"
10000070-96 = "(This is all because Izuna allowed the client to deceive her!)"
10000070-97 = "(Sensei believed in Izuna, but now they're...!)"
10000070-99 = "[ns] \"Meeting Izuna alone may have been careless of me...\""
10000070-100 = "Huh. So you admit you were outwitted?"
10000070-101 = "[s] \"...but it was not Izuna's fault.\""
10000070-104 = "Sen...sei?"
10000070-107 = "[ns] \"You called her dream a childish fantasy, didn't you?\""
10000070-108 = "You heard me. It's nothing but make-believe."
10000070-109 = "What about it?"
10000070-110 = "[s] \"You're the one who's delusional. Being a ninja is...\""
10000070-116 = "[ns5] \"...the coolest thing imaginable!\"\n[ns6] \"...a dream that anyone would have!\""
10000070-117 = "...!"
10000070-118 = "...!"
10000070-120 = "...?"
10000070-121 = "Uh, what?"
10000070-122 = "Since when?"
10000070-123 = "You call THAT a dream?"
10000070-124 = "[s7] \"Call it silly. Call it childish. So what?\"\n[s8] \"Who says it isn't cool?!\""
10000070-125 = "Ha..."
10000070-126 = "Ha..."
10000070-127 = "Hahaha! This is priceless!"
10000070-128 = "I expected more from the vaunted Sensei from Schale!"
10000070-129 = "I see there's no use in trying to get through to you. If you're going to blather on like this, then we'll have to silence you!"
10000070-130 = "Sensei of Schale, you've interfered with my plans for the final time...#nTime to bid you farewell. Mouryo! Attack!"
10000070-131 = "Understood! Hiyaaa!"
10000070-140 = "The ceiling collapsed! What's going on?!"
10000070-141 = "*cough* Wh-What happened, Boss?!"
10000070-142 = "Th-That came out of nowhere!"
10000070-144 = "Nin nin! It is time to take the next step on the path to being a great ninja!"
10000070-145 = "Izuna has arrived!"
10000070-146 = "[s] \"Izuna!\""
10000070-147 = "Izuna?! Why were you on the roof?!"
10000070-148 = "Izuna heard the whole story."
10000070-149 = "And most importantly, Izuna heard Sensei's feelings...and knows Sensei truly does believe in Izuna's dream!"
10000070-150 = "Now things are crystal clear!"
10000070-153 = "Izuna can pursue her dream as long as she stays by Sensei's side!"
10000070-154 = "What?!"
10000070-155 = "Sensei..."
10000070-156 = "No, my lord!"
10000070-157 = "[s] \"Did you just call me...your lord?!\""
10000070-159 = "Izuna will fight by your side from today onward! Nin nin!"

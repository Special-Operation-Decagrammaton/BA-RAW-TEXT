[translation]
10000070-1 = "第7話;被揭露的陰謀與在那之後"
10000070-3 = "把老師帶來這種地方……"
10000070-4 = "難道……？"
10000070-7 = "（能聽到談話聲……）"
10000070-8 = "應該會去那裡才對，為了不被發現躲在天花板上吧……"
10000070-16 = "一定是這裡……"
10000070-18 = "依照命令把人帶來了哦！"
10000070-19 = "帶來了的說！"
10000070-20 = "做得很好，妖怪劇團。想做還是做得到的嘛。"
10000070-21 = "（那個人……果然是老師！！）"
10000070-23 = "很高興再見到你，夏萊的老師。"
10000070-28 = "[ns]「……商店街的會長喵天丸？」"
10000070-30 = "哼，我的本名才不是喵天丸！"
10000070-31 = "我名為政宗…… "
10000070-32 = "巷弄裡的獨眼龍！喵達政宗說的就是我！"
10000070-33 = "（咚咚！）"
10000070-34 = "（…………）"
10000070-36 = "咳哼……聽說有個指揮能力出眾的「老師」在妨礙我們，還以為是誰呢。"
10000070-37 = "沒想到那個夏萊的老師就是你啊……"
10000070-38 = "記得有在百夜堂見過一面吧？"
10000070-39 = "[s1]「好像是。」\n[s2]「有嗎？」"
10000070-40 = "哈哈！面對這種狀況依然能游刃有餘，真不簡單。#n簡直像是有備而來一樣。"
10000070-41 = "哈哈！面對這種狀況依然能游刃有餘，真不簡單。#n簡直像是有備而來一樣。"
10000070-42 = "我和漫畫裡的那些壞蛋可不一樣。你以為我沒有注意到嗎？#n……很抱歉，你的手段已經被我給封住了。"
10000070-44 = "[s]「手機被……」"
10000070-45 = "上了年紀就會變得謹慎啊，這個我就沒收了。"
10000070-46 = "這樣一來你就沒有求救的手段了。"
10000070-47 = "無論你在心裡再怎麼喊，節慶營運管理部的那些傢伙都不會來。#n用孤立無援來形容再貼切不過了。"
10000070-48 = "還是該說你是飛蛾撲火呢，老師？"
10000070-49 = "[s3]「……為什麼要做這種事？」\n[s4]「妨害慶典有什麼好處？」"
10000070-53 = "[ns]「……是為了守護慶典的傳統？」"
10000070-54 = "傳統……？#n啊啊，你指的是煙火嗎？"
10000070-55 = "呵哈哈！你的記性還真好。"
10000070-56 = "然而並不是，雖然不能說那些全都是隨口亂說的，但我真正在意的並不是那個。"
10000070-57 = "我的目的非常單純，那就是錢。"
10000070-58 = "[s]「錢……？」"
10000070-59 = "百夜之春櫻花祭……你知道每次舉行這場慶典要動用多少錢嗎？"
10000070-60 = "看它的規模，你應該也多少知道金額非同小可吧。#n但那筆錢竟然掌握在節慶營運管理部的那些小鬼手裡。這一點讓我非常不滿。"
10000070-61 = "「讓慶典變得更好」？"
10000070-62 = "為了這種事有必要花大錢委託千年？"
10000070-63 = "多麼天真的想法！交給我的話，明明能比那些傢伙賺更多更多的錢！"
10000070-64 = "[s]「所以你才會打算破壞慶典？」"
10000070-65 = "沒錯。"
10000070-66 = "一旦櫻花祭被中止，節慶營運管理部就只能負起責任退出營運團隊。"
10000070-67 = "而這份工作自然會由我來接手。#n再怎麼說我也是商店街的會長，要加以控制並不困難。"
10000070-68 = "[s]「為了這個，連伊樹菜也……」"
10000070-69 = "伊樹菜……啊啊，那個自稱忍者的小鬼啊。"
10000070-70 = "這麼說來，那傢伙確實幫了不少忙。"
10000070-71 = "明明沒有花多少錢卻相當努力呢。"
10000070-72 = "只不過是配合一下忍者遊戲而已，沒想到他居然這麼活躍。"
10000070-73 = "只看戰力的話，應該能抵過妖怪劇團數十個人吧。"
10000070-74 = "[s]「忍者遊戲……？」"
10000070-75 = "沒錯，那只是幼稚小孩的扮家家酒而已吧？#n他所說的那種魔法般的忍者，只存在在幻想的世界裡。"
10000070-76 = "一下說「請下達雇主的命令」，一下說「執行任何命令才是忍者之道」。"
10000070-77 = "憋著不笑出來可是費了我好一番功夫啊。"
10000070-78 = "但反過來說，麻煩也就僅此而已，只要稍微配合一下就能隨意使喚。"
10000070-79 = "他幹勁滿滿地說著「身為忍者將全力以赴！」的時候，就連我都笑個不停啊！"
10000070-80 = "事到如今說這些可能有點晚了，但都那個年紀了還說什麼忍者真是太可笑了！"
10000070-81 = "老實說，光是在一旁看著要忍住不笑都很痛苦的說。"
10000070-82 = "就是啊，真是方便使喚的傢伙。#n是個經濟實惠的蠢蛋真是幫大忙了！呵哈哈哈哈！"
10000070-83 = "[s]「……也就是說，你為了錢而利用了伊樹菜的夢想？」"
10000070-84 = "……夢想？你在說什麼？"
10000070-85 = "你說那種癡人說夢的愚蠢妄想是夢想？#n你還真是個好相處的人啊，雖然是老師，還真是個大好人。"
10000070-87 = "……！！！"
10000070-88 = "（明明說過相信伊樹菜能以一名忍者的身分大顯身手的……）"
10000070-89 = "（原來那些全都是……為了欺騙伊樹菜而編出來的謊言……？）"
10000070-90 = "（伊樹菜被欺騙了……？）"
10000070-91 = "聽你這麼說，你已經注意到伊樹菜閣下……不，伊樹菜是依照我的命令行動的吧？"
10000070-92 = "明知道妖怪劇團和伊樹菜都在我的支配底下，卻還是傻傻地和伊樹菜同行，#n是不是有點太欠缺思考了？居然沒想過這背後可能有陷阱。"
10000070-93 = "讓渾身行動力的伊樹菜自由行動的話，也許就能順利找到你。#n那麼只要讓一些妖怪劇團的人跟蹤伊樹菜，再趁機綁架……"
10000070-94 = "雖然只是策略之一，卻進行得這麼順利。#n那傢伙真是幫了大忙啊！呵哈哈哈！"
10000070-95 = "……！！"
10000070-96 = "（都怪伊樹菜受騙上當……！）"
10000070-97 = "（一直支持著伊樹菜夢想的老師才會……！）"
10000070-99 = "[ns]「和伊樹菜待在一起或許是我大意了沒錯。」"
10000070-100 = "什麼嘛，原來你自己也很清楚啊。"
10000070-101 = "[s]「但那是我做的決定，並不是伊樹菜的錯。」"
10000070-104 = "……老，老師？"
10000070-107 = "[ns]「你剛才說忍者遊戲……是嗎？」"
10000070-108 = "……嗯？啊啊，沒錯。#n沒想到「扮家家酒」意外的有用啊。"
10000070-109 = "所以呢，那個忍者遊戲怎麼了？"
10000070-110 = "[s]「我就一句話，所謂的忍者……」"
10000070-116 = "[ns5]「根本帥到不行好嗎！？」\n[ns6]「那可是浪漫啊！？」"
10000070-117 = "！！？"
10000070-118 = "！！？"
10000070-120 = "……"
10000070-121 = "……咦？"
10000070-122 = ";……啊？"
10000070-123 = "突，突然在說什麼……？"
10000070-124 = "[s7]「就算被別人說幼稚又孩子氣……！」\n[s8]「帥氣的東西就是帥氣啊！！！」"
10000070-125 = "……呵。"
10000070-126 = "……呵。"
10000070-127 = "呵哈哈哈哈哈！真是傑作！"
10000070-128 = "我還以為夏萊的老師多少比較能溝通！"
10000070-129 = "本來還想說服你的，就當作沒這回事吧。#n我可沒時間應付你這種胡言亂語的傢伙！"
10000070-130 = "再見了，夏萊的老師。#n妨礙到我的計畫算你運氣不好。妖怪劇團，動手！"
10000070-131 = "看招！"
10000070-140 = "怎，怎麼了！？#n天花板突然塌了下來！？怎麼回事！？"
10000070-141 = "咳咳咳！發生什麼事了！？"
10000070-142 = "不，不知道的說！"
10000070-144 = "以奇普托斯最強為目標的忍者！"
10000070-145 = "為了拯救真正的主君在此登場！"
10000070-146 = "[s]「伊樹菜！」"
10000070-147 = "伊樹菜！為什麼會從天花板……！？"
10000070-148 = "伊樹菜全都聽到了。"
10000070-149 = "不只是雇主說的話……還有無論何時都沒有嘲笑伊樹菜夢想的，老師的心情。"
10000070-150 = "伊樹菜終於找到了……"
10000070-153 = "只要待在一直支持著伊樹菜夢想的老師身邊……伊樹菜今後就能夠一直追逐著夢想！"
10000070-154 = "唔，你要背叛我嗎，伊樹菜！？"
10000070-155 = "老師……"
10000070-156 = "不，主公！"
10000070-157 = "[s]「主公……是說我嗎！？」"
10000070-159 = "是！從今以後，伊樹菜會為主公付出一切，為了主公而戰！#n……覺悟吧！"

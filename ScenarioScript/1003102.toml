[translation]
1003102-1 = "Before the Year Is Out"
1003102-2 = "(A few days before New Year's.)"
1003102-3 = "Oh, Sensei, here. Over here."
1003102-4 = "[s1] \"So what's up? What's this all about?\"\n[s3] \"This had better be good, Aru.\""
1003102-5 = "Heh. So are you curious about what I'm doing here?"
1003102-6 = "Of course you're curious. Yep. Of course you are!"
1003102-7 = "[s2] \"Not really. I'll catch you later.\""
1003102-8 = "Huh?!"
1003102-9 = "I-I'm kidding, Sensei! I was just kidding!"
1003102-10 = "You don't have to take it so seriously. I just wanted you to play along a little!"
1003102-11 = "Huh? Really?"
1003102-12 = "I-I'm sorry. I guess I called you here on really short notice."
1003102-13 = "That makes sense. You are pretty busy most of the time."
1003102-14 = "I suppose I should have gone through the proper channels and made an appointment. You know, have my people call your people."
1003102-15 = "My deepest apologies for asking you here so suddenly."
1003102-16 = "[s4] \"I lied, so it's fine. I've got nothing better to do.\""
1003102-17 = "You're so sweet—telling me it's okay after I take time out of your busy day."
1003102-18 = "...Huh? Wait."
1003102-19 = "(It was all lie?! Sensei, you are unbelievable!)"
1003102-23 = "A-Ahem. So as I was trying to tell you earlier..."
1003102-24 = "The year is almost over, Sensei."
1003102-25 = "Which means..."
1003102-26 = "[s] \"Which means...?\""
1003102-27 = "That New Year's is just around the corner!"
1003102-28 = "Now do you get it, Sensei?"
1003102-29 = "This is serious business, you know. We have an emergency on our hands. A real emergency."
1003102-30 = "[s5] \"You're going to reveal your master plan on New Year's. I knew it!\"\n[s6] \"I've been waiting for this day. Let's change the world, Boss!\""
1003102-31 = "Huh?! What are you talking about?! I'm not planning anything like that!"
1003102-32 = "Huh?! What are you talking about?! I'm not planning anything like that!"
1003102-33 = "What did you think I was talking about, Sensei?!"
1003102-34 = "I just want to rent a kimono to wear on New Year's Day!"
1003102-35 = "[s] \"Rent?\""
1003102-36 = "Ahem. It's the start of a new fiscal quarter, obviously. New Year's is one of the most important days of the year for a businesswoman like me."
1003102-37 = "It's a chance to approach business opportunities with a refreshed body and a renewed mind..."
1003102-38 = "It's only right I wear something fitting for the occasion."
1003102-39 = "[s] \"And a kimono is just the thing for the job.\""
1003102-40 = "You've gotta wear outfits that suit the time, place, and occasion."
1003102-41 = "Or \"TPO\" as I like to call it. Being ready for everything is part of the business."
1003102-42 = "So, on that note..."
1003102-43 = "I want to hear your opinion before I make a decision, Sensei."
1003102-44 = "I asked you here because I need an adult's sensibility. Is that okay?"
1003102-45 = "[s] \"It's always okay if it's for you, Aru.\""
1003102-46 = "Gah. You didn't even hesitate to say that. You really are dangerous."
1003102-47 = "But, sure."
1003102-48 = "Let's get to work, Sensei."
1003102-51 = "[ns7] \"Any idea what kind of kimono you want?\"\n[ns8] \"Do you have a brand in mind?\""
1003102-52 = "Oh, Sensei. Times like this call for a little business sense."
1003102-53 = "Oh, Sensei. Times like this call for a little business sense."
1003102-54 = "Only a rookie would make the mistake of overpaying for a kimono to wear on New Year's."
1003102-55 = "But it's also true that you can't be a presentable businesswoman wearing some cheap rags because your budget was too strict."
1003102-56 = "[s] \"Okay. So?\""
1003102-57 = "Striking a good balance is key."
1003102-58 = "You can spot whether the price is reasonable if you have a good eye for fabrics and quality craftsmanship."
1003102-59 = "New Year's is also especially tricky because merchants will raise prices knowing people are more likely to be loose with their wallets."
1003102-60 = "You could even fall into a classic bait and switch and end up spending way more than you expected to if you aren't careful."
1003102-61 = "Hello! How about a something stylish to ring in the new year?"
1003102-62 = "Dress your best for a special day with family, friends, or your significant other!#nWe have rentals available at rock bottom prices!"
1003102-63 = "Perfect timing. Just watch, Sensei. I'll show you what I can do."
1003102-66 = "Excuse me. I'd like to rent a kimono."
1003102-67 = "Welcome, miss! Is there anything in particular you're looking for?"
1003102-68 = "Yes, I have a loose budget of about 5,000 yen."
1003102-69 = "Oh, this looks fine. The price seems reasonable too."
1003102-70 = "My, you have such discerning taste. And may I ask what the occasion is?"
1003102-71 = "A family gathering? Or a get-together with friends? Maybe on a date?"
1003102-72 = "A-A date?!"
1003102-73 = "Ahem, no. I'm planning to wear it to an important an event where business will be discussed."
1003102-75 = "You're planning to attend a business meeting in a cheap rental like this?!"
1003102-77 = "What?! But you said it was good!"
1003102-78 = "Yes, for a low-stakes gathering between family and friends."
1003102-79 = "It would never do for an important business meeting..."
1003102-80 = "You need to wear something that will represent your value and complement it with accessories that show your dignity!"
1003102-81 = "D-Don't be ridiculous. A person's value isn't determined by things like that."
1003102-82 = "Are you forgetting that there's only one New Year's every single year?!"
1003102-83 = "This is a chance to make precious memories with the people in your life!"
1003102-84 = "It is?!"
1003102-85 = "You there! Don't you think so too?!"
1003102-86 = "[s9] \"Well...\"\n[s10] \"Maybe.\""
1003102-87 = "S-Sensei!"
1003102-88 = "S-Sensei!"
1003102-89 = "How about this? I think this will be suitable for the occasion."
1003102-93 = "Hand-embroidered by a master artisan stitch by stitch. This is the finest kimono in our store!"
1003102-94 = "But that's way over my budget!"
1003102-95 = "Think of it as an investment. Your business will prosper if you wear this, and you'll easily recoup the cost. You'll be set for life, and so will your family for generations to come!"
1003102-96 = "Th-This kimono is capable of all that?!"
1003102-97 = "That's not all! You'll also be able to capture the heart of that special someone! Set your troubled heart free!"
1003102-98 = "I can capture Sensei's heart and set my own free?!"
1003102-99 = "What do you think, Sensei...?"
1003102-100 = "[s11] \"You would look good in that kimono, but...\"\n[s12] \"Look at that price tag, Aru!\""
1003102-101 = "I know!"
1003102-102 = "I know!"
1003102-103 = "A true businesswoman would recognize the hidden value in this kimono and make the smart investment—especially at this price!"
1003102-104 = "Y-You're right... Being a businesswoman means making sound investments."
1003102-105 = "O-Okay! Go big or go home! I'll take it!"
1003102-106 = "I'll go wrap it up!"
1003102-112 = "[ns13] \"Are you sure about this?\"\n[ns14] \"What happened to your business sense?\""
1003102-113 = "I'm fine. It's an investment after all!"
1003102-114 = "I'm fine. It's an investment after all!"
1003102-115 = "Yeah, everything will be fine!"
1003102-116 = "T-Totally fine... I'm sure of it..."
1003102-118 = "(Aru then returned to her normal self, but her legs continued to shake a little.)"

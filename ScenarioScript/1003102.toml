[translation]
1003102-1 = "ก่อนปีนี้จะผ่านพ้นไป"
1003102-2 = "(ไม่กี่วันก่อนจะถึงวันปีใหม่)"
1003102-3 = "อ๊ะ คุณครู ทางนี้ๆ"
1003102-4 = "[s1] \"เรียกมามีอะไรเหรอ?\"\n[s3] \"ครูยอมยกเลิกตารางงานทั้งหมดเพื่ออารุเลยนะ\""
1003102-5 = "ฮุฮุฮุ... อยากรู้เหรอว่าฉันมีธุระอะไร"
1003102-6 = "ก็ต้องอยากรู้สิ อื้อ อยากรู้ใช่มะ...!"
1003102-7 = "[s2] \"ไม่อยากรู้แล้วล่ะ ครูกลับก่อนนะ\""
1003102-8 = "หืม?!"
1003102-9 = "ฉันแค่ล้อเล่นเอง คุณครู! ก็บอกว่าแค่ล้อเล่นเองไงเล่า!"
1003102-10 = "อย่าทำแบบนี้สิ ฉันแค่อยากให้คุณครูคล้อยตามกันบ้างก็เท่านั้นเอง!"
1003102-11 = "หืม? จริงเหรอ"
1003102-12 = "ขะ...ขอโทษนะ ว่าแล้วเชียวว่านัดกะทันหันไปสินะ?"
1003102-13 = "ก็จริงนะ เพราะปกติคุณครูก็ยุ่งมากอยู่แล้ว"
1003102-14 = "เรื่องแบบนี้ควรจะต้องยื่นคำร้องอย่างเป็นทางการก่อน แล้วค่อยนัดกันสินะ"
1003102-15 = "ขอโทษที่จู่ๆ ก็เรียกออกมานะ"
1003102-16 = "[s4] \"ไม่เป็นไร ครูโกหกเรื่องยกเลิกตารางงานน่ะ\""
1003102-17 = "ฮุฮุ ทั้งที่คุณครูเองก็ยุ่งมาก แต่ก็บอกฉันว่าไม่เป็นไร ใจดีจังเลยนะ"
1003102-18 = "หืม...? เดี๋ยวนะ"
1003102-19 = "(คุณครูโกหกงั้นเหรอ หรือว่ากำลังเอาคืนฉันอยู่เหรอ?!)"
1003102-23 = "อะแฮ่ม! ถะ...ถ้างั้นก็กลับมาเข้าประเด็นกันเถอะ"
1003102-24 = "อย่างที่บอกไปก่อนหน้านี้น่ะ ว่ามันใกล้จะถึงวันสิ้นปีแล้ว"
1003102-25 = "หรือก็คือ..."
1003102-26 = "[s] \"หรือก็คือ...?\""
1003102-27 = "ใกล้ถึงวันปีใหม่แล้วไงล่ะ!"
1003102-28 = "เข้าใจรึเปล่า คุณครู...?"
1003102-29 = "เรื่องนี้ซีเรียสมากนะ จะเรียกว่าสถานการณ์ฉุกเฉินสุดๆ เลยก็ได้"
1003102-30 = "[s5] \"คิดแล้วเชียว อารุจะเปิดเผยสุดยอดแผนการในวันปีใหม่สินะ!\"\n[s6] \"ครูรอวันปีใหม่อยู่ เรามาครองโลกด้วยกันเถอะ ท่านประธาน!\""
1003102-31 = "พูดอะไรแบบนั้นเล่า! ฉันไม่ได้จะทำอะไรแบบนั้นสักหน่อย"
1003102-32 = "พูดอะไรแบบนั้นเล่า! ฉันไม่ได้จะทำอะไรแบบนั้นสักหน่อย"
1003102-33 = "คุณครูคิดอะไรอยู่เนี่ย?!"
1003102-34 = "ฉันก็แค่จะชวนไปเช่าชุดกิโมโนมาใส่วันปีใหม่เท่านั้นเอง...?!"
1003102-35 = "[s] \"เช่าเหรอ...?\""
1003102-36 = "อ่ะแฮ่ม สำหรับนักธุรกิจอย่างฉันแล้ว วันปีใหม่ถือเป็นวันสำคัญมาก"
1003102-37 = "ต้องเตรียมร่างกายและจิตใจให้พร้อมรับปีใหม่และความรุ่งโรจน์ที่จะมาถึง..."
1003102-38 = "เพราะฉะนั้นก็ควรจะต้องใส่เสื้อผ้าให้เหมาะๆ ด้วยใช่มั้ยล่ะ?"
1003102-39 = "[s] \"เลยจะไปเช่ากิโมโนสินะ\""
1003102-40 = "ฮุฮุฮุ ต้องจัดเต็มให้เหมาะกับกาลเทศะสิ"
1003102-41 = "การรักษา TPO เอาไว้เป็นหัวใจสำคัญของนักธุรกิจ ก็เลยจะต้องคิดให้รอบคอบเข้าไว้"
1003102-42 = "เพราะงั้นแล้ว..."
1003102-43 = "ฉันก็เลยอยากให้คุณครูช่วยออกความเห็นด้วยน่ะ"
1003102-44 = "ที่เรียกออกมาก็เพราะฉัน... อยากขอความเห็นในฐานะผู้ใหญ่น่ะ คุณครูสะดวกรึเปล่า?"
1003102-45 = "[s] \"ถ้าอารุขอร้อง ไม่มีคำว่าไม่ได้หรอก\""
1003102-46 = "อึก ในที่แบบนี้ก็ยังพูดแบบนั้นอีกนะ เป็นคนที่อันตรายจริงๆ เลย"
1003102-47 = "ถ้างั้นก็ดี..."
1003102-48 = "ไปกันเถอะ คุณครู"
1003102-51 = "[ns7] \"แล้วจะเช่ากิโมโนแบบไหนเหรอ?\"\n[ns8] \"มีแบรนด์ที่เล็งไว้รึเปล่า?\""
1003102-52 = "ฮุฮุฮุ คุณครู ได้เวลาใช้เซนส์ของนักธุรกิจแล้วละ"
1003102-53 = "ฮุฮุฮุ คุณครู ได้เวลาใช้เซนส์ของนักธุรกิจแล้วละ"
1003102-54 = "สำหรับชุดกิโมโนที่ใส่วันปีใหม่ การเลือกชุดที่ดูหรูหราราคาแพงน่ะ มีแต่พวกมือใหม่เท่านั้นแหละ#nที่ทำแบบนั้น"
1003102-55 = "หากเช่าชุดในราคาถูกหรือภายในงบที่มีจำกัดไม่ได้ คงไม่มีหน้ามาเรียกตัวเองว่านักธุรกิจหรอก"
1003102-56 = "[s] \"แล้วต้องทำยังไงล่ะ?\""
1003102-57 = "สิ่งสำคัญคือ เราต้องเลือกให้เหมาะสมยังไงล่ะ"
1003102-58 = "ตรวจสอบคุณภาพและวัสดุที่ใช้ แล้วก็ดูว่าราคาเหมาะสมรึเปล่า"
1003102-59 = "โดยเฉพาะในเทศกาลวันปีใหม่แบบนี้ พวกพ่อค้าหัวใสมักจะขึ้นราคาของ เพราะรู้ว่าเป็นช่วงที่#nคนใช้จ่ายเงินซื้อของกันมาก"
1003102-60 = "ถ้าเกิดพลาดตกเป็นเหยื่อเข้าละก็ อาจต้องเสียเงินจำนวนมากอย่างคาดไม่ถึงเลย"
1003102-61 = "สนใจชุดกิโมโนพิเศษสำหรับใส่ในวันปีใหม่มั้ย~!"
1003102-62 = "ชุดเดรสสวยๆ สำหรับใส่ฉลองวันพิเศษกับเพื่อน ครอบครัว และคนรักจ้า~!#nตอนนี้เรามีบริการให้เช่าในราคาสุดพิเศษด้วยนะ~!"
1003102-63 = "ฮุฮุ พอดีเลย คอยดูให้ดีล่ะคุณครู ฉันจะแสดงฝีมือให้ได้เห็นเอง"
1003102-66 = "ฉันอยากเช่ากิโมโนชุดนั้นค่ะ"
1003102-67 = "อ๊ะ! ยินดีต้อนรับครับ คุณลูกค้า กำลังหาชุดแบบไหนอยู่เหรอครับ?"
1003102-68 = "ฉันกำลังหาเช่าชุดในงบไม่เกิน 5,000 เยนค่ะ"
1003102-69 = "อืม ชุดนี้ดูสวยใช้ได้เลย ราคาก็สมเหตุสมผลด้วย"
1003102-70 = "โอ้ คุณลูกค้า สายตาเฉียบแหลมมากครับ จะใส่ในโอกาสไหนเหรอครับ?"
1003102-71 = "งานรวมครอบครัว? นัดเจอกับเพื่อนๆ? หรือว่าไปเดตกับคนรัก?"
1003102-72 = "ดะ...เดตกับคนรักเหรอ...?!"
1003102-73 = "ไม่ใช่ค่ะ ฉันคิดว่าจะใส่ไปงานเจรจาธุรกิจสำคัญค่ะ"
1003102-75 = "ไม่ได้เด็ดขาดครับ งานเจรจาธุรกิจที่สำคัญแบบนั้นจะเช่าชุดถูกๆ ไปได้ยังไงกัน?!"
1003102-77 = "ว่าไงนะ?! นะ...ไหนว่าเป็นชุดที่ดีไง?!"
1003102-78 = "ถ้าเป็นแค่งานเลี้ยงครอบครัว หรือการพบปะเพื่อน ชุดนี้ก็เพียงพอแล้วครับ"
1003102-79 = "แต่ถ้าเป็นงานเลี้ยงธุรกิจสำคัญแค่ชุดนี้ไม่พอหรอกครับ"
1003102-80 = "ต้องสวมใส่ชุดที่แสดงถึงฐานะและสวมเครื่องประดับที่เสริมความสง่างามของคุณ#nถึงจะเหมาะกับโอกาสสำคัญๆ แบบนี้นะครับ!"
1003102-81 = "วัดคุณค่าของคนด้วยวิธีแบบนี้ได้ยังไงกัน..."
1003102-82 = "และยิ่งกว่านั้น วันปีใหม่เป็นวันพิเศษที่จะมีแค่ปีละครั้งเท่านั้น!"
1003102-83 = "มันเป็นวันที่จะสร้างความทรงจำพิเศษกับคนที่ยืนอยู่ข้างคุณตอนนี้ไม่ใช่เหรอครับ!"
1003102-84 = "หะ...หืม?!"
1003102-85 = "คุณไม่คิดอย่างนั้นเหรอครับ?"
1003102-86 = "[s9] \"นั่นสินะ\"\n[s10] \"ก็อาจจะใช่\""
1003102-87 = "คะ...คุณครู...!"
1003102-88 = "คะ...คุณครู...!"
1003102-89 = "ชุดนี้เป็นยังไงครับ ผมคิดว่าชุดนี้เหมาะกับงานแบบนี้มากๆ เลยนะครับ"
1003102-93 = "วัสดุแต่ละชิ้นปักมืออย่างประณีตโดยช่างผู้ชำนาญ... นี่เป็นชุดที่ดีที่สุดในร้านเราเลยครับ!"
1003102-94 = "เดี๋ยวสิ! ราคาชุดมันเกินงบไปเยอะเลยนะ!"
1003102-95 = "แต่ว่าถ้าคุณสวมชุดนี้ ธุรกิจจะต้องรุ่งเรือง ครอบครัวปลอดภัย มีชีวิตยืนยาวไร้โรคภัยแน่นอนครับ!"
1003102-96 = "ชะ...ชุดนี้มีผลขนาดนั้นเลยเหรอ?!"
1003102-97 = "ไม่ใช่แค่นั้นนะครับ! ยังช่วยให้มัดใจคนสำคัญไว้ได้อยู่หมัดด้วย! แถมยังช่วยทำให้ใจฟูเวลาเห็นด้วย#nนะครับ!"
1003102-98 = "มัดใจ...คุณครู... ทำให้ใจฟู...?!"
1003102-99 = "คุณครูคิดว่ายังไง...?"
1003102-100 = "[s11] \"ถ้าได้เห็นอารุใส่ชุดนี้ต้องใจฟูแน่ๆ\"\n[s12] \"มันไม่แพงเกินไปเหรอ?\""
1003102-101 = "อื้ม...!"
1003102-102 = "อื้ม...!"
1003102-103 = "ถ้าเป็นนักธุรกิจตัวจริง คงจะมองเห็นคุณค่าที่ซ่อนอยู่และกล้าลงทุนอย่างชาญฉลาดแน่นอนครับ แถมราคายังไม่แพงเลยด้วย!"
1003102-104 = "ชะ...ใช่แล้ว ถ้าเป็นนักธุรกิจก็จะต้องเลือกลงทุนอย่างชาญฉลาด"
1003102-105 = "กะ...ก็ได้! นะ...ในเมื่อตัดสินใจแล้วก็ตกลง! ฉันเอาชุดนี้นี่แหละ!"
1003102-106 = "ตกลงเช่าเหรอครับ! ขอบคุณครับ คุณลูกค้า!"
1003102-112 = "[ns13] \"ไม่เป็นไรจริงเหรอ?\"\n[ns14] \"แล้วเรื่องความสามารถในฐานะนักธุรกิจล่ะ?\""
1003102-113 = "ไม่เป็นไรๆ นี่ก็เป็นการลงทุนประเภทหนึ่งนะ!"
1003102-114 = "ไม่เป็นไรๆ นี่ก็เป็นการลงทุนประเภทหนึ่งนะ!"
1003102-115 = "อื้อ! ไม่เป็นไรหรอก!"
1003102-116 = "นะ...น่าจะ...ไม่เป็นไรหรอกมั้ง..."
1003102-118 = "(จากนั้นอารุก็เดินกลับไปด้วยท่าทางที่ดูฮึกเหิม แต่คุณครูก็สังเกตว่าขาของเธอกลับสั่นเล็กน้อย...)"

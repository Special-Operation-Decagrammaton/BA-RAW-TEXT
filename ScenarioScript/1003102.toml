[translation]
1003102-1 = "於今年結束之前"
1003102-2 = "（距離正月剩沒幾天的某一天）"
1003102-3 = "啊，老師。這裡唷，這裡。"
1003102-4 = "[s1] 「久等了。今天要去哪？」\n[s3] 「我取消了所有原本的行程，飛奔過來的喔。」"
1003102-5 = "呵呵呵，老師，知道我為什麼叫你來嗎……很在意吧？"
1003102-6 = "應該很好奇吧。嗯，一定會很在意吧……！"
1003102-7 = "[s2] 「可能也沒有那麼在意。」"
1003102-8 = "耶！？"
1003102-9 = "開，開玩笑的啦，老師！我只是跟你鬧著玩的……！"
1003102-10 = "所以說不要那麼嚴肅！多少好奇一下啦！"
1003102-11 = "耶？真的嗎？"
1003102-12 = "那，那個，抱歉……果然當天約你出來太突然了嗎？"
1003102-13 = "也是呢，老師平時也是個大忙人呢……"
1003102-14 = "果然還是，應該要更早約老師才對吧……"
1003102-15 = "很抱歉，臨時勉強你出來。"
1003102-16 = "[s4] 「不，沒關係。其實我除了『休息』以外也沒有其他行程。」"
1003102-17 = "呵呵。這種時候老師還是會說「沒關係」呢。"
1003102-18 = "……嗯？"
1003102-19 = "（奇，奇怪？難道我剛才被耍了嗎！？）"
1003102-23 = "嘛，算了。總之，言歸正傳……"
1003102-24 = "老師，就如我提過的，現在離新年剩下沒幾天了。"
1003102-25 = "也就是說……"
1003102-26 = "[s] 「就是說？」"
1003102-27 = "就是說，新年就在眼前！"
1003102-28 = "呵呵呵，明白嗎？老師。"
1003102-29 = "近在眼前啊。這已經是緊急狀態了，可說是非常緊急也不為過。"
1003102-30 = "[s5] 「原來如此，也就是說要在新年幹票大的吧！」\n[s6] 「我等這天等很久了，社長！轟轟烈烈幹一場吧！」"
1003102-31 = "什麼也不會做，沒有要幹什麼啦！？"
1003102-32 = "什麼也不會做，沒有要幹什麼啦！？"
1003102-33 = "到底把我想成什麼了！？"
1003102-34 = "我只是，想要租新年要穿的和服而已……！"
1003102-35 = "[s] 「租和服？」"
1003102-36 = "沒錯。畢竟新年對我這種企業家來說，是尤其重要的日子。"
1003102-37 = "現在正是迎接新的一年的好時機，洗淨身心，準備新的開始……"
1003102-38 = "而在那樣的情境下，當然要穿上最適合的服裝不是嗎？"
1003102-39 = "[s] 「原來如此，所以才要去租和服啊。」"
1003102-40 = "呵呵呵。沒錯，要穿著符合時間、地點、狀況的儀容。"
1003102-41 = "穿著符合時宜，也是企業家該有的心態。所謂的信賴，首先就是從這裡開始的。"
1003102-42 = "所以啊，那個……"
1003102-43 = "比起自己決定，我更想聽聽別人的意見……"
1003102-44 = "那個，也就是說，想聽老師的意見才約了老師……可以嗎？"
1003102-45 = "[s] 「當然，沒有問題唷。」"
1003102-46 = "唔，馬上就回答了……討厭，真是狡猾……"
1003102-47 = "嘛，算了。"
1003102-48 = "好。那走吧，老師。"
1003102-51 = "[ns7] 「所以你打算租什麼樣的和服？」\n[ns8] 「有想找的品牌嗎？」"
1003102-52 = "呵呵呵。老師，這時候就需要用到身為企業家的直覺了。"
1003102-53 = "呵呵呵。老師，這時候就需要用到身為企業家的直覺了。"
1003102-54 = "雖說是為了找適合新年的和服，但如果只是選擇高價的衣服，就會落入新手容易採中的陷阱。"
1003102-55 = "但也不能為了配合有限的預算而租個便宜貨，這樣也不配是一名優秀的企業家。"
1003102-56 = "[s] 「所以？」"
1003102-57 = "重要的是如何拿捏這中間的平衡。"
1003102-58 = "必須確認布料的材質和裁縫的品質，然後衡量價格是否合理。"
1003102-59 = "尤其是年末容易被過節的氛圍影響，守不住錢包的這個時期，要更加小心。"
1003102-60 = "走錯一步，就容易被名為「市場行銷」的陷阱吸引，花費超出預期的費用。"
1003102-61 = "要不要來一件特別適合在過年穿的和服呢～？"
1003102-62 = "和家人、朋友、戀人一起迎接特別日子的服飾～！現正提供特價租借服務唷～！"
1003102-63 = "呵呵，剛剛好。仔細看好了，老師，看清楚我的實力。"
1003102-66 = "不好意思，我想租借和服。"
1003102-67 = "啊，好的！歡迎光臨，客人！您在尋找什麼樣的款式呢？"
1003102-68 = "租金預算大概落在5千元左右的……"
1003102-69 = "啊，這個看起來不錯呢，價格也很合適。"
1003102-70 = "哦哦。客人，您的眼光真高。對了，請問您要在什麼場合穿呢？"
1003102-71 = "怎麼樣的聚會呢？和朋友有約？還是和戀人約會？"
1003102-72 = "戀，戀人的約會……？"
1003102-73 = "咳嗯。不是，是要在洽談事業的重要場合穿的……"
1003102-75 = "耶！那麼重要的場合，要租這麼便宜的和服去嗎！？"
1003102-77 = "耶耶！？剛，剛才不是才說眼光真高嗎……！"
1003102-78 = "如果是和朋友聚會，這件當然沒問題。"
1003102-79 = "但是，如果是洽談事業的重要場合……"
1003102-80 = "也就是說，穿的衣著直接代表了人的價值，配戴的飾品象徵了人的品味。那樣的場合，這件當然不合適！"
1003102-81 = "人，人的價值，不是靠衣著而定的……"
1003102-82 = "更何況，過年是一年只有一天的，特別的日子！"
1003102-83 = "也是能和身旁的人累積珍貴回憶的日子吧！"
1003102-84 = "耶！？"
1003102-85 = "那邊的客人，你不這麼認為嗎！？"
1003102-86 = "[s9] 「這個嘛……」\n[s10] 「大概吧。」"
1003102-87 = "老，老師……！"
1003102-88 = "老，老師……！"
1003102-89 = "來，適合那種場合的和服，這件如何呢？"
1003102-93 = "由匠人一針一線親自縫上的刺繡，是我們店裡最頂級的！"
1003102-94 = "等等，金額也差太多了吧！？"
1003102-95 = "或許是這樣。但只要穿上它，就能生意興隆、家庭平安、身體健康！"
1003102-96 = "這，這件和服有這樣的效果嗎！？"
1003102-97 = "不止這些！還能抓住重要的人的心！絕對能用美麗讓對方的心產生心動的感覺！"
1003102-98 = "抓住老師的心，產生心動的感覺……！？"
1003102-99 = "老，老師，你覺得呢……？"
1003102-100 = "[s11] 「看到亞瑠穿和服的模樣確實會很高興。」\n[s12] 「但好像有點太貴了……？」"
1003102-101 = "……！"
1003102-102 = "……！"
1003102-103 = "如果是真正的企業家，您一定會一眼看透這和服的價值而投資的！而且只要這個價格！"
1003102-104 = "確，確實……投資有價值的東西，也是身為企業家該做的正確戰略……"
1003102-105 = "好，好！該做時候我也是會做的！就這件吧！"
1003102-106 = "多謝承租！客人！"
1003102-112 = "[ns13] 「……真的沒問題嗎？」\n[ns14] 「企業家的實力是……？」"
1003102-113 = "沒關係，這也是投資的一種嘛！"
1003102-114 = "沒關係，這也是投資的一種嘛！"
1003102-115 = "嗯，沒問題！"
1003102-116 = "沒問題……！大，大概吧……"
1003102-118 = "（在那之後，亞瑠雖然自信滿滿地回去了，但看得出來腿有點發抖）"

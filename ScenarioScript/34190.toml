[translation]
34190-1 = "Episode 19; Infinite Chances"
34190-3 = "Sensei?! I thought you were going to rescue Hime!"
34190-4 = "[s] \"I will. With you, Saori.\""
34190-5 = "...!"
34190-10 = "Sensei is surprisingly stubborn..."
34190-11 = "Thank goodness you're okay, Leader... I mean...kind of okay. Well, at least you're alive."

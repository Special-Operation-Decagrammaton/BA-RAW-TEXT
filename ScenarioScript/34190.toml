[translation]
34190-1 = "第19話;無限的可能性"
34190-3 = "老師……你不是去救公主了嗎……？"
34190-4 = "[s] 「當然會去囉，不過要跟沙織你一起去。」"
34190-5 = "……！！"
34190-10 = "隊長抱歉……不管我們怎麼勸都阻止不了老師。"
34190-11 = "隊長……還好你沒事……不對，好像也不是沒事呢？#n總，總之，太好了……"
34190-13 = "美咲……日和……"
34190-14 = "[ns] 「你和沙織戰鬥過了呢，彌香。」"
34190-17 = "老，老師……那個……"
34190-18 = "[s] 「對不起，彌香。」"
34190-19 = "老，老師……！？"
34190-20 = "[s1] 「明明我應該好好說明的，卻沒有做到。」\n[s2] 「明明我應該面對彌香，好好把話說清楚的……」"
34190-21 = "為，為什麼老師要向我道歉……？"
34190-22 = "為，為什麼老師要向我道歉……？"
34190-23 = "老師沒有錯唷……做錯事的是我才對吧！？#n為什麼還要……"
34190-24 = "[s] 「因為關係到學生的性命，所以我才會幫助沙織他們的。」"
34190-25 = "……"
34190-26 = "[s] 「所以──把敦子救出來之後，一起回三一去吧。」"
34190-27 = "……！！"
34190-28 = "為，為什麼……"
34190-29 = "……就算做了這種事，也不會有任何改變的……"
34190-30 = "我……一定會被退學的……聖亞醬也是因為我才會……"
34190-31 = "[s] 「我會幫你的。」"
34190-32 = "……！！"
34190-33 = "[s3] 「彌香所面臨的狀況，心裡期望過的事……」\n[s4] 「還有彌香是個怎麼樣的孩子，我都已經知道了。」"
34190-34 = "啊哈哈……老師在說什麼呢？"
34190-35 = "啊哈哈……老師在說什麼呢？"
34190-36 = "知道我是個怎麼樣的孩子……？#n──你知道了我的什麼呢？"
34190-37 = "我可是……「魔女」哦。"
34190-38 = "你是不是有什麼誤會呢？#n老師，你有好好看清楚我嗎？我的這副模樣──還有我犯下的罪。"
34190-39 = "[ns] 「也對──彌香是個壞孩子。」"
34190-41 = "[ns5] 「欺騙別人，偽裝自己。」\n[ns6] 「傷害別人，也傷害自己。」"
34190-44 = "[ns7] 「明明都做出了這種事，」\n[ns8] 「卻哭著不願意接受這個結果──就是這樣的孩子。」"
34190-47 = "[ns9] 「不過，同時也有著想要和他人和解而伸手的善良，」\n[ns10] 「也因為害怕自己被討厭而傷害了自己，是個不穩定的孩子。」"
34190-50 = "[ns11] 「彌香才不是什麼魔女。」\n[ns12] 「彌香只不過是不聽話的不良學生而已。」"
34190-53 = "[ns] 「所以──希望你能好好跟我說。」"
34190-54 = "……"
34190-55 = "為什麼呢……"
34190-56 = "明明就這樣頭也不回的離開就好了……#n為什麼還要讓我痛苦呢……？"
34190-57 = "直到最後……都還要這樣……"
34190-58 = "讓我相信我還有機會呢……？"
34190-59 = "[s] 「別擔心，還有機會的。」"
34190-60 = "……？"
34190-61 = "[s] 「機會這種東西，沒有的話創造一個就好了。」"
34190-62 = "……這，這也太……"
34190-63 = "[ns] 「就算失敗了，只要再創造出下一個機會就好。」"
34190-65 = "[ns] 「無論失敗了多少次。」"
34190-67 = "[ns] 「只要道路還在延續，就有無窮的機會。」"
34190-69 = "[ns13] 「彌香、沙織……」\n[ns14] 「未來的道路不會因為一兩次的失敗就關閉的。」"
34190-72 = "[ns] 「──在今後的未來裡，」"
34190-74 = "[ns] 「有著無限的可能性啊。」"
34190-75 = "……"
34190-76 = "……"
34190-77 = "[ns15] 「如果沒有機會的話，不管幾次我都會創造出來的。」\n[ns16] 「──不能讓學生們放棄未來。」\n[ns17] 「這種事情，就交給大人吧。」"
34190-81 = "胡說八道就到這裡為止吧！"
34190-85 = "竟敢在我的宗座聖殿裡口出狂言啊。"
34190-86 = "[s] 「貝雅特里榭……！」"
34190-87 = "興致都涼了。把戲就到此為止吧。"
34190-88 = "──你們該不會覺得我不知道你們的位置吧？#n並不是，我只不過是在一旁看著而已。"
34190-89 = "這種無聊的餘興節目也該結束了。#n現在開始我就全力當你們的對手吧。"
34190-90 = "──開始儀式吧。"
34190-92 = "敦，敦子……！！"
34190-93 = "怎，怎麼會……時間應該還……"
34190-94 = "明，明明太陽還沒有升起的說……"
34190-96 = "你們是不是有什麼誤會？"
34190-97 = "難道以為我會等到日出嗎？#n不，遊戲已經結束了。皇家血統的光環馬上就會被破壞了吧。"
34190-98 = "然後──藉由那神祕的碎片，我將成為高位的存在。"
34190-99 = "住，住手！！……公主！！敦子！！"
34190-100 = "……"
34190-104 = "該謝幕了。"
34190-114 = "上吧，優斯提娜的聖女白芭蕾。"
34190-115 = "快讓那滿口胡言的老師閉上嘴巴！！"

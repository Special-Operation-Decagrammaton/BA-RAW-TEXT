34190-57 = "ทั้งที่เกิดเรื่องแบบนั้นแล้ว... ทำไมถึงยังไม่ยอมจนถึงที่สุด..."
34190-58 = "แล้วทำให้ฉันเชื่อว่าฉันยังมีโอกาสอยู่อีกล่ะ... คุณครู..."

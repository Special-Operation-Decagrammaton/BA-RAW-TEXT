[translation]
34190-1 = "ตอนที่ 19;โอกาสที่ไม่มีที่สิ้นสุด"
34190-3 = "คุณครู... ไม่ได้ไปช่วยองค์หญิงหรอกเหรอ...?"
34190-4 = "[s] \"ไปสิ ต้องไปอยู่แล้ว ไปกับซาโอริไง\""
34190-5 = "......!!"
34190-10 = "....... ถึงจะโน้มน้าวไปแล้ว แต่คุณครูก็ยังดันทุรังน่ะ ห้ามไว้ไม่ได้เลย"
34190-11 = "หัวหน้า... โชคดีที่ยังปลอดภัยนะคะ... ไม่สิ จะเรียกว่าปลอดภัยได้ไหมนะ? แต่ยังไงก็ดีแล้วละค่ะ"
34190-13 = "มิซากิ... ฮิโยริ..."
34190-14 = "[ns] \"ทำเอาซาโอริสะบักสะบอมไปหมดเลยนะ มิกะ\""
34190-17 = "คะ... คุณครู... คือว่า..."
34190-18 = "[s] \"ครูขอโทษนะ มิกะ!!\""
34190-19 = "คะ... คุณครู...?!"
34190-20 = "[s1] \"ครูควรจะอธิบายให้เธอฟังดีๆ แต่ครูดันไม่ได้ทำ\"\n[s2] \"ครูควรจะมองหน้าและคุยกับเธออย่างจริงจัง แต่ก็...\""
34190-21 = "ขะ... ขอโทษอะไรกัน... ทะ... ทำไมคุณครูถึงมาขอโทษฉันล่ะ..."
34190-22 = "ขะ... ขอโทษอะไรกัน... ทะ... ทำไมคุณครูถึงมาขอโทษฉันล่ะ..."
34190-23 = "ตะ... ต้องไม่ใช่แบบนี้สิ คุณครูไม่ใช่คนไม่ดีสักหน่อย ฉันต่างหากที่ไม่ดี...! ทำไมถึง..."
34190-24 = "[s] \"ชีวิตของนักเรียนขึ้นอยู่กับเรื่องนี้ ครูก็เลยมาช่วยซาโอริ\""
34190-25 = "......."
34190-26 = "[s] \"เพราะงั้นเมื่อช่วยอาสึโกะได้แล้ว เรากลับทรีนิตี้ไปกับครูเถอะนะ\""
34190-27 = "......!!"
34190-28 = "ฉะ... ฉัน..."
34190-29 = "ทำไมล่ะ... ถึงกลับไปก็ไม่มีอะไรแตกต่างไปอยู่ดีนี่..."
34190-30 = "ก็ฉันกำลังจะถูกไล่ออก... เป็นเพราะฉัน... เซอาจังก็เลยโดนหางเลขไปด้วย..."
34190-31 = "[s] \"ครูจะช่วยเอง!!\""
34190-32 = "......!!"
34190-33 = "[s3] \"ทั้งสิ่งที่มิกะต้องเจอ และหลายสิ่งที่ต้องการ...\"\n[s4] \"ครูรู้ดีว่ามิกะเป็นเด็กแบบไหน\""
34190-34 = "ฮ่าฮ่าฮ่า... พูดอะไรของคุณครูน่ะ?"
34190-35 = "ฮ่าฮ่าฮ่า... พูดอะไรของคุณครูน่ะ?"
34190-36 = "ฉันเป็นเด็กแบบไหนน่ะเหรอ...? คุณครูรู้เหรอ? อย่าบอกนะว่าคิดว่าฉันเป็นนักเรียนที่ดี?"
34190-37 = "ฉันน่ะเป็น <แม่มด> นะ..."
34190-38 = "เข้าใจอะไรผิดหรือเปล่า? ดูฉันสิคุณครู ดูสภาพฉันสิ ดูเรื่องที่ฉันก่อเอาไว้"

34190-32 = "...!"
34190-33 = "[s3] \"I believe in the person I first met by the pool.\" \n[s4] \"I know what kind of a person you are, Mika.\""
34190-34 = "Hahaha. Sensei, you're too much."
34190-35 = "Hahaha. Sensei, you're too much."
34190-36 = "You think I'm a good person? You believe I'm a good little student?"
34190-37 = "I'm...a witch."
34190-38 = "You can't be that blind, Sensei. You can see the blood on my hands."
34190-39 = "[ns] \"You're right, Mika. You've been bad.\""
34190-41 = "[ns5] \"You lied to others and to yourself.\"\n[ns6] \"You hurt others and yourself.\""
34190-44 = "[ns7] \"You never know what to do with yourself.\" \n[ns8] \"You cry every time things go wrong.\""
34190-47 = "[ns9] \"But your kind heart is what made you reach out to Arius.\" \n[ns10] \"But you love everyone around you, with everything you have.\""
34190-50 = "[ns11] \"You're not a witch. You're my student.\"  \n[ns12] \"You're just a stubborn, troublesome student.\""
34190-53 = "[ns] \"I came here to tell you all this.\""
34190-54 = "..."
34190-55 = "You..."
34190-56 = "Can't you just leave me alone, Sensei? Stop torturing me."
34190-57 = "After everything I've done, why won't you give up on me?!"
34190-58 = "Why would you come here and make me believe I have another chance?"
34190-59 = "[s] \"Of course you have another chance.\""
34190-60 = "...?"
34190-61 = "[s] \"And if you don't, I'll make one.\""
34190-62 = "That's..."
34190-63 = "[ns] \"If that one doesn't work out, I'll do it again.\""
34190-65 = "[ns] \"And if that doesn't work, I'll try again.\""
34190-67 = "[ns] \"And again, and again, and again! I won't stop!\""
34190-69 = "[ns13] \"When you fail, you just try again!\" \n[ns14] \"I won't accept failure for either of you.\""
34190-72 = "[ns] \"It doesn't matter if it takes the rest of our lives.\""
34190-74 = "[ns] \"I'll give you infinite chances, Mika! Saori!\""
34190-75 = "..."
34190-76 = "..."
34190-77 = "[ns15] \"You're my students! That's all you need.\"\n[ns16] \"Of course my students get to mess up!\"\n[ns17] \"I'll make it happen, no matter what!\""
34190-81 = "Cease this foolishness!"
34190-85 = "Your nauseating idealism holds no place in my basilica.  "
34190-86 = "[s] \"Beatrice! You...!\""
34190-87 = "Your theatrics have become entirely unamusing."
34190-88 = "Did you really think I wouldn't be watching you? This entire city belongs to me."
34190-89 = "I tire of your pathetic attempts to validate your existences, like insects to a flame. The time for games is over!"
34190-90 = "Now then, shall I commence the ritual?"
34190-92 = "Atsuko! No!"
34190-93 = "Are we out of time already?"
34190-94 = "The sun h-hasn't even risen yet...!"
34190-96 = "Ahahahahahaha! "
34190-97 = "Was it fun, holding onto your little hope of \"sunrise\"? The royal blood's halo will be destroyed before she has the chance to ever lay eyes on the sun again."
34190-98 = "And with her death, I will rise as the most magnificent being to walk Kivotos!"
34190-99 = "I'll never let you! Hime, I'm coming!"
34190-100 = "..."

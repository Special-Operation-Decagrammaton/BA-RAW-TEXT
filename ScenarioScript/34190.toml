[translation]
34190-1 = "第19話;無限の可能性"
34190-3 = "先生……姫を助けに行ったんじゃ……？"
34190-4 = "[s] \"もちろん行くよ。サオリと一緒に。\""
34190-5 = "……！！"
34190-10 = "ごめんリーダー……説得したけど止められなかった。"
34190-11 = "リーダー……無事でよかったです……いえ、無事じゃないですね？#nと、とにかく、よかったです……。"
34190-13 = "ミサキ……ヒヨリ……。"
34190-14 = "[ns] \"サオリと戦ったんだね、ミカ。\""
34190-17 = "せ、先生……えっと……。"
34190-18 = "[s] \"ごめんね、ミカ。\""
34190-19 = "せ、先生……！？"
34190-20 = "[s1] \"私がきちんと説明をしなければならなかったのに、できていなくて。\"\n[s2] \"ミカと向かい合って、きちんと話をしなければならなかったのに……。\""
34190-21 = "ど、どうして先生が私に謝るの……？"
34190-22 = "ど、どうして先生が私に謝るの……？"
34190-23 = "先生は悪くないよ……悪いのは私でしょう！？#nそれなのに、どうして……。"
34190-24 = "[s] \"生徒の命が懸かっていたから、サオリの手伝いをしているんだ。\""
34190-25 = "……。"
34190-26 = "[s] \"だから――アツコを助けたら、一緒にトリニティに戻ろう。\""
34190-27 = "……！！"
34190-28 = "ど、どうして……。"
34190-29 = "……そんな事したって、何も変わらないのに……。"
34190-30 = "私は……退学が決まってて……セイアちゃんも、私のせいで……。"
34190-31 = "[s] \"私が手伝うよ。\""
34190-32 = "……！！"
34190-33 = "[s3] \"ミカが直面していること、状況、望んでいた事……。\"\n[s4] \"私はミカがどんな子なのか、知っているから。\""
34190-34 = "あはは……先生は何を言ってるの？"
34190-35 = "あはは……先生は何を言ってるの？"
34190-36 = "私がどんな子なのか知ってる……？#n――私の何を、知ってるの？"
34190-37 = "私は……「魔女」だよ。"
34190-38 = "何か勘違いしてない？#n先生、ちゃんと私を見てる？この姿を――私が犯した罪を。"
34190-39 = "[ns] \"そうだね――ミカは悪い子だ。\""
34190-41 = "[ns5] \"人を騙し、己を偽り。\"\n[ns6] \"人を傷つけ、己を痛めつけ。\""
34190-44 = "[ns7] \"そんな事をしておきながら、\"\n[ns8] \"結果を受け入れる事ができずに泣いてしまう――そんな子だ。\""
34190-47 = "[ns9] \"でも、和解の手を差し伸べようとする優しさも持ち合わせているし、\"\n[ns10] \"嫌われる事を恐れて自傷してしまう、不安定な子供でもある。\""
34190-50 = "[ns11] \"ミカは魔女じゃないよ。\"\n[ns12] \"ミカは、人の言う事を聞かないだけの不良生徒だ。\""
34190-53 = "[ns] \"だから――ちゃんと、話を聞かせてほしいな。\""
34190-54 = "……。"
34190-55 = "なんで……"
34190-56 = "そのまま、振り向かないで行ってくれたら良かったのに……#nどうして私を苦しめるの……？"
34190-57 = "こんな……最後まで……。"
34190-58 = "まだ私にチャンスがあると信じさせるの……？"
34190-59 = "[s] \"大丈夫、ちゃんとあるよ。\""
34190-60 = "……？"
34190-61 = "[s] \"チャンスは、なければ作り出せばいいからね。\""
34190-62 = "……そ、そんなの無茶苦茶だよ。"
34190-63 = "[ns] \"もしそれがダメでも、次のチャンスを作ればいい。\""
34190-65 = "[ns] \"失敗したとしても、何度でも。\""
34190-67 = "[ns] \"道が続いている限り、チャンスは何回だって生み出せる。\""
34190-69 = "[ns13] \"ミカ、サオリ……\"\n[ns14] \"一度や二度の失敗で道が閉ざされるなんて事はないんだよ。\""
34190-72 = "[ns] \"――この先に続く未来には、\""
34190-74 = "[ns] \"無限の可能性があるんだから。\""
34190-75 = "……。"
34190-76 = "……。"
34190-77 = "[ns15] \"チャンスがないというのなら、私が何度だって作るよ。\"\n[ns16] \"――生徒が未来を諦める事なんてあってはいけない。\"\n[ns17] \"そういう事は、大人に任せて。\""
34190-81 = "戯言もそこまでになさい！"
34190-85 = "よくも私のバシリカでそんな戯言を言えますね。"
34190-86 = "[s] \"ベアトリーチェ……！\""
34190-87 = "興が冷めました。見世物はここまでといたしましょう。"
34190-88 = "――あなた達の位置を、私が知らないとでも？#nいいえ、私はただ見守っていただけ。"
34190-89 = "こんなつまらない余興はもう終わりにしましょう。#nさあ、今から私の全力を尽くしてあなた達を相手して差し上げます。"
34190-90 = "――儀式を、始めましょうか。"
34190-92 = "あ、アツコ……！！"
34190-93 = "そ、そんな……まだ時間は……"
34190-94 = "た、太陽はまだ昇ってないのに……。"
34190-96 = "何を勘違いしているのですか？"
34190-97 = "私が日が昇るまで待つとでも？#nいいえ、遊びは終わりです。ロイヤルブラッドのヘイローは、もう間もなく破壊されるでしょう。"
34190-98 = "そして――その神秘の欠片を通じ、私は高位の存在となるのです。"
34190-99 = "や、やめろ！！……姫！！アツコ！！"
34190-100 = "……。"
34190-104 = "それでは幕引きといたしましょう。"
34190-114 = "さぁ、ユスティナの聖女バルバラ。"
34190-115 = "戯言ばかりの先生の口を封じなさい！！"

34190-19 = "Sensei...?!"
34190-20 = "[s1] \"I should have explained it to you better.\"\n[s2] \"I should have told you, face-to-face.\""
34190-21 = "I don't understand. What do you mean?"
34190-22 = "I don't understand. What do you mean?"
34190-23 = "Don't do that, Sensei... This is all my fault."

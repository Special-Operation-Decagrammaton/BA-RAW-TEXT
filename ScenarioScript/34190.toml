34190-41 = "[ns5] \"ทั้งหลอกคนอื่น และหลอกตัวเอง\"\n[ns6] \"ทำให้คนอื่นเจ็บปวด และทำตัวเองเจ็บปวดด้วย\""
34190-44 = "[ns7] \"เป็นเด็กโง่ที่ต้องมาร้องไห้\"\n[ns8] \"เพราะไม่รู้ว่าจะทำยังไงต่อไปไงล่ะ\""
34190-47 = "[ns9] \"แต่ก็ยังเป็นเด็กอ่อนโยนที่ยื่นมือไปขอคืนดีกับอีกฝ่ายก่อน\"\n[ns10] \"แถมยังเป็นเด็กขี้กลัวที่ยอมทำร้ายตัวเองเพราะกลัวการถูกเกลียด\""
34190-50 = "[ns11] \"มิกะไม่ใช่แม่มดหรอก\" \n[ns12] \"เป็นเด็กดื้อที่ชอบก่อเรื่องต่างหาก\""
34190-53 = "[ns] \"ครูมาที่นี่เพื่อพูดคำนี้แหละ\""
34190-54 = "......."

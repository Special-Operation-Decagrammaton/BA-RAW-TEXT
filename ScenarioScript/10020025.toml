[translation]
10020025-5 = "ทำลาย <เครื่องทะลุมิติ> พื้นที่ 2 สำเร็จแล้วค่ะ!!"
10020025-11 = "คะ...คุณชิโรโกะ กำลังจะหนีไปอีกแล้วค่ะ!"
10020025-28 = "รอเดี๋ยว ชิโรโกะ!!"
10020025-29 = "ชิโรโกะจัง!!"
10020025-35 = "อึก......"
10020025-42 = "อะ...อ่า... พลาดอีกแล้วเหรอคะ...?"
10020025-48 = "พะ... แพทเทิร์นแบบนี้ ต่อไปก็จะวนลูปอีกรึเปล่าคะ..."
10020025-49 = "ทำแบบนี้จะจับตัวได้จริงๆ งั้นเหรอ...? เธอหนีเราไปได้ทุกครั้งเลยนะ..."
10020025-51 = "......"
10020025-52 = "ไม่หรอก มีบางอย่าง... แตกต่างไป"
10020025-53 = "คะ? "
10020025-54 = "เด็กคนนั้น... ชิโรโกะน่ะ... เหมือนจะพยายามหลบหน้าพวกเราอยู่นะ"
10020025-55 = "ละ...หลบหน้างั้นเหรอคะ?"
10020025-56 = "ฉันรู้สึกแบบนั้น รู้สึกเหมือนว่ายัยนั่นกลัวที่จะเผชิญหน้ากับพวกเรา..."
10020025-57 = "......"
10020025-59 = "อะไรน่ะ? ทะ...ทำไมกัน? ไม่เห็นมีอะไรต้องกลัวกันสักหน่อยเลยนี่นา?"
10020025-60 = "....."
10020025-68 = "อ่า... ยืนยัน <เครื่องทะลุมิติ> พื้นที่ที่ 2 ถูกทำลายแล้ว"
10020025-69 = "ตอนนี้เราก็ยึดพื้นที่มาได้สองในสี่... ถือว่าได้มาครึ่งหนึ่งแล้วละ"
10020025-70 = "ถ้าต่อไปยึดพื้นที่ได้อีกพื้นที่หนึ่งละก็... เราก็จะเข้าใกล้ชัยชนะกันแล้วละ"
10020025-72 = "ใช่แล้วค่ะ ตอนนี้เรายึดเครื่องประมวลผลของเรือลำนี้มาได้ครึ่งหนึ่งแล้ว ถ้างั้นก็บุกกันต่อเลยมั้ยคะ?"
10020025-73 = "จากนี้ไปเราจะติดตามพิกัดของคุณชิโรโกะค่ะ"
10020025-74 = "ถ้าจะผนึกความสามารถในการเคลื่อนย้ายมิติอย่างอิสระของเธอละก็ เราควรติดตามการเคลื่อนไหว#nของเธอทุกฝีก้าวจะดีกว่าค่ะ"
10020025-75 = "แฮ็กระบบระบบส่วนกลางของเรือเรียบร้อย... ฉันจะทำลายเครือข่าย ระบบสัญญาณเตือนภัย และระบบป้องกันทั้งหมดของเรือนี้เองค่ะ"
10020025-76 = "ถ้ามีความคืบหน้าอย่างไรจะแจ้งให้ทราบนะคะ"
10020025-77 = "...ค่ะ ขอฝากด้วยนะคะ"
10020025-78 = "ถ้างั้นคุณครูคะ พวกเราไปที่ด่านต่อไปกันเถอะค่ะ"
10020025-79 = "ที่นี่คือพื้นที่ที่ 3 ของเรืออะทราฮาซิสค่ะ ช่วยออกคำสั่งต่อไปด้วยค่ะ!"
10020025-81 = "มันก็เป็นอย่างนั้นละนะ ตั้งแต่นี้ไปเราจะช่วยครูเอง~"
10020025-82 = "ใช่ค่ะ! ตอนนี้เรายึดพื้นที่ไว้ได้ 2 พื้นที่แล้วทำให้วางใจเรื่องการป้องกันได้บ้างแล้วค่ะ"
10020025-83 = "ค่ะ การป้องกันเรืออุตนาพิชทิมจะให้ทางชมรมพัฒนาเกมกับชมรมชิมอาหารรับหน้าที่ต่อ ส่วนพวกเรา#nจะช่วยสนับสนุนคุณครูเองค่ะ"
10020025-85 = "ใช่แล้ว!! เราจะต้องหารุ่นพี่ชิโรโกะให้เจอ!! แล้วถ้าเป็นไปได้ก็จะจับตัวไว้ให้ได้เลยด้วย!!"
10020025-86 = "อื้อๆ! ได้เวลาออกล่าแล้วค่ะ~♧"

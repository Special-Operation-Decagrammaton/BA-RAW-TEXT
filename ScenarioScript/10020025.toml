[translation]
10020025-5 = "破壞第2區域的「次元引擎」了！！"
10020025-11 = "白，白子同學又想逃走了！"
10020025-28 = "等等！！"
10020025-29 = "白子醬！！"
10020025-35 = "……"
10020025-42 = "啊啊……！？又，又被逃走了……"
10020025-48 = "這種情況會一直重複下去嗎……"
10020025-49 = "有辦法阻止他逃跑嗎……？"
10020025-51 = "……"
10020025-52 = "不……有點不太對勁。"
10020025-53 = "……咦？"
10020025-54 = "那孩子……那個白子醬好像在躲著我們。"
10020025-55 = "我，我們嗎……？"
10020025-56 = "我有這種感覺。#n就像是害怕見到我們一樣……"
10020025-57 = "……"
10020025-59 = "為，為什麼……！？#n沒必要害怕我們吧！"
10020025-60 = "……"
10020025-68 = "已確認破壞了第2區域的「次元引擎」囉。"
10020025-69 = "這樣就確保四個之中的兩個了。#n已經取得一半了呢。"
10020025-70 = "……只要再占領一個區域，我們就有勝算了。"
10020025-72 = "是呢……既然已經獲得方舟一半的演算能力──#n稍微展開一點積極的行動吧。"
10020025-73 = "接下來──我會追蹤白子同學的位置。"
10020025-74 = "如果想抓住能自由活動的他……#n就得掛上隨時都能追蹤的鍊子才行♪"
10020025-75 = "我會試著入侵方舟的中樞系統──擾亂內部的防禦系統、警報裝置和通訊網。"
10020025-76 = "如果有成果的話我會告知的。"
10020025-77 = "……好的，拜託了。"
10020025-78 = "那麼老師，我們就進入下一個階段吧。"
10020025-79 = "突入「阿特拉哈西斯的方舟」的第3區域──#n請繼續進行指揮！"
10020025-81 = "事情就是這樣。#n接下來我們也會幫忙唷，老師。"
10020025-82 = "是！占領兩個區域後，防守也比較有餘裕了。"
10020025-83 = "船的防禦就交給遊戲開發部與美食研究會的大家，我們將會與老師一起前進。"
10020025-85 = "沒錯！我們要找出白子前輩，並且抓住他！"
10020025-86 = "嗯嗯！捕獲作戰開始～♧"

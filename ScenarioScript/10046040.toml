[translation]
10046040-1 = "Episode 4;We Do Not Negotiate with Gourmets"
10046040-2 = "...I find the whole situation a bit baffling, frankly."
10046040-3 = "But the heart of the matter is that you need barbecue ingredients? Cut, marinated, and ready to grill?"
10046040-7 = "Y-Yeah! Exactly!"
10046040-8 = "Sensei said that Gehenna's Gourmet Research Society might, um, have some to spare? On hand?"
10046040-9 = "I find that to be very...UNIQUE...but Sensei would never lie about something so important."
10046040-14 = "And what's the situation? Why do you need all these ingredients right now?"
10046040-15 = "Oh, you know how it is, Junko! Sometimes you get a craving, and it keeps growing and you got to have it and nothing else RIGHT NOW!"
10046040-16 = "Yeah, but for it to be so bad that you need to ask another school for help?"
10046040-17 = "And aren't you the Tea Party? That's like the top of Trinity, right? Why don't you just order your underlings to buy you groceries?"
10046040-18 = "Oh, a perpetual \"tea party\"? Cookies and tea and pastries whenever you like? Jealous...!"
10046040-19 = "No... Wait. Is that what you all actually do all day?"
10046040-24 = "I'm intrigued by your intuition, or possibly your reconnaissance, Sensei."
10046040-25 = "Because we do, in fact, currently have a top-quality barbecue set in our possession."
10046040-26 = "[s1] \"Really?!\"\n[s2] \"I was just guessing!\""
10046040-29 = "You took me here without knowing for sure?!"
10046040-30 = "But I'm glad. Now...all I need to do is charm them with the classic Trinity diplomacy."
10046040-31 = "Um, Haruna...from Gehenna, right? Such a lovely place."
10046040-32 = "How about you let me borrow that barbecue set, hmm?"
10046040-33 = "I mean, not for free! I'll pay you in full! Whatever you like..."
10046040-37 = "Ah, I can't do that anymore..."
10046040-38 = "Nevertheless, I'll personally reward you quite handsomely!"
10046040-39 = "Heehee, a negotiation? Fascinating. I can only imagine what fun I'd have with the Tea Party in my debt."
10046040-40 = "And, so...!"
10046040-41 = "I refuse."
10046040-42 = "Wh-Why...?"
10046040-43 = "We are epicures. Our highest calling, passion, and purpose lie in the cultivation and consumption of gourmet food."
10046040-44 = "And your attempt to barter away with something as banal as...currency is naive to the point of being insulting."
10046040-46 = "...As I thought."
10046040-50 = "Mika. I hope you don't take offense, but leave this matter to us."
10046040-51 = "Hasumi... Let's be reasonable!"
10046040-52 = "Maybe we can talk it out? Hmm, no... I have a bad feeling."
10046040-61 = "...Hasumi's right. I don't think this \"Society\" is open to peaceful negotiation."
10046040-62 = "You're also to blame, Sensei!"
10046040-63 = "[s3] \"H-Huh?!\"\n[s4] \"What did I do?!\""
10046040-66 = "You said you wanted to introduce us to your friends. You kept it a secret...and then it's the Gourmet Research Society?"
10046040-67 = "Do you have any idea of how much damage they've done to the Trinity District?"
10046040-68 = "They're dangerous! AND you brought Mika here!"
10046040-69 = "[s5] \"No! Hasumi, it's not like...\"\n[s6] \"They're...moderately dangerous.\""
10046040-74 = "Please! You know exactly what they are!"
10046040-75 = "The negotiation is over. Let's—"
10046040-77 = "W-Wait!"
10046040-83 = "Wait, Hasumi."
10046040-88 = "Put the weapon down. I'd like to try to talk this out..."
10046040-89 = "If we fight, things could escalate. People might get hurt."
10046040-90 = "And it could get so bad that Nagi or Seia would notice... So, please..."
10046040-91 = "...let's try to make it through the day in peace."
10046040-96 = "Mika..."
10046040-100 = "As you wish. I'll honor your request and keep watch for now."
10046040-101 = "But if I so much as sniff something suspicious, I'm jumping in."
10046040-102 = "Perfect! Of course! Thanks, Hasumi!"
10046040-108 = "Uh, well, President Haruna..."
10046040-109 = "I apologize for my carelessness earlier. Please forgive me."
10046040-110 = "Ha, that's quite all right. I know that most people have trouble understanding our philosophy."
10046040-111 = "As a matter of fact, I find it quite admirable that you are willing to try."
10046040-112 = "Um... So, I take it that you can't exchange gourmet food for money."
10046040-113 = "So, what if we do this? You hand over your barbecue ingredients, and I'll get you some even better ones in two days...three, tops!"
10046040-114 = "I see. That's quite the evolution, Mika."
10046040-115 = "Because gourmet food is truly priceless, you propose a more equitable trade."
10046040-116 = "Fufufu, now THIS was the caliber of diplomacy I expected from the Tea Party."
10046040-117 = "Th-Then?"
10046040-118 = "Indeed. I truly wish to comply. You've made such a sincere effort."
10046040-119 = "But, I refuse once more."
10046040-123 = "Huh?! Wasn't it going well?! Why?!"
10046040-124 = "Truly, the decision pained me as well. Your proposal grasped the value of gourmet food, but it lacked the passion for the process."
10046040-125 = "Consumption, for example. How long would the feeling, the satisfaction, of eating delicious food last for you?"
10046040-126 = "A day? A few hours? Hardly. The reality is that the pleasure itself vanishes in an instant."
10046040-127 = "In contrast, the time it takes to prepare fine ingredients and hone techniques is a never-ending journey. The pleasure is in the process of pursuing perfection."
10046040-128 = "It seems to me that you fail to grasp that nuance, Mika. I doubt you even enjoy grilling, quite frankly."
10046040-129 = "So, I must refuse your proposal."
10046040-130 = "The members and I have decided to properly enjoy our barbecue. That alone is enough reason to refuse."
10046040-137 = "Uh... What was that? This is worse than talking to Seia..."
10046040-141 = "Mika, she rejected your fair proposal. Now, please, let us handle the rest."
10046040-142 = "Hasumi?!"
10046040-143 = "I warned you that there is no negotiating with the Gehenna."
10046040-144 = "And on top of that, this is the Gourmet Research Society. They're even more stubborn."
10046040-149 = "Oh, my ears are burning!"
10046040-150 = "Yeah! Take that back!"
10046040-152 = "Based on your terrible attitudes, you should be grateful that we didn't arrest you on the spot."
10046040-153 = "There's no working with you people!"
10046040-155 = "Oh my. From my thoughts to your tongue."
10046040-156 = "Indeed. This was never a negotiation. This barbecue is a vital part of our research, and we shall not part with it."
10046040-157 = "Thank you for clarifying. Ichika, in position!"
10046040-161 = "Yes!"
10046040-163 = "H-Hold on! Everyone! Calm down!"
10046040-165 = "Mika, Sensei. There's no need to worry. We will compensate the Society as they deserve."
10046040-166 = "Since they didn't like our sweet words, how about we offer a plate of bullets?"
10046040-167 = "Haha... Hope you like takeout."
10046040-172 = "[ns7] \"I should have seen this coming.\"\n[ns8] \"Another bad ending...\""
10046040-180 = "One more thing."
10046040-187 = "Before we scrimmage, I simply must know!"
10046040-188 = "Mika."
10046040-192 = "Uh, me?"
10046040-193 = "Yes, you! Why are you so obsessed with barbecue, Mika?"
10046040-194 = "I do not mean to offend, but you don't seem like someone who shares our epicurean passion."
10046040-195 = "I was curious why you risked so much for barbecue—why you needed it this very moment?"
10046040-199 = "W-Well..."
10046040-205 = "I have a friend who worries a lot."
10046040-206 = "She gets so anxious when even the slightest thing goes astray."
10046040-207 = "For example, if we decided to have barbecue for lunch, and that fell through, she would constantly think over how she could have prevented it. She'd never be able to relax."
10046040-208 = "It can be annoying, true."
10046040-209 = "But she's really important to me, and I don't know how to help her with her stress..."
10046040-210 = "Instead, I just keep messing things up."
10046040-211 = "That's why I wanted her to forget everything just for the day and relax."
10046040-212 = "...But it looks like it's not going to work out."
10046040-217 = "I see... That's quite touching."
10046040-218 = "Hmm... But even if we compromise..."
10046040-223 = "Hey."
10046040-224 = "Haruna, can't we just give her the barbecue?"
10046040-225 = "Izumi...?"
10046040-226 = "I'm not well-spoken like Haruna, but even the best food tastes better with friends!"
10046040-227 = "And to ignore her story and just eat our barbecue like we planned... I don't think I have the stomach for it."
10046040-229 = "I agree."
10046040-230 = "And you, Junko?"
10046040-231 = "Well. After hearing her out, it feels personal. I'd like to help."
10046040-232 = "We'll have other barbecues. It's not the end of the world."
10046040-233 = "...In fact, I didn't know that was on today's menu until just now."
10046040-234 = "That's two votes. Akari, what do you think?"
10046040-238 = "I suppose the answer is obvious, but humor me."
10046040-243 = "Fufu. You know me so well, Haruna! Let them eat meat!"
10046040-244 = "...Any final objections, ladies?"
10046040-245 = "Very well. We shall relinquish the barbecue set to the Tea Party."
10046040-250 = "For real?!"
10046040-251 = "Just give it away?!"
10046040-252 = "[s] \"What?!\""
10046040-256 = "E-Everyone? Who do you take me for?"
10046040-257 = "Uh, do you want me to be kind...or honest?"
10046040-258 = "That's...painful enough, thank you."
10046040-262 = "I'm not simply giving it away for free. I'm saying that I accept her first proposal."
10046040-263 = "That was the promise of even better barbecue ingredients in three days, correct?"
10046040-264 = "Absolutely! The best I can get! I promise."
10046040-265 = "Then here you are."
10046040-271 = "All right! Sensei! Now, let's get grilling!"
10046040-276 = "..."
10046040-280 = "Huh?"
10046040-281 = "[s9] \"What's wrong, Mika?\"\n[s10] \"Are the ingredients bad?\""
10046040-284 = "Not at all. It's all perfect. This box...this brand...is exactly what I ordered."
10046040-290 = "Oh."
10046040-291 = "Wow... This is messy."
10046040-296 = "So the Gourmet Research Society stole your order in the first place?"
10046040-301 = "What an insult! The nerve!"
10046040-302 = "Mika! Give me the word, and I will sweep them to the ground!"
10046040-303 = "..."
10046040-308 = "(Well, that's it. There's no hope for peace now.)"
10046040-309 = "(Mika tried to be diplomatic and even sweet, but I think she's hit her limit.)"
10046040-310 = "(I guess I better get the armor out of the truck...)"
10046040-311 = "(How can I calmly break this to Nagisa?)"
10046040-316 = "...I'm grateful. It's exactly what I wanted."
10046040-323 = "Sorry, Hasumi. Can you let this slide for my sake? Please."
10046040-324 = "...Pardon?"
10046040-325 = "I understand it's frustrating and feels unfair, but I really need to get this barbecue started."
10046040-326 = "Surely... But are you actually okay with this?"
10046040-327 = "I am. There's someone more important right now."
10046040-332 = "..."
10046040-334 = "I-I don't get it. She's really not chasing us?"
10046040-335 = "She reminds me of the Head Prefect."
10046040-337 = "Fufu... Fufufu..."
10046040-338 = "I'll admit that I wasn't planning for it, but it seems luck shines on us."
10046040-339 = "Or perhaps it's my good karma!"
10046040-341 = "You're absolutely shameless..."
10046040-343 = "One more win for the power of friendship! ★"
10046040-346 = "Are we too late?!"
10046040-347 = "Hm... Even if we rush, we'll still arrive around 3:00."
10046040-348 = "We'll start the preparations. Mika, you stall the Tea Party."
10046040-349 = "Uh, yeah! I'll leave you to it!"
10046040-358 = "Uggghhh...!"
10046040-359 = "Nagisa, you're too tense."
10046040-360 = "You should be more relaxed. Use your... Honestly, it will be faster if I show you."
10046040-361 = "Now, you're pulling where you should be releasing. Right here, where my thumb is."
10046040-366 = "Owowow...?!"
10046040-370 = "A-Are you trying to kill me?!"
10046040-371 = "Do you think one touch could kill you?"
10046040-376 = "Ah, Sensei. And Mika."
10046040-377 = "[s11] \"What are you doing?\"\n[s12] \"Looks like you're having fun.\""
10046040-380 = "Clearly, we're practicing yoga. It's one of my little hobbies."
10046040-381 = "Yes. Seia said I should try it..."
10046040-382 = "I didn't foresee Nagisa following me so readily."
10046040-383 = "Oh, and Mika, how's lunch going? I thought I smelled a fire a while ago."
10046040-387 = "Well...yeah! It took a bit to get going, but we've just started grilling."
10046040-388 = "I'm so sorry for the wait! You both must be so hungry. ★"
10046040-389 = "...? Didn't you say we're having barbecue? It shouldn't take that long to cook..."
10046040-393 = "Ah, then."
10046040-399 = "Could you put a pot on?"

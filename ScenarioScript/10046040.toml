10046040-123 = "5;미카 수영복;04;어?! 괜찮은 분위기 아니었어?! 어째서?!\n#5;stiff"
10046040-124 = "3;하루나;99;앞서 말하지만, 저에게도 쉬운 대답은 아니었습니다. 미카 씨의 제안은, 미식을 향한 담론 그 자체였으니까요.\n#3;em;[한숨]\n#3;m3\n#5;dr"
10046040-125 = "3;하루나;02;과연 맛있는 음식을 먹었을 때의 체감, 인상, 그 행복과 만족감은 얼마나 지속될까요?"
10046040-126 = "3;하루나;05;일주일? 하루? 몇 시간? 아니요, 실제로는 거의 그 순간에 휘발되는 것이겠죠."
10046040-127 = "3;하루나;06;그에 비해 미식을 위해 준비하는 재료, 연마하는 기술에 소요되는 시간은 한없이 깁니다. 그리고 그것들은 돌아오지 않죠."
10046040-128 = "3;하루나;99;즉, 미식은 순간의 경험을 위해, 무수한 항구적 가치를 포기하는 덧없는 행위이다…… 저는 이렇게 정의하고 있습니다."
10046040-129 = "3;하루나;02;그러니 미카 씨의 제안은 거절하겠습니다.\n#3;em;[반짝]\n#3;greeting"

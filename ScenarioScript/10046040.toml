10046040-24 = "3;하루나;99;선생님이 이 사실을 어떻게 아셨는지는 모르겠지만.\n#3;a"
10046040-25 = "3;하루나;02;우연히 바비큐 세트를 가지고 있는 건 사실이네요. 어디 내놓아도 부끄럽지 않을 상등품으로요.\n#3;em;[반응]"

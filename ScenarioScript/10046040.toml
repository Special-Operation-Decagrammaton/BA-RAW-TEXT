10046040-13 = "2;이즈미;07\n4;준코;02\n#2;em;[?]\n#4;em;[?]\n#2;h\n#4;h\n#wait;800"
10046040-14 = "2;이즈미;07\n4;준코;01;급하게 바비큐 세트가 필요한 상황이란 게 뭐야?"
10046040-15 = "2;이즈미;03;나는 알 것 같은데. 종종 있지 않아? 지금은 이거 아니면 안 돼! 라는 느낌!\n#2;em;[재잘]\n#2;hophop"
10046040-16 = "2;이즈미;03\n4;준코;14;아무리 그래도 그렇지. 보통 다른 학교 학생한테 그런 일로 부탁해?"
10046040-17 = "2;이즈미;03\n4;준코;02;게다가 티파티라며? 티파티라면 트리니티의 엄청 높으신 분 아니야? 부하들한테 명령하면 척척 가져오는 거 아니야?"
10046040-18 = "2;이즈미;09;티파티? 아무 때나 차하고 쿠키를 먹을 수 있는 거야? 부러워~!\n#2;em;[반짝]"
10046040-19 = "2;이즈미;09\n4;준코;11;아니…… 응? 전혀 다른 것 같으면서, 비슷한 거 같기도……?\n#4;em;[땀]"

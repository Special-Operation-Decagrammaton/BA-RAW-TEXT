10046040-39 = "1;하루나;02;후후, 교섭인가요? 흥미롭군요. 다름 아닌 티파티 보증이라면, 분명 섭섭하지 않은 보답을 받겠죠.\n#1;em;[음표]\n#1;ar\n#3;m5"

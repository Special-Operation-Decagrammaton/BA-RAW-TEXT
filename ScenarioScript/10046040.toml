10046040-7 = "3;미카 수영복;13;으, 응! 그 말대로야!\n#3;stiff"
10046040-8 = "3;미카 수영복;14;선생님이 아마도 게헨나의 미식연구회라면, 가지고 다녀도 이상하지 않다고!"
10046040-9 = "3;미카 수영복;08;……역시 좀 이상하다고는 생각하지만, 선생님이 이런 일로 거짓말할 리는 없고.\n#3;em;[땀]"

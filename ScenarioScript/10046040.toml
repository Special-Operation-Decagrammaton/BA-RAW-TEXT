[translation]
10046040-1 = "第4話;不與美食家談判"
10046040-2 = "雖然不清楚詳細的來龍去脈……"
10046040-3 = "不過根據老師的說法，似乎是突然急需烤肉食材是嗎？#n而且還是馬上就能烤的那種？"
10046040-7 = "啊，嗯！就是這樣沒錯！"
10046040-8 = "老師說如果是「格黑娜的美食研究會」的話，就算隨身攜帶烤肉食材也不奇怪！"
10046040-9 = "……雖然我還是有點懷疑，但老師不太可能為了這種事說謊才對。"
10046040-14 = "到底是什麼情況才會突然需要烤肉套組啊？"
10046040-15 = "我好像能懂耶。#n偶爾就是會有「現在非這個不可！」的感覺！"
10046040-16 = "但這再怎麼說也太誇張了吧。#n一般會因為這種事情拜託其他學園的學生嗎？"
10046040-17 = "而且還是「茶會」的人耶？#n茶會不是三一地位超高的人嗎？叫部下去拿不就好了。"
10046040-18 = "茶會？是那種隨時都能吃餅喝茶的地方嗎？好羨慕哦～！"
10046040-19 = "才不……嗯？#n本來想說完全不一樣的，結果好像又有點像……？"
10046040-24 = "雖然不知道老師是如何得知這項消息的……"
10046040-25 = "不過我們手上確實剛好有烤肉套組。而且是上得了檯面的高級品。"
10046040-26 = "[s1]「真的嗎！？」\n[s2]「瞎貓碰上死耗子！」"
10046040-29 = "怎麼連老師自己也那麼驚訝！？"
10046040-30 = "不過真是太好了～#n現在只要說服他讓給我們就行了。"
10046040-31 = "那個，這位格黑娜的……是叫羽留奈醬來著？"
10046040-32 = "可以請你把烤肉套組讓給我們嗎？"
10046040-33 = "當然不是要你白白送給我們唷！#n我會給你相應的報酬，你要開多少都……"
10046040-37 = "糟糕，現在不能這樣做了……"
10046040-38 = "總之，我會給你滿意的補償的！"
10046040-39 = "呵呵，是要談判嗎？有意思。#n有茶會擔保的話，肯定能得到不錯的回報吧。"
10046040-40 = "那麼……！"
10046040-41 = "但是我拒絕。"
10046040-42 = "咦，為什麼！？"
10046040-43 = "我們是美食家。#n從美食中獲得的體驗與價值，是無法用來金錢衡量的。"
10046040-44 = "更何況你還想用金錢來交換……這種想法本身就足以讓人受辱。"
10046040-46 = "……果然會變成這樣。"
10046040-50 = "彌香大人。雖然有些僭越，但這裡就交給我們吧。"
10046040-51 = "等等，蓮實前輩……這樣未免太快翻臉了。"
10046040-52 = "不妨再談談看……再談談……"
10046040-61 = "……不，我也同意蓮實前輩的看法。#n對方感覺就是完全講不通的類型。"
10046040-62 = "以這件事情而言，老師也同樣有錯。"
10046040-63 = "[s3]「咦！？」\n[s4]「怎麼突然講到我！？」"
10046040-66 = "突然說要介紹人給我們認識，結果竟然是美食研究會。"
10046040-67 = "您知道他們至今為止，對三一自治區造成了多少損害嗎？"
10046040-68 = "不僅如此，還把彌香大人帶到了這些危險人物面前。"
10046040-69 = "[s5]「不是啦！其實沒有蓮實想的那麼……」\n[s6]「雖然要說那些孩子有點危險……也，也沒錯啦……」"
10046040-74 = "您看！老師自己不也是這麼認為的嗎！"
10046040-75 = "談判就到此為止。現在立刻……"
10046040-77 = "等，等等！"
10046040-83 = "稍安勿躁，蓮實醬。"
10046040-88 = "我還想再談談看。#n說不定能找到妥協點。"
10046040-89 = "要是打起來的話，事情就會鬧大了。"
10046040-90 = "搞不好會被渚醬或聖亞醬察覺到……所以拜託你了。"
10046040-91 = "至少今天這天，我希望可以平靜地結束。"
10046040-96 = "彌香大人……"
10046040-100 = "沒辦法了。#n既然這是彌香大人的請求，我會暫時觀察情況。"
10046040-101 = "不過只要我判斷有一絲危險，就會毫不猶豫地介入。"
10046040-102 = "嗯，這樣就夠了！謝謝你，蓮實醬！"
10046040-108 = "那，那個，羽留奈醬？"
10046040-109 = "我好像沒想太多就亂說話了，對不起。"
10046040-110 = "呵呵，沒關係。#n我們也明白自己的理念經常受到大眾的誤解。"
10046040-111 = "你並非部員卻願意努力理解我們的理念……反而讓我感到相當佩服。"
10046040-112 = "所以……嗯，美食是無法用金錢衡量的對吧？"
10046040-113 = "那不如這樣吧？#n如果你願意讓出烤肉食材的話，我會在兩天……#n不，三天之內準備更好的烤肉食材給你們！"
10046040-114 = "是個有趣的提案呢。"
10046040-115 = "既然美食的價值無法用金錢衡量……就以美食來交換美食。"
10046040-116 = "呵呵呵，不愧是傳聞中的茶會。果然不是泛泛之輩。"
10046040-117 = "那，那麼？"
10046040-118 = "考量到你的誠意，我本來是該答應的……"
10046040-119 = "但我還是拒絕。"
10046040-123 = "咦！？氣氛不是已經變好了嗎！？為什麼！？"
10046040-124 = "我必須事先聲明，這對我來說也不是個容易的決定。#n因為彌香同學的提案本身，就是一場關於美食的辯論。"
10046040-125 = "試想，在我們享用美食時獲得的感受、印象、幸福與滿足感……究竟能持續多久呢？"
10046040-126 = "是一週？一天？還是幾個小時？#n不，其實絕大多數都在當下的瞬間就消散了吧。"
10046040-127 = "相較之下，準備食材、磨練烹調技術所花費的時間……是無限漫長且是無法回收的。"
10046040-128 = "換言之，美食是一種為了剎那間的體驗，捨棄無數永久價值的虛無行為。#n……我是這麼定義的。"
10046040-129 = "所以，我拒絕彌香同學的提案。"
10046040-130 = "我和部員們[ruby=・]現[/ruby][ruby=・]在[/ruby]就要吃烤肉。#n光是這個理由就已經足夠充分了。"
10046040-137 = "……那個，你到底在說什麼啊？#n感覺就像聖亞醬一分為二了一樣。"
10046040-141 = "果然協商破裂了嗎？#n彌香大人，現在就交給我們吧。"
10046040-142 = "蓮實醬！？"
10046040-143 = "我先前也提過，所謂的「常識」在格黑娜面前是不具參考價值的。"
10046040-144 = "更別說是美食研究會了。#n光是開口交談，損失就在不斷擴大。"
10046040-149 = "哎呀，我的耳朵突然癢癢的呢～"
10046040-150 = "喂！你這話說得也太過分了吧！？"
10046040-152 = "想想你們至今為止做過的事好嗎！光是沒被當場逮捕就該心存感激了！"
10046040-153 = "要人妥協簡直是癡人說夢！"
10046040-155 = "哎呀，那是我要說的台詞呢。"
10046040-156 = "美食之道不容妥協。#n這場烤肉也是我們美食探索的一部分。"
10046040-157 = "這樣就破局了呢。#n一花！"
10046040-161 = "是！"
10046040-163 = "等，等等！大家先冷靜一下！"
10046040-165 = "彌香大人、老師，請不用擔心。#n交給我們來談吧。"
10046040-166 = "只不過是用子彈取代言語而已。"
10046040-167 = "終究還是得走到這一步呢，哈哈。"
10046040-172 = "[ns7]「啊～結果還是變成這樣了嗎？」\n[ns8]「搞砸了呢★」"
10046040-180 = "──在那之前。"
10046040-187 = "能讓我問最後一個問題嗎？"
10046040-188 = "彌香同學。"
10046040-192 = "咦，我嗎？"
10046040-193 = "彌香同學如此執著於烤肉的理由是什麼？"
10046040-194 = "雖然這麼說可能有些失禮，但彌香同學看起來並不像是走在美食之路上的人。"
10046040-195 = "因此我有點好奇……是不是有什麼理由，讓你「非得現在」吃到烤肉不可。"
10046040-199 = "那，那是因為……"
10046040-205 = "我有個容易顧慮很多的朋友。"
10046040-206 = "是只要事情跟計畫有一點點出入，就會焦慮到無法放鬆的類型。"
10046040-207 = "比如中午原本要吃烤肉的計畫要是被打亂的話，#n他就會悶著頭煩惱是不是出了什麼問題，甚至沒辦法好好休息……"
10046040-208 = "個性很麻煩對吧？"
10046040-209 = "但他是我非常重要的朋友，我卻什麼忙都幫不上……"
10046040-210 = "不，反而還老是給人家惹麻煩。"
10046040-211 = "所以我希望至少今天能讓他忘掉一切，好好休息一下。"
10046040-212 = "……雖然看起來不太順利就是了。"
10046040-217 = "原來如此……還有這層原因啊。"
10046040-218 = "唔嗯……即便如此，如果妥協的話……"
10046040-223 = "我說啊，羽留奈。"
10046040-224 = "不如就把烤肉讓給他們吧？"
10046040-225 = "泉同學……？"
10046040-226 = "我雖然不像羽留奈那麼會講話……但美食就是要開開心心地吃才會更好吃，不是嗎？"
10046040-227 = "聽完這些話之後再吃……感覺就沒那麼好吃了。"
10046040-229 = "我也有同感。"
10046040-230 = "連淳子同學也……？"
10046040-231 = "怎麼說呢……聽完他的理由後，就覺得不是別人的事了。"
10046040-232 = "就算現在不吃這頓烤肉，其實也沒什麼大不了的吧？"
10046040-233 = "……而且我也是剛剛才知道這是烤肉。"
10046040-234 = "兩位是這麼想的啊。#n那麼，亞伽里同學呢……"
10046040-238 = "哎呀，根本無須多問對吧？答案顯而易見。"
10046040-243 = "呵呵呵★羽留奈果然了解我～"
10046040-244 = "部員們的意見是如此嗎……"
10046040-245 = "好吧。我們願意讓出烤肉食材。"
10046040-250 = "真的嗎！？"
10046040-251 = "真假！？"
10046040-252 = "[s]「真的假的！？」"
10046040-256 = "各，各位？你們到底是怎麼看待我的？"
10046040-257 = "呃，你要我老實說嗎？還是讓我想想怎麼形容比較不傷人？"
10046040-258 = "這個反應就已經夠傷人了……"
10046040-262 = "當然我們並不會免費提供，而是選擇接受最初的條件。"
10046040-263 = "三天後會收到更好的烤肉食材，對吧？"
10046040-264 = "嗯，謝謝你！我一定會遵守約定的！"
10046040-265 = "食材就在這裡。"
10046040-271 = "太好了，老師！我們快回去準備烤肉吧……"
10046040-276 = "…………"
10046040-280 = "咦？"
10046040-281 = "[s9]「怎麼了，彌香？」\n[s10]「食材有什麼問題嗎？」"
10046040-284 = "沒有，只是這個箱子和裡面的內容物……#n跟我一開始準備的烤肉食材一模一樣耶？"
10046040-290 = "哎呀。"
10046040-291 = "……這下完蛋了。"
10046040-296 = "也就是說，襲擊卡車的那夥人，從一開始就是美食研究會……？"
10046040-301 = "果然這場談判無效！"
10046040-302 = "彌香大人！！#n只要您一聲令下，我就立刻將這些恐怖分子一網打盡！！"
10046040-303 = "……"
10046040-308 = "（啊，這下恐怕真的沒救了。畢竟現在連阻止的理由都沒了……）"
10046040-309 = "（雖然表面上一直在讓步，但彌香大人原本就是有名的強硬派）"
10046040-310 = "（看來衝突已經無法避免了，那麼……）"
10046040-311 = "（得先想想該怎麼向渚大人報告才行）"
10046040-316 = "……太好了。我還以為弄丟了呢。"
10046040-323 = "對不起，蓮實醬。這次就看在我的面子上放過他們吧。#n……拜託了。"
10046040-324 = "……咦？"
10046040-325 = "雖然可能會有點鬱悶和委屈……但我希望可以盡快回去。"
10046040-326 = "我是沒問題……#n不過彌香大人，這樣真的可以嗎？"
10046040-327 = "嗯，現在有更重要的事。"
10046040-332 = "…………"
10046040-334 = "那，那個，我們剛才是不是撿回一命了啊！？"
10046040-335 = "我，我也感受到了一股撞見風紀委員長的感覺……"
10046040-337 = "呵呵……呵呵呵……"
10046040-338 = "雖然並非有意為之，看來運氣似乎在重要的選擇中站在了我們這邊呢。"
10046040-339 = "這就是平時行善累積的福報嗎？"
10046040-341 = "虧你好意思這麼說……"
10046040-343 = "啊哈……畢竟牽涉到女孩子間的友情嘛～★"
10046040-346 = "果然還是來不及了吧！？"
10046040-347 = "唔嗯……就算盡可能快，恐怕也要三點才能抵達。"
10046040-348 = "我們會先開始準備，請彌香大人先去找茶會的二位吧……！"
10046040-349 = "嗯，嗯！那就拜託你們了！"
10046040-358 = "唔呃……！"
10046040-359 = "渚，你從剛才開始就太用力了。"
10046040-360 = "試著再放鬆一點。#n唔嗯……果然要用語言說明動作有點困難啊。"
10046040-361 = "來，試著拉伸看看我現在用手指按壓的部位──"
10046040-366 = "痛痛痛……！？"
10046040-370 = "你，你想殺了我嗎！？"
10046040-371 = "被我的手指碰一下就會死嗎？"
10046040-376 = "啊，老師。還有彌香。"
10046040-377 = "[s11]「你們在做什麼？」\n[s12]「看起來挺開心的嘛？」"
10046040-380 = "如你所見在做瑜伽哦。#n算是我的小小興趣之一吧。"
10046040-381 = "嗯……是聖亞同學推薦的……"
10046040-382 = "雖然我也沒想到渚會乖乖地跟著做就是了。"
10046040-383 = "對了，彌香。午餐準備得怎麼樣了？#n我好像從剛才就聞到了烤東西的味道。"
10046040-387 = "啊～稍微花了點時間，現在才正要開始烤。"
10046040-388 = "大家應該都餓了吧，抱歉讓你們久等了～★"
10046040-389 = "……午餐不是烤肉嗎？#n準備起來應該不會花太多時間才對……"
10046040-393 = "啊，這麼看來……"
10046040-399 = "能請你幫忙準備下午茶嗎？"
10046040-400 = "…………咦？"
10046040-401 = "既然午餐時間會延後，吃完也差不多到下午茶時間了吧。"
10046040-402 = "什，什麼？"
10046040-407 = "可以麻煩你準備嗎？"

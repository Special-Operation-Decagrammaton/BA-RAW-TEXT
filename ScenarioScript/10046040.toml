10046040-110 = "3;하루나;02;후후, 괜찮습니다. 저희의 철학이 대중으로부터 오해를 사는 일이 많다는 건 이미 알고 있으니까요.\n#3;em;[재잘]"
10046040-111 = "3;하루나;01;오히려 저희 부원이 아니면서도 저의 철학을 이해하려 노력하신다는 점에서, 꽤나 진심으로 탄복하고 있답니다."
10046040-112 = "5;미카 수영복;02;그러니까…… 응, 미식은 돈으로 바꿀 수 없다는 거지?"
10046040-113 = "5;미카 수영복;03;그러면 이건 어때? 바비큐 재료를 양도해 준다면, 이틀…… 아니, 사흘 안에 더 좋은 바비큐 재료를 구해다 줄게!\n#5;em;[반짝]\n#5;hophop"
10046040-114 = "3;하루나;99;과연, 흥미로운 접근 방식이군요."
10046040-115 = "3;하루나;02;미식의 가치는 돈으로 환산할 수 없다…… 그러니, 미식에는 미식으로."
10046040-116 = "3;하루나;00;후후후, 과연 소문의 티파티. 상당히 재미있는 분이시군요.\n#3;em;…"

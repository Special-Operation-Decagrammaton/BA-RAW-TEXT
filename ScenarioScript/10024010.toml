[translation]
10024010-1 = "#title;1화;진미가효: 진귀한 맛과 좋은 안주"
10024010-2 = "#place;현무상회"
10024010-3 = "3;루미;00\n#3;a\n#3;h\n#wait;1000"
10024010-4 = "3;루미;00;두채로 준비한 불도장은 어땠어? 이제 주채로 넘어가자고. \n#3;em;[반응]"
10024010-5 = "3;루미;03;전가복을 만들어 봤어. 말린 해삼, 전복, 소라를 야채와 함께 볶아낸 요리지. 부재료로 돼지고기와 새우도 좀 섞어 봤고."
10024010-6 = "#st;[0,0];instant;1;"
10024010-7 = "#clearST"
10024010-8 = "#wait;1000"
10024010-9 = "#wait;1000"
10024010-10 = "#wait;1500"
10024010-11 = "[ns] \"마, 맛있어! 처음 먹어보는 맛이야……!\""
10024010-12 = "3;루미;00;잘됐네. 주방장으로서는 손님이 맛있게 먹어 주면 최고지. \n#3;em;[음표]"
10024010-13 = "3;루미;01;다 먹으면 탕채로 넘어갈 테니까 준비해 둬. 새우 완자탕을 준비할 거야."
10024010-14 = "[s] \"더 나오는 거야?!\""
10024010-15 = "3;루미;02;무슨 소리야? 이제 시작인데.\n#3;em;[?]"
10024010-16 = "3;루미;01;탕채가 끝나면 면점과 첨채가 남아 있으니까."
10024010-17 = "3;루미;03;양도 적당하게 한 입에서 두 입 거리 정도로만 준비했으니까, 편하게 즐겨."
10024010-18 = "[s1] \"마음은 고마운데, 감당할 수 있을지 걱정이야……\"\n[s2] \"어른의 위장은…… 여고생만큼 튼튼하지 않단다……\""
10024010-19 = "#wait;100"
10024010-20 = "#wait;100"
10024010-21 = "3;루미;02;그, 그런가?\n#3;em;[?!]\n#3;shake"
10024010-22 = "3;루미;00;그래도 뭐, 힘내면 어떻게든 될 거야! 파이팅!\n#3;greeting"
10024010-23 = "#st;[0,0];instant;1;"
10024010-24 = "#clearST"
10024010-25 = "5;레이죠;00\n#5;al\n#3;m1\n#3;h\n#5;h\n#wait;1000"
10024010-26 = "5;레이죠;02;회장님? 탕이 다 끓었습니다. 언제 내올까요?\n#5;em;[반응]"
10024010-27 = "3;루미;01;조금 기다려. 우리 손님…… 선생님이 아직 준비가 안 되신 것 같으니까.\n#3;em;[...]"
10024010-28 = "3;루미;03;이왕 온 김에 서로 인사라도 하는 게 어때? 여기는 레이죠. 고맙게도 내 경호를 맡고 있지."
10024010-29 = "5;레이죠;99;레이죠라고 합니다. 잘 부탁드립니다. 선생님.\n#5;greeting"
10024010-30 = "[s] \"안녕, 레이 쨩!\""
10024010-31 = "5;레이죠;04;레이…… 쨩, 이요?\n#5;em;[?]"
10024010-32 = "5;레이죠;02;신선하군요. 그렇게 불리는 것은 처음입니다."
10024010-33 = "3;루미;00;레이 쨩인가. 좋네. 앞으로는 나도 그렇게 부를까?\n#3;em;[음표]"
10024010-34 = "5;레이죠;14;……자제 부탁드립니다. 회장님."
10024010-35 = "#all;hide"
10024010-36 = "3;레이죠;99;과연, 듣던 대로 이렇게 기선 제압을 하시는 거군요. 선생님.\n#3;closeup\n#3;em;[...]"
10024010-37 = "3;레이죠;05;기선 제압은 쿵후의 기본이라고, 영화에서 보았습니다.\n#3;closeup\n#bgshake"
10024010-38 = "[s] \"아니…… 난 그저 순수하게 반가워서……\""
10024010-39 = "#all;hide"
10024010-40 = "1;루미;02\n5;레이죠;99;상대를 방심하게 하기 위한 겸양까지. 과연 선생님이십니다.\n#5;greeting"
10024010-41 = "1;루미;03;자. 레이죠. 거기까지만 해 둬. 선생님이 당황하잖아.\n#1;em;[반응]"
10024010-42 = "[s] \"나, 괜한 말을 한 건 아니지?!\""
10024010-43 = "5;레이죠;01\n1;루미;00;하하하, 레이죠는 매사에 진지하지만, 쿵후 이야기만 나오면 사람이 바뀌거든."
10024010-44 = "1;루미;01;뭐, 선생님이 당황하는 모습을 볼 수 있었다는 것만으로 이득을 본 것 같지만."
10024010-45 = "[s3] \"그런데…… 오늘만 그런 건가? 손님이……\"\n[s4] \"나 말곤 손님이 없어 보이는데, 무슨 일이라도 있어?\""

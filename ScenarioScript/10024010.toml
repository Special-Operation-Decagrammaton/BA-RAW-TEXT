10024010-102 = "#na;레이죠;그건 전통을 중시하는 게 아닙니다. 전통에 빠져 사는 것이죠.\n#fontsize;80"
10024010-103 = "#all;hide"
10024010-104 = "3;레이죠;05;다른 건 몰라도 현무상회와…… 회장님의 요리를, 전통을 지키지 않았다며 깎아내리는 것은 용서할 수 없습니다!\n#3;a\n#3;closeup\n#3;em;[!]"
10024010-105 = "3;레이죠;07;요리는 발전해야 합니다! 먹던 것만 먹으면 물려서 아무것도 못 먹게 될 테니까요!\n#3;closeup"
10024010-106 = "3;레이죠;09;현무상회가 요리의 발전을 위해 얼마나 많은 노력을 하는지, 삭은 메추리알 껍질만큼도 모르면서……!\n#3;closeup\n#3;em;[빠직]"

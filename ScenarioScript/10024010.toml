[translation]
10024010-1 = "Episode 1;Rare Delicacies, Tasty Treats"
10024010-2 = "Black Tortoise Promenade"
10024010-4 = "How was your Buddha's Temptation soup? Shall we move on to the main course? "
10024010-5 = "I've made Happy Family. It has dried sea cucumber, abalone, and conch, stir-fried with vegetables. You'll also find bits of pork and shrimp."
10024010-11 = "[ns] \"I-I-It's delicious! I've never had anything like it!\""
10024010-12 = "Wonderful. As head chef, there's nothing I love hearing more than a customer enjoying their food. "
10024010-13 = "After you're done with that, the next course is a nice shrimp wonton soup."
10024010-14 = "[s] \"You mean there's more?!\""
10024010-15 = "Of course there's more. We've just started!"
10024010-16 = "After the main soup, there's also noodles and dessert."
10024010-17 = "I've portioned out each course to get the most flavor out of each dish, so please enjoy."
10024010-18 = "[s1] \"Th-Thank you, but I'm not sure if I can eat that much...\"\n[s2] \"The stomach of an adult is no match for a high schooler's...\""
10024010-21 = "Ah, is that so?"
10024010-22 = "In that case... I wish you good luck!"
10024010-26 = "President, soup's ready. Shall I bring it out?"
10024010-27 = "Not yet. Our guest... Sensei doesn't seem to be ready."
10024010-28 = "But since you're here, why don't you say hello? Reijo here works hard to keep me safe."
10024010-29 = "The name's Reijo. Nice to meet you, Sensei."
10024010-30 = "[s] \"It's a pleasure, Rei.\""
10024010-31 = "Did you call me...Rei...?"
10024010-32 = "Intriguing. No one has called me that before."
10024010-33 = "Rei... Shall I call you that from now on, too?"
10024010-34 = "...Please show mercy, President."
10024010-36 = "But Sensei, I'm impressed. You threw me off balance with your opening move."
10024010-37 = "In the movies, keeping your foe off balance is a fundamental skill in kung fu."
10024010-38 = "[s] \"It's nothing like that! I'm just being friendly...\""
10024010-40 = "Ah, using modesty to catch your opponent off guard... You know your stuff!"
10024010-41 = "That's enough, Reijo. You're making Sensei sweat."
10024010-42 = "[s] \"Did I say something wrong...?\""
10024010-43 = "Don't pay her any mind. Reijo is as sharp as they come...until you get her going on about kung fu."
10024010-44 = "I will say, I didn't mind seeing her put you on the spot..."
10024010-45 = "[s3] \"Anyway! Did you close the restaurant just to serve me today?\"\n[s4] \"I expected it would be more crowded here, to tell the truth.\""
10024010-48 = "Ah... That's why I asked you here, actually..."
10024010-49 = "Perhaps you should see this for yourself. If anything happens..."
10024010-50 = "...Reijo will keep you safe."
10024010-51 = "I'll see to it, President."
10024010-55 = "Rumi pointed behind her with her thumb."
10024010-56 = "And then..."
10024010-60 = "Huh? You got a problem?"
10024010-65 = "It's rude to point. Don't you know we're customers?"
10024010-66 = "Black Tortoise Promenade's customer service is the worst!"
10024010-67 = "This is why they got to resort to dirty business."
10024010-71 = "So... As you can see..."
10024010-72 = "[s] \"Who are they?\""
10024010-73 = "They're...members of Genryumon."
10024010-74 = "They order a single plate of stir-fried eggs, then loiter in the restaurant for hours."
10024010-75 = "All of our other customers are scared off..."
10024010-76 = "And not by the stir-fried eggs, of course!"
10024010-77 = "Our egg dishes are affordable, but as delicious as any delicacy. It's a beautiful thing..."
10024010-78 = "But you see how it's a problem for someone to take up a table after ordering just one thing?"
10024010-79 = "It's an obstruction of our business."
10024010-80 = "Well, that's the whole reason they came here, isn't it?"
10024010-81 = "[s] \"You can't ask them to leave?\""
10024010-82 = "Erm... They're from Genryumon..."
10024010-83 = "Maybe you don't know about the relationship between the Black Tortoise Promenade and Genryumon."
10024010-84 = "[s5] \"I take it you don't get along very well.\"\n[s6] \"I heard nobody's willing to get between you two...\""
10024010-87 = "In a nutshell, yes. The truth is a bit more complex, of course..."
10024010-92 = "Genryumon is basically the student council of Shanhaijing."
10024010-96 = "To them, there's nothing more important than honor and tradition."
10024010-100 = "Some might say they value tradition a little too much..."
10024010-102 = "They don't 'value' tradition. They're obsessed with it."
10024010-104 = "If they had their way, the Black Tortoise Promenade would be stuck making the exact same recipes for a thousand years!"
10024010-105 = "Cooking must evolve! It must progress! If you always eat the same meal every day, is that really living?!"
10024010-106 = "They don't understand the work we do here at all! We're pushing the limits of cuisine itself...!"
10024010-107 = "You may want to lower your voice, Reijo..."
10024010-108 = "Hey! You guys talking about us?"
10024010-109 = "Just you wait, you Tortoise punks. We'll bust you so hard your grandkids'll be born in handcuffs."
10024010-110 = "...I was trying to avoid this."
10024010-111 = "Genryumon has its reasons for putting so much effort into upholding tradition..."
10024010-112 = "But sometimes I wish they could be a little more flexible about it."
10024010-113 = "You can't run a large organization well without a little flexibility, you know."
10024010-114 = "[s] \"I see. It IS complicated...\""
10024010-115 = "...Yes. This isn't something I can discuss openly, but I hear quite a bit of grumbling about how Genryumon runs things."
10024010-116 = "And Genryumon doesn't exactly look on us with kind eyes."
10024010-117 = "But things have come to a head lately. There's this rumor, you see..."
10024010-118 = "[s] \"What kind of rumor?\""
10024010-119 = "There's a plant that grows only in Shanhaijing. Ten-thousand-year ginseng."
10024010-120 = "Because it's so hard to grow, its distribution and use are strictly controlled. And export of the ginseng is forbidden."
10024010-121 = "But rumor has it that the Black Tortoise Promenade has been smuggling ten-thousand-year ginseng off campus."
10024010-122 = "Ever since, we've had Genryumon members as regular 'customers' while they 'investigate us.'"
10024010-123 = "And, thanks to their charming attitudes, all of our actual customers have been frightened away..."
10024010-128 = "Call it a rumor all you want. You can't fool us."
10024010-129 = "The Black Tortoise Promenade thinks it can get away with anything!"
10024010-130 = "But you keep bringing in garbage from the outside. It'll catch up with you sooner or later!"
10024010-131 = "If you just followed Genryumon's rules to begin with, we wouldn't have to be here!"
10024010-136 = "Reijo already explained this, but cooking that doesn't evolve is already dead."
10024010-137 = "That's true of everything! We have to embrace new things as a society."
10024010-139 = "Believe what you want. That doesn't mean you can just ignore Genryumon's orders."
10024010-140 = "Hell, the Black Tortoise Promenade wouldn't exist without Genryumon!"
10024010-142 = "Fine, fine. Genryumon gives us so much. Can we move on now?"
10024010-143 = "Backing down already? You're just as spineless as I thought!"
10024010-144 = "You won't blow us off so easy. We know you're hiding something!"
10024010-145 = "If you say so. Have a nice day."
10024010-147 = "So... Will you help us? I want to get to the bottom of these tensions between Genryumon and Black Tortoise Promenade."
10024010-148 = "They come here and pick a fight, and you call it 'tensions'? We should be fighting back!"
10024010-149 = "Do keep your temper, Reijo. Lashing out will only make things harder for us in the long run."
10024010-156 = "[ns] \"You two are from Genryumon, right?\""
10024010-157 = "Hmm? Who's asking? Don't think we'll go easy on you just 'cause you're an adult!"
10024010-158 = "Maybe you're not from around here, but we all follow Shanhaijing's rules here. That includes you. "
10024010-159 = "And that means... I'd be careful of the company you keep, stranger. You might get mistaken for an enemy of Genryumon."
10024010-160 = "So pick your friends wisely... Heh heh heh..."
10024010-164 = "Watch your manners! This is the Sensei from Schale."
10024010-165 = "Wh-What? From Schale...?"
10024010-166 = "Oh, geez. What do we do...?"
10024010-167 = "[s] \"I'd like to meet the leader of Genryumon.\""
10024010-168 = "You wanna meet Madam Kisaki? Even if you really are THAT Sensei..."
10024010-169 = "Y-Yeah! Not just anyone can get a meeting with the president! Even us..."
10024010-171 = "Interesting. I didn't realize this was a decision the two of YOU could make."
10024010-172 = "What's that supposed to mean?"
10024010-174 = "I heard Schale was granted extrajudicial authority by the President of the General Student Council."
10024010-175 = "And if Genryumon refused to meet with Sensei... I wonder what would happen?"
10024010-176 = "Why...if Kronos caught wind of this, it would be major news..."
10024010-177 = "Gosh! I suppose that all kinds of reporters and investigators from the outside would come flooding into Shanhaijing."
10024010-179 = "W-Wait! Hold on! Let me think about this..."
10024010-180 = "Don't take too long. A good businesswoman seizes on her ideas straight away."
10024010-181 = "On second thought, take your time. The Black Tortoise Promenade could make a fortune feeding all those outsiders..."
10024010-182 = "I should thank you for providing us with such a wonderful business opportunity!"
10024010-183 = "Tch..."
10024010-184 = "F-Fine! I'll pass on your message, but don't say I didn't warn you!"
10024010-185 = "[s] \"That's all I ever wanted.\""
10024010-187 = "Hmph...! This isn't over, Black Tortoise Promenade!"
10024010-195 = "Sensei used \"soft power\" to turn those punks' power against them... I need to take notes...!"
10024010-196 = "Come back to us, Reijo. Not everything is kung fu."
10024010-197 = "Ultimately, the students who were sabotaging our business are gone. Thank you, Sensei."
10024010-198 = "While I did enjoy watching our Genryumon friends twist in the wind, I assume you have a plan?"
10024010-199 = "You...don't...? You're just going to go there and talk things out...?"
10024010-200 = "Goodness. That's rather simplistic."
10024010-201 = "Hahaha! I like it! Shall we head out, Reijo?"
10024010-202 = "Are you sure this is a good idea?"
10024010-203 = "Yes. Besides...I have something to say to Kisaki as well."
10024010-204 = "[s] \"Let's all go together.\""
10024010-205 = "Understood. I'll do everything in my power to keep Sensei safe."
10024010-206 = "Marvelous. Thank you."
10024010-207 = "But...we haven't finished our meal! Reijo, bring out the shrimp wonton soup, if you will."
10024010-208 = "Yes, ma'am! I'll be right back with the next course, Sensei."
10024010-213 = "[ns] \"I only hope my stomach survives...\""
10024010-214 = "Don't force yourself. You can leave anything you can't finish."
10024010-215 = "There's nothing wrong with having plenty of leftovers, after all. Hahaha!"

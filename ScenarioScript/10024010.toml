10024010-121 = "5;레이죠;07;그런데 그 만년삼을, 저희 현무상회가 식재료에 섞어 학원 외부로 반출하고 있다는 소문입니다."
10024010-122 = "3;루미;02;그걸 핑계로, 현룡문 부원들이 우릴 조사하겠다며 가게에 죽치고 앉아 있기 시작한 거지."

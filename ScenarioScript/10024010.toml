10024010-114 = "[s] \"뭔가, 복잡하구나……\""
10024010-115 = "3;루미;02;……아무튼, 대놓고 이야기하지는 못하지만, 현룡문을 싫어하는 학생들도 제법 있어."
10024010-116 = "3;루미;06;그리고 현룡문은 우리 현무상회를 그다지 좋게 보고 있지 않아."

10024010-78 = "1;루미;99;……그렇지만 그거 하나 시켜 놓고 몇 시간 동안 죽치고 앉아 있는 건 또 다른 문제지……"
10024010-79 = "1;루미;02;솔직히 영업방해라고, 영업방해.\n#fontsize;50\n#1;closeup\n#1;em;[속상함]"

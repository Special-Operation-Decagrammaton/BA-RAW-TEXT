[translation]
10024010-1 = "第1話;山珍海味：珍饈佳餚"
10024010-2 = "山海經．玄武商會"
10024010-4 = "前菜的佛跳牆味道如何？#n我這就去把主菜拿來哦。"
10024010-5 = "這道是全家福。#n是用乾海參、鮑魚、螺肉、蝦子、豬肉，以及各種蔬菜一起燉煮的料理。"
10024010-11 = "[ns]「真，真好吃！第一次嚐到這種味道……！」"
10024010-12 = "那真是太好了。#n身為主廚，沒有比聽見客人說「好吃」更讓人開心的事了。"
10024010-13 = "那麼下一道是湯品，鮮蝦丸子湯！"
10024010-14 = "[s]「菜還沒上完嗎！？」"
10024010-15 = "你在說什麼呢？好菜還在後頭呢。"
10024010-16 = "喝完湯之後，還有主食跟點心在等著哦。"
10024010-17 = "每道都是我們店裡自豪的美味，希望你務必品嘗看看！"
10024010-18 = "[s1]「你的心意我很高興，但我可能無福消受……」\n[s2]「大人的腸胃並沒有女高中生那麼強健……」"
10024010-21 = "是，是嗎……？"
10024010-22 = "不過老師接下來就要開始忙碌了，不多吃一點可不行啊！"
10024010-26 = "瑠美會長，這道菜何時呈上比較好呢？"
10024010-27 = "先等一會吧。#n老師他還只吃到一半……"
10024010-28 = "啊，對了。既然都來了就打個招呼吧？#n老師，這孩子叫令女。負責我的護衛。"
10024010-29 = "我是鹿山令女。還請您多多指教。"
10024010-30 = "[s]「你好呀，令醬。」"
10024010-31 = "令……醬……？"
10024010-32 = "被別人這麼稱呼，這還是，第一次……"
10024010-33 = "啊哈哈，令醬啊。#n真不錯呢。之後我也這樣叫你怎麼樣？"
10024010-34 = "瑠美會長，這樣有點……"
10024010-36 = "……原來如此。#n只要先掌握對話的主導權就行了是嗎。"
10024010-37 = "我從電影裡學過，在功夫裡「先發制人」是很重要的。"
10024010-38 = "[s]「不是……我只是想打好關係而已……」"
10024010-40 = "為了讓對方放鬆戒備，自然而然地展現出謙遜的態度……#n這就是……夏萊的老師。"
10024010-41 = "好了好了，令女。#n就此打住吧，老師都不知如何是好了。"
10024010-42 = "[s]「你們是不是誤會了什麼！？」"
10024010-43 = "啊哈哈，他平時總是很冷靜的說。#n但只要一談到功夫就會顧不得四周。"
10024010-44 = "不過能看到老師有點不知如何是好的表情，對我來說也挺有趣的。"
10024010-45 = "[s3]「話說，我從剛才開始就沒看到有客人……」\n[s4]「莫非，跟請我過來的原因有關嗎？」"
10024010-48 = "啊哈哈……這個嘛。"
10024010-49 = "是因為──不，與其在這裡說明，還是讓老師看看那個比較快吧。"
10024010-50 = "令女，老師就拜託你囉。"
10024010-51 = "遵命，會長。"
10024010-55 = "（瑠美沒有回頭，就這麼將大拇指指向了背後）"
10024010-56 = "（將視線越過其肩膀一看……）"
10024010-60 = "……有事嗎？"
10024010-65 = "竟敢對「客人」指指點點的，看來是欠缺教育啊。"
10024010-66 = "要是玄武商會的待客之道是這副德行的事傳出去……#n可能會影響店裡評價的哦？"
10024010-67 = "所以才說這些因為是名店就得意忘形的傢伙們實在是……"
10024010-71 = "嗯，事情就如你所見。"
10024010-72 = "[s]「那些學生們是誰？」"
10024010-73 = "──是玄龍門的成員哦。"
10024010-74 = "只點一份炒蛋就像那樣坐了好幾個小時。"
10024010-75 = "害的其他客人根本無法靠近。"
10024010-76 = "啊，當然，就算客人只點一道菜我也很高興哦。"
10024010-77 = "能輕鬆的品嘗到，這本來就是大眾料理的好處。#n能讓客人快樂地與朋友一邊享用一邊閒話家常，對我們來說也就有料理的價值了……"
10024010-78 = "硬要說的話，比起長時間佔用位置，那樣吵吵鬧鬧的才是最大的問題……"
10024010-79 = "老實說，這已經是妨礙營業的等級了。"
10024010-80 = "雖然這本來就是他們的目的就是了……"
10024010-81 = "[s]「……不能請他們出去嗎？」"
10024010-82 = "這個嘛……他們畢竟是玄龍門的學生，我們實在沒辦法這麼做。"
10024010-83 = "啊，老師應該不清楚吧……玄龍門和我們玄武商會之間的關係。"
10024010-84 = "[s5]「聽說你們的關係並不是很好？」\n[s6]「聽說沒有人會想介入雙方之間的紛爭……」"
10024010-87 = "是呢……因為一些複雜的原因。"
10024010-92 = "玄龍門是山海經的學生會組織──"
10024010-96 = "相當重視俠與義，將傳統奉為最高價值。"
10024010-100 = "重視傳統的心情，我也不是不能理解……"
10024010-102 = "但是那已經不是重視傳統了。#n只是以傳統的名義恐懼著變化而已。"
10024010-104 = "雖然不知道其他地方被如何對待，但是將玄武商會……#n將瑠美會長的料理，只因為違背傳統就加以貶低實在是不可饒恕！"
10024010-105 = "料理必須不斷進步才行！#n沒有變化的餐桌，終究會有吃膩的一天！"
10024010-106 = "他們知道玄武商會是多麼努力嗎！#n明明對我們的情況一無所知卻還……！"
10024010-107 = "我沒事的，冷靜點吧，令女。#n那麼大聲的話──"
10024010-108 = "……你們好像在說什麼有趣的事嘛？"
10024010-109 = "我們可是全都聽見了。#n你們這些傢伙的企圖，我們會一個一個查清楚的。"
10024010-110 = "……就會變成這樣。"
10024010-111 = "我能理解玄龍門方面應該也是有相應的理由才會這麼做……"
10024010-112 = "只是覺得那種保守的營運方針不能改一改嗎～之類的。"
10024010-113 = "組織也是要配合時代而變化的，不是嗎？"
10024010-114 = "[s]「真是複雜的問題呢……」"
10024010-115 = "大家表面上雖然沒有多說什麼，#n但是對玄龍門的體制抱持反感的學生不在少數。"
10024010-116 = "也是因為這樣，玄龍門才會格外敵視我們吧……"
10024010-117 = "而且最近還開始出現與商會有關的、小～小的負面傳言。"
10024010-118 = "[s]「負面傳言？」"
10024010-119 = "在山海經能夠採集到一種名叫「萬年蔘」的植物──"
10024010-120 = "由於採集量有限且稀有價值高，所以對外的輸出受到了嚴格的管制──"
10024010-121 = "然而近期卻出現了[ruby=我們]玄武商會[/ruby]向學園外部走私「萬年蔘」的傳聞……"
10024010-122 = "於是玄龍門的成員便以調查為藉口，開始窩在店裡不走。"
10024010-123 = "這樣一來，客人們要怎麼開心享用食物呢……唉。"
10024010-128 = "那真的只是「傳聞」而已嗎？"
10024010-129 = "不，我並不這麼認為。#n畢竟玄武商會總是擅自把外部的東西帶進來。"
10024010-130 = "都是因為這樣，山海經的傳統才會漸漸式微！"
10024010-131 = "要是你們有乖乖服從玄龍門，根本就不會被懷疑。"
10024010-136 = "傳統雖然重要，不過要是害怕變化是不會有未來的。"
10024010-137 = "首先應該要將態度放軟，接受各種新事物才對。"
10024010-139 = "我們才不管那些。#n再說了，你們反抗玄龍門的指示，還妄想能在山海經做生意嗎？"
10024010-140 = "可別忘了一切都是因為有玄龍門才會存在的。"
10024010-142 = "唉……繼續說下去也得不出結論呢。"
10024010-143 = "怎麼，你怕了嗎？"
10024010-144 = "是因為有見不得人的事才會不想跟我們說話吧？"
10024010-145 = "是是是，就當作是那樣吧。"
10024010-147 = "事情就是這樣……委託的內容從剛才的對話應該大概能明白了吧。#n我希望能解開「誤會」──老師，你願意幫忙嗎？"
10024010-148 = "明明是單方面遭到誹謗，這怎麼會是「誤會」呢！？#n瑠美會長想得太天真了！不更強勢一點的話……！"
10024010-149 = "令女，冷靜一點。#n正面硬碰硬只會造成反效果。"
10024010-156 = "[ns]「你們兩位是玄龍門的學生對吧？」"
10024010-157 = "……嗯，你是哪位？#n與事情無關的大人還是少多管閒事吧。"
10024010-158 = "就算是外地人，既然進到山海經就要遵守[ruby=我們]山海經[/ruby]的規定。"
10024010-159 = "也就是說──長時間待在玄武商會，就會被視為他們那邊的人。"
10024010-160 = "站在哪邊才是有利的，你不可能分不出來吧。#n咯咯咯……"
10024010-164 = "勸你們說話還是注意點比較好。#n這位是夏萊的「老師」。"
10024010-165 = "什麼？夏萊的老師……？"
10024010-166 = "喂，喂……該怎麼辦！？"
10024010-167 = "[s]「能讓我見見玄龍門的代表嗎？」"
10024010-168 = "就，就算是夏萊的老師，這也……"
10024010-169 = "沒，沒錯！#n門主大人可不是那麼輕易就能見到的！"
10024010-171 = "嘿～那是你們可以擅自決定的事嗎？"
10024010-172 = "你，你什麼意思？"
10024010-174 = "你們也知道夏萊是聯邦學生會長承認的超越法規的機關對吧？"
10024010-175 = "隨意對待夏萊的老師真的沒問題嗎～？"
10024010-176 = "我想……至少克洛盧斯頻道是絕對不會放過這則頭條的哦。"
10024010-177 = "這樣一來山海經的氣氛是不是會變得更～好呢？"
10024010-179 = "先先先，先等一下！#n給我一點思考的時間！！"
10024010-180 = "說什麼傻話。任何事情都必須當機立斷。#n否則該怎麼做生意啊。"
10024010-181 = "不過……這對我們來說也是個機會。#n要是外地的客人大量湧入的話，我們也會變得更加繁盛吧？"
10024010-182 = "啊啊，你們一開始就是這麼打算的啊。沒能理解你們的用心良苦真抱歉呢？#n沒想到玄龍門居然會抱持著如此寬大的心胸給我們機會。"
10024010-183 = "呿……！"
10024010-184 = "我，我知道了。我會轉達門主大人。#n但是如果被拒絕了可別找我抱怨啊。"
10024010-185 = "[s]「這樣就夠了。」"
10024010-187 = "呿……給我記住，玄武商會。"
10024010-195 = "化解對方攻擊的化勁技術，居然在戰鬥以外的地方也能活用……#n這就是夏萊老師的力量……"
10024010-196 = "不，不是那樣的。#n令女，快從功夫的世界裡回來。"
10024010-197 = "真是幫大忙了，謝謝你，老師。#n被這樣懲罰之後，短時間內應該不會再來了吧？"
10024010-198 = "不過老師，你具體來說打算怎麼做呢？"
10024010-199 = "咦？見面之後總會有辦法……？"
10024010-200 = "啊哈哈，原來老師也有走一步算一步的時候啊？#n我越來越喜歡老師了呢。"
10024010-201 = "好，令女。#n那麼我們也走吧？"
10024010-202 = "真的沒問題嗎，會長？"
10024010-203 = "沒事沒事。總會有辦法的。#n而且我也有話想對妃姬說。"
10024010-204 = "[s]「那我們出發吧。」"
10024010-205 = "……遵命。#n要是有什麼萬一，我會以老師的安全為第一優先。"
10024010-206 = "嗯，拜託你囉。"
10024010-207 = "……但是，在那之前。雖然受到了一點妨礙，還是要享用完料理哦。#n令女，可以把鮮蝦丸子湯再熱一熱嗎？"
10024010-208 = "遵命，瑠美會長。"
10024010-213 = "[ns]「吃這麼多還動的了嗎……」"
10024010-214 = "已經飽了的話，剩下來也沒關係唷？"
10024010-215 = "畢竟這也就代表我們準備的「招待」豐盛到吃不完嘛，啊哈哈。"

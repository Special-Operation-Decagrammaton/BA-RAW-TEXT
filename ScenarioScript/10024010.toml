[translation]
10024010-1 = "ตอนที่ 1;กับแกล้มรสเลิศ"
10024010-2 = "ย่านการค้าเทพเต่าดำ"
10024010-4 = "ซุปพระกระโดดกำแพงร้อนๆ เป็นยังไงบ้างล่ะ? ถ้าหมดแล้วเราจะต่อด้วยเมนูผัดเลยนะ "
10024010-5 = "ฉันลองทำผัดทะเลรวมมิตรด้วยนะ อาหารผัดที่ทำจากปลิงทะเลแห้ง หอยเป๋าฮื้อ หอยสังข์ และก็ผักต่างๆ ผสมเนื้อหมูกับกุ้งเป็นวัตถุดิบเสริมด้วย"
10024010-11 = "[ns] \"อะ... อร่อย! เพิ่งเคยได้กินรสชาติแบบนี้ครั้งแรกเลย...!\""
10024010-12 = "เยี่ยมเลย พอเห็นลูกค้ารับประทานอย่างเอร็ดอร่อย หัวหน้าเชฟก็ดีใจที่สุดเลยละนะ"
10024010-13 = "หมดจานนี้ก็เตรียมท้องสำหรับเมนูซุปต่อได้เลย เราจะเตรียมแกงจืดลูกชิ้นกุ้งให้"
10024010-14 = "[s] \"ยังมีอีกเหรอ?!\""
10024010-15 = "พูดอะไรน่ะ? เราเพิ่งเริ่มเองนะ"
10024010-16 = "พอจบเมนูซุปแล้วก็ยังเหลือเมนูเส้นกับเมนูผักอีก"
10024010-17 = "ถึงจะแค่อย่างละคำ แต่ก็ไม่ต้องกลัวไม่อิ่มนะ ในหนึ่งคำมันจะมีปริมาณเท่าสองคำเลยละ"
10024010-18 = "[s1] \"ครูก็ขอบใจหรอกนะ แต่กลัวว่าจะกินไม่ไหวนี่สิ...\"\n[s2] \"กระเพาะผู้ใหญ่… ย่อยได้ไม่ดีเหมือนเด็กม.ปลายหรอกนะ...\""
10024010-21 = "งะ... งั้นเหรอ?"
10024010-22 = "แต่ถ้าฮึดสู้ก็ไหวน่า! สู้ๆ นะ!"
10024010-26 = "ต้มซุปเสร็จแล้วค่ะท่านประธาน ให้เสิร์ฟตอนไหนดีคะ?"
10024010-27 = "รออีกแป๊บนะ ลูกค้า... ไม่สิ คุณครูของเราเหมือนจะยังไม่พร้อมน่ะ"
10024010-28 = "ไหนๆ ก็มาแล้ว มาทำความรู้จักกันเอาไว้สิ คนนี้คือเรย์โจว เธอมาเป็นผู้พิทักษ์ให้ฉันน่ะ"
10024010-29 = "ฉันเรย์โจวค่ะ ฝากตัวด้วยนะคะ คุณครู"
10024010-30 = "[s] \"สวัสดีเรย์จัง!\""
10024010-31 = "เรย์จัง... เหรอคะ?"
10024010-32 = "ไม่คุ้นหูเลยค่ะ เพิ่งจะเคยถูกเรียกแบบนี้เป็นครั้งแรกเลยนะคะ"
10024010-33 = "เรย์จังเหรอ? เพราะดีนะ ต่อไปฉันเรียกแบบนี้ด้วยดีไหม?"
10024010-34 = "อย่าดีกว่าค่ะ ท่านประธาน"
10024010-36 = "คุณครูเนี่ย เริ่มต้นบทสนทนาได้อย่างมีชั้นเชิงอย่างที่คนเขาลือกันมาเลยนะคะ"
10024010-37 = "ฉันเคยเห็นในหนังด้วยค่ะว่าการชิงเริ่มก่อนคือพื้นฐานของกังฟู"
10024010-38 = "[s] \"เปล่านะ... ครูก็แค่ทักทายที่ยินดีที่เราได้รู้จักกันเฉยๆ...\""
10024010-40 = "ถ่อมตนเพื่อที่จะทำให้อีกฝ่ายเองก็ประหม่าไปด้วย สมกับที่เป็นคุณครูจริงๆ ค่ะ"
10024010-41 = "พอเถอะเรย์โจว คุณครูทำตัวไม่ถูกแล้ว"
10024010-42 = "[s] \"ครูไม่ได้พูดอะไรไม่ดีออกไปใช่ไหม?!\""
10024010-43 = "ฮ่าฮ่าฮ่า ถึงเรย์โจวจะเป็นคนจริงจังกับทุกเรื่อง แต่ถ้าพูดเรื่องกังฟูเมื่อไร เธอจะกลายเป็นคนละคนเลยละ"
10024010-44 = "พอได้เห็นคุณครูเลิกลั่กแบบนั้นก็ถือว่าคุ้มดีนะ"
10024010-45 = "[s3] \"ว่าแต่... เป็นเฉพาะวันนี้หรือเปล่านะ? ทำไมลูกค้าถึง...\n[s4] \"นอกจากครูแล้วก็ไม่เห็นลูกค้าคนอื่นเลย มีเรื่องอะไรหรือเปล่า?\""
10024010-48 = "อ๋อ ลูกค้าเหรอ... พูดแทงใจดำเลยนะเนี่ย เรื่องนั้นน่ะ..."
10024010-49 = "ก็นะ ได้มาเห็นกับตาแบบนี้ก็น่าจะดีเหมือนกัน ไม่เป็นไรหรอกนะ ถ้าเกิดว่ามีเรื่องอะไรขึ้นมาละก็..."
10024010-50 = "เรย์โจวจะปกป้องคุณครูให้เองนะ"
10024010-51 = "รับคำสั่งค่ะ ท่านประธาน"
10024010-55 = "(รูมิใช้นิ้วโป้งชี้ไปที่ด้านหลัง)"
10024010-56 = "(ทันใดนั้น...)"
10024010-60 = "หา? อะไรน่ะ มีปัญหาอะไรรึไง?"
10024010-65 = "พวกเราเป็นลูกค้านะ อย่ามาชี้หน้ากันสิยะ!"
10024010-66 = "ทำไมย่านการค้าเทพเต่าดำถึงต้อนรับลูกค้าไม่ได้เรื่องแบบนี้เนี่ย"
10024010-67 = "เพราะแบบนี้ไงถึงได้เป็นแม่ค้าใจแคบอยู่แบบนี้ โธ่เอ๊ย"
10024010-71 = "ก็นะ... สถานการณ์มันก็เป็นแบบนี้แหละ"
10024010-72 = "[s] \"นักเรียนพวกนั้นคือใครเหรอ?\""
10024010-73 = "เรียกว่าเป็น... สมาชิกมังกรดำก็แล้วกัน"
10024010-74 = "มาสั่งผัดไข่แค่จานเดียว แล้วก็นั่งพูดบ่นแบบนั้นมาหลายชั่วโมงแล้วน่ะ"
10024010-75 = "ลูกค้าคนอื่นไม่เข้าเพราะพวกนั้นเลย"
10024010-76 = "อ๊ะ ฉันไม่ได้จะบอกว่าผัดไข่เป็นอาหารที่ไม่ดีหรอกนะ"
10024010-77 = "อาหารอร่อยที่ราคาย่อมเยาว์มันมีสุนทรียศาสตร์ในตัวอยู่แล้ว"
10024010-78 = "แต่ปัญหาอยู่ที่พวกนั้นมาสั่งอาหารแค่จานเดียวแล้วนั่งแช่แบบนั้นน่ะสิ..."
10024010-79 = "ว่ากันตามตรง ทำแบบนั้นมันคือการขัดขวางกิจการน่ะ"
10024010-80 = "ถึงเจตนาของพวกเธอจะเป็นอย่างนั้นมาตั้งแต่แรกก็เถอะ..."
10024010-81 = "[s] \"ถ้ามาขัดขวางกันมากเกินไป เราก็ให้พวกนั้นออกจากร้านได้นี่นา?\""
10024010-82 = "แต่ว่าพวกนั้น... เป็นนักเรียนของมังกรดำเลยนะ"
10024010-83 = "อ้อ หรือคุณครูจะยังไม่รู้เรื่องความสัมพันธ์ระหว่างมังกรดำและย่านการค้าเทพเต่าดำ"
10024010-84 = "[s5] \"เคยได้ยินมาบ้าง เห็นว่าไม่ค่อยถูกกันเหรอ?\"\n[s6] \"ได้ยินว่าไม่มีใครอยากยุ่งเรื่องทะเลาะวิวาทของทั้งสองฝ่าย...\""
10024010-87 = "ใช่... อันที่จริงเรื่องราวมันซับซ้อนกว่านั้นอยู่หน่อยน่ะ"
10024010-92 = "มังกรดำคือองค์กรในซานไห่จิง เป็นองค์กรที่คล้ายกับสภานักเรียนในโรงเรียนอื่น"
10024010-96 = "พวกเธอให้ความสำคัญกับความชอบธรรม ความร่วมมือ และขนบธรรมเนียมเหนือสิ่งอื่นใด"
10024010-100 = "แต่ปัญหาคือพวกเธอให้ความสำคัญกับขนบธรรมเนียมมากเกินไปหน่อย..."
10024010-102 = "นั่นไม่ใช่การให้ความสำคัญกับขนบธรรมเนียมหรอกค่ะ มันคือการใช้ชีวิตแบบหมกมุ่นในขนบธรรมเนียมต่างหาก"
10024010-104 = "เรื่องอื่นฉันไม่รู้หรอก แต่การลดเกียรติของย่านการค้าเทพเต่าดำและอาหารของท่านประธานด้วยการ#nบอกว่านี่เป็นการขัดต่อขนบธรรมเนียมน่ะ ฉันยกโทษให้ไม่ได้หรอกค่ะ!"
10024010-105 = "อาหารต้องพัฒนาต่อไปค่ะ! เพราะถ้ากินแต่ของเดิมๆ เราจะเบื่อจนไม่อยากกินอะไรเลยไงคะ!"
10024010-106 = "ย่านการค้าเทพเต่าดำพยายามพัฒนาอาหารกันตั้งเท่าไหร่ ไม่รู้อะไรแล้วยังจะมาพูดอีก...!"
10024010-107 = "เอาละๆ ใจเย็นก่อนนะ เรย์โจว ถ้าไม่อย่างนั้น..."
10024010-108 = "เหมือนตรงนั้นกำลังคุยเรื่องพวกเรากันอยู่นะ?"
10024010-109 = "ฉันก็ได้ยิน งั้นฉันจะเปิดโปงให้หมดเลยว่าย่านการค้าเทพเต่าดำกำลังวางแผนร้ายอะไรกันอยู่"
10024010-110 = "มันก็จะเป็นแบบนี้ไงล่ะ"
10024010-111 = "มังกรดำก็คงมีเหตุผลที่ทางนั้นให้ความสำคัญกับขนบธรรมเนียมอยู่หรอกนะ..."
10024010-112 = "แต่ฉันก็อยากหาทางออก ไม่ให้กิจการมันหยุดชะงักไปเลยแบบนี้น่ะ"
10024010-113 = "แผนรับมือที่ยืดหยุ่นตามจังหวะและสถานการณ์คือหัวใจสำคัญของการบริการองค์กรนะ"
10024010-114 = "[s] \"ฟังดู... ซับซ้อนจังเลยนะ...\""
10024010-115 = "ถึงเราจะพูดออกมาตรงๆ ไม่ได้ แต่เอาเป็นว่ามีนักเรียนที่เกลียดมังกรดำอยู่ไม่น้อยเลยละ"
10024010-116 = "แถมมังกรดำก็ไม่ได้มองย่านการค้าเทพเต่าดำของเราในแง่ดีขนาดนั้นด้วย"
10024010-117 = "แต่เมื่อไม่นานมานี้มีข่าวลือน่าตะขิดตะขวงใจ เพราะมันเกี่ยวกับย่านการค้าเทพเต่าดำของเรา"
10024010-118 = "[s] \"ข่าวลือน่าตะขิดตะขวงใจ?\""
10024010-119 = "ที่ซานไห่จิงมีพืชหายากที่ชื่อว่าโสมหมื่นปีค่ะ แล้วมันก็มีแค่ที่นี่เท่านั้นด้วย"
10024010-120 = "เนื่องจากมีปริมาณจำกัด โสมหมื่นปีก็เลยถูกควบคุมการส่งออกอย่างเข้มงวด"
10024010-121 = "แต่กลับมีข่าวลือว่าย่านการค้าเทพเต่าดำของเราส่งโสมหมื่นปีออกไปข้างนอกสถาบันโดยผสมไป#nกับวัตถุดิบอาหารน่ะค่ะ"
10024010-122 = "สมาชิกมังกรดำก็เลยใช้ข้ออ้างนั้นมาตรวจสอบพวกเราแล้วก็เริ่มนั่งแช่ในร้าน"
10024010-123 = "พอบรรยากาศเริ่มไม่ชอบมาพากลแบบนี้ ลูกค้าก็เลยไม่ค่อยเข้าร้านกัน เฮ้อ..."
10024010-128 = "สรุปก็เป็นไปตามข่าวลืองั้นเหรอ?"
10024010-129 = "ฉันไม่ชอบมานานแล้ว ย่านการค้าเทพเต่าดำเนี่ย!"
10024010-130 = "เป็นเพราะย่านการค้าเทพเต่าดำนำเข้าวัตถุดิบนู่นนี่จากภายนอกตามอำเภอใจแน่ๆ!"
10024010-131 = "ถ้ายอมทำตามคำสั่งของมังกรดำอย่างว่าง่าย ก็คงไม่โดนสงสัยตั้งแต่แรกหรอก!"
10024010-136 = "ดูสิๆ  เรย์โจวบอกไปแล้วไม่ใช่เหรอว่าอาหารที่ไม่มีการพัฒนา มันก็ไม่ต่างอะไรกับอาหารที่ตายไปแล้ว#nหรอกนะ"
10024010-137 = "และถ้าเราอยากพัฒนาอะไรสักอย่าง เราก็ต้องนำเข้าวัตถุดิบที่หลากหลาย"
10024010-139 = "ฉันไม่สนเรื่องพรรค์นั้นหรอกนะ คิดจะทำมาค้าขายในซานไห่จิงโดยไม่ทำตามคำสั่งของมังกรดำงั้นเหรอ?"
10024010-140 = "อย่าลืมล่ะว่าย่านการค้าเทพเต่าดำมีทุกวันนี้ได้เพราะมังกรดำ!"
10024010-142 = "เลิกพูดเรื่องนี้สักทีเถอะ แบบนี้วันนี้ทั้งวันฉันคงได้ฟังแต่เรื่องไร้สาระกันพอดี"
10024010-143 = "อะไร กลัวหรือไง? ก็สมควรกลัวนะ!"
10024010-144 = "พวกวัวสันหลังหวะ ทำผิดแล้วคอยระแวงว่าคนอื่นจะรู้ละสิ!"
10024010-145 = "โอเคๆ พวกเธอว่าไงก็คงเป็นงั้นแหละ"
10024010-147 = "ทั้งหมดนี้ก็คือ... ข้อมูลงานที่จะจ้างวาน คุณครูพอจะช่วยพวกฉันได้หรือเปล่าล่ะ? ฉันอยากคลายความเข้าใจผิดระหว่างย่านการค้าเทพเต่าดำกับมังกรดำน่ะ"
10024010-148 = "จะบอกว่าการประณามอยู่ฝ่ายเดียวคือความเข้าใจผิดมันก็แปลกๆ นะคะ! ถ้าแรงมาเราก็ต้องแรงกลับค่ะ แล้วก็ต้องแรงกว่าด้วย!"
10024010-149 = "ใจเย็นน่า เรย์โจว ทำใจร่มๆ เข้าไว้ เอาเหล็กไปงัดเหล็ก มันไม่มีอะไรดีขึ้นหรอกนะ"
10024010-156 = "[ns] \"พวกเธอคือสมาชิกมังกรดำใช่ไหม?\""
10024010-157 = "หืม? ใครอีกล่ะเนี่ย?! คิดว่าพอเป็นผู้ใหญ่จากต่างถิ่นแล้วเราจะอะลุ่มอล่วยให้งั้นเหรอ?"
10024010-158 = "ตราบใดที่เข้ามาเหยียบซานไห่จิงแล้ว ต่อให้เป็นคนนอกก็ต้องทำตามกฎของซานไห่จิง! "
10024010-159 = "และยิ่งอยู่ย่านการค้าเทพเต่าดำนานเท่าไหร่ ก็จะยิ่งถูกมองว่าเป็นพวกต่อต้านมังกรดำมากขึ้นเท่านั้น!"
10024010-160 = "ทำตัวให้ดีๆ เข้าละ ฮึฮึฮึ..."
10024010-164 = "พูดเกินไปหรือเปล่าคะ? ท่านนี้คือ 'คุณครู' จากชาเล่ต์นะคะ"
10024010-165 = "หือ... ว่าไงนะ? คุณครูจากชาเล่ต์เหรอ...?"
10024010-166 = "จะ...เจอแบบนี้แล้วต้องทำยังไงล่ะเนี่ย?"
10024010-167 = "[s] \"ครูอยากเจอหัวหน้ามังกรดำหน่อยได้ไหม?\""
10024010-168 = "เจอท่านประมุขคิซากิเหรอ? ตะ... แต่ถึงจะเป็นคุณครู ก็ใช่ว่าจะเจอได้นะ..."
10024010-169 = "ชะ... ใช่! ไม่ใช่ว่าทุกคนจะเข้าพบท่านประมุขได้หรอกนะ! ขนาดพวกเราเองยังยากเลย...!"
10024010-171 = "โฮ้ นี่พวกเธอตัดสินปัญหานั้นกันเองได้ด้วยงั้นเหรอเนี่ย?"
10024010-172 = "หมายความว่ายังไงน่ะ?"
10024010-174 = "ได้ยินว่าที่ชาเล่ต์ถือสิทธิ์อำนาจบางอย่างจากประธานองค์การนักเรียนด้วย"
10024010-175 = "ถ้าปฏิเสธไม่ให้คุณครูจากชาเล่ต์เข้าพบ มันจะเกิดอะไรขึ้นนะ?"
10024010-176 = "ฉันจะต้องไม่พลาดสกู๊ปพิเศษจากช่องโครโนสแน่นอน"
10024010-177 = "อ้อ แล้วถ้าเป็นแบบนั้นขึ้นมา คลื่นความสนใจลูกใหญ่จะพัดมาสู่ซานไห่จิงหรือเปล่านะ?"
10024010-179 = "เดี๋ยวก่อน เดี๋ยวก่อน! ช้าก่อน! ขอฉันคิดก่อนสิ!"
10024010-180 = "จะต้องคิดอะไรล่ะ การลงมือทำทันทีหลังจากมีความคิดริเริ่มเป็นหนึ่งในพื้นฐานของการทำธุรกิจเลยนะ"
10024010-181 = "แต่ก็เอาเถอะ... ถ้าเป็นแบบนั้นขึ้นมาจริงๆ อย่างน้อยก็ถือว่ามันเป็นโอกาสของย่านการค้าเทพเต่าดำนะ ได้ขายอาหารให้คนนอกสักคนละชาม คงจะทำเงินได้ไม่ใช่น้อยๆ เลยละ"
10024010-182 = "ขอโทษที่ไม่ทันได้คิดนะ นี่ฉันเกือบจะพลาดน้ำใจอันยิ่งใหญ่จากมังกรดำที่มีต่อย่านการค้าเทพเต่าดำ#nไปซะแล้ว"
10024010-183 = "หืม...?!"
10024010-184 = "กะ... ก็ได้! พวกฉันจะไปบอกท่านประมุขให้! แต่ไม่รู้ด้วยนะว่าผลจะออกมาเป็นยังไง!"
10024010-185 = "[s] \"แค่นั้นก็พอแล้วละ\""
10024010-187 = "ชิ เดี๋ยวเราได้เห็นดีกันแน่ ย่านการค้าเทพเต่าดำ!"
10024010-195 = "นี่มันกลยุทธ์ในการยืมมือฝ่ายตรงข้ามของกังฟู... พิชิตความแข็งแกร่งด้วยความอ่อนโยน... จดไว้ๆ..."
10024010-196 = "เปล่าสักหน่อย ไปกันใหญ่แล้วเรย์โจว"
10024010-197 = "สุดท้ายพวกที่มาขัดขวางกิจการก็ยอมออกไปเองจนได้ ขอบคุณนะคุณครู"
10024010-198 = "พอเห็นพวกมังกรดำทำตัวไม่ถูกมันก็ดีอยู่หรอกนะ ว่าแต่เราจะเอายังไงต่อดี?"
10024010-199 = "ว่าไงนะ? ไม่มีแผนอะไรงั้นเหรอ? ลองนัดพูดคุยก่อนแล้วค่อยว่ากันงั้นเหรอ?"
10024010-200 = "คุณครูก็มีมุมตอนที่ทำอะไรโดยไม่วางแผนก่อนเหมือนกันสินะ?"
10024010-201 = "ฮ่าฮ่าฮ่า แบบนี้ละถูกใจฉันเลย ถ้างั้นเราก็ออกไปกันเถอะเรย์โจว"
10024010-202 = "จะไม่เป็นอะไรเหรอคะ ท่านประธาน?"
10024010-203 = "ไม่เป็นไรหรอก อีกอย่าง... ฉันมีเรื่องจะคุยกับคิซากิด้วยอยู่พอดีเลย"
10024010-204 = "[s] \"พวกเราก็ไปด้วยกันหมดนี่แหละ\""
10024010-205 = "เข้าใจแล้วค่ะ ถ้าเกิดเรื่องฉุกเฉินอะไรขึ้นมา ฉันจะให้ความสำคัญกับคุณครูก่อนค่ะ"
10024010-206 = "อืม งั้นฝากด้วยนะ"
10024010-207 = "แต่กองทัพต้องเดินด้วยท้องนะ เรย์โจว ขอซุปลูกชิ้นกุ้งชามหนึ่งทีสิ"
10024010-208 = "ค่ะ รอสักครู่นะคะ คุณครู"
10024010-213 = "[ns] \"กระเพาะครูจะไหวไหมนะ...\""
10024010-214 = "ไม่ต้องฝืนกินเข้าไปหรอกนะ ถ้าไม่ไหวก็เหลือเอาไว้ก็ได้"
10024010-215 = "ก็การเตรียมอาหารให้กินอย่างอิ่มหนำสำราญคือความภาคภูมิใจของเรายังไงล่ะ ฮ่าฮ่าฮ่า"

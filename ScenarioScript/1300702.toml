[translation]
1300702-1 = "Sincere Rewards"
1300702-2 = "I decided to visit a sweets show on a drowsy afternoon."
1300702-5 = "L'Oiseau Bleu Confectionery"
1300702-6 = "Welcome to L'Oiseau Bleu!"
1300702-7 = "[s] \"Junko?\""
1300702-8 = "Sensei? What in the world are you doing here?"
1300702-9 = "You just came to buy snacks? This place is pretty pricey for an impulse purchase, though..."
1300702-10 = "I guess that's the advantage of being an adult with a credit line."
1300702-11 = "You don't know how good you have it. Adults can have dessert whenever they want!"
1300702-12 = "What do you mean me? What am I doing here?"
1300702-13 = "Isn't it obvious? I work here part-time."
1300702-14 = "I need it to fund my spending habits. Breakfast, lunch, dinner, not to mention all the snacks between meals..."
1300702-15 = "Why do high-quality ingredients have to be so expensive? How is a student supposed to feed herself?!"
1300702-16 = "I don't work part-time because I want to...but that's the price I have to pay for epicureanism."
1300702-17 = "[s] \"Is it hard work?\""
1300702-18 = "Not particularly. It's not like I'm the one doing the baking."
1300702-19 = "Besides, L'Oiseau Bleu lets its employees take the leftover sweets home."
1300702-20 = "So I get to eat sweets I'd never be able to afford for free. What more of a reason do I need to work here?"
1300702-21 = "[s] \"So any recommendations?\""
1300702-22 = "Recommendations? Let's see..."
1300702-23 = "The whole menu is good if you ask me, but my personal favorite is the Mont Blanc right in front of you."
1300702-24 = "We don't sell many due to the price, but it's worth trying for the rich flavor of creamy chestnut paste in harmony with the crispy meringue!"
1300702-25 = "I was lucky enough to get a leftover for free...and it changed my life!"
1300702-26 = "[s] \"One Mont Blanc, please.\""
1300702-27 = "Great choice. You won't regret it!"
1300702-28 = "Come again? If I sell too many, there won't be any leftovers for me to have at the end of the day, and then I'd be taking a net loss?"
1300702-29 = "Th-That's a good point. In that case, I should slack off so that there are more leftovers..."
1300702-30 = "No, that's not right! If I don't make any sales, then I won't get paid and can't afford to buy the other foods I want!"
1300702-31 = "Hmm. But I do want those leftovers. What should I do...?"
1300702-32 = "[s] Hand Junko the Mont Blanc you purchased."
1300702-33 = "Huh...? But you bought this for yourself, Sensei."
1300702-34 = "You want me to take it as a gift for working so hard? Th-Thanks..."
1300702-35 = "Still, I know it's not right to slack off and take advantage of people's kindness."
1300702-36 = "So I'll work extra hard today as my way of paying you back!"
1300702-38 = "I then bought some bread to snack on while I returned to Schale."

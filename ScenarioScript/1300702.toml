[translation]
1300702-1 = "รางวัลของความจริงใจ"
1300702-2 = "ในช่วงบ่ายที่น่านอนสุดๆ คุณครูเข้าไปที่ตัวเมืองเพื่อซื้อขนมที่ร้านขนมหวาน"
1300702-5 = "ร้านขนมหวาน <ลูวาโซ บลู>"
1300702-6 = "ร้านขนมหวาน <ลูวาโซ บลู> ยินดีต้อนรับค่าาาาา!"
1300702-7 = "[s] \"....จุนโกะ?\""
1300702-8 = "เอ๊ะ คุณครูนี่นา? มาทำอะไรที่นี่เหรอ?"
1300702-9 = "มาซื้อขนมเหรอ? อืม.. ขนมร้านนี้ราคาแพงเอาเรื่องอยู่น้า...."
1300702-10 = "อ๊ะ จริงสิ.... คุณครูมีบัตรเครดิตอยู่นี่นา...."
1300702-11 = "ผู้ใหญ่นี่ดีจังเลยน้า~ อยากกินขนมอะไรก็กินได้หมดเลย~"
1300702-12 = "ฉันเหรอ? ฉันมาทำอะไรที่นี่น่ะเหรอ?"
1300702-13 = "ดูก็รู้แล้วนี่นา ฉันมาทำงานพาร์ทไทม์ที่นี่น่ะ"
1300702-14 = "ไหนจะค่าข้าวเช้า ข้าวกลางวัน ข้าวเย็นแล้วก็ค่าขนมกินเล่นอีก... ค่าใช้จ่ายมันเพิ่มขึ้นเรื่อยๆ"
1300702-15 = "ทำไมวัตถุดิบชั้นสูงถึงต้องราคาแพงด้วยนะ?#nราคาแพงหูฉี่แบบนั้นเด็กนักเรียนที่ไหนจะซื้อได้ล่ะ!"
1300702-16 = "ฉันเองก็ไม่ได้อยากมาทำงานพิเศษยุ่งยากแบบนี้หรอก...#nแต่ถ้าเพื่อหาเงินค่าของกินล่ะก็มันก็ช่วยไม่ได้ล่ะน้า"
1300702-17 = "[s] \"งานลำบากรึเปล่า?\""
1300702-18 = "หืม? ไม่เป็นไรหรอก ฉันไม่ได้ไปอบขนมปังเองสักหน่อย"
1300702-19 = "แล้วอีกอย่างที่ร้าน <ลูวาโซ บลู> น่ะยอมให้พนักงานเอาขนมที่เหลือกลับบ้านได้ด้วยนะ"
1300702-20 = "แค่ได้กินขนมจากร้านที่หากินทั่วไปได้ยากแบบฟรีๆ แค่นี้ก็เป็นแรงจูงใจให้ฉันมาทำงานที่นี่แล้วล่ะ!"
1300702-21 = "[s] \"มีเมนูแนะนำบ้างไหม?\""
1300702-22 = "เมนูแนะนำเหรอ? ไหนดูซิ...."
1300702-23 = "ขนมหวานของร้านนี้อร่อยทุกอย่างเลยนะ แต่ถ้าให้ฉันแนะนำล่ะก็...#nมองบลังค์ที่อยู่ตรงหน้าคุณครูนั่นแหละ"
1300702-24 = "ถึงจะขายได้ไม่ค่อยดีเพราะราคาแพง แต่รสชาติที่ชุ่มฉ่ำนุ่มลิ้นของเมอแรงค์#nผสมผสานกับครีมเกาลัดที่เข้มข้นได้อย่างดีมากเลยล่ะ!"
1300702-25 = "ฉันเคยกินตอนที่ได้ขนมที่เหลือกลับไป... มันอร่อยสุดๆ ไปเลย!"
1300702-26 = "[s] ซื้อขนมที่จุนโกะแนะนำ"
1300702-27 = "เลือกได้ถูกต้องแล้วล่ะ คุณครูไม่ผิดหวังแน่!"
1300702-28 = "หืม? ฉันจะโอเครึเปล่าถ้าขนมที่ฉันชอบขายหมดแล้วฉันไม่ได้ขนมกลับบ้านน่ะเหรอ?"
1300702-29 = "ระ...เรื่องนั้น.... ถ้าแบบนั้นฉันก็ควรจะอู้นิดหน่อยเพื่อให้มีขนมเหลือ...."
1300702-30 = "ไม่สิ ไม่ได้! ถ้าขายขนมไม่ได้ก็จะไม่ได้เงินเดือน#nถ้าเป็นแบบนั้นก็จะไปซื้อของอร่อยๆ กินไม่ได้น่ะสิ?\n"
1300702-31 = "อืม.... แล้วฉันควรทำยังไงดีนะ...."
1300702-32 = "[s] ส่งขนมที่ซื้อมาให้จุนโกะ"
1300702-33 = "เอ๊ะ....? ขนมนี่คุณครูซื้อไปกินเป็นของว่างไม่ใช่เหรอ?"
1300702-34 = "ของขวัญสำหรับนักเรียนที่ตั้งใจทำงานงั้นเหรอ?#n.....ขะ....ขอบคุณนะ....."
1300702-35 = "ใช่แล้วล่ะ การแอบอู้งานแล้วเอาเปรียบคนอื่นน่ะเป็นเรื่องไม่ดี"
1300702-36 = "วันนี้ฉันก็จะพยายามให้เต็มที่เลย!"
1300702-38 = "จากนั้นคุณครูก็ซื้อขนมปังสำหรับกินเป็นของว่างแล้วก็กลับไปที่โรงเรียน"

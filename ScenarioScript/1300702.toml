[translation]
1300702-1 = "#title;성실함의 보상"
1300702-2 = "#na;나른한 오후의 어느 한 때, 간식을 사기 위해 시내의 스위츠 가게에 들렸다."
1300702-3 = "#wait;1000"
1300702-4 = "#all;hide"
1300702-5 = "#place;양과자점 <르와조 블뢰>"
1300702-6 = "3;준코;03;어서 오세요, <르와조 블뢰>입니다!\n#3;greeting\n#3;em;[반짝]\n#3;a"
1300702-7 = "[s] \"……준코?\""
1300702-8 = "3;준코;06;어라, 선생님? 이 가게에는 무슨 일이야?\n#3;em;[?!]\n#3;shake"
1300702-9 = "3;준코;01;간식을 사러 왔다고? 흐응, 이 가게의 스위츠는 제법 비쌀 텐데……."
1300702-10 = "3;준코;02;아, 그렇지…… 선생님에게는 어른의 카드가 있으니까…….\n#3;greeting"
1300702-11 = "3;준코;13;어른은 좋겠네~ 먹고 싶은 디저트를 마음대로 먹을 수 있으니까~\n#3;em;[음표]"
1300702-12 = "3;준코;02;나? 나는 여기서 무얼 하고 있었느냐고?\n#3;em;[?]"
1300702-13 = "3;준코;00;보면 알 수 있잖아. 이 가게에서 아르바이트를 하고 있어.\n#3;m4"
1300702-14 = "3;준코;11;아침, 점심, 저녁의 식비부터 식후에 먹는 간식비까지…… 지출이 너무 많아져서 말이야.\n#3;stiff"
1300702-15 = "3;준코;05;고급 식재료라는 것들은 왜 이렇게 하나같이 비싼 거야? #n도저히 학생의 용돈으로 해결할 수 있는 수준이 아니잖아!\n#3;hophop\n#3;em;[빠직]"
1300702-16 = "3;준코;11;나도 아르바이트 같은 귀찮은 일은 하고 싶지 않았지만…… 미식을 위해서라면 어쩔 수 없지.\n#3;m3"
1300702-17 = "[s] \"일은 힘들지 않아?\""
1300702-18 = "3;준코;02;응? 괜찮아. 어차피 내가 직접 빵을 굽는 것도 아니고."
1300702-19 = "3;준코;00;게다가 <르와조 블뢰>에서는 그 날 남은 스위츠를 종업원이 가져갈 수 있도록 해주거든.\n#3;em;[음표]"
1300702-20 = "3;준코;03;평소라면 제 돈 주고도 먹기 힘든 이 가게의 스위츠를 공짜로 먹을 수 있다니, 그것만으로도 여기서 일할 이유는 충분해!\n#3;hophop\n#3;em;[반짝]"
1300702-21 = "[s] \"추천하는 메뉴라도 있어?\""
1300702-22 = "3;준코;02;추천 메뉴? 글쎄……."
1300702-23 = "3;준코;01;이곳의 스위츠라면 무엇이든 맛있지만, 개인적인 추천은 그 앞에 있는 몽블랑이야.\n#3;m2"
1300702-24 = "3;준코;00;비싸서 잘 나가지는 않지만, 촉촉하고 부드러운 밤 페이스트의 진한 맛과 바삭한 머랭의 조화가 정말 일품이라고!\n#3;em;[반짝]"
1300702-25 = "3;준코;13;전에 팔리지 않고 남은 걸 한 번 먹어봤는데…… 그야말로 황홀한 맛이었어!\n#3;m3"
1300702-26 = "[s] 준코가 추천한 스위츠를 구매한다."
1300702-27 = "3;준코;00;탁월한 선택이야. 분명 후회하지 않을 거야!\n#3;em;[반응]"
1300702-28 = "3;준코;02;응? 좋아하는 스위츠가 팔려버리면 남은 걸 가져갈 수 없으니까 내 입장에서는 오히려 손해 아니냐고?\n#3;em;[?]\n#3;stiff"
1300702-29 = "3;준코;11;그…… 그런가? 그렇다면 일부러 게으름을 부려 재고를 많이 남겨야……."
1300702-30 = "3;준코;10;아니, 아니야! 물건이 팔리지 않으면 월급도 못 받을테고, 맛있는 음식도 사 먹을 수 없잖아?\n#3;jump"
1300702-31 = "3;준코;11;으으음…… 이럴 때는 어찌해야 좋지…….\n#3;em;…"
1300702-32 = "[s] 구입한 스위츠를 준코에게 건넨다."
1300702-33 = "3;준코;02;어라……? 이 스위츠는 선생님이 간식으로 먹으려고 산 거 아니야?\n#3;em;[?]"
1300702-34 = "3;준코;06;열심히 일하는 학생에게 주는 선물이라고? #n……고, 고마워…….\n#3;stiff"
1300702-35 = "3;준코;00;맞아. 사람의 호의에 기대서 일부러 게으름을 부리는 건 나쁜 일이니까."
1300702-36 = "3;준코;03;오늘 하루도 열심히 일할게!\n#3;em;[반짝]\n#3;hophop"
1300702-37 = "#all;hide"
1300702-38 = "#na;이후, 간식용 빵을 몇 개 더 사서 샬레로 돌아왔다."

[translation]
34225-3 = "อ๊ากกกกกกก!!! มะ... ไม่ได้นะ...!! ร่างของฉัน...!! "
34225-4 = "เป็นไปได้ยังไง พิธียังไม่สมบูรณ์หรอกเหรอคะ...? พลังมันยัง... ยัง... "
34225-5 = "พวกแก! ทำไมคนอย่างพวกแกถึงได้...!!"
34225-6 = "เอาตัวบาร์บาร่า... ไม่สิ เอากองกำลังทั้งหมดในมหาวิหารมาที่นี่...!"
34225-7 = "เข้ามาในนี้เลยค่ะ!!"
34225-12 = "แฮ่ก... แฮ่ก..."
34225-13 = "จะ... จะมีแห่เข้ามาที่นี่อีกเหรอคะ...? อ๊าาา..."
34225-14 = "ฮึ่ม... ถ้ายื้อเวลาทางนี้อีกละก็..."
34225-15 = "ทุกคนตั้งสติไว้! มันยังไม่จบนะ!!"
34225-16 = "เราต้องรีบก่อนที่กองสนับสนุนนั่นจะมาถึง...!!"
34225-17 = "เร็วเข้าสิ!!  ให้ทุกคนมารวมตัวกันทางนี้และปกป้องฉันไว้ค่ะ!! "
34225-19 = "ตอนต่อไป;คำอธิษฐานเพื่อเด็กสาว 1"

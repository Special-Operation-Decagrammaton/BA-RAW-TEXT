33020-25 = "ฉัน..."
33020-26 = "คุณมิกะหลอกลวงตัวตนของเธออย่างละเอียดเลยค่ะ คนที่อยู่ปลายแถวอย่างอาซึสะจัง#nไม่มีทางรู้หรอกค่ะ"
33020-27 = "อะ... อ่า... อาซึสะจังไม่ใช่ฆาตกรนะคะ...! หลังจากนั้นอาซึสะจังก็พยายามที่จะเข้าไปช่วย#nคุณนางิสะด้วย แล้วก็..."

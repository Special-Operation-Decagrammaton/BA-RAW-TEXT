[translation]
33020-1 = "第2話;ポストモーテム（２）"
33020-2 = "……セイアはこう言った。"
33020-3 = "エデン条約によって、ゲヘナとトリニティ間の紛争が無くなれば、アリウスの問題はじきに解決できるかもしれない。"
33020-4 = "この両校の根深い問題を解決する方法は、少なくとも今はこのエデン条約しかないだろう……と。"
33020-5 = "……しかし同時に、アリウスはティーパーティーのヘイローを破壊しようとしていた。それが実行されれば、キヴォトスは本物の戦場になってしまうはず。"
33020-6 = "それを止めたいかどうか……そう聞かれたんだ。"
33020-8 = "……そうか。"
33020-9 = "……先に言っておこう、白洲アズサ。私は君の考えには首肯しない。"
33020-10 = "なにせ私は、5番目の古則……つまり「楽園の証明」なんて不可能だということを、誰よりもよく知っているからさ。"
33020-11 = "だが……"
33020-12 = "全てが破局へ向かうのだとして。それを知って尚、君が足掻くと言うならば……"
33020-13 = "君に、私の知恵を貸そう。"
33020-14 = "それがどんな結果になるかは、何も保証できないがね――"
33020-16 = "……そして、セイアさんの部屋を爆破させた？"
33020-17 = "……「セイアが死んだ」と偽装するためには必要なことだった。アリウススクワッドをも騙し切るための手段は、限られていたし……。"
33020-18 = "セイアは全ての事件を隠蔽するための助っ人として、救護騎士団の団長を指名した。この後は全て彼女に託せ、と。"
33020-19 = "……そして部屋を爆破して逃げた。その後のトリニティでの騒動や情報を総合して、スクワッドは私が任務に成功したのだと信じた。"
33020-20 = "……これが事の顛末だ。"
33020-21 = "……。"
33020-22 = "その後については、私も知らなかった。まだ意識を取り戻せていないということも……。"
33020-23 = "セイアちゃんの外傷は、すでに完治しているそうです。セイアちゃんの意識が戻らないのは、それ以外の理由みたいで……。"
33020-24 = "ではあなたは、襲撃命令を下したのがミカ様だとは知らなかったと？"
33020-25 = "それは……"
33020-26 = "ミカさんは自身の正体をずっと隠しきっていました。アズサちゃんのような命令系統において一番下の位置からは、知る由もなかったでしょう。"
33020-27 = "あ、アズサちゃんは人殺しではありません……！あの時もアズサちゃんは、ナギサ様を救おうとして……！"
33020-28 = "……すみません。私はこうして話を聞くことが仕事ですので。"
33020-29 = "……ハナコ、ヒフミ。私は大丈夫。"
33020-35 = "私に実際に命令を下したのは、アリウススクワッドのリーダー「サオリ」。スクワッドの指揮を執ってるのは彼女だ。"
33020-37 = "……そうですね。"
33020-38 = "とにかく、白洲アズサさん……彼女がトリニティに転校してきて、そして実際にナギサさんを守り抜いた。そのことは明白です。"
33020-39 = "その過程で様々なことがあったとはいえ、特別学力試験にも合格。補習授業部は彼女を含めて全員、明確な結果を残しています。"
33020-40 = "文句の付けようなど無いでしょう……彼女の書類は、私が正式な物にしておきます。"
33020-41 = "シスターフッドが保証しましょう。誰にも、異議申し立てなどさせません。"
33020-42 = "……ありがとうございます、サクラコさん！"
33020-47 = "[ns] \"本当にありがとう。\""
33020-48 = "……これで白洲アズサさんは、正式にトリニティの生徒となりました。"
33020-49 = "まだ問題は山積みですし、特にアリウス分校のことは何も解決できていませんが……。"
33020-50 = "取り急ぎ、目の前の問題だけは落ち着いたと言えるかもしれませんね。"
33020-51 = "お疲れ様でした。ハナコさん、そして[USERNAME]先生。"
33020-52 = "ふふっ♡"
33020-53 = "では。私は他に用事があるのでお先に失礼します。マリー、行きましょう。"
33020-54 = "は、はい。"
33020-55 = "あの、ハナコさん。先生も……状況が落ち着いたら、後でぜひゆっくりお話を……。"
33020-57 = "ふふっ、そうですね。楽しみにしてますよ、マリーちゃん。"
33020-60 = "ふぅ……アズサちゃんの書類も、これで何とかなりましたね。"
33020-61 = "[s] \"お疲れ様、ハナコ。\""
33020-62 = "はい、先生の方こそお疲れ様です。ですがまだ、色々と残っていますね……"
33020-63 = "ナギサさんのことも、ミカさんのことも……。"
33020-64 = "あ、そういえばこの前、ナギサさんがヒフミちゃんと会ったそうです。"
33020-65 = "[s] \"ナギサ……！\""
33020-66 = "私もヒフミちゃんから聞いただけですが……"
33020-68 = "……ヒフミさん。"
33020-69 = "な、ナギサ様、少し瘦せられましたか……？だ、大丈夫ですか？"
33020-70 = "……ヒフミさん、どうかきちんと謝らせてください。"
33020-74 = "私は、ヒフミさんのことを疑いました。"
33020-75 = "えっ、あっ……。"
33020-76 = "これまでヒフミさんが理不尽に負った傷を考えると、私はこの場で紅茶をかけられたとしても何も言えません。"
33020-77 = "ヒフミさんが、水着姿の犯罪者集団のリーダーだなんて……私はどうして、そんなことを……。"
33020-78 = "えっ、と…………。"
33020-79 = "私を許してくださいとは言いません……許されるとも、思っていません。ですが……"
33020-80 = "そ、その、ナギサ様。"
33020-81 = "わ、私は大丈夫と言いますか……も、もちろん大変な時もありましたが……何よりもまず先に、これだけはお伝えさせてください。"
33020-82 = "私はナギサ様を憎んだりなんて、そんなの考えたこともありません。ですからどうか、これ以上謝らないでください……。"
33020-83 = "……。"
33020-84 = "……私だったらきっと、許せなかったと思います。ヒフミさんは、どうして……"
33020-85 = "ど、「どうして」と言われましても、何ででしょうね……？あ、あはは……"
33020-89 = "（「あはは……」）"
33020-91 = "あはは……えっと、それなりに楽しかったですよ。ナギサ様とのお友達ごっこ。"
33020-92 = "ごふっ！ごほっ、けほっけほっ！"
33020-93 = "な、ナギサ様……！？"
33020-95 = "けほっ、けほっ……こほん。いえ、その、お気になさらず……。"
33020-96 = "ほ、本当に大丈夫ですか……！？"
33020-101 = "[ns] \"（……やっぱりまたすぐに会いに行こう）\""
33020-102 = "うーん、誤解はもう解いたのですが……少しやり過ぎてしまったみたいですね……。"
33020-106 = "それにナギサさんは、どうやら他の方にも――"
33020-115 = "私も謝られました、酷いことをしてしまった……と。"
33020-116 = "……。"
33020-117 = "疑心暗鬼の闇からは、抜け出せつつあると思います。しかしその代わりではありませんが、ナギサさんは……"
33020-118 = "[s] \"……何か、私にできることをしないと。\""
33020-119 = "……。"
33020-120 = "[s] \"それに、もちろんミカも……。\""
33020-121 = "ミカさん……。"
33020-125 = "先生は……ミカさんの動機について、どう思いますか？"
33020-127 = "んー？聞きたい？先生にそう言われたら仕方ないなぁ。"
33020-128 = "それはね……ゲヘナが嫌いだからだよ。"
33020-129 = "私は本当に、心から……心の底からゲヘナが嫌いなの。"
33020-131 = "ナギサさんとミカさん。親しさというのは、外から判断できるようなものではありませんが……お二人は長い時間を過ごした幼馴染です。"
33020-132 = "真面目過ぎるほど真面目で、慎重に慎重を重ねるタイプのナギサさんと、活動的でアクティブなミカさん……。"
33020-133 = "性格もほとんど真逆で、傍から見ても「仲良し」とは安易に断定できないお二人でしたが……"
33020-134 = "ですがそれでも、私にはまだ「ゲヘナが嫌いだ」という理由だけで、あの事件を起こしたとは到底……。"
33020-135 = "……この前シスターフッドの手を借りて、ミカさんに会いに行ったんです。"
33020-137 = "そこには、先客の方もいて……。"
33020-139 = "トリニティ・監獄"
33020-140 = "わぁっ、ナギちゃんじゃん！いらっしゃい！"
33020-141 = "……ミカさん、調子はいかがですか？何か不便なことなどは？"
33020-142 = "まあその話で言うなら、不便なことだらけだけどね？とはいえテレビだってあるし、地下の牢獄よりはマシだよ。"
33020-143 = "いやー、ここに入るなんて思ってなかったなぁ。まあ予想してなかったわけじゃないんだけど、まさかこのタイミングだなんてね。"
33020-144 = "……そう、ですね。"
33020-145 = "まあまあ、予想できないことが起きることも人生の醍醐味ってことで。そんな感じにしておこ？"
33020-146 = "……。"
33020-147 = "……。"
33020-148 = "……本当に、ナギちゃんが来てくれるとは思ってなかったよ。"
33020-149 = "……。"
33020-154 = "次回;ポストモーテム（３）"

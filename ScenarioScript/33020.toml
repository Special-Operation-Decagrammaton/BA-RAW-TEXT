[translation]
33020-1 = "ตอนที่ 2;หาความจริง 2"
33020-2 = "เซอาพูดไว้ว่า..."
33020-3 = "หากความขัดแย้งระหว่างเกเฮนน่ากับทรีนิตี้หายไปด้วยสนธิสัญญาเอเดน#nต่อไปปัญหาในอาเรียสก็อาจจะได้รับการคลี่คลาย"
33020-4 = "วิธีเดียวที่จะแก้ปัญหาที่หยั่งรากลึกในปัจจุบันของทรีนิตี้ก็คือสนธิสัญญาเอเดน"
33020-5 = "แต่ว่าอาเรียสก็หวังที่จะทำลายฮาโลของสภาน้ำชา... หากเป็นแบบนั้น#nคิโวทอสก็คงได้กลายเป็นสนามรบ"

33020-37 = "ค่ะ..."
33020-38 = "ที่จริงแล้วชิราสึ อาซึสะย้ายมาที่ทรีนิตี้แล้วปกป้องคุณนางิสะ ฉันไม่มีข้อสงสัยใดๆ#nในพฤติกรรมนั้นหรอกค่ะ"

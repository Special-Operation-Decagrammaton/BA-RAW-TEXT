[translation]
33020-1 = "第2話;事後分析（２）"
33020-2 = "……聖亞這樣說了。"
33020-3 = "如果能藉由伊甸園條約，讓格黑娜和三一間的紛爭消失的話，奧利斯的問題或許也能解決。"
33020-4 = "解決兩校間根深蒂固的問題的方法，至少現在只有伊甸園條約……吧。"
33020-5 = "……然而同時，奧利斯打算破壞茶會的光環。要是成功執行的話，奇普托斯會淪為真正的戰場。"
33020-6 = "想不想阻止這件事……被這樣問了。"
33020-8 = "……這樣啊。"
33020-9 = "……我先說，白洲梓。我不肯定妳的想法。"
33020-10 = "因為我對於第五項的古則……也就是「樂園的證明」是不可能的這件事，比任何人都更清楚。"
33020-11 = "不過……"
33020-12 = "就算你知道一切都將走向毀滅，仍然選擇要掙扎的話……"
33020-13 = "就將我的智慧借給妳吧。"
33020-14 = "不過那會變成什麼樣的結果，我無法做任何保證──"
33020-16 = "……然後，妳就引爆了聖亞同學的房間？"
33020-17 = "……這是為了偽裝「聖亞死了」必須要做的事。#n畢竟能完全騙過奧利斯小隊的手段相當有限……"
33020-18 = "聖亞為了隱蔽全部的事件，指名了救護騎士團的團長作為幫手。她說，之後全部交給她。"
33020-19 = "……接著我就引爆房間逃走了。之後綜合在三一的騷動和情報，小隊相信我成功執行了任務。"
33020-20 = "……這就是事情的始末。"
33020-21 = "……"
33020-22 = "關於那之後的事，我也不知道。還沒有恢復意識的事也……"
33020-23 = "聖亞醬的外傷似乎已經完全痊癒了。#n至於聖亞醬的意識之所以還沒恢復，似乎是因為其他原因……"
33020-24 = "那麼，妳並不知道下達襲擊命令的是彌香大人嗎？"
33020-25 = "這……"
33020-26 = "彌香同學一直完美隱藏著自己的真實身分。#n像梓醬這種位於命令系統最下層的人，想必沒理由知道吧。"
33020-27 = "梓，梓醬並不是殺人兇手……！那個時候梓醬也，想要救渚大人……！"
33020-28 = "……不好意思。像這樣質問是我的工作。"
33020-29 = "……花子、日步美。我沒事。"
33020-35 = "實際對我下達命令的是，奧利斯小隊的隊長「沙織」。負責指揮小隊的是她。"
33020-37 = "……沒錯呢。"
33020-38 = "總之，白洲梓同學……她轉學來三一，然後實際上保護了渚同學。這件事一目瞭然。"
33020-39 = "儘管過程中發生了很多事，在特別學力測驗中也合格了。補課部包含她在內的所有人，都留下了明確的成果。"
33020-40 = "沒有可以挑剔的地方吧……她的文件，會由我轉為正式文件。"
33020-41 = "修女會可以保證。不會讓任何人，有任何異議。"
33020-42 = "……非常感謝妳，櫻子同學！"
33020-47 = "[ns]「真的謝謝妳。」"
33020-48 = "……這樣一來白洲梓同學就正式成為三一的學生了。"
33020-49 = "雖然問題還堆積如山，特別是奧利斯分校的事什麼都沒有解決……"
33020-50 = "暫且，可以說眼前的問題安定下來了呢。"
33020-51 = "辛苦你們了。花子同學，還有[USERNAME]老師。"
33020-52 = "呵呵♡"
33020-53 = "那麼。我還有其他事就先失禮了。瑪麗，走吧。"
33020-54 = "是，是的。"
33020-55 = "那個，花子同學，還有老師……狀況安定下來之後，還請務必好好談談……"
33020-57 = "呵呵，說的也是呢。我很期待唷，瑪麗醬。"
33020-60 = "呼……這下梓醬的文件也總算是解決了呢。"
33020-61 = "[s]「辛苦妳了，花子。」"
33020-62 = "是的，老師才是辛苦了。不過還剩下很多事還沒解決呢……"
33020-63 = "不管是渚同學的事，還是彌香同學的事……"
33020-64 = "啊，話說之前，渚同學和日步美醬似乎見面了。"
33020-65 = "[s]「渚……！」"
33020-66 = "我也是從日步美醬那邊聽說的……"
33020-68 = "……日步美同學。"
33020-69 = "渚，渚大人，是不是瘦了一點……？還，還好嗎？"
33020-70 = "……日步美同學，請讓我好好向妳道歉。"
33020-74 = "我，懷疑了日步美同學。"
33020-75 = "咦，啊……"
33020-76 = "考慮到日步美同學至今為止受到的不合理的創傷，就算我在這裡被潑紅茶也沒有怨言。"
33020-77 = "日步美同學是穿著泳衣的犯罪集團首領這種事……我為什麼，會相信那種事……"
33020-78 = "那，個…………"
33020-79 = "我不會請妳原諒我……我也不認為，會被原諒。不過……"
33020-80 = "那，那個，渚大人。"
33020-81 = "我，我沒事……當，當然也有辛苦的時候……不過最重要的是，首先讓我說這件事。"
33020-82 = "憎恨渚大人這種事，我從來沒有想過。所以請妳不要再道歉了……"
33020-83 = "……"
33020-84 = "……換作是我的話，肯定無法原諒。日步美同學，為什麼……"
33020-85 = "就，就算被問「為什麼」，是為什麼呢……？啊，啊哈哈……"
33020-89 = "（「啊哈哈……」）"
33020-91 = "啊哈哈……那個，還算挺開心的唷。和渚大人的朋友遊戲。"
33020-92 = "咳咳！咳咳，咳咳咳咳！"
33020-93 = "渚，渚大人……！？"
33020-95 = "咳咳，咳咳……咳哼。#n沒什麼，那個，請不用在意……"
33020-96 = "真，真的沒事嗎……！？"
33020-101 = "[ns] （……果然還是立刻去見她吧）"
33020-102 = "嗯……雖然誤會已經解開了……不過似乎做得太過火了呢……"
33020-106 = "而且渚同學，看來對其他人也──"
33020-115 = "我也被道歉了，說是……做了很過分的事。"
33020-116 = "……"
33020-117 = "我認為她正漸漸地，從疑心暗鬼的黑暗中脫離出來。雖然不是作為交換，但渚同學她……"
33020-118 = "[s]「……得做些我所能做到的事才行。」"
33020-119 = "……"
33020-120 = "[s]「還有，當然彌香也是……」"
33020-121 = "彌香同學……"
33020-125 = "老師對於……彌香同學的動機，是怎麼想的？"
33020-127 = "嗯？想知道嗎？既然老師都這麼說那也沒辦法了呢。"
33020-128 = "那是因為……討厭格黑娜唷。"
33020-129 = "我真的，真心……打從心底厭惡格黑娜。"
33020-131 = "渚同學和彌香同學。她們的親密，不是可以從外表判斷的……兩位是相處了長時間的青梅竹馬。"
33020-132 = "認真過頭般的認真，慎重再慎重的類型的渚同學和，活潑積極的彌香同學……"
33020-133 = "雖然是性格幾乎相反，從旁人來看也沒辦法輕易斷定「感情好」的兩人……"
33020-134 = "即使如此，我還沒辦法認為只因「討厭格黑娜」這樣的理由，就引起那個事件……"
33020-135 = "……之前藉由修女會的幫助，我去見了彌香同學。"
33020-137 = "那裡，也有先到的客人……"
33020-139 = "三一．監獄"
33020-140 = "哇，這不是渚醬嗎！歡迎！"
33020-141 = "……彌香同學，感覺如何？有什麼不便的地方嗎？"
33020-142 = "嘛要說那個的話，不便的地方到處都是呢？就算這麼說也有電視，比地下的監獄還好唷。"
33020-143 = "哎呀，沒想到會進來這裡呢。嘛，雖然也不是沒有預料到，沒想到會在這個時機點呢。"
33020-144 = "……確實，如此呢。"
33020-145 = "嘛嘛，發生沒預料到的事也是人生的樂趣。就當作是那樣吧？"
33020-146 = "……"
33020-147 = "……"
33020-148 = "……說真的，沒想到渚醬會來呢。"
33020-149 = "……"
33020-154 = "下一話;事後分析（３）"

33020-1 = "#title;제2화;포스트모템 2"
33020-2 = "3;아즈사;02;……세이아는 그렇게 말했어.\n#3;a\n#3;em;[반응]"
33020-3 = "3;아즈사;01;에덴조약으로 게헨나와 트리니티의 분쟁이 사라진다면, 아마 그다음엔 아리우스의 문제를 해결할 수 있을지도 모른다고."
33020-4 = "3;아즈사;99;트리니티가 고질적으로 가지고 있는 이 문제를 해결할 수 있는 방법은, 지금은 이 에덴조약 밖에 없다고."
33020-5 = "3;아즈사;06;……하지만 아리우스는 티파티의 헤일로를 파괴하려고 하고 있어. 그렇게 된다면 키보토스는 진짜 전쟁터가 되겠지.\n#3;em;…"
33020-6 = "3;아즈사;01;그것을 막고 싶은거냐고 물었어……."
33020-7 = "3;세이아;01\n#3;closeup\n#3;h"
33020-8 = "3;세이아;01;……그렇군요.\n#3;closeup"
33020-9 = "3;세이아;05;하지만 분명하게 말씀드릴 수 있는 건, 저는 당신의 생각에 동의하지 않는다는 것입니다. 시라스 아즈사.\n#3;closeup"
33020-10 = "3;세이아;06;저는 5번째 화두…… 즉, 낙원의 증명 같은 건 불가능하다는 것을 누구보다 잘 알고 있거든요.\n#3;closeup"
33020-11 = "3;세이아;99;하지만…….\n#3;closeup"
33020-12 = "3;세이아;01;그 끝이 결국 파국으로 이어지더라도, 그럼에도 불구하고, 발버둥을 치겠다면…….\n#3;closeup"
33020-13 = "3;세이아;02;그렇다면, 당신에게 지혜를 빌려드리겠습니다.\n#3;closeup"
33020-14 = "3;세이아;05;하지만 그게 어떤 결과로 이어질지는…… \n#3;closeup\n#3;em;…"
33020-15 = "#all;hide"
33020-16 = "#3;hide\n#na;티파티 감찰관;그래서 세이아 님의 방을 폭파시킨 건가요?"
33020-17 = "3;아즈사;01;세이아가 죽은 걸로 위장하려면 반드시 필요했어. 아리우스 스쿼드도 속을 정도여야만 했으니까.\n#3;a"
33020-18 = "3;아즈사;02;세이아는 모든 사건을 은폐할 조력자로 구호기사단장을 지명했어. 나머지는 그 사람에게 맡기면 된다고."
33020-19 = "3;아즈사;99;그렇게 난 방을 폭파시키고 도망쳤어. 스쿼드는 그 이후 트리니티에서 벌어진 소동과 첩보를 통해 내가 성공했다고 믿었지."
33020-20 = "3;아즈사;01;그게 진상의 전부야…….\n#3;em;…"
33020-21 = "1;하나코;05;…….\n#1;a\n#3;m5"
33020-22 = "3;아즈사;06;그 이후로는 나도 세이아의 소식을 알지 못했어, 설마 아직 의식을 되찾지 못했을 줄은……."
33020-23 = "1;하나코;06;아니에요, 아즈사 쨩. 세이아 쨩의 상처는 다 나았어요. 세이아 쨩이 의식을 못 찾는 건 뭔가 다른 이유인 거 같아요…….\n#1;em;[반응]"
33020-24 = "#na;티파티 감찰관;그럼 습격 명령을 내린 사람이 미카 님인지는 전혀 몰랐다는 건가요?"
33020-25 = "3;아즈사;04;나는…….\n#3;em;[땀]\n#3;stiff"
33020-26 = "3;아즈사;04\n1;하나코;05;미카 씨는 철저하게 자신의 정체를 속이고 있었어요. 아즈사 쨩 같은 말단이 알 수 있는 방법은 없었을 거예요."
33020-27 = "3;아즈사;04\n1;하나코;05\n5;히후미;04;아, 아우우…… 아즈사 쨩은 살인자가 아니에요……! 그 뒤에도 아즈사 쨩은 나기사 님을 구하려고 엄청 애썼고 또…….\n#5;em;[반응]\n#5;hophop\n#5;al\n#3;m3"
33020-28 = "#na;티파티 감찰관;아니, 저는 그저 일을 하고 있는 거라……."

33020-16 = "ก็เลยระเบิดห้องของคุณเซอาเหรอคะ?"
33020-17 = "ฉันจำเป็นต้องทำอย่างนั้นถ้าหากจะสร้างสถานการณ์ว่าเซอาเสียชีวิต#nเพราะต้องหลอกสควอดของอาเรียสด้วย"
33020-18 = "เซอาแต่งตั้งให้ชมรมอัศวินบรรเทาทุกข์เป็นผู้ช่วยเหลือในการปกปิดเหตุการณ์ทั้งหมด เธอบอกว่าที่เหลือให้ฝากไว้กับคนคนหนึ่ง"
33020-19 = "ฉันก็เลยระเบิดห้องแล้วหนีออกมา ส่วนสควอดก็เชื่อว่าฉันทำสำเร็จเพราะดูจากความวุ่นวายในทรีนิตี้ และได้ข่าวจากแหล่งข่าว"
33020-20 = "และนี่คือความจริงทั้งหมด..."
33020-21 = "......."
33020-22 = "หลังจากเหตุการณ์นั้นฉันเองก็ไม่ได้ข่าวของเซอา แล้วก็ไม่รู้ด้วยว่ายังไม่ได้สติ..."
33020-23 = "ไม่หรอกค่ะอาซึสะจัง บาดแผลของเซอาจังน่ะหายหมดแล้วละค่ะ แต่การที่ยังนอนไม่ฟื้นแบบนี้ น่าจะมาจากสาเหตุอื่นค่ะ..."

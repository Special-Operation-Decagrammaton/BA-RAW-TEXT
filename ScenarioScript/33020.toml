[translation]
33020-1 = "Episode 2;Postmortem Part 2"
33020-2 = "This is what Seia said."
33020-3 = "If the long-standing dispute between Gehenna and Trinity can be resolved through the Eden Treaty, then perhaps Arius' troubles can be addressed next."
33020-4 = "She also said the treaty was the only way to solve Trinity's deep-rooted issues..."
33020-5 = "But Arius wants to destroy the Tea Party's halos. If they succeeded...then war would break out in Kivotos."
33020-6 = "Seia asked if that was what I truly wanted."
33020-8 = "I see."
33020-9 = "What I can say for certain is that we don't see eye to eye,#nShirasu Azusa."
33020-10 = "I'm familiar with the fifth koan. I know better than anyone the fallacy of trying to prove the existence of paradise."
33020-11 = "However..."
33020-12 = "...if you wish to continue struggling in the face of catastrophe,#nthen I will help."
33020-13 = "I'll lend you my wisdom."
33020-14 = "Though I can make no promises about where it will lead you. "
33020-16 = "And then you destroyed the room?"
33020-17 = "It was necessary to stage Seia's death. Arius needed to be deceived as well."
33020-18 = "Seia personally chose the Remedial Knights' captain to lead the cover-up. She told me I could leave the rest to her. "
33020-19 = "I fled after the room was destroyed. Once the dust settled and intel about the incident began to spread, Squad was under the impression that I succeeded."
33020-20 = "That's everything I know about that night."
33020-21 = "..."
33020-22 = "I've been in the dark ever since. I had no idea that Seia was still unconscious."
33020-23 = "Her injuries have healed at least. Her being comatose remains a mystery."
33020-24 = "Then you were unaware that the plan to attack Seia was originally devised by Mika?"
33020-25 = "I..."
33020-26 = "Mika had completely obfuscated her involvement. There would have been no way for a foot soldier like Azusa to know."
33020-27 = "Y-Yeah! We know Azusa, and she's no murderer! She even tried to save Nagisa's life after everything she did to us."
33020-28 = "Yes, of course...but my job requires me to ask questions like these."
33020-29 = "No, it's okay. I'll be fine."
33020-35 = "The one who gave me my orders was Joumae Saori, the leader of Squad."
33020-37 = "Correct."
33020-38 = "Shirasu Azusa then transferred to Trinity with the covert objective of protecting Nagisa. That much is clear."
33020-39 = "Along the way, she and the Make-Up Work Club even passed their evaluation exam. That shows that she knows how to get results."
33020-40 = "I can't find any fault with her, personally. Therefore, I will take responsibility and authenticate her documents. "
33020-41 = "No one should have any objections to her enrollment with the Sisterhood vouching for her."
33020-42 = "Thank you, Sakurako!"
33020-47 = "[ns] \"We owe you one.\""
33020-48 = "This officially makes Shirasu Azusa a Trinity student."
33020-49 = "There is still unfinished business, especially where Arius is concerned..."
33020-50 = "...but all of the urgent fires have been extinguished for now."
33020-51 = "Job well done, everyone. Especially to you, Hanako and Sensei."
33020-52 = "Why, thank you! ♥"
33020-53 = "I have other matters to attend to, so I'll be taking my leave. Let's go, Mari."
33020-54 = "Yes."
33020-55 = "Um...would you two mind having another chat with me when things settle down a little more?"
33020-57 = "It would be our pleasure. "
33020-60 = "Phew. At least the situation with Azusa's enrollment has been cleared up."
33020-61 = "[s] \"You did good, Hanako.\""
33020-62 = "Same to you, but there's still so much more to be done."
33020-63 = "Especially as far as Nagisa and Mika are concerned."
33020-64 = "Oh, speaking of which, I heard Hifumi met with her not too long ago."
33020-65 = "[s] \"With Nagisa?\""
33020-66 = "Yeah, that's what she told me. I guess they had a lot to clear the air about. "
33020-68 = "Hifumi."
33020-69 = "H-Hi, Nagisa. Y-You're looking well. H-Have you lost weight?"
33020-70 = "I asked you here to issue a formal apology, Hifumi. "
33020-74 = "I'm sorry for doubting you. "
33020-75 = "O-Oh. That. "
33020-76 = "I could hardly blame you for grabbing a cup of tea and pouring it over my head right now, considering everything I've put you through."
33020-77 = "To think I had you pegged as the leader of a masked criminal organization. That couldn't possibly be true. I don't know why I believed those rumors."
33020-78 = "..."
33020-79 = "I completely understand if you choose not to forgive me. In fact, I don't expect you to."
33020-80 = "N-No, that's not it."
33020-81 = "I'll be fine, I think. Yeah, there were times where it really hurt...but it was just a misunderstanding that's been cleared up now. "
33020-82 = "It's not like I considered hating you or anything like that. You don't have to say anything else. I'll be fine..."
33020-83 = "..."
33020-84 = "I don't think I could ever be as forgiving. You're such an interesting girl, Hifumi."
33020-85 = "Me? Th-That's funny..."
33020-89 = "(\"Funny,\" hmm?)"
33020-91 = "It was a funny fantasy, thinking we were ever really friends."
33020-92 = "*cough*! *cough* *cough*!"
33020-93 = "Nagisa? "
33020-95 = "*cough* I'm f-fine. A little bit of tea slipped down the wrong pipe, that's all."
33020-96 = "O-Oh..."
33020-101 = "[ns] \"...\""
33020-102 = "I-I'm glad their misunderstanding is cleared up, but it looks like the joke I played on Nagisa may have gone a little too far. "
33020-106 = "Nagisa has also been meeting with others to issue proper apologies for everything that happened."
33020-115 = "She even gave one to me, and I told her I was sorry for being such a troublemaker."
33020-116 = "..."
33020-117 = "She's no longer wallowing in doubt and paranoia...but it came at a steep price."
33020-118 = "[s] \"I'm kind of worried about her.\""
33020-119 = "Yeah, so am I. "
33020-120 = "[s] \"And Mika too.\" "
33020-121 = "You are...? "
33020-125 = "I've been wanting to ask you what you think of her motives, actually."
33020-127 = "Hmm? You want to know why I'm doing this, Sensei?"
33020-128 = "Because I hate Gehenna."
33020-129 = "I sincerely loathe Gehenna Academy from the depths of my heart."
33020-131 = "It's hard to know what their relationship was truly like from the outside looking in, but Nagisa and Mika were supposed to be childhood friends."
33020-132 = "Opposites attract, as they say. Nagisa was always diligent and overly cautious, whereas Mika was the free-spirited, spontaneous one."
33020-133 = "Maybe they drifted apart and weren't as close as they seemed... "
33020-134 = "...but it still shocked me to hear Mika would betray Nagisa just because of her hatred of Gehenna."
33020-135 = "That's why I arranged to meet with her through the Sisterhood. "
33020-137 = "Though when I went to see her, someone else was already there first."
33020-139 = "Trinity Confinement"
33020-140 = "Wow! It's Nagi! Welcome!"
33020-141 = "Hello, Mika. How have you been? Staying comfortable?"
33020-142 = "Hardly, but it could be worse. At least I wasn't thrown into a tiny cell underground. They even let me have a TV. I have pretty much everything I could ever need."
33020-143 = "I really didn't think I'd end up here—well, not right now at least. The timing is really poor."
33020-144 = "Agreed. I never saw it coming."
33020-145 = "Isn't life beautifully unpredictable? At least that's how I feel!"
33020-146 = "..."
33020-147 = "..."
33020-148 = "I really didn't think you'd come, Nagi. "
33020-149 = "..."
33020-154 = "Next Episode;Postmortem Part 3"

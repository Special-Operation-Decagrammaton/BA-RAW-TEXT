33020-8 = "นั่นสิคะ..."
33020-9 = "แต่ที่ฉันบอกได้อย่างชัดเจนก็คือ ฉันไม่เห็นด้วยกับความคิดของคุณค่ะ ชิราสึ อาซึสะ"
33020-10 = "เพราะฉันรู้ดีกว่าใครว่ากฎโบราณข้อที่ 5 ที่บอกว่าการพิสูจน์สวรรค์เป็นเรื่องที่เป็นไปไม่ได้"

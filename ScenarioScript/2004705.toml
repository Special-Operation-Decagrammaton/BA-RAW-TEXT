[translation]
2004705-1 = "หอสูงในหัวใจ"
2004705-11 = "(คุณครูกับคิเคียวสนุกกับการเล่นน้ำตื้นๆ ด้วยกัน)"
2004705-12 = "(แต่คิเคียวก็ยังไม่กล้าปล่อยมืออยู่ดี)"
2004705-15 = "เหมือนจะชินกับน้ำขึ้นบ้างแล้วนะ..."
2004705-16 = "ไม่สิ... อย่าเข้าใจผิด ฉันไม่ได้กลัวน้ำสักหน่อย"
2004705-17 = "ที่ต้องจับมือไว้ก็เพราะเพื่อความปลอดภัยต่างหาก..."
2004705-18 = "......"
2004705-19 = "เอาเถอะ นี่คงพอแล้วละ"
2004705-20 = "เราว่ายน้ำกันพอแล้ว งั้นก็มาหาอย่างอื่นทำบ้างดีกว่า"
2004705-21 = "ฉันเคยบอกไว้ใช่มั้ยล่ะว่าอยากลองทำสิ่งที่ไม่เคยทำดู?"
2004705-22 = "ฮุฮุ สงสัยใช่มั้ย?"
2004705-23 = "เอาละ ฉันจะบอกให้เดี๋ยวนี้"
2004705-27 = "ก่อนอื่นก็เข้ามานอนตรงนี้"
2004705-28 = "จากนี้ไปฉันจะให้รางวัลที่คุณครูช่วยดูแลฉันตอนลงทะเล"
2004705-29 = "[s1] \"ระ... รางวัลเหรอ?\"\n[s2] \"จะทำอะไรให้เหรอ?!\""
2004705-32 = "เดี๋ยวก็รู้น่า"
2004705-33 = "คุณแค่นอนนิ่งๆ ก็พอ"
2004705-34 = "ส่วนที่เหลือก็ปล่อยให้เป็นหน้าที่ของฉัน แล้วก็อย่าขยับล่ะ"
2004705-35 = "เอาละ... ทีนี้ก็หลับตา"
2004705-37 = "(แล้วคุณครูนอนหลับตาตามที่คิเคียวสั่ง)"
2004705-42 = "บอกแล้วไงว่าอย่าขยับ มันพังแล้วนะ"
2004705-47 = "นอนนิ่งๆ อยู่เฉยๆ"
2004705-52 = "(ครู่ต่อมา...)"
2004705-57 = "เสร็จแล้ว ทีนี้ก็ลืมตาได้เลย"
2004705-60 = "เป็นยังไงบ้าง?"
2004705-61 = "รู้สึกยังไงกับการอบทรายร้อนสุดพิเศษจากฉัน?"
2004705-62 = "[s3] \"รู้สึก... หนักไปทั้งตัวเลย!\"\n[s4] \"ชะ... ช่วยด้วย!\""
2004705-65 = "อย่าพูดอะไรที่คนอื่นฟังแล้วจะเข้าใจผิดสิ นี่คือสิ่งที่ฉันทำเพื่อคุณเลยนะ"
2004705-66 = "ว่ากันว่าการอบทรายร้อนมีประโยชน์หลายอย่างน่ะ"
2004705-67 = "พออุณหภูมิร่างกายสูงขึ้น เหงื่อที่ออกมาก็จะคอยชำระล้างผิวให้สะอาด แล้วพออัตราการเต้นของ#nหัวใจเพิ่มขึ้น ออกซิเจนและสารอาหารจะถูกส่งไปยังร่างกาย"
2004705-68 = "แถมยังดีต่ออาการปวดเส้นประสาทและปวดข้อด้วยนะ"
2004705-69 = "เป็นไงล่ะ? รู้สึกเหมือนความเหนื่อยล้าที่เคยมีหายไปหมดเลยใช่มั้ย?"
2004705-70 = "[s5] \"ก็น่าจะนะ แต่ทรายมันเยอะไป...\"\n[s6] \"แต่เอาทรายมาถมครูเยอะไปหรือเปล่า?\""
2004705-73 = "ถ้าทำกองทรายธรรมดาๆ มันก็น่าเบื่อ ฉันก็เลยทำเป็นปราสาททรายขึ้นมาน่ะ"
2004705-74 = "คุณครูเป็นคนที่คอยปกป้องนักเรียนไม่ใช่เหรอ? ก็เหมือนกับหน้าที่ของปราสาทนั่นละ"
2004705-75 = "เอาละ ฉันจะเอาตุ๊กตาของตัวเองไปไว้บนหอสูงนะ มันเป็นตุ๊กตาไม้น่ะ"
2004705-76 = "เป้าหมายคือนอนอบให้ได้ 30 นาที ถ้าตุ๊กตาตัวนี้หล่นลงมา ก็ต้องเริ่มใหม่ตั้งแต่แรกนะ"
2004705-77 = "[s7] \"ครูไม่ทำให้คิเคียวตกลงมาอยู่แล้ว\"\n[s8] \"ครูจะนิ่งและทนไว้ให้ได้นานที่สุดเลย...!\""
2004705-80 = "ดะ... ดูพูดเข้าสิ..."
2004705-81 = "ฮุฮุ... หมายความว่ายังชิลได้อยู่สินะ"
2004705-82 = "งั้นก็ตัวนี้ ตัวนี้... แล้วก็ตัวนี้ด้วย"
2004705-88 = "ฉันวางตุ๊กตาเพิ่มให้แล้ว"
2004705-89 = "ชะตากรรมของเฮียกกะเรียวรันตกอยู่กับคุณครูแล้วละ...#nคุณคงอดทนได้และไม่ทำให้ใครหล่นลงมาใช่มั้ย?"
2004705-90 = "[s] \"คะ... ครูจะพยายาม!\""
2004705-91 = "ไหนลองพิสูจน์ให้ฉันดูซิ... ว่าพันธมิตรของเราหนักแน่นแค่ไหน"
2004705-92 = "[s] \"นี่ก็หนัก... แล้วก็แน่นมากแล้วนะ...\""
2004705-94 = "[ns] \"จะว่าไป... คิเคียวก่อปราสาททรายสวยเลยนะเนี่ย\""
2004705-95 = "ฉันเล่นก่อปราสาททรายมาตั้งแต่เด็กๆ แล้วน่ะ"
2004705-96 = "ฉันชอบใช้ปราสาททรายกับตุ๊กตาไม้เพื่อทดสอบกลยุทธ์กับยุทธศาสตร์ต่างๆ แต่มันก็เป็นการเล่นสนุก#nด้วยนะ"
2004705-97 = "[s] \"เป็นนักวางยุทธศาสตร์มาตั้งแต่เด็กๆ สินะเนี่ย\""
2004705-98 = "มันเป็นแค่การเล่นบทบาทสมมติตอนเด็กน่ะ"
2004705-99 = "แต่ยังไงความทรงจำก็เป็นสิ่งล้ำค่า แล้วมันก็ส่งผลต่อความคิดและชีวิตของฉันมากเลยละ"
2004705-100 = "ปราสาทที่สร้างขึ้นในใจโดยมีความทรงจำเป็นรากฐาน... คงไม่พังทลายลงง่ายๆ หรอกว่ามั้ย?"
2004705-101 = "บางทีช่วงเวลานี้ที่ได้อยู่กับคุณก็..."
2004705-105 = "...!"
2004705-106 = "มะ... ไม่สิ เอาเป็นว่าคุณไม่ได้ยินอะไรนะ"
2004705-107 = "ฉันเผลอพูดอะไรเหลวไหลออกไปเสียได้"
2004705-112 = "หืม? คุณครู ตอนนี้ปราสาทมันสั่นอยู่นะ..."
2004705-113 = "[ns] \"คิเคียว...!\""
2004705-114 = "จะ... จู่ๆ เป็นอะไรไป..."
2004705-118 = "ว้าย...!"
2004705-125 = "คะ... คุณครู?"
2004705-126 = "[s9] \"ครูจะเป็นคนสร้างความทรงจำให้เอง!\"\n[s10] \"ถึงตาของคิเคียวที่จะได้อบทรายร้อนบ้างแล้วละ!\""
2004705-129 = "ฉันก็ไม่ว่าอะไรหรอกนะ... แต่ว่า"
2004705-130 = "ตุ๊กตา... มันหล่นลงมาหมดแล้ว คุณครู"
2004705-135 = "(หลังจากนั้นคุณครูกับคิเคียวก็เล่นทรายด้วยกัน)"

[translation]
2004705-1 = "Tenshukaku of My Heart"
2004705-11 = "We were enjoying playing in the shallow waters together."
2004705-12 = "However, Kikyou wouldn't let go of my hand."
2004705-15 = "I've grown rather accustomed to this."
2004705-16 = "...Don't misunderstand. I am not afraid of the water. At all."
2004705-17 = "This is all for the safety of..."
2004705-18 = "..."
2004705-19 = "Well. Never mind."
2004705-20 = "We've played in the water enough. Let's do something else."
2004705-21 = "After all, I said we should try something new, no?"
2004705-22 = "I've piqued your curiosity, haven't I?"
2004705-23 = "I'll teach you."
2004705-27 = "Come. Lie down here."
2004705-28 = "For being my ocean escort, I will reward you, Sensei."
2004705-29 = "[s1] \"R-Reward me?\"\n[s2] \"What are you going to do to me?!\""
2004705-32 = "You'll know soon enough."
2004705-33 = "All you must do is lie down."
2004705-34 = "Entrust yourself to me. And do not move."
2004705-35 = "Now... Lie down and close your eyes."
2004705-37 = "Albeit a little hesitantly, I did what Kikyou said."
2004705-42 = "Did I not instruct you to stay still? You'll ruin it."
2004705-47 = "There. Don't move."
2004705-52 = "A little while later..."
2004705-57 = "It's done. You may open your eyes now."
2004705-60 = "What do you think..."
2004705-61 = "...of my special sand bath?"
2004705-62 = "[s3] \"My whole body...feels heavy!\"\n[s4] \"S-Save me!\""
2004705-65 = "Don't complain. I did this for you."
2004705-66 = "There are many benefits to a sand bath."
2004705-67 = "Sweating can cleanse your skin and pores, and the heat helps to circulate oxygen in your body."
2004705-68 = "It should help relieve any nerve and joint pains as well."
2004705-69 = "How is it? Do you feel less fatigued?"
2004705-70 = "[s5] \"I do feel pretty relaxed...\"\n[s6] \"But this is way too much sand!\""
2004705-73 = "It seemed rather boring to just create a pile, so I formed it into a castle."
2004705-74 = "You are one who protects your students, so it's rather fitting, is it not? My own Tenshukaku."
2004705-75 = "And here is a wooden doll of me atop."
2004705-76 = "You must protect doll Kikyou for 30 minutes. If I fall, then we'll start over."
2004705-77 = "[s7] \"I'd never let you fall!\"\n[s8] \"I'll do whatever it takes to hold on...!\""
2004705-80 = "T-To say such things so sincerely..."
2004705-81 = "Fufu. I see you still have some mischief left in you."
2004705-82 = "In that case, this, this...and this too."
2004705-88 = "I've added many more dolls."
2004705-89 = "With this, the Hyakkaryouran's fate is in your hands... You shall keep all of them atop the Tenshukaku, yes?"
2004705-90 = "[s] \"I-I'll do everything I can!\""
2004705-91 = "Then prove...how firm our alliance is."
2004705-92 = "[s] \"I think it's already pretty firm...\""
2004705-94 = "[ns] \"But, you know, this is a pretty good sandcastle.\""
2004705-95 = "I built many of them in my childhood."
2004705-96 = "I enjoyed creating strategies and mock wars with sandcastles and wooden dolls."
2004705-97 = "[s] \"So being an operations officer was like your fate!\""
2004705-98 = "Well, it began as simple roleplay."
2004705-99 = "Those childhood memories help define one's future, however. They are the building blocks for one's values."
2004705-100 = "Our hearts are like a castle, with memories as the cornerstones. With such precious foundations...it would not collapse so easily, would it?"
2004705-101 = "Like this moment, with you..."
2004705-105 = "...!"
2004705-106 = "N-Never mind. Forget that."
2004705-107 = "I ended up babbling ridiculous nonsense."
2004705-112 = "Hm? Sensei. The castle is shaking right now..."
2004705-113 = "[ns] \"...Kikyou!\""
2004705-114 = "Wh-What are you...?"
2004705-118 = "Kyah...!"
2004705-125 = "S-Sensei?!"
2004705-126 = "[s9] \"Leave making memories to me!\"\n[s10] \"It's time for you to get a sand bath, Kikyou!\""
2004705-129 = "I don't mind, but before that..."
2004705-130 = "The dolls fell off, Sensei."
2004705-135 = "Afterwards, Kikyou and I played in the sand together, burying each other and getting buried."

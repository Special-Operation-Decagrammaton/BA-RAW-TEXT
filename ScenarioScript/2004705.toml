[translation]
2004705-1 = "心靈的天守閣"
2004705-11 = "（在淺灘享受著海水浴）"
2004705-12 = "（不過桔梗仍然沒有鬆開手）"
2004705-15 = "好像稍微比較習慣了……"
2004705-16 = "……啊，你別誤會。我並沒有怕水。"
2004705-17 = "這只是為了安全而已……"
2004705-18 = "……"
2004705-19 = "算了，還是先別說這些了。"
2004705-20 = "海水浴也玩了好一陣子，來嘗試一下別的事情吧。"
2004705-21 = "之前不是跟你說過，我想做點上次沒做成的事嗎？"
2004705-22 = "呵呵，好奇嗎？"
2004705-23 = "來，我現在就告訴你。"
2004705-27 = "先到這邊躺下來吧。"
2004705-28 = "接下來，我要給護送我穿越海水的老師一個獎勵。"
2004705-29 = "[s1]「獎，獎勵？」\n[s2]「你想對我做什麼！？」"
2004705-32 = "你很快就會知道了。"
2004705-33 = "乖乖躺著就好。"
2004705-34 = "其他的事都交給我，別亂動。"
2004705-35 = "那麼……躺下來閉上眼睛吧？"
2004705-37 = "（依照桔梗的指示，乖乖閉上眼睛躺了下來）"
2004705-42 = "不是跟你說過不要動嗎？這樣會弄壞的。"
2004705-47 = "就這樣保持不動。"
2004705-52 = "（過了一會……）"
2004705-57 = "好，可以睜開眼睛了。"
2004705-60 = "覺得怎麼樣？"
2004705-61 = "對我特製的沙灘熱敷的感想如何？"
2004705-62 = "[s3]「全身……好重！」\n[s4]「救，救命啊──！」"
2004705-65 = "不要說那種會讓別人誤會的話。這全都是為了你好。"
2004705-66 = "據說這樣做有很多效果。"
2004705-67 = "體溫上升會促進排汗來淨化皮膚，心跳加快則能讓氧氣與營養遍布全身。"
2004705-68 = "還有能改善神經痛和關節的附加效果。"
2004705-69 = "怎麼樣？是不是覺得疲勞都消除了？"
2004705-70 = "[s5]「好像是有這種感覺……」\n[s6]「不過你是不是堆太多沙了？」"
2004705-73 = "單純堆沙太無聊了，所以我堆成了城堡的形狀。"
2004705-74 = "老師是守護學生的人對吧？跟城堡的形象也很搭。"
2004705-75 = "來，我在天守閣上放了我的人偶。是木芥子人偶哦。"
2004705-76 = "目標時間是30分鐘。#n如果過程中這孩子倒了的話，就要重新開始計時。"
2004705-77 = "[s7]「不能讓桔梗倒下！」\n[s8]「不管用什麼方法都要撐住……！」"
2004705-80 = "這，這種話也能這麼自然地說出來……"
2004705-81 = "呵呵……看來你還挺有餘裕的嘛。"
2004705-82 = "那麼這個和這個……再加上這個。"
2004705-88 = "人偶的數量增加囉。"
2004705-89 = "這樣一來，百花繚亂的命運就託付給老師了……#n你一定會撐住，不讓任何人倒下的吧？"
2004705-90 = "[s]「我，我會加油的！」"
2004705-91 = "來證明我們的同盟有多堅固吧……"
2004705-92 = "[s]「我其實覺得已經夠堅固了……」"
2004705-94 = "[ns]「話說回來……這座沙堡真的堆得很好耶。」"
2004705-95 = "畢竟從小到大堆了很多次嘛。"
2004705-96 = "我小時候會用沙堡和人偶試驗各種戰術和策略，當成一種遊戲。"
2004705-97 = "[s]「桔梗從以前就是參謀啊。」"
2004705-98 = "以前那不過是角色扮演而已。"
2004705-99 = "不過回憶是很重要的。#n既會影響思考，也會影響人生。"
2004705-100 = "以回憶為基礎，在心中築起的城堡──#n沒有那麼容易崩塌對吧？"
2004705-101 = "也許現在跟你在一起的這一刻……"
2004705-105 = "……！"
2004705-106 = "沒，沒什麼。剛才那句話就當沒聽到吧。"
2004705-107 = "我不小心口誤了。"
2004705-112 = "老師？現在城堡在晃耶……"
2004705-113 = "[ns]「……桔梗！」"
2004705-114 = "突，突然怎麼了……"
2004705-118 = "呀啊──！"
2004705-125 = "老，老師？"
2004705-126 = "[s9]「要製造回憶的話就交給我吧！」\n[s10]「這次換桔梗來做沙灘熱敷囉！」"
2004705-129 = "這倒是沒關係……不過在那之前。"
2004705-130 = "人偶倒了哦？老師。"
2004705-135 = "（之後繼續重複著埋與被埋的過程……和桔梗一起用沙堡渡過了愉快的時光）"

[translation]
1009002-1 = "Festivals Are Awesome. Really, Really, Really!"
1009002-3 = "Ah, Sensei!"
1009002-7 = "Heeheehee. Welcome to the festival!"
1009002-8 = "It's a bit chaotic, isn't it? I'll help you in just a moment."
1009002-9 = "[ns] \"It feels like a Hyakkiyako festival all right...\""
1009002-10 = "This one really isn't even that big!"
1009002-11 = "Especially compared to main attractions like the Hyakkiyako Cherry Blossom Festival, the Whirlpool Movie Village Attraction Festival, or the Hyakkiyako Lantern Festival..."
1009002-16 = "Nothing seems too extravagant when you compare it to those festivals, right?"
1009002-17 = "Ah! But I shouldn't really be comparing festivals. How misguided of me!"
1009002-18 = "Each festival has its own special meaning, and at the end of the day, all of them are fun!"
1009002-22 = "Always catching and correcting my mistakes... You're so wise, Sensei!"
1009002-25 = "[ns] \"Are you sure about that?!\""
1009002-27 = "Hey now, don't dawdle! Follow along! As you can see, this festival includes a procession with a palanquin covered in all kinds of dolls!"
1009002-28 = "In the past, these dolls were primarily modeled after princesses, but..."
1009002-29 = "Nowadays, it has become a festival where the palanquin is loaded with as many diverse and beautiful dolls as it can carry, and paraded through the streets!"
1009002-33 = "...I wonder if that's why so many dollmakers have been cozying up to the merchant guild and the event organizers..."
1009002-34 = "...There's been some strange issues with contracts for the materials to build the palanquin as well..."
1009002-35 = "[s] \"...Should I be hearing these behind-the-scenes details?\""
1009002-36 = "T-That aside, one thing hasn't changed: Every year they still place a large princess-shaped lantern in the center of the palanquin!"
1009002-40 = "And on this side, you can see festival-themed treats such as lotus flower-shaped candied apples, and a shaved ice dessert topped with a pink syrup made from strawberries and cherries!"
1009002-44 = "Look! The parade's performance has started! They're dancing to the music while marching behind the palanquin!"
1009002-48 = "Do you have your ticket? Excellent! There should be a coupon in it that you exchange up to four different items, including masks, fans, and even snacks!"
1009002-62 = "Phew... Following this palanquin parade for so long is exhausting..."
1009002-63 = "[s] \"I'm reminded again just how much you love festivals.\""
1009002-64 = "Who me?"
1009002-65 = "Heeheehee... It's a bit embarrassing if you say it out loud, Sensei..."
1009002-68 = "..."
1009002-69 = "Yes, I love festivals."
1009002-70 = "Doesn't everyone?"
1009002-71 = "They're a brief escape from daily life, into a world of dreams..."
1009002-72 = "When I think about how I'm someone who gets to help guide people to that world, it makes me so excited!"
1009002-73 = "Huh... I guess you could say it sounds like a theme park..."
1009002-74 = "Th-There are a few similarities... I-It makes sense someone could think that way."
1009002-75 = "But festivals feel so much more alive!"
1009002-76 = "[s] \"Alive?\""
1009002-77 = "Uh, I mean..."
1009002-82 = "As you can see, every festival is unique in its own way."
1009002-83 = "Take this doll palanquin festival for example! The dolls carried last year are different from the ones on the palanquin this year!"
1009002-84 = "That's because the merchant guild prohibits last year's dolls from being entered in the festival."
1009002-85 = "When it comes to preparing for festivals, I always approach each new event with a fresh wave of enthusiasm!"
1009002-86 = "I know you think they may be similar. And maybe they both try to bring people into a world of dreams. But festivals and theme parks are totally—"
1009002-87 = "[s1] \"Calm down, Umika. Breathe.\"\n[s2] \"I fully understand your passion.\""
1009002-90 = "O-Oh, s-sorry! I got carried away and started rambling..."
1009002-91 = "Huh? What do you mean it was nice to see this side of me? Ugh... It's so embarrassing..."
1009002-92 = "That said... Which one do you prefer, Sensei? Theme parks or festivals?!"
1009002-93 = "[s] \"I'd say I want to enjoy both equally...\""
1009002-94 = "What? You \"want to enjoy\"? Not \"enjoy\"? What does that mean?"
1009002-95 = "Wait... Do your responsibilities at Schale make it hard for you to go to theme parks or festivals?"
1009002-96 = "I-I'm sorry, Sensei. I shouldn't have said anything..."
1009002-97 = "[s] \"It's fine. It's fine.\""
1009002-98 = "Hm... If finding time for festivals is difficult due to your work, then..."
1009002-102 = "!!"
1009002-103 = "[ns] \"Did you say something, Umika?\""
1009002-104 = "Nope, nothing! It's just that..."
1009002-105 = "Heeheehee. I just had a great idea on how to solve my little...problem."
1009002-106 = "Hm? What's the problem? That's a secret! I'll tell you when it's done."
1009002-107 = "Anyway, since you're finally here, Sensei, let me show you around a bit more!"
1009002-108 = "Don't worry! As you can see, I'm going to become...Hyakkiyako's ultimate festival master!"
1009002-112 = "My ultimate festival master gave me a thorough tour of the festival grounds."

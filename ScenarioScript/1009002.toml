[translation]
1009002-1 = "#title;축제란 멋지죠. 정말, 정말, 정말로요!"
1009002-2 = "#wait;2800"
1009002-3 = "#na;우미카;아, 선생님!"
1009002-4 = "#st;[0,0];instant;1;"
1009002-5 = "#clearST"
1009002-6 = "#wait;2800"
1009002-7 = "3;우미카;03;에헤헤. 축제에 오신 걸 환영해요!\n#3;a\n#3;greeting\n#3;em;[반짝]"
1009002-8 = "3;우미카;00;조금 정신없죠? 금방 안내해 드릴게요."
1009002-9 = "[ns] \"역시 백귀야행의 축제라는 느낌이네…….\""
1009002-10 = "3;우미카;03;에이. 이 정도는 그렇게 대단한 것도 아닌데요!\n#3;em;[재잘]"
1009002-11 = "3;우미카;99;<백야앵제>라던가 <소용돌이 영화촌의 어트랙션 축제>, <백귀야행 등불 축제> 같은 본격적인 축제들에 비하면……."
1009002-12 = "#st;[0,0];instant;1;"
1009002-13 = "#clearST"
1009002-14 = "#wait;2500"
1009002-15 = "3;우미카;02\n#3;em;[?]\n#wait;1000"
1009002-16 = "3;우미카;07;거기에 비교하면 뭐든 대단치 않은 것이 되어 버릴 것 같다고요? 드, 듣고 보니 그것도 그렇네요?\n#3;stiff"
1009002-17 = "3;우미카;16;아앗! 거기에 축제에 우열을 가리려고 하다니, 애초부터 제 자세가 글러 먹었어요!\n#3;hophop"
1009002-18 = "3;우미카;05;모든 축제에는 나름의 가치가 있고, 그 축제를 즐기러 온 사람들의 열정이 담기게 마련인데!"
1009002-19 = "#st;[0,0];instant;1;"
1009002-20 = "#clearST"
1009002-21 = "3;우미카;05\n#3;greeting\n#3;d\n#wait;1000"
1009002-22 = "3;우미카;10;역시 선생님이세요! 제가 무언가 실수하려고 하면 따끔하게 다잡아 주시는군요!\n#3;a\n#3;em;[반짝]\n#3;closeup"
1009002-23 = "#st;[0,0];instant;1;"
1009002-24 = "#clearST"
1009002-25 = "[ns] \"아니, 나 아무것도 안 했는데?!\""
1009002-26 = "3;우미카;03\n#3;a\n#wait;1000"
1009002-27 = "3;우미카;03;자, 자! 어서 오세요! 우선 이 축제는요! 보시다시피 여러 가지 모양의 인형을 담은 가마를 모시는 축제인데요!\n#3;m4\n#3;em;[재잘]"
1009002-28 = "3;우미카;00;예전에는 주로 공주님 모양의 인형을 많이 만들었다고 하지만……."
1009002-29 = "3;우미카;03;이제는 모양에 구애받지 않고, 최대한 다양하고 화려한 인형을, 가능한 한 많이 가마에 싣고, 거리 여기저기를 돌아다니는 축제가 되었어요!\n#3;hophop"
1009002-30 = "#st;[0,0];instant;1;"
1009002-31 = "#clearST"
1009002-32 = "3;우미카;03\n#3;em;[...]\n#wait;2500"
1009002-33 = "3;우미카;15;……그 덕분일까요……. 그 인형을 만들고 모양을 결정하는 일에, 상인회라든가 주최 측에 대한 로비라든가.\n#3;m3"
1009002-34 = "3;우미카;11;가마 제작에 들어가는 재료의 수급 및 조달에 관한 계약이라든가 이런저런 복잡한 문제까지 동시에 생겨나기도 했지만요…….\n#3;em;[한숨]"
1009002-35 = "[s] \"……들어도 괜찮은지 의문이 드는 뒷사정이네…….\""
1009002-36 = "3;우미카;01;아, 아무튼간에요! 그럼에도 변하지 않는 원칙이 하나 있는데요! 가마 한가운데에는 예전처럼 커다란 공주님 모양의 등불을 만들어 세운다는 거예요!\n#3;hophop\n#3;em;[!]"
1009002-37 = "#st;[0,0];instant;1;"
1009002-38 = "#clearST"
1009002-39 = "#all;hide"
1009002-40 = "4;우미카;03;그리고 이쪽으로 와 보시면! 이 축제를 기념하는 의미에서, 연꽃 모양으로 설탕을 굳힌 사과 사탕과, 딸기와 체리로 만든 분홍색 시럽을 뿌린 빙수를 보실 수 있죠!\n#4;closeup\n#4;a"
1009002-41 = "#st;[0,0];instant;1;"
1009002-42 = "#clearST"
1009002-43 = "#all;hide"
1009002-44 = "2;우미카;10;보세요! 가마 뒤에서 공연이 시작되었어요! 음악에 맞춰 춤을 추면서 가마를 따라 행진을 계속하는 거죠!\n#2;hophop\n#2;a"
1009002-45 = "#st;[0,0];instant;1;"
1009002-46 = "#clearST"
1009002-47 = "#all;hide"
1009002-48 = "3;우미카;10;입장권 가지고 계시나요? 잘됐네요! 그 입장권에 포함된 쿠폰으로 네 종류까지 무엇이든 교환하실 수 있거든요! 가면이라든가 부채라든가, 먹을 것도 좋고요!\n#3;closeup\n#3;em;[반짝]\n#3;a"
1009002-49 = "#st;[0,0];instant;1;"
1009002-50 = "#clearST"
1009002-51 = "#all;hide"
1009002-52 = "#wait;2800"
1009002-53 = "#wait;1000"
1009002-54 = "#wait;1500"
1009002-55 = "#wait;1000"
1009002-56 = "#wait;2500"
1009002-57 = "#wait;1000"
1009002-58 = "#wait;1000"
1009002-59 = "#wait;1000"
1009002-60 = "#wait;1000"
1009002-61 = "#all;hide"
1009002-62 = "3;우미카;15;후아……. 가마를 한참이나 따라다녔더니 역시 지치네요…….\n#3;em;[땀]\n#3;a"
1009002-63 = "[s] \"새삼 느끼는 거지만, 우미카는 축제를 정말 좋아하는구나.\""
1009002-64 = "3;우미카;02;저…… 말씀이신가요?\n#3;em;[?]"
1009002-65 = "3;우미카;03;에헤헤…… 선생님께 직접 그런 말을 들으니, 뭔가 조금 부끄럽네요……."
1009002-66 = "#st;[0,0];instant;1;"
1009002-67 = "#clearST"
1009002-68 = "3;우미카;99;……."
1009002-69 = "3;우미카;01;네. 저는 축제가 좋아요.\n#3;greeting\n#3;em;[반짝]"
1009002-70 = "3;우미카;00;축제는…… 모두를 위한 것이잖아요?"
1009002-71 = "3;우미카;99;잠시 일상을 잊고, 생활에서 벗어나 꿈의 세상에 방문하는 것……."
1009002-72 = "3;우미카;10;제가 하는 일이, 바로 그 꿈의 세상을 준비하고 만드는 것이라고 생각하면, 언제나 기대돼서 참을 수가 없어지는 거 있죠!\n#3;em;[반짝]"
1009002-73 = "3;우미카;07;네? 듣다 보니 테마파크와 비슷한 부분도 조금 있는 것 같다고요?\n#3;stiff"
1009002-74 = "3;우미카;09;무, 물론 그렇게 보일 수 있는 부분도 분명히 있지만!\n#3;hophop"
1009002-75 = "3;우미카;16;그……. 축제는, 보다 살아 있어요!\n#3;em;[!]"
1009002-76 = "[s] \"살아 있다……?\""
1009002-77 = "3;우미카;16;어어, 그러니까…….\n#3;stiff"
1009002-78 = "#st;[0,0];instant;1;"
1009002-79 = "#clearST"
1009002-80 = "3;우미카;09\n#3;em;[...]\n#wait;2500"
1009002-81 = "3;우미카;02\n#3;em;[!]\n#3;jump\n#wait;1000"
1009002-82 = "3;우미카;01;보세요! 어떤 축제도, 똑같은 축제는 없잖아요?"
1009002-83 = "3;우미카;00;이번 인형 가마 축제만 해도, 작년에 가마에 탔던 인형과 올해에 가마에 탄 인형은 다른 인형이겠죠!\n#3;hophop"
1009002-84 = "3;우미카;15;그도 그럴 게, 상인회에서 작년에 출품되었던 인형은 올해 출품하지 못하게 하니까요…….\n#3;stiff\n#fontsize;50"
1009002-85 = "3;우미카;00;그리고 축제를 준비할 때도요! 이건…… 저만 그런 것인지도 모르겠지만, 저는 늘 새로운 마음으로 다음번 축제를 준비하고 기대하거든요!\n#3;jump"
1009002-86 = "3;우미카;10;그러니까 분명, 사람들에게 꿈의 세상을 보여준다는 점에서는 공통점이 있겠지만, 축제와 테마파크 사이에는–\n#3;a\n#3;closeup\n#3;hophop"
1009002-87 = "[s1] \"진정해, 진정해. 우미카.\"\n[s2] \"우미카의 열정은 잘 알았으니까.\""
1009002-88 = "#wait;100"
1009002-89 = "#wait;100"
1009002-90 = "3;우미카;09;아……! 죄, 죄송해요. 저 혼자서 갑자기 흥분해서 마구 떠들어 버렸네요…….\n#3;a"
1009002-91 = "3;우미카;16;네? 그런 모습도 신선해서 좋았다고요? 우우우…… 뭔가, 부끄럽네요…….\n#3;stiff\n#3;em;[///]"
1009002-92 = "3;우미카;03;그렇다면요! 선생님께서는 테마파크 파이신가요, 축제 파이신가요?!\n#3;closeup\n#3;hophop"
1009002-93 = "[s] \"양쪽 다 즐기고 싶은 파, 라고 해야겠네…….\""
1009002-94 = "3;우미카;17;네? 즐기는, 이 아니라 즐기고 싶은, 이요? 그건 또 어떤 의미이신지……?\n#3;em;[?]"
1009002-95 = "3;우미카;07;아……. 샬레의 일 때문에 좀처럼 테마파크에도, 축제에도 일정을 맞춰 즐기기가 힘드시다고요……?"
1009002-96 = "3;우미카;04;죄, 죄송해요. 선생님. 제가 괜한 걸 여쭤본 것 같네요…….\n#3;stiff"
1009002-97 = "[s] \"괜찮아. 괜찮아.\""
1009002-98 = "3;우미카;11;으음……. 일 때문에 축제 일정을 맞추기 힘드시다면, 그렇다면……."
1009002-99 = "#st;[0,0];instant;1;"
1009002-100 = "#clearST"
1009002-101 = "3;우미카;11\n#3;em;[...]\n#wait;2500"
1009002-102 = "3;우미카;02;!!\n#3;em;[!]"
1009002-103 = "[ns] \"갑자기 무슨 일이신가요, 우미카 양.\""
1009002-104 = "3;우미카;01;아뇨, 아니에요! 다만……."
1009002-105 = "3;우미카;03;에헤헤. 조금, 좋은 생각 같은 게 떠올랐다고나 할까요?\n#3;em;[반짝]\n#3;greeting"
1009002-106 = "3;우미카;07;네? 그 생각이 뭐냐고요? 그건…… 비밀이에요! 지금은요."
1009002-107 = "3;우미카;01;그보다, 선생님! 모처럼 이렇게 축제 현장에 계시게 되었으니까, 제가 조금 더 여기저기 안내해 드릴게요!"
1009002-108 = "3;우미카;03;걱정 마세요! 이래 봬도 백귀야행 최고의 축제 전문가…… 를 지망하고 있는 몸이니까요!\n#3;hophop"
1009002-109 = "#all;hide"
1009002-110 = "#st;[0,0];instant;1;"
1009002-111 = "#clearST"
1009002-112 = "#na;(그렇게 우미카와 함께 축제 현장 이곳저곳을 충분히 돌아다녔다…….)"

[translation]
1009002-1 = "慶典很精彩。真的，真的，真的！"
1009002-3 = "啊，老師！"
1009002-7 = "耶嘿嘿。歡迎來到慶典！"
1009002-8 = "讓人有點暈頭轉向對吧？#n我馬上幫你導覽。"
1009002-9 = "[ns]「不愧是百鬼夜行的慶典呢……」"
1009002-10 = "不，這種程度還不算特別厲害哦！"
1009002-11 = "和「百夜之春櫻花祭」、「漩渦電影村的娛樂慶典」、#n「百鬼夜行燈籠祭」這類的正式慶典相比……"
1009002-16 = "拿來跟那些比較的話，其他慶典都會變得不起眼？#n這，這麼一說好像是耶？"
1009002-17 = "啊！我怎麼能拿慶典來比較呢，這種行為打從一開始就是不好的！"
1009002-18 = "每個慶典都有它獨特的價值，承載著享受慶典的人們的熱情！"
1009002-22 = "真不愧是老師！#n只要我一犯錯就會嚴厲地指正我！"
1009002-25 = "[ns]「不是，我什麼都沒說吧！？」"
1009002-27 = "好的好的！快跟我來吧！首先這場慶典呢！#n就像老師看到的一樣，是供奉裝有各式玩偶轎子的慶典！"
1009002-28 = "雖然以前以製作公主模樣的玩偶為主……"
1009002-29 = "但現在已經不再拘泥於模樣，#n而是盡可能把各式華麗的玩偶裝進轎子裡，走遍大街小巷的慶典！"
1009002-33 = "可能是因為這個原因……#n在決定玩偶模樣的過程中，商會與主辦方周圍似乎也會發生遊說或賄賂之類的事情。"
1009002-34 = "同時還會出現製作轎子的材料供給，以及配送契約等等複雜的問題……"
1009002-35 = "[s]「怎麼好像聽見了某些不該聽見的內幕……」"
1009002-36 = "總，總之！不管怎麼樣，有一個原則是不會改變的！#n那就是會在轎子的正中央，建造一個和以前一樣的大公主模樣的燈籠！"
1009002-40 = "接著來到這裡之後！就可以看到為了紀念這場慶典特別製作的甜點哦！#n有蓮花造型的蘋果糖，還有撒上用草莓和櫻桃製成的粉色糖漿的刨冰！"
1009002-44 = "請看！轎子後方開始表演了！#n他們會隨著音樂起舞，跟著轎子一起前進！"
1009002-48 = "老師有入場券嗎？太好了！入場券裡包含的優惠券可以兌換四種東西哦！#n像是面具、扇子之類的，或者吃的東西也不錯！"
1009002-62 = "呼啊……追著轎子跑果然很累呢……"
1009002-63 = "[s]「我再次感受到了，海花真的很喜歡慶典呢。」"
1009002-64 = "我……嗎？"
1009002-65 = "耶嘿嘿……親耳聽到老師這麼說，還真是不好意思……"
1009002-68 = "……"
1009002-69 = "是的，我很喜歡慶典。"
1009002-70 = "慶典……是為了大家舉辦的對吧？"
1009002-71 = "暫時忘記日常生活，跳脫生活的框架，前往夢想的世界……"
1009002-72 = "一想到我的工作就是準備和創造那個夢想世界，總是會興奮得心癢難耐！"
1009002-73 = "嗯？聽起來好像跟主題樂園的概念有點類似？"
1009002-74 = "當，當然某些部分看起來確實有點像沒錯！"
1009002-75 = "不過……慶典會更加生動！"
1009002-76 = "[s]「生動……？」"
1009002-77 = "那個，也就是說……"
1009002-82 = "請看！不管是哪種慶典，都沒有完全一樣的對吧？"
1009002-83 = "就拿這次玩偶轎子慶典來說，#n去年在轎子裡的玩偶，跟今年在轎子裡的玩偶就是不同的！"
1009002-84 = "雖然那也是因為商會去年出品的玩偶，今年沒辦法出品……"
1009002-85 = "還有準備慶典的時候也是！雖然……不知道是不是只有我會這樣，#n但我總是會以不同的心情，來準備和期待下一次的慶典！"
1009002-86 = "所以，雖然讓人們看見夢想世界這點有些類似，但慶典和主題樂園之間──"
1009002-87 = "[s1]「你先冷靜，海花。」\n[s2]「我已經很清楚海花的熱情了。」"
1009002-90 = "啊……！對，對不起。#n我一個人突然興奮地說個不停……"
1009002-91 = "咦？我的那種樣子很新鮮很棒？#n嗚嗚……那個，總覺得有點害羞……"
1009002-92 = "既然如此！老師你是主題樂園派還是慶典派呢！？"
1009002-93 = "[s]「我應該算是兩邊都想享受的那一派……」"
1009002-94 = "咦？不是「享受」而是「想享受」嗎？#n為什麼這麼說呢……？"
1009002-95 = "啊……因為夏萊工作的關係，不管是主題樂園還是慶典都很難好好享受……？"
1009002-96 = "對，對不起，老師。#n我好像問了不該問的問題……"
1009002-97 = "[s]「沒關係沒關係。」"
1009002-98 = "唔……如果因為工作而難以安排慶典行程的話，那麼……"
1009002-102 = "！！"
1009002-103 = "[ns]「怎麼了嗎，海花同學。」"
1009002-104 = "不，沒什麼！只是……"
1009002-105 = "呵呵呵。應該說想到了一個好主意吧？"
1009002-106 = "想知道是什麼主意？#n那個……現在還是祕密！"
1009002-107 = "話說回來，老師！難得老師能來到慶典現場，我再多帶你繞繞吧！"
1009002-108 = "別擔心！再怎麼說我也是百鬼夜行最棒的慶典專家……朝這個目標努力的人呀！"
1009002-112 = "（就這樣和海花一起走遍慶典現場的每個地方……）"

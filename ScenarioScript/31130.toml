[translation]
31130-1 = "第13話;補課部的模擬測驗"
31130-3 = "早安！"
31130-4 = "早安，梓醬。一早就很有精神呢♡"
31130-5 = "嗯，因為是一天的開始。"
31130-6 = "大家快點起來刷牙、淋浴、更衣，開始新的一天吧。"
31130-7 = "啊嗚嗚……梓醬……10分鐘……再10分鐘……"
31130-8 = "嗯嗯……已經早上了……？"
31130-9 = "日步美、小春，快起來。不能再賴床了。"
31130-10 = "啊嗚……可是……"
31130-15 = "唔……我已經醒了……"
31130-16 = "哎呀，日步美醬昨晚似乎很晚才睡呢……看來似乎還需要一些時間。"
31130-17 = "……我知道了。日步美畢竟是補課部的部長，心理壓力想必也不小。#n就再讓他休息一下吧。"
31130-18 = "……嗯？這裡是哪……我怎麼會……"
31130-19 = "太好了，看來你已經醒了。#n小春早上的準備就由我負責吧。"
31130-20 = "嗯……？咦……？"
31130-21 = "跟我來吧，淋浴室在這裡。"
31130-22 = "咦，為什麼……？"
31130-27 = "哎呀哎呀……要兩個人相親相愛地一起洗澡嗎？"
31130-28 = "嗚哇啊啊！？為，為什麼！？等等，不要脫──！？"
31130-29 = "好，好冰……！？啊，啊啊！？洗髮精弄到眼睛了……！"
31130-30 = "唔呵呵♡感情真好呢。"
31130-32 = "合宿處．教室"
31130-33 = "大家都到齊了嗎？"
31130-34 = "是～♡"
31130-35 = "嗯。"
31130-36 = "嗚嗚……全都被看光了……好羞恥……"
31130-37 = "小春也看見了我的裸體，有什麼問題嗎？"
31130-38 = "不是那個問題！竟然那麼強硬地把我脫光……！"
31130-39 = "那下次換我幫小春醬洗身體吧？"
31130-40 = "在，在胡說什麼！你絕對不准！"
31130-45 = "那個，大家……"
31130-46 = "[s]「日步美，你這邊的頭髮有點翹起來囉。」"
31130-47 = "啊，啊哈哈……因為有點睡過頭……"
31130-48 = "啊，不對……現在該說的不是這個！"
31130-49 = "各位！請注意這邊！"
31130-51 = "……"
31130-53 = "……今天是補課部合宿正式的第一天！"
31130-54 = "雖然我們必須解決的問題又多又困難……"
31130-55 = "不過仔細想想其實很單純！"
31130-56 = "只要所有人都在一週後的第2次特別學力測驗合格就行了！"
31130-57 = "嗯。"
31130-58 = "確實是呢。"
31130-59 = "嗯，嗯……"
31130-61 = "……"
31130-66 = "那麼接下來將進行模擬測驗！"
31130-67 = "……模擬測驗？"
31130-68 = "哦……？"
31130-69 = "這，這麼突然！？要測驗！？為什麼！？"
31130-70 = "為了設定接下來必須達成的目標和步調……"
31130-71 = "首先我們必須準確地了解自己現在的能力！"
31130-72 = "所以我準備了這些！"
31130-76 = "這是去年三一的測驗題目和模範解答！"
31130-77 = "老師昨天也幫忙到很晚……不過這樣應該就能以類似的標準進行模擬測驗了！"
31130-78 = "測驗時間是60分鐘，滿分100分中獲得60分以上為合格。標準和正式考試相同！"
31130-79 = "我也會一起參加，那麼我們開始吧！"
31130-81 = "第一次補課部模擬測驗"
31130-82 = "[s]「都準備好了嗎？」"
31130-85 = "[ns]「那麼……測驗開始！」"
31130-89 = "……"
31130-92 = "哎呀，這些題目真讓人懷念呢♡"
31130-95 = "唔嗯……好像在哪裡看過……"
31130-99 = "（各位加油……！）"
31130-105 = "（模擬測驗結束後，評分結果出來了）"
31130-106 = "那麼老師，請發表結果吧！"
31130-108 = "第1次補課部模擬測驗，結果──"
31130-110 = "花子―4分[FF6666]（不合格）[-]"
31130-112 = "梓―33分[FF6666]（不合格）[-]"
31130-114 = "小春―15分[FF6666]（不合格）[-]"
31130-116 = "日步美―68分[007eff]（合格）[-]"
31130-118 = "唔……"
31130-119 = "……"
31130-120 = "哎呀……"
31130-121 = "……"
31130-125 = "沒錯，這就是我們面臨的現實。#n這樣下去的話，在我們前方等待的只有毀滅而已……"
31130-130 = "為了讓大家都能在第2次測驗拿到超過60分，我們必須徹底運用剩下的時間才行！"
31130-131 = "小春醬和梓醬都是考1年級的題目，所以你們兩位一組……"
31130-136 = "我和花子醬會協助你們！#n花子醬1年級時的成績很優秀對吧？"
31130-137 = "哎呀……？是，是這樣沒錯……"
31130-138 = "而花子醬的部分在找出確切問題之後，會由我跟老師一起想出解決辦法！"
31130-142 = "我打算在未來幾天定期進行模擬測驗，從而持續掌握大家的狀況。"
31130-143 = "……"
31130-144 = "避免不及格，順利通過考試──"
31130-145 = "這就是我們的目標！現在就全心全力專注在考試上吧！"
31130-146 = "[s] （日步美……！！）"
31130-149 = "（只是一味擔心也無法改變什麼。我必須做我能做的事……！）"
31130-151 = "……明白了。我會遵從指示。"
31130-152 = "嗯，嗯……"
31130-153 = "哎呀……日步美醬……居然在這麼短的時間內準備得這麼充分……"
31130-154 = "咦？啊，那個，因為老師也有幫忙……啊嗚……"
31130-155 = "是老師……"
31130-156 = "[s]「這不算什麼。」"
31130-157 = "等待著大家的也不只有冷酷的現實。#n只要在模擬測驗中考出好成績，就能獲得我準備的獎勵哦！"
31130-158 = "請看……"
31130-160 = "（啪沙沙）"
31130-164 = "鏘～！獲得好成績的人就能拿到「Momo好友」的周邊當禮物！"
31130-165 = "Momo好友……？"
31130-166 = "……那是什麼？"
31130-167 = "……！！"
31130-168 = "……咦？這是最近流行的「Momo好友」……#n難，難道大家都沒聽過嗎……？"
31130-169 = "唔嗯……我還是第一次看見呢……"
31130-170 = "咦咦！？"
31130-171 = "呃，嗯？這個看起來怪噁心的是……豬嗎？還是河馬……？"
31130-172 = "不，不是啦！佩洛洛大人是鳥！#n請仔細看，這裡不是長著翅膀跟鳥喙嗎！"
31130-173 = "眼神好噁……名字也很奇怪……"
31130-174 = "咦咦！？雖，雖然確實有些人這麼認為……#n不過只要仔細看，還是能發現可愛的地方……"
31130-175 = "啊啊，這麼說來日步美醬的背包和手機殼就是那個角色呢。我想起來了。"
31130-176 = "想必是個會伸出舌頭流著口水，哭喊著拜託饒了我……的角色對吧？"
31130-177 = "咦！？沒有那種角色設定吧！？"
31130-178 = "我不需要那種東西，不給我也沒關係。"
31130-179 = "啊，啊嗚……"
31130-180 = "……（緊盯）"
31130-181 = "梓，梓醬……？"
31130-182 = "好……"
31130-183 = "……好？"
31130-185 = "好可愛！！！"
31130-186 = "！？"
31130-187 = "！？"
31130-188 = "哎呀……？"
31130-190 = "實在太可愛了！這個圓滾滾軟綿綿的生物是什麼？鳥？是鳥嗎？"
31130-191 = "無法解讀它的表情……那雙眼睛……！完全看不出在想什麼……！"
31130-192 = "梓，梓醬……你手指的動作好像有點……？"
31130-193 = "啊……對！不愧是梓醬，注意到佩洛洛大人的可愛之處了呢！#n沒錯！就是那種地方可愛！"
31130-194 = "騙人……！？"
31130-195 = "那這個呢？這個身體長長的是……蠑螈？還是長頸鹿？#n總之圍在脖子上感覺會很溫暖……！"
31130-196 = "那個是波浪貓！是隻總是以波浪形狀跳舞的貓，最近確實出了頸枕的周邊……"
31130-197 = "這個呢？這個小隻的是……？"
31130-198 = "那是Mr.尼科萊！#n它總是說著一些哲學的話，所以經常被人欺負！"
31130-199 = "這次的獎勵之一就有尼科萊寫的《善惡的彼岸》唷，而且還是初版！#n之後有人想看的話可以再跟我說！"
31130-200 = "好棒……！！太棒了！！能拿到這個嗎？可以自己選嗎？"
31130-201 = "啊……沒錯！梓醬可以選自己想要的哦！"
31130-206 = "……"
31130-207 = "……"
31130-209 = "……既然獎勵如此豐厚，我也只能拿出全力了。"
31130-213 = "我現在充滿鬥志，日步美。#n我答應你，一定會達成任務，拿到那個不可思議又軟綿綿的動物！"
31130-218 = "……嘿嘿嘿！Fighting！"
31130-222 = "……耶嘿嘿嘿嘿。"
31130-226 = "哎呀……日步美醬看起來真開心呢♡"
31130-227 = "[s]「這就是遇見同道中人的感覺嗎……」"
31130-228 = "好不舒服……"
31130-230 = "下一話;實現正義部的副部長（１）"

[translation]
31130-1 = "Episode 13;The First Mock Exam"
31130-3 = "Good morning!"
31130-4 = "Good morning, Azusa! You look chipper today. ♥"
31130-5 = "Of course. It's important to start the day off well."
31130-6 = "Let's not waste time. We have to brush our teeth, shower, and get changed into fresh uniforms. "
31130-7 = "Ugh, Azusa... Just ten more minutes."
31130-8 = "Hnnngh... Morning already?"
31130-9 = "Come on, Hifumi. Koharu. It's time to wake up."
31130-10 = "Ugh... Fine."
31130-15 = "I'm up already..."
31130-16 = "I think our little Hifumi had a long night last night. It might take her a while to get out of bed."
31130-17 = "It could be mental fatigue related to her responsibilities as our club president. Should we allow her to rest for longer than usual?"
31130-18 = "W-Wait. Where am I? How did I get here?"
31130-19 = "Good morning, Koharu. We're on breakfast duty today, so we need to hurry."
31130-20 = "Wait, what? "
31130-21 = "The showers are this way. I'll help you wash, so follow me."
31130-22 = "H-Hold on a second. Why...?"
31130-27 = "Aw. It looks like they're going to be bath time buddies after all. "
31130-28 = "Wh-Whaaat?! W-Wait. I can do that myself! You don't have to undress me!"
31130-29 = "Th-That's cold! Aaah! You're getting shampoo in my eyes!"
31130-30 = "Ah, sweet skinship. ♥"
31130-32 = "Annex Classroom"
31130-33 = "Sorry for the wait. Is everyone ready to get started?"
31130-34 = "I am! ♥"
31130-35 = "Hmm. "
31130-36 = "*sniffle* She saw everything... I've been exposed..."
31130-37 = "I was also without clothes. It's standard procedure. What's the problem?"
31130-38 = "Th-That's not the point! You're incorrigible! Don't you understand how to be gentle with someone...?"
31130-39 = "Would you like me to wash you next time, Koharu?"
31130-40 = "That's even worse! Anyone but you! "
31130-45 = "Guys, settle down... "
31130-46 = "[s] \"You still have a little bed head, Hifumi.\""
31130-47 = "P-Please don't remind me of how badly I overslept. "
31130-48 = "Never mind that! That's not what's important! "
31130-49 = "I need your attention! "
31130-51 = "..."
31130-53 = "Make-Up Work Club boot camp officially begins today."
31130-54 = "We have a very long road ahead of us, and it will be easy to get discouraged..."
31130-55 = "...but think about it! We know what we must do!"
31130-56 = "The only solution is for each of us to pass next week's exam."
31130-57 = "Hmm."
31130-58 = "Right."
31130-59 = "O-Okay."
31130-61 = "..."
31130-66 = "That's why we're going to take a mock exam starting right now!"
31130-67 = "Mock exam?"
31130-68 = "Well, this is sudden."
31130-69 = "I'll say! Why should we have to do that?!"
31130-70 = "Because our futures are on the line."
31130-71 = "We need to know where we all stand before we begin studying for the second exam!"
31130-72 = "So to that end, I spent last night preparing this."
31130-76 = "I made my own exam based on the questions and answer keys from last year's exams!"
31130-77 = "Sensei was able to get these for us and helped me last night. It should give each of us an idea how we'd score on the real exam if we were to take it right now. "
31130-78 = "We'll each have one hour. Max score is 100 points with the minimum passing grade being a 60. It's the same as a real exam."
31130-79 = "And I'm going to take it with all of you, of course."
31130-81 = "First Make-Up Work Club Mock Exam"
31130-82 = "[s] \"Everyone ready? You can leave the room once you're done.\""
31130-85 = "[ns] \"Begin!\""
31130-89 = "..."
31130-92 = "Oh, this one takes me back. ♥"
31130-95 = "Gah... I know I've seen this before."
31130-99 = "(That's it, everyone! You can do this!)"
31130-105 = "I graded everyone's tests once the exam was over."
31130-106 = "All right, Sensei, we're ready. Let us know our scores."
31130-108 = "First Make-Up Work Club Mock Exam Results"
31130-110 = "Hanako: 4 Points [FF6666](Fail)[-]"
31130-112 = "Azusa: 33 Points [FF6666](Fail)[-]"
31130-114 = "Koharu: 15 Points [FF6666](Fail)[-]"
31130-116 = "Hifumi: 68 Points [007eff](Pass)[-]"
31130-118 = "Hmm. "
31130-119 = "..."
31130-120 = "Well, then."
31130-121 = "..."
31130-125 = "I was afraid of this. It's not looking good if we don't turn things around. "
31130-130 = "We're going to have to study nonstop if we have any hope of us each scoring 60 points next week!"
31130-131 = "Koharu and Azusa have to take the first-year exam, so I'm pairing the two of you together."
31130-136 = "It will be up to me and Hanako to assist you. Didn't you have high grades your first year, Hanako?"
31130-137 = "Well, I did, but..."
31130-138 = "Don't worry. Sensei and I will track your scores and figure out why you've been struggling. We can do this together!"
31130-142 = "I want us to take mock exams like this from time to time moving forward. "
31130-143 = "..."
31130-144 = "I'm not going to allow us to fail. We're going to pass."
31130-145 = "We have our goal, so let's keep working hard to achieve it!"
31130-146 = "[s] \"(Way to go, Hifumi!)\""
31130-149 = "(There's no time to sit around feeling sorry for myself. I have to do this! This is how I can help!)"
31130-151 = "Very well. I'll follow your lead."
31130-152 = "I-If I have to."
31130-153 = "I'm amazed at how you prepared this for us in so little time."
31130-154 = "Thanks, but I couldn't have done it without Sensei."
31130-155 = "Ah, I should have known this was your touch."
31130-156 = "[s] \"I didn't do that much.\""
31130-157 = "Oh, and it's not like I only prepared hard work for all of us. I also have prizes ready to award good grades on pop quizzes."
31130-158 = "Let's see here... "
31130-160 = "*rustle* *rustle*"
31130-164 = "Ta-da! Whoever gets the highest score will be awarded with some Momo Friends merch!"
31130-165 = "Momo...Friends?"
31130-166 = "Plushies?"
31130-167 = "...!"
31130-168 = "Y-Yeah, they're really popular lately. Surely you all have seen them."
31130-169 = "Nope. I think it's my first time."
31130-170 = "What?!"
31130-171 = "What is this one supposed to be? A pig? A hippo?"
31130-172 = "N-No! Peroro is a bird! Look, here are his wings! And his beak!"
31130-173 = "His eyes are annoying-looking. His name is weird too."
31130-174 = "What?! I mean, sure, not everyone has to like Peroro, but look at all of his cute qualities..."
31130-175 = "Oh, now I remember. You have this Peroro on your bag and phone case, don't you?"
31130-176 = "It's the one that has its tongue hanging out, drooling like it's begging for something, right?"
31130-177 = "What?! Peroro has never done anything like that!"
31130-178 = "All the more reason to be prohibited."
31130-179 = "Come on. Don't be like that..."
31130-180 = "(Stay calm...)"
31130-181 = "Azusa?"
31130-182 = "Cu..."
31130-183 = "\"Cu\"?"
31130-185 = "So cute!"
31130-186 = "...?!"
31130-187 = "...?!"
31130-188 = "Well, then!"
31130-190 = "I've never seen anything so cute! What is this round and fluffy-looking creature? A bird, you said?"
31130-191 = "His eyes... I can't read his expression at all! I can't tell what he's thinking, if anything!"
31130-192 = "Azusa...? You're starting to scare me."
31130-193 = "There's nothing to be afraid of! She understands Peroro's cuteness! That's something worth celebrating!"
31130-194 = "What?! "
31130-195 = "And what is this long one called? Is it a salamander...? No, a giraffe perhaps. It looks like I could wear it as a scarf!"
31130-196 = "That's Wavecat. He's always doing a wave dance. And he did happen to get a neck pillow version recently..."
31130-197 = "And this? This tiny one? "
31130-198 = "That's Mr. Nicolai! He always gets bullied for saying philosophical things!"
31130-199 = "I also have a copy of Nicolai's Beyond Good & Evil, the first edition! Let me know if you'd like to read it later."
31130-200 = "That sounds amazing! And you're giving these away? Can I pick?"
31130-201 = "Uh...yeah! You'll be able to pick whichever one you want!"
31130-206 = "..."
31130-207 = "..."
31130-209 = "*sigh* You leave me with no choice. With incentives like these, my only option is to score high marks."
31130-213 = "Congratulations, Hifumi. You've successfully motivated your soldier. I'll complete this mission at any cost, and those strange fluffy-looking things will be turned over to my custody."
31130-218 = "I'll be rooting for you. Good luck! "
31130-222 = "Heehee."
31130-226 = "I can't tell who's having more fun right now: Azusa or Hifumi. ♥"
31130-227 = "[s] \"Hifumi looks like she made a new best friend. It's sweet.\""
31130-228 = "It's creepy..."
31130-230 = "Next Episode;Justice Task Force Vice President Part 1"

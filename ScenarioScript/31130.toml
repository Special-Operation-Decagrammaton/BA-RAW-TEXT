[translation]
31130-1 = "第13話;補習授業部の模擬試験"
31130-3 = "おはよう！"
31130-4 = "おはようございます、アズサちゃん。朝から元気ですね♡"
31130-5 = "うん、一日の始まりだから。"
31130-6 = "さあ、早く起きて歯磨き、シャワー、それから着替え。順番に遂行していこう。"
31130-7 = "あうぅ……アズサちゃん……10分……あと10分だけ……。"
31130-8 = "んん……もう朝……？"
31130-9 = "ヒフミ、コハル、起きて。そろそろ起きないとダメだ。"
31130-10 = "んんぅ……。"
31130-15 = "ん……起きてるってばぁ……。"
31130-16 = "ヒフミちゃんの方はもう少し時間がかかりそうですね。昨日はどうやら、遅くまで起きていたみたいですし……。"
31130-17 = "……補習授業部の部長だから、心理的なプレッシャーもあるのかもしれない。もう少しだけ休ませておこう。"
31130-18 = "ん……あれ、ここ……私、どうして……。"
31130-19 = "おはよう、コハル。朝の支度を始めよう。"
31130-20 = "……？ん、え……？"
31130-21 = "シャワールームはこっち、来て。"
31130-22 = "……え、なに、なんで……？"
31130-27 = "あらあら、ふたりで仲良く洗いっこですか？"
31130-28 = "うわぁぁっ！？なっ、なんで！？ちょっ、脱がさないでっ！？ひゃっ、うえぇっ！？"
31130-29 = "冷たっ……！？あっ、もうっ、ちょっと……！んっ、シャンプーが目に……！！"
31130-30 = "良いですねー、裸の付き合い♡"
31130-32 = "合宿所・教室"
31130-33 = "お待たせしました、ではそろそろ始めましょうか？"
31130-34 = "は～い♡"
31130-35 = "うん。"
31130-36 = "うぅ……全部見られた……もうダメ……。"
31130-37 = "コハルも私の裸を見たんだから、何も問題は無いはず。"
31130-38 = "そういう問題じゃない！あんな強引に脱がすなんて！無理やりとかそういうのはダメなの！"
31130-39 = "では次は、私がコハルちゃんの身体を洗ってあげましょうか？"
31130-40 = "はぁっ！？だっ、ダメ！あんただけは絶対に嫌っ！"
31130-45 = "え、えっと……。"
31130-46 = "[s] \"ヒフミ、この辺の髪の毛ちょっと跳ねてるよ。\""
31130-47 = "あ、ありがとうございます。少し寝坊してしまいまして……。"
31130-48 = "で、ではなく！"
31130-49 = "みなさん、こちらをご注目ください！"
31130-51 = "……？"
31130-53 = "……今日は補習授業部の合宿、その大切な初日です！"
31130-54 = "私たちは大変な状態で、ともすれば慌ててしまいがちな状況ではありますが……。"
31130-55 = "難しく考える必要はありません！"
31130-56 = "一週間後の第2次特別学力試験で合格する、それだけです！"
31130-57 = "そうだね。"
31130-58 = "ですね。"
31130-59 = "……。"
31130-61 = "そこで……"
31130-66 = "今から、模擬試験を行います！"
31130-67 = "……模擬試験？"
31130-68 = "なるほど……？"
31130-69 = "きゅ、急に試験！？なんで！？"
31130-70 = "闇雲に勉強しても、あまり効率が良いとは言えません。"
31130-71 = "着実に目標達成のためには、何ができて何ができないのか、今どのくらいの立ち位置なのか……まずそれを把握する必要があります！"
31130-72 = "というわけで、昨晩こちらを準備してきました！"
31130-76 = "昨年トリニティで行われた試験問題と、その模範解答です！まだ中途半端と言いますか、集められたのは一部だけなのですが……。"
31130-77 = "先生も昨日遅くまで手伝ってくださって……第2次特別学力試験を想定した、ちょっとした模擬試験のような形にできました！"
31130-78 = "試験時間は60分、100点満点中の60点以上で合格。つまり本番と一緒です。"
31130-79 = "さあ、まずはこれを解いてみましょう！"
31130-81 = "第1次補習授業部模試"
31130-82 = "[s] \"準備できた？\""
31130-85 = "[ns] \"じゃあ……試験、開始！\""
31130-89 = "……。"
31130-92 = "あら、これは……♡"
31130-95 = "どこかで見たような……見てないような……。"
31130-99 = "（みなさん、頑張りましょう……！）"
31130-105 = "模擬試験が終了し、採点結果が出そろった。"
31130-106 = "では先生、結果発表をお願いします！"
31130-108 = "第1次補習授業部模試、結果――"
31130-110 = "ハナコ―4点[FF6666]（不合格）[-]"
31130-112 = "アズサ―33点[FF6666]（不合格）[-]"
31130-114 = "コハル―15点[FF6666]（不合格）[-]"
31130-116 = "ヒフミ―68点[007eff]（合格）[-]"
31130-118 = "……そうか。"
31130-119 = "……え？"
31130-120 = "あらまぁ。"
31130-121 = "……。"
31130-125 = "これが今の私たちの現実です。このままだと、私たちの先に明るい未来はありません……。"
31130-130 = "ここからあと一週間、みんなで60点を超えるためには、残りの時間を効率的に使っていかなければならないのです！"
31130-131 = "そこで！まず、コハルちゃんとアズサちゃんがどちらも1年生用試験ですので……"
31130-136 = "私とハナコちゃんが、おふたりの勉強内容をお手伝いします！ハナコちゃん、最近何があったのかは知らないのですが、1年生の時の試験では高得点だったんですよね？"
31130-137 = "あら……？えっと、まあそうですね……。"
31130-138 = "実はその、1年生の時のハナコちゃんの答案を見つけてしまいまして……それでハナコちゃんの方については後ほど、今の状態になってしまった原因をしっかり把握したうえで、私と先生と一緒に解決策を探しましょう！"
31130-142 = "まだ途中ですが他にも試験を作成中ですので、今日から定期的に模試を行って、進捗具合も確認できればと思っています。"
31130-143 = "……。"
31130-144 = "これがおそらくは、今できるベストの選択……。"
31130-145 = "頑張りましょう！きっと、頑張ればどうにか、みんなで合格できるはずです……！"
31130-146 = "[s] （ヒフミ……！）"
31130-149 = "（先生もああ言ってくださったことですし、私もただ心配しているだけというわけにはいきません。私は、私にできることを……！）"
31130-151 = "……うん、了解。指示に従う。"
31130-152 = "わ、分かった……。"
31130-153 = "ヒフミちゃん……すごいですね。昨晩だけでこんなに準備を……"
31130-154 = "あ、いえいえ、先生も手伝ってくださったので……。"
31130-155 = "なるほど、先生が。"
31130-156 = "[s] \"大したことはしてないよ、これはヒフミの頑張りの成果。\""
31130-157 = "それだけではありません、何とご褒美も用意しちゃいました！"
31130-158 = "えっと……"
31130-160 = "（ガサゴソ……）"
31130-164 = "こちらです！良い成績を出せた方には、この「モモフレンズ」のグッズをプレゼントしちゃいます！"
31130-165 = "モモフレンズ……？"
31130-166 = "……何それ？"
31130-167 = "……っ！！"
31130-168 = "あ、あれ……？最近流行りの、あの「モモフレンズ」ですが……もしかして、ご存じないですか……？"
31130-169 = "初めて見ましたね……いえ、どこかでちらっと見た気も……？"
31130-170 = "えぇっ！？"
31130-171 = "何これ、変なの……豚？それともカバ……？"
31130-172 = "ち、違います！ペロロ様は鳥です！見てください、この立派な羽！そして凛々しいくちばし！"
31130-173 = "……目が怖い。それに、名前もなんか卑猥だし……。"
31130-174 = "えぇっ……！？た、確かにそう仰る方も一部にはいますけど……よ、よく見てください。じっくり見てると何だか可愛く――"
31130-175 = "あ、思い出しました。そういえばヒフミちゃんのカバンや、スマホケースがそのキャラクターでしたね。"
31130-176 = "たしか、舌を出してよだれを垂らしながら、もう許して……っ！と泣き叫ぶキャラクターだったとか……？"
31130-177 = "え、いえっ、後半部分は色々と違いますよ！？"
31130-178 = "……わ、私は要らない。"
31130-179 = "あうぅ……。"
31130-180 = "……。"
31130-181 = "あ、アズサちゃん……？"
31130-182 = "……か、"
31130-183 = "……か？"
31130-185 = "可愛い……！！！"
31130-186 = "！！？"
31130-187 = "！？"
31130-188 = "あら……？"
31130-190 = "か、可愛すぎる……！何だこれは、この丸くてフワフワした生物は……！！"
31130-191 = "この目、表情が読めない……何を考えているのか全く分からない……！"
31130-192 = "あ、アズサちゃん……？"
31130-193 = "さすがはアズサちゃん、ペロロ様の可愛さに気づいてくれたんですね！そうです！そういうところが可愛いんです！"
31130-194 = "うそぉ……！？"
31130-195 = "こ、こっちは？この長いのは？イモリ…… いや、キリン？何だか首に巻いたら温かそうな……！"
31130-196 = "それはウェーブキャットさんです！いつもウェーブして踊っている猫なのですが、仰る通り最近ネックピローのグッズが……"
31130-197 = "これは？この小さいのは？"
31130-198 = "それはMr.ニコライさんです！いつも哲学的なことを言って不思議な目で見られてしまう方ですね！"
31130-199 = "今回ご褒美の一つとして、そのニコライさんが書いた『善悪の彼方』という本もあるんですよ、それも初版！"
31130-200 = "すごい、すごい……！！これを貰えるのか？ま、まさか、選んでも良いのか？"
31130-201 = "はい！アズサちゃんが欲しいのを持っていってください！"
31130-206 = "あらあら……。"
31130-207 = "な、何なの……。"
31130-209 = "……やむを得ない、全力を出すとしよう。"
31130-213 = "良いモチベーション管理だ、ヒフミ。約束しよう。必ずや任務を果たして、あの不思議でふわふわした動物を手にしてみせる！"
31130-218 = "は、はいっ！ファイトです！"
31130-222 = "えへ、えへへへへへ……"
31130-226 = "あら、何だかヒフミちゃんが楽しそうに、と言いますかお人形さんと同じような表情に……♡"
31130-227 = "[s] \"モモフレ仲間ができて喜んでるのかな……？\""
31130-228 = "えぇ……。"
31130-230 = "次回;正義実現委員会の副委員長（１）"

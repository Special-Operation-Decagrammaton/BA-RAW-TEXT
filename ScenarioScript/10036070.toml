10036070-223 = "...Hold up."
10036070-225 = "Atsuko, Hiyori, get down!"
10036070-230 = "Kyah?!"
10036070-231 = "Whaaa?!"
10036070-235 = "Ugh! Wh-What was that, a shell?!"
10036070-236 = "What happened?! What's going on?!"
10036070-238 = "*cough* *cough* They brought mortar launchers, or rockets, or..."
10036070-239 = "*cough* No, we don't have anything like that..."
10036070-240 = "Then just what...?"
10036070-242 = "[ns] \"W-Wait, is that...?!\""
10036070-244 = "It's been a while, Helmet Gangsters. Have you been well?"
10036070-245 = "I worried about you every day. How are you, really?"
10036070-246 = "Have you been eating a balanced breakfast? Living your lives to the fullest?"
10036070-247 = "I'd hate to hear you haven't been. I've so been looking forward to the day of our reunion."

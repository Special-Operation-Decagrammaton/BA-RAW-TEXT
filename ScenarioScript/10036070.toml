[translation]
10036070-1 = "第7話;「她」來了"
10036070-3 = "哎喲！你輕一點好不好！我那裡可是被打到了兩次耶！"
10036070-4 = "擦藥是要怎麼輕一點啦？你少唉唉叫了！"
10036070-5 = "可惡……這到底是什麼情況啊。"
10036070-6 = "我們連表演會場都還沒靠近，就被來路不明的頭盔團襲擊了……"
10036070-7 = "就是說啊。本來以為對方還離得很遠，沒想到才一瞬間就出現在眼前……#n真的是連一眨眼的時間都不到。"
10036070-8 = "唔，難不成是幽靈嗎……頭盔團裡竟然有那種傢伙……"
10036070-9 = "吵死了！"
10036070-10 = "不管怎麼說，我們破壞頭盔團慶典的計劃都徹底失敗了。"
10036070-11 = "但這並不是我們的錯！"
10036070-12 = "……！"
10036070-13 = "難道我說得不對嗎？#n我們大家都相信計劃會成功，而且也拚命戰鬥了對吧！"
10036070-14 = "既然如此，問題只可能出在制定計劃的傢伙身上！"
10036070-15 = "所以你的意思是……"
10036070-16 = "沒錯，那個笑咪咪教授！問題就是他造成的！"
10036070-17 = "馬上打電話給他！"
10036070-24 = "是你們啊。#n已經在舉杯慶祝勝利了嗎？"
10036070-26 = "慶祝個頭啦！"
10036070-27 = "給我從實招來，教授！#n你是不是故意設計這個計劃來整我們的！"
10036070-28 = "不然怎麼還沒進攻就被打得落花流水！"
10036070-30 = "嗯？怎麼會呢？"
10036070-31 = "考慮到你們和頭盔團的兵力，應該會很順利才對呀。"
10036070-33 = "之前的綁架計劃也是！你的計劃根本沒一個能成功的！"
10036070-35 = "呼呣，可以先跟我說明一下情況嗎？"
10036070-37 = "啊啊，原來如此。#n第二次嘗試也失敗了啊，真遺憾。"
10036070-39 = "喂！你在開玩笑是不是！我們可是有付錢的耶！"
10036070-40 = "就是說啊！那些都是我們一點一滴辛苦存下來的錢！"
10036070-41 = "是我們左威脅右恐嚇好不容易弄來的血汗錢啊！"
10036070-43 = "第一次試圖綁架DJ就遭人妨礙，而這次又發生相同的事……"
10036070-44 = "即便趁著慶典會場戒備薄弱時進攻，卻依然慘遭失敗……"
10036070-45 = "這還真是有趣。"
10036070-47 = "哪裡有趣了啦！你現在打算怎麼辦！#n我們可是相信你的計劃去衝鋒陷陣，結果卻每次都失敗！"
10036070-49 = "安靜點。你們這群烏合之眾。"
10036070-51 = "什，什麼……？"
10036070-52 = "你這傢伙現在人在哪裡！我先揍扁你再去對付頭盔團！"
10036070-54 = "好了好了，你先別激動。"
10036070-55 = "事到如今，我們必須認清現實。"
10036070-56 = "坐在棋盤另一邊的對手，絕對不是盞省油的燈。"
10036070-57 = "沒錯，至少是個能和我交手數回合的對手……"
10036070-58 = "不過我們還沒有輸。"
10036070-59 = "各位，請仔細聽我說。"
10036070-61 = "……？"
10036070-63 = "啊啊！頭盔團慶典廣播！"
10036070-64 = "因為表演還需要一些準備時間，原定5點開始的DJ表演將延後到6點開始！"
10036070-65 = "非常抱歉！不過還請各位多多期待！以上廣播！"
10036070-66 = "……是我們的襲擊造成的嗎？"
10036070-68 = "沒錯，你們做得很好。#n多虧有各位的努力，才讓本來即將開始的壓軸活動延後了一個小時。"
10036070-70 = "嗯？該不會這才是你真正的目的吧？"
10036070-71 = "難道這也在你的意料之中……！？"
10036070-73 = "這就任憑各位想像了。#n戰況本來就會因為意料之外的變數，甚至是某個人的善變、疏失或固執而發生變化。"
10036070-74 = "不過也正因如此，我們才能得到這個好消息。#n幸虧你們成功拖延了表演，各位的復仇總算能順利成功了。"
10036070-75 = "只不過並非藉由各位，而是由「她」的手來實現。"
10036070-76 = "「她」……？"
10036070-81 = "到頭來，與其在這裡出謀劃策，「她」完成準備的速度似乎更快呢。"
10036070-82 = "後續的棋局已經沒有各位表現的機會了。"
10036070-83 = "繼續與否都是各位的自由。#n我的諮詢到此為止。"
10036070-84 = "後會有期。"
10036070-91 = "……他到底在說什麼啊？"
10036070-92 = "我也聽不懂……"
10036070-93 = "不過現在已經有人受傷……#n都做到這個地步還報不了仇的話，也只能放棄了吧？"
10036070-94 = "那個笑咪咪教授也是這麼說的……我們不如就回去吧。"
10036070-95 = "老實說，要是再遇到剛剛那傢伙，我也沒自信打得過他……"
10036070-99 = "喂！！！！！"
10036070-100 = "我對你們太失望了！#n失敗我可以接受，但可不能連骨氣都沒了！"
10036070-101 = "這樣還有臉去見大姐頭嗎！"
10036070-102 = "難道你們已經忘了嗎！？#n一直在前方帶領著我們的……大姐頭那可靠又令人安心的背影！"
10036070-103 = "……！！！"
10036070-108 = "我們是誰？是讓流淚的小孩哇哇大哭，讓哇哇大哭的小孩哭到沙啞的太妹！"
10036070-109 = "如果不在這裡為拉拔我們的大姐頭報仇，還有誰能為他出一口氣呢！？"
10036070-110 = "笑咪咪教授什麼的已經沒用了！"
10036070-111 = "之後就靠我們自己來解決！就像以前一樣！"
10036070-112 = "哦哦！"
10036070-113 = "還能動的人跟我來！"
10036070-114 = "準備襲擊海邊的DJ表演會場！"
10036070-117 = "注意注意！離表演開始只剩20分鐘，觀眾們已經開始入場了！"
10036070-118 = "之前已經延誤了不少時間，大家動作快！"
10036070-119 = "是！"
10036070-120 = "音響OK！器材OK！很好！"
10036070-121 = "1分鐘後開始彩排！"
10036070-122 = "我知道了。"
10036070-124 = "哇！工讀生小姐！"
10036070-125 = "我也來幫忙彩排吧。"
10036070-126 = "沒，沒關係！你去休息就好……！"
10036070-127 = "不，這畢竟是我接下的任務。而且總不能只有我在一旁遊手好閒。#n有什麼我能做的嗎？"
10036070-128 = "現在應該只剩下檢查唱盤和測試音箱了吧。"
10036070-129 = "知道了，交給我吧。"
10036070-130 = "那，那就拜託啦！"
10036070-135 = "[ns]「沙織。」"
10036070-136 = "嗯？啊，老師，你來得正好。表演就快開始了。"
10036070-137 = "孩子們也來看表演了嗎？#n這樣啊，感謝你的幫忙。"
10036070-138 = "麻煩稍等我一下。#n我得在表演前再測試一次器材。"
10036070-139 = "[s]「我來幫你吧。」"
10036070-140 = "……老師果然會這麼說。"
10036070-141 = "那我們一起到舞台上去吧。"
10036070-143 = "好期待哦！你是第一次看DJ表演，應該很興奮吧？"
10036070-144 = "那還用問嗎！待會一定會超嗨、超熱鬧、超有趣的！"
10036070-145 = "派對怎麼能少了電子音樂呢！"
10036070-147 = "……人還真多。"
10036070-148 = "[s3]「嗯，大家都來看表演了呢。」\n[s4]「座位幾乎都滿了呢。」"
10036070-151 = "雖然今天一整天都在舞台附近跑上跑下的……"
10036070-152 = "不過真正站上演出前的舞台，感覺果然完全不同。"
10036070-153 = "該說比我預想的還要新鮮嗎……"
10036070-154 = "是我不曾有過的體驗。"
10036070-155 = "……真神奇啊。"
10036070-158 = "呵呵，有早點來真是太好了。"
10036070-159 = "不然就搶不到中間最好的位置了。"
10036070-160 = "我不喜歡人擠人的地方……"
10036070-161 = "我以前在雜誌上看過，DJ表演才是慶典的重頭戲哦！"
10036070-162 = "能享受表演的人，才是海灘真正的人氣王……！"
10036070-163 = "受頭盔團那些傢伙歡迎又能怎樣……"
10036070-167 = "啊，你們看舞台那邊。好像開始彩排了。"
10036070-168 = "沙醬果然也在上面。"
10036070-169 = "真，真的嗎？在哪裡在哪裡？"
10036070-174 = "等等，日和。#n你那樣蹦蹦跳跳的，說不定沙織會注意到我們這邊──"
10036070-178 = "等等，你們有沒有聽到什麼聲音？"
10036070-179 = "嗯？聲，聲音？"
10036070-184 = "姐妹們！我們上！"
10036070-185 = "頭盔團的傢伙都給我滾出來！好好分個高下吧！"
10036070-194 = "什，什麼情況！？#n怎麼會有太妹出現？"
10036070-195 = "哇啊啊！對方打過來了！快，快反擊！"
10036070-197 = "一群混帳！我要為大姐頭報仇！"
10036070-204 = "唔啊……"
10036070-205 = "這些傢伙到底是什麼人？"
10036070-206 = "人數這麼少還來襲擊慶典會場……"
10036070-207 = "他們到底在想什麼？"
10036070-209 = "可惡……！竟然連最後的襲擊都失敗了……！"
10036070-210 = "真的只能到此為止了嗎……"
10036070-211 = "都還沒為大姐頭報仇啊……！"
10036070-218 = "他們……到底是什麼人呢……？"
10036070-219 = "我也不知道。#n但是剛才打算綁架DJ的也是他們，可能是想製造混亂吧？"
10036070-223 = "……等等。"
10036070-225 = "敦子、日和，過來這邊！"
10036070-230 = "呀啊！？"
10036070-231 = "哇啊啊啊！？"
10036070-235 = "啊啊！這是什麼！？火箭彈……！？"
10036070-236 = "怎麼了！？發生什麼事了！？"
10036070-238 = "咳咳，咳咳！#n怎麼回事，那些太妹們竟然連火箭發射器都拿來了嗎？"
10036070-239 = "咳咳！不是，我們根本沒有火箭發射器啊……"
10036070-240 = "那這到底是……"
10036070-242 = "[ns]「那，那是……！？」"
10036070-244 = "好久不見了呢，頭盔團的各位。#n這段時間過得好嗎？"
10036070-245 = "小女子可是每天都掛念著你們呢。#n有沒有照顧好健康呀？"
10036070-246 = "是否有按時攝取三餐，充實愉快地度過每一天呢？"
10036070-247 = "如果沒有的話，小女子可是會很傷腦筋的。#n畢竟我可是一直苦苦期盼著與各位重逢的這一天呢。"
10036070-248 = "像以前一樣天真、叛逆、隨心所欲的你們──"
10036070-252 = "──被我親手復仇的這一天！"

[translation]
10036070-1 = "ตอนที่ 7;'เธอผู้นั้น' ปรากฏตัว"
10036070-3 = "โอ๊ย! เบามือหน่อยสิ! ฉันโดนยิงตรงนั้นไป 2 นัดเลยนะ!"
10036070-4 = "จะให้ทายาให้เบามือได้ยังไงเล่า! อย่ามาสำออยเลยน่า!"
10036070-5 = "ฮึ่ย... ทำไมฉันต้องมาอยู่ในสภาพนี้ด้วย"
10036070-6 = "ฉันโดนแก๊งหมวกกันน็อกปริศนาเล่นงานตั้งแต่ก่อนไปถึงเวทีอีก..."
10036070-7 = "ใช่ เหมือนจะได้ยินเสียงจากไกลๆ แต่เผลอแป๊บเดียวก็ตรงเข้ามาเล่นงานเลย มาเร็วอย่างกับผีแหนะ"
10036070-8 = "ดะ... เดี๋ยวนี้แก๊งหมวกกันน็อกมีคนเก่งๆ แบบนั้นแล้วเหรอเนี่ย..."
10036070-9 = "หนวกหูน่า!"
10036070-10 = "แผนการป่วนงานเทศกาลของพวกแก๊งหมวกกันน็อกล้มเหลวอีกแล้ว"
10036070-11 = "แต่นี่ไม่ใช่ความผิดของเราสักหน่อย!"
10036070-12 = "...!"
10036070-13 = "ก็มันจริงนี่? พวกเราสู้ยิบตาด้วยความเชื่อมั่นว่าแผนการจะสำเร็จกันแล้วไม่ใช่เหรอ!?"
10036070-14 = "ถ้างั้นก็เป็นความผิดของคนคิดแผนการสิ!"
10036070-15 = "ถ้างั้นก็แปลว่า..."
10036070-16 = "ใช่ ศาสตราจารย์ยิ้มหวาน! ยัยนั่นน่ะแหละตัวปัญหา!"
10036070-17 = "ติดต่อไปอีกครั้งซิ!"
10036070-24 = "ว่ายังไงคะทุกคน กำลังฉลองชัยชนะกันอยู่หรือเปล่าคะ?"
10036070-26 = "ฉลองบ้าบออะไรกันเล่า!"
10036070-27 = "บอกมาตามตรงเลยนะ ศาสตราจารย์! เธอตั้งใจวางแผนการแบบนี้เพื่อจะแกล้งพวกฉันใช่มั้ย?"
10036070-28 = "พวกฉันโดนยิงจนตัวพรุนตั้งแต่ก่อนบุกเข้าไปในงานอีกนะ!"
10036070-30 = "คะ? เป็นไปได้ยังไงคะ?"
10036070-31 = "ถ้าเปรียบเทียบกองกำลังของพวกคุณกับของแก๊งหมวกกันน็อกแล้ว นี่เป็นแผนการที่มีประสิทธิภาพ#nเลยนะคะ"
10036070-33 = "แผนการของเธอไม่มีอะไรได้ผลเลย แผนการลักพาตัวก่อนหน้านี้ก็ด้วย!"
10036070-35 = "โฮ่... ช่วยอธิบายให้ฉันเข้าใจหน่อยได้มั้ยคะ?"
10036070-37 = "อืม อย่างนี้สินะคะ ล้มเหลวถึง 2 ครั้งเลย น่าเสียดายจังเลยค่ะ"
10036070-39 = "ยัยนี่! พวกฉันจริงจังนะ! แถมยังจ่ายเงินให้เธอไปแล้วด้วย!"
10036070-40 = "ใช่! นั่นมันเงินเก็บจากการทำงานอย่างเหน็ดเหนื่อยของพวกเราเลยนะ!"
10036070-41 = "เราทั้งต้องไปคุกคามแล้วก็ยังต้องไปขู่คนอื่นเพื่อให้ได้เงินก้อนนั้นมาเลยนะรู้มั้ย!"
10036070-43 = "ตอนไปลักพาตัวดีเจก็มีคนมาขัดขวาง และครั้งนี้ก็ไม่ต่างกันอีก..."
10036070-44 = "ต่อให้ใช้ช่องโหว่ของกองกำลังที่น้อยลง แต่ก็โดนเล่นงานจนพ่ายแพ้กลับมา..."
10036070-45 = "น่าสนุกดีนะคะเนี่ย"
10036070-47 = "มันน่าสนุกตรงไหน! แล้วทีนี้จะทำยังไง! ฉันทำตามแผนการของเธอเพราะเชื่อว่าจะสำเร็จ แต่แล้วก็ล้มเหลวกลับมา 2 รอบติดกันแบบนี้น่ะ!"
10036070-49 = "สงบปากสงบคำหน่อยค่ะ ไม่ดูตัวเองกันบ้างเลย"
10036070-51 = "วะ... ว่าไงนะ...?"
10036070-52 = "หน็อย! เธออยู่ไหนน่ะ! ฉันต้องล้างแค้นกับเธอก่อนแก๊งหมวกกันน็อกแล้วละ!"
10036070-54 = "เอาละๆ อย่าเพิ่งใส่อารมณ์เลยค่ะ"
10036070-55 = "ถ้าสถานการณ์มาถึงขนาดนี้แล้ว ฉันก็คงต้องยอมรับแล้วละค่ะ"
10036070-56 = "ว่าอีกฝ่ายที่นั่งอยู่ฝั่งตรงข้ามกระดานเป็นคนที่มีฝีมือไม่ใช่เล่นเลยค่ะ"
10036070-57 = "ค่ะ ถ้าเก่งแบบนี้ อย่างน้อยคนคนนี้คงต้องเจอกับฉันอีกหลายยกเลย..."
10036070-58 = "แต่ก็ใช่ว่าตอนนี้เราจะแพ้กันแล้วนะคะ"
10036070-59 = "ลองตั้งใจฟังอะไรดูสิคะ"
10036070-61 = "...?"
10036070-63 = "ฮัลโหล เทส! ประกาศจากงานเทศกาลแก๊งหมวกกันน็อก!"
10036070-64 = "เราต้องใช้เวลาในการเตรียมตัวเพิ่ม โชว์จากดีเจของเราจึงจะเลื่อนจาก 5 โมงเป็น 6 โมง!"
10036070-65 = "ต้องขอโทษด้วยครับ! ช่วยตั้งตารอกันอีกนิดนะครับ อย่าเพิ่งไปไหนกันล่ะ! ขอจบการประกาศแต่เพียง#nเท่านี้ครับ!"
10036070-66 = "นั่นมัน... เป็นเพราะการโจมตีของพวกเราเมื่อกี้เหรอ?"
10036070-68 = "ค่ะ พวกคุณทำได้ดีแล้วค่ะ ทำให้อีเวนต์หลักของเทศกาลที่ต้องเริ่มไปแล้วต้องล่าช้ากว่าเดิมถึง 1 ชั่วโมงเลยนะคะ"
10036070-70 = "หืม? ตั้งใจให้มันเป็นอย่างนั้นงั้นเหรอ?"
10036070-71 = "เธอคาดการณ์ไว้หมดแล้วงั้นเหรอว่าจะออกมาเป็นอย่างนี้น่ะ...?!"
10036070-73 = "ก็ไม่รู้สิคะ สถานการณ์ในสนามรบย่อมเปลี่ยนแปลงไปตามตัวแปรที่คาดเดาไม่ได้ รวมทั้งความโลเล ความผิดพลาด และความดื้อดึงของใครบางคนอยู่แล้วค่ะ"
10036070-74 = "แต่ยังไงก็เกิดเรื่องดีๆ นะคะ ต้องขอบคุณพวกคุณที่ทำให้โชว์จากดีเจล่าช้า เพราะนั่นจะทำให้ทุกคน#nได้แก้แค้นอย่างสมใจค่ะ"
10036070-75 = "แต่การแก้แค้นที่ว่านั่นจะไม่ได้มาจากน้ำมือของพวกคุณ แต่เป็นจากวิธีของ <เธอผู้นั้น> ค่ะ"
10036070-76 = "<เธอผู้นั้น> เหรอ...?"
10036070-81 = "การให้เธอผู้นั้นเตรียมตัวให้พร้อม มันเร็วกว่าการให้พวกคุณลงมือด้วยวิธีต่างๆ น่ะค่ะ"
10036070-82 = "สำหรับเกมที่จะเกิดขึ้นบนกระดานหลังจากนี้ พวกคุณคงไม่มีเรื่องให้ต้องออกโรง"
10036070-83 = "แต่คุณก็เลือกได้นะคะว่าจะอยู่ต่อหรือพอแค่นี้ การให้คำแนะนำของฉันคงจบแค่เท่านี้ค่ะ"
10036070-84 = "ลาละค่ะ"
10036070-91 = "หมายความว่ายังไงน่ะ...?"
10036070-92 = "ไม่เห็นจะเข้าใจเลย..."
10036070-93 = "เอาเถอะ เรามีทั้งคนเจ็บ... และก็ทุ่มเทกันมาตั้ง 2 รอบแล้วด้วย คงช่วยไม่ได้แล้วละ"
10036070-94 = "ศาสตราจารย์ยิ้มหวานก็พูดอย่างนั้นอีก... งั้นเรากลับกันเถอะ..."
10036070-95 = "ถ้าให้พูดตามตรง ถ้าต้องเจอยัยคนนั้นที่เข้ามาขวางอีก ฉันก็ไม่มั่นใจหรอกว่าเราจะชนะได้..."
10036070-99 = "เดี๋ยวเหอะ!!!!"
10036070-100 = "พวกเธอนี่น่าผิดหวังชะมัด! ถึงแผนการจะล้มเหลว แต่ก็ไม่ควรหมดกำลังใจสิ!"
10036070-101 = "แบบนี้จะมีหน้าไปเจอลูกพี่ใหญ่ได้ยังไง!"
10036070-102 = "ลืมภาพที่แข็งแกร่งและน่าเชื่อถือของลูกพี่ใหญ่ของเราแล้วหรือไง!"
10036070-103 = "...!!!"
10036070-108 = "ลืมไปแล้วเหรอว่าเราเป็นใคร พวกเราคือแยงกี้ที่ทำให้เด็กที่น้ำตาซึมต้องร้องไห้แงน้ำตาไหล และทำให้เด็กที่ร้องไห้น้ำตาไหลต้องร้องไห้จนขี้มูกโป่งนะ!"
10036070-109 = "ถ้าพวกเราไม่แก้แค้นให้ลูกพี่ใหญ่ของเรา แล้วใครจะมาแก้แค้นให้กันเล่า!"
10036070-110 = "ตอนนี้เราไม่ต้องการศาสตราจารย์อะไรนั่นแล้ว!"
10036070-111 = "เราจะวางแผนและลงมือทำกันเอง! เหมือนที่ผ่านมายังไงล่ะ!"
10036070-112 = "โอ้วว!"
10036070-113 = "คนที่ยังไหว ตามฉันมา!"
10036070-114 = "เราจะบุกไปโจมตีเวทีริมหาดของดีเจคนนั้นกัน!"
10036070-117 = "เอาละๆ เราจะเริ่มกันในอีก 20 นาทีแล้ว! ผู้ชมก็เข้ามาจับจองที่นั่งจนเต็มแล้วด้วย!"
10036070-118 = "เราล่าช้ากว่ากำหนดการเดิมกันแล้ว งั้นก็รีบๆ เช็กเข้า!"
10036070-119 = "ค่ะ!"
10036070-120 = "เช็กเครื่องดนตรี! เช็กระบบเสียง! โอเค!"
10036070-121 = "เราจะซ้อมกันในอีก 1 นาที!"
10036070-122 = "เข้าใจแล้ว"
10036070-124 = "อ๊ะ! น้องพาร์ทไทม์!"
10036070-125 = "ฉันจะช่วยตอนซ้อมด้วย"
10036070-126 = "มะ... ไม่เป็นไร! ไปพักผ่อนเถอะ...!"
10036070-127 = "ไม่ได้หรอก นี่เป็นหน้าที่ของฉัน ฉันทิ้งงานออกไปเที่ยวเล่นไม่ได้หรอก จะให้ฉันช่วยตรงไหนดีล่ะ?"
10036070-128 = "ที่เหลือก็น่าจะเป็นการเทสเครื่องเล่นแผ่นเสียงกับลำโพงนะ"
10036070-129 = "เข้าใจแล้ว ให้เป็นหน้าที่ของฉันได้เลย"
10036070-130 = "งะ... งั้นก็ฝากด้วยนะ!"
10036070-135 = "[ns] \"ซาโอริ\""
10036070-136 = "หืม? มาได้จังหวะพอดีเลยละครู การแสดงดนตรีจะเริ่มแล้ว"
10036070-137 = "ทุกคนก็มาดูการแสดงดนตรีด้วยงั้นเหรอ? อืม ขอบคุณที่พาทุกคนมานะ"
10036070-138 = "รออีกเดี๋ยวนะ ฉันต้องไปเทสอุปกรณ์ก่อนเริ่มการแสดงน่ะ"
10036070-139 = "[s] \"ครูจะช่วยเอง\""
10036070-140 = "เอางั้นเหรอ... แต่ฉันก็รู้แล้วละว่าครูต้องพูดอย่างนี้"
10036070-141 = "ถ้างั้นเราก็ขึ้นไปบนเวทีด้วยกันสักเดี๋ยวมั้ย?"
10036070-143 = "ตื่นเต้นจังเลย! ฉันไม่เคยดูโชว์สดๆ ของดีเจมาก่อนเลย มันต้องสนุกแน่ๆ เลยเนอะ?"
10036070-144 = "แน่นอนสิ! ต้องทั้งเสียงดัง เร้าใจ และสนุกสุดเหวี่ยงไปเลยละ!"
10036070-145 = "งานปาร์ตี้จะขาดดนตรีอิเล็กทรอนิกส์ไปไม่ได้หรอก!"
10036070-147 = "คนเยอะจัง..."
10036070-148 = "[s3] \"อืม ทุกคนมารอดูการแสดงดนตรีกันน่ะ\"\n[s4] \"คนมากันเยอะจนไม่มีที่นั่งว่างเลยนะ\""
10036070-151 = "วันนี้ฉันวิ่งวุ่นขึ้นลงเวทีอยู่ก็หลายรอบ..."
10036070-152 = "แต่พอได้ขึ้นมาอีกครั้งก่อนเริ่มการแสดง ความรู้สึกก็แตกต่างออกไปโดยสิ้นเชิงเลย"
10036070-153 = "คงต้องบอกว่ามันแปลกใหม่กว่าที่ฉันคิดน่ะ..."
10036070-154 = "ฉันไม่เคยรู้สึกอะไรแบบนี้มาก่อนเลย"
10036070-155 = "น่าตื่นเต้นจัง..."
10036070-158 = "ฮุฮุ ดีจังนะที่มาก่อนเวลา"
10036070-159 = "เราจองได้ที่นั่งกลางเวทีได้พอดีเลย"
10036070-160 = "แต่ฉันไม่ชอบการเบียดเสียดอยู่ท่ามกลางผู้คนเลย..."
10036070-161 = "แต่ฉันเห็นมาจากนิตยสารว่าการแสดงดนตรีของดีเจจะเป็นไฮไลท์ของงานเทศกาลเลยนะคะ!"
10036070-162 = "แล้วดีเจคนนี้ก็เป็นคนดังของที่นี่ด้วยค่ะ...!"
10036070-163 = "เป็นคนดังในหมู่แก๊งหมวกกันน็อกจะไปมีประโยชน์อะไรกัน..."
10036070-167 = "อ๊ะ ดูบนเวทีตรงโน้นสิ เหมือนจะซ้อมใหญ่กันแล้วเลย"
10036070-168 = "ซัตจังก็ขึ้นไปซ้อมกับเขาด้วยสินะ"
10036070-169 = "จะ... จริงเหรอคะ? ไหนเหรอคะ? ไหนพี่ซาโอริเหรอ?"
10036070-174 = "นี่ ฮิโยริ ถ้ากระโดดโหยงๆ แบบนั้นเดี๋ยวซาโอริก็สังเกตเห็นพวกเรา..."
10036070-178 = "เดี๋ยวนะ ได้ยินเสียงอะไรกันหรือเปล่า?"
10036070-179 = "คะ? สะ... เสียงอะไรเหรอคะ?"
10036070-184 = "ทุกคน! บุกเข้าไปเลย!"
10036070-185 = "แก๊งหมวกกันน็อก แน่จริงก็ออกมาเจอกันสักตั้งสิ!"
10036070-194 = "นะ... นี่มันอะไรกันเนี่ย?! พวกแยงกี้เหรอ? จู่ๆ เข้ามาทำไมกันน่ะ?"
10036070-195 = "ว้ายย! พวกนั้นบุกเข้ามาโจมตีเรา! สะ... สู้กลับเลย!"
10036070-197 = "ยัยพวกหมวกกันน็อก! ฉันจะแก้แค้นให้ลูกพี่ใหญ่ของฉัน!"
10036070-204 = "ย้ากกก...!"
10036070-205 = "อะไรของพวกนั้นน่ะ?"
10036070-206 = "มีกันแค่ไม่กี่คน แต่จะเข้ามาโจมตีกลางงานเลยเหรอ?"
10036070-207 = "คิดอะไรอยู่ในหัวกันแน่?"
10036070-209 = "อึก...! แม้แต่การโจมตีครั้งสุดท้ายก็แพ้อย่างเปล่าประโยชน์เหรอเนี่ย...!"
10036070-210 = "เราคงทำได้แค่นี้สินะ..."
10036070-211 = "แต่นี่เป็นการแก้แค้นให้ลูกพี่ใหญ่ของเรานะ...!"
10036070-218 = "พวกนั้น... เป็นใครกันแน่นะคะ...?"
10036070-219 = "นั่นน่ะสิ เมื่อกี้ก็พยายามจะลักพาตัวดีเจด้วย หรือว่าอยากจะก่อเรื่องวุ่นวายในงานเทศกาลน่ะ?"
10036070-223 = "เดี๋ยวนะ..."
10036070-225 = "อาสึโกะ ฮิโยริ มาทางนี้!"
10036070-230 = "อ๊ายย?!"
10036070-231 = "ว้ายยยย?!"
10036070-235 = "โอ๊ย! นะ... นี่มันอะไรกัน! จรวดระเบิดเหรอ...?!"
10036070-236 = "อะไรน่ะ! นี่มันเรื่องอะไรกัน?!"
10036070-238 = "แค่ก แค่ก! ยัยพวกแยงกี้ เอาเครื่องยิงจรวดเข้ามาในงานเหรอเนี่ย?  "
10036070-239 = "แค่กๆ! จะบ้าเหรอ พวกเราไม่มีเครื่องยิงจรวดอะไรแบบนั้นหรอกนะ..."
10036070-240 = "แล้วมันคืออะไรกันล่ะ..."
10036070-242 = "[ns] \"นะ... นั่นมัน...?!\""
10036070-244 = "ไม่ได้เจอกันนานเลยนะคะ แก๊งหมวกกันน็อก สบายดีกันหรือเปล่าคะ?"
10036070-245 = "ดิฉันเป็นห่วงพวกคุณทุกวันเลยละค่ะ แล้วสุขภาพเป็นยังไงกันบ้างคะ?"
10036070-246 = "รับประทานอาหารครบ 5 หมู่ วันละ 3 มื้อ แล้วใช้ชีวิตประจำวันอย่างกระฉับกระเฉงกันหรือเปล่าคะ?"
10036070-247 = "ถ้าไม่เป็นอย่างนั้น ก็คงจะแย่เลยนะคะ เพราะดิฉันเอาแต่เฝ้ารอคอยวันนี้ที่จะได้พบทุกคนค่ะ"
10036070-248 = "ทุกคนยังดูสดใส เกเร และเอาแต่ใจเหมือนเคยเลยนะคะ วันนี้ละค่ะ ที่ดิฉันจะได้..."
10036070-252 = "แก้แค้นทุกคนด้วยมือของดิฉันเองค่ะ!"

[translation]
10036070-1 = "Episode 7;She is Coming"
10036070-3 = "Ow! Try to be gentle! I got shot twice there!"
10036070-4 = "I can only be so gentle with the ointment. Stop being so dramatic!"
10036070-5 = "Damn it... Look at us."
10036070-6 = "We didn't even get anywhere near the stage. Some mystery chick from the Helmet Gang just beat us all up."
10036070-7 = "Yeah. Like, I thought she was far off, and then I blinked and she was right in front of me."
10036070-8 = "Ugh, is she a ghost or something...? Seems like she could do better than the Helmet Gang—"
10036070-9 = "Hey, shut up!"
10036070-10 = "Yeah, the Helmet Gang sucks, but they beat us, so we suck worse! All that planning, and we couldn't even crash their party..."
10036070-11 = "That wasn't our fault!"
10036070-12 = "Wait..."
10036070-13 = "...Yeah, we all gave it a hundred percent, because we thought that plan would work."
10036070-14 = "If it didn't work, that's on the planner, not us!"
10036070-15 = "So then..."
10036070-16 = "Yeah, Professor Smug! She's the problem!"
10036070-17 = "Let's call her again!"
10036070-24 = "Hello there. Are you calling me to join your victory toast?"
10036070-26 = "Seriously?!"
10036070-27 = "Let's be real, professor. You made that plan to screw us over, didn't you?"
10036070-28 = "We got beaten up and routed before we could even get in there!"
10036070-30 = "What? That's impossible."
10036070-31 = "I calculated your forces and the Helmet Gang's forces perfectly. Any way you look at the numbers, that should have been a win."
10036070-33 = "Yeah, just like that whole kidnapping plan earlier. NONE of your plans work!"
10036070-35 = "Hmm. Would you mind elaborating on that?"
10036070-37 = "...Ah, I see. A second failure. How unfortunate."
10036070-39 = "Yeah? So when do we start getting our money's worth?"
10036070-40 = "Seriously, do you know how long we saved up?"
10036070-41 = "How many people we had to shake down?!"
10036070-43 = "So both times, you were intercepted and thwarted..."
10036070-44 = "...even when the opposing force's defenses were at their weakest..."
10036070-45 = "This is interesting."
10036070-47 = "What's so \"interesting\" about it? What are you going to do about it? You've been steering us wrong this whole time!"
10036070-49 = "Be quiet, you amateurs."
10036070-51 = "Wh-What did you just—?!"
10036070-52 = "All right, that's it! Where are you?! I'll beat you up, THEN take care of the Helmet Gang!"
10036070-54 = "Now, now. Let's calm down."
10036070-55 = "One thing is clear, and we might as well admit it."
10036070-56 = "We have a worthy opponent on the other side of the board."
10036070-57 = "A match for me, at least in the early game."
10036070-58 = "But we are far from the endgame yet."
10036070-59 = "Now, listen carefully..."
10036070-61 = "Hmm?"
10036070-63 = "Um, attention, everyone! This is an official Helmet Gang Festival announcement!"
10036070-64 = "Due to extended preparations for the DJ concert, it's been postponed from five to six."
10036070-65 = "Uh, sorry. But it's gonna be worth the wait!"
10036070-66 = "...You think that's because of our ambush?"
10036070-68 = "Indeed. Well done. You delayed the main event by an entire hour."
10036070-70 = "Wait, was that your plan?"
10036070-71 = "You're telling us you planned that too?!"
10036070-73 = "Well, perhaps. The tide of battle often turns on the unexpected. On whims, mistakes, and stubbornness."
10036070-74 = "And that's for the best here. Thanks to your hard work postponing the concert, revenge is at hand."
10036070-75 = "Well, \"her\" hands, not yours, per se."
10036070-76 = "\"Her\" hands...?"
10036070-81 = "It seems her preparations outpaced our methods."
10036070-82 = "I'm afraid there's no winning endgame for...your particular pieces."
10036070-83 = "Resign or play it out. It's your choice. My consultation ends here."
10036070-84 = "Now, then..."
10036070-91 = "...What was she talking about?"
10036070-92 = "I don't know..."
10036070-93 = "We're all pretty thrashed at this point. Not much more we can do."
10036070-94 = "Even Professor Smug doesn't think we can win anymore. Let's just call it here."
10036070-95 = "Besides, if we meet that one Helmet Gangster again, she's gonna kick our—"
10036070-99 = "Shame on you!!"
10036070-100 = "I'm disappointed in all of you! Losing is one thing, but losing your will to fight?!"
10036070-101 = "You think Big Sis would want you to give up now?"
10036070-102 = "Think of how strong she is, how dependable she is! How far she carried us!"
10036070-103 = "*deep breath*"
10036070-108 = "Who are we? We're thugs! We make sad children cry, and we make crying children cry even harder!"
10036070-109 = "Who's gonna avenge our Big Sis if not us?!"
10036070-110 = "We don't need that professor or anyone else anymore!"
10036070-111 = "We're on our own! Just like we always have been!"
10036070-112 = "Yeah!"
10036070-113 = "If you can walk, then follow me!"
10036070-114 = "We are going to that concert stage, and we are springing the best ambush ever!"
10036070-117 = "Okay, we've got twenty minutes until showtime! All the seats are already packed."

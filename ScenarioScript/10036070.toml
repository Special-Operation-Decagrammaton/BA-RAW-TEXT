10036070-127 = "No, I have an assignment here. I can't just sit around. What do you need?"
10036070-128 = "All that's left is to check the turntable and test the speakers."
10036070-129 = "Understood. Leave it to me."
10036070-130 = "I-I will, then!"
10036070-135 = "[ns] \"Hey, Saori.\""
10036070-136 = "Hm? Oh, Sensei. Good timing. The show's about to start."
10036070-137 = "Are \"the kids\" here for the concert too? Mm, thanks for helping them along."
10036070-138 = "There's just this one last sound check I have to do..."

10036070-151 = "You know, I've been climbing on and off this stage all day..."
10036070-152 = "...but right now, it feels VERY different."
10036070-153 = "This is a new experience."
10036070-154 = "I don't think I've ever had this feeling before."
10036070-155 = "It feels...odd."
10036070-158 = "Heehee, it's a good thing we got here early."
10036070-159 = "The best seats in the house, in the very center."
10036070-160 = "I don't really like being squeezed in with all these people..."

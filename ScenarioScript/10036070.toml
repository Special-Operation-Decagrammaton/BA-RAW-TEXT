10036070-119 = "All right!"
10036070-120 = "Mics, check! Speakers, check! Okay!"
10036070-121 = "Starting final sound check in one minute!"
10036070-122 = "Right, understood."
10036070-124 = "Whoa! Miss part-timer!"
10036070-125 = "I'm here to do my part."

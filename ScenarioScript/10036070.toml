10036070-194 = "W-Wait, what? Thugs?! How?"
10036070-195 = "Ughh! They're attacking! Return fire!"
10036070-197 = "This one's for Big Sis, you little brats!!"
10036070-204 = "Ugh..."
10036070-205 = "What was that all about?"

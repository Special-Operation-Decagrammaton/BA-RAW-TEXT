[translation]
1601805-1 = "The Captain's Strength"
1601805-2 = "[ns] \"*pant* *pant*\""
1601805-3 = "..."
1601805-4 = "[s] \"*huff* *puff* *huff*\""
1601805-8 = "[ns] \"*pant* *huff* *puff* *huff*\""
1601805-10 = "[ns] \"Ugh... *huff*\""
1601805-11 = "Come on! Now you're just doing it for attention."
1601805-12 = "Anyway... How long were you running?"
1601805-13 = "[s] \"I ran all the way from Schale.\""
1601805-14 = "You know we have buses? Trains? Taxis, even? *sigh*"
1601805-15 = "I so much as mention the Black Market and you run like an idiot puppy."
1601805-16 = "You've really hyped this up too much!"
1601805-17 = "I'm sorry, but this really isn't that special."
1601805-18 = "Here, take a look."
1601805-19 = "[s1] \"A vending machine?\"\n[s2] \"You bought a vending machine? How incredible!\""
1601805-20 = "Yeah, that's right."
1601805-21 = "Be real. I bought something FROM it."
1601805-22 = "Check it out. You see how cheap this is?"
1601805-23 = "20 yen! For a whole drink, and not a little dinky one."
1601805-24 = "I was just thinking that you should know. In case you're walking by here and feel thirsty."
1601805-28 = "J-Just saying."
1601805-29 = "[s3] \"Top-secret Black Market intel from Rabu...\"\n[s4] \"I should take notes...\""
1601805-32 = "You're so dramatic!"
1601805-33 = "Well, I guess I'll buy you one since you came all this way. And you...look kind of sweaty."
1601805-34 = "Work's been productive, so I think I can spare the 20 yen, right?"
1601805-35 = "[s] \"Rabu's juice. I should display it on a pedestal!\""
1601805-36 = "C-Cram it!"
1601805-41 = "Here. Just have some and calm down."
1601805-42 = "[s5] \"I'm so grateful for Rabu's special juice!\"\n[s6] \"I can feel its power seeping into my bones.\""
1601805-45 = "Even plain water would taste good after all that running."
1601805-46 = "Ugh."
1601805-47 = "Urr, why won't this...? Ughhh!"
1601805-48 = "[s7] \"Are you hurt?\"\n[s8] \"Are you sick?\"\n[s9] \"Are you...hungry?!\""
1601805-52 = "Sensei, has anyone ever told you to relax?"
1601805-53 = "It's just... This juice... The bottle cap is so tight. Did they GLUE it on?"
1601805-54 = "Urrrr!"
1601805-55 = "Ugh! What a pain! Maybe I should SHOOT it open?"
1601805-56 = "[s] \"Give it to me.\""
1601805-57 = "Careful. You're not wearing gloves like me. You'll tear your palm up."
1601805-58 = "If it's stuck, we should grab a rubber band and maybe—"
1601805-63 = "[ns] \"Here you go.\""
1601805-64 = "..."
1601805-65 = "Don't make fun of me! Don't say a word!"
1601805-66 = "[s] \"But I didn't...\""
1601805-67 = "*sigh*"
1601805-68 = "I know I can last a while in a fight. You've seen it."
1601805-69 = "But I have such a weak grip. I try not to risk opening bottled drinks in front of the crew."
1601805-70 = "I wasn't thinking. Now you know..."
1601805-71 = "[s] \"I'll open bottles for you any day of the week.\""
1601805-72 = "Wh-What are you going on about?!"
1601805-73 = "Anyway! If you so much as whisper about me trying and failing to open this, I'll cut you into pieces and mail them back to Schale!"
1601805-74 = "Now give me my juice!"
1601805-75 = "[s] \"Uh...\""
1601805-80 = "Rabu snatched the juice bottle from me and fled into the crowd."
1601805-81 = "...I barely got to taste it."

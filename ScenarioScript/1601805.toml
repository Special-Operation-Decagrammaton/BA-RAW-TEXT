[translation]
1601805-1 = "ความแข็งแกร่งของหัวหน้า"
1601805-2 = "[ns] \"แฮ่ก... แฮ่ก...\""
1601805-3 = "......"
1601805-4 = "[s] \"แฮ่ก... แฮ่ก... แฮ่ก......\""
1601805-8 = "[ns] \"อึก... แฮ่ก... แฮ่ก...\""
1601805-10 = "[ns] \"อึก... แฮ่กๆ\""
1601805-11 = "คิดจะทำแบบนั้นไปถึงเมื่อไรน่ะ..."
1601805-12 = "นี่วิ่งมานานแค่ไหนแล้วเนี่ย?"
1601805-13 = "[s] \"ครูวิ่งมาจากชาเล่ต์น่ะ\""
1601805-14 = "น่าจะขึ้นรถบัส รถไฟ หรือถ้ารีบจริงๆ ก็ควรเรียกแท็กซี่เอาสิ... เฮ้อ"
1601805-15 = "ฉันแค่บอกว่าตลาดมืดเอง รีบร้อนวิ่งมาแบบนี้ บ้ารึเปล่า..."
1601805-16 = "อุตส่าห์ทำถึงขนาดนี้ ฉันก็ควรจะต้องโชว์อะไรดีๆ ให้เห็น..."
1601805-17 = "แต่นี่มันไม่ใช่เรื่องยิ่งใหญ่อะไรเลยน่ะสิ รู้สึกผิดชะมัด..."
1601805-18 = "เอ้า ดูนี่สิ"
1601805-19 = "[s1] \"ตู้ขายของอัตโนมัติ?\"\n[s2] \"ซื้อตู้ขายของอัตโนมัติเหรอ? สุดยอดเลยนะ\""
1601805-20 = "อื้อ ตู้ขายของอัตโนมัติน่ะ"
1601805-21 = "ฉันจะไปซื้อมาได้ยังไงเล่า!"
1601805-22 = "นี่ไม่ใช่ตู้ขายของอัตโนมัติทั่วไปหรอก ราคามันถูกมากเลยเห็นมั้ย?"
1601805-23 = "ดูสิ ขวดละ 20 เยนเอง"
1601805-24 = "เวลาที่ครูผ่านมาแถวนี้แล้วหิวน้ำก็แวะซื้อที่นี่ได้นะ ราคาถูกดีด้วย"
1601805-28 = "กะ... ก็แค่บอกไว้เฉยๆ น่ะ"
1601805-29 = "[s3] \"ข้อมูลลับสุดยอดของตลาดมืดที่บอกมาเนี่ยสุดยอดเลยนะ...\"\n[s4] \"ต้องจดความลับสุดยอดนี่ไว้ซะแล้ว...\""
1601805-32 = "อย่าเวอร์ไปน่า!"
1601805-33 = "เอาเถอะ ไหนๆ ก็มาถึงนี่แล้ว ฉันจะซื้อน้ำเลี้ยงขวดหนึ่งก็แล้วกัน"
1601805-34 = "งานที่ทำช่วงนี้ก็เป็นไปได้ด้วยดี ราคานี้ฉันซื้อเลี้ยงได้อยู่แล้ว!"
1601805-35 = "[s] \"น้ำผลไม้ของราบุ ครูจะเอาไปเก็บไว้ที่พิพิธภัณฑ์เลย...\""
1601805-36 = "หนวกหูน่า!"
1601805-41 = "เอ้า"
1601805-42 = "[s5] \"น้ำผลไม้ของราบุ! ครูจะดื่มให้หมดไม่เหลือเลย!!!\"\n[s6] \"รสชาติซึมลึกไปทุกอณูผิวเลย!!\""
1601805-45 = "วิ่งมาไกลขนาดนี้ ถึงจะเป็นแค่น้ำเปล่าก็คงอร่อยอยู่ดีนั่นแหละ"
1601805-46 = "อึก..."
1601805-47 = "อึก ทำไมถึง... อึกกกก...!"
1601805-48 = "[s7] \"เจ็บเหรอ?\"\n[s8] \"เป็นไข้หรือเปล่า?\"\n[s9] \"หิวข้าวเหรอ?!\""
1601805-52 = "ครู เคยมีใครบอกมั้ยว่าประคบประหงมเด็กมากเกินไปน่ะ?"
1601805-53 = "ฝาขวดน้ำผลไม้มันแน่นเกินไป เปิดไม่ออกเลย"
1601805-54 = "ฮึบบบบ-!!"
1601805-55 = "โว้ย!! โมโหแล้วนะ!! เดี๋ยวปั๊ดยิงขวดแตกเลย!!"
1601805-56 = "[s] \"ส่งมาให้ครูสิ\""
1601805-57 = "ระวังมือด้วยล่ะ มันปิดแน่นมากๆ ถ้าใช้มือเปล่าเดี๋ยวจะเจ็บมือเอา"
1601805-58 = "ถ้าเปิดไม่ออกจริงๆ คงต้องใส่ถุงมือหนังเปิด..."
1601805-63 = "[ns] \"เอ้า ได้แล้ว\""
1601805-64 = "......"
1601805-65 = "อย่ามาล้อเล่นน่า!!!"
1601805-66 = "[s] \"ครูยังไม่ได้พูดอะไรเลยนะ...\""
1601805-67 = "เฮ้อ..."
1601805-68 = "ฉันน่ะมั่นใจในเรื่องพละกำลังของตัวเองพอสมควรเลยนะ"
1601805-69 = "แต่มีแค่แรงมือนี่แหละที่แทบจะไม่มีเลย เพราะงั้นเวลาอยู่ต่อหน้าเด็กๆ คนอื่น ฉันจะไม่ค่อยกินเครื่องดื่มที่ต้องเปิดฝาหรอก"
1601805-70 = "น่าอายชะมัดที่มาเผยความอ่อนแอให้คุณครูเห็นแบบนี้..."
1601805-71 = "[s] \"ครูจะคอยเปิดฝาให้ทุกวันเอง\""
1601805-72 = "พะ... พูดบ้าบออะไรเนี่ย!!"
1601805-73 = "ช่างเถอะ! ถ้ามีข่าวลือว่าฉันเปิดขวดน้ำไม่ได้ละก็... ฉันจะมาจัดการครูแน่!"
1601805-74 = "เอาน้ำผลไม้ของฉันคืนมาเลย!!"
1601805-75 = "[s] \"อ๊ะ...\""
1601805-80 = "(ราบุคว้าขวดน้ำผลไม้กลับไปแล้วก็ออกวิ่งหนีไป)"
1601805-81 = "(แต่ขวดที่ราบุแย่งกลับไปคือขวดน้ำผลไม้ที่คุณครูเปิดดื่มไปแล้ว...)"

[translation]
1601805-1 = "隊長的強大"
1601805-2 = "[ns]「哈啊……哈啊……」"
1601805-3 = "……"
1601805-4 = "[s]「哈啊……哈啊……哈啊……」"
1601805-8 = "[ns]「嘶……呼……嘶……呼……」"
1601805-10 = "[ns]「嘶……呼……」"
1601805-11 = "你是要喘到什麼時候……"
1601805-12 = "老師到底跑了多遠啊？"
1601805-13 = "[s]「我從夏萊一路跑過來的。」"
1601805-14 = "一般人應該會搭交通工具，就算很急也會叫計程車吧……唉。"
1601805-15 = "只因為我提到黑市就直接跑了過來，你是笨蛋嗎……"
1601805-16 = "這樣會害我覺得必須讓你看見厲害的東西耶……"
1601805-17 = "其實沒什麼大不了的說……抱歉讓你白跑一趟。"
1601805-18 = "來，你看這個。"
1601805-19 = "[s1]「販賣機？」\n[s2]「你買了販賣機嗎？好厲害！」"
1601805-20 = "嗯，販賣機。"
1601805-21 = "不是，怎麼可能啦！"
1601805-22 = "這不是普通的販賣機！沒發現價格超便宜的嗎？"
1601805-23 = "仔細看，一瓶只要20圓哦。"
1601805-24 = "以後老師路過這附近的時候，如果口渴就來這裡買吧？#n價格超划算的。"
1601805-28 = "就，就只是這樣而已。"
1601805-29 = "[s3]「是良舞提供的黑市極秘情報……」\n[s4]「我得好好記下來才行……」"
1601805-32 = "少在那裡大驚小怪啦！"
1601805-33 = "不過來都來了，我請你喝一瓶吧。"
1601805-34 = "最近工作還算順利，這個價格我請得起！"
1601805-35 = "[s]「良舞給的果汁……我看放進博物館展示吧……」"
1601805-36 = "閉嘴閉嘴！！"
1601805-41 = "來。"
1601805-42 = "[s5]「是良舞的果汁！我要開動囉！！」\n[s6]「美味滲透到骨子裡了……！！」"
1601805-45 = "你跑了這麼遠，就連白開水都會覺得好喝吧。"
1601805-46 = "……唔。"
1601805-47 = "唔呃，怎麼會……唔唔唔！"
1601805-48 = "[s7]「會痛嗎？」\n[s8]「發燒了嗎？」\n[s9]「還是肚子餓了！？」"
1601805-52 = "老師，你有被人家說過你有點過度保護嗎？"
1601805-53 = "這瓶果汁蓋得太緊了，我打不開……"
1601805-54 = "唔咕咕咕……！！"
1601805-55 = "啊啊！氣死我了！真想用槍把它打開！！"
1601805-56 = "[s]「給我吧。」"
1601805-57 = "那個瓶蓋超緊的，用手硬開小心會受傷哦。"
1601805-58 = "要是不行的話，我等等再戴橡膠手套……"
1601805-63 = "[ns]「給你。」"
1601805-64 = "……"
1601805-65 = "不准取笑我！！！"
1601805-66 = "[s]「我什麼都還沒說耶……」"
1601805-67 = "唉……"
1601805-68 = "我啊，對自己的體力其實還挺有自信的。"
1601805-69 = "唯獨就是握力完全不行，所以平常在孩子們面前都不太喝瓶裝飲料。"
1601805-70 = "沒想到居然會在老師面前暴露這種弱點，真是丟臉丟到家了……"
1601805-71 = "[s]「以後我都幫你開瓶蓋吧。」"
1601805-72 = "你，你到底在說什麼啊！！"
1601805-73 = "總之！要是敢把我打不開瓶蓋的事情說出去……你就死定了知道嗎！"
1601805-74 = "把我的果汁還來！！"
1601805-75 = "[s]「啊……」"
1601805-80 = "（於是良舞就搶走果汁瓶跑走了）"
1601805-81 = "（明明我才喝到一半的說……）"

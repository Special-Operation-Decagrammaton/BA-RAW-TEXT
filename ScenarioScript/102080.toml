[translation]
102080-1 = "ตอนที่ 8;ปฏิบัติการป้องกันเขตปกครองตนเอง - เรดวินเทอร์"
102080-4 = "คราวนี้เป็นตาของพวกเราสินะคะ รบกวนด้วยนะคะทุกคน"
102080-11 = "ดีละ! จู่โจม! ออกจู่โจมได้!!"
102080-18 = "เหล่าสหาย! ไปกันเลย! เพื่อสิทธิของผู้รับจ้าง!"
102080-20 = "เพื่อพุดดิ้ง!"
102080-25 = "...... จะว่าไป ท่านประธานเชริโน่ออกไปข้างนอกเพราะบอกไว้ว่ามีงานที่ต้องไปจัดการต่างหาก แต่ฉันอดเป็นห่วงไม่ได้เลยละค่ะ"
102080-26 = "หรือว่าจะไปที่หลบภัยก่อนใครหรือเปล่าคะ......"
102080-28 = "เอาละๆ เราจะใช้อาคารเรียนเก่านี่เป็นที่หลบภัยนะคะ! "
102080-29 = "หืม? ไม่เห็นเหมือนที่ได้ยินมาเลยค่ะ ที่นี่เป็นที่รกร้างไม่ใช่เหรอ? ไหนว่าเป็นออนเซ็นล่ะคะ?"
102080-30 = "เอ่อ... คือว่า... พอดีมีเรื่องอะไรนิดหน่อย... หรือจะบอกว่าปิดกิจการไปแล้วดีนะ..."
102080-31 = "ว่าไงนะคะ? เป็นอย่างนั้นหรอกเหรอคะ? ฉันอุตส่าห์ตั้งตารอ!"
102080-32 = "โมมิจิ บางทีถ้าถูกขังอยู่ในที่แบบนี้ ก็อาจจะมีไอเดียดีๆ เยอะก็ได้นะ"
102080-33 = "เรามาอยู่ที่นี่เงียบๆ แล้วก็เตรียมวารสาร <คอมิเซ็น> ฉบับต่อไปกันดีกว่า ฮุฮุฮุ"
102080-34 = "หมายถึงอาหารกระป๋องสินะคะ! เข้าใจแล้วค่ะ!"
102080-39 = "โนโดกะจัง เห็นท่านประธานเชริโน่บ้างไหม?"
102080-40 = "หืม? ไม่นะ ไม่ได้มาที่นี่น่ะ"
102080-41 = "ถ้าเจอตัว ฉันก็ว่าจะคุยเรื่องห้องเรียนพิเศษด้วยสักหน่อย..."
102080-42 = "งั้นเหรอ?"
102080-43 = "งั้นไปอยู่ที่ไหนกันนะ...?"

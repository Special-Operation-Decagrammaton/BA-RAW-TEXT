[translation]
102080-1 = "第8話;「赤冬」自治區防衛"
102080-4 = "這次輪到我們了，是嗎。#n各位，拜託你們了。"
102080-11 = "很好……突擊！#n開始突擊！！"
102080-18 = "同志們，我們上吧！為了勞動者的權利！"
102080-20 = "為了布丁！"
102080-25 = "……潔莉諾會長說「有事要處理」就離開了，令人有點擔心呢。"
102080-26 = "是先到避難所去了嗎……"
102080-28 = "來，大家！避難所就在這個舊校舍哦！"
102080-29 = "咦……這裡，是廢墟吧？#n溫泉究竟在哪裡……？"
102080-30 = "因，因為某些原因……#n溫泉已經……該說是歇業了嗎，那個……"
102080-31 = "咦咦，是嗎？我很期待的說……！"
102080-32 = "但是但是，說不定待在密室裡能夠浮現很多新刊的點子唷？"
102080-33 = "可以靜靜待在這裡，構思下次「漫博」的新刊唷。呵呵。"
102080-34 = "原來如此……這就是所謂的閉關創作對吧！我明白了！"
102080-39 = "和香，你有看見潔莉諾會長嗎？"
102080-40 = "沒有，我想他應該沒有來這裡。"
102080-41 = "我也想和他談談關於特別班待遇的事情……"
102080-42 = "這樣啊……"
102080-43 = "究竟跑哪去了呢……？"

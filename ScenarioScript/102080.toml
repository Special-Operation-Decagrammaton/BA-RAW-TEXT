[translation]
102080-1 = "Episode 8; District Defense Operation - Red Winter"
102080-4 = "It's our turn now. Do your duty, each and every one of you!"
102080-11 = "Excellent! Charge! Charge forward!"
102080-18 = "Comrades! We fight for workers' rights! Move!"
102080-20 = "For pudding!"
102080-25 = "...President Cherino left saying she had something to take care of. I'm worried about her."
102080-26 = "Perhaps she went to the shelter first? "
102080-28 = "There's a shelter here at the Former Institute!"
102080-29 = "Huh? These are all ruins. What about all the hot springs I heard about?"
102080-30 = "S-So... The hot springs are closed due to certain circumstances..."
102080-31 = "Huh? Really? I was really looking forward to taking a dip!"
102080-32 = "But Momiji, who knows? Maybe we'll come up with a bunch of good ideas while locked up in a place like this."
102080-33 = "We can quietly sit here preparing the bulletin for the next Komisen. Heeheehee."
102080-34 = "Indeed...this is like being locked up and forced to finish work before a deadline!"
102080-39 = "Nodoka, have you seen President Cherino?"
102080-40 = "Huh? No, she didn't come here."
102080-41 = "I'm gonna complain about the treatment of the Spec Ops next time I see her..."
102080-42 = "Is that so?"
102080-43 = "Where could she have gone...?"

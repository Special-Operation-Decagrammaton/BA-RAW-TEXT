[translation]
10010005-1 = "序幕;經典復活大作戰！"
10010005-12 = "啊，老師！很抱歉突然請您過來……"
10010005-13 = "非常感謝您願意前來，我感到安心多了……！"
10010005-14 = "[s1]「這沒什麼，別在意。」\n[s2]「話說發生了什麼事嗎？」"
10010005-15 = "其實……"
10010005-16 = "其實……"
10010005-17 = "首先想請您看看這個。"
10010005-23 = "[ns3]「木箱……？」\n[ns4]「哦？裡面好像裝著古書？就像古代遺物一樣……？」"
10010005-24 = "是的，正如您所說。#n這是前些日子在三一挖掘地區發現的「經典」。"
10010005-25 = "是的，正如您所說。#n這是前些日子在三一挖掘地區發現的「經典」。"
10010005-26 = "在歷史的意義上，這似乎也是相當重要的經典。#n由於這部經典的發現，在「[ruby=Quinisext]新五六公[/ruby]會議」中宣佈的內容或許會出現不同的解釋。"
10010005-27 = "也許會改變今後修女們在經典學習方面的內容……這種程度的重大發現。"
10010005-28 = "[s]「那個……總之是值得高興的事情對吧？」"
10010005-29 = "是，是的！#n不好意思，我的說明不夠清楚……"
10010005-30 = "不只是修女會，對於整個三一綜合學園來說都是個天大的好消息……#n這麼說也不為過。"
10010005-31 = "自從發現這部經典以來，整所學園便沈浸在慶典般的氣氛之中。"
10010005-32 = "也預計將舉行慶祝此一發現的典禮。#n櫻子大人將在活動中，朗讀這部經典的前半部分……"
10010005-40 = "老師您是否聽過櫻子大人說古代語呢？#n發音相當悅耳，真的非常優美……！"
10010005-46 = "由於還會招待許多三一的學生，修女會也必須做好萬全的準備。"
10010005-48 = "因為是不可多得的機會，希望老師務必能夠出席。#n所以才會請您過來。"
10010005-49 = "謝謝您在百忙之中抽空前來，老師。"
10010005-50 = "[s]「不客氣，這種場合我很樂意參加。」"
10010005-51 = "呵呵。啊，其實那個典禮已經決定在三一郊外的古教堂舉辦。#n該處能夠容納數百名學生，是個相當大的地方。"
10010005-52 = "畢竟是難得發現的古老經典，所以就在古老教堂的遺蹟……#n也許是這種感覺吧？理由我也不是太清楚……"
10010005-57 = "總之這個典禮還需要進行各種準備，#n而我負責的工作就是保管這部經典，並且把它帶到那座教堂。"
10010005-61 = "……啊。"
10010005-62 = "是因為太久沒打開了嗎，全都是灰塵……"
10010005-63 = "來撢一撢好了……"
10010005-70 = "……？"
10010005-71 = "咦，咦……？"
10010005-72 = "[s5]「非常漂亮地，四分五裂了……」\n[s6]「經典散掉了……」"
10010005-78 = "呀啊啊啊啊啊！？"
10010005-79 = "咦，咦咦！？這，這是，怎麼會！？我，我……！？"
10010005-80 = "[s7]「日向，先冷靜下來！」\n[s8]「得把它修好才行……！」"
10010005-81 = "說，說的也對！？只是散開了而已，還有辦法復原……！"
10010005-82 = "說，說的也對！？只是散開了而已，還有辦法復原……！"
10010005-83 = "嘿咻，嘿咻……！"
10010005-91 = "像這樣，重新捆在一起……！"
10010005-97 = "紙，紙張碎掉了！？怎，怎麼會這樣！？"
10010005-98 = "我只是輕輕碰一下而已，為什麼會變得破破爛爛的……！？"
10010005-99 = "咦，啊，因為很老舊了……？#n確，確實是呢……？但是這樣一來……！"
10010005-100 = "啊啊啊，墨水因為汗而暈開了……！？"
10010005-101 = "總，總之先避免讓書頁繼續散開……！"
10010005-108 = "啊啊，總覺得越撿越碎了……！啊啊，啊啊……！？"
10010005-112 = "唔咦咦咦咦咦咦……！？"
10010005-118 = "……"
10010005-119 = "[ns]「……」"
10010005-120 = "……"
10010005-121 = "那個……"
10010005-122 = "老師……"
10010005-127 = "我，該怎麼辦才好……？"

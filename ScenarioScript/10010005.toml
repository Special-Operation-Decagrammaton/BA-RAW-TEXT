10010005-29 = "1;히나타;02;네? 네! 맞아요. 죄송해요, 제가 설명이 부족했네요.\n#1;em;[?!]\n#1;jump"
10010005-30 = "1;히나타;01;엄청 좋은 소식인 거죠. 시스터후드 뿐만 아니라, 트리니티 학원에도."
10010005-31 = "1;히나타;03;아, 아무튼 이 책이 발견되어서 학원 전체가 마치 축제가 벌어진 것 같은 분위기예요.\n#1;hophop"

[translation]
10010005-1 = "บทเริ่มต้น;ปฏิบัติการขนย้ายพระคัมภีร์!"
10010005-12 = "ขอบคุณที่มาช่วยจริงๆ นะคะคุณครู ฉันเรียกมาอย่างกะทันหันแท้ๆ ..."
10010005-13 = "ฉันรู้สึกสบายใจขึ้นแล้วค่ะ! การที่คุณครูมาหานับเป็นเกียรติอย่างยิ่งสำหรับเรา..."
10010005-14 = "[s1] \"ไม่เป็นไรหรอก ไม่ต้องคิดมากนะ\"\n[s2] \"ไม่เป็นไรนะ ว่าแต่เกิดอะไรขึ้นเหรอ?\""
10010005-15 = "คะ... คือว่าเรื่องนั้น..."
10010005-16 = "คะ... คือว่าเรื่องนั้น..."
10010005-17 = "คุณครูลองดูนี่ก่อนค่ะ"
10010005-23 = "[ns3] \"มีหนังสืออยู่ในหีบไม้เหรอ...?\"\n[ns4] \"หนังสือเก่านี่นา มันคือวัตถุโบราณเหรอ?\""
10010005-24 = "ใช่แล้วค่ะ นี่คือคัมภีร์สำคัญทางประวัติศาสตร์ที่ถูกค้นพบใหม่ในเขตขุดค้นของทรีนิตี้ค่ะ"
10010005-25 = "ใช่แล้วค่ะ นี่คือคัมภีร์สำคัญทางประวัติศาสตร์ที่ถูกค้นพบใหม่ในเขตขุดค้นของทรีนิตี้ค่ะ"
10010005-26 = "ว่ากันว่าคัมภีร์เล่มนี้ทำให้สามารถตีความกฎเกณฑ์ที่ประกาศไว้ในสภาควินิเซ็กใหม่ได้ค่ะ"
10010005-27 = "นี่ถือเป็นการค้นพบที่ยิ่งใหญ่มากเลยค่ะ เพราะพวกซิสเตอร์อาจต้องเปลี่ยนกระบวนการเรียนรู้#nพระคัมภีร์เลยก็ได้..."
10010005-28 = "[s] \"แสดงว่าเป็น... เรื่องดีใช่ไหม?\""
10010005-29 = "คะ? ค่ะ! ใช่แล้วค่ะ ขอโทษนะคะ ฉันคงอธิบายได้ไม่ดีเท่าไรน่ะค่ะ"
10010005-30 = "นี่คือเรื่องที่ดีมากเลยค่ะ ไม่ใช่แค่ชมรมซิสเตอร์เท่านั้น แต่กับสถาบันทรีนิตี้ด้วย"
10010005-31 = "ถือว่าการค้นพบคัมภีร์นี้ทำให้โรงเรียนอยู่ในบรรยากาศของงานเทศกาลเลยละค่ะ"
10010005-32 = "เราจะจัดกิจกรรมสวดมนต์เพื่อเฉลิมฉลองการค้นพบคัมภีร์นี้ และท่านซากุระโกะจะไปอ่าน และตีความหมายเนื้อหาส่วนต้นของคัมภีร์ด้วย..."
10010005-40 = "คุณครูเคยฟังท่านซากุระโกะอ่านภาษาโบราณไหมคะ? มันไพเราะมากเลยละค่ะ ฮิฮิ"
10010005-46 = "เราจะเชิญนักเรียนคนอื่นในทรีนิตี้มาด้วย ฉันกับพวกซิสเตอร์ก็เลยกำลังเตรียมงานอย่างหนัก#nเพื่อให้งานดำเนินไปได้ด้วยดี..."
10010005-48 = "และฉันก็อยากให้คุณครูมาร่วมงานด้วย... ก็เลยเชิญมาแบบนี้น่ะค่ะ"
10010005-49 = "ขอบคุณที่มานะคะคุณครู "
10010005-50 = "[s] \"งานแบบนี้ครูยินดีมาก\""
10010005-51 = "งานสวดมนต์นี้จะจัดขึ้นในวิหารเก่าแก่ที่อยู่ในชานเมืองของทรีนิตี้ค่ะ ที่นั่นจุนักเรียนโรงเรียนทรีนิตี้ได้หลายร้อยคนเลย"
10010005-52 = "พระคัมภีร์เก่าแก่ ก็ย่อมเหมาะกับวิหารโบราณ... พวกเราคิดอย่างนี้น่ะค่ะ "
10010005-57 = "สำหรับฉัน ฉันได้รับหน้าที่สำคัญที่ต้องเก็บพระคัมภีร์ไว้ และนำไปที่วิหารโบราณก่อนเริ่มงานค่ะ"
10010005-61 = "เอ๋...?"
10010005-62 = "ไม่ได้เปิดซะนานจนฝุ่นเกาะเลย..."
10010005-63 = "แต่แป๊บเดียวก็คงเอาออกได้ค่ะ ก็แค่ต้องเขย่าแบบนี้..."
10010005-70 = "...?"
10010005-71 = "อ่า..."
10010005-72 = "[s5] \"เป็นเศษเล็กเศษน้อยหมดแล้ว...\"\n[s6] \"หลุดออกมาเป็นหน้าๆ แล้ว...\""
10010005-78 = "อ๊ายยยยย!?!?"
10010005-79 = "นะ... นะ... นี่มัน... ทำไมถึง...!  เป็นแบบนี้...!!"
10010005-80 = "[s7] \"จะ... ใจเย็นๆ ก่อนฮินาตะ!!\"\n[s8] \"หายใจเข้าลึกๆ ก่อน แล้วค่อย...!\""
10010005-81 = "มะ... ไม่เป็นไรค่ะ! ฉันว่ายัง... มันยังใช้ได้อยู่ค่ะ! ก็แค่หน้ากระดาษหลุดมาเท่านั้นค่ะ!"
10010005-82 = "มะ... ไม่เป็นไรค่ะ! ฉันว่ายัง... มันยังใช้ได้อยู่ค่ะ! ก็แค่หน้ากระดาษหลุดมาเท่านั้นค่ะ!"
10010005-83 = "ถ้าเรา...! ค่อยๆ หยิบมาแล้วติดเข้าไปใหม่...!"
10010005-91 = "แบบนี้..."
10010005-97 = "ขะ... ขาดแล้ว!! ทำยังไงดี!? กระดาษมันขาดแล้วค่ะ!"
10010005-98 = "ทำไมแค่หยิบก็ขาดแล้วล่ะคะ? นี่ไม่ใช่แค่ยับจนอ่านยากด้วย!! แต่มันขาดรุ่ยจนอ่านไม่ได้เลย!"
10010005-99 = "คะ? ว่าไงนะคะ! เพราะมันเป็นหนังสือเก่าแก่มากงั้นเหรอคะ?! มะ... ไม่ใช่หรอกค่ะ! ไม่ใช่แน่ๆ ไม่มีทาง!"
10010005-100 = "เฮือกกก! มือเปื้อนไปหมดแล้ว! มือฉันเหงื่อออกจนน้ำหมึกจากพระคัมภีร์ติดมือมาเลยค่ะ!"
10010005-101 = "ก่อนอื่นฉันต้องเอามารวมกันก่อน... จะให้กระจายกันแบบนี้ไม่ได้...! เอาล่ะ ใช้มือโกยมาแบบนี้...!"
10010005-108 = "งือ ทำไมยิ่งทำยิ่งเหมือนเก็บขยะที่พื้นเลย... แต่ก็เอาเถอะ...!"
10010005-112 = "ฮะ... ฮือ!! ฮือ...!?"
10010005-118 = "..."
10010005-119 = "[ns] \"......\""
10010005-120 = "เอ่อ..."
10010005-121 = "อืม... เอ่อ..."
10010005-122 = "คะ... คุณครูคะ..."
10010005-127 = "ทำยังไงดีคะ? ตอนนี้มัน..."

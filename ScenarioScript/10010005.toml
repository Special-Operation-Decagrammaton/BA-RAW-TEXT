10010005-24 = "1;히나타;02;네. 맞아요. 이번에 트리니티 발굴지구에서 새롭게 발견된……. 아주 중요한 역사적인 경전이에요.\n#1;em;[반응]\n#1;a"
10010005-25 = "1;히나타;02;네. 맞아요. 이번에 트리니티 발굴지구에서 새롭게 발견된……. 아주 중요한 역사적인 경전이에요.\n#1;em;[반응]\n#1;a"
10010005-26 = "1;히나타;01;이 책 때문에 신 퀴니섹스툼 공의회에서 선포된 규범이 새로운 해석이 가능해졌다고 하더라고요."
10010005-27 = "1;히나타;03;이제 시스터들의 경전 학습 과정이 바뀌어야 할지도 모를 정도로…… 엄청난 대발견인 거죠.\n#1;em;[재잘]\n#1;m3"

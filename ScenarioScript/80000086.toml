[translation]
80000086-1 = "Sweet Logistics"
80000086-2 = "（就在協助萌整理RABBIT小隊的補給品時……）"
80000086-6 = "（一陣突如其來的雨讓全身都淋濕了）"
80000086-8 = "兔寶寶公園"
80000086-9 = "唉……氣象預報明明說今天整天都會是晴天的呀？"
80000086-10 = "幸虧有老師幫忙，武器和彈藥才得以倖免……"
80000086-11 = "不過全身都溼答答了呢。而且連件能換的衣服都沒有……"
80000086-12 = "雖然這種災難性的狀況也沒什麼不好，不過還是有點冷呢……"
80000086-13 = "[s]「要不要我去夏萊拿件體育服過來？」"
80000086-14 = "咦咦……如果在這種情況下往返夏萊，老師會感冒的吧。"
80000086-18 = "要不要先升個火，烘乾一下衣服？"
80000086-19 = "太陽也已經出來了，應該不會花太多時間。#n稍等一下。"
80000086-21 = "（萌開始收集柴火升火）"
80000086-23 = "哈啊……好溫暖……"
80000086-24 = "感覺人都活過來了呢……"
80000086-25 = "[ns]「嗯，暖暖的讓人很安心呢。」"
80000086-27 = "咯嘻……咯嘻嘻嘻……"
80000086-28 = "看著燃燒的柴火，讓我想起來了呢……"
80000086-29 = "只有在柴火前才能品嘗到的，甜蜜毀滅……"
80000086-30 = "哈啊，哈啊……怎麼辦，老師……"
80000086-31 = "我果然……"
80000086-32 = "忍不住了！"
80000086-35 = "[ns]「先，先等一下，萌！暫停暫停──」"
80000086-39 = "……嗯？老師不吃嗎？夾心餅乾。"
80000086-40 = "[s]「夾，夾心餅乾……？」"
80000086-41 = "嗯。既然火都升了，做點夾心餅乾應該不錯吧。"
80000086-42 = "棉花糖在烤過之後，Q彈的口感和甜味就會提升，#n變得更好吃唷……！"
80000086-43 = "以前隊裡的大家只要有升火，就常常會烤棉花糖或是做成夾心餅乾吃哦。"
80000086-44 = "不過……像這樣和老師一起吃也挺不賴的。"
80000086-45 = "[s]「原來只是想做點心來吃啊……」"
80000086-47 = "[ns]「不過，這個夾心餅有那麼具有毀滅性嗎？」"
80000086-48 = "咯嘻嘻……看不出來嗎？"
80000086-49 = "在烤過的餅乾上，放上烤過的棉花糖……再在裡面加入甜～甜的巧克力……"
80000086-50 = "雖然一口咬下簡直好吃得令人融化，不過它的熱量……"
80000086-51 = "[s]「……原來是這個意思啊……」"
80000086-52 = "嗯，所以對減肥中的人來說，是絕對不能碰的甜點。"
80000086-53 = "不過，只在這種毀滅中才能獲得的快樂也是存在的。#n所以──"
80000086-54 = "怎麼樣，老師？#n這種「毀滅」……要不要和我一起品嘗呀？"
80000086-56 = "（之後和萌一起圍著柴火，快樂地吃著夾心餅乾……）"
80000086-57 = "（雖然甜的非常適合用「毀滅」來形容，不過非常好吃）"

80000086-47 = "[ns] \"이 스모어의 어디가 파멸적인거야?\""
80000086-48 = "1;모에;04;선생님은 보고도 모르는 거야? 이 스모어가 품고 있는 폭력적인 위력을?\n#1;em;[?]"
80000086-49 = "1;모에;15;스모어는 크래커 위에 달콤한 마시멜로를 얹은 뒤, 그 위에 달달한 초콜릿을 하나 더 얹어서 만드는 엄청나게 달콤한 디저트."
80000086-50 = "1;모에;16;당연히 맛은 끝내주지만, 칼로리만큼은……"
80000086-51 = "[s] \"그야말로 파멸적인 수준이겠네……\""
80000086-52 = "1;모에;05;맞아. 다이어트를 꿈꾸고 있는 사람이라면 절대 입에 대서는 안 되는 파멸의 디저트지."
80000086-53 = "1;모에;13;하지만 이 파멸을 감내해야만 얻을 수 있는 쾌락 또한 존재하는 법이니까……"

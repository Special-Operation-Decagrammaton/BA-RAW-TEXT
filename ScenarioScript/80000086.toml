[translation]
80000086-1 = "Sweet Logistics"
80000086-2 = "While helping Moe organize the RABBIT Squad's supplies..."
80000086-6 = "We were caught in a sudden rainstorm and got drenched."
80000086-8 = "Kousagi Park"
80000086-9 = "*sigh* ...The weather forecast said it would be sunny all day long. Why did it have to rain?"
80000086-10 = "At least we managed to protect all the important electronics and ammo, thanks to your help, but..."
80000086-11 = "Now I'm soaked, and I don't even have spare clothes to change into."
80000086-12 = "I guess it could be worse, but I'm so chilly... I feel like I'm gonna catch a cold."
80000086-13 = "[s] \"Should we go get you a spare gym uniform from Schale?\""
80000086-14 = "If we walk all the way to Schale in our wet clothes, you'll get sick too, Sensei."
80000086-18 = "I'll start a fire. Let's dry off first."
80000086-19 = "The sun is starting to shine again already, so I'm sure our clothes will dry in no time. Just wait a minute."
80000086-21 = "Moe managed to find some firewood that stayed dry and started a fire."
80000086-23 = "Ah, so warm..."
80000086-24 = "Everything seems much better now that I'm warming up."
80000086-25 = "[ns] \"Yeah! It's nice and cozy now.\""
80000086-27 = "Heehee... Heeheehee."
80000086-28 = "Looking into the dancing flames of the fire makes me think of...that."
80000086-29 = "The sweet doom that you can only taste by firelight..."
80000086-30 = "Ah, it's been so long since I've thought about it, but this flame has brought it back."
80000086-31 = "*pant* *pant* Sensei, what do I do? I can't..."
80000086-32 = "I can't hold back any longer!"
80000086-35 = "[ns] \"Wait… Hold on, Moe! Stop whatever you're doing!\""
80000086-39 = "Hmm? So you don't want any s'mores, Sensei?"
80000086-40 = "[s] \"S'mores…?\""
80000086-41 = "Yeah. Doesn't sitting by a fire always make you want to roast marshmallows?"
80000086-42 = "They're good enough on their own, but when you roast them over a fire, it enhances the sweet flavor and chewy texture and they become irresistible!"
80000086-43 = "Whenever my squad members used to make campfires at SRT, we'd always roast marshmallows and make s'mores."
80000086-44 = "But, heehee... Roasting marshmallows by the fire with you is pretty nice too, Sensei."
80000086-45 = "[s] \"It's no problem if you're just roasting marshmallows...\""
80000086-47 = "[ns] \"But what about the doom you were talking about?\""
80000086-48 = "Do you not see, Sensei? Can't you understand the destruction inherent in s'mores?"
80000086-49 = "A sweet marshmallow is placed on top of a sweet graham cracker, and then a sweet chocolate."
80000086-50 = "Of course, it tastes delicious, but the calories..."
80000086-51 = "[s] \"I get it. It must be a lot...\""
80000086-52 = "That's right. It's a dessert of doom for anyone who's trying to diet."
80000086-53 = "But there are some joys in this existence that can only be experienced if you're willing to endure the troubles that come with them."
80000086-54 = "So, what do you think, Sensei? Do you want a taste of doom?"
80000086-56 = "Moe and I shared s'mores around the fire."
80000086-57 = "They were delicious, but now I'll always associate them with the word \"doom\"..."

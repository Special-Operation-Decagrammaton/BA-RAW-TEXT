80000086-40 = "[s] \"스모어……?\""
80000086-41 = "1;모에;12;응. 기왕 모닥불을 피웠으니 마시멜로 하나 정도는 구워도 괜찮을 것 같아서.\n#1;m3\n#1;em;[음표]"
80000086-42 = "1;모에;13;마시멜로는 그냥 먹어도 충분히 달콤하고 맛있지만, 불에 구우면 단맛과 쫀득한 식감이 배가되어서 엄청나게 맛있어지거든……!"
80000086-43 = "1;모에;02;예전부터 캠핑 중에 모닥불을 피울 일이 있으면 소대원들이랑 함께 마시멜로를 구워서 스모어 쿠키를 만들어 먹곤 했거든."
80000086-44 = "1;모에;17;후후…… 이렇게 선생님과 함께 모닥불을 쬐며 마시멜로를 굽는 것도 운치가 있네."

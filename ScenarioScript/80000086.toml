[translation]
80000086-1 = "Sweet Logistics"
80000086-2 = "(ขณะที่ช่วยโมเอะจัดเก็บเสบียงของกองทหาร RABBIT...)"
80000086-6 = "(จู่ๆ ฝนก็ตกลงมาทำให้เปียกชุ่มไปทั่งตัว...)"
80000086-8 = "โคะอุซางิ การ์เด้น"
80000086-9 = "เฮ้อ... พยากรณ์อากาศบอกว่าอากาศแจ่มใสทั้งวันแท้ๆ แต่ทำไมจู่ๆ ถึงมีฝนตกได้นะ..."
80000086-10 = "โชคดีที่คุณครูมาช่วย เลยเก็บพวกอุปกรณ์ไฟฟ้าสำคัญ หรือพวกกระสุนได้ทัน..."
80000086-11 = "แต่ฉันตัวเปียกชุ่มไปหมด และไม่มีชุดจะเปลี่ยนแล้วด้วย..."
80000086-12 = "สถานการณ์ที่พังยับเยินแบบนี้ก็ไม่เลวเท่าไหร่ แต่คิดว่าถ้าโดนลมแรงๆ แบบนี้จะเป็นหวัดได้แหงๆ..."
80000086-13 = "[s] \"ครูไปเอาชุดพละที่เหลืออยู่ที่ชาเล่ต์มาให้ดีมั้ย?\""
80000086-14 = "คุณครูจะกลับไปชาเล่ต์ทั้งที่ตัวเปียกแบบนั้นน่ะเหรอ? ทำแบบนั้นเดี๋ยวก็เป็นหวัดเอาหรอก"
80000086-18 = "ตอนนี้รีบก่อกองไฟ แล้วมานั่งผิงไฟให้เสื้อแห้งก่อนดีมั้ย?"
80000086-19 = "แดดเริ่มออกแล้ว นั่งสักพักเสื้อก็คงแห้งเองแหละ รอเดี๋ยวนะ"
80000086-21 = "(โมเอะรวบรวมฟืนมาก่อไฟ...)"
80000086-23 = "ฮู่ว... อุ่นดีจัง..."
80000086-24 = "พอเสื้อผ้าแห้งขึ้นแล้วค่อยยังชั่วหน่อย..."
80000086-25 = "[ns] \"นั่นสิ อุ่นๆ แบบนี้รู้สึกดีจัง...\""
80000086-27 = "ฮิฮิ... ฮิฮิฮิ..."
80000086-28 = "พอเห็นกองไฟที่ลุกโชนแบบนี้ จู่ๆ ก็นึกถึง 'ไอ้นั่น' ขึ้นมาเลย..."
80000086-29 = "ความพังพินาศแสนหวานที่ลิ้มรสได้แค่ตอนที่อยู่หน้ากองไฟ..."
80000086-30 = "ฉันลืมมันไปนานแล้ว แต่พอเห็นกองไฟแบบนี้ จู่ๆ ก็นึกขึ้นมาได้..."
80000086-31 = "แฮ่กๆ...แฮ่กๆ... ทำไงดีล่ะคุณครู...? ฉัน..."
80000086-32 = "ทนไม่ไหวแล้ว!!"
80000086-35 = "[ns] \"เดี๋ยวก่อนโมเอะ! ถึงไม่รู้ว่าอะไรแต่ก็...หยุดนะ!\""
80000086-39 = "...หืม? คุณครูไม่กินเหรอ? สมอร์น่ะ?"
80000086-40 = "[s] \"สมอร์...?\""
80000086-41 = "อื้อ ไหนๆ เราก็จุดกองไฟกันแล้ว คิดว่าเอามาร์ชเมลโล่มาปิ้งน่าจะไม่เป็นไร"
80000086-42 = "มาร์ชเมลโล่น่ะกินเฉยๆ ก็อร่อยดีอยู่หรอก แต่ถ้าเอามาปิ้งละก็ รสหวานกับความนุ่มเหนียวหนึบ#nจะเพิ่มขึ้น อร่อยขึ้นเยอะเลยละ...!"
80000086-43 = "เมื่อก่อนเวลาก่อกองไฟในแคมป์ ก็มักจะเอามาร์ชเมลโล่มาปิ้งแล้วเอาไปทำเป็นสมอร์กินกับ#nสมาชิกคนอื่นๆ บ่อยๆ"
80000086-44 = "ฮุฮุ... ได้มาปิ้งมาร์ชเมลโล่กับคุณครูแบบนี้ บรรยากาศดีไปอีกแบบนะ..."
80000086-45 = "[s] \"ถ้าแค่ปิ้งมาร์ชเมลโล่ละก็ไม่เป็นไรหรอก...\""
80000086-47 = "[ns] \"ว่าแต่ว่าสมอร์มันเกี่ยวอะไรกับความพังพินาศ?\""
80000086-48 = "คุณครูดูไม่ออกเหรอ? ว่าสมอร์น่ะมีพลังทำลายล้างที่รุนแรงแค่ไหน?"
80000086-49 = "สมอร์คือขนมที่เอามาร์ชเมลโล่หวานๆ ไปวางไว้บนแผ่นแคร็กเกอร์ จากนั้นก็เอาช็อกโกแลตหวานๆ มาวางไว้ด้านบนอีกที เพราะงั้นเลยเป็นขนมที่หว้าน~ หวานไงล่ะ"
80000086-50 = "แต่แคลลอรีก็สูงตามความหวานอร่อยเลยนะ..."
80000086-51 = "[s] \"ถ้างั้นก็เข้าขั้นขนมแห่งความพินาศสินะ...\""
80000086-52 = "ใช่แล้ว ถ้าเป็นคนที่ตั้งใจจะไดเอตละก็ ถือเป็นขนมหวานแห่งความพังพินาศที่ห้ามลิ้มรสเด็ดขาด"
80000086-53 = "แต่ว่า... มันก็มีรสชาติแห่งความสนุกที่จะรู้สึกได้จากการอดทนต่อความเย้ายวนนั้นอยู่ด้วย..."
80000086-54 = "เป็นไงคุณครู? อยากลองชิมรสชาติแห่งความพังพินาศนี้กับฉันมั้ย...?"
80000086-56 = "(หลังจากนั้นคุณครูกับโมเอะก็กินขนมสมอร์ด้วยกันหน้ากองไฟ...)"
80000086-57 = "(สมอร์ที่โมเอะทำให้ อร่อยมาก และเมื่อนึกถึง 'ความพินาศ' ที่โมเอะพูดก็ยิ่งรู้สึกอร่อยมากขึ้น...)"

[translation]
2002115-1 = "重要的事，重要的東西"
2002115-2 = "雖然我說有重要的事……"
2002115-3 = "但對我來說很重要，對老師來說可能也沒那麼重要……"
2002115-4 = "我是不是做了不該做的事呢？"
2002115-5 = "[s1]「怎麼會呢！如果是對學生很重要的事……」\n[s2]「對老師來說當然也很重要呀！」"
2002115-8 = "真，真的嗎……！？"
2002115-9 = "耶嘿嘿。謝謝你，老師！"
2002115-10 = "你問重要的事是什麼？#n那就是……"
2002115-14 = "要裝滿這個禮物袋！"
2002115-15 = "因為禮物已經快被分完了，幾乎沒剩多少……"
2002115-16 = "可是一想到某天或許會有其他需要禮物的人……"
2002115-17 = "我就覺得不能繼續這樣下去！"
2002115-18 = "當然，我也很高興能盡情分送禮物並幫助大家！"
2002115-19 = "[s3]（既然送出了那麼多禮物……）\n[s4]（應該已經夠了才對……）"
2002115-25 = "那麼，老師！現在一起去重新裝滿禮物袋吧！"
2002115-32 = "啊，老師！這裡剛好有不錯的東西！你看你看！"
2002115-33 = "[s]「這是……室內運動器材？」"
2002115-34 = "沒錯！畢竟健康是最重要的對吧？#n所以對健康有幫助的運動器材，也能成為很棒的禮物！"
2002115-38 = "這裡有啞鈴和壺鈴……啊，還有對皮膚很好的膠原蛋白膠囊跟綜合維他命。"
2002115-39 = "不好意思！可以麻煩幫我把從這邊到那邊的東西都包起來嗎？"
2002115-44 = "老師老師！這裡也有不錯的東西！請看！"
2002115-45 = "[s]「這不是……按摩機嗎？」"
2002115-46 = "是啊！不只對消除疲勞有幫助，也能促進血液循環。"
2002115-47 = "仔細一看，還有指壓按摩器和睡眠輔助劑！"
2002115-48 = "特別是添加褪黑素的睡眠輔助劑……上面寫說在睡前兩小時服用就能發揮最佳效果！"
2002115-49 = "[s]「總覺得……好像……有點不安！？」"
2002115-53 = "咦？怎麼了嗎，老師？"
2002115-57 = "[ns]「有需要來這種地方嗎！？」"
2002115-58 = "為什麼這麼說呢，老師。#n無論何時何地都可能有人需要禮物呀？"
2002115-59 = "所以換句話說，挑選買禮物的地方也不需要考慮時間和地點！"
2002115-63 = "我看看……這個攤販裡有……啊，有了！#n是艾灸、拔罐器、腳底貼和指壓拖鞋。"
2002115-64 = "還有能透過微電流保護關節的手肘護帶、充氣式頸椎牽引器、遠紅外線熱敷機！"
2002115-65 = "真不枉費我們找遍了所有可能的地方啊！老師！"
2002115-66 = "[s]「是嗎？真的是那樣嗎！？！？」"
2002115-69 = "[ns]「這裡肯定不行吧！」"
2002115-70 = "怎麼這麼說呢，老師！#n就像聖誕老人會走遍所有地方，仔細觀察每個角落，不讓任何人被冷落一樣……"
2002115-71 = "我們也要效仿聖誕老人，盡量嘗試所有可能！"
2002115-75 = "我看看……這裡能當禮物的東西……"
2002115-79 = "啊！有耶！是陰陽湯製造機、能吸收電磁波的人工仙人掌、解毒果汁……"
2002115-80 = "還有電鋸！"
2002115-81 = "[s]「為什麼會有電鋸！？」"
2002115-82 = "咦？有電鋸不是理所當然的嗎？"
2002115-88 = "喂喂喂。"
2002115-97 = "聽說最近到處都有人在大量購買健康用品……"
2002115-98 = "原來就是你們啊。#n妨礙別人做生意，會讓人很傷腦筋的吧！"
2002115-100 = "什麼？我們只是用原價購買對別人有幫助的物品而已耶？"
2002115-102 = "真是難以溝通！這就是問題所在啊！"
2002115-103 = "因為你們都用定價買東西，我們想低買高賣的計畫全都泡湯了！"
2002115-104 = "[s]「本來就不該做那種事吧！？」"
2002115-105 = "而且還不僅如此，現在居然還一副正經地在訓話……"
2002115-112 = "有夠不爽！"
2002115-114 = "我要讓你明白那種訓話根本就毫無用處！"
2002115-121 = "不只妨礙聖誕老人想分享健康與幸福給大家的好意……"
2002115-128 = "竟然還想擅作主張地濫用！真是不應該！好惡劣！"
2002115-129 = "聖誕老人不會送禮物給壞孩子哦！"
2002115-134 = "什麼？你還相信聖誕老人嗎？這──"
2002115-135 = "等，等一下。這傢伙看起來是不是有點危險……？"
2002115-137 = "但是不必擔心！我會代替聖誕老人讓各位變成好孩子！"
2002115-147 = "（花繪……讓太妹們「變乖了」，連在一旁觀看的人都嚇了一跳）"
2002115-150 = "（不僅如此，他還送了每個人禮物……）"
2002115-155 = "老師！請看！我們總算又讓禮物袋復活了！"
2002115-160 = "耶嘿嘿。希望這樣就能讓大家過著幸福與健康的生活！"
2002115-164 = "[ns]「啊，嗯，但願如此……」"
2002115-166 = "（花繪開朗燦爛的笑容相當耀眼……）"
2002115-167 = "（其開朗潔淨的笑容，甚至連一旁的人都受到了淨化）"

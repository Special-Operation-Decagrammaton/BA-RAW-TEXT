2002115-34 = "3;하나에 산타ND;07;네! 뭐니 뭐니 해도 건강이 최고잖아요? 그러니까 건강에 도움이 되는 운동 기구도, 훌륭한 선물이 될 수 있죠!\n#3;em;[반짝]"

[translation]
2002115-1 = "Important Things, Important Stuff"
2002115-2 = "I know I said something important came up..."
2002115-3 = "But it hit me that just because it's important to me, doesn't mean it's the same for you."
2002115-4 = "Maybe I overreacted..."
2002115-5 = "[s1] \"No way! Whatever's important to my students...\"\n[s2] \"...is important to me as well.\""
2002115-8 = "R-Really?"
2002115-9 = "Ehehe. Thank you, Sensei!"
2002115-10 = "As for that important task..."
2002115-14 = "We need to fill up this gift bag!"
2002115-15 = "I've given away almost all of my gifts, so I have very few left."
2002115-16 = "But you never know when someone might pop up needing a gift so..."
2002115-17 = "I can't just sit around!"
2002115-18 = "Besides, I like giving away gifts! It makes everyone happy!"
2002115-19 = "[s3] \"(If you've given away that many gifts...)\"\n[s4] \"(I can't imagine needing to give out more, but...)\""
2002115-25 = "All right, Sensei! Let's go fill up this gift bag!"
2002115-32 = "Oh, Sensei, look! There's a great gift right there!"
2002115-33 = "[s] \"...Indoor exercise equipment?\""
2002115-34 = "Yes! Health is everything, so exercise equipment that helps you stay fit is an excellent gift!"
2002115-38 = "Dumbbells, kettlebells... Ooo, there's even collagen capsules for skin! Multivitamins? Please and thank you! "
2002115-39 = "Excuse me! I'd like one of everything, from here to here?"
2002115-44 = "Oh! Sensei, Sensei! There's good stuff over here too!"
2002115-45 = "[s] \"Isn't that a back massager?\""
2002115-46 = "Yep, they say it cures fatigue and improves circulation."
2002115-47 = "Oh yeah, let's nab an acupressure machine and some sleep aids too!"
2002115-48 = "Take this melatonin-infused supplement two hours before bed, and you'll be out like a light!"
2002115-49 = "[s] \"I...have...a...VERY...bad feeling about this.\""
2002115-53 = "Hm? What's the matter, Sensei?"
2002115-57 = "[ns] \"Did we have to come somewhere like here?!\""
2002115-58 = "What are you saying, Sensei? You never know who will need a gift, where, or when."
2002115-59 = "In the same vein, that means you can buy gifts anywhere, anytime!"
2002115-63 = "Let's see... Oh, here we go! We've got stuff for moxibustion, cupping, foot patches and even acupressure slippers."
2002115-64 = "An elbow brace with microcurrents to protect your joints! An inflatable neck retractor to rest your head! And don't forget that far-infrared germanium heating compress!"
2002115-65 = "Look at this haul, Sensei! Doesn't this prove it's smart to hit up every place we can?"
2002115-66 = "[s] \"Does it?!\""
2002115-69 = "[ns] \"I really don't think we should look for gifts here!\""
2002115-70 = "What are you talking about, Sensei? Just like how Santa must travel the whole world, we must peek behind every corner for gifts and people to receive them!"
2002115-71 = "We've got to do everything we can! We can't let Santa Claus down!"
2002115-75 = "Gather round! Here's a gift for you..."
2002115-79 = "Oh man! A yin-yang bath maker, an electromagnetic wave absorbing artificial cactus, a detox juice bottle..."
2002115-80 = "And there's even a chainsaw!"
2002115-81 = "[s] \"A chainsaw?!\""
2002115-82 = "Yes! It's a valuable medical tool!"
2002115-88 = "Hey, hey, hey."
2002115-97 = "I've been hearing rumors about somebody buying up health supplies en masse."
2002115-98 = "And here they are. Didn't somebody teach you not to mess with other people's bottom line?"
2002115-100 = "Excuse me? We're just buying stuff to give to people later. We've even paid full price. What's wrong with that?"
2002115-102 = "That's the entire problem, you idiot!"
2002115-103 = "You're buying everything at market price! Our operation's about buying cheap and selling high! You're ruining everything!"
2002115-104 = "[s] \"You shouldn't be doing that in the first place!\""
2002115-105 = "Oh great, they're a pair of goody-two-shoes, too!"
2002115-112 = "Now I feel guilty AND mad!"
2002115-114 = "Get over here! It's about time you learned that no good deed goes unpunished!"
2002115-121 = "Not only do you try to stop Santa's dream to bring healthy gifts to the masses..."
2002115-128 = "You tried to exploit people! That's naughty! Straight to the naughty list with you!"
2002115-129 = "Santa Claus is bringing you nothing but coal!"
2002115-134 = "What? You still believe in Santa Claus? That's—"
2002115-135 = "Hold up. Is that a chainsaw?! P-Put that down!"
2002115-137 = "Be not afraid! On behalf of Santa Claus, I'll show you the light!"
2002115-147 = "And so, Hanae...helped the naughty bullies back onto the straight and narrow."
2002115-150 = "She even gave them some much-needed medici— gifts from her goody bag."
2002115-155 = "There. Our gift bag is finally full again, Sensei!"
2002115-160 = "With it, I hope we can keep bringing health and happiness to everyone! Ahem. Ahem."
2002115-164 = "[ns] \"Yeah... That would be great...\""
2002115-166 = "A cherubic smile crossed Hanae's face."
2002115-167 = "It was bright and true, that it purified everyone who looked up on it."

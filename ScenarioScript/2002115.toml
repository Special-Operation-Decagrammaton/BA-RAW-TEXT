[translation]
2002115-1 = "งานสำคัญ & ของสำคัญ"
2002115-2 = "ฉันบอกคุณครูไปว่าเกิดเรื่องสำคัญขึ้นก็จริง..."
2002115-3 = "แต่อีกใจก็คิดว่ามันอาจจะสำคัญกับฉันคนเดียว แต่ไม่สำคัญสำหรับคุณครูก็ได้ค่ะ"
2002115-4 = "นี่ฉันกำลังทำเรื่องที่ไม่ควรอยู่รึเปล่าคะ?"
2002115-5 = "[s1] \"ไม่หรอก! ถ้าเป็นเรื่องสำคัญของนักเรียนน่ะ...\"\n[s2] \"มันก็ต้องเป็นเรื่องสำคัญของครูอยู่แล้ว!\""
2002115-8 = "จะ... จริงเหรอคะ?"
2002115-9 = "แหะๆๆ ขอบคุณค่ะ คุณครู!"
2002115-10 = "อยากรู้ว่ามันคือเรื่องสำคัญอะไรเหรอคะ? เรื่องที่ว่าก็คือ..."
2002115-14 = "น่าจะต้องซื้อของขวัญมาเพิ่มน่ะค่ะ!"
2002115-15 = "ฉันแจกของขวัญไปเกือบหมดแล้ว ตอนนี้แทบจะไม่มีเหลือแล้วน่ะค่ะ"
2002115-16 = "แต่ฉันคิดว่าอาจจะมีคนที่ต้องการของขวัญอยู่ที่ไหนอีกก็ได้..."
2002115-17 = "ก็เลยไม่อยากปล่อยไว้แบบนี้ค่ะ!"
2002115-18 = "ฉันมีความสุขที่ได้แจกของขวัญและดีใจที่ได้ช่วยเหลือทุกคนค่ะ!"
2002115-19 = "[s3] (แต่ถ้าแจกไปขนาดนั้นแล้ว...)\n[s4] (มันก็น่าจะเพียงพอแล้วนะ...)"
2002115-25 = "ถ้างั้น... คุณครูคะ! เราออกไปหาของขวัญมาเพิ่มกันดีกว่าค่ะ!"
2002115-32 = "อ๊ะ คุณครู! ตรงนี้มีของดีๆ อยู่พอดีเลยค่ะ! มาดูสิคะ!"
2002115-33 = "[s] \"นี่มัน... อุปกรณ์กีฬาในร่ม?\""
2002115-34 = "ใช่ค่ะ! สุขภาพเป็นสิ่งสำคัญที่สุดนี่คะ เพราะงั้นอุปกรณ์กีฬาที่ดีต่อสุขภาพจึงเป็นของขวัญที่ยอดเยี่ยม#nเลยค่ะ!"
2002115-38 = "มีทั้งดัมเบล ทั้งเคตเทิลเบลล์เลย... อ๊ะ มีแคปซูลคอลลาเจนที่ดีต่อผิวด้วยค่ะ วิตามินรวมก็มีด้วย "
2002115-39 = "ขอโทษนะคะ! ขอซื้อของที่อยู่ตรงนี้ทั้งหมดได้มั้ยคะ?"
2002115-44 = "คุณครู คุณครู! ตรงนี้ก็มีของดีๆ ด้วยค่ะ! มาดูสิคะ!"
2002115-45 = "[s] \"นี่มัน... เครื่องนวดไม่ใช่เหรอ?\""
2002115-46 = "ใช่ค่ะ! เครื่องนี้ช่วยคลายความเหนื่อยล้า และช่วยให้เลือดไหลเวียนได้ดีด้วยค่ะ"
2002115-47 = "จะว่าไปก็มีที่กดจุดกับยาช่วยให้นอนหลับด้วยนะคะ!"
2002115-48 = "โดยเฉพาะยาที่มีส่วนประกอบของเมลาโทนินตรงนี้ มีเขียนไว้ด้วยว่าถ้ากินก่อนนอน 2 ชั่วโมงก็จะได้#nผลดีที่สุดเลยค่ะ!"
2002115-49 = "[s] \"รู้สึก... เริ่มหวั่นๆ ใจแล้วแฮะ?!\""
2002115-53 = "คะ? จู่ๆ ก็เป็นอะไรไปเหรอคะคุณครู?"
2002115-57 = "[ns] \"เราต้องมาซื้อถึงที่แบบนี้เลยเหรอ?!\""
2002115-58 = "พูดอะไรแบบนั้นคะคุณครู ของขวัญคือสิ่งที่เราไม่รู้ว่าใครจะได้ไป และไม่รู้ด้วยว่าจะได้ใช้ที่ไหน และก็เมื่อไร"
2002115-59 = "ถ้ามองอีกมุม ก็แปลว่าร้านที่เราหาซื้อของขวัญได้ก็มีอยู่ทุกที่ และซื้อได้ทุกเวลาด้วยค่ะ!"
2002115-63 = "ไหนดูซิ... ตรงชั้นวางของนี้... อ๊ะ มีทั้งกำยาน ชุดครอบแก้ว แผ่นดีท็อกซ์เท้า แล้วก็รองเท้าแตะกดจุด"
2002115-64 = "ผ้ายืดรัดข้อศอกที่ปล่อยกระแสไฟเล็กๆ มาซัพพอร์ตข้อต่อ หมอนดึงคอเป่าลม แล้วก็เสื่อทำความร้อน#nจากเจอร์เมเนียมและรังสีอินฟราเรด"
2002115-65 = "ไม่เสียแรงที่เราเดินหาของกันหลายๆ ร้านเลยนะคะ คุณครู!"
2002115-66 = "[s] \"งั้นเหรอ?!  จริงเหรอ?!?!\""
2002115-69 = "[ns] \"ครูไม่คิดว่าจะมีของขวัญในที่แบบนี้นะ!\""
2002115-70 = "พูดอะไรแบบนั้นคะคุณครู! ขนาดซานตาคลอสยังตระเวนไปทั่วทุกแห่งแล้วคอยสอดส่องว่ามีใครที่#nโดดเดี่ยวรึเปล่าเลยนะคะ"
2002115-71 = "พวกเราเองก็ต้องลองทำทุกอย่างที่ทำให้ได้อย่างซานตาคลอสค่ะ!"
2002115-75 = "ไหนดูซิ... ตรงนี้มีอะไรที่พอเอาไปเป็นของขวัญได้บ้างมั้ยนะ..."
2002115-79 = "อ๊ะ! มีเครื่องทำน้ำหยินหยาง กระบองเพชรเทียมที่ดูดซับคลื่นแม่เหล็กไฟฟ้า ขวดน้ำล้างสารพิษ..."
2002115-80 = "แล้วก็เลื่อยไฟฟ้าค่ะ!"
2002115-81 = "[s] \"เอาเลื่อยไฟฟ้าไปทำไมน่ะ?!?!\""
2002115-82 = "คะ? ก็มันมีประโยชน์ไงคะ?"
2002115-88 = "นี่ๆ"
2002115-97 = "ได้ยินมาว่าหมู่นี้มีพวกที่มากวาดซื้อสินค้าเพื่อสุขภาพไปทีอย่างกับจะเหมาไปทั้งร้าน..."
2002115-98 = "เป็นพวกเธอสินะ อย่ามาขัดขวางการทำธุรกิจของคนอื่นอย่างนี้สิ!"
2002115-100 = "คะ? พวกฉันก็แค่ซื้อของที่มีประโยชน์ไปแจกจ่ายให้คนอื่นนะคะ แล้วก็ซื้อไปในราคาปกติด้วย"
2002115-102 = "พูดไม่รู้เรื่องสินะ! นั่นละปัญหาเลย!"
2002115-103 = "พอพวกเธอซื้อไปในราคาปกติ แผนการของพวกฉันที่จะซื้อของราคาถูกๆ แล้วค่อยเอาไปขายต่อใน#nราคาแพงๆ ก็พังหมด!"
2002115-104 = "[s] \"ไม่ควรทำแบบนั้นตั้งแต่แรกอยู่แล้วไม่ใช่เหรอ?!\""
2002115-105 = "ซื้อของไปหมดยังไม่พอ แถมยังมาทำเป็นสั่งสอนใส่กันอีก..."
2002115-112 = "แบบนี้ฉันยิ่งมีน้ำโหแล้วนะ!"
2002115-114 = "ฉันจะทำให้รู้ซึ้งเลยว่าถึงจะมาทำเป็นสั่งสอนกัน แต่พวกเราก็ไม่หลาบจำหรอก!"
2002115-121 = "แค่มาขัดขวางเจตนารมณ์ของซานตาคลอสในการแบ่งปันความสุขและสุขภาพดีให้คนอื่นยังไม่พอ..."
2002115-128 = "แถมยังมาใช้ประโยชน์กับสิ่งนั้นในทางที่ผิดอีก! เป็นเด็กไม่ดีเลย! แบบนี้ไม่น่ารักนะคะ!"
2002115-129 = "ซานตาคลอสไม่ให้ของขวัญเด็กไม่น่ารักหรอกค่ะ!"
2002115-134 = "ว่าไงนะ? ยังเชื่อว่าซานต้ามีจริงอยู่อีกเรอะ?"
2002115-135 = "อ๊ะ เดี๋ยวนะ ถือของแบบนั้นมันอันตรายไม่ใช่เหรอ...?"
2002115-137 = "ไม่ต้องกังวลหรอกค่ะ! ฉันจะเป็นตัวแทนของซานตาคลอส แล้วทำให้ทุกคนเป็นเด็กดีเองค่ะ!"
2002115-147 = "(แล้วฮานาเอะก็... ทำให้พวกนักเลงเป็น 'เด็กดี' ได้ขนาดที่คนที่ยืนมองอยู่ต้องตกใจ)"
2002115-150 = "(แถมยังให้ของขวัญกลับบ้านไปคนละชิ้นด้วย...)"
2002115-155 = "คุณครู! ดูสิคะ! เราหาของขวัญมาได้เต็มถุงแล้วค่ะ!"
2002115-160 = "แหะๆๆ หวังว่าของขวัญถุงนี้จะทำให้ทุกคนมีช่วงเวลาที่มีความสุขและสุขภาพดีนะคะ!"
2002115-164 = "[ns] \"อะ... อืม... หวังว่าจะเป็นแบบนั้นนะ...\" "
2002115-166 = "(รอยยิ้มที่เบิกบานของฮานาเอะช่างบริสุทธิ์และสดใส)"
2002115-167 = "(จนทำให้คนที่เห็นได้รับการชำระล้างจิตใจไปด้วยเลย)"

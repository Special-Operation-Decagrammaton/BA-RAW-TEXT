2002115-1 = "#title;중요한 일, 중요한 물건."
2002115-2 = "3;하나에 산타ND;99;중요한 일이 생겼다고 말씀드리기는 했지만…….\n#3;a"
2002115-3 = "3;하나에 산타ND;05;저에게는 중요하지만, 선생님에게는 그렇지 않을지도 모른다는 생각이 들었어요."
2002115-4 = "3;하나에 산타ND;06;혹시, 제가 괜한 일을 벌이고 있는 건 아닐까요?\n#3;em;[?]"
2002115-5 = "[s1] \"그럴 리가! 학생에게 중요한 일이라면.\"\n[s2] \"선생님에게도 당연히 중요한 일이지!\""

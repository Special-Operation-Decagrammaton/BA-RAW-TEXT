[translation]
10043025-5 = "哈啊，哈啊……"
10043025-6 = "比賽比成這樣已經很不爽了，還來給我火上加油……"
10043025-13 = "唔嗯……原來真的只是比較激動的球迷啊。"
10043025-14 = "總覺得有點遺憾……"
10043025-15 = "[s]「沒事沒事……」"
10043025-20 = "終於！終於！歷經艱辛的努力之後，勇士隊總算抓下了第三個出局數！"
10043025-21 = "比賽目前才來到二局上半，讓人不禁為後續投手的輪值情況感到憂心呢。#n希望勇士隊能在二局下半的攻勢中，揭開反擊的序幕。"
10043025-25 = "啊，攻守交換了呢。"
10043025-26 = "這也代表……犯人應該很快就會聯絡了。"
10043025-27 = "……"
10043025-28 = "指導員，請快到莉同學那邊去吧。"
10043025-29 = "[s]「堇這邊沒問題嗎？」"
10043025-30 = "是的，請不必擔心。#n而且如果有需要的話，我們隨時都可以在會場裡找到彼此。"
10043025-31 = "我會用我的方式繼續調查。"
10043025-32 = "談判就拜託你們了。"

[translation]
1301305-1 = "慶典現場"
1301305-2 = "（接到莫名興奮的紅葉傳來的訊息，於是前往了赤冬廣場）"
1301305-7 = "啊，老師！我在這裡！"
1301305-8 = "耶嘿嘿……居然能跟老師一起來赤冬書展，簡直像在做夢一樣。"
1301305-9 = "[s]「你說的書展是……？」"
1301305-10 = "就是字面上的意思。一年舉辦一次，連續兩天。"
1301305-11 = "是讓赤冬的學生們帶各種書來展示、買賣喜歡書本的活動。"
1301305-15 = "……但這只是表面上的理由。"
1301305-16 = "實際上更像是為了處理各社團的庫存書籍而舉辦的義賣會。"
1301305-17 = "由於赤冬聯邦學園很少舉辦大型活動……#n所以才想盡可能讓大家感受慶典的氣氛。"
1301305-18 = "雖然參加的學生大多對書沒什麼興趣，反而更在乎攤販的食物就是了……"
1301305-19 = "[s]「這……聽起來有點難過。」"
1301305-20 = "不會！這樣反而更好！"
1301305-21 = "[s]「嗯，嗯！？」"
1301305-22 = "就是因為大多數的人都對書沒興趣，我們知識解放戰線才能好好尋寶呀！"
1301305-23 = "這樣就能把所有喜歡的書看個過癮！#n而且分不清初版和再版差別的學生很多，說不定能挖到寶藏哦！"
1301305-24 = "在意想不到的地方……發現傳說級的初版書也是有可能的！"
1301305-25 = "[s]「這，這樣啊……」"
1301305-26 = "來吧老師，現在不是說這些的時候了！#n赤冬書展就只有今明兩天而已！"
1301305-27 = "目標是稱霸所有攤位！"
1301305-28 = "雖然實際上可能無法辦到……但我想盡可能多看點書！"
1301305-30 = "（就這樣，和比平時更加興奮的紅葉逛起了書展）"
1301305-31 = "赤冬廣場"
1301305-35 = "啊，請看這個，老師！#n是《美味小姐》全集！"
1301305-40 = "沒想到……居然能在這裡見到……！"
1301305-41 = "咦？本來以為是全集……結果中間少了一本……！"
1301305-42 = "嗚嗚……這也難怪，這種等級的寶物不可能以這麼低的價格出現在這裡……"
1301305-43 = "雖然要補齊缺少的那一本真的很困難……"
1301305-44 = "沒辦法……只能抱著先把其他部分備齊的心情買下來了……"
1301305-46 = "這是……！《傑森與焦糖工廠》的週年特別紀念版！？"
1301305-47 = "竟然能看見夢寐以求的這本書……我能加入知識解放戰線真是太好了！"
1301305-48 = "什麼？本來應該在封面第一頁裡的……作者親筆序被剪掉了！？"
1301305-49 = "到底在想什麼啊……！#n這樣不只會損害書的價值和意義，對書也非常不禮貌啊……！"
1301305-50 = "啊，難道是因為序言有作家的親筆簽名嗎……？#n如果是就更過分了！這樣不就是想單獨剪下簽名賣到其他地方嗎！"
1301305-52 = "哇，是《以實瑪利》耶。"
1301305-53 = "聽說這部作品在剛出版時沒什麼人氣，只賣出了3200部。"
1301305-54 = "因為題材相對瘋狂，合計135章的份量對讀者也是不小的負擔。"
1301305-55 = "可是隨著讀者逐漸增多……現在已經是古典書籍代表等級的作品了。"
1301305-56 = "雖然這並不是決定版、週年版之類的限定版……"
1301305-57 = "呵呵，不過也不錯呢。#n這本也買下來吧。"
1301305-60 = "（在那之後，紅葉繼續快速逛了許多攤位，雙手拿著滿滿的書）"
1301305-61 = "（埋沒在書本之間的紅葉，看起來似乎相當幸福……）"
1301305-66 = "― [log=모미지]老師！我終於找到了！[/log][wa:1810] "
1301305-69 = "― [log=모미지]是沒有頁面受損，[/log][wa:480] "
1301305-70 = "― [log=모미지]特典插畫也有隨附在內的，[/log][wa:3730] "
1301305-73 = "― [log=모미지]限定版！[/log][wa:220] "
1301305-76 = "― [log=모미지]也許我……就是為了和這一本書相遇，[/log][wa:3020] "
1301305-77 = "― [log=모미지]才會被引導到這裡也說不定。[/log][wa:4000] "
1301305-80 = "― [log=모미지]耶嘿嘿……這也是，[/log][wa:1580] "
1301305-81 = "― [log=모미지]多虧老師在一旁守望著我呢。[/log][wa:2480] "
1301305-84 = "― [log=모미지]只要和老師在一起……[/log][wa:520] "
1301305-85 = "― [log=모미지]就會神奇地發生好事。[/log][wa:2880] "
1301305-88 = "― [log=모미지]所以……那個……老師。[/log][wa:3680] "
1301305-91 = "― [log=모미지]如果可以的話……那個，[/log][wa:2190] "
1301305-93 = "― [log=모미지]我不會說，每天都要……[/log][wa:1680] "
1301305-96 = "― [log=모미지]偶爾，就可以了……[/log][wa:2720] "
1301305-99 = "― [log=모미지]我們知識解放戰線，[/log][wa:1600] "
1301305-100 = "― [log=모미지]請你多來拜訪哦……[/log][wa:2530] "

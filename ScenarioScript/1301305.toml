[translation]
1301305-1 = "The Scene of the Festival"
1301305-2 = "After receiving a very excited message from Momiji, I made my way to the Red Winter plaza."
1301305-7 = "Oh, Sensei! Welcome."
1301305-8 = "Heehee. I can't believe we're going to the Red Winter book festival together, Sensei."
1301305-9 = "[s] \"What's the book festival?\""
1301305-10 = "Exactly what it sounds like! It happens once a year, over the course of two days!"
1301305-11 = "Red Winter students bring books from all over, display them, or even buy and sell the books they like."
1301305-15 = "That's what it's supposed to be, at least."
1301305-16 = "In actuality, it's a kind of flea market for each club so that they can offload their leftover inventory from the last year."
1301305-17 = "Red Winter Academy doesn't have a lot of events, to be honest... So we try to make it as much like a festival as we can."
1301305-18 = "Even though it's called a book festival, a lot of students are just here for the environment and good food."
1301305-19 = "[s] \"That makes me...a little sad.\""
1301305-20 = "Of course not! That's the best part of this whole thing!"
1301305-21 = "[s] \"Wh-What?\""
1301305-22 = "Since most people aren't interested in the books, it's the perfect time for the Knowledge Liberation Front to go treasure hunting!"
1301305-23 = "We get to peruse a whole variety of books! Without the need of differentiating samples and the real thing! Actually, most students don't even understand the concept of a sample!"
1301305-24 = "And sometimes... We can even find some legendary publications as well!"
1301305-25 = "[s] \"I-I see...\""
1301305-26 = "This isn't the time to dawdle, Sensei! We only have two days to make history!"
1301305-27 = "Our goal for the next two days is to explore every corner of this festival!"
1301305-28 = "Okay! That might be a little ambitious! But we're going to read as much as we can!"
1301305-30 = "And so, a very excited Momiji and I perused the festival."
1301305-31 = "Red Winter Plaza"
1301305-35 = "Look over here, Sensei! It's the complete collection of Two Piece!"
1301305-40 = "I can't believe I was able to find this here!"
1301305-41 = "Ack! I thought it was complete, but it's missing a volume!"
1301305-42 = "That makes a lot more sense... The complete collection is a rarity that would cost an arm and a leg!"
1301305-43 = "The missing volume is one that tends to be pretty hard to find, to top it all off..."
1301305-44 = "There's no choice. For now, I'll buy this pack as a way to secure the whole eventually."
1301305-46 = "This is...! The limited special edition of Jason and the Caramel Factory?!"
1301305-47 = "Such precious knowledge, just lying around in a festival... I'm so glad to be a part of the Knowledge Liberation Front!"
1301305-48 = "Huh? The hand-written foreword from the author that should be inside the cover is...cut out of it!"
1301305-49 = "What an atrocity! How dare they?! This harms not only the book, but is an insult to the author!"
1301305-50 = "I'm outraged! They probably cut it out to sell the autograph that accompanies the foreword! They're the enemy of society."
1301305-52 = "Whoa, the regular print of Ishmael!"
1301305-53 = "It was super unpopular at the time of printing. Only 3,200 volumes were sold!"
1301305-54 = "The subject was very niche, and people just couldn't get through all 135 chapters."
1301305-55 = "But more people started to read it over time, and has since been recognized as one of history's classics."
1301305-56 = "This isn't a special edition or anniversary printing or anything, but..."
1301305-57 = "Heehee. I still like it. Maybe we should get this as well."
1301305-60 = "Momiji continued to stack more and more books in her arms as she moved from one corner to another."
1301305-61 = "I've never seen her happier, buried under a precarious stack of books."
1301305-66 = "― [log=모미지]Sensei! I finally found it![/log][wa:1130] "
1301305-69 = "― [log=모미지]No damage to the pages,[/log][wa:10] "
1301305-70 = "― [log=모미지]and it even includes the special edition illustration![/log][wa:2050] "
1301305-73 = "― [log=모미지]An intact limited edition print![/log][wa:10] "
1301305-76 = "― [log=모미지]Maybe...my whole life[/log][wa:2860] "
1301305-77 = "― [log=모미지]has led up to this very moment. To finding this book.[/log][wa:2400] "
1301305-80 = "― [log=모미지]Heeheehee... This is all[/log][wa:980] "
1301305-81 = "― [log=모미지]thanks to you coming with me, Sensei.[/log][wa:1520] "
1301305-84 = "― [log=모미지]As long as I'm with you...[/log][wa:10] "
1301305-85 = "― [log=모미지]good things tend to happen.[/log][wa:2200] "
1301305-88 = "― [log=모미지]So... Um... Sensei.[/log][wa:3360] "
1301305-91 = "― [log=모미지]If it's all right with you... Um,[/log][wa:1310] "
1301305-93 = "― [log=모미지]even if it's not every day...[/log][wa:960] "
1301305-96 = "― [log=모미지]Even if it's just every now and again...[/log][wa:1480] "
1301305-99 = "― [log=모미지]Please come visit[/log][wa:1280] "
1301305-100 = "― [log=모미지]the Knowledge Liberation Front...[/log][wa:1570] "

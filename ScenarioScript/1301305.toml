[translation]
1301305-1 = "พื้นที่งานเทศกาล"
1301305-2 = "(หลังจากได้รับข้อความ MOMOTALK จากโมมิจิที่ดูตื่นเต้นมากๆ คุณครูก็รีบไปจัตุรัสเรดวินเทอร์ทันที)"
1301305-7 = "อ๊ะ คุณครู! เชิญเลยค่ะ"
1301305-8 = "แหะๆ... ฉันไม่เคยคิดมาก่อนเลยค่ะว่าจะได้มางานเทศกาลหนังสือเรดวินเทอร์กับคุณครู"
1301305-9 = "[s] \"เทศกาลหนังสืองั้นเหรอ เป็นงานแบบไหนกันน่ะ?\""
1301305-10 = "ก็ตามชื่อของมันเลยค่ะ แต่ว่าจะจัดขึ้นแค่ปีละ 1 ครั้ง และจัดแค่ 2 วันค่ะ"
1301305-11 = "เป็นงานเทศกาลที่นักเรียนของเรดวินเทอร์จะนำหนังสือต่างๆ มาจัดแสดง ซื้อขาย และแลกเปลี่ยน#nหนังสือที่ตนเองชอบกันค่ะ"
1301305-15 = "...เบื้องต้นก็เป็นแบบนั้น..."
1301305-16 = "แต่ที่จริงแล้ว มันเหมือนกับงานประมูลของการกุศลที่แต่ละชมรมจะโล๊ะหนังสือที่ไม่รู้จะเก็บไว้ยังไง#nมากกว่าค่ะ"
1301305-17 = "อันที่จริงในสหภาพเรดวินเทอร์ไม่ได้มีงานอีเวนต์อะไรใหญ่ๆ บ่อยค่ะ... เพราะงั้นเราก็เลยพยายาม#nจัดให้ดูเหมือนงานเทศกาลก็เท่านั้นค่ะ"
1301305-18 = "นักเรียนที่มาร่วมงานเทศกาลนี้ ส่วนใหญ่จะไม่ค่อยได้สนใจหนังสือ แต่จะสนใจพวกของกินหรือพวก#nบูทที่ดูน่าสนใจอย่างอื่นๆ กันมากกว่าค่ะ..."
1301305-19 = "[s] \"ดูเป็นเรื่องที่น่าเศร้าดีนะ\""
1301305-20 = "พูดอะไรอย่างนั้นล่ะคะ! ตรงกันข้ามเลยละค่ะ!"
1301305-21 = "[s] \"หะ...หืม?!\""
1301305-22 = "เพราะคนส่วนใหญ่ที่มาไม่ค่อยได้สนใจหนังสือกัน งานเทศกาลนี้เลยเป็นเทศกาลที่เหมาะสำหรับการ#nค้นหาสมบัติของชมรมแนวร่วมปลดปล่อยความรู้ค่ะ!"
1301305-23 = "เราจะเดินดูหนังสือได้ตามที่ต้องการ โดยไม่ต้องแยกว่าเป็นหนังสือตัวอย่างหรือหนังสือจริงเลย แถมมีนักเรียนที่ไม่เข้าใจคำว่าหนังสือตัวอย่างอยู่เยอะมากด้วย! "
1301305-24 = "แล้วก็ยังอาจจะบังเอิญ... ได้พบกับหนังสือในตำนานอีกด้วยนะคะ!"
1301305-25 = "[s] \"ยะ... อย่างนั้นเองหรอกเหรอ...\""
1301305-26 = "เอาละค่ะ คุณครู อย่ามัวโอ้เอ้กันอยู่เลยค่ะ! เรามีเวลาแค่วันนี้กับพรุ่งนี้... แค่สองวันเท่านั้นค่ะ!"
1301305-27 = "เป้าหมายของเราคือสำรวจทุกซอกทุกมุมให้หมดภายในระยะเวลาสองวันค่ะ..."
1301305-28 = "ถึงในความเป็นจริงมันอาจจะเป็นไปได้ยาก... แต่ฉันก็อยากอ่านหนังสือให้ได้มากที่สุดเท่าที่จะเป็นไป#nได้ค่ะ!"
1301305-30 = "(จากนั้นคุณครูก็ไปเดินเที่ยวงานเทศกาลหนังสือกับโมมิจิที่ดูจะตื่นเต้นมากกว่าปกติ...)"
1301305-31 = "จัตุรัสเรดวินเทอร์"
1301305-35 = "อ๊ะ ดูนี่สิคะ คุณครู! หนังสือชุดเรื่อง <มิส อิลมี> ค่ะ!"
1301305-40 = "โอ้โห ไม่น่าเชื่อเลยว่าจะเจออะไรแบบนี้...!"
1301305-41 = "เอ๋? คิดว่าครบชุดซะอีก... มันขาดไปหนึ่งเล่มนี่คะ...!"
1301305-42 = "ฮือ... นั่นสินะคะ ของล้ำค่าแบบนั้น คงไม่มีทางมาหาเจอในที่แบบนี้ และในราคาถูกๆ แบบนี้ได้หรอก..."
1301305-43 = "ถ้าจะตามหาแค่เล่มที่ขาดไปละก็ คงเป็นเรื่องที่ยากมาก..."
1301305-44 = "ช่วยไม่ได้นะคะ อย่างน้อยก็ควรคิดว่าโชคดีแล้วซื้อไปก็แล้วกันค่ะ..."
1301305-46 = "นี่มัน...! <เจสันกับโรงงานคาราเมล> ฉบับตีพิมพ์พิเศษตอนฉลองครบรอบ?!"
1301305-47 = "ไม่คิดว่าจะเจอหนังสือหายากแบบนี้... ชะ...ชมรมแนวร่วมปลดปล่อยความรู้ของเราโชคดีจริงๆ เลยค่ะ!"
1301305-48 = "เอ๋? คำนำที่เขียนด้วยลายมือของผู้แต่งที่ควรอยู่หน้าแรก...ถูกตัดออกไปค่ะ!"
1301305-49 = "คิดอะไรกันอยู่คะเนี่ย...! แบบนี้มันจะทำให้หนังสือเสียหายแล้วก็ลดทอนคุณค่าของหนังสือ แถมเป็น#nการไม่เคารพต่อหนังสือเลยสักนิด...!"
1301305-50 = "อ่า... หรือเพราะว่าในหน้าคำนำมีลายเซ็นของนักเขียนอยู่งั้นเหรอคะ? ถ้าเป็นแบบนั้นจริงก็ยิ่งทำเกินไป#nใหญ่เลยค่ะ! นั่นก็หมายความว่าลายเซ็นของนักเขียนถูกตัดออกและเอาไปขายที่ไหนสักแห่งน่ะสิคะ!"
1301305-52 = "ว้าว นี่ <อิชมาเอล> เล่มทั่วไปค่ะ"
1301305-53 = "ตอนที่ตีพิมพ์ครั้งแรก หนังสือเล่มนี้ไม่ดังเลยค่ะ ขายได้แค่ 3,200 เล่มเอง"
1301305-54 = "อาจเป็นเพราะว่าพล็อตเรื่องค่อนข้างสุดโต่ง แถมเนื้อเรื่องยังยาวถึง 135 ตอนเลยน่ะค่ะ"
1301305-55 = "แต่ว่าก็เริ่มมีคนหันมาสนใจอ่านมากขึ้น... จนตอนนี้ขึ้นแท่นเป็นหนึ่งในหนังสือคลาสสิกระดับตำนาน#nแล้วค่ะ"
1301305-56 = "หนังสือที่อยู่ตรงนี้ ไม่ใช่ทั้งฉบับสมบูรณ์ หรือฉบับตีพิมพ์พิเศษอะไรเลย เป็นแค่ฉบับทั่วไปเท่านั้น แต่ว่า..."
1301305-57 = "ฮิฮิ ยังไงมันก็เป็นเรื่องดีนะคะ ซื้อไปเก็บไว้ด้วยดีมั้ยคะ"
1301305-60 = "(โมมิจิวิ่งไปมาทั่วมุมต่างๆ อย่างรวดเร็วจนได้หนังสือมาเต็มมือ)"
1301305-61 = "(โมมิจิที่ดูจมอยู่ท่ามกลางกองหนังสือพวกนั้น ดูมีความสุขอย่างมาก...)"
1301305-66 = "― [log=모미지]คุณครู! ในที่สุดฉันก็เจอแล้วค่ะ![/log][wa:930] "
1301305-69 = "― [log=모미지]ไม่มีหน้าที่ขาดชำรุดเลย...[/log][wa:10] "
1301305-70 = "― [log=모미지]แถมภาพวาดพิเศษก็ยังอยู่ครบถ้วน[/log][wa:3010] "
1301305-73 = "― [log=모미지]หนังสือฉบับตีพิมพ์พิเศษจำนวนจำกัดละค่ะ![/log][wa:10] "
1301305-76 = "― [log=모미지]บางที... ทั้งชีวิตของฉันอาจจะเฝ้ารอช่วงเวลา[/log][wa:1980] "
1301305-77 = "― [log=모미지]ที่จะได้มาเจอหนังสือพิเศษเล่มนี้ก็ได้ค่ะ[/log][wa:2920] "
1301305-80 = "― [log=모미지]แหะๆๆ... ทั้งหมดนี้...[/log][wa:1060] "
1301305-81 = "― [log=모미지]คงต้องขอบคุณคุณครูที่คอยช่วยเหลือฉันค่ะ[/log][wa:1440] "
1301305-84 = "― [log=모미지]ถ้าอยู่กับคุณครูละก็...[/log][wa:10] "
1301305-85 = "― [log=모미지]รู้สึกเหมือนจะมีเรื่องดีๆ เกิดขึ้นเลยค่ะ[/log][wa:1680] "
1301305-88 = "― [log=모미지]เพราะงั้น... คือว่า... คุณครูคะ[/log][wa:2880] "
1301305-91 = "― [log=모미지]ถ้าคุณครูไม่ว่าอะไรละก็... เอ่อ...[/log][wa:1270] "
1301305-93 = "― [log=모미지]อาจไม่ต้องทุกวันก็ได้...[/log][wa:1160] "
1301305-96 = "― [log=모미지]แค่บางครั้ง...ก็ได้ค่ะ...[/log][wa:2080] "
1301305-99 = "― [log=모미지]ช่วยแวะมาที่...[/log][wa:1360] "
1301305-100 = "― [log=모미지]ชมรมแนวร่วมปลดปล่อยความรู้ของเราบ้างนะคะ...[/log][wa:1170] "

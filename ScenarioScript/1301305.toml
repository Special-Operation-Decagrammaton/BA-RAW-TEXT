[translation]
1301305-1 = "#title;축제의 현장"
1301305-2 = "#na;(어딘지 모르게 흥분한 모미지의 모모톡을 받고, 붉은겨울 광장으로 향했다.)"
1301305-3 = "#st;[0,0];instant;1;"
1301305-4 = "#clearST"
1301305-5 = "3;모미지;01\n#3;a\n#wait;1000"
1301305-6 = "3;모미지;02\n#3;em;[반응]\n#wait;1000"
1301305-7 = "3;모미지;03;아, 선생님! 어서 오세요.\n#3;em;[음표]"
1301305-8 = "3;모미지;03;에헤헤…… 선생님과 붉은겨울 책 축제에 올 수 있다니 믿어지지 않아요.\n#3;jump"
1301305-9 = "[s] \"책 축제라니, 어떤 거야?\""
1301305-10 = "3;모미지;07;말 그대로예요. 1년에 한 번, 이틀 동안 열리죠.\n#3;em;[재잘]"
1301305-11 = "3;모미지;03;붉은겨울의 학생들이 여기저기서 여러 가지 책을 가져오고, 전시하고, 마음에 드는 책을 사기도 하고 팔기도 하는 축제예요."
1301305-12 = "#st;[0,0];instant;1;"
1301305-13 = "#clearST"
1301305-14 = "3;모미지;01\n#3;em;…\n#wait;2500"
1301305-15 = "3;모미지;07;……라는 것은 표면상의 모습이고.\n#3;greeting"
1301305-16 = "3;모미지;02;실상은 각 동아리의 처치 곤란한 재고 도서들을 어떻게든 처분하고, 청소하기 위해 개최하는 바자회 같은 것이지만요."
1301305-17 = "3;모미지;01;사실 붉은겨울 학원에서는 그다지 큰 이벤트가 없어서…… 최대한 축제 비슷한 행사로 개최하는 거예요."
1301305-18 = "3;모미지;99;이 축제에 참가하는 대부분의 학생들은, 책에는 별 관심이 없고, 부수적으로 따라오는 먹을거리나 볼거리에 더 집중하곤 하죠……"
1301305-19 = "[s] \"그건 어딘가…… 서글픈 이야기네.\""
1301305-20 = "3;모미지;05;무슨 말씀이세요! 오히려 그래서예요!\n#3;em;[!]"
1301305-21 = "[s] \"으, 응?!\""
1301305-22 = "3;모미지;05;그렇게 대부분 책에 관심이 없기 때문에, 저희 지식해방전선이 보물을 찾기 좋은 이벤트라는 거죠!\n#3;jump"
1301305-23 = "3;모미지;05;모든 책을 마음대로 둘러볼 수 있고! 샘플본과 원본을 구분하지도 않고! 애초에 샘플본이란 것 자체를 이해하지 못하는 학생도 많고!\n#3;hophop"
1301305-24 = "3;모미지;05;그러다 보면 어쩌다가…… 전설의 판본 같은 것이 발견되기도 한다구요!\n#3;jump"
1301305-25 = "[s] \"그, 그렇구나……\""
1301305-26 = "3;모미지;07;자, 선생님. 이럴 때가 아니에요! 시간은 오늘과 내일, 이틀밖에 없어요!\n#3;em;[음표]"
1301305-27 = "3;모미지;05;저희의 목표는 그 이틀 사이에, 모든 코너를 돌아볼 수 있으면 좋겠지만!"
1301305-28 = "3;모미지;05;그게 현실적으로 불가능하다고 해도…… 가능한 한 많은 책을 읽어 보는 거예요!\n#3;closeup"
1301305-29 = "#all;hide"
1301305-30 = "#na;(그렇게, 평소보다 어딘가 흥분한 모미지와 함께 책 축제 현장을 돌아보기 시작했다.)"
1301305-31 = "#place;붉은겨울 광장"
1301305-32 = "#st;[0,0];instant;1;"
1301305-33 = "#clearST"
1301305-34 = "3;모미지;01\n#3;a\n#wait;1000"
1301305-35 = "3;모미지;07;아, 여기 보세요. 선생님! <미스 일미> 전권이에요!\n#3;em;[반응]"
1301305-36 = "#st;[0,0];instant;1;"
1301305-37 = "#clearST"
1301305-38 = "3;모미지;01\n#3;hophop\n#3;m5\n#wait;500"
1301305-39 = "#wait;1500"
1301305-40 = "3;모미지;03;세상에, 이런 걸 구할 수 있다니……!\n#3;greeting"
1301305-41 = "3;모미지;04;어라? 전권인 줄 알았는데…… 중간에 한 권이 빠져 있어요……!"
1301305-42 = "3;모미지;04;우우…… 그래요. 이런 보물 같은 게, 이런 자리에 이렇게나 저렴한 가격으로 나올 리 없죠……\n#3;em;[땀]"
1301305-43 = "3;모미지;06;빠진 한 권만 따로 찾아서 구하기는 정말로, 저어어엉말로 힘든 일이지만……"
1301305-44 = "3;모미지;06;어쩔 수 없네요. 일단…… 나머지라도 마련해 둔다는 느낌으로 구입해야겠어요……"
1301305-45 = "3;모미지;06\n2;모미지;07\n#3;hide\n#2;a"
1301305-46 = "2;모미지;07;이건……! <제이슨과 캐러멜 공장> 특별 주년 기념 스페셜판!?\n#2;em;[?!]"
1301305-47 = "2;모미지;03;이런 희귀본을 만나게 될 줄은…… 저, 지식해방전선이어서 다행이예요!\n#2;greeting"
1301305-48 = "2;모미지;04;어어? 속표지 첫 페이지에 있어야 할…… 작가님의 한정 친필 서문 페이지가 잘려 나가 있어요!\n#2;stiff"
1301305-49 = "2;모미지;04;무슨 생각일까요……! 이러면 책의 가치나 의미가 손상되는 것은 당연하고, 책 그 자체에 대한 예의가 아닌데……!\n#2;em;[땀]"
1301305-50 = "2;모미지;05;아, 그 서문에 작가님의 친필 사인이 쓰여 있었기 때문일까요? 그렇다면 더더욱 너무해요! 사인만 따로 잘라내 어딘가에 되팔겠다는 뜻이잖아요!"
1301305-51 = "2;모미지;05\n3;모미지;02\n#2;hide\n#3;a"
1301305-52 = "3;모미지;02;우와, <이스마엘> 일반본이네요.\n#3;em;[반응]"
1301305-53 = "3;모미지;01;처음 출판되었을 때는 인기가 엄청 없었다고 해요. 딱 3200부만 팔렸다죠.\n#3;greeting"
1301305-54 = "3;모미지;99;소재가 마니악하기도 했고, 총 135챕터나 되는 분량도 부담이 심했기 때문이었겠죠."
1301305-55 = "3;모미지;01;그런데 점점 많은 사람이 하나둘 읽기 시작하면서…… 지금은 고전의 자리에까지 올라간 작품이에요.\n#3;greeting"
1301305-56 = "3;모미지;02;여기에 있는 것은 특별판이나 완전판, 주년판 같은 것도 아닌 그저 일반본이지만……"
1301305-57 = "3;모미지;03;헤헤. 뭔가 좋네요. 이것도 확보해 두는 것으로 할까요.\n#3;em;[음표]"
1301305-58 = "#all;hide"
1301305-59 = "#wait;2500"
1301305-60 = "#na;(모미지는 그렇게, 여러 코너를 빠르게 돌며 양손 가득 책을 채워 나갔다.)"
1301305-61 = "#na;(수많은 책 속에 파묻힌 듯한 모미지는, 정말로 행복해 보였다……)"

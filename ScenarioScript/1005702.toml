[translation]
1005702-1 = "Off the Rails. But Only Sometimes."
1005702-4 = "I headed over to the meeting spot after getting Haruna's message."
1005702-5 = "Oh, Sensei."
1005702-6 = "You got here just in time."
1005702-7 = "[s] \"Nice outfit.\""
1005702-8 = "Thank you."
1005702-9 = "I thought it suited me."
1005702-10 = "More importantly, it suits a journey for seasonal gourmet experiences."
1005702-11 = "True gastronomy extends beyond the food you eat. It's an experience you must build towards."
1005702-12 = "[s] \"So, you wanted to wear a kimono for New Year's.\""
1005702-13 = "That's one way to sum it up."
1005702-14 = "But I'm not the only one excited for today."
1005702-19 = "[ns] \"Yeah, the streets are bustling.\""
1005702-20 = "It's become so crowded because of New Year's..."
1005702-21 = "The past year behind you, the coming one ahead..."
1005702-22 = "It's a good time to discover a \"new you.\""
1005702-23 = "And of course, there are always expectations that a new year will bring something good to your life."
1005702-24 = "As for me... My expectations are more food-based."
1005702-26 = "Heehee..."
1005702-27 = "More than just the taste of the food..."
1005702-28 = "...it's the atmosphere that adds to the flavor of a New Year's meal."
1005702-29 = "[s] \"I guess so...\""
1005702-30 = "I know so."
1005702-31 = "Why do you think I invited you out here?"
1005702-32 = "Speaking of which, shall we get going?"
1005702-38 = "[ns] \"Haruna?!\""
1005702-39 = "What's wrong with walking arm in arm with me?"
1005702-40 = "I don't know if you could tell, but I'm really excited for today."
1005702-41 = "I'm counting on you, Sensei!"
1005702-46 = "Come try our food! We use only the freshest ingredients!"
1005702-47 = "Chocolate bananas here! Buy one for a chance to win one more!"
1005702-48 = "Yakisoba! Sizzling yakisoba straight from a hot iron plate twenty-four hours a day!"
1005702-50 = "Ah, yakisoba."
1005702-51 = "Always seems to be around... But whenever it's not, you'll miss it."
1005702-55 = "Excuse me, could I have one order?"
1005702-56 = "Oh, two pairs of chopsticks, please."
1005702-58 = "They sell ramen too? I wonder how they serve it."
1005702-59 = "Ah... They pour the soup into a wide disposable cup..."
1005702-60 = "Should we try that too?"
1005702-65 = "Heehee. Sharing a single order..."
1005702-66 = "It's fun, right?"
1005702-68 = "Ooh, that castella is looking good."
1005702-69 = "Baked once, then its exterior is heated again for texture..."
1005702-70 = "And just when I was craving something sweet."
1005702-71 = "Let's try it."
1005702-75 = "Ah, strawberry mochi."
1005702-76 = "A fat strawberry covered in red bean paste shoved right inside the mochi..."
1005702-77 = "You first make contact with the sweetness of the red beans and then get to the refreshing taste of the strawberry..."
1005702-78 = "All cushioned in chewy rice cake..."
1005702-82 = "Excuse me, could I get two orders of strawberry mochi?"
1005702-84 = "Haruna and I continued to rove around for more stalls to conquer."
1005702-89 = "[ns] \"I'm... I'm at my limit...\""
1005702-90 = "I...I can't go any further either."
1005702-91 = "[s] \"How was it, Haruna?\""
1005702-92 = "Ah, right. Well, this was a journey to explore the delicacies of the holiday season."
1005702-93 = "So, we need come to a conclusion now."
1005702-94 = "Special food eaten at a special time, in a special place, in a special atmosphere..."
1005702-98 = "I'm disappointed."
1005702-99 = "[s] \"R-Really?\""
1005702-100 = "The sizzle of yakisoba is meaningless if the sauce and noodles don't mix well."
1005702-101 = "And stall-sold ramen is all about simplicity, but that doesn't mean it should only have seaweed and sweet corn as garnishes."
1005702-102 = "The castella was burnt because they clearly didn't know how to heat just the exterior."
1005702-103 = "And the red bean paste of the strawberry mochi tasted bitter."
1005702-104 = "They probably used cheap, premade products."
1005702-105 = "[s1] \"Oh no! Your taste buds are mad!\"\n[s2] \"(Cover your ears and curl up.)\""
1005702-108 = "...Um, what?"
1005702-109 = "Oh, you thought I was gonna blow up the street stalls?"
1005702-110 = "Come on, I don't always do that."
1005702-111 = "Besides..."
1005702-112 = "[s] \"Besides?\""
1005702-113 = "I didn't want to ruin our time together."
1005702-114 = "It wasn't exactly a gourmet experience...but I enjoyed it."
1005702-115 = "Can you stay with me so I can enjoy it a little longer?"
1005702-116 = "We still have plenty of food left to try, after all."
1005702-123 = "Haruna and I walked around, enjoying the atmosphere of the streets."
1005702-124 = "She continued to try different food stalls here and there as we walked."

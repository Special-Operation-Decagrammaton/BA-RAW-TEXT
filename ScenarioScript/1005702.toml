[translation]
1005702-1 = "บางครั้งก็จะแหกกฏหน่อยๆ"
1005702-4 = "(คุณครูออกมายังสถานที่ที่นัดเจอกับฮารุนะ)"
1005702-5 = "อ๊ะ คุณครู"
1005702-6 = "มาตรงเวลา ไม่ช้าไม่เร็วเกินไปเลยนะคะ"
1005702-7 = "[s] \"ชุดสวยจังเลยน้า\""
1005702-8 = "ขอบคุณค่ะ"
1005702-9 = "พอดีต้องสวมเสื้อผ้าให้เข้ากับเทศกาลน่ะค่ะ"
1005702-10 = "และการเตรียมการเรื่องพวกนี้ ก็ควรเตรียมเอาไว้ล่วงหน้าทีละอย่างสองอย่าง"
1005702-11 = "ฉันเชื่อว่าการทำแบบนี้เป็นวิธีการของนักชิมที่แท้จริงค่ะ..."
1005702-12 = "[s] \"พูดง่ายๆ ก็คือ ปีใหม่ก็เลยใส่เสื้อใหม่สินะ\""
1005702-13 = "ถ้าพูดโดยสรุปก็คงเป็นแบบนั้นค่ะ"
1005702-14 = "แต่ดูแล้ว... คนที่คิดแบบนั้นคงไม่ได้มีแค่ฉันคนเดียวหรอกนะคะ?"
1005702-19 = "[ns] \"อื้อ... คนเต็มถนนเลยนะ...\""
1005702-20 = "ช่วงวันสิ้นปีกับช่วงปีใหม่ คนจะพลุกพล่านหลายเท่าเลยค่ะ..."
1005702-21 = "เป็นช่วงเวลาที่ย้อนกลับไปทบทวนปีที่ผ่านมา และคาดหวังกับปีใหม่ที่จะมาถึง "
1005702-22 = "ผู้คนมากมายออกมาเดินที่ถนน และกุมมือกันไปด้วยความรู้สึกที่ต่างไปจากเดิม"
1005702-23 = "ความคาดหวังว่าจะได้พบกับเรื่องดีๆ ในปีใหม่ที่จะมาถึง"
1005702-24 = "และเหล่าอาหารต่างๆ ที่รอต้อนรับผู้คนเหล่านั้น..."
1005702-26 = "ฮุฮุฮุ..."
1005702-27 = "อาหารที่ได้ลิ้มรสในบรรยากาศแบบนี้ "
1005702-28 = "ไม่คิดว่ามันพิเศษเลยงั้นเหรอคะ?"
1005702-29 = "[s] \"งั้นเหรอ...\""
1005702-30 = "ต้องเป็นแบบนั้นแน่นอนค่ะ"
1005702-31 = "ถ้าไม่อย่างนั้น การที่ฉันนัดคุณครูออกมาแบบนี้ก็คงไม่มีความหมายอะไรค่ะ"
1005702-32 = "เอาละ ไปกันเลยมั้ยคะ?"
1005702-38 = "[ns] \"ฮารุนะ?!\""
1005702-39 = "มีอะไรเหรอคะ? ระหว่างเรา แค่คล้องแขนกันแบบนี้ไม่ใช่เรื่องแปลกเลยนะคะ"
1005702-40 = "ไม่รู้ว่าจะถูกใครเห็นเข้าหรือเปล่า แต่ฉันอยากลองทำแบบนี้ดูมากๆ เลยนะคะ"
1005702-41 = "ขอฉันเอาแต่ใจหน่อยนะคะ... คุณครู?"
1005702-46 = "เร่เข้ามาๆ~ เข้ามาชิมได้เลยคร้าบบบ! ปรุงจากวัตถุดิบสดใหม่สุดๆ!"
1005702-47 = "ช็อกโกบานาน่าคร้าบบบบ! จับได้ไม้ฟรี รับไปอีกหนึ่งไม้เลย!"
1005702-48 = "เชิญเข้ามาชิมยากิโซบะของเราก่อนคร้าบบบ! ปรุงสดใหม่บนเตาร้อนๆ 24 ชม. เลยครับ!"
1005702-50 = "ยากิโซบะงั้นเหรอคะ"
1005702-51 = "อาหารที่เจอได้เสมอ... แต่ถ้าไม่เจอก็รู้สึกเสียดาย..."
1005702-55 = "สวัสดีค่ะ ขอยากิโซบะ 1 ที่ค่ะ "
1005702-56 = "อ๊ะ แต่รบกวนขอตะเกียบ 2 คู่นะคะ"
1005702-58 = "มีราเม็งด้วยสินะคะ? ไม่ทราบว่าเสิร์ฟแบบไหนเหรอคะ?"
1005702-59 = "อะฮ่า... ใส่ถ้วยแบบใช้แล้วทิ้ง ส่วนน้ำซุปก็ใส่ถ้วยแยก..."
1005702-60 = "เราลองชิมอันนี้ดูด้วยดีมั้ยคะ?"
1005702-65 = "ฮิฮิ... ลองสั่งมาอย่างละ 1 จานแล้วมาแบ่งกันชิมแบบนี้"
1005702-66 = "รู้สึกเข้ากับบรรยากาศดีนะคะ"
1005702-68 = "อันนี้... คาสเทลล่าอบสินะคะ"
1005702-69 = "คาสเทลล่าที่อบมา แล้วก็นำมาอบอีกครั้งเพื่อเพิ่มความกลมกล่อมของรสชาติ..."
1005702-70 = "ฉันกำลังอยากได้ของหวานๆ อยู่พอดีเลยค่ะ"
1005702-71 = "เรามาลองชิมดูกันเถอะค่ะ"
1005702-75 = "โมจิสตรอว์เบอร์รีละค่ะ"
1005702-76 = "ใส่สตรอว์เบอร์รีลูกใหญ่ๆ ไว้ข้างใน แล้วก็ห่อด้วยถั่วแดง..."
1005702-77 = "รสหวานของถั่วแดง และความสดใหม่ของสตรอว์เบอร์รี... "
1005702-78 = "และเมื่อรวมกับรสเหนียวนุ่มของโมจิ..."
1005702-82 = "ขอโทษนะคะ ขอโมจิสตรอว์เบอร์รี 2 ชิ้นค่ะ"
1005702-84 = "(จากนั้นคุณครูกับฮารุนะก็ตระเวนชิมร้านต่างๆ มากมาย)"
1005702-89 = "[ns] \"มากกว่านี้คง...\""
1005702-90 = "ค่ะ... คงกินไม่ไหวแล้วค่ะ"
1005702-91 = "[s] \"เป็นยังไงบ้าง ฮารุนะ?\""
1005702-92 = "วันนี้คือการตระเวนชิมอาหารเลิศรสในเทศกาลวันปีใหม่"
1005702-93 = "มาถึงตอนนี้ก็คงได้เวลาสรุปแล้วค่ะ"
1005702-94 = "อาหารพิเศษที่ได้ลิ้มรสในบรรยากาศพิเศษ สถานที่พิเศษ และในช่วงเวลาพิเศษแบบนี้..."
1005702-98 = "ช่างน่าผิดหวังจริงๆ ค่ะ"
1005702-99 = "[s] \"งะ... งั้นเหรอ?\""
1005702-100 = "ยากิโซบะน่ะ ถ้าผัดเส้นให้คลุกเคล้ากับเนื้อได้ไม่ดีพอก็ไร้ความหมายค่ะ"
1005702-101 = "ถึงจะเป็นราเม็งแผงลอยก็เถอะ แต่ใส่ท็อปปิ้งแค่สาหร่ายกับข้าวโพดหวานแบบนี้ก็น่าเสียดายนะคะ"
1005702-102 = "ส่วนคาสเทลล่าอบ... ดูเหมือนจะปรับความแรงไฟได้ไม่ดีพอ ทำให้มีกลิ่นไหม้ติดมานิดๆ ค่ะ"
1005702-103 = "ส่วนโมจิสตรอว์เบอร์รี... ถั่วแดงที่ใช้ก็มีรสขมปนอยู่ด้วยค่ะ"
1005702-104 = "คงเป็นเพราะใช้วัตถุดิบราคาถูกค่ะ"
1005702-105 = "[s1] \"ฮารุนะโมโหแล้ว!!\"\n[s2] (ยกมือปิดหูแล้วหมอบลงกับพื้น)"
1005702-108 = "ตายจริง... ทำไมถึงทำแบบนั้นล่ะคะคุณครู?"
1005702-109 = "คะ? ฉันเหมือนกำลังจะเตรียมระเบิดร้านแผงลอยทิ้งงั้นเหรอคะ...?"
1005702-110 = "ฉันไม่ทำแบบนั้นทุกครั้งหรอกนะคะ..."
1005702-111 = "อีกอย่าง..."
1005702-112 = "[s] \"อีกอย่าง...?\""
1005702-113 = "ฉันไม่อยากทำลายช่วงเวลาสำคัญที่ได้ใช้ร่วมกับคนสำคัญที่สุดของฉันหรอกค่ะ"
1005702-114 = "ถึงจะไม่ใช่อาหารเลิศรส แต่ก็ถือว่าได้เพลิดเพลินกับอาหารหลายอย่างเลยค่ะ"
1005702-115 = "เราไปเดินเล่นกันต่อดีมั้ยคะ?"
1005702-116 = "ยังมีอาหารอีกตั้งหลายอย่างรอให้เราไปชิมอยู่นะคะ ฮุฮุฮุ"
1005702-123 = "(จากนั้นฮารุนะกับคุณครูก็ไปเดินเที่ยวชมบรรยากาศกันต่อ...)"
1005702-124 = "(ถึงปากจะบอกว่าอิ่ม แต่ฮารุนะก็ยังคงแวะชิมอาหารที่ร้านแผงลอยต่างๆ ต่อ...)"

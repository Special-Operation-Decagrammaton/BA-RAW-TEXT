[translation]
1005702-1 = "年關就該安穩度過"
1005702-4 = "（到達約好的地點時，看見了已經在那等著的羽留奈）"
1005702-5 = "啊，老師。"
1005702-6 = "感謝您願意前來。"
1005702-7 = "[s]「抱歉我遲到了。和服，非常適合你哦。」"
1005702-8 = "呵呵。"
1005702-9 = "我想說應該配合時節，準備相應的服裝赴宴會比較適當。"
1005702-10 = "然後，藉由一一做好這些準備……"
1005702-11 = "就能更接近真正的美食──我是這麼相信的。"
1005702-12 = "[s]「這樣啊，畢竟是難得的新年呢。」"
1005702-13 = "正是如此。"
1005702-14 = "而且，有相同想法的似乎並不只有我唷？"
1005702-19 = "[ns]「確實……話說回來今天人還真多呢。」"
1005702-20 = "是啊，歲末年終果然充滿活力。"
1005702-21 = "回顧過去的一年，期待即將來臨的新年…… "
1005702-22 = "那樣興奮的感覺讓人們感受到與平時不同的氣氛，於是便湧上了街頭吧。"
1005702-23 = "明年一定會發生好事……胸懷這樣的期待。"
1005702-24 = "此外，還有迎接這些人們的各種料理……！"
1005702-26 = "唔呵呵。"
1005702-27 = "在這樣的氛圍下……"
1005702-28 = "想必會有特別的美味在等著我吧？"
1005702-29 = "[s]「也許，是吧……？」"
1005702-30 = "沒錯，一定是這樣的。"
1005702-31 = "難得邀請老師一起出來……"
1005702-32 = "那麼，我們出發吧？"
1005702-38 = "[ns]「羽，羽留奈……！？」"
1005702-39 = "怎麼了嗎？依照我們的交情，挽著手臂也是很正常的吧。"
1005702-40 = "畢竟是難得的快樂時光啊。"
1005702-41 = "來，我們走吧，老師？"
1005702-46 = "來哦來哦，每個都很新鮮唷！"
1005702-47 = "要不要來根巧克力香蕉啊！？抽到中獎籤的話就能再拿一支！"
1005702-48 = "炒麵，要不要來份炒麵～！熱騰騰剛出爐的唷～！"
1005702-50 = "原來如此，炒麵是嗎……"
1005702-51 = "雖說是固定會出現的商品，不過也正因此而不可或缺呢。"
1005702-55 = "不好意思，能給我一份嗎？ "
1005702-56 = "啊，筷子請麻煩給我兩雙。"
1005702-58 = "是拉麵啊。這樣的攤販要怎麼賣拉麵呢？"
1005702-59 = "原來如此。將湯頭注入一次性的簡易杯子……"
1005702-60 = "這個也嘗嘗看吧？"
1005702-65 = "唔呵呵。將一人份的料理分給兩個人一起享用……"
1005702-66 = "不覺得很棒嗎？"
1005702-68 = "哎呀，是雞蛋糕。"
1005702-69 = "做法有點特別呢。"
1005702-70 = "我也正好想吃些甜食……"
1005702-71 = "就來品嘗一下吧。"
1005702-75 = "是草莓大福呢。"
1005702-76 = "包在麻糬裡的餡料和碩大的草莓……"
1005702-77 = "豆餡的甜味與草莓的酸味。"
1005702-78 = "軟Q的口感與多汁的滋味，這樣的對比相當有魅力呢。"
1005702-82 = "不好意思，可以給我兩個草莓大福嗎？"
1005702-84 = "（後來也和羽留奈一起逛了許多的攤販）"
1005702-89 = "[ns]「好，好像有點飽了……」"
1005702-90 = "呵呵，老師也吃了不少呢。"
1005702-91 = "[s]「羽留奈覺得感想如何呢？」"
1005702-92 = "我想想……今天的美食之旅，是為了在年關探究新的美食。"
1005702-93 = "從結論來說……"
1005702-94 = "在特別的日子、特別的場所、特別的氛圍下吃的料理……"
1005702-98 = "……讓我有點失望。"
1005702-99 = "[s]「怎，怎麼說呢……？」"
1005702-100 = "所謂的炒麵，就是調和麵條與醬汁的料理。"
1005702-101 = "對拉麵來說也是一樣的。#n即便只是路邊的攤販，配料也不能馬虎。"
1005702-102 = "雞蛋糕的火候並不均勻，還能看到燒焦的部分……"
1005702-103 = "草莓大福的紅豆餡則缺少了滑順的口感。"
1005702-104 = "即使是為了追求利益的商業行為，使用便宜的食材而不注重味道也是無法接受的。"
1005702-105 = "[s1]「難，難道接下來要……」\n[s2]（身體不自覺地僵硬了起來──）"
1005702-108 = "……怎麼了嗎，老師？"
1005702-109 = "……嗯？覺得我好像會把攤販全都炸掉……？"
1005702-110 = "請放心，我今天並不打算那麼做。"
1005702-111 = "況且……"
1005702-112 = "[s]「況且？」"
1005702-113 = "這是難得的，能夠和重要的人一起度過的時間。"
1005702-114 = "即便不是美食，也依然是段快樂的時光。"
1005702-115 = "所以……如果您不介意的話，能再稍微陪我一會嗎？"
1005702-116 = "畢竟攤販還有很多呢。呵呵。"
1005702-123 = "（於是便和羽留奈一起快樂地享受了年關的氛圍）"
1005702-124 = "（稍微散步消化之後，繼續品嘗各種攤販料理）"

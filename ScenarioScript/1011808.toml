[translation]
1011808-1 = "ภาพลักษณ์ที่คาดไม่ถึง"
1011808-2 = "(คุณครูไปดูพื้นที่ที่มีกำหนดการก่อสร้างตามคำขอของโนโซมิ)"
1011808-4 = "ไง~ กู้ดมอร์นิ่ง!"
1011808-5 = "[s] \"สวัสดี โนโซมิ!\""
1011808-6 = "ขอบคุณที่มานะ~! วะฮะฮ่า!"
1011808-7 = "เดิมทีนี่เป็นงานคู่ แต่จู่ๆ ก็เป็นงานเดี่ยวซะงั้น"
1011808-8 = "ถ้าต้องมาอยู่ที่นี่คนเดียวก็น่าเบื่อนี่เนอะ?"
1011808-9 = "[s1] \"ฮุฮุ ครูก็กำลังเบื่ออยู่พอดีเลย...\"\n[s2] \"ฮุฮุ ครูก็ไม่มีอะไรทำอยู่พอดีเลย...\""
1011808-12 = "วะฮะฮ่า! งั้นก็ดีเลยนะ!"
1011808-13 = "ดีละ งั้นวันนี้ก็มาเล่นสนุกกัน..."
1011808-14 = "ไม่สิ มาสำรวจภาคสนามกัน!"
1011808-15 = "[s] \"น่าจะอยากทำอย่างแรกที่พูดเมื่อกี้มากกว่านะ?\""
1011808-17 = "เอาละ~ นี่คือสถานที่แรกในแพลนของเรา"
1011808-18 = "[s] \"แล้วต้องดูอะไรบ้างเหรอ?\""
1011808-19 = "งานวันนี้ก็แค่ต้องตรวจสอบว่าข้อมูลที่เขียนในรายงานมันถูกต้องหรือเปล่า ง่ายๆ ใช่มั้ยล่ะ?"
1011808-20 = "ปกติแล้วทาง CCC จะมาสำรวจภาคสนามก่อนที่จะศึกษาความเป็นไปได้เบื้องต้นน่ะ"
1011808-21 = "แล้วที่นี่ก็ได้รับการประเมินว่าก่อสร้างได้ในการสำรวจภาคสนามรอบแรก"
1011808-22 = "ถ้ามีการสร้างทางรถไฟด่วนตรงนี้ ก็จะไปเชื่อมต่อกับเขต D.U. ด้วย เลยคาดว่าพื้นที่ตรงนี้มีศักยภาพที่#nจะสร้างรายได้ได้"
1011808-23 = "[s] \"โนโซมิ...\""
1011808-24 = "ทำไมมองฉันอย่างนั้นล่ะ?"
1011808-25 = "[s] \"ดูเป็นผู้เชี่ยวชาญมากเลยนะ?!\""
1011808-26 = "ฮุฮุ ตกใจเลยล่ะสิ?"
1011808-27 = "..."
1011808-28 = "ฮะ..."
1011808-29 = "ฮะฮ่า! วะฮะฮ่า!"
1011808-33 = "หน้าคุณครูตลกมากเลย!"
1011808-34 = "คิดจริงๆ เหรอว่าฉันเข้าใจในสิ่งที่ตัวเองพูดไปเมื่อกี้น่ะ?"
1011808-35 = "ฉันก็แค่อ่านสิ่งที่อยู่ในรายงานต่างหาก!"
1011808-36 = "[s] \"นึกว่าวิเคราะห์เองเสียอีก...!\""
1011808-37 = "ฮุฮุฮุ~ ตอนคุยกับคนใหญ่คนโตกว่า ก็ต้องแกล้งทำเป็นรู้เรื่องแบบนี้ละ"
1011808-38 = "เรื่องยากๆ แบบนั้นรู้ไปก็เท่านั้น แค่ขับรถไฟได้ก็พอแล้ว"
1011808-39 = "แต่ยังไงฉันก็พูดได้อย่างเป็นธรรมชาติเลยใช่มั้ยล่ะ?"
1011808-40 = "การสำรวจภาคสนามของวันนี้ไม่ต้องจริงจังมากหรอก คิดว่าออกมาสูดอากาศข้างนอกแล้วกัน!"
1011808-41 = "[s3] \"บะ... แบบนั้นก็ได้เหรอ?\"\n[s4] \"แต่นี่ดูเป็นเรื่องสำคัญเลยนะ?!\""
1011808-44 = "ถึงพวกเราจะมาสำรวจภาคสนามแล้วเสนอความคิดเห็นอะไร มันก็ไม่มีประโยชน์อะไรมากหรอก"
1011808-45 = "ในไฮแลนเดอร์น่ะมีหลายคณะ ต่อให้เราบอกว่าเห็นด้วย แต่คนอื่นอาจจะออกมาต่อต้านก็ได้ แล้วมันก็เกิดเรื่องแบบนั้นบ่อยๆ เลยด้วย"
1011808-46 = "งั้นก็แค่เขียนรายงานส่งแค่พอประมาณก็พอแล้ว จะได้ไม่ต้องยุ่งยากน่ะ!"
1011808-47 = "[s] \"มันจะไม่เป็นไรเหรอ...\""
1011808-48 = "อื้อ ไม่เป็นไรหรอก ที่ผ่านมาก็ไม่มีปัญหาอะไร"
1011808-49 = "นักเรียนส่วนมากก็บำรุงรักษาและขับรถไฟกันอย่างแข็งขัน"
1011808-50 = "แค่ทำงานของตัวเองออกมาให้ดีก็พอแล้ว"
1011808-51 = "เฮ้อ~ ถ้าเป็นไปได้น่ะนะ ฉันไม่มาสนเรื่องสำรวจภาคสนามหรือตรวจสอบอะไรมากหรอก แค่สร้างทางรถไฟไปให้ทั่วคิโวทอสก็พอ นั่นละสิ่งที่ฉันอยากทำ"
1011808-52 = "ถ้าทางรถไฟมันเชื่อมกันหมด ก็คงเดินทางไปไหนมาไหนได้รวดเร็วกว่านี้"
1011808-53 = "ไม่ว่าจะไปดาดฟ้าบนอาคาร สวนสาธารณะ หรือร้านราเม็ง!"
1011808-57 = "ทำไมถึงทำหน้าอย่างนั้นล่ะ วะฮะฮ่า!"
1011808-58 = "แต่คุณครูก็ต้องเจอสถานการณ์คล้ายๆ กันหรือเปล่า?"
1011808-59 = "[s] \"หืม? หมายความว่ายังไง...\""
1011808-60 = "ชาเล่ต์ก็เกี่ยวข้องกับหลายๆ โรงเรียนนี่นา"
1011808-61 = "ไม่ว่าจะทำอะไร คุณครูก็ต้องใส่ใจทุกเรื่อง แบบนั้นมันน่าจะยุ่งยากอยู่นะ"
1011808-62 = "[s5] \"การรับฟังและสั่งสอนนักเรียนคือหน้าที่ของครูอยู่แล้ว\"\n[s6] \"ครูไม่เอาปัจจัยเรื่องการเมืองมาคิดหรอก\""
1011808-65 = "ฮืม~"
1011808-66 = "ไม่ว่านักเรียนจะเป็นยังไง คุณครูก็ปฏิบัติตัวกับทุกคนอย่างเท่าเทียมเลยเหรอ?"
1011808-67 = "[s] \"อื้อ แน่นอนอยู่แล้ว\""
1011808-71 = "อะไรเนี่ย~"
1011808-72 = "แต่ก็สมกับเป็นคุณครูเลยนะ! วะฮะฮ่า!"
1011808-73 = "[s7] \"ที่จริงครูก็ไม่รู้หรอกว่าต้องทำยังไงถึงจะดีที่สุด\"\n[s8] \"ถึงตอนนี้ครูจะยังเป็นมือใหม่อยู่ก็เถอะ\""
1011808-79 = "[ns9] \"แต่ครูจะใส่ใจนักเรียนที่อยู่ตรงหน้าตอนนี้ให้มากที่สุดเลย\"\n[ns10] \"แต่ครูก็จะใส่ใจโนโซมิคนนี้ให้มากที่สุดเลย\""
1011808-82 = "พรืด พูดอะไรเนี่ย~! วะฮะฮ่า! ตลกที่สุดเลย!"
1011808-83 = "แต่ก็นะ ก็คุณครูยังมือใหม่อยู่จริงๆ"
1011808-87 = "ถ้างั้นวันนี้!"
1011808-92 = "ฉันจะทำให้คุณครูต้องใส่ใจฉันมากที่สุดเลย! เอาละ มาทางนี้เร็วเข้า!"
1011808-94 = "(แล้วคุณครูก็ต้องช่วยสำรวจภาคสนามทั้งวันตามคำสั่งของโนโซมิ)"
1011808-102 = "(ดูเหมือนว่าโนโซมิจะเอาจริงเอาจังกับงาน ไม่เหมือนที่บอกไว้ว่าทำลวกๆ ก็พอ)"

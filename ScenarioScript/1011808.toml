[translation]
1011808-1 = "意外的面貌"
1011808-2 = "（在希望的請求下，一起前去勘查預計要進行鐵道施工的地點）"
1011808-4 = "哎呀～Good Morning！"
1011808-5 = "[s]「早啊，希望！」"
1011808-6 = "謝謝老師願意來～！噗哈哈！"
1011808-7 = "本來是要兩個人去的，結果不知道為什麼變得只剩我一個人。"
1011808-8 = "自己去實在挺無聊的對吧？"
1011808-9 = "[s1]「呵呵……」\n[s2]「其實我正好也很無聊！」"
1011808-12 = "噗哈哈！那正好！"
1011808-13 = "今天就好好玩得開心點……"
1011808-14 = "啊不對，好好實地勘查吧！"
1011808-15 = "[s]「你剛才說出真心話了吧？」"
1011808-17 = "來～這裡是候選一號。"
1011808-18 = "[s]「要確認什麼呢？」"
1011808-19 = "今天只要確認報告書寫的內容是否正確就行了。簡單吧？"
1011808-20 = "CCC會在實施可行性調查之前，先來進行實地勘查。"
1011808-21 = "比如這裡就是第一次勘查中，判定有開通潛力的地方哦。"
1011808-22 = "假如增加急行路線就能和D.U.地區串連，#n資金籌措預計也會進行得挺順利的……大概是這樣吧。"
1011808-23 = "[s]「希望……」"
1011808-24 = "為什麼要那樣看著我？"
1011808-25 = "[s]「你看起來超級專業的耶！？」"
1011808-26 = "呵，厲害吧？"
1011808-27 = "……"
1011808-28 = "噗……"
1011808-29 = "噗哈！噗哈哈！"
1011808-33 = "老師的表情也太好笑了吧！"
1011808-34 = "你該不會以為我真的理解剛才說的那些吧？"
1011808-35 = "我只是照著報告書唸而已啦！"
1011808-36 = "[s]「……我還以為是真的！」"
1011808-37 = "哼哼哼～對高層說話的時候，裝懂可是必備技能啊。"
1011808-38 = "而且我何必去理解那些難懂的內容呢？#n我只要能開車就滿足了。"
1011808-39 = "不過我剛才演得很自然吧？"
1011808-40 = "今天的實地勘查就當作是來玩……或者出門透透氣就行了！"
1011808-41 = "[s3]「真，真的可以嗎？」\n[s4]「感覺是很重要的工作耶！？」"
1011808-44 = "反正我們就算提出實地勘查的意見也沒什麼意義。"
1011808-45 = "高地人內部有好幾個派系，只要某一派贊成，其他派就會反對。"
1011808-46 = "所以只要隨意寫點輕鬆的報告書交差就好了！"
1011808-47 = "[s]「不會有問題嗎……」"
1011808-48 = "安啦安啦，目前為止也沒出過什麼事啊。"
1011808-49 = "大部分學生都很認真地在維修和運行列車。"
1011808-50 = "各自做好自己份內的事就行了。"
1011808-51 = "啊～老實說我真想不管什麼勘查還是評估之類的，直接把整個奇普托斯鋪滿鐵道。"
1011808-52 = "用鐵道連接每個角落，讓所有人想去哪就去哪。"
1011808-53 = "就連樓頂、公園、拉麵店都不例外！"
1011808-57 = "一臉「那太誇張了吧……」的表情。噗哈哈！"
1011808-58 = "雖然我們有派系之類的……#n不過老師你的立場，某方面來說不也跟我有點類似嗎？"
1011808-59 = "[s]「嗯？那是什麼意思……」"
1011808-60 = "畢竟夏萊的管轄範圍橫跨了好幾間學園……"
1011808-61 = "老師要考慮到的事情也很多，感覺就很複雜啊？"
1011808-62 = "[s5]「傾聽學生的想法，為學生指點方向就是我的職責。」\n[s6]「不會考慮到政治因素。」"
1011808-65 = "哼嗯～"
1011808-66 = "意思是會對每個學生都一視同仁，公平對待囉？"
1011808-67 = "[s]「嗯，當然要公平。」"
1011808-71 = "什麼嘛～那種態度。"
1011808-72 = "總覺得有點討厭！噗哈哈！"
1011808-73 = "[s7]「其實我也不確定自己做的對不對。」\n[s8]「畢竟老師我還是菜鳥嘛。」"
1011808-79 = "[ns9]「但是現在，在我面前的學生是希望。」\n[ns10]「所以現在，希望就是我最在意的人。」"
1011808-82 = "什麼啦～！噗哈哈！好好笑！"
1011808-83 = "不過這麼說也對，老師確實是菜鳥嘛。"
1011808-87 = "那麼今天就照老師說的……"
1011808-92 = "允許你最在意我吧！#n來，要出發囉！"
1011808-94 = "（於是整天都在希望的帶領下跑來跑去）"
1011808-102 = "（雖然他嘴上那麼說，其實在實地勘查時做得非常認真）"

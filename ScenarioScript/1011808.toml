[translation]
1011808-1 = "Unexpected Side"
1011808-2 = "Nozomi asked me along to a railway construction site field survey."
1011808-4 = "Good morning!"
1011808-5 = "[s] \"Morning, Nozomi!\""
1011808-6 = "Thanks for coming! Pahyahya!"
1011808-7 = "It was a job for two, but I ended up going solo."
1011808-8 = "And it'd be boring by myself, you know?"
1011808-9 = "[s1] \"Fufu...\"\n[s2] \"I also happened to be bored!\""
1011808-12 = "Pahyahya! That's nice, then!"
1011808-13 = "All right, let's go have some fun..."
1011808-14 = "...I mean, get some work done!"
1011808-15 = "[s] \"That sounded like you meant it just now.\""
1011808-17 = "Okay! This is the first thing to check."
1011808-18 = "[s] \"What am I checking, exactly?\""
1011808-19 = "We just need to see if this written report is accurate. Pretty simple, yeah?"
1011808-20 = "Preliminary feasibility study. CCC is doing a survey before construction starts."
1011808-21 = "For example, this place was approved for the opening of a new train line during the first survey."
1011808-22 = "If we build an express line here, it'll be connected to the D.U. district. That'll help streamline the funding allocation process."
1011808-23 = "[s] \"Nozomi...\""
1011808-24 = "What? What's with that look?"
1011808-25 = "[s] \"You look so capable right now, you know?\""
1011808-26 = "Heh, I'm not ALWAYS jokey."
1011808-27 = "..."
1011808-28 = "Pff..."
1011808-29 = "Pfft! Pahyahya!"
1011808-33 = "Sensei, your face looks so funny!"
1011808-34 = "Did I have you believing I understood a word of that?!"
1011808-35 = "I just read it straight off the report!"
1011808-36 = "[s] \"Yeah, I thought so.\""
1011808-37 = "Fufufu... Well, you know, when you're dealing with higher-ups, you have to at least LOOK like you know what you're talking about."
1011808-38 = "But somebody else can take care of all that complicated stuff. I just drive the trains."
1011808-39 = "Although I did sound pretty convincing just now, didn't I?"
1011808-40 = "Today's another field survey, so we can goof around some more. Call it a change of pace."
1011808-41 = "[s3] \"I-Is that really okay?\"\n[s4] \"Isn't this an important job?!\""
1011808-44 = "You know, even if we did take this seriously, and write up all our opinions, it wouldn't matter."
1011808-45 = "There are multiple factions in Highlander. If one side says, \"do this,\" the other one's pretty much always going to say, \"No, do that.\""
1011808-46 = "All I've gotta do here is go through the motions."
1011808-47 = "[s] \"I do wonder if that's okay...\""
1011808-48 = "Well, it's worked so far."
1011808-49 = "Most students are busy doing maintenance and operations."
1011808-50 = "As long as everyone does their own job, we're good."
1011808-51 = "Although...if I could, I'd love to just lay tracks across all of Kivotos, and not have to bother with the paperwork."
1011808-52 = "Then I could go where I wanted."
1011808-53 = "Parks, ramen shops, rooftops..."
1011808-57 = "...You look like you want to say something. Pahyahya!"
1011808-58 = "You know, speaking of factions, I bet you can relate to that, huh, Sensei?"
1011808-59 = "[s] \"Hm? What do you mean?\""
1011808-60 = "Well, Schale also works across all these different academies."
1011808-61 = "You've got to balance all their needs, their wants... That must get complicated."
1011808-62 = "[s5] \"My role is to listen to students and provide direction.\"\n[s6] \"I try to leave politics out of it.\""
1011808-65 = "Hmm."
1011808-66 = "So you treat every student fair and square?"
1011808-67 = "[s] \"Yeah. I need to.\""
1011808-71 = "Well..."
1011808-72 = "...then that's unfair to me! Pahyahya!"
1011808-73 = "[s7] \"Honestly, it's a tricky balancing act.\"\n[s8] \"I'm still learning on the job.\""
1011808-79 = "[ns9] \"But right now, you're the student in front of me.\"\n[ns10] \"Right now, I care about you most.\""
1011808-82 = "Pfft, what're you saying all of a sudden? Pahyahya! You're funny!"
1011808-83 = "Yep, you're learning on the job, huh?"
1011808-87 = "Well, like you said..."
1011808-92 = "I'll make you care about me the most today! Come on, hurry!"
1011808-94 = "And so, I went around all day following Nozomi's lead."
1011808-102 = "For all her goofiness, she actually worked hard on the survey."

[translation]
1009303-1 = "คุณคิราระที่เข้ามาอย่างไม่ลังเล"
1009303-10 = "ครู ไฮฮาย ฮาย..."
1009303-11 = "เฮ้อ..."
1009303-12 = "[ns1] \"รู้สึกเอเนอจี้น้อยกว่าปกติแฮะ\"\n[ns2] \"ไม่เคยเจอคิราระเวอร์ชันไม่สดใสเลยนะเนี่ย?!\""
1009303-18 = "อะฮ่าฮ่า ฉันก็ว่าจะทำตัวเป็นปกติแล้วเชียว แต่โดนจับได้สินะ... "
1009303-19 = "ก็อย่างที่บอกไปใน MOMOTALK ว่าฉันทำข้อสอบไม่ได้เลย..."
1009303-20 = "ฉันก็ไม่ได้สนใจเรื่องเกรดมากเท่าไร แต่ว่าก็ไม่ได้อยากสอบตกแบบนี้หรอก"
1009303-21 = "พอสอบตกก็เลยไปไม่เป็นน่ะ..."
1009303-22 = "[s] \"ข้อสอบยากเหรอ?\""
1009303-23 = "ไม่หรอก... นี่ไม่ใช่ปัญหาเรื่องความยาก..."
1009303-24 = "แต่ฉันดันอ่านหนังสือสอบผิดเรื่องน่ะสิ!"
1009303-25 = "[s] \"อ่านสอบผิดเรื่อง?\""
1009303-26 = "ก็ใช่น่ะสิ~ ฉันอุตส่าห์จัดปาร์ตี้ชุดนอนกับเพื่อนๆ เพื่อให้มาติวหนังสือด้วยกันเลยนะ"
1009303-27 = "[s] \"สมกับที่เป็นคิราระเลย!\""
1009303-28 = "เรามารวมตัวกันแล้วก็เม้าท์มอย เสร็จแล้วก็ตั้งหน้าตั้งตาอ่านหนังสือสอบด้วยกัน"
1009303-29 = "ฉันคิดว่า 'ตั้งใจอ่านแค่นี้ก็สมบูรณ์แบบแล้วละ~!' แล้วก็คิดว่าทำได้ดีแล้วด้วย... "
1009303-30 = "แต่ในวันสอบ พอฉันเห็นข้อสอบ... ถึงได้รู้ว่าเรื่องที่ฉันอ่านมามันไม่ตรงกับเรื่องที่ออกสอบเลยน่ะสิ!"
1009303-31 = "[s] \"อ่า... เป็นเรื่องที่เกิดขึ้นได้น่ะ...\""
1009303-32 = "แล้วพอทำข้อสอบไม่ได้ ฉันก็เลยสอบตก เหมือนโดนข้อสอบแกล้งกันเลย~!"
1009303-33 = "แต่ก็เอาเถอะ!"
1009303-34 = "ครูช่วยติวหนังสือให้ฉันหน่อยสิ! นะ? ฉันต้องสอบซ่อมอาทิตย์หน้าน่ะ"
1009303-35 = "ถ้าฉันอ่านคนเดียวก็น่าจะง่วงคอพับไปแน่ๆ แต่ถ้าชวนเพื่อนๆ มาเดี๋ยวก็เอาแต่เม้าท์มอยกันฉ่ำ..."
1009303-36 = "ตอนนี้ฉันมีแค่ครูแล้วนะ!"
1009303-37 = "[s3] \"เข้าใจแล้ว ครูจะช่วยเอง\"\n[s4] \"ได้ งั้นเรามาติวแบบเร่งด่วนกัน!\""
1009303-43 = "ขอบคุณนะครู! ฉันจะตั้งใจอ่านเลย!"
1009303-45 = "(แล้วการติวหนังสือส่วนตัวกับคิราระในห้องพักผ่อนชาเล่ต์ก็เริ่มขึ้น...)"
1009303-53 = "ว้าว อย่างนี้เองสินะ! ถ้าแทนค่าในสูตรก็จะง่ายแบบนี้นี่เอง!"
1009303-54 = "ครูรู้วิธีได้ยังไงกันน่ะ?"
1009303-55 = "[s] \"ก็ครูดูเฉลยมาแล้วน่ะ\""
1009303-56 = "อะไรเนี่ย! แบบนี้โกงกันหรือเปล่า?"
1009303-57 = "อะฮ่าฮ่า! ฉันล้อเล่นหรอกนะ ล้อเล่นน่ะ"
1009303-62 = "[ns] (หืม...?)"
1009303-63 = "งั้นสอนแก้โจทย์ข้อต่อไปด้วยสิ! ถ้ามีครูช่วยอธิบายให้ ฉันว่าฉันจำได้ดีกว่าตอนทำคนเดียวน่ะ!"
1009303-64 = "ข้อต่อไปให้ลองหมุนแผนผังดู จะได้ง่ายขึ้นงั้นเหรอ?"
1009303-65 = "ไหนดูซิ..."
1009303-69 = "เอ๋? จริงด้วยแฮะ พอมองมุมกลับก็ได้คำตอบเลย...!"
1009303-70 = "อะฮ่าฮ่า! ทำไมฉันถึงคิดไม่ได้ตั้งแต่แรกน้า~"
1009303-71 = "[s] (อืม... พอได้อยู่ข้างๆ คิราระ... อืมมม~)"
1009303-75 = "ครู!"
1009303-76 = "[s] \"หืม...?\""
1009303-78 = "เหมือนครูจะมือใหญ่กว่าฉันเลย ขอลองเทียบมือหน่อยได้มั้ย?"
1009303-79 = "เอ้า วางปากกาลงก่อน~"
1009303-83 = "ต่อไปก็แบมือออก แล้วก็เอาฝ่ามือมาประสานกัน..."
1009303-84 = "เอ๋? ก็ใกล้เคียงกันนี่?"
1009303-85 = "อะฮ่าฮ่า! แต่ว่ามือของครูอุ่นกว่าของฉันนะ อบอุ่นจนฉันรู้สึกดีเลย!"
1009303-86 = "[ns] (ใกล้เกินไปแล้ว...!)"
1009303-90 = "เป็นอะไรไปล่ะครู? ทำไมทำตาโตแบบนั้นล่ะ ตกใจอะไรงั้นเหรอ?"
1009303-91 = "อะฮ่าฮ่า! หรือว่า..."
1009303-92 = "เห็น UFO ที่บินอยู่นอกหน้าต่างเหรอ~?!"
1009303-93 = "[s] \"ไม่ใช่หรอก คิราระ ครูว่า... มันใกล้ไปหน่อยหรือเปล่า\""
1009303-94 = "อะไรเหรอ? ตารางสอบซ่อมน่ะเหรอ?"
1009303-95 = "[s5] \"จะ... จริงสินะ ไม่หรอก ไม่มีอะไร\"\n[s6] (ใช่ คิราระมีเจตนามาเพื่อติวหนังสือสอบเท่านั้นละ...)"
1009303-98 = "อะฮ่าฮ่า! ไม่ต้องเป็นห่วงนะ! ฉันจะตอบแทนที่ครูช่วยติวหนังสือฉันด้วยคะแนนสอบดีๆ ให้เอง!"
1009303-99 = "เพราะงั้นช่วยอธิบายโจทย์ข้อต่อไปหน่อยนะ!"
1009303-101 = "(การติวหนังสือเสร็จสิ้นลงด้วยดี...)"
1009303-102 = "(แต่ระหว่างการติว คุณครูก็ง่วนอยู่กับการเอนตัวหลบคิราระที่เข้ามาอยู่ใกล้ๆ จนแทบจำไม่ได้ว่าติว#nเนื้อหาอะไรไปบ้าง)"

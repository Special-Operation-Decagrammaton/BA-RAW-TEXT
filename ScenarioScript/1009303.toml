1009303-18 = "3;키라라 반짝부;08;아하하, 평소처럼 하려고 했는데, 티 났으려나…….\n#3;em;[땀]"
1009303-19 = "3;키라라 반짝부;06;그게, 모모톡으로 말했듯이 시험을 완전히 망쳐 버렸거든."
1009303-20 = "3;키라라 반짝부;07;성적에 큰 관심은 없지만, 그래도 낙제만큼은 늘 피해 왔단 말야.\n#3;stiff"
1009303-21 = "3;키라라 반짝부;10;역시 조금 충격이었달까……?\n#3;em;[세로선]"
1009303-22 = "[s] \"시험 문제가 어렵게 나온 거야?\""
1009303-23 = "3;키라라 반짝부;04;아니…… 문제 난이도보다는……."
1009303-24 = "3;키라라 반짝부;10;사실은 내가 시험 범위를 착각했어!\n#3;closeup"
1009303-25 = "[s] \"시험 범위를?\""
1009303-26 = "3;키라라 반짝부;07;그게 말이야~ 시험을 앞두고 친구들하고 모여서 열심히 공부하자고…… 파자마 파티를 열었는데.\n#3;em;[속상함]\n#3;hophop"
1009303-27 = "[s] \"그건 엄청 키라라답네!\""
1009303-28 = "3;키라라 반짝부;06;그렇게 해서 모여서 같이 수다를 떨고 합심해서 열심히 시험공부를 하고."
1009303-29 = "3;키라라 반짝부;10;이만하면 완벽해~! 하는 정도로 열심히! 또 잘했다고 생각했는데……."
1009303-30 = "3;키라라 반짝부;07;막상 시험 당일날…… 시험지를 열어보니까…… 처음부터 시험 범위를 착각하고 있었던 거 있지?!\n#3;jump\n#3;em;[!]"
1009303-31 = "[s] \"아…… 가끔 있지, 그런 일…….\""
1009303-32 = "3;키라라 반짝부;07;결국 그거 때문에 시험에서 낙제해 버렸지 뭐야. 너무해~!\n#3;hophop\n#3;m2"
1009303-33 = "3;키라라 반짝부;99;아무튼아무튼!\n#3;m3"
1009303-34 = "3;키라라 반짝부;06;공부 좀 가르쳐 주라! 응? 보충 시험, 일주일 뒤란 말야.\n#3;closeup\n#3;a"
1009303-35 = "3;키라라 반짝부;10;혼자서 하면 졸릴 것 같고, 그렇다고 또 친구들을 부르면 떠들면서 놀 것 같고…….\n#3;closeup"

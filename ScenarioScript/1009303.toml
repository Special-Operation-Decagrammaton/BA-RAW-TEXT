[translation]
1009303-1 = "直來直往的綺羅羅同學"
1009303-10 = "老師，哈囉哈囉…………"
1009303-11 = "唉……"
1009303-12 = "[ns1]「跟平常相比，你今天也太沒活力了吧！？」\n[ns2]「我還是第一次看到你這麼無精打采的樣子！？」"
1009303-18 = "啊哈哈，本來想裝作跟平常一樣的，結果還是被發現了嗎……"
1009303-19 = "那個，就跟我在MomoTalk上講的一樣，我這次考試徹底考砸了。"
1009303-20 = "雖然我並不是很在意成績，但還是一直有盡力避免不及格……"
1009303-21 = "所以這次才會有點沮喪……"
1009303-22 = "[s]「這次考試很難嗎？」"
1009303-23 = "不……跟考試的難度無關……"
1009303-24 = "是我搞錯考試範圍了！"
1009303-25 = "[s]「搞錯考試範圍？」"
1009303-26 = "就是啊～其實在考試之前，我為了好好複習……特地找了一些朋友來開睡衣派對。"
1009303-27 = "[s]「還真像綺羅羅的作風！」"
1009303-28 = "就這樣，我們大家一邊聊天，一邊專心地準備考試。"
1009303-29 = "到這裡為止～我們都還算是很認真！#n我也自認進行得挺順利的……"
1009303-30 = "然而到了考試當天……#n我一看到考卷才發現……自己竟然從一開始就記錯了考試範圍！！"
1009303-31 = "[s]「啊……有時候的確會發生這種事……」"
1009303-32 = "總之這次就是因為這樣才會考不及格的，真的好糟哦～！"
1009303-33 = "所以～！"
1009303-34 = "拜託你教教我！可以嗎？#n一個星期後就要補考了。"
1009303-35 = "我擔心自己一個人會讀到睡著，但如果找朋友一起，一定又會忍不住嘻笑打鬧……"
1009303-36 = "現在只能依靠老師了！"
1009303-37 = "[s3]「知道了，我會幫你的。」\n[s4]「好，開始臨時補課吧！」"
1009303-43 = "謝謝你，老師！我保證一定會很認真的！"
1009303-45 = "（於是便開始在夏萊的休息室，幫綺羅羅一對一上課……）"
1009303-53 = "哇，原來如此！只要帶入這個公式，這題就能輕鬆答對了！"
1009303-54 = "老師，你到底是怎麼知道的啊？"
1009303-55 = "[s]「因為……我看了答案？」"
1009303-56 = "什麼啦！這樣不是犯規嗎？"
1009303-57 = "啊哈哈！開玩笑的。"
1009303-62 = "[ns]（嗯……？）"
1009303-63 = "那你接著教我下一題吧！#n因為有老師在一旁講解，感覺比我自己讀的時候順利多了！"
1009303-64 = "你說下一題只要把圖形轉個方向就會變得很簡單？"
1009303-65 = "我試試看……"
1009303-69 = "咦？真的只要轉個方向，答案就自己出現了耶……太神奇了！"
1009303-70 = "啊哈哈！我竟然完全沒發現，怎麼會犯這種錯呢～"
1009303-71 = "[s]（綺羅羅整個人貼了過來……唔唔唔～）"
1009303-75 = "老師。"
1009303-76 = "[s]「……嗯？」"
1009303-78 = "你的手好像比我大耶，可以跟我比比看手掌大小嗎？"
1009303-79 = "來來來，你先把筆放下～"
1009303-83 = "嗯，只要像這樣把手張開，然後貼在一起……"
1009303-84 = "咦？好像差不多？"
1009303-85 = "啊哈哈！不過你的體溫好像比我高一點，摸起來熱熱的真舒服！"
1009303-86 = "[ns]（又是這種過於親密的距離……！）"
1009303-90 = "你怎麼了，老師？#n為什麼眼睛睜那麼大，而且還一副驚慌失措的表情？怎麼了嗎？"
1009303-91 = "啊哈哈！難道是……"
1009303-92 = "在窗外看到UFO了嗎～！？"
1009303-93 = "[s]「不是……綺羅羅，你好像有點……不對，是太近了。」"
1009303-94 = "什麼意思？是說我距離補考及格很近了嗎？"
1009303-95 = "[s5]「啊，那個，其實也沒什麼啦。」\n[s6]（沒錯，綺羅羅只是單純想好好讀書而已……）"
1009303-98 = "啊哈哈！別擔心！#n老師都這麼努力教我了，我一定會用成績報答你的！"
1009303-99 = "所以趕快解釋下一題給我聽吧！"
1009303-101 = "（雖然後來課程同樣進行得很順利……）"
1009303-102 = "（但由於綺羅羅總是會突然若無其事地拉近距離，#n　害人有點暈頭轉向，根本不知道時間是怎麼過的）"

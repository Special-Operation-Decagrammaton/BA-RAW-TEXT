[translation]
1009303-1 = "Kirara's Confident Approach"
1009303-10 = "Heya, Teach... Hey..."
1009303-11 = "*sigh*"
1009303-12 = "[ns1] \"Where's all your usual energy?!\"\n[ns2] \"I've never seen you so down, Kirara!\""
1009303-18 = "Haha... I was hoping I could play it off, but I guess it didn't work."
1009303-19 = "So, the thing is, you know that test I mentioned on MomoTalk? The one I totally tanked...?"
1009303-20 = "I mean, it's not like I've ever been a model student, but I've always made sure to not fail."
1009303-21 = "It was...a bit shocking, I guess?"
1009303-22 = "[s] \"Were the test questions difficult?\""
1009303-23 = "Not really... They weren't that hard, but..."
1009303-24 = "I didn't realize how much stuff was gonna be covered!"
1009303-25 = "[s] \"What do you mean?\""
1009303-26 = "So, um, how do I say this? Heehee! The night before, I hosted a pajama party with some friends...a study pajama party!"
1009303-27 = "[s] \"That does sound just like you, Kirara!\""
1009303-28 = "So we all hung out, talked a little, studied a lot..."
1009303-29 = "I actually studied really hard!"
1009303-30 = "But then, the next day, I opened the test...and I realized it covered way more material than I realized! You know what I mean?!"
1009303-31 = "[s] \"Ah... That can happen every once in a while...\""
1009303-32 = "And that's why I failed! Isn't that super unfair?"
1009303-33 = "Anyways, anyways!"
1009303-34 = "Help me with studying! Okay? My make-up test is in a week!"
1009303-35 = "I'll totally fall asleep if I study by myself, but, realistically, my friends and I would just hang around and have fun."
1009303-36 = "That's why you're the only one who can help me, Teach!"
1009303-37 = "[s3] \"All right. I'm in.\"\n[s4] \"Of course! Tutoring session, begin!\""
1009303-43 = "Thank you, Teach! I'll super promise to work really hard."
1009303-45 = "Those were the circumstances under which I started tutoring Kirara at the Schale lounge."
1009303-53 = "Whoa! I get it... Once you use that equation, it's totally easy!"
1009303-54 = "How'd you know all that, Teach?"
1009303-55 = "[s] \"Because I have the answer sheet?\""
1009303-56 = "What the heck! Isn't that cheating?"
1009303-57 = "Hahaha! I'm joking! Joking!"
1009303-62 = "[ns] \"(Huh...?)\""
1009303-63 = "Help me with the next question too! It goes so much faster with you explaining!"
1009303-64 = "It's easier if I turn the shape sideways?"
1009303-65 = "Where? How?"
1009303-69 = "Whoa! If I turn my body to look at it sideways, it's easier to understand! How cool!"
1009303-70 = "Hahaha! How come I didn't see this before?"
1009303-71 = "[s] \"(Um, Kirara is so close to me... Uh...)\""
1009303-75 = "Teach."
1009303-76 = "[s] \"...Yes?\""
1009303-78 = "Your hands look lots bigger than mine, can we compare?"
1009303-79 = "Okay, put down your pen! Just for a sec."
1009303-83 = "Put your hand out, and I'll put mine against yours..."
1009303-84 = "Wah?! They're kinda similar..."
1009303-85 = "Hahaha! But your hands are warmer than mine! It feels nice!"
1009303-86 = "[ns] \"(As expected, she has no sense of boundaries...!)\""
1009303-90 = "What's with that look on your face, Teach? You look like you just saw a ghost. What's wrong?"
1009303-91 = "Hahaha! By chance..."
1009303-92 = "Did you see a UFO out the window?!"
1009303-93 = "[s] \"Actually... Um, Kirara. I think we're...a bit close, right now...\""
1009303-94 = "What's close? Close to passing the make-up test? I hope so!"
1009303-95 = "[s5] \"Y-Yeah! That's what I meant...\" \n[s6] \"(Kirara is just focused on passing her test...)\""
1009303-98 = "Hahaha! Stop worrying so much, Teach! I'll repay your hard work with a perfect score!"
1009303-99 = "All right! Next question!"
1009303-101 = "The tutoring session did end well..."
1009303-102 = "...but Kirara's lack of boundaries was pretty overwhelming. The whole thing was a blur."

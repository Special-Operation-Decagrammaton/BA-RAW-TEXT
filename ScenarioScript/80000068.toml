80000068-17 = "3;코토리;02;네, 정답! 바로 그것입니다! 역시 선생님, 척하면 척이시군요!\n#3;em;[반짝]\n#3;hophop"
80000068-18 = "3;코토리;03;아무래도 선생님, 오늘은 많이 바쁘실 것 같은 느낌도 있고 말이죠……. 제가 시간을 많이 빼앗기도 어려울 것 같고…….\n#3;em;[반응]"
80000068-19 = "3;코토리;99;아니면 반대로, 선생님께선 발렌타인 데이나 초콜릿의 유래 정도는 이미 알고 계실지도 모르고……."
80000068-20 = "3;코토리;01;여러 가지 고민을 한 끝에, 어느 상황에서도 자연스러울 수 있는 것을 나름대로 고민해 보았답니다."
80000068-21 = "3;코토리;02;바로 이게 그 답이란 거죠. 최초의 발렌타인 초콜릿을 그대로 본떠 만든, 말하자면 발렌타인 초콜릿 복원품!\n#3;em;[재잘]\n#3;greeting"

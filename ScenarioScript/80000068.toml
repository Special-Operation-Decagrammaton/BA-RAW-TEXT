[translation]
80000068-1 = "情人節巧克力的起源"
80000068-2 = "……啊，老師！真巧呢！"
80000068-3 = "今天是情人節唷！所以我準備了巧克力！"
80000068-4 = "雖然很想藉這個難得的機會，和老師一起到會議室去說明情人節的起源……"
80000068-5 = "[s1]「該，該怎麼辦呢……」\n[s2]「總之巧克力我就感激地收下了……？」"
80000068-6 = "也，也對……今天果然不需要什麼冗長的引言和說明！"
80000068-7 = "也，也對……今天果然不需要什麼冗長的引言和說明！"
80000068-8 = "那麼，我準備的就是這個！鏘鏘──！！"
80000068-13 = "老師覺得怎麼樣啊？？"
80000068-14 = "[s3]「真是懷舊的風格……這個是……」\n[s4]「難道這就是起源的說明……？」"
80000068-15 = "哼哼哼……！"
80000068-16 = "哼哼哼……！"
80000068-17 = "不愧是老師，完全正確！！"
80000068-18 = "總覺得老師今天會很忙，我也不好意思佔用老師太多時間來說明……"
80000068-19 = "除此之外，也想過老師會不會早就已經知道情人節和巧克力的由來……"
80000068-20 = "左思右想的結果就是這個。"
80000068-21 = "這就是答案也是說明。#n我試著重現了據說是在情人節的概念剛出現時，就被製作出來的有名的巧克力，#n也就是「原始情人節巧克力」！"
80000068-25 = "既簡單明瞭又能順便作為說明，我想應該不錯！#n那麼既然東西已經交給老師了，我就先走一步──"
80000068-32 = "……囉？"
80000068-33 = "[s5] 抓住亞都梨\n[s6]「要不要再多說點話？」"
80000068-34 = "……咦？"
80000068-35 = "……咦？"
80000068-36 = "這我倒是沒想過……"
80000068-37 = "沒必要刻意節省時間……？"
80000068-38 = "……啊。"
80000068-39 = "想要和我一起吃……？"
80000068-43 = "呵呵……果然只要和老師在一起，就會連續有驚人的發現呢。"
80000068-44 = "要對老師說明的話，時間還遠遠不夠。"
80000068-45 = "正好那邊的會議室是空的，我們就一起去享用巧克力吧！"
80000068-46 = "還有，那個……"
80000068-50 = "……謝謝你，老師。"
80000068-52 = "（之後就和亞都梨一起在會議室享用了美味的巧克力）"
80000068-56 = "（而且最後還是聽了亞都梨，對情人節起源等等話題怒濤般的說明）"

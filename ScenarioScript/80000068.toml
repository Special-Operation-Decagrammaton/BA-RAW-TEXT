[translation]
80000068-1 = "The Origins of Valentine's Day Chocolate"
80000068-2 = "A-ha! Hello, Sensei!"
80000068-3 = "I've prepared you chocolate! Why? Because it's Valentine's Day of course!"
80000068-4 = "I first thought to celebrate with you by giving a lecture on the history of Valentine's Day, but..."
80000068-5 = "[s1] \"Y-You can tell me next time.\"\n[s2] \"Let's just enjoy the day.\""
80000068-6 = "Okay, but if you need an explanation please tell me immediately!"
80000068-7 = "Okay, but if you need an explanation please tell me immediately!"
80000068-8 = "So anyway, I prepared this for you! Ta-da!"
80000068-13 = "What do you think? I need your opinion!"
80000068-14 = "[s3] \"The packaging looks really old-fashioned.\"\n[s4] \"You're still going to give me that lecture, huh?\""
80000068-15 = "Heehee..."
80000068-16 = "Heehee..."
80000068-17 = "Correct! You're as stellar a student as you are a teacher, Sensei!"
80000068-18 = "But I thought you would be busy, so I didn't want to talk your ear off too much."
80000068-19 = "And knowing you, Sensei, you may already be aware of the origin of Valentine's Day."
80000068-20 = "So after a lot of thought, I came up with a great solution!"
80000068-21 = "I made a replica of the first-ever Valentine's chocolate!"
80000068-25 = "Okay, that's all! Thanks, Sensei! Bye-bye!"
80000068-32 = "Huh?"
80000068-33 = "[s5] Grab Kotori.\n[s6] \"Wait! Don't go.\""
80000068-34 = "S-Sensei? This wasn't part of my plan."
80000068-35 = "S-Sensei? This wasn't part of my plan."
80000068-36 = "What's that?"
80000068-37 = "You don't need a lecture, but you like spending time with me?#nI'm confused..."
80000068-38 = "Oh..."
80000068-39 = "Y-You want us to share it?"
80000068-43 = "You're just full of surprises, Sensei."
80000068-44 = "I think I can explain everything in this world except for you."
80000068-45 = "Okay! The next classroom is empty. Let's go there and eat!"
80000068-46 = "Also..."
80000068-50 = "Thank you, Sensei."
80000068-52 = "Kotori and I shared her chocolate in the classroom."
80000068-56 = "I ended up hearing her lecture on the history of Valentine's Day anyway."

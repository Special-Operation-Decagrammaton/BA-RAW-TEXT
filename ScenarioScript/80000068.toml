80000068-1 = "#title;발렌타인 초콜릿의 기원"
80000068-2 = "3;코토리;01;……아! 선생님! 안녕하세요!!\n#3;em;[반응]\n#3;hophop\n#3;a"
80000068-3 = "3;코토리;02;오늘은 발렌타인 데이입니다! 발렌타인 데이이니, 그에 맞게 저도 초콜릿을 준비했죠!"
80000068-4 = "3;코토리;99;음……. 사실 마음 같아서는 선생님과 함께 강의실에 가서, 발렌타인 데이의 기원에 대한 이야기를 나누고 싶기도 하지만…….\n#3;em;…"
80000068-5 = "[s1] \"서, 설명은 나중에 하자.\"\n[s2] \"오늘은 기념일을 즐기자…….\""
80000068-6 = "3;코토리;05;하하하……. 역시 그게 맞겠죠? 설명이 필요하실 때라면 언제든 제가 달려갈 테니까요!\n#3;em;[음표]\n#3;greeting"
80000068-7 = "3;코토리;05;하하하……. 역시 그게 맞겠죠? 설명이 필요하실 때라면 언제든 제가 달려갈 테니까요!\n#3;em;[음표]\n#3;greeting"

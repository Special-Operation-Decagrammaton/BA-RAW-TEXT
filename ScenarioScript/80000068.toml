[translation]
80000068-1 = "ที่มาของช็อกโกแลตวันวาเลนไทน์"
80000068-2 = "อ๊ะ...! คุณครู! สวัสดีค่ะ!!"
80000068-3 = "วันนี้เป็นวันวาเลนไทน์ค่ะ! ฉันเลยเตรียมช็อกโกแลตวันวาเลนไทน์มาให้คุณครูค่ะ!"
80000068-4 = "อืม... ที่จริงฉันอยากไปที่ห้องเรียนกับคุณครูแล้วอธิบายถึงความเป็นมาของวันวาเลนไทน์..."
80000068-5 = "[s1] \"อะ...เอาไว้ค่อยเล่าทีหลังได้นะ\"\n[s2] \"วันนี้เรามาสนุกกับเทศกาลก่อนดีมั้ย...\""
80000068-6 = "แหะๆๆ ก็ได้ค่ะ แต่ถ้าคุณครูอยากฟังประวัติความเป็นมาของวันวาเลนไทน์ละก็บอกฉันได้ตลอดเลยนะคะ!"
80000068-7 = "แหะๆๆ ก็ได้ค่ะ แต่ถ้าคุณครูอยากฟังประวัติความเป็นมาของวันวาเลนไทน์ละก็บอกฉันได้ตลอดเลยนะคะ!"
80000068-8 = "วันนี้ฉันเตรียมสิ่งนี้มาด้วยค่ะ! แต่นแต๊น~!!"
80000068-13 = "เป็นยังไงคะ? คุณครูเห็นว่าเป็นยังไงบ้างคะ?"
80000068-14 = "[s3] \"กล่องดูวินเทจดีนะ\"\n[s4] \"จะอธิบายเรื่องกล่องนี้แทนเหรอ?\""
80000068-15 = "ฮิฮิ ฮิฮิฮิ...! "
80000068-16 = "ฮิฮิ ฮิฮิฮิ...! "
80000068-17 = "ถูกต้องนะคะ! คุณครูเป็นคนเก่งสมกับที่เป็นคุณครูจริงๆ!"
80000068-18 = "ฉันรู้ว่าวันนี้คุณครูก็คงจะยุ่งมากๆ เหมือนเดิม... ฉันไม่ควรจะทำให้คุณครูเสียเวลา..."
80000068-19 = "และบางทีคุณครูอาจจะทราบความเป็นมาเรื่องช็อกโกแลตวันวาเลนไทน์แล้วก็ได้..."
80000068-20 = "ฉันคิดอยู่นานแล้วก็ได้ข้อสรุปว่าจะลองหาสิ่งที่ดูเข้าได้กับทุกสถานการณ์มาค่ะ"
80000068-21 = "ซึ่งก็คือเจ้านี่ค่ะ นั่นก็คือช็อกโกแลตที่จำลองมาจากช็อกโกแลตวาเลนไทน์ชิ้นแรกค่ะ!"
80000068-25 = "ฉันเลยอยากมอบมันให้กับคุณครูค่ะ คิดว่าเท่านี้ก็น่าจะแทนคำอธิบายได้แล้ว เพราะงั้นวันนี้#nฉันขอตัวก่อน...!"
80000068-32 = "คะ...?"
80000068-33 = "[s5] จับโคโทริเอาไว้\n[s6] \"อย่าเพิ่งกลับสิ\""
80000068-34 = "เอ๋...? คุณครู? ฉันไม่คิดเลยว่าจะเป็นแบบนี้..."
80000068-35 = "เอ๋...? คุณครู? ฉันไม่คิดเลยว่าจะเป็นแบบนี้..."
80000068-36 = "คะ...?"
80000068-37 = "เรื่องอธิบายไว้ก่อนได้ แต่อยากใช้เวลาอยู่กับฉันเหรอคะ...? หมายความว่ายังไงคะ?"
80000068-38 = "อ๊ะ..."
80000068-39 = "ให้กินช็อกโกแลตด้วยกันเหรอคะ? ฉัน...กับคุณครู...?"
80000068-43 = "ฮิฮิ... คุณครูน่ะ ชอบทำให้ตกใจอยู่เรื่อยเลยนะคะ"
80000068-44 = "ฉันคิดว่าคุณครูอาจเป็นคนเดียวในโลกนี้ที่ฉันยังไม่สามารถอธิบายออกมาเป็นคำพูดได้นะคะ"
80000068-45 = "ก็ได้ค่ะ! ห้องเรียนข้างๆ ว่างอยู่พอดี เราเข้าไปนั่งกินในนั้นเถอะค่ะ!"
80000068-46 = "แล้วก็..."
80000068-50 = "ขอบคุณนะคะ คุณครู"
80000068-52 = "(หลังจากนั้นคุณครูกับโคโทริก็เข้าไปนั่งกินช็อกโกแลตด้วยกันในห้องเรียน)"
80000068-56 = "(และสุดท้ายโคโทริก็อดไม่ได้ที่จะสาธยายความเป็นมาของวันวาเลนไทน์ให้คุณครูฟัง)"

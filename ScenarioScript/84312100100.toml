84312100100-5 = "3;리오;02;……그동안 고생 많았어, 유리조노 세이아.\n#3;a"
84312100100-6 = "3;리오;03;덕분에 밀레니엄 엑스포도 큰 탈 없이 끝날 수 있었어. 너와 네루의 공이 커."
84312100100-7 = "3;세이아;02;아…… 그러고 보니 오늘이 마지막 날이네요. 더 이상 밤중에 잠입하거나 하는 일은 없겠군요.\n#3;em;[반응]"
84312100100-8 = "3;세이아;99;……뭐랄까, 역시……"

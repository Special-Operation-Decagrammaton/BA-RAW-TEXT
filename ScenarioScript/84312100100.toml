84312100100-13 = "3;네루 교복;07;앙? 뭔 소리야? 언제라도 자다 깰 수 있는 이런 일, 빨리 끝나 버리는 게 속 편하지."
84312100100-14 = "3;네루 교복;24;아무튼 그럼 이제 돌아가는 건가? 우리가 이야기하는 것도 지금이 끝이네?"
84312100100-15 = "3;리오;01;그렇다고 할 수 있지. 더 이상 일어날 일은 없고, 나도 이제는 돌아가야 하니까."
84312100100-16 = "5;세이아;04;지금 바로요……? 아직 엑스포가 완전히 끝나지는 않았는데?\n#5;em;[?]\n#3;m1\n#5;al"
84312100100-17 = "3;리오;00;실질적으로는 끝난 것이나 다름없으니까. 오늘 행사가 끝나면 곧바로 폐장이고, 트리니티 학생들도 돌아가지."
84312100100-18 = "3;리오;99;누군가 일을 꾸미고 있었다면 어제까지였지만…… 시연장과 캠퍼스 내에는 더 이상 아무것도 없다는 걸 확인했거든."
84312100100-19 = "5;세이아;01;(확인했다……? 없다고 판단했다……가 아니라?)\n#5;stiff"
84312100100-20 = "3;리오;02;그리고 무엇보다 두 사람이……\n#3;em;[반응]"

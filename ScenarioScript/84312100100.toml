[translation]
84312100100-5 = "...Good work, Yurizono Seia."
84312100100-6 = "Mostly thanks to you and Neru, the Millennium Expo ended without a catastrophe."
84312100100-7 = "Ah... Come to think of it, it's the last day today. There won't be any nightly infiltrations from now on."
84312100100-8 = "As I thought. Well..."
84312100100-9 = "...that's a little sad."
84312100100-13 = "Huh? What are you saying? Aren't you sick of waking up in the middle of the night to run out and work? I'd be glad to be done with that."
84312100100-14 = "Anyway, are you heading back right away? We might not get to talk again for a while."
84312100100-15 = "True. Now that the threat's gone, I'll have to go as well."
84312100100-16 = "Right now...? But the Expo isn't quite over yet."
84312100100-17 = "It might as well be. After this last event today, it will close immediately, and the Trinity students will all go home."
84312100100-18 = "If anyone was planning anything, it would have happened by yesterday. But we confirmed there aren't any threats left. Not in the Exhibition Hall, and nowhere on campus."
84312100100-19 = "(How do you confirm a thing like that?)"
84312100100-20 = "And more than anything else, you two..."
84312100100-25 = "...You two worked hard until this point. So on your behalf, I officially predict that nothing else will happen inside the Exhibition Hall."
84312100100-27 = "Rio..."
84312100100-29 = "I never thought I'd hear you say something that nice. My baby is all grown up..."
84312100100-30 = "...? What are you saying? You and I are the same age, Neru."
84312100100-34 = "...Not ALL grown up, I guess."
84312100100-35 = "Anyway, I should get going too. I'll tell Sensei that everything worked out fine."
84312100100-36 = "Oh, were you still keeping Sensei in the loop?"
84312100100-37 = "...? Of course. Is that a problem?"
84312100100-38 = "No, no problem."
84312100100-39 = "It's good you came back to watch over the school, but Sensei is Sensei. Whenever students get involved in something like this, it's good to keep Sensei on call."
84312100100-40 = "It's not like Sensei ever micromanages us, or gets in our way."
84312100100-41 = "Just to illustrate that, the whole reason Seia can get away with being a part of this is because Sensei is turning a blind eye."
84312100100-43 = "That's true. Then I should update Sensei as well."
84312100100-44 = "...I'll have to talk to them separately before I go back, about this and that."
84312100100-45 = "It will take some time to organize my things. I'm sure nothing will happen...but on the off chance something does, let me know."
84312100100-46 = "And this is a personal request, but you don't have to tell Sensei TOO much about my involvement..."
84312100100-47 = "No worries there. Sensei already told me that they'll talk with you some other time."
84312100100-48 = "What concerns me more is... Hm..."
84312100100-49 = "...? You're still concerned?"
84312100100-54 = "IS there something else going on?"
84312100100-55 = "Well, I can't say for certain. I might be worried about nothing."
84312100100-56 = "...I should go say my goodbyes around campus."
84312100100-57 = "Could you...wait to leave until I come back, Rio?"
84312100100-61 = "...? That's fine..."
84312100100-62 = "Fufu, I'll get going, then."
84312100100-63 = "You want an escort?"
84312100100-64 = "No, it's fine. As Rio said, anything that could be suspicious has already been checked..."
84312100100-65 = "It should be fine. Probably."

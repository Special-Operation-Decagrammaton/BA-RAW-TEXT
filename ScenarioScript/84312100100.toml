[translation]
84312100100-5 = "ที่ผ่านมาทำได้ดีมาก ยูริโซโนะ เซอา..."
84312100100-6 = "ในที่สุดงานมิลเลเนียม เอ็กซ์โปครั้งนี้ก็จบลงได้โดยไม่มีปัญหาอะไรใหญ่โต เธอกับเนรุมีส่วนช่วยเยอะเลยละ"
84312100100-7 = "อ่า... จะว่าไปแล้ว นี่คือวันสุดท้ายสินะคะ ต่อไปคงไม่ได้แทรกซึมไปทำอะไรกลางดึกอีกแล้วสินะ"
84312100100-8 = "จะว่ายังไงดี..."
84312100100-9 = "น่าเสียดายเหมือนกันนะคะ"
84312100100-13 = "หืม? หมายความว่ายังไงน่ะ? ไม่มีงานแบบนี้สิดี ตอนกลางคืนจะได้นอนหลับสบายสักที"
84312100100-14 = "แล้วนี่จะกลับเลยเหรอ? งั้นการพูดคุยของเราคงจบลงแค่ตรงนี้สินะ?"
84312100100-15 = "จะว่าอย่างนั้นก็ได้ จากนี้คงไม่มีเรื่องอะไรเกิดขึ้นแล้ว ฉันเองก็ต้องกลับแล้วละ"
84312100100-16 = "ตอนนี้เลยเหรอคะ...? แต่งานเอ็กซ์โปยังไม่จบอย่างสมบูรณ์เลยนี่คะ?"
84312100100-17 = "ในความเป็นจริงก็เหมือนกับจบแล้วละ ถ้าจบนิทรรศการของวันนี้ก็คงปิดงานทันที แล้วนักเรียนโรงเรียนทรีนิตี้ก็คงกลับกันเลยด้วย"
84312100100-18 = "คงไม่มีใครคิดจะทำอะไรแล้วละ... ฉันไปตรวจสอบมาแล้วว่าไม่มีอะไรน่าสงสัยในห้องสาธิต หรือในบริเวณโรงเรียนแล้ว"
84312100100-19 = "(ไปตรวจสอบ...? ปกติจะวิเคราะห์จากที่นี่ไม่ใช่เหรอ...?)"
84312100100-20 = "และที่สำคัญ พวกเธอทั้งสองคน..."
84312100100-25 = "พวกเธอทั้งสองคนก็พยายามมามากถึงขนาดนี้แล้ว ฉันเลยคิดว่าในห้องสาธิตไม่น่ามีอะไรน่าสงสัย#nอีกแล้วละ"
84312100100-27 = "ริโอะ..."
84312100100-29 = "เกิดอะไรขึ้นน่ะ? ทำไมพูดจาดี ไม่สมกับเป็นเธอเลย? เด็กน้อยของฉันโตเป็นผู้ใหญ่แล้วเหรอเนี่ย?"
84312100100-30 = "พูดอะไรน่ะ...? ฉันกับเธออายุเท่ากันนะ เนรุ"
84312100100-34 = "อ้าว~ ยังไม่โตนี่นา~"
84312100100-35 = "งั้นฉันคงต้องขอตัวกลับบ้างแล้วละ ฉันต้องไปรายงานกับครูด้วยว่าทุกอย่างจบลงด้วยดีแล้ว"
84312100100-36 = "หลังจากนี้ก็จะรายงานสถานการณ์กับครูตลอดเหรอ?"
84312100100-37 = "ก็ใช่น่ะสิ ทำไม มีปัญหาอะไรเหรอ...?"
84312100100-38 = "เปล่า ไม่มีหรอก"
84312100100-39 = "ที่เธอมาดูแลเรื่องของโรงเรียนมันก็ดีหรอกนะ แต่ครูก็เป็นครู ถ้ามีเรื่องอะไรเกิดขึ้นระหว่างนักเรียน ก็ต้องมีคนรายงานให้ครูรู้สิ"
84312100100-40 = "และถึงจะรายงานไป ครูก็ไม่ได้มาแทรกแซงหรือทำให้เรารำคาญใจในทุกเรื่องนี่นา?"
84312100100-41 = "ที่เซอามาร่วมมือกับพวกเราแบบนี้ ส่วนหนึ่งก็เพราะครูช่วยหลับหูหลับตาให้ด้วย"
84312100100-43 = "มันก็จริงค่ะ ถ้างั้นก็แปลว่าคุณครูก็รู้เกี่ยวกับสถานการณ์ในตอนนี้ทั้งหมดเลยสินะคะ"
84312100100-44 = "ก่อนจะกลับไป ฉันคงต้องไปบอกอะไรเป็นการส่วนตัวแล้วละค่ะ"
84312100100-45 = "ฉันน่าจะใช้เวลาในการเก็บของนานหน่อย ระหว่างนี้คงไม่เกิดเรื่องอะไรขึ้นหรอก... แต่ถ้ามีเรื่องอะไรขึ้นมาก็ติดต่อมานะ"
84312100100-46 = "และนี่คือคำขอส่วนตัวของฉัน ช่วยอย่าบอกอะไรเกี่ยวกับฉันให้ครูรู้มากไปล่ะ..."
84312100100-47 = "เรื่องนั้นไม่ต้องห่วงหรอกค่ะ คุณครูบอกไว้ว่าน่าจะมีโอกาสในการพูดคุยกับริโอะต่างหาก เป็นการส่วนตัวน่ะค่ะ"
84312100100-48 = "ส่วนเรื่องที่ฉันเป็นกังวลมากกว่าน่ะ... อืม..."
84312100100-49 = "เรื่องที่เป็นกังวล...?"
84312100100-54 = "อะไรเหรอ เกิดเรื่องอะไรอีกแล้วเหรอ?"
84312100100-55 = "ไม่หรอกค่ะ ฉันยังพูดอย่างแน่ชัดไม่ได้น่ะค่ะ ฉันอาจจะแค่วิตกกังวลเกินกว่าเหตุก็ได้ค่ะ"
84312100100-56 = "ฉันต้องไปบอกลาคนอื่นด้วย งั้นฉันจะไปเดินรอบๆ โรงเรียนแล้วกลับมานะคะ"
84312100100-57 = "ไม่ทราบว่า... คุณจะอยู่รอฉันถึงตอนนั้นได้มั้ยคะ ริโอะ?"
84312100100-61 = "ก็ได้อยู่หรอก..."
84312100100-62 = "ฮุฮุ ถ้างั้นฉันจะรีบไปรีบกลับนะคะ"
84312100100-63 = "ให้ฉันไปด้วยมั้ย?"
84312100100-64 = "ไม่ค่ะ ไม่เป็นไรค่ะ ริโอะเองก็บอกไว้ว่าไม่น่ามีส่วนที่น่าสงสัยแล้ว..."
84312100100-65 = "ฉันว่าไม่น่ามีอะไรหรอกค่ะ อาจจะนะคะ"

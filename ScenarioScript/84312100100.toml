84312100100-34 = "3;네루 교복;24;아~ 아직 덜 컸네~."
84312100100-35 = "3;네루 교복;01;아무튼 그럼 나도 슬슬 돌아가 볼까. 선생한테도 어떻게 잘 끝났다고 보고해야 하고.\n#3;greeting"
84312100100-36 = "1;리오;04;이후로도 계속 선생에게 상황을 공유하고 있던 거야?\n#1;em;[땀]"
84312100100-37 = "3;네루 교복;23;……? 당연하지. 왜, 문제 있냐?"
84312100100-38 = "1;리오;99;아니, 없어."
84312100100-39 = "3;네루 교복;00;네가 학교 챙기러 온 건 좋은 일이지만, 그래도 선생은 선생이야. 학생들 사이에서 이런저런 일이 벌어지는데, 누군가는 말해 줘야지.\n#3;em;[반응]"
84312100100-40 = "3;네루 교복;01;말한다고 뭐 사사건건 간섭하거나 귀찮게 구는 것도 아니잖아?"
84312100100-41 = "3;네루 교복;99;당장 세이아도 선생이 눈감아 주고 있으니 우리랑 이 짓 하고 있는 거고."
84312100100-42 = "#all;hide"
84312100100-43 = "3;세이아;99;하긴 그랬었죠. 그러면 선생님은 지금의 상황도 다 알고 계시겠군요.\n#3;em;…"
84312100100-44 = "3;세이아;02;……돌아가기 전에 따로 말씀도 좀 드려야겠네요, 이것저것."
84312100100-45 = "1;리오;02;짐을 정리하는 데에는 조금 시간이 걸릴 거야. 무슨 일이 있진 않겠지만…… 그 사이에라도 무슨 일이 생기면 연락해 줘.\n#1;em;[반응]\n#1;ar\n#3;m5"
84312100100-46 = "1;리오;07;그리고 이건 내 개인적인 부탁이지만, 선생에게 나에 대해서 너무 자세한 이야기는……\n#1;stiff"
84312100100-47 = "3;세이아;03;그 부분이라면 괜찮아요. 선생님 또한, 리오와의 이야기는 직접 나중에 할 기회가 있을 거라 하셨으니까요."

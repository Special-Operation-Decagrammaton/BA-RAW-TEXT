[translation]
84312100100-5 = "……這段時間辛苦你了，百合園聖亞。"
84312100100-6 = "多虧有你，千年博覽會才能順利結束。#n你跟寧瑠實在功不可沒。"
84312100100-7 = "啊……話說今天就是最後一天了呢。#n我恐怕再也不會在半夜潛入了吧。"
84312100100-8 = "該怎麼說呢……我果然……"
84312100100-9 = "還是覺得有點捨不得。"
84312100100-13 = "啊？你在說什麼啊？#n像這種半夜隨時可能驚醒的事，還是快點結束比較讓人安心。"
84312100100-14 = "所以你現在要回去了嗎？#n像這樣說話也得到此為止了？"
84312100100-15 = "可以這麼說吧。#n既然已經不會再發生事情，我也是時候該回去了。"
84312100100-16 = "這麼快……？#n博覽會明明還沒完全結束耶？"
84312100100-17 = "實質上就跟已經結束了一樣。#n今天活動結束後就會立刻清場，三一的學生也會回去。"
84312100100-18 = "如果有人在策劃什麼事，那也只到昨天為止……#n我已經確認過展示場和校園內沒有任何異常了。"
84312100100-19 = "（確認過……？而不是認為沒有……？）"
84312100100-20 = "最重要的是你們兩個……"
84312100100-25 = "你們兩個都付出了那麼多努力，我相信展示場不會再出現可疑的動靜了。"
84312100100-27 = "莉央……"
84312100100-29 = "太陽打西邊出來了嗎？說話這麼好聽還真不像你。#n總算長大了嗎？"
84312100100-30 = "……突然在說什麼？#n你和我的年紀明明一樣啊，寧瑠。"
84312100100-34 = "啊～看來還差得遠呢～"
84312100100-35 = "那我也該回去了。#n畢竟還得跟老師報告事情順利結束了。"
84312100100-36 = "你在那之後也一直在跟老師回報情況嗎？"
84312100100-37 = "……當然啊。#n怎麼？有問題嗎？"
84312100100-38 = "不，沒有。"
84312100100-39 = "你來關心學園固然很好，但老師終究是老師……#n學生之間發生了那麼多事，總得有人告訴他一聲吧。"
84312100100-40 = "何況又不是跟他說了就要麻煩他插手每件事。"
84312100100-41 = "而且聖亞也是多虧老師睜一隻眼閉一隻眼，才能像這樣跟我們一起行動。"
84312100100-43 = "的確是這樣沒錯。#n目前的情況原來都在老師的掌握之中啊。"
84312100100-44 = "……看來在回去之前，得另外跟他聊聊了。"
84312100100-45 = "整理行李還需要一點時間。#n雖然可能性不高……但萬一這段期間出了什麼事的話就聯絡我吧。"
84312100100-46 = "還有，雖然這只是我私人的請求……#n希望你不要跟老師提到太多關於我的事……"
84312100100-47 = "這不成問題。#n因為老師他也說過，之後還有其他機會能直接跟莉央談談。"
84312100100-48 = "他在意的反而是……嗯……"
84312100100-49 = "……在意？"
84312100100-54 = "怎麼，還有什麼事嗎？"
84312100100-55 = "不，我現在還無法斷定。#n或許只是我在杞人憂天吧。"
84312100100-56 = "……我打算去跟大家道別，所以會到校園裡繞一圈。"
84312100100-57 = "為了以防萬一……你願意等我回來嗎，莉央？"
84312100100-61 = "……？#n這倒是沒關係……"
84312100100-62 = "呵呵，那我去去就回。"
84312100100-63 = "需要跟你一起去嗎？"
84312100100-64 = "沒關係。畢竟莉央剛才也說確認過所有可疑的地方了……"
84312100100-65 = "我想應該沒問題的。"

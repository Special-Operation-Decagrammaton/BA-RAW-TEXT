[translation]
84300200600-11 = "I brought the goods. You got the payment?"
84300200600-15 = "Of course. We have a contract. You're not nervous now, are you?"
84300200600-16 = "As promised, if all goes well, you'll have your 25% cut."
84300200600-17 = "You want to know how much that is?"
84300200600-18 = "Well, it depends on how well you handle your work! So we'll leave that up to you."
84300200600-20 = "Right. That was the deal."
84300200600-21 = "Causing \"the Catastrophe of the Millennium Expo,\" though, that's...ambitious."
84300200600-26 = "*gasp*"
84300200600-27 = "(What...? A catastrophe?)"
84300200600-29 = "I mean, making money's great and all, but..."
84300200600-30 = "Listen, friends. No one ever got rich doing what everyone else does."
84300200600-31 = "If you want to make piles of money, you've got to do what no one else has dreamed of yet."
84300200600-32 = "First one across the finish line gets the gold! You got it?"
84300200600-33 = "On that note, I have more sales pitches to make."
84300200600-34 = "If anything happens, call me! I'll see you later!"
84300200600-41 = "(They're going to ruin the Millennium Expo...for profit...?)"
84300200600-42 = "This is...preposterous..."
84300200600-43 = "(Eep, I said that out loud!)"
84300200600-45 = "Huh? What? Did you hear that?"
84300200600-46 = "No way... If we get found out, we're dead meat."
84300200600-47 = "Especially if the C&C finds us! And then we won't even get paid!"
84300200600-48 = "Let's get out of here, first off. This is freaking me out."
84300200600-49 = "I'm going! Keep up!"
84300200600-53 = "H-Hey! Don't leave me!"
84300200600-59 = "(...Whew.)"
84300200600-60 = "(They almost caught me.)"
84300200600-65 = "Hmph. I missed them. Almost had them that time."
84300200600-66 = "(...?)"
84300200600-67 = "(Is that...)"
84300200600-74 = "Hey."
84300200600-75 = "(...?)"
84300200600-76 = "Hey, you. Aren't you going to respond?"
84300200600-80 = "You there. Yeah, you. You gonna keep ignoring me, after you ruined my plan?"
84300200600-81 = "(...!)"
84300200600-82 = "Come out. I'm not going to hit you. You don't seem like someone I want to fight."

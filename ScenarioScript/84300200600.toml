[translation]
84300200600-11 = "來，我按照約定把東西拿過來了。#n款項會確實給吧？"
84300200600-15 = "不是，我們約都簽了，你怎麼現在還懷疑那種事？"
84300200600-16 = "只要這件事能順利進行，我就會按照合約準～確把25%的利益交給你們。"
84300200600-17 = "至於能拿到多少……"
84300200600-18 = "全都取決於各位「能做到什麼程度」！#n所以那方面的事，還要繼續拜託各位囉！"
84300200600-20 = "也對，合約確實是那樣寫的。"
84300200600-21 = "……但是搞砸千年博覽會來獲得利益，實在不像普通人會想出來的事。"
84300200600-26 = "（……！？）"
84300200600-27 = "（什麼……？搞砸博覽會……？）"
84300200600-29 = "就是說啊。#n一般都是「做得好」才能創造收益吧。"
84300200600-30 = "啊～各位！那麼老實是賺不到錢的知道嗎？"
84300200600-31 = "能夠致富的人，本來就是可以想到別人想不到的事情的人。"
84300200600-32 = "換句話說，最初就是最好！#n……明白了嗎？"
84300200600-33 = "好！那麼我就先告辭了！#n除了各位之外，我還有很多業務要忙呢。"
84300200600-34 = "有什麼問題可以隨時聯絡我！下次見～！"
84300200600-41 = "（搞砸千年博覽會……獲得利益……？）"
84300200600-42 = "這實在太荒謬了……"
84300200600-43 = "（……！！啊，不小心就脫口而出了……！）"
84300200600-45 = "嗯？怎麼了？#n剛才是不是有說話的聲音？"
84300200600-46 = "怎麼可能……要是真是那樣就糟了。#n不是說過要小心別被發現嗎？"
84300200600-47 = "尤其如果被C&C逮到就完蛋了……！#n合約上也寫著這樣會拿不到款項，難道你忘了嗎！？"
84300200600-48 = "先，先趕快離開這裡吧。#n我總覺得很不安，有股被人盯著看的感覺……"
84300200600-49 = "我先走了！你也趕快跟上來吧……！"
84300200600-53 = "喂，喂！等等啊！！"
84300200600-59 = "（……呼）"
84300200600-60 = "（差點就被發現了……）"
84300200600-65 = "啊……嘖，被他們逃了啊。#n我還以為逮到了說。"
84300200600-66 = "（……？）"
84300200600-67 = "（那個人是……）"
84300200600-74 = "喂。"
84300200600-75 = "（……？）"
84300200600-76 = "喂，那邊的人，為什麼不回答？"
84300200600-80 = "對，我說的就是你。躲在箱子裡面的你。#n都是你害計畫泡湯了，難道還要繼續無視我嗎？"
84300200600-81 = "（……！）"
84300200600-82 = "出來吧。#n我看你也沒有想打架的意思，所以我也不會攻擊你的。"

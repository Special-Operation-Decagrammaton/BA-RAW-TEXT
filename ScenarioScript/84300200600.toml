[translation]
84300200600-11 = "เอ้านี่ ฉันเอาของมาให้ตามที่คุยกันไว้แล้ว จะจ่ายเงินให้แน่ๆ ใช่มั้ย?"
84300200600-15 = "เราทำสัญญากันเรียบร้อยแล้วนะคะ จะมาสงสัยอะไรแบบนั้นได้ยังไงกัน?"
84300200600-16 = "ก็บอกไปแล้วนี่คะว่าถ้างานนี้สำเร็จลุล่วงไปได้ด้วยดี ฉันจะแบ่งกำไรให้ 25% ตามที่ระบุไว้ในสัญญาน่ะ"
84300200600-17 = "แต่สุดท้ายแล้วจะได้ไปจำนวนเท่าไร... ทั้งหมดมันก็ขึ้นอยู่กับว่า"
84300200600-18 = "พวกคุณ 'จัดการงานนี้ได้ดีแค่ไหน'! เพราะงั้นต่อไปก็ฝากจัดการให้ดีด้วยนะคะ!"
84300200600-20 = "ใช่ พวกเราทำสัญญากันไว้แบบนั้น"
84300200600-21 = "แต่การทำลายงานมิลเลเนียม เอ็กซ์โปเพื่อหาผลประโยชน์น่ะ มันไม่ใช่ความคิดที่ปกติเลยนะ..."
84300200600-26 = "(...!?)"
84300200600-27 = "(ว่ายังไงนะ...? ทำลายงานเอ็กซ์โปงั้นเหรอ...?)"
84300200600-29 = "แต่ก็เอาเถอะ แค่ 'ทำให้ดี' แล้วหาเงินมาให้ได้ก็พอ"
84300200600-30 = "โธ่~! จริงๆ เลย ทุกคนคะ! ถ้าคิดว่าต้องขยันเท่านั้นก็หาเงินไม่ได้หรอกค่ะ เข้าใจมั้ยคะ?"
84300200600-31 = "คนที่ได้นั่งอยู่บนกองเงินกองทองน่ะ ปกติแล้วเขาจะคิดในสิ่งที่คนอื่นคิดไม่ถึงกันค่ะ"
84300200600-32 = "พูดอีกนัยหนึ่งก็คือ คิดทำก่อน ก็รวยได้ก่อนค่ะ เข้าใจหรือยังคะ...?"
84300200600-33 = "เอาละๆ! ถ้างั้นฉันขอตัวก่อน! นอกจากทำงานกับพวกคุณแล้ว ฉันยังมีเรื่องอื่นให้จัดการอีกเยอะค่ะ"
84300200600-34 = "ถ้ามีปัญหาอะไรก็ติดต่อมานะคะ! แล้วเจอกันใหม่ค่ะ~!"
84300200600-41 = "(ทำลายงานมิลเลเนียม เอ็กซ์โป... เพื่อหาเงิน...?)"
84300200600-42 = "ไม่อยากจะเชื่อเลย..."
84300200600-43 = "(อ๊ะ...!! เผลอพูดออกเสียงไปจนได้...!)"
84300200600-45 = "หืม? อะไรน่ะ? เมื่อกี้เหมือนได้ยินเสียงพูดเลย?"
84300200600-46 = "จะเป็นแบบนั้นไปได้ยังไง...? ถ้ามีใครอยู่จริงๆ ก็เรื่องใหญ่น่ะสิ เราโดนกำชับว่าอย่าให้ใครรู้นะ"
84300200600-47 = "ยิ่งถ้าเป็น C&C ละก็ พวกเราจบเห่แน่...! ในสัญญาบอกเอาไว้ว่าถ้ามีใครโดนจับได้ พวกเราจะไม่ได้ส่วนแบ่งเลยนะ!?"
84300200600-48 = "ระ... รีบออกไปจากที่นี่ก่อนดีกว่า ฉันรู้สึกเหมือนมีสายตาจากใครจับจ้องอยู่ก็ไม่รู้..."
84300200600-49 = "ฉันไปก่อนนะ! เธอก็ตามมาล่ะ...!"
84300200600-53 = "นี่ เดี๋ยวก่อน! ไปด้วยกันสิ!!"
84300200600-59 = "(ฮู่ว...)"
84300200600-60 = "(เกือบโดนจับได้แล้วไง...)"
84300200600-65 = "ฮึ่ย... หนีไปได้งั้นเหรอ นึกว่าจับตัวได้ครบทุกคนแล้วซะอีก"
84300200600-66 = "(...?)"
84300200600-67 = "(คนคนนั้นคือ...)"
84300200600-74 = "นี่!"
84300200600-75 = "(...?)"
84300200600-76 = "นี่ ตรงโน้นน่ะ ฉันเรียกทำไมไม่ตอบ?"
84300200600-80 = "เธอนั่นแหละ เธอที่อยู่ในกล่องน่ะ แผนของฉันพังก็เพราะเธอ แล้วยังจะมาอยู่เฉยๆ อีกเหรอ?"
84300200600-81 = "(...!)"
84300200600-82 = "ออกมาเลย ตอนนี้ฉันไม่มีอารมณ์สู้กับใคร ไม่ต้องกลัวฉันลงไม้ลงมือหรอก"

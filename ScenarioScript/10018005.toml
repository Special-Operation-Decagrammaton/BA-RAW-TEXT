[translation]
10018005-1 = "Prologue; Could You Repeat That?"
10018005-4 = "Did you enjoy your food?"
10018005-9 = "Yeah, definitely. It was pretty good."
10018005-10 = "(Honestly, it was a bit lacking...)"
10018005-11 = "(But, considering the size of the restaurant and the fact that it's run by one person, it passes.)"
10018005-12 = "I especially liked the ozoni special."
10018005-13 = "The key to good ozoni is the grilled rice cake, and this one had a perfect fluffiness value."
10018005-14 = "The other dishes were impressive too."
10018005-15 = "It was a straightforward, neatly prepared menu."
10018005-20 = "The grilled fish was good."
10018005-21 = "Its skin was crispy, but the flesh was well-marinated and soft."
10018005-22 = "It was all good. I just wish the portions were a little bigger."
10018005-23 = "...You would think that no matter what size the portions were."
10018005-24 = "I liked everything!"
10018005-25 = "It would have been even more delicious if you used curry powder, vinegar, and syrup!"
10018005-26 = "You're the only one who'd like that!"
10018005-31 = "Haha. Let me get the check."
10018005-32 = "Thank you. I'm glad that my final guests were nice people."
10018005-36 = "Final guests?"
10018005-37 = "Yes... The Sparrow restaurant will be closing."
10018005-42 = "Oh?"
10018005-43 = "Huh?"
10018005-44 = "What?! Why?!"
10018005-51 = "That's too bad. I was happy to find a good restaurant."
10018005-52 = "Yeah! It was really yummy. I'd eat anything from this place!"
10018005-53 = "Coming from you, that's not saying much..."
10018005-54 = "You were pretty impressed too, weren't you, Junko?"
10018005-58 = "Well..."
10018005-59 = "I guess I was thinking about how long it's been since I tasted something this delicious."
10018005-60 = "And every time we have something really good, it's always been followed by something going wrong, for some reason."
10018005-61 = "I think that's mostly a you thing, Junko. ★"
10018005-62 = "Only me?! Don't try to act like you guys aren't normally the reason!"
10018005-63 = "I wonder if we'll ever be able to find a restaurant like this again."
10018005-64 = "It feels like we just found treasure but it's being stolen right in front of us."
10018005-65 = "The small portions make it a small treasure, but the analogy speaks to me."
10018005-72 = "We will not yield so easily."
10018005-77 = "What do you mean? It's not like there's anything we can do."
10018005-78 = "You're right. If we had known about this place a little earlier, we could've promoted it, but now..."
10018005-79 = "Now all we can do is watch it disappear... It's a bit sad."
10018005-81 = "Heehee. Do you think I wouldn't have a plan?"
10018005-82 = "Maybe I know people who could..."
10018005-83 = "...lend a helping hand."

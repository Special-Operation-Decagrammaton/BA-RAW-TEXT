[translation]
10018005-1 = "序幕;麻雀亭的危機"
10018005-4 = "味道如何？"
10018005-9 = "嗯，很不錯。"
10018005-10 = "（雖然這麼說，還是稍嫌可惜呢……）"
10018005-11 = "（還有進步的空間……）"
10018005-12 = "我尤其喜歡正月菜單上的「年糕湯」。"
10018005-13 = "年糕烤得恰到好處，美麗的膨脹度為新年的氛圍更添幾分愉悅……"
10018005-14 = "其他如春捲和煮物也很精緻。"
10018005-15 = "雖然都是常見的菜色，但也正因如此，才更凸顯出手藝的精湛。"
10018005-20 = "我覺得烤魚非常棒！"
10018005-21 = "烤得焦黃酥脆的外皮和滲入其中的調味，兩者間達到了絕妙的平衡。"
10018005-22 = "雖然份量上有點美中不足，但除此之外都很滿意～"
10018005-23 = "能讓亞伽里滿意的量，那得是多少啊……"
10018005-24 = "真的很好吃──！"
10018005-25 = "不過啊，如果能撒上咖哩粉和糖漿的話，感覺會更美味！"
10018005-26 = "那個光是用聽的就很不妙吧！？"
10018005-31 = "老闆娘，麻煩結帳。"
10018005-32 = "要結帳了是吧？非常感謝。#n能讓最後的客人吃得開心，我也很滿足了。"
10018005-36 = "最後的意思是……？"
10018005-37 = "非常抱歉，麻雀亭餐廳即將要結束營業了。"
10018005-42 = "哎？"
10018005-43 = "耶？"
10018005-44 = "咦咦咦！？明明這麼好吃，怎麼會！？"
10018005-51 = "真是遺憾。我還想說難得找到了間不錯的店。"
10018005-52 = "對呀！真的是間不錯的店～#n所有的菜色我都喜歡！"
10018005-53 = "你有什麼食物是不喜歡的嗎……？"
10018005-54 = "淳子同學雖然嘴上這麼說，不也對這間店的味道印象深刻嗎？"
10018005-58 = "這個嘛，那是因為……"
10018005-59 = "上次能像這樣安安穩穩地吃飯，已經不知道是多久以前的事了。"
10018005-60 = "每次只要想吃美食，就一定會出事。"
10018005-61 = "我覺得那種情況，好像只會發生在淳子同學身上唷★"
10018005-62 = "討厭，為什麼每次都是我！"
10018005-63 = "要是能再找到類似的店就好了～"
10018005-64 = "這種失落感，就像是好不容易找到了寶箱，裡面卻空空如也……"
10018005-65 = "這個比喻我很能體會。#n因為盤子裡的菜，總是會在不知不覺間就消失了。"
10018005-72 = "不行，不能這麼簡單就放棄。"
10018005-77 = "嗯？不能放棄是什麼意思？#n事到如今，我們還能做些什麼嗎？"
10018005-78 = "就是說啊……如果能早一點知道這家店的話，至少還能幫忙宣傳。"
10018005-79 = "但現在只能眼睜睜地看著它消失……有點悲傷呢。"
10018005-81 = "我有個主意。"
10018005-82 = "唔呵呵……"
10018005-83 = "就交給我吧。"

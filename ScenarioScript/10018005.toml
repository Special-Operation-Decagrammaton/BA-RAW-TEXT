[translation]
10018005-1 = "บทเริ่มต้น;เมื่อกี๊พูดว่าอะไรนะคะ?"
10018005-4 = "อาหารเป็นยังไงบ้างคะ?"
10018005-9 = "รสชาติใช้ได้เลยค่ะ"
10018005-10 = "(แต่สำหรับฉันแล้ว ฉันว่าน่าเสียดายนิดหน่อย...)"
10018005-11 = "(แต่พอดูจากขนาดของร้าน และคุณเจ้าของคอยดูแลร้านคนเดียวแบบนี้ ก็ถือว่าผ่านละค่ะ)"
10018005-12 = "ยิ่งกว่านั้น เมนูพิเศษอย่าง \"โอโซนิ\" เองก็น่าพอใจมากด้วยค่ะ"
10018005-13 = "หัวใจสำคัญของโอโซนิก็คือโมจิย่างค่ะ จะต้องย่างด้วยไฟที่แรงพอเหมาะ และให้ตรงกลางพองได้#nขนาดพอดีค่ะ"
10018005-14 = "อาหารชนิดอื่นเองก็น่าประทับใจมากค่ะ"
10018005-15 = "ถึงจะดูเป็นเมนูที่หาทานที่ไหนก็ได้ แต่ดูเรียบร้อยและสะอาดตาดีมากค่ะ"
10018005-20 = "ฉันชอบปลาย่างนะ"
10018005-21 = "ทั้งหนังปลาที่ย่างจนกรุบกรอบ กับเนื้อชุ่มฉ่ำที่ปรุงรสมาอย่างดี"
10018005-22 = "น่าเสียดายที่ปริมาณน้อยไปหน่อย แต่ทุกอย่างก็อร่อยดีค่ะ"
10018005-23 = "...สำหรับเธอ ปริมาณที่พอดีเนี่ยมันเท่าไหร่กัน..."
10018005-24 = "ฉันก็ว่าดีทุกอย่างเลย!"
10018005-25 = "ผงแกงกะหรี่กับน้ำส้มสายชู พอราดน้ำเชื่อมเติมลงไปก็ยิ่งอร่อยเหาะ!"
10018005-26 = "ใครเขาทำแบบนั้นกันเล่า! มีแค่เธอคนเดียวละมั้งที่อร่อยน่ะ!"
10018005-31 = "ถ้างั้น... รบกวนคิดเงินด้วยค่ะ ฮุฮุ"
10018005-32 = "ขอบคุณค่ะ ดีใจจังที่ลูกค้ากลุ่มสุดท้ายเป็นคนดีแบบนี้น่ะค่ะ"
10018005-36 = "เมื่อกี้พูดว่าลูกค้ากลุ่มสุดท้ายงั้นเหรอคะ?"
10018005-37 = "ค่ะ... ร้านซุซุเมะของเราจะปิดทำการแล้วค่ะ"
10018005-42 = "ตายจริง..."
10018005-43 = "หา?"
10018005-44 = "เอ๋~~~?! ทำไมล่ะ?!"
10018005-51 = "น่าเสียดายนะคะ อุตส่าห์เจอร้านอาหารดีๆ แล้วแท้ๆ"
10018005-52 = "อื้อ! ร้านนี้ดีจริงๆ นะ ฉันน่ะ ถ้าเป็นอาหารของร้านนั้นละก็ ไม่ว่าจะเป็นอาหารอะไรก็กินได้หมดเลย!"
10018005-53 = "มีอะไรที่เธอกินไม่ได้ด้วยรึไง..."
10018005-54 = "คุณจุนโกะเองก็ดูประทับใจร้านนั้นอยู่เหมือนกันนะคะ?"
10018005-58 = "คือว่าเรื่องนั้นน่ะ..."
10018005-59 = "แค่คิดว่าไม่ได้กินของอร่อยๆ... มานานแค่ไหนแล้วน่ะ"
10018005-60 = "มันเหมือนกับว่าเวลาจะได้กินของอร่อยๆ ทีไร จะต้องเกิดเรื่องวุ่นวายทุกที"
10018005-61 = "เรื่องแบบนั้นดูเหมือนจะเกิดแค่กับคุณจุนโกะคนเดียวนะคะ★"
10018005-62 = "ไม่ยุติธรรมเลย! ทำไมถึงเป็นแค่กับฉันเล่า!"
10018005-63 = "จะเจอร้านแบบนี้ได้อีกเมื่อไรกันล่ะเนี่ย?"
10018005-64 = "รู้สึกเหมือนสมบัติที่ค้นพบ จู่ๆ ก็หายไปต่อหน้าต่อตาเลย"
10018005-65 = "ถึงปริมาณจะน้อยไปหน่อย แต่ที่พูดมาเมื่อกี้ฉันเห็นด้วยค่ะ"
10018005-72 = "ไม่ค่ะ จะยอมแพ้แบบนี้ไม่ได้ค่ะ"
10018005-77 = "หืม? ถึงจะบอกว่ายอมแพ้ไม่ได้ก็เถอะ แต่เราจะทำอะไรได้ล่ะ?"
10018005-78 = "นั่นน่ะสิคะ ถ้าพวกเรารู้เร็วกว่านี้อีกสักหน่อย ก็คงจะช่วยโปรโมตร้านได้แล้วแท้ๆ..."
10018005-79 = "พวกเราทำได้แค่คอยดูร้านนี้หายไปงั้นเหรอ... ปวดใจจัง"
10018005-81 = "ฮุฮุ ฉันมีวิธีดีๆ แล้วละค่ะ"
10018005-82 = "คนที่จะช่วยได้ในเวลาแบบนี้..."
10018005-83 = "ฉันรู้จักดีเลยละค่ะ"

[translation]
2001905-1 = "Case 3. เวลาเรียนเหรอคะเนี่ย?"
2001905-3 = "(คุณครูปลีกตัวมาเดินในเมือง เพื่อปลดปล่อยตัวเองจากกองงานที่เพิ่มพูน) "
2001905-4 = "(และตอนนั้นเอง)"
2001905-8 = "สวัสดีค่ะนายท่าน!"
2001905-12 = "[ns] \"อะ... อาคาเนะ?!\""
2001905-13 = "ค่ะ! อาคาเนะของนายท่านเองค่ะ"
2001905-14 = "ฉันมารออยู่ที่นี่ตลอด เผื่อว่าจะได้บังเอิญเจอกับนายท่านค่ะ"
2001905-15 = "[s] \"เผื่อว่าจะบังเอิญ... เจอที่นี่?\""
2001905-16 = "ใช่แล้วค่ะ 'บังเอิญ' ค่ะ"
2001905-17 = "ปกติแล้วการทำแบบนี้ไม่เรียกว่า 'บังเอิญ' งั้นเหรอคะ?"
2001905-18 = "อืม... แต่ฉันคิดว่ามันบังเอิญนะคะ"
2001905-19 = "ฉันรู้ได้ยังไงว่านายท่านจะเดินผ่านทางนี้น่ะเหรอคะ?"
2001905-20 = "เรื่องนั้นน่ะ ทางมิลเลเนียม..."
2001905-21 = "ไม่สิ เป็นเพราะพรหมลิขิตน่ะค่ะ"
2001905-22 = "ตอนนี้ทางชาเล่ต์ดูแลเรื่องความปลอดภัยของคุณครูอยู่ใช่มั้ยคะ?"
2001905-23 = "เพราะงั้นเลยต้องไปขอให้เวอริทัสแชร์ภาพถ่ายดาวเทียมให้..."
2001905-27 = "อ๊ะ ไม่มีอะไรหรอกค่ะ เอาเป็นว่านี่เป็นความบังเอิญที่โชคดีมากเลยค่ะ"
2001905-33 = "การได้บังเอิญพบกันแบบนี้ ถือเป็นปาฏิหาริย์จริงๆ เลยนะคะ"
2001905-34 = "วันนี้จะให้ฉันบริการเรื่องอะไรดีคะ นายท่าน?"
2001905-35 = "[s] \"ใส่ชุดบันนี่เกิร์ลมาถึงที่นี่เลยเหรอ?\""
2001905-36 = "ฉันทำอะไรผิดงั้นเหรอคะ?"
2001905-37 = "ถึงจะบอกว่าเป็นชุดบันนี่เกิร์ลก็เถอะ... แต่มันก็เป็นแค่ชุดเอาไว้บริการนี่คะ"
2001905-42 = "(รับรู้ได้ถึงสายตาทิ่มแทงจากคนรอบข้าง)"
2001905-50 = "(คุณครูรีบจูงมืออาคาเนะเดินออกไปจากตรงนั้นทันที...)"
2001905-57 = "ว้าว..."
2001905-58 = "[s] \"ให้ตายเถอะ ที่นี่มัน...?\""
2001905-59 = "บันนี่เกิร์ลคาเฟ่นี่เอง! ไม่คิดเลยนะคะว่าจะมีคาเฟ่ธีมนี้อยู่ด้วย!"
2001905-60 = "อา... อย่างนี้นี่เอง ฉันดันไม่รู้เองว่าลึกๆ แล้วนายท่านก็ชอบบันนี่เกิร์ลมาก..."
2001905-61 = "เอ๋ เข้าใจผิดงั้นเหรอคะ? ไม่ต้องถ่อมตัวก็ได้นะคะนายท่าน"
2001905-62 = "ฮุฮุ... ไม่เห็นต้องเขินหน้าแดงขนาดนั้นก็ได้ค่ะ"
2001905-63 = "อาคาเนะรู้ดีกว่าใครเลยละค่ะ ว่านายท่านน่ะเป็นคนที่คิดถึงคนอื่นมากๆ ค่ะ"
2001905-67 = "คุณหนู นายท่าน จะสั่งอะไรดีครับ?"
2001905-68 = "เอ๋... อยู่ที่นี่ฉันจะกลายเป็น \"คุณหนู\" สินะคะ"
2001905-69 = "น่าสนุกจังเลยค่ะ ทั้งที่ฉันมีนายท่านเป็นของตัวเองอยู่แล้ว..."
2001905-70 = "ถึงจะเป็นเฉพาะตอนที่อยู่ที่ร้านนี้ก็เถอะ แต่ไม่ต้องห่วงนะคะ ฉันไม่ลืมแน่นอนค่ะว่า#nนายท่านของฉันคือใคร..."
2001905-74 = "นายท่าน เป็นอะไรรึเปล่าคะ?"
2001905-75 = "นายท่านดูเหนื่อยๆ ถ้างั้นเดี๋ยวฉันสั่งเครื่องดื่มให้แทนนะคะ"
2001905-76 = "ถ้างั้นก่อนอื่น..."
2001905-81 = "อ๋อ บันนี่เกิร์ลต้องทำแบบนั้นสินะคะ"
2001905-85 = "เวลายืนก็ต้องโพสต์ท่าทางให้ถูกต้อง แล้วเวลาวางจานก็ต้องไม่ให้เกิดเสียงดัง..."
2001905-86 = "อืมๆ..."
2001905-90 = "อืม... บันนี่เกิร์ลนี่... ไม่ใช่แค่ใส่ชุดก็จะเป็นได้สินะคะ"
2001905-91 = "ต้องปรับการบริการ การเคลื่อนไหว และท่วงท่าให้เหมาะสมกับบรรยากาศรอบข้าง"
2001905-92 = "ถึงจะเรียกได้ว่าเป็นบันนี่เกิร์ลสินะคะ~"
2001905-96 = "วันนี้ได้เรียนรู้อะไรเยอะมากเลยค่ะ"
2001905-97 = "ขอบคุณนะคะ นายท่าน"
2001905-98 = "ฉันไม่รู้มาก่อนเลยค่ะว่านายท่านเชี่ยวชาญเรื่องบันนี่เกิร์ลถึงขนาดนี้"
2001905-99 = "ฉันเองก็จะมุ่งมั่นและพยายามให้ดีที่สุด เพื่อที่จะดูแลนายท่านให้ได้อย่างเต็มที่ค่ะ"
2001905-105 = "นายท่านนี่สุดยอดจริงๆ เลยนะคะ!"
2001905-106 = "[s1] \"อะฮ่าฮ่าฮ่า...\"\n[s2] \"เข้าใจผิดไปไกลเลยนะ อาคาเนะจัง...\""
2001905-110 = "(คุณครูพยายามแก้ความเข้าใจผิด(?) แต่ก็ดูเหมือนว่าอาคาเนะจะเข้าใจแบบนั้นไปแล้ว...)"

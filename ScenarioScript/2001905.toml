[translation]
2001905-1 = "Case 3. 是學習時間對吧？"
2001905-3 = "（暫時遠離堆積如山的工作，在市區內走著）"
2001905-4 = "（就在下個瞬間）"
2001905-8 = "真巧呢，主人！"
2001905-12 = "[ns] 「朱，朱音！？」"
2001905-13 = "是的！是主人的朱音。"
2001905-14 = "為了和主人巧遇，我一直在這裡等主人。"
2001905-15 = "[s] 「為，為了在這裡……巧遇？」"
2001905-16 = "沒錯，巧遇。"
2001905-17 = "──您說這樣不能稱之為巧遇，是嗎？"
2001905-18 = "是嗎……？我倒覺得是巧遇。"
2001905-19 = "為什麼會知道您會經過這裡……？"
2001905-20 = "這種小事對千年的……"
2001905-21 = "……不，這是命運。"
2001905-22 = "畢竟主人的人身安全是由夏萊保護，是這樣對吧？"
2001905-23 = "所以只要拜託貝里塔斯，比對衛星影像……"
2001905-27 = "不，沒想到這世界上竟然有這麼美妙的巧遇呢。"
2001905-33 = "能像這樣見到您，簡直就像奇蹟一樣。"
2001905-34 = "今天需要什麼樣的服務呢，主人？"
2001905-35 = "[s] 「難道，妳一直都穿著兔女郎裝？」"
2001905-36 = "有什麼讓您在意的地方嗎？"
2001905-37 = "雖然是兔女郎裝，也依然是服務用的衣服。"
2001905-42 = "（周圍傳來的冰冷視線刺向了我）"
2001905-50 = "（趕緊抓著朱音的手，跑進了附近的咖啡廳避難）"
2001905-57 = "哇……"
2001905-58 = "[s] 「這裡究竟是……？」"
2001905-59 = "是兔女郎咖啡廳呢！#n世界上竟然有這種風格的咖啡廳！"
2001905-60 = "原來如此。居然不明白主人的苦心，我真是的……"
2001905-61 = "──是誤會？#n您不用那麼謙虛。"
2001905-62 = "呵呵……不用那麼害羞。"
2001905-63 = "主人比任何人都溫柔，這點我非常清楚。"
2001905-67 = "請問餐點決定好了嗎？主人，大小姐。"
2001905-68 = "哎呀……在這裡連我都變成了大小姐呢。"
2001905-69 = "真有趣。我明明只是服侍主人的女僕罷了。"
2001905-70 = "雖然僅限於待在這件咖啡廳裡的期間，不過我有重要的主人……"
2001905-74 = "主人，您怎麼了？"
2001905-75 = "您看起來好像很累，那就由我來替您點餐吧。"
2001905-76 = "首先……"
2001905-81 = "……原來如此。兔女郎的儀態是這樣的啊……"
2001905-85 = "要一邊維持良好的站姿，一邊注意不要讓盤子發出聲音……"
2001905-86 = "嗯，嗯。"
2001905-90 = "看來並不是只要穿著兔女郎裝就能成為兔女郎了呢。"
2001905-91 = "服裝和儀態，調和周圍環境的服務才能算是……"
2001905-92 = "真正的兔女郎對吧！"
2001905-96 = "非常具有參考價值。"
2001905-97 = "謝謝您。"
2001905-98 = "沒想到主人在這方面也有如此深厚的造詣。"
2001905-99 = "既然如此，我也會努力以完美的服務為目標持續精進的。"
2001905-105 = "真不愧是我的主人！"
2001905-106 = "[s1] 「啊哈哈……」\n[s2] 「這是誤會，朱音同學……」"
2001905-110 = "（朱音的誤會（？）直到最後也沒有解開……）"

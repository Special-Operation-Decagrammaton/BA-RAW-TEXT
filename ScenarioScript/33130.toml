[translation]
33130-1 = "第13話;届かない向こう側"
33130-2 = "……。"
33130-3 = "ハナコは賢い。"
33130-4 = "盤面に落ちている情報だけでも、確かに彼女なら真実のすぐ傍まで至れるだろう。"
33130-5 = "今こうして繰り広げられている状況、その原因、そして自分にはこれを防ぐ方法が無いということまで。全てを理解しただろうね。"
33130-6 = "ようやく好きになれたトリニティ総合学園……その終わりを為す術なく見守るしかないというのは、ハナコにとって残酷な話だ。"
33130-7 = "……。"
33130-8 = "そしてそこに至ろうとしているのは、ひとりではないみたいだね。まあここでの「ひとりではない」というのは、決して希望のある話を意味しないのだが。"
33130-9 = "アズサを探して奔走していたヒフミ……彼女もまた、同じような結論に到達しつつあるようだ。"
33130-10 = "一通のメッセージ。座標と時間、そして動物の名を用いた隠語。そんなメッセージを送ってくる相手が誰なのか、それに気が付かない彼女ではない。"
33130-17 = "アズサちゃん……？"
33130-18 = "アズサちゃん、私です。どこにいるんですか……？"
33130-19 = "アズサちゃん……答えてください、アズサちゃん……！"
33130-25 = "アズサ、ちゃん……？"
33130-26 = "……ヒフミ。"
33130-27 = "アズサちゃん、今までどこに……学園は今、大騒ぎで……。"
33130-28 = "……うん、知ってる。"
33130-29 = "アズサちゃん……？"
33130-30 = "……これを、誰かが止めなくちゃいけない。"
33130-31 = "それは、どういう……どうしてそんな顔で……。"
33130-32 = "アズサちゃん……"
33130-38 = "来ないで！！"
33130-39 = "……！！"
33130-40 = "……。"
33130-41 = "……ありがとう、ヒフミ。"
33130-42 = "でもここまでだ。ここから先には来ちゃいけない。"
33130-43 = "ここから先は、私の居場所。"
33130-44 = "ヒフミみたいな善良な人は、これ以上来ちゃいけないんだ。"
33130-45 = "あ、アズサちゃん……？何の、何のお話ですか……？"
33130-46 = "私じゃ、何がダメなんですか……？"
33130-50 = "……平凡で優しいヒフミには、似合わない話だよ。"
33130-51 = "アズサちゃん、私は……！"
33130-52 = "「人殺し」"
33130-53 = "……！"
33130-54 = "……人殺しになった私は、もう友達ではいられないだろう？"
33130-55 = "あ、アズサちゃん……？"
33130-56 = "だって、だってアズサちゃんはそんな……"
33130-57 = "私のせいだ。"
33130-58 = "私のせいでみんなが傷ついて……先生が、撃たれた。"
33130-59 = "正義実現委員会、ティーパーティー、シスターフッド、それにゲヘナの人たちも……"
33130-60 = "セイアが昏睡状態になったのも、学園がここまで破壊されたのも……全部、私のせいだ。"
33130-61 = "ヒフミ、それにハナコとコハル。このままじゃみんなまで危険になる。"
33130-63 = "そ、それは、アズサちゃんのせいではありません……それは……"
33130-64 = "だ、大丈夫です。せ、先生は……"
33130-65 = "先生もきっと、すぐに目が覚めるはず、ですし……ですから……！"
33130-66 = "ヒフミ。"
33130-67 = "そんなハッピーエンドは……この世界には無いんだ。"
33130-68 = "……。"
33130-69 = "今から私はサオリのヘイローを「壊しに」行く。"
33130-70 = "それ以外に、この事態を止める方法はない。"
33130-71 = "ま、待ってください、方法……方法なら、きっと……！"
33130-77 = "私はこれから、人を殺す。"
33130-78 = "それが当たり前の場所で、それが当たり前だと教わり、それが当たり前みたいに動けるように訓練された存在……。"
33130-79 = "それが、本当の私。"
33130-80 = "こんな私が、ヒフミと同じ世界になんていられない。"
33130-81 = "アズサ、ちゃん……？"
33130-86 = "……ヒフミ。私を友達だと思ってくれてありがとう。"
33130-89 = "「アズサちゃん」って呼んでくれてありがとう。"
33130-92 = "可愛いぬいぐるみをくれて、ありがとう。"
33130-97 = "海に連れて行ってくれてありがとう。楽しい思い出をくれてありがとう。"
33130-100 = "可愛いものが、綺麗なものが、"
33130-101 = "知らないものがあるって教えてくれてありがとう。"
33130-106 = "補習授業部での毎日……"
33130-107 = "あんなに素敵な日々を過ごして、たくさんの事が学べて良かった。"
33130-111 = "学ぶことは本当に楽しいことだった……これまでの時間は、死んでも忘れない。"
33130-112 = "少しでも、補習授業部の生徒でいられて良かった……。"
33130-117 = "ありがとう、ヒフミ。さよなら。"
33130-121 = "アズサ、ちゃん……。"
33130-122 = "ダメです、待って、待ってください……。"
33130-123 = "きっと、他に方法が……せ、先生が、みんなが……。"
33130-124 = "だって……だって、まだ……"
33130-125 = "「次はみんなで一緒に海に行こう」って、約束したじゃないですか……まだ一緒に、ペロロ様の冒険アニメだって、見れてないじゃないですか……"
33130-126 = "い、行かないでください……"
33130-127 = "アズサちゃん……ダメです、行かないで……待ってくださいアズサちゃん……"
33130-129 = "アズサちゃんっ！！！！"
33130-135 = "次回;暗闇の中で"

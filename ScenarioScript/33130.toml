[translation]
33130-1 = "第13話;遙不可及的另一側"
33130-2 = "……"
33130-3 = "花子很聰明。"
33130-4 = "光是落在盤面上的情報，如果是她的話確實可以無限接近真相吧。"
33130-5 = "現在發生的狀況，其中的原因，甚至連自身沒有辦法阻止。全都理解了呢。"
33130-6 = "好不容易喜歡上的三一綜合學園……對於這個結局只能無能為力的看著，對花子來說是件殘酷的事。"
33130-7 = "……"
33130-8 = "以及會到達那裡的，似乎不只一個人呢。不過這裡的所說的「不只一個人」，決不意味著還有希望。"
33130-9 = "尋找梓而奔走的日步美……她也，在到達相同結論的路上。"
33130-10 = "一則訊息。座標和時間，以及使用動物名的隱語。送來這種訊息的對象是誰，她不會無所察覺。"
33130-17 = "梓醬……？"
33130-18 = "梓醬，是我。妳在哪裡……？"
33130-19 = "梓醬……請回答我，梓醬……！"
33130-25 = "梓，醬……？"
33130-26 = "……日步美。"
33130-27 = "梓醬，這段時間去哪裡了……學園現在，亂成一團……"
33130-28 = "……嗯，我知道。"
33130-29 = "梓醬……？"
33130-30 = "……這件事，必須有人來阻止。"
33130-31 = "那是，什麼……為什麼要露出那種臉……"
33130-32 = "梓醬……"
33130-38 = "不要過來！！"
33130-39 = "……！！"
33130-40 = "……"
33130-41 = "……謝謝妳，日步美。"
33130-42 = "但是到此為止了。這前面妳不能過來。"
33130-43 = "這前面，是我的容身之處。"
33130-44 = "像日步美這種善良的人，不能再過來了。"
33130-45 = "梓，梓醬……？妳，妳在說什麼呢……？"
33130-46 = "我，哪裡不行呢……？"
33130-50 = "……對於平凡又溫柔的日步美來說，是不適合的話唷。"
33130-51 = "梓醬，我……！"
33130-52 = "「殺人兇手」"
33130-53 = "……！"
33130-54 = "……成為殺人兇手的我，已經不能再當你的朋友了吧？"
33130-55 = "梓，梓醬……？"
33130-56 = "可是，可是梓醬怎麼會……"
33130-57 = "是我的錯。"
33130-58 = "因為我的錯害大家受傷……老師，被槍擊中了。"
33130-59 = "實現正義部、茶會、修女會，還有格黑娜的人也……"
33130-60 = "聖亞陷入昏睡狀態也是，學園被破壞成這樣也是……全部，都是我的錯。"
33130-61 = "日步美，還有花子和小春。這樣下去連大家都會有危險。"
33130-63 = "那，那是，並不是梓醬的錯……那是……"
33130-64 = "沒，沒事的。老，老師會……"
33130-65 = "老師也一定，馬上就會，醒來的……所以……！"
33130-66 = "日步美。"
33130-67 = "那種圓滿結局……不存在於這世上。"
33130-68 = "……"
33130-69 = "我現在要「去破壞」沙織的光環。"
33130-70 = "除此之外，沒有阻止這個事態的方法。"
33130-71 = "請，請等一下，方法，方法的話，肯定……！"
33130-77 = "我接下來，要殺人。"
33130-78 = "在那是理所當然的地方，被教育著那是理所當然的，被訓練得認為那是理所當然的存在……"
33130-79 = "那就是，真正的我。"
33130-80 = "這樣的我，沒辦法和日步美待在同一個世界。"
33130-81 = "梓，醬……？"
33130-86 = "……日步美。謝謝妳把我當作朋友。"
33130-89 = "謝謝妳叫我「梓醬」。"
33130-92 = "送我可愛的玩偶，謝謝妳。"
33130-97 = "謝謝妳帶我去海邊。謝謝妳給了我快樂的回憶。"
33130-100 = "謝謝妳告訴我有可愛的東西，"
33130-101 = "漂亮的東西，我曾不知曉的東西。"
33130-106 = "在補課部的每一天……"
33130-107 = "度過那樣美好的日子，學到很多事物真是太好了。"
33130-111 = "學習真的是很開心的事……這段日子的時光，我死也不會忘記。"
33130-112 = "雖然只是短暫的時光，不過可以成為補課部的學生真是太好了……"
33130-117 = "謝謝妳，日步美。永別了。"
33130-121 = "梓，醬……"
33130-122 = "不行，等等，請等一下……"
33130-123 = "一定，有其他方法……老，老師會，大家會……"
33130-124 = "因為……因為，還沒……"
33130-125 = "「下次大家一起去海邊」，不是約好了嗎……還沒一起，看佩洛洛大人的冒險動畫，不是嗎……"
33130-126 = "請，請不要走……"
33130-127 = "梓醬……不行，不要走，請等一下梓醬……"
33130-129 = "梓醬！！！！"
33130-135 = "下一話;於黑暗之中"

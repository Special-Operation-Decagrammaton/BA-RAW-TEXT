[translation]
33130-1 = "Episode 13;A Side Beyond Reach"
33130-2 = "..."
33130-3 = "Interesting."
33130-4 = "Hanako is a smart girl. She was able to discern the truth with what little information she had."
33130-5 = "She understood the circumstances, the culprit, and the fact that she has no means to stop it."
33130-6 = "It's tragic. Hanako realized all of this just as she was growing to appreciate Trinity."
33130-7 = "..."
33130-8 = "She's not the only one who has arrived at the truth."
33130-9 = "Hifumi received a message while searching for Azusa."
33130-10 = "It was a text that only contained coordinates, a time, and an animal name as a code word. Peculiar, but Hifumi must have realized who the sender was."
33130-17 = "Azusa?"
33130-18 = "It's me. Where are you? I came like you told me to."
33130-19 = "Are you there, Azusa? Please answer me..."
33130-25 = "Azusa?"
33130-26 = "Hifumi."
33130-27 = "Where have you been? The entire district is in a panic right now!"
33130-28 = "I know."
33130-29 = "Azusa...?"
33130-30 = "Someone has to put a stop to this."
33130-31 = "What do you mean? What's wrong?"
33130-32 = "Azusa?"
33130-38 = "Don't come any closer!"
33130-39 = "...!"
33130-40 = "..."
33130-41 = "Thank you, Hifumi. "
33130-42 = "But this is goodbye. You mustn't come any closer."
33130-43 = "One more step. One more step, and you'll be somewhere students don't belong."
33130-44 = "This is where I belong—not you."
33130-45 = "Azusa? I'm not sure what you're talking about."
33130-46 = "Are you saying that I'm not good enough? Is that what you mean?"
33130-50 = "This place isn't for a normal girl like you, Hifumi."
33130-51 = "But, Azusa...!"
33130-52 = "A murderer."
33130-53 = "...!"
33130-54 = "Can you be friends with a murderer?"
33130-55 = "What are you saying...?"
33130-56 = "M-Murder? You wouldn't do something like that..."
33130-57 = "It's my fault."
33130-58 = "I'm responsible for what happened to Sensei. Everyone is suffering because of me."
33130-59 = "The Justice Task Force, the Tea Party, the Sisterhood, even the students from Gehenna."
33130-60 = "Seia is comatose, the city is being destroyed...and it's all my fault."
33130-61 = "It's only a matter of time before you, Hanako, and Koharu will be in danger too."
33130-63 = "D-Don't say that. It's not your fault."
33130-64 = "Everything will be okay. "
33130-65 = "Sensei is going to wake up soon. I just know it..."
33130-66 = "Hifumi."
33130-67 = "The real world isn't full of happy endings."
33130-68 = "..."
33130-69 = "I have to go now. I must destroy Saori's halo."
33130-70 = "There's no other way to end this."
33130-71 = "Y-You can't be serious. There must be another way."
33130-77 = "I'm a killer."
33130-78 = "That is what I was trained to be. I was taught to kill as though it were as natural as breathing."
33130-79 = "This is the real me."
33130-80 = "I don't belong in the world you're from, Hifumi."
33130-81 = "That...isn't true."
33130-86 = "[b]Thank you for being my friend.[/b]"
33130-89 = "[b]Thank you for treating me so kindly.[/b]"
33130-92 = "[b]Thank you for the gift you gave me.[/b]"
33130-97 = "Thank you for taking me to the beach and for the memories we made#nthat day."
33130-100 = "Thank you for showing me there's beauty in the world."
33130-101 = "I'm happy I could learn and grow... "
33130-106 = "...alongside you and the Make-Up Work Club."
33130-107 = "I had no idea learning could be so fun."
33130-111 = "I'll never forget those days we spent together and the things we learned."
33130-112 = "I'm grateful I had the opportunity to be a real student."
33130-117 = "Goodbye, Hifumi. Take care."
33130-121 = "Azusa? "
33130-122 = "Please, don't go..."
33130-123 = "There has to be another way. I'm sure Sensei and the others will..."
33130-124 = "Azusa..."
33130-125 = "We promised we'd all go to the beach together next time. We still need to see the debut of Peroro's new anime."
33130-126 = "I..."
33130-127 = "You can't leave me like this... "
33130-129 = "Azusa!!!"
33130-135 = "Next Episode;A Light in the Darkness"

[translation]
33130-1 = "ตอนที่ 13;สิ่งที่ไม่อาจไขว่คว้า"
33130-2 = "..."
33130-3 = "ใช่แล้วละค่ะ..."
33130-4 = "ฮานาโกะเป็นเด็กที่ฉลาด เธอจะสามารถสาวไปถึงความจริงจากข้อมูลที่มีอยู่ในตอนนี้ได้"
33130-5 = "สถานการณ์ที่เกิดขึ้นในตอนนี้... สาเหตุ และเธอจะเข้าใจว่าไม่มีวิธีที่ตนเองจะหยุดมันเอาไว้ได้"
33130-6 = "สถาบันทรีนิตี้คือที่ที่ตัดสินใจว่าจะชอบ... แต่กลายเป็นเรื่องที่โหดร้ายกับฮานาโกะไปแล้วสินะคะ..."
33130-7 = "..."
33130-8 = "ถ้าอย่างนั้นมาพูดถึงนักเรียนอีกคนที่ได้ข้อสรุปเดียวกันบ้างมั้ยคะ"
33130-9 = "ฮิฟุมิที่พยายามอย่างเอาเป็นเอาตายเพื่อตามหาอาซึสะ... และเธอก็ได้รับการติดต่อมาจากที่หนึ่งค่ะ"
33130-10 = "ข้อความที่มีเพียงพิกัดสถานที่ เวลา และใช้ชื่อสัตว์เป็นโค้ดเนม ฮิฟุมิรู้ดีว่าใครเป็นคนส่งข้อความ#nพวกนี้มาให้เธอ..."
33130-17 = "อาซึสะจัง...?"
33130-18 = "อาซึสะจัง? ฉันเองค่ะ ตอนนี้อยู่ที่ไหนเหรอคะ? ฉันมาตามสัญญาแล้วค่ะ"
33130-19 = "อาซึสะจัง...? อยู่ที่นี่รึเปล่าคะ? ตอบหน่อยสิคะ อาซึสะจัง..."
33130-25 = "อาซึสะจัง...?"
33130-26 = "ฮิฟุมิ"
33130-27 = "อาซึสะจัง...? ไปอยู่ที่ไหนมาคะ? ตอนนี้ที่โรงเรียนเกิดเรื่องวุ่นวายมาก..."
33130-28 = "ฉันรู้แล้วล่ะ"
33130-29 = "อะ... อาซึสะจัง?"
33130-30 = "ต้องมีใครบางคนที่จะหยุดเรื่องนี้"
33130-31 = "อาซึสะจัง...? พูดอะไรคะ... ทำไมทำหน้าแบบนั้น...?"
33130-32 = "อะ... อาซึสะจัง?"
33130-38 = "อย่าเข้ามาใกล้นะ!!"
33130-39 = "...!!"
33130-40 = "..."
33130-41 = "ขอบคุณเธอมากนะ... ฮิฟุมิ"
33130-42 = "แต่พอแค่นี้เถอะ เธอห้ามก้าวข้ามเส้นแบ่งพวกนั้นมาเด็ดขาดนะ"
33130-43 = "ที่นี่เป็นสถานที่ที่เหมาะกับคนอย่างฉัน... ที่ไม่ใช่นักเรียน"
33130-44 = "เธอห้ามก้าวเข้ามาที่นี่เด็ดขาด"
33130-45 = "อาซึสะจัง...? ฉะ...ฉันไม่เข้าใจที่เธอพูดเลย"
33130-46 = "ฉะ...ฉันก้าวข้ามไปไม่ได้งั้นเหรอคะ? มะ... มันหมายความว่ายังไงกันน่ะ"
33130-50 = "ที่นี่ไม่เหมาะกับคนธรรมดา.. อย่างเธอหรอก..."
33130-51 = "ทำไมกัน!! อาซึสะจัง ฉันน่ะ...!"
33130-52 = "ฆาตกร..."
33130-53 = "...!"
33130-54 = "เธอจะยอมเป็นเพื่อนกับฉันที่กลายเป็นฆาตกรไปแล้วงั้นเหรอ?"
33130-55 = "คะ? วะ... ว่าไงนะคะ? อาซึสะจัง? เรื่องแบบนั้น..."
33130-56 = "ฆะ...ฆาตกรงั้นเหรอคะ ที่พูดหมายถึงอะไร..."
33130-57 = "มันเป็นเพราะฉันเอง"
33130-58 = "เป็นเพราะฉัน ทุกคน... คุณครูก็เลยต้องได้รับบาดเจ็บ"
33130-59 = "เป็นเพราะฉัน พวกชมรมทวงความยุติธรรม สภาน้ำชา ซิสเตอร์ และพวกเกเฮนน่า..."
33130-60 = "ทั้งเรื่องที่เซอาต้องอยู่ในอาการโคม่า เรื่องที่เมืองถูกทำลาย ทุกๆ อย่าง..."
33130-61 = "และตอนนี้ก็ทำให้ฮิฟุมิ ฮานาโกะและโคฮารุตกอยู่ในอันตรายด้วย..."
33130-63 = "อาซึสะจัง เรื่องนั้น... ไม่ใช่ความผิดของอาซึสะจังเลยนะคะ... เรื่องนั้นมัน..."
33130-64 = "อีกไม่นานทุกอย่างก็จะดีขึ้นค่ะ คะ...คุณครูน่ะ... "
33130-65 = "มะ...ไม่นานคุณครู...ก็คงจะฟื้นมา... เพราะงั้น..."
33130-66 = "ฮิฟุมิ"
33130-67 = "ฉากจบที่สวยงามแบบนั้น... มันไม่มีจริงในโลกนี้หรอก"
33130-68 = "อาซึสะจัง...?"
33130-69 = "ฉันต้องไปแล้วล่ะ ฉันจะไปทำลายฮาโลของซาโอริ"
33130-70 = "มีเพียงวิธีนั้นที่จะหยุดความวุ่นวายนี้ได้"
33130-71 = "คะ...? ดะ...เดี๋ยวก่อนค่ะ อาซึสะจัง... มันต้องมีทางอื่นแน่ๆ ค่ะ..."
33130-77 = "ฉันเป็นฆาตกร"
33130-78 = "ใช่แล้ว ฉันคือคนที่ถูกฝึกฝน ให้เคลื่อนไหวในโลกโสมมเพื่อการฆ่า"
33130-79 = "นี่คือตัวตนที่แท้จริงของฉัน"
33130-80 = "ฉันที่เกลือกกลั้วกับเรื่องเลวร้ายน่ารังเกียจแบบนี้ ไม่เหมาะกับโลกของฮิฟุมิหรอก"
33130-81 = "อะ... อาซึสะจัง?"
33130-86 = "ฮิฟุมิ ขอบคุณที่ยอมรับคนอย่างฉันเป็นเพื่อนนะ"
33130-89 = "ขอบคุณที่เรียกฉันว่า \"อาซึสะจัง\""
33130-92 = "ขอบคุณนะที่ให้ตุ๊กตาน่ารักๆ เป็นของขวัญ"
33130-97 = "ฉันดีใจที่ได้ไปทะเลด้วยกัน ฉัน... ดีใจที่ได้มีความทรงจำดีๆ ร่วมกับเธอ"
33130-100 = "ได้ไปดูอะไรๆ ที่สวยงาม"
33130-101 = "ได้สัมผัสหลายสิ่งหลายอย่างที่ฉันไม่เคยรู้มาก่อน "
33130-106 = "ตอนอยู่ที่ชมรมชั้นเรียนเสริม..."
33130-107 = "ฉันดีใจที่ได้เรียนรู้อะไรหลายๆ อย่าง"
33130-111 = "การเรียนนี่สนุกจริงๆ เลยนะ ถึงต้องตายไปก็ไม่มีวันลืมเลยล่ะ"
33130-112 = "ดีจังเลยนะที่ได้เป็นนักเรียน"
33130-117 = "ลาก่อนนะ \"ฮิฟุมิจัง\""
33130-121 = "อาซึสะจัง...? "
33130-122 = "เดี๋ยวสิ อาซึสะจัง... มะ...ไม่ได้นะคะ! เดี๋ยวก่อน! รอฉันด้วยค่ะ..."
33130-123 = "คิดจะทำอะไรกันแน่คะ? เดี๋ยวก่อนสิ... มันต้องมีวิธีอื่นแน่ๆ... คะ... คุณครู ทุกคน..."
33130-124 = "อาซึสะจัง..."
33130-125 = "เราสัญญาว่าคราวหน้าก็จะไปทะเลด้วยกันอีกไม่ใช่เหรอคะ... แล้วก็... เรายังไม่ได้ดูอนิเมะด้วยกันเลยนะ... อะ... อาซึสะจัง..."
33130-126 = "อา..."
33130-127 = "อาซึสะจัง... ไม่ได้นะ... อย่าไปนะคะ... รอฉันด้วยสิคะ อาซึสะจัง... "
33130-129 = "อาซึสะจัง!!!"
33130-135 = "ตอนต่อไป;แสงสว่างท่ามกลางความมืดมิด"

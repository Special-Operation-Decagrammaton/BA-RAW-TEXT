[translation]
52085-15 = "哈啊，哈啊……"
52085-16 = "……還沒，還沒結束！"
52085-21 = "……名草醬還真頑強呢。"
52085-22 = "花的時間比我預期的還多──"
52085-29 = "名草前輩！"
52085-30 = "剛才好像聽到了槍聲……這是怎麼回事？"
52085-31 = "前輩，你沒事吧？"
52085-36 = "[ns] 「名草，你還好嗎！？」"
52085-37 = "我沒事。不過花鳥風月部的怪談家……"
52085-38 = "嘖，百花繚亂的傢伙和夏萊的老師已經來了嗎。"
52085-42 = "那個少女是……"
52085-43 = "啊，是之前那個囂張的小鬼頭！"
52085-48 = "誰是囂張的小鬼頭啊！"
52085-49 = "呿，要是動作再快一點就能制伏名草了說……！"
52085-50 = "……算了，這也沒辦法。#n反正既然你們已經踏進了北方之地，遲早還會有重啟故事的機會。"
52085-54 = "今天就先撤退吧。"
52085-59 = "誰會讓你就這麼走掉啊！"
52085-60 = "蓮華、紫，這次絕對不能讓他跑了！"
52085-80 = "啊，啊啊！他溜走了！"
52085-81 = "可惡！明明是個小不點，速度卻快得像黃鼠狼一樣……"
52085-86 = "呵呵，憑你們這種蝸牛般的速度，就算再過十年也追不上我吧？"
52085-87 = "那麼今天就先到此為止，後會有──"
52085-93 = "咦，咦……？"
52085-99 = "嗚喵啊啊啊啊啊！"
52085-108 = "……看來我來的正是時候呢。"
52085-109 = "大家都沒受傷吧？"
52085-113 = "這個聲音……"
52085-114 = "難道是……"
52085-121 = "好久不見了呢，名草。"
52085-125 = "我一直都很想念大家哦。"
52085-131 = "……菖蒲！"
52085-133 = "下一話;百花繚亂的委員長"

[translation]
52085-15 = "แฮ่ก... แฮ่ก..."
52085-16 = "ยังไม่สิ้นฤทธิ์อีกเหรอ...!"
52085-21 = "นางุสะจังต่างหากล่ะคะที่ยังดื้อด้านอยู่..."
52085-22 = "ใช้เวลาเยอะกว่าที่คิดอีกแฮะ..."
52085-29 = "รุ่นพี่นางุสะ!"
52085-30 = "เมื่อกี้ฉันเหมือนได้ยินเสียงปืนเลย... เกิดเรื่องอะไรเหรอ?"
52085-31 = "รุ่นพี่ ปลอดภัยดีใช่มั้ยเจ้าคะ?"
52085-36 = "[ns] \"นางุสะ เป็นอะไรหรือเปล่า?!\""
52085-37 = "ฉันไม่เป็นไร ที่สำคัญกว่านั้นก็คือ... นักเล่าเรื่องลึกลับจากชมรมความงามของธรรมชาติ..."
52085-38 = "อึก... พวกเฮียกกะเรียวรันกับครูจากชาเล่ต์มาถึงกันแล้วเหรอคะเนี่ย"
52085-42 = "เด็กคนนั้น..."
52085-43 = "อ๊ะ ยัยเปี๊ยกตัวแสบเมื่อคราวที่แล้วนี่นา!"
52085-48 = "ว่าใครเป็นยัยเปี๊ยกตัวแสบน่ะ! "
52085-49 = "ชิ ถ้าทำให้จนมุมเร็วกว่านี้อีกหน่อย ฉันก็คงปราบนางุสะได้แล้วเชียว"
52085-50 = "งั้นก็ช่วยไม่ได้นะคะ... ตราบใดที่ตอนนี้ทุกคนเหยียบเท้าเข้ามาในดินแดนทางเหนือแล้ว ฉันก็ยังมีโอกาสเริ่มเรื่องใหม่ได้อีก"
52085-54 = "งั้นวันนี้ฉันจะขอจบเรื่องเท่านี้ก่อนค่ะ"
52085-59 = "ใครจะปล่อยให้ไปง่ายๆ กันเล่า!"
52085-60 = "เรนเกะ ยูคาริ ครั้งนี้ห้ามพลาดเด็ดขาดเลย!"
52085-80 = "อ่า... อ๊ะ! หนีไปจนได้เจ้าค่ะ!"
52085-81 = "โธ่เอ๊ย! ยัยตัวกะเปี๊ยกนั่น ไวอย่างกับเพียงพอนเลย..."
52085-86 = "ฮุฮุ ถ้ายังช้าเหมือนเต่าคลานกันแบบนั้น อีก 10 ปีก็ตามฉันไม่ทันหรอกค่ะ"
52085-87 = "เอาละ วันนี้ฉันขอตัวก่อนนะคะ หวังว่าจะได้เจอกันใหม่ค่ะ"
52085-93 = "เอ๊ะ เอ๋...?"
52085-99 = "อ๊ายยยยยยย!"
52085-108 = "โชคดีที่มาได้จังหวะพอดีเลยนะ..."
52085-109 = "ทุกคนบาดเจ็บตรงไหนกันหรือเปล่า?"
52085-113 = "เสียงนี้มัน..."
52085-114 = "หรือว่า..."
52085-121 = "ไม่ได้เจอกันนานเลยนะ นางุสะ"
52085-125 = "ดีใจที่ได้เจอกันนะ ทุกคน"
52085-131 = "อายาเมะ...!"
52085-133 = "ตอนต่อไป;หัวหน้าเฮียกกะเรียวรัน"

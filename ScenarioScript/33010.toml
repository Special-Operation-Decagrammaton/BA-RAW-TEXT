[translation]
33010-1 = "第1話;ポストモーテム（１）"
33010-4 = "秘密の部屋"
33010-6 = "……[ruby=ゆりぞの]百合園[/ruby]セイア？"
33010-7 = "ああ、そうだよ。君を待っていたんだ、アリウス分校所属「[ruby=しらす]白洲[/ruby]アズサ」。"
33010-8 = "……待ってた？私を？"
33010-9 = "うん、夢でもこのシーンを見ていたからね。"
33010-10 = "何と説明するのが良いかな……まあ、「予知夢」のようなものだと思ってくれると良い。"
33010-11 = "時々、そういう夢を見るんだ。後で現実になってしまう夢、それ以外にも色々な夢をね。"
33010-12 = "……つまり、これから私が何をするのかも分かってる、と？"
33010-13 = "ああ、私のヘイローを壊しに来たんだろう？"
33010-14 = "他にも仲間がいたようだけれど、君だけがここまで到達した。素晴らしい力だ、白洲アズサ。"
33010-15 = "……分かってて、どうして逃げなかった？"
33010-16 = "……無意味だからさ。"
33010-17 = "「全ては虚しいものである」……アリウスが大好きな言葉だったね。同じことだ。未来が見える私にとって、足掻くことは無意味。"
33010-18 = "「死」というものが、キヴォトスにおいて見えにくい概念であることは確かだ。それでもやはり私たちは生きているのだし、ともすれば「死」が隣り合わせでないなんてことはあり得ない。"
33010-20 = "「ヘイローを壊す」……つまり誰かが、私の死を願っている。"
33010-21 = "そして君は、この秘密の部屋まで他の誰にも気づかれずに侵入してきた。ここまでのことが出来てしまうのだから、やはり足掻いても無駄さ……君の立場からだってそう思わないかい、白洲アズサ？"
33010-23 = "まあそれ以外にも理由が無いわけではないが……ところで、君は以前にもヘイローを壊したことが？"
33010-24 = "……いや、無い。でもやり方は習った。"
33010-25 = "「習った」……。"
33010-26 = "肉体に取り返しがつかない、致命的なダメージを与える……与え続ける。"
33010-27 = "普通は5.56mm弾を何発撃ったところで、ほとんど致命傷にはならないはず。"
33010-28 = "でも、ダメージが無いわけじゃない。尋常じゃない量の弾薬、そしてダメージを与え続けるだけの圧倒的優位と、そのための時間。それらを「異常なほど」叩き込みさえすれば……銃火器だけでヘイローを壊すことも、不可能じゃない。"
33010-29 = "銃火器以外だって、いくらでもある。病気だって無いわけじゃない。例えば、水や食料の摂取を長期間にわたって強制的に絶つ、呼吸ができないような環境下に強制的に閉じ込める、身体機能が停止するほどの流血をさせる、体温が一定以下になるような状態でずっと拘束し続ける……"
33010-30 = "「死」に至らせる方法は、幾らでもあるはずだ。"
33010-31 = "それに、「百合園セイアは身体が弱い」と聞いている。"
33010-32 = "……だから、その銃火器でも十分だと？"
33010-33 = "……それもあり得ない話じゃない。でも今の私には十分な時間も、優位性も保障されてない。"
33010-34 = "だから、この特殊な爆弾を使用する。これで「ヘイローを破壊」する。"
33010-35 = "つまりそれは、「ヘイローを破壊する爆弾」ということかい？聞いたことのない技術だが……"
33010-36 = "……なるほど、アリウスはそういう研究をしていると。「ヘイローを破壊する方法」、すなわち「人を殺す方法」を。"
33010-37 = "……ああ、そしてそういうことを習った。「学校」とは、そういうことを「習う」場所なのだろう？"
33010-38 = "……。"
33010-39 = "そうか……アリウスは、そこまで……。"
33010-44 = "……白洲アズサ、一つ聞かせてほしい。君は「人殺し」になってしまっても大丈夫なのかい？"
33010-45 = "……。"
33010-47 = "私は見たんだ、「人殺し」になることを恐れる君の姿を。"
33010-48 = "君が望んだかどうか、他に選択肢があったかどうか……その辺りは実のところ、さしたる問題じゃない。"
33010-49 = "「人殺しは人殺しである」。その明確で絶対的で、何より絶望的なまでに分かりやすい命題がその身に刻まれる。そして、この世界に残り続ける。"
33010-50 = "そうなってしまった後に君が感じる絶望、苦しみ、怒り、後悔と挫折、そして無力感……それらは、誰に届くことも無く虚空へと消えていく。"
33010-51 = "君もアリウスなら知らないはずが無い。「vanitas vanitatum」……この世界の真実を。"
33010-52 = "……しかし、私は知っているんだ。君がこの言葉に同意しながらも、どこかで否定しているということも。"
33010-54 = "……そうだろう？"
33010-55 = "その花を見つめながら、君はそう考えていた。"
33010-56 = "「全ては虚しいもの」だ……しかし、それでも足搔かなければならない。"
33010-57 = "これが君の根幹に根差すもの、君を現す心象……私にはよく分からなかったけれど。"
33010-58 = "となると、君は実のところ……"
33010-60 = "……私を殺しに来たのではなく、私に助言を貰いに来たんじゃないのかい？"
33010-61 = "君がこの先、どう足掻くべきなのかについて。"
33010-63 = "シスターフッドの会議室"
33010-65 = "……[USERNAME]先生？"
33010-66 = "[s1] \"……ごめん、ちょっと寝てた。\"\n[s2] \"何か、夢を見たような……。\""
33010-67 = "……お忙しいのは存じておりますが、もう少々集中していただけますと。"
33010-68 = "……お忙しいのは存じておりますが、もう少々集中していただけますと。"
33010-69 = "[s] \"ごめん……。\""
33010-70 = "確かにここしばらくずっと、事件の後始末と言いますか……色々奔走されていると聞きました。あなたの管轄外のことまで。"
33010-71 = "[s] \"力不足でね……色々とやり切れなかったこととか、たくさんあって……。\""
33010-72 = "……そうでしたか。"
33010-73 = "立て続けに色々なことがありましたし、少し整理しておきましょうか。"
33010-74 = "退屈なお話になるでしょう。少なくとも面白くはないことだと思いますが……整理することで、進むことができることもあります。「ポストモーテム」と呼ばれるものです。"
33010-75 = "……では、本題に入りましょう。"
33010-76 = "セイアさんの部屋が爆破されたのは、夜中の3時頃。"
33010-77 = "その後、現場へ最初にたどり着いたのは「救護騎士団」のミネ団長でした。"
33010-80 = "ミネ団長は室内の状況を確認した後、すぐにその事実をティーパーティーに報告。"
33010-81 = "ティーパーティーは混乱に陥りつつも、情報の隠蔽工作や犯人捜しが始まりました。"
33010-85 = "しかしその騒動に紛れるようにして、ミネ団長はセイアさんの遺体と共に姿をくらましました。救護騎士団の他の団員さえ行方が分からなかったそうです。"
33010-87 = "……と、ここまでがティーパーティー視点の状況です。しかし実のところ「セイアさんの遺体」という情報自体がフェイク。ミネ団長は「ヘイローが破壊された」という偽の情報を流しつつ、セイアさんを安全なところに隠したのです。"
33010-88 = "普通に考えて、「ヘイローが破壊された生徒」が狙われるはずもありません。セイアさんを守るためには、最善の方法だったと言えるでしょう。"
33010-89 = "ティーパーティーのメンバーが襲撃されるという異常事態……今は誰を信じるべきかと考える前に自分の手で、と。そう考えたのではないでしょうか。"
33010-90 = "実際のところ犯人が、本来であれば情報が集約される「ティーパーティー」のミカさんであったことを考えると、彼女の判断は結果的に正しかったと言えますが……。"
33010-91 = "……しかしまだ、セイアさんは目覚めていません。"
33010-92 = "爆発の傷は癒えたものの、ずっと眠り続けている状態……団長も、原因が分からないと言っていました。"
33010-93 = "今もミネ団長とセイアさんは、誰も知らない場所に身を隠しています。"
33010-94 = "……おおよそといった形ではありますが、この辺りが百合園セイアさんが襲撃された件についてのお話です。"
33010-100 = "[ns] \"ハナコ！\""
33010-101 = "あまり面白くないサクラコさんに捕まって苦しんでいるのではないかと思い、先生を助けに来ちゃいました。ふふっ♡"
33010-102 = "……冗談を言うタイミングではありませんよ、ハナコさん。"
33010-103 = "サクラコさんは相変わらずですねえ……今度一緒に、ちょっと過激な本でも読みませんか♡"
33010-104 = "何となくですが、サクラコさんはそういった方面に免疫が無さそうですし……うふふ♡"
33010-109 = "……ハナコさん。あの時の約束、忘れていませんよね？"
33010-110 = "……もちろんですよ。"
33010-113 = "[ns] \"いた、ハナコ。\""
33010-114 = "あら。先生、どうしてここに……。"
33010-118 = "[ns] \"前に言ってた、シスターフッドとの約束って……。\""
33010-119 = "ああ、それは……。"
33010-120 = "……シャーレの先生、これはあなたが介入するべき問題ではありません。"
33010-121 = "[s] \"ハナコは補習授業部の、私の生徒だから。\""
33010-122 = "あらまあ……。"
33010-123 = "……。"
33010-124 = "すみません……それはその、私が……。"
33010-125 = "マリーちゃん……。"
33010-129 = "私がお願いしたんです。ハナコさんを助けるために、サクラコ様を説得する……"
33010-130 = "その代わりに約束として、"
33010-131 = "ハナコさんに退学を撤回してもらう、と……。"
33010-132 = "……。"
33010-133 = "私では、ハナコさんを止めることができなくって……ハナコさんの心の奥底を、分かってあげることができなくて……。"
33010-134 = "こんな形になってしまってごめんなさい……でも私は、ハナコさんに学園に残ってほしくって……。"
33010-135 = "……いいえ、マリーちゃん。"
33010-136 = "マリーちゃんが謝ることではありません。色々と勝手なことをして、みんなを心配させたのは私なんですから。むしろ謝るのは私です。"
33010-137 = "ごめんなさい、マリーちゃん……心配させてしまいましたね。"
33010-138 = "ハナコさん……。"
33010-139 = "今の私は、退学しようとは考えてませんから。安心してください。"
33010-140 = "本当、ですか……？"
33010-141 = "はい。補習授業部で習いましたからね……もう少し、「足掻いて」みようかと。ねえ、先生？"
33010-142 = "[s] \"……うん。\""
33010-143 = "……ありがとうございます。ハナコさん、[USERNAME]先生。"
33010-147 = "……ですが、それ一つでは足りませんね。"
33010-148 = "サクラコ様……？"
33010-149 = "もう一つ、お願いがあります。ハナコさん。"
33010-150 = "……。"
33010-151 = "それは――"
33010-155 = "「登校時の服装には、裸のみを認める」……そんな校則を作り、トリニティを「裸の楽園」へと変える計画に手を貸してほしい……そういうことでしたよね？"
33010-156 = "ええ、そうで――"
33010-157 = "……はい？"
33010-158 = "まさかシスターフッドがこんな陰謀を企んでいたなんて……さすがサクラコさん、謎に包まれた秘密主義集団の長ですね。"
33010-159 = "それにあの例外に関する条項、「原則は全裸。ただしシスターフッドのみ、登校時にベールの着用を認める」……"
33010-161 = "流石の私も慄きましたよ。裸にベールだなんて、何という新しい世界……"
33010-162 = "はい……っ！？"
33010-163 = "ですが、今の立場では協力せざるを得ません……そしてやるからには、必ずや成功させてみせます！"
33010-164 = "しかしそのベールの件はズルすぎます。ですので私からの提案ですが、「原則は全裸。ただし全生徒、靴下だけは着用可能とする」というのは如何でしょうか！"
33010-165 = "これを飲んでくださるなら、その計画に協力しましょう！"
33010-166 = "さ、さささサクラコ様！？そ、そんな計画を……！？"
33010-167 = "違いますよ！？"
33010-168 = "そんな……。"
33010-169 = "「そんな……」ではありません！いきなり何を言っているのですかあなたは！"
33010-171 = "「私たちがハナコさんの頼みを聞く代わりに、ハナコさんも私たちからの頼みを一つ聞く」、そういう約束でしょう！？"
33010-172 = "……ああ、そんなお話もありましたねぇ。"
33010-174 = "はあ……。"
33010-175 = "本当なら、あなたがシスターフッドに入ってくれればそれが一番良いのですが……それはあなたをただ虐めて、追い詰めるようなものでしょうから。"
33010-176 = "……今回の事件を契機として、私たちのこれまでの「無干渉主義」も変わっていきます。政治的なことにも徐々に、足を踏み入れることになるでしょう。"
33010-177 = "その過程できっと、色々とあるはずです。その時、ハナコさんのような方から助けてもらえるというのは大きなキーになり得ます。あくまでそういうお話ですよ。"
33010-178 = "まあ、その程度なら構わないのですが……はぁ……。"
33010-179 = "どうしてそう残念そうな表情をするのですか……いえ、もう話をそちらに戻さないでほしいのですが……。"
33010-180 = "[s] \"……ハナコは、本当に嫌じゃない？\""
33010-181 = "先生……。"
33010-182 = "……無理やりに、という手段は取りません。どちらにせよハナコさんには「手伝っていただく」という形ですし、無茶なことを要求するつもりもありませんから。"
33010-183 = "……ありがとうございます、サクラコ様。"
33010-184 = "話が逸れましたね……本題に戻りましょうか。えっと……"
33010-185 = "「全裸登校」についてのお話ですね♡"
33010-186 = "はい、その話……ではありません！話を戻さないでと言ったでしょう……！"
33010-187 = "ふう、"
33010-192 = "仕方ありませんねぇ……セイアちゃんの襲撃事件、その話に戻りましょうか。実行犯はご存じの通り、アズサちゃんだったようです。"
33010-193 = "……セイアちゃんの部屋が爆破されたのは夜中の3時です。しかし、その部屋に侵入したのは夜中の2時頃。"
33010-194 = "ここには、約1時間の空白があります。侵入者……つまりアズサちゃんはセイアちゃんと一緒に1時間、そのお部屋にいたんです。"
33010-195 = "その60分の間、お二人の間にはいったいどんなお話があったのか……。"
33010-196 = "アズサちゃんは、あまり詳しくお話ししてくれませんでしたが……"
33010-198 = "相談室"
33010-201 = "白洲アズサさん、中へどうぞ。"
33010-202 = "……。"
33010-204 = "次回;ポストモーテム（２）"

33010-155 = "จะขอให้ช่วยสร้างกฎให้มาโรงเรียนแบบตัวเปล่า... แล้วเปลี่ยนทรีนิตี้เป็นโรงเรียนเปลือยใช่ไหมคะ?"
33010-156 = "ค่ะ... ข้อเรียกร้องที่ว่าคือ..."
33010-157 = "คะ...?"
33010-158 = "ไม่ยักรู้เลยค่ะว่าชมรมซิสเตอร์กำลังวางแผนลับแบบนี้อยู่... สมแล้วละค่ะ ที่คุณซากุระโกะเป็นหัวหน้ากลุ่มลึกลับที่ซ่อนอยู่ในความมืด"
33010-159 = "ตามหลักการแล้วทุกคนต้องเปลือยเปล่ากันหมด... แต่สำหรับชมรมซิสเตอร์#nจะอนุญาตให้ใส่ผ้าคลุมหัวได้ ข้อยกเว้นนี้มัน..."
33010-161 = "ไม่ใส่เสื้อผ้า แต่ใส่ผ้าคลุมหัว... นี่คือการบ่งบอกอภิสิทธิ์ของตัวเองนี่นา... ช่างเป็นแผนที่ร้ายกาจจริงๆ เลยนะคะ"
33010-162 = "คะ?"
33010-163 = "ฉันคงต้องให้ความร่วมมือกับแผนการนี้อย่างช่วยไม่ได้แล้วละค่ะ ฉันจะทำให้แผนการนี้สำเร็จ... ด้วยกำลังทั้งหมดที่มีเลยค่ะ!"
33010-164 = "แต่ฉันยอมให้มีข้อยกเว้นพิเศษนั่นไม่ได้หรอกนะคะ ฉันก็เลยจะขอให้มีการเพิ่มข้อกำหนดที่ว่า นักเรียนทุกคนต้องไม่ใส่เสื้อผ้าเหมือนกันทั้งหมด แต่จะอนุโลมให้ใส่ถุงเท้าได้ค่ะ!"
33010-165 = "นี่คือข้อเรียกร้องของฉัน แล้วฉันจะให้ความร่วมมือค่ะ!"
33010-166 = "คะ? ท่านซากุระโกะ?!  คิดจะทำเรื่องแบบนี้เหรอคะ?!"
33010-167 = "มะ... ไม่ใช่นะคะ!!"
33010-168 = "อ้าว... ไม่ใช่หรอกเหรอ..."
33010-169 = "ค่ะ! ก็ต้องไม่ใช่สิคะ! นี่คุณพูดเพ้อเจ้ออะไรเนี่ย!!"
33010-171 = "พวกฉันรับฟังคำขอร้องของคุณฮานาโกะ แลกกับการที่คุณฮานาโกะรับฟังคำขอร้องของพวกฉันไงคะ!"
33010-172 = "เอ่อ... ค่ะ จริงด้วย แหะๆ"
33010-174 = "เฮ้อ..."
33010-175 = "ฉันอยากให้คุณเข้าชมรมซิสเตอร์มากที่สุด แต่การทำแบบนั้นคงเป็นการรบกวนคุณสินะคะ"
33010-176 = "จากเหตุการณ์ครั้งนี้ พวกฉันตั้งใจว่าจะแก้ไขคติการไม่เข้าแทรกแซงที่เคยมีมาค่ะ#nพูดง่ายๆ ก็คือ ในภายภาคหน้าเราจะเข้าไปเกี่ยวข้องกับการเมืองให้มากขึ้นค่ะ"
33010-177 = "และในกระบวนการนั้น ฉันอยากได้รับความช่วยเหลือจากบุคคลที่มีความสามารถสูง#nอย่างคุณฮานาโกะค่ะ"
33010-178 = "ค่ะ... ถ้าเป็นเรื่องแบบนี้ล่ะก็..."
33010-179 = "ทำไมทำหน้าเหมือนเสียดายอะไรเลยล่ะคะ? ไม่หรอกค่ะ ไม่มีอะไรค่ะ "
33010-180 = "[s] \"ถ้าฮานาโกะไม่ต้องการ ก็ต้องให้เธอปฏิเสธได้ทุกเมื่อนะ\""
33010-181 = "ตายจริง..."
33010-182 = "ค่ะ... ฉันไม่มีข้อขัดแย้งค่ะ เพราะยังไงฉันก็เป็นฝ่ายที่ได้รับความช่วยเหลือจากคุณฮานาโกะ#nฉันไม่มีความคิดที่จะเรียกร้องเชิงบังคับหรอกค่ะ"
33010-183 = "ขอบคุณนะคะท่านซากุระโกะ"
33010-184 = "เราคุยกันเลยเถิดแล้ว เรากลับมาเข้าเรื่องกันเถอะค่ะ ตอนนั้นคุยเรื่องอะไรกันอยู่นะ..."
33010-185 = "เรื่องการไปเรียนแบบล่อนจ้อนไงคะ♡"
33010-186 = "ค่ะ การไปเรียนแบบล่อนจ้อน... ซะที่ไหนล่ะคะ! เรื่องการบุกทำร้ายคุณเซอาต่างหาก! "

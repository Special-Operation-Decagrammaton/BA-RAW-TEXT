33010-192 = "เท่าที่เรารู้ ผู้ที่บุกโจมตีครั้งนั้นก็คือ ชิราสึ อาซึสะ... อาซึสะจังนี่แหละค่ะ"
33010-193 = "เกิดระเบิดในห้องพักฟื้นของเซอาจังตอนตี 3 แต่ผู้บุกรุกลักลอบเข้าไปในนั้นราวๆ ตี 2"
33010-194 = "นั่นเท่ากับว่าผู้บุกรุก ซึ่งก็คืออาซึสะจังอยู่ด้วยกันกับเซอาจังประมาณ 1 ชั่วโมง"

33010-133 = "3;마리;09;저, 저는…… 하나코 씨의 마음을 헤아리지 못하고 있었어요……. 하나코 씨가 자퇴하려는 걸 막을 수 없었어요…….\n#3;em;[!]\n#3;stiff"

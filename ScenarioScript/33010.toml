[translation]
33010-1 = "第1話;事後分析（１）"
33010-4 = "祕密的房間"
33010-6 = "……百合園聖亞？"
33010-7 = "啊啊，沒錯唷。我正在等著妳，奧利斯分校的「白洲梓」。"
33010-8 = "……等？我嗎？"
33010-9 = "嗯，因為在夢裡也看見這個場景了呢。"
33010-10 = "要怎麼說明比較好呢……嘛，想成是像「預知夢」一樣的東西就好了。"
33010-11 = "我偶爾，會看見那種夢。之後會變成現實的夢，除此之外還有各種夢。"
33010-12 = "……所以說，我接下來要做什麼，你也知道已經知道了，是嗎？"
33010-13 = "啊啊，是來破壞我的光環的吧？"
33010-14 = "雖然似乎還有其他夥伴，不過只有妳到達了這裡。真是優秀的能力啊，白洲梓。"
33010-15 = "……明明知道，為什麼沒有逃？"
33010-16 = "……因為沒有意義。"
33010-17 = "「一切皆為徒勞」……這是奧利斯最喜歡的話呢。和這句話所說的一樣。對於看得見未來的我，掙扎毫無意義。"
33010-18 = "所謂的「死」，在奇普托斯確實是難以見到的概念。儘管如此我們果然還算是活著，那麼「死」不伴隨在身邊是不可能的。"
33010-20 = "「破壞光環」……也就是有誰，在期望著我的死。"
33010-21 = "然後妳，不被其他任何人注意到地，入侵了這個祕密的房間。因為至今為止的事情已經發生，果然就算掙扎也是沒用的……以妳的立場來看不也是這麼覺得嗎，白洲梓？"
33010-23 = "嘛除此之外也不是沒有其他理由……話說回來，妳以前也有破壞過光環嗎？"
33010-24 = "……不，沒有。不過方法我學過了。"
33010-25 = "「學過了」……"
33010-26 = "給予……持續給予肉體無法回復的致命傷害。"
33010-27 = "一般來說就算被幾發5.56mm彈擊中，也幾乎不會成為致命傷。"
33010-28 = "不過，這不代表沒有造成傷害。不尋常數量的彈藥、持續給予傷害的壓倒性優勢，以及達成此一條件的時間。把這些「異常般地」給予的話……只以槍械破壞光環，也不是不可能。"
33010-29 = "槍械以外的方法也多的是。我們也不是不會生病。例如，長時間強制性斷絕水和食物的攝取，強制關進無法呼吸的環境，會讓身體機能停止的出血量，在體溫低於一定程度下的狀態持續拘束……"
33010-30 = "至「死」的方法，要多少都有。"
33010-31 = "而且，我聽說「百合園聖亞身體虛弱」。"
33010-32 = "……所以，那把槍就足夠了？"
33010-33 = "……那也不是不可能。但是現在的我沒有足夠的時間和優勢。"
33010-34 = "所以，要使用這個特殊的炸彈。用這個「破壞光環」。"
33010-35 = "也就是說，那是「破壞光環的炸彈」嗎？雖然是沒聽過的技術……"
33010-36 = "……原來如此，奧利斯在進行那種研究。「破壞光環的方法」，也就是「殺人的方法」。"
33010-37 = "……沒錯，然後我學習了它。「學校」就是「學習」那種事的地方吧？"
33010-38 = "…… "
33010-39 = "是嗎……奧利斯到了，那種地步……"
33010-44 = "……白洲梓，我想問妳一件事。妳變成了「殺人兇手」也沒關係嗎？"
33010-45 = "……"
33010-47 = "我看見了，畏懼變成「殺人兇手」的妳的身影。"
33010-48 = "是不是妳期望的，有沒有其他選擇……那種事實際上，不是什麼問題。"
33010-49 = "「殺人兇手就是殺人兇手」。那個明確又絕對的，最重要的是絕望般淺顯易懂的主張會烙印在妳身上。然後，會一直留存於世。"
33010-50 = "變成那樣之後妳感覺到的絕望、痛苦、憤怒、後悔和挫折，還有無力感……這些將無法傳達給任何人，消失在虛空之中。"
33010-51 = "妳也是奧利斯的話不可能不知道。「vanitas vanitatum」……這個世界的真相。"
33010-52 = "……然而，我知道的。妳同意這句話的同時，也在某處否定這件事。"
33010-54 = "……沒錯吧？"
33010-55 = "凝視著那朵花的同時，妳這麼思考著。"
33010-56 = "「一切皆為徒勞」……然而，即使如此還是必須掙扎。"
33010-57 = "這就是根植在妳深處的，你所展現的心象……雖然我並不太理解。"
33010-58 = "那樣的話，妳實際上……"
33010-60 = "……不是來殺我的，而是來向我聽取建議的吧？"
33010-61 = "關於，妳在這之後該如何掙扎。"
33010-63 = "修女會的會議室"
33010-65 = "……[USERNAME]老師？"
33010-66 = "[s1]「……抱歉，稍微睡著了。」\n[s2]「感覺，好像作了夢……」"
33010-67 = "……我知道老師很忙，不過希望老師可以稍微專心一點。"
33010-68 = "……我知道老師很忙，不過希望老師可以稍微專心一點。"
33010-69 = "[s] 「抱歉……」"
33010-70 = "聽說最近確實一直，該說是事件的善後嗎……各種來回奔波。連您管轄外的事也是。"
33010-71 = "[s]「因為我力量不足……各種沒能完成的事之類的，有很多……」"
33010-72 = "……是這樣啊。"
33010-73 = "畢竟接二連三發生了很多事，稍微整理一下吧。"
33010-74 = "也許會是枯燥的話題吧。至少我認為不會是有趣的事情……通過整理，也會有能進一步發展的事。這被稱為「事後分析」。"
33010-75 = "……那麼，進入正題吧。"
33010-76 = "聖亞同學的房間被引爆的時間，是凌晨的3點左右。"
33010-77 = "之後，最初到達現場的是「救護騎士團」的美禰團長。"
33010-80 = "美禰團長確認過室內的狀況後，立即將那個事實向茶會報告。"
33010-81 = "即使茶會陷入混亂，依舊開始了情報的隱蔽工作和搜索犯人。"
33010-85 = "然而趁著那股騷動，美禰團長和聖亞同學的遺體一起失去了蹤影。#n就連救護騎士團的其他團員似乎也不清楚他們的去向。"
33010-87 = "……以上，就是茶會視點的狀況。然而實際上關於「聖亞同學的遺體」的情報本身就是偽裝。美禰團長散布「光環被破壞了」這一假情報的同時，將聖亞同學藏在了安全的地方。"
33010-88 = "正常來說，「光環被破壞的學生」不可能會被盯上。為了保護聖亞同學，這可以說是最有效的方法吧。"
33010-89 = "茶會的成員被襲擊的異常事態……現在與其思考該相信誰，不如親自出手。是不是這麼想的呢。"
33010-90 = "實際上，以本來認為犯人是匯集情報的「茶會」的彌香同學這點來看，從結果來說她的判斷是正確的……"
33010-91 = "……然而，聖亞同學還沒有醒來。"
33010-92 = "雖然爆炸的傷勢痊癒了，卻依然處於沉睡狀態……團長也說，她不清楚原因。"
33010-93 = "目前美禰團長和聖亞同學，也還藏身在無人知曉的地方。"
33010-94 = "……雖然是以大致歸納的形式，這就是百合園聖亞同學被襲擊的事件始末。"
33010-100 = "[ns]「花子！」"
33010-101 = "我想老師是不是被無趣的櫻子同學抓住正在受苦，所以前來拯救老師了。呵呵♡"
33010-102 = "……現在不是開玩笑的時候唷，花子同學。"
33010-103 = "櫻子同學還是老樣子呢……下次，要不要一起看稍微有點過激的書呢♡"
33010-104 = "總覺得，櫻子同學對那方面似乎沒什麼免疫力……唔呵呵♡"
33010-109 = "……花子同學。那時候的約定，妳沒有忘記吧？"
33010-110 = "……當然唷。"
33010-113 = "[ns]「你在這啊，花子。」"
33010-114 = "啊啦。老師，怎麼會來這裡……"
33010-118 = "[ns]「之前說的，和修女會的約定是……」"
33010-119 = "啊啊，那是……"
33010-120 = "……夏萊的老師，這不是您可以介入的問題。"
33010-121 = "[s]「花子是補課部的，我的學生。」"
33010-122 = "哎呀這……"
33010-123 = "……"
33010-124 = "不好意思……那個，是我……"
33010-125 = "瑪麗醬……"
33010-129 = "是我拜託的。為了幫助花子同學，來說服櫻子大人……"
33010-130 = "相對的，作為約定，"
33010-131 = "讓花子同學撤回退學的想法……"
33010-132 = "……"
33010-133 = "我自己，沒辦法阻止花子同學……沒辦法理解，花子同學內心的想法……"
33010-134 = "很抱歉事情變成這樣……但是我，希望花子同學留在學園……"
33010-135 = "……不，瑪麗醬。"
33010-136 = "這不是瑪麗醬該道歉的事。因為擅自做了各種事，讓大家擔心的是我。不如說該道歉的是我。"
33010-137 = "對不起，瑪麗醬……讓妳擔心了呢。"
33010-138 = "花子同學……"
33010-139 = "現在的我，沒有想要退學的想法。請妳安心。"
33010-140 = "真的，嗎……？"
33010-141 = "是的。因為我在補課部學到了呀……我想再稍微，「掙扎」看看。對吧，老師？"
33010-142 = "[s]「……嗯。」"
33010-143 = "……謝謝你們。花子同學、[USERNAME]老師。"
33010-147 = "……不過，光憑這點還不足夠呢。"
33010-148 = "櫻子大人……？"
33010-149 = "我還有一個請求。花子同學。"
33010-150 = "……"
33010-151 = "那就是──"
33010-155 = "「上學時的服裝，只認可裸體」……制定那樣的校規，希望我能協助將三一變成「裸體樂園」的計劃……沒錯吧？"
33010-156 = "是的，沒──"
33010-157 = "……什麼？"
33010-158 = "沒想到修女會竟然計畫著這樣的陰謀……不愧是櫻子同學，果然是被謎團纏繞著的祕密主義集團的首領呢。"
33010-159 = "還有那個關於例外的條款，「原則上是全裸。不過僅限修女會可以在上學時穿戴頭紗」……"
33010-161 = "就算是我也顫抖了唷。裸體加上頭紗什麼的，這是什麼樣的新世界……"
33010-162 = "什麼……！？"
33010-163 = "不過，以現在的立場不得不幫忙……還有既然要做的話，我一定會成功的！"
33010-164 = "然而關於那個頭紗實在是太不公平了。所以我要提案，「原則上是全裸。不過所有學生可以穿著襪子」這樣如何呢！"
33010-165 = "同意這項條件的話，我就幫助那項計劃！"
33010-166 = "櫻，櫻櫻櫻櫻子大人！？那，那樣的計劃……！？"
33010-167 = "才沒有！？"
33010-168 = "怎麼會……"
33010-169 = "才不是什麼「怎麼會……」！妳突然之間在說什麼啊！"
33010-171 = "「我們聽取花子同學的請託，相對的花子同學也聽取我們一個請託」，是這樣的約定吧！？"
33010-172 = "……啊啊，好像也有那種事呢。"
33010-174 = "哈啊……"
33010-175 = "本來的話，讓妳加入修女會是最好的……不過那只是在虐待妳，把妳逼近絕境一樣。"
33010-176 = "……以這次的事件為契機，我們至今為止的「無干涉主義」也將改變。政治性質的事，我們也將會漸漸涉入吧。"
33010-177 = "這個過程中，肯定會發生很多事。到時候，有花子同學這樣的人協助我們會是一大關鍵。終究只是這樣唷。"
33010-178 = "嘛，那種程度的話我是沒關係……哈啊……"
33010-179 = "為什麼要一副很遺憾的表情呢……不，我不希望再把話題回到那邊了……"
33010-180 = "[s]「……花子你，真的不討厭這樣嗎？」"
33010-181 = "老師……"
33010-182 = "……我們不會採取強硬的手段。無論如何都是以向花子同學「請求幫忙」的形式，沒有打算要求不合理的事。"
33010-183 = "……非常感謝您，櫻子大人。"
33010-184 = "話題走偏了呢……回到正題吧。那個……"
33010-185 = "關於「全裸上學」的事呢♡"
33010-186 = "是的，那件事……才不是！不是說了不要把話題轉回去嗎……！"
33010-187 = "呼，"
33010-192 = "真是沒辦法呢……聖亞醬的襲擊事件，回到這個話題吧。實行犯如您所知，似乎是梓醬的樣子。"
33010-193 = "……聖亞醬的房間被引爆的時間是凌晨的3點。然而，那個房間被入侵的時候是2點左右。"
33010-194 = "在這裡，約有1小時的空白。入侵者……也就是梓醬和聖亞醬一起，在那個房間裡待了1個小時。"
33010-195 = "在那60分鐘裡，兩人之間到底談了什麼呢……"
33010-196 = "梓醬她，不太想細談這件事……"
33010-198 = "諮詢室"
33010-201 = "白洲梓同學，請入內。"
33010-202 = "……"
33010-204 = "下一話;事後分析（２）"

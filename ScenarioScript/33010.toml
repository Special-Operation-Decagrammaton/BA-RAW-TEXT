33010-47 = "#na;세이아;저는 또한 보았습니다. <살인자>가 될 자신의 처지를 두려워하던 모습을."
33010-48 = "#na;세이아;당신이 원한 것도 아니고, 다른 선택지가 있었던 것도 아니었지만…… 사실 그런 건 중요하지 않죠."
33010-49 = "#na;세이아;살인자는 살인자. 분명하고 절대적인 명제만이 이 세계에 남을 뿐."
33010-50 = "#na;세이아;당신이 느낀 절망, 고통, 분노, 후회, 좌절, 무력감…… 그런 건 누구에게도 전해지지 못하고 누구도 알지 못한 채 사라지겠죠."
33010-51 = "#na;세이아;네. 스스로도 잘 알고 있을 겁니다. vanitas vanitatum. 이 세계의 진실을."
33010-52 = "#na;세이아;……하지만, 당신은 이 말에 동의하면서도, 동시에 부정하고 있군요."
33010-53 = "#all;hide"
33010-54 = "#na;세이아;이건 당신이 보고 있는 장면인가요?"
33010-55 = "#na;세이아;눈 앞에 있는 꽃을 바라보면서…… 당신은 그런 생각을 하고 있군요."
33010-56 = "#na;세이아;모든 것은 헛되고 헛될지라도…… 발버둥 치지 않으면 안 된다."
33010-57 = "#na;세이아;이 이미지가 당신 내면의 근간인가요? 잘 이해하진 못했지만……."
33010-58 = "#na;세이아;그렇군요……. 당신은……."
33010-59 = "3;세이아;99\n#3;h\n#3;closeup"
33010-60 = "3;세이아;01;……저를 죽이러 온 것이 아니라, 저에게 조언을 구하기 위해 왔군요.\n#3;closeup\n#3;em;…"
33010-61 = "#3;hide\n#na;세이아;당신의 발버둥에 대해서.\n#3;closeup"

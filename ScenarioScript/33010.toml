33010-102 = "3;사쿠라코;07;농담할 분위기는 아닙니다. 하나코 씨."
33010-103 = "5;하나코;01;으응…… 역시 재미없네요. 언젠가 사쿠라코 씨에게 에로한 책을 강제로 읽히게 하고 싶네요♡\n#5;a\n#3;m1"

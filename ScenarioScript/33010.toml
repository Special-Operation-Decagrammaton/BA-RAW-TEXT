[translation]
33010-1 = "ตอนที่ 1;หาความจริง 1"
33010-4 = "ห้องพักฟื้นลับ"
33010-6 = "ยูริโซโนะ เซอางั้นเหรอ...?"
33010-7 = "ค่ะ ฉันกำลังรออยู่เลยค่ะ ชิราสึ อาซึสะ แห่งโรงเรียนสาขาอาเรียส"
33010-8 = "กำลังรออยู่เหรอ...? รอฉัน?"
33010-9 = "ค่ะ ฉันเห็นภาพนี้จากในความฝันน่ะ"
33010-10 = "อืม... ถ้าจะให้อธิบายคงลำบาก... เรียกว่าเป็นฝันบอกเหตุแล้วกันค่ะ "
33010-11 = "ฉันฝันอะไรทำนองนี้อยู่บ่อยๆ เลยค่ะ ฝันที่กลายมาเป็นความจริง#nหรือไม่ก็ฝันที่แยกไม่ออกจากความเป็นจริง "
33010-12 = "ถ้าอย่างนั้นแล้วเธอรู้เหรอว่าฉันจะทำอะไร?"
33010-13 = "ค่ะ คุณมาที่นี่เพราะได้รับคำสั่งให้มาทำลายฮาโลของฉัน "
33010-14 = "คุณมาพร้อมกับสหายคนอื่น แต่ก็มีแค่คุณคนเดียวที่เข้ามาถึงตรงนี้ ฝีมือดีมากเลยนะคะอาซึสะ"
33010-15 = "แล้วทำไมเธอถึงไม่หนีไปล่ะ...?"
33010-16 = "ก็คงเป็นเพราะว่า... มันไม่มีประโยชน์ไงคะ "
33010-17 = "คงเหมือนกับคติพจน์ที่อาเรียสเชื่อถือ... ที่บอกว่าทุกสิ่งล้วนไร้ประโยชน์#nฉันหยั่งรู้ถึงอนาคตได้ ต่อให้ดิ้นรนยังไงก็คงไร้ความหมายอยู่ดีค่ะ"
33010-18 = "ความตายอาจไม่ใช่เรื่องธรรมดาในคิโวทอส แต่สำหรับพวกเราที่ยังมีชีวิตอยู่แล้วนั้น#nมันก็แค่สิ่งที่มองไม่เห็น แต่ก็อยู่ข้างกายเรามาอย่างชัดเจน "
33010-20 = "ในคิโวทอสมีคำพูดที่ว่า \"ทำลายฮาโล\" และตอนนี้มีใครบางคนที่กำลังปรารถนาให้ฉันตาย"
33010-21 = "คุณก็เลยลักลอบเข้ามาในห้องลับโดยที่ไม่มีใครรู้ยังไงล่ะคะ#nชิราสึ อาซึสะ นักเรียนโรงเรียนสาขาอาเรียส"
33010-23 = "คุณเคยทำลายฮาโลของใครมาก่อนไหมคะ?"
33010-24 = "ไม่เคย... แต่ฉันรู้ดีว่าต้องทำลายอย่างไร... ฉันเรียนมาน่ะ"
33010-25 = "เรียนมาเหรอคะ...?"
33010-26 = "มันไม่ยากหรอก... ถ้าร่างกายได้รับความเสียหายจนไม่อาจหวนคืนได้ ฮาโลก็จะถูกทำลายไปในที่สุด"
33010-27 = "ถ้าเป็นนักเรียนของคิโวทอส ต่อให้โดนกระสุน 5.56 mm ยิงนับสิบนัดก็คงจะไม่ได้รับบาดเจ็บ#nร้ายแรงอะไร..."
33010-28 = "แต่ถ้ามีกระสุน เวลา และความได้เปรียบทางกลยุทธ์เพียงพอ#nการทำลายฮาโลก็คงไม่ใช่เรื่องที่เป็นไปไม่ได้"
33010-29 = "นอกจากนี้หากร่างกายขาดน้ำหรืออาหารเป็นเวลานาน หายใจไม่สะดวกเป็นเวลานาน#nเลือดไหลเวียนไม่ปกติ... อุณหภูมิร่างกายต่ำเกินไป... หรือว่ากำลังเจ็บป่วยอยู่..."
33010-30 = "มีวิธีมากมายเลยล่ะที่จะทำให้อีกฝ่ายเข้าใกล้ความตายได้ "
33010-31 = "และยิ่งเป็นคนอ่อนแออย่างเธอ... ยูริโซโนะ เซอา"
33010-32 = "คิดว่าอาวุธที่คุณเอามาด้วยมันเพียงพอแล้วเหรอ...?"
33010-33 = "อื้ม คิดว่านะ แต่ตอนนี้ฉันไม่มีทั้งเวลา ทั้งความได้เปรียบทางกลยุทธ์... "
33010-34 = "ฉันเลยจะใช้ระเบิดนี้ เจ้านี่แหละจะ \"ทำลายฮาโล\" ได้ในครั้งเดียว"
33010-35 = "ใช้ระเบิดทำลายฮาโลงั้นเหรอ...? ไม่เคยได้ยินเทคนิคนี้มาก่อนเลย... "
33010-36 = "อย่างนี้เองสินะคะ... โรงเรียนอาเรียสคงสอนและวิจัยอะไรแบบนี้สินะ#nทั้งการใช้ระเบิดทำลายฮาโล ทั้งวิธีการฆ่าคน"
33010-37 = "อื้ม... แต่มันก็แน่นอนอยู่แล้วนี่? ก็โรงเรียนคือที่ที่สอนเรื่องแบบนี้ไง"
33010-38 = "......."
33010-39 = "อย่างนี้เองสินะคะ... สุดท้ายอาเรียสก็ทำถึงขนาดนี้..."
33010-44 = "อาซึสะ เธอจะไม่เป็นอะไรจริงๆ เหรอกับการต้องกลายเป็น <ฆาตกร> น่ะ?"
33010-45 = "......."
33010-47 = "ฉันได้ภาพนั้นอีกครั้งแล้วละค่ะ ภาพที่เกรงกลัวว่าตัวเองจะต้องกลายเป็น <ฆาตกร>"
33010-48 = "คุณเองก็ไม่ได้ต้องการแบบนี้ แต่ก็ไม่ได้มีทางเลือกอื่นด้วย... แต่ความจริงแล้วเรื่องนั้นมันไม่สำคัญหรอกค่ะ"
33010-49 = "เพราะฆาตกรก็คือฆาตกร มีเพียงข้อวินิจฉัยที่ชัดเจนและเด็ดขาดเท่านั้นที่จะคงอยู่ในโลกนี้"
33010-50 = "ความสิ้นหวัง ความเจ็บปวด ความโกรธ ความเสียใจ ความท้อแท้ ความอ่อนแอที่คุณรู้สึก...#nทั้งหมดนี้จะหายไปในที่สุด หายไปทั้งๆ ที่คุณไม่สามารถบอกใครได้ และไม่มีใครรับรู้ได้"
33010-51 = "คุณเองก็น่าจะรู้ความจริงของโลกนี้ดีอยู่นะคะ Vanitas Vanitatum... "
33010-52 = "คุณเห็นด้วยกับคำนี้... แต่คุณก็ปฏิเสธมันอยู่เหมือนกันสินะคะ "
33010-54 = "นี่คือภาพที่คุณกำลังมองอยู่หรือเปล่าคะ?"
33010-55 = "คุณกำลังมองดอกไม้ตรงหน้า... แล้วก็คิดแบบนี้สินะคะ"
33010-56 = "ถึงทุกอย่างจะว่างเปล่าและไร้ประโยชน์... แต่ก็ต้องไม่หยุดดิ้นรน"
33010-57 = "ฉันไม่ค่อยเข้าใจเท่าไร... แต่ภาพนี้คือภูมิหลังของตัวตนข้างในของคุณใช่ไหมคะ?"
33010-58 = "แบบนี้นี่เองสินะคะ... ที่จริงแล้วคุณ..."
33010-60 = "คุณไม่ได้มาที่นี่เพื่อฆ่าฉัน... แต่มาเพื่อขอคำแนะนำจากฉันนี่เอง"

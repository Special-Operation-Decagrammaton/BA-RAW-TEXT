33010-1 = "#title;제1화;포스트모템 1"
33010-2 = "#wait;2500"
33010-3 = "#all;hide"
33010-4 = "#place;비밀 회복실"
33010-5 = "3;세이아;99\n#3;a\n#3;em;…\n#wait;2500"
33010-6 = "#na;???;유리조노 세이아……?"
33010-7 = "3;세이아;02;네. 기다리고 있었습니다. 아리우스 분교의 시라스 아즈사."
33010-8 = "#na;???;기다리고 있었다고……? 나를?"
33010-9 = "3;세이아;99;네. 꿈에서 보았거든요. 이 장면을."
33010-10 = "3;세이아;02;……그러네요, 설명하기 조금 힘드니…… 일단은 예지몽 같은 거라고 해둘까요."
33010-11 = "3;세이아;01;저는 종종 그런 꿈을 꿉니다. 현실이 되어버리는 꿈. 혹은 현실과 구분할 수 없는 꿈을."
33010-12 = "#na;???;그렇다는 건, 지금 내가 뭘 할 건지도 알고 있어?"
33010-13 = "3;세이아;01;네. 당신은 제 헤일로를 파괴하라는 명령으로 여기에 왔습니다."
33010-14 = "3;세이아;99;다른 동료들과 함께 왔지만, 여기까지 도달한 것은 당신이 유일하죠. 훌륭한 능력이네요. 아즈사."
33010-15 = "#na;???;……. 그럼 어째서 도망치지 않은 거야?"
33010-16 = "3;세이아;08;굳이 말하자면…… 의미가 없기 때문이죠."
33010-17 = "3;세이아;01;모든 것은 헛되나니…… 아리우스가 신봉하는 그 금언처럼요. 미래를 보는 저에겐 그렇게 발버둥 치는 것은 무의미할 뿐입니다."
33010-18 = "3;세이아;99;죽음은 키보토스에서 흔한 일은 아니겠지만, 우리 역시 살아 있는 사람. 보이지 않을 뿐, 죽음은 분명하게 우리 곁에 존재하고 있죠."
33010-19 = "#all;hide"
33010-20 = "#na;세이아;'헤일로를 파괴한다.' ……우리 키보토스에서만 쓰이는 이 관용구대로, 누군가가 제가 죽기를 바라고 있고,"
33010-21 = "#na;세이아;당신은 이렇게, 이 비밀의 방에 아무도 모르게 잠입해 들어왔으니까요. 시라스 아즈사. 아리우스 분교의 학생."
33010-22 = "3;세이아;01\n#3;h"
33010-23 = "3;세이아;01;당신은 전에도 누군가의 헤일로를 파괴한 적이 있나요?"
33010-24 = "#na;???;……. 아니. 하지만 어떻게 하는지는 알고 있어……. 배웠으니까."
33010-25 = "3;세이아;02;배웠다고요……?\n#3;em;[?]"
33010-26 = "3;세이아;01\n#3;h\n#na;???;방법은 간단해……. 결국 육체가 돌이킬 수 없는 대미지를 받으면 헤일로는 부서져 버려."
33010-27 = "#na;???;키보토스의 학생이라면 5.56mm 탄을 수십 발 이상 맞아도 치명적인 상처를 입진 않겠지만……"
33010-28 = "#na;???;충분한 탄약과 시간, 그리고 전술적 우위가 확보되면 화기로 헤일로를 부수는 것도 불가능하지는 않아."
33010-29 = "#na;???;그 외에도 물이나 식량을 장기간 섭취하지 못하거나, 일정 이상 숨을 쉬지 못하거나, 피를 일정 이상 흘리거나…… 체온이 일정 이상 낮아지거나…… 병에 걸리거나……."
33010-30 = "#na;???;죽음에 이르는 방법들은 다양하게 존재하고 있어."
33010-31 = "#na;???;그리고 유리조노 세이아, 몸이 약한 당신이라면……."
33010-32 = "3;세이아;01;…… 지금 당신이 가지고 있는 화기로도 충분하다?"
33010-33 = "#na;???;응, 아마도. 하지만 지금 나에겐 충분한 시간도, 전술적 우위도 없으니……."
33010-34 = "#na;???;이 폭탄을 사용할 거야. 이거라면 단번에 '헤일로를 파괴'할 수 있어."
33010-35 = "3;세이아;02;헤일로를 부수는 폭탄……? 그런 기술은 들어본 적 없는데……."
33010-36 = "3;세이아;99;……그렇군요. 아리우스 학원은 그런 것을 가르치고 연구하나보네요. 헤일로를 부수는 방법을. 사람을 죽이는 방법을.\n#3;em;…"
33010-37 = "#na;???;……응. 그야, 당연하잖아? 학원은 그런 걸 가르치는 곳이니까."
33010-38 = "3;세이아;01;……."
33010-39 = "3;세이아;99;……그렇군요. 아리우스는 결국 그렇게까지……."

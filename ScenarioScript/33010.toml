[translation]
33010-1 = "Episode 1;Postmortem Part 1"
33010-4 = "Hidden Room"
33010-6 = "Yurizono Seia?"
33010-7 = "I've been waiting for you, Arius Satellite School's Shirasu Azusa."
33010-8 = "You...were?"
33010-9 = "Yes. Because all of this already came to me in a dream."
33010-10 = "It's difficult to explain—precognitive. You can think of it like a 'prophetic dream'. "
33010-11 = "I have them often, dreams that become reality. As well as ones that are indistinguishable from reality. "
33010-12 = "Does that mean you know what I'm going to do now?"
33010-13 = "Yes. You're here to destroy my halo. "
33010-14 = "Others joined you on this mission, but you're the only one who made it this far. You're quite talented, Azusa."
33010-15 = "Then why didn't you run away?"
33010-16 = "If you must know...it's because it would have been meaningless. "
33010-17 = "Everything is in vain. Just as the wise saying Arius is so fond of goes. Struggling is meaningless to someone like me who can see the future."
33010-18 = "Death may not be common in Kivotos, but that doesn't mean we're free from it. We may not be able to see it, but as long as we draw breath, death will always be clearly with us."
33010-20 = "To destroy one's halo is to kill them. Meaning, someone out there wants me dead."
33010-21 = "And here you are. You made it all the way here and infiltrated a hidden room still undetected. You, Shirasu Azusa, a student from Arius Satellite School."
33010-23 = "Have you ever destroyed a halo before?"
33010-24 = "No, but I know how to... I've been taught."
33010-25 = "Taught?"
33010-26 = "A halo will shatter if they're wounded gravely enough, over and over."
33010-27 = "A student in Kivotos could be shot with a dozen 5.56 millimeter rounds and it still wouldn't cause a fatal wound..."
33010-28 = "...but with enough ammunition, time, and tactical superiority, destroying a halo with just a firearm isn't impossible."
33010-29 = "If someone is made to go without food or water for long enough, is suffocated for an extended period of time, loses enough blood, suffers from hypothermia, or other types of illness..."
33010-30 = "All are sufficient ways to destroy one's halo. "
33010-31 = "As I understand it, you're particularly frail as well, Yurizono Seia."
33010-32 = "Do you think your firearm will be enough?"
33010-33 = "Under most circumstances, yes. But I'm short on time and don't have the tactical advantage right now."
33010-34 = "That's why I brought this bomb. I can destroy your halo immediately with this."
33010-35 = "A bomb that can shatter a halo? I've never heard of such a weapon. "
33010-36 = "This must be the kind of thing Arius spends its time teaching. How to destroy halos—how to kill."
33010-37 = "Naturally. A school is a place of learning, isn't it? And that's what they taught me there."
33010-38 = "... "
33010-39 = "I see. So this is what Arius has become."
33010-44 = "Are you truly prepared to become a murderer, Azusa? "
33010-45 = "..."
33010-47 = "I've seen it before. How afraid you are of becoming a murderer."
33010-48 = "Murder is murder. Whether it was something you wished for or not, whether you had any other choice..."
33010-49 = "None of it matters. It's something you can never come back from. It's something you will carry with you for as long as you remain in this world."
33010-50 = "The despair, agony, rage, regret, frustration, and helplessness you'll feel... No one will ever be able to empathize with it, and eventually, those feelings fade into nothingness, just as you will."
33010-51 = "You've been told it your whole life: vanitas vanitatum—that it's the truth of the world."
33010-52 = "Yet, from what I've seen, you're a living contradiction. You simultaneously place faith in these words but don't believe them. "
33010-54 = "Isn't that right?"
33010-55 = "It's what you were thinking to yourself as you gazed upon that flower."
33010-56 = "\"Even if everything is in vain...I must continue struggling.\""
33010-57 = "This is what's at the core of your being—the image you see when you close your eyes. I couldn't understand it at first..."
33010-58 = "...but now it makes perfect sense to me."
33010-60 = "You didn't come here to kill me. You came to seek advice."
33010-61 = "Advice about your struggle."
33010-63 = "Sisterhood Meeting Room"
33010-65 = "Are you all right, [USERNAME] Sensei?"
33010-66 = "[s1] \"I must have dozed off for a bit.\"\n[s2] \"I feel like I had some kind of dream...\""
33010-67 = "I know you've been busy with this and that lately, but I'd appreciate it if you could focus a little bit."
33010-68 = "I know you've been busy with this and that lately, but I'd appreciate it if you could focus a little bit."
33010-69 = "[s] \"Sorry about that.\""
33010-70 = "As I understand it, you've been volunteering to deal with the aftermath of that incident. "
33010-71 = "[s] \"I'm an adult. Someone has to take responsibility.\""
33010-72 = "Fair enough."
33010-73 = "A lot has happened in such a short amount of time. We'd be remiss not to do our due diligence."
33010-74 = "It will undoubtedly be tedious, but that's simply the nature of a postmortem."
33010-75 = "So, back to the beginning."
33010-76 = "Seia's recovery room was destroyed at roughly 3 AM on the night of the attack."
33010-77 = "The first to arrive at the scene was Captain Mine of the Remedial Knights."
33010-80 = "She reported what happened to the Tea Party after grasping the situation."
33010-81 = "Even as the Tea Party fell into a panic, a concerted effort began to hide news of Seia's death and search for the perpetrator."
33010-85 = "Captain Mine took advantage of the chaos and escaped with Seia's body. Even the other members of her club were unsure of where she went."
33010-87 = "That's as much as the Tea Party knew. In reality, Mine had only made it seem like Seia's halo was destroyed and instead hid her somewhere safe."
33010-88 = "It was the best way to protect Seia from another attack. No one targets a dead person."
33010-89 = "The Tea Party has no shortage of enemies after all. The culprit could be just about anyone. I believe Mine made the right decision with that in mind."
33010-90 = "Now we know the one who orchestrated the attack was Mika. Mine made a wise decision."
33010-91 = "However, Seia still hasn't woken up."
33010-92 = "Her wounds from the explosion have healed, but she remains unconscious...for reasons unknown, according to the captain."
33010-93 = "In conclusion, Captain Mine and Seia are still in hiding. No one knows their location."
33010-94 = "That sums up everything we know about the attack on Yurizono Seia."
33010-100 = "[ns] \"Hanako.\""
33010-101 = "I thought Sakurako might be boring you to tears, so I came to your rescue."
33010-102 = "I'm not in the mood for your jokes, Hanako."
33010-103 = "You're such a stick in the mud. Smile! Live a little! Take a walk on the beach—find something dirty to read!"
33010-104 = "Something tells me you'd be just the type to get into it. ♥"
33010-109 = "You haven't forgotten the pact you made, have you?"
33010-110 = "Of course not."
33010-113 = "[ns] \"What's this all about, Hanako?\" "
33010-114 = "Sensei? What are you doing here?"
33010-118 = "[ns] \"You said you made a pact with the Sisterhood.\" "
33010-119 = "Oh. That..."
33010-120 = "With all due respect, this matter isn't any of your or Schale's concern, Sensei."
33010-121 = "[s] \"I advise the Make-Up Work Club, so Hanako is still MY student.\""
33010-122 = "Goodness..."
33010-123 = "..."
33010-124 = "I-I'm sorry. This is my fault."
33010-125 = "Mari..."
33010-129 = "It was a deal. Hanako asked for my help in persuading Sakurako. "
33010-130 = "And in exchange..."
33010-131 = "...I asked Hanako to change her mind about dropping out of school."
33010-132 = "..."
33010-133 = "It was the only way! I couldn't understand how Hanako felt or talk her out of dropping out."
33010-134 = "All I wanted was for her to stay at the academy, even if it meant being selfish."
33010-135 = "You weren't, Mari."
33010-136 = "You don't need to be ashamed or apologize. If anyone was selfish, it was me for making you worry like that."
33010-137 = "I'm sorry, Mari. "
33010-138 = "Hanako..."
33010-139 = "Rest assured that dropping out is the furthest thing from my mind now."
33010-140 = "R-Really? Do you mean it?"
33010-141 = "Absolutely. I learned a lot while in the Make-Up Work Club, including the value of struggling and pushing myself just a little bit more. Isn't that right, Sensei?"
33010-142 = "[s] \"Yeah. You can do this.\""
33010-143 = "I'm so glad to hear that. Thank you both."
33010-147 = "However, that alone won't suffice."
33010-148 = "Sakurako?"
33010-149 = "I have a request of my own to make of you, Hanako."
33010-150 = "..."
33010-151 = "That's..."
33010-155 = "How devious. I still can't believe you asked for my help in creating a school rule that prohibits clothing in classrooms. All-nude lessons only!"
33010-156 = "I'm glad you remem—"
33010-157 = "I beg your pardon?"
33010-158 = "To think the Sisterhood had such naughty ambitions. I shouldn't have expected anything less of you, Sakurako. This truly is an organization shrouded in mystery."
33010-159 = "I thought the clause that allowed Sisterhood members to still wear a veil while nude was a nice touch, though."
33010-161 = "Completely exposed with nothing on but a veil. My, what a daring way to show off the Sisterhood's privileges."
33010-162 = "Excuse me?!"
33010-163 = "I gave you my word, so I have no choice but to cooperate with this plan of yours! I'll make sure this rule is passed if it's the last thing I do!"
33010-164 = "However, I can't go along with the favoritism your veil exception creates. So I propose an addendum that allows all other students to still wear socks!"
33010-165 = "Make that one concession and I promise you that your rule will pass!"
33010-166 = "Sakurako! Y-You've been keeping this from me the entire time?!"
33010-167 = "Of course I haven't!"
33010-168 = "Are you sure?"
33010-169 = "Yes, I'm sure!"
33010-171 = "The exchange for granting your request was that you grant one of ours as well!"
33010-172 = "Oh, thaaaaaat. Now I remember."
33010-174 = "*sigh*"
33010-175 = "As much as I'd like to request that you agree to join the Sisterhood, that wouldn't be fair. I would basically be coercing you."
33010-176 = "We've decided to change our non-interventionism policy after this most recent incident. The Sisterhood will be more involved in Trinity's politics than before—at least for the foreseeable future."
33010-177 = "There are sure to be a lot of...growing pains in that regard, and having the help of someone as talented as you could help alleviate them."
33010-178 = "I suppose I can do that..."
33010-179 = "Why so hesitant? I hope you still aren't thinking of that fabricated proposal you said I made. "
33010-180 = "[s] \"I think Hanako should reserve the right to say 'no' when she wants to.\""
33010-181 = "Sensei... "
33010-182 = "Yes, I can agree to that. We should count ourselves fortunate that you're willing to help at all. I won't push my luck by asking you to do any more than you're comfortable with."
33010-183 = "Thank you, Sakurako."
33010-184 = "Let's get back to the matter at hand, though. We were discussing—"
33010-185 = "The nude attendance matter, obviously! ♥"
33010-186 = "Precisely, the nudity poli—no! We were discussing the matter surrounding Seia! "
33010-187 = "Right."
33010-192 = "Okay, getting serious... We already know the one who attacked Seia was our little Azusa—Shirasu Azusa."
33010-193 = "Seia's room was destroyed at 3AM on the night of the attack, but records indicate the infiltration should have been around 2AM."
33010-194 = "Meaning the intruder, Azusa, was with Seia for about an hour."
33010-195 = "What could have happened between the two of them within that window?"
33010-196 = "Azusa hasn't told me. However..."
33010-198 = "Counseling Room"
33010-201 = "Please enter, Shirasu Azusa."
33010-202 = "..."
33010-204 = "Next Episode;Postmortem Part 2"

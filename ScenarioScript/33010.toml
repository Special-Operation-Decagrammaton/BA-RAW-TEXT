33010-63 = "#place;시스터후드의 회의실"
33010-64 = "3;사쿠라코;07\n#3;em;…\n#3;a\n#wait;2500"
33010-65 = "3;사쿠라코;07;…… [USERNAME] 선생님? 괜찮으신가요?\n#3;em;[?]"
33010-66 = "[s1] \"……잠깐 졸았었나 봐.\"\n[s2] \"어떤 꿈을 꾼 것 같았는데…….\""
33010-67 = "3;사쿠라코;07;최근 이런저런 일로 바쁘신 것은 알고 있습니다만…… 조금만 집중해주시면 감사하겠군요."
33010-68 = "3;사쿠라코;07;최근 이런저런 일로 바쁘신 것은 알고 있습니다만…… 조금만 집중해주시면 감사하겠군요."
33010-69 = "[s] \"죄송합니다…….\""
33010-70 = "3;사쿠라코;07;애초에 당신이 요청한 설명입니다만…… 하긴, 이 며칠간 계속 사건의 뒷처리를 자청하고 계신다고 들었습니다."
33010-71 = "[s] \"자질구레한 뒷처리는 어른의 역할이니까.\""
33010-72 = "3;사쿠라코;07;……그렇군요."
33010-73 = "3;사쿠라코;99;많은 사건들이 있었기에, 이 모든 것들을 제대로 정리해두지 않으면 안되겠죠."
33010-74 = "3;사쿠라코;07;지루하고 재미없더라도, 이런 것들을 정리해야 다음으로 나아갈 수 있는 법. 그게 바로 포스트모템의 의의니까요."
33010-75 = "3;사쿠라코;07;……. 그럼, 다시 본론으로.\n#3;em;[반응]"
33010-76 = "3;사쿠라코;07;세이아 씨의 회복실이 폭파된 것은 새벽 3시경."
33010-77 = "3;사쿠라코;99;그 직후, 가장 먼저 폭발 현장에 도착한 것은 구호기사단의 미네 단장이었습니다.\n#3;em;…"
33010-78 = "#all;hide"
33010-79 = "3;미네;01\n#3;a\n#wait;1500"
33010-80 = "#na;사쿠라코;미네 단장은 상황을 파악한 뒤, 곧바로 이 사실을 티파티에 보고."
33010-81 = "#na;사쿠라코;티파티는 세이아 씨의 사망 소식에 패닉에 빠졌고, 정보 은폐와 범인 색출 등의 소동이 벌어졌습니다."
33010-82 = "#st;[0,0];instant;1;"
33010-83 = "#clearST"
33010-84 = "3;미네;01\n#3;d\n#wait;1500"
33010-85 = "#na;사쿠라코;그 혼란을 틈타 미네 단장은 세이아 씨와 함께 모습을 감췄습니다. 단원들조차 행방을 알지 못할 정도로 철저하게 사라져버렸죠."
33010-86 = "3;사쿠라코;07\n#3;h"
33010-87 = "3;사쿠라코;07;거기까지가 티파티가 알고 있는 사실입니다. 사실 미네 단장은 세이아 씨를 안전한 곳에 숨기고 그녀의 헤일로가 파괴된 것으로 조작한 것입니다."
33010-88 = "3;사쿠라코;99;죽은 사람은 노려질 리가 없으니까요. 그게 세이아 씨를 지킬 수 있는 가장 확실한 방법이었겠죠."
33010-89 = "3;사쿠라코;07;티파티의 멤버가 습격당한 사건, 범인은 그 누구라도 될 수 있습니다. 그러니 그 누구도 믿어서는 안 된다고 생각하고 자체적으로 행동한 것입니다.\n#3;em;[반응]"
33010-90 = "3;사쿠라코;07;범인이 미카 씨였다는 것이 밝혀진 지금, 그녀의 판단은 결과적으로 옳았던 것이겠지만……."
33010-91 = "3;사쿠라코;07;……하지만 아직도 세이아 씨는 깨어나지 않고 있어요.\n#3;em;…"
33010-92 = "3;사쿠라코;99;폭발의 상처는 나았지만 그래도 계속 잠들어 있는 상태…… 기사단장도 원인을 모른다고 했습니다."
33010-93 = "3;사쿠라코;07;결국 그렇게 미네 단장과 세이아는 아무도 모르는 곳에서 지금까지 몸을 숨기고 있는 중입니다."
33010-94 = "3;사쿠라코;07;그것이 바로 과거에 벌어졌던 유리조노 세이아 습격사건의 전말입니다.\n#3;closeup\n#3;em;[반응]"

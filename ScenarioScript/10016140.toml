[translation]
10016140-1 = "Afterword; Engineering Department & Veritas Episode"
10016140-6 = "Oh, hey! Chihiro!"
10016140-10 = "I just finished confirming that all the robots used in the matches were safely returned."
10016140-11 = "Hare is checking the programs' integrities, and we have a macro running to organize the results from all the races..."
10016140-12 = "...Which finishes out all the work Seminar asked us to do!"
10016140-13 = "Great job, Maki."
10016140-14 = "I'm sorry to ask you to do all this work during a festival. It only comes around every so often too."
10016140-15 = "Don't be! I got to participate in some of the races and even do some painting here and there. I had a blast!"
10016140-16 = "There's nothing I like better than bringing a little more color into the world."
10016140-17 = "I'm glad to hear that's how you feel."
10016140-18 = "By the way, I heard that a Millennium student brought some kind of holographic device to one of the events, which caused some controversy..."
10016140-22 = "The opposing school described the device, and it sounded almost exactly like Hare's Athena-3..."
10016140-23 = "Do you know anything about that, Ma—"
10016140-24 = "Eek! I totally forgot, Kotama asked me to go help her retrieve the wiretaps she installed for the festival..."
10016140-26 = "S-Sorry, Chihiro! Looks like I'll have to head out first!"
10016140-31 = "Well, I suppose that confirms it."
10016140-32 = "They'll need a strict reminder and some disciplinary action when we get back to the club room..."
10016140-36 = "Chihiro, have you finished up everything for the festival?"
10016140-37 = "All set, thanks to our underclassmen."
10016140-38 = "How about you? Did you show all the attendees out?"
10016140-39 = "Naturally. As the hosting school's cheer squad captain, it was my duty to attend to the crowds until the very end of the field day."
10016140-40 = "You wouldn't have had to if you had just built a proper cheer bot from the beginning, you know."
10016140-41 = "You think so? I'm not complaining though..."
10016140-42 = "Even though it was a last-minute mission, cheerleading was a very new experience for me. I enjoyed the opportunity to assume a different role from my usual responsibilities."
10016140-43 = "It was so enjoyable, in fact, that the day flew by before I knew it."
10016140-44 = "Although, I suppose it's time to go back to being a meister of the Engineering Department again... I'll miss it."
10016140-45 = "For you to be sad about returning to engineering, it really must've been a great experience."
10016140-49 = "What about you, Chihiro? Did you have fun at the festival?"
10016140-50 = "I wouldn't exactly say fun... I was so busy it feels like the day was over before I knew it."
10016140-51 = "On top of staying up all of last night preparing for the opening, today was just filled with all kinds of issues left and right. Even the opening ceremony was a huge commotion..."
10016140-52 = "It's all a bit of a blur, at least until I managed to take a quick nap at the infirmary."
10016140-53 = "...Utaha, you pulled an all-nighter yesterday too. Aren't you tired at all?"
10016140-54 = "Mm. Actually, I'm so tired that I would pass out if I laid down, but..."
10016140-55 = "My willpower is stronger than any sleepiness!"
10016140-56 = "I don't know if I admire her mental strength or if she's just an idiot..."
10016140-57 = "Anyway, it looks like that cheer bot you all built caused even more trouble while I was napping..."
10016140-62 = "...Which brings me to the question, again, what were you thinking building a cheerleading robot with all those combat capabilities?!"
10016140-63 = "It's because..."
10016140-65 = "Because it was my dream."
10016140-66 = "Forget your dreams! We're being investigated by SRT Academy for your dreams!"
10016140-67 = "You really are—"
10016140-73 = "...Nevermind. If you were the type of person to listen to my nagging, you would've stopped with your dreams a long time ago."
10016140-74 = "Heehee. As expected, my old friend. You're always quick to evaluate and judge a situation."
10016140-79 = "Anyways, I couldn't really perform in the festivities because of everything, but I'm glad everyone enjoyed it."
10016140-80 = "Though hackers generally spend most of their time indoors, our new members take it to a whole new degree. They're so inactive, I genuinely worry about their health sometimes."
10016140-81 = "They got some exercise, and I'm sure that interacting with different academies and competing in a different environment helped broaden their horizons."
10016140-82 = "On that, I agree with you wholeheartedly."
10016140-83 = "There are some things in the world that can only be learned with your body, not books or videos."
10016140-87 = "Speaking of new experiences, an idea just popped into my head."
10016140-91 = "Chihiro, why don't you try cheerleading as well?"
10016140-92 = "...Where's this coming from all of a sudden?"
10016140-93 = "It was much more fun than I expected, cheering together with everyone... So I wanted to share that experience with you as well."
10016140-94 = "As for a cheerleader outfit, I'm sure Hibiki can make one for you in no time at all if we ask..."
10016140-95 = "And, like we were talking about, a passionate new experience might inspire you in your coding."
10016140-96 = "Forget it. I don't know about other athletic activities, but cheerleading is..."
10016140-100 = "...Ah, I see. You must be worried about the extra pounds you've gained from your irregular work schedule."
10016140-101 = "Don't worry. People pay much less attention to other people's body types than you might think."
10016140-102 = "Besides, I've discovered that all types of people like all types of..."
10016140-103 = "It's not about my weight!"
10016140-104 = "It really is okay. You know how the saying goes..."
10016140-106 = "You only lose if you're shy about it!"
10016140-107 = "No one says that!"

[translation]
10016140-1 = "ย้อนวันวาน; ชมรมวิศวกรรม & เวอริทัส"
10016140-6 = "อ๊ะ รุ่นพี่จิฮิโระ!"
10016140-10 = "ฉันเพิ่งกลับมาน่ะ หุ่นยนต์ทุกตัวที่ใช้ในงานมหกรรมกีฬาถูกส่งคืนมาครบแล้ว"
10016140-11 = "รุ่นพี่ฮาเระกำลังตรวจสอบการทำงานของโปรแกรมหุ่นยนต์ กับกำลังรันมาโครจัดเรียงข้อมูลบันทึก#nการแข่งอยู่น่ะ..."
10016140-12 = "เท่านี้งานที่ทางเซมิน่าไหว้วานมาก็เสร็จแล้วละ!"
10016140-13 = "ขอบคุณมากนะ มากิ"
10016140-14 = "ทั้งที่เป็นงานเทศกาลที่รอมานานแท้ๆ แต่กลับต้องมาช่วยงานจนถึงนาทีสุดท้าย ขอโทษนะ"
10016140-15 = "ไม่เป็นไรหรอก ตอนที่มีเวลาฉันก็ไปร่วมการแข่ง แล้วก็ไปวาดกราฟิตี้มาสนุกมากเลยแหละ"
10016140-16 = "พอได้ทำให้โลกมีสีสันขึ้นได้แบบนี้ มันสนุกมากๆ เลยละ!"
10016140-17 = "ถ้าเป็นแบบนั้นก็ค่อยเบาใจหน่อย..."
10016140-18 = "ว่าแต่ว่า... ดูเหมือนจะมีนักเรียนของมิลเลเนียมบางคนเอาอุปกรณ์โฮโลแกรมมาใช้ระหว่างการ#nแข่งขันศึกทหารม้า จนทำให้เกิดเรื่องวุ่นวายขึ้นด้วย..."
10016140-22 = "จากที่นักเรียนโรงเรียนอื่นเล่ามา ลักษณะของอุปกรณ์โฮโลแกรมนั่นดูคล้ายๆ กับ <อาเธน่า 3> ของฮาเระเลย"
10016140-23 = "นี่ มากิ เธอรู้อะไร..."
10016140-24 = "อ๊ะ ลืมไปซะสนิทเลย! ฉันนัดกับรุ่นพี่โคทามะว่าจะไปเก็บอุปกรณ์ดักฟังที่ติดตั้งไว้กลับมาด้วยกันนี่นา..."
10016140-26 = "ระ... รุ่นพี่ ฉันลืมว่ามีงานต้องไปทำต่อ ขะ... ขอตัวก่อนนะ...!"
10016140-31 = "คิดแล้วเชียวว่าเป็นฝีมือของรุ่นน้องเรา..."
10016140-32 = "ถ้ากลับมาที่ห้องชมรมเมื่อไร จะต้องเรียกมาปรับทัศนคติกันสักหน่อยแล้ว"
10016140-36 = "จิฮิโระ เก็บงานทุกอย่างเรียบร้อยดีมั้ย?"
10016140-37 = "อื้อ ได้พวกรุ่นน้องมาช่วยก็เลยเก็บเรียบร้อยแล้วละ"
10016140-38 = "ว่าแต่เธอล่ะ? จัดการเรื่องคนดูออกจากสนามเรียบร้อยแล้วเหรอ? "
10016140-39 = "อื้อ เรียบร้อยแล้วละ ในฐานะหัวหน้าทีมเชียร์ของโรงเรียนเจ้าภาพจัดงาน ฉันต้องคอยดูแลจนงานจบ#nอยู่แล้ว"
10016140-40 = "ถ้าเราสร้างหุ่นยนต์เชียร์ได้ถูกต้องตั้งแต่แรกก็คงดี..."
10016140-41 = "หืม? จะบ่นอะไรรึไง?"
10016140-42 = "ถึงต้องมารับหน้าที่ทีมเชียร์อย่างกะทันหัน แต่พอได้ลองทำหน้าที่ที่ต่างไปจากตอนปกติดู ฉันก็ได้ประสบการณ์สนุกๆ มาเยอะเลยละ"
10016140-43 = "วันนี้สนุกมากจนรู้สึกว่าเวลาเดินเร็วกว่าทุกๆ วันเลย"
10016140-44 = "ตอนนี้คงได้เวลากลับไปเป็นไมสเตอร์แห่งชมรมวิศวกรรมเหมือนเดิมแล้วสินะ... น่าเสียดายจัง~"
10016140-45 = "ดูจากที่มานั่งบ่นเสียดายแบบนี้ คงจะสนุกมากเลยสินะ  "
10016140-49 = "จี้จัง... งานเทศกาลวันนี้สนุกรึเปล่า?"
10016140-50 = "ก็สนุกดีแล้วก็ได้พักงีบด้วย... ฉันมัวแต่ยุ่งจนหัวหมุนทั้งวัน เลยไม่รู้ว่างานวันนี้เป็นยังไงบ้าง"
10016140-51 = "เมื่อวานก็มัวแต่โต้รุ่งเพราะต้องเตรียมงาน แถมวันนี้ก็มีเรื่องวุ่นวายตั้งแต่พิธีเปิดอีก..."
10016140-52 = "ฉันจำเรื่องก่อนที่จะไปแวะพักงีบที่หน่วยแพทย์สัมพันธ์แทบไม่ได้เลย"
10016140-53 = "...อุทาฮะ เมื่อวานเธอก็โต้รุ่งอยู่ทั้งคืนเหมือนกัน ไม่เหนื่อยบ้างรึไง?"
10016140-54 = "อืม บอกตามตรงว่าฉันเหนื่อยมากๆ จนอยากจะทิ้งตัวนอนตรงนี้เลยละ..."
10016140-55 = "แต่ความเหน็ดเหนื่อยแค่นี้น่ะ ใช้พลังใจเต็มร้อยก็เอาชนะได้อยู่แล้ว!"
10016140-56 = "ฉันชักไม่แน่ใจแล้วว่าเป็นเพราะเธอพลังใจเหลือล้น หรือว่าเป็นคนบ้ากันแน่..."
10016140-57 = "ยังไงก็เถอะ ตอนที่ฉันนอนอยู่ ดูเหมือนว่า “หุ่นยนต์เชียร์” ที่ชมรมวิศวกรรมสร้างขึ้นจะก่อปัญหาขึ้น#nอีกแล้วนะ..."
10016140-62 = "...นี่ ถามหน่อยสิ เธอคิดอะไรถึงได้ติดตั้งโหมดต่อสู้ลงไปในหุ่นยนต์เชียร์ด้วยน่ะ?"
10016140-63 = "นั่นก็เพราะว่า..."
10016140-65 = "มันโรแมนติกดีน่ะ"
10016140-66 = "มันใช่เรื่องไหมเนี่ย? เพราะความโรแมนติกอะไรนั่น ทำให้พวกเราถูกเด็กจากสถาบัน SRT ตรวจสอบ#nเลยนะ!"
10016140-67 = "เธอนี่มัน... จริงๆ เลย—"
10016140-73 = "ช่างเถอะ ถ้าเธอเป็นประเภทที่ฟังคำเตือนของฉันละก็ คงจะเลิกทำอะไรแบบนี้นานแล้ว"
10016140-74 = "ฮุฮุ เธอรู้จักฉันดีจริงๆ สมแล้วที่เราเป็นเพื่อนกันมานาน"
10016140-79 = "เอาเถอะ ฉันไม่ได้เข้าร่วมงานกีฬาปีนี้เพราะติดงานหลายๆ อย่าง... แต่ก็โชคดีที่อย่างน้อยพวกรุ่นน้อง#nก็ได้สนุกกัน"
10016140-80 = "ถึงพวกแฮ็กเกอร์อย่างเรา จะใช้เวลาส่วนใหญ่อยู่กับหน้าจอก็เถอะ แต่พวกรุ่นน้องชมรมเราเป็นพวก#nไม่ค่อยชอบออกกำลังกาย ฉันเลยเป็นห่วงว่าพวกเด็กๆ จะเสียสุขภาพน่ะ"
10016140-81 = "ได้ไปพบปะ แล้วก็ร่วมแข่งกีฬากับนักเรียนโรงเรียนอื่นแบบนี้ คงจะช่วยเปิดโลกทัศน์ให้ได้เจออะไร#nใหม่ๆ เยอะแน่ๆ "
10016140-82 = "อืม เรื่องนั้นฉันก็เห็นด้วย"
10016140-83 = "ในเรื่องบางเรื่องจะอ่านจากแค่ในหนังสือคงไม่พอ ต้องอาศัยประสบการณ์จริงด้วย"
10016140-87 = "พูดถึงประสบการณ์ใหม่ จู่ๆ ก็นึกไอเดียบางอย่างได้ละ..."
10016140-91 = "เธอเองก็ลองมาใส่ชุดเชียร์ดูบ้างดีมั้ย?"
10016140-92 = "จู่ๆ ก็พูดอะไรของเธอเนี่ย...?"
10016140-93 = "อื้อ พอได้ลองไปร่วมเชียร์กับทุกคนแล้วมันสนุกมากเลยละ ฉันเลยอยากแชร์ประสบการณ์ดีๆ แบบนี้#nให้เธอบ้าง"
10016140-94 = "เรื่องชุดเชียร์ไม่ต้องห่วง ฉันว่าฮิบิกิคงตัดให้ได้ทันทีเลยแหละ..."
10016140-95 = "ถ้าได้ประสบการณ์ใหม่ๆ บ้าง ก็อาจช่วยเพิ่มความฮึกเหิมในการเขียนโค้ดให้เธอก็ได้นะ"
10016140-96 = "ไม่ต้องเลย ลืมเรื่องชุดเชียร์อะไรนั่นไปได้เลย..."
10016140-100 = "อา... ที่ปฏิเสธนี่เพราะกังวลเรื่องที่น้ำหนักขึ้นจากการทำงานดึกงั้นเหรอ?"
10016140-101 = "ไม่ต้องห่วง ไม่ค่อยมีคนที่สนใจรูปร่างคนอื่นอยู่หรอกน่า..."
10016140-102 = "อีกอย่าง ฉันรู้มาว่ามีคนที่ชอบ “คนไทป์นั้น” อยู่เยอะกว่าที่คิดด้วยนะ..."
10016140-103 = "ไม่เกี่ยวกับน้ำหนักฉันสักหน่อย?!"
10016140-104 = "น้ำหนักขึ้นก็ไม่เห็นเป็นไรเลย... เหมือนคำโบราณที่บอกว่า... "
10016140-106 = "“คนขี้อาย ก็แพ้ไป” น่ะ"
10016140-107 = "มีคำโบราณแบบนั้นที่ไหนกันเล่า...!"

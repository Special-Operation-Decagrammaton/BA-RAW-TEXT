10016140-14 = "1;치히로;02;모처럼의 축제인데 마지막까지 일손을 돕게 한 것 같아서 미안하네."
10016140-15 = "5;마키 학교 체육복;01;아니야. 나도 틈틈이 경기에도 참가하고 여기저기 그림을 그리며 축제를 만끽했는걸."
10016140-16 = "5;마키 학교 체육복;00;세상을 조금이나마 더 화려하게 만들 수 있어서, 정말 즐거웠어!\n#5;em;[음표]"

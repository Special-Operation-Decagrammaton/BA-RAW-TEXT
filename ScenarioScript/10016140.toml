10016140-10 = "1;치히로;01\n5;마키 학교 체육복;01;경기에 쓰였던 마지막 로봇까지 완전히 반납된 걸 방금 확인하고 오는 길이었어."
10016140-11 = "5;마키 학교 체육복;99;로봇 프로그램의 무결성 검사는 하레 선배가 진행하고 있고, 경기 기록 내역은 매크로가 자동으로 정리하고 있으니……"

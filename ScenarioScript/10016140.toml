[translation]
10016140-1 = "後日談;工程師部&貝里塔斯篇"
10016140-6 = "啊，千尋前輩！"
10016140-10 = "我剛才已經確認最後一個比賽用機器人也歸還了。"
10016140-11 = "晴前輩正在做機器人程式的完整性檢查，比賽記錄會交由巨集自動整理……"
10016140-12 = "這樣研討會委託的工作就全都結束了！"
10016140-13 = "辛苦了，真紀。"
10016140-14 = "難得的慶典卻讓你幫忙到最後，真是不好意思。"
10016140-15 = "別這麼說。我也是一有空就參加比賽、到處畫畫，盡情享受了慶典。"
10016140-16 = "能讓世界變得更加豐富多彩，真的很開心！"
10016140-17 = "那就好。"
10016140-18 = "話說回來，剛才舉辦的騎馬打仗比賽中似乎有一名千年的學生，#n因為在比賽過程使用全像投影裝置而引起爭議……"
10016140-22 = "從對方學園的敘述聽起來，那個全像投影設備感覺和晴的「雅典娜3號」一模一樣。"
10016140-23 = "真紀，你知道什麼嗎──"
10016140-24 = "啊啊，現在才想起來！我跟小玉前輩說好要一起去回收安裝的竊聽器……"
10016140-26 = "前輩，我得先走一步了……！"
10016140-31 = "果然是我們後輩幹的好事嗎……"
10016140-32 = "等回到部室之後得狠狠唸他們一頓才行。"
10016140-36 = "千尋，收尾工作順利嗎？"
10016140-37 = "嗯，多虧有後輩們幫忙。"
10016140-38 = "你那邊呢，觀眾離場引導也結束了嗎？"
10016140-39 = "嗯，當然。身為主辦學校的應援團長，直到比賽結束前都要克盡職守。"
10016140-40 = "一開始就製造正經的應援機器人不就好了……"
10016140-41 = "嗯？我不是在抱怨唷？"
10016140-42 = "應援團的任務雖然來得突然，#n能脫離平時的職責和任務扮演不同的角色，對我來說也是非常新鮮愉快的經驗。"
10016140-43 = "真的太有趣了，感覺今天一天的時間比平常還要短。"
10016140-44 = "是時候回去扮演往常的工程師部巨匠了嗎……真是可惜～"
10016140-45 = "看到你失落的樣子，看來玩得很開心。"
10016140-49 = "千醬，今天的慶典開心嗎？"
10016140-50 = "會開心才怪……我忙得暈頭轉向，都不知道一天是怎麼過去的。"
10016140-51 = "繼昨天通宵準備慶典，今天從開幕式開始就接連發生大大小小的騷動……"
10016140-52 = "結果直到在救護室稍微瞇了一會，才對之後發生的事有印象。"
10016140-53 = "……詠葉，你昨天也一起熬夜了一整晚，難道不覺得累嗎？"
10016140-54 = "嗯。事實上，如果現在立刻躺在床上，應該會直接昏睡過去……"
10016140-55 = "但這點程度，能靠幹勁和毅力克服！"
10016140-56 = "真不知道你是有強大的意志力，還是單純只是傻瓜……"
10016140-57 = "對了，在我睡著的時候，工程師部製造的那個「應援機器人」好像又惹事了……"
10016140-62 = "……我再問一次，你當初為什麼要在應援機器人上添加戰鬥模式？"
10016140-63 = "當然是因為……"
10016140-65 = "那樣很浪漫。"
10016140-66 = "這不是光用浪漫二個字就能解決的問題。#n因為那個功能的關係，SRT特殊學園還展開了調查！"
10016140-67 = "你真的是──"
10016140-73 = "……算了。如果你是會因為幾句嘮叨就罷休的人，那你早就放棄了。"
10016140-74 = "呵呵，不愧是我的老友。判斷得真快。"
10016140-79 = "不管怎麼說，這次因為各種原因沒能好好表現……#n所幸後輩們似乎有充分享受。"
10016140-80 = "雖然說大部分的駭客都是室內派，#n但我們家的孩子真的太少運動了，讓人很擔心他們的健康。"
10016140-81 = "再加上大運動會能和其他學園的學生交流、在各種環境下競爭，#n這份經驗有助於擴展知識範圍。"
10016140-82 = "嗯，我也贊同那個想法。"
10016140-83 = "因為這世界上除了書籍和影片外，也有只能靠身體力行才能獲得的知識。"
10016140-87 = "說到新的體驗，我突然想到……"
10016140-91 = "千尋要不要也當當看啦啦隊？"
10016140-92 = "……這麼突然？"
10016140-93 = "嗯。這次和大家一起加油，比我想像的要開心許多，所以我想推薦給身邊的人。"
10016140-94 = "去拜託響的話，他會馬上幫你製作啦啦隊服……"
10016140-95 = "而且就像我剛才說的一樣，這種熱情和經驗可能對編寫程式碼有所幫助。"
10016140-96 = "不了。其他體育活動還能考慮，但啦啦隊……"
10016140-100 = "……啊，你難道是在擔心因為不規律工作而長出來的贅肉嗎？"
10016140-101 = "不必擔心。會注意別人身材的人其實沒那麼多。"
10016140-102 = "而且這次我才知道，對「那方面」有需求的人似乎比想像中還要多……"
10016140-103 = "才不是因為贅肉好嗎！？"
10016140-104 = "有什麼關係。#n不是有句老話這麼說嗎？"
10016140-106 = "「害羞就輸了！」"
10016140-107 = "……就說不是了！"

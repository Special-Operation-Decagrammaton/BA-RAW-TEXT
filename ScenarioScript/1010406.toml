1010406-5 = "[ns] \"미안해, 레이죠!\""
1010406-6 = "3;레이죠;04;무, 무슨 일이신가요? 왜 그렇게 당황하시죠, 선생님?\n#3;em;[?]"
1010406-7 = "[s] \"그게, 그러니까…….\""
1010406-8 = "3;레이죠;01;아, 갑작스럽게 외부 일정이 잡히셨다는 것이군요."
1010406-9 = "3;레이죠;02;저를 혼자 내버려두게 될 것 같아서 신경이 쓰이신다고요……."
1010406-10 = "3;레이죠;99;흐음…….\n#3;em;[...]"
1010406-11 = "3;레이죠;03;알겠습니다. 그러면 같이 나가시죠. 선생님."
1010406-12 = "[s] \"어? 같이?\""
1010406-13 = "3;레이죠;01;그렇습니다. 저의 오늘 일정은 샬레의 당번 일을 수행하는 것."
1010406-14 = "3;레이죠;02;그리고 샬레의 외부 일정을 진행하며 선생님과 함께하는 것도, 해석하기에 따라서는 당번 일의 연장이라고 볼 수 있지 않을까요?\n#3;em;[반응]"
1010406-15 = "3;레이죠;16;틀린 말 같지는 않으시다고요? 네. 그럴 겁니다. 그래야죠."
1010406-16 = "3;레이죠;02;그러면 오늘 하루……."
1010406-17 = "3;레이죠;03;잘 부탁드리겠습니다. 선생님.\n#3;em;[음표]\n#3;greeting"

[translation]
1010406-1 = "ปัญหาเรื่องแก่นและเป้าหมาย"
1010406-2 = "สำนักงานชาเล่ต์"
1010406-5 = "[ns] \"ขอโทษนะ เรย์โจว!\""
1010406-6 = "มะ... มีเรื่องอะไรเหรอคะ? ทำไมถึงตกอกตกใจขนาดนั้นล่ะคะคุณครู?"
1010406-7 = "[s] \"เอ่อ... คือว่า...\""
1010406-8 = "อ้อ จู่ๆ ก็มีงานต้องไปข้างนอก..."
1010406-9 = "ก็เลยกังวล เพราะเหมือนจะเป็นการทิ้งให้ฉันอยู่คนเดียวงั้นเหรอคะ..."
1010406-10 = "ฮืม..."
1010406-11 = "ไม่เป็นไรค่ะ ถ้างั้นเราก็ไปด้วยกันเลยค่ะ คุณครู"
1010406-12 = "[s] \"หืม? ไปด้วยกันเหรอ?\""
1010406-13 = "ค่ะ งานวันนี้ของฉันคือการมาเข้าเวรที่ชาเล่ต์"
1010406-14 = "การออกไปทำงานของชาเล่ต์ข้างนอกกับคุณครู ถ้าคิดให้ดีก็เป็นส่วนหนึ่งของการเข้าเวรนี่คะ?"
1010406-15 = "ที่ฉันพูดมาก็ไม่ผิดงั้นเหรอคะ? ค่ะ ใช่แล้วค่ะ ต้องเป็นแบบนั้นละค่ะ"
1010406-16 = "ถ้างั้นวันนี้..."
1010406-17 = "ฉันต้องขอรบกวนด้วยนะคะ คุณครู"
1010406-29 = "[ns] \"เฮ้อ... งานเสร็จซักที...\""
1010406-30 = "คงเหนื่อยน่าดูเลยนะคะ คุณครู"
1010406-31 = "งานของชาเล่ต์... หลากหลายจริงๆ เลยนะคะ ถ้าคุณครูต้องจัดการงานเยอะขนาดนี้ ฉันชักจะสงสัยแล้วสิคะว่ามีส่วนไหนในคิโวทอสที่ครูยังไม่ได้ไปบ้าง"
1010406-32 = "คะ? ถ้าพูดตามตรงก็อยากทำงานแบบมีเวลาพักผ่อนบ้าง แต่พอเป็นเรื่องของนักเรียน ก็ปฏิเสธไม่ได้#nงั้นเหรอคะ?"
1010406-33 = "..."
1010406-34 = "คุณครูคิดอย่างไรเกี่ยวกับศิลปะการต่อสู้เหรอคะ?"
1010406-35 = "ค่ะ ฉันรู้ดีค่ะว่านี่เป็นคำถามที่กะทันหัน ถ้าฉันทำให้ตกใจก็ต้องขอโทษด้วยนะคะ"
1010406-36 = "ฉันคิดอย่างนี้ค่ะ ท้ายที่สุดแล้ว ศิลปะการต่อสู้ก็คือการพิจารณาตัวเองแล้วปูทางให้ตัวเองก้าวไปข้าง#nหน้าค่ะ"
1010406-37 = "ในอีกแง่หนึ่ง ยังมองได้ว่าเป็นการพัฒนาจิตใจและฝึกฝนร่างกายได้ด้วยค่ะ"
1010406-38 = "[s] \"ก็น่าจะเป็นอย่างที่ว่าจริงๆ นะ\""
1010406-39 = "และในอีกแง่หนึ่ง เส้นทางของศิลปะการต่อสู้ก็เป็นการที่ผู้ที่แข็งแกร่งปกป้องผู้ที่อ่อนแอ"
1010406-40 = "ยิ่งไปกว่านั้น ฉันคิดว่ามันคือการที่คนที่แข็งแกร่งทำหน้าที่ของตนให้ดีที่สุด เพื่อไม่ให้คนที่อ่อนแอ#nโดนกดขี่ค่ะ"
1010406-41 = "นี่อาจจะมีส่วนที่คล้ายกับเรื่อง 'ปราบคนพาล อภิบาลคนดี' ที่พวกมังกรดำพูดกันจนเบื่อก็ได้ค่ะ"
1010406-42 = "[s] \"อื้อ ก็น่าจะเป็นอย่างที่ว่าจริงๆ นะ\""
1010406-43 = "เพราะงั้น คุณครูคะ "
1010406-44 = "จากนี้ไปคุณครูปกป้องฉันได้เลยค่ะ"
1010406-45 = "[s] \"อื้อ ก็น่าจะเป็นอย่างที่... หืม? ทำไมล่ะ?!\""
1010406-46 = "ก็... คุณครูเป็นถึงนักวิชาการศึกษาที่เติบโตแล้วทั้งทางร่างกายและจิตใจ จะทิ้งเด็กม.ปลายที่ยัง#nอ่อนประสบการณ์และต้องการการปกป้องได้ยังไงกันคะ..."
1010406-47 = "ไหนบอกว่าถ้าเป็นเรื่องของนักเรียนแล้วจะปล่อยไปไม่ได้ไงล่ะคะ..."
1010406-48 = "[s1] \"หืม?! เรื่องนั้นมัน... ก็จริงอยู่หรอกนะ!\"\n[s2] \"แน่นอนว่าครูทิ้งนักเรียนไม่ได้หรอก!\""
1010406-51 = "ใช่มั้ยล่ะคะ?"
1010406-52 = "ถ้างั้น... วันนี้คงเป็นวันที่คุณครูจะช่วยปกป้องฉันสินะคะ"
1010406-54 = "เอ๋? เธอที่อยู่ตรงนั้นน่ะ! เด็กแก๊งฟรุ้งฟริ้งใช่มั้ย? ตรงนี้มันเขตของพวกฉันนะ! ไสหัวไปเลย!"
1010406-59 = "ก็สงสัยอยู่ว่าใครมาโหวกเหวกเสียงดัง เป็นแก๊งนุ่มนิ่มที่ไร้ประโยชน์นี่เอง ตัวเองเก่งมาจากไหนเหรอ#nถึงได้มาส่งเสียงดังแบบนี้น่ะ!"
1010406-60 = "พูดจบหรือยัง?"
1010406-61 = "ยังไม่ได้ครึ่งหนึ่งเลย!"
1010406-67 = "คุณครู...!"
1010406-68 = "[s3] \"ถ้าเจอเรื่องแบบนี้... ต้องหนี...!\"\n[s4] \"มาทางนี้ก่อน!\""
1010406-73 = "อืม... ค่ะ มาซ่อนตัวอย่างปลอดภัยจนได้นะคะ"
1010406-78 = "แต่ว่าการดวลปืนตรงนั้นจะยิ่งรุนแรงขึ้นเรื่อยๆ เลย"
1010406-79 = "ฉันเพิ่งนึกบางอย่างได้น่ะค่ะ คุณครู"
1010406-80 = "เมื่อกี้คุณครูบอกว่าจะปกป้องฉันใช่มั้ยคะ?"
1010406-81 = "[s] \"ใช่ แต่ตั้งใจฟังครูนะ เรย์โจว...\" "
1010406-82 = "คะ? การทำให้คนที่เราต้องปกป้องไม่ได้รับบาดเจ็บ..."
1010406-83 = "และการดูแลคนที่ต้องดูแล ไม่จำเป็นต้องมีแค่วิธีเดียวเสมอไปงั้นเหรอคะ?"
1010406-84 = "และบางครั้งการไหลไปตามกระแสน้ำ และการไม่จมอยู่กับสถานการณ์มากจนเกินไป..."
1010406-85 = "ในอีกแง่หนึ่งก็ถือเป็นจุดแข็งได้เหมือนกันเหรอคะ?"
1010406-86 = "..."
1010406-87 = "นั่นสินะคะ เข้าใจแล้วค่ะ ฉันได้บทเรียนใหม่เลยค่ะ คุณครู"
1010406-92 = "[ns] \"หะ... หืม? เรย์โจว?\""
1010406-93 = "มีอะไรเหรอคะ คุณครู?"
1010406-94 = "เราต้องอยู่ใกล้ๆ กัน และทำให้ตัวเล็กที่สุดสิคะ... จะได้ไม่โดนจับได้ยังไงล่ะคะ"
1010406-95 = "[s] \"เรื่องนั้น... มันก็จริงอยู่หรอกนะ...\""
1010406-96 = "ใช่มั้ยล่ะคะ?"
1010406-97 = "..."
1010406-98 = "รู้สึกสบายและอบอุ่นจังเลยค่ะ นี่สินะคะความรู้สึกปลอดภัย"
1010406-105 = "ถึงแม้เสียงต่อสู้จากข้างนอกนั่นจะทำให้วุ่นวายใจนิดหน่อยก็เถอะค่ะ..."
1010406-106 = "แต่เป็นเพราะฉันอยู่กับคุณครูหรือเปล่านะ"
1010406-107 = "เวลาแบบนี้... ก็ดูเหมือนจะไม่แย่ขนาดนั้นนะคะ"
1010406-110 = "(การดวลปืนยังคงดำเนินต่อไป...)"
1010406-111 = "(ในที่สุดสำนักความมั่นคงจากสถาบันฝึกตำรวจวัลคิรี่ก็มาถึง... สถานการณ์จึงสงบลงได้)"
1010406-113 = "เวลาผ่านไปขนาดนี้แล้วเหรอคะเนี่ย..."
1010406-114 = "[s] \"ไม่เป็นไรหรอก ยังไงครูก็เสร็จงานข้างนอกแล้ว!\""
1010406-115 = "ถึงคุณครูจะพูดแบบนั้นก็เถอะ..."
1010406-116 = "ต้องขอโทษด้วยนะคะ คุณครู"
1010406-117 = "ที่จริง... นั่นสินะคะ"
1010406-118 = "บางครั้งฉันก็อยากเป็นฝ่ายที่ได้รับการปกป้องบ้างค่ะ"
1010406-119 = "เหมือนว่าฉัน... เอาแต่ใจตัวเองแล้วทำให้คุณครูต้องลำบากเลยค่ะ"
1010406-120 = "[s] \"ไม่เป็นไรหรอก ไม่ต้องขอโทษขนาดนั้นก็ได้นะ\""
1010406-121 = "งะ... งั้นเหรอคะ? แต่ว่า..."
1010406-122 = "[s5] \"ครูยังปกป้องเรย์โจวต่อได้นะ!\"\n[s6] \"ครูจะปกป้องเรย์โจวจนกว่าจะกลับซานไห่จิงเลย!\""
1010406-125 = "คะ? แบบนั้นมัน..."
1010406-126 = "..."
1010406-127 = "นั่นสินะคะ ถ้างั้นก็..."
1010406-133 = "(จู่ๆ เรย์โจวก็เข้ามาใกล้...)"
1010406-134 = "(แล้วดึงแขนคุณครูมาโอบไหล่ตัวเอง)"
1010406-137 = "[ns] \"หืม...?!\""
1010406-138 = "เป็นอะไรไปคะ คุณครู?"
1010406-139 = "ก็คุณครูต้องปกป้องฉันไม่ใช่เหรอคะ?"
1010406-140 = "ถ้างั้นก็... รบกวนด้วยนะคะคุณครู "
1010406-142 = "(ในวันนั้น ระหว่างเดินทางกลับซานไห่จิง...)"
1010406-143 = "(คุณครูรู้สึกว่าเวลาผ่านไปช้ากว่าปกติ)"

[translation]
1010406-1 = "Subject and Object"
1010406-2 = "Schale Office"
1010406-5 = "[ns] \"I'm sorry, Reijo!\""
1010406-6 = "W-What's wrong? Why are you so panicked, Sensei?"
1010406-7 = "[s] \"Uh, so the thing is...\""
1010406-8 = "Ah, something came up..."
1010406-9 = "You're worried about leaving me alone?"
1010406-10 = "Hm..."
1010406-11 = "Understood. Then let's go together, Sensei."
1010406-12 = "[s] \"Huh? Together?\""
1010406-13 = "That's right. I'm on Schale's student rep duty today."
1010406-14 = "From a certain perspective, helping you with your business can be considered an extension of my duties, right?"
1010406-15 = "It's not entirely wrong? Exactly. I think it makes sense."
1010406-16 = "So, for the rest of the day..."
1010406-17 = "...you can count on me, Sensei."
1010406-29 = "[ns] \"Ugh... Finally done...\""
1010406-30 = "Good work, Sensei."
1010406-31 = "Schale's range of responsibilities...is truly vast. Is there anywhere Schale doesn't have jurisdiction?"
1010406-32 = "Huh? You wish you could offload some tasks, but you can't when it comes to your students?"
1010406-33 = "..."
1010406-34 = "What do you think about \"Budo,\" the way of martial arts?"
1010406-35 = "I know that came seemingly out of nowhere. I'm sorry if my approach seemed confusing."
1010406-36 = "But I was just thinking. Budo is the idea of traveling the path of martial arts through self-reflection and realization."
1010406-37 = "In some ways, you could say it's cultivating the mind through physical training."
1010406-38 = "[s] \"That does seem to be the case.\""
1010406-39 = "Traveling this path means protecting the weak..."
1010406-40 = "...and ensuring they're not oppressed by the strong. It's a duty and a responsibility."
1010406-41 = "Perhaps there's some connection to the \"justice and chivalry\" Genryumon is always blabbing about."
1010406-42 = "[s] \"Yes. That seems accurate to say.\""
1010406-43 = "So, Sensei... "
1010406-44 = "From now on, Sensei should protect me."
1010406-45 = "[s] \"Yes. That also seems— What? Why?!\""
1010406-46 = "Oh... An educator, of mature body and mind, plans on just abandoning this immature high schooler?"
1010406-47 = "I thought you said you can't give up on your students..."
1010406-48 = "[s1] \"Huh?! Well! That's...!\"\n[s2] \"As an educator, of course I won't!\""
1010406-51 = "That's right!"
1010406-52 = "Then, I'll be under your protection today, Sensei."
1010406-54 = "Ha? Who's there! Hey, aren't you from that Bling Bling family? This is our turf! Shove off!"
1010406-59 = "I was wondering who was yapping. You're that small fry from Squish Squish family. You're all washed up nobodies now, so stop yapping!"
1010406-60 = "You wanna say that again?"
1010406-61 = "I can go all day!"
1010406-67 = "Sensei!"
1010406-68 = "[s3] \"In times like these... Well...!\"\n[s4] \"For now, follow me!\""
1010406-73 = "Hm... Okay. We're safely hidden."
1010406-78 = "Though the gun fight is escalating."
1010406-79 = "Something just occurred to me, Sensei."
1010406-80 = "Didn't you say you would protect me?"
1010406-81 = "[s] \"Okay. So. About that. Hear me out, Reijo...\""
1010406-82 = "Hm? Making sure I'm not hurt is part of protecting me?"
1010406-83 = "...Fighting isn't the only way to keep someone safe?"
1010406-84 = "Sometimes, learning to flow with the river's current and not be tied down by circumstances..."
1010406-85 = "...is its own kind of strength?"
1010406-86 = "..."
1010406-87 = "Hm. I see. This, too, was a lesson, Sensei."
1010406-92 = "[ns] \"Um? Reijo? What're you doing?\""
1010406-93 = "What's wrong, Sensei?"
1010406-94 = "In order to ensure we're not discovered, should we not be as close together as possible?"
1010406-95 = "[s] \"Well...you're not...wrong.\""
1010406-96 = "Naturally."
1010406-97 = "..."
1010406-98 = "I do feel very safe. It's comfortable. Cozy."
1010406-105 = "...Though the ruckus outside is the complete opposite."
1010406-106 = "Maybe it's because you're by my side, Sensei..."
1010406-107 = "...but even times like this, aren't all that bad."
1010406-110 = "The shooting continued for quite some time."
1010406-111 = "Finally, Valkyrie Police School's Security Bureau was dispatched, and the situation was handled."
1010406-113 = "That ate up a lot of our time."
1010406-114 = "[s] \"We were already done with all our errands!\""
1010406-115 = "Still..."
1010406-116 = "I'm sorry, Sensei."
1010406-117 = "To tell you the truth..."
1010406-118 = "I just wanted to be the one being protected, for once."
1010406-119 = "I think my stubbornness on that front might've caused all this trouble."
1010406-120 = "[s] \"You really don't have to apologize for that.\""
1010406-121 = "Really? But..."
1010406-122 = "[s5] \"Besides, the day isn't over yet, right?\"\n[s6] \"It's my duty to protect you until we get back to Shanhaijing!\""
1010406-125 = "Huh? That's..."
1010406-126 = "..."
1010406-127 = "I see. If that's the case..."
1010406-133 = "Reijo scooted closer to me..."
1010406-134 = "...and placed my arms around her shoulders."
1010406-137 = "[ns] \"Huh...?!\""
1010406-138 = "What's wrong, Sensei?"
1010406-139 = "Didn't you just say you were going to protect me?"
1010406-140 = "In that case, I'll be in your care, until the very end. "
1010406-142 = "That day, the route back to Shanhaijing..."
1010406-143 = "...felt longer than usual."

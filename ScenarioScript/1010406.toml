[translation]
1010406-1 = "主體和對象的問題"
1010406-2 = "夏萊辦公室"
1010406-5 = "[ns]「對不起，令女！」"
1010406-6 = "怎，怎麼了嗎，老師？為什麼那麼慌張？"
1010406-7 = "[s]「其實是這樣的……」"
1010406-8 = "啊～原來是突然有行程需要外出。"
1010406-9 = "所以才對要把我一個人留下的事感到過意不去啊……"
1010406-10 = "哼嗯……"
1010406-11 = "我知道了。那我也跟您一起去吧，老師。"
1010406-12 = "[s]「嗯？一起去？」"
1010406-13 = "是的。我今天的工作是擔任夏萊的值日生。"
1010406-14 = "那麼與老師一同處理夏萊的對外行程，當然也算是值日生工作的延伸，不是嗎？"
1010406-15 = "聽起來好像是這樣？#n沒錯，正是如此。"
1010406-16 = "那今天一整天……"
1010406-17 = "就萬事拜託囉，老師。"
1010406-29 = "[ns]「哦哦哦……總算結束了……」"
1010406-30 = "您辛苦了，老師。"
1010406-31 = "夏萊的工作……真是相當多元呢。#n簡直令人懷疑涵蓋的領域究竟有多少。"
1010406-32 = "咦？老實說您其實很想把能推的工作盡量推掉，#n但那樣一來工作又會回到學生身上，所以沒辦法那麼做？"
1010406-33 = "……"
1010406-34 = "老師，您對武道有什麼看法呢？"
1010406-35 = "我明白這是個唐突的問題，如果讓您感到驚慌的話，在此先向您說聲抱歉。"
1010406-36 = "不過我個人是這麼認為的。#n所謂武道，就是藉由武術來審視自己，進而開闢未來的道路。"
1010406-37 = "也可以說是透過鍛鍊身體，提升精神層面的修養。"
1010406-38 = "[s]「好像是這樣沒錯。」"
1010406-39 = "而武道在某種意義上，是強者保護弱者──"
1010406-40 = "使弱者免於欺凌，正是強者的職責所在。"
1010406-41 = "某些層面上，或許跟玄龍門念茲在茲的俠義概念有點類似。"
1010406-42 = "[s]「嗯，這麼說好像也沒錯。」"
1010406-43 = "所以，老師。"
1010406-44 = "從現在起，老師必須保護我才行。"
1010406-45 = "[s]「嗯，這麼說確實也……咦？為什麼！？」"
1010406-46 = "老師您……作為一名身心成熟的教育者，#n居然要對尚未成熟且需要有人照顧的高中生置之不理……"
1010406-47 = "您明明說過不會對學生的事視而不見的……"
1010406-48 = "[s1]「啊！？那個，就是……！」\n[s2]「我當然不會視而不見！那不是教育者該有的心態！」"
1010406-51 = "果然是這樣嗎？"
1010406-52 = "那麼今天就由老師來保護我囉。"
1010406-54 = "嗯？喂，你不是咕溜溜派的人嗎？在這裡做什麼！#n這裡是我們的地盤！還不快滾！"
1010406-59 = "還以為是誰在大呼小叫，原來是軟嫩嫩派的弱咖啊。#n早就過氣的傢伙有什麼了不起的啊，就只會一張嘴！"
1010406-60 = "話都說完了嗎？"
1010406-61 = "連一半都還不到耶？"
1010406-67 = "老師……！"
1010406-68 = "[s3]「這種時候就該……！」\n[s4]「往這邊！」"
1010406-73 = "嗯……好。成功躲起來了呢。"
1010406-78 = "雖然槍戰好像變得越來越激烈就是了。"
1010406-79 = "話說我突然想到一件事，老師。"
1010406-80 = "您不是應該要保護我嗎？"
1010406-81 = "[s]「你聽我說，令女……」"
1010406-82 = "嗯？避免保護對象受傷……"
1010406-83 = "進而保護對方的方法並不是只有一種。"
1010406-84 = "有時像水一樣隨波逐流，不被眼前的情勢所束縛……"
1010406-85 = "從某方面來說也是一種強大？"
1010406-86 = "……"
1010406-87 = "原來如此，我明白了。#n謝謝您讓我學到了一課，老師。"
1010406-92 = "[ns]「嗯？令女？」"
1010406-93 = "怎麼了嗎，老師？"
1010406-94 = "像這樣將身體彼此緊靠……才比較不會被發現吧？"
1010406-95 = "[s]「確實……是這樣沒錯啦……」"
1010406-96 = "對吧？"
1010406-97 = "……"
1010406-98 = "有種舒適溫馨的安全感。"
1010406-105 = "……雖然耳邊聽到的聲音還是讓人有點心慌。"
1010406-106 = "不過，可能是因為現在和老師待在一起……"
1010406-107 = "就連這種時候……似乎也沒那麼糟呢。"
1010406-110 = "（槍戰在這之後依舊持續……）"
1010406-111 = "（直到女武神警察學園的警備局出面，事態才得以平息）"
1010406-113 = "時間竟然已經這麼晚了……"
1010406-114 = "[s]「反正工作都已經結束了，別擔心！」"
1010406-115 = "可是……"
1010406-116 = "真不好意思，老師。"
1010406-117 = "其實……事情是這樣的。"
1010406-118 = "我偶爾……也想成為受人保護的一方。"
1010406-119 = "都怪我的無理取鬧，害老師為難了。"
1010406-120 = "[s]「沒關係，你不需要道歉。」"
1010406-121 = "是，是嗎？但……"
1010406-122 = "[s5]「而且今天還沒結束哦！」\n[s6]「在回到山海經之前，我都得保護令女才行！」"
1010406-125 = "咦……？"
1010406-126 = "……"
1010406-127 = "我明白了。那麼……"
1010406-133 = "（令女突然貼了過來……）"
1010406-134 = "（手臂被搭在了他的肩上）"
1010406-137 = "[ns]「咦……！？」"
1010406-138 = "老師，您怎麼了？"
1010406-139 = "不是說要保護我嗎？"
1010406-140 = "那麼，老師。#n就麻煩您保護我到最後一刻囉。"
1010406-142 = "（那天，返回山海經的路……）"
1010406-143 = "（感覺似乎比平常更加漫長）"

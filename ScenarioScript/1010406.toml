1010406-29 = "[ns] \"으어어어……. 끝났다…….\""
1010406-30 = "3;레이죠;03;고생 많으셨습니다. 선생님."
1010406-31 = "3;레이죠;01;샬레의 업무란…… 정말로 다양하군요. 이 정도면 거의 손을 대지 않는 영역이 있을지, 의심이 갈 정도네요.\n#3;em;[땀]"
1010406-32 = "3;레이죠;02;네? 본심을 말하자면 쳐낼 수 있는 업무는 최대한 쳐내고 싶지만, 또 막상 학생들의 일이 되면 그렇게 할 수는 없다고요?"
1010406-33 = "3;레이죠;99;……."
1010406-34 = "3;레이죠;02;무도(武道)라는 것에 대해 어떻게 생각하시나요, 선생님?\n#3;em;[?]"
1010406-35 = "3;레이죠;01;네. 갑작스러운 이야기라는 것은 알고 있습니다. 당황하셨다면 죄송합니다."
1010406-36 = "3;레이죠;16;저는 이렇게 생각합니다. 무도(武道)라는 것은 결국, 무술로 인해 자신을 돌아보고 나아갈 길을 닦는 것이라고요."
1010406-37 = "3;레이죠;02;어떤 의미에서는 정신적인 면에서의 수양을, 신체의 단련으로 행하는 것이라고도 볼 수 있을 겁니다."
1010406-38 = "[s] \"그건 확실히 그런 것 같네.\""
1010406-39 = "3;레이죠;01;그리고 무술의 길이란 어떤 의미에서, 강한 자가 약한 자를 지키고."
1010406-40 = "3;레이죠;02;나아가 약한 자가 억눌리지 않도록 강한 자가 스스로의 소임을 다하는 것이라고도 생각합니다."
1010406-41 = "3;레이죠;03;현룡문에서 그렇게 지겹도록 이야기하는 의(義)와 협(俠)이라는 개념과도 통하는 부분이 있을지도 모르겠네요.\n#3;em;[반응]"
1010406-42 = "[s] \"응. 그것도 확실히 그런 것 같네.\""
1010406-43 = "3;레이죠;99;그러니까 말이죠, 선생님. \n#3;em;[...]"
1010406-44 = "3;레이죠;16;이제부터 선생님께서 저를 지켜 주시면 될 것 같습니다."
1010406-45 = "[s] \"응. 그것도 확실히 그런…… 뭐? 왜?!\""
1010406-46 = "3;레이죠;14;그런…… 몸도 마음도 성숙한 교육자이신 선생님께서, 아직 미성숙하고 보살핌이 필요한 고등학생을 이대로 내버려두시다니……."
1010406-47 = "3;레이죠;11;학생들의 일이 되면, 내버려둘 수 없다고 말씀하셨으면서…….\n#3;stiff\n#3;em;[세로선]"
1010406-48 = "[s1] \"어?! 그건! 그러니까!\"\n[s2] \"물론 그럴 수는 없고! 그게 교육자의 자세도 아니긴 할 건데!\""

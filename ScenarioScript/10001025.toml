[translation]
10001025-1 = "Episode 2;Sunlit Coup"
10001025-2 = "Red Winter Academy Presidential Office"
10001025-4 = "U-Urgh... What's all that racket? For the love of mustaches, why is it so noisy?!"
10001025-5 = "My nap can't continue like this!"
10001025-8 = "Ch-Cherino! We have an emergency!"
10001025-9 = "Gah! I told you not to interrupt my nap time, no matter how urgent it is!"
10001025-10 = "Did you want to meet my boot after all, Chief Secretary Tomoe?"
10001025-11 = "But, the thing is..."
10001025-12 = "A-Ahem!"
10001025-13 = "President Cherino, a group of armed students are currently storming the secretariat."
10001025-14 = "What, another coup? Which club is it this time?"
10001025-15 = "The Mint Chocolate Liberation Front? The Revolutionaries Against Lemon on Fried Chicken Federation?"
10001025-16 = "Not that it matters. If we leave the coup-stopping to Chairman Marina, then there's nothing to worry about."
10001025-17 = "So don't interrupt my nap over trivial matters!"
10001025-19 = "But, um..."
10001025-20 = "The thing is, the one behind the coup is...Security Chairman Marina."
10001025-22 = "Wh-What did you just say?!"
10001025-26 = "Owww..."
10001025-27 = "Are you all right, President?"
10001025-28 = "I-I'm fine..."
10001025-29 = "M-More importantly! Why would Marina stage a coup? I didn't do anything to her!"
10001025-30 = "I'm not sure..."
10001025-31 = "Could it be because...I ate the pudding that Marina had been saving?!"
10001025-32 = "Or because I drooled on her cherished teddy bear while I was taking a nap?"
10001025-33 = "[s] \"...Probably the pudding.\""
10001025-34 = "Uh... What do I do, Comrade? I should replace her pudding, right?"
10001025-35 = "But all we have left at the academy is that bland watered-down stuff..."
10001025-36 = "The State Guard led by Chairman Marina will be here at any second. It isn't safe here anymore."
10001025-37 = "Sensei, given the risk, I think you should evacuate alongside us."
10001025-38 = "B-But, where can we even go?"
10001025-39 = "There's an old unused school building on the outskirts of Red Winter."
10001025-40 = "If we hide there, even Chairman Marina will have trouble finding us."
10001025-41 = "R-Right. Then this is a temporary retreat!"
10001025-42 = "I'm definitely not running away!"
10001025-44 = "Come on, let's hurry!"

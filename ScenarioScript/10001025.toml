[translation]
10001025-1 = "#title;제2화;한낮의 쿠데타"
10001025-2 = "#place;붉은겨울 학원 회장 집무실"
10001025-3 = "#wait;3500"
10001025-4 = "3;체리노;s2_01;으, 으…… 시끄러워, 시끄러워! 도대체 왜 이렇게 시끄러운 거야?\n#3;em;[속상함]\n#3;stiff\n#3;a"
10001025-5 = "3;체리노;s2_05;도무지 편하게 낮잠을 잘 수가 없잖아!\n#3;em;[빠직]"
10001025-6 = "#wait;1500"
10001025-7 = "3;체리노;s2_05\n5;토모에;06\n#5;al\n#3;m1\n#wait;1000"
10001025-8 = "5;토모에;04;체, 체리노 쨩! 긴급 상황이에요!\n#5;em;[!]"
10001025-9 = "3;체리노;s2_01;으으, 아무리 급한 일이라 하더라도 낮잠 시간에는 방해하지 말라고 했잖아!\n#3;em;[빠직]\n#3;stiff"
10001025-10 = "3;체리노;s2_05;토모에 비서실장도 숙청되고 싶어?"
10001025-11 = "5;토모에;04;하지만 그게……\n#5;em;[...]"
10001025-12 = "5;토모에;99;흠, 흠!"
10001025-13 = "5;토모에;05;체리노 회장님, 무장한 학생들이 사무국으로 몰려오고 있습니다.\n#5;em;[!]"
10001025-14 = "3;체리노;s2_05;뭐야, 또 쿠데타가 일어난 거야? 이번에는 또 어느 동아리에서 문제가 생긴 건데?\n#3;em;[반응]\n#3;stiff"
10001025-15 = "3;체리노;s2_02;<민트초코 해방전선>? <가라아게에 레몬을 반대하는 혁명가들의 모임>?"
10001025-16 = "3;체리노;s2_01;어느 동아리에서 들고 일어났든 간에 쿠데타 문제는 마리나 위원장에게 맡겨 두면 신경 쓸 필요도 없잖아."
10001025-17 = "3;체리노;s2_05;이런 사소한 일로 낮잠을 방해하지 말라고!\n#3;hophop"
10001025-18 = "5;토모에;06\n#3;dl\n#5;m3\n#wait;1000"
10001025-19 = "5;토모에;06;저, 그게……\n#5;em;[...]"
10001025-20 = "5;토모에;04;쿠데타를 일으킨 사람이 다름 아닌 마리나 보안위원장입니다.\n#bgshake\n#5;closeup"
10001025-21 = "#all;hide"
10001025-22 = "3;체리노;s2_04;뭐, 뭐라고?!\n#3;em;[?!]\n#3;shake"
10001025-23 = "#st;[0,0];instant;1;"
10001025-24 = "3;체리노;s2_04\n#3;falldownL\n#wait;1300\n#clearST"
10001025-25 = "#all;hide\n#bgshake\n#wait;1500"
10001025-26 = "#na;체리노;아야야……."
10001025-27 = "5;토모에;04;괜찮으신가요, 회장님?\n#5;hophop\n#5;em;[?!]\n#5;al"
10001025-28 = "1;체리노;s2_06;괘, 괜찮아…….\n#1;stiff\n#1;em;[속상함]\n#1;a"
10001025-29 = "1;체리노;s2_04;그, 그보다! 어째서 마리나가 쿠데타를 일으킨 거야? 나는 아무런 짓도 안 했는데!"
10001025-30 = "5;토모에;06;그건 잘 모르겠습니다만…….\n#5;em;…"
10001025-31 = "1;체리노;s2_04;설마…… 저번에 마리나가 아껴둔 푸딩을 몰래 먹어서?\n#1;em;[땀]\n#1;stiff"
10001025-32 = "1;체리노;s2_04;아니면 마리나가 소중히 여기는 곰인형에 침을 흘린 채로 낮잠을 자서?"
10001025-33 = "[s] \"……아마 푸딩이 원인일 거라고 생각해.\""
10001025-34 = "1;체리노;s2_06;으으…… 어쩌지, 콤라드? 지금이라도 새 푸딩을 구해와야 하나?\n#1;em;[속상함]\n#1;stiff"
10001025-35 = "1;체리노;s2_06;하지만 지금 붉은겨울 학원에 남아있는 건 물이 섞인 밍밍한 푸딩뿐인걸……."
10001025-36 = "5;토모에;05;이곳은 위험합니다. 곧 마리나 위원장이 이끄는 친위대가 사무국에 도착할 겁니다.\n#5;em;[반응]"
10001025-37 = "5;토모에;05;총격에 휘말릴 수 있는 위험한 상황인 만큼 선생님께서도 저희와 함께 피난해 주셨으면 합니다."
10001025-38 = "1;체리노;s2_04;하, 하지만 어디로 도망가야지?\n#1;em;[땀]"
10001025-39 = "5;토모에;00;붉은겨울의 부지 외곽에 지금은 사용하지 않는 구교사 건물이 있습니다."
10001025-40 = "5;토모에;01;그곳에 숨는다면 마리나 위원장도 쉽게 저희를 찾지 못할 겁니다.\n#5;greeting"
10001025-41 = "1;체리노;s2_02;그, 그래. 이건 일시적 후퇴야!"
10001025-42 = "1;체리노;s2_05;절대로 도망가는 게 아니니까!\n#1;hophop"
10001025-43 = "5;토모에;01\n#5;m3\n#1;dl\n#wait;1000"
10001025-44 = "#1;hide\n5;토모에;05;자, 서두르죠!\n#5;em;[반응]"
10001025-45 = "#continued"

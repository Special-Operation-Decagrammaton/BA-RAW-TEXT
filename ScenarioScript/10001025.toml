[translation]
10001025-1 = "第2話;午後的政變"
10001025-2 = "赤冬聯邦學園．會長辦公室"
10001025-4 = "呃……啊，吵死了！到底是在吵什麼啊！？"
10001025-5 = "這樣要咱怎麼好好睡午覺嘛！"
10001025-8 = "潔，潔莉諾醬！緊急狀況！"
10001025-9 = "喂！咱不是說過不管是多緊急的事，都不能打擾咱午睡嗎！"
10001025-10 = "智惠秘書室長，你也想被肅清嗎！？"
10001025-11 = "非，非常抱歉……"
10001025-12 = "……不過，真的是緊急狀況。"
10001025-13 = "一群武裝的學生們正湧向事務局！"
10001025-14 = "怎麼，又有政變？這次是哪個社團？"
10001025-15 = "「薄荷巧克力解放戰線」？#n還是「不允許在唐揚雞上淋檸檬汁的革命家集團」？"
10001025-16 = "嘛，反正不管是誰發動政變，交給瑪麗娜委員長就行了。不用擔心。"
10001025-17 = "何必為了那種小事煩惱──"
10001025-19 = "關於那個……"
10001025-20 = "發動政變的不是別人，正是瑪麗娜保安委員長。"
10001025-22 = "……你，你說什麼！？"
10001025-26 = "痛痛痛……"
10001025-27 = "沒事吧，會長！？"
10001025-28 = "不，不要緊……"
10001025-29 = "比，比起那個！為什麼瑪麗娜會發動政變？咱什麼都沒做啊！"
10001025-30 = "關於那點，我也不清楚……"
10001025-31 = "難道……是因為之前咱偷偷吃掉了瑪麗娜珍藏的布丁嗎？"
10001025-32 = "還是說，是因為咱在她心愛的熊娃娃上睡午覺，還流了口水？"
10001025-33 = "[s]「……可能是布丁吧？」"
10001025-34 = "唔唔……怎麼辦，同志。現在去買新布丁的話有轉圜餘地嗎？"
10001025-35 = "但是，現在赤冬聯邦學園裡只剩下摻了水的超淡布丁……"
10001025-36 = "無論如何，這裡很危險。由瑪麗娜委員長率領的親衛隊很快就會抵達事務局了。"
10001025-37 = "發生槍戰是無可避免的，所以老師也和我們一起去避難吧。"
10001025-38 = "但，但是，該逃去哪裡呢？"
10001025-39 = "我們去赤冬外圍附近的舊校舍吧。"
10001025-40 = "躲在那裡的話，就算是瑪麗娜委員長也無法輕易找到我們。暫時撤退到那裡吧。"
10001025-41 = "是，是啊，只是暫時撤退！"
10001025-42 = "絕對不是逃跑！"
10001025-44 = "是的。來吧，動作快！"

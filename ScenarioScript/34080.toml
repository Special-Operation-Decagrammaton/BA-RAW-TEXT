[translation]
34080-1 = "第8話;「奧利斯小隊」"
34080-6 = "你……！你是！"
34080-14 = "咕，咕啊！"
34080-19 = "日和，你沒事吧！？"
34080-25 = "隊，隊長……"
34080-26 = "你怎麼知道這裡……"
34080-27 = "[s] 「日和，你沒事真是太好了。」"
34080-28 = "……"
34080-29 = "……………………"
34080-30 = "……咦，咦咦！？"
34080-31 = "夏，夏萊的老師為什麼會跟隊長在一起……！？"
34080-32 = "那是因為……"
34080-33 = "終，終於到降下天罰的時候了對吧？果然，我就要在這裡結束了啊……"
34080-34 = "也對……仔細想想，老師是想要把我們從奧利斯帶回去對吧……然後想要親自懲罰我們對吧……"
34080-35 = "打算抓住我們，然後關進傳說中的夏萊地下牢房對吧！就是每個晚上都能聽見反抗夏萊的孩子們在裡頭哭泣的那個地方……"
34080-36 = "[s] 「……」"
34080-37 = "嗚啊啊啊──！都結束了……明明我還有很多想做的事情和想看的雜誌的……"
34080-38 = "……"
34080-39 = "……不過就算是這樣，隊長又為什麼會跟老師在一起呢？……啊啊，我完全懂了。"
34080-40 = "日和……"
34080-41 = "隊長是被夏萊的老師威脅了對吧！？隊長的一生真是充滿苦痛，真可憐……"
34080-42 = "[s] 「是來救日和的唷。」"
34080-43 = "……"
34080-44 = "……咦？救，救我……嗎？為，為什麼？"
34080-45 = "難，難道是失去記憶了嗎？已經忘記我們是誰了嗎……？"
34080-46 = "老師說的沒錯，日和。「夏萊」的老師會幫助我們的。"
34080-47 = "……！？"
34080-48 = "[s] 「事情我都聽說了，一起去救敦子吧。」"
34080-54 = "對了，公主醬他……"
34080-55 = "我，我們真的……能把公主醬救出來嗎……？"
34080-56 = "我，我……"
34080-60 = "「她」告訴我，只要把隊長的所在地說出來，就能回到奧利斯自治區……"
34080-62 = "……！？"
34080-63 = "他，他說我只不過是聽從隊長的命令而已……所以還有酌情處理的餘地……嘿嘿……"
34080-64 = "……這樣啊。"
34080-65 = "那就這麼做吧。"
34080-66 = "……咦？"
34080-67 = "把我的位置告訴「她」，然後回自治區去吧。"
34080-68 = "這樣的話至少日和你不會遇到麻煩的。"
34080-69 = "什，什麼！？我，我嗎……"
34080-70 = "我很清楚，這天遲早會到來。謝謝你一直以來願意跟隨我。"
34080-71 = "呃，那個……我已經拒絕了……"
34080-75 = "……什，什麼啊，那是什麼能夠理解叛徒的樣子。我是那麼簡單就會背叛的人嗎？"
34080-76 = "話又說回來，「她」的話也不知道是不是真的……而且，我們已經像是在同一艘船上的命運共同體一樣了……就算我一個人回到自治區，那又有什麼意義……"
34080-77 = "還有……就算我一個人得救了，敦子醬也……"
34080-78 = "我，我也覺得如果能跟大家一起把敦子醬……公主醬救出來的話，這樣比較好……"
34080-82 = "這一點隊長也是一樣的，不是嗎？所以才會來救我吧？"
34080-86 = "……嗯，沒錯。"
34080-87 = "詳細的情況等所有人到齊再說吧。得趕快找到美咲才行。"
34080-88 = "……也對。如果是美咲同學的話，應該能把情況說明得更清楚吧……我知道了。"
34080-89 = "美咲同學會在哪裡，我大概知道。"
34080-90 = "是啊……應該就在那裡吧。"
34080-91 = "[s] 「那我們馬上出發吧。」"
34080-92 = "好，好的……！"
34080-94 = "被棄置很久的橋"
34080-96 = "……"
34080-97 = "這裡的話……"
34080-98 = "[s] 「高到讓人有點頭暈呢……」"
34080-99 = "而且底下的河流深度超過5公尺。"
34080-101 = "流速也很快，如果掉下去的話肯定會直接沉進水底的吧。"
34080-102 = "美咲。"
34080-103 = "美，美咲同學……"
34080-104 = "隊長跟日和……還有「夏萊」的老師……"
34080-105 = "這樣啊……這就是你的選擇嗎，隊長。"
34080-106 = "沒想到隊長會……而且，老師也接受了啊……"
34080-107 = "不管哪邊都在我的意料之外呢。"
34080-108 = "不過老師，你知道嗎？"
34080-109 = "我們只要把「老師」解決掉，就能回到奧利斯自治區。"
34080-110 = "[s] 「……」"
34080-111 = "在那裡的日和跟隊長應該也聽過一樣的話才對，沒錯吧？"
34080-112 = "我，我收到的條件不太一樣就是了……"
34080-113 = "……沒錯，確實是聽過，只要解決掉老師就原諒我們的背叛，之類的話。"
34080-114 = "……明明隨時都有可能都會被從背後開槍，老師卻還是能相信我們嗎？"
34080-115 = "而且對方還是「曾經對自己開槍過的人」？"
34080-116 = "……"
34080-117 = "[s] 「沙織要是有那個意思的話，我早就已經出事了。」"
34080-118 = "……這樣啊。"
34080-119 = "不過，就算這樣我也不會改變的唷。"
34080-123 = "[ns] 「美咲，那裡很危險……！」"
34080-125 = "美，美咲同學……？"
34080-126 = "要救出公主是不可能的。"
34080-127 = "就算潛入奧利斯自治區又如何？為了到達公主所在的宗座聖殿，只靠我們三個戰鬥嗎？跟奧利斯的所有學生？還要在日出之前？"
34080-128 = "恐怕「她」還準備了連我們都不知道的武器吧。"
34080-129 = "只靠我們的話，就算有大人的幫助也是不可能的。"
34080-130 = "假設我們能成功救出敦子，那又有什麼意義呢？"
34080-131 = "殘留在沒有歸宿的這個世界裡，每天喝著泥水過日……只會繼續這種沒有意義又痛苦的人生而已吧？"
34080-132 = "……"
34080-133 = "延續公主那滿是痛苦的人生……又有什麼價值呢？"
34080-134 = "[ruby=vanitas vanitatum]「一切皆為徒勞」[/ruby]僅此而已，這就是我們接受的真實。"
34080-135 = "不是嗎？隊長。"
34080-136 = "……"
34080-137 = "還是說，老師……身為大人的你，知道這個答案呢？"
34080-138 = "[s] 「等等，危險啊！再繼續後退的話……」"
34080-142 = "閉嘴，美咲。"
34080-143 = "……"
34080-144 = "所以呢？這樣一來你那充滿苦痛的人生就能夠安息了嗎？──你真的以為這種威脅對我有用嗎？"
34080-145 = "……"
34080-146 = "聽好了，美咲。如果你要從那裡跳下去的話──"
34080-147 = "我也會馬上跟著你跳下去的。"
34080-148 = "就算你想在衣服裡塞重物也是沒用的。要把你帶到岸邊不需要多少時間。"
34080-149 = "最多也就20秒。如果你失去意識，我也會用心肺復甦術直到你醒過來的。"
34080-150 = "你要用死來威脅我的話，我就一定會讓你活下去。"
34080-151 = "你至今為止都失敗多少次了，難道覺得這次就會成功嗎？"
34080-152 = "……"
34080-153 = "（……）"
34080-154 = "……嘛，確實是沒什麼自信呢。"
34080-159 = "……所以，結果還是要去救公主嗎。"
34080-160 = "我知道了……如果這是隊長的命令的話，我會服從的。"
34080-161 = "這次我也會奉陪到底的唷，隊長。"
34080-162 = "……嗯，拜託你了。"
34080-163 = "哈啊啊～～～……能夠順利真是太好了……"
34080-164 = "既然決定好了就趕快吧……只剩下90分鐘了，得在那之前趕到入口才行。"
34080-165 = "……原來如此。離0點還有一小時半……我們趕快行動吧。"
34080-166 = "說明就邊走邊說吧……出發了。"
34080-167 = "……"
34080-168 = "好，好的！往這裡……！"
34080-169 = "[ns] 「我知道了。」"
34080-174 = "下一話;前往奧利斯自治區（１）"

34080-43 = "3;히요리;10;……."
34080-44 = "3;히요리;10;……네? 네? 저를요? 왜요? 어째서요? \n#3;shake\n#3;em;[?!]"
34080-45 = "3;히요리;04;기억 상실 같은 건가요? 저희가 누군지 모르는 거 아닌가요? 그야, 구하러 왔다는 말을 들으니 막 눈물이 날 것 같지만…… 잘 이해가 안 되는데요?!"

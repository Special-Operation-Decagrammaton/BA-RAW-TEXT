[translation]
34080-1 = "ตอนที่ 8;การรวมตัวใหม่ของสควอด"
34080-6 = "เอ๋...?!  นะ... นั่นมัน!!"
34080-14 = "อ๊ะ... อ๊ากกกก?!!"
34080-19 = "ฮิโยริ! เป็นยังไงบ้าง?!"
34080-25 = "หะ... หัวหน้า..."
34080-26 = "รู้ได้ยังไงว่าฉันซ่อนตัวอยู่ที่นี่..."
34080-27 = "[s] \"ปลอดภัยดีใช่ไหมฮิโยริ โล่งอกไปที\""
34080-28 = "......"
34080-29 = "........................."
34080-30 = "......?! คะ? อะไรกันคะเนี่ย?!"
34080-31 = "คะ... คุณครูจากชาเล่ต์?! ทำไมถึงมาอยู่กับหัวหน้าได้ล่ะคะ...?!"
34080-32 = "เรื่องนั้นน่ะ..."
34080-33 = "สะ... สุดท้ายแล้วก็เป็นแบบนี้เหรอคะ? มันคือการลงทัณฑ์จากสวรรค์... สินะคะ? จะต้องรู้สึกยังไงดี... สรุปก็คือล้มเหลวสินะคะ!"
34080-34 = "คงเป็นอย่างนั้นจริงๆ สินะคะ พอมาคิดๆ ดูแล้ว คุณครูคงไม่อยากให้อาเรียสได้ตัวพวกเราไป เพราะคุณครูอยากจะลงโทษพวกเราด้วยตัวเอง..."
34080-35 = "ก็เลยมาจับตัวพวกเราก่อนพวกอาเรียสใช่ไหมคะ! จะจับพวกเราไปขังไว้ในคุกใต้ดินของชาเล่ต์สินะคะ เห็นว่าที่นั่นมีแต่เสียงกรีดร้องของนักเรียนที่ต่อต้านชาเล่ต์ด้วย......"
34080-36 = "[s] \"......\""
34080-37 = "แงงงงง!! จบเห่แล้วค่ะ เราจบแล้วจริงๆ ถ้ารู้ว่ามันจะจบสิ้นแบบนี้ละก็ ฉันไปทำอะไรที่อยากทำไว้เยอะๆ ก็คงดี! นิตยสารที่อยากอ่านก็ยังมีอีกตั้งเยอะเลย!"
34080-38 = "......"
34080-39 = "ไม่สิ... ว่าแต่ทำไมหัวหน้าถึงมาอยู่กับคุณครูแบบนี้คะ... ฉันไม่เห็นเข้าใจเลย? เกิดอะไรขึ้นเหรอคะ? เหตุผลคืออะไร? อ๋อ จริงด้วยสินะคะ เข้าใจแล้วค่ะ"
34080-40 = "ฮิโยริ..."
34080-41 = "หัวหน้ากำลังถูกคุณครูจากชาเล่ต์ข่มขู่อยู่ใช่ไหมคะ?! ชีวิตของหัวหน้าเนี่ย ทำไมมีแต่เรื่องให้ทรมาน#nใจนักล่ะคะ! ดูเข้าสิ สีหน้าตอนนี้ดูเจ็บปวดมากเลย จริงด้วยสินะคะ ก็ฉันมันมีแต่จะเป็นภาระ..."
34080-42 = "[s] \"ฮิโยริ พวกเรามาช่วยเธอนะ\""
34080-43 = "......"
34080-44 = "คะ...? คะ? ช่วยฉันเหรอคะ? ทำไมคะ? ทำไมล่ะ? "
34080-45 = "ความจำเสื่อมไปแล้วหรือยังไงกันคะ? คุณครูไม่รู้ว่าพวกฉันคือใครใช่ไหมคะ? ฉันรู้สึกเหมือนจะ#nร้องไห้ที่ได้ยินว่าจะมาช่วย... แต่ฉันก็ไม่เข้าใจเลย"
34080-46 = "ครูพูดถูกแล้วละฮิโยริ ครูจาก <ชาเล่ต์> จะช่วยพวกเราจริงๆ"
34080-47 = "......?!"
34080-48 = "[s] \"ครูรู้เรื่องแล้ว ไปช่วยอาสึโกะกันเถอะ\""
34080-54 = "องค์หญิง... จริงด้วยค่ะ อาสึโกะจัง..."
34080-55 = "พวกฉันจะ... ช่วยองค์หญิง... จาก <ผู้หญิงคนนั้น>... ได้จริงๆ ใช่ไหมคะ...?"
34080-56 = "ฉันน่ะ..."
34080-60 = "ได้รับข้อเสนอว่า... ถ้าบอกตำแหน่งของหัวหน้าให้... ทางนั้นก็จะให้ฉันกลับไปที่เขตปกครองตนเอง#nอาเรียสได้ค่ะ"
34080-62 = "...!"
34080-63 = "ที่ผ่านมาฉันก็แค่ทำตามที่หัวหน้าสั่ง... และทางนั้นก็บอกว่าจะลดโทษให้ด้วย... แหะๆ..."
34080-64 = "งั้นเหรอ..."
34080-65 = "แบบนี้นี่เอง... งั้นก็เอาแบบนั้นเลยสิ ฮิโยริ"
34080-66 = "คะ...? คะ?"
34080-67 = "บอกตำแหน่งของฉันไป แล้วเธอก็กลับไปซ่อนตัวในเขตปกครองตนเองเถอะ"
34080-68 = "ฉันจะพยายามช่วยอาสึโกะอย่างถึงที่สุดด้วยวิธีของฉันเอง ถ้าทำแบบนี้เธอก็คงไม่พลอยต้องเดือด#nร้อนไปด้วย"
34080-69 = "คะ?! ฉะ... ฉัน..."
34080-70 = "อืม คิดอยู่แล้วละว่าอาจจะเกิดเรื่องแบบนี้เข้าสักวัน ที่ผ่านมาเธอก็แค่มาทำงานใต้ความดื้อดึงของฉัน..."
34080-71 = "ตะ... แต่ฉัน... ปฏิเสธข้อเสนอนั้นไปนะคะ"
34080-75 = "ทำไมจู่ๆ บรรยากาศถึงเหมือนละครหลังข่าวแบบนี้ล่ะคะ? นี่มันอะไรกันคะ? ทำไมถึงทำหน้าเหมือนคน#nที่มาเจอกับคนทรยศล่ะ? ฉันดูเป็นคนแบบนั้นในสายตาของหัวหน้าเหรอคะ?"
34080-76 = "พวกนั้นจะพูดจริงหรือเปล่าก็ไม่รู้ อีกอย่าง... ตอนนี้พวกเราก็เหมือนลงเรือลำเดียวกันแล้ว...#nถึงฉันจะกลับไปเขตปกครองตนเองคนเดียว แต่มันก็คงไม่มีอะไรดีขึ้นหรอกค่ะ..."
34080-77 = "อีกอย่าง... ถึงฉันจะทำอย่างนั้น... อาสึโกะจังก็ยัง..."
34080-78 = "ยะ... ยังไงฉันก็คิดว่าต้องช่วยอาสึโกะจัง... ต้องช่วยองค์หญิงให้ได้... "
34080-82 = "หัวหน้าเองก็ด้วยไม่ใช่เหรอคะ? เพราะแบบนี้ถึงมาช่วยฉันใช่ไหมล่ะคะ?"
34080-86 = "... อ่า มันก็ใช่อยู่หรอก"
34080-87 = "งั้นเราก็ต้องตามหามิซากิ ส่วนรายละเอียดไว้มาคุยกันเมื่ออยู่กันพร้อมหน้า"
34080-88 = "นั่นสินะคะ... คุณมิซากิคงช่วยอธิบายสถานการณ์ตอนนี้ได้ดีกว่า... รับทราบค่ะ"
34080-89 = "ถ้าเป็นคุณมิซากิ... ฉันพอเดาได้อยู่ค่ะว่าจะไปอยู่ที่ไหน"
34080-90 = "อื้ม ถ้าเป็นที่นั่นละก็..."
34080-91 = "[s] \"งั้นเหรอ? งั้นก็ไปกันเลย\""
34080-92 = "ค่ะ... ค่ะ!"
34080-94 = "สะพานเก่าที่ถูกทิ้งร้าง"
34080-96 = "......"
34080-97 = "ถ้าเป็นที่นี่ละก็..."
34080-98 = "[s] \"สูงลิบเลย...\""
34080-99 = "ใช่ ข้างล่างมีแม่น้ำที่ลึกมากกว่า 5 เมตรไหลผ่านด้วยนะ"
34080-101 = "แล้วน้ำก็ไหลเร็วมากด้วย ถ้าตกลงมากระแทกผิวน้ำจนหมดสติไปละก็... คงได้หายไปในสายน้ำที่มืดมิดแน่"
34080-102 = "มิซากิ"
34080-103 = "คะ... คุณมิซากิ"
34080-104 = "หัวหน้า ฮิโยริ... แล้วก็... คุณครูจาก <ชาเล่ต์> ด้วยเหรอ..."
34080-105 = "อย่างนี้เองสินะ มันเป็นอย่างนี้นี่เอง หัวหน้า"
34080-106 = "นึกไม่ถึงเลยว่าหัวหน้าจะทำเรื่องแบบนี้... แถมยังรับคุณครูมาเป็นพวก..."
34080-107 = "ไม่เคยคิดมาก่อนเลยว่าเรื่องแบบนี้จะเกิดขึ้นได้ ทั้งหัวหน้า... ทั้งคุณครู... ไม่มีใครคาดเดาได้เลย"
34080-108 = "แต่รู้อะไรหรือเปล่าคุณครูจากชาเล่ต์?"
34080-109 = "ฉันได้รับข้อเสนอว่าถ้าพวกเราฆ่าคุณครูได้ พวกเราจะได้กลับไปอยู่ในเขตปกครองตนเองอาเรียส"
34080-110 = "[s] \"......\""
34080-111 = "ทั้งฮิโยริและหัวหน้าก็ได้รับข้อเสนอเดียวกันมา ใช่ไหมล่ะ?"
34080-112 = "ทะ... ที่ฉันได้รับมามันต่างออกไปหน่อย..."
34080-113 = "ใช่... ฉันก็ได้รับข้อเสนอมา ถ้าฆ่าครูได้ เราจะได้รับการยกโทษที่ทรยศ"
34080-114 = "คุณครูเชื่อคนที่พร้อมจะเหนี่ยวไกปืนจากข้างหลังได้ทุกเมื่องั้นเหรอ.....?"
34080-115 = "แถมยังเคยทำไปครั้งหนึ่งแล้วด้วยเนี่ยนะ?"
34080-116 = "......"
34080-117 = "[s] \"ถ้าซาโอริจะทำอย่างนั้นจริงๆ คงหาโอกาสลงมือไปนานแล้วละ\""
34080-118 = "งั้นเหรอ..."
34080-119 = "แต่ถึงจะพูดอย่างนั้น ก็ไม่มีอะไรเปลี่ยนไปหรอกนะ"
34080-123 = "[ns] \"มิซากิ...? เข้าไปใกล้ราวสะพานมากเกินไปแล้วนะ...?\""
34080-125 = "คะ... คุณมิซากิ...?"
34080-126 = "เราช่วยองค์หญิงไม่ได้หรอก"
34080-127 = "จะแอบเข้าไปในเขตปกครองตนเองอาเรียส แล้วต่อสู้กับกองกำลังทั้งหมดของที่นั่นและฝ่าไปให้ถึง#nมหาวิหารที่องค์หญิงถูกจับตัวไว้เหรอ?"
34080-128 = "<ผู้หญิงคนนั้น> คงจะเตรียมอาวุธที่พวกเราก็ไม่รู้จักไว้ด้วย "
34080-129 = "แค่เราสามคนเข้าไปขวางพวกนั้นไม่ได้หรอก ถึงจะได้รับความช่วยเหลือจากผู้ใหญ่ก็ทำไม่สำเร็จอยู่ดี"
34080-130 = "และถึงจะช่วยอาสึโกะไว้ได้ แล้วจะมีความหมายอะไรล่ะ?"
34080-131 = "ยังไงซะ ชีวิตพวกเราก็ยังคงไร้ความหมายและต้องทนทุกข์อยู่เรื่อยไป"
34080-132 = "......"
34080-133 = "มันก็แค่การเพิ่มความทุกข์ให้ชีวิตขององค์หญิงที่เจอมาแต่ความทุกข์... แบบนี้มันจะไปมีประโยชน์#nอะไรกันล่ะ?"
34080-134 = "[ruby=Vanitas Vanitatum]ว่างเปล่าและไร้ประโยชน์[/ruby]... เป็นเพียงสิ่งเดียวที่เราเข้าใจ"
34080-135 = "ใช่ไหมล่ะหัวหน้า?"
34080-136 = "......"
34080-137 = "หรือจะเป็นคุณครู? ผู้ใหญ่อย่างคุณรู้คำตอบของเรื่องนี้ไหม?"
34080-138 = "[s] \"หยุดก่อน... อะ... อันตราย! อย่าขยับ...\""
34080-142 = "หุบปากได้แล้ว มิซากิ"
34080-143 = "......"
34080-144 = "แล้วมันยังไงล่ะ? เธออยากให้ชีวิตที่ทนทุกข์ของเธอได้พักผ่อนเหรอ? คิดว่าข่มขู่แบบนั้นแล้วจะได้ผลกับ#nฉันงั้นเหรอ?"
34080-145 = "......"
34080-146 = "ฟังให้ดีนะมิซากิ ถ้าเธอกระโดดลงมาจากตรงนั้น ฉันเองก็จะทำบ้าง"
34080-147 = "ฉันจะถอดเสื้อคลุมแล้วโดดตามเธอลงไปใต้สะพาน ใช้เวลาไม่ถึง 2 วินาทีหรอก"
34080-148 = "เธอเอาก้อนหินใส่ในกระเป๋าเสื้อคลุมไว้ใช่ไหมล่ะ? แต่ไม่เป็นไรหรอก ฉันจะใช้มีดฉีกเสื้อผ้าที่เทอะทะ#nนั่นแล้วลากเธอขึ้นมาให้ได้"
34080-149 = "คงใช้เวลาอย่างมากก็ 20 วินาที และถ้าเธอหมดสติไป ฉันก็จะ CPR ให้จนกว่าจะฟื้น"
34080-150 = "เธอทำกับฉันแบบนี้ไม่ได้หรอกนะ มิซากิ "
34080-151 = "จะทำมากี่ครั้งมันก็เหมือนเดิมตลอดไม่ใช่รึไง? หรือคิดว่าครั้งนี้มันจะได้ผล?"
34080-152 = "......"
34080-153 = "(สั่นระริก)"
34080-154 = "ไม่หรอก... ฉันไม่มั่นใจเลย"
34080-159 = "ถ้างั้น... เราจะไปช่วยองค์หญิงกันสินะ "
34080-160 = "เข้าใจแล้ว ฉันทำตามคำสั่งของหัวหน้าอย่างซื่อสัตย์มาตลอด ถึงตอนจบจะถูกกำหนดไว้แล้ว แต่ก็คงไม่มีอะไรเปลี่ยนแปลงไปหรอก"
34080-161 = "ครั้งนี้ฉันก็จะสู้ด้วยกันให้ถึงที่สุด"
34080-162 = "...... อืม ครั้งนี้ก็ขอฝากด้วยนะ"
34080-163 = "เฮ้อ... โล่งอกไปทีค่ะ..."
34080-164 = "ถ้าตัดสินใจแล้วก็รีบไปกันเถอะ เราเหลือเวลาแค่ 90 นาที เราต้องไปถึงทางเข้าก่อนหน้านั้นให้ได้"
34080-165 = "เข้าใจแล้ว... อีกชั่วโมงครึ่งก็จะถึงเวลาเที่ยงคืน ต้องรีบแล้วละคุณครู"
34080-166 = "ฉันจะอธิบายให้ฟังระหว่างทาง เราออกเดินทางกันเลยดีกว่า"
34080-167 = "......"
34080-168 = "ค่ะ... มะ... มาทางนี้เลยค่ะ!"
34080-169 = "[ns] \"ได้เลย\""
34080-174 = "ตอนต่อไป;ไปยังเขตปกครองตนเองอาเรียส 1"

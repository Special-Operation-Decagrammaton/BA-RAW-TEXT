[translation]
34080-1 = "Episode 8; Squad Reunion"
34080-6 = "Huh...?! H-Hey!"
34080-14 = "EEEEEK!"
34080-19 = "Hiyori! Are you injured?"
34080-25 = "L-Leader..."
34080-26 = "Thank goodness. H-How did you find me?"
34080-27 = "[s] \"I'm just glad we found you in time.\""
34080-28 = "..."
34080-29 = "........."
34080-30 = "HUUUH? WHAT?! "
34080-31 = "Why are Leader and Sensei together?  "
34080-32 = "That's..."
34080-33 = "I-Is it time for my suffering and punishment? My miserable time on this planet is coming to an end!"
34080-34 = "I see... You saved me so you could capture and torture me yourself!"
34080-35 = "That's why you arrived when you did! You're gonna throw us into that underground prison! I was told that place is full of the screams of students who rebelled against Schale... "
34080-36 = "[s] \"...\""
34080-37 = "Waaah! I'm finished. I'm totally finished. If I knew my life would end so early, I would have tried to enjoy it more! I would've finished all the magazines I wanted to!"
34080-38 = "..."
34080-39 = "But that doesn't explain why you're with Sensei, Leader. What is happening? Oh, I see now..."
34080-40 = "Hiyori..."
34080-41 = "Is Sensei threatening you, Leader? Oh no! Leader's life is a long series of suffering, just like me! Look at the pain on her face! I'm so sorry for existing!"
34080-42 = "[s] \"Hiyori, we're just here to rescue you.\""
34080-43 = "..."
34080-44 = "Huh?! Me? Did you get the wrong person?  "
34080-45 = "Did you get hit on the head? Do you not remember who we are? I might cry with relief if you're actually rescuing me...but are you? I don't know what's happening..."
34080-46 = "It's true, Hiyori. Sensei decided to help us."
34080-47 = "...??"
34080-48 = "[s] \"We're going to save Atsuko before it's too late.\""
34080-54 = "Hime... Atsuko..."
34080-55 = "Do...Do you really think we can save Hime from Madame?"
34080-56 = "Um..."
34080-60 = "She offered to let me go back to the Arius district if I sold out Leader's location."
34080-62 = "...!"
34080-63 = "She said, seeing as I was just following orders, she would be lenient..."
34080-64 = "I see."
34080-65 = "I think you should do it, Hiyori."
34080-66 = "...H-Huh?"
34080-67 = "Tell her where I am, so she'll let you return to the district. Keep yourself safe."
34080-68 = "It won't stop me from trying to save Atsuko. You've done enough."
34080-69 = "Wh-What?! But I..."
34080-70 = "I've always understood this day would come. Thank you for meeting my demands all this time."
34080-71 = "But... You see... I turned it down..."
34080-75 = "Wh-What is this change in mood? Why do you look like you're relieved you could forgive a traitor! Am I a traitor to you?! Waaaah! This is the worst!"
34080-76 = "I mean... She could've been lying. And...we've been doing this together this whole time... I don't wanna go back without you..."
34080-77 = "And...what about Atsuko?"
34080-78 = "I can't just leave Atsuko behind and run away by myself. "
34080-82 = "You feel the same, don't you, Leader? That's why you came to get me."
34080-86 = "Yeah. We have to save her, no matter what."
34080-87 = "We'll find Misaki and figure out a plan."
34080-88 = "...Right. We need her... Let's go!"
34080-89 = "I...I think I know where she might be."
34080-90 = "I think I'm thinking of the same place..."
34080-91 = "[s] \"Perfect. Then let's go.\""
34080-92 = "O-Okay...!"
34080-94 = "An Abandoned Bridge"
34080-96 = "..."
34080-97 = "This place..."
34080-98 = "[s] \"We're pretty high.\""
34080-99 = "Yes, and the river flowing below is at least five meters deep."
34080-101 = "Because the current is fast, if you lose consciousness upon hitting the water, you'll be swept away in the blink of an eye."
34080-102 = "Misaki."
34080-103 = "M-Misaki...!"
34080-104 = "Leader, Hiyori...and even Sensei..."
34080-105 = "Ah, I see. That's the decision you made, Leader."
34080-106 = "I'm surprised you proposed it, and even more so that Sensei accepted."
34080-107 = "I'll admit, I didn't think this scenario was possible. I never thought you two would join forces."
34080-108 = "But did you hear, Sensei?"
34080-109 = "I was offered a chance to return to Arius if I just killed you."
34080-110 = "[s] \"...\""
34080-111 = "Hiyori and Leader likely received the same offer."
34080-112 = "A-Along the same lines, more or less."
34080-113 = "Yes, I did. Eliminate Sensei and earn her forgiveness."
34080-114 = "You trust your back to someone who wants to shoot it, Sensei?"
34080-115 = "Not only that, but to someone who's already shot you once?"
34080-116 = "..."
34080-117 = "[s] \"Saori would've shot me by now if that was what she wanted.\""
34080-118 = "I see."
34080-119 = "Regardless, the situation doesn't change."
34080-123 = "[ns] \"Misaki? You're a little too close to the railing for comfort...\""
34080-125 = "M-Misaki...?!"
34080-126 = "This rescue mission is a lost cause."
34080-127 = "Infiltrate the Arius district, fight all their troops, and reach the basilica where Hime is being held?"
34080-128 = "Not only is that impossible, Madame is in possession of technology I'm sure we couldn't even dream of."
34080-129 = "Even with Sensei's help, the three of us stand no chance."
34080-130 = "And if by some miracle we do rescue Atsuko, what then?"
34080-131 = "It's simply a stay of execution."
34080-132 = "..."
34080-133 = "Hime's life has been nothing but pain. Why do you insist on prolonging it for her?"
34080-134 = "Vanitas vanitatum... That's the only truth we can understand."
34080-135 = "Don't you agree, Leader?"
34080-136 = "..."
34080-137 = "No? Do you have an answer, Sensei?"
34080-138 = "[s] \"Misaki, please just move away from the railing and we can talk.\""
34080-142 = "You can shut the hell up, Misaki."
34080-143 = "..."
34080-144 = "You think this pathetic display will finally bring you peace? End your suffering? You think I would humor this?"
34080-145 = "..."
34080-146 = "Listen, Misaki. If you jump, here's what I'm gonna do."
34080-147 = "I'm gonna take off my coat and jump off the bridge after you. You know I'll catch up to you."
34080-148 = "I'm sure you've put rocks in your coat, but it doesn't matter. I'll tear it off you and drag you out of the water."
34080-149 = "That'll take me about twenty seconds. If you're unconscious, I'll give you CPR until you wake up."
34080-150 = "You can't pull one over on me like that, Misaki. "
34080-151 = "I've never let you get away with it before. What makes you think I'll start now?"
34080-152 = "..."
34080-153 = "*shiver*"
34080-154 = "It was worth a shot.  "
34080-159 = "So. You really intend on rescuing Hime.  "
34080-160 = "I've followed you blindly until now. If our fates are predetermined, it doesn't matter what I choose."
34080-161 = "Lead the way, Saori."
34080-162 = "As usual, I leave my back to you."
34080-163 = "Phew... Everything worked out..."
34080-164 = "Leader, we only have ninety minutes left. If we don't make it to the entrance by then, none of our plans will matter."
34080-165 = "We have to move fast, Sensei. The clock is ticking."
34080-166 = "I'll explain as we go. Let's leave."
34080-167 = "..."
34080-168 = "Okay, th-then, this way!"
34080-169 = "[ns] \"Let's save Atsuko.\""
34080-174 = "Next Episode; To the Arius District 1"

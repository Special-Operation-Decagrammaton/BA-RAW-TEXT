[translation]
34080-1 = "第8話;「アリウススクワッド」"
34080-6 = "おっ……！お、お前は！"
34080-14 = "ぐ、ぐぁっ！"
34080-19 = "ヒヨリ、大丈夫か！？"
34080-25 = "リ、リーダー……。"
34080-26 = "どうしてここが……。"
34080-27 = "[s] \"ヒヨリ、無事でよかった。\""
34080-28 = "……。"
34080-29 = "……………………。"
34080-30 = "……え、ええっ！？"
34080-31 = "シャ、シャーレの先生がどうしてリーダーと一緒にいるんですか……！？"
34080-32 = "それは……。"
34080-33 = "つ、ついに天罰の時がやってきてしまったんですね？やっぱり、私は終わりなんだ……。"
34080-34 = "そうですよね……よくよく考えてみたら、先生は私たちをアリウスから取り返したいですよね……自らの手で処罰したいでしょうから……。"
34080-35 = "私たちを捕まえて、シャーレにあると噂の地下牢に入れる気なんですね！シャーレに反抗した子たちのすすり泣きが夜な夜な聞こえるという、曰くつきのあの場所に……。"
34080-36 = "[s] \"……。\""
34080-37 = "うわぁぁぁぁぁぁああん！ もう終わりです……まだやりたい事も、読みたい雑誌もたくさんあったのに……。"
34080-38 = "……。"
34080-39 = "……仮にそうだとしても、リーダーが先生と一緒にいるのはどうしてでしょうか？……ああ、私完全に理解しました。"
34080-40 = "ヒヨリ……。"
34080-41 = "リーダーはシャーレの先生に脅されているんですね！？リーダーも苦痛だらけの人生で、可哀想に……。"
34080-42 = "[s] \"ヒヨリを助けに来たよ。\""
34080-43 = "……。"
34080-44 = "……え？わ、私を……ですか？な、何故？"
34080-45 = "も、もしかして記憶喪失とかですか？私たちが誰なのか、分からないとか……？"
34080-46 = "先生の言う通りだ、ヒヨリ。「シャーレ」の先生が、私たちの手助けをしてくれる。"
34080-47 = "……！？"
34080-48 = "[s] \"事情は聞いたよ。一緒にアツコを助けよう。\""
34080-54 = "そうだ、姫ちゃん……。"
34080-55 = "は、果たして私たちで……姫ちゃんを助けられるんでしょうか……？"
34080-56 = "わ、私は……。"
34080-60 = "リーダーの居場所を教えれば、アリウス自治区に戻れるよう便宜を図ると「彼女」に言われました……。"
34080-62 = "……っ！？"
34080-63 = "わ、私はリーダーの言葉に従っただけの存在だから……情状酌量の余地があるのだ、と言っていて……へへ……。"
34080-64 = "……そうか。"
34080-65 = "ならば、そうするといい。"
34080-66 = "……えっと？"
34080-67 = "私の居場所を「彼女」に伝えて、そのまま自治区に戻れ。"
34080-68 = "そうすればヒヨリ、少なくともお前に迷惑はかからない。"
34080-69 = "は、はい！？わ、私は……。"
34080-70 = "いつかこんな日が来ると、分かっていた。お前は今までよく私に付き合ってくれた。"
34080-71 = "ええと、その……もう断ったんですけど……。"
34080-75 = "……な、何ですか、その裏切り者に理解を示すみたいなムーブ。私ってそんなに簡単に裏切ると思われてたんですか？"
34080-76 = "そもそも、「彼女」の言葉が本当かどうかもわかりませんし……それに、もう私たちは同じ船に乗った運命共同体のようなものですし……私一人で自治区に戻ったって、何の意味も……。"
34080-77 = "それに……私一人が救われたとして、アツコちゃんは……。"
34080-78 = "わ、私もみんなでアツコちゃんを……姫ちゃんを助けられるなら、その方がいいと思うんです……。"
34080-82 = "それはリーダーだって同じじゃないですか？だから私を助けに来たんですよね？"
34080-86 = "……ああ、そうだ。"
34080-87 = "詳しい話は全員集まってからにしよう。まずはミサキを探さないと。"
34080-88 = "……そうですね。ミサキさんなら、この状況をもう少し上手く説明してくれるかもしれないし……。わかりました。"
34080-89 = "ミサキさんがどこにいるかは、なんとなく見当がつきます。"
34080-90 = "そうだな……おそらくあそこだろう。"
34080-91 = "[s] \"じゃあ、すぐに出発しよう。\""
34080-92 = "は、はい……！"
34080-94 = "長きにわたって放置された橋"
34080-96 = "……。"
34080-97 = "ここなら……。"
34080-98 = "[s] \"目眩がするような高さだね……。\""
34080-99 = "それに、下の川は水深5m以上はある。"
34080-101 = "流れも速いから、落ちたらまあそのまま水底に沈むことになるだろうね。"
34080-102 = "ミサキ。"
34080-103 = "ミ、ミサキさん……。"
34080-104 = "リーダーにヒヨリ……そして、「シャーレ」の先生か……。"
34080-105 = "そっか……そういう選択なんだね、リーダー。"
34080-106 = "まさかリーダーが、ね……それに、先生もそれを受け入れたんだ……。"
34080-107 = "どっちにせよ、予想外だったな。"
34080-108 = "でも先生、知ってる？"
34080-109 = "私たちは「先生」を始末すれば、アリウス自治区に戻れる。"
34080-110 = "[s] \"……。\""
34080-111 = "そこにいるヒヨリも、リーダーも同じ話を聞いたはず。だよね？"
34080-112 = "わ、私が受けた提案は少し違いましたけど……。"
34080-113 = "……ああ、そう言われたな。先生を始末すれば私たちの裏切りを許す、と。"
34080-114 = "……いつ後ろから引き金を引くか分からないのに、先生は私たちを信用できるの？"
34080-115 = "しかも、それが『かつて自分を撃った相手』なのに？"
34080-116 = "……。"
34080-117 = "[s] \"サオリがその気だったら、とっくに私は無事じゃないよ。\""
34080-118 = "……そっか。"
34080-119 = "でも、だからといって私は変わらないよ。"
34080-123 = "[ns] \"ミサキ、そこは危ない……！\""
34080-125 = "ミ、ミサキさん……？"
34080-126 = "姫を救うのは無理。"
34080-127 = "アリウス自治区に潜り込んでどうするの？姫がいるバシリカに辿り着くために、三人で戦うの？アリウスの全生徒と？しかも日が昇るまでに？"
34080-128 = "おそらく「彼女」は、私たちすら知らない武器を用意しているはず。"
34080-129 = "私たちだけじゃ、いくら大人の助けがあったとしても不可能だよ。"
34080-130 = "もし仮にアツコを救出できたとして、そこに何の意味があるの？"
34080-131 = "帰る場所もないこの世界に取り残されて、泥水を啜って生きるだけの……この無意味で苦しい人生が続くだけでしょ？"
34080-132 = "……。"
34080-133 = "苦痛ばかりだった姫の人生を引き伸ばして……そこに価値があるの？"
34080-134 = "[ruby=vanitas vanitatum]「全ては虚しいものである」[/ruby]ただそれだけが、私たちが納得できる真実。"
34080-135 = "そうじゃない？リーダー。"
34080-136 = "……。"
34080-137 = "それとも、先生……大人であるあなたなら、この答えを知っているの？"
34080-138 = "[s] \"待って、危ない！それ以上動いたら……。\""
34080-142 = "黙れ、ミサキ。"
34080-143 = "……。"
34080-144 = "それで？苦痛だらけのお前の人生も安息を迎えたいということなのか？――そんな脅迫が私に通じると、本気で思っているのか？"
34080-145 = "……。"
34080-146 = "よく聞け、ミサキ。お前がそこから飛び降りるなら――"
34080-147 = "私もすぐに追いかけて飛び込む。"
34080-148 = "服の中に何か重りを入れていたとしても無駄だ。川岸まで連れて行くのに時間もさほどかからない。"
34080-149 = "そこまで長くて20秒。もしもお前が気を失ったところで、何度でも心肺蘇生を繰り返す。"
34080-150 = "お前がそうやって脅そうと、私はお前を生かしてみせる。"
34080-151 = "今まで何度やっても無駄だったのに、今回は成功できるとでも思っているのか？"
34080-152 = "……。"
34080-153 = "（……）"
34080-154 = "……まあ、自信は無いかな。"
34080-159 = "……で、結局姫を助けるんだね。"
34080-160 = "わかったよ……リーダーの命令なら、従う。"
34080-161 = "今回も最後までお供するよ、リーダー。"
34080-162 = "……ああ、頼んだ。"
34080-163 = "はああ～～～……なんとかなってよかったです……。"
34080-164 = "そうと決まったら急ごう……残された時間は約90分。それまでに入り口にたどり着かないと。"
34080-165 = "……なるほど。0時まであと一時間半……急ぐとしよう。"
34080-166 = "説明は向かいながらする……行くぞ。"
34080-167 = "……。"
34080-168 = "は、はい！こっちです……！"
34080-169 = "[ns] \"わかった。\""
34080-174 = "次回;アリウス自治区へ（１）"

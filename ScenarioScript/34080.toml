34080-31 = "3;히요리;10;샤, 샬레의 선생님?! 어째서 리더와 같이 있는 거죠……?! \n#3;stiff"
34080-32 = "5;사오리;S2_19;그건…….\n#5;a\n#3;m1"
34080-33 = "3;히요리;04;드, 드디어 이렇게 된 건가요? 천벌의 시간인가요? 과연…… 이라고 할까, 역시나, 라고 할까, 결론은 망했다는 거네요!\n#3;stiff"
34080-34 = "3;히요리;03;그러네요, 진짜 그러네요. 생각해보니까 선생님은 우리를 아리우스에게 뺏기는 게 싫겠네요. 그야, 처벌은 본인 손으로 하고 싶을 거니까…….\n#3;em;…"
34080-35 = "3;히요리;10;그래서 아리우스보다 먼저 우리를 잡으러 온 거예요! 우리를 샬레에 있다는 그 지하 감옥에 집어넣으려고요! 거긴 샬레에 대적했던 아이들의 비명으로 가득 차 있다던데……. \n#3;em;[반응]\n#3;shake"
34080-36 = "[s] \"…….\""
34080-37 = "3;히요리;11;으아아앙-! 망했어요, 완전 망했네요. 이런 결말일 줄 알았으면 좀 더 하고 싶은 걸 마음껏 해둘걸! 보고 싶은 잡지도 아직 많이 있는데!\n#3;hophop"
34080-38 = "5;사오리;S2_04;……."
34080-39 = "3;히요리;04;……아니, 그렇다고 해도 리더가 선생님과 같이 있는 건 설명이 안 되는데요? 그건 어째서일까요? 무슨 이유로? 아아, 그러네요. 이해했어요.\n#3;em;…"
34080-40 = "5;사오리;S2_19;히요리……."
34080-41 = "3;히요리;10;리더는 샬레의 선생님에게 협박당하고 있는 거였군요?! 정말이지 리더도 고통뿐인 인생이네요! 그러고 보면 엄청 괴로운 표정이네요? 그러네요, 저는 언제나 짐짝밖에 되지 않으니…….\n#3;m3\n#5;dr\n#3;em;[반응]\n#3;hophop"

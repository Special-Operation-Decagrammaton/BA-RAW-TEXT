[translation]
90001010-1 = "Episode 1;Glacial Sea, Again"
90001010-3 = "How is it looking, Eimi? Toki?"
90001010-8 = "No major changes detected during recon."
90001010-9 = "I've identified the occasional Decagrammaton follower, but they are not hostile. No combat initiated. "
90001010-11 = "We only decided to continue operations here in hopes of securing more data on the fifth prophet, Geburah..."
90001010-12 = "...but we've gotten nothing. This feels like a waste of manpower and resources."
90001010-13 = "More importantly, this environment is too harsh for a delicate, beautiful, super-genius, chic, cool beauty like me."
90001010-14 = "You've added more adjectives to your moniker, President. Furthermore, I believe \"chic\" and \"cool\" are inaccurate descriptions."
90001010-15 = "Absolutely wrong! I am the very epitome of a chic, cool beauty. Eimi, you really must think more highly of me."
90001010-16 = "Yes, Eimi. Regardless of reality, it is important to encourage high self-esteem in both ourselves and others."
90001010-17 = "...Toki. Has anyone ever told you that some things are better left unsaid?"
90001010-18 = "Yes, you know me very well, President Himari. However I do not understand the sentiment and have no desire to, either."
90001010-20 = "Do something about this, Sensei. It was bad enough with Eimi, and now I must endure Toki as well."
90001010-21 = "[s] \"Toki isn't ill-intentioned...at the very least...\""
90001010-22 = "That's precisely the problem!"
90001010-23 = "*sigh* Let's move on to the matter at hand. We need to collect more data on Geburah."
90001010-24 = "I do have a report on that matter."
90001010-25 = "It is what you may call a \"hunch.\" However..."
90001010-26 = "Oh? That piques my interest."
90001010-27 = "Please, elaborate."
90001010-28 = "Yes. My \"hunch\" is about Geburah itself. To be precise, it is an impression I received during our battle."
90001010-29 = "To me, it appeared that Geburah was avoiding direct engagement. As if it did not want to incite an all-out-war between us."
90001010-30 = "Agreed. I felt its primary motive was not to fight."
90001010-31 = "I see. Then, if we evaluate what we know of Geburah so far... "
90001010-32 = "You've surmised that it's doing its utmost to delay battle, unlike the other Decagrammaton prophets we've encountered, because of an ulterior motive we have yet to uncover."
90001010-33 = "That's correct."
90001010-34 = "I would never ignore Toki's intuition. And considering you've fought it face-to-face, I trust your report."
90001010-35 = "However, that doesn't change what needs to be done."
90001010-36 = "[s] \"Continue to track Geburah and its activity?\""
90001010-37 = "Yes, Sensei. Let's say Geburah has some masterful plan brewing in the background. Then it's the Super Phenomenon Task Force's job to figure out what it is."
90001010-38 = "Everyone, without further ado—"
90001010-46 = "Eimi. Alert. We're under attack."
90001010-47 = "An unpredicted pattern. President, we're under attack."
90001010-49 = "Yes, I heard. For them to change their M.O. and suddenly aggress..."
90001010-50 = "Was some kind of new command structure established? And they're now seeking to engage in battle?"
90001010-51 = "Or perhaps it's retaliation for us chasing down Geburah's trail?"
90001010-52 = "But there's no trace of Geburah. We haven't found a wisp of it."
90001010-53 = "Yes. I've found nothing while analyzing data, either. Then what could have prompted...?"
90001010-54 = "Analysis and contemplation will have to wait. Commencing battle."

[translation]
90001010-1 = "第1話;重返冰海"
90001010-3 = "英美、季，現場的情況如何？"
90001010-8 = "目前正在偵察敵軍動向，暫時沒有太大的變化。"
90001010-9 = "雖然偶爾會發現十字神名手下的行蹤，但它們也沒有主動發動攻擊。"
90001010-11 = "之所以在這裡停留，是為了蒐集更多有關第5名預言者「葛夫拉」的情報……"
90001010-12 = "然而現在卻一點進展都沒有，不禁讓人懷疑是否只是在浪費戰力及資源呢。"
90001010-13 = "更重要的是這裡的環境……#n對我這種超天才清楚系病弱冷豔美少女而言實在太嚴酷了，你們不這麼覺得嗎？"
90001010-14 = "部長的頭銜是不是又變長了？#n而且你應該不算冷豔型的吧？"
90001010-15 = "怎麼會呢？我毫無疑問是冷豔型的沒錯。#n英美，你似乎有必要修正一下對我的看法。"
90001010-16 = "沒錯，英美。#n無論真相為何，我認為對自己抱持著合理且適度的自信是很重要的。"
90001010-17 = "……季，你有沒有被人說過自己有多嘴的壞習慣？"
90001010-18 = "不愧是陽葵部長，真是觀察入微。#n但我並不清楚別人為何這麼說，也不覺得自己需要知道原因。"
90001010-20 = "老師，拜託您也說點什麼吧。#n英美一個人也就算了，現在竟然還多了一個季……"
90001010-21 = "[s]「季這麼說也沒什麼惡意嘛……」"
90001010-22 = "您不覺得這才是問題所在嗎？"
90001010-23 = "唉，先不說這些了。#n就像剛才提過的一樣，我們現在必須投注所有心力蒐集葛夫拉的情報。"
90001010-24 = "關於這點，我有件事要報告。"
90001010-25 = "雖然與其稱之為報告，其實更接近我的直覺。"
90001010-26 = "哎呀，聽起來還真是有趣。"
90001010-27 = "是什麼事呢？說來聽聽吧。"
90001010-28 = "好的。其實這件事與葛夫拉有關──#n要說得更準確一點的話，是我在與葛夫拉戰鬥時的感受。"
90001010-29 = "我認為它不僅沒有拿出真本事，甚至可以說是極力避免跟我們展開「全面衝突」。"
90001010-30 = "嗯，這點我也同意。#n比起跟我們戰鬥，它感覺似乎另有目的。"
90001010-31 = "……原來如此。#n也就是說，葛夫拉與其他十字神名的預言者不同……"
90001010-32 = "這段期間一直在使用打帶跑的拖延戰術，#n而這麼做的背後肯定有我們不知道的理由，是這個意思對吧？"
90001010-33 = "是的。"
90001010-34 = "我認為季的直覺具有一定的參考價值。#n畢竟你們親自在戰場上和它交手過，我對你們的意見抱持著百分之百的信任。"
90001010-35 = "不過即便情況真是如此，也不會對我們現在該做的事造成任何影響。"
90001010-36 = "[s]「要繼續追蹤葛夫拉的蹤跡對吧？」"
90001010-37 = "正是如此，老師。#n就算葛夫拉真的有什麼特殊目的，將其調查清楚也是我們特異現象搜查部的工作。"
90001010-38 = "那麼，就麻煩各位了……"
90001010-46 = "還請各位務必小心。#n英美，有敵襲。"
90001010-47 = "敵方的行為模式發生改變了呢。#n部長，我們開始遭受攻擊了。"
90001010-49 = "……是啊。#n十字神名的殘存兵力至今從未主動發動攻擊，現在卻突然對我們產生敵意……"
90001010-50 = "難道它們建立了新的指揮體系嗎？#n所以才會導致交戰程序發生變化……？"
90001010-51 = "還是因為我們正在追蹤葛夫拉的蹤跡，導致它們做出了反應？"
90001010-52 = "可是葛夫拉的信號依舊處於斷絕狀態，我們根本偵測不到。"
90001010-53 = "沒錯，我這邊的分析結果也是如此。#n既然如此，現在的情況究竟……？"
90001010-54 = "看來得先暫緩分析與調查的工作了呢。#n準備進行交戰。"

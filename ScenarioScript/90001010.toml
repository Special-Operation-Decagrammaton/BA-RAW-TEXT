[translation]
90001010-1 = "ตอนที่ 1;อีกครั้งในธารน้ำแข็ง"
90001010-3 = "เอมิ โทคิ สถานการณ์ที่นั่นเป็นยังไงบ้างคะ?"
90001010-8 = "ตอนนี้พวกเรากำลังลาดตระเวนกันอยู่ แต่ยังไม่พบการเปลี่ยนแปลงที่สำคัญเลยค่ะ"
90001010-9 = "เราเห็นพวกสมุนของเดคาแกรมมาทอนบ้างเป็นครั้งคราว แต่พวกนั้นก็ไม่โจมตีพวกเราก่อนน่ะ "
90001010-11 = "เหตุผลที่พวกเราตัดสินใจอยู่ที่นี่กันต่อ ก็เพื่อหาและรวบรวมข้อมูลของเกวูราห์ ผู้เลื่อมใสลำดับที่ 5 ให้ได้มากขึ้น..."
90001010-12 = "แต่ถ้ายังไม่ได้ผลลัพธ์อยู่แบบนี้ ฉันก็อดคิดไม่ได้ว่านี่คือการสูญเสียพลังงานและทรัพยากรไปโดย#nเปล่าประโยชน์ค่ะ"
90001010-13 = "เหนือสิ่งอื่นใด ที่แห่งนี้มีสภาพแวดล้อมที่โหดร้ายเกินไปสำหรับสาวสวยสุดคูลผู้มีรอยยิ้มสดใสฮีลใจ#nเหมือนยาวิเศษอย่างฉันด้วยค่ะ"
90001010-14 = "เหมือนฉายาจะยาวขึ้นเลยนะหัวหน้า? อีกอย่าง ฉันว่าคำว่า 'สาวสวยสุดคูล' ดูไม่น่าจะเหมาะนะ"
90001010-15 = "ไม่หรอกค่ะ เหมาะที่สุดแล้วค่ะ ฉันว่าเอมิต้องประเมินฉันให้สูงขึ้นกว่าเดิมหน่อยแล้วนะคะ"
90001010-16 = "ใช่ค่ะ เอมิ ไม่ว่าความจริงจะเป็นยังไง ฉันคิดว่าสิ่งสำคัญคือการที่เรามีความเชื่อมั่นในแง่บวกกับตัวเอง#nค่ะ"
90001010-17 = "โทคิ... มีคนเคยบอกคุณมั้ยคะว่าไม่ต้องพูดทุกอย่างที่คิดก็ได้?"
90001010-18 = "มองได้ทะลุปรุโปร่งสมกับเป็นหัวหน้าฮิมาริเลยเลยนะคะ รู้ได้ยังไงคะว่าคนอื่นพูดกับฉันยังไง? ฉันไม่รู้หรอกนะคะว่าทำไมคนอื่นพูดกันแบบนั้น แต่ก็คิดว่าไม่จำเป็นต้องรู้ก็ได้ค่ะ"
90001010-20 = "คุณครู ช่วยพูดอะไรสักหน่อยสิคะ แค่เอมิคนเดียวฉันก็เหนื่อยแล้ว แต่นี่มีโทคิเพิ่มมาอีก"
90001010-21 = "[s] \"แต่อย่างน้อยโทคิก็ไม่มีเจตนาร้ายนะ...\""
90001010-22 = "คุณครูไม่คิดเหรอคะว่านั่นละที่เป็นปัญหาน่ะ?"
90001010-23 = "เฮ้อ เอาเถอะค่ะ นี่ไม่ใช่เวลามาเถียงกันอยู่ อย่างที่ฉันพูดไปก่อนหน้านี้ว่าพวกเราต้องโฟกัสเรื่องการ#nรวบรวมข้อมูลเกี่ยวกับเกวูราห์ให้มากกว่านี้ค่ะ"
90001010-24 = "ฉันมีสิ่งที่จะรายงานเกี่ยวกับเรื่องนั้นค่ะ"
90001010-25 = "นี่อาจจะเป็นการบอกความรู้สึกของฉันมากกว่าการรายงานข้อเท็จจริง แต่ก็เอาเถอะค่ะ"
90001010-26 = "ตายจริง น่าสนใจนะคะ"
90001010-27 = "ความรู้สึกอะไรเหรอคะ บอกมาได้เลยค่ะ"
90001010-28 = "ค่ะ โดยพื้นฐานแล้วก็เกี่ยวกับเกวูราห์ค่ะ ถ้าจะบอกให้ชัดเจน มันคือความประทับใจที่ฉันได้รับจากการ#nต่อสู้กับเกวูราห์ค่ะ"
90001010-29 = "ฉันรู้สึกเหมือนว่าเกวูราห์พยายามหลีกเลี่ยงการต่อสู้เต็มรูปแบบ หรือที่คล้ายกับ <สงครามเบ็ดเสร็จ> ค่ะ"
90001010-30 = "อืม ฉันเห็นด้วย เหมือนว่ามีเป้าหมายอื่นที่ไม่ใช่การต่อสู้อย่างนั้นละ"
90001010-31 = "อย่างนั้นสินะ... สิ่งที่เกวูราห์แสดงออกต่อพวกเรานั้นไม่เหมือนกับผู้เลื่อมใสตนอื่นๆ ของเดคาแกรมมาทอน "
90001010-32 = "เกวูราห์โจมตีและถอยออกเหมือนจะประวิงเวลาต่อสู้ การทำอย่างนั้นก็ต้องมีเหตุผลอะไรสักอย่างที่#nพวกเรายังไม่รู้ ตอนนี้ฉันคาดเดาได้แบบนี้ค่ะ"
90001010-33 = "ใช่ค่ะ"
90001010-34 = "ถ้าเป็นความรู้สึกจากโทคิละก็ เราคงเพิกเฉยไม่ได้แล้วละค่ะ ยิ่งเป็นการรายงานจากคนที่ได้สู้รบใน#nสนามจริงมาแล้วด้วย ก็ยิ่งเป็นข้อมูลที่น่าเชื่อถือค่ะ"
90001010-35 = "แต่ในขณะเดียวกัน นั่นก็หมายความว่าสิ่งที่พวกเราต้องทำก็ยังคงเหมือนเดิมค่ะ"
90001010-36 = "[s] \"หมายถึงต้องติดตามร่องรอยของเกวูราห์ต่อไปใช่มั้ย?\""
90001010-37 = "ใช่ค่ะคุณครู ต่อให้เกวูราห์จะมีเป้าหมายพิเศษอื่นๆ ชมรมปรากฏการณ์ลี้ลับของเราก็ต้องเปิดเผย#nสิ่งนั้นให้ได้"
90001010-38 = "ถ้าอย่างนั้น ทุกคนคะ..."
90001010-46 = "ระวังค่ะ เอมิ พบการโจมตีค่ะ"
90001010-47 = "นี่มันรูปแบบใหม่สินะ หัวหน้า เราถูกโจมตีบ้างแล้วละ"
90001010-49 = "นั่นสินะคะ... ที่ผ่านมากองกำลังที่เหลือของเดคาแกรมมาทอนไม่เริ่มโจมตีก่อนเลย แต่จู่ๆ ก็เผยความ#nเป็นศัตรูให้เห็นสินะคะ..."
90001010-50 = "เกิดระบบสั่งการแบบใหม่อย่างนั้นเหรอคะ? หรือว่ามีการเปลี่ยนแปลงในกระบวนการต่อสู้...?"
90001010-51 = "หรือว่าจริงๆ แล้วนั่นเป็นเพียงแค่ปฏิกิริยาตอบสนองต่อการที่พวกเราแกะร่องรอยของเกวูราห์กันอยู่?"
90001010-52 = "แต่สัญญาณของเกวูราห์ยังหายไปอยู่นะ เราไม่พบสัญญาณจากที่ไหนเลย"
90001010-53 = "ค่ะ ทางฉันก็วิเคราะห์ได้ข้อมูลเดียวกันอยู่ค่ะ ถ้าอย่างนั้น นี่มัน...?"
90001010-54 = "คงต้องเลื่อนการวิเคราะห์ออกไปก่อนแล้วละ การปะทะเริ่มขึ้นแล้วค่ะ"

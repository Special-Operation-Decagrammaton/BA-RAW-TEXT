[translation]
90001010-1 = "#title;제1화;다시, 빙해에서"
90001010-2 = "3;히마리 방한복;01\n#3;a\n#3;sig\n#wait;1000"
90001010-3 = "3;히마리 방한복;02;에이미, 토키. 현장은 어떤가요?\n#3;sig\n#3;em;[?]"
90001010-4 = "#st;[0,0];instant;1;"
90001010-5 = "#clearST"
90001010-6 = "3;히마리 방한복;02\n#3;d\n#3;sig\n#wait;1000"
90001010-7 = "3;토키 모드 1;01\n#3;a\n#wait;1000"
90001010-8 = "3;토키 모드 1;02;위력 정찰을 진행 중입니다만, 큰 변화는 없습니다."
90001010-9 = "3;토키 모드 1;02\n2;에이미 수영복ND;02;간간이 데카그라마톤의 수하들이 보이는 정도. 그렇지만 먼저 공격을 걸어오지는 않아. \n#3;m4\n#2;ar"
90001010-10 = "#all;hide"
90001010-11 = "3;히마리 방한복;05;우리가 여기에 남아 정보수집을 계속하기로 한 이유는, 5번째 예언자 게부라의 정보를 보다 많이 확보하기 위한 것…….\n#3;sig"
90001010-12 = "3;히마리 방한복;06;그렇지만 이렇게 성과가 없어서야, 그야말로 전력과 자원을 낭비하고 있다는 생각밖에는 들지 않네요.\n#3;sig\n#3;em;[한숨]"
90001010-13 = "3;히마리 방한복;10;무엇보다 이곳은 저 같은 초천재병약청초계쿨뷰티미소녀에게는 지나치게 가혹한 환경이란 말이죠?\n#3;sig"
90001010-14 = "3;에이미 수영복ND;04;수식어가 두 개 정도 늘었는데, 부장? 그리고 쿨 뷰티는 조금 아닌 것 같아.\n#3;em;…"
90001010-15 = "3;히마리 방한복;11;아니거든요? 완전 맞거든요? 에이미는 조금 더 저에 대한 평가를 상향 조정할 필요가 있다고 봐요.\n#3;sig"
90001010-16 = "3;히마리 방한복;11\n2;토키 모드 1;03;그렇습니다. 에이미. 진실이 어찌 되었든, 자기 자신이 스스로에 대해 올바른 자존감을 갖는 것은 중요하다고 생각합니다.\n#2;ar\n#3;m4\n#3;sig\n#2;em;[반짝]"
90001010-17 = "3;히마리 방한복;05;……토키. 당신, 한 마디가 많다는 말, 가끔 듣지 않나요?\n#3;sig\n#3;em;[땀]"
90001010-18 = "3;히마리 방한복;05\n2;토키 모드 1;02;역시 히마리 부장. 정확한 통찰력이시군요. 하지만 그 이유에 대해서는 알지 못합니다. 특별히 알아야 한다는 생각도 들지 않고요.\n#3;dr\n#2;m3\n#3;sig"
90001010-19 = "#all;hide"
90001010-20 = "3;히마리 방한복;02;선생님. 뭐라고 한마디 해 주세요. 에이미만으로도 충분한데, 토키까지 늘어났잖아요.\n#3;sig"
90001010-21 = "[s] \"적어도 토키에게 나쁜 의사는 없을 거야…….\""
90001010-22 = "3;히마리 방한복;05;바로 그래서 문제라고 생각되지 않으시냐는 건데요?\n#3;sig\n#3;em;[스팀]"
90001010-23 = "3;히마리 방한복;06;하아, 어쨌거나 이럴 때가 아니라, 앞서 말했듯이 저희들은 게부라의 정보를 수집하는 일에 더 집중할 필요가 있다구요.\n#3;sig"
90001010-24 = "3;토키 모드 1;02;그 일로 한 가지 보고드릴 것이 있습니다.\n#3;em;…"
90001010-25 = "3;토키 모드 1;07;보고라기보다는 제 느낌에 보다 가까운 것일 수도 있겠습니다만, 아무튼요."
90001010-26 = "3;히마리 방한복;02;어머나. 흥미롭네요.\n#3;sig"
90001010-27 = "3;히마리 방한복;03;뭔가요? 말해 보세요.\n#3;sig"
90001010-28 = "3;토키 모드 1;99;네. 근본적으로는 게부라에 관한 것입니다. 보다 정확하게는 게부라와의 전투에서 받은 감상이었죠.\n#3;greeting"
90001010-29 = "3;토키 모드 1;07;게부라는 본격적인 전투, 어떤 의미로 마치 <전면전>을 피하려고 하는 듯한 느낌이었습니다."
90001010-30 = "3;에이미 수영복ND;00;응. 그거 나도 동의. 무언가, 싸우기보다는 다른 데에 목적이 있는 것처럼 보였어.\n#3;jump"
90001010-31 = "3;히마리 방한복;99;……과연, 즉 이제껏 게부라가 보여주었던 모습들. \n#3;sig"
90001010-32 = "3;히마리 방한복;00;다른 데카그라마톤의 예언자들과는 달리, 치고 빠지는 형태로 지연전을 수행하는 듯한 모습엔, 우리가 알 수 없는 그만한 이유가 있는 것이다. 라는 추측이로군요.\n#3;sig"
90001010-33 = "3;토키 모드 1;00;그렇습니다.\n#3;greeting"
90001010-34 = "3;히마리 방한복;02;토키의 감이라면, 그건 무시할 수 없겠네요. 실제로 전장에서 부딪친 당신들의 보고라면 신뢰도는 그만큼 뛰어난 법이고요.\n#3;sig"
90001010-35 = "3;히마리 방한복;00;하지만 동시에, 그 말은 우리가 해야 할 일 자체는 크게 변하지 않았다는 말이기도 합니다.\n#3;sig"
90001010-36 = "[s] \"게부라와 그 흔적을 계속해서 추적하는 것 말이지?\""
90001010-37 = "3;히마리 방한복;04;그렇습니다. 선생님. 게부라가 달리 특별한 목적을 지니고 있다 할지라도, 그것까지 밝혀내는 것이 저희 초현상특무부가 해야 할 일.\n#3;sig"
90001010-38 = "3;히마리 방한복;02;그럼, 여러분 곧바로…….\n#3;sig"
90001010-39 = "#st;[0,0];instant;1;"
90001010-40 = "#clearST"
90001010-41 = "#all;hide"
90001010-42 = "#wait;500"
90001010-43 = "#wait;1000"
90001010-44 = "#wait;1000"
90001010-45 = "4;토키 모드 1;04\n2;에이미 수영복ND;00\n#2;h\n#4;h\n#2;em;[?!]\n#4;em;[?!]\n#2;shake\n#4;shake\n#wait;1500"
90001010-46 = "4;토키 모드 1;05;조심하십시오. 에이미. 공격입니다.\n#4;em;[반응]"
90001010-47 = "2;에이미 수영복ND;01;이건 새로운 패턴이네. 부장. 공격받기 시작했어."
90001010-48 = "#all;hide"
90001010-49 = "3;히마리 방한복;99;……그렇네요. 지금껏 먼저 공격을 걸어오지 않았던 데카그라마톤의 잔존 병력이, 돌연 적의를 드러냈다…….\n#3;sig"
90001010-50 = "3;히마리 방한복;02;새로운 지휘 체계가 성립되었다는 것일까요? 그것으로 교전 프로세스에 변화가 일어났다든가……?\n#3;sig\n#3;em;[?]"
90001010-51 = "3;히마리 방한복;05;아니면 정말로 단순하게, 우리가 게부라의 흔적을 쫓고 있기 때문에, 그에 대한 반응을 보였다?\n#3;sig"
90001010-52 = "3;에이미 수영복ND;02;하지만 게부라의 신호는 여전히 끊긴 채야. 어디에서도 포착되지 않아."
90001010-53 = "3;히마리 방한복;02;네. 그건 이쪽에서도 마찬가지로 분석되고 있어요. 그렇다면, 이건……?\n#3;sig"
90001010-54 = "3;토키 모드 1;07;분석과 고찰을 조금 미뤄 둬야 할 시간인 것 같군요. 교전을 시작합니다."
90001010-55 = "#st;[0,0];instant;1;"
90001010-56 = "#clearST"
90001010-57 = "3;토키 모드 1;01\n#3;greeting\n#wait;1000"

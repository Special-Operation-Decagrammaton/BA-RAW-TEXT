[translation]
1301303-1 = "Why We Collect"
1301303-2 = "Black Market"
1301303-3 = "I ended up helping some Valkyrie students with patrol work around the black market..."
1301303-7 = "Thank you for your assistance, Sensei."
1301303-8 = "Today's patrol went smoothly thanks to you."
1301303-9 = "[s] \"Any time. I didn't do much though.\""
1301303-10 = "Don't say that! Just your presence makes the job easier."
1301303-11 = "Once word gets out that you'll be around, all the criminals tuck tail and run!"
1301303-12 = "Of course, there are always reckless troublemakers who'll try their luck."
1301303-13 = "Just like her! Come on out!"
1301303-20 = "Waaah..."
1301303-21 = "[ns] \"Momiji?!\""
1301303-23 = "Oh! Do you know this student, Sensei?"
1301303-24 = "Understood. If that's the case, I will place Akiizumi Momiji under your care, Sensei.  "
1301303-25 = "It's less paperwork for me!"
1301303-29 = "I will leave the guidance and punishment of that individual in your hands, Sensei!"
1301303-33 = "Th-Thank you, Sensei!"
1301303-34 = "If I was just handed over to Red Winter... For the crime of entering the black market without permission... "
1301303-35 = "I would have been sentenced to no less than two weeks of cleaning our deepest, darkest bathrooms..."
1301303-36 = "[s1] \"To think you would be a criminal, Momiji...\"\n[s2] \"I am a little disappointed in you, though.\""
1301303-39 = "N-No! It's not like that... I mean, yeah, I was here!"
1301303-40 = "But I promise I'm not doing anything bad. Please believe me, Sensei!"
1301303-41 = "Then what am I doing here...? Ah..."
1301303-45 = "Well, I heard a rumor that one of Luriel's old books was spotted on the black market."
1301303-46 = "Yeah... Those are the ones I've been collecting."
1301303-47 = "[s] \"Hm... So did you find what you were looking for?\""
1301303-48 = "Yes! And in mint condition too!"
1301303-49 = "Heeheehee. It was dangerous, scary, and more expensive than I thought but..."
1301303-50 = "I'm so, so happy I was able to get it..."
1301303-51 = "Huh? What makes it so valuable?"
1301303-52 = "Um... I wouldn't necessarily call it valuable in that sense. People don't actually think much of it."
1301303-53 = "It was Luriel's second ever published work, before she blew up in popularity. That's why there aren't a lot of copies."
1301303-54 = "Unless you're a real fan... You wouldn't even know to look for it."
1301303-55 = "[s3] \"So it's valuable to you.\"\n[s4] \"So it's one of those limited-edition type goods.\""
1301303-58 = "Exactly! So you do get it, Sensei."
1301303-59 = "HUH?! You've spent 100,000 yen on a transforming robot toy?!"
1301303-60 = "Wow... That's a whole other level... Is that what adults are capable of...? Their power...?"
1301303-61 = "[s5] \"Anyways... let's move on from that very un-educational topic.\"\n[s6] \"So are you collecting items from Luriel?\""
1301303-64 = "I just like collecting her published works. It's a little niche, I'll admit."
1301303-65 = "The reason? Well..."
1301303-69 = "Firstly, I am a member of the Knowledge Liberation Front. I'm doing my duty to collect information, with priority given to books."
1301303-70 = "The older publications tend to be damaged or dog-eared, so people think they're not worth much."
1301303-71 = "For some reason... I'm particularly partial to those kind of items."
1301303-72 = "Because, you know, books are made to be read by people, right? If they've been loved, they shouldn't be in perfect condition."
1301303-73 = "[s] \"I'm actually quite moved by your dedication...\""
1301303-74 = "Y-You don't have to be that moved, Sensei!"
1301303-75 = "There are also concerns regarding our budget."
1301303-76 = "Of course, there are other cool items that aren't just books."
1301303-77 = "But, as you know, Red Winter students aren't exactly living under the best conditions in their day-to-day lives."
1301303-78 = "I have to be careful about what we're spending our money on, or it'll lead to riots and problems."
1301303-79 = "Trying to be so selective about what I choose, my collection ended up mostly being works that mean a lot to me."
1301303-80 = "I do try to make requests to the Secretariat Office here and there for additional books and publications."
1301303-81 = "But they almost always get rejected! Ugh! It's so frustrating!"
1301303-82 = "Even though the library is kind of isolated and no one really knows where it is..."
1301303-83 = "And even though the library doesn't exactly have a lot of foot traffic..."
1301303-84 = "I still want to increase our selection for the dedicated students who do come and visit!"
1301303-85 = "*sigh* But I've learned that we can't have everything we want in life..."
1301303-86 = "[s] \"Wait, did you say you request books and other publications for the library together?\""
1301303-87 = "I-I did. Why?!"
1301303-88 = "[s7] \"Some of those requests must be books you want as well!\"\n[s8] \"So you add to your collection, and provide books to the students!\"  "
1301303-96 = "I'm so sorry... WAAAH!"
1301303-97 = "You're right! I'm using the Secretariat Office and library for my own personal gain!"
1301303-98 = "I'm a terrible librarian! How can I even call myself a member of the Knowledge Liberation Front?"
1301303-99 = "Once the others hear about this, they won't forgive me..."
1301303-100 = "[s] \"It'll be our little secret.\""
1301303-101 = "...Really?"
1301303-107 = "Then that makes you an accomplice, right Sensei? Heeheehee..."
1301303-109 = "I returned to Red Winter, holding the hand of an embarrassed, yet strangely happy Momiji."

1301303-29 = "4;모미지;04\n3;발키리 학생;01;그러면 선생님! 사후 계도 및 인도 잘 부탁드리겠습니다!\n#3;em;[반응]\n#3;greeting\n#4;h"
1301303-30 = "#st;[0,0];instant;1;"
1301303-31 = "#clearST"
1301303-32 = "4;모미지;04\n3;발키리 학생;01\n#3;d\n#4;h\n#wait;2000"
1301303-33 = "4;모미지;04;가, 감사해요. 선생님!\n#4;jump\n#4;em;[반응]"
1301303-34 = "4;모미지;06;이대로 붉은겨울에 인도되었다면…… 블랙마켓에 허가 없이 드나들었다는 혐의로……  "
1301303-35 = "4;모미지;06;최소 2주일은 햇볕도 들지 않는 화장실 청소 숙청형에 처해졌을 거예요……\n#4;em;[속상함]"
1301303-36 = "[s1] \"그렇지만 모미지가 불법 거래를 하고 있었다니……\"\n[s2] \"선생님은 조금 실망했단다……\""
1301303-37 = "#wait;100"
1301303-38 = "#wait;100"
1301303-39 = "4;모미지;04;아, 아니에요! 그, 블랙마켓에 온 건…… 맞지만……\n#4;em;[!]\n#4;hophop"
1301303-40 = "4;모미지;04;절대 나쁜 짓이나 불법 거래 같은 걸 하러 온 건 아니에요! 믿어 주세요……!"
1301303-41 = "4;모미지;02;그럼 왜 여기까지 왔냐고요? 그건……"
1301303-42 = "#st;[0,0];instant;1;"
1301303-43 = "#clearST"
1301303-44 = "4;모미지;02\n#4;em;…\n#wait;2500"
1301303-45 = "4;모미지;01;루리엘 님의, 구작 판본 중 하나가, 여기에서만 거래된다고 해서……\n#fontsize;50"
1301303-46 = "4;모미지;99;네…… 맞아요. 제가 콜렉팅하는 중이라고 말씀드렸던……"
1301303-47 = "[s] \"으음…… 그러면 찾던 판본은 구했어?\""
1301303-48 = "4;모미지;07;네! 여기, 이렇게 거의 원본대로의 상태인 것으로 구했어요!\n#4;greeting\n#4;em;[반짝]"
1301303-49 = "4;모미지;03;에헤헤. 여러모로 위험하고 무서운 일인 데다 예산도 많이 들어가는 일이었지만……"
1301303-50 = "4;모미지;07;그래도, 이렇게 구할 수 있어서 다행이에요……"
1301303-51 = "4;모미지;02;네? 그렇게 귀한 판본이냐고요?\n#4;em;[?]"
1301303-52 = "4;모미지;99;음…… 관점에 따라서는 그럴 수도 있지만, 보통은 거의 찾지도 않을 판본이긴 해요."
1301303-53 = "4;모미지;01;루리엘 님이 아직 유명하지 않았을 때 출간했던 두 번째 작품이거든요. 그래서 판본의 수 자체가 적죠."
1301303-54 = "4;모미지;02;진짜 팬이 아니면…… 찾지도 않을 책이죠."
1301303-55 = "[s3] \"왠지 알 것 같네.\"\n[s4] \"수요는 적지만, 오히려 고가로 거래되는 그런 종류구나.\""
1301303-56 = "#wait;100"
1301303-57 = "#wait;100"
1301303-58 = "4;모미지;03;맞아요! 잘 아시네요. 선생님."
1301303-59 = "4;모미지;04;네? 선생님도 하나에 10만 엔이나 하는 변신 로봇을 산 적도 있다고요?!\n#4;em;[?!]\n#4;jump"
1301303-60 = "4;모미지;04;후아아아…… 단위가 다르시네요…… 이것이 어른의 힘? 어른의 무서움……?\n#4;shake"
1301303-61 = "[s5] \"자아…… 교육에 좋지 않은 이야기는 일단 넘어가고.\"\n[s6] \"모미지는 그 루리엘 님의 모든 굿즈를 모으는 거야?\""
1301303-62 = "#wait;100"
1301303-63 = "#wait;100"
1301303-64 = "4;모미지;01;그건 아니예요. 그냥…… 판본만 모으는 거죠. 일종의 제한적인 콜렉팅이라고나 할까요."
1301303-65 = "4;모미지;02;이유요? 음…… 그건……\n#4;em;[?]"
1301303-66 = "#st;[0,0];instant;1;"
1301303-67 = "#clearST"
1301303-68 = "4;모미지;02\n#4;em;…\n#wait;2500"
1301303-69 = "4;모미지;01;우선, 저는 지식해방전선의 부원이에요. 지식을 모으기 위해…… 다른 무엇보다 서적류를 우선적으로 모으죠."
1301303-70 = "4;모미지;99;그리고 오래된 판본일수록 낡고 해져서, 가치 없어 보이는 물건으로 분류되어 버려지는 경우가 많은데."
1301303-71 = "4;모미지;07;저는 어쩐지…… 그런 것들일수록 더욱…… 애착이 가거든요."
1301303-72 = "4;모미지;03;그, 왜, 책이란 건 원래 읽히기 위해 만들어지는 거잖아요?\n#4;em;[음표]"
1301303-73 = "[s] \"이 선생님, 오랜만에 좋은 이야기를 들었어……\""
1301303-74 = "4;모미지;04;그, 그렇다고 울먹이시면 제가 곤란해지는데요?!\n#4;hophop"
1301303-75 = "4;모미지;07;그리고 예산 문제도 어느 정도 있어요."
1301303-76 = "4;모미지;99;물론 제 관심을 끄는 파생 굿즈도 있기는 하지만……"
1301303-77 = "4;모미지;02;붉은겨울 학생들은, 생활면에서, 그, 여러모로 그다지 풍족하지 못한 경우가 많거든요."
1301303-78 = "4;모미지;01;선택과 집중을 잘 하지 않으면…… 이래저래 고달파지죠……\n#4;stiff\n#4;em;[땀]"
1301303-79 = "4;모미지;02;그러다 보니 어느새, 저에게 가장 만족감이 높은 판본 위주로 콜렉팅을 하게 된 것 같아요."
1301303-80 = "4;모미지;01;그리고 말이에요. 사실 여건이 허락될 때마다 사무국에 추가 장서와 판본을 신청하곤 하는데……"
1301303-81 = "4;모미지;05;그 요청 대부분이 기각되곤 해서 슬프기도…… 화가 나기도 해요!\n#4;jump\n#4;em;[!]"
1301303-82 = "4;모미지;05;아무리 붉은겨울 학원의 도서관이, 조금 동떨어진 자리에 위치해 있지만!\n#4;jump\n#4;m2"
1301303-83 = "4;모미지;05;그래서 찾는 학생도, 규모에 비해 적은 편이기는 하지만!\n#4;jump\n#4;m3"
1301303-84 = "4;모미지;05;가끔씩이라도 도서관을 찾아 주는 학생들을 위해 장서를 늘리고 싶은데!\n#4;jump\n#4;m4"
1301303-85 = "4;모미지;99;하아…… 인생이란 좀처럼 생각대로 되지 않더라구요……\n#4;greeting\n#4;em;[한숨]"
1301303-86 = "[s] \"으흠? 지금 장서와 판본을 같이 신청한다고 했지?\""
1301303-87 = "4;모미지;04;그, 그런데요?!\n#4;em;[?!]"
1301303-88 = "[s7] \"거기에는 모미지 양의 사리사욕도 약간 들어가 있는 것이 아닌가요~\"\n[s8] \"장서를 신청하면서 콜렉팅도 동시에 완성하려는 사리사욕이!\" "

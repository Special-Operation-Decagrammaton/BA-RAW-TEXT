1301303-23 = "4;모미지;04\n3;발키리 학생;02;어라, 선생님. 아는 학생이신가요?\n#3;em;[?]"
1301303-24 = "4;모미지;04\n3;발키리 학생;01;그, 그렇군요. 알겠습니다. 그렇다면 여기…… 아키이즈미 모미지 학생의 신변은 선생님께 양도하도록 하겠습니다. \n#3;greeting"
1301303-25 = "4;모미지;04\n3;발키리 학생;01;뭐, 후속 과정이 줄어드는 셈이니 저로서도 좋은 일이긴 하죠.\n#fontsize;50"

[translation]
1301303-1 = "收集某種東西的原因"
1301303-2 = "黑市"
1301303-3 = "（某天在協助黑市巡邏的任務時……）"
1301303-7 = "非常感謝你的協助，老師。"
1301303-8 = "託老師的福，今天也順利完成巡邏了。"
1301303-9 = "[s]「嗯，嗯。雖然我好像也沒做什麼……」"
1301303-10 = "別這麼說，老師光是在場，對我們就是莫大的幫助了。"
1301303-11 = "畢竟只要有傳聞說老師會出現，問題學生就會銷聲匿跡，不敢出來惹事！"
1301303-12 = "當然……還是會有膽大包天的人就是了。"
1301303-13 = "好了，快過來吧！"
1301303-20 = "咦咦咦咦咦咦咦咦……"
1301303-21 = "[ns]「紅葉！？」"
1301303-23 = "哎呀，是老師認識的學生嗎？"
1301303-24 = "原，原來如此，我明白了。#n那麼……秋泉紅葉同學就交給老師處理吧。 "
1301303-25 = "這樣後續的流程比較簡單，對我來說也是件好事。"
1301303-29 = "老師，後續的指導就拜託你囉！"
1301303-33 = "謝，謝謝你，老師！"
1301303-34 = "如果就這樣被移交給赤冬……就得因為擅自出入黑市的嫌疑……  "
1301303-35 = "被處以打掃不見天日的廁所至少2週的打掃肅清了……"
1301303-36 = "[s1]「但紅葉居然在進行非法交易……」\n[s2]「老師好難過哦……」"
1301303-39 = "不，不是的！#n雖然來到黑市……是事實沒錯……"
1301303-40 = "但我絕對不是來做壞事或非法交易的！請相信我……！"
1301303-41 = "……為什麼來這裡？#n那個……"
1301303-45 = "因為聽說Rurieru老師的絕版書只有這裡才能買到……"
1301303-46 = "嗯……就是我說正在收藏的書……"
1301303-47 = "[s]「這樣啊……那你買到想買的書了嗎？」"
1301303-48 = "是！請看，我買到的這本幾乎沒有受損哦！"
1301303-49 = "耶嘿嘿……雖然危險重重又很可怕，還需要花費大量預算……"
1301303-50 = "不過能買到真是太好了……"
1301303-51 = "嗯？你問是那麼貴重的書嗎？"
1301303-52 = "這個嘛……價值終究還是因人而異的，但現在幾乎已經找不到這本書了。"
1301303-53 = "因為這是Rurieru老師成名前出版的第二部作品……所以數量非常稀少。"
1301303-54 = "除了相當著迷的粉絲之外……應該不會有人來找這本書。"
1301303-55 = "[s3]「好像多少能理解。」\n[s4]「是雖然需求比較少，卻反而會以高價交易的那種類型。」"
1301303-58 = "說的沒錯！不愧是老師。"
1301303-59 = "咦？老師也買過一個要價10萬的變身機器人……！？"
1301303-60 = "哇啊……等級完全不同……這就是大人的力量？#n大人的……可怕……？"
1301303-61 = "[s5]「……不利於教育的話題還是先說到這裡吧。」\n[s6]「紅葉在收集那位Rurieru老師的所有周邊商品嗎？」"
1301303-64 = "不，並不是所有商品。我收集的……只有絕版書而已。#n只能算是一種有限收藏吧。"
1301303-65 = "收集的理由是嗎？#n嗯……這個……"
1301303-69 = "首先，因為我是知識解放戰線的一員。#n為了收集知識就必須涉獵各種書籍。"
1301303-70 = "而且越久以前的書就越容易有損傷，所以經常被視為沒有價值的東西而被丟棄……"
1301303-71 = "但不知道為什麼……越是那種狀態的書……就越是讓我想去閱讀它們。"
1301303-72 = "畢竟書不就是為了讓人閱讀而出現的嗎？"
1301303-73 = "[s]「老師好久沒聽到這麼有道理的話了……」"
1301303-74 = "老，老師現在哭出來的話我會很困擾的……！"
1301303-75 = "……除此之外，預算也是個問題。"
1301303-76 = "我當然也有其他感興趣的周邊商品……"
1301303-77 = "但不只是我，赤冬聯邦學園的學生……在生活方面並不是很有餘裕。"
1301303-78 = "如果不做好取捨……會過得很辛苦的……"
1301303-79 = "所以漸漸地，我就以收藏最能讓自己滿足的書為主了。"
1301303-80 = "還有，其實每當條件允許，我就會向事務局申請在購買新書時一起購買絕版書……"
1301303-81 = "但是卻幾乎都被駁回，所以很讓人難過……也很讓人生氣！"
1301303-82 = "雖然赤冬聯邦學園的圖書館是很偏遠沒錯！"
1301303-83 = "雖然和學園的規模相比使用者是很少沒錯！"
1301303-84 = "但我還是想為偶爾來到圖書館的學生增加藏書！"
1301303-85 = "唉……人生總是很難如願以償呢。"
1301303-86 = "[s]「嗯？你剛才說同時申請新書跟絕版書？」"
1301303-87 = "是，是沒錯！？"
1301303-88 = "[s7]「其中是不是稍微參雜了一點紅葉個人的私慾？」\n[s8]「像是以增加藏書的名義增加收藏之類的？」 "
1301303-96 = "是我不對……嗚嗚嗚嗚嗚……"
1301303-97 = "居然出於私慾而利用事務局和圖書館……"
1301303-98 = "身為圖書管理員和知識解放戰線的成員，這樣果然是不行的吧……？"
1301303-99 = "如果這件事被發現，大家一定不會原諒我的……"
1301303-100 = "[s]「別擔心，我會幫你保密的。」"
1301303-101 = "真的嗎……？"
1301303-107 = "那老師……這樣我們就是共犯了唷？#n耶嘿嘿……"
1301303-109 = "（與看起來既害羞又開心的紅葉手牽著手，回到了赤冬聯邦學園）"

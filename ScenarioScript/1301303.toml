1301303-6 = "3;발키리 학생;01\n#3;a\n#wait;1000"
1301303-7 = "3;발키리 학생;01;협력 감사드립니다. 선생님.\n#3;em;[반응]"
1301303-8 = "3;발키리 학생;02;덕분에 오늘도 무사히 순찰을 마칠 수 있었습니다.\n#3;greeting"
1301303-9 = "[s] \"으, 응. 별로 한 것도 없지만 말이야.\""
1301303-10 = "3;발키리 학생;01;무슨 말씀이신가요. 선생님이 계시는 것만으로도 저희에겐 큰 도움이 된답니다."
1301303-11 = "3;발키리 학생;03;무엇보다, 선생님이 나타난다는 소문이 도는 날이면, 문제아들이 자취를 감추고 아무 사건도 일으키지 않으려 하니 말이죠!\n#3;jump"
1301303-12 = "3;발키리 학생;06;물론…… 그런데도 문제를 발생시키는 겁 없는 문제아들도 있기 마련입니다만."
1301303-13 = "3;발키리 학생;02;이렇게 말이죠. 자, 이리 나오세요!\n#3;em;[반응]"

[translation]
1301303-1 = "เหตุผลที่ต้องรวบรวมของบางอย่าง"
1301303-2 = "ตลาดมืด"
1301303-3 = "(คุณครูบังเอิญได้มาช่วยงานลาดตระเวนที่ตลาดมืด...)"
1301303-7 = "ขอบคุณที่ให้ความร่วมมือนะคะ คุณครู"
1301303-8 = "งานลาดตระเวนวันนี้ผ่านไปได้ด้วยดีเพราะคุณครูมาช่วยเลยค่ะ"
1301303-9 = "[s] \"อะ...อื้ม ครูไม่ได้ทำอะไรเยอะสักหน่อย\""
1301303-10 = "พูดอะไรอย่างนั้นกันคะ แค่คุณครูมาอยู่ที่นี่ด้วยกัน ก็ช่วยพวกเราได้เยอะแล้วละค่ะ"
1301303-11 = "ยิ่งกว่านั้น พอมีข่าวว่าคุณครูจะมาที่นี่แพร่ออกไป พวกเด็กเกเรส่วนใหญ่ก็ไม่กล้าโผล่ออกมาสร้าง#nความวุ่นวายกันเลยค่ะ!"
1301303-12 = "แน่นอนว่า... ถึงจะยังมีพวกเด็กเกเรที่ไม่เกรงกลัวอะไร แล้วก็ออกมาก่อกวนอยู่บ้างก็เถอะค่ะ"
1301303-13 = "แบบเด็กคนนี้ไงล่ะคะ เอ้า ออกมาได้แล้วค่ะ!"
1301303-20 = "ฮือ แงงงงงง..."
1301303-21 = "[ns] \"โมมิจิ?!\""
1301303-23 = "เอ๋? คุณครู... รู้จักนักเรียนคนนี้ด้วยเหรอคะ?"
1301303-24 = "ยะ...อย่างนั้นเหรอคะ เข้าใจแล้วค่ะ ถ้างั้นก็... ฉันขอส่งมอบนักเรียนอะกิอิซุมิ มิโมจิให้กับคุณครู#nแล้วกันนะคะ "
1301303-25 = "ถือว่าเป็นการลดขั้นตอนลงไปอีกหน่อย ย่อมเป็นเรื่องดีสำหรับฉันอยู่แล้วค่ะ"
1301303-29 = "ถ้าอย่างนั้นคุณครูคะ... ขอรบกวนเรื่องการส่งตัว และขั้นตอนการอบรมหลังจากนี้ด้วยนะคะ!"
1301303-33 = "ขะ... ขอบคุณนะคะ คุณครู!"
1301303-34 = "ถ้าเกิดถูกนำตัวส่งไปที่สหภาพเรดวินเทอร์ทั้งๆ แบบนี้... อาจโดนข้อหาลักลอบมาที่ตลาดมืดโดย#nไม่ได้รับอนุญาตเลยก็ได้...  "
1301303-35 = "แล้วก็คงโดนลงโทษให้ทำความสะอาดห้องน้ำโดยไม่ได้เห็นเดือนเห็นตะวันอย่างต่ำสักสองอาทิตย์#nแน่ๆ..."
1301303-36 = "[s1] \"โมมิจิมาทำการซื้อขายผิดกฎหมายเหรอเนี่ย...\"\n[s2] \"ครูชักผิดหวังนิดหน่อยแล้วนะ...\""
1301303-39 = "ปะ...เปล่าค่ะ! ฉะ...ฉันมาที่ตลาดมืด...ก็จริง...แต่ว่า..."
1301303-40 = "แต่ได้โปรดเชื่อฉันเถอะนะคะว่าฉันไม่ได้มาทำเรื่องไม่ดี หรือทำอะไรที่ผิดกฎหมายเลย...!"
1301303-41 = "แล้วฉันมาที่นี่ทำไมน่ะเหรอคะ? คือว่าเรื่องนั้น..."
1301303-45 = "ฉันได้ยินว่ามีหนังสือของคุณรูริเอล ฉบับตีพิมพ์เก่าที่ขายแต่ที่นี่เท่านั้นอยู่ด้วย..."
1301303-46 = "ค่ะ... ใช่แล้วค่ะ ฉันกำลังรวบรวมหนังสืออยู่..."
1301303-47 = "[s] \"อืมมม... แล้วเจอหนังสือที่หาอยู่มั้ย?\""
1301303-48 = "ค่ะ! นี่ไงคะ ฉันเจอเล่มที่สภาพเหมือนใหม่เลยละค่ะ!"
1301303-49 = "ฮิฮิ... ถึงมันเป็นเรื่องที่เสี่ยงอันตรายในหลายๆ ด้าน แล้วก็ต้องใช้เงินจำนวนมากก็ตาม..."
1301303-50 = "แต่ยังไงฉันก็ดีใจที่หามันมาได้ค่ะ..."
1301303-51 = "คะ? เป็นหนังสือหายากขนาดนั้นเลย...งั้นเหรอคะ?"
1301303-52 = "อืม... เรื่องนั้นก็อาจจะแตกต่างกันไปตามมุมมองของแต่ละคนค่ะ แต่เล่มนี้หาไม่ได้ทั่วๆ ไปหรอกค่ะ"
1301303-53 = "นี่เป็นผลงานชิ้นที่สองที่ตีพิมพ์ออกมาในตอนที่คุณรูริเอลยังไม่ได้มีชื่อเสียงโด่งดัง เพราะงั้นก็เลย#nตีพิมพ์ออกมาจำนวนน้อยมากค่ะ"
1301303-54 = "ถ้าไม่ใช่แฟนตัวยงละก็... คงจะไม่ตามหาเลยด้วยซ้ำค่ะ"
1301303-55 = "[s3] \"ครูพอจะเข้าใจแล้วละ\"\n[s4] \"ตีพิมพ์ออกมาน้อย ก็เลยซื้อขายกันราคาสูงสินะ\""
1301303-58 = "ใช่แล้วค่ะ! คุณครูรู้ดีเลยนี่คะ"
1301303-59 = "คะ? คุณครูเองก็เคยซื้อหุ่นยนต์ของเล่นตัวหนึ่งมาในราคาหนึ่งแสนเยนเลยเหรอคะ?!  "
1301303-60 = "อึก... จำนวนเงินทุนต่างกันเลย... หรือว่านี่คือพลังของผู้ใหญ่? หรือความน่ากลัวของผู้ใหญ่กัน...?"
1301303-61 = "[s5] \"เอาละ... ข้ามเรื่องที่ไม่เป็นผลดีต่อความรู้ไปดีกว่า\"\n[s6] \"โมมิจิสะสมผลงานของคุณรูริเอลทั้งหมดเลยเหรอ?\""
1301303-64 = "ไม่ขนาดนั้นหรอกค่ะ ฉันแค่...สะสมพวกหนังสือที่ตีพิมพ์เป็นรูปเล่มค่ะ หรือว่าจะเรียกว่าสะสมเฉพาะ#nของที่มีจำกัดน่ะค่ะ"
1301303-65 = "เหตุผลเหรอคะ? อืม... เรื่องนั้น..."
1301303-69 = "อันดับแรก ฉันเป็นสมาชิกของชมรมแนวร่วมปลดปล่อยความรู้ค่ะ การรวบรวมหนังสือถือเป็นสิ่งที่#nต้องทำเป็นอันดับแรก... เพื่อสะสมความรู้ค่ะ"
1301303-70 = "และยิ่งเป็นหนังสือที่ตีพิมพ์ออกมานานมันก็จะยิ่งมีสภาพเก่ามาก หลายๆ ครั้งมักถูกโยนทิ้งไปเพราะ#nดูเหมือนเป็นสิ่งของที่ไม่มีค่า"
1301303-71 = "แต่สำหรับฉัน... ยิ่งเป็นของพวกนั้น... ยิ่งรู้สึกผูกพันมากขึ้นน่ะค่ะ"
1301303-72 = "แล้วก็หนังสือน่ะ เป็นสิ่งที่ทำมาเพื่อให้คนอ่านด้วยนี่คะ?"
1301303-73 = "[s] \"ครูน้ำตาจะไหล นานๆ ทีครูจะได้ยินอะไรดีๆ แบบนี้...\""
1301303-74 = "ถะ...ถ้าคุณครูมาร้องไห้แบบนี้ ฉันรู้สึกลำบากใจนะคะ?!"
1301303-75 = "อีกอย่างเราก็มีปัญหาเรื่องงบประมาณที่ใช้ได้อยู่ด้วยค่ะ"
1301303-76 = "แน่นอนว่ามีสินค้าประเภทอื่นๆ ที่ฉันสนใจอยู่ด้วยก็จริง..."
1301303-77 = "แต่คุณครูก็คงทราบดีว่านักเรียนของสหภาพเรดวินเทอร์อย่างพวกเราไม่ได้มีชีวิตความเป็นอยู่ที่ดี#nมากมายอะไร"
1301303-78 = "ถ้าไม่เลือกให้ถี่ถ้วนแล้วก็ระมัดระวังละก็... อาจพบเจอความลำบากได้ไม่ทางใดก็ทางหนึ่งค่ะ..."
1301303-79 = "เพราะงั้นฉันเลยเน้นการสะสมหนังสือที่ฉันชอบมากที่สุดยังไงล่ะคะ"
1301303-80 = "ที่จริงแล้ว... ทุกครั้งที่ได้รับอนุญาต ฉันก็จะยื่นคำร้องขอซื้อต้นฉบับและหนังสือเพิ่มไปยังสำนัก#nเลขาธิการเสมอๆ..."
1301303-81 = "แต่คำร้องของฉันส่วนใหญ่ก็มักจะถูกปฏิเสธ มันน่าเศร้า... แล้วก็น่าโมโหด้วยค่ะ!"
1301303-82 = "ถึงห้องสมุดของสหภาพเรดวินเทอร์จะอยู่ในพื้นที่ห่างไกลไปสักหน่อย"
1301303-83 = "แล้วก็ถึงแม้ว่าจำนวนนักเรียนที่มาห้องสมุดจะมีจำนวนน้อยเมื่อเทียบกับจำนวนนักเรียนทั้งหมด...!"
1301303-84 = "แต่บางครั้งฉันก็อยากเพิ่มจำนวนหนังสือในห้องสมุด เพื่อพวกนักเรียนที่มาใช้บริการห้องสมุดบ้าง...!"
1301303-85 = "เฮ้อ... แต่ชีวิตมันไม่ค่อยมีอะไรเป็นไปตามที่คาดหวังหรอกค่ะ..."
1301303-86 = "[s] \"หืม? ตอนนี้ยื่นคำร้องเรื่องซื้อหนังสือไปแล้วใช่มั้ย?\""
1301303-87 = "ทะ...ทำไมเหรอคะ?!"
1301303-88 = "[s7] \"โมมิจิแอบใส่เรื่องที่ตัวเองอยากได้เองลงไปด้วยหรือเปล่า~\"\n[s8] \"จุดประสงค์ที่ยื่นคำร้องซื้อหนังสือนี่เพื่อสะสมเองนี่นา!?\" "
1301303-96 = "ฉันผิดไปแล้วค่ะ... มุแงงงง..."
1301303-97 = "ฉันคิดจะใช้ห้องสมุดและสำนักเลขาธิการเพื่อผลประโยชน์ของตัวเองแบบนี้..."
1301303-98 = "คงนับว่าขาดคุณสมบัติของการเป็นบรรณารักษ์แล้วก็คุณสมบัติของสมาชิกชมรมแนวร่วมปลดปล่อย#nความรู้ด้วยสินะคะ...?"
1301303-99 = "ถ้ามีใครรู้เรื่องนี้เข้าละก็ คงไม่มีทางยกโทษให้ฉันแน่ๆ..."
1301303-100 = "[s] \"ไม่เป็นไร ครูไม่บอกใครหรอก\""
1301303-101 = "จริงเหรอคะ...?"
1301303-107 = "ถ้างั้นคุณครู...ก็เป็นผู้สมรู้ร่วมคิดกับฉันแล้วสินะคะ? ฮิฮิฮิ..."
1301303-109 = "(คุณครูจับมือกับโมมิจิที่ดูเขินอายนิดๆ ไว้ แล้วทั้งคู่ก็พากันกลับไปที่สหภาพเรดวินเทอร์)"

[translation]
80000067-1 = "認真就輸了"
80000067-2 = "（接到寧瑠的聯絡後，來到了千年的校區內）"
80000067-3 = "呦，老師！"
80000067-4 = "[s1]「……寧瑠？」\n[s2] 回頭看向聲音傳來的地方"
80000067-8 = "來的真早啊，抱歉讓你等。"
80000067-9 = "啊，找你有什麼事？啊，這個嘛……不是，一下就進入這個話題有點……"
80000067-10 = "算了，不是什麼大不了的東西。別太期待。"
80000067-11 = "那個，我只是想……"
80000067-15 = "只是想說老師應該會喜歡。所以選了一個厲害的東西。"
80000067-16 = "……拿去，收下吧！"
80000067-21 = "[ns3]「這，這個是……？」\n[ns4]「好厲害的造型……」"
80000067-22 = "怎麼樣？嚇到了吧！？"
80000067-23 = "怎麼樣？嚇到了吧！？"
80000067-24 = "很酷對吧？不覺得很讚嗎？#n哎呀～我找這個找得很辛苦呢。不管去哪裡都是些無趣的東西。"
80000067-25 = "……啊？問我這是什麼？"
80000067-26 = "老師你不知道嗎？今天可是情人節啊？"
80000067-27 = "忙到都忘記了嗎？你還是跟往常一樣辛苦啊。不過我會幫你記得的。"
80000067-28 = "……咦，不是那個意思？……巧克力的設計？"
80000067-29 = "啊……難道是魄力不夠嗎？不過仔細一看確實再大一點可能會更好吧。"
80000067-30 = "乾脆把雕刻也……"
80000067-31 = "……啊？"
80000067-32 = "情人節的意義？"
80000067-33 = "不就是送巧克力的日子嗎？除此之外還有什麼嗎？"
80000067-34 = "[s5]「……沒什麼，別在意。謝謝你。」\n[s6]「總之，帥氣真不錯呢。」"
80000067-35 = "哈哈，沒錯沒錯。不用在意那些小事，開心最重要啦。"
80000067-36 = "哈哈，沒錯沒錯。不用在意那些小事，開心最重要啦。"
80000067-37 = "話說快打開吧。"
80000067-38 = "我很好奇味道到底怎麼樣。"
80000067-39 = "[s7]「我是不介意啦……」\n[s8]「……沒關係嗎？」"
80000067-40 = "……啊，什麼意思？"
80000067-41 = "……啊，什麼意思？"
80000067-42 = "你該不會要說不行吧？我買來的吃一點無所謂吧！"
80000067-46 = "來，快坐下！趕快來吃吧！"
80000067-47 = "[s]「……」"
80000067-49 = "（之後便和寧瑠一起，在周圍人們的注視下分食著巧克力）"
80000067-50 = "（味道確實不錯，但包含設計在內的其他方面很難讓人不去注意）"

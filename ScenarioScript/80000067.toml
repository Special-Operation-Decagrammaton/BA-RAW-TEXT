[translation]
80000067-1 = "สิ่งที่สูญเสียไป"
80000067-2 = "(คุณครูมารอที่โรงเรียนมิลเลเนียมหลังจากได้รับโทรศัพท์จากเนรุ)"
80000067-3 = "นี่ ครู! ทางนี้ๆ!"
80000067-4 = "[s1] \"เนรุ...?\"\n[s2] หันไปมองทางต้นเสียง"
80000067-8 = "ฮ่าฮ่า... อะไรเนี่ยครู...? มาเร็วกว่าที่คิดไว้อีกนะ? ทำเอาฉันรู้สึกผิดเลย"
80000067-9 = "หืม...? เรียกมามีอะไรงั้นเหรอ? เอ่อ... คือ... จู่ๆ มาถามกันทันทีแบบนี้ก็อายเหมือนกันนะ"
80000067-10 = "ไม่ได้มีเรื่องด่วนอะไรหรอก ถ้าคาดหวังอะไรไว้ก็ขอโทษด้วยแล้วกัน"
80000067-11 = "ฉันเรียกมาเพราะเรื่องนี้น่ะ..."
80000067-15 = "ไม่สิ เดาว่าครูต้องชอบแน่ๆ ฉันเลือกของที่ดีที่สุดมาเลยนะ"
80000067-16 = "เอ้า...! ดูสิ! นี่ไงล่ะ!"
80000067-21 = "[ns3] \"นี่มัน...?\"\n[ns4] \"ของที่ดูหรูหราแบบนี้มัน...\""
80000067-22 = "ฮ่าฮ่าฮ่า! ตกใจเหรอ? ตกใจใช่มั้ยล่ะ? เป็นไง!"
80000067-23 = "ฮ่าฮ่าฮ่า! ตกใจเหรอ? ตกใจใช่มั้ยล่ะ? เป็นไง!"
80000067-24 = "ดูดีใช่มั้ยล่ะ? มันเจ๋งมากเลยใช่มั้ย? กว่าจะหามาได้นี่เล่นเอาเหนื่อยเลยนะ! ไปที่ร้านไหนก็มีแต่ของ#nที่ดูน่าเบื่อทั้งนั้น.."
80000067-25 = "หืม...? นี่คืออะไรงั้นเหรอ?"
80000067-26 = "ฮ่ะฮ่ะฮ่า! คุณครู! นี่ไม่รู้งั้นเหรอ? หรือว่าลืมไปแล้ว? วันนี้เป็นวันวาเลนไทน์นะ!"
80000067-27 = "คงยุ่งมากจนลืมวันลืมคืนเลยสิท่า แต่ไม่ต้องห่วง ฉันจะดูแลไม่ให้ครูต้องรู้สึกแย่เอง"
80000067-28 = "เอ๋...? ไม่ได้หมายถึงเรื่องนั้นงั้นเหรอ? รูปแบบของช็อกโกแลต? ช็อกโกแลตทำไมเหรอ?"
80000067-29 = "อืม... หรือฉันควรซื้ออันที่ใหญ่กว่านี้นะ? อันนี้มันดูธรรมดาไปเหรอ?"
80000067-30 = "รู้งี้เอาอันที่แกะสลักเป็นรูปมังกรมาดีกว่า..."
80000067-31 = "หา...?"
80000067-32 = "ถามว่าฉันรู้ความหมายของวันวาเลนไทน์รึเปล่าน่ะเหรอ? นั่นสินะ..."
80000067-33 = "มันเป็นวันที่ให้ช็อกโกแลตกันไม่ใช่รึไง? มีอะไรงั้นเหรอ?"
80000067-34 = "[s5] \"เปล่า ไม่ต้องสนใจหรอก\"\n[s6] \"ช็อกโกแลตอันนี้ยอดมากเลยนะ\""
80000067-35 = "ฮ่ะฮ่ะฮ่า!! ใช่มะ ต้องแบบนี้สิ! อย่าคิดเล็กคิดน้อยเลยน่า"
80000067-36 = "ฮ่ะฮ่ะฮ่า!! ใช่มะ ต้องแบบนี้สิ! อย่าคิดเล็กคิดน้อยเลยน่า"
80000067-37 = "เอาล่ะๆ ถ้างั้นก็รีบๆ เปิดดูสิ"
80000067-38 = "ฉันอยากรู้ตั้งนานแล้วว่ารสชาติจะเป็นยังไง ฉันขอกินด้วยคนได้ใช่มั้ย?"
80000067-39 = "[s7] \"ช็อกโกแลตวาเลนไทน์เนี่ยนะ...?\"\n[s8] \"จะเอาช็อกโกแลตคืนเหรอ...?\""
80000067-40 = "อะไรกัน? ทำไมทำหน้าแบบนั้นล่ะ?"
80000067-41 = "อะไรกัน? ทำไมทำหน้าแบบนั้นล่ะ?"
80000067-42 = "หรือคิดจะกินคนเดียวไม่แบ่งงั้นเหรอ? เน่... ทำไมขี้งกแบบนี้ล่ะ? ฉันเป็นคนซื้อมานะ!"
80000067-46 = "อย่างกไปหน่อยเลยน่า มาแบ่งกันกินเถอะ~ เอาล่ะๆ มานั่งตรงนี้สิ!"
80000067-47 = "[s] \"...\""
80000067-49 = "(...คุณครูไปนั่งข้างๆ เนรุและแบ่งช็อกโกแลตกินด้วยกันสองคน)"
80000067-50 = "(เนื่องจากเป็นช็อกโกแลตที่ขายดีไซน์ เลยรู้สึกว่ารสชาติไม่ได้ต่างจากช็อกโกแลตทั่วไปนัก...)"

1101-4 = "1;준코;11;하아, 하아……. #n이제 더이상은 안 쫓아오겠지?\n#1;al"
1101-5 = "5;아카리;02;한숨 돌린 거 같아요. 아무리 지독한 선도부장이라도 #n이런 외곽 지역 멀리까지 추격해오진 않겠죠☆\n#5;al\n#5;em;[반짝]"
1101-6 = "5;하루나;06;후. 그깟 맛없는 학원식당 하나 날려버렸다고 이 난리라니, #n게헨나의 선도부는 어지간히도 할일이 없나 보군요.\n#5;em;[빠직]\n#5;a"
1101-7 = "1;준코;11;아니…… 선도부가 하는 게 바로 그런 일이잖아…….\n#1;em;[땀]\n#1;stiff"
1101-8 = "5;하루나;05;마치 이런 거죠, 준코 씨. #n아무도 없는 싱크대 수도에 물이 콸콸 흘러 넘치는 걸 보면 무슨 기분이 들죠?"
1101-9 = "1;준코;02;어…… 잠가야겠다?\n#1;em;[?]"
1101-10 = "5;하루나;03;네. 바로 그거예요. #n맛없는 식당을 보면 저는 그런 충동을 느낍니다.\n#5;em;[하트]\n#5;greeting"
1101-11 = "1;준코;11;……됐어. 설명하려고 하지마. #n어차피 모르겠으니까."
1101-12 = "1;준코;02;그런데 아까부터 이즈미가 안 보이잖아. #n따라오고 있었던 거 아니었어?\n#1;hophop\n#1;em;[반응]"
1101-13 = "5;아카리;01;이즈미 씨는 한참 전에 낙오되었어요. #n아마도 지금쯤이면 히나 씨에게 잡혔겠죠.\n#5;em;[음표]"
1101-14 = "1;준코;05;뭐?! 뭐야?!! 그럼 큰일이잖아!! 그걸 왜 이제 말해줘?!\n#1;shake"
1101-15 = "5;아카리;02;그럴 필요가 없었으니까요. #n이즈미 씨는 낙오될 때 우리에게 각오를 남겼어요. 뜨거운 진심이 담긴 혼의 외침을요.\n#5;greeting"
1101-16 = "1;준코;10;가, 각오? #n서, 설마……! #n우리를 위해서…….\n#1;em;[...]\n#1;stiff"

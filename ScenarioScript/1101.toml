[translation]
1101-1 = "美食研究會的日常（１）"
1101-2 = "格黑娜．郊外某處"
1101-4 = "哈啊，哈啊……#n已經沒有在追了吧？"
1101-5 = "似乎沒問題呢。就算是頑強的風紀委員長，#n應該也不會追到這麼遠來才對☆"
1101-6 = "呼……只是把那麼不好吃的學生食堂炸飛一間就造成這種騷動，#n看來格黑娜的風紀委員會相當的遊手好閒呢。"
1101-7 = "不……風紀委員，原本就是做那種工作的啊……"
1101-8 = "淳子同學，我舉個例子唷？看到一個誰也沒在使用的洗手台一直在流著水，妳會作何感想呢？"
1101-9 = "我想想……會認為必須要關上吧？"
1101-10 = "是的，就是那樣。#n我看見端出難吃料理的店面，就會湧出那種衝動。"
1101-11 = "……可以不用說明了唷。#n反正我也不懂。"
1101-12 = "話說從剛才就沒有看到泉耶？#n沒有跟過來嗎？"
1101-13 = "泉同學她，很早就脫隊了。#n現在肯定，被陽奈同學抓住了吧。"
1101-14 = "咦咦，騙人！？那麼重要的事，怎麼現在才說啊！？"
1101-15 = "因為沒有說的必要唷。#n泉同學她，脫隊的時候向我們留下了一句話。蘊含著真心，熾熱靈魂的吶喊。"
1101-16 = "靈魂的吶喊？#n該，該不會……！為了我們……"
1101-17 = "……是那樣啊。我們不會忘記她的犧牲的。#n泉同學留下了什麼話呢？"
1101-20 = "吶，吶～！等等！！#n等一下，沒血沒淚嗎！？不要丟下我──！"
1101-21 = "呼啊！？（滑倒）"
1101-23 = "（哐碰咚—！）"
1101-24 = "就說了不要丟下我啊！嗚哇──！#n給我記住哦！就算死了我也會報仇的！！"
1101-26 = "……就是這樣。"
1101-27 = "……"
1101-28 = "……"
1101-29 = "唔呵呵☆"
1101-32 = "嗅嗅……嗯？好像有什麼好吃的香味。"
1101-34 = "妳說，在這種公園嗎？"
1101-35 = "是種相當獨特的香味……嗅嗅，這裡唷！"
1101-37 = "（咻噠噠噠）"
1101-39 = "（東翻西找）"
1101-40 = "找到了！就是來自這朵蘑菇的香味唷！"
1101-41 = "啊啦，這是……"
1101-42 = "松露……！這是松露呀！"
1101-43 = "松露……？"
1101-44 = "也被稱作黑色鑽石，是非常貴重的蘑菇……！"
1101-46 = "這個的稀有價值，比被稱作夢幻鮪魚的黃金鮪魚還要高唷！"
1101-47 = "咦咦！？那麼稀有！？"
1101-48 = "特別是，這股濃厚又獨特的香味，我只有在新鮮採集到時有聞過。"
1101-49 = "光是能享受這股香味就算幸運了唷。"
1101-50 = "我也有聽過。聽說是空腹的母豬的嗅覺才能找到的超稀有食材！"
1101-51 = "不愧是淳子同學，擁有美妙的才能呢。"
1101-52 = "妳剛才以稱讚的話語混入了微妙的單字了吧。想死嗎？#n小心我把妳代替松露埋起來唷？"
1101-54 = "現在不是做這種事的時候。#n松露採取後5分以內的事前處理是關鍵。#n為了維持這個新鮮度……"
1101-55 = "需要乾淨的布。"
1101-56 = "不不……我們是沿著到處都是土的路跑來的唷，怎麼可能有乾淨的布啊。#n而且大家也都滿身泥濘……"
1101-57 = "這樣的話，這個如何呢？"
1101-58 = "等等！！那不是內褲嗎！！！"
1101-59 = "是還沒開封的新品唷？而且是100%高級絲綢，#n雖然以心情來說有些微妙，不過本質上和乾淨的手帕沒有兩樣。"
1101-60 = "那當然是，那樣沒錯……#n不過會長，這樣可以嗎？"
1101-61 = "沒有問題。不，不如說反而更好。#n沒想到亞伽里的潔癖會在這種時候派上用場。"
1101-62 = "（唦，唦……）"
1101-63 = "好了，這樣就可以了吧。#n再來就是回去，接著調理這朵松露而已……！！"
1101-64 = "……"
1101-65 = "不，在那之前……必須把被囚禁的泉同學救出來才行呢。#n畢竟品嚐這麼貴重的食材時，研究會員一個人也不能少。"
1101-66 = "不愧是會長！沒錯，就這樣回去把風紀委員那些人揍飛，然後也得把泉救出來才行！！"
1101-67 = "Love＆Violence☆#n是女孩子間的友情呢！"
1101-70 = "誰要揍飛誰呢？"
1101-71 = "噫，噫噫！！？？風紀委員會！什麼時候！？"
1101-75 = "（唦唦……）"
1101-77 = "啊啦……被包圍了呢。"
1101-78 = "唉，要逃也該有個限度，真麻煩。各位，把她們──"
1101-79 = "（驚！）"
1101-81 = "……不，那樣會變得麻煩，果然還是瀕死程度就好。"
1101-83 = "（點頭）"
1101-84 = "各位，請不要做無謂的抵抗。"
1101-87 = "（噠噠噠噠噠噠！！）"
1101-89 = "（這之後悽慘的遭到逮捕了）"

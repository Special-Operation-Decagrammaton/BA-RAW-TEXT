[translation]
1101-1 = "Gourmet Research Society's Odd Day Part 1"
1101-2 = "Somewhere Outside Gehenna"
1101-4 = "*pant* *pant* Did we lose them?"
1101-5 = "I think we're good. Not even the head prefect is stubborn enough to chase us this deep into the woods! ☆"
1101-6 = "Sheesh. All this fuss just because we lit up that slop bucket of a dining hall? Doesn't the Gehenna Prefect Team have anything better to do with their time?"
1101-7 = "Actually, no. That's...exactly what the Prefect Team is supposed to do."
1101-8 = "See here, Junko. If you saw water gushing out of a tap into an overflowing sink and there was no one around, what would you do?"
1101-9 = "I guess...I'd shut it off?"
1101-10 = "Exactly. That's precisely the urge I get when I see an eatery that's no better than a feeding trough."
1101-11 = "You can stop there. I'll never understand the way you think. "
1101-12 = "Wait. I haven't seen Izumi in a while. Wasn't she behind us?"
1101-13 = "Izumi fell behind ages ago. I'm sure Hina nabbed her by now."
1101-14 = "Are you kidding me?! That's serious! Why didn't you say something sooner?!"
1101-15 = "When Izumi fell behind, she was yelling out something about conviction. Primal scream of a determined soul, that sort of thing."
1101-16 = "C-Conviction? N-No way! Could she have...for us...?"
1101-17 = "Her sacrifice will never be forgotten. What exactly did Izumi say?"
1101-20 = "N-No! You traitors! Don't leave me behind!"
1101-21 = "*slips* Huh?!"
1101-23 = "*slam*"
1101-24 = "Ah! I'll get you for this. I swear, I'll get you back if it's the last thing I do!"
1101-26 = "...Something like that."
1101-27 = "..."
1101-28 = "..."
1101-29 = "Heehee! ☆"
1101-32 = "*sniff* Do you smell that? Something smells absolutely scrumptious."
1101-34 = "Here? In the middle of the park?"
1101-35 = "Whatever it is, its aroma is out of this world!#n*sniff* This way!"
1101-37 = "*whoosh*"
1101-39 = "*rummages*"
1101-40 = "Found it! It's coming from these mushrooms!"
1101-41 = "Oh, my. Is that...?"
1101-42 = "Truffles! These are truffles!"
1101-43 = "Trupples?"
1101-44 = "They're also known as black diamonds. These mushrooms are the rarest of the rare!"
1101-46 = "In fact, this delicacy ranks higher than even the most delectable of high-end tunas, the Kin Maguro!"
1101-47 = "Whoooa! You don't say?"
1101-48 = "And this rich and inimitable aroma is what makes it so unique in particular. "
1101-49 = "We should consider ourselves lucky just to be breathing it in."
1101-50 = "I've heard about how rare they are. People train hogs with keen senses of smell just to find them."
1101-51 = "Who knew Junko had such a talented snout?"
1101-52 = "One more backhanded compliment like that and I'll bury you where I found these truffles!"
1101-54 = "We don't have time for this. How a truffle is handled within the first five minutes of it being harvested is vital in preserving its essence."
1101-55 = "We need a clean piece of cloth or fabric."
1101-56 = "Hold on. Do you expect any of us to have that when we've been sprinting down this dirt road? We're all caked in dirt."
1101-57 = "Would something like this work?"
1101-58 = "What in the...?! Is that a pair of underwear?"
1101-59 = "Brand-new and never worn! Not to mention, 100 percent silk of only the highest quality! It may be underwear, but what's the difference between this and a handkerchief?"
1101-60 = "Nothing, I guess, but...what do you think, Pres? Are you good with this?"
1101-61 = "Absolutely. In fact, I'm relieved. I never imagined Akari's neuroticism would come in handy like this."
1101-62 = "*fwip*"
1101-63 = "Voila. Now all that's left to do is head back and cook these truffles."
1101-64 = "..."
1101-65 = "No. I suppose we should rescue Izumi first. Even a single member of the club being absent when we taste such a prized luxury is unacceptable."
1101-66 = "Well, then! Why don't we go put those Prefect tightwads in their place and save Izumi?"
1101-67 = "Love and violence! It's what friendship is all about, ladies! ☆"
1101-70 = "Who is it you're going to put in their place?"
1101-71 = "What in the...?! What's the Prefect Team doing here?!"
1101-75 = "*whoosh*"
1101-77 = "Oh, dear... We're surrounded."
1101-78 = "*sigh* I'm tired of all this running. End them, girls."
1101-79 = "(Wha...?!)"
1101-81 = "...You're lucky I don't want to deal with the cleanup. Light them up, but leave them breathing."
1101-83 = "*nod*"
1101-84 = "Please don't resist. There's no point."
1101-87 = "*pop* *pop* *pop* *tat* *tat*"
1101-89 = "(Everyone is promptly defeated and arrested.)"

[translation]
1101-1 = "วันประหลาดของชมรมชิมอาหาร 1"
1101-2 = "ที่แห่งหนึ่งในบริเวณด้านนอกเกเฮนน่า"
1101-4 = "แฮ่กๆ... คงไม่ตามมาแล้วใช่ไหม?"
1101-5 = "ค่อยโล่งอกหน่อย ถึงจะเป็นประธานกรรมการที่โหดร้ายแค่ไหน แต่ก็คงไม่ไล่ตามมาถึง#nเขตนอกเมืองหรอกมั้งคะ☆"
1101-6 = "ฮุฮุ แค่โรงอาหารที่รสชาติห่วยๆ โดนระเบิดทิ้งไปก็เท่านั้นเอง ทำไมต้องวุ่นวายอะไรกันด้วย#nดูเหมือนทางคณะกรรมการวินัยคงจะว่างงานน่าดูเลยสินะคะ"
1101-7 = "อันที่จริง... นั่นมันเป็นงานของพวกเขานะ"
1101-8 = "แบบนี้เองสินะคะ คุณจุนโกะ เวลาที่เห็นก็อกน้ำถูกเปิดทิ้งไว้จนล้นอ่างล้างจานทั้งที่ไม่มีใครใช้น่ะ รู้สึกยังไงเหรอคะ?"
1101-9 = "เอ่อ... คงอยากจะปิดละมั้ง?"
1101-10 = "ค่ะ นั่นแหละค่ะ ฉันเองก็รู้สึกไม่ค่อยสบายใจสักเท่าไรเวลาที่เห็นร้านอาหารที่ไม่อร่อย"
1101-11 = "...ช่างเถอะ ไม่ต้องอธิบายหรอก อธิบายไปฉันเข้าไม่ถึงอยู่ดี"
1101-12 = "ว่าแต่ไม่เห็นอิซุมิตั้งแต่เมื่อกี้นี้แล้วนะ เธอไม่ได้ตามมาเหรอ?"
1101-13 = "เมื่อกี้นี้คุณอิซุมิยังอยู่ข้างหลังเลยนี่คะ บางทีอาจถูกฮินะจังจับไปแล้วก็ได้นะคะ"
1101-14 = "หา?! อะไรนะ?!! ถ้างั้นก็เรื่องใหญ่แล้วน่ะสิ!! ทำไมถึงเพิ่งจะมาบอกกันล่ะ?!"
1101-15 = "ไม่ต้องตกใจหรอกค่ะ ตอนที่คุณอิซุมิกำลังจะถูกจับไปได้ตะโกนบางอย่างออกมาด้วย#nเป็นเสียงตะโกนที่มุ่งมั่น เตรียมใจโดนลงโทษสุดๆ เลยละค่ะ"
1101-16 = "ตะ... เตรียมใจเหรอ? หรือว่า... เพื่อพวกเราแล้วอิซุมิ..."
1101-17 = "...แบบนี้นี่เอง ฉันจะไม่ลืมการเสียสละของเธอเลยค่ะ คำพูดสุดท้ายของอิซุมิคืออะไรเหรอคะ?"
1101-20 = "มะ...ไม่นะ! รอเดี๋ยวสิ!! พวกคนใจร้าย!! รอฉันด้วยสิ! "
1101-21 = "(ลื่น) ว้ายยย?!"
1101-23 = "(โครมมมม!!)"
1101-24 = "อย่าปล่อยฉันไว้แบบนี้น้าาาาา! อ๊ายยย! แบบนี้ต้องเอาคืน!#nต่อให้ตายก็จะต้องเอาคืนให้ได้ คอยดูสิ!!\n"
1101-26 = "อะไรประมาณนี้น่ะค่ะ..."
1101-27 = "......"
1101-28 = "......"
1101-29 = "ฮุฮุฮุ~☆"
1101-32 = "เอ๋?... อะไรน่ะ? ได้กลิ่นหอมๆ มาจากไหนสักด้วย"
1101-34 = "ในสวนสาธารณะแบบนี้น่ะเหรอคะ?"
1101-35 = "เหมือนได้กลิ่นอาหารที่หอมเป็นพิเศษๆ... (ฟุดฟิด...) ทางนี้!"
1101-37 = "(ฟิ้วววว~)"
1101-39 = "(คุ้ยๆ คุ้ยๆ)"
1101-40 = "(พรึ่บ) เจอแล้วละ! กลิ่นหอมมาจากเจ้าเห็ดนี้นี่เอง!"
1101-41 = "ตายจริง นี่มัน..."
1101-42 = "เห็ดทรัฟเฟิล...! นี่มันเห็ดทรัฟเฟิลนี่คะ!"
1101-43 = "เห็ดทรัฟเฟิลเหรอ?"
1101-44 = "เห็ดหายากราคาแพงหรือรู้จักกันในอีกชื่อหนึ่งว่า เพชรสีดำ...!"
1101-46 = "ถ้าพูดถึงระดับความหายากละก็ หายากกว่าปลาทูน่าคินมากุโระอีกนะคะ!"
1101-47 = "เอ๋~? จริงเหรอ? "
1101-48 = "กลิ่นหอมโดดเด่นนี่เป็นเอกลักษณ์เฉพาะตัวของเห็ดชนิดนี้เลยค่ะ "
1101-49 = "โชคดีจังเลยค่ะที่ได้ดมกลิ่นมันแบบนี้"
1101-50 = "ฉันก็เคยได้ยินมาเหมือนกันนะคะ ได้ยินว่าเป็นวัตถุดิบที่หายากมากจนต้องใช้หมูที่ฝึกประสาท#nรับกลิ่นมาอย่างดีเพื่อตามหามันเลยค่ะ"
1101-51 = "แสดงว่าคุณจุนโกะเองก็เก่งมากเลยนะคะเนี่ย"
1101-52 = "อย่าพูดแบบนั้นเวลาชมสิ อยากโดนฝังรึไง? ฝังไว้ที่นี่แทนเห็ดทรัฟเฟิลซะเลยดีมั้ย?"
1101-54 = "ไม่ใช่เวลาจะมัวมาทำอะไรแบบนี้นะคะ ช่วงเวลา 5 นาทีหลังจากตัดเห็ดทรัฟเฟิลคือช่วงเวลา#nที่สำคัญที่สุด เป็นหัวใจหลักเพื่อรักษาความสดใหม่ของเห็ด..."
1101-55 = "ฉันอยากได้ผ้าที่สะอาดๆ ค่ะ"
1101-56 = "เดี๋ยวสิ... เราวิ่งหนีกันมาบนถนนแบบนี้ จะไปหาผ้าสะอาดๆ มาจากไหนล่ะ ทุกคนก็ตัวเปื้อน#nกันหมดแล้ว"
1101-57 = "อันนี้ใช้ได้รึเปล่าคะ?"
1101-58 = "นี่มันอะไรเนี่ย!! นี่มันชั้นในไม่ใช่รึไง!!!"
1101-59 = "ของใหม่ที่ยังไม่ได้แกะใช้เลยนะคะ แถมยังเป็นผ้าไหมคุณภาพสูง 100% อาจจะรู้สึกไม่ถูกใจ#nที่มันเป็นชุดชั้นใน แต่โดยรวมแล้วมันก็ใช้ได้เหมือนผ้าเช็ดหน้าทั่วไปเหมือนกันนะคะ"
1101-60 = "เดี๋ยวสิ ถึงเราจำเป็นต้องใช้ผ้าสะอาดก็เถอะ... แต่แบบนี้จะไม่เป็นไรจริงๆ เหรอ ประธาน?"
1101-61 = "ไม่มีปัญหาค่ะ กลายเป็นว่าโชคดีซะมากกว่าอีกค่ะ นึกไม่ถึงเลยว่าโรครักความสะอาดของ#nคุณอาคาริจะมีประโยชน์ในเวลาแบบนี้..."
1101-62 = "(ฟึ่บ)"
1101-63 = "เอาละ เรียบร้อยแล้วค่ะ ต่อไปก็แค่เอาเห็ดทรัฟเฟิลนี่ไปทำอาหาร...!!"
1101-64 = "......"
1101-65 = "ไม่สิ ก่อนอื่น... ต้องรีบไปช่วยคุณอิซุมิออกมาก่อน เวลารับประทานอาหารที่เลิศหรูแบบนี้#nเราจะขาดสมาชิกคนใดคนหนึ่งไปไม่ได้นะคะ"
1101-66 = "ใช่แล้ว! ต้องอย่างนี้สิ! ตอนนี้ก็กลับไปถล่มพวกคณะกรรมการวินัยให้ราบคาบ แล้วช่วยอิซุมิ!#nออกมากันเถอะ!"
1101-67 = "ความรักและความรุนแรง☆ นี่มิตรภาพของเหล่าเด็กสาวยังไงล่ะคะ!"
1101-70 = "ใครจะถล่มใครให้ราบคาบมิทราบ?"
1101-71 = "อะ... เอ๋?!?! คณะกรรมการวินัย?!! มาตอนไหนเนี่ย?!"
1101-75 = "(ฟิ้วววว)"
1101-77 = "ตายจริง... ถูกล้อมซะแล้วเหรอคะเนี่ย"
1101-78 = "เฮ้อ... เลิกหนีกันได้แล้ว มันน่ารำคาญนะ เอาละ พวกเธอ... สลบกันไปซะ"
1101-79 = "(เฮือก?!!)"
1101-81 = "ไม่สิ... ถ้าถึงขั้นสลบคงน่ารำคาญแย่ แค่ยิงสั่งสอนให้เข็ดหลาบก็พอ"
1101-83 = "(พยักหน้า)"
1101-84 = "ทุกคนอย่าคิดต่อต้านเลยนะคะ..."
1101-87 = "(ปังๆๆๆๆๆๆ!!)"
1101-89 = "(หลังจากนั้นทุกคนก็ถูกรวบตัวตามๆ กันไป)"

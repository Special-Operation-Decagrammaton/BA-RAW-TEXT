[translation]
10051070-1 = "ตอนที่ 7;ช่องว่างที่ไม่คุ้นเคย"
10051070-2 = "สถานที่ถ่ายทำ <วิถีนินจาสาว มิจิรุจจี้>"
10051070-3 = "อะฮะฮ่า~ ฉันเองค่ะ"
10051070-4 = "ทั้งกล้องทั้งชุดเดรส... น่าดีใจจังเลยนะคะที่ใช้ของที่ชมรมหยินหยางให้ยืมอย่างคุ้มค่าแบบนี้"
10051070-8 = "ท่านนิยะ...!"
10051070-9 = "มารับชุดเดรสจากพวกเราคืนงั้นเหรอคะ?!"
10051070-10 = "อะฮะฮ่า เปล่าหรอกค่ะ อยากคืนตอนไหนค่อยเอามาคืนก็ได้ค่ะ"
10051070-11 = "ถ้างั้นก็มาเป็นแขกรับเชิญของการถ่ายทำ?!"
10051070-12 = "ยินดีต้อนรับค่ะ ท่านนิยะ! เส้นทางของนินจาเปิดกว้างเสมอค่ะ! นินนิน!"
10051070-13 = "เปล่าค่ะ ฉันไม่ได้มาด้วยเหตุผลนั้นเหมือนกัน..."
10051070-15 = "ถ้างั้นหัวหน้าชมรมหยินหยางมาทำอะไรที่นี่น่ะ?"
10051070-16 = "อืม จะบอกว่าบังเอิญเจอขณะกำลังเดินผ่านดีมั้ยนะ..."
10051070-17 = "จะว่าไป คุณสึคุโยะไม่อยู่ที่นี่ตามคาดเลยนะคะ"
10051070-18 = "อื้อ น่าแปลกที่ติดต่อไม่ได้ ปกติก็ไม่เคยมาสายแบบนี้ด้วย..."
10051070-22 = "เดี๋ยวก่อน เมื่อกี้เธอว่าอะไรนะ? ตามคาดงั้นเหรอ? หมายความว่ายังไงน่ะ?"
10051070-24 = "อ้อ พอดีฉันได้ยินมาว่าคุณสึคุโยะเลิกทำกิจกรรมของชมรมวิจัยศาสตร์นินจาแล้วน่ะค่ะ"
10051070-29 = "ว่าไงนะ?!"
10051070-30 = "พะ... พูดเรื่องอะไรของเธอน่ะ?!"
10051070-31 = "ยังไม่รู้กันสินะคะ"
10051070-32 = "อันที่จริงฉันก็พอเดาไว้แล้ว เพราะทุกคนดูจะไม่สนใจอะไรอื่นเลยนอกจากเรื่องนินจา..."
10051070-33 = "เดี๋ยวนะ เดี๋ยวก่อน สึคุโยะออกจากชมรมวิจัยศาสตร์นินจางั้นเหรอ? หมายความว่ายังไงน่ะ?!"
10051070-34 = "ข้าน้อยเป็นหัวหน้าชมรมนะ ทำไมเธอถึงมาพูดเรื่องในชมรมที่ข้าน้อยไม่รู้ล่ะ?!"
10051070-35 = "คุณมิจิรุ ได้อ่าน <ron-ro> หรือ <Heart Girls> บ้างหรือเปล่าล่ะคะ?"
10051070-36 = "มันคืออะไรเหรอ?"
10051070-37 = "ถ้าไม่รู้จักสองเล่มนี้ งั้น <BiBi> ก็น่าจะยิ่งไม่รู้จักเข้าไปใหญ่... แล้วคุณเล่นโซเชียลมีเดียอะไรบ้างมั้ยคะ?"
10051070-38 = "ข้าน้อยก็ทำช่อง <วิถีนินจาสาว มิจิรุจจี้> อยู่นี่ไง"
10051070-39 = "อืม ไม่เล่นโซเชียลมีเดียต่างหากสินะ ถ้างั้นก็คงยังไม่เห็น 'รายการ' นั้นด้วยสินะคะ"
10051070-40 = "รายการนั้นเหรอ? รายการอะไร?"
10051070-41 = "อืม... ฉันว่ามาดูเองน่าจะเข้าใจไวกว่าค่ะ นี่คือคลิปจากรายการที่อัปโหลดไว้ในช่องโครโนสค่ะ"
10051070-47 = "เอาละค่ะ งั้นก็คำถามสุดท้าย! ช่วยบอกแผนการในอนาคตของคุณสึคุโยะในหนึ่งประโยคได้มั้ยคะ?"
10051070-48 = "เอ่อ... ตะ... ต่อไปฉันจะพยายามอย่างเต็มที่เพื่อเป็นสุดยอดนางแบบแฟชั่นค่ะ!"
10051070-49 = "ค่ะ! ขอให้เส้นทางนางแบบในอนาคตของคุณสึคุโยะมีแต่ความสุขสดใสนะคะ..."
10051070-54 = "อ่า..."
10051070-55 = "อะ... อ่า..."
10051070-56 = "สึคุโยะ? นี่มันอะไรกันน่ะ? จะเป็นนางแบบงั้นเหรอ? หมายความว่าต่อไปจะเอาดีทางด้านนางแบบ... แค่อย่างเดียวเลยเหรอ? "
10051070-57 = "หัวหน้า..."
10051070-58 = "..."
10051070-59 = "แต่... ทำไมล่ะ? ไม่สิ คิดจะทำแบบนั้นตั้งแต่เมื่อไรกัน...?"
10051070-60 = "คุณสึคุโยะได้เดินแบบเป็นนางแบบสำรองในงานแฟชั่นโชว์ครั้งที่แล้วใช่มั้ยล่ะคะ?"
10051070-61 = "เห็นว่าได้รับกระแสตอบรับอย่างมากจากนักวิจารณ์ด้านแฟชั่นและผู้คนในวงการนางแบบเลยค่ะ"
10051070-62 = "หลังจากจบงาน ทางไชน์แคทเอเจนซี่ก็เลยไปทาบทามคุณสึคุโยะทันทีเลย นี่คือที่ฉันรู้มาค่ะ"
10051070-63 = "จะว่าไป คุณมิจิรุยังไม่รู้จริงๆ ด้วยสินะคะ..."
10051070-64 = "..."
10051070-65 = "ข้าน้อย... ไม่เห็นรู้เรื่องเลย"
10051070-66 = "งั้นสินะคะ... งั้นวันนี้คงยังไม่เหมาะที่จะคุยเรื่องนี้ต่อแล้วค่ะ"
10051070-67 = "ถ้างั้นฉันขอตัวกลับก่อนนะคะ"
10051070-71 = "หัวหน้า... สึคุโยะจะ..."
10051070-72 = "อิซุนะ จำสึคุโยะตอนที่ยืนอยู่บนรันเวย์ได้หรือเปล่า?"
10051070-73 = "จำได้สิคะ..."
10051070-74 = "คิดว่าเป็นยังไงบ้าง?"
10051070-75 = "ฉันคิดว่าสวยมากเลยค่ะ..."
10051070-76 = "แล้วก็?"
10051070-77 = "แล้วก็... เอ่อ..."
10051070-78 = "ไม่คิดเหรอว่าพวกเราเหมือนอยู่คนละโลกกันเลย?"
10051070-79 = "...!"
10051070-80 = "เราสองคนเงยหน้ามองรันเวย์จากมุมหนึ่งที่มืดมิดที่สุด..."
10051070-81 = "ส่วนสึคุโยะก็ยืนอยู่ในจุดที่เปล่งประกายมากที่สุดบนรันเวย์นั่น"
10051070-82 = "แต่ว่า... นินจาเป็นคนที่มีจิตใจสดใส แม้จะอยู่ในที่ที่มืดมิดที่สุดไม่ใช่เหรอคะหัวหน้า?"
10051070-83 = "ใช่แล้วละ แต่ว่า.. ไม่สิ เพราะแบบนั้นมากกว่า สึคุโยะก็เลย..."
10051070-87 = "อ้อ จริงด้วย ฉันเกือบลืมไปเรื่องหนึ่งค่ะ"
10051070-88 = "เฮือก!"
10051070-89 = "ยังไม่ไปอีกเหรอ?!"
10051070-90 = "ค่ะ พอมาคิดดูแล้ว ฉันยังไม่ได้บอกเหตุผลจริงๆ ที่แวะมาที่นี่วันนี้เลยค่ะ อะฮะฮ่า"
10051070-91 = "เหตุผลจริงๆ? ไหนว่าบังเอิญเดินมาเจอไม่ใช่เหรอ?!"
10051070-92 = "ฮุฮุ เป็นความบังเอิญแบบเจตนาน่ะค่ะ "
10051070-93 = "ตอบแบบนี้มันย้อนแย้งนะ...!"
10051070-94 = "ถ้ามีเจตนาอื่นแฝงอยู่ มันก็ไม่ใช่ความบังเอิญแล้วสิ!!"
10051070-95 = "ฮุฮุ ฉันก็พูดเอาภาพลักษณ์ดีๆ ไว้ก่อนน่ะค่ะ"
10051070-96 = "เอาเถอะค่ะ เอาเป็นว่าฉันพอจะเดาได้ว่าวันนี้คุณสึคุโยะคงไม่มาร่วมในการถ่ายทำแล้ว..."
10051070-97 = "ฉันก็เลยไปติดต่อผู้ช่วยตากล้องมาทำหน้าที่แทนคุณสึคุโยะไว้ให้ยังไงล่ะคะ!"
10051070-99 = "ผู้ช่วยตากล้อง...?!"
10051070-100 = "นี่ นิยะ ข้าน้อยก็ซาบซึ้งอยู่หรอกนะที่วันนี้ดูมีน้ำใจอย่างที่ไม่เคยเป็นมาก่อน..."
10051070-101 = "แต่ว่า ตำแหน่งของสึคุโยะคงให้ใครมาแทนที่ไม่ได้..."
10051070-107 = "[ns] \"สวัสดี วันนี้ครูมาเป็นผู้ช่วยตากล้องชั่วคราวให้เอง\""
10051070-108 = "ว้ากกกก!!"
10051070-109 = "นายท่าน!"
10051070-110 = "อะไรน่ะ?! จู่ๆ โผล่มาแบบนี้ ข้าน้อยก็ตกใจน่ะสิ?!"
10051070-111 = "[s1] \"อื้ม มันคือการซุ่มโจมตีอย่างหนึ่งน่ะ\"\n[s2] \"ก่อนทักทาย อนุญาตให้ซุ่มโจมตีได้หนึ่งครั้งไม่ใช่เหรอ?\""
10051070-114 = "สมกับที่เป็นท่านอาจารย์เลย! จำบทเรียนจากข้าน้อยได้ด้วย..."
10051070-115 = "แต่นั่นไม่ใช่เรื่องสำคัญในตอนนี้หรอก! นิยะ เธอติดต่อให้ท่านอาจารย์มาเป็นผู้ช่วยตากล้องงั้นเหรอ?! ได้ไงกัน?!"
10051070-116 = "อะฮะฮ่า ไม่ต้องสนใจเรื่องเล็กน้อยหรอกค่ะ"
10051070-117 = "ในเมื่อฉันพูดธุระไปหมดแล้ว งั้นฉันต้องขอตัวกลับจริงๆ แล้วค่ะ~"
10051070-121 = "ว้าว! นายท่าน! ยินดีที่ได้เจอค่ะ!"
10051070-122 = "พอได้เจอกันโดยไม่คาดคิด ก็ยิ่งน่าดีใจกว่าเดิมนะคะ! นินนิน!"
10051070-123 = "ไม่อยากเชื่อเลยว่านิยะจะไปติดต่อท่านอาจารย์มา..."
10051070-124 = "นี่เป็นเรื่องที่คาดไม่ถึงจริงๆ เลยนะ..."
10051070-125 = "ถ้างั้นก็... เอ่อ... เราเริ่มถ่ายทำกันเลยดีมั้ยนะ..."
10051070-126 = "หืม? จะถ่ายทำโดยไม่มีสึคุโยะได้หรือเปล่าน่ะเหรอ?"
10051070-127 = "ที่จริงข้าน้อยก็ไม่อยากให้เป็นแบบนี้หรอก... แต่สึคุโยะทั้งไม่รับโทรศัพท์ ทั้งไม่อ่าน MOMOTALK แล้วก็ไม่รู้ด้วยว่าไปอยู่ที่ไหน..."
10051070-128 = "[s3] \"แต่ครูมีวิธีติดต่อสึคุโยะอยู่นะ...\"\n[s4] \"แต่ครูพอรู้วิธีติดต่อสึคุโยะอยู่นะ...\""
10051070-131 = "ว่าไงนะ?!"
10051070-132 = "พูดจริงเหรอคะ นายท่าน?!"
10051070-133 = "จะติดต่อสึคุโยะยังไงเหรอ?!"
10051070-134 = "[s] \"ครูได้เบอร์ของผู้จัดการไชน์แคทมาจากนิยะน่ะ\""
10051070-135 = "...!"
10051070-136 = "หัวหน้า! งั้นเราโทรไปเลยค่ะ!"
10051070-137 = "ต้องโทรอยู่แล้ว!"
10051070-138 = "แต่ก่อนหน้านั้น ข้าน้อยขอ... ฮู่วว... ฮ่าา..."
10051070-139 = "[s] \"ถึงกับต้องหายใจลึกๆ เลยเหรอ?\""
10051070-140 = "ก็การคุยกับคนแปลกหน้าเป็นเรื่องน่ากลัว... ไม่สิ เป็นเรื่องที่เราต้องรอบคอบนี่นา!"
10051070-141 = "เอาละ ถ้างั้นก็... กดโทรหาเบอร์ที่ท่านอาจารย์ให้มา... ฮู่วว..."
10051070-147 = "ตู๊ดดด... ตู๊ดดด..."
10051070-148 = "แกรก"
10051070-151 = "ฮัลโหล สวัสดีครับ"
10051070-152 = "ฮะ... ฮัลโหล!"
10051070-153 = "ครับ? ติดต่อมาจากไหนครับ?"
10051070-154 = "อะ... อะแฮ่ม! ไม่ทราบว่า! นินจา... ไม่สิ นางแบบที่ชื่อสึคุโยะอยู่ที่นั่นหรือเปล่าคะ?"
10051070-155 = "คุณสึคุโยะเหรอครับ?"
10051070-159 = "เฮ้อ... นักข่าวโทรมาอีกแล้ว..."
10051070-160 = "นี่คุณครับ พวกเราทั้งไปให้สัมภาษณ์และให้ข่าวไปเยอะแล้วนี่ครับ"
10051070-161 = "ตอนนี้พวกเรายุ่งกันมาก ขอวางสายเท่านี้นะครับ"
10051070-162 = "ไม่สิ ไม่ เดี๋ยวก่อน! พวกเราไม่ใช่นักข่าวนะ!!"
10051070-163 = "ข้าน้อยคือจิโดริ มิจิรุ! เป็นเพื่อนของสึคุโยะต่างหากล่ะ!"
10051070-164 = "อ้อ... คุณคือคุณมิจิรุเหรอครับ?"
10051070-165 = "เอ๋? รู้จักข้าน้อยด้วยเหรอ?"
10051070-167 = "หรือว่ากดติดตามช่อง <วิถีนินจาสาว มิจิรุจจี้> ไว้...?!"
10051070-168 = "วิถี... อะไรนะครับ?"
10051070-169 = "ผมไม่รู้จักอะไรแบบนั้นหรอกครับ ที่ผมรู้ชื่อของคุณ ก็เพราะคุณสึคุโยะเคยพูดไว้น่ะครับ"
10051070-170 = "สรุปว่าคุณโทรมา มีธุระอะไรครับ?"
10051070-171 = "จะ... จริงสิ ธุระ! พวกคุณทำอะไรกับสึคุโยะน่ะ!"
10051070-172 = "ครับ?"
10051070-173 = "ก็สึคุโยะทั้งไม่รับโทรศัพท์! แล้วก็ไม่เปิด MOMOTALK อ่านเลยด้วย!"
10051070-174 = "อะไรกัน โทรมาด้วยเรื่องแค่นี้เหรอ..."
10051070-175 = "เรื่องแค่นี้...?"
10051070-176 = "การไม่ติดต่อใครเพื่อจะได้โฟกัสกับงานคือเรื่องปกติในการทำงานของมืออาชีพอยู่แล้วครับ"
10051070-177 = "แล้วกรณีของคุณสึคุโยะ ทางเราก็ยึดโทรศัพท์ของเธอไว้ด้วย"
10051070-178 = "ยึดไปเลยเหรอ?!"
10051070-179 = "ที่สำคัญเลย ตอนนี้พวกคุณรู้หรือเปล่าครับว่าคุณสึคุโยะกำลังทุ่มเทกับการถ่ายแบบมากแค่ไหน?"
10051070-180 = "สึคุโยะน่ะเหรอ...?"
10051070-181 = "ใช่ครับ งั้นผมขอวางสายแค่นี้นะครับ"
10051070-182 = "เดี๋ยวก่อน! ขอข้าน้อยคุยสายกับสึคุโยะหน่อย...!"
10051070-183 = "ไม่ต้องเป็นห่วงคุณสึคุโยะหรอกครับ ไว้รอชมคุณสึคุโยะจากวิดีโอที่จะอัปโหลดในช่องของพวกเรา#nเย็นวันนี้แล้วกันครับ"
10051070-184 = "แค่นี้นะครับ"
10051070-189 = "หะ... หัวหน้า..."
10051070-190 = "..."
10051070-194 = "ก็ได้ งั้นเราก็เลิกพูดเรื่องนี้กันเถอะ"
10051070-195 = "หัวหน้า?!"
10051070-196 = "ทางนั้นบอกว่าจะอัปโหลดวิดีโอถ่ายแบบของสึคุโยะวันนี้นะ งั้นพวกเราก็ยอมแพ้ไม่ได้สิ!"
10051070-197 = "ต่อให้ไม่มีสึคุโยะ... เราก็ต้องทำเท่าที่ทำได้ในตอนนี้!"

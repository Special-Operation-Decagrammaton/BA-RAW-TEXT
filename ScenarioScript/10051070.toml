[translation]
10051070-1 = "Episode 7;An Unfamiliar Void"
10051070-2 = "Set of \"Michiruchi, A Girl's Ninja Scroll\""
10051070-3 = "Nyahaha, yes, it's me."
10051070-4 = "From the camera to the formalwear... It warms my heart to see you make good use of what the Yin-Yang Club lent you."
10051070-8 = "Niya...!"
10051070-9 = "Are you here to take the dresses back?!"
10051070-10 = "Nyahaha, no. Feel free to turn them in when you want...and when you have a spare set of clothes."
10051070-11 = "Then could it be that you're here to learn?"
10051070-12 = "Welcome, Niya! The path of ninja is always open to you! Nin nin!"
10051070-13 = "No, I'm not here for that either..."
10051070-15 = "Then, what brings the Yin-Yang Club's President here?"
10051070-16 = "Well, let's say I was just passing by..."
10051070-17 = "But enough about me. I can't help but notice that Tsukuyo isn't here. As I expected."
10051070-18 = "Yeah. It's hard to get hold of her, and she's running a little late..."
10051070-22 = "But wait, hold on. As you \"expected\"? What do you mean?"
10051070-24 = "Ah, I heard that Tsukuyo is quitting the Ninjutsu Research Club."
10051070-29 = "What?!"
10051070-30 = "Wh-What did you say?!"
10051070-31 = "So you haven't heard. How awkward."
10051070-32 = "Well, I thought this might happen. After all, the only thing you two seem interested in is...ninjas..."
10051070-33 = "Wait, wait, wait. Tsukuyo is quitting the Ninjutsu Research Club? Where'd you get that idea?"
10051070-34 = "I'm the president. She'd tell me if she was going to—"
10051070-35 = "Michiru, do you by any remote chance read \"Ron-ro\" or \"Heart Girls\"?"
10051070-36 = "What are those? Manga?"
10051070-37 = "Then you probably don't know \"BiBi\" either... How about social media? Do you keep up-to-date on things?"
10051070-38 = "Social media? Um...I run a channel. We...sometimes get a...comment."
10051070-39 = "Hmm, right, right. Then you must've missed THAT live stream."
10051070-40 = "Live stream? What stream?"
10051070-41 = "Mmm... It'd be faster to just show you. It's on the Kronos Channel, if you're familiar."
10051070-47 = "And one final question. The world must know! Rapid-fire, one sentence! Tell us your future plans."
10051070-48 = "I-I will continue striving to be a g-great fashion model...?"
10051070-49 = "And all of us at Kronos wish nothing but success for Tsukuyo's modeling career!"
10051070-54 = "Uh..."
10051070-55 = "Um... Uh..."
10051070-56 = "Tsukuyo? What is she saying? Model? Is she saying she'll continue to...work as a model?"
10051070-57 = "President..."
10051070-58 = "..."
10051070-59 = "Uh... Why? No, since when...?"
10051070-60 = "I heard that Tsukuyo walked the runway during the fashion show."
10051070-61 = "Though she was a last-minute replacement, she's caused a big stir among fashion critics and industry insiders."
10051070-62 = "Shinecat's agency scouted Tsukuyo right after."
10051070-63 = "...You REALLY didn't know, Michiru?"
10051070-64 = "..."
10051070-65 = "I...really didn't know."
10051070-66 = "...I see. It seems that's enough conversation for one day."
10051070-67 = "Excuse me, if you'd please."
10051070-71 = "President... Tsukuyo is..."
10051070-72 = "Izuna, do you remember how Tsukuyo looked while up on the stage?"
10051070-73 = "...Yes."
10051070-74 = "What did you think?"
10051070-75 = "...She looked beautiful."
10051070-76 = "And?"
10051070-77 = "And... Uh..."
10051070-78 = "It felt like she was in a different world, and that she belonged there."
10051070-79 = "...!"
10051070-80 = "We were looking up from below the stage, in the darkest corner..."
10051070-81 = "...and Tsukuyo was standing up high, on the brightest part of the runway."
10051070-82 = "But, President... Doesn't a ninja's heart shine brightest in the darkest of places?"
10051070-83 = "Right, but... No, maybe that's why Tsukuyo decided to..."
10051070-87 = "Oh, right. One more thing, ladies."
10051070-88 = "Eek!"
10051070-89 = "You're still around?!"
10051070-90 = "I am. I realized that I never told you the REAL reason I was out here, nyahaha."
10051070-91 = "Reason? It wasn't a random coincidence?"
10051070-92 = "Fufu, it was an INTENDED coincidence. "
10051070-93 = "You're not making sense...!"
10051070-94 = "If a coincidence is intended, then it's not a coincidence anymore!"
10051070-95 = "Fufu, it's called \"diplomatic rhetoric.\" Look it up."
10051070-96 = "Anyways, since it's pretty clear that Tsukuyo won't be able to make the shoot..."
10051070-97 = "I brought a special filming assistant to pick up the slack!"
10051070-99 = "\"Filming assistant\"...?!"
10051070-100 = "Um, Niya, while I'm sincerely thankful for your unusual and suspicious kindness..."
10051070-101 = "Tsukuyo cannot simply be replaced—"
10051070-107 = "[ns] \"Hello. I'll be helping out today.\""
10051070-108 = "Aaaaaak!!!"
10051070-109 = "My lord!"
10051070-110 = "What the?! You can't just run behind me! What was that?!"
10051070-111 = "[s1] \"It was sort of an ambush.\"\n[s2] \"Isn't one ambush permitted before a formal introduction?\""
10051070-114 = "As expected of Honorable Sensei! You remembered my lesson—"
10051070-115 = "Wait, no, that's not...! Niya, you recruited Sensei to act as a filming assistant for us? How?!"
10051070-116 = "Nyahaha, let's not fret over such small things."
10051070-117 = "And that covers the reason why I came here, so I'll take my leave. For real, this time."
10051070-121 = "Yay! My lord! It's nice to see you!"
10051070-122 = "Izuna's even happier because it was a surprise! Nin nin!"
10051070-123 = "So, we have Honorable Sensei working as a filming assistant..."
10051070-124 = "This was unexpected..."
10051070-125 = "Then... Um... I guess we can start recording..."
10051070-126 = "Hm? Is it okay to film without Tsukuyo?"
10051070-127 = "Of course it's not okay...but she's not talking to us, and we don't know where she is... But the show must go on, right?"
10051070-128 = "[s3] \"I don't know where Tsukuyo is either...\"\n[s4] \"But I do know how to contact her.\""
10051070-131 = "What?!"
10051070-132 = "Truly, my lord?!"
10051070-133 = "How? How can we reach her?"
10051070-134 = "[s] \"Niya gave me the number of Shinecat's manager.\""
10051070-135 = "...!"
10051070-136 = "President! Let's call right now!"
10051070-137 = "Of course!"
10051070-138 = "But before that... *inhale* *exhale*"
10051070-139 = "[s] \"You need a deep breath?\""
10051070-140 = "Calling a stranger is always scary... No, I mean, it's something that one must prepare for. Caution is paramount."
10051070-141 = "Now then... Let's dial the number and... Phew..."
10051070-147 = "*ring* *ring*"
10051070-148 = "*click*"
10051070-151 = "Hello."
10051070-152 = "Ah...hello! Hi there."
10051070-153 = "Got it. Who is this?"
10051070-154 = "R-Right! I called because I was looking for...! Uh... Is a ninja... no, a MODEL, named Tsukuyo with you right now?"
10051070-155 = "Tsukuyo?"
10051070-159 = "Eh, it's the press again..."
10051070-160 = "Look, we did the interviews and sent out the media assets."
10051070-161 = "We're very busy right now, so I'm hanging up."
10051070-162 = "No, no. Hold on! We're not the press! No one's ever even listened to us!"
10051070-163 = "You see, I'm Chidori Michiru! I'm Tsukuyo's friend!"
10051070-164 = "Ah... So you're Michiru?"
10051070-165 = "Eh? You know of me?"
10051070-167 = "Is it through \"Michiruchi, A Girl's Ninja Scroll\"...?! Have you subscribed? Because, you know, if you don't subscribe, the algorithm will—"
10051070-168 = "Ninja scroll...what?"
10051070-169 = "I have no idea what that is. I only know your name because Tsukuyo's talked about you."
10051070-170 = "Anyway, what did you call me for?"
10051070-171 = "R-Right! About that! What did you to do Tsukuyo?! Where are you holding her?!"
10051070-172 = "Excuse me?"
10051070-173 = "She's not picking up her phone or answering our messages!"
10051070-174 = "Oh, THAT'S what this is about?"
10051070-175 = "Yeah...?"
10051070-176 = "In this industry, it's common for talent to go no-contact so they can focus on work."
10051070-177 = "We enforced that by confiscating her phone."
10051070-178 = "Confiscating?!"
10051070-179 = "Look, Tsukuyo is in a photoshoot right now. She's working very hard. Maybe you should respect her work."
10051070-180 = "Tsukuyo is in a...what?!"
10051070-181 = "I said what I said. Conversation over. I'm hanging up."
10051070-182 = "Hold on! Just let me talk to her for a minute...!"
10051070-183 = "Tsukuyo's fine. You can see her tonight...in a video of the photoshoot. We'll upload it to our channel."
10051070-184 = "Like and subscribe."
10051070-189 = "P-President..."
10051070-190 = "..."
10051070-194 = "Okay, this pity party is over!"
10051070-195 = "President?!"
10051070-196 = "Tsukuyo's uploading a video too! It's debuting tonight, and we will NOT lose to her!"
10051070-197 = "Even if we don't have Tsukuyo behind the camera... Let's make it work!"
10051070-198 = "After all, we have Honorable Sensei helping us, and it'd be a shame to waste their talent. Right?"
10051070-199 = "[s] \"Right!\""
10051070-200 = "Okay, let's finish setting up the shot, Izuna!"
10051070-201 = "Y-Yes, President!"
10051070-205 = "In today's episode of \"Michiruchi, A Girl's Ninja Scroll,\" we're going to talk about... How a ninja executes a proper infiltration. The art of being undercover!"
10051070-206 = "Where do you hide your weapons, especially in a cute little outfit like this? What skills do you deploy in a banquet setting?"
10051070-207 = "We'll cover them all! Michiruchi will..."
10051070-208 = "Michiru...will..."
10051070-209 = "..."
10051070-210 = "[s] \"Michiru, are you okay?\""
10051070-211 = "President, perhaps we should delay the filming and instead..."
10051070-215 = "*exhale*"
10051070-216 = "No, we're going on...with the shoot...!"

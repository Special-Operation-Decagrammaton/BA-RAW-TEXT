[translation]
10051070-1 = "第7話;陌生的空白"
10051070-2 = "「少女忍法帖小小三千留」拍攝現場"
10051070-3 = "喵哈哈～沒錯，就是我哦。"
10051070-4 = "從攝影機到服裝……看到你們把陰陽部借出的東西運用得這麼好，真是令人欣慰呢。"
10051070-8 = "仁耶閣下！"
10051070-9 = "你該不會是來回收我們的禮服的吧！？"
10051070-10 = "喵哈哈，不是不是。#n禮服等你們方便的時候再還就行了。"
10051070-11 = "那麼……難道是來客串演出的嗎！？"
10051070-12 = "歡迎，仁耶閣下！#n忍者之道隨時為你敞開唷！忍忍！"
10051070-13 = "不，也不是因為那個原因……"
10051070-15 = "那陰陽部的部長來這裡到底有什麼事啊？"
10051070-16 = "這個嘛，你就當作是我偶然路過吧……"
10051070-17 = "話說，月夜同學果然沒有過來呢。"
10051070-18 = "嗯，而且還完全聯絡不上。#n今天都已經這麼晚了還沒到……"
10051070-22 = "不對，先等一下。#n你剛才說「果然」是什麼意思？"
10051070-24 = "啊啊，因為我聽說月夜同學已經退出忍術研究部的活動了。"
10051070-29 = "咦咦！？"
10051070-30 = "你，你在說什麼啊！？"
10051070-31 = "原來你們不知道啊。"
10051070-32 = "不過這也難怪，畢竟你們對忍者以外的事情完全沒興趣嘛……"
10051070-33 = "不不不，月夜退出了忍術研究部……？#n那是什麼意思！？"
10051070-34 = "我明明是部長，為什麼會有連我都不知道的消息啊！？"
10051070-35 = "三千留同學，你有在看《ron-ro》或《Heart Girls》嗎？"
10051070-36 = "那是什麼？"
10051070-37 = "看來《BiBi》就更不用說了呢……#n那麼，請問你有在使用社群網站嗎？"
10051070-38 = "我有在經營「少女忍法帖小小三千留」頻道。"
10051070-39 = "也沒有使用社群網站啊……#n既然如此，你想必沒有看過「那個節目」吧。"
10051070-40 = "節目……？什麼節目？"
10051070-41 = "唔嗯……直接給你們看比較快吧。#n這是克洛盧斯頻道上傳的錄影片段。"
10051070-47 = "那麼接下來是最後一個問題！#n請用一句話說明月夜同學今後的計畫吧！"
10051070-48 = "那個，我，我今後會，會為了成為出色的時尚模特兒，全力以赴的……？"
10051070-49 = "那麼，在此祝福月夜同學未來的模特兒生涯前程似──"
10051070-54 = "咦……"
10051070-55 = "這……這是……"
10051070-56 = "月夜要……成為模特兒？#n意思是他之後……會一直從事模特兒的活動嗎？"
10051070-57 = "部長……"
10051070-58 = "……"
10051070-59 = "那是……為什麼？#n不對，應該說是從什麼時候開始的……？"
10051070-60 = "我聽說在上次時裝秀時，月夜同學以替補模特兒的身分登上了伸展台。"
10051070-61 = "並且當時在時尚評論家和業界人士之間，引起了相當大的迴響。"
10051070-62 = "我想Shine Cat設計師的經紀公司，或許在那之後就開始跟月夜同學接洽了吧。"
10051070-63 = "……話說，原來你真的完全不知情啊，三千留同學。"
10051070-64 = "……"
10051070-65 = "我……真的不知道。"
10051070-66 = "……這樣啊，看來今天不適合再談下去了呢。"
10051070-67 = "那麼，我今天就先告辭了。"
10051070-71 = "部長……月夜閣下他……"
10051070-72 = "伊樹菜，你還記得月夜站在舞台上的樣子嗎？"
10051070-73 = "……當然記得。"
10051070-74 = "覺得怎麼樣？"
10051070-75 = "……覺得很美。"
10051070-76 = "然後呢？"
10051070-77 = "然後……嗚嗚嗚……"
10051070-78 = "是不是覺得，他簡直像是另一個世界的人一樣？"
10051070-79 = "……！"
10051070-80 = "我們在舞台下，從最陰暗的角落仰望……"
10051070-81 = "而月夜他，則是站在舞台上最高最亮的地方。"
10051070-82 = "可是部長……忍者本來不就是在最黑暗的地方，讓內心發出熾熱光芒的人嗎？"
10051070-83 = "沒錯，但是……不，可能就是因為這樣，月夜才會對我們……"
10051070-87 = "啊，對了對了，我忘了說一件事。"
10051070-88 = "唔喵啊啊！"
10051070-89 = "你還沒走嗎！？"
10051070-90 = "是啊。因為我突然發現，剛才完全沒提到今天來這裡的真正目的呢，喵哈哈。"
10051070-91 = "目的？你剛才不是說自己是偶然路過嗎！？"
10051070-92 = "呵呵，這就叫做刻意的偶然哦。 "
10051070-93 = "根本是前後矛盾……！"
10051070-94 = "既然是刻意的就稱不上偶然了吧！？"
10051070-95 = "呵呵，這就是所謂的外交辭令。"
10051070-96 = "總之，既然月夜同學今天無法參加拍攝已成定局……"
10051070-97 = "因此我親自找來了可以填補月夜同學空缺的拍攝助理！"
10051070-99 = "拍攝助理……！？"
10051070-100 = "那個，仁耶……#n雖然很感謝你那難得一見的細心……"
10051070-101 = "但是月夜的位置，是其他人很難代替──"
10051070-107 = "[ns]「大家好，我是今日限定的臨時拍攝助理。」"
10051070-108 = "唔喵啊啊！！"
10051070-109 = "主公！"
10051070-110 = "突然從後面冒出來，嚇我一大跳！"
10051070-111 = "[s1]「嗯，算是一種伏擊吧。」\n[s2]「不是說打招呼之前允許伏擊一次嗎？」"
10051070-114 = "真不愧是老師大人！把我的教導記得一清二楚……"
10051070-115 = "不對，那不是現在的重點！#n仁耶你居然找老師來當拍攝助理！？是怎麼做到的！？"
10051070-116 = "喵哈哈，那些小細節就別在意了。"
10051070-117 = "那麼，既然事情已經交代完畢，這次我就真的要告辭囉～"
10051070-121 = "哇！主公！歡迎大駕光臨！"
10051070-122 = "在意想不到的時刻相遇，感覺特別開心呢！忍忍！"
10051070-123 = "沒想到老師大人會突然參與拍攝……"
10051070-124 = "事情的發展真是完全出乎意料……"
10051070-125 = "那麼……可以開始拍攝了嗎……"
10051070-126 = "嗯？問我月夜不在也能拍嗎？"
10051070-127 = "當然是不行……只是他電話不接，MomoTalk也不回……#n甚至連人在哪裡都不知道，實在沒有其他辦法……"
10051070-128 = "[s3]「雖然我也不知道月夜人在哪裡……」\n[s4]「不過我知道聯絡他的方法。」"
10051070-131 = "什麼！？"
10051070-132 = "真的嗎，主公！？"
10051070-133 = "是什麼方法？怎麼樣才能聯絡到月夜！？"
10051070-134 = "[s]「我透過仁耶拿到了Shine Cat經紀人的聯絡方式。」"
10051070-135 = "……！"
10051070-136 = "部長！趕快打過去吧！"
10051070-137 = "當然！"
10051070-138 = "在那之前……嘶……呼……"
10051070-139 = "[s]「你在深呼吸嗎？」"
10051070-140 = "因為跟陌生人講電話是很可怕……不對，是需要很慎重的事！"
10051070-141 = "那麼……向老師大人給的號碼撥打電話……呼……"
10051070-147 = "（嘟嚕嚕嚕……）"
10051070-148 = "（喀啦）"
10051070-151 = "喂～你好。"
10051070-152 = "啊……你，你好。"
10051070-153 = "嗯？請問你哪裡找？"
10051070-154 = "那，那個！我想請問一下！#n有沒有一個叫月夜的忍者……啊不對，是模特兒在那裡呢？"
10051070-155 = "月夜同學是嗎？"
10051070-159 = "唉，又是記者啊……"
10051070-160 = "真是的，之前不是已經接受夠多採訪，也發過新聞稿了嗎？"
10051070-161 = "我們現在很忙，先掛了。"
10051070-162 = "不不不，先等一下！我們不是記者！！"
10051070-163 = "我是千鳥三千留！是月夜的朋友！"
10051070-164 = "啊……原來你就是三千留嗎？"
10051070-165 = "嗯？你知道我是誰嗎？"
10051070-167 = "難道你是「少女忍法帖小小三千留」的訂閱者……！？"
10051070-168 = "忍法……什麼？"
10051070-169 = "我沒聽過那種東西。#n之所以會知道你的名字，只是因為聽月夜同學提過而已。"
10051070-170 = "話說有什麼事嗎？"
10051070-171 = "有，有事有事！你們把月夜怎麼了！"
10051070-172 = "嗯？"
10051070-173 = "月夜他完全不接電話！而且也不看MomoTalk！"
10051070-174 = "不是，就為了這種小事……"
10051070-175 = "小事……？"
10051070-176 = "為了專心工作而切斷聯絡，這在專業領域是很常見的事。"
10051070-177 = "雖然這次是因為我們沒收了他的手機就是了。"
10051070-178 = "沒收！？"
10051070-179 = "況且，你知道月夜同學現在拍時尚照拍得有多認真嗎？"
10051070-180 = "月夜他……？"
10051070-181 = "是的。話就說到這邊，我要掛電話了。"
10051070-182 = "等等！讓我跟月夜說幾句話也好……！"
10051070-183 = "不用擔心月夜同學。#n今晚我們的頻道將會上傳月夜同學的時尚照拍攝影片。"
10051070-184 = "再見。"
10051070-189 = "部，部長……"
10051070-190 = "……"
10051070-194 = "好，牢騷就到此為止。"
10051070-195 = "部長！？"
10051070-196 = "他說今天會上傳月夜的影片對吧。#n那麼我們也不能輸！"
10051070-197 = "就算月夜不在……也先做我們能做的事吧！"
10051070-198 = "而且老師也會幫忙嘛！沒錯吧？"
10051070-199 = "[s]「那當然！」"
10051070-200 = "來，繼續佈置拍攝場地吧，伊樹菜！"
10051070-201 = "是，是的！部長！"
10051070-205 = "今天「少女忍法帖小小三千留」的主題是……潛入狀態下的忍法！"
10051070-206 = "要把什麼種類的暗器藏在哪裡，又該運用哪個流派的技術呢！"
10051070-207 = "關於這一切！今天小小三千留都會……"
10051070-208 = "三千留……都會……"
10051070-209 = "……"
10051070-210 = "[s]「三千留，你還好嗎？」"
10051070-211 = "部長，今天的拍攝果然還是延期比較……"
10051070-215 = "呼……"
10051070-216 = "不，拍攝……照常進行……！"

[translation]
41040-1 = "ตอนที่ 4;เหตุผลของฝ่ายความมั่นคง"
41040-2 = "ยินดีที่ได้พบกันนะคะ คุณครู"
41040-3 = "ฉันชิรานูอิ คายะ หัวหน้าสำนักป้องกันจากคณะกรรมการบริหารของทางองค์การนักเรียนค่ะ"
41040-4 = "[s1] \"คณะกรรมการบริหาร...?\"\n[s2] \"หัวหน้าสำนักป้องกัน...?\""
41040-5 = "ไม่เคยได้ยินเรื่องเกี่ยวกับพวกฉันอย่างนั้นเหรอคะ?"
41040-6 = "ไม่เคยได้ยินเรื่องเกี่ยวกับพวกฉันอย่างนั้นเหรอคะ?"
41040-7 = "หรือว่ารินยังไม่ได้อธิบายเกี่ยวกับคณะกรรมการบริหารให้ฟังคะ..."
41040-8 = "[s] \"อื้ม ไม่เคยได้ยินเลย\""
41040-9 = "ฮ่าฮ่า... ก็รินเป็นคนไม่ค่อยพูดนี่คะ"
41040-10 = "ถ้าอย่างนั้นฉันขออธิบายง่ายๆ เกี่ยวกับคณะกรรมการบริหารก่อนแล้วกันค่ะ"
41040-11 = "องค์การนักเรียนคือฝ่ายที่ดูแลงานบริหารทั้งหมดของคิโวทอส โดยจะจัดการงานสำคัญๆ โดยผ่าน#nการเห็นชอบจากคณะกรรมการบริหารที่อยู่ภายใต้อีกทีหนึ่งค่ะ"
41040-12 = "คณะกรรมการบริหารประกอบด้วย 11 ฝ่าย เช่น ฝ่ายการเงินที่ดูแลเรื่องค่าใช้จ่ายต่างๆ หรือฝ่ายไกล่เกลี่ยที่ประสานเรื่องความขัดแย้งระหว่างโรงเรียน และยังมีฝ่ายบริหารที่รินเป็นคนจัดการค่ะ"
41040-13 = "ส่วนสำนักป้องกันที่ฉันดูแลอยู่มีหน้าที่ในการปกป้องนักเรียนและพลเมืองจากกองกำลังที่คุกคาม#nความปลอดภัยในคิโวทอสค่ะ"
41040-14 = "[s] \"คงต้องเหนื่อยน่าดูเลยนะ\""
41040-15 = "ไม่หรอกค่ะ ฉันเอาแต่นั่งออกคำสั่งในที่ที่ปลอดภัยน่ะค่ะ คนที่เหนื่อยคือผู้ปฏิบัติงานอย่างหัวหน้า#nคันนะต่างหากล่ะคะ"
41040-19 = "พอประธานองค์การนักเรียนหายตัวไป ความวิตกกังวลในคิโวทอสก็เพิ่มมากขึ้น และเราก็มีหลายเรื่อง#nให้เป็นห่วง..."
41040-20 = "โชคดีที่ชาเล่ต์ช่วยจัดการปัญหาใหญ่ๆ ให้หลายครั้ง งานของสำนักป้องกันคงก็เลยลดลงไปด้วยค่ะ"
41040-21 = "ฉันขอใช้โอกาสนี้ขอบคุณคุณครูจากชาเล่ต์อีกครั้งนะคะ"
41040-22 = "[s3] \"ถ้างั้นเรื่องสถาบันฝึกตำรวจวัลคิรี่และสถาบันพิเศษ SRT ...\"\n[s4] \"เป็นการตัดสินใจของสำนักป้องกันเหรอ?\""
41040-23 = "จริงอยู่ที่นักเรียนของสถาบันฝึกตำรวจวัลคิรี่ได้รับคำสั่งจากสำนักป้องกัน..."
41040-24 = "จริงอยู่ที่นักเรียนของสถาบันฝึกตำรวจวัลคิรี่ได้รับคำสั่งจากสำนักป้องกัน..."
41040-30 = "แต่สถาบันพิเศษ SRT เป็นองค์กรพิเศษที่อยู่นอกเหนือการควบคุมของคณะกรรมการบริหารค่ะ"
41040-32 = "คุณครูเองก็อาจจะทราบดีว่าคิโวทอสมีเขตปกครองตนเองหรือโรงเรียนที่เป็นอิสระจากการแทรกแซง#nขององค์การนักเรียน แล้วในเขตปกครองนั้นๆ ก็จะมีชมรมมากมายที่จัดการเรื่องความสงบในเขตของ#nตัวเอง"
41040-33 = "ยกตัวอย่างเช่น นักเรียนที่ก่อปัญหาในเขตปกครองตนเองเกเฮนน่าจะไม่ได้รับโทษจากองค์การ#nนักเรียน แต่จะได้รับโทษตามระเบียบของคณะกรรมการวินัยเกเฮนน่าค่ะ"
41040-36 = "ส่วนนักเรียนที่ก่ออาชญากรรมในพื้นที่สาธารณะ เช่นใน D.U. ที่ชาเล่ต์อยู่ ก็จะตกอยู่ในความควบคุม#nของนักเรียนจากสถาบันฝึกตำรวจวัลคิรี่"
41040-37 = "ถ้าเป็นเคสที่นักเรียนก่อปัญหาแล้วหนีไปยังเขตปกครองตนเองอื่น หรือวางอุบายกับสภานักเรียนของ#nโรงเรียนหนึ่งๆ เพื่อปกปิดตัวตน ก็จะยากในการจับกุมค่ะ"
41040-38 = "และเพื่อป้องกันสิ่งนี้ ที่ผ่านมาพวกฉันจะส่งหนังสือเพื่อขอความร่วมมืออย่างเร่งด่วนเมื่อเกิด#nอาชญากรรม แต่ก็จะเจอข้อจำกัดในการรับมืออยู่ตลอดค่ะ"
41040-43 = "สถาบันพิเศษ SRT ก็เลยถูกก่อตั้งขึ้นมาเพื่อป้องกันปัญหานี้ค่ะ"
41040-44 = "สถาบันพิเศษ SRT ได้รับอนุญาตจากประธานองค์การนักเรียนให้สามารถใช้อำนาจรัฐได้ทุกที่เมื่อเกิด#nอาชญากรรมค่ะ"
41040-49 = "นักเรียนของสถาบัน SRT ต้องเป็นเด็กหัวกะทิที่ถูกคัดเลือกมาอย่างเข้มข้นเพื่อดำเนินตามเป้าหมาย#nของสถาบัน และพวกเธอก็จะได้รับอุปกรณ์และอาวุธระดับสูงสุดของคิโวทอสค่ะ"
41040-52 = "และนี่ทำให้กองทหาร FOX ที่ประกอบด้วยนักเรียนชั้นปีที่ 3 ของสถาบัน SRT สามารถจับกุมวาคาโมะ เจ้าของฉายา <จิ้งจอกแห่งความพินาศ> ที่เป็นตัวป่วนในตำนานของคิโวทอสได้สำเร็จค่ะ"
41040-53 = "แต่ทุกอย่างก็เกิดขึ้นก่อนที่ประธานองค์การนักเรียนจะหายไปน่ะค่ะ..."
41040-55 = "เมื่อประธานองค์การนักเรียนหายตัวไป ผู้รับรองการปฏิบัติงานของนักเรียน SRT ก็หายตัวไปด้วยค่ะ"
41040-56 = "เราไม่มีใครที่จะรับผิดชอบสถาบัน SRT ที่เปรียบเสมือนโรงเก็บระเบิดที่เต็มไปด้วยดินระเบิดที่ทรง#nอานุภาพร้ายแรงเลยค่ะ"
41040-57 = "สำนักป้องกันเองก็พยายามหาวิธีดูแลนักเรียน SRT แล้วนะคะ แต่อุปกรณ์เทคโนโลยีชั้นสูงที่#nพวกเธอมีทำให้การควบคุมสถานการณ์หรือพฤติกรรมของพวกเธอเป็นไปได้ยาก..."
41040-58 = "สุดท้ายแล้วสถาบันพิเศษ SRT จึงกลายเป็นองค์กรที่มีแต่ชื่อเสียค่ะ"
41040-59 = "[s] \"แต่การสั่งปิดโรงเรียนมันไม่เกินไปหน่อยเหรอ?\""
41040-60 = "นี่ไม่ใช่เหตุผลทั้งหมดของการตัดสินใจปิดสถาบันพิเศษ SRT หรอกค่ะ"
41040-61 = "ยังมีกรรมการหลายคนที่ยืนกรานอยู่ค่ะว่าต้องให้สถาบัน SRT อยู่ต่อไปเพื่อเตรียมพร้อมสำหรับการ#nกลับมาของประธานองค์การนักเรียน"
41040-62 = "ฉันเองก็เป็นหนึ่งในนั้นเหมือนกันค่ะ"
41040-63 = "แต่พอรู้ว่าการคงอยู่ของพวกเธอถูกคุกคาม พวกกองทหาร FOX ก็เลยรีบออกตัวก่อนน่ะค่ะ"
41040-64 = "[s5] \"กองทหาร FOX...\"\n[s6] \"หมายถึงนักเรียนที่พูดถึงก่อนหน้านี้เหรอ?\""
41040-65 = "ใช่ค่ะ พวกนั้นคือกองทหารแนวหน้าของสถาบัน SRT ที่จับกุมอาชญากรร้ายแรงได้หลายคน วาคาโมะ จิ้งจอกแห่งความพินาศก็เป็นหนึ่งในนั้นค่ะ"
41040-66 = "ใช่ค่ะ พวกนั้นคือกองทหารแนวหน้าของสถาบัน SRT ที่จับกุมอาชญากรร้ายแรงได้หลายคน วาคาโมะ จิ้งจอกแห่งความพินาศก็เป็นหนึ่งในนั้นค่ะ"
41040-67 = "เดือนที่แล้วนักเรียนของสถาบัน SRT ยังมีอุปกรณ์เทคโนโลยีชั้นสูงที่ได้รับอนุญาตจากประธานองค์การ#nนักเรียนอยู่ค่ะ"
41040-68 = "ทันทีที่มีการหารือเรื่องปิดโรงเรียน กองทหาร FOX ก็บุกเข้ามาในสภานักเรียนแบบติดอาวุธ แถมยังทำร้ายกรรมการที่มีมุมมองแง่ลบต่อสถาบัน SRT ด้วยค่ะ"
41040-69 = "การบุกเข้ามาครั้งนั้นทำให้แซงค์ทัมทาวเวอร์ถูกเผาไปบางส่วน และกรรมการองค์การนักเรียนหลายคน#nก็ได้รับบาดเจ็บสาหัสจนต้องเข้าโรงพยาบาลเลยค่ะ"
41040-70 = "เมื่อเรื่องกลายเป็นแบบนี้ หัวหน้าฝ่ายบริหารก็พิจารณาว่าควรรีบปิดสถาบัน SRT และยึดอาวุธของ#nนักเรียนพวกนี้คืนมา เพราะกังวลว่าจะเกิดปัญหาหนักไปกว่านี้น่ะค่ะ"
41040-74 = "และความกังวลนั้นก็กลายเป็นความจริงขึ้นมาค่ะ... กองทหาร RABBIT หนีออกมาพร้อมอาวุธ#nและก่อความวุ่นวายอย่างที่เห็น"
41040-75 = "ตอนนี้ในองค์การนักเรียนไม่น่าจะมีใครที่คัดค้านการปิดสถาบัน SRT แล้วละค่ะ"
41040-76 = "คุณครูคะ ฉันได้ยินมาว่าคุณครูคือคนที่ให้ความสำคัญกับนักเรียนมากสินะคะ"
41040-77 = "ขืนเป็นแบบนี้ต่อไป กองทหาร RABBIT คงต้องถูกลบระเบียนประวัติการศึกษาและกลายเป็นเด็กเร่ร่อน#nที่ไม่สามารถไปเรียนที่โรงเรียนไหนได้เลยค่ะ"
41040-78 = "แต่พวกเธอก็เป็นนักเรียนหัวกะทิที่ผ่านการสอบคัดเลือกอันเข้มงวดของสถาบันพิเศษ SRT เข้ามา"
41040-79 = "การปล่อยให้นักเรียนหัวกะทิที่มีความสามารถไม่ได้รับการศึกษาถือเป็นการสูญเสียที่ยิ่งใหญ่ของ#nคิโวทอสค่ะ"
41040-80 = "ถึงจะเป็นการขอร้องที่น่าละอายใจ แต่คุณครูช่วยเกลี้ยกล่อมให้เด็กๆ จากกองทหาร RABBIT ย้ายมา#nเรียนที่สถาบันฝึกตำรวจวัลคิรี่จะได้หรือเปล่าคะ?"
41040-81 = "ถ้าเด็กพวกนั้นรับปากว่าจะย้ายมาเรียน ฉันจะลองไปเกลี้ยกล่อมหัวหน้าฝ่ายต่างๆ ให้พิจารณาไม่ตัด#nชื่อออกค่ะ"
41040-82 = "[s] \"งานยากเลยนะ\""
41040-83 = "ฉันรู้ค่ะว่าการโน้มน้าวเป็นเรื่องที่ไม่ง่าย แต่ว่า..."
41040-84 = "[s] \"เรื่องนั้นไม่ใช่ปัญหาหรอก\""
41040-88 = "[ns] \"แต่ครูไม่สามารถบังคับให้นักเรียนเลือกเส้นทางที่ไม่ต้องการได้\""
41040-90 = "เป็นคำพูดที่ดีมากเลยละค่ะ..."
41040-91 = "จริงด้วยสินะคะ เด็กพวกนั้นน่าจะสมัครเข้าสถาบัน SRT เพราะมีความฝันของตัวเอง#nการบังคับให้เปลี่ยนเส้นทางที่เลือกเพียงเพราะเหตุผลของทางนี้อย่างเดียวนี่มันก็..."
41040-92 = "ไม่ต่างจากการทำเรื่องเลวร้ายสินะคะ ถ้าประธานองค์การนักเรียนกลับมาฉันคงแก้ตัวไม่ได้..."
41040-93 = "ถ้าตามกฎระเบียบแล้ว กองทหาร RABBIT สมควรถูกลงโทษอย่างหนักเพราะทั้งขัดขวางการปฏิบัติงาน#nของเจ้าหน้าที่และทำให้องค์การนักเรียนต้องเสื่อมเสียเกียรติ..."
41040-94 = "แต่กฎก็มีไว้แหกไม่ใช่เหรอคะ!"
41040-95 = "หะ... หัวหน้า? พูดอะไรออกมาคะ..."
41040-96 = "อ๊ะ เผลอพูดอะไรไปเนี่ย..."
41040-97 = "ช่วยลืมๆ ที่ฉันพูดไปเมื่อสักครู่นี้ด้วยนะคะ หัวหน้ากรม"
41040-98 = "คุณครูคะ สำนักป้องกันจะให้ความร่วมมือกับชาเล่ต์อย่างเต็มที่ค่ะ"
41040-99 = "ขอร้องละค่ะ คุณครูช่วยให้เด็กๆ พวกนั้นตามหาความฝันของตัวเองให้เจอด้วยนะคะ"
41040-100 = "ตามระเบียบแล้วกองทหาร RABBIT ต้องไปรับโทษจากฝ่ายวินัย แต่ฉันจะขอให้คุณครูรับหน้าที่แทนค่ะ"
41040-101 = "คุณครูมีอำนาจในการตัดสินใจเลยค่ะว่าจะจัดการกับเด็กๆ อย่างไร จะให้ไปอยู่ที่ชาเล่ต์#nหรือจะให้ไปในที่ที่อยากอยู่ก็ย่อมได้ค่ะ"
41040-102 = "ถึงแม้จะกลับไปอยู่ในที่ดินของสถาบัน SRT ไม่ได้... แต่ฉันก็ช่วยเท่าที่ทำได้แล้วค่ะ"
41040-103 = "[s] \"ให้ครูจัดการเรื่องนี้ได้เหรอ?\""
41040-104 = "ได้สิคะ เห็นอย่างนี้ก็เถอะ แต่ฉันก็ได้รับความไว้วางใจจากคณะกรรมการบริหารมากเลยนะคะ"
41040-105 = "คิดเสียว่าครั้งนี้เราเป็นหนี้หัวหน้าฝ่ายต่างๆ แล้วกันค่ะ"
41040-106 = "อีกอย่าง... นี่เป็นการรับผิดชอบอนาคตของนักเรียนหัวกะทิเลยนะคะ ยังไงเรื่องการศึกษาและอนาคต#nของเด็กก็ต้องมาก่อนค่ะ"
41040-112 = "ถ้าอย่างนั้นฉันขอฝากนักเรียนของสถาบัน SRT และกองทหาร RABBIT ด้วยนะคะ"

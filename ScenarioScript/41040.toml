[translation]
41040-1 = "第4話;另一面的苦衷"
41040-2 = "第一次……見面呢，老師。"
41040-3 = "我是奇普托斯聯邦學生會所屬，防衛室的香耶。我在行政委員會中，負責安全保障相關業務。"
41040-4 = "[s1] 「防衛室……？」\n[s2] 「行政委員會……？」"
41040-5 = "原來如此，不怎麼清楚呢？"
41040-6 = "原來如此，不怎麼清楚呢？"
41040-7 = "難道琳行政官沒有跟您提到過嗎？"
41040-8 = "[s]「抱歉，沒什麼印象……」"
41040-9 = "嘛，畢竟琳行政官話很少呢。"
41040-10 = "那就容我稍微說明一下，代替打招呼吧。"
41040-11 = "背負奇普托斯行政的聯邦學生會，主要組織為「行政委員會」並負責主要業務，由「財務室」、「調停室」等11個單位所構成。"
41040-12 = "而有別於行政委員會的組織，就是特別由琳行政官管轄的「統領室」。這個「統領室」和區分為11個單位的「行政委員會」，兩者合起來就是「聯邦學生會」……先有這概念應該就沒問題了。"
41040-13 = "我擔當的是「防衛室」。是個從威脅奇普托斯安全的勢力，保護學生們和市民的組織。"
41040-14 = "[s]「原來如此，謝謝你的說明。似乎是很辛苦的工作呢。」"
41040-15 = "不會不會，我終究只是負責人，只會下達指示而已。辛苦的是像這位環奈局長一樣的第一線人員。"
41040-19 = "確實自從聯邦學生會長失蹤以來，各種不安要素就增加了……"
41040-20 = "但也多虧夏萊幫忙承擔各種事務，因此我們的負擔才沒什麼增加。"
41040-21 = "藉這個機會，請讓我再次向您道謝。"
41040-22 = "[s3] 「不會，我才是。話說回來有一個問題……」\n[s4] 「女武神和SRT是由防衛室負責？」"
41040-23 = "我想想。女武神警察學園，基本上是依照我們防衛室的指示在行動的……"
41040-24 = "我想想。女武神警察學園，基本上是依照我們防衛室的指示在行動的……"
41040-30 = "而SRT特殊學園別說是防衛室，是個甚至有些脫離行政委員會管理，稍微有點特殊的組織。"
41040-32 = "我想您應該知道，這個奇普托斯各學園自治區基本上，不太受聯邦學生會的干涉。然後各自治區有負責擔當治安的組織。"
41040-33 = "例如在格黑娜學園引起問題的學生不是由聯邦學生會，而是由格黑娜的風紀委員會進行懲處吧？"
41040-36 = "不過除此之外……例如D.U.也是，這些地方的犯罪基本上屬於女武神管轄。"
41040-37 = "可是如果該學生逃進別的學園自治區，或是和哪個學生會勾結，就會難以逮捕。"
41040-38 = "當然，這種情況我們也會盡快採取對應行動……但畢竟後發制於人，成效有限。"
41040-43 = "此時誕生的就是「SRT特殊學園」。"
41040-44 = "根據聯邦學生會長的命令，她們在犯罪發生時，允許無論何時何地都能即時對應。"
41040-49 = "因此SRT特殊學園的選拔非常嚴格，變成了菁英集團。裝備也是奇普托斯最高等級。"
41040-52 = "其成效之一，SRT特殊學園的3年級生部隊──通稱「FOX小隊」，便曾經成功逮捕奇普托斯長年以來的煩惱，災厄之狐「若藻」。除此之外也陸續繳出成果……"
41040-53 = "……一直到聯邦學生會長失蹤為止。"
41040-55 = "因為聯邦學生會長失蹤，SRT的責任歸屬就此不知去向。"
41040-56 = "也使她們宛如非常危險的火藥庫……也沒有人願意出面，承擔SRT特殊學園的責任。"
41040-57 = "雖然我們也希望能想辦法解決……但也因為她們擁有的最先進裝備，導致難以運用也難以駕馭……"
41040-58 = "……以結果來說，SRT特殊學園因此變得沒辦法行動。"
41040-59 = "[s] 「所以就走上關閉？」"
41040-60 = "當然，理由不光如此。"
41040-61 = "聯邦學生會中也有人主張，聯邦學生會長也不是不會回來，SRT必須留存……"
41040-62 = "而我也認同這意見。"
41040-63 = "然而，可能是查覺到自身的留存受到威脅吧……「FOX小隊」行動了。"
41040-64 = "[s5] 「『FOX小隊』……」\n[s6] 「剛才說的，最初逮捕若藻的小隊？」"
41040-65 = "是的，沒錯。"
41040-66 = "是的，沒錯。"
41040-67 = "就在上個月，FOX小隊突然襲擊了聯邦學生會。"
41040-68 = "攻擊打算關閉SRT特殊學園的成員，並逃走了。"
41040-69 = "結果造成聖所之塔部份設施全毀。聯邦學生會成員多人受傷，也有人因此住院。"
41040-70 = "行政官在那之後，也有試著從各個方向，探討SRT特殊學園的去留……"
41040-74 = "但這次又換成「RABBIT小隊」，將槍口對準聯邦學生會。也就是前幾天的公園事件。"
41040-75 = "如此一來，聯邦學生會的成員也一定……"
41040-76 = "……老師。我有聽說老師在奇普托斯各地的活躍。"
41040-77 = "「RABBIT小隊」再這樣下去，恐怕會被抹消學籍資料，無法所屬任何學園，只能毫無目標四處徬徨。"
41040-78 = "她們是通過SRT特殊學園嚴酷的入學測驗，貨真價實的菁英們。"
41040-79 = "因此捨棄這些能力，會是巨大的損失……"
41040-80 = "這部分，可以請老師說服她們，勸她們編入女武神警察學園嗎？"
41040-81 = "如果可以在這裡得到正面的答案……我應該也有辦法迅速遊說各方，不讓學籍資料被抹消。"
41040-82 = "[s] 「這點……」"
41040-83 = "我明白要說服很困難。不過──"
41040-84 = "[s] 「與其說是說服的難易度……」"
41040-88 = "[ns] 「而是我沒辦法強制學生，選擇不願意的道路。」"
41040-90 = "……原來如此，這真是這真是。"
41040-91 = "說得也是呢。她們也是懷抱著各自的夢想，進入SRT特殊學園就讀的……"
41040-92 = "強硬扭曲她們的夢想，確實令人難以接受呢。聯邦學生會長回來的時候，也不知道會怎麼說……"
41040-93 = "本來的話會依照原則，以聯邦學生會的名譽處以重刑的……"
41040-94 = "不過原則什麼的我才不管呢！"
41040-95 = "防，防衛室長……？"
41040-96 = "唉唷，失禮了。"
41040-97 = "剛剛這句話還是請忘了吧。"
41040-98 = "老師。我們「行政委員會．防衛室」，會積極的協助夏萊。"
41040-99 = "所以，為了讓那些孩子可以繼續追逐夢想。可以請你幫助她們嗎？"
41040-100 = "關於「RABBIT小隊」的處分，就交給老師了。"
41040-101 = "把她們帶進夏萊觀察也可以，放她們自由也可以……這點就隨老師了。"
41040-102 = "只有「復興SRT特殊學園讓她們回去」會很難實現……"
41040-103 = "[s] 「由我決定沒問題嗎？」"
41040-104 = "是的。別看我這樣，其實我在「行政委員會」中還蠻受到信賴的。"
41040-105 = "就當作給其他成員賣人情吧。"
41040-106 = "和菁英們的未來相比，這不算什麼。"
41040-112 = "那麼老師……她們就拜託你了。"
41040-114 = "下一話;揮之不散的疑心"

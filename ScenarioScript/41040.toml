[translation]
41040-1 = "第4話;別側面の事情"
41040-2 = "初めまして……ですね、先生。"
41040-3 = "キヴォトス連邦生徒会所属、防衛室のカヤと申します。行政委員会の中における、安全保障周りを担当している者です。"
41040-4 = "[s1] \"防衛室……？\"\n[s2] \"行政委員会……？\""
41040-5 = "なるほど、あまりご存じないようですね？"
41040-6 = "なるほど、あまりご存じないようですね？"
41040-7 = "リン行政官からお話など、聞いたことはありませんでしたか？"
41040-8 = "[s] \"ごめん、あんまり……。\""
41040-9 = "まあ、リン行政官は口数が少ないですものね。"
41040-10 = "ではご挨拶を兼ねつつ、少しだけご説明しましょうか。"
41040-11 = "キヴォトスの行政を担う連邦生徒会は、まず主な組織として「行政委員会」を持っています。ここが主要な業務を担当しており、「財務室」「調停室」などの計11個の区分けで構成されています。"
41040-12 = "そしてこの行政委員会とは別に存在する組織が、リン行政官の管轄である特殊な「統括室」。この「統括室」と、11個の区分けから成る「行政委員会」の2つを合わせたものが「連邦生徒会」……そう思っていただければおおよそ問題は無いかと。"
41040-13 = "私は「防衛室」を担当しています。キヴォトスの安全を脅かす勢力から、生徒たちや市民を守る組織です。"
41040-14 = "[s] \"なるほど、説明ありがとう。大変そうな仕事だね。\""
41040-15 = "いえいえ、私はあくまで責任者的な立ち位置で、あくまで指示をするだけですから。大変なのはここにいるカンナさんのように、実働部隊の方です。"
41040-19 = "たしかに連邦生徒会長が失踪して以来、色々と不安要素が増えていくのではと思っていたのですが……。"
41040-20 = "それも、シャーレが色々と担当してくださっていますから。おかげさまで、私たちの負担もさほど増えてはいません。"
41040-21 = "この場を借りて、あらためてお礼をさせてください。"
41040-22 = "[s3] \"ううん、こちらこそ。ところで一つ聞きたいんだけど……。\"\n[s4] \"ヴァルキューレやSRTは、防衛室の担当？\""
41040-23 = "そうですね。ヴァルキューレ警察学校については基本、私たち防衛室の指示で動いているのですが……"
41040-24 = "そうですね。ヴァルキューレ警察学校については基本、私たち防衛室の指示で動いているのですが……"
41040-30 = "SRT特殊学園は防衛室どころか、行政委員会の管理からも離れた少々特殊な組織です。"
41040-32 = "ご存知かと思いますが、ここキヴォトスの各学園自治区は基本的に、連邦生徒会の干渉をさほど受けません。そして各自治区には治安を担当する組織があります。"
41040-33 = "例えばゲヘナ学園で問題を起こした生徒は連邦生徒会ではなく、ゲヘナの風紀委員会によって罰を受けますよね？"
41040-36 = "しかしそれ以外の場所……例えばD.U.もそうですが、そういった場所での犯罪は基本的にヴァルキューレの管轄となります。"
41040-37 = "ですがその生徒が別の学園自治区に逃げたり、どこかの生徒会と結託したりすると、逮捕が難しくなってしまうのです。"
41040-38 = "その場合も勿論、できる限りすぐに対応できるように動いてはきましたが……こういった後手の対応には限界がありました。"
41040-43 = "そのために生まれたのが、「SRT特殊学園」。"
41040-44 = "彼女たちは連邦生徒会長によって、犯罪が発生した際にはいつどこであっても即時の対応が許されています。"
41040-49 = "そのためSRT特殊学園の選抜は非常に厳しく、エリート集団となっています。装備もキヴォトス最高レベルです。"
41040-52 = "その結果の一つとして、SRT特殊学園の3年生部隊――通称「FOX小隊」は以前、キヴォトスの長年の悩みの種だった災厄の狐、「ワカモ」を逮捕することに成功。それ以外にも次々と順調に成果を挙げていったのです……"
41040-53 = "……連邦生徒会長が、失踪するまでは。"
41040-55 = "連邦生徒会長が失踪してしまったことにより、SRTに関する責任の所在は宙に浮いてしまいました。"
41040-56 = "そうなっては非常に危険な火薬庫も同然……そんなSRT特殊学園について、責任を取ろうとする者は現れませんでした。"
41040-57 = "私たちとしても、どうにかしようとは思ったのですが……彼女たちのその最先端の装備ゆえに、投入のタイミングや扱いも難しく……。"
41040-58 = "……SRT特殊学園は結果として、身動きが取れなくなってしまったのです。"
41040-59 = "[s] \"それで、閉鎖することに？\""
41040-60 = "もちろん、それだけが理由ではありません。"
41040-61 = "連邦生徒会長は帰ってこないと決まったわけではない、SRTは存続しておくべきだ……そういった意見も連邦生徒会の中にはありました。"
41040-62 = "私もまた、そのような意見を持つひとりです。"
41040-63 = "ですが、自分たちの存続が脅かされているのでは……と気づいたのでしょうか、「FOX小隊」が動きを見せたのです。"
41040-64 = "[s5] \"「FOX小隊」……。\"\n[s6] \"さっき言ってた、最初にワカモを逮捕した小隊？\""
41040-65 = "はい、そうです。"
41040-66 = "はい、そうです。"
41040-67 = "先月のことですが、FOX小隊が突如として連邦生徒会を襲撃。"
41040-68 = "SRT特殊学園の閉鎖を進めようとしていたメンバーを攻撃し、逃走しました。"
41040-69 = "結果として、サンクトゥムタワーの一部施設が全焼。連邦生徒会のメンバー数人が怪我を負い、入院となった者もいます。"
41040-70 = "行政官はその後、SRT特殊学園に関する話し合いを様々な方向性で広げようとしましたが……。"
41040-74 = "続けて「RABBIT小隊」もまた、連邦生徒会に銃口を向けようとしました。先日の公園での件です。"
41040-75 = "こうなってはもう、連邦生徒会の各メンバーもきっと……。"
41040-76 = "……先生。キヴォトス各地における先生のご活躍は、耳に入っております。"
41040-77 = "「RABBIT小隊」はこのままですと学籍データが抹消され、どこの学園にも所属できないまま、当てもなく彷徨うことになってしまうかもしれません。"
41040-78 = "彼女たちはSRT特殊学園の過酷な入学試験を通過した、紛れもないエリートたち。"
41040-79 = "その能力が無為に捨てられてしまうのは、かなりの損失……。"
41040-80 = "よろしければ是非、彼女たちを説得し、ヴァルキューレ警察学校に編入するように勧めていただけませんでしょうか？"
41040-81 = "そこで前向きな答えが貰えそうであれば……私の方でも学籍データを抹消しないように、急いで各位を説得することも可能かと思います。"
41040-82 = "[s] \"それは……。\""
41040-83 = "説得が難しいことは承知しています。しかし――"
41040-84 = "[s] \"説得の難易度って言うよりは……\""
41040-88 = "[ns] \"生徒たちが望まない進路を、強制することはできないよ。\""
41040-90 = "……なるほど、それはそれは。"
41040-91 = "そうですね。彼女たちもそれぞれ、夢を抱いてSRT特殊学園に入ったはず……"
41040-92 = "その願いを無理に捻じ曲げるのは、確かに気が進みません。連邦生徒会長が戻ってきた時に、何と言えば良いのかも分かりませんし……。"
41040-93 = "本来であれば原則通りに、連邦生徒会の名誉にかけて重い処罰をという話があったのですが……。"
41040-94 = "まあ、原則なんて知ったことではありませんね！"
41040-95 = "ぼ、防衛室長……？"
41040-96 = "あら、失礼しました。"
41040-97 = "流石に今のは忘れてください。"
41040-98 = "先生。私たち「行政委員会・防衛室」は、シャーレに積極的に協力いたします。"
41040-99 = "ですのでどうか、あの子たちが夢を追い続けられるように。助けてあげてくれませんでしょうか？"
41040-100 = "「RABBIT小隊」の処分については、先生にお任せします。"
41040-101 = "シャーレに置いて見守るというのもあるでしょう、好きにさせるという手もあるでしょう……その点については、先生のご随意に。"
41040-102 = "「SRT特殊学園を復活させて戻ってもらう」ということだけは難しいのですが……。"
41040-103 = "[s] \"私が決めちゃって大丈夫なの？\""
41040-104 = "はい。こう見えて私、結構「行政委員会」の中では信頼があるので。"
41040-105 = "他のメンバーに、借りを作ったということにしておきましょう。"
41040-106 = "エリートたちの未来に比べれば、これくらいは安いものです。"
41040-112 = "では先生、彼女たちのこと……よろしくお願いしますね？"
41040-114 = "次回;消えない不信"

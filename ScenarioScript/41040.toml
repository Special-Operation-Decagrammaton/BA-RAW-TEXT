[translation]
41040-1 = "#title;제4화;그 실장의 사정"
41040-2 = "3;카야;05;만나 뵙게 되어서 반갑습니다, 선생님.\n#3;em;[반응]\n#3;a"
41040-3 = "3;카야;00;제 이름은 시라누이 카야. 총학생회 행정위원회에서 방위실장 직무를 맡고 있습니다."
41040-4 = "[s1] \"행정위원회……?\"\n[s2] \"방위실장……?\""
41040-5 = "3;카야;01;저희에 대해 들어 보신 적이 없으신가요?\n#3;em;[?]"
41040-6 = "3;카야;01;저희에 대해 들어 보신 적이 없으신가요?\n#3;em;[?]"
41040-7 = "3;카야;04;혹시, 행정위원회에 대해 린 행정관이 미리 설명해주지 않았었나요…….\n#3;stiff"
41040-8 = "[s] \"응. 듣지 못했어.\""
41040-9 = "3;카야;06;하하…… 린 행정관은 말수가 적으니까요.\n#3;em;[땀]"
41040-10 = "3;카야;03;그럼 인사를 드리기에 앞서 행정위원회에 대해 간단하게 설명을 드리겠습니다.\n#3;greeting"
41040-11 = "3;카야;00;키보토스의 모든 행정 업무를 처리하는 총학생회는 산하 조직인 행정위원회의 합의를 통해 주요 업무를 처리하고 있습니다."
41040-12 = "3;카야;00;행정위원회는 재무를 담당하는 재무실, 학교 간의 분쟁을 조정하는 조정실 등 11개 위원회로 구성되어 있으며, 그 이외에 린 수석행정관이 직접 관리하는 통괄실이 별도로 존재합니다."
41040-13 = "3;카야;03;제가 담당하는 방위실은 키보토스의 안전을 위협하는 세력으로부터 학생들과 시민을 보호하는 임무를 담당하는 조직입니다.\n#3;em;[반응]"
41040-14 = "[s] \"고생이 많아 보이네.\""
41040-15 = "3;카야;00;아뇨, 저는 안전한 곳에 앉아 지시를 내릴 뿐이니까요. 진짜 고생은 여기 계신 칸나 국장과 같은 실무자들이 하고 있지요."
41040-16 = "#st;[0,0];instant;1;"
41040-17 = "#clearST"
41040-18 = "5;칸나;04\n#5;em;…\n#5;a\n#3;m1\n#wait;2500"
41040-19 = "3;카야;02;게다가 총학생회장의 실종 이후로 키보토스 내에 불안 요소들이 크게 늘어나 여러모로 걱정이 많았었는데……"
41040-20 = "3;카야;00;다행히 샬레에서 커다란 사건을 여럿 처리해주신 덕분에 방위실의 업무 부담도 크게 줄일 수 있었습니다."
41040-21 = "3;카야;03;이 자리를 빌려 샬레의 선생님께 다시 한번 감사의 인사를 올립니다.\n#3;em;[반짝]\n#3;greeting"
41040-22 = "[s3] \"그럼 발키리 경찰학교나 SRT 특수학원의 임무도……\"\n[s4] \"방위실에서 직접 결정하는 거야?\""
41040-23 = "3;카야;02;발키리 경찰학교의 학생들은 저희 방위실의 지휘를 받는 것이 맞습니다만……\n#5;dr\n#3;m3"
41040-24 = "3;카야;02;발키리 경찰학교의 학생들은 저희 방위실의 지휘를 받는 것이 맞습니다만……\n#5;dr\n#3;m3"
41040-25 = "#st;[0,0];instant;1;"
41040-26 = "#clearST"
41040-27 = "3;카야;00\n#3;d\n#wait;1000"
41040-28 = "3;카야;00\n#3;a\n#3;closeup\n#wait;1000"
41040-29 = "#wait;1000"
41040-30 = "3;카야;05;SRT 특수학원은 행정위원회의 관리에서 벗어난, 조금 더 특수한 조직입니다.\n#3;em;…\n#3;closeup"
41040-31 = "#all;hide"
41040-32 = "#na;카야;선생님께서도 아시겠지만 키보토스에는 총학생회의 간섭으로부터 자유로운 학원 자치구와 이 자치구 내의 치안을 관리하는 다수의 동아리가 존재합니다."
41040-33 = "#na;카야;예를 들자면, 게헨나 자치구 내에서 문제를 일으킨 학생은 총학생회가 아닌 게헨나 선도부의 교칙에 따라 벌을 받게 되지요."
41040-34 = "#all;hide"
41040-35 = "#wait;1000"
41040-36 = "#na;카야;그 외에 샬레가 위치한 D.U. 같은 공용 구역에서 범죄를 저지른 학생은 발키리 경찰학교의 학생들이 처리하고 있습니다만……"
41040-37 = "#na;카야;문제를 일으킨 학생이 다른 자치구로 도망을 치거나, 특정 학원의 학생회와 결탁하여 신원을 은폐하려 든다면 체포에 여러가지 어려움이 생깁니다."
41040-38 = "#na;카야;이를 방지하기 위해 저희는 범죄가 발생할 때마다 신속하게 공문을 요청하고 협조를 구해왔지만, 그래도 대응에는 한계가 있었습니다."
41040-39 = "#st;[0,0];instant;1;"
41040-40 = "#clearST"
41040-41 = "#all;hide"
41040-42 = "#wait;1000"
41040-43 = "#na;카야;그래서 이를 방지하기 위해 만들어진 조직이 SRT 특수학원."
41040-44 = "#na;카야;SRT 특수학원은 총학생회장의 사전 허가를 얻어 범죄가 발생하면 언제 어디서나 공권력을 즉각 투입할 수 있도록 설계되었습니다."
41040-45 = "#st;[0,0];instant;1;"
41040-46 = "#clearST"
41040-47 = "#zmc;instant;636,-222;1896\n#all;hide"
41040-48 = "#zmc;instant;636,-222;1896\n#wait;500"
41040-49 = "#zmc;instant;636,-222;1896\n#na;카야;그 취지에 걸맞게 SRT 학원의 학생들은 엄격하게 선별된 엘리트만으로 선발되었고, 장비 또한 키보토스 최고 수준으로 지급되었습니다."
41040-50 = "#zmc;move;636,-222;1896;10\n#st;[0,0];instant;1;"
41040-51 = "#zmc;move;0,0;3160;1500\n#clearST\n#wait;2500"
41040-52 = "#na;카야;그 결과, SRT 학원 3학년 학생들로 이루어진 부대— FOX 소대가 키보토스의 오랜 골칫거리였던 <재액의 여우> 와카모를 성공적으로 체포하며 성과를 입증했습니다."
41040-53 = "#na;카야;……총학생회장이 사라지기 전까지는 말이지요."
41040-54 = "#all;hide"
41040-55 = "3;카야;01;총학생회장이 사라지는 것과 동시에 SRT 학생들의 작전을 보장할 수 있는 책임자도 함께 사라졌습니다.\n#3;em;[반응]\n#3;a"
41040-56 = "3;카야;01;무시무시한 위력의 폭약이 가득 들어찬 화약고처럼 되어 버린 SRT 학원을 책임지려는 사람은 아무도 없었습니다."
41040-57 = "3;카야;02;저희 방위실에서도 어떻게든 SRT의 학생들을 관리해 보려고 했습니다만…… 이들이 지니고 있는 최첨단의 장비가 오히려 상황이나 행동에 제약을 걸어 버렸고……"
41040-58 = "3;카야;05;……결국 SRT 특수학원은 유명무실한 조직으로 전락하게 되었지요.\n#3;em;…"
41040-59 = "[s] \"그렇다고 학원을 폐쇄하는 것은 너무하지 않아?\""
41040-60 = "3;카야;02;물론 이 이유만으로 SRT 특수학원의 폐교가 결정된 것은 아닙니다."
41040-61 = "3;카야;01;총학생회장이 돌아올 때를 대비하여 SRT 학원을 존속시켜야 한다고 주장하는 임원들도 총학생회 내에 다수 존재했으니까요."
41040-62 = "3;카야;00;저 또한 그중 하나였고요."
41040-63 = "3;카야;01;하지만…… 자신들의 존립이 위협받고 있다는 사실을 알게 되자, FOX 소대의 소대원들은 먼저 행동에 나섰습니다.\n#3;em;[...]"
41040-64 = "[s5] \"FOX 소대라면……\"\n[s6] \"아까 말한 그 학생들?\""
41040-65 = "3;카야;05;네. 재액의 여우, 와카모를 포함하여 여러 중범죄자를 성공적으로 검거한 SRT 학원의 최정예 소대입니다.\n#3;em;[반응]"
41040-66 = "3;카야;05;네. 재액의 여우, 와카모를 포함하여 여러 중범죄자를 성공적으로 검거한 SRT 학원의 최정예 소대입니다.\n#3;em;[반응]"
41040-67 = "3;카야;01;지난 달만 하더라도 SRT 학원의 학생들은 여전히 총학생회장으로부터 허가받은 최첨단의 장비를 소지하고 있었습니다."
41040-68 = "3;카야;02;FOX 소대는 학원의 폐쇄가 논의되자 무장한 채로 학생회를 습격, SRT 학원에 부정적인 견해를 갖고 있던 임원 여럿을 습격하고 도주했습니다."
41040-69 = "3;카야;05;그 과정에서 생텀 타워의 시설 일부가 전소되었고, 다수의 총학생회 임원들이 중경상을 입고 병원에 입원하게 되었지요."
41040-70 = "3;카야;01;일이 이렇게 되자 수석 행정관은 서둘러 SRT 학원을 폐쇄하고 이들이 갖고 있는 무기를 회수하지 않으면 더 큰 문제가 생길지도 모른다고 판단했습니다."
41040-71 = "#st;[0,0];instant;1;"
41040-72 = "#clearST"
41040-73 = "3;카야;01\n#3;m4\n#wait;1500"
41040-74 = "3;카야;05;그리고 그 우려는 현실로 드러나…… 이번에는 RABBIT 소대가 무기를 들고 탈주하는 사건이 벌어졌지요.\n#3;em;…"
41040-75 = "3;카야;02;……이제 총학생회 내에도 SRT 학원의 편을 들어주는 임원은 거의 없을 겁니다."
41040-76 = "3;카야;00;선생님. 선생님께서는 학생들을 소중히 여기시는 분이라고 들었습니다.\n#3;em;[반응]\n#3;m3"
41040-77 = "3;카야;01;이대로 두면 제가 손쓸 방법도 없이 RABBIT 소대의 소대원들은 학적이 말소되어 어느 학원에도 소속되지 못하는 부랑아 신세가 되고 말 겁니다."
41040-78 = "3;카야;05;그녀들 또한 SRT 특수학원의 가혹한 입학시험을 통과한 엘리트들."
41040-79 = "3;카야;02;능력 있는 엘리트 학생들이 교육을 받지 못하고 버려지는 건 키보토스의 크나큰 손실입니다."
41040-80 = "3;카야;00;염치없는 부탁입니다만, 부디 RABBIT 소대의 소대원들을 설득해 발키리 경찰학교로 전학을 가도록 권유해 주실 수는 없나요?\n#3;em;[?]"
41040-81 = "3;카야;03;소대원들에게 전학을 가겠다는 확약을 받아주신다면, 저도 그녀들이 제적당하지 않도록 다른 실장들을 설득해 보겠습니다."
41040-82 = "[s] \"그건 어려운데.\""
41040-83 = "3;카야;00;설득이 어려운 일이라는 것은 알고 있습니다. 하지만—"
41040-84 = "[s] \"그런 문제가 아니야.\""
41040-85 = "#st;[0,0];instant;1;"
41040-86 = "#clearST"
41040-87 = "3;카야;01\n#3;em;[?]\n#wait;2000"
41040-88 = "[ns] \"학생들이 원하지 않는 진로를 강제로 강요할 수는 없어.\""
41040-89 = "3;카야;02\n#3;em;…\n#wait;2500"
41040-90 = "3;카야;09;……대단히 멋진 말씀이네요."
41040-91 = "3;카야;02;그렇네요. 그 아이들도 저마다의 꿈을 안고 SRT 학원에 지원서를 넣었을 텐데. 이쪽의 사정만으로 진로를 바꾸라고 강요하다니……\n#3;em;[반응]"
41040-92 = "3;카야;00;역시 나쁜 짓을 하는 것 같아서 마음이 내키지 않네요. 이래서는 나중에 총학생회장이 돌아왔을 때 변명도 할 수 없겠어요."
41040-93 = "3;카야;02;물론 원칙대로라면 총학생회의 명예를 실추시키고 공무를 방해한 RABBIT 소대원들은 중징계를 받아야 마땅합니다만……"
41040-94 = "3;카야;03;원칙은 깨라고 존재하는 것이지요!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
41040-95 = "3;카야;03\n5;칸나;04;시, 실장님? 무슨 말씀을…….\n#5;em;[땀]\n#5;al\n#3;m1"
41040-96 = "3;카야;02;앗, 실언을……\n#3;stiff"
41040-97 = "3;카야;00;방금 한 말은 잊어주세요. 칸나 국장."
41040-98 = "3;카야;03;선생님. 저희 방위실은 샬레의 선생님께 적극 협조하겠습니다.\n#3;em;[반응]\n#3;m3\n#5;dr"
41040-99 = "3;카야;00;부디 선생님께서 그 아이들이 자신의 꿈을 찾을 수 있도록 옆에서 도와주세요."
41040-100 = "3;카야;00;징계위원회에 일임할 예정이었던 RABBIT 소대원들의 처분은 선생님께 맡기겠습니다."
41040-101 = "3;카야;03;소대원들을 샬레에 두고 지켜보시든, 원하는 곳으로 돌아가게 하든, 선생님께서 원하는 대로 결정하시면 됩니다.\n#3;em;[반짝]"
41040-102 = "3;카야;00;물론 SRT 학원 부지로 돌아갈 수는 없겠습니다만…… 제가 할 수 있는 일은 이 정도뿐이네요."
41040-103 = "[s] \"내가 이 일을 맡아도 괜찮겠어?\""
41040-104 = "3;카야;03;괜찮습니다. 이래 봬도 저는 행정위원회 내에서 꽤나 신뢰받고 있거든요.\n#3;em;[재잘]\n#3;hophop"
41040-105 = "3;카야;00;이번 일은 다른 실장들에게 빚진 셈 치죠."
41040-106 = "3;카야;07;게다가…… 엘리트들의 미래를 책임지는 비용에 비하면 이 빚은 값싼 수준이니까요."
41040-107 = "#st;[0,0];instant;1;"
41040-108 = "#clearST"
41040-109 = "3;카야;00\n#3;d\n#wait;1000"
41040-110 = "3;카야;00\n#3;a\n#3;closeup\n#wait;1000"
41040-111 = "#wait;1000"
41040-112 = "3;카야;03;그럼, 선생님. SRT 학원의 학생들을, RABBIT 소대원들을 잘 부탁드리겠습니다.\n#3;greeting\n#3;em;[반짝]\n#3;closeup"
41040-113 = "#continued"
41040-114 = "#nextepisode;다음화;걷히지 않는 불신"

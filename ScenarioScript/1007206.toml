[translation]
1007206-1 = "#title;깊은 호흡 아래의 바다"
1007206-2 = "#wait;2500"
1007206-3 = "#wait;2000"
1007206-4 = "1;사키 수영복;99\n#1;greeting\n#1;a\n#wait;1500"
1007206-5 = "#na;(어촌의 부둣가 근처를 산책하다 우연히 물속에서 수면 위로 올라오던 사키와 마주쳤다.)"
1007206-6 = "[ns] \"안녕, 사키.\""
1007206-7 = "#st;[0,0];instant;1;"
1007206-8 = "#clearST"
1007206-9 = "1;사키 수영복;08\n#1;em;[반응]\n#1;h\n#wait;1000"
1007206-10 = "1;사키 수영복;02;어라, 선생님. 우연이네.\n#1;m3"
1007206-11 = "1;사키 수영복;01;이 근처에는 무슨 일이야?"
1007206-12 = "[s] \"평범하게 산책 중이었어.\""
1007206-13 = "#wait;1000"
1007206-14 = "[ns] \"사키는 무얼 하던 중이었어?\""
1007206-15 = "1;사키 수영복;02;나는 수중에 가라앉은 쓰레기를 인양하던 중이었어.\n#1;em;[반응]"
1007206-16 = "1;사키 수영복;01;사람의 손이 잘 닿지 않는 깊은 물 속에는 버려진 어구나 플라스틱 병 같은 해양 쓰레기가 많이 가라앉아 있거든."
1007206-17 = "1;사키 수영복;99;이번에는 마을 주민들에게 여러모로 도움을 많이 받았으니까. 다이빙의 연습을 겸해서 조업에 방해가 될 만한 해양 쓰레기를 수거하고 있었어."
1007206-18 = "[s1] \"대단하네……!\"\n[s2] \"훌륭한 일을 하고 있었구나.\""
1007206-19 = "#wait;10"
1007206-20 = "#wait;10"
1007206-21 = "1;사키 수영복;02;뭘, 그리 어려운 일도 아닌데."
1007206-22 = "1;사키 수영복;03;그리고 청소를 다 마친 뒤에 수중에서 둘러보는 바다의 모습도 꽤나 절경이거든.\n#1;greeting\n#1;em;[반짝]"
1007206-23 = "1;사키 수영복;99;사람의 흔적 하나 없이 깨끗하게 청소된 바닷속을 스킨 다이빙으로 헤엄치고 있노라면 가끔씩 진짜 물고기가 된 것 같은 기분이 들 때도 있으니까."
1007206-24 = "[s3] \"스킨 다이빙이라……\"\n[s4] \"나도 한 번 기회가 되면 해보고 싶네.\""
1007206-25 = "#wait;10"
1007206-26 = "#wait;10"
1007206-27 = "1;사키 수영복;08;응? 선생님은 다이빙을 해 본 경험이 없는 거야?\n#1;em;[?]"
1007206-28 = "1;사키 수영복;01;확실히…… 다이빙은 수면 아래에 머리를 집어넣고 스노클로 숨을 쉬어야 하기 때문에 초심자는 겁이 나서 쉽게 도전하지 못하는 편이지."
1007206-29 = "1;사키 수영복;02;하지만 숙련자가 옆에서 챙겨준다면 오히려 수영보다 쉽게 입문할 수 있는 스포츠인데……"
1007206-30 = "#st;[0,0];instant;1;"
1007206-31 = "#clearST"
1007206-32 = "1;사키 수영복;99\n#1;em;…\n#wait;2500"
1007206-33 = "1;사키 수영복;08\n#1;em;[전구]\n#wait;1000"
1007206-34 = "1;사키 수영복;02;선생님, 혹시 괜찮으면 지금 한 번 다이빙 체험을 해볼래? 장비라면 내가 갖고 있으니까."
1007206-35 = "1;사키 수영복;01;만에 하나 무슨 문제가 생기더라도 마스터 다이버인 내가 옆에 있으면 금방 조치해 줄 수 있을 테고……"
1007206-36 = "[s] \"정말 그래도 괜찮아?\""
1007206-37 = "1;사키 수영복;03;물론이지. 나만 믿으라고.\n#1;em;[반응]"
1007206-38 = "1;사키 수영복;99;뭐, 이렇게 해서라도 선생님에게 평소의 보답을 할 수 있다면 오히려 내가 더 다행이지만……\n#fontsize;50"

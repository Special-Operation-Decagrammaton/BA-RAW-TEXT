[translation]
1007206-1 = "In the Span of a Breath"
1007206-5 = "On a stroll along the docks of the fishing village, I ran into Saki just as she was surfacing from under the waves."
1007206-6 = "[ns] \"Hello there, Saki.\""
1007206-10 = "Oh, Sensei! What a coincidence."
1007206-11 = "What are you doing here?"
1007206-12 = "[s] \"I'm just going for a walk.\""
1007206-14 = "[ns] \"How about yourself?\""
1007206-15 = "I'm retrieving trash from the sea bed."
1007206-16 = "There are all kinds of debris, like old fishing gear and plastic bottles, collecting down here."
1007206-17 = "Diving down to get it is good practice for me, and it helps the village."
1007206-18 = "[s1] \"Impressive!\"\n[s2] \"You're an honorable soul, Saki.\""
1007206-21 = "Oh, it's nothing."
1007206-22 = "Besides, when it's all cleaned up, the view down here is incredible."
1007206-23 = "Scuba diving in the ocean where it's clean and untouched, you almost get to experience what it's like to be a fish..."
1007206-24 = "[s3] \"I can only imagine.\"\n[s4] \"I'd like to try scuba diving sometime.\""
1007206-27 = "Oh, you've never been?"
1007206-28 = "Holding your head underwater with nothing to breathe through but a snorkel sounds intimidating, I know."
1007206-29 = "However, it's even easier to learn than basic swimming...if you have an experienced diver by your side, that is."
1007206-34 = "Sensei, I have a spare set of equipment. Why don't you give it a try?"
1007206-35 = "If anything goes wrong, I'll be right by your side to make sure you're okay."
1007206-36 = "[s] \"You don't mind?\""
1007206-37 = "Of course. You can trust in me."
1007206-38 = "This is a way I can thank you for your help. So I'd actually be happy to..."
1007206-42 = "Ah, you should go change into your swimsuit."
1007206-43 = "I'll go over the snorkels and masks to make sure they're action-ready."
1007206-46 = "After I changed, Saki helped me into my equipment, and then we began our descent..."
1007206-53 = "― [log=사키 수영복](Now, Sensei. Stay calm and keep your eyes on me.)[/log][wa:1540] "
1007206-56 = "― [log=사키 수영복](Good, nice and slow. Inhale. Exhale. Slowly.)[/log][wa:1660] "
1007206-59 = "― [log=사키 수영복](Heehee. You're a fast learner. I expected nothing less, Sensei.)[/log][wa:520] "
1007206-62 = "― [log=사키 수영복](...It feels strange.)[/log][wa:1150] "
1007206-65 = "― [log=사키 수영복](Being in the water here with you, communicating with nothing but)[/log][wa:510] "
1007206-67 = "― [log=사키 수영복](our eyes and hand gestures...)[/log][wa:850] "
1007206-70 = "― [log=사키 수영복](This is…)[/log]"
1007206-73 = "― [log=사키 수영복](...Oh? I look like I'm running out of breath?)[/log][wa:280] "
1007206-76 = "― [log=사키 수영복](No, no. There's no problem. I'm fine!)[/log][wa:820] "
1007206-79 = "― [log=사키 수영복](But my breathing...)[/log][wa:870] "
1007206-81 = "― [log=사키 수영복](...It does seem a little...shaky.)[/log][wa:10] "
1007206-84 = "― [log=사키 수영복](Maybe... Diving with Sensei...)[/log]"
1007206-86 = "― [log=사키 수영복](Perhaps I wasn't ready.)[/log][wa:1950] "
1007206-89 = "Saki and I spent some time diving and playing in the water."
1007206-92 = "Sensei, how was your first time diving?"
1007206-93 = "[s] \"Oh, it was only the most fun I've ever had.\""
1007206-94 = "Hahaha! That's great to hear."
1007206-98 = "I was a little worried..."
1007206-99 = "Adults are so...experienced. They've already been through their childhood and teen years..."
1007206-100 = "As point woman, I'm used to leading others, but I was worried I wouldn't be experienced enough to lead you, Sensei."
1007206-101 = "[s] \"It's okay. You don't have to worry about that with me.\""
1007206-102 = "But... You helped me so much, Sensei. So, if there's nothing I can do to help you..."
1007206-103 = "Well, that wouldn't be fair."
1007206-104 = "[s] \"Life isn't fair.\""
1007206-108 = "...Hmph."
1007206-109 = "Anyway! I'm glad you enjoyed diving with me."
1007206-114 = "If you ever want to go again, come find me."
1007206-115 = "I'll be your buddy anytime, Sensei."

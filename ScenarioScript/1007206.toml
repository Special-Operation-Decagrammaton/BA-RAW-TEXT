[translation]
1007206-1 = "ท้องทะเลภายใต้การกลั้นลมหายใจ"
1007206-5 = "(คุณครูออกมาเดินเล่นที่แถวๆ ท่าเรือ และบังเอิญเจอซากิที่กำลังว่ายขึ้นมาบนผิวน้ำพอดี)"
1007206-6 = "[ns] \"ว่าไง ซากิ\""
1007206-10 = "เอ๋? คุณครู... บังเอิญจังเลยนะ"
1007206-11 = "มาทำอะไรแถวนี้เหรอ?"
1007206-12 = "[s] \"ครูแค่มาเดินเล่นน่ะ\""
1007206-14 = "[ns] \"ซากิทำอะไรอยู่เหรอ?\""
1007206-15 = "ฉันกำลังเก็บขยะที่จมอยู่ในทะเลขึ้นมาน่ะ"
1007206-16 = "มีขยะอย่างพวกขวดพลาสติก หรือพวกอุปกรณ์ตกปลาจมอยู่ใต้ทะเลระดับที่คนทั่วไปดำลงไปไม่ถึง#nอยู่เยอะเลย"
1007206-17 = "คราวนี้พวกเราได้รับความช่วยเหลือหลายๆ อย่างจากพวกชาวบ้าน เพราะงั้นก็เลยคิดว่าจะฝึก#nดำน้ำไปพร้อมๆ กับช่วยเก็บขยะใต้ทะเลเลยด้วยน่ะ"
1007206-18 = "[s1] \"สุดยอดเลยนะ...!\"\n[s2] \"ทำเรื่องที่สุดยอดอยู่สินะ\""
1007206-21 = "ก็นะ... มันไม่ใช่เรื่องยากอะไรสักหน่อย"
1007206-22 = "พอเก็บขยะเสร็จแล้ว ภาพทิวทัศน์ที่มองเห็นใต้น้ำก็สวยสุดยอดเลยละ"
1007206-23 = "พอดำน้ำลึกในทะเลที่ใสสะอาดราวกับไม่เคยมีมนุษย์ย่างกรายลงไป บางครั้งก็รู้สึกเหมือนตัวเองกลาย#nเป็นปลาจริงๆ ได้ขึ้นมาน่ะ"
1007206-24 = "[s3] \"ดำน้ำลึกงั้นเหรอ...\"\n[s4] \"ครูเองก็อยากลองดำน้ำลึกดูสักครั้งจัง\""
1007206-27 = "หืม? คุณครูไม่เคยดำน้ำลึกมาก่อนเลยเหรอ?"
1007206-28 = "อันที่จริง... การดำน้ำคือการที่ดำลงไปใต้น้ำแล้วก็หายใจผ่านสน็อกเกิล คนที่เริ่มหัดใหม่ๆ ก็เลยกลัว#nจนไม่อยากลองน่ะ"
1007206-29 = "แต่ว่าถ้ามีผู้เชี่ยวชาญคอยแนะนำอยู่ข้างๆ ละก็ จะเป็นเรื่องง่ายกว่าการดำน้ำอีกนะ..."
1007206-34 = "คุณครู ถ้าคุณครูโอเคละก็ มาลองดำน้ำดูสักครั้งมั้ยล่ะ? ฉันมีอุปกรณ์อยู่ด้วยนะ"
1007206-35 = "ถ้าเกิดมีปัญหาอะไรขึ้นมา นักดำน้ำระดับมาสเตอร์อย่างฉันก็ช่วยจัดการได้อยู่แล้ว..."
1007206-36 = "[s] \"แบบนั้นไม่เป็นไรเหรอ?\""
1007206-37 = "แน่นอน เชื่อมือฉันได้เลย"
1007206-38 = "ก็นะ อย่างน้อย... ก็ถือว่าเป็นการตอบแทนคุณครู ฉันจะรู้สึกโล่งใจขึ้นหน่อย..."
1007206-42 = "ยังไงก็เถอะ คุณครูกลับไปเปลี่ยนชุดว่ายน้ำมาก่อนแล้วกัน"
1007206-43 = "ระหว่างนั้นฉันจะตรวจเช็กสภาพของสน็อกเกิลกับหน้ากากไว้รอ"
1007206-46 = "(ซากิช่วยคุณครูสวมอุปกรณ์และเริ่มดำลงไปในน้ำ...)"
1007206-53 = "― [log=사키 수영복](เอาละ คุณครู ใจเย็นๆ แล้วมองมาทางนี้สิ)[/log][wa:1940] "
1007206-56 = "― [log=사키 수영복](ใช่แล้วค่อยๆ... ค่อยๆ หายใจออกอย่างช้าๆ)[/log][wa:1860] "
1007206-59 = "― [log=사키 수영복](ฮิฮิ... สมกับที่เป็นคุณครูจริงๆ เรียนรู้ได้ไวมากเลยนะ)[/log][wa:920] "
1007206-62 = "― [log=사키 수영복](...รู้สึกแปลกๆ จังแฮะ)[/log][wa:1110] "
1007206-65 = "― [log=사키 수영복](พอมาอยู่ใต้น้ำกับคุณครูสองคน โดยไม่พูดอะไร...)[/log][wa:1270] "
1007206-67 = "― [log=사키 수영복](และใช้แค่สายตากับท่าทางสื่อสารกันแบบนี้...)[/log][wa:330] "
1007206-70 = "― [log=사키 수영복](มันเหมือนกับ...)[/log]"
1007206-73 = "― [log=사키 수영복](หืม...? ฉันเหมือนหายใจไม่ค่อยสะดวกงั้นเหรอ?)[/log][wa:360] "
1007206-76 = "― [log=사키 수영복](เปล่า! ไม่มีอะไร ฉันไม่เป็นไร!)[/log][wa:1100] "
1007206-79 = "― [log=사키 수영복](แต่จังหวะการหายใจ ...)[/log][wa:790] "
1007206-81 = "― [log=사키 수영복](ไม่ค่อยเสถียรเหมือนตอนปกติเลยแฮะ...)[/log][wa:10] "
1007206-84 = "― [log=사키 수영복](...ว่าแล้วเชียว การมาดำน้ำกับคุณครูแบบนี้)[/log]"
1007206-86 = "― [log=사키 수영복](มันคงจะเร็วเกินไปสำหรับฉันสินะ..)[/log][wa:1590] "
1007206-89 = "(หลังจากนั้น คุณครูก็ใช้เวลาดำน้ำดูรอบๆ อย่างสนุกสนานกับซากิ)"
1007206-92 = "คุณครู... ดำน้ำวันนี้เป็นยังไงบ้าง?"
1007206-93 = "[s] \"เป็นประสบการณ์ที่สุดยอดเลย!\""
1007206-94 = "ฮิฮิ... คุณครูสนุกก็ดีแล้วละ"
1007206-98 = "...ที่จริงฉันก็แอบกังวลอยู่เหมือนกัน"
1007206-99 = "ผู้ใหญ่มักจะผ่านอะไรมาเยอะ และมักจะมีประสบการณ์ในเรื่องที่ฉันยังไม่เคยอยู่ด้วย..."
1007206-100 = "...ในฐานะพลชี้เป้า ฉันมักจะคอยชี้นำเป้าหมายให้คนอื่นอยู่เสมอๆ  แต่วันนี้ฉันรู้สึกกังวลนิดหน่อย#nว่าจะแนะนำอะไรให้คุณครูไม่ได้"
1007206-101 = "[s] \"ไม่เห็นต้องห่วงเรื่องนั้นเลย\""
1007206-102 = "แต่ว่า... คุณครูคอยช่วยฉันมาตั้งเยอะแล้ว ถ้าฉันช่วยอะไรคุณครูไม่ได้เลย..."
1007206-103 = "แบบนั้นมันไม่ยุติธรรมนี่นา"
1007206-104 = "[s] \"ปกติโลกเราก็ไม่ได้ยุติธรรมหรอกนะ\""
1007206-108 = "น่าหงุดหงิดจริงๆ..."
1007206-109 = "ยังไงก็เถอะ ดีแล้วละนะที่คุณครูชอบดำน้ำน่ะ"
1007206-114 = "เพราะงั้นหลังจากนี้ ถ้าอยากดำน้ำอีกเมื่อไร ก็บอกฉันได้เลยนะ"
1007206-115 = "ถึงตอนนั้น ฉันจะเป็น 'บัดดี้' ของคุณครูให้เอง"

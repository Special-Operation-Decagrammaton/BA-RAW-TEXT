[translation]
1007206-1 = "深海，淺息"
1007206-5 = "（在漁村的碼頭附近散步時，偶然遇見了正在浮潛的咲希）"
1007206-6 = "[ns]「嗨，咲希。」"
1007206-10 = "咦，這不是老師嗎。"
1007206-11 = "你在做什麼？"
1007206-12 = "[s]「在散步哦。」"
1007206-14 = "[ns]「咲希呢？」"
1007206-15 = "我在回收沉到海底的垃圾。"
1007206-16 = "廢棄的漁具或塑膠袋之類的海洋垃圾常常會卡在海底的岩石上。"
1007206-17 = "這次受到村民們很多幫助，所以我想在練習潛水時順便幫忙清理一點垃圾。"
1007206-18 = "[s1]「真棒……！」\n[s2]「咲希真了不起。」"
1007206-21 = "嘛，舉手之勞而已。"
1007206-22 = "而且沒有垃圾的海裡才能讓人身心舒暢啊。"
1007206-23 = "在乾淨的大海裡游泳，有種自己好像也變成了一條魚的感覺。"
1007206-24 = "[s3]「浮潛啊……真不錯呢。」\n[s4]「有機會的話我也想試試看。」"
1007206-27 = "老師沒有潛水的經驗嗎？"
1007206-28 = "不過也是……畢竟要潛入海的深處，呼吸也必須依靠呼吸管，#n會害怕也不是不能理解……"
1007206-29 = "但如果有指導員在的話，有時反而比游泳更容易享受。"
1007206-34 = "對了，老師。難得有這種機會，要不要試著挑戰看看？#n裝備的話我還有預備的……"
1007206-35 = "就算萬一發生了什麼狀況，有身為名仕潛水員的我在也不會有問題。"
1007206-36 = "[s]「真的可以嗎？」"
1007206-37 = "當然。儘管交給我。"
1007206-38 = "雖然跟當初的計畫不太一樣……如果這能做為平時照顧的回報的話……"
1007206-42 = "總之，先去換泳裝過來吧。"
1007206-43 = "我會幫你做裝備的檢查。"
1007206-46 = "（與咲希手牽著手，先讓身體熟悉水裡的環境……）"
1007206-53 = "― [log=사키 수영복]（來，老師。保持冷靜，看我這邊）[/log][wa:2900] "
1007206-56 = "― [log=사키 수영복]（沒錯沒錯，慢慢來。慢慢地呼氣）[/log][wa:2860] "
1007206-59 = "― [log=사키 수영복]（呵呵，不愧是老師。學的速度真快）[/log][wa:2440] "
1007206-62 = "― [log=사키 수영복]（……有股奇妙的感覺）[/log][wa:1590] "
1007206-65 = "― [log=사키 수영복]（在海中和老師兩人獨處，不發一語）[/log][wa:2470] "
1007206-67 = "― [log=사키 수영복]（只憑視線和手勢對話……）[/log][wa:1570] "
1007206-70 = "― [log=사키 수영복]（簡直就像……）[/log]"
1007206-73 = "― [log=사키 수영복]（……咦？我看起來有點呼吸困難？）[/log][wa:1480] "
1007206-76 = "― [log=사키 수영복]（沒事，完全沒有問題。我不要緊！）[/log][wa:1700] "
1007206-79 = "― [log=사키 수영복]（總覺得，跟平時不一樣……）[/log][wa:1150] "
1007206-81 = "― [log=사키 수영복]（呼吸不太穩定）[/log][wa:780] "
1007206-84 = "― [log=사키 수영복]（……和老師一起潛水）[/log]"
1007206-86 = "― [log=사키 수영복]（對我來說可能還太早了啊）[/log][wa:2430] "
1007206-89 = "（之後，和咲希一起享受了潛水的樂趣）"
1007206-92 = "老師，第一次潛水的體驗怎麼樣啊？"
1007206-93 = "[s]「真是太棒了！」"
1007206-94 = "呵呵，有讓老師開心就再好不過了。"
1007206-98 = "……其實我有點不安。"
1007206-99 = "大人經歷的事情很多，#n所以對我來說很新鮮，但對老師並非如此的事應該也不少吧……"
1007206-100 = "所以身為先鋒的我，是不是沒辦法在前方指引著老師呢……"
1007206-101 = "[s]「不用強迫自己帶領我沒關係的。」"
1007206-102 = "不過……總是受到老師的幫助，卻什麼也無法回報──"
1007206-103 = "那不是，很不公平嗎。"
1007206-104 = "[s]「這世界本來就是不公平的。」"
1007206-108 = "……哼。"
1007206-109 = "嘛，老師看起來也挺喜歡潛水的……"
1007206-114 = "下次還想在海裡游泳的話就告訴我一聲吧！"
1007206-115 = "無論什麼時候，我都會當老師的[ruby=夥伴]潛伴[/ruby]的。"

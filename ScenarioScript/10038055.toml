[translation]
10038055-16 = "[ns]「妃姬！」"
10038055-17 = "別動，老師！"
10038055-18 = "這裡……很危險。#n而且誡也是……！"
10038055-19 = "不過……這可真奇怪。#n汝對自己的身體做了什麼……！"
10038055-25 = "啊啊，現在這具身體已經獲得了仙丹的效果。"
10038055-26 = "對你這個優柔寡斷的人而言，想必是場艱難的戰鬥吧？"
10038055-27 = "什麼……！"
10038055-32 = "難道我說的有錯嗎？你現在也還在猶豫不決吧？"
10038055-33 = "無論是對玄武商會與山海經的控制，抑或是對月影祭、玄龍門和京劇部的處置……"
10038055-34 = "而其中最根本的問題，在於你表面上宣稱要保護山海經的傳統──"
10038055-39 = "內心卻懷有完全不同的想法對吧？"
10038055-41 = "……！？"
10038055-42 = "咯咯咯。一副「這是什麼意思」和「你怎麼會知道」的表情呢。"
10038055-43 = "一派胡言……！"
10038055-45 = "事到如今還想繼續虛張聲勢嗎？#n你的行為早已印證了你的心思。"
10038055-46 = "玄龍門的各位，應該多少也心裡有數了吧？"
10038055-55 = "表面上說要守護山海經傳統的玄龍門門主，其內心深處似乎懷有不同的想法。"
10038055-60 = "……！"
10038055-61 = "（門主大人他……果然……！？）"
10038055-62 = "（你在說什麼！怎麼能聽信這個罪犯的話！？）"
10038055-63 = "（但，但是……）"
10038055-64 = "（……）"
10038055-68 = "咯咯咯。哈哈哈哈哈……！"
10038055-69 = "忠誠之人儘管忠誠，懷疑之人儘管懷疑吧。"
10038055-70 = "即便是再偉大的統治者，也無法掌控人心。"
10038055-71 = "我就在這裡告訴你吧──你將經歷和我一樣的痛苦。"
10038055-72 = "什麼……？"
10038055-73 = "像我一樣，感受被逐出山海經的痛苦。"
10038055-74 = "像我一樣，歷經當無所屬學生的艱辛。"
10038055-75 = "像我一樣，體會無從尋得歸屬的虛無。"
10038055-76 = "那不過是……！"
10038055-78 = "是你讓我變成這樣的，妃姬。"
10038055-82 = "是妾身……？"
10038055-88 = "沒錯。不是別人，就是你。"
10038055-89 = "讓我心生歹念、執意復仇、充滿怨懟──全都是你的責任。"
10038055-90 = "這不正是身處門主之位應負的責任嗎？"
10038055-91 = "……！？"
10038055-92 = "無論花朵散落、洪水氾濫，還是天打雷劈──全都是你的責任。"
10038055-93 = "承擔所有責任，不做任何辯解──這不正是山海經的門主嗎？"
10038055-94 = "那是……妾身……！"
10038055-95 = "一切都是為了山海經……因為學生們在受苦……"
10038055-96 = "所以你才會為了大局而犧牲小節嗎？"
10038055-97 = "……！！！"
10038055-98 = "沒錯，這樣就對了。#n我就想看到你這個表情。也許我就是為了這一刻而回來的吧。"
10038055-99 = "都看仔細了，玄龍門──這就是你們的門主。#n你們的山海經，現在已經成為沒落的遺跡。"
10038055-100 = "他其實對守護過去和傳統毫無興趣。#n如果只關心個人的榮耀，倒還能理解為凡夫俗子。"
10038055-101 = "然而實際上，他只是個不明白門主之位的意義──#n就連自己究竟追求著什麼都搞不清楚的愚蠢之人罷了。"
10038055-107 = "……"
10038055-108 = "……！"
10038055-110 = "咯咯咯……我所知道的玄龍門，是害怕自我思考之人。"
10038055-117 = "不過，現在是時候輪到你們思考了。"
10038055-118 = "用你們的腳行走，用你們的嘴回答。#n用你們的手抉擇，用你們的眼見證。"
10038055-119 = "現在的山海經，需要妃姬嗎？"
10038055-120 = "現在的玄龍門，需要妃姬嗎？"
10038055-125 = "……！"
10038055-126 = "……！"
10038055-131 = "[ns]「美奈！令女！」"
10038055-135 = "！？"
10038055-136 = "！？"
10038055-137 = "[s]「我們快離開這裡吧！妃姬就麻煩你們了！」"
10038055-141 = "我，我知道了，老師！"
10038055-142 = "是！"
10038055-164 = "……"
10038055-165 = "真掃興。明明就只差臨門一腳了……"
10038055-166 = "……"
10038055-167 = "竟然在這種時候率先出手……夏萊的老師，是個比想像中更大的變數呢。"
10038055-168 = "算了，無所謂。"
10038055-169 = "我的目標是製作更完美的仙丹。其他事情根本無足掛齒。"
10038055-173 = "咯咯咯……那麼就重新開始吧。"
10038055-174 = "這次一定要在不被任何人干擾的情況下完成大業。"

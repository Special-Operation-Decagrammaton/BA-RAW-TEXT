[translation]
10038055-16 = "[ns] \"คิซากิ!\""
10038055-17 = "อย่าคิดทำอะไรนะ ครู!"
10038055-18 = "ที่นี่... อันตราย ไคก็ด้วย...!"
10038055-19 = "แต่ถึงอย่างนั้น... ก็ถือว่าน่าอัศจรรย์เลยนะ เธอทำอะไรกับร่างกายตัวเองน่ะ...!"
10038055-25 = "อ่า... นั่นเป็นเพราะน้ำอมฤตที่กำลังออกฤทธิ์อยู่ในร่างกายของฉันน่ะ..."
10038055-26 = "สำหรับคนที่ทั้งเฉื่อยชาและสองจิตสองใจอย่างเธอ มันคงเป็นการต่อสู้ที่ลำบากเลยใช่มั้ยล่ะ?"
10038055-27 = "หมายความ... ว่าอย่างไรน่ะ...!"
10038055-32 = "ไม่ใช่หรอกเหรอ? ตอนนี้เธอก็กำลังคิดอยู่ใช่มั้ยล่ะ?"
10038055-33 = "ทั้งควบคุมย่านการค้าเทพเต่าดำและซานไห่จิง ทั้งจัดเทศกาลเงาจันทร์ และเรื่องของมังกรดำกับ#nชมรมการแสดงงิ้วด้วย..."
10038055-34 = "ภายนอกก็ดูเหมือนอ้างว่าจะรักษาประเพณีของซานไห่จิง"
10038055-39 = "แต่ในใจจริงแล้วก็มีความคิดอื่นที่แตกต่างออกไปอย่างสิ้นเชิงใช่มั้ยล่ะ?"
10038055-41 = "...?!"
10038055-42 = "หึหึหึ สีหน้าของเธอกำลังถามว่าฉันพูดเรื่องอะไร และฉันรู้เรื่องนั้นได้ยังไงสินะ "
10038055-43 = "พูดเรื่องอันเป็นเท็จอะไรกัน...!"
10038055-45 = "คิดจะมาวางท่าใหญ่โตถึงที่นี่เลยงั้นสิ? การกระทำที่ผ่านมาของเธอก็น่าจะพิสูจน์ความรู้สึกของเธอได้#nแล้วนะ?"
10038055-46 = "มังกรดำ จริงๆ แล้วพวกเธอก็สังเกตได้อยู่ไม่ใช่เหรอ?"
10038055-55 = "ว่าประมุขแห่งมังกรดำที่เป็นผู้พิทักษ์ประเพณีของซานไห่จิงอาจจะมีความคิดอย่างอื่นอยู่ในใจน่ะ"
10038055-60 = "...!"
10038055-61 = "(จริงด้วยสินะ... ท่านประมุขของเรา...?!)"
10038055-62 = "(พูดเรื่องอะไรน่ะ! เธอเชื่อคนร้ายแบบนั้นเหรอ?!)"
10038055-63 = "(ตะ... แต่ว่า...)"
10038055-64 = "(...)"
10038055-68 = "หึหึหึ ฮ่าฮ่าฮ่าฮ่าฮ่า...!"
10038055-69 = "ผู้ที่ภักดีก็ย่อมจงรักภักดีอยู่แล้ว ส่วนคนที่มีความคลางแคลง ก็ย่อมตั้งข้อสงสัยได้"
10038055-70 = "แต่ไม่ว่าจะเป็นผู้ปกครองที่ยิ่งใหญ่แค่ไหน ก็คงควบคุมจิตใจของคนอื่นไม่ได้หรอก"
10038055-71 = "ฉันจะบอกให้รู้ไว้นะ ฉันจะทำให้เธอต้องเผชิญสิ่งเดียวกับฉัน"
10038055-72 = "ว่าอย่างไรนะ...?"
10038055-73 = "ฉันจะทำให้เธอเจ็บปวดที่ต้องถูกไล่ออกจากซานไห่จิงยังไงล่ะ"
10038055-74 = "ฉันจะทำให้เธอต้องพบเจอความยากลำบากในฐานะนักเรียนไร้สังกัดเหมือนกับฉัน"
10038055-75 = "ฉันจะทำให้เธอสัมผัสกับความว่างเปล่าของการเร่ร่อน ทั้งไม่มีที่ให้พึ่งพิงเหมือนกันกับฉัน"
10038055-76 = "แต่ว่านั่นมัน...!"
10038055-78 = "เธอทำให้ฉันเป็นแบบนี้ คิซากิ"
10038055-82 = "เรา... น่ะหรือ?"
10038055-88 = "ใช่ เป็นเธอ ไม่ใช่ใครอื่น"
10038055-89 = "เธอทำให้ฉันต้องร้าย ทำให้ฉันอยากแก้แค้น ทำให้ฉันอาฆาตพยาบาท ทั้งหมดนี้คือความผิดของเธอ"
10038055-90 = "และจะว่าไป เธอเป็นถึงท่านประมุขเลยนะ?"
10038055-91 = "...?!"
10038055-92 = "ไม่ว่าบุปผาจะร่วงโรย วารีพิโรธ หรือนภาคำรามก้อง เธอก็ต้องเป็นคนรับผิดชอบ"
10038055-93 = "รับผิดชอบทุกอย่างโดยไม่มีข้อแก้ตัวใดๆ เพราะนั่นคือหน้าที่ของประมุขแห่งซานไห่จิง"
10038055-94 = "เรื่องนั้น... เรา...!"
10038055-95 = "เราทำไปเพื่อซานไห่จิง... เพราะมีนักเรียนมากมายที่ต้องเจ็บปวด..."
10038055-96 = "กลัวว่าปลาเน่าตัวเดียวเหม็นไปทั้งข้อง ก็เลยเลือกกำจัดปลาตัวนั้นงั้นเหรอ?"
10038055-97 = "...!!!"
10038055-98 = "ใช่ ต้องอย่างนี้สิ ฉันอยากเห็นใบหน้าแบบนี้มานานแล้ว บางทีฉันอาจจะกลับมาเพื่อช่วงเวลานี้ก็ได้นะ"
10038055-99 = "ดูไว้ซะ มังกรดำ นี่ละประมุขของพวกเธอ นี่คือซานไห่จิงของพวกเธอ เป็นแค่ส่วนที่เหลือของอดีตที่#nตกต่ำลง"
10038055-100 = "แล้วประมุขที่ว่าก็ไม่ได้สนใจจะรักษาอดีตหรือประเพณีเอาไว้เลย ถ้าเป็นคนที่สนใจเพียงความสำเร็จ#nของตัวเอง ก็อาจเรียกได้ว่าเป็นคนธรรมดาทั่วไป หากแต่เด็กคนนี้เป็นประมุข"
10038055-101 = "แต่ในความจริงแล้ว เด็กคนนี้ไม่แม้แต่จะเข้าใจความหมายของตำแหน่งประมุข และเป็นเด็กโง่เขลาที่#nไม่รู้ว่าตัวเองต้องการอะไรกันแน่"
10038055-107 = "..."
10038055-108 = "...!"
10038055-110 = "หึหึหึ... มังกรดำที่ฉันรู้จักเป็นพวกที่กลัวที่จะคิดตัดสินอะไรเองงั้นเหรอ?"
10038055-117 = "แต่ก็ถึงเวลาที่ต้องคิดกันเองบ้างแล้วละ"
10038055-118 = "จงเดินด้วยเท้าของตัวเอง ตอบด้วยปากของตัวเอง คว้าสิ่งที่ต้องการด้วยมือของตัวเอง และเห็นความจริงด้วยตาของตัวเอง"
10038055-119 = "คิซากิยังจำเป็นต่อซานไห่จิงในตอนนี้หรือเปล่า?"
10038055-120 = "และคิซากิยังจำเป็นต่อมังกรดำในตอนนี้หรือไม่?"
10038055-125 = "...!"
10038055-126 = "...!"
10038055-131 = "[ns] \"มินะ! เรย์โจว!\""
10038055-135 = "?!"
10038055-136 = "!?"
10038055-137 = "[s] \"ออกจากตรงนี้ไปเถอะ! ฝากดูแลคิซากิด้วย!\""
10038055-141 = "ขะ... เข้าใจแล้ว คุณครู!"
10038055-142 = "ค่ะ!"
10038055-164 = "..."
10038055-165 = "หมดสนุกแล้วสินะ เมื่อกี้ยังสนุกอยู่เลย"
10038055-166 = "..."
10038055-167 = "คิดจะเคลื่อนไหวก่อนอย่างนั้นสินะ คุณครูจากชาเล่ต์? เป็นคนที่เป็นตัวแปรสำคัญมากกว่าที่ฉันคิดนะ"
10038055-168 = "ถ้างั้นก็ย่อมได้ ตอนนี้เรื่องอื่นไม่สำคัญแล้วละ"
10038055-169 = "เป้าหมายของฉันคือการทำน้ำอมฤตที่สมบูรณ์แบบ ส่วนเรื่องอื่นฉันไม่สนหรอกว่าจะเป็นยังไง"
10038055-173 = "หึหึหึ... ถ้าอย่างนั้น... ก็มาเริ่มทุกอย่างอีกครั้งกันเลย"
10038055-174 = "แล้วครั้งนี้ฉันจะบรรลุเป้าหมายที่ยิ่งใหญ่โดยไม่มีใครรบกวน"

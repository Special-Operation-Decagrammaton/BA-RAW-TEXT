[translation]
10038055-16 = "[ns] \"Kisaki!\""
10038055-17 = "Stay back, Sensei!"
10038055-18 = "It's too dangerous. She's still on the move!"
10038055-19 = "...What have you done to yourself?"
10038055-25 = "Ahh! ...I've sampled the fruits of my labor, that's all."
10038055-26 = "It must be hard for you to understand, stuck in your old ways, and at the same time, so full of hesitation."
10038055-27 = "What...are you saying...?"
10038055-32 = "You're STILL hesitating, aren't you?"
10038055-33 = "All your restrictions on the Promenade and the Festival, your dealings with Genryumon and the Peking Opera Club."
10038055-34 = "You claim to stand for tradition, and the pride of Shanhaijing."
10038055-39 = "But inside, your thoughts are something else entirely."
10038055-41 = "*gasp*"
10038055-42 = "Keh heh. I see your denial. And behind it, your wonderment at how I could possibly know what you're thinking. "
10038055-43 = "What nonsense are you spewing, you...?"
10038055-45 = "Oh, by all means, keep up the facade as best you can. But your actions show what you truly stand for."
10038055-46 = "You, proud Genryumon enforcers, you know exactly what I mean. You've realized it in your hearts already."
10038055-55 = "You see the mask she's wearing. And you know she's someone else behind it. Not the champion of tradition she'd have you believe in."
10038055-60 = "......"
10038055-61 = "Is the president really...?"
10038055-62 = "What are you even asking? Don't listen to that criminal!"
10038055-63 = "B-But..."
10038055-64 = "..."
10038055-68 = "Keh heh, hahahahaha...!"
10038055-69 = "Anyone can speak a pledge of loyalty. Anyone can harbor doubts."
10038055-70 = "Even the greatest ruler cannot control the hearts of the people."
10038055-71 = "And mark my words. One day, you'll all share my experience."
10038055-72 = "Meaning what?"
10038055-73 = "You'll be cast out of Shanhaijing. You'll know the pain of it, the shame, just as I did."
10038055-74 = "You'll know the hardships of being an unafilliated student, just as I did."
10038055-75 = "You'll know the emptiness of wandering homeless, just as I did."
10038055-76 = "And all because..."
10038055-78 = "...you made me this way, Kisaki."
10038055-82 = "I did...?"
10038055-88 = "Yes, you. None other than you."
10038055-89 = "You filled my heart with venom, with resentment, with the need for revenge. Every drop of that is all your fault."
10038055-90 = "And what is the role of the President if not accepting fault?"
10038055-91 = "*gasp*"
10038055-92 = "The rulers of old would take the blame for everything. Storms, fires, floods."
10038055-93 = "All the responsibility, with no excuses. That is what it means to hold your station, Madam."
10038055-94 = "That's... I...!"
10038055-95 = "It was all for Shanhaijing... I did what I did to you because the students were suffering..."
10038055-96 = "So you made a small sacrifice for the greater good?"
10038055-97 = "*deep breath*"
10038055-98 = "Yes, that's it. That's the look I wanted to see. That expression alone has been worth the journey here."
10038055-99 = "Take a good look, Genryumon. This is your president. Behold the pale shadow of your glorious past."
10038055-100 = "She has no love for your traditions. She's not even in it for personal glory — that, at least, would be understandable."
10038055-101 = "She's nothing but a foolish child with no idea what it means to hold her station, no idea what she truly wants."
10038055-107 = "......"
10038055-108 = "......"
10038055-110 = "Keh heh... Genryumon's members aren't always known to think for themselves."
10038055-117 = "But the time has come for all of you to do so."
10038055-118 = "Stand on your own two feet, look through your own eyes, and answer in your own words:"
10038055-119 = "Is Kisaki what Shanhaijing needs?"
10038055-120 = "Is Kisaki what Genryumon needs?"
10038055-125 = "......"
10038055-126 = "......"
10038055-131 = "[ns] \"Mina! Reijo!\""
10038055-135 = "*gasp*"
10038055-136 = "*gasp*"
10038055-137 = "[s] \"Grab Kisaki, and let's get out of here!\""
10038055-141 = "Y-Yes, Sensei!"
10038055-142 = "Understood!"
10038055-164 = "......"
10038055-165 = "*sigh* I wasn't finished. Very rude of you."
10038055-166 = "......"
10038055-167 = "Still, fine initiative, Sensei. You're not as predictable as I thought."
10038055-168 = "But it doesn't matter anymore."
10038055-169 = "All I have left to do is perfect the potion."
10038055-173 = "Keh heh... I'll consider this a fresh start."
10038055-174 = "This time, I'll get everything I want, and no one will hold me back."

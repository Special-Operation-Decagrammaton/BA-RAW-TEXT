[translation]
1008905-1 = "又被凍結的帳戶"
1008905-3 = "（不知道為什麼，亞瑠到了約好的時間仍然沒有出現）"
1008905-7 = "[ns1]「發生了什麼事嗎……」\n[ns2]（是不是該聯絡一下……？）"
1008905-11 = "不，不是，那個，就是……"
1008905-12 = "請，請等一下！麻煩稍等好嗎？#n為，為什麼……？該不會又……？"
1008905-14 = "[ns3]「……是亞瑠的聲音？」\n[ns4] 走向聲音傳來的方向"
1008905-18 = "唔嗯，這樣有點麻煩呢……我知道學生有學生的苦衷……"
1008905-19 = "你，你誤會了……我真的有錢，只是……！"
1008905-20 = "不不不，我沒有要責怪你的意思，你別緊張。#n畢竟每個人的情況都不一樣。"
1008905-21 = "我也很想手下留情……"
1008905-22 = "不過如果是便宜的衣服還好說，像這種貴重衣服的修補費，賒帳實在有點……"
1008905-23 = "當然我絕對不是懷疑你會賴帳。#n只是這是本店的營業方針，還請同學你見諒。"
1008905-24 = "[s5]「亞瑠？怎麼了嗎？」\n[s6] 詢問情況"
1008905-27 = "……嗯？……老師？"
1008905-28 = "嗯？"
1008905-32 = "……老師！？！？#n你，你你你怎麼在這裡……！！"
1008905-33 = "約，約好的時間應該還沒……！！"
1008905-34 = "……啊。"
1008905-35 = "已經這麼晚了……！？！？"
1008905-40 = "[ns7]「原來如此，是因為卡被封鎖……」\n[ns8]「所以才沒辦法付修補費啊。」"
1008905-43 = "看起來是風紀委員會又把我的帳戶凍結了。#n本來以為這次不會被他們發現的……"
1008905-44 = "唉……真傷腦筋。#n想解除凍結得花上一點時間。"
1008905-48 = "唔……"
1008905-49 = "啊……！真是的……！真不想讓老師看到我這個樣子……！！"
1008905-50 = "嗯？你問我身上有沒有現金？"
1008905-51 = "當然有，不過這次的修補費……"
1008905-55 = "因為是很值錢的衣服。#n材料費和人工費都不低……"
1008905-56 = "而這位學生身上的現金還遠遠不夠……"
1008905-57 = "……嗯？"
1008905-58 = "是什麼樣的衣服？#n啊啊，就是這件……"
1008905-63 = "[ns9]「哎呀，原來這一件啊……」\n[ns10]「如果是這一件的話，修補費一定很貴的。」"
1008905-66 = "這就是問題所在。#n如果是普通衣服的話，稍微賒帳倒是沒關係，但這個就有點……"
1008905-67 = "……嗯？什麼？"
1008905-68 = "你要幫他付修補費？"
1008905-69 = "……老師！？！？"
1008905-70 = "問我可不可以？#n當，當然沒問題。而且這位學生今天好像也需要這件衣服……"
1008905-71 = "真是太好了，同學！太好了！哈哈哈！！"
1008905-76 = "（之後幫忙付了修補費，和拿著衣服的亞瑠一起離開了商店街）"
1008905-82 = "呵呵……謝謝你，老師。#n一不小心又欠債了呢。"
1008905-83 = "這，這是那個……該怎麼說呢……"
1008905-84 = "不對，不是該怎麼說，而是該怎麼表達……那個……"
1008905-85 = "……投，投資！"
1008905-86 = "對，沒錯！就是投資！#n就當作是老師對我跟便利屋的信用投資吧！！"
1008905-87 = "那個……嗯……"
1008905-91 = "謝，謝謝你……還有，抱歉……給你添麻煩了……"
1008905-92 = "……嗯？"
1008905-93 = "你說不用客氣……？反正常常發生……？"
1008905-94 = "那，那是什麼意思？什麼叫常常發生？"
1008905-95 = "[s11]「在做生意的過程中，偶爾也會出現以信用來解決的事情。」\n[s12]「我有時也會拜託未來的自己幫忙！」"
1008905-98 = "…………！！"
1008905-99 = "呵，呵呵……原來如此，不愧是老師。#n果然是個值得諮詢的人。"
1008905-100 = "我明白了。#n不過即便如此，我還是得把剛剛說過的話重新說一遍。"
1008905-104 = "……這是投資，老師。#n我陸八魔亞瑠會把今天的事銘記在心。"
1008905-105 = "以後有需要幫忙的事情，請隨時聯絡我吧！"
1008905-106 = "呵呵，呵呵呵……！"
1008905-111 = "……啊，對了。"
1008905-114 = "話說回來……"
1008905-115 = "今天的修補費，該怎麼還你呢？"
1008905-119 = "（之後雖然再三拒絕，亞瑠還是在帳號恢復後立刻歸還了修補費）"

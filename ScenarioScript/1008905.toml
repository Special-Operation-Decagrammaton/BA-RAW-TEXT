[translation]
1008905-1 = "My Account Got Frozen Again"
1008905-3 = "At the time of our scheduled meeting, Aru was mysteriously absent."
1008905-7 = "[ns1] \"I wonder what's the hold up...\"\n[ns2] \"Should I try to call her?\""
1008905-11 = "Oh, no. I'm afraid that..."
1008905-12 = "W-Wait a minute! Give me just a little longer! Wh-Why? Why is it happening again?!"
1008905-14 = "[ns3] \"...Aru?\"\n[ns4] Head towards the direction of her voice."
1008905-18 = "Hmm. This is quite troublesome... Uh, for you especially miss..."
1008905-19 = "L-Listen... It's not that I don't have money! I have so much money, it's just—!"
1008905-20 = "Oh, no, no. I'm not judging you, so there's no need to be embarrassed. This sort of thing just happens sometimes."
1008905-21 = "While we'd be more than happy to work out a long-term pay plan..."
1008905-22 = "The alterations you've requested for your outfit are quite expensive. Without an upfront payment, my options are limited, you see."
1008905-23 = "Not that we're assuming you would take a pay plan then be unable to pay later. We believe you could, it's just a matter of store policy. Please understand."
1008905-24 = "[s5] \"Aru? What's going on here?\"\n[s6] Ask the clerk about the situation."
1008905-27 = "...Huh? Sensei?"
1008905-28 = "Well?"
1008905-32 = "Wh-What are you doing here?! "
1008905-33 = "I-I was supposed to meet you at...!!"
1008905-34 = "*gasp*"
1008905-35 = "I've been here that long?!"
1008905-40 = "[ns7] \"Ah, I see. Your card got declined.\"\n[ns8] \"Which meant you couldn't pay the alteration fee.\""
1008905-43 = "The Prefect Team found my credit account again and froze it. I thought I had covered my tracks perfectly this time..."
1008905-44 = "*sigh*...This'll take forever to fix. What a pain..."
1008905-48 = "Hmm..."
1008905-49 = "Ugh! This is NOT how I wanted you to see me! Seriously!"
1008905-50 = "And yes. I do have cash. That's not the problem!"
1008905-51 = "The alteration fee is through the roof this time."
1008905-55 = "It's quite an expensive outfit. It'll take a lot of materials and labor to make the changes needed."
1008905-56 = "The money she has on her would be nowhere near enough..."
1008905-57 = "...Pardon?"
1008905-58 = "Which outfit is it? It's that one right there."
1008905-63 = "[ns9] \"Oh...THAT dress...\"\n[ns10] \"Yep, altering that is going to cost quite a bit.\""
1008905-66 = "What should I do? Usually I just put alterations for her regular clothes on credit. Except now her credit's frozen. What am I going to do...?"
1008905-67 = "...Huh? What was that?"
1008905-68 = "You'll pay the whole alteration fee?!"
1008905-69 = "Sensei, you can't!"
1008905-70 = "So I'll be taking the payment from you? Very well. The young miss did seem quite desperate."
1008905-71 = "Wahoo! I'm in the clear! Ahahaha!"
1008905-76 = "After paying the alteration fee and getting the outfit, I left the store with Aru."
1008905-82 = "Heehee... Thanks, Sensei. I owe you one."
1008905-83 = "U-Um, this is... How do I put it...?"
1008905-84 = "N-No. It's not about what I should say...rather...it's um..."
1008905-85 = "...It's an i-investment!"
1008905-86 = "Yes, that's right! You've put forth a significant investment in the future of me and Problem Solver 68!"
1008905-87 = "So...uh..."
1008905-91 = "Th-Thank you... I'm sorry if I placed a burden on you because of my mistakes."
1008905-92 = "Huh?"
1008905-93 = "This kind of thing happens all the time?"
1008905-94 = "You're telling me people just throw things on credit willy-nilly?!"
1008905-95 = "[s11] \"In business, having a good line of credit is vital.\"\n[s12] \"I can't count how many times I've needed to take a loan from Future Sensei!\""
1008905-98 = "*gasp*!"
1008905-99 = "H-Heehee... You always know just what to say, Sensei."
1008905-100 = "I see. In that case, I guess what I said earlier means even more now."
1008905-104 = "...Thank you for your investment, Sensei. I, Rikuhachima Aru, will never forget your support, today."
1008905-105 = "The next time you need anything, just ask!"
1008905-106 = "Heehee, heeheehee...!"
1008905-111 = "...Oh, right."
1008905-114 = "Now that I think about it..."
1008905-115 = "Where should I send the money I owe you?"
1008905-119 = "Despite my assurance that repayment wasn't necessary, Aru promptly paid me for the alteration fee after she got her credit card account back."

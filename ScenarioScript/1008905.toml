[translation]
1008905-1 = "บัญชีที่ถูกอายัดอีกครั้ง"
1008905-3 = "(ถึงเวลานัดแล้ว แต่อารุก็ยังไม่มา)"
1008905-7 = "[ns1] \"เกิดเรื่องอะไรรึเปล่านะ...\"\n[ns2] (ติดต่อไปอีกรอบดีมั้ย...?)"
1008905-11 = "อะ... อ่า คือ... คือว่า..."
1008905-12 = "ดะ... เดี๋ยวก่อนสิคะ! รอแป๊บหนึ่งนะคะ! ทะ... ทำไมล่ะ...? อย่าบอกนะคะว่า...?"
1008905-14 = "[ns3] \"เสียงอารุนี่นา...?\"\n[ns4] เดินไปตามเสียง"
1008905-18 = "อืม แบบนี้ก็ยากแล้วละคุณหนู... ถึงคุณหนูเองก็คงจะลำบากใจอยู่เหมือนกันก็เถอะ..."
1008905-19 = "คะ... คือว่า... ฉัน... ไม่ได้ไม่มีเงินนะ! ตอนนี้ฉันก็มีเงินอยู่...!"
1008905-20 = "ไม่ใช่อย่างนั้น ฉันไม่ได้ตำหนิอะไรคุณหนูหรอก ไม่ต้องตกใจขนาดนั้นก็ได้ เรื่องแบบนั้นมันเกิด#nขึ้นได้อยู่แล้ว"
1008905-21 = "ถึงฉันจะอยากปล่อยผ่านให้ก็เถอะนะ..."
1008905-22 = "ถ้าเป็นชุดธรรมดาก็ว่าไปอย่าง แต่ว่าชุดราคาแพงแบบนี้คงเย็บให้ก่อนแล้วค่อยรับเงินทีหลัง#nไม่ได้หรอก..."
1008905-23 = "ไม่ใช่ว่าฉันจะรีดไถเงินจากเด็กนักเรียนหรอกนะ อย่าเข้าใจผิดล่ะ แต่มันเป็นนโยบายของร้านน่ะ เข้าใจฉันด้วยนะ"
1008905-24 = "[s5] \"อารุ? มีเรื่องอะไรเหรอ?\"\n[s6] ถามเรื่องที่เกิดขึ้น"
1008905-27 = "หืม...? คุณครู...?"
1008905-28 = "หืม?"
1008905-32 = "คุณครู...!?!!! ทะ... ทะ... ทำไมถึงมาอยู่ที่นี่ได้...!! "
1008905-33 = "ยะ... ยังไม่ถึงเวลานัดเลยนี่...!!"
1008905-34 = "เฮือก..."
1008905-35 = "เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย...!!!!"
1008905-40 = "[ns7] \"เพราะบัตรใช้ไม่ได้ใช่มั้ย...\"\n[ns8] \"จ่ายค่าเย็บชุดไม่ได้สินะ\""
1008905-43 = "ฉันว่าคณะกรรมการวินัยต้องสืบหาบัญชีของฉันแล้วสั่งอายัดแน่ๆ เลย อุตส่าห์แอบไปเปิดบัญชี#nกับบัตรใหม่มาแล้วแท้ๆ..."
1008905-44 = "เฮ้อ... ยุ่งยากแล้วละสิ ถ้าจะเอาบัตรคืนคงต้องใช้เวลานานเลย"
1008905-48 = "อืม..."
1008905-49 = "โธ่เอ๊ย...! จริงๆ เลย...! ฉันไม่อยากให้ใครเห็นตัวเองในสภาพนี้เลย...!!"
1008905-50 = "หืม? เงินสดเหรอ...? มีไม่พอหรอก"
1008905-51 = "เงินสดที่มีตอนนี้ไม่พอจ่ายค่าเย็บชุดครั้งนี้หรอก..."
1008905-55 = "พอเป็นชุดที่ราคาแพง ค่าเย็บก็เลยแพงไปด้วยน่ะ เพราะต้องใส่ใจกับวัสดุ กับจ่ายค่าแรงแพงด้วย"
1008905-56 = "คุณหนูเลยมีเงินสดไม่พอจ่ายค่าเย็บชุดน่ะ..."
1008905-57 = "หืม...?"
1008905-58 = "ชุดอะไรงั้นเหรอ? อ่า... ชุดนี้ไง..."
1008905-63 = "[ns9] \"เอ๋... ชุดนี้มัน...\"\n[ns10] \"ถ้าเป็นชุดนี้ ค่าเย็บน่าจะแพงเลยนะ\""
1008905-66 = "ก็เลยเป็นปัญหาไงล่ะ ถ้าเป็นชุดธรรมดาก็คงให้ฝากไว้ก่อนแล้วค่อยเอาเงินมาจ่ายทีหลังได้ แต่ว่าชุดนี้..."
1008905-67 = "หืม...? ว่าไงนะ?"
1008905-68 = "จะจ่ายค่าเย็บให้แทนเหรอ...?"
1008905-69 = "คุณครู...!?!?"
1008905-70 = "จ่ายแทนได้หรือเปล่าน่ะเหรอ? ได้อยู่แล้ว ดูเหมือนเด็กคนนี้เองก็อยากได้ชุดกลับไปวันนี้เลยด้วย..."
1008905-71 = "งั้นก็ดีเลยนะ! ดีเลยละ! ฮ่าฮ่าฮ่า!!"
1008905-76 = "(หลังจากนั้นคุณครูก็จ่ายค่าเย็บชุดให้ และออกมาจากย่านการค้าพร้อมกับอารุที่ได้ชุดกลับมา)"
1008905-82 = "ฮุฮุ... ขอบคุณนะคุณครู ฉันสร้างหนี้โดยไม่ได้ตั้งใจเฉยเลย"
1008905-83 = "ระ... เรื่องนี้... จะต้องบอกว่ายังไงดี..."
1008905-84 = "มะ... ไม่สิ ไม่ใช่ว่าต้องบอกว่าอะไร แต่เป็นควรบอกว่าอะไร... พอดีว่า..."
1008905-85 = "ละ... ลงทุน!"
1008905-86 = "ใช่แล้ว! มันคือการลงทุนน่ะ! ถือว่าเป็นการลงทุนด้านเครดิตของคุณครูต่อหน่วยรับจ้างสารพัดของ#nพวกเราแล้วกัน!!"
1008905-87 = "เพราะงั้น... อืม..."
1008905-91 = "ขะ... ขอบคุณนะ... แล้วก็... ขอโทษนะ... ดูเหมือนจะรบกวนคุณครูไปโดยไม่ได้ตั้งใจแล้ว..."
1008905-92 = "หืม...?"
1008905-93 = "ไม่รบกวนเหรอ...? เป็นเรื่องธรรมดาที่คาดไม่ถึงงั้นเหรอ...?"
1008905-94 = "มะ... หมายความว่ายังไงน่ะ? เรื่องธรรมดางั้นเหรอ?"
1008905-95 = "[s11] \"เพราะถ้าทำกิจการอะไร ก็ต้องใช้เครดิตแก้ปัญหาอยู่บ้างน่ะ\"\n[s12] \"บางทีครูก็ยืมเครดิตในอนาคตของตัวเองมาใช้เหมือนกัน\""
1008905-98 = "...!!"
1008905-99 = "ฮุฮุฮุ... สมแล้วที่เป็นคุณครู เป็นคนที่ควรค่าแก่การขอคำปรึกษาที่สุดเลย"
1008905-100 = "ฉันเข้าใจแล้วละ ถ้าอย่างนั้นก็ต้องพูดคำที่พูดไปเมื่อกี้อีกครั้งสินะ"
1008905-104 = "นี่คือการลงทุนน่ะคุณครู ริคุฮาชิมะ อารุคนนี้จะจำเรื่องวันนี้ไว้ให้ขึ้นใจเลยละ"
1008905-105 = "ต่อไปถ้ามีเรื่องอะไรก็ติดต่อฉันมาได้เลยนะ ไม่ต้องเกรงใจเลย!"
1008905-106 = "ฮุฮุ ฮุฮุฮุ...!"
1008905-111 = "อ้อ... จริงสิ"
1008905-114 = "จะว่าไปแล้ว..."
1008905-115 = "ค่าเย็บชุดวันนี้ ให้ฉันใช้คืนได้ทางไหนเหรอ?"
1008905-119 = "(ต่อให้คุณครูจะบอกว่าไม่เป็นไร แต่อารุก็คืนเงินทันทีที่ได้บัญชีกลับมา)"

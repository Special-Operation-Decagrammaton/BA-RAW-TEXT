[translation]
10000040-1 = "ตอนที่ 4;คนประหลาดแห่งชมรมฝึกฝน"
10000040-4 = "หนอย! จัดการไปขนาดนี้แล้วยังจะแห่กันมาอยู่อีก...!"
10000040-5 = "ถ้าพีน่าอยู่ตรงนี้ด้วยล่ะก็...!"
10000040-7 = "หยุดนะ! พวกปีศาจบนท้องถนน! เลิกก่อเรื่องได้แล้ว!"
10000040-9 = "คะ... ใครน่ะ?!"
10000040-11 = "ถ้าถามว่าพวกเราเป็นใคร ก็คงต้องตอบให้เป็นมารยาท!"
10000040-14 = "(วิ้งง!)"
10000040-16 = "ย้ากก! ฟึ่บฟั่บ!"
10000040-17 = "ต้องเริ่ดอีก!"
10000040-18 = "ฮ้าวว~ ต้องผอม(?) อีก..."
10000040-19 = "ตะ... ต้องสวยอีก... ชะ.. ใช่ไหมคะ?"
10000040-20 = "ฮุฮุฮุ สามสาวสวยรวมกันเป็นหนึ่ง!"
10000040-21 = "ชมรมฝึกฝนผู้พิทักษ์สันติภาพบนท้องถนน...!"
10000040-22 = "ปรากฏตัวแล้ว!"
10000040-23 = "โอ้ว..."
10000040-24 = "อะ... โอ้วเย้... ค่ะ..."
10000040-25 = "ฮึ่ม! ปรากฏตัวได้อย่างไร้ที่ติ! ใช่ไหม รุ่นพี่สึบากิ!? (ยักไหล่)"
10000040-26 = "ฮ้าวว~ กะ... ก็ใช่"
10000040-27 = "เอ่อ... คาเอเดะจัง ทุกคนกำลังจ้องเราอยู่นะคะ..."
10000040-29 = "เห็นแล้วใช่ไหมคะ? บอกแล้วว่าประหลาด..."
10000040-30 = "......"
10000040-31 = "ฮ๊ะ?! มะ... ไม่สิ! ละ... แล้วตกลงพวกแกเป็นใคร!"
10000040-32 = "พวกเราก็คือชมรมฝึกฝนที่ฝึกฝนเพื่อเป็นเลดี้ที่เพียบพร้อม!"
10000040-33 = "อืม~ ส่วนมากคาเอเดะจะพูดถึงตัวเองน่ะ~"
10000040-34 = "ฉันไม่ได้ฝึกฝนอะไรแบบนั้นอยู่หรอกนะ แค่เรื่องนอนก็พอแล้วล่ะ"
10000040-35 = "ฮ้าวว~ zzZ ขอนอนตรงนี้ได้ไหม?"
10000040-36 = "รุ่นพี่สึบากิผู้ยึดมั่นในทางของตัวเอง แม้แต่ตอนที่ต้องเผชิญหน้ากับปีศาจแบบนี้... เท่มาก...!#nซะที่ไหนกันล่ะ!"
10000040-37 = "ไม่ได้นะ! รุ่นพี่สึบากิ! จะนอนตรงนี้ไม่ได้...!"
10000040-38 = "แหะๆๆ... แต่ยังไง... การได้มีจุดหมายอะไรก็เป็นเรื่องดีไม่ใช่เหรอคะ?"
10000040-39 = "อื้ม! ใช่แล้วล่ะ! รุ่นพี่มิโมริ! เราต้องฝึกเป็นเลดี้ที่เพียบพร้อม แล้วก็ปกป้องท้องถนนไปพร้อมๆ กันด้วย!"
10000040-40 = "เพราะฉะนั้นตอนนี้ก็ถึงเวลาที่ชมรมฝึกฝนจะออกโรง!"
10000040-41 = "ย้ากก! เจ้าพวกปีศาจบนท้องถนน! เตรียมตัวไว้ได้เลย!"
10000040-42 = "ช่าย~ เตรียมตัวไว้น้า~"
10000040-43 = "ใช่ค่ะ! ตะ.. เตรียมตัวเจ็บได้เลยค่ะ!"
10000040-46 = "เฮือกกก! เจ้าพวกนี้เก่งขึ้นกว่าเดิมนี่!"
10000040-47 = "ฮิฮิ ก็บอกแล้วว่าไม่มีประโยชน์! เพราะเรามีคุณครูอยู่ด้วยไงล่ะ!"
10000040-48 = "ชิ! ชาเล่ต์บ้าบอนี่คืออะไรกันแน่!"
10000040-49 = "อิซุนะ! นินจาซื่อบื้อนั่นยังไม่มาอีกเรอะ?!"
10000040-50 = "คือว่า..."
10000040-52 = "ศาสตร์นินจาของอิซุนะ! เอาควันไปกินซะ!"
10000040-55 = "ระเบิดงั้นเหรอ?!"
10000040-56 = "อะไรเนี่ย?! เผลอตกใจจนได้!"
10000040-57 = "งืมม แล้วคุณครูล่ะ...?"
10000040-58 = "โอ๊ะ?! คุณครู?!"
10000040-60 = "ดีล่ะ! ใช้โอกาสวุ่นวายจากระเบิดนี่! ทุกคนบุกเลย!!!"
10000040-62 = "เอ่อ... อิซุนะ... กลับมาหาอีกครั้งตามที่สัญญาไว้ค่ะ!"
10000040-63 = "[s] \"แค่กๆ! อิซุนะเหรอ…?!\""
10000040-64 = "วันนั้นพอกลับไปอิซุนะก็คิดได้ค่ะ!"
10000040-65 = "คุณครูยอมรับในความฝันของฉัน ถึงคุณครูจะเป็นผู้ใหญ่ที่นิสัยไม่ดี... แต่ก็เท่... ก็เถอะ!"
10000040-66 = "แต่หากต้องมาเผชิญหน้ากันแบบศัตรูแบบนี้... ฉันก็จำเป็นจะต้องโค่นคุณครู แล้วก็เกลี้ยกล่อมให้ได้!"
10000040-67 = "นี่แหละคือเส้นทางสายนินจาที่อิซุนะเลือกเดิน! นี่คือโชคชะตาของนินจาค่ะ!"
10000040-68 = "[s] \"นี่มัน... ไม่ฟังดูแปลกไปหน่อยเหรอ?\""
10000040-69 = "เอาล่ะ เตรียมตัวให้ดีนะคะคุณครู!"
10000040-70 = "อิซุนะจะโค่นชาเล่ต์ของคุณครูเอง!"
10000040-71 = "ย้ากกกกก!!"

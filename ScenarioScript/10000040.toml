[translation]
10000040-1 = "第4話;修行部的怪人們"
10000040-4 = "不管怎麼打都沒完沒了……！"
10000040-5 = "要是至少有菲娜在的話……！"
10000040-7 = "到此為止了哦！妖怪劇團．街頭流派！"
10000040-9 = "是，是誰！？"
10000040-11 = "既然你誠心誠意地發問了，我們就大發慈悲地告訴你！"
10000040-14 = "（咚咚！）"
10000040-16 = "咻啪啪！！"
10000040-17 = "華麗！"
10000040-18 = "可愛……"
10000040-19 = "美，美麗……！對，對嗎……？"
10000040-20 = "沒錯！"
10000040-21 = "為了守護街道的和平，修行部的美少女三人組……！"
10000040-22 = "在此登場！"
10000040-23 = "登～場～……"
10000040-24 = "那個，登，登場……"
10000040-25 = "哼哼～！真是完美的登場演出！對吧，椿前輩！"
10000040-26 = "呼啊……是嗎？"
10000040-27 = "那個……楓醬，大家好像都在看我們……"
10000040-29 = "……我說過了吧？他們是群怪人。"
10000040-30 = "……"
10000040-31 = "……哈！？不，不小心就看呆了，你們是誰！？"
10000040-32 = "我們是為了成為完美淑女而日日夜夜持續修行的「修行部」！"
10000040-33 = "有那個目標的只有楓而已吧？"
10000040-34 = "我其實也沒有特別做什麼修行……反正能睡覺就好了。"
10000040-35 = "呼啊……好睏。我可以在這裡睡覺嗎？"
10000040-36 = "在和妖怪劇團對峙的同時依然泰然自若的椿前輩，好帥……！"
10000040-37 = "啊啊，可是椿前輩！不能在這裡睡覺……！"
10000040-38 = "啊哈哈……不過，我覺得有目標是件好事。"
10000040-39 = "就是說呀三森前輩！#n這不只是成為完美淑女的必要修行，還能順便守護街道的治安喔！"
10000040-40 = "所以現在正是我們修行部出場的時候！"
10000040-41 = "妖怪劇團．街頭流派，覺悟吧！"
10000040-42 = "嗯，覺悟吧～"
10000040-43 = "那，那麼，請覺悟！"
10000040-46 = "呃啊啊！那些傢伙又變得更強了！？"
10000040-47 = "沒用沒用！我們這邊可是有老師在啊！"
10000040-48 = "嘖，夏萊到底是何方神聖……！"
10000040-49 = "那個笨……忍者還沒好嗎！？"
10000040-50 = "那個，應該差不多要……"
10000040-52 = "伊樹菜流忍法！四面八方霧濛濛之術！"
10000040-55 = "爆，爆炸了！？"
10000040-56 = "咦，哇啊！？"
10000040-57 = "唔嗯……咦，老師呢？"
10000040-58 = "老，老師……！？"
10000040-60 = "很好，就是現在！全員突擊！"
10000040-62 = "伊樹菜依照約定再次登場了！"
10000040-63 = "[s]「咳咳！伊樹菜……！？」"
10000040-64 = "伊樹菜在那之後想通了！"
10000040-65 = "就算老師是認可伊樹菜夢想的帥氣大人……不，是帥氣卻邪惡的大人！"
10000040-66 = "既然以敵人的身分相遇……伊樹菜就必須打倒並說服老師！"
10000040-67 = "這就是伊樹菜踏上的忍者之道！是身為忍者的宿命！"
10000040-68 = "[s]「……什麼意思？」"
10000040-69 = "做好覺悟吧！老師！"
10000040-70 = "伊樹菜會擊敗老師的！"
10000040-71 = "呀啊！！"

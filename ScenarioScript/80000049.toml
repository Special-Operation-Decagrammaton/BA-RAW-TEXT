80000049-57 = "#wait;2000"
80000049-58 = "[s] \"저기, 츠바키 양. 이건 전부 무엇인지요……?\""
80000049-59 = "3;츠바키;02;선생님. 오늘이 발렌타인 데이라는 건 알고 있지?\n#3;em;[반응]"
80000049-60 = "3;츠바키;01;이거, 오늘을 기념해서 나온 숙면 초콜릿과 안면 세트야.\n#3;m3"
80000049-61 = "3;츠바키;99;초콜릿은 발렌타인 데이 전용으로 먹으면 잠이 솔솔 오는 키보토스 특제 제품."
80000049-62 = "3;츠바키;09;한입만 먹으면 코끼리도 잠재울 수 있대. 초콜릿의 카페인이 수면을 방해한다는 통념을 이겨낸, 나 같은 수면수행자들 사이에서 화제가 되고 있는 물건이야.\n#3;em;[음표]"
80000049-63 = "[s] \"그거, 이미 통념을 이겨낸 수준이 아니지 않아?!\""
80000049-64 = "3;츠바키;02;자, 불만만 말하지 말고, 피곤한 선생님에게 이걸 프레젠트-하겠습니다.\n#3;greeting"
80000049-65 = "3;츠바키;05;잠도 못 자고 괴로워하는 건 안 돼. 선생님이 쓰러지면……."
80000049-66 = "3;츠바키;07;나는 물론, 모두가 곤란해할 테니까.\n#3;em;[속상함]\n#3;stiff"
80000049-67 = "[s] \"츠바키…….\""
80000049-68 = "3;츠바키;01;그러니 자아.\n#3;closeup\n#3;greeting"
80000049-69 = "3;츠바키;02;선생님, 여기. 여기에 눕자?\n#3;em;[반짝]\n#3;closeup"
80000049-70 = "3;츠바키;03;내 여기, 부들부들하고 푹신푹신할 테니까. 분명 잠이 솔솔 올 거야?\n#3;closeup"

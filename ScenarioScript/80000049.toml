[translation]
80000049-1 = "在柔軟甜美的夢中"
80000049-3 = "[ns]「這裡先這樣，那邊就……」"
80000049-12 = "（不知不覺過了很久）"
80000049-17 = "[ns1]「這個大致上完成了，接下來……」\n[ns2]「……看不到盡頭。」"
80000049-18 = "（盯著已經連續處理好幾天卻依然堆積如山的工作）"
80000049-19 = "（盯著已經連續處理好幾天卻依然堆積如山的工作）"
80000049-27 = "[ns]「……身體好像快不行了。」"
80000049-29 = "（感覺到疲勞，正打算躺下的時候……）"
80000049-33 = "啊，老師。"
80000049-34 = "[s]「椿？你怎麼會來這裡？」"
80000049-35 = "我經過附近的時候正好感覺到了「睡眠不足氣息」。"
80000049-36 = "[s]「睡眠不足氣息……？」"
80000049-37 = "看你的臉色……老師，你很久沒睡了吧。那可不行唷～？"
80000049-38 = "工作雖然重要，但身體也是一樣的。"
80000049-39 = "弄壞身體的話就不能和我一起修行了哦。"
80000049-40 = "[s]「可是工作做不完……」"
80000049-41 = "不行哦。"
80000049-42 = "[s]「不行哦……？」"
80000049-43 = "不行就是不行。"
80000049-44 = "睡眠是很重要的，不好好睡覺的話一切都會不順利的唷？"
80000049-45 = "既然平時都和我一起以「完美的睡眠」為目標進行修行，就應該活用才對。"
80000049-46 = "……嗯，這樣不太好。"
80000049-47 = "[s3]「可是椿老師……！」\n[s4]「該，該怎麼辦……」"
80000049-48 = "唔嗯，看來被逼得很緊呢……"
80000049-49 = "唔嗯，看來被逼得很緊呢……"
80000049-50 = "不要緊，別擔心。"
80000049-51 = "無論被追的多緊，都有我在。"
80000049-52 = "啊，我帶了這個要給老師。"
80000049-56 = "來，請收下。"
80000049-58 = "[s]「這是……？」"
80000049-59 = "老師，今天是情人節唷？"
80000049-60 = "所以這是能夠讓人熟睡的巧克力安眠組合。"
80000049-61 = "是在奇普托斯也很特殊的，只要吃下去就會漸漸想睡的巧克力哦。"
80000049-62 = "聽說只要一口就能讓一隻大象睡著，#n完全打破了「巧克力的咖啡因有礙睡眠」這個既定觀念，最近討論度很高的巧克力。"
80000049-63 = "[s]「那會不會有點危險……？」"
80000049-64 = "哎呀哎呀，我認為疲憊的老師正需要這個哦。"
80000049-65 = "老師要健健康康的才行。要是老師倒下的話，大家會很難過的……"
80000049-66 = "……當然，我也是哦。"
80000049-67 = "[s]「椿……」"
80000049-68 = "所以說，來。"
80000049-69 = "老師，躺下來吧？"
80000049-70 = "我覺得我這裡還挺軟的，應該會很舒服唷？"
80000049-75 = "[ns]「等等，椿，好近……！？」"
80000049-76 = "嗯？不喜歡膝枕嗎？"
80000049-77 = "要是能把我的修行道具借給老師就好了，但現在正好在清洗……"
80000049-78 = "咦，膝枕之外的方法？唔嗯……"
80000049-79 = "我身上有的，軟軟的東西……"
80000049-80 = "……屁股？"
80000049-81 = "[s]「麻煩還是膝枕吧。」"
80000049-82 = "是嗎？那……"
80000049-87 = "乖乖睡吧？"
80000049-88 = "來，吃一塊巧克力。這樣很快就會睡著了唷。啊～嗯……"
80000049-98 = "[ns]「啊……」"
80000049-99 = "呵呵，請好好休息哦。"
80000049-100 = "晚安，老師。"
80000049-102 = "（就這樣久違舒服地陷入熟睡）"

80000049-76 = "3;츠바키;01;응? 나는 그냥 선생님에게 무릎베개를 해주려고 한 건데?\n#3;em;[?]"
80000049-77 = "3;츠바키;99;내가 가진 수행도구를 빌려줄 수 있으면 가장 좋겠지만, 하필 오늘은 세탁하느라 그걸 챙겨오지 않아서……."
80000049-78 = "3;츠바키;08;아, 선생님. 무릎베개는 곤란한 거야? 으음, 어떡하지……."
80000049-79 = "3;츠바키;07;내가 가진 것 중에 이거 말고 또 부드러운 거라고 한다면……."
80000049-80 = "3;츠바키;02; ……엉덩이?\n#3;em;[?]\n#3;greeting"
80000049-81 = "[s] \"무릎베개로 충분합니다.\""
80000049-82 = "3;츠바키;09;아……. 그래? 후후~\n#3;em;[///]"

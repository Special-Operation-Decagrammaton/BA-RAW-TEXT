[translation]
80000049-1 = "ความฝันแสนหวาน"
80000049-3 = "[ns] \"อืม ตรงนี้... ทำแบบนี้...\""
80000049-12 = "(เช้าวันวาเลนไทน์)"
80000049-17 = "[ns1] \"เฮ้อ... อันนี้ก็เสร็จสักที งานต่อไป...\"\n[ns2] \"ทำเท่าไรก็ไม่เสร็จสักทีนะเนี่ย\""
80000049-18 = "(ในตอนที่คุณครูกำลังรู้สึกล้าเพราะงานที่ดูเหมือนจะไม่มีวันเสร็จ...)"
80000049-19 = "(ในตอนที่คุณครูกำลังรู้สึกล้าเพราะงานที่ดูเหมือนจะไม่มีวันเสร็จ...)"
80000049-27 = "[ns] \"อืม... คงถึงขีดจำกัดแล้วมั้ง\""
80000049-29 = "(และในตอนที่คุณครูรู้สึกเหมือนจะล้มวูบไปได้ทุกเวลาเพราะความเหนื่อยล้า...)"
80000049-33 = "คุณครู ฉันมาแล้ว"
80000049-34 = "[s] \"สะ...สึบากิ?! มีอะไรเหรอ?!\""
80000049-35 = "อื้อ ตอนที่เดินผ่านแถวนี้ ฉันสัมผัสได้ถึงความรู้สึกว่า <เหนื่อยจังเลย นอนไม่พอ~> น่ะ เลยรีบมา"
80000049-36 = "[s] \"หืม...?\""
80000049-37 = "ดูจากสีหน้าคุณครูแล้ว เมื่อคืนไม่ได้นอนเลยใช่มั้ย? แบบนั้นไม่ได้น้า~"
80000049-38 = "ถึงงานจะสำคัญแค่ไหน แต่ถ้าคุณครูยังฝืนทำแบบนี้ร่างกายจะทรุดเอาได้นะ"
80000049-39 = "ถ้าเป็นแบบนั้นก็จะมาฝึกฝนกับฉันไม่ได้น่ะสิ"
80000049-40 = "[s] \"อืม แต่งานกองอยู่เป็นภูเขาเลย ช่วยไม่ได้นะ...\""
80000049-41 = "ไม่ได้..."
80000049-42 = "[s] \"มะ...ไม่ได้...??\""
80000049-43 = "บอกว่าไม่ได้ก็คือไม่ได้สิ"
80000049-44 = "ก็การนอนมันเป็นเรื่องสำคัญมากนี่นา จะละเลยไม่ได้หรอกนะ"
80000049-45 = "โดยเฉพาะคุณครูที่เป็นเพื่อนร่วมการฝึกฝน <การได้นอนหลับสบายอย่างเต็มตื่นกว่าที่เคย> ของฉันแล้วด้วย"
80000049-46 = "แบบนั้นยิ่งไม่ได้เด็ดขาดเลย (พยักหน้า)"
80000049-47 = "[s3] \"แต่ว่าสึบากิ...! ครูทำงานเท่าไรก็ไม่เสร็จสักทีเลยนะ!\"\n[s4] \"แต่ครูคงหนีจากกองงานที่ไม่มีที่สิ้นสุดพวกนี้ไปไม่ได้แน่ๆ?!\""
80000049-48 = "อา... ปฏิกิริยาแบบนั้น การตอบโต้รุนแรงกว่าปกติ... แสดงว่าสถานการณ์ตอนนี้รุนแรงกว่าทุกทีมาก#nเลยนะ"
80000049-49 = "อา... ปฏิกิริยาแบบนั้น การตอบโต้รุนแรงกว่าปกติ... แสดงว่าสถานการณ์ตอนนี้รุนแรงกว่าทุกทีมาก#nเลยนะ"
80000049-50 = "เอาล่ะ คุณครู ใจเย็นๆ ก่อน"
80000049-51 = "อื้อ ไม่เป็นไร ถึงคุณครูจะอยู่ในสภาวะคับขันแบบนี้ แต่ก็มีฉันอยู่ด้วยนะ"
80000049-52 = "ฉันมีของที่เตรียมมาไว้ให้คุณครูด้วย"
80000049-56 = "อ่ะ นี่ไง"
80000049-58 = "[s] \"สึบากิ นี่มันอะไรเหรอ...?\""
80000049-59 = "คุณครูรู้ใช่มั้ยว่าวันนี้เป็นวันวาเลนไทน์?"
80000049-60 = "ช็อกโกแลตช่วยนอนกับเซ็ตชุดนอนที่ออกมาฉลองวันวาเลนไทน์น่ะ"
80000049-61 = "ช็อกโกแลตอันนี้เป็นสินค้าพิเศษของคิโวทอสที่พอกินไปแล้วจะช่วยให้ง่วงนอน"
80000049-62 = "กินแค่ชิ้นเดียวก็หลับเป็นตายเลยล่ะ เป็นสินค้าที่พูดถึงกันมากในหมู่คนที่ฝึกฝนการนอนหลับ#nอย่างฉันเลย มันช่วยลบภาพจำเก่าๆ ว่าช็อกโกแลตทำให้นอนไม่หลับน่ะ"
80000049-63 = "[s] \"เอาชนะความเชื่อเก่าๆ ไปแล้วไม่ใช่เรอะ?!\""
80000049-64 = "เอ้าๆ อย่ามัวมาพูดกันอยู่เลย ฉันจะให้เซ็ตชุดนอนกับช็อกโกแลตนี่เป็นของขวัญกับคุณครูนะ"
80000049-65 = "ห้ามทรมานตัวเองเพราะไม่นอนเด็ดขาด ถ้าคุณครูเป็นลมไป..."
80000049-66 = "ทั้งฉันและคนอื่นคงจะแย่แน่ๆ"
80000049-67 = "[s] \"สึบากิ...\""
80000049-68 = "ถ้างั้นก็มานอนได้แล้วล่ะ"
80000049-69 = "คุณครู มาๆ มานอนตรงนี้นะ"
80000049-70 = "ตรงนี้ของฉันนุ่มมากนะ ถ้ามานอนตรงนี้น่าจะหลับสบาย"
80000049-75 = "[ns] \"สะ...สึบากิ! มันใกล้เกินไปแล้วนะ! แล้วเมื่อกี้พูดอะไรน่ะ...!\""
80000049-76 = "หืม? ฉันแค่จะให้คุณครูนอนหนุนตักเองนะ?"
80000049-77 = "จริงๆ ฉันก็อยากให้คุณครูยืมอุปกรณ์การฝึกฝนของฉันนะ แต่พอดีวันนี้เอาไปส่งซักไว้ เลยไม่ได้เอามาด้วย..."
80000049-78 = "คุณครู... นอนหนุนตักมันลำบากเหรอ? อืม... ทำยังไงดีล่ะ"
80000049-79 = "นอกจากหน้าตักแล้ว ตรงที่นุ่มนิ่มน่าหนุนก็..."
80000049-80 = " ก้น...?"
80000049-81 = "[s] \"หนุนตักแหละดีแล้ว...\""
80000049-82 = "อ้อ งั้นเหรอ... ฮิฮิ~"
80000049-87 = "เอาละ ถ้างั้นก็มานอนด้วยกันกับฉันได้แล้วละนะ?"
80000049-88 = "พอกินช็อกโกแลตนี้แล้ว คุณครูก็จะหลับปุ๋ย คร่อกฟี้~ ไปเลยล่ะ "
80000049-98 = "[ns] \"อ่า...\""
80000049-99 = "เอ่เอ๋~ เอ่เอ๋~ หลับฝันดี~ คุณครูคนดี~"
80000049-100 = "ฝันดีนะ คุณครู"
80000049-102 = "(คุณครูนอนฟังเพลงกล่อมเด็กของสึบากิ จากนั้นไม่นานก็หลับไปโดยไม่รู้ตัว)"

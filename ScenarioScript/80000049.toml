80000049-17 = "[ns1] \"Let's see. What's next?\"\n[ns2] \"There's no end to this.\""
80000049-18 = "I stayed up all night, but I didn't seem to be making any headway."
80000049-19 = "I stayed up all night, but I didn't seem to be making any headway."

80000049-33 = "3;츠바키;01;선생님, 나 왔어.\n#3;em;[반짝]\n#3;a"
80000049-34 = "[s] \"츠, 츠바키?! 여긴 어쩐 일이야?!\""
80000049-35 = "3;츠바키;99;응, 이 근처를 지나가는 길에, 지금 막 이곳에서 <잠이 엄청 부족해서 곤란해~> 오오라가 느껴지길래, 바로 찾아왔어.\n#3;em;[...]"
80000049-36 = "[s] \"……응?\""
80000049-37 = "3;츠바키;05;안색을 보아하니, 선생님. 간밤에 한숨도 안 잔 거지? 그럼 안돼~\n#3;em;[반응]"
80000049-38 = "3;츠바키;02;아무리 일이 중요하다고 해도, 계속 그런 식이면 금방 몸을 망치게 될 거야."
80000049-39 = "3;츠바키;07;그럼 나랑 같이 수행을 할 수 없게 되어버리는걸.\n#3;stiff"
80000049-40 = "[s] \"음, 하지만 쌓인 일이 많다 보니까 어쩔 수 없이…….\""
80000049-41 = "3;츠바키;06;떽.\n#3;em;[!]\n#3;jump"
80000049-42 = "[s] \"떼, 떽……?\""
80000049-43 = "3;츠바키;07;안 되는 건 안 되는 거야."
80000049-44 = "3;츠바키;09;잠이라는 건 무척이나 중요하니까. 그걸 소홀히 해서는 안 돼.\n#3;em;[///]"
80000049-45 = "3;츠바키;01;특히 나랑 함께 <보다 편안하고 완전한 숙면>을 위해 노력하는 수행자 동료인 선생님이라면 더욱더-"
80000049-46 = "3;츠바키;02;……응, 그런 건 용납할 수 없어. (끄덕)\n#3;greeting"
80000049-47 = "[s3] \"하지만 츠바키 선생님! 해도해도 일이 끝나지 않습니다!\"\n[s4] \"이 무한의 굴레에서, 도망칠 수가 없어. 어쩌지?!\""
80000049-48 = "3;츠바키;05;아……. 선생님의 반응. 평소보다도 더 격렬한 걸 보니, 이건 이머전시 상황인 거네.\n#3;em;[...]"
80000049-49 = "3;츠바키;05;아……. 선생님의 반응. 평소보다도 더 격렬한 걸 보니, 이건 이머전시 상황인 거네.\n#3;em;[...]"
80000049-50 = "3;츠바키;09;자아, 선생님. 착하다 착해."
80000049-51 = "3;츠바키;01;응. 괜찮아. 선생님이 궁지에 몰린 상태라고 해도 내가 있으니까.\n#3;greeting"
80000049-52 = "3;츠바키;02;선생님을 위해 마침 내가 준비해온 게 있어."

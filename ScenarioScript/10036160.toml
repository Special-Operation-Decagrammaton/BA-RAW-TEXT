[translation]
10036160-1 = "วิธีสร้างความทรงจำของสควอด"
10036160-3 = "จบแล้ว...!"
10036160-4 = "ถ้างั้น..."
10036160-5 = "เราก็..."
10036160-6 = "อื้ม พวกเราได้ของรางวัล!"
10036160-11 = "ยินดีด้วยครับ!"
10036160-12 = "พวกคุณเป็นทีมแรกเลยนะครับที่ผ่านด่านสุดท้ายมาได้!"
10036160-13 = "เอาละครับ เลือกของรางวัลที่อยากได้ไปเลยครับ!"
10036160-14 = "คงจะเลือกเป็นนิตยสารฉบับล่าสุดสินะ"
10036160-15 = "ยินดีด้วยนะ ฮิโยริ!"
10036160-16 = "ฉะ... ฉันเลือกเองได้เหรอคะ?!"
10036160-17 = "เรามาเล่นเกมเพื่อของชิ้นนั้นตั้งแต่อยู่แรกอยู่แล้วนี่นา"
10036160-18 = "งะ... งั้นเหรอคะ? ถ้างั้น..."
10036160-22 = "ฉันขอเลือกเป็นตั๋วถ่ายรูปโฟโต้บูธค่ะ...!"
10036160-26 = "ฮิโยริ ไม่ได้เล่นเกมเพราะอยากได้นิตยสารฉบับล่าสุดหรอกเหรอ?"
10036160-27 = "ไม่ต้องห่วงพวกเราหรอกนะ เลือกของที่อยากได้ได้เลย"
10036160-28 = "นะ... นี่คือสิ่งที่ฉันอยากได้ค่ะ..."
10036160-29 = "นิตยสารน่ะ พอขึ้นเดือนใหม่ก็มีเล่มใหม่แล้วค่ะ... แต่รูปถ่ายของพวกเรา 4 คนเป็นสิ่งที่เก็บไว้ดูได้#nตลอดนี่คะ?"
10036160-30 = "อีกอย่าง เราก็ไม่รู้ด้วยว่าจะมีโอกาสแบบนี้อีกหรือเปล่า..."
10036160-31 = "พะ... เพราะงั้นเรื่องนิตยสารน่ะ... เอาไว้ฉันค่อยไปขอร้องจากคุณครูก็ได้ค่ะ!"
10036160-32 = "ไม่สิ... จะไปทำอย่างนั้นได้ยังไง..."
10036160-33 = "มันก็จริงอยู่หรอกนะ แต่ก็..."
10036160-37 = "นั่นสินะ... อื้ม ฮิโยริพูดถูกแล้วละ"
10036160-38 = "ฉันก็คิดว่าเราควรเก็บความทรงจำของวันนี้เอาไว้"
10036160-39 = "แหะ แหะๆ งั้นพวกเรา 4 คนมาถ่ายรูปด้วยกันนะคะ...!"
10036160-40 = "ทะ... ทางนี้ค่ะ...!"
10036160-49 = "อืม พอจะได้ถ่ายรูปที่ระลึก มันก็เขินๆ อยู่นะ..."
10036160-50 = "ต้องโพสต์ท่าอะไรด้วยมั้ยนะ?"
10036160-51 = "ยืนแบบเป็นธรรมชาติๆ นั่นละ"
10036160-52 = "ฮุฮุ ยิ้มหน่อยสิซัตจัง มิซากิด้วย"
10036160-54 = "จะถ่ายแล้วนะครับ!"
10036160-55 = "หนึ่ง สอง สาม แชะ!"
10036160-64 = "นี่ครับ รับรูปไปได้เลยครับ! มีให้ 4 ใบตามจำนวนคนเลยครับ!"
10036160-68 = "อะไรน่ะ... รูปออกมาดูดีเลยนะ"
10036160-69 = "นั่นสินะ ยิ้มกันทุกคนเลย"
10036160-70 = "อื้ม ทุกคนดูมีความสุขนะคะ..."
10036160-71 = "เป็นของที่ระลึกที่ดีเลยละ ขอบใจนะ ฮิโยริ"
10036160-72 = "แหะ แหะๆ..."
10036160-73 = "ถ้างั้นเราไปไหนกันต่อดี?"
10036160-74 = "ไปกันต่อเหรอ?"
10036160-75 = "อืม ในงานเทศกาลยังมีอะไรสนุกๆ ให้ทำเยอะเลย"
10036160-76 = "ค่ำคืนนี้ยังอีกยาวไกลนะ ซัตจัง"
10036160-78 = "นะ... นั่นสิคะ! ยังมีอะไรให้ทำอีกเยอะเลยค่ะ!"
10036160-79 = "ใช่มั้ยคะ คุณมิซากิ?"
10036160-80 = "ตามใจเลย ไปไหนก็ได้"
10036160-82 = "ดีละ ถ้างั้นก็... ไปสนุกกันอีกสักหน่อยดีไหม?"

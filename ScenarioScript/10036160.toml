[translation]
10036160-1 = "小隊留下回憶的方法"
10036160-3 = "結束了……！"
10036160-4 = "這樣就……"
10036160-5 = "真的……"
10036160-6 = "嗯，獲得獎品了！"
10036160-11 = "恭喜你們！"
10036160-12 = "各位是最先完成最終關卡的挑戰者哦！"
10036160-13 = "來，請從獎品清單中選一個想要的獎品吧！"
10036160-14 = "還是選雜誌的新刊嗎？"
10036160-15 = "恭喜你，日和！"
10036160-16 = "可，可以讓我來選嗎！？"
10036160-17 = "畢竟本來就是為了這個才來玩的嘛。"
10036160-18 = "這，這樣啊。#n那，那……"
10036160-22 = "我，我要選拍立得的照相券……！"
10036160-26 = "可是日和，你不是因為想要最新的雜誌才參加遊戲的嗎？"
10036160-27 = "不必顧慮我們，選你想要的就行了。"
10036160-28 = "這，這個就是我想要的……"
10036160-29 = "畢竟雜誌每個月都會出新刊……#n但我們四個人一起拍的紀念照，卻可以一直保存下來對吧？"
10036160-30 = "以後不知道還有沒有這樣的機會……"
10036160-31 = "而，而且過期雜誌的話，那個……請，請老師幫忙應該會有辦法的！嗯！"
10036160-32 = "不是……這不是有沒有辦法的問題吧……"
10036160-33 = "雖然是這麼說沒錯，不過……"
10036160-37 = "……嗯，日和說得對。"
10036160-38 = "我也覺得留下今天的回憶是個不錯的想法。"
10036160-39 = "耶，耶嘿嘿，那我們四個人一起拍吧……！"
10036160-40 = "來，來這邊……！"
10036160-49 = "唔嗯，紀念照啊……突然要拍感覺有點尷尬。"
10036160-50 = "需要擺個姿勢嗎？"
10036160-51 = "還是自然一點吧。"
10036160-52 = "呵呵，笑一個吧，沙醬。還有美咲也是。"
10036160-54 = "來，要拍囉！"
10036160-55 = "一，二，三！"
10036160-64 = "來，這是各位的拍立得！#n我依照人數幫你們印了四張！"
10036160-68 = "……哦，拍得不錯嘛。"
10036160-69 = "就是說啊，大家都帶著笑容。"
10036160-70 = "嗯，大家看起來都很開心……"
10036160-71 = "真是個不錯的紀念品。#n謝謝你，日和。"
10036160-72 = "耶，耶嘿嘿……"
10036160-73 = "那麼，接下來要去哪裡呢？"
10036160-74 = "接下來？"
10036160-75 = "嗯，慶典還有很多地方可以玩。"
10036160-76 = "夜晚還沒有結束哦，沙醬。"
10036160-78 = "就，就是說呀！還有很多東西可以玩！"
10036160-79 = "對吧，美咲同學？"
10036160-80 = "隨你們高興吧。我會跟著的。"
10036160-82 = "我知道了。#n那麼……就再玩一會吧？"

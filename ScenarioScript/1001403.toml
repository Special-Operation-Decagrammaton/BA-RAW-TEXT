[translation]
1001403-1 = "於是伊樹菜開始護衛。"
1001403-2 = "（難得的假日）"
1001403-3 = "（在附近街道上閒晃的時候……）"
1001403-5 = "哼哼哼～♪"
1001403-7 = "[s]「…………」"
1001403-9 = "（在市區散步的時候……）"
1001403-11 = "哼哼～哼哼哼～哼哼哼哼哼～♪"
1001403-13 = "[s] 「…………唔嗯。」"
1001403-15 = "（去餐廳吃午飯的時候……）"
1001403-16 = "主公！為了幫您試毒，伊樹菜先享用午餐囉！"
1001403-18 = "而且現在正好是活動期間，只要點配菜好像就會免費送2隻炸蝦唷！"
1001403-19 = "啊，哇！"
1001403-23 = "啊，唔……伊樹菜的，伊樹菜的炸蝦……"
1001403-24 = "[s] 「我買新的給你。別哭了，伊樹菜。」"
1001403-25 = "咦，真的嗎！？"
1001403-26 = "欸嘿嘿！謝謝您，主公！"
1001403-28 = "（為了尋找工作要用的資料，來到圖書館時……）"
1001403-29 = "主公！一直有股視線在那邊盯著我們看！"
1001403-30 = "難道有刺客正在盤算對主公不利的計畫！？"
1001403-31 = "[s1] 「那是圖書館員。」\n[s2] 「因為伊樹菜一直動來動去，讓人家很在意吧。」"
1001403-32 = "對，對不起……"
1001403-33 = "對，對不起……"
1001403-35 = "（伊樹菜一直緊緊黏在身邊，沒有離開的打算）"
1001403-36 = "[s] （唔嗯，這個……）"
1001403-38 = "伊樹菜，空空，空叩空～♪"
1001403-39 = "[s] 「那個，伊樹菜……？」"
1001403-40 = "是！您叫伊樹菜嗎，主公！？"
1001403-41 = "[s3] 「護衛到這裡就行了。」\n[s4] 「難得的假日，伊樹菜也放鬆身心如何？」"
1001403-42 = "咦，但是……"
1001403-43 = "咦，但是……"
1001403-44 = "不知道主公什麼時候會遭遇危險……"
1001403-45 = "所以不能就此中斷護衛任務！"
1001403-46 = "[s] 「危險？你說這裡嗎？」"
1001403-47 = "請千萬別大意了，主公！"
1001403-48 = "昨天播的忍者影集裡也有類似的劇情！"
1001403-49 = "「我已經不需要護衛了，退下吧。」聽到主公這麼說，忍者便立刻撤退……"
1001403-50 = "結果！馬上有敵人看準這時機襲來！"
1001403-51 = "[s] 「受戲劇影響之深……」"
1001403-52 = "當下，雖然遭受突襲慢了一步，但忍者仍一邊保護主公，"
1001403-53 = "一邊將飛來的箭，"
1001403-54 = "像這樣！"
1001403-55 = "然後這樣！全都擋了下來，超帥氣的！"
1001403-56 = "伊樹菜也好想體驗看看喔！"
1001403-57 = "不知道會不會突然有弓箭從某處飛來呢？"
1001403-58 = "[s] 「飛來的話我會很困擾好嘛！？」"
1001403-59 = "還是說……"
1001403-60 = "難道伊樹菜妨礙到主公了嗎……？"
1001403-61 = "[s5] 「沒有，並沒有那種事……」\n[s6] 「不過也不需要貼這麼緊也沒關係吧……？」"
1001403-62 = "這部分不勞主公費心！"
1001403-63 = "這部分不勞主公費心！"
1001403-64 = "因為伊樹菜是主公的忍者啊！"
1001403-65 = "啊！！"
1001403-66 = "[s] 「嗯？」"
1001403-67 = "主公！"
1001403-69 = "[ns] 「怎，怎麼了嗎？」"
1001403-72 = "呼……有野狗從旁邊經過了……"
1001403-74 = "主公！幸好您平安無事！"
1001403-75 = "[s] 「唔，嗯。謝謝你。」"
1001403-76 = "欸嘿嘿，伊樹菜有幫上忙嗎？主公？！"
1001403-77 = "（面對這張充滿期待的笑容，實在不好叫她就此打住）"
1001403-78 = "[s] 「當然，幫大忙了呢。」"
1001403-79 = "欸嘿嘿，是的！以後也請放心交給伊樹菜吧，主公！"
1001403-80 = "[s] 「唔，嗯。拜託了……」"
1001403-82 = "（就這樣，整個假日都在伊樹菜的護衛下度過了……）"

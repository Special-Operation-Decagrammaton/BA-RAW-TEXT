[translation]
1001403-1 = "Izuna's Protection Technique"
1001403-2 = "(I finally have a day off.)"
1001403-3 = "(I'm going on a walk to pass the time.)"
1001403-5 = "Hmm hmm! ♪"
1001403-7 = "[s] \"...\""
1001403-9 = "(As I walk down the street...)"
1001403-11 = "Hmm hmm! ♪"
1001403-13 = "[s] \"Hmm...\""
1001403-15 = "(When I stop by a restaurant for lunch...)"
1001403-16 = "My lord! Izuna has brought you your lunch!"
1001403-18 = "They're having a promotion, so I got two orders of shrimp tempura for free!"
1001403-19 = "Uh-oh!"
1001403-23 = "Oh, no. Izuna's shrimp tempura..."
1001403-24 = "[s] \"Don't worry, Izuna. I'll get you another one.\""
1001403-25 = "Huh?! Really?!"
1001403-26 = "Heehee! Thank you, my lord!"
1001403-28 = "(When I'm at the library looking for new materials to use at work...)"
1001403-29 = "My lord! I sense someone looking our way!"
1001403-30 = "Do you think they could be an assassin who has it out for you?!"
1001403-31 = "[s1] \"That's the librarian.\"\n[s2] \"You're the one who assassinated peace and quiet.\""
1001403-32 = "I-I'm sorry..."
1001403-33 = "I-I'm sorry..."
1001403-35 = "(Izuna and I are attached at the hip and she has no intention of that changing.)"
1001403-36 = "[s] (Well, I guess there's no getting around it...)"
1001403-38 = "Izuna, on the lookout!"
1001403-39 = "[s] \"Hey, Izuna...?\""
1001403-40 = "Yes! What do you need, my lord?!"
1001403-41 = "[s3] \"I think that's enough protection for one day.\"\n[s4] \"Why don't you take the rest of the day off? You've earned it.\""
1001403-42 = "Huh? But..."
1001403-43 = "Huh? But..."
1001403-44 = "But you never know when you could be in trouble!"
1001403-45 = "I can't just stop protecting you now!"
1001403-46 = "[s] \"Trouble? Here?\""
1001403-47 = "You can't ever let your guard down, my lord!"
1001403-48 = "Something just like this happened in the ninja movie I watched last night!"
1001403-49 = "\"I don't need your protection anymore. Be on your way.\" That's what the lord said, but as soon as the ninja left..."
1001403-50 = "...that's when the assassins struck!"
1001403-51 = "[s] \"You're watching too much TV!\""
1001403-52 = "There were arrows flying everywhere!"
1001403-53 = "But the ninja returned just in time and blocked the arrows."
1001403-54 = "Like this...!"
1001403-55 = "And this...! It was so cool!"
1001403-56 = "Izuna wants to learn how to do that."
1001403-57 = "Ah, I wonder if an arrow will fly in from somewhere."
1001403-58 = "[s] \"That doesn't happen in real life!\""
1001403-59 = "My lord..."
1001403-60 = "Has Izuna been getting on your nerves...?"
1001403-61 = "[s5] \"I didn't put it like that...\"\n[s6] \"We don't have to spend every waking moment together...\""
1001403-62 = "No, I don't mind if that's the case."
1001403-63 = "No, I don't mind if that's the case."
1001403-64 = "Izuna is your ninja after all."
1001403-65 = "Ah!"
1001403-66 = "[s] \"What?\""
1001403-67 = "My lord! Look out!"
1001403-69 = "[ns] \"Wh-What's wrong?\""
1001403-72 = "Phew. It was just a dog."
1001403-74 = "(smile) I'm so glad you're safe, my lord!"
1001403-75 = "[s] \"Um. Yeah. Th-Thanks...\""
1001403-76 = "Izuna was helpful! Right, my lord?!"
1001403-77 = "(I simply don't have the heart to tell her to go away when I see her smile like that.)"
1001403-78 = "[s] \"Of course you were helpful.\""
1001403-79 = "Heehee! You can count on me, my Lord!"
1001403-80 = "[s] \"S-Sure...\""
1001403-82 = "(And so, Izuna continued to \"protect\" me during my entire day off.)"

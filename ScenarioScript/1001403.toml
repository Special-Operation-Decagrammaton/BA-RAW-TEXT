[translation]
1001403-1 = "อิซุนะเดินไปเป็นเพื่อน"
1001403-2 = "(ในที่สุดวันหยุดที่รอคอยก็มาถึง)"
1001403-3 = "(คุณครูกำลังเดินเล่นไปตามท้องถนนเพื่อฆ่าเวลา)"
1001403-5 = "ฮืมฮื้ม~♪"
1001403-7 = "[s] \"...\""
1001403-9 = "(ระหว่างที่เดินเล่นไปตามถนน)"
1001403-11 = "ฮืมฮื้ม~ ฮืมฮืมฮือ~♪"
1001403-13 = "[s] \"......อืม\""
1001403-15 = "(ในตอนที่แวะโรงอาหารเพื่อกินมื้อกลางวัน)"
1001403-16 = "นายท่าน! อิซุนะรับข้าวกล่องมาให้แล้วค่ะ!"
1001403-18 = "ตอนนี้กำลังมีโปรโมชั่น ถ้าสั่งท็อปปิ้งเพิ่มจะได้รับกุ้งทอด 2 ตัวเลยนะคะ...!"
1001403-19 = "ว้าย!"
1001403-23 = "อ๊ะ... กุ้งทอดของอิซุนะ..."
1001403-24 = "[s] \"เดี๋ยวครูซื้อให้ใหม่ ไม่เป็นไรนะอิซุนะ\""
1001403-25 = "คะ?! จริงเหรอคะ?!"
1001403-26 = "ฮิฮิ! ขอบคุณนะคะ! นายท่าน\n\n"
1001403-28 = "(ตอนแวะไปห้องสมุดเพื่อหาข้อมูลสำหรับใช้ในงาน)"
1001403-29 = "นายท่าน! ฉันรู้สึกว่ามีสายตาจากตรงนั้นจ้องมาทางนี้อยู่ค่ะ!"
1001403-30 = "อย่าบอกนะว่าเป็นนักฆ่าจิตใจชั่วร้ายที่คิดจะมาลอบฆ่านายท่าน?!"
1001403-31 = "[s1] \"บรรณารักษ์น่ะ\"\n[s2] \"เพราะอิซุนะไม่ยอมนั่งยังไงล่ะ\""
1001403-32 = "ขะ... ขอโทษค่ะ"
1001403-33 = "ขะ... ขอโทษค่ะ"
1001403-35 = "(อิซุนะคอยอยู่ข้างๆ คุณครูตลอดไม่คิดจะห่างไปไหน)"
1001403-36 = "[s] (เฮ้อ งั้นก็ช่วยไม่ได้...)"
1001403-38 = "อิซุนะ อิซุนะหน่าน้า~"
1001403-39 = "[s] \"คือว่าอิซุนะ...?\""
1001403-40 = "ค่ะ! นายท่านเรียกฉันเหรอคะ?!"
1001403-41 = "[s3] \"คุ้มกันเท่านี้ก็พอแล้วนะ\"\n[s4] \"วันนี้่เป็นวันหยุดนะ อิซุนะเองก็พักหน่อยดีไหม?\""
1001403-42 = "คะ? แต่ว่า..."
1001403-43 = "คะ? แต่ว่า..."
1001403-44 = "ไม่รู้ว่าจะเกิดภัยคุกคามรอบตัวนายท่านเมื่อไหร่นี่คะ?"
1001403-45 = "จะให้ฉันหยุดคุ้มกันนายท่านไม่ได้หรอกค่ะ!"
1001403-46 = "[s] \"ภัยคุกคามรอบตัว? ที่นี่น่ะเหรอ?\""
1001403-47 = "ห้ามประมาทนะคะนายท่าน!"
1001403-48 = "ละครนินจาย้อนยุคที่ออกอากาศเมื่อวานก็มีเหตุการณ์แบบนี้เหมือนกันค่ะ!"
1001403-49 = "ทันทีที่นินจาได้ยินนายท่านบอกว่า \"ไม่ต้องคุ้มกันอีกต่อไป ถอนตัวไปซะ\" พอถอนตัวไปแล้ว…"
1001403-50 = "ศัตรูก็บุกเข้ามาโจมตีเลยค่ะ...!"
1001403-51 = "[s] \"เธอดูทีวีมากเกินไปแล้ว...!\""
1001403-52 = "ตอนนั้นในละคร นินจากลับมาทันเวลาพอดี..."
1001403-53 = "แล้วก็ปกป้องนายท่านจากลูกธนูที่พุ่งมาจากทุกทิศทาง"
1001403-54 = "แบบนี้…!"
1001403-55 = "ปัดทิ้งออกไปได้เท่สุดๆ เลยค่ะ!"
1001403-56 = "อิซุนะก็อยากทำแบบนั้นบ้างนะคะ!"
1001403-57 = "อ่า~ จะมีธนูพุ่งมาจากทางไหนบ้างไหมนะ..."
1001403-58 = "[s] \"มีธนูพุ่งมาก็แย่น่ะสิ?!\""
1001403-59 = "นายท่าน..."
1001403-60 = "คือว่าตอนนี้อิซุนะรบกวนนายท่านอยู่หรือเปล่าคะ...?"
1001403-61 = "[s5] \"ก็ไม่ใช่แบบนั้นหรอก...\"\n[s6] \"อิซุนะไม่ต้องเดินตามครูตลอดก็ได้นะ...\""
1001403-62 = "ถ้าอย่างนั้นก็ไม่เป็นไรเลยค่ะ!"
1001403-63 = "ถ้าอย่างนั้นก็ไม่เป็นไรเลยค่ะ!"
1001403-64 = "ก็อิซุนะเป็นนินจาของนายท่านนี่คะ!"
1001403-65 = "อ๊ะ!!"
1001403-66 = "[s] \"หืม?\""
1001403-67 = "นายท่าน อันตราย!"
1001403-69 = "[ns] \"มีเรื่องอะไรเหรอ?\""
1001403-72 = "ฮู่ว... แค่สุนัขจรจัดน่ะค่ะ"
1001403-74 = "นายท่าน! โชคดีจังที่ปลอดภัยค่ะ! (อมยิ้ม)"
1001403-75 = "[s] \"อะ... อื้อ ขอบใจนะ\""
1001403-76 = "ฮิฮิ อิซุนะช่วยไว้ได้ใช่ไหมล่ะคะ นายท่าน!"
1001403-77 = "(พอเห็นสีหน้ายิ้มแย้มของอิซุนะแล้วก็รู้คงบอกให้เธอหยุดตามได้ยาก...)"
1001403-78 = "[s] \"แน่นอน ช่วยได้เยอะเลย\""
1001403-79 = "ฮิฮิ! ค่า ต่อไปก็ฝากตัวด้วยนะคะ นายท่าน!"
1001403-80 = "[s] \"ดะ... ได้สิ...\""
1001403-82 = "(คุณครูได้รับการคุ้มกันจากอิซุนะตลอดทั้งวันหยุด...)"

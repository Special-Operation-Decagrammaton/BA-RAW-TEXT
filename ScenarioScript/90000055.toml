[translation]
90000055-2 = "ทำได้ดีมากค่ะ ทั้งคุณครูและเอมิเลย"
90000055-6 = "ฉันว่าเราได้ข้อมูลมาเพียงพอแล้วค่ะ"
90000055-7 = "อื้อ เรื่องง่ายๆ แค่นี้เอง"
90000055-8 = "ต่อไปคือคิวของฉันที่ต้องไล่ย้อนข้อมูลที่รวบรวมมาได้สินะคะ..."
90000055-14 = "ฮืม... อย่างนั้นสินะ"
90000055-15 = "อย่างนี้นี่เอง... เรื่องนี้อาจต้องใช้เวลาสักหน่อยค่ะ"
90000055-16 = "ฉันจะคำนวณพิกัดของเชเซ็ดดู ทั้งสองคนไปพักกันก่อนสักหน่อยไหมคะ?"
90000055-17 = "อืม เอาสิ "
90000055-21 = "[ns] \"ฝากด้วยนะฮิมาริ\""
90000055-23 = "ตอนต่อไป;รวบรวมข้อมูล 6 - เชเซ็ด"

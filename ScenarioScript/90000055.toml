90000055-15 = "唔嗯……這可能需要花費一點時間。"
90000055-16 = "赫賽德所在位置的座標就交由我來計算，請兩位稍微休息一下吧。"
90000055-17 = "嗯，我知道了。"
90000055-21 = "[ns] 「麻煩你囉，陽葵。」"
90000055-23 = "下一話;蒐集情報(6)赫賽德"

[translation]
2002205-1 = "อยากให้เป็นไปอย่างช้าๆ ในบางครั้ง"
2002205-2 = "สนาม เกเฮนน่า"
2002205-9 = "ขะ...ขอโทษค่ะ! รอนานรึเปล่าคะ?"
2002205-10 = "[s] \"ครูก็เพิ่งมาถึงเมื่อกี้เองน่ะ\""
2002205-11 = "ฉันใส่ชุดกิโมโนตามที่คุณครูบอกมาแล้ว..."
2002205-12 = "แต่ว่า... มีเรื่องอะไรงั้นเหรอคะ?"
2002205-13 = "[s1] \"พวกเราย้ายที่คุยกันก่อนดีมั้ย?\"\n[s2] \"ครูจะพาไปที่ที่ฟูกะคุ้นเคย ในเขตเกเฮนน่านี่แหละ\""
2002205-16 = "คะ...?"
2002205-17 = "งั้นฉันจะเชื่อ... คุณครูค่ะ"
2002205-19 = "ในตัวเมือง"
2002205-20 = "ที่นี่คือจุดชมวิว สกายวอร์คที่สูงที่สุดที่เคยได้ยินมาเลยนี่คะ"
2002205-21 = "ขึ้นลิฟต์ความเร็วสูงขึ้นมาแล้ว..."
2002205-22 = "ว้าว... รู้สึกเหมือนแค่กะพริบตาเองค่ะ"
2002205-26 = "ว้าว... มองเห็นในเมืองได้หมดเลยค่ะ"
2002205-27 = "แต่ว่าทำไมที่พื้นข้างใต้ถึงเป็นกระจกล่ะคะ?!"
2002205-28 = "ขาสั่นจนเดินไปไหนไม่ได้เลยค่ะ!"
2002205-29 = "ขะ... ขอโทษนะคะคุณครู ชะ... ช่วยจับมือฉันไว้หน่อยได้มั้ยคะ!"
2002205-35 = "พอลงมาถึงพื้นแล้ว รู้สึกรอดตายเลยค่ะ!"
2002205-36 = "วิวที่ได้ดูบนจุดชมวิวมันสุดยอดมากๆ ก็จริงอยู่หรอกค่ะ..."
2002205-37 = "คะ? ที่จริงคุณครูเองก็กลัวเหมือนกันเหรอคะ?"
2002205-38 = "แล้วทำไมคนอื่นๆ ถึงยอมจ่ายเงินขึ้นไปดูที่แบบนั้นกันนะคะ? ฉันไม่เข้าใจเลยค่ะ..."
2002205-39 = "พอได้ยินฉันพูดแบบนั้นแล้ว ก็นึกสถานที่ที่น่าไปขึ้นได้เหรอคะ?"
2002205-40 = "สถานที่ที่จะไปนี่คงไม่น่ากลัวใช่มั้ยคะ? นะ... แน่นอนว่าจุดชมวิวก็โอเคอยู่ค่ะ..."
2002205-48 = "สวนสนุก"
2002205-50 = "อ๊ะ สวนสนุกงั้นเหรอคะ ฉันก็เคยได้ยินมาเยอะเหมือนกันค่ะ"
2002205-54 = "คะ? ในสภาพที่หยุดนิ่ง สามารถเร่งความเร็วได้สูงถึง 180 กิโลเมตรต่อชั่วโมง ภายใน 1.56 วินาที?"
2002205-55 = "เส้นผ่าศูนย์กลางยาว 39.7 เมตร?"
2002205-56 = "คนขึ้นไปนั่งบนนั้นได้จริงๆ เหรอคะ? นั่นจะไม่ตายเอาเหรอคะ?!"
2002205-57 = "[s] \"ถ้าฟูกะไม่อยากขึ้นก็ไม่เป็นไรนะ\""
2002205-58 = "ฮือออ... แต่ว่าคุณครูอุตส่าห์ชวนมาทั้งที แถมยังสละเวลามากับฉัน..."
2002205-59 = "ฉัน... ฉันจะขึ้นด้วยค่ะ ฟูกะ... จะขึ้นด้วยค่ะ!"
2002205-61 = "กรี๊ดดดดดดดดดดดดดดดดดดดด!!"
2002205-70 = "ฮือ... นึกว่าจะต้องไปเกิดใหม่ซะแล้วค่ะ"
2002205-71 = "คะ? ขบวนพาเหรดใกล้จะเริ่มแล้วเหรอคะ?"
2002205-72 = "ตรงนั้นสินะคะ! มีชื่อสหพันธ์เฮียกคิยาโคเขียนเอาไว้ด้วยค่ะ"
2002205-73 = "นั่นน่ะเหรอความสามารถพิเศษในการจัดงานเทศกาลของสหพันธ์เฮียกคิยาโคที่เขาร่ำลือกัน..."
2002205-74 = "เอ๋? มีขบวนของโรงเรียนมัธยมซานไห่จิงอยู่ข้างหลังด้วยละค่ะ แล้วก็นั่นมัน... เรดวินเทอร์?"
2002205-75 = "อ๊ะ... นี่เป็นขบวนพาเรดที่ตกแต่งตามคอนเซปต์ลักษณะเด่นของแต่ละโรงเรียนงั้นเหรอคะ?"
2002205-76 = "ถ้างั้น... ก็คงมีเกเฮนน่าด้วยใช่มั้ยคะ? ว้าว... มีขบวนของทรีนิตี้ด้วยค่ะ..."
2002205-78 = "ย่านการค้า"
2002205-83 = "ขอบคุณมากเลยนะคะคุณครู อะฮ่าฮ่าฮ่า..."
2002205-84 = "คงจะหิวแล้วใช่มั้ยคะ? ฉันก็รู้สึกเหนื่อยนิดหน่อยเหมือนกัน... เราไปหาที่นั่งพักกันดีมั้ยคะ?"
2002205-85 = "คะ? เวลาแบบนี้ให้ไปร้านไหนก็ได้ที่อยากไปเลยงั้นเหรอคะ?"
2002205-86 = "คือว่า... สั่งอะไรก็ได้ที่อยากสั่งได้จริงๆ งั้นเหรอคะ?"
2002205-87 = "แต่ว่า... แบบนั้นออกจะเสียมารยาทไปหน่อย..."
2002205-88 = "กะ... ก็ได้ค่ะ ถ้าคุณครูพูดแบบนั้นละก็..."
2002205-90 = "(คุณครูกับฟูกะช่วยกันระดมสั่งอาหารที่ดูน่ากินมาอย่างจุใจ)"
2002205-92 = "อาหารดูน่าอร่อยดีนะคะ แต่ว่า..."
2002205-93 = "ไม่เป็นไรแน่เหรอคะ? คือว่าราคามัน..."
2002205-94 = "ใช้เงินเยอะแยะขนาดนี้กับเด็กอย่างฉัน มันจะไม่เป็นไรแน่เหรอคะ?!"
2002205-95 = "[s] \"ถ้าเพื่อฟูกะแล้วละก็ แค่นี้น่ะเล็กน้อย!\""
2002205-96 = "ต้องขอโทษด้วยจริงๆ ค่ะ..."
2002205-97 = "คะ? ตอนนี้ไม่ใช่เวลามาขอโทษงั้นเหรอคะ?"
2002205-98 = "ค่ะ... จริงด้วยสินะคะ คุณครูพูดถูกแล้วค่ะ"
2002205-99 = "ขอบคุณค่ะคุณครู"
2002205-100 = "[s] \"คงเมื่อยขาแล้วสินะ แต่ว่าเดินต่ออีกหน่อยไหวรึเปล่า?\""
2002205-101 = "ค่ะ ไหวอยู่แล้วค่ะ!"
2002205-103 = "ถนน"
2002205-108 = "เงียบดีจังเลยนะคะ..."
2002205-109 = "แล้วอีกอย่าง นานแล้วนะคะที่ฉันไม่ได้ออกมาข้างนอกในเวลานี้"
2002205-110 = "[s] \"เป็นวันที่วุ่นวายจนลืมเวลาเลยเนอะ\""
2002205-111 = "นั่นสินะคะ วันนี้วุ่นวายดีจังเลยค่ะ"
2002205-112 = "[s] \"ขอแค่ฟูกะมีเวลาสนุกแบบนี้บ้างก็พอแล้ว\""
2002205-113 = "คะ...?"
2002205-114 = "ทำไมถึงทำแบบนี้คะ...?"
2002205-115 = "[ns] \"ฟูกะน่ะ โดนขังอยู่ในเกเฮนน่าอย่างเดียวเลยนี่นา\""
2002205-117 = "[ns] \"ครูอยากให้ฟูกะได้เห็นอะไรหลายๆ อย่างน่ะ\""
2002205-121 = "คะ... คุณครู..."
2002205-122 = "โดนขังอะไรกันคะ ไม่ใช่แบบนั้น... สักหน่อยค่ะ..."
2002205-123 = "ฉันก็แค่... ทำในสิ่งที่ฉันต้องทำเท่านั้นเองค่ะ..."
2002205-124 = "[ns] \"ครูรู้แล้วละ\""
2002205-126 = "[ns] \"แต่ยังไง ถ้าเป็นของขวัญวันหยุดยาวที่ดีสำหรับฟูกะก็คงดีนะ\""
2002205-127 = "ของขวัญ วันหยุดยาว..."
2002205-128 = "อย่างนั้น... เหรอคะ... เข้าใจแล้วค่ะคุณครู"
2002205-131 = "― ฉันมีความสุขมาก... จริงๆ ค่ะ[wa:2480] "
2002205-134 = "― ไม่ว่าเมื่อไรก็รู้สึกขอบคุณเสมอเลยค่ะคุณครู[wa:2280] "
2002205-137 = "― ฉันได้รับสิ่งต่างๆ มากมาย จากคุณครูค่ะ[wa:2980] "
2002205-140 = "― คนที่กินอาหารที่ฉันทำอย่างเอร็ดอร่อยกว่าใคร...[wa:1100] "
2002205-141 = "― ไม่ว่าเมื่อไร... ก็ยังคงเป็นคุณครูค่ะ[wa:900] "
2002205-144 = "― เรื่่องนั้น...[wa:1100] "
2002205-145 = "― นับเป็นของขวัญที่ยิ่งใหญ่ที่สุด สำหรับฉันเลยค่ะ[wa:1940] "
2002205-148 = "― เพราะงั้น... เอ่อ... คุณครูคะ...[wa:3240] "
2002205-149 = "― จากนี้ไป... ก็ขอรบกวนด้วยนะคะ[wa:2840] "
2002205-152 = "(เวลาล่วงเลยมาดึกมากแล้ว คุณครูเลยเดินไปส่งฟูกะกลับที่พัก)"
2002205-153 = "สนาม เกเฮนน่า"
2002205-161 = "อ๊าย?!"
2002205-166 = "[ns] \"เป็นอะไรรึเปล่า?!\""
2002205-167 = "คะ... ไม่เป็นไรค่ะ แค่สะดุดนิดหน่อย..."
2002205-168 = "อ๊ะ!"
2002205-169 = "ขอโทษค่ะ พอดีข้อเท้ามัน... อ๊าย!?"
2002205-171 = "(คุณครูไถลไปรับตัวฟูกะที่กำลังจะล้มเอาไว้)"
2002205-174 = "คะ... คุณครู?"
2002205-175 = "คุณครู..."
2002205-176 = "ฉัน... ขออยู่แบบนี้อีกสักหน่อย ได้รึเปล่าคะ?"
2002205-180 = "(ที่จริง... ตอนนี้จะดีขึ้นแล้วก็เถอะ....)"
2002205-181 = "(ขอโทษนะคะคุณครู ฉัน... คงเป็นเด็กเกเรจริงๆ ค่ะ)"
2002205-183 = "(คุณครูประคองฟูกะ แล้วค่อยๆ พาเดินกลับอย่างระมัดระวัง)"

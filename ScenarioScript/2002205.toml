[translation]
2002205-1 = "連假最後的出遊"
2002205-2 = "格黑娜學園．校園"
2002205-9 = "不好意思，讓你久等了……！"
2002205-10 = "[s]「不會，我也是剛剛才到唷。」"
2002205-11 = "雖然依照約定穿著和服出來……"
2002205-12 = "那個……要做些什麼呢？"
2002205-13 = "[s1]「總之先換個地方吧？」\n[s2]「格黑娜應該是風華很熟悉的地方。」"
2002205-16 = "……？"
2002205-17 = "總，總之，我就相信老師囉……？"
2002205-19 = "市區"
2002205-20 = "這就是那座超高的瞭望塔……"
2002205-21 = "不，不知道是不是因為搭乘超高速電梯上來的關係……"
2002205-22 = "好像有點頭暈……"
2002205-26 = "啊，好厲害……！能將整個市區盡收眼底呢！"
2002205-27 = "不，不過，為何腳底下是玻璃呢……？"
2002205-28 = "啊。我的腳抖個不停，動彈不得……"
2002205-29 = "老，老師，那個……可以的話，請握著我的手……"
2002205-35 = "第一次親身感受到了地面的美好……！"
2002205-36 = "雖然從觀景台俯瞰的景色十分美妙，不過高的地方還是讓我有點害怕呢……"
2002205-37 = "……咦，老師你也怕嗎？"
2002205-38 = "這種特地讓自己害怕的習性究竟是從何而來的呢……"
2002205-39 = "接下來想去的地方？"
2002205-40 = "那個，雖然交給老師決定，但……不會不會，瞭望塔也很棒……！"
2002205-48 = "遊樂園"
2002205-50 = "遊樂園……雖然很常聽別人提起……"
2002205-54 = "……？停止狀態下，以1.56秒加速至180km/h……？"
2002205-55 = "而且途中還會經過直徑39.7m的360度立體軌道……？"
2002205-56 = "那個搭上去真的沒問題嗎！？大家能平安回來嗎！？"
2002205-57 = "[s]「當，當然我也不會強迫你……」"
2002205-58 = "唔……可是這是老師的推薦，難得能兩個人過來……"
2002205-59 = "我，我要搭……來都來了就搭吧！"
2002205-61 = "呀啊啊啊啊啊啊啊啊！"
2002205-70 = "嗚嗚……還以為真的要死掉了……"
2002205-71 = "咦，遊行馬上要開始了嗎？"
2002205-72 = "啊，上面寫著百鬼夜行聯合學園的名字呢。"
2002205-73 = "那就是傳聞中的百鬼夜行聯合學園的慶典之力……"
2002205-74 = "咦……？後面還有山海經的隊伍呢？#n更後面還有赤冬？"
2002205-75 = "啊，原來如此……是以各個學校的特徵為概念的遊行對吧？"
2002205-76 = "也就是說，格黑娜也會出現嗎？啊，是三一……！"
2002205-78 = "商店街"
2002205-83 = "真開心呢，老師。"
2002205-84 = "走的有點累……肚子也有點餓了，想找間店休息一下呢。"
2002205-85 = "咦，憑直覺……那，那就……那邊那間店怎麼樣？"
2002205-86 = "想，想怎麼點就怎麼點……！？"
2002205-87 = "這，這句話聽起來好像有點可怕……"
2002205-88 = "不過，難得有這種機會……就在保持適量的前提下……！"
2002205-90 = "（和風華一起享用了美味的料理）"
2002205-92 = "真好吃！"
2002205-93 = "不過價錢沒問題嗎？老師在我沒注意到的時候就先結帳了……"
2002205-94 = "不，不是，要我不在意實在是有點困難……！？"
2002205-95 = "[s]「如果是為了風華，這點程度不算什麼！」"
2002205-96 = "總，總覺得有點抱歉……"
2002205-97 = "咦，希望我別道歉……？"
2002205-98 = "……呵呵。說的也是，我好像搞錯了該說的話呢。"
2002205-99 = "非常謝謝你，老師！"
2002205-100 = "[s]「我想到對面去，體力還夠嗎？」"
2002205-101 = "是，當然！"
2002205-103 = "夜櫻之路"
2002205-108 = "這附近真安靜呢。"
2002205-109 = "好像很久沒有在這麼晚的時間外出散步了。"
2002205-110 = "[s]「好像把今天安排得太匆忙了呢……」"
2002205-111 = "不會不會，今天是非常充實的一天。"
2002205-112 = "[s]「能讓風華開心就太好了。」"
2002205-113 = "這，這是……？"
2002205-114 = "為何突然這麼說……？"
2002205-115 = "[ns]「因為風華一直都在格黑娜努力。」"
2002205-117 = "[ns]「所以偶爾也想讓你在別的地方，體驗其他快樂的事。」"
2002205-121 = "老，老師……"
2002205-122 = "那種，好像我被關住了的說法……不，雖然也不能說完全沒有……"
2002205-123 = "但是……我只是做自己該做的事而已。"
2002205-124 = "[ns]「很像風華會說的話呢。」"
2002205-126 = "[ns]「不過即便如此，我也希望偶爾能讓風華過個好的連假。」"
2002205-127 = "好的連假……"
2002205-128 = "這樣呀。能和老師一起度過，確實是個好的連假呢。"
2002205-131 = "― 我真的……很開心。[wa:3240] "
2002205-134 = "― 一直以來非常謝謝你，老師。[wa:3480] "
2002205-137 = "― 老師總是讓我獲益良多呢。[wa:4020] "
2002205-140 = "― 比任何人都更加津津有味地享用我的料理的……[wa:2100] "
2002205-141 = "― 總是老師……[wa:2140] "
2002205-144 = "― 這……[wa:1540] "
2002205-145 = "― 對我來說，就是最棒的禮物了。[wa:3260] "
2002205-148 = "― 所以，那個……老師。[wa:4120] "
2002205-149 = "― 今後也拜託你囉？[wa:3680] "
2002205-152 = "（夜深之時，在送風華回去的路上……）"
2002205-153 = "格黑娜學園．校園"
2002205-161 = "呀啊！？"
2002205-166 = "[ns]「風華！？」"
2002205-167 = "我，我沒事。只是腳稍微……"
2002205-168 = "……！"
2002205-169 = "不，不好意思，好像有點扭到了……啊……！"
2002205-171 = "（緊緊抱住了搖搖晃晃的風華）"
2002205-174 = "老，老師……！？"
2002205-175 = "……"
2002205-176 = "那，那個……可以再稍微，維持這個樣子一會嗎……？"
2002205-180 = "（其實並沒有到站不起來那麼嚴重……）"
2002205-181 = "（對不起……就讓我暫時當個無法獨自努力的壞孩子吧……）"
2002205-183 = "（之後便扶著風華，踏上了回程的路）"

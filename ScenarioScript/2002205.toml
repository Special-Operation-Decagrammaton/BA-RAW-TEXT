[translation]
2002205-1 = "Keep It Slow Like So"
2002205-2 = "Gehenna Campus"
2002205-9 = "Sensei! I'm so sorry. I hope you weren't waiting long."
2002205-10 = "[s] \"Don't apologize! I just got here too.\""
2002205-11 = "I wore my kimono, just like you asked."
2002205-12 = "But...what are we doing?"
2002205-13 = "[s1] \"First, we're going to get out of here.\" \n[s2] \"You need to get out of Gehenna a little, Fuuka.\""
2002205-16 = "Wh-What...?"
2002205-17 = "Well, okay. I'll trust you, Sensei."
2002205-19 = "Downtown"
2002205-20 = "I've heard some students talk about this place. It's a huge skyscraper observatory, right?"
2002205-21 = "I've never been in such a fast elevator..."
2002205-22 = "I'm still a little dizzy. Who knew I got motion sick?"
2002205-26 = "Look, Sensei. You really can see the whole city!"
2002205-27 = "B-But...why is even the floor made of glass?!"
2002205-28 = "It's so scary... I don't think I can even get over to you."
2002205-29 = "I-I'm sorry, Sensei, but can you come hold my hand?"
2002205-35 = "Phew! It's a relief to have both feet on solid ground again."
2002205-36 = "Don't get me wrong! I loved the view. It was just...the height...combined with clear floors..."
2002205-37 = "What? You were scared too, Sensei?"
2002205-38 = "It's a strange phenomenon... Why do people pay money to go somewhere that scares them?"
2002205-39 = "What do you mean? It reminds you of someplace else you'd like to go?"
2002205-40 = "It had better not be scary, Sensei! I enjoyed the observatory, but that was about my limit!"
2002205-48 = "Amusement Park"
2002205-50 = "Oh, an amusement park! I overheard some students in the lunchroom gushing about their trip to one of these the other day."
2002205-54 = "What? It accelerates from zero to 110 miles per hour in 1.56 seconds?!"
2002205-55 = "And it has an upside-down loop with a diameter of 39.7 meters?"
2002205-56 = "Is this safe for people?! Are we going to die?"
2002205-57 = "[s] \"Don't feel pressured to if you don't want to.\""
2002205-58 = "But...you went through all the effort of planning this for us."
2002205-59 = "Okay. I can do this. I'll ride the rollercoaster!"
2002205-61 = "KYAAAH!"
2002205-70 = "Ugh... A-Am I still alive?"
2002205-71 = "Hm? The parade is starting soon?"
2002205-72 = "Oh, that! I see Allied Hyakkiyako Academy's name on the banner."
2002205-73 = "I've heard of Hyakkiyako's extravagant festivals, but I'd never dreamed I would see one in person!"
2002205-74 = "Look, Sensei. That's Shanhaijing Academy behind them! And...Red Winter as well?"
2002205-75 = "I see. How fascinating! It's a parade highlighting the unique characteristics and symbols of the different schools in Kivotos."
2002205-76 = "I wonder if we'll see Gehenna! Ah, over there is Trinity and..."
2002205-78 = "Shopping District"
2002205-83 = "Thank you for everything today, Sensei. Hahaha."
2002205-84 = "You're hungry? I could use a break as well... Where should we eat?"
2002205-85 = "Hm? We can go to whatever restaurant I want?"
2002205-86 = "And I can order whatever I want as well?"
2002205-87 = "I... I would feel so guilty..."
2002205-88 = "W-Well... If you say so, Sensei."
2002205-90 = "Fuuka and I entered a restaurant of her choosing and ordered everything we wanted off the menu."
2002205-92 = "What a delicious meal. B-But..."
2002205-93 = "Are you sure, Sensei? The bill is so..."
2002205-94 = "Are you really okay with spending so much on someone like me?!                                           "
2002205-95 = "[s] \"Someone like you deserves even nicer meals than this, Fuuka!\""
2002205-96 = "I'm sorry..."
2002205-97 = "Hm? It's not something to apologize for?"
2002205-98 = "I just... Okay, I guess I understand..."
2002205-99 = "Thank you, Sensei."
2002205-100 = "[s] \"How about we take a little walk, if you're not tired.\""
2002205-101 = "I'm not at all! Let's take a walk."
2002205-103 = "Street"
2002205-108 = "How quiet..."
2002205-109 = "I'm not normally out by the time the city starts to sleep."
2002205-110 = "[s] \"We had a long day together.\""
2002205-111 = "It was a rather incredible one though."
2002205-112 = "[s] \"I'm glad. I wanted you to feel free today.\""
2002205-113 = "F-Free?"
2002205-114 = "What do you mean?"
2002205-115 = "[ns] \"Your domain is locked up in the lunch room at Gehenna...\""
2002205-117 = "[ns] \"...But you deserve to see more. Experience everything.\""
2002205-121 = "S-Sensei..."
2002205-122 = "I wouldn't say I'm locked up in there..."
2002205-123 = "It's my choice to focus on fulfilling my duties."
2002205-124 = "[ns] \"That's what I like about you, Fuuka.\""
2002205-126 = "[ns] \"But someone hardworking like you deserved a holiday gift.\""
2002205-127 = "My holiday gift..."
2002205-128 = "I think I understand what you wanted to achieve today, Sensei."
2002205-131 = "― I'm just...so happy.[wa:2800] "
2002205-134 = "― Thank you, once again, Sensei.[wa:2800] "
2002205-137 = "― You always give me so much.[wa:3420] "
2002205-140 = "― You always enjoy my food...[wa:1860] "
2002205-141 = "― You enjoy it more than anyone.[wa:1180] "
2002205-144 = "― That's...[wa:1300] "
2002205-145 = "― the greatest gift someone could  ever give me.[wa:1980] "
2002205-148 = "― So, um... Sensei.[wa:3840] "
2002205-149 = "― Please keep eating my food, tomorrow and always.[wa:2080] "
2002205-152 = "Fuuka enjoyed a quiet walk in the sleeping city as I walked her home."
2002205-153 = "Gehenna Campus"
2002205-161 = "EEK!"
2002205-166 = "[ns] \"Are you okay?!\""
2002205-167 = "Y-Yes, I just stumbled a little..."
2002205-168 = "Ouch!"
2002205-169 = "I'm sorry... I think I sprained my ankle. Ack!"
2002205-171 = "I caught her just in time as Fuuka staggered forward."
2002205-174 = "S-Sensei?"
2002205-175 = "Sensei..."
2002205-176 = "Can we...stay like this a little longer?"
2002205-180 = "(It actually doesn't hurt anymore... )"
2002205-181 = "(I'm sorry, Sensei. I think...I'm a bad girl.)"
2002205-183 = "I supported Fuuka's bad ankle as we made our way back to her room."

[translation]
10045060-1 = "第6話;敗部復活戰：沙灘排球"
10045060-2 = "大家～！都有充分休息了嗎？"
10045060-3 = "那麼接下來，大家期待已久的敗部復活戰──沙灘排球的第一場比賽即將開始！"
10045060-4 = "歡迎選手們入場！"
10045060-14 = "比賽採取先得10分的單局決勝制！"
10045060-15 = "肯定會是場精采絕倫、緊張刺激的比賽！"
10045060-16 = "[ns]「先攻就用剪刀石頭布決定吧！」"
10045060-17 = "各隊代表，請上前……！"
10045060-24 = "嘿嘿嘿，我要出石頭。"
10045060-25 = "哼～想玩心理戰啊。"
10045060-26 = "想贏的話就出布吧。我會用石頭堂堂正正地突破給你看。"
10045060-27 = "堂堂正正出石頭嗎……原來如此。"
10045060-29 = "[ns]「預備～！剪刀石頭……布！」"
10045060-31 = "石頭……！#n青春就是要勇往直前！咦！？"
10045060-32 = "嘿嘿嘿，還真是堂堂正正啊？#n不過我想贏，所以出了布！"
10045060-34 = "……抱歉，桔梗。"
10045060-35 = "沒關係，就算先攻被搶走也能馬上追回來。#n畢竟實力終究是我們占優。"
10045060-37 = "唔嗯，雖然開局還算不錯，但接下來該怎麼辦？#n你有什麼好主意嗎？"
10045060-38 = "當然有。"
10045060-39 = "那個桔梗剛剛才掉進水裡昏過去了對吧？"
10045060-40 = "我們就集中攻擊他吧。#n要徹底打擊對方的弱點！"
10045060-41 = "嗯……雖然我不太喜歡這種做法就是了……"
10045060-43 = "那麼比賽開始！"
10045060-44 = "光明正大～一決勝負！"
10045060-48 = "接招吧……！野心勃勃的扣球發球！！"
10045060-57 = "咕嗚……！"
10045060-59 = "啊啊！球打到桔梗選手身上，出界了！"
10045060-60 = "開局沒多久就先馳得點呢！"
10045060-61 = "嘿，果然如我所料。#n就跟你說吧？他就是弱點！"
10045060-62 = "我是……弱點？"
10045060-63 = "沒錯。在這個圈子裡混久了，對方的想法只要看眼神就能知道了。"
10045060-64 = "你現在心裡是這麼想的吧？"
10045060-66 = "覺得自己幫不上忙。"
10045060-67 = "覺得自己只會拖累大家。"
10045060-68 = "畢竟你可是害隊友全都被淘汰了，會這麼想也不奇怪吧。"
10045060-69 = "……！"
10045060-70 = "桔梗！別理他！"
10045060-71 = "……我知道，別擔心。"
10045060-72 = "那麼再來一次，接招吧……！"
10045060-79 = "唔……！"
10045060-81 = "沒事！球還沒落地！我來接！"
10045060-85 = "桔梗！收拾他們吧！"
10045060-86 = "明白了……！"
10045060-88 = "喂！狸貓！攔網！"
10045060-89 = "你叫誰狸貓啊！"
10045060-96 = "唔哇……！？"
10045060-101 = "新選手，漂亮的臉部攔網！#n比分差距拉到了2分！"
10045060-102 = "啊……"
10045060-103 = "嘿嘿嘿，太棒了！就照這樣打！"
10045060-104 = "一點也不好！#n嗚……流鼻血了……"
10045060-105 = "你也看到了吧？他們沒想像中強！"
10045060-106 = "只要繼續針對那個桔梗攻擊……！！"
10045060-108 = "……"
10045060-109 = "這些傢伙，真是得寸進尺……！"
10045060-111 = "比賽就這樣持續著……"
10045060-122 = "第一場比賽結束！"
10045060-123 = "瞬息萬變的攻防！真是場激烈的比賽！"
10045060-124 = "哈啊，哈啊……"
10045060-125 = "……"
10045060-127 = "呵，呵呵呵……"
10045060-128 = "燃燒殆盡了……"
10045060-130 = "最終比分是10比7！"
10045060-131 = "第一場比賽，由桔梗＆蓮華隊獲勝！"
10045060-132 = "搞什麼，未免也太強了吧……"
10045060-133 = "我就說不行了吧……"
10045060-139 = "接下來進行賽後訪問！"
10045060-140 = "[ns]「蓮華的表現真是亮眼！」"
10045060-141 = "我只是做了該做的事。"
10045060-142 = "請問比賽的主導權在中途轉到你們隊的原因是什麼呢？"
10045060-143 = "只是從「不想輸」變成了「不能輸」而已。"
10045060-144 = "因為我無法原諒侮辱我朋友的人。"
10045060-146 = "……"
10045060-147 = "桔梗前輩的狀態似乎還沒恢復。"
10045060-148 = "和蓮華前輩的配合也不太順利。"
10045060-149 = "這樣啊……"
10045060-150 = "桔梗……還在介意剛剛的事嗎。"
10045060-151 = "說到這個，紫。我也有件事沒告訴大家。"
10045060-152 = "我好像在比噴射快艇的時候太勉強自己了……右手現在有點無力。"
10045060-153 = "那，那得趕快去看醫生才行──"
10045060-154 = "不用擔心。其實並沒有那麼嚴重，很快就會恢復的。"
10045060-155 = "我，我明白了！#n那麼在前輩的右手恢復之前，就交給小女子吧！"
10045060-157 = "……原來如此。"
10045060-158 = "嗯？怎麼了嗎？"
10045060-159 = "名草同學的狀態似乎不太好……讓人有點擔心呢。"
10045060-160 = "咦？光用看的就知道了嗎？"
10045060-161 = "呵呵，這是有訣竅的。"
10045060-163 = "那麼！馬上將開始進行第二場比賽！請選手們入場！"
10045060-173 = "光明正大～一決勝負！"
10045060-175 = "第二場比賽就此展開。"
10045060-185 = "一場激烈的混戰開始了。"
10045060-190 = "啊啊，三森選手！彷彿能讀懂對手心思的打法！！"
10045060-191 = "配合簡直完美！竟然能對百花繚亂打出這種表現！！"
10045060-192 = "……的確。我們的想法全被看穿了。"
10045060-193 = "想法被看穿了嗎……"
10045060-194 = "想太多反而會導致身手變遲鈍……"
10045060-195 = "既然如此……"
10045060-196 = "乾脆就把腦袋放空吧！"
10045060-197 = "像巫女般隨風舞動。#n如櫻花般乘風紛飛……"
10045060-198 = "小女子將柔韌且堅定地面對自己！"
10045060-199 = "比賽繼續，由百花繚亂隊發球！"
10045060-200 = "來吧！全力進攻的時間到了！"
10045060-209 = "哦哦，比賽節奏突然改變了耶。"
10045060-210 = "嗯。紫和名草前輩互補得很漂亮。"
10045060-211 = "相較之下，我實在……"
10045060-212 = "喂喂，你要煩惱到什麼時候啊。"
10045060-213 = "沒必要那麼沮喪。#n哪有人是完美無缺的呢？"
10045060-214 = "會迷惘跟掙扎才是青春啊！"
10045060-216 = "……"
10045060-217 = "不如這樣吧，桔梗。"
10045060-218 = "無論結果如何，這場敗部復活戰結束之後就來跟我學游泳吧。"
10045060-219 = "我……學游泳？"
10045060-220 = "嗯。桔梗那麼聰明，一定很快就能學會的。#n到時候你就不會再怕水了。"
10045060-221 = "……你憑什麼這麼篤定？"
10045060-222 = "憑我一直在你身邊看著你啊。"
10045060-224 = "難道這樣還不夠嗎？"
10045060-228 = "……真是的，你那濫好人的個性還是一點都沒變呢。"
10045060-233 = "歷經激烈的攻防之後，勝負已經揭曉了！"
10045060-234 = "雙方都打出了精彩的比賽！"
10045060-235 = "以10比8的比分，晉級敗部復活戰決賽的是……！"
10045060-236 = "[ns]「名草＆紫隊！」"
10045060-244 = "……"
10045060-247 = "（蓮華是從小跟我一起長大的青梅竹馬）"
10045060-248 = "（雖然性格完全不同，卻是最了解彼此的存在）"
10045060-249 = "（……沒錯。必須為了朋友振作起來才行）"
10045060-250 = "（我不想再拖後腿了）"
10045060-251 = "（一定要贏）"
10045060-252 = "（不是為了我自己，而是為了蓮華……！）"

[translation]
10045060-1 = "Episode 6;Revival Match: Beach Volleyball"
10045060-2 = "Welcome back! I hope everyone had a nice, restful break."
10045060-3 = "But there's no more time for that! Let the first revival match of this beach volleyball tournament begin!"
10045060-4 = "Players, step onto the court!"
10045060-14 = "The match is a single elimination. First to 10 points wins!"
10045060-15 = "In this tense back and forth, the winner only needs to be ahead by a single point to defeat their opponent!"
10045060-16 = "[ns] \"First serve will be decided by 'Rock, Paper, Scissors'!\""
10045060-17 = "Team captains, please come forward!"
10045060-24 = "Kekeke. I'm playing rock."
10045060-25 = "Hm, a psychological game?"
10045060-26 = "No, not at all! I really am gonna play rock! So you go ahead and play paper if you want to win. Fair and square!"
10045060-27 = "...Rock. I see."
10045060-29 = "[ns] \"Rock, paper...scissors!\""
10045060-31 = "Rock! Youth always prevails! ...Huh?!"
10045060-32 = "Kekeke! As if I'm gonna play fair! You fell for it! Paper wins!"
10045060-34 = "...I'm sorry, Kikyou."
10045060-35 = "It makes no difference. We'll make it up quickly. We ARE the Hyakkaryouran, are we not?"
10045060-37 = "Uhhh, at least that went well. But what now? What do we do against monsters like them?"
10045060-38 = "I have an idea, of course."
10045060-39 = "That uppity Kikyou girl fainted when she fell in the water, didn't she?"
10045060-40 = "She's probably still recovering. So we'll take advantage of that and target her!"
10045060-41 = "Um... I don't really wanna do that..."
10045060-43 = "Now, take your positions!"
10045060-44 = "Let this be a fair and square showdown!"
10045060-48 = "Take this! Ambitious Spike of Rage!"
10045060-57 = "Ugh!"
10045060-59 = "Ouch! The ball hits Kikyou and goes out of bounds!"
10045060-60 = "The first point goes to the Troublemakers!"
10045060-61 = "Keke. I knew it. You're the weak link."
10045060-62 = "What do you mean...the \"weak link\"?"
10045060-63 = "You learn how to read people when you're in this line of work. All I gotta do is look at you, and I've got you all figured out."
10045060-64 = "Let me guess what you're thinking."
10045060-66 = "\"I haven't helped my team at all.\""
10045060-67 = "\"I'm the only thing holding them back.\""
10045060-68 = "I mean, I do get it. They wouldn't even be here right now if you hadn't gotten them eliminated."
10045060-69 = "...!"
10045060-70 = "She's just trying to get under your skin, Kikyou!"
10045060-71 = "...I am not one to fall for such petty tactics. There's no need to worry."
10045060-72 = "Hmph. Then take this!"
10045060-79 = "Ugh...!"
10045060-81 = "The ball's up! That's all that matters. I got it!"
10045060-85 = "Finish it, Kikyou!"
10045060-86 = "Understood!"
10045060-88 = "Hey! Raccoon! Block!!"
10045060-89 = "M-Me?! You callin' me a raccoon?!"
10045060-96 = "Eek...?!"
10045060-101 = "An unexpected, but effective, face block from Arata! The troublemakers are now ahead by 2 points!"
10045060-102 = "Ah..."
10045060-103 = "Kekeke. Perfect! As long as we stick to this strategy...!"
10045060-104 = "What about this is perfect?! *sniff* My nose is bweedin'..."
10045060-105 = "So what? We still got the point! We're better than them!"
10045060-106 = "We just need to keep hammering away at their weak point!"
10045060-108 = "..."
10045060-109 = "Who do you think you're talking to?! I'll make you rue the day you talked down to the Hyakkaryouran!"
10045060-111 = "Thus the heated match continued."
10045060-122 = "Wow! And that's it for the first match!"
10045060-123 = "What intense volleys! I couldn't even bear to blink!"
10045060-124 = "*huff* *puff*..."
10045060-125 = "..."
10045060-127 = "Fu...Fufufu..."
10045060-128 = "I'm done for..."
10045060-130 = "The final score is 10 to 7!"
10045060-131 = "Team Hyakkaryouran #1 snatches the victory in our first match!"
10045060-132 = "They...really are strong..."
10045060-133 = "I've been telling you this...from the beginning..."
10045060-139 = "Now for our post-match interview!"
10045060-140 = "[ns] \"Renge was really shining out there!\""
10045060-141 = "I just did what I could."
10045060-142 = "At a certain point, your team really took charge of the court. What do you think caused that pivotal turn?"
10045060-143 = "It was when they turned it personal. It made me feel like I COULDN'T lose to those two."
10045060-144 = "I'll pummel anyone who insults my friends!"
10045060-146 = "..."
10045060-147 = "Kikyou's condition seems to be worsening..."
10045060-148 = "Her chemistry with Renge on the battlefield was not as it usually is, either."
10045060-149 = "I see..."
10045060-150 = "She must be having a difficult time overcoming the earlier events."
10045060-151 = "There is another matter I must discuss with you, Yukari."
10045060-152 = "My right arm feels strained. I may have overexerted myself during the boat match."
10045060-153 = "Th-Then we should go to the doctor—"
10045060-154 = "There's no need. It will recover with time. I simply wanted you to be aware."
10045060-155 = "Ah! Understood! I shall rise to the occasion in place of your healing right hand!"
10045060-157 = "...So that's what it was."
10045060-158 = "Hm? Is something wrong?"
10045060-159 = "It seems Nagusa's not feeling her best. I'm a little worried for her."
10045060-160 = "Huh? You can tell just by looking?"
10045060-161 = "Fufu, I have my ways."
10045060-163 = "It's time for our second match! Players, please step onto the court!"
10045060-173 = "Now then, let's have a fair and square showdown!"
10045060-175 = "Thus the second match began."
10045060-185 = "It was the game of the century."
10045060-190 = "Ah, could the rumors be true? Mimori seems to be reading her opponent's every move!"
10045060-191 = "Nice connection! And with that amazing point, they score another point against the Hyakkaryouran!"
10045060-192 = "...It's as she says. She is anticipating us very adeptly."
10045060-193 = "A mind-reader..."
10045060-194 = "Therefore, overthinking will be our downfall!"
10045060-195 = "In that case..."
10045060-196 = "Let us empty our minds!"
10045060-197 = "Like the dancing miko, the soft breeze of the wind shall dictate my body! #nLike the falling cherry blossoms, I shall surrender myself to the whims of nature!"
10045060-198 = "I am Yukari, and yet, I am not!"
10045060-199 = "The next point is the Hyakkaryouran's serve!"
10045060-200 = "Carry me, wind!"
10045060-209 = "Ooh, the flow of the game shifted."
10045060-210 = "Agreed. Yukari and Nagusa are dancing in a fluid synchronization."
10045060-211 = "I, on the other hand..."
10045060-212 = "Hey, hey. Are you still moping about that?"
10045060-213 = "Don't be so hard on yourself. No one's perfect, not even you."
10045060-214 = "Worrying and growing are all part of our youth!"
10045060-216 = "..."
10045060-217 = "Okay. How about this, Kikyou?"
10045060-218 = "Whether we win or lose, after this match, I'll teach you how to swim."
10045060-219 = "Teach...me? Swimming?"
10045060-220 = "Yeah, you. It won't be hard. You always pick up on things quickly. And then you won't have any reason to be scared of the water."
10045060-221 = "...Where does this baseless confidence in me come from?"
10045060-222 = "You and I... We've been by each other's side for a long time, haven't we?"
10045060-224 = "Isn't that enough reason?"
10045060-228 = "...I suppose I'm well acquainted with that ridiculously good nature of yours."
10045060-233 = "What an ending to such a fierce match!"
10045060-234 = "Both sides really brought their all! I think I have goosebumps."
10045060-235 = "The score is 10 to 8. The two that will move on to the finals for this revival match are..."
10045060-236 = "[ns] \"Nagusa and Yukari!\""
10045060-244 = "..."
10045060-247 = "(My friendship with Renge runs long and deep.)"
10045060-248 = "(Yes, our personalities are night and day. However, I know her as implicitly as I know the lines of my palm.)"
10045060-249 = "(...For such a relationship, I must put forth all that I have.)"
10045060-250 = "(I refuse to continue upon this path of uselessness.)"
10045060-251 = "(We must win.)"
10045060-252 = "(Not for me, but for Renge!)"

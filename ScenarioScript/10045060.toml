[translation]
10045060-1 = "ตอนที่ 6;รอบแก้ตัว: วอลเลย์บอลชายหาด"
10045060-2 = "สวัสดีค่ะผู้ชมทุกท่าน! ได้พักผ่อนกันเต็มที่หรือยังคะ?"
10045060-3 = "งั้นเราจะมาเริ่มการแข่งขันรอบแก้ตัวที่ทุกคนรอคอยกันเลยค่ะ! การแข่งขันวอลเลย์บอลชายหาด#nแมตช์แรก!"
10045060-4 = "เชิญผู้เข้าแข่งขันเข้ามาในสนามเลยค่ะ!"
10045060-14 = "เราจะแข่งขันกันเซ็ตเดียว ทีมที่ได้ 10 คะแนนก่อนจะเป็นผู้ชนะค่ะ!"
10045060-15 = "ทุกคะแนนมีความหมาย ต้องเป็นการแข่งขันน่าลุ้นระทึกแน่นอนค่ะ!"
10045060-16 = "[ns] \"เราจะหาทีมที่จะได้เสิร์ฟก่อนโดยการ... เป่ายิ้งฉุบ!\""
10045060-17 = "เชิญตัวแทนของแต่ละทีมออกมาได้เลยค่ะ...!"
10045060-24 = "คิกคิกคิก ฉันจะออกค้อนนะ"
10045060-25 = "เฮอะ เล่นสงครามประสาทงั้นเหรอ?"
10045060-26 = "ถ้าอยากชนะก็ออกกระดาษสิ ไม่เชื่อก็ลองดูเลย"
10045060-27 = "ขู่ว่าจะออกค้อนอย่างนั้นสินะ"
10045060-29 = "[ns] \"เอาละ พร้อมนะ! เป่า ยิ้ง ฉุบ...!\""
10045060-31 = "ค้อน...! #nเจอวัยรุ่นหน่อยเป็นไง! หืม?!"
10045060-32 = "คิกคิกคิก ออกค้อนมาสู้กันเหรอ? แต่ทำยังไงดีล่ะ? #nฉันอยากชนะ ก็เลยออกกระดาษนี่สิ!"
10045060-34 = "ขอโทษนะ คิเคียว..."
10045060-35 = "ไม่เป็นไรหรอก ต่อให้ไม่ได้เสิร์ฟก่อน แต่เดี๋ยวก็ทำแต้มจนได้เสิร์ฟแล้วละ เรื่องพลังน่ะพวกเราเหนือกว่ามากอยู่แล้ว"
10045060-37 = "ฮึ่ม ถือว่าเริ่มได้ดีแล้ว แต่ต่อไปจะเอายังไงล่ะ? มีความคิดดีๆ หรือเปล่า?"
10045060-38 = "ก็ต้องมีสิ"
10045060-39 = "เมื่อกี้ยัยคิเคียวตกน้ำไปจนหมดสติเลยใช่มั้ย?"
10045060-40 = "งั้นก็เล่นงานที่ยัยคนนั้นเลย เราจะใช้ประโยชน์จากจุดอ่อนของศัตรูนี่ละ!"
10045060-41 = "อืม ไม่ค่อยอยากใช้วิธีนี้เลย..."
10045060-43 = "งั้นเราจะเริ่มการแข่งขันเลยค่ะ!"
10045060-44 = "เปิดศึกประชันกัน~ อย่างยุติธรรม!"
10045060-48 = "รับไปซะ...! ลูกเสิร์ฟแห่งความทะเยอทะยาน!!"
10045060-57 = "อึกก...!"
10045060-59 = "อ๊ะ! ลูกเสิร์ฟไปโดนตัวผู้เข้าแข่งขันคิเคียวจนล้มไปเลยค่ะ!"
10045060-60 = "ได้คะแนนแรกแล้ว!"
10045060-61 = "คิกคิก เป็นอย่างที่คิดเลยแฮะ ฉันบอกแล้วไงล่ะ ยัยนั่นละจุดอ่อนของทีมนั้น!"
10045060-62 = "ฉันคือ... จุดอ่อนงั้นเหรอ?"
10045060-63 = "ใช่แล้วละ แค่ดูสายตาของคู่แข่ง ฉันก็รู้ได้แล้วว่าใครเป็นยังไง"
10045060-64 = "เธอกำลังคิดแบบนี้ใช่มั้ยล่ะ?"
10045060-66 = "คิดว่าตัวเองช่วยทีมไม่ได้"
10045060-67 = "แล้วก็คิดว่าตัวเองกำลังทำให้ทีมแพ้"
10045060-68 = "แต่ก็นะ จะคิดแบบนั้นก็ไม่แปลกหรอก ก็เธอทำให้เพื่อนๆ ต้องตกรอบกันหมดนี่เนอะ"
10045060-69 = "...!"
10045060-70 = "คิเคียว! ไม่ต้องไปฟังคำของพวกนั้น!"
10045060-71 = "ฉันก็รู้ตัวดี... ไม่ต้องห่วงหรอก"
10045060-72 = "งั้นก็ลองรับดูอีกลูกสิ...!"
10045060-79 = "อึก...!"
10045060-81 = "ไม่เป็นไร! รับได้ดีแล้วละ! ฉันต่อเอง!"
10045060-85 = "คิเคียว! ปิดจบเลย!"
10045060-86 = "เข้าใจแล้ว...!"
10045060-88 = "นี่! ยัยแรคคูน! ขึ้นไปบล็อกสิ!!"
10045060-89 = "เรียกใครว่ายัยแรคคูนน่ะ!"
10045060-96 = "เฮือก...?!"
10045060-101 = "ผู้เข้าแข่งขันอาราตะ บล็อกลูกไว้ได้อยู่หมัดเลยค่ะ! #nตอนนี้ขึ้นนำ 2 คะแนนแล้ว!"
10045060-102 = "อ่า..."
10045060-103 = "คิกคิกคิก ดีละ! รักษาฟอร์มให้ดีแบบนี้เลย!"
10045060-104 = "ดีตรงไหนกันเล่า! #nอึก... เลือดกำเดาไหลเลย..."
10045060-105 = "เธอก็เห็นแล้วนี่? ยัยพวกนั้นไม่ได้เก่งเท่าไรหรอก!"
10045060-106 = "ถ้าเราเล่นงานจุดอ่อนของทีมอย่างยัยคิเคียวไปเรื่อยๆ ละก็...!!"
10045060-108 = "......"
10045060-109 = "จะเล่นแบบนี้ใช่มั้ย...!"
10045060-111 = "และการแข่งขันก็ดำเนินต่อไป..."
10045060-122 = "ว้าว! การแข่งขันแมตช์แรกจบไปแล้วค่ะ!"
10045060-123 = "เป็นการแข่งขันที่ดุเดือดมาก ฉันดูแทบไม่กะพริบตาเลยค่ะ!"
10045060-124 = "แฮ่ก แฮ่ก..."
10045060-125 = "......"
10045060-127 = "ฮุ... ฮุฮุฮุ..."
10045060-128 = "เหนื่อยแทบรากเลือดเลย..."
10045060-130 = "การแข่งขันจบลงที่ 10 ต่อ 7 คะแนน!"
10045060-131 = "ทีมของคิเคียวกับเรนเกะเป็นผู้ชนะไปค่ะ~!"
10045060-132 = "อะไรกัน จู่ๆ ก็เล่นเก่งเฉยเลย..."
10045060-133 = "ฉันบอกแล้วไงล่ะว่าสู้ไม่ไหวหรอก..."
10045060-139 = "เอาละค่ะ มาสัมภาษณ์กันเลยดีกว่า!"
10045060-140 = "[ns] \"เป็นแมตช์ที่เรนเกะได้โชว์ฝีมือโดดเด่นเลยนะ!\""
10045060-141 = "ฉันแค่ทำในสิ่งที่ต้องทำน่ะ"
10045060-142 = "จู่ๆ ทีมของเรนเกะก็กลับมาพลิกสนามได้ คิดว่าเหตุผลคืออะไรเหรอคะ?"
10045060-143 = "คงเพราะความคิดที่ว่า <ไม่อยากแพ้> ทำให้เรา <แพ้ไม่ได้> น่ะ"
10045060-144 = "แล้วฉันก็ยกโทษให้คนที่มาดูหมิ่นเพื่อนของฉันไม่ได้ด้วย"
10045060-146 = "......"
10045060-147 = "ร่างกายของรุ่นพี่คิเคียวยังฟื้นฟูได้ไม่เต็มที่เลยเจ้าค่ะ"
10045060-148 = "ทีมวาคุ~ กับรุ่นพี่เรนเกะก็ดูไม่ดีเท่าไรด้วย"
10045060-149 = "งั้นสินะ..."
10045060-150 = "คิเคียว... ยังกังวลกับเรื่องเมื่อกี้อยู่อีกสินะ"
10045060-151 = "จะว่าไป ยูคาริ ฉันเองก็มีเรื่องที่ไม่ได้บอกทุกคนเหมือนกัน"
10045060-152 = "ตอนแข่งรอบเรือเจ็ตสกี ฉันน่าจะหักโหมไปหน่อยน่ะ... ฉันว่าตอนนี้แขนขวาของฉันน่าจะใช้ได้#nไม่เต็มที่เท่าไร"
10045060-153 = "ถะ... ถ้างั้นก็ต้องรีบไปหาหมอนะเจ้าคะ..."
10045060-154 = "ไม่ต้องห่วงหรอก มันไม่ได้ร้ายแรงขนาดนั้น เดี๋ยวก็กลับมาดีขึ้นแล้วละ"
10045060-155 = "ขะ... เข้าใจแล้วเจ้าค่ะ! งั้นข้าจะรับลูกให้ได้เยอะๆ เลยเจ้าค่ะ รุ่นพี่จะได้ไม่ต้องใช้แขนมากไงเจ้าคะ!"
10045060-157 = "เกิดเรื่องแบบนั้นสินะคะ..."
10045060-158 = "หืม? เรื่องอะไรคะ?"
10045060-159 = "เหมือนว่าคุณนางุสะจะยังอาการไม่ดีเท่าไรค่ะ ฉันชักจะกังวลแล้วสิคะ"
10045060-160 = "คะ? แค่ดูด้วยตาก็รู้ได้แล้วเหรอคะ?"
10045060-161 = "ฮุฮุ ฉันมีวิธีของฉันน่ะค่ะ"
10045060-163 = "เอาละ! มาต่อกันที่การแข่งขันคู่ที่ 2 กันเลยค่ะ! เชิญผู้เข้าแข่งขันลงสนามได้เลยค่ะ!"
10045060-173 = "เอาละ~ งั้นก็มาแข่งขันกัน~ อย่างยุติธรรม!"
10045060-175 = "แล้วการแข่งขันคู่ที่ 2 ก็เริ่มต้นขึ้น"
10045060-185 = "เป็นการแข่งขันที่ร้อนแรงกว่าแสงแดดหลายเท่า"
10045060-190 = "อ๊ะ ผู้เข้าแข่งขันมิโมริเล่นได้ราวกับอ่านใจคู่แข่งออกเลยค่ะ!!"
10045060-191 = "เหลือจะเชื่อเลยค่ะ! เจอเฮียกกะเรียวรันแต่ก็ไม่หวั่นเลยนะคะ!!"
10045060-192 = "นั่นสินะ... ทางนั้นอ่านความคิดของเราได้หมดเลย"
10045060-193 = "อ่านความคิดงั้นเหรอ..."
10045060-194 = "ถ้ากังวลมากเกินไป จะยิ่งทำให้เล่นได้แย่กว่าเดิม..."
10045060-195 = "เช่นนั้นละก็..."
10045060-196 = "ปล่อยจอยไปเลย!"
10045060-197 = "ระบำให้เหมือนมิโกะ ทำตัวให้สบาย #nล่องลอยไปตามสายลม ราวกับกลีบดอกซากุระที่ปลิวไปบนท้องฟ้า..."
10045060-198 = "ยูคาริผู้นี้จะเผชิญหน้ากับตัวเองอย่างอ่อนโยนและแน่วแน่เจ้าค่ะ!"
10045060-199 = "การแข่งขันยังคงดำเนินต่อไปค่ะ รอบนี้เฮียกกะเรียวรันได้เสิร์ฟ!"
10045060-200 = "เอาละ! นี่คือเวลาแห่งความก้าวหน้าของข้าเจ้าค่ะ!"
10045060-209 = "โอ้ว เกมพลิกแล้วแฮะ"
10045060-210 = "อื้อ ยูคาริกับรุ่นพี่นางุสะเล่นเข้าขากันได้ดีเลย"
10045060-211 = "ถ้าเทียบกับฉันแล้ว..."
10045060-212 = "เดี๋ยวเหอะ จะคิดมากไปถึงไหนเนี่ย?"
10045060-213 = "อย่าใจฝ่อสิ ไม่มีใครสมบูรณ์แบบไปทุกเรื่องหรอกนะ"
10045060-214 = "เรายังเป็นวัยรุ่น ก็ต้องผิดพลาดและหลงทางกันแบบนี้ละ!"
10045060-216 = "......"
10045060-217 = "คิเคียว งั้นเอาอย่างนี้กันเถอะ"
10045060-218 = "ไม่ว่าผลลัพธ์จะเป็นยังไง หลังจบรอบแก้ตัวนี้เธอต้องมาเรียนว่ายน้ำกับฉัน"
10045060-219 = "เธอจะ... สอนฉันว่ายน้ำเหรอ?"
10045060-220 = "อื้อ คนฉลาดอย่างเธอ เรียนแป๊บเดียวก็ว่ายได้แล้วละ แล้วเธอก็จะไม่กลัวน้ำอีกต่อไปด้วย"
10045060-221 = "เชื่อมั่นในตัวฉันขนาดนั้นเลยเหรอ...?"
10045060-222 = "ฉันเป็นเพื่อนเธอมาตั้งแต่สมัยเด็กเลยนะ"
10045060-224 = "เหตุผลแค่นี้ยังไม่พออีกเหรอ?"
10045060-228 = "จะยังไงก็เถอะ... เธอยังนิสัยดีไม่เคยเปลี่ยนเลยนะ"
10045060-233 = "หลังจากการแข่งขันสุดร้อนแรงจนทะเลเดือด เราก็ได้ผู้ชนะแล้วค่ะ!"
10045060-234 = "ต้องบอกว่าเป็นแมตช์ที่ลุ้นตัวโก่งจริงๆ!"
10045060-235 = "ทีมที่ผ่านเข้ารอบสุดท้ายของรอบแก้ตัวด้วยคะแนน 10 ต่อ 8 ก็คือ...!"

[translation]
10016090-1 = "ตอนที่ 9;ตัวเอกแห่งฮาโลเฟสติวัล"
10016090-2 = "สวัสดีค่ะ ผู้ชมช่องโครโนสทุกท่าน! ตอนนี้ก็มาถึงช่วงสุดท้ายของฮาโลเฟสติวัลที่ยิ่งใหญ่ของเรากัน#nแล้วค่ะ!"
10016090-3 = "การแข่งขันที่เหลือในตอนนี้เรียกได้ว่าเป็นฟินาเล่ของฮาโลเฟสติวัลเลยค่ะ และนั่นเป็นอะไรไปไม่ได้#nนอกจาก <วิ่งผลัดประเภททีมโรงเรียน>!"
10016090-4 = "ผลจากการแข่งขันนี้จะมีส่วนในการตัดสินว่าโรงเรียนใดจะได้รางวัลชนะเลิศคะแนนรวมของ <ฮาโลเฟสติวัล> ไปครองค่ะ!"
10016090-5 = "แต่ปกติแล้วเราจะสามารถบอกได้ว่าโรงเรียนไหนจะได้รางวัลชนะเลิศคะแนนรวมตั้งแต่เริ่มการวิ่งในไม้#nสุดท้ายค่ะ..."
10016090-6 = "ตอนนี้โรงเรียนที่มีแนวโน้มว่าจะคว้ารางวัลชนะเลิศคะแนนรวมคือที่ไหนเหรอคะ?"
10016090-7 = "อย่าตกใจไปนะคะทุกคน ตอนนี้โรงเรียนที่ได้คะแนนรวมมาเป็นอันดับ 1 ก็คือ..."
10016090-8 = "ทรีนิตี้ เกเฮนน่า และมิลเลเนียมค่ะ!"
10016090-9 = "เอ๋?! ทั้ง 3 โรงเรียนได้คะแนนเท่ากันหมดเลยเหรอคะ?"
10016090-10 = "ใช่แล้วค่ะ! งานมหกรรมแข่งขันกีฬาที่ผ่านมาทุกครั้ง จะเป็นโรงเรียนทรีนิตี้และเกเฮนน่าที่แย่งกันมา#nเป็นที่ 1"
10016090-11 = "แต่ในครั้งนี้ โรงเรียนมิลเลเนียมก็สู้จนถึงที่สุด จนเกิดเป็นการชิงชัยชนะของสามโรงเรียนเลยค่ะ!"
10016090-12 = "แบบนี้เรายิ่งต้องจับตาดูการแข่งขัน <วิ่งผลัดประเภททีมโรงเรียน> แล้วค่ะ"
10016090-14 = "ห้ามเปลี่ยนช่องไปไหนเลยนะคะคุณผู้ชม!"
10016090-16 = "การวิ่งผลัดในไม้สุดท้ายเป็นตัวตัดสินผู้ชนะเลิศคะแนนรวมของปีนี้ได้เลยละค่ะ"
10016090-17 = "แบบนี้ถ้าไม่คัดเลือกนักกีฬาที่จะลงแข่งวิ่งผลัดให้ดีๆ ละก็..."
10016090-18 = "นี่ ได้ยินข่าวมาหรือเปล่า? เห็นว่าประธานฮินะจากคณะกรรมการวินัยหายตัวไปละ"
10016090-19 = "จริงเหรอ? มีเรื่องอะไรเกิดขึ้นกับคณะกรรมการวินัยหรือเปล่า?"
10016090-20 = "ไม่ใช่ใครอื่นแต่เป็นประธานกรรมการเลย หวังว่าจะไม่มีใครทำอะไรไม่ดีนะ..."
10016090-21 = "แบบนี้จะยิ่งไม่ดีกับการวิ่งผลัดหรือเปล่า ถ้าเกิดประธานฮินะไม่ลงแข่ง แล้วใครจะเป็นนักวิ่งให้เกเฮนน่าล่ะ?"
10016090-22 = "นั่นน่ะสิ... แบบนี้คงจะอดรางวัลชนะเลิศคะแนนรวมแหงๆ..."
10016090-23 = "อุตส่าห์ได้โอกาสทองในการเอาชนะทรีนิตี้มาแล้วเชียว..."
10016090-24 = "ประธานฮินะจากคณะกรรมการวินัยเกเฮนน่าหายตัวไปงั้นเหรอ...?"
10016090-25 = "ถึงจะไม่ใช่ข่าวที่น่ายินดี แต่ก็เป็นโอกาสที่นักกีฬาดีเด่นที่มีไม่กี่คนของเกเฮนน่าจะไม่ได้ลงแข่งขัน..."
10016090-26 = "ถือเป็นโอกาสทองของทรีนิตี้ที่จะได้รางวัลชนะเลิศคะแนนรวมมาเลยละค่ะ"
10016090-27 = "แบบนี้คงต้องวางนักกีฬาที่ฝีเท้าเร็วไว้ก่อนเพื่อทิ้งระยะห่างจากนักวิ่งโรงเรียนอื่น และถ้านำได้เรื่อยๆ ชัยชนะก็คงไม่ไกลเกินเอื้อม"
10016090-28 = "นักกีฬาที่ลงแข่งได้ตอนนี้ก็มีคุณคาซึสะจากชมรมของหวานหลังเลิกเรียน และคุณสึซึมิจากกลุ่มรักษา#nความสงบ..."
10016090-29 = "...แค่นี้ก็คงจะเพียงพอแล้วละค่ะ"
10016090-30 = "และนักวิ่งไม้สุดท้ายที่ถือว่าสำคัญที่สุดก็คงต้องเป็น... ซึรุกิ!"
10016090-32 = "ห้องพักนักกีฬาทรีนิตี้"
10016090-33 = "...ไม่เอา ฉันไม่ลงแข่งวิ่งผลัดหรอก"
10016090-34 = "ทะ... ทำไมล่ะคะ?!"
10016090-35 = "หรือว่าได้รับบาดเจ็บมาจากการแข่งขันก่อนหน้าคะ..."
10016090-36 = "ไม่หรอก... ฉันไม่ได้บาดเจ็บตรงไหน"
10016090-37 = "ฉันก็แค่ลงแข่งมามากแล้วในงานมหกรรมแข่งขันกีฬาครั้งนี้"
10016090-38 = "ก็เลยคิดว่าควรให้โอกาสกับนักกีฬาคนอื่นบ้างน่ะ"
10016090-39 = "หรือว่า... ซึรุกิหมดแรงแล้วเหรอคะ?"
10016090-40 = "ไม่ใช่ ไม่ใช่ว่าฉันเหนื่อยหรือหมดแรงหรอก"
10016090-41 = "แต่ในกฎของงานมหกรรมแข่งขันกีฬาก็ระบุไว้นี่ว่า <ฮาโลเฟสติวัล> คือ 'เทศกาลของทุกคน เพื่อความ#nสนุกร่วมกันของนักเรียนทุกคน'"
10016090-42 = "ถึงฉันจะมีพละกำลังกายที่ยอดเยี่ยม แต่จะให้ครองโอกาสไว้คนเดียวก็คงไม่ยุติธรรมต่อคนอื่น"
10016090-43 = "ถึงฉันจะอยากมีส่วนร่วมอย่างแข็งขันในมหกรรมแข่งขันกีฬาครั้งนี้ แต่ก็อาจจะมีนักเรียนที่ยังไม่ได้รับ#nโอกาสในการลงแข่งอยู่ก็เป็นได้"
10016090-44 = "เรื่องนั้น..."
10016090-45 = "แถมนักวิ่งไม้สุดท้ายจะได้รับความสนใจจากทุกคนด้วย..."
10016090-46 = "ฉันไม่อยาก... ได้รับความสนใจแบบนั้นน่ะ..."
10016090-47 = "ก็เข้าใจเหตุผลอยู่หรอกนะคะ แต่การแข่งขันก็จะเริ่มอยู่แล้ว จะไปหานักกีฬาคนใหม่จากที่ไหนดี..."
10016090-49 = "คนใหม่...? ทำไมต้องหาใหม่ล่ะ?"
10016090-50 = "ฮาสุมิ เธอก็เป็นได้นะ นักวิ่งไม้สุดท้ายน่ะ"
10016090-51 = "คะ?!"
10016090-52 = "ให้ฉันเป็นนักวิ่งไม้สุดท้ายเหรอคะ?"
10016090-53 = "อืม... ทำไมเหรอ?"
10016090-54 = "ซึรุกิ นี่ไม่ใช่เวลามาชิลอยู่นะคะ"
10016090-55 = "รู้ไหมคะว่าการแข่งวิ่งผลัดนี้คือการแข่งสำคัญที่จะตัดสินว่าโรงเรียนไหนจะเป็นผู้ชนะเลิศคะแนนรวม#nไปเลยนะคะ?"
10016090-56 = "ตอนนี้แต่ละโรงเรียนต่างร้อนรุ่มใจเพราะต้องการส่งนักกีฬาที่ฝีเท้าเร็วลงสนาม—"
10016090-57 = "ขอโทษที่ขัดจังหวะนะคะ..."
10016090-58 = "แต่ฉันเห็นด้วยกับรุ่นพี่ซึรุกิค่ะ"
10016090-59 = "...มาชิโระก็เป็นไปกับเขาด้วย!"
10016090-60 = "ทำไมทุกคนถึงเป็นแบบนี้คะ..."
10016090-61 = "ทำไมทุกคนถึงอยากให้ฉันออกไปขายหน้าล่ะคะ?"
10016090-63 = "ขะ... ขายหน้าอะไรกันคะ?"
10016090-64 = "ฉันไม่ได้คิดแบบนั้นสักหน่อย..."
10016090-66 = "ทุกคนก็อาจจะรู้อยู่แล้ว... ว่าฉันวิ่งไม่เร็วค่ะ"
10016090-67 = "ไม่ว่าทรีนิตี้หรือมิลเลเนียมจะส่งนักกีฬาแบบไหนมา แต่ถ้าเป็นการวิ่งละก็... ฉันไม่มั่นใจอยู่ดีค่ะ"
10016090-68 = "และหากความผิดพลาดของฉันในการแข่งขันสำคัญๆ คือสาเหตุที่ทำให้ทรีนิตี้ต้องมาพลาดรางวัลชนะ#nเลิศคะแนนรวมไปละก็..."
10016090-69 = "ฉันจะแบกรับความรับผิดชอบนั้นยังไงล่ะคะ?"
10016090-70 = "...เรื่องนั้นมันสำคัญขนาดนั้นเลยเหรอคะ?"
10016090-72 = "ก็แน่นอนสิคะ!"
10016090-76 = "รุ่นพี่ ก่อนที่ฉันจะเข้าร่วมงานมหกรรมแข่งขันกีฬาครั้งนี้ ฉันไปศึกษาประวัติศาสตร์และอุดมการณ์ของ <ฮาโลเฟสติวัล> มาค่ะ"
10016090-77 = "เทศกาลกีฬาที่มีประวัติศาสตร์อันยาวนานนี้มีเพื่อทดสอบขีดจำกัดและความเป็นไปได้ของนักเรียนใน#nคิโวทอสค่ะ"
10016090-78 = "แต่เนื่องจากลักษณะทางกายภาพของแต่ละคนไม่เหมือนกัน จึงมีการแก้ไขกฏกติกาในทุกครั้งที่จัด <ฮาโลเฟสติวัล> เพื่อให้เป็นเทศกาลที่ยุติธรรมสำหรับทุกคน"
10016090-79 = "แต่หากเราเอาผลแพ้ชนะเป็นที่ตั้งในการคัดเลือกแต่นักกีฬาที่โดดเด่นทางด้านกายภาพ โอกาสก็จะ#nตกไปอยู่กับนักเรียนเฉพาะกลุ่มเท่านั้น..."
10016090-80 = "แบบนี้จะเป็นฮาโลเฟสติวัลตามอุดมการณ์เหรอคะ?"
10016090-81 = "จะเรียกว่าเป็นความยุติธรรมที่แท้จริงได้เหรอคะ?!"
10016090-82 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ..."
10016090-87 = "แต่ถึงจะไม่ใช่เหตุผลนี้ ฉันก็มีเหตุผลอื่นที่อยากให้รุ่นพี่ฮาสุมิลงแข่งขันอยู่ดีค่ะ"
10016090-88 = "รุ่นพี่ฮาสุมิ วันนี้ทั้งวันเอาแต่ทำงานของคณะกรรมการจัดงานจนไม่ได้ลงแข่งสักรายการเลยใช่มั้ยคะ?"
10016090-89 = "รุ่นพี่ต้องวิ่งวุ่นและเสียสละมากกว่าใครเพื่อเทศกาลในวันนี้ แต่ก็ยังไม่มีโอกาสได้อยู่หน้ากล้องเลย..."
10016090-90 = "พวกฉันก็เลยอยากให้รุ่นพี่ฮาสุมิได้เฉิดฉายในการแข่งวิ่งผลัดประเภททีมโรงเรียนที่เป็นไคลแมกซ์ของ <ฮาโลเฟสติวัล> ค่ะ"
10016090-91 = "ฉันอยากเห็นคุณฮาสุมิวิ่งในการแข่งขันสุดท้ายของงานนี้ค่ะ!"
10016090-92 = "ฉันด้วยค่ะ ฉันก็คิดแบบนั้นเหมือนกัน...!"
10016090-100 = "ฉันประหลาดใจกับฝีมือในการยิงของรองหัวหน้าฮาสุมิมากกว่าอีกนะ?"
10016090-104 = "ไม่ว่าจะเป็นฝ่ายเดียวกันหรือฝ่ายตรงข้าม การได้แข่งกีฬากับท่านฮาสุมิก็ต้องสนุกอยู่แล้วค่ะ!"
10016090-108 = "\"ลงแข่งกีฬาสิ ทั้งสนุกทั้งเป็นประสบการณ์ใหม่ด้วย\""
10016090-110 = "...ทำไมทุกคนถึงได้ทำตามใจตัวเองแบบนี้นะ"
10016090-111 = "ก็ได้ค่ะ ฉันจะเป็นนักวิ่งไม้สุดท้ายของทรีนิตี้เองค่ะ"
10016090-112 = "ถึงพละกำลังจะไม่ได้ดีมาก แต่ฉันก็ไม่คิดจะไปวิ่งอย่างขอไปทีหรอกนะคะ"
10016090-113 = "ในเมื่อเป็นแบบนี้แล้ว ฉันจะคว้ารางวัลชนะเลิศคะแนนรวมของทรีนิตี้มาให้ได้เลยค่ะ!"
10016090-115 = "อื้ม แค่นี้ก็เพียงพอแล้ว"
10016090-116 = "พวกเราจะไปเชียร์เธอจากที่นั่งเชียร์นะ"
10016090-117 = "สู้ๆ นะคะ รุ่นพี่ฮาสุมิ!"
10016090-120 = "เอาละ นักวิ่งไม้ที่สามออกตัวไปแล้วค่ะ!"
10016090-121 = "นักวิ่งไม้สุดท้ายของแต่ละโรงเรียนเข้ามาในสนามได้เลยค่ะ!"
10016090-126 = "เอ๋... รองหัวหน้าฮาสุมิเหรอ?"
10016090-127 = "ยูกะ...?"
10016090-128 = "ถ้ารองหัวหน้าฮาสุมิมาอยู่ตรงนี้... ก็แปลว่ารองหัวหน้าคือนักวิ่งไม้สุดท้ายของทรีนิตี้เหรอ?"
10016090-129 = "ค่ะ... งั้นยูกะก็เป็นนักวิ่งไม้สุดท้ายของมิลเลเนียมเหรอคะ...?"
10016090-130 = "อืม ใช่... เฮ้อ..."
10016090-131 = "ที่จริงฉันไม่มั่นใจในการวิ่งหรอก แต่นักเรียนในเซมิน่าบอกว่าถ้าฉันไม่ลงเป็นนักวิ่งไม้สุดท้าย พวกนั้นก็#nจะไม่ลงแข่งด้วย ดื้อชะมัด ไม่รู้ว่าคิดอะไรกันอยู่"
10016090-132 = "นี่มันโอกาสคว้ารางวัลชนะเลิศคะแนนรวมทั้งที ทำไมทุกคนถึงได้ทำตามใจตัวเองแบบนี้นะ...!"
10016090-137 = "ฮุฮุ..."
10016090-138 = "เอ๊ะ เอ๋...? เมื่อกี้ฉันเผลอพูดอะไรตลกๆ ไปเหรอ?"
10016090-139 = "ไม่หรอกค่ะ ก็แค่คิดว่ายูกะก็ต้องเหนื่อยมากเหมือนกันน่ะค่ะ"
10016090-140 = "แต่ถึงอย่างนั้นฉันก็ไม่ยอมอ่อนข้อให้หรอกนะคะ"
10016090-141 = "ฉะ... ฉันก็เหมือนกัน!"
10016090-142 = "ในเมื่อเป็นแบบนี้แล้ว ฉันจะคว้ารางวัลชนะเลิศคะแนนรวมมาให้มิลเลเนียมให้ได้!"
10016090-143 = "ขอชื่นชมในความตั้งใจนะคะ แต่รางวัลชนะเลิศคะแนนรวมของฮาโลเฟสติวัลครั้งนี้ จะต้องเป็นของ#nทรีนิตี้ค่ะ"
10016090-147 = "เอาละค่ะคุณผู้ชม ตอนนี้นักวิ่งไม้ที่สามกำลังเข้ามาถึงจุดเปลี่ยนตัวแล้วค่ะ!"
10016090-154 = "เฮ้อ... วิ่งจนขาไม่มีแรงแล้ว..."
10016090-155 = "ไม่ไหวแล้ว..."
10016090-156 = "รับไม้ผลัดมาแล้วค่ะ!"
10016090-165 = "นักวิ่งคนสุดท้ายที่ได้ไม้ผลัดออกตัวกันไปแล้วค่ะ!"
10016090-166 = "ดะ... เดี๋ยวสิ ฉันยังไม่ได้เลย... อ๊ะ...?!"
10016090-171 = "นักกีฬาจุนโกะ นักวิ่งจากเกเฮนน่า! เสียสมาธิไปกับไม้ผลัดจนล้มไปแล้วค่ะ!"
10016090-172 = "โธ่ พลาดได้ไงคะเนี่ย! แบบนี้เกเฮนน่าก็อยู่ห่างจากรางวัลชนะเลิศคะแนนรวมเข้าไปอีกสิคะ!"
10016090-173 = "อ๊ะ ท่านฮาสุมิ! ได้เจอกันอีกแล้วนะคะ!"
10016090-174 = "แฮ่ก แฮ่กกก—!"
10016090-175 = "โอ้ว สปิริตดีสุดๆ เลยค่ะ! อิซุนะก็จะไม่แพ้เหมือนกันค่ะ!"
10016090-176 = "ฉันจะ... แพ้ไม่ด้ายยย—!"
10016090-177 = "ฉันก็ด้วยยย—!"
10016090-178 = "แหะๆ เด็กพวกนี้แรงดีจังเลยน้า~"
10016090-179 = "ลุงคนนี้เริ่มตื่นเต้นขึ้นมาแล้วสิ..."
10016090-180 = "รุ่นพี่โฮชิโนะ! ถ้าส่งไม้ผลัดเสร็จแล้วก็อย่ามาขวางทางสิ รีบๆ ออกจากสนามไปได้แล้ว!"
10016090-182 = "(แฮ่ก... แฮ่ก... อีกไกลมั้ยนะกว่าจะถึงเส้นชัย?)"
10016090-183 = "(หายใจหนักจนภาพข้างหน้าเบลอหมดเลย... ไม่เห็นนักวิ่งคนอื่นด้วย...)"
10016090-184 = "(แต่พอได้วิ่งท่ามกลางเสียงเชียร์ของผู้คนแบบนี้ ยิ่งรู้สึกว่าวันนี้จิตใจแจ่มใสเป็นพิเศษเลย)"
10016090-185 = "(นี่เองสินะที่เขาเรียกกันว่า[ruby=Runner's High]ความรู้สึกอิ่มอกอิ่มใจ[/ruby]...)"
10016090-186 = "(เพราะแม้ร่างกายจะมาถึงขีดจำกัด แต่ทุกครั้งที่ก้าวขาออกไป ก็จะอิ่มเอมไปด้วยความสุข...)"
10016090-187 = "(แบบนี้ให้วิ่งอีกแค่ไหนก็ไม่หวั่น...!)"
10016090-189 = "นักกีฬาฮาสุมิเข้าเส้นชัยไปแล้วค่ะ!"
10016090-190 = "...ทำได้แล้ว!"
10016090-196 = "นักกีฬาฮาสุมิ ได้อันดับ 6 ค่า—"
10016090-197 = "คะ...?"
10016090-198 = "ส่วนนักกีฬายูกะเข้ามาก่อนเป็นอันดับที่ 5 ค่ะ ทั้งสองคนทำเวลาได้สูสีกันมากเลยค่ะ"
10016090-199 = "ถึงจะน่าเสียดาย แต่ก็เป็นการแข่งขันที่ยอดเยี่ยมมากเลยค่ะ ทำได้ดีมากเลยค่ะ!"
10016090-203 = "ฉะ... ฉันได้อันดับ 6 เลยเหรอ...? แล้วใครคืออันดับ 1 ล่ะ..."
10016090-204 = "นักกีฬาจุนโกะ ถึงแม้จะล้มตอนออกตัว แต่ก็ติดสปีดจนแซงนักวิ่งคนอื่นได้ และพลิกเกมจนเข้าเส้นชัย#nมาเป็นอันดับ 1 เลยค่ะ!"
10016090-205 = "พลิกล็อกกันน่าดู ถล่มถลายไปเลยค่ะคุณผู้ชม!"
10016090-207 = "เป็นไง? ทุกคนเห็นใช่มั้ยล่ะ? บอกแล้วว่าฉันจะเข้าเส้นชัยเป็นอันดับ 1!"
10016090-208 = "เป็นไปตามแผนการเลยนะคะ ฉันเชื่ออยู่แล้วค่ะว่าจุนโกะจะเข้าเส้ยชัยได้ก่อนใคร!"
10016090-209 = "โอ๊ะ... นึกถึงตอนที่คุณจุนโกะล้มเลยค่ะ ตอนนั้นมีคนพูดว่า 'ก็บอกแล้วว่าอย่าเชื่อใจชมรมชิมอาหาร' ด้วยนะคะ"
10016090-211 = "...ดูทำหน้าโล่งใจเข้าสิ คงจะคลายความอัดอั้นใจที่มีก่อนหน้านี้ไปหมดแล้วสินะคะ"
10016090-212 = "กะแล้วเชียว ตัวเอกของ <ฮาโลเฟสติวัล> ในวันนี้ก็คือจุนโกะนั่นเองค่ะ"
10016090-213 = "งั้นฉันก็กินทุกอย่างจาก <บัตรกำนัลอาหารครอบจักรวาล> ได้แล้วใช่มั้ย?"
10016090-214 = "รีบไปกินก่อนที่อาหารจะหมดกันเถอะนะ!"
10016090-216 = "สุดท้ายก็จบแบบนี้เหรอคะ..."
10016090-223 = "เฮ้อ... อุตส่าห์วิ่งแทบตาย สุดท้ายก็ได้แค่ที่ 5 เหรอเนี่ย..."
10016090-224 = "เพราะแบบนี้แหละถึงไม่อยากเป็นนักวิ่งไม้สุดท้าย..."
10016090-228 = "ทำได้ดีแล้วละค่ะ ยูกะ"
10016090-229 = "รองหัวหน้าฮาสุมิก็ด้วย..."
10016090-231 = "การแข่งขันในรายการสุดท้ายก็จบลงไปแล้ว ถ้างั้นเราจะประกาศอันดับกันเลยนะคะ!"
10016090-232 = "และโรงเรียนที่คว้ารางวัลชนะเลิศคะแนนรวมจากฮาโลเฟสติวัลในครั้งนี้ไปก็คือ..."
10016090-234 = "เกเฮนน่านั่นเองค่า!"

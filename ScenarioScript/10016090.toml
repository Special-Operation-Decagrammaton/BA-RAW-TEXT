[translation]
10016090-1 = "Episode 9;The Star of the Kivotos Halo Festival"
10016090-2 = "Hello, viewers! The exciting Kivotos Halo Festival is reaching its end!"
10016090-3 = "This next game is the grand finale: the academy relay race!"
10016090-4 = "The results of the relay race will determine the victor of the Kivotos Halo Festival!"
10016090-5 = "You know, normally we would have a pretty good idea who the winner is by now..."
10016090-6 = "Oh? Who is in the lead right now?!"
10016090-7 = "Well, you see... Try not to be too shocked..."
10016090-8 = "Trinity, Gehenna, and Millennium are all in first! They're tied!"
10016090-9 = "WHAT?! They're tied without a single point difference?"
10016090-10 = "That's right! Trinity and Gehenna usually go head-to-head on the last game of the field day."
10016090-11 = "But Millennium went above and beyond everyone's expectations and is giving them a run for their money this year!"
10016090-12 = "This year's relay race is looking to be an intense one, so don't miss out!"
10016090-14 = "You'll be able to watch the entire thing from start to finish on the Kronos channel!"
10016090-16 = "So it all comes down to this last race."
10016090-17 = "Each school will have to choose their contestants wisely."
10016090-18 = "Hey! Did you hear? President Hina of the Prefect Team went missing."
10016090-19 = "No way? What happened to her?"
10016090-20 = "She just went missing? I hope nothing bad happened..."
10016090-21 = "But doesn't that mean we're in trouble for the last race? There was no one better to represent Gehenna than Hina!"
10016090-22 = "Seriously... I hope this doesn't mean we stand no chance."
10016090-23 = "This was our once chance to beat Trinity..."
10016090-24 = "President Hina from the Gehenna Prefect Team is missing...?"
10016090-25 = "I do hope she's okay, but if Gehenna's strongest player is out..."
10016090-26 = "Trinity's chances of winning has increased."
10016090-27 = "If we put our faster runners in the front and create some distance from the other runners, we can take the lead and win."
10016090-28 = "It looks like we currently have Kazusa from the After-School Sweets Club and Suzumi from the Vigilante Crew."
10016090-29 = "They should be able to do it."
10016090-30 = "And, of course, the important role of anchor can go to Tsurugi."
10016090-32 = "Trinity Contestant Lobby"
10016090-33 = "Nope. Not doing it."
10016090-34 = "Wh-What do you mean? Why?!"
10016090-35 = "Were you injured in the last game?"
10016090-36 = "Of course not. Do you think I would get hurt?"
10016090-37 = "I've just done my part for this year's field day, is all."
10016090-38 = "The other students should get to play too."
10016090-39 = "Tsurugi... Are you tired?"
10016090-40 = "No, no. I'm not tired! It's more..."
10016090-41 = "Ugh, well... This Halo Festival is supposed to be for anyone and everyone, right?"
10016090-42 = "I don't think it's right for me to play every game just because I'm our strongest player."
10016090-43 = "It'd be fun to participate in more events, but a lot of Trinity students haven't even gotten to play in a single one."
10016090-44 = "That's..."
10016090-45 = "And to make matters worse, whoever runs as the anchor leg of the race becomes the focus of everyone's attention..."
10016090-46 = "I don't like having...all those eyes on me..."
10016090-47 = "...I understand where you're coming from. However, where will we find a replacement for you on such short notice?"
10016090-49 = "...A replacement?"
10016090-50 = "Hasumi, why not you?"
10016090-51 = "What?!"
10016090-52 = "Me? Be the anchor?!"
10016090-53 = "Yes... Why is that surprising?"
10016090-54 = "Tsurugi, we don't have time for such jokes!"
10016090-55 = "You're aware that this relay race will determine which academy wins the entire festival, yes?"
10016090-56 = "Everyone is scrambling to send out their best athletes, and I hardly fit the bill."
10016090-57 = "My apologies for interrupting..."
10016090-58 = "But I agree with Tsurugi."
10016090-59 = "...You too, Mashiro?!"
10016090-60 = "Why..."
10016090-61 = "Why is everyone so intent on embarrassing me?!"
10016090-63 = "E-Embarrassing you?!"
10016090-64 = "That's not what we're trying to do..."
10016090-66 = "You already know very well that I'm not the quickest on my feet."
10016090-67 = "Even if Trinity sends their strongest runners, and Millennium their weakest, I don't have the capabilities to compete in a footrace."
10016090-68 = "Trinity could end up losing the festival because someone like me wasn't able to perform in the most important event of the day."
10016090-69 = "How do you expect me to shoulder that burden?!"
10016090-70 = "...Is winning really that important?"
10016090-72 = "Of course it is!"
10016090-76 = "Before taking part in this field day, I took some time to look up the history and ideology behind the Kivotos Halo Festival."
10016090-77 = "This sports festival has long functioned as a venue for the students of Kivotos to test their limits and potential."
10016090-78 = "But since everyone's physical characteristics are different, the Kivotos Halo Festival has continuously revised its rules throughout the years to ensure it is fair and equitable for all."
10016090-79 = "But if we were to start providing certain athletes with more opportunities based on their innate physical attributes for the purpose of winning above all else..."
10016090-80 = "Can you really call that a \"fair\" Kivotos Halo Festival?"
10016090-81 = "Can you really call that justice?!"
10016090-82 = "I... I suppose I see your point."
10016090-87 = "There's another reason I agree with Tsurugi..."
10016090-88 = "Hasumi, you were so busy with Executive Committee duties all day that you didn't get a chance to take part in any of the games, right?"
10016090-89 = "You worked harder than anyone else to ensure this festival ran smoothly, but you don't get any recognition on-camera, not even once."
10016090-90 = "I believe Hasumi deserves the chance to show all of Kivotos just how brightly she can shine, in the very last event of the day!"
10016090-91 = "I-I want to see Hasumi compete!"
10016090-92 = "Yeah! Me too!"
10016090-100 = "I think Hasumi's shooting skills are much more worthy of praise."
10016090-104 = "It doesn't matter if we're allies or enemies. As long as we can play with you, it'll be fun!"
10016090-108 = "\"I bet a new experience would be fun.\""
10016090-110 = "...You all just do whatever you want, don't you?"
10016090-111 = "Fine, I'll run as anchor for Trinity."
10016090-112 = "And you can be sure that I will see this job through until the end, regardless of my physical capabilities."
10016090-113 = "If I'm going to participate in the relay race, I'll bring home the championship for Trinity no matter what!"
10016090-115 = "Nice. That's what I like to hear."
10016090-116 = "We'll be cheering you on from the sidelines."
10016090-117 = "Good luck, Hasumi!"
10016090-120 = "And the third runners have taken off!"
10016090-121 = "Calling the final runners of each school! Please report to the track!"
10016090-126 = "Huh? Vice President Hasumi?"
10016090-127 = "...Yuuka?"
10016090-128 = "Hasumi, if you're here... Does that mean you're the anchor runner for Trinity?"
10016090-129 = "Yes, I am... And I guess you're running anchor for Millennium, Yuuka?"
10016090-130 = "Yep, that's right... *sigh*"
10016090-131 = "I'm not any good at running track to be honest, but I was forced into it because the Seminar students refused to participate in the games unless I ran. They're being ridiculous."
10016090-132 = "I don't know why they're being so stubborn when we might actually have a shot at winning!"
10016090-137 = "Hah, haha...."
10016090-138 = "Wh-What? Did I say something funny? Oh no, is there something on my face?"
10016090-139 = "Not at all. I just think I can appreciate what you're dealing with."
10016090-140 = "...But that doesn't mean I'll go easy on you."
10016090-141 = "R-Right back at you!"
10016090-142 = "This wasn't my first choice, but as long as I'm here, I'll do everything I can to bring Millennium victory!"
10016090-143 = "I admire your resolve, but I assure you the winner of the Halo Festival is going to be Trinity!"
10016090-147 = "And here we have the third runners approaching the exchange point!"
10016090-154 = "Oof... I squeezed out every ounce of energy I had on this race..."
10016090-155 = "It's over...for me..."
10016090-156 = "Baton received!"
10016090-165 = "And the final runners are off!"
10016090-166 = "W-Wait a second! I don't have my baton yet... A-Ack?!"
10016090-171 = "Gehenna's Junko misses the baton and takes a spill!"
10016090-172 = "My, what a disastrous fumble! This is sure to take Gehenna out of the running!"
10016090-173 = "There you are, Hasumi! We meet again!"
10016090-174 = "Hah...! *huff* *puff* ...!"
10016090-175 = "What an intimidating aura! Well, I am a ninja-in-training, and I shall not back down!"
10016090-176 = "I refuse...to surrender!"
10016090-177 = "Neither...will I!"
10016090-178 = "Such...youthful energy!"
10016090-179 = "This energy is contagious for even an old-timer like me...!"
10016090-180 = "Hoshino, if you've made the pass then get the heck off the track!"
10016090-182 = "(*pant* *pant* ...How much longer until the finish line?)"
10016090-183 = "(I'm so out of breath that I can't see straight... I don't even know where the other runners are...)"
10016090-184 = "(But right now, flying across the track as everyone cheers me on... My mind feels clearer than ever.)"
10016090-185 = "(This must be what they call a runner's high...)"
10016090-186 = "(My body is it's at its absolute limit, but I feel more and more ecstatic with each step I take...!)"
10016090-187 = "(I feel like I could run like this forever...!)"
10016090-189 = "...Hasumi crosses the finish line!"
10016090-190 = "...I did it!"
10016090-196 = "Hasumi comes in at sixth place!"
10016090-197 = "...Huh?"
10016090-198 = "It was a close call, but Yuuka overtook you for fifth by just a hair."
10016090-199 = "You did wonderfully out there, so don't be disappointed. Well done!"
10016090-203 = "I-I came in sixth...? Then who won...?"
10016090-204 = "Did you all see that? Despite taking a nasty fall right at the start, Junko managed to catch up to the other runners and win the race! What incredible speed!"
10016090-205 = "There's no other way to describe it! It was a dramatic comeback worthy of the Halo Festival!"
10016090-207 = "Did you see? Were you watching? I came in first!"
10016090-208 = "Exactly as planned. I knew Junko would be capable of winning."
10016090-209 = "Are you sure? I swear I almost remember you saying something along the lines of, \"I never should have trusted those abnormal Gourmet Research Society members!\" when Junko fell..."
10016090-211 = "Well, in the end, her worries were for naught and Gehenna came in first."
10016090-212 = "I knew Junko would be the star of this Kivotos Halo Festival."
10016090-213 = "Then we can use this General Meal Ticket to gorge ourselves on anything we want now, right? Right?!"
10016090-214 = "Hurry, hurry! What if they run out of food?"
10016090-216 = "Well. I suppose that's that."
10016090-223 = "I ran so hard... I can't believe I only placed fifth..."
10016090-224 = "This is why I didn't want to run anchor..."
10016090-228 = "Great job, Yuuka."
10016090-229 = "You too, Vice President Hasumi..."
10016090-231 = "Now that the final game has concluded, it's time for announcements!"
10016090-232 = "The winning academy of the Kivotos Halo Festival is..."
10016090-234 = "Gehenna!"

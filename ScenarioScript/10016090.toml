[translation]
10016090-1 = "第9話;晄輪大祭的主角"
10016090-2 = "克洛盧斯頻道的各位觀眾，大家好！#n今年的晄輪大祭終於進入尾聲了！"
10016090-3 = "比賽項目只剩下最後的「學園對抗接力賽」！"
10016090-4 = "究竟獲得總冠軍的會是哪個學園呢！"
10016090-5 = "雖然這麼說，通常在接力賽開始前的公布分數環節，#n大概就能猜出會由哪所學園贏得總冠軍……"
10016090-6 = "那麼，現在最接近總冠軍的學園是……？"
10016090-7 = "喔喔！各位可別嚇到了喔！#n目前綜合分數排名第1名的──"
10016090-8 = "居然是三一、格黑娜、千年3校並列！"
10016090-9 = "咦！？難道3所學校同分嗎？"
10016090-10 = "沒錯！就是這麼不可思議！過去的晄輪大祭，最後都是由三一和格黑娜一較高下……"
10016090-11 = "想不到今年的千年出乎意外的驍勇善戰，形成了三強鼎立的局面！"
10016090-12 = "這使得「學園對抗接力賽」更加受人矚目！"
10016090-14 = "各位觀眾，讓我們一起見證這場比賽直到最後吧！"
10016090-16 = "原來如此。這場接力賽將會決定誰會是總冠軍。"
10016090-17 = "挑選出賽選手得要更加慎重才行……"
10016090-18 = "喂，聽說了嗎？風紀委員會的陽奈委員長失蹤了。"
10016090-19 = "咦，真的假的？風紀委員會發生了什麼事嗎？"
10016090-20 = "如果是那位風紀委員長的話，我想是不會有什麼危險……"
10016090-21 = "但話說回來，接力賽這下不就糟了嗎？#n如果陽奈委員長不下場的話，誰來當格黑娜的跑者呢？"
10016090-22 = "就是說啊……看來總冠軍是沒希望了吧。"
10016090-23 = "明明是能擊敗三一的絕佳機會……"
10016090-24 = "陽奈委員長失蹤了……？"
10016090-25 = "假如格黑娜首屈一指的優秀跑者無法參加最後的接力賽……"
10016090-26 = "對三一來說，這是奪得總冠軍的絕佳機會。"
10016090-27 = "把第一棒交給腳程快的選手，先拉大和其他學校的距離，#n之後只要維持領先就勝券在握了。"
10016090-28 = "現在能參加的選手是「放學後的甜點部」的千紗同學，#n以及「自衛隊」的鈴美同學……"
10016090-29 = "……這樣應該足夠了。"
10016090-30 = "然後把關鍵的最後一棒……交給弦生就萬無一失了吧！"
10016090-32 = "三一．選手休息室"
10016090-33 = "……不，我不參加。"
10016090-34 = "為，為什麼！？"
10016090-35 = "難道是在剛才的比賽中受傷了……"
10016090-36 = "不……我很好。沒有受傷。"
10016090-37 = "只是……我已經跑夠多了。"
10016090-38 = "應該把機會讓給其他選手。"
10016090-39 = "難道弦生……你已經累了嗎？"
10016090-40 = "不，不是因為我累了……"
10016090-41 = "大運動會──晄輪大祭──是「奇普托斯所有學生一起享受並成就的慶典」對吧？"
10016090-42 = "因為運動神經好就讓我獨佔所有機會……我認為這是不對的。"
10016090-43 = "雖然我也很想出賽，但說不定還有沒有參賽過的學生……"
10016090-44 = "可是…… "
10016090-45 = "而且，最後一棒會備受大家的關注……"
10016090-46 = "那樣的視線……有點讓人喘不過氣……"
10016090-47 = "情況我明白了。#n但比賽即將開始，要去哪裡找替補呢……"
10016090-49 = "……替補？"
10016090-50 = "蓮實，由你出賽不就行了嗎？"
10016090-51 = "什麼！？"
10016090-52 = "我……跑最後一棒嗎？"
10016090-53 = "……是啊。不行嗎？"
10016090-54 = "弦生……三一現在沒有餘裕這麼做。"
10016090-55 = "你知道這個接力賽是決定總冠軍的重要比賽吧？"
10016090-56 = "各校都在重新擬定作戰計畫，盡量派腳程快的選手出場──"
10016090-57 = "對不起，容我打斷一下……"
10016090-58 = "我也同意弦生前輩的話。"
10016090-59 = "……居然連麻白也這樣！"
10016090-60 = "到底為什麼……"
10016090-61 = "大家就這麼想看我出糗嗎？"
10016090-63 = "出，出糗？"
10016090-64 = "我沒有那個意思……"
10016090-66 = "大家應該知道……我的腳程並不快。"
10016090-67 = "不管格黑娜和千年派出誰來當選手，我都沒有信心能跑贏。"
10016090-68 = "如果因為我的原因，讓三一錯失總冠軍的話……"
10016090-69 = "我要如何承擔這樣的壓力呢？"
10016090-70 = "……那種事有這麼重要嗎？"
10016090-72 = "當然了！"
10016090-76 = "前輩……我在參加「晄輪大祭」之前，調查了它的歷史和理念。"
10016090-77 = "據說這個有著悠久歷史的大運動會，#n是為了讓奇普托斯的學生們測試自己的極限與潛力所舉辦的。"
10016090-78 = "然而每個人所擁有的身體能力各不相同。#n為了能充分發揮各自的能力，每次舉行都會不斷修改規則，最終成為學生們的慶典。"
10016090-79 = "如果只執著於比賽的勝負，讓特定選手擁有較多的機會……"
10016090-80 = "這樣──還稱得上是晄輪大祭嗎？"
10016090-81 = "這種行為──還算得上是有好好遵循「晄輪大祭」的理念嗎？"
10016090-82 = "這，這麼說是沒錯……"
10016090-87 = "不過除此之外，我還有其他希望蓮實前輩能參加比賽的理由。"
10016090-88 = "蓮實前輩今天一整天都在忙實行委員的業務，所以沒能參加比賽吧？"
10016090-89 = "明明為今天的慶典付出了比任何人都多的汗水，結果卻沒有人看見──#n這實在太令人難過了。"
10016090-90 = "所以……我希望能看見蓮實前輩在這場可說是#n「晄輪大祭最大看點」的學園對抗接力賽中大放異彩。"
10016090-91 = "我……想看蓮實同學在最後一場比賽中奔跑的樣子！"
10016090-92 = "我，我也是……！"
10016090-100 = "我反倒是被蓮實副部長的精準射擊給震驚到了……"
10016090-104 = "只要是和蓮實閣下在一起，無論是敵是友都無所謂！#n一定會很有趣的！耶嘿嘿。"
10016090-108 = "將會是嶄新的體驗，一定會很有趣的。"
10016090-110 = "……大家為什麼都這麼任性呢。"
10016090-111 = "我明白了……就由我來擔任三一的最後一棒。"
10016090-112 = "雖然我不擅長運動，但也不會應付了事。"
10016090-113 = "事已至此，就由我親手為三一爭取總冠軍吧！"
10016090-115 = "嗯──這樣就足夠了。"
10016090-116 = "我們會在應援席上幫蓮實加油的。"
10016090-117 = "加油，蓮實前輩！"
10016090-120 = "第三棒跑者也出發了！"
10016090-121 = "最後一棒跑者，請盡快進入賽道！"
10016090-126 = "……咦，蓮實副部長？"
10016090-127 = "……優香？"
10016090-128 = "蓮實副部長在這裡就表示……你是三一的最後一棒？"
10016090-129 = "是，是的……所以，優香也是千年的最後一棒嗎……？"
10016090-130 = "嗯，沒錯……唉。"
10016090-131 = "其實我的腳程並不快……#n只是研討會的大家都說，如果我不擔任最後一棒就不參加比賽……"
10016090-132 = "好不容易有獲得總冠軍的機會，大家為什麼都這麼任性呢……！"
10016090-137 = "呵，呵呵……"
10016090-138 = "咦，咦？我剛才說了什麼奇怪的話嗎？"
10016090-139 = "不……我只是覺得，優香也很辛苦呢。"
10016090-140 = "……但就算這樣，我也不會手下留情的。"
10016090-141 = "這，這是我要說的台詞！"
10016090-142 = "我會為了千年的總冠軍全力奔跑的！"
10016090-143 = "有那份決心是很好，但這次的總冠軍將屬於三一。"
10016090-147 = "喔喔！第三棒跑者來到接棒區了！"
10016090-154 = "唔……肚子跑著跑著就餓了……"
10016090-155 = "我不行了～……"
10016090-156 = "之後就交給我吧！"
10016090-165 = "接力棒交給了第四棒的跑者！"
10016090-166 = "喂，快點……快點把棒子……嗚，哇啊！？"
10016090-171 = "格黑娜的第四棒跑者，淳子選手！#n因為光顧著看接力棒而跌倒了！"
10016090-172 = "哎呀！是個嚴重的失誤呢！#n格黑娜這下會被排除在總冠軍爭奪戰之外嗎……！？"
10016090-173 = "啊，蓮實閣下！很高興又見面了！"
10016090-174 = "哈啊……哈啊！！嚇！！"
10016090-175 = "喔喔，好強的氣勢啊！伊樹菜也不會輸的！"
10016090-176 = "我，不，會，輸的……！"
10016090-177 = "我，也，一樣……！！"
10016090-178 = "唔嘿，真是青春啊～"
10016090-179 = "大叔也有點興奮起來了呢……"
10016090-180 = "星野前輩！交棒了就趕快離開跑道！"
10016090-182 = "（哈啊，哈啊……距離終點還剩幾公尺？）"
10016090-183 = "（呼吸困難……視線變模糊了……其他跑者都去了哪裡……）"
10016090-184 = "（但是，能聽見大家在為我加油。這心如止水的狀態……）"
10016090-185 = "（也許就是俗稱的[ruby=Runner's High]無我境界[/ruby]……）"
10016090-186 = "（明明已經超越了極限，但每次踏出步伐都能感覺到滿溢的情緒……）"
10016090-187 = "（這樣的話，不管要跑多遠都……！）"
10016090-189 = "……蓮實選手，抵達終點！"
10016090-190 = "……辦，辦到了！"
10016090-196 = "三一綜合學園──蓮實選手，第6名。"
10016090-197 = "……咦？"
10016090-198 = "僅僅只有毫米之差，但優香選手先抵達了終點。"
10016090-199 = "直到最後都跑得十分精彩！辛苦了。"
10016090-203 = "我，我是第6名……？#n這樣的話……冠軍究竟是……？"
10016090-204 = "第1名的淳子選手以怒濤般的氣勢一路追擊，真的是太精彩了。#n雖然曾一度跌倒，卻馬上重新站起並一鼓作氣反超，可說是上演了一場大逆轉！"
10016090-205 = "作為晄輪大祭壓軸的學園對抗接力賽，果然時時刻刻都充滿了戲劇性！"
10016090-207 = "大家都看到了吧！？#n我是第1名！"
10016090-208 = "呵呵……果然和計畫一樣。#n我早就知道淳子同學可以拿下第1名！"
10016090-209 = "哎呀呀……剛才淳子同學跌倒的時候，說的明明是「果然不該指望美食研究會」。"
10016090-211 = "呵呵……表情真不錯。#n看來剛才的煩惱都已煙消雲散，真是太好了。"
10016090-212 = "今年晄輪大祭的主角是淳子同學吧。"
10016090-213 = "吶吶！有了這個「萬能餐券」的話，就能吃任何想吃的東西吧？"
10016090-214 = "快點快點！必須在賣完之前趕過去！"
10016090-216 = "結果變成這樣了嗎……"
10016090-223 = "唉……明明我都卯足了全力，居然是以這麼悲傷的結局收場……"
10016090-224 = "所以我才不想當最後一棒……"
10016090-228 = "辛苦了，優香。"
10016090-229 = "蓮實副部長也辛苦了……"
10016090-231 = "分數已統計完畢，來到了公布結果的環節！"
10016090-232 = "取得今年晄輪大祭總冠軍的學校是──"
10016090-234 = "──格黑娜學園！"

10016090-1 = "#title;제9화;황륜대제의 주인공"
10016090-2 = "1;마이;01\n5;시논;02;안녕하세요, 크로노스 채널의 시청자 여러분! 화려했던 황륜대제도 어느덧 종막에 이르고 있습니다!\n#1;a\n#5;a\n#5;em;[반응]"
10016090-3 = "5;시논;01;이제 남은 경기는 황륜대제의 피날레라고 할 수 있는, <학원 대항 계주>뿐!"
10016090-4 = "5;시논;00;이 경기를 끝으로 황륜대제의 종합 우승을 차지하게 되는 학교가 어디인지 가려지게 됩니다!\n#5;em;[반짝]"
10016090-5 = "1;마이;02;그렇다고는 하지만 보통 마지막 계주가 시작될 즈음에는 종합 우승을 차지하는 학원이 어디일지, 윤곽이 어느 정도 드러나게 되는데요……\n#1;em;…"
10016090-6 = "1;마이;03;현재, 종합 우승이 유력한 1위 학원은 어디인가요?"
10016090-7 = "5;시논;02;여러분, 놀라지 마세요. 현재 종합 점수 1위를 차지하고 있는 학원은……"
10016090-8 = "5;시논;00;트리니티, 게헨나, 밀레니엄 학원이 동점입니다!\n#5;em;[!]"
10016090-9 = "1;마이;02;네에에?! 설마 1점의 차이도 없이 동점이란 말씀이신가요?\n#1;em;[?!]"
10016090-10 = "5;시논;02;그렇습니다! 기존 대운동회에서는 보통 결승을 앞두고 트리니티와 게헨나의 맞대결이 이루어졌었는데요.\n#5;em;[!]"
10016090-11 = "5;시논;01;이번 황륜대제에서는 밀레니엄 학원이 예상외의 선전을 하며, 마지막까지 삼파전이 이루어지고 있습니다!"
10016090-12 = "1;마이;00;<학원 대항 계주>를 주목해야 할 이유가 하나 더 생긴 셈이네요."
10016090-13 = "#all;hide"

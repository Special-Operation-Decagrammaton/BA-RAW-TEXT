[translation]
1601502-1 = "Sugar High"
1601502-2 = "（接到愛莉的聯絡後，前往了市區）"
1601502-3 = "（不久後便看見愛莉從遠處跑了過來）"
1601502-4 = "老師～！！！"
1601502-14 = "……鏘！！"
1601502-15 = "[s1]「……愛，愛莉！？」\n[s2]「你今天好像特別有活力！？」"
1601502-18 = "耶嘿嘿……是嗎？#n可能是因為現在有種神清氣爽的感覺吧！"
1601502-19 = "我直到剛才都在練習室練習，因為今天練習得很順利……"
1601502-20 = "我們就一邊練習一邊閒聊，然後我突然想到有一間店還沒介紹給老師！"
1601502-21 = "所以！我才會一練習完就聯絡你！！"
1601502-22 = "……真的是一練習完喔！！"
1601502-23 = "[s3]（愛莉今天真是特別有活力）\n[s4]（就先配合他一下吧）"
1601502-26 = "來，沒時間了！那間店關門的時間比較早！我們快點出發吧！"
1601502-27 = "跟著我走就對了～"
1601502-33 = "哎呀，在排隊……"
1601502-34 = "唔，沒想到這麼早就有人在排隊，看來可能得等一陣子了……"
1601502-35 = "虧我之前還跟老師說只要一下下就好……果然還是應該早點來的嗎？"
1601502-36 = "反正練習這種事，明天再做也行……#n應該早點收工，提早來找老師才對……"
1601502-37 = "[s5]「唔嗯，我覺得那樣也有點不好。」\n[s6]「反正還有明天，沒必要急著今天吃沒關係。」"
1601502-40 = "唔嗯，是，是這麼說沒錯……"
1601502-41 = "……嗯？"
1601502-42 = "明天再來是嗎？#n嗯……唔……"
1601502-43 = "[s]「……愛莉？」"
1601502-44 = "……哼～！"
1601502-45 = "……不可以！"
1601502-46 = "那樣不行！就算得等很久還是要排，不管要排幾小時都一樣！！"
1601502-47 = "不然的話就……！！！"
1601502-51 = "……咦？等，等一下。"
1601502-52 = "糟糕……我的老毛病又犯了……"
1601502-53 = "[s7]「……愛莉？」\n[s8]「老毛病又犯了……？」"
1601502-56 = "沒，沒什麼，就是……嗚嗚……"
1601502-57 = "對不起，老師。#n我又擅自替老師安排行程了。"
1601502-58 = "明明不知道老師待會有沒有別的行程……#n就算沒有，你平常那麼忙，有空的時候也應該好好休息才對……"
1601502-59 = "我有時候會不自覺地變得很固執，就連部裡的大家也常常這樣說我……"
1601502-60 = "沒想到現在居然在老師面前也這樣，真不好意思。#n嘿嘿……"
1601502-61 = "就按照老師說的，我們明天再來吧！或者之後再來也沒關係！"
1601502-65 = "……咦？"
1601502-66 = "你說沒關係？今天沒有別的行程……？"
1601502-67 = "而且這就是你休息的方式……？#n就算是這樣，我們可能要排隊排很久哦……"
1601502-68 = "[s9]「不是只有躺著睡覺才叫休息。」\n[s10]「我很享受現在的時光，愛莉不必擔心。」"
1601502-71 = "老師……"
1601502-72 = "……嘿嘿。"
1601502-73 = "老師的好意我心領了，但是真的沒關係。#n畢竟可能真的要排很久……"
1601502-74 = "……咦？"
1601502-75 = "你真心覺得那也沒關係？#n咦，老師為什麼這麼……？"
1601502-76 = "[s11]「因為有件事，我想聽你在排隊的時候跟我說。」\n[s12]「可以告訴我其他成員平常都是怎麼形容你的嗎？」"
1601502-79 = "咦……"
1601502-83 = "……呵呵。"
1601502-84 = "啊哈哈……！什麼啦～老師！"
1601502-85 = "老師居然會好奇這種事嗎？#n可是那真的只是一些雞毛蒜皮的小事，而且嚴格說起來，也算是我的糗事……"
1601502-86 = "不過，要是老師想聽的話倒也沒關係。#n畢竟這也沒什麼大不了的……"
1601502-87 = "他們常常說我只要一對某件事著迷……就會突然變得很固執。"
1601502-88 = "……嗯？具體來說是什麼樣的事？"
1601502-89 = "唔嗯……"
1601502-90 = "這個嘛……呵呵。#n要說起這件事的話……"
1601502-95 = "……說不定能輕鬆說上一兩個小時呢。"

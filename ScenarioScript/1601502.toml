[translation]
1601502-1 = "ชูการ์ไฮ"
1601502-2 = "(คุณครูได้รับข้อความจากไอริก็เลยออกไปที่ตัวเมือง)"
1601502-3 = "(ไม่นานหลังจากไปถึง คุณครูก็เห็นไอริที่กำลังวิ่งมาหาจากไกลๆ)"
1601502-4 = "คุณครู~!!!"
1601502-14 = "แถ่นแท้น~!!"
1601502-15 = "[s1] \"อะ... ไอริ!?\"\n[s2] \"วันนี้ดูร่าเริงเป็นพิเศษเลยนะ!?\""
1601502-18 = "แหะๆๆ... งั้นเหรอคะ? ฉันคงจะรู้สึกสดชื่นนิดหน่อยน่ะค่ะ"
1601502-19 = "พอดีว่าฉันเพิ่งซ้อมดนตรีเสร็จมาเมื่อกี้เลยค่ะ แล้ววันนี้ฉันก็เล่นได้ค่อนข้างดี..."
1601502-20 = "ตอนซ้อมฉันกับเพื่อนๆ ก็คุยอะไรกันไปเรื่อย และระหว่างนั้นก็นึกขึ้นได้ว่ามีร้านที่ยังไม่ได้แนะนำให้#nคุณครูรู้จักเลย!"
1601502-21 = "ฉันก็เลยส่งข้อความหาคุณครูทันทีที่ซ้อมเสร็จเลยค่ะ!!"
1601502-22 = "ซ้อมเสร็จแล้วก็ส่งหาเลย...!!"
1601502-23 = "[s3] (ดูกระปรี้กระเปร่าจริงๆ เลยแฮะ)\n[s4] (งั้นก็สดใสๆ ให้เข้ากับไอริวันนี้หน่อยแล้วกัน)"
1601502-26 = "เอาละๆ! เราไม่มีเวลาแล้วค่ะ! ร้านนี้น่ะปิดไวกว่าที่คิดเอาไว้! เราต้องรีบไปกันแล้วละค่ะ!"
1601502-27 = "ตามฉันมาได้เลยค่า~"
1601502-33 = "เอ๋... ทำไมแถวยาวขนาดนี้..."
1601502-34 = "อืม... คนมาต่อแถวกันเยอะกว่าที่คิดอีกนะคะ ดูจากแถวแล้ว เราอาจจะต้องรอกันสักพักเลย..."
1601502-35 = "ฉันบอกคุณครูไปว่าแป๊บเดียวแท้ๆ... หรือว่าฉันควรจะมาให้เร็วกว่านี้นะ?"
1601502-36 = "ยังไงการซ้อมดนตรีก็เอาไว้พรุ่งนี้ก็ได้ วันนี้น่าจะรีบเลิกให้เร็วแล้วออกมาเร็วๆ แท้ๆ..."
1601502-37 = "[s5] \"ไม่ได้หรอก จะไม่ซ้อมเพราะครูไม่ได้นะ\"\n[s6] \"พรุ่งนี้ก็ยังมีเวลา เพราะงั้นเราไม่ต้องรีบร้อนหรอก\""
1601502-40 = "อืม... มะ... มันก็จริงอยู่หรอกค่ะ..."
1601502-41 = "คะ...?"
1601502-42 = "ไว้มาใหม่พรุ่งนี้งั้นเหรอคะ? อืม... อืมม..."
1601502-43 = "[s] \"ไอริ...?\""
1601502-44 = "ฮึ่ม...!"
1601502-45 = "ไม่ค่ะ!"
1601502-46 = "ทำแบบนั้นไม่ได้หรอกค่ะ ต่อให้ต้องรออีกพักใหญ่ แต่ยังไงวันนี้เราก็ต้องต่อแถวเข้าร้านให้ได้ค่ะ!! ต่อให้ต้องรอหลายชั่วโมงก็เถอะ!!"
1601502-47 = "เพราะไม่อย่างนั้น...!!!"
1601502-51 = "เอ๋...? อ๊ะ... เดี๋ยวนะคะ"
1601502-52 = "อ่า... ดันเป็นแบบนี้ไปซะได้อีกแล้ว..."
1601502-53 = "[s7] \"ไอริ...?\"\n[s8] \"เป็นแบบนี้งั้นเหรอ...?\""
1601502-56 = "มะ... ไม่มีอะไรค่ะ ไม่ใช่อย่างนั้นค่ะ... เอ่อ..."
1601502-57 = "ขอโทษนะคะคุณครู นี่ฉันบังคับให้คุณครูต้องปรับตารางงานให้เข้ากับฉันโดยไม่รู้ตัวเลย"
1601502-58 = "หลังจากนี้คุณครูก็น่าจะมีธุระต้องทำ และถึงต่อให้ไม่มี วันหยุดแบบนี้ก็ควรได้พักผ่อนหลังจากเจองาน#nเยอะๆ มาทั้งสัปดาห์..."
1601502-59 = "บางทีฉันก็มีมุมที่ดื้อโดยที่ไม่รู้ตัวน่ะค่ะ เรื่องนี้ฉันก็ได้ยินมาจากเพื่อนในชมรมเหมือนกัน..."
1601502-60 = "กลายเป็นว่าฉันเอาแต่ใจกับคุณครูอีกคนแล้วสินะ... ขอโทษด้วยนะคะ แหะๆ..."
1601502-61 = "งั้นมาใหม่พรุ่งนี้อย่างที่คุณครูว่าเถอะค่ะ หรือจะเอาไว้วันหลังก็ได้ค่ะ!"
1601502-65 = "คะ...?"
1601502-66 = "ไม่เป็นไรงั้นเหรอคะ...? วันนี้ไม่มีธุระอื่น..."
1601502-67 = "และนี่ก็ถือว่าได้พักผ่อนอยู่งั้นเหรอคะ...? แต่เราต้องยืนต่อแถวจนปวดขากันเลยนะคะ..."
1601502-68 = "[s9] \"การพักผ่อนใช่ว่าจะต้องนอนพักอย่างเดียวนี่นา\"\n[s10] \"แบบนี้ครูก็สนุกดี ไอริไม่ต้องห่วงหรอกนะ\""
1601502-71 = "คุณครู..."
1601502-72 = "แหะๆ..."
1601502-73 = "ไม่หรอกค่ะ ถึงฉันจะรู้สึกขอบคุณที่คุณครูพูดอย่างนั้น แต่ก็ไม่เป็นไรจริงๆ ค่ะ วันนี้แถวของร้าน#nยาวเป็นหางว่าวเลย ไว้เรามาทีหลัง..."
1601502-74 = "คะ...?"
1601502-75 = "ถึงยังไงคุณครูก็ไม่เป็นไรจริงๆ งั้นเหรอคะ? เอ๋? ทำไมต้องทำถึงขนาดนี้เลย...?"
1601502-76 = "[s11] \"พอดีครูมีสิ่งที่อยากฟังระหว่างที่รอน่ะ\"\n[s12] \"เล่าเรื่องที่เพื่อนๆ พูดถึงให้ครูฟังหน่อยได้มั้ย?\""
1601502-79 = "อ่า..."
1601502-83 = "อุบ..."
1601502-84 = "ฮุฮุฮุ...! คุณครู~! อะไรกันคะเนี่ย!"
1601502-85 = "มาสงสัยอะไรเรื่องแบบนี้คะ? เรื่องนี้ไม่ได้มีอะไรพิเศษหรอกค่ะ ถ้าจะพูดตรงๆ มันเป็นปมของฉันน่ะค่ะ"
1601502-86 = "แต่ถ้าจะให้เล่า ฉันก็ไม่ติดอะไรหรอกนะคะ มันก็ไม่ใช่เรื่องใหญ่อะไรมากมาย..."
1601502-87 = "ก็แค่... ถ้าฉันชอบอะไรมากๆ ก็จะดื้อดึงในสิ่งนั้น... เพื่อนๆ ชอบพูดแบบนี้กับฉันน่ะค่ะ"
1601502-88 = "คะ...? เช่นเรื่องอะไรบ้างเหรอคะ?"
1601502-89 = "ฮืมม..."
1601502-90 = "เรื่องอะไรบ้างนะ ฮุฮุ คุณครูจะพอมี..."
1601502-95 = "เวลาสัก 2-3 ชั่วโมงมั้ยล่ะคะ?"

[translation]
1601502-1 = "Sugar High"
1601502-2 = "After getting Airi's message, I headed downtown."
1601502-3 = "It didn't take long to spot Airi running towards me from a distance."
1601502-4 = "Senseiii!!!"
1601502-14 = "...Tada!"
1601502-15 = "[s1] \"...A-Airi?!\"\n[s2] \"You're so energetic today!\""
1601502-18 = "Heehee. Do you think so? It's probably all the adrenaline!"
1601502-19 = "I just wrapped up practice in the band room! We had a really productive session."
1601502-20 = "While we were discussing this and that, I suddenly remembered a shop I had meant to show you!"
1601502-21 = "And so! I messaged you as soon as I had a chance!"
1601502-22 = "The very moment, I'm telling you!"
1601502-23 = "[s3] \"(She really is full of energy today.)\"\n[s4] \"(I don't want to dampen her mood.)\""
1601502-26 = "Off we go, then! The store closes rather early, so we have to go as soon as possible!"
1601502-27 = "Follow me, please!"
1601502-33 = "Oh, my... The line..."
1601502-34 = "I didn't expect so many people, and so early too... We'll need to wait a while..."
1601502-35 = "It looks like I was wrong about this being quick... I suppose we should've gotten here a bit earlier..."
1601502-36 = "We always have tomorrow for practice... Maybe I should've left early today and stood in line."
1601502-37 = "[s5] \"No, no. You made the right choice in staying.\"\n[s6] \"There's no rush. We can always come back!\""
1601502-40 = "Mm... I suppose you're right, but..."
1601502-41 = "...Huh?"
1601502-42 = "How do I feel about coming back tomorrow? Um... Hm..."
1601502-43 = "[s] \"...Airi?\""
1601502-44 = "...Hmph!"
1601502-45 = "...No!"
1601502-46 = "That's simply not an option. No matter how long the line is, waiting is the right course of action. Whether it be one hour or ten!"
1601502-47 = "And, so...!"
1601502-51 = "...Huh? Ah, w-wait just a moment."
1601502-52 = "Eek. I just realized, I did it again..."
1601502-53 = "[s7] \"...What do you mean?\"\n[s8] \"Did it again...?\""
1601502-56 = "I-I mean... It's, well..."
1601502-57 = "I apologize, Sensei. I'm trying to force you to abide by my schedule, with no consideration for your time."
1601502-58 = "You must have a rather busy schedule already...and even if it's your day off, you should taking advantage of that to rest."
1601502-59 = "I can be a bit unaware of how my stubbornness affects others at times... The other club members tell me all the time..."
1601502-60 = "And now I ended up doing the same thing to you, Sensei. Heehee... I truly am sorry."
1601502-61 = "As you said, let's just come back tomorrow. Or any time that works for you!"
1601502-65 = "...Huh?"
1601502-66 = "You don't have any plans today? You're free to do whatever I want?"
1601502-67 = "What do you mean this is a break for you too? I'm making you stand in a long line... Your legs will get tired..."
1601502-68 = "[s9] \"Resting doesn't necessarily mean lying down and sleeping.\"\n[s10] \"I'm having a blast, and that's what matters.\""
1601502-71 = "Sensei..."
1601502-72 = "Heehee."
1601502-73 = "I truly appreciate your thoughts, but it's okay for today. This line may take longer than you think..."
1601502-74 = "...What?"
1601502-75 = "You really, really don't mind? Um. I don't quite understand why you would want to stay..."
1601502-76 = "[s11] \"Well, there's something I want to ask you about.\"\n[s12] \"Tell me more about what the other club members say to you!\""
1601502-79 = "Oh..."
1601502-83 = "...Pfft."
1601502-84 = "Hahaha! What in the world are you saying, Sensei?"
1601502-85 = "That's what you were so curious about? There's not much a story behind it at all. In fact, it's just a lecture about my flaws."
1601502-86 = "It's really a small thing. Not that I mind telling you about it!"
1601502-87 = "You see, I tend to get a bit of...tunnel vision, when I'm excited about something. I've been known to be stubborn."
1601502-88 = "...Hm? What are some examples?"
1601502-89 = "Hm..."
1601502-90 = "...Heehee. Okay, Sensei."
1601502-95 = "Maybe this'll be enough to fill up the time."

[translation]
10034005-1 = "บทเริ่มต้น;ยังไม่ดีพอรึเปล่า??"
10034005-4 = "[log=???]น่าจะยังไม่ดีพอรึเปล่า?[/log]"
10034005-8 = "หืม...?"
10034005-9 = "อ่า... โทษที ขอโทษนะ ฉันมัวแต่คิดเรื่องอื่นอยู่น่ะ... เมื่อกี้ว่าอะไรนะ?"
10034005-10 = "ฉันถามว่าแค่นั้นน่ะจะพอเหรอ? หมายถึง <คาเฟ่ของหวาน> น่ะ"
10034005-11 = "แน่นอนว่ามันก็ไม่ใช่ไอเดียที่แย่หรอก ไอริก็อยู่ชมรมของหวานเป็นทุนเดิมอยู่แล้วนี่"
10034005-16 = "แต่ปกติแล้ว 'คาเฟ่' ในงานเทศกาลโรงเรียนมันต้อง... พิเศษกว่าคาเฟ่ทั่วไปหน่อยไม่ใช่เหรอ?"
10034005-17 = "ถ้ามีแต่ของหวาน ไม่ว่าคาเฟ่ไหนก็มีด้วยกันทั้งนั้นนี่นา"
10034005-18 = "ใช่ไหมล่ะ ไหนๆ ก็จะทำแล้ว เราก็ควรทำให้มีเอกลักษณ์หน่อยสิ จะได้ไม่ซ้ำใครไง"
10034005-20 = "อืม... งะ... งั้นเหรอ?"
10034005-21 = "พอฟังๆ ไป ก็ควรจะเป็นอย่างนั้นอยู่นะ..."
10034005-22 = "อืม..."
10034005-23 = "อืมมมม..."
10034005-27 = "งั้นจะทำอะไรดีนะ...? เราควรทำอะไรดีล่ะ?"
10034005-29 = "จะถามจากพวกเรางั้นเหรอ..."
10034005-30 = "นั่นไม่ใช่คาเฟ่ของพวกเรา จะให้เรามากำหนดอะไรมันก็ไม่ถูกต้องนะ"
10034005-31 = "เอาเถอะๆ ไม่ต้องกังวลให้มันมากไปหรอก! ยังไงพวกเราก็จะแวะไปที่คาเฟ่ของไอริ และก็ช่วยอุดหนุนอยู่แล้ว!"
10034005-32 = "ใช่ๆ ไม่ต้องกังวลเรื่องยอดขายหรอกนะ! ฉันจะพาเพื่อนๆ ไปซื้อของให้กระเป๋าฉีกเลยละ!!"
10034005-34 = "แหะๆๆ... ขอบใจนะ ฉันก็จะไปคาเฟ่ของพวกเธอเหมือนกัน"
10034005-38 = "อ๊ะ ฉันต้องลงสถานีนี้นี่นา เกือบนั่งเลยซะแล้ว"
10034005-39 = "งั้นไว้คุยกันต่อนะ! ฉันไปก่อนละ!"
10034005-41 = "อื้ม~ กลับดีๆ นะ~"
10034005-42 = "เจอกันพรุ่งนี้นะ! ไม่ต้องกังวลให้มากนักล่ะ!! "
10034005-44 = "อื้ม!! "
10034005-46 = "จัตุรัสหน้าสถานี"
10034005-50 = "อืม..."
10034005-54 = "......"
10034005-56 = "น่าจะยังไม่ดีพอหรือเปล่า?"
10034005-59 = "เฮ้อ..."
10034005-60 = "แค่นั้นคงจะไม่พอจริงๆ แหละเนอะ คาเฟ่แบบนั้นก็มีถมไปด้วย..."
10034005-61 = "ถ้าอยากแตกต่าง ก็ต้องมีบางอย่างที่เป็นเอกลักษณ์..."
10034005-65 = "อืม..."
10034005-66 = "แล้วฉันควรเพิ่มอะไรไปดีนะ..."
10034005-72 = "หืม...? เสียงกีตาร์นี่นา...?"
10034005-73 = "มีใครมาเล่นดนตรีเปิดหมวกงั้นเหรอ?"
10034005-74 = "......"
10034005-75 = "อ๊ะ... อยู่ตรงโน้นนี่เอง"
10034005-76 = "......"
10034005-77 = "............"
10034005-86 = "วงดนตรีเหรอ?"

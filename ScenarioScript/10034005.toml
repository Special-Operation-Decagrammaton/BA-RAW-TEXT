[translation]
10034005-1 = "序幕;是不是少了點什麼？"
10034005-4 = "[log=???]「是不是少了點什麼？」[/log]"
10034005-8 = "……嗯？"
10034005-9 = "啊，抱歉抱歉。#n稍微恍神了一下……你剛才說什麼？"
10034005-10 = "我剛才說是不是少了點什麼啊？#n那個「甜點咖啡廳」。"
10034005-11 = "當然我也不是說這個點子不好哦。#n而且愛莉本來就是甜點部的嘛。"
10034005-16 = "不過說到學園祭的「咖啡廳」……通常都會再多一些特別的元素吧？"
10034005-17 = "畢竟甜點這種東西……說白一點，其實每間咖啡廳都大同小異。"
10034005-18 = "沒錯沒錯。#n既然要做的話，感覺多增加一點個性會更好。"
10034005-20 = "咦……是，是這樣嗎？"
10034005-21 = "聽你們這麼一說，好像是這樣沒錯……"
10034005-22 = "唔嗯……"
10034005-23 = "唔嗯…………！"
10034005-27 = "……可是該做什麼才好呢？"
10034005-29 = "這個嘛……"
10034005-30 = "畢竟不是我們的咖啡廳，隨便出主意好像也不太好……"
10034005-31 = "不過別擔心！#n無論如何，我們都會把愛莉的咖啡廳坐滿的！"
10034005-32 = "沒錯沒錯。不用煩惱營業額哦！我會帶人去強迫消費的！"
10034005-34 = "啊哈哈哈……#n謝謝，我也一定會去你們的咖啡廳捧場的……"
10034005-38 = "啊，我該下車了。還好沒坐過頭。"
10034005-39 = "下次再聊吧！我先走囉！"
10034005-41 = "好～路上小心～"
10034005-42 = "明天見！不要想太多唷！！"
10034005-44 = "嗯！！"
10034005-46 = "車站前廣場"
10034005-50 = "唔嗯……"

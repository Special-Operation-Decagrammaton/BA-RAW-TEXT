[translation]
2003002-1 = "這種事我也做得到"
2003002-3 = "這裡這裡！有選手出現中暑症狀！"
2003002-4 = "[s]「中暑，中暑的話該……！」"
2003002-5 = "請先用冷水打濕手掌，這裡有冰毛巾……把它放在脖子上就行了！"
2003002-6 = "[s]「我知道了！」"
2003002-11 = "您看起來很忙呢，老師？"
2003002-12 = "[s]「你好呀，羽留奈。」"
2003002-13 = "是，老師您好。#n話說您在這裡做什麼呢？"
2003002-14 = "[s]「嗯……如你所見，在協助現場的醫療工作。」"
2003002-15 = "不過老師並非醫療人員吧？"
2003002-16 = "[s]「是這麼說沒錯，但是這裡似乎人手不足。」"
2003002-20 = "……"
2003002-21 = "看來別無選擇了呢，那麼我也更改後續的行程吧。"
2003002-25 = "[ns]「嗯……？什麼意思……？」"
2003002-30 = "在老師的工作告一段落之前，我也要和老師同行的意思。"
2003002-31 = "[s] 「咦咦……？」"
2003002-34 = "嗚……糟糕。#n不知道是不是消化不良，胃好痛……"
2003002-35 = "這樣下去就不能參加下午的比賽了……"
2003002-36 = "聽說梅子有幫助消化的效果。"
2003002-40 = "這是梅子茶，請用。#n我稍微泡濃了一點，希望能幫上忙。"
2003002-41 = "謝，謝謝你……"
2003002-45 = "啊……！"
2003002-46 = "疼痛正在消退……#n這樣比賽應該就沒問題了！"
2003002-48 = "哈啊，哈啊……"
2003002-49 = "中距離賽跑，果然很累啊……#n口好渴，有水嗎……？"
2003002-51 = "來，這是運動飲料。#n會比水更好吸收。"
2003002-52 = "因為用甜味劑代替了糖，喝起來不會有黏稠的感覺。"
2003002-53 = "哦……謝謝你！"
2003002-57 = "咕嚕咕嚕咕嚕……"
2003002-58 = "噗哈～好涼快！感覺活過來了！"
2003002-60 = "嗚嗚……突然好暈……！"
2003002-61 = "頭好痛又好冷……手也抖個不停……感覺意識模糊……"
2003002-66 = "這……似乎是低血糖休克症狀！"
2003002-67 = "要是放任不管，可能會對腦部造成損傷。#n必須趕緊處理！"
2003002-72 = "來，這是葡萄糖糖果和水。請將糖果含在嘴裡吧。"
2003002-77 = "嗯……哈啊……好像好多了。#n手也不再發抖了……"
2003002-84 = "[ns1]「太厲害了……羽留奈！」\n[ns2]「沒想到羽留奈還有這樣的一面……！」"
2003002-87 = "身為踏上美食之路之人，這也是理所當然的。"
2003002-88 = "這樣一來各位的應急處理應該就告一段落了。"
2003002-89 = "[s3]「是啊，真是幫大忙了。」\n[s4]「執行委員們也說很謝謝你。」"
2003002-92 = "呵呵呵……"
2003002-93 = "這樣終於能和老師一起探索大運動會真正的美食了！"
2003002-97 = "[ns]「難道……你從一開始就打算這麼做嗎？」"
2003002-98 = "這個嘛，您覺得呢？"
2003002-99 = "不過就算帶有私心，幫助別人的事實也不會改變不是嗎？"
2003002-100 = "至少我對自己的行動沒有絲毫羞愧。"
2003002-101 = "[s5]「哎呀哎呀，真拿你沒辦法。」\n[s6]「畢竟有句話說偽善總比不為善來的好。」"
2003002-104 = "真高興老師能夠理解我。"
2003002-105 = "[s]「不過……羽留奈想做什麼呢？」"
2003002-106 = "那當然……"
2003002-107 = "是路邊攤美食之旅囉！"
2003002-108 = "因為大運動會是能享受平常無法品嘗到的美食的祭典。"
2003002-109 = "今天我將一半的時間交給了老師，所以我也要收下老師一半的時間。"
2003002-110 = "您當然會同意吧，老師？"
2003002-114 = "[ns7]「那就沒辦法了。」\n[ns8]「可以請你帶我逛路邊攤嗎？」"
2003002-117 = "沒問題。我已經計劃好品嚐美食的路線了。"
2003002-118 = "那麼今天……老師也是美食研究會的名譽支持者，知道嗎？"
2003002-119 = "[s]「請多多指教，會長！」"
2003002-124 = "（和羽留奈一起逛路邊攤，品嚐各種美食直到撐滿肚子……）"

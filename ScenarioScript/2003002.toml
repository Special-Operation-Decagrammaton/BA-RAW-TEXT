[translation]
2003002-1 = "เรื่องแค่นี้ฉันก็ทำได้ค่ะ"
2003002-3 = "ทางนี้ ทางนี้ค่ะ! มีนักกีฬาเป็นลมแดดค่ะ!"
2003002-4 = "[s] \"โรคลมแดด... ลมแดดเรอะ...!\""
2003002-5 = "รีบเอาน้ำเย็นมาราดใส่ฝ่ามือก่อนค่ะ แล้วก็เอาผ้าชุบน้ำเย็นอันนี้... เช็ดรอบๆ คอนะคะ!"
2003002-6 = "[s] \"เข้าใจแล้ว!\""
2003002-11 = "ดูงานยุ่งมากเลยนะคะ คุณครู?"
2003002-12 = "[s] \"ว่าไง ฮารุนะ\""
2003002-13 = "สวัสดีค่ะคุณครู กำลังทำอะไรอยู่เหรอคะ?"
2003002-14 = "[s] \"อืม... กำลังช่วยงานปฐมพยาบาลตามที่เห็นนั่นแหละ\""
2003002-15 = "แต่ว่าคุณครูไม่ใช่ฝ่ายพยาบาลไม่ใช่เหรอคะ?"
2003002-16 = "[s] \"อื้อ แต่ว่าที่นี่คนไม่พอน่ะ\""
2003002-20 = "..."
2003002-21 = "ช่วยไม่ได้นะคะ ถ้างั้นตั้งแต่นี้ไปฉันคงต้องเปลี่ยนกำหนดการนิดหน่อยแล้วค่ะ"
2003002-25 = "[ns] \"หืม...? จะทำอะไรเหรอ...?\""
2003002-30 = "ฉันจะอยู่เป็นเพื่อนคุณครู จนกว่าคุณครูจะจัดการงานตรงนี้เสร็จเองค่ะ"
2003002-31 = "[s] \"เอ๋...?\""
2003002-34 = "อึก... เป็นเรื่องแล้วไง กินเยอะเกินจนอาหารไม่ย่อยแล้ว ปวดท้องจัง..."
2003002-35 = "แบบนี้คงเข้าแข่งตอนบ่ายไม่ได้แล้ว..."
2003002-36 = "ผลบ๊วยมีสรรพคุณช่วยย่อยอาหารนะคะ"
2003002-40 = "ชาบ๊วยค่ะ ลองดื่มสิคะ ฉันชงมาค่อนข้างเข้ม หวังว่าจะช่วยได้นะคะ"
2003002-41 = "ขะ... ขอบคุณค่ะ ขะ...ขอชิมหน่อย..."
2003002-45 = "อ๊า...!"
2003002-46 = "หายปวดท้องแล้วละ แบบนี้คงลงแข่งได้สบายมาก!"
2003002-48 = "แฮ่ก... แฮ่ก...!"
2003002-49 = "วิ่งระยะกลาง... เหนื่อยจริงๆ ด้วย... คอแห้งไปหมดแล้ว... มีน้ำ...บ้างมั้ย...?"
2003002-51 = "นี่ค่ะ เครื่องดื่มเกลือแร่ค่ะ จะดูดซึมเข้าสู่ร่างกายได้เร็วกว่าน้ำค่ะ"
2003002-52 = "ดูเหมือนยี่ห้อนี้จะใช้น้ำตาลสังเคราะห์แทนน้ำตาลแท้ ดื่มแล้วจะไม่รู้สึกเหนียวเหนอะในปากค่ะ"
2003002-53 = "โอ้... ขอบคุณมาก!"
2003002-57 = "(ดื่มเครื่องดื่ม) อึกๆๆๆ...."
2003002-58 = "ฮู่ว... สดชื่นดีจัง! รอดตายแล้วเรา!"
2003002-60 = "ฮือออ... จู่ๆ ก็รู้สึกเวียนหัวจัง...!"
2003002-61 = "เวียนหัวแล้วก็รู้สึกหนาวๆ... มือสั่นๆ... รู้สึกเหมือนจะวูบๆ ด้วย..."
2003002-66 = "นี่มัน...! อาการช็อกจากภาวะน้ำตาลในเลือดต่ำสินะคะ"
2003002-67 = "ถ้าปล่อยไว้แบบนี้จะทำให้เกิดความเสียหายต่อสมองได้ ต้องรีบรักษาอย่างเร่งด่วนค่ะ!"
2003002-72 = "นี่ค่ะ น้ำตาลกลูโคสกับน้ำค่ะ ดื่มน้ำให้น้ำตาลละลายในปากแล้วค่อยกลืนนะคะ"
2003002-77 = "ฮู่ว... เฮ้อ... รู้สึกดีขึ้นเยอะเลย มือก็หยุดสั่นแล้ว..."
2003002-84 = "[ns1] \"สุดยอดเลย... ฮารุนะ!\"\n[ns2] \"ฮารุนะก็มีด้านแบบนี้ด้วยเหรอเนี่ย...!\""
2003002-87 = "ในฐานะผู้ที่แสวงหาอาหารรสเลิศ... เรื่องแค่นี้ต้องทำได้อยู่แล้วสิคะ"
2003002-88 = "ตอนนี้ก็ปฐมพยาบาลให้กับนักเรียนทุกคนเรียบร้อยแล้วค่ะ"
2003002-89 = "[s3] \"นั่นสิ ในฐานะกรรมการก็ช่วยได้เยอะเลยนะ\"\n[s4] \"ได้คำขอบคุณมาเยอะเลย\""
2003002-92 = "ฮุฮุฮุ..."
2003002-93 = "ถ้างั้นตอนนี้ ในที่สุด... ฉันก็ไปค้นหาอาหารรสเลิศที่แท้จริงของงานมหกรรมแข่งขันกีฬากับคุณครูได้#nแล้วสินะคะ"
2003002-97 = "[ns] \"หรือว่า... ที่มาช่วยเพราะมีเป้าหมายแบบนั้นตั้งแต่แรก?\""
2003002-98 = "ยังไงเหรอคะ คุณครู?"
2003002-99 = "แต่ถึงจะเป็นการทำเพราะหวังผล แต่การช่วยเหลือก็คือการช่วยเหลือไม่ใช่เหรอคะ?"
2003002-100 = "และฉันก็ไม่ได้รู้สึกอายกับสิ่งที่ตัวเองทำลงไปเลยค่ะ"
2003002-101 = "[s5] \"ครูไม่ได้บ่นอะไรสักหน่อย\"\n[s6] \"สิ่งที่ฮารุนะทำ มันก็จำเป็นจริงๆ ละนะ\""
2003002-104 = "ดีใจจังเลยค่ะที่คุณครูทราบ"
2003002-105 = "[s] \"ว่าแต่ว่า...ฮารุนะอยากจะทำอะไรเหรอ?\""
2003002-106 = "มันก็แน่อยู่แล้วนี่คะ"
2003002-107 = "เราจะตระเวนชิมอาหารเลิศรสกันค่ะ เริ่มจากร้านค้าแผงลอยก่อนเลย"
2003002-108 = "งานมหกรรมแข่งขันกีฬาเองก็เหมือนกับงานเทศกาลอาหารที่เราจะเพลิดเพลินกับอาหารหลายๆ อย่างที่หาชิมกันไม่ได้ง่ายๆ ในช่วงเวลาทั่วไปค่ะ"
2003002-109 = "วันนี้... ฉันใช้เวลาส่วนใหญ่ไปกับคุณครูแล้ว เพราะงั้นคุณครูก็ต้องยกเวลาที่เหลือทั้งหมดให้ฉันนะคะ"
2003002-110 = "คงจะตกลงใช่มั้ยคะ คุณครู?"
2003002-114 = "[ns7] \"เป็นแบบนี้แล้วก็ช่วยไม่ได้นะ\"\n[ns8] \"ครูให้ฮารุนะแนะนำร้านแผงลอยได้ใช่มั้ย?\""
2003002-117 = "แน่นอนอยู่แล้วค่ะ ฉันวางแผนไว้เรียบร้อยแล้วว่าจะไปที่ไหน แล้วก็จะเริ่มจากการชิมอะไรก่อนด้วยค่ะ"
2003002-118 = "วันนี้คุณครู... จะมาร่วมรักษาเกียรติของชมรมชิมอาหารด้วยกันใช่มั้ยคะ?"
2003002-119 = "[s] \"ขอรบกวนด้วยนะ คุณหัวหน้า\""
2003002-124 = "(หลังจากนั้นคุณครูก็เดินไปชิมอาหารที่ร้านแผงลอยต่างๆ จนอิ่มสุดๆ...)"

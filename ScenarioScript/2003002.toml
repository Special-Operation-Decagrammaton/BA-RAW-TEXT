[translation]
2003002-1 = "I Can Help"
2003002-3 = "Here, here! We have a contestant with sunstroke symptoms!"
2003002-4 = "[s] \"Sunstroke... If you have sunstroke...!\""
2003002-5 = "First, wet her palms with cold water, and here's a washcloth to put on her neck!"
2003002-6 = "[s] \"Okay!\""
2003002-11 = "You look busy, Sensei."
2003002-12 = "[s] \"Hi. Haruna.\""
2003002-13 = "Yes. Hello. And what are you doing?"
2003002-14 = "[s] \"As you can see, I'm helping in the medical tent.\""
2003002-15 = "But you're not a medical staff member, right?"
2003002-16 = "[s] \"I'm not, but they were short-handed.\""
2003002-20 = "..."
2003002-21 = "Understood. It seems my schedule will have to be more flexible today."
2003002-25 = "[ns] \"Huh? What does that mean?\""
2003002-30 = "I will assist you in completing your work."
2003002-31 = "[s] \"...Come again?\""
2003002-34 = "Ugh... I'm in trouble. My stomach hurts... I ate too fast..."
2003002-35 = "I won't be able to participate in this afternoon's game like this..."
2003002-36 = "Plums are said to aid in digestion."
2003002-40 = "This is plum tea. Here you go. It's been brewed with a bit of a kick, so hopefully it works."
2003002-41 = "Th-Thanks...!"
2003002-45 = "Oh!"
2003002-46 = "It's already feeling better! I'll be ready for the game in no time!"
2003002-48 = "*pant* *pant*"
2003002-49 = "That last race took a lot out of me."
2003002-51 = "Here you go. This sports drink will hydrate you faster than just water."
2003002-52 = "It's made with a sweetener instead of sugar, so there's no sticky aftertaste."
2003002-53 = "Uh... Thanks!"
2003002-57 = "*gulp* *gulp* *gulp*"
2003002-58 = "Phew, that's refreshing! I'm much better now!"
2003002-60 = "Ooooh... I suddenly got dizzy...!"
2003002-61 = "My head hurts and I'm cold... My hands are trembling... It feels like my consciousness is fading away..."
2003002-66 = "This is...! You're in hypoglycemic shock."
2003002-67 = "If left alone, it can cause brain damage. We need to act fast!"
2003002-72 = "Okay, here's some candy and water. Let it melt in your mouth until you feel better."
2003002-77 = "Phew... Haa... Much better. My hand has stopped trembling, too."
2003002-84 = "[ns1] \"Amazing... Haruna!\"\n[ns2] \"I didn't know you had this talent, Haruna!\""
2003002-87 = "I am a foodie. This should come as no surprise."
2003002-88 = "I believe that clears out all the students who required emergency aid."
2003002-89 = "[s3] \"That's all! You were a huge help.\"\n[s4] \"They said to tell you thank you.\" "
2003002-92 = "Heehee..."
2003002-93 = "So, at last, we can finally explore the gastronomy of this field day."
2003002-97 = "[ns] \"Is this the whole reason you helped me?\""
2003002-98 = "I wonder..."
2003002-99 = "But selfish motives don't change the deed, do they, Sensei?"
2003002-100 = "At least, I'm not the least bit ashamed of my behavior."
2003002-101 = "[s5] \"Oh, well. I'm not complaining.\"\n[s6] \"As long as good came out of it!\""
2003002-104 = "I'm glad you agree, too."
2003002-105 = "[s] \"In that case, what do you want to do?\""
2003002-106 = "Isn't it obvious?"
2003002-107 = "I am taking you on a gastronomic tour, starting with the street stalls."
2003002-108 = "A field day is a gastronomic festival, where you can enjoy a variety of foods you wouldn't normally be able to. All in one place!"
2003002-109 = "Today, I've given you half of my time, so I'll take half of yours."
2003002-110 = "I'm sure that's amenable to you, Sensei?"
2003002-114 = "[ns7] \"If that's how it is, I can't say no!\"\n[ns8] \"Please lead the way, gastro-tour guide!\""
2003002-117 = "I've already mapped out where to start, what to taste, and the route."
2003002-118 = "For today, you're also an honorary advisor for the Gourmet Research Society, Sensei!"
2003002-119 = "[s] \"I'm in your care, President.\""
2003002-124 = "Haruna and I wandered around the stalls, sampling food until our stomachs were full..."

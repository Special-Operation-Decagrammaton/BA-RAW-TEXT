[translation]
2300806-1 = "我的願望"
2300806-2 = "（瑪麗指定的地點是三一的某個射擊場）"
2300806-3 = "（在廣闊的空間裡幾乎是鴉雀無聲，反而顯得比大教堂和圖書館更寂靜）"
2300806-4 = "……感謝您願意過來，老師。"
2300806-9 = "突然聯絡您，非常不好意思。"
2300806-10 = "那個，雖然也不是多嚴重的事情……"
2300806-11 = "[s1] 「別在意。話說回來，這裡是……？」\n[s2] 「瑪麗在射擊場……總覺得很少見呢？」"
2300806-12 = "啊，這裡是，那個……"
2300806-13 = "啊，這裡是，那個……"
2300806-14 = "我想跟老師說的話，其實和射擊或槍之類的沒有關係……#n只是因為很安靜所以才會來這裡的。"
2300806-15 = "如您所見，這裡平常沒什麼人，所以相當安靜。是能讓人專心祈禱的地方。"
2300806-16 = "某些時候，這邊甚至比大教堂和懺悔室都還安靜。"
2300806-17 = "所以有煩惱或是想祈禱的時候，偶爾會來這裡。"
2300806-18 = "難，難道很，很奇怪嗎……？"
2300806-19 = "[s3] 「不會呀，一點也不奇怪。」\n[s4] 「聽妳這麼一說就能理解了，總覺得很適合呢。」"
2300806-20 = "謝，謝謝您。"
2300806-21 = "謝，謝謝您。"
2300806-22 = "其實我本來完全不知道這個地方……"
2300806-23 = "只是，時常會聽說這裡是「其他修女們也會去的地方」……"
2300806-28 = "實際到了這裡之後才發現，這股寂靜的氛圍……"
2300806-29 = "想要冷靜下來，或是想要自我反省的時候，這裡就非常適合。"
2300806-30 = "除此之外，也很適合自我鼓勵或是消除雜念……"
2300806-31 = "雜念……"
2300806-35 = "[ns] 「……瑪麗？」"
2300806-36 = "那，那個……"
2300806-37 = "其實，就連上次休息的時候我也一直在煩惱……"
2300806-38 = "就算和其他修女們請教，她們也都說「不管是誰都會有這種時期」……"
2300806-39 = "但我還是非常困擾……覺得這樣真的可以嗎？#n是不是自己自我管理沒做好呢？之類的……"
2300806-40 = "但是卻收到「為他人奉獻的心固然很重要，但有時為自己著想也很重要」的回答……"
2300806-41 = "所以，我試著去思考。"
2300806-42 = "直到剛才，我也在這裡一邊祈禱一邊思考……於是我想通了。"
2300806-43 = "但是連我自己都，該說是沒有想到呢？還是說不知道該怎麼做才好呢……？"
2300806-45 = "……起。"
2300806-46 = "[s5] 「……起？」\n[s6] 「……？」"
2300806-47 = "和老師，一起……"
2300806-48 = "和老師，一起……"
2300806-49 = "那個……偶爾，真的偶爾就行……"
2300806-50 = "像那個時候一樣，和我，那個……"
2300806-51 = "一起……"
2300806-52 = "想要一起……度過一些時間……就算不特別做些什麼也沒關係……"
2300806-53 = "之前您來的時候……我，怎麼說呢……我真的，非常開心。"
2300806-54 = "當，當然。我自己也很清楚，這樣的感情不是修女該有的。"
2300806-55 = "希望被別人照顧，希望有人陪伴，希望有人在自己身邊……"
2300806-56 = "這樣的心情，和應該為了他人而行動的修女之道，可以說是完全背道而馳。"
2300806-57 = "這點我也非常清楚，但是……"
2300806-58 = "……？"
2300806-59 = "您很樂意……？"
2300806-60 = "這，這麼輕易就……？"
2300806-61 = "真的，可以嗎……？"
2300806-62 = "[s7] 「當然，而且畢竟我們是學生與老師。」\n[s8] 「不需要24小時都當修女也沒關係，不是嗎？」"
2300806-63 = "……！"
2300806-64 = "……！"
2300806-65 = "老師……"
2300806-69 = "……呵呵。或許是我想太多了呢。"
2300806-70 = "嗯，那麼……我想成為優秀的修女這個想法，將來也不會改變……"
2300806-71 = "不過今後我也想以學生的身分面對老師。"
2300806-72 = "這麼說來，我自己也忘記要對老師「說」這件事了呢……#n明明我一直以來都對老師說著「請務必要跟我說」……"
2300806-73 = "像這樣聊天，分享彼此的心情，覺得心情快樂多了呢。"
2300806-79 = "……真的非常感謝您。"
2300806-80 = "那麼今後也，"
2300806-81 = "請您多多指教了，老師。"
2300806-85 = "……請原諒愛撒嬌的我哦？"
2300806-87 = "（之後和瑪麗一起互相祈禱後，回到了夏萊）"

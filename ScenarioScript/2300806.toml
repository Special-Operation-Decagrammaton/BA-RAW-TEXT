2300806-28 = "3;마리;99;그렇게 찾아와 보니, 과연 이 적막……. 이 고요함…….\n#3;em;…"
2300806-29 = "3;마리;01;마음을 다스리시거나 잡념을 없애고 싶으실 때……. 스스로의 일을 반성하고 혹은 격려하고플 때……."
2300806-30 = "3;마리;01;잡념을 잊고 싶을 때……. 정말로 좋은 공간이더라고요."
2300806-31 = "3;마리;99;……잡념……."

2300806-8 = "3;마리;00\n#3;a\n#wait;1200"
2300806-9 = "3;마리;03;기다리고 있었답니다. 갑자기 연락 드려서 부담스럽진 않으셨을까 걱정했거든요.\n#3;greeting\n#3;em;[반짝]"
2300806-10 = "3;마리;01;……사실 딱히 대단한 이유가 있는 것도 아니라서 더욱……."
2300806-11 = "[s1] \"괜찮긴 한데……. 여기는……?\"\n[s2] \"마리가 사격장에……?\""
2300806-12 = "3;마리;04;……아……. 죄송해요. 역시 갑작스러우셨군요.\n#3;em;[땀]\n#3;stiff"
2300806-13 = "3;마리;04;……아……. 죄송해요. 역시 갑작스러우셨군요.\n#3;em;[땀]\n#3;stiff"
2300806-14 = "3;마리;01;딱히 총과 관련돼서 온 건 아니에요. 그냥……. 조용한 곳이라 왔던 것뿐."
2300806-15 = "3;마리;01;보시다시피 아무도 없이 적막만이 가득한 곳이라, 자신의 기도에도 집중할 수 있거든요."
2300806-16 = "3;마리;99;지금 같을 땐 성당 안이나……. 참회실보다도 더 고요함을 지킬 수 있는 곳.\n#3;em;…"
2300806-17 = "3;마리;01;그래서 고민이 있거나, 스스로 기도를 드리고 싶을 때엔 오히려 이곳으로 오기도 해요."
2300806-18 = "3;마리;04;으음……. 역시 이상한가요? 시스터가 이런 사격장을 찾는 건…….\n#3;stiff"
2300806-19 = "[s3] \"아니. 전혀 안 이상해.\"\n[s4] \"듣고 보니 오히려 마리답다고 생각해.\""
2300806-20 = "3;마리;08;휴우……. 감사합니다. 혹시나 이상한 오해를 받을까 봐 걱정했어요.\n#3;em;[땀]"
2300806-21 = "3;마리;08;휴우……. 감사합니다. 혹시나 이상한 오해를 받을까 봐 걱정했어요.\n#3;em;[땀]"
2300806-22 = "3;마리;08;……사실 저도 처음엔 이런 곳이 있는 줄 몰랐거든요."
2300806-23 = "3;마리;99;그저 '가끔 다른 시스터분들도 찾아오시는 곳'이라고만 들어서……. 따라하는 느낌으로 찾아와 봤었죠."

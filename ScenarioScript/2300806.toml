[translation]
2300806-1 = "#title;자신이 바라는 것"
2300806-2 = "#na;(마리의 안내를 따라 찾아온 약속 장소는 트리니티의 어느 한적한 사격장이었다.)"
2300806-3 = "#na;(넓은 공간에 사람 한 명 없던 그곳은 오히려 성당이나 도서관 이상으로 고요했다.)"
2300806-4 = "#na;마리;……오셨군요, 선생님."

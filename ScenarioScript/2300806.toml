[translation]
2300806-1 = "สิ่งที่ตัวเองคาดหวัง"
2300806-2 = "(คุณครูมาที่สถานที่นัดพบกับมารี และเมื่อมาตามที่มารีบอกก็พบว่าเป็นสนามยิงปืนที่เงียบสงบ#nแห่งหนึ่งในทรีนิตี้)"
2300806-3 = "(สถานที่กว้างใหญ่ที่ไม่มีใครอยู่เลยแม้แต่คนเดียวนั้นเงียบสงบกว่าวิหารหรือห้องสมุดเสียอีก)"
2300806-4 = "มาแล้วเหรอคะคุณครู..."
2300806-9 = "ฉันกำลังรออยู่เลยค่ะ กำลังกังวลอยู่เลยค่ะว่าคุณครูจะลำบากใจหรือเปล่าที่ฉันติดต่อไปกะทันหัน#nแบบนี้"
2300806-10 = "ที่จริงมันไม่ใช่เหตุผลอะไรที่ยิ่งใหญ่ เลยทำให้ฉันยิ่งกังวล..."
2300806-11 = "[s1] \"ที่นี่น่ะ... โอเคเลยนะ...?\"\n[s2] \"มารีมาสนามซ้อมยิงปืน...?\""
2300806-12 = "อ่า... ขอโทษค่ะ มันคงกะทันหันไปสินะคะ"
2300806-13 = "อ่า... ขอโทษค่ะ มันคงกะทันหันไปสินะคะ"
2300806-14 = "แต่ว่าฉันไม่ได้มาที่นี่เพราะเรื่องยิงปืนหรอกค่ะ ก็แค่... มาที่นี่เพราะมันเงียบดีน่ะค่ะ"
2300806-15 = "อย่างที่เห็น สถานที่แห่งนี้เงียบสงบและไม่มีผู้คนเลย เพราะอย่างนั้นฉันก็เลยสามารถตั้งสมาธิ#nอยู่กับการสวดอธิษฐานได้ค่ะ"
2300806-16 = "ตอนนี้ที่นี่... อาจจะเงียบสงบกว่าในวิหารหรือในห้องสารภาพบาปก็ได้ค่ะ"
2300806-17 = "เพราะงั้นเวลาที่มีเรื่องกังวลหรือต้องการอธิษฐานเอง ฉันก็มักจะมาที่นี่ค่ะ"
2300806-18 = "อืม... มันแปลกรึเปล่าคะ? การที่ซิสเตอร์มาที่สนามซ้อมยิงปืนแบบนี้..."
2300806-19 = "[s3] \"ไม่นะ ไม่เห็นจะแปลกเลย\"\n[s4] \"ฟังที่เธอพูดแล้ว ครูคิดว่าสมกับเป็นมารีดีนะ\""
2300806-20 = "ฮู่ว... ขอบคุณนะคะ ฉันกังวลว่าจะถูกเข้าใจผิดอะไรแปลกๆ อยู่เลยละค่ะ"
2300806-21 = "ฮู่ว... ขอบคุณนะคะ ฉันกังวลว่าจะถูกเข้าใจผิดอะไรแปลกๆ อยู่เลยละค่ะ"
2300806-22 = "อันที่จริง ตอนแรกฉันก็ไม่รู้ด้วยซ้ำว่ามีสถานที่แบบนี้อยู่ด้วยค่ะ"
2300806-23 = "ฉันแค่ได้ยินมาว่า \"เป็นสถานที่ที่ซิสเตอร์บางคนมาเป็นครั้งคราว\" ก็เลยลองมาที่นี่ดูค่ะ"
2300806-28 = "แต่ว่าพอมาแล้ว ความเงียบ... ความสงบแบบนี้..."
2300806-29 = "ในตอนที่อยากจะสงบจิตใจหรือเรียบเรียงความคิด... ตอนที่อยากคิดทบทวนเรื่องราวที่เกิดขึ้น#nหรือให้กำลังใจตัวเอง..."
2300806-30 = "ตอนที่อยากจะลืมเรื่องวุ่นวายในใจ... ที่นี่เป็นสถานที่ที่เหมาะมากเลยล่ะค่ะ"
2300806-31 = "เรื่องวุ่นวายในใจ..."
2300806-35 = "[ns] \"มารี...\""
2300806-36 = "เอ่อ..."
2300806-37 = "ที่จริงแล้ว... เมื่อคราวก่อนฉันหยุดพักไป เลยได้รับคำแนะนำหลังจากครุ่นคิดอยู่คนเดียวมานานค่ะ"
2300806-38 = "ซิสเตอร์คนอื่นๆ พูดปลอบใจฉันและบอกว่ามันเป็นเรื่องที่เกิดขึ้นกับคนอื่นๆ เหมือนกันแต่ว่า..."
2300806-39 = "ฉันหวังว่ามันจะไม่เกิดขึ้นอีกค่ะ จะเรียกว่ามันเป็นการจัดการตัวเองอย่างหนึ่งรึเปล่านะ..."
2300806-40 = "และพวกเธอยังบอกว่า \"การมีจิตใจที่อยากทำงานอาสาอยู่ตลอดถือเป็นสิ่งดีก็จริง แต่บางครั้ง#nการทำตามสิ่งที่ตัวเองต้องการบ้างก็จำเป็น\" ด้วยค่ะ..."
2300806-41 = "เพราะงั้นฉันเลยคิดขึ้นมา... ว่าสิ่งที่ฉันอยากทำคืออะไร"
2300806-42 = "วันนี้ฉันก็มาที่นี่เพื่ออธิษฐานและเรียบเรียงความคิดของตัวเองเหมือนกันค่ะ แล้วฉันก็คิดขึ้นมาได้"
2300806-43 = "แต่ว่าสิ่งที่ฉันคิดขึ้นมาได้มันเป็นเรื่องที่คาดไม่ถึงมาก่อน... ฉันเลยไม่รู้ว่าจะทำยังไงดี..."
2300806-45 = "คุณ..."
2300806-46 = "[s5] \"คุณ...?\"\n[s6] \"มารี...?\""
2300806-47 = "คุณครูคะ..."
2300806-48 = "คุณครูคะ..."
2300806-49 = "คือ... แค่บางครั้ง... แค่นานๆ ครั้งก็ได้นะคะ..."
2300806-50 = "ถ้าคุณครู... จะช่วย... คือ..."
2300806-51 = "สละ..."
2300806-52 = "เวลา... ให้ฉันเหมือนคราวที่แล้ว... ได้รึเปล่าคะ...? ไม่ต้องทำอะไรที่พิเศษก็ได้ค่ะ..."
2300806-53 = "ครั้งที่แล้วที่คุณครูมา มันอาจแสดงออกให้เห็นได้ยากนิดหน่อยแต่ว่า... ฉันมีความสุขมากเลยนะคะ"
2300806-54 = "นะ...แน่นอนฉันรู้ดีค่ะ ว่าการพูดแบบนี้มันคงไม่สมกับเป็นซิสเตอร์เอาซะเลย..."
2300806-55 = "ทั้งเรื่องการขอให้คนอื่นมาดูแล และขอให้มาเป็นเพื่อนในบางครั้งแบบนี้..."
2300806-56 = "ฉันทราบดีค่ะว่ามันไม่ได้เกี่ยวข้องอะไรกับเส้นทางในการเป็นซิสเตอร์ที่ต้องการช่วยเหลือผู้อื่นเลย"
2300806-57 = "ถึงจะรู้อยู่แล้วแต่ว่ามัน... เรื่องนั้น..."
2300806-58 = "คะ...?"
2300806-59 = "ไม่เป็นไรงั้นเหรอคะ?"
2300806-60 = "อ่า... สั้นๆ ง่ายๆ แบบนี้เลย...?"
2300806-61 = "ไม่เป็นไรจริงๆ เหรอคะ...?"
2300806-62 = "[s7] \"ไม่เป็นไรหรอก เธอเป็นนักเรียนของครูนี่นา\"\n[s8] \"ครูคิดว่าโลกไม่ได้ต้องการซิสเตอร์ 24 ชั่วโมงหรอกนะ\""
2300806-63 = "...!"
2300806-64 = "...!"
2300806-65 = "คุณครู..."
2300806-69 = "ฮุฮุฮุ... บางทีฉันอาจจะคิดมากเกินไปเองก็ได้ค่ะ"
2300806-70 = "ถึงฉันจะอยากเป็นซิสเตอร์ผู้น่ายกย่องก็ตาม... แต่ก็ยังเป็นแค่นักเรียนคนหนึ่งสินะคะ"
2300806-71 = "เพราะว่าฉันเป็นนักเรียน..."
2300806-72 = "แล้วคุณครูก็เป็นคุณครู... เพราะงั้นถึงเอาแต่ใจทำตัวเด็กๆ แบบนี้ได้บ้างในบางครั้ง"
2300806-73 = "คือ... นั่นสินะคะ จู่ๆ ก็รู้สึกโล่งใจขึ้นมาเยอะเลยค่ะ"
2300806-79 = "ขอบคุณมากเลยนะคะคุณครู"
2300806-80 = "ถ้างั้นต่อจากนี้ไป... ก็ขอรบกวนด้วยนะคะ"
2300806-81 = "ในฐานะคุณครู..."
2300806-85 = "ช่วยอดทนกับความเอาแต่ใจของนักเรียนคนนี้หน่อยนะคะ"
2300806-87 = "(หลังจากที่ใช้เวลาอธิษฐานร่วมกับมารีแล้ว คุณครูก็กลับไปที่ชาเล่ต์)"

2300806-36 = "3;마리;04;……그…….\n#3;m3\n#3;em;[땀]"
2300806-37 = "3;마리;04;……실은……. 저번에 쉬었던 일도 있고 해서, 나름대로 고민 끝에 상담을 좀 받아봤어요."
2300806-38 = "3;마리;99;가끔씩 그러는 건 누구라도 그럴 수 있다면서, 다른 시스터분들께선 좋게 말씀해 주셨지만……."
2300806-39 = "3;마리;01;그래도 저는 그런 일이 또 일어나지는 않길 바랐거든요. 일종의 자기 관리에 대한 이야기랄까…….\n#3;em;[반응]"
2300806-40 = "3;마리;01;그랬더니 '늘 봉사하는 마음을 가지는 것도 좋지만, 가끔은 스스로 하고 싶은 걸 챙기는 것도 필요하다'라고 하셔서……."
2300806-41 = "3;마리;99;그래서 조금 생각해 봤어요. 제가 하고 싶은 것이 뭔지를."
2300806-42 = "3;마리;01;오늘도, 방금 전까지도 이곳에서 기도하며 생각을 정리하고 있었어요. 그리고 떠올렸어요."
2300806-43 = "3;마리;99;그치만 그 떠오른 게 너무 생각지도 못했던 것이어서……. 어떻게 해야 할지……."

[translation]
2300806-1 = "What You Want"
2300806-2 = "(I followed Mari's instructions and arrived at the meeting spot, a secluded shooting range in Trinity.)"
2300806-3 = "(It was a vast, sprawling area without a single soul in sight, even quieter than the cathedral.)"
2300806-4 = "You're here, Sensei."
2300806-9 = "I've been waiting for you. I was worried I may have pressured you with my sudden call."
2300806-10 = "And it wasn't even for anything important..."
2300806-11 = "[s1] \"It's fine, but why here...?\"\n[s2] \"Mari, at the shooting range...?\""
2300806-12 = "Oh... I'm sorry. I suppose this was sudden after all."
2300806-13 = "Oh... I'm sorry. I suppose this was sudden after all."
2300806-14 = "I didn't come here because of the guns exactly. It's just quiet here. That's all."
2300806-15 = "Since this place is full of silence and empty of people, I can focus on my prayers."
2300806-16 = "At times like these the range can be quieter even than the cathedral or the confessional."
2300806-17 = "So when I'm troubled or want to pray by myself, I visit here."
2300806-18 = "Hmm. Am I weird after all? For a Sister to come to a shooting range like this..."
2300806-19 = "[s3] \"No. It's not weird at all.\"\n[s4] \"When you explain it like that, it does sound like you.\""
2300806-20 = "Thank you. I was worried you might misunderstand me."
2300806-21 = "Thank you. I was worried you might misunderstand me."
2300806-22 = "Honestly, I didn't even know this existed at first."
2300806-23 = "I just heard it was a place that other Sisters occasionally go to... So I came here to emulate them."
2300806-28 = "I found myself entranced by the solitude, the deep silence..."
2300806-29 = "When you want to clear your head of idle thoughts... Perhaps seeking self-reflection or encouragement..."
2300806-30 = "When you want to forget the things that trouble your mind... I find answers here."
2300806-31 = "...Forget."
2300806-35 = "[ns] \"...Mari?\""
2300806-36 = "Well..."
2300806-37 = "To be honest, after I took that day off, I decided to seek some guidance."
2300806-38 = "The other Sisters kindly told me it's a natural thing, but..."
2300806-39 = "I don't want it to happen again. I guess it's a matter of self-management in a way..."
2300806-40 = "Then they said, \"It's good to always have a heart for service, but it's also important to take the time to do what you want every once in a while.\""
2300806-41 = "So I thought about it. What it was that I wanted to do."
2300806-42 = "So I came here, to pray and organize my thoughts. Then it came to me."
2300806-43 = "But what came to mind was unexpected. I'm a little confused."
2300806-45 = "Sen..."
2300806-46 = "[s5] \"...Sen?\"\n[s6] \"...Mari?\""
2300806-47 = "...Sensei."
2300806-48 = "...Sensei."
2300806-49 = "Um. Once in a while... It doesn't have to be often..."
2300806-50 = "I-If it's not too much trouble..."
2300806-51 = "...E..."
2300806-52 = "Could I...borrow some of your time again? You don't have to do anything in particular."
2300806-53 = "I don't know how to say it but...when you helped me, it brought me so much joy... and, um..."
2300806-54 = "O-Of course I understand. Talk like this is unbecoming of a Sister..."
2300806-55 = "Asking others to take care of me or spend time with me..."
2300806-56 = "I know it goes against my duty of taking care of others."
2300806-57 = "I know that, but still..."
2300806-58 = "Huh?"
2300806-59 = "Y-You don't mind?"
2300806-60 = "How could you say that so easily?!"
2300806-61 = "Are you really okay with that?"
2300806-62 = "[s7] \"Like I said, we're teacher and student.\"\n[s8] \"I don't think it's necessary to do Sister work 24 hours a day.\""
2300806-63 = "...!"
2300806-64 = "...!"
2300806-65 = "...Sensei."
2300806-69 = "Heehee. Maybe I was thinking too seriously about this."
2300806-70 = "I do want to become an excellent Sister, but at the same time, I'm also a student."
2300806-71 = "Since I'm a student..."
2300806-72 = "...and you're a teacher, maybe it's okay for me to be a little childish with you."
2300806-73 = "Strange. I suddenly feel so refreshed."
2300806-79 = "Thank you so much, Sensei."
2300806-80 = "Then, going forward, I wish the best of luck..."
2300806-81 = "to the teacher..."
2300806-85 = "who will have to deal with a childish student like me."
2300806-87 = "(Afterward, I prayed with Mari before returning to Schale.)"

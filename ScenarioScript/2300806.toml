2300806-49 = "3;마리;02;그……. 가끔……. 아주 어쩌다가 한 번의 가끔이어도 좋으니…….\n#3;em;…"
2300806-50 = "3;마리;02;저번처럼……. 저에게……. 그……."
2300806-51 = "3;마리;08;……시…….\n#3;stiff"
2300806-52 = "3;마리;07;시간을……. 내 주실 수……. 없을까요……? 특별히 아무것도 하지 않으셔도 좋으니…….\n#3;em;[///]"
2300806-53 = "3;마리;07;저번에 와 주셨을 때……. 뭔가 표현하긴 어렵지만……. 굉장히 기뻤거든요. 저……."
2300806-54 = "3;마리;04;무, 물론 알고 있어요. 이런 거, 시스터답지 않은 이야기라는 것도…….\n#3;em;[땀]\n#3;stiff"
2300806-55 = "3;마리;04;다른 사람에게 돌봐 달라고 하는 것도, 가끔 어울려 달라고 하는 것도……."
2300806-56 = "3;마리;08;다른 사람을 보살펴야 하는 시스터의 길과는 전혀 상관없다는 건 알고 있어요."
2300806-57 = "3;마리;08;알고 있지만……. 그게……."

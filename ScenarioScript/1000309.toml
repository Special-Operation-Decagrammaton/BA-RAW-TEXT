[translation]
1000309-1 = "突擊握手會"
1000309-2 = "奇普托斯．公共圓形劇場前"
1000309-3 = "這樣一來必須的物品都買好了，我看看……"
1000309-5 = "咦？聚集了好多人呢。是在舉辦什麼活動嗎？"
1000309-6 = "啊！好厲害呀，老師！請看那邊！是佩洛洛大人！"
1000309-7 = "還有波浪貓和粉紅波卡……！好像在舉辦什麼表演呢！"
1000309-8 = "竟然在這種地方有Momo好友的表演……"
1000309-9 = "老，老師！難得都來到這裡了，回去之前稍微去看一下可以嗎？"
1000309-10 = "[s] 「可以唷。」"
1000309-11 = "謝謝你，老師！"
1000309-12 = "啊，老師請看那邊！#n被壞人洗腦的憤怒阿德利正要攻擊佩洛洛大人！"
1000309-13 = "佩洛洛大人請小心啊！"
1000309-15 = "呼……劇情真棒呢！"
1000309-16 = "佩洛洛大人把壞人「呸囉呸囉」地舔倒的時候，我都不禁手心冒汗了呢！"
1000309-17 = "竟然能這麼近距離的看見佩洛洛大人……今天運氣真好！"
1000309-20 = "咦……？還有什麼活動嗎？"
1000309-21 = "之後想跟佩洛洛握手的客人請到前方排隊！"
1000309-22 = "和佩洛洛大人握手……！"
1000309-23 = "能摸到那軟綿綿的翅膀的話……一定很舒服吧……"
1000309-24 = "[s] 「要去排隊嗎？」"
1000309-25 = "啊哈哈……雖然我也很想這麼做，但是要去的話好像有點……"
1000309-26 = "在排隊的也幾乎都是小朋友，我這個年紀還過去的話，總覺得好像會破壞氣氛……"
1000309-27 = "今天能看到表演就已經很滿足了。"
1000309-28 = "[s] 「真心喜歡的話。年齡什麼的不是問題吧？」"
1000309-29 = "真心，喜歡的話……！"
1000309-30 = "確，確實……或許是我對佩洛洛大人的愛還不夠吧……"
1000309-32 = "老師，我們趕快去排隊吧！"
1000309-33 = "[s] 「我也去？」"
1000309-34 = "當然囉！能跟佩洛洛大人握手的機會可不是每次都有喔！"
1000309-35 = "肯定是軟綿綿又散發著香味的！"
1000309-37 = "（於是就跟日步美一起排隊，和佩洛洛握了手）"
1000309-38 = "（……從佩洛洛的翅膀上傳來了炸雞的香味……）"

[translation]
1000309-1 = "Guerrilla Meet and Greet"
1000309-2 = "In Front of Kivotos Arena"
1000309-3 = "I bought everything we need. Let's see..."
1000309-5 = "Hmm? What's with that big crowd over there?"
1000309-6 = "Sensei, look over there! It's Peroro!"
1000309-7 = "And Wavecat and Pinky-Paca too! I think they're doing a puppet show!"
1000309-8 = "I never thought I'd see a Momo Friends puppet show in a place like this..."
1000309-9 = "S-Sensei! Can we watch the show before we leave?"
1000309-10 = "[s] \"Fine with me.\""
1000309-11 = "You're the best, Sensei!"
1000309-12 = "Sensei, look at that! The bad guy brainwashed Angry Adelie and they're about to attack Peroro!"
1000309-13 = "Look out, Peroro!"
1000309-15 = "*sigh* That was amazing!"
1000309-16 = "My palms were all sweaty when Peroro took down the bad guy with his signature licks and catchphrase. \"Peropero!\""
1000309-17 = "I got to see Peroro live and in the feathers... This is the luckiest day of my life!"
1000309-20 = "Wait a minute... Are they going to do an encore or something?"
1000309-21 = "The line for the Peroro meet and greet starts here!"
1000309-22 = "A chance to meet THE Peroro!"
1000309-23 = "I could reach out and touch those fluffy wings myself..."
1000309-24 = "[s] \"Why not get in line?\""
1000309-25 = "Ahaha... That sounds fun, but I'd feel so awkward."
1000309-26 = "Almost everyone in line is a little kid. Someone my age getting in line would look like a weirdo..."
1000309-27 = "Seeing the puppet show was enough for me."
1000309-28 = "[s] \"If Peroro is your one true love, then who cares what people think?\""
1000309-29 = "True love...!"
1000309-30 = "You have a point. I feel like I'd be betraying Peroro if I didn't go."
1000309-32 = "Let's go stand in line, Sensei!"
1000309-33 = "[s] \"You want me to come too?\""
1000309-34 = "Of course! It's not every day you get the opportunity to meet Peroro!"
1000309-35 = "I promise he'll be fluffy and smell great!"
1000309-37 = "I stood in line with Hifumi and shook hands with the Peroro puppet."
1000309-38 = "For some reason, the puppet's wings smelled like savory chicken..."

[translation]
1000309-1 = "#title;게릴라 악수회"
1000309-2 = "#place;키보토스 공용 아레나 앞"
1000309-3 = "3;히후미;01;준비한 물건은 모두 구입했고, 어디 보자…….\n#3;em;…\n#3;a"
1000309-4 = "#wait;1500"
1000309-5 = "3;히후미;02;어라? 사람들이 모여 있네요. 무슨 일이라도 있는 걸까요?\n#3;em;[?]"
1000309-6 = "3;히후미;00;어머나, 선생님! 저기 보세요! 페로로 님이에요!\n#3;hophop\n#3;m1"
1000309-7 = "3;히후미;00;웨이브캣과 핑키파카 씨까지……! 인형극을 하고 있나봐요!\n#3;em;[반응]"
1000309-8 = "3;히후미;05;이런 곳에서 모모프렌즈 인형극을 하고 있었을 줄이야……."
1000309-9 = "3;히후미;06;서, 선생님! 모처럼 여기까지 나왔으니, 돌아가기 전에 잠깐 연극을 관람하고 가도 괜찮을까요?\n#3;m3\n#3;em;[반응]\n#3;hophop"
1000309-10 = "[s] \"괜찮아.\""
1000309-11 = "3;히후미;03;감사합니다, 선생님!\n#3;greeting\n#3;em;[반짝]"
1000309-12 = "3;히후미;06;앗, 저기 보세요. 선생님! #n악당에게 세뇌된 앵그리 아델리 씨가 페로로 님을 습격하려고 해요!\n#3;m2\n#3;em;[반응]"
1000309-13 = "3;히후미;06;페로로 님, 조심하세요!\n#3;dl"
1000309-14 = "#all;hide"
1000309-15 = "3;히후미;00;후우…… 좋은 공연이었어요!\n#3;em;[음표]\n#3;greeting\n#3;a"
1000309-16 = "3;히후미;06;페로로 님이 페로페로- 하고 악당을 핥아 무찌를 때는, 저도 모르게 손에 땀을 쥐게 되더라고요!"
1000309-17 = "3;히후미;03;이렇게 가까이서 페로로 님을 볼 수 있다니…… 오늘은 운이 좋았네요!\n#3;em;[반짝]"
1000309-18 = "3;히후미;03\n#3;d\n#wait;1000"
1000309-19 = "#all;hide\n#wait;1500"
1000309-20 = "3;히후미;01;어라……? 아직 무언가 추가 공연이 남은 걸까요?\n#3;em;[?]\n#3;a"
1000309-21 = "#na;공연 스태프;이어서 페로로와 악수를 하고 싶으신 분은 이 앞에 줄을 서주시기 바랍니다!"
1000309-22 = "3;히후미;00;페로로 님과의 악수……!\n#3;em;[반응]"
1000309-23 = "3;히후미;01;저 폭신폭신해 보이는 날개를 만져볼 수 있다면…… 분명 기분 좋겠죠?"
1000309-24 = "[s] \"다녀오지 그래?\""
1000309-25 = "3;히후미;04;아하하…… 마음은 굴뚝 같지만, 제가 직접 가기는 조금 꺼려져서요.\n#3;em;[땀]"
1000309-26 = "3;히후미;01;줄을 선 사람들도 대부분 어린 아이들뿐이고, 저처럼 나이 든 학생이 갔다가는 어쩐지 분위기를 깰 것 같아서……."
1000309-27 = "3;히후미;04;오늘은 인형극을 눈 앞에서 본 것 만으로 만족할래요."
1000309-28 = "[s] \"정말로 좋아한다면 그런 것쯤은 상관없잖아?\""
1000309-29 = "3;히후미;05;진정한 애정……!\n#3;em;[!]\n#3;stiff"
1000309-30 = "3;히후미;99;확실히, 페로로 님을 향한 애정이 부족했을지도 모르겠네요."
1000309-31 = "3;히후미;05\n#3;h\n#wait;1000"
1000309-32 = "3;히후미;06;선생님, 빨리 줄을 서러 가요!\n#3;em;[!]\n#3;closeup"
1000309-33 = "[s] \"나도 가는 거야?\""
1000309-34 = "3;히후미;06;당연하죠! 페로로 님과 악수할 수 있는 기회는 흔치 않으니까요!\n#3;closeup\n#3;em;[반응]"
1000309-35 = "3;히후미;03;분명히 폭신폭신하고 좋은 향기가 날 거예요!\n#3;em;[하트]\n#3;greeting\n#3;closeup"
1000309-36 = "#all;hide"
1000309-37 = "#na;이후 히후미와 함께 줄을 서 페로로 인형과 악수를 했다."
1000309-38 = "#na;……페로로 인형의 날개에서는 어쩐지 고소한 치킨 냄새가 났다……"

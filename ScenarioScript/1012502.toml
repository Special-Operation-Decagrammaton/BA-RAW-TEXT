[translation]
1012502-1 = "Magical Painting"
1012502-5 = "Welcome, Master!"
1012502-6 = "[s] \"Hello, Eri!\""
1012502-7 = "I was debating what we ought to do while we take a break together."
1012502-8 = "And then the spellbook told me..."
1012502-9 = "...we should paint together at the atelier today!"
1012502-10 = "[s1] \"Ooh, painting with Eri.\"\n[s2] \"Sounds magical.\""
1012502-13 = "I'm sure we'll make an incredible masterpiece together."
1012502-14 = "And on that note, off we go!"
1012502-24 = "I'm not even going to pick a theme to paint today."
1012502-25 = "Everything I put on this canvas will be pure emotion, raw artistic impulse. #nIt'll burst like magic!"
1012502-26 = "On a day like today, when I can feel my mana resonate...#nit's best to let my heart take charge."
1012502-27 = "Now, please focus your attention here!"
1012502-31 = "[ns] \"...Tarot cards? I thought we were painting.\""
1012502-32 = "We are! This is how we bring the magic into it!"
1012502-33 = "Nyuhuhu... Which Arcana will reveal our fate today...?"
1012502-37 = "Mm. The Upright Tower."
1012502-38 = "This card represents disaster and destruction. That can only mean..."
1012502-39 = "I'll take this brush and STRIKE it across the canvas!"
1012502-40 = "Just like THIS!!"
1012502-49 = "[ns] \"Wow, you're really going at it.\""
1012502-50 = "Nyuhuhu. Now, to bring forth the next stroke..."
1012502-54 = "Our guide shall be...?"
1012502-58 = "Huh? Reversed Death?"
1012502-59 = "A fixed state. Unchanging..."
1012502-63 = "Aha! Then another strike it is!"
1012502-72 = "[ns] \"I-Is it okay to hit the canvas that hard?\""
1012502-73 = "It's all right! Believe in the power of magic!"
1012502-74 = "Even if the canvas does rip,#nthat only represents the power I've put into it!#nThis is art! There's nothing to fear!"
1012502-75 = "Now, then! Let us continue!"
1012502-77 = "The tarot cards continued leading Eri into one powerful stroke after another."
1012502-86 = "A little while later..."
1012502-89 = "Ooh, look at this."
1012502-93 = "Enchanting! I can hardly believe I made it myself!"
1012502-94 = "[s] \"Show me, show me!\""
1012502-98 = "Behold! By the resonance of mana, and in the presence of my Master, I have created..."
1012502-103 = "...one heck of a painting!"
1012502-104 = "I call it \"The Eternal Storm\"!"
1012502-105 = "If I can channel THIS much power, perhaps I can even master the 10th Circle, and spin entire worlds out of pure will!"
1012502-106 = "[s3] \"...I don't know what the 10th Circle is, but that painting's incredible.\"\n[s4] \"Great work. It's so dynamic!\""
1012502-109 = "Nyuhuhu, isn't it, though?"
1012502-110 = "As they say, \"Art is an explosion!\""
1012502-111 = "I'm glad I brought you here, Master.#nI couldn't have brought this piece together on my own."
1012502-112 = "If I can keep up this pace, that next practical exam will be no trouble at all!"
1012502-116 = "...Oh, my. I must have burned through my reserves..."
1012502-117 = "Master! Please, recharge my mana!"
1012502-118 = "[s5] \"R-Recharge your mana?\"\n[s6] \"You mean give you snacks, right?\""
1012502-122 = "[ns] Take out the cookies from the Prefectural Council."
1012502-124 = "Oh my, those look delicious!"
1012502-125 = "But...hmm, my hands are all covered in paint..."
1012502-126 = "Nyuhuhu, well, only one thing to do about it. You'll have to feed me, Master."
1012502-127 = "[s] \"I-I see.\""
1012502-132 = "I'm glad we understand each other."
1012502-133 = "Thank you for the snacks!"
1012502-137 = "So good to have you on hand for such things, Master."
1012502-138 = "[s] \"Was this your plan all along?\""
1012502-139 = "Nyuhuhu, certainly not."
1012502-140 = "Consider it the will of fate."
1012502-142 = "I continued to enjoy recharging Eri's mana."

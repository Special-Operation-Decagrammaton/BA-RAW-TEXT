[translation]
1012502-1 = "รูปวาดแห่งเวทมนตร์"
1012502-5 = "เชิญเลยค่ะมาสเตอร์!"
1012502-6 = "[s] \"สวัสดี เอริ!\""
1012502-7 = "ฉันกำลังคิดอยู่เลยค่ะว่าเราจะทำอะไรกันดี"
1012502-8 = "แล้วจู่ๆ ตำราเวทก็บอกฉันมาค่ะ"
1012502-9 = "ว่าวันนี้ถ้าได้วาดรูปในสตูดิโอด้วยกันก็คงดีค่ะ"
1012502-10 = "[s1] \"โอ้ว วาดรูปกับเอริเหรอ\"\n[s2] \"มันจะกลายเป็นภาพวิเศษไปรึเปล่านะ?\""
1012502-13 = "ถ้าวาดด้วยกันกับมาสเตอร์จะต้องได้ผลงานชิ้นเอกออกมาแน่ๆ ค่ะ"
1012502-14 = "เอาละ งั้นเราไปที่สตูดิโอกันเถอะค่ะ!"
1012502-24 = "วันนี้ฉันจะไม่คิดหัวข้อที่จะวาดไว้ก่อน แล้วจะลองวาดแบบอิสระดูนะคะ"
1012502-25 = "หรือก็คือ... มันคือการแสดงออกถึงอารมณ์และความรู้สึกที่บริสุทธิ์เหมือนกับเวทมนตร์ของจิตรกรค่ะ!"
1012502-26 = "ในวันที่มานาโอบล้อมเราแบบนี้...#nฉันคิดว่าควรให้ความสำคัญกับความรู้สึกน่าจะดีกว่าค่ะ"
1012502-27 = "เอาละ! คอยดูให้ดีนะคะ!"
1012502-31 = "[ns] \"ไพ่ทาโร่ต์เหรอ...? ไม่ได้จะวาดรูปเหรอ?\""
1012502-32 = "อย่างที่ฉันเคยบอกไปค่ะว่าจะสร้างงานศิลปะด้วยเวทมนตร์"
1012502-33 = "อุฮุฮุ... ไพ่ใบแรกแห่งอาร์คาน่าที่พยากรณ์ดวงชะตาคือ...?!"
1012502-37 = "อืม ไพ่เดอะ ทาวเวอร์สินะคะ"
1012502-38 = "ไพ่ใบนี้สื่อถึงการล่มสลายและการทำลายล้างค่ะ ถ้างั้น..."
1012502-39 = "ก็หมายถึงว่าการลงแรงมากเกินไปจนเหมือนจะทำลายผ้าแคนวาสได้!"
1012502-40 = "เอาละ จะเริ่มเลยนะคะ!"
1012502-49 = "[ns] \"โอ้... พลังเหลือล้นจริงๆ นะ\""
1012502-50 = "อุฮุฮุ ตอนนี้ก็มาตัดสินใจว่าจะเริ่มจากตรงไหนกันเถอะค่ะ"
1012502-54 = "และสิ่งที่นำทางให้ฉันก็คือ...!"
1012502-58 = "หืม? ยมทูตกลับหัวเหรอ? "
1012502-59 = "ไพ่ใบนี้หมายถึงสถานะคงที่ที่ไม่เปลี่ยนแปลง…"
1012502-63 = "อย่างนี้นี่เอง หมายความว่าให้ป้ายลงไปแรงๆ สินะ!"
1012502-72 = "[ns] \"วะ... วาดรุนแรงแบบนั้นไม่เป็นไรเหรอ...?\""
1012502-73 = "ไม่เป็นไรหรอกค่ะ! ฉันเชื่อในพลังแห่งเวทมนตร์ค่ะ!"
1012502-74 = "ถึงผืนผ้าใบแคนวาสจะฉีกขาดไป#nมันก็นับว่าเป็น 'การแสดงพลัง' อย่างหนึ่ง... นับว่าเป็นงานศิลปะที่ยอดเยี่ยมค่ะ! #nเพราะงั้นไม่ต้องกลัวไปหรอกค่ะ!"
1012502-75 = "เอาละค่ะ! มาวาดต่อกันเลยเถอะค่ะ!"
1012502-77 = "(หลังจากนั้น ไพ่ทาโรต์ก็ยังคงนำทางเอริให้วาดลวดลายฝีแปรงต่อไปอย่างทรงพลัง)"
1012502-86 = "(ผ่านไปพักใหญ่...)"
1012502-89 = "โอ้ ดูนี่สิคะ"
1012502-93 = "เป็นผลงานที่วิเศษมากเลยค่ะ! นี่คือผลงานที่ฉันวาดเองเหรอคะเนี่ย!~"
1012502-94 = "[s] \"ขอดูหน่อย ขอครูดูบ้างสิ!\""
1012502-98 = "เอาละ! จะโชว์ให้ดูแล้วนะคะ! ผลงานชิ้นโบว์แดงอันสมบูรณ์แบบที่รังสรรค์ขึ้นจากมานาของฉันกับมาสเตอร์!"
1012502-103 = "(เป็นภาพที่สุดยอดเลย..!)"
1012502-104 = "ชื่อของภาพนี้คือ <พายุโหมชั่วนิรันดร์>!"
1012502-105 = "ถ้าฉันใช้เวทมนตร์นี้ได้ ฉันก็อาจจะใช้เวทมนตร์สร้างโลกที่เป็นเวทมนตร์ระดับ 10 ได้ก็ได้นะคะ!"
1012502-106 = "[s3] \"ครูไม่ค่อยเข้าใจเรื่องเวทมนตร์ระดับ 10 แต่ฟังดูสุดยอดเลยนะ!\"\n[s4] \"เป็นภาพที่ยอดเยี่ยมและทรงพลังมากเลย...!\""
1012502-109 = "อุฮุฮุ ใช่มั้ยล่ะคะ?"
1012502-110 = "ผลงานชิ้นนี้ทำให้นึกถึงคำว่า \"ศิลปะคือการระเบิด\" เลยค่ะ!"
1012502-111 = "การที่ขอให้มาสเตอร์มาที่นี่เป็นการตัดสินใจที่ถูกต้องจริงๆ ค่ะ#nฉันคงวาดรูปนี้คนเดียวไม่ได้แน่ๆ"
1012502-112 = "ถ้าเป็นแบบนี้ละก็ ฉันต้องสอบปฏิบัติได้ดีแน่ๆ เลยค่ะ!"
1012502-116 = "อะ... อะไรกัน... ดูเหมือนฉันคงใช้มานามากเกินไปน่ะค่ะ"
1012502-117 = "มาสเตอร์! ช่วยฟื้นฟูมานาให้ฉันด้วยค่ะ!"
1012502-118 = "[s5] \"ฟะ... ฟื้นฟูมานาเหรอ?\"\n[s6] \"หมายถึงขอขนมใช่มั้ย?\""
1012502-122 = "[ns] หยิบคุกกี้ที่ผ่านการตรวจสอบจากฝ่ายดูแลหอพักขึ้นมา"
1012502-124 = "ว้าว คุกกี้ดูน่ากินมากเลยค่ะ!"
1012502-125 = "ทำยังไงดีล่ะคะ? มือฉันเปื้อนสีไปหมดแล้ว"
1012502-126 = "อุฮุฮุ ช่วยไม่ได้นะคะ มาสเตอร์คงจะต้องป้อนฉันหน่อยแล้วละค่ะ"
1012502-127 = "[s] \"ยะ... อย่างนั้นเหรอ\""
1012502-132 = "สมแล้ว... มาสเตอร์กับฉันเข้าใจกันดีมากเลยนะคะเนี่ย"
1012502-133 = "จะกินแล้วนะคะ!"
1012502-137 = "ว้าว พอมาสเตอร์ช่วยฟื้นฟูมานาให้แบบนี้ ฉันมีแรงขึ้นเยอะเลยค่ะ"
1012502-138 = "[s] \"วางแผนจะให้ทำแบบนี้แต่แรกสินะ?\""
1012502-139 = "อุฮุฮุ ไม่ใช่สักหน่อยค่ะ"
1012502-140 = "นี่เป็นการนำทางจากเวทมนตร์ต่างหากค่ะ"
1012502-142 = "(หลังจากนั้น คุณครูก็ใช้เวลาสนุกสนานกับการเสริมพลังมานาให้เอริต่อ)"

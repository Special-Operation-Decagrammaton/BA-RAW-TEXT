[translation]
1012502-1 = "魔法畫作"
1012502-5 = "歡迎你，御者！"
1012502-6 = "[s]「嗨，繪梨！」"
1012502-7 = "我剛才在思考，休息的時候該一起做什麼才好……"
1012502-8 = "結果魔導書告訴我的答案是──"
1012502-9 = "今天適合在工房裡一起畫畫！"
1012502-10 = "[s1]「哦？要和繪梨一起畫畫嗎？」\n[s2]「會變成魔法般的畫作嗎？」"
1012502-13 = "只要能跟御者一起的話，肯定能畫出驚人的作品。"
1012502-14 = "來，我們趕緊到工房去吧！"
1012502-24 = "今天我打算不設定主題，嘗試自由繪畫。"
1012502-25 = "也就是……將畫家純粹的感性與衝動──#n如魔法一般釋放出來！"
1012502-26 = "像今天這種魔力共鳴的日子…… #n我覺得重視感性會是個不錯的選擇。"
1012502-27 = "來！請仔細看吧！"
1012502-31 = "[ns]「……塔羅牌？不是要畫畫嗎？」"
1012502-32 = "正如我剛才所說，這是為了用魔法來表現藝術。"
1012502-33 = "妞呵呵……宣告命運的第一張牌是……！？"
1012502-37 = "嗯，是正位的「高塔」啊。"
1012502-38 = "這張牌象徵著破壞與毀滅。#n也就是說……"
1012502-39 = "要運用像是要破壞畫布般的強烈筆觸！"
1012502-40 = "好！要開始囉！！"
1012502-49 = "[ns]「哦哦……氣勢真驚人……」"
1012502-50 = "妞呵呵，接著來決定下一筆吧。"
1012502-54 = "下一張引導我的牌是……！"
1012502-58 = "嗯？逆位的「死神」？"
1012502-59 = "這象徵著停滯、不變的狀態……"
1012502-63 = "原來如此！意思是再用一次強烈的筆觸吧！"
1012502-72 = "[ns]「這，這樣畫不會太激烈嗎……？」"
1012502-73 = "沒問題的！我相信魔法的力量！"
1012502-74 = "即使畫布撕裂，那也是「力量的表現」……是偉大的藝術！#n所以不必害怕！"
1012502-75 = "好！繼續畫下去吧！！"
1012502-77 = "（之後塔羅牌持續引導繪梨運用激烈的筆觸）"
1012502-86 = "（不久後……）"
1012502-89 = "哦哦，這是？"
1012502-93 = "真的是魔法般的作品呢！這居然是我畫出來的！"
1012502-94 = "[s]「我要看我要看！」"
1012502-98 = "來！請看吧！這就是我與御者的魔力共鳴所創造出的究極傑作！"
1012502-103 = "（是一幅充滿氛圍的畫作……！）"
1012502-104 = "標題是《永不停息的暴風》！"
1012502-105 = "如果能運用這個魔法的話，要使出第10環的世界創造魔法也不是不可能的吧！"
1012502-106 = "[s3]「……雖然不知道什麼是第10環，但聽起來很厲害。」\n[s4]「真是充滿動感又帥氣的畫作……！」"
1012502-109 = "妞呵呵，對吧？"
1012502-110 = "這是一幅讓人自然聯想到「藝術就是爆炸」的作品！"
1012502-111 = "果然請御者過來是正確的。#n如果只有我一個人的話，絕對畫不出這樣的作品。"
1012502-112 = "只要能乘著這股氣勢，接下來的實作考試肯定能拿到好成績！"
1012502-116 = "啊，糟糕。我好像消耗太多魔力了。"
1012502-117 = "御者！請幫我進行魔力補給！"
1012502-118 = "[s5]「魔，魔力補給？」\n[s6]「是要零食的意思吧？」"
1012502-122 = "[ns] 拿出通過舍監隊檢查的餅乾"
1012502-124 = "哇，這個餅乾看起來好好吃！"
1012502-125 = "可是該怎麼辦呢？#n我的手上現在沾滿了顏料。"
1012502-126 = "妞呵呵，看來只能請御者親自餵我了呢。"
1012502-127 = "[s]「這，這樣啊。」"
1012502-132 = "果然御者跟我很有默契。"
1012502-133 = "那麼，我要開動了！"
1012502-137 = "哇，御者親自幫我補給的魔力，果然能讓人充滿力量呢。"
1012502-138 = "[s]「這該不會是你的計劃吧……？」"
1012502-139 = "妞呵呵，怎麼會呢？"
1012502-140 = "這想必也是魔法的引導吧。"
1012502-142 = "（之後持續幫繪梨進行魔力補給，並度過了愉快的時光）"

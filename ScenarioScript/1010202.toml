[translation]
1010202-1 = "泳裝的浪漫"
1010202-2 = "（看到日和的MomoTalk後，出於好奇而前往了他的藏身處）"
1010202-5 = "耶，耶嘿嘿……"
1010202-6 = "啊，老師？"
1010202-7 = "你，你來啦……！#n我本來正要去找你的說……"
1010202-8 = "[s]「嗨，日和，你在做什麼？」"
1010202-9 = "啊，說到這個……"
1010202-10 = "耶嘿嘿，為了拿到泳裝，我正在寫這個……"
1010202-11 = "其實有本雜誌舉辦了讀者活動……#n只要寫下自己的故事，就有機會抽中最近推出的泳裝。"
1010202-12 = "在這種炎熱的夏天裡，如果把我們住在沒有空調設備的廢棄大樓的故事寫下來……"
1010202-13 = "肯定能夠感動活動的負責人，讓他心甘情願地把泳裝送給我吧？#n耶嘿嘿……！"
1010202-14 = "[s1]「如果你想免費獲得泳裝的話……」\n[s2]「這個理由的確是挺實際的啦……」"
1010202-17 = "只要在今天把信投進郵筒，我就能在去海邊之前拿到泳裝了！"
1010202-18 = "所以我想問老師，信上可不可以留夏萊的住址呢？#n耶嘿嘿……你也知道我們一直在四處流浪，根本沒有固定的住址……"
1010202-19 = "如果老師願意幫我收信的話，我會超級感謝你的……嘿嘿。"
1010202-20 = "[s]「這種小事我當然樂意幫忙，不過……」"
1010202-23 = "[ns] 翻看夾著明信片的那本雜誌"
1010202-24 = "（……那是兩個月前發行的雜誌）"
1010202-25 = "嗯？老師？你怎麼了？"
1010202-26 = "為什麼露出充滿同情的表情……難，難道連老師也覺得我很可憐嗎……！"
1010202-27 = "完，完了……我的人生果然就像這棟廢棄的大樓一樣……"
1010202-28 = "啊，不過這次可憐反而是好事吧……"
1010202-29 = "畢竟我越可憐，獲得泳裝的機率就越高……#n說不定這次不會完蛋呢……耶嘿嘿……"
1010202-30 = "[s3]「唔嗯……」\n[s4]（還是別告訴他這本雜誌的真相好了……）"
1010202-33 = "耶嘿嘿，我寫好了。"
1010202-34 = "老師，回去的路上可以幫我把這封信投進郵筒裡嗎……？#n耶嘿嘿，謝謝你。"
1010202-35 = "真期待收到泳裝的那一天……！"
1010202-37 = "（由於就算把日和的明信片寄出去也沒意義，於是決定先帶回夏萊）"
1010202-38 = "[ns]「來稍微看一下吧……」"
1010202-40 = "你好，我是一個每天都過得很艱困的少女。"
1010202-41 = "雖然我的人生就像路邊的石頭一樣，幾乎不會發生任何快樂或有趣的事情，#n但是去海邊玩一直是我的夢想。"
1010202-42 = "希望你們能幫我實現這微不足道的夢想。"
1010202-43 = "希望獲得的禮物：黃金奢華VIP高檔泳裝"
1010202-46 = "[ns]「唔嗯……」"
1010202-48 = "（去百貨公司買了套泳裝，然後包裝得像雜誌編輯部寄出的禮物一樣）"
1010202-50 = "啊，老師……！那個箱子……！"
1010202-51 = "不會吧？是我想的那樣嗎！？"
1010202-52 = "[s5]「沒，沒錯。恭喜你，日和。」\n[s6]「那個讀者明信片的活動，你中獎了哦。」"
1010202-55 = "哇啊啊啊啊！"
1010202-56 = "我，我這個倒楣鬼終於被老天爺眷顧了……！#n原來下水道也會開出美麗的花……！我的人生總算是迎來幸福了……！"
1010202-60 = "雖然不是我想收到的那套黃金奢華VIP高檔泳裝，不過真的是新泳裝耶……！"
1010202-61 = "耶嘿嘿，謝謝你幫我送過來，老師！"
1010202-62 = "我現在就試穿看看……！"
1010202-66 = "感覺怎麼樣呢？耶嘿嘿……"
1010202-67 = "[s]「嗯，很適合你哦。」"
1010202-68 = "嘿嘿，好開心……"
1010202-69 = "彷彿這段時間的痛苦都被撫平了……"
1010202-73 = "啊，現在不是說這個的時候！"
1010202-77 = "耶嘿嘿……"
1010202-78 = "[s]「這些是……？」"
1010202-79 = "這些全都是明信片！"
1010202-80 = "這本雜誌有送墨鏡，這本是超大型游泳圈，然後這本則是特大刨冰試吃券！"
1010202-81 = "耶嘿嘿，要是全部都中獎該怎麼辦？#n說不定我將會度過人生中最奢侈的夏天……！"
1010202-82 = "不，不用擔心哦，老師。#n我也會幫你寫幾張的。"
1010202-83 = "耶嘿嘿，真期待去海邊玩的那天……！"

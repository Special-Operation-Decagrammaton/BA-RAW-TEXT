[translation]
1010202-1 = "Romance of the Swimsuit"
1010202-2 = "Hiyori's MomoTalk messages piqued my curiosity, so I went to her hideout."
1010202-5 = "Hee, heehee..."
1010202-6 = "Ah, Sensei?"
1010202-7 = "Y-You're here?!"
1010202-8 = "[s] \"Hi, Hiyori. What're you doing?\""
1010202-9 = "Ah...you see..."
1010202-10 = "Heehee. I'm trying to win a swimsuit...so I'm writing something..."
1010202-11 = "It's a giveaway from a magazine... If you submit a story you wrote, they'll enter you into their drawing."
1010202-12 = "My story is about us living through this hot summer in an abandoned building, not a single air conditioning unit in sight."
1010202-13 = "The event staff will be so moved by our suffering, they'll be guilted into sending me a swimsuit... Heeheehee."
1010202-14 = "[s1] \"A free swimsuit, huh...?\"\n[s2] \"It definitely is a heartfelt story...\""
1010202-17 = "If I mail my submission today, that'll give the magazine writers enough time to send my prize before we leave for the beach!"
1010202-18 = "So...I was wondering, could I use Schale's building for my permanent address? Because, you know, we don't have an address..."
1010202-19 = "If you could get the package when they send it, I'd be very, incredibly grateful."
1010202-20 = "[s] \"That's not a problem, but...\""
1010202-23 = "[ns] Look at the magazine."
1010202-24 = "...The magazine had been published two months prior."
1010202-25 = "Y-Yes? What's wrong, Sensei?"
1010202-26 = "Your face looks so devastated! Is the sadness of my story bringing you down?"
1010202-27 = "I-It really is pathetic... My life is no better than this abandoned building..."
1010202-28 = "For once...my suffering might work in my favor!"
1010202-29 = "The devastating despair of my story will increase my chances of winning the swimsuit!"
1010202-30 = "[s3] \"Um...\"\n[s4] \"(Let's not tell her the truth...)\""
1010202-33 = "Heehee. I just finished filling out the postcard for submission."
1010202-34 = "Sensei, can you send this for me on your way home? Heehee. Thank you!"
1010202-35 = "I can hardly contain my excitement! A new swimsuit!"
1010202-37 = "I just brought it back to Schale with me, since there was no point in sending in her submission."
1010202-38 = "[ns] \"I'll just read what she wrote on the postcard...\""
1010202-40 = "Hello, I am just a girl whose daily life is a struggle to survive."
1010202-41 = "My life has been like that of an unwanted pebble, kicked to the side, devoid of meaning or joy. My only dream is to see the beach, just one time."
1010202-42 = "Please help me achieve my humble, insignificant dream."
1010202-43 = "Desired Gift: Golden Luxury VIP High-End Swimsuit"
1010202-46 = "[ns] \"Um...\""
1010202-48 = "I ended up purchasing a swimsuit from the mall and packaging it to make it look like it was from the magazine's editorial department."
1010202-50 = "S-Sensei! Th-That box!"
1010202-51 = "Could it truly be...?!"
1010202-52 = "[s5] \"You're right! Congratulations, Hiyori!\"\n[s6] \"You won the giveaway!\""
1010202-55 = "AHHHHHH!!"
1010202-56 = "The sunshine's rays can even shine on a mouse's hole! Flowers bloom in a dreary sewer! C-Could something so wonderful...truly happen to me?!"
1010202-60 = "It's not the Golden Luxury VIP High-End Swimsuit I wanted, but it's still brand-new swimwear...!"
1010202-61 = "Heehee. Thank you for delivering my prize, Sensei!"
1010202-62 = "I-I'll try it on right away!"
1010202-66 = "What do you think? Heeheehee..."
1010202-67 = "[s] \"You look great.\""
1010202-68 = "Heehee. I've truly never been so happy in my life."
1010202-69 = "This must be...compensation...for all my suffering...!"
1010202-73 = "W-Wait! This isn't the time for this!"
1010202-77 = "Heehee..."
1010202-78 = "[s] \"...What are you doing?\""
1010202-79 = "Filling out postcards!"
1010202-80 = "This magazine is holding a giveaway for sunglasses, this one for a giant inflatable tube, and this one has one for a super-sized shaved ice voucher!"
1010202-81 = "Heeheehee... What if I win all of them? I'll have...the most luxurious summer of my entire life!"
1010202-82 = "D-Don't worry, Sensei. I'll write a few for you too!"
1010202-83 = "Heehee. I'm really looking forward to the beach!"

1010202-11 = "3;히요리;03;그게, 잡지의 독자 이벤트인데요…… 사연을 적어서 보내면 추첨을 통해 신상 수영복을 주는 이벤트거든요."
1010202-12 = "3;히요리;03;이 무더운 여름에 냉방시설도 없이 폐건물에서 지내는 저희의 사연을 보내는 거예요……."
1010202-13 = "3;히요리;03;분명 이벤트 담당자도 감동해서 수영복을 줄 수밖에 없겠죠? 헤헤헤……!"

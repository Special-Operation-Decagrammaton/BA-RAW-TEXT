[translation]
1010202-1 = "ชุดว่ายน้ำชิงโชค"
1010202-2 = "(คุณครูสงสัยเกี่ยวกับข้อความ MOMOTALK ของฮิโยริ จึงออกไปหาเธอ)"
1010202-5 = "แหะ แหะๆ..."
1010202-6 = "อ๊ะ คุณครู?"
1010202-7 = "มะ... มาหาฉันเหรอคะ...! ฉันว่าจะไปหาคุณครูอยู่แล้วเชียว..."
1010202-8 = "[s] \"สวัสดี ฮิโยริ ทำอะไรอยู่เหรอ?\""
1010202-9 = "อ่า... พอดีว่า..."
1010202-10 = "แหะๆ ฉันกำลังเขียนบางอย่างเพื่อชิงรางวัลชุดว่ายน้ำอยู่น่ะค่ะ..."
1010202-11 = "นี่เป็นอีเวนต์สำหรับผู้อ่านนิตยสารน่ะค่ะ... ถ้าเขียนเรื่องส่งไป ทางนั้นก็จะเลือกผู้โชคดี แล้วแจกชุดว่ายน้ำแบบใหม่ให้ค่ะ"
1010202-12 = "ฉันก็เลยเขียนเรื่องของตัวเองที่ต้องมาใช้ชีวิตในอาคารร้างที่ไม่มีเครื่องปรับอากาศตลอดฤดูร้อนที่#nอบอ้าวค่ะ..."
1010202-13 = "คนที่ได้อ่านต้องประทับใจจนให้ชุดว่ายน้ำฉันแน่เลย ว่ามั้ยคะ? แหะๆๆ...!"
1010202-14 = "[s1] \"ถ้าได้อ่านก็คงอยากให้ชุดว่ายน้ำอยู่หรอกนะ...\"\n[s2] \"ฟังดูน่าประทับใจจนอยากให้ชุดฟรีอยู่หรอกนะ...\""
1010202-17 = "ถ้าฉันส่งไปรษณียบัตรวันนี้ ฉันก็จะได้ชุดก่อนที่เราจะไปทะเลกันค่ะ!"
1010202-18 = "ว่าแต่ คุณครูคะ... ฉันขอเขียนที่อยู่เป็นที่อยู่ชาเล่ต์ได้มั้ยคะ? แหะๆ... อย่างที่คุณครูรู้น่ะค่ะ ว่าพวกฉันเปลี่ยนที่ซ่อนตัวบ่อยๆ ก็เลยไม่มีที่อยู่เป็นหลักแหล่ง..."
1010202-19 = "ถ้าคุณครูช่วยรับชุดแทนให้หน่อย ฉันก็จะขอบคุณมากเลยค่ะ... แหะๆ"
1010202-20 = "[s] \"เรื่องแค่นั้นครูช่วยได้อยู่แล้ว แต่ว่า...\""
1010202-23 = "[ns] หยิบนิตยสารที่ฮิโยริจะส่งเรื่องเข้าร่วมกิจกรรมมาดู"
1010202-24 = "(เป็นนิตยสารที่ตีพิมพ์ตั้งแต่ 2 เดือนที่แล้ว...)"
1010202-25 = "หืม? คุณครู? มีอะไรเหรอคะ?"
1010202-26 = "ทำไมจู่ๆ ก็ทำหน้าน่าเศร้าล่ะคะ... ระ... หรือว่าคุณครูก็สงสารฉันขึ้นมาเหมือนกันคะ...!"
1010202-27 = "ยะ... แย่แล้วสิคะ... ชีวิตของฉันคงไม่ต่างกับอาคารเก่าๆ ที่ถูกทอดทิ้งแบบนี้สินะคะ..."
1010202-28 = "อ่า แต่ครั้งนี้ก็ยังถือว่าโชคดีนะคะ..."
1010202-29 = "เพราะถ้ายิ่งน่าสงสาร ฉันก็ยิ่งมีโอกาสได้ชุดว่ายน้ำมากขึ้น... นี่อาจจะไม่แย่ก็ได้นะคะ... แหะๆ..."
1010202-30 = "[s3] \"อืมม...\"\n[s4] (ตัดสินใจว่าจะไม่บอกว่ากิจกรรมหมดเขตแล้ว...)"
1010202-33 = "แหะๆ ฉันเขียนเสร็จแล้วค่ะ"
1010202-34 = "ตอนขากลับ คุณครูช่วยเอาไปรษณียบัตรนี้ใส่ตู้ไปรษณีย์ให้หน่อยได้มั้ยคะ... แหะๆ ขอบคุณนะคะ"
1010202-35 = "ฉันอยากได้ชุดว่ายน้ำจังเลยค่ะ...!"
1010202-37 = "(ถึงจะส่งไปรษณียบัตรของฮิโยริไปก็เปล่าประโยชน์ คุณครูจึงกลับมาที่ชาเล่ต์ก่อน)"
1010202-38 = "[ns] \"ลองอ่านดูหน่อยดีมั้ยนะ...\""
1010202-40 = "สวัสดีค่ะ ฉันเป็นเด็กผู้หญิงที่ใช้ชีวิตอย่างยากลำบากทุกวันเลยค่ะ"
1010202-41 = "ชีวิตของฉันเหมือนก้อนหินข้างถนนที่ไม่มีความสุขหรือเรื่องน่ายินดีอะไร แต่ความฝันของฉันคือการ#nได้ไปเที่ยวทะเลค่ะ"
1010202-42 = "ได้โปรดช่วยให้ความฝันเล็กๆ ที่เรียบง่ายของฉันเป็นจริงด้วยนะคะ"
1010202-43 = "ของขวัญที่อยากได้: ชุดว่ายน้ำ VIP ระดับไฮเอนด์สุดหรูสีทอง"
1010202-46 = "[ns] \"อืม...\""
1010202-48 = "(คุณครูออกไปซื้อชุดว่ายน้ำที่ห้างสรรพสินค้า ทั้งยังใส่กล่องให้เหมือนเป็นของรางวัลที่ส่งมาจาก#nสำนักพิมพ์)"
1010202-50 = "อ๊ะ คุณครู...! กล่องนั่นมัน...!"
1010202-51 = "ระ... หรือว่า? เป็นสิ่งที่ฉันคิด... ใช่มั้ยคะ?!"
1010202-52 = "[s5] \"ชะ... ใช่แล้วละ ยินดีด้วยนะ ฮิโยริ\"\n[s6] \"ฮิโยริเป็นผู้โชคดีได้รางวัลจากอีเวนต์น่ะ!\""
1010202-55 = "ว้าววววว!"
1010202-56 = "มีเรื่องดีๆ ในชีวิตที่แย่ๆ เหมือนกันสินะคะ...! ราวกับมีดอกไม้บานในท่อระบายน้ำเลยค่ะ...! ในที่สุดชีวิตของฉันก็ได้เจอความสุขแบบนี้สักที...!"
1010202-60 = "ถึงจะไม่ใช่ชุดว่ายน้ำ VIP ระดับไฮเอนด์สุดหรูสีทองที่ฉันขอไป แต่ก็เป็นชุดว่ายน้ำใหม่จริงด้วยค่ะ...!"
1010202-61 = "แหะๆ ขอบคุณที่ช่วยส่งไปรษณียบัตรให้นะคะคุณครู"
1010202-62 = "ฉันจะไปลองใส่มาเลยค่ะ...!"
1010202-66 = "เป็นยังไงคะ? แหะๆ..."
1010202-67 = "[s] \"อื้ม เข้ากับฮิโยริดีนะ\""
1010202-68 = "แหะๆ ดีใจจังเลยค่ะ..."
1010202-69 = "เหมือนความเจ็บปวดที่ผ่านมาได้รับการเยียวยาเลย..."
1010202-73 = "อ๊ะ เราไม่ควรมาอยู่อย่างนี้กันสิคะ!"
1010202-77 = "แหะๆ..."
1010202-78 = "[s] \"จะทำอะไรเหรอ...?\""
1010202-79 = "ก็ไปรษณียบัตรที่เหลือยังไงล่ะคะ!"
1010202-80 = "นิตยสารฉบับนี้มีอีเวนต์ที่แจกทั้งแว่นกันแดด ห่วงยางอันใหญ่ แล้วก็มีบัตรกำนัลน้ำแข็งไสถ้วยใหญ่#nพิเศษด้วยนะคะ!"
1010202-81 = "แหะ แหะๆ ถ้าฉันถูกรางวัลทุกอย่างจะเป็นยังไงคะเนี่ย? ฉันอาจจะได้มีฤดูร้อนที่หรูหราที่สุดในชีวิต#nเลยก็ได้ค่ะ...!"
1010202-82 = "มะ... ไม่ต้องห่วงนะคะคุณครู! ฉันจะเขียนให้คุณครูด้วยค่ะ!"
1010202-83 = "แหะๆ ชักจะตื่นเต้นกับการไปทะเลแล้วสิคะ...!"

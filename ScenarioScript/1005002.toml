[translation]
1005002-1 = "我不是心菜醬。我是教官！"
1005002-2 = "山海經訓育支援部．梅花園"
1005002-5 = "心菜醬～！我想要這個～"
1005002-6 = "心菜醬，今天的點心是什麼？"
1005002-7 = "不要叫我「心菜醬」，要叫我「心菜教官」才對！"
1005002-8 = "心菜醬～這個好難。教我！"
1005002-9 = "吶吶，心菜醬。真的能用黎曼函數根決定質數計算函數的振幅嗎？"
1005002-10 = "我不是說過好幾次不要叫我「心菜醬」嗎？"
1005002-11 = "而且最後那個問題到底是什麼鬼啊……"
1005002-12 = "[s1]「辛苦你了。」\n[s2]「梅花園的教官還真不容易呢……」"
1005002-13 = "啊，老師！"
1005002-14 = "啊，老師！"
1005002-15 = "大家快點向老師問好。"
1005002-16 = "老～師～好～"
1005002-17 = "真是的……他們明明就會乖乖地叫你老師，"
1005002-18 = "為什麼都對我叫「心菜醬」呢？"
1005002-19 = "啊，這可不行。"
1005002-20 = "我今天邀請老師來，"
1005002-21 = "應該是要讓老師看看，我身為一名成熟的淑女、合格的教官可靠的一面……！"
1005002-22 = "[s]「雖然還有點靠不住，但已經十分可靠了。」"
1005002-23 = "什麼叫還有點靠不住！"
1005002-24 = "不行，我不能因為這點小事而生氣。"
1005002-25 = "淑女可不能因為一點小事就動搖。"
1005002-26 = "那淑女挑食是沒關係的嗎？心菜醬？"
1005002-27 = "就，就算是淑女也會有一兩樣不喜歡的東西！所以那當然沒關係！"
1005002-28 = "那我們也可以不吃討厭的東西嗎？"
1005002-29 = "那可不行！吃飯必須著重飲食均衡！"
1005002-30 = "為什麼心菜醬可以，我們卻不行啊？好奇怪喔～"
1005002-31 = "那是因為我是教官啊！"
1005002-32 = "可是教官不是應該以身作則嗎，心菜醬？"
1005002-33 = "話，話是這麼說沒有錯……！"
1005002-34 = "老師，你也別光顧著看，快點說些什麼啊！"
1005002-38 = "[ns3]「同學們，大家要乖乖聽心菜教官的話才行喔。」\n[ns4]「我覺得心菜教官以後也不可以再挑食了唷。」"
1005002-39 = "老師竟然叫心菜醬「教官」耶～"
1005002-40 = "老師竟然叫心菜醬「教官」耶～"
1005002-41 = "耶──……可是心菜醬明明就是心菜醬……"
1005002-42 = "既然老師都那樣叫了，這種叫法才是正確的吧？"
1005002-43 = "所以……要叫心菜教官嗎？可是叫心菜「教官」真的感覺好奇怪喔……"
1005002-44 = "沒錯！要叫我心菜教官。我不是說過好幾次了嗎？"
1005002-45 = "心菜教官……？"
1005002-46 = "心菜教官！"
1005002-47 = "[s]「你看起來很開心呢，心菜教官。」"
1005002-48 = "也，也沒有很開心啦。"
1005002-49 = "不過……嘿嘿。這樣你們應該徹底明白了吧？"
1005002-50 = "我是個非常稱職的梅花園教官。"
1005002-51 = "心菜教官～我想要去上廁所～"
1005002-52 = "心菜教官～我好想我的家人～他們什麼時候才會來？"
1005002-53 = "等，等一下！"
1005002-54 = "真是的……小孩子只要活力一來，就完全聽不進別人說的話……"
1005002-55 = "[s]（心菜也還是個小孩子吧……）"
1005002-56 = "……你那是什麼表情，老師？"
1005002-57 = "……是嗎？沒事就算了。你問我會不會辛苦？"
1005002-58 = "沒什麼，將小朋友們培育成一名優秀的學生，是山海經教官的職責。"
1005002-59 = "我不能因為這點小事就氣餒。"
1005002-60 = "心菜教官～！我想要早一點吃點心。"
1005002-61 = "啊──，可是──，我不想吃心菜教官做的點心──，那個好難吃！"
1005002-62 = "我說你們啊，現在距離點心時間還久的很呢。"
1005002-63 = "還有你們等著瞧，我總有一天會做出比旬姊姊更好吃的料理。"
1005002-64 = "到時候我要讓你們所有人都後悔！"
1005002-65 = "哇～心菜醬生氣了～！"
1005002-66 = "為什麼你們又突然改口叫心菜醬了！"

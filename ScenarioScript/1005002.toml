[translation]
1005002-1 = "It's not Kokona. It's Instructor Kokona!"
1005002-2 = "Plum Blossom Garden"
1005002-5 = "Kokona! I want this!"
1005002-6 = "What's the snack today, Kokona?"
1005002-7 = "You can't just call me Kokona. It's Instructor Kokona!"
1005002-8 = "Kokona, I don't understaaaand! Will you do it for me?"
1005002-9 = "Hey, Kokona! Can Riemann zeta function roots really determine the oscillation of a prime-counting function?"
1005002-10 = "How many times do I have to tell you? It's Instructor Kokona! "
1005002-11 = "And what kind of question is that?"
1005002-12 = "[s1] \"It looks like you have a lot on your plate.\"\n[s2] \"Being an instructor at the Plum Blossom Garden seems tough...\""
1005002-13 = "Oh, Sensei!"
1005002-14 = "Oh, Sensei!"
1005002-15 = "Say hello to Sensei, everyone!"
1005002-16 = "Hello, Sensei!"
1005002-17 = "Well, I see they address you as Sensei just fine."
1005002-18 = "So why do they insist on calling me Kokona?"
1005002-19 = "It's not right! "
1005002-20 = "I'm an accomplished instructor. They should treat me as such!"
1005002-21 = "Ah... I'm sorry. Complaining like this isn't professional."
1005002-22 = "[s] \"Don't worry about it. Nobody's perfect.\""
1005002-23 = "What?! No! I have to be perfect!"
1005002-24 = "Ugh... I know I shouldn't be so sensitive."
1005002-25 = "A proper lady is never ruffled by trivial things."
1005002-26 = "Can a proper lady be a picky eater, Kokona?"
1005002-27 = "Y-yes. Even a proper lady has one or two dislikes."
1005002-28 = "Does that mean we don't have to eat stuff we don't like?"
1005002-29 = "No! You still need a balanced diet!"
1005002-30 = "But you eat whatever you want! Why can't we?"
1005002-31 = "Because I'm the instructor!"
1005002-32 = "Doesn't that mean you should set a good example for us, Kokona?"
1005002-33 = "I—yes, but—"
1005002-34 = "Sensei, will you say something please?!"
1005002-38 = "[ns3] \"Of course. Do what Instructor Kokona says, everyone.\"\n[ns4] \"They make a good point. Everyone, Instructor Kokona won't be picky anymore.\""
1005002-39 = "Hey, Sensei said \"Instructor Kokona\"!"
1005002-40 = "Hey, Sensei said \"Instructor Kokona\"!"
1005002-41 = "I thought it's just Kokona..."
1005002-42 = "No, Sensei called her that. So it must be right!"
1005002-43 = "Well, it's a little weird, but... I guess we should call her Instructor Kokona then."
1005002-44 = "I must have told you my name a hundred times. Now you remember? "
1005002-45 = "Instructor Kokona?"
1005002-46 = "Instructor Kokona!"
1005002-47 = "[s] \"You look happy, Instructor Kokona.\""
1005002-48 = "I-I am... But it's not a big deal. "
1005002-49 = "Ahem! Now you all know. "
1005002-50 = "I'm the Plum Blossom Garden instructor."
1005002-51 = "Instructor Kokona! I need to go potty!"
1005002-52 = "Instructor Kokona! I miss my family. When are they coming?"
1005002-53 = "W-Wait!"
1005002-54 = "Kids... Always too excited to listen..."
1005002-55 = "[s] \"(It's not just the kids...)\""
1005002-56 = "...What is it, Sensei?"
1005002-57 = "I know it seems like I have a lot on my shoulders."
1005002-58 = "But it's my job as a Shanhaijing instructor to guide each child to become a great student."
1005002-59 = "And I love doing that. So I can't really complain."
1005002-60 = "Instructor Kokona! I want a snack!"
1005002-61 = "But not YOUR snacks. Those suck."
1005002-62 = "It's not time for snacks yet."
1005002-63 = "And just you wait. One day, I'll make something even better than Shun."
1005002-64 = "Then I'll make everyone eat their words!"
1005002-65 = "Wow! Kokona is mad!"
1005002-66 = "Why are you calling me Kokona again?!"

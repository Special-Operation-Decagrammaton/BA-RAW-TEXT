[translation]
1005002-1 = "ไม่ใช่โคโคน่าจังนะคะ ผู้ฝึกสอนต่างหากค่ะ!"
1005002-2 = "สวนต้นบ๊วย ซานไห่จิง"
1005002-5 = "โคโคน่าจัง~ หนูอยากได้อันนี้~"
1005002-6 = "โคโคน่าจัง~ ของว่างวันนี้มีอะไรให้หม่ำๆ เหรอ?"
1005002-7 = "ไม่ใช่โคโคน่าจังนะ ผู้ฝึกสอนโคโคน่าต่างหาก!"
1005002-8 = "โคโคน่าจัง~ ไม่เข้าใจอันนี้อะ สอนให้หน่อยจิ"
1005002-9 = "โคโคน่าจัง พื้นฐานของฟังก์ชันซีตาของรีมันกำหนดมาจากฟังก์ชันนับจำนวนเฉพาะใช่มั้ย?"
1005002-10 = "บอกกี่ครั้งแล้วว่าอย่าเรียกว่า \"โคโคน่าจัง\" น่ะ"
1005002-11 = "แล้วคำถามเมื่อกี้นี้มันอะไรกัน..."
1005002-12 = "[s1] \"ทำงานหนักน่าดูเลยนะ\"\n[s2] \"ผู้ฝึกสอนของสวนต้นบ๊วยนี่สุดยอดเลยน้า...\""
1005002-13 = "อ๊ะ คุณครู!"
1005002-14 = "อ๊ะ คุณครู!"
1005002-15 = "ทุกคน ทักทายคุณครูก่อนสิ"
1005002-16 = "สวัสดีค่า คุณครู~"
1005002-17 = "จริงๆ เลยเด็กพวกนี้ ทั้งที่เรียกคุณครูว่า \"คุณครู\" ได้ถูกต้องแท้ๆ"
1005002-18 = "แต่ทำไมถึงเรียกฉันว่า \"โคโคน่าจัง\" กันล่ะคะ?"
1005002-19 = "อ๊ะ ไม่ใช่เวลามาคุยเรื่องนี้สักหน่อย "
1005002-20 = "ในฐานะผู้ฝึกสอนและกุลสตรีที่สง่างาม"
1005002-21 = "ฉันเชิญคุณครูมาวันนี้ก็เพื่อแสดงภาพลักษณ์ที่น่าเชื่อถือให้ดูค่ะ...!"
1005002-22 = "[s] \"ถึงจะมีจุดที่ดูไม่น่าเชื่อถืออยู่บ้าง แต่ภาพรวมก็พอได้อยู่นะ\""
1005002-23 = "จุดที่ไม่น่าเชื่อถืออะไรกันล่ะคะ!"
1005002-24 = "ไม่สิ จะมาหัวร้อนง่ายๆ เพราะเรื่องแค่นี้ไม่ได้ค่ะ"
1005002-25 = "กุลสตรีไม่ควรแสดงให้เห็นว่าหวั่นไหวกับเรื่องเล็กน้อยแบบนี้ค่ะ"
1005002-26 = "แล้วกุลสตรีเลือกกินได้เหรอ โคโคน่าจัง?"
1005002-27 = "ถะ...ถึงจะเป็นกุลสตรี แต่ก็ต้องมีสิ่งที่ไม่ชอบอยู่สักอย่างสองอย่างบ้าง เพราะงั้นไม่เป็นไรหรอก!"
1005002-28 = "ถ้างั้นพวกเราไม่กินของที่ไม่ชอบก็ได้ใช่มั้ย?"
1005002-29 = "เรื่องนั้นไม่ได้เด็ดขาด! ต้องกินให้หมดนะ!"
1005002-30 = "ทำไมโคโคน่าจังเลือกกินได้ แต่พวกเราทำไม่ได้ล่ะ? แปลกๆ น้า~"
1005002-31 = "นั่นก็เพราะฉันเป็นผู้ฝึกสอนยังไงล่ะ!"
1005002-32 = "ยิ่งเป็นผู้ฝึกสอนก็ควรทำเป็นตัวอย่างที่ดีให้เราไม่ใช่รึไง โคโคน่าจัง?"
1005002-33 = "ระ... เรื่องนั้นมันก็จริงอยู่หรอก...!"
1005002-34 = "คุณครูก็อย่ามัวแต่ยืนเฉยๆ สิคะ ช่วยพูดอะไรสักหน่อยสิคะ!"
1005002-38 = "[ns3] \"ทุกคนต้องฟังที่ผู้ฝึกสอนโคโคน่าพูดนะ\"\n[ns4] \"ต่อไปผู้ฝึกสอนโคโคน่าก็จะไม่เลือกกินแล้วละ\""
1005002-39 = "คุณครูเรียกโคโคน่าจังว่าผู้ฝึกสอนด้วยละ~"
1005002-40 = "คุณครูเรียกโคโคน่าจังว่าผู้ฝึกสอนด้วยละ~"
1005002-41 = "เอ่อ... แต่ว่าโคโคน่าจังก็คือโคโคน่าจังนี่นา..."
1005002-42 = "แต่ถ้าคุณครูเรียกแบบนั้นก็น่าจะถูกแล้วนี่?"
1005002-43 = "ถ้างั้น... ต้องเรียกว่าผู้ฝึกสอนโคโคน่าเหรอ? แต่เรียกว่าผู้ฝึกสอนก็แปลกๆ นะ..."
1005002-44 = "ใช่แล้ว! ฉันคือผู้ฝึกสอนนะ ต้องให้บอกอีกกี่ครั้งกันเนี่ย? "
1005002-45 = "ผู้ฝึกสอนโคโคน่า...?"
1005002-46 = "ผู้ฝึกสอนโคโคน่า!"
1005002-47 = "[s] \"ยิ้มไม่หุบเลยน้า ผู้ฝึกสอนโคโคน่า\""
1005002-48 = "สะ...สังเกตเห็นชัดมากเลยเหรอคะ? "
1005002-49 = "แต่ว่า... อะแฮ่ม เท่านี้ก็ยืนยันได้แล้วใช่มั้ยคะ? "
1005002-50 = "ว่าฉันเป็นผู้ฝึกสอนของสวนต้นบ๊วยอย่างแน่นอน"
1005002-51 = "ผู้ฝึกสอนโคโคน่า~ หนูอยากเข้าห้องน้ำ~"
1005002-52 = "ผู้ฝึกสอนโคโคน่า~ หนูคิดถึงบ้านแล้ว~ เมื่อไรป่าป๊ากับหม่าม้าจะมาอ่ะ?"
1005002-53 = "ระ...รอเดี๋ยวสิ!"
1005002-54 = "เฮ้อ พวกเด็กๆ เนี่ย... พอได้ทำอะไรตามใจแล้วก็ไม่เคยยอมฟังที่พูดเลย..."
1005002-55 = "[s] (โคโคน่าก็เป็นเด็กคนหนึ่งเหมือนกันไม่ใช่รึไงน่ะ...)"
1005002-56 = "ทำสีหน้าแบบนั้นหมายความว่ายังไงคะ คุณครู?"
1005002-57 = "ไม่มีอะไรงั้นเหรอคะ? ฉัน...ดูเหนื่อยๆ งั้นเหรอคะ?"
1005002-58 = "อะไรกันคะ การชี้นำให้เด็กๆ เติบโตขึ้นเป็นนักเรียนที่ยอดเยี่ยม เป็นหน้าที่และความรับผิดชอบของ#nผู้ฝึกสอนของซานไห่จิงนะคะ"
1005002-59 = "งานเล็กๆ น้อยๆ แค่นี้ ฉันจะบ่นได้ยังไงกันล่ะคะ"
1005002-60 = "ผู้ฝึกสอนโคโคน่า~ หนูอยากหม่ำๆ ขนมแล้ว "
1005002-61 = "อ๊ะ แต่ไม่เอาขนมที่ผู้ฝึกสอนโคโคน่าทำนะ ไม่เห็นจะอร่อยสักกะนิดเลย"
1005002-62 = "พวกเธอ! ยังไม่ถึงเวลาของว่างเลยนะ?"
1005002-63 = "คอยดูแล้วกัน สักวันฉันจะทำอาหารให้อร่อยกว่าพี่ชุนให้ได้เลย"
1005002-64 = "พอถึงตอนนั้นพวกเธอจะต้องเสียใจกันทุกคนเลย!"
1005002-65 = "ว้าว~ โคโคน่าจังโกรธแล้วววว~"
1005002-66 = "ทำไมถึงกลับมาเรียกโคโคน่าจังอีกแล้วล่ะ!"

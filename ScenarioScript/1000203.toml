1000203-78 = "#na;(하루나와 함께 심야의 다실에서 100엔짜리 컵라면을 사이좋게 먹었다.)"
1000203-79 = "#na;(……평범하게 맛있었다.)"
1000203-80 = "#place;집으로 돌아가는 길"
1000203-81 = "3;하루나;02;후후…… 오늘의 연구는 어떠셨나요?\n#3;a"
1000203-82 = "3;하루나;01;제 기준으로 말씀드리자면, 굉장히 맛있었습니다. 평소의 라면과는 다른 맛이었어요."
1000203-83 = "3;하루나;99;조용하고 고즈넉한 다실. 운치있는 공간. 거기서 먹는 라면…….\n#3;em;…"
1000203-84 = "3;하루나;01;과연, 이런 것인가. 하는 깨달음이 있었습니다."
1000203-85 = "3;하루나;02;변수 통제를 조금만 더 해보면 컵라면도를 완성시킬 수 있을 것 같습니다."

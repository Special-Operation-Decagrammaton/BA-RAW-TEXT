1000203-66 = "#3;hide\n#na;(쪼르르르르륵-)"
1000203-67 = "#na;(하루나가 굉장히 집중해서 물을 내리고 있었기에, 정좌하고 같이 지켜볼 수밖에 없었다.)"
1000203-68 = "3;하루나;07;하아…… 하아…… \n#3;em;[땀]\n#3;stiff\n#3;a"
1000203-69 = "3;하루나;99;물을 내리는 것도 꽤 집중력이 필요한 일이군요."
1000203-70 = "3;하루나;01;이제 됐습니다. 스톱워치를 3분에 맞추고……"
1000203-71 = "#all;hide"
1000203-72 = "#na;(3분뒤-)"

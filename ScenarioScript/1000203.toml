[translation]
1000203-1 = "#title;고고한 길"
1000203-2 = "#place;게헨나 외곽의 다실"
1000203-3 = "3;하루나;02;기다리고 있었습니다. 선생님.\n#3;a\n#3;greeting\n#3;em;[반짝]"
1000203-4 = "[s] \"굉장한 장소네…….\""
1000203-5 = "3;하루나;01;후후후. 선생님과의 탐구 시간이니 힘을 좀 써봤습니다. 연구하는데 돈을 아낄 필요는 없으니까요."
1000203-6 = "3;하루나;99;오늘 자정까지 통채로 대여해두었으니, 방해없이 연구에 몰두할 수 있겠죠."
1000203-7 = "3;하루나;01;심야 시간의 전통 다실. 모든 환경 요인은 의도된 대로입니다."
1000203-8 = "3;하루나;02;그럼 시작해보겠습니다.\n#3;em;[반응]"
1000203-9 = "[s1] \"네. 어려운 영역이라서 도움이 될까 모르겠지만…….\"\n[s2] \"응. 조금 긴장되네…….\""
1000203-10 = "#wait;100"
1000203-11 = "#wait;100"
1000203-12 = "3;하루나;01\n#3;m2\n#wait;1000"
1000203-13 = "3;하루나;01\n#3;greeting"
1000203-14 = "#na;(턱-)"
1000203-15 = "#na;(하루나가 테이블 위에 컵라면을 올려놓았다.)"
1000203-16 = "[s3] \"………………?\"\n[s4] \"…………………컵라면?\""
1000203-17 = "3;하루나;02;오늘의 미식 연구는 바로 컵라면입니다.\n#3;em;[반응]"
1000203-18 = "3;하루나;02;오늘의 미식 연구는 바로 컵라면입니다.\n#3;em;[반응]"
1000203-19 = "3;하루나;01;네? 다도가 아니냐고요?"
1000203-20 = "3;하루나;99;무슨 말씀인지…… 저는 오늘 다도를 연구하겠다고 말한 적은 없어요. \n#3;em;…"
1000203-21 = "3;하루나;05;다도가 궁극의 예절이 아닌가, 하고 말한 적은 있습니다만."
1000203-22 = "3;하루나;05;핵심은 이것입니다. 무언가를 먹을 때의 자세, 환경, 태도, 마음 가짐 등이 총체적으로 맛을 결정한다면,\n#3;m3"
1000203-23 = "3;하루나;99;그렇다면 그런 자세로 컵라면을 먹는다면 어떻게 될 것인가?\n#3;em;…"
1000203-24 = "3;하루나;05;명명하자면 이것은 컵라면도."
1000203-25 = "3;하루나;06;컵라면도의 탐구인 것입니다! \n#3;closeup\n#3;em;[!]"
1000203-26 = "[s5] \"………설득력이,\"\n[s6] \"………있어!\""
1000203-27 = "3;하루나;01;후후. 그렇습니다. 선생님이라면 이 심오한 세계를 이해해줄 수 있으리라 믿었습니다.\n#3;em;[음표]"
1000203-28 = "3;하루나;01;후후. 그렇습니다. 선생님이라면 이 심오한 세계를 이해해줄 수 있으리라 믿었습니다.\n#3;em;[음표]"
1000203-29 = "3;하루나;02;자, 그럼. 재료부터 안내드리죠.\n#3;greeting"
1000203-30 = "3;하루나;01\n#3;d\n#wait;1000"
1000203-31 = "#3;hide\n1;하루나;01\n#1;a\n#wait;1000\n#1;greeting"
1000203-32 = "#na;(턱-)"
1000203-33 = "#na;(하루나가 비싸보이는 질그릇을 꺼냈다.)"
1000203-34 = "1;하루나;01;장인이 만든 그릇입니다. 이걸로 뜨거운 물을 끓일 겁니다."
1000203-35 = "1;하루나;01\n#1;d\n#wait;1000"
1000203-36 = "#1;hide\n4;하루나;01\n#4;a\n#wait;1000\n#4;greeting"
1000203-37 = "#na;(하루나가 작은 물통을 꺼냈다.)"
1000203-38 = "4;하루나;02;그리고 이것은 게헨나 화산 지역의 지하 500미터에서 채취한 암반수입니다."
1000203-39 = "4;하루나;01;다양한 미네랄이 함유된 귀한 온천수로, 굉장히 비싼 가격에 구입했습니다.\n#4;em;[반짝]"
1000203-40 = "4;하루나;01\n#4;d\n#wait;1000"
1000203-41 = "#4;hide\n2;하루나;01\n#2;a\n#wait;1000\n#2;greeting"
1000203-42 = "#na;(하루나가 큰 바구니를 꺼냈다.)"
1000203-43 = "2;하루나;01;이것은 참나무로 만든 숯입니다. 이것 역시 매우 비싼 물건으로, 균일한 온도를 유지해서 물을 균일한 온도로 끓이게 해줄 거구요."
1000203-44 = "2;하루나;01\n#2;d\n#wait;1000"
1000203-45 = "#2;hide\n#wait;1000"
1000203-46 = "#wait;1000"
1000203-47 = "#na;(턱-, 턱-, 턱-!)"
1000203-48 = "3;하루나;02;이것은 시간을 잴 초시계, 이것은 물의 온도를 잴 온도계, 이것은 최고급 대나무 젓가락, 이것은 물을 부을 드립포트…….\n#3;a\n#3;em;[반짝]"
1000203-49 = "3;하루나;01;후후. 이런 느낌이겠군요. 자아, 시작해볼까요?"
1000203-50 = "3;하루나;02;물을 끓여오겠습니다.\n#3;em;[음표]"
1000203-51 = "#all;hide"
1000203-52 = "#na;하루나;어디보자…… 숯에 불은 어떻게 피우는 건지……."
1000203-53 = "#na;하루나;콜록, 콜록! 어라, 불대신 연기가……!"
1000203-54 = "#na;하루나;아궁이라는 건 이런 식인가요……! 그릇을 올릴 수가……."
1000203-55 = "#na;(약 2시간 동안 숯에 불을 피우고, 질그릇에 물을 넣어 끓여서, 드립포트에 뜨거운 물을 담아 왔다.)"
1000203-56 = "#na;(……문득, 다실 한구석에 전기 포트가 보였지만, 아무말도 하지 않기로 했다.)"
1000203-57 = "#all;hide"
1000203-58 = "3;하루나;01;……후후. 오래 기다리셨습니다. 준비는 끝났어요.\n#3;a\n#3;em;[반짝]"
1000203-59 = "[s7] \"배고파서…… 얼른 먹자.\"\n[s8] \"이제 먹을 수 있겠네…….\""
1000203-60 = "3;하루나;05;아뇨. 본격적인 시작은 이제부터입니다."
1000203-61 = "3;하루나;05;아뇨. 본격적인 시작은 이제부터입니다."
1000203-62 = "3;하루나;99;물을 붓는 것, 뜨거운 물이 제일 먼저 면에 닿아야 하는지, 스프에 닿아야 하는지, 또한 물줄기의 굵기와 길이는 어떻게 되어야 하는지……!\n#3;em;…"
1000203-63 = "3;하루나;05;물을 붓는 것은 핸드드립 방식으로 정했습니다. 나선형, 동전형, 점형 등 다양한 세부 방식이 있지만, 여기서는 나선형으로……!\n#3;em;[반응]"
1000203-64 = "3;하루나;05;커피를 내리는 걸 보고 배운 것이니, 분명 이 방식이 맞을 겁니다."

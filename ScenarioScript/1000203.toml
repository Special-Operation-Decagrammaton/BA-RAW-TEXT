[translation]
1000203-1 = "The Dignified Path"
1000203-2 = "Gehenna Outskirts Teahouse "
1000203-3 = "I've been waiting for you, Sensei."
1000203-4 = "[s] \"This place is incredible...\""
1000203-5 = "Heh. Research time is important, so I wanted the best. I spare no expense when it comes to research."
1000203-6 = "We can research in peace—the entire place is ours until midnight."
1000203-7 = "What better place than a teahouse late at night?"
1000203-8 = "Let's get started, then."
1000203-9 = "[s1] \"Sure. This is a difficult subject, so I don't know how helpful I'll be...\"\n[s2] \"Okay, but I'm a little nervous...\""
1000203-14 = "*thump*"
1000203-15 = "(Haruna put a cup of instant ramen on the table.)"
1000203-16 = "[s3] \"...?\"\n[s4] \"...Instant ramen?\""
1000203-17 = "Today's epicurean research subject is instant cup ramen."
1000203-18 = "Today's epicurean research subject is instant cup ramen."
1000203-19 = "Huh? Why not have a tea ceremony?"
1000203-20 = "There's been a misunderstanding. I never said we'd be researching tea ceremonies today."
1000203-21 = "All I said was that tea ceremonies teach the ultimate form of etiquette."
1000203-22 = "Consider the following. If posture, atmosphere, demeanor, and mindset determine how we perceive what we taste..."
1000203-23 = "...what would happen if we apply the same philosophy when eating cup ramen?"
1000203-24 = "In other words, instant cup ramen... "
1000203-25 = "...is worthy of being researched!"
1000203-26 = "[s5] \"...I'm convinced.\"\n[s6] \"...Now I get it!\""
1000203-27 = "Heh heh. Very good! I knew you'd understand its profoundness!"
1000203-28 = "Heh heh. Very good! I knew you'd understand its profoundness!"
1000203-29 = "Now, let me explain what we'll be using for this experiment."
1000203-32 = "*thump*"
1000203-33 = "(Haruna takes out an expensive-looking pot.)"
1000203-34 = "This pottery was made by an artisan. I'll be using it to boil our water."
1000203-37 = "(Haruna takes out a small water bottle.)"
1000203-38 = "This is artesian water from over 500 meters underground in Gehenna's volcanic region."
1000203-39 = "It's very expensive mineral water. And I mean very."
1000203-42 = "(Haruna takes out a large basket.)"
1000203-43 = "This is charcoal made from oak—yet another expensive item. It will help the water boil to an even temperature."
1000203-47 = "*tick* *tick* *tick*"
1000203-48 = "I also have a stopwatch to measure the time, a thermometer to measure the temperature of the water, a pair of the finest bamboo chopsticks, and, finally, a drip pot to pour the water..."
1000203-49 = "Heh heh. Everything looks good. Shall we start?"
1000203-50 = "Allow me to boil the water."
1000203-52 = "Let's see...how do I light the charcoal?"
1000203-53 = "*cough* *cough* Huh? There's no fire—just smoke...!"
1000203-54 = "Is this how a furnace is supposed to work? How am I supposed to use the pottery...?"
1000203-55 = "(It took us two hours to light the charcoal. Finally, she put water in the pot, boiled it, and brought the boiled water in the drip pot.)"
1000203-56 = "(That was when I saw the electric kettle in the corner of the teahouse, but decided not to say anything.)"
1000203-58 = "Heh. Thanks for waiting. It's ready to go."
1000203-59 = "[s7] \"I'm starving... Please feed me.\"\n[s8] \"Now we can eat...\""
1000203-60 = "Slow down. We're only getting started!"
1000203-61 = "Slow down. We're only getting started!"
1000203-62 = "We still have to decide how to pour the water and if the hot water should touch the noodles or the powdered seasoning first!"
1000203-63 = "I was thinking of going with the hand-drip method. There are different patterns for pouring water, such as the spiral, circle, and dots, but I'll go with the spiral pour...!"
1000203-64 = "This is how I first learned to make hand-drip coffee, so it should work."
1000203-66 = "*trickle*"
1000203-67 = "(I have no choice but to silently watch Haruna pour the water with great concentration.)"
1000203-68 = "*pant* *pant*"
1000203-69 = "Pouring water requires so much concentration."
1000203-70 = "That should do. I'll set three minutes on the stopwatch... "
1000203-72 = "(Three minutes later.)"
1000203-76 = "Here you go, Sensei!"
1000203-78 = "(Haruna and I ate our 100-yen instant cup ramen in the teahouse late at night.)"
1000203-79 = "(...It tasted good, just like ordinary ramen should.)"
1000203-80 = "On the Way Home"
1000203-81 = "Heh heh... What did you think of today's research?"
1000203-82 = "I thought it was rather tasty—different from ordinary ramen."
1000203-83 = "Eating ramen in an elegant space like a quiet and peaceful teahouse..."
1000203-84 = "I wondered if what I felt in that moment was enlightenment."
1000203-85 = "I think we can perfect the Tao of cup ramen with a little more experimentation."
1000203-86 = "Heh... But that's enough for today. See you later!"
1000203-88 = "(I saw Haruna off. She seemed very satisfied as we parted ways.)"

[translation]
1000203-1 = "เส้นทางที่สง่างาม"
1000203-2 = "ร้านน้ำชา ชานเมืองเกเฮนน่า"
1000203-3 = "กำลังรออยู่เลยค่ะ คุณครู"
1000203-4 = "[s] \"ที่นี่สุดยอดเลย....\""
1000203-5 = "ฮุฮุฮุ เพราะเป็นช่วงเวลาที่ได้มาวิจัยร่วมกับคุณครู ฉันเลยเลือกแต่สิ่งที่ดีที่สุดค่ะ#nและเราก็ไม่ควรประหยัดเงินในการวิจัยด้วยค่ะ"
1000203-6 = "ฉันจองร้านน้ำชานี้เอาไว้จนถึงเที่ยงคืนค่ะ เพราะงั้นเราทำการวิจัยได้โดยไม่มีใครมารบกวน"
1000203-7 = "ร้านน้ำชาในยามเย็นแบบนี้... เป็นที่ที่เหมาะมากเลยนะคะ"
1000203-8 = "ถ้างั้นเรามาเริ่มกันเลยเถอะค่ะ"
1000203-9 = "[s1] \"ก็ได้ เรื่องนี้ยากพอควร ไม่รู้ว่าครูจะช่วยได้รึเปล่า...\"\n[s2] \"อื้อ กังวลนิดหน่อยแฮะ...\""
1000203-14 = "(แกร็ก!)"
1000203-15 = "(ฮารุนะหยิบราเม็งสำเร็จรูปขึ้นมาวางไว้บนโต๊ะ)"
1000203-16 = "[s3] \"...?\"\n[s4] \"...ราเม็งถ้วย?\""
1000203-17 = "อาหารที่เราจะศึกษาวันนี้ก็คือราเม็งถ้วยค่ะ"
1000203-18 = "อาหารที่เราจะศึกษาวันนี้ก็คือราเม็งถ้วยค่ะ"
1000203-19 = "คะ? ทำไมถึงไม่มีพิธีชงชาเหรอคะ?"
1000203-20 = "พูดเรื่องอะไรกันคะ... ฉันไม่เคยบอกเลยว่าวันนี้จะมาศึกษาพิธีชงชานะคะ"
1000203-21 = "ฉันแค่บอกว่าพิธีชงชาเป็นพิธีสอนมารยาทขั้นสูงเท่านั้นเองค่ะ"
1000203-22 = "หัวใจสำคัญคือสิ่งนี้ค่ะ ท่าทาง สิ่งแวดล้อม ทัศนคติ และความคิดในตอนที่เรากินอะไรบางอย่าง#nจะเป็นตัวกำหนดว่าเรารับรู้รสชาติได้ยังไง"
1000203-23 = "แล้วถ้าเรานำเรื่องพวกนั้นมาลองใช้ในตอนกินราเม็งถ้วยมันจะเป็นยังไงกัน?"
1000203-24 = "อีกอย่างหนึ่งคือราเม็งถ้วยเองก็...."
1000203-25 = "เป็นอาหารที่ควรศึกษาเหมือนกันค่ะ! "
1000203-26 = "[s5] \".....พูดได้น่าสนใจดีนะ\"\n[s6] \".....เข้าใจล่ะ!\""
1000203-27 = "ฮุฮุ เอาละค่ะ ฉันคิดแล้วว่าถ้าเป็นคุณครูคงจะเข้าใจจุดประสงค์ของเรื่องนี้"
1000203-28 = "ฮุฮุ เอาละค่ะ ฉันคิดแล้วว่าถ้าเป็นคุณครูคงจะเข้าใจจุดประสงค์ของเรื่องนี้"
1000203-29 = "ถ้างั้น... ฉันจะอธิบายเรื่องวัตถุดิบให้ฟังค่ะ"
1000203-32 = "(แกร็ก!)"
1000203-33 = "(ฮารุนะหยิบหม้อดินเผาที่ดูราคาแพงออกมา)"
1000203-34 = "นี่เป็นหม้อดินเผาที่ปั้นโดยช่างฝีมือค่ะ เราจะใช้หม้อนี่ในการต้มน้ำค่ะ"
1000203-37 = "(ฮารุนะหยิบขวดน้ำเล็กๆ ออกมา)"
1000203-38 = "และนี่ก็คือน้ำจากแหล่งน้ำลึก 500 เมตรในเขตภูเขาไฟของเกเฮนน่าค่ะ"
1000203-39 = "นี่เป็นน้ำแร่ธรรมชาติที่อุดมไปด้วยสารอาหารมากมาย ฉันซื้อมาในราคาที่แพงพอสมควรค่ะ"
1000203-42 = "(ฮารุนะยกตะกร้าใบใหญ่ขึ้นมาวาง)"
1000203-43 = "นี่คือถ่านจากไม้ต้นโอ๊กค่ะ ถ่านไม้พวกนี้ก็มีราคาที่แพงมาก#nมันจะช่วยทำให้น้ำมีอุณหภูมิเหมาะสมตามที่เราต้องการได้ค่ะ"
1000203-47 = "(ติ๊กต่อกๆ)"
1000203-48 = "นี่คือนาฬิกาสำหรับใช้จับเวลาค่ะ ส่วนนี่ก็เทอร์โมมิเตอร์สำหรับวัดอุณหภูมิ#nส่วนนี่คือตะเกียบไม้ไผ่อย่างดีแล้วก็กาสำหรับเทน้ำลงในถ้วย...."
1000203-49 = "ฮุฮุ ทุกอย่างพร้อมแล้วค่ะ มาเริ่มกันเลยไหมคะ?"
1000203-50 = "ฉันจะต้มน้ำก่อนค่ะ\n"
1000203-52 = "ไหนดูซิ... จะจุดถ่านยังไงนะ...."
1000203-53 = "แค่กๆ แค่กๆ! เอ๋? ทำไมถึงมีแต่ควันไม่มีไฟเลยล่ะ....!"
1000203-54 = "เวลาจุดเตาถ่านแล้วจะเป็นแบบนี้เหรอ....! ถ้างั้นจะตั้งหม้อดินเผายังไงล่ะ...."
1000203-55 = "(ฮารุนะใช้เวลาสองชั่วโมงในการจุดไฟ ใส่น้ำลงในหม้อดินเผาและรินน้ำเดือดลงในกาน้ำ)"
1000203-56 = "(....คุณครูแอบหันไปเห็นกาต้มน้ำไฟฟ้า แต่ก็ไม่ได้พูดอะไรออกไป)"
1000203-58 = "....ฮุฮุ ขอบคุณที่รอนะคะ เสร็จเรียบร้อยแล้วค่ะ"
1000203-59 = "[s7] \"หิวแล้วล่ะ... รีบกินเถอะ\"\n[s8] \"ได้กินสักทีนะ....\""
1000203-60 = "ยังค่ะ เรากำลังจะเริ่มช่วงสำคัญกันต่างหาก"
1000203-61 = "ยังค่ะ เรากำลังจะเริ่มช่วงสำคัญกันต่างหาก"
1000203-62 = "เราจะต้องคิดก่อนว่าจะเทน้ำร้อนลงในถ้วยยังไง แล้วก็ต้องคิดด้วยว่าควรเทน้ำร้อน#nให้โดนเส้นก่อนหรือเทให้โดนเครื่องปรุงก่อน... แล้วก็ปริมาณน้ำที่จะเทลงไปก่อนสิคะ...!"
1000203-63 = "ฉันคิดว่าจะใช้วิธีแฮนด์ดริปในการเทน้ำค่ะ อันที่จริงการเทน้ำใส่ก็มีหลากหลายวิธีเช่น การเทวน#nการเทเป็นวงกลม หรือการเทให้โดนจุดจุดเดียว แต่คราวนี้ฉันจะเทแบบวนค่ะ"
1000203-64 = "ฉันเรียนรู้เคล็ดลับพวกนี้มาจากการทำกาแฟดริปค่ะ"
1000203-66 = "(เทน้ำลงในถ้วย)"
1000203-67 = "(คุณครูไม่มีทางเลือกอื่นนอกจากนั่งมองฮารุนะค่อยๆ เทน้ำลงในถ้วยอย่างตั้งใจ)"
1000203-68 = "อะ...อ่า..."
1000203-69 = "การเทน้ำลงในถ้วยต้องใช้สมาธิสูงมากเลยนะคะ"
1000203-70 = "เรียบร้อยแล้วละค่ะ ฉันจะตั้งเวลาเอาไว้สามนาที...."
1000203-72 = "(3 นาทีต่อมา)"
1000203-76 = "พร้อมทานแล้วค่ะคุณครู!"
1000203-78 = "(คุณครูกับฮารุนะนั่งกินราเม็งถ้วยราคาหนึ่งร้อยเยนด้วยกันอย่างมีความสุข)"
1000203-79 = "(รสชาติดี....เหมือนราเม็งถ้วยทั่วๆ ไป)"
1000203-80 = "ระหว่างทางกลับบ้าน"
1000203-81 = "ฮุฮุ... การทดลองวันนี้เป็นยังไงบ้างคะ?"
1000203-82 = "ฉันคิดว่ามันอร่อยมากเลยค่ะ รสชาติแตกต่างจากราเม็งทั่วๆ ไปเลย"
1000203-83 = "การได้นั่งกินราเม็งในร้านน้ำชาหรูหรา และเงียบสงบ...."
1000203-84 = "ในที่สุดฉันก็ได้เข้าใจความรู้สึกนั้นแล้วค่ะ"
1000203-85 = "ถ้าทดลองเพิ่มเติมอีกสักหน่อย ฉันคิดว่าเราคงจะทำราเม็งถ้วยที่สมบูรณ์แบบได้ค่ะ"
1000203-86 = "ฮุฮุ... ขอบคุณสำหรับวันนี้นะคะ"
1000203-88 = "(คุณครูเดินไปส่งฮารุนะ สีหน้าของเธอดูพอใจอย่างมากตลอดทางที่เดินกลับ)"

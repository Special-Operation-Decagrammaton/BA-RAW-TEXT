[translation]
1000203-1 = "孤高之路"
1000203-2 = "格黑娜外圍．茶室"
1000203-3 = "我等你好久了，老師。"
1000203-4 = "[s] 「好厲害，這樣的場地……」"
1000203-5 = "哼哼，難得可以和老師一起，所以我就特別花了點心思。畢竟研究時多少也是需要資金的。"
1000203-6 = "今天整晚都包下來了，所以不需要擔心被任何人妨礙。"
1000203-7 = "深夜，接著是傳統茶室。完美的環境呢。"
1000203-8 = "那麼就開始吧。"
1000203-9 = "[s1] 「我也不太了解，不知道幫不幫得上忙……」\n[s2] 「有點緊張呢……」"
1000203-14 = "（咚）"
1000203-15 = "（首先羽留奈放在桌上的是……）"
1000203-16 = "[s3] 「……？」\n[s4] 「……杯麵？」"
1000203-17 = "今天的研究主題是杯麵。"
1000203-18 = "今天的研究主題是杯麵。"
1000203-19 = "……？沒錯，不是茶。"
1000203-20 = "沒有什麼特別含意……我並沒有說今天要研究茶道。 "
1000203-21 = "只不過我認為，茶道不就是對食物的禮儀的究極型態嗎。"
1000203-22 = "也就是這麼回事，品嚐食物時的姿勢、環境、態度、心境等等，考慮到任何因素。"
1000203-23 = "將那樣的茶道的姿態，誠心誠意的注入杯麵的話會怎麼樣呢？"
1000203-24 = "沒錯，這不是茶道，而是鑽研杯麵的道路。"
1000203-25 = "也就是，杯麵道的探求！ "
1000203-26 = "[s5] 「有………」\n[s6] 「………說服力！」"
1000203-27 = "哼哼，真不愧是老師呢。我一直相信著如果是老師的話，一定能夠理解這深奧的世界。"
1000203-28 = "哼哼，真不愧是老師呢。我一直相信著如果是老師的話，一定能夠理解這深奧的世界。"
1000203-29 = "那麼，首先將材料。"
1000203-32 = "（咚）"
1000203-33 = "（羽留奈拿出了看起來造價昂貴的陶器）"
1000203-34 = "這是由名匠打造的陶器，用這個來煮熱水。"
1000203-37 = "（接著，拿出了一瓶水）"
1000203-38 = "接著這是在格黑娜火山地區地下500公尺處採集的水。"
1000203-39 = "因為富含了各種礦物質非常稀有，所以果然有點貴呢。"
1000203-42 = "（羽留奈又拿出了什麼東西）"
1000203-43 = "這是用新的橡樹製成的木炭。這也是相當稀有的東西，它能維持均勻的溫度讓水沸騰。"
1000203-47 = "（咻，咻，咻……）"
1000203-48 = "這邊是石英振盪子的手錶，還有用來測水溫的溫度計，還有這是用最高級的竹子做成的筷子，這是用來注入水的……"
1000203-49 = "哼哼，差不多是這樣吧。那麼，我們就開始吧。"
1000203-50 = "首先讓水沸騰吧。"
1000203-52 = "我看看，要讓木炭點著的話……"
1000203-53 = "咳咳，咳咳！"
1000203-54 = "沒有火而是煙……！這到底該怎麼……"
1000203-55 = "（經過了一場殊死搏鬥，約2小時後。進行到了沸水完成的步驟）"
1000203-56 = "（……似乎在茶室的角落看到了電熱水壺，不過裝作沒看到了）"
1000203-58 = "……哼哼。讓您久等了，都準備好了。"
1000203-59 = "[s7] 「辛苦了……」\n[s8] 「終於可以吃了呢……」"
1000203-60 = "不，不可以大意。接下來才是重點。"
1000203-61 = "不，不可以大意。接下來才是重點。"
1000203-62 = "倒水的時候，熱水要面向哪一邊倒入呢，不能觸碰到哪裡呢，要從哪裡以什麼方式倒入呢……！"
1000203-63 = "該考慮的事情有非常多。雖然注入方式也有畫著圓的同時注入，往中心附近注入之類的很多方式，這邊就畫著小圓……！"
1000203-64 = "本來是作為沖泡咖啡的方式學到的，不過這樣肯定可以，那麼。"
1000203-66 = "（咻）"
1000203-67 = "（羽留奈全神貫注於注水，我只能保持正座在一旁看著）"
1000203-68 = "……呼。"
1000203-69 = "雖說只是注水的過程，沒想到認真的對待會是這麼累人的事情呢……"
1000203-70 = "那麼，用手錶計時3分鐘……"
1000203-72 = "（3分鐘後……）"
1000203-76 = "那麼，我們開動吧！ "
1000203-78 = "（深夜的茶室，和羽留奈兩個人奢侈地、融洽地吃著100圓的杯麵）"
1000203-79 = "（……普通好吃）"
1000203-80 = "回家的路上"
1000203-81 = "哼哼……今天如何呢？"
1000203-82 = "就我個人而言，非常美味，和平常吃到的味道截然不同。"
1000203-83 = "靜謐的茶室，在那個氛圍中吃到的杯裝拉麵……"
1000203-84 = "一口就察覺到不同之處了。"
1000203-85 = "只要再試著調整一些因素，安定下來的話，精通杯麵道似乎也不是夢了。"
1000203-86 = "哼哼……那麼，今天就先告辭了。"
1000203-88 = "（目送了帶著滿意的表情離去的羽留奈）"

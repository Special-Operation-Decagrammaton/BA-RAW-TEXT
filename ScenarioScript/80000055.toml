80000055-16 = "3;마리;03;아, 알아봐 주시는군요! 역시 선생님……!\n#3;em;[반응]\n#3;a"
80000055-17 = "3;마리;02;그게……. 오늘은 발렌타인 데이라서…….\n#3;stiff"
80000055-18 = "3;마리;99;평소 감사한 분들께 초콜릿을 드리며 마음을 전하는 날이라고 들었거든요."
80000055-19 = "3;마리;01;그래서 역시 선생님께는 꼭 드려야겠다고 생각했어요.\n#3;em;[음표]\n#3;greeting"
80000055-20 = "3;마리;04;그런데 뭘로 드려야 할지 고민하다 보니, 이런저런 생각이 깊어져서……."
80000055-21 = "3;마리;07;정신을 차리고 보니 어째선지……. 이걸 샀었더라고요……."
80000055-22 = "3;마리;08;……여, 역시 좀 이상한가요……? 좀 더 평범한 초콜릿이 나았으려나…….\n#3;em;[...]"
80000055-23 = "[s3] \"오히려 특색 있어서 좋은걸.\"\n[s4] \"이쪽이 훨씬 기억에 남을 것 같아.\""
80000055-24 = "3;마리;03;그, 그런가요……? 그렇죠? 역시 그렇겠죠……?\n#3;em;[///]"
80000055-25 = "3;마리;03;그, 그런가요……? 그렇죠? 역시 그렇겠죠……?\n#3;em;[///]"
80000055-26 = "3;마리;99;……휴우우…….\n#3;greeting"
80000055-27 = "3;마리;01;감사합니다, 선생님. 그렇게 말씀해 주셔서……."
80000055-28 = "3;마리;07;사실 많이 긴장하고 있었거든요. 이상하게 생각하시면 어떻게 하지……하고. 아하하…….\n#3;em;[땀]\n#3;stiff"
80000055-29 = "3;마리;04;뭔가 제가 드리는 상황인데도 오히려 배려받는 느낌이 들긴 하지만……."
80000055-30 = "3;마리;03;그래도 기뻐요. 선생님께, 제 마음을 전할 수 있어서…….\n#3;em;[음표]"

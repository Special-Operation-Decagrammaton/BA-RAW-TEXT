[translation]
80000055-1 = "該從何吃起……？"
80000055-2 = "（準時在約好的時間抵達後，看見瑪麗已經在噴水池旁等著了）"
80000055-3 = "啊，老師……！謝謝您特地跑一趟。"
80000055-4 = "那個，之所以請老師出來……其實是……"
80000055-5 = "……"
80000055-9 = "請，請收下這個……！"
80000055-14 = "[ns1]「這是什麼，好厲害！？」\n[ns2]「是巧克力，對吧……！？」"
80000055-15 = "是，是巧克力沒錯……！"
80000055-16 = "是，是的！"
80000055-17 = "今天是情人節……"
80000055-18 = "我聽說是藉由巧克力，向想表達平時感謝的對象傳達心情的日子。"
80000055-19 = "所以無論如何都想送巧克力給老師。"
80000055-20 = "不過，因為不知道該送什麼才好而煩惱了很久……"
80000055-21 = "回過神來，不知為何就買了這個……"
80000055-22 = "果，果然很奇怪對吧……？更普通一點的巧克力是不是更好……"
80000055-23 = "[s3]「不奇怪哦，我覺得很好。」\n[s4]「更讓人印象深刻也不錯。」"
80000055-24 = "是，是嗎……？"
80000055-25 = "是，是嗎……？"
80000055-26 = "呵呵……"
80000055-27 = "謝謝您，老師。"
80000055-28 = "那個，我一直很緊張。"
80000055-29 = "心想著送這個真的沒關係嗎、到底該不該送呢，之類的……"
80000055-30 = "但是有送給老師真是太好了。能夠將我的心意傳達給老師……"
80000055-34 = "……？"
80000055-35 = "老師，怎麼了嗎？一直盯著巧克力看……"
80000055-36 = "……咦？"
80000055-37 = "把這個吃下去真的沒問題嗎……？"
80000055-38 = "……"
80000055-39 = "……唔，呃。"
80000055-40 = "這……"
80000055-41 = "頭，頭的部分可能有點不太好……手也有點……從衣角開始吃，之類的……？"
80000055-42 = "咦，咦咦，那吃到哪裡不會有問題呢……！？"
80000055-43 = "我，我們該怎麼做……！！"
80000055-45 = "（接著便和瑪麗一起煩惱巧克力的哪個部分可以吃）"
80000055-49 = "（……結果想了幾個小時都沒有答案，在瑪麗的同意下決定當成擺飾）"

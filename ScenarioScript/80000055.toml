[translation]
80000055-1 = "Is This Blasphemy?"
80000055-2 = "I went to meet Mari at the agreed upon time."
80000055-3 = "I'm very happy to see you, Sensei. Thank you for coming."
80000055-4 = "Why did I ask you to meet with me? Well, y-you see..."
80000055-5 = "Um..."
80000055-9 = "F-For this. If you'd like it..."
80000055-14 = "[ns1] \"A prayer statue?!\"\n[ns2] \"Chocolate?!\""
80000055-15 = "I-It's not a statue! It's chocolate!"
80000055-16 = "Oh, you realized it was chocolate!"
80000055-17 = "Today is Valentine's Day, so..."
80000055-18 = "...I heard it's tradition to give chocolate to someone you admire."
80000055-19 = "Naturally, I thought of you."
80000055-20 = "I began to overthink what to give you, though..."
80000055-21 = "...until I settled on this chocolate statue."
80000055-22 = "Do you think it's strange? Perhaps I should have purchased something more conservative."
80000055-23 = "[s3] \"I like how unique it is.\"\n[s4] \"It's very you.\""
80000055-24 = "Y-You do? Really?"
80000055-25 = "Y-You think? Really?"
80000055-26 = "What a relief..."
80000055-27 = "I'm thrilled you like it, Sensei."
80000055-28 = "I was a bit anxious you would find it strange. Haha..."
80000055-29 = "I wanted to give you a gift, but I feel like I'm getting more in return."
80000055-30 = "I'm so happy that you accepted it."
80000055-34 = "Hmm?"
80000055-35 = "Sensei? Is something wrong with the chocolate?"
80000055-36 = "Huh?"
80000055-37 = "Which part should you eat to avoid blasphemy?"
80000055-38 = "..."
80000055-39 = "Oh, dear."
80000055-40 = "Oh, u-um... Well..."
80000055-41 = "O-Of course not the head... Th-The hand? That would be strange.#nUm... The bottom?"
80000055-42 = "But regardless, you'll end up with just the head if you eat everything else!"
80000055-43 = "Wh-What are we supposed to do?!"
80000055-45 = "We kept trying to figure out what part of the chocolate to eat first."
80000055-49 = "After hours of consideration, nothing seemed right, so we decided to display it instead of eat it."

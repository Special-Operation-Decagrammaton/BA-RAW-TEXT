[translation]
80000055-1 = "เรียกว่าการดูหมิ่นรึเปล่านะ?"
80000055-2 = "(คุณครูมาถึงที่ลานน้ำพุตรงเวลา แล้วเจอมารียืนรออยู่ข้างหน้า)"
80000055-3 = "เชิญเลยค่ะ คุณครู ขอบคุณที่มานะคะ!"
80000055-4 = "คะ...? ฉันเชิญคุณครูมาทำไมน่ะเหรอคะ? ฮะฮะฮ่ะ... คือว่าเรื่องนั้น..."
80000055-5 = "คือ..."
80000055-9 = "นั่นเพราะ...เจ้านี่ค่ะ....! นะ...นี่ค่ะ...!"
80000055-14 = "[ns1] \"เหรียญตราเกียรติยศแห่งการสวดภาวนา?!\"\n[ns2] \"ช็อกโกแลต....?!\""
80000055-15 = "มะ...ไม่ใช่เหรียญตรานะคะ...! ช็อกโกแลตต่างหากค่ะ!"
80000055-16 = "คุณครูดูออกด้วยสินะคะ! สมกับเป็นคุณครูจริงๆ เลยค่ะ!"
80000055-17 = "คือว่า... วันนี้เป็นวันวาเลนไทน์..."
80000055-18 = "ฉันได้ยินว่าเป็นวันที่จะมอบช็อกโกแลตและสื่อความรู้สึกไปให้กับคนที่เรารู้สึกซาบซึ้งค่ะ"
80000055-19 = "เพราะงั้นฉันก็เลยอยากมอบช็อกโกแลตให้คุณครูค่ะ"
80000055-20 = "ฉันคิดอยู่นานว่าจะให้อะไรกับคุณครูดี คิดไม่ตกอยู่นานเลยค่ะ..."
80000055-21 = "แต่ว่าพอรู้ตัวอีกที... ก็ซื้อเจ้านี่มาซะแล้วค่ะ"
80000055-22 = "มะ...มันแปลกใช่มั้ยคะ...? ฉันน่าจะเลือกช็อกโกแลตที่ธรรมดาๆ กว่านี้มาสินะคะ..."
80000055-23 = "[s3] \"ดูมีเอกลักษ์ดีออกนะ\"\n[s4] \"ดูว้าวจนลืมไม่ลงดีออก\""
80000055-24 = "งะ...งั้นเหรอคะ...? นั่นสินะคะ คิดอย่างนั้นจริงเหรอคะ?"
80000055-25 = "งะ...งั้นเหรอคะ...? นั่นสินะคะ คิดอย่างนั้นจริงเหรอคะ?"
80000055-26 = "เฮ้อ..."
80000055-27 = "ขอบคุณค่ะ คุณครู พูดแบบนี้ฉันดีใจนะคะ"
80000055-28 = "ที่จริงฉันค่อนข้างกังวลมากเลยค่ะ คิดมากไปเองว่าถ้าคุณครูมองแปลกๆ จะทำยังไงดี... อ่ะฮะฮะ..."
80000055-29 = "ทั้งที่ฉันเป็นฝ่ายให้ของขวัญคุณครูแท้ๆ แต่ก็รู้สึกเหมือนว่ากำลังได้รับความเอาใจใส่จากคุณครูอยู่#nเลยนะคะ..."
80000055-30 = "แต่ฉันดีใจนะคะ ที่ได้สื่อความรู้สึกถึงคุณครูแบบนี้..."
80000055-34 = "หืม...?"
80000055-35 = "คุณครู? มีอะไรเหรอคะ? ทำไมจ้องช็อกโกแลตไม่วางตาแบบนั้นคะ..."
80000055-36 = "คะ...?"
80000055-37 = "ต้องกินตรงไหนก่อนถึงจะไม่เป็นการดูหมิ่นความศักดิ์สิทธิ์เหรอคะ?"
80000055-38 = "..."
80000055-39 = "เอ่อ... เอ๋?"
80000055-40 = "เอ๊ะ... ระ...เรื่องนั้น... เอ่อ... คือว่า..."
80000055-41 = "เริ่มจากตรงหัวก่อนคงไม่ดี... มะ...มือเป็นยังไงคะ มะ...ไม่ได้สิ ไม่ดีแน่... ชายเสื้อเป็นยังไงคะ?"
80000055-42 = "ดะ...เดี๋ยวก่อนนะคะ ถ้ากินแบบนั้นก็จะเหลือแต่ส่วนหัว...?!"
80000055-43 = "ทำยังไงดี... ฉันควรทำยังไงดี...!"
80000055-45 = "(หลังจากนั้นคุณครูกับมารีก็ช่วยกันครุ่นคิดอย่างหนักว่าจะต้องกินจากส่วนไหนก่อนดี)"
80000055-49 = "(หลังจากคิดอยู่หลายชั่วโมงแต่ก็ยังไม่ได้คำตอบ จึงตกลงกันว่าจะไม่กินช็อกโกแลตนี้และเก็บเอาไว้#nตั้งโชว์)"

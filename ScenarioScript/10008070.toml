10008070-32 = "Aru, look over there. Over there!"
10008070-39 = "You managed to wrestle our offering box away from those hooligans. I don't know how to thank you."
10008070-41 = "Wait. Aren't you...?"
10008070-42 = "The manager of Daikichiden."
10008070-44 = "Oh, that outfit. Are you perhaps one of our part-timers?"
10008070-45 = "Well this is a pleasant surprise!"
10008070-46 = "Not only have you been helping us around the shrine, you even assisted in retrieving the offering box."
10008070-50 = "I'll be sure to reward each of you later. Now, if you'll kindly hand over the offering box."
10008070-51 = "Stop right there."
10008070-52 = "Whatever seems to be the matter?"
10008070-53 = "You said in that interview that whoever retrieved the offering box could have what's inside. Wasn't that the rule?"
10008070-55 = "That's right. I almost forgot about that."
10008070-56 = "Right, you said it on that broadcast!"
10008070-58 = "Yet here you are trying to make off with it now. Why the sudden change of heart?"
10008070-61 = "..."
10008070-62 = "I did say something like that, didn't I...?"
10008070-63 = "Well, you see. The thing is..."
10008070-74 = "Wh-Where did they come from?!"
10008070-75 = "Haha! They got the jump on us, huh?"
10008070-76 = "Are you looking for a fight?"
10008070-78 = "Things would have been much simpler had you simply forgotten what I said in that interview. "

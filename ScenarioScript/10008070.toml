[translation]
10008070-1 = "第7話;千鈞一髮（１）"
10008070-3 = "咕啊！被～打～敗～了～！"
10008070-4 = "我，我們的夢想啊……！"
10008070-5 = "我們的正義，竟然會斷絕在這種惡徒手裡……！"
10008070-12 = "[ns]「成功了……？」"
10008070-13 = "成，成功了！亞瑠大人！"
10008070-14 = "哈啊，哈啊……這樣就，結束了嗎？"
10008070-15 = "意外的不怎麼樣呢？"
10008070-17 = "那也沒什麼不好。我可不想再繼續下去了。"
10008070-18 = "呵呵，大家辛苦了。這就是我們便利屋68＋α團結的成果。"
10008070-19 = "啊啊，當然老師的指揮也非常出色哦。"
10008070-20 = "托老師的福，解決得比想像中更容易。"
10008070-21 = "……那個，這是很好的讚美哦？"
10008070-22 = "真不愧是我們便利屋的68合夥人♪"
10008070-23 = "[s]「嗯，謝謝。」"
10008070-27 = "那麼，接著只要找出並回收賽錢箱……"
10008070-29 = "哈哈哈。各位，真是太感謝了。"
10008070-31 = "嗯……？#n這種時候究竟是誰……？"
10008070-32 = "亞瑠醬，那邊那邊。"
10008070-39 = "非常感謝各位替我從那群惡徒手中奪回賽錢箱。#n真不知道該如何感謝各位……"
10008070-41 = "那個……？"
10008070-42 = "是大吉殿的負責人哦。"
10008070-44 = "哦？那副打扮……難道是巫女工讀生嗎？"
10008070-45 = "這還真是不好意思，本來就已經有勞你了，居然連取回賽錢箱都願意幫忙……！"
10008070-46 = "實在是太感謝了。"
10008070-50 = "回去之後我會好好答謝各位的。#n那麼就先……"
10008070-51 = "慢著。"
10008070-52 = "……有什麼事嗎？"
10008070-53 = "……拿回來的人可以得到裡面的錢。規則不是這樣嗎？"
10008070-55 = "啊，說的也是……"
10008070-56 = "就是呀～#n所以，你為什麼要抱著那個賽錢箱呢？"
10008070-58 = "該不會，是打算就這樣把它拿走吧？"
10008070-61 = "……"
10008070-62 = "這下可傷腦筋了，這麼說來我好像是有說過那種話……"
10008070-63 = "關於這點該怎麼說才好呢，事情是這樣的……"
10008070-74 = "從，從哪裡冒出這麼多……！？"
10008070-75 = "啊哈哈！怎麼啦？"
10008070-76 = "難道想反咬我們一口？"
10008070-78 = "要是你們能再聰明一點，或者至少裝作沒注意到的話，事情就能圓滿落幕了……"
10008070-79 = "真傷腦筋，實在是令人頭痛。"
10008070-80 = "……你打從一開始就沒有打算遵守直播上說過的承諾吧。"
10008070-81 = "[s]「既然如此，又為何要說那種話……？」"
10008070-82 = "八成和之前的手法一樣。利用社群網站和媒體促使他人行動。"
10008070-83 = "這樣一來，就能在避免弄髒自己的手的情況下推動計畫……是這麼回事吧？"
10008070-85 = "為了從凱坦澤手中拿回賽錢箱，利用了那些看直播的人……！？"
10008070-87 = "腦袋真機靈呢。#n誠如你所說，單純只是「利用」了媒體。"
10008070-88 = "「賽錢箱裡的錢歸拿回來的人所有」，我只是加了這句小小的謊言罷了。"
10008070-92 = "於是大量的人從奇普托斯各地聚集而來的結果……#n就是像這樣，讓賽錢箱回到我手中了不是嗎？"
10008070-94 = "什麼……！？"
10008070-96 = "哎呀哎呀，所謂媒體的力量真是太了不起了。"
10008070-97 = "[s]「這就是黑龜組的手段……」"
10008070-98 = "原來如此，看來你已經掌握了我們的情報了呢。"
10008070-99 = "那是當然！就連你們利用大吉殿來洗錢這件事也是！"
10008070-100 = "哈哈哈！這樣事情就簡單了。"
10008070-101 = "……？"
10008070-108 = "事跡敗露就算了。#n就像個地下社會的居民，用武力來解決問題吧。"
10008070-109 = "[s]「……來了！」"
10008070-111 = "咦，咦！？"

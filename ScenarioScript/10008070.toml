[translation]
10008070-1 = "Episode 7;In a Pinch! Part 1"
10008070-3 = "They got us!"
10008070-4 = "Our dream! What do we do now, Red?"
10008070-5 = "How can this be? How has our justice been stomped out by these villains?"
10008070-12 = "[ns] \"I think we won.\""

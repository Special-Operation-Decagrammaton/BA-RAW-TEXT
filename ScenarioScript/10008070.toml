[translation]
10008070-1 = "ตอนที่ 7;สถานการณ์คับขัน! 1"
10008070-3 = "โดน~เข้า~ซะ~แล้ว~!"
10008070-4 = "เรด...! ความฝันที่ยิ่งใหญ่ของพวกเรา...!"
10008070-5 = "ความยุติธรรมของพวกเรา... จะต้องมาถูกบดขยี้ลงด้วยน้ำมือของพวกวายร้ายแบบนี้งั้นเหรอ...!"
10008070-12 = "[ns] \"อ๊ะ สลบไปแล้ว\""
10008070-13 = "สะ...สำเร็จแล้วค่ะ ท่านอารุ!"
10008070-14 = "เฮ้อ... จบได้สักทีนะ..."
10008070-15 = "อืมมมม~ ดูเหมือนจะจัดการได้ง่ายกว่าที่คิดนะ แต่ว่า..."
10008070-17 = "แค่นี้ก็พอแล้วละ เราไม่ควรจะให้มันมีเรื่องวุ่นวายร้ายแรงเกิดขึ้นที่นี่นะ"
10008070-18 = "ฮู่ว ทุกคนทำได้ดีมาก แสดงให้เห็นถึงความเป็นหนึ่งเดียวกันของหน่วยรับจ้างสารพัดได้ดีทีเดียว"
10008070-19 = "อ๊ะ การสั่งการของคุณครูก็ยอดเยี่ยมเหมือนกัน"
10008070-20 = "เพราะคุณครูมาด้วยเลยช่วยให้คลี่คลายสถานการณ์ได้เร็วกว่าที่คิดเลยนะ"
10008070-21 = "อืม... เรื่องนั้นต้องขอชื่นชมสุดๆ เลย "
10008070-22 = "อืม... สมกับเป็นหุ้นส่วนธุรกิจของหน่วยรับจ้างสารพัดของเราจริงๆ♪"
10008070-23 = "[s] \"ทำตัวไม่ถูกเลยแฮะ\""
10008070-27 = "ถ้างั้นตอนนี้ก็แค่เอาตู้บริจาคที่เจ้าพวกนั้นขโมยไปคืนมา..."
10008070-29 = "ฮะฮ่าฮ่า ทุกคน ขอบใจมากนะ"
10008070-31 = "หืม...? ใครโผล่มาอีกน่ะ?"
10008070-32 = "อารุจัง ดูตรงนั้นสิ"
10008070-39 = "พวกเธอช่วยลงมือจัดการกับพวกอาชญากรแทนพวกเราแบบนี้ ผมไม่รู้จะกล่าวขอบคุณยังไงดี..."
10008070-41 = "คุณคือ..."
10008070-42 = "ผู้ดูแลของไดคิจิเดนนี่"
10008070-44 = "โฮ่ ชุดแบบนั้น เด็กคนนั้นใช่มิโกะพาร์ทไทม์ที่จ้างมารึเปล่า?"
10008070-45 = "โฮ่ โฮ่ โฮ่! ให้มันได้แบบนี้สิ!"
10008070-46 = "ไม่คิดเลยว่าเด็กพาร์ทไทม์จะเข้ามาช่วยเรื่องนี้ด้วย ผมรู้สึกขอบคุณมากจริงๆ!"
10008070-50 = "ดีละ ถ้านำตู้บริจาคกลับไปแล้ว ผมจะตอบแทนทุกๆ คนเป็นการส่วนตัวเอง เพราะงั้นช่วยส่งตู้บริจาค#nคืนมาให้ผมก่อนได้ไหมครับ?"
10008070-51 = "เดี๋ยวก่อน"
10008070-52 = "หืม? มีอะไรเหรอครับ?"
10008070-53 = "ถ้าตามที่คุณประกาศในไลฟ์สดตอนนั้น คนที่เอาตู้บริจาคคืนมาได้จะได้เงินทั้งหมดไป คุณพูดเอง#nไม่ใช่รึไง?"
10008070-55 = "นั่นสิ... ลืมไปซะสนิทเลย"
10008070-56 = "อ่ะฮ่า~ จริงด้วยน้า คุณพูดแบบนั้นตอนไลฟ์ข่าวนี่นา~?"
10008070-58 = "แต่พอมาถึงตอนนี้แล้วจะเอาคืนไปแบบนี้งั้นเหรอ ไม่เหมือนที่คุยกันไว้นี่นา?"
10008070-61 = "..."
10008070-62 = "ฮะฮะฮะ จริงด้วยสิ นึกๆ ดูแล้วผมก็พูดแบบนั้นไปจริงๆ"
10008070-63 = "อืม... เรื่องนั้นจะบอกทุกคนยังไงดีล่ะ คือว่าเรื่องนั้น..."
10008070-74 = "จู่ๆ ก็โผล่มาได้ยังไงกันละเนี่ย?!"
10008070-75 = "ฮ่าฮ่าฮ่า! อะไรกันเนี่ย"
10008070-76 = "คิดจะทำอะไรกันแน่น่ะ?"
10008070-78 = "อืม... ถ้าทำเป็นลืมๆ ไปโดยไม่พูดถึงเรื่องนี้ขึ้นมาอีก ก็คงจะไม่ต้องเสียหน้าแบบนี้... \n"
10008070-79 = "แต่ในเมื่อสถานการณ์มันกลายเป็นแบบนี้ไปแล้ว ก็คงไม่ได้หรอกครับ ใช่แล้วละ คงให้ไม่ได้หรอก"
10008070-80 = "ว่าแล้วเชียว... ที่พูดออกอากาศไปตอนนั้น คงไม่ได้คิดจะรักษาคำพูดตั้งแต่แรกแล้วใช่ไหมล่ะ?"
10008070-81 = "[s] \"ถ้างั้นทำไมถึงพูดแบบนั้นออกอากาศไปล่ะ?\""
10008070-82 = "ก็คงเป็นลูกไม้เก่าๆ เหมือนที่เคยใช้นั่นล่ะ ใช้ประโยชน์จากโซเชียลให้คนอื่นเคลื่อนไหวแทน"
10008070-83 = "เหมือนภาษิตที่ว่ายืมจมูกคนอื่นมาหายใจแทนไงล่ะ คิดจะทำแบบนั้นใช่มั้ย"
10008070-85 = "อ๊ะ! หลอกใช้คนที่ดูถ่ายทอดสดงั้นเหรอ...!"
10008070-87 = "\nโฮ่ จริงๆ เลยนะ แต่ก็เป็นอย่างที่พูดนั่นล่ะ สื่อโซเชียลน่ะ มันขึ้นอยู่กับการใช้งาน "
10008070-88 = "เพราะงั้นเลยเพิ่มคำโกหกนิดๆ หน่อยๆ อย่างเช่น \"จะยกเงินให้กับคนที่พบตู้บริจาค\" เข้าไป..."
10008070-92 = "ดูสิ คนที่เชื่อคำพูดนั้นก็ออกค้นหาตู้บริจาคนี่จนวุ่นวายไปหมดทั่วคิโวทอส จนสุดท้ายตู้บริจาคก็กลับ#nมาอยู่ตรงหน้าผมแบบนี้ไงล่ะ"
10008070-94 = "อึก...?!"
10008070-96 = "สำหรับพวกเราขอแค่ให้ได้ตู้บริจาคกลับมาก็พอ การใช้สื่อโซเชียลนี่เป็นวิธีที่วิเศษมากๆ เลยใช่ไหม#nละครับ..."
10008070-97 = "[s] \"นี่เป็นวิธีของพวกแก๊งคุโรคาเมะสินะ....\""
10008070-98 = "ฮ่าฮ่า... มองทะลุปรุโปร่งถึงขั้นนั้นเลยหรือครับ?\n"
10008070-99 = "ใช่! พวกเรารู้อยู่แล้วละ! ทั้งเรื่องที่ตู้บริจาคของไดคิจิเดนเป็นเครื่องมือฟอกเงินผิดกฎหมายนั่นด้วย...!"
10008070-100 = "ฮ่ะฮ่ะฮ่า! ถ้างั้นก็คงง่ายขึ้นนะครับ"
10008070-101 = "หะ...หืม?"
10008070-108 = "ก็แค่ทำตามวิธีของคนในโลกมืดไงครับ... แค่ใช้กำลังแย่งมา"
10008070-109 = "[s] \"ทุกคนเตรียมตัวเร็ว!\""
10008070-111 = "หะ...หืม?!"

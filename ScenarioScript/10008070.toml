10008070-80 = "I knew it. You were never going to honor what you said in that interview to begin with."
10008070-81 = "[s] \"Why say something like that in the first place? On video no less.\""
10008070-82 = "Because it was the same tactic as before. They were using mass media and social networks to manipulate everyone."
10008070-83 = "Which let them get what they wanted without getting their hands dirty."
10008070-85 = "You were lying on the internet...? Who would do such a thing?!"
10008070-87 = "Why, yes. I was. It's so easy to manipulate the media. "
10008070-88 = "All I had to do was tell a little white lie about gifting the offering box to whoever recovered it, and look what happened."
10008070-92 = "Free labor from all over Kivotos volunteered to do my dirty work for me, and just like that, the offering box is back in my hands."
10008070-94 = "Gah!"
10008070-96 = "All we cared about was getting the offering box back.#nUsing the media was the best way to achieve it."
10008070-97 = "[s] \"All in a day's work for the Kurokame Gang, huh?\""
10008070-98 = "You're quick on the uptake! I like that."
10008070-99 = "More than that! We already figured out everything. We know Daikichiden's offering box was being used for laundering dirty money!"
10008070-100 = "Good. That simplifies things."
10008070-101 = "H-Huh?"

[translation]
1004815-1 = "Proof That It Wasn't in Vain"
1004815-2 = "A while later, Saori came to me."
1004815-4 = "I'm sorry for the sudden visit, Sensei."
1004815-5 = "But there was a piece of equipment I really wanted to fix."
1004815-6 = "...This."
1004815-11 = "[ns] \"Your mask?\""
1004815-12 = "Right. The purification filter's broken."
1004815-13 = "It's a discontinued model, with special parts, so the repair shop wouldn't take it."
1004815-14 = "[s] \"It must be pretty old, then.\""
1004815-15 = "I got it from Arius Satellite School on my first real mission. It's their old base model."
1004815-16 = "Anyway, if you can, Sensei, please help me find a way to fix it."
1004815-17 = "If you can manage that, I'll do anything for you."
1004815-18 = "[s] \"Anything?\""
1004815-19 = "Y-Yes. Anything."
1004815-20 = "[s1] \"This mask must really mean a lot to you.\"\n[s2] \"Is there a story behind it?\""
1004815-25 = "...Like I mentioned, it was part of my original kit."
1004815-26 = "Nothing special about the mask itself. It's classified as a consumable."
1004815-27 = "A particularly sturdy and durable consumable..."
1004815-28 = "...but it did wear out eventually."
1004815-29 = "Back in the old days, if one of my tools broke or lost its purpose..."
1004815-30 = "...I would have thrown it out without a second thought."
1004815-31 = "But this mask is more like a companion to me."
1004815-32 = "Like a partner."
1004815-33 = "Even if it's broken..."
1004815-34 = "I don't want to throw it away like it's nothing."
1004815-35 = "So I want to fix it."
1004815-36 = "Because...I'm different than I was back then."
1004815-37 = "[s] \"I see...\""
1004815-41 = "[ns3] \"I understand why you're so determined.\"\n[ns4] \"Let's find a way to fix it together!\""
1004815-44 = "You mean it? Thank you, truly."
1004815-45 = "[s] \"Fufufu. Don't forget your promise. We get this fixed, you'll do 'anything.'\""
1004815-46 = "S-Sure. A promise is promise, after all."
1004815-48 = "I set out with confidence, but..."
1004815-50 = "Oh, I haven't seen this kind of mask in a while. I didn't know there was anyone still using it."
1004815-51 = "Unfortunately, it looks like almost every part needs to be replaced."
1004815-52 = "I'm overbooked already, so I'm not sure when I could get to it..."
1004815-53 = "Do you have at least a rough idea?"
1004815-54 = "Mmm... A few years at the very least, honestly."
1004815-55 = "...I see."
1004815-57 = "Oh my, welcome. What are you looking for?"
1004815-58 = "...What? I'm sorry, but I don't have any parts for that kind of mask..."
1004815-59 = "I can't even remember the last time I've seen one."
1004815-60 = "Would you rather buy a new one instead? I have plenty of better models."
1004815-61 = "...I'm sorry. It has to be this mask for me."
1004815-63 = "Fufufu, welcome. I've got just the parts you need for this."
1004815-64 = "Here's my estimate. What do you say?"
1004815-65 = "Ouch, that's expensive...but you have the parts?"
1004815-66 = "Well, technically not yet, but I can get them. Should be able to get them. One way or another."
1004815-67 = "...Let's go, Sensei."
1004815-69 = "We went to many different stores afterwards, but we had no luck with any of them."
1004815-72 = "It's night already?"
1004815-73 = "Well, I knew this wouldn't be easy."
1004815-74 = "Maybe this is just my stubbornness coming through."
1004815-75 = "...I guess, even if the filter doesn't work, I can still use it to hide my face."
1004815-76 = "Thank you for bearing with me, Sensei. I'll find a way to repay you for—"
1004815-77 = "[s5] \"Hold on!\"\n[s6] \"We can't give up like this!\""
1004815-80 = "But if there's nobody who can fix it..."
1004815-81 = "[s7] \"Ah, there's still one person.\"\n[s8] \"You're looking at them, Saori!\""
1004815-84 = "...Sensei?"
1004815-85 = "[s9] \"I've done basic repairs before.\"\n[s10] \"I can learn what I don't know and make it work.\""
1004815-88 = "I-I thought about trying it myself too."
1004815-89 = "But it's not so easy."
1004815-90 = "[s11] \"I'm sure it won't be.\"\n[s12] \"I'd rather try than give up.\""
1004815-96 = "Well, if you're willing to try, I'm happy to help."
1004815-97 = "Let me know if you need anything."
1004815-98 = "[s13] \"You can help by handling Schale's student rep work for now.\"\n[s14] \"Let's both make it happen!\""
1004815-101 = "Me, as Schale's student rep...?"
1004815-102 = "...Yes. I'll work my hardest."
1004815-104 = "The next day..."
1004815-108 = "I started fixing the mask, with Saori helping out."
1004815-118 = "I knew it'd be hard, but I hadn't quite understood HOW hard..."
1004815-126 = "...so I ended up working day and night."
1004815-128 = "I thoroughly researched things I didn't know..."
1004815-129 = "...and salvaged replacement parts from other devices."
1004815-136 = "And all through that hard work..."
1004815-137 = "...I prayed that Saori's beloved \"companion\" would pull through."
1004815-142 = "A few days later..."
1004815-144 = "Hm... Huh? Is it morning already?"
1004815-145 = "I must've nodded off."
1004815-146 = "Hm...? Sensei? Why are you smiling?"
1004815-147 = "[s15] \"Fufufu, I did it...\"\n[s16] \"Mission accomplished!!\""
1004815-153 = "Could it be...?! Did you fix it?!"
1004815-154 = "[s] \"Yup! Try it on!\""
1004815-160 = "This is..."
1004815-161 = "...It's working. The filter's good as new."
1004815-162 = "You really fixed it."
1004815-166 = "Thank you for all your hard work, Sensei. I'm in your debt again."
1004815-167 = "[s] \"It wouldn't have been possible without your help, Saori.\""
1004815-171 = "[ns] \"We did this as a team.\""
1004815-172 = "The result of all our efforts together."
1004815-173 = "Hearing that makes this mask feel even more special."
1004815-177 = "Thank you, Sensei. I'll take good care of it so it doesn't break again."
1004815-178 = "[s] \"And now to make good on your promise, Saori.\""
1004815-179 = "Promise? Ah..."
1004815-180 = "[s] \"Right, the one where you'll do anything once it's fixed.\""
1004815-181 = "...Of course. I'll do anything you want, Sensei."
1004815-182 = "[s17] \"Fufufu... I have waited so long.\"\n[s18] \"I've always wanted to do this...!!\""
1004815-185 = "...What exactly do you have in mind?"
1004815-186 = "I said I'd do anything, but...were you thinking of something weird?"
1004815-187 = "[s] \"Something VERY awkward and embarrassing, yes.\""
1004815-188 = "Tch...! F-Fine, say what you want!"
1004815-189 = "[ns] \"What I want you to do is...\""
1004815-191 = "[ns] \"...come visit Schale whenever you like.\""
1004815-192 = "How shameless could you...?!"
1004815-193 = "...Huh? What?"
1004815-194 = "[s] \"That's it. Just feel free to swing by whenever.\""
1004815-198 = "[ns19] \"No pressure.\"\n[ns20] \"No need to worry.\""
1004815-201 = "[ns] \"This place is always open to you, Saori.\""
1004815-203 = "...I see. Now that I think about it, I hadn't ever considered visiting here before."
1004815-204 = "The thought of meeting with you one-on-one always made me so nervous."
1004815-205 = "But you've cut through all that."
1004815-206 = "Got it. I'll try then, Sensei."
1004815-207 = "I'll do my best to visit this place with peace of mind."
1004815-208 = "That said...if the mask needs maintenance, could I ask you to help with it again?"
1004815-209 = "Seeing as we're partners in fixing it."
1004815-210 = "[s] \"Of course! Bring it by anytime!\""
1004815-211 = "...You teach me all sorts of new things, Sensei."
1004815-212 = "And I'll look forward to learning more."
1004815-214 = "Saori relaxed after that, and we enjoyed the rest of our time together."

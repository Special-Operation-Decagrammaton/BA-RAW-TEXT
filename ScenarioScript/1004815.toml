[translation]
1004815-1 = "หลักฐานแห่งความไม่สูญเปล่า"
1004815-2 = "(ไม่นานนัก ซาโอริก็มาหาคุณครู)"
1004815-4 = "ขอโทษที่มาหากะทันหันนะ ครู"
1004815-5 = "ฉันมีอุปกรณ์ที่อยากซ่อมแซมอยู่น่ะ"
1004815-6 = "เจ้านี่ไง..."
1004815-11 = "[ns] \"นั่นมัน... หน้ากากของซาโอริเหรอ?\""
1004815-12 = "ใช่ ระบบฟอกอากาศของมันเสียน่ะ"
1004815-13 = "หน้ากากรุ่นนี้เลิกผลิตไปแล้ว และชิ้นส่วนมันก็เป็นชิ้นส่วนแบบพิเศษ พวกร้านรับซ่อมเลยไม่รับน่ะ"
1004815-14 = "[s] \"หน้ากากเก่ากว่าที่ครูคิดเอาไว้อีกนะนั่น?\""
1004815-15 = "มันเป็นของที่ฉันได้รับมาตอนที่ออกปฏิบัติภารกิจภาคสนามของอาเรียสครั้งแรกน่ะ"
1004815-16 = "เอาเป็นว่า ช่วยหาวิธีซ่อมหน้ากากอันนี้ให้หน่อยนะ ครู"
1004815-17 = "ถ้าซ่อมมันได้ ฉันจะยอมทำตามที่คุณครูต้องการทุกอย่างเลย"
1004815-18 = "[s] \"ทุกอย่างเลยเหรอ?\""
1004815-19 = "อะ... อื้ม ทุกอย่างเลย"
1004815-20 = "[s1] \"ดูจากที่ยอมถึงขนาดนั้น แสดงว่ามันเป็นของสำคัญเลยสินะ\"\n[s2] \"มีเรื่องพิเศษอะไรกับหน้ากากอันนี้รึเปล่า?\""
1004815-25 = "อย่างที่บอกไปน่ะ... หน้ากากอันนี้เป็นของที่ฉันได้รับมาตอนไปทำภารกิจ"
1004815-26 = "เป็นแค่ของใช้ทั่วไป ไม่ได้มีอะไรพิเศษหรอก"
1004815-27 = "ข้อดีของอุปกรณ์พวกนี้คือทนทานและไม่เสียหายง่าย"
1004815-28 = "แต่ว่าตอนนี้มันดันพังซะแล้ว"
1004815-29 = "ถ้าเป็นเมื่อก่อน... พวกอุปกรณ์ที่เสียหาย..."
1004815-30 = "ฉันคงทิ้งไปโดยไม่รู้สึกอะไร..."
1004815-31 = "แต่สำหรับฉันในตอนนี้ หน้ากากอันนี้ก็เป็นเหมือนเพื่อนคนสำคัญคนหนึ่งน่ะ"
1004815-32 = "พูดอีกอย่างก็คือ... มันเหมือนคู่หูของฉันน่ะ"
1004815-33 = "ต่อให้มันจะพัง..."
1004815-34 = "ฉันก็ไม่อยากทิ้งไปแค่เพราะมองว่ามันไม่มีประโยชน์แล้ว"
1004815-35 = "เพราะงั้นฉันถึงอยากหาทางซ่อมมันดู"
1004815-36 = "เพราะตอนนี้... มันต่างจากตอนนั้นแล้วน่ะ"
1004815-37 = "[s] \"อย่างนี้นี่เอง...\""
1004815-41 = "[ns3] \"ครูเข้าใจความมุ่งมั่นของซาโอริแล้วละ\"\n[ns4] \"มาหาวิธีซ่อมเด็กคนนี้ด้วยกันเถอะ!\""
1004815-44 = "จะช่วยแล้วใช่มั้ย? ขอบคุณนะ"
1004815-45 = "[s] \"ฮุฮุฮุ อย่าลืมสัญญาที่บอกว่าจะทำทุกอย่างล่ะ\""
1004815-46 = "ระ... รู้แล้วน่า สัญญาต้องเป็นสัญญานั่นละ"
1004815-48 = "(คุณครูออกมาข้างนอกอย่างมั่นใจแต่ว่า...)"
1004815-50 = "โอ้ ไม่เห็นหน้ากากแบบนี้นานแล้วนะครับ ไม่น่าเชื่อเลยว่าจะยังมีคนใช้หน้ากากแบบนี้อยู่"
1004815-51 = "ดูจากสภาพแล้วน่าจะต้องทำชิ้นส่วนใหม่ทั้งหมดเลย"
1004815-52 = "แต่ผมไม่รับประกันว่าจะทำเสร็จเมื่อไรนะครับ เพราะตอนนี้มีคิวงานที่จองไว้ล่วงหน้าเยอะมาก..."
1004815-53 = "แต่ก็น่าจะพอกะเวลาซ่อมคร่าวๆ ได้ไม่ใช่เหรอ?"
1004815-54 = "อืม... น่าจะเสร็จภายในปีนี้นะครับ"
1004815-55 = "งั้นเหรอ..."
1004815-57 = "โอ้ เชิญเลยครับ กำลังหาอะไรอยู่เหรอครับ?"
1004815-58 = "ครับ? ขอโทษด้วยนะครับ เราไม่มีชิ้นส่วนของหน้ากากแบบนี้เลย..."
1004815-59 = "จำไม่ได้แล้วด้วยว่าเคยเห็นหน้ากากแบบนี้ครั้งสุดท้ายเมื่อไร"
1004815-60 = "ลองหาซื้อหน้ากากรุ่นใหม่ดูดีกว่ามั้ยครับ? เรามีหน้ากากที่มีประสิทธิภาพดีกว่าอยู่หลายรุ่นเลยนะครับ"
1004815-61 = "ขอโทษนะ... ฉันไม่อยากได้หน้ากากอันอื่น นอกจากอันนี้น่ะ"
1004815-63 = "ฮุฮุฮุ มาถูกที่แล้วละครับ เรามีชิ้นส่วนของหน้ากากอันนั้นอยู่ครับ"
1004815-64 = "ผมจะให้ราคาพิเศษเลย ราคานี้เป็นยังไงครับ?"
1004815-65 = "แพงไปหน่อยนะ... แต่มีชิ้นส่วนอยู่จริงๆ ใช่มั้ย?"
1004815-66 = "ตอนนี้ยังไม่มีหรอกครับ แต่ผมจะหามาให้ได้ครับ ไม่ว่าจะด้วยวิธีไหนก็ตาม"
1004815-67 = "ไปกันเถอะ ครู..."
1004815-69 = "(หลังจากนั้นทั้งสองคนก็เดินดูอีกหลายร้าน แต่ก็ไม่มีร้านไหนที่ซ่อมได้เลย...)"
1004815-72 = "มืดแล้วเหรอเนี่ย"
1004815-73 = "คิดแล้วเชียวว่าคงหาร้านซ่อมหน้ากากอันนี้ไม่ได้ง่ายๆ"
1004815-74 = "ฉันดันทุรังไปเองโดยเปล่าประโยชน์สินะ"
1004815-75 = "ช่วยไม่ได้... ถึงฟังก์ชั่นกรองอากาศจะเสีย แต่ถ้าแค่ใช้ปิดหน้าก็คงยังพอใช้ได้อยู่"
1004815-76 = "ขอบคุณที่มาเป็นเพื่อนนะครู ฉันจะหาทางตอบแทนเรื่องวันนี้ให้ได้เลย..."
1004815-77 = "[s5] \"เดี๋ยวก่อน อย่าเพิ่งยอมแพ้สิ...!\"\n[s6] \"จะยอมแพ้แบบนี้ไม่ได้นะ!\""
1004815-80 = "แต่ก็ไม่มีช่างซ่อมคนไหนซ่อมได้เลยไม่ใช่รึไง?"
1004815-81 = "[s7] \"ไม่หรอก ยังเหลืออยู่อีกคนหนึ่ง\"\n[s8] \"คนที่อยู่ข้างๆ ซาโอรินี่ไง!\""
1004815-84 = "ครูเหรอ...?"
1004815-85 = "[s9] \"ครูเคยซ่อมอะไรเล็กๆ น้อยๆ มาเหมือนกันนะ\"\n[s10] \"ถ้าค่อยๆ เรียนรู้วิธีไปจะต้องทำได้แน่ๆ\""
1004815-88 = "ฉะ... ฉันเคยคิดว่าจะซ่อมเองแล้วเหมือนกัน"
1004815-89 = "แต่มันไม่ง่ายเลย"
1004815-90 = "[s11] \"เรื่องนั้นครูก็รู้\"\n[s12] \"ครูรู้นะ แต่เราจะยอมแพ้แบบนี้ไม่ได้สิ\""
1004815-96 = "งั้นเหรอ เข้าใจแล้ว ถ้างั้นฉันจะช่วยเอง"
1004815-97 = "ถ้ามีอะไรให้ช่วยก็บอกมาได้เลยนะ"
1004815-98 = "[s13] \"งั้นช่วยมาเข้าเวรตัวแทนที่ชาเล่ต์จนกว่าจะซ่อมเสร็จนะ\"\n[s14] \"เราสองคนมาช่วยกันนะ!\""
1004815-101 = "ให้ฉันไปเข้าเวรตัวแทนที่ชาเล่ต์...?"
1004815-102 = "ก็ได้... ฉันจะไม่ยอมแพ้จนถึงที่สุด"
1004815-104 = "(วันต่อมา...)"
1004815-108 = "(คุณครูเริ่มลงมือซ่อมหน้ากากกับซาโอริ)"
1004815-118 = "(การซ่อมหน้ากากยากกว่าที่คิด...)"
1004815-126 = "(ทั้งสองคนยังคงช่วยกันซ่อมต่อไปจนถึงดึกดื่น)"
1004815-128 = "(ส่วนเรื่องที่ไม่รู้ก็ต้องหาข้อมูลกันอย่างเร่งด่วน...)"
1004815-129 = "(ชิ้นส่วนที่เสียหายก็นำชิ้นส่วนจากหน้ากากอันอื่นมาเปลี่ยนแทน)"
1004815-136 = "(ถึงจะเป็นงานที่ยากลำบาก...)"
1004815-137 = "(แต่ก็หวังให้ 'เพื่อน' คนสำคัญของซาโอริกลับมาสมบูรณ์เหมือนเดิม)"
1004815-142 = "(หลายวันต่อมา...)"
1004815-144 = "อืม... อะไรน่ะ? เช้าแล้วเหรอ?"
1004815-145 = "ฉันคงเผลอหลับไปโดยไม่รู้ตัวสินะ"
1004815-146 = "หืม...? ครู? ทำไมถึงยิ้มอย่างนั้นล่ะ?"
1004815-147 = "[s15] \"ฮุฮุฮุ สำเร็จแล้วละ...\"\n[s16] \"ภารกิจสำเร็จแล้ว!!\""
1004815-153 = "หรือว่า....! ซ่อมได้แล้วเหรอ?!"
1004815-154 = "[s] \"อื้อ! ลองใช้ดูสิ!\""
1004815-160 = "นี่มัน..."
1004815-161 = "ใช้งานได้ดีเลย ฟังก์ชันที่เสียก็ใช้ได้ปกติแล้ว"
1004815-162 = "ซ่อมได้แล้วจริงๆ ด้วยสินะ"
1004815-166 = "เหนื่อยแย่เลยนะ ครู คราวนี้ฉันติดหนี้บุญคุญครั้งใหญ่เลย"
1004815-167 = "[s] \"ถ้าซาโอริไม่ช่วย ครูคงทำไม่ได้หรอก\""
1004815-171 = "[ns] \"นี่เป็นชัยชนะของทีมนะ\""
1004815-172 = "ผลงานของครูกับฉัน..."
1004815-173 = "พอพูดแบบนั้นแล้วก็รู้สึกว่าหน้ากากอันนี้ยิ่งพิเศษขึ้นไปอีกนะ"
1004815-177 = "ขอบคุณมากเลยนะ ครู ฉันจะรักษาอย่างดีไม่ให้มันพังอีก"
1004815-178 = "[s] \"เอาละ ถึงเวลาที่ซาโอริจะทำตามสัญญาแล้ว\""
1004815-179 = "สัญญา? อ๋อ..."
1004815-180 = "[s] \"ใช่แล้ว! ที่บอกว่าถ้าซ่อมได้จะทำตามทุกอย่างไง!\""
1004815-181 = "รู้แล้วละ... ฉันจะทำตามที่ครูบอกทุกอย่างเลย"
1004815-182 = "[s17] \"ฮุฮุฮุ... รอเวลานี้มานานแล้ว\"\n[s18] \"ครูอยากทำแบบนี้มานานแล้ว...!!\""
1004815-185 = "นี่คิดจะสั่งให้ทำอะไรกันแน่เนี่ย...?"
1004815-186 = "ถึงฉันจะบอกว่าจะทำทุกอย่างตามที่สั่งก็เถอะ แต่นี่คิดจะให้ฉันทำอะไรแปลกๆ อยู่ใช่มั้ย?"
1004815-187 = "[s] \"ใช่แล้ว! ครูจะให้ซาโอริทำอะไรที่น่าอายที่สุดเลยละ!\""
1004815-188 = "อึก...! ชะ... เชิญตามสบายเลย!"
1004815-189 = "[ns] \"และสิ่งที่ครูจะขอให้ทำก็คือ...!\""
1004815-191 = "[ns] \"ขอให้ซาโอริมาเที่ยวที่ชาเล่ต์ได้ตลอดเลยนะ\""
1004815-192 = "คิดแล้วเชียวว่าจะต้องขออะไรหน้าไม่อาย...!"
1004815-193 = "เอ๋...? ว่ายังไงนะ?"
1004815-194 = "[s] \"แวะมาที่ชาเล่ต์ได้ตลอดเลยนะ\""
1004815-198 = "[ns19] \"ไม่ต้องรู้สึกกดดัน\"\n[ns20] \"ไม่ต้องพูดว่าขอโทษ\""
1004815-201 = "[ns] \"ที่นี่ยินดีต้อนรับซาโอริเสมอเลยนะ\""
1004815-203 = "อย่างนั้นเหรอ... นึกดูแล้ว ฉันไม่เคยคิดที่จะแวะมาเที่ยวเล่นที่นี่เลย"
1004815-204 = "เวลาที่เจอครูทีไรก็รู้สึกประหม่าตลอด"
1004815-205 = "ครูมองเห็นเรื่องพวกนั้นมาโดยตลอดเลยสินะ"
1004815-206 = "เข้าใจแล้วละ ฉันจะพยายามทำตามที่ครูขอนะ"
1004815-207 = "จะพยายามมาที่นี่ให้ได้อย่างสบายใจ..."
1004815-208 = "เพราะงั้น... ฉันจะขอฝากเรื่องการซ่อมบำรุงหน้ากากอันนี้กับครูได้มั้ย?"
1004815-209 = "เพราะพวกเรา... เป็นคู่หูที่ช่วยกันซ่อมมันนี่นา"
1004815-210 = "[s] \"ได้อยู่แล้ว! มาได้เสมอเลย ไม่ต้องห่วง!\""
1004815-211 = "อื้ม... ฉันได้เรียนรู้อะไรจากครูเยอะเลยละ"
1004815-212 = "งั้นหลังจากนี้ก็ฝากด้วยนะ"
1004815-214 = "(หลังจากนั้นคุณครูก็ได้มีช่วงเวลากับซาโอริที่ดูผ่อนคลายขึ้นมาก)"

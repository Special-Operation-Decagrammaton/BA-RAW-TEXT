[translation]
1004815-1 = "一切並非徒勞的證據"
1004815-2 = "（不久後，沙織來了）"
1004815-4 = "抱歉突然來打擾你，老師。"
1004815-5 = "不過我有一個無論如何都想修好的裝備。"
1004815-6 = "……就是這個。"
1004815-11 = "[ns]「那是……沙織的面罩？」"
1004815-12 = "是啊。它的過濾功能故障了。"
1004815-13 = "不過因為已經停產，加上零件特殊的關係，所以找不到願意維修的店家。"
1004815-14 = "[s]「沒想到這副面罩已經有點年份了呢？」"
1004815-15 = "這是我第一次上陣實戰的時候，奧利斯分校配發的補給品。"
1004815-16 = "總之拜託你了，老師。#n請幫我找找能修好這副面罩的方法。"
1004815-17 = "只要能修好它，不管老師要我做什麼都可以。"
1004815-18 = "[s]「什麼都可以嗎？」"
1004815-19 = "沒，沒錯。什麼都可以。"
1004815-20 = "[s1]「既然願意做到這種程度，看來這副面罩對你來說很重要吧。」\n[s2]「背後有什麼特別的故事嗎？」"
1004815-25 = "……就像剛才說的一樣，這副面罩是為了作戰配給的補給品之一。"
1004815-26 = "只是個平平無奇的消耗品而已。"
1004815-27 = "它的優點在於堅固耐用……"
1004815-28 = "可惜終究還是壞了。"
1004815-29 = "如果是以前的話，假如工具失去功能──"
1004815-30 = "……我應該會毫不在意地丟掉吧。"
1004815-31 = "然而這副面罩對現在的我來說，已經是形影不離的重要夥伴了。"
1004815-32 = "某種意義上……就像我的搭擋一樣。"
1004815-33 = "即便它故障了──"
1004815-34 = "我也不想將它當作一無是處的東西丟掉。"
1004815-35 = "所以我想要修好它。"
1004815-36 = "現在……已經跟當時不同了。"
1004815-37 = "[s]「這樣啊……」"
1004815-41 = "[ns3]「沙織的決心我明白了。」\n[ns4]「一起想辦法修好它吧！」"
1004815-44 = "你願意幫忙嗎？#n真的很謝謝你。"
1004815-45 = "[s]「哼哼哼，不過可別忘了剛剛答應我願意做任何事的約定哦。」"
1004815-46 = "知，知道了。畢竟約定就是約定。"
1004815-48 = "（雖然走出門外時充滿了鬥志……）"
1004815-50 = "哦，這款面罩真的很久沒見過了呢。#n沒想到還有人在使用它。"
1004815-51 = "以這個狀態來說，零件幾乎全都得重新製作。"
1004815-52 = "不過我目前還有很多預約，沒辦法保證什麼時候能完成……"
1004815-53 = "可以大概預估一下時間嗎？"
1004815-54 = "唔嗯……起碼也要以年為單位吧？"
1004815-55 = "……是嗎。"
1004815-57 = "哎呀，歡迎光臨。#n在找什麼嗎？"
1004815-58 = "嗯？抱歉，那款面罩的零件已經完全賣完了……"
1004815-59 = "我甚至都想不起來最後一次看到是多久以前的事了。"
1004815-60 = "乾脆買個全新的怎麼樣？#n這邊有很多性能更好的面罩。"
1004815-61 = "……抱歉，我非這副面罩不可。"
1004815-63 = "呵呵呵，兩位可找對人了。#n我正好有那款產品的零件。"
1004815-64 = "這次特別以這個價格提供給兩位，你們看怎麼樣？"
1004815-65 = "好貴……不過真的能拿到東西嗎？"
1004815-66 = "目前現場是沒有。#n不過我會想辦法，不擇手段地幫兩位找到的。"
1004815-67 = "……走吧，老師。"
1004815-69 = "（之後又去了很多間店，卻依舊一無所獲……）"
1004815-72 = "天已經黑了呢。"
1004815-73 = "想修好這副面罩果然不容易。"
1004815-74 = "或許是我太固執了。"
1004815-75 = "……看來也沒辦法了。#n雖然沒有過濾功能，用來遮臉倒還不成問題。"
1004815-76 = "謝謝老師配合我的任性。#n我會想辦法報答老師今天的恩情……"
1004815-77 = "[s5]「先等等……！」\n[s6]「不能就這樣放棄！」"
1004815-80 = "可是根本找不到能修的人不是嗎？"
1004815-81 = "[s7]「不，還有一個人！」\n[s8]「就在沙織面前！」"
1004815-84 = "……難道是老師？"
1004815-85 = "[s9]「我也稍微學過一點簡單的修理技術。」\n[s10]「不懂的部分就邊學邊做，總會有辦法的。」"
1004815-88 = "我，我也想過要自己修理……"
1004815-89 = "可是並沒有那麼簡單。"
1004815-90 = "[s11]「這點我也清楚。」\n[s12]「不過不能就這樣放棄，對吧？」"
1004815-96 = "好吧，我知道了。#n那我也一起幫忙。"
1004815-97 = "如果有需要協助的地方，儘管跟我說。"
1004815-98 = "[s13]「那麼在修好之前，就拜託你擔任夏萊的值日生了。」\n[s14]「一起努力吧！」"
1004815-101 = "擔任夏萊的值日生……？"
1004815-102 = "……知道了，我會堅持到最後的。"
1004815-104 = "（隔天……）"
1004815-108 = "（和沙織一起開始修理面罩）"
1004815-118 = "（修理比想像中困難……）"
1004815-126 = "（持續作業到深夜）"
1004815-128 = "（遇到不懂的地方，就拚命查資料……）"
1004815-129 = "（有壞掉的零件，就從其他產品上拆下來替換）"
1004815-136 = "（雖然每個環節都很辛苦──）"
1004815-137 = "（不過真心希望沙織珍貴的「夥伴」能恢復健康）"
1004815-142 = "（就這樣過了幾天之後……）"
1004815-144 = "唔嗯……怎麼，已經早上了嗎？"
1004815-145 = "不知不覺睡著了。"
1004815-146 = "嗯……老師？#n為什麼笑成那樣？"
1004815-147 = "[s15]「哼哼哼，完成了……」\n[s16]「作戰成功！！」"
1004815-153 = "難道……修好了嗎！？"
1004815-154 = "[s]「嗯！試戴看看吧！」"
1004815-160 = "這是……"
1004815-161 = "……故障的功能正常啟動了。"
1004815-162 = "真的修好了。"
1004815-166 = "辛苦你了，老師。#n我這次又欠了你一個大人情。"
1004815-167 = "[s]「如果缺少了沙織的幫忙，我是不可能做得到的。」"
1004815-171 = "[ns]「這是我們團隊的勝利。」"
1004815-172 = "老師跟我一起取得的成果……"
1004815-173 = "……這麼說起來，這副面罩似乎變得更特別了呢。"
1004815-177 = "真的很謝謝你，老師。#n我會珍惜地使用，不讓它再故障的。"
1004815-178 = "[s]「那麼，現在輪到沙織遵守約定了。」"
1004815-179 = "約定？啊啊……"
1004815-180 = "[s]「沒錯！幫你修好就要答應我任何要求！」"
1004815-181 = "……我知道了。老師想要什麼我都答應。"
1004815-182 = "[s17]「呵呵呵……我等這一刻等很久了。」\n[s18]「我早就想這麼做了……！！」"
1004815-185 = "……老師究竟想要我做什麼？"
1004815-186 = "我雖然說過什麼都願意，你該不會真的要我做什麼奇怪的事吧？"
1004815-187 = "[s]「恭喜答對！我要沙織做一件非常害羞的事！」"
1004815-188 = "唔唔……！隨，隨你高興吧！"
1004815-189 = "[ns]「我要你做的事情是……！」"
1004815-191 = "[ns]「……常常來夏萊找我玩。」"
1004815-192 = "果然是那種無恥的……！"
1004815-193 = "……嗯？什麼？"
1004815-194 = "[s]「隨時都可以來夏萊玩哦。」"
1004815-198 = "[ns19]「不用覺得有壓力。」\n[ns20]「也不用覺得不好意思。」"
1004815-201 = "[ns]「這裡的大門，永遠會為沙織敞開。」"
1004815-203 = "……這樣啊。#n仔細想想，我好像從來沒有想過要來這裡玩。"
1004815-204 = "和老師見面的時候也總是很緊張。"
1004815-205 = "原來全都被老師看透了啊。"
1004815-206 = "知道了，我會依照老師的願望盡量努力。"
1004815-207 = "試著帶著更輕鬆的心情來到這裡的。"
1004815-208 = "話說……未來面罩的維護，還可以再拜託老師幫忙嗎？"
1004815-209 = "……因為老師是一起修理面罩的搭擋啊。"
1004815-210 = "[s]「當然囉！隨時都可以過來，不用有壓力！」"
1004815-211 = "……嗯。我真的從老師身上學到了很多東西。"
1004815-212 = "那麼，以後也請多關照。"
1004815-214 = "（之後和表情放鬆下來的沙織，度過了愉快的時光）"

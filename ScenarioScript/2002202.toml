[translation]
2002202-1 = "พรที่อยากขอ?"
2002202-2 = "โรงอาหารเกเฮนน่า"
2002202-6 = "ฮู่ว... วันนี้เหนื่อยจัง..."
2002202-7 = "อ๊ะ คุณครู?!"
2002202-12 = "วันนี้มีธุระอะไรเหรอคะ?"
2002202-13 = "[s1] \"ครูรอฟูกะอยู่น่ะ\"\n[s2] \"ครูคิดถึงฟูกะตันเลยมาหาน่ะ!\""
2002202-16 = "คะ? ระ... รอฉันเหรอคะ?"
2002202-17 = "อะ... อะไรนะคะ?"
2002202-18 = "อะ... อีกอย่างฉันเพิ่งทำงานชมรมเสร็จ ยะ...ยังไม่ได้อาบน้ำเลย..."
2002202-19 = "ผมเผ้าก็ยุ่งเหยิง เสื้อก็เลอะแบบนี้ เอ่อคือว่า... คือว่า..."
2002202-20 = "[s] \"ครูมาเป็นกำลังใจให้ฟูกะน่ะ เห็นทำงานหนักตลอดเลย\""
2002202-21 = "คะ?!"
2002202-22 = "ถะ... ถึงเห็นหน้าฉันไปก็คงไม่มีอะไรสนุกๆ หรือน่าดีใจหรอกค่ะ...!"
2002202-23 = "งะ...งื้อ... ทำยังไงดีคะ? ตอนนี้ฉันไม่รู้ว่าจะทำยังไงดี..."
2002202-24 = "[s] \"ใจเย็นๆ ก่อนเถอะ...\""
2002202-26 = "จริงๆ เลย คราวหน้ารบกวนติดต่อมาก่อนนะคะ"
2002202-27 = "คะ? อยากมาเซอร์ไพรส์ฉันเหรอคะ?"
2002202-28 = "คุณครูนี่... บางครั้งก็ขี้แกล้งเกินไปแล้วนะคะ"
2002202-29 = "ตารางงานหลังจากนี้เหรอคะ? อืม... ก็ไม่ได้มีอะไรเป็นพิเศษหรอกค่ะ"
2002202-30 = "[s] \"ถ้างั้น... เราออกไปเดินเล่นกันเถอะ\""
2002202-31 = "คะ...คะ?!"
2002202-35 = "นี่มัน... หรือว่าจะเป็นเดตงั้นเหรอคะ? แต่ว่าวันนี้ฉัน..."
2002202-36 = "ไม่สิ... ไม่ใช่แค่วันนี้ แต่ทุกๆ วันก็เป็นแบบนี้..."
2002202-37 = "[s] \"ไม่อยากไปเหรอ?\""
2002202-38 = "เปล่าค่ะ! ไม่ใช่แบบนั้นซะหน่อยค่ะ แต่ว่าสภาพของฉันตอนนี้ ทั้งชุด แล้วก็สภาพหน้า..."
2002202-39 = "ไม่มีปัญหางั้นเหรอคะ? ฮือ..."
2002202-40 = "ถะ... ถ้าอย่างนั้นก็ขอรบกวนด้วยนะคะ!"
2002202-42 = "ในตัวเมือง"
2002202-43 = "(คุณครูมาในตัวเมืองกับฟูกะ)"
2002202-48 = "ว้าว คนเยอะจังเลยนะคะ"
2002202-49 = "ในช่วงเทศกาลคนก็คงเยอะแบบนี้สินะคะ"
2002202-50 = "พอมานึกๆ ดูแล้ว นอกจากมาซื้อของที่ซูเปอร์มาร์เก็ต..."
2002202-51 = "ฉันก็ไม่เคยออกมาเดินเล่นแบบนี้เลยค่ะ"
2002202-52 = "ทั้งที่มันก็เป็นภาพที่เคยเห็นบ่อยๆ แต่ว่า..."
2002202-53 = "รู้สึกว่ามัน... แปลกใหม่มากเลยค่ะ"
2002202-54 = "[s] \"ไม่หิวบ้างเหรอ?\""
2002202-55 = "คะ?"
2002202-56 = "พอมาลองนึกๆ ดูแล้ว วันนี้โรงอาหารก็ไม่เปิดสำหรับมื้อเย็นด้วยค่ะ"
2002202-57 = "เป็นเพราะมันใกล้จะถึงวันหยุดยาวแล้ว และคาบเรียนก็ลดลงด้วยค่ะ"
2002202-62 = "ฮึก?! คะ...คุณครูคะ นี่มัน...!"
2002202-63 = "[s] \"ครูก็กำลังหิวอยู่พอดีเลยน่ะ\""
2002202-64 = "ยะ... อย่างนั้นเหรอคะ...?"
2002202-68 = "(คุณครูตัดสินใจว่าจะไปเดินหาของกินเล่นกับฟูกะ)"
2002202-70 = "ย่านการค้า"
2002202-75 = "ว้าว คุณครูคะ ดูนี่สิคะ เนื้อห่อผักย่างละค่ะ!"
2002202-76 = "มีท็อปปิ้งให้เลือกหลายอย่างเลยค่ะ ทั้งสาหร่าย ชีส ต้นหอม..."
2002202-77 = "คุณครูชอบทานแบบไหนคะ?"
2002202-79 = "มีมาร์ซิแพนขายด้วยค่ะ!"
2002202-80 = "ทำเป็นรูปน้องหมูด้วยค่ะ น่ารักจังเลย!"
2002202-81 = "อืม... มีลูกกวาดอัลมอนด์ด้วยค่ะ"
2002202-83 = "นี่มัน... ออยลี่บอลเลนนี่คะ"
2002202-84 = "เป็นขนมโดนัททอดที่ทำจากแป้งสาลีสอดไส้ผลไม้อบแห้งค่ะ"
2002202-85 = "ได้ยินว่าถ้ากินตอนร้อนๆ จะยิ่งอร่อยขึ้นค่ะ!"
2002202-87 = "ดูเหมือนเราจะกินแต่ของหวานๆ นะคะ..."
2002202-88 = "อ๊ะ โอเด้งละค่ะ พอดีเลยนะคะ"
2002202-89 = "ว้าว! ถ้าเป่ายิงฉุบชนะ จะได้ฟรีอีกหนึ่งชิ้นด้วยค่ะ!"
2002202-91 = "ตอนนี้ฉันกินไม่ไหวแล้วละค่ะ..."
2002202-92 = "[s] \"ครูก็เหมือนกัน...\""
2002202-93 = "แต่พอได้ลองชิมอาหารหลายๆ อย่างดู ก็รู้สึกมีแรงบันดาลใจขึ้นมาเลยค่ะ"
2002202-94 = "โดยเฉพาะเนื้อห่อผักย่างนั่นน่ะค่ะ"
2002202-95 = "เนื้อบางๆ คลุกเคล้าซอสรสเผ็ดนิดหน่อย"
2002202-96 = "ถ้านำมาผัดกับผักละก็... คงเป็นอาหารที่รสชาติดีเมนูหนึ่งเลยว่ามั้ยคะ?"
2002202-97 = "คะ? ไม่คิดว่าฉันจะนึกถึงงานของชมรมโภชนาการที่นี่ด้วยงั้นเหรอคะ?"
2002202-98 = "อ่ะฮะฮะฮะ... คงติดเป็นนิสัยไปแล้วน่ะค่ะ คงเป็นโรคบ้างานไปแล้วละมั้งคะ?"
2002202-99 = "[s] \"ฟูกะนี่ตั้งใจสุดๆ เลยน้า\""
2002202-100 = "อย่างนั้นเหรอคะ?"
2002202-101 = "ทุกๆ คน... ก็ทำกันแบบนี้ไม่ใช่เหรอคะ?"
2002202-102 = "ฉันไม่คิดว่ามีแค่ฉันที่พิเศษหรอกค่ะ"
2002202-103 = "ฉันก็แค่พยายามทำอย่างเต็มที่ก็เท่านั้นเองค่ะ"
2002202-104 = "[ns] \"อันที่จริง ครูแค่อยากให้ฟูกะได้มีเวลาพักบ้างน่ะ\""
2002202-106 = "[ns] \"ขอโทษนะ ที่ทำให้นึกถึงงานอีกแล้วน่ะ\""
2002202-107 = "มะ... ไม่ต้องขอโทษฉันหรอกค่ะ! นี่มันเป็นเพราะนิสัยของฉันเองค่ะ!"
2002202-108 = "ถะ... ถ้าคุณครูคิดมากขนาดนั้น ฉันละอายใจจนสู้หน้าคุณครูไม่ได้..."
2002202-109 = "แต่ยังไง... อีกไม่นานก็วันหยุดยาวแล้ว ฉันก็คงจะได้พักบ้างแล้วละค่ะ!"
2002202-110 = "[s] \"ถ้างั้นปีใหม่นี้ ฟูกะอยากขอพรอะไรเหรอ?\""
2002202-111 = "พะ... พรปีใหม่ของฉันเหรอคะ? ไม่ใช่อันที่รู้ๆ กันอยู่แล้วด้วย?"
2002202-112 = "อืม... ยากจังเลยค่ะ พอมาคิดๆ ดูแล้ว ฉันยุ่งซะจนไม่มีเวลาคิดเรื่องพวกนี้เลย..."
2002202-113 = "แต่ถ้าขอพรได้อย่างเดียวละก็..."
2002202-117 = "อ๊ะ จริงด้วยค่ะ"
2002202-118 = "ถึงจะแค่ไม่นานก็เถอะ... แต่ฉันก็อยากใช้ชีวิตแบบสงบสุข อยู่เงียบๆ บ้างน่ะค่ะ"
2002202-120 = "พูดจริงๆ นะคะ..."

[translation]
2002202-1 = "What's Your Wish?"
2002202-2 = "Gehenna Student Dining Hall"
2002202-6 = "Phew... Another tough day.."
2002202-7 = "Oh, Sensei?!"
2002202-12 = "What brings you here?"
2002202-13 = "[s1] \"I was waiting for you, Fuuka.\"\n[s2] \"I missed you, Fuuka!\""
2002202-16 = "What? M-Me?"
2002202-17 = "Wh-What do you mean...?"
2002202-18 = "I just wrapped up my School Lunch Club work... I'm a mess."
2002202-19 = "My hair is sweaty, my clothes have stains from cooking...and...and...!"
2002202-20 = "[s] \"Well, I thought you deserved a reward for all your hard work.\""
2002202-21 = "What?!"
2002202-22 = "N-No one wants to see me like this though..."
2002202-23 = "A-Ack! What should I do? How do I—"
2002202-24 = "[s] \"Let's start with taking a deep breath.\""
2002202-26 = "Okay, okay. But please give me at least some warning before you come visit next time."
2002202-27 = "H-Huh? You wanted it to be a surprise?"
2002202-28 = "You're so...mischievous sometimes, Sensei."
2002202-29 = "My plans? I didn't have anything in particular..."
2002202-30 = "[s] \"Then let's go for a walk.\""
2002202-31 = "A-A walk?!"
2002202-35 = "I-Isn't that like...a d-date? But today..."
2002202-36 = "O-Or anytime really...! I can't—"
2002202-37 = "[s] \"You don't want to?\""
2002202-38 = "No! I do! But... Well, look at me. My clothes, my hair..."
2002202-39 = "None of that matters? U-Ugh..."
2002202-40 = "Okay, fine. Let's go for a walk, Sensei!"
2002202-42 = "Downtown"
2002202-43 = "Fuuka and I walked around downtown together."
2002202-48 = "Wow. It really is crowded today."
2002202-49 = "I guess it's right around the time people are usually out and about."
2002202-50 = "That's not something I'd normally consider... I go to the supermarket for ingredients for the School Lunch Club..."
2002202-51 = "But I hardly go out on adventures besides that..."
2002202-52 = "I might know the area well, but..."
2002202-53 = "Walking around with you like this makes it different at the same time."
2002202-54 = "[s] \"Speaking of, you must be hungry, with all this walking.\""
2002202-55 = "Hm?"
2002202-56 = "Actually, I didn't eat dinner today."
2002202-57 = "Classes ended early for the holidays, so the cafeteria was packed."
2002202-62 = "Ah?! Sensei, when did you...?"
2002202-63 = "[s] \"I was hungry, so I figured you would be too!\""
2002202-64 = "Th-That's very thoughtful..."
2002202-68 = "Fuuka and I proceeded to snack to our heart's content."
2002202-70 = "Shopping District"
2002202-75 = "Sensei, look over there. Grilled meat rolls!"
2002202-76 = "There are so many types of toppings. Seaweed, cheese, green onions..."
2002202-77 = "Do you have a favorite?"
2002202-79 = "They have marzipan!"
2002202-80 = "And look, it's pig-shaped! How adorable."
2002202-81 = "Mmm... The almond and sugar are a delicious combination."
2002202-83 = "This is...oliebollen!"
2002202-84 = "It's a fried donut with dried fruit in the dough."
2002202-85 = "Hurry, now. It has to be enjoyed hot."
2002202-87 = "We ended up just gorging ourselves on sweets..."
2002202-88 = "Oh! Fish cake would be delicious though."
2002202-89 = "And look, you get an extra if you beat them at rock, paper, scissors!"
2002202-91 = "...Realistically, I don't think I could eat another bite."
2002202-92 = "[s] \"Phew. I'm completely stuffed too.\""
2002202-93 = "But this has been a very inspiring experience."
2002202-94 = "Especially the grilled meat roll we tried."
2002202-95 = "What if I marinaded the thin meat from the grilled meat roll in slightly spicy sauce...?"
2002202-96 = "And then maybe stir-fried it with vegetables? Would the students like that for lunch?"
2002202-97 = "Huh? You didn't think I'd be thinking about the School Lunch Club here?"
2002202-98 = "Hahaha. Consider it an occupational disease I caught from the School Lunch Club."
2002202-99 = "[ns] \"You're just really hardworking, Fuuka.\""
2002202-100 = "That's a bit of a stretch. Don't be silly."
2002202-101 = "Everyone around me works just as diligently."
2002202-102 = "I'm no more special than my peers when it comes to hard work."
2002202-103 = "I just want to do the best I can, every day I'm able to."
2002202-104 = "[ns] \"I brought you out to give you a little break...\""
2002202-106 = "[ns] \"But I ended up just making you think about the School Lunch Club more. Sorry.\""
2002202-107 = "P-Please don't apologize! It's entirely my fault."
2002202-108 = "I'd hate if my bad habits made you feel any kind of guilt."
2002202-109 = "And I have some days off for the holidays anyways. I'll have plenty of time to rest."
2002202-110 = "[s] \"Then, do you have a New Year's wish for this holiday season?\""
2002202-111 = "A wish? Well, there's always the obvious ones, but..."
2002202-112 = "Hm... I haven't really had the time to think of one. Let me see..."
2002202-113 = "My one wish in life right now..."
2002202-117 = "Oh... I think I know."
2002202-118 = "Even if it's just a fleeting moment, I'd like for my life to be filled with peace."
2002202-120 = "Yeah... That would be my wish."

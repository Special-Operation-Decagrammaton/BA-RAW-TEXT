[translation]
2002202-1 = "風華的願望"
2002202-2 = "格黑娜．學生餐廳"
2002202-6 = "呼……今天也好累……"
2002202-7 = "……呃，老師！？"
2002202-12 = "怎，怎麼了嗎？為什麼會來這裡……"
2002202-13 = "[s1]「我在等風華哦。辛苦了。」\n[s2]「因為想見風華炭！」"
2002202-16 = "我，我嗎……？"
2002202-17 = "那，那那那個，是有什麼事嗎？"
2002202-18 = "我剛結束供給部的工作，還滿身大汗的……"
2002202-19 = "頭髮也沒整理，至少得先換個衣服……而且……"
2002202-20 = "[s]「想慰勞一下一直都很努力的風華。」"
2002202-21 = "咦……！？"
2002202-22 = "怎，怎麼會，你的心意我很感謝，但是那個……！"
2002202-23 = "啊，啊哇哇，怎麼辦，我到底該怎麼做……！？"
2002202-24 = "[s]「沒，沒事的唷。冷靜點，風華。」"
2002202-26 = "老師，希望你下次可以先聯絡一下……不然我的心臟會出問題的……"
2002202-27 = "咦，想嚇我一跳……？"
2002202-28 = "真是的……老師偶爾就是會露出壞心眼的一面呢。"
2002202-29 = "接下來的行程？不，沒什麼特別的計畫……"
2002202-30 = "[s]「那要不要去街上走走？」"
2002202-31 = "什，什麼！？"
2002202-35 = "這，這難道是約會……？都沒有特別打扮……"
2002202-36 = "嗚，都是因為平時一直都穿成這樣，這種時候才會……！"
2002202-37 = "[s]「啊，如果累了的話不用勉──」"
2002202-38 = "不，不會！只是那個，我這身模樣有點……"
2002202-39 = "你說不用那麼在意是嗎？嗚……"
2002202-40 = "那，那就……那個，我很樂意……！"
2002202-42 = "市區"
2002202-43 = "（和風華一起來到了市區）"
2002202-48 = "好厲害，人真多呢……"
2002202-49 = "不過現在這個時期，這好像也是理所當然的……"
2002202-50 = "仔細想想，平常都只是為了供給部的工作去大型賣場……"
2002202-51 = "最近好像不太常到外面逛逛呢……"
2002202-52 = "是這個原因嗎……"
2002202-53 = "明明是習以為常的景色，卻覺得有點新鮮。"
2002202-54 = "[s]「那真是太好了。話說風華會不會餓？」"
2002202-55 = "咦？啊，是！"
2002202-56 = "這麼說來，今天因為是連假前的課程……"
2002202-57 = "所以中午以後就什麼也沒吃──"
2002202-62 = "不，不是，這是因為那個……！"
2002202-63 = "[s]「我肚子也餓了，一起去吃點東西吧。」"
2002202-64 = "說，說的也是……！"
2002202-68 = "（決定和風華一起邊吃邊逛）"
2002202-70 = "商店街"
2002202-75 = "哇。老師請看，是蘆筍肉捲！"
2002202-76 = "有很多種配料呢。海苔、起司、美乃滋……"
2002202-77 = "老師要選哪一種呢？"
2002202-79 = "那裡還有在賣扁桃仁膏！"
2002202-80 = "這個造型……是豬嗎？"
2002202-81 = "適當的甜味與杏仁的香氣真不錯呢。"
2002202-83 = "啊，是[ruby=Oliebollen]油炸麵球[/ruby]！"
2002202-84 = "老師你知道嗎？是一種在麵糰中加入水果或果乾的點心……"
2002202-85 = "油炸過後特別好吃唷！"
2002202-87 = "啊，好像一直在吃甜食呢……"
2002202-88 = "啊，有關東煮……時機正好呢。"
2002202-89 = "猜拳猜贏的話，好像還能多拿一份哦。我們去看看吧！"
2002202-91 = "吃太飽了……"
2002202-92 = "[s]「好像有點吃太多了呢……」"
2002202-93 = "不過多虧品嘗了各種料理，我突然有靈感了。"
2002202-94 = "特別是肉捲，非常美味呢。"
2002202-95 = "那個特別辣的沾醬，該怎麼重現呢……？"
2002202-96 = "把它用來炒蔬菜的話，感覺很適合。"
2002202-97 = "……？沒想到我現在還想著供給部的工作，是嗎？"
2002202-98 = "啊哈哈……該說已經是一種習慣了嗎？或許就像職業病一樣。"
2002202-99 = "[s]「風華真是努力呢。」"
2002202-100 = "是嗎……？我自己其實也不太清楚……"
2002202-101 = "雖然方向各不相同，不過我想大家都有各自喜歡的事情……"
2002202-102 = "並非只有我是特別的。"
2002202-103 = "只是覺得既然要做就該全力以赴。"
2002202-104 = "[ns]「其實我想多少讓風華能休息一下……」"
2002202-106 = "[ns]「是不是我太多管閒事了？」"
2002202-107 = "怎，怎麼會呢！#n無論在哪都會想工作的事是我的問題……！"
2002202-108 = "多管閒事什麼的，千萬別這麼說……"
2002202-109 = "畢竟是年末的假期，我自己也覺得應該轉換一下心情……！"
2002202-110 = "[s]「這樣啊。說到新年，風華的新年願望決定好了嗎？」"
2002202-111 = "這麼說來，我還沒想過呢。"
2002202-112 = "唔嗯，該許什麼願望呢……說到需要特別許願的事情……"
2002202-113 = "如果真的能實現……"
2002202-117 = "或許有一個願望……"
2002202-118 = "那個，就算只有一天也沒關係……我想度過平靜的日常。"
2002202-120 = "真的，打從心底這麼覺得……"

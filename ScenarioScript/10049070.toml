[translation]
10049070-1 = "Episode 7;Lightspeed Morizuki 1"
10049070-3 = "35 degrees. Moving slowly."
10049070-4 = "Estimated range, 70 yards."
10049070-5 = "Observing target. The target is yellow."
10049070-7 = "[ns1] \"Yellow...?\"\n[ns2] \"Was that Rabu's color?\""
10049070-10 = "Hm? I thought she was white, red, bit of black, gray..."
10049070-11 = "Didn't she look like strawberry mochi?"
10049070-12 = "We'll check when we get to her."
10049070-16 = "C-Captain! They're here again!"
10049070-17 = "Oh, come on. Don't you get tired of doing this?!"
10049070-19 = "...What are you wearing...?"
10049070-20 = "Should you even be asking that question?!"
10049070-21 = "Huh, I guess they don't know."
10049070-23 = "Wh-What's going on? Did we get the wrong show?"
10049070-24 = "That's Stanag, the cute mascot from Heavy Caliber!"
10049070-25 = "The little scamp who helps White and Pink!"
10049070-26 = "Kekeke, yes, what she said!"
10049070-27 = "I looked up the thing you were cosplaying as."
10049070-28 = "You got in our way earlier, and I thought you might try it again. But then I thought, \"Would magical girls be able to attack their mascot in front of a crowd?\""
10049070-32 = "Oh! The afternoon show's starting!"
10049070-33 = "Oh, and they've got Stanag now!"
10049070-35 = "There's Thermite White and Pink again!"
10049070-36 = "Stanag too!"
10049070-38 = "So, what now? How about you just back off, yeah?"
10049070-39 = "Not like you can stop us!"
10049070-41 = "Ohoho!"
10049070-42 = "Heavy Caliber and their petty mascot! All gathered up to get swept away!"
10049070-49 = "I think I know that voice..."
10049070-50 = "You do? I don't..."
10049070-51 = "[ns] \"That's gotta be...\""
10049070-55 = "Bold of you all to wander about, doing whatever you please."
10049070-56 = "And who are you?!"
10049070-58 = "Yeah, who are you?!"
10049070-60 = "[ns3] \"That's...Shimiko from the Library Committee!\"\n[ns4] \"That's...the evil officer Era!\""
10049070-63 = "Shimiko, you say?!"
10049070-64 = "Where have you been all this time?!"
10049070-66 = "Thermite White, Thermite Pink, and that detestable little Stanag."
10049070-67 = "How wonderful to see you all together."
10049070-68 = "Tremble before the power of Era!"
10049070-70 = "Era's here!! The evil officer!!"
10049070-71 = "You think White and Pink can beat her?"
10049070-73 = "Evil...officer?"
10049070-75 = "Poor Stanag, always getting hurt whenever Era shows up."
10049070-76 = "What...?"
10049070-77 = "That means..."
10049070-78 = "Cheer up, Stanag!"
10049070-79 = "She's my enemy too!"
10049070-80 = "My dark magic will shred you into pieces!"
10049070-81 = "Why is nothing going right today?!"

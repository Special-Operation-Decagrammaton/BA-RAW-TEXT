[translation]
10049070-1 = "第7話;閃光少女守月"
10049070-3 = "35度方向。以緩慢的步伐移動中。"
10049070-4 = "推測距離為70碼。"
10049070-5 = "可疑目標，顏色是黃色。"
10049070-7 = "[ns1]「黃色……？」\n[ns2]「良舞給人的感覺是那種顏色嗎？」"
10049070-10 = "唔嗯？如果硬要說的話，應該是白色、紅色，然後再加上一點黑色跟灰色……"
10049070-11 = "類似草莓大福那種感覺嗎？"
10049070-12 = "我們直接去確認吧。#n黃色的話……應該是那位沒錯吧。"
10049070-16 = "隊，隊長！他們又出現了！"
10049070-17 = "嘖，這些傢伙怎麼這麼死纏爛打啊！？"
10049070-19 = "……為什麼要穿成那樣？"
10049070-20 = "輪不到你們來問吧！？"
10049070-21 = "話說，原來你們不認識這個角色嗎？"
10049070-23 = "怎，怎麼會？是搞錯系列了嗎？"
10049070-24 = "那是《魔法liber》的可愛吉祥物「Stanag」醬！"
10049070-25 = "是協助White和Pink的，既善良又柔弱的孩子！"
10049070-26 = "哼哼哼。沒錯，就是那樣！"
10049070-27 = "你們穿的那套服裝，我剛才已經緊急調查過了。"
10049070-28 = "雖然費了不少功夫，不過你們敢在大庭廣眾之下攻擊魔法少女的吉祥物嗎？"
10049070-32 = "哦哦！下午場好像開始了！"
10049070-33 = "這次連吉祥物也登場了嗎？"
10049070-35 = "Thermite White和Pink又出現了！"
10049070-36 = "Stanag醬也在！"
10049070-38 = "怎麼樣啊？我看你們還是乖乖退下吧？"
10049070-39 = "畢竟你們是不可能阻止我們的！"
10049070-41 = "哦──齁齁齁齁！！"
10049070-42 = "Heavy Calibers和微不足道的嘍囉們！#n通通聚在一起正好，剛好方便我一網打盡！"
10049070-49 = "這個聲音……好像在哪裡聽過……"
10049070-50 = "卻又好像完全沒聽過……？"
10049070-51 = "[ns]「這是……？」"
10049070-55 = "你們幾個，還挺囂張的嘛。"
10049070-56 = "你又是哪位啊！？！！？"
10049070-58 = "你是誰！？"
10049070-60 = "[ns3]「那是……！圖書委員會的志美子！」\n[ns4]「那是……！惡之幹部『艾拉』！」"
10049070-63 = "是志美子同學！？"
10049070-64 = "你這段時間跑到哪裡去了，為什麼現在才出現！？"
10049070-66 = "Thermite White、Thermite Pink。還有討人厭的吉祥物Stanag。"
10049070-67 = "全都聚在這裡真是幫大忙了。"
10049070-68 = "就讓你們在我艾拉的力量面前──嚐嚐絕望的滋味吧！"
10049070-70 = "艾拉出現了！！是惡之幹部！！"
10049070-71 = "White和Pink有辦法贏嗎……"
10049070-73 = "惡之……幹部？"
10049070-75 = "Stanag醬每次遇到艾拉都會被爆打一頓，真可憐──"
10049070-76 = "什麼……？"
10049070-77 = "該不會……"
10049070-78 = "Stanag醬，加油！"
10049070-79 = "原來是敵人嗎？？就連那傢伙也是！？"
10049070-80 = "我的黑暗魔法會撕裂你！"
10049070-81 = "今天也太倒楣了吧！！！"

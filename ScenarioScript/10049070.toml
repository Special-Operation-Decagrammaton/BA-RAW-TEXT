[translation]
10049070-1 = "ตอนที่ 7;แฟลชเกิร์ล โมริซึกิ 1"
10049070-3 = "พิกัด 35 องศา กำลังเดินไปช้าๆ"
10049070-4 = "คาดว่าอยู่ห่างออกไป 70 หลาค่ะ"
10049070-5 = "จุดสังเกตของเป้าหมายคือสีเหลืองค่ะ"
10049070-7 = "[ns1] \"สีเหลือง...?\"\n[ns2] \"ปกติราบุใส่ชุดสีเหลืองเหรอ?\""
10049070-10 = "หืม? ถ้าจะบอกให้ชัดเจน ต้องบอกว่ามีทั้งสีขาว สีแดง สีดำ แล้วก็สีเทานิดหน่อย..."
10049070-11 = "ดูรวมๆ แล้วเหมือนโมจิสตรอว์เบอร์รีหรือเปล่าคะ?"
10049070-12 = "ฉันจะไปตรวจสอบมาให้เองค่ะ ชุดสีเหลือง... คนนั้นสินะคะ"
10049070-16 = "หะ... หัวหน้า! พวกนั้นมาอีกแล้วค่ะ!"
10049070-17 = "เฮ้อ ยัยพวกนี้ไม่เหนื่อยกันบ้างหรือไง?!"
10049070-19 = "ทำไมถึงใส่ชุดแบบนั้น...?"
10049070-20 = "นี่ไม่ใช่คำถามที่ควรออกจากปากของพวกเธอนะ?!"
10049070-21 = "อะไรกัน พวกเธอไม่รู้จักตัวนี้งั้นเหรอ?"
10049070-23 = "อะ... อะไรกัน? หรือว่าเราแต่งผิดเรื่อง?"
10049070-24 = "นี่คือ 'สตาแนกจัง' มาสคอตสุดคิวท์จากเฮฟวี่ แคลิเบอร์ค่ะ!"
10049070-25 = "เป็นเด็กดีและอ่อนโยนที่คอยช่วยเหลือไวต์กับพิงค์ค่ะ!"
10049070-26 = "คิกคิกคิก ใช่แล้วละ อย่างที่เธอว่าเลย!"
10049070-27 = "ฉันไปหาข้อมูลเกี่ยวกับชุดและการแสดงของพวกเธอมาน่ะสิ"
10049070-28 = "ว่ายังไงล่ะ สาวน้อยเวทมนตร์คงไม่กล้าโจมตีมาสคอตฝ่ายเดียวกันต่อหน้าคนอื่นใช่มั้ย?"
10049070-32 = "โอ๊ะ! การแสดงรอบบ่ายเริ่มแล้วสินะ!"
10049070-33 = "รอบนี้มีมาสคอตด้วยงั้นเหรอ?"
10049070-35 = "เทอร์ไมต์ ไวต์กับเทอร์ไมต์ พิงค์ออกมาแล้ว!"
10049070-36 = "สตาแนกจังก็ด้วย!"
10049070-38 = "ว่าไงล่ะ? ยอมถอยไปแต่โดยดีเถอะน่า"
10049070-39 = "ตอนนี้พวกเธอหยุดฉันไม่ได้หรอก!"
10049070-41 = "โอ้โห... โฮะโฮะโฮะโฮะ!!"
10049070-42 = "เฮฟวี่ แคลิเบอร์กับลูกกระจ๊อก! มาอยู่ด้วยกันพร้อมหน้าเลย แบบนี้ก็จัดการรวดเดียวได้เลยน่ะสิ!"
10049070-49 = "เสียงนี้... เหมือนเคยได้ยินจากที่ไหนมาก่อน..."
10049070-50 = "แต่ก็เหมือนไม่เคยได้ยินเลยด้วย...?"
10049070-51 = "[ns] \"นี่มัน...?\""
10049070-55 = "กำลังสนุกกันเต็มที่อยู่เลยสินะ"
10049070-56 = "เธอเป็นใครอีกเนี่ย?!!!?!"
10049070-58 = "คุณเป็นใครคะ?!!"
10049070-60 = "[ns3] \"ชิมิโกะ... จากชมรมอ่านหนังสือนี่นา...!\"\n[ns4] \"ชิมิโกะ... ไม่สิ เอร่า หัวหน้าวายร้ายนี่นา...!\""
10049070-63 = "คะ... คุณชิมิโกะ... งั้นเหรอคะ?!"
10049070-64 = "ทำไมเพิ่งมาปรากฏตัวเอาตอนนี้คะ?!"
10049070-66 = "ทั้งเทอร์ไมต์ ไวต์ เทอร์ไมต์ พิงค์ แล้วก็สตาแนก มาสคอตน่ารังเกียจ"
10049070-67 = "ทุกคนมาอยู่ในที่เดียวกันเลยสินะ งั้นก็ดีเลย"
10049070-68 = "จงรู้สึกสิ้นหวังและยอมจำนนต่อพลังของเอร่าเสียเถอะ!"
10049070-70 = "หัวหน้าวายร้าย!! เอร่าปรากฏตัวแล้ว!!"
10049070-71 = "ไวต์กับพิงค์จะชนะได้หรือเปล่านะ..."
10049070-73 = "หัวหน้า... วายร้าย?"
10049070-75 = "ทุกครั้งที่เอร่าปรากฏตัว สตาแนกจังจะโดนทำร้ายตลอดเลย น่าสงสาร..."
10049070-76 = "ว่าไงนะ...?"
10049070-77 = "ถ้างั้นก็..."
10049070-78 = "สตาแนกจัง สู้เขานะ!"
10049070-79 = "ยัยนั่นก็เป็นศัตรูงั้นเหรอ?!"
10049070-80 = "เวทมนตร์แห่งความมืดของฉันจะขยี้เธอให้กลายเป็นชิ้นๆ เลย!"
10049070-81 = "ทำไมวันนี้ถึงเป็นแบบนี้นะ จริงๆ เลย!!!"

[translation]
83306035701-5 = "ท่านประธาน เจอของที่หาแล้วรึยังคะ?"
83306035701-6 = "อื้ม ขอบใจที่ช่วยหาบันไดมาให้นะ"
83306035701-7 = "ไม่เป็นไรเลยค่ะ! ไว้ต่อไปให้ฉันปีนหาให้เองนะคะ...!"
83306035701-8 = "ไม่ต้องลำบากถึงขนาดนั้นหรอก"
83306035701-9 = "อ๊ะ... งะ... งั้นเหรอคะ..."
83306035701-10 = "แต่ถ้ามีเรื่องอะไรก็บอกฉันได้ตลอดนะคะ"

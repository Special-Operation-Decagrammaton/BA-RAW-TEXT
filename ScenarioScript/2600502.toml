[translation]
2600502-1 = "ยอมไม่ได้แล้วล่ะ!"
2600502-2 = "......."
2600502-3 = "ถึงฉันจะโทรเรียกออกมา แต่ไม่คิดเลยว่าจะมาเร็วขนาดนี้!"
2600502-4 = "หืม~ ดูเหมือนว่าจะมีเวลาว่างอยู่เยอะเลยใช่มั้ยน่ะ คุณครู?"
2600502-5 = "[s1] \"แน่นอน! ก็เพราะเธอต้องการความช่วยเหลือใช่มั้ย?\"\n[s2] \"ถ้าเธอไม่ต้องการครูจริงๆ แล้วละก็...\""
2600502-6 = ".... อ่า.... จะ... จริงๆ เลย...!!!"
2600502-7 = "ขะ... เข้าใจแล้ว! บอกว่าเข้าใจแล้วไง! หยุดพูดได้แล้ว! หยุดเลยนะ! หยุดเดี๋ยวนี้!"
2600502-8 = "เหนื่อยจริงๆ เลย... ฉันพูดอะไรไม่ได้เลยแหะ"
2600502-9 = "ทำไมฉันถึงโทรหาครูงั้นเหรอ? ก็... ตามที่ฉันบอกไปว่าต้องการความช่วยเหลือน่ะ"
2600502-10 = "วันนี้ <คาเฟ่มิลเฟย> จะปล่อยเมนูลิมิเต็ดอันใหม่ออกมา"
2600502-11 = "แน่นอนว่าคนจะต้องไปซื้อกันเยอะแน่ ทางร้านเลยจำกัดจำนวนที่ซื้อได้ต่อคนเอาไว้"
2600502-12 = "ก็คือแต่ละคนจะซื้อได้แค่ 1 ชิ้นเท่านั้น"
2600502-13 = "และเพราะแบบนั้น ใช่แล้วล่ะ ฉันเลยอยากให้ครูช่วยซื้อเพิ่มอีก 1 ชิ้นน่ะ"
2600502-14 = "ทำไมฉันถึงโทรหาครูแทนสมาชิกในชมรมคนอื่นๆ น่ะเหรอ? ฉันจะโทรหาพวกเธอได้ยังไงกันล่ะ!?"
2600502-15 = "ก็พวกเธอเตรียมท้องไว้กินเหมือนกันยังไงล่ะ! ฟังดีๆ นะ คุณครู ปกติพวกเราเป็นพันธมิตรกันก็จริง..."
2600502-16 = "แต่ในช่วงที่มีจัดกิจกรรมแบบนี้ เราคือศัตรูกัน! ศัตรูเลยนะ! พวกเธอเป็นคู่แข่งของฉัน!"
2600502-17 = "[s] \"งั้น... ครูคงต้องแสดงเป็นเพื่อนเธอในวันนี้สินะ\""
2600502-18 = "มะ... ไม่ใช่สิ!! ทำไมต้องพูดอะไรแบบนั้นด้วย?!"
2600502-19 = "ช่างมันเถอะ... ฉันจะซื้อให้เป็นการตอบแทนแล้วกัน แบบนั้นไม่เป็นไรใช่มั้ย?"
2600502-20 = "ขอบคุณที่รอนะครับ ลูกค้าต้องการสั่งอะไรเหรอครับ?"
2600502-21 = "เอา... <มิลเฟยโคโค้พาว์> 2 ชิ้นค่ะ"
2600502-23 = "ได้เลยครับ มิลเฟยโคโค้พาว์ 2 ชิ้น... ทั้งหมดก็ 6,800 เยนครับ"
2600502-24 = "...หา? ...6,800 เยน?"
2600502-25 = "(ดะ... เดี๋ยวสิ?! ฉันไม่คิดเลยว่ามันจะแพงขนาดนี้!)"
2600502-26 = "(ก็คือชิ้นละ 3,400 เยนเลยงั้นเหรอ?! ไม่มีทางน่า ถึงมันจะจำกัดจำนวนก็เถอะ...!)"
2600502-27 = "...คุณลูกค้า?"
2600502-28 = "...คือว่า..."
2600502-29 = "[s] (เอาบัตรออกมาจ่ายเงิน)"
2600502-30 = "........!!"
2600502-31 = "ได้รับบัตรแล้วครับ ทำการชำระเงินเรียบร้อยแล้ว ขอบคุณมากครับผม"
2600502-33 = "คะ... คุณครู! ทำอะไรน่ะ?! ทำไมต้องจ่ายด้วย?!"
2600502-34 = "ที่จ่ายก็เพราะเป็นคุณครูอย่างงั้นเหรอ? ตะ... แต่ฉันเป็นคนชวนมานะ!"
2600502-35 = ".......!!"
2600502-36 = "ก็ได้... ฉันยอมแล้วก็ได้ แต่ครั้งหน้าฉันจะเป็นคนจ่ายให้เอง!"
2600502-37 = "เข้าใจใช่มั้ย?! ครั้งหน้าฉันจะจ่าย! โอเคนะ?!"
2600502-38 = "[s3] \"ได้เลย แค่เธอโทรมาครูก็จะออกมานะ\"\n[s4] (ยื่นมิลเฟยให้โยชิมิ)"
2600502-39 = "...!!"
2600502-40 = "...!!"
2600502-41 = "...คิกคิก"
2600502-42 = "ขะ... ขอบคุณนะคุณครู แล้วเจอกันใหม่นะ! ไว้โทรไปหา!"
2600502-47 = "(แล้วโยชิมิก็เดินออกไปอย่างมีความสุขหลังจากที่ได้มิลเฟยไป)"

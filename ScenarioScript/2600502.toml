[translation]
2600502-1 = "#title;양보할 수 없어!"
2600502-2 = "3;요시미;01;……\n#3;a\n#3;em;…"
2600502-3 = "3;요시미;02;부른 내가 할 말은 아니지만, 부르자 마자 이렇게 빨리 찾아올 줄이야."
2600502-4 = "3;요시미;07;흐응~. 정말로 딱히 할 일이 없긴 한 가봐? 선생님.\n#3;em;[음표]"
2600502-5 = "[s1] \"다른 사람도 아니고 요시미니까.\"\n[s2] \"어유, 그럼요. 제가 잉여 인ㄹ……\""
2600502-6 = "3;요시미;09;……아…… 아으, 진짜……!!!\n#3;em;[///]\n#3;stiff"
2600502-7 = "3;요시미;08;아, 알았어! 알았다고! 그냥 해 본 말이야! 스톱! 스톱!!\n#3;hophop\n#3;em;[반응]"
2600502-8 = "3;요시미;99;벌써부터 피곤해…… 정말 무슨 말을 못하겠네."
2600502-9 = "3;요시미;02;무슨 일로 부른 거냐고? 아, 그게… 아까도 말했지만 진짜 개인적인 부탁이라서 말이야.\n#3;em;[?]"
2600502-10 = "3;요시미;07;오늘은 여기 <카페 밀피유>에서 전부터 예고했던 한정 신상을 내놓는 날이거든."
2600502-11 = "3;요시미;99;당연히 사재기를 할 녀석도 있을 테니 가게에서도 미리 제한을 걸어 뒀어."
2600502-12 = "3;요시미;01;즉 1인당 1개밖에 살 수가 없다는 뜻이지.\n#3;em;[반응]"
2600502-13 = "3;요시미;07;그래. 맞아. 선생님도 하나를 사 달라고 지원군으로 부른 거야.\n#3;greeting"
2600502-14 = "3;요시미;01;왜 다른 동아리 애들이 아니라 선생님이냐고? 여기서 다른 애들을 어떻게 불러!?\n#3;em;[?]"
2600502-15 = "3;요시미;99;걔네들은 걔네 배가 없겠어!? 잘 들어, 선생님. 물론 우리가 평소엔 동맹이지만……"
2600502-16 = "3;요시미;08;이런 이벤트에 한정해서만큼은 적이야, 적! 모두 경쟁자라고!\n#3;hophop\n#3;em;[빠직]"
2600502-17 = "[s] \"그럼 요시미가 날 선수 친 거구나.\""
2600502-18 = "3;요시미;09;아, 아니!! 그러니까 왜 꼭 말을 그런 식으로 하는 거야, 당신은!!\n#3;shake\n#3;em;[///]"
2600502-19 = "3;요시미;00;……아무튼 좋아. 대신 답례로 선생님 것도 내가 살 게. 그럼 괜찮지?\n#3;greeting"
2600502-20 = "1;점원;03;오래 기다리셨습니다. 다음 손님, 주문은 뭘로 하시겠습니까?\n#1;ar\n#3;m5\n#1;em;[반응]"
2600502-21 = "3;요시미;02;신상…… <발바닥 코코 밀피유> 두 명이요."
2600502-22 = "1;점원;03\n#1;dl\n#wait;1500"
2600502-23 = "1;점원;03;네. 주문하신 발바닥 코코 밀피유 2명 분입니다. 합해서 6,800엔입니다.\n#1;ar\n#1;em;[반짝]"

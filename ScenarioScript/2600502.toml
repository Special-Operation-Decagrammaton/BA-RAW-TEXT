[translation]
2600502-1 = "Sensei's Treat"
2600502-2 = "..."
2600502-3 = "I know I called you, but I didn't expect you'd get here so fast!"
2600502-4 = "Hmm. It looks like you have a lot of time on your hands, Sensei."
2600502-5 = "[s1] \"Of course! Because you needed help, right?\"\n[s2] \"Well, if you don't really need me...\""
2600502-6 = "Ugh, you...!!!"
2600502-7 = "Okay! Okay! I get it! You can stop now!"
2600502-8 = "You're exhausting! I really can't say anything to you!"
2600502-9 = "So, why did I call you? Well, like I said before: It's for a favor."
2600502-10 = "Today is the day Cafe Mille-Feuille releases their new limited menu."
2600502-11 = "Since people will be stocking up, they've put a limit on how many you can buy."
2600502-12 = "Which means each person is only allowed a single dessert."
2600502-13 = "Yeah. So, I need your help to buy more than just one."
2600502-14 = "Why did I call you instead of the other club members? How could I call them?!"
2600502-15 = "They have stomachs too, you know! Listen carefully, Sensei... Normally, we are all allies..."
2600502-16 = "But during events like this one, we are enemies! Enemies! They're my competition!"
2600502-17 = "[s] \"So... I guess I'll have to pretend to be your friend today.\""
2600502-18 = "God! Why do you have to say it like that?!"
2600502-19 = "Anyway... I'll buy yours as a sign of thanks. Sounds good, right?"
2600502-20 = "Thank you for waiting. What would you like to order?"
2600502-21 = "We'll take the new Coco Paw Mille-Feuille, for two."
2600502-23 = "No problem. Two Coco Paw Mille-Feuilles... That'll be 6,800 yen."
2600502-24 = "Uh, excuse me? ...6,800 yen?"
2600502-25 = "(Wh-What?! I never expected it to be that expensive!)"
2600502-26 = "(Does that mean it's 3,400 yen each?! That can't be!)"
2600502-27 = "...Ma'am?"
2600502-28 = "Uh...Well..."
2600502-29 = "[s] (Take out your bank card and pay.)"
2600502-30 = "...What?!"
2600502-31 = "Thank you. The payment has been accepted."
2600502-33 = "Sensei! What are you doing?! Why did you pay?!"
2600502-34 = "Are you buying because you're the teacher? B-But I'm the one who invited you!"
2600502-35 = "...Ugh!"
2600502-36 = "Okay... I'll let you get away with that today. But next time, I'm buying!"
2600502-37 = "You got it?! Next time, I'm paying! Understand?!"
2600502-38 = "[s3] \"Sure thing. I'll be here whenever you call.\"\n[s4] Hand the mille-feuilles over to Yoshimi."
2600502-39 = "...!"
2600502-40 = "...!"
2600502-41 = "...Haha."
2600502-42 = "Okay, thanks Sensei. See you next time! Call you later!"
2600502-47 = "(Then Yoshimi wandered off happily after getting her mille-feuilles.)"

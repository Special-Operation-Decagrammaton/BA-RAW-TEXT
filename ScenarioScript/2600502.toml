2600502-25 = "3;요시미;09;(뭐, 뭐야!? 이렇게까지 비싼 건 계산에 없었는데!)"
2600502-26 = "3;요시미;09;(그럼 개당 3,400엔이란 말이야!? 이게 말이 돼!? 아무리 한정 신상이라고 해도……!)\n#3;em;[속상함]\n#3;stiff"

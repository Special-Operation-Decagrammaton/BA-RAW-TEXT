[translation]
10013050-1 = "Episode 5;White-Eared Monsters 1"
10013050-7 = "Following Shizuko's directions, we arrived at a secluded beach."
10013050-8 = "[ns] \"So this should be...the White-Eared Monsters That Destroy Losers...\""
10013050-9 = "Once again...what a grandiose codename..."
10013050-10 = "M-Monsters? D-Do you think Izuna's ninjutsu can defeat them?!"
10013050-11 = "I'm not sure, but we'll be okay regardless! Chise is here!"
10013050-13 = "*gulp*"
10013050-19 = "...An exorcism?"
10013050-20 = "[s] \"We'll find out if they're really monsters when we get there.\""
10013050-21 = "Yes. The Hot Springs Department had a flashy name, but they were just students!"
10013050-22 = "It's like folk tales, just rumors that evolve into stories about ghouls and ghosts."
10013050-23 = "Yeah! I wouldn't worry about the word \"monsters\" too much."
10013050-29 = "U-Ugh..."
10013050-36 = "I-I have to go..."
10013050-40 = "...to the arena..."
10013050-46 = "Wh-What was that...?"
10013050-47 = "B-Boss! There's more!"
10013050-52 = "I-I have to hurry..."
10013050-57 = "...before it's too late..."
10013050-63 = "They seem to be a bit...disoriented."
10013050-64 = "[s] \"More like possessed...maybe by a monster?\""
10013050-66 = "No way! Monsters aren't real, okay?"
10013050-72 = "Oh! The sound of a ship horn! I think it's coming from over there!"
10013050-78 = "What a huge ship."
10013050-79 = "You can see the name on the side!"
10013050-81 = "The Golden Fleece."
10013050-82 = "[s] \"The Golden Fleece... I've heard that name before...\""
10013050-87 = "Thirty minutes left to board!"
10013050-88 = "If you want to participate in the game today, get on board before it's too late!"
10013050-93 = "Ughhh..."
10013050-101 = "They're filing onto the ship like they're brainwashed!"
10013050-102 = "Do we f-follow them, boss?"
10013050-103 = "Ugh! Th-This is so suspicious, but we have to do something! We have a mission!"
10013050-104 = "We have to get on."
10013050-105 = "[s] \"All aboard.\""
10013050-119 = "[ns] \"It's kind of chaotic in here.\""
10013050-139 = "Everyone seems to be focused on something over there."
10013050-140 = "What could they be doing on board a ship?"
10013050-141 = "This commotion...people that look possessed...and the word \"game\" I heard before boarding..."
10013050-142 = "C-Could this place be...? What if there's illegal activity happening here?!"
10013050-143 = "[s] \"Look. Someone's shouting over there.\""
10013050-148 = "I-I-It's my turn now...!"
10013050-149 = "I'm gonna do a special summon for the Human-Faced Snail! At the same time, I'm gonna dance to increase the snail's defense!"
10013050-150 = "Th-Then I'm gonna summon an Honor Student Praying Mantis!"
10013050-151 = "I'll play the bridge to increase the speed of the Honor Student Praying Mantis!"
10013050-152 = "I'm ready to attack!"
10013050-157 = "What are they saying?"
10013050-158 = "Oh, I've seen this before. Kaede is absolutely enamored with this game."
10013050-159 = "It's a card game called Mushiqueen!"
10013050-160 = "...M-Mushiqueen?!"
10013050-161 = "[s] \"Ah. This game.\""
10013050-162 = "Why are you all nodding along! Why are they playing it here?"
10013050-163 = "And why does everyone look so scary? It's just a card game!"
10013050-164 = "What is it that Kaede always says?"
10013050-165 = "Ah! \"Mushiqueen is a scary game where the players compete by risking their own honor and beliefs!\""
10013050-166 = "Right! It's a harsh game where you can get trapped in a card if you lose. Boss! It's happened to Pina a lot!"
10013050-168 = "H-How terrifying! This is a game?!"
10013050-169 = "No, no, no. That's just an animation effect in the game! They don't actually get trapped!"
10013050-170 = "[s] \"But, actually. Why are they holding contests here?\""
10013050-176 = "Mushiqueen battlers! The wait is over!"
10013050-182 = "Today you'll compete fiercely against each other's decks!"
10013050-183 = "Welcome to the underground Mushiqueen competition!"
10013050-184 = "Underground...?"
10013050-185 = "As you know, the Mushiqueen competition on this ship is no ordinary contest!"
10013050-186 = "Winners walk away richer than ever, while the losers are left crying!"
10013050-187 = "Lose the game, and lose everything! You'll have to leave your dignity, and your entire deck! What a frightening thought! Have mercy!"
10013050-188 = "It's just a card game, right...?"
10013050-189 = "[s1] \"It's much more than just a game to them.\" \n[s2] \"A player's deck is kind of like their soul. According to Kaede.\""
10013050-190 = "Why even participate then?"
10013050-191 = "I guess I can understand that..."
10013050-192 = "But why would they risk such a massive loss then?"
10013050-193 = "Of course where there's loss, there's also opportunity!"
10013050-194 = "The winner of the contest will be awarded a limited-time Mushiqueen card pack, and..."
10013050-199 = "...a Resort Contract that allows you to operate this arena!"
10013050-203 = "[ns] \"What a generous contest.\""
10013050-204 = "Whaaat?! What are they thinking? If they give that contract away, they'll lose everything! They're okay with that?!"
10013050-206 = "Of course it's okay! It's victory or death for every Mushiqueen battler!"
10013050-211 = "Wh-What?!"
10013050-212 = "We received a report that someone was causing trouble!"
10013050-213 = "Who's causing a commotion in this holy arena?"
10013050-214 = "I mean, I just..."
10013050-215 = "Hmm, looking at you, I don't think you're here to participate."
10013050-216 = "[s] \"You can tell just by looking?\""
10013050-217 = "When you're a Mushiqueen battler, the fiery spirit of the cards lights up your eyes!"
10013050-218 = "Nothing you're saying makes sense to me!"
10013050-220 = "Anyway, if you're not a battler, get lost, now!"
10013050-221 = "This place is about to turn into a battlefield!"
10013050-222 = "[s] \"I think it already is...\""
10013050-223 = "Wait! Are you guys Hunters?"
10013050-224 = "If that's the case, we can't forgive you! We'll kick you off the ship for disrupting our contest!"
10013050-232 = "Did you toss everyone who came here into the sea? Are you pirates or something?!"
10013050-233 = "Wh-What should we do, boss?! We're too young to die!"
10013050-234 = "My lord! Even if we're in danger, I'll protect you!"
10013050-236 = "*yawn*"
10013050-237 = "Wait just a moment, please. According to what you said..."
10013050-238 = "If we participate in the Mushiqueen competition, we can stay?"
10013050-239 = "[s] \"Mimori?\""
10013050-241 = "Huh? Well...I guess."
10013050-242 = "We would never stand in the way of a Mushiqueen battler."
10013050-244 = "Everyone, I think this is a good opportunity. If we take it, there will be no need to fight."
10013050-245 = "We simply need to win the competition and acquire the contract."
10013050-246 = "You say that like winning would be easy! I don't know much about Mushiqueen, let alone how to play it..."
10013050-247 = "Lucky for us, we have some experts supporting us."
10013050-248 = "They are some very special members of the Inner Discipline Club and Festival Department!"
10013050-249 = "[s] \"...This is really happening.\""
10013050-250 = "Oh!"
10013050-261 = "I got it, President!"
10013050-262 = "We'll lead you to victory!"
10013050-264 = "Heehee! Here comes the cavalry!"
10013050-265 = "Pina! Kaede! We're counting on you!"
10013050-266 = "[s] \"...Are we going to be okay?\""
10013050-267 = "I don't know! Ughhh! Fine! Whatever happens, happens..."
10013050-268 = "Let's win a Mushiqueen competition!"

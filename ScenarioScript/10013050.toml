[translation]
10013050-1 = "第5話;白耳怪物們（１）"
10013050-7 = "（聽從靜子的指示，這次來到了安靜的海邊）"
10013050-8 = "[ns] 「下一個對手是『引導敗者邁向毀滅的白耳怪物們』……是嗎？」"
10013050-9 = "該怎麼說呢……不管聽幾次都覺得是很厲害的名字呢。"
10013050-10 = "怪，怪物……！究竟伊樹菜的忍術能不能擊敗他們呢……？"
10013050-11 = "唔嗯，這就不知道了……不過，不用擔心的！#n畢竟我們有知世同學在嘛！"
10013050-13 = "（……吞口水）"
10013050-19 = "……惡靈，退散？"
10013050-20 = "[s] 「總之，到底是不是怪物只要去了就知道了。」"
10013050-21 = "嗯……剛才的溫泉開發部也只是名字很特別，實際上倒是很普通。"
10013050-22 = "從這點看來雖然說是怪物，也不過只是個名字而已。"
10013050-23 = "不如說，幽靈和怪物什麼的本來就不存──"
10013050-29 = "嗚，嗚啊啊……"
10013050-36 = "要，要過去才行……"
10013050-40 = "到會場……去……"
10013050-46 = "……嗯？剛剛那是……什麼？"
10013050-47 = "社長！看來好像還不只一個人……"
10013050-52 = "快，快點……"
10013050-57 = "為了避免錯過……要快點過去才行……"
10013050-63 = "又有一個人……那個樣子，簡直就像是……"
10013050-64 = "[s] 「看起來好像被什麼附身了一樣……比如怪物之類的。」"
10013050-66 = "咦！？怪，怪怪，怪物什麼的才不可能存在！"
10013050-72 = "這是……船的氣笛聲！從那邊傳來的！"
10013050-78 = "哇……好大的船……"
10013050-79 = "在船身上──"
10013050-81 = "寫著「黃金芙利」號。"
10013050-82 = "[s] 「黃金芙利？好像在哪裡聽過……」"
10013050-87 = "登船時間剩下30分鐘──！"
10013050-88 = "參加今天遊戲的客人們請不要遲到了！"
10013050-93 = "唔喔喔喔……"
10013050-101 = "大，大家用像被附身一樣的動作上船了！"
10013050-102 = "怎怎，怎麼辦才好！？社長！"
10013050-103 = "雖然很奇怪……但是也不能就這樣待在這裡！#n我們可是有目的要達成的！"
10013050-104 = "大家，我們走吧！"
10013050-105 = "[s] 「嗯。」"
10013050-119 = "[s] 「真熱鬧呢。」"
10013050-139 = "在這裡的所有人，好像都被什麼附身了一樣集中在這裡……"
10013050-140 = "這裡究竟在進行著什麼呢……？"
10013050-141 = "吵鬧的氣氛……失魂般的乘客……#n還有在外面聽到的「遊戲」這個詞……"
10013050-142 = "──難，難道說這裡是，在做違法事情的地方……！"
10013050-143 = "[s] 「嗯？那裡好像有什麼聲音喔。」"
10013050-148 = "那，那麼，接下來輪到我了……！"
10013050-149 = "特，特殊召喚「人面蝸牛」！#n與此同時──跳，跳起舞！提升「人面蝸牛」的防禦力！"
10013050-150 = "那，那麼在下召喚「資優生螳螂」！"
10013050-151 = "同時只要下腰……就能提升資優生螳螂的速度！"
10013050-152 = "就這樣──發動攻擊！"
10013050-157 = "……咦？"
10013050-158 = "啊，那個我有看過。好像是楓醬也有在玩的……"
10013050-159 = "叫做甲蟲皇后的遊戲！"
10013050-160 = "甲蟲……皇后？"
10013050-161 = "[s] 「原來如此，是這麼回事啊。」"
10013050-162 = "等，等一下！話說為什麼要在這種地方玩？"
10013050-163 = "而且，是在那種認真……不對是魂不守舍的狀態！？"
10013050-164 = "楓醬常常這麼說。"
10013050-165 = "甲蟲皇后是雙方賭上名譽和信念才能展開的──恐怖的遊戲！"
10013050-166 = "沒錯沒錯！是遊戲裡輸掉的人就會被關在卡片裡面的殘酷遊戲喔！菲娜也這麼說過！"
10013050-168 = "是，是這麼恐怖的東西嗎……！"
10013050-169 = "不不不，那只是動畫裡這麼演而已吧！？"
10013050-170 = "[s] 「但是，為什麼這種地方會有甲蟲皇后的大會……」"
10013050-176 = "讓各位久等了！甲蟲皇后的決鬥者們！"
10013050-182 = "歡迎今天也來到賭上了雙方牌組的激烈戰場──"
10013050-183 = "「祕密．甲蟲皇后大會」！"
10013050-184 = "祕，祕密……？"
10013050-185 = "正如各位所知，在這艘船上舉辦的甲蟲皇后大會和一般的大會可不一樣！"
10013050-186 = "沒錯，這裡將會明確區分贏家和輸家！#n贏家會獲得所有，輸家則將失去一切！"
10013050-187 = "也就是說！輸家將會被奪走所有的卡牌和牌組！#n啊啊！多麼可怕！"
10013050-188 = "…………那有很可怕嗎？"
10013050-189 = "[s1] 「誰……誰知道呢？」\n[s2] 「竟然會被奪走名為牌組的靈魂，這是多麼可怕……！」"
10013050-190 = "就算這樣也要參加這個大會的理由到底是什麼呢……？"
10013050-191 = "老師能夠理解嗎！？"
10013050-192 = "就算是這樣好了，為什麼要參加這種大賽我還是完全搞不懂！"
10013050-193 = "但是，既然對輸家有懲罰……#n當然！我們也為贏家準備了獎品！"
10013050-194 = "能夠在這個大會裡順利獲得勝利的人，除了能獲得甲蟲皇后限定卡包之外……"
10013050-199 = "還能獲得能夠營運這個鬥技場的權利書──#n「渡假勝地使用權」作為獎品！"
10013050-203 = "[ns] 「還真是大手筆的大會啊。」"
10013050-204 = "你，你說什麼──！？話說這沒問題嗎！？#n把那種東西交出去的話，對營運方很麻煩的吧！？這樣也沒關係嗎！？"
10013050-206 = "那是當然的囉！#n甲蟲皇后決鬥者擁有的只有勝利或是死亡，僅此而已！"
10013050-211 = "什，什麼……？"
10013050-212 = "收到了有人鬧事的通報！"
10013050-213 = "竟然在這個神聖的會場引起騷動，你們到底是誰！"
10013050-214 = "我，我們是──"
10013050-215 = "嗯……看起來不像是大會的參賽者呢？"
10013050-216 = "[s] 「用看的就知道了嗎？」"
10013050-217 = "如果是甲蟲皇后決鬥者的話，眼睛裡會寄宿著燃燒中的鬥志才對！"
10013050-218 = "完全搞不懂在說什麼！？"
10013050-220 = "總之是一般人的話就請趕快離開吧！"
10013050-221 = "因為這裡即將變為戰場！"
10013050-222 = "[s] 「我們好像已經在戰場的正中心了……」"
10013050-223 = "還是說……難道你們是來進行「渡假勝地狩獵」的？"
10013050-224 = "那就更不能放過你們了！現在就把會妨礙大會的傢伙趕出去！"
10013050-232 = "所以你們是要把找上門來的人二話不說全丟進海裡嗎？#n你們是海賊是不是！？"
10013050-233 = "社，社長怎麼辦？這可是現在進行式的命懸一線啊……"
10013050-234 = "主公！伊樹菜會拚盡全力保護大家的！"
10013050-236 = "呼……"
10013050-237 = "……請等一下。"
10013050-238 = "只要有參加甲蟲皇后大賽的意願的話，就能允許我們搭船了對吧？"
10013050-239 = "[s] 「三森？」"
10013050-241 = "嗯？嘛……是這麼說沒錯。"
10013050-242 = "如果是甲蟲皇后決鬥者的話就沒有驅逐你們的理由了。"
10013050-244 = "大家，這是機會唷。沒必要以「渡假勝地狩獵」的方式進行戰鬥。"
10013050-245 = "只要在大會中取得冠軍，就能輕鬆回收合約了。"
10013050-246 = "可是，我完全不懂甲蟲皇后喔？連玩都沒有玩過……"
10013050-247 = "這點不用擔心。畢竟，在我們身邊可是有甲蟲皇后專家……甲蟲皇后決鬥者在呢。"
10013050-248 = "沒錯！就是修行部，還有節慶營運管理部！"
10013050-249 = "[s] 「……難道是！」"
10013050-250 = "啊！"
10013050-261 = "原來如此！我知道了，部長！"
10013050-262 = "這種事情就包在我們身上吧！"
10013050-264 = "好的，那就拜託你們了。"
10013050-265 = "真是可靠啊！菲娜、楓！"
10013050-266 = "[s] 「……這樣真的沒問題嗎？」"
10013050-267 = "既然這樣只能走一步算一步了！"
10013050-268 = "總之挑戰看看吧！"

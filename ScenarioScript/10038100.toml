10038100-37 = "1;사야;07\n3;카이;07\n#1;em;[!]\n#1;h\n#3;h\n#wait;800"
10038100-38 = "1;사야;05;그건 다르다. 나님이 만든 단약은……!\n#1;stiff"
10038100-39 = "[s] \"사야의 단약은, 사야의 행복을 위한 물건이 아니었으니까.\"  "

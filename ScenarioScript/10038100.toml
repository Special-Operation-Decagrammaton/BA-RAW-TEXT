[translation]
10038100-1 = "第10話;在同一片天空之下"
10038100-9 = "來得比我想像中還晚呢，妃姬。#n天都已經黑了哦？"
10038100-10 = "誰叫某個人做得這麼過火。#n真是的，也不考慮一下收拾殘局之人的立場。"
10038100-11 = "誰會希望事情變成這樣呢？#n你還是沒能把握重點呢。"
10038100-12 = "像汝這種「身在河中不聞其聲」之輩，想必是不會明白的吧。"
10038100-13 = "不聞其聲自有其道理。#n我反而好奇……一個曾敗逃過的門主，究竟還有什麼話可說呢？"
10038100-14 = "呵呵。有話要對汝說的可不僅有妾身一人。"
10038100-15 = "哦？"
10038100-23 = "……好久不見了，誡前輩。"
10038100-24 = "我還想說是誰，原來是後輩啊。#n呵呵呵……在我不在的期間，隨意經營鍊丹術研究會應該挺辛苦的吧？"
10038100-25 = "對我來說，前輩依然是個難以理解的人。"
10038100-26 = "原本以為再次見面的時候，我對前輩的看法會有所改變……"
10038100-27 = "果然還是沒辦法啊……"
10038100-28 = "還以為你想說什麼，結果只有這些嗎？"
10038100-29 = "呵呵呵……真可笑。#n我跟你之間又有什麼差別呢？"
10038100-30 = "……？"
10038100-34 = "我已經看過你的配藥記錄了。#n你自己不也以開發丹藥為藉口，進行了各種實驗嗎？"
10038100-38 = "我跟前輩你不一樣。#n我製作的丹藥是……！"
10038100-39 = "[s]「沙耶的丹藥，並不是為了沙耶自己的幸福而存在。」"
10038100-43 = "……是老師啊。"
10038100-44 = "老師你不也成為了沙耶的實驗對象之一嗎？"
10038100-45 = "即便如此依然護著沙耶啊……真有趣。"
10038100-46 = "[s]「確實是發生過一些令人困擾的事情沒錯……」"
10038100-48 = "老，老師！？"
10038100-49 = "[s]「但是，沙耶的目光始終向著他人。」"
10038100-52 = "[ns1]「他從未想過要拿丹藥換取富貴。」\n[ns2]「為了阻止人們的不幸，他也甘願承擔損失。」"
10038100-57 = "也對……但你不認為這正是問題所在嗎，老師？"
10038100-58 = "如果害怕失敗與副作用，就無法有所成就。"
10038100-59 = "無論過程中產生了多少失敗與副作用……只要成就能超越損失便無足掛齒。"
10038100-63 = "若是因為害怕而半途而廢，便只能被記錄為一事無成的失敗者。"
10038100-64 = "我也知道前輩你……是最接近長生不老藥的人。"
10038100-65 = "但前輩的做法，只會讓所有人都陷入不幸……！"
10038100-66 = "呵呵呵……我們以前也談過相同的話題呢。#n但這終究只是你的詭辯。"
10038100-67 = "你所謂的「幸福」是由誰定義的呢？"
10038100-68 = "難道你認為那些連自己缺少什麼都不知道的凡夫俗子，能決定自己幸福的方向嗎？"
10038100-69 = "…………"
10038100-70 = "你回答不了對吧？就和當時一樣。"
10038100-71 = "沒錯。大多數人都是無知而貪婪的。"
10038100-72 = "即便為其彌補不足之處，那些忘恩負義之人也會反過來埋怨隨之而生的不幸。"
10038100-73 = "……無論別人怎麼說，我都會製造仙丹。"
10038100-74 = "──那得以滿足凡夫俗子的無盡欲望，引導我們成為仙人的終極靈藥。"
10038100-80 = "你可別忘記了，藥子沙耶。#n試圖抵達仙人的境界──這才是[ruby=鍊丹術研究會]我們研究者的初[/ruby]衷與目的。"
10038100-81 = "可是我們……！"
10038100-86 = "正因如此，吾等才只能就結果而論。"
10038100-90 = "啊，原來是妃姬啊。#n好久沒聽見你說話，我還以為你失蹤了呢。"
10038100-91 = "汝還記得那些因汝的丹藥而身體受損的學生嗎？#n還是汝認為這些瑣碎之事根本不值得記住？"
10038100-92 = "呵呵呵……我記得，我當然記得。#n那些都是寶貴的個案，我怎麼可能會忘記呢？"
10038100-93 = "那汝應該也知道沙耶為了治療那些學生，無法專心於自己的研究才是。"
10038100-94 = "有件事我得說清楚。#n那些都是那些學生希望得到的東西。"
10038100-95 = "人通常不清楚自己真正想要的是什麼。"
10038100-96 = "不明白自己的選擇將帶來什麼後果，無以承擔之人也不在少數。"
10038100-97 = "難道我們該為凡夫俗子的無知負責嗎？#n這種觀點恕我實在無法苟同。"
10038100-98 = "不。正因為人人皆有凡夫俗子的一面，所以才更應該互相寬容。"
10038100-99 = "這只適用於像你這樣的人吧？"
10038100-100 = "汝要如何看待妾身都無所謂。"
10038100-107 = "但身為眾多凡夫俗子中的一人，妾身於此再次宣告──山海經不存在汝的容身之地。"
10038100-112 = "你最終選擇了自我貶低嗎……真讓人失望，妃姬。"
10038100-113 = "都已經過了這麼久，我還以為我們多少能有些交集的。"
10038100-114 = "呵呵。就欲報復妾身之人而言，這話聽起來似乎不夠狠毒啊？"
10038100-115 = "……畢竟那種事只要我下定決心，隨時都能做到。"
10038100-116 = "你難道忘了嗎？#n把我變成這樣的可是你哦。"
10038100-117 = "是啊……汝確實這麼說過。#n那麼，妾身就在此明確地告訴汝吧。"
10038100-122 = "造就今日的申谷誡之人──不是別人而是汝自己。"
10038100-127 = "什麼……！？"
10038100-128 = "是汝的選擇──汝的作為、汝的決定。"
10038100-129 = "將他人定義為凡夫俗子的是汝，宣稱自己與眾不同的也是汝。"
10038100-130 = "若汝依舊要怨恨妾身，那就怨吧。"
10038100-131 = "山海經的門主，本就是為承擔各種麻煩事而存在的。"
10038100-132 = "虧你敢在我面前大放厥詞……"
10038100-137 = "我決定了。#n丹藥的下一個實驗對象就是你。"
10038100-138 = "哦，是嗎？汝真的能做到嗎？"
10038100-139 = "你還能這麼從容確實讓人驚訝呢，妃姬。"
10038100-144 = "沙耶都被拘禁了這麼久……"
10038100-145 = "你應該已經快站不住了吧？"
10038100-146 = "呵呵……汝是這麼想的嗎？#n這也不無道理。"
10038100-151 = "那就用汝的雙眼來確認吧。#n看看站在汝面前的玄龍門門主──究竟是誰。"

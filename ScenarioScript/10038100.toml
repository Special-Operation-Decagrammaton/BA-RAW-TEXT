10038100-90 = "3;카이;02;아, 키사키인가. 반갑구나. 너무나 말이 없기에 깜빡 실종된 줄 알았지 뭐냐."
10038100-91 = "1;키사키;02;너의 단약으로 몸을 망가뜨린 학생들을 기억하는가? 아니면 그런 사소한 문제들은 기억할 가치조차 없었기에 잊었다고 할 테냐?\n#1;em;[?]\n#1;ar\n#3;m5"
10038100-92 = "3;카이;08;쿡쿡쿡……. 기억하고 있지. 기억하고 있다마다. 그 모두가 소중한 하나의 증례들인데, 어찌 기억하지 않을 수 있겠는가.\n#3;em;…"
10038100-93 = "1;키사키;99;그렇다면 사야가 그 학생들을 치료하느라 정작 자신의 연구에 매진하지 못한 것도 알고 있겠구나."
10038100-94 = "3;카이;00;한 가지만 확실하게 해 두지. 그것은 모두 그 학생들이 스스로 원한 일이었다."
10038100-95 = "1;키사키;02;사람은 대개, 자기가 정확히 무엇을 원하는지 모르는 법이다.\n#1;em;[반응]"
10038100-96 = "1;키사키;05;자신의 선택이 어떤 결과를 불러오게 될지 알지 못하고, 그 결과를 감당하기 어려워하는 일도 부지기수다."
10038100-97 = "3;카이;02;범부(凡夫)들의 무지에 대한 책임마저 우리가 져야 하는가? 그 관점에는 어떻게 해도 찬성할 수 없구나."
10038100-98 = "1;키사키;08;아니. 우리 모두가 어떤 부분에서는 범부(凡夫)이기에, 서로를 관대하게 대해야 한다는 이야기를 하고 있는 것이다."
10038100-99 = "3;카이;01;그것은 너와 같은 자들에게나 해당하는 일일 것이다만?\n#3;em;[?]"

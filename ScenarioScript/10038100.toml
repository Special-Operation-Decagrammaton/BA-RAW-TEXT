10038100-57 = "3;카이;99;그래……. 바로 그것이 문제였지. 그렇게 생각하지 않나, 선생?\n#3;em;[한숨]\n#3;a"
10038100-58 = "3;카이;00;실패와 부작용을 두려워한다면 성취를 거둘 수 없다."
10038100-59 = "3;카이;03;아무리 과정에서 수많은 실패와 부작용이 따르더라도, 그 피해를 상회하는 성취만 거둔다면 누구도 이를 문제 삼지는 못할 것이다."

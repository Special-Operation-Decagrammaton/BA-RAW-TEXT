[translation]
10038100-1 = "ตอนที่ 10;ทำให้ฟ้าสมดุล"
10038100-9 = "กว่าจะมาก็มืดค่ำเลยนะ คิซากิ เธอมาช้ากว่าที่ฉันคิดไว้นะ"
10038100-10 = "เพราะมีใครบางคนไปก่อเรื่องอย่างงามไว้ที่ไหนสักแห่งน่ะ เราอยากให้เธอคิดในมุมมองของคนที่#nต้องไปจัดการเรื่องนั้นด้วย"
10038100-11 = "ใครอยากให้ไปจัดการอะไรกันล่ะ? ยังจับประเด็นไม่ได้อยู่เหมือนเดิมสินะ"
10038100-12 = "คนที่ไม่ฟังเสียงในแม่น้ำอย่างเธอคงไม่เข้าใจหรอก"
10038100-13 = "เสียงที่ไม่ได้ยินย่อมมีเหตุผลที่ไม่ได้ยินอยู่แล้ว ฉันสงสัยจังเลยนะว่าประมุขที่พ่ายแพ้จนต้องหนีไปจะ#nมีอะไรให้พูดอีก"
10038100-14 = "ฮุฮุ คนที่มีเรื่องอยากพูดกับเธอ คงไม่ได้มีแค่เราคนเดียวหรอกนะ"
10038100-15 = "หืม?"
10038100-23 = "ไม่ได้เจอกันนานเลยนะ... รุ่นพี่ไค"
10038100-24 = "ก็สงสัยอยู่ว่าจะเป็นใคร ที่แท้ก็เป็นรุ่นน้องคนนี้เองสินะ หึหึหึ... คงเหนื่อยน่าดูเลยนะที่บริหารชมรม#nวิจัยศาสตร์การปรุงยาตามอำเภอใจในช่วงที่ฉันไม่อยู่"
10038100-25 = "สำหรับท่านซายะแล้ว รุ่นพี่ยังเป็นคนที่อ่านใจไม่ออกเหมือนเดิมเลยนะ"
10038100-26 = "อุตส่าห์หวังว่าถ้าได้เจอกันอีกครั้ง ความคิดของท่านซายะที่มีต่อรุ่นพี่จะเปลี่ยนไปซะอีก..."
10038100-27 = "แต่นั่นก็... คงเป็นเรื่องยากน่ะนะ..."
10038100-28 = "ฉันก็สงสัยอยู่ว่าเธอจะมาพูดอะไร สุดท้ายก็แค่นี้เองน่ะเหรอ?"
10038100-29 = "หึหึหึ... ตลกจังเลยนะ คิดว่าเธอกับฉันแตกต่างกันขนาดนั้นเลยเหรอ?"
10038100-30 = "...?"
10038100-34 = "ฉันตรวจดูบันทึกการปรุงยาทั้งหมดของเธอแล้ว เธออ้างว่าจะพัฒนายาลูกกลอน แต่ก็ทดลองทำอะไร#nอยู่เหมือนกันไม่ใช่หรือไง!"
10038100-38 = "มันไม่เหมือนกับของรุ่นพี่หรอกนะ ยาที่ท่านซายะทำน่ะ...!"
10038100-39 = "[s] \"ซายะไม่ได้ผลิตยาเพื่อตอบสนองความสุขของตัวเองนะ\"  "
10038100-43 = "ครูงั้นเหรอ...?"
10038100-44 = "ครูเองก็น่าจะเคยอยู่ในการทดลองของซายะนะ"
10038100-45 = "แต่ถึงอย่างนั้นก็จะปกป้องซายะอย่างนั้นเหรอ? เป็นเรื่องน่าสนใจจริงเชียว"
10038100-46 = "[s] \"ก็จริงอยู่ที่มีเรื่องยุ่งยากอยู่บ้าง...\""
10038100-48 = "คะ... ครู?!"
10038100-49 = "[s] \"แต่ซายะก็ทำเพื่อคนอื่นอยู่ตลอดเวลานะ\""
10038100-52 = "[ns1] \"ซายะไม่ได้ผลิตยาเพื่อความร่ำรวยหรือเกียรติยศ\"\n[ns2] \"ซายะผลิตยาเพื่อให้คนอื่นพ้นจากความทุกข์\""
10038100-57 = "ใช่แล้วละ... นั่นละปัญหา! ครูไม่คิดอย่างนั้นเหรอ?"
10038100-58 = "ถ้ากลัวความล้มเหลวและผลข้างเคียง เราก็บรรลุสิ่งใดไม่ได้หรอก"
10038100-59 = "ต่อให้เกิดความล้มเหลวหรือผลข้างเคียงขึ้นกี่ครั้ง แต่ถ้าเราบรรลุเป้าหมายที่ยิ่งใหญ่กว่าความเสียหาย#nเหล่านั้นได้ ก็จะไม่มีใครตั้งคำถามกับเรื่องนี้ได้"
10038100-63 = "ในทางตรงกันข้าม ถ้าเรากลัวและหนีปัญหาไปกลางคัน เราก็จะถูกตราหน้าว่าเป็นผู้แพ้ที่ล้มเหลว#nซ้ำแล้วซ้ำเล่า"
10038100-64 = "ท่านซายะรู้ดี... ว่ารุ่นพี่เป็นคนที่เข้าใกล้ยาอายุวัฒนะอะไรนั่นได้ดีกว่าใคร"
10038100-65 = "แต่วิธีการของรุ่นพี่ไม่ได้สร้างความสุข แต่กลับทำให้ทุกคนทนทุกข์...!"
10038100-66 = "หึหึหึ... จะมาใช้วาทศิลป์กับฉันสินะ เรื่องนี้เราเคยคุยกันมาก่อนแล้วครั้งหนึ่งไม่ใช่เหรอ?"
10038100-67 = "ความสุขที่เธอพูดถึง ใครเป็นคนนิยามกันล่ะ?"
10038100-68 = "อย่าบอกนะว่า... คนธรรมดาสามัญที่ไม่รู้ด้วยซ้ำว่าตัวเองบกพร่องอะไร คนแบบนั้นคงไม่คิดว่าตัวเอง#nกำหนดทิศทางแห่งความสุขได้หรอกใช่มั้ย?"
10038100-69 = "..."
10038100-70 = "ตอบไม่ได้เหมือนตอนนั้นเลยสินะ "
10038100-71 = "ก็ไม่แปลกหรอก เพราะคนส่วนใหญ่ทั้งโลภและไร้ซึ่งความรู้"
10038100-72 = "ฉันเติมเต็มในส่วนที่บกพร่องให้ทั้งที แต่กลับมาบ่นว่าต้องเป็นทุกข์กับสิ่งนั้น คนส่วนใหญ่มันก็อกตัญญูกันแบบนี้นี่ละ"
10038100-73 = "ไม่ว่าใครจะว่าอย่างไร ฉันก็จะทำน้ำอมฤตให้ได้..."
10038100-74 = "นั่นคือสุดยอดยาวิเศษที่จะนำฉันไปสู่การเป็นเทพเจ้า และเป็นยาที่จะตอบสนองต่อความปรารถนา#nอันไม่มีที่สิ้นสุดของคนธรรมดาได้"
10038100-80 = "ยาคูชิ ซายะ จำเอาไว้ด้วยล่ะ ว่าความพยายามที่จะนำไปสู่การเป็นเทพเจ้าคือจุดเริ่มต้นและเป้าหมาย#nสูงสุดของชมรมวิจัยศาสตร์การปรุงยา"
10038100-81 = "แต่ว่าพวกเรา...!"
10038100-86 = "และด้วยเหตุนั้น พวกเราจึงต้องพูดถึงผลลัพธ์อย่างหลีกเลี่ยงไม่ได้"
10038100-90 = "อ้อ เมื่อกี้คิซากิเหรอ? ยังอยู่ที่นี่สินะ เห็นเงียบไปนาน ฉันคิดว่าหนีหายไปไหนแล้วซะอีกนะ"
10038100-91 = "เธอยังจำนักเรียนที่ร่างกายเสียหายเพราะยาของเธอได้หรือไม่เล่า? หรือว่าเธอจะบอกว่าลืมไปแล้ว เพราะปัญหาเล็กน้อยพวกนั้นไม่มีค่าให้จดจำ?"
10038100-92 = "หึหึหึ... ฉันต้องจำได้อยู่แล้ว ทุกคนล้วนเป็นตัวอย่างทดลองอันล้ำค่า ฉันจะลืมได้ยังไงกัน"
10038100-93 = "เช่นนั้นเธอก็คงรู้ดีสินะว่าซายะไม่มีเวลาไปทุ่มเทกับการวิจัยของตัวเองเพราะต้องไปหาทางรักษา#nนักเรียนเหล่านั้นน่ะ"
10038100-94 = "มาพูดเรื่องนี้ให้ชัดๆ เถอะ นั่นเป็นสิ่งที่นักเรียนพวกนั้นเลือกกันเอง"
10038100-95 = "คนส่วนใหญ่มักจะไม่รู้ว่าตัวเองต้องการอะไร"
10038100-96 = "ไม่รู้ว่าการเลือกของตัวเองจะนำมาซึ่งผลลัพธ์แบบไหน แล้วหลายๆ คนก็พบว่าเป็นการยากที่จะรับมือ#nกับผลที่ตามมา"
10038100-97 = "พวกเราต้องรับผิดชอบต่อความไม่รู้ของคนธรรมดาสามัญด้วยเหรอ? ฉันไม่เห็นด้วยกับเรื่องนี้หรอกนะ"
10038100-98 = "ที่เราจะบอกก็คือ ในบางแง่มุมพวกเราก็ล้วนเป็นคนธรรมดาสามัญด้วยกันทั้งนั้น เราถึงต้องปฏิบัติต่อ#nกันด้วยความเอื้อเฟื้อ"
10038100-99 = "เรื่องนั้นน่าจะใช้ได้แค่กับคนอย่างพวกเธอนะ"
10038100-100 = "ถ้าเธอจะมองเราเช่นนั้น ก็ทำได้ตามใจชอบเลย"
10038100-107 = "ในฐานะคนธรรมดาคนหนึ่ง เราขอยืนยันคำเดิมที่เคยพูดในตอนนั้นว่าซานไห่จิงไม่มีที่ให้เธอยืนหรอก"
10038100-112 = "ท้ายที่สุดก็พยายามจะลดคุณค่าของตัวเองอย่างนั้นเหรอ...? ช่างน่าผิดหวังจริงๆ คิซากิ "
10038100-113 = "เวลาก็ล่วงเลยมาถึงขนาดนี้แล้ว ฉันอุตส่าห์หวังว่าเธอจะเติบโตจนเป็นคนที่คุยกับฉันได้รู้เรื่องกว่านี้สัก#nหน่อยเสียอีก"
10038100-114 = "ฮุฮุ ตั้งใจจะมาแก้แค้นเราแท้ๆ แต่ก็ยังพูดเช่นนั้นหรือ? ช่างน่าตลกสิ้นดี"
10038100-115 = "เรื่องแบบนั้นน่ะ ถ้าฉันตัดสินใจทำขึ้นมาละก็ ยังไงก็ต้องสำเร็จอยู่แล้ว "
10038100-116 = "เธอลืมไปแล้วเหรอ? เธอนั่นละตัวการที่ทำให้ฉันเป็นแบบนี้"
10038100-117 = "ใช่... เธอเคยพูดคำนั้นไว้ เช่นนั้นเราก็จะขอพูดให้ชัดเจนตรงนี้"
10038100-122 = "คนที่ทำให้เธอเป็นเช่นนี้ หาใช่ใครอื่นไม่ แต่เป็นตัวเธอเอง"
10038100-127 = "ว่ายังไงนะ...?!"
10038100-128 = "เธอเป็นคนเลือกเอง เธอเป็นคนทำ เธอเป็นคนตัดสินใจ "
10038100-129 = "คนที่นิยามคนอื่นว่าเป็นแค่คนธรรมดาสามัญ และคนที่ประกาศว่าตนแตกต่างจากคนธรรมดาสามัญ เหล่านั้นก็คือเธอเอง"
10038100-130 = "แต่ถ้าเธอยังจะคับแค้นใจเรา ก็จงทำอย่างที่ต้องการได้เลย"
10038100-131 = "ตำแหน่งประมุขของซานไห่จิงมีไว้เพื่อแบกรับเรื่องยุ่งยากอยู่แล้วไม่ใช่หรือ?"
10038100-132 = "พอได้อ้าปากพูดเข้าหน่อย ก็พูดจาฉะฉานเชียวนะ..."
10038100-137 = "งั้นก็ดี เพราะฉันตัดสินใจแล้วว่าจะทดสอบยาตัวต่อไปกับเธอ"
10038100-138 = "กับเราอย่างนั้นหรือ? คิดว่าจะทำเช่นนั้นได้จริงหรือ?"
10038100-139 = "ต้องยอมรับเลยนะว่าการที่เธอไม่สะทกสะท้านทำเอาฉันทึ่งไปเลยละ คิซากิ"
10038100-144 = "ซายะถูกคุมตัวไว้นานเท่าไรแล้วนะ?"
10038100-145 = "ถ้าไร้การช่วยเหลือจากซายะในช่วงที่ผ่านมา ตอนนี้เธอคงยืนทรงตัวไว้ได้อีกไม่นานแล้วหรือเปล่าล่ะ คิซากิ?"
10038100-146 = "ฮุฮุ... คิดเช่นนั้นสินะ ก็ไม่แปลกหรอก"
10038100-151 = "เช่นนั้นก็เชิญพิสูจน์ด้วยตาของตัวเธอเลย ว่าประมุขแห่งมังกรดำที่ยืนอยู่ตรงหน้าเธอเป็นอย่างที่เธอ#nคิดหรือไม่"

10038100-23 = "3;사야;07;……오랜만인 것이다. 카이 선배.\n#3;stiff"
10038100-24 = "3;카이;07;이거야 원, 누구인가 했더니 후배님 아니신가. 쿡쿡쿡……. 내가 없는 동안 연단방을 멋대로 운영하느라 수고가 많았던 모양이던데?\n#3;em;[음표]"
10038100-25 = "1;사야;05;나님에게 있어서 선배는, 여전히 알 수 없는 사람인 것이다.\n#1;ar\n#3;m5"
10038100-26 = "1;사야;07;다시 만날 일이 생긴다면, 선배에 대한 나님의 생각이 변할 수 있기를 바랐지만……."
10038100-27 = "1;사야;05;……역시나 그건, 무리인 것 같은 것이다…….\n#1;em;[속상함]\n#1;stiff"
10038100-28 = "3;카이;03;무슨 말을 하려나 했더니, 고작 그 정도인가."
10038100-29 = "3;카이;08;쿡쿡쿡……. 우습구나. 애초에 너와 나 사이에, 그 정도의 차이점이랄 게 있었을까?\n#3;em;…"

10038100-9 = "3;카이;00;생각보다는 늦었구나. 키사키. 이미 날이 저물고 있다.\n#3;a"
10038100-10 = "1;키사키;08;어딘가의 누군가가 워낙 화려하게 저질러 주어서 말이지. 이것 참, 수습하는 쪽의 입장도 생각해 주었으면 한다만.\n#1;em;[한숨]\n#1;ar\n#3;m5"
10038100-11 = "3;카이;03;누가 그런 것을 바랐다고 그러는 것이냐. 여전히 중심을 잡지 못하고 있구나."
10038100-12 = "1;키사키;00;강물 속의 목소리를 듣지 못하는 너에게는 알 수 없는 일이겠지."
10038100-13 = "3;카이;07;들리지 않는 소리에게는 그만한 이유가 있는 법이다. 한 번 패배하고 도망간 문주에게, 무슨 할 말이 남아 있다는 것인지 궁금하구나."
10038100-14 = "1;키사키;03;후후. 아무래도 너에게 할 말이 있는 것은 나뿐만이 아닌 것 같아서 말이다."

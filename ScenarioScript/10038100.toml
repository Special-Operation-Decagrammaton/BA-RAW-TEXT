10038100-63 = "3;카이;08;오히려 겁을 내어 도중에 도망친다면, 어줍잖은 실패만 거듭한 패배자로 기록될 뿐이지.\n#3;closeup"
10038100-64 = "3;사야;05;선배가…… 그 누구보다 불로불사의 영약에 가깝게 다가간 사람이라는 것은, 나님 역시 알고 있는 것이다.\n#3;em;…"
10038100-65 = "3;사야;07;그렇지만 역시, 선배의 방식은 모두를 불행하게 만드는 것이다……!\n#3;stiff"
10038100-66 = "5;카이;08;쿡쿡쿡……. 이미 전에 한 번 나누었던 대화이지만, 궤변이로군.\n#5;al\n#3;m1"
10038100-67 = "5;카이;01;네가 말하는 그 행복은 누가 정의한 것이지?\n#5;em;[?]"
10038100-68 = "5;카이;02;설마. 자신에게 부족한 것이 무엇인지조차 알지 못하는 범부들이, 스스로 행복의 방향을 결정할 수 있다고 생각하는 건 아니겠지?"
10038100-69 = "3;사야;05;………."
10038100-70 = "5;카이;03;대답하지 못하는구나. 그때와 같이. \n#5;em;[음표]"
10038100-71 = "5;카이;00;그렇겠지. 대부분의 사람들은 무지하고 탐욕스러우니까.\n#5;m3\n#3;dl"
10038100-72 = "5;카이;07;모자란 부분을 채워주면, 오히려 그 때문에 불행해졌다고 불평하는 배은망덕한 자들이 대부분이니 말이다."
10038100-73 = "5;카이;08;……누가 뭐라고 하든 나는 선단(仙丹)을 만들 것이다.\n#5;em;[반응]"
10038100-74 = "5;카이;03;우리를 선인(仙人)으로 이끌어 줄, 범부들의 끝없는 욕망을 채워줄 수 있는 궁극의 영약을 말이다."

[translation]
10038100-1 = "Episode 10;Balancing the Sky"
10038100-9 = "It's almost dark, Kisaki. What took you so long?"
10038100-10 = "Do you know how long it takes to clean up after you?"
10038100-11 = "I didn't ask you to. So easily distracted. You still haven't found your focus."
10038100-12 = "Oh, I have. And you'll never understand it. Like hearing the voice of a river."
10038100-13 = "Why would I want to hear imaginary sounds? Or any of your pointless blather. Run away again, would you?"
10038100-14 = "Oh, I'm not the only one here with something to say to you."
10038100-15 = "Oh?"
10038100-23 = "...It's been a long time, Kai."
10038100-24 = "Ah, my dear underclassman. Heehee... Thank you for keeping the Society running while I was away."
10038100-25 = "Hmm, you're still a mystery to me."
10038100-26 = "I thought if we met again, I might see you differently."
10038100-27 = "But no, that was too much to ask for I suppose..."
10038100-28 = "Is that all you came here to say?"
10038100-29 = "Keh heh keh heh... Hilarious. As if you, of all people, could ever lecture me."
10038100-30 = "Hm?"
10038100-34 = "I read through your prescription records. You tested elixirs on human subjects, just like I did."
10038100-38 = "No, NOT like you did! Mine were..."
10038100-39 = "[s] \"Saya wasn't doing it for her own benefit.\"  "
10038100-43 = "...Sensei again."
10038100-44 = "You were one of her guinea pigs too, weren't you?"
10038100-45 = "And you're still trying to protect her? Interesting."
10038100-46 = "[s] \"...I mean, her potions DID cause some problems, but...\""
10038100-48 = "S-Sensei?!"
10038100-49 = "[s] \"...but she only ever wanted to make other people happy.\""
10038100-52 = "[ns1] \"She never charged anyone for any of it.\"\n[ns2] \"She stopped when she saw it was hurting people.\""
10038100-57 = "But that was exactly the problem. Don't you see, Sensei?"
10038100-58 = "Success isn't possible if you let failure hold you back."
10038100-59 = "No matter how many setbacks and side effects may occur, it's all part of the process. All that matters is that the achievement outweighs the damages."
10038100-63 = "If you let your failures scare you off, like she did, then a failure is all you'll ever be."
10038100-64 = "You came close to your immortality elixir. Closer than anybody else."
10038100-65 = "But your methods made everyone unhappy!"
10038100-66 = "Keh heh keh heh... Oh, here we go again."
10038100-67 = "What is \"happiness,\" exactly? Who defines it, and how?"
10038100-68 = "Ordinary people don't even know what they're missing. You think they're qualified to say what makes them happy? They have no idea!"
10038100-69 = "..."
10038100-70 = "You still can't answer, can you? "
10038100-71 = "Of course you can't. People are ignorant and selfish."
10038100-72 = "They're never grateful. Give them what they think they want, and they'll still find a way to complain."
10038100-73 = "But even so, no matter what anyone says, I will finish this potion."
10038100-74 = "The elixir to bring sagehood to the enlightened, so we can fulfill the people's TRUE desires."
10038100-80 = "Remember, Saya. The Eastern Alchemy Society was founded for that exact purpose."
10038100-81 = "But we..."
10038100-86 = "And that's why we have to see it through."
10038100-90 = "Oh, Kisaki. I'd almost forgotten you were there."
10038100-91 = "Do you remember the students whose bodies you destroyed with your elixirs? Or would you say they don't matter in the grand scheme?"
10038100-92 = "Keh heh keh heh... I remember. Of course, I remember. Each and every one of them provided invaluable data. How could I forget?"
10038100-93 = "Then you must also know that Saya neglected even her own research to focus on treating those same students."
10038100-94 = "Let me make one thing clear. Those students all got exactly what they asked for."
10038100-95 = "Few are able to see their desires with clarity."
10038100-96 = "Few are able to foresee the consequences of their own choices, and fewer still can bear them."
10038100-97 = "Must we be responsible for the ignorance of the ordinary? I think not."
10038100-98 = "We're all \"ordinary\" in one way or another. We all deserve grace and generosity."
10038100-99 = "Oh, speak for yourself."
10038100-100 = "If that's how you want to see me, then by all means, do as you please."
10038100-107 = "As one of many ordinary people, I will remind you once again that, just as before, there is no place for you in Shanhaijing."
10038100-112 = "And now you're simply insulting yourself. That's quite disappointing, Kisaki. "
10038100-113 = "I had hoped you could become a peer of mine, in time."
10038100-114 = "Fufu... That's surprisingly pleasant, from someone with a heart full of vengeance."
10038100-115 = "...Oh, I can have my vengeance anytime I wish. "
10038100-116 = "And remember, you made me this way."
10038100-117 = "So you've already said. But now you listen to me."
10038100-122 = "The one who made you who you are...is you."
10038100-127 = "Excuse me...?!"
10038100-128 = "You made every choice that brought you here. "
10038100-129 = "YOU decided you were superior to all those \"ordinary\" people. YOU decided you could treat them like toys."
10038100-130 = "And you can decide to go on blaming me."
10038100-131 = "I'll take that blame. I'm the president. That's my job."
10038100-132 = "You talk too much..."
10038100-137 = "I've just decided you'll be my next test subject."
10038100-138 = "Oh, will I? You think that's in your power?"
10038100-139 = "Ha. You can show me all the calm and confidence in the world."
10038100-144 = "But I know how long we've kept Saya locked up."
10038100-145 = "Without your treatment, you can barely stand right now."
10038100-146 = "Fufu... Were you counting on that? Of course you were."
10038100-151 = "Open your eyes. See who's standing before you. Me, the President of Genryumon."

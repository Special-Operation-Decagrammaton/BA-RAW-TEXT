10038100-80 = "3;카이;08;기억해 내라. 야쿠시 사야. 선인(仙人)에 도달하려는 시도야말로 우리 [ruby=연단방]연구자[/ruby]들의 시초이자 궁극적인 목적이었음을.\n#3;em;[...]\n#3;closeup"
10038100-81 = "3;사야;07;하지만 우리는……!\n#3;stiff\n#3;closeup"

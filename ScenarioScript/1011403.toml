1011403-67 = "3;대회 진행위원;07;주문은 쉴 새 없이 밀려들고, 손님들의 보이지 않는 재촉에 등 뒤가 따갑고, 처리해야 할 메뉴는 1초에 십수 개씩 쌓이고…….\n#3;stiff"

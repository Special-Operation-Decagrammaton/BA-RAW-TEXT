[translation]
1011403-1 = "การผจญภัยของพนักงานเสิร์ฟ"
1011403-2 = "สถานที่จัดการแข่งขัน ย่านการค้า"
1011403-3 = "ขอขอบคุณทั้งผู้เข้าแข่งขันและผู้ชมทุกๆ ท่านที่ให้การสนับสนุน <การแข่งขันพนักงานเสิร์ฟดีเด่น#nประจำเดือน> ในครั้งนี้นะครับ"
1011403-4 = "เรามุ่งมั่นที่จะทำให้ <การแข่งขันพนักงานเสิร์ฟดีเด่นประจำเดือน> เป็นการแข่งขันที่ทรงคุณค่าทาง#nด้าน..."
1011403-7 = "ทำยังไงดีล่ะคะ คุณครู?!"
1011403-8 = "[s] \"ใจเย็นๆ ก่อน จูริ ตั้งสติ แล้วหายใจเข้าลึกๆ ก่อนนะ\""
1011403-9 = "ตะ... แต่ว่า! นี่เป็นครั้งแรกที่ฉันได้มายืนบนเวทีกับคนมากมายขนาดนี้..."
1011403-10 = "คุณครูบอกว่าฉันจะทำได้ แต่ฉันยังไม่รู้เลยค่ะว่าจะได้มาทำอะไรที่นี่..."
1011403-11 = "ถ้าให้โชว์ฝีมือทำอาหารละก็ คนที่ทำอาหารไม่เก่งอย่างฉันก็คง...!"
1011403-12 = "ทุกคนครับ! ทุกคนคิดว่าอะไรเป็นสิ่งสำคัญในการให้บริการลูกค้าในคาเฟ่ครับ?"
1011403-13 = "ใช่แล้วครับ! นั่นคือพื้นฐานของทุกสิ่ง และใช้ได้กับทุกคน..."
1011403-14 = "และมันก็คือ พละกำลังครับ!"
1011403-15 = "คะ? พละกำลัง?"
1011403-16 = "[ns1] \"หืม...?\"\n[ns2] \"เป็นวิธีแข่งขันแบบใหม่ที่คาดไม่ถึงเลยแฮะ...\""
1011403-19 = "งานคาเฟ่ไม่ใช่งานง่ายๆ หรอกครับ เรียกได้ว่าต้องใช้พละกำลังมากทีเดียว "
1011403-20 = "น้ำเป็นสิ่งที่มีน้ำหนักมากกว่าที่คิด แล้วไหนจะต้องถือแก้วเครื่องดื่ม และภาชนะใส่อาหารต่างๆ ไปให้หมดในครั้งเดียวอีก!"
1011403-21 = "บางครั้งยังต้องจัดการกับลูกค้าไร้มารยาทที่ปรากฏตัวเหมือนมอนสเตอร์ในเกมอีก!"
1011403-22 = "แต่ถึงยังไงก็ไม่ควรใช้กำลังกับลูกค้าไม่ใช่เหรอคะ?!"
1011403-23 = "[s] \"พอมาคิดดู มันก็จริงนะ?!\""
1011403-24 = "เอาเถอะครับ! เมื่อมองภาพรวมของการบริหารคาเฟ่แล้ว พละกำลังถือเป็นสิ่งสำคัญที่สุดของพนักงาน#nเสิร์ฟเลยละครับ"
1011403-25 = "เพราะงั้นในการด่านแรกของ <การแข่งขันพนักงานเสิร์ฟดีเด่นประจำเดือน> ก็คือ! การทดสอบพละกำลังในการเสิร์ฟครับ!"
1011403-26 = "ผมจะบอกรายละเอียดเลยนะครับ เราได้เตรียมแก้วขนาดใหญ่ที่มีกาแฟอยู่เต็มแก้วไว้ให้!"
1011403-27 = "ผู้เข้าแข่งขันต้องถือแก้วข้างละ 6 ใบ รวมสองข้างเป็น 12 ใบ..."
1011403-28 = "แล้วก็เอาไปเสิร์ฟในโต๊ะที่กำหนดครับ!"
1011403-29 = "[ns] \"เอาแบบนี้จริงเหรอ!?\""
1011403-30 = "บะ... บ้าไปแล้วหรือเปล่า จะให้ถือแก้ว 12 ใบในรวดเดียวเนี่ยนะ..."
1011403-31 = "อย่าว่าแต่ 12 ใบเลย แค่ 6 ใบก็ไม่ไหวแล้ว ให้มาทดสอบพละกำลังในการแข่งขันแบบนี้งั้นเหรอ..."
1011403-32 = "ได้ยินว่านี่เป็นการแข่งขันที่โด่งดังมากแท้ๆ..."
1011403-36 = "......"
1011403-37 = "คุณครู ถ้าเป็นเรื่องนั้น ฉันว่าฉันน่าจะทำได้ค่ะ"
1011403-38 = "[s] \"หืม? จริงเหรอ?\""
1011403-39 = "ค่ะ ดูเผินๆ แล้วแก้วเครื่องดื่มพวกนั้นน่าจะหนักไม่น้อยเลย..."
1011403-40 = "แต่ยังไงมันก็น่าจะเบากว่ากระสอบมันฝรั่งของชมรมโภชนาการค่ะ!"
1011403-41 = "ถ้างั้น ฉันจะรีบกลับมานะคะคุณครู!"
1011403-43 = "ดูเหมือนผู้เข้าแข่งขันหลายคนจะเจอกับความยากลำบากในการถือแก้วไปเสิร์ฟนะครับ! มาดูกันครับว่า#nจะมีใครที่มีคุณสมบัติเหมาะที่จะเป็นพนักงานเสิร์ฟดีเด่นประจำเดือนนี้หรือเปล่า!"
1011403-44 = "และระหว่างนี้เอง! ผู้เข้าแข่งขันอุชิมากิ จูริ! ก็ถือแก้วไปอย่างชิลๆ เลยละครับ!"
1011403-48 = "ให้เอาไปเสิร์ฟที่โต๊ะตรงโน้นสินะ..."
1011403-55 = "อ๊ะ จริงด้วย! ระหว่างนี้ก็จัดวางแก้วให้ดูดีไปด้วยแล้วกัน!"
1011403-61 = "เอาใบนี้ไว้ตรงนี้ แล้วใบนี้ก็..."
1011403-62 = "ยอดเยี่ยมเลยครับ คุณจูริ! นอกจากการถือแก้วไปให้ถึงโต๊ะอย่างปลอดภัยแล้ว ยังใส่ใจว่าต้องทำยังไง#nถึงจะทำให้ลูกค้าประทับใจได้อีกด้วย!"
1011403-63 = "ผมว่านี่คือจิตวิญญาณแห่งการบริการที่จำเป็นในการบริหารคาเฟ่ ซึ่งเป็นสิ่งที่ \"ไม่ชัดเจนนักแต่ก็#nสำคัญมาก\" เลยนะครับ!"
1011403-65 = "งั้นก็ไปที่ด่านต่อไปเลยครับ"
1011403-66 = "ปกติในการบริหารคาเฟ่ จะต้องเจอกับช่วงเวลาสำคัญที่เรียกว่า 'พีคไทม์' ใช่มั้ยล่ะครับ"
1011403-67 = "เป็นช่วงเวลาที่ออเดอร์หลั่งไหลเข้ามาอย่างต่อเนื่อง การเร่งเร้าของลูกค้าก็ทำให้ตึงเครียด แล้วจำนวนเมนูที่ต้องทำก็เพิ่มขึ้นเป็นสิบเท่าในทุกวินาที..."
1011403-68 = "ความสามารถที่จำเป็นมากที่สุดในช่วงพีคไทม์ที่ว่าก็คือการตัดสินใจที่รวดเร็วและแม่นยำครับ"
1011403-69 = "ดังนั้นในการแข่งขันครั้งนี้! เราจะหาผู้ที่ทำคะแนนได้มากที่สุดจากเกม 'ธงฟ้าธงขาว' มาดูกันครับว่า#nแต่ละคนจะตัดสินใจได้รวดเร็วและแม่นยำกันแค่ไหน!"
1011403-70 = "[ns3] \"เป็นการแข่งขันที่ไม่เกี่ยวกับงานคาเฟ่เลย...\"\n[ns4] \"จะให้มาเล่นเกมแบบนี้ก็ได้เหรอ...?\""
1011403-73 = "เกมธงขาวธงฟ้า..."
1011403-74 = "คุณครู ฉันก็จะลงแข่งดูค่ะ"
1011403-75 = "มะ... ไม่ค่ะ ฉันก็ไม่ได้มั่นใจมากขนาดนั้นหรอก แต่ว่า..."
1011403-76 = "ถ้าเทียบกับการจัดการวัตถุดิบในโรงอาหารเกเฮนน่าแต่ละวันแล้ว ฉันว่าเกมนี้น่าจะไม่หนักหนาเกิน#nความสามารถค่ะ!"
1011403-79 = "ยกธงฟ้า"
1011403-80 = "ธงฟ้า!"
1011403-81 = "อย่ายกธงขาว!"
1011403-82 = "ธงขาว!"
1011403-83 = "อย่ายกธงฟ้า ยกธงขาว"
1011403-84 = "สรุปว่าต้องยกทั้งสองสีเลยค่ะ!"
1011403-85 = "แกล้งทำเป็นยกธงฟ้า อย่ายกธงขาว ทำเหมือนเอาธงฟ้าลง แต่ไม่ยกธงขาว ยกธงฟ้า แล้วเอาธงขาวลง ยังไม่จบแค่นี้ เพราะต้องไม่ยกธงฟ้า แต่ก็ไม่ยกธงขาวด้วย"
1011403-86 = "อ่า... ค่ะ! สรุปว่ายกธงฟ้า แล้วเอาธงขาวลงค่ะ!"
1011403-87 = "ทำไมถึงไม่ผิดเลยแม้แต่ครั้งเดียวล่ะ?!"
1011403-88 = "ปกติต้องทำงานหนักแค่ไหนเนี่ย..."
1011403-89 = "ขอเสียงปรบมือให้เธอหน่อยครับทุกคน! ผู้เข้าแข่งขันอุชิมากิ จูริ ได้คะแนนเต็มเลยครับ! สมบูรณ์แบบจริงๆ!"
1011403-97 = "ด่านต่อไปคือการทำความสะอาด! คาเฟ่กับการทำความสะอาดเป็นของคู่กันอยู่แล้วใช่มั้ยล่ะครับ!"
1011403-98 = "สำหรับด่านนี้... เราได้เช่าหุ่นยนต์ทำความสะอาดของมิลเลเนียมมาให้เป็นพิเศษเลย!"
1011403-99 = "หุ่นยนต์ทำความสะอาดของมิลเลเนียมงั้นเหรอ... จะมีประสิทธิภาพยังไงนะ? "
1011403-100 = "ชักจะอยากรู้ขึ้นมานิดหน่อยแล้วสิคะ!"
1011403-101 = "[ns] (ถ้าเป็นหุ่นยนต์ที่ผลิตในมิลเลเนียมละก็ อืม...)"
1011403-102 = "ขอให้ผู้เข้าแข่งขันทุกคนไปที่ห้องเก็บของได้เลยครับ!"
1011403-104 = "ทำความสะอาด ทำความสะอาด"
1011403-105 = "กวาด ดูด เผา ทำลาย ทิ้ง ถอนรากถอนโคน เช็ด แล้วก็ฆ่าเชื้อ"
1011403-106 = "อย่าให้เหลือคราบหรือตำหนิอะไรแม้แต่นิดเดียว"
1011403-107 = "ระ... รู้สึกเหมือนได้ยินคำพูดที่น่ากลัวเลยค่ะ..."
1011403-108 = "แต่ถ้าเป็นการทำความสะอาดในระดับนี้ ก็ไม่ต่างจากสิ่งที่ฉันทำในโรงอาหารทุกวันหรอกค่ะ"
1011403-109 = "จะเริ่มเลยนะคะ!"
1011403-112 = "ไม่เข้าใจ ไม่เข้าใจ"
1011403-113 = "ทำไมถึงรวดเร็วกว่าฉันได้ล่ะ"
1011403-114 = "รับรู้ได้ถึงประสิทธิภาพที่ถดถอยลง ไม่มีเหตุผลในการดำรงอยู่แล้ว เข้าสู่การทำลายตัวเองใน 10... 9... 8..."
1011403-115 = "ไม่ได้นะคะ!"
1011403-116 = "ต่อให้ฉันจะประสิทธิภาพแย่ลง แต่ก็เห็นว่าฉันมีเหตุผลในการดำรงอยู่ต่อเหรอ? นี่คือสิ่งที่เรียกว่า#nความเมตตาของมนุษย์ใช่มั้ย?"
1011403-117 = "ถ้าระเบิดขึ้นมา ห้องเก็บของก็จะสกปรกอีกรอบนะคะ!"
1011403-118 = "......"
1011403-119 = "เข้าใจแล้ว หยุดการเข้าสู่การทำลายตัวเอง ปิดเครื่อง"
1011403-121 = "ทุกคนรอกันนานมั้ยครับ! ในที่สุดก็ถึงเวลาประกาศว่าใครจะได้เป็นพนักงานเสิร์ฟดีเด่นประจำเดือนนี้!"
1011403-122 = "ใครกันที่คว้าชัยชนะในวันนี้... ใครกันที่จะได้ตำแหน่งพนักงานเสิร์ฟดีเด่นของเราไป!"
1011403-123 = "และผู้ชนะก็คือ! คุณอุชิมากิ จูริครับ!!!"
1011403-130 = "[ns] \"ดีใจด้วยนะ จูริ! ทำได้จริงๆ ด้วยนะ!\""
1011403-131 = "ค่ะ คุณครู! ฉันทำได้จริงๆ ด้วยค่ะ! ที่ฉันทำสำเร็จในวันนี้... เพราะได้กำลังใจจากคุณครูค่ะ!"
1011403-135 = "เอ่อ คุณครูคะ? พอดีว่า... ฉันเพิ่งนึกอะไรบางอย่างได้..."
1011403-136 = "พอมาคิดถึงด่านต่างๆ ที่ฉันลงแข่งในวันนี้..."
1011403-137 = "แบบนี้จะมองว่าฉันเป็นพนักงานเสิร์ฟดีเด่นได้แล้วเหรอคะ...?"
1011403-139 = "(คุณครูปลอบใจจูริที่ยังไม่เข้าใจสถานการณ์)"
1011403-140 = "(แล้วก็ซ่อนความรู้สึกว่าจริงๆ แล้วตัวเองก็ไม่ค่อยเข้าใจเหมือนกัน...)"
1011403-141 = "(จากนั้นก็เดินกลับมาด้วยกันพร้อมกับถ้วยรางวัลในมือ...)"

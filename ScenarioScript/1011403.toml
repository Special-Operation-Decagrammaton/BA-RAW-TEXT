[translation]
1011403-1 = "服務生的冒險"
1011403-2 = "商店街大會會場"
1011403-3 = "感謝各位參賽者及觀眾，參加本月的「服務生選拔大會」！"
1011403-4 = "「服務生選拔大會」一直致力於延續傳統，#n期望成長為歷史更悠久、更有公信力的競賽──"
1011403-7 = "怎麼辦，老師！？"
1011403-8 = "[s]「茱莉，冷靜下來。先做個深呼吸吧。」"
1011403-9 = "可，可是……！#n這是我第一次站上有這麼多觀眾的舞台……"
1011403-10 = "雖然老師說我做得到，但我根本不知道比賽項目究竟是什麼……"
1011403-11 = "萬一要比料理實力的話，對還不擅長料理的我來說……！"
1011403-12 = "各位！說到咖啡廳服務生的工作，最重要的是什麼呢！"
1011403-13 = "沒錯！就是對所有人都能派上用場，也是一切工作的基礎……"
1011403-14 = "──「肌力」！"
1011403-15 = "咦？肌力……？"
1011403-16 = "[ns1]「……嗯？」\n[ns2]「還真是意料之外的新穎項目呢……」"
1011403-19 = "咖啡廳的工作非常費力，真的相當辛苦。"
1011403-20 = "除了比想像中還重的水之外，還要同時端起各種盤子和餐具！"
1011403-21 = "偶爾還會有奧客像遊戲中的怪物一樣突然出現，必須不動聲色地將其制服！"
1011403-22 = "但是無論如何都不能用武力解決吧！？"
1011403-23 = "[s]「好像也是！？」"
1011403-24 = "總之！以咖啡廳整體的營運來看，要說肌力是最需要的核心能力也不為過！"
1011403-25 = "因此本月「服務生選拔大會」的第一個項目，就是肌力服務測試！"
1011403-26 = "現在開始為大家說明規則！#n我們準備了裝滿咖啡的大型玻璃杯！"
1011403-27 = "只要一隻手拿起6杯，雙手共拿起12杯……"
1011403-28 = "端到指定的桌子就可以了！"
1011403-29 = "[ns]「這樣真的對嗎！？」"
1011403-30 = "怎，怎麼這樣。#n居然要雙手拿起12個那種杯子……"
1011403-31 = "別說12杯了，就算只有6杯也很勉強。#n怎麼會在這種大會上比肌力呢……"
1011403-32 = "可是我聽說這個獎項的含金量很高耶……"
1011403-36 = "……"
1011403-37 = "老師。如果是那種項目的話，我好像可以試試看。"
1011403-38 = "[s]「嗯？真的嗎？」"
1011403-39 = "嗯，雖然乍看之下的確不輕……"
1011403-40 = "但是再怎麼樣都不會比供給部的馬鈴薯袋重！"
1011403-41 = "那麼老師，我去去就回！"
1011403-43 = "各位參加者似乎都無法順利端起玻璃杯呢！#n難道今天沒人有資格登上本月服務生的寶座嗎！"
1011403-44 = "哦哦！現在牛牧茱莉選手輕鬆拿起了所有咖啡杯！"
1011403-48 = "只要把這個放到那邊的，桌子上……"
1011403-55 = "啊，對了！既然要端上桌的話，也要注意一下擺設美不美觀！"
1011403-61 = "這個放這邊，那個放那邊……"
1011403-62 = "太了不起了，茱莉選手！#n並非單純搬運杯子，甚至為了讓客人獲得最舒適的體驗，連餐桌擺設都考慮到了！"
1011403-63 = "這正是經營咖啡廳應當具備的理念──「魔鬼藏在細節裡」的服務精神！"
1011403-65 = "那麼進入下一個項目吧！"
1011403-66 = "經營咖啡廳時，必然會遇到俗稱的「尖峰時段」。"
1011403-67 = "訂單不斷湧入，客人無聲的催促讓人芒刺在背，#n同時要處理的品項一秒就可能多出十幾個……"
1011403-68 = "因此快速準確的判斷力，可說是尖峰時段最講求的能力。"
1011403-69 = "所以在本次大會中，要透過「舉旗遊戲」來評選出最能迅速確實做出判斷的參賽者！"
1011403-70 = "[ns3]「雖然比賽項目也不算是毫無根據……」\n[ns4]「不過這樣真的對嗎……？」"
1011403-73 = "舉旗遊戲……"
1011403-74 = "老師，這個項目我也想試試看。"
1011403-75 = "雖，雖然我也不是很有自信，不過……"
1011403-76 = "只要回想一下格黑娜供餐廚房一天要消化的人流跟物流，我應該有辦法應付得來！"
1011403-79 = "藍旗舉起來。"
1011403-80 = "藍旗！"
1011403-81 = "白旗別放下。"
1011403-82 = "白旗！"
1011403-83 = "藍旗別放下，白旗舉起來。"
1011403-84 = "兩個都舉起來！"
1011403-85 = "藍旗假裝舉起來，白旗不要舉，藍旗假裝放下來，白旗別放下──#n藍旗舉起來，白旗放下去，藍旗別放下，白旗不要舉。"
1011403-86 = "嗯……好！藍旗舉起來，白旗放下去！"
1011403-87 = "怎麼能一點錯也沒有！？"
1011403-88 = "他平常工作的環境到底是什麼樣的地獄啊……"
1011403-89 = "各位觀眾請掌聲鼓勵！#n牛牧茱莉選手，獲得了完美的滿分！"
1011403-97 = "下一個項目是清潔！#n咖啡廳的經營，可說是和清潔息息相關！"
1011403-98 = "為了這個項目，我們特別……租借了千年製造的清潔機器人！"
1011403-99 = "千年製造的清潔機器人啊……不曉得性能怎麼樣？"
1011403-100 = "有點期待呢。"
1011403-101 = "[ns]（千年製造啊……如果只是普通的千年製品應該……）"
1011403-102 = "那麼請各位參加者移動到倉庫！"
1011403-104 = "開始清掃。開始清掃。"
1011403-105 = "掃除、吸塵、焚燒、摧毀、移除、殲滅、擦拭、消毒。"
1011403-106 = "絕不容許任何污漬或污點留存。"
1011403-107 = "好，好像聽到了一些可怕的詞彙……"
1011403-108 = "這種規模的打掃工作，只是我們供餐廚房每天的例行公事而已。"
1011403-109 = "開始！"
1011403-112 = "無法理解。無法理解。"
1011403-113 = "人類怎麼可能比本機快速。無法理解。"
1011403-114 = "本機性能不足，失去存在意義。#n啟動自爆程序。10、9、8……"
1011403-115 = "不行！"
1011403-116 = "即便本機性能不足，你依然認為本機有存在的意義嗎？#n這就是人類特有的「親切」嗎？"
1011403-117 = "自爆會把倉庫又弄髒的！"
1011403-118 = "……"
1011403-119 = "理解完畢。中止自爆程序。裝備停止運作。"
1011403-121 = "讓大家久等了！#n現在終於到了揭曉「本月服務生」頭銜得主的時刻！"
1011403-122 = "究竟今天會是誰贏得所有榮耀……成為最優秀的服務生呢？"
1011403-123 = "我現在宣布！優勝者是……牛牧茱莉選手！！！"
1011403-130 = "[ns]「恭喜你，茱莉！你真的做到了！」"
1011403-131 = "是啊，老師！我真的成功了！#n沒想到我居然能做到……這全都是託老師的福！"
1011403-135 = "不過……我剛剛才突然意識到……"
1011403-136 = "不管是比賽項目還是大會的流程……"
1011403-137 = "……這樣真的沒問題嗎？"
1011403-139 = "（一邊安撫著一臉疑惑的茱莉……）"
1011403-140 = "（一邊掩飾連自己也不太清楚的事實……）"
1011403-141 = "（一起拿著獎盃和獎品踏上了歸途……）"

1011403-69 = "3;대회 진행위원;05;따라서 본 대회에서는! '청기백기' 게임 고득점자를 선별하여! 얼마나 신속하고 확실한 판단을 내릴 수 있는지를 알아보도록 하겠습니다!\n#3;closeup"

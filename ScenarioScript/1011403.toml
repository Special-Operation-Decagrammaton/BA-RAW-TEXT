[translation]
1011403-1 = "#title;웨이트리스의 모험"
1011403-2 = "#place;상점가 대회장"
1011403-3 = "3;대회 진행위원;03;오늘도 <이 달의 웨이트리스 선발 대회>에 성원을 보내 주신 참가자분들, 그리고 관객 여러분께 감사드립니다!\n#3;em;[!]\n#3;a"
1011403-4 = "3;대회 진행위원;08;저희 <이 달의 웨이트리스 선발 대회>는 지금보다 더욱 유서 깊은 대회가 되기를 목표로 정진하고 있으며, 그렇게 하기 위해서–"
1011403-5 = "#all;hide"
1011403-6 = "3;주리 아르바이트;02\n#3;em;[...]\n#3;a\n#wait;2500"
1011403-7 = "3;주리 아르바이트;10;어떡하죠, 선생님?!\n#3;closeup\n#3;shake\n#fontsize;80"
1011403-8 = "[s] \"진정해, 주리. 진정해. 일단 심호흡을 하자.\""
1011403-9 = "3;주리 아르바이트;09;그렇지만요…… 그렇지만요! 이렇게 많은 분들이 모인 무대에 서는 것도 처음이고…….\n#3;em;[훌쩍]\n#3;hophop"
1011403-10 = "3;주리 아르바이트;04;선생님께서는 할 수 있다고 말씀해 주셨지만, 종목이 무엇인지도 모르겠고……."
1011403-11 = "3;주리 아르바이트;04;만에 하나 요리 실력을 내보이라고 하면, 아직 요리에 미숙한 저로서는……!\n#3;stiff"
1011403-12 = "3;대회 진행위원;05;여러분! 카페 접객에 있어 중요한 것은 무엇이라고 생각하십니까!\n#3;em;[!]"
1011403-13 = "3;대회 진행위원;02;그렇죠! 그것은 언제나 모두에게 있어서 유효한 것, 모든 일의 근본이 되는 것……."
1011403-14 = "3;대회 진행위원;05;바로, 근력입니다!\n#fontsize;80\n#3;closeup"
1011403-15 = "3;주리 아르바이트;02;네? 근력……?\n#3;em;[?]"
1011403-16 = "[ns1] \"……어?\"\n[ns2] \"……이건 정말 생각지도 못한 참신한 방법이군…….\""
1011403-17 = "#wait;10"
1011403-18 = "#wait;10"
1011403-19 = "3;대회 진행위원;06;카페 일은 힘들죠. 정말 힘든 일입니다. \n#3;em;[한숨]"
1011403-20 = "3;대회 진행위원;07;물은 생각보다 무거운 물질이고, 각종 접시와 음료 잔, 식기와 플레이트를 한 번에 날라야 하는 것은 물론!\n#3;m4"
1011403-21 = "3;대회 진행위원;05;가끔씩 게임 속의 몬스터처럼 나타나는, 무례한 손님을 소란 없이 제압하는 데에도!\n#3;m2\n#3;em;[스팀]\n#3;hophop"
1011403-22 = "3;주리 아르바이트;10;아무리 그래도 손님께 완력을 사용하면 안 되지 않을까요?!\n#3;em;[?!]"
1011403-23 = "[s] \"생각해 보니까 진짜 그러네?!\""
1011403-24 = "3;대회 진행위원;02;아무튼! 카페 운영의 전반적인 측면에서, 근력이야말로 우리에게 요구되는 가장 중요한 덕목이라고 볼 수 있을 것입니다"
1011403-25 = "3;대회 진행위원;08;그렇기에 <이 달의 웨이트리스 선발 대회> 첫 종목은! 바로 근력 서빙 테스트입니다!\n#3;em;[!]\n#3;jump"
1011403-26 = "3;대회 진행위원;03;계속해서 안내해 드리겠습니다! 저희가 준비한 것은 커피를 가득 채운 대형 유리잔!"
1011403-27 = "3;대회 진행위원;05;이 유리잔을 한 손에 6개씩, 양손 모두 12개를 들어올려……\n#3;greeting"
1011403-28 = "3;대회 진행위원;08;그것을 지정된 테이블까지 서빙해 주시면 되겠습니다!"
1011403-29 = "[ns] \"이거 진짜 맞아!?\""
1011403-30 = "3;대회 진행위원;08\n#na;웨이트리스 A;마, 말도 안 돼. 저런 잔을 양손으로 12개를 들어올리라니……."
1011403-31 = "3;대회 진행위원;08\n#na;웨이트리스 B;12개는커녕, 6개도 무리야. 애초에 이런 대회에서 근력 테스트라니……."

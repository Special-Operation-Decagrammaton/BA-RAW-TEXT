[translation]
1011403-1 = "Adventures of a Waitress"
1011403-2 = "Shopping District Competition Stage"
1011403-3 = "Thank you all for joining us today, at the \"Waitress of the Month Competition\"!"
1011403-4 = "We aim to make the \"Waitress of the Month Competition\" even more prestigious, and in order to do that, we—"
1011403-7 = "What do I do, Sensei?!"
1011403-8 = "[s] \"Calm down, Juri. Calm. Let's do some breathing exercises.\""
1011403-9 = "But...but! I've never been on a stage in front of so many people like this..."
1011403-10 = "And I know you told me I can do it, but I don't know what's even being judged..."
1011403-11 = "If they ask us to actually cook something, I don't think I can do that...!"
1011403-12 = "Dear audience! When it comes to serving customers in a cafe, what do you think is the most important element?"
1011403-13 = "That's right! The one element that sets the foundation for every task at hand is..."
1011403-14 = "...raw physical strength!"
1011403-15 = "What? Strength...?"
1011403-16 = "[ns1] \"...Huh?\"\n[ns2] \"...Now this I don't think I could have seen coming...\""
1011403-19 = "Cafe work can be grueling. It can be tiring. "
1011403-20 = "Water is heavier than most people assume, and a waitress is still expected to carry and move glassware, in bulk!"
1011403-21 = "Other times, waitresses have to contend with rude customers, who pop up like random encounters in a video game!"
1011403-22 = "Shouldn't they not use strength in that last example, though?!"
1011403-23 = "[s] \"That's a REALLY good point.\""
1011403-24 = "All things considered, strength is deeply essential to every waitress in a well-run cafe!"
1011403-25 = "So the first event of the Waitress of the Month competition will be...a strength-based serving test!"
1011403-26 = "We've prepared massive glass cups, all filled to the brim with coffee!"
1011403-27 = "Waitresses will be moving six of these cups in each hand, 12 cups in all..."
1011403-28 = "...and then serving them to their respective tables!"
1011403-29 = "[ns] \"Is this normal?!\""
1011403-30 = "N-No way. How is anyone supposed to carry 12 of those cups at once...?"
1011403-31 = "SIX would be impossible, let alone twelve. This test doesn't make any sense!"
1011403-32 = "I thought this competition was supposed to be prestigious..."
1011403-36 = "..."
1011403-37 = "Sensei, I think I've got this."
1011403-38 = "[s] \"What? Really?\""
1011403-39 = "I do. I can tell they're heavy just by looking at them, but..."
1011403-40 = "...they've still got to be lighter than the sacks of potatoes I move for the School Lunch Club!"
1011403-41 = "Here I go, Sensei! Be right back!"
1011403-43 = "It seems like the contestants are having trouble lifting the cups! Is there no one strong enough to take the crown as Waitress of the Month?!"
1011403-44 = "But look at this! Contestant Ushimaki Juri! She's lifting the cups like they're empty!"
1011403-48 = "So I just need to bring these to the table over there..."
1011403-55 = "And...got it! Now I should work on placement."
1011403-61 = "Place this one here, and that one there..."
1011403-62 = "An impressive display from contestant Juri! She's not only serving the cups, she's even thinking about how to place them for the customer's viewing pleasure!"
1011403-63 = "A shining example of that subtle-but-essential service needed in any great cafe!"
1011403-65 = "Shall we move onto the next event?"
1011403-66 = "Now, any seasoned cafe employee knows all about the dreaded \"peak time.\""
1011403-67 = "The orders keep coming and they don't stop, each customer's presence puts the servers on edge, the tickets pile up by the dozen every second..."
1011403-68 = "So the most important thing in those times is quick and accurate decision making."
1011403-69 = "We're going to test those capabilities in a game of \"Raise the Flag\"!"
1011403-70 = "[ns3] \"Do they just pick these events at random?\"\n[ns4] \"How does this make sense?\""
1011403-73 = "Raise the Flag..."
1011403-74 = "Sensei, I think I've got this one too."
1011403-75 = "I don't want to sound TOO confident, but..."
1011403-76 = "...I move all kinds of goods through Gehenna's cafeteria every single day. I can do this!"
1011403-79 = "Raise the blue flag."
1011403-80 = "Blue!"
1011403-81 = "Don't lower the white flag."
1011403-82 = "White!"
1011403-83 = "Don't drop the blue flag, and raise the white one."
1011403-84 = "I've got both of them up!"
1011403-85 = "Raise the blue flag but not really, don't raise the white flag, the blue one stays down, don't lower the white one, raise the blue one, drop the white one, don't lower the blue, and don't raise the white."
1011403-86 = "Uh...right! Blue one up, white one down!"
1011403-87 = "How is she getting this?!"
1011403-88 = "What kind of hell is she used to dealing with...?"
1011403-89 = "A round of applause please, ladies and gents! Contestant Ushimaki Juri has earned a perfect score!"
1011403-97 = "The next event is cleaning! Every cafe needs it done all the time!"
1011403-98 = "For this particular event, we have enlisted...a special cleaning robot, straight from Millennium!"
1011403-99 = "A cleaning robot from Millennium... I wonder how well it works. "
1011403-100 = "I'm sort of looking forward to this..."
1011403-101 = "[ns] \"(Millennium... Well, if it's a normal cleaning robot, that should be okay...)\""
1011403-102 = "If we could move all the contestants to the storage room, please!"
1011403-104 = "Cleaning. Cleaning."
1011403-105 = "Sweep, vacuum, burn, destroy, remove, clean, sanitize."
1011403-106 = "This unit will not leave a single stain or spot anywhere in the designated area."
1011403-107 = "I-I heard some scary words mixed in there..."
1011403-108 = "Well, regardless, I clean on this scale every day at the cafeteria."
1011403-109 = "Here I go!"
1011403-112 = "...Incomprehensible. Incomprehensible."
1011403-113 = "This unit's productivity is lower than that of the human unit."
1011403-114 = "Conclusion: this unit is insufficient. This unit is defective. This unit has no reason to exist. Self-destruct in 10, 9, 8..."
1011403-115 = "No, don't do that!"
1011403-116 = "...Does this unit still have a reason to exist, despite its confirmed insufficiency? Is this what humans refer to as \"compassion\"?"
1011403-117 = "If you self-destruct here, the storage room will get all messy again!"
1011403-118 = "..."
1011403-119 = "Logic accepted. Halting self-destruct sequence. Pausing equipment."
1011403-121 = "Thank you for the wait, ladies and gentlemen! It's finally time to announce the Waitress of the Month!"
1011403-122 = "Who will seize the glory? Who will be crowned as the best of the best?!"
1011403-123 = "And the winner is...Ushimaki Juri!"
1011403-130 = "[ns] \"Congrats, Juri! You did it!\""
1011403-131 = "I really did it...! I didn't think I'd actually... It's all thanks to you, Sensei!"
1011403-135 = "Um, Sensei? Now that I won...I've been thinking..."
1011403-136 = "Thinking about all these different competition events and how they connect to one another..."
1011403-137 = "There's something I'm still not sure of..."
1011403-139 = "I consoled Juri, who still seemed conflicted about something."
1011403-140 = "I didn't mention my own thoughts about how weird the whole competition was."
1011403-141 = "Nonetheless, I stood by her as she accepted the trophy and the prize. Then we headed back."

[translation]
63035-1 = "Episode 3;Trumpeting Angel"
63035-4 = "Gah!"
63035-5 = "[ns] \"Saori!\""
63035-6 = "Saori!"
63035-7 = "I'm fine. It's just a scratch."
63035-8 = "...Doesn't look that way to me, but if you say so, Leader."
63035-9 = "But seriously, what do we do about this? We've never fought, let alone beaten, anything like that before."
63035-10 = "This one's on a completely different level too..."
63035-14 = "Huh...? A trumpet? The one you've been talking about?"
63035-15 = "Yeah, that's it! B-But...the sky suddenly got really dark...?"
63035-17 = "It was broad daylight just a second ago!"
63035-18 = "What... What's happening...?"
63035-25 = "Why is it nighttime all of a sudden?"
63035-26 = "I-I know this! I read it in the scriptures...!"
63035-27 = "\"A third of the sun was struck, a third of the moon, and a third of the stars, so that a third of them turned dark.\""
63035-28 = "\"A third of the day was without light, and also a third of the night.\""
63035-34 = "The trumpet... It's the trumpet..."
63035-35 = "That makes six...!"
63035-36 = "That's weird. Why are we hearing it again?"
63035-37 = "You're right. At this rate it won't be seven trumpets, it'll be like fourteen..."
63035-41 = "Wh-Why did it get all dark? What's...going on...?"
63035-42 = "Stop, Subaru! What are you thinking?! What happened to you?!"
63035-46 = "...Kind of obvious, but it doesn't look like she can hear you, Leader."
63035-47 = "..."
63035-48 = "Subaru!"
63035-49 = "SUBARUUU!!"
63035-54 = "..."
63035-55 = "Wh-What...is this...?"
63035-56 = "How...are you here?"
63035-58 = "What do you mean? She's been here all along."
63035-59 = "Here, with us."
63035-60 = "Why couldn't you see before?"
63035-61 = "Why, because you never tried looking."
63035-62 = "Isn't that right, Subaru?"
63035-63 = "Or maybe, now that you've become a phenomenon, we should call you the \"Trumpeting Angel\"?"
63035-64 = "Atsuko? What's going on?"
63035-65 = "I was only speculating before, but now I'm certain."
63035-66 = "Don't worry. I'll explain everything, from the beginning."
63035-67 = "And, under these circumstances, let me make one thing very clear."
63035-68 = "You are not the only here who is of Arius, Subaru."
63035-70 = "Next Episode;Royal Blood"

[translation]
63035-1 = "第3話;吹號的天使"
63035-4 = "唔……！"
63035-5 = "[ns]「沙織！」"
63035-6 = "沙織姐姐！"
63035-7 = "我沒事。只是一點擦傷而已。"
63035-8 = "我怎麼看都不像沒事的樣子……不過既然隊長都這麽說了……"
63035-9 = "所以呢，現在該怎麼辦？#n雖然我們本來就沒打贏過「那種東西」……"
63035-10 = "這次的等級跟之前還不是同一個次元的啊……"
63035-14 = "咦……？號角聲？#n這就是你說的那個號角聲嗎！？"
63035-15 = "沒錯！就是這個！#n可，可是……天空突然變得超暗的耶……？"
63035-17 = "剛才明明還是白天啊！？"
63035-18 = "到底發生了什麼……？"
63035-25 = "現在突然變成晚上了嗎……？"
63035-26 = "我，我知道！以前我有在經典裡讀到過……！"
63035-27 = "「日頭的三分之一，月亮的三分之一、星辰的三分之一都被擊打，#n　以致日月星的三分之一黑暗了……」"
63035-28 = "「白晝的三分之一沒有光，黑夜也是這樣」……！"
63035-34 = "號角聲……是號角聲……"
63035-35 = "這已經是第六次了……！"
63035-36 = "可是你不覺得奇怪嗎？為什麼又聽到了？"
63035-37 = "對，對耶？這樣就不是七次號角聲，而是十四次號角聲了……？"
63035-41 = "怎，怎麼突然變得跟晚上一樣暗……？#n發生什麼事了……？"
63035-42 = "昴！快停下來！#n你在想什麼！你到底發生什麼事了！？"
63035-46 = "……看來他似乎聽不見呢，隊長。"
63035-47 = "……"
63035-48 = "前，前輩……！"
63035-49 = "昴前輩！！！"
63035-54 = "……"
63035-55 = "為……什麼……？"
63035-56 = "你之前去了什麼地方……怎麼會在這裡……？"
63035-58 = "這孩子一直都在這裡。"
63035-59 = "始終和我們一起待在這個地方。"
63035-60 = "問我為什麼你會沒看到……？#n我想……"
63035-61 = "應該是因為你根本沒打算去看這孩子的關係吧。"
63035-62 = "對吧，昴？"
63035-63 = "不，現在應該稱呼你為已經變成「現象」的──「吹號的天使」了嗎？"
63035-64 = "敦子？你知道些什麼嗎？"
63035-65 = "之前都還只是推測而已，現在幾乎可以確定了。"
63035-66 = "大家別擔心。我會按照順序說明清楚的。"
63035-67 = "而且既然事情已經演變到這個地步，我就跟你清楚吧。"
63035-68 = "並非只有你是「奧利斯」，昴。"
63035-70 = "下一話;皇家血統"

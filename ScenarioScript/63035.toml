[translation]
63035-1 = "ตอนที่ 3;นางฟ้าเป่าแตร"
63035-4 = "อึก...!"
63035-5 = "[ns] \"ซาโอริ!\""
63035-6 = "พี่ซาโอริ!"
63035-7 = "ฉันไม่เป็นไร แค่ถลอกนิดหน่อยน่ะ"
63035-8 = "จะไม่เป็นไรได้ไงล่ะ แต่ถ้าหัวหน้าจะว่าอย่างนั้นละก็นะ..."
63035-9 = "ว่าแต่พวกเราจะทำยังไงกันดีล่ะ? ที่ผ่านมาเราไม่เคยเอาชนะ 'อะไรแบบนั้น' ได้เลยนะ..."
63035-10 = "แล้วครั้งนี้ก็ต่างออกไปจากเดิมแล้วเลยด้วยอีก..."
63035-14 = "หืม...? เสียงแตร? นี่คือเสียงแตรที่เธอพูดถึงงั้นเหรอ?!"
63035-15 = "ใช่! แบบนี้ละ! ตะ... แต่ว่า... ทำไมท้องฟ้าถึงได้มืดลงขนาดนี้ล่ะ...?"
63035-17 = "เมื่อกี้ยังเป็นเวลากลางวันอยู่เลย?!"
63035-18 = "เกิดเรื่อง... อะไรขึ้นน่ะ...?"
63035-25 = "จู่ๆ ก็กลายเป็นเวลากลางคืนงั้นเหรอ...?"
63035-26 = "ฉัน... ฉันเหมือนจะรู้แล้วละ! ฉันเคยอ่านเจอในพระคัมภีร์...!"
63035-27 = "<เมื่อดวงอาทิตย์ ดวงจันทร์ และดวงดาวต่างมืดไป 1 ใน 3 ส่วน>"
63035-28 = "<1 ใน 3 ส่วนของกลางวันไม่ส่องสว่าง เช่นเดียวกับตอนกลางคืน>...!"
63035-34 = "เสียงแตร... นั่นเสียงแตรนี่นา..."
63035-35 = "นี่เป็นครั้งที่ 6 แล้ว...!"
63035-36 = "แต่มันไม่แปลกๆ เหรอ? ทำไมถึงได้ยินขึ้นมาอีกล่ะ?"
63035-37 = "นะ... นั่นสินะ? ถ้างั้นก็ไม่ใช่เสียงแตร 7 ครั้ง แต่เป็น 14 ครั้งน่ะสิ...?"
63035-41 = "จะ... จู่ๆ ก็มืดลงเหมือนเป็นตอนกลางคืนเลยค่ะ...? เกิดเรื่องอะไรขึ้นคะเนี่ย...?"
63035-42 = "สุบารุ! พอได้แล้ว! คิดจะทำอะไร! เกิดเรื่องอะไรขึ้นกับเธอน่ะ?!"
63035-46 = "น่าจะไม่ได้ยินเสียงพวกเรานะ... หัวหน้า"
63035-47 = "..."
63035-48 = "ระ... รุ่นพี่...!"
63035-49 = "รุ่นพี่สุบารุ!!!"
63035-54 = "..."
63035-55 = "ทำไม... ล่ะ...?"
63035-56 = "ไปอยู่ไหนมา... ถึงได้มาที่นี้...?"
63035-58 = "ไปอยู่ไหนมางั้นเหรอ เด็กคนนี้ก็อยู่ตรงนี้มาตลอดนะ"
63035-59 = "อยู่ที่นี่กับพวกเรา"
63035-60 = "ทำไมถึงมองไม่เห็นน่ะเหรอ? เรื่องนั้นน่ะ..."
63035-61 = "ก็เพราะคุณไม่พยายามจะมองเห็นเด็กคนนี้ยังไงล่ะ"
63035-62 = "ใช่มั้ยล่ะ สุบารุ?"
63035-63 = "ไม่สิ ในเมื่อตอนนี้เธอกลายเป็น 'ปรากฏการณ์' ไปแล้ว ฉันคงต้องเรียกว่านางฟ้าเป่าแตรหรือเปล่า?"
63035-64 = "อาสึโกะ? พูดเหมือนรู้อะไรอย่างนั้นละ?"
63035-65 = "ที่ผ่านมามันเป็นแค่การคาดเดาของฉันน่ะ แต่ตอนนี้ฉันเหมือนจะแน่ใจแล้ว"
63035-66 = "ไม่ต้องห่วงนะ ทุกคน ฉันจะค่อยๆ เล่าให้ฟัง"
63035-67 = "และเพราะสถานการณ์เป็นอย่างนี้แล้ว ฉันก็เลยจะบอกไว้"
63035-68 = "ไม่ได้มีแต่คุณคนเดียวหรอกนะ ที่เป็น 'อาเรียส' น่ะ สุบารุ"
63035-70 = "ตอนต่อไป;สายเลือดราชวงศ์"

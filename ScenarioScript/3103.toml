[translation]
3103-1 = "การพิสูจน์คุณค่า 3"
3103-4 = "ห้องปฏิบัติงานวิศวกรรม มิลเลเนียม"
3103-9 = "ในที่สุดก็เสร็จจนได้..."
3103-13 = "เครื่อง <สถิติพยากรณ์> ที่สมบูรณ์แบบ จากไอเดียของหัวหน้าฮิมาริ"
3103-14 = "เสร็จสมบูรณ์แล้วค่า~"
3103-15 = "โอ่ย... ใช้เวลาทำมากกว่าที่คิดไว้ตั้งเยอะเลย"
3103-16 = "งานวิศวกรรมไม่ใช่เรื่องง่ายๆ เลยจริงๆ"
3103-17 = "ถ้าไม่ได้โนอามาช่วยไว้ อย่าว่าแต่ทำให้เสร็จสมบูรณ์เลย ฉันคงยังไม่กล้าแม้แต่จะประกอบ ขอบคุณที่ช่วยนะ"
3103-18 = "ไม่หรอกค่ะ ไม่ต้องขอบคุณหรอกค่ะ"
3103-19 = "ฉันก็แค่มองว่ามันน่าสนุก..."
3103-20 = "อ๊ะ... ขอโทษค่ะ"
3103-21 = "ในฐานะคณะกรรมการเซมิน่า ฉันก็ต้องให้ความร่วมมืออย่างแข็งขันในการทดสอบเทคโนโลยี และความก้าวหน้าของมิลเลเนียมสิคะ"
3103-22 = "โนอานี่ก็นะ... ชอบมาขยันกับเรื่องอะไรไร้สาระแบบนี้"
3103-27 = "เอาเถอะๆ เอาเป็นว่าเรามาลองเปิดเครื่องกันเลยไหม?"
3103-32 = "<ขอบคุณที่ใช้งานเครื่องรวบรวมและวิเคราะห์ตัวแปรในสภาพแวดล้อมขนาดใหญ่ A.K.A. เครื่อง 'สถิติพยากรณ์'>"
3103-33 = "<สถิติพยากรณ์ จะใช้ข้อมูลที่รวบรวมมาเป็นพื้นฐานในการคำนวณการเปลี่ยนแปลงในอนาคต และคาดการณ์ผลลัพธ์ที่เป็นไปได้มากที่สุด>"
3103-34 = "<ถ้าอยากรู้เกี่ยวกับข้อมูลใดในอนาคต ก็ลองถามดูได้เลย!>"
3103-35 = "มันทำงานได้จริงด้วย... นี่สินะเครื่องสถิติพยากรณ์ที่คิดค้นโดยหัวหน้าฮิมาริ...!"
3103-36 = "วะ... ว่าแต่ ข้อมูลในอนาคตที่อยากรู้งั้นเหรอ... ต้องโยนคำถามแบบไหนนะ? "
3103-37 = "จากการวิเคราะห์กลศาสตร์ควอนตัมที่ได้รับการเปิดเผยจนถึงปัจจุบัน อนาคตสามารถเปลี่ยนแปลงได้#nด้วยการสังเกตการณ์เพียงอย่างเดียว เพราะงั้นเราก็ต้องเลือกคำถามอย่างระมัดระวังด้วย"
3103-38 = "คำถามที่พอจะนึกออกตอนนี้ก็มีอยู่ราวๆ 34 ข้อ..."
3103-39 = "อย่างเช่น ความสัมพันธ์ในอนาคตกับคุณครูจะเป็นยังไงบ้าง แบบนี้ใช่ไหมคะ?"
3103-43 = "จะให้มาถามเรื่องส่วนตัวในที่แบบนี้ได้ยังไงกันเล่า?!!"
3103-44 = "นี่มันอุปกรณ์ล้ำค่าที่ใช้เงินมหาศาลในการสร้างขึ้นมานะ เราต้องเอาไปใช้เพื่องานสาธารณะที่มี#nประโยชน์สิ!"
3103-45 = "แต่ก็ไม่ปฏิเสธสินะคะว่าตัวเองก็แอบสงสัยเรื่องความสัมพันธ์ในอนาคตกับคุณครู ฮุฮุ"
3103-46 = "เธอนี่นะ..."
3103-47 = "จะยังไงก็เถอะ ฉันต้องถอนทุนคืนจากการสร้างเครื่องนี้ให้ได้ก่อน ข้อมูลจากการคาดเดาที่จะทำให้#nหาเงินได้มากๆ งั้นเหรอ..."
3103-48 = "งั้นก็ ช่วยคาดการณ์การผกผันของราคาแร่โลหะหายากใน 1 เดือนข้างหน้าให้ที"
3103-52 = "<...ได้รับคำถามเรียบร้อย...>"
3103-53 = "<กรุณากรอกวันเดือนปีเกิดของคุณลงบนอุปกรณ์>"
3103-54 = "หา? ต้องใช้วันเดือนปีเกิดของผู้ใช้งานเพื่อคาดการณ์สถานการณ์ตลาดด้วยเหรอ นี่มันตรรกะอะไรเนี่ย"
3103-55 = "เอาเถอะ ใส่ๆ ไปก่อนแล้วกัน... 14 มี.ค."
3103-60 = "<กำลังคำนวณอนาคต กรุณารอสักครู่...>"
3103-64 = "<......คำนวณเสร็จสิ้น...>"
3103-71 = "<ยินดีด้วยค่ะ! คุณอยู่ในราศีมีน! ขอฟันธงเลยว่า เดือนนี้ดวงดีแบบปังๆ เลยค่ะ!>"
3103-72 = "<ดาวพุธย้าย พระศุกร์ไม่เข้า พระเสาร์ไม่แทรก ปัญหาที่มีจะได้รับการคลี่คลายอย่างไม่มีอะไรติดขัด เดือนนี้จะเป็นเดือนแห่งรางวัลมากมายของคุณค่ะ>"
3103-73 = "<ของนำโชคของเดือนนี้คือ ไทเทเนียมที่แข็งแรง! พกติดตัวไว้เพื่อเสริมดวงด้วยนะคะ!>"
3103-77 = "ห้ะ......?"
3103-78 = "อุ๊ย......"
3103-79 = "...แค่เนี้ย?"
3103-81 = "เดี๋ยวสิ พยากรณ์ เอ๊ย คาดการณ์เสร็จแล้วเหรอ?!"
3103-84 = "จี้จัง เห็นหนังสือที่วางไว้ตรงนี้บ้างไหมคะ?"
3103-85 = "หนังสือดาราศาสตร์เล่มหนาที่อยู่ข้างๆ หน้าจอน่ะเหรอ?"
3103-86 = "เห็นวางทิ้งไว้เป็นสัปดาห์แล้ว แถมก็ใกล้ครบกำหนดคืนแล้วด้วย ฉันก็เลยเอาไปคืนที่ห้องสมุดให้แล้ว ทำไมเหรอ?"
3103-87 = "...แย่ละสิ เกิดเรื่องใหญ่แล้วค่ะ"
3103-88 = "หนังสือเล่มนั้นมันทำไมเหรอ?"
3103-89 = "คือว่า ที่จริงแล้ว..."
3103-90 = "ฉันเอาพิมพ์เขียวของเครื่องประมวลผลสุดทันสมัย <สถิติพยากรณ์> ไปใส่ไว้ในหนังสือเล่มนั้นน่ะสิคะ"
3103-91 = "มันเป็นอุปกรณ์ที่สร้างขึ้นมาเพื่อทดสอบ ถึงจะหายไปก็ไม่ได้เป็นปัญหาใหญ่ แต่ถึงอย่างนั้นก็เถอะ..."
3103-92 = "สถิติพยากรณ์คือสิ่งประดิษฐ์ที่แฝงพลังอันตรายที่สามารถล่วงรู้อนาคตได้ค่ะ หวังว่ามันจะไม่ตกไปอยู่#nในมือคนไม่ดีนะคะ... เพราะถ้าเป็นอย่างนั้นคงเกิดเรื่องใหญ่แน่เลยค่ะ"
3103-93 = "<สถิติพยากรณ์> งั้นเหรอ..."
3103-94 = "หมายถึง 'เครื่องทำนายดวงชะตา' ที่เคยพูดถึงใช่ไหม?"
3103-95 = "เครื่องทำนายดวงชะตาอะไรกันล่ะคะ สถิติพยากรณ์คือเครื่องประมวลผลที่อ้างอิงบิ๊กดาต้าหรือข้อมูล#nมหัต แล้วคำนวณความเป็นไปได้ในอนาคตตามหลักวิทยาศาสตร์ต่างหากค่ะ"
3103-96 = "อย่ามาเรียกสิ่งประดิษฐ์ที่ยิ่งใหญ่ของฉันด้วยชื่อเชยๆ แบบนั้นอีกนะคะ"
3103-97 = "คนที่เกิดในยามที่ดวงดาวบนท้องฟ้าอยู่ในตำแหน่งเดียวกัน จะมีโชคชะตาที่เหมือนกัน..."
3103-98 = "แบบนั้นมันใช่วิทยาศาสตร์ซะที่ไหนกันล่ะ?"
3103-99 = "อย่ามองว่าโหราศาสตร์เป็นเรื่องขำขันสิคะ จี้จัง"
3103-100 = "โหราศาสตร์ก็คือบิ๊กดาต้าที่มาจากการสังเกตและบันทึกการเปลี่ยนตำแหน่งของ 12 กลุ่มดาวจักรราศี#nของนักดาราศาสตร์โบราณ..."
3103-101 = "ถึงจะอธิบายให้สมเหตุสมผลไม่ได้ แต่แนวโน้มจากสถิติก็เป็นพื้นฐานที่เพิกเฉยไม่ได้นะคะ"
3103-105 = "...นั่นก็เพราะว่าชายที่อยู่ในกลุ่มดาวคนแบกงูที่เป็นลัคนาของฉันมากระซิบบอกไว้แบบนั้นค่ะ!"
3103-111 = "คือว่า... ฮิมาริ"
3103-112 = "กลุ่มดาวคนแบกงูไม่ได้อยู่ใน 12 กลุ่มดาวจักรราศีนะ"
3103-116 = "คะ... ว่าไงนะคะ?! มีการอัปแพทช์กลุ่มดาวใหม่ตั้งแต่เมื่อไรกันคะ?!"
3103-118 = "เครื่อง <สถิติพยากรณ์> อะไรนี่... ไม่ได้เป็นเครื่องประมวลข้อมูลล้ำสมัยที่คาดการณ์อนาคตได้..."
3103-119 = "แต่เป็นแค่เครื่องทำนายดวงชะตาหรอกเหรอ?!"
3103-120 = "ไม่หรอก... ไม่มีทาง ไม่มีทางที่สิ่งประดิษฐ์ของหัวหน้าฮิมาริจะเป็นเครื่องพิลึกไร้ประโยชน์ไปได้..."
3103-121 = "หรือว่าตอนที่สร้างๆ อยู่เราจะพลาดอะไรไป?"
3103-122 = "แต่พอเอามาเทียบกับพิมพ์เขียวดูแล้ว มันก็ไม่ได้ตกหล่นอะไรตรงไหนเลยนี่คะ"
3103-123 = "แถมดูจากประวัติการยืมคืนหนังสือจากห้องสมุด หมู่นี้หัวหน้าฮิมาริน่าจะสนใจเรื่องโหราศาสตร์ขึ้นมา#nนะคะ เห็นยืมหนังสือเกี่ยวกับกลุ่มดาวไปเพียบเลย..."
3103-124 = "เครื่องนี้ไม่ได้เป็นของเล่นที่หัวหน้าฮิมาริคิดประดิษฐ์ขึ้นมาขำๆ หรอกเหรอคะ?"
3103-125 = "ของเล่นขำๆ งั้นเหรอ... นี่ฉันเอางบทั้งไตรมาสของหนึ่งชมรม... ไปลงกับของเล่นขำๆ เหรอ..."
3103-126 = "เดี๋ยวนะ ที่เธอพูดเมื่อกี้..."
3103-127 = "โนอา เธอรู้ตั้งแต่แรกแล้วเหรอว่า <สถิติพยากรณ์> นี้เป็นเครื่องทำนายดวงชะตาน่ะ?!"
3103-128 = "ฉันไม่ได้แน่ใจหนึ่งร้อยเปอร์เซ็นต์หรอกค่ะ แต่ก็ค่อนข้างเชื่อ..."
3103-129 = "ถ้างั้นทำไมไม่บอกกันตั้งแต่แรกเล่า?"
3103-130 = "ก็..."
3103-131 = "...ไม่ได้ถามกันนี่คะ?"
3103-136 = "...โนอา เธอนี่มัน!!"
3103-138 = "(หลังจากนั้นยูกะก็ต้องแบกรับค่าใช้จ่ายในการสร้างเครื่อง <สถิติพยากรณ์>...)"
3103-139 = "(แต่ก็โชคดีที่ไทเทเนียมที่เธอซื้อมาราคาพุ่งทะลุดาวอังคาร เลยทำให้พอได้เงินต้นคืนมาบ้าง)"
3103-140 = "การพิสูจน์คุณค่า"

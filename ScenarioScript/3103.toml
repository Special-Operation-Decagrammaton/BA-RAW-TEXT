[translation]
3103-1 = "Proof of Concept 3"
3103-4 = "Millennium Industrial Laboratory"
3103-9 = "It's finally complete..."
3103-13 = "The Prophecy Protocol, based on President Himari's design!"
3103-14 = "It's actually finished!"
3103-15 = "It took a lot longer than I thought it would to complete it though."
3103-16 = "Engineering a device capable of processing our entire lived reality and outputting probable futures based on that data seemed straightforward enough initially..."
3103-17 = "Well, if not for your help, I don't think we would have finished it, let alone even began the project. Thanks, Noa."
3103-18 = "My pleasure."
3103-19 = "It seemed like it would be entertaining..."
3103-20 = "Oh, I mean..."
3103-21 = "As a member of Seminar, it is only natural to participate in advancing Millennium's potential."
3103-22 = "Noa... Sometimes, you're a bit too formal."
3103-27 = "Anyway, shall we turn it on?"
3103-32 = "Thank you for activating the large-scale environmental variable collection and analysis device, also known as the Prophecy Protocol."
3103-33 = "The Prophecy Protocol collects, collates, and processes data to produce predictive analysis of reality, also known as the future."
3103-34 = "Please, take a peek into the future!"
3103-35 = "It works... President Himari's Prophecy Protocol really works!"
3103-36 = "It's even inviting us... What should we ask first?"
3103-37 = "According to what we know of quantum mechanics, observation in and of itself could change the future, so we need to ask wisely."
3103-38 = "I already have thirty-four questions in mind, but..."
3103-39 = "Are all of them about your relationship with Sensei?"
3103-43 = "I-I'm not going to ask anything personal like that!!"
3103-44 = "Just think of everything we put into this thing... We have to ask something that's important to everyone."
3103-45 = "...You didn't deny that you had questions about your relationship with Sensei. Heehee."
3103-46 = "Listen here..."
3103-47 = "Anyway, we still can't use this machine selfishly... So let's ask it something that will make us money."
3103-48 = "Hey, how will the price of rare metals change over the next month?"
3103-52 = "Query received."
3103-53 = "Before analysis can begin, please enter your date of birth."
3103-54 = "Huh? Why would a machine that collects all data in existence need me to enter my date of birth?"
3103-55 = "Well, I guess it's no big deal. March 14th..."
3103-60 = "Calculating the future. Please hold..."
3103-64 = "Calculation complete."
3103-71 = "Congratulations! You're a Pisces! This month will be very lucky for you!"
3103-72 = "Your ruling planet has good vibes, so everything you do will go as planned, even if you didn't expect it to. You'll receive many rewards. Maybe. Also, yes!"
3103-73 = "This month's lucky rare mineral is durable titanium! Carry it around and something good might happen!"
3103-77 = "...What."
3103-78 = "Oh, dear..."
3103-79 = "...Again, what?"
3103-81 = "Is that really it?!"
3103-84 = "Hey... Did you see the book that was here?"
3103-85 = "You mean that giant astrology book in front of the monitor?"
3103-86 = "It was sitting there for a whole week. It was nearing the due date, so I returned it to the library. Why?"
3103-87 = "...This is bad."
3103-88 = "Oh no. Was the book important?"
3103-89 = "Well..."
3103-90 = "I put the design for the Prophecy Protocol, my advanced data-processing device, in that book."
3103-91 = "It was just a test design, so it's not a big deal if I lose it. But..."
3103-92 = "It's a dangerous invention that lets you see into the future itself! Who knows what would happen if it ended up in the wrong hands..."
3103-93 = "Prophecy Protocol..."
3103-94 = "You mean your horoscope generator?"
3103-95 = "It's not a horoscope generator! The Prophecy Protocol is world-changing technology that has captured the fundamental nature of the future itself using scientific data!"
3103-96 = "Please don't give the product of my genius such a tacky name."
3103-97 = "Believing people share the same fate just because they were born when the stars were in certain positions..."
3103-98 = "That's not very sciencey of you, is it? I mean, the universe doesn't even have fixed locations..."
3103-99 = "You shouldn't look down on astrology, Chi."
3103-100 = "Astrology is based on data stretching back to ancient astrologists who observed the twelve zodiac signs and the flow of human life over many generations..."
3103-101 = "It may not have a logical explanation behind it, but you can't ignore its prominence in human history!"
3103-105 = "...Besides, my ruling planet, Ophiuchus, told me so!"
3103-111 = "Um... Himari?"
3103-112 = "Ophiuchus isn't one of the zodiac signs."
3103-116 = "...Whaaat?! When did that change?!"
3103-118 = "So the Prophecy Protocol isn't a hyper-advanced data-processing device that has solved the fourth dimension..."
3103-119 = "It's just a horoscope generator?!"
3103-120 = "No... No, there's no way! President Himari wouldn't waste her time on such a useless invention..."
3103-121 = "Did we mess something up while building it?"
3103-122 = "I don't think we did... If you compare it with the blueprint..."
3103-123 = "And you know, if you look at the library's records, it looks like President Himari checked out a whole bunch of astrology books recently..."
3103-124 = "Maybe she was just fooling around with this design for fun?"
3103-125 = "For fun... We spent all this money on something...that was just for fun... What have I done..."
3103-126 = "Wait, but... You..."
3103-127 = "Noa, did you already know the Prophecy Protocol might just be a horoscope generator?!"
3103-128 = "Well, I couldn't be sure... After all, I can't predict the future..."
3103-129 = "Why didn't you say anything?!"
3103-130 = "This is on both of us. After all, I never said anything..."
3103-131 = "...But you never asked."
3103-136 = "Noa! You little...!!!"
3103-138 = "Yuuka ended up having to pay the cost of producing the Prophecy Protocol out of pocket..."
3103-139 = "But thankfully, titanium prices surged, which she profited greatly off of by trading futures, so she was able to get her money back."
3103-140 = "Proof of Concept"

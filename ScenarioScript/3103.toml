[translation]
3103-1 = "價值的證明（３）"
3103-4 = "千年．實習室"
3103-9 = "終，終於完成了……"
3103-13 = "這就是陽葵部長設計的，未來觀測機「讖」！"
3103-14 = "辛苦了～"
3103-15 = "呼，花了不少時間呢……"
3103-16 = "果然工程方面的作業很辛苦呢……"
3103-17 = "要是沒有乃愛的幫忙，我肯定在完成前就放棄了。謝啦。"
3103-18 = "不會不會，沒什麼好感謝的。"
3103-19 = "這麼有趣的──"
3103-20 = "差點說溜嘴了。"
3103-21 = "我只是作為研討會的一員，為了千年技術的可能性出一份心力而已。"
3103-22 = "該說不愧是妳嗎，真認真呢。"
3103-27 = "總之，先啟動看看吧。"
3103-32 = "＜大規模變數分析裝置──a.k.a.未來觀測機「讖」──已啟動＞"
3103-33 = "＜本機將基於收集而來的資料對變化和產生的預測值進行計算，#n　得出實現可能性最高的結果＞"
3103-34 = "＜想知道怎樣的未來，請儘管說吧＞"
3103-35 = "真的在運作了，不愧是陽葵部長……"
3103-36 = "不過，就算被問「想知道怎樣的未來」……"
3103-37 = "從量子力學的觀點來看，只要觀測就會改變未來……#n既然如此，就連發問都得要謹慎才行呢。"
3103-38 = "雖然浮現了大約34個點子，我想想……"
3103-39 = "今後和老師的關係會怎麼發展──之類的？"
3103-43 = "那，那種私人的問題不可能在這種情況下問吧！？"
3103-44 = "這可是難得花重金製作的貴重裝置，#n應該要，問更有公共意義的事情……"
3103-45 = "沒有否定很在意這件事呢？"
3103-46 = "啊啊真是……！"
3103-47 = "總，總之首先，得先回收製作費用才行……#n要依靠預測賺錢的話……"
3103-48 = "呃，那麼今後一個月內稀有金屬的價格會怎麼變動……#n能告訴我嗎？"
3103-52 = "＜已收到要求＞"
3103-53 = "＜首先請輸入出生年月日＞"
3103-54 = "……？預測市場價格變化需要使用者出生年月日的邏輯是……？"
3103-55 = "算了無所謂……呃，3月14日……"
3103-60 = "＜正在演算未來，請稍候……＞"
3103-64 = "＜演算已完成＞"
3103-71 = "＜恭喜！雙魚座的您，這個月的運勢是大吉！＞"
3103-72 = "＜將會是問題被解決，發生很多好事的一個月吧！＞"
3103-73 = "＜本月的幸運物是堅固的鈦金屬！#n　隨身攜帶的話，或許就會發生好事！？＞"
3103-77 = "……？"
3103-78 = "哎呀……"
3103-79 = "……咦，結束了？"
3103-81 = "騙人的吧，結束了嗎！？"
3103-84 = "千醬。放在這裡的書，妳有看到嗎？"
3103-85 = "放在螢幕旁邊的那本很厚的天文學的書？"
3103-86 = "我看了一下發現還書期限就要到了，所以就幫妳還給圖書館了。"
3103-87 = "……哎呀，是這樣啊。"
3103-88 = "怎麼了嗎？"
3103-89 = "該怎麼說呢……"
3103-90 = "我新設計的最先進演算裝置，未來規測機「讖」的設計圖還夾在那本書裡。"
3103-91 = "雖然就算不見了，也不會特別困擾……"
3103-92 = "不過那是能夠窺見未來，擁有危險能力的發明……#n如果落入壞人手裡的話……"
3103-93 = "妳說的未來觀測機「讖」……"
3103-94 = "是之前提到過的，「星座占卜」的那個嗎？"
3103-95 = "那可是基於科學的統計解析和大數據的最先進的演算裝置唷？"
3103-96 = "而且，她可是我偉大的發明。#n請別把她和普通的「星座占卜」相提並論。"
3103-97 = "不過僅僅是「天上的星星在相同位置的時候出生」而已，#n那些人們就會有相同的命運……"
3103-98 = "那種思考方式，不是很不科學嗎？"
3103-99 = "不可以小看占星術唷，千醬。"
3103-100 = "「占星術」……那是古代的天文學者們歷經長久的研究，#n觀測黃道十二宮的流動與人類一生關聯性的大數據……"
3103-101 = "儘管還不能用理論來說明，也不能無視統計結果所展示的傾向。"
3103-105 = "更重要的是……我所屬的「蛇夫座」的星星，是這麼告訴我的！"
3103-111 = "……陽葵。"
3103-112 = "蛇夫座並不包含在黃道十二宮裡哦？"
3103-116 = "……是，是這樣嗎！？"
3103-118 = "所以，所謂「預測未來的裝置」……"
3103-119 = "只不過是單純的，星座占卜機嗎！？"
3103-120 = "怎，怎麼會……陽葵部長的發明怎麼可能這麼沒用……"
3103-121 = "難，難道說在製作的過程出了什麼差錯……？"
3103-122 = "不，完全和設計圖一樣。"
3103-123 = "這麼說來，從最近圖書館的借出紀錄來看……#n陽葵部長借了很多占星術相關的書呢。"
3103-124 = "這會不會是陽葵部長做來玩的玩具呢？"
3103-125 = "玩具……用那麼多的預算，做玩具……"
3103-126 = "……先等一下。"
3103-127 = "乃愛，聽妳這麼說……難道妳，一開始就注意到了嗎……？"
3103-128 = "算是吧，不過我也不太確定。"
3103-129 = "那，那為什麼不早點告訴我啊！？"
3103-130 = "問我為什麼……"
3103-131 = "……因為妳沒有問我呀？"
3103-136 = "……乃愛！！"
3103-138 = "（結果儘管優香依照計畫，自掏腰包負擔了未來觀測機「讖」的費用……）"
3103-139 = "（所幸經由期貨交易購入的鈦金屬價格暴漲，#n　所以勉強解決了資金方面的問題）"
3103-140 = "價值的證明"

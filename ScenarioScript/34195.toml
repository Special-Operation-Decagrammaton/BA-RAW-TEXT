[translation]
34195-7 = "ที่นี่มัน..."
34195-12 = "ฉันเพิ่งเคยเห็นเป็นครั้งแรก... ไม่สิ... ที่นี่มันเขตปกครองตนเองเฮียกคิยาโคเหรอ...?"
34195-13 = "หืม? มีแขกมาเหรอ?"
34195-18 = "......!!"
34195-20 = "นี่เป็นครั้งแรกเลยนะ... ที่มีคนอื่นนอกจากตัวฉันเข้ามาเหยียบที่นี่"
34195-22 = "เข้ามาหาฉันถึงในความฝันแบบนี้ มีเรื่องอะไรมาล่ะ? "
34195-23 = "คุณคือ... ใครเหรอคะ? มองเห็นฉันเหรอคะ?"
34195-25 = "อืม..."
34195-26 = "......."
34195-28 = "......."
34195-33 = "ตอนต่อไป;นักบุญบาร์บารา"

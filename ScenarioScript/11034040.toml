[translation]
11034040-1 = "#A-03"
11034040-3 = "(ปกติเราซื้อมินต์ช็อกโกแลตมาตุนไว้ตลอด แต่วันนี้หมดไวจัง)"
11034040-4 = "(หรือว่าคนจะหันมาชอบมินต์ช็อกโกแลตกันหมดแล้ว...!? ถ้าเป็นอย่างนี้ต่อไปเรื่อยๆ ละก็...!!)"
11034040-8 = "ตัวเองซื้อมาเอง และตัวเองก็กินหมดเองโดยไม่รู้ตัวเหรอเนี่ย... สงสัยจะเป็นทาสมินต์ช็อกโกแลต#nจริงๆ สินะ..."

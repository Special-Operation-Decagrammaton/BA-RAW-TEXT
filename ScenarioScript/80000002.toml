[translation]
80000002-1 = "สั่งผิด ชีวิตเกือบเปลี่ยน"
80000002-2 = "ร้านเอ็นเจล 24 ในอาคารชาเล่ต์"
80000002-5 = "ชะ...เชิญค่ะ คุณครู..."
80000002-8 = "..."
80000002-9 = "เอ่อ... คุณครูคะ มีคนที่คุณครูอยากให้ช็อกโกแลตอยู่รึเปล่าคะ?"
80000002-10 = "ตอนนี้ที่ร้านเอ็นเจล 24 มีอีเวนต์พิเศษซื้อช็อกโกแลต 1 แถม 1 อยู่นะคะ!"
80000002-11 = "นี่เป็นโอกาสดีที่จะได้สารภาพรักกับคนที่ชอบได้สองคนพร้อมๆ กันเลยนะคะ!"
80000002-12 = "[s] \"ทำแบบนั้นเดี๋ยวก็เกิดสงครามหรอก...\""
80000002-13 = "งะ...งั้นเหรอคะ?"
80000002-14 = "ฮือ... จะทำยังไงดี"
80000002-15 = "[s] ถามว่าเกิดอะไรขึ้น"
80000002-16 = "คือว่า... ใกล้เทศกาลวันวาเลนไทน์แล้ว ฉันเลยสั่งซื้อช็อกโกแลตมาค่ะ แต่ตอนสั่งดันเผลอกรอก#nจำนวนผิดไป..."
80000002-17 = "ฉันว่าจะสั่งแค่ 20 ชิ้น แต่ดันไปสั่ง 20 กล่องแทนน่ะค่ะ..."
80000002-18 = "ถึงจะรีบจัดอีเวนต์ซื้อ 1 แถม 1 แล้วก็จริง แต่ว่าร้านที่แทบจะไม่มีคนแวะมาแบบนี้ จะขายช็อกโกแลต 20 กล่องหมดได้ยังไงกัน..."
80000002-19 = "ถ้าทางสำนักงานใหญ่ตรวจสอบพบว่ามีการสั่งซื้อผิดพลาด คงโดนดุหนักมากแน่เลยค่ะ"
80000002-20 = "มันไม่ใช่แค่ปัญหาเรื่องค่าขนมไม่พอแล้ว แต่ฉันอาจถูกเรียกร้องให้ชดใช้เงินเป็นจำนวนมากด้วยก็ได้..."
80000002-21 = "[s] \"ออกไปขายช็อกโกแลตริมถนนกันเถอะ!\""
80000002-22 = "คะ? จะให้ออกไปขายช็อกโกแลตข้างนอกเหรอคะ?"
80000002-23 = "กะ...ก็จริงที่ว่าอาจจะขายได้เยอะกว่าขายให้ลูกค้าที่มาชาเล่ต์..."
80000002-24 = "ตะ...แต่จะขายช็อกโกแลต 200 ชิ้นได้หมดในวันเดียวจริงเหรอคะ...?"
80000002-25 = "[s1] \"ไม่ต้องห่วง\"\n[s2] \"เดี๋ยวครูไปช่วยขายเอง\""
80000002-26 = "(ฮือ... ไม่อยากติดหนี้บุญคุณกับคุณครูจากสำนักงานลึกลับนั่นเลย...)"
80000002-27 = "(ฮือ... ไม่อยากติดหนี้บุญคุณกับคุณครูจากสำนักงานลึกลับนั่นเลย...)"
80000002-28 = "(แต่ว่าก็ไม่มีทางอื่นแล้ว... แถมคุณครูก็ดูไม่น่าจะใช่คนไม่ดีด้วย...)"
80000002-29 = "ค่ะ... ถ้างั้นรบกวนด้วยนะคะ คุณครู!"
80000002-31 = "(จากนั้น โซระกับคุณครูก็ออกไปขายช็อกโกแลตด้วยกัน)"
80000002-38 = "(และเนื่องจากนักเรียนที่เดินผ่านไปมาให้ความสนใจกันมาก เลยขายช็อกโกแลตหมดได้อย่างรวดเร็ว)"
80000002-40 = "สะ...สุดยอดเลยค่ะ คุณครู ขายช็อกโกแลตเยอะขนาดนั้นหมดได้ในพริบตาเลยนะคะ!"
80000002-41 = "แถมดูเหมือนจะมีคนดังๆ จากเกเฮนน่ากับทรีนิตี้มาซื้ออีกด้วย..."
80000002-42 = "สมกับเป็นคุณครูที่ลึกลับจริงๆ..."
80000002-43 = "[s] \"หืม? เมื่อกี้ว่ายังไงนะ?\""
80000002-44 = "มะ...ไม่มีอะไรค่ะ!"
80000002-48 = "ถึงจะเป็นผู้ใหญ่ที่ดูลึกลับ แต่บางครั้งก็ดูไว้ใจได้..."
80000002-52 = "คือ... คุณครูคะ มีช็อกโกแลตเหลืออยู่หนึ่งชิ้นค่ะ"
80000002-53 = "ถ้าคุณครูไม่ว่าอะไร... ช่วยรับช็อกโกแลตชิ้นนี้ไปได้มั้ยคะ?"
80000002-58 = "มะ...มะ...มะ... ไม่ใช่นะคะ! มันไม่ใช่ของที่ขายไม่ออกนะคะ"
80000002-59 = "ช็อกโกแลตชิ้นนี้ ฉันตั้งใจซื้อให้คุณครูค่ะ..."
80000002-60 = "ขอให้คุณครูมีความสุขในวันวาเลนไทน์นะคะ"

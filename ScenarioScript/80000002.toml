[translation]
80000002-1 = "A Mistaken Order"
80000002-2 = "Schale Building, Angel 24"
80000002-5 = "W-Welcome, Sensei!"
80000002-8 = "..."
80000002-9 = "Um, Sensei. Could I interest you in some of our chocolate?"
80000002-10 = "Angel 24 is having a buy one, get one free event right now!"
80000002-11 = "It's a great opportunity to confess your feelings to two people at the same time!"
80000002-12 = "[s] \"That doesn't sound like a very good idea...\""
80000002-13 = "I-I guess you're right..."
80000002-14 = "Ugh. What am I gonna do with all of these?"
80000002-15 = "[s] \"What's wrong?\""
80000002-16 = "The thing is, I ordered too much chocolate for Valentine's Day."
80000002-17 = "Instead of 20 boxes, I put down 20 CASES..."
80000002-18 = "I came up with the idea to run a BOGO event, but business is so slow that I doubt I'm ever going to sell 20 cases worth of chocolate."
80000002-19 = "I'll be in big trouble once HQ finds out."
80000002-20 = "I might have to pay for everything out of my paycheck.#nThat's more than it can handle!"
80000002-21 = "[s] \"Then let's get out there and sell some chocolate!\""
80000002-22 = "Huh? You mean outside the store?"
80000002-23 = "I guess that'd be more effective than only selling it to people visiting the Schale building..."
80000002-24 = "Still, how are we going to manage to sell 20 cases in only a day?#nThat's over 200 bars of chocolate..."
80000002-25 = "[s1] \"Don't worry. We can do it.\"\n[s2] \"I'll help you sell it.\""
80000002-26 = "(Ugh. The last thing I wanted to do was be indebted to Sensei after all the suspicious rumors surrounding Schale...)"
80000002-27 = "(Ugh. The last thing I wanted to do was be indebted to Sensei after all the suspicious rumors surrounding Schale...)"
80000002-28 = "(...but I don't have any other choice. And Sensei has never seemed like a bad person.)"
80000002-29 = "Okay. If you don't mind, then...thank you, Sensei."
80000002-31 = "Sora and I then left Angel 24 to go sell the chocolates."
80000002-38 = "We did our best to flag down any passing students, and in no time, we managed to sell off every last bar of chocolate."
80000002-40 = "I can't believe it! We sold them all in practically no time!"
80000002-41 = "I think some of the people who bought them were even famous students from Trinity and Gehenna."
80000002-42 = "No wonder there are so many rumors about Sensei..."
80000002-43 = "[s] \"Huh? What was that last part?\""
80000002-44 = "N-Nothing!"
80000002-48 = "Even if Sensei is kind of sketchy, they're still trustworthy."
80000002-52 = "Um, Sensei. There's actually still one chocolate left."
80000002-53 = "If you don't mind, will you take it?"
80000002-58 = "And it's not because I forgot to sell it!"
80000002-59 = "This one's...on me. For you."
80000002-60 = "Happy Valentine's Day, Sensei!"

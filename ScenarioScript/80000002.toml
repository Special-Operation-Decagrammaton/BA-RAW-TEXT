80000002-4 = "3;소라;07\n#3;em;[반응]\n#3;a\n#wait;1500"
80000002-5 = "3;소라;18;어, 어서 오세요. 선생님…….\n#3;greeting"
80000002-6 = "#st;[0,0];instant;1;"

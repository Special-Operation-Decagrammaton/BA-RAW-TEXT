[translation]
80000002-1 = "訂貨失誤"
80000002-2 = "夏萊．「天使24」"
80000002-5 = "歡，歡迎光臨，老師……！"
80000002-8 = "……那個。"
80000002-9 = "老師，想不想買巧克力啊……？"
80000002-10 = "現在天使24有巧克力買一送一的優惠活動！"
80000002-11 = "這可是雙喜臨門（？）的好機會唷！"
80000002-12 = "[s]「現，現在有點……」"
80000002-13 = "果然是這樣嗎……"
80000002-14 = "嗚嗚……這下該怎麼辦……"
80000002-15 = "[s]似乎有什麼苦衷所以詢問小空"
80000002-16 = "其實，因為情人節的關係我訂了一批巧克力，卻搞錯了數量……"
80000002-17 = "本來只想訂20個，結果訂成了20箱……"
80000002-18 = "所以只好推出「買一送一」的活動，可是因為這裡本來就沒什麼客人……"
80000002-19 = "要是被總店發現的話，我就……"
80000002-20 = "這樣下去別說是零用錢了，可能還得負擔一大筆賠償金……！？"
80000002-21 = "[s]「要不要試試到外面去賣？」"
80000002-22 = "咦，這……"
80000002-23 = "當，當然，這樣可能會比只待在這裡賣得還多……"
80000002-24 = "但是這麼多巧克力，真的賣得出去嗎……？"
80000002-25 = "[s1]「一定沒問題的。」\n[s2]「我也會幫忙唷。」"
80000002-26 = "（嗚嗚，欠這個有許多奇怪傳言的「老師」人情沒問題嗎……）"
80000002-27 = "（嗚嗚，欠這個有許多奇怪傳言的「老師」人情沒問題嗎……）"
80000002-28 = "（可是沒有其他辦法，看起來好像也許彷彿似乎也不是那麼壞的人……）"
80000002-29 = "那，那……嗯，就拜託你了！"
80000002-31 = "（之後和小空一起到外面努力地賣巧克力）"
80000002-38 = "（幸好路過的學生對巧克力比想像中還有興趣，所以一下就賣完了）"
80000002-40 = "好，好厲害呀老師……！巧克力明明那麼多，竟然一下就賣完了！"
80000002-41 = "而且好像連三一和格黑娜的名人都來了……"
80000002-42 = "這位老師，究竟是……"
80000002-43 = "[s]「……？」"
80000002-44 = "沒，沒事！什麼都沒有！"
80000002-48 = "身分先不說，確實是挺可靠的……？"
80000002-52 = "那個，老師。其實巧克力還剩一份……"
80000002-53 = "不介意的話，可以請你收下嗎？"
80000002-58 = "啊，不是！這不是擅自從店裡拿走或是不小心拿出來的！"
80000002-59 = "這個是，那個，我自己花錢買給你的巧克力……"
80000002-60 = "祝你情人節快樂。"

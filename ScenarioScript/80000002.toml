80000002-8 = "3;소라;18;……\n#3;em;[...]"
80000002-9 = "3;소라;09;저, 선생님. 혹시 초콜릿 선물하실 분 안 계신가요?\n#3;stiff"
80000002-10 = "3;소라;04;지금이라면 저희 엔젤 24에서 초콜릿 1+1 증정 이벤트를 하고 있으니까요!\n#3;em;[반응]"
80000002-11 = "3;소라;09;좋아하는 사람 두 명에게 동시에 고백할 수 있는 절호의 기회에요!\n#3;hophop"
80000002-12 = "[s] \"그랬다가는 싸움이 날 것 같은데…….\""
80000002-13 = "3;소라;09;그, 그렇겠죠?\n#3;stiff"
80000002-14 = "3;소라;20;하우우…… 이를 어쩌죠…….\n#3;em;[땀]"
80000002-15 = "[s] 무슨 일이냐고 묻는다."
80000002-16 = "3;소라;10;다름이 아니라…… 발렌타인 데이를 앞두고 초콜릿을 발주하려 했는데, 수량을 실수로 잘못 기입해서요.\n#3;stiff"
80000002-17 = "3;소라;10;초콜릿 20개가 아니라, 20박스를 주문해 버렸어요…….\n#3;em;[속상함]\n#fontsize;55"
80000002-18 = "3;소라;20;급한 대로 초콜릿 1+1 이벤트를 열긴 했지만, 찾아오는 손님도 거의 없는 이런 가게에서 초콜릿이 20박스나 팔릴 것 같지도 않고……."
80000002-19 = "3;소라;11;발주를 실수했다는 사실을 본사에 들키면 정말 끝장이에요.\n#3;em;[!]\n#3;hophop"
80000002-20 = "3;소라;06;이대로는 용돈이 문제가 아니라, 어마어마한 액수의 환불금을 물게 될지도…….\n#3;stiff"
80000002-21 = "[s] \"거리에 나가서 초콜릿을 직접 팔자!\""
80000002-22 = "3;소라;18;네? 건물 밖에서 초콜릿을 직접 팔자고요?\n#3;em;[?!]\n#3;jump"
80000002-23 = "3;소라;20;무, 물론 샬레를 방문하는 손님들을 상대로 파는 것보다는 효과적이겠지만……."
80000002-24 = "3;소라;09;20박스, 낱개로는 200개 가까이 되는 초콜릿을 하루 만에 팔 수 있을까요……?"
80000002-25 = "[s1] \"걱정 마.\"\n[s2] \"내가 직접 판매를 도와줄게.\""
80000002-26 = "3;소라;20;(우으…… 수상한 사무실의 그 선생님께 빚을 지고 싶지는 않았지만…….)\n#3;em;[...]"
80000002-27 = "3;소라;20;(우으…… 수상한 사무실의 그 선생님께 빚을 지고 싶지는 않았지만…….)\n#3;em;[...]"
80000002-28 = "3;소라;09;(하지만 다른 방법도 없고…… 그렇게 나쁜 사람은 아닌 것 같기도 하고…….)"
80000002-29 = "3;소라;18;……네. 그럼 부탁드릴게요, 선생님!\n#3;em;[땀]\n#3;greeting"

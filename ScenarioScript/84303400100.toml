[translation]
84303400100-5 = "ฉันตรวจสอบสถานการณ์แล้ว เป็นไปตามคาดเลย..."
84303400100-6 = "ขอเกมให้ฉันหน่อยสิ ก่อนที่จะวิเคราะห์โค้ด ฉันต้องวิเคราะห์ผลจากการเล่นเกมจริงๆ เสียก่อน"
84303400100-10 = "มีหลายคนยืนยันว่าเล่นเกมนี้แล้วเกิดความโมโหนะคะ จะลองเล่นจริงๆ เหรอ?"
84303400100-11 = "ใช่ เรื่องการควบคุมอารมณ์น่ะ ฉันฝึกมานับครั้งไม่ถ้วนแล้ว"
84303400100-24 = "..."
84303400100-25 = "ริโอะ...?"
84303400100-26 = "ฮู่ว..."
84303400100-27 = "ฮู่ว... ฮู่วว..."
84303400100-28 = "ริโอะ...? โอเคมั้ยคะ ริโอะ?"
84303400100-29 = "ฉันโอเค คิดว่างั้นนะ..."
84303400100-30 = "ถ้าเล่นต่อคงอันตรายมากกว่านี้ ฉันจะหยุดเล่นแล้ววิเคราะห์โค้ดเลยแล้วกัน"

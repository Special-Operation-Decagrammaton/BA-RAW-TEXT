[translation]
84303400100-5 = "……果然不出我所料。情況我都確認過了。"
84303400100-6 = "把遊戲給我吧？#n在分析程式碼之前，實際玩遊戲一遍也能獲得資料。"
84303400100-10 = "很多證詞都說玩這款遊戲會感到憤怒。沒關係嗎？"
84303400100-11 = "沒關係。我經歷過無數次的情緒控制訓練。"
84303400100-24 = "…………"
84303400100-25 = "……莉央？"
84303400100-26 = "……呼。"
84303400100-27 = "呼……呼……"
84303400100-28 = "莉央……？你還好嗎，莉央？"
84303400100-29 = "我沒事……應該吧。"
84303400100-30 = "這款遊戲很危險。#n我立刻開始分析。"

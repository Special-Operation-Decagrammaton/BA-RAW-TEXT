[translation]
1008005-1 = "การเอาใจใส่"
1008005-2 = "(คุณครูกำลังเดินเล่นอยู่ในย่านการค้ากับโชคุโฮว)"
1008005-8 = "......?"
1008005-14 = "[ns1] \"...โชคุโฮว?\"\n[ns2] \"มีเรื่องอะไรกวนใจเหรอ?\""
1008005-17 = "ไม่หรอก ไม่ใช่อย่างนั้นหรอก"
1008005-18 = "ก็แค่คิดเฉยๆ น่ะว่าพวกเด็กผู้หญิงวัยเดียวกับฉัน ไม่ว่าจะไปไหนก็มักจะเกาะกลุ่มกันไปตลอดเลย"
1008005-19 = "จะให้พูดเองก็จะเป็นการอวยตัวเองไปหน่อย แต่ว่าฉันน่ะเคยเป็นตัวท็อปของกลุ่มมาตลอดเลยนะ..."
1008005-20 = "แต่พอตอนนี้สถานการณ์เปลี่ยนจนฉันกลายมาเป็นคนนอกที่ได้แต่เฝ้าดู ฉันก็เลยสามารถสังเกตได้#nอย่างเป็นกลาง"
1008005-21 = "เลยสงสัยขึ้นมาน่ะว่าคนอื่นก็รู้สึกแบบนี้ไหมเวลามองดูฉัน ก็เท่านั้นแหละ"
1008005-22 = "แต่มันก็... ไม่ใช่เรื่องไม่ดีเสมอไปหรอกนะ ฉันกลับคิดว่านี่เป็นเรื่องธรรมชาติเสียด้วยซ้ำ"
1008005-23 = "...หืม? อยากรู้ว่าฉันมีเพื่อนเยอะรึเปล่าน่ะเหรอ?"
1008005-27 = "... เพื่อน... เหรอ?"
1008005-28 = "ฉันจะไม่บอกว่าไม่มีหรอกนะ แต่ให้บอกว่ามี 'เยอะ' ก็ไม่น่าจะถูก"
1008005-32 = "เห็นฉันเป็นแบบนี้ ก็ใช่ว่าฉันจะไม่มีสายสัมพันธ์ที่ดีกับใครเลย แต่ส่วนใหญ่แล้วทุกคนมักถูกพลังจิต#nของฉันครอบงำซะมากกว่าน่ะ"
1008005-33 = "แต่ถึงจะใช้พลังจิต ฉันก็ไม่ใช่พวกที่ชอบบังคับกดขี่คนอื่นเหมือนอย่างที่คุณครูคิดหรอกนะ..."
1008005-34 = "หืม? ไม่ได้คิดแบบนั้นเลยงั้นเหรอ? คิดว่าฉันจะทำตัวดีกับเพื่อนอย่างไม่ต้องสงสัยงั้นเหรอ?"
1008005-35 = "อืม... พูดแบบนี้เพราะใส่ใจกัน หรือว่าก็แค่ชมไปงั้นๆ นะ?"
1008005-36 = "แต่จะเป็นอะไรก็ช่างเถอะ ไม่อยากเข้าไปอ่านใจให้เหนื่อยแล้ว"
1008005-37 = "...หืม?"
1008005-38 = "อยากรู้ว่าฉันคิดจะทำอะไรแบบนั้นที่นี่มั้ยงั้นเหรอ? หมายถึงทำอะไร?"
1008005-39 = "...ควบคุมจิตใจ?"
1008005-40 = "เป็นถึงคุณครู แต่มาถามอะไรแบบนี้กับฉันเนี่ยนะ? ควรจะต้องห้ามปรามหรือทำให้ฉันไม่คิดทำอะไร#nแบบนั้นมากกว่าไม่ใช่เหรอ?"
1008005-41 = "ต่อให้ตอนนี้ฉันจะตั้งสมาธิไม่ค่อยได้ แล้วพลังก็อ่อนแอลงอย่างเห็นได้ชัดก็เถอะ..."
1008005-42 = "แต่ถ้าตั้งใจทำ ก็ใช่ว่าจะทำไม่ได้เลยนะ"
1008005-46 = "...แปลกจัง ทำไมคุณครูดูไม่ตกใจเลยนะ"
1008005-47 = "[s3] \"เพราะครูคิดว่าเธอคงไม่ทำแบบนั้นหรอก\"\n[s4] \"ถ้าเธอคิดจะทำจริงๆ ก็คงทำไปแล้วแหละ\""
1008005-50 = "...ถูกต้อง เพราะถ้าฉันจะทำ ฉันคงทำกับคุณครูเป็นคนแรกไปแล้ว"
1008005-51 = "ฉันไม่คิดจะทำหรอก ไม่สิ ฉันไม่มีความจำเป็นที่ต้องทำต่างหาก ต้องพูดแบบนี้สิถึงจะถูก"
1008005-52 = "พออยู่ที่นี่แล้ว ฉันเป็นแค่คนนอกและผู้มาเยือนจากต่างถิ่น ฉันไม่มีเหตุผลต้องเข้าไปยุ่งเกี่ยว#nกับเรื่องของที่นี่ แล้วก็ไม่จำเป็นต้องรับผิดชอบอะไรด้วย"
1008005-53 = "อีกอย่าง การครอบงำจิตใจคนอื่นก็ไม่ได้สนุกไปทุกครั้งด้วย..."
1008005-54 = "ที่จริงแล้ว... ถ้ามันไม่จำเป็นต้องทำ ฉันก็ไม่ได้อยากจะทำน่ะ"
1008005-55 = "ฉันรู้สึกแบบนั้นจริงๆ นะ ตรงกันข้าม ตอนนี้ฉันกลับรู้สึกสบายใจมากกว่าด้วยซ้ำ"
1008005-56 = "ถ้าเป็นคนที่ไม่มีพลังจิตอะไรเลย... ก็จะอิ่มเอมใจกับชีวิตได้แบบนี้งั้นสินะ"
1008005-57 = "พูดตรงๆ ฉันก็แอบคิดแบบนั้นอยู่บ้างน่ะ"
1008005-58 = "เอ๋..."
1008005-64 = "...เสียงดังอะไรกันน่ะ?"
1008005-65 = "คะ... คุณลูกค้า ไม่ได้นะคะ... เราต้องยึดตามลำดับก่อนหลัง..."
1008005-66 = "โธ่ มันจะเป็นอะไรกันเชียว ก็แค่แอบให้ก็ได้แล้วนี่ มาทำให้คนอื่นขายหน้าแบบนี้ทำไมน่ะ"
1008005-67 = "ถ้ายังพูดไม่รู้ฟังแบบนี้ คนจะยิ่งแห่เข้ามาวุ่นวายมากกว่าเดิมนะ ทำให้มันง่ายๆ เถอะน่า ว่าไง?"
1008005-68 = "ตะ... แต่ว่า... ร้านของเราก็มีกฎที่ต้องปฏิบัติตาม..."
1008005-69 = "โธ่~ ไม่ต้องเคร่งขนาดนั้นหรอกน่า หยวนๆ ให้กันบ้างก็ได้..."
1008005-73 = "[ns5] \"... ทำให้คนอื่นลำบากใจสินะ\"\n[ns6] \"ต้องเข้าไปสั่งสอนสักหน่อยแล้ว\""
1008005-76 = "...เฮ้อ"
1008005-81 = "[ns7] \"......?\"\n[ns8] \"หืม? เสียงเมื่อกี้มัน...?\""
1008005-84 = "ฮึ่ม... ทนไม่ไหวแล้ว...!"
1008005-85 = "บอกไปแล้วไงคะว่าไม่ได้! นี่คุณ!! กลับไปต่อแถวเดี๋ยวนี้เลยค่ะ! ถ้าไม่ไป ฉันจะโกรธจริงๆ นะคะ!!"
1008005-86 = "วะ... เหวอ!? กะ... ก็ได้ รู้แล้วน่า ทำไมต้องตวาดเสียงดังด้วย...? คนอื่นมองกันหมดแล้ว...!"
1008005-87 = "ต่อไปถ้าทำแบบนี้อีก ฉันจะเรียกเจ้าของร้านออกมาเลยนะคะ!!"
1008005-88 = "ระ... รู้แล้วน่า รู้แล้ว! ฮึ่ย..."
1008005-89 = "[ns] \"......?\""
1008005-91 = "[ns] \"...โชคุโฮว?\""
1008005-94 = "― [log=쇼쿠호]......ทำไมเหรอ?[/log][wa:10] "
1008005-96 = "― [log=쇼쿠호]มีเรื่องอะไรเกิดขึ้นงั้นเหรอ?[/log][wa:10] "
1008005-99 = "― [log=쇼쿠호]สุดท้ายแล้ว[/log][wa:1490] "
1008005-100 = "― [log=쇼쿠호]ฉันว่าเรื่องนี้ก็น่าจะเกิดขึ้นอยู่แล้วนี่นา[/log][wa:140] "
1008005-103 = "― [log=쇼쿠호]ใช่มั้ยล่ะ?[/log][wa:10] "
1008005-106 = "― [log=쇼쿠호]รีโมตเหรอ? [/log][wa:1360] "
1008005-107 = "― [log=쇼쿠호]......หมายถึงอันนี้น่ะเหรอ?[/log][wa:610] "
1008005-110 = "― [log=쇼쿠호]ถามอะไรไม่ละเอียดอ่อนเอาซะเลยนะ[/log][wa:210] "
1008005-113 = "― [log=쇼쿠호]ถ้าเด็กผู้หญิงไม่อยากจะพูดถึง...[/log][wa:1130] "
1008005-115 = "― [log=쇼쿠호]แล้วยังจะดึงดันถามแบบนี้น่ะ ไม่ได้นะ☆[/log][wa:660] "
1008005-118 = "― [log=쇼쿠호]เข้าใจรึเปล่า? คุณน่ะไม่ได้เห็นอะไรเลย [/log][wa:2620] "
1008005-119 = "― [log=쇼쿠호]แล้วก็ไม่เคยมีเรื่องอะไรเกิดขึ้นตั้งแต่แรกด้วย[/log][wa:10] "
1008005-122 = "― [log=쇼쿠호]......ใช่มั้ย คุณครู?[/log][wa:1230] "
1008005-126 = "(...คุณครูเออออกับโชคุโฮวไปก่อน แล้วก็เริ่มเดินต่อ)"

[translation]
1008005-1 = "Consideration"
1008005-2 = "Shokuhou and I were strolling along the shops."
1008005-8 = "...?"
1008005-14 = "[ns1] \"...Shokuhou?\"\n[ns2] \"Is there something wrong?\""
1008005-17 = "No. Not really."
1008005-18 = "I was simply wondering if girls always gather into cliques no matter where you go."
1008005-19 = "This isn't something I care to admit, but I've always been at the center of such groups..."
1008005-20 = "But now, my situation has changed and I have become an outsider. This may be an opportunity to observe it objectively."
1008005-21 = "I wonder if this is how other people feel when they see me in my own world. That's what I was thinking."
1008005-22 = "Well, never mind. It's not a bad thing for girls to gather together. I rather think it's the natural way of things."
1008005-23 = "Hm...? Do I have many friends back home?"
1008005-27 = "Friends..."
1008005-28 = "I wouldn't call myself friendless by any stretch, but it's perhaps dishonest to say I have a lot of them."
1008005-32 = "I did have one friendship that I valued, but most of my friends have been influenced by my ability."
1008005-33 = "I'm sure that sounds terribly coercive to you."
1008005-34 = "Huh? You didn't take it that way? You think they figured it out and stayed friends with me regardless?"
1008005-35 = "Hmm... Are these true words of kindness, or are you simply flattering me?"
1008005-36 = "Well, it doesn't matter. Either case is easier than arguing."
1008005-37 = "Hm?"
1008005-38 = "You're asking if I want to do that here? Whatever do you mean?"
1008005-39 = "...Mind control?"
1008005-40 = "Is that really the thing to ask someone with abilities such as mine? Rather, shouldn't you be forbidding me from even thinking about it?"
1008005-41 = "It's difficult to concentrate on my abilities here, and they're surely not as strong in this world..."
1008005-42 = "But if I apply myself, my abilities are still mine to control."
1008005-46 = "...How unexpected. You don't seem nervous at all."
1008005-47 = "[s3] \"I know you won't mind control me.\"\n[s4] \"You would have already done it a while ago.\""
1008005-50 = "That's right. If I wanted to control you, I would have done it before we ever got to this conversation."
1008005-51 = "I've no intention to do so, because there's no need for it here."
1008005-52 = "In this world, I am an outsider and a visitor. I have no desire to meddle with the affairs of this place, and I certainly don't want that responsibility."
1008005-53 = "Controlling other people is not as fun as you might think..."
1008005-54 = "In fact, it's something I'd wash my hands of if I could."
1008005-55 = "It's no exaggeration to call it a burden. I certainly wouldn't say I miss it here."
1008005-56 = "To be a person without any sort of ability... Perhaps that's the key to contentment."
1008005-57 = "It's just a thought."
1008005-58 = "Again..."
1008005-64 = "...What's this commotion?"
1008005-65 = "Customer, please... I know you're excited, but there's a line..."
1008005-66 = "C'mon, don't be like that. Can't you just let me go first? You're making a scene."
1008005-67 = "See, people are staring. You can just sneak me in, can't you?"
1008005-68 = "Ah, that may be, but...I have to follow the store's rules..."
1008005-69 = "Rules are meant to be broken. C'mon, be flexible..."
1008005-73 = "[ns5] \"Someone's causing trouble.\"\n[ns6] \"I should say something.\""
1008005-76 = "...Well."
1008005-81 = "[ns7] \"...?\"\n[ns8] \"Huh? What was that...?\""
1008005-84 = "Ugh... I can't take it anymore...!"
1008005-85 = "I told you no! Go to the back of the line, right now! Or else I'll really get angry!"
1008005-86 = "Huh?! Fine, fine... There's no need to yell... Everyone's watching...!"
1008005-87 = "Next time, I'll sic the manager on you!!"
1008005-88 = "Okay, okay! I'm going..."
1008005-89 = "[ns] \"...?\""
1008005-91 = "[ns] \"...Shokuhou?\""
1008005-94 = "― [log=쇼쿠호]...Hmm?[/log][wa:180] "
1008005-96 = "― [log=쇼쿠호]Whatever is the matter?[/log][wa:180] "
1008005-99 = "― [log=쇼쿠호]You knew[/log][wa:1610] "
1008005-100 = "― [log=쇼쿠호]it was going to happen eventually.[/log][wa:500] "
1008005-103 = "― [log=쇼쿠호]Right?[/log][wa:60] "
1008005-106 = "― [log=쇼쿠호]My remote control? [/log][wa:1040] "
1008005-107 = "― [log=쇼쿠호]...Do you really want to know?[/log][wa:490] "
1008005-110 = "― [log=쇼쿠호]Such an indelicate thing to ask![/log][wa:170] "
1008005-113 = "― [log=쇼쿠호]There are some questions[/log][wa:1450] "
1008005-115 = "― [log=쇼쿠호]that you simply can't ask a lady. ☆[/log][wa:740] "
1008005-118 = "― [log=쇼쿠호]Understood? You did not see anything. [/log][wa:2660] "
1008005-119 = "― [log=쇼쿠호]Nothing happened in the first place.[/log][wa:350] "
1008005-122 = "― [log=쇼쿠호]...Isn't that right, Sensei?[/log][wa:950] "
1008005-126 = "I simply said yes and we continued on our way."

1008005-64 = "3;쇼쿠호;04;……무슨 소리지?\n#3;em;[?]"
1008005-65 = "#na;아르바이트 학생;소, 손님. 곤란합니다…… 아무리 그러셔도, 가게 축전은 순서가……."
1008005-66 = "#na;진상 손님;아, 왜 그래. 진짜. 그냥 하나 슬쩍 주면 되잖아? 사람 무안하게."
1008005-67 = "#na;진상 손님;이러는 사이에 사람들 몰려서 더 북적거리게 된다고. 피차 편하게 가자, 편하게. 응?"
1008005-68 = "#na;아르바이트 학생;아, 아무리 그러셔도……. 저희 가게도 나름대로의 규정이……."
1008005-69 = "#na;진상 손님;에이~. 그러지 말고, 좀. 여기선 적당히 융통성을 발휘해서……."

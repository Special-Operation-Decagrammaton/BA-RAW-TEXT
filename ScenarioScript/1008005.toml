1008005-14 = "[ns1] \"……쇼쿠호?\"\n[ns2] \"뭔가 신경 쓰이는 거라도 있어?\""
1008005-15 = "#wait;100"
1008005-16 = "#wait;100"
1008005-17 = "3;쇼쿠호;99;아니. 그런 건 아니고.\n#3;greeting"
1008005-18 = "3;쇼쿠호;01;또래의 여자아이들이라는 건, 어딜 가나 저렇게 다 모여 다니는 법인가-싶어서."
1008005-19 = "3;쇼쿠호;99;내 입으로 이런 말 하기도 뭐하지만, 나부터가 항상 저런 곳의 중심에 있었다 보니……."
1008005-20 = "3;쇼쿠호;01;오히려 상황이 바뀌어 살짝 방관자가 된 지금이, 객관적으로 관찰할 수 있달까.\n#3;jump"
1008005-21 = "3;쇼쿠호;09;다른 사람들이 보던 내 모습도 저런 느낌이었을까- 하는. 그런 생각 중이었거든."
1008005-22 = "3;쇼쿠호;99;그야, 뭐. 당연히 나쁘다는 건 아니고. 오히려 자연스러운 거라고 생각하지만서도.\n#3;greeting\n#3;em;[반짝]"
1008005-23 = "3;쇼쿠호;02;……응? 친구들이 많았냐고?"
1008005-24 = "#st;[0,0];instant;1;"
1008005-25 = "#clearST"
1008005-26 = "3;쇼쿠호;99\n#3;em;…\n#wait;2500"
1008005-27 = "3;쇼쿠호;04;……친구……라.\n#3;em;…"
1008005-28 = "3;쇼쿠호;04;없다고는 하지 않겠지만, '많다'라고 표현하기에는 조금 애매한 것 같기도 하네.\n#3;em;[땀]\n#3;stiff"
1008005-29 = "#st;[0,0];instant;1;"
1008005-30 = "#clearST"
1008005-31 = "3;쇼쿠호;99\n#3;em;…\n#wait;2500"
1008005-32 = "3;쇼쿠호;05;나라고 소중하게 여기는 인연이 없을 리야 없었겠지만, 대부분은 능력으로 조종하는 경우가 많았고 말이지.\n#3;em;[속상함]"
1008005-33 = "3;쇼쿠호;04;물론 능력을 쓴다고 해서 전부 선생님이 생각하는 것처럼 강압적이었던 것도 아니긴 하지만……."
1008005-34 = "3;쇼쿠호;02;응? 딱히 그런 식으로 생각하진 않았다고? 어련히 알아서 잘 대해 줬을 거라고?\n#3;em;[?]"
1008005-35 = "3;쇼쿠호;99;흐응-. ……이건 배려심 있는 쪽의 말일까, 아니면 그냥 입 발린 칭찬일까?\n#3;greeting"
1008005-36 = "3;쇼쿠호;01;뭐, 상관없지. 따지고 들어오는 것보다야 편하고.\n#3;jump"
1008005-37 = "3;쇼쿠호;02;……응?"
1008005-38 = "3;쇼쿠호;02;여기서는 그렇게 할 생각이 없냐고? 그건 어떤 쪽의 이야기?"
1008005-39 = "3;쇼쿠호;05;……심리장악?\n#3;em;[?]"
1008005-40 = "3;쇼쿠호;04;그걸 다른 사람도 아닌 선생님이 물어보는 거야? 오히려 말리거나 생각도 못 하게 해야 할 입장 아닐까?"
1008005-41 = "3;쇼쿠호;99;아무리 지금 이래저래 집중하기 어렵고, 확실히 능력도 어딘가 조금 약해진 느낌이지만……."
1008005-42 = "3;쇼쿠호;09;마음먹고 하려고만 하면, 아예 못 할 건 아닌데."
1008005-43 = "#st;[0,0];instant;1;"
1008005-44 = "#clearST"
1008005-45 = "3;쇼쿠호;09\n#3;em;…\n#wait;2500"
1008005-46 = "3;쇼쿠호;04;……의외인걸. 별로 긴장하지도 않네.\n#3;em;[땀]"
1008005-47 = "[s3] \"그야 그러진 않을 거라고 생각하니까.\"\n[s4] \"그럴 생각이었으면 진작 했겠지.\""
1008005-48 = "#wait;100"
1008005-49 = "#wait;100"
1008005-50 = "3;쇼쿠호;99;……정답, 이려나. 선생님 말대로 할 거면 제일 먼저 선생님부터 했을 테니까."
1008005-51 = "3;쇼쿠호;01;할 생각이 없다, 아니 할 필요가 없다. 그렇게 말할 수 있겠네."
1008005-52 = "3;쇼쿠호;09;여기서의 나는 어디까지나 외지인이자 방문객. 이곳의 일에 대해 간섭할 이유도 없고, 동시에 책임질 필요도 없지.\n#3;em;[재잘]"
1008005-53 = "3;쇼쿠호;99;다른 사람을 조종한다는 건 생각처럼 마냥 즐겁기만 한 일도 아니라서……."
1008005-54 = "3;쇼쿠호;01;하지 않아도 된다면 굳이 하고 싶은 일도 아니거든. 사실은."
1008005-55 = "3;쇼쿠호;03;그런 의미에서는, 확실히 그러네. 오히려 지금이 속 편한 부분도 없다고는 하지 않을지도?\n#3;jump"
1008005-56 = "3;쇼쿠호;09;아예 아무 능력이 없는 사람이라면……. 이런 식으로 만족하며 지낼 수 있는 걸까."
1008005-57 = "3;쇼쿠호;99;아주 약간이지만 그런 생각도 들고 말이지."
1008005-58 = "3;쇼쿠호;09;또…….\n#3;em;…"

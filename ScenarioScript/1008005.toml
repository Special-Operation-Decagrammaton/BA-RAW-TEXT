[translation]
1008005-1 = "為人著想"
1008005-2 = "（某天，和食蜂在商店街裡閒晃）"
1008005-8 = "…………"
1008005-14 = "[ns1]「……食蜂？」\n[ns2]「覺得哪裡不對勁嗎？」"
1008005-17 = "不，倒也不是。"
1008005-18 = "只是在想原來不管在哪裡，跟我同年齡的女孩子們都喜歡像那樣聚在一起啊～而已。"
1008005-19 = "雖然這種話由我自己講出來有點奇怪，不過我本來一直是那種小團體的核心人物……"
1008005-20 = "現在狀況有所改變，變成旁觀者之後，似乎能更客觀地觀察他們。"
1008005-21 = "所以才在思考──在別人眼中，我看起來是否也和他們一樣呢。"
1008005-22 = "不過我的意思也不是指這樣不好。#n我認為那是很自然的現象。"
1008005-23 = "……我的朋友是不是很多？"
1008005-27 = "……朋友……是嗎？"
1008005-28 = "雖然不能說沒有，但要說「多」的話似乎也不至於。"
1008005-32 = "我當然也有重視的人。不過大多數的時候，都是藉由能力操控而來的。"
1008005-33 = "當然，我所謂的操控並非都像老師想的那樣，是透過強迫的方式進行……"
1008005-34 = "……你說你沒有那樣想？#n我做事有自己的分寸，所以不會隨便欺負別人？"
1008005-35 = "嗯……老師這麼說究竟是為了安慰我，還是只是隨口的稱讚呢？"
1008005-36 = "算了，無所謂，我也不想為這種事感到糾結。"
1008005-37 = "……嗯？"
1008005-38 = "你問我都不會想在這裡試試看嗎？你指的是……？"
1008005-39 = "……[ruby=Mental Out]心理掌握[/ruby]？"
1008005-40 = "其他人姑且不論，老師為什麼會這麼問呢？#n身為老師不是應該阻止或讓我打消這種念頭嗎？"
1008005-41 = "雖然我現在確實處於難以集中精神、能力有所減弱的狀況……"
1008005-42 = "但只要我有心，並不是完全辦不到哦。"
1008005-46 = "……真奇怪，為什麼老師看起來一點也不緊張呢？"
1008005-47 = "[s3]「因為我不認為你會那麼做。」\n[s4]「假如你真的有那個意思，應該早就付諸行動了。」"
1008005-50 = "……或許，就像你說的一樣。#n如果我想的話，肯定會先從老師下手吧。"
1008005-51 = "不過我卻沒有那個打算……不，或者該說沒有那麼做的必要……"
1008005-52 = "身處此處的我，終究只是一名訪客、局外人──#n既沒有干涉這個世界的理由，也沒有這麼做的責任。"
1008005-53 = "更何況，控制他人這件事也不像想像中那麼有趣……"
1008005-54 = "其實這並不是件明明沒必要卻會讓人想做的事。"
1008005-55 = "從這個角度來看，老師那麼說也沒錯。#n我不否認心裡確實感到比較輕鬆。"
1008005-56 = "如果我是一個沒有特殊能力的人……會不會滿足於這樣的生活，就這麼活下去呢？"
1008005-57 = "我有時候也會浮現這樣的想法。"
1008005-58 = "而且……"
1008005-64 = "……發生什麼事了？"
1008005-65 = "這，這位客人，您這樣我們會很困擾的……#n不管您需要什麼都麻煩您排隊……"
1008005-66 = "啊，幹嘛這樣啊，真是的。你們就通融一下，拿一個給我不就好了？#n何必搞得不愉快呢？"
1008005-67 = "在你跟我說這些的時候，又有更多人擠過來了。#n還是給彼此一個方便吧，好嗎？"
1008005-68 = "就，就算您這麼說……我們店裡有我們的規矩……"
1008005-69 = "真是的～別這樣嘛～就稍微通融一下……"
1008005-73 = "[ns5]「……店員似乎很困擾呢。」\n[ns6]「我得去說句話才行。」"
1008005-76 = "…………唉。"
1008005-81 = "[ns7]「……？」\n[ns8]「嗯？剛才的聲音是……？」"
1008005-84 = "唔……我實在忍不住了……！"
1008005-85 = "我不是說過好幾次不行了嗎！！#n請趕快去後面排隊！不然我真的要生氣了！！"
1008005-86 = "呃，啊！？知，知道了啦……幹嘛那麼大聲……大家都在看耶……！"
1008005-87 = "要是下次再來搗亂的話，我就直接請店長出來招待了哦！！"
1008005-88 = "知，知道了，我知道了啦！真是……"
1008005-89 = "[ns] 「…………？」"
1008005-91 = "[ns]「……食蜂？」"
1008005-94 = "― [log=쇼쿠호]……怎麼了？[/log][wa:220] "
1008005-96 = "― [log=쇼쿠호]發生什麼事了嗎？[/log][wa:780] "
1008005-99 = "― [log=쇼쿠호]無論如何，[/log][wa:1730] "
1008005-100 = "― [log=쇼쿠호]我認為事情遲早都會變成這樣的哦？[/log][wa:1220] "
1008005-103 = "― [log=쇼쿠호]沒錯吧？[/log][wa:140] "
1008005-106 = "― [log=쇼쿠호]……遙控器？ [/log][wa:1520] "
1008005-107 = "― [log=쇼쿠호]……你想問那個？[/log][wa:1370] "
1008005-110 = "― [log=쇼쿠호]是不是有點不夠體貼呢？[/log][wa:1010] "
1008005-113 = "― [log=쇼쿠호]如果女孩子不想開口的話……[/log][wa:1890] "
1008005-115 = "― [log=쇼쿠호]強迫人家回答可不行哦☆[/log][wa:1700] "
1008005-118 = "― [log=쇼쿠호]明白了嗎？所以你什麼也沒看到， [/log][wa:3540] "
1008005-119 = "― [log=쇼쿠호]說到底，剛才什麼事也沒發生。[/log][wa:1230] "
1008005-122 = "― [log=쇼쿠호]……你說對吧，老師？[/log][wa:1670] "
1008005-126 = "（……勉為其難地接受了食蜂的說法後，繼續前往了目的地）"

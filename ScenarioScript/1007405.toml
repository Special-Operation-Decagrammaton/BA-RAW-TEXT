1007405-63 = "3;하나코 수영복;99;……후후. 후후후…….\n#3;stiff"
1007405-64 = "3;하나코 수영복;03;후후후후후……."
1007405-65 = "3;하나코 수영복;01;그렇지만, 네. 말씀대로일지도 모르겠어요. 저란 아이는……. 왜 여기까지 와서도 말을 어물쩡거리는 건지."
1007405-66 = "3;하나코 수영복;99;……음."

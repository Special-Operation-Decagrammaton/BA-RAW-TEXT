1007405-4 = "#na;(조금씩 해가 넘어가고 있던 저녁 바닷가.)"
1007405-5 = "#st;[0,0];instant;1;"
1007405-6 = "#clearST"
1007405-7 = "#wait;2000"
1007405-8 = "#na;(지는 해를 보며 시간을 보내고 있던 도중, 뒤로부터 누군가의 발소리가 들려왔다.)"
1007405-9 = "[ns1] \"하나코구나.\"\n[ns2] \"정말 찾아왔네.\""
1007405-10 = "#wait;100"
1007405-11 = "#wait;100"
1007405-12 = "#na;하나코 수영복;정말 이런 곳에 계셨네요. 설마 했는데……."
1007405-13 = "#na;하나코 수영복;……영차."
1007405-14 = "[ns3] \"옆에 앉았다?\"\n[ns4] \"굉장히 자연스럽네.\""
1007405-15 = "#wait;100"
1007405-16 = "#wait;100"
1007405-17 = "3;하나코 수영복;08;이제 와서 그런 말씀 하시는 거예요? 저희 사이에……? 조금 상처 입었을지도…….\n#3;a"
1007405-18 = "#st;[0,0];instant;1;"
1007405-19 = "#clearST"
1007405-20 = "3;하나코 수영복;08\n#3;em;…\n#wait;2500"
1007405-21 = "3;하나코 수영복;07;……농담이에요. 후후."
1007405-22 = "3;하나코 수영복;01;하지만 저도 선생님의 소중한 학생 중 하나라고 믿으니까……. 봐주실 수 있죠?"
1007405-23 = "3;하나코 수영복;99;이 정도는 소중한 학생의 어리광……이라고 하면 괜찮겠죠?"
1007405-24 = "3;하나코 수영복;02;선생님으로서는 거절하지 않으실 부탁 방법이라고 생각하는데요. 방금의 멘트.\n#3;em;[음표]"
1007405-25 = "#st;[0,0];instant;1;"
1007405-26 = "#clearST"
1007405-27 = "#wait;2500"
1007405-28 = "3;하나코 수영복;03;후후……."
1007405-29 = "3;하나코 수영복;01;……역시 정답이었군요."
1007405-30 = "3;하나코 수영복;99;그나저나 이렇게 좋은 자리를 혼자서만 차지하고 계시고…….\n#3;em;…"
1007405-31 = "#st;[0,0];instant;1;"
1007405-32 = "#clearST"
1007405-33 = "#wait;3500"
1007405-34 = "3;하나코 수영복;99;예쁜 경치네요. 바다의 색도, 하늘 색도. 똑같이 금빛으로 물들어 있고……."
1007405-35 = "3;하나코 수영복;07;이것도 지금 이런 타이밍이 아니면 볼 수 없는 색이었겠죠."
1007405-36 = "3;하나코 수영복;01;같이 온 분들도 하나 같이 마음에 드는 분들뿐이고, 운이 좋네요. 이번 탐사는.\n#3;em;[음표]"
1007405-37 = "3;하나코 수영복;02;……네? 제가 마련한 자리 아니냐고요?"
1007405-38 = "3;하나코 수영복;04;그러기야 하지만……. 그런다고 그게 늘 지금처럼 잘 됐던 건 아니니까요.\n#3;em;[땀]"
1007405-39 = "3;하나코 수영복;07;결과가 무사히 나왔다는 건, 그 자체만으로도 '행운'이라 부르기 충분하다고 생각해요."
1007405-40 = "3;하나코 수영복;99;물론 그것도 전부……. 선생님이 계셨기 때문이지만…….\n#3;em;…"
1007405-41 = "3;하나코 수영복;99;…………."
1007405-42 = "3;하나코 수영복;04;……음……."
1007405-43 = "3;하나코 수영복;04;으음……. 그…….\n#3;stiff"
1007405-44 = "3;하나코 수영복;06;……선생님?\n#3;em;[///]"
1007405-45 = "[s5] \"응. 뭔가 할 말이 있는 거지?\"\n[s6] \"하나코답지 않게 쑥스럼을 타고 있네.\""
1007405-46 = "#wait;100"
1007405-47 = "#wait;100"
1007405-48 = "3;하나코 수영복;04;으, 으응……? 그래 보이나요? 물론 그렇게 물어보시면 그렇다고도 할 수 있긴 하지만…….\n#3;em;[땀]"
1007405-49 = "3;하나코 수영복;09;……후후."
1007405-50 = "3;하나코 수영복;05;그래도 지금 말씀은 조금 에티켓이 부족했던 게 아닐까요? 그렇게 직접적으로 물어보시면, 부끄러워서 말 못 할 학생들도 있을 거라고요?\n#3;em;[반응]"
1007405-51 = "[s7] \"그렇지만 하나코는 아니잖아.\"\n[s8] \"맞춰서 대하는 거니까, 걱정하지 마.\""
1007405-52 = "#wait;100"
1007405-53 = "#wait;100"
1007405-54 = "3;하나코 수영복;06;흐응……. 과연……."
1007405-55 = "3;하나코 수영복;99;그렇군요. 그렇게 말씀하시는 거군요."
1007405-56 = "3;하나코 수영복;08;오히려 이렇게까지 가까워지니, 확실히 제가 손해 보는 부분도 생기나 보네요. 조금 꿍해지는걸요."
1007405-57 = "[s9] \"여기선 그래도 된다고 했거든. 어떤 소중한 학생이.\"\n[s10] \"그렇지만 이제 곧 마음이 편해지려는 거잖아?\""
1007405-58 = "3;하나코 수영복;06;끄응……. 완전히 휘둘리고 있는 기분인걸요. 이런 건 또 오랜만이라…….\n#3;em;[속상함]"
1007405-59 = "3;하나코 수영복;06;또 그렇게 다 알고 계신다는 것처럼…….\n#3;em;[속상함]"
1007405-60 = "#st;[0,0];instant;1;"
1007405-61 = "#clearST"

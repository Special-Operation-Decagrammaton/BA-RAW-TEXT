1007405-68 = "3;하나코 수영복;06;……으으으으으음…………."
1007405-69 = "[ns] 말없이 기다려 준다."
1007405-70 = "3;하나코 수영복;06\n#3;stiff\n#wait;2500"
1007405-71 = "3;하나코 수영복;05;……선생님.\n#3;em;[반응]"
1007405-72 = "3;하나코 수영복;06;…………."
1007405-73 = "3;하나코 수영복;01;……감사합니다."
1007405-74 = "3;하나코 수영복;99;……이번 일도 그렇고, 지금까지의 일들도 그렇고. 하나부터 열까지 전부.\n#3;em;…"
1007405-75 = "3;하나코 수영복;01;선생님이 없으셨다면……. 지금 같은 즐거움은 꿈도 꾸지 못했을 거예요."
1007405-76 = "3;하나코 수영복;07;알고 계시겠지만 저……. 옆에서 치켜세워 주는 것과는 달리, 사실 꽤 서투른 사람이거든요."
1007405-77 = "3;하나코 수영복;04;사실 지금 이렇게 말씀드리는 것도, 제가 저 편하자고 하는 말인 걸 알고 계시잖아요?\n#3;em;[땀]"
1007405-78 = "3;하나코 수영복;01;다른 형태로는 몇 번이나 티를 냈었고, 선생님께서 그걸 모르실 리는 없으니까요."
1007405-79 = "3;하나코 수영복;02;굳이 이렇게 말로 감사하다고 표현하는 건, 결국……. 말했다는 걸 스스로 확인하고 싶은 것뿐."
1007405-80 = "3;하나코 수영복;99;…………."
1007405-81 = "3;하나코 수영복;01;그래도 말할 수 있어서 다행이에요. 전달했다는 걸 확인해서 정말로 다행이에요.\n#3;em;[음표]"
1007405-82 = "3;하나코 수영복;99;생각해 보면 생각해 볼수록……."
1007405-83 = "3;하나코 수영복;03;여기에 오길, 정말로 잘했어요."
1007405-84 = "3;하나코 수영복;01;마지막까지 선생님께 이런 식으로 일방적 통보를 보내는 건 죄송하지만…….\n#3;em;…"
1007405-85 = "3;하나코 수영복;02;……선생님께서는 어떠셨나요? 조금이라도……. 여기에 온 거, 즐거우셨을까요?"
1007405-86 = "[s11] \"물론이지. 정말 즐거워.\"\n[s12] \"하나코가 그렇게 말해줘서 정말 기뻐.\""

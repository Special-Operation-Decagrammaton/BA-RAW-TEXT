[translation]
1007405-1 = "ภาพลักษณ์โก๊ะกังที่คาดไม่ถึง"
1007405-4 = "(คุณครูนั่งอยู่ริมชายหาด และมองพระอาทิตย์ค่อยๆ ลาลับขอบฟ้าไปทีละนิด...)"
1007405-8 = "(ระหว่างที่คุณครูกำลังดูพระอาทิตย์ลับขอบฟ้าไป จู่ๆ ก็ได้ยินเสียงฝีเท้าของใครบางคนจากทาง#nด้านหลัง)"
1007405-9 = "[ns1] \"ฮานาโกะนี่เอง\"\n[ns2] \"มาจริงๆ ด้วยสินะ\""
1007405-12 = "อยู่ที่แบบนี้จริงๆ ด้วยนะคะ คิดแล้วเชียว..."
1007405-13 = "...ฮึบ"
1007405-14 = "[ns3] \"นั่งข้างๆ ครูเลยเหรอเนี่ย?\"\n[ns4] \"เนียนมานั่งข้างๆ เลยนะ...\""
1007405-17 = "มาพูดแบบนี้ตอนนี้มันไม่เกินไปหน่อยเหรอคะ? เราใกล้ชิดกันขนาดนี้แล้วแท้ๆ ได้ยินแบบนี้ฉันเสียใจนะ..."
1007405-21 = "...ฉันล้อเล่นค่ะ ฮุฮุ"
1007405-22 = "ฉันเชื่อว่าตัวเองก็เป็นหนึ่งในนักเรียนคนสำคัญของคุณครู... เพราะงั้นคงจะยอมตามใจฉันใช่มั้ยคะ?"
1007405-23 = "ถ้าบอกว่าเป็นความเอาแต่ใจของนักเรียนคนสำคัญละก็... คงไม่เป็นไรใช่มั้ยคะ?"
1007405-24 = "ฉันพูดแบบนี้แล้ว คุณครูคงไม่ใจร้ายปฏิเสธหรอกใช่มั้ยล่ะคะ"
1007405-28 = "ฮิฮิ..."
1007405-29 = "...คิดถูกจริงๆ ด้วยสินะคะ"
1007405-30 = "ยังไงก็เถอะค่ะ ไม่อยากเชื่อเลยว่าคุณครูจะเก็บสถานที่ที่ยอดเยี่ยมแบบนี้เอาไว้คนเดียว..."
1007405-34 = "ดูจากตรงนี้วิวสวยมากเลยนะคะ ทั้งสีของน้ำทะเล และสีของท้องฟ้าก็เป็นประกายสีทองเหมือนกันเลย..."
1007405-35 = "ถ้าไม่ใช่ช่วงเวลานี้ละก็ คงไม่มีทางได้เห็นวิวที่งดงามแบบนี้แน่ๆ เลยค่ะ"
1007405-36 = "ฉันโชคดีจริงๆ ที่ได้ร่วมเดินทางมาในครั้งนี้ รู้สึกเหมือนว่าได้สนิทกับทุกคนขึ้นเยอะเลยด้วยค่ะ"
1007405-37 = "...คะ? ฉันเป็นคนที่จัดเตรียมทุกอย่างเอง... งั้นเหรอคะ?"
1007405-38 = "เรื่องนั้นก็จริงค่ะ แต่ทริปแบบนี้น่ะ มันไม่ได้ผ่านไปด้วยดีเสมอไปหรอกค่ะ"
1007405-39 = "ดูจากผลลัพธ์แล้ว... ฉันคิดว่าคราวนี้โชคดีพอสมควรเลยค่ะ"
1007405-40 = "แน่นอนว่าทุกอย่างก็เป็นเพราะ... มีคุณครูอยู่ด้วย..."
1007405-41 = "......"
1007405-42 = "...อืม..."
1007405-43 = "อืมมม... คือว่า......"
1007405-44 = "คุณครูคะ..."
1007405-45 = "[s5] \"อื้อ มีอะไรอยากจะพูดหรือเปล่า?\"\n[s6] \"ดูกังวลที่จะพูดแบบนี้ ไม่สมกับเป็นฮานาโกะเลยนะ\""
1007405-48 = "หะ...หืม...? อย่างนั้นเหรอคะ? ไม่คิดว่าคุณครูจะดูออกได้ง่ายขนาดนี้ แต่คุณครูคงดูออกง่ายๆ เลย#nสินะคะ"
1007405-49 = "...ฮุฮุ"
1007405-50 = "แต่ถึงยังไงที่พูดเมื่อกี้ มันดูขวานผ่าซากไปหน่อยหรือเปล่าคะ? ถามตรงๆ แบบนั้น อาจมีนักเรียนที่เขิน#nจนพูดไม่ออกเลยก็ได้นะคะ"
1007405-51 = "[s7] \"แต่ฮานาโกะไม่ใช่คนประเภทนั้นนี่นา\"\n[s8] \"ครูปรับวิธีถามให้เข้ากับนิสัยนักเรียนคนที่ถามตลอดนะ\""
1007405-54 = "หืม... อย่างนั้นเหรอคะ..."
1007405-55 = "อย่างนี้นี่เองสินะคะ คุณครูคิดอย่างนั้นสินะคะ"
1007405-56 = "คิดไม่ถึงเลยนะคะ ว่าพอใกล้ชิดกับคุณครูมากขึ้นแบบนี้แล้ว จะทำให้ฉันกลายเป็นฝ่ายที่เสียเปรียบ#nซะเอง..."
1007405-57 = "[s9] \"นักเรียนคนสำคัญของครูบอกว่าให้พูดตรงๆ ตอนอยู่ที่นี่ได้น่ะ\"\n[s10] \"ตอนนี้ก็สบายใจขึ้นแล้วใช่มั้ยล่ะ?\""
1007405-58 = "อืมมม... รู้สึกเหมือนถูกโน้มน้าวได้อย่างสมบูรณ์แบบเลยนะคะ ไม่ได้รู้สึกแบบนี้มานานแล้วเลย..."
1007405-59 = "รู้สึกเหมือนกับว่าคุณครูเดาทางฉันได้ทุกอย่างเลย..."
1007405-63 = "...ฮุฮุ ฮุฮุฮุ..."
1007405-64 = "ฮุฮุฮุๆๆ..."
1007405-65 = "แต่ว่า... ก็อาจเป็นไปอย่างที่คุณครูพูดมาก็ได้นะคะ ฉันเองก็ไม่เข้าใจเหมือนกันว่าทำไมตัวเอง#nยังพูดอะไรคลุมเครืออยู่อีก"
1007405-66 = "...อืม"
1007405-67 = "อืมมม..."
1007405-68 = "...อืมมมม..."
1007405-69 = "[ns] รอเงียบๆ ไม่พูดอะไร"
1007405-71 = "...คุณครู"
1007405-72 = "......"
1007405-73 = "...ขอบคุณนะคะ"
1007405-74 = "...ทั้งเรื่องในคราวนี้ และเรื่องทุกอย่างที่ผ่านมาด้วย..."
1007405-75 = "ถ้าไม่มีคุณครูอยู่ด้วยละก็... ฉันคงไม่กล้าฝันถึงช่วงเวลาที่ได้สนุกสนานกับทุกๆ คนแบบนี้เลยค่ะ"
1007405-76 = "ฉันไม่ค่อยชอบพูดถึงเรื่องนี้สักเท่าไหร่ แต่ที่จริงแล้ว ฉันเป็นคนที่เงอะงะงุ่มง่ามสุดๆ ต่างจากที่คนอื่นๆ ชื่นชมค่ะ"
1007405-77 = "อันที่จริง การอธิบายเรื่องนี้กับคุณครูในตอนนี้... ก็เป็นเพราะฉันพยายามทำให้ตัวเองมั่นใจและสบายใจ#nขึ้นน่ะค่ะ"
1007405-78 = "ฉันเคยพยายามบอกให้รู้ด้วยวิธีอื่นมาหลายครั้งแล้ว แต่ดูเหมือนคุณครูจะไม่สังเกตเลย..."
1007405-79 = "การที่ฉันแสดงคำขอบคุณออกมาเป็นคำพูดแบบนี้ สุดท้ายแล้ว... ฉันก็แค่ทำเพื่อยืนยันความรู้สึก#nของตัวเอง"
1007405-80 = "......"
1007405-81 = "ถึงอย่างนั้นฉันก็ดีใจที่พูดออกไป แล้วก็ดีใจมากๆ ที่ได้บอกความรู้สึกออกไปอย่างชัดเจนค่ะ"
1007405-82 = "ไม่ว่าจะคิดยังไง..."
1007405-83 = "การได้มาที่นี่... มันดีจริงๆ เลยค่ะ"
1007405-84 = "ฉันขอโทษที่เอาแต่พูดอยู่ฝ่ายเดียวแบบนี้ แต่ว่า..."
1007405-85 = "...คุณครูรู้สึกยังไงบ้างคะ? รู้สึกสนุกกับการมาที่นี่บ้างหรือเปล่าคะ?"
1007405-86 = "[s11] \"แหงอยู่แล้ว ครูสนุกมากเลยนะ\"\n[s12] \"ครูดีใจที่ฮานาโกะพูดความรู้สึกออกมาตรงๆ นะ\""
1007405-89 = "...ฮุฮุ ค่อยโล่งอกไปทีค่ะ"
1007405-90 = "คุณครูคะ ถ้างั้น..."
1007405-96 = "...จากนี้ไปก็ขอรบกวนด้วยนะคะ"

1011103-14 = "3;네루 교복;24;지금의 나는 C&C의 부장도 아니고, 옆에 눈여겨봐야 할 부원들도 없단 말씀."
1011103-15 = "3;네루 교복;22;완전 평범한 학생 A잖아?"

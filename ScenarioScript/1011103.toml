[translation]
1011103-1 = "悠閒的休假日"
1011103-4 = "哦，你來得真早啊，老師。#n約好的時間還沒到哦。"
1011103-5 = "嗯？你說我也很早到？"
1011103-6 = "哈哈哈！因為這幾天穿著制服，我覺得還挺有趣的。"
1011103-7 = "所以就打算多多享受不穿絲卡將的日子～！"
1011103-8 = "才會這樣不自覺地著急了起來。"
1011103-9 = "[s]「所以你才說今天想要度過特別的一天啊……」"
1011103-11 = "[ns]「不過怎麼這麼突然？」"
1011103-12 = "就知道你會這麼問。"
1011103-13 = "你想想，我現在不是穿著一身制服嗎？"
1011103-14 = "現在的我既不是C&C的部長，旁邊也沒有必須好好盯著的成員。"
1011103-15 = "完全是個普通的學生A吧？"
1011103-16 = "只有在這種日子裡，我才能度過忠於自己的一天不是嗎？"
1011103-17 = "平常雖然有興趣，但是因為立場關係而不能做的事情也不少。"
1011103-18 = "……嗯？老師為什麼要那樣看我？"
1011103-19 = "[s1]「原來你是那麼想的啊。」\n[s2]「原來寧瑠想得這麼深遠啊。」"
1011103-20 = "啊？那不是理所當然的嗎？"
1011103-21 = "就，就算你突然這麼說也不會有好處拿的哦，老師！"
1011103-22 = "總之，我要趁這個機會！"
1011103-23 = "好好嘗試只有現在的我才能做的事！#n這就是我的結論。"
1011103-24 = "而且我覺得，要是這種日子能跟老師一起度過應該會很有趣。"
1011103-25 = "怎麼樣？很酷吧？#n我們快走吧！"
1011103-31 = "歡迎光臨「漢堡后」千年分店～！"
1011103-33 = "[ns]「這裡是……速食餐廳？」"
1011103-34 = "啊，是啊。"
1011103-35 = "我平常經常跟成員一起來。#n這裡的東西很好吃哦。"
1011103-36 = "[s]「可是這樣不就跟平常一樣了嗎？」"
1011103-37 = "不不不，今天要點的東西可不一樣。"
1011103-38 = "來，開始點餐吧。老師你先。"
1011103-39 = "[s]「我要起司漢堡套餐。」"
1011103-40 = "那我要……"
1011103-41 = "兒童餐B！"
1011103-42 = "[s]「兒童……餐？」"
1011103-43 = "怎麼了？我不是說過了嗎！#n今天我要過得隨心所欲！"
1011103-44 = "好了！快點點餐！"
1011103-46 = "來，這邊是老師點的起司漢堡套餐。"
1011103-47 = "我的兒童餐是這個。"
1011103-48 = "[s]「你想做的事就是點兒童餐嗎？」"
1011103-49 = "如果在跟其他人一起來的時候點這個，#n他們肯定會說我像個小孩子，或者很可愛之類的話。"
1011103-50 = "而且如果C&C的部長在吃兒童餐這件事，被其他人知道了怎麼辦？"
1011103-51 = "雖然我不在意別人說了什麼，但還是要顧一下形象吧。"
1011103-52 = "[s]「……所以你才一直在等機會到來？」"
1011103-53 = "大致上就是這樣。"
1011103-54 = "而且你仔細看，這可不是普通的兒童餐。"
1011103-55 = "這份套餐還送了這個！"
1011103-61 = "[ns]「……機器人玩具？」"
1011103-62 = "這不只是單純的玩具哦。#n我之所以想要它是有原因的！"
1011103-63 = "只要把這邊的關節像這樣旋轉然後插到這裡，機器人……"
1011103-68 = "就會變身。"
1011103-69 = "[ns]「……！」"
1011103-70 = "怎麼樣，很帥吧？#n老師的眼睛都看到發亮了呢？"
1011103-71 = "哈哈哈！但是這個不能給你。#n畢竟點兒童餐的人是我，所以這是我的玩具！"
1011103-72 = "老師想要的話，就去另外點一份吧。"
1011103-78 = "啊～好飽。我們去下個地方吧！"
1011103-79 = "沿著這條路一直走就會看到公園，我們去那邊走走吧。"
1011103-80 = "今天天氣也挺好的。"
1011103-81 = "啊？那種事不是隨時都能做？"
1011103-82 = "哈哈！跟平常還是有點不一樣的。到了之後我再跟你解釋。"
1011103-84 = "嗯，今天也空蕩蕩的，感覺不錯。"
1011103-85 = "往這邊走有條步道，對面有一座小池塘。"
1011103-86 = "雖然我沒去過就是了。"
1011103-87 = "[s]「不過你對這裡很了解耶？」"
1011103-88 = "啊啊，因為這個公園離C&C的部室很近。"
1011103-89 = "又因為動線重疊的關係，在出動或歸隊的時候都會經過這個地方。"
1011103-90 = "不過也都只是經過而已，從來沒有悠哉地逛過。"
1011103-91 = "每次路過都覺得這裡布置得很好，#n所以總想著哪天要在這裡悠哉地散步……可惜一直沒有機會。"
1011103-92 = "如果今天這種時候不嘗試的話，還有什麼時候能嘗試呢？"
1011103-93 = "老師，你會陪我的吧？"
1011103-94 = "[s]「當然。」"
1011103-95 = "好！老師應該也累了，我們一起去療癒心靈吧！"
1011103-97 = "哎呀～心情真好！#n我都不知道這個公園原來這麼大呢！"
1011103-101 = "啊？老師，你看這個池塘裡的魚！"
1011103-102 = "超大隻的耶！？#n哈哈哈！是吃什麼才能長得這麼大啊？"
1011103-103 = "[s]「靠在欄杆上很危險哦，寧瑠。」"
1011103-104 = "沒事沒事！"
1011103-105 = "稍微靠一下不會有問題的！"
1011103-106 = "沒那麼脆──"
1011103-110 = "唔啊！？"
1011103-115 = "[ns]「抓，抓住了……！」"
1011103-119 = "嚇，嚇我一跳……"
1011103-120 = "[s]「所以我才說要小心。」"
1011103-121 = "我，我沒想到欄杆真的會晃嘛！"
1011103-122 = "……"
1011103-123 = "不過老師，你打算抓著我的手到什麼時候？"
1011103-124 = "雖然我是無所謂啦……"
1011103-125 = "[s]「啊，抱歉！」"
1011103-126 = "……"
1011103-127 = "老，老師你也真是的！總是愛擔心！"
1011103-128 = "雖然確實嚇了一跳沒錯，但我怎麼可能會掉下去呢！？"
1011103-129 = "不過，還是謝謝你抓住我……"
1011103-130 = "啊啊算了，先不說這些了！#n來，我們快去那邊的長椅坐下！"
1011103-133 = "坐在長椅上欣賞風景……懶洋洋的。不錯不錯。"
1011103-134 = "好悠哉的假日。"
1011103-135 = "老師覺得怎樣？會覺得無聊嗎？"
1011103-136 = "[s3]「只要是跟寧瑠在一起，不管做什麼都開心。」\n[s4]「嗯，我也需要偶爾放鬆一下。」"
1011103-137 = "是，是嗎？"
1011103-138 = "……哈哈！老師真會說場面話呢。"
1011103-139 = "啊？你說是認真的？"
1011103-140 = "能跟老師在一起，我也挺開心的啦……"
1011103-141 = "對吧對吧？"
1011103-142 = "就知道老師會喜歡。"
1011103-143 = "呼啊啊啊。"
1011103-144 = "唔嗯，陽光跟地點都這麼好……突然有點睏……"
1011103-150 = "（呼嚕呼嚕）"
1011103-151 = "[ns] 讓寧瑠靠在肩膀上"
1011103-152 = "唔唔……好溫暖……"
1011103-154 = "（於是時間就這麼過去……）"
1011103-161 = "[ns]「……寧瑠。」"
1011103-162 = "……"
1011103-163 = "[ns]「再不醒來的話，晚上會睡不著的哦。」"
1011103-164 = "……嗯？"
1011103-169 = "哇啊！？"
1011103-170 = "我睡著了嗎！？"
1011103-171 = "我，我不知不覺地就……還睡了好幾個小時？"
1011103-172 = "[s]「疲勞有稍微緩解了嗎？」"
1011103-173 = "啊……嗯，算是吧。"
1011103-174 = "等等，那老師不就因為我得一直坐著嗎？"
1011103-175 = "怎麼不早點叫醒我呢！#n我沒想過要這樣麻煩你的……"
1011103-176 = "都怪這裡出奇地舒適溫暖，所以才不小心就……！"
1011103-177 = "[s]「只要你能好好休息就夠了。」"
1011103-178 = "唔唔……可是我還是覺得有點抱歉。"
1011103-179 = "好，那接下來就換老師靠在我的肩膀上睡覺吧！要靠多久都沒問題！"
1011103-180 = "……雖然這麼說，現在時間也有點晚了。"
1011103-181 = "[s]「你不用放在心上。」"
1011103-183 = "[ns]「今天還有想做的事嗎？」"
1011103-184 = "沒有，今天這樣我就很滿足了！"
1011103-185 = "感覺今天度過了非常悠哉快樂的假日。"
1011103-186 = "嗯，這也是多虧了老師。"
1011103-191 = "謝謝你陪我度過特別的一天。"

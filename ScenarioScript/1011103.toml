[translation]
1011103-1 = "วันหยุดพักผ่อนแบบชิลๆ"
1011103-4 = "เฮ้ วันนี้มาเร็วเลยนะครู ยังไม่ถึงเวลานัดสักหน่อย"
1011103-5 = "หืม? ฉันก็มาเร็วเหมือนกันงั้นเหรอ?"
1011103-6 = "ฮ่าฮ่าฮ่า! ก็นั่นสินะ น่าจะเพราะฉันสนุกกับการได้ใส่ชุดนักเรียนในสองสามวันมานี้น่ะ"
1011103-7 = "พอเป็นอย่างนี้แล้ว ฉันก็เลยอยากสนุกไปกับวันหยุดที่ไม่ต้องใส่ซูคาจันให้มากกว่าเดิมสักหน่อยน่ะ!"
1011103-8 = "คงเป็นเพราะแบบนั้น ฉันก็เลยน่าจะรีบออกมาโดยที่ไม่รู้ตัวเหมือนกัน"
1011103-9 = "[s] \"ตกลงว่าอยากให้วันนี้เป็นวันหยุดสุดพิเศษเหรอ?\""
1011103-11 = "[ns] \"ทำไมจู่ๆ ถึงมีความคิดแบบนี้ล่ะ?\""
1011103-12 = "กะไว้แล้วว่าต้องถามแบบนี้"
1011103-13 = "ก็ดูสิ ตอนนี้ฉันอยู่ในชุดนักเรียนนะ?"
1011103-14 = "ตอนนี้ฉันไม่ได้เป็นทั้งหัวหน้า C&C แล้วรอบตัวฉันก็ไม่มีสมาชิกชมรมที่ฉันต้องให้ความสนใจด้วย"
1011103-15 = "ตอนนี้ฉันก็แค่นักเรียนธรรมดาๆ คนหนึ่งนี่ละ"
1011103-16 = "วันดีๆ แบบนี้ ฉันก็ควรได้ใช้เวลาทั้งวันอย่างซื่อสัตย์กับตัวเองใช่ไหมล่ะ?"
1011103-17 = "เดิมทีแล้วฉันมีเรื่องที่สนใจมากมาย แต่ก็ยังไม่เคยทำเพราะติดเรื่องตำแหน่งในชมรมน่ะ"
1011103-18 = "หืม...? ครู? ทำไมมองกันอย่างนั้นล่ะ?"
1011103-19 = "[s1] \"เนรุก็คิดถึงเรื่องแบบนั้นเหมือนกันสินะ\"\n[s2] \"เนรุมีความคิดที่ล้ำลึกจนครูประหลาดใจเลย\""
1011103-20 = "หืม? มันก็แน่อยู่แล้วหรือเปล่า"
1011103-21 = "จะ... จู่ๆ มาพูดอะไรแบบนี้ทำไมเนี่ย ครู!"
1011103-22 = "เอาเถอะ สรุปว่าฉันจะใช้โอกาสนี้!"
1011103-23 = "ทำในสิ่งที่ฉันสามารถทำได้ในตอนนี้ดู!"
1011103-24 = "และฉันก็คิดว่าวันพิเศษๆ แบบนี้ ถ้ามีครูอยู่ด้วยก็น่าจะสนุกขึ้นน่ะ"
1011103-25 = "ครูล่ะคิดยังไง? เจ๋งใช่มั้ยล่ะ? งั้นเราก็ไปกันเลยมั้ย?"
1011103-31 = "เชิญครับ! เบอร์เกอร์ควีน สาขามิลเลเนียมครับ~!"
1011103-33 = "[ns] \"ที่นี่มัน... ร้านอาหารฟาสต์ฟู้ด?\""
1011103-34 = "อื้อ ก็ใช่น่ะสิ"
1011103-35 = "ฉันมาที่นี่กับสมาชิกชมรมบ่อยๆ น่ะ ร้านนี้อร่อยนะ"
1011103-36 = "[s] \"งั้นมันก็ไม่ต่างจากปกติน่ะสิ?\""
1011103-37 = "ไม่ๆ วันนี้ฉันไม่เลือกเมนูแบบปกติหรอก"
1011103-38 = "เอาละ สั่งอาหารกันก่อนดีกว่า ครูสั่งก่อนสิ"
1011103-39 = "[s] \"ครูขอเป็นเซ็ตชีสเบอร์เกอร์\""
1011103-40 = "ถ้างั้นฉันก็..."
1011103-41 = "เซ็ตคุณหนู B!"
1011103-42 = "[s] \"เซ็ต... คุณหนู?\""
1011103-43 = "ทำไมล่ะ? ก็บอกไปแล้วนี่! วันนี้ฉันจะทำทุกอย่างตามใจเลย!"
1011103-44 = "เอาละ! รีบๆ สั่งเข้า!"
1011103-46 = "อื้อ นี่เซ็ตชีสเบอร์เกอร์ที่ครูสั่ง"
1011103-47 = "ส่วนอันนี้คือเซ็ตคุณหนูของฉัน"
1011103-48 = "[s] \"สิ่งที่อยากทำก็คือสั่งเบอร์เกอร์ของเด็กกินเหรอ?\""
1011103-49 = "ถ้าฉันสั่งเซ็ตนี้ตอนมากับสมาชิกในชมรม ทุกคนต้องแซวว่าฉันน่ารักเหมือนเด็กน้อยอย่างแน่นอนเลย"
1011103-50 = "นอกจากนี้ถ้ารู้กันทั่วว่าหัวหน้า C&C กินเบอร์เกอร์เซ็ตคุณหนู ครูว่าจะเป็นยังไงล่ะ?"
1011103-51 = "ฉันไม่สนใจหรอกนะว่าคนอื่นจะพูดว่ายังไง แต่ว่าคนมันก็ต้องรักษาฟอร์มใช่มั้ยล่ะ?"
1011103-52 = "[s] \"ก็เลยได้แต่รอว่าจะมีโอกาสนี้เหรอ...?\""
1011103-53 = "ก็ใช่น่ะสิ"
1011103-54 = "อีกอย่าง นี่มันไม่ใช่เซ็ตคุณหนูธรรมดาๆ หรอกนะ ดูให้ดีสิ"
1011103-55 = "เซ็ตนี้แถมอันนี้มาให้ด้วย!"
1011103-61 = "[ns] \"หุ่นยนต์ของเล่นเหรอ...?\""
1011103-62 = "ดูให้ดีสิ นี่ไม่ใช่ของเล่นธรรมดาๆ นะ นี่ละอันที่ฉันอยากได้มาตลอด!"
1011103-63 = "ถ้าหมุนข้อต่อนี้ตรงนี้ แล้วใส่ตรงนี้เข้าไปแบบนี้ หุ่นยนต์ก็จะ..."
1011103-68 = "แปลงร่างได้"
1011103-69 = "[ns] \"...!\""
1011103-70 = "เป็นไงล่ะ เจ๋งใช่มั้ย? ตาเป็นประกายเลยนะครู!"
1011103-71 = "ฮ่าฮ่าฮ่า! แต่ขอโทษนะ ฉันให้ไม่ได้หรอก ฉันเป็นคนสั่งเซ็ตคุณหนู งั้นหุ่นยนต์ตัวนี้ก็เป็นของฉัน!"
1011103-72 = "ถ้าครูอยากได้ก็สั่งเซ็ตเดียวกันสิ"
1011103-78 = "อ่า~ อิ่มแล้ว งั้นไปกันต่อเลยมั้ย!"
1011103-79 = "ถ้าเดินต่อไปอีกหน่อยจะเจอสวนสาธารณะ งั้นเราไปเดินย่อยกันหน่อยดีกว่า"
1011103-80 = "วันนี้อากาศก็ดีด้วย"
1011103-81 = "หืม? เรื่องแบบนั้นในวันปกติธรรมดาก็ทำได้งั้นเหรอ?"
1011103-82 = "ฮ่าฮ่า! แต่ยังไงมันก็ต่างออกไปน่า ไปกันก่อนเถอะ เดี๋ยวฉันอธิบายให้ฟังทีหลัง"
1011103-84 = "อืม วันนี้เป็นวันว่างที่เต็มไปด้วยความรู้สึกดีๆ นะ"
1011103-85 = "ถ้าเดินไปทางนี้จะเจอทางเดินเล่น ส่วนฝั่งตรงข้ามก็จะมีสระน้ำเล็กๆ ด้วย"
1011103-86 = "แต่ฉันก็ยังไม่เคยไปหรอก"
1011103-87 = "[s] \"ยังไม่เคยไป แต่รู้รายละเอียดดีจังเลยนะ?\""
1011103-88 = "อ้อ ก็เพราะสวนสาธารณะนี้อยู่ใกล้กับห้องชมรม C&C น่ะสิ"
1011103-89 = "หลายครั้งที่เส้นทางจะทับซ้อนกัน เวลาออกไปทำงานหรือกลับจากงาน ฉันก็จะเดินข้ามสวนนี่ไปน่ะ"
1011103-90 = "ฉันเคยแค่เดินผ่านเท่านั้นละ ยังไม่เคยเข้าไปเดินชมข้างในแบบชิลๆ หรอก"
1011103-91 = "ทุกครั้งที่เดินผ่าน ฉันก็จะคิดว่าที่นี่ตกแต่งไว้สวยเลย ไว้สักวันหนึ่งค่อยมาเดินเที่ยวเล่นแล้วกัน... แต่ก็ไม่เคยมีโอกาสนั้นสักที"
1011103-92 = "แล้วถ้าไม่ใช้โอกาสของวันนี้ ฉันจะได้เข้าไปเมื่อไรล่ะ?"
1011103-93 = "ครูก็จะไปกับฉันใช่มั้ย?"
1011103-94 = "[s] \"แน่นอนอยู่แล้ว\""
1011103-95 = "ดีเลย! ครูก็คงจะเหนื่อยจากงานมาเหมือนกัน งั้นเราเข้าไปฮีลใจกันเถอะ!"
1011103-97 = "ว้าว สดชื่นจริงๆ เลย! ไม่รู้เลยนะเนี่ยว่าสวนนี้จะใหญ่ขนาดนี้น่ะ!"
1011103-101 = "อ๊ะ? ครู ดูปลาในสระน้ำสิ!"
1011103-102 = "ตัวเบ้อเร่อเลย!! ฮ่าฮ่าฮ่า! กินอะไรเข้าไปถึงได้ตัวใหญ่แบบนี้เนี่ย?"
1011103-103 = "[s] \"เกาะราวแบบนั้นมันอันตรายนะ เนรุ\""
1011103-104 = "ไม่เป็นไรหรอก ไม่เป็นไร!"
1011103-105 = "แค่เกาะไว้นิดหน่อยเอง มันไม่พังลงมาหรอกน่า"
1011103-106 = "ไม้มันคงไม่ได้เปราะขนาดนั้น..."
1011103-110 = "เฮือก?!"
1011103-115 = "[ns] \"จะ... จับไว้ได้แล้ว...!\""
1011103-119 = "ตะ... ตกใจหมดเลย..."
1011103-120 = "[s] \"ก็บอกแล้วไงว่าให้ระวัง\""
1011103-121 = "กะ... ก็ใครจะไปรู้ล่ะว่าราวบันไดมันจะสั่นขึ้นมาจริงๆ!"
1011103-122 = "..."
1011103-123 = "ว่าแต่ ครูคิดจะจับฉันไว้อีกนานแค่ไหนเหรอ?"
1011103-124 = "ตอนนี้ฉันไม่เป็นอะไรแล้วนะ..."
1011103-125 = "[s] \"อ๊ะ ขอโทษๆ!\""
1011103-126 = "..."
1011103-127 = "โธ่ ครูนี่ก็นะ! เป็นห่วงคนอื่นเขาไปทั่ว!"
1011103-128 = "ถึงฉันจะตกใจนิดหน่อย แต่ก็ไม่ตกลงไปในสระน้ำหรอก!"
1011103-129 = "แต่ก็... ขอบคุณนะที่ช่วยจับไว้..."
1011103-130 = "ฮึ่ย ไม่ดูสระน้ำแล้ว! ไปนั่งที่ม้านั่งตรงโน้นดีกว่า!"
1011103-133 = "แค่นั่งบนม้านั่งแล้วมองทิวทัศน์แบบไม่ต้องคิดอะไร... มันก็ไม่เลวนะ"
1011103-134 = "นี่สินะวันหยุดพักผ่อนแบบชิลๆ"
1011103-135 = "แล้วครูล่ะว่าไง? มานั่งอยู่แบบนี้ไม่เบื่อใช่มั้ย?"
1011103-136 = "[s3] \"ถ้าอยู่กับเนรุ ไม่ว่าทำอะไรครูก็สนุกเสมอละ\"\n[s4] \"อื้อ เราต้องพักผ่อนแบบชิลๆ แบบนี้บ้างละ\""
1011103-137 = "งะ... งั้นเหรอ?"
1011103-138 = "ฮ่าฮ่า...! ครูนี่ก็นะ ไปเรียนการพูดให้ถูกใจคนอื่นมาจากไหนเนี่ย?"
1011103-139 = "หืม? พูดจากใจจริงงั้นเหรอ?"
1011103-140 = "ก็นะ เวลาอยู่กับครู ฉันก็สนุกเหมือนกัน..."
1011103-141 = "แพลนวันหยุดชิลๆ ของฉันได้ผลใช่มั้ยล่ะ?"
1011103-142 = "กะไว้แล้วเชียวว่าครูก็ต้องชอบด้วย"
1011103-143 = "ฮ้าวว"
1011103-144 = "อืม แดดก็กำลังดี สถานที่ก็ปลอดโปร่ง... เหมือนจะง่วงขึ้นมานิดหน่อยเลย..."
1011103-150 = "(สัปหงก)"
1011103-151 = "[ns] ให้เนรุพิงไหล่"
1011103-152 = "งืมๆ... อบอุ่นจัง..."
1011103-154 = "(แล้วเวลาก็ผ่านไปอย่างนั้น...)"
1011103-161 = "[ns] \"เนรุ...\""
1011103-162 = "..."
1011103-163 = "[ns] \"ถ้าไม่ตื่นตอนนี้ เดี๋ยวตอนกลางคืนนอนไม่หลับนะ"
1011103-164 = "หืม...?"
1011103-169 = "ว้าก?!"
1011103-170 = "ฉันเผลอหลับไปเหรอ?!"
1011103-171 = "หะ... หลับไปตั้งแต่ตอนไหนเนี่ย... หลับไปเป็นชั่วโมงด้วยเหรอ?"
1011103-172 = "[s] \"รู้สึกเหนื่อยน้อยลงบ้างหรือยัง?\""
1011103-173 = "ก็... น่าจะน้อยลงแล้วน่ะ"
1011103-174 = "แต่เดี๋ยวนะ งั้นครูก็ให้ฉันพิงไหล่แล้วไม่ได้ลุกไปไหนเลยงั้นเหรอ?"
1011103-175 = "ทำไมไม่บอกฉันล่ะ! ฉันไม่ได้ตั้งใจจะมาเป็นหนี้บุญคุณขนาดนี้นะ..."
1011103-176 = "แต่ไหล่ของครูมันสบายและอบอุ่นแปลกๆ ฉันก็เลย...!"
1011103-177 = "[s] \"ถ้าได้พักผ่อนเต็มที่ก็ดีแล้วละ\""
1011103-178 = "อะ... อืม... แต่ฉันก็รู้สึกผิดนะ"
1011103-179 = "ดีละ งั้นต่อไปครูก็พิงไหล่ฉันแล้วหลับได้เลย! ฉันให้ยืมไหล่ได้นานเท่าที่ต้องการเลย!"
1011103-180 = "พูดแบบนี้ตอนนี้มันจะสายไปมั้ยนะ..."
1011103-181 = "[s] \"ไม่ต้องคิดมากหรอก\""
1011103-183 = "[ns] \"วันนี้มีเรื่องอื่นที่อยากทำอีกหรือเปล่า?\""
1011103-184 = "ไม่แล้วละ เท่านี้ฉันก็พอใจแล้ว!"
1011103-185 = "วันนี้ฉันรู้สึกเหมือนได้ใช้วันหยุดที่ทั้งชิลและก็สนุกไปพร้อมกันเลย"
1011103-186 = "ทั้งหมดนี้เพราะครูเลยนะ"
1011103-191 = "ขอบคุณนะครู ขอบคุณที่มาใช้วันที่แสนพิเศษด้วยกันนะ"

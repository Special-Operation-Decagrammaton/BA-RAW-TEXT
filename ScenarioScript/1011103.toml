[translation]
1011103-1 = "Relaxed Holiday"
1011103-4 = "Oh, you're here early, Sensei. It's not meet-up time yet."
1011103-5 = "Huh? I'm here early too?"
1011103-6 = "Hahaha! Well, to tell you about it, I've been wearing the school uniform for a few days now, and it's been pretty fun."
1011103-7 = "So I wanted to see what else I could get up to without the bomber jacket!"
1011103-8 = "Heh, I guess I kind of rushed into it."
1011103-9 = "[s] \"So you wanted to spend a special day today?\""
1011103-11 = "[ns] \"Where's this coming from all of a sudden?\""
1011103-12 = "I knew you'd ask."
1011103-13 = "Look at me. I'm in my school uniform, right?"
1011103-14 = "Right now, I'm not C&C's president, and there's no one else I need to look out for."
1011103-15 = "I'm just an everyday student, see?"
1011103-16 = "And I can live today just for myself."
1011103-17 = "There's a lot of things I've wanted to do that I couldn't, because of my position."
1011103-18 = "...Huh? Sensei? What's with that look?"
1011103-19 = "[s1] \"So you were being considerate of that.\"\n[s2] \"You're surprisingly thoughtful.\""
1011103-20 = "Huh? Of course."
1011103-21 = "And don't think you can sweet-talk me, Sensei!"
1011103-22 = "Anyways, there's a lot I can only do right now."
1011103-23 = "So I'm going to seize the opportunity."
1011103-24 = "And I thought it might be fun for you to come along with me."
1011103-25 = "What do you think? Cool, right? Let's get going, then!"
1011103-31 = "Welcome to Millennium's Queen Burger!"
1011103-33 = "[ns] \"A fast food joint?\""
1011103-34 = "Well, yeah."
1011103-35 = "I come here with the other club members sometimes. The food's good."
1011103-36 = "[s] \"So this...isn't different for you?\""
1011103-37 = "On the contrary, the menu's all different today."
1011103-38 = "Let's order. You go first, Sensei."
1011103-39 = "[s] \"I'll get a cheeseburger meal.\""
1011103-40 = "I'll get..."
1011103-41 = "Kids' Meal B!"
1011103-42 = "[s] \"A kids' meal?\""
1011103-43 = "Like I said, today I do what I want!"
1011103-44 = "And that's our order!"
1011103-46 = "Okay, so here's your cheeseburger meal..."
1011103-47 = "Here's my kid's meal..."
1011103-48 = "[s] \"Why'd you want to order a kids' meal?\""
1011103-49 = "Well, I like kids' meals, but I could never order one in front of other people. They'd pat me on the head and call me cute or something."
1011103-50 = "And if word got out that I eat kids' meals..."
1011103-51 = "Well, I don't care what other people say, but it just doesn't sound cool."
1011103-52 = "[s] \"So you were just waiting for your chance?\""
1011103-53 = "Yep."
1011103-54 = "Besides, this isn't just any kids' meal. Look at this."
1011103-55 = "It's free with the meal!"
1011103-61 = "[ns] \"...A toy robot?\""
1011103-62 = "Not just \"a toy robot.\" Look closer. There's a reason I wanted this."
1011103-63 = "If you turn the joint here like this, and put this here, the robot..."
1011103-68 = "...transforms!"
1011103-69 = "[ns] \"Whoa!\""
1011103-70 = "Cool, right? Your eyes are sparkling, Sensei."
1011103-71 = "Hahaha! But nope, no way, nuh uh. I ordered the kids' meal, so this is mine!"
1011103-72 = "If you want your own, order it yourself."
1011103-78 = "Oof, I'm full. Let's move on!"
1011103-79 = "There's a park down this road. Let's take a little walk."
1011103-80 = "The weather's nice."
1011103-81 = "Huh? Well yes, I CAN walk in the park normally, but..."
1011103-82 = "...this is a bit different. I'll explain it when we get there."
1011103-84 = "Nice and quiet out here. Not a soul to be seen."
1011103-85 = "There's a trail down this path, and then there's a little pond."
1011103-86 = "I haven't been there, though."
1011103-87 = "[s] \"You seem to know it pretty well for not having been there.\""
1011103-88 = "Ah, the thing is, this park is close to C&C's club room."
1011103-89 = "The route overlaps, so I always pass this place whenever I go out or come back."
1011103-90 = "But as many times as I've done that, I've never really stopped to look around."
1011103-91 = "I liked the ambiance, so I thought maybe I could take a nice stroll sometime, but I hadn't had the chance."
1011103-92 = "So when else can I do that, if not today?"
1011103-93 = "You'll come along, right, Sensei?"
1011103-94 = "[s] \"Of course.\""
1011103-95 = "Great! I'm sure you've been working hard, so this'll be a nice getaway for both of us."
1011103-97 = "Ooh, this IS nice. I didn't realize how spacious this place was!"
1011103-101 = "Oh, Sensei, look, there's fish in the pond!"
1011103-102 = "That one's ginormous! Hahaha! What does it EAT to get that big?!"
1011103-103 = "[s] \"Hey, Neru? You shouldn't lean on the railing like that.\""
1011103-104 = "It's fine, it's fine!"
1011103-105 = "It's not like it's going to collapse just because I nudge it a little."
1011103-106 = "They don't make 'em that weak—"
1011103-110 = "WHAAUGH!"
1011103-115 = "[ns] \"I gotcha!\""
1011103-119 = "Phew. That was a surprise."
1011103-120 = "[s] \"I did warn you.\""
1011103-121 = "I-I didn't know it was that wobbly, though!"
1011103-122 = "..."
1011103-123 = "Also, Sensei? How long do you plan on holding me for?"
1011103-124 = "You can let go. I'm fine now..."
1011103-125 = "[s] \"Ah, sorry!\""
1011103-126 = "..."
1011103-127 = "S-Seriously, you worry too much, Sensei!"
1011103-128 = "I was just a little startled. I wasn't gonna fall."
1011103-129 = "I mean...thanks for looking out for me, though."
1011103-130 = "Eh, whatever! Let's go sit on that bench."
1011103-133 = "Nice, comfy bench, pretty scenery...I could nod off here, you know?"
1011103-134 = "Just sitting here feels like its own day off."
1011103-135 = "How about you, Sensei? You're not getting bored or anything, are you?"
1011103-136 = "[s3] \"You make everything entertaining, Neru.\"\n[s4] \"Everybody needs a breather like this now and again.\""
1011103-137 = "I-Is that so?"
1011103-138 = "...Hah! You are REALLY good at that sweet talk, Sensei."
1011103-139 = "Wait, you mean it?"
1011103-140 = "Well, I enjoy being around you too."
1011103-141 = "Yeah. Yeah..."
1011103-142 = "I knew you'd like it, Sensei."
1011103-143 = "*yawn*"
1011103-144 = "Mmm, the sun just feels perfect right now, everything's so pretty... I really am getting sleepy..."
1011103-150 = "*zzz*"
1011103-151 = "[ns] Lend her my shoulder."
1011103-152 = "Zzz... It's warm..."
1011103-154 = "After some time..."
1011103-161 = "[ns] \"...Neru?\""
1011103-162 = "..."
1011103-163 = "[ns] \"If you nap too long, you might not get a good sleep tonight.\""
1011103-164 = "...Huh?"
1011103-169 = "Wha—?!"
1011103-170 = "Did I nod off, or...?"
1011103-171 = "How long was I... What do you mean, \"hours\"?!"
1011103-172 = "[s] \"Are you feeling rested now?\""
1011103-173 = "Um... Yeah, actually."
1011103-174 = "Wait, Sensei, does that mean you couldn't get up because of me?"
1011103-175 = "You should've said something! I didn't mean to keep you THAT long..."
1011103-176 = "I was just really warm and comfy, so before I knew it, I..."
1011103-177 = "[s] \"It's fine, as long as you got a decent rest.\""
1011103-178 = "U-Umm... I still feel bad about it, though."
1011103-179 = "Okay, from now on, Sensei, anytime YOU want to nod off, you can use MY shoulder, for as long as you want."
1011103-180 = "...Although it's probably a little late for that today."
1011103-181 = "[s] \"Don't worry about it.\""
1011103-183 = "[ns] \"Is there anything else you wanted to do, before we call it?\""
1011103-184 = "Nope, that's it for today!"
1011103-185 = "Phew, this was fun and very, very refreshing."
1011103-186 = "Mostly thanks to you, Sensei."
1011103-191 = "So thank you. For spending a special day with me."

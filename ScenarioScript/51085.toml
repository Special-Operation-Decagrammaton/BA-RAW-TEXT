[translation]
51085-4 = "อะ... อ๊ายยยย~!"
51085-5 = "ฝะ... ฝากไว้ก่อนเถอะ! เจ้าพวกเฮียกกะเรียวรันนน!!"
51085-14 = "ย้าาห์! ถ้ามาดูถูกพวกเรา ก็ต้องเจอแบบนี้แหละ!"
51085-15 = "[s] \"เป็นยังไงกันบ้าง? มีใครบาดเจ็บตรงไหนหรือเปล่า?\""
51085-16 = "ฉะ... ฉันไม่เป็นไรค่ะ คาเอเดะจังกับสึบากิจังล่ะ..."
51085-17 = "อื้ม! ฉันไม่เป็นไรสักนิด!"
51085-18 = "ฉันก็ด้วย~"
51085-20 = "ฮุฮุ! ข้าก็ไม่เป็นอะไรเจ้าค่ะ! "
51085-21 = "ยอดเยี่ยมไปเลยนะเจ้าคะ! การต่อสู้ที่สอดประสานของชมรมฝึกฝนทุกคน...! "
51085-22 = "และรุ่นพี่เรนเกะ! แสดงฝีมือในฐานะเฮียกกะเรียวรันได้เท่สุดๆ เลยเจ้าค่ะ!"
51085-27 = "หืม?"
51085-31 = "...ยูคาริเหรอ?"
51085-33 = "ตอนต่อไป;ฟูวะ เรนเกะ"

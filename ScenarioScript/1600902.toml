1600902-101 = "3;미치루;03;닌자는 최고네~ 라고 생각하게 되면서-\n#3;m4\n#3;em;[음표]\n#3;hophop"
1600902-102 = "3;미치루;04;이걸 만든 인법연구부의 부장이란 녀석, 혹시 천재인가? 하고 누구라도 감탄할 법한……!\n#3;em;[!]\n#3;m3"

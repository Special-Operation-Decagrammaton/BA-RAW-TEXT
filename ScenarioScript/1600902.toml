[translation]
1600902-1 = "Ninja Girls Are Picky"
1600902-3 = "As usual, I was drowning in a pile of work."
1600902-8 = "[ns] \"Hm... Some food sounds nice.\""
1600902-9 = "I hadn't eaten yet today, so I decided to go get lunch."
1600902-12 = "[ns] \"I need to get back to work. Cup of noodles it is.\""
1600902-14 = "[ns] \"Okay. Should be done in three minutes.\""
1600902-16 = "(I was waiting for the instant cup ramen to be ready.)"
1600902-21 = "[ns] \"Huh?\""
1600902-25 = "[ns] \"...Hmm.\""
1600902-28 = "[ns] \"...Hmmmmmm.\""
1600902-31 = "[ns] \"The time...\""
1600902-34 = "Now! While their guard is down!"
1600902-38 = "Ahhhhhh!"
1600902-42 = "How did you escape my perfect ambush?!"
1600902-43 = "[s] \"Isn't it good that I escaped?!\""
1600902-44 = "Hmph!"
1600902-45 = "Oh!"
1600902-46 = "You truly are a master, Sir Sensei! How did you evade my elaborate ambush?"
1600902-47 = "[s] \"You were standing out in plain sight.\""
1600902-48 = "Hahaha! Was I?"
1600902-49 = "\"I saw right through your ambush!\" The confident words of the victor!"
1600902-50 = "Yes! I like it!"
1600902-51 = "I can sense the great fighting power!"
1600902-52 = "Based on all of this... Yes. You definitely have potential!"
1600902-53 = "[s1] \"Potential? What potential?\"\n[s2] \"By the way, Michiru... My noodles...\""
1600902-54 = "What sort of potential do you think I'm talking about? Your potential as a ninja, of course!"
1600902-55 = "What sort of potential do you think I'm talking about? Your potential as a ninja, of course!"
1600902-56 = "[s] \"As a ninja...?\""
1600902-57 = "Yes! I know what you're thinking!"
1600902-58 = "The path to becoming a ninja seems too hard. I understand the anxiety you must feel."
1600902-59 = "Don't be reckless, since you're just a beginner. You have to start slow and build a good foundation."
1600902-60 = "For example, you might start off as a ninja fanatic."
1600902-61 = "[s] \"So if a ninja fanatic levels up, they'll become a ninja?\""
1600902-62 = "I see you! You're the type that doesn't like starting off as a rookie, eh?"
1600902-63 = "Well, aren't you ambitious?"
1600902-64 = "But I like your passion!"
1600902-65 = "[s] \"I don't think you're really listening to me here.\""
1600902-66 = "But it's okay, Sensei! I'm Chidori Michiru, president of the dignified Ninjutsu Research Club!"
1600902-67 = "Well... Not officially yet, but we have a lot of potential!"
1600902-68 = "Anyway! The Ninjutsu Research Club recommends the \"Becoming a Ninja Plan B\" for people just like you!"
1600902-69 = "[s] \"Am I being marketed a pyramid scheme?\""
1600902-70 = "If you don't want to go level by level, there's another way!"
1600902-71 = "It's like choosing your class in a tutorial!"
1600902-72 = "Instead of ninja fanatic, you could start off as a turtle."
1600902-73 = "[s3] \"Are you running a hiring agency?\"\n[s4] \"How would a turtle become a ninja?!\""
1600902-74 = "Turtles have great potential for becoming ninjas! And they love pizza!"
1600902-75 = "Come on! Turtles have great potential for becoming ninjas! And they love pizza!"
1600902-76 = "But starting off in a sewer means the road ahead will be tough. Still, it's very possible, especially if you're in an area with Millennium's latest sewage equipment..."
1600902-77 = "[s] \"So, Michiru... Why are you here?\""
1600902-78 = "Oh! I got totally sidetracked by our conversation!"
1600902-79 = "Sensei! We have a big problem! A big one! We're in big trouble!"
1600902-80 = "As you already know, we run the video streaming channel \"Michiruchi, a Girl's Ninja Scroll.\""
1600902-81 = "[s5] \"Oh, yes. I remember.\"\n[s6] \"That's where you share ninjutsu techniques?\""
1600902-82 = "Yes, so we upload videos twice a week. We need to upload a new one soon... But I have no idea what to post next..."
1600902-83 = "Yes, so we upload videos twice a week. We need to upload a new one soon... But I have no idea what to post next..."
1600902-84 = "We're completely stumped! We've been driven into a corner! We might as well just title the next video \"Michiru! A Youth's Crisis!\""
1600902-85 = "That's why I messaged you on MomoTalk. I just completely forgot to explain the rest!"
1600902-86 = "[s] \"So you experience a crisis like this twice a week, Michiru?\""
1600902-87 = "More importantly! I thought you would be able to help me!"
1600902-88 = "You might have ideas I haven't thought of."
1600902-89 = "Adults are supposed to be super smart right?"
1600902-90 = "That's why I ambushed you!"
1600902-91 = "[s7] \"This is way more than I signed up for!\"\n[s8] \"Don't ambush me ever again!\""
1600902-92 = "Sensei, please! I have a few ideas... The problem is we don't know which direction we want to go. Can you pick for us?"
1600902-93 = "Sensei, please! I have a few ideas... The problem is we don't know which direction we want to go. Can you pick for us?"
1600902-94 = "For example, what about this? \"A Review of the Top Ten Ninjutsu Tools Used by Real Parkour Ninjas!\""
1600902-95 = "Or... \"A Detailed Analysis of the CG in the Live Action Ninja Destroyer Movie\"!"
1600902-96 = "Oh, or how about \"Why Do Ninjas Always Put Lots of Garlic in Ramen and Add Chashu?\""
1600902-97 = "[s9] \"How did you come up with that last one?\"\n[s10] \"Do ninjas really eat their ramen like that?\""
1600902-98 = "Details, details. Which one do you like the best, Sir Sensei?"
1600902-99 = "Details, details. Which one do you like the best, Sir Sensei?"
1600902-100 = "Which one inspires more curiosity about ninjas?"
1600902-101 = "Which one makes you think, \"Wow! Ninjas are the best!\"?"
1600902-102 = "And maybe, \"Who's the president of the Ninjutsu Research Club that made this video? Is she some kind of genius?\""
1600902-103 = "What do you think?"
1600902-104 = "[s] \"This is a lot of pressure...\""
1600902-105 = "If you have any other suggestions, I'm all ears!"
1600902-106 = "The goal of the Ninjutsu Research Club is to spread the word about ninjas to as many people as possible and be recognized as an official club one day!"
1600902-107 = "We're willing to do anything to get there! And because I respect you, I know you have something innovative to offer us!"
1600902-108 = "[s] \"Um... What about...\""
1600902-109 = "Oh! I knew you would have an amazing idea!"
1600902-110 = "[s11] \"What about, ‘Who's the Strongest Ninja in a Movie or Show?'\"\n[s12] \"What about, ‘Who's the Fastest Ninja in a Movie or Show?'\"\n[s13] \"What about, ‘Who's the Coolest Ninja in a Movie or Show?'\""
1600902-111 = "What?!"
1600902-112 = "What?!"
1600902-113 = "What?!"
1600902-114 = "[s] \"Since there are so many different kinds of ninja shows and movies...\""
1600902-115 = "..."
1600902-116 = "[s] \"Which ninja is the most... Um, Michiru? You look scary...\""
1600902-117 = "No, no, no, no, no! Sensei! That's awful!"
1600902-118 = "How dare we compare ninjas between different works of art! What are the parameters for our analysis?"
1600902-119 = "There are countless works with ninjas in them! Novels, comics, movies, animes..."
1600902-120 = "There are masterpieces from Shiba Dog Wang Wang all the way down to the story I wrote in my notebook!"
1600902-121 = "[s] \"Something you wrote? That's dedication.\""
1600902-122 = "Each of those works is different and has its own lore. They're completely different worlds!"
1600902-123 = "When you consider lore, the different power levels between the ninjas, and countless other things, it's impossible to rank them!"
1600902-124 = "But above all, this disregards the essence of ninjas completely! Ninjas change and evolve all the time! You can't make a video like this!"
1600902-125 = "*sob* You're such a noob!"
1600902-126 = "[s] \"Why do I feel like I committed a crime?\""
1600902-127 = "You just aren't understanding! All right, Sensei. Please, sit."
1600902-128 = "It's time for me to explain the greatness of ninjas and their deep origins!"
1600902-129 = "[s] \"Michiru, my cup of noodles!\""
1600902-130 = "So you see, Sensei. Ninjas have appeared in media since..."
1600902-131 = "[s] \"...I give up.\""
1600902-133 = "Michiru held me hostage for three hours, lecturing me on what she called the short version of ninja history."
1600902-134 = "Of course, my cup of instant noodles got cold and soggy."

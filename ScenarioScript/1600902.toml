[translation]
1600902-1 = "忍者少女很難搞"
1600902-3 = "（今天一如往常在夏萊處理工作……）"
1600902-8 = "[ns]「……差不多該去吃午餐了。」"
1600902-9 = "（工作告一段落正準備起身，突然聽到一陣奇怪的聲音）"
1600902-12 = "[ns]「……不過今天沒什麼時間，吃杯麵好了。」"
1600902-14 = "[ns]「現在只要等3分鐘……」"
1600902-16 = "（就在我靜靜等待杯麵泡好的時候……）"
1600902-21 = "[ns]「……嗯？」"
1600902-25 = "[ns]「……？？」"
1600902-28 = "[ns]「……多心了嗎？」"
1600902-31 = "[ns]「啊，3分鐘到了。」"
1600902-34 = "……呵呵！有破綻！"
1600902-38 = "咿呀！"
1600902-42 = "慢著！老師大人別躲開呀！我的埋伏眼看就能漂亮成功了！"
1600902-43 = "[s]「不不不不……」"
1600902-44 = "真是的！太掃興了！"
1600902-45 = "但話說回來，"
1600902-46 = "竟然能躲過我完美的奇襲……老師大人真有一套！"
1600902-47 = "[s]「沒那麼了不起……奇襲之前就隱約能看到你了。」"
1600902-48 = "嗚嗚嗚……！"
1600902-49 = "「我早就看穿你的埋伏了」……"
1600902-50 = "原來如此，是強者的台詞！"
1600902-51 = "普通一句話就能感受到強者風範，很好！"
1600902-52 = "嗯！我的眼光果然沒錯！老師大人果然有天分！"
1600902-53 = "[s1]「天分……？」\n[s2]「抱歉三千留，我的杯麵……」"
1600902-54 = "我說的天分，當然就是忍者的天分！"
1600902-55 = "我說的天分，當然就是忍者的天分！"
1600902-56 = "[s]「忍者的天分……」"
1600902-57 = "沒事，我懂。"
1600902-58 = "突然叫你當忍者一定會感到不安，我能理解。"
1600902-59 = "新手時期最重要的，就是要腳踏實地慢慢進步。"
1600902-60 = "比方說……先從當忍者迷開始如何？"
1600902-61 = "[s]「忍者迷升級就會變成忍者啊……？」"
1600902-62 = "啊，不過只做一些初步修行，有時難免也會覺得無聊吧。"
1600902-63 = "嗯嗯～這我也能理解。"
1600902-64 = "心境當然也會變得複雜！"
1600902-65 = "[s]「話題擅自進展下去了……！？」"
1600902-66 = "不過別擔心，老師大人！你以為我是誰？我可是堂堂忍術研究部部長！千鳥三千留！"
1600902-67 = "雖然我們還只是非公認社團……但還是很有潛力！"
1600902-68 = "總之！為了滿足老師的需求，我今天要隆重推薦，我們忍術研究部的「忍者計劃B」！"
1600902-69 = "[s]「怎麼開始變成購物頻道了。」"
1600902-70 = "總而言之，我們有很多方法帶領你入門，不須擔心。"
1600902-71 = "沒錯，例如說……"
1600902-72 = "烏龜！"
1600902-73 = "[s3]「話題直線加速下去啦……！」\n[s4]「烏龜和忍者有什麼關係……？」"
1600902-74 = "烏龜就是忍者！從以前就是這麼流傳下來的！"
1600902-75 = "烏龜就是忍者！從以前就是這麼流傳下來的！"
1600902-76 = "美中不足在於據點會設在下水道，不過前陣子千年有保養過的地方大概會比較乾淨……應該沒問題。"
1600902-77 = "[s]「話題越扯越遠了，三千留，你今天來是有什麼事……？」"
1600902-78 = "啊！我都差點忘了！"
1600902-79 = "老師大人！不好了！真的出大事了……！"
1600902-80 = "首先，老師大人應該知道我在經營影音頻道「少女忍法帖 小小三千留」對吧。"
1600902-81 = "[s5]「嗯，確實有這回事。」\n[s6]「是個介紹忍術之類的頻道對吧。」"
1600902-82 = "對對！那個頻道每週會固定上傳兩次影片……但我快要沒有靈感了……"
1600902-83 = "對對！那個頻道每週會固定上傳兩次影片……但我快要沒有靈感了……"
1600902-84 = "天大的危機！幾乎只能弄個標題叫：「三千留的忍者人生，在第17年出現最大危機？！」的閒聊直播了！"
1600902-85 = "所以我今天才來和諮詢這件事！"
1600902-86 = "[s]「原來如此。」"
1600902-87 = "能救我脫離險境的，就只有老師大人了！"
1600902-88 = "我的腦袋已經到極限，想不出點子了……"
1600902-89 = "但老師大人，應該能想到一些年長者特有的點子吧？"
1600902-90 = "所以我剛剛才會進行埋伏！"
1600902-91 = "[s7]「埋伏的必要性……」\n[s8]「明明是來求助的卻搞奇襲……」"
1600902-92 = "反正拜託老師大人啦！我還是有先想好幾個或許可行的題材，能至少幫我看看哪個OK嗎……"
1600902-93 = "反正拜託老師大人啦！我還是有先想好幾個或許可行的題材，能至少幫我看看哪個OK嗎……"
1600902-94 = "例如像這個……「跑酷忍者人氣忍具Top10評比！」。"
1600902-95 = "其他還有……「一起分析《Ninja Destroyer真人版》的CG！」。"
1600902-96 = "啊，「為何忍者吃拉麵時，經常點『多蒜加叉燒』」好像也不錯！"
1600902-97 = "[s9]「最後那是什麼……？」\n[s10]「那算是忍者主題嗎……？」"
1600902-98 = "別管那些小事了！老師大人覺得哪個好？"
1600902-99 = "別管那些小事了！老師大人覺得哪個好？"
1600902-100 = "看了會讓人對忍者有興趣，"
1600902-101 = "會讓人覺得「忍者最棒～」，"
1600902-102 = "會讓人覺得「製作這支影片的忍術研究部部長根本天才」！"
1600902-103 = "老師覺得哪個題材能做出這麼優質的影片！？"
1600902-104 = "[s]「期待山大呀！！」"
1600902-105 = "啊，當然如果還有其他題材，也儘管告訴我！"
1600902-106 = "我們忍術研究部的目標是「讓更多人能認識忍者」！最終被認可為正式社團！"
1600902-107 = "只要能達成這目的什麼都可以！而且我相信老師大人一定能想出劃時代的點子！"
1600902-108 = "[s]「那例如……」"
1600902-109 = "喔喔……！？"
1600902-110 = "[s11]「哪部作品裡的忍者最強？」\n[s12]「哪部作品裡的忍者最敏捷？」\n[s13]「哪部作品裡的忍者最酷？」"
1600902-111 = "什麼……！？"
1600902-112 = "什麼……！？"
1600902-113 = "什麼……！？"
1600902-114 = "[s]「因為市面上有各種忍者漫畫和電影嘛。」"
1600902-115 = "……"
1600902-116 = "[s]「其中哪個忍者最……三千留？你的眼神變好可怕……」"
1600902-117 = "不行不行不行不行不行！！你這就不對了！老師大人！"
1600902-118 = "要比較不同作品的忍者，你這是要用什麼標準來比！？"
1600902-119 = "而且作品這麼多！有小說，漫畫，電影，動畫……！"
1600902-120 = "大至「柴犬汪藏」導演的作品，小至我自己想的原創作品……！"
1600902-121 = "[s]「原創作品！想看……」"
1600902-122 = "每部作品都有自己獨特的世界觀，都有自己的風采……"
1600902-123 = "而且作品世界觀不同，戰力平衡也會不同！根本沒辦法用「誰比較強」或「誰比較敏捷」來做區分！"
1600902-124 = "就算各有不同，也不等於各有優劣！更何況忍者本來就會在各種媒體上與時俱進……！"
1600902-125 = "嗚，這就是阿宅和一般人的差異……！"
1600902-126 = "[s]「總覺得有點抱歉！？」"
1600902-127 = "嗚，看來必須從頭好好解釋了！老師大人，你坐好！"
1600902-128 = "我現在就從忍者的起源開始說明，讓你知道忍者的歷史，以及忍者有多了不起！"
1600902-129 = "[s]「三千留，我還沒吃午餐……」"
1600902-130 = "總之所謂的忍者……！"
1600902-131 = "[s]「啊，嗯……」"
1600902-133 = "（於是接下來3小時，我都在聽三千留的「忍者主題歷史摘要」講座……）"
1600902-134 = "（而這段期間一直放置的杯麵，泡到成了一個笑話）"

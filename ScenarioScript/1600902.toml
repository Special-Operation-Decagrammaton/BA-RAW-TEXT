1600902-49 = "3;미치루;99;'너의 앰부쉬 따위, 내 눈은 훤히 꿰뚫고 있었다.' 류의 강자 선언인가.\n#3;em;…"
1600902-50 = "3;미치루;99;응! 그것도 나쁘지 않아!\n#3;greeting"
1600902-51 = "3;미치루;03;확실히 그런 대사에서 적당히 느껴지는 강자감은 풍취가 있지~\n#3;em;[음표]"
1600902-52 = "3;미치루;01;이런 것들만 봐도……. 으음~ 역시 내 눈은 틀리지 않았어! 예상대로 선생 공에겐 소질이 있어!"
1600902-53 = "[s1] \"소질이라면, 무슨 소질…?\"\n[s2] \"그보다 미치루, 나 컵라면이…….\""
1600902-54 = "3;미치루;02;허어! 소생이 말하는 것이 무슨 소질을 가리키는 것이겠소. 선생 공! 그야 닌자가 될 소질이지 않겠소이까!\n#3;em;[!]"
1600902-55 = "3;미치루;02;허어! 소생이 말하는 것이 무슨 소질을 가리키는 것이겠소. 선생 공! 그야 닌자가 될 소질이지 않겠소이까!\n#3;em;[!]"
1600902-56 = "[s] \"닌자가 될 소질이라니, 대체…….\""
1600902-57 = "3;미치루;03;아! 그 마음 알아알아~\n#3;em;[재잘]"
1600902-58 = "3;미치루;00;갑자기 첫 단계부터 닌자로 시작하는 건 역시 허들이 너무 높단 거지? 그 불안감, 이해해~"
1600902-59 = "3;미치루;99;확실히 초심자라면 난데없이 닌자로 시작하기보다는 차근차근 단계를 밟아 레벨업 해나가는 게 안정감 있고 좋지.\n#3;em;…"
1600902-60 = "3;미치루;03;예를 들어 닌자 덕후부터 시작한다던가?"
1600902-61 = "[s] \"닌자 덕후가 레벨업 하면 닌자가 되는 거였어?!\""
1600902-62 = "3;미치루;02;아~ 뭐야, 그렇다고 너무 초심자 단계부터 시작하는 건 마음에 들지 않는 타입?\n#3;em;[반응]"
1600902-63 = "3;미치루;06;으음~ 선생 공의 취향도 꽤 까다로운걸."
1600902-64 = "3;미치루;03;뭐, 그런 고집도 싫어하진 않지만 말이야!\n#3;hophop\n#3;em;[재잘]"
1600902-65 = "[s] \"어느새 취향 이야기가 되어버린 거냐고…….\""
1600902-66 = "3;미치루;00;하지만 괜찮아. 선생 공! 이 내가 누구야? 누가 뭐래도 위풍당당한 인법연구부의 부장! 치도리 미치루!\n#3;em;[반응]"
1600902-67 = "3;미치루;04;아…… 물론. 동아리는 아직 비공인이지만, 그래도 장래성은 무지 뛰어나니까!"
1600902-68 = "3;미치루;00;하여간! 그런 까다로운 취향을 가진 선생을 위해서, 마침 우리 인법연구부에서 추천하는 <닌자가 되기 위한 플랜B>도 준비되어 있다는 말씀!\n#3;hophop"
1600902-69 = "[s] \"어느샌가 홈쇼핑 호스트 같은 말을…….\""
1600902-70 = "3;미치루;01;닌자 덕후부터 시작하는 게 마음에 들지 않는다면, 그 밖에 또 다른 닌자가 되기 위한 루트……."
1600902-71 = "3;미치루;99;그래! 튜토리얼로서 고를 수 있는 선택지라면 역시……."
1600902-72 = "3;미치루;00;응, 거북이부터 시작한다던가?\n#3;em;[반응]"
1600902-73 = "[s3] \"무슨 직업소개소냐고…….\"\n[s4] \"그보다 거북이라면 닌자가 될 수 있는 거냐?!\""
1600902-74 = "3;미치루;02;앗! 당연하지! 선생 공! 그야 거북이는 언제나 훌륭한 닌자가 될 자질을 가지고 있다니깐?! 피자도 좋아하고!\n#3;em;[!]"
1600902-75 = "3;미치루;02;앗! 당연하지! 선생 공! 그야 거북이는 언제나 훌륭한 닌자가 될 자질을 가지고 있다니깐?! 피자도 좋아하고!\n#3;em;[!]"
1600902-76 = "3;미치루;99;물론 스타팅 포인트가 하수도라는 건, 역시 좀 난이도가 있다고도 할 수 있겠지만. 밀레니엄의 최신 하수 정비 설비가 적용된 곳이라면 영 불가능하지마는……."
1600902-77 = "[s] \"저기, 그보다 미치루, 무슨 일로 찾아온 거야?\""
1600902-78 = "3;미치루;02;아! 맞다……! 대화에 열중한 나머지 또 까먹을 뻔했어!\n#3;em;[반응]"
1600902-79 = "3;미치루;05;그게 그러니까……으음! 그래! 맞아! 그거야. 그거! 선생 공! 큰일이야. 큰일! 진짜루 큰일이 나버렸다니깐?!\n#3;hophop"
1600902-80 = "3;미치루;00;선생 공도 알다시피 나, 동영상 채널을 운영하고 있잖아? 그 <소녀인법첩 미치룻치>라고."
1600902-81 = "[s5] \"그러고 보니 있었지. 채널\"\n[s6] \"인법 같은 걸 소개하는 채널이었지?\""
1600902-82 = "3;미치루;99;그래서 말인데. 주당 두 번 올리는 정기 영상 업로드 날짜가 얼마 안 남았는데……. 대체 뭘 만들면 좋을지 전---혀! 라고 해도 좋을 만큼……\n#3;em;…"
1600902-83 = "3;미치루;99;그래서 말인데. 주당 두 번 올리는 정기 영상 업로드 날짜가 얼마 안 남았는데……. 대체 뭘 만들면 좋을지 전---혀! 라고 해도 좋을 만큼……\n#3;em;…"
1600902-84 = "3;미치루;06;꽉 막혔어! 완전히 궁지에 몰린 상황이야! <미치루! 닌자 인생 17년! 마침내 찾아온 일생의 위기?!>라는 타이틀을 붙여도 부족함이 없을 정도랄까!\n#3;hophop"
1600902-85 = "3;미치루;00;실은 아까 모모톡을 했던 이유도 이거 때문이었걸랑! 기세를 탄 나머지 말하는 걸 까먹어버렸지만!\n#3;em;[재잘]"
1600902-86 = "[s] \"……미치루는 일주일에 두 번은 일생의 위기를 겪는 거야?\""
1600902-87 = "3;미치루;01;하여간~! 그래서 오늘 이렇게 찾아온 것도, 선생 공이라면 오도 가도 못하는 날 위기에서 구해줄지도 몰라! 라는 생각에서."
1600902-88 = "3;미치루;00;내가 전혀 생각지 못한……. 어른의 힘으로 슉슉! 해결책을 던져줄지도 모르겠는걸~? 하는 생각으로.\n#3;hophop\n#3;em;…\n#3;m2"
1600902-89 = "3;미치루;02;아, 그거라면 날로 먹을 수 있을지도-? 라는 생각으로 이어져서.\n#3;hophop\n#3;em;[반응]\n#3;m4"

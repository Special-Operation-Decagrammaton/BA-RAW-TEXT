1600902-91 = "[s7] \"한 마디가 더 많잖아!\"\n[s8] \"그보다 도움을 구하는 마음으로 기습하지 마!\""
1600902-92 = "3;미치루;03;아니아니~ 너무 매정한 말은 하지 말구~ 응? 선생 공. 그래도 소재는 미리 생각해뒀거든? 문제는 여기서 어떤 게 가장 좋을지- 선생 공이 골라줬으면 해."
1600902-93 = "3;미치루;03;아니아니~ 너무 매정한 말은 하지 말구~ 응? 선생 공. 그래도 소재는 미리 생각해뒀거든? 문제는 여기서 어떤 게 가장 좋을지- 선생 공이 골라줬으면 해."
1600902-94 = "3;미치루;00;예를 들어 이런 건 어때? <거리를 누비는 리얼 파쿠르계 닌자가 자주 사용하는 인법 도구 Top 10 리뷰!> 라거나.\n#3;em;[반짝]"
1600902-95 = "3;미치루;99;아니면 <작년에 개봉한 닌자 디스트로이어 실사판의 CG 디테일에 대해 분석해 보자!> 라는 영상이라던가……."
1600902-96 = "3;미치루;00;아! 맞아. <닌자들은 어째서 라멘을 먹을 때 가는 면에 마늘 많이, 차슈 추가까지 하는가!>를 해설하는 콘텐츠도 빼놓을 수 없겠지!\n#3;hophop"
1600902-97 = "[s9] \"잠깐 마지막 소재는 대체?\"\n[s10] \"저기, 닌자들은 진짜 그렇게 먹어……?\""

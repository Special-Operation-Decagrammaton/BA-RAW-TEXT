[translation]
1600902-1 = "นินจาสาวเรื่องเยอะ"
1600902-3 = "(วันนี้คุณครูก็ยังคงนั่งจัดการงานต่างๆ ที่ค้างอยู่เหมือนกับเช่นทุกๆ วัน)"
1600902-8 = "[ns] \"อืม... พักไว้เท่านี้แล้วไปกินมื้อเที่ยงก่อนแล้วกัน\""
1600902-9 = "(คุณครูตัดสินใจลุกไปพักทานอาหารเที่ยง)"
1600902-12 = "[ns] \"วันนี้ไม่ค่อยมีเวลา เอาเป็นราเม็งถ้วยแล้วกัน\""
1600902-14 = "[ns] \"รอแค่สามนาที...\""
1600902-16 = "(คุณครูนั่งรอเงียบๆ ให้ราเม็งสุก)"
1600902-21 = "[ns] \"อืม...\""
1600902-25 = "[ns] \"อืม.....\""
1600902-28 = "[ns] \"อืม.......\""
1600902-31 = "[ns] \"อ๊ะ ได้เวลา...\""
1600902-34 = "ฮุฮุ! ช่วงที่เผยช่องว่างนี้ละ!"
1600902-38 = "วะ...ว้ายยยย!"
1600902-42 = "ว้าย! จู่ๆ หลบกะทันหันแบบนั้นได้ยังไงเล่า ท่านอาจารย์! ข้าน้อยกำลังจะลอบโจมตีสำเร็จแท้ๆ!"
1600902-43 = "[s] \"เดี๋ยวสิ ถ้าทำสำเร็จก็เป็นเรื่องใหญ่เลยไม่ใช่เรอะ?!\""
1600902-44 = "ช่างโหดร้ายจริงๆ!"
1600902-45 = "อา...!"
1600902-46 = "แต่ถึงยังไง... ฮุฮุ~ ท่านอาจารย์หลบเคล็ดวิชาลับของข้าน้อยได้อย่างง่ายดายเลยงั้นเหรอ... โฮ่~ สมกับเป็นท่านอาจารย์จริงๆ!"
1600902-47 = "[s] \"เดี๋ยวสิ... พูดตรงๆ คือครูเห็นเธอชัดเจนเลยต่างหาก\""
1600902-48 = "อึก อืม... ว่าแล้วเชียว~~"
1600902-49 = "คำประกาศของผู้ที่แข็งแกร่งกว่า \"การซุ่มโจมตีของเจ้า ข้าอ่านออกอย่างทะลุปรุโปร่ง\" สินะ"
1600902-50 = "อื้ม แบบนี้ก็ไม่เลวเลย!"
1600902-51 = "ในคำพูดนั้นทำให้รับรู้ได้ถึงความแข็งแกร่งของผู้พูดเลยนะ~"
1600902-52 = "จากเท่าที่เห็น... อืม~ ข้าน้อยมองคนไม่ผิดแน่! ท่านอาจารย์มีพรสวรรค์อย่างที่ข้าน้อยคิดไว้เลย!"
1600902-53 = "[s1] \"พรสวรรค์เหรอ? พรสวรรค์อะไร...?\"\n[s2] \"คือว่ามิจิรุ ราเม็งถ้วยของครู...\""
1600902-54 = "โฮ่! ข้าน้อยหมายถึงพรสวรรค์อะไรน่ะเหรอ ท่านอาจารย์! ก็ต้องเป็นพรสวรรค์ในการเป็นนินจาน่ะสิ!"
1600902-55 = "โฮ่! เดี๋ยวก่อน ท่านอาจารย์มีพรสวรรค์ในการเป็นเป็นนินจาทีเดียวนะ!"
1600902-56 = "[s] \"พรสวรรค์ในการเป็นนินจาเหรอ หมายถึงอะไรน่ะ...\""
1600902-57 = "อา... ข้าน้อยเข้าใจเรื่องนั้นดี~"
1600902-58 = "การเริ่มต้นก้าวแรกแห่งการเป็นนินจามักเจออุปสรรคมากมายเลยใช่มั้ย? ข้าน้อยเข้าใจความกังวลนั้นดี~"
1600902-59 = "หากเป็นมือใหม่ละก็ ควรจะเริ่มต้นอย่างค่อยเป็นค่อยไปทีละระดับจะดีกว่าการก้าวกระโดดไปสู่การเป็น#nนินจาอย่างกะทันหัน"
1600902-60 = "ตัวอย่างเช่น เริ่มจากการเป็นโอตาคุนินจาก่อนแบบนี้ไงล่ะ?"
1600902-61 = "[s] \"ถ้าโอตาคุนินจาเลเวลอัปแล้วจะกลายเป็นนินจาเรอะ?!\""
1600902-62 = "อา~ อะไรกัน ท่านอาจารย์ไม่ชอบที่จะเริ่มต้นจากขั้นต้นงั้นเหรอ?"
1600902-63 = "อืม~ นิสัยของท่านอาจารย์ค่อนข้างยุ่งยากจริงๆ นะ"
1600902-64 = "แต่ก็เอาเถอะ ข้าน้อยก็ไม่ได้เกลียดความดื้อรั้นอะไรแบบนั้นหรอก!"
1600902-65 = "[s] \"ทำไมจู่ๆ ถึงกลายเป็นพูดถึงนิสัยของครูไปได้ล่ะ...\""
1600902-66 = "แต่ไม่เป็นไรหรอก ท่านอาจารย์! ไม่ว่าใครจะพูดยังไง ข้าน้อยผู้นี้ก็คือชมรมวิจัยศาสตร์นินจา จิโดริ มิจิรุ#nเชียวนะ!"
1600902-67 = "อา... แน่นอน ถึงชมรมของเราจะยังไม่เป็นทางการก็จริง แต่จะต้องเป็นชมรมที่รุ่งโรจน์ในอนาคตแน่นอน!"
1600902-68 = "ยังไงก็เถอะ! ถ้าเพื่อท่านอาจารย์ที่มีนิสัยจุกจิก ข้าน้อยได้เตรียม <แผนบีสำหรับการเป็นนินจา> ของชมรมวิจัยศาสตร์นินจามาด้วย! "
1600902-69 = "[s] \"ทำไมจู่ๆ ก็พูดเหมือนพิธีกรรายการโฮมช้อปปิ้งเลย...\""
1600902-70 = "หากท่านอาจารย์ไม่อยากเริ่มต้นจากการเป็นโอตาคุนินจาละก็ ยังมีวิธีที่การฝึกเพื่อเป็นนินจา..."
1600902-71 = "ใช่แล้ว! ถ้าเป็นตัวเลือกสำหรับเลือกแบบฝึกสอนละก็..."
1600902-72 = "อื้อ เริ่มจากเต่าก่อนเลยดีมั้ย?"
1600902-73 = "[s3] \"แนะนำอาชีพหรือยังไงกันเนี่ย...\"\n[s4] \"เต่าจะกลายเป็นนินจาได้งั้นเรอะ?!\""
1600902-74 = "อ๊ะ! แน่นอนอยู่แล้ว ท่านอาจารย์! เต่าน่ะมีคุณสมบัติที่จะกลายเป็นนินจาผู้ยิ่งใหญ่อยู่ยังไงล่ะ!? แถมชอบพิซซ่าด้วย! "
1600902-75 = "อ๊ะ! แน่นอนอยู่แล้ว ท่านอาจารย์! เต่าน่ะมีคุณสมบัติที่จะกลายเป็นนินจาผู้ยิ่งใหญ่อยู่ยังไงล่ะ!? แถมชอบพิซซ่าด้วย! "
1600902-76 = "แน่นอนว่าการที่จุดเริ่มต้นคือที่ท่อระบายน้ำแบบนี้ ก็คงจะบอกได้ว่ามันยากนิดหน่อย... ยิ่งถ้าเป็นท่อระบายน้ำที่ติดตั้งอุปกรณ์ใหม่ล่าสุดของมิลเลเนียมคงยิ่งแทบเป็นไปไม่ได้..."
1600902-77 = "[s] \"คือว่ามิจิรุ... มาที่นี่มีอะไรรึเปล่า?\""
1600902-78 = "อ๊ะ จริงด้วย...! คุยเพลินไปหน่อยจนเกือบลืมเลย!"
1600902-79 = "คือว่าเรื่องนั้น... อื้มมม! ใช่แล้ว จริงด้วย! คือว่าเกิดเรื่องใหญ่แล้วละ ท่านอาจารย์! เรื่องใหญ่มาก เรื่องใหญ่สุดๆ ไปเลย?!"
1600902-80 = "ท่านอาจารย์ก็คงรู้แล้วว่าข้าน้อยเปิดช่องวิดีโออยู่ใช่มั้ยล่ะ? ช่อง <วิถีนินจาสาว มิจิรุจจี้> น่ะ"
1600902-81 = "[s5] \"ครูเคยได้ยินเรื่องช่องนั้นเหมือนกัน\"\n[s6] \"ช่องที่แนะนำเกี่ยวกับวิชานินจาใช่มั้ย?\""
1600902-82 = "คือว่ามันใกล้ถึงกำหนดวันที่จะต้องอัปโหลดวิดีโอที่ต้องอัปโหลดอาทิตย์ละสองครั้งแล้ว... แต่ว่าข้าน้อยยังนึกไม่ออกว่าจะอัปโหลดวิดีโออะไรดี..."
1600902-83 = "คือว่ามันใกล้ถึงกำหนดวันที่จะต้องอัปโหลดวิดีโอที่ต้องอัปโหลดอาทิตย์ละสองครั้งแล้ว... แต่ว่าข้าน้อยยังนึกไม่ออกว่าจะอัปโหลดวิดีโออะไรดี..."
1600902-84 = "หัวข้าน้อยตื้อไปหมดแล้ว! ตอนนี้ข้าน้อยถึงทางตันคิดอะไรไม่ออกเลย! ถึงขั้นเรียกว่า <วิกฤตแห่งชีวิตนินจาของมิจิรุในวัย 17 ปี!> เลยก็ได้"
1600902-85 = "ที่จริงแล้ว เหตุผลที่ข้าน้อยส่ง MOMOTALK ไปหาท่านอาจารย์ก็เพราะเรื่องนี้นั่นแหละ แต่ดันคุยเพลินจนลืมบอกน่ะ!"
1600902-86 = "[s] \"มิจิรุจะเจอวิกฤตในชีวิตอาทิตย์ละสองครั้งเหรอ?\""
1600902-87 = "ยังไงก็เถอะ~! เหตุผลที่ข้าน้อยมาที่นี่วันนี้ก็เพราะเรื่องนี้ละ เพราะคิดว่าท่านอาจารย์อาจช่วยให้ข้าน้อย#nรอดพ้นจากวิกฤตครั้งนี้ได้!"
1600902-88 = "ข้าน้อยคิดว่าพลังของผู้ใหญ่ที่ข้าน้อยคิดไม่ถึง... ฟึ่บบบ!! อาจช่วยแก้ปัญหาของข้าน้อยให้หายไปใน#nพริบตาเลยก็ได้~"
1600902-89 = "ข้าน้อยคิดว่าหากเป็นท่านอาจารย์ อาจมีความคิดที่ผู้ใหญ่เท่านั้นที่คิดได้ก็ได้..."
1600902-90 = "ข้าน้อยก็เลยมาดักซุ่มโจมตีไงเล่า!"
1600902-91 = "[s7] \"พูดสั้นๆ ก็เข้าใจแล้ว!\"\n[s8] \"อย่ามาซุ่มโจมตีเพราะอยากขอความช่วยเหลือสิ!\""
1600902-92 = "ไม่เอาน่า~ อย่าพูดอะไรที่ดูใจร้ายแบบนั้นสิ ท่านอาจารย์~ แล้วอีกอย่างข้าน้อยก็คิดเอาไว้เรียบร้อยแล้ว นี่ไง ท่านอาจารย์แค่เลือกให้ก็พอว่าหัวข้อไหนดี..."
1600902-93 = "ไม่เอาน่า~ อย่าพูดอะไรที่ดูใจร้ายแบบนั้นสิ ท่านอาจารย์~ แล้วอีกอย่างข้าน้อยก็คิดเอาไว้เรียบร้อยแล้ว นี่ไง ท่านอาจารย์แค่เลือกให้ก็พอว่าหัวข้อไหนดี..."
1600902-94 = "อย่างอันนี้เป็นไง? <รีวิวอาวุธนินจา 10 อันดับที่นินจาปากัวร์ตัวจริงตามท้องถนนใช้>"
1600902-95 = "หรือไม่ก็วิดีโอ... <รีวิวเกี่ยวกับ CG ของเรื่องนินจา เดสทรอยเยอร์ ไลฟ์แอ็กชั่นที่เปิดตัวไปเมื่อปีที่แล้ว>... "
1600902-96 = "อ๊ะ จริงสิ จะขาดคอนเทนต์แนวการคิดวิเคราะห์ อย่างเช่น <ทำไมเวลานินจากินราเม็งจะต้องใส่ชาชูกับ#nกระเทียมลงไปเยอะๆ> ด้วย! "
1600902-97 = "[s9] \"เดี๋ยวนะ หัวข้อสุดท้ายนั่นอะไรน่ะ...?\"\n[s10] \"พวกนินจากินแบบนั้นจริงเหรอ...?\""
1600902-98 = "ช่างเรื่องเล็กๆ น้อยๆ นั่นเถอะ เอาละ~ ท่านอาจารย์คิดว่าหัวข้อไหนดีล่ะ?"
1600902-99 = "ช่างเรื่องเล็กๆ น้อยๆ นั่นเถอะ เอาละ~ ท่านอาจารย์คิดว่าหัวข้อไหนดีล่ะ?"
1600902-100 = "แค่เห็นก็รู้สึกสนใจเกี่ยวกับนินจาขึ้นมา..."
1600902-101 = "แล้วก็คิดว่า \"นินจานี่ยอดเยี่ยมที่สุดเลย~\" "
1600902-102 = "หรือไม่ก็ชมว่า \"หัวหน้าชมรมวิจัยศาสตร์นินจาที่ทำวิดีโอนี่ขึ้นมา... เป็นอัจฉริยะรึเปล่านะ?\""
1600902-103 = "ท่านอาจารย์คิดยังไงกับหัวข้อพวกนี้บ้างล่ะ?!"
1600902-104 = "[s] \"คาดหวังสูงไปแล้ว?!\""
1600902-105 = "อ๊ะ! ถ้ามีไอเดียใหม่ๆ นอกเหนือจากนี้ก็แนะนำข้าน้อยได้ตลอดเลยนะ!"
1600902-106 = "เป้าหมายของชมรมวิจัยศาสตร์นินจาของเราคือการเผยแพร่เรื่องนินจาให้กว้างขวางขึ้นให้มากที่สุด! เพื่อให้เราได้รับการยอมรับเป็นชมรมอย่างเป็นทางการในภายหลัง!"
1600902-107 = "เพื่อการนั้นแล้ว จะเป็นหัวข้ออะไรก็ได้! เห็นแบบนี้ข้าน้อยก็เป็นคนเปิดใจรับข้อเสนอนะ! ยิ่งเป็นท่านอาจารย์ที่ข้าน้อยนับถือและชื่นชมแล้ว... ข้าน้อยแน่ใจว่าจะท่านอาจารย์ต้องมีไอเดียดีๆ อย่างแน่นอน!"
1600902-108 = "[s] \"อืม ถ้าพูดขนาดนั้นแล้วก็นะ ตัวอย่างเช่น...\""
1600902-109 = "ว้าว! สมกับเป็นท่านอาจารย์จริงๆ เลย มีความคิดอะไรดีๆ เหรอ?!"
1600902-110 = "[s11] \"หัวข้อนินจาในเรื่องไหนแข็งแกร่งกว่ากัน เป็นไง?\"\n[s12] \"หัวข้อนินจาในเรื่องไหนว่องไวกว่ากัน เป็นไง?\"\n[s12] \"หัวข้อนินจาในเรื่องไหนเจ๋งกว่ากัน เป็นไง?\""
1600902-111 = "หาาา...?!"
1600902-112 = "หาาา...?!"
1600902-113 = "หาาา...?!"
1600902-114 = "[s] \"พวกนินจาในมังงะหรือในหนังก็แตกต่างกันไปนี่นา...\""
1600902-115 = "..."
1600902-116 = "[s] \"คนไหนในหมู่นินจาที่ดู... นี่ มิจิรุ? จ้องครูน่ากลัวเกินไปแล้ว\""
1600902-117 = "ไม่ๆๆๆๆ แบบนี้ไม่ใช่แล้ว ท่านอาจารย์!"
1600902-118 = "จะให้เปรียบเทียบเหล่านินจาจากแต่ละเรื่องงั้นเหรอ? จะใช้เกณฑ์อะไรในการเปรียบเทียบล่ะ?!"
1600902-119 = "มีเรื่องเกี่ยวกับนินจาเยอะจนนับไม่ถ้วนเลยนะ! ตั้งแต่นิยาย มังงะ หนัง ไปจนถึงอนิเมะเลย..."
1600902-120 = "ตั้งแต่ผลงานของสุดยอดผู้กำกับอย่างปรมาจารย์ผู้กำกับชิบะ ไปจนถึงสุดยอดผลงานต่างๆ ที่ข้าน้อย#nเขียนเอาไว้ในสมุดจด...!"
1600902-121 = "[s] \"ผลงานของมิจิรุงั้นเหรอ... น่าสนใจนี่!\""
1600902-122 = "ถึงผลงานแต่ละชิ้นจะมี <ความแตกต่าง> อยู่ แต่ว่าผลงานเหล่านี้เป็นคนละประเภทและมีคอนเซ็ปต์ที่#nแตกต่างกัน ซึ่งผลงานแต่ละชิ้นก็มีความสนุกต่างกันออกไป..."
1600902-123 = "อีกอย่างถ้าพิจารณาถึงคอนเซ็ปต์และความสมดุลในแต่ละเรื่อง ก็คงจะจำแนกว่าเรื่องไหนเหนือกว่า#nหรือด้อยกว่าไม่ได้..."
1600902-124 = "และยิ่งไปกว่านั้น นั่นไม่ใช่แก่นแท้ของนินจาเลยสักนิด! นินจาน่ะในทุกๆ สื่อ หรือในทุกๆ ผลงานต่างมี#nการเปลี่ยนแปลงอยู่เรื่อยๆ...!"
1600902-125 = "ฮือออออ... เพราะแบบนี้แหละน้า พวกคนทั่วไปถึงได้...!"
1600902-126 = "[s] \"เหมือนเพิ่งได้ยินคำพูดที่ไม่ยุติธรรมสุดๆ เลยนะ?!\""
1600902-127 = "อื้มมม! คุยกันอยู่แบบนี้ก็คงไม่ได้ข้อสรุปแน่ๆ! ช่วยไม่ได้นะ... เอาละ ท่านอาจารย์! นั่งลงตรงนั้นเลย!"
1600902-128 = "ตั้งแต่นี้ไปข้าน้อยจะเล่าเกี่ยวกับความยิ่งใหญ่ของนินจาตั้งแต่ต้นให้ฟังเอง!"
1600902-129 = "[s] \"มิจิรุ คือว่ามื้อเที่ยงครู...\""
1600902-130 = "เข้าใจมั้ย ท่านอาจารย์?! นินจาน่ะ...!"
1600902-131 = "[s] \"อะ...อื้อ...\""
1600902-133 = "(หลังจากนั้นคุณครูก็ต้องทนมิจิรุบรรยายเกี่ยวกับประวัติศาสตร์นินจา \"อย่างย่อ\" อยู่ประมาณสามชั่วโมง)"
1600902-134 = "(และแน่นอนระหว่างนั้นราเม็งที่ต้มไว้ก็อืดไปเรียบร้อย...)"

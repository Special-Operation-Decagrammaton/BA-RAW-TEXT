1600902-107 = "3;미치루;03;그걸 위해서라면 뭐든 좋아! 나, 이래 봬도 오픈마인드니까! 내가 진정으로 인정하는 선생 공이라면……. 엄청나게 혁신적인 아이디어를 줄 거라고 믿어!\n#3;hophop\n#3;em;[재잘]"

[translation]
102140-1 = "ตอนที่ 14;ปฏิบัติการป้องกันเขตปกครองตนเอง - ทรีนิตี้ 2"
102140-2 = "ทางฝั่งนี้เหมือนจะเคลียร์ได้ประมาณหนึ่งแล้วนะคะ..."
102140-3 = "เดี๋ยวก่อนนะคะ ยังมีบางอย่าง..."
102140-5 = "คุณเซอา...?"
102140-6 = "ในแถบโบราณสถานทางโน้น... เหมือนจะยังมีชาวเมืองที่ยังไม่ได้อพยพนะคะ..."
102140-7 = "(ซ่า) มาชิโระ ฝากตรวจสอบโบราณสถานทางนั้นด้วยค่ะว่ามีปัญหาอะไรหรือเปล่า"
102140-8 = "ค่ะรุ่นพี่! ฉันกำลังตรวจสอบค่ะ..."
102140-12 = "......!! มีชาวเมืองกับนักเรียนที่ยังไม่ได้อพยพค่ะ พวกเขามารวมตัวกันอยู่ที่วิหารค่ะ!"
102140-13 = "คะ?!  ว่าไงนะคะ?!"
102140-28 = "เอ๊ะ เอ๋...?!  ส่วนคนที่คุ้มกันอยู่ตรงนั้น...!"
102140-36 = "ฮือ...!"
102140-57 = "แฮ่ก... แฮ่ก..."
102140-62 = "ดะ... เดี๋ยวรุ่นพี่ฮาสุมิกับชมรมทวงความยุติธรรมก็มาช่วยแล้ว... รออีกนิดเดียวนะ..."
102140-64 = "โคฮารุคุ้มกันที่นั่นอยู่คนเดียวงั้นเหรอคะ?!  ทะ... ทำไมเป็นอย่างงี้ไปได้...?!"
102140-65 = "โคฮารุจังถูกขังงั้นเหรอ?! อยู่ตรงไหนน่ะ!?"
102140-66 = "โคฮารุต้องอยู่ในภารกิจอพยพสิ... เกิดความผิดพลาดตั้งแต่เมื่อไหร่เนี่ย... ช่างเถอะค่ะ ฉันจะรีบไปที่นั่นเดี๋ยวนี้ค่ะ!"
102140-68 = "ค่ะ! ฉันไปด้วยคนค่ะรุ่นพี่!!  แต่ว่ากองกำลังทางนั้นมีเยอะมาก..."
102140-69 = "ส่งกองกำลังสนับสนุนไปที่วิหารในโบราณสถานด้วยค่ะ!"
102140-93 = "อะ... อ่า..."
102140-97 = "ยะ... อย่าเข้ามาใกล้นะ...!! "
102140-106 = "อึก..."
102140-113 = "อื้อ นี่ๆ ขอโทษนะ"
102140-116 = "ผะ... ผนังพูดได้เหรอ?"
102140-122 = "มะ... มิกะ... คนทรยศ?!"
102140-123 = "แม่มดนั่นอยู่ที่นี่เหรอ...?!"
102140-126 = "อื้ม! ได้ยินว่าโคฮารุจังอยู่ที่นี่ ฉันก็เลยรีบมาน่ะสิ"
102140-127 = "เอ่อ... คะ... คนใหญ่คนโตจาก... สะ... สภาน้ำชา"
102140-131 = "โคฮารุจัง เป็นยังไงบ้าง? บาดเจ็บตรงไหนหรือเปล่า? อืม... ได้แผลมาสินะ"
102140-132 = "อ๋อ... ค่ะ... พอดีฉันโดน... ขะ.. ข่วนนิดหน่อย... เอ่อ..."
102140-133 = "อื้ม... อย่างนี้นี่เอง"
102140-144 = "เป็นฝีมือของพวกเธอใช่ไหม? อื้ม จริงๆ เลย... ฮ่าฮ่าฮ่าฮ่า!"
102140-148 = "...... กล้าดียังไงถึงมาทำกับเพื่อนรักคนสำคัญของฉันน่ะ?"

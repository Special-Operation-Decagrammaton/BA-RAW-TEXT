[translation]
102140-1 = "第14話;「三一」自治區防衛（２）"
102140-2 = "這裡收拾得差不多了呢……"
102140-3 = "不，還沒完──"
102140-5 = "聖亞同學……？"
102140-6 = "似乎還有尚未完成避難的市民……大約在遺跡地帶附近。"
102140-7 = "麻白，請確認遺跡地帶。是否有異常狀況？"
102140-8 = "是，前輩。我立刻確認──"
102140-12 = "──！！確認到遺跡的教堂附近，有尚未避難的市民與學生！"
102140-13 = "怎，怎麼會……！？"
102140-28 = "咦，咦……？#n但是，在那之中……！"
102140-36 = "嗚嗚……！"
102140-57 = "哈啊，哈啊……"
102140-62 = "蓮，蓮實前輩和實現正義部很快就會來幫忙了……#n只要再……忍耐一下……"
102140-64 = "小春一個人在保護大家……！？#n為什麼……！？"
102140-65 = "小春醬被困住了……？#n在什麼地方！？"
102140-66 = "小春應該是被投入引導避難的工作才對……#n是哪裡出錯了呢……不行，我立刻前往那個地方！"
102140-68 = "是，前輩！我也立刻過去！！#n但，但是，敵人的數量太多……"
102140-69 = "請立刻派遣支援兵力前往遺跡教堂！"
102140-93 = "啊，啊嗚嗚……"
102140-97 = "不，不要靠近我……！！"
102140-106 = "嗚，嗚……"
102140-113 = "嗨嗨～！不好意思打擾囉～"
102140-116 = "咦，牆，牆壁被……？"
102140-122 = "那是……背叛者彌香！？"
102140-123 = "魔女為什麼會在這裡……？！"
102140-126 = "因為聽說小春醬在這裡，所以我就衝過來了☆"
102140-127 = "啊，呃……那，那個……是茶會的……"
102140-131 = "小春醬，你還好嗎？#n有沒有受傷？#n──不，你受傷了呢。"
102140-132 = "……啊……這，這只是一點小擦傷……"
102140-133 = "……這樣啊。"
102140-144 = "是你們，做的啊……你們……"
102140-148 = "……對我重要的[ruby=・   ・]朋友[/ruby]做了什麼？"

10037030-42 = "1;키사키;02;몇 가지 정도만 미리 알아 두면, 감상에 도움이 될 게다. 가령 말채찍으로 허공을 때리는 시늉을 한다면, 그 인물이 말을 타고 어딘가로 달려간다는 것이지.\n#1;m3\n#3;dr"

[translation]
10037030-1 = "Episode 3;So the King Says Farewell to the Lady"
10037030-3 = "Hm... Is it just me, or do you hear some kind of metal instrument, Tomoe?"
10037030-4 = "My apologies if it is a jarring experience, Great Leader Cherino. What you are hearing is Shanhaijing's traditional musical."
10037030-5 = "Wh-What's that, Madam Kisaki...?! A traditional musical play? Hm... I see!"
10037030-6 = "It has a very unique melody."
10037030-7 = "It's almost painful to hear..."
10037030-8 = "Who are the people wearing those odd clothes?"
10037030-10 = "They are actors, in a sense. This musical features a long story told through a performance."
10037030-11 = "We call this the Peking opera in Shanhaijing."
10037030-12 = "Peking opera...?"
10037030-13 = "The performance is about to start. I hope you enjoy."
10037030-24 = "Smiles welcome spring. Tears darken the world."
10037030-26 = "Life is a dream in springtime."
10037030-28 = "A cuckoo calls in the mountains. Smoke rises beyond the lilies."
10037030-33 = "The cloud stays within the embrace of the skies!"
10037030-38 = "Her voice... It's so high!"
10037030-39 = "She is using a special technique to project her voice to even the furthest reaches of the performance space."
10037030-40 = "Why is she twirling her hand like that? She's spinning in place too."
10037030-41 = "Every movement in a Peking opera has a reason behind it... But describing each would be a poor way to experience it."
10037030-42 = "But I can provide a few helpful tips. For instance, the whipping motion she is making as if she has a horse whip suggests she is riding a horse to her destination."
10037030-43 = "Spinning in place means they are making a long journey to their destination. "
10037030-44 = "If a character in armor appears with a flag behind them... It means they have come with an army of thousands."
10037030-46 = "Hm... It would be easier to understand if they just showed everything like in a movie."
10037030-47 = "Fufu! It would have been difficult to recreate such things long ago."
10037030-52 = "I call my allies and rise from the plains."
10037030-53 = "In three years, five lords will end an ancient nation."
10037030-54 = "The heavens and earth will rend in two."
10037030-55 = "But why do the heavens slow my progress?!"
10037030-61 = "That one! The one with the mask! That was pretty cool!"
10037030-62 = "Hm. They are what we now call the protagonist of the story."
10037030-63 = "This story will revolve around that character. So I advise you pay close attention to that one."
10037030-69 = "She pulled out a long stick... I see, a spear!"
10037030-71 = "The result of war is never a surety."
10037030-72 = "A person must dutifully withstand shame and embarrassment."
10037030-73 = "The world is rife with talented, capable people."
10037030-74 = "Could they not return, unsettling dust and earth?"
10037030-76 = "The people are worn from endless fighting."
10037030-77 = "After defeat in Zhongyuan, the tide will not easily turn."
10037030-78 = "No matter how many talented allies you have..."
10037030-79 = "Why would they kick up dust and come to you?"
10037030-81 = "What are they saying?! They need to be careful what they say!"
10037030-82 = "I would have purged them all!"
10037030-84 = "A-Ahem...! At times, remonstration is another expression of loyalty, is it not...?"
10037030-85 = "I don't know about that! I would sentence them all to cleaning the bathrooms that have no windows!"
10037030-86 = "(She seems oddly flippant about a so-called purge. Is this how the dictator of Red Winter makes decisions?)"
10037030-91 = "Strength moves mountains, and the spirit spans the world."
10037030-92 = "But my luck has run out, and my horse remains obstinately still."
10037030-93 = "What can I do when even my horse will not move?"
10037030-98 = "My beloved, my beloved. What should I do?"
10037030-99 = "The enemy has claimed all."
10037030-100 = "Distant songs float to me from every direction."
10037030-101 = "If your spirit is lost..."
10037030-102 = "How can I live on?"
10037030-108 = "Wh-What? What are they doing? She distracted the protagonist and then took their sword."
10037030-109 = "Wait—She's turning it on herself?! No! They should live on together! What will happen to everyone they leave behind?!"
10037030-111 = "Ugh... All the soldiers are scattering... He's all alone..."
10037030-112 = "Still, there are thousands of enemy soldiers behind him..."
10037030-114 = "You wish to use my mind to claim mounds of gold and land."
10037030-118 = "I will grant you this last kindness!"
10037030-125 = "What?!"
10037030-126 = "*sniffle* No way... He was so bold and gallant..."
10037030-127 = "Boldness and gallantry aren't enough to rule the world, and bravery alone cannot truly capture the hearts of men."
10037030-128 = "Such is the divine order. We must simply do what we can and remain humble."
10037030-129 = "I know that much! But, but..."
10037030-130 = "I can't believe I was so moved. I must admit this was a fine performance!"
10037030-131 = "I'm glad to see that you are satisfied."
10037030-134 = "Now, Great Leader Cherino, next on the agenda—"
10037030-135 = "Before that! In the name of the leader of Red Winter Federal Academy, I have a request!"
10037030-139 = "(A formal request as a leader...? Does she already want payback for her \"grand welcome\"? No... Doing so right now would be ill advised.)"
10037030-140 = "(I'll entertain her request for now. Given the situation, I can't reasonably deny her that.)"
10037030-141 = "(If anything, it will be an opportunity to get a peek at the cards Red Winter is holding so closely to its chest.)"
10037030-142 = "What is it? As the president of Genryumon, I will do anything in my power to fulfill your request."
10037030-143 = "It's...about the performance just now!"
10037030-144 = "The Peking opera?"
10037030-145 = "Yeah, that! The Peking opera!"
10037030-146 = "Call back the student who played the protagonist in that performance!"
10037030-147 = "You mean Kaguya...? Why...?"
10037030-148 = "So her name is Kaguya... I see! I just wanted to speak with her!"
10037030-149 = "(Hm... More and more mysterious... I can't dismiss the possibility that this is some kind of mind game...)"
10037030-151 = "The Great Leader must have truly enjoyed the Peking opera. If it isn't too much trouble, could we ask for your help on this matter, Madam?"
10037030-156 = "Very well. Mina. If you would."
10037030-157 = "Yes, Madam President."
10037030-165 = "I answer your summons, Madam. I, Urushibara Kaguya, greet you! I came here at once!"
10037030-167 = "Ah, so I see. Allow me to introduce you. Great Leader Cherino, this is Kaguya, the performer you wished to meet. She leads the Peking Opera Club."
10037030-168 = "Kaguya. This is Great Leader Cherino, the student council president of Red Winter. I appreciate the work you put into this exchange meeting."
10037030-170 = "It is an honor, Great Leader Cherino! You have my deepest appreciation for enjoying our performance. I couldn't ask for anything more!"
10037030-171 = "O-Oh...! She was so overwhelming on stage, but she's completely changed!"
10037030-172 = "I'll take that as a compliment! We students often portray vastly different characters from ourselves."
10037030-173 = "So much so that sometimes we become confused about where the character ends and the student begins!"
10037030-174 = "I see! That sounds convenient in some ways...but annoying in others!"
10037030-175 = "That is quite an astute observation! Impressive!"
10037030-182 = "Now then, Madam. Let's move on to the matter at hand."
10037030-187 = "(Hm...? Are you entrusting this...Tomoe with the negotiations, Great Leader Cherino? I must learn more about Red Winter's command structure.)"
10037030-188 = "(And if not... Is it possible she is such a brilliant leader that she can govern without lifting a finger?!)"
10037030-189 = "(...For now, I must continue conversing with her.)"
10037030-193 = "As you wish, Chief Secretary Tomoe."
10037030-196 = "Bianlian? What's that?"
10037030-197 = "It's a technique unique to the Sichuan opera. Simply put, it is the ability to change masks to suit the situation without touching one's face!"
10037030-198 = "That sounds so cool! Amazing!"
10037030-199 = "The 3 main theatrical productions of Shanhaijing are the Peking opera, Sichuan opera, and Kun opera. One element unites them all... Each requires the performers to learn martial arts!"
10037030-200 = "Martial arts...? For a staged performance?"
10037030-201 = "Strange, isn't it? But that's the truth. In the Peking opera you just saw, our members showed off their impressive skills with a spear."
10037030-202 = "Hm... It seemed closer to artistic skill than an actual functional martial art!"
10037030-203 = "That makes sense...!"
10037030-208 = "We can't express how grateful we are that Shanhaijing Academy, known for how selectively it opens its doors, extended a hand to Red Winter Federal Academy."
10037030-209 = "Yet at the same time, there must be a significant reason you opened the heavy doors of Shanhaijing and Genryumon to us now, is there not?"
10037030-210 = "I wish to correct only two things. First, Shanhaijing's doors aren't as heavy as you may think. After all, the Black Tortoise Promenade's culinary talent is already well known in Kivotos."
10037030-211 = "Second, Genryumon have welcomed outsiders before. As you already know, Sensei is one such example."
10037030-212 = "[s1] \"Yes. Though, I haven't moved much...\"\n[s2] \"Right here! Just in case you forgot about me...\""
10037030-215 = "Heehee! Of course, Sensei. It is a little disappointing. Under different circumstances, I would have found another way to enjoy my time with you."
10037030-216 = "Fufu! Now that we can agree on! I hope you're not too upset, Sensei."
10037030-217 = "[s3] \"I'm fine, I'm fine...\"\n[s4] \"Don't mind me. Please, continue.\""
10037030-220 = "Oh, my! It's thanks to you that I'm having a completely new experience, Madam."
10037030-221 = "I am glad to hear you say so. Yet, I understand that no matter what we do, we will never quite make it as comfortable as it is in your own school. For that, I ask for your understanding."
10037030-222 = "Still, I anticipated Madam Kisaki making a request during this exchange meeting."
10037030-223 = "Please forgive me if this sounds...uncouth."
10037030-224 = "Not at all. If anything, I should be thanking you for allowing us to be direct."
10037030-225 = "To answer your question... I have no such intentions."
10037030-229 = "President...?"
10037030-230 = "At the risk of speaking out of turn again... I would rather avoid dancing around the topic and trying to understand Genryumon and its president's true intentions."
10037030-231 = "That is why I sent Chairman Marina away and requested a private space for you and I to talk."
10037030-233 = "Yes. I sent my own executive officer, Mina, away for the same reason. I want to make it clear that I have nothing to hide from you."
10037030-234 = "[s5] \"Yeah, hi. Really sorry for cutting in here...\"\n[s6] \"Right now... Kisaki is speaking as the student council president.\""
10037030-237 = "I thank you for your appropriately timed advice, Sensei."
10037030-238 = "I repeat, I expect nothing from any of you. There is nothing I want you to do, and I do not intend to use you to accomplish my own ends."
10037030-240 = "Then why host this exchange meeting...?"
10037030-245 = "Would you find it unsatisfactory if I told you it was simply to show you Shanhaijing?"
10037030-246 = "I wouldn't dare call it unsatisfactory, though I wouldn't consider it to be quite satisfactory either."
10037030-247 = "If that is how you feel, then I have not provided you a sufficient explanation."
10037030-248 = "...You mean, you're serious?"
10037030-249 = "Yes, I am. If I had one wish, it would be for you to explore every corner of this place and truly get to know Shanhaijing."
10037030-250 = "What do you mean by \"truly get to know Shanhaijing\"...?"
10037030-251 = "Fufu! Now that is one topic I would like to dance around!"
10037030-252 = "Oh, my! You've managed to turn my own words back on me!"
10037030-253 = "Not at all. Here in Shanhaijing, repaying an act of kindness is one of our most important tenets."
10037030-254 = "Heeheehee! I see."
10037030-255 = "Fufu! Indeed!"
10037030-260 = "You can actually spit fire out of your mouth?!"
10037030-261 = "Yes! That is the fire breathing technique. The darker the stage is, the more effective it is! And we have a number of tricks to darken the stage too—!"
10037030-262 = "Shanhaijing truly has so many secrets!"
10037030-263 = "Do you think so? Well you know what they say... The longer the history, the more abundant the mysteries!"
10037030-265 = "Thank you again for the warm reception, Madam."
10037030-266 = "Mm! That was very satisfying! I had so much fun. And better yet, I didn't have to worry about any coup d'etat!"
10037030-268 = "Fufu! I'm happy to hear that. I hope you continue to enjoy Shanhaijing."
10037030-269 = "And... This is where your skills come in, Sensei."
10037030-270 = "[s] \"Huh? Me?\""
10037030-271 = "Yes. I know I can trust you, and it seemed like you already knew our Red Winter guests."
10037030-272 = "I will send Mina with you as your escort."
10037030-273 = "[s] \"You won't be coming with us?\""
10037030-274 = "...Hm. I know it's rude, but I'm afraid that's what I must do."
10037030-275 = "Can I ask why, Madam?"
10037030-276 = "I'm sorry. All I can say is that it's due to some unavoidable circumstances."
10037030-277 = "...I see. Then we will put our trust in the hands of Executive Officer Mina and Sensei."
10037030-279 = "Oh, will the comrade be with us? That's even better! Comrade, is this your first time in Shanhaijing too?"
10037030-280 = "[s] \"I guess, strictly speaking, this...isn't my first time?\""
10037030-281 = "But like me, you don't know much about Shanhaijing, right?"
10037030-282 = "In that case, we should take the opportunity to see and do everything!"
10037030-286 = "[ns] \"Slow down! You might trip.\""
10037030-291 = "If you would excuse me, Madam. Great Leader."
10037030-292 = "Yes, good work today Kaguya."
10037030-294 = "Huh...? Kaguya won't come with us?"
10037030-295 = "Hahaha. I'm afraid duty calls. Please, don't be too disappointed. If you'd like, you're welcome to visit the Peking Opera Club room."
10037030-297 = "I see... There's no helping it if you're busy! I forgive you!"
10037030-298 = "Thank you, Great Leader."
10037030-307 = "..."
10037030-309 = "The president remains in Rikkagaku, while Red Winter heads to Shanhaijing..."
10037030-310 = "\"If I had one wish, it would be for you to explore every corner of this place and truly get to know Shanhaijing.\" Huh..."
10037030-315 = "A meeting implies that there is someone or something to meet. And it would have a different significance to each participant."
10037030-316 = "Red Winter meeting Shanhaijing also means that Shanhaijing is meeting Red Winter in return..."
10037030-317 = "Is that the path you wish to tread, Madam...?"
10037030-320 = "..."
10037030-321 = "What is loyalty? What form would loyalty take in moments like these...?"
10037030-322 = "It's not an easy question. Just as it is on the stage, such is life."
10037030-326 = "Yet, failing to take action when necessary is the purest form of disloyalty."
10037030-331 = "[log=카구야]...This scenery settles the viewer into a trance... [/log]"
10037030-333 = "[log=카구야]...and I already find myself at the shore.[/log]"

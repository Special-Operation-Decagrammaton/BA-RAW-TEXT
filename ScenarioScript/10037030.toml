10037030-1 = "#title;제3화;패왕이 여인과 이별하는구나."
10037030-2 = "3;체리노 치파오;13\n#3;em;…\n#3;a\n#wait;2500"
10037030-3 = "3;체리노 치파오;01;으음……. 조금 전부터 뭔가, 금속 악기 소리 같은 게 계속 울리고 있는데, 토모에?"
10037030-4 = "1;키사키;02;생소하게 느껴진다면, 양해를 부탁하지. 체리노 서기장. 이것은 우리 산해경의 전통 음악극이다.\n#1;ar\n#3;m5"
10037030-5 = "3;체리노 치파오;11;우, 우왓?! 키사키 문주인가……?! 으음, 뭐어. 전통 음악극이라면 어쩔 수 없지. 으음!\n#3;em;[?!]\n#3;shake"
10037030-6 = "3;체리노 치파오;01;그건 그렇고 참 특이한 선율이로군."
10037030-7 = "3;체리노 치파오;99;귀가 좀 아플 정도야…….\n#3;stiff\n#fontsize;50"

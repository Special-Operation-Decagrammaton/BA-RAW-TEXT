[translation]
10037030-1 = "ตอนที่ 3;ราชาบอกลาหญิงอันเป็นที่รัก"
10037030-3 = "อืม... เราว่าเราได้ยินเสียงคล้ายๆ เครื่องดนตรีโลหะมาตั้งแต่เมื่อกี้แล้วนะ? โทโมเอะ"
10037030-4 = "เป็นดนตรีที่ไม่คุ้นหูใช่มั้ยเล่า เลขาธิการเชริโน่? นั่นคือละครเพลงตามประเพณีของซานไห่จิงน่ะ"
10037030-5 = "วะ... หวา?! ประมุขคิซากิงั้นเหรอ...?! อืม ก็นะ ถ้าเป็นละครเพลงตามประเพณีก็ช่วยไม่ได้น่ะนะ อื้ม!"
10037030-6 = "แต่ว่าจังหวะดนตรีช่างมีเอกลักษณ์มากเลยนะ"
10037030-7 = "มีเอกลักษณ์จนเราปวดหูเลย..."
10037030-8 = "เมื่อกี้ที่บอกว่าเป็นละครเพลงตามประเพณีน่ะ ถ้าอย่างนั้นคนที่ใส่ชุดแปลกๆ นั่นคือใครเหรอ?"
10037030-10 = "เป็นนักแสดงอีกทีน่ะ ละครเพลงจะใส่เรื่องราวที่ยิ่งใหญ่หนึ่งเรื่องไว้ในเนื้อเพลง แล้วนักแสดงก็จะมา#nแสดงต่อหน้าทุกคน"
10037030-11 = "และในซานไห่จิงของเราก็เรียกละครเพลงแบบนี้ว่าการแสดงงิ้ว"
10037030-12 = "การแสดงงิ้ว...?"
10037030-13 = "เอาละ เหมือนการแสดงจะเริ่มแล้ว ขอให้เพลิดเพลินกับการแสดงนะ"
10037030-24 = "หากแย้มสรวลสักครั้ง โลกทั้งใบจะสดใสดั่งฤดูใบไม้ผลิ แต่หากกำสรด ทั้งโลกก็จะห่อเหี่ยวไปด้วย"
10037030-26 = "ชีวิตมนุษย์ก็เหมือนความฝันในฤดูใบไม้ผลิ"
10037030-28 = "นกดุเหว่าประสานเสียงบนภูเขาเขียวขจี ต้นลิลลี่ที่อยู่ห่างไกลมีหมอกจางๆ ลอยอยู่"
10037030-33 = "เมฆก้อนนั้นกล้าออกจากนภาได้อย่างไร!"
10037030-38 = "เสียงสูงอะไรขนาดนั้น...!"
10037030-39 = "คงอยากให้เสียงกู่ก้องไปไกลๆ แม้ทำการแสดงในพื้นที่ที่จำกัด ก็เลยพัฒนาวิธีการร้องเพลงแบบนั้น#nขึ้นมาน่ะ"
10037030-40 = "แล้วทำไมต้องหมุนปลายนิ้วมือแบบนั้นด้วยล่ะ? เหมือนกำลังหมุนเป็นวงกลมอยู่ที่เดิมอย่างนั้นละ"
10037030-41 = "ทุกการเคลื่อนไหวในการแสดงงิ้วมีความหมายที่ซ่อนอยู่... การตีความแต่ละท่าทางก็เป็นเรื่องที่สนุก#nเช่นกัน"
10037030-42 = "หากผู้ชมรู้ความหมายของการเคลื่อนไหว ก็จะเป็นประโยชน์ต่อการชมการแสดงเลยละ อย่างเช่น หากเอาแส้หวดไปกลางอากาศ ก็หมายความว่าคนนั้นกำลังขี่ม้าไปที่ไหนสักแห่ง"
10037030-43 = "ส่วนการเดินเป็นวงกลมอยู่ที่เดิม ก็หมายความว่าคนนั้นกำลังเดินทางไกลมาก "
10037030-44 = "และถ้ามีคนที่สวมเสื้อเกราะพร้อมกับธงบนหลัง... นั่นก็หมายความว่าเขามาพร้อมกับกองทัพนับพัน นับหมื่น"
10037030-46 = "อืม... อยากให้เล่นใหญ่เหมือนที่เห็นในภาพยนตร์จัง"
10037030-47 = "ฮุฮุ ในอดีตมันเป็นการยากที่จะใช้อุปกรณ์หรืออาวุธชิ้นใหญ่ๆ เหมือนของจริงน่ะ"
10037030-52 = "ลุกขึ้นจากทุ่งกว้าง แล้วคว้าอำนาจ"
10037030-53 = "พาขุนนางห้าคนไปโค่นล้มประเทศเก่าในเวลาเพียงสามปี"
10037030-54 = "แล้วแบ่งโลกออกเป็นสองส่วนในที่สุด"
10037030-55 = "เหตุใดสวรรค์จึงไม่ให้ข้าคนนี้ก้าวไปข้างหน้า!"
10037030-61 = "นี่ๆ! คนที่ใส่หน้ากากออกมาน่ะ! เราว่าเขาเท่จังเลย"
10037030-62 = "อืม เธอเป็นตัวเอกของการแสดงครั้งนี้น่ะ"
10037030-63 = "ละครเพลงเรื่องนี้จะเล่าเกี่ยวกับตัวละครหลักตัวนั้น เราแนะนำว่าให้จับตาดูตัวละครนั้นไว้ให้ดี"
10037030-69 = "หยิบแท่งไม้ยาวๆ ออกมาด้วย... อ้อ นั่นคือหอกสินะ!"
10037030-71 = "ตั้งแต่โบราณมา การแพ้หรือชนะสงครามเป็นสิ่งที่ไม่อาจคาดเดาได้"
10037030-72 = "การอดทนต่อความอับอายก็เป็นหน้าที่ของมนุษย์"
10037030-73 = "ในบรรดาคนที่มีความสามารถ ก็มีคนที่ยอดเยี่ยมมากมาย"
10037030-74 = "สักวันหนึ่งเราคงทำให้เกิดพายุฝุ่นผง แล้วกลับมาอีกครั้งก็เป็นได้"
10037030-76 = "ขวัญกำลังใจของผู้คนลดลงจากความเหนื่อยล้าในการต่อสู้"
10037030-77 = "การพ่ายแพ้ครั้งใหญ่ในสนามรบ ทำให้ยากต่อการกลับตาลปัตรสถานการณ์"
10037030-78 = "ต่อให้คนที่ยอดเยี่ยมยังอยู่กระทั่งตอนนี้"
10037030-79 = "แต่สุดท้ายแล้วจะมีใครทำให้ราชาต้องเป็นผุยผงได้หรือ?"
10037030-81 = "คนพวกนั้น พูดอะไรออกมาน่ะ! กล้าดียังไง จะทำให้ใครเป็นผุยผงนะ!"
10037030-82 = "ถ้าเป็นเราคงสั่งกวาดล้างไปแล้ว! กวาดล้างเลย!"
10037030-84 = "อะ... อืม...! มีคำกล่าวว่าการพูดทัดทานก็เป็นอีกหนึ่งแบบของความจงรักภักดีนะ...?"
10037030-85 = "เรื่องแบบนั้นเราไม่รู้หรอก! ถ้าเป็นเราจะสั่งให้ไปล้างห้องน้ำห้องที่แสงส่องไม่ถึงสัก 2 อาทิตย์เลย!"
10037030-86 = "(ถ้าเทียบกับคำว่ากวาดล้างแล้ว การสั่งให้ทำเท่านี้ก็ถือว่ามีเมตตาอยู่ นี่สินะความสามารถของผู้ที่ได้#nชื่อว่าเป็นจอมเผด็จการแห่งเรดวินเทอร์?)"
10037030-91 = "อำนาจยกขุนเขาทั้งลูกได้ ส่วนจิตใจที่หาญกล้าก็ปกคลุมทั้งโลกได้"
10037030-92 = "แต่ถ้าเสียเปรียบด้านโชคชะตา ม้าก็ไม่อาจเดินหน้าได้"
10037030-93 = "ถ้าม้าไม่เดินหน้า แล้วข้าต้องทำเช่นใดเล่า"
10037030-98 = "เจ้าเอ๋ย ข้าควรทำเช่นใดกับเจ้าดี!"
10037030-99 = "ศัตรูเข้ายึดครองโลกทั้งใบแล้ว"
10037030-100 = "เสียงที่ได้ยินจากทุกทิศทางคือเสียงเพลงจากที่ห่างไกล"
10037030-101 = "หากราชาสูญสิ้นกำลังใจแล้วไซร้"
10037030-102 = "ข้าผู้ต่ำต้อยนี้จะอยู่ไปเพื่ออะไร"
10037030-108 = "เอะ... เอ๋? จะ... จะทำอะไรน่ะ? ทำให้ตัวเอกมองออกไปไกลๆ... แล้วก็ดึงมีดของตัวเอกมาถือ?"
10037030-109 = "แล้วก็เอามาจ่อที่คอของตัวเอง...?! ไม่ได้นะ! ต้องอยู่ด้วยกันสิ! ถ้าทำแบบนั้นละก็... แล้วคนที่ยังเหลือ#nอยู่ล่ะ!"
10037030-111 = "อึก... สุดท้ายเหล่าทหารก็แยกย้ายกันไปหมด... จนเหลืออยู่หัวเดียวกระเทียมลีบ..."
10037030-112 = "และยังมีศัตรูนับพันตามไล่ล่า..."
10037030-114 = "จะซื้อชีวิตของข้าด้วยเงินและตำแหน่งหรือ"
10037030-118 = "เช่นนั้นข้าก็จะแสดงน้ำใจให้พวกเจ้า!"
10037030-125 = "ว้ากก?!"
10037030-126 = "ฮือ... ฮึกฮึก... ไม่ได้นะ... ทั้งๆ ที่เป็นคนมีเกียรติมีศักดิ์ศรีขนาดนั้น..."
10037030-127 = "ศักดิ์ศรีเพียงอย่างเดียวไม่อาจปกครองโลกได้ และความกล้าหาญอย่างเดียวก็ไม่อาจชนะใจคนได้"
10037030-128 = "นี่คือคำสั่งสวรรค์ สิ่งที่เราทำได้มีเพียงการพยายามและอ่อนน้อม..."
10037030-129 = "เรื่องแบบนั้นเรารู้น่า! แต่... แต่ว่า..."
10037030-130 = "อึก... ทำให้หัวใจเราสั่นไหวได้ถึงขนาดนี้เลยเหรอเนี่ย คงต้องยอมรับแล้วละ! เป็นละครเพลงที่ยอดเยี่ยมเลย!"
10037030-131 = "ถ้าเลขาธิการเชริโน่พอใจ เราก็ดีใจ ค่อยยังชั่วหน่อยนะ"
10037030-134 = "เช่นนั้น เลขาธิการเชริโน่ เราไปที่ลำดับต่อไปกันเถอะ ต่อไปคือ..."
10037030-135 = "เดี๋ยวก่อน! เรามีเรื่องอยากขอร้องในนามของเลขาธิการแห่งสถาบันสหภาพเรดวินเทอร์!"
10037030-139 = "(ขอร้องในนามของเลขาธิการเช่นนั้นหรือ...? หรือว่าจะคิดบัญชีเรื่อง 'การต้อนรับที่ยิ่งใหญ่'? ไม่สิ มันน่าจะเร็วเกินไปที่จะใช้ไพ่ใบนั้น)"
10037030-140 = "(เห็นทีต้องรอฟังดูก่อน แต่ถ้าดูสถานการณ์และเหตุผลแล้ว เราคงไม่อาจปฏิเสธได้)"
10037030-141 = "(อันที่จริง นี่อาจเป็นการดีกับเราในการแอบดูไพ่ของเรดวินเทอร์ก็ได้)"
10037030-142 = "ขอร้องอะไรหรือ? ถ้าเป็นการขอร้องที่ไม่เหนือบ่ากว่าแรง ในฐานะประมุขแห่งมังกรดำ เราจะตอบรับทุกอย่างเลย"
10037030-143 = "งั้นก็... เรื่องการแสดงเมื่อกี้น่ะ!"
10037030-144 = "การแสดงงิ้วน่ะหรือ?"
10037030-145 = "ใช่ การแสดงนั่นละ! ที่เรียกว่างิ้วเงิ้วอะไรสักอย่างนั่นน่ะ!"
10037030-146 = "ช่วยเชิญนักเรียนที่เล่นเป็นตัวเอกมาที่นี่หน่อยสิ!"
10037030-147 = "คางุยะน่ะหรือ...? ทำไมหรือ...?"
10037030-148 = "ชื่อคางุยะสินะ... อย่างนี้นี่เอง! เราอยากคุยอะไรบางอย่างกับเธอคนนั้นน่ะ!"
10037030-149 = "(เป็นการขอร้องที่ไม่อาจเข้าใจได้เลย ทว่า... นี่อาจเป็นสงครามประสาทอีกอย่างหนึ่งก็ได้...)"
10037030-151 = "ดูเหมือนว่าท่านเลขาธิการจะถูกใจการแสดงงิ้วมากน่ะค่ะ ถ้าไม่เป็นการเสียมารยาท ทางเราขอรบกวน#nจะได้หรือเปล่าคะ ท่านประมุข?"
10037030-156 = "ได้สิ มินะ ฝากด้วยนะ"
10037030-157 = "ค่ะ ท่านประมุข"
10037030-165 = "เรียกหาฉันเหรอคะ ท่านประมุข! อุรุชิบาระ คางุยะ ขอคารวะท่านประมุข! ฉันรีบบึ่งมาหาท่านเลยค่ะ!"
10037030-167 = "อืม มาแล้วหรือ คางุยะ เช่นนั้น... เราจะแนะนำให้รู้จัก เลขาธิการเชริโน่ นี่คือคางุยะ นักแสดงงิ้วที่ท่านอยากพบ เธอเป็นหัวหน้าชมรมการแสดงงิ้วน่ะ"
10037030-168 = "แล้วก็ คางุยะ ท่านนี้คือเลขาธิการเชริโน่ เป็นประธานนักเรียนของเรดวินเทอร์ การแสดงงิ้วต้อนรับงาน#nแลกเปลี่ยนครั้งนี้ ถือว่าทำได้ดีเลยนะ"
10037030-170 = "สวัสดีค่ะ ท่านเลขาธิการเชริโน่! ได้ยินว่าประทับใจกับการแสดงเล็กๆ น้อยๆ ของพวกเราเหรอคะ ต้องขอขอบคุณมากเลยค่ะ ฉันดีใจจริงๆ ค่ะ!"
10037030-171 = "โอ้ โอ้ว...! ตอนอยู่บนเวทีเธอดูน่าเกรงขามมากเลยนะ แต่พอได้มาคุยด้วยก็เหมือนเป็นอีกคนไปเลย!"
10037030-172 = "นี่ก็คงจะเป็นคำชมด้วยสินะคะ! นั่นเป็นเพราะนักเรียนอย่างพวกฉันได้แสดงบทบาทนู่นนี่กันหลาย#nบทบาทแล้วน่ะค่ะ"
10037030-173 = "บางครั้งเราก็สับสนเหมือนกันค่ะว่าแบบไหนคือหน้าตาที่แท้จริงของเรา และแบบไหนคือนิสัยจริงของ#nเรากันแน่!"
10037030-174 = "ขนาดนั้นเลยเหรอ? มันฟังดูทั้งเป็นประโยชน์ต่อการแสดง... และทั้งยุ่งยากต่อการใช้ชีวิตเลยนะ!"
10037030-175 = "มองออกถึงขนาดนั้นเลยเหรอคะ ความคิดเฉียบคมมากเลยค่ะ! น่าประทับใจจริงๆ ค่ะ!"
10037030-182 = "ถ้าอย่างนั้นก็ ท่านประมุขคะ พวกฉันอยากกลับเข้าประเด็นแล้วค่ะ"
10037030-187 = "(หืม...? เลขาธิการเชริโน่ฝากเรื่องการเจรจาไว้กับคนที่ชื่อโทโมเอะเช่นนั้นหรือ? คงต้องตรวจสอบ#nเกี่ยวกับโครงสร้างการปกครองของเรดวินเทอร์ดูแล้วละ)"
10037030-188 = "(ถ้าไม่ใช่ขึ้นมา... หรือว่านี่จะเป็น...? การใช้แต้มบุญในการปกครอง แบบที่ตัวเองไม่ต้องทำอะไรเลย แต่ก็ปกครองทั่วหล้าได้ดี...?)"
10037030-189 = "(ลองคุยกันต่อไปก่อนดีกว่า)"
10037030-193 = "ได้สิ หัวหน้าเลขานุการโทโมเอะ"
10037030-196 = "แล้วที่เปลี่ยนหน้าได้คืออะไรเหรอ?"
10037030-197 = "นั่นเป็นเทคนิคของการแสดงอุปรากรเสฉวนที่แตกต่างกับของเราเล็กน้อยค่ะ ถ้าจะให้อธิบายง่ายๆ นั่นคือเทคนิคในการเปลี่ยนหน้ากากตามสถานการณ์และบรรยากาศโดยไม่แตะต้องใบหน้าค่ะ!"
10037030-198 = "แค่ได้ฟังก็สุดยอดแล้วนะ?! เยี่ยมไปเลย!"

[translation]
10037030-1 = "第3話;霸王別姬"
10037030-3 = "唔……從剛才開始就一直有類似金屬樂器的聲音耶，智惠？"
10037030-4 = "如果讓汝不習慣還請見諒，潔莉諾書記長。#n此乃山海經的傳統音樂劇。"
10037030-5 = "唔，哇啊！？妃姬門主……！？#n唔呣，既然是傳統音樂劇，那就沒辦法了！"
10037030-6 = "別的先不說，這股旋律真特別呢。"
10037030-7 = "聽到咱的耳朵都有點痛了……"
10037030-8 = "你剛才說這是傳統音樂劇，不過那些身穿神奇服裝的人又是怎麼回事呢？"
10037030-10 = "那些人是演員。這場音樂劇是將故事融入樂曲之中，在眾人面前表演。"
10037030-11 = "而在山海經，這種音樂劇被稱為「京劇」。"
10037030-12 = "京劇……？"
10037030-13 = "表演即將開始，請盡情享受吧。"
10037030-24 = "一笑萬古春，一啼萬古愁。"
10037030-26 = "人生在世，宛如春夢。"
10037030-28 = "遍青山啼紅了杜鵑，荼蘼外煙絲醉軟。"
10037030-33 = "那片雲彩，怎敢離開藍天！"
10037030-38 = "聲音……也太高了吧！"
10037030-39 = "此乃為在有限的空間內，讓聲音傳至遠處而發展出的唱法。"
10037030-40 = "指尖為什麼要那樣轉來轉去的呢？#n而且還是在同一個位置上？"
10037030-41 = "京劇中的所有動作都有其隱含的意思……但若是一一說明實屬掃興。"
10037030-42 = "話雖如此，若能知曉幾項含意，對於欣賞亦會有所幫助吧。#n舉例而言……假如用馬鞭在空中抽打，便代表那個人物正騎馬奔向某處。"
10037030-43 = "而在同個位置上繞圈，則意味著至遠方旅行。"
10037030-44 = "身穿鎧甲之人將旗子插在背後……則代表與成千上萬的軍隊一同出現之意。"
10037030-46 = "唔嗯……如果能像電影一樣表現出聲勢浩蕩的樣子就更好了。"
10037030-47 = "呵呵，畢竟過往很難使用如此規模的道具與裝置啊。"
10037030-52 = "乘勢起隴畝之中。"
10037030-53 = "三年，遂將五諸侯滅故國。"
10037030-54 = "分裂天下而封王侯。"
10037030-55 = "天亡我，豈不謬哉！"
10037030-61 = "那個戴著面具出來的人！感覺真帥耶！"
10037030-62 = "嗯，他可說是這場演出的主角。"
10037030-63 = "這齣劇將以那名人物為中心展開，不妨對那名主角多加留意。"
10037030-69 = "拿出了像是長棍的東西……啊哈，原來是槍啊！"
10037030-71 = "勝敗兵家事不期。"
10037030-72 = "包羞忍恥方為人。"
10037030-73 = "世上子弟多才俊。"
10037030-74 = "捲土重來未可知。"
10037030-76 = "百戰疲勞壯士哀。"
10037030-77 = "中原一敗勢難回。"
10037030-78 = "優秀子弟今雖在。"
10037030-79 = "肯與君王捲土來？"
10037030-81 = "那些傢伙是什麼意思！就只會說一些好聽話！"
10037030-82 = "換作是咱就全部肅清！肅清！"
10037030-84 = "唔，唔嗯……！#n不是有句話說，進諫也是一種表現忠義的方式嗎……？"
10037030-85 = "那種事咱才不管！全都去在不見天日的廁所裡打掃2週！"
10037030-86 = "（相較於肅清二字帶有的重量，此等處置實屬慈悲啊。#n　這就是人稱赤冬獨裁者之人的氣量嗎？）"
10037030-91 = "力拔山兮氣蓋世。"
10037030-92 = "時不利兮騅不逝。"
10037030-93 = "騅不逝兮可奈何。"
10037030-98 = "虞兮虞兮奈若何！"
10037030-99 = "敵兵已略地。"
10037030-100 = "四方敵歌聲。"
10037030-101 = "大王意氣盡。"
10037030-102 = "賤妾何聊生！"
10037030-108 = "咦，咦咦？這，這是在做什麼？#n讓主角望向遠方……拔出主角的刀？"
10037030-109 = "接著還用那把刀往自己的脖子……！？#n不行！要活就一起活啊！那樣做的話……要留下來的人情何以堪！"
10037030-111 = "唔……最後連士兵也全部離散……只剩自己獨自一人……"
10037030-112 = "而且還被數以千計的敵軍緊追……"
10037030-114 = "吾聞敵購我頭千金，邑萬戶。"
10037030-118 = "吾為若德！"
10037030-125 = "哦哇！？"
10037030-126 = "唔……嗚嗚……怎麼會這樣……#n原本是那麼威風凜凜的說……"
10037030-127 = "僅憑威嚴無法治理天下，倚靠勇猛難以獲得人心……是這個意思吧。"
10037030-128 = "天命本就如此，人們能做的僅有奮發與謙讓……"
10037030-129 = "這點咱也知道！可是，可是……"
10037030-130 = "唔唔，居然如此打動咱的心……這下也只能承認了！#n真是場精采的表演！"
10037030-131 = "汝能滿意便再好不過。"
10037030-134 = "那麼，潔莉諾書記長。#n進入下一個環節吧。接下來──"
10037030-135 = "且慢！在那之前，咱想以赤冬聯邦學園書記長的名義提出一個要求！"
10037030-139 = "（在這種時候搬出書記長的名義……？#n　打算要求先前「盛大歡迎」的代價嗎？不，現在亮出那張牌還為之過早）"
10037030-140 = "（先繼續聽下去吧。畢竟考量情況和名義，應該都沒有拒絕的選項）"
10037030-141 = "（若能在此窺見赤冬的一張牌，也許反而是件好事）"
10037030-142 = "汝的要求為何？#n身為玄龍門的門主，只要妾身能力所及，但說無妨。"
10037030-143 = "既然你都這麼說了……不久前的那場表演！"
10037030-144 = "汝指的是京劇嗎？"
10037030-145 = "沒錯，就是那個！叫做京劇還是什麼的！"
10037030-146 = "幫咱把負責飾演主角的學生請過來吧！"
10037030-147 = "輝夜……？為何要……？"
10037030-148 = "那個人叫輝夜嗎……原來如此！咱有話想跟他說！"
10037030-149 = "（……真是令人捉摸不透的要求。#n　然而這恐怕也是心理戰的一環……不能排除這種可能）"
10037030-151 = "書記長似乎對那齣京劇相當滿意。#n如果不會過於失禮的話，能請您成全嗎，門主大人？"
10037030-156 = "就這麼辦吧。#n美奈，有勞了。"
10037030-157 = "是，門主大人。"
10037030-165 = "您找我嗎，門主大人！#n漆原輝夜已飛奔而來，在此向您問好！"
10037030-167 = "歡迎，輝夜。那麼……由妾身向汝介紹吧，潔莉諾書記長。#n這位便是汝要求見上一面的輝夜。目前擔任京劇部的部長。"
10037030-168 = "輝夜，這位是目前擔任赤冬聯邦學園學生會長的潔莉諾書記長。#n紀念本次交流會的京劇，真是辛苦了。"
10037030-170 = "初次見面，潔莉諾書記長！#n您能在看了我們的表演後深有感觸，真的令我無比開心！"
10037030-171 = "哦哦……！你在舞台上威風凜凜，現在給人的印象卻完全不一樣呢！"
10037030-172 = "這對我來說也是一種稱讚！#n像我們這樣的學生，經常會飾演各種角色。"
10037030-173 = "因此有時會分不清自己的真面目，以及真實的性格又是什麼！"
10037030-174 = "是嗎！那在某種層面上雖然方便……有時卻也相當麻煩啊！"
10037030-175 = "居然能指出這一點，您真是敏銳過人！我非常佩服！"
10037030-182 = "那麼，門主大人。#n我想是時候該切入正題了。"
10037030-187 = "（哦……？潔莉諾書記長會讓這個名叫智惠的人負責交涉嗎？#n　看來有必要對赤冬的統治結構加以確認）"
10037030-188 = "（若非如此……難道是這麽回事？#n　統治者本人無需作為便能使天下得到治理，也就是無為而治的境界……？）"
10037030-189 = "（……還是先讓話題進行下去吧）"
10037030-193 = "就這麼辦吧，智惠秘書室長。"
10037030-196 = "變臉？那是什麼？"
10037030-197 = "是一種能在和京劇稍有不同的「川劇」當中看見的技法。#n簡單來說就是在不碰觸臉部的情況下，根據狀況和氣氛變換面具的技術！"
10037030-198 = "光用聽的就覺得很厲害耶！？感覺超酷的！"
10037030-199 = "說到山海經的三大表演，經常會提到京劇、川劇、崑劇這三種戲劇。#n至於這三大表演的共同點……那就是必須先學習武術！"
10037030-200 = "武術……？表現戲劇要學武術嗎？"
10037030-201 = "聽起來很奇怪對吧？不過那卻是事實。#n在書記長剛才看的京劇中，我們的團員也表演了精彩的槍法對吧？"
10037030-202 = "雖然現在與其說是武術，其實更接近技藝就是了！"
10037030-203 = "聽你這麼一說，那確實……！"
10037030-208 = "對於鮮少對外開放的山海經高級中學，願意邀請我們赤冬聯邦學園前來交流一事，#n真是萬分感謝。"
10037030-209 = "但與此同時，我認為既然敞開了山海經與玄龍門沉重的門戶，#n其背後想必也具有相應的決心與用意……不知您有何見解呢？"
10037030-210 = "妾身認為有兩點需要更正──首先，山海經的門戶並非如汝所想的那般沉重。#n就好比玄武商會，不是已經以奇普托斯數一數二的美食街聞名了嗎？"
10037030-211 = "再有，玄龍門並非全無外人出入。#n汝應該也已經知曉老師的存在才是。"
10037030-212 = "[s1]「嗯，不過老師一直都被晾在一旁。」\n[s2]「差點被遺忘的老師在這裡哦。」"
10037030-215 = "呵呵呵，是呢，老師。#n真可惜，如果是在其他地方的話，就能以別種方式享受和老師相處的時間了。"
10037030-216 = "呵呵，妾身亦有同感。#n還請別太難過了，老師。"
10037030-217 = "[s3]「沒事沒事……」\n[s4]「沒關係，說話不用太拘謹。」"
10037030-220 = "哎呀，多虧了門主大人，我才能體驗到前所未有的自在氛圍。"
10037030-221 = "汝若能有如此感受，妾身也就放心了。#n話雖如此，要提供較所屬學園更舒適的感覺實屬困難，這點還請見諒。"
10037030-222 = "儘管如此──我認為妃姬門主大人在這場交流會當中，應該會提出某種要求才是。"
10037030-223 = "我明白突然口出此言相當失禮，希望您見諒。"
10037030-224 = "無妨。妾身反倒應當感謝汝直接進入正題。"
10037030-225 = "至於汝方才的推測和提問……妾身的回答是「並非如此」。"
10037030-229 = "門主大人……？"
10037030-230 = "一再口出冒昧之言非常抱歉，不過我並不想在此費心揣測門主大人與玄龍門的意圖。"
10037030-231 = "因此才會請瑪麗娜委員長暫時迴避，要求直接和門主大人對談。"
10037030-233 = "是啊，妾身也同樣讓執行部長美奈離開，加入了這場會談。#n這也意味著妾身在此毫無理由有所隱瞞。"
10037030-234 = "[s5]「那個，抱歉打斷你們說話。」\n[s6]「現在的妃姬是以門主……以學生會長的身分說話。」"
10037030-237 = "感謝汝恰到好處的補充，老師。"
10037030-238 = "再次聲明，妾身對汝等並不存在特別的要求。#n既無如此期待，亦無如此意圖。"
10037030-240 = "既然如此，舉辦這場交流會的原因又是……？"
10037030-245 = "欲向汝等展現山海經──這個答案難道不夠充分嗎？"
10037030-246 = "那倒不至於，但恐怕也難以稱之為「充分」。"
10037030-247 = "倘若讓汝產生此般心思，就意味著妾身的口才仍有待加強吧。"
10037030-248 = "……您真有此意嗎？"
10037030-249 = "啊啊，正是如此。#n若硬要妾身提出要求的話……希望汝等能四處遊覽山海經，見證山海經的風采。"
10037030-250 = "您所謂「見證山海經的風采」指的是……？"
10037030-251 = "呵呵，那才是妾身真正希望汝等推測之事啊。"
10037030-252 = "哎呀，沒想到您會在這裡將那句話奉還給我呢。"
10037030-253 = "畢竟「報恩」的概念，可是山海經的重要傳統之一。"
10037030-254 = "呵呵呵。原來如此。"
10037030-255 = "呵呵，沒錯。"
10037030-260 = "真的嗎？能用嘴巴噴出火來？"
10037030-261 = "是的！那是一種被稱為「吐火」的技藝，舞台越暗看起來就越亮哦！#n至於讓舞台變暗的方法當中，還有幾種是祕傳下來的祕技──！"
10037030-262 = "聽你這麼說，感覺山海經真的有很多祕密耶！"
10037030-263 = "是嗎～？那也不無道理，畢竟歷史與祕密經常是成正比的嘛！"
10037030-265 = "再次感謝您的盛大歡迎，門主大人。"
10037030-266 = "嗯，咱非常滿意！#n除了很開心之外，也不用擔心政變！"
10037030-268 = "呵呵，那真是再好不過了。#n希望汝能繼續享受山海經的樂趣。"
10037030-269 = "此外……在此之後，妾身希望能借助老師的力量。"
10037030-270 = "[s]「嗯？我嗎？」"
10037030-271 = "沒錯，妾身相信老師，而且老師似乎也對赤冬的訪客有所認識。"
10037030-272 = "護衛就交由美奈執行。萬事拜託了。"
10037030-273 = "[s]「所以妃姬不一起去嗎？」"
10037030-274 = "……是的。#n妾身明白此舉非常失禮，只可惜妾身非走不可。"
10037030-275 = "能請教您先行離開的原因嗎，門主大人？"
10037030-276 = "實在抱歉。#n妾身能回答的就只有「別無他法」。"
10037030-277 = "……原來如此，我明白了。#n那接下來就麻煩美奈執行部長和老師了。"
10037030-279 = "哦，同志也會一起來嗎？那就更好了！#n話說同志也是第一次來山海經嗎？"
10037030-280 = "[s]「唔嗯……準確來說不是第一次吧？」"
10037030-281 = "但你也跟咱一樣不太瞭解山海經吧？"
10037030-282 = "果然是這樣嗎！#n好，既然如此就一起到處逛逛吧！"
10037030-286 = "[ns]「好好好，這樣橫衝直撞小心會跌倒哦～？」"
10037030-291 = "那麼我也先告退了。#n門主大人、書記長。"
10037030-292 = "啊啊，辛苦了，輝夜。"
10037030-294 = "咦……？#n輝夜不跟咱們一起去嗎？"
10037030-295 = "哈哈哈，畢竟社團活動實在有點忙……不過還請書記長別太失落！#n有機會的話，歡迎來參觀我們京劇部喔！"
10037030-297 = "這樣啊……既然在忙社團活動也沒辦法！這次就放過你吧！"
10037030-298 = "非常感謝，書記長。"
10037030-307 = "……"
10037030-309 = "門主大人留在六和閣，赤冬則往山海經……"
10037030-310 = "「四處遊覽山海經，見證山海經的風采」是嗎……"
10037030-315 = "見證的行為必須存在對象。#n而對其對象而言，見證也是相對、互相的行為……"
10037030-316 = "赤冬與山海經的相互見證──即山海經與赤冬的相遇。"
10037030-317 = "終究還是要走上這條路嗎，門主大人。"
10037030-320 = "……"
10037030-321 = "何謂「忠義」，而這個時代的忠義又該如何實踐……"
10037030-322 = "不容易啊，真是不容易。#n人生如戲，戲如人生。"
10037030-326 = "但可以確定的是，若在該行動時不採取行動，才恰恰是不忠的證明。"
10037030-331 = "[log=카구야]……此般景色令人陶醉。[/log]"
10037030-333 = "[log=카구야]不覺間已抵達山麓。[/log]"

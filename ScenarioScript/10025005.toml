[translation]
10025005-1 = "บทเริ่มต้น;กุ้งที่หายไป"
10025005-2 = "โคะอุซางิ การ์เด้น"
10025005-6 = "ร้อน..."
10025005-7 = "ร้อนมากเลยนะคะ......"
10025005-8 = "ร้อนจนเหมือนตัวจะละลายได้เลย..."
10025005-13 = " ...ขณะนี้เวลา 13.05 น. ค่าเฉลี่ยอุณหภูมิที่ค่ายทหาร RABBIT อยู่ที่ประมาณ 35 องศาเซลเซียส..."
10025005-18 = "แอร์เคลื่อนที่สำหรับตั้งแคมป์ที่ยกมาคราวก่อนอยู่ไหนเนี่ย? ฉันจำได้ว่าคราวก่อนใช้คูลเลอร์ทำความ#nเย็นแทนตอนที่เวิร์กสเตชั่นโอเวอร์ฮีตน่ะ..."
10025005-19 = "อันนั้น... มันพังไปแล้วตอนที่เกิดน้ำท่วมใหญ่น่ะค่ะ"
10025005-20 = "ฮือ... คิดแล้วเชียวว่าจะต้องเป็นแบบนี้..."
10025005-22 = "พวกเราถูกทิ้งไว้ใต้แสงแดดร้อนๆ แบบนี้ แล้วสุดท้ายก็จะแห้งตายไปเหมือนปลาดาวเกยตื้น..."
10025005-28 = "ไม่มีปัญหาอะไรเป็นพิเศษ ปัญหาใหญ่ก็คือ..."
10025005-35 = "โอ๊ย— ร้อนจนหงุดหงิดไปหมดแล้วเนี่ย!"
10025005-36 = "เลิกบ่นกันสักทีเถอะน่า!"
10025005-37 = "ทำไมถึงมานั่งบ่นกันแบบนี้ล่ะ? อากาศมันไม่ได้จู่ๆ ก็ร้อนขึ้นมาสักหน่อย?"
10025005-38 = "โดยเฉพาะโมเอะ ปกติเธอทดสอบระเบิดเล่นบ่อยๆ มันก็ต้องอยู่ใกล้ไฟอยู่แล้วสิ..."
10025005-39 = "อากาศของฤดูร้อนกับความร้อนของระเบิดมันต่างกันจะตายไป?!"
10025005-40 = "ถึงฉันจะหลงรักความร้อนแรงของเปลวไฟแค่ไหน แต่ต้องอยู่กลางลมร้อนๆ พัดไปมาจนเนื้อจะสุกแล้ว#nแบบนี้ไม่ไหวหรอก"
10025005-41 = "แน่นอนว่าในแง่ของการทำลายล้าง ความร้อนที่เหมือนจะหลอมละลายกันได้แบบนี้ก็ไม่ได้แย่อะไร... แฮ่กๆ... แฮ่ก.."
10025005-42 = "จริงๆ เลย พวกเราไม่ได้เพิ่งเคยเจออากาศในฤดูร้อนกันสักหน่อย โวยวายไม่เข้าเรื่องอยู่ได้"
10025005-43 = "ถ้าทำเป็นไม่สนใจและคิดเรื่องอื่นแทน แม้แต่ไฟก็ยังเย็นได้เลย ถ้าสงบจิตสงบใจและตั้งสมาธิละก็..."
10025005-48 = "...วันนี้มันร้อนเกินไปจริงๆ ด้วยแฮะ"
10025005-49 = "ซากิ ถ้าอยู่กลางแดดร้อนๆ นานๆ อาจจะเป็นลมแดดได้ วันนี้พอเท่านี้แล้วไปนั่งพักใต้ต้นไม้กันเถอะค่ะ"
10025005-50 = "...เข้าใจแล้ว ถ้างั้นภารกิจเฝ้าระวังวันนี้สิ้นสุดลงเพียงเท่านี้แล้วกัน"
10025005-61 = "เฮ้อ... ความร้อนจากอุปกรณ์ไฟฟ้าที่อยู่ในเต้นท์สื่อสารทำเอาไม่อยากเข้าไปในนั้นเลยแฮะ"
10025005-62 = "แต่ว่าในฤดูหนาวถ้ากอดมอนิเตอร์ไว้ก็จะรู้สึกอุ่นดี... เพราะแบบนี้ไงฉันถึงไม่ชอบฤดูร้อนน่ะ"
10025005-63 = "ฉะ...ฉันเองก็ชอบฤดูหนาวมากกว่าฤดูร้อนเหมือนกัน"
10025005-64 = "เพราะพื้นที่เหมาะๆ ที่ทัศนวิสัยกว้าง มักจะเป็นบริเวณที่แดดส่องถึงบ่อยๆ..."
10025005-65 = "ถ้าใส่ชุดพรางตัวแล้วนอนเฉยๆ ใต้แสงแดดร้อนระอุของฤดูร้อนละก็... มะ...มันก็เหมือนกับนั่งอยู่ใน#nเตาอบเลย... ฉันทนไม่ค่อยไหวน่ะ..."
10025005-67 = "ฉันเองเวลาร้อนแล้วตัวจะเลอะเทอะง่ายก็เลยไม่ค่อยชอบฤดูนี้เหมือนกันค่ะ"
10025005-68 = "และในสถานการณ์ที่ไม่มีอุปกรณ์ทำความเย็นแบบนี้... อาหารก็จะเน่าเสียเร็วขึ้นด้วยค่ะ"
10025005-70 = "ใช่แล้วละ"
10025005-71 = "ข้าวกล่องที่ถูกทิ้งจากร้านสะดวกซื้อเสียเร็วขึ้นกว่าที่คิด... พวกเราก็เลยต้องอดข้าวกันทั้งวันเลย"
10025005-73 = "ทั้งที่เพิ่งรับมาได้แค่วันเดียวแท้ๆ แต่ข้าวกลับเริ่มบูดซะแล้ว..."
10025005-75 = "เลยต้องกลั้นใจทิ้งข้าวกล่องหมูผัดซอสที่มีค่าไปทั้งน้ำตาแบบนี้..."
10025005-76 = "เฮ้อ เกลียดหน้าร้อนจริงๆ..."
10025005-77 = "พอมาคิดดูแล้ว เป็นเพราะอากาศร้อนรึเปล่านะ? ช่วงนี้ไม่ค่อยเห็นข้าวกล่องที่มีกุ้งเลย"
10025005-78 = "ส่วนตัวแล้ว ฉันชอบแซนด์วิชกุ้งที่ร้านมักจะทิ้งมาบ้างในบางครั้งน่ะ"
10025005-80 = "แต่ถ้าจะบอกว่าเป็นเพราะอากาศละก็มันไม่น่าจะใช่นะคะ ข้าวกล่องที่มีปลาก็ยังพอเห็นอยู่บ้าง..."
10025005-81 = "สมัยนี้ก็ไม่ได้ใช้รถเข็นหรือรถม้าขนส่งสิ่งของแล้ว จะบอกว่าส่งสินค้าล่าช้าเนื่องจากสภาพอากาศก็ไม่#nน่าจะใช่นะ..."
10025005-82 = "ตอนนี้เราลำบากเพราะไม่มีอุปกรณ์ทำความเย็นก็จริง แต่พวกบริษัทขนส่งสินค้าจะใช้รถห้องเย็น#nสำหรับขนส่งอาหารจัดส่งของทะเลจากแหล่งผลิตไปยังร้านสะดวกซื้อที่ต่างๆ"
10025005-83 = "นอกจากนี้ ส่วนใหญ่กุ้งก็จะถูกแช่แข็งทันทีที่จับขึ้นมาจากทะเล เลยเป็นวัตถุดิบชนิดหนึ่งที่เก็บรักษา และขนส่งได้ไม่ยากเย็นอะไร"
10025005-84 = "ถ้าถามว่ากุ้งแช่แข็งเป็นวัตถุดิบที่ดีแค่ไหนละก็... เชฟทำอาหารตะวันตกบางคนก็มักพูดกันว่า 'กุ้งที่สดใหม่จริงๆ ไม่ใช่กุ้งเป็นๆ แต่เป็นกุ้งแช่แข็งต่างหาก' เลยนะ"
10025005-85 = "...ทำไมเธอถึงรู้เรื่องพวกนั้นได้น่ะ? เคยนั่งเรือออกไปจับกุ้งมารึไง?"
10025005-86 = "เมื่อก่อนตอนไปฝึกดำน้ำ ผู้ฝึกสอนเขาเล่าให้ฟังน่ะ?"
10025005-88 = "แต่ว่าก็จริงอย่างที่โมเอะจังบอกนะคะ ช่วงนี้ไม่ค่อยเห็นกุ้งในเขต D.U. เลย"
10025005-89 = "เมื่อวานตอนที่กลับมา เห็นร้านอาหารในเมืองติดป้ายบอกว่า 'กุ้งหมด เมนูกุ้งสั่งไม่ได้' อยู่ที่หน้าร้าน#nด้วยละ"
10025005-90 = "ถ้าวัตถุดิบอาหารทะเลชนิดอื่นๆ เกิดปัญหาเดียวกันก็คงไม่แปลก แต่ว่ามันกลับมีแค่กุ้งที่ขาดตลาด#nแบบนี้น่ะ... มันก็น่าแปลกอยู่นะคะ"
10025005-91 = "หรือว่า... มีองค์กรอาชญากรรมที่ไหนสักแห่งกำลังเล็งเป้าไปที่กุ้งในเขต D.U. น่ะ—"
10025005-93 = "องค์กรอาชญากรรมที่เล็งเป้าหมายไปที่กุ้งแค่นั้นเหรอ...? ทำแบบนั้นแล้วจะได้อะไรขึ้นมากันล่ะ?"
10025005-94 = "ถึงฉันจะเป็นคนเปิดประเด็นขึ้นมาก็เถอะ แต่ถ้าดูราคาตลาดของกุ้งในช่วงที่ผ่านมา ต่อให้ขโมยกุ้งไปก็#nไม่น่าจะทำกำไรอะไรได้มากนักหรอก ถ้าคิดจะหาเงินก็น่าจะขโมยพวกปูหรือหอยเป๋าฮื้อน่าจะดีซะกว่า"
10025005-95 = "ถึงจะไม่รู้รายละเอียดก็เถอะ แต่ปัญหาเล็กๆ น้อยๆ แบบนี้เป็นเรื่องที่เกิดขึ้นบ่อยๆ ในคิโวทอสละนะ"
10025005-96 = "อย่างพวกกลุ่มผู้ก่อการร้ายด้านอาหารที่ระเบิดรถขนกุ้งทิ้งทันทีหลังจากชิมแล้วเจอว่ามันไม่อร่อยน่ะ..."
10025005-97 = "เดี๋ยวก่อนนะ ถ้ามีพวกคนแบบนั้นอยู่จริงๆ ก็ไม่ใช่ปัญหาเล็กๆ น้อยๆ เลยนะ"
10025005-99 = "...นั่นน่ะสิคะ รู้สึกกังวลขึ้นมาเลยค่ะ"
10025005-100 = "ไม่รู้ว่าช่วงนี้เจอเรื่องต่างๆ มาเยอะ เลยกังวลไปหมดทุกเรื่องเลยรึเปล่าน่ะค่ะ"
10025005-106 = "[ns1] \"ว่าไงทุกคน!\"\n[ns2] \"วันนี้อากาศร้อนจังเลยนะ...\""
10025005-110 = "อ๊ะ คุณครูนี่เอง หน้าคุ้นๆ ก็นึกว่าใครซะอีก"
10025005-111 = "อากาศร้อนๆ แบบนี้ มาทำอะไรที่โคะอุซางิ การ์เด้นล่ะ?"
10025005-115 = "[ns3] \"ครูผ่านมาแถวนี้ ก็เลยนึกถึงพวกเธอขึ้นมาน่ะ\"\n[ns4] \"ครูซื้อไอติมจากร้านสะดวกซื้อมาด้วยนะ...\""
10025005-121 = "[ns] \"มากินไอติมด้วยกันมั้ย?\""
10025005-123 = "ค่ะ!"
10025005-130 = "เฮ้อ... เย็นชื่นใจดีจัง..."
10025005-131 = "ไอศกรีมที่กินตอนอากาศร้อนจัดในฤดูร้อนแบบนี้อร่อยที่สุดเลย!"
10025005-132 = "ความเย็นสดชื่นของไอศกรีมแผ่กระจายไปทั่วร่างกาย... รู้สึกเหมือนเข้าไปแช่อยู่ในตู้เย็นเลยละ"
10025005-138 = "ขอบคุณนะคะคุณครู สมาชิกทุกคนกำลังทรมานกับการที่อากาศร้อนจัดอยู่พอดี..."
10025005-139 = "คุณครูซื้อไอศกรีมมาให้แบบนี้ ค่อยคลายร้อนได้หน่อยค่ะ"
10025005-140 = "[s] \"ครูไม่ได้ทำอะไรมากมายเลย\""
10025005-144 = "[ns5] \"แล้ว... เรื่องที่กุ้งในเขต D.U. หายไปคือยังไงเหรอ?\"\n[ns6] \"เรื่องที่กุ้งหายไป หมายถึงยังไงเหรอ?\""
10025005-147 = "อ่า... "
10025005-148 = "ดูเหมือนว่าช่วงนี้ข้าวกล่องเมนูที่ทำจากกุ้งจะหายไปจากร้านสะดวกซื้อน่ะค่ะ"
10025005-157 = "[ns] \"นั่นสินะ ครูเองก็ไม่ได้กินเมนูกุ้งในเขต D.U. นานแล้วเหมือนกัน\""
10025005-159 = "ค่ะ แต่ว่ามันก็อาจจะเป็นแค่ปรากฏการณ์ชั่วคราวก็ได้ ตอนนี้เรายังไม่มีข้อมูลละเอียดๆ เลยต้อง#nเคลื่อนไหวอย่างระวังค่ะ"
10025005-160 = "ยิ่งไปกว่านั้น ถึงจะมีใครเข้ามาแทรกแซงกระบวนการขนส่งกุ้งเพื่อผลประโยชน์แล้วละก็..."
10025005-161 = "มันก็เป็นปัญหาที่ทางฝ่ายที่ดูแลความปลอดภัยทางด้านอาหารของวัลคิรี่หรือองค์การนักเรียนต้องเป็น#nคนจัดการ ไม่ใช่ปัญหาที่ SRT อย่างพวกเราจะเข้าไปยุ่งหรอกค่ะ"
10025005-162 = "ว่าแต่ว่ากุ้งที่ขายอยู่ในเขต D.U. ส่วนใหญ่ขนส่งมาจากหมู่บ้านยาโตอูระที่อยู่ใกล้ๆ ท่าเรือคาเนะซากิ#nใช่มั้ย?"
10025005-163 = "อื้อ ได้ยินว่าที่นั่นมีโรงงานแปรรูปผลิตภัณฑ์อาหารทะเลของบริษัทจำหน่ายผลิตภัณฑ์อาหารทะเล#nชื่อดัง <เรด ฮุก เอ็กซ์เพรส> อยู่ด้วยละ"
10025005-164 = "เดิมทีที่นั่นเป็นหมู่บ้านชาวประมงธรรมดาๆ ไม่มีชื่อเสียงอะไร แต่หลังจากที่มีโรงงานแปรรูปขนาดใหญ่#nเข้าไปตั้งอยู่ที่นั่น ปริมาณการขนส่งสินค้าทางเรือก็เพิ่มขึ้นอย่างรวดเร็ว จนกลายเป็นพื้นที่ส่งออกกุ้งไป#nทั่วเขต D.U. เลยละ"
10025005-168 = "หมู่บ้านชาวประมง ถ้างั้นก็ต้องมีทะเลด้วย—"
10025005-172 = "อ่า... พอนึกถึงภาพทิวทัศน์ที่เย็นสบายตาของทะเล ก็ยิ่งรู้สึกว่าอากาศตอนนี้ร้อนขึ้นกว่าเดิมอีก..."
10025005-173 = "จะว่าไปพอมาย้อนนึกดูแล้วพวกเราก็ไม่ได้ไปทะเลกันนานแล้วนะคะ"
10025005-175 = "เหมือนฉันจะไปครั้งสุดท้ายตอนอยู่ม.ต้นน่ะ"
10025005-176 = "การฝึกทางทะเลของ SRT ส่วนใหญ่ก็ฝึกในสระว่ายน้ำในอาคารซะด้วย..."
10025005-177 = "แต่ว่าพวกเราที่ไม่ได้สังกัดโรงเรียนอะไรเลย การไปทะเลตอนนี้ก็คงเป็นเรื่องยากสินะ..."
10025005-178 = "อืม พวกเราพูดไว้แล้วนี่ว่าจะไม่ออกไปจากสวนสาธารณะจนกว่าจะฟื้นฟูสถาบัน SRT ได้น่ะ"
10025005-179 = "ไปเที่ยวเล่นที่ทะเลตามอำเภอใจโดยไม่เกี่ยวกับปฏิบัติการเลย มันก็ดูจะเกินกำลังไปหน่อย"
10025005-180 = "[s] \"ถ้างั้นตอนนี้พวกเราไปทะเลกันเถอะ!\""
10025005-181 = "คุณครู... ไม่ได้ยินที่พวกเราพูดๆ กันมาเลยรึไง?"
10025005-182 = "ถ้าไม่มีเหตุผลพิเศษอะไร พวกเราจะออกไปนอกสวนสาธารณะนี่ไม่ได้หรอกนะ?"
10025005-183 = "ถ้าหน่วย SRT ที่รับผิดชอบต่อความปลอดภัยของพลเมือง และต้องเข้าควบคุมสถานการณ์อย่างรวดเร็ว#nไม่ว่าในสถานการณ์ไหน ออกไปข้างนอกเมืองและมัวไปเที่ยวสนุกอยู่ที่ทะเลละก็ พลเมืองคนอื่นๆ จะคิดยังไงกัน?"
10025005-184 = "[s] \"ไม่นะ เราไม่ได้ไปเที่ยวพักผ่อนธรรมดาๆ กันสักหน่อย\""
10025005-185 = "ถะ...ถ้างั้นเราจะไปทะเลด้วยเหตุผลอะไรเหรอคะ...?"
10025005-186 = "[s] \"เมื่อกี้บอกว่าเรื่องที่กุ้งหายไปจากเขต D.U. มันน่าสงสัยนี่นา?\""
10025005-190 = "[ns7] \"ปัญหาแบบนี้น่ะ ถ้าไม่ไปตรวจสอบถึงที่ก็หาสาเหตุยากนะ\"\n[ns8] \"เราจะลอบแฝงตัวเข้าไปสืบเรื่องนี้ในหมู่บ้านกัน!\""
10025005-193 = "ไปสืบเบาะแสเรื่องกุ้งที่ทะเลงั้นเหรอ...?"
10025005-194 = "...สิ่งที่คุณครูพูดมาก็มีเหตุผลนะคะ"
10025005-195 = "หนึ่งในภารกิจของหน่วยรบพิเศษคือการอำพรางตัวตนและลอบเข้าไปในพื้นที่และกำจัดปัจจัยอันตราย#nล่วงหน้า"
10025005-196 = "ฉันจำได้ว่าเคยเห็นพวกรุ่นพี่กองทหาร FOX ปลอมตัวเป็นนักท่องเที่ยวเพื่อไปสำรวจเส้นทางการบุกอยู่#nหลายครั้งเลยค่ะ"
10025005-197 = "แต่ว่า... อย่างที่พวกเราบอกไปเมื่อกี้ ตอนนี้พวกเราแทบไม่มีข้อมูลที่ยืนยันได้เลย เพราะงั้นตอนนี้มัน#nอาจยังไม่ถึงเวลาที่พวกเราจะออกปฏิบัติการก็ได้นะคะ..."
10025005-198 = "นอกจากนี้ หากตรวจสอบแล้วพบว่าเป็นปัญหาชั่วคราวที่เกิดจากปริมาณที่จับได้ลดลง หรือว่าเกิดจาก#nความผิดพลาดในการขนส่งละก็..."
10025005-199 = "[s9] \"ถึงตอนนั้น เราก็เที่ยวชิลๆ ก็ได้นี่นา\"\n[s10] \"ไหนๆ ก็ไปถึงทะเลแล้วก็สนุกกับทะเลฤดูร้อนแล้วค่อยกลับก็ได้นี่\""
10025005-206 = "...มีเป้าหมายแบบนั้นเองสินะคะ"
10025005-207 = "แน่นอนว่าถ้าไม่มีเหตุผลแบบนั้น ทุกคนก็คงจะไม่ออกไปจากสวนสาธารณะนี่หรอกค่ะ"
10025005-208 = "แต่ว่ากองทหารของ SRT จะออกปฏิบัติการแบบขอไปทีไม่ได้หรอกค่ะ"
10025005-209 = "ทุกคนคะ ช่วยเปลี่ยนเป็นชุดลำลองด้วยค่ะ"
10025005-210 = "ปฏิบัติการครั้งนี้เป็นปฏิบัติการแฝงตัวเพื่อรวบรวมข้อมูลอย่างลับๆ และต้องไม่ให้เป็นที่สนใจของคนใน#nหมู่บ้านด้วย ดังนั้นทุกคนต้องปลอมตัวให้ดูเหมือนเป็นนักท่องเที่ยวทั่วไปค่ะ"
10025005-211 = "...เข้าใจแล้วใช่มั้ยคะ?"
10025005-213 = "รับทราบ!"
10025005-215 = "ถ้างั้นตั้งแต่นี้ไป..."
10025005-216 = "จะเริ่มปฏิบัติการลอบเข้าหมู่บ้านยาโตอูระเพื่อตรวจสอบร่องรอยของกุ้งที่หายไปค่ะ!"

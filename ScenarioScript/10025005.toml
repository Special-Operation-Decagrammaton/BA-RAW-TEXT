10025005-64 = "5;미유;02;시야가 넓게 확보되는 저격 포인트는 볕도 잘 드는 경우가 많으니까……"
10025005-65 = "5;미유;06;여름의 뙤약볕 아래에서 위장복을 입고 가만히 누워 있노라면 오븐 안에 앉아 있는 것 같아서…… 견디기가 어려워……\n#5;em;[속상함]"
10025005-66 = "#all;hide"
10025005-67 = "3;미야코;06;저도 여름은 쉽게 몸이 더러워지기 때문에 그다지 좋아하는 계절이 아닙니다.\n#3;em;…\n#3;a"
10025005-68 = "3;미야코;01;심지어 지금처럼 냉장 시설이 없는 상황에서는…… 음식이 빨리 상하기도 하니까요."
10025005-69 = "#all;hide"
10025005-70 = "1;모에;06\n3;사키;06\n5;미유;06\n#1;h\n#3;h\n#5;h\n#1;greeting\n#3;greeting\n#5;greeting\n#na;일동;맞아."
10025005-71 = "1;모에;05;지난번에도 편의점에서 받아온 폐기 도시락이 예정보다 일찍 상하는 바람에 한나절을 쫄쫄 굶어야 했던 적이 있었으니까.\n#1;em;[!]"
10025005-72 = "#all;hide"
10025005-73 = "3;미야코;06;받아온 지 하루밖에 지나지 않은 도시락이었는데, 밥에서 쉰내가 나기 시작해서……\n#3;em;…"
10025005-74 = "#all;hide"
10025005-75 = "1;모에;06\n5;미유;06\n3;사키;06;눈물을 머금고 귀한 불고기 도시락을 네 개나 버렸었지……"
10025005-76 = "5;미유;04;역시 여름은 싫어……\n#5;em;[속상함]\n#5;stiff"
10025005-77 = "1;모에;02;그러고보니 더운 날씨 때문에 그런가? 요새는 새우가 들어간 도시락이 잘 안 보이네.\n#1;em;[?]\n#1;m3\n#3;dr\n#5;dr"
10025005-78 = "1;모에;13;가끔씩 폐기로 나오던 바질 새우 샌드위치가 개인적으로 꽤 마음에 들었었는데."
10025005-79 = "#all;hide"
10025005-80 = "3;미야코;02;날씨 탓이라고 하기에는 생선 도시락은 꽤 자주 보였던 것 같습니다만……"
10025005-81 = "3;사키;12;수레와 마차로 물건을 옮기는 시대도 아니고, 날씨 때문에 물류에 지장이 생길 리가 없잖아?\n#3;em;[!]"
10025005-82 = "3;사키;05;우리야 냉장 시설이 없으니까 곤란한 것이지만, 편의점에 도시락을 납품하는 기업들은 냉각기가 설치된 냉동 트럭으로 산지부터 편의점까지 해산물을 바로 운송해 온다고."
10025005-83 = "3;사키;99;게다가 새우는 대부분이 배 위에서 잡자마자 바로 냉동하기 때문에, 보관과 운송이 손쉬운 해산물 중 하나야."
10025005-84 = "3;사키;03;냉동 새우의 선도가 얼마나 좋냐 하면 양식 요리를 하는 셰프들 사이에서는 '가장 신선한 새우는 생새우가 아닌 냉동 새우'라는 말도 있을 정도니까.\n#3;em;[반짝]"
10025005-85 = "1;모에;15;……너는 도대체 왜 그런 사실을 알고 있는 거야? 옛날에 새우잡이 어선이라도 탔던 거야?\n#1;em;[?]\n#3;m5\n#1;ar"
10025005-86 = "3;사키;12;예전에 스쿠버 다이빙 교육을 받을 때 교관에게 들은 것 뿐이거든?"
10025005-87 = "#all;hide"
10025005-88 = "3;미유;01;하지만 모에 쨩의 말처럼 요새는 D.U.에서 새우가 거의 보이지 않는 것 같아."
10025005-89 = "3;미유;02;어제도 돌아오는 길에도 시내의 음식점에 '새우는 품절이라 주문할 수 없습니다'라고 안내문이 쓰여 있는 걸 보았는걸."
10025005-90 = "5;미야코;02;다른 해산물에도 같은 문제가 생겼다면 몰라도, 새우의 유통에만 문제가 생겼다니…… 뭔가 수상하네요.\n#5;al\n#5;em;[반응]\n#3;m1"
10025005-91 = "5;미야코;04;설마, D.U.에서 유통되는 새우를 노리고 어딘가의 범죄 조직이 개입했다든가—"

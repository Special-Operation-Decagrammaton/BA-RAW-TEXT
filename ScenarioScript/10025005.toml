[translation]
10025005-1 = "Prologue;Missing Shrimp"
10025005-2 = "Kousagi Park"
10025005-6 = "Too hot..."
10025005-7 = "It really is hot."
10025005-8 = "I feel like I'm melting..."
10025005-13 = "...Current time is 1305 hours. Surface temperature at RABBIT camp is 35 degrees Celsius..."
10025005-18 = "What happened to that camping air conditioner we had? It worked pretty well when I needed to cool down my workstation."
10025005-19 = "It was damaged during the last rain."
10025005-20 = "Ugh... I knew this would happen..."
10025005-22 = "We're stranded out here in the sun. And soon, we'll die out here, like starfish at low tide, dried to crisps..."
10025005-28 = "No perimeter breaches to report. Besides that..."
10025005-35 = "Guh! This heat is driving me nuts!"
10025005-36 = "Enough complaining, already! We're all suffering here!"
10025005-37 = "What has gotten into all of you? It's not like the weather changed out of nowhere!"
10025005-38 = "That goes double for you, Moe. You're constantly lighting things on fire and setting off bombs..."
10025005-39 = "Summer heat and bomb heat are two totally different things!"
10025005-40 = "There's nothing I love more than firepower, but I refuse to be slowly cooked by this hot wind."
10025005-41 = "Now that you mention it, though... I wonder if I could weaponize a wind like this... *pant* *pant*"
10025005-42 = "Geez. You act like you've never experienced summer before."
10025005-43 = "You need to clear your mind. Stay calm and focus, and even a fire will feel cool..."
10025005-48 = "...Okay, it's pretty hot today..."
10025005-49 = "Saki, come out of the sun before you catch heatstroke."
10025005-50 = "Understood. Will be completing perimeter guard duty from inside for today."
10025005-61 = "Gah... I'm afraid to go into the communication tent. All the electronics're turning it into an oven..."
10025005-62 = "In the winter, I can hug my monitor to stay warm... I hate summer."
10025005-63 = "I-I think I like winter more, too..."
10025005-64 = "When I'm posted in an open field, a lot of the time I take up position where there's no shade..."
10025005-65 = "Lying out there in my camouflage, with the summer sun beating down... It's like I'm on a grill..."
10025005-67 = "Summer isn't my favorite, either. It's harder to keep clean."
10025005-68 = "And out here without any proper food storage, our rations go bad very quickly."
10025005-70 = "Agreed."
10025005-71 = "The other day we were starving 'cause all the bentos we scavenged had already gone bad..."
10025005-73 = "They weren't even a day past their sell-by date, and already the rice smelled spoiled..."
10025005-75 = "There were four yakiniku bentos that day...and we had to throw them all away..."
10025005-76 = "I hate summer..."
10025005-77 = "Y'know what I noticed? There haven't been any shrimp bentos lately. Is that 'cause of the weather, too?"
10025005-78 = "Sometimes we'd find a shrimp sandwich with the discarded bentos. I kinda liked those."
10025005-80 = "It can't be the weather, can it? I'm still seeing fish bentos, after all."
10025005-81 = "In the past, they couldn't bring fresh seafood this far inland without it spoiling, but that shouldn't be an issue today."
10025005-82 = "We may not have refrigerators, but the companies bringing seafood to the convenience stores have freezers in their trucks."
10025005-83 = "And shrimp is especially easy to store and transport, as they're usually frozen on the fishing boat as soon as they're caught."
10025005-84 = "There's a saying among chefs that the freshest shrimp aren't live shrimp, but frozen ones."
10025005-85 = "...How in the world do you know all that? Were you a shrimp fisher in a past life?"
10025005-86 = "My instructor during SCUBA training told me about it."
10025005-88 = "But I feel like I haven't seen any shrimp in the D.U. lately either."
10025005-89 = "I was coming back to the park the other day, and a restaurant had a sign up saying that shrimp were out of stock."
10025005-90 = "It's strange that only shrimp is affected, while other seafood is fine... Very strange."
10025005-91 = "Perhaps a gang is interfering with shrimp distribution in the D.U., or—"
10025005-93 = "But why would they be after just the shrimp? What would their goal be?"
10025005-94 = "Looking at the market prices, I don't think they'd get much just from shrimp. Maybe if it was crabs or abalones..."
10025005-95 = "Nah, this isn't something big like criminal syndicates trying to corner the shrimp market."
10025005-96 = "I bet it's something like...a gourmet food terrorist has a vendetta against bad shrimp, so they're stealing shrimp trucks and blowing 'em up..."
10025005-97 = "If a terrorist is involved, I'd say that qualifies as \"something big.\""
10025005-99 = "...Yes, that is a bit of a stretch."
10025005-100 = "We've all been through a lot. It's possible we're overreacting..."
10025005-106 = "[ns1] \"Hello, all!\"\n[ns2] \"Hot day, innit?\""
10025005-110 = "Oh, Sensei. I thought I detected a familiar perimeter breach."
10025005-111 = "What brings you to Kousagi Park on this hot day?"
10025005-115 = "[ns3] \"I was just passing by.\"\n[ns4] \"I figured you girls could use a pick-me-up.\""
10025005-121 = "[ns] \"Anyway, how would you like some ice cream?\""
10025005-123 = "Yes, please!"
10025005-130 = "Ahh... That's the stuff..."
10025005-131 = "Enjoying ice cream in the shade on a hot day. It can't be beat!"
10025005-132 = "The coldness of the ice cream is spreading through my whole body... It's like I'm hiding in a refrigerator..."
10025005-138 = "Thank you, Sensei. This heat has been giving us a hard time..."
10025005-139 = "It's much better now, thanks to you."
10025005-140 = "[s] \"Oh, it was nothing.\""
10025005-144 = "[ns5] \"Anyway, I couldn't help but overhear you...\"\n[ns6] \"What's this about shrimp missing from the D.U.?\""
10025005-147 = "Ah, that... We don't have any evidence yet."
10025005-148 = "But we've noticed that the convenience stores haven't been stocking shrimp bentos lately."
10025005-157 = "[ns] \"Now that you mention it, I can't remember the last time I had shrimp.\""
10025005-159 = "Exactly. Maybe it's a temporary shortage. Without any concrete information, we can't really do anything..."
10025005-160 = "And even if someone is behind this shrimp shortage and they're making an illegal profit from it somehow..."
10025005-161 = "That would fall under the General Student Council's jurisdiction, or maybe Valkyrie's food safety club. Not SRT's."
10025005-162 = "Hey, don't they catch shrimp in Yatoura Village? Out by Kanesaki Port?"
10025005-163 = "Yes. That big distribution company, Red Hook Express, has a fish processing plant there."
10025005-164 = "It used to be a sleepy little fishing village, but ever since the plant opened up, it's supplied all of the D.U.'s shrimp."
10025005-168 = "A fishing village... The beach..."
10025005-172 = "Ugh... Thinking of those cool, refreshing places just reminds me of how dang hot it is here..."
10025005-173 = "You know, it's been a while since I've been to the beach."
10025005-175 = "I haven't gone since I was in SRT."
10025005-176 = "And that was for marine operations training, so we barely had the time to enjoy being at the beach..."
10025005-177 = "But how can we go? We don't even have an academy of our own anymore..."
10025005-178 = "Yes, that's right. We pledged not to leave this park until the academy is rebuilt."
10025005-179 = "It would be wrong for us to leave the park and go on vacation. Unless we had a mission..."
10025005-180 = "[s] \"That settles it. We're going to the beach, everyone!\""
10025005-181 = "Sensei, did you hear what I just said?"
10025005-182 = "We can't leave the park without a special reason!"
10025005-183 = "What would the others think if they saw SRT, which is responsible for the safety of Kivotos' citizens, just abandon their post and go on a vacation to the sea?"
10025005-184 = "[s] \"Who said anything about a vacation?\""
10025005-185 = "Th-Then... Why would we go...?"
10025005-186 = "[s] \"This shrimp situation is very fishy, right?\""
10025005-190 = "[ns7] \"It's impossible to get to the bottom of it if you never leave the park.\"\n[ns8] \"We'll go undercover and solve the mystery of the shrimp!\""
10025005-193 = "Going to the beach...to solve the mystery of the shrimp...?"
10025005-194 = "...You have a point, Sensei."
10025005-195 = "Infiltration and threat neutralization are our responsibilities as a special forces unit."
10025005-196 = "I remember seeing my upperclassmen in FOX Squad go undercover as tourists a few times."
10025005-197 = "However... I'm still not sure we can take action based on a little speculation..."
10025005-198 = "And what would we do if there was nothing to it, and the shrimp were merely misdelivered...?"
10025005-199 = "[s9] \"At least we would know...\"\n[s10] \"In that case, we may as well enjoy our vacation.\""
10025005-206 = "...Was going on vacation the goal all along?"
10025005-207 = "All right. We need some reason to leave the park, I suppose."
10025005-208 = "But we are all that remains of SRT, so we will do this properly."
10025005-209 = "Squad, change into civilian clothes."
10025005-210 = "We will be going undercover for this operation, so we must all disguise ourselves as ordinary tourists."
10025005-211 = "Understood?"
10025005-213 = "Understood!"
10025005-215 = "We will infiltrate Yatoura Village, and we will learn the whereabouts of the missing shrimp. Commencing..."
10025005-216 = "Operation Shrimp Net!"

[translation]
10025005-1 = "序幕;消失的蝦子"
10025005-2 = "兔寶寶公園"
10025005-6 = "好熱……"
10025005-7 = "就是說啊……"
10025005-8 = "感覺要融化了……"
10025005-13 = "現在時間1305……營地RABBIT的地表溫度是35℃……"
10025005-18 = "之前運來的移動式冷氣呢？#n記得有用來幫電腦散熱過吧？"
10025005-19 = "……因為之前的暴風雨故障了。"
10025005-20 = "嗚嗚……我就知道會變成這樣……"
10025005-22 = "再這樣下去，我們就要像擱淺的海星一樣變得乾巴巴的了……"
10025005-28 = "並未發現可疑人物及異常。繼續維持警戒態勢──"
10025005-35 = "啊啊啊啊啊！！#n好熱，我不行了！"
10025005-36 = "你從剛才開始就好吵！別抱怨個不停！"
10025005-37 = "大家怎麼都突然這樣……熱的又不只有今天。"
10025005-38 = "話說萌……#n你平時不就常常火裡來火裡去的，這種程度還是能忍耐的吧。"
10025005-39 = "夏天的熱氣和炸彈的完全不同好嗎！？"
10025005-40 = "就算我熱愛火力，也不能接受被煮熟啊……"
10025005-41 = "不過，能捕捉到這種毀滅性的感覺也不壞就是了……哈啊，哈啊……！"
10025005-42 = "真是的，又不是第一次碰上夏天……太大驚小怪了吧。"
10025005-43 = "只要屏除雜念，即使身在火中也能感到涼快才對。#n像這樣，靜下心來──"
10025005-48 = "…………不，還是很熱。"
10025005-49 = "咲希，繼續待在陽光下也只會消耗體力而已。先到陰涼處休息吧。"
10025005-50 = "……了解。那今天的警戒任務就在裡面進行。"
10025005-61 = "唉……帳篷裡的機械也熱的可怕，完全待不下去啊。"
10025005-62 = "所以我才討厭夏天啊……冬天反而能用排出來的熱來取暖。"
10025005-63 = "嗯……我好像也比較喜歡冬天……"
10025005-64 = "視野良好的狙擊地點通常都比較開闊……"
10025005-65 = "穿上狙擊用的擬態服之後，簡直跟待在烤箱裡一樣……好苦。"
10025005-67 = "……我也覺得夏天時常會流汗，所以不是很喜歡。"
10025005-68 = "而且在現在這種沒有冰箱的狀況下，食物也很容易腐敗。"
10025005-70 = "嗯嗯。"
10025005-71 = "在便利商店拿的報廢便當一下就會壞掉，害我只能下次再去領，挨餓了半天。"
10025005-73 = "不到一天就已經有酸臭味了呢……"
10025005-75 = "害我們不得不含淚丟掉四個燒肉便當……真是令人鼻酸。"
10025005-76 = "果然不喜歡夏天……"
10025005-77 = "不知道是不是太熱的關係……最近好像都沒有看到有放蝦子的便當。"
10025005-78 = "在報廢品裡偶爾會看見的羅勒鮮蝦三明治，我還挺喜歡的說……"
10025005-80 = "這……其他海鮮類都還有看見，好像唯獨缺少了蝦子……"
10025005-81 = "仔細想想還真神奇。#n季節應該不至於影響物流才對……畢竟現在的交通已經相當完善了。"
10025005-82 = "運送用的卡車也都有冷藏設備，#n從產地到工廠，再從工廠到交貨地點的路線都已經是固定的了。"
10025005-83 = "更何況大多數的業者在蝦子被捕上船後就會立刻進行冷凍。"
10025005-84 = "甚至西餐廳的廚師們也一致盛讚「船上瞬間冷凍的蝦子比生蝦還新鮮」哦。"
10025005-85 = "……你為什麼會這麼了解蝦子啊？#n難道在入學SRT之前待過捕蝦船？"
10025005-86 = "只是在潛水實習的時候從教官那裡聽來的而已。"
10025005-88 = "不過……確實跟萌醬說的一樣，最近好像都沒有在D.U.看到蝦子呢。"
10025005-89 = "而且我昨天也在市內的超市看到「蝦子缺貨」的公告。"
10025005-90 = "要是其他海鮮也一樣倒還好說，但只有蝦子的流通出問題……#n總覺得有點可疑。"
10025005-91 = "難道是本應在D.U.流通的蝦子被某個地方的犯罪組織給盯上了──"
10025005-93 = "只盯上蝦子的犯罪組織……？#n這麼做的目的是什麼？"
10025005-94 = "我雖然喜歡蝦子，#n不過既然不惜操作流通量也要哄抬時價的話，被盯上的也該是螃蟹或牡蠣才對吧。"
10025005-95 = "雖然不清楚詳情，但或許是奇普托斯經常發生的狀況之一吧。"
10025005-96 = "比如說……是某個對品質不夠滿意就把卡車給炸了的美食家集團幹的好事，之類的。"
10025005-97 = "不……如果真的有那樣的傢伙存在的話，也不能算是經常發生的狀況吧。"
10025005-99 = "……說的也是。#n肯定是我想太多了。"
10025005-100 = "也許是因為最近發生了太多事，變得有點神經質也說不定。"
10025005-106 = "[ns1]「大家都還好嗎？」\n[ns2]「今天比平常還熱呢。」"
10025005-110 = "哦，我還以為是誰，原來是老師啊。"
10025005-111 = "這麼熱的天來這裡有什麼事？"
10025005-115 = "[ns3]「我有事來到附近，正好想到你們。」\n[ns4]「不小心就買了太多冰淇淋。」"
10025005-121 = "[ns]「可以的話，要不要幫我一起吃？」"
10025005-123 = "要！！！"
10025005-130 = "啊……活過來了。"
10025005-131 = "果然夏天就是要吃冰啊！"
10025005-132 = "冰涼的冰淇淋漸漸滲入身體……有股進到了冰箱裡的感覺……"
10025005-138 = "老師，謝謝你。#n大家都差點要被炎熱的天氣擊倒了……"
10025005-139 = "真是得救了。"
10025005-140 = "[s]「大家能高興就好。」"
10025005-144 = "[ns5]「……你們剛才說在D.U.販售的蝦子都不見了，是怎麼回事？」\n[ns6]「發生什麼事了嗎……？」"
10025005-147 = "啊……那個，雖然還沒有決定性的證據……"
10025005-148 = "不過，感覺最近便利商店的便當裡好像都沒有看到蝦子。"
10025005-157 = "[ns]「聽你這麼一說，我好像有一陣子沒在D.U.吃到蝦子了。」"
10025005-159 = "老師也是嗎？#n不過說不定只是產量暫時減少，而且也沒有掌握到可疑的動向……"
10025005-160 = "更何況，即便真的有人介入蝦子的流通不當牟利……"
10025005-161 = "那也該由聯邦學生會或女武神來處理，並非我們SRT。"
10025005-162 = "這麼說來，D.U.流通的蝦子幾乎都是從鐘崎港附近的夜戶浦村來的對吧？"
10025005-163 = "沒錯。#n聽說專門處理海產的物流公司「Red Hook Express」的工廠就在那個村子裡。"
10025005-164 = "以前雖然只是個小小的漁村，不過在巨大的水產加工廠進駐後，出貨量急遽上升……#n據說現在已經能夠供應D.U.全境的蝦子了。"
10025005-168 = "……漁村，還有大海啊。"
10025005-172 = "嗚……就算浮現涼快的印象，也會被這股炎熱拉回現實。"
10025005-173 = "大家上一次去海邊是什麼時候呢？"
10025005-175 = "我加入SRT之後就沒去過了。"
10025005-176 = "時間都被海洋訓練實習占滿，幾乎沒空去海邊玩樂……"
10025005-177 = "除非讓學園正式復活，否則要去海邊好像有點困難……"
10025005-178 = "是啊。畢竟我們在SRT特殊學園復活之前沒打算離開這座公園。"
10025005-179 = "如果是為了作戰也就罷了，去玩就有點……對吧。"
10025005-180 = "[s]「那要不要大家現在一起去海邊？」"
10025005-181 = "……老師，你沒在聽我們說話嗎？"
10025005-182 = "剛才不是說過除非有特別的理由，否則不能離開這裡了嗎？"
10025005-183 = "為了保護市民的安全，無論面對什麼狀況都必須能迅速出動的SRT學生，#n要是被發現悠哉地跑去海邊玩了該怎麼辦。"
10025005-184 = "[s]「沒問題，因為我們不是去玩的。」"
10025005-185 = "那，那是用什麼理由呢……？"
10025005-186 = "[s]「剛剛不是說D.U.的蝦子物流有點奇怪嗎？」"
10025005-190 = "[ns7]「既然如此，親自到現場確認才是最快的吧。」\n[ns8]「我們直接到漁村去調查蝦子的下落怎麼樣？」"
10025005-193 = "去海邊調查蝦子的下落……？"
10025005-194 = "……老師說的也有道理。"
10025005-195 = "為了解決問題而到現場調查也是特殊部隊的任務之一。"
10025005-196 = "或許會有表明身分後便無從得知的情報，我認為隱藏身分也許比較恰當。#n以前FOX小隊的前輩們似乎是扮成了觀光客。"
10025005-197 = "不過……就和剛才說過的一樣，#n由於幾乎沒有任何情報，所以難以判斷是否需要我們出面。"
10025005-198 = "實際上，有可能單純只是漁獲量減少，或是工廠的設備出了什麼狀況……"
10025005-199 = "[s9]「到時候……」\n[s10]「偶爾到海邊玩樂一下也不錯吧。」"
10025005-206 = "……老師果然很善良呢。"
10025005-207 = "除非是為了執行任務，否則我們是不會長時間離開公園的吧。#n謝謝老師的關心。"
10025005-208 = "但既然是任務，就必須認真面對才行。"
10025005-209 = "請所有人立刻準備替換的衣物。"
10025005-210 = "為了從當地居民的口中獲得正確的情報，我們不能引起懷疑。#n也就是說，有必要融入一般的觀光客。"
10025005-211 = "……大家都聽清楚了嗎？"
10025005-213 = "了解！"
10025005-215 = "那麼現在起，將潛入夜戶浦村並調查蝦子的下落……"
10025005-216 = "開始蝦網作戰！"

10025005-93 = "1;모에;00\n5;사키;04;새우만 골라서 노리는 범죄 조직이 있다고……? 그게 무슨 이득이 되는 거야?"
10025005-94 = "1;모에;03;내가 먼저 말을 꺼내긴 했지만, 최근의 새우 시세를 살펴보았을 때 새우를 훔쳐서 취할 수 있는 이득은 크지 않을 거야. 차라리 게나 전복을 훔치면 모를까.\n#1;em;[재잘]"
10025005-95 = "1;모에;02;자세한 내막은 모르겠지만 이것도 분명 키보토스에서 흔히 벌어지는 사소한 문제들 중 하나겠지."
10025005-96 = "1;모에;07;예를 들자면 새우 트럭만 골라 탈취한 뒤, 맛이 없으면 폭파하는 미식 테러리스트의 소행이라든가……\n#1;em;[음표]"

[translation]
1013205-1 = "My Turn Now!"
1013205-2 = "Restaurant"
1013205-3 = "I went to the hotel at 1PM and met Tsukuyo at a high-end restaurant."
1013205-4 = "H-Hello, Sensei!"
1013205-5 = "Are you...hungry?"
1013205-6 = "I-I hope you are!"
1013205-7 = "[s] \"I should be!\""
1013205-8 = "It's just because...I've been getting so many free meals from you lately."
1013205-9 = "So I really wanted to take this opportunity to return the favor...!"
1013205-10 = "Th-That's why I brought you here!"
1013205-11 = "[s] \"Isn't this place...quite expensive, though?\""
1013205-12 = "Heehee, that's quite all right."
1013205-13 = "I've made so much money with my recent modeling jobs, you know."
1013205-14 = "And, most importantly, the lunch menu is considerably more affordable than the dinner menu!"
1013205-15 = "I'll get an additional discount if I leave a review, and I even have a coupon that's about to expire!"
1013205-19 = "Oh, I hope I don't sound like a cheapskate!"
1013205-20 = "[s] \"There's nothing wrong with being frugal!\""
1013205-21 = "Y-You really think so...?"
1013205-22 = "Thank you, Sensei!"
1013205-23 = "Now then, let's look at the menu—"
1013205-29 = "Oh, pardon me, Sensei."
1013205-34 = "H-Hello?"
1013205-41 = "Oh, yes. Um... I'm sorry, I don't think I'll..."
1013205-42 = "What? You want ME as the main model?"
1013205-43 = "W-Well, it's just that..."
1013205-44 = "Yes, right, sorry... Yes..."
1013205-48 = "[ns] \"What was the call for?\""
1013205-49 = "Oh, um, it was the manager from before. The one who keeps finding me jobs..."
1013205-50 = "He wanted to know if I could work as a \"fitting model\" this time..."
1013205-51 = "...But, to be honest, this has all been so overwhelming lately. I'm going to turn him down."
1013205-52 = "Um, anyway, how about we look at the menu?"
1013205-53 = "What looks good, Sensei?"
1013205-55 = "...I enjoyed my meal with Tsukuyo."
1013205-56 = "After a short walk, we wandered through the department store connected to the restaurant."
1013205-58 = "Department Store Basement"
1013205-60 = "Um, Sensei. I hope the food was to your liking..."
1013205-61 = "[s1] \"It was the best...\"\n[s2] \"All of the dishes were delicious!\""
1013205-64 = "Heehee, I-I'm so glad to hear that...!"
1013205-65 = "Well...now that we've had our meal, would you like some dessert?"
1013205-66 = "A new hand-crafted ice cream shop recently opened..."
1013205-67 = "They focus entirely on artisanal flavors and taste, not nutritional value!"
1013205-68 = "[s] \"I'm not sure that's the best idea!\""
1013205-69 = "S-Still, a lot of people say it's quite delic—"
1013205-71 = "...Why am I so tall? Why me?"
1013205-75 = "Huh...?"
1013205-78 = "Look! See, none of the cute clothes fit my lanky body type."
1013205-79 = "It's the same with my shoes. None of the cute ones will fit my giant feet."
1013205-80 = "M-Maybe we can still put something together?"
1013205-81 = "Even if we did find something, I'm still the same..."
1013205-82 = "With how huge my body is, nothing will ever look good!"
1013205-83 = "Like, just look at the mannequins. None of them would even come up to my shoulder! I'm just too tall!"
1013205-84 = "Well, you ARE tall, but..."
1013205-88 = "Um, Sensei."
1013205-89 = "Do you mind if I make a quick phone call?"
1013205-90 = "[s] \"Please go ahead.\""
1013205-91 = "Excuse me..."
1013205-96 = "Yes, sir. It's Tsukuyo."
1013205-97 = "Are you still looking for a fitting model? Yes, yes... Wonderful. Thank you!"
1013205-101 = "[ns] \"Tsukuyo, that call just now...\""
1013205-102 = "Yes, I accepted the fitting model job."
1013205-103 = "I-It's just that...I realized that not many girls look like me. But some do."
1013205-104 = "...And I thought that being a model might help them feel a little more seen. More...normal!"
1013205-105 = "I want to show them that they can feel beautiful in an outfit...no matter their size!"
1013205-106 = "...Do you think I'm being too presumptuous?"
1013205-107 = "[s3] \"Absolutely not!\"\n[s4] \"The best model in all of Kivotos shouldn't doubt herself!\""
1013205-110 = "I-I think that's a bit too excessive...!"
1013205-111 = "Well, I, it's just...um..."
1013205-112 = "...We can enjoy ice cream another day, I think."
1013205-116 = "A few days later..."
1013205-118 = "Department Store Basement"
1013205-121 = "(They hung my photo in the front window of the clothing store?)"
1013205-122 = "(Ugh... I know it's what I signed up for, but it's so embarrassing.)"
1013205-123 = "(...Still, I wonder if I did the right thing...?)"
1013205-128 = "Hey, look at that poster. This is a new model, right?"
1013205-134 = "Oh?"
1013205-135 = "You're right... Wow, she's super tall! Looks pretty...familiar, huh?"
1013205-136 = "Hey...you're right."
1013205-137 = "See, what did I tell you? Even if you're tall, you can still look cool and elegant! It might even help!"
1013205-141 = "...Yeah. I guess maybe there is hope, huh?"
1013205-145 = "...Heehee."

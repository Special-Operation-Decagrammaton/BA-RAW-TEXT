[translation]
1013205-1 = "ถะ... ถึงตาฉันแล้วค่ะ!"
1013205-2 = "ภัตตาคาร"
1013205-3 = "(คุณครูมาเจอกับสึคุโยะที่ภัตตาคารหรูในห้างสรรพสินค้าตอนบ่ายโมง)"
1013205-4 = "สะ... สวัสดีค่ะ คุณครู!"
1013205-5 = "หิว... ใช่มั้ยคะ?"
1013205-6 = "ตะ... ต้องหิวนะคะ!"
1013205-7 = "[s] \"ต้องหิวเหรอ?!\""
1013205-8 = "กะ... ก็หมู่นี้คุณครูเลี้ยงข้าวฉันตลอดเลยนี่คะ"
1013205-9 = "ฉันก็เลยอยากเลี้ยงอาหารเป็นการตอบแทนคุณครูสักครั้ง..."
1013205-10 = "วะ... วันนี้ฉันก็เลยเชิญคุณครูมาที่นี่ยังไงล่ะคะ!"
1013205-11 = "[s] \"แต่อาหารที่นี่... น่าจะแพงเลยไม่ใช่เหรอ?\""
1013205-12 = "แหะๆ ไม่เป็นไรค่ะ"
1013205-13 = "ฉันได้ค่าจ้างจากการเป็นนางแบบมา..."
1013205-14 = "และที่สำคัญที่สุด มื้อกลางวันของภัตตาคารนี้ราคาถูกมากเมื่อเทียบกับมื้อเย็นค่ะ!"
1013205-15 = "อีกอย่าง ถ้าเข้าร่วมอีเวนต์รีวิวอาหารก็จะได้ส่วนลดเพิ่ม แล้วฉันก็มีคูปองที่จะหมดอายุในไม่กี่วันด้วย..."
1013205-19 = "นะ... นี่ฉันขี้เหนียวเกินไปหรือเปล่าคะ...!"
1013205-20 = "[s] \"การประหยัดไม่ใช่เรื่องน่าอายหรอกนะ...!\""
1013205-21 = "คะ... คงเป็นอย่างนั้นใช่มั้ยคะ?"
1013205-22 = "ขอบคุณนะคะ คุณครู!"
1013205-23 = "ถ้างั้นเรามาเลือกเมนู..."
1013205-29 = "อ๊ะ เดี๋ยวนะคะ คุณครู"
1013205-34 = "ฮะ... ฮัลโหล?"
1013205-41 = "อ่า ค่ะ... ขอโทษนะคะ ครั้งนี้ฉันคง..."
1013205-42 = "คะ? จะให้ฉันไปเป็นนางแบบให้แบรนด์เหรอคะ?"
1013205-43 = "ตะ... แต่ว่า ครั้งนี้ฉัน..."
1013205-44 = "ค่ะ ขอโทษด้วยนะคะ ค่ะ..."
1013205-48 = "[ns] \"มีเรื่องอะไรเหรอ?\""
1013205-49 = "อ้อ ผู้จัดจากคราวที่แล้วน่ะค่ะ"
1013205-50 = "เขาถามว่าฉันสะดวกรับงานนางแบบฟิตติ้งหรือเปล่า..."
1013205-51 = "แต่ฉันลำบากใจนิดหน่อย ครั้งนี้ก็เลยว่าจะปฏิเสธค่ะ..."
1013205-52 = "ช่างเถอะค่ะ เรามาเลือกเมนูกันต่อเถอะค่ะ"
1013205-53 = "คุณครูชอบทานอาหารแบบไหนเหรอคะ?"
1013205-55 = "(หลังจากทานอาหารกับสึคุโยะอย่างเอร็ดอร่อย)"
1013205-56 = "(คุณครูกับสึคุโยะก็ไปเดินย่อยในห้างสรรพสินค้าด้วยกัน)"
1013205-58 = "ชั้นใต้ดิน ห้างสรรพสินค้า"
1013205-60 = "คุณครูคะ เมื่อกี้อาหารถูกปากหรือเปล่าคะ...?"
1013205-61 = "[s1] \"อร่อยเหาะไปเลยละ!\"\n[s2] \"อร่อยทุกจานเลย!\""
1013205-64 = "แหะๆ ละ... โล่งอกไปทีนะคะที่อาหารถูกปากคุณครู...!"
1013205-65 = "งะ... งั้นเราไปทานของหวานต่อกันมั้ยคะ?"
1013205-66 = "ตรงโน้นมีร้านไอศกรีมโฮมเมดที่เพิ่งมาเปิดใหม่พอดี..."
1013205-67 = "ได้ยินว่าสโลแกนของร้านก็คือ เน้นรสชาติเป็นหลัก ส่วนเรื่องคุณค่าทางโภชนาการเอาไว้ก่อน!"
1013205-68 = "[s] \"จรรยาบรรณวิชาชีพแบบนี้มันดีมั้ยนะ...!\""
1013205-69 = "ตะ... แต่ก็มีรีวิวที่บอกว่าอร่อยเยอะเลยนะคะ..."
1013205-71 = "เซ็งจัง... ทำไมฉันถึงเกิดมาตัวสูงแบบนี้นะ"
1013205-75 = "หืม...?"
1013205-78 = "ก็ดูสิ เสื้อผ้าสวยๆ พวกนี้ไม่มีตัวไหนที่ฉันใส่ได้เลย"
1013205-79 = "รองเท้าก็ด้วย ไม่มีรองเท้าสวยๆ คู่ไหนที่พอดีกับเท้าฉันเลย"
1013205-80 = "ตะ... แต่แค่เลือกเสื้อผ้าตัวที่ใส่ได้พอดี ยังไงก็น่าจะออกมาสวยอยู่แล้วไม่ใช่เหรอ?"
1013205-81 = "ต่อให้ใส่ได้ก็เป็นปัญหาอยู่ดีนั่นละ"
1013205-82 = "ฉันเป็นคนร่างใหญ่ ไม่ว่าจะใส่อะไรก็ไม่สวยหรอก"
1013205-83 = "ดูหุ่นโชว์ในร้านขายเสื้อผ้าตรงนั้นสิ ไม่มีหุ่นตัวไหนที่สูงเท่าฉันเลยไม่ใช่เหรอ?"
1013205-84 = "มันก็จริงอยู่หรอก..."
1013205-88 = "เอ่อ... คุณครูคะ"
1013205-89 = "ฉันขอออกไปโทรศัพท์สักครู่ได้มั้ยคะ?"
1013205-90 = "[s] \"ได้แน่นอนอยู่แล้ว\""
1013205-91 = "ถ้างั้น ขอตัวนะคะ..."
1013205-96 = "ค่ะ คุณผู้จัด ฉันสึคุโยะนะคะ"
1013205-97 = "เรื่องนางแบบฟิตติ้งที่เสนอเมื่อกี้ ฉันยังพิจารณาได้หรือเปล่าคะ? ค่ะ ค่ะ... ค่ะ ขอบคุณนะคะ!"
1013205-101 = "[ns] \"สึคุโยะ ที่ไปคุยโทรศัพท์มาเมื่อกี้...\""
1013205-102 = "ค่ะ ฉันรับข้อเสนองานนางแบบฟิตติ้งมาค่ะ"
1013205-103 = "พะ... เพราะฉันคิดว่านั่นอาจเป็นสิ่งที่ช่วยปลอบใจผู้หญิงรูปร่างใหญ่..."
1013205-104 = "รวมถึงนักเรียนคนเมื่อกี้ที่ตัวสูงเหมือนฉันด้วยค่ะ..."
1013205-105 = "ต่อให้รูปร่างใหญ่ แต่ถ้าเราใส่ใจเรื่องการแต่งกาย ไม่ว่ายังไงเราก็สวยเหมือนคนอื่นได้ค่ะ...!"
1013205-106 = "นี่ฉันพาออกนอกเรื่องไปหน่อยหรือเปล่าคะ...?"
1013205-107 = "[s3] \"ไม่นอกเรื่องหรอก! คุณสุดยอดนางแบบ!\"\n[s4] \"นี่เป็นความเห็นของสุดยอดนางแบบของคิโวทอสทั้งทีนะ!\""
1013205-110 = "เฮือกกก...! อย่าชมกันขนาดนั้นสิคะ...!"
1013205-111 = "อ่า คะ... คือว่า... วันนี้ฉัน..."
1013205-112 = "คงต้องงดกินไอศกรีมก่อนค่ะ..."
1013205-116 = "(ไม่กี่วันหลังจากนั้น)"
1013205-118 = "ชั้นใต้ดิน ห้างสรรพสินค้า"
1013205-121 = "(ระ... รูปของฉันได้อยู่หน้าร้านขายเสื้อผ้าจริงๆ ด้วย...!)"
1013205-122 = "(อึกก... ถึงจะเดาไว้แล้ว แต่ยังไงก็อายอยู่ดีค่ะ...!)"
1013205-123 = "(จะว่าไป... นี่ฉันทำถูกแล้วหรือเปล่า...?)"
1013205-128 = "นี่ ดูโปสเตอร์ตรงนี้สิ สงสัยแบรนด์นี้จะเปลี่ยนนางแบบนะ?"
1013205-134 = "โอ๊ะ?"
1013205-135 = "แต่ว่า... นางแบบคนนี้ตัวสูงไปหน่อยหรือเปล่า?"
1013205-136 = "อ่า... นั่นสินะ...?"
1013205-137 = "เห็นมั้ยล่ะ ฉันก็บอกไว้แล้วว่าต่อให้จะสูงใหญ่แค่ไหน ก็แต่งตัวให้ดูดีและมีสไตล์ได้"
1013205-141 = "นั่นสิ... ตัวสูงเกินไปก็ใช่ว่าจะเป็นข้อด้อยหรอกเนอะ"
1013205-145 = "แหะๆ..."

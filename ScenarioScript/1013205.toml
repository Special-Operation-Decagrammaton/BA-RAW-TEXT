[translation]
1013205-1 = "這，這次輪到我了！"
1013205-2 = "餐廳"
1013205-3 = "（下午一點，在百貨公司裡的高級餐廳和月夜見面）"
1013205-4 = "老，老師午安！"
1013205-5 = "您……肚子餓了吧？"
1013205-6 = "一，一定要餓才行哦！"
1013205-7 = "[s]「一定要餓！？」"
1013205-8 = "其，其實，因為最近一直被老師請客的關係……"
1013205-9 = "我真的很想招待老師吃頓飯……！"
1013205-10 = "所，所以才會邀請老師來這邊！"
1013205-11 = "[s]「但是這裡……不是很貴嗎？」"
1013205-12 = "耶嘿嘿，沒關係的。"
1013205-13 = "最近因為模特兒的工作，有賺到一點錢……"
1013205-14 = "而且這裡的午餐比晚餐便宜很多！"
1013205-15 = "參加評論活動還會有額外的折扣，我剛好也有幾張快過期的折價券……"
1013205-19 = "那，那個……我這樣是不是太吝嗇了……！"
1013205-20 = "[s]「勤儉的態度並不可恥……！」"
1013205-21 = "是，是嗎……？"
1013205-22 = "謝謝老師！"
1013205-23 = "好，那我們來點餐吧……"
1013205-29 = "啊，麻煩稍等一下，老師。"
1013205-34 = "你，你好？"
1013205-41 = "啊，是的，那個……對不起，這一次……"
1013205-42 = "嗯？要找我當代表模特兒？"
1013205-43 = "那，那個，這次真的……"
1013205-44 = "好的，不好意思……"
1013205-48 = "[ns]「是誰打來的？」"
1013205-49 = "啊，是上次那位社長。"
1013205-50 = "他問我這一次能不能當試穿的模特兒……"
1013205-51 = "……因為壓力有點大，這次就拒絕了。"
1013205-52 = "那麼，我們繼續點餐吧？"
1013205-53 = "老師喜歡哪一種呢？"
1013205-55 = "（就這樣和月夜愉快地用了餐）"
1013205-56 = "（之後走進了與餐廳相連的百貨公司，順便散散步）"
1013205-58 = "百貨公司地下購物中心"
1013205-60 = "老師，餐點還合您的胃口嗎……？"
1013205-61 = "[s1]「真的很棒……」\n[s2]「每一道菜都很好吃！」"
1013205-64 = "嘿嘿，您能喜歡真是太好了……！"
1013205-65 = "那，那麼既然吃過正餐了，要不要來吃點甜點？"
1013205-66 = "那邊新開了一間手工冰淇淋店……"
1013205-67 = "據說他們完全不考慮營養價值，只致力於追求美味哦！"
1013205-68 = "[s]「這樣到底是有職業道德，還是沒有呢……！」"
1013205-69 = "有，有很多人都評價說非常好吃……"
1013205-71 = "討厭……為什麼我長得這麼高啊。"
1013205-75 = "嗯……？"
1013205-78 = "你看，漂亮的衣服根本沒有我穿得下的。"
1013205-79 = "還有鞋子也是。#n每雙好看的鞋子都沒有我的尺寸。"
1013205-80 = "那，那用穿得下的衣服，試著好好搭配一下呢？"
1013205-81 = "就算穿得下也解決不了問題。"
1013205-82 = "我的骨架這麼大，不管穿什麼都不好看。"
1013205-83 = "就連那些服裝店裡的假人模特兒，也沒有跟我一樣高的不是嗎？"
1013205-84 = "是，是這樣沒錯啦……"
1013205-88 = "那個，老師。"
1013205-89 = "我可以打通電話嗎？"
1013205-90 = "[s]「當然可以。」"
1013205-91 = "嗯，那麼……"
1013205-96 = "是，社長。我是月夜。"
1013205-97 = "請問剛才說的試穿模特兒的工作，現在還能接嗎？#n好的，好的……是，謝謝！"
1013205-101 = "[ns]「月夜，剛才那通電話是……」"
1013205-102 = "是，我接受試穿模特兒的工作邀約了。"
1013205-103 = "我，我在想，即使是我這種只有個子大的學生……"
1013205-104 = "……說不定也能成為某個人的慰藉。"
1013205-105 = "我想讓他們知道，就算身材高大也能穿出好看的搭配……！"
1013205-106 = "……那個，我這樣會不會太自以為是了呢？"
1013205-107 = "[s3]「怎麼會呢！」\n[s4]「奇普托斯最強的模特兒，為什麼會這麼想呢！」"
1013205-110 = "嗚咿……！拜託別把我捧的那麼高啦……！"
1013205-111 = "那，那個，所以……"
1013205-112 = "……冰淇淋，就留到下次再吃吧。"
1013205-116 = "（幾天後）"
1013205-118 = "百貨公司地下購物中心"
1013205-121 = "（我，我拍的照片真的被掛在服裝店門口了……！）"
1013205-122 = "（嗚嗚……雖然已經做過心理準備，可是還是好害羞……！）"
1013205-123 = "（不過，我真的做對了嗎……？）"
1013205-128 = "喂，你看這張海報。#n模特兒好像換人了耶？"
1013205-134 = "哦？"
1013205-135 = "話說……這次的模特兒長得還真高啊？"
1013205-136 = "嗯……真的耶……？"
1013205-137 = "我之前不是也跟你說過嗎？#n就算身材高大也能穿得帥氣又優雅嘛。"
1013205-141 = "……是啊。#n看來長得高大，好像也不完全是件壞事。"
1013205-145 = "……耶嘿嘿。"

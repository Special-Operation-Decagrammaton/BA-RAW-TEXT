[translation]
62050-1 = "ตอนที่ 5;อาเรียส บาซิลลิกา"
62050-7 = "รุ่นพี่สั่งให้พวกเราทุกคนมารวมตัวกันที่[ruby=บาซิลลิกา]มหาวิหาร[/ruby]แห่งนี้งั้นเหรอ..."
62050-8 = "แต่หลังจากวันนั้น ที่แห่งนี้ก็แทบไม่ได้ใช้งานเลยนะ..."
62050-13 = "อาเรียส บาซิลลิกา..."
62050-14 = "หลังจากอาเรียสถูกขับไล่ออกจากโบสถ์เดิม..."
62050-16 = "ว่ากันว่ามีการใช้โบสถ์ร้างแห่งนี้แทนสถานที่เดิม แล้วก็ตั้งชื่อว่าบาซิลลิกาที่หมายถึงมหาวิหาร"
62050-17 = "แต่หลังจากมาดามหายตัวไป ที่แห่งนี้ก็ไม่ได้ใช้งาน..."
62050-22 = "ฉันไม่แน่ใจเลย..."
62050-23 = "ว่าตอนนี้ที่แห่งนี้เป็นสถานที่แบบไหนของเรา"
62050-24 = "การที่รุ่นพี่สั่งให้พวกเรามารวมตัวกันในนี้อีกครั้ง หมายความว่า..."
62050-30 = "มากันครบหรือยังคะ?"
62050-36 = "ทุกคนดูกังวลกันจังเลยนะคะ..."
62050-37 = "แต่ก็แน่นอนอยู่แล้วค่ะ ฉันเองก็เหมือนกัน"
62050-38 = "อันดับแรกฉันอยากตรวจสอบบางอย่างค่ะ ขอความร่วมมือด้วยนะคะ"
62050-39 = "ถ้าฉันเข้าใจถูกต้อง เสียงพูดที่ทุกคนที่นี่ได้ยินวันนี้..."
62050-45 = "ก็คือสิ่งที่ถูกบันทึกใน <วิวรณ์> ของ 'พระคัมภีร์' ค่ะ..."
62050-46 = "หรือมีใครที่ไม่ได้ยินบ้างมั้ยคะ? ไม่เป็นไรค่ะ บอกฉันมาได้เลยค่ะ"
62050-52 = "ไม่มีสินะคะ เข้าใจแล้วค่ะ ถ้าเป็นแบบนั้นก็แสดงว่าพวกเราได้ยินเสียงพูดนั้นกันหมด"
62050-53 = "แต่ว่าฉัน... ยังไม่แน่ใจว่าเสียงพูดนั้นหมายความตรงตามใน <วิวรณ์> หรือเปล่าค่ะ"
62050-54 = "คะ...? ทำไมล่ะคะ? แต่ว่าพวกเราทุกคน... ก็ได้ยินกันหมดนี่คะ...?"
62050-55 = "ในวิวรณ์เขียนไว้ว่าอย่างนี้ค่ะ"
62050-56 = "<เมื่อหันไปมองและฟังอีกครั้ง ก็ได้ยินเสียงร้องดังของนกอินทรีที่บินอยู่กลางอากาศ>"
62050-57 = "<หายนะกำลังจะเกิดกับผู้ที่อยู่อาศัยบนโลก>"
62050-58 = "<และจะมีเสียงแตรที่จะเกิดขึ้นจากนางฟ้าทั้ง 3>"
62050-59 = "สิ่งที่ฉันบอกว่ายังไม่แน่ใจ... ก็คือส่วนแรกค่ะ ที่พูดถึงนกอินทรีที่บินอยู่กลางอากาศน่ะค่ะ"
62050-60 = "ฉันเองก็คอยเฝ้าดูอยู่ตลอด แต่อย่าว่าแต่นกอินทรีเลยค่ะ นกธรรมดาสักตัวก็ยังไม่เห็นเลย"
62050-61 = "มีใครที่เห็นนกอินทรี... หรือนกที่คล้ายกันบ้างมั้ยคะ?"
62050-65 = "ค่ะ ไม่มีสินะคะ เข้าใจแล้วค่ะ แล้วก็มีอีกอย่างที่ฉันต้องบอกว่ายังไม่แน่ใจค่ะ"
62050-66 = "เราต้องได้ยินเสียงแตรทั้งหมด 7 ครั้งค่ะ... ใช่มั้ยล่ะคะ?"
62050-67 = "เรื่องนั้น... ก็ใช่ค่ะ"
62050-68 = "และจากเสียงพูดที่ฉันได้ยินในวันนี้ น่าจะมีการเป่าแตรไปแล้ว 4 ครั้งค่ะ ทุกคนคิดเหมือนกันใช่มั้ยคะ?"
62050-69 = "ค่ะ... ใช่แล้วค่ะ"
62050-70 = "แต่จนกระทั่งถึงตอนนี้... ฉันยังไม่ได้ยินเสียงแตรเลยแม้แต่ครั้งเดียวค่ะ แล้วทุกคนล่ะคะ?"
62050-75 = "ฉัน... ได้ยินนะคะ...?"
62050-76 = "ฉันไม่ได้ยินค่ะ!"
62050-77 = "พูดอะไรของเธอน่ะ? เสียงดังขนาดนั้น เธอไม่ได้ยินได้ยังไง!"
62050-78 = "กะ... ก่อนหน้านี้ฉันก็บอกไปแล้วนี่นา เธอหรือเปล่าที่หูฝาดไปเองน่ะ..."
62050-79 = "แต่ว่าทุกคนก็ได้ยินเสียงนั่นกันหมดนะ!"
62050-86 = "เอาละๆ ฉันเข้าใจแล้วค่ะ ถ้างั้นก็..."
62050-87 = "..."
62050-88 = "ทุกคนคะ สิ่งที่ฉันจะทำจากนี้ เป็นสิ่งที่ไม่มีความหมายใดๆ เพราะงั้นก็วางใจได้เลยค่ะ"
62050-89 = "คนที่ได้ยินเสียงแตรให้มายืนทางซ้าย ส่วนคนที่ไม่ได้ยินให้มายืนทางขวาค่ะ"
62050-105 = "(คนที่ได้ยินเสียงแตร... มีน้อยกว่าอย่างเห็นได้ชัดเลย)"
62050-109 = "(เอ๋? จะว่าไปแล้ว เหมือนจะมีสิ่งหนึ่งที่เหมือนกันนะ...?)"
62050-110 = "ค่ะ ดีค่ะ ขอบคุณค่ะทุกคน"
62050-111 = "งั้นจากนี้ไป ฉันจะบอกความคิดและข้อสรุปเกี่ยวกับปรากฏการณ์นี้กับทุกคนค่ะ"
62050-118 = "ฉันคิดว่าเราต้องไปที่ <ปอร์ตาปาซิส> แล้วตรวจสอบเกี่ยวกับเรื่องที่เกิดขึ้นครั้งนี้ค่ะ"
62050-123 = "ปอร์ตาปาซิส?! รุ่นพี่ พูดจริงเหรอ...?"
62050-124 = "รุ่นพี่พูดจริงตลอดอยู่แล้ว... โดยเฉพาะเรื่องแบบนี้น่ะ..."
62050-126 = "แต่ว่าที่นั่น... แม้แต่มาดามก็ถูกห้ามไม่ให้เข้าไปไม่ใช่เหรอ...?"
62050-127 = "แต่ตอนนี้มาดามไม่อยู่แล้วไง..."
62050-128 = "สิ่งที่มาดามพูดไว้ก็ไม่ได้เป็นความจริงทั้งหมดด้วย..."
62050-130 = "แต่ว่า..."
62050-132 = "ฉันรู้ดีว่าทุกคนกังวลค่ะ"
62050-133 = "แต่อย่างน้อยในอาเรียส สถานที่ที่เราจะหาเบาะแสเกี่ยวกับเรื่องนี้ได้ก็มีแต่ปอร์ตาปาซิสเท่านั้นค่ะ"
62050-134 = "นั่นก็เพราะประวัติศาสตร์เกือบทั้งหมดของอาเรียสและการตีความพระคัมภีร์ได้รับการเก็บรักษาไว้ที่นั่น#nนี่คะ..."
62050-135 = "ตะ... แต่ถ้าเราผลีผลามเข้าไปในปอร์ตาปาซิส..."
62050-136 = "ค่ะ..."
62050-137 = "หากผู้ที่ไม่มีคุณสมบัติ ผู้ที่ไม่ซื่อสัตย์ หรือผู้ไร้ศรัทธา เข้าไปในนั้น..."
62050-138 = "สุดท้ายก็จะต้องสูญเสียความเป็นตัวเอง และถูกทิ้งให้เร่ร่อนไปทั่วอาเรียสตลอดกาลค่ะ"
62050-142 = "แต่ถึงยังไง... ฉันก็คิดว่าพวกเราต้องหาวิธีรับมือกับปรากฏการณ์นี้ค่ะ"
62050-143 = "นั่นก็เพราะอาเรียส..."
62050-144 = "เป็นที่ที่มักเกิด 'เรื่องที่ปัญญาของมนุษย์ไม่อาจเข้าใจได้' มาตั้งแต่อดีตแล้วนี่คะ "
62050-147 = "แล้วอาเรียสก็ต่างกับพวกคนที่เมินเฉยต่อความจริง พวกคนที่ทำให้เราดูเหมือน 'ไม่เคยมีตัวตน' และพยายามปกปิดความอับอายของตนเอง"
62050-148 = "พวกทรีนิตี้ที่ไร้ศีลธรรมนั่นยังไงล่ะคะ"
62050-151 = "ถึงจะยังเป็นแค่การคาดเดาเท่านั้น แต่การที่เนื้อหาของวิวรณ์ถูกเผยออกมาในวันนี้ อาจเป็นเพราะทรีนิตี้..."
62050-152 = "แล้วก็ 'คุณครูของชาเล่ต์' ก็ได้ค่ะ"
62050-154 = "คะ... คุณครูน่ะเหรอคะ?! ถ้าทรีนิตี้ก็พอเข้าใจได้ แต่ว่าคุณครู..."
62050-155 = "คุณครู ดูเป็นคนดีนี่คะ..."
62050-156 = "ค่ะ จะมองว่าคุณครูเป็นคนดีก็ได้ค่ะ ในส่วนนี้ฉันเองก็เห็นด้วยค่ะ"
62050-157 = "แต่ถึงยังไง... เจตนาที่ดีก็ไม่ได้นำไปสู่ผลลัพธ์ดีๆ เสมอไปค่ะ ทุกคนก็... รู้เรื่องนี้ดีอยู่แล้วนี่คะ?"
62050-158 = "..."
62050-159 = "และที่สำคัญไปกว่านั้นก็คือ ความช่วยเหลือของชมรมอัศวินบรรเทาทุกข์ทำให้ทรีนิตี้เข้ามาเหยียบ#nอาเรียสได้อีกครั้ง"
62050-160 = "และเมื่อข้อเท็จจริงนั้นได้รับการยืนยัน วิวรณ์ก็ถูกเปิดเผยออกมาทันทีเลยค่ะ"
62050-161 = "ถ้ามองว่าคุณครูคือตัวการที่ทำให้ทรีนิตี้เข้ามายังอาเรียสอีกครั้งละก็"
62050-162 = "ฉันเชื่อว่าสาเหตุของเหตุการณ์นี้จะเป็นใครไปไม่ได้นอกจากทรีนิตี้และคุณครูค่ะ"
62050-168 = "มันก็... จริงอยู่หรอก..."
62050-169 = "ต่อให้คุณครูไม่ต้องมาเน้นย้ำเรื่องการเรียนหรือการสอบ..."
62050-170 = "พวกเราก็น่าจะหาทางเอาตัวรอดในแบบของพวกเราได้นะ"
62050-171 = "มาพูดเรื่องการเรียนตั้งแต่แรกทำไมก็ไม่รู้ มันมีความหมายด้วยเหรอ?"
62050-172 = "ทั้งเข้าใจยากแถมยังชวนง่วงด้วย"
62050-173 = "น่าเสียดายเวลาสุดๆ"
62050-174 = "ถึงตอนนั้นเราจะไม่มีอย่างอื่นให้ทำอยู่แล้วก็เถอะนะ..."
62050-176 = "(ฝั่งนี้... คือคนที่ไม่ได้ยินเสียงแตรสินะ)"
62050-181 = "แต่ฉันว่า... การเรียนมันก็ไม่ได้แย่เท่าไรนะ...?"
62050-182 = "นั่นสิ พอได้เรียน ก็ได้รู้ด้วยว่าข้างนอกเป็นยังไงบ้าง..."
62050-183 = "ฉันว่ามันดีกว่าการฝึกทำร้ายคนอื่นนะ..."
62050-184 = "บอกตามตรงว่าฉันไม่ค่อยเข้าใจบทเรียนเท่าไร..."
62050-185 = "และบอกตามตรงว่ามันทั้งน่าเบื่อ จืดชืด ระหว่างเรียนฉันก็อยากหลับบ่อยๆ ด้วย..."
62050-186 = "แต่รวมๆ แล้ว... มันก็ดีนะ ฉันชอบที่ได้พูดในสิ่งที่อยากพูด และมีคนตั้งใจฟังเรื่องราวของฉันน่ะ..."
62050-192 = "(ส่วนฝั่งนี้ก็เป็นคนที่ได้ยินเสียงแตร...?)"
62050-196 = "(เดี๋ยวนะ...?!)"
62050-197 = "(ไม่สิ สังเกตต่ออีกหน่อยดีกว่า...)"
62050-201 = "แต่ว่า ทุกคนคะ"
62050-202 = "ถ้าเกิดนางฟ้าเป่าแตรทั้ง 7 ปรากฏตัวพร้อมกัน รู้มั้ยคะว่าจะเกิดเรื่องอะไรขึ้น?"
62050-204 = "คะ? ระ... เรื่องนั้น...!"
62050-205 = "หรือว่า...?"
62050-207 = "แต่ว่าในวิวรณ์..."
62050-208 = "เราเป็นฝ่ายที่ศึกษาวิวรณ์กันมากกว่า... งั้นก็หมายความว่า..."
62050-213 = "อาเรียส... จะล่มสลาย...?"
62050-216 = "..."
62050-217 = "ก็น่าจะอย่างนั้นค่ะ ถ้าเป็นไปตามพระคัมภีร์กล่าวไว้ โลกก็จะเข้าสู่การล่มสลายค่ะ"
62050-218 = "และอาเรียสก็จะเป็นสถานที่แรกในการประกาศการเริ่มต้นแห่งการล่มสลายนั้นค่ะ"
62050-219 = "ถ้าเรียงตามลำดับ ต่อไปก็จะเป็นคิวของนางฟ้าทั้ง 7 ที่จะรินขันน้ำสินะคะ"
62050-221 = "ทะ... ทะทะทะทะทะ... ทำยังไงดีล่ะคะ?!?!"
62050-222 = "นะ... นั่นสิ?! อย่างน้อยตอนนี้ ตอนนี้เราต้อง..."
62050-226 = "!!!"
62050-227 = "'ชำระล้าง' อาเรียส!"
62050-228 = "ชำระล้างงั้นเหรอ? หมายความว่ายังไง..."
62050-229 = "!!!"
62050-230 = "ใช่! ทั้งคุณครู สควอด... แล้วก็ทุกคนเลย เราต้องไล่ทุกคนออกไปจากอาเรียส!"
62050-231 = "ละ... แล้วเรื่องเรียนล่ะ? ไหนจะการสอบอีก...?"
62050-232 = "อะไรนะ? ตอนนี้เธอยังจะห่วงเรื่องนั้นอีกเหรอ?!"
62050-233 = "คนพวกนั้นทำให้เราเจอสถานการณ์ลำบากนะ! ไม่ต้องคิดถึงเรื่องอื่นหรอก!"
62050-235 = "ค่ะ ใช่ค่ะ ในสถานการณ์แบบนี้ ฉันอยากขอความคิดเห็นจากทุกคนค่ะ"
62050-236 = "และนั่นก็เป็นเหตุผลที่ฉันมาเปิดมหาวิหารอาเรียสแห่งนี้... ที่ไม่ได้ใช้งานมาระยะหนึ่งแล้ว"
62050-237 = "ที่แห่งนี้คือโบสถ์ปลอมของพวกเราที่ถูกขับไล่ออกมา แล้วก็เป็นโบสถ์ที่ถูกมาดามบิดเบือนด้วย..."
62050-238 = "แต่ถึงยังไง... ก็ถูกใช้เป็นโบสถ์ของอาเรียสมาตลอดนี่คะ"
62050-239 = "เราต้องกลับไปยังอาเรียสของพวกเราอีกครั้งค่ะ!"
62050-240 = "ยังเหลือเสียงแตรอีก 3 ครั้งใช่มั้ยคะ?"
62050-241 = "ตะ... แต่ว่าพวกเราไม่ได้ยินเสียงอะไรนั่นนะ...?"
62050-242 = "ถ้าทุกอย่างได้รับการชำระล้าง ก็จะไม่ได้ยินอีกต่อไปแล้วละ เพราะงั้นไม่ต้องกังวลเรื่องนั้นหรอก!"
62050-244 = "ตะ... แต่ว่า…"
62050-245 = "(ฉันอุตส่าห์ทบทวนบทเรียนอยู่แท้ๆ...) "
62050-246 = "(เราจะได้เรียนหนังสือแค่วันเดียวงั้นเหรอ? แบบนี้มัน... เกินไปหน่อยหรือเปล่า...)"
62050-251 = "บะ... บางทีสาเหตุของเรื่องทั้งหมดนี้... อาจไม่ใช่ทรีนิตี้กับคุณครูก็ได้นี่คะ...?"
62050-256 = "อะไรน่ะ?!"
62050-257 = "ใครน่ะ! ใครเป็นคนพูด?!"
62050-258 = "เด็กคนนั้น...?"
62050-265 = "ช่วยอธิบายหน่อยได้มั้ยคะ...?"
62050-266 = "ค่ะ ค่ะ... นี่เป็นแค่... แค่ความคิดของฉันนะคะ…"
62050-267 = "มะ... ไม่มีอะไรรับประกันว่าสิ่งที่เขียนไว้ในวิวรณ์จะเกิดขึ้นตรงตามนั้นทุกอย่าง... ไม่ใช่เหรอคะ?"
62050-269 = "!!!!"

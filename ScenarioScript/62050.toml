[translation]
62050-1 = "Episode 5;Arius Basilica"
62050-7 = "Making us all gather at the Basilica..."
62050-8 = "This place hasn't really been used since that day..."
62050-13 = "The Arius Basilica..."
62050-14 = "I heard when we got banished from the original chapel..."
62050-16 = "...we used this abandoned chapel building instead. That's when it got its name, the Basilica."
62050-17 = "I don't think anyone's come in here since Madame disappeared..."
62050-22 = "...I don't really know."
62050-23 = "I wonder what this place is supposed to mean to us now."
62050-24 = "And why did Subaru want us to meet here, of all places?"
62050-30 = "Is everyone here?"
62050-36 = "...You all look uneasy."
62050-37 = "It's only natural. I'm right there with you."
62050-38 = "First, here's actually something I want to check, if that's okay with everyone."
62050-39 = "From what I've gathered, everyone here..."
62050-45 = "...heard the voice recorded in the Book of Revelation from the scripture."
62050-46 = "Did anyone here not hear it? There's nothing wrong if you didn't, so it's okay to tell me."
62050-52 = "I see. No one. Okay, it seems like everyone could hear the voice."
62050-53 = "Still, I wouldn't say for certain that what we heard was an exact reading of the Book of Revelation."
62050-54 = "Wh-Why not? Everyone heard it, and it was booming from the sky..."
62050-55 = "This is what's written in the Book of Revelation."
62050-56 = "\"As I watched, I heard an eagle that was flying in midair call out in a loud voice:"
62050-57 = "'Woe! Woe! Woe to the inhabitants of the earth,"
62050-58 = "because of the trumpet blasts about to be sounded by the other three angels!'\""
62050-59 = "What's confusing me...is the first part. The part about the eagle that was flying in midair."
62050-60 = "I kept an eye out, but I didn't even see a bird, let alone an eagle."
62050-61 = "What about all of you? Did anyone see anything like a bird?"
62050-65 = "Okay. No one. I see. And there's one last thing that bothered me."
62050-66 = "...The trumpet must blow seven times. Right?"
62050-67 = "Yeah... I remember that too."
62050-68 = "And based on the voice we heard today, we should've heard four blows of the trumpet already. Right?"
62050-69 = "Yes... That's true."
62050-70 = "...But I haven't heard a single blow of the trumpet so far. How about all of you?"
62050-75 = "I heard it..."
62050-76 = "I didn't hear it!"
62050-77 = "You didn't?! But it was so loud!"
62050-78 = "I-I told you already. You were probably hearing things..."
62050-79 = "But everyone heard that voice!"
62050-86 = "Now, now. I understand. In that case..."
62050-87 = "..."
62050-88 = "Everyone? I promise there's no deeper meaning behind this, so please don't read into what we're about to do. Nobody panic or worry."
62050-89 = "Can those who heard the trumpet move to the left, and those who didn't hear the trumpet to the right?"
62050-105 = "(There are clearly...fewer people who heard the trumpet.)"
62050-109 = "(Huh? I think there's one more thing they have in common on top of that...)"
62050-110 = "Okay. Great. Thank you."
62050-111 = "Based on everything I've seen so far, I think I have a working theory about this phenomenon we've all experienced."
62050-118 = "First, I think we need to head to Porta Pacis to investigate it further."
62050-123 = "Porta Pacis?! Is she serious...?"
62050-124 = "Subaru is always serious...especially when it comes to this kinda stuff..."
62050-126 = "But even Madame forbade us from entering there...!"
62050-127 = "...But Madame isn't here anymore."
62050-128 = "And it's not like everything Madame said was right..."
62050-130 = "Still..."
62050-132 = "I know everyone's feeling really anxious right now."
62050-133 = "But we have to find out what happened. And Porta Pacis is the only place in Arius where we'll find any answers."
62050-134 = "Almost the entirety of Arius' history and countless interpretations of the scripture have been preserved there. It'll have what we need."
62050-135 = "B-But you have to be careful entering Porta Pacis..."
62050-136 = "...Yes."
62050-137 = "If those who are unworthy, insincere, or unfaithful try to enter..."
62050-138 = "They'll find themselves lost, cursed to wander Arius aimlessly for the rest of eternity."
62050-142 = "But still. We need to understand this phenomenon, and what it means for us."
62050-143 = "After all, Arius..."
62050-144 = "It's always been a place where the paranormal, things that all the technology in Kivotos could never explain, have happened."
62050-147 = "We're unlike the immoral cowards of Trinity, who tried to bury their shame deep into the past."
62050-148 = "They hid from the truth, hid from US by erasing us from history."
62050-151 = "And, this is just speculation, but the events from the Book of Revelation may have manifested because of those Trinity students..."
62050-152 = "...and Schale's Sensei."
62050-154 = "S-Sensei too?! I can understand why Trinity, but Sensei..."
62050-155 = "Didn't they seem like a good person...?"
62050-156 = "I know what you're saying. Even I agree that, deep down, Sensei is a good person."
62050-157 = "But intention and impact aren't necessarily the same thing. You and I...we've lived that harsh reality our whole lives."
62050-158 = "..."
62050-159 = "And in the end, Trinity has returned to Arius, and it's because those Remedial Knights decided to do as they pleased."
62050-160 = "It was after THEY came that the Book of Revelation manifested, didn't it?"
62050-161 = "And who was the one who opened Arius' doors to Trinity? Wasn't it Sensei?"
62050-162 = "It's no far stretch to say that Trinity, and therefore Sensei, is the cause of this incident."
62050-168 = "That's...true..."
62050-169 = "Even if Sensei didn't bother us with \"studying\" and \"tests\"..."
62050-170 = "...we would've been totally fine on our own."
62050-171 = "I mean, what's even the point of studying?"
62050-172 = "You're just putting yourself through something hard and boring for no good reason."
62050-173 = "I can't think of a bigger waste of time."
62050-174 = "...It's not like we have other things to do with that time, but still!"
62050-176 = "(This is...the group that didn't hear the trumpet.)"
62050-181 = "But...I don't think studying was half bad..."
62050-182 = "Yeah. We got to learn more about the outside world..."
62050-183 = "I liked it better than learning different torture methods..."
62050-184 = "Admittedly, I didn't really understand anything we were studying..."
62050-185 = "Seriously! They were actually so boring and tedious. It was hard to stay awake!"
62050-186 = "But...I still liked it. I liked the fact that I could talk about my thoughts, and that someone would listen to me."
62050-192 = "(And this is the group that heard the trumpet...?)"
62050-196 = "(Hold on...!)"
62050-197 = "(No. I'll wait and see, for now...)"
62050-201 = "Everyone. "
62050-202 = "What happens if the angels blow the trumpets seven times?"
62050-204 = "What? Th-That's...!"
62050-205 = "Could it be...?"
62050-207 = "Doesn't the Book of Revelation say that..."
62050-208 = "We studied the Book of Revelation the most... That means..."
62050-213 = "...The destruction of Arius...?"
62050-216 = "..."
62050-217 = "That's correct. According to the scripture, seven blows of the trumpet signal the end of the world."
62050-218 = "And Arius is where it will all begin."
62050-219 = "I guess next up would be seven angels pouring out seven bowls."
62050-221 = "Wh-Wh-What should we do?!?!"
62050-222 = "Y-Yeah! Maybe, it's not too late..."
62050-226 = "!!"
62050-227 = "We have to purify Arius!"
62050-228 = "\"Purify\"? What does that...?"
62050-229 = "Oh!!"
62050-230 = "She's right! Sensei, the Squad, everyone... We have to chase them out!"
62050-231 = "Th-Then what about studying? The test...?"
62050-232 = "Huh? That's what you're worried about right now?! You're on THAT side?"
62050-233 = "Yeah, what about US? Who cares about other people?"
62050-235 = "Exactly. Keeping that in mind, I want to know what YOU want."
62050-236 = "That's why I asked us to meet here, at the Arius Basilica. After all this time."
62050-237 = "Those of us who were banished were forced into this false chapel. Then, it was further desecrated by Madame."
62050-238 = "...But still, this chapel is Arius' chapel. OUR Chapel."
62050-239 = "Let's get back to our Arius!"
62050-240 = "They said there are three more trumpet blows left, right?"
62050-241 = "B-But we didn't actually hear them..."
62050-242 = "Well, it won't happen anymore once we purify everything! So there's nothing to worry about anyway!"
62050-244 = "B-But..."
62050-245 = "(I've been studying really hard...) "
62050-246 = "(That's it? We're done after just one day of classes? That's so...)"
62050-251 = "M-Maybe...not all of this...is because of Trinity and Sensei...?"
62050-256 = "What?"
62050-257 = "What?! Who said that?!"
62050-258 = "Isn't she...?"
62050-265 = "...Could you elaborate?"
62050-266 = "W-Well, this is just...what I think, but..."
62050-267 = "H-How do we even know everything will come true exactly as the Book of Revelation says?"
62050-269 = "*gasp*"
62050-270 = "What's wrong with her...?"
62050-271 = "B-Blasphemy...!"
62050-273 = "...What makes you say that?"
62050-275 = "W-Well, there was no eagle..."
62050-276 = "And each blow of the trumpet...was supposed to signal a new disaster..."
62050-277 = "But nothing happened..."
62050-279 = "Don't screw around with me!"
62050-280 = "Trinity setting their foot here was the disaster!"
62050-281 = "And that Sensei too!"
62050-282 = "Same with the Squad!"
62050-283 = "Yeah, the Squad too!"
62050-284 = "Me, I actually hate the Squad the most. Even more than Trinity..."
62050-285 = "Yeah... They throw their weight around, acting like they're smarter than us!"
62050-286 = "They're the ones who ran away from Arius! Who abandoned us!"
62050-289 = "They could've done it!"
62050-290 = "They're more than capable!"
62050-293 = "The Squad would've had no problem leading us all!"
62050-294 = "They even said they were of the royal blood!"
62050-297 = "Why did Saori leave...? Why did you leave us...?"
62050-298 = "Why...? Why did you run away from us?"
62050-299 = "We all...really looked up to you!"
62050-302 = "What did you mean, \"Everything's too empty...?\""
62050-303 = "You were one of us... You lived this with us..."
62050-304 = "How could you go find salvation...without us?!"
62050-309 = "..."
62050-310 = "..."
62050-311 = "..."
62050-312 = "When I look around, I start to think..."
62050-313 = "\"Is this really okay? Is it really okay to live like this?\""
62050-314 = "\"What's the rest of my life...going to look like...?\""
62050-319 = "Aah, the thing is."
62050-320 = "Me too. All of us..."
62050-321 = "We all wanted a different life for ourselves."
62050-324 = "But, that's..."
62050-325 = "...impossible now...!"
62050-329 = "No, it's not!"
62050-330 = "*gasp*"
62050-331 = "We can do it! Surely... N-No, maybe..."
62050-332 = "...How?"
62050-333 = "W-Well... I guess we could ask Sensei..."
62050-334 = "I-I don't really know, but Sensei knows lots of things that we don't!"
62050-340 = "..."
62050-341 = "Sensei, again?"
62050-342 = "Sensei this, Sensei that. I'm sick of it!"
62050-343 = "You think Sensei is some sort of god? You think everything's going to work out, and we'll find heaven, if we just trust and follow that person?"
62050-348 = "That's impossible!!"
62050-349 = "You know, while we're on the topic, you seem awfully keen on those outsiders."
62050-350 = "Well, because she went outside and came back! She must've been brainwashed over there!"
62050-351 = "Arius' suffering is old news to Sensei! And what exactly have they done for us, after all this time? What has Trinity done to help us?!"
62050-352 = "Trinity...!!"
62050-354 = "We wouldn't even be here if Trinity hadn't left us to rot hundreds of years ago!"
62050-355 = "No wonder Subaru wants to reopen Porta Pacis!"
62050-356 = "Subaru, are you seriously going to let her talk like that?"
62050-361 = "Ugh...!"
62050-363 = "Subaru, you're on our side, right?"
62050-364 = "You'll protect Arius, right?"
62050-366 = "Prove it to us, Subaru!!"
62050-368 = "Hold on! Hold on...!"

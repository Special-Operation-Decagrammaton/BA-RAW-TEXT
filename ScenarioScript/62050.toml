[translation]
62050-1 = "第5話;奧利斯．宗座聖殿"
62050-7 = "前輩居然要我們全部到[ruby=宗座聖殿]大聖殿[/ruby]集合……"
62050-8 = "在那天以後，這裡就很少有人使用了……"
62050-13 = "奧利斯宗座聖殿……"
62050-14 = "自從被逐出原本的禮拜堂之後……"
62050-16 = "我們就以這座廢棄的禮拜堂作為替代，並為它取了這樣[ruby=宗座聖殿]的名字。[/ruby]"
62050-17 = "不過在夫人消失之後，這裡也就沒有再使用了……"
62050-22 = "……我們並不清楚。"
62050-23 = "這裡……對現在的我們來說是個什麼樣的地方。"
62050-24 = "前輩要我們在這裡集合，又是為了什麼呢……"
62050-30 = "大家都到齊了嗎？"
62050-36 = "……看起來都很不安呢。"
62050-37 = "不過這也是當然的。畢竟我也一樣。"
62050-38 = "首先，可以讓我跟大家確認一件事嗎？"
62050-39 = "如果我的理解沒錯的話，今天在場的大家……"
62050-45 = "……應該都聽到了經典《啟示錄》中記載的那個聲音。"
62050-46 = "請問有人沒有聽到嗎？#n就算沒有聽到也沒關係，請不要顧慮，直接說出來。"
62050-52 = "看來似乎沒有呢。#n也就是說，那個聲音確實是傳達給所有人的。"
62050-53 = "不過我目前……還是無法確定那個聲音是否真的等同於《啟示錄》本身。"
62050-54 = "咦……為什麼呢？#n聲音明明那麼清楚……而且大家都聽到了不是嗎……？"
62050-55 = "在啟示錄之中，還有這樣一段記載。"
62050-56 = "「我又看見一個鷹飛在空中，並聽見牠大聲說──」"
62050-57 = "「三位天使要吹那其餘的號。」"
62050-58 = "「你們住在地上的民，禍哉！禍哉！禍哉！」"
62050-59 = "我之所以說還無法確定，原因就在於前半部……也就是「飛在空中的鷹」的部分。"
62050-60 = "根據我的反覆觀察……別說是老鷹了，就連看起來像鳥的影子都沒見到。"
62050-61 = "在場有人曾經看到老鷹……或者類似鳥的東西嗎？"
62050-65 = "……看來似乎也沒有呢，我明白了。#n除此之外，還有另一個我無法確定的部分。"
62050-66 = "……號角聲一共應該要響起七次，對吧？"
62050-67 = "那個……是的。"
62050-68 = "而根據大家今天聽到的聲音，應該已經響起了四次號角聲……這也沒錯吧？"
62050-69 = "嗯……沒錯。"
62050-70 = "但我至今為止……卻連一次號角聲都沒聽見。#n各位的情況怎麼樣呢？"
62050-75 = "我有聽到耶……？"
62050-76 = "我沒聽到！"
62050-77 = "那麼大聲怎麼可能聽不到！"
62050-78 = "我，我之前不就說過了嗎？#n搞不好是你聽錯了……"
62050-79 = "可是那個聲音不是大家都聽到了嗎？"
62050-86 = "好好好，我明白了。#n那麼……"
62050-87 = "……"
62050-88 = "各位？接下來要做的事情並沒有任何特殊的意義，所以請大家放心。"
62050-89 = "有聽到號角聲的人請站到左邊，沒有聽到的人請站到右邊好嗎？"
62050-105 = "（有聽到號角聲那邊的人數……明顯比較少呢）"
62050-109 = "（咦？仔細一看，好像還有其他的共通點……？）"
62050-110 = "好，感謝各位的配合。"
62050-111 = "那麼接下來，我想向各位分享目前對於這場現象的結論。"
62050-118 = "我認為──我們必須前往「波塔帕西斯」調查這起事件。"
62050-123 = "波塔帕西斯！？#n前輩是認真的嗎……？"
62050-124 = "前輩一直都很認真……尤其是遇到這種事情的時候……"
62050-126 = "可是那個地方，不是連夫人都被禁止進入嗎……？"
62050-127 = "……但是夫人已經不在了。"
62050-128 = "而且夫人說過的話，也不完全都是對的……"
62050-130 = "話是這麼說沒錯啦……"
62050-132 = "我理解大家會感到不安。"
62050-133 = "然而在奧利斯境內，能取得相關線索的地方就只有波塔帕西斯……這也是事實。"
62050-134 = "……畢竟那裡保存著奧利斯幾乎所有的歷史，以及大量對於經典的解釋。"
62050-135 = "可，可是擅自進入波塔帕西斯的話……"
62050-136 = "……沒錯。"
62050-137 = "據說沒有資格之人、不夠虔誠之人、失去信仰之人一旦踏進那裡……"
62050-138 = "最終將會失去自我，永遠在奧利斯徘徊。"
62050-142 = "但是即便如此，面對這次的現象……我認為我們一定得找到應對的方法才行。"
62050-143 = "況且，奧利斯從古至今……"
62050-144 = "就是會發生超出人類智慧所能理解之事的土地啊。"
62050-147 = "那不道德的三一只會對真相視而不見……#n企圖將我們塑造成「不曾存在的東西」，以藉此掩蓋自身的醜事。"
62050-148 = "而我們跟他們不一樣。"
62050-151 = "雖然還處於推測的階段……#n不過今天啟示錄的內容之所以會顯現，可能也是因為受到三一──"
62050-152 = "以及夏萊的「老師」所影響。"
62050-154 = "老，老師！？#n三一也就算了，但老師他……"
62050-155 = "老師……看起來是個好人啊……"
62050-156 = "沒錯。我也承認……老師他確實能被視為一個好人。"
62050-157 = "……然而善意未必總是能帶來好的結果。#n我想這一點……各位和我應該都非常清楚才對。"
62050-158 = "……"
62050-159 = "無論如何，由於救護騎士團的活動，三一終究再度踏入了奧利斯。"
62050-160 = "而在這個事實得到確認之後，啟示錄便隨之顯現。"
62050-161 = "因此，考量到讓三一重新涉足奧利斯的人正是老師──"
62050-162 = "我認為這次的事件，果然只能歸咎於三一……乃至於老師的身上。"
62050-168 = "這……倒也沒錯……"
62050-169 = "要是老師沒有說要學習還是考試之類的事情，惹出不必要的麻煩……"
62050-170 = "我們也能用我們自己的方式想辦法活下去。"
62050-171 = "再說了，到底學什麼習啊？那種事有意義嗎？"
62050-172 = "又難又聽不懂，而且還很催眠。"
62050-173 = "根本是在白費時間嘛。實在有夠浪費。"
62050-174 = "……雖然老實說，那些時間我們也沒其他事情可做。"
62050-176 = "（這邊……是沒有聽到號角聲的人呢）"
62050-181 = "可是……我覺得學習好像還挺不錯的耶……？"
62050-182 = "我也覺得。而且還能多少知道外面的世界是什麼樣子……"
62050-183 = "……反正至少比整天練習傷人的方法來得好。"
62050-184 = "坦白說，我其實也不太能理解要學的內容……"
62050-185 = "會覺得無聊、沉悶、想睡之類的也是事實……"
62050-186 = "但我還是……覺得很開心。#n因為有人可以好好聽我說話，我也能夠說出自己的想法……"
62050-192 = "（這邊是有聽到號角聲的人……？）"
62050-196 = "（難道說……！？）"
62050-197 = "（不，還是再觀察一下吧……）"
62050-201 = "話說，各位。"
62050-202 = "萬一天使們把七支號角全部吹響了……會發生什麼事呢？"
62050-204 = "咦？那，那個……！"
62050-205 = "該不會……？"
62050-207 = "可是在啟示錄裡……"
62050-208 = "我們特別研究過很多跟啟示錄有關的事……#n那種情況就代表著……"
62050-213 = "奧利斯的……毀滅……？"
62050-216 = "……"
62050-217 = "我想應該是吧。#n根據經典中的記載，世界將就此開始滅亡。"
62050-218 = "而奧利斯只不過是為其揭開序幕的地方罷了。"
62050-219 = "如果照順序來看，接下來應該就輪到傾倒七碗的七位天使了吧。"
62050-221 = "怎，怎怎怎怎，怎麼辦才好！？！？"
62050-222 = "就，就是說啊！？#n現在，現在還能做什麼……"
62050-226 = "！！！"
62050-227 = "必須「淨化」奧利斯才行！"
62050-228 = "淨化？那是什麼意思……"
62050-229 = "！！！"
62050-230 = "沒錯！不管是老師還是小隊……全都要趕出奧利斯！"
62050-231 = "那，那學習呢？還有考試呢……？"
62050-232 = "怎麼？你也是站在那一邊的啊？#n現在是在意那種事情的時候嗎！？"
62050-233 = "我們都要大難臨頭了耶！哪管得了這麼多啊！"
62050-235 = "沒錯……正因如此，我才會想徵求大家的意見。"
62050-236 = "所以才重新打開了許久未曾使用的這個地方……也就是奧利斯．宗座聖殿的大門。"
62050-237 = "即便這裡是我們這些被驅逐者的虛偽禮拜堂，還曾被夫人所扭曲……"
62050-238 = "……但這個地方，始終是我們奧利斯的禮拜堂。"
62050-239 = "一定要回到屬於我們的奧利斯！"
62050-240 = "號角聲還剩下三次對吧？"
62050-241 = "可，可是我們完全沒聽到啊……？"
62050-242 = "只要全部淨化掉就再也聽不到了，根本沒必要在意那種事！"
62050-244 = "但，但是……"
62050-245 = "（我才複習到一半的說……）"
62050-246 = "（只上一天課就要結束了嗎？#n　這感覺……實在有點……）"
62050-251 = "會，會不會這一切……其實並不是三一跟老師造成的呢……？"
62050-256 = "什麼？"
62050-257 = "是誰！這話是什麼意思！？"
62050-258 = "他是……？"
62050-265 = "……可以請你繼續說下去嗎？"
62050-266 = "好，好的。#n雖然這……只是我個人的看法……"
62050-267 = "不，不過並沒有人能夠保證……寫在啟示錄裡的事情就一定會如實發生……不是嗎？"
62050-269 = "！！！！！"
62050-270 = "那孩子在說什麼……？"
62050-271 = "你，你這可是在褻瀆神聖的經典啊……！"
62050-273 = "……為什麼你會這麼想呢？"
62050-275 = "畢，畢竟沒有人真的看到老鷹……"
62050-276 = "而且裡面寫說每當號角聲響起，都會發生可怕的災難……"
62050-277 = "目前看起來也沒發生什麼特別的事……"
62050-279 = "別笑死我了！"
62050-280 = "三一踏入這裡這件事本身就是一場災難！"
62050-281 = "現在想想就連老師也一樣！"
62050-282 = "還有小隊也是！"
62050-283 = "沒錯，小隊！"
62050-284 = "老實說比起三一那些傢伙，小隊更讓我看不順眼……"
62050-285 = "就是說啊……一副好像自己什麼都懂的樣子……！"
62050-286 = "那些傢伙當初可是逃離了奧利斯啊！！！"
62050-289 = "那些傢伙明明能做到！"
62050-290 = "那些傢伙明明有能力！"
62050-293 = "如果是小隊的話，要帶領我們根本不成問題！"
62050-294 = "不是被稱為什麼皇家血統嗎！！！"
62050-297 = "為什麼要那麼做呢，沙織前輩……#n為什麼要離開……"
62050-298 = "為什麼……要從我們身邊逃走。#n為什麼……"
62050-299 = "明明有那麼多人憧憬著前輩……！"
62050-302 = "老是說徒勞徒勞，到底在徒勞什麼啊……"
62050-303 = "你不也曾經待在這裡嗎……？#n不也曾經跟我們一樣嗎……？"
62050-304 = "事到如今才一副被拯救了的樣子，自己一個人……自顧自地……！"
62050-309 = "……"
62050-310 = "……"
62050-311 = "…………"
62050-312 = "每當看著那些孩子，我總是會不由自主地浮現這種想法。"
62050-313 = "這樣下去真的好嗎。#n就這樣活著真的可以嗎。"
62050-314 = "我剩下的人生……究竟會變成什麼樣子……"
62050-319 = "啊啊，其實……"
62050-320 = "[ruby=我們也]我也[/ruby]一樣。"
62050-321 = "曾經想嘗試活出跟現在不一樣的人生。"
62050-324 = "不過那種事……"
62050-325 = "現在已經辦不到了……！"
62050-329 = "辦得到！！！"
62050-330 = "！！！！！"
62050-331 = "一定能辦得到的！#n或許……肯，肯定可以吧……"
62050-332 = "……要怎麼辦到？"
62050-333 = "那個，如果去請教老師的話……"
62050-334 = "我，我其實也不太清楚，不過老師一定知道我們不知道的事情！"
62050-340 = "……"
62050-341 = "又是老師？"
62050-342 = "整天老師老師的，煩死了！"
62050-343 = "老師是什麼神明嗎？#n只要相信他、追隨他就能解決所有問題，天國就會降臨嗎？"
62050-348 = "怎麼可能！！！！！"
62050-349 = "我說你啊，是不是從剛才就一直偏袒那邊？"
62050-350 = "那傢伙不是出去過外面又回來嗎？#n肯定是被灌輸了什麼奇怪的思想啦！"
62050-351 = "奧利斯明明一直都是這個樣子，老師有為我們做過什麼嗎？#n還有三一也是……！"
62050-352 = "三一……！！！"
62050-354 = "打從一開始就是三一的錯！#n都怪幾百年前的那件事情，我們才會被害成這樣！！！"
62050-355 = "否則前輩也不會說要重新打開波塔帕西斯了！！！"
62050-356 = "前輩是不是太護著那孩子了？"
62050-361 = "唔……！"
62050-363 = "前輩是站在我們這邊的對吧？沒錯吧？"
62050-364 = "前輩會守護奧利斯吧？"
62050-366 = "請證明給我們看，前輩！！！"
62050-368 = "等等……！請等一下！"
62050-373 = "[log]證明[/log]"
62050-376 = "[log]證明[/log]"
62050-379 = "[log]證明 證明[/log]"
62050-382 = "[log]證明 證明[/log]"
62050-385 = "[log]證明 證明 證明[/log]"
62050-388 = "[log]證明 證明 證明 證明[/log]"
62050-391 = "[log]證明 證明 證明 證明 證明[/log]"
62050-395 = "[log]證明！！！！！[/log]"
62050-399 = "前，前……輩……"
62050-400 = "那個，不是……不是那樣的……"
62050-401 = "真的，真的不是……我，只是……"
62050-402 = "前輩不是說過……會守護這裡，守護我們的巢穴嗎……？"
62050-403 = "……！"
62050-407 = "可以……讓我問一個問題嗎？"
62050-408 = "咦，咦咦──？#n可以……！！！"
62050-413 = "你有聽到號角聲嗎？"
62050-417 = "…………有。"
62050-418 = "我知道了"
62050-419 = "對不起"
62050-424 = "！！！！！"
62050-425 = "前輩！我錯了！我再也不會這樣了！#n我不會再多嘴了！我會乖乖聽話的！"
62050-426 = "我再也不會說想做什麼，也不會再說學習或上課之類的話了！"
62050-427 = "對不起！我只是因為暫時出去了一下，所以產生了奇怪的想法！#n我會重新，重新……！我會重新來過的，所以……！"
62050-429 = "大家。"
62050-430 = "把舞彩同學帶到宗座聖殿外吧。"
62050-431 = "要讓他……永遠無法回到這裡。"
62050-432 = "我也會同行。"
62050-433 = "知道了！"
62050-442 = "前輩！！！"
62050-447 = "前輩──！！！！！"
62050-448 = "我錯了！全部都是我的錯！前輩說的都是對的！#n是我，是我的想法，全都，全都錯了！！！"
62050-449 = "所以求求你──"
62050-456 = "大家。"
62050-457 = "是的！"
62050-458 = "現在已經沒事了。請先回去吧。"
62050-460 = "知道了！"
62050-466 = "請不要拋下我！"
62050-474 = "……！"
62050-475 = "前輩！前輩！！！前輩──！！！！！"
62050-476 = "唔……嗚嗚……"
62050-477 = "啊啊，啊啊啊啊啊……"
62050-478 = "嗚哇啊啊啊啊啊啊啊啊……！！！"
62050-482 = "下一話;迷路的孩子"

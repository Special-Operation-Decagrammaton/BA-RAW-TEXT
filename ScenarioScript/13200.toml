[translation]
13200-1 = "ตอนที่ 20;ล่าสมบัติ"
13200-4 = "..."
13200-8 = "รุ่นพี่โฮชิโนะ! "
13200-9 = "ประธานใหญ่ล่ะคะ?"
13200-12 = "หึหึหึ"
13200-17 = "..."
13200-20 = "เฮลิคอปเตอร์...?! "
13200-25 = "ไม่ทันแล้ว"
13200-27 = "ใช่ น่าเสียดายแทนพวกเธอนะ แค่นี้ปืนแม่เหล็กไฟฟ้าก็เป็นของฉันแล้วละ"
13200-28 = "รุกฆาตแล้วสินะ"
13200-31 = "สุโอ ของชิ้นนั้นล่ะ?"
13200-32 = "อยู่นี่ค่ะ"
13200-37 = "ดะ... เดี๋ยวนะคะ นั่นมัน... บัตรเครดิตของฉัน?! อะ... เอาไปตั้งแต่ตอนไหน...?! "
13200-38 = "ถ้าจะผ่านไปยัง <หุบเขาของประธานสภานักเรียน> ให้ได้ ก็ต้องมีสิ่งนี้สิ"
13200-40 = "หุบเขาของประธานสภานักเรียน...?"
13200-41 = "ใช่ เราวิเคราะห์มาแล้วว่าถ้าจะเปิดเส้นทางไปยังที่นั่น ก็ต้องใช้การรับรองที่บ่งบอกได้ว่าเป็นเจ้าของ#nเนฟธิสกรุ๊ป"
13200-42 = "เดิมทีแล้วเจ้าตัวต้องอยู่ด้วย... แต่ถ้าจะทำอย่างนั้นเราก็ต้องปะทะกับโฮชิโนะก่อน ซึ่งมันก็ไม่ง่ายเลย"
13200-44 = "แต่ถ้ามีบัตรใบนี้ก็ไม่มีปัญหาค่ะ..."
13200-45 = "ปืนแม่เหล็กไฟฟ้า... อยู่ในที่ที่เรียกว่า <หุบเขาของประธานสภานักเรียน> เหรอคะ...?"
13200-46 = "พวกเธอก็อยากได้ปืนแม่เหล็กไฟฟ้าเหมือนกันเหรอ? ใครจะไปยอมให้ง่ายๆ ล่ะ!"
13200-47 = "จากการประเมินของพวกฉัน <ปืนแม่เหล็กไฟฟ้าแบบรางคู่ขนาน เชมาตา> มีคุณค่าทั้งในด้านกลยุทธ์ ด้านเทคโนโลยี และด้านประวัติศาสตร์"
13200-48 = "และจะมีมูลค่าถึง... แปดหมื่นล้านเยน!"
13200-49 = "ปะ... แปดหมื่นล้านเยน...?!"
13200-50 = "ทำไมถึงได้ราคาแพงลิบลิ่วขนาดนั้น...?!"
13200-52 = "ปืนแม่เหล็กไฟฟ้าเป็นของของไคเซอร์ ถ้าพวกเธอไปแตะต้องแม้แต่ปลายเล็บ ก็ต้องจ่ายค่าชดเชยให้#nสมกับมูลค่าของมัน"
13200-53 = "จ่ายไหวมั้ยล่ะ? คณะกรรมการแผนงานอะบิดอส?"
13200-56 = "และถ้าเกิดเป็นอย่างนั้น... เอาอย่างนี้แล้วกัน... ฉันจะให้โฮชิโนะมาเป็นลูกจ้างของไคเซอร์ PMC แบบนี้สูทดำต้องดีใจแน่ๆ"
13200-57 = "ถ้าไม่เอาอย่างนั้น หรือพวกเธอจะต่อสู้ด้วยกฎหมายล่ะ? จะทำแบบนั้นก็ได้นะ แล้วฉันจะคอยก่อกวน#nจนกว่าพวกเธอจะเรียนจบเลย"
13200-60 = "แล้วหลังจากนั้นก็จะก่อกวนเด็กที่เข้ามาเรียนใหม่ด้วย ถ้าจะมีใครเข้ามาเรียนน่ะนะ ฮ่าฮ่าฮ่าฮ่า!"
13200-65 = "เพราะงั้น... หืม?"
13200-66 = "มีอะไรเหรอ สุโอ?"
13200-72 = "ทะ... ทำอะไรน่ะ...?!"
13200-73 = "อ๊ากกกกกกกกก!?!"
13200-79 = "ทะ... ทำอะไรของเธอ...?!"
13200-88 = "อ๊ากกกก!"
13200-92 = "โดนผลักตกจากเฮลิคอปเตอร์ไปแล้วค่ะ...!!"
13200-93 = "...!!?"
13200-94 = "อะ... อะไรนะ?! ทะ... ทำไมถึง!?"
13200-95 = "นี่มันเรื่องอะไรกัน..."
13200-100 = "โอย..."
13200-101 = "อะ... โอยยยย..."
13200-105 = "ท่านประธานใหญ่!!"
13200-106 = "ปะ... เป็นยังไงบ้างครับ!?"
13200-107 = "อึก... โอย..."
13200-111 = "บาดแผลรุนแรงมากเลย! ระ... รีบติดต่อสำนักงานใหญ่เร็ว...!"
13200-113 = "ทาคานาชิ โฮชิโนะ... เธอรู้ใช่มั้ยว่าหุบเขาของประธานสภานักเรียนอยู่ที่ไหน?"
13200-114 = "ฉันจะรอเธออยู่ที่นั่น ถ้าจะขัดขวางเรื่องปืนแม่เหล็กไฟฟ้า ก็มาที่นั่นแล้วกัน"
13200-116 = "นี่เธอ..."
13200-117 = "ถ้าไม่มาละก็ ฉันจะเปิดใช้งานปืนแม่เหล็กไฟฟ้า แล้วย้ายมันออกไปนอกอะบิดอส"
13200-121 = "..."
13200-122 = "หะ... หุบเขาของประธานสภานักเรียน...? ที่นั่นมันที่ไหนเหรอคะ?"
13200-123 = "ฉะ... ฉันก็ไม่รู้ แต่เหมือนจะเคยได้ยินมาจากที่ไหนเลย..."
13200-127 = "(หุบเขาของประธานสภานักเรียน...)"
13200-128 = "(จำได้แล้ว... เขต 35-9)"
13200-130 = "ไม่ว่าที่ไหนก็เหมือนกันหมดนั่นละค่ะ เพราะถ้ามันมีที่อย่างหอนิทรรศการของประธานสภานักเรียน#nอะบิดอสที่มีสมบัติราคาแพงจัดแสดงอยู่จริงๆ ละก็"
13200-131 = "พวกสภานักเรียนคนเก่าๆ คงหาเจอและขายไปแล้วตั้งแต่แรกแล้วค่ะ"
13200-134 = "อาคารอนุสรณ์ที่เหล่าอดีตประธานสภานักเรียนอะบิดอสสร้างไว้ในทะเลทราย"
13200-135 = "แล้วเรียกที่นั่นว่าหุบเขาของประธานสภานักเรียน... ฉันรู้จักที่นั่น... ปืนแม่เหล็กไฟฟ้าซ่อนอยู่ที่นั่นสินะ"
13200-141 = "รอก่อน! รุ่นพี่โฮชิโนะ?!"
13200-146 = "จะไปไหนน่ะ!"
13200-147 = "รุ่นพี่! มาคุยกันก่อนสิคะ!! รอด้วยค่ะ!"
13200-148 = "ระ... รุ่นพี่โฮชิโนะ!"
13200-149 = "จะไปทั้งๆ ที่ไม่บอกกล่าวกันเลยไม่ได้นะคะ! รุ่นพี่ไม่ต้องรับผิดชอบคนเดียวก็ได้นี่คะ! รุ่นพี่โนโนมิก็#nช่วยมาได้แล้วด้วย..."
13200-151 = "เราได้คุณครูมาช่วยไว้ เราเลยไม่ต้องปฏิเสธการมีอยู่ของสภานักเรียนของประธานยูเมะ แล้วก็คณะกรรมการแผนงานของพวกเราด้วย"
13200-152 = "ค่ะ! ใช่ค่ะ! เพราะงั้นอย่าไปคนเดียวเลยนะคะรุ่นพี่! ให้พวกเราไปด้วยเถอะค่ะ!!"
13200-153 = "ขอโทษนะ... แต่ฉันทำแบบนั้นไม่ได้"
13200-154 = "ว่าไงนะคะ?!"
13200-155 = "รุ่นพี่โฮชิโนะ อย่าบอกนะว่า..."
13200-156 = "[s] \"โฮชิโนะ รอก่อน\""
13200-158 = "ถ้าฉันกลับไปอยู่ในคณะกรรมการแผนงานอีกครั้ง... ฉันก็จะทำลายปืนแม่เหล็กไฟฟ้าไม่ได้"
13200-159 = "...!!"
13200-160 = "ฉันจะเป็นคณะกรรมการแผนงานไม่ได้ สภานักเรียนอะบิดอสของฉันต้องไม่เหมือนกับคณะกรรมการ#nแผนงาน"
13200-161 = "ว่าไงนะคะ?!"
13200-162 = "ไม่ค่ะ! ต่อให้ประกาศกร้าวไปแบบนั้นก็ไม่มีความหมายหรอกค่ะ!!"
13200-164 = "ถึงจะบอกว่าไม่มีความหมาย... แต่ฉันก็ต้องประกาศออกไปอย่างนั้น"
13200-165 = "ใช่ เพราะสิ่งที่จะเกิดขึ้นตั้งแต่นี้ไป มันต้องไม่เกี่ยวข้องกับคณะกรรมการแผนงาน"
13200-166 = "...!!"
13200-167 = "นี่ต้องเป็นการบุกเดี่ยวของโฮชิโนะผู้เป็นสภานักเรียนจอมปลอม เพราะถ้าไม่เป็นอย่างนั้น ความรับผิดชอบก็จะถูกโยนให้คณะกรรมการแผนงาน"
13200-171 = "[ns] \"รอก่อน โฮชิโนะ!!\""
13200-177 = "มะ... ม่านควันเหรอ?!"
13200-185 = "ขอโทษนะ ชิโรโกะจัง"
13200-195 = "แค่ก!"
13200-196 = "จะให้ปืนแม่เหล็กไฟฟ้าอยู่ในอะบิดอสไม่ได้เด็ดขาด"
13200-197 = "ฉันจะไปทำลายปืนนั่น เพราะฉันไม่ควรขัดขวางอนาคตของเหล่ารุ่นน้อง"
13200-198 = "แล้วก็... ขอบใจทุกคนที่สนับสนุนรุ่นพี่ยูเมะนะ"
13200-203 = "รุ่นพี่โฮชิโนะ!!"
13200-209 = "อดทนรออีกนิดนะครับ! รถมาถึงแล้วครับ!"
13200-210 = "อึก... คุ้มกันฉัน... ไปนอกอะบิดอส... แล้วก็..."
13200-211 = "ติดต่อสำนักงานใหญ่... แล้วเรียกคนของไคเซอร์... ไม่ใช่แค่จากไคเซอร์ PMC... แต่เรียกมาให้หมด#nทั้งไคเซอร์กรุ๊ปเลย...!!"
13200-212 = "มะ... หมดเลยเหรอครับ?"
13200-214 = "ใช่!"
13200-215 = "ทั้งไคเซอร์ อินดัสทรี"
13200-216 = "สินเชื่อไคเซอร์"
13200-217 = "ไคเซอร์ คอนสตรัคชั่น"
13200-218 = "รวมไปถึงร้านสะดวกซื้อไคเซอร์"
13200-219 = "แล้วก็กองกำลังทั้งหมดของไคเซอร์ PMC ด้วย! เรียกมาให้หมด! ฉันจะระดมกองกำลังทั้งหมดของ#nบริษัทในเครือ!"
13200-220 = "นี่จะเป็นสงครามรวมพลัง! สงครามรวมพลังของไคเซอร์ คอร์เปอเรชั่นจะเริ่มต้นในอะบิดอสนี่ละ...!!"
13200-221 = "สะ... สงครามรวมพลัง...!"
13200-222 = "เป้าหมายก็คือหุบเขาของประธานสภานักเรียน...! เราจะบุกไปที่นั่นแล้วเอาปืนแม่เหล็กไฟฟ้ากลับมา! แค่กๆ แค่กๆๆ...!!"
13200-223 = "ไปเอาปืนแม่เหล็กไฟฟ้ามาจากเขตปกครองตนเองอะบิดอสให้จงได้!!!"
13200-224 = "ระ... รับทราบครับ!"

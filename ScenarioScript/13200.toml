[translation]
13200-1 = "Episode 20;Treasure Hunt"
13200-4 = "..."
13200-8 = "Hoshino! "
13200-9 = "What about the president?"
13200-12 = "Heeheehee. "
13200-17 = "..."
13200-20 = "The helicopter...?! "
13200-25 = "...He got away."
13200-27 = "Unfortunately, my little friends, the Train Cannon is mine!"
13200-28 = "To put it simply, checkmate."
13200-31 = "The card, Suou?"
13200-32 = "Here it is."
13200-37 = "W-Wait a minute... That's my card! When did you...?! "
13200-38 = "We need this to access the path to the Valley of Student Council Presidents."
13200-40 = "Valley of Student Council Presidents...?"
13200-41 = "Yes, according to our analysis, we need a Nephthys owner's authentication to access the route there. "
13200-42 = "Ideally, the owner would be present as well...but it seems Hoshino won't let that happen. "
13200-44 = "...But it should be fine as long as we have this card."
13200-45 = "Is the Train Cannon...at this, \"Valley of Student Council Presidents\"...?"
13200-46 = "You still plan on giving chase? I won't allow it."
13200-47 = "We've assessed the Train Cannon Schemata's monetary value! We've taken into account its strategic, technological, and historical significance..."
13200-48 = "The value is...approximately eighty billion yen!"
13200-49 = "E-Eighty billion yen...?!"
13200-50 = "What the heck is that ridiculous number?!"
13200-52 = "The Train Cannon legally belongs to Kaiser. Dare to lay a hand on it, and you'll have to pay an astronomical amount in compensation for property damages."
13200-53 = "Are you prepared to put yourself in more debt, Abydos Foreclosure Task Force?"
13200-56 = "If it comes to that...I'll get you a job at Kaiser PMC, Hoshino. Black Suit will be happy."
13200-57 = "Or would you like to go the proper route and engage in a legal battle with me? I welcome that as well. I will torment you endlessly until you graduate."
13200-60 = "Then, I'll torment your new students. If there are any, that is, hahaha!"
13200-65 = "So... Huh? "
13200-66 = "What is it, Suou?"
13200-72 = "Wh-What are you doing...?!"
13200-73 = "AHHHHHH!!"
13200-79 = "What are you...?!"
13200-88 = "Gyah!!"
13200-92 = "She pushed him off...!"
13200-93 = "...?!"
13200-94 = "Wh-What?! Out of nowhere?!"
13200-95 = "...Wh-Why would she?"
13200-100 = "Ugh..."
13200-101 = "Gr... Grr... Ugh..."
13200-105 = "President!!"
13200-106 = "A-Are you okay?!"
13200-107 = "Grr... Ugh... "
13200-111 = "His injuries are severe! C-Contact headquarters immediately!"
13200-113 = "...Takanashi Hoshino. The Valley of Student Council Presidents. You know where that is, right? "
13200-114 = "I will await you there. Give chase, if you want to stop the Train Cannon. "
13200-116 = "You... "
13200-117 = "If you fail to do so, I'll activate the Train Cannon and take it away from Abydos."
13200-121 = "..."
13200-122 = "V-Valley of the Student Council Presidents...? Wh-Where is that?"
13200-123 = "I-I'm not sure. I feel like I've heard it before..."
13200-127 = "(Valley of Student Council Presidents...)"
13200-128 = "(I remember... Sector 35-9.)"
13200-130 = "It's going to be the same no matter where we go. If this \"Abydos Presidents' Exhibition Hall,\" with all those valuable treasures, actually existed... "
13200-131 = "...the previous student council members would've found it and sold everything off ages ago."
13200-134 = "It's said that the former student council presidents of Abydos constructed an exhibition hall, back in the day. "
13200-135 = "It's commonly known as the Valley of Student Council Presidents... I know it... To think the Train Cannon was there all along..."
13200-141 = "Wait! Hoshino?! "
13200-146 = "Wh-Where are you going?!"
13200-147 = "Hoshino! Please wait! Just talk to us!"
13200-148 = "H-Hoshino!"
13200-149 = "We have to talk! Everything is okay now! We even saved Nonomi... "
13200-151 = "We didn't have to deny Yume's presidency or the Foreclosure Task Force, thanks to Sensei."
13200-152 = "Yes! So, don't go alone! We'll do this together!"
13200-153 = "...I'm sorry. I can't do that."
13200-154 = "What?! "
13200-155 = "Hoshino, y-you're not..."
13200-156 = "[ns] \"Hoshino, wait.\""
13200-158 = "If I return to the Foreclosure Task Force now...we won't be able to destroy the Train Cannon."
13200-159 = "...!!"
13200-160 = "...I can't be a part of the Foreclosure Task Force. My Abydos Student Council has to be separate from you guys."
13200-161 = "What?!"
13200-162 = "No! Your declaration is meaningless now! "
13200-164 = "...Even if it is meaningless, I still need it for what I have to do."
13200-165 = "Yes, everything that happens from here on out has to be unrelated to the Foreclosure Task Force. "
13200-166 = "...!!"
13200-167 = "This'll just be a rogue attack from Hoshino, a member of the fake student council. Otherwise, the blame will fall on the Foreclosure Task Force."
13200-171 = "[ns] \"Wait, Hoshino!\""
13200-177 = "A smokescreen?"
13200-185 = "I'm sorry, Shiroko. "
13200-195 = "Gah!"
13200-196 = "The Train Cannon can't remain in Abydos. No matter what. "
13200-197 = "I'm going to destroy it. I won't let it block my juniors' path forward."
13200-198 = "And thanks for preserving Yume's memory. All of you."
13200-203 = "Hoshino!"
13200-209 = "Just a bit longer! Our transport is nearly here!"
13200-210 = "Ugh... Out of Abydos... Escort me... And..."
13200-211 = "Contact headquarters and have the entire group...not just Kaiser PMC...gather here...!"
13200-212 = "Th-The entire group?"
13200-214 = "Yes!! "
13200-215 = "Kaiser Industries..."
13200-216 = "Kaiser Loans..."
13200-217 = "Kaiser Constructions..."
13200-218 = "...even the Kaiser Convenience Stores."
13200-219 = "Summon the entirety of Kaiser PMC's forces! All of the subsidiaries!"
13200-220 = "It's an all-out war! Kaiser Corporation will engage in total war in Abydos...!!"
13200-221 = "Total war...!"
13200-222 = "Our target is the Valley of Student Council Presidents...! Secure the Train Cannon! *cough* *cough*...!"
13200-223 = "The Train Cannon must be taken out of the Abydos district! It absolutely must!"
13200-224 = "Yes, absolutely!"
13200-230 = "..."
13200-231 = "Hoshino..."
13200-232 = "... "
13200-239 = "..."
13200-245 = "Next Episode;Second Pursuit"

[translation]
13200-1 = "第20話;尋寶"
13200-4 = "……"
13200-8 = "星野前輩！"
13200-9 = "總裁呢？"
13200-12 = "呵呵呵。"
13200-17 = "……"
13200-20 = "直升機……！？"
13200-25 = "……被他逃了。"
13200-27 = "沒錯，真可惜啊，各位。#n這樣列車砲就歸我所有了。"
13200-28 = "也就是說，你們被我將軍了。"
13200-31 = "蘇芳，那個東西呢？"
13200-32 = "在這裡。"
13200-37 = "那是……我的卡片！？#n是，是在什麼時候……！？"
13200-38 = "想打通前往「學生會之谷」的路線，可不能少了這個。"
13200-40 = "學生會之谷……？"
13200-41 = "沒錯。從分析的結果來看，#n如果想解除通往該處的路線，似乎需要奈芙蒂斯集團老闆的認證。"
13200-42 = "照理說應該由本人到場才對……不過既然星野也在，想達成恐怕沒那麼容易。"
13200-44 = "……然而只要有這張卡片就沒問題了。"
13200-45 = "列車砲……在「學生會之谷」嗎……？"
13200-46 = "難道你們也盯上了列車砲嗎？那可不行！"
13200-47 = "來，這就是我們所鑑定的「列車砲謝瑪塔」的價值！#n戰略價值、技術價值、歷史價值全部都有考量在內。"
13200-48 = "金額……大約是八百億元！"
13200-49 = "八，八百億元……！？"
13200-50 = "這是什麼天文數字……！？"
13200-52 = "列車砲是凱薩的所有物。#n只要你們膽敢對它出手，就必須付出天文數字等級的賠償。"
13200-53 = "你們有這種覺悟嗎？阿拜多斯對策委員會？"
13200-56 = "假如事情變成那樣的話……星野，我就僱用你來凱薩PMC吧。#n黑色西裝人想必也會很高興的。"
13200-57 = "還是說，你們想照規矩打官司呢？#n想這麼做我也不反對。我會不斷折磨你們，一直到你們畢業。"
13200-60 = "接著再繼續折磨你們阿拜多斯的新生……當然前提是得先有新生就是了。#n哈哈哈哈──！"
13200-65 = "所以……嗯？"
13200-66 = "怎麼了，蘇芳？"
13200-72 = "你，你做什麼……！？"
13200-73 = "呃啊啊啊啊啊啊啊──！？！？"
13200-79 = "什，什麼……！？"
13200-88 = "呃啊啊啊──！"
13200-92 = "被從直升機上推下去了……！！"
13200-93 = "……！！？"
13200-94 = "搞，搞什麼！？這麼突然！？"
13200-95 = "這究竟是……"
13200-100 = "呃……"
13200-101 = "唔……唔唔…………"
13200-105 = "總裁！！"
13200-106 = "您，您沒事吧？"
13200-107 = "唔……呃……"
13200-111 = "傷得很重！快，趕快聯絡總部……！"
13200-113 = "……小鳥遊星野。#n學生會之谷、葬學殿……你應該知道那是哪裡吧？"
13200-114 = "我會在那裡等你。#n想阻止列車砲就到那裡找我吧。"
13200-116 = "你是……"
13200-117 = "如果你不來，我就會發動列車砲離開阿拜多斯。"
13200-121 = "……"
13200-122 = "學，學生會之谷……？#n那是什麼地方？"
13200-123 = "我，我也不知道！#n雖然好像在哪裡聽過……"
13200-127 = "（學生會之谷……）"
13200-128 = "（我想起來了……區域35-9）"
13200-130 = "其他地方應該也一樣吧。"
13200-131 = "展示著貴重寶物的阿拜多斯學生會長展示館？#n如果真的有那種東西，早就被學生會的人找出來賣光了。"
13200-134 = "阿拜多斯過去的學生會長，在沙漠的某處建造的紀念建築。"
13200-135 = "俗稱學生會之谷……#n我知道那個地方……原來列車砲就藏在那裡啊。"
13200-141 = "等等！星野前輩！"
13200-146 = "你，你要去哪裡！"
13200-147 = "前輩！請你回答我們！！"
13200-148 = "星，星野前輩！"
13200-149 = "為什麼不說話！#n現在野乃美前輩也沒事了……已經夠了吧！"
13200-151 = "因為有老師幫忙，我們也沒有否定夢會長的學生會和我們的對策委員會。"
13200-152 = "沒錯！所以別一個人去，前輩！跟我們一起去吧！！"
13200-153 = "……抱歉，這樣不行。"
13200-154 = "什麼！？"
13200-155 = "星野前輩，難道……"
13200-156 = "[s]「星野，你先等等。」"
13200-158 = "如果我現在重新加入對策委員會……就不能破壞列車砲了。"
13200-159 = "……！！"
13200-160 = "……我不能加入對策委員會。#n我的阿拜多斯學生會和對策委員會必須獨立存在。"
13200-161 = "咦！？"
13200-162 = "不！那個宣言現在沒有意義！！"
13200-164 = "……就算失去意義，我還是需要那個宣言。"
13200-165 = "沒錯，因為接下來發生的事，必須和對策委員會無關。"
13200-166 = "……！！"
13200-167 = "這必須是假冒學生會的星野擅自展開的襲擊。#n不然責任就會轉嫁到對策委員會頭上。"
13200-171 = "[ns]「等等啊，星野！！」"
13200-177 = "煙，煙霧彈！？"
13200-185 = "抱歉，白子醬。"
13200-195 = "唔！"
13200-196 = "列車砲不能存在於阿拜多斯，絕對不行。"
13200-197 = "我要去破壞它。不能讓它阻撓後輩們的路。"
13200-198 = "還有，謝謝你們肯定夢前輩。"
13200-203 = "……星野前輩！！"
13200-209 = "請，請您稍等！車輛就快抵達了！"
13200-210 = "唔……趕緊帶我離開阿拜多斯……保護我……還有……"
13200-211 = "聯絡總部，把凱薩PMC……把凱薩集團的所有成員……通通都給我叫來……！！"
13200-212 = "所，所有成員是嗎？"
13200-214 = "沒錯！"
13200-215 = "凱薩工業。"
13200-216 = "凱薩信貸。"
13200-217 = "凱薩建設。"
13200-218 = "凱薩便利商店也一樣……"
13200-219 = "把凱薩PMC的所有兵力叫來！集結旗下企業的所有兵力！"
13200-220 = "我要展開總力戰！在阿拜多斯發動凱薩公司的總力戰……！！"
13200-221 = "總，總力戰……！"
13200-222 = "目標是學生會之谷……！#n往那裡進攻，一定要把列車砲搶過來！咳咳，咳咳咳咳……！！"
13200-223 = "把列車砲從阿拜多斯自治區搶過來！！聽見沒有！！"
13200-224 = "我，我明白了！"
13200-230 = "……"
13200-231 = "星野前輩……"
13200-232 = "…… "
13200-239 = "……"
13200-245 = "下一話;第二次追擊"

[translation]
10007010-1 = "#title;제1화;무허가 온천"
10007010-2 = "#place;붉은겨울 학원 회장 집무실"
10007010-3 = "#wait;1000"
10007010-4 = "3;체리노;S2_99;음냐, 음냐…….\n#3;em;…\n#3;a"
10007010-5 = "3;체리노;S2_99;카스텔라도, 딸기 우유도, 바나나도……."
10007010-6 = "3;체리노;S2_03;후후…… 다 이 몸의 것이니라…….\n#3;em;[///]"
10007010-7 = "#st;[0,0];instant;1;"
10007010-8 = "#wait;2000\n#clearST"
10007010-9 = "[ns1] 흔들어서 깨운다.\n[ns2] 볼을 찔러본다."
10007010-10 = "3;체리노;S2_03\n#3;stiff\n#wait;1200"
10007010-11 = "3;체리노;S2_03\n#3;stiff\n#wait;300"
10007010-12 = "#wait;800"
10007010-13 = "3;체리노;S2_04;으헥……?\n#3;shake\n#3;em;[?!]"
10007010-14 = "#st;[0,0];instant;1;"
10007010-15 = "#clearST"
10007010-16 = "3;체리노;S2_04\n#3;falldownL\n#wait;1500"
10007010-17 = "#all;hide\n#bgshake\n#wait;2000"
10007010-18 = "3;체리노;S2_05;누, 누구냐? 이 몸의 낮잠을 방해하는 녀석은!\n#3;a\n#3;hophop"
10007010-19 = "#st;[0,0];instant;1;"
10007010-20 = "#clearST"
10007010-21 = "3;체리노;S2_02\n#3;em;[반응]\n#wait;1200"
10007010-22 = "3;체리노;S2_01;아, 콤라드인가. 오랜만이로군."
10007010-23 = "3;체리노;S2_05;하지만 이 몸의 귀중한 낮잠 시간을 방해하다니, 이 무슨 무례인가!\n#3;stiff\n#3;em;[빠직]"
10007010-24 = "3;체리노;S2_99;이 수염의 권위에 걸고 그대를……."
10007010-25 = "#st;[0,0];instant;1;"
10007010-26 = "#clearST"
10007010-27 = "3;체리노;S2_99\n#3;em;…\n#wait;2500"
10007010-28 = "3;체리노;S2_02;어라? 내 수염?!"
10007010-29 = "3;체리노;S2_04;토, 토모에! 빨리 예비 수염을 가져와!\n#3;hophop"
10007010-30 = "#st;[0,0];instant;1;"
10007010-31 = "#clearST"
10007010-32 = "3;체리노;s2_04\n#3;dl\n#wait;1500"
10007010-33 = "#wait;2000"
10007010-34 = "3;체리노;99\n#3;ar\n#wait;1500"
10007010-35 = "3;체리노;01;……아무 일도 없었다. 그렇지, 토모에?\n#3;em;[반응]"
10007010-36 = "5;토모에;01;그렇습니다, 서기장님.\n#5;em;[반짝]\n#5;al\n#3;m1"
10007010-37 = "3;체리노;01;흠, 흠. 여하튼! 이 몸이 낮잠을 자고 있을 오후 시간대에 사무국을 방문하다니……"
10007010-38 = "3;체리노;05;콤라드, 그대의 시간 감각은 도대체 어떻게 된 것인가?\n#3;em;[빠직]"
10007010-39 = "5;토모에;02;회장님, 낮잠 시간은 이미 한 시간 전에 지났습니다."
10007010-40 = "3;체리노;02;그, 그런가? 벌써 시간이 이렇게…….\n#3;em;[땀]\n#3;stiff"
10007010-41 = "3;체리노;04;그러니까…… 이건 이 몸이 일부러 늦장을 부린 게 아니라……."
10007010-42 = "3;체리노;05;우읏! 이게 다 지진 때문이니라!\n#3;hophop"
10007010-43 = "[s] \"지진?\""
10007010-44 = "3;체리노;01;음, 최근 붉은겨울 학원에는 이상할 정도로 지진이 자주 일어나고 있거든.\n#3;m3\n#5;dr"
10007010-45 = "3;체리노;05;어젯밤에도 잠에 드려는 찰나에 갑자기 건물이 흔들리는 게 아닌가!\n#3;em;[빠직]"
10007010-46 = "3;체리노;06;천장이 어찌나 흔들리던지…… 건물이 무너질까 무서워서 한동안 잠을 이루지 못했어…….\n#3;stiff"
10007010-47 = "[s] \"그것 참 큰일이네.\""
10007010-48 = "3;체리노;99;암, 큰일이고 말고. 할 수만 있다면 지진을 숙청하고 싶을 정도라네."
10007010-49 = "3;체리노;01;……그나저나 콤라드는 갑자기 붉은겨울 학원에 어쩐 일인가?\n#3;em;[반응]"
10007010-50 = "[s3] \"붉은겨울 학원에 새로운 온천이 생겼다고 해서.\"\n[s4] \"온천욕을 즐기러 왔어.\""
10007010-51 = "3;체리노;02;……온천? 붉은겨울 학원에?"
10007010-52 = "3;체리노;02;……온천? 붉은겨울 학원에?"
10007010-53 = "3;체리노;03;하하하! 콤라드도 엉뚱한 구석이 있구나.\n#3;hophop\n#3;em;[재잘]"
10007010-54 = "3;체리노;99;붉은겨울 학원에는 눈과 얼음은 있어도 온천은 없느니라! 게헨나 학원으로 찾아갈 것을 착각한 게 아닌가?"
10007010-55 = "3;체리노;01;그렇지 않느냐, 토모에?\n#3;em;[?]"
10007010-56 = "5;토모에;02;저, 그게…… 사실 얼마 전에 붉은겨울 학원에도 온천이 하나 생겼습니다.\n#5;em;[...]\n#5;al\n#3;m1"
10007010-57 = "3;체리노;04;뭐라고? 붉은겨울 학원에 온천이 생겼다고? 어디에?\n#3;em;[?!]\n#3;shake"
10007010-58 = "5;토모에;00;특별반 학생들이 머무르고 있는 구교사 지역입니다."
10007010-59 = "5;토모에;01;구교사 인근에서 갑작스럽게 온천원이 발견되어, 그 주변에 온천장을 지었다고 하더군요."
10007010-60 = "3;체리노;04;정말? 그런데 붉은겨울 학원의 회장인 이 몸은 어째서 그 사실을 듣지 못했지?\n#3;stiff\n#3;em;[땀]"
10007010-61 = "5;토모에;02;지난주 정례 회의 때 보고드렸습니다만, 피곤하셨는지 회의 내내 주무시고 계셔서……."
10007010-62 = "3;체리노;05;우읏! 듣기 싫다! 이 몸이 자고 있었더라면 깨어난 이후에 다시 보고 했었어야지!\n#3;hophop\n#3;m3\n#5;dr"
10007010-63 = "3;체리노;05;붉은겨울 학원에 이 몸의 허가 없이 새로운 시설이 들어온다는 건 있을 수 없는 일이야!"
10007010-64 = "3;체리노;06;하필이면 온천이 구교사에서 터질 게 뭐람? 기껏 반성하라고 구교사에 보내놨더니 느긋하게 온천욕이나 즐기고 있다니…….\n#3;em;[속상함]\n#3;stiff\n#5;hide\n#fontsize;50"
10007010-65 = "3;체리노;01;이래서는 벌이 되지 않아!"
10007010-66 = "3;체리노;05;좀 더 가혹한 숙청을 해야 해, 숙청!\n#3;em;[빠직]\n#3;hophop"
10007010-67 = "3;체리노;02;아, 그러고보니 이 몸의 전용 전차, <숙청군 1호>는 완성되었던가?"
10007010-68 = "5;토모에;01;예. 지난 주에 도색 작업을 마치고 사무국에 무사히 인도되었습니다.\n#5;em;[반짝]\n#5;al\n#3;m1"
10007010-69 = "3;체리노;99;후후, 좋아."
10007010-70 = "3;체리노;05;지금 바로 숙청군 1호를 구교사로 끌고 가서 건방진 특별반 녀석들에게 뜨거운 맛을 보여주는 거야!\n#3;em;[!]"
10007010-71 = "[s] \"숙청군 1호?\""
10007010-72 = "3;체리노;01;음, <숙청군 1호>는 이 몸만을 위해 특별히 제작된 전용 전차이니라.\n#3;em;[반응]\n#3;m3\n#5;dr"
10007010-73 = "3;체리노;05;장갑에는 거대한 수염을 그려 이 몸의 권위를 멀리서도 알아볼 수 있게 하였고, 정면에는 삽날을 붙여 사무국의 앞길에 거슬리는 장애물을 분쇄할 수 있게 하였지!"
10007010-74 = "3;체리노;99;후후…… 이 숙청군 1호만 있다면 용역부 녀석들이 아무리 견고한 바리케이드를 쌓아 놓아도 순식간에 철거해 버릴 수 있다고!\n#3;stiff\n#3;em;[///]"
10007010-75 = "3;체리노;01;시험해 볼 기회가 없었는데 마침 잘 되었군. 특별반 녀석들이 얼마나 조악한 온천장을 건설했는지는 모르겠지만, 이 숙청군 1호로 순식간에 철거해주겠어!"
10007010-76 = "#all;hide"
10007010-77 = "3;체리노;05;자, 숙청의 시간이다!\n#3;em;[!]\n#3;closeup\n#fontsize;100"
10007010-78 = "#all;hide"

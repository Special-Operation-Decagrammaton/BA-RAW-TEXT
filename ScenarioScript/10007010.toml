[translation]
10007010-1 = "ตอนที่ 1;ออนเซ็นที่ไม่มีใบอนุญาต"
10007010-2 = "สำนักงานประธานสหภาพเรดวินเทอร์"
10007010-4 = "งืม งืม..."
10007010-5 = "ทั้งคาสเทลล่า... นมสตรอว์เบอร์รี... กล้วย..."
10007010-6 = "งืม... เป็นของเราทั้งนั้นเลย..."
10007010-9 = "[ns1] เขย่าปลุกเชริโน่\n[ns2] แตะแก้มเบาๆ"
10007010-13 = "เฮือกกก...?"
10007010-18 = "คะ... ใครน่ะ? ใครหน้าไหนมารบกวนเวลานอนกลางวันของเรา!"
10007010-22 = "อ๊ะ สหายเองเหรอ ไม่เจอกันนานเลยนะ"
10007010-23 = "แต่ว่ากล้าดียังไงถึงได้มารบกวนเวลานอนกลางวันอันมีค่าของเราน่ะ!"
10007010-24 = "เราจะใช้อำนาจแห่งหนวดของเรา..."
10007010-28 = "เอ๊ะ? หนวดของเราล่ะ?!"
10007010-29 = "ทะ...โทโมเอะ! รีบเอาหนวดสำรองมาให้เราเร็วเข้า!"
10007010-35 = "ไม่มีเรื่องอะไรทั้งนั้น ใช่มั้ยโทโมเอะ?"
10007010-36 = "ใช่แล้วค่ะท่านประธาน"
10007010-37 = "ฮึ่ม ฮึ่ม... เอาเถอะ! สหายมาเยี่ยมเราที่สำนักเลขาธิการในช่วงบ่ายที่ทุกคนนอนกลางวันกันแบบนี้..."
10007010-38 = "สหายนี่ไม่มีเซนส์เรื่องเวลาเลยหรือยังไงกัน?"
10007010-39 = "ท่านประธานคะ เวลานอนกลางวันเลยมาหนึ่งชั่วโมงแล้วนะคะ"
10007010-40 = "งะ...งั้นเหรอ? เวลาผ่านไปขนาดนี้แล้วเหรอ..."
10007010-41 = "คือ... เราไม่ได้คิดจะมัวอ้อยอิ่งอยู่หรอกนะ..."
10007010-42 = "อึ่ก...! ทั้งหมดนี่เป็นเพราะแผ่นดินไหวนั่นต่างหาก!"
10007010-43 = "[s] \"แผ่นดินไหว?\""
10007010-44 = "อื้ม เมื่อไม่นานมานี้ที่เขตสหภาพเรดวินเทอร์เกิดแผ่นดินไหวขึ้นบ่อยอย่างน่าประหลาดเลยละ"
10007010-45 = "เมื่อคืนตอนที่เรากำลังจะนอน จู่ๆ ตึกก็สั่นครืนๆ เลย!"
10007010-46 = "เพดานสั่นสะเทือน... จนเรากลัวว่าตึกจะถล่มลงมาจนนอนไม่หลับน่ะ..."
10007010-47 = "[s] \"แบบนั้นก็เรื่องใหญ่เลยนะ\""
10007010-48 = "อ๊ะ ไม่ใช่เรื่องใหญ่หรอก ถ้าทำได้ละก็เราก็อยากจะสั่งให้กวาดล้างแผ่นดินไหวเลยละ"
10007010-49 = "ว่าแต่สหายมีธุระอะไรถึงมาที่สหภาพเรดวินเทอร์ได้น่ะ?"
10007010-50 = "[s3] \"ได้ยินว่ามีออนเซ็นสร้างใหม่ที่สหภาพเรดวินเทอร์น่ะ\"\n[s4] \"ครูแวะมาแช่ออนเซ็นน่ะ\""
10007010-51 = "ออนเซ็น...? ที่สหภาพเรดวินเทอร์น่ะเหรอ?"
10007010-52 = "ออนเซ็น...? ที่สหภาพเรดวินเทอร์น่ะเหรอ?"
10007010-53 = "ฮ่าฮ่าฮ่า! สหายเองก็มีมุมเบลอๆ เหมือนกันสินะ"
10007010-54 = "ถึงที่สหภาพเรดวินเทอร์จะมีหิมะกับน้ำแข็งอยู่ก็จริง แต่เราไม่มีออนเซ็นหรอกนะ!#nเข้าใจผิดว่าจะไปที่สถาบันเกเฮนน่ารึเปล่า?"
10007010-55 = "ใช่มั้ยโทโมเอะ?"
10007010-56 = "คือเรื่องนั้น... ที่จริงแล้วเมื่อไม่นานมานี้ที่สหภาพเรดวินเทอร์มีออนเซ็นสร้างขึ้นมาใหม่อยู่ค่ะ"
10007010-57 = "ว่าไงนะ? ที่สหภาพเรดวินเทอร์มีออนเซ็นสร้างใหม่งั้นเหรอ? ที่ไหนน่ะ?"
10007010-58 = "ตรงเขตอาคารเรียนเก่าที่ใช้เป็นที่พักของกลุ่มนักเรียนพิเศษค่ะ"
10007010-59 = "ได้ยินว่าจู่ๆ ก็พบตาน้ำตรงใกล้ๆ อาคารเรียนเก่า เลยสร้างออนเซ็นขึ้นมาค่ะ"
10007010-60 = "จริงเหรอ? ถ้างั้นทำไมเราที่เป็นถึงประธานนักเรียนของสหภาพเรดวินเทอร์แห่งนี้#nถึงไม่ได้ข่าวเรื่องนั้นเลยล่ะ?"
10007010-61 = "ฉันรายงานไปแล้วในการประชุมสามัญเมื่อสัปดาห์ที่แล้ว อาจเป็นเพราะท่านประธานเหนื่อยมาก#nเลยหลับตลอดการประชุม..."
10007010-62 = "อึ่ก...! ไม่ฟังแล้ว! ถ้าตอนนั้นเราหลับละก็ พอเราตื่นแล้วก็รายงานเราใหม่ก็ได้นี่!"
10007010-63 = "การก่อสร้างออนเซ็นขึ้นในสหภาพเรดวินเทอร์โดยไม่ได้รับอนุญาตจากเรา#nเป็นเรื่องที่รับไม่ได้เด็ดขาด!"
10007010-64 = "แล้วทำไมที่อาคารเรียนเก่าถึงมีตาน้ำออนเซ็นได้ล่ะ? เราส่งพวกนั้นไปสำนึกผิดที่อาคารเรียนเก่าแท้ๆ แต่กลายเป็นว่าพวกนั้นกลับได้แช่น้ำกันเพลินเลยงั้นเหรอ..."
10007010-65 = "แบบนี้ก็ไม่ใช่การลงโทษน่ะสิ!"
10007010-66 = "ต้องกวาดล้างขั้นเด็ดขาด กวาดล้าง!"
10007010-67 = "อ๊ะ พอนึกดูแล้ว รถถังส่วนตัวของเรา <ผู้กวาดล้าง No.1> เสร็จสมบูรณ์รึยัง?"
10007010-68 = "ค่ะ หลังลงสีเสร็จเมื่อสัปดาห์ที่แล้วก็ส่งมอบมายังสำนักเลขาธิการเรียบร้อยแล้วค่ะ"
10007010-69 = "ฮุฮุ ดีละ"
10007010-70 = "เราจะขับผู้กวาดล้าง No.1 ไปที่อาคารเรียนเก่า แล้วสั่งสอนเจ้าพวกห้องเรียนพิเศษให้หลาบจำไปเลย!"
10007010-71 = "[s] \"ผู้กวาดล้าง No.1 เหรอ?\""
10007010-72 = "อื้อ <ผู้กวาดล้าง No.1> คือรถถังส่วนตัวสุดพิเศษของเราเองน่ะ"
10007010-73 = "ที่เกราะด้านนอกวาดรูปหนวดขนาดใหญ่เอาไว้เพื่อให้มองเห็นอำนาจของเราได้จากระยะไกล และที่ด้านหน้าจะติดใบมีดขนาดใหญ่เอาไว้ นั่นก็เพื่อทำลายสิ่งกีดขวางที่ขวางเส้นทางสำนักเลขาธิการ ให้หมดยังไงล่ะ!"
10007010-74 = "ฮุฮุ ถ้ามีรถถังผู้กวาดล้าง No.1 คันนี้อยู่ละก็ ต่อให้พวกทหารรับจ้างจะแข็งแกร่งแค่ไหน ก็คงจัดการได้ภายในพริบตาเลยละ!"
10007010-75 = "ยังไม่มีโอกาสได้ทดสอบเลย... พอดีเลยนะ ถึงจะไม่รู้ว่าเจ้าพวกเด็กห้องเรียนพิเศษสร้าง#nออนเซ็นได้แย่แค่ไหนก็เถอะนะ แต่รถถังผู้กวาดล้าง No.1 คันนี้ของเราก็จะกำจัดได้ในพริบตาอยู่ดี!"
10007010-77 = "เอาละ ถึงเวลาแห่งการปฏิวัติแล้ว!"

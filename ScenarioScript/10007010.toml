[translation]
10007010-1 = "第1話;未經許可什麼的沒聽過"
10007010-2 = "赤冬聯邦學園．會長辦公室"
10007010-4 = "呣喵呣喵……"
10007010-5 = "蜂蜜蛋糕……草莓牛奶……香蕉牛奶……"
10007010-6 = "唔嘿嘿……全都是咱的……"
10007010-9 = "[ns1] 輕輕地搖晃肩膀\n[ns2] 戳一戳好像很柔軟的臉頰"
10007010-13 = "嗯……？"
10007010-18 = "……是，是誰！？竟敢打擾咱睡午覺！"
10007010-22 = "什麼嘛，是同志啊。好久不見了。"
10007010-23 = "不過竟敢打擾咱珍貴的午覺時間，真是無禮！"
10007010-24 = "賭上這鬍子的權威……"
10007010-28 = "咦？咱的鬍子呢……！？"
10007010-29 = "智，智惠！快把備用鬍子拿來！"
10007010-35 = "……剛才什麼事也沒發生。對吧，智惠？"
10007010-36 = "您說的沒錯，書記長。"
10007010-37 = "總，總之！睡眠對咱來說是必要的，竟敢在這麼重要的時間過來……"
10007010-38 = "同志的時間觀念究竟是怎麼回事？"
10007010-39 = "潔莉諾會長，午睡時間在一小時之前就已經結束了……"
10007010-40 = "是，是嗎？咱都沒注意到……"
10007010-41 = "那個……這不是咱睡過頭了之類的……"
10007010-42 = "唔唔！這全都是地震的錯！"
10007010-43 = "[s]「地震？」"
10007010-44 = "唔呣。赤冬罕見的地震頻發呢。"
10007010-45 = "昨天也是在咱正打算睡覺的瞬間，建築就突然搖了起來……！"
10007010-46 = "因為實在是太搖了，咱擔心建築會不會倒塌擔心得睡不著覺……"
10007010-47 = "[s]「那真是糟糕呢，沒事真是太好了。」"
10007010-48 = "唔呣，真是糟透了。能做到的話咱都想對地震展開肅清了。"
10007010-49 = "……話說回來，同志為何會突然到赤冬來呢？"
10007010-50 = "[s3]「因為我聽說赤冬挖到了新的溫泉。」\n[s4]「所以想來看看。」"
10007010-51 = "……溫泉？在這個赤冬聯邦學園？"
10007010-52 = "……溫泉？在這個赤冬聯邦學園？"
10007010-53 = "哈哈哈！同志真會開玩笑。"
10007010-54 = "赤冬聯邦學園有雪有冰卻沒有溫泉！同志是不是跟格黑娜學園搞錯了？"
10007010-55 = "對吧，智惠？"
10007010-56 = "那個……其實不久之前，赤冬聯邦學園也挖到了溫泉。"
10007010-57 = "你，你說什麼？赤冬聯邦學園裡有溫泉？在哪裡？"
10007010-58 = "就在特別班的學生們所在的舊校舍周圍。"
10007010-59 = "似乎是突然就發現了泉源，於是就在那裡建立了溫泉浴場。"
10007010-60 = "什……！那麼重大的事，為什麼身為赤冬聯邦學園學生會長的咱會不知道！？"
10007010-61 = "在上週的例行會議上有向您報告過此事，但當時會長似乎相當疲憊，#n一直處於沉睡之中……"
10007010-62 = "唔唔，咱不想聽那種藉口！#n如果咱睡著了，就應該在咱醒來後再報告一次吧！"
10007010-63 = "再說，在這赤冬聯邦學園裡，不經咱的允許就建造新的設施真是豈有此理！"
10007010-64 = "而且還偏偏是在舊校舍……#n明明是讓人反省的場所，這樣不就反而變成享受了嗎……"
10007010-65 = "這樣就不算處罰了！"
10007010-66 = "無視咱的命令的傢伙全都要肅清！"
10007010-67 = "好，那麼立刻出發……之前，咱專用的戰車「肅清君1號」完工了嗎？"
10007010-68 = "是的。上周結束了塗裝作業，順利完工了。"
10007010-69 = "呵呵，很好。"
10007010-70 = "既然如此，就和「肅清君1號」一起前往舊校舍吧。#n得讓那些得意忘形的特別班的傢伙們開開眼界！"
10007010-71 = "[s]「『肅清君1號』……？」"
10007010-72 = "唔呣。「肅清君1號」是專為咱打造的專屬戰車。"
10007010-73 = "因為在裝甲上畫了巨大的鬍子，在遠處就能將咱的權威看得一清二楚。#n而且正面還加裝了大型的鏟子，能將事務局的障礙都清理得一乾二淨……"
10007010-74 = "只要有了「肅清君1號」，無論工務部的那些傢伙打造出多麼堅固的防護牆，#n咱都能在轉眼間拆除才對！"
10007010-75 = "之前一直都還在建造中，現在時機正好。#n雖然不清楚特別班的那些傢伙到底建了多麼寒酸的溫泉浴場，#n就用這台「肅清君1號」加以肅清吧！"
10007010-77 = "來吧，肅清的時候到了！"

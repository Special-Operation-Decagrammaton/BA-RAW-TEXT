[translation]
10007010-1 = "Episode 1;Unauthorized Hot Springs"
10007010-2 = "Red Winter Academy Presidential Office"
10007010-4 = "Zzz..."
10007010-5 = "Castella, strawberry milk, banana..."
10007010-6 = "Heehee...They're all mine..."
10007010-9 = "[ns1] Shake her awake.\n[ns2] Poke her cheek."
10007010-13 = "H-Huh?"
10007010-18 = "What commoner dares disturb my work-sanctioned nap?"
10007010-22 = "Oh. Comrade. It's been a while."
10007010-23 = "Of course you would be the only one audacious enough to interrupt my precious nap time!"
10007010-24 = "On the authority of my mustache, I will..."
10007010-28 = "Huh? My mustache?!"
10007010-29 = "Tomoe! Bring the spare mustache! Quickly!"
10007010-35 = "You saw nothing. Right, Tomoe?"
10007010-36 = "Saw what, Great Leader?"
10007010-37 = "Saw nothing! Anyway! Daring to encroach upon the Secretariat during nap time..."
10007010-38 = "Comrade, have you no sense of dignity or respect?"
10007010-39 = "President, nap time ended approximately one hour ago."
10007010-40 = "Wh-What a shock."
10007010-41 = "Ahem! Of course I was not deliberately sleeping extra!"
10007010-42 = "And even if I was, it's the fault of those dastardly earthquakes!"
10007010-43 = "[s] \"Earthquakes?\""
10007010-44 = "Lately, Red Winter Academy has been plagued by inexplicable earthquakes!"
10007010-45 = "Just last night, I was rudely shaken awake just as I was drifting to sleep."
10007010-46 = "And I couldn't sleep a single wink after that, afraid of the very building I slept in collapsing around me."
10007010-47 = "[s] \"That's terrible.\""
10007010-48 = "It truly is! I'm glad we see eye to eye on this, Comrade."
10007010-49 = "What brings you to Red Winter Academy?"
10007010-50 = "[s3] \"A lot of rumors have been going around about the new hot springs.\"\n[s4] \"I wanted to take a dip in the hot springs.\""
10007010-51 = "...Hot springs? At Red Winter Academy?"
10007010-52 = "...Hot springs? At Red Winter Academy?"
10007010-53 = "Hahaha! Comrade, you are skilled at making me laugh!"
10007010-54 = "We are an academy of snow and ice, not steam and hot water! Did you confuse us with Gehenna Academy?"
10007010-55 = "Did you hear Comrade's silly joke, Tomoe?"
10007010-56 = "A hot springs resort recently opened at Red Winter Academy, Great Leader."
10007010-57 = "Here? In my school?! I demand you tell me its location immediately."
10007010-58 = "Of course, Great Leader. The Former Institute where you banished the Spec Ops students to."
10007010-59 = "Apparently a hot spring stream suddenly sprung up, and they established a resort there."
10007010-60 = "Are you trying to tell me that I, the president of Red Winter Academy, was not informed of this?"
10007010-61 = "With all due respect, Great Leader, you fell asleep during my report at last week's meeting."
10007010-62 = "Ugh! Tomoe, it was obviously your responsibility to re-report it once I woke up!"
10007010-63 = "I will never accept this insubordination. Development? Without my approval?"
10007010-64 = "And at the Former Institute, of all places? What about my orders to reflect on their actions? I never told them to enjoy the hot springs!"
10007010-65 = "This is the very opposite of punishment."
10007010-66 = "They will truly face the wrath of the mustache!"
10007010-67 = "Tomoe, report. What is the status of my personal tank, the Purginator No. 1?"
10007010-68 = "Painting was completed to your exact instruction, and it was delivered to the Secretariat just last week."
10007010-69 = "Finally, someone properly following my orders."
10007010-70 = "Come, Tomoe. We will go the Former Institute with the Purginator No. 1 and teach those rule breakers real fear!"
10007010-71 = "[s] \"The Purginator No. 1?\""
10007010-72 = "Curious, are you? It's my special, custom-made tank."
10007010-73 = "Behold! The giant mustache which can be seen from any distance. The dozer blades in front shine with unquestionable authority that will crush any who oppose the Secretariat! My beloved creation!"
10007010-74 = "With it, I'll demolish Labor Party barricades and squash illegal hot springs resorts!"
10007010-75 = "I'll purge the Spec Ops students' dreams and insubordination in one fell swoop!"
10007010-77 = "Let the debut of the Purginator No. 1 commence!"

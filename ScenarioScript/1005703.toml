[translation]
1005703-1 = "ขั้นตอนก็สำคัญเหมือนกับผลลัพธ์นะคะ"
1005703-3 = "เร่เข้ามา~ ถูกๆ เลยจ้า! ลดพิเศษส่งท้ายปีเก่าเลยจ้า!"
1005703-4 = "เข้ามาดูก่อนได้เลยจ้า! สดๆ ใหม่ๆ ทุกอย่างเลยจ้า!"
1005703-5 = "กำลังหาอะไรอยู่หรือครับ? ร้านเรามีทุกอย่างเลยนะครับๆ สดทุกอย่างเลยด้วย!"
1005703-6 = "[s] \"ที่นี่มันคือที่ไหนกันเนี่ย...?\""
1005703-8 = "ฮุฮุฮุ"
1005703-9 = "ตลาดในย่านการค้าไงล่ะคะ"
1005703-10 = "พอเป็นช่วงเทศกาล ที่นี่ก็จะครึกครื้นแบบนี้ค่ะ"
1005703-11 = "[s] \"เรื่องนั้นครูก็พอรู้อยู่ แต่เรามาตลาดทำไมเหรอ?\""
1005703-12 = "เรื่องนั้น..."
1005703-13 = "ก็เพราะว่าที่นี่..."
1005703-14 = "คือสนามรบแห่งรสอร่อยยังไงล่ะคะ!"
1005703-15 = "เหล่าคนขายของที่พยายามขายวัตถุดิบคุณภาพดีในราคาแพงหูฉี่"
1005703-16 = "และเหล่าเชฟกับเจ้าของร้านที่พยายามซื้อวัตถุดิบเหล่านั้นในราคาถูก..."
1005703-17 = "สถานที่สู้รบแท้จริงของพวกเขา!"
1005703-18 = "ฉันมาที่นี่เพื่อดูการต่อสู้ของพวกเขาค่ะ"
1005703-19 = "ในฐานะผู้ที่แสวงหาเส้นทางของอาหารเลิศรส"
1005703-20 = "ขั้นตอนที่นำไปสู่อาหารเลิศรส..."
1005703-21 = "ฉันคิดว่าตัวเองจำเป็นจะต้องรู้เรื่องพวกนั้นด้วยค่ะ"
1005703-28 = "เอ้าๆ! เร่เข้ามาเลยจ้า! วัตถุดิบชิ้นแรกของวันนี้ ปลากะพงตัวเบิ้มๆ หนัก 3 กก.!"
1005703-29 = "เนื้อแน่นๆ สดๆ เด้งๆ เลยคร้าบบบ! "
1005703-30 = "ของดีแบบนี้หาที่ไหนไม่ได้อีกแล้วนะครับ!"
1005703-32 = "อืม... ปลากะพงคุณภาพดีจริงๆ ด้วย..."
1005703-33 = "ราคาจะพุ่งขนาดไหนเนี่ย? หวังว่าปลาตัวเดียวคงจะไม่ต้องทุ่มเงินเยอะนะ"
1005703-34 = "เถ้าแก่บอกให้ซื้อปลากะพงคุณภาพดีกลับไปให้ได้ด้วยสิ..."
1005703-36 = "ถ้างั้นจะเริ่มประมูลแล้วนะครับ! เริ่มต้นที่ 6500 ครับ!"
1005703-37 = "7000!"
1005703-38 = "ถ้างั้นฉัน... 7200!"
1005703-39 = "7... 7300!"
1005703-40 = "ฮะๆ ดุเดือดตั้งแต่เริ่มเลยนะ เอ้า ฉันให้... 7500!"
1005703-41 = "น่าเสียดายนะ... 7700!"
1005703-42 = "เถ้าแก่จะด่ามั้ยเนี่ย... 7750!"
1005703-44 = "ดูนั่นสิคะคุณครู เริ่มดุเดือดขึ้นแล้วค่ะ"
1005703-45 = "ฮุฮุฮุ... การต่อสู้เพื่อวัตถุดิบชั้นเลิศ "
1005703-46 = "ความร้อนแรงที่เกิดขึ้นในขั้นตอนนั้น..."
1005703-47 = "แค่ยืนอยู่เฉยๆ ยังรู้สึกได้ถึงความดุเดือดของการต่อสู้เลยค่ะ"
1005703-48 = "[s] \"ฮารุนะดูจะสนุกนะเนี่ย...\""
1005703-49 = "ค่ะ สนุกมากเลยค่ะ พอได้เห็นชีวิตประจำวันของใครบางคน... ภาพแบบนี้ไม่ค่อยได้เห็นกันบ่อยนัก#nหรอกนะคะ "
1005703-50 = "อีกอย่าง... พอได้มาดูกับตาแบบนี้ มัน..."
1005703-51 = "[s] \"มัน...?\""
1005703-52 = "9000!"
1005703-53 = "[s] \"ฮารุนะ!?\""
1005703-55 = "โอ้ แม่หนูเอากับเขาด้วยเหรอเนี่ย เปิดตัวอย่างดุเดือดไม่เกรงใจใครเลยนะ?"
1005703-56 = "ขอเดิมพันด้วยศักดิ์ศรีพ่อครัวเลย ฉันไม่ยอมแพ้ง่ายๆ หรอก"
1005703-57 = "เฮ้อ... รู้งี้ให้เถ้าแก่มาเองดีกว่า..."
1005703-58 = "ฉันให้ 9500!"
1005703-59 = "9800!"
1005703-60 = "10,000!"
1005703-65 = "(จากนั้นการประมูลก็ดุเด็ดเผ็ดมันขึ้นในพริบตาเดียว)"
1005703-66 = "(และผู้ชนะการประมูล... ก็คือฮารุนะ)"
1005703-67 = "(ส่วนราคาประมูล... ขอละไว้ในฐานที่เข้าใจ)"
1005703-72 = "ฮุฮุ ฮุฮุฮุ..."
1005703-73 = "[s] \"เป็นอะไรรึเปล่า...?\""
1005703-74 = "ถามอะไรอย่างนั้นละคะ"
1005703-75 = "ถ้าเป็นการลงทุนเพื่ออาหารเลิศรสแล้วละก็ ราคาเท่านี้ถือว่าถูกแสนถูกเลยค่ะ"
1005703-76 = "ตอนนี้ปัญหาก็คือเราจะเอาปลากะพงนี่ไปปรุงยังไงดี..."
1005703-77 = "คุณครูคะ? ฉันอยากเอาปลากะพงนี่ไปให้ร้านอาหารที่รู้จักทำโอมากาเสะให้..."
1005703-78 = "คุณครูช่วยไปกับฉันหน่อยได้รึเปล่าคะ?"
1005703-86 = "ขอโทษที่ให้รอนะครับ ซุปปลากะพงครับ"
1005703-87 = "ตายจริง นี่มัน..."
1005703-92 = "ซูชิปลากะพงและซาชิมิปลากะพงครับ "
1005703-93 = "หนังปลากะพงลวกครับ"
1005703-94 = "อืมๆ อื้ม..."
1005703-96 = "ปลากะพงทอดกับฟุโตมากิครับ"
1005703-97 = "อื้ม..."
1005703-99 = "อุด้งปลากะพง น้ำซุปปรุงจากการเคี่ยวก้างและเนื้อส่วนกระพุ้งแก้มครับ"
1005703-100 = "จะทานแล้วนะคะ"
1005703-102 = "ของหวานเป็นไอศกรีมที่ทำจากผลไม้แห้งบดครับ"
1005703-106 = "ค่ะ ขอบคุณมากค่ะ"
1005703-109 = "เป็นยังไงบ้างคะคุณครู?"
1005703-110 = "[s1] \"เยอะจนไม่รู้ว่าอะไรเป็นอะไรเลย\"\n[s2] \"สุดยอดเลย...\""
1005703-113 = "งั้นเหรอคะ?"
1005703-114 = "สำหรับฉัน... พอเทียบกับการประมูลที่ดุเดือดนั่นแล้ว"
1005703-115 = "ฉันว่าปลานี่... ค่อนข้างธรรมดามากเลยค่ะ"
1005703-116 = "[s3] \"ถะ...ถ้างั้นจะกลับไประเบิดตลาดประมูลงั้นเหรอ?\"\n[s4] \"ถะ...ถ้างั้นจะระเบิดร้านอาหารเลยเหรอ?\""
1005703-119 = "ไม่หรอกค่ะๆ ถ้าตามมาตรฐานของปลาทั่วไปก็ถือว่าปกติค่ะ"
1005703-120 = "การประมูลเองก็สนุกมากๆ"
1005703-121 = "แถมยังได้มาทานอาหารอร่อยๆ กับคุณครูด้วยค่ะ"
1005703-122 = "[s] \"งั้นก็ค่อยยังชั่วหน่อย...\""
1005703-123 = "ค่ะ แต่ว่า..."
1005703-125 = "การค้นหารสชาติอันล้ำเลิศนี่... ไม่ใช่เรื่องง่ายๆ เลยนะคะ"

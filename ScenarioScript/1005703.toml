1005703-74 = "Nothing to worry about."
1005703-75 = "This is a cheap price to pay to delve into the world of gastronomy."
1005703-76 = "I do have to decide what to actually do with this snapper though..."
1005703-77 = "There's a restaurant that does chef's choice specials with customer ingredients."
1005703-78 = "Do you want to come with me?"
1005703-86 = "Thanks for waiting. This is the snapper porridge."
1005703-87 = "And this..."

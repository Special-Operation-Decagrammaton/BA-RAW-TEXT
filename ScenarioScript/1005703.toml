[translation]
1005703-1 = "結果在過程之中"
1005703-3 = "來～走過路過別錯過！現正舉辦年末大特賣唷！"
1005703-4 = "那位客人請進來看看吧！現在還能獲得贈品哦！"
1005703-5 = "請問在找什麼商品呢？我們家的東西美味又新鮮哦！"
1005703-6 = "[s]「這裡是……」"
1005703-8 = "唔呵呵。"
1005703-9 = "是商店街的市場。"
1005703-10 = "因為到了年底，比平時還要熱鬧呢。"
1005703-11 = "[s]「這我知道，不過為什麼要來市場呢？」"
1005703-12 = "那是因為……"
1005703-13 = "市場正是味道的戰場！"
1005703-14 = "……就是這樣。"
1005703-15 = "竭盡所能想把好的食材，以高價賣出的商人們。"
1005703-16 = "以及為了壓低價格，想方設法進行交涉的主廚或老闆……"
1005703-17 = "市場就是雙方正面對決的場所！"
1005703-18 = "因此今天，我想直接在現場見證。"
1005703-19 = "作為踏上美食之路的人……"
1005703-20 = "果然有必要了解美食製作的過程。"
1005703-21 = "──我是這麼想的。"
1005703-28 = "來來來！第一個就是好東西唷！首先是這尾巨大鯛魚！"
1005703-29 = "怎麼樣呀？看看這充滿光澤的漂亮紅色！ "
1005703-30 = "這種好東西可不是天天都有唷！來，準備好了嗎？"
1005703-32 = "呼呣。確實是好東西……"
1005703-33 = "就看價格如何了……畢竟預算也不是無限的。"
1005703-34 = "老闆交代一定要買到好的鯛魚……"
1005703-36 = "那麼就從六千五百元起標！"
1005703-37 = "七千！"
1005703-38 = "那我出……七千二！"
1005703-39 = "七，七千三！"
1005703-40 = "可不能一開始就放過，七千五！"
1005703-41 = "雖然有點勉強……七千七！"
1005703-42 = "嗚，沒問題吧……七千七百五！"
1005703-44 = "老師請看，競爭越來越激烈了呢。"
1005703-45 = "呵呵呵，這就是美食所引起的競爭。"
1005703-46 = "其過程中產生的激烈戰鬥。"
1005703-47 = "就連看著的我們，都不禁興奮起來了呢。"
1005703-48 = "[s]「你好像很開心呢，羽留奈。」"
1005703-49 = "是的，我非常開心。畢竟這樣的日常，對別人來說是相當少見的。"
1005703-50 = "而且像這樣看著他們競爭，總覺得……"
1005703-51 = "[s]「總覺得？」"
1005703-52 = "九千！"
1005703-53 = "[s]「羽留奈！？」"
1005703-55 = "哦～那位美女，一開始就很強勢呢？"
1005703-56 = "賭上我廚師的名譽，我可不會輕易放棄。"
1005703-57 = "啊啊……怎麼辦才好。是不是該先聯絡一下老闆……"
1005703-58 = "九千五！"
1005703-59 = "我出九千八！"
1005703-60 = "那我就出一萬！"
1005703-65 = "（在這之後，拍賣變得激烈了起來）"
1005703-66 = "（順利拍下鯛魚的贏家……竟然是羽留奈）"
1005703-67 = "（至於價格還是別提了吧）"
1005703-72 = "呵呵，呵呵呵……"
1005703-73 = "[s]「還，還好嗎……？」"
1005703-74 = "您在說什麼呢，老師。"
1005703-75 = "為了究極的美食，不如說這樣還算便宜了。"
1005703-76 = "不過接下來的問題是，該如何品嘗這尾鯛魚呢。"
1005703-77 = "就交給我認識的一名廚師吧。"
1005703-78 = "您會一起來的吧？"
1005703-86 = "久等了。首先是鯛魚粥。"
1005703-87 = "哎呀，這也是……"
1005703-92 = "接著是鯛魚握壽司和鯛魚生魚片。 "
1005703-93 = "我對魚皮做了一點炙燒，請盡快享用。"
1005703-94 = "原來如此。"
1005703-96 = "這是炸鯛魚和鯛魚壽司捲。"
1005703-97 = "呼呣呼呣……"
1005703-99 = "這是使用鯛魚骨頭和嘴邊肉煮出的高湯製成的清湯烏龍麵。"
1005703-100 = "這樣啊，我要開動了。"
1005703-102 = "至於點心，是用搗碎果乾製成的冰淇淋。"
1005703-106 = "好的，非常感謝。"
1005703-109 = "您覺得怎麼樣呢，老師？"
1005703-110 = "[s1]「該說是味道有點複雜嗎……」\n[s2]「雖然覺得很好吃……」"
1005703-113 = "原來如此。"
1005703-114 = "對我來說，雖然努力在拍賣會上把牠買了下來……"
1005703-115 = "該怎麼說呢……似乎也並不是特別的美味。"
1005703-116 = "[s3]「這次該不會要把市場給炸了吧……？」\n[s4]「難道要去襲擊那位廚師嗎……？」"
1005703-119 = "不，以一般的標準來說確實是美味的料理。"
1005703-120 = "而且也體會了拍賣的樂趣。"
1005703-121 = "更重要的是，還招待了老師。能讓老師開心比什麼都重要。"
1005703-122 = "[s]「那真是太好了。」"
1005703-123 = "是的。不過……"
1005703-125 = "果然探究究極美食的道路，並沒有那麼容易呢。"

[translation]
1005703-1 = "The Means and the Ends"
1005703-3 = "Over here! Cheap prices! A New Year's discount! A New Year's special!"
1005703-4 = "Check it out! Check it out now for a bonus!"
1005703-5 = "What are you looking for? Whatever it is, we have it! And fresh to boot!"
1005703-6 = "[s] \"What is this place?\""
1005703-8 = "Heehee."
1005703-9 = "It's an open market."
1005703-10 = "It's noisy and exciting at times like these. Well, even noisier and more exciting than usual, really."
1005703-11 = "[s] \"Yeah, I got that, but what are we doing here?\""
1005703-12 = "Well..."
1005703-13 = "A battlefield!"
1005703-14 = "It's a food-stained battlefield! That's why."
1005703-15 = "Stall owners trying to sell good ingredients at high prices."
1005703-16 = "Cooks, restaurant owners, and civilians trying to make it out alive with cheaper ones."
1005703-17 = "They all want a different sort of best price, and it's a fierce battle to get it!"
1005703-18 = "We're basically war correspondents right now."
1005703-19 = "I'm a pilgrim on the path of gastronomy."
1005703-20 = "It's not just gastronomy itself that I must bear witness to..."
1005703-21 = "I must bear witness to its creation as well."
1005703-28 = "Hey! Hey! Look right here! Today's first item is a three-kilogram snapper!"
1005703-29 = "Look at that shine! Look at that color!"
1005703-30 = "You won't find its like anywhere else!"
1005703-32 = "Hmm... That's a nice snapper for sure..."
1005703-33 = "How pricey is this gonna be? I don't wanna spend too much money on a single fish."
1005703-34 = "My boss told me to get a nice snapper no matter the cost, but was that literal?"
1005703-36 = "Starting at six thousand five hundred!"
1005703-37 = "Seven thousand!"
1005703-38 = "Seven thousand two hundred!"
1005703-39 = "S-Seven thousand three hundred!"
1005703-40 = "Haha. It's fierce from the start! Seven thousand five hundred!"
1005703-41 = "I don't... I can't... Seven thousand seven hundred!"
1005703-42 = "I hope my boss will understand... Seven thousand seven hundred fifty!"
1005703-44 = "Look, Sensei. Things are really heating up."
1005703-45 = "This is the sort of intense battle we came to see."
1005703-46 = "And the passion filling the air..."
1005703-47 = "It's inspiring."
1005703-48 = "[s] \"Looks like you're having fun, Haruna.\""
1005703-49 = "I am. For them, this is their daily life, but for me, it's a rare spectacle."
1005703-50 = "Watching them makes me want to..."
1005703-51 = "[s] \"Huh?\""
1005703-52 = "Nine thousand!"
1005703-53 = "[s] \"Haruna?!\""
1005703-55 = "Hmm, who's this? She's coming out swinging!"
1005703-56 = "On my honor as a chef, I won't back down."
1005703-57 = "*sigh* ...Should I just call my boss?"
1005703-58 = "Nine thousand five hundred!"
1005703-59 = "Nine thousand eight hundred!"
1005703-60 = "Ten thousand!"
1005703-65 = "After that, the auction continued to heat up."
1005703-66 = "And, surprisingly, Haruna emerged victorious."
1005703-67 = "Let's just not talk about the final price..."
1005703-72 = "Heh heh heh... Hahaha!"

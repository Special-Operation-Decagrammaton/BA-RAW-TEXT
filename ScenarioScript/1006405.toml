[translation]
1006405-1 = "貓與佳世子與甜酒與"
1006405-2 = "（隔天早上，以為會塞車所以提早抵達了……）"
1006405-3 = "咦，老師？你已經到了啊？"
1006405-4 = "天氣這麼冷，提早到的話跟我說一聲，到附近的店裡等也沒關係的……"
1006405-5 = "[s]「沒關係，我也才剛到哦。」"
1006405-10 = "老師的手都這麼冷了……"
1006405-11 = "得趕快暖暖身子才行……"
1006405-12 = "有沒有賣什麼熱飲呢。"
1006405-13 = "要不要來一杯甜酒呀～？"
1006405-14 = "今天天氣特別冷，大家請用吧～"
1006405-15 = "老師，好像正在發甜酒呢。"
1006405-16 = "在買御守之前，先去喝杯甜酒吧？"
1006405-17 = "[s]「嗯，真巧呢。」"
1006405-18 = "請給我們兩杯甜酒。"
1006405-22 = "[ns1]「哈啊，好溫暖……」\n[ns2]「連身體深處都暖了起來……」"
1006405-23 = "呵呵，真是令人懷念的味道。"
1006405-24 = "呵呵，真是令人懷念的味道。"
1006405-25 = "這樣無憂無慮的喝甜酒……或許還是第一次。"
1006405-26 = "[s]「以前發生過什麼事嗎？」"
1006405-27 = "甜酒多少還是有酒精的成分對吧？"
1006405-28 = "之前曾經有喝了大量甜酒的學生引發了一場大騷動。"
1006405-29 = "所以每年喝甜酒的時候，我都很在意周圍，沒辦法好好品嚐……"
1006405-30 = "不過今天老師也在。"
1006405-31 = "[s]「佳世子喝甜酒不會醉嗎？」"
1006405-32 = "那當然。這跟果汁沒什麼兩樣。"
1006405-33 = "但如果一直喝的話就不好說了……"
1006405-34 = "呼……真好喝。#n不過我喝一杯就夠了。"
1006405-35 = "那麼身體也暖和了，差不多該……"
1006405-39 = "啊……"
1006405-40 = "老師，不好意思，可以稍等我一下嗎？"
1006405-41 = "有件事讓我有點在意……"
1006405-42 = "[s]「嗯，你放心去吧。」"
1006405-43 = "我很快就回來。"
1006405-48 = "（然而佳世子過了超過10分鐘還是沒回來……）"
1006405-50 = "[ns] 往佳世子離開的方向走去"
1006405-53 = "好乖好乖，嗯，是個好孩子呢。呵呵……"
1006405-54 = "你住在這座寺裡嗎？很習慣跟人相處了呢。"
1006405-58 = "喵～真可愛。"
1006405-62 = "喵喵～喵喵～#n呵呵，喵喵～♪"
1006405-63 = "[s3]「你看起來很開心呢。」\n[s4]「真是群可愛的貓呢。」"
1006405-64 = "老，老師……！？#n你什麼時候……？"
1006405-65 = "老，老師……！？#n你什麼時候……？"
1006405-66 = "啊，抱歉。#n太晚回去讓你擔心了吧……"
1006405-67 = "比起那個……"
1006405-68 = "…………你看到了？"
1006405-69 = "[s]「……嗯。」"
1006405-70 = "這個是，那個……我不是每次都會用貓語跟貓搭話……"
1006405-71 = "……也不能這麼說。#n唉，沒想到你會來找我，真是大意了……"
1006405-75 = "……都是甜酒的錯。"
1006405-76 = "因為剛才喝了甜酒……沒錯，這都是甜酒的錯……"
1006405-77 = "以後絕對不會再喝甜酒了……！"
1006405-79 = "（……在那之後安慰了害羞的佳世子，一起去買了御守）"

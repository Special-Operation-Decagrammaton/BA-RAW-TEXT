[translation]
10035130-1 = "後日談;千年工程師部的失誤（２）"
10035130-2 = "（到了測試海洋休閒用機械鱷魚的當天……）"
10035130-6 = "嗯，主體的最終調整結束。#n接下來只要上傳行為程式就大功告成了。"
10035130-7 = "是！燃料箱也準備就緒了！"
10035130-8 = "水槽內也放滿了水，隨時可以開始！"
10035130-10 = "好，開始上傳程式吧。"
10035130-11 = "咦？不是說程式的部分還不夠完善嗎？"
10035130-12 = "是這樣沒錯，不過為了趕上交件期限，適度的妥協也是有必要的。"
10035130-13 = "我昨天在網路上找到了看起來挺適合的行為程式，用這個應該能順利運作才對。"
10035130-14 = "這樣一來，海洋休閒用機械鱷魚就算是正式完成了。"
10035130-24 = "啊，動了。"
10035130-34 = "它在四處張望呢……應該是本能演算法的影響。"
10035130-35 = "嗯，為了讓它的行為更加自然，我將本能演算法的優先程度設定成了最高級。"
10035130-36 = "也會搖尾巴呢！"
10035130-37 = "順帶一提，研究的結果顯示，鱷魚搖尾巴的目的是為了攻擊或威脅哦！"
10035130-41 = "……攻擊？"
10035130-42 = "……威脅？"
10035130-43 = "呃，咦！？"
10035130-51 = "哇！我花了一個月心血製作的噴射增壓咖啡機！"
10035130-57 = "我做的超音速水火箭發射台也被……！"
10035130-58 = "奇，奇怪！？為什麼會開始搞破壞呢！"
10035130-59 = "給我按照設計進到水槽裡去！"
10035130-64 = "咦！？"
10035130-72 = "水，水槽被破壞了！"
10035130-73 = "水淹過來了！快躲到角落！"
10035130-79 = "噗哈！"
10035130-80 = "把，把鱷魚的電源關掉！"
10035130-81 = "哇啊啊！它一直亂動，根本接近不了呀！？"
10035130-82 = "糟糕！看來只能派雷醬上場了……！"
10035130-83 = "前輩，好像已經太遲了。"
10035130-89 = "它已經衝破工作室的牆壁逃出去了……"
10035130-90 = "那股力量和速度……完全超出了原本設計的性能。"
10035130-91 = "行為也不在設計之內……"
10035130-92 = "現在該怎麼辦……？"
10035130-97 = "剛才的聲音是怎麼回事！有炸彈爆炸了嗎！？"
10035130-101 = "這個聲音是……"
10035130-108 = "我路過的時候聽到一聲巨響就跑來看看，果然是你們啊。"
10035130-109 = "工作室怎麼會變成汪洋一片？#n牆上的大洞又是怎麼回事？"
10035130-110 = "千，千尋……"
10035130-112 = "我不是再三叮嚀過，測試發明的時候務必要小心嗎？#n附近可是有重要的伺服器室耶！"
10035130-113 = "如果這次又是因為一些雞毛蒜皮的事搞成這樣，可別怪我直接向研討會報告。"
10035130-114 = "這，這個……"
10035130-118 = "我，我們什麼都沒做。"
10035130-121 = "（直接裝傻！？）"
10035130-123 = "沒，沒錯！這不是我們的錯！"
10035130-124 = "對吧，響？這跟我們一點關係也沒有，對不對？"
10035130-125 = "啊，那，當，當然……"
10035130-126 = "沒錯，今後也繼續努力吧！"
10035130-131 = "誰會相信啊！"
10035130-132 = "算了。是我一時糊塗才會問你們。"
10035130-137 = "啊，他用平板連上工作室的伺服器了……！"
10035130-143 = "這隻鱷魚是怎麼回事。"
10035130-144 = "……唔！"
10035130-145 = "沒辦法。事到如今也只能說實話了……"
10035130-153 = "你說機械鱷魚突然開始大肆破壞後就逃跑了……？"
10035130-154 = "會不會是一開始的設計就有問題？"
10035130-155 = "不可能！"
10035130-156 = "我以巨匠的名譽擔保，插花兼海洋休閒用機械鱷魚絕對沒有任何瑕疵！"
10035130-157 = "那就是上傳的程式有問題了。"
10035130-161 = "軟，軟體的部分嘛……#n確實有可能不夠完善……但是……"
10035130-165 = "……果然是這邊出了問題。"
10035130-166 = "咦？是演算法出錯了嗎？"
10035130-167 = "不，按照你們的計畫，要上傳的應該是海洋休閒用程式……#n然而從伺服器的紀錄來看，剛才實際上傳的卻是用於拆解工程的程式。"
10035130-172 = "為什麼會上傳那個啊？"
10035130-174 = "唔嗯，可能是我從網路上下載的程式出了點差錯……"
10035130-176 = "這是未經授權的程式。#n不只來源不明，目的也是不清不楚。"
10035130-177 = "我不是一再耳提面命，要你們注意安全嗎……！"
10035130-178 = "就是因為你們安全意識這麼差，才會釀出大禍！"
10035130-183 = "原來如此！不能使用未經授權的程式呢！"
10035130-184 = "從今以後，一定要購買安全的正版程式來使用唷！"
10035130-185 = "沒錯！使用乾淨的軟體，是人人應盡的義務！"
10035130-186 = "～千年工程師部關心您～"
10035130-191 = "別想用公益廣告的台詞蒙混過去！"
10035130-192 = "快想想怎麼收拾殘局吧！"

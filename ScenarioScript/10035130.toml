[translation]
10035130-1 = "Afterword;The Engineering Department's Mistake 2"
10035130-2 = "And so, on the day of the Leisure Mechagator's test run..."
10035130-6 = "The body's all set. We just need to upload the behavioral program."
10035130-7 = "Yup! And the fuel tank is full!"
10035130-8 = "So's the water tank. We can start the submersion test anytime!"
10035130-10 = "Very well. Let us upload the program."
10035130-11 = "Wait, didn't we establish that the programming \"still needs work\"?"
10035130-12 = "With this deadline, compromise is unavoidable."
10035130-13 = "I found an appropriate behavioral program on the internet last night. It should fill in the gaps just fine."
10035130-14 = "And so, the Leisure Mechagator is truly finished."
10035130-24 = "Whoa. It's moving."
10035130-34 = "It's looking around... The instinct algorithm's working."
10035130-35 = "Yes, and it looks quite natural. Prioritizing the instinct algorithm was a wise move."
10035130-36 = "It's even wagging its tail!"
10035130-37 = "Oh, you know, research suggests that when an alligator wags its tail, it's either threatening to attack or going to attack."
10035130-41 = "...Threatening?"
10035130-42 = "...To attack?"
10035130-43 = "Uh, well..."
10035130-51 = "Ahh! The jet booster coffee machine! I spent a month on that!"
10035130-57 = "My supersonic water rocket launcher!"
10035130-58 = "W-What's going on? Why is it going berserk?!"
10035130-59 = "You! Into the water tank, as you were programmed!"
10035130-64 = "Huh?!"
10035130-72 = "...It's attacking the tank!"
10035130-73 = "Water! Back up! Get to the high ground!"
10035130-79 = "Gah!"
10035130-80 = "T-Turn the creature off!"
10035130-81 = "Aack! There's no way, it's thrashing around too much!"
10035130-82 = "Tsk! We'll have to use Thundergun!"
10035130-83 = "It might be too late for that..."
10035130-89 = "There it goes, straight through the wall."
10035130-90 = "Look at that power, that speed... It's performing way beyond spec."
10035130-91 = "It's behaving beyond spec, too."
10035130-92 = "What do we do now...?"
10035130-97 = "What was that sound?! Did a bomb go off?!"
10035130-101 = "That sounds like..."
10035130-108 = "I was passing by, and I heard a loud noise, so I came to check. Of course, it was you guys."
10035130-109 = "Why is the workshop flooded? And what's with that big hole in the wall?"
10035130-110 = "Ch-Chihiro..."
10035130-112 = "I told you guys to be careful with experiments. There's an important server room nearby!"
10035130-113 = "If there's not a good reason for this, I'm going to have to report it."
10035130-114 = "W-Well..."
10035130-118 = "W-We didn't do it."
10035130-121 = "(Ducking responsibility?!)"
10035130-123 = "Y-Yeah! It's not our fault!"
10035130-124 = "Right, Hibiki? It's got nothing to do with us. Right?"
10035130-125 = "Oh... Um... O-Of course not..."
10035130-126 = "Let's just keep plugging away at our unrelated project!"
10035130-131 = "Who would ever buy that?!"
10035130-132 = "...Forget it. It's my fault for asking."
10035130-137 = "Eeek, her tablet's connected to the workshop server...!"
10035130-143 = "What's with this alligator?"
10035130-144 = "...Gah!"
10035130-145 = "Well, we can't hide it anymore. It's time to come clean..."
10035130-153 = "So your \"Leisure Mechagator\" went berserk and ran off?"
10035130-154 = "You think you might have had a design flaw?"
10035130-155 = "Impossible!"
10035130-156 = "I stake my pride as a meister on it! Our flower-arranging mechanical alligator was flawlessly constructed!"
10035130-157 = "Well, if it wasn't the hardware, it must have been the software."
10035130-161 = "Y-You might be right about that, honestly..."
10035130-165 = "...Ah, I've found the problem."
10035130-166 = "Was there something wrong with the behavioral algorithm?"
10035130-167 = "Apparently, you were planning to install a leisure program, but according to the server records, the actual file you uploaded was an algorithm for building demolition."
10035130-172 = "How did THAT happen?"
10035130-174 = "I, um, might have gone to some sketchy places to get that file..."
10035130-176 = "The file has no signature, and no clear point of origin."
10035130-177 = "I TOLD you guys, so many times, to pay attention to security!"
10035130-178 = "But your security's a mess, and now the WORKSHOP'S a mess."
10035130-183 = "Lesson learned! We'll never use an unauthorized program again!"
10035130-184 = "From now on, we'll all stick to genuine, certified software, legitimately purchased from a reputable vendor!"
10035130-185 = "Yes! The Millennium Engineering Department encourages you to web surf and download responsibly!"
10035130-186 = "Ba-da-ba-da-dam!"
10035130-191 = "Hey, don't try to brush this off with a public service announcement!"
10035130-192 = "Now start cleaning up!"

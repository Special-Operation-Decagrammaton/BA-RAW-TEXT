[translation]
10035130-1 = "ย้อนวันวาน;ความผิดพลาดของชมรมวิศวกรรม มิลเลเนียม 2"
10035130-2 = "(วันทดสอบระบบจระเข้จักรกลเพื่อการสันทนาการทางน้ำ)"
10035130-6 = "อื้อ ปรับแต่งตัวหุ่นยนต์เสร็จเรียบร้อย ทีนี้ก็เหลือแค่อัปโหลดโปรแกรมพฤติกรรมเข้าไป"
10035130-7 = "ค่ะ! เชื้อเพลิงในถังก็เพียงพอแล้วค่ะ!"
10035130-8 = "ฉันเติมน้ำใส่ถังจำลองไว้แล้ว พร้อมตอนไหนก็ทดสอบระบบได้เลยค่ะ!"
10035130-10 = "ดีละ งั้นจะเริ่มอัปโหลดโปรแกรมละนะ"
10035130-11 = "เดี๋ยวนะ? แต่เมื่อวานบอกไว้ว่าโปรแกรมยังไม่สมบูรณ์ไม่ใช่เหรอ?"
10035130-12 = "ก็ถ้าจะส่งผลงานให้ตรงกับกำหนดการ ก็ต้องมีส่วนที่ต้องอะลุ่มอล่วยกันบ้างละ"
10035130-13 = "เมื่อวานเราได้โปรแกรมพฤติกรรมที่เหมาะสมมาจากในอินเทอร์เน็ตแล้ว ฉันว่าน่าจะใช้งานได้อยู่นะ"
10035130-14 = "เท่านี้ก็ถือว่าจระเข้จักรกลเพื่อการสันทนาการทางน้ำเสร็จสมบูรณ์อย่างแท้จริงแล้วละ"
10035130-24 = "อ๊ะ มันขยับแล้ว"
10035130-34 = "กำลังมองไปรอบๆ สินะ... น่าจะเพราะอัลกอริทึมสัญชาตญาณนะ"
10035130-35 = "อื้ม เราตั้งอัลกอริทึมสัญชาตญาณไว้เป็นลำดับแรกๆ เพื่อให้มันแสดงออกอย่างธรรมชาติที่สุดน่ะ"
10035130-36 = "มันส่ายหางด้วยละค่ะ!"
10035130-37 = "ขออธิบายเพิ่มเติมค่ะ! ตามงานวิจัยบอกว่าจระเข้ส่ายหางเพื่อบอกถึงการโจมตีหรือเพื่อคุกคามค่ะ"
10035130-41 = "โจมตี?"
10035130-42 = "คุกคาม?"
10035130-43 = "เอะ... เอ๋?!"
10035130-51 = "ว้าก! เครื่องทำกาแฟเจ็ทบูสเตอร์ที่ฉันทุ่มเทประดิษฐ์มาเป็นเดือนๆ!"
10035130-57 = "เครื่องยิงจรวดน้ำความเร็วเหนือเสียงที่ฉันสร้างก็ด้วย!"
10035130-58 = "ปะ... แปลกจัง! ทำไมมันถึงก่อความวุ่นวายล่ะเนี่ย!"
10035130-59 = "กลับลงแทงก์น้ำไปเลยนะ!"
10035130-64 = "เฮือก?!"
10035130-72 = "ทะ... แทงก์พังแล้ว!"
10035130-73 = "น้ำมาแล้วค่ะ! หนีเข้ามุมเร็วเข้าเถอะ!"
10035130-79 = "อึกก!"
10035130-80 = "ระ... รีบปิดเครื่องยนต์จระเข้เร็ว!"
10035130-81 = "วะ... ว้ากก! มันดิ้นไปมาจนเข้าไปใกล้ๆ ไม่ได้เลยค่ะ!"
10035130-82 = "ชิ! แบบนี้สายฟ้าของฉันได้โดนลูกหลงด้วยแน่...!"
10035130-83 = "เหมือนจะไม่ทันแล้วนะรุ่นพี่"
10035130-89 = "พะ... พังกำแพงห้องหนีไปแล้ว..."
10035130-90 = "มีพลังและความเร็วมากกว่าที่ตั้งค่าไว้อีกแฮะ"
10035130-91 = "พฤติกรรมของมันก็เบี่ยงเบนออกไปจากที่ตั้งค่าไว้ค่ะ..."
10035130-92 = "ทำยังไงดีล่ะคะ...?"
10035130-97 = "เมื่อกี้เสียงอะไรน่ะ! มีใครเล่นระเบิดหรือไง?!"
10035130-101 = "เสียงนี้มัน..."
10035130-108 = "ฉันเดินผ่านแถวนี้พอดีแล้วก็ได้ยินเสียงระเบิดก็เลยเข้ามาดูน่ะ เป็นฝีมือพวกเธอจริงๆ ด้วยสินะ"
10035130-109 = "ทำไมห้องปฏิบัติการถึงได้น้ำท่วมแบบนี้ล่ะ? แล้วรูเบ้อเริ่มเทิ่มตรงผนังนั่นมันอะไรกัน?"
10035130-110 = "จะ... จิฮิโระ..."
10035130-112 = "ฉันบอกแล้วไม่ใช่เหรอว่าให้ทดสอบสิ่งประดิษฐ์กันอย่างรอบคอบน่ะ มาทดสอบใกล้ๆ ห้องเซิร์ฟเวอร์#nได้ยังไง!"
10035130-113 = "ถ้าพวกเธอทำห้องเละขนาดนี้ด้วยเรื่องไม่เป็นเรื่องละก็ ฉันคงต้องไปรายงานกับเซมิน่าแล้วละ!"
10035130-114 = "ระ... เรื่องนั้น..."
10035130-118 = "มะ... ไม่ใช่ฝีมือเราหรอกนะ"
10035130-121 = "(จะพูดเอาตัวรอดเหรอ?!)"
10035130-123 = "ชะ... ใช่! ไม่ใช่ความผิดของพวกเราสักหน่อย!"
10035130-124 = "ใช่มั้ย ฮิบิกิ? ไม่เกี่ยวกับพวกเราเลยเนอะ?"
10035130-125 = "อ่า... กะ... ก็ ก็ใช่..."
10035130-126 = "อื้อ งานต่อไปก็มาตั้งใจกันนะทุกคน!"
10035130-131 = "ใครเชื่อก็บ้าแล้ว!"
10035130-132 = "ช่างเหอะ ฉันผิดเองแหละที่มาถาม"
10035130-137 = "อ๊ะ เซิร์ฟเวอร์ห้องปฏิบัติการ..."
10035130-143 = "จระเข้นี่มันอะไรกัน?"
10035130-144 = "อึก...!"
10035130-145 = "ช่วยไม่ได้แฮะ โดนจับได้แบบนี้ก็คงต้องบอกแล้วละ..."
10035130-153 = "จู่ๆ จระเข้จักรกลก็ก่อความวุ่นวายแล้วก็หนีออกไปงั้นเหรอ...?"
10035130-154 = "ตั้งค่าอะไรผิดหรือเปล่า?"
10035130-155 = "เป็นไปไม่ได้หรอก!"
10035130-156 = "ฉันขอเอาศักดิ์ศรีของไมสเตอร์เป็นเดิมพัน! จระเข้จักรกลเพื่อการสันทนาการที่จัดดอกไม้ได้นั่นน่ะ มันไม่มีข้อบกพร่องอะไรทั้งนั้นนะ!"
10035130-157 = "งั้นก็เป็นที่โปรแกรมที่อัปโหลดเข้าไปสินะ"
10035130-161 = "กะ... ก็จริงที่ทางด้านซอฟต์แวร์ยัง... ยังไม่สมบูรณ์ดี..."
10035130-165 = "ปัญหามาจากตรงนี้จริงด้วย"
10035130-166 = "คะ? อัลกอริทึมมีปัญหาเหรอคะ?"
10035130-167 = "ตามแผนของพวกเธอต้องอัปโหลดโปรแกรมสันทนาการเข้าไป... แต่พอดูบันทึกของเซิร์ฟเวอร์แล้ว โปรแกรมที่อัปโหลดเข้าไปคือโปรแกรมสำหรับหุ่นยนต์รื้อถอนมากกว่านะ"
10035130-172 = "ทำไมถึงเป็นโปรแกรมนั้นไปได้ล่ะคะ?"
10035130-174 = "อ่า... น่าจะเป็นปัญหาจากโปรแกรมที่เราโหลดจากอินเทอร์เน็ตมานะ..."
10035130-176 = "นี่มันโปรแกรมที่ไม่ได้รับการอนุญาตนี่นา ไม่รู้ด้วยว่ามาจากไหนและมีเจตนาอะไรในการสร้าง"
10035130-177 = "ฉันพูดจนปากจะฉีกถึงหูแล้วไม่ใช่เหรอว่าให้สนใจเรื่องความปลอดภัยด้วย...!"
10035130-178 = "เพราะพวกเธอไม่ตระหนักถึงความปลอดภัยกันไงล่ะ งานถึงได้ออกมาเละเทะแบบนี้!"
10035130-183 = "อย่างนี้สินะ! เราไม่ควรใช้โปรแกรมที่ไม่ได้รับอนุญาตนี่เอง!"
10035130-184 = "งั้นเรามาซื้อโปรแกรมแท้ที่ปลอดภัยใช้กันเถอะ!"
10035130-185 = "ค่ะ! ชมรมวิศวกรรมแห่งมิลเลเนียมสนับสนุนให้ใช้ซอฟต์แวร์ที่ถูกต้องเท่านั้นค่ะ!"
10035130-186 = "ปารา ปารัม ป้าม!"
10035130-191 = "อย่ามาเนียนด้วยการพูดแบบนี้นะ!"
10035130-192 = "พวกเธอต้องแก้ไขงานครั้งนี้กันก่อนไม่ใช่หรือไง!"

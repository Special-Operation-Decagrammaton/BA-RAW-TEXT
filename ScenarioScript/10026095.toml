[translation]
10026095-2 = "ฮู่วว... จัดการเรียบร้อยแล้วสินะคะ"
10026095-3 = "กลุ่มที่เราเจอเมื่อกี้ดูจะมีจำนวนเยอะที่สุดตั้งแต่ที่เคยเจอมาเลยนะคะ แถมพลังก็ยังล้นเหลืออีกด้วย..."
10026095-4 = "อึก... นี่คงเป็นชุดสุดท้ายแล้วจริงๆ ใช่ไหม...? จะไม่มีออกมาแล้วเนอะ...?"
10026095-5 = "แต่ยังไงก็ปกป้องไว้ได้นะคะ! ...กล่องใบนี้น่ะค่ะ!"
10026095-6 = "ก็นะ สิ่งที่คิดว่าน่าจะออกมาก็ออกมาหมดแล้ว ตอนนี้จะมองว่าปลอดภัยแล้วก็น่าจะได้นะคะ"
10026095-7 = "คุณฮินาตะ ถ้าไม่ว่าอะไรละก็ ช่วยส่งกล่องนั้น..."
10026095-8 = "อ้อ ค่ะๆ! นี่ค่ะ...!"
10026095-12 = "ถ้างั้น... ฉันจะลองเปิดดูนะคะ... ทุกคน... มาดูด้วยกันสิคะ"
10026095-14 = "...ค่ะ"
10026095-15 = "ฮุฮุ"
10026095-16 = "............"
10026095-25 = "...?!"
10026095-26 = "...เอ๋?"
10026095-27 = "เอ่อ..."
10026095-28 = "ไม่เห็นมีอะไร... เลยนี่คะ? ข้างในกล่อง... ว่างเปล่าเลยค่ะ"
10026095-29 = "[s] \"...กล่องเปล่างั้นเหรอ?\""
10026095-30 = "งั้นทำไม... ถึงเอากล่องเปล่ามาฝังไว้ล่ะคะ...? แถมยังขุดหลุมสำหรับฝังซะลึกขนาดนี้..."
10026095-35 = "...เพราะเดิมทีแล้วมันไม่ใช่กล่องเปล่าน่ะสิคะ"
10026095-37 = "...คะ?"
10026095-38 = "ค่ะ ใช่แล้วค่ะ"
10026095-39 = "ลองดูตรงนี้สิคะ ตรงมุมกล่องมีเศษกระดาษหลงเหลืออยู่ด้วย และนี่คือร่องรอยของกระดาษเก่าที่ถูก#nใช้งานในตอนนั้นค่ะ"
10026095-40 = "สิ่งที่อยู่ในนี้อาจจะเป็นของที่ทำมาจากกระดาษก็ได้..."
10026095-41 = "สงสัยจะไม่ได้มีการป้องกันการเน่าเปื่อยสักเท่าไร พอเวลาผ่านไปมากๆ เข้า มันก็เลยผุกร่อนจนหายไป#nน่ะค่ะ"
10026095-42 = "กล่องเองก็ไม่ได้ถูกปิดให้มิดชิดด้วย บางทีอาจจะถูกแมลงกัดกินไปก็ได้ค่ะ"
10026095-43 = "ยะ... อย่างนี้นี่เอง... มันก็ใช่..."
10026095-44 = "แล้วเราจะหาคำตอบว่ามันเคยมีอะไรอยู่ข้างในนี้มาก่อนได้หรือเปล่าคะ?"
10026095-45 = "มันก็...ไม่เชิงว่าไม่ได้หรอกค่ะ"
10026095-46 = "เพราะเมื่ออดีตจะสอนอะไรพวกเรา... มันไม่ได้มีเพียงวิธีเดียวหรอกค่ะ"
10026095-47 = "วิธีในการดูว่าข้างในกล่องมีอะไร... อาจจะทำได้โดยการเปิดดูโดยตรง..."
10026095-48 = "ในทางตรงกันข้าม เราอาจจะมารวบรวมเบาะแสอื่นๆ ทั้งหมดที่เราหามาได้จากรอบๆ ก็ได้เหมือนกันค่ะ"
10026095-49 = "...ค่ะ"
10026095-50 = "อย่างเช่น พวกนักเรียนสาวกที่มารวมตัวฝึกฝนกัน กองบัญชาการที่แอบสร้างขึ้นเพื่อเก็บความลับของ#nพวกตน และก็..."
10026095-51 = "พวกตู้เก็บของสำหรับใส่ของใช้ส่วนตัวเพื่อไม่ให้โดนทางวิหารจับได้ที่อยู่หลังน้ำตกค่ะ"
10026095-53 = "...?"
10026095-54 = "...คะ?"
10026095-56 = "ตอนนี้ก็เกือบจะชัดเจนแล้วค่ะ ทั้งจุดสำรวจทั้งสี่ที่เราหาข้อมูลกันในตอนแรก และสถานที่ลับหลัง#nน้ำตกที่ซ่อนไว้"
10026095-58 = "รวมถึงกล่องไม้ที่เราเพิ่งเจอ ที่เป็นหลักฐานชิ้นสำคัญ..."
10026095-59 = "พวกนักเรียนสาวกที่เคยฝึกฝนในสถานที่นี้เมื่อตอนนั้น... ได้สร้างของส่วนตัวบางอย่างและซ่อนไว้..."
10026095-60 = "...และนั่นคือสิ่งที่เรียกว่า <แคปซูลความทรงจำ> ค่ะ"
10026095-61 = "[s] \"...แคปซูลความทรงจำ?\""
10026095-62 = "อืม..."
10026095-63 = "...คุณครู และทุกคนคะ"
10026095-64 = "ถ้าเกิดว่า... สะดวกกันละก็..."
10026095-65 = "ฉันจะขอให้ช่วยอะไรสักอย่าง... จะได้ไหมคะ...?"

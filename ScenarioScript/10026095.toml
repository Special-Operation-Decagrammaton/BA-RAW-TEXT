[translation]
10026095-2 = "Phew! I don't know how, but we beat them again."
10026095-3 = "That was the most we've seen so far. And they were so aggressive..."
10026095-4 = "Ugh... Is it really over this time? We don't need any more surprises."
10026095-5 = "Speaking of surprises, let's find out what's in this box we worked so hard to protect."
10026095-6 = "Yeah, I don't think we have to worry about any more sneaking up on us. Let's open it."
10026095-7 = "Hinata, if it's all right with you, why don't we..."
10026095-8 = "Ah, yes! Here...!"
10026095-12 = "Perfect! Let's open it together..."
10026095-14 = "Okay, then..."
10026095-15 = "Heehee!"
10026095-16 = "..."
10026095-25 = "...?"
10026095-26 = "...Oh?"
10026095-27 = "Um..."
10026095-28 = "It's...completely empty..."
10026095-29 = "[s] \"...It's empty? After all that?\""
10026095-30 = "Why would they bury an empty box? And in a deep pit too! That took effort!"
10026095-35 = "...They didn't bury an empty box because it didn't used to be empty."
10026095-37 = "Huh?"
10026095-38 = "You're right..."
10026095-39 = "Look at the little flecks in the corners of the box."
10026095-40 = "This box likely contained paper that has since rotted away."
10026095-41 = "It must not have been treated with any sort of preservatives to help it survive the passage of time."
10026095-42 = "The box wasn't exactly airtight, either, so there's always the possibility that bugs ate it."
10026095-43 = "I see... Definitely..."
10026095-44 = "So we have no way of knowing what was in there?"
10026095-45 = "Not necessarily."
10026095-46 = "If history has taught me anything, it's that there's more than one way to solve a problem."
10026095-47 = "Sure, actually seeing what was inside the box would have been the easiest option."
10026095-48 = "But it's not the only option. We can also make deductions based on all the information we've gathered up to this point."
10026095-49 = "So..."
10026095-50 = "Take the secret hideout the Council students used for training..."
10026095-51 = "And the cabinets behind the waterfall they used for personal items they didn't want to store at the Cathedral."
10026095-53 = "...?"
10026095-54 = "Huh?"
10026095-56 = "I know there's something to this. Considering the first four sites we explored plus the cavern behind the waterfall..."
10026095-58 = "And the most crucial piece of information, the box we just found..."
10026095-59 = "...which was handcrafted and hidden by Council students training here at the time..."
10026095-60 = "...I think this box may have been a Memorial Capsule."
10026095-61 = "[s] \"...A Memorial Capsule?\""
10026095-62 = "Um..."
10026095-63 = "Everyone... Sensei..."
10026095-64 = "If it's all right with you..."
10026095-65 = "I'd like to ask a favor..."

[translation]
10026095-2 = "……呼。#n總算解決了。"
10026095-3 = "之前從來沒有一次出現這麼多，而且這次的攻擊力道也相當猛烈……"
10026095-4 = "唔……這次就真的結束了吧……？#n應該不會再來了吧……？"
10026095-5 = "幸好我們成功守住了……這個箱子！"
10026095-6 = "我想剛才那些就是全部了，現在應該可以說是安全了吧？"
10026095-7 = "日向同學，不介意的話，請過來這裡……"
10026095-8 = "啊，好，我知道了！#n箱子就在這裡……！"
10026095-12 = "好……那我要打開了。#n大家……一起見證吧……"
10026095-14 = "……是。"
10026095-15 = "呵呵。"
10026095-16 = "…………"
10026095-25 = "……？？"
10026095-26 = "……咦？"
10026095-27 = "呃……"
10026095-28 = "裡面……什麼都沒有？#n箱子裡面……是空的……"
10026095-29 = "[s]「……裡面是空的？」"
10026095-30 = "為什麼……要把一個空箱子埋起來呢……？#n而且還特地挖了這麼大一個洞……"
10026095-35 = "……或許這原本並不是個空箱子吧。"
10026095-37 = "……咦？"
10026095-38 = "嗯，沒錯……"
10026095-39 = "你們看這裡，箱子的角落還留有些許碎屑。#n這是古代紙張腐爛後所留下來的。"
10026095-40 = "所以我想這裡面原本應該裝著某種紙製品……"
10026095-41 = "不過當初並沒有做好防腐措施，#n因此裡面的東西無法承受歲月的摧殘，漸漸腐爛消失了。"
10026095-42 = "當然，因為這個箱子並沒有密封，所以也可能是被蟲子吃掉了。"
10026095-43 = "原，原來如此……這樣啊……"
10026095-44 = "也就是說，我們已經無法得知裡面原本裝著什麼了嗎……？"
10026095-45 = "倒也不是……完全沒有辦法。"
10026095-46 = "流逝的歲月所留下的訊息……未必只會用一種方式呈現。"
10026095-47 = "想要知道箱子裡裝了什麼，除了直接用眼睛確認之外……"
10026095-48 = "也可以從周圍的環境和至今發生的事中尋找線索……並從中推敲出結論。"
10026095-49 = "……嗯。"
10026095-50 = "聖徒會的學生們因為訓練聚集在這座島上，#n為了保守屬於他們的祕密而打造了這座基地……"
10026095-51 = "瀑布後的洞窟就像他們的置物櫃一樣，存放著不想被大教堂發現的私人物品。"
10026095-53 = "……？"
10026095-54 = "……咦？"
10026095-56 = "真相越來越清晰了。#n從我們一開始調查的四個地點，到隱藏在瀑布後的祕密基地……"
10026095-58 = "再加上剛才找到的關鍵箱子……"
10026095-59 = "這就是當時在這裡訓練的聖徒會學生們……私自打造並埋藏的……"
10026095-60 = "……「時光膠囊」。"
10026095-61 = "[s]「……時光膠囊？」"
10026095-62 = "嗯……"
10026095-63 = "……老師，還有各位。"
10026095-64 = "如果……你們不介意的話……那個……"
10026095-65 = "我想……拜託你們一件事……可以嗎……？"

[translation]
1601706-1 = "I hate this world (without you) "
1601706-2 = "（接到青葉的聯絡之後，來到了整備所）"
1601706-11 = "啊，啊啊……老，老師……"
1601706-12 = "您，您真的又來了呢……"
1601706-13 = "[s1]「既然青葉找我，當然得來囉。」\n[s2]「雖然不知道我能幫上什麼忙就是了。」"
1601706-16 = "一，一定能幫上忙的！而且是很大的忙……"
1601706-17 = "即使什麼都不做，也會很有幫助……！"
1601706-21 = "您說不能什麼都不做……？"
1601706-22 = "果，果然很像老師的作風呢……"
1601706-23 = "那，那麼我就恭敬不如從命……！"
1601706-24 = "因為今天的工作實在排得太滿……再，再麻煩老師了！"
1601706-25 = "[s]「包在我身上！」"
1601706-28 = "（換上事先準備的工作服，協助青葉展開維修）"
1601706-47 = "（雖然不太懂自己在做什麼，但還是認真做好青葉交代的事……）"
1601706-49 = "（就這樣過了一段時間……）"
1601706-52 = "現，現在只要轉緊這邊的螺絲……！"
1601706-57 = "結，結束了……！"
1601706-58 = "[s]「哇……！成功了！」"
1601706-59 = "真，真的在今天之內完成了……"
1601706-60 = "這都多虧了老師的幫忙……！"
1601706-61 = "[s]「我們配合得還不錯吧。」"
1601706-62 = "是，是！#n雖然老師對維修不是很熟悉……不過還是很厲害……！"
1601706-63 = "話，話說居然又讓老師留到了這麼晚……"
1601706-64 = "請，請您快點換衣服休息吧！"
1601706-73 = "……"
1601706-74 = "（好，好像一直有股機油的味道……）"
1601706-75 = "……"
1601706-76 = "……啊？"
1601706-77 = " （該，該不會是……？）"
1601706-85 = "嗚，嗚啊啊……！！"
1601706-86 = "[ns]「青，青葉？」"
1601706-92 = "― [log=아오바]請，請不要過來這邊……的說……！[/log][wa:2530] "
1601706-95 = "[ns]「不是，你先等等……」"
1601706-96 = "― [log=아오바]衣，衣服上……！[/log][wa:4320] "
1601706-99 = "― [log=아오바]沾到了油的味道……[/log][wa:1480] "
1601706-101 = "― [log=아오바]不，不太好聞……[/log][wa:730] "
1601706-104 = "― [log=아오바]我，我馬上脫掉……[/log][wa:940] "
1601706-106 = "― [log=아오바]請，請在那邊……稍等一下……！[/log][wa:2590] "
1601706-109 = "[ns3]「不不不！」\n[ns4]「那樣會讓我更困擾的！從各方面來說都會！」"
1601706-110 = "― [log=아오바]咦？那是……什麼意思……[/log][wa:4340] "
1601706-111 = "― [log=아오바]咦？那是……什麼意思……[/log][wa:4340] "
1601706-114 = "― [log=아오바]啊……唔……[/log][wa:4140] "
1601706-117 = "― [log=아오바]……啊啊啊！？那，那個！！[/log][wa:1540] "
1601706-119 = "― [log=아오바]嗚，嗚哇啊啊啊啊！！[/log][wa:860] "
1601706-122 = "（手忙腳亂地跑到值班室外面等待青葉……）"
1601706-126 = "……"
1601706-127 = "我，我換上乾淨的衣服了……"
1601706-128 = "現在應該……沒，沒味道了才對！#n可，可以清清爽爽地回家了！"
1601706-129 = "[s]「好，走吧？」"
1601706-130 = "嗯……！"
1601706-137 = "外，外面的空氣果然很清爽……"
1601706-138 = "今天……多虧有老師的幫忙，就算工作那麼多也能及時完成……"
1601706-139 = "[s]「你平常的工作量都這麼多嗎？」"
1601706-140 = "算是吧……？"
1601706-141 = "畢竟這附近只有這間整備所……"
1601706-142 = "而，而且各式各樣的事件和意外層出不窮……#n需要維修的項目從來沒少過……"
1601706-143 = "[s]「真是辛苦你了……」"
1601706-144 = "不，不過最近好像沒有以前那麼辛苦了……"
1601706-145 = "究竟是為什麼呢？#n明明沒有發生什麼改變……"
1601706-146 = "……"
1601706-150 = "啊。"
1601706-156 = "啊……啊啊……"
1601706-157 = "原，原來如此……嘿，嘿嘿……"
1601706-158 = "[s]「嗯？發生了什麼好事嗎？」"
1601706-162 = "就，就是說呀！啊哈哈……"
1601706-163 = "確，確實……發生了好事呢……"
1601706-164 = "[s]「太好了，青葉！」"
1601706-165 = "好事……"
1601706-166 = "唔嗯，好事。"
1601706-170 = "我……以前並不是這樣的。"
1601706-172 = "每天的生活都讓我覺得辛苦又乏味……睡覺之前總是會忍不住嘆氣。"
1601706-173 = "希望明天早上永遠不要到來。"
1601706-174 = "也不對任何事情抱有期待，否則只會換來日復一日的失望而已。"
1601706-177 = "[ns] 「……」"
1601706-178 = "但是，最近已經不一樣了。"
1601706-179 = "我開始會在睡覺之前，期待著明天的到來。"
1601706-180 = "漸漸對明天會發生什麼事，會是怎樣的一天……感到有點期待。"
1601706-181 = "雖然實際上每天的行程完全沒有改變……"
1601706-182 = "很奇怪吧……？#n工作明明沒有減少……"
1601706-183 = "兩位幹部也一樣讓人煩躁……"
1601706-184 = "……"
1601706-185 = "但這卻是我第一次……對明天與日常生活感到期待。"
1601706-186 = "沒想到光是某個人的存在……居然就能帶來這麼大的轉變……"
1601706-187 = "[s5]「真是太好了，青葉！」\n[s6]「希望你未來的每一天，都能繼續充滿期待！」"
1601706-192 = "呵呵……嗯，就是說啊。"
1601706-193 = "希望未來的每一天……都能像今天這樣……"
1601706-195 = "永遠持續下去……"

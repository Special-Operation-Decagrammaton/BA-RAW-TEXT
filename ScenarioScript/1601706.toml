[translation]
1601706-1 = "I Hate This World (Without You) "
1601706-2 = "After getting Aoba's message, I went to the maintenance bay."
1601706-11 = "Ah, S-Sensei..."
1601706-12 = "Y-You're really here...again..."
1601706-13 = "[s1] \"Like I said, I always to try answer.\"\n[s2] \"Not sure how much I can help, but here I am.\""
1601706-16 = "I-I'm sure you'll help a lot!"
1601706-17 = "Even if you just hang out and don't do anything, it'll be good having you here."
1601706-21 = "Hmm? You can't just hang out and not do anything...?"
1601706-22 = "A-As expected of Sensei..."
1601706-23 = "Well, forget I said that part, then."
1601706-24 = "BACK on topic, I do have a lot of work...and I wanted to ask if you could lend a hand."
1601706-25 = "[s] \"Happy to!\""
1601706-28 = "I changed into a work outfit I brought, then started helping Aoba with maintenance."
1601706-47 = "I didn't really know what I was doing, but I did my best to follow directions."
1601706-49 = "After some time..."
1601706-52 = "I-If we tighten up this screw here..."
1601706-57 = "...Got it! It's done...!"
1601706-58 = "[s] \"Yay, we did it!\""
1601706-59 = "We got it all done in one day..."
1601706-60 = "All thanks to you, Sensei!"
1601706-61 = "[s] \"We made a good team.\""
1601706-62 = "W-We did! Even though it was your first day on the job, so to speak. You're amazing!"
1601706-63 = "Ooh, look at the time, though..."
1601706-64 = "...yeah, let's get changed and call it a day."
1601706-73 = "..."
1601706-74 = "(I-I wonder where the oil smell keeps on coming from...)"
1601706-75 = "..."
1601706-76 = "...Ah?"
1601706-77 = " (C-Could it be...?)"
1601706-85 = "A-Ahh...!!"
1601706-86 = "[ns] \"A-Aoba?\""
1601706-92 = "― [log=아오바]D-Don't come in here... Ugh...![/log][wa:1930] "
1601706-95 = "[ns] \"Wait, hold on...\""
1601706-96 = "― [log=아오바]M-My...clothes...[/log][wa:3960] "
1601706-99 = "― [log=아오바]...they reek of o-oil...[/log][wa:880] "
1601706-101 = "― [log=아오바]Not... Not good at all...[/log][wa:50] "
1601706-104 = "― [log=아오바]I-I'm just going to take these off...[/log][wa:10] "
1601706-106 = "― [log=아오바]So,  please...wait right there...![/log][wa:1830] "
1601706-109 = "[ns3] \"Whoa, whoa!\"\n[ns4] \"That's going to make things worse, on multiple levels!\""
1601706-110 = "― [log=아오바]Huh? What... do you mean...?[/log][wa:3700] "
1601706-111 = "― [log=아오바]Huh? What... do you mean...?[/log][wa:3700] "
1601706-114 = "― [log=아오바]...Uh... So...[/log][wa:3820] "
1601706-117 = "― [log=아오바]...Ahh?! W-Well...[/log][wa:1340] "
1601706-119 = "― [log=아오바]W-Waahh!![/log][wa:900] "
1601706-122 = "I left the room in a hurry and waited until she was done."
1601706-126 = "..."
1601706-127 = "I-I changed into clean clothes..."
1601706-128 = "So I don't stink anymore. We can clock out nice and clean now."
1601706-129 = "[s] \"Great, shall we get going?\""
1601706-130 = "Yeah!"
1601706-137 = "Th-The outside air feels so refreshing..."
1601706-138 = "It would have been a rough work day, if you hadn't been there."
1601706-139 = "[s] \"Are all your work days like that?\""
1601706-140 = "Most of them, I guess. I mean..."
1601706-141 = "This is the only maintenance bay around here..."
1601706-142 = "A-And with everything that happens out there, trains always need repairs..."
1601706-143 = "[s] \"You really do have a lot on your plate, don't you?\""
1601706-144 = "A-Actually, it doesn't feel quite as rough as it used to be..."
1601706-145 = "Not sure why. Nothing's changed much..."
1601706-146 = "..."
1601706-150 = "Ah."
1601706-156 = "Ah... Ahh..."
1601706-157 = "S-So that's why... Ha, haha..."
1601706-158 = "[s] \"Hm? Did something good happen?\""
1601706-162 = "Y-You might say that! Ahaha..."
1601706-163 = "S-Something... Yeah, something good did happen."
1601706-164 = "[s] \"I'm glad to hear it.\""
1601706-165 = "Something good..."
1601706-166 = "Really good."
1601706-170 = "I...felt different before."
1601706-172 = "I was sick and tired of everything, every day... All I could ever do was just flop into bed and go to sleep."
1601706-173 = "Wishing the sun would never come up."
1601706-174 = "I'd slog through one day, and all I had to look forward to was another one just like it."
1601706-177 = "[ns] \"...\""
1601706-178 = "But it's different now."
1601706-179 = "Before I go to sleep, I look forward to the next day."
1601706-180 = "I think about what might happen, what kind of day it could be."
1601706-181 = "Even when it's the same day as usual."
1601706-182 = "Strange, right...? I've still got the same workload..."
1601706-183 = "...the officers are still annoying..."
1601706-184 = "..."
1601706-185 = "...but yeah, for the first time I think, I'm looking forward to life every day."
1601706-186 = "The fact that...just someone's existence...can cause that big of a change..."
1601706-187 = "[s5] \"That's great, Aoba!\"\n[s6] \"I hope for more good things in your future!\""
1601706-192 = "Fufu... Yeah, me too."
1601706-193 = "More good things, more good days."
1601706-195 = "Just like this one..."

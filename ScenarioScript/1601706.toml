[translation]
1601706-1 = "I hate this world (without you)"
1601706-2 = "(หลังจากได้รับข้อความของอาโอบะ คุณครูก็มุ่งหน้าไปที่โรงซ่อมบำรุง)"
1601706-11 = "อ๊ะ... อ่า... คะ... คุณครู..."
1601706-12 = "ครั้งนี้ก็... มาจริงๆ ด้วยนะคะ..."
1601706-13 = "[s1] \"อาโอบะขอให้มาทั้งที ครูก็ต้องมาสิ\"\n[s2] \"แต่ครูจะช่วยอะไรได้บ้างหรือเปล่านี่สิ\""
1601706-16 = "คะ... คุณครูจะช่วยฉันได้แน่นอนค่ะ! จะช่วยได้มากๆ เลยละ..."
1601706-17 = "ต่อให้ไม่ต้องทำอะไรเลย ก็ถือว่าได้ช่วยฉันแล้วค่ะ...!"
1601706-21 = "ทำแบบนั้นไม่ได้งั้นเหรอคะ...?"
1601706-22 = "พะ... พูดสมกับเป็นคุณครูเลย..."
1601706-23 = "ถะ... ถ้างั้นก็...!"
1601706-24 = "วันนี้ตารางงานของฉันยุ่งมาก... ถ้างั้นก็ต้องระ... รบกวนให้คุณครูช่วยหน่อยนะคะ!"
1601706-25 = "[s] \"ได้เต็มที่เลย!\""
1601706-28 = "(คุณครูเปลี่ยนมาใส่ชุดสำหรับงานซ่อมบำรุง แล้วเข้าไปช่วยงานอาโอบะทันที)"
1601706-47 = "(ถึงจะไม่ค่อยรู้ว่าอะไรเป็นอะไร แต่คุณครูก็ตั้งใจทำงานตามที่อาโอบะสั่ง...)"
1601706-49 = "(แล้วเวลาก็ผ่านไป...)"
1601706-52 = "ทะ... ทีนี้ก็แค่ขันสกรูตรงนี้ให้แน่น...!"
1601706-57 = "สะ... เสร็จแล้วค่ะ...!"
1601706-58 = "[s] \"ว้าว...! สำเร็จแล้ว!\""
1601706-59 = "ทะ... ทำเสร็จภายในวันนี้ได้จริงด้วยนะคะ..."
1601706-60 = "เป็นเพราะคุณครูช่วยไว้เลยค่ะ...! ขะ... ขอบคุณที่ช่วยนะคะ...!"
1601706-61 = "[s] \"เราทำงานเข้าขากันได้ดีน่ะ\""
1601706-62 = "ค่ะ... ค่ะ! คุณครูไม่คุ้นเคยกับงานซ่อมบำรุงแท้ๆ... แต่ก็ทำได้ดีมากเลยค่ะ...!"
1601706-63 = "ตะ... แต่ว่านี่มันก็เย็นมากแล้ว..."
1601706-64 = "คะ... คุณครูรีบเปลี่ยนเสื้อผ้าแล้วเลิกงานเถอะค่ะ!"
1601706-73 = "..."
1601706-74 = "(ดะ... ได้กลิ่นน้ำมันจากที่ไหนนะ...)"
1601706-75 = "..."
1601706-76 = "เอ๋...?"
1601706-77 = "(ระ... หรือว่า...?)"
1601706-85 = "งะ... แงงง...!!"
1601706-86 = "[ns] \"อะ... อาโอบะ?\""
1601706-92 = "― [log=아오바]ยะ... อย่ามาตรงนี้นะคะ... แง...![/log][wa:1890] "
1601706-95 = "[ns] \"เดี๋ยวสิ...\""
1601706-96 = "― [log=아오바]ชะ... ชุด... ของฉัน...[/log][wa:3760] "
1601706-99 = "― [log=아오바]มีกลิ่นน้ำมันฉุนเลยค่ะ...[/log][wa:840] "
1601706-101 = "― [log=아오바]มะ... มันไม่ดีค่ะ...[/log][wa:250] "
1601706-104 = "― [log=아오바]ฉะ... ฉันจะรีบไปถอดชุดออก... [/log][wa:140] "
1601706-106 = "― [log=아오바]ชะ... ช่วยรอ... ตรงนั้นก่อนนะคะ...![/log][wa:1790] "
1601706-109 = "[ns3] \"ไม่ๆ อย่าดีกว่า!\"\n[ns4] \"แบบนั้นมันจะยิ่งไม่ดีนะ!\""
1601706-110 = "― [log=아오바]คะ? หมายความ... ว่ายังไง...[/log][wa:3740] "
1601706-111 = "― [log=아오바]คะ? หมายความ... ว่ายังไง...[/log][wa:3740] "
1601706-114 = "― [log=아오바]เอ่อ... หมายความว่า...[/log][wa:3500] "
1601706-117 = "― [log=아오바]อ๊ายย...?! บะ... แบบนั้นมัน!![/log][wa:900] "
1601706-119 = "― [log=아오바]วะ... ว้ายยยย!! [/log][wa:620] "
1601706-122 = "(คุณครูรีบวิ่งออกมาจากห้องอยู่เวรแล้วรออาโอบะอยู่ข้างนอก...)"
1601706-126 = "..."
1601706-127 = "ฉะ... ฉันเปลี่ยนเป็นชุดอื่นแล้วค่ะ..."
1601706-128 = "ตอนนี้มะ... ไม่มีกลิ่นน้ำมันแล้วค่ะ! เลิกงานกลับบ้าน ดะ... ได้อย่างสบายใจแล้วค่ะ!"
1601706-129 = "[s] \"อื้อ งั้นไปกันเลยมั้ย?\""
1601706-130 = "ค่ะ...!"
1601706-137 = "อะ... อากาศข้างนอกสดชื่นจริงๆ เลยนะคะ..."
1601706-138 = "วันนี้... ต้องขอบคุณคุณครูที่ทำให้ฉันทำงานยากๆ เสร็จได้อย่างรวดเร็วนะคะ..."
1601706-139 = "[s] \"ปกติต้องทำงานหนักขนาดนั้นตลอดเลยเหรอ?\""
1601706-140 = "ฉันว่า... ก็ตลอด... นะคะ..."
1601706-141 = "พอดีแถวนี้มีโรงซ่อมบำรุงอยู่โรงเดียว..."
1601706-142 = "ละ... แล้วก็เกิดเหตุนู่นนี่อยู่บ่อยๆ... งานซ่อมบำรุงก็เลยไม่ลดลงเลยค่ะ..."
1601706-143 = "[s] \"ทำงานหนักจริงๆ เลยนะ...\""
1601706-144 = "ตะ... แต่ว่าหมู่นี้ฉันก็รู้สึกว่าไม่ได้หนักหนาเท่าแต่ก่อนแล้วค่ะ..."
1601706-145 = "ทำไมกันนะ? งานก็ไม่ได้เปลี่ยนไปนี่นา..."
1601706-146 = "..."
1601706-150 = "อ่า"
1601706-156 = "อะ... อ่า..."
1601706-157 = "ปะ... เป็นอย่างนี้สินะ... ฮะ... ฮะฮ่า..."
1601706-158 = "[s] \"หืม? มีเรื่องอะไรดีๆ เกิดขึ้นงั้นเหรอ?\""
1601706-162 = "นะ... นั่นน่ะสิคะ! แหะๆๆ..."
1601706-163 = "เรื่องดีๆ... ถ้าเป็นเรื่องดีๆ ก็มีอยู่ค่ะ..."
1601706-164 = "[s] \"งั้นก็ค่อยยังชั่วหน่อยนะ อาโอบะ!\""
1601706-165 = "เรื่องดีๆ..."
1601706-166 = "อื้อ... เรื่องดีๆ"
1601706-170 = "แต่ก่อน... ฉันไม่เคยเป็นแบบนี้เลยค่ะ"
1601706-172 = "ชีวิตประจำวันของฉันทั้งยากลำบากและน่าเบื่อ... ก่อนนอนฉันก็ได้แต่ถอนหายใจ"
1601706-173 = "แล้วก็คิดว่าไม่อยากให้พรุ่งนี้เช้ามาถึง"
1601706-174 = "เพราะฉันต้องเจอแต่วันที่คาดหวังอะไรไม่ได้เลย แล้วก็ต้องผิดหวังอยู่ตลอดน่ะค่ะ"
1601706-177 = "[ns] \"......\""
1601706-178 = "แต่ว่าตอนนี้มันต่างออกไปแล้วค่ะ"
1601706-179 = "ก่อนนอนฉันจะตั้งตารอวันพรุ่งนี้ค่ะ"
1601706-180 = "พรุ่งนี้จะเกิดอะไร จะเป็นวันแบบไหน... ตอนนี้ฉันคาดหวังกับเรื่องแบบนั้นแล้วค่ะ"
1601706-181 = "ต่อให้กิจวัตรประจำวันของฉันไม่เปลี่ยนแปลงไปก็เถอะค่ะ"
1601706-182 = "แปลกใช่มั้ยคะ...? งานก็ไม่ได้ลดลงแท้ๆ..."
1601706-183 = "แล้วท่านผู้บริหารก็ยังทำให้ฉันหงุดหงิดอยู่เหมือนเคย..."
1601706-184 = "..."
1601706-185 = "การที่ฉันคาดหวังและตั้งตารอวันต่อไปที่จะมาถึง... ประสบการณ์แบบนี้เป็นครั้งแรกของฉันเลยละค่ะ"
1601706-186 = "การมีอยู่ของใครบางคน... ทำให้เกิดความแตกต่างได้มากถึงเพียงนี้เลย..."
1601706-187 = "[s5] \"งั้นก็ดีเลยนะ อาโอบะ!\"\n[s6] \"หวังว่าต่อไปจะได้เจอแต่วันที่น่าคาดหวังนะ!\""
1601706-192 = "ฮุฮุ... ค่ะ นั่นสินะคะ"
1601706-193 = "ต่อจากนี้ไป... ก็ขอให้เหมือนวันนี้..."
1601706-195 = "ขอให้มีวันแบบนี้ต่อไปเรื่อยๆ ด้วยเถอะค่ะ..."

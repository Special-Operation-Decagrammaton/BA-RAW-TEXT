[translation]
10028005-1 = "Prologue;Transport Train Car"
10028005-64 = "The target's transport car is in position! I repeat, the target is in position! Link chains!"
10028005-72 = "Get in there and sit down! Don't so much as blink wrong, you understand?"
10028005-77 = "Stop there! Now be good and stay until we're at headquarters."
10028005-78 = "Chains and shackles are secured! All clear!"
10028005-83 = "They'll decide what to do with you once we're back. Today's the last day you'll ever see a ray of sunshine again."
10028005-84 = "..."
10028005-85 = "Really? Not a peep? Well, it's okay. We can fix that soon enough."
10028005-86 = "H-Hey, you sure we have the right person? Seems like they called out a lot of manpower for a little kid to me..."
10028005-87 = "Don't underestimate her because she's small! It's her terrorist group that crashed the family's executive meeting. That's not something a sane person does."
10028005-88 = "I read the brief too! I know she's crazy or whatever. But still..."
10028005-89 = "Ugh, whatever. Gehenna's Prefect Team wouldn't have designated her as a person of interest for no reason, I guess."
10028005-90 = "None of that's our concern. The family will be the ones to pass their judgment."
10028005-91 = "You're in the Arancino Family's hands now."
10028005-92 = "..."
10028005-93 = "Rear gate closed! Take your positions and stand by for departure!"
10028005-94 = "Yes, ma'am! Everyone, remain in position until we reach headquarters! We're moving out!"
10028005-100 = "Cars connected! All clear!"
10028005-101 = "Taking off!"
10028005-107 = "..."
10028005-108 = "...♪"

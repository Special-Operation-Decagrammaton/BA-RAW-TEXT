[translation]
10028005-1 = "序幕;護送列車"
10028005-64 = "護送對象已抵達！繫上鎖鏈！！"
10028005-72 = "快進去！別想亂來！"
10028005-77 = "……好，停下來！在抵達總部前給我乖乖坐好。"
10028005-78 = "鎖鏈已固定！！腳鐐已固定！！"
10028005-83 = "等回到總部，我們再來決定怎麼「處分」你。#n今天也許就是你學園生活的最後一天了。"
10028005-84 = "…………"
10028005-85 = "……呿，真是安靜。#n還以為他會說點什麼呢。"
10028005-86 = "話說回來，真的是這傢伙嗎？#n外表看起來就只是個小鬼，有必要這麼警戒嗎……"
10028005-87 = "他可是在家族幹部齊聚一堂的會場發動恐怖攻擊的團夥首領。#n會做出那種事的傢伙絕對不正常。"
10028005-88 = "我當然知道這傢伙是出了名的瘋……"
10028005-89 = "畢竟連格黑娜的風紀委員會都將他列為重點關注的對象。"
10028005-90 = "但那也到今天為止了。#n接下來將由我們家族聯盟來料理你……"
10028005-91 = "其中負責扣動板機的，便是我們「阿蘭奇諾家族」。"
10028005-92 = "…………"
10028005-93 = "關閉後門！所有人就座！"
10028005-94 = "全員就座！！座位固定！！在抵達總公司前都要維持這個狀態！！"
10028005-100 = "車廂已確認連結！！All Green！！"
10028005-101 = "……出發！"
10028005-107 = "…………"
10028005-108 = "…………♪"

[translation]
62030-1 = "Episode 3;Where Help Is Needed"
62030-2 = "Gah!"
62030-3 = "Aaah?!"
62030-4 = "Atsuko! Get back!"
62030-8 = "Ugh?!"
62030-10 = "M-Misaki?!"
62030-17 = "Ugh...?!"
62030-18 = "Watch out!"
62030-26 = "Mine?!"
62030-27 = "Tch...?!"
62030-41 = "(What...is this?)"
62030-42 = "(Everything is dark... Am I...sinking?)"
62030-47 = "—!!"
62030-54 = "It was a matter of perspective."
62030-55 = "In a way, it was simple."
62030-56 = "In a way, it was trivial."
62030-59 = "There were those who believed they alone held the pen to the \"truth.\""
62030-60 = "Mankind instinctively seeks to prove itself to god."
62030-61 = "To claim to be the one true orthodox is inherently a declaration that all who oppose you are wrong."
62030-64 = "And the council hereby declares..."
62030-71 = "...the permanent and irrevocable excommunication of Arius."
62030-72 = "In the name of our holy parents, holy children, and the holy spirit."
62030-79 = "[log]And thus began[/log]"
62030-81 = "[log]the long history of our persecution.[/log]"
62030-84 = "(This is...Arius'...)"
62030-91 = "There was no path forward. With nothing but bloodied hands and battered souls, we forged our own."
62030-92 = "Light faded from existence, and we were sacrificed to the shadows. They left us to rot in sewage and despair, existences no better than the rats that scuttled beneath their feet."
62030-93 = "Trinity thirsted for our complete eradication."
62030-94 = "From the highest reach of the sky, to the deepest pits of this land, they wanted our existence to be expunged from reality itself."
62030-97 = "It was under these circumstances that our survival became the highest form of resistance. Our only one."
62030-98 = "We festered with a hatred that we were too weak to avenge, and so it collapsed inwards."
62030-104 = "So many were lost."
62030-105 = "Meaningless loss soon became entangled in the rhythm of our daily lives."
62030-106 = "Hatred spread through us like poison."
62030-111 = "[log]And thus.[/log]"
62030-113 = "[log]Vanitas vanitatum. All is in vain.[/log]"
62030-116 = "...!"
62030-119 = "Trinity, those presumed judges, declared our excommunication inevitable."
62030-120 = "Trinity, those presumed judges, declared it the consequence of our own sins."
62030-121 = "Trinity, those presumed judges, declared suffering our penance and fate."
62030-123 = "Here, we protest."
62030-124 = "\"Fate\" is nothing but a fabrication. Nothing in this world is predetermined."
62030-127 = "If not for their own machinations in the past, where would we be standing? They must answer us."
62030-128 = "If not for the history they determined, what kind of \"tomorrow\" would we be dreaming of? They must answer us."
62030-129 = "If not for the hatred they planted, what fruits of love would we be harvesting today? They must answer us."
62030-134 = "P-Please forgive me... I was wrong... I'm sorry..."
62030-135 = "I'm sorry...sorry...so sorry... I'll never..."
62030-136 = "...!"
62030-141 = "There exists a world where it is a sin for a child to hope."
62030-142 = "There exists a world where it is a sin for a child to pray for happiness."
62030-143 = "I'll let go of all hope... I won't rebel."
62030-144 = "I will never pray for happiness... Never again... I'm sorry..."
62030-146 = "In such a world, even the word \"mercy\" no longer holds meaning."
62030-147 = "Have mercy...please..."
62030-148 = "Mercy..."
62030-151 = "Answer us."
62030-152 = "What sanctity lies in a truth that took away our children?"
62030-153 = "What is \"righteousness\" before the tears of a starving child, whose meals are procured through thievery? Whose hands know no warmth but their own breath?"
62030-154 = "Who can claim \"justice\" before a child whose life has known naught but meaningless suffering?"
62030-155 = "That's..."
62030-156 = "ANSWER!"
62030-157 = "It is your duty! Your obligation!"
62030-158 = "The present is built upon the foundations of its dark past!"
62030-160 = "It was a mere matter of perspective! Interpretation! Something so simple, so utterly trivial."
62030-161 = "And yet, from this wellspring did rage and resentment, hatred and despair, burst forth."
62030-162 = "The children of this land have long walked alongside death, treading closer than any other else in Kivotos."
62030-163 = "So tell me, by what audacity, by what entitlement, do you dare live on?"
62030-164 = "Answer."
62030-169 = "I...cannot."
62030-170 = "For I possess no answer to your question."
62030-171 = "The issue lies in the question itself...for no justification can or should ever be made."
62030-172 = "*sob*"
62030-173 = "*sob*"
62030-183 = "[log]Even the stars and the moon in the sky[/log]"
62030-185 = "[log]could not bear to face their sins, and hid away their light.[/log]"
62030-188 = "[log]Quo vadis, Domine.[/log]"
62030-201 = "[log]As your student...[/log]"
62030-203 = "[log]There's something I want to ask you.[/log]"
62030-207 = "[log]...At the end of the lowest of the lows...[/log]"
62030-209 = "[log]What makes someone[/log]"
62030-211 = "[log]stay on their feet...?[/log]"
62030-215 = "(This is...?)"
62030-216 = "(I see. A memory of when I asked Sensei this.)"
62030-217 = "(And Sensei's response had been...)"
62030-220 = "\"...What that person believes in.\""
62030-221 = "\"Some things don't work that way.\""
62030-222 = "\"What makes someone act is their feelings and beliefs.\""
62030-226 = " \"Whether it be faith in something great...\""
62030-227 = "\"...Or trust in something within themselves.\""
62030-228 = "(Sensei...)"
62030-229 = "(Then where is it I must place my faith?)"
62030-230 = "(Please, guide me, Sensei.)"
62030-231 = "(How can Trinity atone...for all the sorrow and tragedy we caused?)"
62030-236 = "[log]Do what you believe in.[/log]"
62030-240 = "(I do not recall Sensei saying such a thing...)"
62030-243 = "What you believed in."
62030-244 = "What kept you going in your darkest moments."
62030-246 = "(No, wait. This is...)"
62030-247 = "(I know it. I'm certain this is Sensei's advice.)"
62030-250 = "We cannot change the past."
62030-251 = "But that doesn't mean we can't continue living in the present."
62030-254 = "So if the path you took till now isn't wrong."
62030-255 = "Continue to stay true to that path and prove yourself."
62030-256 = "(The path I took.)"
62030-257 = "(That's...)"
62030-262 = "[log]If you turn a deaf ear[/log]"
62030-264 = "[log]to the voices calling out for help,[/log]"
62030-266 = "[log]how would you see yourself?[/log]"
62030-270 = "...!!"
62030-271 = "(...I see. That's how Sensei...!)"
62030-275 = "..."
62030-276 = "I have my answer."
62030-277 = "Perhaps it may not be a satisfactory one."
62030-278 = "However, I shall declare, here and now, my right to continue living on, despite our sins."
62030-280 = "You are correct. This world is one overflowing with sorrow, one where pain is often the keystone of our existences."
62030-281 = "The present could not exist without the sacrifices etched into the foundations of the past."
62030-284 = "Despite these incontrovertible truths, I shall continue my trivial, menial pursuits."
62030-285 = "And if those pursuits can remove even one spoonful from the deluge of sorrows..."
62030-286 = "...I seek nothing else."
62030-292 = "There are things in this world I must protect."
62030-293 = "I do not do so with the expectation of reciprocation."
62030-294 = "Since when did my hubris lead me to such reprehensible entitlement?"
62030-295 = "For it is both my duty and my pride to follow my path of righteousness."
62030-299 = "Go forth with faith and honor in your heart."
62030-302 = "Upon reflection, calls for aid echoed all around me."
62030-303 = "If I could only return in time and attend to each and every one of them."
62030-304 = "Why must the limits of our bodies be so restrictive to our desires?"
62030-306 = "Regardless, the path forward is clear."
62030-307 = "I shall never allow those voices to fall upon deaf ears again."
62030-309 = "As long as these feeble hands can reach, I shall hold them out."
62030-310 = "It is my naive hope that these seemingly microscopic choices shall accumulate, piece by piece, effort by effort."
62030-311 = "And one day, each and every one of these innocent children..."
62030-316 = "...can see a better future, in a better time."
62030-319 = "For medicine knows no borders."
62030-326 = "Everyone! Behind me!"
62030-331 = "Captain?!"
62030-332 = "Captain?!"
62030-337 = "The Remedial Knights will protect you!"

[translation]
62030-1 = "第3話;需要救護之處"
62030-2 = "呀啊！"
62030-3 = "唔啊！？"
62030-4 = "敦子！退後！"
62030-8 = "唔……！？"
62030-10 = "美，美咲同學！？"
62030-17 = "唔啊……！？"
62030-18 = "危險！"
62030-26 = "美禰同學！？"
62030-27 = "唔……！！"
62030-41 = "（這是……什麼？）"
62030-42 = "（感覺像是被吸進一片無底的黑色沼澤……！）"
62030-47 = "──！！"
62030-54 = "那是解釋上的差異。"
62030-55 = "從某種角度看來很單純──"
62030-56 = "從某種角度看來也很微不足道。"
62030-59 = "然而，他們相信自己擁有真理的詮釋權。"
62030-60 = "人類最渴望的──莫過於在神面前證明自己的正確。"
62030-61 = "然而主張自己的正確──也意味著其餘的一切都是錯誤的。"
62030-64 = "在此宣告本次公會議的決議。"
62030-71 = "自即刻起，對奧利斯處以永恆的[ruby=絕罰]破門律[/ruby]。"
62030-72 = "奉至聖之父、至聖之子、至聖之靈之名。"
62030-79 = "[log]那便是[/log]"
62030-81 = "[log][ruby=奧利斯]我們[/ruby]漫長受難史的開端。[/log]"
62030-84 = "（這是……奧利斯的……）"
62030-91 = "道路並不存在，因此我們必須用粗糙的雙手將其開闢。"
62030-92 = "光芒已從我們身上消失，僅能如腐鼠般哀號、任汙水澆淋。"
62030-93 = "從至高的天空墜入至深的地底。"
62030-94 = "[ruby=三一]他們[/ruby]企圖抹去我們曾經存在的證據。"
62030-97 = "於是「生存」成為了唯一的抵抗和僅存的崇高。"
62030-98 = "無法向外宣洩的恨，最終回歸到了我們自己身上。"
62030-104 = "許多人消失了。"
62030-105 = "不應該消失的人消失了。"
62030-106 = "不應該互相憎恨的人開始憎恨彼此。"
62030-111 = "[log]因此──[/log]"
62030-113 = "[log]一切皆為徒勞。無論去向何處，終將化為虛無。[/log]"
62030-116 = "……！"
62030-119 = "[ruby=三一]放逐者[/ruby]們說，是你們罪有應得。"
62030-120 = "[ruby=三一]放逐者[/ruby]們說，是你們自食惡果。"
62030-121 = "[ruby=三一]放逐者[/ruby]們說，是你們本應受苦。"
62030-123 = "然而我在此宣告──"
62030-124 = "世間根本不存在所謂「本應如此」之物。"
62030-127 = "他們應當回答──若沒有他們創造的過去，[ruby=奧利斯]我們[/ruby]本將立足於何處。"
62030-128 = "他們應當回答──若沒有他們編造的歷史，[ruby=奧利斯]我們[/ruby]本將夢見什麼樣的明天。"
62030-129 = "他們應當回答──若沒有他們播下的仇恨，[ruby=奧利斯]我們[/ruby]本將被施予什麼樣的愛。"
62030-134 = "我錯了……請原諒我……我錯了……"
62030-135 = "我不會……不會再做出這種事了……"
62030-136 = "……！"
62030-141 = "有一個世界，懷抱希望的孩子是有罪的。"
62030-142 = "有一個世界，祈求幸福的孩子是有罪的。"
62030-143 = "我不會再反抗……不會再懷抱希望……"
62030-144 = "不會再追求幸福……也不會再祈禱了……"
62030-146 = "在那個世界，就連慈悲也會黯然失色，失去原本的意義。"
62030-147 = "求求你……發發慈悲……"
62030-148 = "發發慈悲……"
62030-151 = "回答我。"
62030-152 = "在使孩子們消失的那條真理之中，究竟能寄宿著什麼樣的神聖。"
62030-153 = "在必須倚靠偷竊來充飢、為凍僵的手腳取暖的孩子們的淚水面前──#n究竟能標榜什麼樣的正確。"
62030-154 = "在訴說著「人生只有無謂的痛苦」的孩子面前，究竟能談論什麼樣的公平正義。"
62030-155 = "那是……"
62030-156 = "回答我！"
62030-157 = "你有義務回答我的問題！"
62030-158 = "因為現今的一切，都建立在過去的基礎之上！"
62030-160 = "那不過是解釋上的差異。#n單純、瑣碎，甚至毫無意義。"
62030-161 = "然而那卻引燃了所有人的冤屈、憤怒與憎恨。"
62030-162 = "這片土地上的孩子們，比任何人都接近死亡。"
62030-163 = "而身處此處的你──又是何以膽敢活下去的。"
62030-164 = "回答我。"
62030-169 = "我……沒有。"
62030-170 = "我沒有……能回答這些問題的答案。"
62030-171 = "那是本來就不應該……也不可能存在答案的問題。"
62030-172 = "嗚……"
62030-173 = "嗚……嗚嗚……"
62030-183 = "[log]就連天上的星與月，[/log]"
62030-185 = "[log]都因無法承受自身的罪而隱去了光輝。[/log]"
62030-188 = "[log][ruby=Quo vadis, Domine.]主啊，祢往何處去。[/ruby][/log]"
62030-201 = "[log]身為老師的學生……[/log]"
62030-203 = "[log]我有件事想請教老師。[/log]"
62030-207 = "[log]在最深、最底層的深淵之中……[/log]"
62030-209 = "[log]是什麼支撐著人們……[/log]"
62030-211 = "[log]讓人不至於徹底倒下呢？[/log]"
62030-215 = "（這是……？）"
62030-216 = "（沒錯，我確實提出過這樣的問題……）"
62030-217 = "（而老師他的回答是……？）"
62030-220 = "「我想……應該是那個人相信的事物吧。」"
62030-221 = "「因為有些事情並不是那樣運作的。」"
62030-222 = "「驅使人們展開行動的，終究是情感與信念。」"
62030-226 = "「無論那是對某種偉大存在的信仰……」"
62030-227 = "「還是對自己內心深處某種感覺的信賴。」"
62030-228 = "（可是老師……）"
62030-229 = "（此時此刻的我，究竟應該相信什麼呢）"
62030-230 = "（請告訴我吧，老師）"
62030-231 = "（在[ruby=三一]我們[/ruby]造成的悲傷和慘劇面前……我們究竟能做些什麼呢……？）"
62030-236 = "[log]做你相信的事吧。[/log]"
62030-240 = "（……？老師應該沒說過這句話吧……？）"
62030-243 = "做你一直以來所相信的事。"
62030-244 = "以及始終支撐著你走到今天的事。"
62030-246 = "（不，我懂了。這是……）"
62030-247 = "（是啊。如果是老師，他一定會這麼說吧）"
62030-250 = "我們確實無法改變過去。"
62030-251 = "然而即便如此，也不代表我們無法活在當下。"
62030-254 = "如果相信自己至今走過的路沒有錯──"
62030-255 = "就藉由將其貫徹到底，來證明你自己吧。"
62030-256 = "（我所走過的路）"
62030-257 = "（那是……）"
62030-262 = "[log]如果背棄了[/log]"
62030-264 = "[log]向你求助之人的聲音……[/log]"
62030-266 = "[log]你又該被定義為什麼樣的人呢。[/log]"
62030-270 = "……！！！"
62030-271 = "（……是啊[ruby=老師]。您就[/ruby]是以這種方式……！）"
62030-275 = "……"
62030-276 = "我會回答你的問題。"
62030-277 = "不過，這並不是能夠完整回答所有問題的答覆。"
62030-278 = "只是對於你真正想問的──「何以膽敢活下去」這個問題的回答。"
62030-280 = "世界早已滿溢著悲傷。#n這是無法逃避的現實。"
62030-281 = "「現在」建立在「過去」之上……也如你所說，是個不爭的事實。"
62030-284 = "然而若是我那無足輕重、微不足道的小小舉動……"
62030-285 = "能夠稍微減輕世間的悲傷，哪怕只有一杓也好……"
62030-286 = "我便別無所求。"
62030-292 = "我有必須守護的事物。"
62030-293 = "即便沒有回報也無所謂。"
62030-294 = "不知從何時開始，我竟產生了這種奢望。"
62030-295 = "做自己認為正確的事，是一種榮耀。"
62030-299 = "將榮耀與信念銘刻於心。"
62030-302 = "每當我回首望去，處處都傳來渴求救贖的聲音。"
62030-303 = "然而遺憾的是，我無法同時奔向每一道呼喊。"
62030-304 = "為什麼人只能擁有一個身體呢。"
62030-306 = "既然如此，我所能做的……"
62030-307 = "就是要盡可能傾聽那些聲音。"
62030-309 = "至少要向身邊、向伸手可及的人們──伸出這雙力量薄弱的手。"
62030-310 = "盼望那些微小、無足輕重的選擇能夠不斷累積──"
62030-311 = "哪怕只有一點點也好。"
62030-316 = "但願有朝一日，我們都能一同邁向更加寬廣的天地。"
62030-319 = "哪裡要救護，我就在哪裡。"
62030-326 = "大家！請退到我身後！"
62030-331 = "團長！？"
62030-332 = "團長！？"
62030-337 = "接下來，將由救護騎士團來守護各位！"

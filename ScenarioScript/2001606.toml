[translation]
2001606-1 = "Smiling Fraulein"
2001606-2 = "After receiving a MomoTalk message from Iroha, I thoroughly prepared for her arrival."
2001606-3 = "[ns1] \"I have coffee and snacks...\"\n[ns2] \"I should get some work done before she comes.\""
2001606-14 = "[ns] \"That's done... Iroha should be here anytime now.\""
2001606-15 = "I was ready for her arrival, but Iroha didn't come at her usual time. Lunch came and went with no sign of her."
2001606-16 = "Iroha was nowhere to be seen."
2001606-19 = "3:00 PM came, and Iroha still hadn't showed up."
2001606-20 = "Iroha usually came to Schale immediately after sending me a message. I was worried something had happened to her."
2001606-21 = "I pondered what to do, but there was only one choice."
2001606-22 = "[ns] \"Maybe I should go to the Pandemonium Society.\""
2001606-26 = "When I arrived at the Pandemonium Society of Gehenna Academy, it was chaos."
2001606-27 = "Once the tanks are finished, we'll be transporting the squad firearms that passed inspection. Don't dawdle and get it done."
2001606-28 = "Understood!"
2001606-29 = "Please maintain the equipment in storage until the next training session. I don't want to have to do things twice."
2001606-30 = "I mean it. I really don't want to, okay?"
2001606-31 = "Yes, ma'am! I understand, Iroha!"
2001606-32 = "Next on the list is..."
2001606-33 = "That's all I have. I hope everyone works hard for the Pandemonium Society's battle-command inspection next week."
2001606-34 = "Yes, ma'am!"
2001606-35 = "*sigh* How annoying."
2001606-36 = "[s] \"Iroha?\""
2001606-37 = "What? Sensei?!"
2001606-38 = "S-Sensei.... What brings you here?"
2001606-39 = "[s] \"Ah... So about that...\""
2001606-40 = "I told Iroha about how I ended up at the Pandemonium Society."
2001606-41 = "You came all this way because you were worried?"
2001606-42 = "Just because I didn't show up at Schale like I usually do?"
2001606-43 = "Pfft."
2001606-44 = "[s] \"Why is that funny?!\""
2001606-45 = "Hahahahaha! You came all the way here just to check up on me?"
2001606-46 = "Oh, Sensei... I think you've gone soft."
2001606-47 = "I told you I've been going to Schale to get you out of your office!"
2001606-48 = "What if this was all part of my brilliant plan? What if I didn't go to lure you out of the office?"
2001606-49 = "Do you ever think things through?"
2001606-50 = "[s] \"What?! That was your plan all along?!\""
2001606-51 = "Of course not."
2001606-52 = "I was actually really busy here, as you can see."
2001606-53 = "[s] \"So you've actually been working... I'm surprised.\""
2001606-54 = "I call myself a couch potato, but I have to be productive sometimes. I am a commander in the Pandemonium Society, after all."
2001606-55 = "Heehee. Anyway, are you shocked at how cool I am? You haven't seen anything yet."
2001606-56 = "[s] \"Sorry for bothering you while you're busy.\""
2001606-57 = "There's no need to be sorry."
2001606-58 = "You came all this way, and I'm pretty much wrapped up here anyway."
2001606-59 = "All I have left to do is report today's inspection results to the chairman."
2001606-60 = "But reports can be delayed for all kinds of reasons."
2001606-66 = "[ns] \"That's the Iroha I know.\""
2001606-67 = "So, how about I take you to my secret hideout?"
2001606-68 = "Are you in?"
2001606-70 = "[ns] \"This is...a garage?\""
2001606-71 = "Mhm. We store our tanks here, but I've made it into my own space."
2001606-72 = "Come this way, Sensei."
2001606-76 = "Over here."
2001606-79 = "― Heehee,[wa:10] "
2001606-81 = "― not a bad place, right?[wa:1060] "
2001606-84 = "― Look at this fluffy cushion![wa:10] "
2001606-86 = "― This perfect arrangement of diverse snacks.[wa:110] "
2001606-89 = "― And a plethora of books and games.[wa:1440] "
2001606-92 = "― It's my very own hideout. I'm pretty proud of it.[wa:700] "
2001606-94 = "― What do you think?"
2001606-97 = "[ns3] \"It looks like you put a lot of work into it.\"\n[ns4] \"I can see why you're proud.\""
2001606-98 = "― Heehee. Go on, compliment me more![wa:960] "
2001606-99 = "― Heehee. Go on, compliment me more![wa:960] "
2001606-101 = "― I'm all ears.[wa:470] "
2001606-104 = "― Okay! Now that I've lured you here...[wa:1240] "
2001606-106 = "― How about we skip work together, as usual?[wa:10] "
2001606-109 = "― Hm, Sensei?[wa:680] "
2001606-113 = "Sorry to rub it in your face, but..."
2001606-114 = "I got you again, Sensei."
2001606-115 = "[s] \"You never fail to.\""
2001606-116 = "Heehee. You really should be more careful, Sensei."
2001606-117 = "You always let your guard down so it's too easy to attack."
2001606-118 = "[s] \"I'll do my best for you, Iroha.\""
2001606-119 = "I'll look forward to it, Sensei."
2001606-121 = "Iroha and I hung out together in her hideout until I really had to get back to work."

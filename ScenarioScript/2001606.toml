[translation]
2001606-1 = "เด็กสาวใบหน้าเปื้อนยิ้ม"
2001606-2 = "(หลังจากได้รับ MOMOTALK จากอิโรฮะ คุณครูก็เตรียมพร้อมทุกอย่างให้พร้อมก่อนอิโรฮะมาถึง)"
2001606-3 = "[ns1] \"ชงกาแฟไว้เรียบร้อย ขนมก็เตรียมไว้แล้ว...\"\n[ns2] \"งั้นก็ทำงานสักหน่อยก่อนอิโรฮะจะมาแล้วกัน\""
2001606-14 = "[ns] \"ฮู่ว เสร็จไปอีกหนึ่งงาน อิโรฮะคงใกล้มาแล้ว...\""
2001606-15 = "(ถึงคุณครูจะเตรียมของไว้รอแล้ว แต่พอผ่านเวลาช่วงเช้าที่มักจะเป็นเวลาที่อิโรฮะแวะมา... จนเลยไปถึง#nช่วงบ่ายแล้วก็ตาม)"
2001606-16 = "(แต่อิโรฮะก็ไม่ได้มาที่ชาเล่ต์)"
2001606-19 = "(ถึงจะผ่านไปจนถึงบ่ายสามโมงแล้วก็ตาม ก็ยังไม่มีวี่แววว่าอิโรฮะจะมาที่ชาเล่ต์เลย)"
2001606-20 = "(ปกติแล้วหลังจากส่ง MOMOTALK มาหา อิโรฮะก็มักจะมาที่ชาเล่ต์ทันที ทำให้คุณครูกังวลว่าจะเกิดเรื่อง#nอะไรขึ้น)"
2001606-21 = "(คุณครูจึงครุ่นคิดอยู่ครู่หนึ่ง และสุดท้ายก็ตัดสินใจได้)"
2001606-22 = "[ns] \"ลองไปที่แพนเดโมเนียม โซไซตี้ดูก็แล้วกัน...\""
2001606-26 = "(คุณครูมาถึงที่ด้านหน้าแพนเดโมเนียม โซไซตี้ของเกเฮนน่า ก็พบกับบรรยากาศที่ดูวุ่นวายอย่างมาก)"
2001606-27 = "ถ้าเคลื่อนย้ายรถถังเสร็จแล้ว ต่อไปจะให้หน่วยที่ซ่อมบำรุงเสร็จแล้วขนย้ายอาวุธต่อนะคะ ช่วยอย่ายืดยาดอืดอาด เคลื่อนไหวให้รวดเร็วด้วยค่ะ"
2001606-28 = "ค่ะ!"
2001606-29 = "จนกว่าจะถึงการฝึกครั้งต่อไป ช่วยดูแลและเก็บรักษาอุปกรณ์ทั้งหมดอย่างดีด้วยค่ะ จะได้ไม่ต้องมานั่ง#nทำงานซ้ำสองอีกค่ะ"
2001606-30 = "ฉันไม่ได้พูดไปส่งๆ นะคะ ฉันไม่ชอบที่ต้องมาทำงานซ้ำๆ ค่ะ"
2001606-31 = "รับทราบค่ะ ท่านอิโรฮะ!"
2001606-32 = "งานที่ต้องทำต่อไปก็คือ..."
2001606-33 = "ค่ะ งานที่ได้รับคำสั่งมามีเพียงเท่านี้ค่ะ ขอให้ทุกคนพยายามอย่างสุดความสามารถ เพื่อไม่ให้มีเรื่องติด#nขัดในการตรวจสอบการสั่งการรบของทางแพนเดโมเนียม โซไซตี้ด้วยค่ะ"
2001606-34 = "รับทราบค่ะ!"
2001606-35 = "เฮ้อ น่ารำคาญจริงๆ"
2001606-36 = "[s] \"อิโรฮะ...?\""
2001606-37 = "หืม? เสียงนี้มัน... คุณครูเหรอ?"
2001606-38 = "เอ๋... เดี๋ยวนะคะ คุณครูมาทำอะไรถึงที่นี่..."
2001606-39 = "[s] \"อ๋อ คือว่าเรื่องนั้น...\""
2001606-40 = "(คุณครูเล่ารายละเอียดเรื่องที่มาที่แพนเดโมเนียม โซไซตี้ให้อิโรฮะฟัง)"
2001606-41 = "คะ? ปกติฉันมักจะไปที่ชาเล่ต์บ่อยๆ แต่วันนี้พอคุณครูไม่เห็นฉันไป..."
2001606-42 = "ก็เลยกังวลว่าจะเกิดเรื่องอะไรขึ้น แล้วก็ตัดสินใจมาหาถึงที่นี่เหรอคะ?"
2001606-43 = "พะ..."
2001606-44 = "[s] \"พะ...?\""
2001606-45 = "พรืดดดด ฮะฮะฮ่า ฮ่าฮ่าฮ่าฮ่า! มาถึงที่แพนเดโมเนียม โซไซตี้เพราะเป็นห่วงฉันงั้นเหรอคะ?"
2001606-46 = "เดี๋ยวสิ คุณครู... ประมาทเกินไปรึเปล่าคะ?"
2001606-47 = "ฉันไปที่ชาเล่ต์เพื่อหลอกล่อคุณครูนะ"
2001606-48 = "ถ้าเกิดว่าการที่ฉันไม่ไปหาคุณครูวันนี้ เป็นหนึ่งในกับดักที่ล่อให้คุณครูออกมา... จะทำยังไงล่ะคะ?"
2001606-49 = "ประมาทเกินไปรึเปล่าคะ?"
2001606-50 = "[s] \"ว่าไงนะ? เป็นแผนการของเธองั้นเหรอ?!\""
2001606-51 = "เปล่าค่ะ ไม่ใช่แบบนั้นสักหน่อยค่ะ"
2001606-52 = "วันนี้ฉันแค่งานยุ่งเหมือนอย่างที่คุณครูเห็นก็เท่านั้นเองค่ะ"
2001606-53 = "[s] \"อา... น่าตกใจนะที่เห็นอิโรฮะตั้งใจทำงานแบบนี้\""
2001606-54 = "เดี๋ยวก่อนนะคะ เห็นแบบนี้ฉันก็ทำงานเหมือนกันนะ ฉันเป็นผู้บัญชาการหน่วยรถถัง#nของแพนเดโมเนียม โซไซตี้ด้วย"
2001606-55 = "ฮิฮิ... ยังไงก็เถอะค่ะ เป็นยังไงบ้างคะคุณครู ตกใจที่เห็นด้านที่เพอร์เฟกต์ของฉันใช่มั้ยคะ? คุณครูจะตกใจมากกว่านี้ก็ได้นะคะ "
2001606-56 = "[s] \"ครูขอโทษนะที่มาขัดจังหวะ จะกลับเดี๋ยวนี้แหละ...\""
2001606-57 = "อ๊ะ ไม่เลยค่ะ คุณครูไม่ได้มาขัดจังหวะเลยค่ะ"
2001606-58 = "ไหนๆ คุณครูก็มาถึงที่นี่แล้วนี่คะ? งานของฉันก็กำลังจะเสร็จพอดีเลยค่ะ"
2001606-59 = "เหลือแค่เอาผลสรุปการซ่อมบำรุงวันนี้ไปรายงานให้ประธานก็เท่านั้น..."
2001606-60 = "แต่ว่า <การส่งรายงานล่าช้าเนื่องจากเหตสุดวิสัย> มันก็เกิดขึ้นได้ตลอดนี่คะ?"
2001606-66 = "[ns] \"ต้องแบบนี้สิถึงสมกับเป็นอิโรฮะ\""
2001606-67 = "ถ้าคุณครูพอมีเวลา ฉันคิดว่าจะเชิญคุณครูไปที่ฐานลับของฉันที่เคยบอกไปคราวก่อนค่ะ"
2001606-68 = "ว่ายังไงคะ สนใจลองไปดูหน่อยมั้ยคะ?"
2001606-70 = "[ns] \"ที่นี่มัน...โรงรถใช่มั้ย?\""
2001606-71 = "ค่ะ ที่นี่คือโรงเก็บรถถังของแพนเดโมเนียม โซไซตี้ค่ะ แต่ฉันใช้ที่นี่เป็นฐานลับ พื้นที่ส่วนตัวของฉันค่ะ"
2001606-72 = "เอาละ อย่ามัวคุยกันอยู่เลยค่ะ เชิญทางนี้ค่ะ คุณครู"
2001606-76 = "ทางนี้ค่ะ คุณครู"
2001606-79 = "― ฮิฮิ...[wa:10] "
2001606-81 = "― เป็นสถานที่ที่ใช้ได้เลยใช่มั้ยคะ?[wa:660] "
2001606-84 = "― หมอนอิงสุดนุ่มอันนี้...[wa:120] "
2001606-86 = "― กับขนมมากมายที่เตรียมเอาไว้[wa:750] "
2001606-89 = "― นอกจากนี้ ก็ยังมีหนังสือกับเกมต่างๆ อยู่เต็มไปหมด[wa:840] "
2001606-92 = "― ที่นี่เป็นฐานลับของฉัน... ที่ฉันภูมิใจมากเลยค่ะ[wa:780] "
2001606-94 = "― คุณครูคิดว่ายังไงคะ?"
2001606-97 = "[ns3] \"เป็นที่ที่จัดเตรียมไว้อย่างดีเลยนะ\"\n[ns4] \"ได้เห็นก็เข้าใจแล้วว่าทำไมอิโรฮะถึงภูมิใจน่ะ\""
2001606-98 = "― ฮิฮิ ชมอีกสิคะ...[wa:1640] "
2001606-99 = "― ฮิฮิ ชมอีกสิคะ...[wa:1640] "
2001606-101 = "― จะชื่นชมแล้วก็พูดชมฉันอีกเยอะๆ ก็ได้นะคะ[wa:10] "
2001606-104 = "― เพราะงั้น...ตอนนี้เราเป็นผู้สมรู้ร่วมคิดกันแล้วนะคะ[wa:680] "
2001606-106 = "― ถ้างั้นวันนี้พวกเรามาอู้งานกัน... เหมือนที่เคยทำดีมั้ยคะ?[wa:10] "
2001606-109 = "― ว่ายังไงคะ~? คุณครู...?[wa:200] "
2001606-113 = "สุดท้ายแล้ว..."
2001606-114 = "คุณครูก็ตกหลุมพรางฉันอีกแล้วนะคะ คุณครู"
2001606-115 = "[s] \"อะไรกันเนี่ย...\""
2001606-116 = "ฮิฮิฮิ ต่อไปก็ระวังตัวไว้สักหน่อยจะดีกว่านะคะ?"
2001606-117 = "คราวหน้าฉันอาจจะเล็งตอนที่คุณครูประมาท แล้วก็เผลอล่อลวงคุณครูออกมาอีกก็ได้นะคะ"
2001606-118 = "[s] \"ครูจะพยายามนะ\""
2001606-119 = "ถ้างั้น... ฉันจะตั้งตารอนะคะ การต่อสู้แพ้ชนะกับคุณครู~♪"
2001606-121 = "(คุณครูมองอิโรฮะที่ยิ้มอย่างร่าเริง และใช้เวลาร่วมกับอิโรฮะที่ฐานลับอยู่พักใหญ่ ก่อนจะกลับไปที่ชาเล่ต์)"

2001606-14 = "[ns] \"후우, 이걸로 하나 끝났고……. 슬슬 이로하가 올 시간인데…….\""
2001606-15 = "#na;(그렇게 잠시 마음의 준비를 했지만, 평소 이로하가 샬레를 자주 찾는 오전 시간을 지나 점심시간이 지날 때까지.)"
2001606-16 = "#na;(이로하는 결국 샬레를 찾아오지 않았다.)"
2001606-17 = "#all;hide"
2001606-18 = "#wait;1000"
2001606-19 = "#na;(오후 3시가 지났을 때까지도 이로하는 샬레를 방문하지 않았다.)"
2001606-20 = "#na;(평소 모모톡을 보낸 뒤로는 틈만 나면 샬레를 찾아오는 이로하였기에, 아무래도 오늘은 무언가 일이 있는 게 아닐까 우려가 되었다.)"
2001606-21 = "#na;(평소와 사뭇 다른 느낌에 잠시 고민했지만, 결정은 바로 내릴 수 있었다.)"
2001606-22 = "[ns] \"……가볼까. 만마전에.\""
2001606-23 = "#wait;1000"
2001606-24 = "#wait;700"
2001606-25 = "#all;hide"
2001606-26 = "#na;(그리하여 찾은 게헨나 학원 만마전 앞은 꽤 부산스러운 분위기가 감돌고 있었다.)"
2001606-27 = "3;이로하;00;전차의 이동이 끝났으면 그다음은 점검을 끝낸 분대 화기를 운반하겠습니다. 꾸물거리지 말고 빠르게 움직여주세요.\n#3;a\n#3;em;[반응]"
2001606-28 = "#na;만마전 부원 A;넵!"
2001606-29 = "3;이로하;05;다음 훈련이 있기 전까지 모든 장비는 보관에 각별히 신경 써주세요. 했던 일을 두 번 하고 싶진 않으니까."
2001606-30 = "3;이로하;04;……아니, 그냥 하는 말이 아니라. 진짜 싫거든요. 그런 거…….\n#3;em;[땀]"
2001606-31 = "#na;만마전 부원 B;네! 알겠습니다! 이로하 님!"
2001606-32 = "3;이로하;01;그리고 다음으로 진행해야 할 일은…….\n#3;m3\n#3;em;…"
2001606-33 = "3;이로하;03;네, 지시사항 전달은 여기까지입니다. 부디 다음 주에 있을 만마전의 전투 지휘검열에 차질이 없도록. 모두 분발해주세요.\n#3;greeting"
2001606-34 = "#na;만마전 부원들;예스-맴!"
2001606-35 = "3;이로하;06;하아……. 귀찮아.\n#3;em;[속상함]\n#3;stiff"
2001606-36 = "[s] \"이로하?\""
2001606-37 = "3;이로하;02;응……? 이 목소리는……. 선생님?\n#3;em;[반응]"
2001606-38 = "3;이로하;04;어라, 잠깐……. 선생님께서 여긴 어쩐 일로……."
2001606-39 = "[s] \"아, 그게 말이지…….\""
2001606-40 = "#na;(이로하에게 직접 만마전까지 찾아온 경위를 이야기했다.)"
2001606-41 = "3;이로하;02;네? 평소 잘만 샬레에 찾아오던 제가 오늘따라 모습을 보이지 않으니까…….\n#3;em;[?]"
2001606-42 = "3;이로하;01;무슨 일이 벌어진 건 아닐까. 걱정되어서 여기까지 행차하신 거라고요……?"
2001606-43 = "3;이로하;03;……푸훗."
2001606-44 = "[s] \"푸훗?\""
2001606-45 = "3;이로하;07;푸훗, 아핫, 아하하하! 그런 이유로 직접 만마전까지 찾아오신 거라니.\n#3;em;[재잘]"
2001606-46 = "3;이로하;07;아니, 정말, 선생님……. 너무 방심하신 거 아니신가요?"
2001606-47 = "3;이로하;07;저, 매일 같이 선생님을 꾀어내기 위해 샬레로 찾아뵈었던 거라고요?\n#3;em;[음표]"
2001606-48 = "3;이로하;03;만약 오늘 제가 찾아뵙지 않은 게, 역으로 선생님을 꾀어내기 위한 함정……. 계략이었으면 어쩌려고 그러셨나요?"
2001606-49 = "3;이로하;07;조심성이 너무 부족하신 거 아닌가요?"
2001606-50 = "[s] \"뭐, 뭐야?! 그랬던 거야?!\""
2001606-51 = "3;이로하;06;아니, 그럴 리가 없잖아요…….\n#3;em;[땀]"
2001606-52 = "3;이로하;01;오늘은 정말 보셨던 대로 바빴을 뿐이에요."
2001606-53 = "[s] \"아, 그래서 이로하가 이렇게 열심히 일을……. 놀랐어.\""
2001606-54 = "3;이로하;04;아니, 저, 아무리 그래도 이 정도 일은 한다구요……? 일단은 만마전의 전차장이고.\n#3;stiff"
2001606-55 = "3;이로하;07;후후……. 어쨌거나 선생님의 반응을 보고 있자니, 어떠신가요? 제 우수한 모습에 조금 놀라셨나요? 지금보다 더욱 놀라셔도 상관없는데요.\n#3;em;[반짝]"
2001606-56 = "[s] \"아냐, 방해해서 미안해, 바로 돌아가볼 테니까……\""
2001606-57 = "3;이로하;02;앗, 아뇨. 그러실 거 없어요.\n#3;em;[반응]"
2001606-58 = "3;이로하;07;그래도 모처럼 여기까지 찾아오신 거잖아요? 마침 잘 됐어요. 슬슬 일도 대강 마무리가 된 참이고."
2001606-59 = "3;이로하;99;남은 건 오늘 점검 결과를 의장에게 보고하는 것뿐이지만…….\n#3;em;…"
2001606-60 = "3;이로하;03;네, <자의가 아닌 사정으로 보고가 늦어지는 일>은 언제나 있기 마련이잖아요?"

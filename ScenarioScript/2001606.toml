2001606-1 = "#title;가끔은 미소 짓는 프로일라인"
2001606-2 = "#na;(이로하에게서 모모톡이 도착한 뒤로, 언제 이로하가 찾아와도 대응할 수 있도록 만반의 준비를 하였다.)"
2001606-3 = "[ns1] \"커피도 준비했고, 과자도 일단 채워 놨고…….\"\n[ns2] \"그럼 오기 전까지, 일이나 조금 더 하고 있을까.\""

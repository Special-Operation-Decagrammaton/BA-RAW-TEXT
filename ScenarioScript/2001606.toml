[translation]
2001606-1 = "微笑的少女"
2001606-2 = "（收到伊呂波傳來的MomoTalk之後，我做了各種準備）"
2001606-3 = "[ns1]「咖啡，零嘴……大概就這些吧。」\n[ns2]「趁她來之前，再做點工作吧……」"
2001606-14 = "[ns]「呼……差不多快來了吧？」"
2001606-15 = "（但是我處理完幾項工作，伊呂波還是沒來……）"
2001606-16 = "（過了正午，伊呂波還是沒來）"
2001606-19 = "（甚至過了下午3點）"
2001606-20 = "（換做平常，她應該不會隔這麼久還不來……）"
2001606-21 = "（害我開始擔心她是不是出什麼事了）"
2001606-22 = "[ns]「……去萬魔殿看看吧。」"
2001606-26 = "（於是我來到了格黑娜學園萬魔殿，現場似乎正忙成一片……）"
2001606-27 = "等戰車移動好，接下來還要搬槍械，動作快。"
2001606-28 = "是！"
2001606-29 = "請把裝備妥善擺好，讓下次訓練還能繼續使用。不要因為擺放不善讓裝備有折損的疑慮了。"
2001606-30 = "……我是說真的，拜託真的別出狀況。"
2001606-31 = "是！我們知道了！！"
2001606-32 = "再來……"
2001606-33 = "好，先到這邊為止吧。請大家回去各自努力，以面對下週的訓練。"
2001606-34 = "是，長官！"
2001606-35 = "啊──，麻煩死了……"
2001606-36 = "[s]「伊呂波？」"
2001606-37 = "……老師？"
2001606-38 = "老師怎麼會來這裡……"
2001606-39 = "[s]「那是因為……」"
2001606-40 = "（把今天的狀況告訴伊呂波）"
2001606-41 = "也就是說……"
2001606-42 = "因為我遲遲沒有去夏萊，所以老師擔心我是不是出事了……"
2001606-43 = "……呵呵。"
2001606-44 = "[s]「？？？」"
2001606-45 = "噗呵，啊哈哈哈哈！就因為這樣讓老師跑到這裡……"
2001606-46 = "唉唷老師啊，你忘記我一開始跟你說什麼了嗎？"
2001606-47 = "我去夏萊的目的，是為了把老師騙來萬魔殿耶？"
2001606-48 = "結果只是因為我沒有去夏萊，你就自己笨笨的跑來了，這是怎樣啊？"
2001606-49 = "你就沒想過這可能是我的策略嗎？"
2001606-50 = "[s]「原，原來是這樣……！？」"
2001606-51 = "沒有，我只是說說而已。那怎麼可能嘛。"
2001606-52 = "真的如老師所見，我只是今天很忙罷了。"
2001606-53 = "[s]「我好像是第一次看到伊呂波這麼認真工作。」"
2001606-54 = "失禮耶……這點事我當然會認真做，我可是萬魔殿的戰車長。"
2001606-55 = "不過我也不討厭被人誇獎。老師可以多誇我一點呀。"
2001606-56 = "[s]「嗯，真了不起。話說我好像打擾到你了，我馬上回去。」"
2001606-57 = "不會，老師你不用急著回去啦。"
2001606-58 = "來都來了，不妨多待一下吧。我工作也差不多處理好了。"
2001606-59 = "啊──，不過我等等必須去向議長報告結果……"
2001606-60 = "不過，「遇到意外而延誤報告」，這種狀況也挺常見對吧？"
2001606-66 = "[ns]「伊呂波……？」"
2001606-67 = "如果老師不介意，我想帶老師去上次提到的，「我專屬的休息空間」。"
2001606-68 = "如何？有興趣嗎？"
2001606-70 = "[ns]「這裡是……車庫？」"
2001606-71 = "對，這裡是停放萬魔殿戰車的地方。不過現在則是我的專屬空間。"
2001606-72 = "請往這邊。"
2001606-76 = "請進，別客氣。"
2001606-79 = "― 呵呵，[wa:100] "
2001606-81 = "― 不覺得這裡很不錯嗎？[wa:1580] "
2001606-84 = "― 這鬆軟的坐墊，[wa:760] "
2001606-86 = "― 品項齊全的各種零嘴。[wa:1430] "
2001606-89 = "― 再加上很多書本和遊戲。[wa:2360] "
2001606-92 = "― 這就是我，引以為傲的專屬休息空間。[wa:1980] "
2001606-94 = "― 你覺得如何啊？"
2001606-97 = "[ns3]「這地方感覺真不錯……」\n[ns4]「原來如此，確實讚。」"
2001606-98 = "― 哼哼，老師可以再多佩服我一點，[wa:1720] "
2001606-99 = "― 哼哼，老師可以再多佩服我一點，[wa:1720] "
2001606-101 = "― 再多稱讚我一點唷？[wa:630] "
2001606-104 = "― 那麼，既然今天有人陪我當共犯，[wa:2120] "
2001606-106 = "― 那今天也像往常一樣盡情偷懶吧。[wa:980] "
2001606-109 = "― 是吧，老師？[wa:880] "
2001606-113 = "好了，雖然是結果論……"
2001606-114 = "但我又再次成功引誘老師偷懶了，對吧？"
2001606-115 = "[s]「是啊……」"
2001606-116 = "呵呵，建議老師以後小心一點比較好喔。"
2001606-117 = "說不定哪天趁老師大意，我真的會成功把老師拉攏進來。"
2001606-118 = "[s]「嗯，那我就適度努力吧。」"
2001606-119 = "我很期待老師的表現唷。請老師好好加油吧。"
2001606-121 = "（伊呂波面露微笑如此說著。我們也一起在她的休息空間度過一段舒服的時間）"

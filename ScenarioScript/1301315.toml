[translation]
1301315-1 = "สิ่งที่ไม่ถูกจดจำ"
1301315-2 = "(คุณครูมุ่งหน้าไปที่ห้องสมุดเรดวินเทอร์)"
1301315-4 = "มะ... มาจริงๆ เหรอคะคุณครู?!"
1301315-5 = "แต่ให้คุณครูมาช่วยเรื่องเล็กๆ น้อยๆ แบบนี้มัน..."
1301315-6 = "บางครั้งเรื่องเล็กๆ น้อยๆ ก็เป็นเรื่องสำคัญงั้นเหรอคะ? ถะ... ถึงอย่างนั้นก็เถอะ... ฮือ..."
1301315-7 = "[s] \"เอาเป็นว่ามาลุยกันเถอะ!\""
1301315-8 = "คะ... คุณครู?! ขะ... เข้าใจแล้วค่ะ ขะ... ขอบคุณนะคะ..."
1301315-9 = "คะ? ว่าแต่มันคืออะไรงั้นเหรอคะ?"
1301315-10 = "..."
1301315-11 = "......!"
1301315-12 = "อะอะอะเอ่อ... คะคะคะ... คือว่า... คือว่ามัน...!"
1301315-13 = "เป็นคอลเลกชันผลงานชิ้นแรกของคุณรูริเอลค่ะ..."
1301315-14 = "[s] \"ไม่ใช่เรื่องเล็กๆ เลยนะ?!\""
1301315-15 = "ขะ... ของแบบนี้มันมีความหมายกับแฟนๆ มากกว่านักเขียนอีกอย่างนั้นเหรอคะ...?"
1301315-16 = "สำหรับคนทั่วไปที่ไม่ใช่แฟนผลงาน มันก็เป็นแค่หนังสือการ์ตูนหลายๆ เล่มที่นำมารวมเป็น#nคอลเลกชันเท่านั้นค่ะ..."
1301315-17 = "คะ? แต่สำหรับฉันแล้วมันเหมือนสมบัติที่มีค่ามากเลยใช่มั้ย... งั้นเหรอคะ?"
1301315-18 = "...!"
1301315-19 = "ขอบคุณนะคะคุณครูที่พูดแบบนั้น ฉันดีใจมากจริงๆ ค่ะ... "
1301315-20 = "ค่ะ! ถ้างั้นพวกเราก็มาลองหาดูกันเถอะค่ะ!"
1301315-22 = "(คุณครูเริ่มค้นหาทุกซอกทุกมุมของห้องสมุดเพื่อตามหา 'คอลเลกชัน' ของโมมิจิ)"
1301315-27 = "(ระหว่างที่ทั้งสองคนช่วยกันค้นหาอยู่พักใหญ่...)"
1301315-29 = "[ns] \"เอ๋?\""
1301315-31 = "[ns] \"ใช่อันนี้รึเปล่า โมมิจิ?\""
1301315-32 = "คะ...?"
1301315-33 = "ชะ... ใช่แล้วค่ะ! อันนี้แหละค่ะ! ขอบคุณนะคะคุณครู!"
1301315-34 = "กำลังกังวลอยู่เลยว่าจะหาไม่เจอซะแล้ว"
1301315-35 = "ทำหนังสือหายในห้องสมุดแบบนี้ ฉันคงหมดคุณสมบัติในการเป็นบรรณารักษ์แล้วละค่ะ..."
1301315-36 = "คะ? สภาพเหมือนเพิ่งพิมพ์เมื่อวานเลยงั้นเหรอคะ? พลาสติกห่อหนังสือก็ยังอยู่เลย?"
1301315-37 = "แหะๆ ดีใจจังที่คุณครูพูดแบบนั้นนะคะ ฉันเก็บมันไว้อย่างดีเลยละค่ะ"
1301315-38 = "ถึงยังไง... มันก็เป็นคอลเลกชันที่ฉันหวงแหนที่สุดนี่คะ!"
1301315-40 = "(ระหว่างที่ชมโมมิจิอยู่ คุณครูก็ลองหาข้อมูลเพิ่มเติมในอินเทอร์เน็ต)"
1301315-41 = "(และแล้ว...!)"
1301315-43 = "[ns1] \"เอ๋?!?!\"\n[ns2] \"โมมิจิ? ดูนี่สิ!\""
1301315-46 = "มีอะไรเหรอคะ คุณครู?"
1301315-47 = "คะ? บังเอิญไปเจอราคารับซื้อคอลเลกชันชุดนี้ในอินเทอร์เน็ตเหรอคะ? ไหนขอดูหน่อยสิคะ..."
1301315-48 = "..."
1301315-49 = "?!?!?!?!"
1301315-50 = "คะ... คุณครู? คุณครูคะ...? ตัวเลขที่ฉันเห็นมันถูกแล้วใช่มั้ยคะ? เว็บไม่ได้โดนแฮ็กหรือแสดงข้อมูล#nผิดอะไรใช่มั้ยคะ...?"
1301315-51 = "[s] \"ครูลองเช็กดูหลายครั้งแล้วนะ... ดูเหมือนจะราคานี้แหละ\""
1301315-52 = "นะ... แน่นอนว่าพวกคอลเลกชันลิมิเต็ดมักจะซื้อขายกันในราคาที่สูงมาก..."
1301315-53 = "แต่ยังไงราคานี้มันก็...!"
1301315-58 = "(ฉันอาจไม่ต้องของบซื้อหนังสือใหม่ แล้วซื้อเป็นของตัวเองได้เลย)"
1301315-59 = "(และเปลี่ยนเครื่องทำน้ำอุ่นเก่าที่ใช้งานไม่ค่อยได้อีกด้วย)"
1301315-60 = "(ถ้าเจรจากับทางชมรมผู้รับจ้างดีๆ อาจสร้างอาคารย่อยอีกหลังเลยก็ได้)"
1301315-61 = "(แล้วก็อาจซื้อพุดดิ้งได้...)"
1301315-62 = "(สิ่งที่น่ากลัวที่สุดก็คือถึงจะทำทุกอย่างที่คิดเอาไว้แล้ว... แต่ฉันก็จะยังมีเงินเหลืออยู่อีกนะ...!)"
1301315-63 = "[ns] \"โมมิจิ?\""
1301315-64 = "คะ... คะ?!"
1301315-65 = "ฉะ... ฉันเป็นอะไรไปรึเปล่าน่ะเหรอคะ? จู่ๆ ถึงได้นิ่งไปแบบนั้น...?"
1301315-66 = "..."
1301315-67 = "......"
1301315-68 = ".........!!!"
1301315-69 = "ตะ... แต่ยังไงแบบนี้ก็ไม่ได้เด็ดขาดค่ะ!!"
1301315-71 = "[ns] \"อย่างนี้นี่เอง...\""
1301315-72 = "ค่ะ..."
1301315-73 = "นี่เป็นคอลเลกชันชุดแรกที่ฉันตั้งใจรวบรวมเงินเพื่อซื้อมันมาค่ะ"
1301315-74 = "ถึงตอนนั้นมันจะไม่ได้ราคาแพงมากมายอะไรขนาดนี้ก็ตาม"
1301315-75 = "แต่สำหรับฉัน มันก็เป็นของที่ไม่ได้หาซื้อมาได้ง่ายๆ เลย"
1301315-76 = "และมันยังถือเป็นการตัดสินใจครั้งใหญ่ของฉันด้วยค่ะ"
1301315-77 = "มันเป็นเครื่องพิสูจน์อย่างแรกในฐานะนักสะสม... และเป็นความภาคภูมิใจของฉันค่ะ"
1301315-78 = "ยิ่งกว่านั้น... ยังเป็นเครื่องพิสูจน์ว่าสำหรับบรรณารักษ์แล้ว มันไม่ใช่ว่าทุกอย่างในโลกที่จะตีค่าเป็น#nมูลค่าทางวัตถุได้"
1301315-79 = "ถ้ายังมีบรรณารักษ์แบบนั้นอยู่สักคนในโลกนี้... น่าจะดีกว่าใช่มั้ยล่ะคะ?"
1301315-80 = "[s3] \"อื้อ ครูก็คิดแบบนั้นนะ\"\n[s4] \"ครูคิดว่ามันขึ้นอยู่กับแต่ละกรณีนะ...\""
1301315-83 = "แหะๆ ขอบคุณที่คิดแบบนั้นนะคะ คุณครู"
1301315-84 = "..."
1301315-85 = "......"
1301315-86 = "ค่ะ... คะ?!~ ทำไมถึงทำหน้าแบบนั้นอีกงั้นเหรอคะ...?"
1301315-87 = "ฮึก..."
1301315-88 = "คุณครู... ฉันคงเป็นพวกนักสะสมโลภมากจริงๆ แล้วละค่ะ..."
1301315-89 = "ทั้งๆ ที่ตั้งใจแน่วแน่ แล้วก็ตัดสินใจแล้วแท้ๆ แต่ความคิดพวกนั้นก็ยังวนเวียนอยู่ในหัวไม่หายไปเลย#nละค่ะ..."
1301315-90 = "ถ้ามีเงินพวกนั้นละก็... จะซื้อพุดดิ้งได้กี่ถ้วยกันนะคะ..."
1301315-91 = "[s5] \"เดี๋ยวครูซื้อพุดดิ้งให้เอง!\"\n[s6] \"อยากกินกี่ถ้วย บอกมาเลย ครูจะซื้อให้เอง!\""
1301315-94 = "จะ... จริงเหรอคะ?!"
1301315-95 = "ขอบคุณค่ะคุณครู! คุณครูยอดเยี่ยมที่สุดเลยค่ะ!!!"
1301315-97 = "(หลังจากนั้นคุณครูก็ใช้เวลากินของว่างกับโมมิจิอย่างเพลิดเพลิน)"

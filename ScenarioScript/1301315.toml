[translation]
1301315-1 = "關於那些無人記得的事物"
1301315-2 = "（前往了赤冬的圖書館）"
1301315-4 = "你，你真的來啦，老師！？"
1301315-5 = "連這種小事也麻煩老師幫忙，總覺得有點……"
1301315-6 = "有時候小事反而更重要？#n可，可是……嗚嗚……"
1301315-7 = "[s] 總之先行動再說！"
1301315-8 = "老，老師！？#n我，我明白了。謝，謝謝老師……"
1301315-9 = "嗯？問我要找的是什麼？"
1301315-10 = "……"
1301315-11 = "……！"
1301315-12 = "那，那那那那，那個，就是……！"
1301315-13 = "是Rurieru老師出道作的復刻限定版收藏……"
1301315-14 = "[s]「聽起來一點都不是小事啊！」"
1301315-15 = "是，是這樣沒錯，不過這種東西通常只對粉絲有特別的意義吧……？"
1301315-16 = "在不是粉絲的普通人眼裡，只不過是成套的漫畫書而已……"
1301315-17 = "咦？對我來說是無可取代的寶物？"
1301315-18 = "……！"
1301315-19 = "謝謝你，老師。#n聽見老師這麼說，我真的很高興……"
1301315-20 = "嗯！那我們一起來找找吧！"
1301315-22 = "（為了尋找紅葉的『收藏』，從圖書館的角落開始找起……）"
1301315-27 = "（就這樣到處找了一段時間……）"
1301315-29 = "[ns]「咦？」"
1301315-31 = "[ns]「紅葉？是這個嗎？」"
1301315-32 = "咦……？"
1301315-33 = "沒，沒錯，就是這個！謝謝老師！"
1301315-34 = "我還以為永遠找不到了，真的很擔心。"
1301315-35 = "要是在書堆裡把書弄丟，我恐怕就沒資格繼續擔任圖書管理員了……"
1301315-36 = "咦？書的狀態……好到像是昨天才出刊一樣？就連塑膠封膜也很完整？"
1301315-37 = "耶嘿嘿，謝謝老師。#n我在收藏方面花了很多心思。"
1301315-38 = "畢竟……這是我最珍惜的收藏品！"
1301315-40 = "（一面拚命誇獎紅葉，一面在網路上搜尋了一下）"
1301315-41 = "（結果……！）"
1301315-43 = "[ns1]「咦！？！？」\n[ns2]「紅葉你看這裡！」"
1301315-46 = "怎麼了，老師？"
1301315-47 = "咦？碰巧找到了這個限定版收藏的網拍價格？#n我看看……"
1301315-48 = "……"
1301315-49 = "！？！？！？！？"
1301315-50 = "老，老師……？我現在看到的數字是真的嗎？#n這個天文數字，不是因為網頁被駭客攻擊或發生錯誤才顯示的吧……？"
1301315-51 = "[s]「我也確認了好幾次……好像真的是這個價格沒錯……」"
1301315-52 = "雖，雖然限量收藏品的價格高到超乎想像的情況並不少見，#n更別說這還是初回限定版……"
1301315-53 = "但是無論如何，這個……！"
1301315-58 = "（不用申請預算也可以買新書）"
1301315-59 = "（可以換掉已經不太能運作的老舊暖爐）"
1301315-60 = "（要是能跟工務部的人談攏的話，說不定還能興建別館）"
1301315-61 = "（就連布丁也……）"
1301315-62 = "（更可怕的是，就算把現在想到的事全部做一輪都可能還有剩……！）"
1301315-63 = "[ns]「紅葉？」"
1301315-64 = "是，是！？"
1301315-65 = "問，問我怎麼了？為什麼突然發呆……？"
1301315-66 = "……"
1301315-67 = "…………"
1301315-68 = "…………！！！"
1301315-69 = "我，我果然還是做不到──！！！"
1301315-71 = "[ns]「原來如此啊……」"
1301315-72 = "嗯……"
1301315-73 = "這個收藏，是我第一次靠自己省吃儉用買下來的。"
1301315-74 = "當然當年的價格，並沒有高到現在這麼誇張就是了。"
1301315-75 = "所以對我來說，無法只把它當成單純的商品來看待。"
1301315-76 = "某種程度上，它象徵著我的決心。"
1301315-77 = "是我作為收藏家的第一個象徵……也是我的驕傲。"
1301315-78 = "而且最重要的是，如果在世上的某個角落……"
1301315-79 = "有個主張不能用金錢來衡量一切的圖書館員……這樣也不錯吧？"
1301315-80 = "[s3]「嗯，我也有同感。」\n[s4]「那種想法在某些情況下是很重要的。」"
1301315-83 = "耶嘿嘿，謝謝老師願意這麼想。"
1301315-84 = "……"
1301315-85 = "…………"
1301315-86 = "咦，咦！？又怎麼了嗎……？"
1301315-87 = "嗚嗚……"
1301315-88 = "老師，我果然是個不及格的收藏家吧……"
1301315-89 = "明明已經下定決心了，為什麼那種想法還是在腦海裡揮之不去呢……"
1301315-90 = "那筆錢……能買多少布丁呢……"
1301315-91 = "[s5]「我可以買很多布丁給你！」\n[s6]「你想要多少，老師我都買給你！」"
1301315-94 = "真，真的嗎！？"
1301315-95 = "謝謝老師！果然老師最棒了！！！"
1301315-97 = "（就這樣和紅葉一起，度過了愉快的點心時間）"

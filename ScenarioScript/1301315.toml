[translation]
1301315-1 = "Things You Don't Remember"
1301315-2 = "I headed to Red Winter's library."
1301315-4 = "Oh, you're here, Sensei?"
1301315-5 = "I feel bad troubling you with something this small..."
1301315-6 = "Hmm? Small things can be important too? Well, um..."
1301315-7 = "[s] \"It's all right. Let's get to it!\""
1301315-8 = "A-Are you sure, Sensei? A-All right, thank you..."
1301315-9 = "Hm? You're asking what I'm looking for?"
1301315-10 = "..."
1301315-11 = "...!"
1301315-12 = "I-I-I-I-It's, so, I need to find...!"
1301315-13 = "My limited reprint set of Luriel's debut manga..."
1301315-14 = "[s] \"That's not small at all, is it?!\""
1301315-15 = "Well, not small to me, since I happen to be a fan, but..."
1301315-16 = "...to someone else, it's only a set of manga..."
1301315-17 = "You say that makes the treasure personal and irreplaceable?"
1301315-18 = "...!"
1301315-19 = "It's kind of you to put it that way. Thank you, Sensei."
1301315-20 = "Well, let's see if we can find it, then!"
1301315-22 = "And so, we started searching every nook and cranny in the library for Momiji's collection."
1301315-27 = "And after some time..."
1301315-29 = "[ns] \"Hm!\""
1301315-31 = "[ns] \"Momiji, is this it?\""
1301315-32 = "Hm...?"
1301315-33 = "Y-Yes! This is it! Thank you, Sensei!"
1301315-34 = "I was worried I'd never see it again."
1301315-35 = "To lose a book in midst of other books. What kind of librarian could I ever hope to be?"
1301315-36 = "Hmm? You're asking why it looks so new, still in its original wrapping and all?"
1301315-37 = "I've been very careful storing it. Thank you for asking!"
1301315-38 = "It is my favorite collection, after all!"
1301315-40 = "After praising Momiji's skill and care as a collector, I got curious and looked the collection up online."
1301315-41 = "Then, suddenly...!"
1301315-43 = "[ns1] \"Huh?!\"\n[ns2] \"Momiji, look at this!\""
1301315-46 = "What's wrong, Sensei?"
1301315-47 = "Hm? You found the collection's trading price? Let's see..."
1301315-48 = "..."
1301315-49 = "*gaaasp*"
1301315-50 = "S-Sensei? Sensei...? Are you SURE that's the right number? Maybe the page is hacked, or malfunctioning, or..."
1301315-51 = "[s] \"I checked multiple times and places. This is it.\""
1301315-52 = "W-Well, limited first editions can go for quite a bit sometimes..."
1301315-53 = "...but still, this is...!"
1301315-58 = "(I wouldn't have to ask for new books. I could buy them myself!)"
1301315-59 = "(And replace that shoddy old heater.)"
1301315-60 = "(And maybe even build an annex, if I can convince the Labor Party...)"
1301315-61 = "(Ooh, and pudding...)"
1301315-62 = "(I might even have some money left over after all that! That's... That's scary!)"
1301315-63 = "[ns] \"Momiji?\""
1301315-64 = "Y-Yes?!"
1301315-65 = "F-Forgive me, I was...lost in thought for a bit..."
1301315-66 = "..."
1301315-67 = "..."
1301315-68 = "...!!"
1301315-69 = "Wh-What am I thinking? I can't give my collectible up!"
1301315-71 = "[ns] \"I see...\""
1301315-72 = "Right..."
1301315-73 = "It's the first thing I ever saved money for."
1301315-74 = "Back when the price wasn't this absurd, of course."
1301315-75 = "So I can't treat it as a simple investment or a piece of merchandise."
1301315-76 = "It represents my determination, in a way."
1301315-77 = "And it represents my pride as a collector."
1301315-78 = "Most of all, it stands for what I believe, that some things can't be measured in material value."
1301315-79 = "That's...good to believe, isn't it?"
1301315-80 = "[s3] \"Yes, of course it is.\"\n[s4] \"Sometimes in life, it's important to hold that belief.\""
1301315-83 = "Ehehe. Thank you, Sensei. I appreciate the way you think."
1301315-84 = "..."
1301315-85 = "..."
1301315-86 = "H-Huh?! What's the trouble now?"
1301315-87 = "...Waah..."
1301315-88 = "Sensei, I think I'm a bad collector..."
1301315-89 = "I've already made the decision not to sell it, but a thought still lingers in my head..."
1301315-90 = "\"Just how much pudding could I buy with that money...?\""
1301315-91 = "[s5] \"I'll buy you lots of pudding!\"\n[s6] \"How much do you want? Hm? I've got you covered.\""
1301315-94 = "R-Really?!"
1301315-95 = "Thank you, Sensei! You're the best!!"
1301315-97 = "Afterward, Momiji and I enjoyed a fun snack time."

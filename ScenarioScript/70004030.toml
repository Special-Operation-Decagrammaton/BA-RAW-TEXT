[translation]
70004030-1 = "主なきプレゼント（３）"
70004030-3 = "はぁ……"
70004030-4 = "結局、落とし主は分からなかったなぁ……。"
70004030-5 = "このプレゼントのせいで、キヴォトスが大混乱に陥ったらどうしよう……"
70004030-7 = "……今、大混乱と聞こえましたが？"
70004030-8 = "うひゃあっ！？"
70004030-9 = "み、ミヤコさん！？いつからそこに……？"
70004030-10 = "ついさっきです。ごめんなさい、驚かせてしまって。"
70004030-11 = "それより、なにか事件でも？"
70004030-12 = "い、いえ、別に大したことでは……！"
70004030-13 = "そ、その……#nじ、実は今週発売の「爆裂・神チキン」がすっごく辛いと評判でして！"
70004030-14 = "キヴォトス中にセンセーションを巻き起こしているそうなので……#n辛さのあまり、みんなが大混乱したら大変だなぁ、なんて……。"
70004030-15 = "ああ、新商品のことでしたか。"
70004030-16 = "私はてっきり、先生が何かの標的にされたのではと。"
70004030-17 = "あはは……そんなぁ……"
70004030-18 = "と、ところで今日はどうされたんですか？#n廃棄弁当でしたら、今まとめているところで……"
70004030-19 = "いえ、今回はお弁当の件ではなく……"
70004030-20 = "こちらをソラさんに、と思いまして。"
70004030-21 = "これは？なんだか香ばしい匂いがしますが……。"
70004030-22 = "ローストターキーです。#n近所の方たちにお肉をもらって作ったのですが、量が多くて……"
70004030-23 = "日頃のお弁当のお礼にと思い、持ってきました。#nよければ食べていただけると嬉しいです。"
70004030-24 = "ええっ！？廃棄弁当の件は、むしろこっちが感謝しているくらいなのに……#nあ、ありがとうございます！"
70004030-25 = "そうだ、ミヤコさんもここで一緒に食べませんか？#nこの時間はお客さんもほとんどいませんし。"
70004030-27 = "……いえ。#n実は先生にも、お裾分けして差し上げたいと思っているので……"
70004030-28 = "この後は先生のところへ向かいます。#nせっかくお誘いいただいたのに、ごめんなさい。"
70004030-29 = "そうですか……"
70004030-31 = "……ふふ、そう言うと思った。"
70004030-35 = "まぁ先生とスイーツを食べることも、なくはないけど……"
70004030-39 = "けれどそれは、あくまで生徒と先生の関係として。"
70004030-42 = "キヴォトスの生徒のみなさんは、[USERNAME]先生が大好きなんですね。"
70004030-43 = "……はい。誰に対しても親切で、優しい方ですから。"
70004030-44 = "……でも、怪しい噂を聞くこともあります。#nスケバンとつるんでるとか、変な格好で深夜の公園を徘徊しているとか……。"
70004030-45 = "ふふっ、まさか。"
70004030-46 = "私はずっと「理由もなく親切にしてくる人には気をつけるように」#nと言われてきました。"
70004030-47 = "だから……どうしてみなさんが、#n先生を簡単に信頼できるのか分からないんです。"
70004030-51 = "それはきっと……先生が「頼りない大人」だからでしょう。"
70004030-52 = "頼りない大人、ですか？"
70004030-53 = "ええ。[USERNAME]先生は危なっかしいところもあれば、#nときどき理解不能な行動も取る。#nとても完璧とは言い難い人ですが……。"
70004030-54 = "不器用ながらも精いっぱい生徒と向き合って、まっすぐに話を聞いてくれます。"
70004030-55 = "だから先生の前では、ありのままを打ち明けることができるのだと#n私は思います。"
70004030-59 = "ミヤコさん……"
70004030-60 = "……先生に弱みでも握られていませんか？"
70004030-61 = "そ、そんなことはありません！"
70004030-62 = "それならいいんですが……#nあ、そうだ。念のため、ミヤコさんにも聞きたいのですが……"
70004030-63 = "最近、どこかに忘れ物をしませんでしたか？"
70004030-64 = "いえ……思い当たりませんね。#n失ったものはあっても、忘れたものは特に。"
70004030-65 = "……すみません、そろそろ私はいかないと。#nではソラさん、いいクリスマスを。"
70004030-69 = "……。"
70004030-70 = "[ns] \"ソラ、こんばんは。\""
70004030-71 = "ひゃあっ！？せ、先生っ！？"
70004030-72 = "[s1] \"仕事の息抜きで来たんだけど……\"\n[s2] \"そんなに驚いてどうしたの？\""
70004030-73 = "そ、そうでしたか……「エンジェル24」へようこそ！"
70004030-74 = "そ、そうでしたか……「エンジェル24」へようこそ！"
70004030-75 = "[s3] \"何か悩み事？\"\n[s4] \"深刻そうな顔をしていたけど。\""
70004030-76 = "そ、そういうわけでは……"
70004030-77 = "そ、そういうわけでは……"
70004030-81 = "……いえ。実は一つ、ありまして……"
70004030-82 = "お店で拾った、このプレゼントの落とし主が見つからず……"
70004030-83 = "[s] \"あれ。まだ開けていなかったの？\""
70004030-84 = "…………えっ？"
70004030-85 = "ということは、まさか……"
70004030-86 = "[s5] \"うん、私からのクリスマスプレゼントだよ。\"\n[s6] \"ちゃんと伝えておけばよかったね。\""
70004030-87 = "そ、そんな……突然プレゼントなんていただいても……"
70004030-88 = "そ、そんな……突然プレゼントなんていただいても……"
70004030-89 = "私は……先生にお返しできるものなんて、何も……"
70004030-90 = "……あ！そういえばお弁当の割引券があったような――"
70004030-91 = "[s] \"気にしないで。いつも助けてもらってるから。\""
70004030-92 = "えっ？"
70004030-93 = "[s7] \"ソラはいつも笑顔で迎えてくれるでしょ？\"\n[s8] \"どんな時でもコンビニが開いてることに、安心するんだ。\""
70004030-94 = "それは……別に私は、特別なことをしているわけではありません。"
70004030-95 = "それは……別に私は、特別なことをしているわけではありません。"
70004030-96 = "ただ……バイト代を稼ぐために、当たり前のことをしているだけで……"
70004030-97 = "[ns] \"「当たり前」って、意外と難しいんだよ。\""
70004030-99 = "[ns9] \"ソラが「当たり前」を頑張ってくれているから――\"\n[ns10] \"みんな安心して、「日常」を楽しめるんだ。\""
70004030-100 = "そう、ですか……"
70004030-101 = "そう、ですか……"
70004030-102 = "先生はこのなんでもない日常を、そんな風に見ていたんですね。"
70004030-103 = "プレゼントの中身は、なんでしょう……？"
70004030-107 = "……手袋？"
70004030-108 = "[s11] \"この季節は、外にいるとすぐに手が冷えちゃうから。\"\n[s12] \"これで少しは暖かくなると思って。\""
70004030-109 = "……ふふ、かわいいデザイン。"
70004030-110 = "……ふふ、かわいいデザイン。"
70004030-111 = "軽くて温かくて……サイズもピッタリです。#nまるで、あらかじめ測っておいたみたいに――"
70004030-112 = "……手のサイズ、どうして分かったんですか？"
70004030-113 = "[s13] \"先生たるもの、これくらい把握しておかないと！“\n[s14] \"おつりをもらうたび、ソラの手を見ていたからね！\""
70004030-114 = "…………やっぱり先生は、怪しい大人では？"
70004030-115 = "…………やっぱり先生は、怪しい大人では？"
70004030-119 = "けれど、プレゼントはとても嬉しいです。"
70004030-120 = "いつも私を――#n「エンジェル24」を信頼してくださって、ありがとうございます。"
70004030-125 = "これからも「エンジェル24」は先生のために24時間営業しますね！"
70004030-127 = "主なきプレゼント"

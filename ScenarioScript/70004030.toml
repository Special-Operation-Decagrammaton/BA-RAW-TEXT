70004030-59 = "2;소라;24;……미야코 씨."
70004030-60 = "2;소라;26;혹시 선생님께 수상한 요구 같은 걸 받으신 적은 없으시죠?\n#2;em;…"
70004030-61 = "4;미야코;08;다, 당연하죠!\n#4;em;[?!]\n#4;stiff"
70004030-62 = "2;소라;04;그렇다면 다행이지만…… 혹시 모르니 마지막으로 미야코 씨에게도 여쭈어볼게요."
70004030-63 = "2;소라;07;혹시 최근에 잊어버린 물건은 없으신가요?\n#2;em;[?]"
70004030-64 = "4;미야코;01;글쎄요…… 잃어버린 것이라면 모르겠지만, 잊어버린 물건은 없는 것 같네요."
70004030-65 = "4;미야코;03;이런, 너무 시간을 오래 끌었네요. #n그럼 즐거운 연말 되시길.\n#4;em;[반응]"

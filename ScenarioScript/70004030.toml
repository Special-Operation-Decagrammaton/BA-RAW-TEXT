70004030-90 = "3;소라;09;아, 혹시 괜찮으시면 직원용 도시락 할인 쿠폰이라도—"
70004030-91 = "[s] \"괜찮아. 이미 소라에게는 충분히 많은 도움을 받았으니까.\""
70004030-92 = "3;소라;17;제가 선생님께요?\n#3;em;[?]"
70004030-93 = "[s7] \"소라는 어느 때나 편의점의 카운터에서 손님을 기다리고 있잖아?\"\n[s8] \"늦은 밤에도 편의점은 열려 있다는 사실이 업무 중에 큰 위안이 되는걸.\""

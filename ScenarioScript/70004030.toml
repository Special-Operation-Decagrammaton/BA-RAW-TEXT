70004030-81 = "3;소라;24;……아니, 사실은 고민이 하나 있기는 한데요."
70004030-82 = "3;소라;20;실은 편의점에서 주운 이 선물 상자의 주인을 찾고 있었어요.\n#3;em;[땀]"
70004030-83 = "[s] \"응? 소라, 그 선물 아직도 안 열어본 거야?\""
70004030-84 = "3;소라;17;네? 제가요……?"
70004030-85 = "3;소라;18;혹시 이거, 선생님께서 준비하신 선물이었나요?\n#3;em;[반응]"
70004030-86 = "[s5] \"그러고 보니 그때 말하는 걸 깜박했네.\"\n[s6] \"응. 내가 주는 크리스마스 선물이야.\""
70004030-87 = "3;소라;19;가, 갑자기 크리스마스 선물이라니…… 저, 그동안 선생님께 드린 게 아무것도 없는데요?\n#3;stiff"

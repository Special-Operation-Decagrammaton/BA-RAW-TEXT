[translation]
70004030-1 = "ของขวัญที่ไร้เจ้าของ 3"
70004030-3 = "เฮ้อ..."
70004030-4 = "สุดท้ายก็หาเจ้าของของขวัญชิ้นนี้ไม่ได้สินะ"
70004030-5 = "ถ้าเป็นของหายธรรมดาๆ ก็คงไม่เป็นอะไรมาก แต่ถ้าของขวัญชิ้นนี้ทำให้คิโวทอสตกอยู่ในความ#nวุ่นวายครั้งใหญ่ขึ้นมาล่ะ..."
70004030-7 = "คิโวทอสจะตกอยู่ในความวุ่นวายครั้งใหญ่เหรอคะ...?"
70004030-8 = "เฮือก?!"
70004030-9 = "คะ.. คุณมิยาโกะ? มะ... มาตั้งแต่เมื่อไรคะ?"
70004030-10 = "ฉันเพิ่งมาเมื่อกี้ค่ะ... ขอโทษที่ทำให้ตกใจนะคะ"
70004030-11 = "เมื่อกี้คุณบอกว่าคิโวทอสจะตกอยู่ในความวุ่นวายครั้งใหญ่เหรอคะ คุณมีลางสังหรณ์ว่าจะมีเรื่อง#nอันตรายอะไรเกิดขึ้นเหรอคะ? "
70004030-12 = "มะ... ไม่ค่ะ! มันไม่ใช่เรื่องใหญ่อะไรขนาดนั้นหรอกค่ะ ก็แค่..."
70004030-13 = "ชะ... ใช่แล้วค่ะ! ได้ยินมาว่า <ไก่ทอดเผ็ดนรกแตก> ที่จะขายสัปดาห์นี้เป็นไก่ที่เผ็ดมากๆ เลยละค่ะ!"
70004030-14 = "ตามข้อมูลผลิตภัณฑ์แล้ว เห็นว่าความเผ็ดร้อนนี้จะกระตุ้นประสาทสัมผัสของผู้คนได้ทั่วคิโวทอสเลย#n... ฉันก็เลยกังวลว่าไก่ทอดรสเผ็ดนี้จะทำให้ผู้คนอยู่ในความวุ่นวายกันหรือเปล่า... ก็แค่นี้น่ะค่ะ"
70004030-15 = "อ๋อ เป็นเรื่องเกี่ยวกับสินค้าใหม่ของร้านสะดวกซื้อสินะคะ"
70004030-16 = "ค่อยยังชั่วหน่อยค่ะ ฉันก็กังวลว่ามีใครหวังจะเล่นงานคุณครูอีกหรือเปล่า"
70004030-17 = "แหะๆ... ไม่น่าจะมีเรื่องแบบนั้นนะคะ...?"
70004030-18 = "จะว่าไป คุณมิยาโกะมีธุระอะไรที่นี่เหรอคะ? ถ้ามาเพราะข้าวกล่องเหลือทิ้งละก็ ฉันยังจัดไม่เสร็จเลยค่ะ"
70004030-19 = "อ่า... วันนี้ฉันไม่ได้มารับข้าวกล่องเหลือทิ้งหรอกค่ะ"
70004030-20 = "นี่ค่ะ รับไปสิคะ"
70004030-21 = "หอมจัง... นี่มันอะไรเหรอคะ?"
70004030-22 = "ไก่งวงย่างค่ะ ฉันได้เป็นของขวัญมาจากชาวเมืองจากในละแวกที่อยู่น่ะค่ะ พอเอามาย่างกินก็เหมือน#nจะมีเยอะกว่าที่คิด"
70004030-23 = "ก็เลยอยากเอามาให้โซระที่พวกเราเป็นหนี้บุญคุณมาตลอดน่ะค่ะ"
70004030-24 = "มะ... ไม่หรอกค่ะ ถ้าเป็นเรื่องข้าวกล่องเหลือทิ้งละก็ ฉันต่างหากล่ะคะที่ได้รับความช่วยเหลือจาก#nพวกคุณอยู่ ขอบคุณที่มาจัดการให้นะคะ"
70004030-25 = "จริงสิ ถ้าไม่ติดอะไรละก็ คุณมิยาโกะเองก็ทานที่ร้านกับฉันก็ได้นะคะ เวลานี้ลูกค้าไม่ค่อยมีอยู่แล้ว ทานข้าวและพักผ่อนที่นี่แล้วค่อยไปก็ได้ค่ะ"
70004030-27 = "ไม่เป็นไรดีกว่าค่ะ ที่จริงแล้วฉัน... อยากเอาไก่งวงนี้ไปแบ่งให้คุณครูด้วยน่ะค่ะ"
70004030-28 = "เสร็จธุระตรงนี้แล้วก็เลยคิดว่าจะขึ้นไปหาคุณครูค่ะ ขอโทษที่ต้องปฏิเสธนะคะ"
70004030-29 = "งั้นเหรอคะ..."
70004030-31 = "ฮุฮุ... กะไว้แล้วว่าคุณครูต้องพูดแบบนั้น"
70004030-35 = "แน่นอนว่าก็มีบางครั้งที่ฉันแบ่งของหวานกินกับคุณครู"
70004030-39 = "แต่ยังไงเราสองคนก็เป็นแค่คุณครูกับนักเรียนเท่านั้น"
70004030-42 = "นักเรียนในคิโวทอสชอบคุณครู [USERNAME] กันทุกคนเลยนะคะ"
70004030-43 = "ค่ะ ก็คุณครูใจดีและอ่อนโยนกับทุกคนนี่คะ"
70004030-44 = "แต่ว่าบางครั้งก็มีข่าวลือแปลกๆ เกี่ยวกับคุณครูนะคะ ทั้งที่บอกว่าเห็นคุณครูไปคลุกคลีอยู่กับพวก#nนักเรียนเกเร หรือไม่ก็เห็นใส่ชุดแปลกๆ ไปเดินสวนสาธารณะตอนกลางคืน..."
70004030-45 = "อะฮ่าฮ่า... ไม่จริงหรอกค่ะ"
70004030-46 = "ฉันถูกสั่งสอนมาตั้งแต่เด็กว่าให้ระวังคนที่มาทำตัวดีด้วยโดยไม่หวังผลประโยชน์น่ะค่ะ"
70004030-47 = "ฉันก็เลยไม่เข้าใจว่าทำไมทุกคนถึงได้เชื่อใจคุณครูกันถึงขนาดนี้ค่ะ"
70004030-51 = "เพราะคุณครูเป็นผู้ใหญ่ที่น่าเหลือเชื่อ ก็เลยยิ่งได้รับความน่าเชื่อถือหรือเปล่าคะ...?"
70004030-52 = "ผู้ใหญ่ที่... น่าเหลือเชื่องั้นเหรอคะ?"
70004030-53 = "ถึงคุณครู [USERNAME] จะดูเหมือนเป็นภัยสังคมอยู่บ้าง หรือดูเป็นผู้ใหญ่ที่ทำในสิ่งที่ยากจะเชื่อได้ในบางครั้ง"
70004030-54 = "แต่ถึงยังไงคุณครูก็ยืนหยัดอยู่ข้างนักเรียน และพยายามรับฟังเรื่องราวของพวกเราด้วยความจริงใจ#nเสมอนี่คะ"
70004030-55 = "เพราะแบบนี้พวกเราถึงเปิดเผยข้อบกพร่องและบอกสิ่งที่อยู่ในใจกับคุณครูได้โดยไม่ต้องกดดันอะไรค่ะ"
70004030-59 = "คุณมิยาโกะ..."
70004030-60 = "ไม่เคยได้รับคำขอที่น่าสงสัยจากคุณครูใช่มั้ยคะ?"
70004030-61 = "มะ... ไม่เคยอยู่แล้วค่ะ!"
70004030-62 = "ถ้าอย่างนั้นก็ค่อยยังชั่วหน่อยค่ะ... แต่ฉันขอถามอะไรกับคุณมิยาโกะอีกข้อเป็นอย่างสุดท้ายนะคะ"
70004030-63 = "ไม่ทราบว่าหมู่นี้ทำอะไรหายบ้างหรือเปล่าคะ?"
70004030-64 = "ไม่รู้สิคะ... ถ้าทำหายฉันไม่น่าจะรู้ตัว แต่ถ้าไปลืมอะไรไว้ที่ไหนละก็ ฉันว่าไม่น่าจะมีค่ะ"
70004030-65 = "แย่ละสิ เหมือนฉันจะต้องรีบไปแล้วละค่ะ ขอให้มีช่วงเวลาที่ดีในสิ้นปีนะคะ"
70004030-69 = "..."
70004030-70 = "[ns] \"โซระ สวัสดีตอนเย็นนะ\""
70004030-71 = "วะ... ว้าย?! มะ... มาตั้งแต่เมื่อไรคะ คุณครู?!"
70004030-72 = "[s1] \"เมื่อกี้เอง ครูแวะมาซื้อเครื่องดื่มชูกำลังน่ะ\"\n[s2] \"เพิ่งมาเลย ครูแวะมาซื้อเครื่องดื่มชูกำลังน่ะ\""
70004030-73 = "งะ... งั้นเหรอคะ... เอ็นเจล 24 ยินดีต้อนรับค่ะ!"
70004030-74 = "งะ... งั้นเหรอคะ... เอ็นเจล 24 ยินดีต้อนรับค่ะ!"
70004030-75 = "[s3] \"ทำหน้าเหมือนกำลังคิดมากอยู่เลยนะ\"\n[s4] \"ดูทำหน้าเข้าสิ มีเรื่องกังวลอะไรหรือเปล่า?\""
70004030-76 = "ไม่ค่ะ ฉันไม่ได้มีเรื่องกังวลอะไรเป็นพิเศษหรอกค่ะ..."
70004030-77 = "ไม่ค่ะ ฉันไม่ได้มีเรื่องกังวลอะไรเป็นพิเศษหรอกค่ะ..."
70004030-81 = "ไม่สิ... ที่จริงฉันมีเรื่องกังวลอยู่เรื่องหนึ่งค่ะ"
70004030-82 = "จริงๆ แล้วฉันกำลังตามหาเจ้าของกล่องของขวัญที่ฉันเจอในร้านค่ะ"
70004030-83 = "[s] \"หืม? โซระยังไม่ได้เปิดของขวัญดูอีกเหรอ?\""
70004030-84 = "คะ? ฉันเหรอคะ...?"
70004030-85 = "อันนี้คือ... กล่องของขวัญของคุณครูงั้นเหรอคะ?"
70004030-86 = "[s5] \"จะว่าไป ตอนนั้นครูก็ลืมไปบอกไปเสียสนิทเลย\"\n[s6] \"อื้อ ของขวัญคริสต์มาสจากครูเอง\""
70004030-87 = "จะ... จู่ๆ ก็ให้ของขวัญฉันเหรอคะเนี่ย... แต่ที่ผ่านมาฉันไม่เคยให้อะไรคุณครูเลยนะคะ?"
70004030-88 = "จะ... จู่ๆ ก็ให้ของขวัญคริสต์มาสฉันเหรอคะเนี่ย... แต่ที่ผ่านมาฉันไม่เคยให้อะไรคุณครูเลยนะคะ?"
70004030-89 = "ฉันได้ของขวัญจากคุณครูแบบนี้ แต่ฉันก็ไม่รู้ว่าจะตอบแทนคุณครูยังไงดี..."
70004030-90 = "อ๊ะ ถ้าไม่รังเกียจ เอาคูปองลดราคาข้าวกล่องของพนักงานมั้ยคะ?"
70004030-91 = "[s] \"ไม่เป็นไร แค่นี้ครูก็ได้รับความช่วยเหลือจากโซระเยอะแล้วละ\""
70004030-92 = "ฉันน่ะเหรอคะ ช่วยเหลือคุณครู?"
70004030-93 = "[s7] \"ก็โซระยืนรอรับลูกค้าอยู่หน้าเคาน์เตอร์ร้านตลอดเลยนี่\"\n[s8] \"พอรู้ว่ามีร้านสะดวกซื้อเปิดอยู่ตอนกลางคืน ครูก็เหมือนมีเพื่อนทำงานน่ะ\""
70004030-94 = "แต่ฉันไม่ได้ทำแบบนั้นเพราะเจตนาพิเศษอะไรอื่น..."
70004030-95 = "แต่ฉันไม่ได้ทำแบบนั้นเพราะเจตนาพิเศษอะไรอื่น..."
70004030-96 = "ฉันแค่ทำตามหน้าที่ของพนักงานพาร์ทไทม์เพราะต้องหาเงินเท่านั้นค่ะ"
70004030-97 = "[ns] \"การทำแบบนี้ก็ไม่ใช่เรื่องง่ายอย่างที่คิดหรอกนะ\""
70004030-99 = "[ns9] \"ทุกคนต้องทำหน้าที่ของตัวเองให้ดี สังคมจะได้น่าอยู่ไง\"\n[ns10] \"ทุกคนต้องทำหน้าที่ของตัวเองให้ดี คิโวทอสจะได้น่าอยู่ไง\""
70004030-100 = "งั้นเหรอคะ...?"
70004030-101 = "งั้นเหรอคะ...?"
70004030-102 = "ฉันแค่ทำสิ่งที่ต้องทำแค่นั้นเอง แต่คุณครูมองไกลถึงขนาดนั้นเลยนะคะ"
70004030-103 = "ว่าแต่... ของขวัญที่ให้ฉันมาคืออะไรเหรอคะ?"
70004030-107 = "ถุงมือเหรอคะ...?"
70004030-108 = "[s11] \"อื้อ ถ้าออกไปจัดอะไรหน้าร้านในฤดูหนาว ก็คงเย็นมือแย่เลย\"\n[s12] \"ถ้าใส่ถุงมือ ก็น่าจะอบอุ่นและปลอดภัยขึ้นกว่าเดิมน่ะ\""
70004030-109 = "ฮุฮุ... ถุงมือลายน่ารักจังเลยค่ะ"
70004030-110 = "ฮุฮุ... ถุงมือลายน่ารักจังเลยค่ะ"
70004030-111 = "ทั้งเบาและอบอุ่นอย่างที่คุณครูว่าเลย ตอนออกไปทำงานกลางแจ้งคงช่วยฉันได้เยอะเลยค่ะ ขนาดก็พอดีกับมือฉันเลยด้วย..."
70004030-112 = "ว่าแต่... คุณครูเดาขนาดมือของฉันได้ยังไงเหรอคะ?"
70004030-113 = "[s13] \"ครูรู้ขนาดมือของโซระอยู่แล้วน่า\"\n[s14] \"ครูแอบสังเกตมือของโซระตอนรับเงินทอนน่ะ\""
70004030-114 = "เป็นผู้ใหญ่ที่น่าสงสัยจริงด้วย..."
70004030-115 = "เป็นผู้ใหญ่ที่น่าสงสัยจริงด้วย..."
70004030-119 = "แต่นั่นก็ทำให้ฉันได้ของขวัญที่น่าประทับใจจากคุณครูเลยนะคะ"
70004030-120 = "ขอบคุณที่วางใจในตัวฉัน ไม่สิ ขอบคุณที่วางใจใน <เอ็นเจล 24> เสมอมานะคะ"
70004030-125 = "<เอ็นเจล 24> ของเราเปิดตลอด 24 ชั่วโมงเพื่อคุณครูเลยละค่ะ!"
70004030-127 = "ของขวัญที่ไร้เจ้าของ"

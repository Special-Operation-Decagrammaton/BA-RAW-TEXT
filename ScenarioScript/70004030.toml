70004030-71 = "3;소라;18;우, 우왓?! 어, 언제 오셨나요. 선생님?!\n#3;stiff\n#3;em;[?!]"
70004030-72 = "[s1] \"……방금?\"\n[s2] \"집중이 잘 안돼서 에너지 드링크라도 사 마시러 왔어.\""

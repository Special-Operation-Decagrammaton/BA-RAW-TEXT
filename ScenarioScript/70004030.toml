[translation]
70004030-1 = "無主的禮物（３）"
70004030-3 = "唉……"
70004030-4 = "結果還是沒有找到這個禮物的主人。"
70004030-5 = "如果只是單純的遺失物倒還好，只希望這個禮物不會讓奇普托斯發生大騷動……"
70004030-7 = "……奇普托斯發生大騷動？"
70004030-8 = "唔哇啊！？"
70004030-9 = "都，都子同學？#n你，你是什麼時候來的？"
70004030-10 = "我是剛剛才來的……如果嚇到你的話，我向你道歉。"
70004030-11 = "話說奇普托斯發生大騷動指的是……？#n難道你發現了什麼危險事件的徵兆嗎？"
70004030-12 = "沒，沒有！不是那麼嚴重的事情……"
70004030-13 = "其，其實我是在說本週新發售的「爆裂神雞」！#n聽說這款炸雞非常辣哦！"
70004030-14 = "從商品情報來看，這款雞肉的辣度足以在奇普托斯全境造成轟動……#n所以我才會想說「要是因此引發騷動就糟了～」……"
70004030-15 = "啊，原來你指的是超商的新產品啊。"
70004030-16 = "那就好，我本來還擔心是不是有人盯上了老師呢。"
70004030-17 = "哈哈……應該不會有那種事吧……？"
70004030-18 = "對了，都子同學今天來有什麼事嗎？#n如果是來收廢棄便當的話，我還沒整理好……"
70004030-19 = "啊……我今天不是來處理廢棄商品的。"
70004030-20 = "來，這個給你。"
70004030-21 = "哇，味道好香哦……這是什麼？"
70004030-22 = "這是烤火雞。#n因為附近的居民送了我們火雞，結果烤完之後才發現量比想像中還多。"
70004030-23 = "所以我想分給總是照顧著我們的空同學。"
70004030-24 = "你，你太客氣了。#n要說廢棄便當的事情的話，受到幫助的人反而是我才對……謝謝你總是幫我處理。"
70004030-25 = "對了，如果不介意的話，都子同學要不要一起在店裡吃完再走？#n這個時段幾乎不會有客人，可以好好休息哦。"
70004030-27 = "沒關係。因為……我其實也想分一點火雞給老師。"
70004030-28 = "所以之後我打算先去一趟老師那邊。#n難得你好意邀請，真是不好意思。"
70004030-29 = "這樣啊……"
70004030-31 = "……呵呵，就知道老師會這麼說。"
70004030-35 = "把甜點分給老師吃的情況……也不能說沒有啦。"
70004030-39 = "但我們終究是學生與老師的關係。"
70004030-42 = "奇普托斯的學生們，真的都很喜歡[USERNAME]老師呢。"
70004030-43 = "是啊，畢竟老師對大家都很親切和藹。"
70004030-44 = "不過偶爾也會有奇怪的傳聞對吧？#n比如看見老師和不良學生在一起，或者深夜穿著奇怪的服裝在公園遊蕩之類的……"
70004030-45 = "啊哈哈，那怎麼可能呢。"
70004030-46 = "而且我從小就聽人家說過，要跟無故釋出善意的人保持距離……"
70004030-47 = "所以我有點難理解……大家為什麼那麼相信老師。"
70004030-51 = "……或許正因為老師是個不可靠的大人，所以反而值得信賴吧。"
70004030-52 = "因為是……不可靠的大人？"
70004030-53 = "也許[USERNAME]老師看起來確實有種危險的感覺，#n有時候還會做出令人無法理解的事，簡直是典型的那種不可靠的大人……"
70004030-54 = "但即便如此，老師他依然和學生們站在同一陣線，全心全意地傾聽著我們的心聲。"
70004030-55 = "所以我們才能在老師面前展現真實的自己，向他傾訴心裡的想法吧。"
70004030-59 = "……都子同學。"
70004030-60 = "老師應該沒對你提出過奇怪的要求吧？"
70004030-61 = "當，當然沒有！"
70004030-62 = "那就好……為了以防萬一，我最後有個問題想請教都子同學。"
70004030-63 = "你最近有遺失什麼東西嗎？"
70004030-64 = "這個嘛……有沒有遺失物我不太確定，但應該沒有忘記東西才對。"
70004030-65 = "哎呀，我差不多該告辭了。#n祝你年末愉快。"
70004030-69 = "…………"
70004030-70 = "[ns]「空，你好呀。」"
70004030-71 = "哇，哇啊！？你，你什麼時候來的？老師！？"
70004030-72 = "[s1]「……我才剛進來而已，怎麼了嗎？」\n[s2]「因為沒辦法專注，所以來買個能量飲料喝。」"
70004030-73 = "原，原來是這樣啊……歡迎光臨天使24！"
70004030-74 = "原，原來是這樣啊……歡迎光臨天使24！"
70004030-75 = "[s3]「你看起來好像心事重重的樣子。」\n[s4]「有什麼煩惱嗎？」"
70004030-76 = "我，我其實也沒什麼……"
70004030-77 = "我，我其實也沒什麼……"
70004030-81 = "……不，我確實有個煩惱。"
70004030-82 = "不久前我在店裡撿到了這個禮物盒，所以一直在找它的主人。"
70004030-83 = "[s]「嗯？空，你還沒打開那個禮物嗎？」"
70004030-84 = "咦？我嗎……？"
70004030-85 = "難道這是老師準備的禮物？"
70004030-86 = "[s5]「啊，我那時候忘記告訴你了。」\n[s6]「沒錯，那是我送你的聖誕禮物。」"
70004030-87 = "為，為什麼這麼突然……我明明從來沒有送過老師禮物……？"
70004030-88 = "為，為什麼這麼突然……我明明從來沒有送過老師禮物……？"
70004030-89 = "而且我一時也沒辦法回報老師……"
70004030-90 = "啊，如果不介意的話，請收下職員專用的便當優惠券──"
70004030-91 = "[s]「沒關係。空已經給我非常多幫助了。」"
70004030-92 = "我有幫過老師什麼忙嗎？"
70004030-93 = "[s7]「空總是會在收銀台迎接客人，不是嗎？」\n[s8]「能在深夜看見營業中的便利商店，對還在工作的人是很大的安慰。」"
70004030-94 = "可是那並不是我出於好意特別做的……"
70004030-95 = "可是那並不是我出於好意特別做的……"
70004030-96 = "我只是為了賺打工的薪水，所以遵守著自己的本分而已。"
70004030-97 = "[ns]「遵守本分可沒有想像中那麼容易哦。」"
70004030-99 = "[ns9]「就是因為相信彼此都會在自己的崗位上全力以赴──」\n[ns10]「大家才能放心地享受日常。」"
70004030-100 = "……是嗎。"
70004030-101 = "……是嗎。"
70004030-102 = "原來老師是這麼看待這平凡的日常的啊。"
70004030-103 = "話說回來，禮物盒裡面裝的是什麼呢？"
70004030-107 = "……手套？"
70004030-108 = "[s11]「嗯。冬天很冷的時候如果在外面工作，手總是會很冰對吧？」\n[s12]「戴著手套的話，應該會更暖和更安全一點。」"
70004030-109 = "呵呵……這副手套的設計真可愛。"
70004030-110 = "呵呵……這對手套的設計真可愛。"
70004030-111 = "而且就像老師說的一樣既輕巧又溫暖，在外面工作的時候應該會很有幫助。#n大小也剛好適合──"
70004030-112 = "……不過老師，你怎麼會知道我手的大小呢？"
70004030-113 = "[s13]「空的尺寸我當然瞭若指掌。」\n[s14]「因為我每次找零錢的時候都在看空的手呀！」"
70004030-114 = "果然是可疑的大人……"
70004030-115 = "果然是可疑的大人……"
70004030-119 = "不過這次多虧了老師，我才能收到這麼棒的禮物。"
70004030-120 = "謝謝你總是信任著我──不，謝謝你總是信任著「天使24」。"
70004030-125 = "我們「天使24」會24小時為老師服務的！"
70004030-127 = "無主的禮物"

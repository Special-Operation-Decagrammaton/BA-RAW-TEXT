[translation]
70004030-1 = "#title;주인 잃은 선물 3"
70004030-2 = "#wait;1500\n3;소라;25\n#3;a\n#3;h"
70004030-3 = "3;소라;20;하아아……\n#3;em;[한숨]"
70004030-4 = "3;소라;17;결국 이 선물의 주인은 끝까지 밝혀내지 못했네."
70004030-5 = "3;소라;05;단순한 분실물이라면 상관없겠지만, 이 선물 때문에 키보토스에 대혼란이 일어나지 않았으면 좋겠는데……"
70004030-6 = "4;미야코;00\n3;소라;05\n#4;black"
70004030-7 = "4;미야코;02;……키보토스에 대혼란이 일어난다고요?\n#4;em;[?]\n#4;a"
70004030-8 = "3;소라;18;으햑?!\n#3;m2\n#3;jump\n#3;em;[?!]"
70004030-9 = "3;소라;19;미, 미야코 씨? 어, 언제 오셨었나요?"
70004030-10 = "4;미야코;08;방금 왔습니다만…… 놀라게 해드렸다면 죄송합니다.\n#4;em;[땀]"
70004030-11 = "4;미야코;11;그보다 키보토스의 대혼란이라니, 뭔가 위험한 사건의 낌새라도 발견하신 건가요?"
70004030-12 = "3;소라;11;아, 아뇨! 그렇게 대단한 건 아니지만……\n#3;stiff"
70004030-13 = "3;소라;04;마, 맞아. 이번 주에 새로 발매된 <폭렬 갓 치킨>! 이 치킨이 엄청나게 맵다고 했거든요!\n#3;jump"
70004030-14 = "3;소라;27;상품 정보에 의하면 키보토스 전역에 센세이션을 일으킬 정도의 매운맛이라고 했는데…… 이 매운맛 때문에 혼란이 일어나면 큰일이겠다— 싶어서요.\n#3;em;[재잘]"
70004030-15 = "4;미야코;02;아, 편의점 신제품에 관한 이야기였군요.\n#4;em;[반응]"
70004030-16 = "4;미야코;03;다행이네요. 저는 혹시라도 누군가가 선생님을 노리고 있는 게 아닐까, 걱정했었습니다."
70004030-17 = "3;소라;04;하하…… 그런 일은, 없지 않을까요……?\n#3;em;[땀]"
70004030-18 = "3;소라;22;그보다 미야코 씨는 무슨 일로 오셨나요? 폐기 도시락이라면 아직 정리가 덜 끝났는데."
70004030-19 = "4;미야코;08;아…… 오늘은 폐기물 처리와 관련된 일로 온 건 아니고요.\n#4;em;…"
70004030-20 = "4;미야코;03;자, 이걸 받아주세요.\n#4;greeting"
70004030-21 = "3;소라;15;아, 좋은 냄새…… 이게 뭔가요?\n#3;em;[하트]"
70004030-22 = "4;미야코;03;칠면조구이에요. 근처의 주민 여러분께 칠면조를 선물 받았는데, 굽고 보니 생각보다 양이 많은 것 같아서."
70004030-23 = "4;미야코;07;늘 신세를 지고 있는 소라 양에게 나누어 드리고 싶어서요.\n#4;em;[음표]"
70004030-24 = "3;소라;07;아, 아뇨. 폐기 도시락 일이라면 오히려 제가 도움을 받고 있는걸요. 챙겨주셔서 감사해요."
70004030-25 = "3;소라;23;참. 괜찮으시면 미야코 씨도 가게에서 함께 드시고 가셔도 괜찮아요. 이 시간대는 손님도 거의 없으니, 편하게 쉬다 가세요.\n#3;em;[재잘]\n#3;m3\n#4;dr"
70004030-26 = "#all;hide"
70004030-27 = "3;미야코;09;아뇨. 사실은 그게…… 선생님께도 칠면조를 나누어 드릴까 해서.\n#3;em;[///]\n#3;closeup"
70004030-28 = "3;미야코;03;이 이후에 잠깐 선생님을 뵈러 갈까 해서요. 모처럼 권해주셨는데, 죄송합니다.\n#3;closeup"
70004030-29 = "3;소라;21;그런가요……\n#3;closeup"
70004030-30 = "#all;hide"
70004030-31 = "3;히나;03;……후후. 선생님이라면 그렇게 말할 줄 알았어.\n#3;a\n#3;closeup"
70004030-32 = "#st;[0,0];instant;1;"
70004030-33 = "#clearST"
70004030-34 = "3;히나;03\n#3;d\n#wait;1500\n#3;closeup"
70004030-35 = "3;카즈사;99;물론 선생님과 디저트를 나누어 먹는 경우도…… 없진 않지만.\n#3;a\n#3;closeup"

[translation]
70004030-1 = "Lost Gift 3"
70004030-3 = "*sigh*"
70004030-4 = "I never managed to find the gift's owner..."
70004030-5 = "If it really is just a lost item, it's fine...but I really hope this isn't the start to some terrible chaos in Kivotos."
70004030-7 = "...Terrible chaos is coming to Kivotos?"
70004030-8 = "E-Eek!"
70004030-9 = "M-Miyako? Wh-When did you get here?!"
70004030-10 = "Just now... My apologies. It wasn't my intention to sneak up on you."
70004030-11 = "Anyway, what's this about some terrible chaos? Have you detected potential threats to Kivotos' peace?"
70004030-12 = "N-No! It's nothing like that..."
70004030-13 = "U-Um, that's it! The new Explosion God Chicken! I heard it's super-spicy!"
70004030-14 = "According to the product description, its spiciness will be a sensation to all of Kivotos... So I was just thinking that I hope it doesn't cause any chaos or anything."
70004030-15 = "Oh. You were just thinking about a new product?"
70004030-16 = "What a relief. I was concerned there were enemy combatants after Sensei."
70004030-17 = "Haha... P-Probably not?"
70004030-18 = "Anyway, what are you doing here, Miyako? I haven't categorized the expired bento to be discarded yet."
70004030-19 = "Ah... That's not what I'm here for today."
70004030-20 = "Here, take this."
70004030-21 = "Ah, that smells good... What is it?"
70004030-22 = "It's roasted turkey. I got a turkey as a gift from a nearby resident, but we ended up with extra."
70004030-23 = "I wanted to share some, since you're always taking care of me, Sora."
70004030-24 = "N-Not at all. If you're giving me alternatives to bento, you're the one helping me. Thank you for thinking of me."
70004030-25 = "Ah, you know, if you have the time, would you like to eat with me here, Miyako? It's usually slow around now, so we could take our time."
70004030-27 = "Thank you for the offer, but actually...I was hoping to give Sensei some too."
70004030-28 = "So I was planning on visiting their office after this. I'm sorry to reject your kind invitation."
70004030-29 = "...Is that so?"
70004030-31 = "...Haha. I had a feeling you'd say that."
70004030-35 = "I can't say...I never shared dessert with Sensei."
70004030-39 = "But we're still teacher and student."
70004030-42 = "It seems like everyone in Kivotos really likes [USERNAME] Sensei."
70004030-43 = "Yes. Their kindness knows no bounds."
70004030-44 = "But there are so many bad rumors about them. I heard that Sensei hangs out with delinquents and even likes to wander the park in questionable outfits."
70004030-45 = "Ahaha... That doesn't sound like them."
70004030-46 = "A-And, ever since I was little, I was taught that you should be suspicious of people who show kindness without expecting anything in return."
70004030-47 = "So...that's why it's hard for me to understand why everyone believes in Sensei so wholeheartedly."
70004030-51 = "Maybe it's the opposite. Maybe we believe in Sensei because they're not a trustworthy adult at all."
70004030-52 = "Because they're...not a trustworthy adult?"
70004030-53 = "[USERNAME] Sensei is problematic and behaves in ways that are hard to understand. The epitome of an adult you shouldn't place your faith in."
70004030-54 = "But they're also always on the students' side, no matter what. They'll hear our stories without a seed of judgment or preconception."
70004030-55 = "That's why, in front of that flawed teacher, it feels like you can be yourself, faults and all. Without worry or burden, you can share what's inside your heart."
70004030-59 = "...Miyako."
70004030-60 = "Sensei's never asked you to do anything...weird, have they?"
70004030-61 = "O-Of course not!"
70004030-62 = "That's a relief... But just in case, I'll ask you too..."
70004030-63 = "Have you forgotten anything recently?"
70004030-64 = "Hm... I'm sure there could be something I lost, but I can't think of anything."
70004030-65 = "Ah, I dawdled here too long. #nHappy holidays, Sora."
70004030-69 = "..."
70004030-70 = "[ns] \"Good evening, Sora.\""
70004030-71 = "Wh-Whoa! When did you get here, Sensei?!"
70004030-72 = "[s1] \"...Just now?\"\n[s2] \"I just thought an energy drink would help me focus.\""
70004030-73 = "I-I see... Welcome to Angel 24!"
70004030-74 = "I-I see... Welcome to Angel 24!"
70004030-75 = "[s3] \"You seem to have a lot on your mind.\"\n[s4] \"Is something bothering you?\""
70004030-76 = "No, not really..."
70004030-77 = "No, not really..."
70004030-81 = "...Actually, yes. There is something."
70004030-82 = "I've been trying to find the owner of this gift someone left at the store."
70004030-83 = "[s] \"Huh? Sora, you still haven't opened it?\""
70004030-84 = "Huh? Me...?"
70004030-85 = "By chance, was this something you left here?"
70004030-86 = "[s5] \"Come to think of it, I forgot to mention it that time.\"\n[s6] \"Yes. It's my Christmas gift to you.\""
70004030-87 = "A-A Christmas gift all of a sudden...? I didn't get you anything, though..."
70004030-88 = "A-A Christmas gift all of a sudden...? I didn't get you anything, though..."
70004030-89 = "There's no way I could pay you back for a gift like this."
70004030-90 = "Ah. What about my employee discount on bentos? It's not much..."
70004030-91 = "[s] \"It's fine. You've already given me a lot, Sora.\""
70004030-92 = "I have? To you, Sensei?"
70004030-93 = "[s7] \"You're always ready to welcome customers to Angel 24.\"\n[s8] \"When I'm working late, the fact that this store is still open is my only comfort.\""
70004030-94 = "It's not like that's out of the goodness of my heart..."
70004030-95 = "It's not like that's out of the goodness of my heart..."
70004030-96 = "I'm just doing my job..."
70004030-97 = "[ns] \"'Just doing your job' is never as easy as it seems.\""
70004030-99 = "[ns9] \"That faith that someone will fulfill their responsibility...\"\n[ns10] \"...it lets people like me enjoy my day-to-day without worry.\""
70004030-100 = "...Do you think so?"
70004030-101 = "...Do you think so?"
70004030-102 = "I guess that's how an ordinary day feels to you."
70004030-103 = "Anyway, what's the gift?"
70004030-107 = "...Gloves?"
70004030-108 = "[s11] \"Your hands get cold, working during the winter, right?\"\n[s12] \"I thought the gloves would help you stay warm and safe.\""
70004030-109 = "Heehee... The design is really cute."
70004030-110 = "Heehee... The design is really cute."
70004030-111 = "They're warm, but still really light, so it'll be good for working. And they fit so perfectly, as if you measured..."
70004030-112 = "...Sensei. How did you know my hand size?"
70004030-113 = "[s13] \"I have your sizes perfectly memorized.\"\n[s14] \"When you're giving me my change, I always look at your hands!\""
70004030-114 = "As expected of a suspicious adult..."
70004030-115 = "As expected of a suspicious adult..."
70004030-119 = "Anyways, I got a really great gift this year, thanks to you."
70004030-120 = "Thanks for believing in me, I mean, Angel 24."
70004030-125 = "Angel 24 will always be open 24/7 for you, Sensei!"
70004030-127 = "Lost Gift"

70004030-40 = "2;소라;01\n4;미야코;01\n#4;a\n#2;a\n#2;h\n#4;h\n#3;hide"
70004030-41 = "2;소라;99\n4;미야코;01\n#2;h\n#4;h\n#2;em;[...]\n#wait;2500"
70004030-42 = "2;소라;99;키보토스의 학생들은 모두 [USERNAME] 선생님을 정말 좋아하는 것 같네요."
70004030-43 = "4;미야코;03;네. 모두에게나 친절하고 상냥한 분이시니까요.\n#4;em;[반응]"
70004030-44 = "2;소라;25;하지만 가끔 이상한 소문이 돌기도 하는걸요. 선생님이 불량한 학생들과 어울리는 모습을 보았다던가, 늦은 밤에 수상한 차림으로 공원을 돌아다니고 있었다던가……\n#2;em;[땀]"
70004030-45 = "4;미야코;07;아하하, 설마요."
70004030-46 = "2;소라;17;게다가 어릴 적부터 대가 없이 친절을 베푸는 사람은 피하라고 들었었는데."
70004030-47 = "2;소라;26;다들 어떻게 그렇게 선생님을 신뢰할 수 있는지, 저는 이해하기가 조금 어려워요.\n#2;em;[속상함]"
70004030-48 = "#st;[0,0];instant;1;"
70004030-49 = "#clearST"
70004030-50 = "2;소라;26\n4;미야코;99\n#2;h\n#4;h\n#4;em;[...]\n#wait;2200"
70004030-51 = "4;미야코;03;……믿을 수 없는 어른이기에 오히려 신뢰할 수 있는 게 아닐까요."
70004030-52 = "2;소라;22;믿을 수 없는…… 어른이라서요?\n#2;em;[?]"
70004030-53 = "2;소라;22\n4;미야코;99;[USERNAME] 선생님은 어딘가 위태로워 보이고, 가끔 이해할 수 없는 행동을 하는, 못 미더운 어른의 전형 같은 사람이지만.\n#4;m3\n#2;d\n#4;em;…"
70004030-54 = "4;미야코;03;그럼에도 언제나 학생의 편에 서서 올곧은 자세로 저희의 이야기를 경청해 주려 하시니까요."
70004030-55 = "4;미야코;03;그렇기에 선생님의 앞에서는 부담 없이 허물을 드러내고 속내를 나눌 수 있는 것 같아요.\n#4;em;[음표]"

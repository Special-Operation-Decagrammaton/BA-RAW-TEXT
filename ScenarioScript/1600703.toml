1600703-53 = "5;토모에;01;선생님께서 편안히 주무실 수 있도록 특별히 준비한 낮잠 세트입니다.\n#5;greeting\n#5;em;[반짝]\n#5;a"
1600703-54 = "5;토모에;99;허리에 무리가 가지 않는 최고급 침구와 무게가 거의 느껴지지 않는 순면 잠옷, 숙면에 좋은 허브티, 듣고만 있어도 잠이 솔솔 오는 클래식 음악 등을 준비했습니다."
1600703-55 = "5;토모에;01;이곳이 붉은겨울 사무국이었다면 좀 더 좋은 낮잠 세트를 준비할 수 있었을 텐데…… 갑자기 준비를 하려 하다 보니 여러모로 부족한 점이 많네요."
1600703-56 = "5;토모에;03;자, 선생님. 이 잠옷으로 갈아입으시고 바로 침대에 누워 주세요.\n#5;em;[음표]\n#5;m3"
1600703-57 = "[s5] \"낮잠에 이렇게까지 공을 들여야 해?\"\n[s6] \"부담스러워서 잠이 더 안 올 것 같아…….\""
1600703-58 = "5;토모에;06;이상하네요. 체리노 회장님께서는 오히려 이 정도의 낮잠 환경이 갖춰지지 않으면 주무시려 하지 않는데…….\n#5;em;…"
1600703-59 = "5;토모에;06;이상하네요. 체리노 회장님께서는 오히려 이 정도의 낮잠 환경이 갖춰지지 않으면 주무시려 하지 않는데…….\n#5;em;…"
1600703-60 = "5;토모에;01;그래도 일단 한번 누워보시면 생각이 달라지실지도 몰라요.\n#5;em;[반짝]"
1600703-61 = "5;토모에;05;자. 이러는 시간에도 귀중한 낮잠 시간이 지나가고 있으니, 어서 침대에 누우세요."

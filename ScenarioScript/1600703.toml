[translation]
1600703-1 = "斷斷續續的休息"
1600703-2 = "夏萊．辦公室"
1600703-5 = "早安，老師。"
1600703-6 = "前幾天在MomoTalk上說的事已經解決了，只要在報告之前拿到的話。"
1600703-7 = "就完全……"
1600703-9 = "[s1] 「啊，這是那個報告書。」\n[s2] 「遲交了，抱歉哦。」"
1600703-10 = "啊啦，居然有這麼多的量……"
1600703-11 = "啊啦，居然有這麼多的量……"
1600703-12 = "不好意思，結果反而催促了老師呢。不過，謝謝您。"
1600703-13 = "該說不愧是大人嗎……老師是，很有責任感的人呢。"
1600703-14 = "[s3] 「原本就是，我的失誤呀……」\n[s4] 「不能勞煩智惠的手……」"
1600703-15 = "呵呵，多虧了您，省下了不少麻煩。謝謝您，老師。"
1600703-16 = "呵呵，多虧了您，省下了不少麻煩。謝謝您，老師。"
1600703-17 = "話說老師，臉色不太好……還好嗎？眼下有黑眼圈……"
1600703-18 = "該不會為了這個報告書，熬夜了……？"
1600703-19 = "[s] 「稍微一點呢。」"
1600703-20 = "明明告知了不要勉強……"
1600703-21 = "果然變成了催促的形式，非常抱歉。"
1600703-22 = "總之，現在稍微午睡一下，如何？"
1600703-23 = "[s] 「在工作中午睡，該說有點過意不去嗎……」"
1600703-24 = "不，休息也是貨真價實工作的一環。"
1600703-25 = "也有研究結果指出，比起在疲勞的狀態下進行業務，不如午睡讓腦袋清醒，反而更有效率呢。"
1600703-26 = "雖然老師也許知道，潔莉諾會長在午餐之後也總是會午睡。"
1600703-27 = "如果可以的話，為了讓老師可以舒適地午睡，這之後可以稍微準備一下嗎？"
1600703-28 = "[s] 「那就，拜託妳吧……」"
1600703-29 = "好的，那麼請稍等一下。"
1600703-45 = "老師，讓您久等了。"
1600703-46 = "（跟在智惠身後）"
1600703-50 = "夏萊．居住區"
1600703-51 = "[ns] 「這是……？」"
1600703-53 = "這是為了讓老師舒服地休息，特別準備的午睡套組。"
1600703-54 = "不會對腰造成負擔的最高級寢具；幾乎感覺不到重量的特別材質睡衣；對睡眠有效果的香草茶；光聽就想睡的古典音樂等等……"
1600703-55 = "如果這裡是赤冬的話，就可以準備更好的東西了……今後，必須檢討夏萊的各種常備東西也說不定。"
1600703-56 = "那麼，老師。請立刻換衣服躺下。"
1600703-57 = "[s5] 「我認為這已經是十分厲害的套組了……」\n[s6] 「可以感覺到絕對要讓人睡著的強烈意志……」"
1600703-58 = "啊啦，是那樣嗎？倒不如說，如果不把環境至少準備成這樣的話，潔莉諾會長就會沒辦法休息……"
1600703-59 = "啊啦，是那樣嗎？倒不如說，如果不把環境至少準備成這樣的話，潔莉諾會長就會沒辦法休息……"
1600703-60 = "先不說這個……來，請吧？"
1600703-61 = "說話的當下時間也正在流逝中……機會難得，得讓您好好的休息。"
1600703-63 = "（讓智惠幫忙穿上睡衣，喝了香草茶之後，躺在了寢具上）"
1600703-65 = "那麼，把燈關掉囉。"
1600703-68 = "進～入夢鄉　安靜地睡～　安靜地睡吧～♪"
1600703-69 = "[s] 「竟然是搖籃曲！」"
1600703-70 = "啊，一不小心……因為潔莉諾會長有時候會發牢騷說「沒有搖籃曲就睡不著」……"
1600703-71 = "那個……別的曲子比較好嗎？"
1600703-72 = "[s] 「不用，沒關係。謝謝妳。」"
1600703-73 = "呵呵，那就繼續囉。"
1600703-74 = "老師是好孩子　快快睡吧～♪"
1600703-76 = "（不知道是不是多虧了午睡套組，即使智惠散發出了異樣的壓力，還是馬上入睡了……）"
1600703-77 = "（多虧了智惠，那天享受了最棒的午睡……）"

1600703-68 = "2;토모에;99;자장, 자장~ 잘도 잔다, 우리 선생님~ ♪\n#2;closeup"
1600703-69 = "[s] \"자장가도 불러주는 거야?!\""
1600703-70 = "2;토모에;01;네. 체리노 회장님께서는 자장가를 불러주지 않으면 잠이 안 온다고 잠투정을 부리곤 하시거든요.\n#2;closeup\n#2;greeting\n#2;em;[///]"
1600703-71 = "2;토모에;01;그게 아니라면…… 혹시 다른 곡을 불러드릴까요?\n#2;closeup"

[translation]
1600703-1 = "วันพักผ่อนหรรษาของคนทำงาน"
1600703-2 = "สำนักงานชาเล่ต์"
1600703-5 = "สวัสดียามเช้าค่ะคุณครู"
1600703-6 = "เรื่องรายงานที่ฉันแจ้งมาเมื่อวานทาง MOMOTALK ฉันเลื่อนกำหนดการออกไปแล้วนะคะ"
1600703-7 = "ถ้าคุณครูส่งมาให้ภายในสัปดาห์หน้า เดี๋ยวฉันจะ..."
1600703-9 = "[s1] \"เอ้า ได้แล้วล่ะ\"\n[s2] \"ครูเตรียมไว้ตั้งแต่เมื่อวานเย็นแล้วล่ะ\""
1600703-10 = "ตายจริง รายงานจำนวนมากขนาดนี้ คุณครูเขียนเสร็จทั้งหมดภายในวันเดียวเลยเหรอคะ?"
1600703-11 = "ตายจริง รายงานจำนวนมากขนาดนี้ คุณครูเขียนเสร็จทั้งหมดภายในวันเดียวเลยเหรอคะ?"
1600703-12 = "ฉันอุตส่าห์บอกว่าไม่ต้องรีบจนฝืนตัวเองเกินไปแล้วแท้ๆ..."
1600703-13 = "คุณครูเป็นผู้ใหญ่ที่มีความรับผิดชอบสูงจริงๆ#nเลยนะคะ"
1600703-14 = "[s3] \"ครูผิดเองที่ทำให้เกิดเรื่องวุ่นนี่นา\"\n[s4] \"ครูลืมสนิทจริงๆ ต้องขอบคุณโทโมเอะเลยนะ\""
1600703-15 = "ฮุฮุ ฉันต้องขอบคุณคุณครูด้วยค่ะที่ช่วยทำให้งานของฉันลดลง... ขอบคุณนะคะคุณครู"
1600703-16 = "ฮุฮุ ฉันต้องขอบคุณคุณครูด้วยค่ะที่ช่วยทำให้งานของฉันลดลง... ขอบคุณนะคะคุณครู"
1600703-17 = "แต่ว่าคุณครูคะ... ตาคล้ำๆ แถมดูเพลียมากอีกด้วย..."
1600703-18 = "หรือว่าคุณครูอยู่ทำรายงานทั้งคืนเลยเหรอคะ?"
1600703-19 = "[s] \"เมื่อวานครูมัวแต่เขียนรายงานจนนอนดึกน่ะ...\""
1600703-20 = "ฉันบอกไม่ให้หักโหมเพราะกลัวคุณครูจะเหนื่อยแบบนี้..."
1600703-21 = "ฉันมีส่วนที่ทำให้คุณครูหักโหมแบบนี้... ขอโทษด้วยนะคะ"
1600703-22 = "ถ้างั้นตอนนี้มานอนกลางวันเพื่อชดเชยเวลานอนที่หายไปดีกว่านะคะ"
1600703-23 = "[s] \"แต่ว่าถ้านอนกลางวันในเวลางาน...\""
1600703-24 = "ไม่เป็นไรหรอกค่ะ การพักงีบก็เป็นส่วนหนึ่งของการทำงานนะคะ"
1600703-25 = "จากการศึกษาพบว่าการทำงานหลังจากพักงีบจะมีประสิทธิภาพมากกว่าการทำงานในตอน#nที่เหนื่อยค่ะ"
1600703-26 = "ท่านประธานเชริโน่เอง หลังจากทานมื้อเที่ยงแล้วก็จะพักงีบเพื่อเพิ่มประสิทธิภาพในการทำงาน#nเช่นกันค่ะ"
1600703-27 = "ถ้าคุณครูไม่ว่าอะไร ฉันจะไปที่ห้องพักแล้วเตรียมที่นอนไว้ให้ คุณครูจะได้พักผ่อนดีไหมคะ?"
1600703-28 = "[s] \"งั้นฝากด้วยนะ\""
1600703-29 = "ค่ะ ถ้างั้นรบกวนรอสักครู่นะคะ"
1600703-45 = "คุณครูคะ ฉันเตรียมที่นอนเรียบร้อยแล้วค่ะ"
1600703-46 = "(คุณครูเดินตามโทโมเอะไปยังห้องพัก)"
1600703-50 = "ที่พักชาเล่ต์"
1600703-51 = "[ns] \"นะ...นี่มัน...?\""
1600703-53 = "เซ็ตนอนกลางวันที่ฉันจัดเตรียมไว้ให้คุณครูได้พักผ่อนอย่างสบายๆ ค่ะ"
1600703-54 = "ฉันเตรียมชุดนอนและเครื่องนอนคุณภาพดีที่จะช่วยไม่ให้ปวดหลัง#nชาสมุนไพรที่ช่วยให้หลับสบาย และดนตรีคลาสสิกที่เพียงแค่ฟังก็จะช่วยให้หลับสนิทค่ะ"
1600703-55 = "ถ้าอยู่ที่สำนักเลขาธิการเรดวินเทอร์ ฉันคงจะเตรียมเซ็ตนอนกลางวันดีๆ กว่านี้ให้ได้ค่ะ#nฉันต้องเตรียมการอย่างกะทันหันจึงทำให้มีข้อบกพร่องในหลายๆ เรื่อง..."
1600703-56 = "เอาละค่ะคุณครู รีบไปเปลี่ยนเป็นชุดนอนตัวนี้แล้วไปนอนบนเตียงเถอะค่ะ"
1600703-57 = "[s5] \"แค่นอนกลางวันต้องทำขนาดนี้เลยเหรอ?\"\n[s6] \"คงจะรู้สึกลำบากใจจนนอนไม่หลับแน่...\""
1600703-58 = "แปลกจังเลยนะคะ สำหรับท่านประธานเชริโน่ ถ้าเตรียมเซ็ตนอนกลางวันไว้เท่านี้#nคงไม่ยอมนอนแน่ๆ..."
1600703-59 = "แปลกจังเลยนะคะ สำหรับท่านประธานเชริโน่ ถ้าเตรียมเซ็ตนอนกลางวันไว้เท่านี้#nคงไม่ยอมนอนแน่ๆ..."
1600703-60 = "แต่ว่าก่อนอื่นลองนอนดูก่อนเถอะค่ะ คุณครูอาจจะเปลี่ยนความคิดก็ได้นะคะ"
1600703-61 = "เอาล่ะ ถ้ามัวแต่ทำแบบนี้ เวลานอนกลางวันอันมีค่าก็จะผ่านไปเรื่อยๆ นะคะ รีบไปนอนเถอะค่ะ"
1600703-63 = "คุณครูเปลี่ยนชุด ดื่มชา และไปนอนบนเตียงตามคำแนะนำของโทโมเอะ"
1600703-65 = "ถ้างั้นฉันจะปิดไฟเพื่อให้คุณครูหลับสบายขึ้นนะคะ"
1600703-68 = "เอ่เอ๊~ เอ่เอ๊~ นอนเถอะนอน~ คุณครูคนดี~♪"
1600703-69 = "[s] \"ต้องร้องเพลงกล่อมเด็กด้วยเรอะ?!\""
1600703-70 = "ค่ะ ท่านประธานเชริโน่มักจะบ่นว่านอนไม่หลับอยู่บ่อยๆ ถ้าฉันไม่ร้องเพลงกล่อมเด็กให้ฟัง#nตอนนอนค่ะ"
1600703-71 = "ถ้าไม่อย่างนั้น... ฉันร้องเพลงอื่นดีไหมคะ?"
1600703-72 = "[s] \"ไม่ล่ะ ไม่ต้องดีกว่า...\""
1600703-73 = "ฮิฮิ ถ้างั้นฉันจะร้องต่อแล้วนะคะ"
1600703-74 = "เอ่เอ๊~ เอ่เอ๊~ นอนเถอะนอน~ คุณครูคนดี~♪"
1600703-76 = "(บางทีอาจเป็นผลจากเซ็ตเครื่องนอนกลางวัน ถึงแม้จะมีสายตาแปลกๆ จ้องอยู่ตลอด#nแต่คุณครูก็หลับไปอย่างรวดเร็ว...)"
1600703-77 = "(ด้วยความช่วยเหลือของโทโมเอะ คุณครูเลยเพลิดเพลินกับช่วงเวลานอนกลางวันได้#nอย่างมีความสุข...)"

1600703-4 = "#wait;2000"
1600703-5 = "3;토모에;03;좋은 아침입니다, 선생님.\n#3;em;[반짝]\n#3;greeting\n#3;a"
1600703-6 = "3;토모에;01;어제 모모톡으로 말씀드렸던 보고서 건은 일단 들키지 않게 미뤄 두었답니다."
1600703-7 = "3;토모에;99;다음 주까지만 전달해 주시면 제가 어떻게든……."
1600703-8 = "#Wait;1000"
1600703-9 = "[s1] \"자, 여기 보고서.\"\n[s2] \"어제 저녁에 작성을 마쳤어.\""
1600703-10 = "3;토모에;04;어머나, 이 많은 보고서를 하루 만에 다 작성하신 건가요?\n#3;stiff\n#3;em;[!]"
1600703-11 = "3;토모에;04;어머나, 이 많은 보고서를 하루 만에 다 작성하신 건가요?\n#3;stiff\n#3;em;[!]"
1600703-12 = "3;토모에;06;무리하게 서두르지 않으셔도 된다고 말씀드렸었는데……"
1600703-13 = "3;토모에;01;과연 어른이라고 해야할까요…… 정말 선생님께서는 책임감이 강한 분이시군요.\n#3;em;[재잘]"
1600703-14 = "[s3] \"애초에 내 실수 때문에 생긴 일이니까.\"\n[s4] \"깜박할 뻔했는데, 토모에 덕분에 살았어.\""
1600703-15 = "3;토모에;01;후후, 덕분에 저도 조금은 수고를 줄일 수 있겠네요. 감사합니다, 선생님.\n#3;em;[반응]\n#3;greeting"
1600703-16 = "3;토모에;01;후후, 덕분에 저도 조금은 수고를 줄일 수 있겠네요. 감사합니다, 선생님.\n#3;em;[반응]\n#3;greeting"
1600703-17 = "3;토모에;04;그런데, 선생님. 눈가에 그늘이 지고 인상이 피로해 보이시는 게……"
1600703-18 = "3;토모에;04;설마 보고서 때문에 밤을 새우신 건가요?"
1600703-19 = "[s] \"어제는 보고서를 작성하느라 늦게 자리에 누워서…….\""
1600703-20 = "3;토모에;06;그러실까 봐 무리하지 말라고 말씀드린 건데…….\n#3;em;[땀]"
1600703-21 = "3;토모에;06;괜히 제가 선생님을 부추긴 것 같아 어쩐지 죄송하네요."
1600703-22 = "3;토모에;05;우선은 부족한 잠을 보충하기 위해 지금부터 낮잠을 주무시는 게 좋겠어요.\n#3;em;[반짝]"
1600703-23 = "[s] \"하지만 업무 시간 중에 낮잠을 자는 건 좀…….\""
1600703-24 = "3;토모에;05;아뇨, 낮잠도 엄연한 업무의 일환.\n#3;em;[!]\n#3;shake"
1600703-25 = "3;토모에;05;피곤한 상태로 계속 일을 하는 것보다, 낮잠을 자고 일어나 일을 하는 것이 훨씬 효율적이라는 연구 결과도 있으니까요."
1600703-26 = "3;토모에;03;체리노 회장님께서도 업무 효율을 높이기 위해 점심 식사 후에는 언제나 낮잠 시간을 가지신답니다.\n#3;em;[반짝]"
1600703-27 = "3;토모에;03;괜찮으시다면 선생님께서 편히 낮잠을 주무실 수 있도록 제가 생활관에 미리 이부자리를 준비해 놔도 괜찮을까요?"
1600703-28 = "[s] \"……그럼 부탁할게.\""
1600703-29 = "3;토모에;01;네, 그럼 잠시만 기다려주세요.\n#3;em;[반응]\n#3;greeting"

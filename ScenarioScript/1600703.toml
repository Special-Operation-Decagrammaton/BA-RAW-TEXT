[translation]
1600703-1 = "Work Begets Enjoyable Rest"
1600703-2 = "Schale Executive Office"
1600703-5 = "Good morning, Sensei."
1600703-6 = "I pushed back the report we talked about on MomoTalk yesterday, so no one should notice."
1600703-7 = "If you get it to me by next week, I will somehow..."
1600703-9 = "[s1] \"Here is the report.\"\n[s2] \"I already finished it yesterday evening.\""
1600703-10 = "Oh my, did you finish all of it in one day?"
1600703-11 = "Oh my, did you finish all of it in one day?"
1600703-12 = "I told you it wasn't urgent..."
1600703-13 = "You really are an adult. You're so responsible."
1600703-14 = "[s3] \"It was my mistake to begin with.\"\n[s4] \"I almost forgot about it. Thanks for reminding me, Tomoe.\""
1600703-15 = "Heehee, now I have less work to do as well. Thank you, Sensei."
1600703-16 = "Heehee, now I have less work to do as well. Thank you, Sensei."
1600703-17 = "But Sensei, you have dark circles under your eyes, you look tired..."
1600703-18 = "Did you stay up all night to finish the report?"
1600703-19 = "[s] \"Just a little later than usual...\""
1600703-20 = "That's why I told you not to overdo it."
1600703-21 = "I'm sorry. I may have pushed you too hard, Sensei."
1600703-22 = "To begin, go take a nap to make up for staying up so late."
1600703-23 = "[s] \"But taking a nap during work hours is a bit...\""
1600703-24 = "No, taking a nap is also part of work."
1600703-25 = "Studies have shown that working after taking a nap is far more efficient than trying to work tired."
1600703-26 = "Even President Cherino always takes a nap after lunch to increase work productivity."
1600703-27 = "Would it be okay if I prepared a bed for you in the residence hall so you can take a nice, comfortable nap?"
1600703-28 = "[s] \"...That would be great.\""
1600703-29 = "Okay, please give me a minute."
1600703-45 = "Sensei, preparations for your nap time are complete."
1600703-46 = "(I follow Tomoe to the residence hall.)"
1600703-50 = "Schale Residence Hall"
1600703-51 = "[ns] \"Wh-What's this?!\""
1600703-53 = "Obviously, it's a bed prepared especially for you for optimal sleep."
1600703-54 = "I have prepared top-quality bedding to not put strain on your back, cotton pajamas that are light as a feather, herbal tea to help you get a good night's sleep, and soothing, classical music."
1600703-55 = "I apologize if this is lacking. If this was the Red Winter Office, I would have been able to prepare a better bed for you."
1600703-56 = "Come on, Sensei. Please change into these pajamas and get in bed."
1600703-57 = "[s5] \"Does napping require this much effort?\"\n[s6] \"It's too much, I don't think I'll be able to fall asleep...\""
1600703-58 = "That's weird. President Cherino refuses to nap unless this level of comfort is prepared for her."
1600703-59 = "That's weird. President Cherino refuses to nap unless this level of comfort is prepared for her."
1600703-60 = "You might change your mind once you lie down."
1600703-61 = "Precious nap time is being wasted as we speak, so please."
1600703-63 = "Following Tomoe's instructions, I changed into the pajamas, drank the tea, and got in bed."
1600703-65 = "Now, I will turn off the light so you can sleep comfortably."
1600703-68 = "Hush-a-bye, Sensei, on the tree top. ♪"
1600703-69 = "[s] \"Are you singing me a lullaby?!\""
1600703-70 = "Yes. President Cherino cannot fall asleep if I don't sing her a lullaby."
1600703-71 = "Is this one not to your liking? I can sing another."
1600703-72 = "[s] \"No... I'm good.\""
1600703-73 = "Heehee, then I will continue."
1600703-74 = "Hush-a-bye, Sensei, on the tree top... ♪"
1600703-76 = "(Perhaps because of the luxurious set up, I fell asleep quickly despite her intense gaze.)"
1600703-77 = "(With Tomoe's help, I had the best nap of my life.)"

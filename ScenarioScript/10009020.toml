[translation]
10009020-1 = "第2話;襲擊之二"
10009020-2 = "矯正局東支部．第6矯正設施"
10009020-7 = "沒想到你居然還想試圖逃跑。"
10009020-8 = "但是既然人已經到了矯正局，再怎麼反抗都是沒有用的。災厄之狐。"
10009020-9 = "好了，乖乖進去裡面！"
10009020-17 = "……呼呣。"
10009020-18 = "依然是個與乾淨無緣的地方呢。"
10009020-20 = "你有資格抱怨嗎。警備局長馬上就會來進行審問。"
10009020-21 = "找藉口也是沒用的。好好想想該怎麼說明你的目的吧。"
10009020-22 = "否則和原本的部分相加，你的罪狀和刑期會越來越多的哦。"
10009020-23 = "審問……是嗎。無所謂。"
10009020-24 = "什麼嘛，比想像中還配合……"
10009020-25 = "我行使緘默權。"
10009020-26 = "什麼？"
10009020-27 = "你有搞清楚自己的狀況嗎！？"
10009020-28 = "呵呵，那是當然。所以才要行使緘默權。"
10009020-29 = "除了老師以外，我不打算與任何人對話。"
10009020-31 = "老師……是那位夏萊的？"
10009020-32 = "剛才在現場協助我們的那位老師？"
10009020-33 = "你，你打從一開始想襲擊那位老師吧！#n以為我在知道這件事後還會帶他過來嗎！？"
10009020-38 = "呵呵呵……"
10009020-39 = "原來如此，這樣啊。"
10009020-41 = "嗯……？"
10009020-43 = "你們也打算妨礙我的「目的」對吧。"
10009020-44 = "既然如此，我也有我的打算。呵呵呵……♡"
10009020-51 = "……？"
10009020-53 = "（和瀬奈重新開始巡邏，才剛過沒多久……）"
10009020-59 = "老師！剛才若藻又從矯正局逃脫了……！"
10009020-60 = "[s]「……又逃脫了？」"
10009020-66 = "呵呵呵……"
10009020-67 = "絕對，絕對不會讓您逃走的。"

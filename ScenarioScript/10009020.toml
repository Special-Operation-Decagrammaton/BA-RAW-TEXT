[translation]
10009020-1 = "ตอนที่ 2;การจู่โจมครั้งที่ 2!"
10009020-2 = "ห้องคุมขังฝั่งตะวันออก หมายเลข 6"
10009020-7 = "ไม่นึกเลยว่าเธอคิดจะหลบหนีไปกลางคันแบบนั้นน่ะ"
10009020-8 = "แต่ถ้ามาถึงห้องคุมขังแบบนี้แล้ว ดิ้นรนไปก็ไม่มีประโยชน์หรอก ยัยจิ้งจอกแห่งความพินาศ"
10009020-9 = "เอาล่ะ เข้าไปอยู่ข้างในเงียบๆ ซะ!"
10009020-17 = "อืม..."
10009020-18 = "ที่นี่ยังเป็นที่ที่สกปรกเหมือนเดิมเลยนะคะ "
10009020-20 = "เลิกบ่นได้แล้ว อีกเดี๋ยวหัวหน้าฝ่ายรักษาความปลอดภัยจะมาสอบสวนเธอด้วยตัวเอง"
10009020-21 = "เพราะงั้นตอนนี้ใช้เวลาที่เหลือคิดข้อแก้ตัวดีๆ เอาไว้ดีกว่าว่าทำไมถึงได้ไปก่อความวุ่นวายในงาน#nเทศกาลแบบนั้น"
10009020-22 = "ไม่งั้นละก็ ถ้ารวมความผิดจากการหลบหนีการจับกุม การก่อความวุ่นวายคราวนี้เข้าไป ระยะเวลาคุมขังอาจเพิ่มขึ้นมากกว่าเดิมก็ได้นะ"
10009020-23 = "การสอบสวนของหัวหน้าฝ่ายรักษาความปลอดภัยเหรอคะ ก็ดีเลยค่ะ"
10009020-24 = "โอ้ ยอมร่วมมือง่ายกว่าที่คิดแฮะ..."
10009020-25 = "ฉันจะขอใช้สิทธิ์ที่จะไม่พูดค่ะ"
10009020-26 = "ว่าไงนะ?! สิทธิ์ที่จะไม่พูดเรอะ?"
10009020-27 = "รู้บ้างรึเปล่าว่าตัวเองอยู่ในสถานการณ์แบบไหนน่ะ?!"
10009020-28 = "ฮุฮุ ฉันทราบดีค่ะ เพราะงั้นถึงจะขอใช้สิทธิ์ที่จะไม่พูดค่ะ"
10009020-29 = "ถ้าไม่ใช่คุณครูละก็ ฉันจะไม่ตอบคำถามใดๆ ทั้งสิ้นค่ะ"
10009020-31 = "คุณครูงั้นเหรอ... หมายถึงชาเล่ต์..."
10009020-32 = "หมายถึงคุณครูจากชาเล่ต์ที่มาช่วยที่งานงั้นเหรอ?"
10009020-33 = "เธอคิดจะโจมตีใส่คุณครูตอนอยู่ที่งานไม่ใช่รึไง! คิดว่าพวกเราจะยอมขอให้คุณครูมาที่นี่งั้นเหรอ?"
10009020-38 = "ฮุฮุฮุ..."
10009020-39 = "งั้นเหรอคะ อา... อย่างนี้เองสินะคะ"
10009020-41 = "หืม?"
10009020-43 = "แม้แต่พวกคุณก็ยังคิดจะขัดขวาง \"เป้าหมาย\" ของฉันสินะคะ ก็ดีเลยค่ะ "
10009020-44 = "ถ้าอย่างนั้นฉันก็คิดออกแล้วละค่ะ ฮุฮุฮุ♡"
10009020-51 = "...?"
10009020-53 = "(คุณครูเดินลาดตระเวนพร้อมกับเซนะอย่างเงียบๆ)"
10009020-59 = "คะ...คุณครู! วาคาโมะหลบหนีออกมาจากห้องคุมขังแล้ว...!"
10009020-60 = "[s] \"เดี๋ยวสิ อีกแล้วเหรอ?\""
10009020-66 = "ฮุฮุฮุ..."
10009020-67 = "หนีฉันไม่พ้นหรอกนะคะ!"

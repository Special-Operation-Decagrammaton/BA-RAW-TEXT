[translation]
10001070-1 = "第7話;給勞動者布丁！"
10001070-2 = "赤冬聯邦學園．中央大道"
10001070-3 = "吶吶，今年的連假，你有什麼特別的計畫嗎？"
10001070-4 = "沒有。今年的夏至慶典，我想在家裡安靜地度過。"
10001070-5 = "哎～難得放連假耶。如果你願意，一起去市區玩吧！"
10001070-6 = "聽說學生會在3丁目的十字路口準備了非常大的篝火唷！"
10001070-7 = "說不定在那裡會有場美麗的邂逅呢？呵呵……！"
10001070-8 = "唔嗯，那就這麼辦吧……"
10001070-9 = "…………"
10001070-10 = "唔唔……討厭！ #n全都討厭！"
10001070-11 = "怎麼了，潔莉諾會長？"
10001070-12 = "你看！赤冬的學生們都沉浸在節慶的氛圍中，興高采烈地走來走去！"
10001070-13 = "身為赤冬聯邦學園最高尊嚴的咱，既不能吃零食也不能睡午覺，過得十分辛苦，#n但學生們卻享受著夏至慶典的氣氛……"
10001070-14 = "這太不公平了！"
10001070-15 = "全部肅清，肅清！#n所有正享受著夏至慶典的人，將處以一個月的操場拔草之刑！"
10001070-16 = "[s]「但現在不是會長了，無法給予懲罰吧……？」"
10001070-17 = "……對耶。"
10001070-18 = "既然如此，那就先把他們的名字記下來，等到咱復權之後再處罰他們……"
10001070-19 = "智惠秘書室長。把剛才經過的那些學生的姓名一一登記下來！"
10001070-20 = "不行唷，潔莉諾醬。#n當初是潔莉諾醬說要全體學生一起享受慶典的吧？"
10001070-21 = "朝令夕改的話，會被大家討厭唷。"
10001070-22 = "可是～！只有咱不能玩，還要被追趕……這樣實在是太不公平了！"
10001070-23 = "在以自由及平等為校訓的赤冬聯邦學園，不應存在任何不公平之事！"
10001070-24 = "難得有機會，我們也和其他學生一起享受一下夏至慶典吧？"
10001070-25 = "和其他學生一起享受……？"
10001070-26 = "是的。潔莉諾會長總是居高臨下指揮著活動，沒什麼機會和學生們一起享受慶典。"
10001070-27 = "如果能趁這個機會，以普通學生的立場享受的話，也許有助於下次慶典的準備。"
10001070-28 = "哦……原來如此。"
10001070-29 = "這還真是個不錯的點子！"
10001070-30 = "了解學生們的生活，也是身為領導者的職責！#n偶爾放下職務，以普通學生的角度視察街道也是很重要的吧。"
10001070-31 = "……絕對不是因為想玩才這麼說的！"
10001070-32 = "呼呣。"
10001070-33 = "那麼先去那家的蛋糕店吧。#n動作快，同志！"
10001070-37 = "嚼嚼…… #n哈啊，真好吃～"
10001070-38 = "這家店的[ruby=Medovik]蜂蜜蛋糕[/ruby]真是又甜又美味！這種東西要咱吃多少都沒問題！"
10001070-39 = "潔莉諾醬，你的鬍子沾到奶油囉。"
10001070-41 = "唔唔，咱才不是小孩子！不要隨便亂摸咱的鬍子！"
10001070-42 = "……話說回來，回過神來已經花了一整個月的零用錢。#n「伊凡．庫帕拉」……多麼可怕的慶典啊。"
10001070-43 = "感覺咱能明白為什麼奇普托斯的商人們會在節日期間推出各種點心了……"
10001070-44 = "來吧，同志。接下來要去哪裡玩……不，去哪裡視察呢？"
10001070-45 = "[s]「那一大堆柴火是做什麼用的呢？」"
10001070-46 = "……一堆柴火？"
10001070-47 = "啊啊，那不是柴火，是「工務部」正在架設的「伊凡．庫帕拉」祭壇！"
10001070-48 = "每次「伊凡．庫帕拉」都會焚燒人偶，#n不過這次咱特別下令，要建造一個能燃燒巨大人偶的祭壇！"
10001070-49 = "[s]「這樣啊。不過，怎麼看都不太像呢……」"
10001070-51 = "那個……確實如此。也許是因為上面連一個能讓它稱之為祭壇的裝飾品都沒有吧……"
10001070-52 = "距離慶典沒剩多少時間了，怎麼還處於這種狀態呢？"
10001070-53 = "是在偷懶嗎？怠工了是吧！？"
10001070-54 = "請先冷靜，會長。也許是我們誤會了什麼。"
10001070-55 = "能有什麼誤會！#n我們赤冬聯邦學園不需要無法在期限內完成工作的沒用學生！全部肅清，肅清！"
10001070-56 = "會長下令設置祭壇的地方不是這裡，而是事務局前的廣場。#n所以這東西肯定和「伊凡．庫帕拉」無關吧。"
10001070-57 = "是，是嗎？那麼，這堆柴火到底是什麼呢？"
10001070-58 = "正好有一群工務部的學生聚集在那邊，咱們去問問吧。"
10001070-61 = "哦～咿，作業還順利嗎──"
10001070-67 = "我們永不為奴！！"
10001070-70 = "哇啊啊啊──！！"
10001070-72 = "咦？氣氛好像有點……？"
10001070-73 = "幾天後，「伊凡．庫帕拉」連假就要開始了。"
10001070-74 = "「伊凡．庫帕拉」是什麼樣的慶典？不正是把吃了整個冬天的乾麵包和醃肉扔掉，#n享受陽光贈予的豐盛鮮果，歌頌新綠的慶典嗎！？"
10001070-75 = "赤冬的任何學生都不該被排除在外。#n我們也有享受慶典連假的權利！"
10001070-76 = "沒錯，沒錯！"
10001070-77 = "我們也要放連假！"
10001070-78 = "但是別說連假了，我們還在一日兩班制的惡劣環境下不分晝夜地工作，#n這不是剝削勞動力嗎！"
10001070-79 = "這違背我們赤冬聯邦學園的理念，違反自由和平等的精神！我要強烈譴責這種情況！"
10001070-80 = "喔喔喔喔──！"
10001070-81 = "沒錯！強力譴責！"
10001070-82 = "以潔莉諾會長為首，赤冬聯邦學園事務局所屬的人們，#n請保障我們「工務部」勞動者的權利！"
10001070-83 = "必須給我們充分的休息時間、額外津貼，以及……每人兩個布丁！#n否則我們將繼續罷工和示威！"
10001070-84 = "哇啊啊啊啊──！"
10001070-86 = "罷工！罷工！"
10001070-88 = "等等等等等等！是誰允許你們做這種事的？"
10001070-89 = "未經事務局許可，不得集體活動！全部肅清，肅清！"
10001070-90 = "……潔莉諾會長？"
10001070-91 = "雖然不知道你怎麼會在這裡……但正好！"
10001070-92 = "同志們！抓住潔莉諾會長，把他綁在柴火堆上！"
10001070-101 = "等，等等！快放開！你把咱當成什麼了！"
10001070-103 = "嗚！比起那個，你們這是要做什麼……"
10001070-105 = "……該不會是打算把咱像人偶一樣，和柴火一起燒個精光吧！"
10001070-107 = "雖說是革命，但我們也不可能做出那種殘酷的事。"
10001070-109 = "但是潔莉諾會長是個整天無所事事，只知道玩樂的無能領袖！#n是必須打倒的邪惡暴君！"
10001070-111 = "同志們！今天我們要把這個邪惡的暴君帶到學園的中央大道上示眾，#n作為我們勞動者未來「不能像他一樣」的新象徵！"
10001070-113 = "哇啊啊啊啊！"
10001070-115 = "綁起來，綁起來！"
10001070-117 = "等，等等！綁那麼緊的話，手會斷掉啊啊啊啊啊啊啊啊！"
10001070-119 = "同，同志！智惠！救救咱！"

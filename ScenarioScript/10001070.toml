10001070-72 = "3;체리노;04;어, 어라? 뭔가 분위기가 이상한데……?\n#3;em;[땀]\n#3;stiff"
10001070-73 = "3;미노리;01;동지들, 앞으로 며칠후면 이반 쿠팔라가 시작된다."
10001070-74 = "3;미노리;00;이반 쿠팔라가 어떤 날인가? 겨우내 먹었던 마른 빵과 염장 고기를 버리고, 태양이 선사하는 신선하고 풍요로운 과실을 즐기는 신록의 축제가 아니었던가!"
10001070-75 = "3;미노리;05;이는 붉은겨울의 학생들에게도 예외가 아니다. 우리들에게도 축제를 즐길 권리가 있다!\n#3;em;[!]"
10001070-76 = "1;용역부원 붉은겨울;00;맞아, 맞아!\n#1;hophop\n#1;em;[재잘]\n#1;a"
10001070-77 = "5;용역부원 붉은겨울;00;우리에게도 축제 휴가를!\n#5;em;[재잘]\n#5;a\n#5;hophop"

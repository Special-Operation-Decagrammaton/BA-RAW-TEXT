10001070-81 = "5;용역부원 붉은겨울;00;규탄한다! 규탄한다!\n#5;em;[재잘]\n#5;al\n#5;hophop"
10001070-82 = "3;미노리;05;체리노 회장을 비롯한 붉은겨울 학원 사무국의 임원들은 우리 용역부 노동자들의 권리를 보장하라!\n#3;closeup\n#5;hide\n#1;hide"
10001070-83 = "1;용역부원 붉은겨울;00\n5;용역부원 붉은겨울;00\n3;미노리;01;우리에게 충분한 휴식 시간과, 추가 수당과, 그리고 어…… 두 개의 푸딩을 보장하지 않으면 우리는 계속 파업과 시위를 이어갈 것이다!\n#3;h"

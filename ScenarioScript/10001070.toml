[translation]
10001070-1 = "ตอนที่ 7;มอบพุดดิ้งให้กับคนงาน!"
10001070-2 = "ถนนสายหลัก สหภาพเรดวินเทอร์"
10001070-3 = "นี่! เธอมีแพลนอะไรเป็นพิเศษในวันหยุดยาวนี้บ้างไหม?"
10001070-4 = "ไม่มีหรอก เทศกาลครั้งนี้ฉันจะใช้เวลาพักผ่อนกับครอบครัวเงียบๆ น่ะ"
10001070-5 = "อะไรกัน? นานๆ เราถึงจะมีหยุดยาวแบบนี้นะ เลิกอยู่แต่บ้าน แล้วออกไปเที่ยวในเมืองกันเถอะ!"
10001070-6 = "ได้ยินมาว่าสภานักเรียนก่อกองไฟกลางแจ้งไว้ที่สี่แยกในบล็อกที่ 3 ด้วย!"
10001070-7 = "เราอาจจะบังเอิญได้เจอใครที่นั่นก็ได้นะ ฮุฮุ..."
10001070-8 = "อืมม ก็ได้ แล้วฉันจะออกไปด้วย..."
10001070-9 = "........."
10001070-10 = "ฮึ่ม..... นั่นก็ไม่ดี นี่ก็ไม่ชอบ...#nเราไม่ถูกใจอะไรสักกะอย่างเลย!"
10001070-11 = "มีเรื่องอะไรอีกเหรอคะท่านประธานเชริโน่?"
10001070-12 = "ก็ดูพวกนักเรียนเรดวินเทอร์ที่สนุกสนานกับบรรยากาศของเทศกาลสิ!"
10001070-13 = "ผู้ที่ยิ่งใหญ่ที่สุดของสหภาพเรดวินเทอร์ต้องลำบากเพราะไม่ได้นอนกลางวัน#nแถมไม่ได้กินแม้แต่ของว่างอีก แต่นักเรียนก็ยังสนุกกับงานเทศกาลกันได้..."
10001070-14 = "นี่มันไม่ยุติธรรมเอาซะเลย!"
10001070-15 = "ไปจัดการทุกคนเลย! ลงโทษให้หมด!#nนักเรียนที่ออกมาสนุกกับเทศกาลในวันนี้ต้องไปถอนวัชพืชในสนามกีฬา 1 เดือน!"
10001070-16 = "[s] \"แต่ตอนนี้เชริโน่ไม่ใช่ประธานนะ จะสั่งลงโทษใครได้ไง?\""
10001070-17 = "งะ... งั้นเหรอ?"
10001070-18 = "ถ้างั้นเราจะจดชื่อนักเรียนพวกนี้ไว้ก่อน ถ้าได้กลับไปนั่งตำแหน่งเดิมก็ค่อยลงโทษย้อนหลังแล้วกัน..."
10001070-19 = "เลขานุการสูงสุดโทโมเอะ จดชื่อนักเรียนที่ผ่านไปผ่านมาให้หมด ห้ามตกหล่นแม้แต่คนเดียว!"
10001070-20 = "ไม่ได้นะคะเชริโน่จัง#nก็คนที่บอกให้นักเรียนทุกคนออกมาเข้าร่วมงานเทศกาลตั้งแต่แรกก็คือเชริโน่นี่คะ?"
10001070-21 = "ถ้าเปลี่ยนใจและออกคำสั่งใหม่แบบนี้ล่ะก็ พวกนักเรียนจะไม่ถูกใจเอานะคะ"
10001070-22 = "เรื่องนั้นเรารู้หรอกน่า! แต่ว่าเรากลับถูกไล่ออกมา แถมยังอดไปเที่ยวงานเทศกาลด้วย#nแบบนี้มันไม่ยุติธรรมเลยสักนิด!"
10001070-23 = "เราจะยอมให้เกิดความไม่ยุติธรรมในสหภาพเรดวินเทอร์ที่ยึดมั่นในอิสรภาพและความเสมอภาคไม่ได้!"
10001070-24 = "ถ้างั้นเราก็ออกไปเที่ยวงานเทศกาลกับพวกนักเรียนเลยไหมคะ?"
10001070-25 = "ไปเที่ยวงานเทศกาลกับพวกนักเรียนงั้นเหรอ?"
10001070-26 = "ใช่ค่ะ เพราะที่ผ่านมาท่านประธานเชริโน่ได้แต่กำกับและควบคุมงานต่างๆ#nก็เลยไม่เคยมีโอกาสไปเที่ยวงานเทศกาลร่วมกับนักเรียนเลย"
10001070-27 = "ถ้าได้ใช้โอกาสนี้ไปเที่ยวงานเทศกาลเหมือนนักเรียนทั่วไป ก็อาจจะเป็นประโยชน์#nต่อการจัดงานเทศกาลของปีหน้าก็ได้นะคะ"
10001070-28 = "โฮ่..."
10001070-29 = "เป็นความคิดที่ดีมาก!"
10001070-30 = "การลงพื้นที่ไปดูว่านักเรียนใช้ชีวิตกันยังไงก็เป็นหนึ่งในหน้าที่ของผู้นำ!#nบางครั้งเราก็ควรจะวางงานลงแล้วออกไปเห็นวิถีชีวิตในมุมมองของนักเรียนธรรมดาบ้าง"
10001070-31 = "...แต่ไม่ได้แปลว่าเราอยากไปเที่ยวเล่นหรอกนะ!"
10001070-32 = "ฮึ่ม.."
10001070-33 = "งั้นเราไปตรวจตราร้านเค้กที่อยู่ตรงนั้นกันก่อนเลย#nเร็วเข้าเถอะสหาย!"
10001070-37 = "ง่ำๆๆ...#nงือออ~ อร่อยจังงง~"
10001070-38 = "เค้กน้ำผึ้งมีดาวิกของร้านนี้หอมหวานจังเลย! ให้กินกี่ชิ้นก็ไม่มีวันเบื่อ!"
10001070-39 = "เชริโน่จัง ครีมติดหนวดแล้วค่ะ"
10001070-41 = "อึ่ก เราไม่ใช่เด็กน้อยนะ จะเอามือมาจับหนวดของเราตามอำเภอใจไม่ได้!"
10001070-42 = "นี่เราหมดเงินค่าขนมไปเกือบ 1 เดือนแล้วเหรอเนี่ย?#nอีวาน คูปาลาเป็นเทศกาลที่ผลาญเงินดีชะมัด..."
10001070-43 = "ตอนนี้เรารู้แล้วละ ว่าทำไมพวกคนขายของในคิโวทอสถึงเอาขนมหวานมาขายในเทศกาลเยอะ#nขนาดนี้..."
10001070-44 = "เอาล่ะสหาย ต่อไปเราไปเที่ยว... เอ้ย... ไปตรวจร้านไหนดี?"
10001070-45 = "[s] \"มีกองฟืนขนาดใหญ่อยู่ตรงนั้นด้วย\""
10001070-46 = "...กองฟืนขนาดใหญ่เหรอ?"
10001070-47 = "อ๋อ! นั่นไม่ใช่กองฟืน แต่เป็นแท่นพิธีอีวาน คูปาลาที่ <ชมรมผู้รับจ้าง> กำลังสร้างอยู่น่ะ"
10001070-48 = "ก่อนหน้านี้เราเป็นคนสั่งพวกเขาให้สร้างแท่นพิธีเผาตุ๊กตาตัวใหญ่เองแหละ"
10001070-49 = "[s] \"แต่มันดูไม่ต่างอะไรกับกองฟืนเลยนะ\""
10001070-51 = "อืม... ก็ใช่... นี่ดูเป็นของตกแต่งมากกว่าแท่นพิธี..."
10001070-52 = "เหลือเวลาอีกไม่กี่วันแล้ว ทำไมแท่นพิธียังหน้าตาเป็นแบบนั้นอยู่อีกล่ะ?"
10001070-53 = "หรือว่าอู้งาน?! ตั้งใจจะทำลายงานงั้นเรอะ?"
10001070-54 = "ใจเย็นก่อนค่ะท่านประธาน เราอาจจะเข้าใจอะไรผิดก็ได้นะคะ"
10001070-55 = "เข้าใจผิดอะไรกันล่ะ! สหภาพเรดวินเทอร์ของเราไม่ต้องการนักเรียนที่ทำงานไม่เสร็จ#nภายในเวลาที่มอบให้หรอก! ทุกคนต้องโดนลงโทษ!"
10001070-56 = "แท่นพิธีที่ท่านประธานสั่งให้สร้างต้องอยู่ที่จัตุรัสหน้าอาคารสำนักเลขาธิการต่างหากล่ะคะ#nสิ่งปลูกสร้างอะไรที่อยู่ตรงนี้ไม่เกี่ยวอะไรกับเทศกาลอีวาน คูปาลาหรอกค่ะ"
10001070-57 = "งะ... งั้นเหรอ? แล้วกองฟืนนั่นคืออะไรกันล่ะ?"
10001070-58 = "มีพวกนักเรียนชมรมผู้รับจ้างอยู่ข้างหน้าพอดี ต้องไปถามสักหน่อยแล้ว"
10001070-61 = "นี่พรรคพวก! งานเป็นไปได้ด้วยดีใช่ไหม?"
10001070-67 = "เราไม่ยอมเป็นทาสหรอก! เราจะเป็นเจ้านายของโลก!"
10001070-70 = "เย้!!!!"
10001070-72 = "หืม? ทำไมบรรยากาศมันแปลกๆ...?"
10001070-73 = "เหล่าสหาย! อีกไม่กี่วันข้างหน้างานอีวาน คูปาลาก็จะเริ่มขึ้นแล้ว!"
10001070-74 = "อีวาน คูปาลาคือการฉลองให้กับความอุดมสมบูรณ์ของธรรมชาติ โยนเนื้อและขนมปังแห้งๆ#nที่กินในฤดูหนาวทิ้งไป แล้วมามีความสุขกับผลไม้สดและแสงที่อบอุ่นของดวงอาทิตย์!"
10001070-75 = "นักเรียนของเรดวินเทอร์มีสิทธิ์ได้สนุกกับเทศกาลนี้ทุกคน และพวกเราก็ด้วย!"
10001070-76 = "ใช่! ใช่!"
10001070-77 = "เราก็ต้องได้วันหยุดช่วงเทศกาลเหมือนกัน!"
10001070-78 = "ตอนนี้เราต้องทำงานอย่างหนักวันละ 2 กะในสภาพแวดล้อมที่โหดร้าย อย่าว่าแต่วันหยุดยาวเลย#nวันธรรมดาเรายังไม่มีเวลาได้พักผ่อนเลยด้วยซ้ำ!"
10001070-79 = "นี่เป็นสิ่งที่ไม่ขัดต่อจิตวิญญาณแห่งเสรีภาพและความเสมอภาค#nที่เป็นอุดมการณ์ของสหภาพเรดวินเทอร์ของเรา! ฉันขอประณามอย่างถึงที่สุด!"
10001070-80 = "วู้วววว!!!"
10001070-81 = "ไปร้องเรียนเลย!"
10001070-82 = "กรรมการสำนักเลขาธิการของสหภาพเรดวินเทอร์ รวมถึงประธานเชริโน่จะต้องรับรองสิทธิ#nของคนงานในชมรมผู้รับจ้างของเรา!"
10001070-83 = "เราต้องการเวลาพักผ่อนอย่างเพียงพอ ต้องการค่าแรงเพิ่ม ก็แล้ว... ขอพุดดิ้งคนละ 2 อันด้วย...#nถ้าไม่ให้เราก็จะหยุดงานประท้วงกันอยู่แบบนี้!"
10001070-84 = "เย้!!!!"
10001070-86 = "หยุดงาน! หยุดงาน!!!"
10001070-88 = "เดี๋ยว เดี๋ยว เดี๋ยว!! ใครอนุญาตให้พวกเธอมาทำอะไรแบบนี้?"
10001070-89 = "มารวมตัวกันประท้วงโดยไม่ได้รับอนุญาตจากสำนักเลขาธิการได้ยังไง! ทุกคนต้องโดนลงโทษ!"
10001070-90 = "ประธานเชริโน่...?"
10001070-91 = "ทำไมถึงมาอยู่ในที่แบบนี้ล่ะ? แต่ก็ช่างเถอะ มาได้ถูกจังหวะพอดี!"
10001070-92 = "เหล่าสหาย! จับตัวประธานเชริโน่ไปมัดไว้ที่เสา!"
10001070-101 = "ดะ...เดี๋ยวสิ! ปล่อยนะ! ไม่รู้เหรอว่าเราเป็นใคร!"
10001070-103 = "มิหนำซ้ำ ยังเอาเรามาไว้ที่กองฟืนอีกงั้นเหรอ!#nเสาไม้พวกนี้ไม่ใช่ของตกแต่งแท่นพิธี แต่เป็นแค่ฟืนงั้นเหรอ?"
10001070-105 = "หรือว่า... อย่าบอกนะว่าจะเผาเราให้ไหม้เป็นผุยผงไปด้วยฟืนพวกนี้?"
10001070-107 = "จะบ้าเหรอ...? ถึงจะออกมาเรียกร้องและประท้วงแค่ไหน#nแต่เราก็ไม่ทำพฤติกรรมน่ากลัวแบบนั้นหรอกนะ!"
10001070-109 = "แต่ยังไงประธานเชริโน่ก็คือผู้นำที่แย่อยู่ดี ดีแต่ผลักงานมาให้พวกเราแล้วเอาแต่เสวยสุข#nในห้องสำนักเลขาธิการ! ผู้กดขี่ที่ชั่วร้ายจะต้องโดนล้มล้าง!"
10001070-111 = "เหล่าสหาย! มาแสดงให้ทุกคนได้เห็นทรราชที่เสียเกียรติบนถนนสายหลักของโรงเรียน#nเพื่อเป็นสัญลักษณ์ของอนาคตใหม่ของเรา!"
10001070-113 = "เอาเลยยยย!!!!"
10001070-115 = "จับมัดไว้เลย!"
10001070-117 = "ดะ...เดี๋ยวสิ! มัดแขนแบบนี้เดี๋ยวแขนก็หักกันพอดี!"
10001070-119 = "ว้ากกก! สหาย! โทโมเอะ! ช่วยเราด้วย!"

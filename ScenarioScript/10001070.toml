[translation]
10001070-1 = "#title;제7화;노동자에게 푸딩을!"
10001070-2 = "#place;붉은겨울 학원 중앙 거리"
10001070-3 = "#na;붉은겨울 학생 A;저기, 이번 연휴에 무슨 특별한 계획이라도 있어?"
10001070-4 = "#na;붉은겨울 학생 B;아니. 이번 축제는 집에서 가족들과 함께 조용히 보내려고."
10001070-5 = "#na;붉은겨울 학생 A;에이, 모처럼의 연휴인데. 그러지 말고 시내에 나가서 같이 놀자!"
10001070-6 = "#na;붉은겨울 학생 A;듣자 하니 학생회에서 3거리의 교차로에 멋진 모닥불을 피워놨대!"
10001070-7 = "#na;붉은겨울 학생 A;어쩌면 그곳에서 멋진 만남과 마주하게 될지도 모르잖아? 후훗……."
10001070-8 = "#na;붉은겨울 학생 B;으음, 그럼 하루 정도는 일정을 비워둘까나……."
10001070-9 = "3;체리노;01;………….\n#3;a"
10001070-10 = "3;체리노;05;으읏…… 모두 마음에 들지 않느니라! #n전부 마음에 안 들어!\n#3;em;[빠직]\n#3;stiff"
10001070-11 = "1;토모에;02;또 무슨 일이신가요, 체리노 회장님?\n#1;em;[?]\n#1;ar\n#3;m5"
10001070-12 = "3;체리노;01;보거라! 축제의 분위기에 한껏 취해 즐거이 거리를 오고 가는 붉은겨울의 학생들을!"
10001070-13 = "3;체리노;06;정작 붉은겨울 학원의 최고 존엄인 이 몸은 간식도 못 먹고, 낮잠도 못 자고, 고생이나 하고 있는데 학생들은 축제 분위기를 즐기고 있다니…….\n#3;em;[속상함]\n#3;stiff"
10001070-14 = "3;체리노;01;이건 불공평해!"
10001070-15 = "3;체리노;05;모두 숙청이야, 숙청! #n지금 축제를 즐기는 학생들은 모두 앞으로 한 달 동안 운동장 잡초 뽑기형에 처할 거야!\n#3;hophop\n#3;em;[빠직]"
10001070-16 = "[s] \"하지만 체리노는 지금 회장이 아니니 벌을 내릴 수 없잖아?\""
10001070-17 = "3;체리노;02;그, 그런가?\n#3;stiff\n#3;em;[땀]"
10001070-18 = "3;체리노;99;그렇다면 지금 이름을 기록해 두었다가 나중에 복권하면 그 때 벌을 내리는 것으로……."
10001070-19 = "3;체리노;01;토모에 총비서실장. 방금 지나간 학생들의 이름을 빠짐없이 기록해 두도록!\n#3;em;[반응]"
10001070-20 = "1;토모에;05;안 돼요, 체리노 쨩. #n애초에 한 사람의 학생도 빠짐없이 다 함께 축제를 즐기자— 라고 말한 건 체리노 쨩이잖아요?\n#1;em;[!]"
10001070-21 = "1;토모에;05;잠깐의 변덕 때문에 명령을 번복하면 학생들이 싫어할 거라고요."
10001070-22 = "3;체리노;05;하지만~! 나만 이렇게 놀지도 못하고 쫓겨 다니는 신세라니. 이건 불공평하다고!\n#3;hophop"
10001070-23 = "3;체리노;01;자유와 평등을 모토로 하는 우리 붉은겨울 학원에 불공평이란 있을 수 없어!"
10001070-24 = "1;토모에;02;그럼 이왕 이렇게 된 김에 저희도 학생들과 함께 축제를 즐겨볼까요?\n#1;em;[반응]"
10001070-25 = "3;체리노;02;학생들과 함께 즐기는 축제?\n#3;em;[?]"
10001070-26 = "1;토모에;01;네. 체리노 회장님께서는 언제나 높은 자리에서 행사를 지휘하시느라, 정작 학생들과 어울려 축제를 즐기실 기회는 없으셨으니까요."
10001070-27 = "1;토모에;03;이 기회에 평범한 학생의 입장에서 축제를 즐겨 보신다면 다음 축제를 준비하는 데 도움이 될지도 몰라요.\n#1;em;[반짝]"
10001070-28 = "3;체리노;02;호오……\n#3;em;…\n#3;m3\n#1;dl"
10001070-29 = "3;체리노;03;그것참 좋은 생각이구나!\n#3;em;[음표]"
10001070-30 = "3;체리노;99;학생들이 어떻게 생활하는지 파악하는 것 또한 지도자의 책무! #n가끔은 직무를 내려놓고 학생의 입장에서 거리를 시찰하는 것도 중요하겠지."
10001070-31 = "3;체리노;05;……절대로 놀고 싶어서 이러는 게 아니니까!\n#3;hophop"
10001070-32 = "3;체리노;99;어흠.\n#3;stiff"
10001070-33 = "3;체리노;01;우선은 저기에 있는 케이크 가게를 시찰하도록 하지. #n서두르게, 콤라드!\n#3;em;[!]"
10001070-34 = "#all;hide"
10001070-35 = "3;체리노;99\n#3;greeting\n#3;a\n#wait;1000"
10001070-36 = "3;체리노;99\n#3;greeting\n#wait;1000"
10001070-37 = "3;체리노;03;우물우물…… #n하아~ 맛있어~\n#3;em;[음표]"
10001070-38 = "3;체리노;03;이 가게의 미다비크는 정말 달콤하구나! 이거라면 얼마든지 먹을 수 있겠어!"
10001070-39 = "3;체리노;03\n1;토모에;02;체리노 쨩, 수염에 크림이 묻었어요.\n#1;em;[반응]\n#1;ar\n#1;h\n#3;h"
10001070-40 = "3;체리노;04\n1;토모에;01\n#1;h\n#3;h\n#1;m2\n#3;m4\n#wait;1000"
10001070-41 = "1;토모에;02\n3;체리노;01;우웃, 이 몸은 어린아이가 아니니라! 멋대로 이 몸의 수염에 손을 대지 말거라!\n#1;h\n#3;h\n#3;m5\n#3;hophop"
10001070-42 = "3;체리노;99;그나저나 정신을 차리고 보니 벌써 한 달 치 용돈을 모두 써버리고 말았군. #n이반 쿠팔라…… 이 얼마나 무서운 축제란 말인가.\n#3;em;…\n#3;m3\n#1;dl"
10001070-43 = "3;체리노;02;키보토스의 상인들이 축제 기간을 노려 온갖 달콤한 과자들을 마구 내놓는 이유를 알 것 같기도……."
10001070-44 = "3;체리노;01;자, 그럼 콤라드. 다음에는 어디로 놀러…… 아니 시찰을 갈까?\n#3;em;[반응]"
10001070-45 = "[s] \"저기에 거대한 장작더미가 있어.\""
10001070-46 = "3;체리노;02;……장작더미?\n#3;em;[?]"
10001070-47 = "3;체리노;01;아아, 저건 장작더미가 아니라 <용역부>에서 설치 중인 이반 쿠팔라 제단일 것이다!"
10001070-48 = "3;체리노;03;이번 축제를 기념하여 거대한 봄맞이 인형을 태울 수 있는 제단을 설치하도록 내가 친히 지시했었지!\n#3;em;[재잘]\n#3;hophop"
10001070-49 = "[s] \"하지만 여전히 장작더미처럼 보이는걸.\""
10001070-50 = "3;체리노;01\n#3;m4\n#wait;1500"
10001070-51 = "3;체리노;02;그건…… 그렇군. 제단이라고 하기에는 장식물이 하나도 달려있지 않으니…….\n#3;em;[반응]\n#3;m4"
10001070-52 = "3;체리노;01;축제까지는 얼마 남지도 않았는데 어째서 아직도 제단이 저 모양인 거지?"
10001070-53 = "3;체리노;05;게으름 피우는 거냐? 사보타주인 거냐고!\n#3;em;[빠직]\n#3;hophop\n#3;m3"
10001070-54 = "1;토모에;02;진정하세요, 회장님. 무언가 오해가 있었을지도 모릅니다.\n#3;m5\n#1;ar"
10001070-55 = "3;체리노;05;오해는 무슨! 기한 내에 일을 마치지 못하는 무능한 학생은 우리 붉은겨울 학원에는 필요없느니라! 모두 숙청이야, 숙청!\n#3;hophop"
10001070-56 = "1;토모에;01;회장님께서 제단을 설치하라고 지시하신 곳은 이곳이 아니라 사무국 건물 앞의 광장입니다. 이곳에 있는 구조물은 이반 쿠팔라와는 관계가 없습니다."
10001070-57 = "3;체리노;02;그, 그런가? 그럼 저 장작더미는 도대체 뭐지?"
10001070-58 = "3;체리노;01;마침 그 앞에 용역부 학생들이 모여 있으니 물어봐야겠군."

[translation]
10001070-1 = "Episode 7;Pudding for the Proletariat!"
10001070-2 = "Red Winter Academy Main Street"
10001070-3 = "Hey, got any special plans for the holiday?"
10001070-4 = "Nah, I'm just going to spend the festival with my family back home."
10001070-5 = "Aw, come on! It's a holiday, we should be hanging out downtown or something!"
10001070-6 = "Plus, I hear the student council is holding a big bonfire at an intersection in District 3!"
10001070-7 = "Maybe we'll meet some special someones there. Heehee..."
10001070-8 = "Ah, well, I guess I could make a little room to hang out..."
10001070-9 = "..."
10001070-10 = "Hmph... Just horrible! I don't like them at all!"
10001070-11 = "What's wrong, President Cherino?"
10001070-12 = "Look at them! Look at all the Red Winter students prancing down the streets because of the festival!"
10001070-13 = "While they're having the time of their lives, I, the most powerful person at this academy, am suffering... No job, no snacks, and no nap!"
10001070-14 = "This is so unfair!"
10001070-15 = "They need to know my pain! All these festival lovers will be in the fields pulling weeds for a month!"
10001070-16 = "[s] \"But how can you do that if you aren't president?\""
10001070-17 = "Oh... You have a point."
10001070-18 = "In that case, I'll get the names of all these festivalgoers so I can punish them when I'm president again!"
10001070-19 = "Chief Secretary Tomoe, record the names of the students who just passed by!"
10001070-20 = "But President Cherino, aren't you the one who wanted every single student to enjoy the festival?"
10001070-21 = "Your social capital will surely fall if you retract your orders on a whim."
10001070-22 = "B-But it's not fair! Why am I the only one who can't enjoy the festival?"
10001070-23 = "I can't stand the sight of unfairness! We believe in freedom and equality here!"
10001070-24 = "Well, since we're here, why don't we enjoy the festival with the students?"
10001070-25 = "What do you mean?"
10001070-26 = "As president, you've always had to direct these events, so you've probably never had the chance to actually enjoy a festival with the other students."
10001070-27 = "Perhaps enjoying the festival like a normal student will give you insight for planning the next one."
10001070-28 = "Oh..."
10001070-29 = "That's a wonderful idea!"
10001070-30 = "Understanding your subordinates is yet another duty of a leader! It's important to put down your work and see life from a student's point of view!"
10001070-31 = "...And I surely won't use this as an excuse to goof off!"
10001070-32 = "All right."
10001070-33 = "The first place that requires investigation must be that cake shop there! Full speed ahead, Comrade!"
10001070-37 = "*munch munch* Wow... This is so good!"
10001070-38 = "The honey in this medovik is so sweet! I could eat this every day!"
10001070-39 = "Cherino, you have some cream in your mustache."
10001070-41 = "Tomoe! I'm not a child! Don't go touching my mustache whenever you please!"
10001070-42 = "Mustache faux pas aside, I just realized that I blew all my spending money for this month. The Ivan Kupala is a danger to my wallet's safety..."
10001070-43 = "Now it's obvious why all the merchants in Kivotos break out their sweets for the festival."
10001070-44 = "Okay, Comrade. Where should we hang out—I mean, investigate—next?"
10001070-45 = "[s] \"Check out that huge pile of firewood.\""
10001070-46 = "Firewood?"
10001070-47 = "Oh, that's not firewood. That's probably the altar the Labor Party is constructing!"
10001070-48 = "I personally instructed them to construct an altar for the traditional burning of the giant springtime doll."
10001070-49 = "[s] \"It still just looks like a pile of firewood.\""
10001070-51 = "Well... You're not wrong. It's not much of an altar without any decorations..."
10001070-52 = "The festival will be beginning soon, so why is it not done yet?"
10001070-53 = "Those lazy bums! Are they trying to sabotage the festival?"
10001070-54 = "Calm down, President. Perhaps there's been a misunderstanding."
10001070-55 = "A misunderstanding?! Layabouts that don't finish their work on time have no place at our academy! Demerits all around!"
10001070-56 = "But this isn't where you told them to set up the altar. That would be the square in front of the secretariat building. This structure must have nothing to do with the festival."
10001070-57 = "R-Really? Then what's up with that pile of scrap wood?"
10001070-58 = "There are some students from the Labor Party gathered nearby. Let's ask them."
10001070-61 = "Hello, my fellow comrades! How is work going...?"
10001070-67 = "We are slaves to no one! We shall be the masters of the world!"
10001070-70 = "YEAAAH!"
10001070-72 = "Wh-What the heck is going on...?"
10001070-73 = "Comrades, the Ivan Kupala begins in just a few days."
10001070-74 = "But what is Ivan Kupala if not a time to celebrate the bounty of nature, to throw away winter's salted meat and bread and enjoy the fresh fruits of the sun?"
10001070-75 = "The students of Red Winter are no exception to this tradition. We have the right to enjoy the festival!"
10001070-76 = "Hear, hear!"
10001070-77 = "Let us celebrate too!"
10001070-78 = "But instead of enjoying the holiday, we're forced to work double shifts day in and out in the freezing cold!"
10001070-79 = "This is a blatant violation of Red Winter Academy's values of freedom and equality, so we denounce the secretariat!"
10001070-80 = "YEAH!"
10001070-81 = "Get outta here!"
10001070-82 = "President Cherino and the other executives must guarantee the rights of the Labor Party!"
10001070-83 = "Until we're guaranteed plenty of rest, additional pay, and, uh...two puddings, the strike will continue!"
10001070-84 = "YEAAAH!"
10001070-86 = "Let's strike!"
10001070-88 = "Wait, wait, wait! Who said you could organize for protests?!"
10001070-89 = "Engaging in this conduct without express permission from the secretariat is grounds for demerits! You'll all be punished brutally for insubordination!"
10001070-90 = "...President Cherino?"
10001070-91 = "I don't know what you're doing here, but this is a great chance!"
10001070-92 = "Comrades! Seize the treacherous President Cherino and tie her to a stake!"
10001070-101 = "W-Wait a second! Let go of me! Don't you know who I am?!"
10001070-103 = "D-Did you say stake just now? I thought this was an altar, but it really is just firewood?"
10001070-105 = "...Y-You're not thinking of burning me at the stake, are you?!"
10001070-107 = "Huh...? This may be a revolution, but we'd never do something so terrible."
10001070-109 = "However, you're still a horrible leader that shoves all her work onto us! Your reign of oppression must come to an end! "
10001070-111 = "Comrades! Let's display this humiliated despot in the streets of our academy as a symbol of our new future!"
10001070-113 = "YEAH!"
10001070-115 = "Kick her out! Kick her out!"
10001070-117 = "W-Wait! You're going to break my arm if you tie me up like that!"
10001070-119 = "Ouch! C-Comrade! Tomoe! Help me!"

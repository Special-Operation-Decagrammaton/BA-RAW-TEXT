[translation]
84303100300-6 = "啊，找到了。原來在這裡啊。"
84303100300-7 = "莉央，發生了什麼事嗎？"
84303100300-8 = "不，並沒有發生什麼問題。#n之所以聯絡你，是因為我找到「可疑之處」了。"
84303100300-9 = "是指健身中心嗎？"
84303100300-13 = "不……從現在這個情況來看，應該是又找到別的地方了吧。"
84303100300-14 = "沒錯，而且我希望百合園聖亞你可以過去一趟。"
84303100300-15 = "原來如此。#n如果你不介意讓我去的話，對我來說也是個好消息……"
84303100300-19 = "呃，我不是那個意思。#n為了避免你誤會，所以先跟你說一聲。"
84303100300-20 = "謝謝你。你的體貼確實很有幫助。"
84303100300-21 = "那麼就麻煩你前往「遊戲開發部」。#n根據計算，那邊應該不久後就會發生狀況了。"
84303100300-22 = "知道了。我現在就過去。"
84303100300-26 = "……莉央。"
84303100300-27 = "嗯？怎麼了？"
84303100300-28 = "…………"
84303100300-29 = "……謝謝你。"
84303100300-33 = "……不客氣。"
84303100300-34 = "那就拜託你了，百合園聖亞。"

[translation]
84303100300-6 = "อ๊ะ หาเจอแล้ว มาอยู่ตรงนี้เองสินะคะ"
84303100300-7 = "มีเรื่องอะไรเหรอคะ ริโอะ?"
84303100300-8 = "เปล่าหรอก ทางนี้ไม่มีปัญหาอะไรเป็นพิเศษ ที่ฉันติดต่อไปก็เพราะฉันเจอ 'สถานที่ที่น่าสงสัย' น่ะ"
84303100300-9 = "หมายถึงฟิตเนสเซ็นเตอร์หรือเปล่าคะ?"
84303100300-13 = "ไม่สิ ในสถานการณ์อย่างนี้แล้ว คนอย่างคุณจะต้องหาสถานที่อื่นได้เพิ่มสินะคะ"
84303100300-14 = "เป็นอย่างนั้นละ และฉันก็อยากให้คุณไปยังสถานที่นั้นหน่อย ยูริโซโนะ เซอา"
84303100300-15 = "อย่างนั้นสินะคะ ถ้าคุณไว้ใจให้คนอย่างฉันไปทำ ฉันก็จะดีใจค่ะ"
84303100300-19 = "ไม่สิ ฉันไม่ได้หมายความอย่างนั้นค่ะ ฉันแค่บอกไว้ล่วงหน้า เผื่อว่าคุณจะเข้าใจอะไรผิดน่ะค่ะ"
84303100300-20 = "ขอบใจนะ การใส่ใจในเรื่องนั้นเป็นประโยชน์มากเลยละ"
84303100300-21 = "ยังไงก็เถอะ ฉันอยากให้คุณช่วยไปที่ <ชมรมพัฒนาเกม> ถ้าการคาดการณ์ของฉันถูกต้อง ในไม่ช้าจะเกิดเรื่องบางอย่างขึ้นที่นั่น"
84303100300-22 = "เข้าใจแล้วค่ะ ฉันจะไปเดี๋ยวนี้เลยค่ะ"
84303100300-26 = "ริโอะ..."
84303100300-27 = "หืม? มีอะไรเหรอ?"
84303100300-28 = "..."
84303100300-29 = "ขอบคุณนะคะ..."
84303100300-33 = "ไม่หรอก..."
84303100300-34 = "งั้นก็รบกวนด้วยนะ ยูริโซโนะ เซอา"

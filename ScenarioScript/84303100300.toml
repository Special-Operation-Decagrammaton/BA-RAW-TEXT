[translation]
84303100300-6 = "Ah, there you are."
84303100300-7 = "Did something happen?"
84303100300-8 = "Not as such, on our side, but I did come across something suspicious."
84303100300-9 = "Are you referring to the Fitness Center?"
84303100300-13 = "...No, by now, you've likely spotted something else."
84303100300-14 = "Right you are, and I want you to go there."
84303100300-15 = "I see. If I can be of help, I'm glad, but..."
84303100300-19 = "...Ah, pardon me. I didn't mean to sound unenthused."
84303100300-20 = "Thank you. I appreciate your consideration."
84303100300-21 = "Anyway, I'd like you to head over to the Game Development Department. If I'm right, there's something about to happen there."
84303100300-22 = "All right. I'll go there right now."
84303100300-26 = "And Rio..."
84303100300-27 = "Huh? What is it?"
84303100300-28 = "..."
84303100300-29 = "...Thank you."
84303100300-33 = "...Don't mention it."
84303100300-34 = "Good luck, Yurizono Seia."

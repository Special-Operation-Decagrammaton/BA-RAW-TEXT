[translation]
2001003-1 = "#Title;온천 수행 - 욕탕 정비 편"
2001003-2 = "#Place;샬레 생활관"
2001003-3 = "#na;(업무를 마치고 생활관으로 돌아오니, 이번에도 노도카가 온천장의 여주인 차림으로 기다리고 있었다.)"
2001003-4 = "3;노도카 온천ND;03;어서 오세요, 선생님. 기다리고 있었습니다.\n#3;em;[반응]\n#3;a"
2001003-5 = "3;노도카 온천ND;01;추운 날씨에 밖에서 업무를 보시느라 고생이 많으셨습니다."
2001003-6 = "3;노도카 온천ND;08;괜찮으시다면 바로 따듯한 목욕물을 준비하겠습니다.\n#3;em;[반짝]\n#3;greeting"
2001003-7 = "#st;[0,0];instant;1;"
2001003-8 = "#clearST"
2001003-9 = "#wait;3000"
2001003-10 = "[ns] \"……무얼 하고 있는 거야?\""
2001003-11 = "3;노도카 온천ND;09;이미 몇 번이나 말씀드렸잖아요? 온천 수행 중이라고요!\n#3;stiff\n#3;em;[빠직]"
2001003-12 = "3;노도카 온천ND;99;흠, 흠……."
2001003-13 = "3;노도카 온천ND;01;전에도 말씀드렸지만, 훌륭한 욕탕이 있는 온천장이라면 손님은 자연히 모여드는 법."
2001003-14 = "3;노도카 온천ND;08;그래서 오늘은 227호 온천장에 다시 온천수가 터질 때를 대비해 탕을 정비하는 수행을 하고 있었답니다."
2001003-15 = "[s] \"하지만 샬레에는 온천이 나오지 않는 걸…….\""
2001003-16 = "3;노도카 온천ND;01;물론 그 사실은 늘 지켜보고 있었기 때문에 잘 알고 있어요.\n#3;em;[반응]"
2001003-17 = "3;노도카 온천ND;02;하지만 샬레에도 여러 사람이 함께 목욕할 수 있는, 제법 큰 규모의 욕탕이 있잖아요?"
2001003-18 = "3;노도카 온천ND;03;오늘은 그 욕탕을 227호 온천장의 탕이라고 생각하며 열심히 정비해 두었답니다.\n#3;greeting\n#3;em;[반짝]"
2001003-19 = "3;노도카 온천ND;99;바닥을 깨끗이 청소하기도 하고, 부족한 목욕용품을 채워 두기도 하고……."
2001003-20 = "[s] \"하지만…….\""
2001003-21 = "3;노도카 온천ND;02;아, 선생님이 좋아하시는 입욕제는 후츠후츠 사(社)의 라벤더 향 탄산 입욕제였죠? 전에 잡화점에서 같은 걸 여러 개 사시는 걸 보았어요.\n#3;em;[반응]"
2001003-22 = "3;노도카 온천ND;01;찾으실 줄 알고 미리 준비해 두었답니다."
2001003-23 = "3;노도카 온천ND;03;미리 물에 풀어 두면 향이 날아갈 수도 있으니, 탕에 들어가시기 직전에 사용해주세요!\n#3;em;[음표]\n#3;hophop"
2001003-24 = "[s] \"그게 그러니까…….\""
2001003-25 = "3;노도카 온천ND;01;물 온도는 40도면 괜찮을까요? 이 시간에 목욕을 하실 때는 늘 고온의 물로 피로를 푸셨던 것 같아서요.\n#3;em;[?]\n#3;m4"
2001003-26 = "3;노도카 온천ND;11;30분 전에 온수를 틀어 두었으니 지금쯤이면 알맞게 식었을 거예요."
2001003-27 = "3;노도카 온천ND;10;자, 그럼 어서 옷을 갈아입고 탕에 들어가 주세요! 하아, 하아…….\n#3;em;[///]\n#3;stiff"
2001003-28 = "[s1] \"말을 좀 들어, 노도카.\"\n[s2] \"오늘은 건물 공사로 온수가 나오지 않아.\""
2001003-29 = "#st;[0,0];instant;1;"
2001003-30 = "#st;[0,0];instant;1;"
2001003-31 = "#clearST"
2001003-32 = "3;노도카 온천ND;02\n#3;m3\n#3;em;…\n#wait;2500"
2001003-33 = "3;노도카 온천ND;04;네, 네에?! 온수가 나오지 않는다고요?\n#3;em;[?!]\n#3;shake"
2001003-34 = "3;노도카 온천ND;21;어쩐지 청소 중에 받은 온수가 이상하리만큼 미지근하더니만……."
2001003-35 = "3;노도카 온천ND;06;이를 어쩌죠. 욕탕을 정비하며 검댕을 잔뜩 뒤집어썼는데…….\n#3;em;[땀]\n#3;stiff"
2001003-36 = "[s] \"어, 음. 수고했어…….\""
2001003-37 = "3;노도카 온천ND;32;우으, 선생님이 먼저 탕에 들어가시기를 기다리고 있었는데…….\n#3;em;…"
2001003-38 = "3;노도카 온천ND;06;선생님이 탕을 쓰고 나오시면 남은 물을 느긋하게 혼자 만끽하려 했었는데……"
2001003-39 = "3;노도카 온천ND;34;아무래도 오늘은 운이 나빴나 봐요…….\n#3;em;[속상함]\n#3;stiff"
2001003-40 = "3;노도카 온천ND;32;혹시 이 근처에 다른 욕탕은 없을까요……?"
2001003-41 = "#all;hide"
2001003-42 = "#na;(결국 샬레 근처의 대중목욕탕을 찾아 목욕을 했다…….)"
2001003-43 = "#na;(왠지 실망한 노도카를 위해 목욕을 마치고 커피 우유 하나를 사주었다.)"

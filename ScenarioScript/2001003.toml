[translation]
2001003-1 = "修行．清掃篇"
2001003-2 = "夏萊．居住區"
2001003-3 = "（結束工作回到夏萊居住區之後，和香同樣以溫泉浴場女將的打扮等待著）"
2001003-4 = "歡迎回來，老師。"
2001003-5 = "天氣這麼冷，今天也辛苦您了。"
2001003-6 = "如果您不介意的話，我已經放好溫暖的洗澡水了……"
2001003-10 = "[ns] 「呃……」"
2001003-11 = "跟之前說的一樣，我是來進行溫泉培訓的！"
2001003-12 = "所以說，咳哼。重來一次……"
2001003-13 = "之前我也說過了，一個出色的溫泉浴場必須要有好的溫泉和好的澡堂。"
2001003-14 = "所以今天，為了227號溫泉浴場重新開張的那一天，我想進行打掃澡堂的訓練。"
2001003-15 = "[s] 「但夏萊沒有溫泉吧……？」"
2001003-16 = "是的，這點我當然知道。因為和老師有關的任何事，我都觀察得一清二楚。"
2001003-17 = "夏萊雖然沒有溫泉，但是有可以讓很多人一起洗澡的大型澡堂對吧？"
2001003-18 = "我今天把它當作227號溫泉浴場的澡堂，努力地清掃了一遍！"
2001003-19 = "地板清理得非常乾淨，快要用完的沐浴用品也進行了補充……"
2001003-20 = "[s] 「謝，謝謝。但是其實……」"
2001003-21 = "啊，老師最近喜歡的入浴劑是沸沸公司的碳酸入浴劑對吧？薰衣草味的。"
2001003-22 = "我想或許在今天這種勞累的時候會用到，所以事先幫您準備好了。"
2001003-23 = "因為如果事先加入的話香味可能會散去，所以還沒加進去。#n就放在浴缸的旁邊，麻煩您自己加吧！"
2001003-24 = "[s] 「那個，和香？」"
2001003-25 = "溫度大約40度可以嗎？#n根據我先前的觀察，老師如果在這個時間泡澡，都是用這個溫度的熱水來消除疲勞。"
2001003-26 = "因為已經計算過時間提前開始放熱水，我想現在水溫應該差不多了。"
2001003-27 = "好了好了！請老師快點換衣服去洗澡吧！#n我會在老師身邊偷……守護老師的！哈啊，哈啊……！"
2001003-28 = "[s1] 「和香，可以聽我說句話嗎？」\n[s2] 「今天因為施工的關係，應該不會有熱水才對……」"
2001003-33 = "……咦咦！？"
2001003-34 = "難，難怪，在打掃的時候用的熱水好像也都很冷……"
2001003-35 = "怎，怎麼辦……其實在整理澡堂時，我也弄得全身髒兮兮的……"
2001003-36 = "[s] 「呃，辛苦你了……」"
2001003-37 = "嗚嗚，我本來還在等老師先進去泡澡的……"
2001003-38 = "這樣在老師泡完後，我就能獨自享受剩下的洗澡水了……"
2001003-39 = "本來以為今天一定會很順利的……好失望。"
2001003-40 = "那個，老師。這附近，有其他可以洗澡的地方嗎……？"
2001003-42 = "（最後找了一間離夏萊還算近的大眾澡堂，一起去那邊洗澡）"
2001003-43 = "（為了安慰失落的和香，洗完澡後買了一罐咖啡牛奶給他）"

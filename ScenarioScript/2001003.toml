[translation]
2001003-1 = "การฝึกดูแลออนเซ็น - ภาคซ่อมบำรุงบ่อออนเซ็น"
2001003-2 = "ที่พักชาเล่ต์"
2001003-3 = "(คุณครูกลับมาถึงที่พักหลังจากเสร็จงาน ก็พบกับโนโดกะที่แต่งชุดผู้ดูแลออนเซ็นยืนรออยู่เช่นเคย)"
2001003-4 = "เชิญค่ะคุณครู ฉันกำลังรออยู่เลยค่ะ"
2001003-5 = "เหนื่อยหน่อยนะคะคุณครูที่ต้องออกไปทำงานในสภาพอากาศที่หนาวเย็นแบบนี้"
2001003-6 = "ถ้าคุณครูไม่ว่าอะไร... ฉันจะไปเตรียมน้ำร้อนให้อาบน้ำนะคะ"
2001003-10 = "[ns] \"คราวนี้ทำอะไรอีกล่ะ?\""
2001003-11 = "ฉันบอกคุณครูไปแล้วนี่คะ ฉันกำลังฝึกการดูแลออนเซ็นอยู่ค่ะ"
2001003-12 = "อืม..."
2001003-13 = "อย่างที่ฉันเคยบอกไปแล้ว ถ้าเป็นออนเซ็นที่มีบ่อแช่น้ำร้อนที่ดี ลูกค้าก็จะมาใช้บริการของเราเองค่ะ"
2001003-14 = "ดังนั้นวันนี้... ฉันจะมาฝึกซ่อมบ่อออนเซ็นเตรียมไว้เผื่อไว้ตอนที่บ่อน้ำร้อนที่ออนเซ็น No.227#nเกิดชำรุดอีกค่ะ"
2001003-15 = "[s] \"แต่ที่ชาเล่ต์ไม่มีออนเซ็นหรอกนะ...\""
2001003-16 = "เรื่องนั้นฉันทราบดีค่ะ ก็ฉันคอยส่องคุณครูมาตลอดนี่คะ..."
2001003-17 = "แต่ว่าที่ชาเล่ต์มีอ่างอาบน้ำขนาดใหญ่ที่สามารถลงแช่ได้หลายๆ คนอยู่ใช่ไหมล่ะคะ?"
2001003-18 = "เพราะงั้นวันนี้ฉันจะสมมติว่าอ่างนั่นคือบ่อออนเซ็นแทนค่ะ"
2001003-19 = "ฉันจะทำความสะอาดพื้นบ่อให้สะอาด และเติมอุปกรณ์อาบน้ำที่ขาดไป..."
2001003-20 = "[s] \"แต่ว่า...\""
2001003-21 = "อ๊ะ คุณครูชอบบาธบอมบ์กลิ่นลาเวนเดอร์ของฟุสึฟุสึใช่ไหมคะ? ฉันเคยเห็นคุณครูซื้อมาพร้อมกัน#nเยอะมากๆ ค่ะ"
2001003-22 = "ฉันคิดว่าคุณครูอาจจะหามันอยู่ เพราะงั้นฉันเลยเตรียมมาไว้ล่วงหน้าแล้วค่ะ"
2001003-23 = "ถ้าเอาไปผสมไว้ในน้ำก่อน กลิ่นก็อาจจะจางไปเร็วได้ เพราะงั้นต้องใช้ตอนที่จะลงอาบน้ำนะคะ!"
2001003-24 = "[s] \"คือว่าเรื่องนั้น...\""
2001003-25 = "อุณหภูมิน้ำประมาณ 40 องศาพอไหมคะ? เวลาแบบนี้... ลงแช่น้ำที่อุณหภูมิสูงหน่อยจะช่วยให้#nคลายความเหนื่อยล้าได้ดีค่ะ"
2001003-26 = "ฉันเปิดน้ำไว้ก่อนประมาณ 30 นาทีแล้วค่ะ ตอนนี้น้ำน่าจะร้อนพอเหมาะแล้วค่ะ"
2001003-27 = "เอาละค่ะคุณครู ส่งเสื้อคลุมมาให้ฉันเถอะค่ะ! แฮ่ก... แฮ่ก..."
2001003-28 = "[s1] \"ฟังที่ครูพูดหน่อยสิโนโดกะ\"\n[s2] \"วันนี้มีการซ่อมบำรุงอาคาร น้ำร้อนไม่ไหลหรอก\""
2001003-33 = "คะ?! น้ำร้อนไม่ไหลเหรอคะ?"
2001003-34 = "มิน่าล่ะ น้ำที่ใช้ทำความสะอาดรู้สึกแค่อุ่นๆ เอง..."
2001003-35 = "ทำยังไงดีล่ะคะ ตอนซ่อมบ่อออนเซ็น ตัวฉันเปื้อนเขม่าสีดำเต็มไปหมดเลย..."
2001003-36 = "[s] \"เอ่อ... อืม... เหนื่อยหน่อยนะ\""
2001003-37 = "ฮือ... ฉันกำลังรอให้คุณครูลงไปแช่ในอ่างอยู่แท้ๆ..."
2001003-38 = "พอคุณครูแช่น้ำเสร็จแล้ว ฉันก็กะว่าจะลงไปแช่น้ำต่อคนเดียว..."
2001003-39 = "วันนี้ดูเหมือนจะโชคไม่ดีเลยนะคะ..."
2001003-40 = "คือว่าแถวๆ นี้มีโรงอาบน้ำอื่นรึเปล่าคะ...?"
2001003-42 = "(สุดท้ายทั้งคู่ก็ไปอาบน้ำที่โรงอาบน้ำสาธารณะที่อยู่ใกล้ๆ ชาเล่ต์...)"
2001003-43 = "(หลังจากอาบน้ำเสร็จแล้ว คุณครูก็ซื้อกาแฟลาเต้ให้โนโดกะที่ดูมีท่าทางผิดหวังอย่างมาก)"

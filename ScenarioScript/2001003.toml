[translation]
2001003-1 = "Hot Springs Training: Bathtub Repairs"
2001003-2 = "Schale Residence Hall"
2001003-3 = "Upon entering the residence hall, Nodoka was once again waiting for me dressed as a hot spring resort hostess."
2001003-4 = "Welcome, Sensei. I've been waiting for you."
2001003-5 = "You've been working hard outdoors in the cold weather."
2001003-6 = "If it pleases you, I'll prepare a warm bath right away."
2001003-10 = "[s] \"...What are you doing?\""
2001003-11 = "How many times do I have to tell you? This is my hot springs training arc!"
2001003-12 = "A-Ahem!"
2001003-13 = "As I said before, guests will naturally flock to a hot springs resort with great baths."
2001003-14 = "So, today, I was training to repair the bathtubs in case there's another flood like the one at Hot Springs Resort No. 227."
2001003-15 = "[s] \"But Schale doesn't have any hot springs...\""
2001003-16 = "I obviously knew that since I'm always watching everything."
2001003-17 = "However, Schale does have a fairly large bathhouse that can accommodate several people, right?"
2001003-18 = "I worked hard to repair this bathtub as if it was a beloved bath of Hot Springs Resort No. 227."
2001003-19 = "So, I cleaned the floors and stocked up bath products that were running low."
2001003-20 = "[s] \"But...\""
2001003-21 = "Your favorite bath bomb is the Futsu Futsu Company lavender-scented fizzy bath bomb! I know, because I've watched you buy them at the general store."
2001003-22 = "I knew you wanted it, so I prepared it in advance."
2001003-23 = "The fragrance may disappear if you let it dissolve, so use it right before you enter the bath!"
2001003-24 = "[s] \"So, the thing is...\""
2001003-25 = "Is it okay if the water temperature is 40 degrees? I know when you take a bath around this time, you tend to relieve your fatigue in hot water."
2001003-26 = "I left the hot water running 30 minutes ago, so it should be the perfect temperature now."
2001003-27 = "Well, then, change out of your clothes and get in the bath! *pant* *pant*"
2001003-28 = "[s1] \"Listen to me, Nodoka.\"\n[s2] \"There is no hot water today because of construction on the building.\""
2001003-33 = "Wh-What?! The hot water is shut off?"
2001003-34 = "No wonder the hot water I used for cleaning felt so lukewarm."
2001003-35 = "Oh no. What do I do? And I'm covered in gunk from cleaning the bathroom."
2001003-36 = "[s] \"Oh, um, thanks for cleaning...\""
2001003-37 = "Ugh, I was waiting for you to take a bath first."
2001003-38 = "And then when you got out, I was going to enjoy a bath by myself with whatever water was left."
2001003-39 = "I guess I'm just unlucky today."
2001003-40 = "Is there another bathhouse around here by any chance?"
2001003-42 = "(In the end, we found a public bathhouse near Schale and took our baths.)"
2001003-43 = "(After the bath, I bought a coffee milk for a disappointed-looking Nodoka.)"

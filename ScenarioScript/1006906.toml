[translation]
1006906-1 = "สบายใจ หายห่วง!"
1006906-2 = "(คุณครูมุ่งหน้าไปที่ย่านการค้าเทพเต่าดำด้วยความสบายใจ)"
1006906-6 = "ย่านการค้าเทพเต่าดำ"
1006906-8 = "มาเร็วกว่าที่คิดเอาไว้เลยนะเนี่ย คุณครู"
1006906-9 = "แต่ก็มาทันเวลาพอดี พวกเรากำลังจะนึ่งเกี๊ยวกันเลยน่ะ"
1006906-10 = "ฉันอยากโชว์ขั้นตอนการห่อเกี๊ยวให้คุณครูดูก็จริง แต่ก็เป็นห่วงนิดหน่อยว่ามันจะเช้าเกินไปรึเปล่า..."
1006906-11 = "งั้นเริ่มกันเลยมั้ย..."
1006906-12 = "ทุกคน! ตั้งหม้อนึ่งได้เลย!"
1006906-18 = "(พอรูมิออกคำสั่ง หม้อนึ่งก็เริ่มมีไอน้ำพ่นออกมาพร้อมกัน)"
1006906-20 = "ไอน้ำอบอวลเต็มไปหมดเลยใช่มั้ยล่ะ?"
1006906-21 = "พอนึ่งเกี๊ยวกันทีไร ห้องครัวก็มักจะกลายเป็นซาวน่าไปเลยแบบนี้แหละ"
1006906-22 = "[s1] \"โห... มันไม่ร้อนไปหน่อยเหรอ?\"\n[s2] \"ระหว่างที่นึ่งเกี้๊ยว ออกไปรอข้างนอกได้มั้ย?\""
1006906-25 = "ก็อยากทำแบบนั้นแหละนะ แต่มันทำไม่ได้นี่สิ"
1006906-26 = "เราต้องคอยสลับหม้อนึ่งอยู่ตลอดน่ะ"
1006906-27 = "ไม่อย่างนั้นเกี๊ยวบางชิ้นจะเต่งจนแป้งแตกและก็สุกไม่ทั่วถึงน่ะ"
1006906-28 = "คุณครูคอยดูจากตรงประตูแล้วกันนะ ส่วนฉันจะอยู่ข้างในคอยดูหม้อนึ่งพวกนี้น่ะ"
1006906-32 = "(คุณครูรออยู่บริเวณทางเข้าตามที่รูมิบอก...)"
1006906-37 = "[ns] \"เอ๊ะ... นะ... นั่นน่ะ รูมิ...?\""
1006906-38 = "หืม? เป็นอะไรไปคุณครู? มีอะไรหรือเปล่า?"
1006906-41 = "― [log=루미]อ่า... ดูสิ ดูเหมือน...จะมองทะลุได้เลย[/log][wa:2600] "
1006906-44 = "― [log=루미]เอาเถอะ ไม่ต้องใส่ใจหรอก มันไม่ได้สึกหรออะไรนี่นะ[/log][wa:1320] "
1006906-47 = "― [log=루미]ถ้ารู้ว่าจะเป็นแบบนี้...[/log][wa:590] "
1006906-49 = "― [log=루미]ฉันคงใส่ชุดชั้นในน่ารักๆ มาแล้วละ[/log][wa:10] "
1006906-52 = "― [log=루미]คิดแล้ว...มันน่าเสียดายมากเลยว่ามั้ย?[/log][wa:580] "
1006906-55 = "― [log=루미]ฮ่ะฮ่า ทำไมเบือนหน้าหนีแบบนั้นล่ะ[/log][wa:1060] "
1006906-57 = "― [log=루미]ฉันไม่ได้คิดอะไรมากสักหน่อย?[/log][wa:820] "
1006906-60 = "― [log=루미]คุณครูมีมุมแบบนั้นด้วย ต่างจากที่ฉันคิดไว้เลยแฮะ...[/log][wa:1150] "
1006906-62 = "― [log=루미]ฮุฮุ โดนใจดีจัง[/log][wa:1280] "
1006906-65 = "― [log=루미]ไม่ใช่เรื่องที่เกิดขึ้นบ่อยๆ นี่นา...[/log][wa:10] "
1006906-67 = "― [log=루미]ฉันทำให้คุณครูว้าวุ่นใจขึ้นอีกหน่อยดีมั้ยนะ…?[/log][wa:10] "
1006906-70 = "เอาละ นึ่งเกี๊ยวเสร็จเรียบร้อยแล้ว"
1006906-71 = "ฉันทำเผื่อคุณครูด้วยนะ มาลองชิมดูก่อนที่จะกลับด้วยล่ะ"
1006906-78 = "[ns3] \"ระ...รูมิ?!\"\n[ns4] \"กะ... เกี๊ยวอันนี้มัน...?!\""
1006906-81 = "หืม? เป็นอะไรเหรอคุณครู"
1006906-82 = "เมื่อไม่นานมานี้ฉันได้ลองกินพายปลาซาร์ดีนจากทรีนิตี้มาละ รสชาติค่อนข้างจะใช้ได้เลย"
1006906-83 = "ฉันเลยเอามาประยุกต์ลองทำเกี๊ยวปลาซาร์ดีนดูบ้างน่ะ!"
1006906-84 = "ได้ยินว่าพายปลาซาร์ดีนอันนั้นเป็นอาหารสูตรลับของโรงเรียนสามัญทรีนิตี้ด้วยนะ"
1006906-85 = "ฉันทำเกี๊ยวขึ้นมาเพื่อคุณครูโดยเฉพาะเลย หวังว่าคุณครูจะกินมันให้อร่อยนะ"
1006906-90 = "[ns5] \"แค่ก... แค่ก...!\"\n[ns6] \"ครูชอบความเป็นมาของมันนะ แต่วัตถุดิบกับรูปทรงนี่สิ...!\""
1006906-94 = "มันมีปัญหาอะไรงั้นเหรอ? ฉันได้ยินพวกนักเรียนอธิบายมาว่า มันคือสูตรอาหารแห่งความภาคภูมิใจที่#nมีกลิ่นอายประวัติศาสตร์และขนบธรรมเนียมของทรีนิตี้เลยนะ..."
1006906-95 = "เอาละ รีบกินเร็วเข้าสิ ฉันพยายามมากเลยนะ รู้มั้ยว่ามันยากแค่ไหนที่จะทำเกี๊ยวแบบนี้ออกมาน่ะ?"
1006906-98 = "[ns] \"ช่วยไม่ได้สินะ...!\""
1006906-100 = "(คุณครูพ่ายแพ้ต่อการรบเร้าของรูมิ เลยต้องจำใจคีบเกี๊ยวปลาซาร์ดีนขึ้นมาด้วยมือที่สั่นระรัว)"
1006906-101 = "(แค่พอคิดว่าจะได้ชิมรสชาติเหนือจินตนาการตัวก็สั่นเทาไปด้วยความกลัว...)"
1006906-106 = "(แต่ว่าเกี๊ยวกลับมีรสอร่อยกว่าที่คิด)"

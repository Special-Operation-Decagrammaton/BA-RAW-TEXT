[translation]
1006906-1 = "Steamed"
1006906-2 = "I returned to the Black Tortoise Promenade with a spring in my step."
1006906-6 = "Black Tortoise Promenade"
1006906-8 = "You're here early, Sensei."
1006906-9 = "Good timing, actually. We were just about to start steaming some dumplings."
1006906-10 = "I'm so glad you came. I was worried this would be too early for you..."
1006906-11 = "Well then... Shall we begin?"
1006906-12 = "Everyone! Light your steamers!"
1006906-18 = "Gouts of steam filled the air at Rumi's command."
1006906-20 = "It's intense, isn't it?"
1006906-21 = "The kitchen practically turns into a sauna whenever we're steaming dumplings."
1006906-22 = "[s1] \"It's...a lot...\"\n[s2] \"Can't you just wait outside while the steaming is being done?\""
1006906-25 = "Believe me, I wish I could step out..."
1006906-26 = "I need to keep an eye on the steamers."
1006906-27 = "Too much heat and the dumplings rupture, but not enough, and they don't cook all the way through."
1006906-28 = "You can watch from the door, Sensei. But I'm staying right here."
1006906-32 = "I took my place by the door as Rumi suggested..."
1006906-37 = "[ns] \"Uh... Hey, Rumi?\""
1006906-38 = "What is it, Sensei? Is something wrong?"
1006906-41 = "― [log=루미]Aah... Look at that. It got a little...see-through.[/log][wa:2080] "
1006906-44 = "― [log=루미]Oh, don't worry about it. A little steam won't kill me.[/log][wa:1080] "
1006906-47 = "― [log=루미]...If I knew this was going to happen,[/log][wa:30] "
1006906-49 = "― [log=루미]I would have worn cuter underwear.[/log][wa:10] "
1006906-52 = "― [log=루미]It's a real shame, you know?[/log][wa:940] "
1006906-55 = "― [log=루미]Haha! You don't have to look away.[/log][wa:1020] "
1006906-57 = "― [log=루미]I don't mind at all.[/log][wa:1140] "
1006906-60 = "― [log=루미]I didn't know there was such a side to you, Sensei...[/log][wa:1070] "
1006906-62 = "― [log=루미]Haha! I like it![/log][wa:1240] "
1006906-65 = "― [log=루미]It's not like this happens very often, so...[/log][wa:10] "
1006906-67 = "― [log=루미]shall I make you even more uncomfortable...?[/log][wa:10] "
1006906-70 = "Whew, all right. The dumplings are done."
1006906-71 = "I made plenty, so please have a bite."
1006906-78 = "[ns3] \"R-Rumi?!\"\n[ns4] \"Th-This dumpling...!\""
1006906-81 = "Hmm? What's the matter?"
1006906-82 = "You see, I tried something called a \"sardine pie\" at Trinity the other day, and it was pretty good."
1006906-83 = "So I thought I'd try making a sardine dumpling!"
1006906-84 = "It turns out that the exact recipe for the pie is some kind of Trinity General School secret..."
1006906-85 = "I made this just for you, so please, enjoy!"
1006906-90 = "[ns5] \"*cough* *cough*...!\"\n[ns6] \"I appreciate the thought, but...\""
1006906-94 = "Is there a problem? The recipe supposedly had something to do with Trinity's history and traditions..."
1006906-95 = "Come on, just one bite! Do you know how hard it is to get a dumpling into that shape?"
1006906-98 = "[ns] \"...Looks like I have no choice!\""
1006906-100 = "I fearfully took up the sardine dumpling..."
1006906-101 = "I trembled at the unimaginable horror I was about to unleash on my palate, but..."
1006906-106 = "It actually wasn't that bad."

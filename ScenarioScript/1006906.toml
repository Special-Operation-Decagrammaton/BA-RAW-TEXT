[translation]
1006906-1 = "我不在意哦？"
1006906-2 = "（踏著輕快的腳步前往玄武商會）"
1006906-6 = "玄武商會"
1006906-8 = "幸好你趕上了，老師。"
1006906-9 = "我正打算要開始蒸餃子呢。"
1006906-10 = "雖然也想讓老師看看包餃子的過程，不過那在早上就結束了。"
1006906-11 = "那麼……開始吧。"
1006906-12 = "大家！點火！"
1006906-18 = "（瑠美一聲令下，蒸籠整齊劃一地噴出了蒸氣）"
1006906-20 = "這股蒸氣很厲害吧？"
1006906-21 = "蒸餃子的時候，廚房簡直跟三溫暖一樣。"
1006906-22 = "[s1]「確實……還挺熱的呢。」\n[s2]「不能在外面等嗎？」"
1006906-25 = "嗯～那有點困難。"
1006906-26 = "因為必須調整蒸籠的位置才行。"
1006906-27 = "否則蒸的程度會不夠均勻的。"
1006906-28 = "太熱的話，老師就到入口那邊去吧。#n我得顧著這些餃子才行。"
1006906-32 = "（按照瑠美所說，在入口附近等待……）"
1006906-37 = "[ns]「那個……瑠，瑠美？」"
1006906-38 = "……嗯？老師，怎麼了嗎？"
1006906-41 = "― [log=루미]啊……這樣啊。有點透是嗎。[/log][wa:3600] "
1006906-44 = "― [log=루미]嘛，不用在意哦。反正也沒什麼損失。[/log][wa:2600] "
1006906-47 = "― [log=루미]……早知道會這樣的話，[/log][wa:1110] "
1006906-49 = "― [log=루미]就穿更可愛的內衣來了。[/log][wa:420] "
1006906-52 = "― [log=루미]好像，有點可惜？[/log][wa:1740] "
1006906-55 = "― [log=루미]哈哈，移開視線了。[/log][wa:2020] "
1006906-57 = "― [log=루미]我一點都不在意哦？[/log][wa:1580] "
1006906-60 = "― [log=루미]老師你意外地還有這一面呢……[/log][wa:2630] "
1006906-62 = "― [log=루미]呵呵，我喜歡。[/log][wa:1600] "
1006906-65 = "― [log=루미]反正事已至此，[/log][wa:800] "
1006906-67 = "― [log=루미]要不要讓你更為難一點呢……？[/log][wa:740] "
1006906-70 = "好，做得很不錯。"
1006906-71 = "至於老師的份，我做了「特別」的版本哦。"
1006906-78 = "[ns3]「瑠，瑠美！？」\n[ns4]「這，這個是……！？」"
1006906-81 = "嗯～？怎麼了嗎？"
1006906-82 = "之前我在三一吃了一種叫做仰望星空派的料理。#n味道還挺不錯的！"
1006906-83 = "所以我也試著做了類似的「仰望星空餃」哦！"
1006906-84 = "聽說仰望星空派在三一也是秘傳的菜色。#n味道我可以掛保證。"
1006906-85 = "這是為老師做的「特別的」餃子……你會好好享用吧？"
1006906-90 = "[ns5]「咕哈……！」\n[ns6]「我很開心，不過這實在有點……！」"
1006906-94 = "怎麼了？這可是蘊含三一傳統和歷史的料理哦？#n雖然做了一點自家風格的調整。"
1006906-95 = "來，快吃吃看吧。#n要維持……這個沙丁魚的形狀可是很困難的呢。"
1006906-98 = "[ns]「咳哼！？」"
1006906-100 = "（在瑠美的催促下，戰戰兢兢地將筷子伸向了餃子，硬是將其放入了口中）"
1006906-101 = "（就在以為將遇見超乎想像味道的瞬間……）"
1006906-106 = "（卻美味得令人難以忘懷）"

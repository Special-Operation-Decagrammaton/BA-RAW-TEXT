[translation]
13050-1 = "ตอนที่ 5;ทางรถไฟข้ามทะเลทราย"
13050-2 = "ได้เข้ามาแล้ว แค่นี้ก็มีชัยไปกว่าครึ่ง"
13050-3 = "อะไรเนี่ย ทำไมแคบแบบนี้? จะให้พวกเรานั่งที่ไหน? ตรงนั้นเหรอ?"
13050-8 = "......"
13050-10 = "ท่านผู้บริหาร อย่าเที่ยวค้นห้องชมรมของคนอื่นตามอำเภอใจสิ นั่งให้มันสงบเสงี่ยมหน่อย แล้วก็เลิกหาตู้เย็นได้แล้ว"
13050-11 = "ห้ามกระโดดบนเก้าอี้ด้วย..."
13050-12 = "อะ... เอ่อ..."
13050-13 = "ขอโทษที่เสียมารยาทนะ ที่นี่คือห้องชมรมคณะกรรมการแผนงานของโรงเรียนอะบิดอสใช่มั้ย?"
13050-26 = "ฉันไม่รู้หรอกว่ารุ่นพี่คิดจะทำอะไร... แต่ตอนนี้อดทนไว้ก่อนนะ รุ่นพี่ชิโรโกะ"
13050-27 = "เปล่า... ไม่ได้จะทำอะไร"
13050-29 = "ใช่ค่ะ พวกฉันคือคณะกรรมการแผนงาน"
13050-30 = "มาหาถูกคนแล้วละ งั้นก็มาเข้าเรื่องกันเลย ท่านผู้บริหารไฮแลนเดอร์"
13050-35 = "ขนมอันนี้กินได้มั้ย? "
13050-36 = "อะไรกัน คนที่นี่ไม่เสิร์ฟชาให้แขกหน่อยเหรอ?"
13050-38 = "อ๊ะ... ชาเหรอคะ รอเดี๋ยวนะคะ "
13050-39 = "ไม่ต้องหรอก เดี๋ยวก็กลับแล้วละ"
13050-40 = "อ้าว?"
13050-41 = "ท่านผู้บริหาร ทำความเข้าใจสถานการณ์บ้างสิ อย่างน้อยก็ต้องรู้รึเปล่าว่าเราไม่ได้อยู่ในสถานะที่ควร#nได้รับการต้อนรับ"
13050-42 = "คนพวกนี้คือคนที่ต่อสู้กับไคเซอร์เพื่อทวงเอาที่ดินของตัวเองกลับมานะ"
13050-43 = "ส่วนพวกเราตอนนี้ก็เหมือนมาอยู่ในตู้ดินปืนที่จะระเบิดเมื่อไรก็ไม่รู้"
13050-50 = "อืม..."
13050-52 = "แต่ก็ไม่ต้องกังวลหรอก เพราะถ้าเกิดการต่อสู้ ฉันชนะได้หมดอยู่แล้ว"
13050-60 = "รุ่นพี่ชิโรโกะ ใจเย็นๆ ไว้ก่อนนะ หายใจเข้าลึกๆ!"
13050-66 = "ไม่หรอก ฉันไม่ได้รู้สึกอะไร..."
13050-67 = "ซะที่ไหนล่ะ! หัวร้อนจนควันขึ้นแล้วนะ ยังมาแกล้งเหมือนไม่เป็นอะไรอีก"
13050-68 = "อะ... อืม..."
13050-72 = "[ns1] \"เอาละๆ เข้าเรื่องเลยดีกว่า สุโอ\"\n[ns2] \"มีเรื่องอยากอธิบายให้คณะกรรมการแผนงานฟังใช่มั้ย?\""
13050-75 = "ใช่"
13050-76 = "คุณเป็นครูของชาเล่ต์ใช่มั้ย? ขอโทษด้วยที่ฉันเสียมารยาทไปเมื่อก่อนหน้านี้"
13050-77 = "เราจะอธิบายสถานการณ์ให้ฟังก่อน... แต่ว่าฉันไม่ใช่คนที่จะอธิบายหรอกนะ เป็นคนอื่นน่ะ"
13050-78 = "(ซ่า)... ตรวจสอบเรียบร้อยแล้ว ที่นี่ปลอดภัยดี เข้ามาได้"
13050-79 = "แค่ก แค่ก ค่อยยังชั่วหน่อยนะครับ ฝุ่นทรายตรงนี้รุนแรงมากๆ เลย"
13050-80 = "ไม่อยากอยู่ตรงนี้เลย รีบๆ เข้าไปเถอะ"
13050-81 = "อะ... อะไรน่ะ? เจ้าพวกนี้?"
13050-82 = "ระวังคำพูดไว้หน่อยจะดีกว่านะ คนพวกนี้คือเจ้าหนี้ของพวกเธอ"
13050-83 = "เจ้าหนี้งั้นเหรอ..."
13050-84 = "ว่าไงนะ? จะ... เจ้าหนี้...? นี่เธอเรียกเจ้าหนี้เข้ามาที่นี่เหรอ?!"
13050-85 = "เซริกะจัง... สงบเสงี่ยมหน่อยค่ะ..."
13050-86 = "ใช่แล้วค่ะ น่าจะเป็นพวกคนที่ซื้อพันธบัตรไปในครั้งนี้นะคะ"
13050-87 = "[s] \"งั้นเราคงต้องฟังเรื่องราวจากพวกเขาก่อนแล้วละ\""
13050-88 = "ค่ะ..."
13050-90 = "......"
13050-92 = "ขอเสียมารยาทหน่อยแล้วกัน"
13050-93 = "ฮืม... ที่นี่คือห้องสภานักเรียนอะบิดอสเหรอ แคบกว่าที่คิดอีกนะ"
13050-94 = "ยินดีที่ได้รู้จักครับ พวกเราคือผู้รับผิดชอบกองทุนไพรเวทอิควิตี้ที่ลงทุนในกิจการครั้งนี้ เรียกได้ว่าเป็นเจ้าหนี้รายใหม่ของโรงเรียนอะบิดอสครับ"
13050-95 = "และผมก็เป็นตัวแทนกลุ่มเจ้าหนี้ที่มาเป็นกระบอกเสียงเพื่อผลประโยชน์แก่เจ้าหนี้ทั้งหมด"
13050-97 = "สะ... สวัสดีค่ะ..."
13050-98 = "อะไรกัน? ไหนว่าคนที่ซื้อพันธบัตรไปคือเนฟธิสไง? พวกคุณเป็นคนของเนฟธิสเหรอ? ดูทรงแล้วไม่น่าจะใช่นะ?"
13050-100 = "อ้อ แน่นอนว่าคนที่ซื้อพันธบัตรไปก็คือเนฟธิสครับ ทางนั้นจ่ายเงินจำนวนมหาศาลเพื่อให้ได้สิทธิ์ <ทางรถไฟข้ามทะเลทราย>"
13050-101 = "แต่ว่าไม่ได้จ่ายเงินทั้งหมดเองหรอกนะ ที่ซื้อพันธบัตรมาได้เพราะได้รับเงินทุนมาจากหลายๆ กลุ่ม"
13050-102 = "ใช่ นี่เป็นการสร้างกองทุนไพรเวทอิควิตี้รูปแบบหนึ่งน่ะ และพวกเราก็เป็นคนที่ลงทุนในกองทุนนั้น"
13050-104 = "ลงทุนในกองทุนไพรเวทอิควิตี้เหรอ?"
13050-105 = "เป็นกลุ่มการลงทุนแบบปิดที่รวบรวมนักลงทุนรายย่อยเอาไว้น่ะค่ะ..."
13050-107 = "ใช่แล้วครับ นอกจากพวกเราแล้วก็ยังมีนักลงทุนอีกหลายรายที่มาเข้าร่วมกองทุนนี้"
13050-108 = "ทั้งสหภาพแรงงานสินเชื่อเอกชนและสหพันธ์โรงรับจำนำที่อยู่ที่นี่ รวมถึงสมาคมประมูลสินค้าที่ถูกยึด บริษัทเจลาตินคูมี กิจการบันเทิง ZYAKO แล้วก็..."
13050-110 = "มีแต่พวกไม่น่าเชื่อถือทั้งนั้นเลย..."
13050-111 = "แฮ่ม! อะแฮ่ม!"
13050-112 = "ฮะฮ่าฮ่า ผมจะไม่ปฏิเสธหรอกนะ เพราะผมก็เคยค้าของที่ถูกขโมยมาในตลาดมืดอยู่เหมือนกันครับ"
13050-113 = "และเพราะอย่างนี้ เนฟธิสก็เลยทำหน้าที่เป็นคนซื้อพันธบัตรให้ยังไงล่ะครับ เพราะพวกผมไม่ควรจะ#nเปิดเผยหน้าให้มากนัก"
13050-114 = "......"
13050-115 = "แบบนี้ยิ่งน่าสงสัยเข้าไปอีก..."
13050-116 = "อ่า... อืม..."
13050-120 = "[ns3] \"ขอโทษนะ แต่มีหลักฐานไหมว่าทุกคนคือเจ้าหนี้ของอะบิดอส?\"\n[ns4] \"มีอะไรที่ยืนยันได้ไหมว่าทุกคนคือเจ้าหนี้ของอะบิดอสน่ะ\""
13050-123 = "ว่าไงนะ? สงสัยในตัวพวกเรางั้นเรอะ!"
13050-124 = "ไม่น่าพอใจเอาซะเลย"
13050-125 = "เอาละๆ ทุกคนใจเย็นๆ กันก่อน เรามาคุยกันในแบบของผู้ใหญ่เถอะ..."
13050-127 = "(ซ่า)... คนพวกนั้นคือเจ้าหนี้จริงๆ ครับ ผมรับรองได้"
13050-128 = "เอ๋ ใครอีกน่ะ...?"
13050-129 = "คะ... คุณพ่อบ้าน?"
13050-130 = "รุ่นพี่โนโนมิ? คนรู้จักเหรอ?"
13050-131 = "ค่ะ... คนนี้เป็นทั้งผู้บริหารเนฟธิสกรุ๊ป และเป็นคนที่ช่วยดูแลฉันด้วยค่ะ "
13050-133 = "ไม่ได้เจอกันนานเลยนะครับคุณหนู ขอโทษที่ต้องมาทักทายแบบนี้นะครับ"
13050-137 = "ผมจะอธิบายสถานการณ์ให้เองครับ พวกเราจัดตั้งกองทุนนั้นขึ้นมาเพื่อระดมทุนในการซื้อพันธบัตร"
13050-138 = "เพราะงั้นก็เลยสามารถตรวจสอบสถานภาพของพวกเขาได้จากใบรับรองกองทุนนี้ครับ ผมจะให้สำเนา#nใบรับรองไปดู รบกวนช่วยตรวจสอบด้วยนะครับ"
13050-139 = "อ่า... ได้ค่ะ..."
13050-140 = "ใช่จริงด้วยค่ะ... ถ้าดูจากสังกัดและสิทธิ์ของกองทุนแล้ว... คนพวกนี้ถือสิทธิ์ของพันธบัตรอยู่จริงๆ ค่ะ"
13050-142 = "อะแฮ่ม!"
13050-143 = "ไงล่ะ? ทีนี้เชื่อได้รึยัง!?"
13050-144 = "[s] \"งั้นก็... ขอโทษที่เสียมารยาทแล้วกัน\""
13050-146 = "อะไรกัน... งั้นก็เป็นเจ้าหนี้ของพวกเราจริงๆ น่ะสิ"
13050-147 = "เซริกะจัง... เงียบๆ หน่อยค่ะ..."
13050-148 = "ฮุฮุ ถ้าคลายความสงสัยได้ก็พอแล้วละครับ ถ้างั้นผมจะขออธิบายต่อ"
13050-149 = "ที่พวกผมมาหาทุกคนในวันนี้... ก็เพื่อจะเปิดการหารือระหว่างเจ้าหนี้กับลูกหนี้ในเรื่องบางอย่างน่ะครับ"
13050-150 = "เรื่องทางรถไฟข้ามทะเลทราย... รึเปล่าคะ?"
13050-152 = "......"
13050-154 = "โอ้... ใช่แล้วละครับ พวกคุณคงจะเข้าใจสถานการณ์ในระดับหนึ่งแล้วสินะครับ"
13050-155 = "ใช่แล้ว เป็นเรื่องนั้นละ ถ้าจะให้พูดกันตรงๆ จุดประสงค์ของพวกเราคือการได้สิทธิ์ทั้งหมดของ#nทางรถไฟข้ามทะเลทราย"
13050-160 = "(พยักหน้า) ฮึ่ม"
13050-161 = "และ <กองทุนไพรเวทอิควิตี้> ก็เกิดขึ้นเพราะจุดประสงค์นั้น"
13050-163 = "เหตุผลที่เราซื้อพันธบัตรจากไคเซอร์ในราคาที่สูงเกินควร ก็เพราะอยากได้สิทธิ์ทุกอย่างในทางรถไฟ#nข้ามทะเลทรายครับ"
13050-164 = "นั่นจะรวมไปถึงสิทธิ์ในการพัฒนาทางรถไฟที่ยังไม่เสร็จด้วย และด้วยเหตุนี้ การกระทำเพื่อการพัฒนา#nทางรถไฟของสถาบันไฮแลนเดอร์ที่เกิดขึ้นเมื่อก่อนหน้าจึงไม่ผิด"
13050-165 = "ก็ใช่น่ะสิ! เราเริ่มก่อสร้างหลังจากมีการซื้อพันธบัตรต่างหาก! มันเป็นการพัฒนาที่ชอบธรรมเถอะ! "
13050-166 = "อื้ม เราไม่ผิด "
13050-170 = "นั่งให้เรียบร้อย... ท่านผู้บริหาร"
13050-171 = "ว่าแต่... ทำไมถึงได้สนใจทางรถไฟข้ามทะเลทรายขึ้นมา..."
13050-172 = "คุณพ่อบ้านคะ? นี่มันอะไรกันเหรอคะ? ทำไมถึงมีเรื่องแบบนี้..."
13050-173 = "นั่นสิครับ... มันก็เป็นสถานการณ์ที่ยากลำบากของผมเหมือนกัน... คือว่า... เรื่องนั้นน่ะ..."
13050-174 = "เอาละๆ ผมเข้าใจคุณหนูจากเนฟธิสนะครับ"
13050-175 = "ทางรถไฟข้ามทะเลทราย... เป็นสิ่งที่มีความหลังฝังใจต่อทั้งเนฟธิสและอะบิดอสใช่ไหมครับ พอเกิดสิ่งนี้ขึ้น อะบิดอสก็ยิ่งสูญสลายรวดเร็วขึ้น"
13050-176 = "ไม่ค่ะ ช่วยตอบฉันมาด้วยค่ะ! คุณพ่อบ้าน! เนฟธิสกำลังคิดอะไรอยู่คะ?"
13050-177 = "นั่นมันเป็นกิจการที่ผิดตั้งแต่เริ่มต้นแล้วค่ะ จะมาสร้างโครงสร้างพื้นฐานด้านการคมนาคมขนาดใหญ่#nในเขตปกครองตนเองที่กำลังพังทลายจากภัยทะเลทรายน่ะเหรอคะ...? "
13050-178 = "อะบิดอสไม่ใช่ศูนย์กลางการคมนาคม แล้วก็ไม่ใช่เขตปกครองตนเองที่มีทรัพยากรใต้ดินด้วย การเชื่อมต่อโครงข่ายคมนาคมในเขตปกครองตนเองที่โดดเดี่ยวและก็มีแต่ทรายแบบนี้มันจะไปมีประโยชน์#nอะไรกันคะ...!"
13050-179 = "โครงการนี้ระดมเงินทุนไม่สำเร็จจนการก่อสร้างถูกระงับไป... สุดท้ายแล้วสิ่งที่เนฟธิสทำก็เป็นการเร่ง#nการเสื่อมถอยของอะบิดอส...!"
13050-180 = "แล้วทำไมถึงได้ต้องการสิ่งนั้นอีกในตอนนี้ล่ะคะ? ทำไมถึงกับต้องยอมจ่ายเงินมากขนาดนั้นด้วย...?"
13050-182 = "ทำไมคะ? ตอนนี้ที่ตรงนั้นมีความสำคัญอะไรเหรอคะ?! เนฟธิสกำลังคิดอะไรอยู่กันแน่...!!"
13050-183 = "ใจเย็นๆ ก่อน โนโนมิจัง"
13050-184 = "รุ่นพี่โนโนมิ..."
13050-188 = "แบบนี้นี่เอง... เอาละ งั้นเรามาคุยกันอย่างจริงจังกันเลยดีกว่าครับ ผมจะบอกจุดประสงค์ที่แท้จริงที่#nพวกเรามาที่นี่ให้"
13050-189 = "แต่ว่า... ก่อนหน้านั้น"
13050-190 = "ต้องขอโทษด้วยนะครับ เราอยากคุยกับคนที่เกี่ยวข้องเท่านั้น "
13050-191 = "อืม... คนที่ไม่ใช่ <สภานักเรียนอะบิดอส> ขอให้ออกจากห้องไปก่อนได้ไหมครับ? "
13050-192 = "พวกเราออกไปกันเถอะ"
13050-193 = "ดะ... เดี๋ยวสิ อย่าผลักกันสิ"
13050-194 = "โอ้ จริงเหรอ? ไม่คิดเลยว่าจะได้ออกจากห้องเร็วแบบนี้"
13050-198 = "งั้นผมก็ขอตัวก่อนนะครับ"
13050-203 = "คะ...?! ละ... แล้วเนฟธิสล่ะ..."
13050-204 = "ขอให้ผู้ควบคุมสุโออยู่เป็นตัวแทนของเนฟธิสแล้วกันครับ"
13050-205 = "ว่าไงนะ? พูดจริงเหรอ?"

13050-220 = "[s] \"............\""
13050-222 = "หืม? อยู่ทำอะไรกันเหรอครับ? ผมขอให้ <สภานักเรียนอะบิดอส> อยู่ในห้องเท่านั้น... งั้นคนที่ไม่ใช่#nคุณทาคานาชิ โฮชิโนะ ก็ควรออกไปให้หมดสิครับ..."
13050-224 = "ว่าไงนะ? ก็ถูกต้องแล้วไง! พวกเราเป็นสภานักเรียนของโรงเรียนอะบิดอสนะ!"

[translation]
13050-1 = "第5話;沙漠橫貫鐵路"
13050-2 = "入場～YEAH～"
13050-3 = "什麼嘛，怎麼這麼小啊？#n我們要坐哪？那裡可以嗎？"
13050-8 = "……"
13050-10 = "幹部們，不要隨便亂翻別人的部室。#n還有不要找冰箱了，趕快坐下吧。"
13050-11 = "……不可以從椅子上跳下來。"
13050-12 = "那，那個……"
13050-13 = "……不好意思。#n這裡就是阿拜多斯對策委員會的部室嗎？"
13050-26 = "……雖然不知道你想做什麼，但是你先忍耐一下，白子前輩。"
13050-27 = "……呃，嗯。"
13050-29 = "是的，我們就是對策委員會。"
13050-30 = "各位並沒有找錯地方。#n直接進入正題吧，高地人學園的幹部們。"
13050-35 = "我可以吃這個餅乾嗎？"
13050-36 = "什麼嘛，連一杯茶都不給客人嗎？"
13050-38 = "啊……請稍等。"
13050-39 = "不必費心。我們很快就要離開了。"
13050-40 = "嗚嗚～？"
13050-41 = "請幹部們搞清楚狀況。#n你們應該也知道自己不受待見。"
13050-42 = "這些人為了奪回自己的土地，甚至不惜跟大企業凱薩競爭。"
13050-43 = "我們現在就跟身處一觸即發的火藥庫一樣，什麼時候爆炸都不意外。"
13050-50 = "嗯……"
13050-52 = "但你們不用擔心。#n就算真的打起來──我也會贏。"
13050-60 = "白子前輩，冷靜，冷靜！"
13050-66 = "我很冷靜……"
13050-67 = "哪裡冷靜！感覺明明就快爆炸了好不好！？"
13050-68 = "唔，唔嗯……"
13050-72 = "[ns1]「大家先冷靜。我們直接進入正題吧，蘇芳。」\n[ns2]「你有事情要跟對策委員會說明對吧？」"
13050-75 = "沒錯。"
13050-76 = "你就是那個夏萊的老師？#n先前真是失禮了。"
13050-77 = "那麼這就開始解釋……#n不過負責開口的並不是我們，而是別人。"
13050-78 = "（嘰）……已確認完畢。這裡很安全，請進吧。"
13050-79 = "咳咳，咳咳。那真是太好了，這裡的沙塵實在很嚴重。"
13050-80 = "就是啊，簡直一刻都不想多待。趕快進去吧。"
13050-81 = "這，這些傢伙是誰啊？"
13050-82 = "說話最好注意一點哦？#n他們可是你們的債權人。"
13050-83 = "債權人……"
13050-84 = "什麼？債權人……？#n所以是討債鬼嗎！？"
13050-85 = "茜香醬……麻煩注意一下用詞……"
13050-86 = "嗯，看來是這次收購DLB的人呢……"
13050-87 = "[s]「先聽聽看他們怎麼說吧。」"
13050-88 = "好的……"
13050-90 = "……"
13050-92 = "打擾了。"
13050-93 = "嗯……這裡就是阿拜多斯學生會嗎？比想像中小很多呢。"
13050-94 = "初次見面。我們是投資了這項事業的私募基金負責人。#n同時也是阿拜多斯高中的新債權人。"
13050-95 = "而我則是債權人團的代表。"
13050-97 = "你，你們好……"
13050-98 = "搞什麼，不是說購買債券的是奈芙蒂斯嗎？#n你們是奈芙蒂斯的人嗎？看起來不像啊？"
13050-100 = "啊啊，收購債券的當事人確實是奈芙蒂斯沒錯。#n奈芙蒂斯花費相當可觀的金額，買下了「沙漠橫貫鐵路」的權利。"
13050-101 = "不過那筆錢並不是由奈芙蒂斯全額負擔，而是集合了幾個組織的資金。"
13050-102 = "也就是說，他們設立了私募基金。#n而我們則是這個基金的投資人。"
13050-104 = "私募基金？"
13050-105 = "指的是招募少量的投資者，以非公開的方式營運的投資集團……"
13050-107 = "正是如此。加入私募基金的投資者，除了我們之外還有很多。"
13050-108 = "比如高利貸勞動會、當舖聯盟、扣押品拍賣公會、明膠軟糖公司、雜魚興業等等……"
13050-110 = "怎麼全都是奇怪的傢伙……"
13050-111 = "咳哼！"
13050-112 = "哈哈哈，這點我並不否認。#n我也是在地下世界經營贓物生意的人。"
13050-113 = "正因如此，奈芙蒂斯才會成為購買債券的代表。#n畢竟我們的身分實在不適合太高調。"
13050-114 = "……"
13050-115 = "越來越可疑了……"
13050-116 = "啊……嗯……"
13050-120 = "[ns3]「不好意思，請問有什麼能證明你們是阿拜多斯債權人的東西嗎？」\n[ns4]「我沒有懷疑你們的意思，只是這種事情還是確認清楚比較好。」"
13050-123 = "啊？那不就是在懷疑我們嗎！"
13050-124 = "真讓人不爽。"
13050-125 = "好了，好了。大家冷靜一點。#n我們還是像大人一樣好好溝通吧……"
13050-127 = "（嘰）……他們是債權人沒錯，這點我可以保證。"
13050-128 = "咦，這位又是……？"
13050-129 = "管，管家……？"
13050-130 = "野乃美前輩？是你認識的人嗎？"
13050-131 = "嗯……那位是奈芙蒂斯集團的幹部，也是以前照顧過我的管家……"
13050-133 = "好久不見，小姐。#n很抱歉以這種形式向您問好。"
13050-137 = "請容我來為各位說明一下情況。#n我們為了購買債券，設立了私募基金以補齊資金。"
13050-138 = "各位可以從私募基金的證明書來確認他們的身分。#n副本在這邊，麻煩進行確認。"
13050-139 = "啊，好的……我確認一下。"
13050-140 = "……沒錯。#n從私募基金的所屬和權利來看……他們的確擁有我們的債權。"
13050-142 = "哼哼！"
13050-143 = "這樣滿意了吧？"
13050-144 = "[s]「……嗯，感謝配合。」"
13050-146 = "什麼嘛……那的確是討債鬼沒錯啊。"
13050-147 = "茜香醬……拜託說話注意一下……"
13050-148 = "呵呵，能消除各位的疑慮就好。#n那麼我繼續說明。"
13050-149 = "我們來找各位的原因很簡單……#n作為債權團體的代表，我想和各位債務人商量一件事。"
13050-150 = "是關於……沙漠橫貫鐵路嗎？"
13050-152 = "……"
13050-154 = "哦……原來如此。#n看來各位已經進行過各種調查了呢。"
13050-155 = "正是如此。我就坦白地告訴各位吧──#n我們的目的是要獲得沙漠橫貫鐵路的所有權利。"
13050-160 = "（點頭）嗯嗯。"
13050-161 = "「私募基金」就是為了這個而存在的。"
13050-163 = "之所以用堪稱荒唐的價錢向凱薩購買債券，也是為了這個原因。"
13050-164 = "因此，開發未完成的鐵道的權利也已經在我們手中。#n先前高地人學園的開發行為沒有任何問題。"
13050-165 = "就是說呀。我們是在拿到債權後才開始施工的哦？是正當開發耶？"
13050-166 = "嗯～沒有～問題～"
13050-170 = "……麻煩乖乖坐好，兩位幹部。"
13050-171 = "不過……為什麼偏偏是沙漠橫貫鐵路呢……"
13050-172 = "管家，這是怎麼回事……？"
13050-173 = "這……實在有些難以啟齒……該怎麼說才好呢……"
13050-174 = "我明白你的心情，奈芙蒂斯的千金。"
13050-175 = "沙漠橫貫鐵路……對於奈芙蒂斯和阿拜多斯無疑是個痛點。#n畢竟正是它加速了阿拜多斯的沒落。"
13050-176 = "不，請你回答我！管家！奈芙蒂斯究竟在想什麼？"
13050-177 = "那打從一開始就是項錯誤的事業。#n要在因為沙漠化而沒落的自治區，推動大規模的交通基礎建設……？"
13050-178 = "阿拜多斯既不是交通要地，也不是有地下資源的自治區……#n在這種只有沙子的荒涼自治區，即使建設交通路網也沒有幫助……！"
13050-179 = "後來因為缺乏資金而導致事業中斷……最終成為了加速阿拜多斯沒落的原罪……！"
13050-180 = "為何事到如今又想重操舊業呢？#n甚至不惜投入那麼大筆的金錢……？"
13050-182 = "為什麼？那裡現在還有什麼意義嗎！？#n奈芙蒂斯到底在想什麼……！！"
13050-183 = "冷靜點，野乃美醬。"
13050-184 = "野乃美前輩……"
13050-188 = "……我明白了。正式開始商量吧。#n我會告訴各位我們來這裡的真正目的。"
13050-189 = "不過在這之前──"
13050-190 = "不好意思，接下來的事，我們只想和負責人討論。"
13050-191 = "只要「阿拜多斯學生會」的人留下就好，其他人能麻煩迴避一下嗎？"
13050-192 = "沒問題，我們出去吧。"
13050-193 = "等，等等！不要推我啦！"
13050-194 = "嗚哦哦～真的？這麼快～就要退～場～了～"
13050-198 = "那麼我也先離開了。"
13050-203 = "……咦！？#n那，那奈芙蒂斯的代表是……"
13050-204 = "請蘇芳監察官留下，作為奈芙蒂斯的代表。"
13050-205 = "……哦？真的嗎？"
13050-206 = "沒錯。雖然你是高地人學園的學生，但現在受雇於奈芙蒂斯。"
13050-207 = "他與CCC無關，完全是我們這邊的人，可以放心信任。"
13050-208 = "那麼我還有事要忙……"
13050-212 = "……"
13050-217 = "這是什麼情況……"
13050-218 = "……"
13050-219 = "嗯……"
13050-220 = "[s]「…………」"
13050-222 = "嗯？各位沒聽見我說的話嗎？我剛才說只要「阿拜多斯學生會」的人留下……#n麻煩除了小鳥遊星野同學以外的其他人先行離開。"
13050-224 = "啊？等，等一下！我們是阿拜多斯高中的學生會沒錯啊？"
13050-225 = "是的！「對策委員會」是阿拜多斯的學生會！#n是經過在場的顧問老師批准的學生會！"
13050-226 = "[s]「沒錯，這件事是我批准的。」"
13050-227 = "……原來是這樣啊。哼嗯。"
13050-228 = "不過有點奇怪呢……？#n「阿拜多斯學生會」應該是只有星野同學所屬的那個才對……#n所以是還存在另一個叫做「對策委員會」的學生會嗎？"
13050-229 = "咦？那，那個……"
13050-231 = "……啊，我知道了。#n可能是因為我同時屬於兩個組織才會這樣……"
13050-232 = "不過「阿拜多斯學生會」現在只剩下名義，真正的學生會是「對策委員會」沒錯。"
13050-233 = "唔嗯……原來如此。#n雖然情況有點複雜，不過我瞭解了。"
13050-234 = "那麼，請看看這個吧。"
13050-239 = "這是……"
13050-240 = "這是不久之前，在高地人學園的文件倉庫發現的一份文件。"
13050-242 = "是阿拜多斯的前學生會長──梔子夢親筆簽下的契約。"
13050-248 = "……！！"
13050-250 = "下一話;買賣契約"

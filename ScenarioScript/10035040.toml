[translation]
10035040-1 = "第4話;波浪池，波浪席捲而來！"
10035040-3 = "好，設施已經大致逛過一輪，算是完成暖身運動了吧。"
10035040-4 = "嘻嘻嘻，那我們就從波浪池開始吧。"
10035040-5 = "一定要玩個痛快……！"
10035040-8 = "歡迎各位蒞臨奇普托斯最大的水上樂園「海神」。#n讓各位久等了。"
10035040-9 = "現在本樂園的招牌設施──室外波浪池──已經準備完畢。"
10035040-10 = "請在模擬真實海灘的波浪池中，度過愉快的時光吧！"
10035040-11 = "……另外，剛才在兒童泳池嚇哭客人的三名救生員，請轉移至波浪池工作。"
10035040-13 = "……他是這麼說的。"
10035040-14 = "又得到戶外去了啊，真是的～"
10035040-15 = "……真抱歉，都怪我不好。"
10035040-16 = "我沒有在怪環奈局長啦。"
10035040-17 = "是那個老闆太雞蛋裡挑骨頭，只因為一點小事就要我們跑來跑去的。"
10035040-18 = "沒事的，局長！"
10035040-19 = "本官以前也有過抓到逃犯後又讓他們逃脫一兩次的經歷，但最終還是順利解決了！"
10035040-20 = "[s1]（確實是曾經發生過……）\n[s2]（而且好像還不止一兩次……！）"
10035040-23 = "總之，既然我們今天是這間樂園的救生員，也只能照他說的做了。"
10035040-24 = "到波浪池去吧。"
10035040-27 = "哇！好大哦！"
10035040-28 = "真的像個小海灘一樣呢！"
10035040-29 = "人還真不少啊。"
10035040-30 = "負責看守的救生員也很多。"
10035040-31 = "看來得和其他救生員合作了啊。"
10035040-35 = "你們是來支援的救生員對吧？#n這個波浪池很大，請分散開來，方便控制人群！"
10035040-36 = "快點快點！陸續有客人開始進場了！"
10035040-37 = "看來得各自作戰了呢！"
10035040-38 = "局長、吹雪，加油哦！"
10035040-39 = "老師，我們休息時間再見！"
10035040-43 = "別用跑的～不然很快就會累垮的。"
10035040-44 = "那我也去適度地工作一下吧。"
10035040-49 = "獨立作戰啊。"
10035040-50 = "要是又發生剛才的情況……"
10035040-51 = "[s3]「那孩子只是驚嚇過度罷了。」\n[s4]「那孩子只是害羞罷了。」"
10035040-54 = "謝謝您這麼說。"
10035040-55 = "不過那孩子肯定是因為我才嚇到的。"
10035040-56 = "誰叫我長得凶神惡煞……"
10035040-57 = "那邊的！快點就定位！"
10035040-58 = "先專注於眼前被分配的任務吧。"
10035040-59 = "為了不讓遊客們感到驚慌，我還是待在泳池的深處比較好。"
10035040-63 = "[ns]「……」"
10035040-65 = "噗啊噗啊！"
10035040-66 = "救，救命啊！來人啊！"
10035040-67 = "來，別慌別慌。"
10035040-68 = "抓住這個救生圈。"
10035040-69 = "咳咳！抓，抓住了！"
10035040-70 = "抓緊哦，我拉你上來～"
10035040-73 = "來～到囉。"
10035040-74 = "謝，謝謝！多虧有你才能得救！"
10035040-75 = "別去太深的地方，波浪是很危險的。"
10035040-77 = "哼哼哼～♪"
10035040-78 = "啊！那邊的客人！"
10035040-79 = "泳池附近禁止使用電子設備！不然會有觸電的風險。"
10035040-80 = "你問我現在在聽什麼歌？"
10035040-81 = "是Death Angels的〈Rock the City〉。"
10035040-82 = "我，我不是在問歌名！"
10035040-83 = "總之請把耳機摘下來！"
10035040-84 = "除了有安全疑慮之外，也很容易會弄丟的！"
10035040-85 = "啊，說得也是。我知道了。"
10035040-86 = "感謝配合！"
10035040-88 = "（這次的任務是阻止遊客進入泳池深處啊）"
10035040-89 = "（某種程度上，可能是最適合我的工作……）"
10035040-93 = "即將開始造浪。"
10035040-97 = "嗯？怎麼周圍一個人都沒有？"
10035040-98 = "難道都跑去外面了──"
10035040-102 = "嗚哇！"
10035040-104 = "（被浪捲走了！）"
10035040-105 = "（冷靜下來，總之先游到岸上……！）"
10035040-106 = "（……嗯？）"
10035040-110 = "（那，那是……？）"
10035040-113 = "老，老師，局長被浪沖出來了！"
10035040-114 = "不，看起來不像是被沖出來，而是自己游出來的。"
10035040-115 = "畢竟環奈局長的運動神經還挺發達的嘛。"
10035040-119 = "咳咳！桐乃、吹雪……！"
10035040-120 = "？"
10035040-121 = "現在馬上讓所有人撤離！"
10035040-122 = "撤離？什麼意思？"
10035040-124 = "水裡有東西，看起來像是巨大的怪物！"
10035040-125 = "[s]「怪物！？」"
10035040-129 = "這，這怎麼可能呢！局長您是不是眼花啦！？"
10035040-130 = "還是別給自己太多壓力比較好哦，局長。#n出現幻覺就代表心理處於極度緊繃的狀態──"
10035040-132 = "我是說真的！"
10035040-133 = "現在就去拉響警報，疏散人群。"
10035040-134 = "趁那傢伙還沒有上岸，動作快！"
10035040-135 = "既，既然局長都這麼說了……！"
10035040-136 = "我知道了！我這就去拉響警報！"
10035040-140 = "真是的，什麼跟什麼啊。"
10035040-141 = "那我去負責廣播。"
10035040-145 = "老師也請盡快撤離。"
10035040-146 = "我知道您不相信我說的話。可是……！"
10035040-147 = "[s5]「我相信環奈。」\n[s6]「一起走吧！」"
10035040-150 = "我等所有人撤離完再離開。"
10035040-151 = "這是身為救生員的責任。"
10035040-152 = "我出發了！"
10035040-156 = "[ns] 和生活安全局的學生一起疏散人群"
10035040-160 = "哈哈！大家怎麼一副驚慌失措的樣子！"
10035040-161 = "咯咯咯！被嚇得屁滾尿流！"
10035040-162 = "很好，那就趁著這個大好機會……"
10035040-167 = "玩個痛快吧！"

[translation]
10035040-1 = "ตอนที่ 4;โดนคลื่นซัดไปแล้วค่ะ!"
10035040-3 = "ดีละ เราเดินสำรวจรอบๆ สถานที่กันแล้ว ตอนนี้ก็ถือว่าพร้อมแล้วละ"
10035040-4 = "คิกคิกคิก งั้นก็เริ่มตั้งแต่สระคลื่นเลยดีมั้ยล่ะ?"
10035040-5 = "ไปสนุกกันให้เต็มที่เลย...!"
10035040-8 = "ยินดีต้อนรับทุกท่านที่เข้ามาใช้บริการสวนน้ำ <แอกิร์> ที่ยิ่งใหญ่ที่สุดในคิโวทอสค่ะ"
10035040-9 = "ในที่สุด 'สระคลื่นกลางแจ้ง' ที่เป็นที่เลื่องชื่อของสวนน้ำของเราก็พร้อมให้บริการแล้วค่ะ"
10035040-10 = "เชิญสนุกกับสระคลื่นที่ยกบรรยากาศของชายหาดจริงๆ มาให้ทุกท่านได้เลยค่ะ"
10035040-11 = "ส่วนไลฟ์การ์ด 3 คนที่ทำลูกค้าสวนน้ำร้องไห้ที่สระเด็กเมื่อก่อนหน้านี้... ขอให้เปลี่ยนไปปฏิบัติหน้าที่#nที่สระคลื่นด้วยค่ะ"
10035040-13 = "เฮ้อ คงต้องทำตามประกาศน่ะนะ"
10035040-14 = "ต้องออกไปกลางแจ้งอีกแล้ว แบบนี้ไม่ชอบเลย~"
10035040-15 = "เป็นเพราะฉันแท้ๆ น่าขายหน้าจริงๆ เลย"
10035040-16 = "ฉันไม่ได้บอกว่าเป็นความผิดหัวหน้ากรมฯ คันนะสักหน่อย"
10035040-17 = "ฉันแค่ไม่พอใจหัวหน้าสวนน้ำที่แค่เกิดเรื่องนิดหน่อยก็ย้ายเราไปทำจุดอื่นน่ะ"
10035040-18 = "ไม่เป็นไรนะคะ หัวหน้ากรมฯ!"
10035040-19 = "เมื่อก่อนฉันก็จับนักโทษแหกคุกได้แต่ก็พลาดจนหลบหนีไปได้อยู่ครั้งสองครั้ง แต่สุดท้ายก็จบลงด้วยดีค่ะ!"
10035040-20 = "[s1] (มันก็มีเรื่องแบบนั้นอยู่จริงๆ...)\n[s2] (น่าจะไม่ใช่แค่ครั้งสองครั้งนะ...!)"
10035040-23 = "ยังไงวันนี้เราก็มาเป็นไลฟ์การ์ดของที่นี่ งั้นก็ต้องทำตามคำสั่งนั่นละนะ"
10035040-24 = "งั้นก็ไปที่สระคลื่นกันเถอะ"
10035040-27 = "ว้าว! สระกว้างมากเลยค่ะ!"
10035040-28 = "อย่างกับชายหาดเล็กๆ แหนะ!"
10035040-29 = "คนเยอะไม่แพ้กันเลยนะ"
10035040-30 = "พอคนเยอะ ไลฟ์การ์ดก็เลยเยอะเหมือนกัน"
10035040-31 = "เราคงต้องร่วมมือกับไลฟ์การ์ดคนอื่นแล้วละ"
10035040-35 = "เฮ้ ตรงนั้นน่ะ! เป็นไลฟ์การ์ดที่อาสามาช่วยใช่มั้ย? สระคลื่นนี้กว้างมาก! ยืนรักษาระยะกัน แล้วควบคุมคนให้ได้นะ!"
10035040-36 = "เอาละ รีบขยับกันได้แล้ว! ลูกค้าเข้ามากันเรื่อยๆ แล้ว!"
10035040-37 = "รู้สึกเหมือนต้องต่อสู้กับฝูงชนเลยค่ะ"
10035040-38 = "หัวหน้ากรมฯ ฟุบุกิ สู้ๆ นะคะ!"
10035040-39 = "ไว้เจอกันเวลาพักนะคะคุณครู"
10035040-43 = "อย่าไปเที่ยววิ่งวุ่นให้มันมากเกินไปนักล่ะ~ เดี๋ยวจะหมดแรงซะก่อน"
10035040-44 = "งั้นฉันก็ทำงานแบบพอดีๆ ดูบ้างแล้วกัน"
10035040-49 = "ต้องรับมือคนเดียวอย่างงั้นสินะ"
10035040-50 = "ถ้าเกิดสถานการณ์แบบเมื่อกี้อีกล่ะ..."
10035040-51 = "[s3] \"เด็กคนนั้นแค่ร้องไห้เพราะตกใจน่ะ\"\n[s4] \"เด็กคนนั้นแค่ร้องไห้เพราะอายน่ะ\""
10035040-54 = "ขอบคุณที่ช่วยพูดอย่างนั้นนะคะคุณครู"
10035040-55 = "แต่ที่เด็กคนนั้นตกใจ มันเป็นเพราะฉันแน่นอนค่ะ"
10035040-56 = "เพราะฉันหน้าดุแบบนี้..."
10035040-57 = "นี่! รีบๆ ไปเข้าประจำตำแหน่งได้แล้ว!"
10035040-58 = "ฉันขอไปตั้งใจทำงานก่อนนะคะ"
10035040-59 = "ฉันคงไปอยู่ในส่วนที่ลึกๆ ของสระเลย ลูกค้าจะได้ไม่เห็นฉันจนตกใจเข้าน่ะค่ะ"
10035040-63 = "[ns] \"...\""
10035040-65 = "แฮ่ก แฮ่ก!"
10035040-66 = "ชะ... ช่วยด้วย! ว้ากกก!"
10035040-67 = "อย่าเพิ่งตกใจไป"
10035040-68 = "คว้าห่วงยางอันนี้ไว้!"
10035040-69 = "เฮือก! คะ... คว้าไว้ได้แล้ว!"
10035040-70 = "จับให้ดีๆ นะ จะดึงขึ้นมาเดี๋ยวนี้ละ~"
10035040-73 = "เอาละ ถึงแล้ว~"
10035040-74 = "ขะ... ขอบคุณนะ! รอดมาได้เพราะได้คุณช่วยไว้เลย!"
10035040-75 = "อย่าลงไปให้ลึกเกินล่ะ สระนี้มีคลื่นซัด พอประมาทเข้ามันจะเป็นอันตรายได้น่ะ"
10035040-77 = "ฮืมมมม~"
10035040-78 = "อ๊ะ! ลูกค้าทางนั้นน่ะ!"
10035040-79 = "ห้ามใช้อุปกรณ์อิเล็กทรอนิกส์ในสระนะคะ เดี๋ยวก็ไฟดูดกันพอดีหรอกค่ะ"
10035040-80 = "ถามว่าตอนนี้ฟังเพลงอะไรอยู่เหรอค่ะ?"
10035040-81 = "เพลงร็อกเดอะซิตี้ของเดธแองเจิลส์ค่ะ"
10035040-82 = "ฉะ... ฉันไม่ได้ถามชื่อเพลงสักหน่อยค่ะ"
10035040-83 = "เอาเป็นว่า ถ้าอยากเล่นน้ำที่นี่ก็ถอดหูฟังก่อนนะคะ!"
10035040-84 = "ถ้าใส่ไว้จะเกิดอันตราย หรือไม่ก็อาจจะหลุดหายได้ค่ะ!"
10035040-85 = "อ่า... นั่นสินะคะ เข้าใจแล้วค่ะ"
10035040-86 = "ขอบคุณนะคะ!"
10035040-88 = "(นี่เป็นภารกิจกันไม่ให้ผู้คนเข้ามาในโซนน้ำลึกหรือเปล่านะ)"
10035040-89 = "(ถ้างั้นงานแบบนี้คงเหมาะกับฉันเลยละ...)"
10035040-93 = "จะเริ่มปล่อยคลื่นแล้วนะคะ"
10035040-97 = "หืม? ทำไมแถวนี้ไม่มีคนเลยล่ะ?"
10035040-98 = "อย่าบอกนะว่าไปข้างนอกกันหมด..."
10035040-102 = "แค่กๆ!"
10035040-104 = "(โดนคลื่นซัดเหรอเนี่ย!)"
10035040-105 = "(ต้องว่ายน้ำอย่างใจเย็นแล้วขึ้นฝั่งให้ได้ก่อน...!)"
10035040-106 = "(หืม...?)"
10035040-110 = "(นะ... นั่นมันอะไรน่ะ?)"
10035040-113 = "คะ... คุณครูคะ หัวหน้ากรมฯ ถูกคลื่นซัดไปแล้วค่ะ!"
10035040-114 = "เหมือนกำลังว่ายน้ำออกมาอยู่นะ"
10035040-115 = "หัวหน้ากรมฯ คันนะแก้สถานการณ์เฉพาะหน้าได้เก่งอยู่แล้วละ"
10035040-119 = "แค่กๆ! คิริโนะ ฟุบุกิ...!"
10035040-120 = "?"
10035040-121 = "เราต้องอพยพผู้คนออกไปจากตรงนี้เดี๋ยวนี้เลย!"
10035040-122 = "อพยพเหรอ? หมายความว่ายังไงน่ะ?"
10035040-124 = "มีบางอย่างอยู่ในน้ำ อะไรบางอย่างที่ตัวใหญ่เหมือนสัตว์ประหลาดยักษ์น่ะ!"
10035040-125 = "[s] \"สัตว์ประหลาดเหรอ?!\""
10035040-129 = "จะ... จะเป็นไปได้ยังไงคะ! หัวหน้ากรมฯ ตาฝาดไปหรือเปล่าคะ?!"
10035040-130 = "ไม่ต้องเครียดมากหรอกนะ หัวหน้ากรมฯ คงจะตึงเครียดเกินไปจนเห็นภาพหลอนน่ะ..."
10035040-132 = "จริงๆ นะ!"
10035040-133 = "รีบส่งสัญญาณเตือนแล้วอพยพคนออกไปเดี๋ยวนี้"
10035040-134 = "ก่อนที่เจ้าสัตว์ประหลาดนั่นจะออกมาอีกครั้ง เร็วเข้า!"
10035040-135 = "ถะ... ถ้าหัวหน้ากรมฯ ออกคำสั่งแบบนี้ละก็...!"
10035040-136 = "เข้าใจแล้วค่ะ! ฉันจะไปส่งสัญญาณเตือนค่ะ!"
10035040-140 = "ทำไมต้องมาเจองานอะไรแบบนี้ด้วยเนี่ย"
10035040-141 = "งั้นเดี๋ยวฉันจะไปประกาศให้เอง"
10035040-145 = "คุณครูก็รีบออกไปจากตรงนี้ด้วยนะคะ"
10035040-146 = "ฉันรู้ค่ะว่าคุณครูไม่เชื่อที่ฉันพูด แต่ว่า...!"
10035040-147 = "[s5] \"ครูเชื่อคันนะอยู่แล้ว\"\n[s6] \"ไปด้วยกันเถอะ!\""
10035040-150 = "ฉันจะอพยพผู้คนให้หมดก่อนแล้วค่อยออกไปค่ะ"
10035040-151 = "มันเป็นหน้าที่ของไลฟ์การ์ดนี่คะ"
10035040-152 = "งั้นฉันขอไปทำงานก่อนค่ะ"
10035040-156 = "[ns] ช่วยนักเรียนจากสำนักรักษาความปลอดภัยอพยพผู้คน"
10035040-160 = "ฮะฮ่า! ทุกคนตกใจจนเผ่นแน่บเลย!"
10035040-161 = "คิกคิกคิก! วิ่งหนีไม่คิดชีวิตกันเลยสินะ!"
10035040-162 = "ดีละ ในเมื่อเป็นแบบนี้..."
10035040-167 = "ก็มาเล่นสนุกกันสักตั้งเป็นไง!"

[translation]
10035040-1 = "Episode 4;Marooned at the Wave Pool!"
10035040-3 = "Great, we've checked out the facilities, so we can consider the warm-up done."
10035040-4 = "Heeheehee, how about we do the wave pool next?"
10035040-5 = "Let's go all out and have a blast!"
10035040-8 = "Thank you for visiting Aegir, the largest water park in Kivotos. We appreciate your patience."
10035040-9 = "The preparations for our park's premier attraction, the outdoor wave pool, are finally complete."
10035040-10 = "Enjoy your time at the wave pool, designed to simulate the experience of a real beach!"
10035040-11 = "...Also, you three lifeguards who caused trouble at the kids' pool earlier: you have been transferred to the wave pool. Please proceed to your new work area."
10035040-13 = "...Yep, that figures."
10035040-14 = "Aw, I don't wanna go back outside..."
10035040-15 = "...I'm so ashamed. It's all my fault."
10035040-16 = "I wasn't trying to make you feel bad, Director."
10035040-17 = "I just wish the owner wouldn't keep pushing us around."
10035040-18 = "Don't worry, Director!"
10035040-19 = "I've lost track of escaped convicts once or twice, but it always worked out in the end!"
10035040-20 = "[s1]\"(That sounds kind of familiar, but...)\"\n[s2]\"(More than once or twice, I think...)\""
10035040-23 = "Anyway, today we're just here to do lifeguard things."
10035040-24 = "Let's head to the wave pool."
10035040-27 = "Wow! It's huge!"
10035040-28 = "It really does look like a real beach, doesn't it?"
10035040-29 = "Especially with the huge crowd."
10035040-30 = "And all the lifeguards keeping an eye on them."
10035040-31 = "We'll need to work with them, very closely."
10035040-35 = "Hey! You must be the new support lifeguards, yeah? It's a big pool, so spread out and keep some distance. It'll help you manage the crowd."
10035040-36 = "Okay, pick up the pace! More guests are coming in!"
10035040-37 = "All right, let's split up and do this!"
10035040-38 = "We've got this, you two!"
10035040-39 = "See you at break time, Sensei!"
10035040-43 = "Don't run around too much, or you'll tire yourself out. Take it easy."
10035040-44 = "Like I'm going to do."
10035040-49 = "Looks like I'm on my own."
10035040-50 = "I just hope this isn't a repeat..."
10035040-51 = "[s3] \"That kid was probably just startled.\"\n[s4] \"That kid was probably just embarrassed.\""
10035040-54 = "Thank you for saying that."
10035040-55 = "But I'm the one who made them feel that way."
10035040-56 = "I just look so intimidating..."
10035040-57 = "Hey! You over there! Hurry up and get to your seat!"
10035040-58 = "Right, for now, I'll focus on the task at hand."
10035040-59 = "If I go deeper into the pool, I won't startle as many guests."
10035040-63 = "[ns] \"...\""
10035040-65 = "*glub* *glub* *gasp*"
10035040-66 = "H-Help me! Ack!"
10035040-67 = "Stay calm."
10035040-68 = "Grab this lifebuoy."
10035040-69 = "*cough*! I-I got it!"
10035040-70 = "Hold on tight. You're going to be okay."
10035040-73 = "...There, you're safe."
10035040-74 = "Thank you so much! You saved my life!"
10035040-75 = "Stay away from the deep end. Those waves get very high."
10035040-77 = "Hmm, hmm, hmm... Da-da doo da..."
10035040-78 = "Hey! You over there!"
10035040-79 = "Please don't use electronic devices in the pool. You could get electrocuted!"
10035040-80 = "Huh? You want to know what song this is?"
10035040-81 = "It's \"Rock the City,\" by Death Angels."
10035040-82 = "I-I wasn't asking about that."
10035040-83 = "Could you please take your earphones out?"
10035040-84 = "For safety reasons, and so they don't get lost."
10035040-85 = "Ah, gotcha."
10035040-86 = "Thank you!"
10035040-88 = "(So I just need to keep at-risk people out of the deep end?)"
10035040-89 = "(I think I can handle that...)"
10035040-93 = "Ah, the waves are starting."
10035040-97 = "Hmm? Why is there no one around?"
10035040-98 = "Did all the guests already leave—?"
10035040-102 = "*cough*"
10035040-104 = "(Did I get caught up in the waves?)"
10035040-105 = "(All right, stay calm. Swim for shore...)"
10035040-106 = "(...Hmm?)"
10035040-110 = "(Wh-What in the world...?!)"
10035040-113 = "S-Sensei, look, the director got caught up in the waves! She's washed up on shore!"
10035040-114 = "Looks more like she swam out by herself."
10035040-115 = "Director Kanna is quite athletic, you know."
10035040-119 = "*cough* Kirino, Fubuki...!"
10035040-120 = "Hm?"
10035040-121 = "We need to evacuate everyone immediately!"
10035040-122 = "Evacuate? What are you talking about?"
10035040-124 = "There's something in the water—some kind of giant monster!"
10035040-125 = "[s] \"A monster?!\""
10035040-129 = "That can't be right. Director, are you sure about what you saw?"
10035040-130 = "Don't over-stress, Director. If you're already seeing things, it's been a real rough day for you."
10035040-132 = "I'm serious!"
10035040-133 = "Sound the alarm and evacuate everyone immediately!"
10035040-134 = "Hurry! Before it comes back around!"
10035040-135 = "If you're that serious, I'll take your word for it."
10035040-136 = "Right! I'll sound the alarm!"
10035040-140 = "Oh my, what's going on?"
10035040-141 = "I'll make the announcement."
10035040-145 = "You should get out of here too, Sensei."
10035040-146 = "I know it's hard to believe, but…!"
10035040-147 = "[s5] \"I believe you, Kanna.\"\n[s6] \"Let's go together!\""
10035040-150 = "I'll make sure everyone gets out. I'll be the last to leave."
10035040-151 = "That's a lifeguard's duty."
10035040-152 = "All right!"
10035040-156 = "[ns] Go help the students with the evacuations."
10035040-160 = "Haha! Look at everybody freaking out and trying to get away!"
10035040-161 = "Heeheehee, they're all terrified!"
10035040-162 = "Good, let's run with it..."
10035040-167 = "...and have some real fun!"

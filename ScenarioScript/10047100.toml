[translation]
10047100-1 = "ตอนที่ 10;เวทมนตร์สมปรารถนา"
10047100-3 = "จะ... จะว่าไป... ที่เล่ากันว่า <ในวันสิ้นโลก ระฆังจะขับร้องก้องกังวาน>..."
10047100-4 = "เชื่อเรื่องเล่าแปลกๆ แบบนั้นด้วยเหรอ? มันเป็นแค่ตำนานเมืองที่เล่ากันไปทั่วเท่านั้นละ!"
10047100-5 = "ตะ... แต่มันกำลังดังอยู่จริงๆ นะคะ...! ระฆังแห่งลางร้ายจากตำนานเมืองนั่นน่ะ!"
10047100-9 = "นี่มัน... ไม่ใช่เสียงแห่งลางร้ายหรอกค่ะ"
10047100-10 = "นี่คือเสียงที่ส่งมาจากหัวใจของเด็กที่เป็นห่วงพวกเรา"
10047100-11 = "ถึงเจตนารมณ์จะไม่ตรงกัน แต่ก็เป็นสหายคนสำคัญ ความเสียใจและความกังวลที่หลงเหลือเมื่อปล่อยให้คนสำคัญเหล่านั้นออกมา"
10047100-12 = "ความรู้สึกผิดและหมดหนทางที่เกิดจากอารมณ์พวกนั้น"
10047100-13 = "แต่ถึงอย่างนั้น ฉันก็เชื่อว่าคุณจะหาเรื่องราวที่แท้จริงที่ต้องการบอกได้ค่ะ"
10047100-14 = "ฮุฮุ ฉันได้ยินมันแล้วค่ะ จิตใจอันงดงามของคุณที่ห่วงใยพวกเรา"
10047100-16 = "ยอดหอระฆังไร้ชื่อ"
10047100-18 = "ฮึ่ยยย! ทำไมฉันถึงมาทำเรื่องแบบนี้อยู่ที่นี่นะ!"
10047100-19 = "สุดท้ายทุกคนก็โดนจับได้อย่างคนเซ่อซ่า...!"
10047100-20 = "ในเมื่อเป็นแบบนี้แล้ว..."
10047100-21 = "ถ้าทำไม่สำเร็จ ฉันไม่ยกโทษให้แน่! พวกรุ่นพี่จอมทึ่ม...!!!"
10047100-24 = "กาาา! กาาาาา!!"
10047100-25 = "เฮือก มีฝูงกาออกมาด้วย...!!"
10047100-29 = "ทุกคนกำลังกลัว... เราใช้จังหวะนี้หนีกันเถอะ"
10047100-37 = "มาสเตอร์! จับมือฉันไว้นะคะ!"
10047100-38 = "มาทำให้เวทมนตร์สมปรารถนาเป็นจริงด้วยกันค่ะ!"

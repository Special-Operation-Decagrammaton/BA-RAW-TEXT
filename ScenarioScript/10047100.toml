[translation]
10047100-1 = "第10話;實現願望的魔法"
10047100-3 = "這，這麼說來……#n確實有「毀滅之日，鐘聲獨自歌唱」這種說法……"
10047100-4 = "你居然相信那種東西？#n那不過是隨處可見的都市傳說罷了！"
10047100-5 = "可，可是鐘聲真的響起來了啊……！#n傳說中的不祥之鐘！"
10047100-9 = "這……並不是不祥之音。"
10047100-10 = "而是那孩子重視著我們的心意所傳達出的聲音。"
10047100-11 = "即便理念不同卻依舊珍貴的夥伴。#n目送他們離開時，心裡留下的遺憾與不安。"
10047100-12 = "由這些情感匯聚而成的自責與無力。"
10047100-13 = "不過我相信……你一定能找到真正想說的話。"
10047100-14 = "呵呵。是啊，我都聽見了唷。#n你那份擔心我們的溫柔情意。"
10047100-16 = "無名鐘塔的頂端"
10047100-18 = "嚇啊──！我到底為什麼會在這裡做這種事啊！"
10047100-19 = "大家居然都傻乎乎地被逮個正著……！"
10047100-20 = "都走到這一步了──"
10047100-21 = "要是沒有成功的話，我絕不會原諒你們的！#n笨蛋前輩──！！！"
10047100-24 = "嘎啊啊！嘎啊啊啊！！"
10047100-25 = "哇啊，這群烏鴉是從哪裡來的……！！"
10047100-29 = "他們全都嚇傻了……趁這個機會突圍吧。"
10047100-37 = "御者！請握住我的手！"
10047100-38 = "大家一起完成能實現願望的魔法吧！"

[translation]
1701-1 = "#title;무인 병동의 유령 씨 1"
1701-2 = "#place;성 테레사 종합병원 병실"
1701-3 = "5;하나에;00;구호기사단이 도착했습니다!\n#5;hophop\n#5;al\n#5;em;[반응]"
1701-4 = "5;하나에;03;아픈 환자는 어디에 계신가요? 몸이 아프신 분은 손을 들고 큰 목소리로 대답해주세요!\n#5;hophop\n#5;em;[반짝]"
1701-5 = "2;세리나;04;쉬잇……. 하나에 쨩, 목소리가 너무 커요. #n이곳은 아픈 환자분들이 계신 병동이니 좀 더 정숙히 해주세요.\n#2;a\n#2;em;…"
1701-6 = "5;하나에;02;그렇지 않아요, 선배. #n근심은 만병의 근원이지만, 웃음은 만병을 치료하는 명약이라는 말도 있잖아요?"
1701-7 = "5;하나에;03;웃는 얼굴로 다 함께 떠들고 노래하면, 모두 금세 건강하게 될 거예요!\n#5;em;[반짝]\n#5;greeting"
1701-8 = "#na;환자 A;하하. 맞아, 맞아. #n하나에 쨩이 기운차게 떠들어 준 덕분에 병원 생활이 심심하질 않다니까."
1701-9 = "#na;환자 B;하나에 쨩의 웃는 얼굴을 보고 있노라면 절로 기운이 나는 것 같아."
1701-10 = "2;세리나;01;후후, 모두들 그렇게 생각해 주신다면 다행이지만요.\n#2;em;[재잘]"
1701-11 = "2;세리나;02;어라, 시로야기 씨. 점심에 나누어 드린 빵이 남아있네요. 혹시 점심을 남기신 건가요?\n#2;m1"
1701-12 = "#na;시로야기;그게 입맛이 없어서 말이야. 어쩐지 배가 고프지 않아서……."
1701-13 = "2;세리나;05;안돼요! 영양을 충분히 섭취하지 않으면 상처가 빨리 낫지 않는다구요.\n#2;hophop\n#2;em;[반응]"
1701-14 = "2;세리나;01\n#2;m3\n#5;dr\n#wait;1000"
1701-15 = "#5;hide\n2;세리나;01\n#2;greeting\n#wait;450"
1701-16 = "#all;hide"
1701-17 = "3;세리나;03;자. 제가 직접 먹여드릴 테니까, 아— 하세요!\n#3;closeup\n#3;em;[반짝]"
1701-18 = "#all;hide\n#na;환자 C;그게 뭐야, 치사해! 나도 아— 해줘, 세리나 쨩!"
1701-19 = "#na;환자 D;나도, 나도!"
1701-20 = "3;세리나;05;어허, 다들 너무 어리광부리면 수간호사님께 이를 거예요! 그런 눈으로 쳐다보셔도 들어드릴 수 없어요!\n#3;em;[반응]"
1701-21 = "5;하나에;00;대신, 손을 다치신 분은 하나에가 직접 빵을 먹여 드릴게요!\n#5;al\n#5;hophop\n#3;m1\n#5;em;[반짝]"
1701-22 = "5;하나에;00\n#5;em;[재잘]\n#wait;1500"
1701-23 = "3;세리나;03\n#3;em;[재잘]\n#wait;1500"
1701-24 = "3;세리나;03\n5;하나에;00\n#3;d\n#5;d\n#wait;1000"
1701-25 = "#all;hide\n#na;환자 A;학교 일도 바쁠텐데 주말마다 병원에 봉사활동을 나와서 환자들을 돌봐주다니…… 구호기사단 아이들은 정말 천사라니까."
1701-26 = "#na;환자 B;맞아, 맞아. 보고 있으면 마음까지 정화되는 느낌이 들어서…… 아무리 사악한 악령이라 하더라도 저 아이들 앞에서는 순한 양이 될 게 분명해."
1701-27 = "#na;환자 A;암, 그렇고 말고!"
1701-28 = "#all;hide"
1701-29 = "#place;성 테레사 종합병원 로비"
1701-30 = "3;세리나;01;수간호사님, 3층 회진을 모두 끝내고 돌아왔어요. 환자분들 모두 건강히 회복되고 계시답니다.\n#3;greeting\n#3;a\n#3;em;[반짝]"
1701-31 = "#na;수간호사;다들 수고하셨어요. 혹시 짓궂게 장난을 치거나 화를 내는 환자 분은 없으셨나요?"
1701-32 = "5;하나에;03;아니요! 모두 상냥하고 친절하게 대해 주셔서 오히려 즐거웠어요!\n#3;m1\n#5;a\n#5;hophop\n#5;em;[반응]"
1701-33 = "#na;수간호사;다행이네요. 그러고 보면 병실의 분위기도 전보다 훨씬 밝아졌고, 불평을 하는 환자들도 크게 줄었어요. 이게 다 구호기사단 여러분 덕분이에요."
1701-34 = "3;세리나;03;저희가 해야 할 일을 했을 뿐인걸요, 후후.\n#3;em;[재잘]"
1701-35 = "5;하나에;00;아픈 사람이 생기면 언제든 구호기사단을 불러주세요!\n#5;greeting"
1701-36 = "3;세리나;99\n#3;em;…\n#wait;2500"
1701-37 = "3;세리나;02;저…… 그런데 궁금한 게 하나 있는데요.\n#3;m3\n#5;dr\n#3;em;[반응]"
1701-38 = "#na;수간호사;뭔가요, 세리나 양?"
1701-39 = "#5;hide\n3;세리나;02;병원에 올때마다 3층까지만 환자를 안내하고 있는데, 4층에는 환자가 없는 건가요?"
1701-40 = "3;세리나;01;중앙 로비의 안내도에는 4층에도 병동이 있는 것으로 나와있는데요……."
1701-41 = "#na;수간호사;그게…… 4층의 병동에 입원한 환자들 사이에서 안 좋은 소문이 퍼져서요."
1701-42 = "3;하나에;02;안 좋은 소문이요?\n#3;em;[?]"
1701-43 = "#na;수간호사;그게 자정이 지나고 12시를 알리는 종이 치면…… 온몸에 붕대를 감은 으스스한 차림의 유령이 나타난다지 뭐예요."
1701-44 = "3;하나에;04;유, 유령이요? 그게 정말인가요?\n#3;stiff\n#3;em;[땀]"
1701-45 = "#na;수간호사;물론 진짜 유령이 나올 거라고 생각하는 건 아니지만…… 워낙 불안해하는 환자들이 너무 많아서 부득이하게 병동을 옮길 수밖에 없었답니다."
1701-46 = "#na;수간호사;그래서 지금 4층은 쓰이지 않는 무인 병동으로 남아있어요."
1701-47 = "3;세리나;04;무, 무서운 소문이네요……. #n여, 역시 4층에는 가까이 가지 않는 게 좋겠어요…….\n#3;em;…"
1701-48 = "#all;hide"
1701-49 = "3;하나에;05;안돼요, 선배. 유령이라 하더라도 몸에 붕대를 감고 있다면 아픈 환자라는 뜻이잖아요?\n#3;em;[반응]"
1701-50 = "3;하나에;05;저희 구호기사단이 아픈 환자를 외면하고 도망쳤다는 걸 미네 단장님이 알게 되신다면 분명 슬퍼하실 거라고요!\n#3;hophop"
1701-51 = "3;세리나;04;하, 하지만 저희는 살아있는 사람을 치료하는 구호기사단이지, 유령을 상대하는 퇴마사 집단이 아니잖아요?\n#3;em;[땀]"
1701-52 = "3;세리나;04;여, 역시 유령은 모른 척 하는게…….\n#3;stiff"
1701-53 = "5;하나에;05;하지만 소문이 진짜인지 가짜인지는 확인하기 전까지는 알 수 없어요!\n#5;al\n#5;em;[반응]\n#3;m1"
1701-54 = "5;하나에;05;게다가 계속되는 유령 소동 때문에 4층의 병동을 쓰지 못한다면, 그만큼 환자를 받을 수 없으니까— 이건 환자를 위한 일이기도 하다고요!"
1701-55 = "3;세리나;04;으으…… 이럴 때만 정론을 들이밀지 말아주세요!\n#3;stiff"
1701-56 = "5;하나에;03;후후, 그럼 결정됐네요. #n오늘 저녁 11시에 다시 모여 무인 병동의 유령 씨를 확인하러 가죠, 선배!\n#5;em;[재잘]\n#5;hophop"
1701-57 = "5;하나에;01\n#5;dr\n#wait;1500"
1701-58 = "#5;hide\n3;세리나;04;지, 지, 진짜로 유령이 나오면 저는 돌아갈 거예요? #n무슨 일이 생기더라도 돌아보지 않고 도망칠 거라고요!\n#3;m3\n#3;em;[반응]\n#3;hophop"

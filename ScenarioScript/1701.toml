[translation]
1701-1 = "The Ghost in the Ward Part 1"
1701-2 = "St. Teresa General Hospital Room"
1701-3 = "The Remedial Knights have arrived!"
1701-4 = "Where are the patients? If you're not feeling well, please raise your hand and yell out loud!"
1701-5 = "Shh... Hanae, you're being way too loud. There are a lot of sick people here, so please lower your voice."
1701-6 = "I don't agree with you there. Worry may be the root of all ailments, but laughter is the universal cure, right?"
1701-7 = "If everyone smiles and sings loudly together, they'll be healthy again in no time!"
1701-8 = "Haha. True, true. Thanks to Hanae's uplifting energy, life in the hospital isn't as boring as it could be."
1701-9 = "Just looking at Hanae's smile gives me energy."
1701-10 = "Heehee. I'm glad to hear you feel that way."
1701-11 = "Oh, Shiroyagi. That's the bread from lunch. Didn't you finish your meal?"
1701-12 = "I just don't have much of an appetite lately. I don't know why I'm not hungry..."
1701-13 = "But that's no good... If you wanna be healthy, you have to get enough nutrition!"
1701-17 = "Here, I'll feed you. Open wide!"
1701-18 = "No fair, that's special treatment! Feed me too, Serina!"
1701-19 = "Me too, me too!"
1701-20 = "Everyone, quit acting like children or I'll tell the head nurse! Looking at me with those sad eyes is not gonna work!"
1701-21 = "If there's a patient with injured hands, I'll feed them some bread myself!"
1701-25 = "Even though they are busy with schoolwork, they still volunteer at the hospital every weekend to take care of patients... The Remedial Knights really are angels!"
1701-26 = "That's right. Whenever I look at them, I feel like my heart is full... I bet even an evil spirit would turn into a cute little lamb in front of them."
1701-27 = "Yeah, totally!"
1701-29 = "Saint Teresa General Hospital Lobby"
1701-30 = "Head Nurse, I've finished going around the third floor. All of the patients are doing well."
1701-31 = "Great job. Did any patients give you a hard time?"
1701-32 = "No! Everyone was nice and kind to us. I really enjoyed meeting them!"
1701-33 = "Glad to hear. Now that I think of it, the atmosphere in the hospital has become much more positive, and the number of complaints from patients has gone way down. It's all thanks to the Remedial Knights."
1701-34 = "We're just doing our job, heh heh."
1701-35 = "Please let us Remedial Knights know when people need us!"
1701-37 = "By the way...I have a question."
1701-38 = "What is it, Serina?"
1701-39 = "We only go up to the first three floors when we visit. Are there any patients on the fourth floor?"
1701-40 = "The map in the central lobby shows that there's also a ward on the fourth floor..."
1701-41 = "That's because...a bad rumor has spread among the patients there..."
1701-42 = "A bad rumor?"
1701-43 = "They say that after the midnight bell rings...a ghost wrapped in bandages appears!"
1701-44 = "A-A ghost? Is that true?"
1701-45 = "I don't believe there's a real ghost...but so many of the patients were anxious about it, we had no choice but to relocate the ward."
1701-46 = "So now the fourth floor remains unused."
1701-47 = "Th-That's a scary rumor... I-I'll stay away from the fourth floor, then..."
1701-49 = "But even if it's a ghost... If it has bandages on its body, that means it's hurt, right?"
1701-50 = "If Captain Mine finds out we turned away an injured patient because we were scared, I'm sure she'll be disappointed!"
1701-51 = "B-But, the Remedial Knights only help living patients. We're not a group that deals with ghosts!"
1701-52 = "W-We really shouldn't mess with them..."
1701-53 = "We won't know the real story unless we find out if the rumors are true or not!"
1701-54 = "Besides, if the fourth floor can't be used because of the ghost, the hospital won't be able to take in as many patients. This is for the patients' sake too!"
1701-55 = "Ugh...why do you have to be so logical in a situation like this?!"
1701-56 = "Heehee. I guess you agree with me. Let's meet at eleven tonight and go check on the ghost in the empty ward!"
1701-58 = "I-If there's a real ghost, I'm gonna leave! I'll run away and never look back!"

[translation]
1701-1 = "無人病房的幽靈（１）"
1701-2 = "聖德蕾莎綜合醫院．病房"
1701-3 = "救護騎士團抵達啦！"
1701-4 = "病患在哪裡呀？身體不舒服的人，請把手舉起來大聲回答我！"
1701-5 = "噓……！花繪，你太大聲了。#n這裡是有眾多住院病患的醫療大樓，請保持安靜。"
1701-6 = "說是那樣說，可是前輩，#n人家不是常說憂慮是疾病的根源，而笑容可以治百病嗎？"
1701-7 = "只要大家帶著笑容，一起唱歌聊天，一定就能馬上恢復健康！"
1701-8 = "哈哈，說的對。#n多虧花繪醬每天有朝氣的和我們講話，住院生活才沒那麼無聊。"
1701-9 = "看著花繪的笑容，就自然而然打起精神了呢。"
1701-10 = "呵呵，既然大家都這麼認為，那就好。"
1701-11 = "哎呀，白羊先生。你怎麼又把午餐的麵包剩下來了……？"
1701-12 = "我老覺得肚子不餓呀……"
1701-13 = "可是，沒有攝取充分的營養，傷口會無法早日痊癒唷。"
1701-17 = "來吧，我來餵你，請說「啊～」！"
1701-18 = "那是什麼，不公平！芹奈醬，也來幫我「啊～」一下嘛！"
1701-19 = "我，我也要！"
1701-20 = "唉呦，大家要是再這樣撒嬌，我就要跟護理長告狀囉！就算用那種眼神看我也沒用的！"
1701-21 = "那不然，就由花繪來餵手受傷的人吃麵包吧！"
1701-25 = "明明還要忙學校課業，卻還每個週末來醫院做志工照顧病患……救護騎士團的孩子們真是天使。"
1701-26 = "說的沒錯。光是看著就感覺心裡被淨化了……在這些天使般的孩子們面前，不管多邪惡的壞蛋都一定會變成溫順的小動物。"
1701-27 = "一定，一定。"
1701-29 = "聖德蕾莎綜合醫院．大廳"
1701-30 = "護理長，3樓病房巡完了。大家都有逐步康復中。"
1701-31 = "辛苦你們了。有病患搗亂或亂發脾氣嗎？"
1701-32 = "沒有，大家對我們都善良又親切，讓我們很開心！"
1701-33 = "那就好。最近整個大樓的氣氛都比之前明亮許多，會抱怨的病患也大大減少了。這都是救護騎士團的功勞。"
1701-34 = "我們只是做應該做的事而已，呵呵。"
1701-35 = "如果有不舒服的人，請隨時呼叫我們救護騎士團！"
1701-37 = "那個……我有件事很好奇。"
1701-38 = "什麼事呢？"
1701-39 = "每次來這間醫院，巡視病患都只到3樓為止，請問4樓沒有病患嗎？"
1701-40 = "根據中央大廳的導覽圖，4樓看起來應該也有病房才對……"
1701-41 = "……那是因為呢，以前入住4樓的病患之間，有流傳著不好的傳聞。"
1701-42 = "不好的傳聞？"
1701-43 = "聽說每當午夜十二點的鐘聲響起……就會出現全身纏滿繃帶的幽靈。"
1701-44 = "幽，幽靈！？請問是真的嗎！？"
1701-45 = "當然，院方不覺得真的有幽靈出現……不過實在太多病患因此感到不安，才只好讓大家轉到其他病房。"
1701-46 = "所以現在整個4樓都閒置了。"
1701-47 = "好，好可怕……#n那，那我們還是不要靠近4樓好了……。"
1701-49 = "不行啦，前輩。就算是幽靈，既然他身上纏著繃帶，不就代表他也是病患嗎？"
1701-50 = "我們救護騎士團，不能忽視不舒服的病患逃走，要是美禰團長知道了，一定會很難過的！"
1701-51 = "可，可是我們救護騎士團的救治對象是活人，我們並不是要面對幽靈的除靈集團呀……"
1701-52 = "這，這件事還是裝作沒聽到好了……"
1701-53 = "不行，在我們親眼確認之前，還不能斷定是不是幽靈！"
1701-54 = "而且幽靈傳言如果持續存在，4樓的病房就會一直無法使用，#n這樣就無法收治病患了──所以這也是為了病患著想！"
1701-55 = "呃呃……無法反駁……！"
1701-56 = "呵呵，那就這麼決定！#n今晚11點再一起去調查無人樓層的幽靈吧，前輩！"
1701-58 = "真，真，真的出現幽靈的話，我就要回去囉？#n不管發生什麼事，我也會頭也不回地全力逃跑唷！"

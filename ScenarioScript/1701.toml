[translation]
1701-1 = "คุณวิญญาณในวอร์ดร้าง 1"
1701-2 = "ห้องพักผู้ป่วยโรงพยาบาลศูนย์เซนต์เทเรซา"
1701-3 = "ชมรมอัศวินบรรเทาทุกข์มาถึงแล้วค่าาา!"
1701-4 = "แล้วผู้ป่วยอยู่ที่ไหนคะ? ใครรู้ตัวว่าป่วยช่วยยกมือขึ้นแล้วขานตอบดังๆ ด้วยค่าาาา!"
1701-5 = "ชู่ว... ฮานาเอะจังพูดเสียงดังไปแล้ว ที่นี่คือหอพักผู้ป่วย เพราะงั้นห้ามส่งเสียงดังค่ะ"
1701-6 = "รุ่นพี่คะ มีคำกล่าวว่า#n\"ความกังวลเป็นบ่อเกิดแห่งโรค และรอยยิ้มเป็นบ่อเกิดของยาสารพัดโรค\" อยู่ใช่ไหมล่ะคะ"
1701-7 = "ถ้าพูดคุยและร้องเพลงไปด้วยกันพร้อมรอยยิ้มล่ะก็ ทุกคนจะแข็งแรงขึ้นในทันตาเห็นเลยค่ะ!"
1701-8 = "ฮ่าฮ่า ใช่แล้วๆ เพราะความน่ารักสดใสของฮานะเอะจัง#nเลยทำให้ตอนรักษาตัวที่โรงพยาบาลไม่น่าเบื่อเลย"
1701-9 = "การได้เห็นสีหน้าที่ยิ้มแย้มของฮานาเอะจังทำให้ฉันรู้สึกสดชื่นมากเลย"
1701-10 = "ฮุฮุ ถ้าทุกคนคิดแบบนั้นก็ค่อยยังชั่วหน่อยค่ะ"
1701-11 = "อ๊ะ คุณชิโรยากิคะ มีขนมปังที่แจกไปตอนมื้อกลางวันเหลืออยู่นี่คะ#nหรือว่าเหลือมาจากมื้อกลางวันเหรอคะ?"
1701-12 = "ฉันไม่ค่อยหิวเท่าไหร่น่ะ ไม่รู้ทำไมถึงไม่ค่อยหิวเลย..."
1701-13 = "ไม่ได้นะคะ! ถ้าไม่ได้รับสารอาหารที่เพียงพอ จะยิ่งทำให้ฟื้นตัวช้านะคะ"
1701-17 = "เอาล่ะ เดี๋ยวฉันจะป้อนให้นะคะ อ้ามมมม อ้าปากสิคะ!"
1701-18 = "อะไรเนี่ย ลำเอียงชะมัด อ๊ะ... ทำให้ฉันบ้างสิ เซรินะจัง!"
1701-19 = "ฉันด้วยๆ!"
1701-20 = "อ่า! ถ้างอแงกันมากๆ ฉันจะไปบอกคุณหัวหน้าพยาบาลนะคะ!#nถึงจะส่งสายตาอ้อนวอนแบบนั้นก็ไม่ช่วยอะไรหรอกค่ะ!"
1701-21 = "แต่ว่าถ้าเป็นคนป่วยที่บาดเจ็บที่มือล่ะก็... ฮานาเอะจะไปป้อนขนมปังให้ถึงเตียงเลยค่ะ!"
1701-25 = "แค่งานที่โรงเรียนก็คงจะยุ่งมากแล้ว แต่ยังมาช่วยดูแลคนไข้ที่โรงพยาบาลตอนวันหยุด#nแบบนี้อีก... สมาชิกชมรมอัศวินบรรเทาทุกข์นี่จิตใจดีเหมือนนางฟ้าจริงๆ เลย"
1701-26 = "จริงด้วยๆ แค่มองฮานาเอะจังก็รู้สึกนุ่มฟู รู้สึกเหมือนจิตใจบริสุทธิ์... ต่อให้เป็นวิญญาณ#nที่ชั่วร้ายแค่ไหน ถ้าเจอเด็กๆ พวกนี้ก็คงกลายเป็นวิญญาณที่นุ่มฟูไปแน่ๆ เลย"
1701-27 = "อ่า เป็นแบบนั้นแน่ๆ!"
1701-29 = "ล็อบบี้โรงพยาบาลศูนย์เซนต์เทเรซา"
1701-30 = "คุณหัวหน้าพยาบาลคะ ฉันเดินตรวจที่ชั้น 3 เสร็จแล้วค่ะ ผู้ป่วยทุกคนฟื้นตัวได้ดีมากเลยค่ะ"
1701-31 = "ขอบคุณทุกคนมากเลยนะคะ แล้วมีผู้ป่วยที่พูดล้อเล่นแรงๆ หรือว่าคนที่โมโหอยู่บ้างรึเปล่า?"
1701-32 = "ไม่ใช่นะคะ! ฉันรู้สึกสนุกมากๆ เพราะทุกคนคอยเอาใจใส่และดูแลฉันอย่างดีเสมอเลย!"
1701-33 = "โชคดีจัง พอดูดีๆ แล้วก็รู้สึกได้เลยว่าบรรยากาศในหอผู้ป่วยสดใสขึ้นมาก#nแถมจำนวนผู้ป่วยที่แจ้งเรื่องร้องเรียนก็ลดลงตั้งเยอะ ต้องขอบคุณชมรมอัศวินบรรเทาทุกข์จริงๆ"
1701-34 = "พวกเราแค่ทำในสิ่งที่ควรทำก็เท่านั้นเองค่ะ ฮุฮุ"
1701-35 = "ถ้ามีคนป่วยล่ะก็เรียกหาชมรมอัศวินบรรเทาทุกข์ได้ตลอดเลยค่ะ!"
1701-37 = "คือ... ฉันมีเรื่องที่สงสัยอีกเรื่องค่ะ"
1701-38 = "อะไรเหรอเซรินะจัง?"
1701-39 = "ทุกครั้งที่มาโรงพยาบาลจะได้เจอคนไข้แค่ที่ชั้น 3 เองค่ะ แล้วชั้น 4 ไม่มีคนไข้อยู่เลยเหรอคะ?"
1701-40 = "ป้ายประกาศที่ตรงล็อบบี้บอกว่ามีหอผู้ป่วยที่ชั้น 4 ด้วยนี่นา..."
1701-41 = "คือว่า... มีข่าวลือไม่ดีในหมู่คนไข้ที่อยู่ที่หอผู้ป่วยชั้น 4 น่ะสิ"
1701-42 = "ข่าวลือไม่ดีเหรอคะ?"
1701-43 = "เล่ากันว่าพอเสียงกริ่งบอกเวลาเที่ยงคืนดังขึ้น... วิญญาณที่มีผ้าพันแผลพันอยู่ทั้งตัวก็จะโผล่ออกมา"
1701-44 = "วะ...วิญญาณเหรอ เรื่องจริงเหรอคะ?"
1701-45 = "ถึงฉันจะไมได้คิดว่าจะมีวิญญาณจริงๆ โผล่ออกมา... แต่มีผู้ป่วยหลายคนที่รู้สึกกังวลกับเรื่องนี้#nจนเราไม่มีทางเลือกนอกจากย้ายผู้ป่วยออกจากที่นั่น"
1701-46 = "เพราะอย่างนั้นที่ชั้น 4 เลยไม่มีผู้ป่วยกล้าไปพักเลยล่ะ"
1701-47 = "ปะ...เป็นข่าวลือที่น่ากลัวจริงๆ นะคะ....#nถะ...ถ้างั้นก็อย่าเข้าไปใกล้ชั้น 4 จะดีกว่าค่ะ"
1701-49 = "ไม่ได้นะคะรุ่นพี่ ถึงจะเป็นวิญญาณก็เถอะ#nแต่ถ้ามีผ้าพันแผลพันอยู่ทั้งตัวแบบนั้นล่ะก็แสดงว่าเขาบาดเจ็บใช่ไหมล่ะคะ"
1701-50 = "ถ้าสมาชิกชมรมอัศวินบรรเทาทุกข์วิ่งหนีโดยไม่สนใจเรื่องผู้ป่วยล่ะก็#nหัวหน้ามิเนะจะต้องเสียใจแน่ๆ ค่ะ!"
1701-51 = "ตะ...แต่ว่าพวกเราเป็นอัศวินบรรเทาทุกข์ที่ช่วยรักษาคนเป็นนะ ไม่ใช่หมอผีปราบวิญญาณสักหน่อย"
1701-52 = "คุณวิญญาณแกล้งทำเป็นไม่ได้ยินก็ได้นะคะ..."
1701-53 = "เราจะไม่มีทางรู้ว่าเรื่องจริงหรือไม่จริงจนกว่าจะตรวจสอบให้รู้แน่ชัดนะคะ"
1701-54 = "อีกอย่างเพราะเรื่องวุ่นวายที่คุณวิณญาณก่อเอาไว้ เราเลยใช้หอผู้ป่วยชั้น 4 ไม่ได้เลย#nเท่ากับว่าเราไม่สามารถรองรับผู้ป่วยได้เท่าที่ควร... เพราะงั้นงานนี้เราต้องลงมือเพื่อผู้ป่วยค่ะ! "
1701-55 = "ตะ... ตอนนี้อย่าเพิ่งพูดถึงทฤษฎีหรือกฎอะไรเลยนะคะ!"
1701-56 = "ฮุฮุ ตัดสินใจได้แล้วค่ะ#nคืนนี้ตอนห้าทุ่มพวกเรามารวมตัวกันแล้วก็ไปพิสูจน์เรื่องคุณวิญญาณด้วยกันเถอะค่ะ รุ่นพี่!"
1701-58 = "ถะ...ถ้ามีวิญญาณโผล่มาจริงล่ะก็ ฉันจะกลับจริงๆ นะ ถ้ามีอะไรเกิดขึ้นฉันจะหนีไม่คิดชีวิตจริงๆ ด้วย!"

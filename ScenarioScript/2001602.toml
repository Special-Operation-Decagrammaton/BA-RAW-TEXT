2001602-72 = "3;이로하;01\n#3;a\n#3;greeting\n#wait;1500"
2001602-73 = "[ns] \"여, 역시 아직 전부 끝난 게 아니지? 뭔가 있는 거지?!\""
2001602-74 = "3;이로하;07;선생님, 샬레에도 커피 정도는 있죠? 뜨거운 에스프레소로 한 잔 부탁드릴게요.\n#3;em;[음표]"
2001602-75 = "3;이로하;03;저는 그럼 다시 독서로 돌아가야 하니, 이만."
2001602-76 = "#st;[0,0];instant;1;"

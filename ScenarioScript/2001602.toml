[translation]
2001602-1 = "เด็กสาวที่บุกจู่โจมกะทันหัน"
2001602-2 = "(วันที่สงบสุขและอากาศอบอุ่น)"
2001602-3 = "(ช่วงเวลายามบ่ายที่แสนสุข และไม่มีงานค้างคาใดๆ นับเป็นวันที่หาได้ยากอย่างยิ่ง)"
2001602-4 = "[ns] \"ไม่ได้เงียบสงบแบบนี้มานานแล้วนะ...\""
2001602-10 = "ขออนุญาตค่ะ คุณครู..."
2001602-11 = "[s1] \"คิดแล้วเชียวว่าไม่มีทางสงบสุขหรอก~!\"\n[s2] \"อะ...อิโรฮะ มีอะไรเหรอ?\""
2001602-12 = "อะไรเหรอคะ ไม่ได้มีเรื่องอะไรหรอกค่ะ แค่ตอนที่แชต MOMOTALK คุณครูบอกว่าอยู่ที่ชาเล่ต์"
2001602-13 = "อา... ไม่มีอะไรหรอกค่ะ แค่ตอนที่แชต MOMOTALK คุณครูบอกว่าอยู่ที่ชาเล่ต์"
2001602-14 = "ฉันเลยแวะมาหาคุณครูก็เท่านั้นค่ะ"
2001602-15 = "ฉันได้รับภารกิจมาจากแพนเดโมเนียม โซไซตี้ค่ะ นั่นก็คือให้ล่อลวงคุณครูออกไปข้างนอกค่ะ"
2001602-16 = "เราต้องล่อลวงคุณครูออกไป ไม่ว่าจะด้วยวิธีไหนก็ตาม จะข่มขู่ หลอกล่อ หรือใช้ตัวประกันมาข่มขู่ หรือไม่ก็... "
2001602-17 = "แม้แต่การล่อลวงให้มาเข้าเป็นพันธมิตรค่ะ"
2001602-18 = "อืม ถ้าเป็นแบบนี้คงจะได้คำตอบแล้วใช่มั้ยคะ?"
2001602-19 = "[s] \"คือว่า... เรื่องนั้นพูดมาง่ายๆ แบบนั้นก็ได้เหรอ?\""
2001602-20 = "..."
2001602-21 = "เฮ้อ... น่ารำคาญจริงๆ"
2001602-22 = "[s] \"เรื่องนี้ครูผิดตรงไหนเนี่ย?!\""
2001602-23 = "จะว่ายังไงดีล่ะ การที่ต้องมานั่งตอบคำถามเรื่องที่มันมีคำตอบชัดเจนอยู่แล้วแบบนี้ มันน่ารำคาญน่ะค่ะ..."
2001602-24 = "แต่ถ้าคุณครูยืนกรานว่าอยากฟังคำตอบให้ได้จริงๆ... มันก็ไม่ได้ยากอะไรเลยค่ะ"
2001602-25 = "เพราะฉันเองก็คิดว่าการมาป้วนเปี้ยนรอบๆ ตัวคุณครู โดยไม่บอกจุดประสงค์ที่แท้จริงไปตรงๆ เลย#nมันเป็นการกระทำที่ได้ประโยชน์"
2001602-26 = "ดูจากข้อมูลจากทางแพนเดโมเนียมโซไซตี้แล้ว ทำให้ฉันรู้ว่าคุณครูไม่ใช่คนที่จะหลงกลอะไรง่ายๆ"
2001602-27 = "โอกาสที่จะทำสำเร็จจึงเป็นศูนย์อยู่แล้ว ดังนั้นการเปิดเผยข้อมูลตั้งแต่แรกและเข้าหาคุณครูตรงๆ น่าจะเป็นวิธีที่ดีกว่าค่ะ"
2001602-28 = "อย่างน้อยแบบนี้ก็จะไม่ทำให้คุณครูมองฉันเป็น <ศัตรู> ค่ะ ทำแบบนี้เป็นประโยชน์มากกว่าอีก"
2001602-29 = "อีกอย่างฉันก็ขี้เกียจเกินกว่าจะมานั่งทำอะไรน่ารำคาญแบบนี้ด้วยค่ะ"
2001602-30 = "[s] \"พูดออกมาตรงๆ แบบนี้ครูก็ช็อกนะ\""
2001602-31 = "อีกอย่าง คุณครูเองก็คงไม่ชอบให้ใครมาป้วนเปี้ยนใกล้ๆ โดยปิดบังเจตนาที่แท้จริงไว้หรอกใช่มั้ยล่ะคะ?"
2001602-32 = "ฉันเลยอยากจะลดความเสี่ยงเรื่องนั้นด้วย เลยเลือกใช้วิธีที่น่าจะได้ผลดีที่สุด"
2001602-33 = "[s] \"แต่ถึงอิโรฮะจะมีจุดประสงค์แอบแฝง ครูก็ไม่แคร์หรอกนะ\""
2001602-34 = "หา...? อะไรนะคะ?"
2001602-35 = "คุณครูหมายความว่ายังไงคะ? พูดแบบนั้นฉันเคืองนะคะ"
2001602-36 = "คุณครูคิดว่าไม่เป็นไรจริงๆ งั้นเหรอคะ ที่ปล่อยให้คนที่มีเจตนาแอบแฝงมาป้วนเปี้ยนอยู่รอบๆ ตัว#nคุยกันด้วยสีหน้ายิ้มสดใสไร้เดียงสา แต่เจตนาที่แท้จริงกลับอยากใช้ประโยชน์จากคุณครูน่ะ? "
2001602-37 = "แบบนั้นมันเลวร้ายพอๆ กับพวกทรีนิตี้ที่น่ารังเกียจนั่นเลยนะคะ"
2001602-38 = "[s3] \"เปรียบเทียบได้โหดร้ายมาก!\"\n[s4] \"เปล่าซะหน่อย ครูแค่คิดว่าอิโรฮะคงมีเหตุผลบางอย่างน่ะ\""
2001602-39 = "ถึงได้ข้อมูลล่วงหน้ามาบ้างแล้วก็เถอะ แต่ไม่คิดว่าจะเป็นคนแบบนี้ ผิดจากที่คิดไว้เลย"
2001602-40 = "ถึงได้ข้อมูลล่วงหน้ามาบ้างแล้วก็เถอะ แต่ไม่คิดว่าจะเป็นคนแบบนี้ ผิดจากที่คิดไว้เลย"
2001602-41 = "แต่ก็เอาเถอะค่ะ ถ้าคุณครูพูดแบบนั้น ฉันอาจจำเป็นที่จะต้องปรับเปลี่ยนกลยุทธ์นิดหน่อย"
2001602-42 = "ถึงฉันจะขี้เกียจอธิบาย แต่ก็จะขอบอกเอาไว้ก่อนเลยแล้วกันนะคะ"
2001602-43 = "คุณครู... ช่วยมอบอำนาจของชาเล่ต์ให้กับทางแพนเดโมเนียม โซไซตี้ด้วยค่ะ ถ้าขั้นตอนการมอบ#nอำนาจมันยุ่งยาก จะทำในรูปแบบการสนับสนุน หรือให้ความร่วมมือกับทางแพนเดโมเนียม โซไซตี้#nก็ได้ค่ะ"
2001602-44 = "แต่ถ้าวิธีพวกนั้นยังยุ่งยากเกินไปอีกละก็ จะมาเป็นเอาท์ซอร์ตของทางแพนเดโมเนียม โซไซตี้ก็ได้นะคะ"
2001602-45 = "ถ้ายอมทำตามที่ขอ ทางเราสัญญาว่าจะมอบของตอบแทนที่สมน้ำสมเนื้อให้ค่ะ"
2001602-46 = "เหมือนกับคำกล่าวที่ว่า <ในวันที่ยึดครองคิโวทอสได้ จะแบ่งคิโวทอสแห่งนี้ให้ครึ่งหนึ่ง!> ยังไงล่ะคะ"
2001602-47 = "ปกติในพวกสัญญามักจะมีข้อกำหนด หรือเงื่อนไขที่เขียนเกินจริงเอาไว้ เพราะงั้นในกรณีนี้..."
2001602-48 = "อาจจะเขียนเป็น <ได้ของตอบแทนไม่ถึงครึ่งหนึ่ง แต่ในทางนามธรรมแล้วไม่มีอะไรที่เรียกได้ว่า#nไม่ถึงครึ่ง> แบบนี้ค่ะ ซึ่งการตีความย่อมแตกต่างออกไปตามความเข้าใจของแต่ละบุคคล"
2001602-49 = "เอาละค่ะ คุณครูจะว่ายังไงคะ สนใจทำสัญญาเอ็กซ์คลูซีฟกับทางแพนเดโมเนียม โซไซตี้ ขึ้นมาบ้างรึยังคะ?"
2001602-50 = "[s] \"ครูขอปฏิเสธ\""
2001602-51 = "อา... งั้นเหรอคะ คุณครูไม่สนใจเลยสินะคะ ถ้างั้นก็ดีเลยค่ะ"
2001602-52 = "[s] \"หืม...?\""
2001602-57 = "[ns] \"นี่ อิโรฮะ...? ทำไมถึงไปนอนบนโซฟาแบบนั้นล่ะ...?\""
2001602-58 = "รอเดี๋ยวนะคะ คุณครู... ฉันกำลังหาท่านอนที่สบายที่สุดอยู่ค่ะ"
2001602-62 = "อา~ แบบนี้แล้วสบายขึ้นหน่อยค่ะ ไหนดูซิ..."
2001602-67 = "[ns5] \"จู่ๆ ไปนอนแล้วก็อ่านหนังสือเนี่ยนะ?!\"\n[ns6] \"ครูชักตามอารมณ์ไม่ทันแล้ว...?!\""
2001602-68 = "อ๊ะ จริงด้วย..."
2001602-69 = "อ๊ะ จริงด้วย..."
2001602-73 = "[ns] \"วะ...ว่าแล้วว่ายังไม่หมดสินะ? อะไรอีกล่ะทีนี้?!\""
2001602-74 = "คุณครูคะ ที่ชาเล่ต์นี่คงมีกาแฟอยู่ใช่มั้ยคะ? ถ้างั้นรบกวนขอเอสเพรสโซ่แก้วนึงด้วยค่ะ"
2001602-75 = "ส่วนฉันจะอ่านหนังสือต่อแล้ว เพราะงั้น... ไม่กวนนะคะ"
2001602-79 = "[ns] \"ดะ...เดี๋ยวก่อนสิ?\""
2001602-83 = "(หลังจากนั้นคุณครูก็ใช้เวลายามบ่ายอย่างกระอักกระอ่วนไปกับอิโรฮะที่ยึดครองโซฟาไปแล้ว...)"

2001602-56 = "3;이로하;01\n#3;greeting\n#3;d\n#wait;1500"
2001602-57 = "[ns] \"저기, 이로하……? 왜 갑자기 소파에 드러눕는 거야……?\""
2001602-58 = "#na;이로하;아, 잠시만요. 선생님. 지금 베스트 포지션을 찾고 있으니까요."
2001602-59 = "#st;[0,0];instant;1;"

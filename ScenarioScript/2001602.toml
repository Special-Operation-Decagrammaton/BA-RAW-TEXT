2001602-61 = "#wait;1500"
2001602-62 = "#na;이로하;아, 이렇게 하니 조금 편해졌네요. 그럼 어디……."
2001602-63 = "#st;[0,0];instant;1;"
2001602-64 = "#clearST"
2001602-65 = "#wait;1000"
2001602-66 = "#wait;1000"
2001602-67 = "[ns5] \"난데없이 편하게 드러누운 자세로 독서를 시작한다고?!\"\n[ns6] \"지금 전개를 따라가기가 힘든데요?!\""
2001602-68 = "#na;이로하;아, 맞다……."
2001602-69 = "#na;이로하;아, 맞다……."
2001602-70 = "#st;[0,0];instant;1;"

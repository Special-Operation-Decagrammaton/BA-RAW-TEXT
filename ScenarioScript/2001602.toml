[translation]
2001602-1 = "#title;습격해오는 프로일라인"
2001602-2 = "#na;(따사로운 햇살이 내리쬐던 평화로운 어느 날.)"
2001602-3 = "#na;(그날따라 밀린 업무도 없이, 드물게 찾아온 느긋한 오후 시간을 만끽하고 있을 때였다.)"
2001602-4 = "[ns] \"오늘은 오래간만에 평화롭네…….\""
2001602-5 = "#st;[0,0];instant;1;"
2001602-6 = "#clearST"
2001602-7 = "#wait;1000"
2001602-8 = "#wait;1000"
2001602-9 = "3;이로하;01\n#3;a\n#wait;1500"
2001602-10 = "3;이로하;03;실례하겠습니다. 선생님.\n#3;greeting\n#3;em;[반짝]"
2001602-11 = "[s1] \"네, 역시 그렇겠죠~!\"\n[s2] \"이, 이로하가 여긴 가, 갑자기 어쩐 일이야?\""
2001602-12 = "3;이로하;02;아, 별 건 아니에요. 모모톡으로 물어보니 샬레에 계신다길래.\n#3;em;[반응]"
2001602-13 = "3;이로하;02;아, 별 건 아니에요. 모모톡으로 물어보니 샬레에 계신다길래.\n#3;em;[반응]"
2001602-14 = "3;이로하;01;뭐, 그럼 이때다 싶어서 찾아왔을 뿐이니까요."
2001602-15 = "3;이로하;01;만마전에서 임무가 내려왔거든요. 샬레, 그러니까 선생님을 꾀어내라는 명령이."
2001602-16 = "3;이로하;99;수단과 방법은 불문. 협박을 하든, 회유를 하든, 무언가를 인질로 삼든- 정 아니면…… \n#3;em;…"
2001602-17 = "3;이로하;07;그렇네요. 유혹을 해서라도 아군으로 만들어라."
2001602-18 = "3;이로하;01;음, 뭐, 이 정도라면 원하는 대답이 되셨나요?"
2001602-19 = "[s] \"저기 말이야……. 그런 걸 순순히 말해도 되는 거야?\""
2001602-20 = "3;이로하;02;…………."
2001602-21 = "3;이로하;06;하아……. 진짜 귀찮아.\n#3;em;[속상함]\n#3;stiff"
2001602-22 = "[s] \"내가 나쁜 거야. 이거?!\""
2001602-23 = "3;이로하;01;뭐랄까, 답이 정해져 있는 뻔한 질문에 답하라는 건 지인-짜, 진짜 귀찮은데요……."
2001602-24 = "3;이로하;99;그래도 굳이 대답을 듣고 싶으시다면야……. 간단한 이야기에요.\n#3;em;…"
2001602-25 = "3;이로하;01;아무것도 밝히지 않고서 제 딴에 머리를 굴린다고 선생님 근처를 이리저리 오가며 괜히 의중이나 떠보는, 그런 짓은 의미 없다고 생각했을 뿐이에요."
2001602-26 = "3;이로하;01;이제까지 저희 만마전에서 파악한 정보에 따르면, 애당초 선생님은 이런 어지간한 수단에 넘어가지 않는 인물상이라는 건 진즉 파악하고 있고."
2001602-27 = "3;이로하;99;그러니 성공할 가능성이 0%에 수렴하는 짓을 할 바에야 처음부터 모든 정보를 오픈한 채로 접근해, 곁에 딱 달라붙는다……."
2001602-28 = "3;이로하;07;이러면 적어도 선생님으로부터 <적의>는 사지 않을 테니, 뭐, 남는 장사죠.\n#3;em;[반짝]"
2001602-29 = "3;이로하;01;그리고 귀찮기도 하고요."
2001602-30 = "[s] \"엄청나게 본심이 흘러나오고 있잖아.\""
2001602-31 = "3;이로하;02;게다가, 뭐, 당연한 거지만. 그런 식으로 자기 속내를 감추고 접근하려는 사람을 곁에 두고 싶지는 않을 거 아니에요?"
2001602-32 = "3;이로하;99;저로선 그런 리스크를 피하기 위해서라도 이런 전략을 취해서……."
2001602-33 = "[s] \"뭐, 그래도 나는 이로하가 속내를 감추고 있어도 딱히 신경 안 쓰는데.\""
2001602-34 = "3;이로하;04;………하? 네?\n#3;em;[?]"
2001602-35 = "3;이로하;05;그게 무슨 말씀이신가요? 그런 건, 기분 나쁘기만 하잖아요?\n#3;stiff"
2001602-36 = "3;이로하;00;속내는 감추고 겉으로만 생글생글 웃으면서 접근해오는 생명체라니, 심지어 그 본심은 나를 이용할 생각으로 한가득.\n#3;em;…"
2001602-37 = "3;이로하;05;이거 그 기분 나쁜 트리니티 녀석들하고 비슷할 정도로 기분 나쁘잖아요?"
2001602-38 = "[s3] \"가차 없는 평가로구만!\"\n[s4] \"아니, 그것과 별개로 그렇게 한다면 사정이 있을 거라고 생각하니까.\""
2001602-39 = "3;이로하;06;……사전 조사를 통해 정보를 접수하긴 했지만, 설마 상상 이상으로……… 이런 분이셨을 줄이야…….\n#3;stiff"
2001602-40 = "3;이로하;06;……사전 조사를 통해 정보를 접수하긴 했지만, 설마 상상 이상으로……… 이런 분이셨을 줄이야…….\n#3;stiff"
2001602-41 = "3;이로하;99;하지만 그렇네요. 선생님이 그렇게까지 말씀하신다면, 조금 전략을 바꿀 필요가 있을지도 모르겠어요.\n#3;em;…"
2001602-42 = "3;이로하;00;그럼 정말, 정말 귀찮지만 일단 한번 말해보겠습니다."
2001602-43 = "3;이로하;05;선생님. 샬레의 힘을 저희 만마전에게 넘기세요. 그게 곤란하시다면 서포트의 형태로, 만마전과 협업을 하는 형태라도 상관없습니다.\n#3;em;[반응]"
2001602-44 = "3;이로하;01;정 그것도 곤란하다면 아예 만마전의 아웃소싱이라는 형태라도 좋습니다."
2001602-45 = "3;이로하;03;그렇게만 해주신다면 충분한 보상을 약속드리지요."
2001602-46 = "3;이로하;99;그 왜 <키보토스를 제압하는 날에는, 이 키보토스의 반을 주겠다!>……같은 말도 나왔었으니까요.\n#3;em;…"
2001602-47 = "3;이로하;02;뭐, 원래 계약이라는 건 언제나 약관에 과장된 이야기가 쓰여 있기 마련이니, 여기서는 적당히……."
2001602-48 = "3;이로하;07;<절반에는 못 미치지만, 주관적으로는 절반이라고 부르지는 못할 것도 없는 정도>라고 말해둘까요? 물론 사람마다 받아들이는데 차이는 있겠습니다마는.\n#3;em;[반짝]"
2001602-49 = "3;이로하;03;자아, 어떠신가요? 구미가 좀 당기시나요? 만마전과의 독점 계약."
2001602-50 = "[s] \"사양하겠습니다.\""
2001602-51 = "3;이로하;02;아, 그래요. 관심 없으시단 거네요. 그럼 잘됐네요."
2001602-52 = "[s] \"……응?\""

[translation]
2001602-1 = "來襲的少女"
2001602-2 = "（某個陽光普照的和平午後）"
2001602-3 = "（手邊工作告一段落，久違迎接能夠悠哉度過的時間）"
2001602-4 = "[ns]「這麼平靜的時間還真是稀──」"
2001602-10 = "打擾了。"
2001602-11 = "[s1]「我就知道。」\n[s2]「伊呂波，你突然來這裡有什麼事嗎……？」"
2001602-12 = "沒有，沒什麼要事。"
2001602-13 = "沒有，沒什麼要事。"
2001602-14 = "只是聽說老師人在夏萊，我就來了。"
2001602-15 = "也算是萬魔殿下了一道任務，要我拉攏夏萊的勢力……簡單來說就是要拉攏老師。"
2001602-16 = "威脅，懷柔，人質，甚至勾引，怎樣都行，"
2001602-17 = "總之就是要讓老師站在我們這邊。"
2001602-18 = "所以我來了，請問還有其他問題嗎？"
2001602-19 = "[s]「……這種事情可以和要拉攏的對象全部說出來嗎？」"
2001602-20 = "…………"
2001602-21 = "你這個人還真麻煩……"
2001602-22 = "[s]「這是我的錯嗎！？」"
2001602-23 = "不是你看嘛，不覺得這種事有夠麻煩嗎……"
2001602-24 = "如果老師要我說明一下狀況，也是可以啦……"
2001602-25 = "其實單純是我自己覺得，不管是要從老師周遭開始下手斷後路，還是要構思計謀慢慢刺探，似乎都沒甚麼意義。"
2001602-26 = "何況根據萬魔殿掌握的情報，我很清楚這些手段難以騙到老師。"
2001602-27 = "所以我就想說，與其這麼拐彎抹角，還不如一開始全講白了……"
2001602-28 = "至少不會引起老師的「敵意」，這樣對我們也比較沒有壞處。"
2001602-29 = "還有就是很麻煩。"
2001602-30 = "[s]「這才是你的真心話吧……」"
2001602-31 = "而且老師也不希望有個不說真話的人靠近自己吧？"
2001602-32 = "所以我也算是有把這方面的風險也算進去，認為最好盡量說真心話──"
2001602-33 = "[s]「這部分就算伊呂波真的有所隱瞞，我應該也不會在意啦……」"
2001602-34 = "……？"
2001602-35 = "……那是什麼意思？"
2001602-36 = "如果有人掛著一張虛偽的笑容接近自己，一般來說不都很討厭嗎？不會覺得對方是要利用自己嗎？"
2001602-37 = "老師不覺得那種三一流作風很噁心嗎？"
2001602-38 = "[s3]「講話請修飾一下吧！」\n[s4]「不過那種時候，對方應該都會有什麼苦衷啦……」"
2001602-39 = "……雖然經過事前調查已經了解了，但沒想到老師是這樣的人。"
2001602-40 = "……雖然經過事前調查已經了解了，但沒想到老師是這樣的人。"
2001602-41 = "既然老師都說到這份上，看來這部分怎樣都無所謂了……"
2001602-42 = "那就讓我重新，直接向老師請求一次。"
2001602-43 = "老師，請把夏萊的力量借給我們萬魔殿。"
2001602-44 = "就算無法全面支援，以組織合作或協助的形式也可以。"
2001602-45 = "當然，我們也會提供充分的報酬。"
2001602-46 = "依照上層所說的，概念就像是……「當我們成功征服奇普托斯時，會將奇普托斯分一半給你！」"
2001602-47 = "不過這部分也請不要完全相信。這種說法基本上都是一個籠統的誇飾法而已。"
2001602-48 = "因此實際上請把它想成：「雖然不會剛好一半，但主觀上差不多有一半」這種感覺。就像分吃冰棒一樣。"
2001602-49 = "以上，老師意下如何呢？"
2001602-50 = "[s]「我拒絕……」"
2001602-51 = "是嗎，我了解了。"
2001602-52 = "[s]「……？」"
2001602-57 = "[ns]「伊呂波，你怎麼突然躺到沙發上……」"
2001602-58 = "請等一下，我正在調一個最好的姿勢。"
2001602-62 = "……好，就是這感覺。"
2001602-67 = "[ns5]「竟然開始看書了！」\n[ns6]「我完全跟不上你的節奏！」"
2001602-68 = "啊，對了……"
2001602-69 = "啊，對了……"
2001602-73 = "[ns]「什麼對了……？」"
2001602-74 = "夏萊也有咖啡吧？請幫我泡一杯熱濃縮咖啡。"
2001602-75 = "我要繼續看書了。"
2001602-79 = "[ns]「……欸？」"
2001602-83 = "（於是伊呂波就這麼突然闖進夏萊，突然把這當自己家，讓我在她旁邊莫名緊張的度過了整個下半天）"

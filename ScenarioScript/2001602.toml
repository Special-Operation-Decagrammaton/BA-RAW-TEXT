[translation]
2001602-1 = "Ambushing Fraulein"
2001602-2 = "One peaceful and sunny day."
2001602-3 = "I was enjoying a rare lazy afternoon."
2001602-4 = "[ns] \"It's such a nice day today.\""
2001602-10 = "Excuse me, Sensei."
2001602-11 = "[s1] \"Is something wrong?\"\n[s2] \"What's up, Iroha?\""
2001602-12 = "Nothing. I asked you on MomoTalk and you said you were at Schale."
2001602-13 = "Nothing. I asked you on MomoTalk and you said you were at Schale."
2001602-14 = "So I came to see you."
2001602-15 = "We received a mission from the Pandemonium Society. It was an order to lure you out."
2001602-16 = "By any means possible. We've been given clearance to threaten you, negotiate, hold you hostage, or even... "
2001602-17 = "Even seduce you and turn you into an ally."
2001602-18 = "That's pretty much it."
2001602-19 = "[s] \"Um... Is it okay for you to tell me that?\""
2001602-20 = "..."
2001602-21 = "This is so annoying."
2001602-22 = "[s] \"You're the one that's annoyed?!\""
2001602-23 = "I hate stupid questions."
2001602-24 = "But if you really need an answer...it's simple."
2001602-25 = "I thought it would be pointless to make something up."
2001602-26 = "Based on my intel, you're not the type to fall for sketchy tricks."
2001602-27 = "I figured my best bet would be to lay out all my cards from the start and just stick by you."
2001602-28 = "At least then you wouldn't think badly of me."
2001602-29 = "Besides, I'm too lazy to come up with some elaborate strategy."
2001602-30 = "[s] \"Thanks for being honest, I guess?\""
2001602-31 = "And you wouldn't want a liar for an ally, right?"
2001602-32 = "I took the route with the least effort and most efficiency."
2001602-33 = "[s] \"I don't really care if you want to hide something from me.\""
2001602-34 = "...What?"
2001602-35 = "What do you mean? I'm a little offended."
2001602-36 = "Are you really okay with someone pretending to like you, when all they want is to take advantage of you?"
2001602-37 = "You're making me almost as angry as those Trinity morons do."
2001602-38 = "[s3] \"That's a ruthless observation!\"\n[s4] \"I would just assume you have your reasons.\""
2001602-39 = "I did my research before speaking to you, but you've exceeded my expectations..."
2001602-40 = "I did my research before speaking to you, but you've exceeded my expectations..."
2001602-41 = "Hm... But if that's the case, I might have to change my strategy a bit."
2001602-42 = "So let me explain, even though I really don't want to."
2001602-43 = "Sensei, please lend Schale's power to the Pandemonium Society. If that's not possible, please just help us."
2001602-44 = "And if that's too much, just think of us...as a contractor."
2001602-45 = "If you can help us, we'll make it worth your while."
2001602-46 = "I think they said something like, \"On the day we dominate Kivotos, we'll give you half!\""
2001602-47 = "Well, the stuff they promise in contracts is always exaggerated, right?"
2001602-48 = "Why don't we leave it at, \"You may get less than half, but what is half, anyway? It's all subjective.\" It's different interpretations."
2001602-49 = "What do you say? You want to make an exclusive contract with the Pandemonium Society?"
2001602-50 = "[s] \"No thanks.\""
2001602-51 = "Hm. I see. That's a relief."
2001602-52 = "[s] \"Huh?\""
2001602-57 = "[ns] \"Iroha? Why are you lying on the sofa now?\""
2001602-58 = "Just a second, Sensei. I'm trying to get comfortable."
2001602-62 = "Ahhh... This is much better."
2001602-67 = "[ns5] \"What? You're going to start reading now?!\"\n[ns6] \"I don't understand what you're doing!\""
2001602-68 = "Oh, right..."
2001602-69 = "Oh, right..."
2001602-73 = "[ns] \"I knew there was more to it!\""
2001602-74 = "You have coffee here, right? Can you get me a shot of espresso?"
2001602-75 = "I want to finish this book today, so..."
2001602-79 = "[ns] \"E-Excuse me?!\""
2001602-83 = "I spent a very uncomfortable afternoon with Iroha sprawled out on the sofa in Schale with no explanation."

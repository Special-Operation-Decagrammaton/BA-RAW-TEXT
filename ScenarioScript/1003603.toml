[translation]
1003603-1 = "Overpayment"
1003603-2 = "Inside the Trinity Cathedral"
1003603-3 = "All of the Sisterhood students seemed worried when I arrived at the cathedral."
1003603-4 = "Hinata isn't listening to us..."
1003603-5 = "I'm really worried about her."
1003603-6 = "[s1] \"(Hinata isn't listening to them?)\"\n[s2] \"(I'm getting worried too...)\""
1003603-7 = "Oh. Sensei?"
1003603-8 = "Oh. Sensei?"
1003603-9 = "H-Hello. What brings you to the cathedral?"
1003603-10 = "D-Did you come because of my last message?"
1003603-11 = "U-Ugh..."
1003603-12 = "[s3] \"Are you okay? You don't look so good.\"\n[s4] \"You're drenched in sweat. Do you have a fever?\""
1003603-13 = "Well, the thing is..."
1003603-14 = "Well, the thing is..."
1003603-15 = "I-I mean, no. It's nothing! I think it's just a cold..."
1003603-16 = "Nothing I can't handle. Everyone gets sick sometimes. I can still work..."
1003603-17 = "I swear I'm fine. Y-You don't have to worry so much. Haha..."
1003603-18 = "[s5] \"Let's get you somewhere else, Hinata.\"\n[s6] \"Just stay calm and follow me, okay?\""
1003603-19 = "H-Huh?"
1003603-20 = "H-Huh?"
1003603-21 = "But I don't..."
1003603-22 = "Okay..."
1003603-28 = "Um, Sensei...?"
1003603-29 = "Why did we come over here?"
1003603-30 = "Huh?"
1003603-31 = "You brought me here for a reason?"
1003603-32 = "I should sit down and rest?"
1003603-33 = "U-Um... Okay. That's what what everyone has been telling me to do today..."
1003603-34 = "...b-but there are still things I need to do."
1003603-35 = "I can't just sit around and do nothing. The last thing I want to do is let everyone down..."
1003603-36 = "[s7] \"You're not letting them down. They're worried about you.\"\n[s8] \"Let me handle it. I'll help them finish your work.\""
1003603-37 = "B-But I can't just dump my work onto others like that!"
1003603-38 = "B-But I can't just dump my work onto others like that!"
1003603-39 = "Especially when...I can never return the favor. I can't possibly do the things that they do."
1003603-40 = "That means..."
1003603-41 = "[s] \"I don't think that's true at all.\""
1003603-42 = "...?"
1003603-43 = "Wh-What do you mean?"
1003603-44 = "[s] \"Everyone relies on you, Hinata.\""
1003603-45 = "I..."
1003603-46 = "R-Really?"
1003603-47 = "Is that true?"
1003603-48 = "That's what they always say...but I have a hard time believing it."
1003603-49 = "Though maybe it's true if you're saying it."
1003603-50 = "I'd really like to believe it..."
1003603-51 = "No, wait."
1003603-52 = "I'm sorry. I'm sure it's true."
1003603-53 = "I mean...it must be if you're saying it."
1003603-54 = "A-Ahaha..."
1003603-55 = "That makes me feel much more...at peace."
1003603-58 = "― U-Um, I'm so sorry...Sensei.[wa:7900] "
1003603-60 = "― I never wanted to be a burden to you...[wa:1010] "
1003603-63 = "― I can push through this...or so I thought.[wa:2120] "
1003603-65 = "― I'm useless if I'm not healthy. It's so embarrassing...[wa:1800] "
1003603-68 = "― But you're right. I should be resting.[wa:4190] "
1003603-71 = "― So, if...it's not too much to ask,[wa:2490] "
1003603-73 = "― would you mind staying with me for a bit?"
1003603-76 = "― I'd feel a lot better with you here...[wa:9640] "
1003603-79 = "― You will? Thank you.[wa:3040] "
1003603-81 = "― You're so sweet, Sensei.[wa:1290] "
1003603-84 = "I already feel much better thanks to you."
1003603-85 = "Okay. I'll go home and rest today."
1003603-86 = "I'm still flushed and drenched with sweat. I've felt better."
1003603-87 = "I'll need to get some rest before I can get back on my feet."
1003603-88 = "Especially if the others all rely on me, like you said."
1003603-90 = "I then led Hinata out of the cathedral."
1003603-91 = "I began thinking of explanations for how things surely seemed between Hinata and myself as the heated gaze of onlookers bore down on us."

1003603-3 = "#na;(성당으로 도착하니, 들어가자마자 걱정스러운 표정을 한 시스터후드 학생들이 눈에 들어왔다.)"
1003603-4 = "#na;시스터후드 학생 A;으음……. 히나타 자매님, 전혀 말씀을 안 들어주고 계시는데……."

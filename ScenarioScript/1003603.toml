[translation]
1003603-1 = "過猶不及"
1003603-2 = "三一教堂內部"
1003603-3 = "（到達教堂後，就看到修女會的學生們帶著擔憂的表情互相交談）"
1003603-4 = "日向修女完全不肯聽我們的話……"
1003603-5 = "就是呀，再這樣下去……"
1003603-6 = "[s1]（不聽其他同學的話……？）\n[s2]（再這樣下去……？）"
1003603-7 = "……哎呀，老師？"
1003603-8 = "……哎呀，老師？"
1003603-9 = "您，您好，老師。#n今天來有什麼事嗎？"
1003603-10 = "該，該不會，是因為我傳的訊息……？"
1003603-11 = "唔……"
1003603-12 = "[s3]「日向，還好嗎？你看起來不太舒服……」\n[s4]「你怎麼在冒冷汗……莫非感冒了嗎？」"
1003603-13 = "這是……那個……"
1003603-14 = "這是……那個……"
1003603-15 = "這，這沒什麼……！"
1003603-16 = "這種事常有，也沒有不舒服到完全動不了……"
1003603-17 = "我，我真的不要緊，請老師不用擔心……"
1003603-18 = "[s5]「……先換個地方吧，日向。」\n[s6]「……你有辦法走動嗎？」"
1003603-19 = "……？"
1003603-20 = "……？"
1003603-21 = "請問您要……"
1003603-22 = "啊，是……"
1003603-28 = "那個，老師？"
1003603-29 = "請問我們要去哪裡呢……？"
1003603-30 = "這附近已經沒有其他人了……"
1003603-31 = "咦，沒有人的地方才好……？"
1003603-32 = "可，可是……"
1003603-33 = "您，您要我休息嗎？#n原來老師也這麼想嗎……"
1003603-34 = "可是我今天還有其他該做的事……"
1003603-35 = "我要是不做完，會給大家帶來更多困擾……"
1003603-36 = "[s7]「大家不是覺得困擾，而是為你擔心。」\n[s8]「剩下的事我和其他人都可以幫你。」"
1003603-37 = "這，這怎麼行，怎麼可以把自己分內的事情推給其他人……！"
1003603-38 = "這，這怎麼行，怎麼可以把自己分內的事情推給其他人……！"
1003603-39 = "何況我無法協助其他人的工作……受到幫助的總是我……"
1003603-40 = "要是還把工作推給別人，那我……"
1003603-41 = "[s]「恰恰相反。」"
1003603-42 = "……？"
1003603-43 = "什麼意思……？"
1003603-44 = "[s]「是因為大家都很依賴日向，所以才會要你休息。」"
1003603-45 = "……"
1003603-46 = "咦……"
1003603-47 = "真，真的是那樣嗎……？"
1003603-48 = "我實在沒有這種感覺……"
1003603-49 = "如果老師說的是真的，那還真是令人高興……"
1003603-50 = "但我自己真的沒辦法……"
1003603-51 = "……不。"
1003603-52 = "……對不起。我不該那麼想。"
1003603-53 = "連老師都這麼說了……那我也不會懷疑大家對我的感受了……"
1003603-54 = "呵呵……"
1003603-55 = "總覺得，心情輕鬆多了……"
1003603-58 = "― 那個……很抱歉，老師。[wa:8580] "
1003603-60 = "— 我好像，造成了您的困擾……[wa:2010] "
1003603-63 = "— 本來以為，不是什麼大不了的事……[wa:3120] "
1003603-65 = "— 而且我也一直以強壯的身體為傲，真是沒臉見人……[wa:3040] "
1003603-68 = "— 我會照老師所說，稍微休息一下。[wa:5070] "
1003603-71 = "― 所以，那個……這段期間……[wa:3330] "
1003603-73 = "— 能請老師陪在我身邊嗎？"
1003603-76 = "— 那樣的話，心情會比較自在……[wa:10560] "
1003603-79 = "— 是，謝謝您。[wa:3560] "
1003603-81 = "— ……老師您，真是溫柔呢。[wa:1730] "
1003603-84 = "……多虧老師，我現在舒服多了。"
1003603-85 = "我今天會馬上回去休息……"
1003603-86 = "因為我明白了，現在這樣子才是真的會令人困擾……會令人擔心。"
1003603-87 = "要盡早休息，恢復健康……"
1003603-88 = "然後才能讓大家放心依賴我。"
1003603-90 = "（之後和日向一起離開了教堂）"
1003603-91 = "（……雖然依然受到旁人異樣的眼光，但這次選擇了無視）"

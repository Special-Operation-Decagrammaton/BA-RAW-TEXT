[translation]
1003603-1 = "ความพอดีเป็นสิ่งที่ดีที่สุด"
1003603-2 = "ด้านในวิหารทรีนิตี้"
1003603-3 = "(ทันทีที่เข้ามาในวิหาร คุณครูก็เห็นนักเรียนชมรมซิสเตอร์หลายคนดูมีท่าทางที่กังวลใจมาก)"
1003603-4 = "อืม... ซิสเตอร์ฮินาตะไม่ฟังพวกเราเลยนะคะ..."
1003603-5 = "หากเกิดเรื่องใหญ่ขึ้นมาจะทำยังไงคะ ฉันเป็นห่วงเธอจริงๆ เลยค่ะ"
1003603-6 = "[s1] (ฮินาตะไม่ยอมฟังเหรอ?)\n[s2] (เกิดเรื่องใหญ่...?)"
1003603-7 = "เอ๋? คุณครู...?"
1003603-8 = "เอ๋? คุณครู...?"
1003603-9 = "เอ่อ... สวัสดีค่ะ คุณครูมีธุระอะไรเหรอคะ...?"
1003603-10 = "หรือว่าเป็นเพราะข้อความที่ฉันส่งไป...?"
1003603-11 = "อะ...อึ่ก..."
1003603-12 = "[s3] \"เป็นอะไรรึเปล่า? สีหน้าดูไม่ค่อยดีเลย\"\n[s4] \"เหงื่อท่วมตัวเลย ไม่สบายรึเปล่า?"
1003603-13 = "เอ่อ คือว่าที่จริงแล้ว..."
1003603-14 = "เอ่อ คือว่าที่จริงแล้ว..."
1003603-15 = "มะ... ไม่มีอะไรหรอกค่ะ! สงสัยว่าฉันคงจะเป็นหวัด..."
1003603-16 = "แค่หวัดธรรมดาค่ะ ไม่ได้ถึงขั้นที่ขยับร่างกายไม่ไหวหรอกค่ะ..."
1003603-17 = "แค่นี้สบายมากค่ะ คุณครูไม่ต้องห่วงหรอกค่ะ... ฮะฮะ..."
1003603-18 = "[s5] \"ไปที่อื่นกันก่อนเถอะ ฮินาตะ\"\n[s6] \"ตามครูมาก่อนดีกว่านะ\""
1003603-19 = "คะ... คะ?"
1003603-20 = "คะ... คะ?"
1003603-21 = "เอ่อ... คะ...คือว่าฉัน..."
1003603-22 = "ค่ะ..."
1003603-28 = "เอ่อ... คุณครูคะ...?"
1003603-29 = "เรามาที่นี่ทำไมเหรอคะ? ตรงนี้ไม่มีใครอยู่เลยค่ะ..."
1003603-30 = "คะ...?"
1003603-31 = "คุณครูตั้งใจพาฉันมาที่นี่เหรอคะ?"
1003603-32 = "อยากให้ฉันนั่งพักที่นี่ก่อนเหรอคะ...?"
1003603-33 = "เอ่อ... เข้าใจแล้วค่ะ แม้แต่คุณครูเองก็บอกให้ฉันพัก..."
1003603-34 = "แต่ว่า... วันนี้ฉันมีงานที่ยังต้องทำค้างอยู่..."
1003603-35 = "หากหลบมาพักแบบนี้ อาจเพิ่มภาระงานให้กับซิสเตอร์คนอื่นๆ ได้นะคะ..."
1003603-36 = "[s7] \"ไม่หรอก ทุกคนเป็นห่วงเธอมากนะ\"\n[s8] \"เดี๋ยวครูกับคนอื่นๆ ช่วยจัดการให้เอง\""
1003603-37 = "ตะ...แต่ถ้าฉันพักจะเป็นการโยนงานให้คนอื่นทำนะคะ...!"
1003603-38 = "ไม่ได้ค่ะ... แบบนั้นจะเป็นการโยนงานให้คนอื่นทำนะคะ...!"
1003603-39 = "ฉะ...ฉันไม่เคยช่วยงานคนอื่นๆ ได้เลย... มีแต่ได้รับความช่วยเหลือจากคนอื่นๆ อยู่เสมอ..."
1003603-40 = "ถ้าเป็นแบบนี้ฉันก็คง..."
1003603-41 = "[s] \"ไม่จริงซะหน่อย ฮินาตะ\""
1003603-42 = "...?"
1003603-43 = "มะ... หมายความว่ายังไงเหรอคะ?"
1003603-44 = "[s] \"ปกติแล้วทุกคนได้ฮินาตะคอยช่วยไว้นะ\""
1003603-45 = "อา..."
1003603-46 = "จะ...จริงเหรอคะ?"
1003603-47 = "คุณครูพูดจริงเหรอคะ? ไม่ได้แกล้งปลอบใจกันใช่มั้ยคะ?"
1003603-48 = "ที่จริงแล้วซิสเตอร์คนอื่นๆ ก็บอกฉันแบบนั้นตลอด... แต่เป็นฉันที่ไม่เชื่อเอง..."
1003603-49 = "แต่หากมันเป็นจริงอย่างที่คุณครูพูด... ฉันก็คงดีใจมากๆ เลยค่ะ"
1003603-50 = "ฉันอยากคิดแบบนี้ได้เองบ้างจังเลยค่ะ..."
1003603-51 = "เดี๋ยวก่อนนะคะ..."
1003603-52 = "ขอโทษค่ะ ฉันคิดว่าคงเป็นอย่างนั้นจริงๆ ค่ะ"
1003603-53 = "หมายถึง... ถ้าคุณครูพูดเองแบบนี้ก็คงเป็นเรื่องจริงนั่นล่ะค่ะ"
1003603-54 = "อ่ะฮะฮะฮะ..."
1003603-55 = "อยู่ๆ ก็รู้สึก... สบายใจขึ้นมากเลยค่ะ"
1003603-58 = "― คือว่า...ขอโทษด้วยค่ะ... คุณครู[wa:7780] "
1003603-60 = "― ฉันรู้สึกเหมือนว่าตัวเอง... เป็นภาระให้คุณครู...[wa:650] "
1003603-63 = "― ที่ผ่านมาฉันคิดมาตลอด... ว่ามันอาจไม่ใช่เรื่องใหญ่อะไร[wa:1640] "
1003603-65 = "― และเอาแต่ภูมิใจกับร่างกายที่แข็งแรงของตัวเอง ฉันรู้สึกละอายจริงๆ เลยค่ะ...[wa:1040] "
1003603-68 = "― ตอนนี้ฉันจะพักผ่อนตามที่คุณครูบอกนะคะ[wa:4230] "
1003603-71 = "― แต่ว่า... คุณครู... จะช่วย...[wa:2690] "
1003603-73 = "― อยู่ข้างๆ ฉันสักพักได้มั้ยคะ?"
1003603-76 = "― ถ้าคุณครูอยู่ด้วย... ฉันจะรู้สึกสบายใจค่ะ...[wa:9400] "
1003603-79 = "― จะอยู่กับฉันเหรอคะ? ขอบคุณมากค่ะ[wa:2560] "
1003603-81 = "― คุณครูเนี่ย... ใจดีมากเลยนะคะ[wa:1090] "
1003603-84 = "ฉันรู้สึกสบายใจขึ้นมากเลยค่ะ"
1003603-85 = "ตกลงค่ะ วันนี้ฉันจะหยุดทำงานแล้วกลับไปพักผ่อนค่ะ"
1003603-86 = "เพราะตอนนี้ฉันรู้สึกร้อนๆ ที่หน้า... แถมเหงื่อก็ออกเยอะด้วย สงสัยฉันจะหักโหมเกินไปจริงๆ ค่ะ"
1003603-87 = "ฉันคงจะต้องพักผ่อนสักหน่อย จะได้มีแรงกลับมาทำงานค่ะ"
1003603-88 = "เพื่อให้คนอื่นได้พึ่งพาฉัน เหมือนที่คุณครูพูดไงคะ"
1003603-90 = "(จากนั้นคุณครูก็เดินออกมาจากวิหารพร้อมกับฮินาตะ)"
1003603-91 = "(คุณครูถูกมองด้วยสายตาแปลกๆ จากคนที่อยู่รอบๆ เพราะฮินาตะมีสภาพที่ดูอ่อนเพลียอย่างมาก จนคุณครูต้องรีบคิดหาคำพูดแก้ตัวยกใหญ่)"

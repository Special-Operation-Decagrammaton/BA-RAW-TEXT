1003603-9 = "3;히나타;02;아, 안녕하세요. 선생님……. 성당에는 어쩐 일로……?\n#3;a\n#3;em;[반응]\n#3;greeting"
1003603-10 = "3;히나타;05;호, 혹시……. 아니, 역시 제가 보내 드린 그 메시지 때문에……?"

[translation]
42040-1 = "第4話;予期せぬ再会"
42040-3 = "……こちらRABBIT1。現在時刻は1625。"
42040-4 = "RABBIT3からのGPS信号を追跡し、ポイン[ruby=シエラ]トSに[/ruby]侵入していた容疑者の位置を特定。ターゲットエリアに到着しました。"
42040-5 = "降下ポイントであるポイン[ruby=ロミオ]トRに[/ruby]は現在雨が降っており、#n視界が500m以内に制限されています、注意してください。"
42040-6 = "こ、こちらRABBIT4……雨のおかげで通行人はいなさそう……。"
42040-7 = "待ち伏せの戦闘員もいない……この位置ならどこでも狙撃できるよ……。"
42040-8 = "了解。続いてRABBIT2、報告をお願いします。"
42040-9 = "こちらRABBIT2、建物外部の閉鎖回路に[ruby=サボタージュ]破壊工作[/ruby]を実行した。#nこれでしばらく警報は鳴らないはずだ。"
42040-10 = "だが……。"
42040-11 = "RABBIT2、何か問題でも？"
42040-12 = "いや、問題というか……この建物、やけに見覚えがあって。"
42040-14 = "勘違いじゃない？この近くで作戦を実行した記録はないよ。"
42040-15 = "それはわかっている。そうではなく……#nこの建物の「構造」に見覚えがあるんだ。"
42040-16 = "3つの進入路と3階建ての迷路のような室内構造……#nまるで、SRT訓練施設の屋内戦訓練場みたいじゃないか？"
42040-17 = "くひひ、言われてみればそっくりだねぇ。"
42040-19 = "敵地なのにやけに落ち着くと思ったら、そういうことだったんだね……。"
42040-20 = "ええ。見慣れた場所だからこそ、#n不測の事態が起こっても冷静に対処できそうです。"
42040-21 = "しかし、この構造は攻撃側に不利なんだよな。#n学園内の模擬戦でも、いつも防御側の勝率が高かったから、少し不安だ……。"
42040-22 = "サキ、何ビビってんの？私たちはSRTでしょ。"
42040-23 = "もし敵が未知の武器を持っていても、火力でごり押せば問題ないよ、くひっ……。"
42040-24 = "……たしかにそうだな。それにPMCのエリートだって私たちの前では手も足も出なかったし……。"
42040-25 = "後方支援は任せて……大丈夫、いけるよ。"
42040-26 = "では、突入を開始します。RABBIT2、作戦ポイントへ！"
42040-31 = "ブリーチング。"
42040-36 = "進入路、確保！"
42040-37 = "RABBIT1、建物内に進入します！"
42040-41 = "……Aサイト、クリア。"
42040-42 = "Bサイト、クリア！"
42040-43 = "そのままCサイトへ移動する！"
42040-47 = "（……変ですね。こんなに入り込んでいるというのに姿を見せないなんて）"
42040-48 = "（トラップなどはないようですが……何かを見落としているような……）"
42040-49 = "こちらRABBIT2。#nRABBIT1、この先にバリケードが設置されていて進めない。#nどうする？このまま突破するか？"
42040-53 = "いえ、大きな音を出すと敵にこちらの位置を察知される危険があります。#n迂回しましょう。"
42040-54 = "承知した。開放されている中央通路方面だな……。"
42040-55 = "RABBIT2、作戦を続行――"
42040-59 = "うっ……！"
42040-63 = "今の銃声は！？"
42040-64 = "RABBIT2、報告してください。RABBIT2！"
42040-65 = "通信が、途切れた……？"
42040-66 = "RABBIT4、観測情報を要請します。RABBIT3、GPS情報を確認してください！"
42040-70 = "……[ruby=ジャマー]通信阻害[/ruby]、ですか。"
42040-71 = "（この状況……RABBIT2はもちろん他の小隊員にも支援を要請できそうにないですね）"
42040-72 = "（先頭を奇襲すると共にジャマーを発動し、通信を途絶。#n　各部隊員を孤立させる……）"
42040-73 = "（無線が沈黙した状況で相手を制圧するには高度なチームワークが必要……#nその辺の傭兵や生徒ができる事ではありません……）"
42040-74 = "（まずは、RABBIT2の救助を……）"
42040-83 = "（奇襲！？いつの間に……？）"
42040-85 = "………。"
42040-97 = "（くっ……通路が狭くて主武装が邪魔に……）"
42040-98 = "（近接戦闘は慣れていませんが、仕方ありません……）"
42040-102 = "（まず相手の重心を崩すように――）"
42040-103 = "……[ruby=フォックストロット]FOXTROT[/ruby]。"
42040-104 = "（……！まさか、閃光弾――）"
42040-113 = "……1.5秒。爆音と閃光によるストレスの影響があったにせよ、反応が遅い。"
42040-114 = "[ruby=近接戦闘]CQB[/ruby]の教範に沿って射程距離の内側に入り込んだのは評価するが、#nその状況では定石通りに手を引くより頭突きをした方が良かったはずだ。"
42040-115 = "うっ……！"
42040-116 = "下手に動かない方がいい。腕が折れるぞ。"
42040-117 = "あなたは……？#n傭兵や武器商人には見えませんが……。"
42040-118 = "……作戦において重要なのは、相手の正体でない。#n最悪の事態を想定することだ。"
42040-119 = "優れた装備で武装したベテランでも、戦場では流れ弾一発で制圧されてしまう事だってある。"
42040-120 = "故に、特殊部隊は臆病者のように慎重に行動する事が求められる。"
42040-121 = "この声、まさか……"
42040-122 = "久しぶりだな、[ruby=つきゆき]月雪[/ruby]小隊長。"
42040-127 = "……再会できて、嬉しいぞ。"
42040-128 = "ユキノ先輩……！？"
42040-130 = "次回;先輩の影"

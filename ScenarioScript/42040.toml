[translation]
42040-1 = "Episode 4;An Unexpected Reunion"
42040-3 = "RABBIT 1, reporting. The time is 1625 hours."
42040-4 = "We followed the GPS signal RABBIT 3 sent us to pinpoint the location of the suspect who infiltrated Point Sierra. Confirming arrival at the site."
42040-5 = "It is currently raining at Point Romeo, the drop-off point, and visibility is down to about 500 meters. All units, please exercise caution."
42040-6 = "Um, th-this is RABBIT 4... Thankfully, the weather's kinda making it so nobody's around here right now..."
42040-7 = "No hidden enemies... We're not in immediate danger of ambush... And I'm in a good position if anything happens..."
42040-8 = "Copy that. RABBIT 2, please report."
42040-9 = "RABBIT 2 here. I've cut the circuits. The alarm sensors are down for the count...for now, at least."
42040-10 = "But, you know..."
42040-11 = "Is there a problem, RABBIT 2?"
42040-12 = "Not exactly a problem, but...does this building look kinda familiar to anyone else?"
42040-14 = "Did you shock yourself cutting the circuits? We've never had an operation here before, dummy."
42040-15 = "That's not what I meant! It's like...the layout? I don't know, the structure feels familiar."
42040-16 = "It's kinda like the indoor warfare range at the SRT Training Facility, isn't it? Three floors and entrances... And when I was reviewing the blueprints Moe gave us, I thought the maze-like layout inside seemed familiar."
42040-17 = "Heehee. It actually is kinda familiar, isn't it? Although, someone would've started shooting at us by now if it was a training exercise."
42040-19 = "P-Please don't jinx it...but I do feel better knowing we've kinda done this before."
42040-20 = "That's right. Since we're familiar with the terrain, it'll be easier for us to predict and adapt throughout encounters."
42040-21 = "But buildings with this layout are usually easier to defend. Back in our mock battles, the defenders usually had the upper hand, so I'm kinda nervous..."
42040-22 = "Hah! Big, bad, \"We're elite agents of SRT\" Saki is scared? C'mon!"
42040-23 = "Who cares what kinda defense or weapons they have? We'll just do what we always do. Easy peezy."
42040-24 = "Ugh, to think I had to be cheered up by you. Fine! Fine! If PMC's elites armed to the tooth can't beat us, who can?"
42040-25 = "A-And I'll be watching your backs...!"
42040-26 = "We just have to work together. RABBIT 2, everyone. To positions! Let's go!"
42040-31 = "Breaching."
42040-36 = "I've secured our entry path!"
42040-37 = "RABBIT 1, taking the building!"
42040-41 = "Site A clear."
42040-42 = "Site B clear!"
42040-43 = "Continuing to site C!"
42040-47 = "(This is strange. We're deep into their territory now, and they still haven't made contact. Are they being cautious of us?)"
42040-48 = "(I haven't made any mistakes so far... I'm staying aware of potential movement or traps, but it still feels like I'm missing something...)"
42040-49 = "This is RABBIT 2. RABBIT 1, we've run into a barricade we can't breach. Do you want us to break through it?"
42040-53 = "No. Avoid giving away your position at all costs. Find a way around, if you can."
42040-54 = "Understood. Going to start moving towards the center aisle."
42040-55 = "Continuing–"
42040-59 = "Augh...!"
42040-63 = "Hello? Was that a gunshot?!"
42040-64 = "RABBIT 2, report in. Saki!"
42040-65 = "I can't get through... Did she lose her communicator?"
42040-66 = "RABBIT 4, requesting an update on the situation. RABBIT 3, our GPS doesn't seem to be..."
42040-70 = "I'm jammed... No signals coming in or out."
42040-71 = "(We're all cut off from each other... I won't be able to rely on any back-up.)"
42040-72 = "(The enemy was in perfect sync... Ambush the point, jam communications, and isolate each member all at once, before anyone knows what happened...)"
42040-73 = "(It was a simple and straightforward plan, but nearly impossible to execute... The amount of coordination that would have been required, and in complete silence at that. I need to tread carefully.)"
42040-74 = "(That doesn't matter right now though. To start, I have to rescue Saki...)"
42040-83 = "(Augh... Ambush?! I didn't notice them close in at all!)"
42040-85 = "..."
42040-97 = "(Think, Miyako. The passageway is too narrow for my primary weapon to be useful...)"
42040-98 = "(Close combat isn't my specialty, but I'm still an SRT agent.)"
42040-102 = "(Upset my opponent's center of gravity...Take advantage when they lose balance–)"
42040-103 = "Foxtrot..."
42040-104 = "(A flash grenade? This close?!)"
42040-113 = "...1.5 seconds. Reactions are slow. You took too long to reorient after the explosion and flash."
42040-114 = "You moved exactly per the CQB manual, but the real world doesn't follow your textbooks. Your movements are too predictable. You should have taken the initiative and rushed me."
42040-115 = "Ugh...!"
42040-116 = "Stop moving. I might accidentally break your arm."
42040-117 = "You're no ordinary soldier. Who are you?"
42040-118 = "Does who I am change anything? You went into this operation thinking, \"I'm SRT. I can handle whatever might lie ahead of us,\" didn't you? Lazy. Undisciplined. Always assume the worst case scenario."
42040-119 = "Even the best, most experienced veteran can be taken out by a stray bullet on a battlefield."
42040-120 = "Courageous warriors don't live long here. A good special forces soldier conducts themselves with cowardice. Or you'll end up dead."
42040-121 = "Wait. I know that voice... I-It can't be."
42040-122 = "It's been quite some time, Squad Leader Tsukiyuki Miyako."
42040-127 = "You look well."
42040-128 = "Yukino?!"
42040-130 = "Next Episode;A FOX's Shadow"

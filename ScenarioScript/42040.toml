42040-1 = "#title;제4화;예상치 못한 재회"
42040-2 = "#all;hide"
42040-3 = "3;미야코;11;……여기는 RABBIT 1. 현재 시각은 1625시.\n#3;a\n#3;em;…"
42040-4 = "3;미야코;11;RABBIT3로부터 전달받은 GPS 신호를 추적하여 포인트 시에라에 침입했던 용의자의 위치를 특정. 타깃 에어리어에 도착했습니다."
42040-5 = "3;미야코;05;강하 포인트인 포인트 로미오에는 현재 비가 내리고 있으며, 시계는 500m 내외로 제한되고 있습니다. 모두 작전 시 유념 부탁드립니다.\n#3;em;[반응]"
42040-6 = "3;미야코;05\n1;미유;02;여, 여기는 RABBIT 4…… 날씨 때문인지 다행히 주변을 지나가는 사람은 없는 것 같아……\n#1;em;…\n#3;m5\n#1;a"
42040-7 = "1;미유;01;그 외에 매복 중인 전투원은 없는 것을 확인했고…… 이 위치에서라면 어느 방향이든 저격 지원이 가능해."
42040-8 = "1;미유;01\n3;미야코;02;확인. RABBIT 2, 이어서 보고 부탁드립니다.\n#3;m3\n#1;d"
42040-9 = "3;미야코;02\n5;사키;02;여기는 RABBIT 2. 건물 외부의 폐쇄회로에 사보타주를 실행. 이것으로 당분간 경보 센서는 울리지 않을 거야.\n#3;m1\n#5;a\n#5;em;[반응]"
42040-10 = "5;사키;99;다만……"
42040-11 = "3;미야코;02;뭔가 문제라도 있나요, RABBIT 2."
42040-12 = "5;사키;04;아니, 문제는 아니지만…… 이 건물, 어쩐지 낯이 익어서."
42040-13 = "#all;hide"
42040-14 = "3;통신모에;15;응? 이 근처에 작전을 나왔던 기록은 없는데. 다른 곳이랑 착각한 거 아냐?\n#3;a"
42040-15 = "3;통신모에;15\n5;사키;04;물론 그건 나도 알고 있어. 내 말은…… 이 건물의 구조가 익숙하다는 뜻이었어.\n#3;m1\n#5;al"
42040-16 = "5;사키;02;그, 여기…… SRT 훈련 시설의 실내전 훈련장이랑 구조가 비슷하지 않아? 세 곳의 진입로와 3층으로 구성된 미로 같은 실내 배치……\n#5;em;…"
42040-17 = "3;통신모에;01;듣고 보니 그렇네. 훈련이었다면 이 시점에서 교전이 시작되었겠지. 쿠히히……\n#3;em;[재잘]"
42040-18 = "#all;hide"
42040-19 = "3;미유;03;하지만 별다른 반응도 없고…… 오히려 여러 번 훈련해 본 상황이라 더 안심되는 느낌이야."
42040-20 = "3;미야코;03;그렇네요. 익숙한 장소인 만큼 돌발 상황을 예측하기 쉬워 오히려 다행입니다."
42040-21 = "2;통신모에;01\n4;사키;06;하지만 보통 이런 구조의 건물은 방어하기에 훨씬 유리해서. 학원 내 모의전을 벌였을 때도 방어 측의 승률이 늘 높았던지라, 조금 불안하네……\n#4;em;[속상함]\n#3;hide"
42040-22 = "2;통신모에;12;뭘 그렇게 겁내는 거야, 사키. 우리는 SRT잖아?"
42040-23 = "2;통신모에;17;설령 적이 처음 보는 무기를 들고 와도 화력으로 밀어붙이면 그만이지. 후후……\n#2;em;[음표]"
42040-24 = "4;사키;07;그, 그렇지? PMC의 엘리트들도 우리 앞에서는 상대가 되지 않았으니까……\n#4;em;[땀]"
42040-25 = "4;사키;07\n2;통신모에;17\n1;미유;05;후방 지원은…… 내게 맡겨줘.\n#1;em;[반짝]\n#2;m3\n#4;m5\n#1;a\n#1;greeting"

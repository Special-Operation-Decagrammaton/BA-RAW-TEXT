[translation]
42040-1 = "第4話;出乎意料的重逢"
42040-3 = "……這裡是RABBIT1，現在時間1625。"
42040-4 = "追蹤來自RABBIT3的GPS訊號，鎖定入[ruby=Sierra]侵S地[/ruby]點的嫌犯位置。#n已抵達目標區域。"
42040-5 = "作為降落地點[ruby=Romeo]的R地[/ruby]點目前正在降雨，#n視野被限制在500m以內，請各位注意。"
42040-6 = "這，這裡是RABBIT4……因為下雨的關係幾乎沒有行人……"
42040-7 = "也沒有埋伏中的戰鬥人員……從這個位置可以狙擊任何地方……"
42040-8 = "了解。接著請RABBIT2進行報告。"
42040-9 = "這裡是RABBIT2，已完成對建築外部封閉迴路的[ruby=癱瘓]破壞[/ruby]作業。#n這樣一來警報暫時就不會響了。"
42040-10 = "但是……"
42040-11 = "RABBIT2，發生什麼問題了嗎？"
42040-12 = "不，與其說是問題……這棟建築總覺得很眼熟。"
42040-14 = "是不是認錯了？#n我們沒有在附近執行過作戰的記錄哦。"
42040-15 = "那種事我也知道。#n我的意思是……我對這棟建築的「構造」有印象。"
42040-16 = "三個入口以及由三層樓組成的迷宮般的室內構造……#n不覺得跟SRT訓練設施的室內戰訓練場很像嗎？"
42040-17 = "咯嘻嘻，聽你這麼一說確實還真像呢。"
42040-19 = "明明身處敵陣卻意外的安心，原來是這個原因啊……"
42040-20 = "就是說啊。#n正因為是熟悉的地方，就算發生意外狀況似乎也能冷靜應對。"
42040-21 = "但是，這種構造對攻擊方不利對吧。#n學園內的模擬戰也總是防守方的勝率比較高，讓人有點不安……"
42040-22 = "咲希，沒什麼好怕的吧？#n我們可是SRT哦？"
42040-23 = "就算敵人拿著未知的武器，我們也只要用火力壓制就行了，咯嘻……"
42040-24 = "說，說的也是。#n而且就連PMC的菁英在我們面前也不是對手……"
42040-25 = "後方支援就交給我……沒問題的。"
42040-26 = "那麼開始突入。#nRABBIT2，前往作戰地點！"
42040-31 = "[ruby=Breaching]破門[/ruby]。"
42040-36 = "已確保進入路線！"
42040-37 = "RABBIT1，進入大樓！"
42040-41 = "……A側，Clear。"
42040-42 = "B側，Clear！"
42040-43 = "就這樣前往C側！"
42040-47 = "（……真奇怪。明明已經入侵到這裡了卻還不出來應戰）"
42040-48 = "（雖然似乎沒有陷阱……卻感覺像是遺漏了什麼……）"
42040-49 = "這裡是RABBIT2。#nRABBIT1，前方設置了路障無法進入。該怎麼做？直接突破嗎？"
42040-53 = "不。發出太大的聲響有被敵方察覺位置的危險。#n進行迂迴吧。"
42040-54 = "知道了。也就是往開放的中央通道方向吧……"
42040-55 = "RABBIT2，繼續執行──"
42040-59 = "唔……！"
42040-63 = "剛才的槍聲是！？"
42040-64 = "RABBIT2，請報告。RABBIT2！"
42040-65 = "通訊被切斷了……？"
42040-66 = "RABBIT4，請求觀測情報。#nRABBIT3，請確認GPS情報！"
42040-70 = "……是通訊干擾嗎。"
42040-71 = "（這個情況……不只是RABBIT2，也無法向其他小隊員請求支援呢）"
42040-72 = "（對先鋒展開奇襲的同時發動干擾器阻斷通訊，孤立各部隊成員……）"
42040-73 = "（要在不借助無線電的情況下壓制對手需要高度的團隊合作……#n　不是這附近的傭兵或學生能辦到的……）"
42040-74 = "（首先進行RABBIT2的救援……）"
42040-83 = "（奇襲！？是在什麼時候……？）"
42040-85 = "…………"
42040-97 = "（唔……通道過於狹窄，主武裝反而礙事……）"
42040-98 = "（雖然不熟悉近身戰鬥，不過也沒辦法了……）"
42040-102 = "（先讓對方失去重心──）"
42040-103 = "……[ruby=FOXTROT]狐步[/ruby]。"
42040-104 = "（在這個距離……！難道是閃光彈──）"
42040-113 = "……1.5秒。#n雖有爆炸聲和閃光導致的壓力，反應還是太慢了。"
42040-114 = "[ruby=限制空間戰鬥]依照CQB教戰[/ruby]手冊突入射程距離內側是個不錯的判斷，#n但在這種情況下，比起依照慣例用手拉，用頭撞會更好才對。"
42040-115 = "唔……！"
42040-116 = "勸你別輕舉妄動。否則手會折斷的。"
42040-117 = "你是誰……？#n看起來不像傭兵或武器商人……"
42040-118 = "……作戰中重要的並非對手的身分。#n應該設想到最壞的情況。"
42040-119 = "就算是擁有優秀武裝的老手，也可能在戰場上被一發流彈給壓制。"
42040-120 = "正因如此，特殊部隊應當像個膽小鬼一樣慎重行動。"
42040-121 = "這個聲音，難道是……"
42040-122 = "好久不見了啊，月雪小隊長。"
42040-127 = "……能再見到你，我很高興哦。"
42040-128 = "雪乃前輩……！？"
42040-130 = "下一話;前輩的影子"

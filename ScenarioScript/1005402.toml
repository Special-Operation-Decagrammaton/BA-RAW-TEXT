1005402-80 = "2;마리 체육복ND;02;……어라……."
1005402-81 = "2;마리 체육복ND;07;……확실히 그럴 거 같기도……."
1005402-82 = "2;마리 체육복ND;01;감사합니다, 선생님. 하마터면 오히려 더 큰 일을 낼 뻔했네요."
1005402-83 = "2;마리 체육복ND;99;생각해 보면 저희 학교 체육복 복장은 통일돼 있으니까, 오히려 눈에 띄지 않을지도 모르겠어요."
1005402-84 = "2;마리 체육복ND;04;여전히 다리나 머리가 신경 쓰이는 건 어쩔 수 없지만…….\n#2;stiff"
1005402-85 = "2;마리 체육복ND;03;……그래도 선생님의 말씀을 들으니, 왠지 좀 마음이 편해지는 느낌이 들어요."
1005402-86 = "2;마리 체육복ND;05;그, 그럼 일단은……. 그냥 예정대로 참여하겠다고 말씀드리는 쪽으로……."

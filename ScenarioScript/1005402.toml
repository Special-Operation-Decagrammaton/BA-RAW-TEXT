[translation]
1005402-1 = "不習慣的服裝"
1005402-2 = "三一大教堂．準備室"
1005402-3 = "（依照約定，為了聽瑪麗的諮詢而來到了三一大教堂）"
1005402-4 = "（或許是因為現在時間還早，所以沒什麼人）"
1005402-11 = "是，是老師嗎……？"
1005402-12 = "啊，對不起。我不是什麼可疑人士。#n是我，伊落瑪麗。那個……因為一些原因……"
1005402-14 = "[ns1]「……瑪麗？」\n[ns2]「你在哪裡？」"
1005402-17 = "那個聲音……"
1005402-18 = "太好了，真的是老師呢。"
1005402-19 = "請稍等……"
1005402-28 = "我，我在這裡……！#n早安，老師。"
1005402-29 = "明明是這麼臨時的請求，您還願意這麼早來，非常感謝。"
1005402-30 = "[s3]「瑪麗……？」\n[s4]「今天穿的不是修女服呢。」"
1005402-33 = "是，是的。想和您商量的正是這件事……"
1005402-34 = "馬上就要舉行晄輪大祭了對吧。#n我們修女會也打算派出幾名成員參加……"
1005402-35 = "我也順理成章地參加了……"
1005402-36 = "那個……這讓我有點困擾。#n畢竟我對運動沒什麼自信……那個……"
1005402-37 = "[s5]「有什麼擔心的事嗎……？」\n[s6]「難道要穿運動服讓你很在意？」"
1005402-40 = "那個，嗯……"
1005402-41 = "是的，有一點……"
1005402-42 = "對不起……就算知道這是運動用的服裝，我還是無法習慣。"
1005402-43 = "居然要露出這麼多皮膚……#n就連在老師面前都已經覺得很害羞了……"
1005402-44 = "再加上沒有戴著頭巾，又更加無法冷靜了……"
1005402-45 = "啊，體育服並沒有什麼不好！#n只是我無論如何都無法習慣……"
1005402-46 = "不適合這種打扮……又不擅長運動的我，是不是不該參加大運動會呢……"
1005402-47 = "用這種狀態參加，只會造成其他人的困擾……"
1005402-48 = "所以……那個……"
1005402-52 = "如果我不參加晄輪大祭，而是穿回像往常一樣的修女打扮……"
1005402-53 = "然後去幫助需要幫助的人，會不會比較好……"
1005402-54 = "我是這麼想的。#n……可是，這件事並不是我自己能夠決定的，所以才想找老師商量。"
1005402-55 = "……咦？"
1005402-56 = "很適合……嗎？"
1005402-57 = "是，是那樣嗎……#n謝謝您……呵呵。"
1005402-58 = "……您問為什麼會對參加比賽感到不安，是嗎……？"
1005402-59 = "雖然是不會感到不安……"
1005402-60 = "那個……我從來沒有參加過這種大型活動……"
1005402-61 = "要說運動，我也只不過是偶爾會和其他修女打桌球而已。"
1005402-62 = "就連那種時候，大家也都打得比我好，我總是含恨落敗……"
1005402-63 = "當然大家都很溫柔，對不擅長的我也願意親切地教導，所以我也很享受那段時光。"
1005402-64 = "但是，那也僅限於大教堂裡而已……#n要和其他學園對戰的話，實在讓人有點害怕。"
1005402-65 = "……咦？"
1005402-66 = "……和修女們打桌球的時候？"
1005402-67 = "因為穿體育服很害羞……#n所以我一直都是穿修女服上場。"
1005402-68 = "其實……今天是我第一次穿體育服。#n看到我這副模樣的……只有老師而已。"
1005402-69 = "[s7]「穿修女服打桌球……？」\n[s8]「瑪麗，說不定其實你的運動神經很好……」"
1005402-72 = "怎，怎麼說呢……？"
1005402-73 = "……嗯？"
1005402-74 = "稍微有點興趣的話，試試看也無妨，是嗎……？#n我真的，可以嗎……？"
1005402-75 = "可，可是……穿成這樣實在……"
1005402-76 = "……原來如此。#n穿著修女服參加的話，反而會吸引目光是嗎……？"
1005402-80 = "想像一下只有自己一個人穿著修女服的狀況……"
1005402-81 = "……確實，和您說的一樣呢。"
1005402-82 = "謝謝您，老師。#n差點就要被投以好奇的眼光了。"
1005402-83 = "仔細想想，整個學園的運動服全部都長的一樣。#n這樣穿說不定能融入周圍的環境，反而更不顯眼。"
1005402-84 = "雖然露出度還是很令人在意……"
1005402-85 = "……幸好有和老師商量，現在感覺心情輕鬆多了。"
1005402-86 = "雖然猶豫過要不要退出，不過現在已經決定要參加了。"
1005402-91 = "啊……對了。"
1005402-95 = "老師也會……參加晄輪大祭嗎？"
1005402-96 = "……啊，不可能會以選手的身分參加對吧。#n我真是的。呵呵，畢竟您是老師，這也是當然的。"
1005402-97 = "不過，您當天會在會場吧……？"
1005402-101 = "謝謝您，老師。#n多虧有跟您討論，我才能下定決心。"
1005402-102 = "晄輪大祭……要是放棄的話一定會後悔的。"
1005402-103 = "……呵呵。#n有和老師商量真是太好了。"
1005402-104 = "那麼，之後再見吧。#n還請您多多指教哦，老師。"
1005402-106 = "（之後，被似乎很開心的瑪麗目送離開教堂後，回到了夏萊）"

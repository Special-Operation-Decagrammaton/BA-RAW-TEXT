1005402-25 = "2;마리 체육복ND;04\n#2;a\n#wait;1000"
1005402-26 = "2;마리 체육복ND;04\n#2;stiff\n#wait;1000"
1005402-27 = "2;마리 체육복ND;04\n#2;m3\n#wait;1000"
1005402-28 = "2;마리 체육복ND;08;여, 여기예요……. 안녕하세요. 선생님……."
1005402-29 = "2;마리 체육복ND;04;갑작스럽게 부탁드린 일인데도……. 와 주셔서 감사해요.\n#2;greeting"
1005402-30 = "[s3] \"마리? 그 체육복은……?\"\n[s4] \"평소와는 다른 복장이구나.\""
1005402-31 = "#wait;100"
1005402-32 = "#wait;100"
1005402-33 = "2;마리 체육복ND;07;네, 네. 그게 실은……."
1005402-34 = "2;마리 체육복ND;02;조만간 대운동회가 있을 거라는 말씀이 있었거든요. 그래서 저희 시스터후드에서도 몇 분이 참가하기로 했는데……."
1005402-35 = "2;마리 체육복ND;04;어, 어쩌다 보니 저도 가게 돼서……. 으음…….\n#2;stiff"
1005402-36 = "2;마리 체육복ND;08;그래서 조금 곤란해하고 있었어요. 운동에는 자신이 없는 편인 데다가, 이……. 이……."
1005402-37 = "[s5] \"이……?\"\n[s6] \"체육복이 신경 쓰이는 거야?\""
1005402-38 = "#wait;100"
1005402-39 = "#wait;100"
1005402-40 = "2;마리 체육복ND;04;그…… 음……."
1005402-41 = "2;마리 체육복ND;06;……네……. 조금……\n#2;em;[땀]"
1005402-42 = "2;마리 체육복ND;08;죄송해요. 이상한 말이라는 건 저도 알고 있지만……. 아무래도 적응이 좀 안 돼서요."
1005402-43 = "2;마리 체육복ND;04;당장 지금만 해도, 이렇게 다리가 훤하게 드러나는 복장……. 다른 분들께 보여드릴 수가 없어서……."
1005402-44 = "2;마리 체육복ND;07;베일도 없으니 머리도 허전하고……."
1005402-45 = "2;마리 체육복ND;08;아, 아! 절대로 나쁘다는 게 아니에요!! 다, 단지 저는 이런 복장이 익숙하지 않다고 할까……!\n#2;hophop"
1005402-46 = "2;마리 체육복ND;04;저한테는 별로 어울리지 않는다고 할까, 운동을 잘하는 것도 아니니까요……!! 그런 쪽의 이야기!"
1005402-47 = "2;마리 체육복ND;06;게다가 지금 상황을 보면……. 분명 다른 분들께 폐만 끼칠 게 뻔하기도 하고요.\n#2;em;[속상함]"
1005402-48 = "2;마리 체육복ND;04;그러니까……."
1005402-49 = "#st;[0,0];instant;1;"
1005402-50 = "#clearST"
1005402-51 = "2;마리 체육복ND;04\n#2;em;[...]\n#wait;3000"
1005402-52 = "2;마리 체육복ND;07;역시 제가 직접 참여하는 것보다는……. 저는 평소처럼 시스터 복장으로……."
1005402-53 = "2;마리 체육복ND;07;도움이 필요한 분들이 계실 때 찾아가서 도와드리는 게 더 좋지 않을까 하는……?"
1005402-54 = "2;마리 체육복ND;08;그런 생각을 좀 하고 있었어요. 그치만 저 혼자 결정할 일은 아닌 거 같아서, 선생님께 상담을 좀 받고 싶었던 거예요."
1005402-55 = "2;마리 체육복ND;02;……네?\n#2;em;[?]"
1005402-56 = "2;마리 체육복ND;02;그렇지 않다고요? 잘 어울린다고요……?"
1005402-57 = "2;마리 체육복ND;07;그, 그런가요? 감사합니다……. 하하…….\n#2;stiff"
1005402-58 = "2;마리 체육복ND;02;……네? 참가하는 게 부담스럽거나 싫은 거냐고요?\n#2;em;[반응]"
1005402-59 = "2;마리 체육복ND;04;으음……. 아니요. 그런 건 아니에요."
1005402-60 = "2;마리 체육복ND;04;그런 느낌은 아닌데……. 이런 커다란 행사에는 참여해 본 적 없던 일이다 보니……."
1005402-61 = "2;마리 체육복ND;02;사실 체육활동 자체는 성당에서도 가끔씩 다른 시스터님들과 탁구라든가, 할 때가 있거든요."
1005402-62 = "2;마리 체육복ND;06;……늘 아슬아슬하게 지지만요. 다들 어쩜 그렇게 잘 치시는지…….\n#2;em;[땀]"
1005402-63 = "2;마리 체육복ND;04;그래도 다들 귀엽게 봐주시고, 친절하게 어울려 주셔서 즐겁다고는 생각하고 있어요."
1005402-64 = "2;마리 체육복ND;07;그치만 그건 어디까지나 성당 안에서 한 이야기고……. 체육 활동이 좀 무섭긴 하네요."
1005402-65 = "2;마리 체육복ND;02;……네?\n#2;em;[?]"
1005402-66 = "2;마리 체육복ND;04;성당에서 시스터님들과 탁구 칠 때는 체육복을 안 입었었냐고요?"
1005402-67 = "2;마리 체육복ND;07;아아……. 네. 역시 좀 부끄러워서……. 저는 항상 늘 입던 시스터 복장으로 쳐요."
1005402-68 = "2;마리 체육복ND;07;체육복을 이렇게 입어본 건……. 오늘이 처음이에요. 선생님께서 처음 보신 거예요. 하하…….\n#2;stiff"
1005402-69 = "[s7] \"시스터 복장으로 탁구를 할 수 있다고……?\"\n[s8] \"마리, 어쩌면 기본 운동신경은 꽤…….\""

1005402-16 = "#wait;100"
1005402-17 = "#na;마리 체육복ND;……아."
1005402-18 = "#na;마리 체육복ND;서, 선생님이셨군요. 다행이에요."
1005402-19 = "#na;마리 체육복ND;자, 잠시만요……."
1005402-20 = "#st;[0,0];instant;1;"

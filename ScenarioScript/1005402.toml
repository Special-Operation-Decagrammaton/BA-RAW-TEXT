1005402-71 = "#wait;100"
1005402-72 = "2;마리 체육복ND;04;그, 그게 무슨 말씀이신지……."
1005402-73 = "2;마리 체육복ND;02;……네?\n#2;em;[?]"
1005402-74 = "2;마리 체육복ND;02;하고 싶지 않은 게 아니라면, 해 보는 것도 좋을 거 같다고요? 제, 제가요……?"
1005402-75 = "2;마리 체육복ND;04;그, 그럴까요? 그치만 그럼 이 복장은……."
1005402-76 = "2;마리 체육복ND;04;……오히려 거기서 시스터 복장을 하고 있으면 모두의 시선이 쏠릴 거라고요?"

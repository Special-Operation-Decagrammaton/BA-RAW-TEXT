[translation]
1005402-1 = "ชุดที่ไม่คุ้นเคย"
1005402-2 = "ห้องเตรียมการ วิหารทรีนิตี้"
1005402-3 = "(คุณครูแวะมาที่วิหารของทรีนิตี้ ตามที่สัญญากับมารี)"
1005402-4 = "(อาจเพราะยังเช้าอยู่ ห้องเตรียมการที่อยู่ด้านหลังวิหารจึงยังเงียบสงบอยู่)"
1005402-11 = "คะ... คุณครู...? ใช่คุณครูรึเปล่าคะ...?"
1005402-12 = "อะ...เอ่อ... ฉันไม่ใช่คนแปลกๆ หรอกนะคะ! อิโอจิ มารีค่ะ! เหตุผลที่ต้องซ่อนตัวอยู่แบบนี้..."
1005402-14 = "[ns1] \"มารี...?\"\n[ns2] \"มีอะไรเหรอ? ทำไมต้องซ่อนด้วยล่ะ?\""
1005402-17 = "อ่า..."
1005402-18 = "คะ... คุณครูเองเหรอคะ ค่อยยังชั่วหน่อยค่ะ"
1005402-19 = "ระ... รอสักครู่นะคะ..."
1005402-28 = "ฉะ...ฉันอยู่นี่ค่ะ สวัสดีค่ะคุณครู"
1005402-29 = "ต้องขอโทษด้วยนะคะที่จู่ๆ ก็ไปรบกวนคุณครู.... เอ่อ ขอบคุณที่มานะคะ"
1005402-30 = "[s3] \"มารี? ชุดพละนั่น...?\"\n[s4] \"ใส่ชุดต่างไปจากทุกทีเลยนะ\""
1005402-33 = "คะ... ค่ะ คือว่าที่จริงแล้ว..."
1005402-34 = "อีกไม่นานก็จะถึงงานมหกรรมแข่งขันกีฬาแล้วน่ะค่ะ ทางชมรมซิสเตอร์ของเราเองก็จะส่งนักกีฬาเข้า#nร่วมด้วยค่ะ..."
1005402-35 = "คะ... คือฉันก็บังเอิญได้เข้าร่วมด้วย... อืม..."
1005402-36 = "เพราะงั้นก็เลยรู้สึกลำบากใจอยู่นิดหน่อยค่ะ ฉันไม่ค่อยเก่งเรื่องกีฬาเท่าไร... คือว่า... ชุด..."
1005402-37 = "[s5] \"ชุด...?\"\n[s6] \"กังวลเรื่องชุดพละเหรอ?\""
1005402-40 = "เอ่อ... คือ..."
1005402-41 = "ค่ะ... นิดหน่อยค่ะ"
1005402-42 = "ขอโทษค่ะ ฉันรู้ว่ามันฟังดูแปลกๆ... แต่ฉันก็ไม่ชินกับชุดนี้เลยค่ะ"
1005402-43 = "พอใส่ชุดที่โชว์ขาแบบนี้แล้ว... ฉันรู้สึกว่าออกไปให้คนอื่นเห็นไม่ได้ค่ะ..."
1005402-44 = "แถมยังไม่มีผ้าคลุมผม และปล่อยผมแบบนี้..."
1005402-45 = "อ๊ะ! มะ...ไม่ใช่ว่าชุดนี้ไม่ดีหรอกนะคะ!! พะ...เพียงแค่ฉันไม่ชินกับชุดแบบนี้ก็เท่านั้น..."
1005402-46 = "ที่ฉันอยากจะบอกก็คือ... อืม... จะบอกว่ามันดูไม่เหมาะกับฉันดีมั้ยนะ... ฉันเองก็ไม่ได้เก่งเรื่องกีฬาเลย#nน่ะค่ะ...!! "
1005402-47 = "แถมดูจากสถานการณ์ตอนนี้... ฉันคงไปเป็นภาระให้คนอื่นๆ แน่เลยค่ะ"
1005402-48 = "เพราะงั้น..."
1005402-52 = "คิดแล้วเชียวว่าฉันควรใส่ชุดซิสเตอร์มากกว่าลงเข้าร่วมงานแข่งกีฬาแบบนี้..."
1005402-53 = "บางทีถ้าได้ไปช่วยคนที่ต้องการความช่วยเหลืออาจจะดีกว่าหรือเปล่านะ...?"
1005402-54 = "ฉันคิดแบบนั้นน่ะค่ะ แต่ว่ามันก็ไม่ใช่เรื่องที่ฉันจะตัดสินใจได้ด้วยตัวคนเดียว... เลยอยากจะขอปรึกษา#nคุณครูค่ะ"
1005402-55 = "คะ...?"
1005402-56 = "ไม่ใช่อย่างนั้นเลยงั้นเหรอคะ? ฉัน... ใส่ชุดนี้แล้วเหมาะดีงั้นเหรอคะ...?"
1005402-57 = "งะ... งั้นเหรอคะ? ขอบคุณค่ะ ฮะฮะฮะ..."
1005402-58 = "คะ...? ฉันหนักใจหรือไม่อยากเข้าร่วมงานกีฬารึเปล่าน่ะเหรอคะ?"
1005402-59 = "อืม... เปล่าค่ะ ไม่ใช่แบบนั้นเลยค่ะ"
1005402-60 = "ฉันไม่ได้คิดแบบนั้นเลย แต่ฉันไม่เคยเข้าร่วมงานเทศกาลขนาดใหญ่แบบนี้มาก่อนเลย..."
1005402-61 = "ที่จริงเรื่องเล่นกีฬา ฉันก็มีเล่นปิงปองกับซิสเตอร์คนอื่นๆ บ้างบางครั้งค่ะ"
1005402-62 = "ถึงจะรู้สึกตื่นเต้นเวลาตีอยู่ตลอดก็เถอะค่ะ ไม่รู้ทำไมคนอื่นๆ ถึงตีได้เก่งกันมาก..."
1005402-63 = "แต่ว่าทุกๆ คนก็คอยเอ็นดูฉัน และมาเล่นด้วยกันอย่างสนุกสนานเสมอๆ เลยค่ะ"
1005402-64 = "แต่ว่ามันก็เป็นแค่กิจกรรมที่ทำร่วมกันในวิหาร... ฉันรู้สึกกลัวการเล่นกีฬาอยู่นิดหน่อยค่ะ"
1005402-65 = "คะ...?"
1005402-66 = "ตอนเล่นปิงปองกับซิสเตอร์คนอื่นๆ ได้ใส่ชุดพละด้วยรึเปล่าน่ะเหรอคะ?"
1005402-67 = "คือ... เปล่าค่ะ ฉันรู้สึกว่ามันน่าอาย... ตอนเล่นปิงปอง ฉันเลยใส่ชุดซิสเตอร์เล่นตลอดเลยน่ะค่ะ"
1005402-68 = "วันนี้เป็นครั้งแรก... ที่ฉันใส่ชุดพละแบบนี้เลยค่ะ คุณครูเห็นเป็นคนแรกเลยนะคะ ฮ่าฮ่า..."
1005402-69 = "[s7] \"ใส่ชุดซิสเตอร์ตีปิงปองงั้นเหรอ...?\"\n[s8] \"เซนส์พื้นฐานเล่นกีฬาของมารีนี่ บางที...\""
1005402-72 = "มะ... มีอะไรเหรอคะ?"
1005402-73 = "ทะ...ทำไมเหรอคะ?"
1005402-74 = "ถ้าไม่ได้เกลียดการเล่นกีฬาจริงๆ ก็ให้ลองดูสักตั้งงั้นเหรอคะ? ฉะ... ฉันน่ะเหรอคะ?"
1005402-75 = "งะ... งั้นเหรอคะ? แต่ว่าชุดนี้มัน..."
1005402-76 = "ถ้าใส่ชุดซิสเตอร์เข้าร่วมละก็ น่าจะดึงดูดความสนใจจากคนอื่นมากกว่าอีกงั้นเหรอคะ?"
1005402-80 = "เอ๋..."
1005402-81 = "พอมาคิดๆ ดูอีกทีก็เป็นอย่างที่คุณครูพูด..."
1005402-82 = "ขอบคุณค่ะคุณครู เกือบเป็นเรื่องใหญ่แล้วนะคะ..."
1005402-83 = "พอมาคิดดูดีๆ แล้ว ชุดพละของโรงเรียนเราก็เป็นชุดแบบเดียวกันหมด คงไม่มีใครมาสังเกตหรอกค่ะ "
1005402-84 = "เรื่องที่กางเกงขาสั้น หรือไม่มีผ้าคลุมผมก็คงช่วยไม่ได้..."
1005402-85 = "แต่พอฟังที่คุณครูพูดแล้ว ฉันรู้สึกสบายใจขึ้นเยอะเลยค่ะ"
1005402-86 = "ถะ... ถ้างั้น... ฉันจะลองเข้าร่วมงานกีฬาตามที่ตกลงไว้..."
1005402-91 = "เอ๋..."
1005402-95 = "จะว่าไปแล้ว คุณครูเอง... ก็จะเข้าร่วมงานกีฬาด้วยใช่มั้ยคะ?"
1005402-96 = "อ๊ะ ไม่ได้ลงเป็นนักกีฬาเหรอคะ? อ๋อ ยะ... อย่างนั้นเองเหรอคะ นั่นสินะ คิดอีกทีคุณครูก็ไม่น่าจะลงแข่ง#nได้นี่นา... ฮะฮะ"
1005402-97 = "แต่ยังไงก็จะไปร่วมงานกีฬาสินะคะ อืม..."
1005402-101 = "ขอบคุณค่ะคุณครู ฉันคลายความกังวลไปได้เยอะเลยค่ะ"
1005402-102 = "ถ้าไม่งั้นคงเกิดเรื่องใหญ่แน่ๆ เลยค่ะ"
1005402-103 = "ฮิฮิ... เรื่องใหญ่จริงๆ นะคะ"
1005402-104 = "ถ้างั้นเอาไว้เจอกันใหม่นะคะคุณครู!!"
1005402-106 = "(หลังจากนั้น มารีก็เดินมาส่งคุณครูกลับชาเล่ต์)"

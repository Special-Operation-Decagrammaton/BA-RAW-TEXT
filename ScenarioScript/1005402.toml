[translation]
1005402-1 = "An Unfamiliar Uniform"
1005402-2 = "Trinity Cathedral Vestry"
1005402-3 = "As promised, I went to the Trinity Cathedral to give Mari advice."
1005402-4 = "It was early, and the vestry behind the cathedral was quiet and still."
1005402-11 = "S-Sensei? Is that you?"
1005402-12 = "O-Oh, I didn't mean to startle you! It's just me! Iochi Mari! I'm very sorry to hide, but I have a good reason..."
1005402-14 = "[ns1] \"...Mari?\"\n[ns2] \"Are you okay? Why are you hiding?\""
1005402-17 = "Oh."
1005402-18 = "S-Sensei. It is you. Good."
1005402-19 = "P-Please wait just a second."
1005402-28 = "Well...here I am. Hello, Sensei..."
1005402-29 = "Thanks for coming to see me on such short notice."
1005402-30 = "[s3] \"Mari, what's with the gym clothes...?\"\n[s4] \"That's a different look for you.\""
1005402-33 = "Y-Yes. Let me explain."
1005402-34 = "Maybe you've heard that the field day is happening soon? A few members of the Sisterhood decided to participate..."
1005402-35 = "And...um... I thought I would go too, but..."
1005402-36 = "Well, you see, I'm not very athletic, and I'm concerned about th-this..."
1005402-37 = "[s5] \"This...?\"\n[s6] \"Do you mean your gym clothes?\""
1005402-40 = "Well...um..."
1005402-41 = "Yes. My gym clothes..."
1005402-42 = "I'm sorry. I know I'm being weird...but I just can't get used to them."
1005402-43 = "Even here, in an empty room, I feel like this outfit shows too much of my legs... So how am I supposed to wear this...in front of people?"
1005402-44 = "And without my veil, I feel like I'm missing something..."
1005402-45 = "Oh! Don't mistake me. I don't think it's wrong to wear something like this, or that I look bad. I-It's just not what I'm used to..."
1005402-46 = "And I don't think it suits me because I'm not very athletic...! That's all I meant!"
1005402-47 = "And, uh, so, considering that... Wouldn't I just be a burden to my teammates?"
1005402-48 = "I think..."
1005402-52 = "Instead of participating in the competition, I should just go in my usual Sister habit."
1005402-53 = "That way, I can help people when they need me. Isn't that better?"
1005402-54 = "So, that's what's been on my mind. But the decision was weighing on me, so I wanted to discuss it with you."
1005402-55 = "Huh?"
1005402-56 = "You think gym clothes...actually suit me...?"
1005402-57 = "R-Really? Haha, well... Thank you."
1005402-58 = "...Hm? Am I feeling overwhelmed about participating...or do I simply not want to take part?"
1005402-59 = "Um... No. It's not that I don't want to, exactly..."
1005402-60 = "It's definitely not that. But I've never participated in such a big event..."
1005402-61 = "Well, sometimes I play table tennis with the other Sisters at the cathedral."
1005402-62 = "...I always lose, though. I don't know how they're all so good at it."
1005402-63 = "But it's fun anyway. Everyone's nice to me about it, and we all get along well."
1005402-64 = "That's not the same at all, though! That's just a little activity in the cathedral, and this is...actual sports."
1005402-65 = "...Hm?"
1005402-66 = "Did I wear gym clothes when I played table tennis?"
1005402-67 = "Oh... No, honestly... I was too embarrassed. I always wear my usual habit."
1005402-68 = "This is actually my first time wearing gym clothes. I guess that makes you the first one to see it, too. Haha..."
1005402-69 = "[s7] \"Doesn't table tennis take a ton of coordination?\"\n[s8] \"Mari, you might be more athletic than you realize!\""
1005402-72 = "What do you mean...?"
1005402-73 = "What?"
1005402-74 = "Unless I really don't want to do it, I should give it a try? That's what you think? Um..."
1005402-75 = "Sh-Should I? And I should wear...this outfit?"
1005402-76 = "...You think I'd stand out a lot more if I wore my habit?"
1005402-80 = "Oh..."
1005402-81 = "That does make sense."
1005402-82 = "Thank you, Sensei. Without you, I might've made a big mistake."
1005402-83 = "It didn't occur to me, but everyone's gym uniforms do look really similar. I'd definitely look out of place in my normal clothes."
1005402-84 = "I'm still a bit worried about my legs and my hair, but..."
1005402-85 = "Well, talking to you made me feel much better about it."
1005402-86 = "Th-Then...I'll let the organizers know I'll be participating after all."
1005402-91 = "Oh!"
1005402-95 = "Are you... going to be participating in the field day too?"
1005402-96 = "...Oh, right, of course. Haha, it makes sense that you wouldn't be in any of the events."
1005402-97 = "Still, I'm glad to know you'll be there."
1005402-101 = "Thank you, Sensei. Talking through my concerns really helped."
1005402-102 = "I think I would've regretted it if I didn't participate."
1005402-103 = "...Heehee. It would've been a big mistake!"
1005402-104 = "Well, I'll see you then, Sensei!"
1005402-106 = "Mari seemed unexpectedly bright and cheerful as she sent me back to Schale."

2003306-67 = "นี่คือมาโคโตะทาวเวอร์ที่เสร็จสมบูรณ์แล้วงั้นเหรอ?"
2003306-68 = "อาคารสูงเสียดฟ้า...? อาคารที่แสดงถึงอำนาจของเราที่สามารถมองเห็นได้จากทั่วทั้งคิโวทอส..."
2003306-69 = "[s] \"รู้สึกเหมือนคลังเก็บของมากกว่าอาคารเลย...\""
2003306-70 = "นี่ค่ะ... จดหมายที่โฟร์แมนคุมการก่อสร้างทิ้งเอาไว้ค่ะ!"
2003306-71 = "ว่าไงนะ? แล้วเจ้าตัวไปไหนล่ะ?"
2003306-72 = "ช่างเถอะ ในจดหมายเขียนว่ายังไง?!"

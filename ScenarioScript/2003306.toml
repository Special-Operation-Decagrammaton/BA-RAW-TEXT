[translation]
2003306-1 = "偉大議長的日常"
2003306-3 = "嘻嘻嘻，之前已經讓老師見過我經營的各種事業了對吧。"
2003306-4 = "萬魔殿獨佔的印刷出版……紀念碑般的真琴塔建設……#n再加上宣傳真琴大人的角色商品和觀光渡假村……"
2003306-5 = "這一切都能提升我們萬魔殿在奇普托斯的影響力，並加強我真琴大人的威勢。"
2003306-6 = "隨著時間過去……在各個事業上都能看見顯著的成果。"
2003306-7 = "嘻嘻嘻嘻嘻！啊啊！我羽沼真琴大人的百年計畫很快就會得出成果！"
2003306-8 = "成果究竟會如何……真令人期待啊。#n你說對吧？老師。"
2003306-9 = "[s]「……結果會不會跟真琴說的一樣，確實讓人很好奇。」"
2003306-10 = "嘻嘻嘻！老師果然也很期待吧？"
2003306-11 = "也對，這是理所當然的！"
2003306-12 = "看見接下來的成果後，這段期間一直拒絕我充滿魅力提議的老師，最後一定會……"
2003306-13 = "「早知道就該和萬魔殿合作，事先確保股份才對！抱歉！真琴！」──#n像這樣感到懊悔的。"
2003306-14 = "[s]「呃，再怎麼說也不至於會……」"
2003306-15 = "別擔心！老師！我真琴大人是很寬容大量的！"
2003306-16 = "就算到時候老師後悔，我也不會拒絕，會以寬容的心地接受老師。嘻嘻嘻嘻嘻！！"
2003306-17 = "[s]「好，好哦……」"
2003306-18 = "很好，那麼就打鐵趁熱，現在立刻前往事業現場……"
2003306-26 = "議，議長……！大事不好了！"
2003306-27 = "嗯？怎麼回事？"
2003306-29 = "這，這……原本預計從今天開始，由萬魔殿印刷所發行的議長自傳發生問題……！"
2003306-30 = "[s]「……自傳？」"
2003306-32 = "事情我都聽說了……！為什麼我的自傳無法出版！？"
2003306-33 = "議，議長……！"
2003306-34 = "到底出了什麼問題？"
2003306-35 = "一直以來……紀錄我突破無數逆境，充滿戲劇性與痛苦的個人經歷……#n還進一步加入了能幫助奇普托斯全體學生建議的──"
2003306-36 = "將成為今年奇普托斯暢銷冠軍的自傳究竟發生了什麼問題！？"
2003306-37 = "[s]「真琴似乎想出版非常驚人的書……！」"
2003306-38 = "是，是這樣的……"
2003306-39 = "不管我用計算機怎麼算……根本就算不出單價！議長！"
2003306-40 = "……單價？"
2003306-41 = "（之後印刷所的職員說明了事情的來龍去脈）"
2003306-42 = "因為議長說「我的自傳當然不能太隨便！」……#n因此書的材質採用了加厚的最高級雪白珍珠……"
2003306-43 = "封面也是使用A級皮革裝訂，其他部分也都是費心製作而成……然而結果就是……"
2003306-44 = "現在預算已經見底……印刷費用將會出現天文數字。#n隨著賣出的數量越高，虧損的錢就越多。"
2003306-45 = "這樣下去的話，自傳的出版可能難以進行下去……"
2003306-46 = "什……什麼……！"
2003306-47 = "因為這是我深具紀念性的自傳……#n我只是……想做出最棒的書……！"
2003306-48 = "[s]「看來似乎沒有調查清楚就行動了呢……」"
2003306-49 = "我想恐怕需要全面性地進行重新檢討。"
2003306-50 = "呃唔……！"
2003306-51 = "……沒辦法。#n想讓所有事業全都成功，打從一開始或許就是件困難的事。"
2003306-52 = "雖然可惜……但出了這類問題也沒辦法……"
2003306-58 = "議，議長！大事不好了！"
2003306-59 = "又來了……！？"
2003306-60 = "這次是怎麼回事？"
2003306-61 = "這……我聽說真琴塔已經竣工的消息，所以就去了一趟。#n結果卻發生了完全出乎預料的狀況……！"
2003306-63 = "什，什麼……？"
2003306-65 = "這，這，這……"
2003306-66 = "這是什麼啊！？"
2003306-67 = "這個建築物……就是竣工的真琴塔？"
2003306-68 = "超高層大廈呢……？#n在奇普托斯任何一個地方都能看見的……能展現我權威的建築物跑哪去了……"
2003306-69 = "[s]「與其說是大廈，感覺更像是倉庫……」"
2003306-70 = "這邊有建設現場負責人留下的信！"
2003306-71 = "什麼？他本人跑去哪了？"
2003306-72 = "不，信上寫了什麼？"
2003306-73 = "這……信上的內容是……"
2003306-75 = "無人能冒犯的優秀領導者，同時擁有真正的投資直覺的真琴議長──"
2003306-76 = "首先很感謝您的信任，把如此重大的事業交給我們。"
2003306-77 = "我們已依照議長的委託，完成事前跟您約定的「400吋高」的真琴塔。"
2003306-78 = "雖說契約已經完成，理應向您打聲招呼……#n可惜因為一些無法避免的原因而不得不先行離去，還請您見諒。"
2003306-82 = "希望未來還有機會能與您再次相見。"
2003306-84 = "[ns]「400吋……難道說……」"
2003306-85 = "快，快把合約書跟設計圖拿過來！"
2003306-86 = "是！"
2003306-93 = "啊！！"
2003306-94 = "設，設計圖和合約書上的單位還真的寫著「吋」……"
2003306-95 = "唔……只看到400這個數字就以為能完成大業……#n除此之外的細節根本沒有多加理會就委託了對方……！"
2003306-96 = "[s]「不不不，這是不該忽略的部分吧……！？」"
2003306-97 = "竟敢……竟敢背叛我的信任！"
2003306-98 = "以為我會就這樣善罷干休嗎……！"
2003306-99 = "議，議長……！大，大事不好了！"
2003306-100 = "啊？這，這次又怎麼了？"
2003306-102 = "有報告說……以議長為模特兒的商品業者趁夜跑路了……！"
2003306-106 = "不僅如此！#n以萬魔殿的名義開發中的渡假村因為發現了源泉，所以溫泉開發部就擅自闖進去了！"
2003306-110 = "再加上有消息說我們進行的觀光事業中有雙重合約的問題……！#n因此業者要求賠償違約金……！"
2003306-114 = "啊，啊啊……呃……"
2003306-115 = "呃啊！！"
2003306-120 = "[ns]「真，真琴……！？你還好嗎！？」"
2003306-122 = "議，議長……！！！"
2003306-125 = "區區……！"
2003306-126 = "[s]「真，真琴……？」"
2003306-127 = "區區這種程度的問題……"
2003306-128 = "如果以為這點逆境就會讓我真琴大人深受打擊而倒下，#n那你們就大錯特錯了！！"
2003306-130 = "真，真琴議長！！！"
2003306-132 = "哈啊……哈啊……！通知全體成員！"
2003306-133 = "就從那個膽敢不自量力背刺我們萬魔殿的業者開始！把那傢伙給我找出來！"
2003306-134 = "除此之外，還要動員一切手段……"
2003306-135 = "就算追到地獄……也要讓那些傢伙為愚弄我的行為付出代價！"
2003306-136 = "……所有人都聽懂了嗎？"
2003306-138 = "是！！！"
2003306-142 = "[ns]「……真琴真厲害。」"
2003306-143 = "嗯？"
2003306-144 = "啊啊，畢竟這種事我已經看多了。"
2003306-145 = "嘻嘻嘻，我早就已經習慣了。"
2003306-146 = "[s]「到底多常遇到這種事……！？」"
2003306-147 = "我不會因為這點程度就停下腳步！"
2003306-148 = "我真琴大人未來將掌控格黑娜……進一步將整個奇普托斯納入手中！"
2003306-149 = "在那之前，我是絕對不會因為這點小事就放棄……！"
2003306-150 = "先來懲罰那些欺騙我們的業者吧！"
2003306-151 = "[s]「……果然很像真琴的作風，我也會幫忙的。」"
2003306-152 = "嘻嘻嘻。#n如果可以的話，我倒是希望你能協助我奪下奇普托斯。"
2003306-153 = "[s]「這……還請容我拒絕。」"
2003306-154 = "嘻嘻嘻，沒關係。餘興就留到後頭！#n先解決眼前的問題吧！"
2003306-155 = "好，那就回去吧！準備豪華轎車……！"
2003306-156 = "啊，那個……很抱歉，議長。#n因為這次事件導致豪華轎車的費用代繳延宕，車輛剛剛已經被業者給回收了……"
2003306-157 = "……………………"
2003306-158 = "那個……老師。#n如果可以的話，能不能借我一點交通費……"
2003306-159 = "[s]「啊，嗯，我借你……」"
2003306-160 = "嘻嘻嘻。#n這份恩情，我絕不會忘記的！"
2003306-161 = "來吧大家！萬魔殿出動！"
2003306-163 = "是！！"
2003306-165 = "（後來和真琴齊心協力，順利解決了各種問題）"

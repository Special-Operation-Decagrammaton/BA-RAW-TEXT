[translation]
2003306-1 = "ชีวิตประจำวันของท่านประธานผู้ยิ่งใหญ่"
2003306-3 = "คิกคิกคิก เมื่อครั้งที่แล้วเราพาคุณครูไปชมธุรกิจที่เราดูแลมาแล้ว"
2003306-4 = "ธุรกิจจัดการสิ่งพิมพ์ของแพนเดโมเนียม โซไซตี้... ธุรกิจก่อสร้างหอคอยที่ระลึกมาโคโตะ... นอกจากนี้ก็ยังมีธุรกิจขายสินค้าที่ระลึกของท่านมาโคโตะผู้นี้ ธุรกิจรีสอร์ตท่องเที่ยว และอื่นๆ..."
2003306-5 = "ทั้งหมดทำเพื่อขยายอิทธิพลของแพนเดโมเนียม โซไซตี้ให้กว้างขวางในคิโวทอส และทำให้ชื่อเสียง#nของท่านมาโคโตะผู้นี้เป็นที่รู้จักมากขึ้น"
2003306-6 = "ตอนนี้ก็ถึงเวลาแล้ว... ที่จะเห็นผลเป็นรูปธรรมจากธุรกิจเหล่านั้น"
2003306-7 = "หึหึหึหึ ใช่แล้ว! นโยบายระยะยาวของท่านฮานุมะ มาโคโตะผู้นี้ ในที่สุดก็จะเป็นจริงขึ้นมาแล้ว!"
2003306-8 = "ชักอยากรู้แล้วสิว่าผลจะออกมาเป็นยังไง คิดอย่างนั้นมั้ย คุณครู?"
2003306-9 = "[s] \"ครูก็สงสัยว่าผลจะออกมาอย่างที่มาโคโตะบอกรึเปล่า...\""
2003306-10 = "คิกคิกคิก! คิดแล้วเชียวว่าคุณครูก็อยากเห็นผลลัพธ์เหมือนกัน!"
2003306-11 = "ช่วยไม่ได้ละนะ! "
2003306-12 = "ถ้าเห็นความก้าวหน้าของธุรกิจของเรา คุณครูที่เอาแต่ปฏิเสธข้อเสนอของเรามาโดยตลอด..."
2003306-13 = "จะต้องนึกเสียใจว่า <รู้อย่างนี้ร่วมมือกับทางแพนเดโมเนียม โซไซตี้แล้วลงทุนเพิ่มไปตั้งแต่แรกก็คงดี! ขอโทษนะ มาโคโตะ!> แบบนี้แน่ๆ"
2003306-14 = "[s] \"ไม่หรอก คงไม่ถึงขนาดนั้นหรอกมั้ง...\""
2003306-15 = "ไม่ต้องกังวลหรอกคุณครู! ท่านมาโคโตะผู้นี้เป็นคนจิตใจกว้างขวางพอตัวนะ!"
2003306-16 = "ตอนนั้นถ้าเกิดรู้สึกเสียใจขึ้นมาในภายหลัง ก็ให้มาหาเราได้เลย เรายินดีต้อนรับคุณครูด้วยจิตใจที่โอบ#nอ้อมอารีเสมอ! คิกคิกคิกคิก!!"
2003306-17 = "[s] \"อื้อ...\""
2003306-18 = "เอาละ ถ้างั้นอย่างมัวรอช้าอยู่เลย รีบไปที่ย่านธุรกิจ..."
2003306-26 = "ทะ... ท่านประธาน...! เกิดเรื่องใหญ่แล้วค่ะ!"
2003306-27 = "หืม? มีเรื่องอะไรงั้นเหรอ?"
2003306-29 = "คะ...คือว่าทางโรงพิมพ์ของแพนเดโมเนียม โซไซตี้แจ้งเข้ามาว่าเกิดปัญหากับการพิมพ์หนังสือ#nอัตชีวประวัติของท่านประธาน...!"
2003306-30 = "[s] \"หนังสืออัตชีวประวัติ...?\""
2003306-32 = "เราได้ยินมาแล้วละ...! จัดพิมพ์อัตชีวประวัติของเราไม่ทันงั้นเหรอ?!"
2003306-33 = "ทะ... ท่านประธาน...!"
2003306-34 = "เกิดปัญหาอะไรขึ้นกันแน่!"
2003306-35 = "บันทึกประสบการณ์ความยากลำบากและอุปสรรคมากมายที่เราได้พบเจอในช่วงที่ผ่านมา สิ่งที่จะเป็นบทเรียนอันเป็นประโยชน์มากมายให้กับเหล่านักเรียนในคิโวทอส..."
2003306-36 = "เกิดปัญหาอะไรขึ้นกับการตีพิมพ์หนังสืออัตชีวประวัติของเราที่จะได้ขึ้นแท่นหนังสือขายดีที่สุดแห่งปี#nในคิโวทอสกัน?!"
2003306-37 = "[s] \"มาโคโตะ วางแผนจะทำเรื่องที่ยิ่งใหญ่อยู่สินะ...!\""
2003306-38 = "มะ...ไม่ใช่อย่างนั้นนะ..."
2003306-39 = "ผมลองคำนวณราคาต้นทุนต่อเล่มดูแล้ว... แต่ว่าไม่สามารถคำนวณออกมาได้เลยครับ ท่านประธาน!"
2003306-40 = "ราคาต้นทุนต่อเล่ม...?"
2003306-41 = "(หลังจากนั้นคุณครูก็ได้ฟังเรื่องราวและสถานการณ์อย่างละเอียดจากพนักงานโรงพิมพ์)"
2003306-42 = "เราทำตามที่ท่านประธานสั่งไว้ว่า <หนังสืออัตชีวประวัติของเราจะต้องจัดทำอย่างดีที่สุด ไม่ให้มี#nข้อบกพร่องแม้แต่อย่างเดียว!> และเลือกใช้วัสดุทำหนังสือที่มีส่วนผสมของไข่มุกอย่างดี..."
2003306-43 = "และใช้หนังคุณภาพเกรด A ในการทำหน้าปกและเข้าเล่ม รวมถึงจัดทำเล่มหนังสืออย่างละเอียดครับ แต่ผลก็คือ..."
2003306-44 = "ตอนนี้งบประมาณการผลิตของเราไม่เหลือจนไม่สามารถผลิดต่อได้... นอกจากนี้ ถ้ายังใช้ต้นทุนการ#nผลิตมากไปกว่านี้ละก็ ยิ่งขายหนังสือได้มากเท่าไร บัญชีก็จะยิ่งติดลบเท่านั้นครับ!"
2003306-45 = "ถ้าเป็นแบบนี้ละก็สถานการณ์การพิมพ์หนังสืออัตชีวประวัติอาจไม่แน่นอน..."
2003306-46 = "วะ...ว่าไงนะ...!"
2003306-47 = "ระ...เราแค่อยากให้หนังสือออกมาดีที่สุด ในฐานะหนังสืออัตชีวิประวัติที่น่าจดจำของเราก็เท่านั้น...!"
2003306-48 = "[s] \"สักแต่จะสั่งโดยไม่หาข้อมูลก่อนสินะ...\""
2003306-49 = "ไม่ว่ายังไง เราก็อาจจะต้องเริ่มพิจารณาการจัดทำใหม่ตั้งแต่ต้นเลยครับ"
2003306-50 = "อะ...อึกกกก...! "
2003306-51 = "ช่วยไม่ได้... เรื่องที่ว่าธุรกิจทุกอย่างจะประสบความสำเร็จน่ะ เรารู้ตั้งแต่แรกแล้วว่ามันเป็นไปได้ยาก..."
2003306-52 = "น่าเสียดาย... ถ้าเป็นปัญหาพวกนั้นละก็ ชะ...ช่วยไม่ได้..."
2003306-58 = "ทะ...ท่านประธาน! เกิดเรื่องใหญ่แล้วค่ะ!"
2003306-59 = "อีกแล้วเหรอ...?!"
2003306-60 = "คราวนี้มีเรื่องอะไรน่ะ!"
2003306-61 = "ฉันได้รับรายงานว่ามาโคโตะทาวเวอร์สร้างเสร็จแล้วเลยไปตรวจสอบ แต่ก็เกิดเหตุการณ์ที่ไม่คาดคิด#nขึ้นค่ะ...!"
2003306-63 = "วะ...ว่าไงนะ...?"
2003306-65 = "นะ...นะ...นี่..."

2003306-29 = "3;만마전 부원 모브 A;06;그, 그것이…… 오늘부터 만마전 독점 출판인쇄소에서 발간 예정이었던 의장님의 자서전과 관련해 문제가 있다는 연락이……!\n#3;em;[땀]\n#3;closeup"
2003306-30 = "[s] \"……자서전?\""
2003306-31 = "#all;hide"
2003306-32 = "3;마코토;05;이야기는 들었다……! 이 몸의 자서전을 출간할 수가 없다고?!\n#3;a\n#3;em;[반응]"
2003306-33 = "3;인쇄소 직원;01;의, 의장님……!\n#3;stiff\n#3;em;[?!]"
2003306-34 = "3;마코토;01;대체 무엇이 문제인 게냐!\n#3;em;[!]"
2003306-35 = "3;마코토;99;그간…… 이 몸이 수많은 역경을 뛰어넘으며 겪어온 드라마와 고뇌가 묻어나오는 개인사, 나아가 키보토스의 뭇 학생들에게 커다란 위안이 되어줄 조언 등을 담아낸 덕에──"
2003306-36 = "3;마코토;05;올해 키보토스 최고의 베스트셀러가 되는 것이 확정적이던 이 몸의 자서전 출간에 무슨 트러블이 발생한 게냐?!\n#3;em;[빠직]"
2003306-37 = "[s] \"마코토, 엄청난 물건을 출간할 예정이었구나……!\""
2003306-38 = "3;인쇄소 직원;00;그. 그게 다름이 아니라………\n#3;stiff\n#3;em;[땀]"
2003306-39 = "3;인쇄소 직원;00;계산기를 때려보니…… 도저히 단가가 나오질 않습니다. 의장님!"
2003306-40 = "3;마코토;04;………단가?\n#3;em;[?]"
2003306-41 = "#na;(그 후로 우리는 인쇄소 직원에게서 상황이 어떻게 된 것인지, 이야기를 들을 수가 있었다.)"
2003306-42 = "3;인쇄소 직원;00;의장님께서 말씀하시길 <내가 만드는 자서전이라면 그 어느 것 하나 허투루 할 수 없다!> 고 말씀하신 만큼…… 책의 재질은 최고급 스노우펄 재질을 두툼하게 사용하고…….\n#3;em;…"
2003306-43 = "3;인쇄소 직원;00;표지도 A급 가죽 정장을 써서 제본하는 등, 많은 부분을 신경 써서 제작을 진행하였습니다만…… 그 결과…….\n#3;stiff"
2003306-44 = "3;인쇄소 직원;00;예산은 이미 진즉 바닥나버린 상황에다가…… 거기에 더해 이대로는 인쇄 비용이 천문학적으로 불어나 버려서 팔면 팔수록 마이너스가 찍히는 사태가 일어나 버렸습니다."
2003306-45 = "3;인쇄소 직원;00;이대로는 자서전 출간 자체가 불투명한 상황이라고 할지………\n#3;em;[땀]"
2003306-46 = "3;마코토;07;뭐…… 뭣이………!\n#3;em;[?!]"
2003306-47 = "3;마코토;06;이 몸의 기념비적인 첫 자서전이니만큼…… 그저 최고의 책을 만들고자 했을 뿐인데……!\n#3;stiff"
2003306-48 = "[s] \"알아보지 않고 그냥 지른 거구나……….\""
2003306-49 = "3;인쇄소 직원;01;아무래도 전면적인 재검토가 필요할 것 같습니다."

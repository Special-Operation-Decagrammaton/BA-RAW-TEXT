2003306-75 = "ถึงท่านประธานมาโคโตะ ผู้เป็นนักลงทุนที่ยอดเยี่ยมและมีเสน่ห์อย่างหาได้ยากในฐานะผู้นำ"
2003306-76 = "ท่านประธาน ขอบคุณเป็นอย่างสูงที่ไว้วางใจให้พวกเราดูแลโครงการขนาดใหญ่นี้"
2003306-77 = "เราได้ก่อสร้างอาคารมาโคโตะทาวเวอร์ที่มีขนาดสูง 400 นิ้วเสร็จสมบูรณ์ตามที่ท่านประธานว่าจ้าง#nเรียบร้อยแล้ว"
2003306-78 = "เราอยากส่งมอบอาคารนี้ที่เสร็จสมบูรณ์นี้ด้วยตัวเอง แต่เนื่องจากต้องรีบไปที่ไซต์งานต่อไป จึงต้องขออภัยล่วงหน้าที่เขียนจดหมายมาแจ้งเช่นนี้"

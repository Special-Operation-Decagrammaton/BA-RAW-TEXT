2003306-95 = "อึก... เราดูแค่ตัวเลข 400... แล้วก็ตื่นเต้นกับความยิ่งใหญ่จนมองข้ามไป... จนเราไม่ทันได้ตรวจสอบ#nรายละเอียดเล็กๆ น้อยๆ และไว้วางใจให้พวกเขาดูแลงานใหญ่ขนาดนี้...!"
2003306-96 = "[s] \"มันเป็นเรื่องที่ไม่ควรมองข้ามที่สุดเลยไม่ใช่เหรอ...?!\""
2003306-97 = "กล้าดียังไง... ถึงทรยศความไว้วางใจของเราแบบนี้!"
2003306-98 = "คิดว่าเราจะยอมอยู่เฉยๆ หรือยังไง...!"
2003306-99 = "ทะ... ท่านประธาน...! เกิดเรื่องใหญ่แล้วค่ะ!"
2003306-100 = "หะ... หืม? คะ...คราวนี้มีอะไรอีกล่ะ?!"
2003306-102 = "คือ... มีรายงานว่าบริษัทที่รับผลิตสินค้าโมเดลของท่านประธานแอบหนีไปเมื่อกลางดึก...!"
2003306-106 = "ยังไม่หมดเท่านั้นค่ะ! มีรายงานว่ามีการค้นพบตาน้ำร้อนบริเวณรีสอร์ตที่แพนเดโมเนียม โซไซตี้ดูแลอยู่ ทำให้ตอนนี้ชมรมพัฒนาออนเซ็นบุกรุกเข้าไปที่รีสอร์ตแล้วค่ะ...!"
2003306-110 = "นอกจากนี้ ยังมีข่าวเรื่องสัญญาของสินค้าที่เราอยู่ระหว่างทำสัญญากับธุรกิจการท่องเที่ยวถูกเปิดเผย#nด้วย...! ตอนนี้คู่สัญญาจึงแห่กันมาเรียกร้องเงินค่าปรับกัน...!"
2003306-114 = "อ่า... อ่า.... อ่า... อือ..."

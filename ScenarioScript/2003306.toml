[translation]
2003306-1 = "The Great Chairman's Daily Activities"
2003306-3 = "Kiheheh. On our last tour, I showed you our financial operations, Sensei."
2003306-4 = "The Pandemonium Society's exclusive printing office... The monumental soon-to-be-built Makoto Tower... Great Makoto character merchandise, our resort operation..."
2003306-5 = "Many roads to a single destination: the expansion of the Pandemonium Society's influence over Kivotos and increasing the renown of the Great Makoto!"
2003306-6 = "Enough time has passed that the results of these projects should start making themselves clear."
2003306-7 = "Kiheheheh! The Great Hanuma Makoto's masterpiece will soon unfold before your very eyes!"
2003306-8 = "I'm on tenterhooks waiting for the results! Aren't you excited, Sensei?"
2003306-9 = "[s] \"...It'll be interesting to see how your plans work out, Makoto.\""
2003306-10 = "Kiheheheh! I knew you'd get into it, Sensei! Play aloof all you want—I'll win you over in the end!"
2003306-11 = "It's inevitable!"
2003306-12 = "It took admirable resolve to deny my magnanimous offer after I took you on a tour of our operations, Sensei! But even you won't be able to deny the results that are about to unfold..."
2003306-13 = "You'll be overwhelmed by the urge to throw yourself at my feet and cry, \"I should have joined forces with the Pandemonium Society long ago! I'm so sorry, Makoto—I've wasted so much time!\""
2003306-14 = "[s] \"...I wouldn't go that far.\""
2003306-15 = "Fear not, Sensei! The Great Makoto has a compassionate heart!"
2003306-16 = "No matter how much you regret your mistake, I would never allow you to beg at my feet, Sensei! I'll always accept you!"
2003306-17 = "[s] \"Th-Thanks...\""
2003306-18 = "There's no time to waste! Let us return to the operations and..."
2003306-26 = "C-Chairman! We have a big problem!"
2003306-27 = "Hm? What's the matter?"
2003306-29 = "W-Well... The Pandemonium Printing Office just called... They won't be able to publish your biography today!"
2003306-30 = "[s] \"...Biography?\""
2003306-32 = "What sort of problem? I planned and approved every aspect of the production myself!"
2003306-33 = "W-Well, Chairman..."
2003306-34 = "Spit it out!"
2003306-35 = "I filled that book with the drama and struggle of the countless conflicts I've overcome, the comradery of fighting alongside my club, and the sage advice I know will touch the hearts of students across Kivotos─"
2003306-36 = "My biography is guaranteed to become this year's best seller!"
2003306-37 = "[s] \"Wow, Makoto! That sounds incredible!\""
2003306-38 = "Th-The problem is..."
2003306-39 = "They've done the math...and there's just no way to make your intended unit price work, Chairman!"
2003306-40 = "...Unit price?"
2003306-41 = "An employee from the printing office soon arrived to report on the situation personally."
2003306-42 = "You commanded us to make your biography perfect in every respect, so we put a lot of time and effort into its design and publication..."
2003306-43 = "We commissioned a famous artist for the cover art and bound each book in the finest leather we could buy..."
2003306-44 = "The prototype alone depleted most of the budget...and printing costs will grow astronomically at this rate. The sad truth is that each book we sell will push us further and further into the red."
2003306-45 = "Publishing the biography at all may be impossible at this point."
2003306-46 = "Wh-What?!"
2003306-47 = "I just wanted to make the greatest book I could... This is the historic release of my first biography!"
2003306-48 = "[s] \"So you charged ahead without thinking...\""
2003306-49 = "I believe we need to overhaul this project from top to bottom."
2003306-50 = "Tsk...! Blast! "
2003306-51 = "...Well, finding massive success with every project might have overwhelmed our staff, so it's good our other endeavors have room to grow!"
2003306-52 = "It's a shame... But problems like these are unforeseeable..."
2003306-58 = "C-Chairman! It's an emergency!"
2003306-59 = "Again?!"
2003306-60 = "What is it this time?!"
2003306-61 = "We received word that the construction of Makoto Tower was complete, but when we went to look...!"
2003306-63 = "Wh-What?!"
2003306-65 = "Wh-Wh-Wh—"
2003306-66 = "What is this?!"
2003306-67 = "This building...is Makoto Tower?!"
2003306-68 = "What happened to my beautiful skyscraper...? What happened to the monument to my authority, my beacon to all Kivotos...?"
2003306-69 = "[s] \"This looks more like a warehouse than a monument...\""
2003306-70 = "Here... We have a letter from the site manager!"
2003306-71 = "What? Why isn't the manager here to report in person?"
2003306-72 = "No, more importantly, what does the letter say?!"
2003306-73 = "Uh, well... The letter says..."
2003306-75 = "To Chairman Makoto, our great charismatic leader and holder of a peerless instinct for investment."
2003306-76 = "Chairman. Thank you for trusting us with a project so close to your heart."
2003306-77 = "As you requested, Makoto Tower stands at an impressive 400 inches—a perfect expression of our agreed-upon design."
2003306-78 = "Although we deeply regret that we cannot celebrate the completion of our contract in person, unavoidable circumstances have called us away. Please forgive our absence, but know that we're rejoicing with you in spirit."
2003306-82 = "We eagerly anticipate working with you again in the future."
2003306-84 = "[ns] \"Don't tell me...that by 400 inches they...\""
2003306-85 = "B-Bring me the tower contract! As well as its blueprint!"
2003306-86 = "Yes, Chairman!"
2003306-93 = "*gasp*"
2003306-94 = "Th-The contract and blueprint do have their units in inches..."
2003306-95 = "Urgh... I saw the number 400...and thought I would finally achieve my great dream... I left the piddling details to the construction company and trusted them with the work!"
2003306-96 = "[s] \"Isn't the scale the most important part of building a massive skyscraper?\""
2003306-97 = "...How dare they betray my trust!"
2003306-98 = "They won't get away with this!"
2003306-99 = "C-Chairman! W-We have a problem!"
2003306-100 = "H-Huh? Wh-What is it this time?!"
2003306-102 = "We got a report claiming that the CEO of the business creating merchandise in your likeness has embezzled project funds and fled the city!"
2003306-106 = "That's not all! The Hot Springs Department attacked the Pandemonium Resort after they discovered it was built over a hot spring! They've driven off all attempts to recapture the building!"
2003306-110 = "A-And there's even a report from the tourism development team—one of our package deals was double-contracted by mistake...! The clients are demanding that we pay the steep penalty fee!"
2003306-114 = "Ugh. Urgh... Ahh... Um..."
2003306-115 = "Tch!!!"
2003306-120 = "[ns] \"M-Makoto...are you okay?!\""
2003306-122 = "C-Chairman!!!"
2003306-125 = "Just breathe...!"
2003306-126 = "[s] \"M-Makoto?\""
2003306-127 = "If...you...thought..."
2003306-128 = "If you thought that the Great Makoto would collapse in shock from mere trifles like these, you're gravely mistaken!!!"
2003306-130 = "C-Chairman Makoto!!!"
2003306-132 = "*inhale*...Assemble our club members!"
2003306-133 = "Starting with the construction site manager, track down every company that has dared to betray the Pandemonium Society! We'll teach them the gravity of their mistake!"
2003306-134 = "It's time to unleash my full power..."
2003306-135 = "I'll make them pay for mocking me! Let them flee to the ends of the world...when they look over their shoulders, they'll see me pursuing them!"
2003306-136 = "...Everyone! Do you understand?!"
2003306-138 = "Yes, Chairman!!!"
2003306-142 = "[ns] \"...You're amazing, Makoto.\""
2003306-143 = "Hm?"
2003306-144 = "Ah. I've been through this so many times now. I'm used to it."
2003306-145 = "Kiheheheh! I mean, what kind of leader would I be if I keeled over once a week?"
2003306-146 = "[s] \"Just how often does something like this happen?!\""
2003306-147 = "I'll never be held back by piddling setbacks like these!"
2003306-148 = "The Great Makoto's takeover of Gehenna—no, the entirety of Kivotos—cannot be stopped!"
2003306-149 = "I'll smash through any obstacle that stands in my way!"
2003306-150 = "First we'll root out every false and fraudulent business in the district!"
2003306-151 = "[s] \"...Heh. Sounds like a plan, Makoto. I'll help you with that.\""
2003306-152 = "Kiheheheh! Good! And after that, we can take over Kivotos together!"
2003306-153 = "[s] \"...I think I'll decline that one for now.\""
2003306-154 = "Kiheheheh! Very well—we'll leave such plans for the future! Let us enjoy the battle that lies ahead of us here and now!"
2003306-155 = "Let us return! Summon the limousine!!!"
2003306-156 = "A-Ah, Chairman... I'm sorry, but we accidentally allowed the lease payments to lapse while we were funding all the new projects... The limousine was repossessed by the car company."
2003306-157 = "..."
2003306-158 = "Um, Sensei... Would you possibly lend us some money for public transportation..."
2003306-159 = "[s] \"S-Sure, take whatever you need...\""
2003306-160 = "Kiheheheh! I knew our partnership would be invaluable! I owe you a debt!"
2003306-161 = "Everyone! It's time for the Pandemonium Society to move out!"
2003306-163 = "Yes, Chairman!!!"
2003306-165 = "Afterwards, I worked hard to help Makoto get her finances in order."

[translation]
2003306-1 = "#title;위대한 의장님의 일상"
2003306-2 = "#wait;2500"
2003306-3 = "3;마코토;03;키시싯. 지난번엔 선생에게 이 몸이 벌인 사업의 면면을 보여주었었지.\n#3;em;[재잘]\n#3;a"
2003306-4 = "3;마코토;99;만마전의 독점 인쇄출판소 운영 사업…… 기념비적인 마코토 타워의 건설 사업…… 거기에 더해 이 마코토 님을 위시한 캐릭터 굿즈 사업이나 관광리조트 운영 사업 등등."
2003306-5 = "3;마코토;99;그 전부가 이곳 키보토스에서 우리 만마전의 영향력을 늘리고, 이 마코토 님의 위세를 드높이기 위한 것들."
2003306-6 = "3;마코토;03;시간도 어느덧 오래도록 지나…… 슬슬 그 모든 사업에서 가시적인 성과가 나올 타이밍이다.\n#3;em;…"
2003306-7 = "3;마코토;10;크크크크큭! 그래! 이 하누마 마코토 님의 백년대계가 이룩해낸 성과가 곧 눈앞에 펼쳐지는 셈이다!"
2003306-8 = "3;마코토;03;어떤 결과물이 되었을지. 무척이나 기대되는군. 그렇지 않나. 선생?\n#3;em;[음표]"
2003306-9 = "[s] \"……확실히 마코토의 말대로 결과가 나왔을지, 궁금하긴 해.\""
2003306-10 = "3;마코토;03;키키키킷! 역시나! 선생도 기대하고 있었나!\n#3;em;[재잘]"
2003306-11 = "3;마코토;03;하긴 그럴 수밖에!"
2003306-12 = "3;마코토;99;지금부터 펼쳐질 성과물을 보고 나면, 이제껏 이 몸의 매력적인 제안을 거부해 온 선생일지라도 끝내……."
2003306-13 = "3;마코토;10;<만마전과 옛날부터 협력해서 먼저 지분을 확보해 둘 걸! 미안! 마코토!>라고 후회를 할 테지만.\n#3;em;[반짝]"
2003306-14 = "[s] \"아니. 아무리 그래도 거기까지는…….\""
2003306-15 = "3;마코토;99;걱정하지 말도록! 선생! 이 마코토 님의 아량은 넓다!"
2003306-16 = "3;마코토;03;그때 가서 후회하더라도, 내치지 않고 내 넓은 마음으로 선생을 받아줄 터이니 말이야. 키키키키킷!!\n#3;em;[재잘]"
2003306-17 = "[s] \"으응…….\""
2003306-18 = "3;마코토;03;자, 그럼 더 지체할 것도 없겠다. 지금 바로 사업장으로 이동을…….\n#3;em;…"

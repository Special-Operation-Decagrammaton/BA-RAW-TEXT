[translation]
1300605-1 = "小惡魔的興趣"
1300605-2 = "（正當我因為夏萊的工作，在街上巡邏的時候……）"
1300605-4 = "[ns] 「咦，無月？」"
1300605-8 = "（還來不及搭話，無月就快步從視線中消失了）"
1300605-9 = "（無月身影消失的方向正好是……）"
1300605-10 = "[ns] 「黑市……？」"
1300605-12 = "[ns] 「……」"
1300605-14 = "[ns] 「……跟上去看看吧。」"
1300605-18 = "[ns] 「無月！」"
1300605-19 = "嗯？這不是老師嗎。"
1300605-20 = "竟然在這種地方遇到老師，真稀奇。老師也有事要去黑市嗎？"
1300605-21 = "[s1] 「那是我要說的。」\n[s2] 「我才想問，無月你怎麼來這裡？」"
1300605-22 = "啊哈～是因為上次在MomoTalk上提過的興趣。"
1300605-23 = "啊哈～是因為上次在MomoTalk上提過的興趣。"
1300605-24 = "[s] 「興趣……？」"
1300605-25 = "嗯，與其說一堆，不如直接去看比較快。老師也這麼想吧。對吧？"
1300605-28 = "就這麼決定了！好了好了，走吧，老師！"
1300605-29 = "[s] 「咦？但，但是……」"
1300605-31 = "[ns] 「『炸彈專賣店，您所需的炸彈一應俱全』？」"
1300605-33 = "[ns] 「無月的興趣，該不會是……」"
1300605-34 = "嗯？是收集炸彈喔～？"
1300605-35 = "[s] 「炸，炸彈，為什麼要收集那種東西……？」"
1300605-36 = "咯呵呵，那當然是……"
1300605-37 = "[s] 「當然是？」"
1300605-38 = "有炸彈的話，就可以做很多有趣的惡作劇！"
1300605-39 = "[s] 「惡作劇……？」"
1300605-40 = "沒錯沒錯！舉例來說，老師你看，這個炸彈，雖然是煙霧彈，"
1300605-41 = "但拔掉這個插銷然後丟出去，就可以遮蔽所有人的視線約1分鐘。"
1300605-42 = "也就是說……"
1300605-43 = "[s] 「……也就是說？」"
1300605-44 = "在廣場之類的地方引爆的話，可以盡情惡作劇整整1分鐘都不會有人發現！"
1300605-45 = "[s] 「……這樣啊。」"
1300605-46 = "啊，其他用起來差不多的東西還有這個，閃光彈。"
1300605-47 = "在日落天黑之後引爆這個的話，人們都會被嚇到，很好玩哦！"
1300605-48 = "[s] 「原來是想嚇人啊……」"
1300605-49 = "啊，黏性炸彈。這也很有趣喔？"
1300605-50 = "除了那個，還有這個，啊，還有這個呢！"
1300605-51 = "[s] 「炸彈居然有這麼多種。」"
1300605-52 = "啊哈！嗯，沒錯！而且炸彈的種類不是只能單純從效果來區分唷，老師。"
1300605-53 = "根據用途、使用方式的不同來分，種類可是天差地別……"
1300605-54 = "如何？炸彈的世界很博大精深吧？很深奧吧～？"
1300605-55 = "[s3] 「雖然不是很懂……」\n[s4] 「但至少有清楚明白無月很喜歡炸彈了。」"
1300605-56 = "咯呵呵，這樣啊。"
1300605-57 = "咯呵呵，這樣啊。"
1300605-58 = "呵呵。既然今天和老師一起來了～有沒有什麼特別的東西呢～"
1300605-59 = "啊，老師。這個如何？這是閃光炸彈！"
1300605-60 = "[s] 「閃光炸彈又是什麼？」"
1300605-61 = "呵呵，這個啊……"
1300605-67 = "（就這樣和無月一起逛街，度過了愉快的時光）"
1300605-68 = "（雖然買的是炸彈……）"

1300605-17 = "3;무츠키;01\n#3;a\n#wait;1500"
1300605-18 = "[ns] \"무츠키!\""
1300605-19 = "3;무츠키;02;응? 뭐야~ 선생님이잖아.\n#3;em;[반응]\n#3;stiff"
1300605-20 = "3;무츠키;01;이런 곳에서 선생님을 만나다니, 별일이네. 선생님도 블랙마켓에 볼일이 있어서 왔어?"
1300605-21 = "[s1] \"그건 내가 할 말이야.\"\n[s2] \"무츠키야말로 여긴 어쩐 일이야?\""
1300605-22 = "3;무츠키;03;아핫~ 저번에 모모톡으로 말했던 취미생활 때문이야.\n#3;em;[재잘]"
1300605-23 = "3;무츠키;03;아핫~ 저번에 모모톡으로 말했던 취미생활 때문이야.\n#3;em;[재잘]"
1300605-24 = "[s] \"취미생활……?\""
1300605-25 = "3;무츠키;11;음, 말로 설명하는 것보다, 보여주는 게 더 빠르겠다. 선생님도 그렇게 생각하지. 그치?"
1300605-26 = "3;무츠키;10\n#3;greeting\n#wait;400"
1300605-27 = "3;무츠키;10\n#3;closeup\n#wait;1000\n#bgshake"
1300605-28 = "3;무츠키;11;자자, 선생님. 가자!\n#3;closeup\n#3;em;[음표]"
1300605-29 = "[s] \"어? 하, 하지만…….\""
1300605-30 = "#all;hide"
1300605-31 = "[ns] \"……<폭탄 전문편의점, 당신이 원하는 모든 폭발이 여기에>?\""
1300605-32 = "#wait;1000"
1300605-33 = "[ns] \"무츠키의 취미생활이라는 게 혹시…….\""
1300605-34 = "3;무츠키;02;응? 폭탄 수집인데~?\n#3;em;[?]"
1300605-35 = "[s] \"포, 폭탄, 그런 걸 왜……?\""
1300605-36 = "3;무츠키;11;쿠흐흐, 그야 당연히…….\n#3;stiff\n#3;em;[재잘]"
1300605-37 = "[s] \"당연히?\""
1300605-38 = "3;무츠키;03;폭탄이 있으면 엄청나게 재미있는 장난을 칠 수 있으니까!\n#3;hophop"
1300605-39 = "[s] \"장난……?\""
1300605-40 = "3;무츠키;03;응응! 예를 들어 선생님 봐봐. 이 폭탄. 연막탄이거든?\n#3;m2\n#3;hophop"
1300605-41 = "3;무츠키;01;여기 핀을 뽑은 다음 던지면, 약 1분 동안 모두의 시야를 가릴 수 있어."
1300605-42 = "3;무츠키;99;그 말은 즉…….\n#3;em;…"
1300605-43 = "[s] \"즉?\""
1300605-44 = "3;무츠키;01;광장 같은 데서 터트리면, 아무도 모르게 1분 간 잔뜩 장난을 칠 수 있단 거야!\n#3;m3\n#3;hophop\n#3;em;[반짝]"
1300605-45 = "[s] \"……으응.\""
1300605-46 = "3;무츠키;03;아핫, 비슷하게 사용할 수 있는 걸로는, 여기 섬광탄도 있어. \n#3;em;[재잘]\n#3;m4\n#3;hophop"
1300605-47 = "3;무츠키;11;해가 지고 어두울 때 이걸 터트리면 사람들 전부 우왕좌왕해서 엄청 재밌어!\n#3;greeting"
1300605-48 = "[s] \"우왕좌왕하게 만드는 거구나…….\""
1300605-49 = "3;무츠키;03;아, 끈끈이 폭탄. 이것도 또 나름 매력이 있다니까?\n#3;m5\n#3;hophop\n#3;em;[반짝]"
1300605-50 = "3;무츠키;13;그밖에는 이런 것도, 아, 또 이런 것도 있겠다.\n#3;m1\n#3;hophop\n#3;em;[재잘]"
1300605-51 = "[s] \"폭탄도 정말 종류가 다양하네.\""
1300605-52 = "3;무츠키;03;아핫! 맞아! 게다가 폭탄의 종류는 단순히 효과만이 전부가 아니야, 선생님.\n#3;m3"
1300605-53 = "3;무츠키;99;그게 또 어떤 목적으로 사용하느냐, 혹은 또 작동 방식에 따라 그 종류가 천차만별이라서…….\n#3;em;…"
1300605-54 = "3;무츠키;03;어때, 폭탄의 세계란 것도 굉장하지? 심오하지?\n#3;em;[반짝]\n#3;hophop"
1300605-55 = "[s3] \"잘은 모르겠지만…….\"\n[s4] \"무츠키가 취미생활에 엄청 몰두하고 있다는 걸 잘 알겠어.\""
1300605-56 = "3;무츠키;10;쿠흐훗, 그래?"
1300605-57 = "3;무츠키;10;쿠흐훗, 그래?"
1300605-58 = "3;무츠키;11;흐흣~ 그럼 오늘은 선생님과 함께 오기도 했으니까. 어디 특별한 물건이 없을까~\n#3;em;[음표]"
1300605-59 = "3;무츠키;01;아, 선생님. 이거 어때? 반짝이 폭탄이래!\n#3;em;[!]\n#3;m4\n#3;hophop"
1300605-60 = "[s] \"반짝이 폭탄은 또 뭐야?\""
1300605-61 = "3;무츠키;03;그게 말이지~"

[translation]
1300605-1 = "The Imp's Hobby"
1300605-2 = "(I was patrolling the street as I normally do for Schale.)"
1300605-4 = "[ns] \"Hmm? Mutsuki?\""
1300605-8 = "(Before I could talk to her, Mutsuki trotted out of sight.)"
1300605-9 = "(Mutsuki disappeared in that direction...)"
1300605-10 = "[ns] \"Toward the Black Market?\""
1300605-12 = "[ns] \"...\""
1300605-14 = "[ns] \"...I should go after her.\""
1300605-18 = "[ns] \"Mutsuki!\""
1300605-19 = "Huh? Oh, it's just you, Sensei."
1300605-20 = "Weird to see you in a place like this. Do you have business at the Black Market?"
1300605-21 = "[s1] \"That's my line.\"\n[s2] \"What brings you here, Mutsuki?\""
1300605-22 = "Haha! I'm here because of that hobby I told you about on MomoTalk."
1300605-23 = "Haha! I'm here because of that hobby I told you about on MomoTalk."
1300605-24 = "[s] \"A hobby...?\""
1300605-25 = "Mm, it'll be easier to show you what's going on than tell you. Don't you agree, Sensei?"
1300605-28 = "Okay, Sensei. Let's go!"
1300605-29 = "[s] \"Huh? B-But...\""
1300605-31 = "[ns] \"...The Boom Shop, all the kabooms you could ever need?\""
1300605-33 = "[ns] \"This is your hobby...\""
1300605-34 = "Yeah. I collect explosives."
1300605-35 = "[s] \"E-Explosives? Why do you...\""
1300605-36 = "Keeheehee! Obviously, it's because..."
1300605-37 = "[s] \"Because what?\""
1300605-38 = "Because bombs make the best pranks!"
1300605-39 = "[s] \"Pranks...?\""
1300605-40 = "Yup yup! Check this bomb out, for example. It's a smoke bomb, right?"
1300605-41 = "When I pull the pin and throw it, I can blind everyone around for about a minute. "
1300605-42 = "Which means..."
1300605-43 = "[s] \"...Means what?\""
1300605-44 = "If I throw it somewhere like a plaza, I can prank everyone I want for a whole minute without anyone noticing!"
1300605-45 = "[s] \"...Yup.\""
1300605-46 = "Ahaha! I also have a flash grenade, for similar purposes. "
1300605-47 = "When the sun sets and this thing blows up, people will run around like chickens with their heads cut off! It's so fun!"
1300605-48 = "[s] \"Chickens, huh...\""
1300605-49 = "Oh yeah, there are also sticky bombs. Pretty neat, right?"
1300605-50 = "Besides those, there's also this...and that..."
1300605-51 = "[s] \"Bombs come in so many different shapes and sizes.\""
1300605-52 = "Hah, that's right! And it's not just what's inside the bombs that sets them apart, Sensei."
1300605-53 = "There are thousands of different kinds of bombs. No matter what you need, there's a bomb for that."
1300605-54 = "Do you understand now how amazing and deep the world of explosives is?"
1300605-55 = "[s3] \"I can't say that I fully get it...\"\n[s4] \"I can tell that you're really into your hobbies, Mutsuki.\""
1300605-56 = "Heeheehee, really?"
1300605-57 = "Heeheehee, really?"
1300605-58 = "I wonder if I can get the hookup since I have you with me today."
1300605-59 = "Hey, Sensei. How do you like this one? It's a glitter bomb!"
1300605-60 = "[s] \"What's a glitter bomb?\""
1300605-61 = "You really wanna know?"
1300605-67 = "(I had fun shopping with Mutsuki.)"
1300605-68 = "(Shopping for explosives, that is...)"

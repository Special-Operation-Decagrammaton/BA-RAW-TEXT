[translation]
1300605-1 = "งานอดิเรกของปีศาจน้อย"
1300605-2 = "(คุณครูกำลังเดินตรวจตราอยู่ที่ถนนตามปกติ)"
1300605-4 = "[ns] \"หืม? นั่นมุสึกินี่นา?\""
1300605-8 = "(ก่อนที่คุณครูจะได้เรียกมุสึกิ เธอก็เดินหายไปแล้ว)"
1300605-9 = "(ทิศทางที่มุสึกิเดินไปก็คือ...)"
1300605-10 = "[ns] \"ตลาดมืดงั้นเหรอ....?\""
1300605-12 = "[ns] \".........\""
1300605-14 = "[ns] \"...ตามไปแล้วกัน\""
1300605-18 = "[ns] \"มุสึกิ!\""
1300605-19 = "หืม? อะไรกัน คุณครูเองเหรอ~"
1300605-20 = "แปลกจังที่เห็นคุณครูในที่แบบนี้น่ะ คุณครูมีธุระที่ตลาดมืดเหมือนกันเหรอ?"
1300605-21 = "[s1] \"ครูควรจะต้องถามเธอมากกว่านะ\"\n[s2] \"แล้วมุสึกิมาทำอะไรที่นี่ล่ะ?\""
1300605-22 = "ฮ่าฮ่า! ฉันมาเพราะเรื่องงานอดิเรกของฉันน่ะ เหมือนที่บอกไปใน MOMOTALK ไงล่ะ"
1300605-23 = "ฮ่าฮ่า! ฉันมาเพราะเรื่องงานอดิเรกของฉันน่ะ เหมือนที่บอกไปใน MOMOTALK ไงล่ะ"
1300605-24 = "[s] \"งานอดิเรกเหรอ....?\""
1300605-25 = "อืม... ให้คุณครูดูเลยน่าจะง่ายกว่าอธิบายให้ฟังนะ เห็นด้วยมั้ย?"
1300605-28 = "เอาล่ะ คุณครู ไปกันเถอะ!"
1300605-29 = "[s] \"อ๊ะ? ดะ...เดี๋ยวสิ....\""
1300605-31 = "[ns] \"....<ร้านขายระเบิด จำหน่ายระเบิดทุกชนิดที่คุณต้องการ> งั้นเหรอ?\""
1300605-33 = "[ns] \"หรือว่างานอดิเรกของเธอก็คือ...\""
1300605-34 = "หืม? ฉันชอบสะสมระเบิดน่ะ~"
1300605-35 = "[s] \"ระ...ระเบิดเหรอ...ของแบบนั้น.....?\""
1300605-36 = "คิคิคิคิ... แน่นอนก็เพราะว่า..."
1300605-37 = "[s] \"เพราะอะไรเหรอ?\""
1300605-38 = "เพราะถ้าใช้ระเบิดก็จะไปแกล้งคนอื่นให้ตกใจเล่นได้ยังไงล่ะ!"
1300605-39 = "[s] \"แกล้งงั้นเหรอ...?\""
1300605-40 = "อื้อ อื้อ! คุณครูดูนะ นี่คือระเบิดควัน"
1300605-41 = "ถ้าดึงสลักตรงนี้ออกแล้วโยนไปกลางฝูงชนล่ะก็#nภายในหนึ่งนาที ทุกคนก็จะมองอะไรไม่เห็นเลยล่ะ"
1300605-42 = "นั่นก็หมายความว่า......."
1300605-43 = "[s] \"หมายความว่า...?\""
1300605-44 = "ถ้าฉันเอาระเบิดพวกนี้ไปโยนในที่สาธารณะ ฉันก็จะแกล้งทุกๆ คนได้ในภายในนาทีเดียวเลยไงล่ะ!"
1300605-45 = "[s] \"...อื้ม\""
1300605-46 = "อ่ะฮ่า ฉันยังมีระเบิดแสงเอาไว้แกล้งคนด้วยนะ"
1300605-47 = "พอพระอาทิตย์ตกดินและทุกอย่างมืดไปหมด ถ้าโยนระเบิดอันนี้ไปล่ะก็#nทุกคนจะต้องตกใจกันหมดแน่ๆ!"
1300605-48 = "[s] \"เอาไว้ทำให้คนตกใจสินะ...\""
1300605-49 = "อ่อ จริงสิ มีระเบิดเหนียวๆ ด้วยนะ ระเบิดอันนี้พิเศษมากๆ เลยล่ะรู้มั้ย?"
1300605-50 = "ยังมีระเบิดอีกหลายชนิดเลยนะ"
1300605-51 = "[s] \"ระเบิดมีหลายชนิดเหมือนกันนะเนี่ย\""
1300605-52 = "อ่ะฮ่า! ใช่แล้วล่ะ! อีกอย่างสิ่งที่แบ่งประเภทระเบิดน่ะ ไม่ใช่แค่วัสดุที่อยู่ข้างในหรอกนะ"
1300605-53 = "ทั้งเรื่องของวัตถุประสงค์ที่ใช้ หรือวิธีใช้ของระเบิดแต่ละชนิดก็แตกต่างกันด้วย..."
1300605-54 = "คุณครูคิดว่าโลกของระเบิดมันน่าทึ่งใช่มั้ยล่ะ? วิเศษเลยใช่ม้า?"
1300605-55 = "[s3] \"ไม่ค่อยเข้าใจเท่าไหร่แฮะ...\"\n[s4] \"ครูเข้าใจแล้วว่าเธอหลงใหลงานอดิเรกของตัวเองมาก...\""
1300605-56 = "คิคิคิ งั้นเหรอ?"
1300605-57 = "คิคิคิ งั้นเหรอ?"
1300605-58 = "ฮิฮิ~ ไหนๆ ฉันก็มาที่นี่กับคุณครูแล้ว... ไหนดูซิว่ามีระเบิดอะไรพิเศษๆ บ้าง~"
1300605-59 = "อ๊ะ คุณครู อันนี้เป็นไง? ระเบิดวิบวับล่ะ!"
1300605-60 = "[s] \"ระเบิดวิบวับคืออะไรน่ะ?\""
1300605-61 = "อยากรู้จริงๆ เหรอ~"
1300605-67 = "(หลังจากนั้นคุณครูกับมุสึกิก็เดินช้อปปิ้งกันอย่างสนุกสนาน)"
1300605-68 = "(แต่ว่าสิ่งที่พวกเขาเดินช้อปปิ้งกันก็คือระเบิด...)"

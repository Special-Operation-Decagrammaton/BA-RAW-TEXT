[translation]
84306100200-5 = "กลับมาแล้วเหรอ ยูริโซโนะ เซอา น่าเสียดายที่ต้องบอกว่า... เธอพูดถูกแล้วละ"
84306100200-6 = "ฉันได้ตรวจดูสิ่งของที่จัดแสดงในงานเอ็กซ์โป แล้วพบว่ามีของบางอย่างที่ไม่ควรทิ้งไว้ที่นั่น"
84306100200-11 = "คะ? มันเกี่ยวกับงานครั้งนี้หรือเปล่าคะ...?"
84306100200-12 = "ไม่หรอก โชคดีที่ไม่ใช่ มันเป็นสิ่งที่หากทิ้งไว้อย่างนั้นก็จะเกิดความโกลาหลตามมาได้"
84306100200-13 = "แต่ \"ความโกลาหลในมิลเลเนียม\" อาจมีทั้งขนาดและทิศทางที่แตกต่างจากที่เธอคิดก็ได้น่ะ"
84306100200-14 = "สำหรับนักเรียนจากโรงเรียนสามัญทรีนิตี้แล้ว... มันอาจเป็นเรื่องร้ายแรงเลยละ"
84306100200-15 = "มันคืออะไรกันคะ..."
84306100200-16 = "เอาเป็นว่าฉันเข้าใจแล้วค่ะ แต่ฟังจากที่พูดแล้ว ของสิ่งนี้คงเป็นอะไรที่ฉันเข้าไปยึดกลับมาอย่าง#nเปิดเผยไม่ได้"
84306100200-17 = "งั้นก็แปลว่าต้องแทรกซึมเข้าไป... สินะคะ"
84306100200-18 = "ของที่ฉันเป็นกังวลไม่ได้มีอย่างเดียวน่ะ ตอนนี้เนรุก็ออกไปเก็บของชิ้นอื่นมาอยู่เหมือนกัน"
84306100200-19 = "หืม...? งั้นครั้งนี้ฉันต้องเข้าไปคนเดียวงั้นเหรอคะ?"
84306100200-20 = "พอจะได้มั้ยล่ะ...?"
84306100200-21 = "ฉันต่างหากค่ะที่ควรถามแบบนั้น ฉันน่ะไหวอยู่แล้ว... แต่ว่าริโอะจะเชื่อใจให้ฉันไปทำเหรอคะ?"
84306100200-22 = "เรื่องนั้นไม่มีปัญหาหรอก ก็เธอได้การรับรองจากมิคาโมะ เนรุมาแล้วทั้งคน"
84306100200-23 = "เนรุบอกไว้ว่า \"ถ้ามีอุปกรณ์สนับสนุน งานแบบนั้นก็ไม่เกินกำลังเซอาหรอก\""
84306100200-24 = "และจากความสามารถที่เธอแสดงให้เห็นในปฏิบัติการนี้ ฉันเองก็ไม่ต้องพูดอะไรเพิ่มเติมแล้วละ"
84306100200-25 = "แบบนี้สินะคะ ฮุฮุ... รู้สึกเขินนิดหน่อยนะคะที่ได้รับความเชื่อใจที่มากมายขนาดนี้"
84306100200-26 = "แต่ก็ตัดสินใจได้ถูกต้องแล้วละค่ะ ภายในเวลาไม่กี่วัน แต่ก็รู้เกี่ยวกับตัวฉันเยอะขนาดนี้เลยเหรอคะ? ฉันต้องกลัวหัวหน้าของ C&C แล้วสินะคะเนี่ย"
84306100200-27 = "ถ้างั้นจะไปตอนไหนคะ? ตามที่ได้ฟังมา... ก็น่าจะเป็น... หลังสิ้นสุดงานเอ็กซ์โปเลยสินะคะ"
84306100200-28 = "เอาอุปกรณ์นี้ไปด้วย"
84306100200-29 = "รับไปสิ"
84306100200-34 = "นี่มัน...?"
84306100200-35 = "นี่คือเครื่องสแกนที่ฉันเตรียมไว้น่ะ ในงานมีของที่จัดแสดงไว้มากมาย ถ้าใช้เรื่องสแกนนี้ ก็จะรู้ได้อย่างแม่นยำว่าต้องเอาของอะไรกลับมา"
84306100200-36 = "เครื่องสแกนงั้นเหรอ..."
84306100200-40 = "ขอบคุณค่ะ แบบนี้ฉันก็ยิ่งอุ่นใจนะคะ"
84306100200-41 = "ฉันต่างหากล่ะที่ต้องพูดแบบนั้น..."
84306100200-42 = "งั้นก็ฝากด้วยนะ ยูริโซโนะ เซอา"

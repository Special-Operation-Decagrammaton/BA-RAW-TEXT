[translation]
84306100200-5 = "Hello, Yurizono Seia. Unfortunately...you were right."
84306100200-6 = "I looked into the submissions displayed at the Expo, and there are definitely items that shouldn't be here."
84306100200-11 = "The kind of items that would cause more incidents?"
84306100200-12 = "Not big ones, fortunately. Even if we left them as-is, they wouldn't cause much more than a small commotion."
84306100200-13 = "Then again, Millennium's definition of a \"small commotion\" might be different than yours."
84306100200-14 = "Trinity General School students, in particular, might find them a bit overwhelming."
84306100200-15 = "What are we talking about, exactly...?"
84306100200-16 = "Well, regardless, it doesn't sound like I can just walk up and confiscate them."
84306100200-17 = "So this will be a stealth mission?"
84306100200-18 = "Correct. As I said, there are multiple items. Neru's already left to recover some of them."
84306100200-19 = "Then I'll be collecting the rest?"
84306100200-20 = "Should you choose to accept that mission, yes."
84306100200-21 = "That was my next question. I'm happy to accept, but are you happy sending me?"
84306100200-22 = "Absolutely. You've been endorsed by none other than Mikamo Neru."
84306100200-23 = "I believe her exact words were, \"She can handle it, with the right equipment.\""
84306100200-24 = "And you've already proven your skills. I have no qualms about sending you at all."
84306100200-25 = "I see. Fufu... That's a flattering amount of trust you're giving me."
84306100200-26 = "Though it sounds like Neru gave me an accurate assessment. She read me quickly. No wonder she's C&C's leader. She is dangerously sharp."
84306100200-27 = "When should I depart, then? After the Expo closes for the day, I take it?"
84306100200-28 = "Yes, and as I said, you'll need the right equipment."
84306100200-29 = "...Here."
84306100200-34 = "What's this...?"
84306100200-35 = "You'll have a lot of ground to cover, so I made you a scanning device. It'll help you locate the target items."
84306100200-36 = "A scanning device..."
84306100200-40 = "That's reassuring. Thank you."
84306100200-41 = "...And that concludes the briefing."
84306100200-42 = "The rest is up to you, Yurizono Seia."

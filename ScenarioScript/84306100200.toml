84306100200-10 = "3;세이아;00\n#3;em;[?]\n#3;h\n#wait;800"
84306100200-11 = "3;세이아;04;네? ……설마 이번 일과 관련이 있는 건가요?"
84306100200-12 = "3;리오;99;아니. 다행히도 그건 아니야. 가만히 놔두어도 소동극 정도로 끝날 수 있는 문제들이긴 하지."
84306100200-13 = "3;리오;07;하지만 \"밀레니엄의 소동\"은, 네가 생각하는 것과 스케일이나 방향이 조금 다를 수 있거든.\n#3;stiff"
84306100200-14 = "3;리오;01;트리니티 종합학원의 학생들에게는…… 조금 과한 자극이 될 수 있어."
84306100200-15 = "3;세이아;04;대체 무엇이길래……\n#3;em;[땀]"
84306100200-16 = "3;세이아;99;아무튼 알겠습니다. 말씀을 들어 보니 당당하게 가서 압수할 수는 없겠군요."
84306100200-17 = "3;세이아;02;……라는 것은 잠입. 이겠네요."
84306100200-18 = "1;리오;01;이런 물품이 한 가지가 아니라서 말이야. 네루도 이미 다른 것을 회수하러 출발했어.\n#1;em;[반응]\n#1;ar\n#3;m5"
84306100200-19 = "3;세이아;04;음……? 그러면 저 혼자 잠입하는 것인가요?"
84306100200-20 = "1;리오;04;괜찮을까……?"
84306100200-21 = "3;세이아;01;오히려 제가 묻고 싶은 부분이네요. 저야 괜찮습니다만…… 저로 안심하실 수 있으실까요?\n#3;em;[?]"
84306100200-22 = "1;리오;01;그 부분은 문제없어. 다른 누구도 아닌, 미카모 네루의 보증이 붙었으니까."
84306100200-23 = "1;리오;99;\"몇 가지 장비의 지원만 있으면, 그 정도는 무리 없이 해낼 것\"……이라고 했어.\n#1;em;…"
84306100200-24 = "1;리오;03;게다가 이번 일에서 네가 보여준 실력. 나 또한 거기에 더는 토를 달 수 없다고 판단했거든."
84306100200-25 = "3;세이아;99;그렇군요. 후후…… 굉장한 신뢰라, 조금 쑥스럽네요."
84306100200-26 = "3;세이아;02;그리고 정확한 평가네요. 그 짧은 사이에 저에 대해서 너무 많이 아신 거 아닌가요? 조금은 무서운데요. 역시 C&C의 리더."
84306100200-27 = "3;세이아;02;그러면 언제 출발일까요? 이야기를 듣자 하니, 엑스포가 끝난…… 폐장 이후의 시간대가 되겠군요.\n#3;em;[반응]"
84306100200-28 = "1;리오;00;그리고 장비도 챙겨야 하지."
84306100200-29 = "1;리오;02;……이걸 받아."

84306100200-5 = "3;리오;06;잘 왔어, 유리조노 세이아. 유감스럽지만…… 네 말이 맞았네.\n#3;a\n#3;em;[한숨]"
84306100200-6 = "3;리오;01;엑스포에 전시된 물품들을 조사해 보았는데, 그대로 두면 안 될 것 같은 물건이 있었어."

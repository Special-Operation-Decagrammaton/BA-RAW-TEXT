[translation]
84306100200-5 = "來得正好，百合園聖亞。#n雖然遺憾……但你說的沒錯。"
84306100200-6 = "我在調查博覽會的展品之後，發現了某些不能置之不理的問題。"
84306100200-11 = "……難道跟這次的事件有關嗎？"
84306100200-12 = "不，所幸都只是小問題。#n即便真的放著不管，頂多也只會引發一些小騷動吧。"
84306100200-13 = "不過「千年的騷動」跟你預想的規模或方向……恐怕不太一樣。"
84306100200-14 = "對三一綜合學園的學生而言……可能會過於刺激。"
84306100200-15 = "究竟會怎樣呢……"
84306100200-16 = "總之我明白了。#n從你的說法聽起來，似乎也沒辦法理直氣壯地過去沒收那些東西。"
84306100200-17 = "……所以必須潛入對吧。"
84306100200-18 = "這樣的展品不只一個，因此寧瑠也已經出發進行回收了。"
84306100200-19 = "嗯……？意思是我得一個人潛入嗎？"
84306100200-20 = "可以嗎……？"
84306100200-21 = "這反而是我想問你的問題。#n我當然樂意幫忙……不過你放心派我一個人去嗎？"
84306100200-22 = "這點我並不擔心。#n畢竟為你掛保證的不是別人，而是美甘寧瑠。"
84306100200-23 = "「只要給他幾種裝備支援，這點小事根本難不倒他」……他是這麼說的。"
84306100200-24 = "我對你在本次事件中展現的實力也十分認可。"
84306100200-25 = "這樣啊。呵呵……受到這種程度的信賴，讓人有點受寵若驚呢。"
84306100200-26 = "居然能在這麼短的期間內對我如此了解，並給出準確的評價……#n不愧是C&C的隊長，實在不容小覷。"
84306100200-27 = "那我什麼時候出發呢？#n根據你剛才的說法……應該是在博覽會閉館之後吧。"
84306100200-28 = "記得要把裝備帶上。"
84306100200-29 = "……收下這個吧。"
84306100200-34 = "這個是……？"
84306100200-35 = "畢竟現場展品的數量相當多……#n這是我為了辨別回收對象另外準備的掃描器。"
84306100200-36 = "掃描器……"
84306100200-40 = "謝謝。真是可靠。"
84306100200-41 = "……那是我要說的話。"
84306100200-42 = "那就麻煩你了，百合園聖亞。"

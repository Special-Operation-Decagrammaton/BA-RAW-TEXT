[translation]
1006406-1 = "How to Reduce Stress"
1006406-2 = "...I've been constantly running around to help resolve cases popping up all over Kivotos since the new year."
1006406-4 = "Sensei, if I were to be in a rally during a game of Hanetsuki, would hitting a backhand smash be considered breaking the rules...?"
1006406-5 = "I usually hold my racket with a shakehand grip, and when I hit a smash like how you would in ping pong, my friend was furious..."
1006406-6 = "[s1] \"Now that's a tough question to answer...\"\n[s2] \"For now, why don't we ponder about it together...\""
1006406-10 = "I found myself entangled in consultations that were difficult to resolve, and even unexpected disputes..."
1006406-12 = "What are you? What gives you the right to meddle in someone else's affairs?"
1006406-13 = "What does it matter how much I pay my part-time student monthly?"
1006406-14 = "Eh? Schale's Sensei...?"
1006406-15 = "Who cares? Whether you're Schale's Sensei or the General Student Council President, if you're going around disrupting my business..."
1006406-16 = "Something horrible will happen to you!"
1006406-17 = "[s] \"C-Calm down and let's first talk...\""
1006406-19 = "By the end of the day, I was completely exhausted..."
1006406-22 = "...Oh, Sensei?"
1006406-23 = "Fancy running into you here. Everything all right?"
1006406-27 = "...Actually, you don't look all right. Is there something going on?"
1006406-28 = "[s3] \"I'm exhausted, Kayoko.\" \n[s4] \"I had a lot going on, especially today...\""
1006406-29 = "...Hmm, that's a big problem."
1006406-30 = "...Hmm, that's a big problem."
1006406-31 = "You've been going through so much as Schale's Sensei. I'm sorry I could only provide you with comforting words."
1006406-32 = "[s] \"Your comforting words are more than enough...thank you.\""
1006406-34 = "[ns] \"That being said, where were you headed Kayoko?\""
1006406-35 = "Oh, I was going to a concert nearby that was featuring a band I like."
1006406-36 = "Have you heard of the Wagakki Club before?"
1006406-37 = "They're a band that plays modern pop music with traditional instruments such as a shamisen, drum, or koto..."
1006406-38 = "Modern pop music performed with traditional instruments seemed really unique, so I've been watching them often."
1006406-39 = "[s5] \"Modern pop played by traditional instruments you say...\"\n[s6] \"Seems like it can feel rejuvenating.\""
1006406-40 = "Yup, the unique tones of wagakki help me de-stress..."
1006406-41 = "Yup, the unique tones of wagakki help me de-stress..."
1006406-42 = "Hey, so if you don't mind, would you like to come to the concert with me?"
1006406-43 = "Other Problem Solver members have other things going on...and I happened to have a spare ticket."
1006406-44 = "[s7] \"Yeah, sure!\"\n[s8] \"I needed some rejuvenation today anyway.\""
1006406-45 = "Heehee, that's great."
1006406-46 = "Heehee, that's great."
1006406-47 = "Then follow me this way, the auditorium is just up ahead."
1006406-50 = "Afterwards, I followed Kayoko and arrived at the wagakki auditorium, but..."
1006406-51 = "I realized Kayoko's take on \"rejuvenation\" had a different meaning than I had thought..."
1006406-53 = "Kivotos, shrouded in darkness— Feel the pitiful death—"
1006406-54 = "This is the destroyer of destruction! It's The End to end this world—!"
1006406-60 = "After the concert..."
1006406-62 = "Wow, that was such a fun concert..."
1006406-63 = "Especially the last bit, when the shamisen player bit into the strings with her teeth and hit the taiko with her head, it was really thrilling."
1006406-64 = "[s] \"R-Right...\""
1006406-65 = "Hmm..."
1006406-66 = "Was the concert a bit too aggressive for you, Sensei?"
1006406-67 = "You appear to be more exhausted after watching the show...I feel bad."
1006406-68 = "[s9] \"Oh it's not that...\"\n[s10] \"It was just me cheering along with the tension of the rock music that's gotten me tired...\""
1006406-71 = "[ns] \"But I do feel that my stress has gone away, just like you said Kayoko!\""
1006406-73 = "...Thank you for saying it like that."
1006406-74 = "But it's true that you seem exhausted, so I think it's best that you call it a night and head back to Schale to rest."
1006406-75 = "...Thank you for hanging around with me today too, Sensei."
1006406-76 = "Next time, let's go watch another concert when you're feeling better. It'll definitely be more fun."

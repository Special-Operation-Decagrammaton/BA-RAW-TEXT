[translation]
1006406-1 = "消除壓力的方法"
1006406-2 = "（……即使到了新年，奇普托斯各地依然發生了事件，讓人閒不下來）"
1006406-4 = "老師，打板羽球的時候扣殺算犯規嗎……？"
1006406-5 = "我用打桌球的感覺來回擊，結果惹朋友生氣了……"
1006406-6 = "[s1]「真是困難的問題……」\n[s2]「一起思考一下吧……」"
1006406-10 = "（在難以判斷的諮詢後，又發生了意料之外的紛爭……）"
1006406-12 = "你又是哪位？哪來的勇氣對別人的事指指點點的，啊啊？"
1006406-13 = "學生的打工費高不高都跟你無關吧？"
1006406-14 = "什麼？是夏萊的老師……？"
1006406-15 = "那又怎樣！管你是夏萊還是聯邦學生會，敢妨礙我……"
1006406-16 = "就給你好看！"
1006406-17 = "[s]「冷，冷靜一點，先好好談談……」"
1006406-19 = "（等工作結束的時候，已經完全累癱了……）"
1006406-22 = "……咦，老師？"
1006406-23 = "居然會在這種地方見到你。"
1006406-27 = "你還……看起來不太好呢。#n最近有什麼特別累的事嗎？"
1006406-28 = "[s3]「嗨，佳世子……」\n[s4]「今天發生了很多累人的事……」"
1006406-29 = "唔嗯……怎麼說呢，辛苦你了。"
1006406-30 = "唔嗯……怎麼說呢，辛苦你了。"
1006406-31 = "我只能說這種話，真是抱歉。"
1006406-32 = "[s]「這樣就夠了，謝謝。」"
1006406-34 = "[ns]「話說回來，佳世子正要去哪裡嗎？」"
1006406-35 = "嗯，我喜歡的樂團在附近開演唱會。"
1006406-36 = "叫「和樂器俱樂部」，你有聽說過嗎？"
1006406-37 = "是個用太鼓、三味線、箏等等和樂器演奏現代流行音樂的樂團。"
1006406-38 = "和樂器獨特的詮釋方式很有趣，所以我常常去聽。"
1006406-39 = "[s5]「用和樂器演奏現代流行樂……」\n[s6]「好像很療癒呢。」"
1006406-40 = "就是說啊。和樂器特有的音色能讓壓力一掃而空。"
1006406-41 = "就是說啊。和樂器特有的音色能讓壓力一掃而空。"
1006406-42 = "不介意的話，老師要不要一起去？"
1006406-43 = "便利屋的大家好像都有事，所以票還有剩。"
1006406-44 = "[s7]「嗯，想去！」\n[s8]「今天工作很累，這樣正好！」"
1006406-45 = "呵呵，太好了。"
1006406-46 = "呵呵，太好了。"
1006406-47 = "那跟我來吧。會場離這裡很近。"
1006406-50 = "（之後，在佳世子的帶領下抵達了會場……）"
1006406-51 = "（然而佳世子所謂的「療癒」跟想像中完全不一樣……）"
1006406-53 = "黑暗的Dark籠罩Kivotos！#n感受死亡的Death──！！"
1006406-54 = "這就是破壞的Destroy！#n終結這個世界的Ending──！！"
1006406-60 = "（演唱會結束後──）"
1006406-62 = "啊……表演真是太棒了。"
1006406-63 = "尤其是三味線的演奏者在最後一首歌用牙齒撥弦，用頭打太鼓的演出，#n簡直讓人頭皮發麻。"
1006406-64 = "[s]「呃，嗯……」"
1006406-65 = "難道……"
1006406-66 = "對老師來說是不是太刺激了？"
1006406-67 = "你看起來比表演之前更累……抱歉。"
1006406-68 = "[s9]「不會，不如說……」\n[s10]「因為太高興，一不小心就興奮了起來……」"
1006406-71 = "[ns]「就跟佳世子說的一樣，壓力一掃而空了唷！」"
1006406-73 = "……你能這麼說我很開心。"
1006406-74 = "不過你很累了也是事實，趕快回夏萊休息吧。"
1006406-75 = "……今天也謝謝你陪我，老師。"
1006406-76 = "下次就在有精神的時候來吧。#n一定會更開心的。"

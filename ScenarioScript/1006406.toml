[translation]
1006406-1 = "วิธีคลายเครียด"
1006406-2 = "(คุณครูตามคลี่คลายสถานการณ์ต่างๆ ในคิโวทอสตั้งแต่ปีใหม่จนเหน็ดเหนื่อย...)"
1006406-4 = "คุณครู... การใช้ท่าแฮนด์แบ็กตบลูกขนไก่ตอนเล่นฮาเนะสึกิ มันไม่ถือว่าผิดกฎเหรอคะ...?"
1006406-5 = "ปกติเห็นใช้ท่าเช็กแฮนด์แบบกำด้ามแล้วตบแรงๆ เหมือนปิงปอง แต่เพื่อนน่าจะหัวร้อนไปหน่อยค่ะ..."
1006406-6 = "[s1] \"เป็นคำถามที่ตอบยากแฮะ...\"\n[s2] \"เรามาช่วยกันวิเคราะห์ก่อนดีกว่านะ...\""
1006406-10 = "(คุณครูมัวแต่ยุ่งเรื่องปรึกษาปัญหายุ่งยากและข้อถกเถียงต่างๆ...)"
1006406-12 = "คุณเป็นใครน่ะ? มีสิทธิ์อะไรมาก้าวก่ายเรื่องของคนอื่นไม่ทราบ?"
1006406-13 = "ฉันจะให้ค่าแรงเด็กพาร์ทไทม์เท่าไรแล้วคุณมาเกี่ยวอะไรด้วย?"
1006406-14 = "อะไรนะ? คุณครูของชาเล่ต์เหรอ...?"
1006406-15 = "แล้วยังไง จะเป็นครูของชาเล่ต์หรือประธานองค์การนักเรียนก็ไม่ควรมาขวางธุรกิจของฉัน...."
1006406-16 = "เดี๋ยวได้เจอดีแน่!"
1006406-17 = "[s] \"จะ... ใจเย็นๆ แล้วฟังกันก่อน...\""
1006406-19 = "(พอเสร็จงานคุณครูก็เหนื่อยจนสายตัวแทบขาด...)"
1006406-22 = "เอ๋... ครู?"
1006406-23 = "ไม่คิดเลยว่าจะมาเจอกันในที่แบบนี้ บังเอิญมากเลย ครูสบายดี..."
1006406-27 = "...หรือเปล่านี่ไม่แน่ใจเลยแฮะ มีเรื่องลำบากอะไรหรือเปล่าน่ะ?"
1006406-28 = "[s3] \"ว่าไง คาโยโกะ...\"\n[s4] \"วันนี้มีเรื่องให้เหนื่อยกว่าปกติน่ะ...\""
1006406-29 = "อืม... ดูจะเป็นเรื่องใหญ่อยู่นะ"
1006406-30 = "อืม... ดูจะเป็นเรื่องใหญ่อยู่นะ"
1006406-31 = "คุณครูของชาเล่ต์เองทำงานหนักเหมือนกันนะ ขอโทษด้วยที่ฉันทำได้แค่ปลอบใจ"
1006406-32 = "[s] \"แค่คำปลอบใจก็เพียงพอแล้วละ… ขอบใจนะ\""
1006406-34 = "[ns] \"ว่าแต่คาโยโกะจะไปไหนเหรอ?\""
1006406-35 = "อ่า พอดีว่าวงดนตรีที่ฉันชอบมาทำการแสดงแถวนี้น่ะ"
1006406-36 = "เคยได้ยินชื่อ <วะงักคิคลับ> มั้ย?"
1006406-37 = "พวกเขาเล่นดนตรีพื้นบ้านอย่างซามิเซ็ง กลอง และก็โกโตะในเวอร์ชันเพลงป๊อบร่วมสมัย..."
1006406-38 = "การนำเครื่องดนตรีพื้นบ้านมาบรรเลงในเวอร์ชันเพลงป๊อบร่วมสมัยมันมีเอกลักษณ์มากเลยนะ ฉันเลยชอบมาดูบ่อยๆ น่ะ"
1006406-39 = "[s5] \"เพลงป๊อบร่วมสมัยที่บรรเลงด้วยเครื่องดนตรีพื้นบ้านงั้นเหรอ...\"\n[s6] \"เหมือนจะทำให้ฮีลใจได้เลยแฮะ\""
1006406-40 = "อื้ม เสียงที่มีเอกลักษณ์ของเครื่องดนตรีพื้นบ้านจะช่วยคลายความเครียดของเราน่ะ..."
1006406-41 = "อื้ม เสียงที่มีเอกลักษณ์ของเครื่องดนตรีพื้นบ้านจะช่วยคลายความเครียดของเราน่ะ..."
1006406-42 = "ถ้าไม่ติดอะไร ครูอยากไปดูด้วยกันมั้ยล่ะ?"
1006406-43 = "สมาชิกหน่วยรับจ้างสารพัดคนอื่นๆ ก็บอกว่าติดงานกันด้วย... ฉันมีตั๋วเหลือพอดี"
1006406-44 = "[s7] \"ได้เลย จัดไป!\"\n[s8] \"วันนี้ครูอยากฮีลใจตัวเองพอดีเลย\""
1006406-45 = "ฮุฮุ... โชคดีจัง"
1006406-46 = "ฮุฮุ... โชคดีจัง"
1006406-47 = "งั้นตามมาทางนี้เลย คอนเสิร์ตอยู่ตรงหน้านี้แล้ว"
1006406-50 = "(คาโยโกะพาคุณครูมาถึงงานคอนเสิร์ตแล้ว แต่ว่า...)"
1006406-51 = "(คำว่า \"ฮีลใจ\" ที่คาโยโกะบอก มันดูต่างออกไปจากที่คิดเอาไว้นิดหน่อย...)"
1006406-53 = "คิโวทอสที่ถูกปกคลุมด้วยความดาร์ก— สัมผัสเดธแห่งความตาย—"
1006406-54 = "นี่คือเดสทรอยแห่งการทำลาย! ดิเอนด์เพื่อจบโลกใบนี้—!"
1006406-60 = "(หลังจบคอนเสิร์ต...)"
1006406-62 = "อ่า ช่างเป็นคอนเสิร์ตที่สนุกจริงๆ..."
1006406-63 = "โดยเฉพาะช่วงสุดท้าย พวกเขาเอาฟันหน้ากัดสายซามิเซ็งแล้วเอาหัวโขกกลองไทโกะด้วย สัมผัสได้ถึงความเกรี้ยวกราดสะท้านโลกเลยละ"
1006406-64 = "[s] \"อื้ม...\""
1006406-65 = "อื้ม..."
1006406-66 = "มันออกจะดูรุนแรงเกินไปสำหรับครูหรือเปล่านะ?"
1006406-67 = "มิน่าดูจบแล้วครูดูเหนื่อยกว่าเดิมอีก... รู้สึกผิดยังไงไม่รู้แฮะ"
1006406-68 = "[s9] \"ไม่ใช่อย่างนั้นนะ...\"\n[s10] \"พอดีว้ากให้เข้ากับเพลงร็อกแล้วมันเหนื่อยน่ะ...\""
1006406-71 = "[ns] \"แต่มันช่วยคลายเครียดอย่างที่คาโยโกะบอกเลยนะ!\""
1006406-73 = "ดีใจที่ได้ยินแบบนั้นนะ..."
1006406-74 = "แต่ครูก็ดูเหนื่อยๆ จนจะกลายเป็นผักต้มไปจริงๆ แล้วเลย วันนี้กลับไปพักผ่อนที่ชาเล่ต์กันก่อนดีกว่า"
1006406-75 = "วันนี้ก็ขอบคุณนะที่ครูอยู่ด้วยกัน..."
1006406-76 = "คราวหน้ามาดูคอนเสิร์ตด้วยกันในสภาพที่โอเคกว่านี้ดีกว่าเนอะ แบบนั้นต้องสนุกมากแน่เลย"

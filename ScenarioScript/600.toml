[translation]
600-1 = "綜合戰術考試"
600-2 = "奇普托斯．綜合戰術考試會場"
600-3 = "哎呀……這個日子，終於還是來了呢。"
600-4 = "嗯？你問是什麼日子……？（喀滋）"
600-5 = "你沒聽過嗎？是「綜合戰術考試」的日子唷。"
600-6 = "是奇普托斯的學生，基本上都必須定期參加的考試。"
600-7 = "雖然抱歉，但就算是在夏萊當值日生的學生們也不例外。（喀滋）"
600-8 = "不過機會難得，就幫他們加油一下吧。畢竟你是老師嘛。"
600-9 = "那我就先回去啦。這種麻煩的事我也不想做。（喀滋）"
600-10 = "就是這樣，之後就交給你囉～"

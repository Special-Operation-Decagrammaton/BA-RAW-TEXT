[translation]
600-1 = "#title;종합전술시험"
600-2 = "#place;키보토스 전술 시험장"
600-3 = "3;모모카;20;이야, 결국 피할 수 없는 운명의 날이 왔구만, 선생. \n#3;em;[재잘]\n#3;a"
600-4 = "3;모모카;01;(와작) 응? 무슨 날이냐고?"
600-5 = "3;모모카;11;그야, 당연히 시험날이지. 학원 도시에서 그거 말고 운명의 날이 뭐가 있겠어?"
600-6 = "3;모모카;14;키보토스의 학생이라면 정기적으로 열리는 전술시험을 치러서 테스트를 받아야만 해. "
600-7 = "3;모모카;07;뭐, 그 유명한 <샬레>도 예외일 수는 없다는 거지. (와작)"
600-8 = "3;모모카;39;그동안 갈고 닦은 선생님으로서의 능력을 증명할 수 있는 기회니까, 담당 학생들이 시험을 잘 치를 수 있도록 응원해 주라고.\n#3;em;[반응]"
600-9 = "3;모모카;17;그럼 수고해. 선생. 난 여기 있기만 해도 기분이 나빠지니까. (와작)\n#3;greeting"
600-10 = "3;모모카;03;이만 돌아가볼게. \n#3;em;[음표]"

[translation]
600-1 = "สอบประมวล"
600-2 = "สนามสอบประมวล คิโวทอส"
600-3 = "เฮ้อ~ สุดท้ายวันแห่งโชคชะตาที่หนีไม่พ้นก็มาถึงแล้วสินะ ครู "
600-4 = "(ง่ำๆ) หืม? วันอะไรน่ะเหรอ?"
600-5 = "แน่นอนอยู่แล้วนี่ วันสอบยังไงล่ะ ในเมืองแห่งการศึกษาแบบนี้ วันแห่งโชคชะตาจะเป็นวันอะไรได้อีกล่ะ?"
600-6 = "ถ้าเป็นนักเรียนในคิโวทอสละก็ต้องเข้าทดสอบประมวลกลยุทธ์ตามระยะเวลาที่กำหนดอยู่แล้ว "
600-7 = "<ชาเล่ต์> ที่มีชื่อเสียงโด่งดังเองก็ไม่มีข้อยกเว้นหรอกนะ (ง่ำๆ)"
600-8 = "นี่เป็นโอกาสที่จะพิสูจน์ความสามารถที่สั่งสมมาในฐานะคุณครูแล้วนะ เพราะงั้นก็ไปให้กำลังใจเด็กนักเรียนที่ดูแลอยู่ให้สอบผ่านไปได้ด้วยดีด้วยล่ะ"
600-9 = "พยายามเข้าล่ะ ครู ส่วนฉันน่ะ แค่มาที่นี่ก็รู้สึกไม่ดีแล้ว (ง่ำๆ)"
600-10 = "เพราะงั้นฉันกลับก่อนนะ "

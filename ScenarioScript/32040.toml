[translation]
32040-1 = "第4話;水着パーティー"
32040-3 = "あうぅ……結構降ってますね……。"
32040-4 = "そうですねぇ。"
32040-5 = "んぅ……。"
32040-6 = "あら、おはようございますコハルちゃん。"
32040-7 = "おはようございます。アズサちゃんは……まだちょっと起きられなさそうですね。"
32040-8 = "んっ……んん……。"
32040-9 = "どうしたの、アズサ結構早起きだったのに……。"
32040-10 = "今までは、無理をしていたんじゃないでしょうか？少し寝かせておいてあげたいですね……。"
32040-11 = "んんっ……ダメ、かわいいものが……ふわふわで……それは、よくない……"
32040-12 = "それに、何だか良い夢を見ているようですし♡"
32040-13 = "[s] \"雨が降ってるからってこともあるのかもね。\""
32040-19 = "あ、あうぅ……なんだか雷まで……。"
32040-20 = "……あら。"
32040-21 = "どうしたの？"
32040-22 = "忘れてました、洗濯物が外に……！"
32040-27 = "ま、まずいですっ……！？"
32040-32 = "……？"
32040-42 = "（それから、約1時間後……。）"
32040-49 = "さあでは記念すべき第1回、補習授業部の水着パーティーを始めます♡"
32040-50 = "あうぅ……。"
32040-51 = "……。"
32040-52 = "なんで、どうしてこんなことに……。"
32040-58 = "[ns] \"色々とすごい状況だ……。\""
32040-59 = "うふふっ、仕方ないじゃないですか♡"
32040-61 = "（少し遡って、40分ほど前……。）"
32040-63 = "多分これで全部だ。"
32040-64 = "これは……見事に全滅ですね。泥も跳ねちゃってますし、洗い直しが必要そうです。"
32040-65 = "体操着もすごいことに……うぅっ、中まで全部びちゃびちゃ……！"
32040-66 = "それはコハルが途中で転んだからだ。"
32040-67 = "ごめんなさい、つい失念していて……私がみんな一緒にと言い出したせいです。"
32040-68 = "いや、ハナコのせいじゃない。洗濯はもう一度すれば良いし、服は着替えれば良い。そんなに気に病むことでもない。"
32040-69 = "はい、そうですよ。濡れた服のままですと風邪を引いてしまいますし、まずは早く着替えてしまいましょう。"
32040-70 = "……ありがとうございます。そうですね、髪も乾かさないと。"
32040-74 = "……あ。"
32040-75 = "コハルちゃん？どうかしましたか？"
32040-76 = "……もう、着るものが無い。"
32040-77 = "……え？"
32040-78 = "そういえば私もそうだ。制服もこの体操着もびしょ濡れで、他に予備の服は無い。"
32040-79 = "そ、そういえば私も、あぅぅ……。"
32040-80 = "……あらあら♡まあ、下着姿で勉強というのもすごくアリだと思いますよ？"
32040-81 = "何言ってるの！？バカ！そんなハレンチなのダメっ！どうしてそういう方向になるの！？"
32040-82 = "でも話は分かる。下着は多めに用意してあるし、靴下も履いておけば体温の維持も問題なさそうだ。"
32040-83 = "変に同調しないで！？教室で下着なんてやばいでしょ！？"
32040-84 = "ですがコハルちゃん、想像してみてください――"
32040-86 = "もうあんたは黙っててっ！！"
32040-90 = "手早く洗濯して、ドライヤーでも使ってすぐ乾かせば良いでしょ！"
32040-91 = "その間は、バスタオルとか巻いておけば良いし！何かあっても先生にやってもらえば良いじゃん！"
32040-92 = "それに、この状況で急いで勉強のこと考える必要も無いでしょ！なんでそんな急に勉強したがりなの！？"
32040-94 = "そうだとしても、その間はどちらにせよ下着姿なのでは？"
32040-95 = "早く勉強したいのだけど、洗濯が終わるまでは教室には行けないなら仕方ない。とりあえず脱ごう。"
32040-96 = "あうぅ、仕方ありませんね……とにかく脱ぐしか……。"
32040-98 = "何でみんなそんなに脱ぎたがるの！？露出は犯罪なんだよっ！？"
32040-100 = "先生の部屋"
32040-101 = "（洗濯が終わるまで、とりあえず部屋にいることにした。）"
32040-106 = "えっ！？な、なにっ！？"
32040-107 = "て、停電みたいですね……？"
32040-108 = "落雷による停電、でしょうか？"
32040-112 = "え。い、今のは何の音ですか……！？"
32040-113 = "……問題が発生した。"
32040-114 = "洗濯機が止まってる、それに蓋も開かない。困った。"
32040-115 = "……！？"
32040-119 = "[ns] \"まあ、仕方ないような気もする……。\""
32040-120 = "そうですよ。こうとなっては、パジャマパーティーならぬ水着パーティーくらいしかすることはありません♡"
32040-121 = "あうぅ……な、何か他にもありそうな気はしますが……。"
32040-122 = "なるほど、下着パーティーとかもありそうですね♡確かによく考えると他にも幾つかあると思いますが、それで本当に良いんですか……？ふふっ。"
32040-123 = "こうなると授業もやりにくいし……こんな落雷くらいで全部の建物が機能不全だなんて、ひどいセキュリティだ。"
32040-124 = "まあ、古い建物ですし……。"
32040-125 = "っていうか待って！流されないわよ！？水着パーティーって何なの！卑猥！！"
32040-126 = "授業もできないし着る服も無いところまでは同意だけど、だったらおとなしく部屋で休めばいいでしょ！普通に考えて！"
32040-127 = "あら、ですがこういう時間こそ合宿の花だと思いませんか？"
32040-128 = "みんな寄り添って、お互いの深い部分をさらけ出し合う……雨も降っている上に停電で何も見えませんし、雰囲気は最高です！"
32040-133 = "うふふふ……♡せっかくの休み時間なんですし、そうやって有意義に過ごしません？"
32040-134 = "あはは……た、確かに合宿の定番という感じはしますね。"
32040-135 = "なるほど、それがこの水着パーティーと。"
32040-136 = "いやいやいや納得するか！水着とかけ合わせる意味は！？"
32040-137 = "あうぅ、確かに……。"
32040-138 = "まあまあ、せっかくなんですし楽しむとしましょう。"
32040-139 = "そうは言ってもただのおしゃべりですし、話題も何でもアリということで♡"
32040-140 = "ふふっ♡私こういうこと、すっごくしてみたかったんですよね。なので、ちょっとテンションが上がっていると言いますか……。"
32040-141 = "[s] \"ハナコ、本当に楽しそうだね。\""
32040-142 = "気持ちは分かる。私も何なら、補習授業部に入って以来ずっとそういう気持ちだ。"
32040-143 = "あら、そうなんですか？"
32040-144 = "うん。何かを学ぶということも、みんなでご飯を食べることも、洗濯も掃除も、その一つ一つが楽しい。"
32040-145 = "あら……♡"
32040-146 = "水着は泳ぐ時にだけ着るものだと思っていたのに、こんな活用方法があるなんてことも初めて知った。知らなかったことを知れるというのは、楽しいことだ。"
32040-147 = "み、水着の件はちょっと違う気もしますが……。"
32040-148 = "でも、動きやすいし通気性も良い。ハナコがこれを着て学校を歩いてたというのも納得がいく。"
32040-149 = "そうですよね、だから言ったじゃないですかコハルちゃん。"
32040-150 = "いやそれで外を歩くのは犯罪だから！納得しちゃダメ！公然淫猥罪だよ！？"
32040-151 = "コハルと一緒に勉強するのも楽しい。"
32040-152 = "っ！？きゅ、急になに！？何でそんな急に恥ずかしいことを！？"
32040-153 = "あらあら……♡"
32040-154 = "ま、まあ、私みたいなエリートと一緒に勉強して、タメになることは多いと思うけど？"
32040-155 = "うん、本当にそうだ。"
32040-160 = "アズサちゃん……最初はあまり表情の変化も読み取れなくて心配でしたが……良かったですっ。"
32040-164 = "もちろんヒフミもだ。本当にいつも世話になってる、ありがとう。"
32040-168 = "あ、アズサちゃんっ！！うわーん！！"
32040-173 = "（ぎゅっ）"
32040-174 = "ひ、ヒフミ、少し息苦しい。"
32040-176 = "（そうして、補習授業部一同は話に花を咲かせ……。）"
32040-178 = "そういえば今トリニティのアクアリウムで、「ゴールドマグロ」という希少なお魚が展示されているらしいですね。"
32040-179 = "あ、私もそれパンフレットで見ました！「幻の魚」と呼ばれているんですよね？"
32040-180 = "はい、どうやら近くの海で発見されたとか。見に行きたいのですが、入場料も安くないので……。"
32040-181 = "海、か……そういえば一度も行ったことないな。"
32040-182 = "そ、そうなんですか！？一回も……！？"
32040-184 = "それで、とっくに潰れたアミューズメントパークなのにも関わらず、夜になると何やら騒がしい音が聞こえてきて……。"
32040-185 = "そ、そんなわけないじゃん！聞き間違えよ！"
32040-186 = "まあ、私もそういう噂として聞いただけですが……。"
32040-187 = "いやだっ！絶対嘘！全部誰かの悪ふざけ！"
32040-188 = "あ、あはは……。"
32040-190 = "水着で街や学園の中を歩くのは別に、そこまで変なことじゃないですよ？"
32040-191 = "そんなわけないでしょ！？勝手に常識改変しないでっ！"
32040-192 = "ですが、これは私がシスターたちから聞いた話ですが……どうやらキヴォトスどこかの無法地帯では、水着姿で覆面を被っている犯罪集団があるらしいですよ？"
32040-193 = "み、水着に覆面……！？ド変態じゃん！？なにそれ！？"
32040-194 = "っていうか「犯罪者集団」なんじゃん！そんなの何もしてなくたって、見た目からしてすでに犯罪よ！"
32040-195 = "そういう集団があるくらい、他の地域では普通なんですよ。ですからコハルちゃんも今度一緒に――"
32040-196 = "いやっ！何言いだすか分からないけどとりあえず嫌っ！！"
32040-201 = "………………。"
32040-203 = "アズサちゃんはもっと、夜はきちんと眠った方が良いと思いますよ？"
32040-204 = "……うん。今朝は寝坊して迷惑をかけてしまった。"
32040-205 = "慣れない場所で寝坊なんて、これまでほとんど無かったのに……。"
32040-206 = "……もうここは、「慣れない場所」じゃないからかもしれないな。"
32040-207 = "……とにかく、もっとしっかり寝た方が良いです。深夜の見張りは減らしていただいて。"
32040-208 = "見張り……？なにそれ？"
32040-209 = "ああ、毎晩夜中にちょっと見張りを……。"
32040-210 = "[s] \"ハナコ、アズサのことすごく心配してたよ。\""
32040-211 = "そうなのか……？"
32040-212 = "……ごめん。"
32040-216 = "実は、見張りは言い訳で……ブービートラップとかを設置していたんだ。"
32040-218 = "ブービートラップ……？"
32040-219 = "……？"
32040-220 = "どうしてそんなことを……？"
32040-222 = "心配しないで、ここに悪意を持って侵入しようとするルートにだけ設置してるから。普通の生活をする上では、安全面に問題は無い。"
32040-223 = "（昨日のマリーさんのことを考えると、そうでもない気がしますが……）"
32040-224 = "なるほど……ですが、それならそれで教えてくれると嬉しいです。どうしても、心配しちゃいますから。"
32040-225 = "……そうか。うん、これからは気を付ける。"
32040-226 = "私のせいで、先生とみんなが被害を受けるのは望むところじゃないから。"
32040-227 = "[s] \"アズサは優しいね。\""
32040-228 = "なっ……こ、子ども扱いしないで、先生。"
32040-229 = "私は別に……そんなのじゃない。"
32040-230 = "だってこの世界は、全てが無意味で、虚しいものだ。だから、もしかしたら……。"
32040-231 = "私はいつか裏切ってしまうかもしれない……みんなのことを、その信頼を、その心を。"
32040-235 = "……。"
32040-236 = "アズサちゃん……？"
32040-237 = "……？"
32040-241 = "あ、電気が……。"
32040-242 = "直ったみたいですね。"
32040-243 = "あ、雨もいつの間に……！"
32040-244 = "そうですね。では、もう一度あらためて洗濯しましょうか。"
32040-248 = "うん。じゃあ、第1回水着パーティーはここで閉幕か。2回目も楽しみにしてる。"
32040-249 = "二回戦とか無いから！こんなの最初で最後だからっ！"
32040-251 = "（洗濯を終わらせて、今日の残り時間は休息をとることにした。）"
32040-252 = "（そうやって一日が過ぎ……）"
32040-254 = "いいえ、まだです！このまま一日が終わりだなんて、そんな勿体ないことはさせません！"
32040-255 = "は、はい……！？"
32040-259 = "な、なに！？急に飛び上がって、びっくりした……。"
32040-261 = "突然のことでしたが、せっかくのお休みじゃないですか。みんな裸で交わったのに、このままはいお休みなさいなんて――"
32040-262 = "勝手に記憶を捏造しないで！裸じゃないから！"
32040-263 = "それはともかく、このまま寝てしまうのは勿体ないです。まだ火照っているといいますか、物足りないと言いますか……。"
32040-264 = "具体的には？"
32040-265 = "うふふっ♡合宿といえば、やはり合宿所を抜け出すこと……それも一つの醍醐味だと思いませんか？"
32040-266 = "え……？"
32040-267 = "さあ！今からみんなでこっそり外に出て、お散歩しましょう♡"
32040-268 = "トリニティの商店街は夜遅くまで営業している店も結構ありますし、食べ歩きとかショッピングとかもできます！"
32040-270 = "そ、そんなの校則違反じゃん！ダメっ！"
32040-271 = "細かい校則は知りませんが、結構みなさんこっそりやってると思いますよ？意外とそういう方周りにいませんか、ヒフミちゃん？"
32040-272 = "あ、あはは……そ、そう、ですね……？"
32040-273 = "で、ですが普段であればまだしも、今は補習授業部の合宿中ですし……良いんでしょうか……？"
32040-274 = "遠出するわけでもありませんし、すぐそこですよ。コハルちゃん、いかがですか？楽しそうだと思いません？"
32040-275 = "え、っと……きょ、興味はある、けど……。"
32040-276 = "はい、ちょっと行って戻ってくるだけですから大丈夫ですよ。良いですか、先生？"
32040-277 = "[s] \"楽しそうだね、行こっか。\""
32040-279 = "い、良いの！？"
32040-283 = "準備はできた。もうすぐにでも出発できる。"
32040-284 = "アズサちゃん！？いつの間に着替えて……！"
32040-285 = "では決定ですね♡"
32040-286 = "さあ早く準備して行きましょう！楽しくなってきましたね、深夜に裸で散歩……！"
32040-287 = "さりげなくすり替えないで！！服は着ろ！！"
32040-289 = "（そうして、唐突に夜のお散歩が始まることになった。）"
32040-291 = "次回;真夜中の大騒ぎ（１）"

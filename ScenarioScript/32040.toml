[translation]
32040-1 = "第4話;泳裝派對"
32040-3 = "啊嗚……雨下的挺大的呢……"
32040-4 = "就是說呀。"
32040-5 = "嗯……早安……"
32040-6 = "哎呀，早安呀小春醬。"
32040-7 = "早安。#n梓醬……看來還沒醒呢。"
32040-8 = "嗯……嗯嗯……"
32040-9 = "怎麼了嗎，梓明明都很早起的……"
32040-10 = "之前應該一直都在勉強自己吧？真想讓他多睡一下呢……"
32040-11 = "嗯……不行，可愛的東西……軟綿綿的……那個，不好……"
32040-12 = "而且，看起來好像在做什麼好夢呢♡"
32040-13 = "[s] 「也可能是因為下雨的關係吧。」"
32040-19 = "啊，啊嗚……竟然都打雷了……"
32040-20 = "……哎呀。"
32040-21 = "怎麼了？"
32040-22 = "我忘記了，洗好的衣服還在外面……！"
32040-27 = "不，不好了……！？"
32040-32 = "……？"
32040-42 = "（大約1小時後……）"
32040-49 = "那麼，接下來值得紀念的第1次補課部泳裝派對要開始囉♡"
32040-50 = "啊嗚……"
32040-51 = "……"
32040-52 = "為什麼會變成這樣……"
32040-58 = "[ns] 「情況怎麼會變成這樣……」"
32040-59 = "呵呵，這也沒辦法嘛♡"
32040-61 = "（稍微回溯時間，大約40分鐘前……）"
32040-63 = "這些應該就是全部了。"
32040-64 = "這……全都被淋濕了呢。#n而且到處都被泥水濺到……看來得重洗才行了。"
32040-65 = "連體育服也……嗚嗚，連裡面都溼答答了……！"
32040-66 = "那是因為小春在途中跌倒了吧。"
32040-67 = "對不起，都怪我疏忽了……是我提出大家一起洗的錯。"
32040-68 = "不，這不是花子的錯。只要重洗一次就好了，衣服也只要換掉就好，不用那麼在意。"
32040-69 = "沒錯。繼續穿著濕掉的衣服的話會感冒的，趕快先換衣服吧。"
32040-70 = "……謝謝。也對呢，頭髮也得趕快吹乾才行。"
32040-74 = "……啊！"
32040-75 = "小春醬？怎麼了嗎？"
32040-76 = "……我已經沒有能換的衣服了。"
32040-77 = "……咦？"
32040-78 = "我也是。制服跟體育服都濕了，也沒有其他備用的衣服。"
32040-79 = "咦！？這，這麼說來我也，啊嗚嗚……"
32040-80 = "……哎呀哎呀♡你們不覺得只穿內衣上課也非常OK嗎？"
32040-81 = "你在說什麼啊！？笨蛋！#n那種不知羞恥的事情當然不行！為什麼會往那種方向討論！？"
32040-82 = "不過也有道理。#n內衣我有多準備幾件，只要有穿襪子，要維持體溫應該不是問題。"
32040-83 = "不要亂附和他啊！？在教室只穿內衣很不妙的吧！？"
32040-84 = "但是小春醬，你想像一下──"
32040-86 = "你給我安靜！！"
32040-90 = "現在趕快洗一洗，用烘乾機之類的烘一下不是馬上就乾了嗎！"
32040-91 = "在洗的時候就圍個浴巾之類的就好！發生什麼事的話只要交給老師就好了啊！"
32040-92 = "況且，在這種情況下沒必要趕著唸書吧！為什麼要這麼急著唸書啊！？"
32040-94 = "就算照你說的做，在那個時候也是只穿內衣的吧？"
32040-95 = "雖然想趕快唸書，不過在洗完衣服之前也沒辦法到教室。總之先脫了吧。"
32040-96 = "啊嗚……"
32040-98 = "為什麼每個人都想脫啊！？露出可是犯罪唷！？"
32040-100 = "老師的房間"
32040-101 = "（在衣服洗好之前，決定先待在房間裡）"
32040-106 = "咦！？怎，怎麼了！？"
32040-107 = "好，好像是停電了呢……？"
32040-108 = "是打雷引起的停電嗎？"
32040-112 = "咦，剛，剛才的聲音是……！？"
32040-113 = "……出問題了。"
32040-114 = "洗衣機停下來了，而且蓋子還打不開。這下糟了。"
32040-115 = "……！？"
32040-119 = "[ns] 「這也沒辦法……」"
32040-120 = "沒錯。既然這樣也只能進行泳裝派對而不是睡衣派對了呢♡"
32040-121 = "啊嗚……總，總覺得應該還有其他辦法才對呀……"
32040-122 = "哎呀？其他方法指的是內衣派對對吧？我覺得那樣也不錯唷♡"
32040-123 = "這種情況下很難上課……#n這種程度的打雷居然就會讓整棟建築癱瘓，這裡的安全系統還真糟糕。"
32040-124 = "畢竟是相對老舊的建築……啊嗚……"
32040-125 = "給我等一下！不要就這麼順著話題說下去！？泳裝派對是怎麼回事！下流！！"
32040-126 = "既然不能上課也沒有衣服穿，那就乖乖待在房間休息不就好了！#n普通人都會這麼想吧！"
32040-127 = "哎呀，你不覺得這種時間才是合宿的重點嗎？"
32040-128 = "大家聚在一起坦誠相見……#n不只下雨還因為停電伸手不見五指，這種氣氛簡直棒極了！"
32040-133 = "唔呵呵呵……♡難得有休息的時間，這樣更有意義不是嗎？"
32040-134 = "啊哈哈……大家聚在一起嘻鬧確實是合宿的慣例呢。"
32040-135 = "原來如此，這就是所謂的泳裝派對啊。"
32040-136 = "不不不哪能接受啊！和泳裝扯上關係的意義呢！？"
32040-137 = "啊嗚嗚……"
32040-138 = "哎呀哎呀，機會難得就一起好好享受吧。"
32040-139 = "就算這麼說也就只是一起聊天而已，聊什麼話題都OK哦♡"
32040-140 = "呵呵♡我一直都想嘗試看看這種事。所以情緒有點高昂呢……"
32040-141 = "[s] 「花子看起來真的很高興呢。」"
32040-142 = "我理解你的心情。我也是，從來到補課部之後就一直這麼覺得。"
32040-143 = "哎呀，是這樣嗎？"
32040-144 = "嗯。不管是學習、還是和大家一起吃飯、洗衣服跟打掃，都讓我覺得很快樂。"
32040-145 = "哎呀……♡"
32040-146 = "我一直覺得泳裝就是游泳的時候穿的東西而已，這種用法我還是第一次知道。#n能夠學到新的知識真是開心。"
32040-147 = "泳，泳裝這點應該是有點搞錯了……啊嗚……"
32040-148 = "而且泳裝穿起來既方便活動，透氣性也很好。#n我能理解花子想穿著泳裝在學校走動的理由。"
32040-149 = "唔呵呵，對吧？我也是這麼認為的。"
32040-150 = "不行！穿成這樣在外面走來走去可是犯罪啊！#n不要理解這種東西！這是公然猥褻罪唷！！"
32040-151 = "跟小春一起唸書也很快樂。"
32040-152 = "怎，怎麼突然這樣！？為什麼要突然說這種羞恥的話！？"
32040-153 = "哎呀哎呀……♡"
32040-154 = "也對……畢竟是跟像我一樣的菁英一起唸書，會有那種感覺也是理所當然的吧？"
32040-155 = "嗯。"
32040-160 = "梓醬……起初我還擔心會看不懂你的表情變化呢……太好了。"
32040-164 = "當然，跟日步美在一起也很快樂。一直都受你照顧了，謝謝你。"
32040-168 = "梓，梓醬！！嗚哇──！！"
32040-173 = "（抱緊）"
32040-174 = "日，日步美，我快不能呼吸了。"
32040-176 = "（就這樣，補課部的大家繼續談天說地……）"
32040-178 = "話說現在三一的水族館，好像正在展出一種叫做「黃金鮪魚」的稀有魚類哦。"
32040-179 = "啊，我也有在傳單上看到！也被稱為「夢幻魚」對吧？"
32040-180 = "嗯，好像是在附近的海裡發現的。#n我雖然想去看看，但門票實在不便宜……"
32040-181 = "海，是嗎……這麼說來還沒有去過呢。"
32040-182 = "是，是這樣嗎！？從來沒有去過……！？"
32040-184 = "還有啊，據說在某個早就倒閉了的遊樂園裡，一到晚上就會傳出一些吵鬧的聲音……"
32040-185 = "這，這怎麼可能嘛！一定是聽錯了！"
32040-186 = "或許吧，我也只聽過傳聞而已……怪談指的就是這種事嗎？"
32040-187 = "不管！絕對是騙人的！一定是有人在惡作劇！"
32040-188 = "啊，啊哈哈……"
32040-190 = "穿著泳裝在街上或學校裡走，其實也沒有那麼奇怪吧？"
32040-191 = "怎麼可能不奇怪！？不要隨便改變常識！"
32040-192 = "不過我從修女們口中聽說過……#n在奇普托斯的某個法外地帶，好像有著穿著泳裝的蒙面犯罪集團唷？"
32040-193 = "穿，穿泳裝還蒙面……！？太變態了吧！？搞什麼鬼！？"
32040-194 = "而且還是「犯罪集團」？他們就算什麼都不做，光是穿成那樣就是已經是犯罪了吧！"
32040-195 = "既然連那種集團都有，可見這在其他地方是很普通的一件事唷。#n所以小春醬下次也一起──"
32040-196 = "不要！雖然不知道你想說什麼但就是不要！！"
32040-201 = "………………"
32040-203 = "我覺得梓醬晚上還是好好睡覺比較好唷？"
32040-204 = "……嗯。今天睡過頭給你們添麻煩了。"
32040-205 = "竟然會在不習慣的地方睡過頭，明明以前幾乎不會這樣的……"
32040-206 = "……可能是因為這裡已經不是「不習慣的地方」了吧。"
32040-207 = "……總之，再多睡一點比較好哦。夜晚的警戒放鬆一點也沒關係的。"
32040-208 = "警戒……？什麼意思？"
32040-209 = "啊啊，我每天晚上都會稍微巡邏一下……"
32040-210 = "[s] 「花子很擔心梓哦。」"
32040-211 = "這樣啊……？"
32040-212 = "……抱歉。"
32040-216 = "其實巡邏只是藉口……我實際上是在附近設置地雷。"
32040-218 = "地雷……？"
32040-219 = "真的假的……？"
32040-220 = "為什麼……？"
32040-222 = "不用擔心，我只有設置在惡意入侵者可能會經過的路線而已。#n不會對平常的生活造成安全問題。"
32040-223 = "（從昨天瑪麗同學的那件事看來，總覺得好像不是這樣……）"
32040-224 = "原來如此……但是，如果能跟我們說一聲的話我會很高興的。不然總是會有點擔心。"
32040-225 = "……這樣啊。嗯，之後我會注意的。"
32040-226 = "我也不想因為我的關係，讓老師和大家受到傷害。"
32040-227 = "[s] 「梓真是善良呢。」"
32040-228 = "什……請，請別把我當成小孩，老師。"
32040-229 = "我才不是……那種人。"
32040-230 = "無意義且徒勞才是這個世界的真相。"
32040-231 = "或許某一天……我會背叛大家的信賴，背叛大家的心也說不定。"
32040-235 = "……"
32040-236 = "啊嗚……"
32040-237 = "……？"
32040-241 = "啊，電來了……"
32040-242 = "看來是修好了呢。"
32040-243 = "啊，雨也不知道什麼時候停了……！"
32040-244 = "是呢。那我們就再去洗一次衣服吧。"
32040-248 = "嗯。那麼第1次泳裝派對就在這裡結束吧。我很期待第2次。"
32040-249 = "才不會有第2次！這就是最後一次了！"
32040-251 = "（洗好衣服後，決定把今天剩下的時間留給大家休息）"
32040-252 = "（就這樣過了一天……）"
32040-254 = "不，還沒有！就這樣結束一天什麼的，不能這麼浪費！"
32040-255 = "呃，嗯……？"
32040-259 = "怎，怎麼了！？突然跳起來，害我嚇了一跳……"
32040-261 = "雖然有點突然，不過這可是難得的休息時間。#n大家都已經裸體交流過了，就這麼晚安睡覺什麼的──"
32040-262 = "不要隨便編造記憶！才沒有裸體！"
32040-263 = "先不管那個，就這樣睡覺太可惜了。該說是還很興奮嗎，還是還不滿足呢……"
32040-264 = "具體來說要做什麼？"
32040-265 = "唔呵呵♡說到合宿的醍醐味……果然還得是夜遊對吧？"
32040-266 = "夜，夜遊……？"
32040-267 = "來吧！大家現在一起偷偷到外面去散步吧♡"
32040-268 = "三一商店街裡也有不少營業到很晚的店，可以邊吃邊逛喔！"
32040-270 = "那，那種事是違反校規的吧！不行！"
32040-271 = "雖然我不清楚有沒有那條校規，但我覺得大家應該都有偷偷在做的唷？#n你說對吧，日步美醬？"
32040-272 = "啊，啊哈哈……可，可能，會有吧……？"
32040-273 = "但，但是平常就算了，現在可是補課部的合宿中……這樣真的好嗎？"
32040-274 = "我們也沒有要跑到多遠的地方，商店街就在附近而已唷。#n小春醬你怎麼看呢？不覺得會很開心嗎？"
32040-275 = "呃……是，是有點興趣，可是……"
32040-276 = "好，我們只是去去就回沒問題的。可以吧，老師？"
32040-277 = "[s] 「感覺會很開心，走吧。」"
32040-279 = "可，可以嗎！？"
32040-283 = "準備好了。隨時可以出發。"
32040-284 = "梓醬！？什麼時候換好衣服了……！"
32040-285 = "那就決定囉♡"
32040-286 = "趕快準備出發吧！真讓人期待呢，深夜的裸體散步……！"
32040-287 = "不要若無其事地換成奇怪的東西！！衣服穿好！！"
32040-289 = "（就這樣唐突地開始了夜間的散步）"
32040-291 = "下一話;深夜的大騷動（１）"

[translation]
32040-1 = "ตอนที่ 4;เสวนาชุดว่ายน้ำ"
32040-3 = "อ่า... ฝนตกค่ะ..."
32040-4 = "อุ๊ยตาย จริงด้วยค่ะ ตกหนักเลยนะคะเนี่ย"
32040-5 = "งืมม... อรุณสวัสดิ์..."
32040-6 = "ตื่นแล้วเหรอคะโคฮารุจัง?"
32040-7 = "อรุณสวัสดิ์ค่ะ มีแค่อาซึสะจังคนเดียวค่ะที่ยังไม่ลุกออกจากที่นอน"
32040-8 = "งือ... งืมมม..."
32040-9 = "อะไรกัน? ปกติอาซึสะตื่นแต่เช้าไม่ใช่เหรอ..."
32040-10 = "ที่ผ่านมาหักโหมมากเกินไปหรือเปล่าคะ? ฉันว่าเราน่าจะปล่อยให้นอนต่ออีกหน่อยนะคะ..."
32040-11 = "งืมม... ไม่ได้นะ... ไอต้าวน่ารัก... หน้าไม่อาย..."
32040-12 = "อุ๊ย... นอนฝันหวานอยู่แน่เลยค่ะ♡"
32040-13 = "[s] \"วันฝนตกก็ต้องนอนสิเนอะ\""
32040-19 = "อ่า... ฟ้าร้องด้วย..."
32040-20 = "ตายแล้ว..."
32040-21 = "มีอะไรเหรอ?"
32040-22 = "ผ้า! เราตากผ้าไว้...! ลืมไปเลยค่ะ!"
32040-27 = "รีบไปเก็บเร็วเข้าเถอะค่ะ!"
32040-32 = "หืม...?"
32040-42 = "(1 ชั่วโมงต่อมา...)"
32040-49 = "เอาล่ะค่ะ เราจะเริ่มการเสวนาชุดว่ายน้ำครั้งที่ 1 ของชมรมชั้นเรียนเสริมแล้วนะคะ♡"
32040-50 = "ฮือ..."
32040-51 = "อืม"
32040-52 = "อะไรเนี่ย... ทำไมถึง..."
32040-58 = "[ns] \"ทำไมถึงเป็นงี้...\""
32040-59 = "หืม? อยากรู้ว่าทำไมพวกเรามารวมตัวกันที่โรงยิมอาคารย่อยแบบนี้น่ะเหรอคะ? คุณครูก็อยู่กับเราด้วยนี่คะ♡"
32040-61 = "(40 นาทีก่อนหน้านี้...)"
32040-63 = "นี่คือผ้าทั้งหมดที่ตากไว้ "
32040-64 = "อือ... เปียกไปหมดเลยนะคะ แถมยังมีดินโคลนกระเด็นเลอะอยู่เต็มเลย... เราต้องซักใหม่แล้วล่ะ..."
32040-65 = "ชุดพละนี่ก็เปียกหมดเลย! ทั้งเหนียวตัว ทั้งน่าหงุดหงิด..."
32040-66 = "มันเป็นเพราะโคฮารุหกล้มระหว่างทางเองนี่"
32040-67 = "เอ่อ... ขอโทษนะคะ ฉันไม่น่าชวนซักผ้าเลย..."
32040-68 = "ไม่หรอก ไม่ใช่ความผิดของฮานาโกะสักหน่อย ผ้าเลอะก็ซักใหม่ได้ ส่วนชุดก็ไปเปลี่ยนใหม่ สบายมาก"
32040-69 = "ค่ะ นั่นสินะคะ ถ้าใส่เสื้อผ้าเปียกๆ ก็อาจจะเป็นหวัดได้ รีบไปเปลี่ยนเสื้อผ้ากันเถอะค่ะ"
32040-70 = "ค่ะ อาบน้ำอุ่นๆ แล้วก็ออกมาเช็ดผมให้แห้งด้วยนะคะ"
32040-74 = "เอ๊อะ...!"
32040-75 = "หืม? มีอะไรเหรอคะโคฮารุจัง?"
32040-76 = "ฉะ... ฉันไม่มีเสื้อผ้า... เปลี่ยน..."
32040-77 = "คะ?"
32040-78 = "นั่นสินะ... ชุดนักเรียนที่ตากไว้ก็โดนฝน ส่วนชุดพละที่ใส่อยู่ก็ทั้งเปียกและเลอะเทอะ...#nฉันเองก็ไม่มีชุดเหลือเลยเหมือนกัน"
32040-79 = "คะ?! เอ่อ... จะว่าไป... ฉันเองก็..."
32040-80 = "อุ๊ยตาย♡ จริงด้วยค่ะ งั้นวันนี้เราจะใส่ชุดชั้นในเรียนหนังสือกันเหรอคะ?"
32040-81 = "อะไรนะ?! พะ... พูดอะไรเนี่ย?! ไม่ได้นะ!!  ทำไมจู่ๆ ถึงเลยเถิดมาเรื่องนี้ได้ล่ะ?"
32040-82 = "ใช่แล้ว  ก็เรามีชุดชั้นในเหลือเยอะนี่ ถ้าใส่ถุงเท้าช่วยก็น่าจะช่วยรักษาอุณหภูมิร่างกายได้"
32040-83 = "อย่าเห็นพ้องต้องกันในเรื่องพิลึกๆ สิ! ทำไมถึงต้องใส่ชุดชั้นในในห้องเรียนด้วยล่ะ! "
32040-84 = "ตายแล้วโคฮารุจัง... ไอเดียนั่นมัน..."
32040-86 = "หยุดพูดเลยนะ!!"
32040-90 = "เรารีบซักผ้าแล้วทำให้แห้งพอใส่ได้ก็พอแล้วนี่! จะเอาไดร์เป่าผมหรืออะไรเป่าให้แห้งก็ได้!"
32040-91 = "ระหว่างนั้นก็ห่มผ้าเช็ดตัวกันไปก่อน! ส่วนคุณครูก็ห้ามออกมาจากห้อง!"
32040-92 = "เรื่องเรียนเราพักก่อนไม่กี่ชั่วโมงก็ไม่น่าจะเป็นอะไรนี่! ทำไมจู่ๆ ก็อยากเป็นนักเรียนดีเด่นขึ้นมากันล่ะ?!"
32040-94 = "งั้นระหว่างนั้นให้ใส่ชุดชั้นในไว้เหรอคะ?"
32040-95 = "เราจะไม่ได้เข้าห้องเรียนจนกว่าผ้าจะแห้งเหรอ... แต่ฉันอยากรีบเรียนนะ"
32040-96 = "เอ่อ... "
32040-98 = "ทำไมทุกคนถึงอยากจะเปลื้องผ้ากันล่ะ! ห้ามโชว์เนื้อหนังนะ! ไม่งั้นจะโดนลงโทษ! "
32040-100 = "ห้องส่วนตัวของคุณครู"
32040-101 = "(ตกลงกันว่าจะไม่ออกจากห้องระหว่างซักผ้าใหม่)"
32040-106 = "เอ๊อะ...?!  อะ... อะไรเนี่ย?!"
32040-107 = "ฟะ... ไฟดับเหรอคะ...?!"
32040-108 = "จริงด้วยค่ะ... ไฟดับเพราะฟ้าผ่าหรือเปล่าคะ?"
32040-112 = "อะ... อะไรคะเนี่ย... นี่มัน...?!"
32040-113 = "งานเข้าแล้วล่ะ"
32040-114 = "เครื่องซักผ้าหยุดทำงานไปแล้ว... แถมยังเปิดฝาไม่ได้ด้วย ทำยังไงดี?"
32040-115 = "...?!?!"
32040-119 = "[ns] \"เพราะงี้ก็เลย...\""
32040-120 = "ค่ะ เพราะเกิดเรื่องแบบนี้ เราก็เลยได้เปิดการเสวนาชุดว่ายน้ำขึ้นค่ะ♡"
32040-121 = "เอ่อ... แต่ฉันว่าเราน่าจะมีทางออกอื่นอยู่นะคะ..."
32040-122 = "โอ๊ะ? ทางออกอื่นที่ว่าก็คือการใส่แต่ชุดชั้นในนี่คะ? จริงๆ แบบนั้นฉันก็โอเคน้า♡"
32040-123 = "เพราะไฟดับก็เลยเรียนหนังสือไม่ได้... แถมฟ้าผ่ายังทำให้ทุกส่วนในอาคารใช้งานไม่ได้อีก#nระบบรักษาความปลอดภัยแย่จริงๆ"
32040-124 = "อาคารมันเก่าแล้วน่ะค่ะ... อ่า..."
32040-125 = "แต่นี่ไม่ใช่เรื่องที่เราต้องมาเถียงกันนี่! ทำไมเราถึงต้องมาเสวนาอะไรนี่ด้วยล่ะ? "
32040-126 = "ถ้านั่งเรียนไม่ได้ แถมไม่มีเสื้อผ้าใส่ ก็แค่ไปพักผ่อนเงียบๆ ในห้องก็ได้นี่! มันควรจะเป็นแบบนี้ไม่ใช่เหรอ?"
32040-127 = "อุ๊บส์ แต่การเสวนาคือหัวใจของแคมป์ฝึกฝนนะคะโคฮารุจัง"
32040-128 = "เรามารวมตัวกันเพื่อเปิดเผยความในใจของกันและกัน... แถมฝนและฟ้าฝ่ายังช่วยสร้างบรรยากาศ#nไปอีกขั้นด้วย!"
32040-133 = "ฮุฮุฮุ♡ งั้นเราก็ยิ่งต้องทำแบบนี้สิคะ ไหนๆ ก็มีเวลาแล้ว มาทำเวลาพักผ่อนให้มีความหมายกันเถอะค่ะ"
32040-134 = "แหะๆๆ ที่จริงการมารวมตัวและพูดคุยกันก็เป็นขั้นตอนมาตรฐานของแคมป์ฝึกฝนอยู่นะ..."
32040-135 = "เพราะอย่างนั้นก็เลยจัดเสวนาชุดว่ายน้ำสินะ?"
32040-136 = "ไม่เห็นจะเข้าใจเลย! แล้วชุดว่ายน้ำมันเกี่ยวอะไรด้วยล่ะ!! "
32040-137 = "อ่า แหะๆ..."
32040-138 = "เอาล่ะ เอาล่ะ เลิกถามเลิกบ่นแล้วมาสนุกด้วยกันเถอะค่ะ "
32040-139 = "ถึงจะเรียกอย่างเป็นทางการว่าการเสวนา แต่จริงๆ ก็แค่การพูดคุยเรื่องไร้สาระในหัวข้ออะไรก็ได้♡"
32040-140 = "ฮุฮุฮุ♡ ฉันอยากทำอะไรแบบนี้มานานแล้วล่ะค่ะ ดีใจจังที่ได้ทำในชมรมชั้นเรียนเสริม..."
32040-141 = "[s] \"ดูจะสนุกเป็นพิเศษเลยนะฮานาโกะ...\""
32040-142 = "ฉันเข้าใจความรู้สึกของฮานาโกะนะ ฉันก็รู้สึกอย่างเดียวกันที่ได้เข้ามาในชมรมชั้นเรียนเสริม"
32040-143 = "โอ๊ะ? จริงเหรอคะอาซึสะจัง?"
32040-144 = "หืม? แน่นอนอยู่แล้วสิ เราทั้งได้เรียนด้วยกัน กินข้าวด้วยกัน ซักผ้าด้วยกัน และทำความสะอาดด้วยกัน ฉันสนุกกับทุกอย่างที่เราทำด้วยกันเลย"
32040-145 = "ตายแล้ว...♡ "
32040-146 = "ฉันเคยคิดว่าชุดว่ายน้ำจะใส่แค่ตอนว่ายน้ำอย่างเดียวซะอีก นี่เป็นครั้งแรกเลยที่รู้ว่า#nเราเอามาใช้ประโยชน์อื่นได้ การได้รู้อะไรที่ไม่รู้มาก่อนมันก็สนุกดีนะ"
32040-147 = "ไม่นะ... แต่นี่มันไม่เหมือนกันนะคะ แต่ก็เอาเถอะ... อ่า..."
32040-148 = "มันใส่แล้วเคลื่อนไหวสะดวกแล้วก็ระบายอากาศดีด้วยนี่? ฉันเข้าใจแล้วล่ะว่าทำไมฮานาโกะ#nถึงใส่ชุดนี้ไปไหนมาไหน"
32040-149 = "ฮุฮุฮุ เย็นใช่ไหมคะ? ก็บอกแล้วยังไงล่ะคะว่าสบาย"
32040-150 = "จะบ้าเหรอ! แบบนั้นมันอาชญากรรมนะ! ไม่ต้องไปพยายามเข้าใจอะไรแบบนี้หรอก!#nนี่มันความผิดฐานลามกอนาจาร! ต้องลงโทษ!"
32040-151 = "การได้เรียนหนังสือกับโคฮารุก็สนุกนะ"
32040-152 = "จู่ๆ มาพูดอะไรแบบนี้ล่ะ?! มันน่าอายออกนะ!"
32040-153 = "ตายจริง.....♡"
32040-154 = "ตะ... แต่มันก็แน่อยู่แล้วนี่ ได้เรียนกับนักเรียนหัวกะทิแบบฉันทั้งที"
32040-155 = "อืม"
32040-160 = "เอ่อ... ฉันก็เอาแต่กังวลว่าอาซึสะจังจะคิดอะไรอยู่ เพราะมีอยู่สีหน้าเดียวตลอดเลย...#nดีจังเลยค่ะที่คิดแบบนี้..."
32040-164 = "อืม ฉันรู้สึกผิดที่เอาแต่เป็นหนี้บุญคุณน่ะฮิฟุมิ"
32040-168 = "อ๊า-! อาซึสะจางงง~"
32040-173 = "(หมับ)"
32040-174 = "อึ้ก หายใจไม่ออก"
32040-176 = "(สมาชิกชมรมชั้นเรียนเสริมนั่งคุยเรื่องทั่วไปกันต่อ)"
32040-178 = "ฉันได้ยินมาว่าที่อควาเรียมทรีนิตี้มีจัดแสดงปลามากุโร่หายากด้วยค่ะ"
32040-179 = "ฉันก็เห็นจากแผ่นพับเหมือนกันค่ะ! มันคือปลาในจินตนาการเลยนี่คะ?"
32040-180 = "เห็นว่าไปพบมาในทะเลใกล้ๆ ค่ะ ฉันอยากไปดูจัง แต่ค่าเข้าชมแพงมากเลย..."
32040-181 = "ทะเลเหรอ...? ไม่เคยไปที่แบบนั้นเลย..."
32040-182 = "คะ?!  อาซึสะจังไม่เคยไปทะเลเลยเหรอคะ?!"
32040-184 = "เห็นว่าในสวนสนุกที่เจ๊งไปนานแล้ว... พอตกกลางคืนก็มีเสียงดัง..."
32040-185 = "จะ... จะเกิดอะไรแบบนั้นได้ไงล่ะ! ตาฝาดหรือเปล่า?!!"
32040-186 = "ฉันก็แค่ได้ยินข่าวลือมาน่ะค่ะ... แต่ปกติเรื่องลึกลับก็มักจะแนวนี้ทั้งนั้นนี่คะ?"
32040-187 = "โกหกน่า โกหกทั้งเพ!"
32040-188 = "อะ... อ่า..."
32040-190 = "ใส่ชุดว่ายน้ำเดินไปไหนมาไหนเป็นเรื่องธรรมดากว่าที่คิดงั้นเหรอคะ?"
32040-191 = "จะเป็นอย่างนั้นไปได้ยังไง! อย่าเที่ยวเปลี่ยนสามัญสำนึกตามใจชอบสิ!"
32040-192 = "จริงด้วย... ฉันเองก็ได้ยินเรื่องนี้มาจากพวกซิสเตอร์เหมือนกันค่ะ เห็นว่ามีกลุ่มอาชญากร#nใส่ชุดว่ายน้ำกับหน้ากาก แล้วก่อเรื่องวุ่นวายในเขตปลอดกฎหมายในคิโวทอสด้วยค่ะ"
32040-193 = "ชะ... ชุดว่ายน้ำกับหน้ากาก?!  ทำไมถึงได้...?! "
32040-194 = "ไม่สิ ก็เพราะแบบนี้ไงล่ะถึงเป็นอาชญากร!"
32040-195 = "มันเป็นเรื่องธรรมดามากเลยค่ะ เพราะงี้ครั้งนี้โคฮารุจังก็เลย..."
32040-196 = "ไม่เอาาาา! ฉันไม่รู้หรอกว่าคืออะไร แต่ไม่เอา! ไม่เอาอ้ะ!"
32040-201 = "..."
32040-203 = "อาซึสะจังควรให้ความสำคัญกับการนอนหลับมากกว่านี้นะคะ!"
32040-204 = "ก็ใช่นะ... วันนี้ฉันตื่นสายจนทำให้คนอื่นเดือดร้อนอีกแล้ว"
32040-205 = "ปกติฉันแทบไม่ค่อยจะตื่นสายเมื่อนอนแปลกที่เลย... ขอโทษทุกคนนะ"
32040-206 = "ไม่สิ ที่นี่ไม่ถือเป็นที่ที่ไม่คุ้นเคยแล้วหรือเปล่า..."
32040-207 = "อาซึสะจังต้องนอนให้มากกว่านี้ เพราะงั้นก็ลดการเฝ้ายามตอนกลางคืนเถอะค่ะ!"
32040-208 = "เฝ้ายาม...? พูดถึงเรื่องอะไรกันน่ะ?"
32040-209 = "อืม ฉันไม่ได้เข้านอน... แต่ไปยืนเฝ้ายามทุกคืนเลยน่ะ"
32040-210 = "[s] \"ฮานาโกะเป็นห่วงอาซึสะนะ\""
32040-211 = "อย่างนั้นเหรอ...?"
32040-212 = "อืม... เป็นห่วงสินะ ขอโทษนะ"
32040-216 = "ที่จริงแล้ว... การเฝ้ายามเป็นแค่ข้ออ้าง... ฉันออกไปตระเวนรอบๆ โรงเรียนทุกคืน แล้วสร้างกับดักและที่มั่นอยู่ต่างหากล่ะ"
32040-218 = "กับดักเหรอคะ...?"
32040-219 = "ที่มั่น......?"
32040-220 = "ทำแบบนั้นทำไม...?"

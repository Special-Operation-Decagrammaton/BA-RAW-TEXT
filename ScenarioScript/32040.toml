32040-272 = "อะฮ่ะฮ่ะฮ่า! มะ... มีคนไปเหรอคะ... ก็พอได้ยินมาเหมือนกัน... อ่า... แหะๆๆ"
32040-273 = "แต่พวกเรากำลังออกแคมป์ฝึกฝนอยู่นะคะ จะไปข้างนอกได้รึเปล่า..."
32040-274 = "ไม่ได้ออกไปไกลนี่คะ อยู่กันแค่แถวนี้เอง ไปแป๊บเดียวเดี๋ยวก็กลับแล้วค่ะ ว่าไงล่ะคะโคฮารุจัง? น่าสนุกใช่ไหมคะ?"

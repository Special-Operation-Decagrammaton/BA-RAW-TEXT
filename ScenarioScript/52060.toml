52060-19 = "3;키쿄;04;……샬레의 선생님이 어째서 이곳에?\n#3;em;[?!]\n#3;shake"
52060-20 = "[s1] \"오랜만이야, 모두들.\"\n[s2] \"그간 별일 없었지?\""

52060-13 = "3;키쿄;02;감사를 들을 일은 아니라고 생각하는데. 백귀야행의 안전과 관련된 문제라면 언제나 적극 협력하는 것이 백화요란의 책무이니까.\n#3;em;…\n#3;a"
52060-14 = "3;키쿄;00;게다가 음양부에게는 지난번 일로 여러모로 도움을 받기도 했고."
52060-15 = "3;키쿄;07;다만 한 가지, 마음에 걸리는 점이라면—"
52060-16 = "#st;[0,0];instant;1;"
52060-17 = "#clearST"

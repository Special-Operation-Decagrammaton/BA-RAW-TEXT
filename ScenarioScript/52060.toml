52060-233 = "อื้อ แล้วฉันจะรอนะ คุณครู"
52060-235 = "ถึงจะส่งชิเซะไปไม่ได้ แต่ฉันก็ส่งหนังสือไปให้โรงเรียนสาขาเอบิสุล่วงหน้าแล้ว ทางนั้นน่าจะส่งคนออกมาต้อนรับเมื่อไปถึงที่นั่นค่ะ"
52060-236 = "ฉันคิดว่าคงไม่มีภัยคุกคามใดๆ กับคุณครูเป็นพิเศษเพราะมีนักเรียนเฮียกกะเรียวรันไปด้วย แต่ตรงนั้นก็เป็นที่ห่างไกลเกินกว่าที่มือของ 'พวกฉัน' จะเอื้อมถึง ขอให้คุณครูระวังตัวด้วยนะคะ"

52060-168 = "......"
52060-170 = "ถึงตอนนี้จะยังมีคนที่เจอสิ่งลึกลับน่าขนลุกกับตัวเองไม่มากนัก แต่ถ้าข่าวลือแพร่ไปมากกว่านี้ ฉันเกรงว่ามันจะส่งผลต่อการเตรียมงานเทศกาลค่ะ"
52060-171 = "ฉันก็เลยอยากขอให้เฮียกกะเรียวรันผู้มีพลังในการปราบตำนานร้อยเรื่องราวช่วยคลี่คลายสถานการณ์นี้#nให้ทีน่ะค่ะ"
52060-173 = "ถ้าเป็นปัญหาแบบนี้ แน่นอนว่าเฮียกกะเรียวรันเป็นผู้ที่เหมาะสมที่สุดที่จะแก้ปัญหา..."
52060-174 = "แต่ถ้าจะพูดให้ชัดละก็ ต้องบอกว่ามีเพียงรุ่นพี่นางุสะที่เป็นรักษาการหัวหน้าเท่านั้นที่ใช้ <เฮียกกุเร็น> ได้"
52060-180 = "ฉันแค่ต้องไปที่เขตปกครองตนเองทางเหนือใช่มั้ย...?"
52060-181 = "ถึงฉันจะไม่เก่งกาจเท่าอายาเมะ... แต่ถ้าทำได้ ฉันก็จะรับภารกิจนั้นเอง"
52060-182 = "กะไว้แล้วว่าต้องพูดแบบนี้..."
52060-183 = "ดีละ! งั้นก็ไปกำจัดพวกปีศาจอะไรนั่นแล้วก็หาทางรักษาแขนของรุ่นพี่นางุสะไปด้วยเลย!"
52060-184 = "แล้วก็ช่วยหัวหน้าอายาเมะกลับมาด้วยเจ้าค่ะ!"

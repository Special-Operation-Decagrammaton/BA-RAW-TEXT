52060-87 = "3;카호;06\n#3;em;[?!]\n#3;shake\n#wait;800"
52060-88 = "3;카호;13;아앗, 저도 모르게 그만…… 시, 실례했습니다.\n#3;stiff"
52060-89 = "[s5] \"구체적인 내용까지는 이해하지 못했지만……\"\n[s6] \"이번 축제에 많은 공을 들이고 있구나.\""
52060-90 = "#wait;10"
52060-91 = "#wait;10"
52060-92 = "3;카호;12;무, 물론입니다!"
52060-93 = "3;치세;03;나도 열심히 노력하고 있어~\n#3;em;[음표]"
52060-94 = "[s] \"장하다, 장해~\""
52060-95 = "3;키쿄;02;이번 와라쿠 축제의 개최를 앞두고 많은 백귀야행 학생들이 기대를 보내고 있다는 사실은 우리도 이미 알고 있어.\n#3;em;[반응]"
52060-96 = "3;키쿄;01;그래서 우리 백화요란에서는 이미 행사장의 순찰과 불량 학생들의 퇴치 등 안전 문제에 적극 협조하고 있다만."
52060-97 = "5;니야;00;물론 백화요란의 부원 여러분이 와라쿠 축제의 안전 관리에 적잖은 도움의 손길을 보내주고 계시다는 사실은 충분히 알고 있습니다.\n#5;em;[재잘]\n#5;al\n#3;m1"
52060-98 = "5;니야;07;다만, 축제 외적으로 준비물에 작은 트러블이 발생해서 말이죠."
52060-99 = "#all;hide"
52060-100 = "3;유카리;02;트뤄~블…… 인가요?\n#3;stiff"
52060-101 = "#all;hide"
52060-102 = "1;키쿄;05\n5;니야;01;여러분은 축제에서 가장 중요한 요소가 무엇이라고 생각하시나요?\n#5;em;[?]"
52060-103 = "1;키쿄;02;많은 인원을 수용할 수 있는 장소……?"
52060-104 = "#all;hide"
52060-105 = "3;유카리;14;화려한 축제 장식도 빼놓을 수 없지요.\n#3;em;[반짝]\n#3;hophop"
52060-106 = "3;렌게;02;하지만 역시 다양한 먹거리가 있어야 축제의 분위기가 달아오르지 않을까?"
52060-107 = "3;나구사ND;03;응. 닭꼬치가 없다면 축제의 기분이 나지 않으니까."
52060-108 = "3;니야;01;네, 닭꼬치…… 도 중요하긴 하지만, 축제에서만 즐길 수 있는 다양한 음식이야말로 축제의 분위기를 띄우는 중요한 요소 중 하나죠.\n#3;em;…"
52060-109 = "3;니야;07;거기에 더해 축제에 참가한 관광객들이 소비하는 주된 수입원이라는 점 또한 빼놓을 수 없지만요.\n#fontsize;50"
52060-110 = "#st;[0,0];instant;1;"
52060-111 = "#clearST"
52060-112 = "3;니야;01\n#3;m2\n#wait;1200"
52060-113 = "3;니야;00;그런데 여러분께서는 백귀야행의 축제에 쓰이는 수많은 식재료가 어디서 오는지 알고 계시나요?\n#3;em;[?]"
52060-114 = "[s] \"백귀야행 외부에서 들여오는 게 아니야?\""
52060-115 = "3;니야;01;적은 양이라면 모르겠지만, 먼 곳에서 식재료를 대량으로 들여오려면 여러 가지로 어려움이 많거든요.\n#3;m3"
52060-116 = "3;니야;07;백귀야행에 쓰이는 신선한 식재료는 대부분 북방 자치구에 있는 에비스 분교에서 들여오고 있답니다."
52060-117 = "[s] \"에비스 분교……?\""
52060-118 = "3;카호;02;네, 현재는 백귀야행이라는 이름 아래에 연합하여 있지만, 한 때 백귀야행은 수많은 분교로 나뉘어 기나긴 전란의 시대를 보낸 적이 있습니다.\n#3;em;[반응]"
52060-119 = "3;카호;01;현재는 그 흔적을 찾아보기 어려우나, 접근이 어려운 자치구 외곽의 일부 학원들은 아직도 이전처럼 분교의 형태로 남아 있습니다."
52060-120 = "3;카호;99;북방 자치구에 있는 에비스 분교도 이 중 하나."
52060-121 = "3;카호;02;에비스 분교는 백귀야행의 축제 때마다 넓은 농경지에서 생산한 다양한 농축산물을 제공해 주고 있습니다."
52060-122 = "#st;[0,0];instant;1;"
52060-123 = "#clearST"
52060-124 = "3;렌게;02\n#3;em;[?]\n#3;h\n#wait;800"
52060-125 = "3;렌게;04;응? 에비스 분교가 있는 대설원 인근은 여름에도 가끔 눈이 내릴 정도로 추운 곳이 아니었던가. 그런 곳에서도 농사가 잘되는 거야?\n#3;stiff"
52060-126 = "3;니야;00;후후, 무나 감자, 당근 같은 뿌리채소는 날이 추울수록 단맛이 더해진답니다? 대설원을 제외한 북방 자치구가 사시사철 추운 것도 아니고요.\n#3;em;[재잘]"

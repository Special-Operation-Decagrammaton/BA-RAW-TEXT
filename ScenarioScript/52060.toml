[translation]
52060-1 = "第6話;祭典準備"
52060-6 = "喵哈～歡迎你們，百花繚亂的各位。"
52060-7 = "願意回應如此臨時的請求，真是感激不盡。"
52060-8 = "歡迎～"
52060-13 = "不必客氣。若是攸關百鬼夜行的安全，積極協助本就是百花繚亂的職責。"
52060-14 = "況且我們先前也曾承蒙陰陽部的多方幫助。"
52060-15 = "只是有件事情讓我有點在意……"
52060-19 = "……為何夏萊的老師會在這裡？"
52060-20 = "[s1]「大家好久不見。」 \n[s2]「最近還好嗎？」"
52060-26 = "師，師父！？"
52060-27 = "哎呀，老師！#n真高興能再見到您！"
52060-28 = "……你好，老師。"
52060-30 = "[USERNAME]老師遠道而來也辛苦了，喵哈。"
52060-31 = "[s3]「其實也沒多遠啦。」 \n[s4]「只要學生需要幫助，無論哪裡都得去！」"
52060-35 = "雖然在聽說陰陽部臨時召集的時間點，我就多少有點心理準備……"
52060-36 = "不過既然要在百花繚亂與夏萊的老師都在的場合提出請求，事情想必非同小可吧。"
52060-38 = "怎麼會呢～#n我們的臉皮也不至於厚到會向遠道而來的貴客提出艱難的請求嘛～"
52060-39 = "百鬼夜行大部分的麻煩事，我們陰陽部都會全權處理。#n對吧，佳穗～？"
52060-40 = "……是的。#n「仁耶大人以外」的其他陰陽部員都會處理。"
52060-41 = "說得這麼冷淡，真過分～"
52060-46 = "畢竟仁耶部長的懶散，在百鬼夜行已是人盡皆知的事。"
52060-48 = "我也有聽說過。#n如果拜託仁耶部長辦事，最後總是會讓委託人急得自己動手之類的……"
52060-49 = "原來如此，這就是所謂「賢明的領導者會引導他人自行解決問題」吧！"
52060-51 = "咦，咦？怎麼突然變成我的檢討會了……？"
52060-52 = "總，總之！老師您也知道，我們百鬼夜行聯合學園以觀光與祭典聞名，#n因此大多數的事件都會發生在祭典期間。"
52060-53 = "所以這次，我們才會邀請老師與百花繚亂一同協助祭典的準備。"
52060-54 = "[s]「又要舉辦新的祭典了嗎？」"
52060-55 = "沒錯。百鬼夜行的祭典一年四季都不會間斷。"
52060-56 = "春日賞櫻的「百夜之春櫻花祭」、夏日清涼的「百夜水上祭」、#n秋日祈福的「神木祭」、冬日觀雪雕的「百夜之冬雪花祭」……"
52060-57 = "要說一年365天都能享受祭典也不為過。"
52060-58 = "而這次即將舉辦的祭典則是……"
52060-64 = "和樂祭！"
52060-66 = "耶～"
52060-72 = "不，不好意思……我一時之間太興奮了。"
52060-73 = "喵哈哈……沒關係的，佳穗。"
52060-74 = "那麼，能麻煩佳穗向老師介紹一下和樂祭嗎？"
52060-75 = "和樂祭顧名思義，是為了展現知世醬的魅力、盡情享受知世醬各種風采的祭典。"
52060-76 = "從欣賞知世醬俳句的書畫展，到知世醬愛用品的展示會，#n甚至還有知世醬限定周邊的販售會……"
52060-77 = "但說到祭典的壓軸──"
52060-78 = "非知世醬的現場演唱會莫屬！"
52060-79 = "由於知世醬平時很少唱歌的關係，很多人也許不太清楚……#n其實他的歌聲，帶有一股能夠撫慰人心的可愛魅力。"
52060-80 = "尤其我們陰陽部為了完整錄下這次演出，#n特別準備了三台搭載800mm長焦鏡頭的攝影機──"
52060-82 = "佳，佳穗……說到這邊就行了……"
52060-83 = "冷靜點～"
52060-88 = "啊啊，一不小心就……失，失禮了。"
52060-89 = "[s5]「雖然細節聽得不是很懂……」 \n[s6]「不過能看出你們對這次祭典投入了很多心力。」"
52060-92 = "當，當然！"
52060-93 = "我也會加油哦～"
52060-94 = "[s]「真棒真棒～」"
52060-95 = "我們明白許多百鬼夜行的學生，都對和樂祭感到相當期待。"
52060-96 = "因此百花繚亂也正積極協助巡邏會場並驅逐不良學生，以確保會場的安全。"
52060-97 = "百花繚亂在和樂祭安全管理方面提供的諸多協助，我們自然也充分了解……"
52060-98 = "只是……在祭典本身以外的部分發生了一點小麻煩。"
52060-100 = "麻煩……是嗎？"
52060-102 = "各位認為祭典最重要的元素是什麼呢？"
52060-103 = "能容納大量人群的場地……？"
52060-105 = "不能缺少華麗的裝飾。"
52060-106 = "果然還是各種美食最能炒熱氣氛吧？"
52060-107 = "嗯，沒有烤雞串就不像祭典了。"
52060-108 = "沒錯，烤雞串……固然重要沒錯，但祭典中才能品嘗到的各種美食就是關鍵所在。"
52060-109 = "況且這也是主要的收益來源嘛。"
52060-113 = "不過各位是否了解……祭典所需的大量食材是從哪裡來的呢？"
52060-114 = "[s]「不是從百鬼夜行外部輸入的嗎？」"
52060-115 = "只是少量的話倒不成問題，但如果要大量運輸就會面臨許多困難。"
52060-116 = "實際上百鬼夜行所使用的新鮮食材，大多都來自於北方自治區的惠比壽分校。"
52060-117 = "[s]「惠比壽分校……？」"
52060-118 = "是的，現在雖已統一於百鬼夜行名下，#n但我們曾歷經漫長且分裂為無數分校的戰亂時期。"
52060-119 = "儘管當時的痕跡已逐漸淡去，部分偏遠的自治區依然保留著分校的型態。"
52060-120 = "而惠比壽分校便是其中之一。"
52060-121 = "每逢祭典之時，惠比壽分校便會供應生產自其廣大農地的農畜產品。"
52060-125 = "嗯？那裡不是連夏天也偶爾會下雪的嚴寒地帶嗎？#n他們是怎麼種田的啊？"
52060-126 = "呵呵，蘿蔔、馬鈴薯、胡蘿蔔這類的根菜，可是越冷越甜的哦？#n而且除了大雪原之外，北方自治區也並非全年都屬於嚴寒氣候。"
52060-128 = "那邊出產的魚類、水果和乳酪，也都獲得了相當不錯的評價。"
52060-129 = "毛蟹也好吃～"
52060-130 = "[s7]「聽起來真是片富饒之地呢……」 \n[s8]「有機會的話真想去看看。」"
52060-133 = "然而……近期惠比壽分校卻發來了求助訊息。"
52060-140 = "說是在晴朗的白天都還正常……#n但一旦天色稍暗或到日落時分，詭異的「怪異」便會現身襲擊人們。"
52060-141 = "怪異……？"
52060-142 = "請原諒我們暫且稱之為「怪異」。"
52060-143 = "因為每個人口中所描述的襲擊者，其模樣都各不相同。"
52060-144 = "有人看見的是醜陋的怪物，有人則看見兇猛的野獸……#n還有人看見了自己害怕的熟人……"
52060-148 = "不過即便如此，怪異之間依然存在兩個共通點。"
52060-149 = "第一，它們都呈現出了目擊者最恐懼的模樣。"
52060-150 = "第二，普通的槍械無法造成任何傷害。"
52060-159 = "……幻魎百物語。"
52060-160 = "沒錯，我們也得出了相同的結論。"
52060-161 = "假如那是在黑暗中滋長，以恐懼為食、擾亂人心的魑魅魍魎之物……"
52060-162 = "無論其真面目究竟為何，都很可能與花鳥風月部在上次燈籠祭時召喚的百物語有關。"
52060-167 = "而能夠打倒這種怪異的，唯有「百花繚亂的委員長」與他持有的「百蓮」。"
52060-168 = "……"
52060-170 = "儘管眼下的目擊者仍在少數，然而一旦謠言擴散出去，勢必將影響到祭典的準備。"
52060-171 = "因此，希望擁有對抗百物語之力的百花繚亂能出手相助。"
52060-173 = "這種事當然是該由我們百花繚亂來處理沒錯……"
52060-174 = "但嚴格來說，能操縱「百蓮」的只有擔任委員長代理的名草前輩而已。"
52060-180 = "……只要前往北方自治區就行了嗎？"
52060-181 = "雖然不及菖蒲……但我願意接下這個任務。"
52060-182 = "……果然如此啊。"
52060-183 = "好！那就去收拾掉那些妖怪，順便治好名草前輩的手臂吧！"
52060-184 = "還要把菖蒲委員長也救回來！"
52060-186 = "呵呵，大家目標一致真是太好了。"
52060-187 = "能夠一舉解決兩個問題，簡直可說是一石二鳥──"
52060-188 = "──不，應該說是「一石三鳥」才對吧？"
52060-189 = "[s]「你是不是還有話沒說？」"
52060-190 = "不愧是老師，果然敏銳過人呢～"
52060-191 = "之前與您提過的葛葉之事，您應該還記得吧？"
52060-192 = "[s9]「嗯，當然記得。」\n[s10]「……但我覺得已經不必再找下去了。」 "
52060-197 = "喵哈！？#n不，不必再找下去……？"
52060-198 = "這還真是出乎意料……#n我本以為老師您，依然在尋找能讓與色彩接觸之人恢復的方法呢。"
52060-199 = "稍不留神便有如此成長，[USERNAME]老師果然是個令人刮目相看的人物呢～"
52060-203 = "雖然古老記載的可靠性存疑，但據說大預言者葛葉就棲身於「黃昏寺院」。"
52060-204 = "當然黃昏寺院與葛葉本身相同，僅有少數學生聲稱其確實存在……#n目前仍是個尚未證實的地點。"
52060-205 = "不過，據說在北方的大雪原中央，存在著通往黃昏寺院的道路。"
52060-206 = "原先我也認為，要在茫茫雪原之中尋找虛無縹緲的寺院實在過於冒險，#n因此一直抱著半信半疑的態度……"
52060-207 = "但既然名草副委員長曾從大雪原之中帶回葛葉的信──#n這恐怕不是巧合，而是命運的安排吧。"
52060-208 = "[s]「那麼，就直接往大雪原──」"
52060-209 = "即便攜帶充足的裝備，大雪原依舊相當危險……#n因此我並不建議手無縛雞之力的老師以身涉險。"
52060-210 = "[s]「這話是不是有點……」"
52060-211 = "呵呵，不過惠比壽分校附近是個熱鬧的城鎮，應該很安全才對。"
52060-212 = "若能在那裡，與百花繚亂一同為居民解決問題……"
52060-218 = "……或許傳說中的[ruby=葛葉]大預言者[/ruby]就會現身也說不定哦？"
52060-219 = "[s11]「謝謝你，仁耶。」 \n[s12]「你真的幫了大忙。」"
52060-222 = "哪裡哪裡，我們才該感謝諸位替我們解決這個麻煩──#n更正，是困難的問題呢。"
52060-223 = "……仁耶大人！"
52060-224 = "那知世也要和老師一起去北方小鎮嗎？"
52060-225 = "這可能……沒有辦法。#n知世醬得留下來繼續準備和樂祭才行。"
52060-226 = "雪白的原野……真想親眼看看。"
52060-230 = "唔唔，知世醬這失落的表情……光看就讓人心碎……"
52060-231 = "不，不過還是不行！#n為了和樂祭的順利舉辦，知世醬不能離開這裡！"
52060-232 = "[s]「下次再一起去吧，知世醬。」"
52060-233 = "嗯，我等你哦，老師。"
52060-235 = "作為知世喵的代替……這麼說雖然有點奇怪，#n不過我已經先向惠比壽分校寄出了書信，對方應該會有人來接應才是。"
52060-236 = "畢竟是與百花繚亂同行，應該不至於遭遇太大的危險……#n但那裡終究是我們鞭長莫及的遠方，還請務必小心。"
52060-237 = "那麼就拜託您了，老師。"
52060-239 = "下一話;雪國"

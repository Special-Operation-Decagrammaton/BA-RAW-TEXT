[translation]
52060-1 = "Episode 6;Festival Preparations"
52060-6 = "Nyaha... Hello, Hyakkaryouran. You all look lovely."
52060-7 = "I know that this was sudden, so thank you for coming."
52060-8 = "Welcome."
52060-13 = "Spare us your thanks. If this is related to Hyakkiyako's safety, then it is our duty to appear once summoned."
52060-14 = "Besides, we haven't forgotten what the Yin-Yang Club has done for us."
52060-15 = "That said, I do have a question—"
52060-19 = "...What is Schale's Sensei doing here?"
52060-20 = "[s1] \"It's been a while!\"\n[s2] \"I assume things are good?\""
52060-26 = "Sensei?!"
52060-27 = "Sensei! How marvelous for us to reunite!"
52060-28 = "...Good morning, Sensei."
52060-30 = "Yes! And good work, [USERNAME] Sensei, for coming all this way without getting lost! Nyaha."
52060-31 = "[s3] \"It wasn't that far.\"\n[s4] \"Anything for students in need!\""
52060-35 = "I was curious why the Yin-Yang Club called so suddenly..."
52060-36 = "But any request requiring the Hyakkaryouran and Schale's Sensei to be together...this must be serious."
52060-38 = "Not in the slightest. What, do you think I would call Sensei all this way only to make them work on something hard?"
52060-39 = "The Yin-Yang Club has never shied away from handling Hyakkiyako's most complicated, troublesome problems. Right, Kaho?"
52060-40 = "...Yes. That is true of the entire Yin-Yang Club...excluding Niya."
52060-41 = "Oh, ouch. So mean..."
52060-46 = "President Niya possesses a legendary level of laziness."
52060-48 = "I've heard that, too. Apparently, if you ask President Niya to do something, she'll annoy you until you solve the problem yourself."
52060-49 = "Wow, inspiring people to self-efficacy... She's a wise leader indeed!"
52060-51 = "Huh? When did this become an inquisition?"
52060-52 = "A-Anyway! I'm sure Sensei knows this, but we, the Allied Hyakkiyako Academy, are known for organizing our festivals. And...most disruptive incidents happen during these events."
52060-53 = "So we invited you all here to humbly ask you to assist with our upcoming festival!"
52060-54 = "[s] \"You're having ANOTHER festival?\""
52060-55 = "Yes. Hyakkiyako has a festival for every season, at minimum every year, forever."
52060-56 = "The Cherry Blossom Festival celebrates the spring. The Water Festival welcomes a warm summer. The Tree of Deities ritual wishes for a bountiful autumn harvest. And the Snowflake Festival...well, need I spell it out?"
52060-57 = "No matter which day of the year you visit, if you're in Hyakkiyako, you WILL be enjoying a festival."
52060-58 = "And this new festival, the one that's the most special of all, is..."
52060-64 = "The Waraku Festival!"
52060-66 = "Yes!"
52060-72 = "I-I'm sorry to butt in... I'm just so excited!"
52060-73 = "Nyahaha... It's fine, Kaho."
52060-74 = "Then how about YOU explain the Waraku Festival to Sensei?"
52060-75 = "Of course! Well, Sensei, it's pretty obvious! I proposed the Waraku Festival to show off Chise's charm and her talent and her...utter specialness!"
52060-76 = "We'll have a calligraphy exhibition that also highlights her haiku, and galleries showcasing the unique items she's collected, and even merch! You can bring a Chise plushie home! "
52060-77 = "But the highlight of the festival is definitely..."
52060-78 = "...The celebration concert featuring Chise, of course!"
52060-79 = "So many people haven't heard Chise's amazing singing voice! She has such a unique texture and sweetness, and now all of Hyakkiyako will hear it!"
52060-80 = "And, for posterity, the Yin-Yang Club has secured three advanced telephoto cameras to ensure that we can relive this moment again and again and—"
52060-82 = "K-Kaho... That's enough..."
52060-83 = "Breathe."
52060-88 = "Ah, sorry, I didn't mean to... Pardon me."
52060-89 = "[s5] \"That was a lot...\"\n[s6] \"It's good to see you so passionate.\""
52060-92 = "O-Of course!"
52060-93 = "I've been working hard too!"
52060-94 = "[s] \"That's great!\""
52060-95 = "We know that the Hyakkiyako students are already enthused about the Waraku Festival."
52060-96 = "So we have been patrolling the venue, monitoring potential safety issues, and clearing out the troublemakers."
52060-97 = "Yes! We are well aware of and deeply grateful for the Hyakkaryouran's efforts."
52060-98 = "However, we've hit a snag in our preparations. It's related to the festival, but...outside of it."
52060-100 = "What do you mean?"
52060-102 = "What do you think is the most important aspect of a successful festival?"
52060-103 = "Perhaps securing a suitable location?"
52060-105 = "Spirited decorations?"
52060-106 = "The food stalls, right? That's the first place I always hit."
52060-107 = "I agree. I cannot enjoy a festival until I've had a chicken skewer."
52060-108 = "Yes, chicken skewers are...important. You have a great point. But there are also many, many other foods featured at the festival."
52060-109 = "In fact, food is often the main source of revenue at every event."
52060-113 = "But...do you know where most of our festival ingredients come from?"
52060-114 = "[s] \"They're not from here?\""
52060-115 = "A few are, but most are imported from far away!"
52060-116 = "Most of our fresh ingredients come from the Ebisu Satellite School in the northern district."
52060-117 = "[s] \"Ebisu Satellite School...?\""
52060-118 = "Yes. While we are now a united Hyakkiyako, it didn't come easily. For years, we were split into warring satellite schools."
52060-119 = "We still have satellite schools in the more remote areas—the outskirts of Hyakkiyako."
52060-120 = "One of these, most relevantly, is Ebisu in the north."
52060-121 = "Ebisu Satellite School is surrounded by fertile farmland. For years, they've provided us with the choice ingredients that make our festivals so...craveable."
52060-125 = "Hm? That's near...the Great Snowfield, isn't it? I didn't know you could grow crops up there."
52060-126 = "Fufu... Root vegetables like radishes, potatoes, and carrots become sweeter the colder it is. And, unlike the Great Snowfield, Ebisu has seasons. It's quite pleasant in the summer!"
52060-128 = "Their fish, fruits, and cheese are also exquisite."
52060-129 = "And hairy crabs!"
52060-130 = "[s7] \"Sounds absolutely delicious.\"\n[s8] \"I'd like to visit someday.\""
52060-133 = "Well...Ebisu's asked us for help. And I think the Hyakkaryouran is uniquely qualified."
52060-140 = "They say that when the sky is gloomy or after the sun sets, some paranormal...entities appear and attack people."
52060-141 = "Paranormal...?"
52060-142 = "About that...Ebisu didn't have a better way to describe them."
52060-143 = "You see, these...entities...don't have a set form."
52060-144 = "Some people saw grotesque abominations, others viewed beasts, and others claimed to be confronted by old enemies."
52060-148 = "These entities all looked different, but they have two things in common."
52060-149 = "First, they embody the victim's greatest fear."
52060-150 = "Second, they cannot be damaged by firearms, at least none of the typical ones."
52060-159 = "Phantom Fables."
52060-160 = "Exactly! We're on the same page."
52060-161 = "Strange monsters that cause mayhem and only come out in the darkness..."
52060-162 = "They certainly sound similar to the Artifact Spirits that Nature's Beauty summoned during the last Lantern Festival."
52060-167 = "And, if memory serves me well, the only thing that can hurt these monsters is...the Hundred Lotus, correct?"
52060-168 = "..."
52060-170 = "There have only been a few sightings, but we don't want this to get out of hand. Ebisu needs help, and we need theirs."
52060-171 = "If possible, could the Hyakkaryouran investigate this? Our festival is at stake."
52060-173 = "This certainly sounds like a job for us..."
52060-174 = "The \"us\" isn't relevant. Only, Nagusa, as acting president, can wield the Hundred Lotus."
52060-180 = "We're required in the northern district?"
52060-181 = "I may not be as talented as Ayame...but I will give my absolute all."
52060-182 = "...There she is."
52060-183 = "All right! Let's crush those Spirits and heal Nagusa's arm while we're at it!"
52060-184 = "And rescue President Ayame as well!"
52060-186 = "Fufu... I'm so glad we're in agreement."
52060-187 = "All our interests align! It's like hitting two birds─"
52060-188 = "─or, should I say, THREE birds with one stone?"
52060-189 = "[s] \"And...why am I here?\""
52060-190 = "You know I would never waste your time, Sensei."
52060-191 = "Do you remember our quest to find Kuzunoha?"
52060-192 = "[s9] \"Of course.\"\n[s10] \"...There's no need to worry about that right now.\""
52060-197 = "Nyaha?! Th-There's no need...? "
52060-198 = "That's...surprising. I thought you were still trying to solve that Chroma problem."
52060-199 = "You've grown so much. You've really made a name for yourself, [USERNAME] Sensei."
52060-203 = "Well, not that you're looking, but I've heard rumors that the Great Prophet Kuzunoha resides at the Twilight Temple."
52060-204 = "Of course, like Kuzunoha herself, we're not even sure the Twilight Temple exists. A few students claim to have seen it, but...who knows?"
52060-205 = "I heard that the Twilight Temple is somewhere in the center of the Great Snowfield."
52060-206 = "Searching for a probably nonexistent temple in the vast, biting Snowfield certainly isn't my idea of a good time..."
52060-207 = "...but didn't Nagusa find Kuzunoha's letter in the snow up there? I doubt that's a mere coincidence."
52060-208 = "[s] \"You think she's in the Great Snowfield!\""
52060-209 = "The Great Snowfield isn't for the faint of heart, and none are more faint than Sensei. They wouldn't survive a single bullet."
52060-210 = "[s] \"That's a bit harsh...\""
52060-211 = "Fufu. But the district near the Ebisu Satellite School is nice and safe!"
52060-212 = "So if you stay close to the Hyakkaryouran, and lend a helping hand..."
52060-218 = "...Who knows, perhaps the legendary Great Prophet would notice!"
52060-219 = "[s11] \"Thank you, Niya.\"\n[s12] \"That was...very helpful.\""
52060-222 = "It was nothing! We're all just so grateful to have you and the Hyakkaryouran taking care of this."
52060-223 = "...Niya!"
52060-224 = "To the Snowfield?"
52060-225 = "No...not you, Chise. You need to stay here and help us prep for the Waraku Festival."
52060-226 = "I wanted to see the snow... The white clouds..."
52060-230 = "Oof... Chise, please don't be disappointed! You'll make me cry..."
52060-231 = "B-But it's still a no! Chise, this festival is all for you! You have to stay."
52060-232 = "[s] \"Next time, Chise. I promise.\""
52060-233 = "I will be waiting."
52060-235 = "While they're not Chise, Ebisu promised to have someone greet you when you arrive."
52060-236 = "Now I know you have the very capable Hyakkaryouran escorting you, but please be careful. This is foreign territory."
52060-237 = "Safe travels, Sensei!"
52060-239 = "Next Episode;Snow Country"

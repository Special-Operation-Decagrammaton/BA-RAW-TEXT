52060-187 = "ขอร้องหนึ่งอย่างแต่แก้ปัญหาได้ถึงสองปัญหา เหมือนยิงปืนนัดเดียวได้นกสองตัวเลยค่ะ"
52060-188 = "ไม่สิ หรือว่าจะเป็น 'ได้นกสามตัว' คะ?"

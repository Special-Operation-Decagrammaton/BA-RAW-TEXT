52060-72 = "4;카호;04;죄, 죄송합니다…… 저도 모르게 들뜬 나머지."
52060-73 = "2;니야;00;냐하하…… 괜찮습니다, 카호.\n#2;em;[재잘]"
52060-74 = "2;니야;01;그럼 이어서 카호가 선생님께 와라쿠 축제에 대한 설명을 계속해 주시겠어요?"
52060-75 = "4;카호;01;네, 와라쿠 축제는 말 그대로 치세 쨩의 매력을 선보이기 위해 기획된 축제로 치세 쨩의 모든 매력을 다양하게 즐길 수 있는 축제입니다.\n#4;greeting"
52060-76 = "4;카호;02;치세 쨩의 하이쿠를 감상할 수 있는 서화전부터 치세 쨩의 애장품 전시회, 그리고 치세 쨩의 이미지가 담긴 한정 굿즈 판매회까지…… \n#4;m3\n#2;dl"
52060-77 = "4;카호;99;하지만 축제의 하이라이트는 뭐니뭐니 해도 역시……"
52060-78 = "4;카호;16;치세 쨩이 부르는 노래를 직접 라이브로 들을 수 있는 축하 공연이죠!\n#4;closeup\n#fontsize;80"
52060-79 = "4;카호;03;치세 쨩은 원래 노래를 부르는 일이 많지 않아서 많은 사람들이 알지 못하지만, 치세 쨩의 목소리는 마음을 어루만져 주는 듯한 사랑스러운 매력이 있거든요.\n#4;em;[///]\n#4;closeup"
52060-80 = "4;카호;17;특히나 저희 음양부에서는 이번 공연에서 치세 쨩이 노래를 부르는 모습을 풀영상으로 담기 위해 800mm 망원렌즈가 달린 카메라를 3대나—\n#4;hophop\n#4;closeup"
52060-81 = "#all;hide"
52060-82 = "3;니야;04;카, 카호…… 그만하면 충분……\n#3;em;[땀]"
52060-83 = "3;치세;02;진정해~"
52060-84 = "#st;[0,0];instant;1;"
52060-85 = "#clearST"

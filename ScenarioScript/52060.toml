52060-26 = "3;렌게;04;스, 스승님?!\n#3;stiff"
52060-27 = "5;유카리;14;어머나, 선생님! 이렇게 다시 뵙게 되어 정말로 반갑사와요!\n#5;em;[반짝]\n#5;hophop"
52060-28 = "1;나구사ND;03;……좋은 아침이야, 선생님."
52060-29 = "#all;hide"
52060-30 = "3;니야;00;그리고, [USERNAME] 선생님도 먼 길 오시느라 정말 수고 많으셨습니다. 냐핫.\n#3;em;[재잘]"
52060-31 = "[s3] \"그렇게 먼 길도 아니었는걸.\"\n[s4] \"학생의 도움이 필요한 곳이 있다면 어디든 가야지!\""
52060-32 = "#wait;10"
52060-33 = "#wait;10"
52060-34 = "#all;hide"
52060-35 = "3;키쿄;04;음양부에서 갑자기 불렀다고 해서, 어느 정도의 각오는 했었지만……\n#3;em;…"
52060-36 = "3;키쿄;05;백화요란의 부원들과 샬레의 선생님이 동석한 자리에서 부탁할 일이라니, 간단한 문제가 아닌가 보네."
52060-37 = "#all;hide"
52060-38 = "3;니야;07;설마요~ 먼 곳에서 오신 손님들을 앞에 두고 무거운 부탁을 드릴 정도로 염치가 없지는 않답니다.\n#3;em;[음표]"
52060-39 = "3;니야;00;백귀야행에서 일어나는 대부분의 귀찮고 복잡한 일들은 저희 음양부에서 모두 도맡아 처리하고 있으니까요. 그렇지, 카호~?"
52060-40 = "5;카호;02;……네. '니야 님을 제외한' 저희 나머지 음양부원들이 처리하고 있지요.\n#5;em;[반응]\n#5;al\n#3;m1"
52060-41 = "3;니야;06;그렇게 쌀쌀맞게 말하다니, 너무해~\n#3;stiff"
52060-42 = "#st;[0,0];instant;1;"
52060-43 = "#clearST"
52060-44 = "#all;hide"
52060-45 = "3;키쿄;07\n#3;em;[한숨]\n#3;h\n#wait;800"
52060-46 = "3;키쿄;02;뭐, 니야 부장의 게으름은 백귀야행 내에서는 모르는 사람이 없을 정도니까."
52060-47 = "#all;hide"
52060-48 = "4;유카리;02\n2;렌게;02;나도 들었어. 니야 부장에게 일을 부탁하면, 부탁한 쪽이 답답해서 스스로 일을 처리해 버린다며?\n#2;em;[반응]"
52060-49 = "4;유카리;14;과연, 현명한 리-다는 스스로 문제를 해결하도록 유도한다더니…… 그게 참말이었네요!\n#4;em;[반짝]\n#4;hophop"
52060-50 = "#all;hide"
52060-51 = "3;니야;04;어, 어라? 어느새 제 청문회 같은 분위기가……?\n#3;em;[땀]\n#3;stiff"
52060-52 = "3;니야;02;여, 여하튼! 선생님께서도 아시겠지만, 저희 백귀야행 연합학원은 관광과 축제로 유명한 학원인 만큼 대부분의 사건 사고도 축제 기간에 발생하고 있지요."
52060-53 = "3;니야;01;언제나 그랬듯이, 이번에도 축제를 준비하는 데 선생님과 백화요란 여러분이 손을 빌려주셨으면 해서 함께 자리에 모시게 되었습니다."
52060-54 = "[s] \"또 새로운 축제를 준비하고 있는 거야?\""
52060-55 = "3;니야;00;네. 백귀야행의 축제는 사시사철, 때를 가리지 않고 언제나 진행되고 있으니까요.\n#3;em;[반응]"
52060-56 = "3;니야;07;봄의 벚꽃을 즐기며 꽃놀이를 즐기는 <백야앵제>, 무더운 여름의 날씨를 시원하게 씻겨주는 <백야수상제>, 가을의 풍작을 기원하며 복을 나누는 <신목제>, 겨울의 눈 조각을 관람할 수 있는 <눈꽃 축제>까지……"
52060-57 = "3;니야;01;1년 365일 어느 때에 찾아오시더라도, 백귀야행에서는 언제나 축제를 즐기실 수 있다고 해도 과언이 아니랍니다."
52060-58 = "3;니야;07;특히나 이번에 열리는 축제는 바로……\n#3;stiff"

[translation]
52060-1 = "ตอนที่ 6;เตรียมงานเทศกาล"
52060-6 = "อะฮ่า~ ยินดีต้อนรับค่ะ เฮียกกะเรียวรันทุกคน"
52060-7 = "ขอบคุณที่ตอบรับคำขอร้องที่กะทันหันของฉันนะคะ"
52060-8 = "เชิญเลย~"
52060-13 = "นี่ไม่ใช่เรื่องที่พวกฉันต้องได้รับคำขอบคุณหรอก เฮียกกะเรียวรันมีหน้าที่ให้ความร่วมมืออย่างแข็งขัน#nในการแก้ปัญหาด้านความปลอดภัยในเฮียกคิยาโคอยู่แล้ว"
52060-14 = "แล้วคราวก่อนพวกเราก็ได้รับความช่วยเหลือมากมายจากชมรมหยินหยางด้วย"
52060-15 = "แต่จะมีก็อย่างหนึ่งที่รบกวนใจฉันอยู่ นั่นก็คือ..."
52060-19 = "ทำไมคุณครูจากชาเล่ต์ถึงมาอยู่ที่นี่ล่ะ...?"
52060-20 = "[s1] \"ไม่ได้เจอกันนานเลยนะทุกคน\"\n[s2] \"เป็นยังไงกันบ้าง สบายดีมั้ย?\""
52060-26 = "ทะ... ท่านอาจารย์?!"
52060-27 = "อุ๊ย ท่านอาจารย์นี่นา! ดีใจจังเลยเจ้าค่ะที่ได้เจอกันอีกครั้ง!"
52060-28 = "อรุณสวัสดิ์ คุณครู..."
52060-30 = "ต้องขอบคุณคุณครู [USERNAME] เหมือนกันนะคะที่อุตส่าห์เดินทางมาไกลแบบนี้ ฮุฮุ"
52060-31 = "[s3] \"ก็ไม่ได้ไกลขนาดนั้นหรอก\"\n[s4] \"ครูไปได้ทุกที่เพื่อช่วยเหลือนักเรียนอยู่แล้ว!\""
52060-35 = "ฉันก็มีเตรียมใจไว้บ้างที่ชมรมหยินหยางเรียกให้มาหากะทันหัน..."
52060-36 = "แต่ถ้าเป็นงานที่ต้องมีทั้งสมาชิกเฮียกกะเรียวรันและคุณครูของชาเล่ต์ งั้นก็คงไม่ใช่งานง่ายๆ สินะ"
52060-38 = "ไม่หรอกค่ะ~ ฉันไม่ได้หน้าไม่อายขนาดที่จะขอความช่วยเหลือในเรื่องยากๆ จากคนที่ลำบากเดินทาง#nไกลมาหรอกค่ะ"
52060-39 = "ปัญหาที่น่ารำคาญและซับซ้อนในเฮียกคิยาโคน่ะ ส่วนใหญ่ทางชมรมหยินหยางจัดการให้อยู่ค่ะ ใช่มั้ยล่ะ คาโฮะ~?"
52060-40 = "ค่ะ... ชมรมหยินหยางทุกคน 'ยกเว้นคุณนิยะ' คอยจัดการปัญหาพวกนั้นให้อยู่ค่ะ"
52060-41 = "พูดจาเย็นชาแบบนั้นได้ยังไงคะ เกินไปแล้วนะ~"
52060-46 = "ก็นะ ไม่มีใครในเฮียกคิยาโคที่ไม่เคยได้ยินกิตติศัพท์ความขี้เกียจของหัวหน้านิยะอยู่แล้ว"
52060-48 = "ฉันก็เคยได้ยินมาเหมือนกัน เห็นว่าถ้าฝากงานบางอย่างให้หัวหน้านิยะทำ คนที่ฝากงานจะหงุดหงิด#nจนเอางานนั้นไปทำเองเลยละ"
52060-49 = "ที่คนบอกกันว่า ลีดด้า~ ที่หลักแหลมจะทำให้ลูกน้องคอยแก้ไขปัญหาด้วยตัวเอง... มันเป็นอย่างนี้สินะเจ้าคะ!"
52060-51 = "เอะ... เอ๋? ทำไมบรรยากาศเหมือนการสืบสวนฉันเลยล่ะคะ...?"
52060-52 = "ยะ... ยังไงก็เถอะค่ะ! อย่างที่คุณครูทราบว่าสหพันธ์เฮียกคิยาโคของเรามีชื่อเสียงเรื่องการท่องเที่ยว#nและการจัดงานเทศกาล เหตุการณ์และอุบัติเหตุส่วนใหญ่ก็เลยมักเกิดในช่วงเทศกาลค่ะ"
52060-53 = "วันนี้ฉันก็เลยเชิญคุณครูกับเฮียกกะเรียวรันมาที่นี่ เพื่อขอให้ทุกคนมาร่วมช่วยเหลือในการเตรียมงาน#nเทศกาลครั้งนี้ค่ะ"
52060-54 = "[s] \"กำลังเตรียมงานเทศกาลใหม่กันอีกแล้วเหรอ?\""
52060-55 = "ค่ะ ก็เฮียกคิยาโคจัดงานกันตลอดทั้งปี ไม่ว่าจะฤดูกาลไหนก็มีงานเทศกาลให้ได้รื่นเริงค่ะ"
52060-56 = "ฤดูใบไม้ผลิเรามี <เทศกาลแห่งค่ำคืนสีขาว> ให้สนุกไปพร้อมกับการชมดอกซากุระ ฤดูร้อนที่ร้อนอบอ้าว เราก็มี <เทศกาลสวนน้ำเฮียกคิยาโค> ตอนฤดูใบไม้ร่วงเราจัด <งานต้นไม้ศักดิ์สิทธิ์> เพื่ออธิษฐานขอผลผลิตที่อุดมสมบูรณ์ ในฤดูหนาวก็จัด <เทศกาลหิมะ> ที่มีประติมากรรมหิมะให้ได้ชม..."
52060-57 = "ไม่ว่าจะมาเยือนเฮียกคิยาโคในช่วงไหนของปี แขกผู้มาเยือนก็สนุกกับเทศกาลของเราได้ค่ะ"
52060-58 = "โดยเฉพาะอย่างยิ่งงานเทศกาลที่จะจัดขึ้นในครั้งนี้ นั่นก็คือ..."
52060-64 = "เทศกาลวาราคุ!"
52060-66 = "เย้~"
52060-72 = "ขะ... ขอโทษค่ะ... พอดีฉันตื่นเต้นมากไปหน่อย"
52060-73 = "อะฮะฮ่า... ไม่เป็นไรหรอกค่ะ คาโฮะ"
52060-74 = "ถ้างั้นคาโฮะช่วยอธิบายเกี่ยวกับเทศกาลวาราคุให้คุณครูฟังหน่อยได้มั้ยคะ?"
52060-75 = "ค่ะ เทศกาลวาราคุเป็นเทศกาลที่มีจุดประสงค์เพื่อเผยแพร่เสน่ห์ของชิเซะจัง ทุกคนจะได้ชื่นชมเสน่ห์#nในแง่มุมต่างๆ ของชิเซะจังในเทศกาลนี้ค่ะ"
52060-76 = "เรามีทั้งการจัดแสดงรูปเขียนพู่กันกลอนไฮกุของชิเซะจัง นิทรรศการของรักของหวงของชิเซะจัง และมีซุ้มขายสินค้าลิมิเต็ดเอดิชั่นที่มีรูปของชิเซะจังด้วย... "
52060-77 = "แต่สิ่งที่เป็นไฮไลท์ที่สุดของเทศกาลนี้จะเป็นอะไรไปไม่ได้นอกจาก..."
52060-78 = "การแสดงอวยพรที่จะได้ฟังชิเซะจังร้องเพลงสดๆ บนเวทีค่ะ!"
52060-79 = "ปกติชิเซะจังไม่มีโอกาสได้ร้องเพลงมากเท่าไร คนอื่นก็เลยไม่รู้ว่าเสียงของชิเซะจังทั้งไพเราะ และมีเสน่ห์จนช่วยปลอบประโลมจิตใจได้เลยละค่ะ"
52060-80 = "ทางชมรมหยินหยางก็เลยเตรียมกล้องเลนส์ถ่ายภาพระยะไกล 800 มม. เพื่อถ่ายวิดีโอตอนชิเซะจัง#nทำการแสดงไว้ถึง 3 ตัว..."
52060-82 = "คะ... คาโฮะ... ฉันว่าอธิบายแค่นั้นก็พอแล้วละ..."
52060-83 = "เอาแต่พอดีน้า~"
52060-88 = "อ๊ะ... ฉันเผลอพูดมากไปอีกแล้ว... ขอ... ขอโทษที่เสียมารยาทค่ะ"
52060-89 = "[s5] \"ดูเป็นเทศกาลที่ต้องลงมือลงแรงกันมากเลยนะ\"\n[s6] \"ทุกคนคงต้องทุ่มเทกับเทศกาลนี้กันมากเลยนะ\""
52060-92 = "นะ... แน่นอนสิคะ!"
52060-93 = "ฉันก็ตั้งใจเตรียมตัวอยู่เหมือนกัน~"
52060-94 = "[s] \"เก่งมาก เก่งมากเลย~\""
52060-95 = "พวกเราก็รู้กันว่าพวกนักเรียนเฮียกคิยาโคจำนวนมากต่างก็ตื่นเต้นและก็ตั้งตารอเทศกาลวาราคุที่กำลัง#nจะมาถึง"
52060-96 = "ตอนนี้พวกเราเฮียกกะเรียวรันก็ให้ความร่วมมืออย่างแข็งขันในเรื่องความปลอดภัย ทั้งการลาดตระเวน และจัดการนักเรียนเกเรที่มาป่วนสถานที่จัดงานเทศกาล"
52060-97 = "ฉันรู้ดีค่ะว่าเฮียกกะเรียวรันทุกคนกำลังให้ความช่วยเหลือเป็นอย่างดีในเรื่องการดูแลความปลอดภัย#nในเทศกาลวาราคุ"
52060-98 = "แต่เราเจอปัญหาเล็กน้อยเกี่ยวกับของที่ต้องเตรียมที่อยู่นอกสถานที่จัดงานน่ะค่ะ"
52060-100 = "ปัญหาอะไรเหรอเจ้าคะ?"
52060-102 = "ทุกคนคิดว่าองค์ประกอบที่สำคัญที่สุดของเทศกาลคืออะไรคะ?"
52060-103 = "สถานที่ที่รองรับคนจำนวนมากได้...?"
52060-105 = "ของตกแต่งงานเทศกาลที่หรูหราก็ขาดไม่ได้เจ้าค่ะ"
52060-106 = "แต่ก็ต้องมีของกินที่หลากหลาย ถึงจะได้บรรยากาศของงานเทศกาลไม่ใช่เหรอ?"
52060-107 = "อื้อ ถ้าไม่มียากิโทริ ก็ไม่ได้บรรยากาศของงานเทศกาลหรอก"
52060-108 = "ค่ะ... ยากิโทริ... ก็สำคัญเหมือนกัน แต่อาหารหลายๆ อย่างที่ลิ้มรสได้ในงานเทศกาลก็เป็น#nปัจจัยสำคัญอย่างหนึ่งที่ช่วยสร้างบรรยากาศของงานเทศกาลได้ค่ะ"
52060-109 = "นอกจากนี้ต้องยอมรับด้วยว่าแหล่งรายได้หลักๆ ของงานก็คือการบริโภคของนักท่องเที่ยวที่มาชมงานเทศกาล"
52060-113 = "แต่ทุกคนทราบมั้ยคะว่าวัตถุดิบอาหารมากมายที่ใช้ในเทศกาลของเฮียกคิยาโคนั้นมาจากที่ไหน?"
52060-114 = "[s] \"มาจากนอกเฮียกคิยาโคหรือเปล่า?\""
52060-115 = "ถ้าปริมาณน้อยก็อาจไม่เป็นปัญหา แต่การนำเข้าวัตถุดิบอาหารในปริมาณมากๆ จากที่ไกลเป็นสิ่งที่#nทำได้ลำบากมากค่ะ"
52060-116 = "วัตถุดิบอาหารสดใหม่ที่เฮียกคิยาโคใช้ส่วนใหญ่มาจากโรงเรียนสาขาเอบิสุที่อยู่ในเขตปกครองตนเอง#nทางเหนือค่ะ"
52060-117 = "[s] \"โรงเรียนสาขาเอบิสุ...?\""
52060-118 = "ใช่ค่ะ ถึงปัจจุบันเราจะใช้ชื่อว่าสหพันธ์เฮียกคิยาโค แต่ในสมัยที่เป็นยุคสงครามอันยาวนาน เฮียกคิยาโคแบ่งเป็นโรงเรียนสาขาหลายๆ แห่งค่ะ"
52060-119 = "แม้ในปัจจุบันจะไม่ค่อยปรากฏแล้ว แต่บางโรงเรียนที่อยู่นอกเขตปกครองตนเองที่เข้าถึงได้ยากก็ยัง#nคงเป็นรูปแบบของโรงเรียนสาขาเหมือนสมัยก่อนค่ะ"
52060-120 = "และโรงเรียนสาขาเอบิสุในเขตปกครองตนเองทางเหนือก็เป็นหนึ่งในนั้น"
52060-121 = "โรงเรียนสาขาเอบิสุเป็นผู้จัดหาผลิตภัณฑ์ทางการเกษตรและปศุสัตว์ที่สดใหม่จากพื้นที่การเกษตร#nที่กว้างใหญ่ให้เฮียกคิยาโคในทุกครั้งที่มีงานเทศกาลค่ะ"
52060-125 = "หืม? แต่บริเวณรอบๆ ทุ่งหิมะใหญ่ที่โรงเรียนสาขาเอบิสุอยู่มันหนาวมากจนบางทีก็มีหิมะตกในฤดูร้อน#nเลยนี่นา? ในที่แบบนั้นทำการเกษตรได้ด้วยเหรอ?"
52060-126 = "ฮุฮุ พวกพืชใต้ดินอย่างหัวไชเท้า มันฝรั่งและแคร์รอตน่ะ ยิ่งอากาศหนาวก็จะยิ่งมีรสหวาน แล้วถ้าไม่นับทุ่งหิมะใหญ่ พื้นที่อื่นในเขตปกครองตนเองทางเหนือก็ไม่ได้หนาวตลอดทั้งปีค่ะ"
52060-128 = "นอกจากนี้วัตถุดิบจำพวกปลา ผลไม้และชีสก็อร่อยขึ้นชื่อเหมือนกันค่ะ"
52060-129 = "ปูขนก็อร่อยนะ~"
52060-130 = "[s7] \"ฟังดูเป็นสถานที่ที่อุดมสมบูรณ์มากเลยนะ...\"\n[s8] \"ถ้ามีโอกาสก็อยากลองไปสักครั้งจัง\""
52060-133 = "แต่ว่า... เมื่อไม่นานมานี้มีการขอความช่วยเหลือมาจากโรงเรียนสาขาเอบิสุค่ะ"
52060-140 = "ทางนั้นบอกว่าในตอนกลางวันที่แจ่มใสก็ไม่มีปัญหาอะไร แต่พอพระอาทิตย์ตกดิน ก็จะมี 'สิ่งลึกลับน่าขนลุก' มาปรากฏตัวแล้วโจมตีผู้คนค่ะ"
52060-141 = "สิ่งลึกลับน่าขนลุกเหรอ...?"
52060-142 = "เราเรียกทุกสิ่งที่ออกมาโจมตีว่า 'สิ่งลึกลับน่าขนลุก' ค่ะ"
52060-143 = "นั่นก็เพราะ 'สิ่งนั้น' ที่ออกมาโจมตีผู้คนมีรูปร่างต่างกันออกไป ก็เลยเรียกรวมๆ ด้วยชื่อนั้นค่ะ"
52060-144 = "สำหรับบางคนมันดูเหมือนปีศาจน่าขยะแขยง แต่สำหรับบางคนมันเหมือนสัตว์ป่าที่ดุร้าย และสำหรับบางคนก็ปรากฏกายเป็นคนรู้จักที่ตัวเองกลัวด้วย..."
52060-148 = "แม้ว่าสิ่งลึกลับพวกนั้นจะมีรูปร่างต่างกัน แต่พวกมันก็มี 2 อย่างที่เหมือนกันค่ะ"
52060-149 = "อย่างแรกก็คือมันจะอยู่ในรูปร่างของสิ่งที่คนได้เห็นกลัวมากที่สุด"
52060-150 = "อย่างต่อไปก็คือ เราจัดการมันด้วยปืนหรืออาวุธทั่วๆ ไปไม่ได้ค่ะ"
52060-159 = "ตำนานร้อยเรื่องราววิญญาณลี้ลับ..."
52060-160 = "ค่ะ พวกฉันก็ได้ข้อสรุปแบบนั้นเหมือนกันค่ะ"
52060-161 = "สิ่งที่ใกล้เคียงกับภูตผีปีศาจที่เติบโตขึ้นมาท่ามกลางความมืดมิด กินความกลัวเป็นอาหาร และทำให้ผู้คนตกอยู่ในความสับสนอลหม่าน"
52060-162 = "ไม่ว่าสิ่งนั้นจะเป็นอะไรก็ตาม ฉันว่ามีโอกาสสูงที่สิ่งนั้นจะเกี่ยวข้องกับตำนานร้อยเรื่องราวที่ชมรม#nความงามของธรรมชาติเรียกออกมาในเทศกาลโคมไฟครั้งก่อนค่ะ"

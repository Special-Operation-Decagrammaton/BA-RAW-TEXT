52060-191 = "ยังไม่ลืมเรื่องคุซึโนฮะที่ฉันเคยบอกไปเมื่อวันก่อนใช่มั้ยคะ?"
52060-192 = "[s9] \"ไม่ลืมหรอก แต่เราไม่ต้องหาเธอแล้วละ\"\n[s10] \"อื้อ แต่ตอนนี้เราไม่ต้องตามหาเธอแล้วละ\""
52060-197 = "เอ๋?! ไม่ต้องตามหาแล้วงั้นเหรอคะ...? "
52060-198 = "นี่มันค่อนข้าง... คาดไม่ถึงเลยนะคะ ฉันคิดว่าคุณครูยังคงหาทางช่วยคนที่สัมผัสกับสีสันอยู่เสียอีก"
52060-199 = "ไม่ได้เจอกันพักเดียวก็เติบโตจนเปลี่ยนความคิดเสียแล้ว สงสัยฉันต้องมองคุณครู [USERNAME] ใหม่แล้วสินะคะ~"
52060-203 = "แม้ในบันทึกโบราณจะมีส่วนที่ไม่ชัดเจนอยู่หลายส่วน แต่ถ้าอ้างอิงจากทฤษฎีหนึ่งในนั้น ว่ากันว่าคุซึโนฮะ ผู้พยากรณ์ใหญ่ในตำนานพำนักอยู่ที่ <วิหารอัสดง> ค่ะ"
52060-204 = "แต่ก็เช่นเดียวกับการมีอยู่ของคุซึโนฮะ วิหารอัสดงแห่งนั้นก็เป็นสถานที่ในคำลือที่ไม่มีการพิสูจน์ว่า#nมีอยู่จริงหรือเปล่า จะมีก็แต่นักเรียนบางคนที่บอกว่าตัวเองเคยไปที่นั่นมาแล้วค่ะ~"
52060-205 = "แต่ก็ว่ากันว่ากลางทุ่งหิมะใหญ่ในทางเหนือมีเส้นทางที่นำไปสู่ <วิหารอัสดง> ได้ค่ะ"
52060-206 = "ก่อนหน้านี้ฉันเชื่อครึ่งไม่เชื่อครึ่งกับการออกไปอยู่ท่ามกลางทุ่งหิมะอันกว้างใหญ่เพื่อตามหาวิหารที่#nไม่รู้ว่ามีอยู่จริงหรือเปล่า ไม่ว่าใครที่ได้ฟังก็คิดว่าเป็นเรื่องที่ไม่เข้าท่าเอาเสียเลย ว่ามั้ยล่ะคะ?"
52060-207 = "แต่สถานที่ที่รองหัวหน้านางุสะในตอนนั้นได้รับจดหมายจากคุซึโนฮะมาก็คือทุ่งหิมะใหญ่นั่น ฉันก็เลยคิดว่านี่เป็นโชคชะตามากกว่าแค่ความบังเอิญค่ะ"
52060-208 = "[s] \"ถ้างั้นการไปทุ่งหิมะใหญ่ก็...\""
52060-209 = "ต่อให้เตรียมตัวไปดีแค่ไหน แต่ทุ่งหิมะใหญ่ก็ยังเป็นสถานที่ที่อันตรายอย่างยิ่ง ฉันไม่อยากแนะนำให้#nคุณครูผู้อ่อนแอที่แค่กระสุนปืนก็อดทนไม่ได้ต้องออกไปสำรวจทุ่งหิมะใหญ่หรอกค่ะ"
52060-210 = "[s] \"ต้องพูดถึงขนาดนั้นเลยเหรอ...\""
52060-211 = "ฮุฮุ แต่เขตปกครองตนเองแถวๆ โรงเรียนสาขาเอบิสุก็เป็นหมู่บ้านที่มีผู้คนพลุกพล่าน ที่นั่นน่าจะปลอดภัยสำหรับคุณครูค่ะ"
52060-212 = "ถ้าคุณครูร่วมมือกับนักเรียนเฮียกกะเรียวรันแล้วช่วยเหลือชาวบ้านจากปัญหามากมายที่นั่น"
52060-218 = "ใครจะไปรู้ล่ะคะ... บางทีคุซึโนฮะ ผู้พยากรณ์ใหญ่ในตำนานอาจชื่นชมในผลงานจนมาปรากฏตัวก็ได้?"
52060-219 = "[s11] \"ขอบใจนะ นิยะ\"\n[s12] \"ขอบใจนะ ช่วยได้มากเลยละ\""
52060-222 = "เรื่องเล็กน้อยค่ะ พวกฉันต่างหากที่ต้องขอบคุณทุกคนที่จะไปช่วยคลี่คลายปัญหาน่ารำคาญ... ไม่สิ ปัญหายากๆ ให้น่ะค่ะ"
52060-223 = "คุณนิยะ...!"
52060-224 = "งั้นฉันก็จะได้ไปหมู่บ้านทางเหนือกับคุณครูด้วยเหรอ?"
52060-225 = "ไม่ได้ค่ะ ชิเซะจังต้องอยู่ที่นี่เพื่อเตรียมเทศกาลวาราคุต่อสิคะ"
52060-226 = "แต่ฉันอยากเห็นทุ่งหิมะสีขาว... กับตาของตัวเองบ้าง"
52060-230 = "อึก... ดูใบหน้าที่หม่นหมองของชิเซะจังสิ... แค่เห็นหัวใจของฉันก็จะแตกสลายแล้ว..."
52060-231 = "ตะ... แต่ถึงยังไงก็ไม่ได้ค่ะ! เพื่อการเปิดเทศกาลวาราคุให้ประสบความสำเร็จ ฉันจะให้ชิเซะจังไปด้วยไม่ได้หรอกค่ะ!"

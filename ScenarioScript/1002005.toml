[translation]
1002005-1 = "เรียกมามีธุระอะไร?"
1002005-2 = "มาแล้วเหรอคุณครู... ทางนี้..."
1002005-3 = "นั่งนี่ นั่งตรงข้ามกับฉันนี่... ในตำแหน่งที่ฉันเห็นได้ชัดๆ..."
1002005-4 = "[s1] “โต๊ะในคาเฟ่กลางแจ้ง? ที่นั่งนี่จองไว้เหรอ?\"\n[s2] \"ก่อนอื่นมาดื่มอะไรกันดีมั้ย?\""
1002005-5 = "ฉันสั่งเครื่องดื่มไว้แล้ว... คุณครูช่วยนั่งรออยู่ตรงนั้น..."
1002005-6 = "ฉันสั่งเครื่องดื่มไว้แล้ว... คุณครูช่วยนั่งรออยู่ตรงนั้น..."
1002005-7 = "ที่ฉันเรียกคุณครูมาที่นี่ก็เป็นเพราะ.... ฉันไม่สบายใจถ้าคุณครูอยู่ในที่ที่ฉันมองไม่เห็น..."
1002005-8 = "ก็... ก็เลยเรียกมา..."
1002005-9 = "ฉันไม่มีธุระอย่างอื่น... ใช้เวลาแป๊บเดียวเท่านั้น..."
1002005-10 = "เพื่อจับตาดูคุณครูในฐานะชมรมทวงความยุติธรรม...!"
1002005-11 = "[s3] \"ธุระอื่น? ตอนนี้มีเรื่องที่กำลังแก้ปัญหาอยู่เหรอ?\"\n[s4] จ้องมองกระดาษโน้ตบนโต๊ะฝั่งโคฮารุ"
1002005-12 = "......!?"
1002005-13 = "......!?"
1002005-14 = "เรื่องนั้น... คือว่า..."
1002005-15 = "เพราะอย่างนั้น......ก็เลย..."
1002005-16 = "[s5] \"คาบเรียนเสริมที่ให้ช่วยก่อนหน้านี้สินะ\"\n[s6] \"น่าจะบอกตั้งแต่แรก\""
1002005-17 = "คือว่า... อะ... อืม....."
1002005-18 = "คือว่า... อะ... อืม....."
1002005-19 = "ฮ่าฮ่า อืม... ใช่ๆ..."
1002005-20 = "...ช่วยฉันหน่อยได้มั้ย? จะช่วยฉันใช่มั้ยล่ะ? คะ... คุณครู?!"
1002005-21 = "ฉันหมายถึงการเรียนตามปกติ ปกติเลย..."
1002005-22 = "...หือ?"
1002005-23 = "ได้อย่างงั้นเหรอ...? อ่อ... ขะ... ขอบคุณนะ ง่ายๆ แบบนี้เลย...?"
1002005-24 = "หืม? ตรงไหนน่ะเหรอ?"
1002005-25 = "...เอ่อ... ก่อนอื่นต้องเริ่มจากตรงนี้..."
1002005-27 = "(หลังจากที่ทำให้โคฮารุสงบลงก็เริ่มเข้าสู่เนื้อหาของคาบเรียนเสริม)"
1002005-28 = "(เนื้อหาของคาบเรียนเสริมมีเยอะแต่ไม่ได้ยากขนาดนั้น)"
1002005-29 = "(ใช้เวลาทำความเข้าใจกับเนื้อหาพื้นฐานสักพัก แล้วหลังจากนั้นมันก็ง่ายกว่าที่คิด)"
1002005-31 = "...เสร็จหมดแล้ว..."
1002005-32 = "จบแล้วเหรอ...? จริงๆ เหรอ? นี่ฉันเรียนจบเร็วขนาดนี้...?"
1002005-33 = "ไม่น่าเชื่อ... สุดยอดไปเลย..."
1002005-34 = "เป็น...เพราะคุณครู..."
1002005-35 = "......?"
1002005-36 = "...อ๊ะ!"
1002005-37 = "อย่างนั้นสินะ... คุณครู... ทำให้ขนาดนี้..."
1002005-38 = "เป็นเพราะคุณครู..."
1002005-39 = "...ไม่สิ ไม่ใช่อย่างที่คิด... คือว่า..."
1002005-40 = "ขอบคุณนะ... คุณครู จริงๆ นะ..."
1002005-41 = "...หืม? คุณครู?"
1002005-42 = "...มองอะไร...ตั้งแต่เมื่อกี้แล้ว...?"
1002005-43 = "[s7] \"หนังสือเล่มที่วางอยู่ข้างๆ ตั้งแต่เมื่อกี้คือเรื่องอะไรเหรอ?\"\n[s8] \"นั่นดูไม่น่าจะใช่หนังสือเรียนเลยนะ\""
1002005-44 = "หืม? เนี่ยเหรอ? คือว่า... นี่คือ ทำไมออกมาอยู่ตรงนี้ได้?"
1002005-45 = "หืม? เนี่ยเหรอ? คือว่า... นี่คือ ทำไมออกมาอยู่ตรงนี้ได้?"
1002005-46 = "นี่คือ... หนังสือ..."
1002005-47 = "...คือว่า"
1002005-48 = "เอ๊ะ?"
1002005-50 = "[s] \"อ่า...\""
1002005-52 = "[s9] \"...อ่า ว่าแล้วเชียวเป็นหนังสือพวกนั้นนี่เอง\"\n[s10] \"มีรสนิยมเกินวัยไม่เบาเลยนะ คุณโคฮารุ...\""
1002005-53 = "....."
1002005-54 = "....."
1002005-55 = "...!!"
1002005-56 = "...~~~~$#^@%#$@!!!!"
1002005-57 = "%$^#&%$%#$@^!!@#$^～～！！！"
1002005-59 = "(โครมมมม!!)"
1002005-61 = "(...นั่นคือสิ่งสุดท้ายที่คุณครูนึกออก)"
1002005-62 = "(พอโต๊ะพลิกล้มไป คุณครูก็สลบไปแล้วก็จำอะไรไม่ได้เลย)"

[translation]
1002005-1 = "What Can I Do for You?"
1002005-2 = "Th-There you are, Sensei. Over here."
1002005-3 = "You can sit there and I'll stay across from you. H-Hands where I can see them."
1002005-4 = "[s1] \"An outdoor cafe? Fancy. Did you have this reserved?\"\n[s2] \"Should we start off by ordering drinks.\""
1002005-5 = "I-I already ordered drinks for us. You just sit there, Sensei."
1002005-6 = "I-I already ordered drinks for us. You just sit there, Sensei."
1002005-7 = "Th-The reason I asked you here is because...I get anxious when I can't see you."
1002005-8 = "So I might as well..."
1002005-9 = "What I mean is, I have other things to do today. They aren't too time consuming..."
1002005-10 = "...but that's no excuse to take my eyes off of you! It's my duty as a Justice Task Force member!"
1002005-11 = "[s3] \"Other things? You mean the stuff you're working on now?\"\n[s4] Look at the notebook on the table near Koharu."
1002005-12 = "...?!"
1002005-13 = "...?!"
1002005-14 = "Th-This is just... I mean..."
1002005-15 = "I, uh..."
1002005-16 = "[s5] \"Is this about the make-up work you've wanted help with?\"\n[s6] \"You could have just said so from the beginning.\""
1002005-17 = "Well, I..."
1002005-18 = "Well, I..."
1002005-19 = "*sigh* You're right."
1002005-20 = "C-Can you help me, Sensei?"
1002005-21 = "I just...need help studying."
1002005-22 = "Huh?"
1002005-23 = "Really? Th-Thank you. I didn't expect you to accept so readily."
1002005-24 = "Huh? From which chapter?"
1002005-25 = "U-Um. It starts from here."
1002005-27 = "(I then did my best to guide the stammering Koharu through her make-up work.)"
1002005-28 = "(There was a lot for her to study, but the material itself wasn't very difficult.)"
1002005-29 = "(It took a while for her to understand the basics, but after that, it went smoothly.)"
1002005-31 = "And that's the last one."
1002005-32 = "Is it really over? How did I finish so quickly?"
1002005-33 = "I can hardly believe it."
1002005-34 = "Sensei. This is..."
1002005-35 = "...?"
1002005-36 = "...Ha."
1002005-37 = "Now I get it. This didn't even faze you."

[translation]
1002005-1 = "有什麼事？"
1002005-2 = "啊，老，老師，我在這邊……"
1002005-3 = "你坐那邊……必，必須讓老師待在我的視線範圍內……"
1002005-4 = "[s1] 「你有幫我佔位子啊？謝謝。」\n[s2] 「要先喝點什麼嗎？」"
1002005-5 = "嗯，我已經點好飲料了……老師不要有任何奇怪的舉動。"
1002005-6 = "嗯，我已經點好飲料了……老師不要有任何奇怪的舉動。"
1002005-7 = "我會把你叫來只是因為，你可能會在我看不到的地方做什麼勾當……讓我很不安。"
1002005-8 = "然，然後……"
1002005-9 = "除此之外，姑且還有另一件事……"
1002005-10 = "這，這是監視！基本上就是我身為實現正義部的一份子，要監視老師而已……！"
1002005-11 = "[s3] 「另一件事，是指小春正在解決的那個嗎？」\n[s4] 注視著小春手邊攤開的筆記"
1002005-12 = "……！？"
1002005-13 = "……！？"
1002005-14 = "這，這是……"
1002005-15 = "呃，該怎麼說，就是想順便……"
1002005-16 = "[s5] 「是之前要我講解的部分嗎？」\n[s6] 「一開始直說不就好了嗎。」"
1002005-17 = "因為，那個……"
1002005-18 = "因為，那個……"
1002005-19 = "嗯……"
1002005-20 = "你，你會幫我對吧？老師。"
1002005-21 = "很單純的，很普通的學習……"
1002005-22 = "……？謝，謝謝。"
1002005-23 = "這，這麼簡單就答應了……？"
1002005-24 = "咦？範圍嗎？"
1002005-25 = "啊，差不多從這裡開始，先是……"
1002005-27 = "（雖然一開始的舉止有些怪異，但隨著補課的進行，小春也慢慢冷靜下來了）"
1002005-28 = "（有疑問的部分雖然多，但都沒有很難）"
1002005-29 = "（雖然花了一點時間理解基本架構，不過之後進行得比想像中順利很多）"
1002005-31 = "完成了……"
1002005-32 = "老實說我完全沒想過能完成……而且，還這麼快……"
1002005-33 = "真不敢相信……"
1002005-34 = "這就是老師的力量……"
1002005-35 = "……？"
1002005-36 = "……哈！"
1002005-37 = "說，說的也是，畢竟是老師嘛……"
1002005-38 = "這種程度……"
1002005-39 = "不，不過……"
1002005-40 = "那個，老師……謝謝你……"
1002005-41 = "……老師？"
1002005-42 = "你從剛剛開始就在看什麼……？"
1002005-43 = "[s7] 「剛才就放在旁邊的那本是什麼書？」\n[s8] 「那本書也有要詢問的部分嗎？」"
1002005-44 = "這本……是什麼呢？"
1002005-45 = "這本……是什麼呢？"
1002005-46 = "這本書是……嘿咻……"
1002005-47 = "……啊。"
1002005-48 = "……"
1002005-50 = "[s] 「……」"
1002005-52 = "[s9] 「果然是那一類的書啊……」\n[s10] 「小春要看這種書似乎還太早了唷……」"
1002005-53 = "……"
1002005-54 = "……"
1002005-55 = "……！"
1002005-56 = "……～～～～$#^@%#$@！！！！"
1002005-57 = "%$^#&%$%#$@^!!@#$^～～！！！"
1002005-59 = "（哐鏘，哐鏘──！！）"
1002005-61 = "（……有記憶的部分就到此為止）"
1002005-62 = "（因為桌子翻過來的氣勢而失去意識，那之後的事情並不記得）"

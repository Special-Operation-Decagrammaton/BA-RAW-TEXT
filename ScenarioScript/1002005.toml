1002005-39 = "But, still. I guess what I want to say is..."
1002005-40 = "...thank you, Sensei. I mean it."
1002005-41 = "Huh? Is something wrong?"
1002005-42 = "What are you looking at?"
1002005-43 = "[s7] \"What's that book over there?\"\n[s8] \"That doesn't look like a textbook.\""
1002005-44 = "Huh? This? Um... What's this doing out here?"
1002005-45 = "Huh? This? Um... What's this doing out here?"
1002005-46 = "So, this book is..."

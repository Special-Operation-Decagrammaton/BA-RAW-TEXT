[translation]
90000150-1 = "ตอนที่ 15;ธารน้ำแข็ง 2"
90000150-3 = "ขอบคุณที่พยายามกันนะคะ เอมิ โทคิ เจออะไรบ้างไหมคะ?"
90000150-9 = "อื้ม พวกสมุนของเดคาแกรมมาทอนปรากฏตัวอยู่ทั่วทะเลที่แข็งจนเป็นธารน้ำแข็ง แต่ดูเหมือนว่าพวกนั้นไม่ได้กำลังทำตามคำสั่งหรือเคลื่อนไหวอะไรเป็นพิเศษ "
90000150-10 = "รู้สึกเหมือนสูญเสียระบบสั่งการและเร่ร่อนไปมามากกว่าด้วยซ้ำ"
90000150-16 = "และบนพิกัดที่ตรวจจับสัญญาณได้ นอกจากธารน้ำแข็งแล้วก็ไม่พบอะไรอื่นเลยค่ะ"
90000150-17 = "ฮืม... อย่างนั้นก็แสดงว่า... "
90000150-22 = "เมย์เดย์... เมย์เดย์... อ่า... อ่า... ได้ยินไหมคะ?"
90000150-23 = "มีการส่งผ่านข้อมูล...?!"
90000150-24 = "สัญญาณภัยพิบัติเหรอ...?!"
90000150-25 = "ไม่ใช่สักหน่อย!! เมย์เดย์เป็นการขอความช่วยเหลือต่างหากล่ะ! ต้องพูดอย่างนี้สิถึงจะถูก!!"
90000150-26 = "\"ทุกคนคงจะเหนื่อยกันมากเลยนะคะกว่าจะมาถึงที่นี่ งั้นก็เชิญตายได้เลยค่ะ\""
90000150-27 = "อะ... อะไรกัน?! พวกคุณคือ...?!"
90000150-32 = "?! "
90000150-33 = "แผ่นดินไหวเหรอคะ?!"
90000150-40 = "ไม่ใช่ค่ะ!! ลักษณะของคลื่นแตกต่างจากคลื่นแผ่นดินไหวค่ะ นี่มัน..."
90000150-46 = "หัวหน้า! เราตรวจจับพลังงานที่แข็งแกร่งได้จากใต้พื้นดิน 15 เมตร! มันกำลังมาทางนี้แล้ว!"
90000150-48 = "ใต้น้ำแข็งค่ะ! อยู่ในทะเล!"
90000150-49 = "สัญญาณนี้มัน... ผู้เลื่อมใสค่ะ! ผู้เลื่อมใสคนใหม่ของเดคาแกรมมาทอนกำลังเข้ามาค่ะ!!"
90000150-50 = "เอ๋...? พวกนี้โง่น้อยกว่าที่คิดอีก!!"
90000150-51 = "ฉันจะปรับการประเมินให้สูงขึ้นค่ะ เปลี่ยนจากคนโง่ เป็นต้าวโง่แล้วกัน..."
90000150-52 = "จะอะไรก็ช่างเถอะ ถ้างั้นก็ฝากด้วยนะคะ ไว้ม่องเท่งแล้วค่อยมาบอกลากันค่ะ บ๊ายบาย~"
90000150-53 = "ค่ะ ไว้ฉันจะตรวจสอบทีหลังว่าพวกนั้นทำอะไรกันอยู่ ตอนนี้เราต้องขัดขวางผู้เลื่อมใสที่กำลังเข้ามา#nทางเราก่อนค่ะ!"
90000150-54 = "[s] \"ทุกคนเตรียมต่อสู้!!\""
90000150-61 = "รับทราบค่ะ"
90000150-62 = "อื้ม!"

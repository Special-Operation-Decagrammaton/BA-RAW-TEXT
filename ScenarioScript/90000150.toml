[translation]
90000150-1 = "第16話;冰海（２）"
90000150-3 = "辛苦了。#n英美、季，有找到什麼嗎？"
90000150-9 = "嗯，十字神名的手下出沒於冰海各地。#n不過看起來並不像在執行命令，也不像是為了某個目的而行動。"
90000150-10 = "感覺很像失去命令體系後四處徘徊。"
90000150-16 = "在捕捉到信號的座標上，除了結凍的海之外什麼都沒有。"
90000150-17 = "唔……如果是這樣的話……"
90000150-22 = "……Mayday，Mayday……啊，啊啊……聽得到嗎？"
90000150-23 = "有訊息……！？"
90000150-24 = "是遇難的信號……！？"
90000150-25 = "才不是！！Mayday是求救訊號！！！"
90000150-26 = "各位來到這裡辛苦了。那麼，去死吧。"
90000150-27 = "什，什麼──！？你們是……！？"
90000150-32 = "！？"
90000150-33 = "是地震！？"
90000150-40 = "不！震盪的性質和地震不同。#n這是……"
90000150-46 = "部長！從地下15m處偵測到了強大能量！正在靠近這裡！"
90000150-48 = "……冰的下面！就在海底！"
90000150-49 = "這個信號是……預言者！#n十字神名的新預言者正在接近！！"
90000150-50 = "……咦？他們好像沒有想像中的那麼蠢耶！！"
90000150-51 = "提高對他們的評價。#n從超級廢物提升為普通廢物……"
90000150-52 = "是什麼都無所謂，總之辛苦了。#n我會等你們死後再告別的，掰掰～"
90000150-53 = "對方的身分稍後再確認吧。#n現在必須先阻止朝我們逼近的預言者！"
90000150-54 = "[s]「大家準備戰鬥！！」"
90000150-61 = "我明白了。"
90000150-62 = "是！"

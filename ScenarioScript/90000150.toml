[translation]
90000150-1 = "Episode 16;Glacial Sea 2"
90000150-3 = "Thank you for all your hard work, Eimi, Toki. Do you have anything to report?"
90000150-9 = "Yes. We detected Decagrammaton followers wandering around the area. However, they do not appear to be working towards any particular ends. "
90000150-10 = "It appears closer to a beehive that has lost its queen."
90000150-16 = "At the signal's coordinates, we found only ice and sea."
90000150-17 = "Hm... Interesting... "
90000150-22 = "... Mayday, mayday... One, two. Can you hear me?"
90000150-23 = "We are receiving radio communications, President."
90000150-24 = "Mayday? A distress signal?"
90000150-25 = "No, no, no! People only say that if they're in trouble. Let me do it!"
90000150-26 = "Thank you very much for coming all this way. Now, please die."
90000150-27 = "Wh-What?! You are...?!"
90000150-32 = "What's happening? "
90000150-33 = "An earthquake?"
90000150-40 = "No! These readings aren't indicative of seismic waves. It's something else."
90000150-46 = "President! There appears to be something approaching us from about fifteen meters away."
90000150-48 = "It's underwater! Below the ice!"
90000150-49 = "These readings... It's a prophet! It's another prophet of Decagrammaton!"
90000150-50 = "Oh? Wow! Looks like you've got some brains!"
90000150-51 = "Fascinating. I'll need to redo my calculations. They're not totally lame, just kind of lame?"
90000150-52 = "The lame levels of dead people hold no bearing on us. I'll pay my respects at your graves. Bye, now."
90000150-53 = "Let's figure out who they are later. We need to stop the prophet heading towards us for now!"
90000150-54 = "[s] \"Is everyone ready to fight?\""
90000150-61 = "Yes."
90000150-62 = "Yes!"

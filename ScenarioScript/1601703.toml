[translation]
1601703-1 = "I hate this world "
1601703-2 = "（前往了青葉告知的地點）"
1601703-8 = "[ns]「是這裡嗎……」"
1601703-12 = "啊，老師……！"
1601703-17 = "謝，謝謝老師願意過來……"
1601703-18 = "沒想到老師真的來了……"
1601703-22 = "啊！今，今天的工作是維修號誌燈……"
1601703-23 = "這個平交道的號誌燈，一直會異常閃爍……"
1601703-24 = "明明沒有火車經過，警報也一直響個不停……"
1601703-28 = "啊，就像現在這樣……"
1601703-29 = "[s]「那得快點修好呢。」"
1601703-30 = "是，是的……那麼我先檢查一下。"
1601703-35 = "嗯……機器配線沒問題……"
1601703-36 = "是感應器的問題嗎……"
1601703-40 = "先試試看吧……"
1601703-44 = "嘿，嘿咿……！"
1601703-49 = "再，再來一次……！"
1601703-54 = "[ns]「這，這樣真的可以嗎？」"
1601703-58 = "咦，咦？"
1601703-59 = "[s]「我是說用管鉗敲號誌燈真的沒問題嗎……？」"
1601703-60 = "啊……"
1601703-64 = "啊，啊啊！"
1601703-65 = "是的……嘿嘿。"
1601703-66 = "大部分的機器要是出問題的話，只要打幾下就能解決了……"
1601703-67 = "就，就跟人一樣……"
1601703-68 = "[s]「你剛才是不是說了什麼很不妙的話！？」"
1601703-69 = "總，總之……這樣應該就能修好了……"
1601703-70 = "必須在下一班火車經過之前完成修理才行……"
1601703-71 = "我，我得加快動作了……"
1601703-78 = "去，去死吧……！！"
1601703-91 = "……安靜下來了呢。"
1601703-92 = "[s]「好像修好了？」"
1601703-93 = "以，以防萬一，再觀察一下吧……"
1601703-96 = "（就這樣和青葉一起觀察平交道……）"
1601703-100 = "（確認號誌只有在火車經過時才會正常啟動）"
1601703-103 = "好，好像修好了呢……嘿嘿……太好了。"
1601703-104 = "[s]「那個方法居然真的有效啊……」"
1601703-105 = "要，要是沒效的話，就得把裡面全部拆開維修了……"
1601703-106 = "幸好只需要用A計畫就能排除問題……"
1601703-107 = "辛，辛苦您了……老師。"
1601703-108 = "[s1]「我什麼都沒做。」\n[s2]「好像根本不需要我……」"
1601703-113 = "那，那個……"
1601703-114 = "其實……"
1601703-115 = "這些工作，我一個人也不是無法完成……"
1601703-116 = "但，但是我想到老師上次說過，隨時都可以找您……"
1601703-117 = "所以……"
1601703-118 = "才，才抱著是不是可以期待一下……的心情，試著聯絡看看……"
1601703-119 = "沒，沒想到老師真的來了……"
1601703-120 = "……"
1601703-121 = "對，對不起！老師您明明很忙的說！#n嗚啊啊……"
1601703-125 = "[ns3]「如果是這樣的話，當然要找我囉。」\n[ns4]「回應學生的呼喚，就是老師的職責。」"
1601703-130 = "是，是嗎……"
1601703-131 = "老師是會回應期待的人……呢……"
1601703-132 = "[s5]「也，也不是每次都能使命必達哦！」\n[s6]「我也不能保證每次都能這樣……」"
1601703-137 = "嘿，嘿嘿……"
1601703-138 = "啊……說的也是。畢竟老師也是人呢……"
1601703-139 = "真的很感謝老師今天願意過來。#n就算沒有下次，光是今天就已經……"
1601703-140 = "呵呵。"
1601703-142 = "（於是一邊和青葉聊著各種話題，一邊踏上了歸途）"

[translation]
1601703-1 = "I hate this world"
1601703-2 = "(คุณครูไปยังสถานที่ที่อาโอบะบอก)"
1601703-8 = "[ns] \"ที่นี่งั้นเหรอ...\""
1601703-12 = "อ๊ะ คุณครู...!"
1601703-17 = "ขะ... ขอบคุณที่มานะคะ..."
1601703-18 = "คิดไม่ถึงเลยว่าคุณครูจะมาจริงๆ..."
1601703-22 = "อ้อ! งะ... งานที่ต้องทำวันนี้คือการซ่อมบำรุงเครื่องส่งสัญญาณค่ะ"
1601703-23 = "ได้ยินมาว่าสัญญาณไฟตรงทางตัดข้ามทางรถไฟนี้มันกระพริบแปลกๆ อยู่เรื่อย..."
1601703-24 = "และต่อให้รถไฟไม่มา ก็มีเสียงเตือนอยู่ตลอดเลยค่ะ..."
1601703-28 = "อ๊ะ อย่างที่ดังตอนนี้ไงคะ..."
1601703-29 = "[s] \"คงต้องรีบซ่อมแล้วสินะ\""
1601703-30 = "ชะ... ใช่ค่ะ... งั้นฉันจะลองไปตรวจสอบดูก่อนค่ะ"
1601703-35 = "ฮืม... สายไฟก็ไม่มีปัญหา..."
1601703-36 = "หรือว่าจะเป็นที่เซ็นเซอร์นะ..."
1601703-40 = "งั้นขอลองดูหน่อย..."
1601703-44 = "นะ... นี่แหนะ...!"
1601703-49 = "ขะ... ขออีกครั้ง...!"
1601703-54 = "[ns] \"บะ... แบบนั้นก็ได้เหรอ?\""
1601703-58 = "คะ... คะ?"
1601703-59 = "[s] \"เอาประแจคอม้าตีเครื่องส่งสัญญาณก็ได้เหรอ...?\""
1601703-60 = "หืม..."
1601703-64 = "อะ... อ้อ!"
1601703-65 = "ได้ค่ะ... แหะๆ"
1601703-66 = "ปัญหาส่วนใหญ่ของอุปกรณ์พวกนี้แก้ได้ด้วยการใช้กำลังแบบนี้ละค่ะ..."
1601703-67 = "กะ... กับคนก็เหมือนกันค่ะ..."
1601703-68 = "[s] \"เหมือนครูเพิ่งได้ยินคำที่ปล่อยผ่านไปไม่ได้นะ?!\""
1601703-69 = "อะ... เอาเถอะค่ะ... สรุปว่าถ้าซ่อมแบบนี้ แป๊บเดียวก็กลับมาใช้ได้ค่ะ..."
1601703-70 = "ฉันต้องซ่อมให้เสร็จก่อนที่รถไฟขบวนถัดไปจะมาถึง..."
1601703-71 = "งั้นฉันจะรีบซ่อมนะคะ..."
1601703-78 = "พังบ่อยดีนักใช่มั้ย ตายซะ...!!"
1601703-91 = "มันเงียบลงแล้วค่ะ..."
1601703-92 = "[s] \"น่าจะกลับมาใช้งานได้แล้วนะ?\""
1601703-93 = "ระ... รอดูอาการสักพักดีกว่าค่ะ"
1601703-96 = "(คุณครูกับอาโอบะเฝ้าสังเกตทางตัดข้ามทางรถไฟอยู่สักพัก)"
1601703-100 = "(อุปกรณ์ทำงานปกติตอนที่รถไฟวิ่งผ่านไป)"
1601703-103 = "ปะ... เป็นปกติแล้วค่ะ... แหะๆ... ซ่อมได้จริงๆ ด้วย"
1601703-104 = "[s] \"ซ่อมแบบนั้นก็ได้ผลอยู่นะเนี่ย...\""
1601703-105 = "ถะ... ถ้าเกิดยังใช้ไม่ได้ขึ้นมา ฉันคงก็ต้องแกะชิ้นส่วนข้างในออกมาดูหมดเลย..."
1601703-106 = "แต่ก็โชคดีที่จบที่แพลน A นะคะ..."
1601703-107 = "ขะ... ขอบคุณที่ทำงานอย่างหนักค่ะ คุณครู"
1601703-108 = "[s1] \"แต่ครูไม่ได้ทำอะไรเลยนะ...\"\n[s2] \"ครูไม่ได้ช่วยอะไรเลยต่างหาก...\""
1601703-113 = "อะ... เอ่อ..."
1601703-114 = "ที่จริงแล้ว..."
1601703-115 = "งานนี้ฉันทำคนเดียวก็ได้ค่ะ..."
1601703-116 = "ตะ... แต่ฉันจำได้ว่าคราวก่อนคุณครูบอกว่ามีอะไรก็ให้บอกได้ตลอด..."
1601703-117 = "ฉันก็เลย..."
1601703-118 = "ลองติดต่อไปด้วยความคิดที่ว่า... จะ... จะลองคาดหวังดูได้มั้ยนะ..."
1601703-119 = "ตะ... แต่ฉันไม่คิดเลยนะคะว่าคุณครูจะมาจริงๆ..."
1601703-120 = "..."
1601703-121 = "ทะ... ทั้งที่น่าจะมีงานยุ่งแท้ๆ ต้องขอโทษด้วยนะคะ! ฮืออ..."
1601703-125 = "[ns3] \"ทำดีแล้วละที่เรียกครูมา\"\n[ns4] \"ครูต้องตอบรับคำขอร้องของนักเรียนอยู่แล้ว\""
1601703-130 = "ยะ... อย่างนั้นสินะคะ..."
1601703-131 = "คุณครูเป็นคนที่ตอบสนองต่อความคาดหวังสินะคะ..."
1601703-132 = "[s5] \"อะ... อาจจะไม่ใช่ทุกเรื่องก็ได้นะ!\"\n[s6] \"คะ... ครูก็ไม่ได้เป็นแบบนั้นเสมอไปหรอก...\""
1601703-137 = "ฮุ... ฮุฮุ..."
1601703-138 = "อ่า... นั่นสินะคะ คุณครูก็เป็นคนเหมือนกันนี่นา..."
1601703-139 = "วันนี้ขอบคุณที่มานะคะ ต่อให้จะไม่มีครั้งต่อไป แต่วันนี้ฉันขอ..."
1601703-140 = "ฮุฮุ"
1601703-142 = "(จากนั้นคุณครูก็พูดคุยเรื่องนู่นนี่กับอาโอบะ แล้วจึงกลับออกมา)"

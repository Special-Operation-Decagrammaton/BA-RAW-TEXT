1601703-119 = "I-I didn't know if you'd actually show up."
1601703-120 = "..."
1601703-121 = "I-I hope you weren't too busy!"
1601703-125 = "[ns3] \"In that case, you did well.\"\n[ns4] \"I always respond to students' calls. It's what I do.\""
1601703-130 = "I-I see."
1601703-131 = "I guess that's why they call you Sensei..."
1601703-132 = "[s5] \"A-Although not necessarily 24-7!\"\n[s6] \"Maybe not literally ALWAYS...\""
1601703-137 = "P-Pfft..."
1601703-138 = "Well...right, of course. You're only human."
1601703-139 = "Thank you for coming today. Even if it's just this one time..."
1601703-140 = "Fufu."

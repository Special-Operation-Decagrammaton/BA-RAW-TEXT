[translation]
84303400200-5 = "你帶回來的遊戲已經分析完畢了。"
84303400200-6 = "雖然技術並不算特別出色，不過至少具備足以被稱為「駭客」的基本實力。#n這並非遊戲開發部的學生有辦法察覺的水準。"
84303400200-7 = "對方巧妙地修改了程式碼，在不違反規則的情況下，讓結果往最壞的方向發展。"
84303400200-8 = "由於這款遊戲的難度並不低，要說它是能在人類心裡留下創傷的凶器也不為過。"
84303400200-9 = "程式遭到滲透的時間點也跟證詞吻合。#n因此就像遊戲開發部的人說的一樣，這件事他們沒有責任。"
84303400200-10 = "……我再找找其他程式碼。"
84303400200-11 = "感覺還能挖掘出更多東西。"

84303400200-5 = "3;리오;02;가지고 온 게임에 대한 분석이 끝났어.\n#3;em;…\n#3;a"
84303400200-6 = "3;리오;99;그리 대단한 수준은 아니야. 하지만 최소한 '해커'라고는 부를 만한 실력이었지. 게임개발부 학생들이 알아차릴 수 있는 레벨은 아니었어."
84303400200-7 = "3;리오;01;말했던 대로네. 의도적인 부분에서 교묘하게, 코드의 룰을 어기지 않는 선 내에서 최악의 결과만 나오도록 조작돼 있어."
84303400200-8 = "3;리오;02;기본적으로 난이도가 낮지 않았던 게임이니, 인간의 마음을 상처 입히기에는 충분한 흉기라고 봐도 무방할 정도야."
84303400200-9 = "3;리오;01;코드가 침투한 시기도 증언과 일치해. 게임개발부는, 본인들의 말대로 이 사태에 대한 책임이 없어."
84303400200-10 = "3;리오;99;……조금 더 코드를 찾아볼게."
84303400200-11 = "3;리오;03;어쩐지 더 많은 걸 찾아낼 수 있을 것 같은 예상이 들어."
84303400200-12 = "#wait;100"

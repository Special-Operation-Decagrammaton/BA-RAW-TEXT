[translation]
10044070-1 = "第7話;列車不會獨自奔跑"
10044070-2 = "喂，那輛列車！"
10044070-3 = "[ns]「這個聲音是……」"
10044070-7 = "這裡是格黑娜的自治區！#n要是敢再繼續鬧事的話，就別怪我不客氣了！！"
10044070-8 = "[ns]「伊織！！！」"
10044070-9 = "……？"
10044070-10 = "嗯？這是……"
10044070-11 = "老師？怎，怎麼回事！老師為什麼會在這裡！？"
10044070-12 = "[s1]「這件事說來話長……！」\n[s2]「之後再跟你說明，可以先幫我們脫離這裡嗎？」"
10044070-18 = "不行！！而且為什麼又是老師和列車這個組合啊！"
10044070-19 = "你又被捲入什麼怪事了對不對？#n這裡誤會那裡誤會之後就變成這樣了對吧！！"
10044070-20 = "[s3]「不愧是伊織！一眼就看穿了！」\n[s4]「只要你願意幫忙，要舔腳什麼的也沒問題！！」"
10044070-23 = "亂，亂講！不要胡說八道！！"
10044070-24 = "你說之後會好好解釋，所以拜託我幫忙？"
10044070-25 = "……"
10044070-26 = "呃……這……"
10044070-27 = "唉……被捲入這種事肯定沒好處……！"
10044070-29 = "不，不愧是老師……連格黑娜的學生都很熟呢……"
10044070-30 = "老師～有舔過腳嗎～？"
10044070-31 = "該不會連我們的也想舔吧？噗哈哈！"
10044070-34 = "呼，從車頂進入車廂！"
10044070-35 = "咯哈哈，這輛列車我們就收下了！！"
10044070-43 = "啊啊……！連列車上都……！"
10044070-44 = "爬到車頂上了～不愧是熱門優勝候補～"
10044070-49 = "噗哈哈！他們來真的耶！#n這樣下去，要是貨物爆炸的話可能會很麻煩哦？"
10044070-50 = "怎，怎麼辦～！！"
10044070-57 = "咳咳！怎，怎麼回事！"
10044070-58 = "格，格黑娜風紀委員會的傢伙正在發動攻擊……！！"
10044070-64 = "唉……真是的……"
10044070-65 = "老師，之後你一定要好好解釋清楚哦！！"
10044070-66 = "[ns5]「謝謝！！！」\n[ns6]「不愧是伊織！！」"
10044070-70 = "噗哈哈！本事很不錯呢！！"
10044070-71 = "超酷～格黑娜的英雄～"
10044070-73 = "這，這些傢伙是怎麼回事……"
10044070-74 = "好，那我們也上去把車頂清理乾淨吧！！"
10044070-75 = "呃，呃啊啊！這世界真該死……！！"
10044070-77 = "麻煩你指揮了，老師！！"

[translation]
10044070-1 = "ตอนที่ 7;รถไฟไม่ได้วิ่งเพียงลำพัง"
10044070-2 = "นี่ รถไฟขบวนนั้นน่ะ!"
10044070-3 = "[ns] \"เสียงนี้มัน...\""
10044070-7 = "ตรงนี้คือพื้นที่ของเขตการปกครองตนเองเกเฮนน่านะ! ถ้ายังก่อความวุ่นวายไม่เลิก ฉันจะไม่อยู่เฉยๆ แน่!!"
10044070-8 = "[ns] \"อิโอริ!!!\""
10044070-9 = "...?"
10044070-10 = "เอ๋? อะไรกัน..."
10044070-11 = "คุณครู?? อะ... อะไรเนี่ย! ทำไมถึงไปอยู่ตรงนั้น?!"
10044070-12 = "[s1] \"เรื่องมันยาวน่ะ แต่ช่วยครูก่อนได้มั้ย...!\"\n[s2] \"ไว้ครูจะอธิบายให้ฟังนะ แต่ช่วยให้เราออกไปจากตรงนี้ก่อนได้มั้ย?\""
10044070-18 = "ว่าไงนะ!! แล้วนี่ไปเกี่ยวข้องได้ยังไงกัน! คุณครูกับรถไฟเนี่ย!!"
10044070-19 = "เข้าไปเกี่ยวพันกับเรื่องอะไรแปลกๆ อีกแล้วใช่มั้ย? แล้วที่เป็นแบบนี้ก็เพราะเรื่องเข้าใจผิดด้วย?"
10044070-20 = "[s3] \"สมกับเป็นอิโอริเลย! ไม่เสียแรงที่เลียเท้าให้!\"\n[s4] \"ถ้าช่วยครู เดี๋ยวครูไปเลียเท้าให้อีกนะ!!\""
10044070-23 = "พะ... พูดอะไรออกมาเนี่ย!! หยุดพูดอะไรแปลกๆ เลยนะ!!"
10044070-24 = "ไว้จะอธิบายให้ฟัง เพราะงั้นก็ขอให้ช่วยกันก่อนงั้นเหรอ?"
10044070-25 = "......"
10044070-26 = "อะ... อึกก..."
10044070-27 = "เฮ้อ... ไม่อยากเข้าไปข้องเกี่ยวกับเรื่องแบบนี้เลย...!"
10044070-29 = "คะ... คุณครูก็... รู้จักกับนักเรียนโรงเรียนเกเฮนน่าเป็นอย่างดีเลยนะคะ..."
10044070-30 = "คุณครู เคยเลียเท้าคนอื่นเหรอ?"
10044070-31 = "อยากเลียของพวกเราด้วยมั้ยล่ะ? วะฮะฮ่า!"
10044070-34 = "หึหึ เจาะหลังคาเข้าไปเลย!"
10044070-35 = "ฮ่าฮ่าฮ่า ขอปล้นรถไฟขบวนนี้ละนะ!!"
10044070-43 = "อ๊ะ...! ไม่ได้จะเอาแค่สินค้า แต่จะเอารถไฟด้วยเหรอ...!"
10044070-44 = "ขึ้นมาบนหลังคาแล้ว สมกับที่เป็นตัวเต็งเลย"
10044070-49 = "วะฮะฮ่า! ไม่ใช่เล่นๆ เลยนะเนี่ย! ถ้าสินค้าเสียหายไปด้วย คงเป็นเรื่องใหญ่เลยนะ?"
10044070-50 = "ทะ... ทำยังไงดีล่ะคะ~!!"
10044070-57 = "เฮือก! อะ... อะไรน่ะ!"
10044070-58 = "พวกคณะกรรมการวินัยจากเกเฮนน่ามาโจมตีเหรอ...!!"
10044070-64 = "เฮ้อ... จริงๆ เลย..."
10044070-65 = "คุณครู ไว้หลังจากนี้ต้องมาอธิบายกับฉันให้ละเอียดเลยนะ!!"
10044070-66 = "[ns5] \"ขอบใจนะ!!!\"\n[ns6] \"สมกับที่เป็นอิโอริเลย!!\""
10044070-70 = "วะฮะฮ่า! ฝีมือไม่เบาเลยนะ!!"
10044070-71 = "เท่สุดๆ ไปเลย ฮีโร่แห่งเกเฮนน่า"
10044070-73 = "อะ... อะไรของเขา..."
10044070-74 = "ดีละ งั้นพวกเราก็ขึ้นไปด้วยเลย! ไปทำความสะอาดหลังคารถไฟกัน!!"
10044070-75 = "งะ... แงงง! โลกใบนี้บ้าบอที่สุด...!!"
10044070-77 = "สั่งการให้หน่อยนะ คุณครู!!"

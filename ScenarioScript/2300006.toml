[translation]
2300006-1 = "A Little Date"
2300006-2 = "Schale Executive Office"
2300006-4 = "I had a mountain of papers I'd been putting off stacked on my desk."
2300006-5 = "I should really get started on these..."
2300006-6 = "*ring*"
2300006-7 = "[ns] \"Who is it?\""
2300006-11 = "[ns] \"No. I have to focus on work for now.\""
2300006-15 = "I received a few more MomoTalk pings, but tried my best to ignore them and focus on my work."
2300006-17 = "The next day..."
2300006-18 = "I finally finished sorting through the documents by lunchtime."
2300006-22 = "I considered taking a nap, but I had drank too much coffee."
2300006-23 = "After thinking it over, I decided to go for a short walk."
2300006-26 = "I spotted a familiar face while walking along the trail near Schale."
2300006-28 = "[s] \"Airi?\""
2300006-29 = "Sensei?"
2300006-30 = "Hey, Sensei! Long time no see!"
2300006-31 = "Where are you off to?"
2300006-32 = "Oh, you're just out for a walk?"
2300006-33 = "Does that mean you're finally free?"
2300006-34 = "Yay! I've missed you, Sensei! Heehee."
2300006-35 = "[s1] \"How have you been?\"\n[s2] \"I'm sorry if I worried you.\""
2300006-36 = "That's so like you, Sensei."
2300006-37 = "I've been great, as usual."
2300006-38 = "O-Oh, no. Don't worry about it."
2300006-39 = "I guess I was just excited to see you again."
2300006-40 = "I know how busy you've been, so I hope you're all right."
2300006-41 = "I was wrapped up studying for exams, so I couldn't even come visit you."
2300006-42 = "Huh? Then what am I doing here?"
2300006-43 = "Like I said, I WAS wrapped up. It's all done now."
2300006-44 = "I can finally go on a walk like I've been wanting to."
2300006-45 = "..."
2300006-46 = "If I had known I'd run into you..."
2300006-47 = "Huh?"
2300006-48 = "Oh, no. It's just, I had no idea I'd see you today."
2300006-49 = "So I don't have any desserts prepared..."
2300006-50 = "There aren't any cafes around here either..."
2300006-51 = "I tell Airi that it's okay, but she still looks concerned."
2300006-52 = "[s] \"Huh? Is that an ice cream truck over there?\""
2300006-53 = "What? An ice cream truck?"
2300006-54 = "Wow, I haven't seen one of those in a while."
2300006-55 = "When I was little, I used to buy from them all the time."
2300006-56 = "Huh? Sensei?"
2300006-59 = "Wh-What...?"
2300006-63 = "I take Airi's hand, and we walk toward the ice cream truck."
2300006-64 = "Here's the ice cream you ordered."
2300006-66 = "Airi and I decided to take a break on the riverside path with our ice cream."
2300006-69 = "― Aw. Thank you for treating me, Sensei.[wa:6920] "
2300006-70 = "― It's so...sweet![wa:280] "
2300006-73 = "― It's been a long time since I've had ice cream not from a cafe.[wa:7260] "
2300006-74 = "― It's even better having it with you.[wa:4080] "
2300006-77 = "[ns3] \"I'm sorry it isn't much, Airi.\"\n[ns4] \"I wish I could have gotten you something better.\""
2300006-80 = "― N-No, it's really okay.[wa:4800] "
2300006-81 = "― I would even say it's more fun this way![wa:1120] "
2300006-84 = "― I'm enjoying myself because...[wa:6780] "
2300006-85 = "― Well, you know. It's just the two of us here...[wa:5160] "
2300006-87 = "― My heart feels like it's going to leap out of my chest.[wa:5260] "
2300006-89 = "― I-I mean, nothing![wa:4560] "
2300006-90 = "― You didn't hear anything![wa:3420] "
2300006-92 = "― Haha, hahaha...[wa:840] "
2300006-95 = "― Thank you, Sensei.[wa:6020] "
2300006-96 = "― I think today will be a good one thanks to you.[wa:3060] "
2300006-99 = "Airi and I continued our pleasant conversation on the riverside path until sunset."

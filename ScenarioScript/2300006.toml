[translation]
2300006-1 = "短暫的約會"
2300006-2 = "夏萊．辦公室"
2300006-4 = "（擱置許久的文件在桌上堆成一座又一座山，就被某種生物霸佔一樣）"
2300006-5 = "（看來再不認真處理掉，事情就大條了……）"
2300006-6 = "（咚♪）"
2300006-7 = "[ns] 「MomoTalk有訊息？」"
2300006-11 = "[ns] 「不過現在還是先專心工作吧……」"
2300006-15 = "（之後手機又響了好幾次，但我仍無視它，專注於工作）"
2300006-17 = "（隔日）"
2300006-18 = "（熬夜直到過了中午，才總算把堆積如山的文件全部解決）"
2300006-22 = "（雖然有打算要睡，但可能是喝了太多咖啡，一點睡意也沒有）"
2300006-23 = "（想了一下，決定出去散個步）"
2300006-26 = "（在夏萊附近幽靜的步道，看見一個熟悉的面孔）"
2300006-28 = "[s] 「……愛莉？」"
2300006-29 = "啊，老師？"
2300006-30 = "哇啊！好久不見！"
2300006-31 = "老師現在要去哪裡？"
2300006-32 = "喔，出來散步嗎？"
2300006-33 = "也就是說，老師工作忙完了對吧？"
2300006-34 = "那真是太好了……！我真的好想你喔，老師！"
2300006-35 = "[s1]「愛莉過得好嗎？」\n[s2]「抱歉讓你擔心了。」"
2300006-36 = "那當然。"
2300006-37 = "我依然過得很開心。"
2300006-38 = "啊，沒有啦，別這麼說……！"
2300006-39 = "不過真的太好了。欸嘿嘿……"
2300006-40 = "那老師過的好嗎？有沒有顧好身體呢？"
2300006-41 = "我前陣子為了準備考試，一直窩在家裡，也很久沒有出來外面了。"
2300006-42 = "咦，你問我在這裡做什麼嗎……？"
2300006-43 = "那個，也沒有特別要做什麼。"
2300006-44 = "只是因為考試結束了，想說久違出來散個步。"
2300006-45 = "……"
2300006-46 = "早知道能和老師見面的話……"
2300006-47 = "……咦？"
2300006-48 = "啊，不，我只是沒想到今天會見到老師。"
2300006-49 = "完全沒有準備點心能請老師。"
2300006-50 = "這附近也沒有咖啡廳……"
2300006-51 = "（雖然有和愛莉說不要緊，但她看起來還是很消沉）"
2300006-52 = "[s] 「嗯？那邊有冰淇淋車耶。」"
2300006-53 = "咦？那輛卡車嗎？"
2300006-54 = "哇，真的耶！好久沒見到了……！"
2300006-55 = "小時候很常買來吃呢。"
2300006-56 = "……老師？"
2300006-59 = "啊，咦……？"
2300006-63 = "（抓著愛莉的手走向冰淇淋車）"
2300006-64 = "來，請用。這是你點的冰淇淋。"
2300006-66 = "（和愛莉一起接過冰淇淋，在河邊步道稍作休息）"
2300006-69 = "― 謝謝你連我的份也買了，老師。[wa:7880] "
2300006-70 = "― 啊，好甜好好吃！[wa:600] "
2300006-73 = "― 不在咖啡廳，而是在戶外吃的冰淇淋，感覺好像很久違了。[wa:8740] "
2300006-74 = "― 而且還是跟老師一起。耶嘿嘿。[wa:4960] "
2300006-77 = "[ns3]「抱歉不是什麼像樣的甜點。」\n[ns4]「下次再去店裡吃吧。」"
2300006-80 = "― 不，不會。我完全不介意。[wa:5240] "
2300006-81 = "― 我反而覺得很懷念、很開心。[wa:2200] "
2300006-84 = "― 真的很開心，而且……[wa:7580] "
2300006-85 = "― 該怎麼說呢……四周也沒什麼人……[wa:6400] "
2300006-87 = "― 該說是心臟怦怦跳個不停嗎……[wa:6900] "
2300006-89 = "― ……沒，沒事，什麼都沒有！[wa:4760] "
2300006-90 = "― 請把我剛才說的話忘了吧！[wa:3940] "
2300006-92 = "― 哈哈，啊哈哈……[wa:1120] "
2300006-95 = "― ……謝謝你，老師。[wa:6380] "
2300006-96 = "― 今天也託老師的福，度過了幸福的一天。[wa:4220] "
2300006-99 = "（之後和愛莉一起在河邊步道開心地聊天，直到日落）"

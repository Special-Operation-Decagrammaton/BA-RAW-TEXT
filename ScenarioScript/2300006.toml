[translation]
2300006-1 = "ช่วงเวลาเดตชั่วพริบตา"
2300006-2 = "สำนักงานชาเล่ต์"
2300006-4 = "(คุณครูมีงานเอกสารที่คั่งค้างกองอยู่เต็มโต๊ะในสำนักงาน)"
2300006-5 = "(สงสัยต้องเคลียร์งานเอกสารอย่างจริงจังแล้ว)"
2300006-6 = "ติ๊งต่อง~"
2300006-7 = "[ns] \"หืม? MOMOTALK เหรอ?\""
2300006-11 = "[ns] \"ทำงานก่อนดีกว่าน่า\""
2300006-15 = "(MOMOTALK แจ้งเตือนอยู่หลายครั้ง แต่คุณครูก็กลั้นใจไม่อ่านและตั้งใจทำงานที่ค้าง)"
2300006-17 = "(วันต่อมา)"
2300006-18 = "(คุณครูจัดการงานเอกสารข้ามคืนจนล่วงเลยมาถึงเวลากลางวัน)"
2300006-22 = "(คุณครูอยากจะงีบสักหน่อย แต่ดื่มกาแฟไปเยอะมากจนนอนไม่หลับ)"
2300006-23 = "(หลังจากกังวลอยู่นาน คุณครูก็ตัดสินใจออกมาเดินเล่น)"
2300006-26 = "(คุณครูเดินตามทางเดินที่เงียบสงบรอบๆ ชาเล่ต์ และเห็นคนที่หน้าตาคุ้นเคย)"
2300006-28 = "[s] \"ไอริ?\""
2300006-29 = "อ๊ะ! คุณครู!"
2300006-30 = "ไม่ได้เจอกันนานเลยนะคะ!"
2300006-31 = "กำลังจะไปไหนเหรอคะ?"
2300006-32 = "เอ๋? ออกมาเดินเล่นอย่างนั้นน่ะเหรอคะ?"
2300006-33 = "แสดงว่าตอนนี้ก็ไม่ยุ่งสินะคะ?"
2300006-34 = "โชคดีจัง! ก็ฉันน่ะ... คิดถึงคุณครูมากเลยล่ะค่ะ! แหะๆ"
2300006-35 = "[s1] \"ไอริล่ะสบายดีมั้ย?\"\n[s2] \"ขอโทษที่เอาแต่งานยุ่งนะ\""
2300006-36 = "สบายดีสิคะ"
2300006-37 = "ฉันมีความสุขกับทุกวันเหมือนเคยอยู่แล้วล่ะค่ะ"
2300006-38 = "มะ... ไม่ค่ะ ไม่เห็นต้องขอโทษกันเลย"
2300006-39 = "ตอนนี้ฉันคงตื่นเต้นที่ได้เจอคุณครูน่ะค่ะ แหะๆๆ"
2300006-40 = "ช่วงนี้คุณครูมีเรื่องอะไรบ้างมั้ยคะ? ยังงานยุ่งเหมือนเดิมใช่มั้ยคะ?"
2300006-41 = "ฉันเองก็เอาแต่เตรียมสอบจนไม่มีเวลาว่างไปหาคุณครูเลย"
2300006-42 = "เอ๋? สงสัยว่าฉันมาทำอะไรที่นี่อย่างนั้นน่ะเหรอคะ?"
2300006-43 = "พอดีฉันสอบเสร็จแล้วน่ะค่ะ"
2300006-44 = "ตอนนี้มีเวลาแล้วก็เลยอยากออกมาเดินเล่นบ้าง ก็เลยเดินมาเรื่อยๆ แบบนี้"
2300006-45 = "......"
2300006-46 = "ถ้ารู้ก่อนว่าจะออกมาเจอคุณครูล่ะก็..."
2300006-47 = "คะ?"
2300006-48 = "ไม่ค่ะ ไม่! ฉันแค่ไม่รู้ว่าวันนี้จะได้เจอคุณครู..."
2300006-49 = "ก็เลยไม่ได้เตรียมของหวานอะไรมาน่ะค่ะ"
2300006-50 = "แถวนี้ก็ไม่น่าจะมีคาเฟ่ด้วย..."
2300006-51 = "(ไอริทำหน้าหงอย ถึงจะบอกไปว่าไม่เป็นไรแต่ก็ดูออกว่ายังกังวลอยู่)"
2300006-52 = "[s] \"หืม? มีรถขายไอศกรีมอยู่ตรงนั้นเหรอ?\""
2300006-53 = "เอ๋? รถไอศกรีมเหรอคะ?"
2300006-54 = "ว้าว ไม่ได้เจอรถไอศกรีมนานเลยค่ะ"
2300006-55 = "ตอนเด็กๆ ฉันกินบ่อยมากเลยล่ะ"
2300006-56 = "เอ๋? คุณครูคะ?"
2300006-59 = "หืม...?"
2300006-63 = "(คุณครูจับมือไอริแล้วพาเดินไปที่รถขายไอศกรีม)"
2300006-64 = "ได้ไอศกรีมที่สั่งแล้วครับ"
2300006-66 = "(คุณครูเดินถือไอศกรีมไปบนถนนริมแม่น้ำกับไอริ)"
2300006-69 = "― ขอบคุณที่เลี้ยงไอศกรีมฉันนะคะ คุณครู[wa:7000] "
2300006-70 = "― มัน... หวานอร่อยดีจังเลยค่ะ![wa:10] "
2300006-73 = "― ฉันไม่ได้กินไอศกรีมที่ขายข้างนอกคาเฟ่แบบนี้มานานมากๆ แล้วค่ะ[wa:7380] "
2300006-74 = "― แถมยังได้นั่งกินไอศกรีมกับคุณครูแบบนี้ด้วย ฮิฮิ...[wa:3520] "
2300006-77 = "[ns3] \"ขอโทษนะ ไอริ\"\n[ns4] \"ขอโทษที่ครูไม่ได้เลี้ยงของหวานจริงๆ ให้น่ะ\""
2300006-80 = "― มะ...ไม่เลยค่ะ ไม่เป็นไรจริงๆ ค่ะ[wa:4400] "
2300006-81 = "― ฉันกลับ...รู้สึกคิดถึงบรรยากาศและความสุขแบบนี้ซะอีกค่ะ[wa:560] "
2300006-84 = "― มันทั้งสนุก...แล้วก็...[wa:7060] "
2300006-85 = "― จะว่ายังไงดีนะ... คนที่อยู่แถวๆ นี้ก็ไม่เยอะด้วย...[wa:5000] "
2300006-87 = "― จะบอกว่า...ตื่นเต้นได้มั้ยนะ...[wa:6220] "
2300006-89 = "― มะ... มะ... ไม่มีอะไรค่ะ![wa:4280] "
2300006-90 = "― ช่วยลืมที่ฉันพูดไปเมื่อกี้ทีนะคะ![wa:3100] "
2300006-92 = "― แหะๆ ฮ่าๆๆๆ...[wa:880] "
2300006-95 = "― ขอบคุณนะคะ คุณครู[wa:6060] "
2300006-96 = "― วันนี้คุณครูทำให้ฉันมีความสุขมากเลยละค่ะ[wa:3340] "
2300006-99 = "(หลังจากนั้นคุณครูก็เดินเล่นและพูดคุยกับไอริที่ถนนริมแม่น้ำจนตะวันตกดิน)"

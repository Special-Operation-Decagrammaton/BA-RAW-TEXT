[translation]
33210-1 = "第21話;楽園の名前は（２）"
33210-2 = "さーて、次はこっちの番かな～？"
33210-3 = "準備はできてる。"
33210-4 = "よし、行くわよ！"
33210-6 = "対策委員会のみなさん。私の方であちら側の情報を分析しました、データをお送りしますね。"
33210-7 = "行政官の……！"
33210-8 = "はい、お久しぶりですね[ruby=おくそら]奥空[/ruby]アヤネさん。お元気でしたか？"
33210-9 = "えっと、はいまあ、おかげさまで……？"
33210-10 = "なんだこの同窓会みたいな雰囲気……。"
33210-11 = "良いですねー、仲良きことは美しきかなです☆"
33210-12 = "支援の準備も完了しました、いつでも行けます。"
33210-16 = "さーて、じゃあ行こっか！"

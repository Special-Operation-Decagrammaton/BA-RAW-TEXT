[translation]
33210-1 = "ตอนที่ 21;นามแห่งสวรรค์ (2)"
33210-2 = "เอาล่ะ ต่อไปก็ตาพวกเราแล้วสินะ"
33210-3 = "เตรียมพร้อมแล้ว"
33210-4 = "ดีเลย! เตรียมตัวไว้ให้ดีเถอะ!"
33210-6 = "คณะกรรมการแผนงานทุกคนคะ ฉันจะส่งข้อมูลวิเคราะห์ศัตรูให้ค่ะ"
33210-7 = "คุณเจ้าหน้าที่อาวุโส?!"
33210-8 = "ค่ะ คุณโอคุโซระ อายาเนะ ไม่พบกันนานเลยนะคะ สบายดีหรือเปล่าคะ?"
33210-9 = "อ่ะฮะฮะฮะ... ค่ะ ก็...เรื่อยๆ นั่นแหละค่ะ..."
33210-10 = "อะไรกันเนี่ย... บรรยากาศเหมือนงานรวมรุ่นเลย..."
33210-11 = "อื้อออ! ดีจังเลยน้า~ ที่ทุกคนเข้ากันได้ดีแบบนี้น่ะค่ะ-☆"
33210-12 = "เตรียมการสนับสนุนเรียบร้อย พร้อมออกลุยแล้วค่ะ"
33210-16 = "เอาล่ะ... ถ้างั้นก็ลุยกันเลย"

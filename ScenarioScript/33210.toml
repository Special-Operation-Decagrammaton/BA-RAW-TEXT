[translation]
33210-1 = "第21話;樂園之名為（２）"
33210-2 = "那麼，接下來輪到這邊嗎～？"
33210-3 = "準備好了。"
33210-4 = "好，走吧！"
33210-6 = "對策委員會的各位。我這裡分析了對方的情報，我把數據傳過去哦。"
33210-7 = "行政官的……！"
33210-8 = "是的，好久不見了呢奧空綾音同學。過得還好嗎？"
33210-9 = "那個，是的嘛，託您的福……？"
33210-10 = "什麼啊這個同學會般的氣氛……"
33210-11 = "真不錯呢，感情友好乃美哉也☆"
33210-12 = "支援的準備也完成了，隨時都可以開始。"
33210-16 = "那麼，走吧！"

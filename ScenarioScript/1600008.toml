[translation]
1600008-1 = "ผิดสถานที่"
1600008-2 = "(คุณครูมาถึงสถานที่ที่ฮารุกะแนะนำและพบว่ามันแตกต่างกับที่อื่นๆ อย่างลิบลับ)"
1600008-3 = "[s] \"...?\""
1600008-4 = "(สถานที่ที่คุณครูเพิ่งเคยมาเป็นครั้งแรก บริเวณชานเมืองเกเฮนน่าที่ไม่มีผู้คน)"
1600008-5 = "(เนื่องจากไม่ได้เป็นพื้นที่ที่ดีเท่าไร มันจึงถูกทิ้งร้างเอาไว้ แม้แต่พวกนักเลงเองก็ไม่มาที่นี่)"
1600008-6 = "(คุณครูมาที่นี่ตามคำบอกของฮารุกะ แต่พอมาถึงกลับไม่เห็นฮารุกะเลย)"
1600008-7 = "[ns1] หันไปมองรอบๆ\n[ns2] รออีกหน่อย"
1600008-11 = "(...?)"
1600008-12 = "[ns] เดินไปทางที่ได้ยินเสียง"
1600008-15 = "บริเวณที่มีเสียงดังออกมาเป็นอาคารเก่าๆ ที่ผุพัง"
1600008-16 = "เสียงใบไม้แห้งกรอบแกรบดังออกมาจากด้านในอาคาร"
1600008-19 = "(...)"
1600008-20 = "[ns] เดินไปทางที่ได้ยินเสียง"
1600008-23 = "(คุณครูตามเสียงนั้นไปและพบประตูทางเข้าของโกดังร้าง และยังคงได้ยินเสียงดังอยู่เรื่อยๆ)"
1600008-24 = "(คุณครูลอบมองผ่านช่องประตู และดูเหมือนคนที่อยู่ข้างในจะไม่สังเกตเห็น#nเพราะเสียงฝนที่ตกลงมาอย่างหนัก)"
1600008-25 = "[ns] ค่อยๆ เปิดประตูอย่างระมัดระวัง"
1600008-27 = "(...)"
1600008-31 = "― .....ฮึก!?"
1600008-35 = "― อ๊ะ หืม? เอ๋...!?[wa:1660] "
1600008-37 = "― อะ...เอ๋~~~ ทำไมกัน? เอ๊ะ!?[wa:1750] "
1600008-40 = "― ทะ...ทำไม...! ทำไมคุณครู...[wa:1980] "
1600008-42 = "― ทำไมคุณครู... ถึงมาอยู่ที่นี่ได้...!?[wa:690] "
1600008-45 = "― ระ...หรือว่าฉันทำอะไรพลาดไปอีกแล้ว...![wa:2180] "
1600008-47 = "― อา... ระ...หรือว่าฉันส่งพิกัดที่อยู่ไปผิด...?[wa:2310] "
1600008-50 = "― เอ่อ...คะ...คือว่า...[wa:1280] "
1600008-52 = "― ที่นี่... จะเรียกว่ายังไงดีนะ...[wa:1120] "
1600008-55 = "― คือว่า... ที่นี่คือ...[wa:1270] "
1600008-57 = "― สถานที่สำหรับเลี้ยงวัชพืชค่ะ... คือว่า...[wa:2270] "
1600008-60 = "― ขะ...ขอโทษค่ะ คุณครู[wa:1300] "
1600008-62 = "― ฉันทำพลาด...ที่เชิญคนสำคัญมาที่แบบนี้...[wa:3080] "
1600008-65 = "― ...เอ๋? เอ่อ...? มะ... เมื่อกี้ฉัน...[wa:1330] "
1600008-67 = "― พะ... พะ... พะ... พูดอะไร... ที่เกินตัวไปอีกแล้ว...!?[wa:50] "
1600008-70 = "― (ยะ...อยากตายจังเลยอยากตายจังเลยอยากตาย...[wa:20] "
1600008-72 = "―อยากตายจังเลยอยากตายจังเลยอยากตายจังเลย...)[wa:620] "
1600008-75 = "ที่นี่คือ... เพราะงั้น..."
1600008-76 = "คือ... ฉันไม่รู้ว่าจะพูดว่ายังไงดี... มะ...มันเป็นแค่สถานที่ไร้ค่า..."
1600008-77 = "มะ...มีแต่วัชพืช... มะ...ไม่รู้ว่าคุณครูจำได้รึเปล่า ตะ...แต่ว่าวัชพืชที่ฉันอยากให้คุณครู#nในตอนนั้น... ฉันปลูกมันไว้ที่นี่..."
1600008-78 = "[s3] \"เป็นเหมือนพวกสวนส่วนตัวเลยนะ\"\n[s4] \"เหมือนเป็นสวนต้นไม้ของฮารุกะเลยนะ?\""
1600008-79 = "...เอ๋? คะ? มะ...ไม่ใช่ค่ะ!! มะ...ไม่ใช่เรื่องน่ายิ่งใหญ่แบบนั้นหรอกค่ะ! คือแบบนี้นี่มัน...!"
1600008-80 = "...เอ๋? คะ? มะ...ไม่ใช่ค่ะ!! มะ...ไม่ใช่เรื่องน่ายิ่งใหญ่แบบนั้นหรอกค่ะ! คือแบบนี้นี่มัน...!"
1600008-81 = "อะ...อ๊า! ยะ...อย่าจับต้นนั้นนะคะ! มะ...ไม่ใช่ว่าจับไม่ได้ค่ะ แต่ว่ามันเป็นพืชกินเนื้อ มะ...มันอาจกัดคุณครูก็ได้ค่ะ!"
1600008-82 = "ปะ...เปล่าค่ะ ขอโทษด้วยค่ะ ขอโทษค่ะ ถ้าคุณครูอยากดูล่ะก็ฉันยอมถูกกัดแทนเองค่ะ ฉัน...ฉัน..."
1600008-83 = "[s5] \"เลี้ยงต้นไม้เก่งจัง สวยมากเลย\"\n[s6] \"ครูไม่รู้เลยนะว่าฮารุกะเก่งแบบนี้น่ะ\""
1600008-84 = "คะ...? คุณครูพูดอะไร...?"
1600008-85 = "คะ...? คุณครูพูดอะไร...?"
1600008-86 = "เอ่อ..."
1600008-87 = "เมื่อกี้นี้... คะ... คุณครู...? เมื่อกี้ชะ...ชมฉันเหรอคะ...?"
1600008-88 = "คะ...?"
1600008-89 = "ฉะ...ฉันเคยพาคนอื่นมารึเปล่าน่ะเหรอคะ? มะ...ไม่มีทางค่ะ!"
1600008-90 = "ฉันไม่เคยทำแบบนั้นเลยนะคะ! ในที่เก่าๆ โทรมๆ บรรยากาศแย่ๆ ไม่เป็นที่รื่นรมย์แบบนี้...!"
1600008-91 = "คะ...คงไม่มีใครอยากมาสถานที่โกโรโกโสแบบนี้หรอกค่ะ ไม่มีทาง... ฉะ...ฉันจะไปรบกวนคนอื่นๆ แบบนั้นไม่ได้หรอกค่ะ!"
1600008-92 = "แล้วก็ไม่มีเหตุผลที่จะบอกใครด้วย... เพราะถึงบอกให้รู้ก็ไม่ใช่ที่ที่ใครๆ จะสนใจอยู่แล้ว..."
1600008-93 = "[s7] \"ถ้างันที่นี่ก็เป็นที่แห่งความลับของเราสองคนสินะ\"\n[s8] \"ครูดีใจนะที่ฮารุกะเรียกครูมาที่นี่น่ะ\""
1600008-94 = "คะ...?"
1600008-95 = "คะ...?"
1600008-96 = "สะ...สถานที่แห่งความลับของเราเหรอคะ?"
1600008-97 = "กะ...ก็ไม่ผิดหรอกค่ะ ตะ...แต่ว่า \"ความลับ\" งั้นเหรอคะ... ความลับแค่ระหว่างคุณครูกับฉัน...#nฉะ...ฉันมีเรื่องที่น่ายินดีแบบนั้นได้จริงๆ เหรอคะ?"
1600008-98 = "คะ? มาที่นี่อีกได้รึเปล่างั้นเหรอคะ?"
1600008-99 = "ถะ...ถ้าอย่างนั้น ทะ...ที่นี่คือที่แห่งความลับของฉันกับคุณครู... ถะ... ถ้าคุณครูอยากมาอีกละก็..."
1600008-100 = "ขะ...ขอแค่บอกฉันก่อน ฉันจะมารอคุณครูเองค่ะ ได้ตลอด 24 ชั่วโมงเลยค่ะ...! มะ...ไม่สิ#nถึงคุณครูจะไม่บอกฉัน ฉันก็จะเตรียมพร้อมไว้ตลอดชีวิตเลยค่ะ!"
1600008-101 = "วะ...ว่าแต่ว่าทำไมคุณครูถึงอยากมาสถานที่โกโรโกโสแบบนี้กันคะ? สะ...สถานที่โกโรโกโส#nที่เหมาะกับขยะอย่างฉันแบบนี้... "
1600008-102 = "มะ...ไม่ใช่นะคะ ไม่ใช่ค่ะ ถ้าคุณครูบอกว่าเป็นดอกไม้ล่ะก็ ถึงจะเป็นตะไคร่น้ำที่เกิดขึ้น#nในซอกหลืบของบล็อกทางเดินก็คือดอกไม้ค่ะ!"
1600008-103 = "......"
1600008-108 = "ค่ะ... จริงๆ นะคะ... ฉันพูดจริงๆ นะคะ..."

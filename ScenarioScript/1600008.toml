[translation]
1600008-1 = "Wrong Place"
1600008-2 = "I followed Haruka's instructions, but for some reason, they didn't lead me to where I expected."
1600008-3 = "[s] \"...?\""
1600008-4 = "I had definitely never been here before. There were no traces of human activity out here in the Gehenna Outskirts."
1600008-5 = "With the unfriendly terrain, you wouldn't even find thugs in this abandoned area."
1600008-6 = "I came because she told me to, but Haruka was nowhere to be found."
1600008-7 = "[ns1] Look around the area.\n[ns2] Wait a little longer."
1600008-11 = "...?"
1600008-12 = "[ns] Move towards the sound."
1600008-15 = "The sound seemed to be coming from an old, abandoned building."
1600008-16 = "The strange rustling sound continued..."
1600008-19 = "..."
1600008-20 = "[ns] Move even closer towards the sound."
1600008-23 = "I followed the sound until I came to an abandoned warehouse door. The sound never stopped."
1600008-24 = "When I carefully peeked inside, the person within didn't hear me because of the sound of the rain."
1600008-25 = "[ns] Carefully open the door and go in."
1600008-27 = "..."
1600008-31 = "Eh?!"
1600008-35 = "Huh? Eh...?![wa:1900] "
1600008-37 = "― Wh-Wh-Why? HUH?![wa:2190] "
1600008-40 = "― Wh-Why are you here, Sensei?[wa:1940] "
1600008-42 = "― H-How...? Wh-Why are you here, Sensei...?![wa:490] "
1600008-45 = "― I-I must have messed up again...[wa:2420] "
1600008-47 = "Ah, c-could it be that I got the location wrong...?[wa:2110] "
1600008-50 = "― Th-That's... This is...[wa:1200] "
1600008-52 = "― This is where... What should I say...[wa:920] "
1600008-55 = "― Like, weeds and such...[wa:1230] "
1600008-57 = "― Where I can grow stuff like that...  That...[wa:2150] "
1600008-60 = "―S-Sorry, Sensei.[wa:1500] "
1600008-62 = "― It's my fault that...someone like you came to a filthy place like this...[wa:1760] "
1600008-65 = "― Huh? Ah...? J-Just now,[wa:1890] "
1600008-67 = "― I heard s-something incredible...!?[wa:770] "
1600008-70 = "― (I wanna die I wanna die I wanna die I wanna die[wa:10] "
1600008-72 = "― I wanna die I wanna die I wanna die I wanna die I wanna die...)[wa:10] "
1600008-75 = "S-So...this place is..."
1600008-76 = "It's... Well, how do I put this, um... I-It's a completely worthless place...but..."
1600008-77 = "I don't know if you remember the weeds I tried to give you that one time, but...I-I grow stuff like that here..."
1600008-78 = "[s3] \"So it's like a private garden.\"\n[s4] \"Then this is like your botanical garden, isn't it?\""
1600008-79 = "Right... What? N-No! No, it's nothing as grand as that at all! Th-This is...!"
1600008-80 = "Right... What? N-No! No, it's nothing as grand as that at all! Th-This is...!"
1600008-81 = "A-Ah! Y-You can't touch that! O-Oh, it's not that you can't! It's only because that little one is carnivorous, so it may bite you!"
1600008-82 = "Oh, no. I'm sorry! I'm sorry! If you want to look at it, I'll get bitten for you. I will, it's okay!"
1600008-83 = "[s5] \"You really raised them well. They're very pretty.\"\n[s6] \"I didn't know you were so good at this kind of stuff.\""
1600008-84 = "...What? I-I don't understand what you're saying."
1600008-85 = "...What? I-I don't understand what you're saying."
1600008-86 = "Um..."
1600008-87 = "S-Sensei just...c-complimented me?"
1600008-88 = "...Huh?"
1600008-89 = "H-Have I ever brought anyone else here before? N-No way!"
1600008-90 = "I-I would never do such a thing! To a filthy, unsettling, and gloomy place like this...!"
1600008-91 = "Nobody would want to see a place like this... No way! I couldn't trouble someone like that!"
1600008-92 = "There's no reason for me to even bring it up with someone... And even if I did, I'm sure no one would be interested in it..."
1600008-93 = "[s7] \"Then this just became our secret hiding place, didn't it?\"\n[s8] \"I'm honored you would invite me to such a secret hiding place, then.\""
1600008-94 = "...Huh?"
1600008-95 = "What?"
1600008-96 = "S-Secret hiding place... Ours?!"
1600008-97 = "You're not wrong, but a s-secret between Sensei and me.... I-Is it really okay for someone like me to have that with someone like you?"
1600008-98 = "What? Y-You want to come here again...?"
1600008-99 = "W-Well, of course! This is our secret hiding place. So if you want, Sensei..."
1600008-100 = "J-Just tell me when you're coming, and I'll come meet you at anytime! A-Actually, you don't even need to tell me, I'll just wait for you here for all of eternity!"
1600008-101 = "B-But, really, why would you want to come somewhere like this? A garbage place where worthless me and my worthless weeds reside..."
1600008-102 = "N-No! If you think these are flowers, then that would mean even the moss that grows from the sidewalk is a flower!"
1600008-103 = "..."
1600008-108 = "...Yeah. It's really... It's really like that..."

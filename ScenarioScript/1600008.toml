[translation]
1600008-1 = "錯誤的地點"
1600008-2 = "（……不知為何遙香傳來的地點，是個非常偏僻的地方）"
1600008-3 = "[s] 「……真的是在這裡嗎？」"
1600008-4 = "（第一次來到這種，完全沒有任何人影的格黑娜郊區邊境）"
1600008-5 = "（而且來的路途也很複雜，甚至連不良分子都沒看到）"
1600008-6 = "（雖然應該沒有來錯地方，但卻看不到遙香的身影……）"
1600008-7 = "[ns1] 查看周圍\n[ns2] 繼續等待"
1600008-11 = "（……？好像有聽到什麼聲音……？）"
1600008-12 = "[ns] 朝著聽到聲音的地方移動"
1600008-15 = "（眼前是一棟老舊建築物）"
1600008-16 = "（能聽到裡面正傳出某種聲音）"
1600008-19 = "（……）"
1600008-20 = "[ns] 朝著聽到聲音的地方移動"
1600008-23 = "（走到一扇門前，聲音是從裡面傳來的）"
1600008-24 = "（透過門縫中查看內部，發現發出聲音的人因為外面的雨聲，完全沒有察覺到我的存在）"
1600008-25 = "[ns] 開門走進去"
1600008-27 = "（……）"
1600008-31 = "— ……噫！？"
1600008-35 = "— 啊，咦？咦……！？[wa:1940] "
1600008-37 = "― 為，為為為什麼，咦！？[wa:2390] "
1600008-40 = "― 為，為什麼……！為什麼老師[wa:2540] "
1600008-42 = "― 會，會在這裡……！？[wa:1770] "
1600008-45 = "― 我，我該不會又犯了什麼大錯……！？[wa:3020] "
1600008-47 = "― 啊，難，難道說我傳錯地點了……？[wa:3470] "
1600008-50 = "― 啊，就，就是，[wa:1840] "
1600008-52 = "― 這，這裡是那個……該怎麼說呢……[wa:1760] "
1600008-55 = "― 就是，我培育雜草[wa:1830] "
1600008-57 = "― 這類東西的地方……[wa:3550] "
1600008-60 = "― 對，對不起，老師。[wa:1740] "
1600008-62 = "― 又因為我的失誤……把重要的人帶來這種地方……[wa:3800] "
1600008-65 = "― 咦，啊……我，我剛剛，[wa:2370] "
1600008-67 = "― 是，是是是不是，又出言不遜了……！？[wa:1450] "
1600008-70 = "― （好，好想死好想死好想死好想死[wa:1100] "
1600008-72 = "― 好想死好想死好想死必須死……！）[wa:1660] "
1600008-75 = "那個……對，對不起，我有稍微冷靜下來了……總之這裡就是……"
1600008-76 = "一個，什麼都沒有的地方，只不過……"
1600008-77 = "雜，雜草……不知您還記不記得，就是我之前原本要送您的那種雜草……#n我，我把它養在這裡……"
1600008-78 = "[s3] 「所以是遙香的個人庭園囉。」\n[s4] 「所以是遙香專屬的植物園囉。」"
1600008-79 = "呃，啊，沒有沒有！不，不是那麼了不起的地方……！#n那個，這只是……！"
1600008-80 = "呃，啊，沒有沒有！不，不是那麼了不起的地方……！#n那個，這只是……！"
1600008-81 = "啊啊！那，那個東西不能碰！#n不，不是，不是不能碰，是因為那是食肉植物，會咬人……！"
1600008-82 = "不，不會，我才要說對不起……不，不嫌棄的話我願意代替老師被咬……！#n咦，啊，別那麼做嗎？好，好的……"
1600008-83 = "[s5] 「每一株都長的好壯碩。」\n[s6] 「遙香真厲害，能把植物養得這麼漂亮。」"
1600008-84 = "那，那個……？"
1600008-85 = "那，那個……？"
1600008-86 = "……"
1600008-87 = "莫，莫非……老，老師剛才，是，是在稱讚我嗎……？"
1600008-88 = "這，這種事不值得稱讚……！……？什麼……？"
1600008-89 = "……其，其他人有沒有來過這裡……？沒，沒有！"
1600008-90 = "我，我從沒有請人過來過！這，這裡這麼陰暗、潮濕、噁心……！"
1600008-91 = "怎麼可以請人……來到這種地方……"
1600008-92 = "而且這裡也不值得讓別人知道……#n即使讓別人知道，我，我覺得應該也不會有人有興趣……"
1600008-93 = "[s7] 「那這裡就是我和遙香專屬的祕密基地囉？」\n[s8] 「很高興能來到這麼棒的『祕密基地』。」"
1600008-94 = "……？"
1600008-95 = "……？"
1600008-96 = "那個……如果要說是祕密基地，那確，確實也算吧……？"
1600008-97 = "可，可是！祕，祕密什麼的……！而且還是，只屬於老師和我的祕密……#n我，我真的有資格擁有，這種奢望嗎……？"
1600008-98 = "謝，謝謝老師……！……咦？老，老師下次還想再來嗎……？"
1600008-99 = "當，當然可以……！只，只要老師願意的話……！#n啊，那，那個……畢，畢竟這是只屬於老師和我的祕密基地……"
1600008-100 = "只，只要老師告訴我要過來，我就會24小時在這裡待命……！#n不，不是，不用告訴我也會在這裡待命一輩子！"
1600008-101 = "只要您不嫌棄，這個只有我，和跟我一樣的雜草……和垃圾場沒兩樣的地方……"
1600008-102 = "不！什麼都沒有！只，只要是老師發現的，#n老師說它是花的話，即使是生長在人行道牆角的青苔也都是花！"
1600008-103 = "……"
1600008-108 = "……真的……真的是這樣的……"

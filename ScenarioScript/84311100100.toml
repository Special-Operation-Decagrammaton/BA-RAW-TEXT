[translation]
84311100100-6 = "聖亞……？"
84311100100-7 = "……你怎麼來了？#n不是才過了一天而已嗎？"
84311100100-9 = "謝謝你的關心，但我的身體好像有點痠痛。"
84311100100-10 = "可能是因為太久沒有外出的關係吧……老實說，我現在的活力充沛到有點困擾。"
84311100100-11 = "我已經按照你們說的，在白天充分享受博覽會……#n所以如果晚上有事的話，可以跟我說嗎？"
84311100100-13 = "完全是上癮了。#n這可不是在玩樂啊……"
84311100100-14 = "我擔心這樣會造成體力方面的負擔。#n晚上要充分休息才能成長。"
84311100100-15 = "要是夜間的活動量太大的話，可能會影響體重……或者身高的成長。"
84311100100-16 = "……？"
84311100100-17 = "啊？你剛才說什麼？"
84311100100-18 = "……怎麼了嗎？"
84311100100-19 = "你的意思就是因為我習慣在外面晃到很晚，所以才長不高對吧？"
84311100100-20 = "嗯？我沒有那個意思。"
84311100100-21 = "為什麼突然這麼說？你很在意自己的身高嗎？"
84311100100-22 = "這傢伙真的是！你果然是故意的對吧！！#n喂！！就是那樣沒錯吧！？"
84311100100-23 = "不是，我已經說過我沒有那個意思。"
84311100100-24 = "如果那句話讓你很在意的話，單純是你的自卑感在作祟……"
84311100100-29 = "你說什麼──！？想說的話都說完了嗎！？"
84311100100-30 = "還沒有。順帶補充一下，身高除了和習慣有關之外，跟基因和先天因素也是──"
84311100100-32 = "夠了！！！"
84311100100-33 = "為什麼要生氣？#n明明是你問我說完了沒的……"
84311100100-37 = "（……看來好像觸碰到他的逆鱗了。以後得多多小心才行）"
84311100100-39 = "情，情況……！情況都還順利嗎？#n如果有什麼問題的話，現在立刻出發吧！"
84311100100-44 = "啊，這麼說來是有點問題。#n需要你們兩個一起出動……稍微有點難度的那種。"
84311100100-45 = "展示場裡出現了新的試驗品。#n由於是在清場以後增加的，所以還沒有人看過……"
84311100100-46 = "那東西刻意到讓人覺得可疑。#n如果可以的話，我想拿回來確認一下。"
84311100100-47 = "連是什麼東西都不知道就想先確認？#n所以沒問題的話是要再放回去嗎？"
84311100100-48 = "有什麼問題嗎？"
84311100100-49 = "倒也沒有。"
84311100100-50 = "好吧，反正我看這傢伙好像也快坐不住了。"
84311100100-52 = "呵呵，正合我意。"
84311100100-53 = "總之我們先過去一趟。#n至於身高的事……就等之後再說吧。"
84311100100-54 = "之後的什麼時候？#n如果能確定時間的話，我也會把行程空出來的。"
84311100100-58 = "……唉。"
84311100100-60 = "那個……唔嗯……"
84311100100-61 = "沒什麼。這件事還是交給你們兩位自己處理吧。"

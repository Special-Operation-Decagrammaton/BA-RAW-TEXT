[translation]
84311100100-6 = "เซอา...?"
84311100100-7 = "อะไรกัน...??? กลับมาทำไมเหรอ? เพิ่งผ่านไปวันเดียวเองนะ?"
84311100100-9 = "ขอบคุณที่อยากให้ฉันไปพักผ่อนนะคะ แต่ว่าฉันรู้สึกไม่สบายตัวนิดหน่อยค่ะ"
84311100100-10 = "คงเพราะฉันไม่ได้ออกไปเที่ยวเล่นมานาน... บอกตรงๆ ว่าฉันทำตัวไม่ค่อยถูกค่ะ"
84311100100-11 = "ถ้าตอนกลางวันฉันไปเที่ยวชมงานเอ็กซ์โปตามที่แนะนำ... แล้วช่วงเย็นถ้ามีงาน ฉันขอมาช่วยงานได้มั้ยคะ?"
84311100100-13 = "รักงานจังเลยนะ งานมันไม่สนุกเหมือนเที่ยวเล่นหรอกนะ..."
84311100100-14 = "ฉันกลัวว่ามันจะเกินกำลังของเธอไปน่ะ เธอต้องนอนหลับพักผ่อนตอนกลางคืนจะได้โตไวๆ"
84311100100-15 = "ถ้าทำกิจกรรมอะไรมากเกินไปในตอนกลางคืน... ความสูงอาจจะไม่เพิ่มก็ได้นะ"
84311100100-16 = "...?"
84311100100-17 = "หา? เมื่อกี้ว่ายังไงนะ?"
84311100100-18 = "อะไรเหรอ...?"
84311100100-19 = "เธอบอกว่าฉันตัวเตี้ยเพราะชอบออกไปทำอะไรดึกดื่นใช่มั้ย?"
84311100100-20 = "เปล่าสักหน่อย???"
84311100100-21 = "ทำไมจู่ๆ ก็มาพูดแบบนี้ล่ะ? มีอะไรข้องใจกับความสูงอย่างนั้นเหรอ?"
84311100100-22 = "ยัยนี่นี่นะ! จงใจพูดแบบนี้เพราะจะจิกกัดฉันนี่นา!! ใช่มั้ย?! ใช่ใช่มั้ย?? เป็นอย่างที่ฉันคิดใช่มั้ย??"
84311100100-23 = "เปล่าสักหน่อย ฉันก็ตอบไปแล้ว แล้วก็ไม่ได้มีเจตนาแบบนั้นด้วย"
84311100100-24 = "แต่ถ้าเธอยังข้องใจเรื่องที่ฉันพูด นั่นน่าจะเป็นเพราะความรู้สึกแย่ที่เธอมีต่อตัวเองมากกว่า..."
84311100100-29 = "ว่าไงนะ!? นี่เธอพูดจบรึยัง!?"
84311100100-30 = "ยังไม่จบหรอก ถ้าจะให้อธิบายเสริมละก็ จริงๆ แล้วเรื่องกิจวัตรประจำวันก็สำคัญกับการเจริญเติบโต#nเหมือนกัน แต่ว่าเรื่องกรรมพันธุ์ก็..."
84311100100-32 = "พอได้แล้ว!!!"
84311100100-33 = "ทำไมต้องโกรธกันด้วย ก็เธอถามเองไม่ใช่เหรอว่าฉันพูดจบหรือยัง..."
84311100100-37 = "(นี่คือเรื่องละเอียดอ่อน... เราระวังในส่วนนี้ไว้ดีกว่า)"
84311100100-39 = "จะ... จริงสิ...! มีเหตุการณ์อะไรเกิดขึ้นบ้างมั้ยคะ? ถ้ามีเรื่องอะไรต้องไปจัดการละก็ เราไปกันเลยดีกว่าค่ะ!"
84311100100-44 = "อ้อ ถ้าเรื่องนั้นน่ะมันก็มีอยู่ แล้วก็เป็นเรื่องที่ค่อนข้างยาก... ที่ต้องใช้ความร่วมมือของพวกเธอทั้งสอง#nคนเลยละ"
84311100100-45 = "มีผลิตภัณฑ์ตัวอย่างชิ้นใหม่เพิ่มมาในห้องสาธิตน่ะ มันเพิ่งถูกเอามาวางหลังจากปิดการสาธิตไป ตอนนี้ก็เลยยังไม่มีใครเห็น..."
84311100100-46 = "แต่มันเป็นของที่น่าสงสัยในเจตนาที่เอาเข้ามา ถ้าเป็นไปได้ ฉันอยากให้พวกเธอไปเอาของชิ้นนั้นมา#nให้ตรวจสอบหน่อย"
84311100100-47 = "ยังไม่รู้ว่าคืออะไร แต่จะตรวจสอบดูก่อนงั้นเหรอ? แล้วถ้าโอเคก็เอากลับไปไว้ที่เดิม?"
84311100100-48 = "ติดปัญหาอะไรเหรอ?"
84311100100-49 = "ก็เปล่าหรอก"
84311100100-50 = "งั้นก็ดีเลย เซอาก็น่าจะอยากขยับตัวอยู่พอดี"
84311100100-52 = "ฮุฮุ นี่ละค่ะที่ฉันต้องการ"
84311100100-53 = "จะรีบไปรีบมานะ ส่วนเรื่องความสูงน่ะ... ไว้ค่อยกลับมาเคลียร์กันทีหลัง"
84311100100-54 = "ทีหลังคือตอนไหนน่ะ? ถ้าบอกเวลาที่แน่นอนไว้ละก็ ฉันจะทำตารางของตัวเองให้ว่างไว้"
84311100100-58 = "เฮ้อ..."
84311100100-60 = "เอ่อ... อืม..."
84311100100-61 = "ไม่มีอะไรหรอกค่ะ ฉันเชื่อว่าเรื่องนี้ทั้งสองคนคงจัดการกันเองได้ละค่ะ"

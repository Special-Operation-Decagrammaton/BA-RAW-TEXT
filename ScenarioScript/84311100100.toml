[translation]
84311100100-6 = "...Seia?"
84311100100-7 = "Why are you back here already? It's only been a day."
84311100100-9 = "I really do appreciate your consideration, but I've started feeling antsy."
84311100100-10 = "It might be because I haven't had an outing in a while... But I'm full of energy, and everything we've been through is still on my mind."
84311100100-11 = "As you said, I did enjoy the Expo throughout the day so far...so if there's anything to do this afternoon, would you let me know?"
84311100100-13 = "You're TOO into this. It's not a game, you know..."
84311100100-14 = "I'm worried it might be a strain on your stamina. You need a good night's sleep to grow properly."
84311100100-15 = "If you're too active late at night, you could develop issues with your height or your weight."
84311100100-16 = "Um..."
84311100100-17 = "Excuse me, do you want to say that again?"
84311100100-18 = "...? What?"
84311100100-19 = "You're saying I'm short because I go around late at night?"
84311100100-20 = "No..."
84311100100-21 = "Why would you say that? Do you have some kind of medical concern about your height?"
84311100100-22 = "Oh, you're pushing me on purpose, aren't you?"
84311100100-23 = "No. I already said I didn't mean anything by it."
84311100100-24 = "If I happened to hit a nerve, that's on you and whatever complex you have."
84311100100-29 = "Oh, you did NOT just...! Say that again, ONE more time!"
84311100100-30 = "I can say it again. To further clarify, while your daily habits do play an important factor in your height, there are also genetic, inborn qualities that..."
84311100100-32 = "Stop it!!"
84311100100-33 = "You ASKED me to say it again. Why are you angry?"
84311100100-37 = "(...That must be her sore spot. I'll be careful.)"
84311100100-39 = "I-Is there any sort of situation going on? Because we can go take care of it right now!"
84311100100-44 = "Ah, there is a situation. And it's...difficult enough that it needs both of you."
84311100100-45 = "A new prototype was just added to the Exhibition Hall. And it was added after closing, so no one's seen it yet..."
84311100100-46 = "...but I have my suspicions. If it's possible, I'd like to bring it here to check it out."
84311100100-47 = "You have no idea what it is? You just want to take it, check it out, and then put it back if there's nothing wrong with it?"
84311100100-48 = "Would that be a problem?"
84311100100-49 = "No."
84311100100-50 = "Good, that ought to cure your antsiness."
84311100100-52 = "Fufu, exactly what I wanted."
84311100100-53 = "All right, let's move. We can talk about the height thing...later."
84311100100-54 = "Later when? If you tell me the exact time, I'll mark it on my calendar."
84311100100-58 = "*sigh*"
84311100100-60 = "So...um..."
84311100100-61 = "Never mind. I'm sure you two will figure it out."

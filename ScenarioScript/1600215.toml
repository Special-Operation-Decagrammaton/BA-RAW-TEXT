[translation]
1600215-1 = "แว่นตาที่พิเศษ"
1600215-2 = "(คุณครูรู้สึกเป็นห่วงเลยแวะมาที่โรงเรียนมิลเลเนียม)"
1600215-3 = "อ๊ะ คุณครู!!"
1600215-7 = "เอ๋ ทำไมถึงมาที่โรงเรียนมิลเลเนียมได้ล่ะคะ? มีธุระอะไรที่นี่งั้นเหรอคะ?"
1600215-8 = "มะ... ไม่ได้มีธุระอะไรงั้นเหรอคะ? ถ้างั้นก็มาเพราะ... เรื่องส่วนตัว...?"
1600215-9 = "คะ...? ฉันเหรอคะ?"
1600215-10 = "มาหาฉันเหรอคะ?"
1600215-11 = "ทำไมกันคะ...?"
1600215-13 = "(คุณครูเล่าเหตุผลที่มาหาให้โคโทริฟังอย่างสั้นๆ)"
1600215-15 = "เอ๋..."
1600215-16 = "อะ... อืม อย่างนี้นี่เอง..."
1600215-17 = "ขะ... ขอโทษค่ะ ฉันดันทำให้คุณครูเป็นห่วงโดยไม่ได้ตั้งใจซะแล้ว..."
1600215-18 = "ฉันคิดไม่ถึงเลยว่าคุณครูจะมาถึงที่นี่เพราะเรื่องของฉัน... ที่ผ่านมาฉันคงใส่ใจคำพูดน้อยเกินไปจริงๆ ค่ะ"
1600215-19 = "แต่ก็เป็นอย่างที่เห็นเลยค่ะ ตอนนี้แว่นตาของฉันซ่อมเสร็จเรียบร้อยแล้ว... ตอนนี้ก็ไม่มีปัญหาอะไร#nแล้วละค่ะ!"
1600215-20 = "อะ... อืม หรือว่าไม่ใช่นะ? อาจไม่นับว่าโชคดีก็ได้..."
1600215-21 = "คุณครูอุตส่าห์มาหาถึงที่นี่ แต่ถ้าต้องกลับไปโดยไม่ได้อะไรตอบแทนเลยมันจะถือว่าโชคไม่ดี... ใช่มั้ยล่ะคะ?"
1600215-22 = "[s1] \"แค่ได้มายืนยันด้วยตัวเองครูก็ดีใจแล้ว ไม่เป็นไรหรอก\"\n[s2] \"แค่ได้เจอโคโทริหลังจากที่ไม่ได้เจอกันนาน ครูก็ดีใจแล้ว\""
1600215-25 = "อะ... อึก... "
1600215-26 = "ถ้าคุณครูพูดแบบนั้น... ฉันก็ไม่รู้ว่าจะต้องทำยังไงเลยละค่ะ..."
1600215-27 = "คะ...?"
1600215-28 = "นึกได้ว่ามีเรื่องที่อยากถามงั้นเหรอคะ?"
1600215-32 = "เรื่องที่อยากถาม...!?"
1600215-33 = "เรื่องอะไรเหรอคะคุณครู? อยากรู้เรื่องอะไรเหรอคะ?!"
1600215-34 = "ถามมาได้ทุกเรื่องเลยนะคะคุณครู! ถ้าเป็นเรื่องที่โทโยมิ โคโทริคนนี้รู้ละก็ ฉันจะอธิบายให้ฟังเองค่ะ! แต่ถ้าเป็นเรื่องที่ฉันไม่รู้ละก็ ฉันจะไปหาข้อมูลแล้วมาอธิบายให้ฟังเองค่ะ!"
1600215-35 = "เพื่อเป็นการตอบแทนคุณครูที่มาหาค่ะ!!"
1600215-36 = "[s3] \"ถามได้จริงๆ แน่นะ?\"\n[s4] \"ถามเรื่องอะไรก็ได้เหรอ?\""
1600215-39 = "ค่ะ!! แน่นอนเลยค่ะ!!"
1600215-40 = "ใช่แล้วค่ะ!! ถามมาได้ทุกเรื่องเลยค่ะ!!"
1600215-44 = "[ns] \"ถ้างั้น...\""
1600215-48 = "[ns5] \"แว่นตาอันนั้นมีความหมายพิเศษอะไรรึเปล่า?\"\n[ns6] \"เหมือนจะใช้แว่นตาอันนั้นอย่างดีเลยนะ\""
1600215-51 = "อ๊ะ อย่างนี้นี่เอง! แว่นตาอันนี้น่ะเหรอคะ คือว่า...!!"
1600215-55 = "เอ๋..."
1600215-56 = "วะ... แว่นตา... หมายถึงแว่นตาของฉันเหรอคะ? นี่มัน... เอ่อ..."
1600215-61 = "เอ่อ... ฉันไม่คิดมาก่อนว่าคุณครูจะถามเรื่องนี้ เลยคิดอะไรไม่ออกไปแป๊บหนึ่ง..."
1600215-62 = "แถมยังรู้สึกว่าเคยเกิดเรื่องแบบนี้มาหลายครั้งแล้ว... เหมือนเดจาวูเลย..."
1600215-63 = "อะฮ่าฮ่า... ทำไมฉันถึงรู้สึกแบบนี้ตลอดเวลาที่คุณครูถามคำถามเกี่ยวกับตัวฉันกันนะคะ"
1600215-64 = "ฮืออ..."
1600215-65 = "ไม่สิ... จะเป็นแบบนี้ไม่ได้สิ ไม่ได้ๆ!"
1600215-66 = "ต้องตั้งสติให้ดี ก็ฉันบอกไว้แล้วนี่คะว่าจะตอบทุกคำถามที่คุณครูอยากรู้"
1600215-67 = "อืม ซู๊ดดด ฮู่ววววว..."
1600215-68 = "[s7] \"ถ้ามันตอบยากก็ไม่เป็นไรนะ\"\n[s8] (เป็นเรื่องที่ถึงขั้นต้องทำสมาธิเลยเหรอ...)"
1600215-73 = "ตอนนี้ฉันใจเย็นขึ้นแล้ว เอาละค่ะ ฉันจะอธิบายให้ฟังตามที่สัญญาไว้ค่ะ!"
1600215-74 = "ที่จริงแล้วมันก็ไม่ใช่เรื่องที่ยิ่งใหญ่อะไรหรอกค่ะ"
1600215-76 = "คุณครูลองดูด้านข้างของแว่นนี้สิคะ รูปร่างของมันดูแปลกตานิดๆ ใช่มั้ยล่ะคะ?"
1600215-77 = "เพราะมันมีรูปร่างแบบนี้เลยทำให้ใส่เลนส์อันใหม่เข้าไปค่อนข้างยาก"
1600215-78 = "แต่แว่นอันนี้ก็มีบางอย่างพิเศษที่แว่นทั่วไปไม่มีอยู่ค่ะ"
1600215-79 = "หรือพูดอีกอย่างหนึ่งคือแว่นอันนี้เป็นแว่นที่ฉันตั้งใจทำออกมาเองค่ะ!"
1600215-80 = "คุณครูเองก็ทราบดีใช่มั้ยล่ะคะว่าฉันชอบอธิบายอะไรหลายๆ อย่าง และคำอธิบายพวกนั้น บางครั้งก็มีตอนที่อธิบายยาวมากๆ อยู่ด้วย"
1600215-81 = "แว่นตาอันนี้ออกแบบมาเพื่อดึงดูดความสนใจคนฟัง เวลาต้องฟังคำอธิบายอะไรยาวๆ แบบนั้น..."
1600215-82 = "หรือเรียกสั้นๆ ว่า... จุดดึงดูดสายตา? ฉันใส่มันไว้เพื่อการนั้นนั่นละค่ะ เห็นแบบนี้มันให้ผลดีกว่าที่#nคิดอีกนะคะ!"
1600215-83 = "[s9] \"โอ้โฮ...!\"\n[s10] \"มีประโยชน์ใช้ได้จริงเกินคาดเลยแฮะ?\""
1600215-87 = "ฮุฮุฮุ เข้าใจได้ดีสมเป็นคุณครูเลยค่ะ"
1600215-88 = "ของเล็กๆ น้อยๆ แบบนี้เวลาที่ต้องอธิบายอะไรให้คนอื่นฟัง มันจะช่วยทำให้มีสมาธิและสื่อสารข้อมูล#nได้ดียิ่งขึ้นค่ะ!"
1600215-89 = "แต่สงสัยว่ามันจะเก่าเกินไปแล้ว ช่วงนี้แค่พอเห็นแว่นตาอันนี้ ทุกคนก็วิ่งหนีไปหมดเลยค่ะ"
1600215-90 = "[s11] (คิดไว้แล้วเชียว...)\n[s12] \"เป็นสัญลักษณ์ประจำตัวไปแล้วสินะ\""
1600215-93 = "ค่ะ แต่บางครั้ง... มันก็ยังใช้ได้ผลกับคนที่ฉันเพิ่งไปอธิบายอะไรให้ฟังครั้งแรกอยู่นะคะ"
1600215-94 = "ที่จริงแล้วตอนที่แว่นอันนี้พัง ฉันแอบคิดว่าจะเปลี่ยนไปใช้แว่นธรรมดาที่ดูแลรักษาง่ายกว่าอยู่เหมือน#nกันค่ะ"
1600215-98 = "[ns13] \"โคโทริ...?\"\n[ns14] \"ทำไมจู่ๆ ถึงเงียบไปล่ะ?\""
1600215-101 = "แหะๆ..."
1600215-102 = "แต่พอคิดไปคิดมา ฉันคิดว่าใช้แว่นตาอันนี้ต่อไปน่าจะดีกว่าค่ะ"
1600215-103 = "บางครั้งแว่นอันนี้ก็นำพาเรื่องดีๆ มาให้จนอธิบายไม่ถูกเลยค่ะ!"
1600215-105 = "(หลังพูดคุยกับโคโทริสักพัก ทั้งสองคนก็ไปกินอาหารว่างด้วยกัน จากนั้นคุณครูก็กลับไปที่ชาเล่ต์)"

[translation]
1600215-1 = "Unique Glasses"
1600215-2 = "Just in case, I headed over to Millennium."
1600215-3 = "Ah, Sensei!"
1600215-7 = "What're you doing at Millennium?! Did you have work to do here?"
1600215-8 = "...No? Is it a personal matter, then?"
1600215-9 = "...Huh? Me?"
1600215-10 = "You came to see me?"
1600215-11 = "...But why?"
1600215-13 = "I briefly explained to Kotori why I'd come to see her."
1600215-15 = "Ah..."
1600215-16 = "Hmm... I see..."
1600215-17 = "I-I apologize. I never intended to concern you, Sensei."
1600215-18 = "I was speaking too thoughtlessly. I didn't think you would come all this way just for me."
1600215-19 = "But as you can see, my glasses have been repaired... So, very fortunately, no issues to be concerned about!"
1600215-20 = "Ah. Um. Maybe that's actually unfortunate?"
1600215-21 = "After all, that means I made you come all the way out here for absolutely no reason."
1600215-22 = "[s1] \"I'm just happy to know everything's okay.\"\n[s2] \"I get to see you, so it's okay!\""
1600215-25 = "Awww... "
1600215-26 = "Thank you so much."
1600215-27 = "...What?"
1600215-28 = "...You're curious about something?"
1600215-32 = "...C-Curious...about something?!"
1600215-33 = "Yes! Please, tell me! What are you curious about, Sensei?!"
1600215-34 = "Ask me anything you desire, Sensei! I, Toyomi Kotori, will answer any question you pose. And if I don't know, I'll find out and then still answer you!"
1600215-35 = "Anything to repay you for coming all the way just to see me!"
1600215-36 = "[s3] \"Are you sure?\"\n[s4] \"Anything?\""
1600215-39 = "Yes, of course!"
1600215-40 = "It's okay! Anything!"
1600215-44 = "[ns] \"...Then...\""
1600215-48 = "[ns5] \"Are those glasses special to you?\"\n[ns6] \"It seems like you really care about your glasses.\""
1600215-51 = "Ah! You're curious about my glasses? Well, you see...!"
1600215-55 = "...Um."
1600215-56 = "My...my glasses? Well...this...ummm..."
1600215-61 = "Gah. I wasn't expecting this question at all, so I'm at a loss for words!"
1600215-62 = "I'm suddenly getting this feeling of déjà vu..."
1600215-63 = "Ahaha... The personal nature of your questions always makes me feel this way."
1600215-64 = "Err..."
1600215-65 = "...No! This isn't right! I won't let this happen!"
1600215-66 = "I told you I would answer any question, so that's what I will do! Pull yourself together, Kotori!"
1600215-67 = "Um... Uh... *inhale* *exhale*"
1600215-68 = "[s7] \"It's okay if you can't answer.\"\n[s8] \"(Does this situation really require deep breathing...?)\""
1600215-73 = "It's okay. I've centered myself, and as promised, I shall answer!"
1600215-74 = "...It's not as big of an issue as I'm making it seem."
1600215-76 = "Sensei, take a look at this side of my glasses. It looks a bit unusual, right?"
1600215-77 = "This unique shape makes it difficult to get a lens replacement!"
1600215-78 = "But you see, these glasses have a special effect that ordinary glasses do not!"
1600215-79 = "To an extent, it's a very intentional design on my part!"
1600215-80 = "As you well know, I'm prone to giving a lot of lectures on different things. And when I explain things, I can get a little long-winded."
1600215-81 = "That's why these glasses are designed to give people who are listening to these lectures something to focus on!"
1600215-82 = "Basically, it's a focus point for your eyes. Surprisingly, it actually works quite effectively!"
1600215-83 = "[s9] \"Aha!\"\n[s10] \"That's surprisingly practical!\""
1600215-87 = "Fu. Fu. Fu. You understand it now, Sensei!"
1600215-88 = "Even small features like this can help people concentrate and subsequently absorb the information I'm delivering!"
1600215-89 = "...Although these days, people seem to run away whenever they see my glasses."
1600215-90 = "[s11] \"(...Indeed.)\"\n[s12] \"It's become a part of your identity.\""
1600215-93 = "Yes! And regardless, it's still quite effective for newbies who've never heard one of my lectures before!"
1600215-94 = "When my glasses broke this time, I did think about going back to a regular pair of glasses that are easier to maintain..."
1600215-98 = "[ns13] \"...Kotori?\"\n[ns14] \"Did you just...go quiet??\""
1600215-101 = "...Heehee."
1600215-102 = "You know what, it's absolutely the best option to keep them."
1600215-103 = "After all, if I hadn't, this wonderful situation never would've happened!"
1600215-105 = "Kotori and I chatted a little more over a quick meal, then I returned to Schale."

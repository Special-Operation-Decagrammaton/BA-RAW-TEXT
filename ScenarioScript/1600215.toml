[translation]
1600215-1 = "奇特的眼鏡"
1600215-2 = "（為了預防萬一，擔心地前往了千年）"
1600215-3 = "啊，老師！！"
1600215-7 = "咦？老師怎麼會來千年呢！有什麼工作要做嗎？"
1600215-8 = "沒有？只是來辦私事……？"
1600215-9 = "……嗯？我嗎？"
1600215-10 = "是來看我的？"
1600215-11 = "……為什麼呢？"
1600215-13 = "（向亞都梨簡單說明了來找他的原因）"
1600215-15 = "哎呀……"
1600215-16 = "唔嗯……原來如此……"
1600215-17 = "對，對不起，好像讓老師費心了……"
1600215-18 = "沒想到老師會特地為了我跑一趟……看來我先前說話太隨意了。"
1600215-19 = "不過就像老師看到的一樣，眼鏡已經順利修好……現在沒有任何問題！"
1600215-20 = "唔，唔嗯，這麼說好像也不太對……"
1600215-21 = "讓老師跑了一趟卻無功而返，是不是反而……不太好呢？"
1600215-22 = "[s1]「沒關係，光是能確認你沒事，我就很開心了。」\n[s2]「光是能見到好久不見的亞都梨，我就很開心了。」"
1600215-25 = "唔，唔唔……"
1600215-26 = "老師你這麼說……讓我更不知道該如何是好了……"
1600215-27 = "……嗯？"
1600215-28 = "老師有件好奇的事？"
1600215-32 = "好奇的事……！？"
1600215-33 = "請問是什麼事呢，老師？你好奇的事情是什麼！？"
1600215-34 = "請老師儘管問！我豊見亞都梨一定知無不言！#n如果是我不知道的事情，我會在了解情況後再跟你說明！"
1600215-35 = "為了回報老師來到這裡的心意，我一定使命必達！！"
1600215-36 = "[s3]「真的嗎？」\n[s4]「問什麼都行嗎？」"
1600215-39 = "沒錯！！當然！！"
1600215-40 = "真的沒關係！！想問什麼都行！！"
1600215-44 = "[ns]「那麼……」"
1600215-48 = "[ns5]「那副眼鏡有什麼特殊的意義嗎？」\n[ns6]「看你好像每天都很珍惜地戴著它。」"
1600215-51 = "啊，原來如此！#n是這副眼鏡對吧！這是……！！"
1600215-55 = "……咦。"
1600215-56 = "眼，眼鏡……我的眼鏡嗎？#n這是……那個……"
1600215-61 = "咦？因為提問的方向實在有點意外，腦袋一時轉不過來……"
1600215-62 = "之前好像也發生過幾次類似的事……讓人有股既視感……"
1600215-63 = "啊哈哈……每次老師問我問題的時候，我總會有這種感覺呢。"
1600215-64 = "唔唔唔……"
1600215-65 = "……不行，我不能再這樣下去了！"
1600215-66 = "得振作一點才行。#n畢竟我都說過要為老師說明任何事了。"
1600215-67 = "嗯嗯，吸──吐──"
1600215-68 = "[s7]「如果不方便回答的話也沒關係。」\n[s8]（原來這是需要深呼吸才能回答的問題嗎……）"
1600215-73 = "稍微冷靜下來了。#n那麼我就按照約定向老師說明！"
1600215-74 = "……其實也沒什麼大不了的。"
1600215-76 = "請老師看眼鏡的這個部分。#n外觀稍微有點特別對吧？"
1600215-77 = "由於形狀特殊，其中一邊的鏡片很難重配。"
1600215-78 = "不過，這副眼鏡具備普通眼鏡所沒有的效果。"
1600215-79 = "因此某方面來說，這是我特別選擇的眼鏡！"
1600215-80 = "老師你也知道，我常常會做各種說明對吧？偶爾還會說得比較久一點……"
1600215-81 = "這種時候，這副眼鏡就能抓住聽者的視線……"
1600215-82 = "就像是提供一個焦點的感覺，所以我才會一直戴著。#n別看它這樣，效果其實比我想像中還好哦！"
1600215-83 = "[s9]「……哦哦！」\n[s10]「意外還挺實用的耶？」"
1600215-87 = "哼，哼，哼。老師果然很識貨。"
1600215-88 = "在向別人說明的時候，這些小細節都有助於提升專注力，進而清楚地傳遞資訊哦！"
1600215-89 = "……雖然最近好像因為效果太好，大家一看到這副眼鏡就會逃跑就是了。"
1600215-90 = "[s11]（……原來如此）\n[s12]「現在這已經成了你的標誌了呢。」"
1600215-93 = "是的。#n不過有時候……這對第一次聽說明的人還是很有效果的。"
1600215-94 = "其實這次眼鏡壞掉的時候……我也確實想過要不要乾脆換回好維護的普通眼鏡。"
1600215-98 = "[ns13]「……亞都梨？」\n[ns14]「怎麼突然不說話了？」"
1600215-101 = "……嘿嘿。"
1600215-102 = "看來好像還是繼續戴著它比較好。"
1600215-103 = "畢竟這副眼鏡，偶爾也能在說明以外的場合帶來好處呢！"
1600215-105 = "（後來又和亞都梨閒聊了一會，簡單吃過飯後才回到夏萊）"

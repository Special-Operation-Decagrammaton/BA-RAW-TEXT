[translation]
2600203-1 = "A Girl's Recipe"
2600203-2 = "Gehenna Student Dining Hall No. 8"
2600203-3 = "Today's dish is..."
2600203-4 = "...curry!"
2600203-5 = "[s] \"Oh. That's...safe.\""
2600203-6 = "We don't get to cook together very often, so..."
2600203-7 = "...I thought, why not pick something everyone enjoys?"
2600203-8 = "Is curry too plain for you?"
2600203-9 = "We could try making gambas dishes like last time."
2600203-10 = "[s] \"Nope! Plain is good! Simple is best!\""
2600203-11 = "Hmm. Do you really think so?"
2600203-12 = "Anyway, let's start with the ingredients!"
2600203-14 = "I brought everything we'll need for curry ahead of time."
2600203-15 = "Here's a curry brick, pork, three potatoes, one onion..."
2600203-16 = "...carrots, and a bunch of spices we can try out later."
2600203-17 = "I think that should be enough."
2600203-18 = "[s] \"Surprisingly normal.\""
2600203-19 = "Pardon?"
2600203-20 = "[s] \"Uh. Nothing.\""
2600203-21 = "Hmm? Well, let's get to prepping the ingredients."
2600203-22 = "The texture of sweet curry's pork is critical according to the recipe I read."
2600203-23 = "That's why it's important to make sure the pork is tender."
2600203-24 = "[s1] \"There's more than one way to go about tenderizing it.\"\n[s2] \"We could use minced garlic or milk.\""
2600203-25 = "Agreed that we have several options at our disposal..."
2600203-26 = "Agreed that we have several options at our disposal..."
2600203-27 = "...but it just so happens that I remembered a good one."
2600203-28 = "The more you knead the meat, the tenderer it will become."
2600203-29 = "And what better to get the job done than THIS?"
2600203-31 = "[s] \"Juri. What are you holding right now?\""
2600203-32 = "A gun."
2600203-33 = "A double-barrel shotgun to be precise. I can pulverize the meat with dozens of pellets in a single shot!"
2600203-34 = "[s3] \"Pulverize is putting it lightly!\"\n[s4] \"Talk about making mincemeat!\""
2600203-35 = "Hiyah! ☆"
2600203-36 = "Hiyah! ☆"
2600203-44 = "The meat should be plenty tender now."
2600203-45 = "[ns5] \"I wouldn't call that tender!\"\n[ns6] \"I've never heard of a recipe calling for a gun before!\""
2600203-46 = "Did I do a bad job?!"
2600203-47 = "Did I do a bad job?!"
2600203-48 = "I should have known..."
2600203-49 = "The others always freak out and try to stop me when I draw my gun in the kitchen."
2600203-50 = "I thought they were just trying to give me pointers about my grip... *sulks*"
2600203-51 = "[s] \"You thought your GRIP was the problem?!\""
2600203-52 = "Geez, Sensei! Everyone knows how important form is when using tools!"
2600203-53 = "You could end up hurting yourself if you mishandled a knife, for example. You have to be careful!"
2600203-54 = "[s] \"How am I the one being scolded right now?!\""
2600203-55 = "I-I may have made one oopsie, but it will be smooth sailing from here!"
2600203-56 = "Recipe... Recipe..."
2600203-57 = "Ah, here we go."
2600203-58 = "The next step is to stir-fry the ingredients."
2600203-59 = "According to the recipe, the correct order to stir-fry the ingredients is..."
2600203-60 = "...carrots first, then potatoes, and the onions last."
2600203-61 = "[s] \"No problem. Let's get started with the carrots.\""
2600203-62 = "But won't that take too long?"
2600203-63 = "[s] \"What?\""
2600203-64 = "The School Lunch Club always has to cook large quantities of food quickly in order for it to be ready by lunchtime."
2600203-65 = "I've been thinking of new ways to cook within our time limits..."
2600203-66 = "...which led me to THIS groundbreaking solution!"
2600203-67 = "Yah!"
2600203-73 = "[s] \"No. Wait. Stop. Hold on!\""
2600203-74 = "Is something the matter, Sensei?"
2600203-75 = "[s] \"You can't just throw all the ingredients into the pot at once! They won't cook evenly!\""
2600203-76 = "Every vegetable takes a different amount of time to cook."
2600203-77 = "That's what you want me to keep in mind, isn't it?"
2600203-78 = "[s] \"It's common sense!\""
2600203-79 = "Ahem! I'm a member of the School Lunch Club. Of course I know that! ♪"
2600203-80 = "But that's where my new groundbreaking method comes in."
2600203-81 = "Ta-da! We can use this!"
2600203-82 = "[s] \"Is that...a blowtorch?\""
2600203-83 = "Yup. If the flame on the gas stove isn't enough to cook everything evenly..."
2600203-84 = "...then we can use the blowtorch to cook every side at once!"
2600203-85 = "And we can combine the gas stove and blowtorch for double the firepower!"
2600203-86 = "[s] \"That's not how cooking works! You'll...!\""
2600203-87 = "Hiyah! ★"
2600203-90 = "(Juri's method truly did break ground. The devastation it left in its wake was terrifying to behold.)"
2600203-92 = "(Black, charred curry powder lies scattered over more than half of the student dining hall's floor.)"
2600203-93 = "(The gas stove is a flaming pyre.)"
2600203-94 = "(The pot is overflowing with a half-curry-half-stew boiling like lava.)"
2600203-95 = "H-How could this have happened again...?"
2600203-96 = "[s] \"I think I might know what caused this.\""
2600203-97 = "I-I was only trying to whip up curry for the students as fast as I could..."
2600203-98 = "[s] \"There you have it. Your prioritized speed over staying true to the recipe.\""
2600203-99 = "Th-This is fine! We can start over from the beginning!"
2600203-100 = "First, I need to put out the fire! "
2600203-101 = "There!"
2600203-102 = "[s] \"Wait, Juri. Stop...!\""
2600203-104 = "Oh, dear. The explosion must have tripped the sprinkler system..."
2600203-108 = "(Juri and I had a heated discussion about what went wrong as we stood there drenched.)"

[translation]
2600203-1 = "她的料理"
2600203-2 = "格黑娜．第8號學生餐廳"
2600203-3 = "今天要做的料理是……"
2600203-4 = "咖哩！"
2600203-5 = "[s]「比想像中還普通呢。」"
2600203-6 = "因為難得和老師一起做料理嘛。"
2600203-7 = "我想說選擇大家都喜歡的咖哩比較保險。"
2600203-8 = "啊，難道老師不喜歡吃咖哩嗎……？"
2600203-9 = "若要改做上次的蒜味奶油蝦也是可以啦……"
2600203-10 = "[s]「沒那回事！咖哩很好！安全牌萬歲！！」"
2600203-11 = "是嗎？謝謝。"
2600203-12 = "那我們先來準備材料吧！"
2600203-14 = "我把材料拿來了。"
2600203-15 = "咖哩塊，豬肉，三顆馬鈴薯，一顆洋蔥……"
2600203-16 = "還有紅蘿蔔和調味料，等等等等……"
2600203-17 = "大概就這些吧。"
2600203-18 = "[s]「目前還很正常……」"
2600203-19 = "咦？怎麼了嗎，老師？"
2600203-20 = "[s]「沒有，沒什麼。」"
2600203-21 = "是嗎？那現在開始處理食材吧。"
2600203-22 = "首先食譜上寫說，甜味咖哩的肉類口感會特別重要。"
2600203-23 = "所以我們先把豬肉弄軟吧。"
2600203-24 = "[s1]「原來如此。要把肉弄軟也有很多種方法呢。」\n[s2]「可以用蒜泥或牛奶等等。」"
2600203-25 = "沒錯，雖然有很多方法可以促使肉質軟化……"
2600203-26 = "沒錯，雖然有很多方法可以促使肉質軟化……"
2600203-27 = "但我剛好想到了一個好方法。"
2600203-28 = "透過拍打給予衝擊，不是也能讓肉類變軟嗎？"
2600203-29 = "於是我帶了一個很適合的工具！"
2600203-31 = "[s]「那個……茱莉同學？你手上拿的那個是……」"
2600203-32 = "這個嗎？"
2600203-33 = "這是雙管霰彈槍！可以發射數十發子彈！一定可以把肉打到非常軟嫩……！"
2600203-34 = "[s3]「你這與其說是軟嫩！」\n[s4]「不如說是粉碎吧！？」"
2600203-35 = "嘿☆"
2600203-36 = "嘿☆"
2600203-44 = "這下肉就徹底變軟了呢。"
2600203-45 = "[ns5]「這已經不是徹底了吧！？」\n[ns6]「為什麼做飯需要用到槍？！」"
2600203-46 = "咦？！不、不行嗎……？！"
2600203-47 = "咦？！不、不行嗎……？！"
2600203-48 = "果，果然是這樣啊……"
2600203-49 = "因為每次我一把槍拿出來，大家都會衝上來阻止我，我就想到這種可能了……"
2600203-50 = "果然是我拿槍的姿勢不好嗎……"
2600203-51 = "[s]「跟姿勢無關吧？！」"
2600203-52 = "老師！工具的用法是很重要的！"
2600203-53 = "例如菜刀的拿法如果不正確，很容易就會受傷的！"
2600203-54 = "[s]「是那樣沒錯啦，但怎麼反而是我挨罵？！」"
2600203-55 = "總之別擔心，我下次不會再失誤了！"
2600203-56 = "我看看，食譜……食譜……"
2600203-57 = "啊，有了有了。"
2600203-58 = "接下來要把材料炒過。"
2600203-59 = "炒的順序是……"
2600203-60 = "首先是紅蘿蔔，再來是馬鈴薯，最後是洋蔥。"
2600203-61 = "[s]「好，那就從紅蘿蔔開始……」"
2600203-62 = "……但不覺得這樣太耗時間了嗎？"
2600203-63 = "[s]「……嗯？」"
2600203-64 = "餐點必須要在有限的時間內送出去，#n所以我們供給部必須要快速製作大量的餐點。"
2600203-65 = "對於這點我有思考過了。"
2600203-66 = "並且想到了一個劃時代的方法！"
2600203-67 = "嘿！"
2600203-73 = "[s]「等等等等等等等等？！」"
2600203-74 = "怎麼了嗎？"
2600203-75 = "[s]「一次把材料全部加進鍋子裡，會受熱不均……！」"
2600203-76 = "啊，因為每一種蔬菜煮熟的時間都不一樣，"
2600203-77 = "老師是想提醒我這點對吧？"
2600203-78 = "[s]「你知道嘛！那為什麼還！？」"
2600203-79 = "哼哼！身為供給部的社員，這種事情我當然知道～♪"
2600203-80 = "而我想出來的方法，可以解決這個問題！"
2600203-81 = "鏘鏘！只要用這個就行了！"
2600203-82 = "[s]「那是……噴槍？」"
2600203-83 = "沒錯，如果只用瓦斯爐的火力，會很難讓食物均勻熟透，"
2600203-84 = "但只要加上噴槍……！"
2600203-85 = "就能融合瓦斯爐和噴火槍，用兩倍火力一口氣煮熟！"
2600203-86 = "[s]「料理可不是加法欸！？」"
2600203-87 = "嘿呀★"
2600203-90 = "（結果實在慘不忍睹。雖說本來就是危險的舉動，但怎麼搞得這麼誇張……）"
2600203-92 = "（學生餐廳一半以上的地板，都被焦黑的咖哩粉所覆蓋……）"
2600203-93 = "（還有一根高高燃起的火柱……）"
2600203-94 = "（還有從鍋子裡面掉出來，像岩漿一樣滾滾沸騰的咖哩狀不明物體）"
2600203-95 = "嗯～怎麼會變成這樣呢……？"
2600203-96 = "[s]「我想原因應該很明顯……」"
2600203-97 = "我只是想盡快替同學們做出咖哩……"
2600203-98 = "[s]「趕速度結果就變成這樣了……」"
2600203-99 = "沒、沒關係！只要重做一遍就行了！"
2600203-100 = "總之，那個，得先把火撲滅……！"
2600203-101 = "嘿！"
2600203-102 = "[s]「茱莉！先不要再碰任何東西比較好……！」"
2600203-104 = "哇，爆炸導致灑水器……"
2600203-108 = "（不知為何發生的大爆炸，讓我和茱莉一起變成了落湯雞，也讓我們熱烈討論到底是哪裡出錯了）"

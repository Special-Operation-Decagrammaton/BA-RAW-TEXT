[translation]
2600203-1 = "เคล็ดลับทำอาหารของเด็กสาว"
2600203-2 = "โรงอาหาร 8 เกเฮนน่า"
2600203-3 = "อาหารที่จะทำในวันนี้ก็คือ..."
2600203-4 = "แกงกะหรี่ค่ะ!"
2600203-5 = "[s] \"เป็นอาหารธรรมดานี่นา\""
2600203-6 = "นานๆ ทีฉันจะได้ฝึกทำอาหารกับคุณครูนี่คะ"
2600203-7 = "ก็เลยคิดว่าเลือกอาหารเบสิกที่ทุกคนชอบแล้วกัน!"
2600203-8 = "อ๊ะ! หรือว่าคุณครูไม่ชอบแกงกะหรี่เหรอคะ?"
2600203-9 = "หรือว่าจะทำกุ้งกระเทียมที่คุณครูเคยทานก่อนหน้านี้ดีคะ?"
2600203-10 = "[s] \"ไม่เป็นไร! เอาอะไรที่เรียบง่ายดีกว่า!\""
2600203-11 = "อืม... อย่างงั้นเหรอคะ?"
2600203-12 = "เอาล่ะ งั้นเราจะเริ่มจากการเตรียมวัตถุดิบค่ะ!"
2600203-14 = "ฉันเอาวัตถุดิบที่จำเป็นในการทำแกงกะหรี่มาแล้วค่ะ"
2600203-15 = "ก้อนปรุงรสแกงกระหรี่ เนื้อหมู มันฝรั่ง 3 หัว หอมใหญ่ 1 หัว..."
2600203-16 = "แล้วก็แคร์รอตกับเครื่องเทศที่เอาไว้ปรุงรสเพิ่มเติม..."
2600203-17 = "วัตถุดิบน่าจะครบแล้วนะคะ"
2600203-18 = "[s] \"เรียบง่ายดีมาก ดีแล้ว...\""
2600203-19 = "คะ?"
2600203-20 = "[s] \"อืม.. ไม่มีอะไรหรอก\""
2600203-21 = "อืม~? ต่อไปก็มาหั่นวัตถุดิบ"
2600203-22 = "ถ้าตามสูตรแล้ว เนื้อสัมผัสของเนื้อสัตว์ที่ใส่ในแกงกะหรี่รสหอมหวานคือสิ่งที่สำคัญ!"
2600203-23 = "เพราะฉะนั้นเราต้องทำให้เนื้อหมูนุ่มค่ะ"
2600203-24 = "[s1] \"การทำให้เนื้อนุ่มมีหลายวิธีนะ\"\n[s2] \"เราใช้กระเทียมสับ หรือไม่ก็นมสด...\""
2600203-25 = "ฉันรู้ค่ะว่าในหนังสือมีหลายวิธีที่จะทำให้เนื้อนุ่ม..."
2600203-26 = "ฉันรู้ค่ะว่าในหนังสือมีหลายวิธีที่จะทำให้เนื้อนุ่ม..."
2600203-27 = "แต่ฉันคิดไอเดียดีๆ ได้แล้วล่ะค่ะ"
2600203-28 = "เพราะเนื้อสัตว์น่ะ ยิ่งนวดมันก็จะยิ่งนุ่ม"
2600203-29 = "และก็คงไม่มีอุปกรณ์ไหนดีไปกว่า...!"
2600203-31 = "[s] \"เอ่อ.. จูริ? ถืออะไรอยู่น่ะ?\""
2600203-32 = "ปืนไงคะ"
2600203-33 = "ปืนลูกซองดับเบิล บาร์เรล! ฉันจะยิงกระสุนนวดเนื้อรัวๆ จนเนื้อนุ่มเลยค่ะ!"
2600203-34 = "[s3] \"นวดเลย...\"\n[s4] \"เอาเลย...\""
2600203-35 = "ย้ากก! นี่แน่ะ! ☆"
2600203-36 = "ย้ากก! นี่แน่ะ! ☆"
2600203-44 = "เอาล่ะ เท่านี้เนื้อก็น่าจะนุ่มแล้วค่ะ..."
2600203-45 = "[ns5] \"น่าจะเรียกว่าเปื่อยมากกว่านุ่มนะ\"\n[ns6] \"นี่คือการทำอาหารนะ ใช้ปืนได้ยังไง?!\""
2600203-46 = "คะ?! บะ... แบบนี้ไม่ถูกเหรอคะ...?!"
2600203-47 = "คะ?! บะ... แบบนี้ไม่ถูกเหรอคะ...?!"
2600203-48 = "ถะ... ถึงว่า..."
2600203-49 = "พอฉันเอาปืนออกมา ทุกคนต่างก็ตกใจและพยายามห้ามใหญ่เลย..."
2600203-50 = "ฉันคิดว่าคนอื่นทำแบบนั้นเพราะจับปืนผิดวิธีเสียอีกค่ะ... (ทำหน้าเศร้า)"
2600203-51 = "[s] \"คิดว่าเป็นปัญหาที่การจับปืนเหรอ?\""
2600203-52 = "ก็ใช่สิคะ! คุณครูไม่รู้เหรอคะว่าการใช้อุปกรณ์ในครัวให้ถูกวิธีเป็นเรื่องสำคัญมาก!"
2600203-53 = "เช่นถ้าจับมีดผิดวิธีก็อาจโดนมีดบาดได้ เราต้องระวังสิคะ!"
2600203-54 = "[s] \"ทำไมครูถึงเป็นฝ่ายโดนดุล่ะเนี่ย?\""
2600203-55 = "อะ... เอาเถอะค่ะ... ถึงรอบนี้ฉันจะทำพลาด แต่ครั้งหน้าจะไม่พลาดแน่!"
2600203-56 = "สูตรอาหาร... สูตรอาหาร..."
2600203-57 = "อ๊ะ! เจอแล้ว!"
2600203-58 = "ต่อไปก็คือการผัดวัตถุดิบค่ะ"
2600203-59 = "ตามสูตรแล้ว เราต้องใส่วัตถุดิบลงไปให้ถูกลำดับ..."
2600203-60 = "เริ่มที่แคร์รอต แล้วก็มันฝรั่ง จากนั้นก็เป็นหอมใหญ่ค่ะ"
2600203-61 = "[s] \"เอาล่ะ งั้นเริ่มใส่แคร์รอต...\""
2600203-62 = "แต่ทำแบบนี้น่าจะใช้เวลานานไปนะคะ?"
2600203-63 = "[s] \"หืม?\""
2600203-64 = "ก็ถ้าจะทำอาหารให้ทันเวลาอาหารของนักเรียน ชมรมโภชนาการก็ต้องทำให้เร็ว#nและเยอะยังไงล่ะคะ"
2600203-65 = "ฉันไปลองคิดมาด้วยล่ะค่ะ ว่าจะทำยังไงถึงจะทำอาหารในเวลาที่จำกัดได้"
2600203-66 = "และฉันก็ค้นพบวิธีใหม่ๆ ด้วยตัวเองค่ะ!"
2600203-67 = "เยส!"
2600203-73 = "[s] \"เดี๋ยวก่อน เดี๋ยวๆๆๆ!\""
2600203-74 = "คะ...? ทำไมล่ะคะคุณครู?"
2600203-75 = "[s] \"จะโยนทุกอย่างลงในหม้อพร้อมกันไม่ได้นะ!\""
2600203-76 = "เพราะว่าผักแต่ละอย่างต้องใช้เวลาในการสุกที่แตกต่างกัน"
2600203-77 = "คุณครูจะเตือนฉันเรื่องนี้ใช่ไหมคะ?"
2600203-78 = "[s] \"ก็รู้ดีนี่นา!\""
2600203-79 = "อะแฮ่ม! สมาชิกชมรมโภชนาการต้องรู้เรื่องพื้นๆ แบบนั้นอยู่แล้วค่ะ~♪"
2600203-80 = "แต่ยังไงวิธีที่ฉันคิดค้นได้ก็แก้ปัญหาเรื่องนี้ได้ค่ะ!"
2600203-81 = "นี่ไงคะ! แค่ใช้สิ่งนี้ก็หมดเรื่อง!"
2600203-82 = "[s] \"นั่นมัน... ที่พ่นไฟ?\""
2600203-83 = "ใช่ค่ะ ถ้าเราเจอปัญหาที่ไฟจากเตาแก๊สทำให้อาหารสุกไม่ทั่วถึงกันจากเตาแก๊สล่ะก็"
2600203-84 = "เราก็ใช้ 'โบลว์ ทอร์ช' อันนี้พ่นไฟใส่อาหารให้สุกได้ค่ะ!"
2600203-85 = "แค่นี้อาหารก็สุกได้ทันเวลาด้วยการรวมพลังของไฟจากเตาแก๊สและโบลว์ ทอร์ช!"
2600203-86 = "[s] \"ไม่ได้นะ จู่ๆ จะเพิ่มไฟแบบนี้ไม่ได้...\""
2600203-87 = "ย้ากก! นี่แน่ะ! ☆"
2600203-90 = "(ภาพการทำอาหารของจูริดูสยองเกินกว่าจะบรรยาย และความเสียหายที่ทิ้งไว้เบื้องหลังก็น่ากลัว#nกว่านั้นหลายเท่า)"
2600203-92 = "(ผงกะหรี่ไหม้สีดำหกเลอะแทบจะเต็มพื้นโรงอาหาร...)"
2600203-93 = "(เปลวไฟออกมาจากเตาแก๊สอย่างไม่หยุดหย่อน...)"
2600203-94 = "(ส่วนแกงกะหรี่ในหม้อก็เดือดปุดๆ เหมือนลาวา)"
2600203-95 = "ทะ... ทำไมถึงเป็นแบบนี้อีกแล้ว..."
2600203-96 = "[s] \"ครูว่าครูรู้แล้วล่ะว่าเกิดจากอะไร\""
2600203-97 = "ฉะ... ฉันก็แค่อยากรีบทำอาหารให้นักเรียนทุกคนได้กินไวๆ เท่านั้นเอง..."
2600203-98 = "[s] \"จูริให้ความสำคัญกับความรวดเร็วมากกว่าการทำตามสูตรนี่เอง\""
2600203-99 = "มะ... ไม่เป็นไรหรอกค่ะ! เริ่มใหม่ตั้งแต่แรกก็ได้นี่คะ!"
2600203-100 = "ก่อนอื่นก็ต้องดับไฟก่อน...!"
2600203-101 = "เอาล่ะ!"
2600203-102 = "[s] \"จูริ... หยุดก่อน!\""
2600203-104 = "โอ๊ะ ระเบิดนั่นคงไปเปิดระบบสปริงเกอร์..."
2600203-108 = "(สุดท้ายก็ตัวเปียกอยู่ในห้องครัว แต่ก็ได้คุยกับจูริว่าการทำอาหารในวันนี้เกิดความผิดพลาด#nตั้งแต่ตรงไหน...)"

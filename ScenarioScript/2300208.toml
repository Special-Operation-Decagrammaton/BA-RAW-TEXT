[translation]
2300208-1 = "Morning Glory Diary"
2300208-2 = "Schale House Outdoor Terrace"
2300208-3 = "I came to Schale a little earlier than usual, and found Hanae with a watering can at the outdoor terrace."
2300208-4 = "Hmm, hmm...♪ Drink up and grow up big and strong! ♪"
2300208-5 = "[s] \"What are you doing so early in the morning?\""
2300208-6 = "Ah, Sensei. Good morning!"
2300208-7 = "As you can see, I'm watering the flowers. I wanted the terrace by my office to have more color."
2300208-8 = "I'm so proud of these flowers. They've grown a little every time I check them. When I come to Schale, I always head to the terrace first."
2300208-9 = "[s] \"You don't have to come this early if you're just watering flowers, do you?\""
2300208-10 = "You're right, but...you can't see the morning glory bloom after school."
2300208-11 = "You have to wake up early to see the morning glories bloom properly."
2300208-12 = "Look at this, Sensei. The buds of the morning glories might bloom tomorrow."
2300208-13 = "When the morning glories bloom, I'll pick some and bring them to the Executive Office."
2300208-14 = "...Um, do you like morning glories?"
2300208-15 = "[s] \"I do.\""
2300208-16 = "Heehee. I'm happy to hear that."
2300208-17 = "But I'm going to make them more colorful and pretty so that you'll like them even more."
2300208-19 = "Afterwards, Hanae and I discussed how to grow morning glories on the terrace. "

[translation]
2300208-1 = "เฝ้าสังเกตดอกมอร์นิ่งกลอรี่"
2300208-2 = "ระเบียงกลางแจ้งบ้านพักของชาเล่ต์"
2300208-3 = "ในวันที่คุณครูออกจากชาเล่ต์เช้ากว่าปกติ ก็ได้พบกับฮานาเอะที่ถือบัวรดน้ำในระเบียงกลางแจ้ง"
2300208-4 = "ฮึ่ม ฮึ้ม ฮึ่ม~♪ กินเยอะๆ โตไวๆ นะ~♪"
2300208-5 = "[s] \"ทำอะไรแต่เช้าเลยน่ะ?\""
2300208-6 = "อ๊ะ อรุณสวัสดิ์ค่ะคุณครู!"
2300208-7 = "อย่างที่เห็น ฉันกำลังรดน้ำสวนดอกไม้อยู่ค่ะ ฉันกำลังปลูกดอกไม้สวยๆ ไว้วางในสำนักงาน#nจากระเบียงนี้ค่ะ"
2300208-8 = "ฉันรู้สึกภูมิใจกับดอกไม้ที่งอกงามขึ้นทีละนิดในทุกครั้งที่ฉันมาดู เมื่อฉันมาที่ชาเล่ต์ ฉันจะตรงมา#nที่นี่ก่อนโดยที่ฉันไม่รู้ตัวเลยค่ะ"
2300208-9 = "[s] \"ถ้าแค่รดน้ำก็ไม่จำเป็นต้องมาเร็วขนาดนี้ไม่ใช่เหรอ?\""
2300208-10 = "อย่างนั้นก็ใช่ค่ะ... แต่เราจะไม่ได้เห็นดอกมอร์นิ่งกลอรี่บานหลังเลิกเรียนนี่คะ"
2300208-11 = "เพื่อให้ได้ดูดอกมอร์นิ่งกลอรี่บาน ฉันต้องรีบตื่นเช้าให้ได้ค่ะ"
2300208-12 = "ดูนี่สิคะคุณครู ดอกตูมของมอร์นิ่งกลอรี่อาจจะบานพรุ่งนี้ก็ได้นะคะ"
2300208-13 = "พอดอกมอร์นิ่งกลอรี่บาน ฉันจะเด็ดบางส่วนไปวางไว้ที่สำนักงานของชาเล่ต์ค่ะ"
2300208-14 = "...คุณครูชอบดอกมอร์นิ่งกลอรี่มั้ยคะ?"
2300208-15 = "[s] \"ครูชอบดอกมอร์นิ่งกลอรี่นะ\""
2300208-16 = "ฮิฮิ ดีใจจังค่ะที่คุณครูชอบดอกมอร์นิ่งกลอรี่"
2300208-17 = "งั้นฉันต้องดูแลมันให้สวยสดใสขึ้น คุณครูจะได้ยิ่งชอบมันมากกว่าเดิมค่ะ"
2300208-19 = "หลังจากนั้นคุณครูก็พูดคุยกับฮานาเอะเรื่องการปลูกดอกมอร์นิ่งกลอรี่ที่ระเบียงอยู่สักพักหนึ่ง"

[translation]
2300208-1 = "#title;나팔꽃 관찰일기"
2300208-2 = "#place;샬레 하우스 야외 테라스"
2300208-3 = "#na;평소보다 조금 일찍 샬레에 나왔다가, 야외 테라스에서 물뿌리개를 든 하나에를 만났다."
2300208-4 = "3;하나에;01;흥, 흥흥~♪ 많이 먹고 무럭무럭 자라라~♪\n#3;em;[음표]\n#3;a\n#3;hophop"
2300208-5 = "[s] \"이른 아침부터 무얼 하고 있는 거야?\""
2300208-6 = "3;하나에;02;앗, 선생님. 좋은 아침이에요!\n#3;em;[반응]"
2300208-7 = "3;하나에;01;보시다시피 화단에 물을 주고 있었어요. 이곳 테라스에서 집무실에 놓을 만한 예쁜 꽃을 기르고 있었거든요.\n#3;greeting"
2300208-8 = "3;하나에;03;확인할 때마다 한 뼘씩 훌쩍 자라나는 꽃들이 기특해서, 저도 모르게 샬레에 오면 발이 테라스로 먼저 향하게 되네요.\n#3;em;[반짝]\n#3;jump"
2300208-9 = "[s] \"물을 주는 것뿐이라면 이렇게 일찍 올 필요는 없잖아?\""
2300208-10 = "3;하나에;99;그건 그렇지만…… 나팔꽃이 핀 모습은 방과 후에는 볼 수 없으니까요."
2300208-11 = "3;하나에;00;나팔꽃이 핀 모습을 제대로 보려면 부지런히 일어나야 한답니다.\n#3;greeting"
2300208-12 = "3;하나에;02;이것 좀 보세요, 선생님. 나팔꽃의 꽃망울이 움튼 것이 내일이면 꽃을 피울지도 모르겠어요.\n#3;m2\n#3;hophop\n#3;em;[반응]"
2300208-13 = "3;하나에;01;나팔꽃이 활짝 피면 조금 꺾어서 샬레의 집무실에도 가져다 놓을게요.\n#3;m3"
2300208-14 = "3;하나에;02;……저, 나팔꽃은 괜찮으시죠?\n#3;em;[?]"
2300208-15 = "[s] \"나팔꽃은 나도 좋아해.\""
2300208-16 = "3;하나에;00;헤헤, 좋아해 주시니 다행이네요, 나팔꽃.\n#3;greeting"
2300208-17 = "3;하나에;03;그럼 선생님의 마음에 더 들 수 있도록 더 화려하고 예쁘게 가꿔야겠어요.\n#3;em;[반짝]"
2300208-18 = "#all;hide"
2300208-19 = "#na;이후, 테라스에서 한동안 하나에와 나팔꽃을 가꾸는 법에 관해 이야기를 나누었다."

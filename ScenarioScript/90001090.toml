90001090-51 = "1;아인;07\n5;소프;15\n3;오르;13\n#na;소프;윽……! 좋아. 지금은 실컷 그렇게 생각해 두라고. 하지만 이것만은 알아 둬. 우리가 물러나 준 거야! 그 반대가 아니라!\n#5;h\n#1;sig\n#3;sig\n#5;sig\n#5;jump"

[translation]
90001090-1 = "第9話;戰術性勝利"
90001090-2 = "[ns]「成功了！！！」"
90001090-6 = "火山活動怎麼樣了！？"
90001090-10 = "地面震動的頻率已經大幅降低，岩漿噴發的次數也減少了。"
90001090-11 = "火山方面應該不用擔心，已經漸漸趨於穩定了。#n霍刻瑪呢……？"
90001090-15 = "這，這怎麼可能……！#n就算狀態不夠完善，霍刻瑪醬也不應該輸啊……！"
90001090-16 = "等等，這是什麼？#n難道資源量已經足夠了嗎？"
90001090-17 = "……原來如此。#n跟擊退敵人相比，它更重視已開採資源的護送……"
90001090-21 = "真是的，那怎麼不跟我們說一聲呢？"
90001090-22 = "畢，畢竟霍刻瑪醬本來就很害羞嘛。#n嘿嘿，耶嘿嘿。"
90001090-23 = "既然如此就先讓霍刻瑪撤退吧。#n反正階段性的目標已經達成了。"
90001090-29 = "[ns]「霍刻瑪它……」"
90001090-30 = "嗯，似乎撤退了呢。#n那應該是往冰海的方向吧。"
90001090-31 = "不過該怎麼說呢，想不到它竟然有第二形態……"
90001090-32 = "看來一路延續至此的那些坑洞痕跡，真的是怪獸的腳印呢。"
90001090-33 = "[s]「沒錯！是巨大的變形怪獸！！！」"
90001090-34 = "……老師？你為什麼看起來這麼興奮？"
90001090-35 = "[s1]「那可是巨大的變形怪獸耶！？」\n[s2]「世界上沒有人會討厭那種東西吧！？」"
90001090-42 = "呵呵呵。看來還是有人懂得欣賞的嘛。#n雖然對象是那個奇怪的老師就是了。"
90001090-43 = "耶嘿嘿，幸好有人能明白霍刻瑪醬的真正價值。"
90001090-44 = "現在不是稱讚敵人的時候吧……？"
90001090-46 = "無論怎樣都無所謂。反正那東西已經被我們打跑了。"
90001090-51 = "唔……！算了，你們現在就儘管開心吧。#n不過你們最好記住一件事──我們並不是被你們打跑，是自願撤退的！"
90001090-52 = "嗚嗚嗚……"
90001090-53 = "別，別氣餒，Ain！#n沒事的！你已經做得很好了！"
90001090-54 = "現在做到這個程度就夠了。#n你們想必認為自己已經贏了吧？那就儘管沉浸在這份喜悅當中吧。"
90001090-55 = "不過我要告訴你們。#n戰術上的勝利並不一定代表戰略上的勝利。"
90001090-61 = "[ns]「走掉了呢……」"
90001090-62 = "您似乎覺得很遺憾呢，老師。"
90001090-63 = "雖然我也希望盡可能地延長對話……"
90001090-64 = "藉此獲取更多線索……"
90001090-65 = "[s3]「是啊，畢竟我們現在掌握的線索實在太少了。」\n[s4]「真想多跟他們聊聊有關變形怪獸的事……」"
90001090-66 = "沒錯，既然有機會進行對話……"
90001090-67 = "那麼設法利用他們展現的敵意，才是能獲得大量情報的好方法。"
90001090-68 = "雖然可惜，但我們還是得想想辦法吧？"
90001090-69 = "總之要先解決燃眉之急。#n……說到燃眉之急突然覺得更熱了。我先上去囉。"
90001090-70 = "呃，嗯……"
90001090-71 = "您，您遺憾的是那方面的事嗎？"
90001090-72 = "我也是變形戰鬥女僕哦，老師。"
90001090-73 = "既然老師喜歡變形怪獸，就應該多把注意力放在我身上才對。"
90001090-74 = "（總感覺……季好像變得不太一樣……？）"
90001090-79 = "總之大家先回去吧。#n我方也確實出現了一些損傷。"
90001090-80 = "我也同意。#n現在需要一些時間進行休息及整頓。"
90001090-81 = "嗯……而且不管是葛夫拉還是霍刻瑪，我們都還沒真正打倒它們。#n連續戰鬥的消耗已經太大了。"
90001090-82 = "我還能戰鬥。#n畢竟我是最完美的女僕。"
90001090-87 = "不，這樣已經夠了，季。#n你這副模樣怎麼看都不像是能繼續戰鬥。趕緊解除Abi-Eshuh吧。"
90001090-95 = "……我明白了，莉央大人。"
90001090-98 = "大家都辛苦了。"
90001090-99 = "現在總算能喘得過氣了……部長，能把空調開強一點嗎？"
90001090-100 = "請你行行好吧，英美。#n我已經開始覺得冷了。"
90001090-101 = "會冷的話穿上那件黃色的防寒裝備不就行了嗎？"
90001090-102 = "穿著防寒裝備又把空調開到最強，根本是在浪費能源吧？#n你不覺得那才是真正沒效率的行為嗎！？"
90001090-103 = "怎麼會呢，部長。#n作戰人員因為溫度問題而無法發揮100%的潛力，這才是真正的沒效率。"
90001090-104 = "畢竟能源可以補充，機器可以維修或替換，但是大部分人類的身體壞了就是壞了。"
90001090-106 = "我會以最快的速度飛離這片火山地帶。#n這樣應該就能找到能讓兩位都滿意的平衡點了吧。"
90001090-107 = "[s]「這個想法真不錯。季，做得漂亮。」"
90001090-108 = "您過獎了。#nPEACE，PEACE。"
90001090-109 = "P，PEACE……？"
90001090-110 = "沒錯，這是陽葵部長教我的。"
90001090-111 = "沒錯～你的寶貝季正在漸漸成長唷～"
90001090-112 = "這都要歸功於我這個千年的輔導者，兼超天才清楚系病弱美少女。"
90001090-113 = "怎麼辦，莉央會長。#n部長又開始得意忘形了。"
90001090-115 = "不，這個，我……"
90001090-116 = "[s5]「陽葵剛才說的那些話，翻譯過來就是『很高興見到你』。」\n[s6]「還有『謝謝你一直幫助我們』哦。」"
90001090-119 = "並沒有這回事哦？我才沒有那麼想過。"
90001090-120 = "……雖然不可否認的是，我們的確受了他很多幫助。"
90001090-121 = "謝謝你，莉央。#n多虧有你，我們才能得救。"
90001090-122 = "……嗯。"
90001090-126 = "我們目前正在凍原地帶的上空飛行。#n雖然氣流狀態很穩定，不過為了以防萬一，還是請各位隨時保持警戒。"
90001090-127 = "似乎……已經看不見十字神名的殘餘兵力和設施了呢。"
90001090-128 = "聽你提到兵力和設施我才想起來，我剛才收集了一些樣本回來哦。"
90001090-129 = "……你是什麼時候收集那種東西的，部長。#n難道你還想新增松鼠的屬性嗎？"
90001090-130 = "哎呀，松鼠聽起來還挺可愛的呢。"
90001090-131 = "…………看來我好像說錯話了。#n抱歉，老師。"
90001090-132 = "[s]「你現在向我道歉，我也不知道該如何是好……」"
90001090-133 = "我同意。這次似乎確實是英美的錯呢……雖然我也不是很懂。"
90001090-134 = "（總覺得現在開口會讓氣氛變得更尷尬，還是保持沉默吧……）"
90001090-140 = "[ns]「話，話說你剛才說的樣本是怎麼回事？」"
90001090-141 = "就是字面上的意思。#n霍刻瑪、開採資源的設施，以及似乎守護著上述兩者的十字神名兵力……"
90001090-142 = "這些都是相當具有分析價值的對象。"
90001090-143 = "況且軍需工廠的赫賽德明明不在，它們竟然還能經營如此龐大的兵力和設施……#n這點也相當奇怪。"
90001090-144 = "話雖如此，如果想分析樣本的話，我們就必須先找個地方降落才行。"
90001090-145 = "知道了。#n既然這樣就找個涼爽的地方降落吧。"
90001090-146 = "如果對英美來說是涼爽的話，對我而言應該已經是極寒之地了吧……？"
90001090-147 = "可是總得解決直升機的過熱問題不是嗎？"
90001090-148 = "……沒辦法了。這次我就忍耐一下吧。"
90001090-153 = "沒必要現在就急著穿上吧，部長……"
90001090-155 = "下一話;無名之神的遺產"

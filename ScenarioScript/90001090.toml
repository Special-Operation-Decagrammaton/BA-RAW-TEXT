[translation]
90001090-1 = "ตอนที่ 9;ชัยชนะเชิงกลยุทธ์"
90001090-2 = "[ns] \"สำเร็จแล้ว!!!\""
90001090-6 = "สถานการณ์ภูเขาไฟเป็นยังไงบ้างคะ?!"
90001090-10 = "พื้นไม่สั่นสะเทือนมากเหมือนเมื่อกี้แล้วค่ะ ลาวาก็ปะทุน้อยลงด้วยค่ะ"
90001090-11 = "ภูเขาไฟอยู่ในขั้นที่ปลอดภัยแล้ว ตอนนี้คงไม่มีปัญหาแล้วละ ที่สำคัญกว่านั้นก็คือ... ชอกมาห์"
90001090-15 = "ปะ... เป็นแบบนี้ไปได้ยังไงกันคะ...! ถึงจะอยู่ในสภาพที่ไม่สมบูรณ์ แต่ก็เอาชนะชอกมาห์จังได้เหรอ#nคะเนี่ย...!"
90001090-16 = "เดี๋ยวก่อน นี่มันอะไรกัน? ทรัพยากรที่ใช้ได้ถูกใช้จนหมดแล้วเหรอ?!"
90001090-17 = "เพราะแบบนี้สินะคะ... ก็เรามุ่งเน้นไปที่การขนส่งและปกป้องทรัพยากรที่หามาได้มากกว่าการรับมือ และก็ปราบศัตรูนี่คะ..."
90001090-21 = "จริงๆ เลยนะ ถ้าเป็นอย่างนั้นก็พูดโต้งๆ มาเลยเถอะ"
90001090-22 = "กะ... ก็ชอกมาห์จังขี้อายนี่คะ แหะๆ แหะๆๆ"
90001090-23 = "เราให้ชอกมาห์ถอนตัวออกจากตรงนี้มั้ย? เราบรรลุเป้าหมายเชิงกลยุทธ์กันแล้วนี่นา"
90001090-29 = "[ns] \"ชอกมาห์...\""
90001090-30 = "ใช่ค่ะ ล่าถอยไปทางธารน้ำแข็งแล้วสินะคะ"
90001090-31 = "แต่ว่า... ต้องบอกว่ายังไงดีล่ะ ไม่คิดเลยนะคะว่าจะเปลี่ยนรูปร่างได้แบบนั้น"
90001090-32 = "กะแล้วเชียว ร่องรอยคล้ายหลุมติดๆ กันที่เราเจอคือรอยเท้าของสัตว์ประหลาดขนาดยักษ์จริงด้วยนะคะ"
90001090-33 = "[s] \"ใช่เลย! สัตว์ประหลาดขนาดยักษ์ที่เปลี่ยนร่างได้!!!\""
90001090-34 = "คุณครู...? ทำไมถึงดูตื่นเต้นแปลกๆ ล่ะคะ?"
90001090-35 = "[s1] \"มันเป็นสัตว์ประหลาดขนาดยักษ์ที่เปลี่ยนร่างได้เลยนะ?!\"\n[s2] \"ก็มันน่าทึ่งนี่นา! โลกนี้ไม่มีใครไม่ชอบอะไรแบบนั้นหรอก!\""
90001090-42 = "ฮุฮุฮุ มีคนที่พอจะรู้อะไรอยู่บ้างนะคะ ถึงจะเป็นคุณครูที่แปลกๆ ก็เถอะค่ะ"
90001090-43 = "แหะๆๆ แต่ฉันก็ดีใจนะคะที่มีคนมองเห็นคุณค่าที่แท้จริงของชอกมาห์จัง"
90001090-44 = "นี่ไม่ใช่เวลาจะมาชื่นชมศัตรูนะ..."
90001090-46 = "ก็ฟังดูน่าทึ่งอยู่หรอกค่ะ แต่พวกเราก็เอาชนะได้แล้วค่ะ"
90001090-51 = "อึก...! ก็ดี อยากคิดอะไรก็คิดไปเลย แต่ก็รู้อะไรไว้อย่างหนึ่งล่ะ พวกเราต่างหากที่เป็นฝ่ายล่าถอยให้ เราไม่ได้แพ้นะ!"
90001090-52 = "ฮืออ..."
90001090-53 = "ยะ... อย่าหมดกำลังใจสิ ไอน์! ไม่เป็นไรหรอก! ไอน์ทำได้ดีแล้วละ!"
90001090-54 = "หยุดไว้แค่นี้ก่อนแล้วกันค่ะ คงจะคิดว่าตัวเองชนะอยู่ใช่มั้ยคะ? ก็ดีค่ะ ดื่มด่ำกับความรู้สึกนั้นให้เต็มที่#nเลยค่ะ "
90001090-55 = "แต่ก็รู้อะไรไว้อย่างหนึ่งนะคะ ชัยชนะเชิงกลยุทธ์น่ะ ไม่ได้หมายความว่าจะชนะในตอนสุดท้ายเสมอไป#nหรอกค่ะ"
90001090-61 = "[ns] \"ไปกันแล้ว...\""
90001090-62 = "รู้สึกเสียดายสินะคะ คุณครู"
90001090-63 = "ฉันเองก็อยากคุยกับเด็กพวกนั้นให้นานกว่านี้สักหน่อยค่ะ"
90001090-64 = "เผื่อว่าเราอาจจะได้รู้เบาะแสอะไรมากกว่านี้น่ะ..."
90001090-65 = "[s3] \"ก็จริงนะ ตอนนี้เรายังมีเบาะแสไม่พอ\"\n[s4] \"อยากคุยเรื่องสัตว์ประหลาดเปลี่ยนร่างได้ต่อจัง...\""
90001090-66 = "ค่ะ การสนทนากับคู่ต่อสู้ที่เป็นศัตรูน่ะ"
90001090-67 = "ถ้าเราจัดการกับความเป็นปฏิปักษ์นั้นได้ การสนทนาก็เป็นวิธีที่จะได้ประโยชน์สูงสุดเลยละค่ะ"
90001090-68 = "ถึงมันจะน่าเสียดาย แต่เรื่องนั้นเราก็ต้องหาทำทีหลังอยู่ดีไม่ใช่เหรอ?"
90001090-69 = "ตอนนี้เราก็ดับไฟที่เร่งด่วนไปได้แล้ว จริงๆ เลย พอพูดว่าไฟก็รู้สึกร้อนขึ้นกว่าเดิมอีก ฉันขอขึ้นไปก่อน#nแล้วกัน"
90001090-70 = "ค่ะ ค่ะ..."
90001090-71 = "ปะ... ไปในทางนั้นหรอกเหรอคะ?"
90001090-72 = "เห็นอย่างนี้ฉันก็เป็นเมดต่อสู้ที่เปลี่ยนร่างได้นะคะ คุณครู"
90001090-73 = "ถึงคุณครูจะชอบสัตว์ประหลาดที่เปลี่ยนร่างได้ แต่ก็ควรจะให้ความสนใจกับฉันอีกสักหน่อยนะคะ"
90001090-74 = "(รู้สึกเหมือนกับว่า... โทคิจะเปลี่ยนไปนิดหน่อยเลย...)"
90001090-79 = "เอาเป็นว่าทุกคนกลับกันก่อนเถอะค่ะ พวกเราก็โดนโจมตีมาเหมือนกันนะคะ"
90001090-80 = "ฉันเห็นด้วย ทุกคนควรได้พักหายใจและก็ซ่อมบำรุงอาวุธกันด้วย"
90001090-81 = "อืม... ฉันรู้สึกว่าเกวูราห์กับชอกมาห์ยังไม่ได้พ่ายแพ้ไปอย่างชัดเจนทีเดียว แต่ฉันก็หมดพลังไปเยอะ#nกับการต่อสู้ที่ต่อเนื่องด้วย"
90001090-82 = "แต่ฉันยังไหวอยู่ค่ะ ก็ฉันเป็นเมดที่สมบูรณ์แบบกว่าใครนี่คะ"
90001090-87 = "ไม่ได้หรอก พักก่อนเถอะ โทคิ ขืนยังฝืนต่อไปมันจะเกินกำลังเอานะ ปลดอาบี เอชูห์ออกก่อนเลย"
90001090-95 = "เข้าใจแล้วค่ะ... ท่านริโอะ"
90001090-98 = "ทุกคนทำได้ดีมากค่ะ"
90001090-99 = "พอจะหายใจหายคอได้บ้างแล้วแฮะ... แต่หัวหน้า ช่วยปรับแอร์ให้แรงกว่านี้อีกหน่อยไม่ได้เหรอ?"
90001090-100 = "นึกถึงคนอื่นด้วยสิคะ เอมิ ฉันเริ่มหนาวแล้วนะคะ"
90001090-101 = "ถ้าหนาวหัวหน้าก็ใส่ชุดป้องกันความหนาวสีเหลืองๆ นั่นก็ได้นี่"
90001090-102 = "การใส่ชุดแบบนั้นแล้วเปิดแอร์ให้แรงที่สุดคือการสิ้นเปลืองพลังงานนะคะ ทำแบบนั้นไม่มีประสิทธิภาพเอาเสียเลยค่ะ!"
90001090-103 = "ไม่หรอกน่า หัวหน้า การปล่อยให้ผู้ปฏิบัติงานแสดงศักยภาพไม่ได้ 100% เพราะปัญหาเรื่องอุณหภูมิ#nต่างหากที่เป็นเรื่องที่ไม่มีประสิทธิภาพ"
90001090-104 = "พลังงานน่ะเสริมเอาได้ ส่วนอาวุธก็ซ่อมบำรุงและหาของใหม่มาแทนได้ แต่ร่างกายของมนุษย์น่ะหา#nอะไรมาแทนไม่ได้นะ"
90001090-106 = "ฉันจะพาทุกคนออกจากเขตภูเขาไฟให้เร็วที่สุดค่ะ น่าจะทำให้ทั้งคู่หาจุดประนีประนอมกันได้นะคะ"
90001090-107 = "[s] \"เป็นความคิดที่ดีมาก โทคิ\""
90001090-108 = "แค่นี้ไม่เท่าไรหรอกค่ะ พีซ พีซ"
90001090-109 = "พะ... พีซ...?"
90001090-110 = "ใช่ค่ะ ฉันเรียนมาจากหัวหน้าฮิมาริน่ะค่ะ"
90001090-111 = "ใช่แล้วค่ะ~ โทคิของคุณเติบโตและเปลี่ยนไปแล้วค่ะ~"
90001090-112 = "ทั้งหมดต้องให้เครดิตกับพี่เลี้ยงผู้มีรอยยิ้มสดใสฮีลใจเหมือนยาวิเศษแห่งมิลเลเนียมคนนี้แล้วละค่ะ"
90001090-113 = "เอายังไงดีล่ะ ประธานริโอะ? หัวหน้าเริ่มเหิมเกริมขึ้นมาอีกแล้วนะ"
90001090-115 = "อะ... เอ่อ... ฉัน..."
90001090-116 = "[s5] \"ครูแปลให้ ฮิมาริบอกว่าดีใจที่ได้เจอน่ะ\"\n[s6] \"ครูแปลให้ ฮิมาริบอกว่าขอบใจที่ช่วยน่ะ\""
90001090-119 = "ใครว่าอย่างนั้นกันคะ? ฉันไม่เคยคิดอย่างนั้นเลยนะคะ?"
90001090-120 = "แต่ก็นะ... ถึงจะปฏิเสธไม่ได้ว่าฉันได้รับความช่วยเหลือในหลายๆ อย่างก็เถอะค่ะ"
90001090-121 = "ขอบคุณนะคะ ริโอะ พวกเรารอดมาได้เพราะคุณเลยค่ะ"
90001090-122 = "อืม... "
90001090-126 = "ตอนนี้เรากำลังบินอยู่เหนือเขตทุ่งทุนดราค่ะ กระแสลมยังคงที่ แต่ก็ระมัดระวังสถานการณ์ฉุกเฉินกัน#nด้วยนะคะ"
90001090-127 = "ตอนนี้เหมือนจะ... ไม่เห็นกองกำลังที่เหลือ หรือพวกเครื่องจักรอะไรของเดคาแกรมมาทอนแล้วละ"
90001090-128 = "พอพูดเรื่องนี้ ฉันก็คิดอะไรได้ค่ะ ฉันเอาเศษชิ้นส่วนของพวกนั้นมาเป็นตัวอย่างด้วยค่ะ"
90001090-129 = "ไปเอาของแบบนั้นมาตอนไหนน่ะ หัวหน้า อยากเพิ่มคำว่ากระรอกในฉายาของตัวเองเหรอ?"
90001090-130 = "ตายจริง กระรอกเหรอคะ? น่ารักจัง คำนี้น่าสนใจนะคะ"
90001090-131 = "ฉันเลือกคำได้ไม่ดีเองละ... ขอโทษนะคุณครู"
90001090-132 = "[s] \"ถ้าเอมิขอโทษ แล้วครูจะถูกมองว่ายังไงละทีนี้...\""
90001090-133 = "ถูกมองยังไงฉันก็ไม่รู้หรอกค่ะ แต่เหมือนว่าครั้งนี้เอมิจะเป็นคนผิดนะคะ ฉันเห็นด้วยค่ะ"
90001090-134 = "(ขืนพูดอะไรออกไปน่าจะอึดอัดไปมากกว่านี้ เราอยู่เงียบๆ ดีกว่า...)"
90001090-140 = "[ns] \"จะว่าไป เก็บตัวอย่างมาด้วยอย่างนั้นเหรอ?\""
90001090-141 = "ชอกมาห์ เครื่องเก็บทรัพยากร และกองกำลังของเดคาแกรมมาทอนที่ดูเหมือนจะคอยปกป้องสิ่งเหล่า#nนี้อยู่..."
90001090-142 = "ทุกอย่างล้วนเป็นสิ่งที่ต้องวิเคราะห์ต่อค่ะ"
90001090-143 = "แต่เหนือสิ่งอื่นใด ฉันว่ามันน่าสงสัยที่พวกนั้นใช้กองกำลังและเครื่องไม้เครื่องมือเยอะขนาดนั้นได้โดย#nไม่มีเชเซ็ดที่เป็นโรงงานอาวุธค่ะ"
90001090-144 = "แต่ถ้าจะวิเคราะห์ตัวอย่างที่เก็บมา เราก็น่าจะต้องเอาเฮลิคอปเตอร์ลงจอดก่อนนะคะ"
90001090-145 = "เข้าใจแล้ว ถ้าอย่างนั้นขอเป็นที่ที่เย็นสบายหน่อยนะ"
90001090-146 = "ที่ที่เย็นสบายสำหรับเอมิ น่าจะเป็นที่ที่โหดร้ายสำหรับฉันก็ได้นะคะ...?"
90001090-147 = "แต่ถึงยังไงเราก็ต้องแก้ปัญหาเรื่องความร้อนของเครื่องยนต์อยู่ดีนี่นา"
90001090-148 = "ถ้าอย่างนั้นก็ช่วยไม่ได้นะคะ... ครั้งนี้ฉันจะเป็นฝ่ายทนเอาแล้วกันค่ะ"
90001090-153 = "ไว้เครื่องลงจอดแล้วค่อยทนก็ได้ หัวหน้า..."
90001090-155 = "ตอนต่อไป;มรดกแห่งทวยเทพไร้นาม"

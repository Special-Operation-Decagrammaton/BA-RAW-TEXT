[translation]
90001090-1 = "Episode 9;Tactical Victory"
90001090-2 = "[ns] \"We did it!\""
90001090-6 = "What about the volcanic activity?"
90001090-10 = "Earthquake magnitude has reduced significantly. Lava flow appears virtually nonexistent."
90001090-11 = "The volcano is beginning to stabilize. That's the least of our worries. What is Chokmah's status?"
90001090-15 = "I-It can't be...! Even though Chokmah was not yet perfected, I can't believe it lost...!"
90001090-16 = "Wait. What is this? We've filled our resource quota?"
90001090-17 = "That was the situation. It prioritized the protection of resource delivery, rather than the defeat of the variables."
90001090-21 = "If that was its plan, it should've spoke up!"
90001090-22 = "B-Baby Chokmah is a shy one. Heh. Heh, heh."
90001090-23 = "Let Chokmah retreat from here, in that case. In terms of strategy, we're already victorious."
90001090-29 = "[ns] \"Chokmah is...\""
90001090-30 = "Yes. It's retreating. Towards the Glacial Sea."
90001090-31 = "Regardless... How do I put this? To imagine it had a second form..."
90001090-32 = "Yes. The gigantic pits we saw were the actual footprints of the monster."
90001090-33 = "[s] \"Right! A giant transforming monster!!\""
90001090-34 = "Aren't you...oddly excited right now, Sensei?"
90001090-35 = "[s1] \"I mean, it's a giant! Transforming! Monster!\"\n[s2] \"Who wouldn't be excited about that?!\""
90001090-42 = "Heeheehee. One of them proves to have good taste! Although for that one to be the strange teacher... It's distasteful. Problematic."
90001090-43 = "Heheheh. I'm just glad someone out there recognizes how great our baby Chokmah is."
90001090-44 = "Hey, hey. Why're we complimenting our enemies all of a sudden?"
90001090-46 = "Sure. I'm happy for you. But we still defeated the robot-thing."
90001090-51 = "Ugh! Sure, whatever! You can tell yourself that! But we know the truth is that we retreated for your sakes! Not the other way around!"
90001090-52 = "*sob*"
90001090-53 = "D-Don't be upset. Ein! It's okay! You did good!"
90001090-54 = "We will let sleeping dogs lie. This feeling of supposed \"victory\"... Enjoy it to the fullest. Savor it, for now. "
90001090-55 = "Mark my words. A tactical victory does not make for a strategic triumph."
90001090-61 = "[ns] \"They left...\""
90001090-62 = "You seem disappointed, Sensei."
90001090-63 = "Naturally, I had hoped for more opportunity to converse with those children as well."
90001090-64 = "Perhaps we could've found out more, even if only the barest crumb of a clue."
90001090-65 = "[s3] \"You're right, we barely have any leads right now.\"\n[s4] \"I wanted to talk more about the transforming monster...\""
90001090-66 = "Yes. That's right. Sometimes, you must fraternize with the enemy."
90001090-67 = "If we could quell their hostility, they would naturally be the most direct source of information we could find."
90001090-68 = "Yes, it's unfortunate and all that, but we'll figure it out, right?"
90001090-69 = "At least we've put out the biggest fire. Speaking of fire, I'm hot. I'm leaving. Goodbye."
90001090-70 = "Okay..."
90001090-71 = "Th-That was your main concern?"
90001090-72 = "I am a transforming battle maid, Sensei."
90001090-73 = "You are allowed to like transforming monsters. However, you should give me some of that affection and attention."
90001090-74 = "(Somehow...Toki seems a bit...different?)"
90001090-79 = "Let's head back for now. We have our own injuries to nurse."
90001090-80 = "I agree. We need time to catch our breath and perform maintenance."
90001090-81 = "Yes. Just like Geburah, I cannot positively assert that Chokmah has been rendered completely inoperable. And the barrage of battles expended a large amount of our resources."
90001090-82 = "However, if needed, I could continue. For I am the perfect maid."
90001090-87 = "False. Stand down, Toki. Even you need to rest. Power down Abi-Eshuh immediately."
90001090-95 = "...Understood, Ms. Rio."
90001090-98 = "Good work, everyone."
90001090-99 = "I just might survive. But can we turn up the AC more, President?"
90001090-100 = "Spare me, Eimi. It's already getting cold in here..."
90001090-101 = "Your yellow jacket is made for cold weather. You can put that on."
90001090-102 = "You're telling me to wear a jacket, just so that you can have the AC on max? That's an utter waste of energy. What happened to the \"efficiency\" you love so much?"
90001090-103 = "You're wrong, President. In this case, inefficiency would be your operator not being able to reach 100% of her potential due to poor temperature conditions."
90001090-104 = "Energy can be recharged. Machines can be maintained, even replaced. The human body cannot."
90001090-106 = "We will leave this volcanic region at full speed. You two can reach a compromise after that."
90001090-107 = "[s] \"Great decision, Toki. Nice.\""
90001090-108 = "It was nothing. Peace, peace."
90001090-109 = "P-Peace...?!"
90001090-110 = "Yes. I learned this from President Himari herself."
90001090-111 = "That's right! See how your very own Toki has grown and changed!"
90001090-112 = "This, that, everything you observe, with your very own eyes! They're all thanks to this Millennium mentor and super-genius, delicate, chic beauty."
90001090-113 = "What are you going to do about this, Ms. Rio? The president's head has blown up again."
90001090-115 = "N-No. I..."
90001090-116 = "[s5] \"Translation: Himari is happy she got to see you.\"\n[s6] \"Thanks for all that you've done.\""
90001090-119 = "Where did you come up with that? That thought has never crossed my mind, not in my entire life. "
90001090-120 = "...I suppose I can't deny that your presence has benefitted this mission, in more ways than one."
90001090-121 = "Thank you, Rio. You saved us."
90001090-122 = "...Yes. "
90001090-126 = "We are above the tundra region. The air current is stable, but please remain on guard for any emergencies."
90001090-127 = "It seems like the Decagrammaton's remaining forces and facilities...are no more."
90001090-128 = "That reminds me. I collected samples from both of them."
90001090-129 = "...When did you do that, President? Do you intend on adding \"squirrel\" to your long list of titles?"
90001090-130 = "Oh my. A squirrel does sound cute."
90001090-131 = "...I believe this may be a rare situation where I accidentally encouraged her. I apologize, Sensei."
90001090-132 = "[s] \"If I agree, then I'd be agreeing that Himari's...well...\""
90001090-133 = "I am failing to comprehend this interaction. However, it appears we believe Eimi did something wrong. I will agree."
90001090-134 = "(This is a little awkward, so I think it'd be best if I just stay out of it...)"
90001090-140 = "[ns] \"A-Anyways, what did you mean by samples?\""
90001090-141 = "It's just as I said. Chokmah, resource harvesting facilities, and what seemed to be Decagrammaton's forces protecting them..."
90001090-142 = "They were all subjects worth analyzing."
90001090-143 = "Above all, the fact that they were operating forces and facilities of this scale without Chesed, their munition factory, incites suspicion."
90001090-144 = "We will need to land the helicopter to begin analysis."
90001090-145 = "Understood. Let's do it somewhere very cool."
90001090-146 = "Somewhere cool for Eimi...may be torture for me..."
90001090-147 = "That may be right, but we're also concerned about the helicopter engine overheating."
90001090-148 = "...It can't be helped. I'll give in this time."
90001090-153 = "You don't have to start pouting already, President..."
90001090-155 = "Next Episode;Legacy of the Nameless Gods"

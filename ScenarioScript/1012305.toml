1012305-52 = "3;세이아 수영복;99;……특별히 더 생각나는 말이 없네요."
1012305-53 = "3;세이아 수영복;06;죄송해요. 이렇게 재미없는 아이인데, 괜히 불러서 시간만 빼앗고 있네요.\n#3;em;[속상함]"
1012305-54 = "3;세이아 수영복;01;사실은 저도 조금 더 재미있는 방식이나, 흥미를 느끼실 만한 게 있는지 고민해 봤었답니다."
1012305-55 = "3;세이아 수영복;05;수수께끼로 접근을 해볼까? 책에 대한 이야기를 해볼까? 여러 가지 고민을 했고……."
1012305-56 = "3;세이아 수영복;99;하지만 뭘 생각해도 그다지 이거다! 하는 느낌이 없더군요."
1012305-57 = "3;세이아 수영복;06;뭐, 그야 그렇겠지요. 그 생각을 하고 있는 게 저이니까요.\n#3;em;[한숨]"
1012305-58 = "3;세이아 수영복;01;기껏 지어낸 것이 꾀병이나 가벼운 거짓말 정도였지만, 그것도 이제 다 간파돼 버리고 마는군요."
1012305-59 = "3;세이아 수영복;01;그리고 이렇게, 더 이상 꺼내 들 주제가 없으니 옷에 대한 이야기나 꺼내 들고 있습니다."
1012305-60 = "3;세이아 수영복;99;……정말이지."
1012305-61 = "3;세이아 수영복;12;정말이지 불쌍한 녀석이네요, 저는. 후후후."

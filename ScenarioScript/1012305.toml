[translation]
1012305-1 = "Final Moment"
1012305-2 = "After reading Seia's message, I headed to her room."
1012305-7 = "...I've been waiting, Sensei."
1012305-8 = "For the \"end\" that I wanted to share with you..."
1012305-10 = "Seia's Room"
1012305-11 = "...Whew."
1012305-12 = "You don't seem surprised at all. In fact, you look as if you expected this."
1012305-13 = "[s1] \"Well, it makes sense.\"\n[s2] \"You meant the 'end' of wearing this ensemble?\""
1012305-19 = "Perhaps...I was telegraphing my intentions."
1012305-20 = "Hmm. But still, I believed that you lacked a certain...intuition. I was hoping you'd act more surprised."
1012305-21 = "I aimed to surprise you. I thought you might say, \"Oh, Seia, are you sick? Is something going on?\" as you entered."
1012305-22 = "Your reaction is so utterly indifferent that it's hurting my feelings. Are you...content with that?"
1012305-23 = "How will you fill my empty heart now? Did you bring me anything worthwhile?"
1012305-24 = "...Excuse me?"
1012305-25 = "You can't tell me? What does that—"
1012305-26 = "[s3] \"...Seia, let's move past that.\"\n[s4] \"I'm trying to go easy on you.\""
1012305-32 = "Fufu, very well. As you wish."
1012305-33 = "I should've said sorry... No, I should have thanked you for being so calm. Very well. Let's move on."
1012305-34 = "I called you...because today is the last day I'll be wearing this, as you surmised."
1012305-35 = "Actually, there's no particular reason to wear this today. All my friends have already seen it and shared their thoughts."
1012305-36 = "And yet...I still couldn't put it away."
1012305-37 = "I wanted to show it to you one last time."
1012305-38 = "It's a funny excuse. Which is also the reason why I thought to call you."
1012305-39 = "If someone's going to laugh about my dramatics...I'd rather have them be you."
1012305-40 = "Why don't I just wear it again whenever I want?"
1012305-41 = "...I suppose that's what you typically say to the other students."
1012305-42 = "Well... I wouldn't say I absolutely cannot, but... How should I put it...?"
1012305-43 = "That doesn't compel me. It would lose a certain magic."
1012305-44 = "I should be wearing a different outfit next time, for a different occasion. But today is its own opportunity, is it not?"
1012305-45 = "For an outfit that I have to wear repeatedly, I think Trinity's..."
1012305-46 = "...Tea Party's \"uniform\" is already enough."
1012305-47 = "And when I wear something different, something like this..."
1012305-48 = "...I feel liberated of my usual mental constraints."
1012305-52 = "I think that's all I have to say."
1012305-53 = "I'm sorry. I'm such a droll girl, and yet I choose to take up your time."
1012305-54 = "Truly, I've evaluated this from multiple approaches. I considered your interests and hobbies."
1012305-55 = "I thought about perhaps being more cryptic, like I could quote books and philosophy."
1012305-56 = "But none of them clicked. None of them particularly excited me, so why would they excite you?"
1012305-57 = "I suppose that is to be expected. I'm limited by my own mental frameworks."
1012305-58 = "My little...pranks used to be acting sick or slipping in a little fib, but you've seen through all that."
1012305-59 = "And now, seeing as I have nothing left to share, here I am talking about clothes."
1012305-60 = "...Seriously."
1012305-61 = "What a pitiful girl I am. Fufufu."
1012305-62 = "[s5] Pat Seia's head.\n[s6] \"There, there.\""
1012305-65 = "...? Sensei?"
1012305-66 = "What does this mean?"
1012305-67 = "...Excuse me?"
1012305-68 = "That's your response? Pat pat? ...You like it, or...?"
1012305-69 = "What are you trying to say...?"
1012305-74 = "[ns7] \"...Seia?\"\n[ns8] \"Are you mad?\""
1012305-77 = "...Hmph."
1012305-78 = "Honestly, you're so mean to me, Sensei. Even if I somewhat deserve it."
1012305-79 = "But if you're going to play games, then remember whose field you're on."
1012305-86 = "[ns9] \"...Seia?!\"\n[ns10] \"You locked the door...?!\""
1012305-90 = "Fufufu..."
1012305-91 = "Aw, genuine panic. I now know the only thing that solicits a real response out of you."
1012305-92 = "As I'm sure you know, this is MY room. And, in my room...MY word is Trinity's law."
1012305-93 = "Now then... It's time for you to spoil me, Sensei."
1012305-99 = "...And you are not leaving without my permission."
1012305-101 = "I spoiled Seia in her room until she was fully satisfied."
1012305-102 = "By the time she opened the door and said goodbye, it was evening."

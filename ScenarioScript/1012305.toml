1012305-12 = "3;세이아 수영복;04;역시 전혀 놀라지 않는 표정이시네요. 그러기는커녕, '예상했다'는 얼굴이에요."
1012305-13 = "[s1] \"뭐, 실제로 사실이니까.\"\n[s2] \"역시 '그 옷의 마지막'이란 뜻이었지?\""

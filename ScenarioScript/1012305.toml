1012305-18 = "3;세이아 수영복;13\n#3;em;[빠직]\n#3;h\n#wait;1500"
1012305-19 = "3;세이아 수영복;06;사실 그렇습니다……만."
1012305-20 = "3;세이아 수영복;05;흐응. 그래도 너무 무드가 없으세요. 조금은 놀라는 척이라도 해주실 줄 알았는데 말이에요.\n#3;em;[땀]"
1012305-21 = "3;세이아 수영복;10;어디 아파? 라던가, 무슨 일 있어? 같은 식으로 놀라며 들어오시는 걸 기대했거든요.\n#3;jump"
1012305-22 = "3;세이아 수영복;06;너무 담담한 반응이라 제가 조금 무안해질 지경이에요. 이래도 되는 걸까요?"
1012305-23 = "3;세이아 수영복;05;허탈해진 저를 무엇으로 채워 주실 예정이실까요? 생각해 둔 게 있으신가요?"
1012305-24 = "3;세이아 수영복;02;……네?\n#3;em;[?]"
1012305-25 = "3;세이아 수영복;04;말해줄 수 없다고요? 그게 무슨……."
1012305-26 = "[s3] \"……사실 세이아도 알고 있지?\"\n[s4] \"이미 꽤 봐주고 있다고 생각하는데~?\""

[translation]
1012305-1 = "วินาทีสุดท้าย"
1012305-2 = "(เมื่อเห็นข้อความของเซอา คุณครูก็มุ่งหน้าไปยังห้องของเธอ)"
1012305-7 = "ฉันกำลังรออยู่เลยค่ะ... คุณครู"
1012305-8 = "'ช่วงเวลาสุดท้าย' ที่ฉันบอกก็คือ..."
1012305-10 = "ห้องของเซอา"
1012305-11 = "ฮู่ว..."
1012305-12 = "สีหน้าดูไม่ตกใจเลยแม้แต่น้อยนะคะ เหมือนจะบอกว่า 'กะไว้แล้วว่าเป็นแบบนี้' มากกว่าเสียอีก"
1012305-13 = "[s1] \"ก็มันจริงนี่นา\"\n[s2] \"หมายถึง 'ช่วงเวลาสุดท้ายของชุดนี้' ใช่มั้ย?\""
1012305-19 = "ที่จริงมันก็... จริงค่ะ"
1012305-20 = "ฮึ่ม แต่แบบนี้มันก็หมดสนุกสิคะ ฉันคิดว่าคุณครูจะแกล้งทำเป็นตกใจเสียอีก"
1012305-21 = "ฉันหวังไว้ว่าคุณครูจะเข้ามาด้วยสีหน้าตกอกตกใจ แล้วถามกันว่าเป็นอะไร? ไม่สบายตรงไหนหรือเปล่า?"
1012305-22 = "แต่พอคุณครูไม่แสดงปฏิกิริยาอะไรเลย ฉันก็อายนะคะ จะให้ฉันเป็นแบบนี้เหรอคะ?"
1012305-23 = "แบบนี้จะทำยังไงให้ฉันดีขึ้นล่ะคะ? มีไอเดียอะไรมั้ย?"
1012305-24 = "คะ...?"
1012305-25 = "บอกไม่ได้งั้นเหรอคะ? อะไรกัน..."
1012305-26 = "[s3] \"ที่จริงเซอาก็รู้อยู่แล้วใช่มั้ยล่ะ?\"\n[s4] \"ครูว่าครูก็ยอมเล่นด้วยแล้วนะเนี่ย~?\""
1012305-32 = "ฮุฮุ อย่างนี้เองสินะคะ คุณครูพูดถูกแล้วละค่ะ"
1012305-33 = "นี่เป็นสถานการณ์ที่ฉันควรจะบอกว่าขอโทษ... ไม่สิ ขอบคุณมากกว่านะคะ ก็ได้ค่ะ ฉันจะยอมให้"
1012305-34 = "ส่วนเหตุผลที่ฉันติดต่อไปน่ะ... ก็เพราะวันนี้เป็นวันสุดท้ายที่ฉันจะได้ใส่ชุดนี้อย่างที่คุณครูว่าเลยค่ะ"
1012305-35 = "ที่จริงวันนี้ฉันก็ไม่มีเหตุผลอะไรให้ใส่ด้วย แล้วฉันก็ใส่ให้คนรอบตัวเห็นไปหลายครั้งแล้วด้วยค่ะ"
1012305-36 = "แต่ถึงยังไง... มันก็น่าเสียดายนี่คะ"
1012305-37 = "ฉันก็เลยอยากให้คุณครูได้เห็นอีกครั้ง เป็นครั้งสุดท้ายน่ะค่ะ"
1012305-38 = "เป็นเหตุผลที่ตลกใช่มั้ยคะ ที่จริงก็มีเหตุผลที่ฉันไม่ได้เรียกใครอื่นมา แต่เรียกแค่คุณครูมาด้วยนะคะ"
1012305-39 = "ในเมื่อจะทำให้ใครยิ้มได้แล้ว... ฉันก็อยากให้เป็นคุณครูน่ะค่ะ"
1012305-40 = "ถ้าอยากใส่ ฉันก็หยิบชุดนี้มาใส่ได้ทุกเมื่องั้นเหรอคะ?"
1012305-41 = "ปกติคุณครูคงพูดแบบนี้กับนักเรียนคนอื่นสินะคะ..."
1012305-42 = "ก็นะ... ไม่ใช่ว่ามันจะเป็นไปไม่ได้... แต่จะว่ายังไงดีล่ะ..."
1012305-43 = "ฉันไม่อยากทำอย่างนั้นน่ะค่ะ มันดูไม่น่าจะสนุกด้วย"
1012305-44 = "ต่อไปต้องใส่ชุดอื่นสิคะ ก็อย่างที่ฉันเคยบอกไป สำหรับฉันแล้วโอกาสที่จะได้ใส่ชุดใหม่ๆ มีไม่เยอะหรอกค่ะ"
1012305-45 = "ชุดที่ต้องใส่ประจำน่ะ... "
1012305-46 = "แค่ชุดนักเรียนสภาน้ำชาของทรีนิตี้ก็พอแล้วค่ะ"
1012305-47 = "และถ้าชุดของฉันมันต่างออกไปละก็..."
1012305-48 = "ข้อจำกัดทางจิตใจที่ฉันมีอยู่ทุกวันก็ย่อมเปลี่ยนไปด้วยค่ะ"
1012305-52 = "ฉันน่าจะอธิบายได้แค่นี้ค่ะ..."
1012305-53 = "ขอโทษนะคะ ฉันเป็นเด็กที่ไม่มีอะไรน่าสนุกเลย ฉันไม่น่าเรียกคุณครูมาให้เปลืองเวลากับฉันเลยค่ะ"
1012305-54 = "ที่จริงฉันก็ลองคิดดูแล้วค่ะว่าจะมีวิธีที่สนุกกว่านี้ หรือจะทำยังไงให้คุณครูรู้สึกเพลิดเพลินได้บ้าง"
1012305-55 = "ทั้งคิดว่าจะเข้าหาด้วยปริศนาอะไรดีมั้ยนะ หรือว่าจะชวนคุยเกี่ยวกับหนังสือดี..."
1012305-56 = "แต่ไม่ว่าจะคิดเท่าไรก็ไม่ได้ไอเดียที่ถูกใจเลยค่ะ"
1012305-57 = "แต่ก็ไม่แปลกหรอกค่ะ ก็ฉันเป็นคนคิดนี่คะ"
1012305-58 = "ถึงสิ่งที่คิดได้จะมีแค่การแกล้งป่วยหรือเรื่องโกหกเล็กๆ น้อยๆ แต่ตอนนี้เรื่องพวกนั้นก็ถูกมองเห็น#nอย่างทะลุปรุโปร่งนะคะ"
1012305-59 = "ในเมื่อไม่มีหัวข้ออะไรให้พูดแล้ว ฉันก็เลยหยิบเรื่องเสื้อผ้าขึ้นมาพูดค่ะ"
1012305-60 = "จริงๆ เลยเชียว..."
1012305-61 = "ฉันช่างเป็นเด็กที่น่าสมเพชจริงๆ เลยนะคะ ฮุฮุฮุ"
1012305-62 = "[s5] ลูบหัวเซอา\n[s6] แตะหัวเซอา"
1012305-65 = "คุณครู...?"
1012305-66 = "ทำแบบนี้หมายความว่ายังไงคะ?"
1012305-67 = "คะ...?"
1012305-68 = "รอดูท่าทีแบบนี้จากฉันอยู่...? เพราะชอบแบบนี้เหรอคะ...?"
1012305-69 = "พูดเรื่องอะไรน่ะ..."
1012305-74 = "[ns7] \"เซอา...?\"\n[ns8] \"งอนเหรอ?\""
1012305-77 = "ฮึ่ม..."
1012305-78 = "คุณครูทำเกินไปแล้วนะคะ แล้วก็เป็นแต่กับฉันด้วย ถึงจะบอกว่าเป็นกรรมตามสนองก็เถอะค่ะ..."
1012305-79 = "ถ้าจะเล่นอย่างนี้ งั้นฉันก็จะทำบ้างนะคะ"
1012305-86 = "[ns9] \"เซอา...!?\"\n[ns10] \"ล็อกประตูเลยเหรอ...!?\""
1012305-90 = "ฮุฮุฮุ..."
1012305-91 = "ทีนี้ละตกใจขึ้นมาเลยนะคะ เพิ่งรู้เลยนะคะว่าต้องยั่วยุคุณครูด้วยวิธีแบบนี้น่ะ"
1012305-92 = "คุณครูรู้อยู่แล้วใช่มั้ยว่าเมื่ออยู่ในห้องนี้น่ะ... คำพูดของฉันก็ไม่ต่างกับกฎของทรีนิตี้"
1012305-93 = "เอาละ ถ้าอย่างนั้นก็... ถึงเวลาให้ฉันทำตัวเหมือนเด็กแล้วละค่ะ คุณครู"
1012305-99 = "คุณครูจะออกไปจากที่นี่ไม่ได้... จนกว่าฉันจะอนุญาตค่ะ"
1012305-101 = "(หลังจากนั้นคุณครูก็ยอมให้เซอาทำตัวเป็นเด็กในห้องจนกว่าเธอจะพอใจ)"
1012305-102 = "(กว่าเซอาจะยอมให้คุณครูกลับก็ปาเข้าไปมืดค่ำแล้ว)"

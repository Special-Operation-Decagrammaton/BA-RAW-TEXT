1012305-31 = "3;세이아 수영복;04\n#3;em;…\n#3;h\n#wait;2500"
1012305-32 = "3;세이아 수영복;15;후후, 그렇군요. 맞는 말씀이네요."
1012305-33 = "3;세이아 수영복;14;오히려 제가 죄송하다…… 아니, 감사하다-라고 말씀드려야 할 상황이었군요. 좋습니다. 넘어가죠."
1012305-34 = "3;세이아 수영복;01;연락드렸던 이유는……. 말씀하신 대로 오늘이 이 옷을 입는 마지막이기 때문입니다."
1012305-35 = "3;세이아 수영복;99;실은 오늘도 딱히 입을 이유가 없죠. 이미 꽤 여러 번 주변에 보여주기도 했으니까요."
1012305-36 = "3;세이아 수영복;06;그래도……. 아깝달까요."
1012305-37 = "3;세이아 수영복;01;그래서 한 번이라도 더, 마지막으로 선생님께 보여드리고 싶었어요."
1012305-38 = "3;세이아 수영복;11;우스운 이유죠. 실은 그래서 다른 사람이 아닌, 선생님을 부른 이유기도 하고요."
1012305-39 = "3;세이아 수영복;15;이왕 웃을 거라면 선생님이……. 라는 느낌이랄까요."
1012305-40 = "3;세이아 수영복;02;언제든지 또 입으면 되지 않느냐고요?\n#3;em;[반응]"
1012305-41 = "3;세이아 수영복;01;……평소에 다른 학생들에게는 그렇게 말씀해 주시나 보군요."
1012305-42 = "3;세이아 수영복;99;뭐……. 아예 불가능한 이야기는 아니겠습니다만……. 뭐랄까……."
1012305-43 = "3;세이아 수영복;09;그건 제가 내키지 않네요. 재미도 없고 말이죠.\n#3;em;[한숨]"
1012305-44 = "3;세이아 수영복;06;다음에는 다른 옷을 입어야지요. 모처럼의 기회가 생긴 거잖아요? 이런 기회는 저에게 별로 없잖아요? 말씀드렸듯이."
1012305-45 = "3;세이아 수영복;99;반복적으로 입어야 하는 옷은 트리니티의……."
1012305-46 = "3;세이아 수영복;01;……티파티의 교복만으로도 충분하답니다."
1012305-47 = "3;세이아 수영복;02;그리고 조금은, 옷이 다르면……."
1012305-48 = "3;세이아 수영복;11;평소에 걸려 있던 심적 제약 사항도 많이 달라지는 법이고 말이죠."

[translation]
1012305-1 = "最後的時刻"
1012305-2 = "（聽了聖亞的話後，前往了聖亞的房間）"
1012305-7 = "……我正在等你哦，老師。"
1012305-8 = "我所謂的「最後」指的是……"
1012305-10 = "聖亞的房間"
1012305-11 = "……呼。"
1012305-12 = "老師果然一點也不驚訝呢。#n不僅如此，臉上還寫著「我就知道」的表情。"
1012305-13 = "[s1]「畢竟實際上就是這樣嘛。」\n[s2]「果然是指『這套衣服的最後一次』吧？」"
1012305-19 = "雖然是這樣沒錯……"
1012305-20 = "哼嗯……不過老師是否有點不解風情了？#n我還以為你至少會裝作驚訝的呢。"
1012305-21 = "比如說著「哪裡不舒服嗎？」或「發生什麼事了？」走進房間……#n這才是我本來期待看見的反應。"
1012305-22 = "結果你卻平淡到我都有點不好意思了……這樣真的好嗎？"
1012305-23 = "那麼，老師打算用什麼來填補我這顆空虛的心呢？#n你有做好準備嗎？"
1012305-24 = "……嗯？"
1012305-25 = "不能說？#n這是什麼意思……"
1012305-26 = "[s3]「……其實聖亞自己也知道吧？」\n[s4]「我應該已經很包容了吧～？」"
1012305-32 = "呵呵，老師說的確實沒錯呢。"
1012305-33 = "反而應該是我該說聲抱歉……不，應該說聲謝謝才對。#n嗯，就這樣吧。"
1012305-34 = "我聯絡老師的理由……就跟你說的一樣，因為今天是最後一次穿這套衣服了。"
1012305-35 = "其實今天穿上他也沒什麼特別的原因。#n畢竟不少人都已經看過了。"
1012305-36 = "只是……覺得有點可惜吧。"
1012305-37 = "所以我才想再穿上它，讓老師看見這最後一次。"
1012305-38 = "理由很可笑吧？#n這也是為什麼我只叫老師一個人來的原因。"
1012305-39 = "就算被取笑也希望是由老師來……大概就是這種感覺。"
1012305-40 = "想穿隨時可以再穿？"
1012305-41 = "……看來你平常也是對其他學生這麼說的吧。"
1012305-42 = "雖然不是完全不可能……但怎麼說呢……"
1012305-43 = "我自己不是很喜歡。那樣感覺太沒意思了。"
1012305-44 = "既然有機會的話，為何不嘗試其他衣服呢？#n我之前也說過，這種機會對我而言是不可多得的。"
1012305-45 = "必須反覆穿的衣服，有三一的……"
1012305-46 = "……茶會的制服就已經夠了。"
1012305-47 = "況且只要換上其他衣服……"
1012305-48 = "就連平時心裡的那些限制，似乎也會跟著改變。"
1012305-52 = "……我想說的大概就是這些。"
1012305-53 = "明明是個這麼無趣的孩子，還硬要請老師過來……抱歉浪費了你的時間。"
1012305-54 = "其實我也想過有沒有更有趣的方法，或者能讓老師感興趣的話題。"
1012305-55 = "要不要用謎語來開場？還是聊聊書的話題？#n雖然思考了很多……"
1012305-56 = "卻始終沒有「就是這個！」的那種感覺。"
1012305-57 = "不過這也難怪。畢竟在思考的人是我嘛。"
1012305-58 = "最終還是只能編出裝病之類的謊言，而那些也都被老師識破了。"
1012305-59 = "現在又聊到沒有其他話題，只剩衣服能聊。"
1012305-60 = "……受不了。"
1012305-61 = "我可真是個可憐的傢伙呢，呵呵呵。"
1012305-62 = "[s5] 撫摸聖亞的頭\n[s6] 輕輕拍拍聖亞的頭"
1012305-65 = "……老師？"
1012305-66 = "這是……？"
1012305-67 = "……嗯？"
1012305-68 = "是你一直在等的反應……還覺得很好？"
1012305-69 = "什麼意思……"
1012305-74 = "[ns7]「……聖亞？」\n[ns8]「你是在鬧彆扭嗎？」"
1012305-77 = "……哼。"
1012305-78 = "老師對我可真是壞心眼啊。#n雖然這的確是我自作自受……"
1012305-79 = "不過既然老師這麼做了，那我也自有打算。"
1012305-86 = "[ns9]「……聖亞！？」\n[ns10]「你怎麼把門鎖上了……！？」"
1012305-90 = "呵呵呵……"
1012305-91 = "你總算有點慌了呢。#n看來要讓老師動搖，就必須做到這個程度才行。"
1012305-92 = "老師應該很清楚吧？#n在這個房間裡……我說出口的話就等同於三一的法律。"
1012305-93 = "那麼接下來……是老師聽我撒嬌的時間了。"
1012305-99 = "在我同意之前……都不許你離開哦。"
1012305-101 = "（之後一直在房裡陪著聖亞，直到他滿意為止）"
1012305-102 = "（等聖亞願意打開門的時候，已經到了日落時分了）"

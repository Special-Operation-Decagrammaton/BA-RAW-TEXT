[translation]
1012706-1 = "At the End of a Dream"
1012706-2 = "Wildhunt Campus"
1012706-3 = "I left after another long day of paperwork."
1012706-7 = "[ns] \"It seems my reward for working hard is more work...\""
1012706-8 = "As usual, it seemed that solving one problem only caused two more to spring up."
1012706-9 = "I carried my documents and headed to the Wildhunt Arts Information Center."
1012706-11 = "Wildhunt Arts Information Center"
1012706-12 = "[ns] Sit at an empty desk."
1012706-15 = "[ns] \"Will it never end...?\""
1012706-16 = "And, as I was shuffling some papers..."
1012706-22 = "..."
1012706-23 = "[s] \"Who's there...?\""
1012706-24 = "Do you crave...the strength..."
1012706-25 = "[s] \"What?\""
1012706-26 = "Look at that peak...!"
1012706-27 = "I want ramen."
1012706-28 = "[s] \"What are you talking about?!\""
1012706-29 = "What? You dare to demand answers from me?"
1012706-30 = "The audacity!"
1012706-31 = "[ns] \"Aaaaah...!\""
1012706-33 = "Hello there, Sensei."
1012706-36 = "― [log=미요]...What are you doing in a place like this?[/log][wa:2650] "
1012706-38 = "― [log=미요]I've been looking for you for so long...[/log][wa:10] "
1012706-41 = "[ns] \"Miyo...?\""
1012706-42 = "― [log=미요]And you've been groaning to yourself...[/log][wa:1590] "
1012706-44 = "― [log=미요]Could it be that you're not feeling well...?[/log][wa:1010] "
1012706-47 = "[ns] \"Ah... I just had a weird dream...\""
1012706-48 = "― [log=미요]Hmm, a nightmare.[/log][wa:3810] "
1012706-50 = "― [log=미요]I'm sure this is your punishment.[/log][wa:440] "
1012706-53 = "[ns] \"For what?!\""
1012706-54 = "― [log=미요]You've been coming to Wildhunt so often...[/log][wa:1990] "
1012706-56 = "― [log=미요]Yet you've never once called me.[/log]"
1012706-59 = "[ns] \"S-Sorry...\""
1012706-60 = "― [log=미요]...Fufu, I'm joking.[/log][wa:3270] "
1012706-63 = "― [log=미요]But still, meeting you like this...[/log][wa:710] "
1012706-65 = "― [log=미요]makes me happy, Sensei.[/log][wa:390] "
1012706-68 = "Wildhunt Arts Information Center"
1012706-70 = "[ns] \"Thanks for waking me up, Miyo.\""
1012706-71 = "It was nothing."
1012706-72 = "Anyway, why were you working in such an old and dusty corner?"
1012706-73 = "There's a much nicer library... It's directly west of the buildings you visited today."
1012706-74 = "H-How about you get up?"
1012706-75 = "...Let's get some coffee. That should help."
1012706-77 = "I perked up after drinking a cup of coffee with Miyo at the school's cafe."
1012706-78 = "And, as I left, I was struck by a thought."
1012706-82 = "How did Miyo know where I visited that day?"

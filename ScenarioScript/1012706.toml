[translation]
1012706-1 = "ณ ปลายทางแห่งความฝัน"
1012706-2 = "สถาบันไวลด์ฮันต์"
1012706-3 = "(หลังจากเสร็จงานธุรการ คุณครูก็ออกมาข้างนอกเพื่อทำงานอื่น)"
1012706-7 = "[ns] \"ทำไมยิ่งทำ งานก็ยิ่งเยอะขึ้นนะ...\""
1012706-8 = "(ในสถานการณ์ที่ทำงานเสร็จงานหนึ่ง งานใหม่ก็งอกขึ้นอีก 2 งาน...)"
1012706-9 = "(คุณครูก็หอบเอกสารที่ต้องจัดการ แล้วมุ่งหน้าไปยังศูนย์ข้อมูลศิลปะไวลด์ฮันต์)"
1012706-11 = "ศูนย์ข้อมูลศิลปะ ไวลด์ฮันต์"
1012706-12 = "[ns] ไปนั่งโต๊ะที่ว่าง"
1012706-15 = "[ns] \"งานไม่จบไม่สิ้นสักที...\""
1012706-16 = "(คุณครูทำงานเอกสารต่ออีกพักใหญ่...)"
1012706-22 = "..."
1012706-23 = "[s] \"ใครน่ะ...?\""
1012706-24 = "อยากได้พลัง... มั้ยเล่า...?"
1012706-25 = "[s] \"หืม?\""
1012706-26 = "มองไปที่ยอดเขาโน่นสิ...!"
1012706-27 = "อยากกินราเม็งจัง"
1012706-28 = "[s] \"หมายความว่ายังไงน่ะ?!\""
1012706-29 = "อะไรกัน? เจ้ากล้าดูหมิ่นคำพูดของข้างั้นรึ?!"
1012706-30 = "อวดดียิ่งนัก!"
1012706-31 = "[ns] \"เฮือกกก... ม่ายยย!\""
1012706-33 = "อยู่นี่เองเหรอคะ คุณครู"
1012706-36 = "― [log=미요]... มาทำอะไรอยู่ในที่แบบนี้เหรอคะ...?[/log][wa:2890] "
1012706-38 = "― [log=미요]ฉันตามหาคุณครูอยู่นานเลยนะ...[/log][wa:400] "
1012706-41 = "[ns] \"มิโยะ...?\""
1012706-42 = "― [log=미요]เห็นร้องโอดโอยอยู่ตั้งแต่เมื่อกี้แล้ว...[/log][wa:1550] "
1012706-44 = "― [log=미요]รู้สึกไม่ค่อยสบายตรงไหนหรือเปล่าคะ...?[/log][wa:1250] "
1012706-47 = "[ns] \"อ่า... พอดีครูฝันแปลกๆ น่ะ...\""
1012706-48 = "― [log=미요]อย่างนี้นี่เอง ฝันร้ายเหรอคะ?[/log][wa:3330] "
1012706-50 = "― [log=미요]ต้องเป็นการถูกลงโทษแน่ๆ ค่ะ[/log][wa:680] "
1012706-53 = "[ns] \"ครูไปทำอะไรผิดไว้เหรอ?!\""
1012706-54 = "― [log=미요]ก็หมู่นี้มาที่ไวลด์ฮันต์อยู่บ่อยๆ...[/log][wa:2230] "
1012706-56 = "― [log=미요]แต่ไม่เคยติดต่อมาหาฉันสักครั้งเลยนี่คะ[/log]"
1012706-59 = "[ns] \"คะ... ครูขอโทษ...\""
1012706-60 = "― [log=미요]ฮุฮุ... ล้อเล่นค่ะ[/log][wa:3350] "
1012706-63 = "― [log=미요]แต่พอได้เจอกับคุณครูแบบนี้...[/log][wa:950] "
1012706-65 = "― [log=미요]ฉันก็ดีใจนะคะ[/log][wa:790] "
1012706-68 = "ศูนย์ข้อมูลศิลปะ ไวลด์ฮันต์"
1012706-70 = "[ns] \"ขอบใจที่ช่วยปลุกครูนะ มิโยะ\""
1012706-71 = "ไม่เป็นไรเลยค่ะ"
1012706-72 = "ว่าแต่ ทำไมคุณครูถึงมาทำงานในห้องเก่าๆ และไม่สะดวกสบายแบบนี้ล่ะคะ?"
1012706-73 = "อาคารทางทิศตะวันตกของอาคารที่คุณครูแวะไปวันนี้น่าทำงานกว่าเยอะเลย..."
1012706-74 = "เอาละ ลุกขึ้นก่อนเถอะค่ะ"
1012706-75 = "ไปดื่มกาแฟให้ตื่นสักแก้วก่อนนะคะ คุณครู..."
1012706-77 = "(จากนั้นคุณครูกับมิโยะก็ไปที่คาเฟ่ในโรงเรียนแล้วดื่มกาแฟให้หายง่วงด้วยกัน)"
1012706-78 = "(หลังจากกลับมาจากไวลด์ฮันต์ คุณครูก็คิดว่า)"
1012706-82 = "(มิโยะรู้ได้ยังไงว่าวันนี้ตัวเองแวะไปอาคารไหนบ้าง...)"

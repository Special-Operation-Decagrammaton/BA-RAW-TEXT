[translation]
1012706-1 = "在夢的盡頭"
1012706-2 = "狂獵校園"
1012706-3 = "（今天也在處理完行政工作後，走到了建築物外面）"
1012706-7 = "[ns]「為什麼工作會越做越多呢……」"
1012706-8 = "（才剛結束一項工作，又冒出了兩項新的工作……）"
1012706-9 = "（帶著需要處理的文件，前往了狂獵的藝術情報館）"
1012706-11 = "狂獵藝術情報館"
1012706-12 = "[ns] 在空桌旁坐下"
1012706-15 = "[ns]「真是沒完沒了啊……」"
1012706-16 = "（究竟又持續做了多久的文書作業呢……）"
1012706-22 = "……"
1012706-23 = "[s]「是誰……？」"
1012706-24 = "你……渴望力量嗎？"
1012706-25 = "[s]「咦？」"
1012706-26 = "看向那遠方的山巒吧……！"
1012706-27 = "好想吃拉麵。"
1012706-28 = "[s]「什麼跟什麼啊！？ 」"
1012706-29 = "啊？竟敢質疑本大人的話！？"
1012706-30 = "這個放肆的傢伙！"
1012706-31 = "[ns]「哇啊啊啊……！」"
1012706-33 = "你在這裡啊，老師。"
1012706-36 = "― [log=미요]……你在這種地方，做什麼呢？[/log][wa:3810] "
1012706-38 = "― [log=미요]明明我一直在找老師的說……[/log][wa:1040] "
1012706-41 = "[ns]「美代……？」"
1012706-42 = "― [log=미요]你從剛才看起來就有點痛苦……[/log][wa:2590] "
1012706-44 = "― [log=미요]難道是身體不舒服嗎……？[/log][wa:2290] "
1012706-47 = "[ns]「只是做了個奇怪的夢……」"
1012706-48 = "― [log=미요]原來如此，是惡夢啊……[/log][wa:4050] "
1012706-50 = "― [log=미요]肯定是遭到報應了吧。[/log][wa:1360] "
1012706-53 = "[ns]「我有做那麼壞的事嗎！？ 」"
1012706-54 = "― [log=미요]明明最近經常來狂獵……[/log][wa:3230] "
1012706-56 = "― [log=미요]卻連一次都沒有聯絡我。[/log]"
1012706-59 = "[ns]「對，對不起……」"
1012706-60 = "― [log=미요]……呵呵，開玩笑的。[/log][wa:3670] "
1012706-63 = "― [log=미요]不過，能像這樣見到老師……[/log][wa:1590] "
1012706-65 = "― [log=미요]我很開心。[/log][wa:1110] "
1012706-68 = "狂獵藝術情報館"
1012706-70 = "[ns]「謝謝你叫醒我，美代。」"
1012706-71 = "老師不必客氣。"
1012706-72 = "不過，為什麼要在這種老舊又不舒服的地方工作呢？"
1012706-73 = "今天老師去過的建築西邊，明明有更適合工作的地方才對……"
1012706-74 = "總，總之請先起來吧。"
1012706-75 = "……跟我一起去喝杯咖啡提提神吧，老師。"
1012706-77 = "（於是便和美代一起，在學院內的咖啡廳喝咖啡驅散睡意）"
1012706-78 = "（在離開狂獵時，突然冒出了一個念頭）"
1012706-82 = "（……美代是怎麼知道我去過哪些建築的呢？）"

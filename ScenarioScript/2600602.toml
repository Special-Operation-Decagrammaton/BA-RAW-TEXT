[translation]
2600602-1 = "#title;운수 좋은 날"
2600602-2 = "#place;키보토스의 주택가."
2600602-3 = "#na;길을 걷다가 바닥에 떨어진 500엔 동전을 보았다."
2600602-4 = "[s] 500엔 동전을 줍는다."
2600602-5 = "#na;???;잠까아안—!\n#fontsize;100"
2600602-6 = "#wait;1500"
2600602-7 = "3;노도카;07\n#3;a\n#wait;1000"
2600602-8 = "3;노도카;04;헉, 헉…… 선생님. 그 동전은 제 거예요!\n#3;em;[땀]\n#3;stiff"
2600602-9 = "[s] \"노도카가 떨어트린 동전이야?\""
2600602-10 = "3;노도카;02;아뇨, 제가 떨어트린 동전은 아니지만……\n#3;em;[...]"
2600602-11 = "3;노도카;07;제가 먼저 발견했으니까요!\n#3;closeup"
2600602-12 = "3;노도카;07;1km 밖에서부터!\n#3;closeup"
2600602-13 = "[s] \"1km 밖에서부터?\""
2600602-14 = "3;노도카;03;네! 이 망원경으로 지켜보면 수백 미터 밖에서 기어가는 개미도 볼 수 있다고요!\n#3;hophop"
2600602-15 = "3;노도카;01;아침의 운세도 그렇고, 오늘은 좋은 일이 있지 않을까 해서 오전 내내 망원경을 들여다보고 있었는데…… 운수가 좋았네요!\n#3;em;[음표]"
2600602-16 = "3;노도카;06;구교사 227호 특별반은 보급이 나빠서 간식도 제대로 먹을 수 없단 말이죠……"
2600602-17 = "3;노도카;03;하지만 이 500엔이 있으면 편의점 빵도 음료수도 마음껏 먹을 수 있어요!\n#3;hophop\n#3;em;[반짝]"
2600602-18 = "3;노도카;01;자, 선생님. 이제 슬슬 동전을 돌려주세요!"
2600602-19 = "[s1] 동전을 돌려주지 않는다.\n[s2] 모른척한다."
2600602-20 = "3;노도카;05;어째서 인가요, 선생님!\n#3;em;[!]"
2600602-21 = "3;노도카;05;어째서 인가요, 선생님!\n#3;em;[!]"
2600602-22 = "3;노도카;02;네? 누구 먼저 보았는지는 중요하지 않고, 먼저 주운 사람이 임자라고요?\n#3;stiff"
2600602-23 = "3;노도카;05;치사해! 짠돌이! 너무해!\n#3;hophop\n#3;em;[빠직]"
2600602-24 = "[s] \"대신 시내의 <르와조 블뢰>에서 케이크를 사줄게.\""
2600602-25 = "3;노도카;02;네, 넷? <르와조 블뢰>라면…… #n가장 저렴한 케이크도 1000엔이 넘어간다는 고급 스위츠 가게가 아닌가요?\n#3;shake"
2600602-26 = "3;노도카;04;저, 정말로 괜찮으시겠어요?\n#3;em;[...]"
2600602-27 = "[s] \"괜찮아.\""
2600602-28 = "3;노도카;03;가…… 감사합니다.\n#3;greeting"
2600602-29 = "3;노도카;01;정말이지…… 오늘은 운수가 좋았네요.\n#3;em;[반짝]"
2600602-30 = "#all;hide"
2600602-31 = "#na;이후, 어른의 카드로 르와조 블뢰에서 제일 비싼 케이크를 사주었지만……"
2600602-32 = "#na;노도카는 부담스러워서 그랬는지 반도 먹지 못했다."

[translation]
2600602-1 = "One Lucky Day"
2600602-2 = "Kivotos Residential District."
2600602-3 = "I spotted a 500-yen coin while walking down the street."
2600602-4 = "[s] (Pick up the 500-yen coin.)"
2600602-5 = "Waaait!"
2600602-8 = "*pant* *pant* ...Sensei, that's my coin!"
2600602-9 = "[s] \"Did you drop this coin?\""
2600602-10 = "No, I didn't drop it, but..."
2600602-11 = "I found it first!"
2600602-12 = "From one kilometer away!"
2600602-13 = "[s] \"From a kilometer away?\""
2600602-14 = "Yeah! If I look through this telescope, I can even see ants crawling from hundreds of kilometers away!"
2600602-15 = "My morning horoscope was auspicious, so I was looking through my telescope the entire morning to see if something good might happen today...and I got lucky!"
2600602-16 = "Supply distribution is terrible at Spec Ops No. 227, so we don't get enough snacks..."
2600602-17 = "But 500 yen will buy me a pile of pastries and drinks from the convenience store!"
2600602-18 = "So, Sensei, please give me the coin!"
2600602-19 = "[s1] (Don't give the coin.)\n[s2] (Ignore her.)"
2600602-20 = "Why, Sensei?!"
2600602-21 = "Why, Sensei?!"
2600602-22 = "What? It doesn't matter who saw it first? Whoever picked it up first is the rightful owner?"
2600602-23 = "You're mean! You're stingy! You're unreasonable!"
2600602-24 = "[s] \"Instead, I'll buy you a cake from L'Oiseau Bleu downtown.\""
2600602-25 = "Wh-What? Isn't L'Oiseau Bleu that...fancy sweets store where the cheapest cake is over 1,000 yen?"
2600602-26 = "A-Are you sure?"
2600602-27 = "[s] \"Fine with me.\""
2600602-28 = "Th-Thank you."
2600602-29 = "Seriously...this is one lucky day."
2600602-31 = "After all that, although I used my card to buy the most expensive cake..."
2600602-32 = "Nodoka couldn't even eat half of it because she felt so intimidated by the cost."

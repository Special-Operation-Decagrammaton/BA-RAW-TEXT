[translation]
2600602-1 = "好運的一天"
2600602-2 = "奇普托斯．住宅區"
2600602-3 = "（走路走到一半，看到地上掉了500圓硬幣）"
2600602-4 = "[s]撿起500圓硬幣"
2600602-5 = "等等──！"
2600602-8 = "哈啊，哈啊……老師，那個零錢是我的！"
2600602-9 = "[s]「這是和香掉的啊？」"
2600602-10 = "不，不是我掉的……"
2600602-11 = "但是！是我先發現的！"
2600602-12 = "1公里外我就看到了！"
2600602-13 = "[s]「1公里外……？」"
2600602-14 = "是的！這個望遠鏡連數百公尺外的螞蟻都看得見！"
2600602-15 = "而且早上占卜的運勢也很好，就覺得今天肯定會發生什麼好事，所以我整個上午都在用望遠鏡看著……果然運氣很好！"
2600602-16 = "舊校舍227號特別班的補給少，也很難吃到點心……"
2600602-17 = "但只要有這個500元，就可以吃便利商店的麵包和飲料吃到飽了！"
2600602-18 = "所以老師，把它給我吧！"
2600602-19 = "[s1] 吹口哨\n[s2] 假裝沒聽到"
2600602-20 = "為什麼啊，老師！？"
2600602-21 = "為什麼啊，老師！？"
2600602-22 = "咦？誰先看到並不重要，先撿到的才是主人？"
2600602-23 = "卑鄙！小氣！太過分了！"
2600602-24 = "[s]「但我可以請你吃『L'Oiseau Bleu』的蛋糕。」"
2600602-25 = "什，什麼？「L'Oiseau Bleu」……#n那不是連最便宜的蛋糕都超過1000圓的高級甜點店嗎！？"
2600602-26 = "真，真的可以嗎？"
2600602-27 = "[s]「那當然。」"
2600602-28 = "謝……謝謝老師。"
2600602-29 = "今天……真的是「好運的一天」呢。"
2600602-31 = "（之後雖然用大人的卡片，買了「L'Oiseau Bleu」最貴的蛋糕給她吃……）"
2600602-32 = "（但不知是不是因為壓力太大，和香連一半都沒吃完）"

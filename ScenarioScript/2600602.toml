[translation]
2600602-1 = "วันที่โชคดีสุดๆ"
2600602-2 = "เขตที่อยู่อาศัยในคิโวทอส"
2600602-3 = "เห็นเหรียญ 500 เยนตกอยู่ที่พื้นระหว่างเดินไปตามถนน"
2600602-4 = "[s] เก็บเหรียญ 500 เยน"
2600602-5 = "เดี๋ยวก่อน...!"
2600602-8 = "แฮ่ก แฮ่ก... คุณครู นั่นเหรียญของฉันค่ะ!"
2600602-9 = "[s] \"เหรียญนี่โนโดกะทำหล่นไว้เหรอ?\""
2600602-10 = "เปล่าค่ะ ฉันไม่ได้ทำหล่นไว้..."
2600602-11 = "แต่ว่าฉันเป็นคนเจอมันก่อนนะคะ!"
2600602-12 = "ฉันเห็นมันตั้งแต่อยู่ห่างไปหนึ่งกิโลเมตรแล้วค่ะ!"
2600602-13 = "[s] \"ตั้งแต่หนึ่งกิโลเมตรเลยเหรอ?\""
2600602-14 = "ค่ะ! ถ้าใช้กล้องส่องทางไกลส่องดู จะมองเห็นมดที่มองอยู่ไกลออกไปหลายร้อยเมตรได้เลยค่ะ!"
2600602-15 = "เช้านี้ฉันดวงขึ้นมากๆ เลยค่ะ ฉันคิดว่าวันนี้น่าจะมีเรื่องดีๆ เกิดขึ้น#nเลยกำลังจ้องมองกล้องส่องทางไกลมาตลอดเช้า...#nโชคดีจังเลยค่ะ!"
2600602-16 = "อาหารที่นักเรียนห้องพิเศษ 227 ได้รับมันไม่ค่อยดีเท่าไหร่ แถมมีขนมไม่พอด้วยค่ะ..."
2600602-17 = "แต่ถ้ามีเหรียญ 500 เยนนี่ ฉันก็จะซื้อขนมปัง เครื่องดื่มในร้านสะดวกซื้อมากินได้ตามใจเลยค่ะ!"
2600602-18 = "เอาละคุณครูคะ ช่วยคืนเหรียญให้ฉันด้วยค่ะ!"
2600602-19 = "[s1] ไม่คืนเหรียญให้\n[s2] ทำไม่รู้ไม่ชี้"
2600602-20 = "ทำไมทำแบบนั้นล่ะคะคุณครู!"
2600602-21 = "ทำไมทำแบบนั้นล่ะคะคุณครู!"
2600602-22 = "คะ? ไม่สำคัญว่าใครเห็นก่อน แต่คนที่เก็บได้ก่อนคือเจ้าของเหรอคะ?"
2600602-23 = "ไม่แฟร์เลย! คนขี้ตืด! เกินไปแล้วนะ!"
2600602-24 = "[s] \"เดี๋ยวครูจะซื้อเค้กของร้าน <ลูวาโซ บลู>ในเมืองให้แทน\""
2600602-25 = "คะ? อะไรนะคะ? ร้าน <ลูวาโซ บลู>...#nร้านขนมหวานสุดหรูที่เค้กราคาถูกสุดก็เกิน 1,000 เยนแล้วนั่นน่ะเหรอคะ?"
2600602-26 = "มะ...ไม่เป็นไรจริงๆ เหรอคะ?"
2600602-27 = "[s] \"ไม่เป็นไรเลย\""
2600602-28 = "ขะ... ขอบคุณค่ะ"
2600602-29 = "จริงๆ ด้วย... วันนี้ฉันดวงดีจริงๆ เลย"
2600602-31 = "หลังจากนั้นคุณครูก็รูดการ์ดซื้อเค้กแพงที่สุดในร้านลูวาโซ บลูให้..."
2600602-32 = "แต่โนโดกะรู้สึกกดดันเพราะเค้กมีราคาแพง เลยกินได้ไม่ถึงครึ่ง"

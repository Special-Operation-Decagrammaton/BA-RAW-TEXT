[translation]
1001020-1 = "Better Safe Than Sorry"
1001020-2 = "Abydos District"
1001020-3 = "I had to visit Abydos High School to sort out some administrative issues."
1001020-11 = "Sensei? What are you doing here?"
1001020-12 = "Oh? Something to take care of at the academy?"
1001020-13 = "I see. I was on my way to the academy too."
1001020-14 = "But what are you doing here, specifically?"
1001020-15 = "Um..."
1001020-16 = "..."
1001020-17 = "I see. It's a coincidence."
1001020-18 = "..."
1001020-19 = "...A coincidence."
1001020-20 = "[s] \"Shall we...walk to the academy together?\""
1001020-21 = "Okay..."
1001020-26 = "[ns] \"This is giving me deja vu.\""
1001020-27 = "Deja vu?"
1001020-28 = "Oh...you're talking about that time you collapsed."
1001020-29 = "[s] \"It's thanks to you that I survived, Shiroko...\""
1001020-30 = "Well..."
1001020-31 = "Not really. But if you insist, Sensei..."
1001020-32 = "You think you owe me for more than just that?"
1001020-33 = "That's... I don't know what to do with that."
1001020-34 = "Sensei, just you being here is..."
1001020-35 = "Hmm...never mind."
1001020-36 = "What? No, don't be sorry for making me walk my bike."
1001020-37 = "It's totally fine."
1001020-38 = "It's not even heavy. The frame is carbon fiber."
1001020-39 = "Shiroko and I walked towards the academy, chatting."
1001020-47 = "[ns1] \"Look out, Shiroko!\"\n[ns2] \"Something's headed right for us!\""
1001020-50 = "Huh? Oh..."
1001020-51 = "It's fine, Sensei. It's just my drone."
1001020-55 = "Shiroko casually picked up the drone and put it in her bag."
1001020-56 = "[s] \"Oh, so you...have a drone?\""
1001020-57 = "Yeah. I just got it by accident, but I've done a bit of tweaking since then."
1001020-58 = "[s] \"By accident...?\""
1001020-59 = "Yes, by accident."
1001020-60 = "Hm? Why are you looking at me like that?"
1001020-61 = "[s3] \"It's nothing.\"\n[s4] \"I trust you, Shiroko.\""
1001020-64 = "You want to know what I use it for?"
1001020-65 = "Usually as a GPS while I'm cycling, or to film something."
1001020-66 = "[s] \"Oh, is that all? Okay, good.\""
1001020-68 = "Did you hear me?! You'd better stop right there!"
1001020-69 = "And while you're at it, why not spend a little money? Heh heh heh."
1001020-70 = "Eeek! But...but I don't have any more money!"
1001020-71 = "Heh heh. Don't be silly. As the saying goes, you can get blood from a stone."
1001020-72 = "I don't... I don't think that's how that goes... Please just let me go this once!"
1001020-74 = "Um."
1001020-80 = "Shiroko suddenly started up her drone."
1001020-84 = "Ow, ow, that stings! What is this!?"
1001020-85 = "A m-missile? Where did a missile come from?"
1001020-86 = "I'm outta here!"
1001020-91 = "[ns] \"Shiroko, didn't you say that the drone was for filming?!\""
1001020-92 = "Well... Mostly."
1001020-93 = "It can also shoot missiles. For emergencies."
1001020-94 = "[s] \"And you didn't think to mention that?!\""
1001020-95 = "...Um."
1001020-97 = "It's not even a big ask, c'mon. You never signed your name before?"
1001020-98 = "Just one little signature on this legally binding document, that's all we're asking for."
1001020-99 = "L-Legally binding? But..."
1001020-100 = "...!"
1001020-105 = "Ow! A missile!?"
1001020-106 = "Whoever it is, we'll get you next time!"
1001020-108 = "Hey, hey, I just need to borrow this engine for a while. I'll give it back, promise."
1001020-109 = "Of course, nothing I can do if it's not in its...original condition. Hahaha!"
1001020-110 = "Argh!"
1001020-116 = "I-It's a missile barrage!"
1001020-117 = "Run away! It'll ruin the machine!"
1001020-119 = "[ns] \"...So...you're absolutely sure the drone is for filming?\""
1001020-120 = "...Yes. The missiles...are an add-on. It's just Protection Mode..."
1001020-121 = "[s] \"You appear to get a lot of use out of Protection Mode.\""
1001020-122 = "...Guess so."
1001020-123 = "[s5] \"I have to ask, Shiroko.\"\n[s6] \"You're going to use this drone responsibly, right?\""
1001020-126 = "Yeah...I don't turn on Protection Mode for no reason."
1001020-127 = "There's really just one reason why I added it."
1001020-131 = "It's just in case I run into complications when I'm robbing a bank."
1001020-135 = "[ns] \"No, no, no! That's even worse!\""

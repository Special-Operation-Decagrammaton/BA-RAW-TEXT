[translation]
1001020-1 = "有備無患？"
1001020-2 = "阿拜多斯自治區的街道"
1001020-3 = "（因為行政相關的問題來到了阿拜多斯）"
1001020-11 = "啊，老師。今天怎麼會來這裡呢？"
1001020-12 = "……有事要在阿拜多斯處理？"
1001020-13 = "我正好也打算去學校。"
1001020-14 = "……沒想到會在這裡見面？"
1001020-15 = "……嗯。"
1001020-16 = "……"
1001020-17 = "真巧呢。"
1001020-18 = "……"
1001020-19 = "……嗯，真巧。"
1001020-20 = "[s]「既然都遇到了，就一起去學校吧。」"
1001020-21 = "嗯。"
1001020-26 = "[ns]「好像突然想起以前的事了呢。」"
1001020-27 = "以前的事……？"
1001020-28 = "啊……老師倒下的時候？"
1001020-29 = "[s]「嗯，多虧了白子才能得救。」"
1001020-30 = "這沒什麼……"
1001020-31 = "不過，嗯。太好了。"
1001020-32 = "……除此之外還有很多事？"
1001020-33 = "這個嘛，嗯……"
1001020-34 = "該說只要是我能為老師做的……"
1001020-35 = "……不，沒什麼。"
1001020-36 = "明明是騎自行車來的卻讓我走路很抱歉……？"
1001020-37 = "沒關係，我不在意。"
1001020-38 = "而且它比看起來還輕。"
1001020-39 = "（一邊和白子閒聊各種話題，一邊朝學校前進）"
1001020-47 = "[ns1]「那個是……？」\n[ns2]「是不是有東西正在接近這裡！？」"
1001020-50 = "……啊啊。"
1001020-51 = "沒事的，是我的無人機。"
1001020-55 = "（白子用熟練的手法回收了無人機，並放進了背包裡）"
1001020-56 = "[s]「我還以為要出事了……」"
1001020-57 = "嗯。這是我碰巧拿到的，然後進行了一些改造……"
1001020-58 = "[s]「碰巧拿到了無人機……？」"
1001020-59 = "嗯，碰巧。"
1001020-60 = "怎麼了嗎？"
1001020-61 = "[s3]「沒，沒什麼……」\n[s4]「沒事，我相信你……」"
1001020-64 = "意外的可以用在很多地方唷？"
1001020-65 = "像是在騎行中捕捉GPS訊號，或是用來攝影。"
1001020-66 = "[s]「那就好……」"
1001020-68 = "都說了只要一點就可以了嘛。"
1001020-69 = "對啊對啊，又不是要跟你敲詐一大筆錢！"
1001020-70 = "這，這些真的已經很勉強了！請放過我吧！"
1001020-71 = "少囉嗦，就算是乾抹布也能擰出水啊！"
1001020-72 = "真，真的不行了，連一滴也擠不出來了……！"
1001020-74 = "……"
1001020-80 = "（白子突然啟動了無人機）"
1001020-84 = "啊痛痛痛痛痛！？"
1001020-85 = "無，無人機？話說是導彈！？"
1001020-86 = "快，快逃吧！"
1001020-91 = "[ns]「……剛才不是說這是攝影用的無人機嗎？」"
1001020-92 = "這個是……"
1001020-93 = "為了以防萬一。"
1001020-94 = "[s]「用那種『只是隨手』的語氣發射導彈……」"
1001020-95 = "這不算什麼。"
1001020-97 = "哎呀哎呀，總之只要簽下去就沒問題了！"
1001020-98 = "來嘛，相信我們嘛！"
1001020-99 = "自，自己說要別人相信你的人都是……"
1001020-100 = "……"
1001020-105 = "唔哇！？是導彈！？"
1001020-106 = "喂，快逃吧！"
1001020-108 = "都說了只是要稍微借一下引擎而已，馬上就會還你的啦！"
1001020-109 = "雖然不能保證還你的時候是什麼狀態就是了！"
1001020-110 = "……"
1001020-116 = "喂，好像又什麼東西飛過來了！？"
1001020-117 = "我們的機器啊──！？"
1001020-119 = "[ns]「……是攝影用的，對吧？」"
1001020-120 = "……嗯。導彈只不過是附加功能。"
1001020-121 = "[s]「……真是厲害的附加功能呢。」"
1001020-122 = "……厲害吧。"
1001020-123 = "[s5]「那個，我姑且說一下。」\n[s6]「那部無人機，不可以隨便就拿出來用哦……？」"
1001020-126 = "……沒問題的。"
1001020-127 = "這只不過是為了以防萬一。"
1001020-131 = "像是要襲擊銀行的時候。"
1001020-135 = "[ns]「那就更不行了！！」"

[translation]
1001020-1 = "กันไว้ดีกว่าแก้"
1001020-2 = "ถนนเขตปกครองตนเองอะบิดอส"
1001020-3 = "(เกิดปัญหาเกี่ยวกับงานบริหารบางอย่าง คุณครูจึงมาที่โรงเรียนอะบิดอส)"
1001020-11 = "คุณครู? มาทำอะไรที่นี่น่ะ?"
1001020-12 = "อ้อ... มีธุระที่โรงเรียนเหรอ? "
1001020-13 = "งั้นเหรอ ฉันก็กำลังจะไปโรงเรียนเหมือนกัน"
1001020-14 = "ฉันมาทำอะไรอยู่ตรงนี้งั้นเหรอ?"
1001020-15 = "อืม..."
1001020-16 = "......"
1001020-17 = "แค่บังเอิญน่ะ"
1001020-18 = "......"
1001020-19 = "...แค่บังเอิญ"
1001020-20 = "[s] \"ถ้างั้น... เดินไปโรงเรียนด้วยกันมั้ย?\""
1001020-21 = "อืม..."
1001020-26 = "[ns] \"คิดถึงเรื่องเมื่อก่อนเลยเนอะ\""
1001020-27 = "เรื่องเมื่อก่อน?"
1001020-28 = "อ้อ... ตอนที่คุณครูเป็นลมน่ะเหรอ?"
1001020-29 = "[s] \"ครูรอดมาได้เพราะชิโรโกะช่วยไว้เลยนะ...\""
1001020-30 = "อืม เรื่องนั้น..."
1001020-31 = "ไม่ใช่แบบนั้นสักหน่อย ไม่ต้องคิดมากหรอก..."
1001020-32 = "นอกจากเรื่องนั้นแล้ว ก็ยังมีเรื่องอื่นๆ ที่รบกวนฉันอีกตั้งเยอะงั้นเหรอ?"
1001020-33 = "นั่นมัน... ไม่รู้จะพูดยังไงดีเลยแฮะ"
1001020-34 = "สำหรับฉันน่ะ ขอแค่มีคุณครูอยู่ด้วย..."
1001020-35 = "อืม... เปล่าหรอก ไม่มีอะไร"
1001020-36 = "ขอโทษที่ให้ฉันมาเดินด้วยทั้งๆ ที่มีจักรยานงั้นเหรอ?"
1001020-37 = "อืม... ไม่ต้องคิดมากหรอก"
1001020-38 = "โครงจักรยานทำจากคาร์บอนไฟเบอร์น่ะ ไม่ได้หนักอะไรมากมายหรอก"
1001020-39 = "(คุณครูเดินไปโรงเรียนกับชิโรโกะพลางคุยเรื่องต่างๆ ไปด้วย)"
1001020-47 = "[ns1] \"เอ๋ ชิโรโกะ?\"\n[ns2] \"มีบางอย่าง... กำลังมาทางนี้แล้ว?!\""
1001020-50 = "หืม? อ้อ..."
1001020-51 = "ไม่เป็นไรหรอกคุณครู นั่นโดรนของฉันเอง"
1001020-55 = "(ชิโรโกะเรียกโดรนกลับมาอย่างชำนาญ แล้วก็เก็บใส่กระเป๋าสะพาย)"
1001020-56 = "[s] \"มีโดรนด้วยงั้นเหรอ...?\""
1001020-57 = "อื้อ... ได้มาโดยบังเอิญน่ะ ฉันก็เลยเอามาปรับแต่งนิดหน่อย"
1001020-58 = "[s] \"...บังเอิญ?\""
1001020-59 = "อื้อ บังเอิญ"
1001020-60 = "หืม? ทำไมมองฉันแบบนั้นล่ะ?"
1001020-61 = "[s3] \"เปล๊าาา...\"\n[s4] \"ครูจะเชื่อชิโรโกะแล้วกัน...\""
1001020-64 = "ใช้โดรนทำอะไรงั้นเหรอ?"
1001020-65 = "อืม... เอาไว้ใช้จับจีพีเอสหรือถ่ายรูปตอนที่ปั่นจักรยานน่ะ"
1001020-66 = "[s] \"ถ้าเอาไว้ใช้แบบนั้น ก็ไม่มีปัญหาหรอก\""
1001020-68 = "ก็-บอก-แล้ว-ไง ว่าให้แวะมาที่นี่ก่อนน่ะ?!"
1001020-69 = "ไหนๆ ก็แวะมาแล้ว เอาเงินออกมาใช้สักหน่อยก็ได้นะ หึหึหึ..."
1001020-70 = "ฮือออ... แต่ว่าฉันไม่มีเงินแล้วนะ...!"
1001020-71 = "อย่ามาพูดให้ขำหน่อยเลย! ก็เห็นๆ อยู่ว่ามีน่ะ!"
1001020-72 = "ฮือออ... ครั้งนี้ช่วยปล่อยฉันไปเถอะนะ..."
1001020-74 = "...อืม"
1001020-80 = "(จู่ๆ ชิโรโกะก็ปล่อยโดรนออกไป)"
1001020-84 = "อ๊ะ! เจ็บนะ! มันเจ็บนะเฟ้ย! โอ๊ยยยย!"
1001020-85 = "มะ...มิสไซล์เรอะ? ยิงมาจากทางไหนน่ะ?!"
1001020-86 = "นะ...หนีเร็ว!"
1001020-91 = "[ns] \"เมื่อกี้บอกว่าเอาไว้ถ่ายรูปไม่ใช่เหรอ คุณชิโรโกะ?!\""
1001020-92 = "อืม... เรื่องนั้น..."
1001020-93 = "แค่ปรับให้ยิงมิสไซล์ได้... เผื่อในกรณีฉุกเฉินน่ะ"
1001020-94 = "[s] \"แต่ไม่คิดจะบอกครูว่าเพิ่มฟังก์ชันนั้นเข้าไปเรอะ?!\""
1001020-95 = "...อื้อ"
1001020-97 = "ก็บอกว่าไม่มีอะไรไงเล่า ไม่เคยเซ็นสัญญาหรือไงกัน?"
1001020-98 = "ใช่! ก็แค่มาเซ็นชื่อในสัญญานี่นิดเดียวเอง! "
1001020-99 = "ตะ...แต่ว่าสัญญานั่น..."
1001020-100 = "...!"
1001020-105 = "วะ...ว้ากกกก?! มิสไซล์?!"
1001020-106 = "ถะ...ถึงจะไม่รู้ว่าฝีมือใคร แต่ฝากเอาไว้ก่อนแล้วกัน!"
1001020-108 = "ก็บอกแล้วไงว่าขอยืมเครื่องยนต์แป๊บเดียว เดี๋ยวเอามาคืนให้ไงเล่า?"
1001020-109 = "แต่ตอนคืนสภาพจะเหมือนเดิมรึเปล่า... อันนี้ก็ไม่รับประกันนะ ฮ่าฮ่าฮ่าฮ่า!"
1001020-110 = "ฮึ่ม!"
1001020-116 = "ระ...ระเบิดมิสไซล์!"
1001020-117 = "เครื่องยนต์ของเราพังหมดแล้ว! หนีเร็ว!"
1001020-119 = "[ns] \"แน่ใจนะว่านั่นเป็นโดรนถ่ายภาพน่ะ...?\""
1001020-120 = "อื้อ... พะ...พวกฟังก์ชันยิงมิสไซล์ก็แค่... ฟังก์ชันโหมดป้องกันตัวน่ะ"
1001020-121 = "[s] \"....มีเรื่องให้ใช้ฟังก์ชันเสริมบ่อยเลยเนอะ\""
1001020-122 = "...อื้อ"
1001020-123 = "[s5] \"นี่ ชิโรโกะจะระวังตอนใช้โดรนนั่นใช่มั้ย?\"\n[s6] \"จะใช้โดรนนั่นแบบระมัดระวังใช่มั้ย?\""
1001020-126 = "อื้อ... ฉันไม่ได้เปิดโหมดป้องกันตัวบ่อยๆ หรอก..."
1001020-127 = "อีกอย่าง เหตุผลที่เพิ่มโหมดป้องกันตัวเข้าไปน่ะ..."
1001020-131 = "เพราะเวลาไปปล้นธนาคาร มันอาจจะเกิดเหตุที่ไม่คาดคิดขึ้นได้ ก็เลยเตรียมเผื่อไว้น่ะ"
1001020-135 = "[ns] \"แบบนั้นยิ่งไม่ได้เลย!\""

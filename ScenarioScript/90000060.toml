[translation]
90000060-1 = "Episode 7;Research Part 6: Chesed"
90000060-6 = "I'm done. I have the coordinates.  "
90000060-7 = "This is the munitions factory, and where Chesed is."
90000060-8 = "Are we going to infiltrate the factory, then?"
90000060-9 = "Yes. I'll set up a route that leads directly to Chesed's main body. Your job is to infiltrate, locate Chesed, collect data, and retreat safely."
90000060-10 = "Sounds simple."
90000060-11 = "Simple? If you say so, Eimi."
90000060-12 = "Yes. Since I have the president's and Sensei's support."
90000060-13 = "Fascinating. You look so reliable right now, Eimi. Is this an illusion? Am I dreaming?"
90000060-14 = "It's not an illusion, and you're not dreaming. It's just true, like the fact that you love sewers."
90000060-15 = "This is not true. I am a beautiful and elegant hacker, not a sewer-lover."
90000060-16 = "[s] \"Let's get to the mission. Right now.\""
90000060-20 = "Sensei is politely moving us along again. Please be careful."
90000060-21 = "Okay, let's go."
90000060-22 = "[s] \"We're off, Eimi!\""

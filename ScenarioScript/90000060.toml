[translation]
90000060-1 = "#title;제7화;정보수집 6 - 헤세드"
90000060-2 = "#zmc;instant;500,0;2200"
90000060-3 = "#zmc;instant;500,0;2200\n#wait;3000"
90000060-4 = "#all;hide"
90000060-5 = "3;히마리;07\n#3;em;…\n#3;a\n#wait;2500"
90000060-6 = "3;히마리;01;완료. 좌표 특정했습니다. \n#3;em;[반응]"
90000060-7 = "3;히마리;01;여기가 군수 공장…… 아니, 헤세드가 있는 곳이에요."
90000060-8 = "3;히마리;01\n1;에이미;02;그럼 이제 군수 공장에 잠입하면 되는 거야?\n#1;em;[?]\n#1;a\n#3;m5"
90000060-9 = "3;히마리;04;네. 헤세드의 본체까지 바로 이어지는 루트를 설정할 테니, 빠르게 진입해서 헤세드와 접촉, 데이터 확보 후 퇴각하면 됩니다."
90000060-10 = "1;에이미;03;응, 간단하네.\n#1;em;[반짝]"
90000060-11 = "3;히마리;09;……간단한가요? 뭐, 에이미가 그렇다고 한다면 그런 것이겠지만…….\n#3;em;[?]"
90000060-12 = "1;에이미;02;응, 부장이 지원해줄 거고, 선생님도 있으니까.\n#1;greeting"
90000060-13 = "3;히마리;02;……그렇군요. 어쩐지 에이미가 믿음직스럽게 보이고 있어요. 이건 착각인가요? 환각인가요?"
90000060-14 = "1;에이미;04;착각도 환각도 아냐. 그냥 사실이니까. 부장이 하수구를 좋아하는 것처럼."
90000060-15 = "1;에이미;04\n3;히마리;05;아뇨, 그건 사실이 아닌데요? 왜곡인데요? 반지성적인 태도인데요? 자꾸 그런 쪽으로 제 이미지를 몰아가지 않았으면 하는데요?\n#3;em;[!]\n#1;dl\n#3;m3"
90000060-16 = "[s] \"자, 그럼 출발하자.\""
90000060-17 = "#st;[0,0];instant;1;"
90000060-18 = "#clearST"
90000060-19 = "3;히마리;02\n#3;em;[반응]\n#wait;1200"
90000060-20 = "3;히마리;08;……선생님이 또 눈치를 주네요. 그럼 다음 임무를 부탁드리겠습니다."
90000060-21 = "3;에이미;02;알겠어. 그럼 출발.\n#3;em;[반응]"
90000060-22 = "[s] \"출발!\""
90000060-23 = "#all;hide"

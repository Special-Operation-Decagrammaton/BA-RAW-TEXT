[translation]
90000060-1 = "第7話;蒐集情報(6)赫賽德"
90000060-6 = "分析完畢。已經鎖定座標了。"
90000060-7 = "這裡就是軍需工廠……不，就是赫賽德的所在地。"
90000060-8 = "那接下來只要潛入軍需工廠就行了嗎？"
90000060-9 = "是的。通往赫賽德本體的路線已經設定完畢。#n請迅速進入並接觸赫賽德，在蒐集情報後撤退吧。"
90000060-10 = "嗯，很簡單呢。"
90000060-11 = "……簡單嗎？#n嗯，既然英美都這麼說了，或許確實如此吧……"
90000060-12 = "嗯。因為有部長的支援，而且老師也在。"
90000060-13 = "……說的也是。#n總覺得英美看起來好像變可靠了呢……這是錯覺嗎？還是幻覺？"
90000060-14 = "不是錯覺也不是幻覺，只是單純的事實。#n就跟部長喜歡下水道一樣。"
90000060-15 = "不對，那才不是事實，是對事實的扭曲好嗎？#n請不要刻意擺出那種反智的態度，也不要一直把我的形象往那方面靠可以嗎？"
90000060-16 = "[s] 「好了好了，差不多該出發了吧。」"
90000060-20 = "……又被老師關心了呢。#n那麼接下來的任務也麻煩兩位了。"
90000060-21 = "嗯，出發吧。"
90000060-22 = "[s] 「出發！」"

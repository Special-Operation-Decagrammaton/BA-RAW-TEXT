[translation]
90000060-1 = "ตอนที่ 6; รวบรวมข้อมูล 6 - เชเซ็ด"
90000060-6 = "สำเร็จ ระบุพิกัดได้แล้วค่ะ "
90000060-7 = "ที่นี่สถานที่ที่โรงงานอาวุธ... ไม่สิ... ที่ที่เชเซ็ดอยู่ค่ะ"
90000060-8 = "งั้นต่อไปก็ต้องลักลอบเข้าไปในโรงงานอาวุธใช่ไหม?"
90000060-9 = "ใช่ค่ะ ฉันจะบอกเส้นทางไปยังจุดของเชเซ็ดโดยตรง ต้องรีบเข้าถึงเชเซ็ด แล้วล่าถอยกลับมาทันทีที่ได้#nข้อมูลมาค่ะ"
90000060-10 = "อืม สบายมาก"
90000060-11 = "สบายมากเหรอคะ? แต่ถ้าเอมิคิดอย่างนั้น ฉันก็คงต้องเชื่อ..."
90000060-12 = "อื้ม หัวหน้าก็จะมาสนับสนุน แถมยังมีคุณครูอีกทั้งคน"
90000060-13 = "อย่างนี้นี่เอง... อยู่ๆ เอมิดูน่าเชื่อถือขึ้นมาเลยนะคะ นี่ฉันคิดไปเอง หรือเห็นภาพหลอนกันคะเนี่ย? "
90000060-14 = "ไม่ใช่ทั้งสองอย่างนั่นแหละ มันคือข้อเท็จจริงต่างหาก เหมือนกับที่หัวหน้าชอบทางระบายน้ำเสียไง"
90000060-15 = "ไม่ใช่นะคะ นั่นไม่ใช่ข้อเท็จจริงสักหน่อย? อย่าบิดเบือนสิคะ ฉันไม่อยากให้ภาพลักษณ์ของฉัน#nเบี่ยงเบนไปทางนั้นนะคะ"
90000060-16 = "[s] \"เอาละๆ ออกเดินทางกันเถอะ\""
90000060-20 = "คุณครูกันไม่ให้เราออกทะเลอีกแล้ว... งั้นฉันฝากภารกิจต่อไปด้วยนะคะ"
90000060-21 = "เข้าใจแล้ว งั้นก็ออกเดินทางเลย"
90000060-22 = "[s] \"ออกเดินทาง!\""

[translation]
10043075-13 = "ชนะแล้ว!"
10043075-17 = "เป็นไปได้ยังไง... ครั้งนี้... เกมวันนี้..."
10043075-22 = "ในเมื่อก็อยู่ด้วยกันแล้ว ฉันขอถามอะไรหน่อยค่ะ"
10043075-23 = "ทำไมถึงคิดทำเรื่องแบบนี้เหรอคะ?"
10043075-27 = "ทำไม... งั้นเหรอ? ถามเพราะไม่รู้จริงๆ ใช่มั้ย?"
10043075-28 = "......"
10043075-32 = "ก็เบรฟส์!"
10043075-33 = "เล่นเบสบอล!!"
10043075-34 = "ไม่ได้เรื่องยังไงล่ะ!!!"
10043075-39 = "นะ... นั่นคือเหตุผลจริงๆ เหรอ...?"
10043075-40 = "แล้วมันจะเป็นอย่างอื่นไปได้ยังไง!"
10043075-41 = "ทีมเราน่ะเล่นเบสบอลไม่ได้เรื่อง..."
10043075-43 = "ที่จริงต้องใส่คำว่า 'เลยสักนิด' เข้าไปด้วย...!"
10043075-44 = "ขออีกคำเถอะ เล่นเบสบอลไม่ได้เรื่องเลยสักนิด 'ในทุกเกม' เลย!!!"
10043075-48 = "อ่า... เอ่อ... ที่พูดมาฉันก็... ไม่ได้มีข้อโต้แย้งตรงไหนหรอกนะ..."
10043075-49 = "[s] \"อืม... คิดไว้แล้วว่าต้องเป็นแบบนี้...\""
10043075-53 = "จะยังไงก็เอาเถอะค่ะ ว่าแต่ตอนนี้ในสนามเป็นยังไงบ้างคะ?"
10043075-54 = "ระหว่างที่พวกเราตะลุมบอนกัน การแข่งขันก็น่าจะดำเนินไปตามปกตินะคะ"
10043075-58 = "จริงสิ การแข่งขัน!"
10043075-59 = "ในเกมรับอินนิ่งสุดท้าย ตอนที่พิชเชอร์คนสุดท้ายออกไปปิดเกม ที่จริงโค้ชแทบจะทำอะไรไม่ได้เลย..."
10043075-60 = "เราทำได้แค่เชื่อใจนักกีฬา เชื่อใจโค้ช และเชื่อใจทีมก็เท่านั้น"
10043075-66 = "ทรี เอาต์! เชนจ์! เป็นการขว้างที่ยอดเยี่ยมมากครับ เบรฟส์! ทำแบตเตอร์เอาต์ไปแล้วเรียบร้อย!"
10043075-67 = "เกมเข้าสู่ช่วงท้ายของอินนิ่งที่ 9 ซึ่งเป็นอินนิ่งสุดท้ายแล้วครับ!"
10043075-71 = "โอ้ โอ้วว...! แต่ยังไงก็ยังไม่ได้แต้มเพิ่มสินะ...!"
10043075-72 = "ถ้าอย่างนั้นตอนนี้ลำดับการตีก็จะเป็นลำดับที่ 8-9-1 ขะ... ขอให้การรุกดำเนินต่อไปจนถึงแบตเตอร์#nลำดับที่ 3 ด้วยเถอะ..."
10043075-73 = "แล้วถ้าแบตเตอร์ลำดับที่ 4 ที่เป็นความหวังอันยิ่งใหญ่เพิ่มสปิริตของการไล่ล่าแล้วตีลูกโฮมรันแบบ#nแกรนด์สแลมได้ เท่านี้ก็สำเร็จค่ะ!"
10043075-78 = "อืม... เทรนเนอร์คะ? ถึงฉันจะไม่ค่อยรู้จักกฎเบสบอลมากนัก แต่ฉันว่ามันไม่น่าจะเป็นไปได้เลยนะคะ...?"
10043075-79 = "[s] \"สึมิเระ บางทีความจริง... ก็ทำให้เราเจ็บปวดนะ...\""
10043075-80 = "งะ... งั้นเหรอคะ?"
10043075-85 = "อึก... อึกก...!"
10043075-94 = "ปะ... เป็นอะไรไปคะ? มีปัญหาอะไรกันหรือเปล่าคะ?"
10043075-95 = "ฉันพลาดเอง... เมื่อกี้ฉันโดนระเบิดที่ข้อมือ... เลยไม่รู้ว่าจะตีไหวหรือเปล่าน่ะ...!"
10043075-100 = "ว่าไงนะคะ?!?!?!"

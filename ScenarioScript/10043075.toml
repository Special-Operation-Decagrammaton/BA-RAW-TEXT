[translation]
10043075-13 = "贏了！"
10043075-17 = "怎，怎麼會……#n本來以為這次……至少今天一定要……"
10043075-22 = "那麼就請你回答我們的問題吧。"
10043075-23 = "為什麼要做這種事呢？"
10043075-27 = "問我……為什麼？#n你們真的一點也不明白嗎？"
10043075-28 = "……"
10043075-32 = "因為你們的！"
10043075-33 = "棒球實在！！"
10043075-34 = "打得太爛啦！！！"
10043075-39 = "真，真的是因為這個嗎……？"
10043075-40 = "不然還能為什麼！"
10043075-41 = "勇士隊真的是爛透了……"
10043075-43 = "每當我以為不能再爛了的時候……！"
10043075-44 = "下次永遠能爛得更徹底！！！"
10043075-48 = "呃……這個嘛，我也不是完全沒有同感啦……"
10043075-49 = "[s]「嗯……可以想像球迷的心情……」"
10043075-53 = "話說回來，目前賽況如何呢？"
10043075-54 = "在制伏這些人的同時，比賽好像還在繼續進行。"
10043075-58 = "對耶，比賽！"
10043075-59 = "……已經到了最後的防守局，終結者也站上投手丘了。#n事到如今，我這個總教練唯一能做的……"
10043075-60 = "就只有相信球員們、相信教練團──相信這支球隊而已。"
10043075-66 = "三出局！攻守交換！#n勇士隊投得很精彩！三個打者全部都被三振送走了！"
10043075-67 = "比賽來到了九局下半！"
10043075-71 = "哦，哦哦……！至少沒有再失分了……！"
10043075-72 = "現在只要第八、第九、第一棒的打線能順利銜接，祈禱攻勢能延續到第三棒……"
10043075-73 = "最後交給第四棒的主力打者縮小差距或追平……#n或者再稍微貪心一點，來個逆轉再見全壘打就行了！"
10043075-78 = "那個……指導員？#n雖然我不是很懂棒球的規則，不過那種事發生的機率應該不是很高吧……？"
10043075-79 = "[s]「堇。真相有時候是很殘酷的……」"
10043075-80 = "是，是嗎？"
10043075-85 = "唔……呃啊……！"
10043075-94 = "怎，怎麼了？有什麼問題嗎？"
10043075-95 = "我的手腕剛才被流彈打中……#n這樣還能舉起球棒嗎……！"
10043075-100 = "你說什麼──！？！？！？"

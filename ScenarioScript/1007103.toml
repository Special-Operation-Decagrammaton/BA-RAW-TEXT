[translation]
1007103-1 = "SRT，訓練"
1007103-3 = "在海上發生的事件與陸上不同，有著許多限制條件。"
1007103-4 = "舉例來說，船上由於通道狹小且死角眾多，必須要時時警戒奇襲。"
1007103-5 = "更重要的是，船身的搖擺很容易讓人失去平衡。#n就連要瞄準敵人都很費工夫。"
1007103-6 = "要解決這些問題，只能透過堅持不懈的反覆訓練……"
1007103-7 = "遺憾的是，RABBIT小隊的訓練時間相當短暫，#n因此對海上作戰的熟練度確實還不足夠。"
1007103-8 = "這次既然來到了漁村，我打算進行船上的模擬訓練……"
1007103-9 = "正好承蒙村民的好意借到了一艘船。"
1007103-10 = "[s]「那真是太好了。」"
1007103-12 = "[ns1]「那我該幫什麼忙呢？」\n[ns2]「要開船的話可能有點困難……」"
1007103-15 = "請別擔心。船的駕駛就交給我吧。"
1007103-16 = "請老師擔任人質的角色……"
1007103-20 = "……比起這裡，果然還是在現場說明比較有效率吧。"
1007103-21 = "詳細的內容等抵達目標地點後再告訴老師。"
1007103-22 = "[s] 上船"
1007103-28 = "那麼我們出發吧。#n請再次確認救生衣是否有確實繫緊哦。"
1007103-33 = "（過了一會，已經看不見陸地的時候……）"
1007103-37 = "……差不多可以了呢。"
1007103-38 = "距離陸地這麼遠的話，想靠游泳接近這艘船並不容易，#n船身也有因海浪造成的搖晃，可說是相當接近實際作戰現場的理想狀況。"
1007103-39 = "今天的訓練是船上人質的救出訓練。"
1007103-40 = "老師扮演的角色是人質，所以請保持被拘束的狀態在船艙裡等待。"
1007103-41 = "……那麼，我就綁起來囉。"
1007103-47 = "[ns]「是，是不是綁太緊了？」"
1007103-48 = "那是當然的。如果能行動的話就沒有意義了。"
1007103-49 = "訓練必須時時當作實戰進行。#n姿勢可能會有點不舒服，還請老師見諒。"
1007103-50 = "那麼綑綁也完成了，我去甲板進行突入的準……"
1007103-54 = "……啊。"
1007103-55 = "[s]「……怎麼了？」"
1007103-56 = "雖然拜託老師來扮演人質，卻把假想敵人的事忘得一乾二淨了……"
1007103-57 = "一想到能在船上訓練就過於興奮才會……"
1007103-58 = "……如果沒有敵人的話，就不能算是救出作戰的訓練。"
1007103-59 = "[s3]「那也沒辦法。」\n[s4]「今天的訓練就……」"
1007103-60 = "……是呢。#n人質的救出作戰就等下次有機會再進行，今天就更改為護衛人質的逃脫訓練吧。"
1007103-61 = "……是呢。#n人質的救出作戰就等下次有機會再進行，今天就更改為護衛人質的逃脫訓練吧。"
1007103-65 = "[ns5]「那個……都子同學？」\n[ns6]「不幫我鬆開繩子嗎……？」"
1007103-68 = "老師，請你仔細聽我說。#n老師擔任的角色是人質，所以請務必聽從我的指示。"
1007103-69 = "還有，我剛剛也說過……"
1007103-74 = "無論什麼時候，我都是抱持著實戰的心情進行訓練的。"
1007103-76 = "（之後以都子人質的身分，在船上度過了愉快的時光）"

1007103-64 = "#zmc;instant;360,280;1896\n#wait;1500"
1007103-65 = "#zmc;instant;360,280;1896\n[ns5] \"저…… 미야코 씨?\"\n[ns6] \"포박은 풀어주지 않는 거야……?\""
1007103-66 = "#zmc;instant;360,280;1896\n#wait;100"
1007103-67 = "#zmc;instant;360,280;1896\n#wait;100"
1007103-68 = "#zmc;instant;360,280;1896\n3;미야코 수영복;02;선생님. 선생님은 제가 붙잡은 포로니 움직이지 마시고 제 지시에 따라 주세요.\n#3;em;[반응]\n#3;closeup"
1007103-69 = "#zmc;instant;360,280;1896\n3;미야코 수영복;99;그리고 아까도 말씀드렸지만……\n#3;closeup"

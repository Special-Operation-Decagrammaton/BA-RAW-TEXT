[translation]
1007103-1 = "SRT, Train!"
1007103-3 = "There are many different factors you must take into account when you're on a mission out at sea."
1007103-4 = "Ships have narrow passageways and steep stairwells, making them a perfect hiding place for enemy ambushes."
1007103-5 = "On top of that, ships at sea are constantly rocking, making it harder to aim and sight your firearms in the heat of battle."
1007103-6 = "The best way to overcome these challenges is through consistent training, but..."
1007103-7 = "The RABBIT Squad had such a short training period, and we've had no chance to practice maritime operations."
1007103-8 = "That's why, when we came here, I thought it would be a great opportunity to run through some exercises on an actual ship."
1007103-9 = "Luckily, a villager was willing to lend us one of their boats."
1007103-10 = "[s] \"That's great!\""
1007103-12 = "[ns1] \"So what did you need my help with, exactly?\"\n[ns2] \"I don't really have experience sailing a ship...\""
1007103-15 = "I'll take care of the helm."
1007103-16 = "I need you to play the role of hostage in our exercise..."
1007103-20 = "It will be faster if I just show you."
1007103-21 = "Sensei, please come aboard. I will explain everything once we've reached our destination."
1007103-22 = "[s] Board the ship."
1007103-28 = "We're casting off. Everyone, please check that your life jackets are securely fastened."
1007103-33 = "After some time, we stopped...in the middle of the ocean..."
1007103-37 = "We're here!"
1007103-38 = "This is too far to swim to from land, and the water is choppy here, so it's perfect for our purposes."
1007103-39 = "Today, we're simulating a maritime hostage rescue operation."
1007103-40 = "You are playing the role of a prisoner of war. All you need to do is stand still in this room."
1007103-41 = "...All right. I'm going to tie you up now, Sensei."
1007103-47 = "[ns] \"I-Isn't that a little too tight?\""
1007103-48 = "It wouldn't be a very realistic exercise if you could still move around."
1007103-49 = "We must take our training as seriously as possible if we're going to learn from it. I apologize for any discomfort."
1007103-50 = "Now that you're set here, all that's left is to wait for the rescue operation to begin on deck..."
1007103-54 = "...Ah."
1007103-55 = "[s] \"Something wrong?\""
1007103-56 = "Hm... I asked you to play the role of hostage, but I forgot to ask anyone to play your kidnappers..."
1007103-57 = "I was so excited that we finally had a ship that I made such an obvious mistake..."
1007103-58 = "Even if we rescue you, there's no point if there isn't a counterforce for us to overcome."
1007103-59 = "[s3] \"What a shame...\"\n[s4] \"I guess there's no choice but to call it a day.\""
1007103-60 = "Oh well. Instead of a rescue exercise, we'll change the focus of the training to handling and securing a prisoner while at sea."
1007103-61 = "Oh well. Instead of a rescue exercise, we'll change the focus of the training to handling and securing a prisoner while at sea."
1007103-65 = "[ns5] \"Uh... Miyako?\"\n[ns6] \"Please untie me...\""
1007103-68 = "Sensei. You are the prisoner that we secured, so please follow my instructions exactly."
1007103-69 = "Like I said..."
1007103-74 = "I take my training very seriously."
1007103-76 = "I spent the rest of the afternoon enjoying my cruise as Miyako's prisoner."

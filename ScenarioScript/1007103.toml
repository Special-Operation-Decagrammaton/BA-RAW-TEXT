[translation]
1007103-1 = "#title;SRT, 훈련합니다."
1007103-2 = "#wait;500"
1007103-3 = "3;미야코 수영복;05;해상에서의 특수 작전은 육지에서의 작전과는 달리 여러 가지 제한 조건이 많습니다.\n#3;em;[반응]\n#3;a"
1007103-4 = "3;미야코 수영복;10;예를 들자면, 해상 작전의 주 무대가 되는 선박은 통로가 협소하고 난간이 가파르기 때문에 사각지대에서의 갑작스러운 습격에 더욱 취약하지요."
1007103-5 = "3;미야코 수영복;99;무엇보다 흔들리는 배 위에서는 쉽게 균형을 잃을 수 있기 때문에 총기의 조준이나 시야 확보에도 여러 가지 애로사항이 발생합니다."
1007103-6 = "3;미야코 수영복;02;이러한 문제를 해결하기 위한 가장 좋은 방법은 꾸준하고 성실한 훈련뿐입니다만……\n#3;em;…"
1007103-7 = "3;미야코 수영복;06;아쉽게도 RABBIT 소대는 훈련 기간이 짧았기 때문에, 해상 작전과 같은 특수한 상황에서의 숙련도가 부족한 편입니다."
1007103-8 = "3;미야코 수영복;02;사실 이번에 어촌 마을에 오게 되면서, 선박 위에서의 모의전을 훈련할 기회가 생긴다면 좋겠다고 생각했었습니다만……"
1007103-9 = "3;미야코 수영복;03;마침 운 좋게 마을 주민께 부탁하여 안 쓰는 배를 한 척 빌릴 수 있게 되었습니다.\n#3;em;[반짝]\n#3;greeting"
1007103-10 = "[s] \"잘된 일이네!\""
1007103-11 = "#wait;1000"
1007103-12 = "[ns1] \"그나저나 나는 무얼 도와주면 되는 거야?\"\n[ns2] \"배를 운전하는 일이라면 조금 곤란한데……\""
1007103-13 = "#wait;10"
1007103-14 = "#wait;10"
1007103-15 = "3;미야코 수영복;03;걱정마시길. 배의 운전이라면 제가 할 수 있으니까요."
1007103-16 = "3;미야코 수영복;02;선생님께서는 이번 작전에서 포로 역할을……"
1007103-17 = "#st;[0,0];instant;1;"
1007103-18 = "#clearST"
1007103-19 = "3;미야코 수영복;02\n#3;em;…\n#3;h\n#wait;2500"
1007103-20 = "3;미야코 수영복;99;……역시 말로 설명하는 것보다는 직접 보여드리는 편이 빠르겠지요."
1007103-21 = "3;미야코 수영복;05;선생님, 배에 승선해 주세요. 자세한 설명은 해상의 목표 지점에 도착한 뒤에 계속하겠습니다.\n#3;em;[!]"
1007103-22 = "[s] 배에 승선한다."
1007103-23 = "#st;[0,0];instant;1;"
1007103-24 = "#clearST"
1007103-25 = "#all;hide"
1007103-26 = "#wait;2500"
1007103-27 = "#wait;1500"
1007103-28 = "#na;미야코 수영복;그럼 출발하겠습니다. 구명조끼의 결속 상태를 다시 한번 확인해 주세요."
1007103-29 = "#st;[0,0];instant;1;"
1007103-30 = "#clearST"
1007103-31 = "#wait;1500"
1007103-32 = "#wait;2500"
1007103-33 = "#na;(한참을 달려 바다 한가운데에 도착한 뒤……)"
1007103-34 = "#zmc;instant;360,280;1896\n#all;hide"
1007103-35 = "#zmc;instant;360,280;1896\n#wait;1200"
1007103-36 = "#zmc;instant;360,280;1896\n#wait;1000"
1007103-37 = "#zmc;instant;360,280;1896\n3;미야코 수영복;07;……도착했습니다!\n#3;em;[반짝]\n#3;closeup\n#3;a"
1007103-38 = "#zmc;instant;360,280;1896\n3;미야코 수영복;03;이만한 거리면 육지에서 수영으로 접근하는 것은 어려울 테고, 파고도 적당하니 이상적인 선박 작전의 환경이라고 할 수 있겠네요.\n#3;closeup"
1007103-39 = "#zmc;instant;360,280;1896\n3;미야코 수영복;99;오늘 진행하고자 하는 훈련은 선상에서의 포로 구출 훈련입니다.\n#3;closeup"
1007103-40 = "#zmc;instant;360,280;1896\n3;미야코 수영복;02;선생님께서는 포로 역할로, 포승줄에 묶인 채 선실 안에서 가만히 대기해 주시면 됩니다.\n#3;em;[반응]\n#3;closeup"
1007103-41 = "#zmc;instant;360,280;1896\n3;미야코 수영복;10;……그럼 선생님을 잠시 포박하도록 하겠습니다.\n#3;greeting\n#3;closeup"
1007103-42 = "#zmc;instant;360,280;1896\n#st;[0,0];instant;1;"
1007103-43 = "#zmc;instant;360,280;1896\n#clearST"
1007103-44 = "#zmc;instant;360,280;1896\n#all;hide"
1007103-45 = "#zmc;instant;360,280;1896\n#wait;1200"
1007103-46 = "#zmc;instant;360,280;1896\n#wait;1500\n#bgshake"
1007103-47 = "#zmc;instant;360,280;1896\n[ns] \"너, 너무 세게 묶은 거 아냐?\""
1007103-48 = "#zmc;instant;360,280;1896\n3;미야코 수영복;02;그야 당연하지요. 포로가 마음대로 움직일 수 있다면 포박이 아니니까요.\n#3;a\n#3;closeup"
1007103-49 = "#zmc;instant;360,280;1896\n3;미야코 수영복;10;훈련은 언제나 실전처럼 진지하게 수행해야 합니다. 조금 움직임에 불편함이 있으시더라도 양해 부탁드리겠습니다.\n#3;closeup"
1007103-50 = "#zmc;instant;360,280;1896\n3;미야코 수영복;99;그럼 포박도 끝났으니, 남은 일은 갑판 위에서부터 구출을 위해 돌입을……\n#3;closeup"
1007103-51 = "#zmc;instant;360,280;1896\n#st;[0,0];instant;1;"
1007103-52 = "#zmc;instant;360,280;1896\n#clearST"
1007103-53 = "#zmc;instant;360,280;1896\n3;미야코 수영복;02\n#3;em;[반응]\n#3;closeup\n#wait;1000"
1007103-54 = "#zmc;instant;360,280;1896\n3;미야코 수영복;09;……아차.\n#3;stiff\n#3;closeup"
1007103-55 = "#zmc;instant;360,280;1896\n[s] \"……왜 그래?\""
1007103-56 = "#zmc;instant;360,280;1896\n3;미야코 수영복;04;그게…… 선생님께 포로 역할을 부탁드린다는 것까지는 생각했는데, 포로를 지키는 대항군 역할을 부탁할 사람을 깜박했습니다……\n#3;em;[땀]\n#3;closeup"
1007103-57 = "#zmc;instant;360,280;1896\n3;미야코 수영복;11;모처럼 선박 위에서 훈련을 할 수 있다는 사실에 들뜬 나머지 이런 실수를 저지르다니……\n#3;closeup"
1007103-58 = "#zmc;instant;360,280;1896\n3;미야코 수영복;06;이렇게 홀로 묶여 있는 선생님을 구출한다 하더라도, 대항 세력이 없으면 구출 작전을 수행하는 의미가 없네요.\n#3;closeup"
1007103-59 = "#zmc;instant;360,280;1896\n[s3] \"어쩔 수 없지.\"\n[s4] \"오늘은 훈련을 종료하는 수밖에……\""
1007103-60 = "#zmc;instant;360,280;1896\n3;미야코 수영복;99;……네. 어쩔 수 없이 오늘은 포로 구출 작전 대신, 해상에서 붙잡은 포로를 안전하게 호위하는 방어 훈련으로 전환해야겠습니다.\n#3;closeup\n#3;em;…"
1007103-61 = "#zmc;instant;360,280;1896\n3;미야코 수영복;99;……네. 어쩔 수 없이 오늘은 포로 구출 작전 대신, 해상에서 붙잡은 포로를 안전하게 호위하는 방어 훈련으로 전환해야겠습니다.\n#3;closeup\n#3;em;…"

[translation]
1007103-1 = "SRT ปฏิบัติการกู้ภัย!"
1007103-3 = "ปฏิบัติการทางทะเลมีเงื่อนไขและข้อจำกัดหลายอย่างที่ต่างจากปฏิบัติการทางบกค่ะ"
1007103-4 = "อย่างเช่น บนเรือที่เป็นฐานปฏิบัติการทางทะเล จะมีความเสี่ยงต่อการถูกโจมตีกะทันหันในบริเวณ#nทางเดิน และบันไดที่เป็นโซนจุดบอดมากกว่าค่ะ"
1007103-5 = "ยิ่งไปกว่านั้น บนเรือที่โคลงเคลงอยู่ตลอดเวลาจะรักษาสมดุลไว้ได้ยาก ทำให้ความแม่นยำในการ#nเล็งเป้า หรือทัศนวิสัยในการยิงลดลงได้ด้วยค่ะ"
1007103-6 = "วิธีที่ดีที่สุดสำหรับแก้ปัญหาพวกนี้ก็คือการตั้งใจฝึกฝนอย่างสม่ำเสมอค่ะ"
1007103-7 = "แต่น่าเสียดายที่ระยะเวลาการฝึกของกองทหาร RABBIT สั้นมากๆ เลยมีประสบการณ์ฝึกปฏิบัติการทาง#nทะเลน้อยมากด้วยค่ะ"
1007103-8 = "อันที่จริง พอได้มาทะเลแบบนี้ ฉันก็แอบหวังอยู่เหมือนกันว่าถ้าได้มีโอกาสไปฝึกจำลองการ#nปฏิบัติการบนเรือบ้างก็น่าจะดีน่ะค่ะ..."
1007103-9 = "โชคดีที่พอไปขอร้องชาวเมือง พวกเขาก็ให้ยืมเรือเก่าๆ มาใช้ด้วยค่ะ"
1007103-10 = "[s] \"ดีจังเลยนะ!\""
1007103-12 = "[ns1] \"ว่าแต่ว่าจะให้ครูช่วยอะไรเหรอ?\"\n[ns2] \"ถ้าเรื่องขับเรือ ครูคิดว่าไม่น่าจะไหว...\""
1007103-15 = "ไม่ต้องกังวลนะคะ ปล่อยให้เรื่องขับเรือเป็นหน้าที่ของฉันได้เลยค่ะ"
1007103-16 = "ปฏิบัติการครั้งนี้ ฉันอยากให้คุณครูช่วยรับบทเป็นตัวประกัน..."
1007103-20 = "...คิดแล้วเชียว แสดงให้เห็นกับตาเลยน่าจะดีกว่าสินะคะ"
1007103-21 = "คุณครูคะ รบกวนขึ้นมาบนเรือด้วยค่ะ ส่วนรายละเอียด ฉันจะอธิบายให้ฟังอีกครั้งตอนที่ไปถึงพื้นที่#nเป้าหมายค่ะ"
1007103-22 = "[s] ขึ้นเรือ"
1007103-28 = "ถ้างั้นก็ไปกันเลยนะคะ รบกวนตรวจสอบสภาพการสวมใส่เสื้อชูชีพอีกครั้งด้วยค่ะ"
1007103-33 = "(นั่งเรือมาสักพักก็มาถึงกลางทะเล...)"
1007103-37 = "...ถึงแล้วค่ะ!"
1007103-38 = "ถ้าออกมาไกลขนาดนี้ก็คงจะว่ายน้ำกลับเข้าฝั่งลำบาก อีกทั้งตอนนี้คลื่นทะเลก็อยู่ในระดับความแรงที่#nเหมาะสม นับเป็นสภาพแวดล้อมสำหรับปฏิบัติการทางทะเลเลยค่ะ"
1007103-39 = "การฝึกของวันนี้... คือการฝึกช่วยเหลือตัวประกันบนเรือค่ะ"
1007103-40 = "คุณครูรับบทเป็นตัวประกันที่ถูกเชือกมัดข้อมือเอาไว้ เพราะงั้นแค่นั่งรออยู่บนเรือเฉยๆ ก็พอค่ะ"
1007103-41 = "...ถ้างั้นฉันขอใช้เชือกมัดคุณครูไว้สักครู่นะคะ"
1007103-47 = "[ns] \"มะ...มัดแน่นเกินไปหรือเปล่า?\""
1007103-48 = "ก็ต้องมัดให้แน่นสิคะ ถ้าเกิดตัวประกันขยับได้ตามใจชอบก็ไม่เรียกว่าถูกจับอยู่น่ะสิคะ"
1007103-49 = "การฝึกจะต้องทำให้สมจริง เสมือนกับว่าเกิดสถานการณ์จริงที่สุดค่ะ ถึงอาจจะรู้สึกอัดอัดไปบ้าง แต่ก็รบกวนอดทนหน่อยนะคะ"
1007103-50 = "ตอนนี้ก็จับมัดเรียบร้อยแล้ว ที่เหลือก็แค่ปฏิบัติการช่วยเหลือจากทางดาดฟ้าเรือ..."
1007103-54 = "...อ๊ะ"
1007103-55 = "[s] \"...มีอะไรเหรอ?\""
1007103-56 = "คือว่า... ฉันคิดแค่ว่าจะขอให้คุณครูมาช่วยรับบทเป็นตัวประกัน แต่ลืมหาคนที่จะมาช่วยรับบทเป็น#nคนร้ายที่จับตัวประกันมาค่ะ..."
1007103-57 = "อุตส่าห์มีโอกาสได้มาฝึกปฏิบัติการบนเรือทั้งที แต่ดันทำผิดพลาดแบบนี้ซะได้..."
1007103-58 = "ถึงจะช่วยเหลือคุณครูที่ถูกมัดไว้แบบนี้ได้ก็เถอะค่ะ แต่ถ้าไม่มีคนร้ายอยู่ละก็ คงจะเรียกว่าเป็นการ#nฝึกปฏิบัติการช่วยเหลือตัวประกันไม่ได้แล้วค่ะ"
1007103-59 = "[s3] \"ช่วยไม่ได้นะ\"\n[s4] \"ถ้างั้นวันนี้คงต้องล้มเลิกการฝึก...\""
1007103-60 = "...ค่ะ ช่วยไม่ได้นะคะ ถ้างั้นวันนี้คงจะต้องเปลี่ยนเป็นการฝึกคุ้มกันตัวประกันที่ถูกจับอยู่บนเรือ แทนการฝึกช่วยเหลือตัวประกันแล้วละค่ะ"
1007103-61 = "...ค่ะ ช่วยไม่ได้นะคะ ถ้างั้นวันนี้คงจะต้องเปลี่ยนเป็นการฝึกคุ้มกันตัวประกันที่ถูกจับอยู่บนเรือ แทนการฝึกช่วยเหลือตัวประกันแล้วละค่ะ"
1007103-65 = "[ns5] \"คือ... คุณมิยาโกะ?\"\n[ns6] \"คิดจะจับครูมัดไว้แบบนี้จริงๆ เหรอ...?\""
1007103-68 = "คุณครูคะ คุณครูเป็นตัวประกันที่ถูกจับไว้นะคะ กรุณาอย่าดิ้นดุ๊กดิ๊กไปมา แล้วก็ช่วยปฏิบัติตามที่#nฉันบอกด้วยนะคะ"
1007103-69 = "อย่างที่ฉันเคยบอกไปนะคะ..."
1007103-74 = "เรื่องปฏิบัติการ... ฉันจริงจังเสมอนะคะ"
1007103-76 = "(หลังจากนั้น คุณครูก็ใช้เวลาอยู่บนเรือในฐานะตัวประกันของมิยาโกะ... อย่างเพลิดเพลิน)"

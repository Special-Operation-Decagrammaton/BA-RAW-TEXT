[translation]
10006010-1 = "-The Rehearsal Episode-;Hatsune Miku Live"
10006010-5 = "Hello, everyone! It's your favorite virtual idol, Miku!"
10006010-6 = "This is my first time visiting you all in Kivotos, huh?"
10006010-7 = "I'm so happy that I'm here to perform for you all!"
10006010-8 = "In fact, you may have heard that my live concert will be held in Kivotos."
10006010-9 = "That's because I had this special real world body made just for this show."
10006010-10 = "Heehee. How do you like it? Is it cute?"
10006010-11 = "There's just one teensy little problem. I must not be completely adjusted to my new body yet because I keep missing the beat whenever I rehearse my new song."
10006010-12 = "The engineers say they need a lot more data to make the calibrations I'll need to get used to my new body."
10006010-13 = "So I'm conducting a special rehearsal in front of all of you!"
10006010-14 = "Everyone, please cheer me on!"
10006010-15 = "Oh, and I hope you'll join me and come to the concert!"

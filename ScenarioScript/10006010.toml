[translation]
10006010-1 = "#title;~리허설 편~;하츠네 미쿠의 스페셜 라이브"
10006010-2 = "#wait;4000"
10006010-3 = "#wait;2500"
10006010-4 = "#all;hide"
10006010-5 = "3;미쿠;00;안녕하세요, 여러분! 여러분의 버추얼 싱어, 미쿠예요!\n#3;a\n#3;em;[반짝]"
10006010-6 = "3;미쿠;01;키보토스에서 뵙는 건 처음이시죠?"
10006010-7 = "3;미쿠;03;저도 여러분을 이곳에서 뵙게 되어서 너무 반가워요!\n#3;greeting\n#3;em;[음표]"
10006010-8 = "3;미쿠;01;이미 알고 있는 분도 있으시겠지만, 이번에 저의 라이브 콘서트가 키보토스에서 열리게 되었답니다."
10006010-9 = "3;미쿠;00;그래서 공연을 위해 이렇게 새로운 신체도 특별히 준비했어요."
10006010-10 = "3;미쿠;03;후후, 예쁘죠?"
10006010-11 = "3;미쿠;14;그런데 새로운 신체의 적응이 완전히 끝나지 않았는지, 노래를 연습할 때마다 자꾸 박자를 놓치고 마네요.\n#3;em;[땀]"
10006010-12 = "3;미쿠;07;엔지니어님의 말로는 새로운 몸에 익숙해지기 위해서는 좀 더 실전에 가까운 데이터가 필요하대요."
10006010-13 = "3;미쿠;01;그래서 이번에 이렇게 리허설로서 여러분 앞에서 '특별한 예행연습'을 하게 되었답니다!"
10006010-14 = "3;미쿠;00;그러니까 여러분, 많은 응원 부탁드릴게요!"
10006010-15 = "3;미쿠;03;참, 저의 라이브 콘서트도 잊지 말고 찾아와 주세요!\n#3;greeting\n#3;em;[반짝]\n#3;closeup"

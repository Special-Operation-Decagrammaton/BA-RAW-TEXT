[translation]
2004602-1 = "ผืนนภาที่หลบหนีไม่มีวันอ่อนแรง"
2004602-3 = "ตายจริง คุณครู? มาถึงเร็วจังเลยนะคะ"
2004602-4 = "ที่นี่เป็นสถานที่ห่างไกล ฉันคิดว่าคุณครูจะมาช้านิดหน่อยเสียอีก คุณครูคงรีบร้อนมาสินะคะ"
2004602-5 = "ตายจริง~ แบบนี้ฉันยิ่งรู้สึกผิดเลยค่ะ~"
2004602-6 = "[ns] \"บาดเจ็บตรงไหนหรือเปล่า? แล้วคนที่มาไล่ล่าล่ะ?\""
2004602-7 = "อะฮะฮ่า~ ขอบคุณที่เป็นห่วงนะคะ แต่เด็กสาวคนนี้ปลอดภัยดีค่ะ~ "
2004602-8 = "ฉันพอจะหลบหนีการไล่ล่าได้แล้ว แต่ก็ยังมีคนไล่ตามฉันเรื่อยๆ จากทุกที่เลย~"
2004602-9 = "คะ? ฉันพอรู้ได้หรือเปล่าน่ะเหรอคะว่าฝ่ายตรงข้ามคือใคร?"
2004602-10 = "อืม... นั่นสินะคะ"
2004602-11 = "อะฮ่า~ ฉันไม่รู้เลยค่ะ~"
2004602-12 = "ใช่ว่าฉันจะเดาไม่ออกเลยหรอกนะคะ แต่คนที่เป็นไปได้น่ะมีมากจนฉันไม่รู้จะเลือกสงสัยใครดี~ น่าจะประมาณนี้ค่ะ"
2004602-13 = "ตำแหน่งหัวหน้าชมรมหยินหยางเป็นตำแหน่งที่สร้างศัตรูมากกว่ามิตร เห็นอย่างนี้ฉันก็มีคู่แข่งทาง#nการเมืองเยอะจนนับนิ้วไม่ไหวเลยละค่ะ~"
2004602-14 = "แต่ไม่ว่าใครจะอยู่เบื้องหลังการไล่ล่านี้ แค่ฉันมีคุณครูของชาเล่ต์อยู่ด้วย คนคนนั้นก็ไม่กล้า#nออกมาแล้วค่ะ"
2004602-15 = "เพราะงั้น~ ฉันจะขอให้คุณครูช่วยคุ้มกันจนกว่าฉันจะปลอดภัยได้มั้ยคะ~?"
2004602-16 = "[s] \"ได้อยู่แล้ว!\""
2004602-17 = "อะฮะฮ่า! ตอบเร็วดีจัง! ฉันคิดถูกแล้วละค่ะที่มาขอร้องคุณครู~"
2004602-18 = "งั้นเรามาหนีไปด้วยกันเลยมั้ยคะ~? ฉันมีที่ที่คิดไว้แล้วน่ะค่ะ~"
2004602-20 = "(หลังจากนั้นคุณครูก็พยายามหนีออกจากเขตปกครองตนเองเฮียกคิยาโคกับนิยะ...)"
2004602-22 = "เวทีกลางแจ้ง จัตุรัสกลาง"
2004602-23 = "โอ้~! ช่างแข็งแกร่งเหลือเกิน~!"
2004602-24 = "เนียนเต มาซามุเนะไม่แพ้ใครอยู่แล้ว! ไร้พ่าย! ไร้เทียมทาน! เหลือจะเชื่อเลย~!"
2004602-32 = "อะฮ่า~ ดีจังเลยนะคะที่มาดู~"
2004602-33 = "นี่คือการแสดงปิดท้ายของงานเทศกาลนี้ค่ะ ได้ยินว่ากลุ่มการค้าลงทุนลงแรงกับงานนี้ไปเยอะเลย~"
2004602-34 = "ทำออกมาได้น่าภูมิใจจริงๆ นะคะ~"
2004602-38 = "ตายจริง คุณครู...? ไม่พอใจตรงไหนหรือเปล่าคะ?"
2004602-39 = "ส่วนตัวฉันคิดว่าเป็นการแสดงที่ดีเลย แต่ทำไมคุณครูถึงทำหน้าซับซ้อนเกินบรรยายแบบนี้ล่ะคะ?"
2004602-40 = "แน่นอนว่า~ มีบางส่วนที่แตกต่างกับความจริงเล็กน้อย... แต่การดัดแปลงแบบนั้นก็เป็นกลิ่นอายของ#nการแสดงคาบูกิ~"
2004602-41 = "อ้อ~ หรือว่านี่เป็นครั้งแรกที่คุณครูได้ชมการแสดงคาบูกิคะ~?"
2004602-42 = "ช่วงแรกมันอาจเข้าใจยากหน่อย แต่พอดูไปเรื่อยๆ ก็จะรู้ว่ามันเป็นอะไรที่พิเศษจริงๆ ค่ะ~"
2004602-43 = "[ns1] \"ไม่ ไม่ใช่อย่างนั้นหรอก แต่เรากำลังหนี...\"\n[ns2] \"เรากำลังหนีการไล่ล่ากันอยู่ไม่ใช่เหรอ?\""
2004602-46 = "กะแล้วเชียว คุณครูยังกังวลเรื่องนั้นอยู่นี่เองสินะคะ"
2004602-47 = "มีคำกล่าวที่ว่า \"หากจะซ่อนต้นไม้ จงไปซ่อนในป่า~\" นะคะ"
2004602-48 = "แล้วที่นี่ก็เป็นเฮียกคิยาโคที่ผู้คนล้นหลาม... คงไม่มีที่ไหนที่ซ่อนตัวได้ดีไปกว่าสถานที่จัดงานเทศกาล#nอีกแล้วค่ะ~"
2004602-49 = "ทางนี้! ฉันเห็นกับตาเลยว่าวิ่งหนีมาทางนี้น่ะ!"
2004602-53 = "รีบจับตัวให้ได้ก่อนจะหนีไปอีกเร็วเข้า!"
2004602-54 = "ตายจริง~ เรามาอยู่ที่ใดที่หนึ่งนานเกินไปหรือเปล่านะ~"
2004602-55 = "เอาละๆ~ เราไปที่อื่นกันต่อเถอะค่ะคุณครู~"
2004602-60 = "ถนนนิทรรศการละครประวัติศาสตร์"
2004602-61 = "เอาละ~ ใครจะมาเป็นผู้ท้าชิงคนต่อไป!"
2004602-62 = "ฮู่ว~ ถึงจะเคยได้ยินเกี่ยวกับการแสดงนี้มาแล้ว แต่พอได้มาเป็นส่วนหนึ่งของการแสดง ความรู้สึกก็แตกต่างกันเลยค่ะ~"
2004602-63 = "สมแล้วที่เป็นเฮียกคิยาโค คุ้มค่าที่อุตส่าห์เดินทางมาตั้งไกลนะคะ~"
2004602-65 = "ที่นี่เป็นจุดท่องเที่ยวที่ให้เราเข้าไปมีส่วนร่วมสินะคะ โอกาสแบบนี้ไม่ได้มีบ่อยๆ คุณครูก็ลองไปแสดงฝีมือที่ยอดเยี่ยมดูมั้ยคะ~?"
2004602-66 = "[s3] \"ไม่ดีกว่า พวกเรากำลังหนีอยู่นะ...\"\n[s4] \"ครูว่าอย่าทำอะไรที่สะดุดตาดีกว่า...\""
2004602-69 = "ไหนดูซิ~ ถ้าทำสำเร็จจะได้~ การ์ดมูชิควีนระดับซูเปอร์แรร์...?"
2004602-70 = "อ่า~ ฉันก็ไม่รู้ว่ามันคืออะไร แต่น่าจะเป็นการ์ดที่ขายดี..."
2004602-71 = "ไม่สิ... มันคือของเล่นสุดฮิตที่ได้รับความนิยมจากคนทุกเพศทุกวัยสินะคะ~"
2004602-72 = "อืม แต่ของเล่นแบบนี้จะดึงดูดใจคุณครูได้หรือเปล่านะ..."
2004602-73 = "[ns5] \"นั่นมัน?! การ์ดแรร์ระดับตำนานที่มีแค่ 4 ใบในโลก?!\"\n[ns6] \"งั้นก็มาลองดูกันสักตั้ง!!!\""
2004602-76 = "อะฮ่า?!"
2004602-77 = "ว้าว... คุณครูโดนตกได้เพราะการ์ดเหรอคะเนี่ย"
2004602-78 = "ถึงจะแตกต่างจากที่ฉันคิดไว้หน่อยก็เถอะนะ~"
2004602-79 = "แต่ขอแค่สนุกก็โอเคแล้วละค่ะ อะฮะฮะฮ่า~!"
2004602-80 = "อยู่ตรงโน้น! ตรงโน้น!"
2004602-84 = "เอาละ คุณครู มาทางนี้ค่ะ"
2004602-86 = "(คุณครูกับนิยะหลบหนีผู้ไล่ล่าด้วยกันและเที่ยวเล่นไปรอบๆ งานเทศกาล)"
2004602-87 = "(และแล้วก็ถึงเวลาพลบค่ำ)"
2004602-90 = "ฮื้ม~ ลมพัดสดชื่นดีจัง~"
2004602-91 = "คุณครูรู้หรือเปล่าคะ? ที่นี่น่ะกลิ่นหอมของดอกไม้จะแตกต่างกันไปในแต่ละฤดูกาลค่ะ ฤดูใบไม้ผลิมีกลิ่นของดอกซากุระ ฤดูร้อนมีกลิ่นของดอกเบญจมาศ ส่วนในฤดูอื่นก็..."
2004602-92 = "สิบปากว่าไม่เท่าตาเห็น~ ฉันว่าคุณครูแวะมาเที่ยวที่นี่ทุกฤดูกาลให้รู้เองดีกว่าค่ะ~"
2004602-93 = "ฉันละก็นะ... เผลอทำตัวเป็นไกด์ไปได้นะคะ"
2004602-94 = "มีคำที่ว่าเมื่อนักเรียนของเฮียกคิยาโคขึ้นมาที่นี่ ก็จะพูดมากโดยไม่รู้ตัวเลยค่ะ"
2004602-95 = "ถ้างั้นฉันก็คงเป็นนักเรียนเฮียกคิยาโคธรรมดาๆ คนหนึ่งเหมือนกันสินะ~ อะฮะฮะฮ่า~"
2004602-96 = "คงเป็นเพราะทุกคนชื่นชอบเฮียกคิยาโคหรือเปล่านะ...?"
2004602-97 = "ฮุฮุ จะว่าอย่างนั้นก็น่าจะได้ อะฮ่า! นั่นละค่ะคำตอบที่ถูกต้อง!"
2004602-98 = "[ns] \"แต่ว่าครูคิดเรื่องนี้มาสักพักแล้วละ\""
2004602-100 = "[ns] \"เรามาอยู่ตรงนี้ มันไม่สะดุดตาไปหน่อยเหรอ?\""
2004602-103 = "เจอแล้ว!"
2004602-104 = "ครั้งนี้ต้องไม่พลาดแน่นอนค่ะ!"
2004602-106 = "[ns9] \"โดนจับได้ซะแล้ว ครูจะขวางไว้ให้เอง!\"\n[ns10] \"ครูจะขวางไว้ให้เอง นิยะหนีไปเร็ว!\""
2004602-109 = "อะฮะฮ่า~ สมกับที่เป็นคุณครูเลย~ พอถึงเวลาแบบนี้ก็พูดอะไรเท่ๆ ออกมาทุกทีเลยนะคะ~"
2004602-110 = "แต่คุณครูไม่จำเป็นต้องทำแบบนั้นก็ได้ค่ะ~"
2004602-111 = "ฮืม เอาละ~ รุ่นน้องชมรมหยินหยางทุกคน~"
2004602-112 = "อย่างที่เห็นว่าฉันกำลังเป็นไกด์นำเที่ยวให้คุณครูที่มาเป็นแขกของเฮียกคิยาโคอยู่ค่ะ~"
2004602-113 = "ต้องเรียกว่ากำลังทำงานด้านวิเทศสัมพันธ์อยู่หรือเปล่านะ~?"
2004602-115 = "มันก็จริงอยู่... ที่หัวหน้าอยู่กับคุณครู...!"
2004602-116 = "คิดว่าโดดงานออกไปเที่ยวเล่นอย่างที่ทำเป็นประจำเสียอีก..."
2004602-118 = "ฮือๆ~ สมาชิกในชมรมไม่เชื่อใจฉันเลยเหรอเนี่ย~"
2004602-119 = "ฉันเป็นถึงหัวหน้าชมรมหยินหยาง ฉันไม่มีทางโดดงานแล้วออกมาเที่ยวหรอกค่ะ~"
2004602-120 = "ใช่มั้ยคะ คุณครู?"
2004602-121 = "[ns] \"นิยะ\""
2004602-123 = "[ns] \"อย่าทำให้รุ่นน้องเหนื่อยเลย รีบกลับไปเถอะ...\""
2004602-124 = "อะฮะฮะฮ่า~ ก็คงต้องเป็นอย่างนั้นละนะคะ"
2004602-125 = "วันนี้ต้องขอบคุณมากๆ ที่มาอยู่ด้วยนะคะ ฉันสนุกมากเลยค่ะ~ ไว้เจอกันใหม่นะคะ~"
2004602-127 = "(นิยะบอกลาอย่างไม่รู้สึกผิดแล้วจากไป)"
2004602-128 = "(สมาชิกชมรมหยินหยางเดินคว้าแขนทั้งสองข้างของนิยะราวกับจะไม่ปล่อยให้หนีไปอีกแล้ว ช่างเป็นภาพที่เห็นแล้วก็อดประทับใจไม่ได้...)"

[translation]
2004602-1 = "The Fleeing Sky Knows No Fatigue"
2004602-3 = "Oh my, Sensei? That was fast."
2004602-4 = "I thought you'd take longer to get all the way out here. You must've really been rushing."
2004602-5 = "I'm grateful."
2004602-6 = "[ns] \"Are you hurt? Are they still after you?\""
2004602-7 = "Nyahaha... I'm fine. Thanks for worrying. "
2004602-8 = "I lost them for now, but they're still looking for me."
2004602-9 = "Hm? Do I know anything about them?"
2004602-10 = "Mmm, well..."
2004602-11 = "Nyahah... Not a clue!"
2004602-12 = "I mean, I know who they COULD be, but there're so many possibilities!"
2004602-13 = "Being president of the Yin-Yang Club makes you lots of enemies, political and otherwise."
2004602-14 = "But whoever's behind it, they're going to think twice when they see Schale's Sensei with me."
2004602-15 = "With that in mind...could I ask you to stick with me until it's safe?"
2004602-16 = "[s] \"Of course!\""
2004602-17 = "Nyahaha! I like your enthusiasm! Glad I asked."
2004602-18 = "Well, let's get a move on, then. I have a place in mind..."
2004602-20 = "And so, Niya and I fled the Hyakkiyako District."
2004602-22 = "Central Plaza Outdoor Stage"
2004602-23 = "Oh, wow! So strong!"
2004602-24 = "Date Meowsamune is invincible! Invincible! InnnnVINcible!!"
2004602-32 = "Nyahaha, I'm glad we came to watch this."
2004602-33 = "The festival's grand finale. The merchant guild said they went all-out for it."
2004602-34 = "And they weren't lying!"
2004602-38 = "...Hm, Sensei? Did you...not like it?"
2004602-39 = "I thought it was pretty good, but...your face is a little hard to read right now."
2004602-40 = "I mean, yeah, they took some liberties with the history, but it's kabuki! Dramatization's all part of the charm..."
2004602-41 = "...which you might not know, if you haven't seen a kabuki play before."
2004602-42 = "It's a little confusing to watch at first, but it's really good once you get a taste for it."
2004602-43 = "[ns1] \"No, that's not it, it's just...\"\n[ns2] \"Weren't we on the run?\""
2004602-46 = "Oh, I see. That's what you were worried about."
2004602-47 = "Let me put it this way: have you ever heard the saying, \"if you want to hide a tree, plant it in the forest\"?"
2004602-48 = "Hyakkiyako is packed with people. In a crowd this big, we blend right in."
2004602-49 = "Over here! She went this way!"
2004602-53 = "Let's get her before we lose her again!"
2004602-54 = "Ahaha... Then again, we might've stayed here too long."
2004602-55 = "Moving right along, then..."
2004602-60 = "Historical Drama Exhibition Street"
2004602-61 = "Ha ha! Who's the next challenger?"
2004602-62 = "Phew! I'd heard about this performance, but being part of it is a whole different thing."
2004602-63 = "Gotta love Hyakkiyako. This is worth the trip and then some."
2004602-65 = "See, it's an interactive attraction. You could join in, Sensei. Show people how cool you are..."
2004602-66 = "[s3] \"No, since we're on the run.\"\n[s4] \"Let's not draw attention.\""
2004602-69 = "There's a prize, though. It's a...super rare Mushiqueen card...?"
2004602-70 = "Oh, right, from that card game people seem to like..."
2004602-71 = "...I mean, the amazingly popular card game trending across all demographics!"
2004602-72 = "Mmm, yeah, but that's probably not YOUR thing, Sensei..."
2004602-73 = "[ns5] \"Wait, there's only like four of those cards in the entire world!!\"\n[ns6] \"Okay, let's do this!!\""
2004602-76 = "Nyahaha?!"
2004602-77 = "Oh, my...that was quite a reaction."
2004602-78 = "Not what I expected, but..."
2004602-79 = "...hey, might as well enjoy yourself, nyahaha!"
2004602-80 = "There, over there!"
2004602-84 = "Oops, we've gotta go, Sensei. This way."
2004602-86 = "Together with Niya, I ran through many enjoyable venues throughout the festival."
2004602-87 = "Then, late in the evening..."
2004602-90 = "Ahh... What a nice breeze..."
2004602-91 = "Did you know? You can smell different flowers here depending on the season. Cherry blossoms in the spring, chrysanthemums in summer, and then in other seasons, it's..."
2004602-92 = "...I'm ruining the mood, aren't I? Maybe I should just let you take in the experience!"
2004602-93 = "...I don't know why I started talking like a tour guide."
2004602-94 = "Something about this place just makes Hyakkiyako students a lot more talkative."
2004602-95 = "And I guess I'm just another Hyakkiyako student, as far as that goes... Just saying... Nyahaha..."
2004602-96 = "Hmm? It's because people like Hyakkiyako...?"
2004602-97 = "Fufu, that's one explanation. Nyahaha! Great answer, actually!"
2004602-98 = "[ns] \"By the way, I've been meaning to ask...\""
2004602-100 = "[ns] \"Don't we stand out here?\""
2004602-103 = "Found you!"
2004602-104 = "You're not getting away this time!"
2004602-106 = "[ns9] \"They're onto us!\"\n[ns10] \"Run! I'll hold them off!\""
2004602-109 = "Nyahaha! That's our Sensei! Ready with a cool one-liner..."
2004602-110 = "...but you don't need one right now."
2004602-111 = "Ahem, hello, my juniors from the Yin-Yang Club."
2004602-112 = "As you can see here, I was guiding Sensei, who came to visit us in Hyakkiyako."
2004602-113 = "I suppose you could say I was handling an external task."
2004602-115 = "Well...Sensei is definitely WITH you, but...!"
2004602-116 = "We figured you just ran off to play hooky again..."
2004602-118 = "*sob* *sob* My own club members don't trust me..."
2004602-119 = "Do you really think I, president of the Yin-Yang Club, would shirk my duties and run off to play?"
2004602-120 = "Back me up here, Sensei."
2004602-121 = "[ns] \"Niya.\""
2004602-123 = "[ns] \"Stop giving your juniors a hard time and get back to work already...\""
2004602-124 = "Nyahaha... I should, shouldn't I?"
2004602-125 = "In that case, thanks for sticking with me today. I had a lot of fun. See you next time, yeah?"
2004602-127 = "Niya waved goodbye with a cheeky smile."
2004602-128 = "The other club members kept an impressive grip on her arms as they marched her away."

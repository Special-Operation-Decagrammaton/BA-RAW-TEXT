[translation]
2004602-1 = "逃竄之天不知疲倦"
2004602-3 = "哎呀，老師？#n您來得還真快呢。"
2004602-4 = "這裡這麼偏僻，我本來以為您會晚一點才抵達……看來您是急忙趕來的吧。"
2004602-5 = "哎呀～真讓人有點過意不去呢～"
2004602-6 = "[ns] 「你沒受傷吧？追著你的人呢？」"
2004602-7 = "喵哈哈～謝謝老師的關心，不才小女目前還平安無事～"
2004602-8 = "該說暫時擺脫了追擊，但各處依然有人埋伏嗎～"
2004602-9 = "嗯？對於對方的身份有沒有什麼頭緒？"
2004602-10 = "唔嗯……這個嘛……"
2004602-11 = "喵哈～完全不知道呢～"
2004602-12 = "但與其說是沒有頭緒，不如說是因為可能性太多而搞不清楚～"
2004602-13 = "畢竟身為陰陽部的部長，比起朋友更容易招來敵人……#n就算再怎麼沒落，我依然有數不完的政敵呢～"
2004602-14 = "不過無論幕後黑手究竟是誰，只要有夏萊的老師在我身邊，他們也不敢太過強硬吧。"
2004602-15 = "所以呢～在確保安全之前，能請老師護送我一下嗎～？"
2004602-16 = "[s] 「當然可以！」"
2004602-17 = "喵哈哈！真是爽快的回答！#n果然找老師幫忙是正確的呢～"
2004602-18 = "那麼，就麻煩您跟我一起逃亡吧～？#n剛好我有幾個不錯的地點想帶您去呢～"
2004602-20 = "（之後便和仁耶一同在百鬼夜行自治區展開逃亡……）"
2004602-22 = "中央廣場 戶外舞台"
2004602-23 = "哎呀～！真是太厲害了～！"
2004602-24 = "喵達政宗無敵！無敵！無敵！#n怎麼會這樣～！"
2004602-32 = "喵哈～果然過來欣賞是正確的呢～"
2004602-33 = "這可是本次祭典的壓軸表演。#n之前聽說商會下了不少功夫的時候，我還在想究竟會有多麼厲害～"
2004602-34 = "確實相當值得誇耀呢～"
2004602-38 = "……哎呀，老師？#n您看起來似乎不太滿意呢？"
2004602-39 = "這場表演的水準在我看來相當不錯，您卻露出了微妙的表情……"
2004602-40 = "當～然有些部分確實不太符合事實……不過這種改編也算是歌舞伎的韻味之一嘛～"
2004602-41 = "啊哈～還是說，老師您是第一次欣賞歌舞伎呢？"
2004602-42 = "雖然初次觀看的時候確實有點難懂，不過一旦投入其中可是會上癮的唷～"
2004602-43 = "[ns1] 「沒有，我不是那個意思啦……」\n[ns2] 「只是我們不是還在逃亡嗎？」"
2004602-46 = "原來如此，老師您一直在意這件事啊。"
2004602-47 = "不是有句話叫「藏樹就要藏在森林裡」嗎～"
2004602-48 = "況且這裡可是人山人海的百鬼夜行……#n像這種祭典的中心，不正是最適合隱藏的地方嗎～？"
2004602-49 = "在那邊！我剛才看到他往那邊去了！"
2004602-53 = "快追！別再讓他跑了！"
2004602-54 = "哎呀呀～話雖如此，我們好像還是在這裡待太久了呢～"
2004602-55 = "來來來～老師，往下一個地點出發吧～"
2004602-60 = "時代劇展示街"
2004602-61 = "來哦來哦～下一位挑戰者會是誰呢！"
2004602-62 = "呼～雖然是熟悉的表演，親自參與進來果然還是別有一番風味呢～"
2004602-63 = "不愧是百鬼夜行，遠道而來果然值得！"
2004602-65 = "是互動型的表演呢。#n來都來了，老師不如也展現一下帥氣的一面吧～？"
2004602-66 = "[s3] 「不是，我們現在還在逃亡……」\n[s4] 「這樣太引人注目了吧……」"
2004602-69 = "我看看～挑戰成功的獎品是……超稀有的甲蟲皇后卡……？"
2004602-70 = "啊～雖然我不是很熟，但好像是很熱門的卡牌遊戲……"
2004602-71 = "……不，應該說是老少皆宜的大熱商品呢～"
2004602-72 = "唔嗯，這樣似乎還是沒辦法打動老師的心……"
2004602-73 = "[ns5] 「等等，那是……全世界只有4張的傳說級稀有卡！？」\n[ns6] 「好，來挑戰吧！！！」"
2004602-76 = "喵哈！？"
2004602-77 = "哇……老師瞬間就投入了呢。"
2004602-78 = "雖然和我想像的過程有點不一樣～"
2004602-79 = "不過只要能玩得開心就好，喵哈哈哈～！"
2004602-80 = "在那邊！快追！"
2004602-84 = "來來，老師，請往這邊！"
2004602-86 = "（在躲避追擊的同時，與仁耶一同遊遍祭典的各個角落）"
2004602-87 = "（回過神來已經到了深夜）"
2004602-90 = "呼～真是舒服的風呢～"
2004602-91 = "您知道嗎？這裡的每個季節都有不同的花香。#n春天是櫻花，夏天是菊花，其他季節則是……"
2004602-92 = "直接說出來就沒意思了，還是請老師親自來體驗吧～"
2004602-93 = "……哎呀，我竟然不自覺地扮起導覽員了呢。"
2004602-94 = "百鬼夜行的學生只要來到這裡，總是會變得比較多話。"
2004602-95 = "從這個觀點來看，我是不是也像普通的百鬼夜行學生一樣呢～喵哈哈哈～"
2004602-96 = "您說大家都是因為喜歡百鬼夜行才會這樣……？"
2004602-97 = "呵呵，確實可以這麼說呢。#n喵哈！真是個好答案！"
2004602-98 = "[ns] 「不過我一直在想……」"
2004602-100 = "[ns] 「這裡是不是太顯眼了？」"
2004602-103 = "找到了！"
2004602-104 = "這次絕對不會再讓您逃掉了！"
2004602-106 = "[ns9] 「果然被發現了！」\n[ns10] 「這裡交給我，你快跑吧！」"
2004602-109 = "喵哈哈～不愧是老師，在關鍵時刻總是能說出帥氣的話呢～"
2004602-110 = "不過其實您不必這麼麻煩唷～"
2004602-111 = "咳哼，各位陰陽部的後輩們～？"
2004602-112 = "如你們所見，我可是在親自帶領老師參觀百鬼夜行哦～"
2004602-113 = "這也算是在執行對外業務吧～？"
2004602-115 = "這……老師確實在場……！"
2004602-116 = "本來以為您只是像平常一樣在偷懶的……"
2004602-118 = "嗚嗚～沒想到部員們竟然不信任我～"
2004602-119 = "身為陰陽部部長的我，怎麼可能會翹班偷懶呢～"
2004602-120 = "對吧，老師？"
2004602-121 = "[ns] 「仁耶。」"
2004602-123 = "[ns] 「別再讓後輩們擔心了，快回去吧……」"
2004602-124 = "喵哈哈哈～果然還是這樣比較好吧？"
2004602-125 = "那麼，今天能和老師一起度過，我真的非常開心。#n下次再見囉～"
2004602-127 = "（仁耶厚著臉皮打招呼後便離開了）"
2004602-128 = "（兩旁的陰陽部員緊緊抓住了他的雙臂，彷彿宣告著這次絕不會再放手一樣……）"

[translation]
2003206-1 = "冷水浴"
2003206-2 = "（為了進行特殊作戰，來到冰海執行任務……）"
2003206-3 = "（因為很好奇英美說的地方長什麼樣子，於是決定去找英美）"
2003206-6 = "（結果到英美所在的地方一看……）"
2003206-7 = "啊，老師，我在這邊。"
2003206-8 = "（英美在冰上鑿了一個洞，接著整個人鑽進了冰水裡）"
2003206-11 = "[ns]「你不冷嗎？」"
2003206-12 = "― [log=에이미 수영복]嗯？[/log][wa:300] "
2003206-14 = "― [log=에이미 수영복]不冷哦。別擔心。[/log][wa:1670] "
2003206-17 = "― [log=에이미 수영복]我反而，[/log][wa:1200] "
2003206-19 = "― [log=에이미 수영복]覺得現在很涼，溫度剛剛好。[/log][wa:1200] "
2003206-22 = "― [log=에이미 수영복]真舒服……[/log][wa:1440] "
2003206-24 = "― [log=에이미 수영복]老師要不要也進來？[/log]"
2003206-27 = "[ns]「我就不用了……」"
2003206-28 = "― [log=에이미 수영복]哼嗯～好吧。[/log][wa:2240] "
2003206-31 = "― [log=에이미 수영복]我再泡一下就出去，[/log][wa:1860] "
2003206-33 = "― [log=에이미 수영복]稍等我一下哦。老師。[/log][wa:1900] "
2003206-36 = "哈啊……真是太舒服了。"
2003206-37 = "不過這樣好像還不太夠……#n回去之後要不要做個能泡冷水澡的浴缸呢？"
2003206-38 = "這樣我就可以每天待在天堂裡……"
2003206-39 = "[s]「就算是英美，每天泡冷水澡還是會感冒的吧……」"
2003206-40 = "不用擔心，老師。#n我可從來沒有因為著涼而感冒過呢。"
2003206-41 = "即使在這種氣溫下，我也完全……"
2003206-42 = "哈……"
2003206-43 = "哈啾！"
2003206-44 = "咦？"
2003206-48 = "[ns]「英美感冒了！！」"
2003206-49 = "沒有……我只是打個噴嚏而已。"
2003206-50 = "[s]「不對！這一定是感冒！英美感冒了！」"
2003206-51 = "先等一下，我真的只是打噴嚏……！"
2003206-52 = "[s]「果然就算是英美也無法抵禦這種寒冷……！！」"
2003206-53 = "才沒有，我覺得這種溫度很舒服！我沒有感冒。"
2003206-55 = "（就這樣在和英美吵得互不相讓的同時回到了營地）"
2003206-59 = "（然而就連平時最討厭喝熱飲的英美，那天也把滾燙的熱茶喝了個精光）"

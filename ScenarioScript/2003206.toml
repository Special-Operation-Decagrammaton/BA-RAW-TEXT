[translation]
2003206-1 = "อาบน้ำเย็น"
2003206-2 = "(เอมิกำลังฝึกภารกิจธารน้ำแข็งสำหรับปฏิบัติการพิเศษ)"
2003206-3 = "(แต่คุณครูก็สงสัยเกี่ยวกับสถานที่ที่เอมิพูดถึง จึงตัดสินใจออกไปหา)"
2003206-6 = "(เมื่อมาถึงที่ที่เอมิบอก...)"
2003206-7 = "อ๊ะ คุณครู ทางนี้"
2003206-8 = "(เอมิเจาะรูในน้ำแข็งที่เย็นเฉียบ แล้วเอาตัวลงไปแช่ในนั้น)"
2003206-11 = "[ns] \"ไม่หนาวเหรอ?\""
2003206-12 = "― [log=에이미 수영복]หืม?[/log][wa:220] "
2003206-14 = "― [log=에이미 수영복]ไม่หนาวหรอก ไม่เป็นไร[/log][wa:1150] "
2003206-17 = "― [log=에이미 수영복]ตรงกันข้าม[/log][wa:960] "
2003206-19 = "― [log=에이미 수영복]ตอนนี้มันเย็นสบายกำลังดีเลยละ [/log][wa:520] "
2003206-22 = "― [log=에이미 수영복]อารมณ์ดีจัง...[/log][wa:1080] "
2003206-24 = "― [log=에이미 수영복]คุณครูก็ลงมาด้วยมั้ย?[/log]"
2003206-27 = "[ns] \"ขอปฏิเสธดีกว่า...\""
2003206-28 = "― [log=에이미 수영복]ฮืม~ งั้นก็ไม่เป็นไร[/log][wa:1680] "
2003206-31 = "― [log=에이미 수영복]แต่เดี๋ยวฉันจะขึ้นไป[/log][wa:1420] "
2003206-33 = "― [log=에이미 수영복]ช่วยรอหน่อยนะ คุณครู[/log][wa:1500] "
2003206-36 = "ฮ้า... สุดยอดไปเลย"
2003206-37 = "แต่ก็ยังขาดอะไรอยู่... กลับไปทำอ่างอาบน้ำที่บ้านดีมั้ยนะ จะได้สนุกกับการแช่น้ำเย็นที่บ้านได้ด้วย"
2003206-38 = "ถ้าทำแบบนั้น คงเหมือนได้อยู่บนสวรรค์ทุกวัน..."
2003206-39 = "[s] \"ถึงจะเป็นเอมิก็เถอะ แต่ถ้าอาบน้ำเย็นทุกวันจะเป็นหวัดเอานะ...\""
2003206-40 = "ไม่เป็นไรหรอกน่าคุณครู ฉันไม่เคยเป็นหวัดเพราะอากาศหนาวสักครั้งเลยนะ"
2003206-41 = "ดูสิ อุณหภูมิประมาณนี้ทำอะไรฉันไม่ได้..."
2003206-42 = "ฮะ..."
2003206-43 = "ฮัดชิ้ว!"
2003206-44 = "เอ๋?"
2003206-48 = "[ns] \"เอมิเป็นหวัดเข้าแล้ว!!\""
2003206-49 = "ไม่ใช่... ฉันแค่จามเฉยๆ เอง"
2003206-50 = "[s] \"ไม่หรอก! แบบนี้หวัดแน่นอน! เอมิเป็นหวัดแล้ว!\""
2003206-51 = "ก็บอกว่าแค่จามไง...!"
2003206-52 = "[s] \"ต่อให้เป็นเอมิ แต่ถ้าเจอความหนาวแบบนี้ก็ป่วยได้เหมือนกันนะเนี่ย...!\""
2003206-53 = "ไม่ใช่สักหน่อย แบบนี้น่ะหนาวกำลังดีเลยต่างหาก! แล้วฉันก็ไม่ได้เป็นหวัดด้วย"
2003206-55 = "(เอมิกับคุณครูกลับมาที่ค่ายด้วยกัน แต่ระหว่างทางก็ถกเถียงกันอย่างไม่มีใครยอมใคร)"
2003206-59 = "(ปกติเอมิเป็นคนไม่ชอบกินอะไรร้อนๆ แต่วันนี้กลับดื่มชาร้อนจนหมด)"

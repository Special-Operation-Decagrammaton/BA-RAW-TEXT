[translation]
2003206-1 = "Cold Bath"
2003206-2 = "I was assigned a mission in the Glacial Sea as part of a special operation."
2003206-3 = "I recalled how Eimi also had a mission there and decided to scope out the location she had mentioned."
2003206-6 = "And what did I find...?"
2003206-7 = "Ah, Sensei. Over here."
2003206-8 = "Eimi had dug a hole in the frozen waters then submerged herself in it."
2003206-11 = "[ns] \"What are you doing?! You'll freeze to death!\""
2003206-12 = "― [log=에이미 수영복]Hm?[/log][wa:260] "
2003206-14 = "― [log=에이미 수영복]I'm not cold. I'm just fine.[/log][wa:870] "
2003206-17 = "― [log=에이미 수영복]In fact,[/log][wa:1040] "
2003206-19 = "― [log=에이미 수영복]this temperature is absolutely perfect. [/log][wa:120] "
2003206-22 = "― [log=에이미 수영복]It's nice...[/log][wa:1160] "
2003206-24 = "― [log=에이미 수영복]Want to come in, Sensei?[/log]"
2003206-27 = "[ns] \"I'll pass...\""
2003206-28 = "― [log=에이미 수영복]Aww. All right.[/log][wa:1880] "
2003206-31 = "― [log=에이미 수영복]I'll be out in just a moment.[/log][wa:1060] "
2003206-33 = "― [log=에이미 수영복]So please be patient, Sensei.[/log][wa:1140] "
2003206-36 = "Haaa...that was the best."
2003206-37 = "I want to do that some more... Maybe I should make an ice bath in the tub when I get home."
2003206-38 = "Now that would be paradise."
2003206-39 = "[s] \"I think even you would catch a cold taking ice baths everyday...\""
2003206-40 = "It's fine, Sensei. I've never caught cold from just the weather."
2003206-41 = "Look...I'm perfectly fine even in this temperature..."
2003206-42 = "Aaa..."
2003206-43 = "Achoo!"
2003206-44 = "Huh?"
2003206-48 = "[ns] \"Never caught a cold, huh?!\""
2003206-49 = "No, never... That was just a sneeze."
2003206-50 = "[s] \"Nope! That's a cold! Eimi caught a cold!\""
2003206-51 = "It was just a sneeze!"
2003206-52 = "[s] \"This weather is too much, even for you!\""
2003206-53 = "No! It's lovely! I do not have a cold!"
2003206-55 = "We argued all the way back to base camp, neither of us backing down."
2003206-59 = "Eimi, who usually hates hot things, drank all of our hot tea that day."

[translation]
104100-1 = "第10話;尾聲（２）"
104100-3 = "大家，加油喔……！"
104100-4 = "唔唔……完，完全看不懂……"
104100-5 = "呵呵。雖然大家這次都表現得很活躍，卻也因此沒能好好準備考試呢。"
104100-6 = "啊啊。沒有一題能看得懂。#n但是，就算只是徒勞──"
104100-7 = "不是，就算抵抗也沒有意義吧！？#n這可是申論題啊！？"
104100-8 = "……嗯。"
104100-9 = "唔呵呵♡沒錯。#n看來「補課部」還會一直持續下去呢。"
104100-10 = "啊，啊嗚嗚……"
104100-12 = "那麼路上小心哦，沙醬。"
104100-13 = "但，但是……"
104100-14 = "就是說啊。怎麼能在「尋找自我」的途中放棄呢。"
104100-15 = "嘿嘿……沒錯。不能半途而廢哦。"
104100-16 = "……"
104100-17 = "沒關係的……沙醬還有很多想做的事和想看的東西對吧。"
104100-21 = "我們已經不再是那時候的孩子了……所以沒問題的。"
104100-22 = "……我知道了。"
104100-28 = "……雇主嗎？#n……沒錯，是我。"
104100-29 = "喂，頭盔團！！還不快點過來集合！！"
104100-30 = "那些傢伙……我要去懲罰那些傢伙！！#n你這次缺席的份，給我用無償勞動56小時補回來啊！！"
104100-31 = "什麼……！"
104100-32 = "便利屋的那些傢伙現在正──唔，唔啊啊！？"
104100-33 = "那，那是什麼！？快，快點過來！#n只要趕走那些傢伙，我就考慮付你最低時薪！！"
104100-34 = "之後還想要工作的話就動作快！！呃啊！？"
104100-35 = "……了解。我立刻過去。"
104100-39 = "大家……再會。"
104100-40 = "……看來你似乎很忙呢，那就好。"
104100-41 = "請，請偶爾也要聯絡我們哦，隊長……"
104100-42 = "一路順風，沙醬。"
104100-43 = "……嗯。"
104100-45 = "……"
104100-49 = "……保重身體啊，隊長。"
104100-51 = "唔嘿～茜香醬，再來一碗～"
104100-52 = "咦咦，還要嗎？"
104100-53 = "嗯嗯！得要讓辛苦的白子醬好好補充營養才行！"
104100-54 = "我已經飽了……"
104100-56 = "不～行！白子醬還能吃的吧。#n才剛經歷過那麼不得了的事情，得在能吃的時候多吃一點才行。"
104100-57 = "啊，啊哈哈……"
104100-58 = "是無所謂啦，不過拉麵的錢得要乖乖付哦！？#n啊，還有不可以用野乃美前輩的卡片哦！"
104100-59 = "……從茜香醬的時薪裡扣怎麼樣？"
104100-60 = "在說什麼啊！？別說傻話了！！"
104100-61 = "老闆，麻煩再來一碗～"
104100-66 = "哈啊……這餐就算我請的吧。大家都辛苦了。"
104100-67 = "那麼，就給各位小姐再來一碗巨無霸拉麵！"
104100-68 = "老，老闆！？這樣會虧錢的吧！？"
104100-69 = "哎呀～不愧是老闆。真大方呢～"
104100-70 = "哇～我要開動了☆#n當然我們還是會付錢的哦！"
104100-72 = "哎呀哎呀不用客氣。這種時候就該好好吃一頓才行啊！"
104100-76 = "啊哈哈……那我們就不客氣了。"
104100-77 = "嗯……"
104100-78 = "茜香醬也坐下來一起吃吧～#n茜香醬不在的話，大叔我可是會寂寞的哦～"
104100-79 = "別說傻話了！？我可是還在打工啊！？"
104100-80 = "沒關係的，茜香同學。反正今天很閒。"
104100-81 = "……是，是嗎？#n那，好吧……偶爾就……"
104100-82 = "來，茜香醬。#n這邊請坐☆"
104100-83 = "嗯，我旁邊也沒人。"
104100-87 = "唔嘿～茜香醬，你打算坐哪邊呢？#n白子醬旁邊？還是野乃美醬旁邊？"
104100-88 = "說不定……這個選項其實超級重要的唷？要謹慎選擇哦～"
104100-93 = "大叔的腿上這個選項，還真是沒料到呢～"
104100-94 = "少囉嗦！這次星野前輩也要好好反省！"
104100-95 = "真過分呢～得為大叔的腰著想才行呀……"
104100-96 = "啊哈哈……那，那我也坐在星野前輩旁邊……"
104100-97 = "哇☆那我要擠在星野前輩前面☆"
104100-98 = "嗯，那我坐後面。"
104100-99 = "前後左右都……誰，誰來救救我啊。#n大叔我被女高中生包圍了……"
104100-100 = "這樣下去的話，大叔就要……唔嘿～～～"
104100-103 = "好，我們到了哦！星奈醬。"
104100-104 = "這裡就是往後星奈醬生活的家！"
104100-105 = "那個……是。"
104100-106 = "那麼……請多多指教，彩奈前輩。"
104100-107 = "不對唷星奈醬！這種時候應該說那句台詞才對！"
104100-108 = "……那句台詞？"
104100-109 = "沒錯！！現在就該說那句台詞！星奈醬應該也很清楚才對唷！"
104100-110 = "……非說不可嗎？"
104100-111 = "（盯──）"
104100-112 = "……我知道了。"
104100-118 = "歡迎回來，星奈醬。"
104100-123 = "……我回來了，彩奈前輩。"
104100-128 = "辛苦了……琳前輩。"
104100-129 = "辛苦了，調停室長。"
104100-130 = "是……那，那個……"
104100-131 = "……沒關係的，步。#n在我的再信任投票結束之前，保持低調才是上策。不能再給步添麻煩了。"
104100-132 = "別這麼說……"
104100-134 = "就是呀，琳前輩。我們可是一起去過宇宙的關係哦？"
104100-135 = "……桃香。"
104100-136 = "嘛……雖然這次也想過要不要溜之大吉……#n不過事到如今，還是得關照一下琳前輩嘛～"
104100-137 = "呵呵……是呢，我也有同感。"
104100-138 = "……步，桃香。#n這麼說來，我還有話沒跟你們說呢。"
104100-143 = "……謝謝你們，願意跟隨我。"
104100-144 = "……！！"
104100-145 = "唔，唔哇啊……！？#n居然會有能看到琳前輩低頭的一天……"
104100-146 = "這是不祥的徵兆……明天一定會有槍從天而降……"
104100-147 = "桃，桃香醬……"
104100-149 = "……還有，之後也要受你們照顧了。#n還請多多指教。"
104100-150 = "……是！我也是，請多多指教。"
104100-151 = "好的好的。真沒辦法呢……請多指教～"
104100-153 = "啊……這麼說來。#n有一封寄給琳前輩的信。"
104100-154 = "……信？"
104100-155 = "是的。已經放在前輩桌上了……"
104100-156 = "信上沒有寫寄件人……為了以防萬一我稍微確認過了，似乎只是一般的信件。#n啊，內容我並沒有看！"
104100-157 = "……知道了，我會去確認的。"
104100-159 = "喵哈～老師，好久不見。"
104100-160 = "[s]「仁耶！」"
104100-161 = "哎呀～真是讓人不禁落淚的活躍表現呢。#n實在是太令人感動了！"
104100-162 = "[s]「謝謝你仁耶。仁耶也辛苦了。」"
104100-163 = "至於……老師。"
104100-164 = "那個……有件對我來說相當有趣──不對，很重要的事想請教……"
104100-165 = "[s]「嗯？怎麼了嗎？」"
104100-166 = "……老師全身赤裸在田野上奔跑，那是事實嗎？"
104100-170 = "[ns1]「……………………」\n[ns2]「不是，真的不是，那是誤會。」"
104100-173 = "……咦～？這就奇怪了呢。正確來說……是全身赤裸、沾滿灰塵，#n單手拿著平板帶著燦爛的笑容衝向學生們──這樣的目擊情報……"
104100-174 = "[s]「………………」"
104100-175 = "咳咳……算了，考量到老師的立場，我就不繼續追問下去了。"
104100-176 = "[s]「……你是為了問這件事才聯絡我的嗎？」"
104100-177 = "不不不。其實是忍術研究部傳來了聯絡。"
104100-178 = "啊，順帶一提，那些孩子們都平安回來了。"
104100-179 = "首先，已確認他們遇見了百花繚亂的副委員長。#n但是沒能確認葛葉是否真的是實際存在的人物……"
104100-180 = "不過收到了自稱葛葉的人所寫的信。"
104100-181 = "而且──是寫給「夏萊的老師」的信。#n嘛，姑且不論是否屬實。"
104100-182 = "雖然不確定內容為何，還是決定趕緊將資料送過來了。"
104100-183 = "[s]「謝謝你，仁耶。」"
104100-184 = "喵哈哈。希望能幫上忙～"
104100-185 = "下次請來百鬼夜行自治區一趟吧。#n最近即將舉辦有趣的慶典哦。"
104100-191 = "[ns] 閱讀仁耶傳來的信"
104100-194 = "呼呣，聽聞[USERNAME]老師正在尋找妾身……不，該說[ruby=・]準[/ruby][ruby=・]備[/ruby]尋找比較恰當吧。"
104100-195 = "無論如何，應該先告訴你結論── "
104100-196 = "讓因「色彩」而反轉之人恢復原狀的方法，並不存在。"
104100-197 = "那就和──無法讓死者重生一樣。#n是這個世界絕對的法則。"
104100-198 = "但即便如此……如果你還是有想要拯救的對象……"
104100-203 = "──就來見妾身吧。"
104100-208 = "……就是這封信嗎。"
104100-210 = "沒有寫寄件人……"
104100-211 = "內容是──"
104100-215 = "「給琳醬」"
104100-216 = "這是……"
104100-217 = "這個，筆跡……"
104100-218 = "……"
104100-222 = "聯邦學生會長……？"

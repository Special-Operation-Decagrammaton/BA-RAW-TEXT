[translation]
104100-1 = "Episode 10; Epilogue 2"
104100-3 = "Good luck, everyone!"
104100-4 = "Ugh...I-I don't know a single answer... Not one..."
104100-5 = "Heehee... Everyone's been so busy there was hardly any time to study for the test."
104100-6 = "Yes. I do not know any of these questions. But I will try my best. "
104100-7 = "It doesn't matter if you try your best! You can't even guess! They're all short answer! "
104100-8 = "...Yeah."
104100-9 = "Heehee. It appears so... I guess we'll have to have more supplementary classes."
104100-10 = "*sigh*"
104100-12 = "Take care, Saori."
104100-13 = "B-But..."
104100-14 = "Stop talking nonsense. You can't give up on yourself."
104100-15 = "Heeheehee... That's true. You shouldn't quit."
104100-16 = "..."
104100-17 = "It's okay. You have much to do and many things you want to see, Saori."
104100-21 = "Saori, we're no longer kids you need to take care of, so please go."
104100-22 = "...Fine."
104100-28 = "*beep beep* Boss. It's me."
104100-29 = "The Helmet Gangsters! Everyone gather here, now!"
104100-30 = "We're going to attack them! They gave our tires flats, so we'll make them provide free labor for fifty-six hours!"
104100-31 = "What?! Fifty-six hours...?!"
104100-32 = "Yeah! It's them! The Problem Solver agency is coming... Aaaak!"
104100-33 = "Wh-What's that?! Come here, quickly! If you take care of them, I'll consider paying you minimum wage!"
104100-34 = "If you want to keep getting work from me, hurry! Aaack!"
104100-35 = "...Okay. I'll go now."
104100-39 = "Okay, everyone."
104100-40 = "...So busy. Must be nice."
104100-41 = "Give us a call once in a while, Leader..."
104100-42 = "Have a safe trip, Saori."
104100-43 = "Yes."
104100-45 = "..."
104100-49 = "...Take care of yourself, Leader."
104100-51 = "Hey, Serika. Give me one more bowl."
104100-52 = "What? Another one?"
104100-53 = "For Shiroko too! She worked so hard, she needs to be well-fed."
104100-54 = "But I'm full..."
104100-56 = "Shiroko, no! Eat more! I feel like even I've lost some weight. You worked much harder, so you need to eat even more!"
104100-57 = "H-Haha... Guess so."
104100-58 = "That's all good, but...do you have money to pay for this ramen? And no! You can't use Nonomi's card!"
104100-59 = "I don't have any money, but we can just take it from Serika's pay!"
104100-60 = "What?! What are you talking about?!"
104100-61 = "Now, now, give us one more bowl, Master."
104100-66 = "Since everyone worked so hard, I'll pay for the meal."
104100-67 = "A bowl of special jumbo ramen for everyone!"
104100-68 = "What? M-Master, we'll be in a deficit for the day!"
104100-69 = "Hey! Master, you're so very generous!"
104100-70 = "Wow, thank you! But I'll pay for it!"
104100-72 = "No, don't worry about it. We should all eat well at times like these."
104100-76 = "Oh, okay... Thank you."
104100-77 = "H-Hm..."
104100-78 = "Serika, you should come sit with us and eat too. I get lonely when you're not around."
104100-79 = "What are you talking about?! I'm on the clock right now!"
104100-80 = "It's okay, Serika. Things are slow today anyhow."
104100-81 = "Well... Should I? I guess it's just this one time, so it'll be okay..."
104100-82 = "Yes, Serika, come sit."
104100-83 = "The seat next to me is empty!"
104100-87 = "Ha! Serika, where are you going to sit? Next to Shiroko or Nonomi?"
104100-88 = "You know, this may be a defining moment in your life. Choose carefully!"
104100-93 = "Ack! Sitting on my lap is not one of your choices!"
104100-94 = "Oh, be quiet. The only correct choice is one that will make Hoshino suffer!"
104100-95 = "Oh. Ugh... You should consider my bad back..."
104100-96 = "Haha... Then I'll sit next to Hoshino..."
104100-97 = "Wow! ☆ Then I'll sit closer to Hoshino."
104100-98 = "I'll sit in the back."
104100-99 = "Front?! Back?! What's this? I'm surrounded by scary underclassmen..."
104100-100 = "At this rate... Aaahhh...!"
104100-103 = "Yay! I'm back, Plana."
104100-104 = "Plana, this is the home you'll be staying at from now on!"
104100-105 = "Umm, hmm. Okay."
104100-106 = "...Thank you, Arona."
104100-107 = "No, Plana! We talked about this! Say the line!"
104100-108 = "....The line?"
104100-109 = "Yes! You know! This is the perfect time!"
104100-110 = "...Do I really have to say it?"
104100-111 = "(intense stare)"
104100-112 = "...Yes."
104100-118 = "Come on, Plana! Please?"
104100-123 = "...I'm home, Arona."
104100-128 = "Great job...Rin."
104100-129 = "Great job, Chief of Staff."
104100-130 = "...Yes, s-so..."
104100-131 = "...No, Ayumu. Until a vote of no confidence against me has concluded...I will lay low. I can't let harm come to you again."
104100-132 = "What do you... Again? You didn't..."
104100-134 = "You're way too much, Rin! I mean, we went to space together!"
104100-135 = "...Momoka."
104100-136 = "Well, I wanted to run away again, but...seeing how things turned out, I guess I have no choice but to have Rin's back."
104100-137 = "Haha. To the ends of the universe, right?"
104100-138 = "...Ayumu, Momoka. Come to think of it, I never did tell you."
104100-143 = "...Thank you for staying by my side."
104100-144 = "R-Rin?"
104100-145 = "Whoa... I got a direct thank you from our Rin?!"
104100-146 = "This is a bad sign... There must be some kind of problem... Disaster is about to befall us..."
104100-147 = "M-Momoka..."
104100-149 = "...It looks like I'll continue leaning on you both for support. I look forward to it."
104100-150 = "Yes! Me too!"
104100-151 = "Ah, well! I guess if I have to... Heh. "
104100-153 = "Oh! Rin, a letter arrived for you."
104100-154 = "...A letter?"
104100-155 = "Yes, I put it on your desk."
104100-156 = "It didn't have a return address, so I inspected it for security's sake. But it's just a normal letter. Oh! I didn't read any of it though."
104100-157 = "Thank you. I'll take a look at it."
104100-159 = "Hahaha. It's been a long time, Sensei."
104100-160 = "[s] \"Niya!\""
104100-161 = "Schale's performance blew me away. It was a sight that induced tears. It was truly amazing!"
104100-162 = "[s] \"Thank you. You worked hard too, Niya.\""
104100-163 = "And so... Sensei..."
104100-164 = "This...is something very fun...I mean important to me."
104100-165 = "[s] \"Huh? What is it?\""
104100-166 = "...Is it true that you ran through a field naked...?"
104100-170 = "[ns1] \"...\"\n[ns2] \"No, it's not true. Really, it's a misunderstanding!\""
104100-173 = "...I heard you were running towards people while naked and covered in dust and ash, and you were holding a tablet PC, and there was a smile on your face. From multiple witnesses."
104100-174 = "[s] \"...\""
104100-175 = "...Hmm, perhaps we shouldn't delve into this anymore for the sake of Sensei's reputation. Nyahaha."
104100-176 = "[s] \"...You contacted me to ask that?\""
104100-177 = "No, actually, it was because of the news from the Ninjutsu Research Club."
104100-178 = "Ah, they all returned safely, for your information."
104100-179 = "And they confirmed that they met the vice president of Hyakkaryouran... Though they couldn't confirm Kuzunoha's existence..."
104100-180 = "They did bring back a letter from someone claiming to be Kuzunoha."
104100-181 = "It was supposedly addressed to Schale's Sensei. Could be true, could be a trick."
104100-182 = "I haven't read it yet, but I'll send it over to you."
104100-183 = "[s] \"Thanks, Niya.\""
104100-184 = "Nyahaha. Of course. I hope it's helpful."
104100-185 = "Please be sure to stop by the Hyakkiyako district next time. We're planning a fun festival."
104100-191 = "[ns] Read the text of the letter sent by Niya."
104100-194 = "You were looking for me, Sensei [USERNAME]? Well, I guess it's more accurate to say you were planning on looking for me."
104100-195 = "Anyways, if I were to get to the point..."
104100-196 = "There's no way to restore an existence reversed by the Chroma to its original state."
104100-197 = "It's a natural rule of this world, just as how the dead cannot be brought back to life."
104100-198 = "But...if you still want to rescue someone..."
104100-203 = "...Come see me, Sensei."
104100-208 = "Is this the letter?"
104100-210 = "There really is no return address. "
104100-211 = "Let's see..."
104100-215 = "\"To Rinny.\""
104100-216 = "...Th-This."
104100-217 = "This handwriting..."
104100-218 = "..."
104100-222 = "The Student Council president...?"

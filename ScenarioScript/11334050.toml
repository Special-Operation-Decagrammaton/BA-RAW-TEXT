[translation]
11334050-1 = "#N-04"
11334050-3 = "พวกเราจะได้ทำอะไรด้วยกันแบบนี้ทีอีกเมื่อไรกันนะ"
11334050-4 = "ต้องถ่ายรูปเก็บไว้เป็นที่ระลึกให้มากกว่านี้แล้วละ..."
11334050-8 = "เดี๋ยวนะ..."
11334050-9 = "ถ้าเราหมกมุ่นกับการถ่ายรูปมากเกินไป เวลาที่เราจะดื่มด่ำกับสิ่งที่อยู่ตรงหน้าก็จะยิ่งน้อยลงไปด้วย"
11334050-10 = "เราถ่ายไปเท่าที่ควรแล้วละ จากนี้ไปก็แค่..."
11334050-11 = "ใช้หูกับตาบันทึกช่วงเวลานี้ไว้ในความทรงจำแล้วกัน"

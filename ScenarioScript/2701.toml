[translation]
2701-1 = "#title;체포하겠습니다! 1"
2701-2 = "#place;발키리 경찰학교 <생활안전국> 사무실"
2701-3 = "#na;(볕이 따스히 내리쬐는 여느 한가로운 오후 한때.)"
2701-4 = "3;후부키;02;하아…… 여유롭네, 여유로워…….\n#3;em;…\n#3;a"
2701-5 = "3;후부키;00;오늘은 특별한 사건도 없고, 도움이 필요하다는 민원인도 없고…… #n덕분에 이렇게 근무시간 중에도 낮잠을 잘 수 있으니 천국이 따로 없구나~"
2701-6 = "3;후부키;99;키보토스가 매일 이렇게 평화로웠으면 좋겠다……."
2701-7 = "5;키리노;08;그건 안 돼요!\n#5;al\n#3;m1\n#5;hophop"
2701-8 = "3;후부키;01;으응? 평화로운 게 싫다니. 그게 무슨 소리야, 키리노?\n#3;em;[?]"
2701-9 = "3;후부키;02;그 말인즉 매일 악당들이 범죄를 일으키고, 학생들 간의 싸움이 끊이질 않아서 키보토스가 언제나 혼란에 휩싸여 있었으면 좋겠다는 거야?"
2701-10 = "3;후부키;00;키리노도 참, 악당 같은 구석이 있네.\n#3;em;[음표]"
2701-11 = "5;키리노;09;물론 혼란스러운 게 좋다는 건 아니지만…….\n#5;em;[땀]\n#5;stiff"
2701-12 = "5;키리노;05;그래도 평화가 계속되면 저희가 활약할 수 있는 기회가 없어지잖아요!"
2701-13 = "5;키리노;08;그럼 발키리 경찰학교의 높으신 분들께 저희의 진가를 보여드릴 수도 없을 테고…… 저희는 전과할 기회도 얻지 못한 채 계속 이 생활안전국에서 지내야 한다고요!\n#5;em;[!]"
2701-14 = "3;후부키;00;나는 좋은데, 생활안전국."
2701-15 = "3;후부키;03;생활안전국에는 위험한 일도, 귀찮은 사건도 내려오지 않잖아? 여기서는 안전한 게 제일이라구.\n#3;em;[음표]"
2701-16 = "5;키리노;05;그 점이 싫은 거라고요!\n#5;hophop\n#5;m3\n#3;dl"
2701-17 = "5;키리노;06;멋지게 범죄자를 제압하는 경찰의 모습을 동경해서 발키리 경찰학교에 왔는데, 하는 일이라고는 미아가 된 아이를 보호하거나 건널목에서 교통 정리를 하는 것 뿐이니…….\n#5;stiff\n#5;em;[속상함]\n#3;hide"
2701-18 = "5;키리노;09;물론 이것도 중요하고 보람찬 일이긴 하지만!"
2701-19 = "5;키리노;08;미아가 된 아이를 무사히 찾아주고 감사 인사를 받을 때는 형언할 수 없는 만족감까지 느껴지지만! #n이것만으로는 부족하다고요!\n#5;em;[!]"
2701-20 = "1;후부키;00;키리노는 기운도 넘치는구나.\n#1;em;[음표]\n#1;ar\n#5;m5"
2701-21 = "1;후부키;99;나는 나이가 들어서 그런가, 오후가 되면 움직일 기운조차 다 빠져버리는데……."
2701-22 = "5;키리노;05;후부키도 저와 같은 1학년이잖아요. 좀 더 의욕을 내서 팍팍 움직이자고요!\n#5;em;[반응]"
2701-23 = "1;후부키;00;너무 그렇게 초조해 하지 마. 1학년이라는 건 다시 말하자면 아직 활약할 시간이 잔뜩 남아있다는 뜻이기도 하잖아?"
2701-24 = "1;후부키;02;혹시 또 알아. 우리의 도움이 필요한 큰 사건이 곧 벌어질지도—.\n#1;em;…"
2701-25 = "#wait;1500"
2701-26 = "#na;긴급 출동! 긴급 출동! 경비국 인원들은 지금 즉시 무장을 챙겨 3거리 2번가의 도넛 가게로 출동할 것! 다시 한번 알림! 경비국 인원들은 지금 즉시……."
2701-27 = "1;후부키;08;……말이 씨가 된다더니 정말이네."
2701-28 = "1;후부키;02;그나저나 2번가 골목의 도넛 가게라면 <마스터 도너츠>를 말하는 건가? 그 가게의 올드 패션드는 맛있는데.\n#1;em;[반응]"
2701-29 = "5;키리노;09;경비국에 연락해서 무슨 일인지 알아봐야 겠어요!"
2701-30 = "5;키리노;09\n#5;m3\n#1;dl\n#wait;1200"
2701-31 = "5;키리노;09\n#5;greeting\n#wait;1000"
2701-32 = "5;키리노;05;국장님, 생활안전국의 키리노입니다!\n#5;em;[!]"
2701-33 = "#na;경비국장;응, 키리노? 무슨 일이야. 우리는 지금 출동 준비 때문에 바쁘다고."
2701-34 = "5;키리노;08;방금 긴급 출동 명령이 내려왔는데, 도넛 가게에 무슨 일이라도 있었습니까?"
2701-35 = "#na;경비국장;대단치도 않은 일이야. 좀도둑 하나가 도넛 가게에 침입해서 마스터를 인질로 잡고 금품을 요구하고 있나 봐."
2701-36 = "#na;경비국장;그런데 어차피 너희들은 생활안전국이니 출동할 필요도 없—."
2701-37 = "#st;[0,0];instant;1;"
2701-38 = "#clearST"
2701-39 = "5;키리노;05\n#5;greeting\n#wait;2000"
2701-40 = "5;키리노;08;후부키, 출동이에요! #n경비국 인원들보다 먼저 현장에 가서 악당들을 물리치고 저희의 진가를 보여주는 거예요!\n#5;closeup\n#fontsize;80"
2701-41 = "5;키리노;08\n1;후부키;04;으에—? 귀찮은데…….\n#1;em;[땀]\n#1;ar\n#5;m5"
2701-42 = "1;후부키;05;게다가 생활안전국에는 제대로 된 진압 도구도 없잖아? 자칫하다가는 무장한 인질범들에게 역으로 당해버릴지도 모른다고."
2701-43 = "1;후부키;00;그냥 이번 일은 경비국의 학생들에게 맡기고 우리는 쉬는 게 어떨까?\n#1;em;[?]"
2701-44 = "5;키리노;05;이러는 순간에도 인질로 잡힌 선량한 시민은 공포에 떨고 있을 거라고요! 생활안전국이니 경비국이니 소속을 따질 때가 아니에요!\n#5;em;[!]"
2701-45 = "5;키리노;01;그리고 이번 사건을 성공적으로 해결하면 높으신 분들께 특별 포상을 받을 수 있을지도 몰라요. 예를 들자면…… 포상 휴가라든가?"
2701-46 = "1;후부키;02;포상 휴가라…… 그건 매력적인 제안인걸…….\n#1;em;…"
2701-47 = "1;후부키;00;할 수 없지. 대신 상황이 위험해 보이면 나는 바로 도망칠 거야."
2701-48 = "5;키리노;00;걱정 마세요, 그 어떤 불한당이 오더라도 정의는 절대로 패배하지 않으니까요!\n#5;greeting\n#5;em;[반짝]"

[translation]
2701-1 = "我要逮捕你！（１）"
2701-2 = "女武神警察學園．生活安全局"
2701-3 = "（溫暖陽光灑落的某個悠閒午後）"
2701-4 = "哈啊……真閒。真閒啊……"
2701-5 = "今天沒有事件發生，也沒有人來陳情……#n幸虧如此才能在勤務中睡午覺，根本就是天國～"
2701-6 = "要是奇普托斯每天都能這麼和平就好了……"
2701-7 = "那可不行！"
2701-8 = "嗯？不行和平是什麼意思啊，桐乃？"
2701-9 = "你的意思是希望每天都有惡徒犯罪、學生之間紛爭不斷、奇普托斯處於混亂當中嗎？"
2701-10 = "桐乃真是的，居然有像壞人的一面呢。"
2701-11 = "不，不是的，我當然也不希望發生混亂……"
2701-12 = "但是，如果和平就這樣持續下去的話，就沒有我們能活躍的機會了！"
2701-13 = "這樣就無法向女武神警察學園的高層展現我們的實力……！#n也就無法獲得轉調的機會，只能一直待在這個生活安全局了！"
2701-14 = "我倒是挺喜歡的呀？這個生活安全局。"
2701-15 = "生活安全局完全不會有危險的事或麻煩的事件不是嗎？安心安全是最重要的唷。"
2701-16 = "就是這點不行！"
2701-17 = "帥氣地壓制犯罪者……我明明是嚮往那種警察的英姿才會來女武神警察學園的，#n但實際的工作卻只有保護迷路的兒童，或是在巷口指揮交通……"
2701-18 = "當然這也是很重要且有價值的工作！"
2701-19 = "平安將迷路的孩子送回家，受到感謝的時候也能獲得難以言喻的滿足感！#n但是……光是這樣還不夠！"
2701-20 = "桐乃真是充滿幹勁呢。"
2701-21 = "不像我一到了下午就渾身無力……"
2701-22 = "吹雪和我一樣都是1年級不是嗎？多打起精神，好好動一動吧！"
2701-23 = "哎呀，不用那麼急。是1年級這點換個角度思考的話，不也是還有很多時間能活躍的意思嗎？"
2701-24 = "搞不好馬上就會發生需要我們幫助的大事件也說不定唷──"
2701-26 = "緊急出動！緊急出動！警備局的所有人員立刻帶好武裝，前往3丁目2號街的甜甜圈店！重複一次！警備局的所有人員現在立刻──"
2701-27 = "……一語成讖這句話是真的呢。"
2701-28 = "說到2號街的甜甜圈店，難道是「MasterDonut」嗎？那裡的歐菲香還挺好吃的說。"
2701-29 = "我來聯絡警備局，問問發生什麼事了！"
2701-32 = "局長，我是生活安全局的桐乃！"
2701-33 = "是桐乃啊。怎麼了，我們正忙著準備出動呢。"
2701-34 = "剛才下達了緊急出動命令，甜甜圈店發生什麼事了嗎？"
2701-35 = "雖然是緊急命令，但其實也不是什麼大事件。似乎是有一名歹徒闖入甜甜圈店，挾持老闆當人質並要求值錢東西的樣子。"
2701-36 = "不過，你們生活安全局沒必要出動。就這樣在──"
2701-40 = "吹雪，該出動了！#n比警備局的人更早抵達現場並擊敗惡徒，展現我們真正的價值吧！"
2701-41 = "咦咦？好麻煩……"
2701-42 = "而且生活安全局沒什麼像樣的裝備不是嗎？稍有不慎的話，反而會被武裝的犯人打倒的哦？"
2701-43 = "這次的事件就乖乖交給警備局的學生們，我們就好好休息，怎麼樣？"
2701-44 = "就在此時此刻，被當成人質的無辜市民也正因恐懼而顫抖著！現在不是計較自己是隸屬生活安全局還是警備局的時候了！"
2701-45 = "況且，要是能解決事件的話，高層說不定會給些獎勵唷。#n比如……特休之類的！"
2701-46 = "……特休啊。確實是個很有魅力的提案……"
2701-47 = "唉，真沒辦法。不過，要是情況很危險的話，我會立刻逃跑的哦。"
2701-48 = "請別擔心，無論是什麼對手，正義都絕對不會輸的！"

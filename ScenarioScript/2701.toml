[translation]
2701-1 = "จะจับกุมแล้วนะคะ! 1"
2701-2 = "ห้อง <สำนักรักษาความปลอดภัย> สถาบันฝึกตำรวจวัลคิรี่"
2701-3 = "(ในบ่ายวันที่อากาศอบอุ่นวันหนึ่ง)"
2701-4 = "ฮู่ว... ผ่อนคลาย ผ่อนคลาย..."
2701-5 = "วันนี้ไม่มีคดีพิเศษ ชาวเมืองที่ต้องการความช่วยเหลือก็ไม่มีด้วยเหมือนกัน... ทำให้ฉันมีเวลามาหลับกลางฝันในเวลางานแบบนี้ สวรรค์จริงๆ เลย~"
2701-6 = "ถ้าคิโวทอสสงบสุขแบบนี้ทุกวันก็คงดี..."
2701-7 = "แบบนั้นไม่ได้เด็ดขาดค่ะ"
2701-8 = "หือ? ไม่อยากให้สงบสุขเหรอ พูดอะไรน่ะ คิริโนะ?"
2701-9 = "จะบอกว่าเธออยากให้คิโวทอสตกอยู่ในความวุ่นวาย มีพวกตัวร้ายก่ออาชญากรรมทุกวัน และพวกนักเรียนต่อสู้ไม่ขาดสายเหรอ?"
2701-10 = "คิริโนะก็มีด้านมืดอยู่สินะ"
2701-11 = "มันก็ต้องแน่นอนอยู่แล้วว่าฉันไม่ได้บอกว่าความวุ่นวายเป็นเรื่องดี แต่ว่า..."
2701-12 = "แต่ถ้าสงบสุขตลอดไป พวกเราก็ไม่ได้ทำงานน่ะสิคะ!"
2701-13 = "แบบนั้นมันก็จะไม่ได้แสดงให้เจ้าหน้าที่ระดับสูงของสถาบันฝึกตำรวจวัลคิรี่เห็นคุณค่าที่แท้จริงของเรา... พวกเราก็จะต้องอยู่ที่สำนักรักษาความปลอดภัยต่อไป แม้ว่าจะมีโอกาสย้ายก็ตามนะคะ!"
2701-14 = "ฉันน่ะ ชอบสำนักรักษาความปลอดภัย"
2701-15 = "ที่สำนักรักษาความปลอดภัยมันไม่มีงานอันตราย และก็ไม่มีคดีที่น่ารำคาญใช่ไหมล่ะ? ที่นี่น่ะปลอดภัยที่สุดแล้ว"
2701-16 = "นั่นแหละที่ฉันไม่ชอบค่ะ!"
2701-17 = "ฉันชื่นชมตำรวจที่ปราบอาชญากรถึงได้มาที่สถาบันฝึกตำรวจวัลคิรี่แห่งนี้ แต่งานที่ฉันได้ทำมีแค่ดูแลเด็กหลงทางและจัดการการจราจรที่ทางข้าม..."
2701-18 = "แน่นอนว่ามันเป็นงานสำคัญ และน่าภูมิใจมาก แต่ว่า!"
2701-19 = "ตอนที่ตามหาเด็กหลงทางพบและได้รับคำขอบคุณ ฉันก็รู้สึกยินดีอยู่ แต่เท่านี้มันยังไม่พอหรอกนะคะ!"
2701-20 = "คิริโนะมีพลังเยอะนี่เนอะ"
2701-21 = "ฉันอายุขนาดนี้แล้วนะ พอบ่ายโมงก็ไม่มีแรงพอจะขยับตัวแล้ว..."
2701-22 = "ฟุบุกิเองก็อยู่ปี 1 เหมือนฉันไม่ใช่เหรอคะ มาขยับตัวอย่างกระฉับกระเฉงกันเถอะค่ะ!"
2701-23 = "อย่าให้มันวุ่นวายขนาดนั้นเลย ถ้าเป็นปี 1 ก็แสดงว่ายังมีเวลาเหลือพอให้ใช้ชีวิตใช่ไหมล่ะ?"
2701-24 = "ใครจะไปรู้ล่ะ ไม่แน่ว่าอาจจะมีคดีที่เราต้องไปช่วยเหลือเกิดขึ้นก็ได้นะ"
2701-26 = "ปฏิบัติการฉุกเฉิน! ปฏิบัติการฉุกเฉิน! สมาชิกสำนักความมั่นคงเตรียมอาวุธให้พร้อมและไปที่#nร้านโดนัทในบล็อกที่ 3 ถนนสายที่ 2 ทันที! ขอย้ำอีกครั้ง! สมาชิกสำนักความมั่นคง..."
2701-27 = "...พูดยังไม่ทันขาดคำเลย"
2701-28 = "ว่าแต่ร้านโดนัทตรงถนนสายที่ 2 คือ <มาสเตอร์โดนัท> ใช่มั้ย? โดนัทแบบดั้งเดิมของร้านนั้นอร่อยมากเลย"
2701-29 = "ฉันจะติดต่อสำนักความมั่นคงไปสอบถามว่าเกิดอะไรขึ้นค่ะ!"
2701-32 = "หัวหน้ากรมฯ คันนะ ฉันคิริโนะจากสำนักรักษาความปลอดภัยค่ะ!"
2701-33 = "หือ คิริโนะเหรอ? มีอะไรรึ? ตอนนี้พวกเรากำลังยุ่งกับการเตรียมปฏิบัติการ"
2701-34 = "เมื่อสักครู่ฉันได้ยินว่ามีคำสั่งให้ปฏิบัติการฉุกเฉิน เลยอยากทราบว่าเกิดอะไรขึ้นกับร้านโดนัทน่ะค่ะ?"
2701-35 = "ไม่ใช่เรื่องใหญ่อะไรหรอก น่าจะมีโจรกระจอกคนหนึ่งบุกเข้าไปในร้านโดนัท และจับเจ้าของร้านเป็นตัวประกันเพื่อเรียกเงินน่ะ"
2701-36 = "แต่พวกเธอเป็นสมาชิกสำนักรักษาความปลอดภัย พวกเธอไม่ต้องออกปฏิบัติการด้วย..."
2701-40 = "ฟุบุกิ ออกปฏิบัติการค่ะ! เราจะไปให้ถึงที่เกิดเหตุก่อนสมาชิกสำนักความมั่นคง#nและจับตัวคนร้ายมา จะได้ให้ทางนั้นเห็นคุณค่าที่แท้จริงของพวกเราค่ะ!"
2701-41 = "เอ๋...? ไม่เอาด้วยหรอก..."
2701-42 = "อีกอย่าง สำนักรักษาความปลอดภัยไม่มีอุปกรณ์ปราบปรามที่เหมาะสมด้วยไม่ใช่เหรอ? ถ้าพลาดขึ้นมา อาจจะโดนโจรเรียกค่าไถ่ติดอาวุธทำร้ายเอาก็ได้นะ"
2701-43 = "งานนี้ปล่อยให้เป็นหน้าที่ของนักเรียนสำนักความมั่นคง แล้วพวกเราก็ไปพักผ่อนกันดีกว่ามั้ย?"
2701-44 = "ในช่วงเวลาเช่นนี้ที่ประชาชนบริสุทธิ์ถูกจับเป็นตัวประกันกำลังตกอยู่ในความหวาดกลัว! นี่ไม่ใช่เวลาที่มาแบ่งว่าเป็นสำนักรักษาความปลอดภัยหรือสำนักความมั่นคงนะคะ!"
2701-45 = "และถ้าเราแก้ไขคดีนี้ได้สำเร็จ เราอาจจะได้รับรางวัลพิเศษจากเจ้าหน้าที่ระดับสูงก็ได้นะคะ ยกตัวอย่างเช่น... รางวัลเป็นวันหยุดก็ได้นะ?"
2701-46 = "รางวัลเป็นวันหยุด... ข้อเสนอนั่นน่าสนใจมาก..."
2701-47 = "งั้นก็ช่วยไม่ได้ ถ้าดูแล้วสถานการณ์อันตราย ฉันจะวิ่งหนีไปเลยนะ"
2701-48 = "ไม่ต้องกังวลไปหรอกค่ะ ไม่ว่าจะโจรแบบไหน ความยุติธรรมจะไม่พ่ายแพ้ให้แน่นอนค่ะ!"

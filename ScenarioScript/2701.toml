[translation]
2701-1 = "You're Under Arrest! Part 1"
2701-2 = "Valkyrie Public Safety Bureau"
2701-3 = "On a leisurely afternoon under the warm sun..."
2701-4 = "*sigh* Relaxing. So relaxing..."
2701-5 = "There are no open cases or special requests today at all. I can even nap while I'm on the clock. This is heaven!"
2701-6 = "I wish Kivotos could be this peaceful every day..."
2701-7 = "No, that can't happen!"
2701-8 = "Huh? Do you not like peace, Kirino?"
2701-9 = "Are you saying that you want Kivotos to always be in chaos, with villains committing crimes every day and the students constantly fighting amongst themselves?"
2701-10 = "You can be so evil sometimes, Kirino..."
2701-11 = "Of course that's not what I'm saying."
2701-12 = "But there wouldn't be anything for us to do if it were always peaceful."
2701-13 = "We wouldn't be able to show our worth to the police school higher-ups, and we'd have to stay in the Public Safety Bureau with no hopes of ever being promoted!"
2701-14 = "I like the Public Safety Bureau."
2701-15 = "It doesn't receive any dangerous or troublesome cases. All we have to do is keep the peace."
2701-16 = "That's my LEAST favorite thing about it!"
2701-17 = "I came to Valkyrie Police School because I wanted to catch bad guys like the cops I admired. But all I'm doing is helping lost children and directing traffic at crosswalks."
2701-18 = "I know it's important work and has its own merits."
2701-19 = "And it does feel indescribably good to be thanked by a lost child, but still! It's not enough for me!"
2701-20 = "You really are a busybody, Kirino."
2701-21 = "Maybe it's because I'm getting older, but I always run out of energy for this job by the afternoon."
2701-22 = "But you're a first-year just like me, Fubuki! You need to get on your feet and be more enthusiastic!"
2701-23 = "Don't be so anxious. You said it yourself: We're first-years, so we still have plenty of time to prove our worth."
2701-24 = "You never know. There might be a major case that needs our help soon—"
2701-26 = "Emergency dispatch! All Security Bureau personnel to arms. Head to the donut shop on 2nd Avenue and 3rd Street! I repeat! All Security Bureau to arms..."
2701-27 = "I was nearly about to blame my big mouth, but that's not us."
2701-28 = "And the donut shop on 2nd Avenue... Do they mean Master Donuts? That place is a classic."
2701-29 = "I'm going to call the Security Bureau to find out what's going on!"
2701-32 = "Director, this is Kirino from the Public Safety Bureau!"
2701-33 = "Yes, Kirino? What's the matter? We're busy preparing for dispatch."
2701-34 = "I just heard the emergency call. Did something happen at the donut shop?"
2701-35 = "It's not a big deal. A petty thief is holding the place up and demanding money."
2701-36 = "Your department doesn't have anything to worry—"
2701-40 = "Let's go, Fubuki! We have to get there before the Security Bureau and stop the criminal so we can prove our worth!"
2701-41 = "Huh? But I don't wanna..."
2701-42 = "Plus, we aren't even equipped to handle something like that—literally. We don't have the weapons, so if something goes wrong, we're going to be taken hostage too."
2701-43 = "Why not just leave it to them so we can kick back and relax?"
2701-44 = "Innocent civilians are being held hostage as we speak! Now isn't the time to argue about whether it's the responsibility of the Public Safety Bureau or the Security Bureau!"
2701-45 = "And we may even receive a commendation from the higher-ups if we solve this case! Or better yet...maybe more vacation days?"
2701-46 = "Vacation days? Now you're talking my language."
2701-47 = "Fine. But I'm hightailing it out of there if the situation gets too dangerous."
2701-48 = "Don't worry. Justice will always prevail no matter who stands in the way!"

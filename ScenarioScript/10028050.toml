[translation]
10028050-1 = "第5話;開往地獄的特快車"
10028050-10 = "那個……"
10028050-11 = "雖然我覺得不太可能……"
10028050-12 = "但……"
10028050-13 = "老師和那個三一實現正義部的傢伙……"
10028050-14 = "「答應和恐怖份子協商」之類的事……應該不會發生吧？"
10028050-15 = "哈～哈哈哈！！伊織醬啊～伊織醬～"
10028050-16 = "你是因為不知道這裡面裝了什麼，所以才能說得一派輕鬆。"
10028050-17 = "這裡面的東西可大有來頭……是三一的「校寶」哦？"
10028050-18 = "光聽到這兩個字……"
10028050-32 = "就知道它足以影響三一這龐大學園的政治。"
10028050-33 = "……咦？三一的校寶……？"
10028050-34 = "那種東西怎麼會在這裡……"
10028050-35 = "好了好了！不用把事情搞得那麼複雜～"
10028050-36 = "既然事已至此，我們大家何不坦率一點呢？#n或許充滿希望的結局意外的近在眼前哦？"
10028050-37 = "伊織只要把列車停下來，將車上的乘務員和幫派分子抓走就行了吧？#n那不是你原本的目標嗎？"
10028050-38 = "像我這種人就算今天不抓，之後也有的是機會～#n不如說那是你們平時的樂趣吧？"
10028050-39 = "而三一的小姑娘只要帶著這個公文包，在下一站安安穩穩地下車就行了。"
10028050-40 = "至於我嘛……"
10028050-41 = "我的話……各位只要別在意我就行了。#n我會自己從各位眼前消失。"
10028050-42 = "都聽清楚了吧？我們沒必要在這裡大打出手～明白我的意思嗎？"
10028050-43 = "各位只要裝作沒看見偶然坐上同一班車的我就行了……就是這麼簡單。"
10028050-44 = "大家又不是第一天出來混，何必把事情鬧僵……"
10028050-45 = "人生不如意事，十之八九──大家心裡都明白吧？"
10028050-46 = "怎麼樣，伊織？#n今天就在這裡各自解散如何……？"
10028050-47 = "感覺……"
10028050-48 = "……還不壞吧？"
10028050-49 = "說什麼鬼話！！#n沒看到也就算了，都已經看到了還要我睜一隻眼閉一隻眼？"
10028050-50 = "而且三一的事和我一點關係都沒有！！#n對現在的我來說，做好自己的工作才是最重要的！"
10028050-54 = "…………"
10028050-55 = "……呼……"
10028050-56 = "[s1]「……？？？」\n[s2]「一花……？」"
10028050-60 = "嗯～是嗎？是這樣嗎～？"
10028050-61 = "那是風紀委員會的……不，是伊織的立場吧～？"
10028050-62 = "不管你怎麼說，既然現在公文包在我手上……"
10028050-63 = "那麼三一的人和老師也只能乖乖聽我的話～對吧，小姑娘～？"
10028050-64 = "…………"
10028050-65 = "別讓我一直重複同樣的話！#n這完全是兩回事！而且跟我們無關！！"
10028050-66 = "而且我也沒說要把誰關起來吧？#n只是跟我們回去調查一下情況，有什麼好不滿的！？"
10028050-67 = "…………"
10028050-68 = "是是是。那你就好好看清楚這位朋友會怎麼選擇吧？#n他肯定會為了這個茶壺還是尿壺而對你開槍的。"
10028050-69 = "對吧？我們實現正義部的……什麼來著？"
10028050-70 = "……二花醬？"
10028050-71 = "總之這東西無論如何都不能損壞對吧？"
10028050-72 = "…………"
10028050-73 = "啊──！！真是夠了！！#n從剛才就一直公文包公文包的說個不停！"
10028050-74 = "…………"
10028050-75 = "那個公文包到底有什麼了不起的……！！"
10028050-86 = "……哦！"
10028050-87 = "哈哈……"
10028050-88 = "啊哈！啊哈哈哈！！"
10028050-89 = "哈～哈哈哈！！！！"
10028050-90 = "看吧，看吧！我剛才不是說過很多次了嗎？"
10028050-91 = "哎呀～伊織醬啊伊織醬～我愚蠢的伊織醬～！！"
10028050-92 = "為什麼專挑打不贏的架打呢～#n最後贏的人一定是我啊？"
10028050-93 = "因為那個人啊～"
10028050-94 = "在拿到這個公文包之前，絕對只能對我言聽計從──"
10028050-100 = "唔唔……！？"
10028050-112 = "[ns]「……」"
10028050-114 = "[ns]「……！？！？！？！？」"
10028050-118 = "…………啊。"
10028050-119 = "……還是開槍了。"
10028050-120 = "哈哈……該怎麼說呢。"
10028050-121 = "抱歉～！因為覺得有點煩躁，一時沒忍住～"
10028050-122 = "忍住……那個……嗯～"
10028050-126 = "……哈哈！"
10028050-127 = "[ns3]「一花────！？！？」\n[ns4]「公公公公公公文包……！！裡面的東西……！？」"
10028050-130 = "啊哈哈哈！真的耶，掉到地上了！"
10028050-131 = "不過……"
10028050-132 = "還能怎麼辦呢？#n反正都已經搞砸了，晚點再檢查吧？"
10028050-133 = "現在我也不管那麼多了。#n總之就是完蛋了吧……嗯，肯定沒錯。"
10028050-134 = "既然如此……"
10028050-135 = "只有我一個人完蛋又好像有點委屈……"
10028050-145 = "……就讓所有人跟我一起下地獄吧。"
10028050-154 = "啊哈哈哈哈！啊哈，啊哈哈！啊哈哈哈哈哈！！！！"
10028050-155 = "搞，搞什麼啊！？那傢伙……哇啊啊啊～！！"
10028050-156 = "暴走了！誰快來阻止那傢伙！！"
10028050-157 = "有瘋子啊啊啊！！！"

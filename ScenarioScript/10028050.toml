10028050-41 = "3;카스미;99;그리고 나는 그냥……. 여러분이 신경만 안 써주면 되거든? 알아서 사라질 테니까."
10028050-42 = "3;카스미;01;들었지? 지금 여기서, 우리가 한바탕 해야 할 이유는 없다~ 이 말이야. 응? 내 말이 틀려?\n#3;em;[?]"

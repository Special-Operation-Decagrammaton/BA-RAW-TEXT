10028050-1 = "Episode 5;Express Train to Hell"
10028050-10 = "Um... So, Sensei..."
10028050-11 = "I'm sure this isn't possible..."
10028050-12 = "But by chance..."
10028050-13 = "By some impossible chance..."
10028050-14 = "You and the Trinity girl aren't considering negotiating with this criminal, right? ...Right?"
10028050-15 = "Wahahaha!! Oh Iori, Iori."
10028050-16 = "Your wistful dreams are based on ignorance! Do you happen to know what's inside this bag?"
10028050-17 = "This isn't just a pretty bag. It's holding one of Trinity's school relics."
10028050-18 = "If it were lost or, unthinkably, were to break..."
10028050-32 = "Well, it'd make things difficult even for a big shot like Trinity Academy."
10028050-33 = "What do you mean? A Trinity relic?"
10028050-34 = "What in the world is something like that doing here...?"
10028050-35 = "Okay, okay! I've made things easy for everyone to understand!"
10028050-36 = "It's gotten this far anyways, let's lay our cards on the table. Who knows! Maybe we'll all walk away happy!"
10028050-37 = "Iori, you snuck onto this train to bring down the hand of justice on the gang and train crew members. Am I right?"
10028050-38 = "Let me go, and we can keep playing our little game of cat and mouse. Don'tcha live for the thrill of the chase anyway?"
10028050-39 = "And our Trinity Cutie Pie just has to take her luggage and shimmy on back to her ivory towers at the next stop."
10028050-40 = "I know, I know! But what'll happen to our main character?"
10028050-41 = "I'll slip right on out of here as if I never existed. Save you all the paperwork! I know, so kind of me."
10028050-42 = "Everything works out perfectly! No fighting necessary! Pretty smart, huh?"
10028050-43 = "Everyone gets what they want, at the small price of turning a blind eye! I mean, poor little me was kidnapped and forced to be here! I hardly think I'm being unreasonable."
10028050-44 = "Well, c'mon then! Why the blank stares? This isn't our first rodeo, is it?!  "
10028050-45 = "The exciting part of life is that things never go exactly the way you want! Embrace it!"
10028050-46 = "And that's that! What do you think, Iori? Deal! Deal!"
10028050-47 = "It's not a bad offer..."
10028050-48 = "...If I do say so myself. And I do!"
10028050-49 = "Did you get hit in the head?! In what universe am I going to set you free to run amok when you're right under my nose?"
10028050-50 = "I don't care about Trinity and their stupid problems! The only thing that matters is doing my job!"
10028050-54 = "..."
10028050-55 = "...*sigh*..."
10028050-56 = "[s1] \"...???\"\n[s2] \"Ichika...?\""
10028050-60 = "Do you really think so? It's really not that simple..."
10028050-61 = "Whether you like it or not, I've made it your problem, Iori. Heehee."
10028050-62 = "Protest all you want! As long as I have this bag..."
10028050-63 = "Trinity Girl and Sensei have to listen to me. Isn't that right, Cutie Pie?"
10028050-64 = "..."
10028050-65 = "I'll reiterate! Whatever's going on with them isn't my problem! We have our own issues to settle!"
10028050-66 = "And you! Why are you being so stubborn?! I'm not even arresting you. Obviously there's been a situation here, and I just need to hear your side of the story! Let me do my damn job!"
10028050-67 = "..."
10028050-68 = "You're really focusing on the wrong things here. I'm awaiting her decision with bated breath. In a few moments' time, she's going to shoot you for the sake of this teacup...? Chamber pot? Thingy, whatever."

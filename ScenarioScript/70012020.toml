70012020-14 = "1;키라라 반짝부;03\n3;이로하;03\n#na;키라라 반짝부;앗, 정말? 다행이다! 헤헷.\n#1;h\n#1;em;[반짝]\n#1;ar\n#1;jump\n#3;m5"
70012020-15 = "1;키라라 반짝부;03\n3;이로하;01;두 분은 이래저래 교내에서 유명하시니…… 저로서는 다행이지만요."
70012020-16 = "1;키라라 반짝부;03\n5;에리카 반짝부;14\n3;이로하;01\n#na;에리카 반짝부;우와, 좀 부담되는데. 혹시 가이드 같은 것도 있을까?\n#5;h\n#3;m3\n#5;em;[땀]\n#5;stiff\n#5;al"
70012020-17 = "1;키라라 반짝부;03\n5;에리카 반짝부;14\n3;이로하;02;교내 방송 들으신 적 있죠? 그냥 비슷하게만 해주셔도 돼요."

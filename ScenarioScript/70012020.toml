70012020-21 = "1;키라라 반짝부;02\n5;에리카 반짝부;07\n3;이로하;99;아뇨, 굳이 그럴 필요는 없고요. 그냥 평범한 방송이에요. 라디오 진행 같은……\n#1;dl\n#5;dr"
70012020-22 = "3;이로하;02;맞다, 사연 읽어주는 코너가 있는데요. 이번에 뭐가 많이 왔다고 듣긴 했지만 굳이 안 읽어도 돼요. 그냥 넘겨도 괜찮으니까요.\n#3;em;[반응]"

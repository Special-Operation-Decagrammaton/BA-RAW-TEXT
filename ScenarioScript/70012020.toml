70012020-2 = "3;마코토;03;키시싯, 이로하! 역시 제법이구나!!\n#3;em;[재잘]\n#3;a"
70012020-3 = "3;마코토;03;그새 꼭 맞는 인선을 구해오다니 말이야!"
70012020-4 = "3;마코토;03\n5;이로하;99;제가 구했다기보다 알아서 찾아온 거지만요…….\n#5;em;[…]\n#3;m1\n#5;al"
70012020-5 = "5;이로하;99\n3;마코토;05;저 둘, 하타미 에리카와 요자쿠라 키라라라면 이 방송을 만마전의 격에 어울리는 명품 방송으로 탈바꿈시키는 것도 가능할 터!!"
70012020-6 = "3;마코토;05\n5;이로하;01;학생들 이름은 또 기가 막히게 기억한다니까……."
70012020-7 = "3;마코토;05\n5;이로하;05;아무튼, 둘에게 맡기기로 한 겁니다. 뒤에 가서 딴 말 하시면 안 돼요.\n#3;dl\n#5;m3"
70012020-8 = "3;마코토;99;사람을 쓰려면 믿어야 하고, 믿었으면 후회하지 않는다.\n#3;em;[…]\n#5;hide"
70012020-9 = "3;마코토;07;그것이 바로 만마전의 톱이 가져야 할 담대한 마음가짐! 안심하고 진행하도록 해라, 이로하!\n#3;closeup\n#3;em;[!]"

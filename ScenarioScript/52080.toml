[translation]
52080-1 = "第8話;惡夢"
52080-7 = "……我記憶中的菖蒲，是個像正午的陽光一般明亮溫暖的孩子。"
52080-8 = "無論什麼請求都不會拒絕，總是能處理得很好……是名優秀的百花繚亂委員長。"
52080-9 = "只要看到菖蒲那爽朗的笑容，就會覺得無論把什麼事交給他都很放心。"
52080-13 = "秋季祭典的料理人手不足？不介意的話，我來幫忙吧。#n我是自己一個人住，所以對料理很熟悉哦。"
52080-17 = "有幾個妖怪劇團在神木展望台前鬧事……？那些孩子真愛給人添麻煩啊。#n我馬上去處理，你能在這裡稍等一下嗎？"
52080-22 = "哎呀，在祭典的人潮中和父母走散了嗎？#n別哭，姐姐馬上幫你找到爸爸媽媽，可以在這裡等我一下嗎？"
52080-28 = "大家每當遇到問題就會找菖蒲，總是很依賴他。"
52080-29 = "即使偶爾遇到過分的請求，菖蒲也從未失去笑容。"
52080-33 = "菖蒲委員長！今天的對練也請多指教！"
52080-39 = "菖蒲前輩，這次祭典的標語該怎麼定比較好呢？"
52080-40 = "不好意思，這週末的晚班能請菖蒲醬幫忙嗎？#n原本要來的學生突然生病了……"
52080-46 = "嗯，放心交給我吧！我會處理好的。"
52080-49 = "相較之下……我就連跟上菖蒲的腳步都覺得吃力。"
52080-50 = "只要遇到一點困難就會忍不住哭出來，和菖蒲對練時也從來沒有贏過。"
52080-51 = "每當看見那樣的菖蒲，我總是只能在心裡重複那些說不出口的話來責備自己。"
52080-56 = "沒有菖蒲的話，我什麼都做不到……不可能辦得到。"
52080-57 = "因為我不是菖蒲。"
52080-58 = "有資格成為百花繚亂委員長的人，就只有菖蒲而已。"
52080-61 = "然而菖蒲就像看穿了我的心思一般，總是帶著明亮燦爛的笑容向我伸出手。"
52080-70 = "沒事的，名草。"
52080-71 = "因為我──"
52080-79 = "[log=아야메]從來沒有把你當成朋友。[/log]"
52080-83 = "……唔！"
52080-88 = "哈啊，哈啊……又是夢嗎。"
52080-89 = "為什麼會一直做這種惡夢……"
52080-94 = "哎呀，你已經醒了嗎，名草醬？"
52080-95 = "看來是不太習慣陌生的床鋪呢。"
52080-103 = "……箭吹棕櫚。"
52080-104 = "沒錯，又是我。"
52080-105 = "居然能在這裡再見到你，真像古老故事裡才會出現的緣分呢。"
52080-106 = "……不，既然你親自來到這裡，這恐怕也能說是必然吧。"
52080-111 = "你究竟是帶著什麼樣的心情，毫不畏懼地跑到這魑魅魍魎橫行的北方之地呢？"
52080-112 = "難道是現在才想起曾經拋下的舊友嗎？"
52080-113 = "這應該是我要問你的問題才對，棕櫚。"
52080-114 = "你究竟在這裡謀劃著什麼？#n出現在惠比壽分校的百物語，果然是你搞的鬼嗎？"
52080-115 = "誰知道呢～？#n對注重反轉的怪談而言，劇透可是大忌……所以我現在還不能告訴你。"
52080-116 = "原本打算送你一場無法醒來的惡夢，讓你還清舊債的……看來已經無所謂了呢。"
52080-117 = "因為我會把那場惡夢變成現實。"
52080-139 = "啊哈哈！當時能使用「百蓮」的力量，果然不是偶然呢。"
52080-140 = "難道你現在還相信自己能代替菖蒲醬，擔任百花繚亂的委員長嗎，名草醬～？"
52080-141 = "能不能做到並不重要。"
52080-142 = "為了守護大家，我必須得做到。#n……至少要把這場戲給演完。"
52080-146 = "真是模範般的覺悟呢，需要幫你拍拍手嗎？"
52080-147 = "不過……就算你變得再強，也沒辦法長出三頭六臂吧？"
52080-148 = "面對不斷襲來的恐懼，你能撐到什麼程度呢？"
52080-159 = "來，讓我們再次揭開新故事的序幕吧！"

[translation]
52080-1 = "ตอนที่ 8;ฝันร้าย"
52080-7 = "อายาเมะในความทรงจำของฉันคือเด็กที่ใบหน้าแจ่มใสและอบอุ่นเหมือนแสงแดดในตอนกลางวัน..."
52080-8 = "หัวหน้าผู้เป็นเลิศของเฮียกกะเรียวรันที่ไม่เคยปฏิเสธคำขอร้องใดๆ และไม่มีปัญหาไหนที่แก้ไขไม่ได้"
52080-9 = "ถ้าได้มองรอยยิ้มที่ไร้ความลังเลของอายาเมะ ฉันก็รู้สึกราวกับเชื่อใจเธอได้ทุกเรื่อง"
52080-13 = "คนไม่พอสำหรับเตรียมอาหารเทศกาลฤดูใบไม้ร่วงปีนี้เหรอ? เดี๋ยวฉันไปช่วยเอง ฉันอยู่คนเดียวมาจนทำอาหารเก่งเลยละ"
52080-17 = "มีพวกปีศาจมาก่อความวุ่นวายหน้าจุดชมวิวต้นไม้ศักดิ์สิทธิ์งั้นเหรอ...? พวกนี้นี่ซุกซนกันจริงๆ ฉันจะรีบไปจัดการให้ รออยู่ตรงนี้ก่อนนะ"
52080-22 = "โอ๊ะ คนในงานเยอะจนหนูเดินหลงกับพ่อแม่เหรอ? ไม่ต้องร้องนะ รอพี่อยู่ตรงนี้ก่อน แล้วพี่จะไปพาพ่อแม่มาหานะ"
52080-28 = "เวลาทุกคนเจอปัญหาก็จะถามหาอายาเมะ และทุกคนก็พึ่งพาอายาเมะในหลายๆ เรื่อง"
52080-29 = "แม้บางครั้งจะถูกขอให้ทำในสิ่งที่เกินกำลัง แต่รอยยิ้มบนหน้าของอายาเมะก็ไม่เคยเลือนราง"
52080-33 = "หัวหน้าอายาเมะ! วันนี้ก็ช่วยเป็นคู่ฝึกดวลให้ด้วยนะคะ!"
52080-39 = "รุ่นพี่อายาเมะ สโลแกนของเทศกาลครั้งนี้เอาเป็นอะไรดีคะ?"
52080-40 = "อายาเมะจัง ขอโทษนะ สุดสัปดาห์นี้มาช่วยงานพาร์ทไทม์ภาคค่ำให้หน่อยได้มั้ย? นักเรียนคนที่จะมาทำงานพาร์ทไทม์วันนี้จู่ๆ ก็ป่วยขึ้นมาน่ะสิ..."
52080-46 = "อื้อ ไม่ต้องห่วงนะ! ฉันไปทำแทนให้เอง"
52080-49 = "เมื่อเทียบกับอายาเมะแล้ว... ฉันคือคนที่แค่จะเดินตามอายาเมะให้ทันยังไม่ไหว"
52080-50 = "แม้ต้องเผชิญกับอุปสรรคยากๆ แค่เล็กน้อย ฉันก็ร้องไห้ออกมาง่ายๆ แล้ว ในการดวลกับอายาเมะ#nฉันก็ไม่เคยเอาชนะได้แม้แต่ครั้งเดียว"
52080-51 = "พอเห็นอายาเมะแบบนั้น ฉันก็ได้แต่พูดสิ่งที่ไม่ควรพูดอยู่ในใจและรู้สึกเกลียดตัวเองอยู่ร่ำไป"
52080-56 = "ถ้าไม่มีอายาเมะ ฉันก็ทำอะไรไม่ได้เลย ไม่มีทางทำอะไรได้เลย"
52080-57 = "เพราะฉันไม่ใช่อายาเมะ"
52080-58 = "คนที่มีสิทธิ์เป็นหัวหน้าเฮียกกะเรียวรันมีแค่อายะเมะคนเดียวเท่านั้น"
52080-61 = "แต่ราวกับอายาเมะอ่านใจฉันได้ เธอก็เลยยื่นมือให้ฉันพร้อมรอยยิ้มที่สดใสร่าเริงเสมอ"
52080-70 = "ไม่เป็นไรนะ นางุสะ"
52080-71 = "ก็เพราะว่าฉันน่ะ..."
52080-79 = "[log=아야메]ไม่เคยคิดว่าเธอเป็นเพื่อนเลยสักครั้ง[/log]"
52080-83 = "อึก...!"
52080-88 = "แฮ่ก... แฮ่ก... ฝันอีกแล้วเหรอ"
52080-89 = "ทำไมถึงฝันร้ายแบบนี้อยู่เรื่อยเลย..."
52080-94 = "เอ๋ ตื่นแล้วเหรอคะ นางุสะจัง?"
52080-95 = "ท่าทางจะนอนหลับไม่สบายเพราะแปลกที่สินะคะ"
52080-103 = "ยาบูกิ ชูโระ..."
52080-104 = "ใช่ค่ะ ฉันอีกแล้วค่ะ"
52080-105 = "การได้พบคุณอีกครั้งที่นี่ช่างเหมือนเรื่องบังเอิญที่อยู่ในเรื่องเล่าแต่โบร่ำโบราณเลยนะคะ"
52080-106 = "ไม่สิ... ในเมื่อคุณดั้นด้นมาถึงที่นี่เอง จะบอกว่าเป็นเรื่องบังเอิญก็คงไม่ได้หรอกค่ะ"
52080-111 = "คิดอะไรอยู่คะถึงได้กล้ามาถึงดินแดนทางเหนือที่เต็มไปด้วยภูตผีปีศาจโดยไม่เกรงกลัวเลย?"
52080-112 = "หรือว่าเพิ่งจะมาคิดถึงเพื่อนเก่าที่คุณทอดทิ้งเอาไว้เมื่อนานมาแล้วเหรอคะ?"
52080-113 = "ฉันต่างหากที่ต้องพูดคำนั้น ชูโระ"
52080-114 = "เธอมาวางกลโกงอะไรอยู่ที่นี่กันแน่? ตำนานร้อยเรื่องราวที่ปรากฏตัวในโรงเรียนสาขาเอบิสุก็เป็นฝีมือ#nของเธอใช่มั้ย?"
52080-115 = "ก็ไม่รู้สิคะ~? เรื่องลึกลับสนุกตรงที่มันมีการพลิกผันได้ แต่การสปอยล์ก็เป็นสิ่งต้องห้าม ฉันก็เลยตอบคุณในทันทีไม่ได้หรอกค่ะ..."
52080-116 = "ตอนแรกฉันอยากชำระหนี้เก่า ก็เลยตั้งใจจะทำให้คุณตกอยู่ในฝันร้ายที่ไม่อาจตื่นขึ้นได้ แต่ตอนนี้เรื่องทำให้อยู่ในฝันนั่นคงไม่สำคัญแล้วละค่ะ"
52080-117 = "เพราะฉันจะทำให้ฝันร้ายนั่นเป็นความจริงน่ะสิคะ"
52080-139 = "อะฮ่าฮ่า! เหมือนว่าการใช้พลังของ <เฮียกกุเร็น> ในตอนนั้นจะไม่ใช่เรื่องบังเอิญสินะคะ"
52080-140 = "อย่าบอกนะคะว่าคุณเชื่อว่าตัวเองจะทำหน้าที่หัวหน้าเฮียกกะเรียวรันแทนอายาเมะจังได้น่ะ นางุสะจัง~?"
52080-141 = "ทำได้หรือไม่ได้มันไม่สำคัญหรอก"
52080-142 = "แต่ถ้าทำแล้วปกป้องทุกคนได้ ต่อให้ต้องเล่นละครตบตา ฉันก็จะทำให้เห็นว่าฉันทำได้..."
52080-146 = "เป็นความตั้งใจที่น่าเอาเยี่ยงอย่างจังเลยนะคะ ฉันต้องปรบมือให้หรือเปล่าคะเนี่ย?"
52080-147 = "แต่ว่า... ต่อให้คุณแข็งแกร่งขึ้นมาสักแค่ไหน คุณก็ไม่ได้มี 3 หัวหรือมีแขนงอกมาเป็น 6 ข้างนี่คะ?"
52080-148 = "ฉันอยากรู้จังเลยค่ะว่าคุณจะต้านทานความกลัวที่โหมกระหน่ำอยู่ตลอดเวลาได้นานสักแค่ไหนกัน?"
52080-159 = "เอาละ งั้นเรามาเริ่มบทนำของเรื่องราวใหม่กันอีกครั้งค่ะ"

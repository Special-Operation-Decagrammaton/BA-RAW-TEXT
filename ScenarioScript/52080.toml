[translation]
52080-1 = "Episode 8;Nightmare"
52080-7 = "...My Ayame was as bright and warm as the afternoon sun."
52080-8 = "She was our President, always lending a hand, and capable of anything."
52080-9 = "Her confident smile always assured me that things would...work out."
52080-13 = "Not enough cooks for the Autumn Festival? I'd be happy to help! I live alone, so I'm used to cooking."
52080-17 = "A couple of Mouryo making a scene near the Tree of Deities Observatory...? Don't worry about it. I'll handle them in a minute."
52080-22 = "Oh, sweetie, you lost your parents in the crowd? Don't cry. I'll find them. Can you be brave and stay here until then?"
52080-28 = "Whenever something went wrong, Ayame was there. Everyone flocked to her."
52080-29 = "Even when asked too much, Ayame would simply smile."
52080-33 = "President Ayame! Please spar with me!"
52080-39 = "Ayame, help us pick the slogan for the festival!"
52080-40 = "Ayame, I'm really sorry, but can you work a night shift this weekend? My chef called in sick..."
52080-46 = "No worries! I got it!"
52080-49 = "In contrast, I...I could barely keep up with her."
52080-50 = "I cried at every unexpected challenge, at every criticism. No matter how hard I trained, I never won a single spar against Ayame."
52080-51 = "It is cruel...but watching her made me hate myself. How could I compete? How could I even compare?"
52080-56 = "Without Ayame, I'm utterly incapable. I'm a fraud."
52080-57 = "I'll never be Ayame."
52080-58 = "No one else is worthy of standing in her place. Ayame will always be the true Hyakkaryouran President."
52080-61 = "And still, she would always have a bright, cheerful smile as she reached to help me up."
52080-70 = "It's fine."
52080-71 = "Because the truth is—"
52080-79 = "You were never my friend, Goryou Nagusa."
52080-83 = "Ugh!"
52080-88 = "*pant* *pant*...Another dream."
52080-89 = "Why do I keep having this nightmare..."
52080-94 = "Oh, up already, Nagusa? And so sweaty!"
52080-95 = "Maybe you just miss your old pillow..."
52080-103 = "...Yabuki Shuro."
52080-104 = "In the flesh, so to speak!"
52080-105 = "How fun to find you here! It's like something out of a fairy tale."
52080-106 = "...Or, maybe it was destiny, considering you came to me."
52080-111 = "What could make cowardly Nagusa return to the great North?"
52080-112 = "Was it Ayame? You miss her, don't you?"
52080-113 = "I could ask you the same, Shuro."
52080-114 = "What is your scheme? Are you manifesting Artifact Spirits in Ebisu for your own sick amusement?"
52080-115 = "Oh, who knows? I do hate spoilers! Can't just GIVE the ending away!"
52080-116 = "But I've been having fun watching your self-pitying nightmares, truly."
52080-117 = "Still, I think it's time that we made them a reality."
52080-139 = "Hahaha! Oh, was that the Hundred Lotus? I admire the confidence!"
52080-140 = "Don't tell me you still believe that you can replace Ayame, pathetic Nagusa."
52080-141 = "It matters not what I believe."
52080-142 = "All that matters is that I fulfill the role."
52080-146 = "So noble! Let's give this girl a hand!"
52080-147 = "But...no matter what you tell yourself, no matter how far you go...you're still YOU."
52080-148 = "I wonder how much you can endure, my soft, sensitive Nagusa."
52080-159 = "Now, let's begin in earnest. Places, everyone!"

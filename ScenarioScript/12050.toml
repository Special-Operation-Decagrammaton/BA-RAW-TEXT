[translation]
12050-1 = "Episode 5;Everyone Has a Story 2"
12050-2 = "Kaiser Construction? You mean the Kaiser Corporation?!"
12050-3 = "The Abydos district belongs to Kaiser?!"
12050-4 = "Does that include the Shiba Seki ramen shop?"
12050-5 = "Yes. The building already belongs to the Kaiser Corporation. The eviction order was issued some time ago..."
12050-6 = "So, Master decided to close the shop... He said it was bound to happen eventually."
12050-7 = "..."
12050-8 = "...!"
12050-9 = "What?!"
12050-10 = "No... Not the ramen shop..."
12050-11 = "Not only that, but the main building of Abydos, along with the surrounding desert and wilderness..."
12050-12 = "...and even the buildings that nature has not reclaimed yet, almost everything already belongs to them."
12050-13 = "The only areas that they don't have control over are the main building of the school and parts of the surrounding area..."
12050-14 = "B-But, how is this possible? How could the land in the academy district have been traded away?"
12050-15 = "Who would do such a thing?"
12050-16 = "It must have been the Abydos Student Council."
12050-17 = "...!"
12050-18 = "The Student Council has voting rights on school assets. Only the Student Council would be authorized to do this."
12050-19 = "She's right. The transaction was led by Abydos' previous Student Council."
12050-20 = "But...the Abydos Student Council has been gone for two years... "
12050-21 = "Yes. No further deals have come to light since the Student Council disappeared."
12050-22 = "I see. Two years ago..."
12050-23 = "What have they done? Those idiot Student Council members!"
12050-24 = "How could they sell the school's land to the Kaiser Corporation?!"
12050-25 = "The school belongs to the students! Why would they do something like this?!"
12050-26 = "..."
12050-27 = "This is huge, and we had no idea it had even happened..."
12050-28 = "The district belongs to the school. That's common knowledge, so we were only concerned about the school's debt, not the school's assets."
12050-29 = "If only I had known sooner..."
12050-30 = "Even if you had known, there's nothing you could have done."
12050-31 = "This happened before you entered the school, before the Foreclosure Task Force had even been formed."
12050-32 = "Hoshino... Did you know anything about this?"
12050-33 = "Oh, right! You used to be part of the Abydos Student Council, didn't you?"
12050-34 = "Oh, really? Is that true?"
12050-35 = "Yes. In fact...she was vice president of the last Student Council..."
12050-37 = "Oh, well, that's true, but I never met the upperclassmen from two years ago."
12050-38 = "By the time I joined the Student Council, all of the former members had already resigned."
12050-39 = "The number of enrolled students was single-digits, there were no faculty members, and classes had been suspended for a long time."
12050-40 = "The Student Council room was like an empty warehouse, and none of the previous members had left any documents. It was a time when the school building was moved several times to avoid the desertification."
12050-41 = "The last Student Council was only the new student president and me. "
12050-42 = "The president was an idiot with the lowest grades in school and accepted the position blindly, and I was an ill-tempered first-year."
12050-43 = "Ugh... Everything was a mess."
12050-44 = "The student with the lowest grades was the student body president? What kind of a Student Council is that?"
12050-45 = "Grades don't indicate whether someone is suited for a job, Serika."
12050-46 = "Your grades aren't that great either..."
12050-47 = "I-I know that! Why are you bringing up my grades all of a sudden? I'm just saying!"
12050-48 = "No, she's right. We may have called it a Student Council, but we were so incompetent."
12050-49 = "I ended up joining the Student Council by accident... Hmm, I was pretty aimless back then."
12050-50 = "I had no idea what I was doing... I was a total idiot."
12050-51 = "..."
12050-52 = "Hoshino..."
12050-53 = "Hoshino, you shouldn't blame yourself."
12050-54 = "In fact, after the Student Council was disbanded, it was only thanks to you that the Foreclosure Task Force was established in Abydos."
12050-55 = "Huh?"
12050-56 = "You may be lazy, but you're always the first to take initiative when it really matters."
12050-57 = "Yeah. When Serika went missing, you were the first to ask Sensei for help."
12050-58 = "Is that right? I don't remember..."
12050-59 = "[s] \"Yes, it's true.\""
12050-60 = "Oh. Really?! "
12050-61 = "Well, you may be a no-hoper, but you're also someone I can respect."
12050-62 = "I'm not sure if that's a compliment..."
12050-63 = "Wh-What is this? What's come over you, Shiroko?! Hearing you say that makes me feel so embarrassed!"
12050-64 = "...Well, I just wanted to say it."
12050-65 = "E-Eh?"
12050-66 = "..."
12050-68 = "Why do you think the former Student Council sold the land to Kaiser?"
12050-69 = "Obviously, they were in cahoots with Kaiser."
12050-70 = "No... I don't think so."
12050-71 = "Oh, I didn't know those upperclassmen very well, but I'm sure they worked hard for the benefit of the school."
12050-72 = "Perhaps they did it to pay off the debt..."
12050-73 = "The debt..."
12050-74 = "Yes. That's what I think too. Even back then, the school's debt was enormous."
12050-75 = "But since it was sold at such a low price, forget the principal. They couldn't even keep up with the increasing interest..."
12050-76 = "So they kept selling land..."
12050-77 = "What? That's so weird..."
12050-78 = "[s] \"They manipulated them into giving up the land.\""
12050-79 = "Huh? What do you mean, Sensei?"
12050-80 = "[s] \"Abydos was caught in a dirty trap.\""
12050-81 = "H-Huh? "
12050-82 = "...Oh. "
12050-83 = "I see. "
12050-84 = "It was Kaiser that lent the money to Abydos."
12050-85 = "...!"
12050-86 = "That means..."
12050-87 = "Kaiser Loans lent the school more money than they could ever repay, forcing them to sell the land to keep up with the rising interest."
12050-88 = "Yes. At first, they must have told them to sell the useless lands in the wasteland and desert..."
12050-89 = "The land had already been ruined, so anyone would have been tempted by such an offer..."
12050-90 = "But because they sold it at such a low price, the debt never decreased, and they kept handing over more and more land..."
12050-91 = "And so the Abydos district slowly became the property of Kaiser..."
12050-92 = "Yes. That must be how it happened."
12050-93 = "Then, the reason they lent that money to Abydos in the first place...was so they could take the land."
12050-94 = "It's a trap they've been preparing for a long time. Maybe even decades..."
12050-95 = "It was all a massive conspiracy..."
12050-96 = "I can't believe it! They played right into the hands of those Kaiser bastards!"
12050-97 = "The Student Council was so stupid! How could they fall into their trap so easily?!"
12050-98 = "[s] \"No, you've got it all wrong.\""
12050-99 = "Sensei?"
12050-100 = "[s] \"The ones who tricked them are the villains. Don't blame the victims.\""
12050-101 = "..."
12050-102 = "..."
12050-103 = "I-I know that! I've bought sketchy stuff like germanium bracelets! I know better than anyone that the con artists are the bad guys!"
12050-104 = "But... "
12050-105 = "I still feel so angry... Why?"
12050-106 = "Why would they do something so cruel to Abydos? We were already struggling..."
12050-107 = "Serika..."
12050-108 = "[s] \"...\""
12050-109 = "..."
12050-110 = "..."
12050-111 = "When people are suffering, they become desperate."
12050-112 = "Huh?"
12050-113 = "And desperate people...will do anything to alleviate their suffering."
12050-114 = "Just quoting someone else. That's all there is to it, Serika."
12050-116 = "The school's debt...the situation in Abydos, and the clues we found with Sensei..."
12050-117 = "It's all coming together."
12050-118 = "After the Student Council disappeared, the Kaiser Corporation had no way to purchase more land..."
12050-119 = "This school was the last piece they didn't own, so they hired gangs to harass us!"
12050-120 = "In the end, what the Kaiser Corporation wanted wasn't money...but land!"
12050-122 = "But...why do they want the land?"
12050-123 = "The Abydos district is nothing but wilderness and sand-blasted ruins..."
12050-124 = "I-I know... I haven't the slightest clue what could be gained by taking that..."
12050-125 = "[s] \"I might have some insight there.\""
12050-126 = "...Sensei?"
12050-127 = "[s] Give them the information you got from Hina."
12050-130 = "...Sensei of Schale."
12050-131 = "Both Pandemonium and the Tea Party have yet to receive this information."
12050-132 = "But I thought you should know."
12050-133 = "I think the Kaiser Corporation is up to something in the abandoned desert of Abydos."
12050-135 = "In the abandoned desert..."
12050-136 = "Kaiser is..."
12050-137 = "Up to something?"
12050-138 = "Wh-Why would the Gehenna head prefect...? "
12050-139 = "Why would she tell you that, Sensei?"
12050-140 = "Come on! What is there to think about?"
12050-141 = "The Abydos Desert is in our district! Why don't we just go check it out?"
12050-142 = "If you're so curious about what's out there, then let's go and see for ourselves!"
12050-143 = "...Hmm."
12050-144 = "...Wow, Serika. You actually had a good idea for once. You've grown so much. I'm so proud of you."
12050-148 = "What is this feeling? Is this what it's like to be supported?"
12050-149 = "A-Ahaha..."
12050-150 = "Yes. Serika is right."
12050-153 = "[ns1] \"Then, we should leave right now.\"\n[ns2] \"Let's go to the Abydos Desert.\""
12050-158 = "Okay!"
12050-161 = "...Sensei. "
12050-162 = "Do you have a moment before we leave?"
12050-163 = "...I have something I need to talk to you about."
12050-164 = "[s] Follow Shiroko."
12050-168 = "..."
12050-169 = "Here."
12050-170 = "[s] Take the piece of paper from Shiroko."
12050-171 = "...I found it in Hoshino's bag."
12050-175 = "[ns] \"Letter of resignation... Takanashi Hoshino, Foreclosure Task Force?\""
12050-176 = "(nod)"
12050-177 = "It's a letter of resignation from the Foreclosure Task Force."
12050-178 = "I didn't tell anyone about this...but I'm sure Hoshino knows I went through her bag."
12050-179 = "[s] \"Why did you go through her bag?\""
12050-180 = "...She's never been away as long as she was when the Prefect Team attacked yesterday."
12050-181 = "I just couldn't understand why she would do that, so I went through her bag and found this."
12050-182 = "...I'm sorry. I deserve to be scolded. I know that something's not a crime just because I don't understand it."
12050-183 = "[s3] \"I'll scold you later.\"\n[s4] \"Keep it a secret for now.\""
12050-184 = "Okay. Hoshino... I think she's hiding something from us. "
12050-185 = "Okay. Hoshino... I think she's hiding something from us. "
12050-188 = "..."
12050-190 = "Next Episode;Into the Abydos Desert Part 1"

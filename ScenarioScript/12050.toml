[translation]
12050-1 = "第5話;各自的故事（２）"
12050-2 = "凱薩建設……是凱薩公司旗下的企業嗎……！？"
12050-3 = "阿拜多斯自治區屬於凱薩公司……！？"
12050-4 = "連柴關拉麵也是……？"
12050-5 = "……是的。#n拉麵店的建築也是凱薩所有，不久前似乎發出了遷出命令……"
12050-6 = "所以老闆才會打算把店收起來……說那只是遲早的事……"
12050-7 = "……"
12050-8 = "……！？"
12050-9 = "怎麼會……！？"
12050-10 = "所，所以柴關拉麵要……"
12050-11 = "……不僅如此。#n已經砂漠化的阿拜多斯高中本館，以及周圍數千萬坪的荒地……"
12050-12 = "就連尚未沙漠化的市區建築和土地的所有權……都落入他們手中了……"
12050-13 = "目前所有權還在我們手中的……#n只剩下這棟作為學校本館使用的校舍，還有附近的一部份土地而已……"
12050-14 = "可，可是為什麼會變成這樣呢？#n一般來說，學校自治區的土地是不可能拿來交易的……"
12050-15 = "究竟是誰做出這種事……"
12050-16 = "……我想應該是阿拜多斯學生會。"
12050-17 = "……！"
12050-18 = "學校資產的處分權在學生會手上，因此能夠那麼做的人只有學生會而已。"
12050-19 = "……是的。進行交易的確實是阿拜多斯前學生會。"
12050-20 = "怎麼會……阿拜多斯學生會不是已經在2年前消失了嗎……"
12050-21 = "……沒錯。因此在學生會消失之後，交易也就此中止了。"
12050-22 = "這樣啊，2年前……"
12050-23 = "到底在做什麼啊，學生會那群傢伙！！"
12050-24 = "竟然賣學校的土地？而且還是賣給凱薩公司！？"
12050-25 = "學校的核心是學生吧！？為什麼做出這種事……！！"
12050-26 = "……"
12050-27 = "發生了這麼嚴重的事，我們竟然一直完全沒有察覺……"
12050-28 = "……自治區屬於學校是基本常識。#n由於實在太理所當然，我們才會只注意學校的債務而忽略了這件事。"
12050-29 = "如果我再早一點察覺的話……"
12050-30 = "……不，我想就算知道了也無濟於事。"
12050-31 = "因為這是綾音醬入學之前……不，是在對策委員會誕生之前發生的事。"
12050-32 = "……星野前輩，你知道些什麼嗎？"
12050-33 = "啊，對了！星野前輩也是阿拜多斯學生會的吧？"
12050-34 = "咦？是，是這樣嗎！？"
12050-35 = "我聽說……是最後的學生會的副會長。"
12050-37 = "……唔嘿～確實有這回事呢。#n不過如果是2年前的話，我也沒見過當時學生會的前輩們。"
12050-38 = "因為我加入學生會的時候，其他人就已經退出了。"
12050-39 = "那時在校生已經不到十個人，也沒有教職人員。#n課程什麼的早就停止了。"
12050-40 = "學生會辦公室就像一間空蕩蕩的倉庫，前任學生會還完全沒有留下任何文件。#n可能是當時為了躲避沙漠化現象，不停轉移學校根據地的關係吧。"
12050-41 = "雖然稱之為最後的學生會，其實成員就只有前任學生會長和我兩個人而已。"
12050-42 = "……學生會長是莫名接下學生會、全校第一的傻瓜，而我則是脾氣糟糕的新生。"
12050-43 = "哎呀……到處都亂七八糟的呢。"
12050-44 = "全校第一的傻瓜是學生會長……？那是什麼樣的學生會啊……？"
12050-45 = "成績和職責是兩回事哦，茜香。"
12050-46 = "而且茜香醬的成績也……"
12050-47 = "我，我知道啦！！幹嘛突然提到我的成績！？只是說說而已嘛！？"
12050-48 = "唔嘿～沒錯唷。#n雖然說好聽點是學生會，實際上就只是兩個笨蛋而已。"
12050-49 = "是什麼陰錯陽差才會進入學生會的呢……哎呀～那時候忙得暈頭轉向的呢。"
12050-50 = "真的像個笨蛋一樣，什麼都不知道……"
12050-51 = "……"
12050-52 = "星野前輩……"
12050-53 = "……星野前輩不需要為這件事感到自責。"
12050-54 = "雖然我不清楚以前的事，但實際上在學生會解散之後……#n是多虧了星野前輩，才能有現在的對策委員會。"
12050-55 = "唔，嗯……？"
12050-56 = "……雖然星野前輩確實很懶，不過在重要時刻總是會挺身而出。"
12050-57 = "沒錯。茜香醬失蹤的時候，率先找老師幫忙的人也是星野前輩……"
12050-58 = "是嗎？我記不太清──"
12050-59 = "[s] 「沒錯沒錯。」"
12050-60 = "咦……真的假的！？"
12050-61 = "我認為星野前輩雖然有些缺點，但是個值得尊敬的人。"
12050-62 = "這是在稱讚還是在罵人……"
12050-63 = "你，你怎麼了白子醬！？突然說那種青春的台詞……！#n大叔我有點不擅長這種氣氛的說！？"
12050-64 = "……沒什麼，只是想說出口而已。"
12050-65 = "咦，咦咦……？"
12050-66 = "……"
12050-68 = "……話說，前學生會為什麼會把阿拜多斯的土地賣給凱薩公司呢？"
12050-69 = "肯定有人跟凱薩勾結。"
12050-70 = "不……我想這應該不太可能。"
12050-71 = "這個嘛～我雖然跟那些前輩們不熟……但他們確實為了保護學校付出了很多努力。"
12050-72 = "之所以那麼做，我想應該是為了還債吧……"
12050-73 = "為了還債而將土地……"
12050-74 = "嗯，我也這麼認為。#n當時學校的債務已經膨脹到一定的程度了。"
12050-75 = "不過由於是將土地低價拋售的關係……#n別說是本金，就連不斷增加的利息也無法負擔……"
12050-76 = "就這樣陷入惡性循環了嗎……"
12050-77 = "什麼跟什麼啊……這也太奇怪了吧……"
12050-78 = "[s] 「這是一種掠奪土地的手段。」"
12050-79 = "咦？什麼意思？"
12050-80 = "[s]「阿拜多斯中了惡劣的陷阱。」"
12050-81 = "咦，咦？"
12050-82 = "啊啊……"
12050-83 = "原來如此，是這樣嗎。"
12050-84 = "……把錢借給阿拜多斯的也是凱薩公司。"
12050-85 = "……！！"
12050-86 = "也就是說……"
12050-87 = "凱薩信貸借給學校無法承擔的鉅款，迫使學校賣地償還日益膨脹的利息。"
12050-88 = "沒錯，肯定是被唆使只要賣掉砂漠化和荒廢的土地就好了吧。"
12050-89 = "反正在沙漠化之後，那些土地就沒有用處了。#n面對那種提案，我想無論是誰都會動心……"
12050-90 = "但是那樣低價拋售土地根本無法減輕債務，反而只會讓他們拿到更多土地……"
12050-91 = "……進而讓阿拜多斯自治區逐漸落入凱薩公司手中。"
12050-92 = "說不定原本就是這麼打算的。"
12050-93 = "連貸款給阿拜多斯……都是為了搶奪土地……"
12050-94 = "那恐怕是很久以前就設下的陷阱，或許從數十年前就已經……"
12050-95 = "竟然是如此大規模的計劃啊……"
12050-96 = "搞什麼啊！！那我們不就被凱薩公司那些傢伙耍得團團轉了嗎！"
12050-97 = "學生會那些傢伙到底有多無能……！要是他們沒有被這種詐欺手段所騙……！"
12050-98 = "[s] 「不，話不能這麼說。」"
12050-99 = "老師……？"
12050-100 = "[s]「有錯的不是受騙的人而是騙人的人。」"
12050-101 = "……"
12050-102 = "……"
12050-103 = "……我，我知道啦！我偶爾也會買鍺手環之類的東西……#n搞不好我比在場所有人都了解！是那些騙人的傢伙不好！"
12050-104 = "可是……"
12050-105 = "好不甘心，為什麼……"
12050-106 = "阿拜多斯明明已經這麼艱難了，為什麼還做出這麼過分的事……"
12050-107 = "茜香醬……"
12050-108 = "[s]「……」"
12050-109 = "……"
12050-110 = "……"
12050-111 = "……因為痛苦的人會陷入絕望啊。"
12050-112 = "……咦？"
12050-113 = "而絕望的人……無論什麼手段都會嘗試。"
12050-114 = "唔嘿～這是我聽來的啦。#n其實就是這樣而已唷，茜香醬。"
12050-116 = "學校的債務……阿拜多斯的處境，以及我們和老師一起查出的線索。"
12050-117 = "感覺一切漸漸開始聯繫在一起了。"
12050-118 = "在阿拜多斯學生會消失之後，凱薩公司無法繼續收購土地……"
12050-119 = "為了搶奪還沒得手的「最後的土地」──也就是這所學校而雇用了頭盔團……！"
12050-120 = "凱薩公司的目的不是錢，而是土地！"
12050-122 = "不過……為什麼是土地呢？"
12050-123 = "明明阿拜多斯自治區幾乎都變成了荒野和砂漠，或是被沙塵覆蓋的廢墟……"
12050-124 = "就是說啊……搶走這種土地應該也得不到什麼好處吧……"
12050-125 = "[s] 「關於這點，我有一些情報。」"
12050-126 = "……老師？"
12050-127 = "[s] 說出從陽奈口中聽到的情報"
12050-130 = "……夏萊的老師。"
12050-131 = "雖然這是萬魔殿和茶會都不知道的情報……"
12050-132 = "……不過讓你知道或許會比較好。"
12050-133 = "阿拜多斯被遺棄的沙漠……凱薩公司似乎正在那裡進行著什麼計劃。"
12050-135 = "阿拜多斯的砂漠裡……"
12050-136 = "凱薩公司正在……"
12050-137 = "計畫著什麼……？"
12050-138 = "那，那種情報，為什麼格黑娜的風紀委員長會……"
12050-139 = "又為什麼要告訴老師……？"
12050-140 = "啊啊真是的！那我們還在等什麼！"
12050-141 = "阿拜多斯的沙漠不是我們的自治區嗎！去看看就知道了！"
12050-142 = "想知道那裡有什麼的話，親眼去看看不就好了嗎！"
12050-143 = "……嗯。"
12050-144 = "……哎呀，茜香醬難得說了句好話呢。#n能看到你成長茁壯的樣子，媽媽我既欣慰又感動呢～"
12050-148 = "這，這氣氛是怎麼回事！？我說正經的話有那麼奇怪嗎！？"
12050-149 = "啊，啊哈哈……"
12050-150 = "茜香醬說的沒錯。"
12050-153 = "[ns1] 「那，準備好了就出發吧。」\n[ns2] 「前往阿拜多斯沙漠。」"
12050-158 = "嗯！"
12050-161 = "……老師。 "
12050-162 = "出發之前，想借用你一點時間。"
12050-163 = "……有事想和你商量。"
12050-164 = "[s] 跟上白子"
12050-168 = "……"
12050-169 = "……這個。"
12050-170 = "[s] 從白子手上收下某個東西"
12050-171 = "……這是在星野前輩的背包裡發現的。"
12050-175 = "[ns] 「退部．退會申請書……對策委員會小鳥遊星野……？」"
12050-176 = "……嗯。"
12050-177 = "嗯，是退出對策委員會的申請書。"
12050-178 = "我沒有告訴別人……不過星野前輩應該知道我翻過他的背包。"
12050-179 = "[s] 「為什麼這麼做……？」"
12050-180 = "……星野前輩從來沒有離開那麼久過。#n而且還是在被風紀委員會攻擊的情況下。"
12050-181 = "我怎麼想都無法接受……所以翻了前輩的背包，結果發現了這個。"
12050-182 = "……對不起，我知道這麼做是不好的。#n老師要責備我也沒關係。"
12050-183 = "[s3] 「……責備的事之後再說。」\n[s4] 「這件事暫時先保密吧。」"
12050-184 = "嗯……我想老師也很清楚……星野前輩好像有什麼事瞞著我們。"
12050-185 = "嗯……我想老師也很清楚……星野前輩好像有什麼事瞞著我們。"
12050-188 = "……"
12050-190 = "下一話;前往阿拜多斯沙漠（１）"

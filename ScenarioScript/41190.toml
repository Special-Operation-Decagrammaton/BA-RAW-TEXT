[translation]
41190-1 = "第19話;大人の時間"
41190-2 = "ヴァルキューレ警察学校・屋上"
41190-4 = "こちらRABBIT1、現在時刻0100。たっ[ruby=Objective Rally Point]た今ORPに到[/ruby]着しました。"
41190-5 = "キャンプRABBIT、航空支援はまだですか？"
41190-6 = "ごめん、ポイントが変わって色々遅くなった！"
41190-7 = "あと5分待って！"
41190-8 = "了解です。"
41190-9 = "RABBIT2、バリケードの設置をお願いします。屋上への通路を封鎖しておきましょう。"
41190-14 = "もうやっておいた。念のため、階段のところに地雷も撒いておいたけど……"
41190-18 = "……早かったな。"
41190-19 = "も、もう扉のところまで……！？"
41190-20 = "これ、5分も持つかな……？"
41190-25 = "追い詰められた屋上、閉ざされた扉、その扉を叩く人々、そして中々来ないヘリ……"
41190-26 = "先週見たゾンビ映画と一緒だ、くひひ……。"
41190-27 = "……一応聞くけど、それどんな結末だった？"
41190-28 = "ヘリにぶら下がったゾンビのせいで、墜落して全滅。"
41190-29 = "聞いた私がバカだった！"
41190-30 = "で、でも、ここにゾンビはいないから……"
41190-32 = "……またしても貴様らか。"
41190-33 = "ぞ、ゾンビ！？"
41190-39 = "誰がゾンビだ。せめて公安局長と呼べ。"
41190-40 = "公安局長……！"
41190-41 = "扉が開いてないのに、どうやってここまで？"
41190-42 = "建物の外壁をよじ登ってきた。"
41190-43 = "マジかよ、10階建て超えてるぞここ……なんつー無茶を……。"
41190-44 = "そんな訓練ヴァルキューレには無いだろうに、ハーネスも無しで？"
41190-45 = "犯罪者を捕まえるためなら、公安局は何でもする。"
41190-46 = "まさかヴァルキューレに潜入しておいて、おとなしく帰れるとは思ってないだろうな？"
41190-50 = "貴様らはすでに包囲されたも同然。無駄な抵抗はやめろ。"
41190-52 = "……。"
41190-53 = "あんな目にあったばっかりで全く懲りないとは、気は確かか？"
41190-54 = "今のキヴォトスは、貴様らを必要としていない。無駄な抵抗をして、迷惑をかけ続けるのはやめろ。"
41190-55 = "こんな犯罪まがいのことをして、今度こそ連邦生徒会から学籍データを抹消させられても――"
41190-56 = "公安局長、そちらの犯罪についてはいかがお考えですか？"
41190-62 = "公安局の取引記録を発見しました。"
41190-63 = "「子ウサギタウン」の再開発のため、放浪者たちを追い出す。その代わりにカイザーグループとの間で違法リベートが発生していた……そうですね？"
41190-64 = "どうして、それを……。"
41190-65 = "そりゃ、いきなりヴァルキューレが新しい装備に変えたもんだから。何かあると思うのは自然なことだろ。"
41190-66 = "キヴォトスの治安を担当するヴァルキューレ警察学校が、私企業との取引において犯罪行為に手を染める……これは、確実に問題かと思われます。"
41190-67 = "連邦生徒会の定めた、公的な規則に従わない処理……公安局長、これをあなたが知らなかったはずがありません。"
41190-69 = "これはヴァルキューレ警察学校の理念に反する、重大な犯罪です！"
41190-75 = "っ……。"
41190-76 = "……本当に言いたい放題だな、貴様たちは。"
41190-77 = "公的な規則……そうだな。"
41190-78 = "貴様の言う通り、ヴァルキューレは公的な規則に従い、公正であるべきだろう。"
41190-79 = "……しかし世の中は、貴様らが思うほど公正ではない。"
41190-80 = "貴様らには特権がある。そしてその上で正義を論じている間に、私たちが何をしていたか知っているか。汚い現場で、どれだけ妥協に塗れながら公務を処理していたことか！"
41190-81 = "それが社会だ、現実だ！"
41190-82 = "手を汚さずに、正義を掲げ続けることなどできない！"
41190-83 = "貴様らのようなガキに、それが分かるか！その判断をせざるを得なかったこの気持ちが！"
41190-87 = "[ns] \"……カンナ。\""
41190-88 = "この声は……"
41190-89 = "……先生、あなたでしたか。"
41190-90 = "[s1] \"信念を貫くのは、大変かもしれない。それでも……\"\n[s2] \"最終的に自分の未来は、自分で判断し続けていくものだよ。\""
41190-91 = "それでも……自分の信念だけに従っていたら、私は全てを失ってしまう……！"
41190-92 = "それでも……自分の信念だけに従っていたら、私は全てを失ってしまう……！"
41190-93 = "こんな中途半端な立ち位置で！私には、何もできない！！"
41190-94 = "[s] \"RABBIT小隊のみんなは、ほぼゼロからのスタートだったよ。\""
41190-98 = "……。"
41190-99 = "[s] \"大丈夫。状況は大変だろうけど、辛いだろうけど。\""
41190-101 = "[ns] \"それでも行き先は、自分で決められるよ。\""
41190-107 = "……ふぅん、真っ当なこと言うじゃん。"
41190-108 = "でもそうだな、最後は自分で決めていくものだ。"
41190-109 = "ずっと不安で、怖かったけど……"
41190-110 = "ま、自分たちで決めたことだからね。"
41190-111 = "……ありがとうございます、先生。"
41190-119 = "公安局長。あなたが言う「正義」は、きっと間違っていないでしょう。ただ私が思うものとは、違うというだけで。"
41190-120 = "ですが、その根っこを誰かのせいにし続けていては、いつか色褪せてしまうと思います。「どんな判断をし続けてきたのか」、それがきっと……"
41190-121 = "[ruby=SRT]私たち[/ruby]と[ruby=ヴァルキューレ]、あなたの[/ruby]違いです。"
41190-122 = "……。"
41190-126 = "ミヤコ、お待たせ！ポイント上空に到着した！"
41190-127 = "……来ましたか。"
41190-128 = "総員、ハーネスを準備。順番に離脱します。"
41190-134 = "装着完了、上げて！"
41190-135 = "しっかり捕まってなっ！"
41190-140 = "……それでは失礼します、公安局長。"
41190-141 = "次回はできれば、もっと良い形で。"
41190-147 = "始末書を、用意しておくとするか。"
41190-149 = "子ウサギ公園"
41190-153 = "こちらRABBIT1、現在時刻0145。キャンプRABBITに到着。"
41190-154 = "負傷者無し、離脱者無し、「クローバー」も無事確保。"
41190-160 = "……作戦を終了します、お疲れ様でした。"
41190-161 = "[s] \"無事で良かった、お疲れさま。\""
41190-166 = "いやマジで疲れた、もう倒れそう……。"
41190-167 = "私も、"
41190-168 = "眠くて……もう……。"
41190-173 = "ミユ、いくら何でも装備くらい外せ……。"
41190-174 = "あと作戦報告書と、洗顔と、歯磨きと……。"
41190-175 = "それから、えっと……あー、もう無理……。"
41190-176 = "あー、疲れた……私も眠くなってきた。"
41190-177 = "とりあえず通信機器の電源だけ落として……。"
41190-184 = "みんな、頑張りましたもんね。"
41190-191 = "……ではお伝えした通り、「クローバー」は先生にお渡しします。"
41190-192 = "事件の黒幕は分かりませんでしたが……公安局長が取り込まれたほどです、相当頭の回る方がいる気がします。"
41190-193 = "大人の世界のことはまだ分かりませんが……まだ子どもである私にできることは、一旦ここまでです。"
41190-194 = "先生、後はお願いします。"
41190-195 = "[s] \"うん、任せて。\""
41190-197 = "（その後、眠った生徒たちをテントの中に運んでから、シャーレに戻った）"
41190-201 = "（……ミヤコから受け取った証拠品は、どうにかしておこう）"
41190-203 = "次回;狐穴"

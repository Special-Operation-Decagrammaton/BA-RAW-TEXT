[translation]
41190-1 = "Episode 19; Time to Grow Up"
41190-2 = "Valkyrie Police School Main Building Rooftop"
41190-4 = "RABBIT 1, reporting. Currently 0100 hours. We've arrived."
41190-5 = "Camp RABBIT, can we expect air support?"
41190-6 = "We're behind schedule because of the change in the rendezvous point."
41190-7 = "Hold tight for five minutes! We'll get you outta there!"
41190-8 = "Understood."
41190-9 = "RABBIT 2, seal off the passage to the rooftop and install barricades."
41190-14 = "Barricades are already up...and I've added anti-personnel mines for good measure."
41190-18 = "...Let's hope it holds up."
41190-19 = "Th-They're already at the rooftop door?"
41190-20 = "Are we gonna last five minutes?"
41190-25 = "A desperate situation, hostiles approaching and a barely barricaded door, waiting on tenterhooks for a helicopter..."
41190-26 = "Just like the zombie movie we watched last week."
41190-27 = "How did that movie end again?"
41190-28 = "All the zombies jumped on the helicopter making it crash and...everyone died?"
41190-29 = "That's not what I want to hear right now!"
41190-30 = "G-Good thing there's no zombies in real life..."
41190-32 = "...You again."
41190-33 = "EEEEK! A r-r-real zombie!"
41190-39 = "Seriously, you should really refer to me as the Public Peace Bureau director. Director, at the least."
41190-40 = "Director Kanna?!"
41190-41 = "All of the access points to the rooftop should be sealed. How did you get here?"
41190-42 = "I scaled the storm drains on the side of the building."
41190-43 = "...?! This building has to be at least ten stories."
41190-44 = "A student with no rappelling training and no equipment just free-climbed the side of a building?"
41190-45 = "The Public Peace Bureau's motto is to apprehend criminals at all costs."
41190-46 = "Did you think you could get away with this? I would just let you walk off into the sunset after infiltrating the very school in charge of Kivotos' policing?"
41190-50 = "There's nowhere to go now. Just come quietly."
41190-52 = "..."
41190-53 = "When are you children going to grow tired of your stupid games?"
41190-54 = "You need to face reality. Kivotos doesn't need the SRT anymore. It's an eyesore and, now, a public menace."
41190-55 = "I'll arrest you here and report all your sordid activities to the General Student Council. Not even the Chief of Staff will be able to stop your records from being expunged."
41190-56 = "I guess we'll go down together then, Director Kanna."
41190-62 = "The goal of our operation was to secure this Public Peace Bureau's ledger."
41190-63 = "This is evidence of the illegal rebates you received from the Kaiser Group in exchange for evicting the homeless population from Kousagi Town."
41190-64 = "How did you find out?"
41190-65 = "Valkyrie Police School was armed with the shabbiest, standard-issue gear and was already undergoing budget cuts. Of course it raises red flags when you show up with an arsenal all of a sudden."
41190-66 = "Being responsible for the security of Kivotos, Valkyrie Police School must conduct its official duties fairly in accordance with the rules set by the General Student Council. That's the trust the public has put in you."
41190-67 = "But you, the director of the Public Peace Bureau, turned this arm of justice into a petty mercenary squad, colluding with private corporations for your own benefit."
41190-69 = "This is a felony of the highest order and a slap in the face of the justice Valkyrie Police School supposedly claims!"
41190-75 = "...Why...."
41190-76 = "...Why do you little children always puff your chest out and tout your pretty, empty words?"
41190-77 = "Fairly and equally... The ideal of public service."
41190-78 = "Sure, Valkyrie Police School serves the public and should act accordingly."
41190-79 = "But guess what? The world isn't made of rainbows and butterflies."
41190-80 = "Discipline? Justice? Hah! You hide behind your immunity and look down on everyone else. But we were the ones getting our hands dirty every day to take care of business. THAT'S what the real world is! It's time to get your noses out of your textbooks!"
41190-81 = "Do you think this is what I want?! You think I like being the bad guy?"
41190-82 = "Ideals don't serve justice! Actions do, no matter what you have to do along the way!"
41190-83 = "What do sheltered children like you know? You don't know anything!"
41190-87 = "[ns] \"Those are all excuses, Kanna.\""
41190-88 = "Is that..."
41190-89 = "[USERNAME] Sensei..."
41190-90 = "[s1] \"The ends never justifies the means, Kanna. Ever.\"\n[s2] \"Beliefs mean nothing if you abandon them at the first hardship.\""
41190-91 = "You don't understand. I would've lost everything if I held onto my beliefs!"
41190-92 = "You don't understand. I would've lost everything if I held onto my beliefs!"
41190-93 = "I'm one small cog in the wheel! My hands are tied! What am I supposed to do, Sensei?!"
41190-94 = "[s] \"It was the same for the RABBIT Squad, you know.\""
41190-98 = "..."
41190-99 = "[s] \"Doing the right thing is never easy...\""
41190-101 = "[ns] \"But that's a decision you have to make for yourself.\""
41190-107 = "I guess our stupid Sensei does make good points here and there."
41190-108 = "That's right! No one can decide for you, but you!"
41190-109 = "W-We were scared and unsure when this all started..."
41190-110 = "But us crazies decided on the SRT, no matter what."
41190-111 = "...Thank you as always, Sensei."
41190-119 = "Director Kanna. One thing I've learned recently is that just because your definition of \"justice\" is different from mine, that doesn't mean it's wrong."
41190-120 = "But I can't abide by a corrupt justice wielded to dodge accountability and responsibility."
41190-121 = "That's the high, high wall between you and me."
41190-122 = "I..."
41190-126 = "Miyako, helicopter incoming!"
41190-127 = "Time flies when you're chatting with an old friend."
41190-128 = "Strap into your harnesses. RABBIT Squad, let's pull back!"
41190-134 = "We're locked in, let's go!"
41190-135 = "Hold on tight so you don't get left behind!"
41190-140 = "We'll be on our way, Director."
41190-141 = "I hope we meet again, under better circumstances."
41190-147 = "Well... I better get a head start on my apology letter for all this..."
41190-149 = "Kousagi Park"
41190-153 = "Current time is 0145 hours. This is RABBIT 1, arriving at Camp RABBIT."
41190-154 = "The operation yielded no casualties and the Clover has been secured."
41190-160 = "Which concludes Operation Clover. Excellent work, everyone."
41190-161 = "[s] \"I'm so proud of all of you!\""
41190-166 = "I'm exhausted. I could fall asleep right here."
41190-167 = "S-So sleepy..."
41190-168 = "I'm just gonna lay down right here..."
41190-173 = "Miyu, at the very least take off your gear before going to sleep."
41190-174 = "As well as write your operational reports and wash up for bed."
41190-175 = "Who am I to talk? I could fall asleep standing right now."
41190-176 = "As thrilling as all that adrenaline was... I'm ready to relax."
41190-177 = "Let me just...turn off the comms equipment...before I sleep..."
41190-184 = "Heehee. Everyone really put in their all today."
41190-191 = "And as we agreed on before, I'm entrusting the Clover to you, Sensei."
41190-192 = "We might have uncovered this evidence, but whoever is pulling the strings must be fairly powerful to have backed Director Kanna into a corner the way they did."
41190-193 = "We may be trained agents, but us students are still naive to the ways of this world. This is where our role ends."
41190-194 = "We'll leave the rest to you, Sensei."
41190-195 = "[s] \"Thanks, Miyako. I won't let your effort go to waste.\""
41190-197 = "(After helping move the sleeping students to their tents, I returned to Schale.)"
41190-201 = "(And proceeded to use the evidence from Miyako to handle things, as a teacher would.)"
41190-203 = "Next Episode; Fox in the Hole"

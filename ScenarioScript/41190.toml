[translation]
41190-1 = "ตอนที่ 19;เวลาของผู้ใหญ่"
41190-2 = "ดาดฟ้าอาคารส่วนกลาง สถาบันฝึกตำรวจวัลคิรี่"
41190-4 = "นี่คือ RABBIT 1 ขณะนี้เวลา 01:00 น. ฉันเพิ่งมาถึง[ruby=จุดรวมพล]จุด ORP[/ruby] เมื่อสักครู่ค่ะ"
41190-5 = "RABBIT ในค่าย การสนับสนุนทางอากาศยังมาไม่ถึงเหรอคะ?"
41190-6 = "จุดนัดพบถูกเปลี่ยน การขอเฮลิคอปเตอร์ก็เลยล่าช้าไปหน่อย!"
41190-7 = "แต่เดี๋ยวก็ถึงแล้วละ... รออีก 5 นาทีนะ!"
41190-8 = "รับทราบค่ะ"
41190-9 = "RABBIT 2 ช่วยปิดทางขึ้นดาดฟ้าทั้งหมดแล้ววางสิ่งกีดขวางไว้ด้วยค่ะ"
41190-14 = "ฉันวางสิ่งกีดขวางไว้ตั้งแต่เข้ามาแล้ว แล้วก็วางกับระเบิดสังหารเผื่อไว้ตรงบันไดด้วย--"
41190-18 = "สงสัยจะมาถึงกันแล้วละนะ..."
41190-19 = "พะ... พวกนั้นมาทุบประตูดาดฟ้าแล้ว!"
41190-20 = "เราจะต้านไว้ได้ถึง 5 นาทีไหมนะ...?"
41190-25 = "ประตูดาดฟ้าที่ถูกปิดสนิท คนที่มารุมทุบประตู และเฮลิคอปเตอร์ที่ยังมาไม่ถึง..."
41190-26 = "เหมือนหนังซอมบี้ที่ดูไปอาทิตย์ที่แล้วเลย ฮุฮุฮุ..."
41190-27 = "ตอนจบของหนัง... เป็นยังไงเหรอ?"
41190-28 = "ทุกคนตกลงมาตายเพราะฝูงซอมบี้มาเกาะเฮลิคอปเตอร์ไว้น่ะ"
41190-29 = "อย่าพูดอะไรเป็นลางสิ เราก็กำลังจะหนีเหมือนกันนะ!"
41190-30 = "ตะ... แต่ก็โชคดีที่ในชีวิตจริงไม่มีซอมบี้..."
41190-32 = "พวกเธออีกแล้วงั้นเหรอ..."
41190-33 = "ซะ... ซอมบี้ออกมาแล้ว!!"
41190-39 = "เรียกว่าหัวหน้ากรมฯ น่าจะดีกว่านะ"
41190-40 = "คุณคือ... หัวหน้ากรมฯ คันนะ!"
41190-41 = "ประตูขึ้นดาดฟ้าทุกบานถูกล็อกเอาไว้แล้วนี่นา แล้วขึ้นมาได้ยังไงกัน?"
41190-42 = "ก็ปีนท่อน้ำจากนอกอาคารขึ้นมาน่ะสิ"
41190-43 = "เป็นไปไม่ได้ นี่มันอาคารสูงเกิน 10 ชั้นเลยนะ!"
41190-44 = "คนที่ไม่มีแม้แต่ประสบการณ์โดดร่มจะปีนตึกสูงขึ้นมาได้โดยไม่มีสายรัดตัวเลยได้ยังไงกัน?"
41190-45 = "ไม่เคยได้ยินคำขวัญของกรมความมั่นคงสาธารณะมาก่อนเลยรึไง? พวกเราทำได้ทุกอย่างเพื่อให้จับ#nอาชญากรมาได้"
41190-46 = "คิดว่าบุกเข้ามาถึงอาคารส่วนกลางของโรงเรียนตำรวจที่มีหน้าที่ดูแลความสงบของคิโวทอสแล้วจะ#nออกไปได้ง่ายๆ งั้นเหรอ?"
41190-50 = "พวกเธอถูกล้อมไว้หมดแล้ว อย่าขัดขืนโดยเปล่าประโยชน์จะดีกว่า"
41190-52 = "......"
41190-53 = "ไม่เบื่อบ้างหรือไงที่คราวที่แล้วก็โดนจัดการไปอย่างสาหัสแล้วก็ยังจะมาสร้างปัญหาซ้ำซากอีก?"
41190-54 = "คิโวทอสไม่จำเป็นต้องพึ่งฝีมือของพวกเธออีกแล้วละ ที่มาเที่ยวเล่นแบบนี้รู้ไหมว่ามันรบกวนคนอื่น#nแค่ไหน?"
41190-55 = "ครั้งนี้เห็นทีฉันต้องแจ้งองค์การนักเรียนให้เพิกถอนระเบียนประวัติการศึกษาของพวกเธอแล้วละ"
41190-56 = "คุณเองก็ก่ออาชญากรรมที่ไม่สามารถยกโทษให้ได้เหมือนกันนะคะ หัวหน้ากรมฯ คันนะ"
41190-62 = "เราได้บันทึกการซื้อขายของกรมความมั่นคงสาธารณะมาจากปฏิบัติการครั้งนี้ค่ะ"
41190-63 = "และเราก็รู้แล้วว่าหัวหน้ากรมฯ ได้รับเงินคืนอย่างผิดกฎหมายจากทางไคเซอร์กรุ๊ป เพื่อเป็นค่าตอบ#nแทนในการขับไล่คนไร้บ้านออกจากโคะอุซางิ ทาวน์ค่ะ"
41190-64 = "นี่พวกเธอ... รู้เรื่องนี้ได้ยังไง"
41190-65 = "มันก็แน่อยู่แล้ว จู่ๆ นักเรียนโรงเรียนตำรวจที่เอาแต่ถืออาวุธเก่าคร่ำครึก็ได้อาวุธรุ่นใหม่มาใช้ คิดว่ามันไม่น่าสงสัยเกินไปหน่อยรึไง?"
41190-66 = "นักเรียนจากสถาบันฝึกตำรวจวัลคิรี่ควรต้องทำงานราชการเพื่อรักษาความสงบของคิโวทอสด้วยความ#nเที่ยงธรรมตามคำสั่งขององค์การนักเรียนค่ะ"
41190-67 = "แต่คนที่ต้องเป็นแบบอย่างที่ดีกับคนอื่นอย่างหัวหน้ากรมความมั่นคงสาธารณะกลับมารับสินบนและ#nสมรู้ร่วมคิดกับองค์กรธุรกิจเพราะความโลภของตัวเองแบบนี้..."
41190-69 = "นี่คืออาชญากรรมร้ายแรงที่สวนทางกับอุดมการณ์ของสถาบันฝึกตำรวจวัลคิรี่ค่ะ!"
41190-75 = "ทำไมกัน..."
41190-76 = "ทำไมพวกเธอถึงพูดแต่อะไรเอาแต่ใจแบบนี้ล่ะ?"
41190-77 = "งานราชการที่ดำเนินไปอย่างยุติธรรมเพื่อประชาชนทุกคนน่ะเหรอ..."
41190-78 = "ใช่แล้ว พวกเธอพูดถูก ตำรวจของวัลคิรี่ต้องยุติธรรมกับประชาชนทุกคน"
41190-79 = "แต่โลกนี้มันไม่ได้ยุติธรรมอย่างที่พวกเธอคิดหรอกนะ"
41190-80 = "ในตอนที่พวกเธอได้จุ่มเท้าลงในอภิสิทธิ์ยกเว้นความรับผิดชอบและอ้างถึงความยุติธรรม พวกเราต้อง#nออกไปทำงานราชการและเจรจาประนีประนอมในสถานที่แสนสกปรก นี่แหละคือสังคมที่แท้จริง!"
41190-81 = "พวกเธอคิดว่า... พอฉันเป็นหัวหน้าก็เลยอยากเอามือเข้าไปยุ่งเกี่ยวกับเรื่องสกปรกแบบนี้รึไง?"
41190-82 = "รู้ไว้ด้วยว่าเพื่อความยุติธรรม บางครั้งก็ต้องยอมให้ดินโคลนเปื้อนมือซะบ้าง!"
41190-83 = "พวกเธอน่ะ... เด็กน้อยอย่างพวกเธอไม่มีทาง...!"
41190-87 = "[ns] \"นั่นมันเป็นแค่ข้ออ้างนะคันนะ\""
41190-88 = "เสียงนี้มัน...?"
41190-89 = "คุณครู [USERNAME] เองเหรอคะ?"
41190-90 = "[s1] \"การรักษาความศรัทธาไม่ใช่เรื่องง่ายนะ\"\n[s2] \"แต่ถ้ายอมแพ้ก็ไม่มีอะไรเปลี่ยนแปลงหรอก\""
41190-91 = "แต่ว่า... ถ้าทำตามศรัทธาของตัวเอง ฉันก็อาจต้องสูญเสียทุกอย่างไป..."
41190-92 = "แต่ว่า... ถ้าทำตามศรัทธาของตัวเอง ฉันก็อาจต้องสูญเสียทุกอย่างไป..."
41190-93 = "แค่หัวหน้าอย่างฉันจะไปทำอะไรได้ล่ะคะ!"
41190-94 = "[s] \"เรื่องของกองทหาร RABBIT ก็เหมือนกัน\""
41190-98 = "..."
41190-99 = "[s] \"ครูรู้ว่ามันไม่ง่ายหรอก...\""
41190-101 = "[ns] \"แต่ตัวเธอสามารถตัดสินใจได้\""
41190-107 = "คุณครูก็พูดอะไรดีๆ เป็นกับเขาด้วยนะ"
41190-108 = "ใช่แล้ว เราเป็นคนกำหนดอนาคตของตัวเอง"
41190-109 = "ตอนที่พวกเราตัดสินใจว่าจะไปพักในสวนสาธารณะก็รู้สึกกระวนกระวายและกลัวเหมือนกัน..."
41190-110 = "แต่เราก็ตัดสินใจเลือก SRT เอง และกำหนดอนาคตเองด้วย!"
41190-111 = "ขอบคุณที่ช่วยพูดแบบนี้นะคะคุณครู"
41190-119 = "หัวหน้ากรมฯ คันนะ ความยุติธรรมของคุณอาจแตกต่างจากของพวกฉัน แต่มันไม่ได้ผิดหรอกค่ะ"
41190-120 = "แต่หากคุณโยนความผิดให้คนอื่นเพราะข้อแก้ตัวนั้น ความยุติธรรมของคุณก็จะหายไปในที่สุดค่ะ"
41190-121 = "และนี่คือความแตกต่างระหว่าง[ruby=SRT]พวกฉัน[/ruby]กับ[ruby=วัลคิรี่]คุณ[/ruby]ค่ะ"
41190-122 = "ฉัน..."
41190-126 = "มิยาโกะ เฮลิคอปเตอร์มาถึงแล้ว!"
41190-127 = "ถึงเวลาแล้วสินะคะ"
41190-128 = "ทุกคนเตรียมผูกชุดที่นั่ง เราจะออกไปแบบกลับลำดับกันค่ะ"
41190-134 = "ผูกชุดที่นั่งเรียบร้อย! ดึงขึ้นไปเลย!"
41190-135 = "จับให้แน่นๆ จะได้ไม่มีใครตก!"
41190-140 = "งั้นขอตัวก่อนนะคะหัวหน้ากรมฯ คันนะ"
41190-141 = "คราวหน้าหวังว่าจะได้เจอกันด้วยเรื่องดีๆ นะคะ"
41190-147 = "สงสัยต้องเตรียมหนังสือรายงานข้อผิดพลาดไว้ล่วงหน้าแล้วสินะ"
41190-149 = "โคะอุซางิ การ์เด้น"
41190-153 = "ขณะนี้เวลา 01:45 น. RABBIT 1 กลับมาถึงที่ค่าย RABBIT แล้วค่ะ"
41190-154 = "เราได้ <โคลเวอร์> กลับมาอย่างปลอดภัย และไม่มีสมาชิกคนไหนรั้งท้ายหรือได้รับบาดเจ็บค่ะ"
41190-160 = "ขอสิ้นสุดปฏิบัติการโคลเวอร์ในวันนี้เพียงเท่านี้ ทุกคนทำได้ดีมากค่ะ"
41190-161 = "[s] \"ทุกคนทำได้ยอดเยี่ยมมาก!\""
41190-166 = "เฮ้อ... เหนื่อยจัง เหนื่อยแบบตะโกน เหนื่อยจนจะเป็นลมแล้ว..."
41190-167 = "ฉันก็ด้วย... ฉันง่วงมากเลย..."
41190-168 = "ง่วงจนแทบจะลงไปนอนกับพื้นได้เลย..."
41190-173 = "มิยุ ถึงจะเหนื่อยแค่ไหนแต่ก็ต้องปลดอาวุธกับอุปกรณ์ก่อนนอนสิ..."
41190-174 = "แล้วก็ต้องเขียนรายงานผลการปฏิบัติการ ล้างหน้า แล้วก็แปรงฟัน..."
41190-175 = "ไม่ไหวอะ... ฉันก็เพลียมากเหมือนกัน... ทนต่อไปไม่ไหวแล้ว..."
41190-176 = "ฉันก็ง่วงมากเลย... สงสัยร่างกายจะผ่อนคลายจากความเครียดน่ะ..."
41190-177 = "แต่ฉันต้องปิดอุปกรณ์สื่อสาร... แล้วค่อยนอน..."
41190-184 = "ฮุฮุ ทุกคนคงเหนื่อยกับปฏิบัติการจนง่วงกันสินะคะ"
41190-191 = "ฉันจะฝาก <โคลเวอร์> ไว้กับคุณครูตามที่ได้บอกไว้ก่อนเริ่มปฏิบัติการค่ะ"
41190-192 = "ถึงเราจะหาผู้อยู่เบื้องหลังของเหตุการณ์ไม่ได้ แต่หากเขาคนนั้นเกลี้ยกล่อมหัวหน้ากรมความมั่นคง#nสาธารณะได้ ก็คงจะเป็นคนมีอำนาจมากมายเกินกว่าเราจะคาดเดาได้ค่ะ"
41190-193 = "เด็กๆ ที่ไม่อาจเข้าใจโลกของผู้ใหญ่อย่างพวกฉันคงทำได้แค่เท่านี้ค่ะ"
41190-194 = "ถ้างั้นขอฝากจัดการเรื่องที่เหลือด้วยนะคะคุณครู"
41190-195 = "[s] \"ครูจะรับช่วงต่อเอง\""
41190-197 = "(จากนั้นคุณครูก็พานักเรียนที่ผล็อยหลับเข้าไปในเต็นท์แล้วกลับมาที่ชาเล่ต์)"
41190-201 = "(และจัดการหลักฐานที่รับมาจากมิยาโกะด้วยวิธีของผู้ใหญ่...)"
41190-203 = "ตอนต่อไป;จิ้งจอกในถ้ำ"

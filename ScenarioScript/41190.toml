[translation]
41190-1 = "第19話;大人的時間"
41190-2 = "女武神警察學園．屋頂"
41190-4 = "這裡是RABBIT1，現在時刻0100。現正[ruby=Objective Rally Point]抵達ORP。[/ruby]"
41190-5 = "營地RABBIT，航空支援還沒好嗎？"
41190-6 = "抱歉，因為變更了集合點，稍微有點延誤！"
41190-7 = "再等5分鐘！"
41190-8 = "了解。"
41190-9 = "RABBIT2，拜託你設置路障了。封鎖通往屋頂的通道。"
41190-14 = "已經做好了。以防萬一，也有在樓梯設置地雷……"
41190-18 = "……真快呢。"
41190-19 = "已，已經到門前了……！？"
41190-20 = "這個，可以撐5分鐘嗎……？"
41190-25 = "被逼進絕路的屋頂、被關上的門、一群人敲著門，還有遲遲不來的直升機……"
41190-26 = "和上週看的殭屍電影一樣呢，咕嘻嘻……"
41190-27 = "……姑且問一下，結局怎樣了？"
41190-28 = "直升機被殭屍抓住，墜落全滅了。"
41190-29 = "我真蠢，早知道就不問了！"
41190-30 = "可，可是，這裡沒有殭屍……"
41190-32 = "……又是你們嗎。"
41190-33 = "殭，殭屍！？"
41190-39 = "誰是殭屍啊。至少也該叫我公安局長。"
41190-40 = "公安局長……！"
41190-41 = "明明門沒有打開，是怎麼來到這裡的？"
41190-42 = "爬著建築物的外牆上來的。"
41190-43 = "真的假的，這裡超過10樓耶……真是亂來……"
41190-44 = "女武神明明沒有那種訓練，連繩索都沒用？"
41190-45 = "為了抓住犯罪者，公安局什麼都會做。"
41190-46 = "該不會以為潛入了女武神，會老實放你們回去吧？"
41190-50 = "你們已經和被包圍了沒兩樣。別做無謂的抵抗了。"
41190-52 = "……"
41190-53 = "才剛遭遇那種事竟然還沒學乖，你們腦袋正常嗎？"
41190-54 = "現在的奇普托斯，不需要你們。不要做無謂的抵抗，繼續添麻煩了。"
41190-55 = "做這種近乎犯罪的事情，這次就算真的被聯邦學生會抹消學籍資料也不──"
41190-56 = "公安局長，關於你們的犯罪行為，你又是怎麼想的呢？"
41190-62 = "我們發現了公安局的交易記錄。"
41190-63 = "為了「兔寶寶鎮」的都更而趕走遊民。相對的也和凱薩集團之間產生違法回扣……沒錯吧？"
41190-64 = "為什麼你們會……"
41190-65 = "看到女武神突然就換了新裝備，自然就會認為有鬼吧。"
41190-66 = "承擔奇普托斯治安的女武神警察學園，和私人企業的交易染上犯罪行為……我認為這是個很確實的問題。"
41190-67 = "不遵從聯邦學生會定下的官方規則，該如何處置……公安局長，你不可能會不知道。"
41190-69 = "這是違反女武神警察學園理念的，重大犯罪！"
41190-75 = "嘖……"
41190-76 = "……你們還真是口無遮攔呢。"
41190-77 = "官方規則……也是呢。"
41190-78 = "就如你說的，女武神必須遵從官方規則，保持公正。"
41190-79 = "……然而這世上，沒有你們所想的那麼公正。"
41190-80 = "你們擁有特權。#n然而在你們高談正義的同時，真的知道我們都在做什麼嗎。#n知道我們在骯髒的現場處理公務時，被迫妥協了多少次嗎！"
41190-81 = "這就是社會，是現實！"
41190-82 = "不可能在不弄髒手的情況下宣揚著正義！"
41190-83 = "你們這些小鬼能理解嗎！這種不得不出此下策的心情！"
41190-87 = "[ns] 「……環奈。」"
41190-88 = "這個聲音是……"
41190-89 = "……老師，是你啊。"
41190-90 = "[s1] 「貫徹信念雖然很辛苦。即使如此……」\n[s2] 「自己的未來，最終還是要自己持續做出判斷的。」"
41190-91 = "就算如此……只遵從自己的信念的話，我就會失去一切……"
41190-92 = "就算如此……只遵從自己的信念的話，我就會失去一切……"
41190-93 = "在這種半吊子的立場！我什麼都做不到！！"
41190-94 = "[s] 「RABBIT小隊的大家，幾乎是從零開始的。」"
41190-98 = "……"
41190-99 = "[s] 「沒關係。雖然狀況很艱辛，會感到難受。」"
41190-101 = "[ns] 「但是自己的目標，還是能由自己來決定的。」"
41190-107 = "……哼，這句話很有道理嘛。"
41190-108 = "不過確實，最後是由自己決定的。"
41190-109 = "雖然一直很不安，很恐怖……"
41190-110 = "但畢竟是我們自己決定的事呀。"
41190-111 = "……謝謝你，老師。"
41190-119 = "公安局長，你所說的「正義」想必是正確的吧。#n只是和我們所想的有所不同而已。"
41190-120 = "但是，如果為此一直將過錯歸咎於他人，總有一天也會變得黯淡無光的吧。#n「做出了什麼樣的判斷」，我想這一定就是……"
41190-121 = "[ruby=SRT]我們[/ruby][ruby=女武神]和你的[/ruby]不同之處。"
41190-122 = "……"
41190-126 = "都子，久等了！到達會合點上空了！"
41190-127 = "……來了嗎。"
41190-128 = "全員，準備繩索。照順序脫離。"
41190-134 = "裝備完成，拉上去！"
41190-135 = "好好抓緊啦！"
41190-140 = "……那我們失陪了，公安局長。"
41190-141 = "希望下次能在更好的情境下碰面。"
41190-147 = "去準備悔過書吧。"
41190-149 = "兔寶寶公園"
41190-153 = "這裡是RABBIT1，現在時刻0145。到達營地RABBIT。"
41190-154 = "無人受傷、無人脫隊，「幸運草」也順利確保。"
41190-160 = "……作戰結束，辛苦了。"
41190-161 = "[s] 「沒事真是太好了，辛苦了。」"
41190-166 = "真的累死了，我快不行了……"
41190-167 = "我也，"
41190-168 = "好睏……已經……"
41190-173 = "美優，好歹先脫下裝備吧……"
41190-174 = "還有作戰報告書、洗臉、刷牙……"
41190-175 = "然後還有，那個……啊～不行了……"
41190-176 = "啊～好累……我也開始睏了。"
41190-177 = "總之先把通訊器材的電源關掉……"
41190-184 = "畢竟剛才大家都很努力呢。"
41190-191 = "……那就照之前所說，將「幸運草」交給老師了。"
41190-192 = "雖然不清楚事件的幕後黑手……但既然能拉攏公安局長，看來有個相當聰明的人。"
41190-193 = "雖然還不清楚大人世界的事情……還只是孩子的我能做的，暫時就到此為止了。"
41190-194 = "老師，之後就拜託你了。"
41190-195 = "[s] 「嗯，交給我吧。」"
41190-197 = "（之後，將睡著的學生們搬進帳篷，回到了夏萊）"
41190-201 = "（……晚點再想想要怎麼處理都子交付的證物吧）"
41190-203 = "下一話;狐穴"

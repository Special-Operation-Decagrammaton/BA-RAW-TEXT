[translation]
1007005-1 = "หนังฟิล์มนัวร์ในวันที่ฝนพรำ"
1007005-3 = "(คุณครูเดินทางกลับหลังจากเสร็จธุระที่ซานไห่จิง)"
1007005-6 = "[ns] \"เอ๋... ท้องฟ้ามัน...?\""
1007005-8 = "(ซ่าาาาาาา!)"
1007005-12 = "[ns] \"เอ๋ จู่ๆ ก็ฝนตกซะงั้น!\""
1007005-13 = "ดูท่าจะต้องการร่มนะ คุณครู?"
1007005-14 = "[s] \"มินะ!\""
1007005-19 = "[ns] \"เธอรู้ว่าฝนจะตกเหรอ?\""
1007005-20 = "ฮึ... ฉันมักจะรู้สึกเจ็บแผลเวลาที่ฝนจะตกน่ะ"
1007005-21 = "[s] (ไม่เข้าใจว่าพูดเรื่องอะไร... อยู่นิ่งๆ ดีกว่า...)"
1007005-26 = "งั้นไปกันเลยมั้ย เดี๋ยวฉันไปส่งคุณครูเอง"
1007005-34 = "(คุณครูกับมินะเดินบนถนนในซานไห่จิงด้วยกันท่ามกลางสายฝนพรำ)"
1007005-35 = "(สีหน้าของมินะ... เหมือนกำลังสนุกสุดๆ)"
1007005-36 = "[s1] \"อันนี้ถามเฉยๆ นะ\"\n[s2] \"มินะชอบวันฝนตกเหรอ?\""
1007005-39 = "หืม?"
1007005-40 = "อืม... ถ้าจะให้พูดละก็นะ"
1007005-43 = "― [log=미나]ใช่... ฉันชอบบรรยากาศในวันฝนตกนะ[/log][wa:3260] "
1007005-45 = "― [log=미나]หลายๆ อย่าง มันดูเรียบง่ายดี[/log][wa:820] "
1007005-48 = "― [log=미나]ขาวกับดำ[/log][wa:2080] "
1007005-50 = "― [log=미나]เป็นโลกของฟิล์มนัวร์[/log][wa:170] "
1007005-53 = "― [log=미나]โลกในความเป็นจริง...[/log][wa:240] "
1007005-55 = "― [log=미나]เต็มไปด้วยแสงระยิบระยับจนแสบตา[/log][wa:10] "
1007005-58 = "― [log=미나]แต่คนส่วนใหญ่กลับไม่ตระหนักถึงความเป็นจริงนั้น...[/log][wa:2400] "
1007005-60 = "― [log=미나]แม้แต่ตัวฉันเอง... ก็ไม่มีข้อยกเว้น[/log][wa:40] "
1007005-63 = "― [log=미나]แต่โลกของฟิล์มนัวร์ มันไม่เป็นแบบนั้น[/log][wa:2020] "
1007005-65 = "― [log=미나]อย่างน้อยมันเป็นโลกที่เข้าใจได้ง่าย[/log][wa:460] "
1007005-68 = "― [log=미나]มัน... ไม่ได้หวือหวาอะไร[/log][wa:2000] "
1007005-70 = "― [log=미나]ขอแค่มีร่มกันฝนที่มีสีสันสดใส[/log][wa:3120] "
1007005-73 = "― [log=미나]เพื่อไม่ให้หลงทางก็พอ[/log][wa:380] "
1007005-78 = "[ns3] \"ร่มสีฉูดฉาดก็ดีเหมือนกันนะ\"\n[ns4] \"ครูก็ชอบร่มที่มีสีสันเหมือนกัน\""
1007005-81 = "ใช่มั้ยล่ะ? นั่นแหละคือสิ่งที่ฉันรู้สึกเวลาที่มองท่านประมุขคิซากิ"
1007005-82 = "[s] \"คิซากิเหรอ?\""
1007005-83 = "ฉันตัดสินใจเข้ามังกรดำเพราะประมุขอยู่ที่นั่นเลยนะ"
1007005-84 = "ฉันไม่ได้สนใจเรื่องชื่อเสียง เงินทองอะไรพวกนั้นหรอก เพราะของพวกนั้นก็แค่ภาพลวงตาที่ไม่นาน#nก็เลือนลางและจางหายไป"
1007005-85 = "แต่ความโหดหินและความร้ายกาจของท่านประมุขนี่สิ... คือของจริง!"
1007005-86 = "เสน่ห์เฉพาะตัวที่ทำให้ผู้อื่นยอมศิโรราบจนยอมคุกเข่าคารวะ! แต่ก็ยังเป็นคนที่มีจิตใจกว้างขวางที่#nยอมรับฟังความเห็นของผู้อื่น"
1007005-87 = "แถมเป็นคนร่างเล็กพอดีอ้อมกอดด้วยนะ! สุดยอดเลยไม่ใช่เหรอ?"
1007005-88 = "ไม่ใช่แค่ฉันนะ สมาชิกมังกรดำส่วนใหญ่ก็มาเข้าร่วมกันเพราะท่านประมุขนี่แหละ!"
1007005-92 = "[ns] (กลุ่มมังกรดำเป็นแฟนคลับของคิซากิหรอกเหรอเนี่ย...)"
1007005-93 = "อะแฮ่ม ตอนนี้ทำตัวเท่ไม่ออกเลย ขอโทษด้วยนะ"
1007005-94 = "เอาเป็นว่าชีวิตคนเราต้องการร่มสีสันสดใสนั่นแหละนะ"
1007005-95 = "[s] \"ใช่แล้ว ต้องการวันฝนตกด้วย\""
1007005-96 = "คุณครูเองก็คงพอเข้าใจอะไรอยู่เหมือนกันสินะเนี่ย"
1007005-97 = "บางครั้งเวลาที่คุยกับคุณครู บางครั้งฉันก็ประหลาดใจเหมือนกันนะ"
1007005-98 = "คุณครูทำให้ฉันพูดเรื่องที่ไม่คิดจะพูดและเรื่องที่ไม่ค่อยพูดในเวลาปกติออกมาได้..."
1007005-102 = "หืม...? ทำอะไรเหรอ คุณครู?! จู่ๆ ทำไมถึง...?"
1007005-103 = "[s5] \"เอาจริงครูก็ชอบความรู้สึกตอนตากฝนเหมือนกันนะ\"\n[s6] \"ครูชอบเต้นท่ามกลางสายฝนพร้อมกับร้องเพลงไปด้วย\""
1007005-106 = "..."
1007005-107 = "อ่า นั่นสินะ"
1007005-108 = "ฉันเคยเห็นฉากนี้ในหนังสมัยก่อน"
1007005-109 = "อะไรกันเนี่ยคุณครู รู้อะไรหลายอย่างเลยนี่นา"
1007005-110 = "อ่า... เป็นวันที่ดีจริงๆ เลยนะ"
1007005-111 = "เหมาะจะเต้นแท็ปแดนซ์...!"
1007005-112 = "ฮ่ะฮ่ะฮ่า อ่ะฮะฮะฮะ...!"
1007005-117 = "(มินะวิ่งมาหาพร้อมกับรอยยิ้มสดใส)"
1007005-118 = "(จากนั้นคุณครูกับมินะเต้นท่ามกลางสายฝนโปรยปรายอยู่พักใหญ่)"

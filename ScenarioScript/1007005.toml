[translation]
1007005-1 = "雨空之色"
1007005-3 = "（結束山海經的行政工作後，在回去的路上……）"
1007005-6 = "[ns]「咦……？」"
1007005-8 = "（唰唰）"
1007005-12 = "[ns]「是雷陣雨嗎……？」"
1007005-13 = "需要來把傘嗎，老師？"
1007005-14 = "[s]「美奈！」"
1007005-19 = "[ns]「你知道會下雨嗎？」"
1007005-20 = "呵呵……是舊傷告訴我的。"
1007005-21 = "[s]（……現在就先不要多問吧）"
1007005-26 = "那麼……現在這種天氣，就讓我來送老師一程吧。"
1007005-34 = "（就這樣，和美奈一起走在雨中的山海經）"
1007005-35 = "（總覺得美奈的側臉看起來似乎很高興）"
1007005-36 = "[s1]「難道……」\n[s2]「美奈喜歡雨天嗎？」"
1007005-39 = "嗯？"
1007005-40 = "要說喜不喜歡的話……"
1007005-43 = "― [log=미나]這個嘛……我喜歡雨天的景色。[/log][wa:3980] "
1007005-45 = "― [log=미나]許多事物看起來都單純許多。[/log][wa:1420] "
1007005-48 = "― [log=미나]白與黑──[/log][wa:2200] "
1007005-50 = "― [log=미나]黑色電影的世界。[/log][wa:650] "
1007005-53 = "― [log=미나]這個世界，[/log][wa:840] "
1007005-55 = "― [log=미나]是由過於耀眼的光彩所構成。[/log][wa:660] "
1007005-58 = "― [log=미나]然而，人們卻沒有認知到這個事實……[/log][wa:3680] "
1007005-60 = "― [log=미나]即便是我也不例外。[/log][wa:1080] "
1007005-63 = "― [log=미나]但黑色電影的世界不一樣。[/log][wa:3020] "
1007005-65 = "― [log=미나]至少……很簡單明瞭。[/log][wa:1460] "
1007005-68 = "― [log=미나]只不過……也對。[/log][wa:2640] "
1007005-70 = "― [log=미나]至少雨傘這樣的東西……為了避免迷路，[/log][wa:3560] "
1007005-73 = "― [log=미나]還是亮色的比較好吧。[/log][wa:820] "
1007005-78 = "[ns3]「確實，如果有一把亮色雨傘的話……」\n[ns4]「就能成為路標。」"
1007005-81 = "──就像門主大人一樣。"
1007005-82 = "[s]「妃姬……？」"
1007005-83 = "沒錯。我之所以加入玄龍門，就是因為門主大人。"
1007005-84 = "金錢與名譽什麼的都無所謂。#n那些東西都是終將消散的……幻象罷了。"
1007005-85 = "但是門主大人的冷硬派精神是貨真價實的！"
1007005-86 = "不禁讓人伏首稱臣的領袖魅力！#n以及能夠傾聽大家意見的包容力！"
1007005-87 = "再加上一旦抱入懷中就彷彿會壞掉的，那奢華的姿態！#n這個反差是無敵的吧！？"
1007005-88 = "可，可不只有我這麼想哦。#n成員們幾乎都是因為門主大人的魅力而集結起來的！"
1007005-92 = "[ns]（玄龍門是妃姬的粉絲俱樂部嗎……？）"
1007005-93 = "……咳咳。#n抱歉，稍微有些失態了。"
1007005-94 = "總之……人生需要亮色的雨傘。"
1007005-95 = "[s]「說的沒錯。當然，雨天也是一樣。」"
1007005-96 = "……呵。#n你很懂嘛，老師。"
1007005-97 = "和老師說話的時候……有時會有股不可思議的心情。"
1007005-98 = "就連自己本來沒有想說出來的部分也能自然地說出口。"
1007005-102 = "怎麼了嗎，為什麼突然跑了出去？#n雨可還沒停啊，老師。"
1007005-103 = "[s5]「老實說，我也喜歡下雨。」\n[s6]「在雨中唱歌、跳舞。」"
1007005-106 = "……"
1007005-107 = "啊……這樣啊。"
1007005-108 = "記得以前也有在電影裡看過。"
1007005-109 = "什麼嘛，老師果然也很了解電影啊。"
1007005-110 = "啊啊……今天真是個好日子。"
1007005-111 = "是踢踏舞的好日子……！"
1007005-112 = "啊哈哈，哈哈……哈哈哈……！"
1007005-117 = "（美奈帶著開朗的微笑跑了過來）"
1007005-118 = "（大雨之中，兩人在專屬於彼此的舞台上舞動著）"

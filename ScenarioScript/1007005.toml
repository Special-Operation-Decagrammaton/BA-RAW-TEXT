[translation]
1007005-1 = "Noir on a Rainy Day"
1007005-3 = "I was on my way back after wrapping up some administrative work at Shanhaijing..."
1007005-6 = "[ns] \"Those clouds...\""
1007005-8 = "*rain pouring*"
1007005-12 = "[ns] \"Whoa, it's pouring!\""
1007005-13 = "Looks like you could use an umbrella."
1007005-14 = "[s] \"Mina!\""
1007005-19 = "[ns] \"You knew it was going to rain?\""
1007005-20 = "Heh... My old war wounds ache before a storm."
1007005-21 = "[s] \"(Old war wounds, huh...?)\""
1007005-26 = "I'll walk you home, Sensei. Shall we?"
1007005-34 = "And so, Mina and I strolled along the rainy streets of Shanhaijing."
1007005-35 = "Her expression was one of barely concealed joy..."
1007005-36 = "[s1] \"This is some weather...\"\n[s2] \"You like the rain, don't you?\""
1007005-39 = "Hm?"
1007005-40 = "Well, you see..."
1007005-43 = "― [log=미나]That's right... I love the world of rainy days.[/log][wa:2660] "
1007005-45 = "― [log=미나]Everything becomes so simple.[/log][wa:780] "
1007005-48 = "― [log=미나]Black and white.[/log][wa:1760] "
1007005-50 = "― [log=미나]The world of noir...[/log][wa:170] "
1007005-53 = "― [log=미나]The real world is[/log][wa:360] "
1007005-55 = "― [log=미나]so bright and colorful, it's blinding.[/log][wa:10] "
1007005-58 = "― [log=미나]But most people don't realize this truth...[/log][wa:2640] "
1007005-60 = "― [log=미나]And I'm no exception.[/log][wa:600] "
1007005-63 = "― [log=미나]But the world of noir is not like that.[/log][wa:1940] "
1007005-65 = "― [log=미나]It's easy to understand.[/log][wa:900] "
1007005-68 = "― [log=미나]But...then again...[/log][wa:2200] "
1007005-70 = "― [log=미나]An umbrella, at least, should be bright and colorful[/log][wa:2200] "
1007005-73 = "― [log=미나]so you never lose your way.[/log][wa:140] "
1007005-78 = "[ns3] \"It's nice to have something bright to follow.\"\n[ns4] \"I do enjoy an eye-catching umbrella.\""
1007005-81 = "Right? That's how I feel about Madam Kisaki."
1007005-82 = "[s] \"How's that?\""
1007005-83 = "Madam Kisaki is the reason I joined Genryumon."
1007005-84 = "I don't care about money or fame. Those things fade away in the end."
1007005-85 = "But the president... She's a hard-boiled operator to the core!"
1007005-86 = "She's got charisma to bring you to your knees, but she's always willing to hear you out!"
1007005-87 = "And she's got a great build for giving a nice big hug. Isn't that the best?"
1007005-88 = "It's not just me. Most of Genryumon have come together because of her."
1007005-92 = "[ns] \"(I didn't realize Genryumon was a Kisaki fan club...)\""
1007005-93 = "Ahem. I lost my cool for a moment there. Apologies."
1007005-94 = "But yes, you need a brightly colored umbrella in your life."
1007005-95 = "[s] \"Yes. Even in the noir of a rainstorm.\""
1007005-96 = "...You're pretty sharp, Sensei. "
1007005-97 = "You always have something interesting to say."
1007005-98 = "And we get to talk about all kinds of things I'd never think of, or wouldn't be able to say normally..."
1007005-102 = "Huh...? Where are you going, Sensei? The umbrella...!"
1007005-103 = "[s5] \"I actually like the feel of the rain.\"\n[s6] \"I'm in the mood to sing! And dance!\""
1007005-106 = "..."
1007005-107 = "I get it..."
1007005-108 = "I saw this in an old movie once."
1007005-109 = "Sensei, you really do know your stuff."
1007005-110 = "Ah... What a great day."
1007005-111 = "A great day for tap dancing!"
1007005-112 = "Hahaha. Hahahaha!"
1007005-117 = "Mina's face lit up as she ran towards me."
1007005-118 = "We wiled away the time singing and dancing in the rain."

[translation]
84312100500-5 = "ขอโทษนะคะ ชมรมพัฒนาเกมทุกคน"
84312100500-6 = "พอดีวันนี้เป็นวันสุดท้ายแล้ว ฉันเลยอยากมาบอกลา..."
84312100500-10 = "ทุกคนคะ...?"
84312100500-16 = "คอนโทรลเลอร์ของฉันหายไปไหนแล้ว!!"
84312100500-17 = "ตัวเองทำหายเอง แล้วมาโมโหทำไมเนี่ย อีกอย่าง นั่นไม่ใช่คอนโทรลเลอร์ของพี่สักหน่อย"
84312100500-18 = "คอนโทรลเลอร์ของเราต่างหาก!!"
84312100500-20 = "ทะ... ทั้งสองคนใจเย็นๆ กันก่อน..."
84312100500-22 = "(คอนโทรลเลอร์เหรอ...?)"
84312100500-26 = "มีเรื่องอะไรกันเหรอคะ?"
84312100500-33 = "อ๊ะ...!! ราชาจอมโจร!!"
84312100500-34 = "เข้ามาตอนไหนคะเนี่ย!? อาริสึไม่รู้เลยค่ะว่าเข้ามา ไม่ได้ยินเสียงอะไรเลยค่ะ! ครั้งนี้ก็ย่องเบาเข้ามาได้อย่างยอดเยี่ยมเลยนะคะ!!"
84312100500-36 = "ขอบคุณค่ะ..."
84312100500-37 = "เอ๋ คนใหญ่คนโตจากทรีนิตี้... มีธุระอะไรที่นี่เหรอคะ?"
84312100500-38 = "อ้อ ไม่ต้องสนใจเรื่องที่พวกฉันคุยกันเมื่อกี้นะคะ แค่พี่โมโมอิทำคอนโทรลเลอร์หายไปอันหนึ่ง ก็เลยเล่นเกมไม่ได้น่ะค่ะ"
84312100500-39 = "ไม่ได้ทำหายสักหน่อย มันโดนขโมยไปต่างหาก! มีคนนอกเข้ามาขโมยไปแน่ๆ!!"
84312100500-40 = "เราคือผู้ประสบภัยนะ!! นี่คือเหตุปล้นสะดม เชื่อฉันสิ!!"
84312100500-41 = "พูดอะไรให้มันเข้าท่าหน่อยเถอะพี่... "
84312100500-42 = "..."
84312100500-43 = "ระ... เราไปดูรอบๆ อีกครั้งดีกว่าค่ะ บางทีมันอาจจะอยู่ใกล้ๆ แต่เราสังเกตไม่เห็นก็ได้ค่ะ"
84312100500-45 = "หาสมบัติ...! ไม่สิ ถ้าเป็นโจร ก็ต้องล่าสมบัติ!!"
84312100500-46 = "นี่คือเควสล่าสมบัติค่ะ!!"
84312100500-53 = "หืม?"

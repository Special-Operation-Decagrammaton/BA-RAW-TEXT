[translation]
84312100500-5 = "打擾了，遊戲開發部的各位。"
84312100500-6 = "今天是最後一天，所以我是來道……"
84312100500-10 = "……各位？"
84312100500-16 = "到底跑哪去了？我的手把啊──！！"
84312100500-17 = "為什麼是弄丟的人在生氣啊？而且那又不是姐姐的手把。"
84312100500-18 = "我們的手把啊──！！"
84312100500-20 = "你，你們兩個都先冷靜一點……"
84312100500-22 = "（……手把？）"
84312100500-26 = "發生什麼事了嗎？"
84312100500-33 = "……啊啊！！#n是盜賊！盜賊王！！"
84312100500-34 = "你是什麼時候來的！？愛麗絲完全沒有發現！#n就連一點聲音也沒有！這次也展現了厲害的隱身能力呢！！"
84312100500-36 = "……謝謝你。"
84312100500-37 = "咦？三一的高層……您怎麼會來這裡？"
84312100500-38 = "啊，請不用在意我們剛才說的話。#n只是姐姐他弄丟了一個手把，所以沒辦法玩遊戲而已。"
84312100500-39 = "不是我弄丟，是被人偷走了！#n肯定是被外來人士偷走的沒錯！！"
84312100500-40 = "發生事件！！是潛入行動事件！！"
84312100500-41 = "可以說我聽得懂的話嗎，姐姐…… "
84312100500-42 = "……"
84312100500-43 = "我，我先在附近再找找看吧。#n很可能是在意外靠近的地方卻被忽略掉了。"
84312100500-45 = "是尋寶……！#n不，既然是盜賊就是探索了！！"
84312100500-46 = "探索任務開始了！！"
84312100500-53 = "嗯？"

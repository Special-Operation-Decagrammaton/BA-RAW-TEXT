[translation]
2001005-1 = "การฝึกดูแลออนเซ็น – ภาคการฝึกมารยาท"
2001005-2 = "ทางเดินเขาใกล้ๆ อาคารเรียนเก่า 227"
2001005-5 = "หากเปิดให้บริการออนเซ็นละก็ ในทุกๆ วันก็จะต้องต่อสู้กับกองเสื้อผ้าที่ต้องซักเป็นจำนวนมากค่ะ"
2001005-6 = "ตั้งแต่ชุดยูกาตะที่ลูกค้ายืมไปใส่ ไปจนถึงการซักผ้าขนหนูที่ใช้เช็ดตัวแล้ว..."
2001005-7 = "เสื้อผ้าที่จะต้องซักในหนึ่งวันของออนเซ็น มีปริมาณมากกว่าที่คิดเอาไว้เยอะเลยค่ะ"
2001005-8 = "แต่ไม่ว่าจะยังไง ถ้าอยากเป็นผู้ดูแลออนเซ็นสุดหรูละก็ ถึงงานจะยุ่งแค่ไหนก็จะสูญเสียภาพลักษณ์#nที่ดูสง่างามไปไม่ได้ค่ะ"
2001005-9 = "ดังนั้นวันนี้ฉันจะฝึกเดินบนถนนที่เป็นน้ำแข็งโดยถือเบาะรองนั่งหนักๆ หลายแผ่นเอาไว้ค่ะ!"
2001005-10 = "[s] \"นี่เป็นส่วนหนึ่งของการฝึกดูแลออนเซ็นเหรอ?\""
2001005-11 = "ใช่แล้วค่ะ มีคำกล่าวว่าท่วงท่าที่สง่างาม เริ่มต้นจากท่าทางการเดินใช่ไหมล่ะคะ?"
2001005-12 = "แต่ว่าการถือผ้าหนักๆ แล้วเดินให้ดูสง่างามนี่ไม่ใช่เรื่องง่ายเลยนะคะ"
2001005-13 = "นอกจากนี้ พื้นในออนเซ็นยังเปียกและลื่นมากๆ ถ้าเกิดพลาดไปละก็ อาจจะทำให้ลื่นหกล้มได้ด้วยค่ะ"
2001005-14 = "เพราะงั้นฉันเลยเลือกที่นี่เป็นสถานที่ฝึกฝนค่ะ!"
2001005-15 = "หากสามารถเดินอย่างสง่างามได้โดยที่ถือของหนักๆ อยู่บนภูเขาที่เต็มไปด้วยหิมะและสิ่งกีดขวาง#nจำนวนมากแบบนี้ละก็... คงจะรักษาภาพลักษณ์ที่สง่างามในออนเซ็นไว้ได้แน่นอนค่ะ"
2001005-16 = "เอาละค่ะคุณครู ถ้างั้นฉันจะลองทรงตัวบนแผ่นน้ำแข็งลื่นๆ นี่ให้ได้ค่ะ รบกวนช่วยเอาเบาะรองนั่ง#nมาวางบนมือให้หน่อยนะคะ!"
2001005-21 = "[ns] \"เท่านี้โอเคไหม?\""
2001005-22 = "ยังค่ะ อีกสิบแผ่นก็ยังไหวค่ะ รบกวนวางมาเพิ่มได้เลยค่ะ"
2001005-26 = "[ns] \"เท่านี้พอไหม?\""
2001005-27 = "ยังค่ะ ยังได้อีกค่ะ ได้อยู่ค่ะ...!"
2001005-31 = "ทะ...เท่านี้น่าจะพอแล้วค่ะ..."
2001005-32 = "[s] \"เหมือนรายการแสดงตลกไปแล้วเลย...\""
2001005-33 = "ฮิฮิ ถึงท่าทางจะดูตลกไปหน่อย แต่ก็ทรงตัวได้แล้วค่ะ!"
2001005-34 = "ถ้าตอนอยู่ที่ออนเซ็นแล้วสามารถทรงตัวได้แบบนี้ตอนขนย้ายผ้าที่ต้องซักละก็...#nลูกค้าที่มาเห็นภาพนี้แล้วประทับใจก็จะให้ทิปเยอะมากแน่ๆ เลยใช่ไหมล่ะคะ?"
2001005-35 = "[s] \"แบบนั้นเหมือนในละครสัตว์เลยนะ...\""
2001005-36 = "พูดอะไรกันคะคุณครู ตอนนี้ฉันกำลังตั้งใจฝึกอยู่นะคะ"
2001005-37 = "แต่ว่าเบาะที่วางอยู่ข้างบนๆ มันโยกไปมาไม่หยุดเลย ทำให้ทรงตัวได้..."
2001005-38 = "เอ๊ะ เอ๋...?"
2001005-39 = "[s] \"เดี๋ยวก่อนโนโดกะ อันตรายนะ!\""
2001005-44 = "อ๊ายยยยย..."
2001005-46 = "[ns1] \"เป็นอะไรรึเปล่า?\"\n[ns2] \"บาดเจ็บรึเปล่า?\""
2001005-49 = "มะ...ไม่เป็นไรค่ะ แค่ลื่นนิดหน่อยค่ะ"
2001005-50 = "ว่าแล้วเชียวว่าการถือเบาะรองนั่งพร้อมกัน 50 ผืนนี่ไม่ไหวจริงๆ..."
2001005-51 = "อึ่ก..."
2001005-52 = "ข้อเท้าแพลงแบบนี้คงเดินลำบากแน่ๆ เลย..."
2001005-53 = "ถ้าเป็นแบบนี้คงจะยกอะไรได้ลำบากแน่ๆ น่าเสียดายจัง... แต่ดูเหมือนว่าการฝึกวันนี้คงจะต้องพอ#nแค่นี้แล้วละค่ะ"
2001005-61 = "เอ๊ะ? ทำไมจู่ๆ ถึงหันหลังให้ล่ะคะคุณครู?"
2001005-62 = "[s3] \"เจ็บเท้าแบบนั้นคงเดินลงเขาไม่ได้ใช่ไหมล่ะ\"\n[s4] \"ครูจะแบกเธอลงไปเอง\""
2001005-63 = "คะ? คุณครูจะให้ฉันขี่หลังงั้นเหรอคะ?"
2001005-64 = "คะ? คุณครูจะให้ฉันขี่หลังงั้นเหรอคะ?"
2001005-65 = "ถะ...ถึงฉันจะเจ็บข้อเท้า แต่ให้ฉันขี่หลังคุณครูจะดีเหรอคะ?"
2001005-66 = "แบบนี้ก็จะได้ใกล้ชิดคุณครูจนรับรู้ถึงอุณหภูมิร่างกายของคุณครู... แถมยังได้มองแผ่นหลัง#nของคุณครูด้วย..."
2001005-67 = "[s] \"พูดอะไรน่ะ?\""
2001005-68 = "มะ...ไม่มีอะไรค่ะ!"
2001005-72 = "ฮิฮิ... ถึงข้อเท้าจะเจ็บ แต่โดยรวมวันนี้ก็ถือว่าฉันโชคดีนะคะ"
2001005-74 = "(จากนั้นคุณครูก็แบกโนโดกะที่ขาเจ็บกลับไปที่ชาเล่ต์)"

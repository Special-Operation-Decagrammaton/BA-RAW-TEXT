[translation]
2001005-1 = "Hot Springs Training: Etiquette"
2001005-2 = "Mountain Road near Spec Ops No. 227"
2001005-5 = "To run a hot springs resort, you have to wrestle with a lot of laundry every day."
2001005-6 = "From the yukata the customers borrow to the towels they use to dry themselves."
2001005-7 = "The amount of laundry that comes out of a hot springs resort is truly beyond imagination!"
2001005-8 = "But the hostess of an amazing hot spring resort must remain dignified, no matter how busy!"
2001005-9 = "That's why today I'm going to practice walking on an icy road while carrying several heavy cushions!"
2001005-10 = "[s] \"Is this part of your hot springs training?\""
2001005-11 = "Of course. There's a saying that dignity starts with the way you carry yourself, right?"
2001005-12 = "But walking gracefully with heavy laundry is no easy task."
2001005-13 = "Plus, there's a lot of water at a hot springs resort, so the floors are slippery. If you're not careful, you could fall and lose all your dignity."
2001005-14 = "That's why I chose this snowy mountain to train!"
2001005-15 = "If I can walk gracefully with a heavy load on this ice-ridden, snowy mountain, I'll be able to maintain a dignified appearance at the hot springs as well."
2001005-16 = "Okay, Sensei. Your job is to stack cushions on my arms as I balance on the ice!"
2001005-21 = "[ns] \"Is this enough?\""
2001005-22 = "Please continue! I can hold at least 10 more."
2001005-26 = "[ns] \"How about now?\""
2001005-27 = "No, not yet, not yet!"
2001005-31 = "I-I think that's enough now."
2001005-32 = "[s] \"It's turned into some kind of comedy routine.\""
2001005-33 = "Heehee, I may look funny, but my balance is perfect!"
2001005-34 = "Won't the guests be so amazed and give me large tips if they see me gliding about with large piles of laundry like this?"
2001005-35 = "[s] \"Are you thinking of a hot springs resort or a circus?\""
2001005-36 = "What are you saying, Sensei? I'm training seriously right now."
2001005-37 = "But the high pile of cushions keeps shaking, making it difficult to balance."
2001005-38 = "O-Oh?!"
2001005-39 = "[s] \"Wait, Nodoka, be careful!\""
2001005-44 = "Ow..."
2001005-46 = "[ns1] \"Are you okay?\"\n[ns2] \"Are you hurt?\""
2001005-49 = "I-I'm fine. I just slipped."
2001005-50 = "I guess it was unreasonable to balance 50 cushions at once."
2001005-51 = "Ugh."
2001005-52 = "I think I sprained my ankle. It hurts a little."
2001005-53 = "I guess I have to end today's training here..."
2001005-61 = "Huh? What in the world are you doing, Sensei?"
2001005-62 = "[s3] \"You can't go down the mountain road like that, can you?\"\n[s4] \"Get on. I'll carry you back down.\""
2001005-63 = "Whaaat? You're going to carry me on your back?!"
2001005-64 = "Whaaat? You're going to carry me on your back?!"
2001005-65 = "E-Even if I hurt my ankle, isn't this too high a privilege for someone like me?"
2001005-66 = "To be able to directly observe Sensei's back...from close enough to feel Sensei's body temperature. "
2001005-67 = "[s] \"What are you talking about?\""
2001005-68 = "N-Never mind!"
2001005-72 = "Heehee! I may have hurt my ankle, but in the end, I got lucky today."
2001005-74 = "(After that, I returned to Schale carrying Nodoka and her injured leg.)"

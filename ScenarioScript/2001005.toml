[translation]
2001005-1 = "#Title;온천 수행 – 예절 수행 편"
2001005-2 = "#Place;구교사 227호 인근의 산길"
2001005-3 = "#wait;2000"
2001005-4 = "3;노도카 온천ND;01\n#3;a\n#wait;1500"
2001005-5 = "3;노도카 온천ND;99;온천장을 운영하려면 매일매일 수많은 세탁물과 씨름을 해야 하지요.\n#3;em;…"
2001005-6 = "3;노도카 온천ND;01;손님에게 대여한 유카타부터, 몸을 씻을 때 사용하는 타월까지……"
2001005-7 = "3;노도카 온천ND;08;하루에 온천장에서 나오는 세탁물의 양은 정말 상상을 초월할 정도로 엄청나답니다."
2001005-8 = "3;노도카 온천ND;99;하지만 훌륭한 온천장의 여주인이라면 바쁜 중에도 언제나 기품 있는 모습을 잃지 않는 법이지요."
2001005-9 = "3;노도카 온천ND;03;그래서 오늘은 무거운 방석 여러 장을 들고 빙판길을 걷는 훈련을 할 예정이에요!\n#3;hophop\n#3;em;[음표]"
2001005-10 = "[s] \"……이것도 온천 수행의 일환이야?\""
2001005-11 = "3;노도카 온천ND;01;물론이죠. 품위는 몸가짐, 특히 걸음걸이부터 시작된다는 말도 있잖아요?\n#3;em;[반응]"
2001005-12 = "3;노도카 온천ND;99;하지만 무거운 세탁물을 들고 기품 있게 걷는 건 쉬운 일이 아니니까요."
2001005-13 = "3;노도카 온천ND;01;게다가 온천장 곳곳은 물기가 많아 바닥이 미끄러운지라, 자칫하면 걸음걸이가 꼬여 크게 넘어질 수도 있어요."
2001005-14 = "3;노도카 온천ND;03;……그래서 선택한 장소가 바로 이 설산이랍니다!\n#3;em;[반짝]\n#3;greeting"
2001005-15 = "3;노도카 온천ND;01;장애물과 미끄러운 빙판이 가득한 이 설산에서 무거운 짐을 든 채로 우아하게 걸을 수 있다면, 온천에서도 기품 있는 모습을 유지할 수 있을 거예요."
2001005-16 = "3;노도카 온천ND;03;자, 선생님. 그럼 제가 미끄러운 빙판 위에서 균형을 잡고 있을 테니 손 위에 방석을 쌓아주세요!\n#3;em;[반응]"
2001005-17 = "#st;[0,0];instant;1;"
2001005-18 = "#clearST"
2001005-19 = "3;노도카 온천ND;01\n#3;m1\n#wait;1200"
2001005-20 = "3;노도카 온천ND;01\n#3;greeting\n#wait;3000"
2001005-21 = "[ns] \"이만하면 괜찮을까?\""
2001005-22 = "3;노도카 온천ND;15;아뇨, 아직 10장은 더 들 수 있어요. 더 쌓아주세요.\n#3;em;[반응]"
2001005-23 = "#st;[0,0];instant;1;"
2001005-24 = "#clearST"
2001005-25 = "3;노도카 온천ND;15\n#3;greeting\n#wait;3000"
2001005-26 = "[ns] \"이제 충분해?\""
2001005-27 = "3;노도카 온천ND;05;아뇨. 아직, 아직이에요……!\n#3;em;[!]"
2001005-28 = "#all;hide"
2001005-29 = "#wait;2000"
2001005-30 = "#bgshake\n#wait;3000"
2001005-31 = "1;노도카 온천ND;17;이, 이제 충분할 것 같아요…….\n#1;em;[땀]\n#1;stiff\n#1;a"
2001005-32 = "[s] \"……뭔가 만담 공연처럼 되어버렸네.\""
2001005-33 = "1;노도카 온천ND;20;후후, 꼴은 다소 우스워 보여도 균형은 완벽해요!\n#1;em;…\n#1;m3"
2001005-34 = "1;노도카 온천ND;17;온천장에서도 이렇게 완벽히 균형을 잡아가며 세탁물을 옮긴다면, 이 모습에 감탄한 손님들이 고액의 팁을 마구 뿌리시겠죠?"
2001005-35 = "[s] \"그건 온천장이 아니라 서커스 아냐?\""
2001005-36 = "1;노도카 온천ND;18;그게 무슨 말씀이신가요, 선생님. 저는 지금 진지하게 훈련을 하고 있거든요?\n#1;em;[빠직]"
2001005-37 = "1;노도카 온천ND;21그런데 높이 쌓인 방석이 자꾸 흔들려서 어쩐지 균형 잡기가……"
2001005-38 = "1;노도카 온천ND;02;어, 어라……?\n#1;em;[?]\n#1;stiff"
2001005-39 = "[s] \"잠깐. 노도카, 위험해!\""
2001005-40 = "#st;[0,0];instant;1;"
2001005-41 = "#clearST"
2001005-42 = "1;노도카 온천ND;02\n#1;falldownR\n#wait;1500"
2001005-43 = "#all;hide\n#wait;3000"
2001005-44 = "#na;노도카 온천ND;아야야……"
2001005-45 = "#all;hide"
2001005-46 = "[ns1] \"괜찮아?\"\n[ns2] \"다치지는 않았어?\""
2001005-47 = "#wait;100"
2001005-48 = "#wait;100"
2001005-49 = "3;노도카 온천ND;13;괘, 괜찮아요. 단순히 미끄러진 것뿐이랍니다.\n#3;em;[땀]\n#3;a"
2001005-50 = "3;노도카 온천ND;36;역시 방석 50개를 동시에 옮기는 건 무리였던 것 같네요……"
2001005-51 = "3;노도카 온천ND;34;윽…….\n#3;stiff\n#3;em;[속상함]"
2001005-52 = "3;노도카 온천ND;32;발목을 삐끗했는지 제대로 걷기가 어려워요……."
2001005-53 = "3;노도카 온천ND;34;이 상태로 물건을 나르는 건 어려우니, 아쉽지만 오늘 수행은 이걸로 마쳐야 할 것 같네요."
2001005-54 = "#st;[0,0];instant;1;"
2001005-55 = "#clearST"
2001005-56 = "#wait;2500"
2001005-57 = "3;노도카 온천ND;34\n#3;d\n#wait;1000"
2001005-58 = "3;노도카 온천ND;34\n#3;a\n#3;closeup\n#wait;1000"
2001005-59 = "#wait;1000"
2001005-60 = "#wait;1500"
2001005-61 = "3;노도카 온천ND;02;어라? 어째서 갑자기 등을 돌리시는 건가요, 선생님?\n#3;em;[?]\n#3;closeup"
2001005-62 = "[s3] \"그 상태로는 산길을 내려갈 수 없잖아?\"\n[s4] \"돌아갈 때까지 내가 업어줄게.\""
2001005-63 = "3;노도카 온천ND;04;네? 선생님께서 직접 저를 업어주시겠다고요?\n#3;em;[?!]\n#3;shake\n#3;closeup"
2001005-64 = "3;노도카 온천ND;04;네? 선생님께서 직접 저를 업어주시겠다고요?\n#3;em;[?!]\n#3;shake\n#3;closeup"
2001005-65 = "3;노도카 온천ND;13;아, 아무리 발목을 다쳤다고는 하지만, 이렇게 분에 넘치는 대우를 받아도 괜찮은 건가요?\n#3;closeup"
2001005-66 = "3;노도카 온천ND;35;선생님의 체온이 느껴질 정도로 가까운 거리에서, 선생님의 뒷모습을 직접 지켜볼 수 있다니…… \n#3;stiff\n#3;em;[///]\n#3;closeup"
2001005-67 = "[s] \"……그게 무슨 소리야?\""
2001005-68 = "3;노도카 온천ND;13;아, 아무것도 아니에요!\n#3;em;[땀]\n#3;closeup"
2001005-69 = "#st;[0,0];instant;1;"
2001005-70 = "#clearST"
2001005-71 = "3;노도카 온천ND;01\n#3;closeup\n#3;greeting\n#wait;2000"
2001005-72 = "3;노도카 온천ND;99;후후…… 발을 다치긴 했지만, 오늘은 결과적으로는 운수가 좋았네요.\n#3;em;…\n#3;closeup\n#fontsize;50"

[translation]
2001005-1 = "修行．禮儀篇"
2001005-2 = "舊校舍附近的山路"
2001005-5 = "要經營溫泉浴場，每天就得跟無數的衣物作戰才行。"
2001005-6 = "像是租借給客人們的浴衣和毛巾之類的……"
2001005-7 = "整個溫泉浴場一天需要洗的衣物可是難以想像的多唷。"
2001005-8 = "但是不管多麼忙碌，#n都不能忘記時常保持身為出色溫泉浴場女將該有的氣質及舉止。"
2001005-9 = "所以今天要進行負重訓練……試試看我能帶著幾張沉重的坐墊走著結冰的道路！"
2001005-10 = "[s] 「這能算是一種培訓嗎……？」"
2001005-11 = "當然囉。我聽說品格是從儀態，特別是走路的方式開始的。"
2001005-12 = "況且，在拿著沉重衣物的同時以優雅的方式走路並不容易。"
2001005-13 = "而且溫泉浴場的地板時常濕濕滑滑，不小心一點的話很可能會華麗地摔倒的。"
2001005-14 = "……所以我選擇的訓練場所就是，這座雪山！"
2001005-15 = "如果連在這座充滿障礙物、部分地面結冰，容易因為雪而滑倒的雪山……#n都能夠帶著沉重的物品優雅地行走的話，那任何時候都能保持優雅的走路方式了！"
2001005-16 = "來吧老師，請把坐墊疊在我的手上吧！"
2001005-21 = "[ns] 「這樣夠多了嗎？」"
2001005-22 = "不不不，我還能拿10張。請再放多一點吧。"
2001005-26 = "[ns] 「這樣嗎？」"
2001005-27 = "不……還沒，我還可以……！"
2001005-31 = "這，這個數量應該差不多了……"
2001005-32 = "[s] 「總覺得好像在搞笑片裡看過這種橋段……？」"
2001005-33 = "呵呵……雖然看起來可能很好笑，卻完美地維持著平衡！"
2001005-34 = "如果在溫泉浴場也能像這樣，在維持完美平衡的同時搬運要洗的衣物……#n客人們應該會感動到給我高額的小費吧！？"
2001005-35 = "[s] 「這樣比起溫泉浴場更像馬戲團吧。」"
2001005-36 = "那，那是什麼意思……！？"
2001005-37 = "哎呀，這麼高的情況下一不小心平衡就……"
2001005-38 = "呃，啊，咦……？"
2001005-39 = "[s] 「和香，危險！」"
2001005-44 = "啊痛痛痛……"
2001005-46 = "[ns1] 「沒事吧？」\n[ns2] 「有沒有受傷……！？」"
2001005-49 = "沒，沒事的。只是稍微滑倒而已……"
2001005-50 = "果然要同時搬50張坐墊還是太困難了……"
2001005-51 = "啊嗚……！"
2001005-52 = "那個，腳踝好像扭到了……？"
2001005-53 = "嗚嗚，雖然很可惜，但今天的訓練只能到此為止了……"
2001005-61 = "……？#n老師，這個姿勢是……？"
2001005-62 = "[s3] 「不能讓你在這種情況下走山路唷。」\n[s4] 「來，靠上來吧。」"
2001005-63 = "也，也就是說，老師要背我回去嗎……！？"
2001005-64 = "也，也就是說，老師要背我回去嗎……！？"
2001005-65 = "雖，雖然扭到腳了，但是這麼奢侈沒問題嗎！？"
2001005-66 = "竟然能近距離感受老師的體溫，和老師的背零距離接觸…… "
2001005-67 = "[s] 「……和香？」"
2001005-68 = "沒，沒什麼！"
2001005-72 = "呵呵……雖然腳受傷了，不過今天算是賺到了呢……"
2001005-74 = "（就這麼把和香背回了夏萊）"

[translation]
33150-1 = "第15話;對第五項古則的回答"
33150-2 = "……"
33150-3 = "這就是，所有無意義掙扎的終點……"
33150-4 = "我向梓警告了。一次又一次，會變成這樣的結局。"
33150-5 = "即使如此，梓還是懷抱著希望。微弱的希望。"
33150-6 = "……"
33150-7 = "所以我說了吧？"
33150-8 = "這就是故事的結尾。不管什麼都很空虛，全都走向毀滅的結局。就算再繼續看下去，也只是無意義的痛苦的連續。"
33150-9 = "總結來說，這就是個各自被逼入絕境，結果某人殺了某人的故事。某個人，不得不成為殺人兇手的故事。"
33150-10 = "讓人不適、不悅、厭惡、眉頭緊皺的故事。"
33150-11 = "悲傷、痛苦又憂鬱。儘管如此，就連餘韻都十分苦澀的故事……你不這麼認為嗎。"
33150-12 = "然而這毫無疑問，是真實的故事……"
33150-13 = "這就是，這個故事的真相。"
33150-14 = "……"
33150-15 = "你以前，針對第五項古則這麼說了呢。"
33150-16 = "「只能相信樂園存在」。"
33150-17 = "然而，相信的結果是這樣。"
33150-18 = "原本就是不可能的事情唷。伊甸園條約，相互「不要再憎恨彼此了」的約定。"
33150-19 = "那種事，明知道不可能辦得到……"
33150-20 = "再加上，條約的名字用了「伊甸園」。竟然在這裡用樂園的名字，聯邦學生會長還是老樣子，讓人不愉快的玩笑就算是諷刺也要有個限度。已經是稍有不慎就會讓人感覺到惡意的程度了。"
33150-24 = "藉由這個過程，有能確認到的東西吧。"
33150-27 = "那就是源於不信任而累積下來的，格黑娜和三一對彼此的憎恨。以及奧利斯持有的憎恨。"
33150-28 = "通過這些，這項條約以扭曲的形式完成了。更諷刺的是，還帶著不存在於任何地方，連證明都沒辦法的……那個樂園的名字。"
33150-30 = "這正是，和從樂園被流放的我們十分相稱的結局也說不定呢。"
33150-33 = "[s]「……我懂了，聖亞。」"
33150-37 = "[ns]「……妳也還沒，看見那之後怎麼樣了吧？」"
33150-38 = "……？"
33150-39 = "……有看下去的，必要嗎？"
33150-40 = "悲傷的結局之後，就算看了之後的尾聲也只會徒增悲哀而已。痛苦只會連續下去而已。"
33150-41 = "……所以呢？你想說「知道了」什麼？"
33150-42 = "[s]「……確認這之後的故事，很讓人害怕吧。」"
33150-43 = "說什麼……"
33150-44 = "[s]「所以才躲在夢中不醒來，一直在徘徊呢。」"
33150-45 = "我，我是……"
33150-46 = "老師……你到底，在說什麼……"
33150-47 = "[s1]「見到聖亞太好了。等我一下。」\n[s2]「我有必須要做的事，得回去才行。」"
33150-48 = "回去……？"
33150-49 = "回去……？"
33150-50 = "等一下。和我不一樣，你的身體根本還沒恢復。"
33150-51 = "而且最重要的是，就算你醒來了也不代表可以改變什麼。這是我的未來預知證實的……"
33150-52 = "不，是已經從「七項古則」引導出來的，這個世界的真相……！"
33150-53 = "[s3]「實際上，我對樂園的證明並不是那麼有興趣。」\n[s4]「『七項古則』這種文字遊戲，不是優先事項。」"
33150-54 = "……"
33150-55 = "……"
33150-56 = "……你打算，否定七項古則嗎？"
33150-57 = "樂園的存在與否，是所有人的課題吧？如果不能證明那個存在的話，什麼都……"
33150-58 = "……老師。你依然，相信著樂園嗎？"
33150-59 = "連證明都沒辦法，就這樣只是盲目的相信？"
33150-60 = "「抵達樂園之人的真相，是否能夠證明」……"
33150-61 = "也就是這不是證明樂園的意思，而是單純相不相信的問題……？"
33150-62 = "[ns]「……對不起哦，現在必須去幫助學生們才行。」"
33150-64 = "[ns]「之後再見，聖亞。」"
33150-65 = "……等一下老師。還有一個，想問你的事。"
33150-66 = "只是相信的話，什麼都不會改變。"
33150-67 = "就算相信了，那裡也沒有任何意義吧……！？"
33150-70 = "[ns]「只要相信是內衣而不是泳衣，那就是內衣。」"
33150-71 = "……哈啊？"
33150-72 = "……咦，內衣？"
33150-73 = "到，到底在什麼說……泳衣，內衣……？那是哪個古則的，不對那種連聽都沒……"
33150-74 = "[ns] 「等著我，聖亞。」"
33150-76 = "……"
33150-77 = "……走了嗎。"
33150-78 = "你，要走向接下來的尾聲了嗎。"
33150-79 = "我……我……"
33150-81 = "……"
33150-82 = "呼……"
33150-83 = "……確實，是那樣也說不定呢。"
33150-84 = "接下來的故事……"
33150-85 = "就算覺得害怕，我也必須確認到最後才行。"
33150-86 = "這是我的義務，嗎……"
33150-87 = "……"
33150-92 = "沒辦法了。"
33150-93 = "既憂鬱、悲傷又痛苦……就算是，最終會留下苦澀的故事……"
33150-94 = "……我也要用我的雙眼，見證到最後。"
33150-96 = "下一話;數個碎片"

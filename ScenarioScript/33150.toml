[translation]
33150-1 = "Episode 15;In Response to the Fifth Koan"
33150-2 = "Right."
33150-3 = "This is where all of that struggling has led to."
33150-4 = "I warned Azusa that this would be the outcome..."
33150-5 = "...but she clung onto hope nonetheless."
33150-6 = "..."
33150-7 = "It's time I told you the end of the story. The conclusion."
33150-8 = "This is an ending where everything is in vain, and delving deeper will only lead to more suffering."
33150-9 = "The climax to a story where one person is forced to kill another—where they must become a murderer."
33150-10 = "It's a story meant to make you uncomfortable, uneasy, and leave you unhappy."
33150-11 = "Gloomy, sad, painful, and ultimately bitter."
33150-12 = "But entirely truthful."
33150-13 = "That's the essence of this tale."
33150-14 = "..."
33150-15 = "Do you remember, Sensei, what you said in response to the fifth koan?"
33150-16 = "\"You have to believe in paradise, and you have to put trust in others.\""
33150-17 = "This is the result of that trust."
33150-18 = "It was a paradox to begin with—the Eden Treaty being a promise to put an end to hatred once and for all."
33150-19 = "That simply isn't possible."
33150-20 = "Ironically, the treaty bares the name of paradise. The General Student Council president always did have an unpalatable sense of humor."
33150-24 = "You've witnessed it yourself. The hatred between Gehenna and Trinity... "
33150-27 = "Arius' deep-seeded animosity..."
33150-28 = "The treaty bearing the name of a paradise that cannot be proven was signed, driven by their rancor."
33150-30 = "A fitting end for those of us who were exiled from paradise, don't you think?"
33150-33 = "[s] \"I get it now, Seia.\""
33150-37 = "[ns] \"You don't know what happens next either, do you?\""
33150-38 = "Huh?"
33150-39 = "No, because there's no point in knowing. What happens next is like an epilogue after the ending."
33150-40 = "Knowing will only lead to more sadness and suffering."
33150-41 = "I'm confused, then. What is there to \"get,\" Sensei?"
33150-42 = "[s] \"You're afraid of finding out what happens after.\""
33150-43 = "What...makes you think that?"
33150-44 = "[s] \"That's why you're hiding in your dreams and won't wake up.\""
33150-45 = "I'm not... "
33150-46 = "Sensei, what are you saying...?"
33150-47 = "[s1] \"It was nice seeing you, but I have to go.\"\n[s2] \"There's somewhere else I need to be.\""
33150-48 = "What? You're going back? "
33150-49 = "What? You're going back? "
33150-50 = "Stop. Unlike me, your body hasn't fully recovered."
33150-51 = "Even if you manage to wake up now, nothing will change. That's what I foresee."
33150-52 = "It's the truth of the world, as told by the seven koans!"
33150-53 = "[s3] \"I'm not interested in proving paradise.\"\n[s4] \"I don't care about the koans' riddles.\""
33150-54 = "..."
33150-55 = "..."
33150-56 = "Are you denying the seven koans? "
33150-57 = "But why? The existence of paradise is life's ultimate question. If its existence can't be proven, then nothing can be."
33150-58 = "Are you trying to say that you still believe in paradise?"
33150-59 = "You can't prove it, but you choose to have blind faith that it exists? "
33150-60 = "\"Can we prove anyone has ever reached paradise?\"#nThe question isn't really about proving the existence of paradise... "
33150-61 = "...but simply a koan about the nature of faith. Is that what you're implying? "
33150-62 = "[ns] \"Sorry. My students are waiting for me.\""
33150-64 = "[ns] \"See you later, Seia.\""
33150-65 = "Wait, Sensei! There's still one more thing I must ask you!"
33150-66 = "Faith alone won't change anything. It won't stop your prayers from falling on deaf ears!"
33150-67 = "Where is the rationale that faith can change the world?!"
33150-70 = "[ns] \"If you believe your bikini bottoms are panties, then they're panties.\""
33150-71 = "...?"
33150-72 = "P-Panties...?"
33150-73 = "I'm not sure I follow. A-And what do they have to do with bikini bottoms? Is this some type of koan? I've never heard this one before..."
33150-74 = "[ns] Leave."
33150-76 = "..."
33150-77 = "So that's how it is."
33150-78 = "You intend to see the epilogue after all, Sensei."
33150-79 = "Leaving me here, hiding in my dreams..."
33150-81 = "..."
33150-82 = "I..."
33150-83 = "Perhaps you were right. Maybe I am afraid of finding out what happens next."
33150-84 = "What's on the next page..."
33150-85 = "Must I see the story all the way to the end?"
33150-86 = "I suppose that's my duty."
33150-87 = "... "
33150-92 = "Very well, Sensei."
33150-93 = "Even if it's a gloomy, sad, painful, and ultimately bitter story..."
33150-94 = "...I will see it through to the end."
33150-96 = "Next Episode;Bits and Pieces"

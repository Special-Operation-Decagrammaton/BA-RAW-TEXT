33150-3 = "3;세이아;99;여기까지가 그 모든 헛된 발버둥의 종착지."
33150-4 = "3;세이아;06;저는 아즈사에게 경고했지만, 이런 결말이 될 것이라고 몇 번이나 경고했지만.\n#3;em;…"

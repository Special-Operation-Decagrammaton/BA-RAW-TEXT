33150-6 = "3;세이아;01;……."
33150-7 = "3;세이아;02;이것이 바로 제가 보여드리는 이야기의 결말. 그 종말."
33150-8 = "3;세이아;01;네. 이게 바로 이 이야기의 엔딩입니다. 더 본다고 해도 무의미한 고통의 나열만이 이어질 뿐입니다."
33150-9 = "3;세이아;01;이것은 말하자면, 결국 누군가가 누군가를 죽이는 이야기. 누군가가 살인자가 되는 이야기."
33150-10 = "3;세이아;99;말하자면, 불쾌하고 불편하고 결국 미간을 찌푸리게 되는 이야기."
33150-11 = "3;세이아;08;우울하고, 슬프고, 고통스럽고 결국 뒷맛이 쓴 이야기."
33150-12 = "3;세이아;01;하지만 진실인 이야기……."
33150-13 = "3;세이아;02;그게 바로 이 이야기의 정체였습니다."
33150-14 = "3;세이아;01;……."
33150-15 = "3;세이아;02;선생님은 5번째 화두의 답을 그렇게 내리셨죠."
33150-16 = "3;세이아;02;<그저 거기에 낙원이 있을 거라고 믿을 뿐이다>, 라고."
33150-17 = "3;세이아;01;그 믿음의 결과가 이것입니다."
33150-18 = "3;세이아;99;애초에 불가능한 것이었습니다. 에덴조약. 서로 <그만 미워하자> 라는 약속."
33150-19 = "3;세이아;06;그런 게 가능할 리가 없는데도요."
33150-20 = "3;세이아;01;아이러니하게도 그런 것에 낙원의 이름을 붙이다니, 총학생회장의 불쾌한 농담. 악의적인 농담."

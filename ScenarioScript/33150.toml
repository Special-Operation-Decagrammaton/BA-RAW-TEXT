[translation]
33150-1 = "第15話;五つ目の古則への答え"
33150-2 = "……。"
33150-3 = "これが全ての、無意味な足掻きの終着点……。"
33150-4 = "私はアズサに警告をしていた。何度も何度も、このような結末になるだろうということを。"
33150-5 = "それでもアズサは、希望を抱いてしまった。淡い希望を。"
33150-6 = "……。"
33150-7 = "だから言っただろう？"
33150-8 = "これが物語の結末。何もかもが虚しく、全てが破局へと至るエンディング。ここから先を見たところで、無意味な苦痛が連なっていくだけだ。"
33150-9 = "これはつまるところ各位が追い詰められ、結局誰かが誰かを殺める物語。誰かが、人殺しにならざるを得ない話。"
33150-10 = "不快で、不愉快で、忌まわしく、眉を顰めたくなるお話だ。"
33150-11 = "悲しくて、苦しくて、憂鬱になるような。それでいて、ただただ後味だけが苦いお話……そうは思わないかい。"
33150-12 = "しかし紛れもなく、真実の物語でもある……。"
33150-13 = "これが、この物語の正体だ。"
33150-14 = "……。"
33150-15 = "君は以前、五つ目の古則に対してこう言っていたね。"
33150-16 = "「ただ楽園があると信じるしかない」、と。"
33150-17 = "然して、信じた結果がこれだ。"
33150-18 = "元より不可能なことだったのだよ。エデン条約、お互いに「憎み合うのはもうやめよう」という約束。"
33150-19 = "そんなこと、できるはずが無いというのに……。"
33150-20 = "その上、条約の名前に「エデン」と来た。ここで楽園の名前だなんて、相変わらず連邦生徒会長の不愉快な冗談は皮肉にもほどがある。下手をすれば悪意すら感じてしまいそうなほどだ。"
33150-24 = "このプロセスを経て、確認できたものはあるだろう。"
33150-27 = "それは不信から降り積もった、ゲヘナとトリニティの互いへの恨み。そしてアリウスたちが持つ恨み。"
33150-28 = "それらを通じてこの条約は、歪な形で完成されてしまった。何よりも皮肉なことに、どこにも存在しない、証明すらできない……その楽園の名前を携えて。"
33150-30 = "まさに、楽園から追放された私たちにふさわしい結末かもしれないね。"
33150-33 = "[s] \"……分かったよ、セイア。\""
33150-37 = "[ns] \"……君も、その後はどうなったのか見ていないんだね？\""
33150-38 = "……？"
33150-39 = "……見る必要が、あるのかい？"
33150-40 = "悲しいエンディングの後、そこに続くエピローグを見たところで悲哀が増すだけ。苦しみが連なるだけだ。"
33150-41 = "……それで？何が「分かった」と言うんだい？"
33150-42 = "[s] \"……この後のお話を確認するのは、怖かったよね。\""
33150-43 = "何を……"
33150-44 = "[s] \"だから夢の中に隠れて起きられず、ずっと彷徨ってたんだね。\""
33150-45 = "わ、私は……。"
33150-46 = "先生……君は一体、何を……？"
33150-47 = "[s1] \"セイアと会えて良かった。少し待ってて。\"\n[s2] \"私はやらなきゃいけないことがあるから、戻らないと。\""
33150-48 = "戻る……？"
33150-49 = "戻る……？"
33150-50 = "待ちたまえ。私と違って、君の身体はまだ治ってすらいない。"
33150-51 = "そして何より、君が起きたからと言って何も変わるわけではない。これは私の未来予知で判明している……"
33150-52 = "いや、「七つの古則」から既に導かれていた、この世界の真実だ……！"
33150-53 = "[s3] \"実のところ、楽園の証明にはそこまで興味は無くって。\"\n[s4] \"「七つの古則」みたいな言葉遊びは、優先事項じゃなくって。\""
33150-54 = "……。"
33150-55 = "……。"
33150-56 = "……七つの古則を、否定するつもりかい？"
33150-57 = "楽園の存否は、全ての人たちにとっての宿題だろう？それの存在を証明できなければ、何も……"
33150-58 = "……先生。君は未だに、楽園を信じているのかい？"
33150-59 = "証明すらできないまま、ただ盲目的に信じていると？"
33150-60 = "「楽園に辿り着きし者の真実を、証明することはできるのか」……"
33150-61 = "つまりこれは楽園証明の話ではなく、ただそれを信じられるかという話だとでも……？"
33150-62 = "[ns] \"……ごめんね、今は生徒たちを助けに行かなきゃ。\""
33150-64 = "[ns] \"また後でね、セイア。\""
33150-65 = "……待ちたまえ先生。もう一つ、聞いておきたいことがある。"
33150-66 = "ただ信じたところで、何も変わりはしない。"
33150-67 = "信じたところで、そこには何の意味も無いだろう……！？"
33150-70 = "[ns] \"水着じゃなくて下着だと思えば、それは下着だから。\""
33150-71 = "……は？"
33150-72 = "……え、下着？"
33150-73 = "い、一体何を……水着、下着……？それはどこの古則の、いやそんなのは聞いたことが……"
33150-74 = "[ns] \"待ってて、セイア。\""
33150-76 = "……。"
33150-77 = "……行ったか。"
33150-78 = "君は、この先のエピローグへと向かうんだね。"
33150-79 = "私は……私は……。"
33150-81 = "……。"
33150-82 = "ふぅ……。"
33150-83 = "……確かに、そうだったのかもしれないな。"
33150-84 = "この先の話……"
33150-85 = "たとえ怖くても、私は最後まで確認しなければいけない。"
33150-86 = "これは私の義務、か……。"
33150-87 = "……。"
33150-92 = "仕方あるまい。"
33150-93 = "憂鬱で、悲しくて、苦しくて……たとえ、最後まで後味の苦い話であったとしても……。"
33150-94 = "……私もこの目で、最後まで見届けるとしよう。"
33150-96 = "次回;いくつかの欠片たち"

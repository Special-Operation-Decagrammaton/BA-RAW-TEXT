[translation]
33150-1 = "ตอนที่ 15;คำตอบของกฎโบราณข้อที่ 5"
33150-2 = "ค่ะ..."
33150-3 = "นี่คือจุดจบของการต่อสู้ที่ไร้ความหมายทั้งหมด"
33150-4 = "ฉันเตือนอาซึสะไปหลายต่อหลายครั้งแล้วว่าสุดท้ายจะจบลงเช่นนี้"
33150-5 = "แต่อาซึสะเองก็คงมีความหวังลมๆ แล้งๆ อยู่ค่ะ"
33150-6 = "..."
33150-7 = "และนี่คือจุดจบของเรื่องราวที่ฉันให้คุณได้เห็นค่ะ "
33150-8 = "ใช่แล้วค่ะ นี่คือจุดจบของเรื่องนี้ค่ะ ถึงจะดูต่อไป ก็มีแต่ความเจ็บปวดที่ไร้ความหมาย..."
33150-9 = "เพราะนี่คือเรื่องราวที่สุดท้ายใครคนหนึ่งก็ต้องฆ่าใครอีกคน เรื่องราวที่ใครบางคนต้องกลายเป็นฆาตกรไป"
33150-10 = "พูดอีกอย่างก็คือเป็นเรื่องราวที่ไม่น่าพึงพอใจ น่าอึดอัดจนรู้สึกหน้านิ่วคิ้วขมวดเลยค่ะ"
33150-11 = "เรื่องราวที่ทั้งเศร้า หม่นหมอง เจ็บปวด และมีแต่จะหลงเหลืออารมณ์ค้างคาที่ขมขื่นเอาไว้"
33150-12 = "แต่ว่ามันก็เป็นความจริง..."
33150-13 = "และนั่นก็คือแก่นแท้ของเรื่องนี้ค่ะ"
33150-14 = "..."
33150-15 = "คุณครูตอบคำถามของกฎโบราณข้อที่ 5 ไว้แบบนี้ใช่มั้ยคะ"
33150-16 = "\"แค่เชื่อว่ามีสวรรค์อยู่ตรงนั้นจริงๆ\""
33150-17 = "นี่คือผลพวงของความเชื่อเช่นนั้นค่ะ"
33150-18 = "มันเป็นไปไม่ได้ตั้งแต่แรกแล้วค่ะ สนธิสัญญาเอเดน สัญญาที่บอกว่า <เลิกเกลียดกันเถอะ> นั่น..."
33150-19 = "เรื่องแบบนั้นมันเป็นไปไม่ได้หรอกค่ะ"
33150-20 = "แถมเอาชื่อสวรรค์มาตั้งชื่อสนธิสัญญาแบบนั้นอีก... ประธานองค์การนักเรียนชอบเล่นตลกจริงๆ ตลกร้ายซะด้วย"
33150-24 = "คุณก็น่าจะได้เห็นแล้วว่าเกเฮนน่าและทรีนิตี้เกลียดชังซึ่งกันและกัน"
33150-27 = "และความแค้นที่ฝังลึกของอาเรียส..."
33150-28 = "สนธิสัญญาที่ใช้นามแห่งสวรรค์ที่ไม่มีอยู่จริงและไม่สามารถพิสูจน์ได้นี้เกิดขึ้นด้วยความโกรธแค้น..."
33150-30 = "คงจะเป็นจุดจบที่เหมาะกับพวกเราที่ถูกขับไล่ออกจากสรวงสวรรค์แล้วสินะคะ"
33150-33 = "[s] \"ครูเข้าใจแล้วล่ะ เซอา...\""
33150-37 = "[ns] \"แต่ว่า... เธอเองก็ไม่รู้ว่าหลังจากนี้จะเกิดอะไรขึ้นใช่มั้ย?\""
33150-38 = "คะ?"
33150-39 = "ก็มันไม่จำเป็นอีกต่อไปแล้วนี่คะ หรือพูดอีกอย่างก็คือ... บทส่งท้ายหลังตอนจบน่ะ..."
33150-40 = "ถึงจะดูไปก็รังแต่จะเจ็บปวดเปล่าๆ ค่ะ..."
33150-41 = "คุณครู...? รู้อยู่แล้วงั้นเหรอคะ? รู้อะไรเหรอคะ...?"
33150-42 = "[s] \"เซอาน่ะ กลัวที่จะรู้เรื่องราวต่อไปจากนี้สินะ\""
33150-43 = "คะ...? ฉะ.. ฉันเหรอคะ?"
33150-44 = "[s] \"เพราะกลัวก็เลยหลบอยู่ในความฝันไม่ยอมฟื้นขึ้นมา\""
33150-45 = "คือ... ฉัน... "
33150-46 = "คุณครู... คุณน่ะ..."
33150-47 = "[s1] \"ครูยินดีที่ได้เจอเธอนะ เซอา\"\n[s2] \"ครูมีเรื่องที่ต้องไปทำ คงต้องกลับแล้วล่ะ\""
33150-48 = "คะ? ยะ... อย่างนั้นเหรอคะคุณครู จะกลับแล้วเหรอคะ"
33150-49 = "คะ? กะ...กลับไปงั้นเหรอคะ คุณครู "
33150-50 = "แต่ร่างกายของคุณครูยังไม่หายดีเลยนะคะ"
33150-51 = "ต่อให้คุณครูฟื้นขึ้นมา ผลลัพธ์ก็ไม่เปลี่ยนแปลงหรอกค่ะ! นี่เป็นการทำนายอนาคตของฉัน..."
33150-52 = "ไม่สิ นี่เป็นความจริงของโลกนี้ที่ได้ประกาศไปแล้วตั้งแต่มีการบัญญัติเจ็ดประการขึ้นค่ะ...!"
33150-53 = "[s3] \"ครูไม่ได้สนใจพิสูจน์เรื่องสวรรค์หรอกนะ\"\n[s4] \"ครูไม่ได้สนใจเรื่องหลอกเด็กอย่างบัญญัติเจ็ดประการนั่นหรอก\""
33150-54 = "เรื่องพวกนั้น..."
33150-55 = "เรื่องหลอกเด็ก..."
33150-56 = "คุณครูจะปฏิเสธกฎโบราณเหรอคะ...? "
33150-57 = "ทำไมกัน...? เรื่องที่ว่าสวรรค์มีอยู่จริงหรือไม่ น่าจะเป็นสิ่งที่ทุกคนอยากรู้ที่สุดไม่ใช่เหรอคะ...? หากไม่สามารถพิสูจน์การมีอยู่ของสิ่งนั้นก็คงไม่มีอะไรที่พิสูจน์ได้"
33150-58 = "ถ้างั้นคุณครู... คุณแค่เชื่อในสวรรค์งั้นเหรอคะ?"
33150-59 = "เชื่อโดยไม่ต้องพิสูจน์ ไม่ต้องมีหลักฐานอะไรเลยงั้นเหรอคะ? "
33150-60 = "คำถามที่ว่า \"จะพิสูจน์คำพูดของคนที่ไปถึงสวรรค์แล้วได้อย่างไร?\" ที่จริงแล้วไม่ได้ต้องการพิสูจน์#nการมีอยู่ของสวรรค์..."
33150-61 = "แต่เป็นเรื่องเกี่ยวกับความเชื่อของคนงั้นเหรอคะ...? "
33150-62 = "[ns] \"ขอโทษนะ นักเรียนของครูกำลังรออยู่\""
33150-64 = "[ns] \"ครูไปก่อนนะ ไว้เจอกันนะ เซอา\""
33150-65 = "ดะ... เดี๋ยวก่อนสิคะ คุณครู! อีกแค่เรื่องเดียว... มีอีกเรื่องหนึ่งที่ฉันยังไม่ได้ถามค่ะ...!"
33150-66 = "แค่ความเชื่อเพียงอย่างเดียวไม่สามารถเปลี่ยนแปลงอะไรได้หรอกค่ะ! เพราะความเชื่อ... การอธิษฐาน ไม่มีพลังอะไรเลยค่ะ!"
33150-67 = "ถ้างั้นอะไรคือเครื่องพิสูจน์ว่าความเชื่อจะเปลี่ยนแปลงโลกนี้ได้คะ...?!"
33150-70 = "[ns] \"ถ้าเชื่อว่ากางเกงว่ายน้ำคือกางเกงใน มันก็คือกางเกงในไงล่ะ\""
33150-71 = "...?"
33150-72 = "คะ? กางเกงใน...? คะ...?"
33150-73 = "พะ... พูดอะไรน่ะ? ฉันไม่เข้าใจเลยค่ะ... กะ...กางเกงใน...? ชุดว่ายน้ำ...? นี่ก็เป็นกฎโบราณเหรอ...? ตะ...แต่ว่าฉันไม่เคยได้ยินมาก่อนเลย..."
33150-74 = "[ns] กลับออกไป"
33150-76 = "..."
33150-77 = "ไปแล้วสินะคะ"
33150-78 = "จะมุ่งไปที่เรื่องราวที่กำลังดำเนินต่อไปงั้นเหรอคะ...? คุณครู?"
33150-79 = "ทิ้งฉันเอาไว้ในความฝัน..."
33150-81 = "..."
33150-82 = "ฉันน่ะ..."
33150-83 = "คุณครูอาจพูดถูกก็ได้ค่ะ อาจเป็นฉันเองที่กลัวที่จะต้องเห็นเรื่องราวต่อจากนี้"
33150-84 = "เรื่องราวต่อจากนี้..."
33150-85 = "ฉันจะต้องดูต่อไปจนจบเลยเหรอคะ..."
33150-86 = "เรื่องนั้นคงเป็นหน้าที่ของฉันสินะคะ"
33150-87 = "... "
33150-92 = "ค่ะ เข้าใจแล้วค่ะ คุณครู"
33150-93 = "ถึงจะเป็นเรื่องราวที่ทั้งเศร้า หม่นหมอง เจ็บปวด และท้ายที่สุดจะจบลงอย่างขมขื่นก็ตาม..."
33150-94 = "ฉัน...จะดูให้เห็นกับตาของฉันเองค่ะ"
33150-96 = "ตอนต่อไป;ส่วนเล็กๆ น้อยๆ"

[translation]
70006010-1 = "นักชิม คุกกี้ และการบรรเทาทุกข์ 1"
70006010-2 = "โอย... หิวจัง กลางวันนี้เราจะกินอะไรกันเหรอ?"
70006010-3 = "ในเมื่อเป็นเมนูมื้อกลางวัน นั่นก็เป็นเรื่องที่ต้องพิจารณาอย่างลึกซึ้งเลยละค่ะ"
70006010-7 = "ถ้าได้กินกับทุกคน ไม่ว่าเมนูอะไรฉันก็ชอบนะ!"
70006010-8 = "งั้นก็ต้องเป็นบุฟเฟ่ต์สิคะ"
70006010-10 = "แต่ว่าตอนนี้ฉันไม่ค่อยมีเงินเลย... หมู่นี้ร้านบุฟเฟ่ต์ก็ราคาแรงมากด้วย"
70006010-11 = "ถ้างั้นเราก็ต้องเลือกเมนูที่ปริมาณเยอะ คุณภาพสูง แล้วก็ราคาถูกสินะคะ"
70006010-13 = "ฮุฮุฮุ อาหารในเงื่อนไขแบบนั้น ฉันคิดได้อยู่อย่างหนึ่งค่ะ"
70006010-14 = "อย่าบอกนะว่า... เป็นอันนั้นน่ะ?"
70006010-15 = "อันนั้นสินะ!"
70006010-16 = "ค่ะ อันนั้นละค่ะ★"
70006010-18 = "งั้นสินะคะ เข้าใจแล้วค่ะ ถ้าทุกคนต้องการแบบนี้..."
70006010-19 = "วันนี้เราก็ไป 'ขอร้อง' จากคุณฟูกะที่ชมรมโภชนาการกันเถอะค่ะ"
70006010-20 = "เดี๋ยวก่อน นั่นมัน..."
70006010-21 = "ฉันว่านั่นไม่น่าจะเรียกว่า 'การขอร้อง' ได้ทุกครั้งไปนะ?!"
70006010-23 = "คุณจุนโกะ การขอร้องมีหลายประเภทค่ะ อย่าเข้าใจผิดสิคะ"
70006010-24 = "แหะๆๆ ต่อให้เป็นการขอร้องหรืออะไรก็ตาม แต่ถ้าเป็นอาหารจากฟูกะ ฉันก็ชอบหมดเลย!"
70006010-26 = "เฮ้อ... จริงๆ เลยเชียว..."
70006010-30 = "หืม? เดี๋ยวก่อนนะคะ"
70006010-31 = "คุณจูรินี่นา...?"
70006010-35 = "ค่ะ คุโรดาเตะ ฮารุนะเองค่ะ มีเรื่องอะไรเหรอคะ?"
70006010-39 = "สวัสดีค่ะ คุณฮารุนะ ฉันติดต่อมาเพราะอยากถามอะไรหน่อยน่ะค่ะ"
70006010-40 = "ไม่ทราบว่ารุ่นพี่ฟูกะอยู่ที่นั่นหรือเปล่าคะ?"
70006010-42 = "คุณฟูกะเหรอคะ? ไม่อยู่นะคะ แต่พวกฉันกำลังจะไปหาคุณฟูกะอยู่พอดีเลย..."
70006010-43 = "ทำไมถึงคิดจะโทรมาถามจากพวกเรานะ?"
70006010-45 = "อ่า ทุกครั้งที่ติดต่อไม่ได้ รุ่นพี่ฟูกะจะอยู่กับพวกคุณตลอดน่ะค่ะ"
70006010-46 = "วันนี้คงไม่ใช่แบบนั้นสินะคะ"
70006010-47 = "รุ่นพี่ไปไหนของเค้ากันนะ? น้ำมันพืชของเราไม่มีเหลือแล้วเลย ต้องหาซื้อใหม่ด้วยสิ..."
70006010-48 = "อ้อ น้ำมันพืชน่าจะอยู่ในตู้กับข้าวตรงทางเข้าห้องครัวนะคะ"
70006010-49 = "ในตู้กับข้าวตรงทางเข้าห้องครัว..."
70006010-56 = "อ๊ะ เจอแล้วค่ะ! ขอบคุณมากนะคะ!"
70006010-58 = "อะไรกัน? ทำไมถึงรู้เรื่องแบบนั้นด้วยล่ะ?"
70006010-59 = "ฮุฮุฮุ นั่นสินะคะ?"
70006010-61 = "คลี่คลายปัญหาได้แล้วค่ะ ขอบคุณที่ช่วยนะคะ"
70006010-62 = "ถ้างั้นวันนี้ก็ฝากรุ่นพี่ของฉันด้วยนะคะ!"
70006010-66 = "พูดเหมือนขอให้พวกเราช่วยตามหาฟูกะให้อย่างนั้นละ..."
70006010-67 = "ฮืม ติดต่อคุณฟูกะไม่ได้งั้นเหรอ เกิดเรื่องอะไรขึ้นหรือเปล่าคะ?"
70006010-68 = "หรือว่าจะมีใครลักพาตัวฟูกะไป?"
70006010-69 = "ถ้าเป็นแบบนั้นก็อภัยให้ไม่ได้ค่ะ"
70006010-70 = "ใช่ค่ะ จะยอมให้มีใครนอกจากพวกเราพาตัวคุณฟูกะไปไม่ได้"
70006010-71 = "งั้นจากนี้ไปเราจะเริ่มปฏิบัติการค้นหาเพื่อให้แน่ใจว่าคุณฟูกะปลอดภัยค่ะ"
70006010-73 = "อื้อ! เราไปช่วยฟูกะแล้วขอให้ทำอาหารอร่อยๆ ให้กินกันเถอะ!"
70006010-75 = "สุดท้ายมันก็เป็นการสั่งให้ร่วมมือกับเรานี่นา?!"
70006010-76 = "ฮุฮุฮุ เราไม่ได้จะไปลักพาตัว แต่จะไปหาเพื่อขอร้องต่างหากค่ะ"
70006010-78 = "ฮิฮิฮิ งั้นเราก็ไปกันเลย~!"
70006010-92 = "ฟุดฟิด..."
70006010-93 = "อืม เหมือนได้กลิ่นอะไรคุ้นๆ จากตรงนี้เลย?"
70006010-94 = "อื้อ! เป็นกลิ่นของอร่อยๆ แน่นอน!"
70006010-95 = "มันก็มีกลิ่นของอร่อยๆ อยู่หรอกนะ แต่มันเป็นกลิ่นที่คุ้นจมูกมาก..."
70006010-97 = "กลิ่นของคุณฟูกะสินะคะ"
70006010-98 = "ว้าว! จุนโกะรู้กลิ่นของฟูกะด้วยเหรอเนี่ย!"
70006010-99 = "พะ... พูดอะไรเหลวไหลน่ะ...!"
70006010-105 = "ถึงฉันจะไม่แน่ใจเกี่ยวกับเรื่องกลิ่น แต่ถ้าดูจากรอยเท้าตรงนี้แล้ว คุณฟูกะต้องเคยมาที่นี่แน่นอนค่ะ"
70006010-106 = "นี่เป็นรอยรองเท้าที่คุณฟูกะชอบใส่ค่ะ"
70006010-107 = "รอยเท้ามีตั้งเยอะแยะ แต่แยกออกได้ขนาดนั้นเลยเหรอ...?"
70006010-108 = "ก็คุณฟูกะเป็นคนพิเศษนี่คะ★"
70006010-110 = "ถ้าดูจากรูปแบบการไปร้านค้าตามปกติของคุณฟูกะแล้ว วันนี้คุณฟูกะน่าจะแวะไปที่ย่านการค้าที่อยู่#nแถวๆ ชาเล่ต์ค่ะ"
70006010-111 = "ร้านที่ชอบเข้าบ่อยๆ น่าจะอยู่แถวนี้นะ..."
70006010-112 = "นี่เราทำตัวเหมือนพวกสะกดรอยตามเลยนะ...!"
70006010-113 = "หืม? เดี๋ยวนะ คนที่อยู่ตรงนั้น...?"
70006010-119 = "มาอยู่ที่นี่จริงๆ ด้วยสินะ..."
70006010-120 = "กำลังซื้อวัตถุดิบทำอาหารอย่างสบายใจเลยค่ะ ดูแล้วไม่เหมือนถูกลักพาตัวมาเท่าไรนะคะ"
70006010-121 = "แต่ถ้าปล่อยไว้แบบนี้ก็คงอันตราย เราคงต้องพาตัวคุณฟูกะกลับไปแล้วละค่ะ"
70006010-123 = "อื้อ อื้อ! เราต้องเข้าไปปกป้องก่อนจะเกิดอันตราย!"
70006010-124 = "เฮ้อ... ไม่อยากจะต่อปากต่อคำด้วยแล้ว"
70006010-135 = "อะ... อะไรของพวกเธอน่ะ?! มาที่นี่ได้ยังไง...!"
70006010-136 = "ตายจริง ทำไมถึงตกใจขนาดนั้นล่ะคะ คุณฟูกะ?"
70006010-137 = "เรา 'คนกันเอง' ไม่ใช่เหรอคะ?"
70006010-138 = "ฟูกะ~! เมนูมื้อกลางวันนี้คืออะไร~เหรอ~?"
70006010-140 = "คุณจูริกำลังเป็นห่วงอยู่นะคะ"
70006010-141 = "จูริน่ะเหรอ? อ่า..."
70006010-142 = "ฉันมัวแต่คิดเรื่องอาหารจนไม่ได้ดูโทรศัพท์เลย เดี๋ยวต้องกลับไปขอโทษแล้วละ"
70006010-143 = "มัวแต่คิดเรื่องอาหารเหรอ? วันนี้จะทำเมนูพิเศษกว่าปกติสินะ! อยากรู้แล้วสิว่าจะเป็นอะไร!"
70006010-144 = "จะว่าพิเศษมันก็พิเศษอยู่หรอก..."
70006010-145 = "แต่วันนี้พวกเธอยอมแพ้ไปเสียจะดีกว่า ถ้ามาลักพาตัวฉันที่นี่ จะเป็นเรื่องใหญ่ได้เลยนะ?"
70006010-147 = "คะ? คุณฮินะจากคณะกรรมการวินัยอยู่แถวนี้เหรอคะ?"
70006010-148 = "อ๊ะ! ทุกคนระวัง!"
70006010-156 = "ใครมาโจมตีกันแบบนี้นะ..."
70006010-170 = "พวกคุณคือ... ชมรมอัศวินบรรเทาทุกข์จากทรีนิตี้เหรอ?"
70006010-171 = "พวกคนโหดเหี้ยมที่ทำร้ายคนอื่นจนสาหัสแล้วค่อยช่วยรักษาทีหลังนี่นา!"
70006010-172 = "ฉันก็เคยได้ยินข่าวลือที่ว่า 'มิเนะทำลายล้าง ส่วนอัศวินคนอื่นรักษาให้หาย' มาด้วยค่ะ"
70006010-174 = "อะ... อะไรกัน? แล้วทำไมคนแบบนั้นถึงอยู่กับฟูกะล่ะ?!"
70006010-175 = "ออกบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญ!! คุณฟูกะ ปลอดภัยดีมั้ยคะ?"
70006010-177 = "คิดไม่ถึงเลยนะคะว่าข่าวลือจะแพร่ไปถึงโรงเรียนอื่นเลย..."
70006010-178 = "แหะๆๆ ต่อให้ได้แผลมาบ้าง แต่พวกฉันก็จะทำแผลให้เป็นอย่างดีค่ะ ไม่ต้องกังวลนะคะ!"
70006010-180 = "อย่าพูดเหมือนเตือนกันล่วงหน้าว่าจะได้แผลกลับไปสิ!"
70006010-181 = "ฉันได้ยินเรื่องราวของพวกคุณจากคุณฟูกะแล้วค่ะ"
70006010-182 = "การปกป้องคนอ่อนแอที่จนมุมก็เป็นส่วนหนึ่งของการบรรเทาทุกข์"
70006010-183 = "อาโอโมริ มิเนะ หัวหน้าชมรมอัศวินบรรเทาทุกข์... ออกโรงค่ะ!"
70006010-222 = "ขอบคุณที่ช่วยให้ฉันหลบได้นะคะ คุณอาคาริ"
70006010-223 = "อันตรายจังเลยค่ะ★"
70006010-224 = "อ๊ากก เจ็บนะ! เจ็บชะมัดเลย!"
70006010-225 = "ฮะ... ฮารุนะ! ทำยังไงกันดี?!"
70006010-226 = "ถึงจะเป็นการต่อสู้สั้นๆ... แต่ก็ไม่มีอะไรให้ต้องคิดมากค่ะ"
70006010-230 = "ทุกคนคะ ถอนกำลังก่อนค่ะ!"
70006010-234 = "เป็นอย่างนี้สินะคะ★"
70006010-240 = "ไม่ปล่อยให้หลุดมือไปหรอกค่ะ...!"
70006010-251 = "มีผู้ได้รับบาดเจ็บแล้วค่ะ ต้องรีบเข้าไปรักษาแล้วละ"
70006010-252 = "ถ้าขยับจะยิ่งเจ็บนะคะ อยู่เฉยๆ เถอะค่ะ"
70006010-253 = "อ๊ายย! ฮารุนะ! อาคาริ! จุนโกะ! รอฉันด้วยสิ! อย่าทิ้งฉันไว้อย่างนี้...! "
70006010-255 = "ขอโทษนะ อิซุมิ! ฉันจะไม่ลืมเธอนะ!  "
70006010-256 = "แงงงงง! ฉันจะแก้แค้น! ต่อให้ตายไปแล้วก็จะเป็นผีมาหลอก!!"
70006010-260 = "ทิ้งเพื่อนที่กำลังเจอปัญหาไว้ข้างหลังงั้นเหรอ... นี่มันเพื่อนกันประสาอะไร"
70006010-261 = "ต่อให้พวกคุณจะมีจิตใจแบบนั้น แต่ชมรมอัศวินบรรเทาทุกข์ก็จะเข้าไปบรรเทาทุกข์ให้ค่ะ!"
70006010-262 = "อื้อ! จับให้ได้ทุกคนเลยนะ!"
70006010-263 = "นั่นคือคำพูดของเพื่อนเหรอ!"
70006010-264 = "เอ๋...?"
70006010-273 = "อ้างว่าทำเพื่อบรรเทาทุกข์แล้วมาปราบปรามกันอย่างไร้ปรานี... แบบนี้ก็ได้เหรอ"
70006010-274 = "ความคิดที่ว่าถ้าบาดเจ็บก็แค่รักษาให้ แบบนี้มันน่ากลัวจังเลยนะคะ★"
70006010-276 = "เอาละ จุนโกะคะ? ขอดูหน่อยค่ะว่าได้แผลตรงไหน"
70006010-277 = "อ๊ะ...! เป็นแผลใหญ่เลยนะคะ! คงต้องตัดส่วนที่เป็นแผลออกแล้วค่ะ!"
70006010-279 = "ละ... ล้อกันเล่นใช่มั้ย? ไม่ได้พูดจริงใช่มั้ย?!"
70006010-280 = "ฮือ ถ้าไม่หิวก็คงไม่โดนจับกันแบบนี้หรอก..."
70006010-281 = "งั้นก็หยุดเลียแขนฉันสิ...!"
70006010-283 = "มีอีกสองคนที่ยังรั้งท้าย แต่ก็คงช่วยไม่ได้สินะคะ... เราคงต้องล่าถอยก่อน แล้วค่อยคิดแผนการใหม่#nทีหลัง..."
70006010-287 = "คุณอาคาริ...?"
70006010-288 = "ฉันน่าจะไม่ไหวแล้วค่ะ..."
70006010-289 = "ช่วยปกป้องฮารุนะแล้วทำแผล... แล้วฝากที่เหลือด้วยนะคะ..."
70006010-290 = "ฮุฮุฮุ..."
70006010-295 = "คุณอาคาริ...!"
70006010-300 = "ทีนี้ก็เหลือแค่คุณสินะคะ"
70006010-304 = "ฮุฮุ... ฮุฮุฮุ..."
70006010-305 = "ขัดขืนไปก็เปล่าประโยชน์สินะคะ ฉันขอยอมแพ้ค่ะ"
70006010-306 = "จะว่าไปก็น่าตกใจนะคะ ฉันก็รู้ว่าคุณเก่ง แต่ไม่คิดเลยว่าจะปราบพวกเราได้เร็วขนาดนี้"
70006010-307 = "สมกับเป็นคุณมิเนะจอมทำลายล้าง"
70006010-309 = "จะ... จอมทำลายล้างงั้นเหรอ ข่าวลือนั่นไม่เป็นความจริงนะคะ!"
70006010-310 = "ต่อให้ฉันจะโดนอะไรก็ช่าง แต่อย่างน้อยช่วยรักษาเพื่อนๆ ของฉันให้หายด้วยนะคะ..."
70006010-313 = "อ๊ะ แผลนี้น่าจะต้องใช้เลื่อยไฟฟ้าเลยค่ะ"
70006010-314 = "แงงงงง...!"
70006010-315 = "ฮานาเอะจัง อย่าพูดให้กลัวแบบนั้นสิ อีกฝ่ายคิดว่าเราพูดจริงแล้วนะคะ"
70006010-316 = "หืม? แต่ฉันพูดจริงนะคะ?"
70006010-318 = "น่ากลัวชะมัด! ยิ่งรอยยิ้มสดใสนั่นยิ่งน่ากลัวเข้าไปใหญ่!"
70006010-319 = "ฮุฮุฮุ เป็นสถานการณ์ที่ยากลำบากเลยนะคะ แบบนี้ยิ่งต้องเติมพลังกายพลังใจ..."
70006010-324 = "อ๊าก แล้วอาคาริมาเลียแขนฉันอีกคนทำไมล่ะ!"
70006010-327 = "รบกวนช่วยรักษาให้เป็นอย่างดีเลยนะคะ..."
70006010-328 = "ไม่ต้องกังวลค่ะ ทั้งสองคนนั้นก็เป็นชมรมอัศวินบรรเทาทุกข์ที่เก่งกาจเหมือนกันค่ะ"

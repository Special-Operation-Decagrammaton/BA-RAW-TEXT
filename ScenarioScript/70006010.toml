[translation]
70006010-1 = "美食とクッキー、そして救護（１）"
70006010-2 = "あー、お腹空いた……。今日のお昼は何にするの？"
70006010-3 = "あら、もう良い時間ですわね。"
70006010-7 = "私はみんなと食べられるなら何でもいいよ！"
70006010-8 = "それなら、食べ放題でしょうか。"
70006010-10 = "私、金欠なんだよね……最近の食べ放題高くない？"
70006010-11 = "低価格でありながらボリューミーで、満足のいく味のお店を探す……大変悩ましいお題ですね。"
70006010-13 = "うふふっ★良い事を思いつきました。"
70006010-14 = "もしかして……アレやるの？"
70006010-15 = "アレだね！"
70006010-16 = "ええ。アレですよ★"
70006010-18 = "そうですか、なるほど……皆さんがそう仰るのであれば。"
70006010-19 = "今日も、フウカさんにお願いしに行きましょうか。"
70006010-20 = "いや、それさ……。"
70006010-21 = "いっつも「お願い」じゃなくない！？"
70006010-23 = "「お願い」にもいろんな種類があるんですから。誤解しちゃダメですよ★"
70006010-24 = "私はフウカが作ってくれるものなら何でもいいよ！"
70006010-26 = "はぁぁ、もー……。"
70006010-30 = "あら。少々お待ちを。"
70006010-31 = "……ジュリさんからですね。"
70006010-35 = "はい、[ruby=くろだて]黒舘[/ruby]です。どうかなさいましたか？"
70006010-39 = "もしもし、ハルナさん。#nその、確認したいことがありまして……。"
70006010-40 = "フウカ先輩、今そちらにいらっしゃいますか？"
70006010-42 = "いえ、ちょうど私たちも伺おうとしていたところなのですが……。"
70006010-43 = "というかそれ、私たちに聞いていいの？"
70006010-45 = "あっ、連絡がつかない時は大体皆さんとご一緒だったので……。"
70006010-46 = "今日は違うんですね。"
70006010-47 = "どこに行ったんだろう……油がもう切れちゃいそうなのに……。"
70006010-48 = "ああ、油でしたらキッチンの入口側にある棚の奥にありますよ。"
70006010-49 = "えっと、この棚の奥に……。"
70006010-56 = "ありました！ありがとうございます……！"
70006010-58 = "えっ、何で知ってるの？"
70006010-59 = "ウフフッ、どうしてでしょうね？"
70006010-61 = "助かりました！おかげで大丈夫そうです！"
70006010-62 = "それでは、今日も先輩をよろしくお願いしますね！"
70006010-66 = "……なんか、自然な流れでフウカ探しをお願いされちゃったような。"
70006010-67 = "ふむ……フウカさん、どうされたのでしょう。"
70006010-68 = "誰かが誘拐しちゃったのかなぁ？"
70006010-69 = "それは許せませんね★"
70006010-70 = "ええ。私たち以外がフウカさんを連れ去るなど、決してあってはなりません。"
70006010-71 = "というわけで……これよりフウカさんの安全確保のため、捜索を開始します。"
70006010-73 = "フウカを助け出して美味しいもの、作ってもらお！"
70006010-75 = "結局、私たちに協力してもらうなら変わらなくない！？"
70006010-76 = "フフッ。私たちはあくまで「お願い」ですから。"
70006010-78 = "しゅっぱーつ！"
70006010-92 = "くんくん……。"
70006010-93 = "ねえ、なんかこっちから嗅ぎ慣れた匂いがするよ？"
70006010-94 = "うん！絶対美味しいものの匂い！"
70006010-95 = "食べ物の匂いもするけど……なんか別の馴染のある感じもするような……？"
70006010-97 = "フウカさんが近くにいるのかもしれませんね。"
70006010-98 = "わあ！ジュンコはフウカの匂いが分かるんだね！"
70006010-99 = "そ、そんなわけないでしょ！"
70006010-105 = "匂いまでは分かりませんが、足跡からしてフウカさんがここに来たのは間違いなさそうです。"
70006010-106 = "これです。この足跡……フウカさんがよく履いている靴の形をしています。"
70006010-107 = "こんないっぱいある足跡から、それが分かるの……？"
70006010-108 = "なんとなくです★"
70006010-110 = "フウカさんの行動パターンを考えると、今日はこちらの商店街にいる可能性が高いです。"
70006010-111 = "普段から贔屓にしているお店がこの辺りに……。"
70006010-112 = "みんなフウカのストーカーなの！？"
70006010-113 = "……ん？あれ？あそこにいるのって……。"
70006010-119 = "嘘っ！？本当に居た……。"
70006010-120 = "楽しそうに食材を選んでますね。#n事件性がなくて良かったです。"
70006010-121 = "どうします？探して欲しいと言われてますし、念のために私たちで保護しましょうか？"
70006010-123 = "うんうんっ！危なくなる前に保護しよ～！"
70006010-124 = "はあ……もうツッコむのも疲れてきたわね……。"
70006010-135 = "なっ！？あんた達、どうやってここに……。"
70006010-136 = "あら？そんなに驚かなくても……。"
70006010-137 = "私たちの仲じゃありませんか★"
70006010-138 = "フウカ～！今日のお昼な～に～？"
70006010-140 = "ジュリさんが心配しておりましたわよ。"
70006010-141 = "ジュリ？……あっ。"
70006010-142 = "完全に連絡忘れてた……後で謝っとこ。"
70006010-143 = "今日はいつもよりすごいのを作る感じ？楽しみ～！"
70006010-144 = "すごいと言えばすごい……のかな。"
70006010-145 = "茶々入れるつもりなら、今日はやめておいた方が良いと思うよ。"
70006010-147 = "あら？それはどういった――"
70006010-148 = "あっ！みんな気を付けて！！"
70006010-156 = "けほっ、けほっ……何が起きて……"
70006010-170 = "あなた方は……救護騎士団……でしょうか？"
70006010-171 = "「団長が壊して騎士団が治す」っていう、あの！？"
70006010-172 = "私も聞いたことあります。瀕死まで追い込んでから、治療を施すのだとか……。"
70006010-174 = "ええっ！？何でそんな人たちとフウカが一緒にいるの？"
70006010-175 = "救護が必要な場に救護を！！フウカさん、ご無事ですか？"
70006010-177 = "まさか、噂が他校の方にまで知れ渡っているとは……。"
70006010-178 = "えへへ。怪我をされても綺麗に治しますからね！心配しないでください！"
70006010-180 = "怪我する前提なの！？"
70006010-181 = "皆さんのことはフウカさんから伺っております。"
70006010-182 = "窮地に陥った者に手を差し伸べることもまた、救護……。"
70006010-183 = "救護騎士団団長[ruby=あおもり]蒼森[/ruby]ミネ……参ります！"
70006010-222 = "アカリさん、ありがとうございます……間一髪でしたわね。"
70006010-223 = "うーん……手ごわいですね★"
70006010-224 = "うわーん！痛い！痛いよぉ！"
70006010-225 = "は、ハルナ！どうするのこれ！？"
70006010-226 = "これは……迷うまでもなく――"
70006010-230 = "――撤退しましょう！"
70006010-234 = "ですよね★"
70006010-240 = "逃がしません……！"
70006010-251 = "要救護者を確保！直ちに治療を開始します！"
70006010-252 = "はい、じっとしててくださいね。動いたら痛いですよ！"
70006010-253 = "うわーん！ハルナ、アカリ、ジュンコ待って！置いてかないでーー！！"
70006010-255 = "ごめん！イズミのこと、忘れないから！！  "
70006010-256 = "うわあぁぁん！！覚えてなさいよっ！死んでも仕返ししてやるんだからっっ！！"
70006010-260 = "仲間を置き去りにするなど、なんと不届きな……。"
70006010-261 = "その性根……救護の名のもとに叩き直して差し上げます！"
70006010-262 = "そーだそーだ！みんな捕まえちゃえっ！"
70006010-263 = "あんたが言うの！？"
70006010-264 = "……あれ？"
70006010-273 = "これが救護とは……聞いて呆れますわね……"
70006010-274 = "その場で治せばOKという考えが怖いですね～★"
70006010-276 = "ジュンコさん、脚を怪我されてますね……。"
70006010-277 = "大変です！早く切断しないと！"
70006010-279 = "ええっ！？嘘でしょ！？嘘だよね！？"
70006010-280 = "うぅ……お腹が空いてなければ捕まらなかったのに……。"
70006010-281 = "ちょっ！？私の腕は食べられないわよ！？"
70006010-283 = "脱落したお二人のことは残念ですが、ここは態勢を立て直して……"
70006010-287 = "……アカリさん？"
70006010-288 = "私もどうやらここまでのようです……。"
70006010-289 = "ハルナをかばった傷が……後はよろしく……。"
70006010-290 = "ぐふっ……。"
70006010-295 = "アカリさん……！！"
70006010-300 = "残るはあなただけですね。"
70006010-304 = "ふふ……ふふふっ……。"
70006010-305 = "抵抗しても無駄なようですね。降参いたしますわ。"
70006010-306 = "噂には聞いておりましたが……まさかこれほどとは。"
70006010-307 = "さすがは破壊のミネさん、といったところでしょうか。"
70006010-309 = "は、破壊……！？またあらぬ誤解が……。"
70006010-310 = "ともかく。私のことは大丈夫ですので、みなさんの治療を――"
70006010-313 = "あっ、これは腕を切断しないとダメかも……。"
70006010-314 = "うわああぁぁん！！"
70006010-315 = "ハナエちゃん、怖がらせてはいけません。本当に切断すると思われてしまいますよ？"
70006010-316 = "えっ？本当ですよ？"
70006010-318 = "あのキラキラした笑顔が余計怖いんだけど！？"
70006010-319 = "ウフフッ。大ピンチですね。こういう時こそ精をつけて……。"
70006010-324 = "うわっ！？腕舐めないでよ！？"
70006010-327 = "適切な治療をお願いできればと……。"
70006010-328 = "心配は無用です。彼女たちも、れっきとした救護騎士団ですから。"
70006010-329 = "たまには痛い目見たほうが、良い薬になるんじゃない？"
70006010-331 = "ところで……なぜ救護騎士団のみなさんがフウカさんと一緒に？"
70006010-332 = "そ、それは……。"

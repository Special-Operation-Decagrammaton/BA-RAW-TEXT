[translation]
70006010-1 = "美食與餅乾，還有救護（１）"
70006010-2 = "啊……肚子好餓哦。#n今天午餐要吃什麼？"
70006010-3 = "午餐……是個需要深思熟慮的議題呢。"
70006010-7 = "只要是跟大家一起吃的，我都喜歡！"
70006010-8 = "那果然還是吃到飽最棒了～"
70006010-10 = "可是我最近手頭有點緊耶……現在的吃到飽都好貴。"
70006010-11 = "那就得找便宜、份量多又高品質的選項了。"
70006010-13 = "呵呵，我剛好想到一個地方喔？"
70006010-14 = "該不會是……那個吧？"
70006010-15 = "是那個對吧！"
70006010-16 = "沒錯，就是那個★"
70006010-18 = "原來如此，我明白了。#n既然大家都這麼決定……"
70006010-19 = "那我們今天也去供給部「拜託」一下風華同學吧。"
70006010-20 = "等等，那個……"
70006010-21 = "一直以來都不是什麼「拜託」吧！？"
70006010-23 = "淳子同學，拜託也是有很多種的喔～請不要誤會。"
70006010-24 = "耶嘿嘿，只要是風華做的我都喜歡！"
70006010-26 = "唉，真拿你們沒辦法……"
70006010-30 = "嗯？稍等。"
70006010-31 = "那個……是茱莉同學嗎？"
70006010-35 = "我是黑舘羽留奈。請問有什麼事嗎？"
70006010-39 = "你好，羽留奈同學。我有件事想確認一下。"
70006010-40 = "請問風華前輩現在在你們那邊嗎？"
70006010-42 = "風華同學嗎？我們正打算去找他呢……"
70006010-43 = "但這種事問我們真的沒問題嗎？"
70006010-45 = "啊，因為每次聯絡不上前輩的時候，他好像都和你們在一起。"
70006010-46 = "看來今天不是呢。"
70006010-47 = "前輩到底去哪了呢？#n食用油用完了，我得找新的才行……"
70006010-48 = "啊，那個的話應該在廚房入口的櫥櫃深處喔。"
70006010-49 = "廚房入口的櫥櫃深處……"
70006010-56 = "啊，找到了！真是謝謝你們！"
70006010-58 = "什麼啊？你怎麼會知道這種事？"
70006010-59 = "呵呵，誰知道呢？"
70006010-61 = "總之多虧各位的幫忙，問題已經解決了。謝謝你們！"
70006010-62 = "那麼，今天也麻煩你們照顧前輩囉！"
70006010-66 = "……感覺他很自然地把找風華的任務丟給了我們耶？"
70006010-67 = "嗯……茱莉同學居然會聯絡不上風華同學，究竟發生了什麼事呢？"
70006010-68 = "難道是有人綁架了風華？"
70006010-69 = "如果真是那樣的話，絕對不能原諒。"
70006010-70 = "沒錯。風華同學怎麼可以被我們以外的人帶走。"
70006010-71 = "那麼，為了確保風華同學的人身安全……立刻展開搜查行動吧。"
70006010-73 = "嗯！找到風華之後再請他煮好吃的給我們吃！"
70006010-75 = "所以到頭來還是要我們幫忙嘛！？"
70006010-76 = "呵呵，所以我才說是「拜託」不是綁架呀～"
70006010-78 = "耶嘿嘿，出發～！"
70006010-92 = "嗅嗅……"
70006010-93 = "嗯？這邊好像有股熟悉的味道？"
70006010-94 = "嗯嗯！是好吃的味道！"
70006010-95 = "雖然是好吃的味道沒錯，但感覺……更像是某種熟悉的味道？"
70006010-97 = "那想必是風華同學的味道吧。"
70006010-98 = "哇～淳子居然連風華是什麼味道都知道！"
70006010-99 = "你，你在胡說什麼啦……！"
70006010-105 = "雖然我聞不太出來，不過風華同學應該確實來過這裡沒錯。"
70006010-106 = "這是他平常愛穿的鞋子所留下的鞋印。"
70006010-107 = "這麼多鞋印你也能分辨出來……？"
70006010-108 = "因為風華同學是很特別的存在嘛★"
70006010-110 = "從他平常會去的商店來看，今天他應該是來這附近的商店街。"
70006010-111 = "他常去的那家店應該就在這附近……"
70006010-112 = "你們根本就是跟蹤狂吧……！"
70006010-113 = "嗯？等等，那邊那個人是……？"
70006010-119 = "……真的在這裡啊。"
70006010-120 = "看來他正在自由地採買食材，應該不是被綁架了。"
70006010-121 = "不過不能就這樣放著不管，我們得把風華同學帶走才行。"
70006010-123 = "嗯嗯！我們要在他遇到危險之前保護他！"
70006010-124 = "……唉，我已經連吐槽都懶了。"
70006010-135 = "你，你們是怎麼找到這裡的！？"
70006010-136 = "哎呀，為什麼這麼驚訝呢，風華同學？"
70006010-137 = "我們之間的「關係」不就是這樣的嗎？"
70006010-138 = "風華～！今天午餐吃什麼～？"
70006010-140 = "茱莉同學很擔心你喔。"
70006010-141 = "茱莉？啊……"
70006010-142 = "我忙到完全沒發現他有聯絡我。#n得找時間跟他道歉才行。"
70006010-143 = "忙著準備嗎？#n所以今天要做特別的料理囉？好期待！"
70006010-144 = "嗯……算是特別吧。"
70006010-145 = "不過勸你們今天還是放棄比較好哦。#n要是現在綁架我的話，真的會出大事的。"
70006010-147 = "嗯？難道風紀委員會的陽奈同學在附近？"
70006010-148 = "啊！大家小心！"
70006010-156 = "這個攻擊是……"
70006010-170 = "你們是……三一的救護騎士團？"
70006010-171 = "就是那群會把人打個半死再幫忙治療的可怕傢伙！"
70006010-172 = "我也有聽過「美禰負責破壞，騎士團負責治療」的傳聞呢。"
70006010-174 = "什，什麼？為什麼風華會和這種人在一起！？"
70006010-175 = "哪裡要救護，我就在哪裡！#n風華同學，您沒事吧？"
70006010-177 = "沒想到我們的傳聞，居然已經傳到其他學園了……"
70006010-178 = "耶嘿嘿～就算受傷了也不用擔心，我們會幫你們完全治好的！"
70006010-180 = "不要以受傷為前提好不好！"
70006010-181 = "我們聽風華同學說了你們的事。"
70006010-182 = "保護陷入困境的弱者，也是救護的一環。"
70006010-183 = "救護騎士團團長──蒼森美禰……出擊！"
70006010-222 = "謝謝你，亞伽里同學。#n多虧有你才避開了攻擊。"
70006010-223 = "看來情況不妙呢★"
70006010-224 = "嗚啊，好痛！超痛的！"
70006010-225 = "羽，羽留奈！現在該怎麼辦！？"
70006010-226 = "雖然只是短暫交鋒……但沒什麼好猶豫的。"
70006010-230 = "大家先撤退吧！"
70006010-234 = "果然是這樣啊★"
70006010-240 = "我不會讓你們逃掉的……！"
70006010-251 = "有人受傷了，得趕快治療才行。"
70006010-252 = "來～別亂動，不然會痛的哦！"
70006010-253 = "嗚嗚嗚～羽留奈！亞伽里！淳子！#n帶我一起走！不要丟下我啦……！"
70006010-255 = "對不起，泉！我會記得你的！ "
70006010-256 = "嗚嗚嗚嗚！我要報仇！我死也要報仇！！"
70006010-260 = "丟下陷入困境的同伴不管……這也背叛了身為同伴的道義。"
70006010-261 = "即使如此，我們救護騎士團也絕不會停止救護你們的心靈！"
70006010-262 = "沒錯沒錯！把他們通通抓起來！"
70006010-263 = "你現在是在幫他們說話嗎！？"
70006010-264 = "……咦？"
70006010-273 = "……竟以救護之名進行如此無情的鎮壓，真是令人震驚。"
70006010-274 = "「當場治好就行」的思維真的太可怕了呢★"
70006010-276 = "來吧，淳子同學？快把傷口給我看看。"
70006010-277 = "啊啊……這裡傷得有點重喔！可能得切除患部才行！"
70006010-279 = "你，你在開玩笑吧？這是玩笑對吧！？"
70006010-280 = "嗚嗚，如果我不餓的話就不會被抓了……"
70006010-281 = "說這種話的時候不要舔我的手臂啦……！"
70006010-283 = "看來我們只能捨棄脫隊的兩人，先撤退再想想辦法了……"
70006010-287 = "……亞伽里同學？"
70006010-288 = "看來……我也只能到此為止了呢……"
70006010-289 = "剛才為了保護羽留奈而受的傷……剩下的就交給你了……"
70006010-290 = "呵呵呵……"
70006010-295 = "亞伽里同學……！"
70006010-300 = "現在只剩下你一個人了。"
70006010-304 = "呵呵……呵呵呵……"
70006010-305 = "看來反抗也沒用了呢。我投降。"
70006010-306 = "不過真令人驚訝。#n雖然知道你們很厲害，沒想到能這麼快就制服我們。"
70006010-307 = "真不愧是「破壞擔當」的美禰同學。"
70006010-309 = "什，什麼破壞擔當，那完全是個誤會！"
70006010-310 = "總之我怎樣都無所謂，還請好好治療我的同伴……"
70006010-313 = "啊～這個傷口看起來得用電鋸才行喔？"
70006010-314 = "嗚哇哇哇哇……！"
70006010-315 = "花繪醬，你就別再嚇他們了，不然他們會當真的。"
70006010-316 = "咦？我是認真的呀？"
70006010-318 = "好可怕！你那天真無邪的笑容更可怕！"
70006010-319 = "呵呵呵～碰上大危機了呢。#n這種時候更要補充體力……"
70006010-324 = "嗚哇哇！為什麼連亞伽里都在舔我的手臂啦！"
70006010-327 = "……請好好治療他們。"
70006010-328 = "不必擔心。那兩位也是堂堂救護騎士團的成員。"
70006010-329 = "偶爾吃點苦頭，也算是一帖良藥吧？"
70006010-331 = "話說我實在有點好奇……救護騎士團的各位為何會跟風華同學在一起呢？"
70006010-332 = "那，那是因為……"

[translation]
70006010-1 = "Fine Dining, Cookies, and Aid Episode 1"
70006010-2 = "Ah... I'm hungry. What are we having for lunch today?"
70006010-3 = "Lunch, you say? That requires some serious thought."
70006010-7 = "I'm fine with whatever if we're eating together!"
70006010-8 = "Then we should go for all-you-can-eat."
70006010-10 = "I don't really have that much money. All-you-can-eat is too expensive these days."
70006010-11 = "Then we'll find a menu with cheap, high-quality food in large portions."
70006010-13 = "Heehee, I can think of one."
70006010-14 = "Wait, are you thinking of...that?"
70006010-15 = "That's right!"
70006010-16 = "Yes, that sounds good! ★"
70006010-18 = "I see. Very well, if that is what everyone desires..."
70006010-19 = "...we shall make a \"request\" to Fuuka of the School Lunch Club today."
70006010-20 = "Hold on. That's..."
70006010-21 = "Let's not call it a \"request\"!"
70006010-23 = "Junko, there are different types of requests. Don't get it twisted."
70006010-24 = "Heeheehee, I like everything Fuuka makes, whether it's a request or not!"
70006010-26 = "*sigh* There's no stopping it..."
70006010-30 = "Huh? Hold on."
70006010-31 = "Is this Juri calling?"
70006010-35 = "Hello, Kurodate Haruna speaking. How can I help you?"
70006010-39 = "Hi, Haruna. I wanted to check on something."
70006010-40 = "Is Fuuka there, by any chance?"
70006010-42 = "We were just about to go meet Fuuka, as a matter of fact..."
70006010-43 = "Wait, if SHE'S asking US..."
70006010-45 = "Oh, whenever I can't get in touch with her, I just assume she's with you."
70006010-46 = "I guess not today."
70006010-47 = "Where could she be? We just ran out of cooking oil, and we need more..."
70006010-48 = "Oh, that should be in the cupboard by the kitchen door."
70006010-49 = "In the cupboard by the kitchen door..."
70006010-56 = "Oh, I found it! Thank you so much!"
70006010-58 = "Wait, how in the word did you know that?"
70006010-59 = "Heehee, that's the question, isn't it?"
70006010-61 = "Anyway, problem solved, thanks to you. I appreciate it."
70006010-62 = "Well, if you see Fuuka, please take care of her, will you?"
70006010-66 = "...It feels like you're subtly asking us to find her..."
70006010-67 = "Hm, Juri can't reach Fuuka. What's going on?"
70006010-68 = "She didn't get kidnapped, did she?"
70006010-69 = "That would be unforgivable."
70006010-70 = "And unlikely. No one would take her but us."
70006010-71 = "So, in a way, we have a responsibility to find her."
70006010-73 = "Yeah, and then we can ask her to cook us something good!"
70006010-75 = "So we're following orders, then."
70006010-76 = "Subtle orders. At least we're not kidnapping anyone."
70006010-78 = "Heeheehee, all right, let's get started!"
70006010-92 = "*sniff* *sniff*"
70006010-93 = "Um, I smell something familiar over here."
70006010-94 = "Something delicious!"
70006010-95 = "It is delicious, but it's more familiar than that..."
70006010-97 = "Maybe it's Fuuka's scent."
70006010-98 = "Wow! Junko even knows what Fuuka smells like!"
70006010-99 = "Wh-What are you suggesting...!"
70006010-105 = "I don't know about smell, but these do look like Fuuka's footprints."
70006010-106 = "They're definitely her style of shoes."
70006010-107 = "How can you tell that from ALL these footprints...?"
70006010-108 = "Fuuka's special. ★"
70006010-110 = "Based on her shopping habits, she could have been in the shopping district here around Schale."
70006010-111 = "I'm sure we're not far from her favorite store..."
70006010-112 = "You're all a bunch of stalkers...!"
70006010-113 = "Huh? Wait. Who's that over there...?"
70006010-119 = "...That's her. Huh. You were right."
70006010-120 = "She's just buying ingredients. She doesn't look kidnapped to me."
70006010-121 = "Well, we can't leave her here out in the open. We'll have to move in to protect her."
70006010-123 = "Y-Yeah! Before it gets dangerous!"
70006010-124 = "*sigh* I'm too tired to even argue anymore."
70006010-135 = "Y-You guys?! How did you know...!"
70006010-136 = "Oh my, why are you so surprised, Fuuka?"
70006010-137 = "Especially given how often we run into each other..."
70006010-138 = "Hey, Fuuka! What's for lunch today?"
70006010-140 = "Juri was worried about you."
70006010-141 = "Juri? Oh..."
70006010-142 = "I was preoccupied. I missed her call. I'll apologize later."
70006010-143 = "Preoccupied? You must be making something extra special! I can't wait!"
70006010-144 = "You could call it special, I guess..."
70006010-145 = "You guys should give it a rest for the day, though. If you kidnap me here, you'll get in trouble."
70006010-147 = "Why? Is Hina from the Prefect Team around?"
70006010-148 = "Ah! Everyone watch out!"
70006010-156 = "Are we under attack...?"
70006010-170 = "It's the Remedial Knights!"
70006010-171 = "Yeah, they'll beat you to the verge of death just so they can heal you!"
70006010-172 = "Also, Mine apparently just destroys everything, then lets her knights clean up after her."
70006010-174 = "Wh-What? What's their connection to Fuuka?!"
70006010-175 = "Medicine knows no borders! Fuuka, are you okay?"
70006010-177 = "I can't believe the rumor spread to other schools..."
70006010-178 = "Heeheehee, don't worry. If you're ever hurt, we'll heal you good as new!"
70006010-180 = "You sound like you want that to happen!"
70006010-181 = "Fuuka has told us of you."
70006010-182 = "Protection of the weak is part of our mission."
70006010-183 = "Aomori Mine, captain of the Remedial Knights...to battle!"
70006010-222 = "Thank you, Akari. That could have been bad."
70006010-223 = "This is getting dangerous. ★"
70006010-224 = "Ow, it hurts! It really hurts!"
70006010-225 = "H-Haruna! What do we do?!"
70006010-226 = "I can already see exactly what to do."
70006010-230 = "Everyone. Retreat for now!"
70006010-234 = "As expected... ★"
70006010-240 = "Oh, no. There is no escape!"
70006010-251 = "We've got wounded here. We need to start treatment immediately."
70006010-252 = "Okay, stay still or it's going to hurt."
70006010-253 = "Waaah! Haruna! Akari! Junko! Take me with you! Don't leave me...!"
70006010-255 = "Sorry, Izumi! We'll remember you!  "
70006010-256 = "WAAAHHH! I'll get all three of you back for this if it's the last thing I dooo!"
70006010-260 = "Abandoning a friend in need... Shameful."
70006010-261 = "Even with that spirit of yours, we, the Remedial Knights, will bring you the aid you require!"
70006010-262 = "Yeah, get 'em all!"
70006010-263 = "Seriously?"
70006010-264 = "...Huh?"
70006010-273 = "...Such ruthlessness in the name of \"aid.\""
70006010-274 = "I guess field medicine's a scary business. ★"
70006010-276 = "Now, Junko. Show me where you're hurt."
70006010-277 = "Oh, this is serious! The affected area needs to be cut out!"
70006010-279 = "You're j-joking, right? You must be joking!"
70006010-280 = "Ugh, I wouldn't have been hit if I wasn't hungry..."
70006010-281 = "Don't lick my arm while you say that...!"
70006010-283 = "Nothing we can do about the two left behind. We need to get out of here and plan our next move..."
70006010-287 = "...Akari?"
70006010-288 = "Looks like this is the end of the road for me..."
70006010-289 = "I took one for you, Haruna... All up to you from here..."
70006010-290 = "Heeheehee..."
70006010-295 = "Akari...!"
70006010-300 = "Only you remain now."
70006010-304 = "Fufu... Heeheehee..."
70006010-305 = "I suppose there's no point in resisting. I surrender."
70006010-306 = "But I must say, it's remarkable. Your reputation precedes you, but I never would have thought you'd bring us down so quickly."
70006010-307 = "You are indeed a destroyer, Mine."
70006010-309 = "What do you mean, a destroyer?! What have you heard?!"
70006010-310 = "Whatever happens to me, please make sure my friends receive proper medical atten—"
70006010-313 = "I'm gonna need the chainsaw over here!"
70006010-314 = "WAAAHHH...!"
70006010-315 = "Hanae, don't scare her like that. She'll think you really mean it."
70006010-316 = "I did, though!"
70006010-318 = "You were scary before. Now you're SMILING..."
70006010-319 = "Well, this is a mess. All I can try to do now is replenish my strength..."
70006010-324 = "Ahh, why is Akari licking my arm?!"
70006010-327 = "...Again, proper treatment, please."
70006010-328 = "Don't worry. Those two are respectable Remedial Knights."
70006010-329 = "\"That which does not destroy us, makes us stronger,\" after all."
70006010-331 = "I must ask. Why are you Remedial Knights with Fuuka?"
70006010-332 = "W-Well..."

[translation]
10035160-1 = "ย้อนวันวาน;วันที่หัวหน้ากรมฯ ไม่อยู่"
10035160-4 = "ตอนนี้หัวหน้ากรมฯ คันนะไม่อยู่ ดังนั้นรองหัวหน้ากรมฯ ก็ต้องปฏิบัติงานแทนค่ะ"
10035160-9 = "เฮ้อ..."
10035160-10 = "ฉันทำดีอยู่หรอกที่ส่งคุณพี่ไปสวนน้ำ แต่ก็ลืมคิดเรื่องงานไปเลย"
10035160-14 = "ก่อนอื่นช่วยประทับตราอนุมัติเอกสารให้หน่อยนะคะ"
10035160-15 = "รู้แล้วน่าๆ"
10035160-16 = "ตราประทับ~~ ของคุณพี่~~ อยู่ตรงไหนน้า~~"
10035160-22 = "อ๊ะ เจอแล้ว"
10035160-27 = "เจอตราประทับแล้วก็จริง แต่เอกสารเป็นกองพะเนินแบบนี้แล้วเมื่อไรจะปั๊มหมดเนี่ย"
10035160-28 = "เฮ้อ คราวเคราะห์ของฉันจริงๆ"
10035160-29 = "ฮืม แผนการบูรณะโรงอาหารกรมความมั่นคงสาธารณะ... โอเค"
10035160-30 = "คำร้องขอติดตั้งหน้าต่างห้องสอบสวนใต้ดิน"
10035160-31 = "นี่มันอะไรกัน? ไม่อนุมัติ"
10035160-32 = "คำร้องขอเปลี่ยนร้านข้าวหน้าหมูทอดที่สั่งประจำ โอเค อนุมัติ!"
10035160-37 = "(อนุมัติเร็วกว่าที่คิดแฮะ...)"
10035160-38 = "(แบบนี้คงเสร็จทั้งหมดภายในวันนี้ละ)"
10035160-43 = "เฮ้อ ขี้เกียจแล้วอะ"
10035160-45 = "ยังทำไปได้ไม่เท่าไรเลยนะคะ?!"
10035160-46 = "ก็ฉันไม่ถนัดกับงานเอกสารน่ะสิ แล้วลูกแม็กมันก็ทิ่มมือฉันตลอดเลย"
10035160-47 = "แต่เอกสารพวกนี้ต้องอนุมัติให้เสร็จภายในวันนี้นะคะ"
10035160-48 = "เรื่องนั้นฉันก็รู้อยู่หรอก..."
10035160-52 = "แต่เธอก็เบื่อเหมือนกันใช่มั้ยล่ะ?"
10035160-53 = "คะ... คะ?!"
10035160-54 = "ไม่ต้องอายหรอกน่า บอกมาเถอะ เธอก็ไม่ชอบงานเอกสารที่ต้องนั่งในสำนักงานตลอดใช่มั้ยล่ะ?"
10035160-55 = "มะ... ไม่ใช่อย่างนั้นนะคะ!"
10035160-56 = "นะ... นี่ก็เป็นงานของกรมความมั่นคงสาธารณะ..."
10035160-57 = "เขาว่าสายตามันหลอกกันไม่ได้"
10035160-58 = "ไหนๆ ก็ฤดูร้อนทั้งที ไม่อยากอยู่แต่ในสำนักงานใช่มั้ยล่ะ?"
10035160-59 = "คะ...?"
10035160-60 = "เฮ้อ... งั้นก็ช่วยไม่ได้นะ!"
10035160-61 = "การรับฟังความลำบากใจของลูกน้องก็เป็นงานของรองหัวหน้ากรมฯ ด้วยนี่นา"
10035160-65 = "อ่า อ่า... เจ้าหน้าที่ทุกคนที่ปฏิบัติงานอยู่ฟังทางนี้"
10035160-67 = "บ่ายนี้เราจะฝึกว่ายน้ำที่เป็นการฝึกจำเป็นของกรมความมั่นคงสาธารณะที่ผัดผ่อนมานานแล้ว"
10035160-68 = "เอางี้เลยเหรอคะ?!"
10035160-80 = "อื้ม!"
10035160-81 = "เรามีสระฝึกว่ายน้ำกลางแจ้งที่สถาบันฝึกตำรวจวัลคิรี่ภาคภูมิใจอยู่นะ!"
10035160-82 = "ในเมื่อคุณพี่คันนะไปสนุกกับฤดูร้อนอยู่ พวกเราก็จะแพ้ไม่ได้เหมือนกัน!"
10035160-83 = "ว่ายไปกลับกันสัก 200 รอบเป็นไง!"
10035160-84 = "พร้อมหรือยังทุกคน!"
10035160-86 = "หืม? ไปกลับ 200 รอบเหรอคะ ล้อกันเล่นใช่มั้ยคะ?"
10035160-87 = "ถึงนั่นจะเป็นเรื่องง่ายๆ สำหรับรองหัวหน้ากรมฯ แต่สำหรับพวกฉันแล้วไม่ไหวหรอกค่ะ!"
10035160-89 = "หืม? ว่าไงนะ?"
10035160-90 = "เจ้าหน้าที่กรมความมั่นคงสาธารณะใจฝ่อแบบนั้นได้ด้วยเหรอ?"
10035160-91 = "แค่ขยับแขนขานิดหน่อยก็ว่ายได้ 200 รอบแล้วน่า!"
10035160-97 = "อ่า... ค่ะ..."
10035160-99 = "ตอบให้มันดังๆ!"
10035160-102 = "ค่ะ รองหัวหน้ากรมฯ!"
10035160-104 = "อื้ม มันต้องอย่างนี้สิ!"
10035160-105 = "รีบไปทำให้เสร็จแล้วออกไปกินทงคตสึราเม็งกัน! เอาแบบโรยกระเทียมพูนๆ เลย! ฉันจะเป็นเจ้ามือเอง!"
10035160-106 = "แต่ฉันอยากกินเค้กหรือไม่ก็มาการองมากกว่า..."
10035160-107 = "ชู่ว! กินๆ ไปตามที่รองหัวหน้ากรมฯ ชอบเถอะ"
10035160-109 = "2 คนโน่นน่ะ ห้ามคุยกัน!"
10035160-110 = "ฉันจะว่ายนำไปก่อนเอง ทุกคนตามมา..."
10035160-116 = "เอะ... เอ๋?"
10035160-118 = "เมื่อกี้มีแมวดำออกมา... แล้วก็หายไปแล้ว"
10035160-119 = "รองหัวหน้ากรมฯ จะว่ายน้ำนำไปก่อนไม่ใช่เหรอคะ?"
10035160-121 = "เอ่อ... คือว่า..."
10035160-127 = "(แมวดำเป็นสัญลักษณ์แห่งลางร้าย...)"
10035160-128 = "(จะว่าไป ข้าวเช้าวันนี้ก็มีถั่วลันเตา 4 เม็ด...)"
10035160-129 = "(แถมวันนี้ฉันทำใบโคลเวอร์ 4 แฉกหายตอนทำความสะอาดด้วย...)"
10035160-130 = "(รู้สึกไม่ดีเลย...)"
10035160-131 = "(ลางไม่ดีแน่ๆ ลางไม่ดีๆๆๆ!)"
10035160-134 = "ฉะ... ฉันไม่ลงน้ำดีกว่า"
10035160-139 = "คะ? หมายความว่ายังไงคะ?"
10035160-140 = "ให้ฝึกกันเฉพาะแต่พวกฉันเหรอคะ?!"
10035160-141 = "แต่นี่เป็นการฝึกที่รองหัวหน้ากรมฯ เป็นตัวตั้งตัวตีนะคะ!"
10035160-143 = "จะ... จะยังไงก็เถอะ ฉันไม่ลงน้ำดีกว่า! อาจจะเกิดเรื่องอะไรขึ้นมาก็ได้นี่นา!"
10035160-144 = "ถ้าจะฝึก พวกเธอก็ฝึกกันเองเลย!"
10035160-149 = "เอาไงดีล่ะ? คงเพราะเชื่อเรื่องโชคลางอีกแน่เลย"
10035160-150 = "แล้วให้ทำไงได้ล่ะ? จะเหนื่อยกันแต่พวกเราไม่ได้หรอก"
10035160-155 = "นี่แหนะ!"
10035160-166 = "ทำอะไรของพวกเธอน่ะ!"
10035160-168 = "มายึดแขนขาฉันทำไม...?!"
10035160-180 = "ยัยพวกนี้นี่ อย่าให้ฉันจับพวกเธอได้บ้างนะ!"
10035160-181 = "ว้ายย! รองหัวหน้ากรมฯ มาแล้ว! หนีเร็ว~"
10035160-187 = "รองหัวหน้ากรมฯ! ทางนี้ค่า! ทางนี้!"
10035160-197 = "(แล้วฤดูร้อนของกรมความมั่นคงสาธารณะก็ผ่านไป...)"

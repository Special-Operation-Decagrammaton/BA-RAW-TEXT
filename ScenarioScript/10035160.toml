[translation]
10035160-1 = "後日談;局長不在時公安局的一天"
10035160-4 = "由於環奈局長不在，需要由副局長代理職務。"
10035160-9 = "唉……"
10035160-10 = "把大姐頭送去水上樂園雖然是好事一樁，但工作的部份倒是被我給忘了。"
10035160-14 = "首先，請在需要簽核的文件上蓋章。"
10035160-15 = "知道了，知道了。"
10035160-16 = "大姐頭～～的印章～～在哪裡咧～～"
10035160-22 = "啊，有了。"
10035160-27 = "……找是找到了，但這麼多文件要蓋到什麼時候啊。"
10035160-28 = "唉，我真是命苦啊。"
10035160-29 = "哼嗯，公安局餐飲設施翻修計畫，OK。"
10035160-30 = "地下審訊室申請加裝窗戶？"
10035160-31 = "什麼鬼啊？駁回。"
10035160-32 = "豬排丼合作廠商變更申請，OK。"
10035160-37 = "（比想像中來得快呢……）"
10035160-38 = "（這麼看來，今天之內應該能完成）"
10035160-43 = "啊～我不幹了。"
10035160-45 = "才沒簽幾份耶！？"
10035160-46 = "文書工作簡直讓人坐立難安，實在不適合我。"
10035160-47 = "但是副局長，這些文件必須在今天之內簽完才行。"
10035160-48 = "唉，這種事我也知道……"
10035160-52 = "但老實說，你也覺得很無聊吧？"
10035160-53 = "咦！？"
10035160-54 = "哎呀～這有什麼好難以啟齒的。#n其實你也討厭坐在辦公室裡看文件對吧？"
10035160-55 = "沒，沒有這回事！"
10035160-56 = "畢，畢竟這也是公安局的工作……"
10035160-57 = "沒必要跟我說那種場面話啦～"
10035160-58 = "夏天只待在辦公室裡很無聊吧？"
10035160-59 = "……咦？"
10035160-60 = "啊，真拿你沒辦法！"
10035160-61 = "傾聽下屬的煩惱也是副局長的職責吧？"
10035160-65 = "啊，啊～目前待命中的所有人都聽好了。"
10035160-67 = "今天下午將實施延期已久的公安局必修．戰鬥游泳訓練！"
10035160-68 = "這麼突然！？"
10035160-80 = "嗯！"
10035160-81 = "女武神警察學園最引以為傲的戶外游泳訓練場！"
10035160-82 = "既然環奈大姐頭正在享受夏天，我們當然也不能輸！"
10035160-83 = "先來回游個200趟熱熱身吧！"
10035160-84 = "小子們，準備好了嗎！"
10035160-86 = "咦？200趟？您是開玩笑的吧？"
10035160-87 = "副局長您或許能做到，但我們沒辦法啊！"
10035160-89 = "啊？你說什麼？"
10035160-90 = "堂堂公安局的職員竟然一點鬥志都沒有，這像話嗎？"
10035160-91 = "只不過是要你們稍微活動一下筋骨而已耶！"
10035160-97 = "啊，是……"
10035160-99 = "太小聲了！"
10035160-102 = "是，副局長！"
10035160-104 = "很好，這樣才對嘛！"
10035160-105 = "趕快游完之後一起去吃豚骨拉麵吧！#n而且還要加上滿滿的大蒜！今天我請客唷！"
10035160-106 = "我比較喜歡蛋糕或馬卡龍……"
10035160-107 = "噓，不要跟副局長的喜好過不去。"
10035160-109 = "那邊的，禁止閒聊！"
10035160-110 = "那就由我來打頭陣，預備──"
10035160-116 = "呃，咦？"
10035160-118 = "哎呀，有一隻黑貓靠了過來……又走掉了。"
10035160-119 = "副局長，您不是要打頭陣嗎？"
10035160-121 = "哦……那個啊……"
10035160-127 = "（黑貓是不祥的象徵……）"
10035160-128 = "（這麼說來，今天早餐裡的豌豆剛好只有4顆……）"
10035160-129 = "（然後上星期發現的四葉草，也在今天打掃時弄丟了……）"
10035160-130 = "（不祥……）"
10035160-131 = "（不祥不祥不祥不祥不祥！）"
10035160-134 = "我……就不游了。"
10035160-139 = "咦？什麼意思？"
10035160-140 = "是要我們自主訓練嗎！？"
10035160-141 = "今天的訓練不是副局長發起的嗎！"
10035160-143 = "總，總之我不下水就對了！誰知道會發生什麼事！"
10035160-144 = "你們自己游吧！"
10035160-149 = "怎麼辦？好像又是因為什麼不祥的徵兆之類的。"
10035160-150 = "還能怎麼辦？總不能只有我們受苦啊。"
10035160-155 = "我們上！"
10035160-166 = "你，你們想做什麼！"
10035160-168 = "為什麼要抓住我的手腳……！？"
10035160-180 = "你們這些傢伙，待會被我逮到就死定了！"
10035160-181 = "哇！副局長追過來了！快逃～"
10035160-187 = "副局長！這裡！這裡！"
10035160-197 = "（於是公安局的夏天就這麼過去了……）"

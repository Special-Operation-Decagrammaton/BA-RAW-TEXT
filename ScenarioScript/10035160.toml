[translation]
10035160-1 = "Afterword;The Public Peace Bureau's Director-less Day"
10035160-4 = "Since Director Kanna's absent, you'll have to perform her duties, Deputy Director."
10035160-9 = "*sigh*"
10035160-10 = "I'm glad I sent Sis to the water park, but I didn't think of all the work she'd leave behind."
10035160-14 = "First, all these documents need your approval."
10035160-15 = "Okay, okay..."
10035160-16 = "Sis' approval stamp... Where...could...it...be...?"
10035160-22 = "Found it."
10035160-27 = "...Okay, I've got the stamp, but I don't know HOW I'm going to get through all these..."
10035160-28 = "*sigh* Work, work, work..."
10035160-29 = "Hmm, the Public Peace Bureau food-and-beverage facility renovation plan, okay."
10035160-30 = "\"Request to install a window in the underground interrogation room.\""
10035160-31 = "What is this? Rejected!"
10035160-32 = "\"Request to change the katsudon supplier.\" ...Okay!"
10035160-37 = "(This is going faster than I expected...)"
10035160-38 = "(At this rate, I might actually finish today.)"
10035160-43 = "Ugh, I don't want to do this."
10035160-45 = "Do what?! You've barely done anything!"
10035160-46 = "I just hate paperwork. It makes me all restless. I can't stand it."
10035160-47 = "But Deputy Director, these documents NEED to be completed today."
10035160-48 = "Okay, I get that, but..."
10035160-52 = "Be honest with me, you're bored too, right?"
10035160-53 = "H-Huh?"
10035160-54 = "Ha, you don't have to be shy about it. You hate sitting at a desk all day, staring at paperwork, don't you?"
10035160-55 = "No, not at all!"
10035160-56 = "I-It's an important part of the work we do, and..."
10035160-57 = "Ah, you can't fool me."
10035160-58 = "Admit it, you want to be out there, enjoying your summer, don't you?"
10035160-59 = "...Yes?"
10035160-60 = "Ha, then you leave me no choice!"
10035160-61 = "As deputy director, I'm duty-bound to address my staff's concerns!"
10035160-65 = "Attention, everyone! Please listen carefully!"
10035160-67 = "This afternoon, we will be conducting the Public Peace Bureau's mandatory amphibious combat training!"
10035160-68 = "All of a sudden?!"
10035160-80 = "Mhm!"
10035160-81 = "At the Valkyrie Police School's renowned outdoor swim training facility!"
10035160-82 = "We have to keep pace with our director, after all, and she's already outdoors in the water!"
10035160-83 = "We're each going to do 200 laps!"
10035160-84 = "You all ready?!"
10035160-86 = "Huh? 200 laps? Are you joking?"
10035160-87 = "Maybe YOU can do that, but we can't!"
10035160-89 = "Huh? What did you say?"
10035160-90 = "If you want to keep the peace, you've got to have spirit!"
10035160-91 = "Besides, all you've got to do is flap your arms and legs for a bit. Anyone can do that!"
10035160-97 = "Um...okay..."
10035160-99 = "I didn't hear you!"
10035160-102 = "Yes, Deputy Director!"
10035160-104 = "That's more like it!"
10035160-105 = "And afterwards, we're going to go out for a nice tonkotsu ramen bowl. With lots of garlic! My treat!"
10035160-106 = "Personally I'd rather have some cake or some macarons..."
10035160-107 = "Shh, it's what the Deputy Director likes. Just go with it."
10035160-109 = "No chit-chatting over there!"
10035160-110 = "Let's go. Follow me!"
10035160-116 = "H-Huh?"
10035160-118 = "A black cat just appeared...and then disappeared."
10035160-119 = "Deputy Director, did you say you were going to...lead us just now?"
10035160-121 = "Um...well..."
10035160-127 = "(Black cats are signs of bad luck...)"
10035160-128 = "(Come to think of it, there were exactly thirteen peas in my breakfast this morning...)"
10035160-129 = "(On top of that, I lost that four-leaf clover I found last week...)"
10035160-130 = "(I have a bad feeling about this...)"
10035160-131 = "(A very, very, very bad feeling!)"
10035160-134 = "I... Actually, I won't be going in with you."
10035160-139 = "Huh? What do you mean?"
10035160-140 = "You want us to train without you?!"
10035160-141 = "You were the one who just called us out for this!"
10035160-143 = "R-Regardless! There's a lot of unknowns in play right now!"
10035160-144 = "You can all train without me, it's fine!"
10035160-149 = "Great, there's another \"jinx\" going on. What do we want to do, here?"
10035160-150 = "What do you mean, \"what do we want to do\"? We can't just suffer alone."
10035160-155 = "Ack!"
10035160-166 = "W-What are you doing?!"
10035160-168 = "P-Put me down...!"
10035160-180 = "Oh, I WILL punish you for that."
10035160-181 = "Ahh! She's coming after us! Run!"
10035160-187 = "Deputy Director! Here! Over here!"
10035160-197 = "And so, the summer days at the Public Peace Bureau flow by..."

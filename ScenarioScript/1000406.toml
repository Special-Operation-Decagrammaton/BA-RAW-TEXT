[translation]
1000406-1 = "แสงแดดที่อบอุ่น"
1000406-2 = "ถนนริมแม่น้ำ ชานเมืองเกเฮนน่า"
1000406-4 = "ว่าไงคุณครู..."
1000406-5 = "[s1] \"ฮินะจังหน้าตาน่ากลัวสุดๆ เลย!\"\n[s2] \"น่ากลัวสุดๆ เลย!\""
1000406-6 = "หืม...?"
1000406-7 = "หืม...?"
1000406-8 = "......"
1000406-11 = "โทษที ฉันทำงานโต้รุ่งตั้งแต่เมื่อวานยังไม่ได้นอนเลย..."
1000406-12 = "ตอนนี้ฉันนอนไม่พอ ขอบตาก็เลยคล้ำ... แถมยังไม่ได้อาบน้ำด้วย ผมมันก็เลยยุ่งไปหมด..."
1000406-14 = "แถมจู่ๆ คุณครูก็เรียกฉันออกมาแบบนี้อีก!"
1000406-15 = "[s3] บอกให้ฮินะหยุดพักเพราะเธอดูเหนื่อยมาก\n[s4] บอกให้ฮินะมานั่งสังเคราะห์แสงที่ม้านั่งด้วยกัน"
1000406-16 = "ให้มานั่งพักรับแสงแดดที่ม้านั่งด้วยกันงั้นเหรอ...?"
1000406-17 = "สังเคราะห์แสงเหรอ...? เฮอะ ฉันไม่ใช่ต้นไม้นะ..."
1000406-18 = "แต่วันนี้ก็อากาศดีจริงๆ..."
1000406-19 = "(พยักหน้า)"
1000406-21 = "(คุณครูกับฮินะนั่งอยู่ที่ม้านั่งด้วยกัน)"
1000406-22 = "......."
1000406-23 = "อืม..."
1000406-24 = "..."
1000406-25 = "..."
1000406-26 = "(ลุกขึ้นยืน) ไม่ล่ะ แบบนี้มันไม่ถูกต้อง"
1000406-27 = "[s5] \"หืม? ไม่ถูกต้องงั้นเหรอ?\"\n[s6] \"ถ้างั้น...?\""
1000406-28 = "......\n"
1000406-29 = "……."
1000406-30 = "..."
1000406-31 = "..."
1000406-33 = "(ฟึ่บ)"
1000406-36 = "(ฮินะลุกขึ้นแล้วทิ้งตัวนั่งลงบนตักของคุณครู)"
1000406-37 = "........"
1000406-38 = "[s] รู้สึกถึงน้ำหนักของฮินะที่พิงมา"
1000406-39 = "เป็นอะไร? แค่นี้น่าจะทนได้ไม่ใช่รึไง คุณครูเป็นผู้ใหญ่นะ"
1000406-40 = "ฮุฮุ อึดอัดนิดหน่อยแต่ก็รู้สึกสบายๆ เหมือนกันนะ..."
1000406-41 = "[s7] ได้กลิ่นหอมๆ จากศีรษะของฮินะ\n[s8] ได้กลิ่นหอมๆ จากเส้นผมของฮินะ"
1000406-42 = "คุณครู...?"
1000406-43 = "คุณครู...?"
1000406-44 = "........"
1000406-47 = "(ฟิ้ววววว!!)"
1000406-49 = "อ๊ะ อื้อออ อื้อ...?!"

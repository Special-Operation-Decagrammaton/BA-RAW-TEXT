1000406-51 = "[s9] \"หอมเหมือนกลิ่นแสงแดดอ่อนๆ เลยล่ะ\"\n[s10] \"กลิ่นหอมดีนะ...\""
1000406-57 = "คุณครู..."
1000406-58 = "[s] \"อ๊ะ ถุงใต้ตาของฮินะจัง...\""

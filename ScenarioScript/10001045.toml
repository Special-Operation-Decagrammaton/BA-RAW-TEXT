[translation]
10001045-1 = "ตอนที่ 4;ชัยชนะแรก!"
10001045-2 = "อาคารเรียนเก่า สหภาพเรดวินเทอร์"
10001045-3 = "การ <แข่งดื่ม> ดำเนินไปแล้วกว่า 1 ชั่วโมง..."
10001045-4 = "อึ้กก... อึกก...."
10001045-5 = "นี่มัน... ทรมานจัง... ไม่เคยได้ยินว่ามีกัมปอตแบบนี้มาก่อนเลย..."
10001045-6 = "[s] \"หรือว่าจะมีเหล้าผสมอยู่จริงๆ ?\""
10001045-7 = "ไม่ใช่ เราไม่ได้มีปัญหากับเรื่องนั้น..."
10001045-8 = "มันหวาน! หวานเหมือนกินน้ำเชื่อมอย่างนั้นแหละ!"
10001045-9 = "มันคืออะไรกันน่ะชิกุเระจัง!? กัมปอตนี่มันหวานจนฟันจะผุเลย!"
10001045-10 = "ก็กัมปอตคือน้ำผลไม้ที่ทำจากการเอาผลไม้ไปแช่ในน้ำตาล#nและหากต้องการเอาชนะความหนาวสุดขั้วของอาคารเรียนเก่าแห่งนี้ ร่างกายเราก็ต้องการน้ำตาล!"
10001045-11 = "แต่นี่มันเกินไปนะ! เหมือนต้องเคี้ยวน้ำตาลทุกครั้งที่ดื่มเลย ฟันฉันจะร่วงหมดแล้วนะคะ!"
10001045-12 = "ถ้าให้ดื่มต่ออีกแม้แต่อึกเดียวล่ะก็..."
10001045-13 = "ฮุฮุฮุ... คงจะดื่มต่อไม่ไหวแล้วสินะ"
10001045-14 = "แต่สำหรับท่านเชริโน่ที่ใช้เวลาในสำนักเลขาธิการกินขนมหวานมาทุกประเภทแล้ว!#nความหวานแค่นี้น่ะ... ไม่สะทกสะท้านลิ้นเลยด้วยซ้ำ!"
10001045-15 = "ถ้าจะยอมแพ้ล่ะก็ เธอได้โอกาสนั้นเดี๋ยวนี้!"
10001045-16 = "ฮึ่ม... ฉันไม่อยากยอมรับความพ่ายแพ้นี้หรอก..."
10001045-18 = "แต่ให้ดื่มต่อคงไม่ไหวแล้วล่ะค่ะ ฉันแพ้แล้วล่ะ..."
10001045-20 = "ไชโย! ชนะแล้ว!"
10001045-21 = "เป็นชัยชนะที่เยี่ยมยอดมากค่ะ! สมกับเป็นท่านประธานของเรา!"
10001045-22 = "ฉันจะบันทึกชัยชนะนี้ลงในประวัติศาสตร์ของสหภาพเรดวินเทอร์เลยค่ะ!"
10001045-23 = "เป็นความคิดที่ดีมากเลยโทโมเอะ!#nถ้าทำแบบนั้น นักเรียนรุ่นหลังจะต้องได้ชื่นชมความยิ่งใหญ่ของเราแน่นอน"
10001045-24 = "ให้บันทึกว่าอะไรดีนะ? <ประธานเชริโน่ที่ยิ่งใหญ่ของสหภาพเรดวินเทอร์เอาชนะในการแข่งขัน#nกับนักเรียนจากห้องเรียนพิเศษด้วยตนเอง...>"
10001045-25 = "เดี๋ยวนะ? จะว่าไป... ทำไมเราถึงมาแข่งขันอะไรแบบนี้กันอยู่นะ?"
10001045-26 = "เอาเถอะ ยังไงเราก็ไม่สนใจอยู่แล้ว สิ่งสำคัญที่สุดคือการที่เราได้เป็นผู้ชนะต่างหาก ฮ่ะฮ่ะฮ่า!"
10001045-29 = "ฮึ่ม.. น่าโมโห! ฉันแพ้ให้กับเด็กตัวกะเปี๊ยกแบบนี้งั้นเหรอ..."
10001045-30 = "นี่! เธอแพ้ให้เราแล้ว ยังมาเรียกเราว่าเด็กตัวกะเปี๊ยกอีกเรอะ?"
10001045-31 = "ฮึ่ม! ถึงจะเก่งได้ไม่เท่าเรา แต่เธอก็ไม่เลวเลยนะ"
10001045-32 = "ถ้าเราไม่ขยันกินพุดดิ้งล่ะก็ ต่อให้ร่างกายแข็งแกร่งแค่ไหนก็คงกลืนกัมปอตเชื่อมนั่นไม่ลงหรอก"
10001045-33 = "เรานับถือเธอเลยที่อดทนได้ถึงขนาดนั้น นี่ยังไม่นับเรื่องความยากลำบากที่ต้องมาใช้ชีวิต#nในสภาพแวดล้อมที่เย็นยะเยือกแบบนี้ด้วย"
10001045-34 = "ประธานเชริโน่..."
10001045-35 = "เพราะฉะนั้น ถ้าเราได้กลับไปถึงสำนักเลขาธิการอย่างปลอดภัย#nเราจะยกเลิกการพักการเรียนของพวกเธอให้!"
10001045-36 = "พูดซะเท่เลย แต่นั่นมันไม่ใช่เรื่องที่ต้องทำให้พวกเราตั้งแต่แรกอยู่แล้วเหรอคะ!"
10001045-37 = "อะ... เอ๋? อย่างนั้นหรอกเหรอ?"
10001045-38 = "เฮ้อ... ช่วยไม่ได้สินะคะ"
10001045-39 = "ถ้าไม่ได้ความช่วยเหลือจากประธานเชริโน่ พวกเราก็คงออกจากอาคารเรียนเก่านี่ไปไม่ได้#nไหนจะยังมีคุณครูอีก..."
10001045-40 = "เอาเป็นว่า ฉันจะช่วยประธานเชริโน่สักระยะหนึ่งแล้วกัน"
10001045-42 = "ฮุฮุ เห็นพลังแห่งผู้นำของเราแล้วสินะ"
10001045-44 = "ถึงจะเป็นนักเรียนจากห้องเรียนพิเศษที่โดนไล่ออกมา แต่ก็ยังโดนเสน่ห์ของเราดึงดูดอยู่ดี ฮ่าฮ่าฮ่า!"
10001045-46 = "ยิ่งฟังก็ยิ่งหงุดหงิด! ใครก็ได้เอาเด็กตัวกะเปี๊ยกคนนี้ไปเก็บที!"
10001045-48 = "ต้องให้บอกกี่ครั้งกันน่ะว่าเราไม่ใช่เด็กตัวกะเปี๊ยก!"

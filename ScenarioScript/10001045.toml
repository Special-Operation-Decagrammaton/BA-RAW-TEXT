[translation]
10001045-1 = "Episode 4;The First Victory!"
10001045-2 = "Red Winter Academy Former Institute"
10001045-3 = "About an hour into the drinking contest..."
10001045-4 = "Oof... Ughhh..."
10001045-5 = "Th-This is torture... I've never even heard of kompot like this before..."
10001045-6 = "[s] \"Is there alcohol in it?\""
10001045-7 = "No, the problem is that it's—"
10001045-8 = "Sweet! Way too sweet!"
10001045-9 = "What's going on, Shigure?! This kompot is so sweet my teeth hurt!"
10001045-10 = "Sugar burns quickly, making the candied fruits in kompot ideal for combating the harsh temperatures we face out here."
10001045-11 = "Sure, but this is crazy! I can feel the sugar crystals in every sip! At this rate my teeth are going to all fall out!"
10001045-12 = "Ugh, if I have to take one more drink, I'm think I'm gonna..."
10001045-13 = "H-Heh... Looks like you're at your limit."
10001045-14 = "I eat all kinds of sweets at the secretariat. This sweetness is n-n-nothing to me!"
10001045-15 = "If you wanna give up, now's your chance!"
10001045-16 = "Ughhh... I don't want to lose, but..."
10001045-18 = "...I give up."
10001045-20 = "Hurray! I did it!"
10001045-21 = "What a brilliant victory, Great Leader! One fitting of our beloved President Cherino!"
10001045-22 = "Today's contest will go down as a momentous event in the history of Red Winter Academy!"
10001045-23 = "Excellent idea, Chief Secretary Tomoe! Students of many generations to come will know of my greatness!"
10001045-24 = "How should the story go? \"Red Winter Academy's President Cherino personally faced down the students of the Spec Ops and claimed sweet victory for...\""
10001045-25 = "Uh... Why did we have this contest again?"
10001045-26 = "Oh, well. Must not be important, all I know is that I won! Hahaha!"
10001045-29 = "Ugh, this sucks... I can't believe I lost to that little brat..."
10001045-30 = "You're still calling me a little brat even after I've won?!"
10001045-31 = "A-Anyway, you may not have been able to keep up with me, but you still did pretty decent."
10001045-32 = "Had I neglected my pudding regimen, I wouldn't have been able to take a sip of that kompot without keeling over."
10001045-33 = "Comrade Nodoka, as comrades on the battlefield of sweetness, I want to pay my respects to you for enduring everything to the end."
10001045-34 = "President Cherino..."
10001045-35 = "Therefore, when I return to the secretariat, I will revoke your suspension immediately!"
10001045-36 = "But you should have done that a long time ago!"
10001045-37 = "H-Huh? Oh, really?"
10001045-38 = "Geez... I'll take what I can get."
10001045-39 = "Getting out of here without your help would be hard, and there's also Sensei to consider..."
10001045-40 = "So I'll help you out for now."
10001045-42 = "Haha! My great leadership finally bears its fruit."
10001045-44 = "Even exiles can't help but be drawn in by my charisma! Hahaha!"
10001045-46 = "Gah! I can't stand this arrogant little brat!"
10001045-48 = "I told you I'm not a little brat!"

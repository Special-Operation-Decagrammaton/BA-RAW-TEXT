[translation]
10001045-1 = "第4話;初次勝利"
10001045-2 = "赤冬聯邦學園．舊校舍"
10001045-3 = "距離「飲酒比賽」開始已過了約一個小時……"
10001045-4 = "唔唔……唔唔唔……"
10001045-5 = "好，好痛苦……咱從沒聽說過有這種康波特……"
10001045-6 = "[s]「咦。果然有摻酒進去嗎？」"
10001045-7 = "不，不是那種問題……"
10001045-8 = "好甜！甜過頭了！"
10001045-9 = "這到底是什麼，時雨醬！這個甜到快把牙齒融化的康波特！？"
10001045-10 = "康波特原本就是將水果浸漬在糖內製成的飲料。 #n而且，為了抵禦舊校舍的嚴寒，大量的糖分是不可少的！"
10001045-11 = "但這太誇張了吧！每次喝的時候，還咬得到一顆顆的砂糖，感覺連大腦都要融化了！"
10001045-12 = "唔唔，只要再喝一口，我就要……"
10001045-13 = "呵，呵呵……看來你已經到極限了。"
10001045-14 = "但是，對於在事務局裡吃過各種甜點的潔莉諾大人來說，這樣的甜度根本不算什麼！"
10001045-15 = "想放棄的話就趁現在吧！"
10001045-16 = "唔唔……雖然不想認輸……"
10001045-18 = "我，我不行了。是我輸了……"
10001045-20 = "萬歲──！贏了！"
10001045-21 = "是場傑出的勝利，潔莉諾會長！不愧是會長！"
10001045-22 = "得將今天的勝負好好記錄下來，讓它永遠保留在赤冬聯邦學園的歷史上！"
10001045-23 = "這個主意不錯，智惠秘書室長！ #n這樣一來，未來的學生們也能讚頌咱的偉大了！"
10001045-24 = "不過要寫什麼才好呢？ #n「赤冬聯邦學園的偉大潔莉諾會長，親自與特別班的學生們對決並獲勝……」"
10001045-25 = "咦？話說回來，為什麼要進行這場比賽？"
10001045-26 = "嘛，無所謂。重要的是咱贏了，哈哈哈！"
10001045-29 = "呃呃，不甘心……竟然輸給這種小毛頭……"
10001045-30 = "你都輸了比賽，竟然還叫咱小毛頭！"
10001045-31 = "嘛，算了……雖然還比不上咱，但你也很努力了。"
10001045-32 = "要不是經常吃布丁的話，也很難喝下那麼多康波特吧。"
10001045-33 = "再加上，能在這種嚴酷的環境之下堅持到現在，咱都不禁想對你表達敬意了。"
10001045-34 = "潔莉諾會長……"
10001045-35 = "因此，等到咱平安回到事務局之後，就立刻取消你們的停學處分吧！"
10001045-36 = "……不是，就算沒有這場比賽也請快點取消啊！"
10001045-37 = "啊，啊咧？現在不是該讚頌咱的時候嗎？"
10001045-38 = "哈啊……真是沒辦法。"
10001045-39 = "為了離開這座舊校舍，需要潔莉諾會長的批准……而且，老師也在……"
10001045-40 = "就決定暫時幫助潔莉諾會長吧。"
10001045-42 = "呵呵，咱優秀的領導能力果然發揮作用了啊。"
10001045-44 = "就算是特別班的停學生，在咱超凡的魅力前也不得不服從啊。哈哈哈！"
10001045-46 = "……果然讓人火大啊！這個煩人的小毛頭！"
10001045-48 = "就說了咱不是小毛頭！"

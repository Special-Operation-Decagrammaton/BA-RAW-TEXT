[translation]
10001045-1 = "#title;제4화;첫 번째 승리!"
10001045-2 = "#place;붉은겨울 학원 구교사"
10001045-3 = "#na;<많이 마시기 대회>를 진행한 지 한 시간 정도 지났을 무렵……."
10001045-4 = "3;노도카;06;으윽…… 으으으…….\n#3;em;[속상함]\n#3;stiff\n#3;a"
10001045-5 = "1;체리노;06;괴, 괴로워…… 이런 캄포트가 있다는 이야기는 들어본 일이 없어…….\n#1;stiff\n#1;em;[땀]\n#1;a\n#3;m5"
10001045-6 = "[s] \"역시 술이 섞여 있었던 건가?\""
10001045-7 = "1;체리노;06;아니, 그런 문제가 아니라…….\n#1;em;…"
10001045-8 = "3;노도카;04;달아! 지나치게 달다구요!\n#3;hophop"
10001045-9 = "3;노도카;05;도대체 뭔가요, 시구레 쨩! 이가 썩어버릴 만큼 달착지근한 이 캄포트는?"
10001045-10 = "1;시구레;03;캄포트란 본디 과일을 설탕에 절여 만드는 음료. #n거기에 구교사의 혹한을 이겨 내기 위해서라면 충분한 설탕은 필수지!\n#1;em;[음표]\n#1;a"
10001045-11 = "3;노도카;04;하지만 이건 너무 심하잖아요! 마실 때마다 설탕이 아작아작 씹혀서 머리가 녹아내리는 것만 같아요!"
10001045-12 = "3;노도카;06;우욱, 한 모금이라도 더 마셨다가는 분명…….\n#3;stiff"
10001045-13 = "1;체리노;99;후, 후후…… 그대는 벌써 한계인 모양이군.\n#1;em;…"
10001045-14 = "1;체리노;05;하지만 사무국에서 온갖 종류의 스위트를 먹어온 이 체리노 님에게 이 정도의 당분은 아, 아, 아무렇지도 않으니까—!"
10001045-15 = "1;체리노;01;포기하려면 지금이 기회이니라!\n#1;hophop"
10001045-16 = "3;노도카;05;우윽……패배를 인정하고 싶지는 않지만…….\n#3;em;[속상함]\n#3;stiff"
10001045-17 = "3;노도카;05\n#3;m3\n#1;dl\n#wait;1500"
10001045-18 = "3;노도카;06;더는 무리에요. 제가 졌어요…….\n#3;em;…"
10001045-19 = "#all;hide"
10001045-20 = "3;체리노;03;만세! 이겼다!\n#3;a\n#3;em;[음표]\n#3;hophop"
10001045-21 = "5;토모에;03;멋진 승리로군요, 체리노 회장님! 역시 회장님이십니다!\n#5;al\n#5;em;[반짝]\n#3;m1"
10001045-22 = "5;토모에;01;오늘의 이 승부는 기록으로 새겨 붉은겨울 학원의 역사에 길이 남기도록 하죠!\n#5;greeting"
10001045-23 = "3;체리노;01;좋은 생각이다, 토모에 비서실장! #n그렇게 하면 먼 후대의 학생들도 이 몸의 위대함을 기릴 수 있겠지!\n#3;em;[반응]"
10001045-24 = "3;체리노;99;문구는 무어라고 쓰는 게 좋을까? #n<붉은겨울 학원의 위대하신 체리노 회장께서 친히 특별반의 학생들과 대결을 하여 승리를…….>\n#3;m3\n#5;dr"
10001045-25 = "3;체리노;02;어라? 그러고 보니 무엇 때문에 이런 시합을 하고 있었더라?\n#3;em;[?]"
10001045-26 = "3;체리노;03;뭐, 아무래도 상관없으려나. 이 몸이 승리했다는 사실만이 중요한 것이니까. 하하하!\n#3;em;[재잘]\n#3;hophop"
10001045-27 = "3;체리노;03\n#3;d\n#wait;1000"
10001045-28 = "#all;hide"
10001045-29 = "3;노도카;06;으윽, 분해……. 이런 꼬맹이에게 지다니…….\n#3;em;[속상함]\n#3;stiff\n#3;a"
10001045-30 = "1;체리노;05;그대는 승부에 지고도 아직도 이 몸을 꼬맹이라고 부르고 있는 것인가!\n#1;ar\n#3;m5\n#1;hophop\n#1;em;[빠직]"
10001045-31 = "1;체리노;99;흠, 흠! 뭐, 이 몸만큼은 아니지만 그대의 선전도 훌륭했네."
10001045-32 = "1;체리노;99;평소에 푸딩을 부지런히 먹어두지 않았더라면, 아무리 이 몸이라 하더라도 그 캄포트는 한 모금도 넘기지 못했을 거야."
10001045-33 = "1;체리노;01;이러한 극한의 환경 속에서도 끝까지 버텨 준 그대에게는 경의를 표하고 싶을 정도라네."
10001045-34 = "3;노도카;02;체리노 회장…….\n#3;em;…"
10001045-35 = "1;체리노;03;그런 의미에서 이 몸이 사무국으로 무사히 돌아가게 된다면 바로 그대들의 정학 조치를 취소해주겠네!\n#1;em;[반짝]"
10001045-36 = "3;노도카;04;아니, 그건 원래 당연히 하셔야 하는 일이잖아요!\n#3;hophop"
10001045-37 = "1;체리노;04;어, 어라? 그랬었던가?\n#1;em;[땀]\n#1;stiff"
10001045-38 = "3;노도카;05;어휴…… 하는 수 없겠네요.\n#3;stiff"
10001045-39 = "3;노도카;99;이 구교사에서 벗어나기 위해서는 체리노 회장의 도움 없이는 어려울 것 같고, 선생님의 얼굴도 있고……\n#3;em;…"
10001045-40 = "3;노도카;01;당분간은 체리노 회장을 돕도록 할까요."
10001045-41 = "3;노도카;01\n1;체리노;99\n#1;h"
10001045-42 = "1;체리노;99;후후, 역시 이 몸의 위대한 영도력이 빛을 발한 것인가."
10001045-43 = "3;노도카;01\n1;체리노;03\n#1;h"
10001045-44 = "1;체리노;03;아무리 특별반의 정학생이라 하더라도 이 몸의 카리스마를 마주한 이상, 따르지 않고는 버틸 재간이 없었겠지, 하하하!\n#1;em;[재잘]"
10001045-45 = "3;노도카;05\n1;체리노;03\n#3;h"
10001045-46 = "3;노도카;05;역시 짜증 나! 이 꼬맹이 짜증 난다고요!\n#3;em;[빠직]\n#3;m3\n#3;hophop"
10001045-47 = "3;노도카;05\n1;체리노;05\n#1;h"
10001045-48 = "3;노도카;05\n1;체리노;05;그러니까 이 몸은 꼬맹이가 아니라고 해도!\n#3;m4\n#1;m2\n#1;hophop"
10001045-49 = "#continued"

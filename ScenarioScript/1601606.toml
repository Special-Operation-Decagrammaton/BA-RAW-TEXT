[translation]
1601606-1 = "Each Other's Excuses"
1601606-2 = "I finished my work early and headed to the cafe for my plans with Mine."
1601606-6 = "You have arrived, Sensei."
1601606-11 = "I greeted you this morning via MomoTalk. But I shall do so again. Hello."
1601606-12 = "[s1] \"You're looking good. You seem happy as well.\"\n[s2] \"You don't need to be so stiff.\""
1601606-17 = "W-Well... So..."
1601606-21 = "*sigh*"
1601606-22 = "It is as you say. Yes."
1601606-23 = "The costume is very cute. The more I gaze upon it, the more my affection grows. You may even say that I am feeling...attached."
1601606-24 = "I feel a chill run down my spine when I recall my previous intent to dispose of it."
1601606-25 = "It was thanks to you that I could protect this precious costume. My gratitude towards you can never truly be expressed."
1601606-26 = "You even went so far as to find a suitable justification for me to continue wearing it. You relieved me of a great burden."
1601606-27 = "[s3] \"Don't worry about it. Same goes for me.\"\n[s4] \"Thanks to that, I had a good excuse to take a break.\""
1601606-30 = "...Is that so? Heehee. I am thrilled to hear that."
1601606-31 = "Of course, I understand that you are speaking out of consideration. However, rather than me constantly being on the receiving end of your care..."
1601606-32 = "...it makes me happy, indeed, to provide you with a good excuse."
1601606-33 = "But..."
1601606-34 = "...Mm."
1601606-38 = "[ns] \"Mine?\""
1601606-42 = "I-It's nothing. It's just..."
1601606-46 = "This is difficult to say. Now that I have acknowledged the meaning behind this costume, I can no longer escape these bashful feelings."
1601606-47 = "The Carnival has ended. And I have no concert or photoshoot to attend today."
1601606-48 = "Thus, I cannot help but wonder...if, perhaps, from your perspective...you find me strange?"
1601606-49 = "Are you thinking, \"She really wants to wear something like this?\" Or how shall I grapple with it if you see me as another bothersome student you simply must handle?"
1601606-53 = "Hm?"
1601606-54 = "Y-You do not harbor any of those thoughts? H-However..."
1601606-56 = "[ns5] \"You're a cute kid, wearing cute clothes.\"\n[ns6] \"I'm actually almost worried that I'll call you too often.\""
1601606-61 = "Th-That is...! What are you saying...?!"
1601606-62 = "Your lip service is simply too much!"
1601606-63 = "...How could I...?"
1601606-68 = "Haha! Hahahaha!"
1601606-69 = "[s7] \"...Mine?\"\n[s8] \"Why're you laughing, all of a sudden?\""
1601606-74 = "Ah. My apologies. It's simply rather amusing to find myself saying these things."
1601606-75 = "Conversations with you seem to always take this turn, in one way or another."
1601606-76 = "Yes. And now that we have arrived at this conclusion, I sincerely doubt that you would wish for me to continue pressing the matter."
1601606-77 = "So, instead, since we have met out here..."
1601606-81 = "I will very gratefully monopolize your time for today, Sensei."
1601606-82 = "I am acquainted with this area. Today is a time for you to rest, is it not?"
1601606-88 = "I shall escort you. Sensei."
1601606-89 = "Let us sally forth. This way..."
1601606-96 = "I followed Mine to a nearby riverside."
1601606-100 = "Perhaps it was due to the good weather, but there were quite a few people."
1601606-104 = "Hm. This area is quite a bit more populated than I had expected. This subverts my intentions in coming here..."
1601606-105 = "I was hoping to provide a quiet and spacious experience for you..."
1601606-109 = "...Ah."
1601606-110 = "I have happened upon an excellent idea. This way, Sensei."
1601606-117 = "[ns9] \"...This is?\"\n[ns10] \"A swan boat...?\""
1601606-120 = "...Yes. Please board, Sensei."
1601606-121 = "You will be able to rest comfortably here, in solitude."
1601606-131 = "Now, come, Sensei. The footing may be wobbly, so please take my hand."
1601606-132 = "Once you've settled into your seat, take this opportunity to let go of your worries. You may even nap. If needed, I can provide an accompanying lullaby."
1601606-136 = "Heehee. Perhaps...it shall be a long ride."
1601606-137 = "Yes. In fact, I..."
1601606-142 = "...wish for that to happen."
1601606-144 = "Afterwards, I got onto the swan boat and spent time with Mine on the lake."
1601606-148 = "I ended up completely falling asleep from the rippling surface and Mine's soft singing."

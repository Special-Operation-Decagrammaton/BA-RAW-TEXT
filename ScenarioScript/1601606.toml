1601606-23 = "3;미네 아이돌;04;옷이 참 귀여워서……. 볼수록 마음에 들고, 뭔가 애착마저 생겨 버렸습니다."
1601606-24 = "3;미네 아이돌;09;이런 옷을 처분할 생각을 했었다는 걸 떠올리면, 저도 모르게 등골이 서늘해지기까지 합니다.\n#3;em;[속상함]\n#3;stiff"
1601606-25 = "3;미네 아이돌;02;선생님 덕분에 지킬 수 있었군요. 이 부분은 몇 번을 감사드려야 할지 모르겠습니다."
1601606-26 = "3;미네 아이돌;00;이렇게 마음 편하게 입을 수 있는, 좋은 변명거리도 만들어 주시고 말이지요."
1601606-27 = "[s3] \"신경 쓰지 마. 나도 마찬가지니까.\"\n[s4] \"덕분에 나도 함께 쉴 변명거릴 만든 거니까.\""

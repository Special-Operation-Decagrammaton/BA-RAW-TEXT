[translation]
1601606-1 = "ข้อแก้ตัวของกันและกัน"
1601606-2 = "(คุณครูเลิกงานเร็ว จึงออกไปที่คาเฟ่เพื่อเจอกับมิเนะตามนัด)"
1601606-6 = "อยู่ตรงนี้สินะคะ คุณครู"
1601606-11 = "ตอนเช้าก็ทักทายทาง MOMOTALK ไปแล้ว และตอนนี้ก็ได้มาทักทายอีกครั้งนะคะ"
1601606-12 = "[s1] \"ใส่ชุดนี้แล้วดูอารมณ์ดีเลยนะ ว่าแต่มีอะไรหรือเปล่า?\"\n[s2] \"ทำไมครูรู้สึกเหมือนมิเนะประหม่าอะไรเลย?\""
1601606-17 = "คะ... คือว่า... เอ่อ..."
1601606-21 = "เฮ้อ..."
1601606-22 = "ค่ะ... ใช่แล้วค่ะ เป็นอย่างที่คุณครูว่าเลยค่ะ"
1601606-23 = "ชุดนี้มันน่ารักมาก... ยิ่งฉันเห็นเท่าไรก็ยิ่งชอบ และเหมือนจะเกิดความผูกพันไปแล้วด้วยค่ะ"
1601606-24 = "พอคิดว่าแต่ก่อนฉันเคยคิดจะกำจัดชุดนี้ ฉันก็กลัวตัวเองขึ้นมาอย่างบอกไม่ถูกเลยค่ะ"
1601606-25 = "ต้องขอบคุณคุณครูที่ทำให้ฉันยังรักษาชุดนี้ไว้ได้นะคะ ฉันไม่รู้เลยค่ะว่าต้องขอบคุณเรื่องนี้ยังไงดี"
1601606-26 = "คุณครูช่วยหาข้ออ้างดีๆ ที่ทำให้ฉันใส่ชุดนี้ได้อย่างสบายใจน่ะค่ะ"
1601606-27 = "[s3] \"ไม่ต้องคิดมากนะ ครูเองก็ได้ออกมาพักเหมือนกัน\"\n[s4] \"นี่ก็เป็นข้ออ้างให้ครูได้ออกมาพักผ่อนเหมือนกันนะ\""
1601606-30 = "งั้นเหรอคะ... ฮุฮุ ถ้าอย่างนั้นก็ค่อยยังชั่วค่ะ"
1601606-31 = "ที่จริงฉันรู้ค่ะว่าคุณครูพูดอย่างนั้นก็เพื่อฉัน แต่ถ้าฉันจะเป็นข้ออ้างให้คุณครูได้ออกมาอย่างนี้บ้าง..."
1601606-32 = "มันก็ดีกว่าการที่ฉันเป็นผู้ได้ประโยชน์อยู่ฝ่ายเดียวนะคะ"
1601606-33 = "แต่ว่า..."
1601606-34 = "อืม..."
1601606-38 = "[ns] \"มิเนะ?\""
1601606-42 = "มะ... ไม่มีอะไรค่ะ ก็แค่..."
1601606-46 = "จะว่ายังไงดีล่ะ พอทำให้รู้แล้วว่าชุดนี้เป็นชุดพิเศษ มันก็เลยยากที่จะซ่อนความรู้สึกเขินอายไว้น่ะค่ะ"
1601606-47 = "ยังไงตอนนี้ก็ไม่ใช่ช่วงงานเทศกาลแล้ว และฉันก็ไม่ได้มีการแสดงหรือถ่ายรูปอะไรเป็นพิเศษด้วย"
1601606-48 = "ฉันก็เลยกังวลว่า... ถ้าเกิดคุณครูคิดว่าฉันเป็นเด็กที่แปลกๆ ล่ะ... หรือไม่ก็ ทำไมถึงต้องใส่ชุดนี้ให้ได้#nด้วยนะ..."
1601606-49 = "หรือถ้าคุณครูคิดว่าฉันทำตัวเป็นเด็กน่ารำคาญล่ะ..."
1601606-53 = "คะ...?"
1601606-54 = "ไม่เคยคิดแบบนั้นเลยเหรอคะ? ตะ... แต่ถึงอย่างนั้นก็เถอะ..."
1601606-56 = "[ns5] \"เด็กที่น่ารักกำลังใส่ชุดน่ารักๆ ต่างหากล่ะ\"\n[ns6] \"ครูต่างหากที่กลัวว่าจะขอให้ใส่มาหาบ่อยๆ น่ะ\""
1601606-61 = "ตะ... ตายจริง...!! พูดอะไรแบบนั้นคะ...!!"
1601606-62 = "ถึงในใจจะคิดอย่างนั้น แต่ก็ไม่จำเป็นต้องพูดออกมาก็ได้ค่ะ!!"
1601606-63 = "เพราะนั่นจะทำให้ฉัน..."
1601606-68 = "ฮุฮุ ฮุฮุฮุ..."
1601606-69 = "[s7] \"มิเนะ หัวเราะอะไรเหรอ...?\"\n[s8] \"ทำไมจู่ๆ ก็หัวเราะน่ะ...?\""
1601606-74 = "อ๊ะ ขอโทษค่ะ จู่ๆ ฉันก็ตลกกับตัวเองที่เป็นแบบนี้ค่ะ"
1601606-75 = "ดูเหมือนว่าการคุยกับคุณครูจะจบในทิศทางนี้เสมอเลยนะคะ"
1601606-76 = "ตอนนี้คุณครูก็คงไม่อยากให้ฉันกังวลเรื่องเดิมๆ ซ้ำอีก"
1601606-77 = "งั้นในเมื่อเราทั้งคู่ออกมาแบบนี้แล้ว..."
1601606-81 = "ต่อให้จะเป็นระยะเวลาสั้นๆ... แต่ฉันก็จะใช้เวลานี้ให้คุ้มค่าที่สุดค่ะ"
1601606-82 = "ฉันรู้จักสถานที่ดีๆ ที่น่าไปอยู่ค่ะ ฉันจะเตรียมพื้นที่ที่เงียบสงบให้คุณครูได้พักผ่อนอย่างเต็มที่เลยค่ะ"
1601606-88 = "ฉันจะนำทางให้ค่ะ คุณครู"
1601606-89 = "เอาละ ตามมาเลยค่ะ ทางนี้ค่ะ..."
1601606-96 = "(คุณครูเดินตามมิเนะไปที่ริมฝั่งแม่น้ำใกล้ๆ)"
1601606-100 = "(ไม่รู้เพราะอากาศดีหรือเปล่า วันนี้ที่นั่นจึงมีคนออกมาเยอะ)"
1601606-104 = "อืม คนเยอะกว่าที่คิดนะคะเนี่ย ฉันไม่ได้ตั้งใจจะให้เป็นแบบนี้เลย..."
1601606-105 = "ฉันอยากหาพื้นที่ที่เงียบสงบกว่านี้สักหน่อยแท้ๆ..."
1601606-109 = "อ๊ะ..."
1601606-110 = "ฉันคิดอะไรดีๆ ออกแล้วค่ะ ตามมาสิคะ คุณครู"
1601606-117 = "[ns9] \"นี่มัน... เรือเป็ดนี่นา?\"\n[ns10] \"ที่ที่ว่าคือ... เรือเป็ดเหรอ?\""
1601606-120 = "ค่ะ... ขึ้นเรือสิคะ คุณครู"
1601606-121 = "ฉันคิดว่าที่นี่น่าจะเป็นที่ที่พักผ่อนอย่างเงียบๆ ได้ค่ะ"
1601606-131 = "มาทางนี้สิคะ คุณครู เรืออาจจะสั่นได้ ฉันจะจับมือคุณครูไว้เองค่ะ"
1601606-132 = "พอได้มานั่งแล้ว ขอให้คุณครูลืมเรื่องงานทั้งหมดแล้วงีบหลับได้เลยค่ะ ถ้าคุณครูต้องการ จะให้ฉันร้องเพลงกล่อมให้ก็ได้นะคะ"
1601606-136 = "ฮุฮุ เพราะบางทีนี่อาจเป็น... การเดินเรือที่ใช้เวลานานก็ได้ค่ะ"
1601606-137 = "ค่ะ ที่จริงแล้วฉัน..."
1601606-142 = "อยากให้เป็นอย่างนั้นน่ะค่ะ"
1601606-144 = "(หลังจากนั้นคุณครูกับมิเนะก็ได้ใช้เวลาด้วยกันบนเรือเป็ดในทะเลสาบ)"
1601606-148 = "(ผิวน้ำที่สั่นไหวกับเพลงกล่อมของมิเนะทำให้คุณครูหลับไปโดยไม่รู้ตัว)"

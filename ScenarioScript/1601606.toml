[translation]
1601606-1 = "彼此的藉口"
1601606-2 = "（因為工作提早結束，按照約定前往了咖啡廳見美禰）"
1601606-6 = "您在這裡啊，老師。"
1601606-11 = "雖然早上已經用MomoTalk和您打過招呼，不過我還是想再跟您問個好。"
1601606-12 = "[s1]「衣服很適合你哦。你看起來心情也蠻好的。」\n[s2]「會覺得緊張嗎？」"
1601606-17 = "那，那個……我……"
1601606-21 = "……呼。"
1601606-22 = "是的……正如老師所說。"
1601606-23 = "因為這套衣服實在太可愛的關係……#n不禁讓人越看越喜歡，現在甚至已經到了愛不釋手的地步。"
1601606-24 = "一想到自己竟然曾打算處理掉這件衣服，就不由得感到背脊發涼。"
1601606-25 = "多虧有老師，我才得以守住這套衣服……真不知道該怎麼感謝老師才好。"
1601606-26 = "謝謝您給了我一個合適的藉口，讓我能夠安心地穿上這套衣服。"
1601606-27 = "[s3]「你不用在意。畢竟這對我而言也是一樣的。」\n[s4]「多虧有你，我也多了一個可以偷懶的藉口。」"
1601606-30 = "……是嗎？#n呵呵，那真是太好了。"
1601606-31 = "雖然老師這麼說可能只是在安慰我，不過比起單方面接受老師的幫助……"
1601606-32 = "假如能以這種方式成為老師的藉口，我自然也十分樂意。"
1601606-33 = "只不過……"
1601606-34 = "……唔嗯。"
1601606-38 = "[ns]「美禰？」"
1601606-42 = "沒，沒什麼，我只是……"
1601606-46 = "該怎麼說呢……#n意識到這是套特別的衣服之後，突然覺得有點害羞。"
1601606-47 = "現在畢竟不在狂歡節期間，今天也沒有要進行表演或拍攝。"
1601606-48 = "要是被別人用奇怪的眼光看待該怎麼辦……我突然想到了這件事。"
1601606-49 = "旁人會不會心想「有必要穿這種衣服出門嗎」……#n認為我是個愛慕虛榮的人呢……"
1601606-53 = "……嗯？"
1601606-54 = "……您說完全不會？#n可，可是……"
1601606-56 = "[ns5]「可愛的孩子穿著可愛的衣服有什麼問題。」\n[ns6]「我反而擔心自己以後會太常約你出來呢。」"
1601606-61 = "咦咦……！！您剛才說什麼……！！"
1601606-62 = "真是的，您不用刻意說那種話沒關係！！"
1601606-63 = "不管怎麼說，我……"
1601606-68 = "呵呵，呵呵呵……"
1601606-69 = "[s7]「……美禰？」\n[s8]「怎麼突然笑了……？」"
1601606-74 = "啊，不好意思。#n只是突然覺得現在的情況很好笑而已。"
1601606-75 = "不知道為什麼，我和老師的對話總是會變成這個樣子呢。"
1601606-76 = "或許老師最不希望看見的，就是我現在還在擔心這種事吧。"
1601606-77 = "既然都約出來了……"
1601606-81 = "哪怕只有這段時間也好……我會心懷感激地佔用老師的時間。"
1601606-82 = "我知道幾個適合打發時間的好地方，就由我來為老師準備適合休息的地點吧。"
1601606-88 = "請讓我來護送您，老師。"
1601606-89 = "我們走吧。"
1601606-96 = "（於是便跟著美禰，走到了附近的河邊）"
1601606-100 = "（或許是因為天氣不錯的關係，河邊的人並不算少）"
1601606-104 = "唔嗯，人比我想像中還多呢……"
1601606-105 = "本來想為老師找一個更清靜的地方的……"
1601606-109 = "……啊。"
1601606-110 = "我想到了一個好主意。#n請跟我來，老師。"
1601606-117 = "[ns9]「……這是？」\n[ns10]「鴨子船……？」"
1601606-120 = "……是的，老師。"
1601606-121 = "到了船上就可以好好放鬆休息了。"
1601606-131 = "老師，因為船有可能會搖晃，請您抓住我的手。"
1601606-132 = "坐下之後請您好好放鬆，就算想小睡一會也沒關係。#n如果有需要的話，我也可以為您獻唱幾首搖籃曲。"
1601606-136 = "呵呵，或許……這會是趟漫長的航程也說不定。"
1601606-137 = "嗯，其實我……"
1601606-142 = "……也不希望航程太早結束呢。"
1601606-144 = "（後來便和美禰一起乘坐鴨子船，在湖上打發時間）"
1601606-148 = "（隨著湖面的搖擺和美禰的輕聲歌唱，不知不覺間進入了夢鄉）"

[translation]
1004315-1 = "ความจริงใจที่สลักไว้"
1004315-4 = "(คุณครูมาถึงชายหาดตามเวลาที่สัญญาไว้กับวาคาโมะ)"
1004315-8 = "อ่า มาถึงแล้วเหรอคะ"
1004315-9 = "ชายหาดของเราสองคนที่รอคอยมาแสนนาน ฉันเฝ้ารอช่วงเวลานี้มานานมาก"
1004315-10 = "[s1] \"เป็นชายหาดที่สวยแล้วก็สะอาดดีจังเลยนะ\"\n[s2] \"ไม่มีคนอยู่เลยด้วย\""
1004315-13 = "ฮุฮุฮุ ฉันไม่ยกโทษให้ใครก็ตามที่มาขัดจังหวะการพบกันกับคุณท่านค่ะ"
1004315-14 = "วาคาโมะผู้นี้รีบมาถึงก่อนและเก็บกวาดบริเวณรอบๆ ไว้หมดแล้วค่ะ"
1004315-15 = "โดยไม่ให้เหลือแมลงสกปรกแม้แต่ตัวเดียว..."
1004315-16 = "[s3] \"เอ่อ จัดการที่ว่านั่น...\"\n[s4] \"คงแค่จัดการธรรมดาๆ ใช่มั้ย?\""
1004315-19 = "คำว่า \"จัดการ\" มีความหมายอื่นด้วยเหรอคะ?"
1004315-20 = "นอกจากพวกแมลงแล้วก็ยังเก็บกวาดพวกเปลือกหอยแหลมๆ ที่อยู่บนทราย รวมถึงขยะที่ถูกพัดมากองอยู่บนชายหาดด้วย"
1004315-24 = "หรือว่า... ไม่ถูกใจงั้นเหรอคะ?"
1004315-25 = "[s] \"เปล่าๆ! ขอโทษที่เข้าใจผิดนะ! ครูชอบจริงๆ!\" "
1004315-26 = "ฮุฮุฮุ ถ้าเป็นอย่างนั้นก็ค่อยโล่งอกไปทีนะคะ"
1004315-27 = "การจัดการพวกคนที่มีพฤติกรรมไม่น่ารักไปด้วยในคราวเดียวกันก็ถือว่าคุ้มเหมือนกันค่ะ"
1004315-28 = "[s] \"ไม่ได้เข้าใจผิดไปเองจริงๆ ด้วย?!\""
1004315-29 = "ไม่ต้องห่วงหรอกค่ะ"
1004315-30 = "ฉันรู้ดีว่าคุณท่านคงไม่สบายใจหากเกิดเหตุทะเลาะกันขึ้นที่นี่ เพราะงั้นก็เลยพยายามโน้มน้าวพวกเธอเงียบๆ เอาน่ะค่ะ"
1004315-31 = "ทุกคนดูเหมือนจะเข้าใจในสิ่งที่ฉันพูดอย่างดีแล้วก็รีบออกไปกันหมดเลยค่ะ"
1004315-32 = "[s] \"คะ... ค่อยยังชั่วหน่อย\""
1004315-33 = "เอาละ งั้นเราก็ไปสนุกกับทะเลของเราสองคนกันเถอะค่ะ"
1004315-34 = "[s] \"แล้ววาคาโมะอยากทำอะไรที่ชายหาดเหรอ?\""
1004315-35 = "วาคาโมะ... อยากเดินเล่นบนชายหาดกับคุณท่านค่ะ"
1004315-36 = "ถ้าได้พูดคุยเรื่องเล็กๆ น้อยๆ พร้อมกับฟังเสียงคลื่นไปด้วยก็เพียงพอแล้ว..."
1004315-37 = "[s] \"แค่นั้นก็พอแล้วเหรอ?\""
1004315-38 = "ค่ะ แค่นั้นก็เพียงพอแล้วค่ะ"
1004315-39 = "คุณท่านมักจะงานยุ่งเสมอๆ ก็ต้องการเวลาว่างเหมือนกันนะคะ"
1004315-40 = "การเดินเล่นริมชายหาดก็อาจเป็นการพักผ่อนที่ดี"
1004315-41 = "แค่เราได้เพลิดเพลินกับช่วงเวลานี้ด้วยกัน... วาคาโมะผู้นี้ก็ไม่ขออะไรไปกว่านี้อีกแล้วค่ะ"
1004315-42 = "[s] \"อื้อ ถ้างั้น...\""
1004315-44 = "(คุณครูกับวาคาโมะเริ่มเดินเล่นริมชายหาดด้วยกัน)"
1004315-50 = "ฮุฮุฮุ ฉันอยากให้ช่วงเวลาสงบสุขนี้คงอยู่ตลอดไปเลยค่ะ"
1004315-51 = "[s5] \"ถ้าชีวิตวาคาโมะสงบสุขเราจะมีเวลามาเดินเล่นกันบ่อยๆ นะ...\"\n[s6] “เราก็จะมีโอกาสได้มาทำแบบนี้บ่อยขึ้นนะ\""
1004315-57 = "คงเป็นไปไม่ได้หรอกค่ะ..."
1004315-58 = "ชีวิตประจำวันของฉันห่างไกลกับคำว่าสงบสุขมาก"
1004315-59 = "และ... ฉันก็ไม่ไว้ใจใครอื่นด้วยค่ะ"
1004315-60 = "คนเดียวที่ฉันไว้ใจคือคุณครู"
1004315-61 = "[s] \"ทำไมวาคาโมะถึงเชื่อใจครูเหรอ?\""
1004315-62 = "เพราะตอนที่เห็นคุณท่าน หัวใจของฉันก็ถูกช่วงชิงไปแล้วค่ะ"
1004315-63 = "ฉันไม่เข้าใจตัวเองเลยว่าทำไมถึงเป็นแบบนั้น"
1004315-64 = "ทั้งที่ตัดสินใจแล้วว่าจะไม่เชื่อใจใครอีก แต่ทำไมฉันถึงกลับตกหลุมรักคุณท่านได้"
1004315-65 = "เพราะงั้นฉันถึงคอยเฝ้ามองคุณท่านอยู่ห่างๆ"
1004315-66 = "ว่าเป็นคนที่ฉัน... จะไว้ใจได้จริงๆ หรือเปล่า..."
1004315-67 = "และเพราะอยากรู้จักคุณท่านมากขึ้น"
1004315-68 = "และฉันก็ได้รู้ความจริงเรื่องหนึ่งค่ะ"
1004315-69 = "นั่นก็คือคุณท่านเป็นคนดีมากจริงๆ"
1004315-70 = "ได้รู้ว่าคุณท่านเป็นคนที่ปฏิบัติต่อผู้อื่นด้วยความจริงใจเสมอๆ"
1004315-71 = "เพราะงั้นฉันจึงตัดสินใจที่จะเชื่อค่ะ"
1004315-72 = "เชื่อว่าถ้าเป็นคนคนนี้คงจะเข้าใจฉันได้อย่างแน่นอน"
1004315-73 = "เท่านี้พอจะตอบคำถามได้บ้างรึเปล่าคะ?"
1004315-74 = "สักวันหนึ่ง ฉันจะเล่าเรื่องราวทั้งหมดที่ไม่เคยเล่ามาก่อนให้คุณท่านฟังนะคะ"
1004315-75 = "[s] \"อื้อ ครูเชื่อนะ\""
1004315-76 = "ฮุฮุฮุ ขอบคุณนะคะ ฉันดีใจจริงๆ ที่คุณมาเป็นคุณครู..."
1004315-77 = "[s] \"ครูก็ดีใจนะที่วาคาโมะเป็นนักเรียนของครู\""
1004315-78 = "อ่า... คำพูดหอมหวานที่แสนจริงใจ...!"
1004315-79 = "งั้นก็หมายความว่า..."
1004315-80 = "คะ... คุณท่าน... ยะ... อยากเข้ามาอยู่ในร่มด้วยกันมั้ยคะ...?"
1004315-81 = "ไม่ได้มีเจตนาอื่นเลยนะคะ..."
1004315-82 = "ฉันแค่กังวลว่าคุณท่านจะตากแดดจนผิวไหม้..."
1004315-86 = "[ns] \"วาคาโมะอยากใช้ร่มด้วยกันสินะ?\""
1004315-87 = "อึก คิดแล้วเชียวว่าคุณท่านต้องสังเกตเห็น"
1004315-88 = "คุณท่านมองจิตใจของฉันได้ทะลุปรุโปร่งแบบนี้ วาคาโมะผู้นี้รู้สึกเขินจนอยากจะขุดหลุมแล้วมุดลงไปซ่อนเลยค่ะ"
1004315-89 = "อ่า ไม่ได้การแล้ว ฉันไม่อาจทนมองคุณท่านได้อีกแล้ว...!"
1004315-93 = "[ns7] \"อ๊ะ วาคาโมะ?!\"\n[ns8] \"ไม่เป็นไร! การซื่อสัตย์กับตัวเองเป็นเรื่องดีนะ!\""
1004315-96 = "......!!"
1004315-97 = "กะ... ก็อย่างที่คุณท่านพูดเลยค่ะ จะต้องซื่อสัตย์กับตัวเอง..."
1004315-98 = "ถึงจะหนีแค่ไหนแต่การวิ่งหนี..."
1004315-99 = "เข้าใจแล้วค่ะ วาคาโมะผู้นี้จะไม่วิ่งหนีอีกแล้วค่ะ!"
1004315-103 = "เอ๋...!"
1004315-107 = "อ่า สัมผัสได้ถึงความร้อนจากร่างกายของคุณท่าน เหมือนฝันเลยนะคะ"
1004315-108 = "ดีจริงๆ ที่แสดงความกล้าออกไปค่ะ"
1004315-113 = "วาคาโมะผู้นี้จะเก็บร่มคันนี้เอาไว้เป็นของล้ำค่าเพื่อระลึกถึงวันนี้ค่ะ"
1004315-114 = "ร่มที่ใช้ร่วมกันในวันที่เรายืนยันความรู้สึกที่มีต่อกัน#nไม่มีสิ่งใดล้ำค่าไปกว่าสิ่งของที่เป็นสัญลักษณ์แห่งความรักอีกแล้วค่ะ"
1004315-115 = "ใช่แล้วค่ะ เรามาเขียนชื่อกันและกันไว้ที่ด้ามไม้ไผ่นี้เถอะค่ะ"
1004315-116 = "เท่านี้ความรักของเราก็จะถูกบันทึกไว้ตลอดไป..."
1004315-121 = "อ๊ะ คนที่อยู่ตรงนั้น...!"
1004315-122 = "ทำไมถึงโผล่มาในเวลาแบบนี้ทุกทีเลย..."
1004315-123 = "ฮุฮุฮุ จะก่อความวุ่นวายต่อหน้าคุณท่านคงไม่ได้ ดังนั้นฉันขอจบความเพลิดเพลินในวันนี้ไว้เท่านี้ก่อนนะคะ"
1004315-124 = "ต้องขอโทษที่เสียมารยาทแต่ฉันคงต้องขอตัวก่อนนะคะ"
1004315-128 = "[ns9] \"เดี๋ยวสิ ถ้าจะหนีก็หนีไปด้วยกันเถอะ\"\n[ns10] \"วาคาโมะเป็นนักเรียนของครูนะ ไปด้วยกันเถอะ\""
1004315-131 = "คุณครูจะไปกับฉัน...?"
1004315-132 = "อ่า...!"
1004315-133 = "หมายถึงจะเล่น \"อะฮ่าฮ่า จับให้ได้ถ้าแน่จริง\" ที่ไม่ได้เล่นเมื่อครั้งก่อนใช่มั้ยคะ?"
1004315-134 = "[s] \"มะ... มันต่างกันอยู่นิดหน่อยน่ะ\""
1004315-135 = "ยะ... หยุดอยู่ตรงนั้นนะ...!!"
1004315-142 = "ฮุฮุฮุ ตอนนี้คนหาเริ่มเล่นเกมแล้ว เพราะงั้นพวกเรารีบหนีไปด้วยกันเถอะค่ะ"
1004315-143 = "ไปให้สุดขอบของคิโวทอสกันเลยค่ะ"
1004315-145 = "(จากนั้นคุณครูก็ได้ใช้เวลาเล่นสนุกกับการหลบหนีอันแสนยาวนานกับวาคาโมะ)"

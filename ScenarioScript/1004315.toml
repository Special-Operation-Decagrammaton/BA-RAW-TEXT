[translation]
1004315-1 = "What's Engraved is Purity"
1004315-4 = "I went to the beach where I promised to meet Wakamo."
1004315-8 = "At last, Sensei. You're here."
1004315-9 = "I've waited so long for this. Just the two of us...on the beach."
1004315-10 = "[s1] \"Yeah, the beach is very nice.\"\n[s2] \"It's pretty empty.\""
1004315-13 = "Heehee, I could not bear the thought of us being disturbed."
1004315-14 = "So I, Wakamo, arrived here early and cleaned up the area."
1004315-15 = "Not even a tiny insect escaped my grasp."
1004315-16 = "[s3] \"When you say \"cleaned up,\" you mean...?\"\n[s4] \"You did it...peacefully?\""
1004315-19 = "Is there an ulterior meaning to the phrase?"
1004315-20 = "I also raked up the sharp shell fragments, both natural and...artillery-based."
1004315-24 = "Are you saying that...you are not satisfied with my work?"
1004315-25 = "[s] \"Not at all! I misunderstood. I really like it!\""
1004315-26 = "Heehee, that's a relief."
1004315-27 = "I also cleared out any rude, intrusive people while I was at it."
1004315-28 = "[s] \"So, I didn't misunderstand...\""
1004315-29 = "Don't you worry."
1004315-30 = "I was good—for you, Sensei. There was no fighting...only persuasive words."
1004315-31 = "They received my message and left quickly."
1004315-32 = "[s] \"Wh-What a relief.\""
1004315-33 = "Now then, let's enjoy the beach all to ourselves."
1004315-34 = "[s] \"What do you want to do, Wakamo?\""
1004315-35 = "I, Wakamo...want to stroll on the sand with you."
1004315-36 = "Merely listening to the crashing waves while sharing small conversations, would be..."
1004315-37 = "[s] \"Enough?\""
1004315-38 = "Yes. More than enough."
1004315-39 = "I'm sure you also need a break from all your work."
1004315-40 = "Walking down the beach would be a good change of pace, wouldn't it?"
1004315-41 = "If we could share such a moment... I, Wakamo, would be without want."
1004315-42 = "[s] \"Sure. In that case...\""
1004315-44 = "I walked down the beach with Wakamo."
1004315-50 = "Ah, I wish this moment could last forever."
1004315-51 = "[s5] \"Wakamo, you could choose peace...\"\n[s6] \"Then, we could spend more time together. Like today.\""
1004315-57 = "...That won't do. I cannot change who I am."
1004315-58 = "My life will never be peaceful. It never has been."
1004315-59 = "And... I cannot trust anyone..."
1004315-60 = "...except you, Sensei."
1004315-61 = "[s] \"Why do you trust me, Wakamo?\""
1004315-62 = "...From the moment I saw you, my heart was taken."
1004315-63 = "I became a stranger to myself."
1004315-64 = "How could I fall for you so quickly, when I'd always told myself that I'm better off alone?"
1004315-65 = "So I kept watching you from afar, wondering, evaluating..."
1004315-66 = "...if I could truly trust you."
1004315-67 = "I wanted to learn everything about you. I still have a way to go."
1004315-68 = "But I do know one thing..."
1004315-69 = "...You are a truly good person."
1004315-70 = "No matter the time or place, you treat others with sincerity."
1004315-71 = "So I decided to believe...to take the risk..."
1004315-72 = "...to trust that you would be able to understand me."
1004315-73 = "...Does that answer your question?"
1004315-74 = "One day, I'll tell you all my stories, so you can truly know me."
1004315-75 = "[s] \"I'll be waiting.\""
1004315-76 = "Heehee, thank you. I'm fortunate to have such a...teacher."
1004315-77 = "[s] \"I'm fortunate to have such a...student.\""
1004315-78 = "Aah... Such sincere, sweet words...!"
1004315-79 = "And, on that note..."
1004315-80 = "W-Would you like to...move...under my parasol...?"
1004315-81 = "It's not like I have other motives..."
1004315-82 = "It's merely because it's so sunny, and your skin..."
1004315-86 = "[ns] \"...You want me closer, right?\""
1004315-87 = "Ugh, so you already know!"
1004315-88 = "You saw through my clumsy attempt. I, Wakamo, would hide in a burrow if I could!"
1004315-89 = "Ah, I can't take it! This is too much!"
1004315-93 = "[ns7] \"Huh, Wakamo?!\"\n[ns8] \"It's okay! I'm glad you're being honest!\""
1004315-96 = "...!"
1004315-97 = "Y-You're right. I should be more honest with myself..."
1004315-98 = "Being embarrassed and running away won't do..."
1004315-99 = "Understood. I, Wakamo, will not flee!"
1004315-103 = "Yah...!"
1004315-107 = "Ah, we're so close that I can feel your warmth. It's like a dream."
1004315-108 = "...I'm glad I found the courage."
1004315-113 = "I, Wakamo, will treasure this parasol to commemorate today..."
1004315-114 = "...the day we confirmed our feelings. It shall be a token of our love."
1004315-115 = "That's right. We'll engrave each other's names into the bamboo."
1004315-116 = "With this, our love shall be emblazoned in the eternal halls..."
1004315-121 = "Ah, ay! Is that who I think it is?"
1004315-122 = "...What a mar on such a beautiful moment."
1004315-123 = "Heehee, I can't cause a commotion in front of you, so I suppose that's it."
1004315-124 = "I'll be taking my leave, if you'd excuse me."
1004315-128 = "[ns9] \"Let's go together!\"\n[ns10] \"Not without me!\""
1004315-131 = "Sensei, with me...?"
1004315-132 = "...Aah!"
1004315-133 = "Shall we play a round of \"Catch Me if You Can\"?"
1004315-134 = "[s] \"I-I think the stakes are a little higher now.\""
1004315-135 = "Hold it! Freeze!"
1004315-142 = "Heehee. It appears that the game has already begun. Let us run together..."
1004315-143 = "...until we reach the end. Of. Kivotos."
1004315-145 = "...And so, Wakamo and I began our grand chase."

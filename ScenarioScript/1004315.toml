[translation]
1004315-1 = "刻下的，是純愛"
1004315-4 = "（準時來到了與若藻約好的海灘）"
1004315-8 = "啊啊，您到了呢。"
1004315-9 = "期待已久的兩人專屬海灘。#n這一刻我不知盼望了多久呢。"
1004315-10 = "[s1]「是個乾淨又漂亮的海灘呢。」\n[s2]「而且周圍一個人都沒有。」"
1004315-13 = "呵呵呵，因為我無法容忍與閣下的相會受到任何打擾……"
1004315-14 = "若藻我提前抵達並整理了周圍的環境。"
1004315-15 = "如今就連一隻小蟲都不會出現。"
1004315-16 = "[s3]「那個……你說的整理……」\n[s4]「應該是字面上的整理對吧？」"
1004315-19 = "整理還能有別的意思嗎？"
1004315-20 = "除了蟲子之外，我還努力清理了沙灘上尖銳的貝殼，以及被海浪沖上來的垃圾。"
1004315-24 = "難道……您認為狀態還不夠理想嗎？"
1004315-25 = "[s]「不不不！抱歉是我誤會了！我非常滿意！」"
1004315-26 = "呵呵呵，那就好。"
1004315-27 = "順手將一些行為不良的人一起整理乾淨，果然是值得的。"
1004315-28 = "[s]「我果然沒誤會吧！？」"
1004315-29 = "請您放心。"
1004315-30 = "我明白要是這裡發生爭鬥，將會造成閣下的困擾，因此只是靜靜用言語說服他們。"
1004315-31 = "所幸大家似乎理解我的意思，很快就離開了。"
1004315-32 = "[s]「那，那就好……」"
1004315-33 = "那麼，讓我們盡情享受兩人的海灘吧。"
1004315-34 = "[s]「若藻想在海邊做什麼？」"
1004315-35 = "若藻我……想與您一起散步。"
1004315-36 = "一邊聽著海浪聲，一邊聊些瑣碎的話題，這樣就足夠了……"
1004315-37 = "[s]「這樣就滿足了嗎？」"
1004315-38 = "是的，這樣就足夠了。"
1004315-39 = "平時總被繁重的工作壓得喘不過氣的閣下，想必也需要一些悠閒的時光吧。"
1004315-40 = "我想在海邊散步，應該能成為不錯的休憩。"
1004315-41 = "如果能一起享受這樣的時光……若藻我便再無奢求了。"
1004315-42 = "[s]「嗯。如果是這樣的話……」"
1004315-44 = "（和若藻開始在海灘上散步）"
1004315-50 = "呵呵呵，真希望這樣的平靜能永遠持續下去。"
1004315-51 = "[s5]「如果若藻的日常能變得和平一點──」\n[s6]「這樣的機會應該也會變得更多吧。」"
1004315-57 = "……那是不可能的。"
1004315-58 = "對我而言，日常與平穩相去甚遠。"
1004315-59 = "而且……我並不信賴任何人。"
1004315-60 = "我唯一信任的……就只有閣下您而已。"
1004315-61 = "[s]「若藻為什麼會相信我？」"
1004315-62 = "……因為在見到閣下的那一刻，我的心就被奪走了。"
1004315-63 = "我也無法理解這樣的自己。"
1004315-64 = "明明決定不再相信任何人，卻偏偏陷入了對閣下的情感之中。"
1004315-65 = "所以我一直在遠處注視著閣下。"
1004315-66 = "希望能夠明白……您是否真的是值得信賴的人……"
1004315-67 = "希望能更了解閣下。"
1004315-68 = "最終我得出了一個結論。"
1004315-69 = "閣下真的是個好人。"
1004315-70 = "無論何時，您總是會認真地對待他人。"
1004315-71 = "正因如此，我決定試著相信您。"
1004315-72 = "因為我相信，這個人一定能夠理解我。"
1004315-73 = "……不知道這樣的回答，您是否滿意呢？"
1004315-74 = "總有一天，我一定會把未能說出口的一切都告訴您的。"
1004315-75 = "[s]「嗯。我等你。」"
1004315-76 = "唔呵呵，謝謝閣下。#n能夠成為您的學生，我真的很幸福。"
1004315-77 = "[s]「我也很慶幸若藻是我的學生哦。」"
1004315-78 = "啊啊……如此真誠甜美的話語……！"
1004315-79 = "既然如此……"
1004315-80 = "閣，閣下要不要……到這把陽傘下來呢……？"
1004315-81 = "我並沒有什麼別的意思……"
1004315-82 = "只是擔心陽光會傷害閣下的肌膚……"
1004315-86 = "[ns]「……若藻是想和我一起撐傘吧？」"
1004315-87 = "果，果然被您看穿了嗎。"
1004315-88 = "心思居然完全被閣下給掌握……真想挖個洞鑽進去。"
1004315-89 = "啊啊，不行。我已經沒有臉再看著閣下了……！"
1004315-93 = "[ns7]「咦，若藻！？」\n[ns8]「沒關係！坦率一點就行了！」"
1004315-96 = "……！！"
1004315-97 = "沒，沒錯。要對自己坦率……"
1004315-98 = "不能因為害羞就逃避……"
1004315-99 = "若藻我，不會再逃避了！"
1004315-103 = "嘿……！"
1004315-107 = "啊啊，居然能近距離感受閣下的體溫，簡直像在做夢一樣。"
1004315-108 = "……鼓起勇氣真是太好了。"
1004315-113 = "若藻我，決定將這把陽傘當成我的寶物。"
1004315-114 = "這是我們確認彼此心意的重要日子所用的陽傘。#n作為愛的象徵，沒有比這更合適的東西了。"
1004315-115 = "對了，將我們的名字刻在這根竹骨上吧。"
1004315-116 = "這樣一來，我們的愛就能永遠銘刻……"
1004315-121 = "啊，那邊那傢伙該不會是……！"
1004315-122 = "……偏偏在這麼好的時候。"
1004315-123 = "唔呵呵，為了避免在閣下面前鬧出騷動，今天的餘興只能到此為止了。"
1004315-124 = "還請容我先行告辭。"
1004315-128 = "[ns9]「不。如果要逃就一起逃吧。」\n[ns10]「因為若藻是我的學生。」"
1004315-131 = "和老師一起……？"
1004315-132 = "……啊啊！"
1004315-133 = "這就是之前沒能完成的「啊哈哈，來抓我呀～」對吧！？"
1004315-134 = "[s]「有，有點不太一樣啦。」"
1004315-135 = "站，站住啊啊啊……！！"
1004315-142 = "唔呵呵，既然捉迷藏已經開始，就如閣下所願──"
1004315-143 = "──逃至奇普托斯的盡頭吧。"
1004315-145 = "（……於是便和若藻享受了長時間的兩人逃亡）"

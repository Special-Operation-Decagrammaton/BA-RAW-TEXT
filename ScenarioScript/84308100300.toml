[translation]
84308100300-12 = "那個……"
84308100300-13 = "能告訴我現在是什麼情況嗎，各位？"
84308100300-19 = "為了以防萬一，我想確認一下……"
84308100300-20 = "一直待在這裡的人……就是你們嗎？"
84308100300-26 = "那，那個……！！"
84308100300-30 = "……咦？"
84308100300-31 = "奇，奇怪？怎麼……不是寧瑠前輩？"
84308100300-35 = "你，你怎麼會在這裡！？#n不對，應該說是怎麼進來這裡的！？"
84308100300-36 = "這應該是我要問各位的問題才對……"
84308100300-37 = "不過我大致明白情況了。#n我們發現的「可疑入侵者」，原來就是各位啊。"
84308100300-38 = "可疑入侵者……！？是說我們嗎！？"
84308100300-39 = "怎麼這樣！！我們明明只是待在自己的攤位而已！！"
84308100300-41 = "姐姐，你也知道清場之後是不能進來的吧。#n就算只是待在我們自己的攤位，現在也會顯得很可疑。"
84308100300-42 = "太厲害了。居然能突破那個困難的地城抵達這裡！#n聖亞同學果然是盜賊王！"
84308100300-44 = "（盜賊王……）"
84308100300-45 = "但是不用擔心！#n因為愛麗絲和夥伴們之所以來到這裡，單純只是為了讓遊戲變得更出色！"
84308100300-46 = "變得更出色……？"
84308100300-48 = "其，其實也沒什麼……我們只是想更新覺得可惜的部分而已。#n因為作品已經展示出去，所以很難找到時機。"
84308100300-49 = "……啊哈。"
84308100300-50 = "原來如此，我明白了。#n你們並不是在清場之後潛入，而是一直沒有離開這裡啊。"
84308100300-51 = "我們沒有偷偷躲起來哦！我們不是壞人！！"
84308100300-52 = "……雖然實際行為就跟潛入沒兩樣。"
84308100300-53 = "總之我明白了。#n如果是這樣的話，似乎也不必對各位採取額外的措施。"
84308100300-54 = "我打算回去說明情況，讓這件事告一段落。#n抱歉嚇到你們了。"
84308100300-56 = "沒關係的！盜賊王的快閃活動，讓愛麗絲覺得非常開心！"
84308100300-57 = "……請等一下。#n您剛才說要「說明情況」……"
84308100300-58 = "仔細想想，聖亞大人既不是千年的學生，也不是博覽會的工作人員對吧？#n您怎麼會知道我們在這裡，並過來調查呢？"
84308100300-59 = "不，或者應該說……您要向誰說明情況呢？"
84308100300-64 = "啊，不好意思。#n這麼說來，我確實沒跟你們說過呢。"
84308100300-65 = "我要說明的對象……"
84308100300-70 = "是美甘寧瑠。"
84308100300-76 = "……咦。"
84308100300-77 = "啊？"
84308100300-78 = "……嗯？"
84308100300-80 = "那我就先告辭了……"
84308100300-84 = "請，請等一下！#n聖亞大人，請您先等等！"
84308100300-85 = "等，等等啊！！"
84308100300-87 = "嗚啊啊啊啊啊──！！"
84308100300-89 = "要GG了──！！！"

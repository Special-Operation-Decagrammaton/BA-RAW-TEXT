84308100300-47 = "#all;hide"
84308100300-48 = "3;미도리;02;벼, 별 건 아니고…… 그저 아쉬웠던 부분의 패치를 진행하고 싶었어요. 하지만 이미 출품한 작품이다 보니, 타이밍을 잡기 어려워서요.\n#3;em;[땀]"
84308100300-49 = "3;세이아;02;……아하."
84308100300-50 = "3;세이아;01;과연, 이해했어요. 폐장 이후에 숨어든 게 아니라, 폐장 이후로도 나가지 않고 여기 숨어 계셨던 거군요."
84308100300-51 = "3;모모이;04;몰래 숨어드는 행동 같은 건 하지 않았다고요! 우리는 나쁘지 않아!! \n#3;hophop"
84308100300-52 = "3;세이아;99;……사실상 잠입이나 다를 것 없는 행동이긴 합니다만."
84308100300-53 = "3;세이아;02;아무튼 알겠습니다. 그런 일이라면 저도 더 이상 여러분에게 따로 조치를 취할 필요는 없어 보이네요.\n#3;em;[반응]"
84308100300-54 = "3;세이아;01;그만 돌아가서, 상황을 잘 설명하는 것 정도로 상황을 종료하려 합니다. 괜히 놀라게 만들어서 미안해요."
84308100300-55 = "#all;hide"
84308100300-56 = "3;아리스N;03;아닙니다! 왕도적의 돌발 출현 이벤트, 아리스는 너무나 즐거웠습니다!\n#3;greeting\n#3;em;[반짝]"
84308100300-57 = "5;미도리;02;……잠시만요. 그런데 그…… 방금 말씀하신 '상황을 잘 설명한다'라는 거 때문인데요.\n#5;em;[반응]\n#5;al\n#3;m1"
84308100300-58 = "5;미도리;00;따지고 보면 세이아 님도 밀레니엄 학생이거나 엑스포의 진행 요원은 아니시잖아요? 어떻게 저희가 여기 있다는 걸 알고 오신 거예요?"

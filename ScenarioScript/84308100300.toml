[translation]
84308100300-12 = "คือ..."
84308100300-13 = "ทุกคนคะ สถานการณ์ตอนนี้เป็นยังไงบ้างเหรอคะ?"
84308100300-19 = "ฉันถามเพราะสงสัยเฉยๆ น่ะค่ะ..."
84308100300-20 = "ที่ผ่านมาคนที่อยู่ตรงนี้กันตลอดมีแค่พวกคุณหรือเปล่าคะ?"
84308100300-26 = "คะ... คือว่า...!!"
84308100300-30 = "หืม...? เอ๋?"
84308100300-31 = "อะ... อะไรกันน่ะ? นั่นรุ่นพี่เนรุ... ไม่ใช่... เหรอ...?"
84308100300-35 = "ทะ... ทำไมถึงมาอยู่ที่นี่ได้ล่ะ!? ไม่สิ เข้ามาที่นี่ตั้งแต่แรกได้ยังไงกัน!?"
84308100300-36 = "ฉันถามคำถามกับพวกคุณก่อนนะคะ..."
84308100300-37 = "แต่ฉันพอเข้าใจสถานการณ์คร่าวๆ แล้วค่ะ 'ผู้บุกรุกที่น่าสงสัย' ที่พวกฉันเจอก็คือพวกคุณสินะคะ"
84308100300-38 = "ผู้บุกรุกที่น่าสงสัย...!? พวกเราน่ะเหรอ!?"
84308100300-39 = "ทำไมล่ะ!! พวกเราแค่อยู่ในบูธของพวกเราเองนะ!!"
84308100300-41 = "พี่โมโมอิ พี่ก็รู้นี่นาว่าไม่ควรเข้ามาหลังจากปิดการสาธิตแล้วน่ะ ต่อให้เป็นพวกเรา แต่ถ้าเข้ามาตอนนี้#nยังไงก็น่าสงสัยอยู่ดีค่ะ"
84308100300-42 = "สุดยอดไปเลยค่ะ ฝ่าดันเจี้ยนยากๆ แล้วบุกเข้ามาถึงที่นี่ได้ด้วย! สมกับที่เป็นราชาจอมโจรจริงๆ เลยค่ะ คุณเซอา!"
84308100300-44 = "(ราชาจอมโจร...)"
84308100300-45 = "แต่ก็ไม่ต้องกังวลนะคะ! ที่พวกเราเข้ามาที่นี่ก็เพื่อจะทำให้เกมของพวกเราดีขึ้นค่ะ!"
84308100300-46 = "ทำให้เกมดีขึ้น...?"
84308100300-48 = "มะ... ไม่ใช่อะไรมากหรอก... ก็แค่อยากแพทช์เพื่อแก้ไขส่วนที่ควรปรับปรุง แต่พอเป็นผลงานที่ถูก#nจัดแสดงไปแล้ว เราก็เลยหาเวลามาปรับปรุงได้ยากน่ะ"
84308100300-49 = "อ๋อ..."
84308100300-50 = "เป็นอย่างนี้นี่เองสินะคะ เข้าใจแล้วค่ะ พวกคุณไม่ได้แอบเข้ามาซ่อนตัวหลังจากปิดการสาธิต แต่ไม่ได้ออกไปไหนตั้งแต่แรกหลังจากปิดการสาธิตสินะคะ"
84308100300-51 = "พวกเราไม่ได้แอบเข้ามาหรอกนะ! เราไม่ใช่คนไม่ดีหรอก!! "
84308100300-52 = "ที่จริงมันก็ไม่ต่างกันมากหรอกค่ะ..."
84308100300-53 = "เอาเป็นว่าฉันเข้าใจแล้วค่ะ ถ้าเป็นอย่างนั้น ฉันก็ไม่จำเป็นต้องใช้มาตรการอะไรกับพวกคุณค่ะ"
84308100300-54 = "ฉันจะกลับไปอธิบายสถานการณ์นี้ แล้วมันก็น่าจะจบเพียงเท่านี้ค่ะ ขอโทษที่ทำให้ตกใจนะคะ"
84308100300-56 = "ไม่เป็นไรค่ะ! อาริสึชอบอีเวนต์จ๊ะเอ๋จากราชาจอมโจรค่ะ สนุกมากๆ เลยค่ะ!"
84308100300-57 = "เดี๋ยวนะคะ... เมื่อกี้ที่บอกว่า... จะกลับไป 'อธิบายสถานการณ์' น่ะค่ะ"
84308100300-58 = "ที่จริงคุณเซอาก็ไม่ใช่นักเรียนของมิลเลเนียม และไม่ใช่ทีมงานของงานเอ็กซ์โปด้วยนี่คะ? แล้วทำไมถึงรู้ได้ล่ะคะว่าพวกฉันอยู่ที่นี่?"
84308100300-59 = "แล้วก็... จะไปอธิบายสถานการณ์นี้ให้ใครฟังคะ?"
84308100300-64 = "อ๊ะ ขอโทษด้วยค่ะ จะว่าไป ฉันก็ยังไม่ได้บอกพวกคุณเลยนะคะ"
84308100300-65 = "เรื่องนั้นก็..."
84308100300-70 = "มิคาโมะ เนรุน่ะค่ะ"
84308100300-76 = "หา...?"
84308100300-77 = "ว่าไงนะ?"
84308100300-78 = "คะ...?"
84308100300-80 = "ถ้างั้นฉันขอตัวก่อน..."
84308100300-84 = "ดะ... เดี๋ยวสิคะ คุณเซอา เดี๋ยวก่อนค่ะ!"
84308100300-85 = "ดะ... เดี๋ยวสิ! รอก่อน!"
84308100300-87 = "แงงงงงงงงงงง!!"
84308100300-89 = "เกมโอเวอร์แล้วค่ะ!!!!"

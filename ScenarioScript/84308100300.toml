[translation]
84308100300-12 = "...Um."
84308100300-13 = "Can I ask what's going on here?"
84308100300-19 = "I just wanted to ask..."
84308100300-20 = "...Are you the people who've been here the whole time?"
84308100300-26 = "W-Well...!"
84308100300-30 = "...Hm? Huh?"
84308100300-31 = "Wh-What's going on? Wait, Neru...?"
84308100300-35 = "Wh-Why are you here?! Wait, how did you get here in the first place?"
84308100300-36 = "I feel like I asked that question first."
84308100300-37 = "But I get the gist of what's going on here. So you were the \"suspicious intruders\" we've detected."
84308100300-38 = "\"Suspicious intruders\"...?! Us?!"
84308100300-39 = "How?! We were just here in our own booth!!"
84308100300-41 = "We knew it'd look bad if we got spotted after hours."
84308100300-42 = "Incredible. To make it past that difficult dungeon, all the way! Seia, you really are a Thief King!"
84308100300-44 = "(Thief King...)"
84308100300-45 = "But there is no need to worry! The reason we came here was to make our game even better!"
84308100300-46 = "Even better...?"
84308100300-48 = "I-It's nothing big...just a couple of little tweaks. But since we already submitted the game, we couldn't make that change remotely, or in front of everybody, so..."
84308100300-49 = "...Aha."
84308100300-50 = "I see, I understand. So you didn't sneak in after hours, you HID here after hours."
84308100300-51 = "It's not like we broke in! We're not the bad guys! "
84308100300-52 = "...It's still sneaky."
84308100300-53 = "Anyway, I understand. And given the cause, I don't see a reason to report or detain you."
84308100300-54 = "I'll go back and explain what happened. Pardon me if I scared you."
84308100300-56 = "Do not worry about it! We got to experience the Thief King's secret event!"
84308100300-57 = "...Hold on. When you say you'll \"go back and explain\"..."
84308100300-58 = "Technically speaking, Seia, you're not a Millennium student or Expo staff, right? How did you know we were here in the first place?"
84308100300-59 = "And who are you going to explain it to?"
84308100300-64 = "Ah, my apologies. I didn't tell you."
84308100300-65 = "Well..."
84308100300-70 = "I'll be talking to Mikamo Neru."
84308100300-76 = "...Eh."
84308100300-77 = "What?"
84308100300-78 = "...Wait, what?"
84308100300-80 = "Now then, if you'll excuse me..."
84308100300-84 = "H-Hold on. ...Seia, hold on!"
84308100300-85 = "W-Wait! Wait!!"
84308100300-87 = "Aaahhh!!"
84308100300-89 = "Game overrr!!"

84308100300-41 = "3;미도리;99;언니, 폐장 이후에는 들어오면 안 되는 거 알고 있었잖아. 아무리 우리라도 지금은 수상할 수밖에 없어.\n#3;em;[속상함]\n#3;a"
84308100300-42 = "3;미도리;99\n4;아리스N;05;굉장합니다. 그 어려운 던전을 뚫고 여기까지 당도하다니! 역시 세이아 씨는 왕도적입니다!\n#4;em;[반짝]\n#4;greeting\n#4;a\n#3;m2"
84308100300-43 = "#all;hide"
84308100300-44 = "3;세이아;04;(왕도적……)\n#3;stiff"
84308100300-45 = "1;아리스N;05;하지만 걱정하실 필요는 없습니다! 우리들이 여기 온 이유는, 우리의 게임을 보다 더 훌륭하게 만들기 위함이었으니까요!\n#1;ar\n#3;m5"

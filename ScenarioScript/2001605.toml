[translation]
2001605-1 = "狡猾的少女"
2001605-2 = "（我和平常一樣，在夏萊做著永無止境的工作。就在這時候……）"
2001605-8 = "你好，還活著嗎？"
2001605-9 = "[s]「伊呂波，歡迎啊……勉強活著……」"
2001605-10 = "這樣啊，看來狀況很險峻呢。"
2001605-11 = "黑眼圈都不知道幾層了，感覺不用化妝就能直接去演恐怖片呢。"
2001605-12 = "[s]「你這應該……不算稱讚吧……？」"
2001605-13 = "（……反應比平常還小）"
2001605-14 = "算了，反正我也不反對「吃得苦中苦」的心態，這部分就不干涉老師了。"
2001605-15 = "我就在旁邊乖乖工作……正確來說是全力偷懶囉。"
2001605-16 = "……"
2001605-17 = "[s]「嗯好喔……抱歉沒時間理你……」"
2001605-26 = "老師，你沒事吧？"
2001605-27 = "[s1]「沒事，只是有點頭暈……」\n[s2]「啊，要喝咖啡的話水壺裡有。」"
2001605-28 = "呼……"
2001605-29 = "呼……"
2001605-33 = "……"
2001605-34 = "那張桌子借我一下。"
2001605-40 = "唔，這些……"
2001605-44 = "嗯～不太好啊……"
2001605-48 = "真傷腦筋耶～……"
2001605-49 = "[s]「……伊呂波，你怎麼了？」"
2001605-50 = "嗯？"
2001605-51 = "沒事，老師不用在意。我只是在確認上次的車檢評價。"
2001605-52 = "畢竟我好歹也是戰車長，同時也會負責保養整頓裝備。"
2001605-53 = "這次的綜合評價，差不多在A吧……"
2001605-54 = "[s]「果然有一套，感覺結果不錯嘛。」"
2001605-55 = "不，最高評價是S。也就是說A……"
2001605-56 = "對於身為萬魔殿頂尖優等生，最強戰車長，在「令人憧憬的格黑娜學生排名2年級組」隨時堅守在300名上下的我來說──"
2001605-57 = "[s]「這排名的數字好微妙。」"
2001605-58 = "……老師？"
2001605-59 = "[s]「伊呂波前輩好棒唷！」"
2001605-60 = "你的口氣也未免太勉強了。"
2001605-61 = "總之A這個分數，對我來說是奇恥大辱。"
2001605-62 = "代表我還有很多不成熟的地方。"
2001605-63 = "嗯……就內容看來，是在裝備老化方面有疏忽，還有……"
2001605-64 = "了解了解……雖然麻煩，但既然這樣就沒辦法了。"
2001605-65 = "老師，能請你為傷腦筋的學生抽出一點時間嗎？"
2001605-66 = "[s]「欸……現在馬上會比較好嗎……？」"
2001605-67 = "對，現在。這個問題你可以當成是萬魔殿對夏萊的正式委託。"
2001605-68 = "也是讓格黑娜優等生，以及格黑娜學生會欠你人情的好機會喔。"
2001605-69 = "還是說這樣也不行嗎？"
2001605-70 = "[s]「人情什麼的我是不在乎啦……總之可以呀。」"
2001605-71 = "是嗎？那我們馬上……"
2001605-72 = "去逛個街吧。"
2001605-74 = "格黑娜自治區．東區商店街"
2001605-78 = "好了，首先是……"
2001605-79 = "這家店。"
2001605-80 = "[s]「……玩偶店？」"
2001605-81 = "歡迎光臨！請問要找什麼東西呢？"
2001605-82 = "啊，請稍等一下，我有寫購物清單。我看看……"
2001605-84 = "請給我「綁著蝴蝶結的小熊玩偶 ver.格黑娜」。"
2001605-85 = "[s]「……嗯？」"
2001605-86 = "啊，客人您真幸運！這項限定商品剛好昨天只進了一個呢！"
2001605-87 = "請給我那個。啊，不用包裝沒關係，沒有要送人。"
2001605-88 = "[s]「呃，伊呂波……？」"
2001605-89 = "謝謝您的惠顧！"
2001605-90 = "好，第一個目標達成了。去下一個吧。"
2001605-91 = "[s]「……？」"
2001605-93 = "歡迎光臨──"
2001605-94 = "請問「波浪貓枕頭」有貨嗎？"
2001605-95 = "有的，就在這裡……！"
2001605-96 = "請給我一個。"
2001605-101 = "[ns]「？？？」"
2001605-103 = "（之後，伊呂波繼續前往各個店家，買了各種東西）"
2001605-104 = "我要這個相框。"
2001605-106 = "給我一包「芥末口味洋芋片」。"
2001605-108 = "「戀愛鯉魚」老師的作品放在……？"
2001605-110 = "請問「鬆軟坐墊」還有貨嗎？"
2001605-111 = "[ns]「……？」"
2001605-113 = "（跟著她持續買了大概1小時的東西，腦中問號越來越多……）"
2001605-115 = "嗯，大概就這些吧。"
2001605-116 = "老師，謝謝你今天特地陪我買東西。"
2001605-117 = "多虧老師，清單上的東西幾乎都買到了。"
2001605-118 = "[s]「那個，我們不是要來選購戰車裝備嗎……？」"
2001605-119 = "我從來沒說過那種話啊？"
2001605-120 = "更何況普通零件就算了，萬魔殿主力戰車的零件怎麼可能在這附近就能輕易買到。"
2001605-121 = "如果要買那些東西，根本不會特地跑來商店街。"
2001605-122 = "[s]「那你今天來買東西是為了什麼……？」"
2001605-123 = "單純是買我個人的東西。要用在萬魔殿的休息空間。"
2001605-124 = "我有弄一個專屬的休息空間，但也代表說其他人不會幫忙補充物資，所以會需要自己出來採買。"
2001605-125 = "也順便補充伊吹來玩的時候，要一起吃的零嘴和玩具。"
2001605-126 = "[s]「是，是喔……」"
2001605-127 = "幹嘛那副表情？"
2001605-128 = "我也沒辦法呀。誰叫我今天一抵達夏萊，老師就一整個沒霸氣，吐槽力道也軟趴趴的……"
2001605-129 = "一點也不好玩，而且我的自尊也不允許……"
2001605-130 = "在那種情況下就我一個人偷懶，我也會良心不安，於是就把老師騙出來了。"
2001605-131 = "結果計謀大成功，哼哼。"
2001605-132 = "怎麼樣呀？明明很忙……不對，就是因為很忙才刻意偷懶的感覺如何呀？"
2001605-133 = "[s]「伊呂波……」"
2001605-134 = "好啦，差不多該回去了。"
2001605-135 = "回夏萊之後先跟我講一下要怎麼幫你吧。同為中階管理者，遇到困難就是要互相幫助。"
2001605-136 = "[s3]「伊呂波……」\n[s4]「謝謝。」"
2001605-137 = "……聽不懂你在謝什麼。"
2001605-138 = "……聽不懂你在謝什麼。"
2001605-139 = "呵呵，那我們回去吧。"
2001605-141 = "（回到夏萊後，在伊呂波的幫助下順利完成工作了）"

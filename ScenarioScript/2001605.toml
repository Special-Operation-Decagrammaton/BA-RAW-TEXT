2001605-8 = "3;이로하;03;안녕하세요. 선생님. 살아는 계신가요?\n#3;greeting\n#3;em;[반짝]"
2001605-9 = "[s] \"아, 으응…… 이로하, 어서 와…….\""
2001605-10 = "3;이로하;02;어라, 오늘 일이 바쁘긴 바쁘신가 보네요?\n#3;em;[반응]"
2001605-11 = "3;이로하;03;다크서클이 뺨까지 내려와 있는 게, 꼭 어제 본 공포 영화에 나오는 귀신 같은 몰골이라 제법 신선한걸요."
2001605-12 = "[s] \"그거 설마 칭찬…… 아니, 아무래도 좋지만.\""
2001605-13 = "3;이로하;02;(흐음, 평소보다 약한 반응…….)\n#3;em;…"
2001605-14 = "3;이로하;99;뭐, 사서 고생하겠다는 사람을 말릴 수도 없는 노릇이니, 저는 얌전히 옆에서 제 일을 할 뿐이지요."
2001605-15 = "3;이로하;07;물론 땡땡이를 치는데도 전력을 다할 거니까. 그리 호락호락하게 일을 하진 않겠지만요.\n#3;em;[반짝]"
2001605-16 = "3;이로하;02;……(힐끔)"
2001605-17 = "[s] \"저기, 미안하지만 이로하. 오늘은 바빠서 상대해줄 시간이……. 아….\""

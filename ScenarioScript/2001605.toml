2001605-78 = "3;이로하;03;자, 그럼 현장에 도착했으니 망설이지 말고 바로 가도록 하죠.\n#3;em;[반응]"
2001605-79 = "3;이로하;03;첫 번째로 들를 가게는 이곳이에요."
2001605-80 = "[s] \"……이곳은 인형 가게?\""
2001605-81 = "3;이로하;01\n1;가게 주인;00;어서 옵쇼! 무얼 찾으십니까. 손님!\n#3;m5\n#1;em;[반응]\n#1;ar"
2001605-82 = "3;이로하;01;으음, 잠시만요, 여기 체크리스트를 가져왔으니까. 이걸 보면…….\n#3;em;…"
2001605-83 = "#wait;1000"
2001605-84 = "3;이로하;02;<리본이 달린 곰돌이 인형 ver. 게헨나>가 있다면 그걸로 하고 싶은데요."
2001605-85 = "[s] \"……응?\""
2001605-86 = "1;가게 주인;00;이야~! 손님! 보는 눈이 있으시군요! 마침 한정판 제품으로 딱 어제 1개가 입고되었답니다!\n#1;em;[재잘]\n#1;hophop"
2001605-87 = "3;이로하;03;좋아요. 그걸로 주시겠어요? 아, 포장은 필요 없어요. 선물용은 아니거든요.\n#3;em;[반응]"

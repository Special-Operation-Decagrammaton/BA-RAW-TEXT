[translation]
2001605-1 = "เด็กสาวที่ฉลาดเป็นกรด"
2001605-2 = "(วันนี้คุณครูก็นั่งสะสางงานที่ไม่จบไม่สิ้นอยู่ที่ชาเล่ต์เช่นเดียวกับทุกๆ วัน...)"
2001605-8 = "สวัสดีค่ะ คุณครู ยังมีชีวิตอยู่ใช่มั้ยคะ?"
2001605-9 = "[s] \"อือ... ยังไม่ขิต เข้ามาสิ อิโรฮะ...\""
2001605-10 = "เอ๋... วันนี้ดูเหมือนจะงานยุ่งมากเลยนะคะ?"
2001605-11 = "รอยคล้ำใต้ตายาวลงมาจนเกือบถึงแก้มแบบนี้ เหมือนผีที่โผล่มาในหนังสยองขวัญที่ฉันดูเมื่อวาน#nเลยนะคะ"
2001605-12 = "[s] \"ชมใช่มั้ยนะ... เอาเป็นว่าชมแล้วกัน\""
2001605-13 = "(อืม... ปฏิกิริยาตอบโต้อ่อนกว่าทุกๆ วัน...)"
2001605-14 = "แต่ก็นะ ฉันก็คงจะห้ามคนที่อยากทำงานหามรุ่งหามค่ำไม่ได้หรอก เอาเป็นว่าฉันจะนั่งทำงานของฉัน#nไปเงียบๆ ก็แล้วกันนะคะ"
2001605-15 = "แน่นอนว่าถึงจะอู้อยู่ก็ตาม แต่ก็จะทำตามแผนการให้ดีที่สุดค่ะ รับรองว่าไม่ทำงานแบบลวกๆ หรอกค่ะ"
2001605-16 = "... (เหลือบมอง)"
2001605-17 = "[s] \"ขอโทษนะ อิโรฮะ วันนี้ครูยุ่งมากไม่มีเวลาคุยด้วยเลย...\""
2001605-26 = "คุณครู...? เป็นอะไรรึเปล่าคะ?"
2001605-27 = "[s1] \"ไม่เป็นไร แค่เวียนหัวเพราะเหนื่อยๆ น่ะ\"\n[s2] \"ถ้าจะกินกาแฟก็ชงเองได้เลยนะ...\""
2001605-28 = "อืม... ค่ะ"
2001605-29 = "อืม... ก็ได้ค่ะ"
2001605-33 = "แบบนั้นก็ได้"
2001605-34 = "งั้นขอยืมโต๊ะตรงนั้นสักครู่นะคะ"
2001605-40 = "อืม... แบบนี้ท่าไม่ดีแล้ว (เหลือบมอง)"
2001605-44 = "คงปล่อยไว้แบบนี้ไม่ได้แล้วค่ะ (เหลือบมอง)"
2001605-48 = "อา~ ช่วยไม่ได้นะ~ (เหลือบมอง)"
2001605-49 = "[s] \"อิโรฮะ...? เป็นอะไรรึเปล่า?\""
2001605-50 = "อ๋อ หมายถึงนี่เหรอคะ? "
2001605-51 = "เปล่าค่ะ ไม่ต้องใส่ใจหรอกค่ะ ก็แค่ตารางตรวจสอบการซ่อมบำรุงรักษาครั้งก่อนค่ะ"
2001605-52 = "เห็นแบบนี้ฉันก็ได้รับมอบหมายตำแหน่งผู้บัญชาการพลรถถังของแพนเดโมเนียม โซไซตี้นะคะ เพราะงั้นเลยต้องหมั่นตรวจสอบการซ่อมบำรุงอุปกรณ์อยู่อย่างสม่ำเสมอค่ะ"
2001605-53 = "อืม คะแนนประเมินการบำรุงรักษาครั้งนี้... ก็คงประมาณระดับ A ค่ะ"
2001605-54 = "[s] \"หืม? ระดับนั้นก็ดีแล้วไม่ใช่เหรอ?\""
2001605-55 = "ไม่ค่ะ เกณฑ์ระดับสูงสุดของคะแนนทั้งหมดคือระดับ S ค่ะ แต่ว่าคราวนี้เรากลับได้แค่ระดับ A เท่านั้น..."
2001605-56 = "ในฐานะนักเรียนดีเด่นของแพนเดโมเนียม โซไซตี้ พลรถถังดีเด่น นักเรียนดีเด่นของระดับชั้นปีที่ 2 ที่ติดอันดับท็อป 300 ของโรงเรียน และเป็นคนที่พวกรุ่นน้องในเกเฮนน่านับถือเป็นแบบอย่าง..."
2001605-57 = "[s] \"แบบนั้นเรียกท็อปเหรอ?\""
2001605-58 = "คุณครูคะ..."
2001605-59 = "[s] \"เปล่าๆ ว่าแล้วเชียวสมกับเป็นรุ่นพี่อิโรฮะจริงๆ!\""
2001605-60 = "ค่ะ... ถึงฉันจะรู้สึกว่าคุณครูจำใจพูดมาก็เถอะ"
2001605-61 = "เอาเป็นว่าการที่เราไม่ได้ระดับ S ถือเป็นเรื่องที่น่าละอายสำหรับฉันค่ะ"
2001605-62 = "ฉันอาจจะยังอ่อนประสบการณ์ในหลายๆ เรื่องสินะคะ"
2001605-63 = "อืม... เหตุผลที่ไม่ได้ระดับ S เพราะมีอุปกรณ์หลายอย่างเก่า และมีวัสดุอื่นๆ ไม่เพียงพอ..."
2001605-64 = "เฮ้อ เป็นแบบนี้ก็ช่วยไม่ได้นะคะ"
2001605-65 = "คุณครู ช่วยแบ่งเวลาให้กับนักเรียนที่ตกอยู่ในสถานการณ์ลำบากคนนี้หน่อยได้มั้ยคะ?"
2001605-66 = "[s] \"อืม ตอนนี้เลยเหรอ...?\""
2001605-67 = "ค่ะ ตอนนี้เลยค่ะ คุณครูจะคิดว่าเป็นคำขอร้องจากนักเรียนสังกัดแพนเดโมเนียม โซไซตี้#nถึงชาเล่ต์ก็ได้นะคะ..."
2001605-68 = "โอกาสที่จะทำให้เด็กนักเรียนดีเด่นของเกเฮนน่าติดหนี้บุญคุณแบบนี้มีไม่บ่อยหรอกนะคะ?"
2001605-69 = "ไม่ได้... งั้นเหรอคะ?"
2001605-70 = "[s] \"ถ้าพูดถึงขนาดนั้นก็ช่วยไม่ได้... ว่าแต่จะให้ครูทำอะไรเหรอ?\""
2001605-71 = "ฮุฮุ ฉันต้องพยายามอย่างหนักเพื่อหางบมาเติมสิ่งของส่วนที่ขาดไป..."
2001605-72 = "เพราะงั้นตอนนี้เราจะไปช้อปปิ้งกันก่อนค่ะ"
2001605-74 = "ย่านการค้าตะวันออก เกเฮนน่า"
2001605-78 = "เราก็มาถึงที่ห้างแล้ว อย่ามัวแต่ลังเลอยู่ รีบเข้าไปกันเถอะค่ะ"
2001605-79 = "ร้านแรกที่เราจะไปก็คือร้านนี้ค่ะ"
2001605-80 = "[s] \"ที่นี่ร้านตุ๊กตานี่นา?\""
2001605-81 = "เชิญเลยครับ! หาสินค้าชนิดไหนอยู่เหรอครับ คุณลูกค้า!"
2001605-82 = "อืมมม รอสักครู่นะคะ ฉันเอารายการที่จดไว้มาด้วย ไหนดูซิ..."
2001605-84 = "<ตุ๊กตาหมีผูกโบว์ ver.เกเฮนน่า> ตัวนึงค่ะ"
2001605-85 = "[s] \"หืม...?\""
2001605-86 = "ฮ่า~! คุณลูกค้าช่างตาแหลมจริงๆ เลยนะครับ! ตุ๊กตาตัวนั้นเป็นสินค้าลิมิเต็ดและเข้ามาที่ร้านเพียงแค่ตัว#nเดียวด้วยครับ!"
2001605-87 = "งั้นก็รับตัวนั้นเลยค่ะ ไม่ต้องห่อนะคะ ฉันไม่ได้ซื้อเป็นของขวัญค่ะ"
2001605-88 = "[s] \"เดี๋ยวนะ อิโรฮะ...?\""
2001605-89 = "ขอบคุณที่อุดหนุนนะครับ!"
2001605-90 = "ภารกิจแรกสำเร็จแล้วค่ะ รีบไปร้านต่อไปกันเถอะค่ะ คุณครู"
2001605-91 = "[s] \"อะ...อื้อ\""
2001605-93 = "เชิญเลยครับบบบ...! หาสินค้าอะไรอยู่ครับ คุณลูกค้า!"
2001605-94 = "ที่นี่มี <หมอนเวฟแคท> รึเปล่าคะ?"
2001605-95 = "ฮ่า~! คุณลูกค้ารสนิยมดีมากๆ เลยนะครับ!"
2001605-96 = "ค่ะ ถ้างั้นขออันนึงค่ะ..."
2001605-101 = "[ns] \"หะ...หืม...?\""
2001605-103 = "(หลังจากนั้นคุณครูก็ถูกอิโรฮะพาเข้าร้านนี้ออกร้านนั้นอย่างไม่ได้หยุดหย่อน)"
2001605-104 = "ขอโทษนะคะ มีกรอบรูปตกแต่งมั้ยคะ?"
2001605-106 = "มี <มันฝรั่งทอดรสวาซาบิ> ที่ออกใหม่มั้ยคะ?"
2001605-108 = "หนังสือเล่มใหม่ของนักเขียน <ความรักคือปลาคาร์ฟ> ที่ติดอันดับหนังสือขายดีเข้ามารึยังคะ?"
2001605-110 = "อา... ฉันเห็นจากในโฆษณาน่ะค่ะ ไม่ทราบว่า <หมอนอิงนุ่มฟูสุดๆ!> อยู่ตรงไหนเหรอคะ?"
2001605-111 = "[ns] \"หะ...หืม...?\""
2001605-113 = "(ขณะที่การช้อปปิ้งดำเนินต่อไปอย่างดุเดือด คำถามที่สั่งสมอยู่ในใจคุณครูก็เริ่มมากขึ้น... และหลังจากช้อปปิ้งแบบนอนสต็อปมาประมาณหนึ่งชั่วโมงครึ่ง ในที่สุดคุณครูก็ได้พัก)"
2001605-115 = "แค่นี้น่าจะครบแล้วนะคะ"
2001605-116 = "คุณครู วันนี้ขอบคุณที่มาช้อปปิ้งด้วยกันนะคะ "
2001605-117 = "เพราะคุณครูมาด้วยเลยซื้อของที่ขาดอยู่ได้เกือบครบเลยค่ะ"
2001605-118 = "[s] \"เดี๋ยวก่อนสิ ไม่ได้มาซื้ออุปกรณ์รถถังเหรอ?!\""
2001605-119 = "คะ? คุณครูคิดว่าของในรายการนี้เป็นรายการอุปกรณ์ซ่อมบำรุงรถถังเหรอคะ?"
2001605-120 = "ไม่ใช่แบบนั้นหรอกค่ะ เราจะมาเดินช้อปปิ้งซื้ออุปกรณ์หรือชิ้นส่วนของรถถังที่เป็นกองกำลัง#nหลักของแพนเดโมเนียม โซไซตี้ที่ย่านการค้าแบบนี้ได้ยังไงคะ?"
2001605-121 = "ของพวกนั้นเราจะดำเนินการสั่งซื้อตามขั้นตอนของหน่วยซ่อมบำรุงของแพนเดโมเนียม โซไซตี้อยู่แล้วค่ะ"
2001605-122 = "[s] \"ถ้างั้นวันนี้มาช้อปปิ้งทำไมเหรอ...?\""
2001605-123 = "ก็แค่มาช้อปปิ้งเพื่อตกแต่งฐานทัพส่วนตัวของฉันค่ะ"
2001605-124 = "ฉันมักจะตรวจสอบของตกแต่งฐานทัพส่วนตัวเป็นประจำอยู่แล้ว พอวันนี้ตรวจสอบดูก็พบว่าหมอนอิง#nที่ใช้เป็นประจำมันค่อนข้างเก่าแล้ว หมอนข้างที่ใช้กอดตอนนอนกลางวันก็ค่อนข้างแฟ็บแล้วเหมือนกัน"
2001605-125 = "ไหนๆ ก็ออกมาแล้วก็เลยซื้อของเล่นกับขนมเอาไว้กินเวลาที่อิบูกิแวะมาเล่นด้วยเลยน่ะค่ะ"
2001605-126 = "[s] \"เดี๋ยวสิ ถ้างั้นทำไมต้องลากครูมาด้วยล่ะ...?!\""
2001605-127 = "คะ? มันก็แน่อยู่แล้วไม่ใช่เหรอคะ?"
2001605-128 = "พอคุยด้วยก็ตอบแบบเนือยๆ พอเปิดช่องว่างให้โต้ตอบกลับได้ก็ยังเฉย..."
2001605-129 = "แบบนี้ฉันยอมไม่ได้เด็ดขาดเลยค่ะ มันไม่สนุกเลย เวลาที่คุณครูเป็นแบบนั้น"
2001605-130 = "ฉันจะอู้คนเดียวก็คงไม่ดี เพราะงั้นเลยพยายามทำตามกลยุทธ์ที่วางไว้สุดความสามารถ แล้วอีกอย่าง..."
2001605-131 = "ฉันดีใจที่คุณครูออกมาด้วยนะคะ ฮิฮิ เสียใจด้วยนะคะ คุณครู"
2001605-132 = "คุณครูรู้สึกยังไงคะ? หนึ่งวันที่อยู่กับฉัน ความรู้สึกที่ได้ออกมาอู้งานอย่างสุดเหวี่ยงแบบนี้น่ะ?"
2001605-133 = "[s] \"อิโรฮะ...?\""
2001605-134 = "แต่ถ้าคุณครูผ่อนคลายขึ้นแล้ว เรากลับกันเลยมั้ยคะ? ออกมาเดินเล่นแบบนี้คุณครูก็น่าจะเสีย#nเวลาไปมากแล้ว"
2001605-135 = "พอกลับไปที่ชาเล่ต์ ฉันจะช่วยคุณครูทำงานเองค่ะ คิดซะว่าเป็นน้ำใจเล็กๆ น้อยๆ#nจากคนที่ทำงานเป็นผู้ดูแลกลางเหมือนกันก็ได้ค่ะ"
2001605-136 = "[s3] \"อิโรฮะ...\"\n[s4] \"ขอบใจนะ...\""
2001605-137 = "คะ? คุณครูนี่แปลกคนจริงๆ เลยนะคะ"
2001605-138 = "ขอบคุณงั้นเหรอคะ? คุณครูนี่แปลกคนจริงๆ เลยนะคะ"
2001605-139 = "ฮิฮิ... ถ้างั้นเรากลับกันเลยมั้ยคะ?"
2001605-141 = "(จากนั้นพอกลับมาถึงชาเล่ต์ ด้วยความช่วยเหลือจากอิโรฮะ คุณครูก็ทำงานทั้งหมดเสร็จได้ทันเวลา)"

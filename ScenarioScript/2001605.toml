2001605-115 = "3;이로하;01;으음, 대충 이 정도일까요.\n#3;em;…\n#3;a"
2001605-116 = "3;이로하;03;선생님, 오늘 쇼핑에 어울려 주셔서 감사합니다. \n#3;greeting"
2001605-117 = "3;이로하;03;덕분에 이것으로 미진했던 부분은 대부분 채울 수 있을 것 같아요."
2001605-118 = "[s] \"잠깐잠깐. 뭔가 이상하지 않아?! 전차의 장비를 보충하러 온 거 아니었어?!\""
2001605-119 = "3;이로하;02;네? 아, 이 체크리스트가 전차의 장비를 점검한 체크리스트라고 생각하셨다고요?\n#3;em;[반응]"
2001605-120 = "3;이로하;07;아니, 그럴 리가 없잖아요. 애당초 만마전의 주력 전차에 쓰이는 부품이나 장비를 동네 상점가에서 쇼핑으로 채운다니, 말이 안 되잖아요?"
2001605-121 = "3;이로하;03;그런 부분에 문제가 있다면, 정식 절차에 따라 만마전의 정비고에서 해결할 일인걸요?"
2001605-122 = "[s] \"그럼 오늘의 쇼핑은 대체 무엇을 위해……?\""
2001605-123 = "3;이로하;02;그냥 개인적인 쇼핑이에요. 평소 제가 애용하는 아지트를 채우기 위한."
2001605-124 = "3;이로하;05;저, 주기적으로 제 아지트를 정비하고 있거든요. 이번에 살펴보니 평소 쓰는 방석의 솜이 다 빠져 있지를 않나, 낮잠 잘 때 끌어안고 자는 베개가 해져 있지를 않나.\n#3;em;[속상함]\n#3;stiff"
2001605-125 = "3;이로하;01;겸사겸사 이부키가 놀러 왔을 때 같이 먹을 과자랑 가지고 놀 장난감도 보충했고요."
2001605-126 = "[s] \"아니, 왜 그런 미스디렉션을……?!\""
2001605-127 = "3;이로하;02;네? 그야 뻔하잖아요?\n#3;em;[반응]"
2001605-128 = "3;이로하;00;말을 걸어도 시큰둥한 반응이고, 일부러 틈을 보여줘도 딴죽 하나 걸지도 않고."
2001605-129 = "3;이로하;07;네에, 그건 제 자존심이 용납하지를 않거든요? 재미없다고요. 그런 거."
2001605-130 = "3;이로하;03;나만 땡땡이칠 수는 없다. 그러니 전력을 다해 꾀어내자! 그리고 이렇게…….\n#3;em;[음표]"
2001605-131 = "3;이로하;07;보기 좋게 걸려들었다는 거죠. 후후, 유감이네요. 선생님."
2001605-132 = "3;이로하;03;자아, 어떠신가요? 저와 함께 오늘 하루. 멋지게 땡땡이를 친 소감은?"
2001605-133 = "[s] \"이로하…….\""
2001605-134 = "3;이로하;01;뭐, 한숨 돌리셨다면 슬슬 돌아갈까요? 적당히 돌아다니면서 시간도 때웠겠다."
2001605-135 = "3;이로하;03;샬레로 돌아가면 하시는 일, 저도 도와드릴 테니까요. 뭐, 중간관리자끼리의 정이라고 생각해주세요.\n#3;em;[반짝]"
2001605-136 = "[s3] \"이로하…….\"\n[s4] \"……고마워.\""
2001605-137 = "3;이로하;02;네? 감사 인사라니 별난 분이시네요.\n#3;em;[?]"
2001605-138 = "3;이로하;02;네? 감사 인사라니 별난 분이시네요.\n#3;em;[?]"
2001605-139 = "3;이로하;03;후후, 그럼 돌아갈까요?"
2001605-140 = "#all;hide"
2001605-141 = "#na;(그 후 샬레로 돌아온 뒤, 이로하의 도움으로 늦지 않게 무사히 업무를 마무리할 수 있었다.)"

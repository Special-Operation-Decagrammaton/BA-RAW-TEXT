2001605-48 = "3;이로하;02;아아~ 정말 어쩔 수 없네, 어쩔 수 없겠어요~(힐끔)\n#3;em;[속상함]"
2001605-49 = "[s] \"……저기 이로하? 뭔가 문제라도 있어?\""
2001605-50 = "3;이로하;02;아, 이거 말인가요? \n#3;em;[반응]"
2001605-51 = "3;이로하;01;아뇨, 신경 쓰지 마세요. 그냥 지난번 점검의 확인표예요."
2001605-52 = "3;이로하;03;이래 봬도 만마전의 전차장을 맡고 있기 때문에 평소 정비 같은 것도 착실히 하고 있거든요.\n#3;em;[반짝]"
2001605-53 = "3;이로하;01;으음, 이번 점검 때의 종합 평가는, 네, 그럭저럭 A 정도라고 해둘까요."
2001605-54 = "[s] \"응? 그 정도면 나쁘지 않은 거 아니야?\""
2001605-55 = "3;이로하;00;아뇨. 참고로 이 체크리스트에서 최고 등급은 S등급이에요. 그런데도 평가가 A등급으로 나와버렸다는 건…….\n#3;em;…"
2001605-56 = "3;이로하;99;만마전 최고의 우등생이자, 최고의 전차병이며, 게헨나의 뭇 후배들이 가장 닮고 싶어 하는 2학년생 랭킹 300위권을 사수하는 저에게 있어."
2001605-57 = "[s] \"뭔가, 미묘한 숫자네…….\""
2001605-58 = "3;이로하;05;……선생님?\n#3;em;[빠직]"
2001605-59 = "[s] \"아니아니, 역시 이로하 선배님이야!\""
2001605-60 = "3;이로하;06;네에, 뭐. 엎드려 절 받기란 느낌이지만…….\n#3;em;[속상함]\n#3;stiff"
2001605-61 = "3;이로하;05;어쨌거나 S등급이 나오지 않았다는 건, 제게 있어 수치예요."
2001605-62 = "3;이로하;00;아직 여러모로 미숙하다는 거죠.\n#3;em;…"
2001605-63 = "3;이로하;00;흐음……. S등급이 나오지 않은 사유는, 몇몇 장비가 노후화된 거랑, 기타 요소들이 부족하기 때문, 인가요……."
2001605-64 = "3;이로하;03;과연, 귀찮습니다만……. 이렇게 되면 어쩔 수 없네요."
2001605-65 = "3;이로하;07;선생님. 잠시 곤란해하는 학생을 위해 시간을 내어 주시지 않을래요?\n#3;em;[음표]"
2001605-66 = "[s] \"으음, 지금 당장 말이야……?\""
2001605-67 = "3;이로하;04;네, 지금이요. 만마전 소속의 학생이 정식으로 샬레에게 부탁하는 의뢰라고 생각하셔도 상관없는데요?\n#3;em;[반응]"
2001605-68 = "3;이로하;04;게헨나의 우등생에게 빚을 달아 둘 기회, 흔치 않을 거라고요?"
2001605-69 = "3;이로하;02;……그래도 안 될까요?\n#3;em;[?]"
2001605-70 = "[s] \"뭐, 그렇게까지 말한다면야……. 그래서 뭘 하려고?\""
2001605-71 = "3;이로하;03;후후, 그야 당연히 미진한 부분을 채우기 위해……."
2001605-72 = "3;이로하;07;지금부터 쇼핑을 하러 갈 겁니다.\n#3;em;[반짝]"

[translation]
2001605-1 = "Clever Fraulein"
2001605-2 = "As always, I was in Schale working on an endless pile of tasks."
2001605-8 = "Hello, Sensei. Are you alive and well?"
2001605-9 = "[s] \"More or less. Nice to see you, Iroha.\""
2001605-10 = "You look busy."
2001605-11 = "Those dark circles are a new look for you. Are you auditioning for a horror movie?"
2001605-12 = "[s] \"Very funny, Iroha.\""
2001605-13 = "(That was a pretty weak response.)"
2001605-14 = "I would never disturb someone who insists on working, so I guess I'll have to just work next to you."
2001605-15 = "Who knows what I'll pull today to get out of being productive."
2001605-16 = "*nervous glance*"
2001605-17 = "[s] \"Sorry, Iroha. I don't have time to banter today. Augh.\""
2001605-26 = "Sensei? Are you okay?"
2001605-27 = "[s1] \"I'm fine. I think I'm just exhausted.\"\n[s2] \"There's coffee in the pot. I should have a cup.\""
2001605-28 = "Hm... Okay."
2001605-29 = "Hm... Okay."
2001605-33 = "I can work with this."
2001605-34 = "Let me borrow that table."
2001605-40 = "This is not good. *glance*"
2001605-44 = "This just won't do at all. *glance*"
2001605-48 = "Oh dear. What is to be done? *glance*"
2001605-49 = "[s] \"Um... Iroha? Is there a problem?\""
2001605-50 = "Oh, this? "
2001605-51 = "Don't worry about it. This is just a checklist from our last inspection."
2001605-52 = "Since I'm the Pandemonium Society's commander, I have to make sure everything's up to standard."
2001605-53 = "Based on the most recent inspection...let's just say I pretty much got an A."
2001605-54 = "[s] \"Isn't that good?\""
2001605-55 = "No. The highest possible grade is an S."
2001605-56 = "As the best student in the Pandemonium Society, the number one tanker, and a top 300 second-year that the little ones look up to, I can't receive an A."
2001605-57 = "[s] \"That's rough...\""
2001605-58 = "Sensei?"
2001605-59 = "[s] \"Oh, I mean... You can do it, Iroha!\""
2001605-60 = "Thanks, I guess."
2001605-61 = "I'm ashamed I didn't get an S though."
2001605-62 = "I guess I really do need to work harder."
2001605-63 = "Maybe I didn't get an S because some of the equipment is old. Maybe I'm just lacking."
2001605-64 = "Ugh. I guess I really don't have a choice."
2001605-65 = "Sensei. Can you spare a bit of time for a struggling student?"
2001605-66 = "[s] \"Um. Right now?\""
2001605-67 = "This very moment. Consider it a commission from the Pandemonium Society."
2001605-68 = "Are you going to give up a chance to have a Gehenna student be indebted to you?"
2001605-69 = "Please?"
2001605-70 = "[s] \"Well... I guess if you're really desperate.\""
2001605-71 = "Heehee. I need to work really hard on all my shortcomings."
2001605-72 = "So first, shopping!"
2001605-74 = "East Gehenna Lively Shopping District"
2001605-78 = "Okay. Let's get right to it."
2001605-79 = "This is our first stop."
2001605-80 = "[s] \"...A doll shop?\""
2001605-81 = "Welcome! How can I help?"
2001605-82 = "Just a minute. I have a list, let me see."
2001605-84 = "Do you have that Gehenna teddy bear? The one with the bow?"
2001605-85 = "[s] \"Huh?\""
2001605-86 = "Oh! It's a limited-edition product, and we have just one left!"
2001605-87 = "Great. I'll take it. You don't need to wrap it. It's not a gift."
2001605-88 = "[s] \"Wait, Iroha? You don't seem like the teddy bear type...\""
2001605-89 = "Thank you for your purchase!"
2001605-90 = "First item, checked off. On to the next."
2001605-91 = "[s] \"What in the world is happening?\""
2001605-93 = "Welcome! How can I help you?"
2001605-94 = "Do you have any Wavecat pillows?"
2001605-95 = "Oh! You have great taste! Yes, here's our selection!"
2001605-96 = "Okay. I'll take one."
2001605-101 = "[s] \"Huh...?\""
2001605-103 = "Iroha went from store to store buying more strange things."
2001605-104 = "A decorative frame..."
2001605-106 = "The new wasabi potato chips..."
2001605-108 = "Do you have the new book from the bestselling \"Love Is a Goldfish\" author?"
2001605-110 = "I came after seeing your ad. Where are your Perfectly Plush pillows?"
2001605-111 = "[s] \"Are you going to explain?!\""
2001605-113 = "As the shopping spree went on, I only had more questions. After an hour and a half, Iroha was finally done with her list."
2001605-115 = "That should be good."
2001605-116 = "Thank you for coming shopping with me today. "
2001605-117 = "I really improved all of my shortcomings with this."
2001605-118 = "[s] \"I'm so lost! I thought you were supposed to be purchasing tank equipment!\""
2001605-119 = "You thought the checklist was for tank equipment?!"
2001605-120 = "No way! Did you really think we'd be able to buy parts for a tank, the linchpin of the Pandemonium Society, from the shopping district?!"
2001605-121 = "We have our own repair shop for our tanks if there are any issues."
2001605-122 = "[s] \"Then what on earth was the point of today?\""
2001605-123 = "I was just shopping for personal reasons. To fill up my hideout with my favorite things."
2001605-124 = "I have to keep my hideout up to code, too. When I inspected it recently, all the plush cotton in the cushions was flat and my nap pillow was all worn out."
2001605-125 = "And, of course, snacks and toys for Ibuki when she visits."
2001605-126 = "[s] \"Why did you put me through that?!\""
2001605-127 = "Isn't it obvious?"
2001605-128 = "You were so out of it earlier. No fun at all."
2001605-129 = "My pride won't allow that!"
2001605-130 = "I can't skip work alone, so I used all my wiles to drag you with me."
2001605-131 = "I got you good this time, didn't I?"
2001605-132 = "But you, Sensei... Didn't you have fun today too?"
2001605-133 = "[s] \"Iroha...\""
2001605-134 = "Now that you're rested, let's head back. I'm satisfied I skipped enough work today."
2001605-135 = "When we get back to Schale, I'll help with your work. I know how it is to be a middle man."
2001605-136 = "[s3] \"You did all that for me...\"\n[s4] \"Thank you...\""
2001605-137 = "Huh? I don't know what you're talking about."
2001605-138 = "Huh? I don't know what you're talking about."
2001605-139 = "Heehee. Let's go back."
2001605-141 = "After returning to Schale, Iroha stayed up and helped me finish my work."

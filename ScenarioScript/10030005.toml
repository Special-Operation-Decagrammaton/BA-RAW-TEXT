[translation]
10030005-1 = "序幕;新年新希望"
10030005-2 = "貝里塔斯．駭客休息室"
10030005-7 = "……真紀，你那邊的情況如何？#n我這區的資源好像全部用完了。"
10030005-8 = "我這裡也一樣，能用的好像只有剛才發現的那些。"
10030005-9 = "小玉前輩，建設中的邏輯閘進展如何？"
10030005-16 = "……比想像中複雜。#n上次的版本更新更改了一些規則，所以出現了不必要的區塊……"
10030005-17 = "看來會是一場硬仗。"
10030005-18 = "唔……計劃在過年前完成果然是不可能的嗎？"
10030005-19 = "不過就算這樣也要堅持到最後。#n總不能讓為了這個計劃付出的辛苦泡湯吧。"
10030005-21 = "嗯，今晚我也會一起幫忙──"
10030005-30 = "你們……"
10030005-34 = "啊，千尋前輩！歡迎回來！"
10030005-35 = "歡迎回來，副部長。#n好久沒在部室看到你了呢。"
10030005-36 = "你太久沒來，都快忘記你長什麼樣子了。"
10030005-38 = "我也沒辦法，誰叫最近是年底……我跑了好幾間公司做安全檢查。"
10030005-43 = "但話又說回來，為什麼你們完全聯絡不上呢？"
10030005-44 = "我今天打了三通電話都沒人接，所以才會過來一趟。"
10030005-51 = "啊，真的耶……有好幾通未接來電。"
10030005-52 = "抱歉，前輩。#n我忙著處理作業，結果忘記看手機了。"
10030005-54 = "看來從作業開始已經超過一天了呢。#n時間過得真快……"
10030005-55 = "不過這畢竟是只有這個時期做才有意義的重要作業。"
10030005-57 = "……這個時期做才有意義的重要作業？"
10030005-58 = "啊，是指之前說過的年底安全檢查嗎？"
10030005-59 = "在過年前檢查電腦的安全狀態確實很重要，畢竟不少病毒會在年底肆虐。"
10030005-60 = "你們好像終於有了身為白帽駭客的自覺，讓我有點欣慰──"
10030005-62 = "啊，那個……"
10030005-63 = "其實我不是在做安全檢查……"
10030005-68 = "而是在體驗《礦工模擬器》的新模式！"
10030005-73 = "……什麼？"
10030005-74 = "前輩，你不知道《礦工模擬器》嗎？#n這是最近很受奇普托斯玩家喜愛的沙盒類遊戲。"
10030005-75 = "不是，我當然知道《礦工模擬器》……"
10030005-76 = "我好奇的是為什麼那個遊戲是只有這個時期才能進行的重要作業？"
10030005-77 = "啊，因為幾天前《礦工模擬器》推出了新模式。"
10030005-78 = "除了新增可製作新裝備的新礦物之外，還推出了能用於電路的新邏輯規則！"
10030005-80 = "因為真的很久沒有這種大規模的更新，所以在分析上花了很多時間。"
10030005-81 = "……身為貝里塔斯的一員，我認為必須盡快掌握眾多學生想瞭解的新遊戲資訊。"
10030005-82 = "沒錯，這也是貝里塔斯的職責！"
10030005-88 = "所以簡單來說……"
10030005-89 = "你們之所以整天都不接電話，就是因為顧著玩遊戲？"
10030005-93 = "從結論上來說算是吧……"
10030005-98 = "你們要繼續那種懶散的生活到什麼時候！？"
10030005-99 = "就算是休息日，居然整天待在房裡顧著玩遊戲……這樣下去身體很快就會出問題的！"
10030005-101 = "唔，又在嘮叨了……"
10030005-102 = "知道了知道了。#n這次新模式的測試結束之後，我們就會回到原本的生活──"
10030005-103 = "就算是原本的生活也和現在沒什麼兩樣吧？"
10030005-104 = "每天只吃垃圾食物，幾乎不運動……"
10030005-105 = "上次大運動會的時候，我也確實感覺到你們的體力有多糟糕。"
10030005-106 = "新的一年就快到了，明年要不要出去走走，制定更健全的新年計劃？"
10030005-107 = "啊，這點前輩不用擔心。"
10030005-108 = "別看我這樣，我可是有確實建立新年計劃的哦！"
10030005-109 = "……是嗎？#n那新年第一天你打算做什麼？"
10030005-114 = "新年第一天當然要去看日出啊！"
10030005-119 = "……真意外。#n沒想到真紀會規劃那麼特殊的活動。"
10030005-120 = "可以的話我也想一起去。#n你打算去哪裡看日出？"
10030005-121 = "我要去常去的「東部平原地區」！"
10030005-122 = "……東部平原地區？#n奇普托斯有那種地方嗎？"
10030005-124 = "不，東部平原地區是真紀玩的MMORPG《World of Archive》裡的地名。"
10030005-125 = "《World of Archive》的太陽和現實相同，會在每天早上6點升起。#n所以新年第一天，玩家們都會一窩蜂地湧向東部平原地區看遊戲世界中的日出。"
10030005-127 = "不過想看日出的人並不全都屬於同一陣營，#n因此在太陽升起前，在東部平原地區進行的PVP也和例行活動沒有兩樣！"
10030005-128 = "我還忘不了去年打敗西部王國的所有戰士，和公會成員一起看日出的回憶……"
10030005-133 = "（不行……再這樣下去，後輩們明年也會繼續過著懶散的生活……）"
10030005-137 = "大家，把今年最後一天的時間空出來。"
10030005-143 = "哎唷～我本來打算那天要在《WoA》裡狩獵一整晚的說。"
10030005-145 = "這是副部長命令。#n所有人早上9點到部室前集合，沒有例外。"
10030005-147 = "既然是副部長的命令，那就沒辦法了……"
10030005-148 = "我是沒有特別的行程啦……不過集合所有人要做什麼呢？"
10030005-150 = "大家好像只顧著駭客的工作，把螢幕外的世界忘得一乾二淨……"
10030005-154 = "所以今年我要讓大家看看真正的日出！"
10030005-160 = "咦咦──！？"

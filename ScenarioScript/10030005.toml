[translation]
10030005-1 = "Prologue;New Year's Resolution"
10030005-2 = "Veritas Hackers' Lounge"
10030005-7 = "Maki, I'm just getting common blocks over here. I think this chunk is out of resources."
10030005-8 = "Yeah... I think we've found everything worth finding."
10030005-9 = "Kotama, how's your logic circuit going?"
10030005-16 = "...It's more complicated than I expected. The system changed with the new update, so we're missing some important resources."
10030005-17 = "Reworking everything will be a challenge."
10030005-18 = "Maybe we bit off more than we can chew trying to finish this before the year ends."
10030005-19 = "If we give up now, all of the effort we've put into reaching this point will be wasted."
10030005-21 = "Yeah. I'll log on tonight to—"
10030005-30 = "Everyone..."
10030005-34 = "Ah, Chihiro! Hi!"
10030005-35 = "Hello, Vice President. Haven't seen you around the club room for a while."
10030005-36 = "It's been so long that I almost forgot what your face looks like."
10030005-38 = "It couldn't be helped. With the end of the fiscal year, quite a few companies contracted me for security consultations."
10030005-43 = "That said, why haven't any of you picked up your phones?"
10030005-44 = "I called you three times today alone without anyone answering. I canceled an appointment to come check on you because I was worried."
10030005-51 = "Oh...those are a lot of missed notifications."
10030005-52 = "Sorry. We've been so busy I must have forgotten to check my phone."
10030005-54 = "We've been working on this for over a day. It feels like the sun just rose a minute ago..."
10030005-55 = "But our work would have been meaningless if we fell off pace."
10030005-57 = "...Are you running into a deadline?"
10030005-58 = "Ah, were you running the end-of-year security checks I pinned to the club bulletin?"
10030005-59 = "It's definitely good to sweep the academy's machines for security issues. There are quite a few worms and viruses running wild currently."
10030005-60 = "I'm proud to see that you're all finally walking the path of righteous white hats—"
10030005-62 = "Um, so..."
10030005-63 = "We weren't running security checks."
10030005-68 = "We've installed a new mod for Mineral Craft!"
10030005-73 = "...What?"
10030005-74 = "You know, Mineral Craft? It's the most popular sandbox game in Kivotos right now."
10030005-75 = "Of course I know what Mineral Craft is..."
10030005-76 = "But why play it when you have time-sensitive work to complete?"
10030005-77 = "Well, one of Mineral Craft's biggest mod makers released a new update a few days ago."
10030005-78 = "It has new types of ore for crafting higher-tier equipment and an entire logic system for building circuits!"
10030005-80 = "It's been a while since we got a big update like this, so it's taking time to analyze everything fully."
10030005-81 = "...As members of Veritas, it's our duty to compile useful information for dissemination around the academy."
10030005-82 = "Yeah! This is a crucial mission for Veritas!"
10030005-88 = "Which is another way to say..."
10030005-89 = "You were so immersed in playing a video game that you missed all my calls?"
10030005-93 = "I wouldn't put it like that, but..."
10030005-98 = "Are you going to spend the rest of your lives lazing away in here?"
10030005-99 = "I know this is a day off, but to do nothing but play video games all day every day... It isn't healthy!"
10030005-101 = "Uh oh, she's lecturing us again..."
10030005-102 = "We promise, once we're done testing the new mod we'll go back to our usual lifestyle and—"
10030005-103 = "How is this different from your usual lifestyle?"
10030005-104 = "You eat instant meals every day... You barely exercise..."
10030005-105 = "Don't think I'm unaware of how our club performed during the last field day."
10030005-106 = "A whole new year lies directly ahead of us, so why not go outside? This year we can all focus on improving our unhealthy habits."
10030005-107 = "We've already got it covered!"
10030005-108 = "We've been busy, but we've still managed to come up with the perfect plan for the new year!"
10030005-109 = "...Is that so? And what, precisely, does this plan entail?"
10030005-114 = "Obviously, we need to see a new year's sunrise!"
10030005-119 = "...Huh. I wouldn't have expected you to plan something so physically demanding."
10030005-120 = "Mind if I tag along? It's been a while since we've done something as a group. Where do you plan on viewing the sunrise?"
10030005-121 = "The Eastern Plains, of course! I go there every year!"
10030005-122 = "...The Eastern Plains? I'm not familiar with that part of Kivotos."
10030005-124 = "That would be because the Eastern Plains is a location in World of Archive, Maki's favorite MMORPG. She's the guild's number one recruiter."
10030005-125 = "As part of World of Archive's simulated world, the sun rises at 6 AM every morning. So the players gather in the Eastern Plains to watch the in-game sunrise on the first day of the new year."
10030005-127 = "Gamers from every faction want to watch the sunrise, so there's an annual PVP event before dawn!"
10030005-128 = "I'll never forget when our guild destroyed our top rival on the server last year. We defeated their last fighters and took our victory pose right as the sun peaked over the horizon..."
10030005-133 = "(I have to do something... At this rate, they'll laze away for the entirety of next year as well...)"
10030005-137 = "Everyone, clear out your schedule for the final day of the year."
10030005-143 = "Ehh?! I was going to pull an all-night hunt in World of Archive!"
10030005-145 = "Consider it an order from the vice president. I want everyone in front of the club room by nine in the morning, without exception."
10030005-147 = "If it's the vice president's order..."
10030005-148 = "I don't have anything special planned then... But why call everyone together?"
10030005-150 = "I've realized that it was a mistake to throw myself into work at the expense of the club. You've all been consumed by the virtual world and completely forgotten the one beyond the monitor."
10030005-154 = "So we're all going to see a real sunrise this year!"
10030005-160 = "Wh-What?!"

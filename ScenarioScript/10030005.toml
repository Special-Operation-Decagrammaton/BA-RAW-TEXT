[translation]
10030005-1 = "บทเริ่มต้น;ปณิธานปีใหม่"
10030005-2 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
10030005-7 = "มากิ... สถานการณ์ทางนั้นเป็นยังไงบ้าง? ทางนี้เหมือนว่าทรัพยากรจะหมดแล้วละ"
10030005-8 = "ทางนี้ก็ด้วย ของที่ใช้ได้น่าจะมีแค่ที่เจอเมื่อกี้นะ"
10030005-9 = "รุ่นพี่โคทามะ ความคืบหน้าของลอจิกเกตที่กำลังสร้างอยู่เป็นยังไงบ้าง?"
10030005-16 = "มันซับซ้อนกว่าที่คิดเอาไว้เลยนะคะ การอัปเดตครั้งก่อนทำให้กฎบางอย่างเปลี่ยนแปลงไป แล้วก็เกิดบล็อกที่ไม่จำเป็นด้วย..."
10030005-17 = "ฉันว่าน่าจะเป็นการต่อสู้ที่ไม่ง่ายเลยละค่ะ"
10030005-18 = "ฮึ่ม... มันหนักเกินไปที่จะทำให้เสร็จภายในปีนี้รึเปล่านะ?"
10030005-19 = "แต่ยังไงก็ไม่ควรยอมแพ้นะคะ เราจะให้ทุกสิ่งที่เราลงมือลงแรงไปสูญสลายไปไม่ได้ค่ะ"
10030005-21 = "ใช่ คืนนี้ฉันก็จะช่วยอีกแรง..."
10030005-30 = "พวกเธอ..."
10030005-34 = "อ๊ะ รุ่นพี่จิฮิโระ! เข้ามาสิ!"
10030005-35 = "เข้ามาเลย รองหัวหน้า ไม่ได้เจอกันในห้องชมรมนานเลยนะ"
10030005-36 = "ไม่ได้เห็นหน้าค่าตากันตั้งนานจนฉันจะลืมไปแล้วเสียอีกค่ะ"
10030005-38 = "ช่วยไม่ได้นี่นา 2-3 สัปดาห์ที่ผ่านมาเป็นช่วงปลายปี... ก็เลยมีบริษัทหลายแห่งที่ฉันต้องไปตรวจสอบ#nเรื่องความปลอดภัยน่ะ"
10030005-43 = "ว่าแต่ทำไมพวกเธอถึงไม่รับโทรศัพท์เลยล่ะ?"
10030005-44 = "วันนี้ฉันโทรหาแล้วตั้ง 3 รอบ แต่ก็ไม่มีใครรับสายเลย ฉันเป็นห่วงจนต้องมาที่นี่ด้วยตัวเองน่ะสิ"
10030005-51 = "อ๊ะ จริงด้วย... มีข้อความว่าไม่ได้รับสายเพียบเลย"
10030005-52 = "ขอโทษนะรุ่นพี่ ฉันมัวแต่ตั้งใจทำงานอยู่ ก็เลยลืมเช็กโทรศัพท์ไปเลย"
10030005-54 = "จะว่าไป นี่เราทำงานกันมาเกินหนึ่งวันแล้วเหรอเนี่ย เวลาเดินเร็วมากเลย..."
10030005-55 = "แต่ถ้าพลาดโอกาสตอนนี้ งานชิ้นสำคัญนี้ก็จะไม่มีความหมายเลยนะคะ"
10030005-57 = "งานชิ้นสำคัญที่จะไม่มีความหมายถ้าพลาดโอกาสตอนนี้ไปงั้นเหรอ...?"
10030005-58 = "อ้อ กำลังตรวจสอบความปลอดภัยช่วงสิ้นปีที่เคยพูดไว้คราวก่อนใช่มั้ย?"
10030005-59 = "การตรวจสอบสถานะความปลอดภัยของคอมพิวเตอร์ก่อนจะขึ้นปีใหม่ก็เป็นเรื่องสำคัญนะ เวิร์มกับไวรัสในช่วงสิ้นปีก็เยอะใช่ย่อย"
10030005-60 = "ในที่สุดพวกเธอก็มีจิตสำนึกที่ดีของแฮ็กเกอร์หมวกขาวกันแล้วสินะ เห็นแบบนี้ฉันก็ดีใจ..."
10030005-62 = "เอ่อ... คือว่า..."
10030005-63 = "พวกเราไม่ได้กำลังตรวจสอบความปลอดภัยอยู่หรอกค่ะ..."
10030005-68 = "พวกเรากำลังทดสอบโหมดใหม่ใน <มิเนอรัล คราฟต์> อยู่น่ะ!"
10030005-73 = "ว่าไงนะ...?"
10030005-74 = "รุ่นพี่ไม่รู้จัก <มิเนอรัล คราฟต์> เหรอ? มันเป็นเกมแนวแซนด์บอกซ์ที่เป็นที่นิยมที่สุดในหมู่เกมเมอร์#nของคิโวทอสตอนนี้เลยนะ"
10030005-75 = "ไม่หรอก ฉันก็รู้จัก <มิเนอรัล คราฟต์> อยู่..."
10030005-76 = "แต่ทำไมเกมนั้นถึงกลายมาเป็นงานชิ้นสำคัญที่ต้องทำเฉพาะตอนนี้เท่านั้นล่ะ?"
10030005-77 = "อ๋อ ก็เพราะไม่กี่วันก่อน มิเนอรัล คราฟต์มีอัปเดตโหมดใหม่น่ะ"
10030005-78 = "นอกจากแร่ชนิดใหม่ที่เอาไปสร้างอุปกรณ์ใหม่ได้แล้ว ยังมีกฎทางตรรกะใหม่ที่สามารถใช้ในวงจรได้#nเพิ่มเข้ามาด้วย!"
10030005-80 = "อัปเดตใหญ่ๆ แบบนี้ไม่ได้มีมานานแล้ว แค่วิเคราะห์ก็ใช้เวลาไปไม่น้อยเลย"
10030005-81 = "ในฐานะสมาชิกเวอริทัส ฉันคิดว่าพวกเราต้องวิเคราะห์ข้อมูลชุดใหม่ของเกมที่มีนักเรียนหลายคน#nอยากรู้ให้ได้เร็วๆ น่ะค่ะ"
10030005-82 = "ใช่ ถ้าพิจารณาให้ดีแล้ว นี่ก็คือภารกิจของเวอริทัสเหมือนกัน!"
10030005-88 = "งั้นก็แปลว่า..."
10030005-89 = "ที่พวกเธอไม่รับโทรศัพท์ทั้งวัน เพราะมัวแต่จดจ่ออยู่กับเกมงั้นเหรอ?"
10030005-93 = "โดยสรุปแล้ว... จะว่าอย่างนั้นก็ได้..."
10030005-98 = "พวกเธอจะใช้ชีวิตขี้เกียจๆ แบบนี้ไปจนถึงเมื่อไรกัน?!"
10030005-99 = "ถึงจะเป็นวันหยุด แต่พวกเธอไม่ได้ออกไปไหนทั้งวันแล้วเอาแต่เล่นเกมสินะ... ถ้าร่างกายไม่ได้รับ#nวิตามินจากแสงแดดบ้าง เดี๋ยวก็เสียสุขภาพกันพอดี!"
10030005-101 = "อึก! โดนเทศน์อีกแล้ว..."
10030005-102 = "รู้แล้วน่า รู้แล้ว ไว้ลองเล่นโหมดใหม่เสร็จแล้ว พวกฉันจะรีบกลับไปใช้ชีวิตตามเดิม..."
10030005-103 = "ใช้ชีวิตตามเดิมงั้นเหรอ มันก็ไม่ต่างจากตอนนี้ไม่ใช่รึไง?"
10030005-104 = "กินอาหารฟาสต์ฟู้ดทุกวัน แล้วก็แทบจะไม่ออกกำลังกายเลยด้วย..."
10030005-105 = "ตอนงานมหกรรมแข่งขันกีฬาครั้งก่อน ฉันรู้เลยว่าร่างกายพวกเธออ่อนปวกเปียกสุดๆ"
10030005-106 = "นี่ก็ใกล้จะถึงปีใหม่แล้วด้วย ตอนปีใหม่ลองออกไปข้างนอกแล้วตั้งปณิธานปีใหม่ให้มันหนักแน่นหน่อย#nดีไหม?"
10030005-107 = "อ้อ เรื่องนั้นไม่ต้องห่วงหรอก"
10030005-108 = "เห็นอย่างนี้ฉันก็กำลังตั้งปณิธานปีใหม่อย่างชัดเจนอยู่เลย!"
10030005-109 = "งั้นเหรอ? ถ้างั้นวันแรกของปีหน้า เธอวางแผนจะทำอะไร?"
10030005-114 = "มันก็แน่นอนอยู่แล้ว วันแรกของปีก็ต้องออกไปดูพระอาทิตย์ขึ้นสิ!"
10030005-119 = "ผิดคาดแฮะ มากิวางแผนทำกิจกรรมแอคทีฟๆ แบบนั้นตั้งแต่วันแรกของปีเลยเนี่ยนะ"
10030005-120 = "ถ้าไม่ว่าอะไร ฉันขอไปด้วยคนสิ จะไปดูพระอาทิตย์ขึ้นที่ไหนเหรอ?"
10030005-121 = "ว่าจะไปที่ <เขตที่ราบตะวันออก> ที่ไปอยู่บ่อยๆ น่ะ!"
10030005-122 = "เขตที่ราบตะวันออก? มีที่แบบนั้นในคิโวทอสด้วยเหรอ?"
10030005-124 = "ไม่หรอก เขตที่ราบตะวันออกคือสถานที่ใน <เวิลด์ ออฟ อาร์ไคบ์> เกม MMORPG ที่มากิเล่นน่ะ"
10030005-125 = "ในเกม <เวิลด์ ออฟ อาร์ไคบ์> พระอาทิตย์จะขึ้นตอนหกโมงเช้าในทุกวันเหมือนโลกจริง และในวันแรก#nของปีใหม่ เกมเมอร์ทุกคนก็จะมารวมตัวกันที่เขตที่ราบตะวันออกเพื่อดูพระอาทิตย์ขึ้นด้วยกันค่ะ"
10030005-127 = "คนที่อยากดูพระอาทิตย์ขึ้นมีทั้งพันธมิตรและศัตรูของเรา ดังนั้น PvP ที่เกิดในเขตที่ราบตะวันออกก่อน#nพระอาทิตย์ขึ้นก็เลยเป็นเหมือนงานประจำปีเลยละ!"
10030005-128 = "ฉันยังจำตอนที่เอาชนะนักรบทั้งหมดของอาณาจักรตะวันตกแล้วดูพระอาทิตย์ขึ้นกับสมาชิกกิลด์เมื่อปี#nที่แล้วได้อยู่เลย..."
10030005-133 = "(ไม่ได้การละ... ขืนปล่อยให้ทำแบบนี้ ปีหน้าพวกรุ่นน้องต้องใช้ชีวิตเป็นจอมขี้เกียจแบบนี้ต่อไปแน่ๆ...)"
10030005-137 = "ทุกคน วันสิ้นปีที่จะถึงนี้ทำตัวให้ว่างไว้นะ"
10030005-143 = "เฮ้อ... วันนั้นฉันว่าจะฟาร์มโต้รุ่งในเวิลด์ ออฟ อาร์ไคบ์แล้วเชียว"
10030005-145 = "นี่คือคำสั่งของรองหัวหน้า ให้ทุกคนมาเจอกันที่หน้าห้องชมรมตอนเก้าโมงเช้า ไม่มีข้อแม้ใดๆ ทั้งสิ้น"
10030005-147 = "ถ้าเป็นคำสั่งของรองหัวหน้าก็ช่วยไม่ได้นะ..."
10030005-148 = "ฉันก็ยังไม่มีแพลนจะทำอะไรเป็นพิเศษหรอก... แต่ว่าจะให้ไปรวมตัวกันเพื่อทำอะไรเหรอ?"
10030005-150 = "ทุกคนมัวแต่จดจ่ออยู่กับเกมและการแฮ็กข้อมูล จนเหมือนจะลืมโลกที่อยู่ข้างนอกหน้าจอกันไปแล้ว"
10030005-154 = "เพราะงั้นปีนี้ฉันจะพาทุกคนไปดูพระอาทิตย์ขึ้นของจริง!"
10030005-160 = "หาาา...?!"

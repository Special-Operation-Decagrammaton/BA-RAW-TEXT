[translation]
41110-1 = "第11話;大雨注意報"
41110-2 = "シャーレ・オフィス"
41110-4 = "数日後、キヴォトス広域に大雨が降っていた。"
41110-5 = "すごい雨ですね……。"
41110-6 = "それぞれの自治区で、被害が出ていないと良いのですが……。"
41110-7 = "各学園の生徒会や、委員会のみなさんに任せれば大丈夫でしょうか。"
41110-8 = "あっ、でも……今公園にいるSRTの生徒さんたちは……。"
41110-9 = "この大雨では、テントも……。"
41110-10 = "風邪を引いてしまわないか心配ですし、それに……。"
41110-16 = "[ns] RABBIT小隊の様子を見に行く。"
41110-22 = "子ウサギ公園"
41110-24 = "こっちもタープが破れた！"
41110-25 = "ミユ！防水シートが足りない！"
41110-26 = "も、もう予備は無くって……！"
41110-27 = "くそっ、もっと色々と資材があれば……。"
41110-28 = "モエ、こっちを手伝え！"
41110-29 = "いつまでも機械を抱きしめてる場合か！"
41110-31 = "いやいやいや、通信装備が浸水したらヤバいでしょ！？"
41110-32 = "この辺の機器、全部合わせていくらだと思ってるの？"
41110-33 = "知るか！どうにかしろ！！"
41110-37 = "くそっ、いつまで続くんだこの雨……！"
41110-39 = "防水周りが補強できたら、次は排水路の方を！"
41110-40 = "土砂が詰まっているのか、水が溢れてて……"
41110-41 = "このままでは、周囲一帯が全て浸水しかねません！"
41110-42 = "分かってる！でもこっちも補強が間に合わないんだ！"
41110-43 = "手を離したら、すぐに崩れそうなレベルで――"
41110-49 = "今のって……？"
41110-50 = "こ、公園の中央に、雷が……！"
41110-52 = "まずい、"
41110-56 = "テントの支柱が倒れる……！"
41110-65 = "……。"
41110-66 = "て、テントが……。"
41110-67 = "弾薬、全部ダメになったな……。"
41110-68 = "通信機器類も……。"
41110-69 = "全部終わり、か……。"
41110-75 = "いえ、諦めるにはまだ早いです。"
41110-76 = "排水路をどうにかして、浸水の少ない装備から回収して――"
41110-77 = "装備だけの話じゃない！！"
41110-78 = "全部、全部だ……！私たちSRTは、もう……！！"
41110-79 = "サキちゃん……。"
41110-80 = "はぁ……こうなると分かってたら、最初っから……。"
41110-82 = "な、何を言ってるのですか……？"
41110-83 = "最初にみんなで、言ったじゃないですか。"
41110-84 = "私たちが諦めない限り、SRTの名前は――"
41110-86 = "ミヤコだって、分かってたんじゃないの？"
41110-87 = "こんなバカみたいなこと、いつまでも続けるわけにはいかないって。"
41110-88 = "今の私たちは治安維持どころか、食料品を探し回る毎日……。"
41110-89 = "正義がどうとか、犯罪者がどうとかそんなレベルじゃない。"
41110-90 = "こんな状態で、SRTの名前が守れてるとは思えない……！"
41110-91 = "……もう、自分が何をしてるのか分からなくなってきた。"
41110-92 = "ほんと、何やってんだろね……。"
41110-93 = "何もかも水浸しだし、野宿生活も疲れたし……。"
41110-94 = "ミヤコちゃん……もう、諦めようよ……。"
41110-95 = "……。"
41110-101 = "……ミヤコ、どこに行くんだ？"
41110-102 = "こんなバカげたことを、まだ続ける気か！？"
41110-103 = "……はい、そうです。"
41110-104 = "諦められません、SRTのためにも。"
41110-115 = "（水圧が強い……もう手の感覚も……）"
41110-116 = "（確かに、意味の無いことかもしれない……）"
41110-117 = "（でも私はSRTを、私の思う理想を……）"
41110-119 = "諦め、られないっ……！"
41110-127 = "……先生？"
41110-128 = "……今日は何の用ですか？"
41110-129 = "見て分かると思いますが、冗談を言っていられる状況ではありません。"
41110-130 = "今すぐ対処できないと、周囲が全部……。"
41110-134 = "[ns] シャベルを持って排水路に向かう。"
41110-135 = "先生……？"
41110-136 = "どうして……。"
41110-137 = "[s] \"ここの土を片付ければ良いんだよね？\""
41110-141 = "はい、お願いします。"
41110-147 = "はぁ……シャベルの使い方が下手か、貸せ。"
41110-152 = "……ほんと、何やってんだか。"
41110-153 = "……手伝います。"
41110-155 = "その後、RABBIT小隊員たちと必死に排水路を整備した。"
41110-159 = "……雨、ようやく止みましたね。"
41110-160 = "[s] \"みんな、お疲れ様。\""
41110-164 = "……。"
41110-165 = "……どうして私たちを助けるんですか？"
41110-166 = "何度も、何度も言ったはずです。何も変わらないと。"
41110-167 = "先生が私たちに何を望んでいるのか、私には全く分かりません。"
41110-168 = "[s] \"何かを望んでるわけじゃないよ。\""
41110-170 = "[s] \"私は先生だから。\""
41110-174 = "……そうですか。"
41110-175 = "装備はほとんどダメになってしまいましたが……。"
41110-176 = "どうにか、公園そのものは完全に浸水せずにすみました。"
41110-185 = "全く、ミヤコにも色々と言いたいことはあるけど……"
41110-186 = "先生は、この公園での生活をやめてほしいんじゃなかったのか？"
41110-187 = "何の得にもならないのに、こんな……筋金入りのバカだな。"
41110-188 = "ま、バカなのは最初から知ってたけどね。くひひ……。"
41110-189 = "も、モエちゃん……せっかく助けてくれたのに……。"
41110-194 = "助けは要らないと言い続けてきましたが……助けられてしまったのは事実ですね。"
41110-195 = "……ありがとうございます、先生。"
41110-197 = "（その後、濡れた体でシャーレに戻った）"
41110-198 = "（雨に濡れて風邪を引いたものの、とりあえずどうにかなって良かった……）"
41110-200 = "次回;雨に濡れた請求書"

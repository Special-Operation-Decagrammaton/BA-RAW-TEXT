[translation]
41110-1 = "第11話;大雨特報"
41110-2 = "夏萊．辦公室"
41110-4 = "（幾天後，奇普托斯下了廣範圍的大雨）"
41110-5 = "好大的雨呢……"
41110-6 = "希望各個自治區沒有發生災情……"
41110-7 = "交給各學園的學生會和委員會應該沒問題吧。"
41110-8 = "啊，不過……現在在公園的SRT的學生們……"
41110-9 = "這麼大的雨，她們的帳篷……"
41110-10 = "好擔心她們會不會感冒，而且……"
41110-16 = "[ns] 前去察看RABBIT小隊的狀況"
41110-22 = "兔寶寶公園"
41110-24 = "這邊的膠帶也破掉了！"
41110-25 = "美優！防水布不夠！"
41110-26 = "已，已經沒有備用的了……！"
41110-27 = "該死，如果能有更多相關物資……"
41110-28 = "萌，來幫忙這邊！"
41110-29 = "你要抱著機械到什麼時候！"
41110-31 = "不不不，通訊裝備可不能浸水呀！？"
41110-32 = "你以為這邊的機器全部加起來要多少錢啊？"
41110-33 = "誰知道啊！想點辦法！！"
41110-37 = "該死，雨要下到什麼時候啊……！"
41110-39 = "防水部分補強完成後，接下來處理排水道吧！"
41110-40 = "不知道是不是土砂堵住了，水一直溢出來……"
41110-41 = "這樣下去的話，周圍一帶都會浸水！"
41110-42 = "我知道！但是這裡也來不及補強！"
41110-43 = "手一鬆開就會立刻崩塌──"
41110-49 = "剛才的是……？"
41110-50 = "公，公園的中央，有閃電……！"
41110-52 = "不妙，"
41110-56 = "帳篷的支柱要倒下了……！"
41110-65 = "……"
41110-66 = "帳，帳篷……"
41110-67 = "彈藥，全都報廢了……"
41110-68 = "通訊器材也……"
41110-69 = "全都結束了嗎……"
41110-75 = "不，要放棄還太早了。"
41110-76 = "想辦法疏通排水道，從浸水較少的裝備開始回收──"
41110-77 = "我說的不只裝備！！"
41110-78 = "全部，是全部……！我們SRT，已經……！！"
41110-79 = "咲希醬……"
41110-80 = "哈啊……早知道會這樣的話，一開始……"
41110-82 = "你，你在說什麼……？"
41110-83 = "一開始大家不是一起說了嗎。"
41110-84 = "只要我們不放棄，SRT的名字──"
41110-86 = "都子其實也很清楚吧？"
41110-87 = "這種像笨蛋一樣的事，不可能一直持續下去。"
41110-88 = "現在的我們別說要維持治安，每天光是尋找糧食……"
41110-89 = "根本沒空管什麼正義，管什麼犯罪者。"
41110-90 = "我實在不覺得，這副德行能守住SRT的名字……！"
41110-91 = "……我已經，不知道自己在做什麼了。"
41110-92 = "真的，我們在做什麼呢……"
41110-93 = "全都浸水了，露宿生活也累了……"
41110-94 = "都子醬……我們放棄吧……"
41110-95 = "……"
41110-101 = "……都子，你要去哪裡？"
41110-102 = "這種蠢事，你還打算繼續下去嗎！？"
41110-103 = "……是，沒錯。"
41110-104 = "我不會放棄，這也是為了SRT。"
41110-115 = "（水壓好強……手已經沒感覺了……）"
41110-116 = "（確實可能真的沒有意義……）"
41110-117 = "（但是我要把SRT，把我心中的理想……）"
41110-119 = "我無法放棄……！"
41110-127 = "……老師？"
41110-128 = "……今天有什麼事嗎？"
41110-129 = "我想看了就知道了，現在不是能開玩笑的狀況。"
41110-130 = "現在不立刻對應的話，周圍全都會……"
41110-134 = "[ns] 拿起鏟子前往排水道"
41110-135 = "老師……？"
41110-136 = "為什麼……"
41110-137 = "[s] 「把這裡的土清掉就好了吧？」"
41110-141 = "是，拜託你了。"
41110-147 = "哈啊……還真不會用鏟子，拿來。"
41110-152 = "……真的是在做什麼啊。"
41110-153 = "……我來幫忙。"
41110-155 = "（之後和RABBIT小隊員們，拚命整頓了排水道）"
41110-159 = "……雨終於停了呢。"
41110-160 = "[s] 「大家辛苦了。」"
41110-164 = "……"
41110-165 = "……為什麼要幫我們？"
41110-166 = "我們應該一而再再而三強調了。什麼都不會改變。"
41110-167 = "我完全不懂老師對我們有什麼期待。"
41110-168 = "[s] 「我沒有特別期待唷。」"
41110-170 = "[s] 「只因為我是老師。」"
41110-174 = "……是嗎。"
41110-175 = "雖然裝備幾乎都報廢了……"
41110-176 = "不過總算是，防止公園完全浸水了。"
41110-185 = "真是的，雖然對都子也有很多想說的……"
41110-186 = "但老師不是想要我們放棄在這個公園生活嗎？"
41110-187 = "明明沒有什麼好處……真是品質保證的笨蛋呢。"
41110-188 = "嘛，最初就知道是個笨蛋了呢。咕嘻嘻……"
41110-189 = "萌，萌醬……人家特地來幫我們耶……"
41110-194 = "雖然一直說不需要幫忙……不過也確實受幫助了。"
41110-195 = "……謝謝你，老師。"
41110-197 = "（之後拖著一身濕回到了夏萊）"
41110-198 = "（雖然被雨淋濕而感冒了，但也感念一切安好……）"
41110-200 = "下一話;被雨淋濕的申請書"

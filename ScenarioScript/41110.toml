[translation]
41110-1 = "ตอนที่ 11;ระวังฝนตกหนัก"
41110-2 = "สำนักงานชาเล่ต์"
41110-4 = "(หลังจากนั้นไม่กี่วัน คิโวทอสก็เข้าสู่ฤดูฝน)"
41110-5 = "จู่ๆ ฝนก็ตกหนักเลยนะคะ ถ้าตกอย่างนี้เรื่อยๆ คิโวทอสอาจจะกลายเป็นเมืองบาดาลก็ได้ค่ะ"
41110-6 = "จะมีพื้นที่ไหนได้รับความเสียหายจากฝนตกหนักบ้างไหมนะ..."
41110-7 = "สภานักเรียนของแต่ละโรงเรียนคงกำลังรับมือกันอยู่ใช่ไหมคะ?"
41110-8 = "แต่หนูเป็นห่วงนักเรียนสถาบัน SRT ที่อยู่ในสวนสาธารณะจังเลยค่ะ"
41110-9 = "นักเรียนพวกนั้นไม่มีอาคารให้หลบฝน แล้วก็ไม่น่าจะมีอุปกรณ์กันฝนด้วยสิ..."
41110-10 = "ถ้าเป็นหวัดขึ้นมาจะทำยังไงล่ะคะ?"
41110-16 = "[ns] ออกไปหากองทหาร RABBIT"
41110-22 = "โคะอุซางิ การ์เด้น"
41110-24 = "ตรงนี้ก็รั่วเหมือนกัน!"
41110-25 = "มิยุ! ไปเอาผ้ายางมาอีก!"
41110-26 = "เบาะปูพื้นที่สำรองไว้มีแค่นั้นแหละ! ไม่มีเหลือแล้ว!"
41110-27 = "บ้าจริง! รู้งี้น่าจะขยันไปเก็บวัสดุให้มากกว่านี้..."
41110-28 = "โมเอะ! เธอจะกอดกองเศษเหล็กนั่นไปถึงเมื่อไหร่?"
41110-29 = "ถ้ามือว่างนักละก็มาช่วยปูผ้ายางตรงนี้สิ!"
41110-31 = "จะบ้าเหรอ? จะให้ฉันปล่อยอุปกรณ์สื่อสารพวกนี้ให้จมน้ำไปรึไง?!"
41110-32 = "รู้ไหมว่าแต่ละเครื่องมันราคาแพงขนาดไหน?"
41110-33 = "ตอนนี้เราอาจต้องเสียปืนกับกระสุนไปกับน้ำฝนก็ได้นะ แล้วเธอจะไปใส่ใจอุปกรณ์สื่อสารอยู่ทำไม?!"
41110-37 = "ฝะ... ฝนบ้าบอนี่ เมื่อไหร่จะหยุดตกกันนะ!"
41110-39 = "ทุกคนคะ! ถ้าบุผ้ายางกันน้ำกันเสร็จแล้ว ก็มาช่วยระบายท่อน้ำนอกสวนสาธารณะหน่อยนะคะ!"
41110-40 = "ดินมันอุดท่ออยู่จนน้ำเริ่มเอ่อออกมาแล้ว..."
41110-41 = "ถ้าปล่อยไว้แบบนี้ พื้นที่ทั้งหมดอาจถูกน้ำท่วมก็ได้ค่ะ!"
41110-42 = "รู้แล้วน่า! แต่ทางนี้ก็ยุ่งอยู่เหมือนกัน!"
41110-43 = "ถ้าปล่อยมือตอนนี้ ทุกอย่างได้พังหมดแน่..."
41110-49 = "มะ... เมื่อกี๊เกิดอะไรขึ้นน่ะ?"
41110-50 = "ฟ้าผ่ากลางสวนสาธารณะเลย...!"
41110-52 = "ไม้ยันเต็นท์บัญชาการของพวกเรา..."
41110-56 = "ว้ากกก พังลงมาแล้ว!"
41110-65 = "......"
41110-66 = "เต็นท์บัญชาการถล่มแล้ว..."
41110-67 = "กระสุนก็จมน้ำไปแล้ว..."
41110-68 = "อุปกรณ์สื่อสารก็เหมือนจะพังหมดแล้ว..."
41110-69 = "ไม่เหลือแล้ว..."
41110-75 = "ไม่ค่ะ เราต้องไม่ยอมแพ้"
41110-76 = "ถ้าเรารีบขุดลอกท่อน้ำ แล้วรีบเก็บอุปกรณ์ที่ยังไม่เสียหายมาดูแลไว้ก่อน..."
41110-77 = "ฉันไม่ได้หมายถึงอุปกรณ์สักหน่อย!"
41110-78 = "หมายถึงพวกเราและสถาบัน SRT ต่างหาก! ไม่มีอะไรเหลือแล้ว!"
41110-79 = "ซะ... ซากิจัง..."
41110-80 = "ถ้ารู้ว่าจะจบอย่างนี้ ฉันยอมแพ้ตั้งแต่แรกดีกว่า..."
41110-82 = "เดี๋ยวสิคะทุกคน หมายความว่ายังไงกันคะ?"
41110-83 = "ตอนแรกเราตั้งปณิธานด้วยกันแล้วนี่คะ"
41110-84 = "\"ตราบใดที่พวกเราไม่ยอมแพ้ ชื่อของ SRT ก็จะไม่มีวันหายไป\""
41110-86 = "ใช่แล้ว เราพูดอย่างนั้นก็จริง แต่มิยาโกะ..."
41110-87 = "เธอเองก็รู้ดีอยู่ไม่ใช่เหรอว่าเราจะดื้อดึงไปตลอดไม่ได้"
41110-88 = "ปฏิบัติการหลักของ SRT ในการจับกุมอาชญากรและรักษาความสงบของบ้านเมืองกลายเป็นความหลัง#nไปแล้ว ตอนนี้พวกเราก็ได้แต่เตร็ดเตร่หาอาหารและข้าวของเครื่องใช้กันเอง"
41110-89 = "แทนที่จะได้ต่อสู้กับอาชญากรเพื่อผดุงความยุติธรรม กลับต้องมาสู้กับคนไร้บ้านเพื่อแย่งข้าวกล่อง#nเหลือทิ้ง!"
41110-90 = "คิดว่าการทำแบบนี้... มันจะรักษาชื่อของ SRT ไว้ได้จริงๆ เหรอ?"
41110-91 = "ฉันไม่รู้เลยว่าตอนนี้กำลังทำอะไรอยู่..."
41110-92 = "อาวุธกับอุปกรณ์ก็จมน้ำหมดแล้ว..."
41110-93 = "ฉันเหนื่อยกับการเป็นคนไร้บ้านแล้ว..."
41110-94 = "มิยาโกะจัง... เรากลับบ้านกันเถอะ..."
41110-95 = "......"
41110-101 = "มิยาโกะ จะไปไหนน่ะ?"
41110-102 = "คิดจะทำอะไรบ้าๆ หรือไง?!"
41110-103 = "ค่ะ..."
41110-104 = "เพื่อรักษาชื่อของ SRT ไว้ ฉันจะยอมแพ้ไม่ได้นี่คะ"
41110-115 = "(ทำงานมากจนมือชาไปหมดแล้ว... กระแสน้ำก็รุนแรงจริงๆ...)"
41110-116 = "(ทุกคนอาจจะพูดถูกก็ได้ สิ่งที่เราทำมามันไม่มีความหมายเลย...)"
41110-117 = "(แต่ว่าเพื่อรักษา SRT ไว้... ฉันต้อง...)"
41110-119 = "ไม่ยอมแพ้เด็ดขาด!"
41110-127 = "คุณครู...?"
41110-128 = "มาเกลี้ยกล่อมพวกเราเหรอคะ?"
41110-129 = "ถ้าวันอื่นยังพอได้ แต่วันนี้ฉันไม่มีเวลามาเล่นสนุกกับคุณครูหรอกนะคะ"
41110-130 = "ถ้าฉันไม่รีบขุดลอกท่อ ทั่วทั้งบริเวณนี้คง..."
41110-134 = "[ns] ถือพลั่วแล้วลงมาช่วยลอกท่อระบายน้ำ"
41110-135 = "คุณครูคะ...?"
41110-136 = "ทำไมถึง..."
41110-137 = "[s] \"ให้เอาโคลนตรงนี้ออกใช่ไหม?\""
41110-141 = "ค่ะ... รบกวนด้วยนะคะ..."
41110-147 = "ใครเค้าใช้พลั่วแบบนั้นกัน... ส่งมานี่"
41110-152 = "พวกหัวทึบเอ๊ย..."
41110-153 = "ฉันช่วยเองค่ะ..."
41110-155 = "(จากนั้นคุณครูกับกองทหาร RABBIT ก็ช่วยกันขุดลอกท่ออยู่พักใหญ่)"
41110-159 = "ฝนหยุดแล้วละค่ะ..."
41110-160 = "[s] \"ทุกคนทำได้ดีมาก\""
41110-164 = "คุณครูคะ..."
41110-165 = "ทำไมถึงมาช่วยพวกเราล่ะคะ?"
41110-166 = "เราย้ำไปหลายรอบแล้วนี่คะว่าถึงคุณครูจะมาช่วยแค่ไหน พวกเราก็ไม่เปลี่ยนใจอยู่ดี..."
41110-167 = "ฉันไม่เข้าใจเลยค่ะว่าคุณครูต้องการอะไรจากพวกเรา ถึงได้มาช่วยพวกเราอยู่อย่างนี้"
41110-168 = "[s] \"ครูไม่ได้ทำเพราะหวังอะไรหรอก\""
41110-170 = "[s] \"ครูทำเพราะครูเป็นครูไงล่ะ\""
41110-174 = "อย่างนี้เองเหรอคะ..."
41110-175 = "อุปกรณ์ส่วนใหญ่ของเราจมน้ำจนใช้งานไม่ได้แล้วค่ะ..."
41110-176 = "แต่ถึงยังไงเราก็ช่วยป้องกันไม่ให้สวนสาธารณะจมน้ำได้ เพราะได้คุณครูมาช่วยไว้..."
41110-185 = "เป็นมิยาโกะต่างหากที่ลงมือทำตั้งแต่แรก... "
41110-186 = "ว่าแต่... คุณครูต้องการให้เราออกจากสวนสาธารณะนี้ไวๆ ใช่ไหมล่ะ?"
41110-187 = "คุณครูเองก็ทึ่มเหมือนกันนะ มาออกแรงช่วยทำไมก็ไม่รู้ ไม่เห็นจะได้ประโยชน์อะไรกับตัวเองเลย"
41110-188 = "เรารู้กันว่าคุณครูเป็นคนทึ่มตั้งแต่ครั้งแรกที่เจอแล้วไม่ใช่เหรอ... ฮิฮิ"
41110-189 = "โมเอะจัง! พูดแบบนั้นกับคุณครูได้ไง..."
41110-194 = "พวกเราเอาแต่พูดว่าไม่ต้องการความช่วยเหลือจากคุณครู แต่วันนี้ก็ได้รับความช่วยเหลือจากคุณครู#nจนได้นะคะ"
41110-195 = "ขอบคุณนะคะคุณครู..."
41110-197 = "(จากนั้นคุณครูก็กลับชาเล่ต์แบบเปียกโชกไปทั้งตัว)"
41110-198 = "(และหลังจากนั้นก็ครั่นเนื้อครั่นตัวอยู่พักใหญ่เพราะทำงานหนักกลางสายฝน)"
41110-200 = "ตอนต่อไป;ใบคำร้องที่เปียกฝน"

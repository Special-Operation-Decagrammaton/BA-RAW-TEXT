[translation]
41110-1 = "Episode 11; Heavy Rain Advisory"
41110-2 = "Schale Office"
41110-4 = "(A few days later marked the start of Kivotos' rainy season.)"
41110-5 = "Geez, it's turning into a rainstorm out there! I hope Kivotos doesn't turn into a lake."
41110-6 = "We might be dealing with the aftermath of this for a while."
41110-7 = "But I'm sure each school is taking the appropriate measures to keep their students safe."
41110-8 = "...I am a little worried about the SRT Academy students at Kousagi Park."
41110-9 = "There's not much shelter at the park, not even a building for them to hide in."
41110-10 = "I hope they don't catch a cold."
41110-16 = "[ns] Rush out to check on the RABBIT squad."
41110-22 = "Kousagi Park"
41110-24 = "The tarp has holes all over it!"
41110-25 = "Miyu! We need more tarps!"
41110-26 = "Th-That was the last of it. We're all out."
41110-27 = "Dammit. We weren't prepared for this at all."
41110-28 = "Moe! Are you still protecting your metal junk?"
41110-29 = "Are you crazy? Put them down and come help us!"
41110-31 = "Over my dead body! If any of my communications equipment gets damaged, I'll really show you crazy!"
41110-32 = "These cost more than your life is worth!"
41110-33 = "What about our guns?! Our ammunition? I think your stupid equipment is the least of our concerns."
41110-37 = "If this rain doesn't let up, we'll lose everything."
41110-39 = "Are you done with the waterproofing? The spillway outside the park needs to be expanded. And soon."
41110-40 = "The storm sewers are clogged with mud and are about to overflow."
41110-41 = "We need to free them up before we all drown!"
41110-42 = "I'd love to help, but we're shorthanded over here!"
41110-43 = "If we let go, everything's going to blow away."
41110-49 = "That was not the kind of explosion I like."
41110-50 = "I-It was a bolt of lightning...that hit the park..."
41110-52 = "The buttress holding up the command tent..."
41110-56 = "It's collapsing! Eeeek!"
41110-65 = "..."
41110-66 = "The c-command tent caved in..."
41110-67 = "All of our ammunition is underwater."
41110-68 = "The communications equipment is ruined."
41110-69 = "This is it. The end of the line."
41110-75 = "It's okay. Don't give up."
41110-76 = "We just need to expand the spillway, and I'm sure we can recover and repair some of the equipment."
41110-77 = "Forget about the stupid equipment!"
41110-78 = "It's over, Miyako! Us... SRT Academy... Everything's over!"
41110-79 = "S-Saki..."
41110-80 = "If I had known this was gonna be the end result, I never would have tried."
41110-82 = "Wh-What are you saying?"
41110-83 = "We all took an oath from the beginning."
41110-84 = "We swore to each other we wouldn't give up. That as long as we kept putting one foot in front of the other, we could carry SRT Academy's mantle ourselves. D-Didn't we?"
41110-86 = "Pretty words and pretty oaths, Miyako. That's all that ever was."
41110-87 = "We can't keep up our little game of pretend forever."
41110-88 = "How did we end up here? When did our duties become to scavenge for food and steal empty drum barrels so we can shower?!"
41110-89 = "We were better than this! We used to debate the intricacies of justice and bring down felons! Now... Now we're fighting over expired bentos with hobos."
41110-90 = "Tell me, Miyako! Is that what you meant? Is this how you keep the name of SRT alive?!"
41110-91 = "...This isn't the SRT I knew."
41110-92 = "All our worldly possessions are sitting a foot underwater."
41110-93 = "Living out in the streets was fun at first. But it's getting tiring."
41110-94 = "M-Miyako... I wanna g-go home."
41110-95 = "..."
41110-101 = "Where are you going, Miyako?"
41110-102 = "After all this? You look this disaster full in the face, and want to continue?!"
41110-103 = "...Yes."
41110-104 = "I will keep SRT Academy's justice alive. I'll never give up."
41110-115 = "(The current is so strong... I don't know how long I've been working... I can't feel my hands and feet...)"
41110-116 = "(Maybe they were right. Maybe I am a fool. )"
41110-117 = "(But... The justice I believed in... The school that I loved...)"
41110-119 = "No! You won't break me!"
41110-127 = "Sensei?"
41110-128 = "You're here to persuade us again?"
41110-129 = "We don't have time for your silly jokes. Not today."
41110-130 = "I don't care what you have to say. I have to clear the spillway, or we really will be flooded."
41110-134 = "[ns] Grab a shovel and head to the spillway."
41110-135 = "Sensei?"
41110-136 = "I...I don't understand."
41110-137 = "[s] \"So, you just need the dirt cleared out from here?\""
41110-141 = "Yes, that's right."
41110-147 = "...You're holding the shovel all wrong. Give it."
41110-152 = "...Dummies until the end."
41110-153 = "I wanna help."
41110-155 = "(The RABBIT members and I worked tirelessly on repairing the spillway for hours.)"
41110-159 = "...The rain finally stopped."
41110-160 = "[s] \"You all really pulled through. Great job.\""
41110-164 = "...Sensei."
41110-165 = "Why do you continue to help us?"
41110-166 = "We've told you again and again that we won't be persuaded."
41110-167 = "I've been trying to solve it this entire time, but I don't understand. What do you hope to get out of this?"
41110-168 = "[s] \"I'm not expecting anything.\""
41110-170 = "[s] \"I'm just your teacher.\""
41110-174 = "...Is that so."
41110-175 = "Most of our equipment is waterlogged and damaged beyond repair."
41110-176 = "But we did manage to stop the park from flooding completely. Thank you, Sensei."
41110-185 = "I-I suppose...we wouldn't have made it without Miyako though..."
41110-186 = "But Sensei, wasn't your ultimate goal to get us out of this park?"
41110-187 = "What kind of stupid Sensei would work so hard to help us stay here?"
41110-188 = "We knew Sensei was a dummy since the first moment we laid eyes on them. Heehee."
41110-189 = "You sh-shouldn't talk to your Sensei like that, Moe..."
41110-194 = "We've rejected your help so many times, and you still came running today when you thought we might need you."
41110-195 = "Thank you, Sensei."
41110-197 = "(Later, I took my soaking-wet self back to Schale.)"
41110-198 = "(Perhaps it was the manual labor in the rain, but I ended up having chills and aches for a few days after.)"
41110-200 = "Next Episode; Rain-Soaked Bills"

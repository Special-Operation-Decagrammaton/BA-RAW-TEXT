104020-72 = "เปิดวงจรระเบิดตัวเองในอีก 9 วินาที...... เปิดวงจรระเบิดตัวเองในอีก 9 วินาที...... เปิดวงจรระเบิดตัวเองในอีก 9 วินาที......"

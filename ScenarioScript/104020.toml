104020-158 = "ไวจัง?!"
104020-159 = "ฉันจะสรุปให้ฟังนะคะ ถ้าจะไปให้ถึงเครื่องปลายทางการสื่อสารที่อยู่ใน <ทางเดินชาร์-คาร์ริ-ชาร์ริ> ที่อยู่โซนใต้สุดของเรือ เราจะต้องเปิดกำแพงป้องกันขนาดใหญ่ที่ขวางอยู่ข้างหน้าก่อนค่ะ"
104020-160 = "ตอนนี้เรือรบอุตนาพิชทิมของเราอยู่ในสถานะถูกแฮ็ก เราเลยเปิดกำแพงป้องกันจากตรงนี้ไม่ได้ค่ะ "

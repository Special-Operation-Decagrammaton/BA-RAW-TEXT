104020-165 = "...... ฝั่งตะวันออกกับฝั่งตะวันตกไม่น่าเป็นห่วง แต่ปัญหาหนักน่าจะอยู่ที่ชั้นใต้ดินนะคะ ใครจะวิ่ง 1,200 เมตรได้ภายในเวลาสั้นๆ ล่ะคะ......"

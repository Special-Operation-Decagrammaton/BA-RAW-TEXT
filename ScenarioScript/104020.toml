[translation]
104020-1 = "Episode 2; Resistance 1"
104020-4 = "A-Aru. Look at the sky."
104020-5 = "It looks like things are gonna get dicey here again."
104020-6 = "...What about it? C'mon, you two!"
104020-7 = "A-Aru?"

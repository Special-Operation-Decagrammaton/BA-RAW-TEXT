104020-162 = "ถ้าทำลายได้ กำแพงป้องกันก็จะเปิดประมาณ 5 วินาที ที่เราต้องทำต่อก็คือเข้าไปทำลายเครื่องปลาย#nทางการสื่อสารที่อยู่ในนั้นค่ะ!"

104020-74 = "ฉันใช้ฟังก์ชันควบคุมการวิเคราะห์พหุมิติเพื่อบังคับให้เรือรบอุตนาพิชทิมหยุดทำงานไว้ก่อน"
104020-75 = "แต่มันก็ได้แค่ชั่วคราวเท่านั้นละ"
104020-76 = "นั่นสินะคะ ถ้าการควบคุมการวิเคราะห์พหุมิติหยุดลง เรืออะทราฮาซิสก็จะหลบรอดไปได้..."
104020-77 = "แต่ยังไงก็ซื้อเวลาไว้ได้อยู่นะคะ......"
104020-78 = "ใช่ ระหว่างนั้นเราต้องแก้ปัญหาเรื่องนี้ให้ได้ ถึงแม้ตรงนี้จะเป็นระบบควบคุมสมรรถนะสูงสุด แต่ยังไงมันก็ต้องมีวิธีโจมตี "
104020-79 = "....... แต่ลำพังฉันคนเดียวคงทำไม่ได้ ฉันต้องการความช่วยเหลือจากทุกคน"
104020-80 = "... พูดขอความช่วยเหลือออกมาแบบนั้น ไม่สมกับเป็นบิ๊กซิสเตอร์เลยนะคะ ริโอะ"
104020-84 = "ค่ะ นั่นสินะคะ...... ถึงจะเป็นระบบควบคุมสมรรถนะสูงสุด แต่สุดท้ายแล้วก็ต้องมีเครื่องปลายทางการ#nสื่อสารที่ส่งผ่านคำสั่งนั้นค่ะ"
104020-85 = "เราต้องหาเครื่องปลายทางแล้วทำลายทิ้งให้ได้ การเชื่อมต่อจะได้ถูกยกเลิกค่ะ"
104020-86 = "เราแก้ปัญหาด้วยการแฮ็กไม่ได้ ก็เลยจะให้ตัดสายไฟงั้นสินะ? ที่จริงมันก็ได้อยู่หรอก......"
104020-87 = "ใช่ค่ะ แต่มันก็คงเป็นแค่การซื้อเวลาเพื่อแก้ปัญหาเฉพาะหน้า ยังไงซะมันก็น่าจะมีเครื่องปลายทาง#nเครื่องสำรองอยู่ค่ะ"
104020-88 = "แต่ว่า...... หากในระหว่างนั้นเราฟื้นฟูการถูกแฮ็กของอุตนาพิชทิมได้ แล้วยึดหน่วยประมวลผลของเรือ#nอะทราฮาซิสไว้ได้สำเร็จละก็......"
104020-90 = "เราก็จะสามารถเปิด <วงจรระเบิดตัวเอง> ของเรืออะทราฮาซิสได้ค่ะ"
104020-91 = "ใช่ และถ้าเป็นแบบนั้น เราก็จะใช้ <วงจรหลบหนี> ที่ฉันเตรียมไว้ได้"

104020-143 = "เจอแล้ว อยู่ตรงนี้! สัญญาณแฮ็กถูกส่งผ่านจากตรงนี้!"
104020-144 = "จิฮิโระ ฉันจะส่งตำแหน่งให้เดี๋ยวนี้ละ! ตรงนั้นมันมีชื่อว่า <ทางเดินชาร์-คาร์ริ-ชาร์ริ>"
104020-145 = "อยู่ในโซนใต้ที่สุดของเรือเลยค่ะ!!"
104020-147 = "ตรวจสอบตำแหน่งแล้ว! ฉันจะแปลงเป็นข้อมูลเนวิเกชันแล้วส่งให้นะ!"
104020-148 = "ถ้าทำลายสิ่งนั้นได้ การเชื่อมระหว่างเรือรบอุตนาพิชทิมกับเรืออะทราฮาซิสก็จะถูกปลดออก!"

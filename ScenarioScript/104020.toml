104020-180 = "ฉันรู้ดีค่ะว่าที่ผ่านมาคุณฟูกะฝึกฝนความสามารถของตัวเองมานานแค่ไหน......"
104020-181 = "ฉันรู้ดีว่าคุณฟูกะต้องมุ่งมั่นในการฝึกฝน ปรับปรุง และสู้กับความล้มเหลวซ้ำแล้วซ้ำเล่าทุกวัน..."
104020-182 = "ใช่แล้วค่ะ!! ถึงเวลาที่จะให้โลกได้เห็นความสามารถและความพยายามนั้นแล้วค่ะ!! นี่เป็นโชคชะตา!!"
104020-183 = "มันคือการขับรถน่ะค่ะทุกคน~★"
104020-184 = "ใช่!! สิ่งที่หัวหน้าชมรมโภชนาการทำได้เก่งเกินใครในโลก! การขับรถยังไงล่ะ!"
104020-185 = "ใช่ๆ ในสถานการณ์แบบนี้ ไม่มีใครที่เชี่ยวชาญไปกว่าฟูกะแล้วละ"
104020-190 = "นี่ ฮารุนะ? เธอตั้งใจทำแบบนี้ใช่ไหม? บอกมานะ"
104020-191 = "เรื่องนั้นมันไม่สำคัญหรอกค่ะ! เพราะที่คุณฟูกะขึ้นเรือรบลำนี้มาก็เพื่อสิ่งนั้นไงคะ!!"
104020-192 = "ไม่ใช่เพราะเรื่องอาหารอวกาศหรอกเหรอ?"

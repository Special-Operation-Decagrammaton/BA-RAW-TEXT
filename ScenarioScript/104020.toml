[translation]
104020-1 = "第2話;抵抗（１）"
104020-4 = "亞，亞瑠大人……天空又再次……"
104020-5 = "這個情況，是不是有～點不妙呀？"
104020-6 = "……加緊腳步吧。"
104020-7 = "亞瑠醬……？"
104020-8 = "現在，老師和佳世子都在努力哦！！"
104020-9 = "我們怎麼能在這種時候放棄！#n這樣不就沒臉面對他們兩個了嗎！！"
104020-10 = "亞，亞瑠大人……！"
104020-11 = "……嘿～"
104020-12 = "走吧！我們也要做我們能做的事才行！"
104020-17 = "是，是！！我會永遠追隨您的，亞瑠大人！！"
104020-23 = "……關鍵時刻的亞瑠醬果然很帥氣♪"
104020-31 = "……遠方發現了不自然的光芒。"
104020-32 = "是資料上顯示無法測量的位置……"
104020-33 = "……為了以防萬一，開始進行調查。"
104020-38 = "──情況如何？"
104020-39 = "……聖所似乎又再次出現了。"
104020-40 = "呣……"
104020-41 = "老，老師他……沒事吧……"
104020-42 = "……了解，趕緊行動吧。做好應對敵人出現的準備。"
104020-48 = "狙擊手前往下一個位置待機。請RABBIT小隊長負責指揮。#n因愛麗絲不在而缺少的火力支援由我負責。"
104020-49 = "了解。試試看吧。"
104020-50 = "了解。"
104020-53 = "再次通知。請所有搭乘者立刻進行避難。#n17秒後將啟動「自爆程式」──"
104020-54 = "陽，陽葵前輩……真的能讓它停下來吧？"
104020-55 = "請再，稍等一會……！"
104020-61 = "請所有搭乘者立刻進行避難。#n9秒後將啟動「自爆程式」──"
104020-62 = "唔…………已經，沒辦法了……就算是我也……"
104020-63 = "──現在放棄還太早了。"
104020-67 = "莉，莉央！？"
104020-68 = "「已經沒辦法了？」──真不像是你這個「天才」會說的台詞啊，陽葵。"
104020-72 = "9秒後將啟動「自爆程式」──#n9秒後將啟動「自爆程式」──#n9秒後將啟動「自爆程式」──"
104020-73 = "停……停下來了？"
104020-74 = "我利用「多次元詮釋」的抑制功能強制停止了生命守護者。"
104020-75 = "──但這只不過是權宜之計。"
104020-76 = "……是呢。只要抑制被解開，這艘船就會受到巨大的損傷吧。"
104020-77 = "──但是，能爭取一點時間。"
104020-78 = "得在這段期間解決問題才行。#n就算是個麻煩的系統，也一定會有攻略的方法。"
104020-79 = "──但是，只靠我一個人是不可能的。#n各位或許不太情願，不過請把力量借給我。"
104020-80 = "……這句話，[ruby=  ・     ・     ・     ・     ・     ・     ・     ・  ]也不像是你會說的[/ruby]台詞呢，莉央。"
104020-84 = "也對──畢竟是規模如此巨大的船，應該存在作為命令中繼點的「裝置」才對。"
104020-85 = "既然如此，只要找出中繼裝置並將其破壞，應該就能解除連接狀態。"
104020-86 = "是在物理上切斷通訊的手法呢。#n當然，那樣應該能夠解決問題。不過──"
104020-87 = "沒錯，那也只是一時的。#n這裡應該也會有備用的「裝置」……"
104020-88 = "但是，只要在這段期間修復生命守護者的系統，#n再次取回「方舟」的控制權……"
104020-90 = "就能啟動「方舟」的「自爆程式」。"
104020-91 = "沒錯……這樣一來，我為了預防萬一準備的「逃脫程式」應該也能使用了。"
104020-93 = "……"
104020-94 = "……"
104020-95 = "千醬！能找出「裝置」的位置嗎？"
104020-97 = "……了解，正在確認中。#n只要找出「方舟」內部通訊集中的地方──"
104020-98 = "硬體的探知光靠駭入也是有極限的！#n這不是我們的專業領域吧！？"
104020-99 = "沒錯……要正確進行探知的話，必須要有「方舟」本身的設計圖。"
104020-103 = "……可能需要工程師部的力量。"
104020-106 = "──這種事就交給我們吧。#n現在正在確認。"
104020-107 = "正在解析「方舟」的設計圖，分析構造圖與「方舟」的3D空間掃描資料……"
104020-108 = "嗯。從通訊量最多的地方開始依序尋找，對吧！#n──請再稍等一下！"
104020-111 = "隊長……"
104020-112 = "我也一樣不安。#n但是──"
104020-113 = "嗯……相信並等待吧。"
104020-114 = "……"
104020-118 = "唔嗯……"
104020-123 = "嘻嘻嘻……不用那麼緊張。"
104020-124 = "誰，誰緊張了啊！？"
104020-138 = "哈啊……哈啊…… "
104020-139 = "[ns]「還沒結束。」"
104020-140 = "……嗯。我還能，戰鬥。"
104020-141 = "……"
104020-143 = "……找到了！信號是從這裡發出來的！"
104020-144 = "千醬，將位置的情報傳給你了！#n是「沙爾卡利沙瑞迴廊」！"
104020-145 = "是「方舟」最下層的區域！！"
104020-147 = "確定位置了，謝謝。#n我會將其轉換為導航資料後再轉送！"
104020-148 = "陽葵，只要破壞它應該就能解除與方舟的連結。"
104020-150 = "確認為「方舟」最下層區域的「沙爾卡利沙瑞迴廊」。#n這……必須從這裡向下移動約1200m才行呢……"
104020-151 = "不僅如此，那裡的安全系統很難解除……！#n我現在就說明解除方法──"
104020-152 = "交給我吧…………"
104020-157 = "…………系統的全部內容，已經掌握了！"
104020-158 = "是在什麼時候……！？"
104020-159 = "先整理一下狀況……#n如果想破壞位於「方舟」最下層「沙爾卡利沙瑞迴廊」裡的「裝置」，#n就必須先突破安全系統。"
104020-160 = "目前生命守護者處於被駭入的狀態……從這裡突破安全系統是不可能的。"
104020-161 = "要說有其他可能性的話……#n只有同時破壞位於「方舟」最東與最西區域的解除裝置這個方法了。"
104020-162 = "順利的話，就能讓安全系統停止5秒左右。#n只要在這段時間內破壞裝置，也許──"
104020-163 = "5秒……？"
104020-164 = "啊啊真是！如果只有這個方法的話，現在立刻分組行動吧。#n前往方舟的東邊和西邊，以及最下層──"
104020-165 = "問題在於最下層。#n能在這麼短的時間內移動1200m的人──"
104020-167 = "……唔呵呵。"
104020-174 = "風華同學。時機終於成熟了。"
104020-175 = "嗯？什麼時機？#n……不會是我想的那個吧？"
104020-176 = "嗯，沒錯，就是那個唷……#n終於到了風華同學的才能發光發熱的時候了。"
104020-180 = "我非常清楚……#n風華同學一直以來是多麼努力地鍛鍊自身的才能──"
104020-181 = "日復一日，不怠於鍛鍊與精進的態度──"
104020-182 = "沒錯！！那份才能──那份實力，能夠發揮的時刻終於來臨了！#n這不是命運還能是什麼呢！！"
104020-183 = "來～開車時間到囉～★"
104020-184 = "啊！是供給部的部長最擅長的事情對吧！！"
104020-185 = "這種時候最適合的人選，就是風華了吧。"
104020-190 = "羽留奈……？你是故意的吧？我沒說錯吧？"
104020-191 = "唔呵呵，是否故意並不重要。#n風華同學不就是為了這個才上船的嗎？"
104020-192 = "……不是宇宙食物嗎？"
104020-194 = "總之！#n破壞就交給我們吧！！"
104020-195 = "嗯嗯！安全系統就交給你們囉～！！"
104020-197 = "好的好的，知道了唷。"
104020-198 = "東邊的解除裝置就交給我們吧！"
104020-199 = "嗯！我們從這裡過去最快☆"
104020-200 = "速速解決吧。#n我們還得去找老師和白子醬呢。"
104020-201 = "是！那麼我來進行輔助。#n走吧！"
104020-204 = "那麼西邊請交給愛麗絲與夥伴們吧！"
104020-205 = "等等……遊戲開發部！？"
104020-206 = "是，是……！我，我想我們應該，是離那裡最近的……"
104020-207 = "是嗎……那我來帶路吧！"
104020-209 = "好，走吧！"
104020-213 = "姐，姐姐，等等我……！"
104020-218 = "愛麗絲，真的沒問題嗎？"
104020-219 = "是！沒有問題！"
104020-220 = "而且，「光之劍：阿特拉哈西斯的超新星」也還沒損壞。"
104020-221 = "……真的取了那個名字啊。"
104020-222 = "是的。可以的話，希望之後陽葵前輩能確認一下。#n說不定──"
104020-223 = "是呢。說不定能幫上什麼忙……#n那麼，請注意安全哦，愛麗絲。"
104020-224 = "是！愛麗絲要出發了，陽葵前輩！"
104020-228 = "風華同學，準備好了嗎？"
104020-230 = "唉……事情為什麼會變成這樣……"
104020-231 = "我們也準備好了唷～！"
104020-232 = "居然能在「方舟」上大鬧一番！真是令人興奮★"
104020-233 = "大家都上車了就趕快出發吧！沒時間了！！"
104020-234 = "哈啊……要到距離1200m的底層對吧……？#n只要當成和平常一樣在送外送──"
104020-235 = "來，出發吧風華同學！#n在一切結束的最後「Good！」地豎起拇指！"
104020-236 = "不要。絕對不要。"
104020-238 = "那……要出發囉！！"
104020-251 = "哇啊啊啊啊啊────！！"
104020-253 = "下一話;抵抗（２）"

104020-9 = "If you're going to turn tail and cry over a little bump in the road like this, don't even think about facing them ever again!"
104020-10 = "Wow! Aru!"
104020-11 = "Heehee. "
104020-12 = "We're going to do everything we can from here!"
104020-17 = "Yes, yes! I'll follow you until the end, Aru!"
104020-23 = "...Aru is so cool in critical moments."
104020-31 = "...What was that light?"
104020-32 = "I don't see any response in the data..."
104020-33 = "...I should investigate just in case."
104020-38 = "What's the situation?"
104020-39 = "I think the sanctums are manifesting again."
104020-40 = "*sigh*"
104020-41 = "D-Do you think...Sensei's o-okay?"
104020-42 = "We don't have time to worry about that. Right now, we need to prepare for an attack."
104020-48 = "Sniper, go to the next location and wait. I need the RABBIT Squad leader to take the lead. Since Aris isn't here, I'll deal with the concentrated fire."
104020-49 = "We'll do what we can."
104020-50 = "Yes. Understood!"
104020-53 = "Repeat. All passengers are requested to evacuate quickly. Initiating self-destruct sequence in 17 seconds..."
104020-54 = "H-Himari... Can we stop this?"
104020-55 = "G-Give me a moment...!"
104020-61 = "Please evacuate quickly. Initiating self-destruct sequence in 9 seconds..."
104020-62 = "I-I can't... I've been defeated..."
104020-63 = "Don't give up!!!"
104020-67 = "R-Rio?!"
104020-68 = "Is that the way a genius hacker talks? Himari? "
104020-72 = "Initiating self-destruct sequence in 9 seconds... Initiating self-destruct sequence in 9 seconds... Initiating self-destruct sequence in 9 seconds..."
104020-73 = "D-Did it stop...?"
104020-74 = "I forcibly stopped Utnapishtim using the multidimensional analysis suppression function."
104020-75 = "But this is only a temporary measure."
104020-76 = "I see. After all, the Ark will speed away after the multidimensional analysis suppression is over..."
104020-77 = "It did buy some time though."
104020-78 = "In the meantime, we have to figure this out. Even if it has a control system with impeccable performance, no program is perfect. There has to be a strategy to beat it. "
104020-79 = "I can't do it on my own. I'll need help."
104020-80 = "I never thought I'd hear those words come out of your mouth, Big Sister."
104020-84 = "Right... Even a control system that powerful should have a communication terminal that relays commands."
104020-85 = "If we find and destroy that terminal, the forced connection will be broken."
104020-86 = "We can't stop the hack, so we cut the wires instead? That could work, but..."
104020-87 = "Yes, it's only a temporary measure. There will be a spare terminal, so again, it's only buying time."
104020-88 = "But...if we successfully recover Utnapishtim from the hack and secure control of the Ark's computational device..."
104020-90 = "We can restart the Ark of Atrahasis' self-destruct sequence."
104020-91 = "And the escape sequence I prepared will also become usable."
104020-93 = "..."
104020-94 = "..."
104020-95 = "Chi! Can you find the location of the Ark's communication terminal?"
104020-97 = "Already looking. I'm analyzing the Ark's traffic volume...to find where the concentration is..."
104020-98 = "We can follow the calls, but finding the actual physical hardware is way beyond our abilities!"
104020-99 = "We would need a blueprint and structural diagram."
104020-103 = "...We'd need the Engineering Department's help."
104020-106 = "...Yes, I heard. I'm looking now."
104020-107 = "I'm doing my best... I have to interpret the Ark's blueprint... Analyzing the 3D spatial scan of the structural diagram is no walk in the park."
104020-108 = "Yes, we're going in order, starting from the area with the highest traffic volume... P-Please give us a moment! We're going as fast as we can!"
104020-111 = "Leader..."
104020-112 = "I know. I feel the same way. But..."
104020-113 = "Yes. Let's place our faith in them and wait."
104020-114 = "..."
104020-118 = "*sigh*"
104020-123 = "Heehee... Don't quiver now."
104020-124 = "Wh-Who says I'm quivering?!"
104020-138 = "*pant* ... *pant*"
104020-139 = "[s] \"No, it's not over yet.\""
104020-140 = "We're not giving up. Not now. Not ever."
104020-141 = "..."
104020-143 = "Got it! All of the hacking signals are passing through this area!"
104020-144 = "I'm sending you the location now, Chihiro! It's a place called the Shar-Kali-Sharri Corridor!"
104020-145 = "It's the sector at the very bottom of the Ark!!"
104020-147 = "Great work. I've got it. I'm converting it to navigational data and sending now."
104020-148 = "If we destroy that, the forced connection between Utnapishtim and the ark will be removed!"
104020-150 = "Yes. It's done. The Ark's lowest sector, the Shar-Kali-Sharri Corridor. We have to go down twelve hundred meters from here."
104020-151 = "But disabling that sector's security system is quite complicated! I'll explain how..."
104020-152 = "Leave it to me!"
104020-157 = "...Confirmed!"
104020-158 = "Already?!"
104020-159 = "I'll summarize. To reach the communication terminal in the Shar-Kali-Sharri Corridor at the lowest floor of the Ark, we must first open a huge barrier blocking the way."
104020-160 = "Utnapishtim has been hacked, so it's impossible to open the barrier from here."
104020-161 = "The only way is to simultaneously destroy the two fail-safes located in the eastern and western sectors of the Ark."
104020-162 = "Then the barrier will open for about five seconds, and we can destroy the communication terminal within that time!"
104020-163 = "F-Five seconds...?"
104020-164 = "It doesn't matter! We just have to do it! Divide into three teams: one go east, another west, and the last to the lowest floor!"
104020-165 = "Getting to the east and west sides won't be a problem, but the bottom floor... How are we supposed to travel twelve hundred meters within that time frame?"
104020-167 = "...Heeheeheehee."
104020-174 = "Fuuka. It's finally time."
104020-175 = "What do you mean by time? You better not be thinking what I think you're thinking."
104020-176 = "Of course I am. Fuuka, this moment was created to allow you to showcase your talent to the entire world."
104020-180 = "You've been cultivating this talent for so long."
104020-181 = "You've trained every day to improve, despite repeated failure... I know how hard you work..."
104020-182 = "Yes! It's time to unleash that talent! That effort! That skill! This is destiny!"
104020-183 = "It's driving! ★"
104020-184 = "Right! That's what the School Lunch Club president is best at!"
104020-185 = "Yeah, you're the number one expert for this situation, Fuuka."
104020-190 = "Haruna... Do you live to make my life miserable? Is that what this is?"
104020-191 = "You're focusing on the wrong details! Fuuka, you're on this ship for this very moment!"
104020-192 = "Not for your stupid space food?!"
104020-194 = "Anyway! Destruction is our specialty! We got this! "
104020-195 = "We'll blow things up! The rest of you go open the barrier!"
104020-197 = "Got it. We're on it."
104020-198 = "We'll take care of the emergency fail-safe in the east part!"
104020-199 = "We're the closest ones to it right now!"
104020-200 = "Let's deal with this quickly, and then go help Sensei and Shiroko!"
104020-201 = "I'll get you guys there!"
104020-204 = "Then we will take the west side!"
104020-205 = "The Game Development Department?!"
104020-206 = "Y-Yes! We can get there the fastest."
104020-207 = "I trust in you. Let me show you the way."
104020-209 = "Okay, let's go!"
104020-213 = "D-Don't leave without me!"
104020-218 = "Aris, are you doing okay?"
104020-219 = "Yes! No problems at all!"
104020-220 = "Oh, and the Sword of Light: Atrahasis Super Nova has not been destroyed as of yet."
104020-221 = "...So that's the name we decided on?"
104020-222 = "Yes. Himari, can you please check on it just in case?"
104020-223 = "That's probably for the best. I'll check, but take care of yourself, Aris."
104020-224 = "Thank you!"
104020-228 = "Are you ready, Fuuka?"
104020-230 = "*sigh* How in the world did I get roped into this too?"
104020-231 = "We're on board!"
104020-232 = "I'm so excited. We're gonna destroy everything!"
104020-233 = "If everyone is here, let's go! We don't have time!"
104020-234 = "*sigh* Going down twelve hundred meters...? Well, let's think of this as just another delivery..."
104020-235 = "Let's go, Fuuka. When everything is successful, give us a thumbs up!"
104020-236 = "Don't even try to make me do that. Or I'll actually get mad this time."
104020-238 = "Then, let's GOOO!"
104020-251 = "AHHHHHH!"
104020-253 = "Next Episode; Resistance 2"

104020-151 = "แต่ระบบรักษาความปลอดภัยของโซนนั้นมันค่อนข้างซับซ้อนเลย!!  ฉันจะอธิบายวิธีให้......"
104020-152 = "ให้เป็นหน้าที่ของฉันได้เลยค่ะ!"

104020-94 = "......."
104020-95 = "จี้จัง! ช่วยหาตำแหน่งเครื่องปลายทางการสื่อสารของเรืออะทราฮาซิสให้หน่อยได้ไหมคะ?"
104020-97 = "... ได้เลย กำลังหาให้อยู่พอดี ต้องวิเคราะห์การสื่อสารของเรือ... และก็หาจุดที่มีการสื่อสารมากที่สุด..."
104020-98 = "ถ้าเป็นการหาตำแหน่งของอุปกรณ์ฮาร์ดแวร์ แค่การแฮ็กของพวกเราไม่น่าจะได้ผล เรื่องแบบนั้นเราไม่#nชำนาญหรอก!"

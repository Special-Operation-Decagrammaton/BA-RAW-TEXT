[translation]
203-1 = "การคัดลอกความสุข"
203-3 = "ว่ากันว่าอารมณ์ทุกประเภท กำเนิดขึ้นและแตกแขนงมาจาก \"อารมณ์พื้นฐาน\""
203-4 = "ความสุข ความยินดี ความปรารถนา ความโกรธ... คือการรับรู้ที่แตกแขนงมาจากบางอย่าง..."
203-6 = "ในฐานะศิลปิน การรับรู้เหล่านั้นเป็นแรงบันดาลใจสำหรับผม แต่ผมไม่รู้ว่าแรงบันดาลใจพวกนี้ #nจะนำพาผมไปที่ใด... แต่มันทั้งลึกซึ้ง... และเปี่ยมล้น..."
203-7 = "....."
203-8 = "...เสียมารยาทซะแล้วสิ"
203-9 = "ยินดีที่ได้พบ คุณครู ถึงจะดูไม่ค่อยดีเท่าไหร่ แต่ผมก็อยากให้คุณครูยินดีที่ได้พบผมนะ"
203-10 = "ถึงผมจะไม่ใช่เพื่อนของคุณ แต่ก็ไม่ใช่ศัตรูและก็ไม่ใช่ผู้ช่วยเหลือของคุณ #nและไม่ใช่ผู้ขัดขวางคุณเช่นกัน"
203-11 = "ผมคือเมสโตร ตอนนี้ที่เกมาเทรียเรียกผมแบบนั้น"
203-14 = "สวนสนุกที่ถูกปิดร้างนี้มีความยินดีและความสุขของผู้คนมากมายอยู่ที่นี่#nและอารมณ์เหล่านั้นก็ได้ถูก[ruby=มิเมซิส]สร้างขึ้นใหม่[/ruby] และได้มาปรากฏอยู่ที่นี่แล้ว"
203-15 = "ในที่สุดศิลาเริงร่าที่แตกหักก็ได้มีความหมายซะที"
203-16 = "ผมก็คือสิ่งที่พวกเขาเรียกว่า \"การเลียนแบบ\" สิ่งเลียนแบบความยินดีที่มีคุณสมบัติของ[ruby=การก่อการร้าย]ความน่ากลัว[/ruby] #nเช่นเดียวกับความสับสนที่แสนลึกลับ"
203-19 = "ได้โปรด... ส่งเสียงร้องกึกก้องด้วยความยินดีด้วยเถอะ ครูเอ๋ย"

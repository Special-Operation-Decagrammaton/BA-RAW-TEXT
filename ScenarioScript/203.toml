[translation]
203-1 = "複製的喜悅"
203-3 = "據說自古以來，所有的感情都存在著作為其原型的「根源的感情」，各式各樣的感情都是以複製它的形式來表現。"
203-4 = "幸福、歡喜、渴望、憤怒……無一例外都是根源感情的複製品。"
203-6 = "身為一個藝術家，我從這個想法中獲得了啟發。雖然尚不清楚這個感覺會將我引導到什麼樣的地方，但這深奧、令人振奮的……"
203-7 = "……"
203-8 = "……失禮了。"
203-9 = "初次見面，老師。抱歉得用這副丟人的模樣，很高興能見到你。"
203-10 = "我不是你的朋友，但也不是敵人。雖然不會幫助你，卻也沒打算妨礙你。"
203-11 = "「瑪艾斯托洛」──我在蓋瑪特利亞是這麼被稱呼的。"
203-14 = "這座被封鎖的遊樂園裡，過去無數人們的幸福和歡樂以殘渣的形式遺留了下來。#n現在，那些東西藉由[ruby=Mimesis]複製[/ruby]在此顯現。"
203-15 = "被捨棄的玩偶，終於被賦予了意義。"
203-16 = "我將它們稱為Mimesis。是具備神祕的另一面──恐怖屬性的，喜悅的複製品。"
203-19 = "來吧，老師。請做好，喝采的準備。"

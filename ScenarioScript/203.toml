[translation]
203-1 = "Replicants of Delight"
203-3 = "It is said that every emotion is a replicant of primordial origin."
203-4 = "Joy, delight, desire, anger... All derived from replication. "
203-6 = "That perspective inspires me as an artist. It fills me with exaltation, even though I am blind to where such inspiration will lead me."
203-7 = "..."
203-8 = "Pardon me."
203-9 = "It's nice to meet you, Sensei. I hope you can overlook my lack of decorum. "
203-10 = "I'm neither your friend nor your enemy. I'm neither a supporter nor a hindrance."
203-11 = "I am Maestro. That is how I am known in Gematria."
203-14 = "This closed theme park contained the joy and delight of numerous people. And now, those emotions have been made into Mimesises and manifested here."
203-15 = "These broken and abandoned dolls have found meaning at last."
203-16 = "I call them Mimesises. They are the replicants of delight: Terrors—the dark side of what a Mystic is capable of."
203-19 = "Please, give a round of applause, Sensei."

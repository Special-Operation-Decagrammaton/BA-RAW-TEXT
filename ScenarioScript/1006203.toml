[translation]
1006203-1 = "Academy Life"
1006203-2 = "Millennium Campus"
1006203-3 = "I headed to Millennium at Toki's request."
1006203-7 = "Hello, Sensei."
1006203-8 = "Thank you for taking the time to see me."
1006203-9 = "[s] \"So what's the problem that you mentioned?\""
1006203-10 = "Ah..."
1006203-11 = "Well, I'd appreciate it if you'd take a look at this letter."
1006203-12 = "It's from the school, but I'm unsure if I understood it correctly."
1006203-13 = "So I wanted to seek the advice of an expert. That'd be you, Sensei."
1006203-14 = "I took Toki's letter and unfolded it."
1006203-16 = "[ns1] \"Due to insufficient attendance...\"\n[ns2] \"You're in danger of being held back...?\""
1006203-19 = "I see. It's just as I understood it. In that case..."
1006203-20 = "It's nothing to worry about."
1006203-21 = "Let me begin escorting you today, then."
1006203-26 = "[ns3] \"No, no! It's definitely something to worry about!\"\n[ns4] \"I'm glad you came to me for advice, but what?!\""
1006203-29 = "I've already been held back once. I don't think anything will change if I am again."
1006203-30 = "In fact, it'll allow me to escort you more, and stay an active member of C&C for longer."
1006203-31 = "So, in that case, wouldn't you say it's a good thing?"
1006203-32 = "[s5] \"No! I definitely wouldn't!\"\n[s6] \"How have you been all right until now?!\""
1006203-35 = "In the past, I received special attendance credits."
1006203-36 = "However, it seems this is no longer the case, and so my attendance has been deemed insufficient."
1006203-43 = "Hold on! I just had an idea."
1006203-44 = "What if Millennium were to deem escorting you a special exception, as well?"
1006203-49 = "Ah, now that I've said it, it sounds like a good idea. Sensei, while you're here, why don't we file the paperwork for your full-time transfer to Millennium Science School?"
1006203-50 = "[s7] \"No, that would cause all sorts of problems.\"\n[s8] \"Let's find another way. The letter says...\""
1006203-53 = "Is that right?"
1006203-54 = "Ah, so the letter says that if I begin attending classes, lectures, and keep up a normal daily routine at the school..."
1006203-55 = "Then, in consideration of my previous circumstances, they'll grant me leeway on my current attendance."
1006203-56 = "[s] \"I see! What you need is a normal academy life!\""
1006203-57 = "Academy...life?"
1006203-58 = "What are you getting so excited about?"
1006203-59 = "[s9] \"Are you scared?\"\n[s10] \"Are you embarrassed?\""
1006203-62 = "..."
1006203-63 = "I've heard that it's natural to feel that way about new things."
1006203-64 = "To be honest, I...don't have a clue how I'm supposed to behave."
1006203-65 = "[s] \"I'll help you!\""
1006203-66 = "S-Sensei?"
1006203-67 = "You can't just drag me around by the arm. Sensei? Sensei?!"
1006203-72 = "That was the beginning of Toki's normal academy life."
1006203-73 = "Since I couldn't join her classes, I decided to observe as she attended."
1006203-75 = "Classroom"
1006203-76 = "And that's the last topic we'll cover in today's remote lecture."
1006203-77 = "Thank you all for your focus and attention."
1006203-78 = "Asuma Toki. As a review, would you like to solve this problem?"
1006203-82 = "..."
1006203-83 = "Solving a problem, in other words, is removing the source of it..."
1006203-84 = "When an unsolvable problem stands in your way..."
1006203-85 = "An elite agent will always know how to charge through it head on."
1006203-87 = "Wh-What are you doing?! What are you doing to the screen?"
1006203-88 = "No, Toki! You can't use your C&C tools in class!"
1006203-89 = "Especially not a hacking tool that can take down all of Millennium's firewalls at once!"
1006203-90 = "If you keep this up, I will not be able to count your attendance today!"
1006203-91 = "?!"
1006203-92 = "Sensei, what should I do?"
1006203-93 = "[s] \"Can't you just solve the problem without any tricks?\""
1006203-94 = "If that were possible, there wouldn't be conflict in the world. We would finally know peace. It's such a shame."
1006203-95 = "[s] \"This is exactly what I'm talking about!\""
1006203-96 = "...Very well. If there's no other way, I'll do my best to solve the problem."
1006203-105 = "Hey, Toki. I'm going to the cafe after class, do you want to come?"
1006203-106 = "?!"
1006203-107 = "Sensei, what do I do?"
1006203-108 = "[s] \"Have fun. Don't overthink it.\""
1006203-109 = "But..."
1006203-110 = "[s] \"Hanging out with a friend in a cafe is normal academy life at its finest!\""
1006203-111 = "I-Is that right?"
1006203-112 = "In that case, will you join us, Sensei?"
1006203-113 = "[s] \"It would be terrible for a teacher to interfere in students' camaraderie.\""
1006203-114 = "What does that mean?"
1006203-115 = "Sensei? Sensei?!"
1006203-117 = "I saw off Toki and her pleading face with joy in my heart."
1006203-118 = "Until..."
1006203-120 = "*boom*"
1006203-121 = "[ns] \"Why?!\""
1006203-122 = "Aaaaaugh!"
1006203-126 = "W-What's with this maid..."
1006203-127 = "Hey, we're just upstanding citizens trying to help a local business get rid of leftover cake inventory! We're generously offering...to eat them for free in advance!"
1006203-135 = "Hm... That is better known as stealing via intimidation."
1006203-136 = "Hmph! Whatever. Even if it's true that you shouldn't mess with a maid of Millennium, there's no way we'd give up that easily! Not when it comes to cake!"
1006203-137 = "..."
1006203-138 = "So, this is what student life is like."
1006203-139 = "It's just like the book I saw in the C&C club room."
1006203-140 = "It's a student's duty to take down troublemakers. A student must conquer the school, no matter what...even if the only blade in your hand is a pair of scissors."
1006203-141 = "Excuse me? What kind of nonsense are you spouting?!"
1006203-142 = "[ns] \"No, no, no! That's definitely not a part of normal academy life!\""
1006203-143 = "Since it's come to this, I will respond with all I have."
1006203-144 = "Even if I only have access to a fraction of maximum performance, there's still no better way to express my true feelings."
1006203-145 = "Now activating the powered suit system, Abi-Eshuh—"
1006203-147 = "After that, I just barely managed to stop Toki from going on a whole series of rampages."
1006203-150 = "Sensei? Are you well?"
1006203-151 = "[s] \"I feel like I just lost a few years of life expectancy...\""
1006203-152 = "..."
1006203-153 = "Even though I'm not actually sure what's wrong, it seems I owe you an apology."
1006203-154 = "I've caused problems for you once again."
1006203-155 = "It's unconscionable that I'd continue to be a nuisance to you when it's my duty to provide you with assistance."
1006203-156 = "Indeed, it calls into question my qualification as an assistant."
1006203-157 = "[s11] \"It isn't your fault. Learning new things is the core of any normal academic life.\" \n[s12] \"So let's start over from the beginning!\""
1006203-160 = "..."
1006203-161 = "Hm... If you say so, Sensei."
1006203-162 = "A normal academy life..."
1006203-167 = "I honestly didn't expect it to be so difficult, Sensei."
1006203-169 = "Toki stood in front of me, looking somber."
1006203-170 = "There was nothing I could do but nod along."

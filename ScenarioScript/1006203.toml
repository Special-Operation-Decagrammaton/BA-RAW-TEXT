[translation]
1006203-1 = "ชีวิตในโรงเรียน"
1006203-2 = "โรงเรียนวิทย์มิลเลเนียม"
1006203-3 = "(คุณครูมุ่งหน้าไปยังโรงเรียนมิลเลเนียมตามคำขอของโทคิ)"
1006203-7 = "มาแล้วเหรอคะคุณครู"
1006203-8 = "ขอบคุณที่สละเวลามาหาฉันนะคะ"
1006203-9 = "[s] \"เรื่องลำบากใจที่ว่าคืออะไรเหรอ?\""
1006203-10 = "คือว่า..."
1006203-11 = "ก่อนอื่น ฉันอยากให้คุณครูช่วยอ่านจดหมายฉบับนี้ก่อนค่ะ"
1006203-12 = "นี่เป็นจดหมายที่ทางโรงเรียนส่งมา แต่ฉันไม่ค่อยแน่ใจว่าตัวเองเข้าใจเนื้อหาถูกต้องหรือเปล่า"
1006203-13 = "ฉันก็เลยอยากได้คำแนะนำจากคุณครูที่เชี่ยวชาญทางด้านนี้ค่ะ"
1006203-14 = "(รับจดหมายจากโทคิมาอ่าน)"
1006203-16 = "[ns1] \"นี่มันคำเตือนซ้ำชั้น\"\n[ns2] \"จดหมายเตือนชั่วโมงเรียนไม่พอนี่นา...?\""
1006203-19 = "เป็นอย่างที่ฉันเข้าใจเลยสินะคะ นั่นหมายความว่า..."
1006203-20 = "ไม่เห็นจะมีความหมายอะไรเลยค่ะ"
1006203-21 = "ถ้างั้นวันนี้ฉันไปคุ้มกันคุณครูดีกว่าค่ะ"
1006203-26 = "[ns3] \"เดี๋ยวๆ! นี่มันเรื่องใหญ่เลยนะ?!\"\n[ns4] \"ทำไมถึงเป็นแบบนี้ไปได้ล่ะ?!\""
1006203-29 = "มันก็ต้องมีบ้างสิคะที่เราจะได้รับคำเตือนซ้ำชั้น ต่อให้ต้องโดนอีกครั้งก็คงไม่มีอะไรเปลี่ยนหรอกค่ะ"
1006203-30 = "แบบนี้มันยิ่งกลับทำให้ฉันมีเวลาไปดูแลคุณครูมากกว่าเดิมด้วยซ้ำ"
1006203-31 = "การได้มีเวลาไปทำกิจกรรมของ C&C มากขึ้น ถือว่าเป็นเรื่องที่ดีไม่ใช่เหรอคะ?"
1006203-32 = "[s5] \"ไม่ใช่! ไม่ใช่แบบนั้นสักนิด!\"\n[s6] \"ทำไมถึงชิลได้ขนาดนี้เนี่ย?!\""
1006203-35 = "ก่อนหน้านี้ ฉันได้รับข้อยกเว้นเป็นกรณีพิเศษให้ไม่ต้องลงชื่อเข้าเรียนให้ครบทุกคาบค่ะ"
1006203-36 = "แต่ตอนนี้ฉันไม่มีอภิสิทธิ์แบบนั้นแล้ว ก็เลยดูเหมือนว่าจำนวนชั่วโมงเรียนจะไม่เพียงพอน่ะค่ะ"
1006203-43 = "เดี๋ยวนะคะ ฉันเพิ่งคิดอะไรดีๆ ได้ค่ะ"
1006203-44 = "ถ้าทางโรงเรียนยอมรับเรื่องที่ฉันดูแลและคุ้มกันคุณครูว่าเป็นกรณียกเว้นพิเศษล่ะ...?"
1006203-49 = "แบบนั้นนับเป็นความคิดที่ดีเลยนะคะคุณครู สนใจย้ายสำนักงานมาอยู่ที่โรงเรียนวิทย์มิลเลเนียมเลย#nมั้ยคะ?"
1006203-50 = "[s7] \"ไม่ได้หรอก น่าจะติดปัญหาหลายอย่างเลยละ...\"\n[s8] \"มาหาวิธีอื่นกันเถอะ ขอครูดูจดหมายอีกรอบหน่อย...\""
1006203-53 = "เอางั้นเหรอคะ?"
1006203-54 = "จริงๆ ในจดหมายก็บอกว่าจากนี้ถ้าฉันเข้าเรียนให้ครบชั่วโมง ตั้งใจเรียน และใช้ชีวิตในโรงเรียนต่อไป"
1006203-55 = "ทางโรงเรียนก็จะเห็นแก่สถานการณ์ที่ต้องเจอมาจนถึงตอนนี้ และก็จะพิจารณาเรื่องจำนวนชั่วโมง#nเรียนให้ได้น่ะค่ะ"
1006203-56 = "[s] \"รู้แล้ว! โทคิแค่ต้องมี 'ชีวิตในโรงเรียนที่ปกติ' ยังไงล่ะ!\""
1006203-57 = "ชีวิตที่ปกติในโรงเรียนเหรอคะ...?"
1006203-58 = "ทำไมคุณครูถึงตื่นเต้นขนาดนั้น..."
1006203-59 = "[s9] \"กลัวเหรอ?\"\n[s10] \"ไม่ชินเหรอ?\""
1006203-62 = "......"
1006203-63 = "ฉันไม่ค่อยรู้เรื่องการเข้าเรียน ก็เลยไม่รู้ว่าต้องกังวลแค่ไหนค่ะ"
1006203-64 = "บอกตามตรงคือฉันไม่รู้ด้วยซ้ำค่ะว่าต้องทำตัวอย่างไรในโรงเรียน"
1006203-65 = "[s] \"ครูจะช่วยสอนให้เอง!\""
1006203-66 = "คะ... คุณครู?"
1006203-67 = "จู่ๆ จะดึงแขนฉันให้ตามไปแบบนี้ก็ได้เหรอคะ... คุณครู? คุณครูคะ?"
1006203-72 = "(และ 'ชีวิตในโรงเรียนที่ปกติ' ของโทคิก็เริ่มขึ้น)"
1006203-73 = "(คุณครูไม่สามารถเข้าไปนั่งเรียนด้วยกันได้ ก็เลยแค่พาไปเข้าเรียนและเฝ้าดูอยู่ห่างๆ)"
1006203-75 = "ห้องเรียน"
1006203-76 = "ต่อไปเป็นส่วนสุดท้ายของการบรรยายทางไกลในวันนี้แล้วครับ"
1006203-77 = "ขอบคุณทุกคนที่มีสมาธิและตั้งใจฟังจนจบนะครับ"
1006203-78 = "อาซุมะ โทคิ เพื่อเป็นการทบทวน ลองแก้โจทย์นี้ดูหน่อยมั้ยครับ?"
1006203-82 = "......"
1006203-83 = "แก้โจทย์... แปลว่าให้แก้ปัญหาใช่มั้ยนะ...?"
1006203-84 = "เมื่อเราถูกขวางหน้าด้วยปัญหาที่แก้ไม่ได้..."
1006203-85 = "ก็ต้องเอาความฉลาดเข้าสู้ค่ะ ความฉลาดของสายลับที่รู้วิธีการบุกทะลวงด้านหน้าค่ะ!"
1006203-87 = "ทะ... ทำอะไรครับเนี่ย!! ทำไมหน้าจอถึง...!"
1006203-88 = "ไม่ได้นะครับโทคิ! จะหยิบอุปกรณ์ของ C&C มาใช้ระหว่างคาบเรียนไม่ได้นะครับ!"
1006203-89 = "ยิ่งถ้าเป็นเครื่องมือแฮ็กประสิทธิภาพสูงที่ปลดไฟร์วอลล์ระบบประมวลข้อมูลของโรงเรียนได้แบบนี้#nยิ่งไม่ได้ใหญ่เลยครับ!"
1006203-90 = "ถ้ายังเป็นแบบนี้ ก็คงจะเกิดปัญหาเรื่องการเก็บชั่วโมงเรียนเหมือนเดิมนะครับ!"
1006203-91 = "!?"
1006203-92 = "คุณครูคะ ถ้าเจอเรื่องแบบนี้ต้องทำยังไงเหรอคะ?"
1006203-93 = "[s] \"แค่แก้โจทย์อย่างตรงไปตรงมาก็พอแล้วนี่?\""
1006203-94 = "ถ้าทำแบบนั้นแล้วแก้ปัญหาได้ โลกใบนี้ก็คงไม่มีการทะเลาะกัน คงกลายเป็นโลกแห่งความสันติสุข#nไปแล้วค่ะ น่าเสียดายที่มันไม่เป็นอย่างนั้นนะคะ"
1006203-95 = "[s] \"งั้นอย่างน้อยก็ทำให้เป็นไปได้ในชั่วโมงเรียนสิ!\""
1006203-96 = "...ช่วยไม่ได้นะคะ งั้นฉันจะลองตั้งใจแก้โจทย์ดูค่ะ"
1006203-105 = "คุณโทคิ ฉันว่าจะไปคาเฟ่น่ะ ไปด้วยกันมั้ย?"
1006203-106 = "?!"
1006203-107 = "ฉันควรทำยังไงดีคะ คุณครู?"
1006203-108 = "[s] \"ไปกับเพื่อนๆ เถอะ แล้วก็ไม่ต้องประหม่าเกินไปด้วยล่ะ\""
1006203-109 = "แต่ว่า..."
1006203-110 = "[s] \"การไปคาเฟ่กับเพื่อนคือการใช้ชีวิตปกติในโรงเรียนที่คนอื่นทำกันนะ!\""
1006203-111 = "งะ... งั้นเหรอคะ...?"
1006203-112 = "งั้นคุณครูสนใจจะไปด้วยกันมั้ยคะ?"
1006203-113 = "[s] \"ถ้าผู้ใหญ่เข้าไปยุ่งเรื่องการผูกมิตรกันของนักเรียน มันจะลำบากนะ\""
1006203-114 = "หมายความว่ายังไงคะ...?"
1006203-115 = "คุณครู? คุณครูคะ?!"
1006203-117 = "(โทคิมองมาด้วยสายตาที่บอกว่าอย่าทิ้งเธอไว้คนเดียว แต่คุณครูก็ส่งโทคิให้ไปคาเฟ่กับเพื่อนๆ อย่างปลาบปลื้มใจ)"
1006203-118 = "(แล้วก็...)"
1006203-120 = "ตู้มมมมม!!!"
1006203-121 = "[ns] \"เกิดอะไรขึ้น?!\""
1006203-122 = "กรี๊ดดดดดด!!!"
1006203-126 = "อะ... อะไรกันเนี่ย ยัยเมดคนนี้..."
1006203-127 = "เค้กพวกนี้ยังไงก็ขายไม่หมดอยู่แล้วนี่... พวกฉันก็แค่... มาช่วยกินให้ฟรีๆ ก็เท่านั้นเอง..."
1006203-135 = "พฤติกรรมแบบนั้นน่ะ พวกฉันเรียกว่า \"กินแล้วชักดาบ\" ค่ะ"
1006203-136 = "ยัยเด็กคนนี้! ถึงจะมีข่าวลือว่าอย่าหือกับเมดแห่งมิลเลเนียมก็เถอะ แต่คิดว่าพวกฉันจะกลัวงั้นเรอะ?!"
1006203-137 = "......"
1006203-138 = "นี่คือชีวิตประจำวันของ 'นักเรียน' สินะคะ"
1006203-139 = "ฉันเคยอ่านเจอมาจากหนังสือที่อยู่ในห้อง C&C ค่ะ"
1006203-140 = "ว่าหนึ่งในหน้าที่หลักของนักเรียนก็คือ... การโค่นพวกเด็กเจ้าปัญหาที่เข้ามาหาเรื่อง แล้วพิชิต#nโรงเรียนของตัวเองให้ได้!"
1006203-141 = "พูดบ้าอะไรของเธอห้ะ!"
1006203-142 = "[ns] \"ไม่นะ ไม่ใช่เลย! นักเรียนเขาไม่ทำแบบนั้นกัน!\""
1006203-143 = "ในเมื่อมาถึงขั้นนี้แล้ว ฉันก็จะตอบรับอย่างจริงใจค่ะ"
1006203-144 = "ถึงตอนนี้ฉันจะแสดงสมรรถนะได้ไม่เต็มที่ แต่ก็ไม่มีอะไรที่จะแสดงความจริงใจของฉันได้มากกว่าสิ่งนี้#nแล้วค่ะ"
1006203-145 = "เปิดใช้ระบบพาวเวอร์ สูท <อาบี เอชูห์> ..."
1006203-147 = "(จากนั้นคุณครูก็พยายามห้ามโทคิที่ระงับความพุ่งพล่านของตัวเองไม่อยู่)"
1006203-150 = "คุณครู? ไหวหรือเปล่าคะ?"
1006203-151 = "[s] \"รู้สึกเหมือนอายุสั้นลงไปหลายปีเลย...\""
1006203-152 = "......"
1006203-153 = "ขอโทษนะคะ ถึงจะไม่รู้ว่าเป็นเรื่องอะไร..."
1006203-154 = "แต่เหมือนฉันจะทำให้คุณครูต้องเดือดร้อนอีกแล้วสินะคะ"
1006203-155 = "ฉันควรจะมาช่วยเหลือและสนับสนุนคุณครูแท้ๆ แต่กลับสร้างความเดือดร้อนให้คุณครูอยู่เรื่อย..."
1006203-156 = "ฉันคงไม่มีสิทธิ์เป็นผู้ช่วยคุณครูแล้วค่ะ..."
1006203-157 = "[s11] \"ไม่ใช่ความผิดของโทคิหรอก ถ้าเจอสิ่งที่ไม่รู้ ก็แค่เรียนรู้ไปก็พอแล้วละ\"\n[s12] \"มาเริ่มกันใหม่อีกครั้งนะ\""
1006203-160 = "......."
1006203-161 = "ค่ะ ถ้าคุณครูว่าอย่างนั้นละก็..."
1006203-162 = "แต่จะว่าไป คุณครูคะ..."
1006203-167 = "การใช้ชีวิตในโรงเรียนแบบปกติ มันยากมากๆ เลยนะคะ"
1006203-169 = "(คุณครูจ้องโทคิที่ยืนอยู่ตรงหน้าด้วยสีหน้าคูลๆ แต่จริงใจ)"
1006203-170 = "(แต่สิ่งที่ทำได้ก็มีแค่... ถอนหายใจเล็กน้อยและพยักหน้าให้)"

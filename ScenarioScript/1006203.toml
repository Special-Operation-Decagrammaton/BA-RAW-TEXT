[translation]
1006203-1 = "普通的學園生活"
1006203-2 = "千年校園"
1006203-3 = "（為了找季而來到了千年）"
1006203-7 = "恭候多時了，老師。"
1006203-8 = "感謝您在百忙之中撥空前來。"
1006203-9 = "[s]「話說傷腦筋的事是指什麼呢？」"
1006203-10 = "該怎麼說呢……"
1006203-11 = "請您先看這封信。"
1006203-12 = "雖然是學校寄來的，但我不確定自己的理解是否正確……"
1006203-13 = "我想老師應該會比較清楚，希望您能給我一些建議……"
1006203-14 = "（從季手中收下了信）"
1006203-16 = "[ns1]「上面寫著因為出席天數不足，」\n[ns2]「再這樣下去可能會留級呢……」"
1006203-19 = "原來如此，和我理解的一樣。也就是說……"
1006203-20 = "放著不管也無所謂。"
1006203-21 = "那麼既然問題不大，今天我也會輔佐老師。"
1006203-26 = "[ns3]「不不不，這件事很嚴重吧！？」\n[ns4]「我們沒有連這點的理解都一樣吧！？」"
1006203-29 = "我已經留級過一次了，就算再留級第二次、第三次也無所謂。"
1006203-30 = "不如說只要留級的話，不只是明年、後年而已，在那之後也可以繼續輔佐老師。"
1006203-31 = "能以C&C的身分活動的期間也會延長，簡直是百利而無一害。"
1006203-32 = "[s5]「完全不對好嗎！？」\n[s6]「之前都是怎麼處理的！？」"
1006203-35 = "之前都是特例視為有出席的。"
1006203-36 = "但是現在情況有所改變，所以才會依照規定要求出席數吧。"
1006203-43 = "請等一下，老師。#n我剛才靈光一現……"
1006203-44 = "只要讓學校認可照顧老師這個特例不就行了嗎……？"
1006203-49 = "不覺得是個好主意嗎？您不如乾脆調職到千年如何？"
1006203-50 = "[s7]「這樣我各方面都會很困擾的……」\n[s8]「先等一下，信還有後續……」"
1006203-53 = "是嗎……"
1006203-54 = "信上寫著，只要今後不耽誤學生的本分，以一名學生的身分好好生活……"
1006203-55 = "考量到過往的情況，可以考慮採取救濟措施。"
1006203-56 = "[s]「所以『普通的學園生活』是必要的啊。」"
1006203-57 = "普通的學園生活……？"
1006203-58 = "您突然那麼有幹勁，發生什麼事了嗎？"
1006203-59 = "[s9]「會感到不安嗎？」\n[s10]「還是沒什麼興趣？」"
1006203-62 = "……"
1006203-63 = "由於並不是很清楚，不能說不會不安呢。"
1006203-64 = "我該如何是好呢……"
1006203-65 = "[s]「我來幫你吧！」"
1006203-66 = "老，老師？"
1006203-67 = "老師，請不要突然拉著我……！？"
1006203-72 = "（就這樣，季的「普通的學園生活」開始了）"
1006203-73 = "（首先讓季參加了課程，並決定在一旁看著）"
1006203-75 = "教室"
1006203-76 = "那麼今天的線上課程就到此為止。"
1006203-77 = "感謝各位同學聽到最後。"
1006203-78 = "飛鳥馬季同學，你似乎很久沒來上課了，#n為了確認你的理解程度，可以麻煩你試著回答這個問題嗎？"
1006203-82 = "……"
1006203-83 = "解題的意思就是要解決問題……"
1006203-84 = "當複雜的問題阻擋在眼前的時候……"
1006203-85 = "用力量正面突破也是特務的基本素養！"
1006203-87 = "你，你要做什麼！？畫面被……！"
1006203-88 = "請住手！上課的時候不可以使用C&C的道具！"
1006203-89 = "更別說是能瞬間解除千年防火牆的駭客工具了……！"
1006203-90 = "不立刻停止的話，就不算你出席哦！！"
1006203-91 = "！？"
1006203-92 = "老師，這種時候該怎麼辦？"
1006203-93 = "[s]「老老實實地解題不就好了嗎……」"
1006203-94 = "如果世上都是老實人的話，這個世界就不會有紛爭產生了吧。#n真是非常遺憾……"
1006203-95 = "[s]「想想辦法！為了出席數！」"
1006203-96 = "……沒辦法了。我就老實回答問題吧。"
1006203-105 = "你是季同學對吧？我之前就很想認識你了。#n要不要一起去咖啡廳呀？"
1006203-106 = "！？"
1006203-107 = "老，老師……"
1006203-108 = "[s]「去吧。放輕鬆好好享受哦。」"
1006203-109 = "但是……"
1006203-110 = "[s]「放學後和朋友一起去咖啡廳打發時間，可是學園生活的醍醐味唷！」"
1006203-111 = "是，是嗎……？"
1006203-112 = "既然如此，老師也一起……"
1006203-113 = "[s]「學生們一起享樂的時間也是很重要的。」"
1006203-114 = "不能一起去嗎……？"
1006203-115 = "老師？老師！？"
1006203-117 = "（儘管季的眼神就像是被拋棄的幼犬一樣，還是決定含淚目送他離開）"
1006203-118 = "（過了不久……）"
1006203-120 = "（咚哐───！！）"
1006203-121 = "[ns]「爆，爆炸了！？」"
1006203-122 = "呀啊啊啊！？"
1006203-126 = "這……這個女僕是怎樣啊……"
1006203-127 = "把可能賣不完的蛋糕丟掉不是很浪費嗎？#n我們只是想幫忙吃掉而已……"
1006203-135 = "那種行為就叫做吃霸王餐。"
1006203-136 = "你說什麼！以為我們會因為聽過不要接近千年女僕的傳聞就害怕嗎！？"
1006203-137 = "……"
1006203-138 = "原來如此，這就是普通的學園生活嗎。"
1006203-139 = "我曾在C&C部室的書裡看過。"
1006203-140 = "打倒所有找碴的問題學生，#n進而支配學園才是學生的本分！"
1006203-141 = "啊？你以為能做到嗎，少開玩笑了！"
1006203-142 = "[ns]「你是不是對學生的本分有什麼誤會！？」"
1006203-143 = "事已至此，看來只能認真了。"
1006203-144 = "雖然無法發揮全力，就讓你們稍微見識我的力量吧。"
1006203-145 = "切換為動力裝甲系統「Abi-Eshuh」──"
1006203-147 = "（在那之後總算是阻止了即將暴走的季）"
1006203-150 = "老師，您沒事吧？"
1006203-151 = "[s]「壽命可能縮短了好幾年……」"
1006203-152 = "……"
1006203-153 = "……非常抱歉。"
1006203-154 = "又給老師添麻煩了呢……"
1006203-155 = "明明該輔佐老師，卻總是造成您的困擾……"
1006203-156 = "我沒有資格輔佐您……"
1006203-157 = "[s11]「沒有那種事唷。只要一起學習該怎麼做就好了。」\n[s12]「重整心情，試著再挑戰一次看看吧！」"
1006203-160 = "……是。"
1006203-161 = "既然老師這麼說……"
1006203-162 = "話說回來，老師。"
1006203-167 = "原來普通的學園生活是件如此困難的事啊。"
1006203-169 = "（面對一臉平靜地吐露心聲的季……）"
1006203-170 = "（只能輕輕地點了點頭）"

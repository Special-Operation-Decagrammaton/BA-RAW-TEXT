[translation]
10038005-1 = "序幕;準備慶典吧！"
10038005-4 = "＜前情提要＞"
10038005-8 = "（山海經高級中學與赤冬聯邦學園舉辦了一場交流會）"
10038005-9 = "吾等山海經，計畫於近期舉辦與赤冬的交流會。"
10038005-12 = "不過坦白說……這場交流會，造成了玄龍門相當大的壓力。"
10038005-13 = "而其中要因，乃源自於經驗的匱乏。#n當然，期望迴避交流會的心情也不容忽視。"
10038005-16 = "（在不安的氣氛下，交流會如期舉行。#n　赤冬聯邦學園事務局的學生們順利抵達了山海經）"
10038005-19 = "哦哦……這裡就是……！"
10038005-21 = "山海經啊！"
10038005-22 = "原來如此，與事前調查時給人的感覺一致呢。"
10038005-23 = "智惠智惠！你看那個屋頂！看起來好神奇！"
10038005-29 = "（那些學生就是最近傳得沸沸揚揚的……！）"
10038005-30 = "（一直以來都只有耳聞，沒想到居然真的來了……！）"
10038005-33 = "（代表山海經保守派的京劇部部長輝夜，在不安之中悄悄與申谷誡取得了聯繫）"
10038005-37 = "……！？你，你在說什麼，申谷誡！#n我和京劇部從來就不可能有那種權限……！"
10038005-39 = "這話還真有趣啊，京劇部長。#n京劇部不僅背負著山海經的傳統之名，更是這些年來最維護傳統的社團。#n如果連你們都沒資格的話，究竟誰有這個資格呢？"
10038005-40 = "……！"
10038005-41 = "不過話又說回來，這些也不過是我這個被山海經驅逐之人的一己之見罷了。"
10038005-42 = "假如真的演出了新京劇……結果卻失敗的話……"
10038005-43 = "真有趣。成就忠義之路上，何來的成與敗呢？"
10038005-46 = "（在申谷誡的唆使下，輝夜上演了一齣新的京劇，藉此向身為門主的妃姬上疏）"
10038005-50 = "──我以山海經及其傳統之名，論劾現在的玄龍門門主龍華妃姬！"
10038005-52 = "（然而在赤冬事務局的活躍下，京劇部引發的騷動遭到鎮壓）"
10038005-55 = "咱先把話說清楚！所有的學生都有發動政變的權利！"
10038005-56 = "但是所有的學生會長……也都有鎮壓政變，引領學園繼續前進的權力！"
10038005-59 = "（最終交流會順利畫下了句點）"
10038005-62 = "呵呵呵，看來您似乎很滿意這次的交流會呢，潔莉諾書記長。"
10038005-63 = "唔呣，這次來山海經……簡直就是場大冒險！"
10038005-65 = "因京劇部一事讓汝遭遇險境，對此妾身實在感到愧疚。"
10038005-66 = "像咱這麼偉大的會長，才不會拘泥於那種小事！"
10038005-67 = "是的，門主大人。#n我們潔莉諾會長的心胸就是如此寬厚！"
10038005-69 = "（然而，名為申谷誡的火種依舊存在）"
10038005-72 = "我已經等了太久太久。#n即便經歷被關押進矯正局這樣的恥辱……"
10038005-73 = "我仍舊努力壯大自己的勢力，默默等待機會到來。#n如今時機終於成熟……"
10038005-74 = "這次一定要奪回屬於我的東西，不會讓任何人有機可乘。"
10038005-76 = "（隱藏的不安，正籠罩著山海經……）"
10038005-84 = "時間差不多了吧……"
10038005-88 = "啊，這邊這邊！"
10038005-93 = "怎麼這麼早就到了……"
10038005-94 = "沒什麼。#n只是碰巧比較早下課，又沒其他事要做而已。"
10038005-95 = "這樣啊……閒閒沒事真讓人羨慕。#n哪像我們……"
10038005-96 = "……不，沒什麼。"
10038005-100 = "……"
10038005-101 = "最近玄龍門還好嗎？"
10038005-105 = "呃……嗯……還，還好吧。"
10038005-106 = "要說謊也打一下草稿吧……"
10038005-107 = "唉……也對。#n最近的情況……我也不知道算不算好。"
10038005-108 = "記得是叫赤冬對吧。#n自從他們來過以後，一切都變得亂糟糟的。"
10038005-109 = "……要說亂的話，也不只僅限於玄龍門吧。"
10038005-110 = "嗯……也許吧。"
10038005-111 = "你有聽說嗎？#n雖然這只是學生之間的傳聞……"
10038005-112 = "……門主大人他是不是打算跟玄武商會一樣，打開山海經的大門啊？"
10038005-116 = "你在胡說什麼！#n……周圍沒人吧？這種話可不能隨便亂說啊。"
10038005-117 = "你剛才不也說過了嗎？#n前陣子甚至還有赤冬的學生，在山海經內部隨意走動咧。"
10038005-118 = "這個嘛……確實是這樣沒錯……"
10038005-119 = "明明月影祭都快到了，真讓人擔心……"
10038005-120 = "月影祭一旦開始，玄武商會那邊又會湧入更多外部的學生……"
10038005-122 = "到時候會怎樣我也不知道。#n也只能做好自己份內的事了吧……"
10038005-123 = "身為玄龍門成員的你都這麼說了，那我怎麼辦。"
10038005-124 = "有什麼辦法！我只是個一年級的無名小卒而已！"
10038005-128 = "唉……也是啦。#n反正我們想再多也沒什麼用，不如去桃源鄉吧。"
10038005-143 = "月影祭就快到了！"
10038005-144 = "[s]「那是什麼！？」"
10038005-148 = "唔嗯……對哦，差點忘了老師是山海經外部的人。"
10038005-149 = "不知道是不是已經漸漸習慣的關係……偶爾就會忘記這件事。#n之後得多留意一點才行。"
10038005-150 = "[s]「能讓美奈覺得親近倒是挺令人高興的……」"
10038005-154 = "月影祭是每年都會在這個時期舉辦的山海經傳統慶典。"
10038005-157 = "雖然主要的活動會在玄武商會街舉辦，但基本上整個山海經都會參與這場慶典。"
10038005-158 = "屆時將會有許多外部學生，來到玄武商會共襄盛舉……"
10038005-159 = "不過玄武商會街以外的地方依然不會向外部學生開放。#n這是我們的原則。"
10038005-160 = "[s]「這樣舉辦慶典不會很麻煩嗎？」"
10038005-163 = "即便如此，該遵守的東西還是必須遵守！"
10038005-164 = "月影祭本來就是山海經內部祈求豐收、分享食物的節日！"
10038005-165 = "……只是從某個時候開始，漸漸變得會以玄武商會為中心，將部分區域對外開放了。"
10038005-166 = "玄武商會那些傢伙，只要有錢賺就會隨意把事情搞大。"
10038005-167 = "也不想想最後收拾殘局的是誰！還不是得靠我們玄龍門出馬！"
10038005-168 = "[s]「好好好，你先冷靜……」"
10038005-169 = "總之，如今的月影祭……就是如此。#n白天互相分享月餅……"
10038005-170 = "晚上則有京劇、舞龍等等表演，並在觀看煙火的同時祈求未來一年的好運。"
10038005-171 = "所以在這個時期前後，我們玄龍門對玄武商會的規範會稍微放緩。"
10038005-172 = "巡邏與夜間活動的強度，以及對外部學生的警戒也會下降……"
10038005-173 = "……那個，老師應該還記得吧？不久前與赤冬的那場交流會。"
10038005-174 = "從那之後，對外部學生的不安感便有所增加……#n這種時候照常舉辦月影祭是否真的合適，坦白說我實在有點擔心。"
10038005-175 = "[s]「唔嗯……美奈怎麼看呢？」"
10038005-179 = "我嗎？我一向遵從門主大人的命令，這一點從未改變。"
10038005-180 = "呵。雖然是從自己口中說出來的，但我總是會被自己的忠誠心給感動呢。"
10038005-181 = "不過話雖如此……身為執行部長，我也必須聽取玄龍門成員的意見。"
10038005-182 = "你問其他成員是怎麼想的？#n這個嘛……"
10038005-185 = "整體而言，內部對於舉辦月影祭一事沒有特別的異議。#n畢竟月影祭是山海經自豪的傳統。"
10038005-186 = "但與此同時，成員們也認為應該嚴格執行對外部學生和玄武商會的規範……"
10038005-189 = "畢竟正如剛才所說……現在對於外部學生的不安感正在增加。"
10038005-190 = "何況當初開放讓外部學生參加月影祭，本來就是玄武商會擅作主張決定的。"
10038005-191 = "再這樣下去，可能會給人一種玄龍門被玄武商會牽著鼻子走的印象……"
10038005-192 = "以上就是來自玄龍門內部的意見。"
10038005-193 = "是否該將這些意見傳達給門主大人，如果要的話又該怎麼做……"
10038005-194 = "[s]「所以你才來尋求幫助啊。」"
10038005-195 = "……抱歉，老師。#n要傳達這些難以啟齒的話，對我來說實在不太容易……"
10038005-196 = "這對大人來說也不容易？#n原來如此啊……感覺稍微安心了一點。"
10038005-197 = "不過根本的問題，似乎還是沒有解決……"
10038005-202 = "原來如此。#n如今正流傳這樣的話題啊。"
10038005-206 = "！？"
10038005-207 = "[s]「這個聲音是！？！？」"
10038005-212 = "好久不見……不，應該說不久又見才是，老師。#n重逢之日竟來的如此之快，可真是應了那句「去者必返」呢。呵呵。"
10038005-213 = "門，門門門門門門，門主大人！？"
10038005-214 = "無需如此訝異。#n玄龍門內部的此類意見，妾身也瞭然於心。"
10038005-215 = "我，我……！那個……！"
10038005-216 = "好了，汝已經做得很好了。#n然而身為門主，妾身有必要對月影祭發表意見。"
10038005-217 = "是，是！"
10038005-218 = "妾身理解學生們的不安，也明白玄龍門成員期望維持巡邏強度的意圖。"
10038005-219 = "不過正因如此，月影祭才更應該照常舉行。"
10038005-221 = "您的意思是……？"
10038005-223 = "「樹欲靜而風不止，人欲安而事不休」。"
10038005-228 = "然吾等山海經依舊會屹立不搖──或者說應當屹立不搖才是。#n對吧，美奈？"
10038005-229 = "……！"
10038005-230 = "沒錯！您說得對！#n就是這種時候才更應該……！"
10038005-231 = "很好，一點就通。#n那麼汝也明白該怎麼做了吧？"
10038005-232 = "是，門主大人！請包在我身上！"
10038005-239 = "呼……若能提前得知老師將要來訪，妾身就能為汝準備更特別的重逢方式了。"
10038005-240 = "[s]「能再見到你就很讓人高興了哦，妃姬。」"
10038005-241 = "呵呵，汝還是一如既往啊。#n某種意義上，真令人感到安心。"
10038005-242 = "倘若山海經也能像汝一般泰然，妾身就能放心說出「敬請期待月影祭」了……"
10038005-243 = "無須妾身開口，汝亦相當期待？"
10038005-244 = "真是直到最後一刻都不能掉以輕心啊，老師。#n好吧，既然汝如此期待，玄龍門自然也會盡力滿足。"
10038005-245 = "雖說山海經引以為傲的京劇……如今因為各種原因而難以演出。"
10038005-246 = "不過如燈籠遊行、煙火、演奏會等等活動依舊能照常舉行。"
10038005-250 = "那麼走吧，老師。"
10038005-251 = "[s]「咦？要去哪裡？」"
10038005-252 = "那自然是準備與支援月影祭的場所。"
10038005-253 = "呵呵，不必過於擔心。#n老師只要待在妾身身邊就夠了。"
10038005-254 = "水果與月餅，妾身都會準備充足哦？"
10038005-255 = "[s]「啊啊，滿滿的糖和脂肪……消化能力備受挑戰！」"
10038005-256 = "哦？汝擔心的是這個嗎？#n是身為大人不得不考慮的事？"
10038005-257 = "好吧，妾身會為汝特別訂購味道濃郁、配料豐富的點心。"
10038005-262 = "不必客氣。#n準備多到讓人吃不下的食物，可是吾等山海經的待客之道哦？"

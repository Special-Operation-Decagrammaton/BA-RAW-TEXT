[translation]
10038005-1 = "Prologue;Let's Get Ready for the Festival!"
10038005-4 = "Previously, on Blue Archive..."
10038005-8 = "(Shanhaijing Academy and Red Winter Federal Academy prepared to hold an exchange meeting.)"
10038005-9 = "Shanhaijing will have an exchange meeting with Red Winter in the near future."
10038005-12 = "Anyway, Genryumon itself is, to be frank...uncomfortable with this exchange meeting."
10038005-13 = "The lack of any such experience is the largest factor. Others may want to remain more aloof about the entire exchange meeting."
10038005-16 = "(Despite their worries, the exchange meeting commenced, and students from the Red Winter Federal Academy Secretariat arrived at Shanhaijing safely.)"
10038005-19 = "Whoa... So this is...!"
10038005-21 = "This is Shanhaijing!"
10038005-22 = "It's just like my research said it would be!"
10038005-23 = "Tomoe, Tomoe! Look over there! The roof! It's so interesting!"
10038005-29 = "(Those must be the students from the rumors!)"
10038005-30 = "(I've heard all about them, but I never thought I would see them in person...!)"
10038005-33 = "(Kaguya, the president of the traditionalist Peking Opera Club, held a long, heated exchange with Shintani Kai.)"
10038005-37 = "...?! What are you saying, Shintani Kai?! There's no way the Peking Opera Club and I would have that kind of authority!"
10038005-39 = "I find it amusing that you would say that, Peking Opera Club President. The Peking Opera Club has honored Shanhaijing's traditions most seriously up until now. If not you, who else could possibly have it?"
10038005-40 = "...!"
10038005-41 = "Granted, this could be nothing more than the ramblings of a Shanhaijing outcast."
10038005-42 = "If we end up doing a new Peking opera...and it fails..."
10038005-43 = "Funny, is discussing success and failure a mark of loyalty?"
10038005-46 = "(At Shintani Kai's order, Kaguya performed a new Peking opera and presented a petition to President Kisaki.)"
10038005-50 = "In the name of Shanhaijing and its traditions, I denounce Ryuuge Kisaki, president of the Genryumon!"
10038005-52 = "(However, thanks to the efforts of the Red Winter Office, the Peking Opera Club's objection was effectively quelled.)"
10038005-55 = "Let me make myself clear! All students have the right to stage a coup!"
10038005-56 = "And a student council president has the right to suppress that coup and continue leading the school!"
10038005-59 = "(The exchange meeting concluded successfully.)"
10038005-62 = "Heeheehee! It seems you really enjoyed this exchange meeting, Great Leader Cherino."
10038005-63 = "Hmm, Shanhaijing has been...a great adventure for us!"
10038005-65 = "I hope you can forgive that trouble with the Peking Opera Club."
10038005-66 = "I am the Great Leader of Red Winter! Such insignificant things could never threaten my power!"
10038005-67 = "That's right! President Cherino is a very magnanimous person!"
10038005-69 = "(But that one ember, the one called Shintani Kai, is still burning.)"
10038005-72 = "I've worked a long time for this. I even had to suffer the humiliation of being imprisoned by the Corrections Bureau."
10038005-73 = "But still, I gathered my strength and waited for the right time. And that time is now."
10038005-74 = "I will take back what is mine, and no one will stand in my way."
10038005-76 = "(An unseen anxiety surrounds Shanhaijing...)"
10038005-84 = "It should be almost time..."
10038005-88 = "H-Here, over here!"
10038005-93 = "Why are you here so early...?"
10038005-94 = "Well, class got out early, and I didn't have anything in particular to do..."
10038005-95 = "Is that right? I envy you. We..."
10038005-96 = "...No, never mind, it's nothing."
10038005-100 = "......"
10038005-101 = "How is Genryumon these days?"
10038005-105 = "Um... Well... It's fine..."
10038005-106 = "You can lie better than that."
10038005-107 = "Sigh... Yeah, I don't know. I can't figure out what's what these days."
10038005-108 = "Those Red Winter girls. Ever since they came and left, everything's been out of whack."
10038005-109 = "...Everything, not just Genryumon."
10038005-110 = "Yeah...I think I get it."
10038005-111 = "Hey, so there's this rumor going around..."
10038005-112 = "...Is the president really going to side with the Black Tortoise Promenade, and open up Shanhaijing's gates?"
10038005-116 = "What are you talking about?! Don't say things like that. Someone could be listening! "
10038005-117 = "But even you said the Red Winter students had free run of the place recently."
10038005-118 = "Well... That's true, but..."
10038005-119 = "With the Moonlight Festival coming up, this is going to be a problem..."
10038005-120 = "...Once the Festival starts, we'll see even more outsider students on Black Tortoise Promenade Street..."
10038005-122 = "I really don't know. I'm just going to focus on doing my job..."
10038005-123 = "You work for Genryumon! You can't say that!"
10038005-124 = "What else can I do? I'm just a lowly first-year!"
10038005-128 = "Sigh... Yeah, what do we know? Let's just go to the Peach Blossom Spring."
10038005-143 = "Ah, I can't wait for the Moonlight Festival!"
10038005-144 = "[s] \"What's that?\""
10038005-148 = "Hmm? Oh, that's right, Sensei, you're from outside of Shanhaijing."
10038005-149 = "I've become so used to you that I...sometimes forget. I should be more careful about that."
10038005-150 = "[s] \"I'm glad you feel that way, Mina.\""
10038005-154 = "The Moonlight Festival is a traditional annual festival here in Shanhaijing."
10038005-157 = "Its main events take place at the Black Tortoise Promenade Street, but the full festival is spread out all over Shanhaijing."
10038005-158 = "The Promenade is open to outsiders, hordes of them, but..."
10038005-159 = "...all the other streets are closed to outside students. That's the rule."
10038005-160 = "[s] \"Sounds like a lot of trouble to go through.\""
10038005-163 = "Even so, there are some rules that can never be broken!"
10038005-164 = "The Moonlight Festival began as an event just for us, to share meals and pray for one another's prosperity."
10038005-165 = "...Now outsiders feel free to invite themselves, thanks to the Black Tortoise Promenade."
10038005-166 = "Those Black Tortoise profiteers will exploit anything for money, anything at all."
10038005-167 = "And who do they expect to clean up after them?! Us, Genryumon, that's who!"
10038005-168 = "[s] \"Hey now, take it easy...\""
10038005-169 = "Regardless, this year's Moonlight Festival involves sharing moon cakes during the day. In the shape of actual moons, of course."
10038005-170 = "At night, there's Peking opera to watch, there's a dragon dance, and everyone prays for good fortune while they watch the fireworks."
10038005-171 = "But honestly, Genryumon has been loosening up the rules lately..."
10038005-172 = "Fewer night patrols, less vigilance toward the outsiders..."
10038005-173 = "...You know about some of that, Sensei. The exchange meeting with Red Winter, that whole business. "
10038005-174 = "A lot of people are getting nervous about too many outsiders. I don't know if the Festival is even a good idea right now."
10038005-175 = "[s] \"Hmm... What about you, Mina? What do you plan to do?\""
10038005-179 = "Me? I always follow the president's orders. That'll never change."
10038005-180 = "Not to pat myself on the back, but I am quite stalwart, you know."
10038005-181 = "...That said, as the executive officer, I'm obligated to consider the other Genryumon members' opinions..."
10038005-182 = "What do they think? Well..."
10038005-185 = "For now, no one says we should outright cancel the Festival. It's a proud tradition, after all."
10038005-186 = "But most think we ought to tighten the rules back up, when it comes to outside students and the Black Tortoise Promenade."
10038005-189 = "That anxiety about outsiders is very real here."
10038005-190 = "And it was the Promenade that first let them in. A unilateral decision, I might add."
10038005-191 = "We've been letting them have their way, and we're starting to give off the impression that they're dragging us along."
10038005-192 = "At least, that's how the other Genryumon members seem to feel. "
10038005-193 = "The question for myself is, \"Should I pass that along to the president, and if so, how should I phrase it?\""
10038005-194 = "[s] \"So that's what you needed help with.\""
10038005-195 = "...I'm sorry, Sensei. I have trouble delivering this kind of message."
10038005-196 = "Oh, adults have trouble with that too? ...That makes me feel a little better."
10038005-197 = "But of course, there's still the fundamental problem..."
10038005-202 = "I see. So that's what they say, then."
10038005-206 = "*gasp*"
10038005-207 = "[s] \"I know that voice.\""
10038005-212 = "It's been a while... Well, perhaps not. It's good to see you again so soon."
10038005-213 = "M-Madam President?!"
10038005-214 = "Not to worry. I'm well aware such opinions exist."
10038005-215 = "I-I...! I mean..."
10038005-216 = "And you're doing good work. But, as president, I too have my own opinions on the subject."
10038005-217 = "Of course, ma'am."
10038005-218 = "I understand the students' anxiety. I also understand Genryumon members' concerns, and the desire to steel the patrols."
10038005-219 = "And with all that said, I believe the Moonlight Festival must be held just as it stands."
10038005-221 = "You mean...?!"
10038005-223 = "So long as the wind blows, there will always be noise in our ears."
10038005-228 = "Despite that, Shanhaijing must be strong, and it shall be. Don't you agree, Mina?"
10038005-229 = "...!"
10038005-230 = "I do, yes! And because of that, it's times like this we need to—"
10038005-231 = "I'm glad you understand me. Then you know what must be done."
10038005-232 = "Yes, Madam President! Leave it to me!"
10038005-239 = "*sigh* Had I known you would be visiting, Sensei, I would have prepared a different type of reunion."
10038005-240 = "[s] \"It's still good to see you again, Kisaki.\""
10038005-241 = "Hehe, the same as ever. Your steadfast nature is...quite reassuring."
10038005-242 = "If only Shanhaijing could follow your example. Then I could say, \"Look forward to the Festival!\" without reservation."
10038005-243 = "Oh, you're already excited for it regardless?"
10038005-244 = "Ah, but you expect the best of us always, don't you? Very well then, Sensei, Genryumon has no choice but to meet those expectations."
10038005-245 = "The Peking opera performance may face some...logistical challenges this year, but..."
10038005-246 = "...nothing should stand in the way of the lantern display, or the fireworks, or any of the other performances."
10038005-250 = "So, shall we go, Sensei?"
10038005-251 = "[s] \"Huh? Go where?\""
10038005-252 = "To assist with the preparations for the Moonlight Festival, of course!"
10038005-253 = "Fufu, don't worry, Sensei. You need only be by my side."
10038005-254 = "We will prepare enough fruits and moon cakes for all."
10038005-255 = "[s] \"Oh, all that sugar, all those calories...!\" "
10038005-256 = "Is that what concerns you? But then again, you are an adult."
10038005-257 = "We'll order special snacks to your liking, then. Richly flavored and generously topped."
10038005-262 = "Please accept. Our hospitality is most generous, as anyone who's shared a feast with us can attest."

[translation]
10038005-1 = "บทเริ่มต้น;มาเตรียมงานเทศกาลกันเถอะ!"
10038005-4 = "<ความเดิมที่ผ่านมา>"
10038005-8 = "(มีการจัดงานแลกเปลี่ยนระหว่างโรงเรียนมัธยมซานไห่จิงกับสถาบันสหภาพเรดวินเทอร์)"
10038005-9 = "ทางซานไห่จิงจะจัดงานแลกเปลี่ยนกับเรดวินเทอร์ในเร็วๆ นี้"
10038005-12 = "อย่างไรก็ตาม ในฐานะของมังกรดำ... ขอบอกตามตรงว่าเรารู้สึกกดดันกับงานแลกเปลี่ยนในครั้งนี้"
10038005-13 = "สาเหตุใหญ่ที่สุดคงเป็นเพราะเราขาดประสบการณ์ ส่วนเรื่องการทำเป็นยอมรับทั้งๆ ที่รู้สึกไม่เต็มใจ ก็เป็นเรื่องที่เราไม่อาจเมินเฉยได้"
10038005-16 = "(แต่งานแลกเปลี่ยนก็ถูกจัดขึ้นท่ามกลางความกังวล และนักเรียนจากสำนักเลขาธิการของสถาบัน สหภาพเรดวินเทอร์ก็เดินทางมาถึงซานไห่จิงอย่างปลอดภัย)"
10038005-19 = "โอ้ว... ที่นี่คือ...!"
10038005-21 = "ซานไห่จิงสินะ!"
10038005-22 = "เป็นไปตามที่สำรวจข้อมูลมาเลยนะคะ"
10038005-23 = "โทโมเอะ โทโมเอะ! ดูโน่นสิ! หลังคาตรงโน้นน่ะ! น่าเหลือเชื่อดีจังเลย!"
10038005-29 = "(นั่นคือพวกนักเรียนตามข่าวลือเหรอ...!)"
10038005-30 = "(ฉันเองก็ได้แต่ฟังข่าวลือ คิดไม่ถึงเลยนะว่าจะมากันจริงๆ...!)"
10038005-33 = "(ท่ามกลางความวิตกกังวล คางุยะ หัวหน้าชมรมการแสดงงิ้วผู้เป็นกระบอกเสียงแห่งความอนุรักษ์นิยม#nของซานไห่จิงก็ได้แอบไปติดต่อกับชินทานิ ไค)"
10038005-37 = "พะ... พูดอะไรออกมาน่ะ...?! ชินทานิ ไค! ฉันกับชมรมการแสดงงิ้วไม่มีสิทธิ์ทำอะไรแบบนั้นตั้งแต่แรก#nอยู่แล้ว...!"
10038005-39 = "ใช้คำพูดได้น่าสนใจดีนะ หัวหน้าชมรมการแสดงงิ้ว ถ้าชมรมการแสดงงิ้วที่เป็นผู้ปกป้องประเพณีของ#nซานไห่จิงอย่างจริงจังมากที่สุดไม่มีสิทธิ์นั้นละก็ แล้วใครกันล่ะที่มีสิทธิ์...!"
10038005-40 = "...!"
10038005-41 = "ก็นะ ต่อให้ฉันจะพูดเรื่องนี้ไป สุดท้ายมันก็อาจจะเป็นแค่คำพูดเหลวไหลของคนที่ถูกไล่ออกจาก#nซานไห่จิงก็ได้"
10038005-42 = "ถ้าพวกฉันทำการแสดงงิ้วชุดใหม่... แล้วถ้ามันไม่สำเร็จขึ้นมา..."
10038005-43 = "ตลกดีนะ ความสำเร็จและความล้มเหลวเกี่ยวข้องกับความภักดีด้วยเหรอ?"
10038005-46 = "(คางุยะถูกชินทานิ ไคบงการจนจัดการแสดงงิ้วชุดใหม่ขึ้นมา และยื่นอุทธรณ์ต่อประมุขคิซากิ)"
10038005-50 = "ในนามของซานไห่จิงและประเพณีของซานไห่จิง เราขอประณามประมุขคนปัจจุบันของมังกรดำ ริวเกะ คิซากิ!"
10038005-52 = "(แต่ด้วยไหวพริบของสำนักเลขาธิการเรดวินเทอร์ ความวุ่นวายที่ชมรมการแสดงงิ้วก่อขึ้นจึงสงบลงได้)"
10038005-55 = "เราขอพูดอย่างตรงไปตรงมาเลยนะ! แน่นอนว่านักเรียนทุกคนมีสิทธิ์ก่อการปฏิวัติได้!"
10038005-56 = "และประธานนักเรียนทุกคน... ก็มีสิทธิ์ปราบการปฏิวัตินั้นและนำโรงเรียนได้ต่อ!"
10038005-59 = "(งานแลกเปลี่ยนจบลงได้อย่างประสบความสำเร็จ)"
10038005-62 = "ฮุฮุฮุ ดูเหมือนจะถูกใจงานแลกเปลี่ยนครั้งนี้มากเลยนะคะ ท่านเลขาธิการเชริโน่"
10038005-63 = "อืม... ซานไห่จิง... คือการผจญภัยที่ยิ่งใหญ่เลยละ!"
10038005-65 = "เรารู้สึกละอายใจที่ทำให้ทุกคนลำบากกับเรื่องชมรมการแสดงงิ้วเหลือเกิน"
10038005-66 = "เลขาธิการจากเรดวินเทอร์อย่างเราไม่ติดค้างกับเรื่องขี้ปะติ๋วแบบนั้นหรอก!"
10038005-67 = "ใช่แล้วค่ะ ท่านประมุข ก็ท่านประธานเชริโน่ของเราเป็นคนใจกว้างนี่คะ!"
10038005-69 = "(ถึงกระนั้น เชื้อไฟของชินทานิ ไคก็ยังคุกรุ่นอยู่)"
10038005-72 = "นี่ก็นานมากแล้ว ที่ผ่านมาฉันต้องถูกเหยียดหยามด้วยการให้ไปอยู่ห้องคุมขัง"
10038005-73 = "แต่ฉันก็รอเวลานี้ให้มาถึง และระหว่างนั้นก็รวบรวมกำลังได้แล้ว ในที่สุดก็ถึงเวลาแล้วละ"
10038005-74 = "ฉันจะมาทวงของของฉันคืน และจะไม่ยอมให้ใครขวางทางทั้งนั้น"
10038005-76 = "(ความไม่มั่นคงเข้าปกคลุมซานไห่จิง...)"
10038005-84 = "ฉันว่าน่าจะถึงเวลาแล้วละ..."
10038005-88 = "มาถึงแล้ว ที่นี่ละ!"
10038005-93 = "ทำไมมาถึงเร็วขนาดนี้ล่ะ..."
10038005-94 = "เอ่อ... ก็... พอดีฉันเรียนเสร็จเร็วน่ะ แล้วฉันก็ไม่มีอะไรให้ทำเป็นพิเศษด้วย"
10038005-95 = "งั้นเหรอ? น่าอิจฉาจังเลยนะที่ไม่มีอะไรให้ทำ เพราะพวกเราน่ะ..."
10038005-96 = "ไม่สิ... ไม่มีอะไรหรอก"
10038005-100 = "..."
10038005-101 = "ช่วงนี้มังกรดำเป็นยังไงบ้างล่ะ?"
10038005-105 = "อ่า... อืม... กะ... ก็ปกติดี ไม่มีอะไรหรอก"
10038005-106 = "ถ้าจะโกหก ก็โกหกให้มันเนียนๆ หน่อยเถอะ..."
10038005-107 = "เฮ้อ... ก็ใช่ ฉันเองก็ไม่รู้ว่าหมู่นี้เกิดอะไรขึ้น"
10038005-108 = "พวกเรดวินเทอร์นั่นหรือเปล่านะ หลังจากพวกนั้นกลับไป ทุกอย่างก็วุ่นวายไปหมดเลย"
10038005-109 = "ที่วุ่นวายไม่น่าจะใช่กับแค่มังกรดำอย่างเดียวหรอกนะ..."
10038005-110 = "อืม... ฉันพอจะเดาเรื่องนั้นได้แล้วละ"
10038005-111 = "เรื่องนี้เหมือนจะเป็นข่าวลือที่นักเรียนพูดกันน่ะ..."
10038005-112 = "สุดท้ายท่านประมุขก็เข้าข้างย่านการค้าเทพเต่าดำ แล้วจะเปิดประตูย่านการค้าเทพเต่าดำสู่ภายนอก#nงั้นเหรอ...?"
10038005-116 = "พูดอะไรของเธอ! แถวนี้ไม่มีคนอื่นแล้วใช่มั้ย...? ห้ามพูดอะไรแบบนั้นตามอำเภอใจนะ"
10038005-117 = "แต่ก็อย่างที่เธอพูดเมื่อกี้ ไม่นานมานี้พวกนักเรียนจากเรดวินเทอร์ก็เที่ยวไปในซานไห่จิงได้ตามใจเลย#nไม่ใช่เหรอ? "
10038005-118 = "อืม... มันก็ใช่อยู่หรอก..."
10038005-119 = "นี่ก็ใกล้จะถึงเทศกาลเงาจันทร์แล้ว น่ากังวลจัง..."
10038005-120 = "ถ้าจัดเทศกาลเงาจันทร์ ก็จะมีนักเรียนโรงเรียนอื่นมาเที่ยวย่านการค้าเทพเต่าดำมากกว่าเดิมอีก..."
10038005-122 = "เฮ้อ... ไม่รู้ด้วยแล้ว ฉันคงแค่ต้องทำหน้าที่ของตัวเองละนะ..."
10038005-123 = "คนที่ทำงานให้มังกรดำพูดอะไรแบบนั้นออกมาได้ยังไง"
10038005-124 = "แล้วคิดว่าฉันจะทำอะไรได้ล่ะ! ฉันเป็นแค่เด็กปี 1 เองนะ!"
10038005-128 = "เฮ้อ... ก็ใช่ พวกเราจะไปรู้อะไรได้ ไปร้านนิทานดอกท้อกันเถอะ"
10038005-143 = "เรื่องเทศกาลเงาจันทร์น่ะ!"
10038005-144 = "[s] \"มันคืออะไรเหรอ?!\""
10038005-148 = "อืม... จริงสินะ คุณครูเป็นคนนอกของซานไห่จิงนี่นา"
10038005-149 = "คงเป็นเพราะฉันรู้สึกคุ้นเคยมากไปน่ะ... บางครั้งฉันก็เลยลืมความจริงข้อนั้นไป คงต้องระวังแล้วสินะ"
10038005-150 = "[s] \"น่าดีใจนะที่มินะคิดกับครูอย่างใกล้ชิดสนิทสนมแบบนี้... \""
10038005-154 = "เทศกาลเงาจันทร์จะจัดขึ้นปีละครั้ง มันเป็นเทศกาลดั้งเดิมของซานไห่จิงที่จะจัดขึ้นในช่วงนี้ของปีน่ะ"
10038005-157 = "ถึงศูนย์กลางของเทศกาลเงาจันทร์จะอยู่ที่ถนนสายย่านการค้าเทพเต่าดำ แต่ทั้งเทศกาลก็จัดขึ้นทั่ว#nซานไห่จิง"
10038005-158 = "ย่านการค้าเทพเต่าดำดึงดูดนักเรียนจากภายนอกให้เข้ามาเที่ยวเทศกาลเงาจันทร์ได้มากมายเลยละ..."
10038005-159 = "แต่นอกจากถนนสายย่านการค้าเทพเต่าดำแล้ว ก็ไม่มีที่อื่นในซานไห่จริงที่เปิดให้นักเรียนภายนอกเข้า#nมาชม นั่นเป็นข้อบังคับน่ะ"
10038005-160 = "[s] \"แล้วจะไม่ยุ่งยากต่องานเทศกาลเหรอ?\""
10038005-163 = "ถึงจะเป็นอย่างนั้น แต่กฎก็ต้องเป็นกฎ!"
10038005-164 = "นั่นเพราะเดิมทีแล้วเทศกาลเงาจันทร์เป็นช่วงที่มีการอธิษฐานขอความอุดมสมบูรณ์และแบ่งปันอาหาร#nกันภายในซานไห่จิงยังไงล่ะ!"
10038005-165 = "แต่ว่าตั้งแต่เมื่อไรก็ไม่รู้... ที่ใช้ย่านการค้าเทพเต่าดำเป็นจุดเริ่มต้นในการเปิดเทศกาลส่วนหนึ่งให้กับ#nภายนอกด้วย"
10038005-166 = "พวกย่านการค้าเทพเต่าดำน่ะ ถ้าเป็นการหาเงินแล้ว ก็จะทำเรื่องใหญ่โตตามอำเภอใจตลอดละ"
10038005-167 = "แล้วใครล่ะที่ต้องมาตามเก็บกวาดทีหลัง! สุดท้ายก็ต้องเป็นมังกรดำอย่างพวกฉันที่ต้องออกโรงอยู่ดี"
10038005-168 = "[s] \"เอาละๆ ครูว่าใจเย็นก่อนนะ...\""
10038005-169 = "เอาเถอะ สรุปว่าเทศกาลเงาจันทร์ในปัจจุบันน่ะ... ในตอนกลางวันเราจะแบ่งปันขนมเทศกาลเงาจันทร์#nที่เป็นรูปพระจันทร์กัน"
10038005-170 = "ส่วนในตอนกลางคืนจะมีการแสดงต่างๆ เช่น การแสดงงิ้วหรือเชิดมังกร นอกจากนี้ผู้คนที่มาก็จะดู#nดอกไม้ไฟแล้วอธิษฐานขอให้ตัวเองโชคดีด้วย"
10038005-171 = "ดังนั้นในช่วงก่อนและหลังงานเทศกาลนี้ ทางมังกรดำจะไม่ค่อยเข้มงวดเรื่องการปฏิบัติตามกฎระเบียบ#nของย่านการค้าเทพเต่าดำมากนัก"
10038005-172 = "เรื่องการลาดตระเวนหรือการทำกิจกรรมยามค่ำคืนก็จะลดระดับความเข้มงวดลง แล้วก็จะหยุดการเฝ้า#nระวังนักเรียนจากภายนอกด้วย..."
10038005-173 = "คือว่า... คุณครูเองก็น่าจะรู้เรื่องงานแลกเปลี่ยนกับเรดวินเทอร์ที่เคยจัดไปก่อนหน้านี้"
10038005-174 = "ตั้งแต่งานครั้งนั้น หลายคนก็กังวลเกี่ยวกับนักเรียนจากภายนอกมากขึ้น... และตั้งคำถามกันว่าจะจัด#nเทศกาลเงาจันทร์ทั้งแบบนี้ได้หรือเปล่า"
10038005-175 = "[s] \"ฮืม... แล้วมินะล่ะ คิดว่ายังไง?\""
10038005-179 = "ฉันเหรอ? ฉันทำตามคำสั่งของท่านประมุขตลอดอยู่แล้ว เรื่องนั้นไม่มีวันเปลี่ยนแปลง"
10038005-180 = "ฮุฮุ ถึงฉันจะเป็นคนพูดเอง แต่ฉันก็ประทับใจในความซื่อสัตย์และถูกต้องของตัวเองเสมอเลยละ"
10038005-181 = "แต่ในฐานะหัวหน้าคณะกรรมการ... ฉันก็ควรรับฟังความคิดเห็นของสมาชิกมังกรดำด้วย..."
10038005-182 = "สมาชิกของเราคิดอะไรกันอยู่น่ะเหรอ? เรื่องนั้นน่ะ..."
10038005-185 = "ก่อนอื่นเลยนะ สมาชิกมังกรดำไม่มีความคิดเห็นเกี่ยวกับการจัดเทศกาลเงาจันทร์เป็นพิเศษหรอก เพราะเทศกาลเงาจันทร์เป็นประเพณีดั้งเดิมที่น่าภาคภูมิใจของซานไห่จิงอยู่แล้ว"
10038005-186 = "แต่กับครั้งนี้ สมาชิกมังกรดำคิดว่าเราต้องเคร่งครัดเรื่องคนนอกกับเรื่องการปฏิบัติตามกฎระเบียบ#nของย่านการค้าเทพเต่าดำนี่น่ะสิ..."
10038005-189 = "อย่างที่บอกไปก่อนหน้านี้... ฉันว่านี่เป็นเพราะความวิตกกังวลเกี่ยวกับการเข้ามาของนักเรียนภายนอก#nที่มากขึ้นเรื่อยๆ น่ะ"
10038005-190 = "เพราะการให้คนนอกมาเข้าร่วมงานเทศกาลเงาจันทร์เป็นเรื่องที่พวกย่านการค้าเทพเต่าดำคิดขึ้นมา#nตามอำเภอใจ"
10038005-191 = "ถ้าปล่อยให้เป็นอย่างนี้ไปเรื่อยๆ คนอื่นอาจจะมองว่ามังกรดำถูกลากเข้าไปเกี่ยวข้องกับการกระทำ#nของย่านการค้าเทพเต่าดำก็ได้..."
10038005-192 = "เอาเป็นว่าภายในมังกรดำมีความคิดเห็นกันแบบนี้ละ "
10038005-193 = "แล้วฉันก็ไม่รู้ว่าควรเอาความคิดเห็นแบบนี้ไปแจ้งท่านประมุขหรือเปล่า และถ้าแจ้งไปแล้ว พวกเราจะต้องทำยังไงต่อ..."
10038005-194 = "[s] \"ก็เลยอยากได้ความช่วยเหลือสินะ\""
10038005-195 = "ขอโทษนะครู... ให้บอกในเรื่องที่ยากจะเอ่ยได้มันเป็นเรื่องยากสำหรับฉันน่ะ..."
10038005-196 = "เรื่องแบบนั้น สำหรับผู้ใหญ่เองก็เป็นเรื่องยากเหมือนกันงั้นเหรอ? อย่างนั้นเหรอ... ได้ยินแบบนั้นก็ค่อย#nโล่งใจขึ้นมาหน่อยนะ"
10038005-197 = "ถึงนั่นจะแปลว่าปัญหาพื้นฐานดูเหมือนจะไม่ได้รับการแก้ไขก็เถอะ..."
10038005-202 = "อย่างนั้นสินะ มีเรื่องแบบนั้นอยู่สินะ"
10038005-206 = "?!"
10038005-207 = "[s] \"เสียงนี้มัน?!?!\""
10038005-212 = "ไม่ได้เจอกัน... ก็ไม่นานนะ ครู เราได้กลับมาเจอหน้ากันเร็วแบบนี้คงต้องบอกว่าเป็นพรหมลิขิตใช่หรือ#nเปล่า ฮุฮุฮุ"
10038005-213 = "ทะ... ทะทะทะทะทะทะ ท่านประมุข?!"
10038005-214 = "ไม่ต้องตกอกตกใจขนาดนั้นหรอก อีกอย่าง เราก็รู้อยู่แล้วว่าสมาชิกมังกรดำมีความคิดเห็นเช่นนั้นกัน"
10038005-215 = "ตะ... แต่ฉัน! เอ่อ! คือว่า!"
10038005-216 = "ไม่จำเป็นหรอก เรารู้ว่าเธอทำได้ดีมาตลอด ทว่าในฐานะประมุขแล้ว เราก็คงไม่พูดถึงความคิดเห็น#nเกี่ยวกับเทศกาลเงาจันทร์ไม่ได้"
10038005-217 = "ค่ะ ค่ะ!"
10038005-218 = "เราเข้าใจความวิตกกังวลของพวกนักเรียน แล้วก็รับรู้ความเป็นห่วงของสมาชิกมังกรดำ รวมถึงความต้องการให้รักษาความเข้มงวดของการลาดตระเวนด้วย"
10038005-219 = "แต่ยิ่งเป็นแบบนั้น เรายิ่งอยากให้มีการจัดเทศกาลเงาจันทร์เหมือนทุกปี"
10038005-221 = "ท่านหมายความว่า...?!"
10038005-223 = "คำติฉินนินทาย่อมมีอยู่แล้วละ เรื่องนี้ไม่ต่างกับลมที่พัดผ่านไปหรอก"
10038005-228 = "แต่ถึงอย่างนั้น ซานไห่จิงก็ยังหนักแน่นอยู่ และเราก็ต้องเป็นเช่นนั้น ว่ามั้ยเล่า มินะ?"
10038005-229 = "...!"
10038005-230 = "ใช่ค่ะ! ท่านพูดสมเหตุสมผลแล้วค่ะ! ยิ่งเป็นแบบนี้ เราก็ยิ่งต้อง...!"
10038005-231 = "ใช่ หัวไวดีนี่ เช่นนั้นก็รู้แล้วใช่มั้ยว่าต้องทำอย่างไร?"
10038005-232 = "ค่ะ ท่านประมุข! วางใจฉันได้เลยค่ะ!"
10038005-239 = "ฮู่ว... ถ้าเรารู้ว่าครูจะมา เราก็คงเตรียมความพร้อมสำหรับการกลับมาเจอกันอีกในรูปแบบที่ต่างออกไป#nจากนี้แล้วละ"
10038005-240 = "[s] \"แต่ก็น่าดีใจนะที่ได้เจอกันอีก คิซากิ\""
10038005-241 = "ฮุฮุ ครูยังเป็นเหมือนเดิมเลยนะ ครูทำให้เราโล่งใจได้ในทางใดทางหนึ่งตลอดเลย"
10038005-242 = "ถ้าซานไห่จิงยังคงหนักแน่นอยู่เหมือนครู เราก็คงวางใจ และขอให้ตั้งตารอเทศกาลเงาจันทร์ได้..."
10038005-243 = "แต่ถึงเราจะไม่พูดเช่นนั้น ครูก็ตั้งตารอเทศกาลเงาจันทร์อยู่แล้วอย่างนั้นหรือ?"
10038005-244 = "ฮึ่ม ทำให้เราต้องระมัดระวังจนถึงนาทีสุดท้ายเลยนะครู ดีละ หากความคาดหวังของครูเป็นเช่นนั้น มังกรดำก็จะทำตามความคาดหวังนั้นเอง"
10038005-245 = "การแสดงงิ้วเป็นหนึ่งในสิ่งที่ซานไห่จิงภาคภูมิใจ... แต่ตอนนี้คงเป็นการยากที่จะให้เปิดการแสดงรอบ#nพิเศษ นั่นก็ด้วยเหตุผลหลายๆ อย่างน่ะ"
10038005-246 = "ถึงกระนั้น กิจกรรมจำพวกการละเล่นโคมไฟ การเล่นดอกไม้ไฟ หรืองานแสดงดนตรียังเปิดได้เต็มที่"
10038005-250 = "เช่นนั้นเราก็ไปกันเลยดีไหม ครู?"
10038005-251 = "[s] \"หืม? ไปทำอะไร ที่ไหนเหรอ?\""
10038005-252 = "ก็ไปที่ที่เราเตรียมจัดเทศกาลเงาจันทร์กันน่ะสิ"
10038005-253 = "ฮุฮุ ไม่ต้องกังวลให้มากไปนักหรอก แค่ครูอยู่ข้างๆ เราก็เพียงพอแล้วละ"
10038005-254 = "เราจะเตรียมผลไม้กับขนมไหว้พระจันทร์ไว้ให้อย่างจุใจเลย"
10038005-255 = "[s] \"อ่า น้ำตาลกับไขมัน... จะกี่แคลอรี่นะ...!\" "
10038005-256 = "กังวลเกี่ยวกับเรื่องแบบนั้นหรือ? โฮ่ พอเป็นผู้ใหญ่แล้วก็เป็นเรื่องที่ช่วยไม่ได้สินะ?"
10038005-257 = "ดีละ เช่นนั้นเราจะเตรียมขนมที่รสชาติเข้มข้นเป็นพิเศษไว้ให้ครู"
10038005-262 = "ไม่ต้องปฏิเสธหรอก การต้อนรับในแบบฉบับของซานไห่จิงน่ะ เราต้องเตรียมอาหารไว้ให้เพียงพอ ขนาดที่แขกกินไปอย่างอิ่มท้องแล้วก็ยังมีเหลืออยู่น่ะ"

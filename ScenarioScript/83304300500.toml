[translation]
83304300500-9 = "เราน่าจะเก็บใบปลิวกันมาหมดแล้วนะ"
83304300500-11 = "ขอบคุณที่ช่วยนะ ประธาน"
83304300500-12 = "ใบปลิวที่เก็บมา ฉันจะเอาไปใส่เตาเผาให้หมดเลย ไว้ฉันเผาเสร็จแล้วจะไปสถานที่ฝึกนะ"
83304300500-13 = "เหนื่อยหน่อยนะ อิโอริ "
83304300500-14 = "ว่าแต่รู้รึเปล่าว่าชินัตสึอยู่ที่ไหน?"
83304300500-15 = "อ้อ ชินัตสึน่าจะอยู่ที่ห้องหน่วยแพทย์ฉุกเฉินนะ เห็นว่าจะไปเอาอุปกรณ์การแพทย์ที่จำเป็นมา"
83304300500-16 = "งั้นเหรอ งั้นฉันคงต้องไปที่นั่นด้วยแล้ว"

80000043-18 = "#zmc;instant;632,0;1896\n#wait;1000"
80000043-19 = "#zmc;instant;632,0;1896\n[ns] \"골인-! 수고했어! 스미레!\""
80000043-20 = "#all;hide"
80000043-21 = "#wait;2000"
80000043-22 = "3;스미레;06;하아, 하아……. 수고하셨습니다. 트레이너.\n#3;em;[반응]\n#3;stiff\n#3;a"
80000043-23 = "[s] \"스미레야말로. 오늘 기록, 전보다 굉장히 좋아졌어.\""
80000043-24 = "3;스미레;02;아, 그, 그런가요? 헌데 전보다 기록이 좋아졌다는 말씀은…….\n#3;em;[?]"
80000043-25 = "3;스미레;06;트레이너께선, 제 기록을 전부 기억하고 계신다는……?\n#3;greeting"
80000043-26 = "[s1] \"그야 학생의 성장을 체크하는 건 선생님으로서 의무니까.\"\n[s2] \"올해 스미레가 세운 대강의 기록은 전부 꿰고 있어.\""
80000043-27 = "3;스미레;08;……!! 그, 그렇군요! 그것이 바로 선생님으로서 당연한 의무………\n#3;em;[!]\n#3;jump"
80000043-28 = "3;스미레;08;……!! 그, 그렇군요! 그것이 바로 선생님으로서 당연한 의무……… \n#3;em;[!]\n#3;jump"
80000043-29 = "3;스미레;05;트레이너께선 언제나 그렇게 제 기록을, 저를 지켜봐 주시고 계셨던 거로군요!"
80000043-30 = "3;스미레;03;후훗, 어쩐지 무척 기쁜걸요.\n#3;em;[반짝]\n#3;greeting"
80000043-31 = "3;스미레;99;늘 트레이너가 절 주시하고, 저를 체크하고, 저의 행동 일거수일투족을 기록하며 함께 해주신다니……."
80000043-32 = "3;스미레;06;그건 분명 상상만 해도………\n#3;em;[///]\n#3;stiff"
80000043-33 = "[s3] \"아니, 그렇게까지 말하진 않았는데?!\"\n[s4] \"순수한 호의가 갑자기 엄청 불건전한 내용으로 바뀌지 않았어?!\""
80000043-34 = "3;스미레;02;네? 제가 뭔가 실수라도……?\n#3;em;[?]"
80000043-35 = "3;스미레;02;네? 제가 뭔가 실수라도……?\n#3;em;[?]"
80000043-36 = "#st;[0,0];instant;1;"
80000043-37 = "#clearST"
80000043-38 = "#wait;2000"
80000043-39 = "3;스미레;04;아…… 운동을 했더니, 다소 공복이 느껴지는군요.\n#3;em;[땀]\n#3;stiff"
80000043-40 = "[s] \"아, 그럼 끝나고 같이 밥이라도 먹으러 갈까?\""
80000043-41 = "3;스미레;06;!! 물론 트레이너의 그 권유, 무척이나 감사한 말입니다만.\n#3;em;[반응]"
80000043-42 = "3;스미레;01;그게…… 저어…….\n#3;stiff"
80000043-43 = "[s] \"응? 왜 그래? 스미레.\""
80000043-44 = "3;스미레;05;트레이너도 잘 아시리라 생각합니다만, 운동 전후에 영양 보급을 하는 건 무척이나 중요합니다.\n#3;em;[...]"
80000043-45 = "[s] \"그렇지.\""
80000043-46 = "3;스미레;99;더구나 오늘은 발렌타인 데이. 조금은 특별한 날……. 오늘 같은 날엔 소중한 사람에게 단당류의 디저트를 선물하는 법이라고, 알고 있습니다.\n#3;greeting"
80000043-47 = "3;스미레;02;제 인식에 혹시 미스가 있을까요?\n#3;em;[?]"
80000043-48 = "[s] \"어, 음 틀린 말은 아니지?\""
80000043-49 = "3;스미레;08;물론 지나친 당 섭취는 운동 효과에 해가 되지만, 오늘 같은 날까지 딱딱하게 굴 생각은 없달까…….\n#3;m4"
80000043-50 = "3;스미레;04;마침 트레이너를 위해 준비한 물건이 여기에 있, 다고나 할까.\n#3;m5"
80000043-51 = "3;스미레;03;……트레이너, 이것을.\n#3;greeting"
80000043-52 = "#st;[0,0];instant;1;"
80000043-53 = "#clearST"
80000043-54 = "#wait;2500"
80000043-55 = "[ns] \"저기 스미레, 이건……?\""
80000043-56 = "3;스미레;05;사전에 제가 운동 관련 식품회사의 제품 100개를 비교해가며 직접 먹어보고 테스트한 것으로…….\n#3;em;[재잘]\n#3;m3"
80000043-57 = "3;스미레;03;개중에서 가장 트레이너께 도움이 될까 싶어 고른, 튜브형 대체 식품. 그 초콜릿 맛 제품입니다."
80000043-58 = "3;스미레;99;평소 트레이너께선 식사도 제때 챙겨 먹기 힘들 정도로 바쁘시다고 알고 있어서. 이거라면 도움이 될까 싶은 마음에…….\n#3;em;[...]"
80000043-59 = "[s] \"앗, 고마워! 스미레! 잘 먹을게!\""
80000043-60 = "3;스미레;01;아…… 트레이너께서 이렇게나 기뻐해 주실 줄이야. 후훗.\n#3;em;[반응]"
80000043-61 = "3;스미레;03;잘됐습니다. 트레이너! 자! 이걸 먹고! 저와 함께 운동을 계속하도록 하죠!\n#3;greeting"
80000043-62 = "3;스미레;08;이 제품, 튜브 한 팩만 먹어도 포만감이 충분히 차오를 거라 당당히 홍보하고 있으니까요!\n#3;em;[반짝]"
80000043-63 = "3;스미레;05;먹고 나면 우선은 가볍게 20km 조깅부터 시작하는 겁니다!\n#3;closeup\n#fontsize;80"
80000043-64 = "[s5] \"으, 응. 자, 잠깐, 스미레?! 처음 듣는 이야기인데요?!\"\n[s6] \"갑자기 20km 조깅이라니……?!\""
80000043-65 = "3;스미레;07;후훗! 자, 가죠! 트레이너!\n#3;em;[음표]"
80000043-66 = "3;스미레;07;후훗! 자, 가죠! 트레이너!\n#3;em;[음표]"
80000043-67 = "#st;[0,0];instant;1;"
80000043-68 = "#clearST"
80000043-69 = "3;스미레;07\n#3;dr\n#wait;1500"
80000043-70 = "#all;hide"
80000043-71 = "#na;(그렇게 되어 본의 아니게 스미레와 함께 발렌타인 데이 기념 특훈을 시작하게 되었다.)"

[translation]
80000043-1 = "Record it again"
80000043-6 = "呼，呼……"
80000043-7 = "[s]「堇，就差一點了！」"
80000043-8 = "是，指導員！"
80000043-19 = "[ns]「抵達終點！堇，辛苦了！」"
80000043-22 = "哈啊，哈啊……好的，指導員也辛苦了。"
80000043-23 = "[s]「今天的紀錄比之前進步了不少唷！」"
80000043-24 = "是，是嗎……咦？"
80000043-25 = "指導員，難道你記得我所有的紀錄嗎……？"
80000043-26 = "[s1]「當然，因為我是老師呀。」\n[s2]「堇創下的紀錄我全部都記得唷。」"
80000043-27 = "真，真厲害呢！"
80000043-28 = "真，真厲害呢！"
80000043-29 = "這就是老師，同時也是指導員……！"
80000043-30 = "呵呵。覺得厲害的同時，也覺得非常開心。"
80000043-31 = "指導員總是注視著我，觀察著我，紀錄著我的舉手投足……"
80000043-32 = "太厲害了………"
80000043-33 = "[s3]「總覺得好像有點語病……？」\n[s4]「你的說法讓我有點在意，是我心裡有問題嗎……！？」"
80000043-34 = "嗯？我剛才說了什麼不好的話嗎……？"
80000043-35 = "嗯？我剛才說了什麼不好的話嗎……？"
80000043-39 = "啊，運動完就覺得肚子有點餓了呢……"
80000043-40 = "[s]「那等等要不要一起去吃個飯？」"
80000043-41 = "啊，雖，雖然非常感謝指導員的邀請……！"
80000043-42 = "其實……"
80000043-43 = "[s]「……堇？」"
80000043-44 = "我想指導員應該也知道，運動前後的進食是非常重要的。"
80000043-45 = "[s]「嗯，沒錯。」"
80000043-46 = "而今天是什麼日子，我也不是不知道。#n情人節，贈送單醣類或是雙醣類甜點給重要的人的日子。"
80000043-47 = "我沒說錯吧？"
80000043-48 = "[s]「沒錯……吧？」"
80000043-49 = "當然，攝取過多的糖分並不是件好事。#n但是我不認為有必要連這種日子都堅守著所有規定。"
80000043-50 = "所以，該這麼說嗎……"
80000043-51 = "指導員，請收下這個。"
80000043-55 = "[ns]「這是……？」"
80000043-56 = "我對100種運動食品公司的產品實際進行了試吃和比較。"
80000043-57 = "其中我認為對指導員最有幫助的，就是這個巧克力口味的管狀食品。"
80000043-58 = "我聽說指導員平時常常忙到沒有時間好好吃飯……#n這個就算是在工作間的零碎時間也可以吃。"
80000043-59 = "[s]「好耶，謝謝你！」"
80000043-60 = "沒想到指導員居然這麼開心……呵呵。"
80000043-61 = "看來我的努力並沒有白費，我才應該謝謝你。#n那麼指導員，吃完這個之後一起重新開始運動吧！"
80000043-62 = "這個產品只要一條就能提供充足的熱量和飽足感。"
80000043-63 = "吃完之後就先輕鬆跑個20km吧！"
80000043-64 = "[s5]「呃，等等！？這種事我可沒聽說過啊！？」\n[s6]「20km！？」"
80000043-65 = "我也會陪你一起跑的！來吧，指導員！"
80000043-66 = "我也會陪你一起跑的！來吧，指導員！"
80000043-71 = "（就這樣，和堇的情人節紀念特訓（？）開始了）"

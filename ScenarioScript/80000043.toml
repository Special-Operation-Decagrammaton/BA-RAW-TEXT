80000043-6 = "3;스미레;04;후우……. 후우…….\n#3;greeting"
80000043-7 = "[s] \"좋아! 스미레! 조금만 더! 골이 바로 코앞이야!\""
80000043-8 = "3;스미레;08;후우! 후우! 네 트레이너!\n#3;em;[반응]\n#3;jump"
80000043-9 = "#st;[0,0];instant;1;"
80000043-10 = "#clearST"
80000043-11 = "3;스미레;08\n#3;dr\n#wait;1000"

[translation]
80000043-1 = "Record it again"
80000043-6 = "ฮู่ว... ฮู่ว..."
80000043-7 = "[s] \"เอาล่ะ! สึมิเระ! อีกแค่นิดเดียวเท่านั้นนน!\""
80000043-8 = "ฮู่ว... ฮู่ว...  ค่ะ เทรนเนอร์!"
80000043-19 = "[ns] \"สำเร็จ! เก่งมากเลย สึมิเระ!\""
80000043-22 = "แฮ่ก... แฮ่ก... ขอบคุณค่ะ เทรนเนอร์"
80000043-23 = "[s] \"สึมิเระก็เก่งมากนะ ผลวันนี้ดีกว่าวันก่อนๆ เยอะเลย\""
80000043-24 = "งะ...งั้นเหรอคะ? แต่ถึงจะบอกว่าผลดีขึ้นกว่าวันก่อนๆ..."
80000043-25 = "เทรนเนอร์จำบันทึกผลการซ้อมของฉันได้ทั้งหมดเลยเหรอคะ...?"
80000043-26 = "[s1] \"การตรวจดูคะแนนของนักเรียนเป็นหน้าที่ของครูนี่นา\"\n[s2] \"ครูจำบันทึกผลทดสอบทั้งปีของสึมิเระได้ทั้งหมดนั่นแหละ\""
80000043-27 = "...!! งะ...งั้นเหรอคะ! นี่ก็เป็นหน้าที่ของคุณครูสินะคะ..."
80000043-28 = "...!! งะ...งั้นเหรอคะ! นี่ก็เป็นหน้าที่ของคุณครูสินะคะ... "
80000043-29 = "เทรนเนอร์น่ะ ไม่ว่าตอนไหนก็หมั่นดูบันทึกผลทดสอบของฉันเสมอเลยสินะคะ!"
80000043-30 = "ฮุฮุ พอได้ยินแบบนี้แล้วดีใจมากเลยละค่ะ"
80000043-31 = "เทรนเนอร์คอยใส่ใจ คอยตรวจบันทึกผลทดสอบฉันเสมอ แถมยังคอยหมั่นตรวจสอบ และบันทึกการเคลื่อนไหวของฉันแบบนี้..."
80000043-32 = "แค่คิดก็ดีใจแล้วค่ะ..."
80000043-33 = "[s3] \"เดี๋ยวสิ ไม่เห็นต้องพูดขนาดนั้นเลย?!\"\n[s4] \"จากความปรารถนาดี กลายเป็นเรื่องสุ่มเสี่ยงเฉยเลย?!\""
80000043-34 = "คะ? ฉันพูดอะไรผิดไปเหรอคะ...?"
80000043-35 = "คะ? ฉันพูดอะไรผิดไปเหรอคะ...?"
80000043-39 = "อา... พอมาออกกำลังกายแบบนี้แล้วก็รู้สึกหิวขึ้นมานิดหน่อยเลยค่ะ"
80000043-40 = "[s] \"ถ้างั้นพอเสร็จแล้วไปกินข้าวด้วยกันมั้ย?\""
80000043-41 = "!! ถ้าเทรนเนอร์ชวนละก็ ฉันก็ยินดีมากๆ เลยค่ะ"
80000043-42 = "คือว่า... เอ่อ..."
80000043-43 = "[s] \"หืม? มีอะไรเหรอ สึมิเระ?\""
80000043-44 = "ฉันคิดว่าเทรนเนอร์เองก็ทราบเรื่องนี้ดี แต่ว่าการทานอาหารให้ครบหลังจากออกกำลังกาย มันเป็นเรื่องสำคัญมากค่ะ"
80000043-45 = "[s] \"ใช่แล้วล่ะ\""
80000043-46 = "แล้ววันนี้ก็เป็นวันวาเลนไทน์ด้วย... วันที่พิเศษแบบนี้... ฉันได้ยินมาว่าวันนี้เป็นวันที่จะมอบขนมหวาน#nให้กับคนสำคัญ..."
80000043-47 = "ฉันเข้าใจถูกหรือเปล่าคะ?"
80000043-48 = "[s] \"อืม ที่พูดมาก็ไม่ผิดหรอก\""
80000043-49 = "แน่นอนว่าการกินของหวานก็จะมีผลกับการออกกำลังกายด้วย ฉันเลยคิดว่ามีขนมอะไรที่เหมาะกับ#nวันนี้บ้าง..."
80000043-50 = "ฉันเลยเตรียมของบางอย่างมาให้เทรนเนอร์ด้วยน่ะค่ะ"
80000043-51 = "นี่ค่ะ เทรนเนอร์"
80000043-55 = "[ns] \"สึมิเระ นี่มัน...?\""
80000043-56 = "ก่อนหน้านี้ฉันลองเปรียบเทียบและลองชิมผลิตภัณฑ์เกี่ยวกับการออกกำลังกายดูมาแล้ว 100 ชิ้น..."
80000043-57 = "แล้วฉันก็เลือกผลิตภัณฑ์ชนิดหลอดนี่มาเพราะคิดว่าน่าจะเป็นประโยชน์กับเทรนเนอร์ นั่นก็คือผลิตภัณฑ์รสช็อกโกแลตนี่ค่ะ"
80000043-58 = "ได้ยินว่าปกติเทรนเนอร์มักจะยุ่งมากจนไม่ค่อยได้ทานข้าวตรงเวลาบ่อยๆ เลยคิดว่าถ้าเป็นผลิตภัณฑ์#nชิ้นนี้น่าจะมีประโยชน์กับเทรนเนอร์บ้าง..."
80000043-59 = "[s] \"โอ้โฮ ขอบใจนะ สึมิเระ! ครูกินแน่นอน!\""
80000043-60 = "อ่า... ฉันไม่คิดเลยค่ะว่าเทรนเนอร์จะดีใจขนาดนี้ ฮุฮุ"
80000043-61 = "ดีจังเลยนะคะ เทรนเนอร์! เอาล่ะ! มาทานขนมชิ้นนี้แล้วก็มาออกกำลังกายกับฉันต่อเถอะค่ะ!"
80000043-62 = "เขาโฆษณาว่าแค่กินขนมนี่ชิ้นเดียวก็จะรู้สึกอิ่มท้องได้นานเลยนะคะ!"
80000043-63 = "เพราะงั้นหลังจากกินเสร็จแล้วเรามาเริ่มออกกำลังกายเบาๆ วิ่งจ๊อกกิ้งกัน#nสัก 20 กม. กันเถอะค่ะ!"
80000043-64 = "[s5] \"อื้อ ดะ...เดี๋ยวก่อน สึมิเระ?! เราไม่ได้ตกลงกันแบบนี้นี่นา?!\"\n[s6] \"จู่ๆ ก็จะวิ่ง 20 กม. เลยเรอะ...?!\""
80000043-65 = "ฮิฮิ เอาล่ะ ไปกันเถอะค่ะ เทรนเนอร์!"
80000043-66 = "ฮิฮิ เอาล่ะ ไปกันเถอะค่ะ เทรนเนอร์!"
80000043-71 = "(ด้วยเหตุนั้นการฝึกพิเศษฉลองวันวาเลนไทน์ของคุณครูกับสึมิเระก็ได้เริ่มขึ้น)"

[translation]
1001202-1 = "#title;트레이너 등장!"
1001202-2 = "#place;밀레니엄 헬스장"
1001202-3 = "3;스미레;10;아, 선생…… 아니 트레이너! 오셨군요!\n#3;em;[반응]\n#3;a"
1001202-4 = "3;스미레;03;기다리고 있었습니다.\n#3;greeting"
1001202-5 = "3;스미레;06;아하하, 아직 트레이너로 부르는 게 익숙하지가 않네요.\n#3;em;[땀]"
1001202-6 = "3;스미레;08;약속대로, 제 트레이닝 시간표를 만들어 왔습니다."
1001202-7 = "3;스미레;10;괜찮은지 확인해주실 수 있을까요?\n#3;em;[!]"
1001202-8 = "3;스미레;08\n#3;greeting\n#wait;400\n#3;d"
1001202-9 = "3;스미레;08\n#wait;1000\n#3;closeup\n#3;a"
1001202-10 = "#na;(스미레가 건넨 핸드폰에는 뭔가 어려워 보이는 말들이 잔뜩 적혀 있다.)"
1001202-11 = "3;스미레;08\n#wait;1000\n#3;closeup\n#3;d"
1001202-12 = "3;스미레;10;어떤가요, 트레이너?\n#3;a"
1001202-13 = "3;스미레;08;덤벨 오버헤드는 삼두근 발달, 특히 장두 부분을 발달시키기에 좋은 운동이라고 합니다.\n#3;em;[재잘]"
1001202-14 = "3;스미레;99;이 운동으로 탄력 있는 팔을 만들 수 있고, 레그 익스텐션을 통한……."
1001202-15 = "[s] \"저기, 스미레?\""
1001202-16 = "3;스미레;10;다리의 근력을…… 앗, 네. 트레이너!\n#3;em;[반응]"
1001202-17 = "[s] \"너무 무리하는 거 아냐?\""
1001202-18 = "3;스미레;99;음…… 이전보다 조금 무리한 감은 있습니다."
1001202-19 = "3;스미레;08;아마 예전 같았으면 소화하지 못할 스케쥴이겠죠."
1001202-20 = "3;스미레;10;하지만 지금은 다릅니다."
1001202-21 = "3;스미레;06;바, 바로 트레이너가 있기 때문이죠!\n#3;em;[///]\n#3;stiff"
1001202-22 = "[s] \"그, 그런가. 그래도 난 전문 지식이 없는데.\""
1001202-23 = "3;스미레;10;괜찮습니다!\n#3;em;[!]"
1001202-24 = "3;스미레;08;트레이너는 곁에 함께 하는 것만으로도 빛나는 존재!"
1001202-25 = "3;스미레;03;제가 오버 워크를 하지 않도록, 잡아 주시는 분이시니까요.\n#3;greeting\n#3;em;[반짝]"
1001202-26 = "3;스미레;03;이렇게 체계적인 트레이닝을 할 수 있게 된 건, 모두 트레이너 덕분입니다."
1001202-27 = "[s] \"그렇다면 다행이야.\""
1001202-28 = "3;스미레;04;저, 저야말로 다행입니다.\n#3;em;[///]\n#3;stiff"
1001202-29 = "3;스미레;99;트레이너와 만나기 전에 저는, 아무것도 모르는 햇병아리에 불과했으니까요."

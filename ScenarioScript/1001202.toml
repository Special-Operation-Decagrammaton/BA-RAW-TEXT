[translation]
1001202-1 = "เทรนเนอร์ปรากฏตัว!"
1001202-2 = "ห้องออกกำลังกาย มิลเลเนียม"
1001202-3 = "โอ๊ะ คุณครู.... ไม่สิ คุณเทรนเนอร์! มาแล้วเหรอคะ"
1001202-4 = "ฉันกำลังรออยู่เลยค่ะ"
1001202-5 = "ฮะฮะ... ฉันยังไม่ชินที่เรียกคุณครูว่าเทรนเนอร์เท่าไหร่เลย"
1001202-6 = "ฉันทำตารางการฝึกซ้อมตามที่สัญญาเอาไว้มาแล้วค่ะ"
1001202-7 = "ช่วยตรวจดูให้หน่อยได้มั้ยคะ?"
1001202-10 = "(ในโทรศัพท์ที่สึมิเระส่งมาให้ดูมีตารางข้อความเขียนเอาไว้เต็มไปหมด)"
1001202-12 = "เป็นยังไงบ้างคะเทรนเนอร์?"
1001202-13 = "การยกดัมเบลแบบโอเวอร์เฮดเหมาะสำหรับฝึกกล้ามแขนด้านหลังโดยเฉพาะ"
1001202-14 = "การออกกำลังกายแบบนี้จะช่วยเพิ่มความยืดหยุ่นให้กล้ามเนื้อแขนกับขา..."
1001202-15 = "[s] \"เอ่อ...สึมิเระ?\""
1001202-16 = "การเสริมกล้ามเนื้อขา... อ๊ะ ว่ายังไงคะ เทรนเนอร์!"
1001202-17 = "[s] \"แบบนี้มันฝึกหนักเกินไปรึเปล่า?\""
1001202-18 = "อืม... มันอาจจะดูหนักเกินไปนิดหน่อย"
1001202-19 = "ถ้าเป็นเมื่อก่อนฉันคงจะฝึกตามตารางนี้ไม่ได้แน่ๆ ค่ะ"
1001202-20 = "แต่ว่าตอนนี้ไม่ใช่แล้วล่ะ"
1001202-21 = "เพราะว่าฉันมีเทรนเนอร์อยู่ด้วยนี่คะ"
1001202-22 = "[s] \"งั้นเหรอ...? แต่ว่าครูไม่เชี่ยวชาญเรื่องนี้เลยนะ\""
1001202-23 = "ไม่เป็นไรหรอกค่ะ!"
1001202-24 = "แค่เทรนเนอร์มาอยู่ข้างๆ ฉันตอนที่ฝึกซ้อมก็พอแล้วค่ะ!"
1001202-25 = "จะได้คอยห้ามฉันเวลาที่ฉันฝืนตัวเองมากเกินไปยังไงล่ะคะ"
1001202-26 = "การที่ฉันเขียนตารางการฝึกซ้อมแบบนี้ขึ้นมาได้ ก็เป็นเพราะได้กำลังใจจากเทรนเนอร์เลยนะคะ"
1001202-27 = "[s] \"ได้ยินแบบนั้นรู้สึกดีจังเลยนะ\""
1001202-28 = "ฉะ...ฉันก็รู้สึกโชคดีมากเหมือนกันค่ะ"
1001202-29 = "ก่อนที่จะได้เจอกับเทรนเนอร์... ฉันก็แค่มือใหม่ที่ไม่รู้เรื่องอะไรเลย"
1001202-31 = "ห้องพยาบาล มิลเลเนียม"
1001202-32 = "หลายวันก่อน..."
1001202-33 = "(ครืดดด)"
1001202-34 = "อ๊ะ คุณครู"
1001202-35 = "[s] \"ร่างกายเป็นยังไงบ้าง?\""
1001202-36 = "ไม่ต้องห่วงค่ะ แค่มีอาการขาดน้ำนิดหน่อย"
1001202-37 = "ฉันเคยเป็นลมมาสามครั้งแล้วค่ะ คราวนี้สบายมาก"
1001202-38 = "คะ? ทำไมฉันถึงเป็นลมน่ะเหรอคะ?"
1001202-39 = "คือว่า... ช่วงนี้เป็นช่วงเตรียมสอบ ฉันเลยใช้เวลาอ่านหนังสือมากไปหน่อย"
1001202-40 = "แล้วฉันก็ตัดสินใจเพิ่มตารางออกกำลังกายให้หนักขึ้นกว่าก่อนหน้านี้ด้วย เลยอาจทำให้ร่างกาย#nรับไม่ไหวค่ะ"
1001202-41 = "[s] \"เท่านี้ก็ทำได้ดีแล้วนะ?\""
1001202-42 = "ยังหรอกค่ะ"
1001202-43 = "การออกกำลังกายจะต้องทำอย่างต่อเนื่อง สม่ำเสมอ และต้องทำตามที่กำหนดค่ะ"
1001202-44 = "ถ้าไม่อย่างนั้นแล้วล่ะก็...."
1001202-45 = "[s] \"ถ้าไม่อย่างนั้น....?\""
1001202-46 = "กล้ามเนื้อ... ก็จะหายไปค่ะ"
1001202-47 = "พอจะนึกออกมั้ยคะ ถ้ากล้ามเนื้อที่ฉันอุตส่าห์ฟูมฟักดูแลสร้างกล้ามเนื้อมาอย่างยากลำบาก#nหายไปล่ะก็...."
1001202-48 = "ฝันร้ายชัดๆ เลยค่ะ คงปวดใจมากแน่ๆ ฉันจะไม่ยอมให้เป็นแบบนั้นเด็ดขาด!"
1001202-49 = "[s1] \"บะ... แบบนี้นี่เอง\"\n[s2] \"จะ... ใจเย็นๆ\""
1001202-50 = "อ๊ะ อ๊ะ! ขอโทษด้วยค่ะ ฉันตื่นเต้นมากไปหน่อย"
1001202-51 = "อ๊ะ อ๊ะ! ขอโทษด้วยค่ะ ฉันตื่นเต้นมากไปหน่อย"
1001202-52 = "เฮ้อ...."
1001202-53 = "ยังไงก็ตาม ฉันต้องทำเพื่อไม่ให้กล้ามเนื้อหายไปค่ะ"
1001202-54 = "[s] \"เราออกกำลังกายเพื่อให้ร่างกายแข็งแรงนะ\""
1001202-55 = "ใช่แล้วค่ะ เรื่องนั้นฉันรู้ดีเลย"
1001202-56 = "ฉันถึงได้พยายามอย่างหนักแบบนี้..."
1001202-57 = "[s] \"เพิ่งเป็นลมเพราะ <อาการขาดน้ำ> จะเรียกว่าร่างกายแข็งแรงได้ยังไงล่ะ?\""
1001202-58 = "?!"
1001202-59 = "อืม... ค่ะ คุณครู....พูดถูกแล้วค่ะ"
1001202-60 = "ขอโทษนะคะ คุณครู"
1001202-61 = "เฮ้อ....\n"
1001202-62 = "ปกติฉันจะออกกำลังกายอย่างสม่ำเสมอ"
1001202-63 = "แต่เป็นเพราะฉันใจร้อนเองเลยทำให้เกิดเรื่องผิดพลาดแบบนี้"
1001202-64 = "ถ้ามีคนคอยคุมตอนฝึกซ้อมก็คงจะดี... แต่ไม่มีใครที่ฉันจะไปรบกวนได้เลย"
1001202-65 = "ฉันควรทำยังไงดีล่ะคะ"
1001202-66 = "......"
1001202-67 = "[s3] บอกสึมิเระว่าจะช่วยเรื่องการออกกำลังกาย\n[s4] \"เทรนเนอร์เฉพาะกิจอยู่ตรงนี้แล้วไงล่ะ!\""
1001202-68 = "คะ?!"
1001202-69 = "คะ?!"
1001202-70 = "คุณครูจะช่วยฉันเหรอคะ?"
1001202-71 = "พะ...พูดจริงเหรอคะ?"
1001202-72 = "ขอบคุณมากค่ะ! คุณครู!"
1001202-73 = "ไม่ใช่สิ ถ้างั้นต่อไปนี้ฉันจะเรียกคุณครูว่า \"เทรนเนอร์\" แล้วกันนะคะ?"
1001202-74 = "[s5] \"อื้อ แบบนั้นก็ได้\"\n[s6] \"เรียกครูว่าเทรนเนอร์ได้เลยนะ\""
1001202-75 = "ค่ะ!"
1001202-76 = "ค่ะ!"
1001202-79 = "เอาล่ะ!"
1001202-80 = "ถ้างั้นเราเริ่มตั้งแต่วันนี้เลยมั้ยคะ?"
1001202-81 = "รบกวนด้วยนะคะ! คุณเทรนเนอร์"

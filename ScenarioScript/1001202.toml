1001202-36 = "3;스미레;10;괜찮습니다! 가벼운 탈수 증상을 겪은 것뿐입니다.\n#3;greeting"
1001202-37 = "3;스미레;08;3번 정도 쓰러지긴 했지만, 지금은 괜찮습니다."
1001202-38 = "3;스미레;06;네? 어쩌다 그렇게 되었냐고요?\n#3;em;[?]\n#3;stiff"
1001202-39 = "3;스미레;04;그게…… 최근 학교 내 시험을 준비하면서 자리에 앉아있는 시간이 많다 보니."
1001202-40 = "3;스미레;04;이전보다 운동량을 더 늘려야겠다고 생각한 나머지, 갑자기 오버 워크를 한 것이 화근이 된 것 같습니다.\n#3;em;[땀]"
1001202-41 = "[s] \"이미 충분히 잘하고 있는 것 아냐?\""
1001202-42 = "3;스미레;08;그렇지 않습니다.\n#3;em;[반응]"
1001202-43 = "3;스미레;99;트레이닝은 꾸준히, 계속, 확실히 해야 합니다."
1001202-44 = "3;스미레;02;그렇게 하지 않으면…….\n#3;em;…"
1001202-45 = "[s] \"하지 않으면?\""
1001202-46 = "3;스미레;04;근손실이…… 생기거든요.\n#3;em;[속상함]\n#3;stiff"
1001202-47 = "3;스미레;10;아시겠나요? 내가 지금껏 만들어온 근육들이 사라진다고 생각해보세요."
1001202-48 = "3;스미레;05;그건 지옥입니다. 고통입니다. 절대 있어서는 안 되는 일입니다!\n#3;em;[빠직]\n#3;hophop"
1001202-49 = "[s1] \"그, 그렇구나.\"\n[s2] \"지, 진정해.\""
1001202-50 = "3;스미레;06;아, 앗! 죄송합니다. 제가 잠시 흥분했습니다.\n#3;em;[땀]"
1001202-51 = "3;스미레;06;아, 앗! 죄송합니다. 제가 잠시 흥분했습니다.\n#3;em;[땀]"

[translation]
1001202-1 = "指導員參上！"
1001202-2 = "千年．健身房"
1001202-3 = "啊，老師……不，指導員！您來了呢！"
1001202-4 = "恭候多時了。"
1001202-5 = "啊哈哈，還沒習慣稱呼指導員呢。"
1001202-6 = "依照約定，自己製作了訓練的菜單。"
1001202-7 = "可以幫我確認這樣行不行嗎？"
1001202-10 = "（堇遞過來的手機，不知為何寫著很多艱難的字句）"
1001202-12 = "請問如何呢，指導員？"
1001202-13 = "啞鈴架空伸展似乎有助於上臂的發達，對上臂三頭肌是特別好的運動。"
1001202-14 = "這個運動可以鍛鍊出柔軟的手臂，這裡的腿部伸展是……"
1001202-15 = "[s]「那個，堇？」"
1001202-16 = "把腿的肌力……啊，是的，有什麼事呢指導員！"
1001202-17 = "[s]「這個，不會太勉強嗎？」"
1001202-18 = "嗯……確實和以前相比的話，有稍微勉強提升負荷。"
1001202-19 = "如果是以前的我，我想肯定是沒辦法消化的菜單。"
1001202-20 = "不過，現在不一樣。"
1001202-21 = "那個理由是，因，因為有指導員在！"
1001202-22 = "[s]「是，是嗎。但是，我沒有專業的知識。」"
1001202-23 = "沒問題的！"
1001202-24 = "指導員是只要在身邊就能成為力量的存在！"
1001202-25 = "因為擔任了為了不讓我過度訓練，阻止我的職責。"
1001202-26 = "能夠這樣有系統的訓練，都是多虧了指導員。"
1001202-27 = "[s]「那就太好了。」"
1001202-28 = "該，該說「太好了」的是我。"
1001202-29 = "因為和指導員前相遇的我，只是個什麼都不懂的雛鳥而已。"
1001202-31 = "千年．保健室"
1001202-32 = "前幾天"
1001202-33 = "（嘎啦嘎啦）"
1001202-34 = "啊，老師。"
1001202-35 = "[s]「身體如何？」"
1001202-36 = "我沒事！只是輕微的脫水症。"
1001202-37 = "雖然倒下了3次左右，不過現在已經沒事了。"
1001202-38 = "什麼？為什麼變成這樣了，嗎？"
1001202-39 = "那是因為……最近在準備學校的考試，所以坐著不動的時間很長。"
1001202-40 = "所以想增加點運動量，突然進行高強度的訓練似乎是原因。"
1001202-41 = "[s]「就算不用那麼勉強，現在這樣也足夠了吧？」"
1001202-42 = "不。"
1001202-43 = "訓練要每天，持續的，確實的做才行。"
1001202-44 = "不那樣的話……"
1001202-45 = "[s]「不那樣的話？」"
1001202-46 = "就會發生……肌肉的損失！"
1001202-47 = "聽好囉？請想像至今為止培養的肌肉們消失的情況。"
1001202-48 = "是地獄，是苦痛，是絕對不能發生的事！"
1001202-49 = "[s1]「是，是這樣啊。」\n[s2]「冷，冷靜一點。」"
1001202-50 = "啊！不，不好意思。有點興奮了。"
1001202-51 = "啊！不，不好意思。有點興奮了。"
1001202-52 = "呼──……"
1001202-53 = "總之，這是為了防止肌肉損失而不可或缺的事。"
1001202-54 = "[s]「我認為，運動是為了保護健康的東西唷。」"
1001202-55 = "那是當然的，我也那麼認為。"
1001202-56 = "為了那個才像這樣，盡力而為……"
1001202-57 = "[s]「我認為引起脫水症狀，並不健康唷？」"
1001202-58 = "……！"
1001202-59 = "啊，是的，那是……說的，沒錯呢。"
1001202-60 = "不好意思，老師。"
1001202-61 = "哈啊……"
1001202-62 = "明明平常堅守規律在鍛鍊的。"
1001202-63 = "只要稍微急躁的話，就會犯下這樣的失誤。"
1001202-64 = "雖然有想過有誰可以在旁邊看著我就好了……不過身邊也沒有可以拜託的人。"
1001202-65 = "該怎麼辦才好呢。"
1001202-66 = "……"
1001202-67 = "[s3] （提出願意幫助鍛鍊）\n[s4]「準備萬全的指導員，現在於此參上！」"
1001202-68 = "什麼！？"
1001202-69 = "什麼！？"
1001202-70 = "老師願意幫忙嗎？"
1001202-71 = "怎，怎麼會，可以嗎？"
1001202-72 = "非常謝謝您！老師！"
1001202-73 = "不，接下來稱呼為指導員會比較好嗎？"
1001202-74 = "[s5]「嗯，那樣也可以唷。」\n[s6]「就允許妳叫我指導員吧。」"
1001202-75 = "是的！"
1001202-76 = "是的！"
1001202-79 = "好的，那麼！"
1001202-80 = "來開始今天的，鍛鍊吧？"
1001202-81 = "請多多指教，指導員。"

[translation]
1001202-1 = "The Trainer Appears!"
1001202-2 = "Millennium Gym "
1001202-3 = "Oh, Sensei—I mean, Trainer! You're here!"
1001202-4 = "I've been waiting for you."
1001202-5 = "Haha. It still feels unusual to acknowledge you as my trainer."
1001202-6 = "I put together a workout plan like I promised."
1001202-7 = "Would you mind looking over it?"
1001202-10 = "(Sumire handed me her phone. I don't understand a word of what's on it.)"
1001202-12 = "What do you think, Trainer?"
1001202-13 = "Overhead dumbbells are said to be good for developing triceps and other long head muscles."
1001202-14 = "This exercise should add elasticity to my arms, and with these leg extensions, I can..."
1001202-15 = "[s] \"Hey, Sumire?\""
1001202-16 = "...improve leg strength and then... Oh. What is it, Trainer?"
1001202-17 = "[s] \"Don't you think you're overdoing it?\""
1001202-18 = "Well... I won't deny I'm putting more pressure on myself."
1001202-19 = "I probably wouldn't have been able to handle this workout before."
1001202-20 = "But I'm not the same person I used to be."
1001202-21 = "B-Because I have my trainer with me now!"
1001202-22 = "[s] \"R-Really? But I'm still inexperienced when it comes to training.\""
1001202-23 = "That's okay!"
1001202-24 = "You have a track record of helping everyone around you!"
1001202-25 = "I can count on you to stop me from overworking myself."
1001202-26 = "After all, I was able to craft this training program thanks to you."
1001202-27 = "[s] \"I'm happy to help.\""
1001202-28 = "N-No, the pleasure is mine."
1001202-29 = "I was nothing but a beginner until I met you."
1001202-31 = "Millennium Infirmary"
1001202-32 = "Not long ago..."
1001202-33 = "(door opens)"
1001202-34 = "Oh, Sensei."
1001202-35 = "[s] \"How's it going?\""
1001202-36 = "I'm fine! It's just some mild dehydration."
1001202-37 = "I collapsed about three times, but I'll be all right."
1001202-38 = "Huh? How did I become so dehydrated?"
1001202-39 = "Well...it's exam season, so lately I've been spending a lot more time sitting down."
1001202-40 = "I thought I should increase my workout load to make up for that, and I ended up overworking myself. You can probably guess what happened after that."
1001202-41 = "[s] \"Don't you feel like you've been working hard enough?\""
1001202-42 = "Not at all."
1001202-43 = "The key to training is consistency. It's constant and uncompromising."
1001202-44 = "Otherwise..."
1001202-45 = "[s] \"Otherwise...?\""
1001202-46 = "...you experience muscle loss."
1001202-47 = "Don't you get it? All the gains I've made would go away, just like that."
1001202-48 = "That's the worst case scenario. I'll do anything to avoid it!"
1001202-49 = "[s1] \"I-I suppose so.\"\n[s2] \"I get it. I get it.\""
1001202-50 = "O-Oh! Sorry. I got carried away."
1001202-51 = "O-Oh! Sorry. I got carried away."
1001202-52 = "*sigh*"
1001202-53 = "Anyway, that's why I did what I did."
1001202-54 = "[s] \"The point of exercise is staying healthy, Sumire.\""
1001202-55 = "Of course it is. I know that."
1001202-56 = "That's why I try so hard to..."
1001202-57 = "[s] \"Would you call dehydration healthy?\""
1001202-58 = "...?!"
1001202-59 = "No. Of course not. You're right."
1001202-60 = "I'm sorry, Sensei."
1001202-61 = "*sigh*"
1001202-62 = "I normally can keep a regular workout plan."
1001202-63 = "All it took was a little impatience for me to slip up like this."
1001202-64 = "I wish there was someone to spot me...but I don't know who I'd ask."
1001202-65 = "What should I do?"
1001202-66 = "..."
1001202-67 = "[s3] \"I can volunteer my services.\"\n[s4] \"Look no further! I'll train you!\""
1001202-68 = "Come again?!"
1001202-69 = "Come again?!"
1001202-70 = "You want to train me, Sensei?"
1001202-71 = "A-Are you really sure?"
1001202-72 = "Thank you, Sensei!"
1001202-73 = "Wait, should I call you \"Trainer\" from now on?"
1001202-74 = "[s5] \"That's fine with me.\"\n[s6] \"I hereby give you permission to call me Trainer.\""
1001202-75 = "Understood!"
1001202-76 = "Understood!"
1001202-79 = "Well, then!"
1001202-80 = "Should we get started?"
1001202-81 = "I'm counting on you, Trainer."

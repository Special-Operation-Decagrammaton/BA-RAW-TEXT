[translation]
32100-1 = "第10話;第2次特別学力試験（１）"
32100-2 = "本日もお疲れ様でした！"
32100-3 = "明日はついに、第2次特別学力試験です！"
32100-4 = "この一週間の合宿で、私たちはしっかり合格できるだけの実力を身につけられたはずです！"
32100-5 = "うん。"
32100-6 = "はい♡"
32100-7 = "そうねっ！"
32100-8 = "[s] \"うん、本当に頑張ったね。\""
32100-13 = "あとはしっかり試験に合格し……堂々と補習授業部を卒業するだけです。"
32100-14 = "今までの勉強が無駄ではなかったことを、きっちり証明しに行きましょう！"
32100-15 = "そして最後は、みんなで笑ってお別れできるように……！"
32100-19 = "……そうか。合格したら、もうお別れか……。"
32100-20 = "ちょっ、ちょっとアズサ！？どうしてそんな急にしんみりするわけ！？"
32100-21 = "なるほど♡合宿も含めて、何だかんだですごく楽しかったですもんね？"
32100-22 = "……ああ。いや、それでもやっぱり、出会いがあれば別れもある。全ては、虚しいものだ。"
32100-23 = "……そこまで思う必要は無いと思いますよ。アズサちゃんも含めてみんな、試験が終わったらどこかに行ってしまうわけじゃないでしょう？"
32100-24 = "補習授業部が解散しても、みんな同じ学園にいるんですから。会おうと思えばいつでもすぐ会えますよ。"
32100-25 = "ほ、ほら！私はいつも正義実現委員会の教室にいるから！ひ、暇な時があったら来れば……？"
32100-26 = "……うん。"
32100-30 = "えっと、気持ちとしては同じなのですが、取り合えず試験に合格することが先決と言いますか、何だか急に青春ドラマのエンディングになっているような……。"
32100-31 = "と、とにかく。今日は早めに休んで、明日の試験に備えるとしましょう。"
32100-32 = "そういえば、明日の試験会場って前と同じところ？"
32100-33 = "あ、そういえば告知をまだ見ていませんでした。"
32100-34 = "えっと、トリニティの掲示板っと……。"
32100-35 = "……？"
32100-36 = "……え。ええっ！？"
32100-37 = "ヒフミちゃん？どうかしましたか？"
32100-38 = "え、嘘っ！？嘘ですよね！？"
32100-39 = "えぇっと……「補習授業部の『第2次特別学力試験』に関する変更事項のお知らせ」……？"
32100-40 = "「試験範囲を、既存の範囲から約三倍に拡大」……？"
32100-41 = "はぁっ！？何それ！？"
32100-42 = "「また、合格ラインを60点から90点に引き上げとする」……？"
32100-43 = "わ、私でもまだ、90点なんて超えたことないのに……。"
32100-44 = "ど、どういうことよこれ……。"
32100-45 = "昨日、急にアップされたみたいです……試験直前になって、こんな……。"
32100-46 = "[s] \"これは……。\""
32100-50 = "……。"
32100-51 = "……なるほど。私たちの模擬試験の結果を、ナギサさんが何かしらの手段で把握したみたいですね。"
32100-52 = "露骨なやり方ですねぇ……どうしても私たちを退学にしたい、と。"
32100-53 = "……退学？"
32100-54 = "えっ、た、退学！？ちょっとどういうこと！？"
32100-55 = "[s] （……どちらにせよ、そろそろ共有した方が良いかもしれない）"
32100-56 = "そのお話もそろそろお伝えしようと思っていましたが……その前に、他にも変更された部分がありますね。"
32100-57 = "あ、試験会場と時間も変更されてます……試験会場は「ゲヘナ自治区第15エリア77番街、廃墟の1階」……。"
32100-58 = "……ゲヘナ？"
32100-59 = "げ、ゲヘナで試験を受けるんですか！？"
32100-60 = "な、何でよ！？どうしてトリニティの試験をゲヘナで受けるわけ！？"
32100-61 = "もし行かなければ未受験扱いで不合格、ですよね……。"
32100-62 = "そ、それもそうだけど、さっきの退学ってどういうこと！？初耳なんだけど！"
32100-63 = "……。"
32100-64 = "[s] 一から説明をする。"
32100-67 = "試験に三回落ちたら、退学……！？"
32100-68 = "……なるほど。"
32100-69 = "か、隠しててごめんなさい……まさか、こんなことになるなんて……。"
32100-70 = "ど、どうすれば良いの……！？退学になんてなったら、正義実現委員会に復帰できない……！"
32100-71 = "それは……。"
32100-72 = "……状況は理解した、とにかく出発しよう。"
32100-73 = "えっ、えぇっ！？"
32100-74 = "試験時間が「深夜の3時」って書いてある。今から出発しないと間に合わない。"
32100-75 = "あ、確かに……！？"
32100-76 = "驚くにせよ、怒るにせよ、絶望するにせよ……それは、試験を受けてからでも遅くない。"
32100-77 = "障害物の多さに文句を言ったところで、状況が変わるわけじゃない。大切なのは、それでも最後まで足掻くこと。"
32100-79 = "あうぅ……。"
32100-80 = "う、うぅっ……。"
32100-81 = "……そうですね。アズサちゃんの言う通りです。今はとにかく動くしかありません。"
32100-82 = "それにしても、ふふっ……面白そうですね。ゲヘナに試験を受けに行くなんて、初体験です♡"
32100-83 = "ああもう、何もかも意味分かんない！と、とにかく行くのね！？"
32100-85 = "すぐに出発しよう、各自装備を忘れずに。"
32100-86 = "装備！？銃火器ですか！？"
32100-87 = "そうですね。ゲヘナ自治区はただでさえ無法地帯ですし、今は風紀委員会が条約締結前ということもあって対処しきれていないでしょうし……。"
32100-88 = "あ、あうぅ……ど、どうしてこんなことに……。"
32100-94 = "行こう、先生。"
32100-95 = "[s] \"うん。じゃあ、準備ができ次第出発で。\""
32100-98 = "ゲヘナ・スラム街"
32100-99 = "ここからはもう、ゲヘナの自治区ですね……。"
32100-100 = "んー？何だか見慣れないやつらだなぁ？"
32100-101 = "無視とは冷たいねぇ、そんなに急いでどこに行くのさ？"
32100-102 = "わあ、「無法地帯と言えばこれ」みたいな古典的な感じですねぇ。"
32100-103 = "え、えっと、私たちは試験を受けに行く途中でして……。"
32100-104 = "……はぁ？試験？頭大丈夫？"
32100-105 = "ま、まあそうなりますよね……。"
32100-106 = "まっ、理由はどうあれ、ここら一帯を歩くにはうちらの許可が必要なんだよ！"
32100-107 = "ん？よく見たら、この制服……トリニティじゃね？"
32100-108 = "……マジじゃん。ひゅーっ、お金持ちのお嬢様たちがこんなところにねぇ。あれ、ってことはこいつらを攫ったら、身代金がたっぷりもらえるってこと？"
32100-109 = "おおっ、ナイスアイディア！"
32100-110 = "や、やっぱりまたこういう展開に……。"
32100-111 = "……時間の無駄だ。"
32100-117 = "強行突破あるのみ。"

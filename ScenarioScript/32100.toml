32100-45 = "ประกาศนี้เพิ่งอัปเมื่อวานค่ะ... เปลี่ยนเกณฑ์การสอบกะทันหันก่อนสอบ 1 วัน เรื่องแบบนี้เป็นไปได้ยังไง..."

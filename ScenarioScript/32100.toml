32100-105 = "นะ... นั่นสิคะ... ฉันเองก็ไม่เข้าใจค่ะ... "
32100-106 = "ย่านแออัดนี้สัญจรตอนกลางคืนไม่ได้หากไม่ได้รับอนุญาตจากพวกฉัน! ไม่รู้กันหรือไง!"
32100-107 = "เดี๋ยวนะ... ดูจากชุดนักเรียนแล้ว... เด็กทรีนิตี้นี่นา?"
32100-108 = "อะไรนะ? โรงเรียนคนรวยนั่นน่ะเหรอ? งั้นถ้าลักพาตัวไป ก็คงเรียกค่าไถ่ได้เป็นกองน่ะสิ!"
32100-109 = "หึหึหึหึ เป็นความคิดที่ดีเลย!"

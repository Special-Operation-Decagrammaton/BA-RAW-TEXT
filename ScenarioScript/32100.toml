[translation]
32100-1 = "Episode 10;The Second Exam Part 1"
32100-2 = "I think we did exactly what we set out to do today! "
32100-3 = "Now we're all ready for the second exam tomorrow."
32100-4 = "We've been at boot camp for a week now, and I know we have what it takes to pass with flying colors."
32100-5 = "Fine..."
32100-6 = "That's right!"
32100-7 = "Of course!"
32100-8 = "[s] \"Couldn't agree more.\""
32100-13 = "And once we do, we'll all officially graduate from the Make-Up Work Club."
32100-14 = "Let's not let all of that studying go to waste!"
32100-15 = "We're going to end our time together on a high note!"
32100-19 = "I hadn't thought about it, but you're right. We'll have to go our separate ways once we all pass."
32100-20 = "Wh-Why are you getting so sentimental all of a sudden?!"
32100-21 = "We've had a lot of fun together. Are you sad to see it end, Azusa?"
32100-22 = "No. All things come to an end eventually. For every beginning, there is a conclusion."
32100-23 = "You don't have to make it sound so definite. It isn't as though any of us are truly going anywhere even once the club dissolves."
32100-24 = "We'll still be Trinity students, so we can spend time together whenever we want."
32100-25 = "Y-Yeah! You can visit me at the Justice Task Force club room any time."
32100-26 = "Oh."
32100-30 = "It's not like we're living the end of a teen drama and never going to see each other again. And we can worry about hanging out again after we've passed our exams."
32100-31 = "Anyway, why don't we turn in early tonight so that we're rested for tomorrow?"
32100-32 = "Where's the exam going to be held anyway? At the academy's main building?"
32100-33 = "Oh, right. I haven't read the announcement yet."
32100-34 = "Let's see. I just need to check the academy notice board on my phone and..."
32100-35 = "Huh?"
32100-36 = "Wh-What?!"
32100-37 = "Is something wrong?"
32100-38 = "Wh-What's going on?!"
32100-39 = "Let me see... \"Notice of changes made to the second Make-Up Work Club Evaluation Exam\"."
32100-40 = "\"The scope of the exam will be roughly triple that of the first exam.\""
32100-41 = "What?! Why?! "
32100-42 = "\"Additionally, the minimum score needed to receive a passing grade has been raised from a 60 to a 90.\""
32100-43 = "E-Even I've never scored that high before..."
32100-44 = "What the heck is going on?!"
32100-45 = "It looks like this was posted late last night. Why would they make so many sudden changes the day before the exam? "
32100-46 = "[s] \"Only one person could've done this.\""
32100-50 = "..."
32100-51 = "Most likely. Nagisa must have learned how well we did on our recent mock exam somehow."
32100-52 = "This is her sending a message. She's going to find grounds to expel us, no matter the cost."
32100-53 = "Expel?"
32100-54 = "What's this about being expelled?! What are you talking about?!"
32100-55 = "[s] \"(They deserve to know too.)\""
32100-56 = "Right. We can discuss that later, but there's still more to the notice they posted."
32100-57 = "It also says the test location and time have been moved. The new location is...\"Gehenna district, Zone 15-77. Abandoned building, first floor...\""
32100-58 = "Gehenna district?"
32100-59 = "Why are we taking the exam in Gehenna?!"
32100-60 = "That can't be right! Why would a Trinity club be sent there?!"
32100-61 = "And I can only assume we'll be failed automatically if we don't comply."
32100-62 = "A-And we're gonna be expelled if that happens?! This is the first anyone's told me!"
32100-63 = "..."
32100-64 = "[s] Explain the truth."
32100-67 = "We'll be expelled if we fail three exams?"
32100-68 = "...I see."
32100-69 = "I'm sorry we didn't tell you the truth sooner. I never thought things would become this dire..."
32100-70 = "B-But I'll never be able to return to the Justice Task Force if I'm expelled!"
32100-71 = "I'm so sorry, Koharu."
32100-72 = "Thank you for clarifying. I think we should get moving."
32100-73 = "Wh-Where? Why now?"
32100-74 = "The exam time has been changed. It's taking place at 3 AM. We'll have to leave now if we hope to make it in time."
32100-75 = "It's at three in the MORNING?! Really?!"
32100-76 = "There's no time to be shocked or angry. We can save it for after the exam."
32100-77 = "Complaining about the obstacles they've placed in our way won't accomplish anything. I still intend to fight until I can't fight anymore."
32100-79 = "Oh..."
32100-80 = "Uh-oh..."
32100-81 = "She's right. We can't simply give up."
32100-82 = "Think of it as another fun midnight stroll! I've never ventured all the way to Gehenna just to take an exam."
32100-83 = "Have you two lost your minds? This is getting way too weird!"
32100-85 = "Let's depart immediately. Make sure to bring your weapons. "
32100-86 = "Are we going there to fight? I thought we were going to take the exam!"
32100-87 = "Gehenna's district is known to be much more dangerous than Trinity's, and the Prefect Team undoubtedly has its hands busy preparing for the treaty."
32100-88 = "You have to be kidding... Why has it come to this?"
32100-94 = "Please give the order, Sensei."
32100-95 = "[s] \"Gear up, everyone. Let's do this!\""
32100-98 = "Gehenna Backstreets"
32100-99 = "We'll officially be in the heart of the Gehenna district just past here. Not exactly the friendliest neighborhood I've ever been in..."
32100-100 = "Looks like we have some fresh meat! I've never seen YOU around here before!"
32100-101 = "What's the rush? Why are you in such a hurry?"
32100-102 = "This is a little on the nose..."
32100-103 = "W-We're on our way to take an exam."
32100-104 = "What are you talkin' about? What exam?"
32100-105 = "I-I know how it sounds... "
32100-106 = "You can't walk around our turf at night! Who do you think you are?!"
32100-107 = "Wait. Is that a Trinity uniform?"
32100-108 = "You mean that rich academy full of princesses? So we could kidnap 'em and hold 'em for ransom, then?"
32100-109 = "Now you're thinkin'!"
32100-110 = "I was afraid something like this would happen..."
32100-111 = "This is a waste of time."
32100-117 = "Think fast."

[translation]
32100-1 = "第10話;第2次特別學力測驗（１）"
32100-2 = "今天也辛苦大家了！"
32100-3 = "明天終於就是第2次特別學力測驗了！"
32100-4 = "經過這一週的合宿，我們已經培養出能夠順利及格的實力了才對！"
32100-5 = "嗯。"
32100-6 = "沒錯♡"
32100-7 = "對呀！"
32100-8 = "[s] 「嗯，大家都很努力了呢。」"
32100-13 = "接下來只剩下順利在考試中及格……光明正大地從補課部畢業而已了。"
32100-14 = "一起證明至今為止的努力並沒有白費吧！"
32100-15 = "然後大家最後能夠一起笑著道別……！"
32100-19 = "……這樣啊。如果及格的話就要分開了啊……"
32100-20 = "等，等一下，梓！？為什麼突然就沉默了！？"
32100-21 = "原來如此♡畢竟包含合宿在內，各種事情都很快樂對吧？"
32100-22 = "……沒錯。不，就算這樣，有相遇就必定有離別。一切都只是徒勞而已。"
32100-23 = "……我覺得沒有必要這麼想唷。#n包含梓醬在內的大家，也不是考完試就要遠走高飛的對吧？"
32100-24 = "就算補課部解散了，大家一樣還是三一的學生。只要想見的話隨時都能見到的唷。"
32100-25 = "你，你想想看！我一直都會待在實現正義部的教室的！有，有空的話就過來吧……？"
32100-26 = "……嗯。"
32100-30 = "那個，雖然我也是一樣的心情。#n不過還是要先通過考試才行，怎麼突然就變得像青春連續劇的結局一樣了……"
32100-31 = "總，總之今天就早點休息，好好準備明天的考試吧。"
32100-32 = "話說明天的考試會場跟之前一樣嗎？"
32100-33 = "啊，你這麼一說我還沒有看公告呢。"
32100-34 = "我看看，三一的公布欄……"
32100-35 = "……？"
32100-36 = "……咦，咦咦！？"
32100-37 = "日步美醬？怎麼了嗎？"
32100-38 = "咦，騙人！？騙人的吧！？"
32100-39 = "我來看看……「關於補課部『第2次特別學力測驗』變更事項的公告」……？"
32100-40 = "「測驗範圍擴大為原先的三倍」……？"
32100-41 = "蛤！？什麼意思！？"
32100-42 = "「此外，合格標準將由60分提高至90分」……？"
32100-43 = "就，就連我也沒考過90分以上……"
32100-44 = "這，這是怎麼回事啊……"
32100-45 = "好像是昨天突然公布的樣子……竟然在考試前才……"
32100-46 = "[s] 「能做到這件事的人只有一個……」"
32100-50 = "……"
32100-51 = "……原來如此，看來我們模擬考的結果，渚同學也透過某些手段掌握到了吧。"
32100-52 = "還真是露骨的作法呢……無論如何都要讓我們退學的意思嗎。"
32100-53 = "……退學？"
32100-54 = "咦？退，退學！？這又是怎麼回事！？"
32100-55 = "[s] （……事已至此，也是時候該告訴他們了）"
32100-56 = "哎呀，這件事之後會再仔細說明……"
32100-57 = "測驗地點和時間也都改了……#n地點是「格黑娜自治區第15區77號街的廢墟1樓」……"
32100-58 = "……格黑娜自治區！？"
32100-59 = "要，要在格黑娜考試嗎！？"
32100-60 = "為，為什麼啊！？為什麼要在格黑娜考三一的考試！？"
32100-61 = "如果不去的話則視為缺考而不及格，對吧……"
32100-62 = "是，是這樣沒錯，但是剛剛說退學是什麼意思！？我還是第一次聽到有這回事！"
32100-63 = "……"
32100-64 = "[s] 從頭開始說明"
32100-67 = "考試三次不及格的話就會被退學……！？"
32100-68 = "……原來如此。"
32100-69 = "瞞，瞞著你們很對不起……沒想到竟然會變成這樣……"
32100-70 = "怎，怎麼辦才好……！？如果被退學的話就沒辦法回到實現正義部了……"
32100-71 = "這個……"
32100-72 = "……狀況已經明白了，總之先出發吧。"
32100-73 = "咦，咦！？"
32100-74 = "上面寫考試時間是「凌晨3點」。現在不馬上出發會趕不上的。"
32100-75 = "啊，還真的……！？"
32100-76 = "不管是要驚訝也好、生氣也好、絕望也罷……等考試之後再說也不遲。"
32100-77 = "就算再怎麼抱怨，狀況也不會改變。重要的是，即便如此也要拚命掙扎到最後。"
32100-79 = "啊嗚……"
32100-80 = "嗚嗚……"
32100-81 = "……是呢。梓醬說得沒錯，總之現在只能立刻行動了。"
32100-82 = "而且，呵呵……感覺會很有趣呢。去格黑娜考試這還是第一次呢♡"
32100-83 = "啊啊真是的，完全搞不懂了！總，總之要去對吧！？"
32100-85 = "馬上出發吧，別忘了各自的裝備。"
32100-86 = "裝備！？是指槍嗎！？"
32100-87 = "也對，格黑娜自治區本來就是法外之地……#n在條約即將締結的現在，風紀委員會也沒辦法好好處理其他事吧……"
32100-88 = "啊，啊嗚……怎麼會變成這樣……"
32100-94 = "走吧，老師。"
32100-95 = "[s] 「嗯，那準備好就出發吧。」"
32100-98 = "格黑娜．貧民窟"
32100-99 = "從這裡開始就是格黑娜的自治區了吧……"
32100-100 = "哼？總覺得有些沒見過的傢伙呢？"
32100-101 = "無視我們也太冷漠了吧，這麼急是要去哪裡啊？"
32100-102 = "哇，還真有「說到法外地帶就該有這個」的感覺呢。"
32100-103 = "那，那個，我們正要趕去考試……"
32100-104 = "……蛤？考試？你腦袋沒問題吧？"
32100-105 = "果，果然會被這麼覺得呢……"
32100-106 = "算了，不管你們有什麼理由，要在這附近走動可是需要經過我們允許的！"
32100-107 = "嗯？仔細一看，你們的制服……不是三一的嗎？"
32100-108 = "咦？那所有錢人念的學校？#n也就是說只要綁架他們，贖金也會很高對吧？"
32100-109 = "哦哦！真是好主意！"
32100-110 = "果，果然又變成這樣了……"
32100-111 = "……別浪費時間了。"
32100-117 = "強行突破吧。"

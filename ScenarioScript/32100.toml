32100-40 = "เพิ่มเนื้อหาที่จะออกสอบจากเดิมอีก 3 เท่า...?"
32100-41 = "หาาา?! นี่มันกะทันหันมากนะ?!"
32100-42 = "เพิ่มเกณฑ์สอบผ่านจากเดิม 60 คะแนนเป็น 90 คะแนน...?"
32100-43 = "ฉะ... ฉันไม่เคยทำได้ถึง 90 คะแนนมาก่อนเลย... อ่า..."

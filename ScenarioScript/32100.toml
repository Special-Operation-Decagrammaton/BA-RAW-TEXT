[translation]
32100-1 = "ตอนที่ 10;การสอบประเมินครั้งที่ 2 (1)"
32100-2 = "วันนี้ก็ขอบคุณทุกคนนะคะ "
32100-3 = "พรุ่งนี้เราจะได้สอบประเมินครั้งที่ 2 แล้วค่ะ"
32100-4 = "แคมป์ฝึกฝน 1 สัปดาห์ที่ผ่านมาพิสูจน์แล้วว่าเราพัฒนาฝีมือมากขึ้นจนสามารถสอบประเมินผ่านได้#nอย่างไร้ปัญหาค่ะ!"
32100-5 = "อื้อ"
32100-6 = "ได้เลยค่า♡"
32100-7 = "แน่นอนที่สุด!"
32100-8 = "[s] \"ถูกต้องแล้วล่ะ\""
32100-13 = "ตอนนี้สิ่งที่เราต้องทำก็แค่สอบให้ผ่านอย่างมั่นใจ และเรียนจบจากชมรมชั้นเรียนเสริม... แค่เพียงเท่านี้ค่ะ"
32100-14 = "มาพิสูจน์กันค่ะว่าที่เราพยายามเรียนกันมาจะไม่สูญเปล่าค่ะ!"
32100-15 = "มาสู้ไปด้วยกันนะคะ! เราจะได้ยิ้มและบอกลากันได้อย่างภาคภูมิ...!"
32100-19 = "อื้ม... คงต้องเป็นอย่างนั้น ถึงสอบผ่าน แต่ก็คงต้องบอกลากัน..."
32100-20 = "อะ... อะไรเนี่ย? ทำไมจู่ๆ ก็ทำหน้าเศร้าแบบนั้นล่ะอาซึสะ?!"
32100-21 = "ตายจริง♡ อาซึสะจังชอบแคมป์ฝึกฝนนี้สินะคะ? เสียดายที่มันจะจบลงใช่ไหมคะ?"
32100-22 = "ไม่ใช่สักหน่อย มีพบก็ต้องมีจากกันเป็นธรรมดา เพราะทุกอย่างจะสูญเปล่าไงล่ะ..."
32100-23 = "แต่ยังไงทั้งอาซึสะจังและทุกคนที่นี่ก็ไม่ได้จะไปที่ไหนอื่นนี่คะ?"
32100-24 = "พวกเรายังอยู่ในสถาบันทรีนิตี้ เพราะงั้นจะนัดเจอกันใหม่ตอนไหนก็ได้ค่ะ"
32100-25 = "ใช่! ฉันอยู่ที่ห้องชมรมทวงความยุติธรรมตลอดแหละ ถ้าเหงาก็มาหากันได้เลย"
32100-26 = "อื้ม..."
32100-30 = "เอ่อ... นี่มันคือเรื่องที่จะเกิดขึ้นหลังจากที่พวกเราสอบผ่านแล้วนะคะ...#nยังไม่ต้องถ่ายตอนจบของละครวัยรุ่นตอนนี้ก็ได้..."
32100-31 = "เอาล่ะ วันนี้เรามาเข้านอนให้ไวหน่อยเพื่อเตรียมตัวสอบในวันพรุ่งนี้กันเถอะค่ะ"
32100-32 = "พรุ่งนี้เราสอบที่ไหนเหรอ? อาคารหลักของโรงเรียนใช่ไหม?"
32100-33 = "อ๊ะ จริงด้วย ลืมเช็กเรื่องนั้นไปเลยค่ะ"
32100-34 = "ไหนลองเข้าไปที่บอร์ดประกาศของโรงเรียนดูซิ... "

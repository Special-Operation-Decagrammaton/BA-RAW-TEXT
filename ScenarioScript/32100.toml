32100-75 = "คะ?!  ตี 3?!  ...... ตีสามจริงด้วย!"
32100-76 = "จะตกใจ โมโห หรือสิ้นหวัง... ก็เก็บเรื่องพวกนั้นไว้ทำหลังสอบเสร็จเถอะ"
32100-77 = "ถึงจะบ่นว่ามีอุปสรรคมากมายแค่ไหนก็ไม่มีอะไรเปลี่ยนแปลงหรอก สิ่งที่สำคัญตอนนี้ คือการดิ้นรนจนถึงที่สุด"
32100-79 = "อ่า..."
32100-80 = "ฮือออ..."
32100-81 = "จริงสิ... อาซึสะจังพูดถูกค่ะ ตอนนี้เราต้องออกเดินทางแล้วค่ะ"
32100-82 = "น่าสนุกจังเลยนะคะ♡ ฮุฮุฮุ พวกเราจะไปสอบที่เขตปกครองตนเองเกเฮนน่า#nเรื่องแบบนี้จะหาทำได้เมื่อไหร่อีกล่ะคะ"
32100-83 = "อะไรเนี่ย!!  เพี้ยนแล้ว!!  เพี้ยนไปหมดแล้ว!"
32100-85 = "รีบออกเดินทางกันเถอะ ติดอาวุธกันด้วย "
32100-86 = "คะ?!  ตะ... ต้องเตรียมต่อสู้ด้วยเหรอคะ?!  แต่เราแค่ไปสอบนะคะ?!"
32100-87 = "นั่นสินะคะ ก็เขตปกครองตนเองเกเฮนน่าเป็นเขตปลอดกฎหมายนี่คะ#nแถมตอนนี้คณะกรรมการวินัยกำลังยุ่งอยู่กับสนธิสัญญาด้วย..."
32100-88 = "อะ... อ่า... ทำไมถึงกลายเป็นแบบนี้ไปได้..."
32100-94 = "คุณครู ออกเดินทางกันเถอะ"
32100-95 = "[s] \"ได้ งั้นไปกันเลย!\""
32100-98 = "ณ ที่แห่งหนึ่งในย่านแออัดเกเฮนน่า"
32100-99 = "ถ้าข้ามฝั่งนี้ไปก็จะถึงเขตปกครองตนเองเกเฮนน่าค่ะ แต่ว่าที่นี่มัน..."
32100-100 = "ใครกันน่ะ?!  ไม่เคยเห็นหน้ามาก่อนเลย?"
32100-101 = "รีบอะไรขนาดนั้น จะไปไหนกันเหรอ? หึหึหึ"
32100-102 = "นี่สินะเขตปลอดกฎหมาย... ในที่สุดก็เจอเรื่องแบบนี้จนได้"
32100-103 = "อ่า... เอ่อ... พะ... พวกฉันกำลังเดินทางไปสอบ..."

32100-70 = "ทะ... ทำไมต้องทำแบบนี้ล่ะ?!  ถะ... ถ้าถูกไล่ออกฉันก็กลับชมรมทวงความยุติธรรมไม่ได้น่ะสิ!!"
32100-71 = "คือว่า..."

32100-50 = "......."
32100-51 = "ดูเหมือนว่าผลการสอบเสมือนจริงของเราจะตกไปอยู่ในมือคุณนางิสะเข้าให้แล้วนะคะ"
32100-52 = "ข้อความมันชัดเจนมากค่ะ รู้สึกได้ถึงความตั้งใจแน่วแน่ที่จะไล่พวกเราออกจากโรงเรียนเลย"

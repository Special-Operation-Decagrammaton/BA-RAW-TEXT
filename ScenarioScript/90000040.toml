[translation]
90000040-1 = "#title;제5화;정보수집 4 - 비나"
90000040-2 = "#wait;1500"
90000040-3 = "#wait;1000"
90000040-4 = "3;히마리;99\n#3;a\n#wait;1200"
90000040-5 = "3;히마리;07;……오래 기다리셨어요. 비나의 움직임을 예측한 알고리즘이 완성되었어요.\n#3;em;[반응]"
90000040-6 = "3;히마리;08;비나가 출몰한 좌표 데이터를 정규화해서 출현 패턴을 분석, 가장 조우 가능성이 높은 구역들을 지정했습니다."
90000040-7 = "1;에이미;02;응. 고생했어. 부장. 그럼 이쪽으로 가면 비나를 만날 수 있는 거야?\n#1;em;[?]\n#1;a\n#3;m5"
90000040-8 = "3;히마리;01;네. 아마 확률은 90% 이상이에요."
90000040-9 = "3;히마리;07;하지만 우리가 그쪽의 행동을 예측하기 시작했다는 것을 알게 되면, 패턴을 변경할 수도 있으니 기회는 단 한 번뿐."
90000040-10 = "3;히마리;99;빠르게 비나와 조우해서 그의 데이터를 수집합니다."
90000040-11 = "3;히마리;03;이제부터는 에이미, 그리고 선생님의 차례예요.\n#3;em;[반응]"
90000040-12 = "1;에이미;05;오케이. 그럼 출동이네."
90000040-13 = "[s] \"시작해볼까.\""
90000040-14 = "#wait;500"

[translation]
90000040-1 = "第5話;蒐集情報(4)薇娜"
90000040-5 = "……讓你們久等了。#n預測薇娜動向的演算法已經完成。"
90000040-6 = "它能夠以薇娜的座標資訊來分析出沒模式，找出遭遇機率最高的區域。"
90000040-7 = "嗯，辛苦了，部長。#n所以去那邊就能見到薇娜了嗎？"
90000040-8 = "是的，我認為能遭遇的機率在90%以上。"
90000040-9 = "不過要是對方察覺我們正在預測他們的行動，之後很可能會改變行動模式……#n因此機會只有一次。"
90000040-10 = "迅速與薇娜接觸並蒐集情報吧。"
90000040-11 = "接下來就交給英美和老師了。"
90000040-12 = "沒問題，那我們出動吧。"
90000040-13 = "[s] 「好，走吧。」"

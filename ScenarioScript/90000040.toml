[translation]
90000040-1 = "ตอนที่ 4; รวบรวมข้อมูล 4 - บีนาห์"
90000040-5 = "...รอนานเลยสินะคะ อัลกอริทึมสำหรับคาดการณ์การเคลื่อนไหวของบีนาห์เสร็จสมบูรณ์แล้วค่ะ"
90000040-6 = "ฉันได้นำข้อมูลพิกัดที่บีนาห์ปรากฏตัวขึ้นมาวิเคราะห์รูปแบบในการปรากฏตัวและสามารถระบุตำแหน่ง#nที่บีนาห์มีโอกาสปรากฏตัวมากที่สุดได้แล้วค่ะ"
90000040-7 = "อืม เหนื่อยหน่อยนะหัวหน้า ถ้าไปตรงนี้ก็จะเจอบีนาห์ใช่มั้ย?"
90000040-8 = "ใช่ค่ะ มีความเป็นไปได้มากกว่า 90% ค่ะ "
90000040-9 = "แต่ถ้าทางนั้นรู้ว่าเราสามารถคาดเดาการเคลื่อนไหวได้แล้ว รูปแบบก็อาจจะเปลี่ยนไปอีก เพราะแบบนั้นก็เลยมีโอกาสแค่ครั้งเดียวเท่านั้นค่ะ"
90000040-10 = "ดังนั้นเราควรรีบไปเจอกับบีนาห์และรวบรวมข้อมูลมาค่ะ "
90000040-11 = "ต่อจากนี้ไปก็เป็นหน้าที่ของเอมิและคุณครูแล้วนะคะ"
90000040-12 = "โอเค ถ้างั้นก็ออกปฏิบัติการกันเถอะ "
90000040-13 = "[s] \"เริ่มกันเลยมั้ย\""

[translation]
2601003-1 = "留住回憶的方法"
2601003-3 = "（出來散步散散心時，在海邊看見了正在忙東忙西的美優）"
2601003-9 = "[ns1]「你好呀，美優。」\n[ns2]「你在這裡做什麼呢？」"
2601003-13 = "……咦，咦咦……？#n老，老師……你怎麼會在這裡……？"
2601003-14 = "原來如此，因為在遠處看到我所以……"
2601003-15 = "我的話，那個，就跟平常一樣……在……"
2601003-16 = "……撿小石頭。"
2601003-17 = "[s]「有找到什麼特別的石頭嗎？」"
2601003-18 = "雖然沒什麼特別的……#n不過在山上裡找到的小石頭，跟這裡完全不一樣。"
2601003-19 = "不管是形狀、模樣或是觸感……都有著各自的個性……"
2601003-20 = "難得來到海邊……我想說如果能撿幾個漂亮的石頭就好了呢～這樣……"
2601003-21 = "所以才會找到入迷……好像讓老師擔心了，對不起……"
2601003-22 = "……咦？#n老師也想一起找嗎？"
2601003-23 = "我不覺得是件有趣的事，也沒有什麼價值，為什麼還要……"
2601003-24 = "[s3]「因為是美優喜歡的事情。」\n[s4]「是找出美優喜歡的石頭的機會！」"
2601003-27 = "就，就算不做到這種程度也……"
2601003-28 = "不過……既然，老師都這麼說了……"
2601003-29 = "就，就拜託你了……"
2601003-31 = "（之後，和美優一起四處收集了小石頭）"
2601003-32 = "（找出美優可能會喜歡的那種不起眼卻有著樸素魅力的石頭，並集中到了一個地方）"
2601003-34 = "感覺這附近大致上都找過了。#n唔嗯……"
2601003-35 = "……老師有找到什麼嗎……？"
2601003-36 = "[s] 遞出收集來的石頭"
2601003-37 = "謝，謝謝你……"
2601003-41 = "……！！"
2601003-42 = "老師……！#n你……你是怎麼找到這麼剛好的小石頭的……！！"
2601003-43 = "沒錯，就是這種感覺……！#n我就是在找這種石頭！不管是大小還是外觀都……！"
2601003-44 = "咦，咦？#n……這個也是老師找到的嗎？哇，真漂亮……"
2601003-45 = "什，什麼……這個也是……啊，那個也是！"
2601003-46 = "…………"
2601003-47 = "……老師……"
2601003-48 = "該不會……你在某處擔任「鑑定師」之類的工作……"
2601003-49 = "[s5]「沒有哦。不過你能喜歡真是太好了。」\n[s6]「美優能夠喜歡，我的努力也值得了。」"
2601003-52 = "是……每個都真的非常棒……讓人煩惱該拿走哪一個呢……"
2601003-53 = "例如……這顆石頭，或許是因為被海浪侵蝕，大小和顏色都是隨處可見的那種……"
2601003-54 = "而這顆……雖然少見的有著像油漆刷上去的紅色，#n卻有能夠融入周圍環境的神奇氛圍……"
2601003-55 = "至於這顆，儘管形狀莫名地吸引人，卻給人一種公園裡也會有的印象……"
2601003-56 = "[s]「小石頭還真是深奧啊……」"
2601003-57 = "嗚……該選哪個才好呢……"
2601003-58 = "……老，老師……可以幫我選嗎？"
2601003-62 = "[ns7]「……知道了。交給我吧。」\n[ns8] 選出美優感覺會喜歡的石頭"
2601003-66 = "（就這樣和美優面對面，目不轉睛地盯著排在地上的石頭）"
2601003-73 = "（……結果直到晚上都沒辦法決定，只好暫時先把收集的石頭全部帶回去）"

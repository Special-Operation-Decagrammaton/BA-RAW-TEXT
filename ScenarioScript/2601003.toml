2601003-31 = "#na;(이후, 미유와 함께 주변에서 여러 가지 조약돌들을 골라 줍기 시작했다.)"
2601003-32 = "#na;(미유의 취향에 맞게, 튀지 않지만 소박한 매력이 있는 돌을 찾아서 한데 모아 두었다……)"
2601003-33 = "3;미유 수영복;01"
2601003-34 = "3;미유 수영복;00;이제 이 주변은 꽤 둘러본 것 같은데요. 으음…….\n#3;em;…"

[translation]
2601003-1 = "How to Make Memories"
2601003-3 = "While going for a walk, I bumped into Miyu, who was busying herself on the beach."
2601003-9 = "[ns1] \"Hi, Miyu.\"\n[ns2] \"What are you up to this fine day?\""
2601003-13 = "A-Ah... S-Sensei...? Why are you...?"
2601003-14 = "Oh, you saw me in the d-distance...and wanted to say hi?"
2601003-15 = "I'm just, uh, doing my usual...thing..."
2601003-16 = "...I'm picking up pebbles."
2601003-17 = "[s] \"Have you found any interesting ones?\""
2601003-18 = "N-Nothing too interesting, it's just...the stones you find on the beach are different from the ones in the mountains..."
2601003-19 = "The weathering, the textures, the characteristics... They have their own personalities, almost..."
2601003-20 = "I figured, since we're out here, I might pick up some pretty beach stones..."
2601003-21 = "So I'm not up to anything, really... I hope I didn't worry you..."
2601003-22 = "Y-You want to look for pebbles...with me...?"
2601003-23 = "I'm not looking for anything special...or valuable... So I don't know why you would..."
2601003-24 = "[s3] \"If nothing else, it'll help me get to know you better.\"\n[s4] \"It's a challenge to see if I can find your favorite stone!\""
2601003-27 = "A-Ah, I don't think it's anything like that..."
2601003-28 = "But... If you really want to keep me company, then..."
2601003-29 = "Thank you..."
2601003-31 = "Miyu and I started picking out various pebbles."
2601003-32 = "With Miyu in mind, I looked for pebbles that didn't have any obvious sparkle, but had charming little quirks instead..."
2601003-34 = "We've been looking around for a while now. Hmm..."
2601003-35 = "Sensei, did you find any good ones...?"
2601003-36 = "[s] Hand over the pebbles."
2601003-37 = "Oh, ah. Thank you..."
2601003-41 = "...!"
2601003-42 = "Sensei! How did you...! These are perfect!"
2601003-43 = "Yes, this is just what I...! I was looking for pebbles just like these! They're the right size, the right shape...!"
2601003-44 = "Oh, oh, and look at this one...! It's amazing..."
2601003-45 = "N-No, this one... Oh, and this one too... All of them!"
2601003-46 = "..."
2601003-47 = "Sensei..."
2601003-48 = "In another life...were you...a stone appraiser...?"
2601003-49 = "[s5] \"I guess I picked well.\"\n[s6] \"I'm glad you like them, Miyu.\""
2601003-52 = "Yes... I like them all so much... I don't know how to choose which ones to keep..."
2601003-53 = "Like this one... It was carved by the ocean waves, smoothing it until it was a perfect, round little pebble..."
2601003-54 = "And this one has an unusual red tint, almost like paint, but it still blends in perfectly with its surroundings..."
2601003-55 = "Oh, and look at this pebble! It's obviously a rare mineral, but it looks so familiar, as if you saw it at the park the other day..."
2601003-56 = "[s] \"You, uh, really thought this through.\""
2601003-57 = "Hmm... Which pebbles to choose..."
2601003-58 = "C-Can you choose for me, Sensei?"
2601003-62 = "[ns7] \"Leave it to me!\"\n[ns8] Stare at the stones with all your might."
2601003-66 = "I squatted down next to Miyu and carefully evaluated the pebbles gathered on the ground."
2601003-73 = "...In the end, we decided to gather all of them up and add them to her collection."

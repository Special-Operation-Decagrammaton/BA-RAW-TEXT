2601003-53 = "3;미유 수영복;03;예를 들자면 이 돌은 바닷가에서 파도를 받아 깎인 몽돌로 크기나 색이 정석에 가깝고……"
2601003-54 = "3;미유 수영복;11;또 이 돌은 페인트가 묻은 것처럼 붉은색이 감도는 특이한 돌이지만, 그러면서도 주변 환경에 녹아들어 눈에 띄지 않는 것이 굉장한 포인트고……"
2601003-55 = "3;미유 수영복;03;또 이 돌은 분명 희귀한 성질을 지녔는데도, 마치 공원에서 어제 보고 온 것처럼 낯익은 인상을 준다는 게 대단히……\n#3;em;[반짝]"

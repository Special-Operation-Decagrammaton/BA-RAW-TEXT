2601003-12 = "2;미유 수영복;03\n#2;em;…\n#wait;2500"
2601003-13 = "2;미유 수영복;10;……어, 어어……? 서, 선생님……? 어째서 이곳에……?\n#2;em;[속상함]"
2601003-14 = "2;미유 수영복;02;멀리서 제 모습을 보고 찾아오셨다고요……? ……대단하시네요.\n#2;m3"
2601003-15 = "2;미유 수영복;00;저는 그러니까, 평소에 하던 것처럼…… 어……\n#2;em;…"
2601003-16 = "2;미유 수영복;99;……조약돌을 줍고 있었어요."
2601003-17 = "[s] \"뭔가 재미있는 조약돌이라도 찾았어?\""
2601003-18 = "2;미유 수영복;02;특별한 돌을 찾는 건 아니지만…… 산에서 자주 보이는 돌과 바닷가에서 자주 보이는 돌은 완전히 다르거든요."
2601003-19 = "2;미유 수영복;99;마모된 형태도 그렇고, 질감과 같은 성질 등이……. 개성처럼 차이가 나서……."
2601003-20 = "2;미유 수영복;04;그래서 그냥……. 이왕 바닷가에 왔으니, 이곳에 있는 예쁜 돌을 몇 개 좀 주워 가면 어떨까…… 싶어서……."
2601003-21 = "2;미유 수영복;07;찾다 보니, 조금 들떠서……. 선생님을 신경 쓰시게 만든 것 같아서 죄송하네요……\n#2;em;[세로선]"
2601003-22 = "2;미유 수영복;00;……네? 선생님도 같이 조약돌을 찾고 싶으시다고요?"
2601003-23 = "2;미유 수영복;04;특별한 돌을 찾고 있는 것도 아니고, 가치가 있는 것도 아닌데 어째서……"
2601003-24 = "[s3] \"이제는 미유에 대해서 잘 이해하고 있으니까.\"\n[s4] \"미유의 마음에 드는 돌을 고르는 도전이야!\""
2601003-25 = "#wait;100"
2601003-26 = "#wait;100"
2601003-27 = "2;미유 수영복;00;도, 도전이라니. 그런 느낌의 활동은 아니라고 생각하지만…….\n#2;em;[땀]\n#2;stiff"
2601003-28 = "2;미유 수영복;99;그래도……. 선생님께서 함께 해주신다면…….\n#3;em;…"
2601003-29 = "2;미유 수영복;01;잘 부탁드립니다…….\n#2;greeting"

[translation]
2601003-1 = "กลวิธีสร้างความทรงจำ"
2601003-3 = "(คุณครูออกมาเดินเล่นที่ชายหาด และบังเอิญเจอกับมิยุที่กำลังยุ่งอยู่กับการทำอะไรบางอย่าง)"
2601003-9 = "[ns1] \"ว่าไง มิยุ\"\n[ns2] \"ทำอะไรอยู่เหรอ?\""
2601003-13 = "...เอ๋ เอ๋...? คะ...คุณครู...? ทำไมถึงมาอยู่ที่นี่ได้คะ...?"
2601003-14 = "พอดีเห็นฉันจากที่ไกลๆ ก็เลยแวะมาดูงั้นเหรอคะ...? สุดยอดเลยนะคะ"
2601003-15 = "ฉันก็แค่... กำลังเก็บก้อนกรวด... เอ่อ..."
2601003-16 = "แบบที่เคยทำตามปกติน่ะค่ะ"
2601003-17 = "[s] \"เจอก้อนกรวดที่น่าสนใจบ้างรึเปล่า?\""
2601003-18 = "ยังไม่เจอก้อนไหนที่พิเศษเลยค่ะ แต่ว่า... ก้อนกรวดที่ทะเลดูต่างจากก้อนกรวดที่เห็นบ่อยๆ บนภูเขา#nเลยนะคะ"
2601003-19 = "ทั้งรอยสึกหรอ และเนื้อสัมผัสของก้อนหิน... แต่ละก้อนก็มีเอกลักษณ์ต่างกันทั้งนั้นเลย..."
2601003-20 = "เพราะงั้น... ไหนๆ ก็มาทะเลแล้ว ฉันก็เลยคิดว่าจะเก็บหินสวยๆ จากทะเลไปสักสักสองสามก้อน... น่ะค่ะ..."
2601003-21 = "พอลองมาเดินดูก็รู้สึกตื่นเต้นนิดหน่อย... ขอโทษที่ทำให้คุณครูเป็นห่วงนะคะ......"
2601003-22 = "...คะ? คุณครูก็อยากลองเก็บก้อนกรวดด้วยเหรอคะ?"
2601003-23 = "ฉันไม่ได้หาหินพิเศษ หรือว่าหินราคาแพงอยู่แท้ๆ ทำไมคุณครูถึง..."
2601003-24 = "[s3] \"ตอนนี้ครูเข้าใจมิยุมากขึ้นแล้วนี่นา\"\n[s4] \"ครูจะทำชาเล้นจ์หาหินที่มิยุชอบให้เจอ!\""
2601003-27 = "งะ...งั้นเหรอคะ ฉะ...ฉันไม่คิดว่ามันจะเป็นชาเล้นจ์อะไรหรอกนะคะ..."
2601003-28 = "แต่ว่าถ้าคุณครูอยากจะมาเก็บด้วยกันละก็......"
2601003-29 = "ขอรบกวนด้วยนะคะ..."
2601003-31 = "(หลังจากนั้น คุณครูกับมิยุก็เริ่มเดินเก็บก้อนกรวดที่อยู่ในบริเวณรอบๆ ด้วยกัน)"
2601003-32 = "(คุณครูเลือกเก็บหินที่ดูสวยงามแบบเรียบๆ ตามสไตล์ที่มิยุชอบมากองรวมกันไว้...)"
2601003-34 = "ดูเหมือนจะเดินดูรอบๆ มานานพอสมควรแล้วนะคะ อืม..."
2601003-35 = "...คุณครูคะ เจอบ้างมั้ยคะ...?"
2601003-36 = "[s] ยื่นก้อนกรวดที่เก็บมาได้ให้มิยุ"
2601003-37 = "อ๊ะ อ่า... ขอบคุณค่ะ..."
2601003-41 = "...!!"
2601003-42 = "คุณครูคะ...!! ทะ...ทำไมถึงเจอหิน...ที่พอดีขนาดนี้...!!"
2601003-43 = "ใช่แล้วค่ะ ฉันกำลังหาก้อนกรวดที่ให้สัมผัสแบบนี้แหละค่ะ...! ทั้งขนาดและรูปลักษณ์ภายนอกก็#nพอเหมาะดีด้วยค่ะ...!"
2601003-44 = "อะ...เอ๋? ก้อนนี้ก็ด้วย... คุณครูเป็นคนเจอหินก้อนนี้ด้วยเหรอคะ? ก้อนนี้ก็สวยมากเลยค่ะ..."
2601003-45 = "ดะ...เดี๋ยวนะคะ... ก้อนนี้ด้วย... ก้อนนี้ก็ด้วย... ทุกก้อนเลย...!"
2601003-46 = "......"
2601003-47 = "...คุณครูคะ..."
2601003-48 = "คือว่าช่วงนี้... รับงานเสริมเป็น <นักตรวจสอบหิน> อยู่รึเปล่าคะ..."
2601003-49 = "[s5] \"ถูกใจจริงๆ ด้วยสินะ...\"\n[s6] \"ค่อยยังชั่วหน่อยที่มิยุชอบ\""
2601003-52 = "คะ... แต่ว่าตอนนี้ฉันรู้สึกชอบทุกอันจนไม่รู้ว่าจะเอาอันไหนกลับไปดีเลยละค่ะ..."
2601003-53 = "อย่างเช่น หินก้อนนี้ถูกคลื่นซัดบ่อยๆ เลยมีขนาดที่ใกล้เคียงกับก้อนกรวดทั่วไป..."
2601003-54 = "ส่วนหินก้อนนี้ก็มีลายจุดแดงๆ คล้ายกับทาสีเอาไว้ ถึงจะดูเป็นจุดเด่นก็จริง แต่อีกมุมหนึ่งก็กลมกลืน#nกับสภาพแวดล้อมรอบๆ ด้วย..."
2601003-55 = "แล้วก็หินก้อนนี้ดูเป็นหินที่หายากมากๆ แต่ก็ให้ความรู้สึกเหมือนก้อนหินที่เห็นบ่อยๆ ที่สวนสาธารณะ..."
2601003-56 = "[s] \"ลึกซึ้งกว่าที่คิดนะเนี่ย......\""
2601003-57 = "อืม... ต้องเลือกหินก้อนไหนดี..."
2601003-58 = "คะ...คุณครูช่วยเลือกให้หน่อยได้มั้ยคะ?"
2601003-62 = "[ns7] \"ได้เลย... เดี๋ยวครูเลือกให้เอง\"\n[ns8] วอร์มลูกตาและจ้องไปที่หิน"
2601003-66 = "(จากนั้นคุณครูก็นั่งยองๆ ลงแล้วนั่งจ้องหินอยู่กับมิยุอยู่แบบนั้น)"
2601003-73 = "(...แต่ว่าจนเวลาผ่านไปจนถึงตอนเย็นก็ยังเลือกหินไม่ได้ จนต้องตัดสินใจเก็บกลับไปทั้งหมด...)"

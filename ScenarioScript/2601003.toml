2601003-42 = "3;미유 수영복;03;선생님……! 어떻게 이렇게…… 딱 맞는 돌들을……!!\n#3;em;[반응]"
2601003-43 = "3;미유 수영복;03;네, 이 느낌이에요……! 이런 느낌의 돌들을 찾고 있었어요! 크기도 외관도 너무 좋아요……!"
2601003-44 = "3;미유 수영복;02;어, 어라? 이것도……. 이것도 선생님께서 찾으신 건가요? 이것도 너무 좋은데……."

[translation]
1007105-1 = "SRT, Scout!"
1007105-4 = "Oh, Sensei. You're here early."
1007105-5 = "[s1] \"So are you.\"\n[s2] \"Were you waiting for me?\""
1007105-8 = "Well..."
1007105-9 = "I was so excited to visit the mysterious island, I ended up coming earlier than we were supposed to."
1007105-10 = "As a squad leader of the SRT, it's a disgrace that I can't even keep a time table..."
1007105-11 = "[s3] \"I know how you feel.\"\n[s4] \"It's like... coming to school early on field trip day.\""
1007105-16 = "Haha... I suppose so."
1007105-17 = "Anyway, look at this. The water disappeared due to low tide."
1007105-18 = "This huge coastline dries up twice a day, and then the ocean comes back to cover it all up again..."
1007105-19 = "I've been watching the rivers and oceans since we've been here. SRT feels so powerless in comparison."
1007105-23 = "...I'm sorry. I was rambling."
1007105-27 = "Shall we continue on? This section of the beach won't be exposed for long."
1007105-28 = "Watch your step. The path is slippery from the piled-up mud."
1007105-32 = "Miyako and I crossed the drained tidal flat to the island."
1007105-34 = "Wow... It's as beautiful as I'd heard."
1007105-35 = "This is truly untouched nature. The trees are so lush..."
1007105-36 = "How could such a remote island be so beautiful?"
1007105-37 = "No, it's probably because it's so remote that its beauty hasn't been spoiled."
1007105-41 = "Sensei, would you mind coming with me to the cliffs over there on the shore?"
1007105-42 = "I'd like to see what kinds of flowers grow there."
1007105-43 = "[s] \"Sure. Let's go.\""
1007105-44 = "Hahaha... What a nice little feeling. It's good for one's spirits."
1007105-49 = "But when we returned to the beach after looking at the flowers..."
1007105-56 = "Ah..."
1007105-57 = "[s] \"The path back is under water...\""
1007105-58 = "I was so busy with the flowers...that I forgot about the tide."
1007105-59 = "We won't be able to walk about."
1007105-60 = "I apologize, Sensei. I was being childish..."
1007105-61 = "[s5] \"Don't worry about it.\"\n[s6] \"It's not your fault, Miyako.\""
1007105-64 = "But I didn't even think to bring a spare battery, since I didn't think we'd be here so long..."
1007105-65 = "It's ten hours until the next low tide. What are we going to do?"
1007105-66 = "[s] \"Well, I didn't have any plans today, anyway.\""
1007105-68 = "[ns] \"Let's treat this as a break. We can relax until then.\""
1007105-70 = "...All right!"
1007105-73 = "About an hour later..."
1007105-76 = "(Sensei asked me to relax, but I can't stop watching the shoreline, waiting for low tide...)"
1007105-77 = "(I've had enough of the islands scenery...)"
1007105-78 = "(There must be something we can do...)"
1007105-83 = "Huh? I felt something move in the grass..."
1007105-87 = "Are there animals on the island?"
1007105-95 = "This is..."
1007105-96 = "[ns] \"It's a rabbit.\""
1007105-97 = "A rabbit..."
1007105-105 = "Oh, there's another one. And another... There are dozens of them."
1007105-109 = "Oh, they're cute. And they don't seem to be afraid of us."
1007105-110 = "But why would a remote island like this have so many rabbits?"
1007105-111 = "[s] \"Maybe they swam?\""
1007105-112 = "That can't be. Rabbits are afraid of water."
1007105-113 = "But this island is too small to support a rabbit population, and I can't think of why someone would release them here..."
1007105-117 = "If I had to guess, I'd say..."
1007105-118 = "...Maybe they're lost."
1007105-119 = "[s] \"How do you figure that?\""
1007105-120 = "They probably wandered here during low tide, like we did, and got stuck here when the water came in."
1007105-121 = "[s] \"But this many of them?\""
1007105-122 = "Well, maybe..."
1007105-123 = "...Maybe it was just two rabbits at first."
1007105-124 = "With no predators and plenty of grass to eat, they must have settled down, started a family, and populated the island."
1007105-125 = "When they first arrived, it must have been so lonely. But thanks to the hard work of those first two, now it's a rabbit paradise."
1007105-131 = "Like those two rabbits, who created their own heaven by relying on each other..."
1007105-132 = "If I had a partner, I wouldn't be afraid of any strange place."
1007105-134 = "We had a great time taking care of the rabbits until the beach path opened up."

[translation]
1007105-1 = "SRT ปฏิบัติการสำรวจ!"
1007105-4 = "อ๊ะ มาแล้วเหรอคะ คุณครู..."
1007105-5 = "[s1] \"มาเร็วกว่าที่คิดนะ มิยาโกะ\"\n[s2] \"รอนานรึเปล่า?\""
1007105-8 = "เอ่อ..."
1007105-9 = "ฉันตื่นเต้นที่จะได้ไปเห็นเกาะลึกลับนั่นด้วยตาของตัวเอง ก็เลยออกมาเร็วกว่ากำหนดนิดหน่อยค่ะ"
1007105-10 = "ในฐานะหัวหน้ากองทหารของ SRT การที่ฉันมาให้ตรงเวลาไม่ได้ นับเป็นเรื่องที่เสื่อมเสียอย่างยิ่งค่ะ"
1007105-11 = "[s3] \"ครูเข้าใจความรู้สึกมิยาโกะดีนะ\"\n[s4] \"มันก็เหมือนวันที่ได้ไปปิกนิกนอกโรงเรียน เราก็จะอยากไปโรงเรียนเร็วขึ้นไง\""
1007105-16 = "ฮิฮิ... นั่นสินะคะ"
1007105-17 = "นอกจากนั้นแล้ว ฉันได้ยินมาจากพวกชาวบ้านด้วยค่ะ ว่าพอถึงเวลาน้ำลง น้ำทะเลก็จะหายไป#nเหมือนเรื่องโกหกเลยค่ะ"
1007105-18 = "น้ำทะเลที่ชายหาดกว้างใหญ่แบบนี้จะเหือดแห้งไปวันละสองครั้ง แล้วก็กลับมาเป็นทะเลที่กว้างใหญ่อีก..."
1007105-19 = "ถึงจะเป็นกองกำลังพิเศษ SRT แต่เวลาที่เห็นคลื่นในแม่น้ำหรือคลื่นในทะเล ก็รู้สึกเหมือนไร้#nอำนาจไปเลยเมื่ออยู่ต่อหน้าธรรมชาติที่ยิ่งใหญ่ค่ะ"
1007105-23 = "ขอโทษค่ะ ฉันพูดอะไรเรื่อยเปื่อยอีกแล้ว"
1007105-27 = "ช่วงเวลาที่น้ำลงเป็นแค่ช่วงสั้นๆ... พวกเรารีบไปกันดีเลยดีมั้ยคะ?"
1007105-28 = "คุณครูคะ ตรงทางเดินมีโคลนอยู่ มันลื่นมากๆ เลย ระวังล้มนะคะ"
1007105-32 = "(คุณครูกับมิยาโกะเดินข้ามเส้นทางพื้นโคลนไปยังเกาะ)"
1007105-34 = "ว้าว... สวยเหมือนที่เขาลือกันจริงๆ ด้วยค่ะ"
1007105-35 = "อาจเป็นเพราะพื้นที่บนเกาะยังไม่ถูกคนรุกล้ำเข้าไป ทั้งต้นไม้และพุ่มไม้ต่างๆ เลยดูอุดมสมบูรณ์มาก"
1007105-36 = "คิดไม่ถึงเลยว่าเกาะที่อยู่ห่างไกลจะซ่อนทิวทัศน์ที่สวยงามแบบนี้เอาไว้..."
1007105-37 = "ไม่สิ คงเพราะไม่ใช่สถานที่ที่เป็นที่รู้จักแพร่หลาย เกาะนี้เลยยังรักษาทิวทัศน์ที่งดงามไว้ได้สินะคะ"
1007105-41 = "คุณครูคะ พวกเราลองไปดูตรงหน้าผาริมชายฝั่งด้านนั้นกันดีมั้ยคะ?"
1007105-42 = "ฉันอยากไปดูว่าบนหน้าผาจะมีดอกไม้อะไรบานอยู่หรือเปล่าน่ะค่ะ"
1007105-43 = "[s] \"ได้สิ ไปกันเถอะ\""
1007105-44 = "ฮิฮิ... ไม่รู้ว่าเป็นเพราะไม่ได้ออกมาข้างนอกนานรึเปล่า เลยรู้สึกตื่นเต้นนิดหน่อยค่ะ"
1007105-49 = "(แต่ว่าพอคุณครูกับมิยาโกะกลับมาที่ชายหาด หลังไปชมดอกไม้บนหน้าผามา...)"
1007105-56 = "เอ๊ะ เอ๋...?"
1007105-57 = "[s] \"น้ำขึ้นจนปิดทางเดินไปแล้วแฮะ...\""
1007105-58 = "ฉันมัวแต่ดูดอกไม้เพลิน... จนลืมเวลาน้ำขึ้นน้ำลงไปเลยค่ะ"
1007105-59 = "แบบนี้ก็คงกลับไปที่หมู่บ้านไม่ได้สินะคะ"
1007105-60 = "ขอโทษนะคะคุณครู เพราะฉันเอาแต่ใจตัวเอง..."
1007105-61 = "[s5] \"ไม่เป็นไรหรอก ไม่ต้องคิดมากนะ\"\n[s6] \"มิยาโกะไม่ได้ทำอะไรผิดสักหน่อย\""
1007105-64 = "แต่ว่า... ฉันคิดว่าจะมาแค่แป๊บเดียวแล้วก็กลับไปที่หมู่บ้าน เลยไม่ได้พกแบตเตอรี่สำรองมาด้วยค่ะ..."
1007105-65 = "ถ้าจะรอจนถึงเวลาน้ำลงครั้งหน้าละก็ คงจะต้องรออีกประมาณ 10 ชั่วโมงเลย แบบนี้จะทำยังไงดีล่ะคะ?"
1007105-66 = "[s] \"ยังไงวันนี้ครูก็ไม่มีงานอะไรเป็นพิเศษอยู่แล้ว...\""
1007105-68 = "[ns] \"คิดซะว่าเป็นเวลาพักผ่อน แล้วมานั่งรอแบบสบายๆ กันดีกว่า\""
1007105-70 = "....ค่ะ!"
1007105-73 = "(1 ชั่วโมงต่อมา...)"
1007105-76 = "(...ถึงคุณครูจะบอกว่าให้นั่งรอแบบสบายๆ แต่พอต้องมานั่งรอช่วงเวลาน้ำลงแบบไม่รู้อะไรแบบนี้ มันรู้สึกกระวนกระวายใจแปลกๆ จัง...)"
1007105-77 = "(ตอนนี้ก็เดินดูวิวจนเกือบครบทั้งเกาะแล้วด้วย...)"
1007105-78 = "(ถ้าไม่หาอะไรที่น่าสนุกทำละก็...)"
1007105-83 = "...เอ๋? เมื่อกี้ตรงพุ่มไม้มัน..."
1007105-87 = "ที่เกาะนี้มีพวกสัตว์ป่าอยู่ด้วยเหรอเนี่ย?"
1007105-95 = "นี่มัน..."
1007105-96 = "[ns] \"น้องกระต่ายนี่นา...\""
1007105-97 = "กระต่าย... จริงๆ ด้วยค่ะ"
1007105-105 = "แถมยังมีตั้งหลายตัว... ไม่สิ... เหมือนจะมีหลายสิบตัวเลยนะคะ"
1007105-109 = "ฮิฮิ น่ารักจัง ดูเหมือนเด็กพวกนี้จะไม่กลัวคนด้วยค่ะ"
1007105-110 = "แต่ว่าทำไมเด็กพวกนี้ถึงมาอยู่บนเกาะห่างไกลแบบนี้ได้...?"
1007105-111 = "[s] \"ว่ายน้ำข้ามมาจากแผ่นดินใหญ่หรือเปล่า...?\""
1007105-112 = "ไม่หรอกค่ะ กระต่ายเป็นสัตว์กลัวน้ำ คงไม่ได้ว่ายน้ำข้ามมาหรอกค่ะ"
1007105-113 = "แต่ว่า... เกาะนี้ก็เล็กเกินไปที่จะดูเป็นพื้นที่อยู่อาศัยของกระต่าย แล้วก็ไม่มีเหตุผลที่ใครจะเอาเด็กๆ พวกนี้มาปล่อยไว้ด้วย..."
1007105-117 = "เหตุผลที่ฟังขึ้นที่สุดก็คงจะเป็น..."
1007105-118 = "...เด็กพวกนี้อาจจะหลงทางมาก็ได้นะคะ"
1007105-119 = "[s] \"หลงทางเหรอ?\""
1007105-120 = "ค่ะ เด็กพวกนี้อาจจะเหมือนพวกเราที่บังเอิญข้ามมาที่เกาะนี้ตอนที่น้ำลง แล้วพอน้ำขึ้นก็หาทาง#nกลับไม่ได้ เลยต้องอาศัยอยู่ที่นี่น่ะค่ะ"
1007105-121 = "[s] \"แต่จำนวนมันเยอะเกินไปที่จะเป็นแบบนั้นนะ...\""
1007105-122 = "เรื่องนั้น..."
1007105-123 = "...ครั้งแรกที่กระต่ายมาที่นี่อาจไม่ได้มาแค่ตัวเดียว แต่มาเป็นคู่ก็ได้นะคะ"
1007105-124 = "เกาะนี้ไม่มีศัตรูตามธรรมชาติและมีอาหารอยู่มากมาย ทั้งคู่เลยตั้งรกรากอาศัยอยู่ที่นี่ สร้างครอบครัว มีลูก มีหลานจนมีจำนวนเยอะขึ้นค่ะ"
1007105-125 = "ตอนแรกที่พวกเด็กๆ มาถึงอาจเป็นเกาะร้างที่ไม่มีใครอาศัยอยู่เลยแต่ว่า... ต้องขอบคุณเด็กสองคนนั้น#nที่พยายามอย่างหนัก จนเกาะนี้กลายเป็นเหมือนเกาะสวรรค์ของฝูงกระต่ายค่ะ"
1007105-131 = "เหมือนกับเด็กสองคนนั้นที่ทำให้เกาะที่เงียบเหงากลายมาเป็นเกาะสวรรค์ที่น่าอยู่สำหรับฝูงกระต่ายแบบนี้ได้..."
1007105-132 = "ฉันเอง... ถ้ามีคนอยู่ด้วย ต่อให้เป็นที่ที่ไม่คุ้นเคยก็คงจะไม่ตื่นกลัวแน่นอนค่ะ"
1007105-134 = "(หลังจากนั้น คุณครูกับมิยาโกะก็ใช้เวลานั่งเล่นกับน้องกระต่ายอย่างเพลิดเพลินจนถึงช่วงเวลาน้ำลง)"

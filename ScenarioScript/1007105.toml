[translation]
1007105-1 = "SRT，探險"
1007105-4 = "啊，老師……！"
1007105-5 = "[s1]「到的真早呢，都子。」\n[s2]「抱歉，讓你久等了。」"
1007105-8 = "那，那個……"
1007105-9 = "一想到可以走在海上就十分期待，所以比約好的時間還早就……"
1007105-10 = "SRT的小隊長居然連集合時間都無法遵守，真是沒臉見人。"
1007105-11 = "[s3]「我好像能理解你的心情。」\n[s4]「校外教學的那天就會想早點去學校對吧。」"
1007105-16 = "呵呵……確實是呢。"
1007105-17 = "不過話說回來，真的如居民所說，一旦退潮就會有道路出現呢。"
1007105-18 = "這種不可思議的現象，一天竟然會發生兩次……"
1007105-19 = "在潮汐的力量面前，我們SRT的特殊部隊也顯得無力呢。"
1007105-23 = "……好像變得有點感傷了呢。"
1007105-27 = "退潮的時間似乎並不是很長，我們趕緊出發吧？"
1007105-28 = "老師，海上道路很容易跌倒，還請留意腳步。"
1007105-32 = "（和都子並肩走向離島）"
1007105-34 = "哇啊……跟聽說的一樣是座美麗的島嶼呢。"
1007105-35 = "自然景色相當豐富……"
1007105-36 = "想不到居然能在離島上看見這麼美妙的景色……"
1007105-37 = "……不，反而正因為是離島，如此美麗的景色才得以留存吧。"
1007105-41 = "老師……可以的話，要不要一起到海岸懸崖上看看呢？"
1007105-42 = "雖然距離很遠所以可能是我看錯了，但上面看起來似乎開著花……"
1007105-43 = "[s]「一起去看看吧，都子。」"
1007105-44 = "呵呵……跟老師在一起總覺得特別興奮呢。"
1007105-49 = "（欣賞完崖上的花後，再度回到岸邊時……）"
1007105-56 = "咦，咦咦……？"
1007105-57 = "[s]「海上的步道……」"
1007105-58 = "賞花賞得太投入就忘了時間……#n不知不覺間潮汐已經……"
1007105-59 = "這樣一來，似乎沒辦法走回去了呢。"
1007105-60 = "對不起……都是因為我太任性了……"
1007105-61 = "[s5]「沒關係，不用在意。」\n[s6]「這不是都子的錯。」"
1007105-64 = "本來預計很快就會回村子裡的，所以沒有帶預備的電池……"
1007105-65 = "到下次退潮應該還需要10個小時。#n……老師，該怎麼辦呢？"
1007105-66 = "[s]「反正今天也沒有其他計畫……」"
1007105-68 = "[ns]「難得能休息，就悠哉地度過吧。」"
1007105-70 = "……是！"
1007105-73 = "（約一小時後……）"
1007105-76 = "（……雖然老師說要悠哉地度過，但什麼也不做實在讓人有點焦慮）"
1007105-77 = "（島上的風景也差不多看過一輪了……）"
1007105-78 = "（有沒有什麼有趣的話題……）"
1007105-83 = "……咦？剛才那邊的草叢好像有動靜……"
1007105-87 = "這座島上有野生動物嗎？"
1007105-95 = "咦……"
1007105-96 = "[ns]「是兔子呢。」"
1007105-97 = "是……兔子呢。"
1007105-105 = "而且還不只一隻，有好幾隻……不，可能有數十隻。"
1007105-109 = "呵呵，真可愛。而且很親人呢。"
1007105-110 = "不過，這種離島上為什麼會有兔群呢……？"
1007105-111 = "[s]「會不會是游泳過來的？」"
1007105-112 = "不，兔子是種怕水的動物。#n游泳跨海而來的可能性應該很低。"
1007105-113 = "但是這座被水環繞的島不像會有原生兔群……#n我也不認為會有人特地把兔子帶到島上放生。"
1007105-117 = "雖然沒什麼根據……"
1007105-118 = "……會不會是迷路了呢。"
1007105-119 = "[s]「迷路了……？」"
1007105-120 = "是的。兔子在偶然間從退潮時出現的道路來到這座島，陷入與我們相同的狀況，#n於是便在這裡定居了下來。"
1007105-121 = "[s]「就算是這樣，數量也真多呢。」"
1007105-122 = "恐怕是因為……"
1007105-123 = "……最初來到島上的兔子是一對夫婦吧。"
1007105-124 = "這座島上沒有天敵，食物也十分豐富。#n牠們在這裡定居，生下小兔子，於是數量變得越來越多。"
1007105-125 = "一開始或許是座沒人居住的寂寞小島。#n現在卻已經成為了兔子們的樂園……"
1007105-131 = "即使是要移居到沒有人認識自己的土地上……"
1007105-132 = "如果我也有能傾心的人在身邊的話，無論是什麼樣的地方──肯定也不會感到害怕。"
1007105-134 = "（之後，和都子一起並肩照顧兔子直到再次退潮）"

[translation]
1004905-1 = "Bad Timing"
1004905-2 = "（今天是難得的休假）"
1004905-3 = "（悠悠哉哉睡到自然醒之後，走去便利商店買午餐吃）"
1004905-11 = "…………"
1004905-12 = "……！？"
1004905-13 = "[ns]「……？」"
1004905-15 = "[ns1]「好像有什麼人……」\n[ns2] 走向聲音傳來的地方"
1004905-21 = "……！！！"
1004905-22 = "（……對方好像在躲著我？）"
1004905-23 = "[ns3] ……出於擔心，趕緊追上去\n[ns4]「為什麼呢……？」"
1004905-31 = "……！！啊呃……！！痛痛痛……"
1004905-32 = "[s]「……千紗？」"
1004905-35 = "― 難，難道，[wa:640] "
1004905-37 = "― 從一開始就注意到了嗎……？[wa:580] "
1004905-40 = "― 這樣啊……"
1004905-42 = "― 也是，怎麼可能會沒發現呢……[wa:1480] "
1004905-45 = "― 不，我其實，[wa:450] "
1004905-47 = "― 也沒有刻意要躲著你的意思……[wa:610] "
1004905-50 = "― 只是因為……那個……[wa:1480] "
1004905-52 = "― 我現在……是素顏……[wa:2380] "
1004905-55 = "― 靠得太近會有點……！[wa:3260] "
1004905-58 = "― 話說老師，"
1004905-60 = "― 我都已經跟你這麼說了，你不要還一直靠近啊。[wa:220] "
1004905-63 = "[ns5]「不那麼在意也沒關係吧？」\n[ns6]「沒什麼關係吧？」"
1004905-64 = "― ……是，是嗎？……是那樣嗎？[wa:3040] "
1004905-65 = "― ……是，是嗎？……是那樣嗎？[wa:3040] "
1004905-67 = "― 嘛……那就好……[wa:2160] "
1004905-70 = "― ……你那是什麼反應。[wa:1410] "
1004905-73 = "― 怎，怎樣！？為什麼要笑成那樣啊！？[wa:1280] "
1004905-75 = "― 喂──！！！"
1004905-78 = "唉……算了。就算生氣也只會消耗自己的體力而已。"
1004905-79 = "所以你買完東西了嗎？買完就快點走吧，有老師在我沒辦法放鬆挑東西……"
1004905-80 = "……什麼？"
1004905-81 = "老師一進來就追著我跑，一樣東西都還沒買……？"
1004905-82 = "……是，是嗎。"
1004905-83 = "是這樣啊……哈，哈哈……"
1004905-84 = "哈哈哈……"
1004905-89 = "不要鬧了好不好──！！"
1004905-90 = "（……）"
1004905-91 = "（結果惹工讀生生氣了）"
1004905-95 = "唔唔……我快丟臉死了……"
1004905-96 = "都是老師的錯。"
1004905-97 = "……什麼？你說很開心？"
1004905-98 = "真的別鬧了好嗎，我的忍耐也是有限度的。"
1004905-99 = "畢竟是在老師面前，我還是必須要維持一下我的形象。麻煩你可以稍微體諒一下嗎？"
1004905-100 = "唉……假日的大白天竟然搞得這麼累……"
1004905-101 = "……還有另一件事。"
1004905-102 = "……你剛剛說的是認真的吧？"
1004905-103 = "[s7]「哪個？你是說我不在意素顏的事嗎？」\n[s8]「這麼一講我好像有點在意了。」"
1004905-104 = "……對，那個。"
1004905-105 = "雖然還是有點半信半疑的……"
1004905-106 = "……老師，再鬧下去真的會討人厭。"
1004905-107 = "唉……算了。既然老師都這麼說了，我就相信你吧。"
1004905-108 = "萬一之後老師想要裝傻反悔……我就會讓你失去記憶。"
1004905-109 = "那麼……既然現在沒事了……"
1004905-113 = "……那，那我就先走了！祝老師也有個美好的一天！！"
1004905-117 = "[ns]「……」"
1004905-118 = "（目送千紗離開後，回到了夏萊）"

[translation]
1004905-1 = "จังหวะนรก"
1004905-2 = "(วันหยุดที่รอคอยมาแสนนาน...)"
1004905-3 = "(หลังจากนอนตื่นสายอย่างสบายอารมณ์ คุณครูก็ออกมาที่ร้านสะดวกซื้อเพื่อซื้อมื้อกลางวัน)"
1004905-11 = "..."
1004905-12 = "...!?"
1004905-13 = "[ns] \"...?\""
1004905-15 = "[ns1] \"เหมือนเห็นเงาใครแว็บๆ...\"\n[ns2] เดินไปตามทางที่ได้ยินเสียง"
1004905-21 = "...!!!"
1004905-22 = "(รู้สึกเหมือนมีคนวิ่งหนีไป)"
1004905-23 = "[ns3] กังวลว่ามีเรื่องอะไร เลยวิ่งตามไป\n[ns4] \"วิ่งหนีครูทำไม...?\""
1004905-31 = "...! อึกกกก...!! อ๊าา..."
1004905-32 = "[s] \"คาซึสะ...?\""
1004905-35 = "― อะ...อะไรเล่า[wa:320] "
1004905-37 = "― รู้อยู่แล้วตั้งแต่แรกเลยงั้นเหรอ?[wa:10] "
1004905-40 = "― นั่นสินะ..."
1004905-42 = "― คงไม่มีทางที่จะไม่รู้หรอก...[wa:920] "
1004905-45 = "― เดี๋ยวสิ ฉัน...[wa:90] "
1004905-47 = "― ไม่ได้หลบหน้าอะไรสักหน่อย...[wa:50] "
1004905-50 = "― ก็แค่... มัน...[wa:1280] "
1004905-52 = "― คือว่า... ตอนนี้ฉัน... หน้าสด...อยู่น่ะ[wa:1220] "
1004905-55 = "― ยะ...อย่าเข้ามาใกล้นักสิ นี่...![wa:2380] "
1004905-58 = "― เพราะงั้นคุณครู..."
1004905-60 = "― ก็บอกแล้วไง ว่าอย่าเข้ามาใกล้น่ะ![wa:10] "
1004905-63 = "[ns5] \"ไม่เห็นต้องคิดมากเลยนี่นา?\"\n[ns6] \"ไม่เห็นเป็นไรเลย ยังเช้าอยู่เลยนะ\""
1004905-64 = "― งะ...งั้นเหรอ? อย่างนั้นเหรอ?[wa:2440] "
1004905-65 = "― งะ...งั้นเหรอ? อย่างนั้นเหรอ?[wa:2440] "
1004905-67 = "― ถ้าอย่างนั้น... ก็ค่อยยังชั่วหน่อย...[wa:1000] "
1004905-70 = "― ท่าทางแบบนั้นมันอะไรน่ะ...[wa:770] "
1004905-73 = "― อะ... อะไรเนี่ย!? มันน่าขำตรงไหนกัน!?[wa:480] "
1004905-75 = "― เดี๋ยวเถอะ!!!"
1004905-78 = "เฮ้อ ช่างเถอะ ถึงจะหัวร้อนต่อไปก็มีแต่เสียกับเสียเปล่าๆ"
1004905-79 = "คุณครูซื้อของครบแล้วใช่มั้ย? ถ้าซื้อเสร็จแล้วก็รีบๆ ไปสิ ฉันจะได้เลือกซื้อของได้..."
1004905-80 = "ว่าไงนะ...?"
1004905-81 = "'มัวแต่วิ่งตามมาก็เลยยังไม่ทันจะได้ซื้ออะไรเลย' งั้นเหรอ...?"
1004905-82 = "อา..."
1004905-83 = "งั้นเหรอคะ... ฮะ... ฮ่าฮ่าๆ..."
1004905-84 = "ฮ่าฮ่าฮ่า..."
1004905-89 = "ก็บอกว่าอย่าขำไงเล่า!!"
1004905-90 = "(....)"
1004905-91 = "(สุดท้ายทั้งสองคนก็โดนคุณพนักงานพาร์ทไทม์ดุว่าส่งเสียงดังในร้าน...)"
1004905-95 = "โอย... อายจนอยากจะแทรกแผ่นดินหนีอยู่แล้ว..."
1004905-96 = "เป็นเพราะคุณครูคนเดียวเลย"
1004905-97 = "ว่าไงนะ? สนุกงั้นเหรอ...?"
1004905-98 = "บอกให้หยุดไงเล่า ความอดทนของฉันมันก็มีขีดจำกัดเหมือนกันนะ"
1004905-99 = "ถึงจะเป็นฉันก็เถอะ แต่เวลาอยู่ต่อหน้าคุณครู ฉันก็แคร์เรื่องภาพลักษณ์เหมือนกันนะ ลองคิดในมุมนั้นบ้างสิ"
1004905-100 = "เฮ้อ วันนี้เป็นวันหยุดแท้ๆ มัวแต่มาทำอะไรอยู่กันเนี่ย..."
1004905-101 = "...ถึงจะอย่างนั้นก็เถอะ"
1004905-102 = "...ที่ฉันพูดไปเมื่อกี้น่ะ เข้าใจใช่มั้ย?"
1004905-103 = "[s7] \"หืม เรื่องหน้าสดเหรอ หรือที่บอกว่าไม่ต้องสนใจ?\"\n[s8] \"ยิ่งพูดแบบนั้นยิ่งสนใจนะ\""
1004905-104 = "อืม เรื่องนั้นแหละ"
1004905-105 = "อืม... น่ากังวลแฮะ..."
1004905-106 = "เฮอะ ไม่มีใครเค้าชอบพวกขี้ตื้อกันหรอกนะ~"
1004905-107 = "เฮ้อ... ช่างเถอะ ยังไงก็เป็นคำพูดของคุณครูนี่นะ ฉันจะเชื่อก็แล้วกัน"
1004905-108 = "แต่ลองแซวดูสิ ฉันจะลอบเข้าไปด้านหลังแล้วฟาดให้ความจำเสื่อมเลย..."
1004905-109 = "ถ้างั้น... ฉันเสร็จธุระแล้ว..."
1004905-113 = "ฉะ...ฉันไปก่อนนะ! ขะ...ขอให้เป็นวันหยุดที่ดีของคุณครูนะคะ!!"
1004905-117 = "[ns] \"....\""
1004905-118 = "(หลังจากส่งคาซึสะแล้ว คุณครูก็กลับไปที่ชาเล่ต์)"

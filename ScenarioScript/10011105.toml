[translation]
10011105-1 = "尾聲;慶典之後"
10011105-4 = "（就這樣，一連串引發了大騷動的事件，對外總算是成功以公演的一環來處理……）"
10011105-9 = "嘻嘻嘻嘻嘻！唔呣，實屬愉快啊！#n怎麼樣啊伊吹，有開心嗎？"
10011105-10 = "嗯！超開心的！"
10011105-11 = "……我倒是覺得很累。"
10011105-13 = "而且還沒能找到被妖怪劇團稱為委託人的「笑咪咪教授」的蛛絲馬跡……"
10011105-14 = "真受不了，事情為什麼每次都會這樣……"
10011105-15 = "全都是麻煩的事……究竟是為什麼呢。"
10011105-17 = "咦，咦……？#n伊呂波你，雖然不知道原因但好像很生氣……？"
10011105-21 = "話說回來，伊吹，你手裡拿的那個是什麼？#n好像是沒看過的玩具。"
10011105-22 = "啊，這個嗎？是忍者姐姐們送給我的，是忍者唷！！"
10011105-23 = "……嗯？那也是忍者嗎？#n話說「忍者」是只會在漫畫或電視劇裡出現的那個？"
10011105-24 = "才不是呢！忍者真的存在唷，而且超帥氣的！伊吹之後再告訴你！"
10011105-26 = "（說到身為主角的忍術研究部……）"
10011105-30 = "[ns]「啊，新聞正好演到。」"
10011105-32 = "那麼接下來為您播報下一則新聞。"
10011105-33 = "是關於本次百鬼夜行與格黑娜學園之間的交流會，#n以及在現場十分活躍的忍術研究部的消息。"
10011105-34 = "我們向各地群眾詢問了與突然出現的他們有關的消息。"
10011105-36 = "聽說他們連那個「睡美人」的試煉也輕鬆完成了是吧？"
10011105-37 = "我還聽說在那之後連「讀心術士」也被輕而易舉地突破了。"
10011105-38 = "啊，這麼說來，他們好像還跟萬魔殿的傢伙們來了場盛大的決鬥！"
10011105-39 = "居然用戰車蹂躪電影村，真是群驚人的法外狂徒啊。"
10011105-41 = "儘管「忍術研究部」的種種傳言已經傳得滿天飛……"
10011105-42 = "然而實際上這個社團，在現實中似乎並不存在！"
10011105-43 = "他們的真面目究竟是什麼呢？#n是幽靈？還是陰陽部的密探呢？"
10011105-44 = "我們將會找出事情的真──"
10011105-48 = "[ns]「媒體真恐怖啊……」"
10011105-50 = "（就在感嘆以訛傳訛的恐怖時……）"
10011105-56 = "老師大人，請讓我們躲一下！"
10011105-57 = "請，請幫幫我們，老師……！"
10011105-58 = "碰到危機了！"
10011105-59 = "[s]「……嗯？怎麼了嗎？」"
10011105-60 = "佳穗他們陰陽部正在追趕我們！"
10011105-61 = "那個，是因為，之前的那個事件……！"
10011105-63 = "你們的意思是「因為讓這次公演順利成功了，所以要承認你們是正式的社團」……？"
10011105-64 = "當然，各位在事件中的活躍相當重要。#n我打從心底感謝各位，不過同時我也必須告知……"
10011105-70 = "這是在這次公演過程中造成的損害賠償的求償書。"
10011105-71 = "電影村的大半設施都處於半毀狀態……損失金額約有8位數。"
10011105-75 = "要仔細評斷各位的功績，就勢必得先從這件事開始清算才行……"
10011105-77 = "我說，至少被戰車橫掃的部分要跟萬魔殿五五分才對吧！？"
10011105-78 = "唉……事情真是從頭到尾都亂七八糟的……"
10011105-79 = "就結果來看也……"
10011105-83 = "老師大人。"
10011105-84 = "[s]「嗯？」"
10011105-85 = "那個……就是……"
10011105-86 = "抱，抱歉給你添麻煩了……"
10011105-87 = "[s]「三千留居然會道歉……」"
10011105-88 = "那，那麼驚訝不會有點失禮嗎！？"
10011105-89 = "就，就算是我，覺得抱歉的時候也會道歉的啊！？"
10011105-90 = "這次的事件幾乎都是我造成的，還給老師添了許多麻煩……"
10011105-91 = "還讓老師……看見了很多丟臉的模樣……"
10011105-92 = "[s]「沒關係的，這些就是老師該做的工作。」"
10011105-93 = "唔哇，是大人……"
10011105-95 = "啊，話說回來，那天回去之後……我和伊樹菜還有月夜討論過了。"
10011105-96 = "要成為正式的社團，該說是還不夠有勇氣……"
10011105-97 = "還是該說和周圍的評論相比，更多是自己心情上的問題呢……"
10011105-98 = "總之，感覺還需要一些時間……所以成為正式社團的事，決定先暫緩了。"
10011105-99 = "於是他們兩個人都說……"
10011105-101 = "[ns]「『不用在意』？」"
10011105-102 = "……嗯。"
10011105-106 = "他們真的……是群好到我配不上的後輩。"
10011105-109 = "[ns]「好！那麼大家要不要一起去買『忍佩洛』的周邊呀？」"
10011105-110 = "嗯？"
10011105-111 = "咦……？"
10011105-112 = "真，真的嗎主公！？"
10011105-113 = "[s]「嗯。因為大家都很努力，就當作是獎勵吧。」"
10011105-114 = "好耶！果然老師大人最棒了！"
10011105-115 = "主公送的禮物……！伊樹菜會當成傳家之寶！當成一輩子的寶物的！"
10011105-116 = "[s]「太，太誇張了……」"
10011105-117 = "我也會，每天跟它說早安，帶它去洗澡，幫它吹乾……"
10011105-118 = "[s]「那個，完全是被飼養的狀態……」"
10011105-119 = "那，那我也會把它當成老師，每天和它一起散步！"
10011105-120 = "[s]「這種說法好像又有點奇怪……！」"
10011105-122 = "（於是事情告一段落……）"
10011105-123 = "（……之前，最後還有件事沒做）"
10011105-129 = "（在電影村的某個涼風宜人的角落……）"
10011105-130 = "哼～哼～哼～♪"
10011105-131 = "喵哈哈，這次也玩得挺開心的呢。"
10011105-132 = "雖然我個人是這麼認為……"
10011105-133 = "……老師又覺得如何呢？"
10011105-134 = "[s]「仁耶。」"
10011105-136 = "這次多虧有夏萊的合作，讓交流會順利落幕了呢。"
10011105-137 = "非常感謝您的幫忙唷～♪"
10011105-138 = "[s]「不用客氣。」"
10011105-140 = "[ns]「話說回來，我可以說正事了嗎？」"
10011105-141 = "哎呀哎呀～我本來還想緩和一下氣氛的說……話題進展得這麼快，真是遺憾呢。"
10011105-142 = "[s]「這全都是仁耶的計畫，我沒說錯吧？」"
10011105-143 = "居然是開門見山的直球啊……沒有互相試探的必要是嗎？"
10011105-147 = "……順帶一問，您的證據是？"
10011105-148 = "[s]「妖怪劇團那彷彿看穿所有警衛的位置綁架伊吹的行動方式。」"
10011105-149 = "原來如此～如果陰陽部有認真警備，這種事根本就不會發生……"
10011105-150 = "反過來說，要不是因為「陰陽部」的介入，情況就不會變成那樣……是嗎？"
10011105-151 = "喵哈哈……"
10011105-152 = "完全正確～♪"
10011105-153 = "[s]「你沒打算隱瞞啊？」"
10011105-155 = "畢竟也沒有隱瞞的必要。"
10011105-156 = "我只是想親眼看看「夏萊」的力量而已。"
10011105-157 = "……是忍術研究部來著？"
10011105-158 = "根據我的從旁觀察，他們雖然是群有趣的孩子……"
10011105-160 = "卻也同樣是連正式的社團都無法建立，手忙腳亂掙扎著的孩子們……"
10011105-161 = "居然真的能帶著那樣的他們救出公主……"
10011105-162 = "我認為這是相當難以達成的任務。您所展現出的能力……"
10011105-163 = "和傳聞中一樣……可以這麼說吧。"
10011105-164 = "不愧是夏萊的老師，我十分佩服。"
10011105-165 = "[s]「……這樣啊。」"
10011105-167 = "莫非……影響到您的心情了嗎？"
10011105-168 = "找出了造成這一切的犯人，因而萌生了厭惡的感覺嗎？"
10011105-169 = "又或者，是將別人耍得團團轉……"
10011105-170 = "這種時候居然還覺得有趣而哈哈大笑……"
10011105-171 = "類似這樣的感想？"
10011105-172 = "[s]「仁耶。」"
10011105-173 = "什麼什麼～？"
10011105-174 = "[s]「我要說教了。」"
10011105-178 = "……咦？"
10011105-179 = "[s]「在那邊坐下來吧，我要好好訓斥仁耶。」"
10011105-180 = "那個……老師？"
10011105-181 = "自己說出來有點不好意思，但是那個，是叫做樣式美嗎……"
10011105-182 = "就是，雖然我現在散發出濃濃的「The．黑幕」的感覺，#n但在這個時機「說教」，以劇情發展來說是否有點……"
10011105-183 = "[s]「可能會有點久，忍耐一下吧。」"
10011105-189 = "那個……我……"
10011105-190 = "等一下，老師！？您的表情好恐怖……呀啊啊！？"
10011105-192 = "（於是騷動告一段落）"
10011105-193 = "（然而似乎留下了一些問題）"
10011105-194 = "不忍之心"

[translation]
10011105-1 = "Epilogue; After the Festival"
10011105-4 = "And that was how the scandal that rocked Hyakkiyako Academy came to an end disguised as a performance."
10011105-9 = "Hahahaha! Wow! What an event! Did you have fun, Ibuki?"
10011105-10 = "Yep! Lots of fun!"
10011105-11 = "...It was exhausting. In every way possible."
10011105-13 = "The Mouryo kept insisting the incident was masterminded by someone named Professor Smug, but by the time we caught their trail, they'd already vanished."
10011105-14 = "...I hate loose ends."
10011105-15 = "Why can't anything ever go smoothly?"
10011105-17 = "What, Iroha? Why do you look like the Head Prefect stepped on your favorite book?"
10011105-21 = "Ibuki, what's that you got there? I've never seen you with it before."
10011105-22 = "This? It's a ninja the ninja girls gave Ibuki!"
10011105-23 = "Ninjas? Like you see in comic books? I don't follow."
10011105-24 = "Nuh-uh! Ninjas are real! Okay? And they're really, really cool! You better listen up!"
10011105-26 = "And as for the Ninjutsu Research Club after the incident..."
10011105-30 = "[ns] \"Hey, they're on the news.\""
10011105-32 = "Today's next story..."
10011105-33 = "In the recent exchange meeting between the Hyakkiyako and Gehenna Academies, the crowd is buzzing about the tremendous exploits of the Ninjutsu Research Club during the performance!"
10011105-34 = "Here's what people had to say about their sudden appearance!"
10011105-36 = "Did you hear? The Sleeping Beauty's trial was like a walk in the park to them!"
10011105-37 = "They beat the Inner Discipline Club's mind reader without a thought!"
10011105-38 = "You know what I heard? I heard they totally ran circles around the Pandemonium Society!"
10011105-39 = "They bulldozed over the movie village in a tank! What a bunch of outlaws!"
10011105-41 = "We took the liberty of looking into these allegations."
10011105-42 = "And what we found was shocking! Apparently, no such official organization known as the Ninjutsu Research Club even exists!"
10011105-43 = "So who could these mysterious club members be? Are they ghosts? Or are they a group of top-secret agents covertly operating under the Yin-Yang Club?"
10011105-44 = "To uncover the truth, we..."
10011105-48 = "[ns] \"The media is terrifying sometimes.\""
10011105-50 = "(The rumors are everywhere. The whole community is being rocked by a media frenzy...)"
10011105-56 = "Sir Sensei! You need to hide me!"
10011105-57 = "S-Sensei... P-Please help...!"
10011105-58 = "Please!"
10011105-59 = "[s] \"What's going on, everyone?\""
10011105-60 = "Kaho is hot on our tails right now! She's even sicced the Yin-Yang Club on us!"
10011105-61 = "Because of the recent incident!"
10011105-63 = "Hm? You want official recognition for your club since the show was a success?"
10011105-64 = "While I don't negate or downplay your help, there's a more urgent matter we must address."
10011105-70 = "An invoice. For all damages caused during the performance."
10011105-71 = "For the price of utterly decimating Hyakkiyako's movie village...consider eight figures generous."
10011105-75 = "We're more than willing to uphold our end of the bargain. Once you recoup your debts."
10011105-77 = "This is ridiculous! All because that Pandemonium girl took a joyride in that tank!"
10011105-78 = "Hah... Geez. I'm really starting to feel like this whole ordeal wasn't worth the effort."
10011105-79 = "What a total nightmare..."
10011105-83 = "Sir Sensei."
10011105-84 = "[s] \"Yes, Michiru?\""
10011105-85 = "Uh... I just wanted to say..."
10011105-86 = "I'm sorry. For everything."
10011105-87 = "[s] \"Michiru? Apologizing?\""
10011105-88 = "You don't have to look so surprised!"
10011105-89 = "I know I can be shameless sometimes, okay?!"
10011105-90 = "I put you through a lot, and I know I wasn't easy to deal with...here and there..."
10011105-91 = "You must have been really annoyed, huh?"
10011105-92 = "[s] \"It's okay. I'm a teacher. It's my job help my students deal with things.\""
10011105-93 = "That's the most grown-up thing I've ever heard."
10011105-95 = "Also... Uh. So, I took your advice and talked to Izuna and Tsukuyo."
10011105-96 = "You know, about all the stuff and my feelings on making the club official."
10011105-97 = "And we all made a decision together. I guess I'm still scared."
10011105-98 = "Maybe I just need some time. But, I asked them if they'd be okay if we put it on the backburner for the time being."
10011105-99 = "And both of them said..."
10011105-101 = "[ns] \"That it was okay, and it wasn't a big deal?\""
10011105-102 = "...Yeah."
10011105-106 = "I really have the best underclassmen in the world."
10011105-109 = "[ns] \"In that case, shall we go buy some new Ninpero merch for everyone?\""
10011105-110 = "Huh?"
10011105-111 = "Wha?"
10011105-112 = "My lord?! Really, truly?!"
10011105-113 = "[s] \"Really and truly. As a reward for all your hard work.\""
10011105-114 = "Sir Sensei, you're the best!"
10011105-115 = "A gift from my lord?! I'm going to keep it as a family heirloom!"
10011105-116 = "[s] \"I think you all might be overreacting a little bit.\""
10011105-117 = "I'll take good care of it, every single day of my life! I'll treasure it!"
10011105-118 = "[s] \"S-Since it's precious merch...\""
10011105-119 = "Me too! I'll respect it as much as I do Sir Sensei! I'll walk it every day!"
10011105-120 = "[s] \"It's just a stuffed animal!\""
10011105-122 = "(And that was the end of that.)"
10011105-123 = "(...Actually, there was just one more thing.)"
10011105-129 = "(Somewhere in the movie village, on a slightly chilly day.)"
10011105-130 = "Heeheehee."
10011105-131 = "Bwahaha. I really enjoyed myself, as always!"
10011105-132 = "That's how I feel at least. Heehee, how about you?"
10011105-133 = "Sensei?"
10011105-134 = "[s] \"Yes, Niya?\""
10011105-136 = "We were able to pull off this exchange meeting thanks to Schale's cooperation."
10011105-137 = "Your cooperation, indeed! Thank you for all of your help!"
10011105-138 = "[s] \"Don't mention it.\""
10011105-140 = "[ns] \"But don't you think you're missing the point?\""
10011105-141 = "Awww, I was trying to set the mood for us. You're gonna hurt my poor feelings."
10011105-142 = "[s] \"You orchestrated this whole thing, didn't you, Niya?\""
10011105-143 = "You're just going to come right out of the gate and ask that? Why not take the time to savor the moment? Slowly tease it out?"
10011105-147 = "And do you have any proof?"
10011105-148 = "[s] \"The Mouryo cut through security like a knife through butter and kidnapped Ibuki. They knew how to get in.\""
10011105-149 = "Ah-ha! So you think this never would have happened if the Yin-Yang Club had set up the proper precautions in the first place."
10011105-150 = "In other words, you're accusing the Yin-Yang Club of having been complicit from the beginning."
10011105-151 = "Heehee."
10011105-152 = "Ding, ding, ding. It's true."
10011105-153 = "[s] \"You don't even have the insight to lie.\""
10011105-155 = "Because there's no reason to lie."
10011105-156 = "I simply wanted to see for myself if the famed Schale sensei was as strong and capable as I had heard."
10011105-157 = "Hahaha. That Ninjutsu Research Club."
10011105-158 = "They're an interesting bunch, I'll give you that."
10011105-160 = "At the end of the day though, they're a trio of lost causes who can't even get themselves to accredit their own club."
10011105-161 = "But you decided you liked those rag-tag girls and helped them heroically rescue the princess. You made the impossible, possible."
10011105-162 = "I realized it while watching them tear through every mission so fearlessly."
10011105-163 = "You truly are every bit as impressive as they say you are, Sensei of Schale."
10011105-164 = "I mean, I was blown away!"
10011105-165 = "[s] \"Oh? Is that right?\""
10011105-167 = "Aw. Are you upset to find out that I instigated this whole scandal?"
10011105-168 = "Or perhaps, repulsed?"
10011105-169 = "Manipulating people as I please..."
10011105-170 = "Squeezing every bit of enjoyment out of them that I can..."
10011105-171 = "Do I disgust you? Is your skin crawling as you look at me? Heehee."
10011105-172 = "[s] \"Niya.\""
10011105-173 = "Yeeeeees, Sensei?"
10011105-174 = "[s] \"It's lecture time.\""
10011105-178 = "...Come again?"
10011105-179 = "[s] \"Take a seat, Niya, because you're about to get a serious scolding.\""
10011105-180 = "A scolding? ...Sensei?"
10011105-181 = "I hate to be the one to say this, really. But don't you think this situation calls for... I don't know, a bit more drama and gravitas?"
10011105-182 = "I mean, I was in the middle of very dramatically revealing my dark, secret plot! But for you to scold me like a kid, that just totally ruins the vibe!"
10011105-183 = "[s] \"Well, buckle up, kiddo. I've got a lot to say to you.\""
10011105-189 = "Are...Are you serious?"
10011105-190 = "Excuse me?! Sensei, stop making that scary face! AIIIIYEEEEE?!"
10011105-192 = "The scandal may have been over with, but dealing with the aftermath..."
10011105-193 = "Well, that was going to take a little more time."
10011105-194 = "An Unconcealed Heart"

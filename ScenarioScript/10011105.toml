[translation]
10011105-1 = "บทส่งท้าย;หลังงานเทศกาลสิ้นสุด"
10011105-4 = "(หลังจากเหตุการณ์ที่ทำให้สหพันธ์เฮียกคิยาโคโกลาหลวุ่นวายผ่านไป หน้าที่รับผิดชอบในการแสดง#nก็สิ้นสุดลง...)"
10011105-9 = "ฮุฮุฮุ! อื้ม! ช่างเป็นความทรงจำที่น่าปีติยินดีจริงๆ! เป็นไงบ้าง อิบูกิสนุกมั้ย?"
10011105-10 = "อื้ม! สนุกมากเลย!"
10011105-11 = "มีแต่ฉันที่เหนื่อยอยู่คนเดียวน่ะสิคะ..."
10011105-13 = "พวกปีศาจบอกว่าผู้นำของการก่อความวุ่นวายครั้งนี้ก็คือ ศาสตราจารย์ยิ้มหวาน แต่ตอนที่ไปตามสืบ ร่องรอยก็ถูกลบไปหมดแล้ว"
10011105-14 = "เป็นเรื่องที่น่าหงุดหงิดมากเลยละค่ะ..."
10011105-15 = "ทำไมฉันถึงต้องมาเจออะไรแบบนี้ด้วย..."
10011105-17 = "หะ... หืม? อิโรฮะดูเหมือนกำลังโกรธมากๆ เลยนะนั่น..."
10011105-21 = "แล้วอิบูกิถืออะไรอยู่ในมือเหรอ? ของเล่นแบบนั้นไม่เคยเห็นมาก่อนเลยนะ"
10011105-22 = "อ๊ะ นี่เหรอ? ตุ๊กตานินจาที่พี่สาวนินจาให้มาน่ะ!"
10011105-23 = "เดี๋ยวนะ... หมายถึงอะไรน่ะ? นินจาแบบที่อยู่ในหนังสือการ์ตูนน่ะเหรอ?"
10011105-24 = "ไม่ช่าย! นินจามีอยู่จริงๆ นะ! อื้อ! เท่มากๆ เลยด้วย อิบูกิจะเล่าให้ฟังเอง!"
10011105-26 = "(และชมรมวิจัยศาสตร์นินจาที่เป็นตัวเอกของแผนการนั้น...)"
10011105-30 = "[ns] \"อ่า... ออกข่าวด้วยสินะ\""
10011105-32 = "ข่าวต่อไปนะคะ..."
10011105-33 = "ข่าวชมรมวิจัยศาสตร์นินจาที่ปรากฏตัวที่งานแลกเปลี่ยนระหว่างเฮียกคิยาโคกับสถาบันเกเฮนน่าค่ะ"
10011105-34 = "มาลองฟังความคิดเห็นเกี่ยวกับการปรากฏตัวของคนเหล่านี้กันค่ะ!"
10011105-36 = "อ่า ที่ผ่านด่านขององค์หญิงขี้เซาไปได้ง่ายๆ ใช่มั้ย?"
10011105-37 = "ได้ยินมาว่าสามารถผ่านนักอ่านใจของชมรมฝึกฝนไปได้สบายๆ เลยด้วยนะ"
10011105-38 = "อ่า! ฉันก็ได้ยินมาเหมือนกัน! เห็นว่าเล่นงานพวกแพนเดโมเนียม โซไซตี้ซะน่วมเลย..."
10011105-39 = "ขับรถถังทำลายข้าวของไปทั่วสวนสนุกภาพยนตร์ขนาดนั้น เป็นพวกนอกรีตไม่ใช่เหรอ? "
10011105-41 = "ได้รับข่าวมามากมายเลยละค่ะ"
10011105-42 = "ไม่น่าเชื่อเลยค่ะ! น่าตกใจที่คนส่วนใหญ่ดูเหมือนจะไม่รู้จักชมรมวิจัยศาสตร์นินจามาก่อนนะคะ!"
10011105-43 = "ตัวตนของพวกเธอคืออะไรกันแน่? วิญญาณ? หรือว่าจะเป็นเจ้าหน้าที่ลับของชมรมหยินหยาง?"
10011105-44 = "ทางเราจะพยายามสืบหาความจริงต่อไปค่ะ..."
10011105-48 = "[ns] “สื่อพวกนี้น่ากลัวจริงๆ...”"
10011105-50 = "(หลังจากนั้นสื่อหลักก็ให้ความสนใจกับข่าวลือพวกนั้นอยู่สักพัก)"
10011105-56 = "ท่านอาจารย์...! รีบซ่อนเร็ว...!"
10011105-57 = "ชะ... ช่วยด้วยค่า...!  คุณครู...!"
10011105-58 = "นินนิน!"
10011105-59 = "[s] \"หืม...? มีอะไรเหรอทุกคน?\""
10011105-60 = "ตอนนี้คาโฮะกำลังไล่ตามพวกข้าน้อยอยู่! ข่าวพวกนั้นชมรมหยินหยางก็เป็นคนปล่อยด้วย...!"
10011105-61 = "ชะ... ใช่แล้วค่ะ...! เพราะเหตุการณ์ที่เกิดขึ้นคราวนี้...!"
10011105-63 = "จะมาขอให้รับรองเป็นชมรมทางการเพราะการแสดงสำเร็จด้วยดีอย่างนั้นเหรอคะ?"
10011105-64 = "อ่า ไม่ได้จะดูถูกความพยายามของทุกคนหรอกนะคะ แต่ก่อนอื่น..."
10011105-70 = "ดูนี่สิคะ ใบเรียกร้องค่าเสียหายที่มาจากเหตุการณ์ที่เกิดขึ้นระหว่างการแสดงครั้งนี้ค่ะ"
10011105-71 = "ความเสียหายที่เกิดขึ้นกับอุปกรณ์ในสวนสนุกภาพยนตร์เฮียกคิยาโค มูลค่ามากถึงแปดหลักค่ะ..."
10011105-75 = "ฉันยอมรับในฝีมือนะคะ แต่ว่าจะต้องชำระบัญชีนี้ก่อน... เข้าใจใช่ไหมคะ?"
10011105-77 = "ไม่ยุติธรรมเลย! ทุกอย่างเป็นเพราะพวกแพนเดโมเนียม โซไซตี้ที่ขับรถถังเข้ามาต่างหาก?!"
10011105-78 = "ฮ่า... รู้สึกเหมือนครั้งนี้เราจะมีแต่เสียกับเสียเลยนะ..."
10011105-79 = "ล้มเหลวไม่เป็นท่าอีกแล้วเหรอ..."
10011105-83 = "ท่านอาจารย์"
10011105-84 = "[s] \"หืม?\""
10011105-85 = "คะ... คือว่า... ครั้งนี้..."
10011105-86 = "ขะ... ข้าน้อยต้องขอโทษด้วยจริงๆ นะ..."
10011105-87 = "[s] \"มิจิรุขอโทษเหรอเนี่ย...\""
10011105-88 = "ไม่เห็นต้องทำหน้าตกใจขนาดนั้นเลยนี่?!"
10011105-89 = "ข้าน้อยเองก็รู้จักละอายใจเหมือนกันนะ?!"
10011105-90 = "ท่านอาจารย์ต้องมาวุ่นวายกับเรื่องแบบนี้ก็เพราะข้าน้อย และยังต้องมาเจอเรื่องยุ่งยากอีก..."
10011105-91 = "ข้าน้อยมัน... ไม่ได้เรื่องเลยใช่ไหมล่ะ...?"
10011105-92 = "[s] \"ไม่เป็นไรหรอก ก็ครูเป็นครูนี่นา ต้องรับฟังนักเรียนอยู่แล้วสิ\""
10011105-93 = "ว้าววว... สมกับที่เป็นผู้ใหญ่เลยนะ..."
10011105-95 = "กะ... ก็ไม่มีอะไรหรอก วันนั้นพอกลับไป... ข้าน้อยก็ได้คุยกับอิซุนะแล้วก็สึคุโยะ"
10011105-96 = "เกี่ยวกับเรื่องการเป็นชมรมทางการอะไรนั่น..."
10011105-97 = "แล้วก็ตัดสินใจแล้ว ไม่รู้ต้องบอกว่า... ยังไม่มีความกล้ามากพอ..."
10011105-98 = "หรือว่ายังต้องการเวลาอีกดี... อืม เรื่องที่จะเป็นชมรมทางการน่ะ เอาไว้ก่อนก็ได้"
10011105-99 = "ทั้งสองคนนั้นก็บอกว่า..."
10011105-101 = "[ns] \"บอกว่าไม่ติดอะไรใช่มั้ยล่ะ?\""
10011105-102 = "อืม..."
10011105-106 = "ช่างเป็น... เหล่ารุ่นน้องที่ดีเกินไปสำหรับข้าน้อยจริงๆ"
10011105-109 = "[ns] \"ดีละ! ถ้างั้นเราไปซื้อตุ๊กตานินเพโร่ให้ทุกคนกันดีมั้ย?\""
10011105-110 = "เอ๊ะ?"
10011105-111 = "คะ?"
10011105-112 = "จริงเหรอคะ? นายท่าน?!"
10011105-113 = "[s] \"อืม ก็ทุกคนตั้งใจกันขนาดนั้นก็ต้องให้รางวัลสิ!\""
10011105-114 = "ว้าววว! ท่านอาจารย์ยอดเยี่ยมที่สุดเลย!"
10011105-115 = "ของขวัญของนายท่าน...! อิซุนะ! จะรักษาไว้ตลอดชีวิตเลยค่ะ!"
10011105-116 = "[s] \"ตื่นเต้นเกินไปรึเปล่าน่ะ...?\""
10011105-117 = "ขะ... ของขวัญที่ได้รับ... ฉะ... ฉันจะดูแลเอาใจใส่ ละ... และอาบน้ำให้สะอาดทุกวันเลยค่ะ... แล้วก็..."
10011105-118 = "[s] \"ปะ...เปล่า มันเป็นสินค้ามีค่าน่ะ...\""
10011105-119 = "ถ้าอย่างนั้นข้าน้อยก็! จะพาไปเดินเล่นทุกวันโดยคิดว่าเจ้าสิ่งนี้คือท่านอาจารย์!"
10011105-120 = "[s] \"ก็บอกว่าไม่ใช่แบบนั้นไง...!\""
10011105-122 = "(และแล้วเหตุการณ์ก็จบลง…)"
10011105-123 = "(หลังจากมีอีกเรื่องหนึ่งเกิดขึ้น...)"
10011105-129 = "(ที่แห่งหนึ่งในสวนสนุกภาพยนตร์ที่ลมพัดเย็นยะเยือก)"
10011105-130 = "หืมมม~ ฮึ่มฮึ่ม~"
10011105-131 = "อะฮะฮ่ะ เห็นไหมล่ะ ครั้งนี้ก็สนุกอย่างที่คิดเลย"
10011105-132 = "ก็นะ ฉันก็คิดแบบนั้นเหมือนกัน ฮุฮุ แล้วผู้ที่โดนกระทำเป็นยังไงบ้างคะ?"
10011105-133 = "คุณครู...?"
10011105-134 = "[s] \"นิยะ\""
10011105-136 = "งานแลกเปลี่ยนครั้งนี้สำเร็จลุล่วงได้เพราะความร่วมมือจากชาเล่ต์เลยนะคะ"
10011105-137 = "ขอบคุณที่มาช่วยนะคะ~ คุณครู~ อะฮะฮ่ะ"
10011105-138 = "[s] \"ก็ไม่ใช่เรื่องใหญ่อะไรหรอก\""
10011105-140 = "[ns] \"เรื่องมันไม่ได้มีแค่นั้นไม่ใช่เหรอ?\""
10011105-141 = "แหมๆ~ พูดแบบนั้นเพื่อรักษาบรรยากาศสินะคะ~ น่าเสียดายจัง~"
10011105-142 = "[s] \"เรื่องทั้งหมดนี่ ฝีมือนิยะเองสินะ?\""
10011105-143 = "เอ๋~ ถามตรงๆ โดยที่ไม่อ้อมค้อม ไม่เลียบเคียง ไม่ดูท่าทีของอีกฝ่ายแบบนี้เลยเหรอคะเนี่ย?"
10011105-147 = "มีหลักฐานรึเปล่าล่ะคะ...?"
10011105-148 = "[s] \"พวกปีศาจผ่านเจ้าหน้าที่มาลักพาตัวอิบูกิไปได้ง่ายๆ เหมือนรู้อยู่ก่อนแล้ว\""
10011105-149 = "อะฮ่า~ ถ้าชมรมหยินหยางเตรียมพร้อมรับมือไว้แน่นหนากว่านี้แต่แรก เรื่องก็คงไม่เกิดขึ้นสินะ"
10011105-150 = "...หรือก็คือจะบอกว่าความวุ่นวายทั้งหมดเกิดขึ้นเพราะ 'ชมรมหยินหยาง' ตั้งแต่ต้นอย่างนั้นเหรอคะ?"
10011105-151 = "อะฮะฮ่ะ ฮุฮุฮุ"
10011105-152 = "ค่ะ ถูกต้องแล้ว..."
10011105-153 = "[s] \"ไม่ได้คิดจะปกปิดด้วยสินะ\""
10011105-155 = "ถ้าจะให้ถูก ต้องบอกว่าเป็นเรื่องที่ไม่ต้องปกปิดอะไรต่างหากค่ะ"
10011105-156 = "ฉันก็แค่อยากจะเห็นพลังของคุณครูจากชาเล่ต์ที่ใครๆ ก็พูดถึงกันด้วยตาตัวเองเท่านั้นค่ะ"
10011105-157 = "ฮุฮุ... ชมรมวิจัยศาสตร์นินจาอย่างนั้นสินะคะ?"
10011105-158 = "ดูท่าทางจะเป็นเด็กที่ร่าเริงกันก็จริง"
10011105-160 = "แต่ก็เป็นแค่พวกเด็กวุ่นวายที่จัดการชมรมอย่างเหมาะสมไม่ได้"
10011105-161 = "พาเด็กพวกนั้นไปช่วยเหลือองค์หญิงได้อย่างสง่างาม เรียกได้ว่าทำสิ่งที่เป็นไปไม่ได้ ให้เป็นไปได้#nเลยนะคะ"
10011105-162 = "พอได้เห็นว่าสามารถผ่านด่านทดสอบไปได้อย่างง่ายดาย ก็คิดว่า..."
10011105-163 = "คุณครูจากชาเล่ต์เนี่ย ยอดเยี่ยมเหมือนที่ได้ยินมาเลยนะคะ"
10011105-164 = "ฉันน่ะ ประทับใจมากเลยค่ะ"
10011105-165 = "[s] \"อ่า อย่างนั้นเหรอ...\""
10011105-167 = "ตายจริง พอรู้ว่าฉันเป็นต้นเหตุของความวุ่นวายทั้งหมดก็เลยไม่พอใจเหรอคะ?"
10011105-168 = "หรือว่ารู้สึกเกลียดชังกันเลยรึเปล่าคะ?"
10011105-169 = "ปั่นหัวคนอื่นเล่นตามใจชอบ"
10011105-170 = "แล้วก็ยังมานั่งหัวเราะชอบอกชอบใจ"
10011105-171 = "รู้สึกคลื่นไส้ขึ้นมาเลยรึเปล่าคะ~? อะฮะฮ่ะ"
10011105-172 = "[s] \"นิยะ\""
10011105-173 = "ว่ายังไงคะ~? คุณครู?"
10011105-174 = "[s] \"ได้เวลาสอนบทเรียนแล้วละ!\""
10011105-178 = "…คะ?"
10011105-179 = "[s] \"มานั่งตรงนี้สิ ทีนี้ครูจะดุนิยะจริงๆ แล้วนะ\""
10011105-180 = "เดี๋ยวสิคะ... คุณครู?"
10011105-181 = "ถึงจะฟังดูแปลกๆ ก็เถอะ แต่ถ้าเป็นฉากแบบนี้ต้องต่อบทแบบแนวหนังตะวันตกที่เข้ากันมากกว่านี้สิคะ"
10011105-182 = "จนถึงเมื่อกี้น่ะ ไม่รู้สึกถึงบรรยากาศแบบในเรื่อง <ม่านสีดำ> ที่พวยพุ่งออกมาเหรอคะ? การที่จะมาดุฉันแบบนี้มันค่อนข้างจะผิดบทไปหน่อยนะ…"
10011105-183 = "[s] \"ครูอาจจะพูดนานสักหน่อย แต่ก็เพราะมีเรื่องที่ต้องบอกอยู่เยอะเลยน่ะ\""
10011105-189 = "คะ... คือว่า"
10011105-190 = "นี่ คุณครู ทำไมต้องทำหน้าน่ากลัวด้วยล่ะ… อ๊ายยย?!"
10011105-192 = "(แม้ว่าความวุ่นวายจะจบลงแล้ว แต่น่าจะยังต้องใช้เวลาอีกสักพัก)"
10011105-193 = "(กว่าเรื่องราวหลังจากนั้นจะเรียบร้อย)"
10011105-194 = "หัวใจแห่งความอับโชค"

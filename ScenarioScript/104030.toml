[translation]
104030-1 = "ตอนที่ 3;ต่อต้าน 2"
104030-2 = "แฮ่ก...... แฮ่ก...... "
104030-3 = "....... เธอไม่ยอมแพ้สินะ "
104030-4 = "อื้ม ใช่"
104030-5 = "...... ใช่ มันเคยเป็นอย่างนั้น"
104030-6 = "[s] \"เธอถามว่าเราจะทำยังไงกันต่อใช่ไหม?\""
104030-11 = "[ns1] \"ก็รู้ดีอยู่แล้วไม่ใช่เหรอ\" \n[ns2] \"เราก็จะร่วมมือกันแล้วหยุดไว้ให้ได้ เหมือนที่เคยทำมาตลอดไง\""
104030-14 = "[ns] \"ทุกคนกำลังผนึกกำลังและพยายามกันอยู่ จะทำให้มันสูญเปล่าไม่ได้\""
104030-16 = "[ns] \"เราจะทำลายที่นี่ แล้วกลับสู่พื้นดินกันอย่างปลอดภัย\""
104030-17 = "....... อื้ม ใช่ คุณครูก็ทำแบบนี้มาตลอด"
104030-18 = "ถึงแม้จะรู้ว่ามันไม่มีทางเป็นไปได้ก็เถอะ"
104030-28 = "ตรวจสอบกระบวนการเกิดใหม่ของแซงค์ทัม เปิดใช้แซงค์ทัมที่ถูกแช่แข็งไว้ชั่วคราว"
104030-34 = "เร่งความเร็วในการประมวลผลค่ะ"
104030-35 = "[ns] \"............?!\""
104030-39 = "อะ... อะไรเนี่ย?!  เวลาจำกัดในควบคุมการวิเคราะห์พหุมิติมัน......"
104030-40 = "คะ... คราวนี้อะไรอีกล่ะ?!"
104030-42 = "เวลามันลดลงเรื่อยๆ เลยค่ะ! เราควบคุมไว้ไม่ได้แล้วค่ะ!"
104030-43 = "โอ๊ยยย! เวลาลดลงเร็วมากเลย! ขืนเป็นแบบนี้ละก็ เราได้หมดเวลาก่อนที่จะทำลายเครื่องปลายทาง#nการสื่อสารได้แน่!!"
104030-44 = "เกิดอะไรขึ้นเนี่ย......?"
104030-47 = "ตอนนี้...... การควบคุมการวิเคราะห์พหุมิติกำลังถูกทำลาย แปลว่าศัตรูได้รับทรัพยากรในการประมวล#nผลใหม่......!"
104030-49 = "มีหอคอยปรากฏขึ้นอีกครั้งบนพื้นดินค่ะ!!"
104030-53 = "ทะ... ที่พื้นเหรอ?! ตรงไหน?"
104030-54 = "กะ... กำลังเช็กอยู่ค่ะ...... ถ้าไม่นับอีก 6 หอคอยที่กำลังจะปรากฏในตอนนี้ก็......"
104030-55 = "ศัตรูกำลังซ่อนตัวอยู่! เราต้องหาที่ที่การติดต่อสื่อสารผิดปกติ!!"
104030-56 = "ทุกที่ในคิโวทอสเหรอคะ......? ถ้ายังถูกแฮ็กอยู่แบบนี้ เราทำไม่ได้หรอกค่ะ!"
104030-57 = "......!!"
104030-63 = "......."
104030-64 = "หัวหน้าฮิมาริ ฉันเจอหอคอยแห่งใหม่ในระหว่างการค้นหาค่ะ "
104030-65 = "มันเป็นวัตถุที่ไม่เคยมีใครพบมาก่อน และดูเหมือนว่ามันจะปรากฏขึ้นมาในไม่ช้าแล้ว เราต้องรับมือในทันทีเลยค่ะ "
104030-66 = "ฉันจะส่งพิกัดให้ทราบ......"
104030-70 = "การสื่อสารขัดข้องค่ะ อาจเป็นเพราะผลกระทบจากหอคอยนี้ก็ได้......"
104030-82 = "เริ่มปรากฏเป็นรูปเป็นร่างแล้วเหรอคะ......? "
104030-88 = "......."
104030-89 = "หากนี่เป็นไพ่ลับของศัตรูละก็...... เราต้องหยุดการปรากฏตัวของมันทันทีค่ะ"
104030-90 = "แต่ถ้าฉันถอนกำลัง......"
104030-94 = "...บังคับเปิดใช้ระบบพาวเวอร์ สูท <อาบี เอชูห์> ตั้งแต่บัดนี้ค่ะ"
104030-99 = "....... ฉันจะกันทางนี้เอาไว้ให้ได้ค่ะ"
104030-100 = "หัวหน้าฮิมาริ คุณครู แล้วก็ทุกคน...... ขอให้ปลอดภัยกันนะคะ......!"
104030-106 = "เดี๋ยวก่อนค่ะ! เวลาในการควบคุมการวิเคราะห์พหุมิติที่ลดลงอย่างรวดเร็ว กลับมาช้าเหมือนเดิมแล้วค่ะ"
104030-107 = "ว่าไงนะ...? ไม่เห็นเข้าใจเลย แปลว่าหอคอยนั่นไม่เสถียรงั้นเหรอ? หรือว่า..."
104030-108 = "มีบางอย่างแปลกๆ ค่ะ ดูจากข้อมูลแล้ว......"
104030-112 = "สัญญาณนั่น......!"
104030-113 = "เชื่อมต่อกับ <อาบี เอชูห์> ค่ะ!!"
104030-119 = "โทคิ......!!"
104030-120 = "เชื่อมต่อกับอาวุธได้สินะคะ โล่งอกไปทีค่ะหัวหน้า"

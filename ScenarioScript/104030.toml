104030-122 = "....... ท่านริโอะ ปลอดภัยดีใช่ไหมคะ?"
104030-133 = "โทคิ ถอนกำลังเถอะค่ะ!! แค่คนคนเดียวขวางกองกำลังนั่นไว้ไม่ได้หรอกนะคะ!! "
104030-134 = "ใช่ ฉันจะส่งกำลังเสริมไปที่นั่นเดี๋ยวนี้ เธอหนีออกมาก่อน!!"
104030-139 = "....... ทำแบบนั้นไม่ได้หรอกค่ะ"
104030-143 = "ที่นี่เป็นพื้นที่ห่างไกลจากเขตปกครองตนเองมิลเลเนียมมากค่ะ แม้แต่ตำแหน่งที่อยู่ใกล้ที่สุดก็ยังต้อง#nใช้เวลาหลายชั่วโมงกว่าจะมาถึงค่ะ"
104030-144 = "ระหว่างที่ฉันยื้อเวลาไว้...... ก็ฝากทางนั้นด้วยนะคะ"
104030-153 = "......!! "
104030-154 = "โทคิ!!"
104030-159 = "ชมรมชิมอาหาร! ทางนั้นเป็นยังไงบ้างคะ?!!"

104030-166 = "พวกเรากำลังไป! ฉันเหยียบคันเร่งจนมิดแล้ว!!"
104030-167 = "แต่ว่าพวกศัตรูไล่ตามกันมาเยอะกว่าที่คิดอีกค่ะ~ จะเรียกว่าเป็นวิกฤตก็ยังได้~"
104030-169 = "คุณฟูกะ โค้งหน้าต้องทิ้งห่างให้ได้นะคะ"
104030-170 = "รู้แล้วน่า!!  ยังไงก็ต้องทิ้งระยะห่างให้ได้!"
104030-171 = "คุณฟูกะ ข้างหน้าค่ะ!!  ข้างหน้า!!"

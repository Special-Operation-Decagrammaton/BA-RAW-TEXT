[translation]
104030-1 = "第3話;抵抗（２）"
104030-2 = "哈啊……哈啊……"
104030-3 = "……不願意放棄啊。"
104030-4 = "嗯。"
104030-5 = "……是嗎。"
104030-6 = "[s]「這是我對『打算怎麼做？』的回答──」"
104030-11 = "[ns1]「我想，白子應該也非常清楚。」 \n[ns2]「大家齊心協力阻止你──就像往常一樣。」"
104030-14 = "[ns]「不能讓大家的努力白費。」"
104030-16 = "[ns]「我們會破壞這裡，回到地面。」"
104030-17 = "……嗯。老師以前也是這樣的。"
104030-18 = "即使是在走投無路的時候，即使明知道不可能──"
104030-28 = "正在確認聖所[ruby=Incarnation]的顯現程[/ruby]序。將凍結狀態的聖所一次性地活性化。"
104030-34 = "從現在起，加速演算。"
104030-35 = "[ns]「…………！？」"
104030-39 = "怎，怎麼了！？#n剩下的時間……！"
104030-40 = "這，這次到底又怎麼了！？"
104030-42 = "能抑制的時間正急速減少！#n無法繼續維持抑制了！"
104030-43 = "唔哇，怎麼會減少得這麼快！？#n這樣下去在破壞「裝置」之前時間就會結束的……！"
104030-44 = "究竟發生了什麼……？"
104030-47 = "──有某種東西在妨礙抑制……難道，敵人獲得了新的演算手段……？"
104030-49 = "──地上有聖所正在顯現！！"
104030-53 = "地，地上！？在哪裡！！？"
104030-54 = "正，正在確認……但是，預計出現的6個聖所並沒有──"
104030-55 = "被敵人巧妙地隱藏起來了啊……#n快找出有著異常通訊障礙的地點！！"
104030-56 = "對整個奇普托斯？#n在被駭入的狀態下實在是──"
104030-57 = "……！！"
104030-63 = "……"
104030-64 = "陽葵部長，在搜查中發現了新的「聖所」。"
104030-65 = "是從未被觀測到的新個體。這樣下去也許會顯現。#n需要立刻採取應對措施。"
104030-66 = "我將座標傳送──"
104030-70 = "……通訊中斷。是這個聖所的影響嗎。"
104030-82 = "已經開始顯現了嗎……？"
104030-88 = "……"
104030-89 = "如果這是敵人的王牌……得盡快阻止顯現才行……"
104030-90 = "但是，如果我撤退的話──"
104030-94 = "……切換為動力裝甲系統「Abi-Eshuh」。"
104030-99 = "……這裡就由我來抵擋。"
104030-100 = "陽葵部長、老師、大家……在那之前，請務必……！！"
104030-106 = "──抑制時間的減少速度恢復了！"
104030-107 = "你說什麼……！？是因為那個聖所處於不穩定的狀態嗎？#n還是說──"
104030-108 = "究竟，發生了什麼……數據上並沒有特別的變化。#n然而，為什麼會……"
104030-112 = "那個信號是……！？"
104030-113 = "──連接到「Abi-Eshuh」了！！"
104030-119 = "……季！！"
104030-120 = "連接到「武裝」了啊，太好了。"
104030-121 = "季，季……！？"
104030-122 = "……久疏問候，莉央大人。#n您平安無事真是太好了。"
104030-133 = "請撤退吧，季！！#n你一個人沒辦法對抗那麼多敵人──"
104030-134 = "沒錯……我立刻派支援部隊過去。先撤退吧！"
104030-139 = "──恕難從命。"
104030-143 = "這裡是距離千年自治區非常遠的地方。#n就算是距離最近的部隊，到達這裡也需要不少時間吧。"
104030-144 = "在我爭取時間的這段期間……請各位務必阻止這個聖所……！"
104030-153 = "……！！"
104030-154 = "季！！"
104030-159 = "美食研究會！請報告現在的情況！！"
104030-164 = "哇啊啊啊啊啊──！！"
104030-165 = "哇～～！！好厲害～！"
104030-166 = "正在全速前進！！"
104030-167 = "但是追上來的敵人比想像中還多，可以說陷入危機了呢～★"
104030-169 = "風華同學，在下一個轉角決勝負吧！"
104030-170 = "我知道啦！！這種程度不算什麼！"
104030-171 = "風華同學，前面！！危險啊！！"
104030-176 = "唔哇啊啊啊啊啊──！？"
104030-177 = "不要啊啊啊啊──！！"
104030-178 = "啊～～！！"
104030-179 = "喂喂喂，等等！#n呀啊──！？"
104030-185 = "老師……"
104030-186 = "[s]「嗯，戰鬥吧。和大家一起克服困難。」"
104030-190 = "……嗯。"

[translation]
83306040500-6 = "พรมนี้น่าสงสัยจัง ข้างใต้มีหลุมอยู่เหรอ..."
83306040500-7 = "กะ... เกิดหลุมลึกขนาดเท่านี้ตั้งแต่เมื่อไรกัน?!"
83306040500-8 = "ฉันยึดอุปกรณ์ทั้งหมดที่พวกนั้นมีแล้วนี่นา...!"
83306040500-9 = "ฉันถึงได้บอกไงล่ะว่าเราประมาทกับชมรมพัฒนาออนเซ็นไม่ได้"
83306040500-10 = "ฉันจะไปตามหาตัวเดี๋ยวนี้ สั่งให้คณะกรรมการวินัยทุกคนเตรียมพร้อมด้วย"
83306040500-11 = "คะ... ค่ะ!"

[translation]
63060-1 = "第6話;於至低之處"
63060-3 = "是錠前沙織……同學對吧？久仰大名。#n聽說你是奧利斯小隊的隊長。#n同為一年級，這次任務還請多多指教。"
63060-4 = "你就是梯昴吧。#n我已經聽人說明過了。"
63060-5 = "這是什麼……？"
63060-6 = "……"
63060-7 = "原來是那時候啊。"
63060-8 = "是我和錠前沙織，第一次為了執行任務而見面的日子。"
63060-9 = "當時，我們兩個都還是一年級。"
63060-10 = "……他給我的印象，是個既冷淡又頑固的學生。"
63060-11 = "那麼在執行這次任務之前，我想先討論一下作戰計畫。"
63060-12 = "這個部分我已經處理完了。#n來，計畫書在這邊。記得把它記熟。"
63060-16 = "……咦？"
63060-17 = "怎麼了嗎？"
63060-18 = "那個，一般在開始做事之前，不是應該先走過一定的流程嗎？"
63060-19 = "比如共享彼此的戰力、擅長的項目，或者作戰的執行方向與可能的情境之類的……"
63060-20 = "沒自信的話可以退出。#n這本來就是我一個人就能完成的任務。"
63060-21 = "……你一直都是這麼做事的嗎？#n就連在小隊裡也是？"
63060-22 = "在小隊的時候反而不需要這些。#n因為大家都能扮演好自己的角色。"
63060-23 = "你該不會要說，這是沙織同學對其他人的體貼吧？"
63060-24 = "是又如何？"
63060-25 = "……這樣啊。"
63060-33 = "給我個解釋好不好，沙織！"
63060-34 = "沒什麼好解釋的。一切都只是為了完成任務而已。"
63060-35 = "在錠前沙織眼中，除了小隊之外的一切似乎都不怎麼重要。"
63060-36 = "因此他和偶爾必須合作的對象，總是維持著尷尬的關係。"
63060-37 = "……現在想想，恐怕也只有我這種人，才有辦法忍受他那種個性吧。"
63060-38 = "所以你就把我丟到射線上，還把全部剩餘的火力都灌下來了！？"
63060-39 = "我們已經二年級了耶！#n就不能稍微瞻前顧後一下再行動嗎！#n別再跟一年級的時候一樣了！"
63060-40 = "因為那是能夠最快完成任務的方法。"
63060-41 = "任務中的美德是力量、勝利與迅速執行。失敗則是罪過。"
63060-42 = "……意思是其他的一切都只是附帶損害嗎？"
63060-46 = "看來我們總算能取得共識了啊。"
63060-47 = "我不是那個意思！"
63060-49 = "沙織？你……沒能晉級是嗎？"
63060-50 = "嗯？是說那件事啊。#n好像是這樣沒錯。"
63060-51 = "現在想想，那或許是夫人的意思吧。"
63060-52 = "對夫人來說，小隊……#n不，除了秤敦子以外的一切，似乎都只是工具而已。"
63060-53 = "所以他才會把沙織當作某種槓桿來使用。"
63060-54 = "而我不知為何……對這件事感覺很不滿，甚至到了難以忍受的地步。"
63060-55 = "感覺就像看見曾在奧利斯受苦的其他孩子們一樣。"
63060-56 = "你難道都不在乎嗎？#n這樣會無法升上三年級耶！"
63060-57 = "有什麼好在乎的嗎？#n只不過是不能變成三年級而已。"
63060-58 = "能夠多擔任小隊隊長一年，倒也不全然是件壞事。"
63060-59 = "……你還是滿腦子只想著小隊啊，沙織。"
63060-60 = "有什麼問題嗎？"
63060-61 = "不，沒什麼。#n那我就一個人去當高年級生了，你自己好好加油吧。"
63060-62 = "關於這點……"
63060-63 = "……咦？"
63060-64 = "總覺得「後輩」們似乎更依賴你啊，昴。"
63060-65 = "……那我就姑且跟你說聲謝謝吧。"
63060-66 = "嗯，所以我才認為自己實在無法勝任那個位置。"
63060-67 = "不過教官的工作，應該還能跟以往一樣繼續做下去才對。"
63060-68 = "…………所以你的意思是，要我好好照顧那些被你訓練到精神崩潰的學生嗎？"
63060-69 = "果然一下就理解了啊。#n一直以來謝謝你了。"
63060-70 = "你一開始別搞出那種事不就好了！！！"
63060-72 = "不過，仔細想想……"
63060-73 = "無論面對什麼樣的情況，錠前沙織始終不曾改變。"
63060-74 = "所以我才會認為……那個人永遠不可能改變。"
63060-95 = "[ns]「稍微清醒一點了嗎？」"
63060-97 = "這裡……是哪裡？"
63060-98 = "[s]「是被你稱為波塔帕西斯的地方。」"
63060-99 = "還在原本的地方啊。"
63060-100 = "……"
63060-101 = "我昏迷了多久？"
63060-102 = "[s]「大約10秒左右吧？」"
63060-103 = "這樣啊。"
63060-104 = "一切都結束了嗎……老師？"
63060-105 = "[s]「這個問題我反而想問你呢……」"
63060-106 = "這樣啊……"
63060-107 = "這個問題……應該問我是嗎？"
63060-108 = "……"
63060-113 = "…………"
63060-114 = "………………"
63060-115 = "……………………都結束了。"
63060-116 = "是啊。全部……都結束了。"
63060-117 = "我……"
63060-118 = "終究什麼都沒能做到……"
63060-119 = "因為我的一意孤行，害得大家……"
63060-120 = "甚至得做出那種事情……"
63060-121 = "嗚……"
63060-122 = "（昴的哭泣聲斷斷續續地傳了過來）"
63060-123 = "（稍微環顧一下四周後，走到他的身旁坐了下來）"
63060-129 = "（決定在昴平靜下來之前，多給他一些時間）"
63060-132 = "……為什麼什麼話都不說？"
63060-133 = "咦？因為不知道該說什麼？"
63060-134 = "那應該是我要說的台詞吧……"
63060-135 = "[s]「你想必很難受吧？」"
63060-136 = "……"
63060-137 = "到頭來，我究竟想做什麼呢。"
63060-138 = "[s]「你想守護你的奧利斯。」"
63060-139 = "最終卻落得這副德行。"
63060-140 = "……"
63060-141 = "都結束了，老師。#n我所做的一切都沒有意義。"
63060-142 = "認為自己必須有所作為，盡可能嘗試的結果……就像你現在看到的一樣。"
63060-143 = "為了那些受傷的孩子、為了那些無法適應的孩子，還有……或許也是為了我自己。"
63060-144 = "因為我不想再像以前一樣，只是隨波逐流地活著了……"
63060-145 = "但是……"
63060-146 = "如果早知道會這樣，我寧願自己當初什麼都不做……"
63060-147 = "[s1]「不是那樣的。」\n[s2]「光是試著去做，就已經足夠了。」"
63060-150 = "……就算結果是這樣也是？"
63060-151 = "不僅如此，我甚至連動機都不單純。"
63060-152 = "只是在其他孩子面前虛張聲勢，裝作自己知道該怎麼走而已。"
63060-153 = "其實我也同樣一無所知……就跟沙織說的一樣。"
63060-154 = "把奧利斯的方式說得好像很了不起，然而在那前方……卻什麼也沒有。"
63060-155 = "[s3]「不過，至少你實際確認過這件事了，不是嗎？」\n[s4]「而且你還是學生，可以只看『過程』來評價結果。」"
63060-158 = "只憑結果決定成敗的痛苦，等成為大人之後再承受就夠了……是嗎？"
63060-159 = "……"
63060-160 = "我不想拿學生的身分，作為凡事都能被原諒的藉口……"
63060-164 = "你說我這種心態很好，希望往後可以繼續保持……？"
63060-165 = "……"
63060-166 = "就算真是如此……"
63060-167 = "身處底層的人生，又能有什麼改變呢。"
63060-168 = "我們終究只能像這樣得過且過……最後就這麼消失。"
63060-169 = "無論再怎麼努力擦拭垃圾，它也不會成為寶石。"
63060-170 = "……"
63060-171 = "請不要讓我去做那些無法實現的夢。#n那樣只會讓我更悲慘而已。"
63060-172 = "沒有比「只要努力就一定會有收穫」更不負責任的話了。"
63060-173 = "[s5]「有時候確實會碰到這種情況。」\n[s6]「就算付出努力，也可能什麼都無法改變。」\n[s7]「甚至還可能會失敗，把情況變得比以前更糟。」"
63060-179 = "[ns8]「不過，你可以試著這麼想。」\n[ns9]「如果已經身處谷底的話，不就只剩下往上爬這條路了嗎？」"
63060-182 = "……這該不會是在鼓勵我吧？"
63060-184 = "實際上也只能這樣鼓勵了不是嗎？"
63060-188 = "沙織……？"
63060-193 = "沒錯。"
63060-194 = "我們確實過著底層的人生。"
63060-195 = "你說對吧，昴？"
63060-196 = "既然無法繼續墜落，也沒有地方能夠逃走……#n無論結果將會如何，總得看到最後才行。"
63060-197 = "反正說真的……每天早就已經慘到不能再慘了。"
63060-198 = "耶，耶嘿嘿……#n萬一谷底下面真的還有更深的谷底……"
63060-199 = "到時候，就當作是去參觀地下室，不就好了嗎……？"
63060-200 = "……真是的，你們小隊全都變成笨蛋了啊。"
63060-201 = "是啊。想在外面的世界生存，至少得先具備這種心態。"
63060-202 = "……否則應該早就撐不下去了吧。"
63060-203 = "總之，最重要的是要馬上動起來……#n理由是什麼其實都無所謂……耶，耶嘿嘿……"
63060-204 = "沒錯。所以我們大家一起走吧。"
63060-205 = "不是因為「大家一起就有力量」這種童話般的荒唐理由。"
63060-206 = "而是因為[ruby=奧利斯]我們[/ruby]，如果不是大家在一起就什麼都做不了。"
63060-207 = "對吧？"
63060-216 = "來吧，前輩。差不多該起來囉。"
63060-217 = "一直躺在泥地上的話，衣服會全部髒掉的哦？"
63060-222 = "……"
63060-227 = "本來就已經髒到不行了吧。"
63060-228 = "就算是這樣，我覺得還是不要弄得更髒比較好。"
63060-229 = "……"
63060-230 = "是啊。你說的對。"
63060-248 = "團長！？"
63060-249 = "團長～嗚嗚嗚嗚～你知不知道我有多擔心你！！！"
63060-250 = "芹奈！花繪？這裡是……#n原來如此，是救護騎士團的病房啊。"
63060-251 = "……"
63060-252 = "現在距離考試還剩下幾天！？"
63060-253 = "咦？團，團長？#n雖然那確實很重要沒錯，但現在團長的身體……"
63060-254 = "這才是最重要的事！！！"
63060-255 = "要是救護騎士團在考試中輸給其他社團的話，我絕對不能接受！"
63060-256 = "……"
63060-257 = "是！團長！那當然！"
63060-258 = "……"
63060-259 = "說的也是呢，團長。#n現在還有時間，一起從容地準備吧。"
63060-260 = "大家都沒問題吧？"
63060-262 = "是！"
63060-264 = "下一話;嘗試"

63060-3 = "#na;스바루;조마에 사오리…… 씨죠? 이름은 많이 들었습니다. 아리우스 스쿼드의 리더시고요. 같은 1학년끼리, 이번 임무, 잘해 봐요."
63060-4 = "#na;사오리;카케하시 스바루, 였던가. 안내는 받았다."

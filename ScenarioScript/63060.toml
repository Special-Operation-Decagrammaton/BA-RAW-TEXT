[translation]
63060-1 = "Episode 6;From the Bottom"
63060-3 = "You're...Joumae Saori? I've heard your name a lot, especially as the leader of the Arius Squad. As fellow first-years, let's do our best to complete our mission together."
63060-4 = "Kakehashi Subaru, was it? I've been briefed."
63060-5 = "What's this?"
63060-6 = "..."
63060-7 = "That was the day."
63060-8 = "The day I first met Joumae Saori on a mission."
63060-9 = "Back when we were both first-years."
63060-10 = "...I found her to be a cold, unapproachable peer."
63060-11 = "Should we go over the plan before we begin the operation?"
63060-12 = "Here, I've finished it already. Review it."
63060-16 = "...Okay?"
63060-17 = "Is there a problem?"
63060-18 = "Shouldn't we start with reviewing the basics before we get started on any plans?"
63060-19 = "You know, like disclosing our strengths, weaknesses, specialties, procedures..."
63060-20 = "Look, if you don't think you can keep up, go home. I can do this alone."
63060-21 = "...Are you always like this? Even with the Squad?"
63060-22 = "No, not with the Squad. Everyone knows their roles."
63060-23 = "Are you going to try to tell me that you're being \"considerate\" right now?"
63060-24 = "I am."
63060-25 = "...I see."
63060-33 = "Explain yourself, Saori!"
63060-34 = "There's nothing to explain. I did what was necessary to complete the mission."
63060-35 = "To Joumae Saori, anything outside of the Squad seemed irrelevant."
63060-36 = "When she had to work with anyone else, it was uncomfortable and frustrating."
63060-37 = "...I was one of the few, maybe the only person, who could tolerate her."
63060-38 = "It was \"necessary\" to use me as bait and empty an entire artillery barrage on me?!"
63060-39 = "At least TRY to act like you have a brain! Those kinds of things won't fly now that we're second-years!"
63060-40 = "It was the fastest way to complete the mission."
63060-41 = "A mission's virtues are strength, victory, and swift execution. Failure is a sin."
63060-42 = "...So everything else is just collateral damage?"
63060-46 = "Looks like we're finally communicating."
63060-47 = "That's NOT what I meant!"
63060-49 = "Saori? You...didn't get promoted?"
63060-50 = "Hm? Ah...that. That's just what happened."
63060-51 = "Looking back, that had likely been Madame's intention from the beginning."
63060-52 = "To Madame, everything except the Squad... No, everything except Hakari Atsuko, was just a tool."
63060-53 = "She probably wanted to use Saori as leverage in one way or another."
63060-54 = "...And for some reason, that made me angrier than I expected."
63060-55 = "It was how I felt every time I saw the children suffering in Arius."
63060-56 = "You're not bothered? You don't want to graduate to your third year?!"
63060-57 = "Does it matter? If I'm a second-year or a third-year?"
63060-58 = "I have one more year as leader of the Squad, at least. There are benefits as well."
63060-59 = "...It really is all about the Squad with you, Saori."
63060-60 = "Is there something wrong with that?"
63060-61 = "No. Nothing. Well then, I'll go on ahead and enjoy being a lone upperclassman. Best of luck to you."
63060-62 = "About that..."
63060-63 = "...Yes?"
63060-64 = "The underclassmen seem to rely on you more, Subaru."
63060-65 = "...Thanks."
63060-66 = "Exactly. That's made me realize that I could never fill the role you've taken on."
63060-67 = "I believe I fit best as an instructor."
63060-68 = "...So you mean I'm supposed to take care of all the students after you break them in training?"
63060-69 = "You're always quick to understand my point. Thank you."
63060-70 = "No! You're missing MY point entirely!!"
63060-72 = "Still...when I think about it..."
63060-73 = "No matter the situation, Joumae Saori never changed."
63060-74 = "I thought she was just incapable of it."
63060-95 = "[ns] \"Are you awake now?\""
63060-97 = "Where...am I?"
63060-98 = "[s] \"The place you called 'Porta Pacis.'\""
63060-99 = "So we never moved."
63060-100 = "..."
63060-101 = "How long was I unconscious?"
63060-102 = "[s] \"About ten seconds?\""
63060-103 = "I see."
63060-104 = "...Is it over, Sensei?"
63060-105 = "[s] \"I think that's my question, actually.\""
63060-106 = "I...see."
63060-107 = "So... You're wondering which one I am?"
63060-108 = "..."
63060-113 = "Um..."
63060-114 = "I think..."
63060-115 = "...it's over."
63060-116 = "Yes. Everything...is over."
63060-117 = "I..."
63060-118 = "In the end, I couldn't do anything..."
63060-119 = "I forced my stubborn ideals down everyone's throats."
63060-120 = "And after doing all that..."
63060-121 = "*sob*"
63060-122 = "Subaru's sobs were uneven and ragged."
63060-123 = "I looked around, then sat beside her."
63060-129 = "I decided to wait until her crying settled."
63060-132 = "...Why aren't you saying anything?"
63060-133 = "You don't know what to say...?"
63060-134 = "I think that's my line."
63060-135 = "[s] \"It hurts, doesn't it?\""
63060-136 = "..."
63060-137 = "What...was I even trying to do?"
63060-138 = "[s] \"You were trying to protect Arius.\""
63060-139 = "And look at how that worked out."
63060-140 = "..."
63060-141 = "It's over, Sensei. All of it was in vain."
63060-142 = "I thought I had to do something, anything, so I just tried everything I could... This is the result of all that effort."
63060-143 = "I did it for the children who the world left hurt and bruised, the ones who had nowhere they belonged, and maybe...for myself too."
63060-144 = "I didn't want to just keep drifting through life."
63060-145 = "It's...all lip service in the end, though."
63060-146 = "If I'd known it was going to end up like this, I probably wouldn't have done anything."
63060-147 = "[s1] \"No, that's not true.\"\n[s2] \"There's meaning behind trying your hardest.\""
63060-150 = "...Even when this is the result?"
63060-151 = "And even though my intentions weren't pure?"
63060-152 = "I put on this brave front in front of all the kids, pretending I knew the way forward."
63060-153 = "Saori was right, unfortunately. I had no idea which way I was going."
63060-154 = "I bragged about doing things the Arius way, but in the end...they were empty words."
63060-155 = "[s3] \"But you learned that from this experience, right?\"\n[s4] \"Students have the privilege of being judged on the process, not the results.\""
63060-158 = "...So I shouldn't worry about the terrible reality of being judged on the results of what I do until I'm an adult?"
63060-159 = "..."
63060-160 = "Saying I'm a student and hiding behind my inexperience isn't a good enough excuse for forgiveness."
63060-164 = "...As long as I hold onto that mindset, it'll be okay?"
63060-165 = "..."
63060-166 = "But still..."
63060-167 = "What's really going to change for people who are already at rock bottom?"
63060-168 = "We're just going to continue living like this and disappear one day anyway."
63060-169 = "No matter how hard you polish trash, it doesn't turn into a jewel."
63060-170 = "..."
63060-171 = "Don't give us hope for dreams we can never reach. That's an even more pitiful existence than our current one."
63060-172 = "Preaching that things will always work out as long as we \"try really hard\" would be pretty irresponsible, wouldn't it?"
63060-173 = "[s5] \"You're right, there's truth to that.\"\n[s6] \"Sometimes no amount of effort can turn things around.\"\n[s7] \"You can fail, or even make things worse.\""
63060-179 = "[ns8] \"But, you know, if you're really at rock bottom...\"\n[ns9] \"...the only way you can go is up, right?\""
63060-182 = "...Is that seriously how you're going to try to encourage me?"
63060-184 = "Sometimes that really is all you can say, though."
63060-188 = "Saori...?"
63060-193 = "Yeah."
63060-194 = "Because we really have hit rock bottom."
63060-195 = "Haven't we, Subaru?"
63060-196 = "We can't fall any lower, and there's nowhere left to run. Whatever happens, we'll need to see it through to the end."
63060-197 = "...I mean, every day was already the worst anyway, so whatever."
63060-198 = "Heh, eheehee... I guess there probably is something even lower than rock bottom..."
63060-199 = "If that happens, we can just say we came down to check out the basement, right...?"
63060-200 = "...You've all really turned into dummies. The entire Squad."
63060-201 = "You'll need to adopt this kind of mindset, however, if you want to survive out there."
63060-202 = "...We wouldn't have made it otherwise."
63060-203 = "There are times when nothing else matters except moving forward... So we just point to whatever reason we can and use it to keep going. Heh. Heehee..."
63060-204 = "Right. So let's all go together."
63060-205 = "Not because we think that sticking together means that everything will work out in a beautiful fairy tale ending."
63060-206 = "It's simply that...we Arius kids seem to be incapable of doing anything unless it's together."
63060-207 = "Isn't that right?"
63060-216 = "Come on, Subaru. Time to get up."
63060-217 = "Your clothes are gonna get dirty if you keep lying there."
63060-222 = "..."
63060-227 = "I don't think it's humanly possible for them to get any dirtier than this."
63060-228 = "Well, let's try our best to not make it worse."
63060-229 = "..."
63060-230 = "Yeah. Let's do that."
63060-248 = "Captain?!"
63060-249 = "Captain! Waaah! You have no idea how worried I was!!"
63060-250 = "Serina? Hanae? This place is... We're in the Remedial Knights infirmary?"
63060-251 = "..."
63060-252 = "How many days are left until the Trinity practice exams?!"
63060-253 = "Huh? C-Captain? I mean, that's important too, but maybe we should start with your health..."
63060-254 = "No! This absolutely takes priority!"
63060-255 = "I will not allow the Remedial Knights to be looked down upon by other clubs or students!"
63060-256 = "..."
63060-257 = "Yes, Captain! Understood!"
63060-258 = "..."
63060-259 = "You're right, Captain. We still have some time, so let's do all we can to prepare."
63060-260 = "Everyone's okay, right?"
63060-262 = "Yes!"
63060-264 = "Next Episode;An Attempt"

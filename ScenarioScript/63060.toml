63060-10 = "#na;스바루;……차가운 데다 꽉 막힌 학생이라는 느낌이었어."
63060-11 = "#na;스바루;그러면 이번 임무 수행에 앞서, 작전 협의를 먼저 해 볼까 하는데요."
63060-12 = "#na;사오리;그거라면 내가 끝내 두었다. 여기, 계획서다. 숙지해 둬."

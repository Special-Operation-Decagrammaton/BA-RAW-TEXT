[translation]
63060-1 = "ตอนที่ 6;ในจุดที่ต่ำสุด"
63060-3 = "คุณโจมาเอะ... ซาโอริใช่มั้ยคะ? ฉันได้ยินชื่อนี้บ่อยเลยค่ะ เป็นหัวหน้าสควอดของอาเรียสใช่มั้ยคะ? เราอยู่ชั้นปีที่ 1 เหมือนกัน มาตั้งใจทำภารกิจนี้กันนะคะ"
63060-4 = "คาเกฮาชิ สุบารุสินะ มีคนแจ้งมาแล้ว"
63060-5 = "อะไรกันน่ะ?"
63060-6 = "..."
63060-7 = "ตอนนั้นเองสินะ"
63060-8 = "วันที่ได้เจอกับโจมาเอะ ซาโอริเป็นครั้งแรกในการทำภารกิจ"
63060-9 = "ตอนนั้นเราอยู่ชั้นปีที่ 1 กันทั้งคู่"
63060-10 = "ฉันว่าเธอเป็นนักเรียนที่เย็นชาและน่าอึดอัดเลยละ"
63060-11 = "ถ้างั้นก่อนที่เริ่มภารกิจครั้งนี้ ฉันขอพูดเกี่ยวกับกลยุทธ์ก่อนนะคะ"
63060-12 = "เรื่องนั้นฉันจัดการแล้ว นี่แผนกลยุทธ์ ศึกษาเอาไว้ล่ะ"
63060-16 = "คะ...?"
63060-17 = "ทำไมเป็นแบบนี้ล่ะ?"
63060-18 = "คือว่า ถ้าเราจะเริ่มทำอะไรสักอย่าง ก็ควรจัดการแต่ละอย่างไปตามลำดับไม่ใช่เหรอคะ?"
63060-19 = "เราควรแบ่งปันจุดแข็ง ทักษะพิเศษ ทิศทางการเคลื่อนไหว แล้วก็สถานการณ์ที่คาดว่าจะเกิด..."
63060-20 = "ถ้าไม่มั่นใจ จะวางมือก็ได้นะ ยังไงภารกิจนี้ฉันก็ทำคนเดียวได้สบายอยู่แล้ว"
63060-21 = "เป็นแบบนี้มาตลอดเลยเหรอคะ...? กับสควอดกันเองก็ด้วยเหรอ?"
63060-22 = "ถ้าเป็นสควอดก็ยิ่งไม่ต้องมีเรื่องแบบนี้หรอก เพราะแต่ละคนทำหน้าที่ของตัวเองกันได้"
63060-23 = "ฉันหวังว่าคุณซาโอริจะไม่บอกว่านี่คือความห่วงใยที่มีต่อคนอื่นนะคะ"
63060-24 = "แล้วถ้าใช่ล่ะ?"
63060-25 = "งั้นเหรอคะ...?"
63060-33 = "อธิบายมาสิคะ ซาโอริ!"
63060-34 = "จะต้องอธิบายอะไร ทั้งหมดนี้ก็เพื่อให้ภารกิจสำเร็จลุล่วง"
63060-35 = "สำหรับโจมาเอะ ซาโอริแล้ว ดูจะไม่มีอะไรสำคัญไปกว่าสควอด"
63060-36 = "เธอก็เลยไม่ค่อยลงรอยกับคนที่ต้องร่วมงานด้วย"
63060-37 = "จริงๆ เลยนะ... เหมือนจะมีแค่ฉันคนเดียวเลยละที่ยอมรับนิสัยนั้นได้"
63060-38 = "เพราะแบบนั้นก็เลยโยนฉันไปอยู่แนวหน้า แล้วยิงด้วยกระสุนทั้งหมดที่มีงั้นเหรอคะ?!"
63060-39 = "ตอนนี้เราอยู่ชั้นปีที่ 2 แล้วนะคะ! เราควรทำงานให้รอบคอบมากขึ้นไม่ใช่เหรอคะ? จะได้ไม่เหมือนตอนชั้นปีที่ 1 ไง!"
63060-40 = "ถ้าจะทำภารกิจให้เสร็จเร็วที่สุด ก็ต้องใช้วิธีนั้น"
63060-41 = "ความงดงามที่แท้จริงของภารกิจก็คือความแข็งแกร่ง ชัยชนะ และความรวดเร็ว ส่วนความล้มเหลวคือความผิดขั้นรุนแรง"
63060-42 = "ส่วนอย่างอื่นก็เป็นแค่ความเสียหายที่เกิดขึ้นโดยบังเอิญเหรอคะ...?"
63060-46 = "ในที่สุดเราก็เริ่มเข้าใจกันแล้วสินะ"
63060-47 = "ฉันไม่ได้หมายความอย่างนั้นสักหน่อยค่ะ!"
63060-49 = "ซาโอริ? ไม่ได้เลื่อนชั้น... เหรอคะ?"
63060-50 = "หืม? อ้อ เรื่องนั้นน่ะเหรอ ก็เหมือนจะเป็นอย่างนั้นละ"
63060-51 = "พอมาคิดดูตอนนี้ นี่อาจเป็นความตั้งใจของมาดามก็ได้"
63060-52 = "สำหรับมาดามแล้ว... ทุกอย่างนอกจากสควอด ไม่สิ ทุกอย่างนอกจากฮาคาริ อาสึโกะ น่าจะเป็นแค่เครื่องมือเท่านั้น"
63060-53 = "เพราะงั้นก็เลยพยายามใช้ซาโอริเป็นเครื่องมืออย่างหนึ่ง"
63060-54 = "และฉันก็รู้สึกไม่พอใจกับเรื่องนั้นจนทนไม่ไหว..."
63060-55 = "ไม่แพ้กับการได้เห็นเด็กๆ คนอื่นที่กำลังทุกข์ทรมานในอาเรียสเลยละ"
63060-56 = "ไม่รู้สึกอะไรเลยเหรอคะ? ไม่ได้ขึ้นชั้นปีที่ 3 เลยนะ!"
63060-57 = "ก็ไม่ได้รู้สึกอะไรนะ? ก็แค่ไม่ได้ขึ้นชั้นปีที่ 3 ไม่ใช่เหรอ?"
63060-58 = "ในแง่หนึ่ง ฉันจะได้เป็นหัวหน้าสควอดต่อไปอีก 1 ปี งั้นมันก็ไม่ใช่เรื่องไม่ดีไปทั้งหมดหรอก"
63060-59 = "ยังเป็นสควอดจนถึงที่สุดสินะคะ... ซาโอริ"
63060-60 = "แล้วมีปัญหาอะไรหรือไง?"
63060-61 = "ไม่ค่ะ ไม่มีค่ะ ถ้างั้นฉันจะเลื่อนชั้นไปก่อน อยู่ตรงนี้ก็ตั้งใจให้ดีนะคะ"
63060-62 = "เรื่องนั้นน่ะ"
63060-63 = "คะ...?"
63060-64 = "ฉันว่า 'รุ่นน้อง' น่าจะไปพึ่งพาเธอกันมากขึ้นน่ะ สุบารุ"
63060-65 = "ขอบคุณที่ช่วยพูดอย่างนั้นนะคะ..."
63060-66 = "อื้อ ที่ฉันจะบอกก็คือ ฉันคิดว่าตำแหน่งนั้นมันหนักหนาเกินไปสำหรับฉัน"
63060-67 = "แต่งานผู้ฝึกสอน ฉันน่าจะทำต่อไปได้เหมือนเดิมนะ"
63060-68 = "สรุปว่าคุณจะขอให้ฉันช่วยดูแลนักเรียนที่ถูกทำลายสภาพจิตใจจากกระบวนการฝึกสอนของคุณ อย่างนั้นเหรอคะ...?"
63060-69 = "หัวไวดีนี่ ฉันรู้สึกขอบใจเธอเสมอเลยค่ะ"
63060-70 = "ฉันกำลังบอกว่าไม่ควรทำเรื่องแบบนั้นตั้งแต่แรกต่างหากค่ะ!!!"
63060-72 = "แต่ว่าถ้าลองมาคิดดูแล้ว"
63060-73 = "ไม่ว่าสถานการณ์จะเป็นยังไง โจมาเอะ ซาโอริก็ยังคงเหมือนเดิม"
63060-74 = "ฉันก็เลยคิดว่าไม่มีอะไรที่ทำให้เธอเปลี่ยนแปลงไปได้เลย"
63060-95 = "[ns] \"ได้สติหรือยัง?\""
63060-97 = "ที่นี่... คือที่ไหนคะ?"
63060-98 = "[s] \"ที่นี่คือปอร์ตาปาซิสตามที่สุบารุบอกไว้น่ะ\""
63060-99 = "ยังอยู่ที่นี่สินะคะ"
63060-100 = "..."
63060-101 = "ฉันสลบไปนานแค่ไหนเหรอคะ?"
63060-102 = "[s] \"น่าจะสัก 10 วินาทีนะ?\""
63060-103 = "อย่างนี้นี่เองสินะคะ"
63060-104 = "ทุกอย่างจบลงแล้วเหรอคะ คุณครู...?"
63060-105 = "[s] \"คำถามนั้นครูอยากถามสุบารุมากกว่า...\""
63060-106 = "อย่างนั้น... สินะคะ"
63060-107 = "แล้วคุณครูคิดว่ายังไงเหรอคะ?"
63060-108 = "..."
63060-113 = "......"
63060-114 = "........."
63060-115 = ".............จบลงแล้ว... สินะคะ"
63060-116 = "ค่ะ ทั้งหมด... จบลงแล้วค่ะ"
63060-117 = "ฉัน..."
63060-118 = "สุดท้ายแล้ว ฉันก็ทำอะไรไม่ได้เลย..."
63060-119 = "ความดื้อรั้นของฉัน ทำให้ทุกคน..."
63060-120 = "ฉันก่อเรื่องใหญ่ถึงขนาดนั้น..."
63060-121 = "ฮือ..."
63060-122 = "(เสียงสะอื้นของสุบารุดังขึ้นเป็นระยะๆ)"
63060-123 = "(คุณครูมองไปรอบๆ แล้วเข้าไปนั่งข้างๆ)"
63060-129 = "(และตัดสินใจว่าจะรอจนกว่าสุบารุจะหยุดร้องไห้...)"
63060-132 = "ทำไมถึงไม่พูดอะไรเลยล่ะคะ...?"
63060-133 = "คะ? ไม่รู้ว่าต้องพูดอะไร... งั้นเหรอคะ?"
63060-134 = "ฉันต่างหากที่อยากพูดแบบนั้น..."
63060-135 = "[s] \"เหนื่อยใช่มั้ย?\""
63060-136 = "..."
63060-137 = "ที่ผ่านมาฉันอยากทำอะไรเหรอคะ?"
63060-138 = "[s] \"อยากปกป้องอาเรียสเอาไว้ไง\""
63060-139 = "และท้ายที่สุดถึงได้มาอยู่ในสภาพนี้ไงคะ"
63060-140 = "..."
63060-141 = "ทุกอย่างจบลงแล้วค่ะ คุณครู มันไม่มีความหมายอะไรเลยค่ะ"
63060-142 = "ฉันคิดว่าต้องทำอะไรสักอย่าง ก็เลยลองทำทุกอย่าง แต่สุดท้ายก็ออกมาเป็นแบบนี้ค่ะ"
63060-143 = "เพื่อเด็กๆ ที่ได้รับบาดแผล เพื่อเด็กๆ ที่ปรับตัวไม่ได้ และ... บางทีอาจจะเพื่อตัวฉันเอง..."
63060-144 = "ฉันไม่อยากใช้ชีวิตแบบเดิมไปเรื่อยๆ อีกต่อไปแล้ว..."
63060-145 = "แต่ว่า..."
63060-146 = "ถ้ารู้ว่าจะเป็นอย่างนี้ ฉันก็คงไม่ทำอะไรเลย..."
63060-147 = "[s1] \"ไม่หรอก\"\n[s2] \"สุบารุมีสิทธิ์ที่จะพยายามอยู่แล้ว\""
63060-150 = "แต่ผลลัพธ์... มันออกมาเป็นอย่างนี้เนี่ยนะคะ?"
63060-151 = "ยิ่งไปกว่านั้น เจตนาก็ไม่บริสุทธิ์ด้วยค่ะ"
63060-152 = "ฉันแสร้งทำเป็นรู้วิธีต่อหน้าเด็กๆ คนอื่น"
63060-153 = "แต่ที่จริงแล้วฉันไม่รู้อะไรเลย อย่างที่ซาโอริว่าไว้เลยค่ะ"
63060-154 = "ถึงฉันจะทำเป็นเก่งว่าจะใช้วิถีอาเรียส แต่ท้ายที่สุดแล้ว... ก็ไม่มีอะไรเลยค่ะ"
63060-155 = "[s3] \"แต่อย่างน้อยก็ได้รู้ว่าเป็นอย่างนั้นนี่นา\"\n[s4] \"แต่นักเรียนก็เป็นคนที่ยังเรียนรู้ได้อยู่นะ\""
63060-158 = "ส่วนช่วงเวลายากลำบากที่ถูกตัดสินจากแค่ผลลัพธ์ เอาไว้เป็นผู้ใหญ่แล้วค่อยเผชิญก็ได้งั้นเหรอคะ...?"
63060-159 = "..."
63060-160 = "ฉันไม่อยากใช้ข้ออ้างว่าตัวเองยังเป็นนักเรียนเพื่อขอพ้นผิดในเรื่องต่างๆ ค่ะ..."
63060-164 = "นั่นถือเป็นทัศนคติที่ดี เพราะงั้นก็ให้ฉันรักษาทัศนคติที่ดีอย่างนี้ต่อไปงั้นเหรอคะ...?"
63060-165 = "..."
63060-166 = "แต่ถึงจะว่าอย่างนั้น"
63060-167 = "ชีวิตของคนที่อยู่ในจุดต่ำสุดจะมีอะไรเปลี่ยนแปลงไปได้เหรอคะ?"
63060-168 = "ยังไงพวกเราก็ต้องใช้ชีวิตแบบนี้ต่อไป แล้วก็หายไปแบบนี้อยู่ดี"
63060-169 = "ต่อให้ตั้งใจขัดถูเศษขยะสักแค่ไหน แต่ขยะเหล่านั้นก็ไม่กลายเป็นอัญมณีเสมอไปนี่คะ"
63060-170 = "..."
63060-171 = "อย่าทำให้ฉันฝันถึงสิ่งที่เป็นไปไม่ได้เลยค่ะ แบบนั้นมันจะยิ่งน่าเศร้ากว่าเดิมนะคะ"
63060-172 = "ไม่มีคำพูดไหนที่ขายฝันและไร้ความรับผิดชอบเท่าคำว่า \"ความพยายามอยู่ที่ไหน ความสำเร็จอยู่ที่นั่น\" แล้วละค่ะ"
63060-173 = "[s5] \"แต่เรื่องแบบนี้ก็มีอยู่จริงๆ นะ\"\n[s6] \"ต่อให้พยายาม บางอย่างก็อาจไม่เปลี่ยนแปลงไป\"\n[s7] \"อาจจะล้มเหลว หรืออาจจะแย่ลงกว่าเดิมก็ได้\""
63060-179 = "[ns8] \"แต่ลองคิดดูนะ\"\n[ns9] \"ถ้าอยู่ในจุดที่ต่ำสุดแล้วจริงๆ เราก็ต้องขึ้นไปข้างบนใช่ไหมล่ะ?\""
63060-182 = "คุณครูไม่ได้จะให้กำลังใจกันใช่มั้ยคะ...?"
63060-184 = "แต่ก็ต้องยอมรับว่าเราทำได้เพียงให้กำลังใจเท่านั้นนะ"
63060-188 = "ซาโอริ...?"
63060-193 = "อื้อ"
63060-194 = "ก็เพราะพวกเราเคยใช้ชีวิตในจุดที่ต่ำสุดมาแล้ว"
63060-195 = "คิดเหมือนกันใช่มั้ยล่ะ สุบารุ?"
63060-196 = "จากจุดนั้น เราไม่มีที่ให้ตกต่ำไปอีกแล้ว แล้วก็ไม่มีที่ให้หนีไปด้วย เมื่ออยู่ในจุดนั้น ไม่ว่าจะยังไงเราก็ต้องดิ้นรนอยู่ดี"
63060-197 = "และยังไงทุกวันก็เป็นวันที่แย่ที่สุดอยู่แล้วด้วย..."
63060-198 = "แหะ... แหะๆ... อาจจะยังมีจุดที่อยู่ต่ำกว่าจุดนี้อีกก็ได้..."
63060-199 = "เมื่อถึงตอนนั้น ก็คิดเสียว่าเราได้เดินสำรวจชั้นใต้ดินอีกรอบก็น่าจะได้นะคะ...?"
63060-200 = "จริงๆ เลย สควอดกลายเป็นคนโง่เขลากันไปหมดแล้วสินะคะ..."
63060-201 = "อืม ถ้าจะเอาตัวรอดในโลกภายนอกให้ได้ เราต้องมีทัศนคติแบบนี้น่ะ"
63060-202 = "ไม่งั้นก็คงอยู่ไม่ไหวหรอก... น่าจะนะ"
63060-203 = "สุดท้ายแล้วสิ่งที่จำเป็นก็คือการเคลื่อนไหวในตอนนี้เลยค่ะ... และถ้าจะทำแบบนั้น เราก็แค่ต้องหาเหตุผลอะไรก็ได้มาประกอบค่ะ... แหะ... แหะๆ..."
63060-204 = "อื้อ เพราะงั้นเราก็ไปด้วยกันให้หมดนี่ละ"
63060-205 = "ไม่ใช่เพราะเราจะแข็งแกร่งขึ้นเมื่ออยู่ด้วยกันหรอกนะ แบบนั้นมันเป็นเหตุผลงี่เง่าที่อยู่ในเทพนิยาย#nเท่านั้นละ"
63060-206 = "แต่เหตุผลของฉันก็คือ ถ้า[ruby=อาเรียส]พวกเราทุกคน[/ruby]ไม่พร้อมใจกันละก็ เราจะทำอะไรไม่ได้เลย"
63060-207 = "ใช่มั้ยล่ะ?"
63060-216 = "รุ่นพี่คะ ตื่นได้แล้วค่ะ"

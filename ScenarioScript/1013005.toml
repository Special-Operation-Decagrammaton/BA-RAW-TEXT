1013005-13 = "#na;니코 스바루;아르바이트, 하고 있는데요……."
1013005-14 = "#na;니코 스바루;아, 아니에요! 선생님이 생각하는, 그런 이상한 거 아니에요! 그, 이번에 '접객'이라는 것을 해 보면서……."
1013005-15 = "#na;니코 스바루;……학교 회의 결과, 온갖 진상과, 손님을 가장한 빌런과, 안하무인에 독불장군 같은 사람들을 상대하며."
1013005-16 = "#na;니코 스바루;인간성의 또 다른 극단을 몸으로 학습하는 동시에, 경제 활동도 해 보자는 쪽으로 결론이 나서……."

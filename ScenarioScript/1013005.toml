1013005-40 = "[ns] \"오오……. 생각보다 더 본격적인데?\""
1013005-41 = "3;니코 스바루;01;어떠세요, 선생님? 우리 아이들, 신선하죠?\n#3;em;[?]"
1013005-42 = "3;니코 스바루;03;처음에는 다들 머뭇거렸는데, 카페 유니폼을 보자마자 태도가 바뀌더라고요."
1013005-43 = "3;니코 스바루;99;귀엽다고, 입어 보고 싶다고……."
1013005-44 = "3;니코 스바루;05;…….\n#3;em;[…]"
1013005-45 = "3;니코 스바루;06;참, 선배가 돼서 이런 부분도 눈치채 주지 못하고. 한심하네요.\n#3;em;[한숨]"
1013005-46 = "[s5] \"그렇지 않아. 다들 전에는 몰랐잖아?\"\n[s6] \"이제 알게 됐으니까, 챙겨 주면 되는 거지.\""

[translation]
1013005-1 = "ประสบการณ์การเข้าสังคม"
1013005-5 = "......"
1013005-6 = "[s] \"......\""
1013005-7 = "อ๊ะ สวัสดีค่ะ คุณครู"
1013005-8 = "ฉันทำอะไรอยู่น่ะเหรอคะ? เอ่อ คือว่า..."
1013005-13 = "กำลังทำงานพาร์ทไทม์อยู่น่ะค่ะ..."
1013005-14 = "ปะ... เปล่านะคะ! ไม่ใช่เรื่องแปลกๆ อย่างที่คุณครูคิดนะคะ!  คือ... คราวนี้ฉันลองมาทำ 'งานบริการลูกค้า' ดู..."
1013005-15 = "จากผลการประชุม พวกเราสรุปกันว่าจะมาลองเรียนรู้ขีดจำกัดสูงสุดของมนุษย์ผ่านการรับมือกับ#nพวกมนุษย์ขี้โวยวาย"
1013005-16 = "พวกวายร้ายที่แฝงตัวมาเป็นลูกค้า แล้วก็พวกคนเผด็จการไร้มารยาททั้งหลาย พร้อมกับหาเงินไปด้วยน่ะค่ะ..."
1013005-17 = "[ns] \"วัตถุประสงค์ดีนะ...\""
1013005-19 = "ใช่มั้ยล่ะคะ...?"
1013005-20 = "แต่งานบริการลูกค้ามันควรจะเกิดขึ้นข้างในร้านคาเฟ่จริงๆ เพราะงั้นในส่วนนั้นฉันคงสอบตกละมั้งคะ..."
1013005-21 = "ทำไมถึงมาถือป้ายน่ะเหรอคะ? อืม ฉันเองก็ไม่ค่อยเข้าใจหรอกค่ะ แต่เห็นเขาบอกกันว่าถ้าฉันถือเจ้านี่#nแล้วภาพมันจะออกมาดูดีน่ะค่ะ"
1013005-27 = "[ns1] \"เรื่องนั้นมันก็จริงอย่างที่เขาบอกนะ...\"\n[ns2] \"ครูว่าสุบารุควรจะมั่นใจในตัวเองให้มากกว่านี้หน่อยนะ...\" "
1013005-30 = "ว้าว เมื่อกี้คุณครูพูดเหมือนกับที่คุณผู้จัดการร้านพูดเลยค่ะ"
1013005-31 = "ถึงฉันจะยังไม่เข้าใจความหมายเลยสักนิดก็เถอะ..."
1013005-32 = "คะ? จะยังไงก็ตามแต่ว่าการที่เห็นพวกเราพยายามใช้ชีวิตอย่างเต็มที่แบบนี้มันดูดีงั้นเหรอคะ?"
1013005-33 = "......"
1013005-34 = "ถ้างั้นละก็! เพื่อเหล่านักเรียนที่พยายามจะมีชีวิตอยู่ต่ออย่างเต็มที่! รบกวนคุณครูช่วยดันยอดขาย#nหน่อยได้มั้ยคะ!"
1013005-35 = "[s3] \"โอ้ว ขายของเก่งมากเลยนะ สุบารุ\"\n[s4] \"เพื่อเป็นรางวัลที่ขายของเก่ง เราเข้าไปกันเถอะ\""
1013005-38 = "ขอบคุณค่ะ! จะนำทางให้เดี๋ยวนี้เลยค่ะ!"
1013005-40 = "[ns] \"โอ้โฮ... เป็นงานกว่าที่คิดนะเนี่ย?\""
1013005-41 = "เป็นยังไงบ้างคะคุณครู? เด็กๆ ของเราดูสดใสมากเลยใช่มั้ยคะ?"
1013005-42 = "ตอนแรกทุกคนก็ลังเลกันแต่พอเห็นยูนิฟอร์มคาเฟ่ ท่าทางก็เปลี่ยนไปทันทีเลยค่ะ"
1013005-43 = "บอกว่าน่ารักบ้างละ อยากลองใส่ดูบ้างละ..."
1013005-44 = "......"
1013005-45 = "เฮ้อ ฉันเป็นรุ่นพี่แท้ๆ แต่กลับไม่ทันสังเกตเห็นเรื่องพวกนี้เลย น่าละอายจริงๆ เลยค่ะ"
1013005-46 = "[s5] \"ไม่หรอก ก็เมื่อก่อนทุกคนไม่รู้นี่นา\" \n[s6] \"ในเมื่อตอนนี้รู้แล้ว จากนี้ไปก็ค่อยทำให้ก็ได้\""
1013005-49 = "ค่ะ คงต้องเป็นแบบนั้นค่ะ..."
1013005-50 = "ทางนี้ค่ะ คุณครู [USERNAME] มาแล้วค่ะ!"
1013005-51 = "ค่ะ! ขอบคุณมากค่ะ! เดี๋ยวจะนำทางไปที่ที่นั่งนะคะ!"
1013005-53 = "[ns] \"สุบารุก็ไปด้วยกันสิ\""
1013005-54 = "คะ? ฉะ... ฉันเหรอคะ?! แต่ฉันเป็นคนเชียร์ลูกค้านะคะ? "
1013005-55 = "ฉันต้องคอยแนะนำลูกค้าให้ได้มากที่สุดเท่าที่จะทำได้ เพื่อเพิ่มยอดขายให้คาเฟ่..."
1013005-57 = "(คุณครูกำลังรอคำพูดนี้อยู่แล้ว จึงยิ้มออกมาอย่างมีชัย...!)"
1013005-58 = "(และเรียกผู้จัดการร้านคาเฟ่มาทันที)"
1013005-60 = "ครับ มีเรื่องอะไรเหรอครับ?"
1013005-61 = "อ๋อ นักเรียนคนนี้คือลูกศิษย์ของคุณครูสินะครับ"
1013005-62 = "คงแวะมาดูว่าเธอได้เรียนรู้ประสบการณ์ทางสังคมได้ดีรึเปล่า แล้วก็เลยอยากจะขอเวลาพูดคุยกันสักครู่#nสินะครับ?"
1013005-63 = "ครับ? แต่เพื่อเป็นการตอบแทน คุณครูจะขอเลี้ยงเครื่องดื่มกับเค้กให้กับลูกค้าที่นั่งอยู่ในร้านตอนนี้#nเหรอครับ?"
1013005-64 = "คุณครูจะเป็นคนรับผิดชอบค่าใช้จ่ายเองอย่างนั้นเหรอครับ?"
1013005-65 = "ถ้าเป็นแบบนั้นละก็ยินดีเสมอเลยครับ! นี่ สุบารุ? คุยกับคุณครูตามสบายเลยนะ!"
1013005-67 = "ทำแบบนี้จะดีเหรอคะ...?"
1013005-68 = "[s] \"ฮู่ว... นี่แหละวิถีจัดการอะไรแบบผู้ใหญ่\" "
1013005-69 = "ช่วยสอนเรื่องดีๆ ให้หน่อยเถอะค่ะ..."
1013005-71 = "(หลังจากนั้นคุณครูก็ได้ใช้เวลาพูดคุยเรื่องต่างๆ กับสุบารุ)"
1013005-72 = "(ทั้งเรื่องการใช้ชีวิต เรื่องที่โรงเรียน หรือแม้แต่เรื่องตำแหน่งของเธอที่เปรียบเสมือนประธานคณะ#nกรรมการวินัยของโรงเรียนอื่น)"
1013005-73 = "(ถึงจะเป็นเรื่องที่ดูเหมือนจะไม่สำคัญอะไร แต่เรื่องเหล่านั้นก็เป็นเรื่องที่มีค่ามาก)"
1013005-75 = "คุณครูคะ?"
1013005-76 = "[ns] \"หืม?\""
1013005-77 = "รุ่นน้องของฉันน่าเอ็นดูใช่มั้ยล่ะคะ?"
1013005-78 = "[ns7] \"ใช่เลย\"\n[ns8] \"ในสายตาครูสุบารุเองก็น่าเอ็นดูมากเหมือนกันนะ\""
1013005-81 = "......"
1013005-82 = "ต่อให้พูดจาเอาใจแบบนั้น ฉันก็ไม่มีอะไรจะให้หรอกนะคะ"
1013005-83 = "คะ? ไม่ได้พูดเอาใจงั้นเหรอคะ?"
1013005-84 = "......"
1013005-85 = "ฉันเคยได้ยินข่าวลือที่แว่วมาว่าคุณครูเนี่ย นิ~ สัย~ ไม่~ ดี~ สุดๆ เลยละค่ะ"
1013005-86 = "ลือกันว่าถ้าวันหนึ่งมีอะไรเกิดขึ้นกับคุณครู ก็ให้คิดซะว่าเป็นเวรกรรมที่ทำตัวเองทั้งนั้นน่ะค่ะ"
1013005-87 = "ทำไมถึงมาพูดเรื่องนั้นตอนนี้งั้นเหรอคะ?"
1013005-88 = "ไม่รู้สิคะ~ คุณครูฉลาดออกจะตาย ลองคิดเหตุผลดูเองสิคะ~"
1013005-90 = "อะไรกันเนี่ย! อุตส่าห์ดีใจที่บอกว่าจะแจกเค้กฟรี แต่บริการห่วยแตกชะมัด!"
1013005-91 = "กะ... เกิดอะไรขึ้นเหรอคะ คุณลูกค้า...?"
1013005-92 = "บริการไม่มีความจริงใจเลยสักนิด! ไม่เข้ามาถามอะไรฉันเลยสักนิดเดียว! ควรจะหัดหูไวตาไวสังเกตคน#nให้เร็วๆ บ้างสิ!"
1013005-93 = "ฉันจะไม่มาเหยียบที่นี่อีกแล้ว! เฮอะ!"
1013005-94 = "ขอโทษด้วยค่ะคุณลูกค้า! ขอโทษกับเหตุการณ์ที่เกิดขึ้นด้วยนะคะ แต่อย่าบอกว่าจะไม่มาอีกเลยนะคะ..."
1013005-95 = "ฉันไม่รับคำขอโทษนั่นหรอก! จริงๆ ฉันก็ไม่คิดจะมาอยู่แล้ว! แล้วดูชุดนี่สิ! มีแต่ระบายพริ้วๆ รกลูกกะตาจริงๆ!"
1013005-96 = "กรี๊ด?!"
1013005-97 = "คะ... คุณลูกค้า?! การแตะต้องชุดพนักงานแบบนี้มัน..."
1013005-98 = "......!"
1013005-104 = "ว้ากกกก?!?! อะ... อะไรกัน! เธอเป็นใครห้ะ!"
1013005-106 = "ขออภัยด้วยค่ะคุณลูกค้า ต้องขอโทษด้วยที่เสียมารยาทนะคะ แต่พอดีเห็นว่าตอนที่คุณรีบลุกขึ้นมา#nดูเหมือนจะเสียการทรงตัวน่ะค่ะ"
1013005-107 = "ก็เลยกะว่าจะช่วย 'พยุง' สักหน่อย ไม่ทราบว่าดีขึ้นรึยังคะ?"
1013005-108 = "(ได้เห็นท่าต่อสู้ระยะประชิดของรุ่นพี่ในระยะใกล้ขนาดนี้เลยเหรอเนี่ย?! วันนี้โชคดีจังเลยแฮะ!)"
1013005-109 = "พะ... พยุงอะไรกันล่ะ! อ้ากกกกก...! ขะ... แขนฉันจะหักอยู่แล้ว! ปล่อยนะ! ปล่อยสิ!"
1013005-110 = "ฮ่าฮ่าฮ่า รอก่อนสิคะ คุณลูกค้าต้องทรงตัวให้มั่นคงก่อนนะคะ"
1013005-111 = "ก่อนที่ฉันจะบิดแขนแกให้ผิดรูปจนใช้งานไม่ได้จริงๆ น่ะ..."
1013005-112 = "อะ... อ๊ากกกกก?!?!?!"
1013005-113 = "คงจะเข้าใจสิ่งที่ฉันพูดและสิ่งที่คุณทำลงไปแล้วใช่มั้ย"
1013005-114 = "ขะ เข้าใจแล้ว...! เข้าใจชัดเจนเลย! พะ... เพราะงั้นได้โปรดปล่อยแขนฉันสักทีเถอะ...!"
1013005-115 = "ออกไป"
1013005-119 = "ฉันจะไม่มีวันมาเหยียบร้านพรรค์นี้อีกแน่!!!"
1013005-125 = "......"
1013005-126 = "ขอบคุณมากเลยนะครับสุบารุ! ไม่สิ คุณสุบารุ! เพราะคุณเลย ทุกคนถึงปลอดภัย!"
1013005-127 = "ไม่เป็นไรเลยค่ะ ฉันแค่ทำในสิ่งที่ต้องทำเท่านั้น"
1013005-128 = "คุณสุบารุใช่มั้ย? ขอถ่ายรูปหน่อยได้รึเปล่า?"
1013005-129 = "หรือต้องจ่ายค่าถ่ายรูปเพิ่มรึเปล่าคะ? ฉันยินดีจ่ายนะ"
1013005-130 = "มะ... ไม่ต้องหรอกค่ะ ฉะ... ฉันน่ะยังไงก็ได้... ตะ... แต่ว่าคุณผู้จัดการคะ? คุณครู?!"
1013005-131 = "ทำไมทั้งสองคนถึงมองฉันแล้วชูนิ้วโป้งให้แบบนั้นล่ะคะ?!?!?!"

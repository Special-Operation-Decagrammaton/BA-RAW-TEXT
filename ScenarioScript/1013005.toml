[translation]
1013005-1 = "社會經驗"
1013005-5 = "……"
1013005-6 = "[s]「……」"
1013005-7 = "你，你好，老師。"
1013005-8 = "問我在做什麼？#n那，那個……"
1013005-13 = "我，我在打工……"
1013005-14 = "不，不是的！不是老師想像的那種奇怪的事！#n這次我之所以會嘗試「接待客人」……"
1013005-15 = "是因為依據校內會議的結果……#n我們要透過應對各種奧客、偽裝成客人的反派和我行我素的人──"
1013005-16 = "親身體會人性的另一個極端，同時也參與經濟活動……"
1013005-17 = "[ns]「某方面來說，確實挺符合目標的……」"
1013005-19 = "是這樣沒錯吧……？"
1013005-20 = "雖然實際上接待客人應該要在咖啡廳裡進行，或許我連那個資格都沒有也說不定……"
1013005-21 = "我為什麼會負責舉牌是嗎？#n唔嗯……我也不是很懂，但他們好像說我舉著這個會很有畫面感之類的？"
1013005-27 = "[ns1]「……確實是這樣沒錯。」\n[ns2]「我覺得昴應該對自己更有自信一點。」"
1013005-30 = "嗚哇，老師剛才說的話跟店長一模一樣呢。"
1013005-31 = "不過我還是完全搞不懂是什麼意思就是了……"
1013005-32 = "無論如何，看到我努力生活的樣子都覺得很好……是嗎？"
1013005-33 = "……"
1013005-34 = "那麼！為了我們這些努力生活的學生！#n可以請老師幫忙提升一下業績嗎……！"
1013005-35 = "[s3]「哎呀，推銷技巧很不錯呢，昴同學。」\n[s4]「作為對推銷技巧的肯定，我就進去看看吧。」"
1013005-38 = "謝謝！我來為老師帶路！"
1013005-40 = "[ns]「哦哦……比想像中還正式呢？」"
1013005-41 = "感覺怎麼樣呢，老師？#n大家的這副打扮很新鮮吧？"
1013005-42 = "本來大家一開始都還在猶豫，結果一看到咖啡廳的制服後態度就變了。"
1013005-43 = "一直說很可愛、想穿穿看之類的……"
1013005-44 = "……"
1013005-45 = "我身為前輩卻連這種事都沒注意到……真是沒用。"
1013005-46 = "[s5]「別這麼說。大家之前都不懂不是嗎？」\n[s6]「既然現在知道了，之後再多多關心他們就行了。」"
1013005-49 = "……說的也是。"
1013005-50 = "客人來了，是[USERNAME]老師哦！"
1013005-51 = "好的！謝謝！我來為您帶位！"
1013005-53 = "[ns]「昴也一起來吧。」"
1013005-54 = "咦？我，我嗎！？#n可是我還有舉牌的工作要做……"
1013005-55 = "得盡量多招攬客人進來，才能提升咖啡廳的業績……"
1013005-57 = "（由於內心正等著這句話，不禁露出了會心的一笑……！）"
1013005-58 = "（決定請咖啡廳的店長過來！）"
1013005-60 = "是，請問有什麼事嗎？"
1013005-61 = "啊啊，原來這位同學是老師的學生啊。"
1013005-62 = "您今天是來關心他社會體驗的狀況，所以希望能給兩位一點時間談談……是嗎？"
1013005-63 = "什麼？作為交換，您願意招待所有現在在座的客人飲料和蛋糕？"
1013005-64 = "而且費用全部由老師負擔？"
1013005-65 = "如果是這樣的話當然可以！#n昴同學？請儘管跟老師慢慢聊吧！"
1013005-67 = "……這樣真的可以嗎？"
1013005-68 = "[s]「呼……這就是大人的做法。」"
1013005-69 = "真是上了一課呢……"
1013005-71 = "（就這樣和昴聊了一些無關緊要的話題）"
1013005-72 = "（比如日常瑣事和學校生活，以及作為類似其他學園風紀委員長的點點滴滴）"
1013005-73 = "（都是些無足輕重……卻也因此更顯珍貴的話題）"
1013005-75 = "老師？"
1013005-76 = "[ns]「嗯？」"
1013005-77 = "我們奧利斯的孩子們，都很了不起對吧？"
1013005-78 = "[ns7]「是啊。」\n[ns8]「在我眼中，昴也真的很了不起哦。」"
1013005-81 = "……"
1013005-82 = "就算說這種場面話，也不會有什麼好處哦……？"
1013005-83 = "什麼？不是場面話？"
1013005-84 = "…………"
1013005-85 = "不瞞你說，我其實有聽過關於老師的傳言……#n而且還是非～常糟～糕的那種哦？"
1013005-86 = "糟糕到要是哪天老師出了什麼事，我也會認為是你自作自受的那種。"
1013005-87 = "問我現在為什麼要說這個？"
1013005-88 = "誰知道呢～#n既然老師頭腦這麼好，不妨自己想像一下吧～"
1013005-90 = "這是在搞什麼啊！#n聽說有招待蛋糕還期待了一下，結果服務真是爛透了！"
1013005-91 = "請，請問有什麼問題嗎，這位客人？"
1013005-92 = "你們的服務沒有誠意，誠意懂嗎！#n根本完全沒來找我聊天……會不會察言觀色啊！"
1013005-93 = "我不會再來了！哼！"
1013005-94 = "這位客人，真的非常抱歉！#n在此向您致上十二萬分的歉意，請再給我們一次機會……"
1013005-95 = "隨便你怎麼說！反正我不可能再來了！#n而且這套衣服是怎樣！一直飄來飄去的煩死了！"
1013005-96 = "呀啊！？"
1013005-97 = "這，這位客人！？#n請不要對店員的衣服動手動腳……！"
1013005-98 = "……！"
1013005-104 = "唔哇啊啊！？！？#n你，你什麼意思！"
1013005-106 = "真是不好意思，這位客人。恕我失禮了。#n您剛才起身時似乎因為過於匆忙，看起來就像失去了平衡……"
1013005-107 = "所以我才想「扶」您一下……您沒事吧？"
1013005-108 = "（竟然能在這麼近的距離親眼看見前輩的CQB！？今天的運氣太好了吧！）"
1013005-109 = "這，這是在扶我才怪！痛痛痛……！#n再，再這樣下去手腕跟手肘就要斷了！放手！給我放手！"
1013005-110 = "呵呵，還請再稍等我一下。#n畢竟總是得讓客人您先站穩才行啊。"
1013005-111 = "在我真的把你的手臂往違背人體工學的方向扭斷之前……"
1013005-112 = "噫，噫噫噫！？！？"
1013005-113 = "我想說什麼，還有你做了什麼……這樣應該懂了吧？"
1013005-114 = "懂，懂了懂了……！我知道了！#n拜，拜託放開我的手……！"
1013005-115 = "滾。"
1013005-119 = "這種店我絕對不會再來了！！！"
1013005-125 = "……"
1013005-126 = "謝謝你，昴同學！#n多虧有你在，大家都安全了！"
1013005-127 = "不會。我只是做了該做的事而已。"
1013005-128 = "這位同學的名字叫做昴嗎？#n請問能不能跟你一起拍照？"
1013005-129 = "需要另外付費嗎？#n多少錢我都願意！"
1013005-130 = "不，不用。那種東西想拍多少都可以……#n話說……店，店長？老師！？"
1013005-131 = "為什麼要默默地看著我，還豎起大拇指啊！？！？"

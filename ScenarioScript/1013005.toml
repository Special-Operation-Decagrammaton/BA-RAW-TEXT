1013005-105 = "3;니코 스바루;13\n#3;a"
1013005-106 = "3;니코 스바루;14;죄송합니다. 손님. 무례를 용서해 주세요. 그렇지만 바쁘게 일어나시다가, 균형을 잃으신 것 같아서요.\n#3;greeting"
1013005-107 = "3;니코 스바루;13;잠시 '부축'해 드리려고 했습니다만, 괜찮으신지요?"
1013005-108 = "3;니코 스바루;13\n#na;나레이션 아르바이트 중인 아리우스 학생;(선배의 CQB를 이렇게 가까이에서?! 오늘 운이 좋았네!)"
1013005-109 = "3;니코 스바루;13\n#na;나레이션 시비 거는 손님;부, 부축은 무슨! 아야야야……! 이, 이러다 팔목이나 팔꿈치가 꺾이고 말겠어! 놔! 놓으라고!"
1013005-110 = "3;니코 스바루;27;하하하. 조금만 더 기다려 주세요. 손님께서 균형을 우선 잡으셔야 할 것 같네요.\n#3;em;[재잘]"
1013005-111 = "3;니코 스바루;15;……내가 팔을 정말로 말이 안 되는 방향으로 완전히 꺾어 버리기 전에 말이야…….\n#3;closeup\n#fontsize;50"
1013005-112 = "3;니코 스바루;15\n#na;나레이션 시비 거는 손님;히, 히이이이이익?!?!\n#3;closeup"
1013005-113 = "3;니코 스바루;15;내가 무슨 말을 하고 있는지, 그리고 자기가 무슨 짓을 하고 있는지, 이만하면 알겠지?\n#3;closeup\n#fontsize;50"
1013005-114 = "3;니코 스바루;15\n#na;나레이션 시비 거는 손님;아, 알겠습니다……! 알다마다요! 그, 그러니까 제발 팔을 좀……!\n#3;closeup\n#fontsize;50"

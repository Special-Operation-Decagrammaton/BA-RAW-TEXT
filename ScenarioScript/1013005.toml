1013005-19 = "3;니코 스바루;16;그렇죠……?\n#3;em;[세로선]\n#3;stiff"
1013005-20 = "3;니코 스바루;06;하지만 사실 접객은 카페 안에서 정말로 이루어지는 것일 테니, 저는 그마저도 실격이라고 해야겠네요……."
1013005-21 = "3;니코 스바루;02;왜 팻말 담당이냐고요? 음, 저는 잘 이해하지 못하겠지만, 왠지 이걸 들고 있으면 그림이 될 거라고 하더라고요?\n#3;em;[?]"

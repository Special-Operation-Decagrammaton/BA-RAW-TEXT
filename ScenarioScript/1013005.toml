1013005-30 = "3;니코 스바루;10;우와, 지금 선생님도 점장분과 똑같은 말씀을 하셨어요.\n#3;em;[땀]"
1013005-31 = "3;니코 스바루;21;저는 여전히 무슨 의미인지 하나도 모르겠지만요……."
1013005-32 = "3;니코 스바루;04;네? 이러니저러니 해도, 열심히 사는 모습이 보기 좋다고요?\n#3;em;[?]"
1013005-33 = "3;니코 스바루;10;……."
1013005-34 = "3;니코 스바루;25;그러면! 이렇게 열심히 살려고 하는 우리 학생들을 위해! 조금 매상을 부탁하고 싶은데요!\n#3;em;[!]\n#3;jump"
1013005-35 = "[s3] \"호오. 좋은 영업 기술이군요. 스바루 학생.\"\n[s4] \"그 부분을 칭찬하는 의미에서, 들어가 보도록 하죠.\""

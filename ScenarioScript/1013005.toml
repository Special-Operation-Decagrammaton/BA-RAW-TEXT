1013005-81 = "3;니코 스바루;25;…….\n#3;em;[///]\n#3;stiff"
1013005-82 = "3;니코 스바루;11;그렇게, 겉치레 같은 말씀하셔도, 뭐 없거든요……?"
1013005-83 = "3;니코 스바루;12;네? 겉치레가, 아니라고요?\n#3;em;[?]"
1013005-84 = "3;니코 스바루;11;…………."
1013005-85 = "3;니코 스바루;12;저 말이에요. 선생님에 대해서 아~주 못~된 소문 들었거든요?\n#3;em;[속상함]"
1013005-86 = "3;니코 스바루;25;어느 날 선생님한테 무슨 일이 일어나면, 전부 자업자득으로 생각해도 좋다는 소문 말이죠."
1013005-87 = "3;니코 스바루;11;그런 이야기를 왜 지금 여기에서 하냐고요?"
1013005-88 = "3;니코 스바루;12;몰~라요. 선생님은 머리가 좋으시니까, 한번 상상해 보시던가요~\n#3;em;[스팀]\n#3;hophop"
1013005-89 = "#all;hide"
1013005-90 = "#na;나레이션 시비 거는 손님;이게 뭐야! 추가 케이크가 나온다고 해서 기대했더니, 서비스가 엉망이잖아!"
1013005-91 = "#na;나레이션 아르바이트 중인 아리우스 학생;무, 무엇이 문제셨나요. 손님?"
1013005-92 = "#na;나레이션 시비 거는 손님;서비스에 정성이 없어, 정성이! 내게 전혀 말을 걸어 주지 않았잖아! 좀 더 주변을 보고 움직이는 게 좋아!"
1013005-93 = "#na;나레이션 시비 거는 손님;나는 이제 오지 않을 거지만 말이지! 헹!"
1013005-94 = "#na;나레이션 아르바이트 중인 아리우스 학생;죄송합니다, 손님! 사과드릴 테니, 다시 오지 않을 거라는 말씀만은……."
1013005-95 = "#na;나레이션 시비 거는 손님;상관없어! 원래도 사실 오지 않았거든! 그리고 뭐야, 이 옷은! 하늘하늘하기만 하고!"

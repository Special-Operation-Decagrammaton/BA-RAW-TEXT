1013005-61 = "3;로봇점장;02;아하, 이 학생이 사실 선생님께서 가르치시는 학생이시고."
1013005-62 = "3;로봇점장;03;사회 경험을 잘하고 있는지 보러 오셨는데, 잠시 대화를 나눌 시간을 주실 수 있으시겠냐는 것이군요?"
1013005-63 = "3;로봇점장;04;네? 그 대신 지금 자리에 계신 카페 손님들에게, 음료와 케이크를 추가로 제공해 달라고요?\n#3;em;[?]"
1013005-64 = "3;로봇점장;04;그리고 가격은 전부 선생님께서 지불하신다는 것입니까?"
1013005-65 = "3;로봇점장;03;그런 것이라면야 얼마든지요! 스바루 학생? 선생님과 천천히 이야기 나누세요!\n#3;em;[음표]"

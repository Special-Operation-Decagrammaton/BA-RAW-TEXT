[translation]
1013005-1 = "Real-World Experience"
1013005-5 = "..."
1013005-6 = "[s] \"...\""
1013005-7 = "H-Hello, Sensei."
1013005-8 = "What am I doing, you ask? O-Of course..."
1013005-13 = "I'm working as a part-timer..."
1013005-14 = "N-No, it's nothing weird like you think! By working \"customer service,\" I'm actually..."
1013005-15 = "Look. After a brief discussion at school, we started working here. I've been forced to deal with all sorts of crooks, troublemakers, and...jerks, basically!"
1013005-16 = "That said, I am acquiring some \"real world\" experience, and have made a little money."
1013005-17 = "[ns] \"...I guess that sounds practical...\""
1013005-19 = "Right...?"
1013005-20 = "I'd probably learn more if I worked INSIDE the cafe, but, nevertheless..."
1013005-21 = "Why am I in charge of the sign? I don't know, truthfully. They said something about how holding it like this makes for a good picture."
1013005-27 = "[ns1] \"...It absolutely does.\"\n[ns2] \"I think you should be more confident in yourself, Subaru.\""
1013005-30 = "Wow. That was exactly what the owner said, word for word."
1013005-31 = "Although I still don't understand what you two mean."
1013005-32 = "Huh? Nevertheless, you're glad to see me working hard?"
1013005-33 = "..."
1013005-34 = "Well then! Please, spend some money! Do it for the hard-working students who're just trying to make a living!"
1013005-35 = "[s3] \"Oh, the hard sell, Subaru!\"\n[s4] \"Yes, I'd love to come inside.\""
1013005-38 = "Thank you! Follow me!"
1013005-40 = "[ns] \"Oh, wow. This is more serious than I thought.\""
1013005-41 = "How about it, Sensei? They clean up well, huh?"
1013005-42 = "Everyone was hesitant at first, but then they saw the uniforms."
1013005-43 = "They said they were cute, that they wanted to try them on..."
1013005-44 = "..."
1013005-45 = "I'm a senior, and I didn't even notice how much they needed this. How pathetic."
1013005-46 = "[s5] \"It's not like that. Nobody knew how to move forward.\"\n[s6] \"Now that you know, you can take care of your girls.\""
1013005-49 = "...Yes, I suppose."
1013005-50 = "Over here, [USERNAME]! We have a customer!"
1013005-51 = "Welcome! Thank you for visiting! I'll take you to your seat!"
1013005-53 = "[ns] \"Subaru, come with me.\""
1013005-54 = "Hm? M-Me?! But I'm in charge of the sign! The door! "
1013005-55 = "I must bring in more guests to increase the cafe's sales!"
1013005-57 = "I'd been waiting to hear that kind of motivation. I smiled triumphantly."
1013005-58 = "I called the cafe's owner over."
1013005-60 = "Yes. How may I help you?"
1013005-61 = "Ah, so she is your student. She's lovely."
1013005-62 = "So you've come to check in on my business? You'd like a word in private?"
1013005-63 = "Oh? You want to order a round of cake and drinks for everyone?"
1013005-64 = "And you'll foot the bill! Oh, yes!"
1013005-65 = "Of course you can have a moment with her. Subaru! Please, this nice person would like to talk to you."
1013005-67 = "...Is this...allowed?"
1013005-68 = "[s] \"Well, it's happening.\""
1013005-69 = "You are a very interesting teacher."
1013005-71 = "I had a breezy chat with Subaru."
1013005-72 = "We talked about life, school, and how she felt as a leader."
1013005-73 = "It might have seemed trivial, but that made it all the more precious."
1013005-75 = "Sensei?"
1013005-76 = "[ns] \"Hm?\""
1013005-77 = "Aren't you proud of them? My girls..."
1013005-78 = "[ns7] \"I am.\"\n[ns8] \"And I'm proud of you, too.\""
1013005-81 = "..."
1013005-82 = "Flatter me all you want. I have nothing to offer."
1013005-83 = "Huh? You meant it?"
1013005-84 = "..."
1013005-85 = "You know, I heard a nasty rumor about you, Sensei."
1013005-86 = "It's that if some misfortune befalls you, you had it coming!"
1013005-87 = "Why am I bringing this up?"
1013005-88 = "You're smart, aren't you? Why don't you try to figure it out on your own?"
1013005-90 = "What's this? I came for the free cake, but this service is a joke!"
1013005-91 = "Wh-What's the matter, please?"
1013005-92 = "You barely talked to me, and didn't even smile! You should care more about the customer."
1013005-93 = "Although I'll never be coming back to this dump anyway!"
1013005-94 = "Oh, I'm so sorry! I'll do better. But please, don't abandon the cafe because of my carelessness!"
1013005-95 = "I'll do whatever I want! Don't boss me around! And what's with your stupid outfit? It's flimsy and feels like paper!"
1013005-96 = "Kyaah?!"
1013005-97 = "E-Excuse me?! Please don't touch her uniform."
1013005-98 = "...!"
1013005-104 = "Whaaa?!?! Wh-What are you?"
1013005-106 = "I'm sorry, please excuse my rudeness. But it seemed like you lost your balance as you were barging out!"
1013005-107 = "How about I help you up, if I may?"
1013005-108 = "Subaru's showing off her close-quarters combat! Take a look!"
1013005-109 = "Lady, drop it! Ow ow ow...! I'm gonna dislocate my wrist or elbow at this rate! Let me go!"
1013005-110 = "Hahaha. Oh, what's that? You seem to be a little off-balance."
1013005-111 = "...I'd hate to twist your arm. But maybe I'll have to."
1013005-112 = "E-eek?!"
1013005-113 = "Have I made myself clear? Or should I repeat the message?"
1013005-114 = "U-Understood...! Of course, I got it! Please release me!"
1013005-115 = "Get lost."
1013005-119 = "You'll never see me again!"
1013005-125 = "..."
1013005-126 = "Thank you, Subaru-I mean, Miss Subaru! Everyone's safe thanks to you!"
1013005-127 = "It's nothing special. I was just doing my job."
1013005-128 = "You're Subaru, right? Can I take a picture?"
1013005-129 = "Is there...a fee? I'm willing to pay!"
1013005-130 = "N-No, that's not necessary... B-But, Manager? Sensei?!"
1013005-131 = "Why are you both giving me the thumbs-up?!"

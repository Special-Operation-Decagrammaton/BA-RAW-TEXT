[translation]
1008006-1 = "堅持"
1008006-2 = "（食蜂似乎遇到了什麼困難，於是便動身前往他所在的地方）"
1008006-8 = "……嗯？老師？"
1008006-9 = "看來……你終究還是因為擔心而跑來找我了呢。"
1008006-10 = "雖然我一直是這麼認為的，老師還真是個善良的人呢。"
1008006-11 = "不過，唔……沒錯。"
1008006-12 = "就算對象是老師，有些請求果然還是有點難以啟齒。"
1008006-13 = "[s1]「難以啟齒的請求？」\n[s2]「不是要請我幫你找餐廳嗎？」"
1008006-16 = "我的確是在找餐廳沒錯……"
1008006-17 = "不過我對餐廳的要求有點高……無論我肚子再餓，這點也不會有所改變。"
1008006-18 = "老實說，我認為那些什麼都吃的人……在人性方面是有問題的。"
1008006-19 = "如果是在原本的世界，我是有幾間常去的餐廳，#n除此以外也能輕鬆掌握其他餐廳的資訊……"
1008006-20 = "然而在這裡就不一樣了。#n或許現在正是我該集中精神，施展能力的時候。"
1008006-21 = "[s3]「這麼誇張……？」\n[s4]「這件事有這麼嚴重嗎？」"
1008006-24 = "那還用說嗎？#n畢竟是要放進嘴裡的食物，稍微花點精力挑選也很正常吧？"
1008006-25 = "我基本上只吃用新鮮的有機食材製作的料理。這是我不容侵犯的底線。"
1008006-26 = "然而，大部分的店家販賣的料理都和他們標榜的內容有一定差距……"
1008006-27 = "「實際上如何呢？」、「你敢說這些料理真的是用有機食材製作的嗎？」、#n「你認為你們是間值得信賴的餐廳嗎？」……"
1008006-28 = "在我「確認」餐廳老闆和主廚的心聲之前，這些都還是未知數。"
1008006-29 = "也正因如此，現在的狀況才會讓我如此困擾。"
1008006-30 = "就算是在這裡，我也沒有妥協的打算。#n與其吃下亂七八糟的食物……"
1008006-31 = "我寧願餓肚子──我是認真的，老師。"
1008006-35 = "[ns5]「我完全可以感受到你的認真。」\n[ns6]「原來如此，你是這樣的美食家嗎？」"
1008006-38 = "……嗯？"
1008006-39 = "為什麼露出那種表情……？#n有什麼好主意嗎？"
1008006-40 = "……嗯？"
1008006-41 = "希望我把這件事交給你？為什麼這麼說？#n難道老師要親手做給我吃？"
1008006-42 = "……也不是？"
1008006-43 = "要介紹餐廳給我……？"
1008006-44 = "老師……你剛才有在聽我說話嗎？#n我並不是隨便一間餐廳都……"
1008006-45 = "……你說全都聽到了？"
1008006-46 = "……就算這樣還是有信心是嗎……？"
1008006-50 = "……哦？"
1008006-51 = "居然說到這種程度，反正讓我有點好奇了呢。"
1008006-52 = "那我就跟你走一趟吧。#n不過老師，我剛才也說過……"
1008006-53 = "就算不使用讀心能力，只要食物一上桌，我立刻就能分辨好壞。"
1008006-54 = "假如沒有達到標準，我可是會直接離開的哦？#n這點還請你先做好心理準備。"
1008006-55 = "好……那我們就出發吧？"
1008006-58 = "……就是這裡嗎？"
1008006-59 = "看起來還挺乾淨的。#n雖然還無法確信，不過……"
1008006-60 = "既然如此，餐點也由老師來挑選吧。"
1008006-61 = "……嗯……原來如此，老師想點這些是嗎……"
1008006-62 = "──好的，已確認您的餐點。#n那麼另一位客人……"
1008006-63 = "……我跟他一樣就好。"
1008006-64 = "好的，沒問題。麻煩兩位稍等。"
1008006-66 = "（不久之後）"
1008006-73 = "讓兩位久等了，請慢用！"
1008006-77 = "……嗯，原來如此。"
1008006-78 = "看老師好像很有自信的樣子……難道你認識這裡的店長或主廚嗎？"
1008006-79 = "不認識？那你的表情為什麼看起來這麼游刃有餘呢？"
1008006-80 = "老師難道沒有想過，某些餐廳的食物就算吃起來沒什麼問題，#n實際上卻是用一些來路不明的食材做的嗎？"
1008006-81 = "……絕對不會有那種事？"
1008006-82 = "「絕對」……嗎……"
1008006-83 = "……啊，我沒有質疑你的意思。#n只是覺得老師今天的態度似乎跟平常不太一樣，感到有點意外而已。"
1008006-84 = "老師平時說話還挺小心謹慎的對吧？#n可是現在卻散發著一種「好東西就是好東西」的自信。"
1008006-85 = "想不到就連這樣的老師，也會對不確定的事如此斷言。"
1008006-86 = "該怎麼說呢……"
1008006-87 = "簡直就像有某種值得信賴的檢驗手段……之類的。"
1008006-91 = "這麼說也不完全錯……？"
1008006-92 = "[s7]「其實我們這裡也有一群美食家。」\n[s8]「如果做了那種事的話，這間店應該早就不在了吧。」"
1008006-95 = "聽起來有點複雜呢……"
1008006-96 = "看來似乎要說上一段時間，總之先嚐一口看看吧……"
1008006-104 = "…………哦？"

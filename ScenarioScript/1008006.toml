[translation]
1008006-1 = "#title;까다로움"
1008006-2 = "#na;(곤란에 처한 것 같아, 쇼쿠호가 있는 곳으로 찾아갔다.)"
1008006-3 = "#st;[0,0];instant;1;"
1008006-4 = "#clearST"
1008006-5 = "#wait;1500"
1008006-6 = "#all;hide"
1008006-7 = "3;쇼쿠호;01\n#3;a\n#wait;1000"
1008006-8 = "3;쇼쿠호;02;……음? 선생님?\n#3;em;[반응]"
1008006-9 = "3;쇼쿠호;01;과연……. 걱정이 돼서 찾아온 거네."
1008006-10 = "3;쇼쿠호;99;몇 번이고 생각한 거지만, 꽤 상냥한 사람이랄까.\n#3;greeting"
1008006-11 = "3;쇼쿠호;99;그렇지만 음……. 그렇지."
1008006-12 = "3;쇼쿠호;01;아무리 선생님이라도, 무턱대고 부탁하기에는 조금 어려운 일이 있는 법이니까."
1008006-13 = "[s1] \"어려운 부탁이라고?\"\n[s2] \"음식점을 찾는 게 아니었어?\""
1008006-14 = "#wait;100"
1008006-15 = "#wait;100"
1008006-16 = "3;쇼쿠호;04;확실히 식당을 찾고 있는 것이긴 하지만……."
1008006-17 = "3;쇼쿠호;04;조금은 식당을 가리는 편이거든. 배가 고프더라도 그것은 달라지지 않아서.\n#3;em;[속상함]"
1008006-18 = "3;쇼쿠호;05;아무거나 먹는 건……. 인간적으로 문제가 있다고 봐야 할까."
1008006-19 = "3;쇼쿠호;99;원래 있던 곳에서는 늘 먹던 가게도 몇 군데 알고 있고, 그게 아니더라도 쉽게 가게의 상태를 파악할 수 있었지만…….\n#3;em;…"
1008006-20 = "3;쇼쿠호;11;여기서는 그리 쉽지가 않네. 어쩌면 지금이야말로, 조금 집중해서 생각을 읽어봐야 할 때이려나?\n#3;em;[반짝]"
1008006-21 = "[s3] \"그렇게까지……?\"\n[s4] \"이게 그런 안건이야?\""
1008006-22 = "#wait;100"
1008006-23 = "#wait;100"
1008006-24 = "3;쇼쿠호;04;당연하잖아? 자기 입에 들어가는 것보다 신중력을 써야 할 것도 별로 없다고.\n#3;jump"
1008006-25 = "3;쇼쿠호;99;나는 기본적으로 신선한 유기농 재료로 만든 것 외에는 입에 넣지 않아. 이 기준은 명확하지."
1008006-26 = "3;쇼쿠호;01;하지만 대부분의 가게들이 자기들 입으로 그렇게 말하는 것과 달리……. 실상은 어떨까?"
1008006-27 = "3;쇼쿠호;09;진짜로 유기농 재료를 썼다고 말할 수 있을까? 믿을 수 있는 가게라고 할 수 있을까?"
1008006-28 = "3;쇼쿠호;99;주인장의 생각, 주방장의 마음을 읽어보기 전까지는 확신할 수 없지.\n#3;jump"
1008006-29 = "3;쇼쿠호;01;그렇기 때문에 곤란한 거야, 지금 상황이."
1008006-30 = "3;쇼쿠호;04;여기서만큼은 타협 같은 걸 고려할 수 없어. 어중간한 음식을 먹을 바에야…….\n#3;em;…"
1008006-31 = "3;쇼쿠호;05;차라리 굶는 게 나아. 이건 진심이야, 선생님.\n#3;closeup"
1008006-32 = "#st;[0,0];instant;1;"
1008006-33 = "#clearST"
1008006-34 = "#wait;2500"
1008006-35 = "[ns5] \"진심력-이라는 게 확 느껴지네.\"\n[ns6] \"과연, 그런 쪽의 미식가인가.\""
1008006-36 = "#wait;100"
1008006-37 = "#wait;100"
1008006-38 = "3;쇼쿠호;02;……흠?\n#3;em;[?]"
1008006-39 = "3;쇼쿠호;01;뭐야, 그 표정은? 뭔가 나름대로의 생각이 있다는 표정인데."
1008006-40 = "3;쇼쿠호;02;……응?"
1008006-41 = "3;쇼쿠호;04;선생님한테 한 번 맡겨 달라고? 무슨 이야기야? 선생님이 직접 만들어 주기라도 하게?"
1008006-42 = "3;쇼쿠호;02;……아니라고?"
1008006-43 = "3;쇼쿠호;04;가게를 소개해 줘……?\n#3;em;…"
1008006-44 = "3;쇼쿠호;05;선생님……. 방금까지 뭘 들은 거야? 나는 그렇게 대충 자리를 고르는 게…….\n#3;jump"
1008006-45 = "3;쇼쿠호;02;……응? 제대로 들었다고?"
1008006-46 = "3;쇼쿠호;09;……그럼에도 자신이 있다……?"
1008006-47 = "#st;[0,0];instant;1;"
1008006-48 = "#clearST"
1008006-49 = "3;쇼쿠호;09\n#3;em;…\n#wait;2500"
1008006-50 = "3;쇼쿠호;99;……호오.\n#3;greeting"
1008006-51 = "3;쇼쿠호;09;그렇게까지 말하니 확실히 조금은 의문이 생겨날지도?"
1008006-52 = "3;쇼쿠호;01;그러면 한 번 따라는 가 보도록 할까? 하지만 선생님, 방금도 이야기했지?\n#3;jump"
1008006-53 = "3;쇼쿠호;99;생각을 읽지 않아도, 음식이 나온 뒤에는 금방 알아차릴 수 있으니까."
1008006-54 = "3;쇼쿠호;05;만약 내 기준에 미치지 못한다면, 그대로 돌아 나올 거야. 그 점은 미리 기억해 주길 바라."
1008006-55 = "3;쇼쿠호;01;그럼……. 가볼까?\n#3;greeting\n#3;em;[음표]"

1008006-76 = "3;쇼쿠호;01\n#3;a\n#wait;1000"
1008006-77 = "3;쇼쿠호;99;……흐응. 이런 곳이구나.\n#3;greeting"
1008006-78 = "3;쇼쿠호;02;꽤나 자신력 있는 것 같은데, 혹시 이곳 점장이나 주방장이랑 아는 사이라든가?\n#3;jump"
1008006-79 = "3;쇼쿠호;04;그런 건 아니라고? 그러면 어떻게 그렇게 여유력 있는 얼굴일까?\n#3;em;[?]"
1008006-80 = "3;쇼쿠호;05;선생님이 먹기에는 괜찮았지만, 사실 재료는 적당히 아무거나 공수해 오는 곳일 수도 있지 않을까?"
1008006-81 = "3;쇼쿠호;02;……절대 그럴 리는 없다?"
1008006-82 = "3;쇼쿠호;04;'절대로'……라…….\n#3;em;…"
1008006-83 = "3;쇼쿠호;01;……아. 이건 따지는 게 아니야. 그저 선생님의 태도가 평소와는 달라서, 조금 신기한 것뿐."
1008006-84 = "3;쇼쿠호;09;선생님, 늘 약간 신중하게 말하는 타입이잖아? 좋은 게 좋은 거라는 느낌?"
1008006-85 = "3;쇼쿠호;99;그런 선생님인데도, 확실하지 않은 것인데도 이렇게 단언한다는 게 신기한 거지."
1008006-86 = "3;쇼쿠호;01;뭐랄까……."
1008006-87 = "3;쇼쿠호;05;뭔가 믿을 만한 검증 수단이 있다……는 느낌?"

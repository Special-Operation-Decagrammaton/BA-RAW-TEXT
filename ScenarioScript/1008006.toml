1008006-58 = "3;쇼쿠호;02;……이곳이야? \n#3;em;[?]"
1008006-59 = "3;쇼쿠호;04;꽤 깔끔하긴 하네. 아직 확신은 없지만……."
1008006-60 = "3;쇼쿠호;99;그럼, 이왕 이렇게 됐으니, 메뉴도 선생님이 고르는 걸로 따라가 볼까.\n#3;greeting"
1008006-61 = "3;쇼쿠호;05;……흐응……. 과연, 그렇게 시키겠다…….\n#3;em;…"
1008006-62 = "#na;점원;확인했습니다. 그럼 함께 오신 분께서는……."
1008006-63 = "3;쇼쿠호;05;……나도 같은 거.\n#3;jump"
1008006-64 = "#na;점원;네. 확인했습니다. 조금만 기다려 주세요."

[translation]
1008006-1 = "Highest Standards"
1008006-2 = "Sensing trouble, I headed out to find Shokuhou."
1008006-8 = "Oh? Sensei?"
1008006-9 = "Ah... So you were worried about me."
1008006-10 = "Perhaps I've mentioned this before, but you really are a kind person."
1008006-11 = "But, hm... How do I put this?"
1008006-12 = "Even if you are a teacher, there are some things that are difficult to ask blindly."
1008006-13 = "[s1] \"You've got a difficult request?\"\n[s2] \"I thought you were just looking for a restaurant.\""
1008006-16 = "Certainly, I'm looking for a restaurant, but..."
1008006-17 = "I happen to be very particular when it comes to restaurants. It doesn't matter how hungry I am."
1008006-18 = "I can't eat simply anything... Is there no problem more human than that?"
1008006-19 = "Back home, I had a few favorite restaurants, and it was always easy to take the measure of a new restaurant before eating there..."
1008006-20 = "It's not so easy here. Perhaps this is a situation where I should turn to my abilities, after all?"
1008006-21 = "[s3] \"That seems excessive...\"\n[s4] \"Is this really so urgent?\""
1008006-24 = "Isn't it? There are few things that require more caution than deciding what goes into your mouth."
1008006-25 = "In simple terms, I don't put anything in my mouth unless it's made with fresh, organic ingredients. A clear standard."
1008006-26 = "It's easy for a restaurant to claim to have such ingredients... But is it the truth?"
1008006-27 = "How do we know that organic ingredients were really used? What source can we trust?"
1008006-28 = "The only way to be certain is to read the owner's thoughts and the chef's mind."
1008006-29 = "That's what's made my current situation so difficult."
1008006-30 = "This is one arena in which I refuse to compromise. I would sooner starve..."
1008006-31 = "...than eat mediocre food. I'm serious about this, Sensei."
1008006-35 = "[ns5] \"I can clearly sense your sincerity.\"\n[ns6] \"So, she's a devout gourmet...\""
1008006-38 = "...Hm?"
1008006-39 = "You're quite expressive, Sensei. It looks like you've thought of something."
1008006-40 = "Well?"
1008006-41 = "You'd like me to leave it to you, Sensei? What are you planning? A home-cooked meal?"
1008006-42 = "...No?"
1008006-43 = "You know a restaurant...?"
1008006-44 = "Sensei... Have you been listening? I have particular tastes..."
1008006-45 = "You say you fully understood my concerns..."
1008006-46 = "...and that you are confident nonetheless."
1008006-50 = "...Hm."
1008006-51 = "Your claims have certainly piqued my curiosity."
1008006-52 = "Should we give this a try? But Sensei, I've laid out my expectations clearly."
1008006-53 = "Even if I don't read the chef's thoughts, I can still tell quality ingredients by taste alone."
1008006-54 = "If it doesn't meet my standards, I'll leave. Please keep that in mind."
1008006-55 = "Well, then... Shall we?"
1008006-58 = "...Is this the place? "
1008006-59 = "It seems clean enough. I have yet to be convinced, however..."
1008006-60 = "Well, we are here now. I'll leave the selection of entree to you, Sensei."
1008006-61 = "Hmm... I see. So that's your order..."
1008006-62 = "Very good. And for you, miss?"
1008006-63 = "...I'll have what they're having."
1008006-64 = "Wonderful. Your food will be out shortly."
1008006-66 = "A few minutes later..."
1008006-73 = "Here is your order. Bon appetite!"
1008006-77 = "Hm... I see."
1008006-78 = "You seem quite confident. Are you acquaintances with the manager or the chef?"
1008006-79 = "You aren't? Then how can you be so relaxed?"
1008006-80 = "You may like this spot, Sensei, but would you know if they used any old ingredient off the street?"
1008006-81 = "...Impossible, you say?"
1008006-82 = "Impossible... Is it..."
1008006-83 = "There's no sense arguing. I was simply taken aback by the change in your attitude, Sensei."
1008006-84 = "You strike me as the type who always speaks a little cautiously. But you're insistent that this will be good..."
1008006-85 = "You're such a reserved person, yet you're making quite an assertion when you are not truly certain."
1008006-86 = "Then..."
1008006-87 = "You must have some reliable means of verifying the food here..."
1008006-91 = "I've hit upon the answers, have I?"
1008006-92 = "[s7] \"There are gourmets in Kivotos too.\"\n[s8] \"This restaurant wouldn't be here without them.\""
1008006-95 = "That's quite the circuitous answer..."
1008006-96 = "Very well. We've discussed it enough, so let's try a bite..."
1008006-104 = "...Oh?"

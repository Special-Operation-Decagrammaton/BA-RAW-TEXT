1008006-91 = "3;쇼쿠호;04;아예 틀린 말은 아니라고? 흐응……?"
1008006-92 = "[s7] \"사실 이곳에도 미식가들이 있거든.\"\n[s8] \"아니었으면 이 가게는 지금 여기 없었을 테니까.\""

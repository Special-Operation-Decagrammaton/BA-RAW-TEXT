[translation]
2300105-1 = "Back to the Supermarket!"
2300105-2 = "I'm sorry for going overboard last time."
2300105-3 = "[s] \"Don't worry about it. Your heart was in the right place.\""
2300105-4 = "Heehee. That's just like you, Sensei."
2300105-5 = "Say what you will, but I've decided to make it up to you by treating you to something special."
2300105-6 = "Would you mind going grocery shopping with me again, Sensei?"
2300105-8 = "3rd Avenue Market"
2300105-10 = "[ns] \"What are you in the market for today?\""
2300105-11 = "I realized something after our little incident."
2300105-12 = "Making you a ton of food isn't the way to go about it."
2300105-13 = "Instead, I want to make you something special."
2300105-14 = "That's why I need to go shopping for ingredients."
2300105-15 = "[s] \"So they're 'special' ingredients?\""
2300105-16 = "Heehee. You'll just have to wait and see!"
2300105-19 = "[ns] \"A fish market?\""
2300105-20 = "Welcome! We have plenty of fresh fish available today!"
2300105-21 = "Wow. The mackerel looks so fresh, and the saurel looks good too!"
2300105-22 = "Sensei! Sensei! Take a look at the sea urchin eggs!"
2300105-23 = "They're so fresh that we could sprinkle them on rice and chow down!"
2300105-24 = "[s] \"Easy there, Fuuka.\""
2300105-25 = "S-Sorry. Got carried away."
2300105-26 = "I get so worked up looking at fresh ingredients."
2300105-27 = "Thinking about what dishes they're going to go in puts my heart all aflutter..."
2300105-28 = "Haha... I must sound so weird, don't I?"
2300105-29 = "[s] \"Nope. That's the Fuuka I know.\""
2300105-30 = "Heehee... "
2300105-32 = "Oooh, this Atka mackerel would be great for grilling."
2300105-33 = "My, my. That's a discerning eye you have, young lady!"
2300105-34 = "Hahaha! That kind of thing is an important trait in a wife!"
2300105-35 = "Me? A w-wife?"
2300105-36 = "[s1] \"We're not married. She's one of my students.\"\n[s2] \"I can't deny that Fuuka would make for an excellent housewife.\""
2300105-37 = "Aahaha! For now! Details, you two. Details."
2300105-38 = "It's nice having someone you can rely on, isn't it?"
2300105-39 = "S-Sensei! You're embarrassing me!"
2300105-40 = "So, young lady, what brings you here today?"
2300105-41 = "Right. Do you have any eel?"
2300105-42 = "Eel? You bet we do!"
2300105-43 = "We carry the best eel in all of Kivotos!"
2300105-44 = "[s] \"Why eel...?\""
2300105-45 = "Because eel is said to be great for your stamina."
2300105-46 = "You have to work so many late nights, Sensei..."
2300105-47 = "...so I thought eel would be the perfect thing to use in a dish made just for you!"
2300105-48 = "This is the best way I can give you my support."
2300105-49 = "What a thoughtful young lady. You found yourself a keeper."
2300105-50 = "Here you are! The best eel we have on hand!"
2300105-51 = "Thank you so much!"
2300105-52 = "But I hope you don't think I'm going to overpay just because you handed me your best eel."
2300105-53 = "My, you know how to hold your own, don't you?"
2300105-54 = "[s] \"Hold on, Fuuka. What was that stamina part all about...?\""
2300105-55 = "Would you look at this eel? I bet it's going to be delicious!"
2300105-56 = "Heehee. How should I cook it?"
2300105-57 = "I could go with a classic and serve it over rice. Or simply grilling it with salt would be good too!"
2300105-58 = "Look at how fired up she's getting. Something tells me you won't be sleeping tonight! Hahaha!"
2300105-59 = "Oh, no no no. Sensei needs a good night's rest too!"
2300105-60 = "Your health comes first AND second. Am I understood, Sensei?"
2300105-61 = "Ha! Can you hear how devoted she is? Now that's true love!"
2300105-62 = "L-Love? Oh, dear..."
2300105-64 = "I chose to keep my mouth shut at that point, and we eventually left the shop with several eels."

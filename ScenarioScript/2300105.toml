[translation]
2300105-1 = "ไปซื้อของกันเถอะค่ะ!"
2300105-2 = "คราวก่อนฉันก่อเรื่องวุ่นวายให้คุณครู... ขอโทษด้วยนะคะ"
2300105-3 = "[s] \"ไม่เป็นไรหรอก ก็ฟูกะจังทำเพื่อครูนี่นา\""
2300105-4 = "ฮุฮุฮุ... คุณครูชอบพูดแบบนี้ตลอดเลยนะคะ"
2300105-5 = "อ๊ะ ไม่ใช่เวลาจะมาคุยกันนี่นา ฉันเรียนรู้ความผิดพลาดแล้ว และตัดสินใจว่าวันนี้จะดูแลคุณครู#nเป็นพิเศษค่ะ"
2300105-6 = "วันนี้คุณครูช่วยไปซื้อของกับฉันอีกได้มั้ยคะ?"
2300105-8 = "ตลาดอเวนิว 3"
2300105-10 = "[ns] \"วันนี้มาซื้ออะไรเหรอ?\""
2300105-11 = "หลังจากเกิดเรื่องคราวก่อน ฉันก็ได้เรียนรู้มาเรื่องหนึ่งค่ะ"
2300105-12 = "การทำอาหารได้เยอะอย่างเดียวยังไม่ใช่คำตอบที่ถูกต้อง"
2300105-13 = "แต่ฉันควรจะเตรียมอาหารที่พิเศษเพื่อคุณครูด้วยค่ะ"
2300105-14 = "เพราะงั้นวันนี้เลยจะมาซื้อวัตถุดิบพิเศษเพื่อไปทำอาหารค่ะ"
2300105-15 = "[s] \"วัตถุดิบพิเศษเหรอ?\""
2300105-16 = "ฮุฮุฮุ จะเป็นวัตถุดิบแบบไหน... ต้องอดใจรอก่อนนะคะ"
2300105-19 = "[ns] \"ที่นี่มันตลาดปลานี่นา?\""
2300105-20 = "เชิญเลยคร้าบ! วันนี้มีปลาสดๆ เข้ามาใหม่เยอะมากเลยครับ! เร่เข้ามาๆ"
2300105-21 = "ว้าว ปลาซาบะสดมากๆ ปลาอาจิเองก็สดมากเหมือนกัน!"
2300105-22 = "คุณครูคะ! คุณครู! ดูไข่หอยเม่นทะเลนี่สิคะ!"
2300105-23 = "ถ้าสดขนาดนี้ล่ะก็เอาไปแล่แล้วกินกับข้าวสวยร้อนๆ ได้เลยนะเนี่ย!"
2300105-24 = "[s] \"ฟูกะ ใจเย็นๆ ก่อน\""
2300105-25 = "อ๊ะ ขะ...ขอโทษด้วยค่ะ"
2300105-26 = "พอเห็นวัตถุดิบที่สดใหม่เลยลืมตัวไปหน่อย..."
2300105-27 = "แค่คิดว่าจะนำวัตถุดิบพวกนี้ไปทำอาหารอะไรดี หัวใจฉันมันก็ฟูฟ่องไปหมดเลยค่ะ..."
2300105-28 = "ฮะฮะฮ่า... แปลกใช่มั้ยล่ะคะ?"
2300105-29 = "[s] \"ไม่หรอก สมกับเป็นฟูกะแล้วล่ะ\""
2300105-30 = "แหะๆๆ..."
2300105-32 = "อ๊ะ ปลาฮอกเกะนี่ถ้าเอาไปย่างต้องอร่อยแน่ๆ เลยค่ะ"
2300105-33 = "โอ้โห คุณหนูคนนี้ สายตาเฉียบแหลมดีจริงๆ!"
2300105-34 = "ฮ่าฮ่าฮ่า! ถือว่าโชคดีนะได้เจ้าสาวที่มีฝีมือการทำอาหารแบบนี้น่ะ!"
2300105-35 = "คะ? จะ...เจ้าสาวเหรอคะ?"
2300105-36 = "[s1] \"นี่นักเรียนของฉันต่างหากล่ะ\"\n[s2] \"ฟูกะตันเป็นเจ้าสาวที่ยอดเยี่ยมที่สุดในโลกเลย\""
2300105-37 = "วะฮะฮะฮ่า! อย่าถือสาที่ผมพูดเลยนะ!"
2300105-38 = "แต่การที่มีคนคอยดูแลแบบนี้ก็เป็นเรื่องที่ดีใช่มั้ยล่ะ?"
2300105-39 = "ยะ...อย่าพูดล้อเล่นแบบนั้นสิคะคุณครู!"
2300105-40 = "แล้ววันนี้คุณหนูคิดจะซื้อปลาอะไรดีล่ะ?"
2300105-41 = "มีปลาไหลมั้ยคะ?"
2300105-42 = "ปลาไหลเหรอ? ต้องมีอยู่แล้วสิ!"
2300105-43 = "ร้านเราขายปลาไหลคุณภาพดีที่สุดในคิโวทอสเลยนะ!"
2300105-44 = "[s] \"จะซื้อปลาไหลเหรอ...?\""
2300105-45 = "คุณครูไม่เคยได้ยินเหรอคะว่าปลาไหลเป็นอาหารชูกำลัง?"
2300105-46 = "คุณครูต้องบำรุงร่างกายเยอะๆ เพราะชอบทำงานจนดึกบ่อยๆ...\n"
2300105-47 = "เพราะงั้นฉันเลยคิดจะเอาปลาไหลมาทำอาหารบำรุงให้คุณครูยังไงล่ะคะ!"
2300105-48 = "นั่นคงเป็นสิ่งที่ฉันทำได้ดีที่สุดในตอนนี้ค่ะ"
2300105-49 = "คุณหนูนี่ช่างใส่ใจจริงๆ เลยนะ คุณครูก็โชคดีจังเลยน้า"
2300105-50 = "ดีล่ะ! เดี๋ยวลุงจะเอาปลาไหลที่ดีที่สุดในร้านให้คุณหนูก็แล้วกัน!"
2300105-51 = "ขอบคุณค่ะ!"
2300105-52 = "อ๊ะ แต่ถึงจะเป็นปลาไหลคุณภาพดี แต่ถ้าราคาแพงลิ่วเกินไปฉันก็ไม่ซื้อนะคะ"
2300105-53 = "คุณหนูนี่เป็นพวกไม่ยอมคนสินะ!"
2300105-54 = "[s] \"เดี๋ยวก่อนสิฟูกะ ที่บอกว่าเป็นอาหารชูกำลังนี่...\""
2300105-55 = "ว้าว ปลาไหลดีๆ แบบนี้คงเอาไปทำอาหารอร่อยๆ ได้แน่นอนค่ะ!"
2300105-56 = "ฮุฮุ เอาไปทำเมนูอะไรดีน๊า?"
2300105-57 = "ข้าวหน้าปลาไหลสูตรดั้งเดิม? หรือทำปลาไหลย่างเกลือดีนะ?!"
2300105-58 = "ฮ่าฮ่า! คุณหนูดูสนุกมากเลยนะเนี่ย ถ้ากินหมดทุกเมนู คืนนี้ไม่ต้องนอนแน่ๆ! วะฮะฮะฮ่า!"
2300105-59 = "แบบนั้นไม่ได้นะคะ ยังไงคุณครูก็ต้องนอนพักนะคะ!"
2300105-60 = "อันดับแรกคือสุขภาพ อันดับที่สองก็สุขภาพค่ะ เข้าใจมั้ยคะคุณครู?"
2300105-61 = "ฮ่า! คุณหนูคนนี้คอยดูแลคุณครูทุกอย่างเลยนะเนี่ย รักกันดีจริงๆ!"
2300105-62 = "ระ...รักเหรอคะ? เรื่องนั้นมัน..."
2300105-64 = "(คุณครูได้แต่ยืนฟังบทสนทนาของทั้งสองคนโดยที่ขัดอะไรไม่ได้ และถือปลาไหลจำนวนมาก#nกลับไปที่โรงเรียน)"

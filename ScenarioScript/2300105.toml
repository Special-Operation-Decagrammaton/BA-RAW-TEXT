[translation]
2300105-1 = "再次去採購吧！"
2300105-2 = "對不起上次給老師造成困擾了……"
2300105-3 = "[s]「沒關係，你那麼做都是為了我嘛。」"
2300105-4 = "呵呵呵……老師總會這麼說。"
2300105-5 = "啊，那個，這次不一樣……今天我想記取上次的教訓，給老師來個特別的款待。"
2300105-6 = "老師，今天能再跟我一起去採購嗎？"
2300105-8 = "市場3號街"
2300105-10 = "[ns]「今天要買什麼？」"
2300105-11 = "在那之後我想了很多，終於明白了。"
2300105-12 = "單純做出多道料理，並不是正確的。"
2300105-13 = "應該要為了老師做些更特別的料理。"
2300105-14 = "為此，我今天打算買點特別的食材。"
2300105-15 = "[s]「特別的食材？」"
2300105-16 = "呵呵呵，是什麼東西就請老師期待囉。"
2300105-19 = "[ns]「這裡是……海產店？」"
2300105-20 = "歡迎光臨！今天也進了滿滿的新鮮貨！快來看看！"
2300105-21 = "哇～鯖魚很新鮮，還有現在當季的竹莢魚呢！ "
2300105-22 = "老師！老師！請看這邊的海膽！"
2300105-23 = "這麼新鮮，直接加到飯上吃應該都沒問題！"
2300105-24 = "[s]「風華，冷靜點。」"
2300105-25 = "啊，抱，抱歉。"
2300105-26 = "看到這麼新鮮的食材，我就不禁……"
2300105-27 = "光是想像這些食材以後會變成什麼樣的料理，就讓我心跳加速……"
2300105-28 = "啊哈哈……我果然有點奇怪對吧？"
2300105-29 = "[s]「不會，這才是風華的個性。」"
2300105-30 = "欸嘿嘿…… "
2300105-32 = "啊，這條花魚烤起來一定很好吃。"
2300105-33 = "哦，這位小姐眼光真高！"
2300105-34 = "哈哈哈！新婚人妻就有這種眼光，看來廚藝一定也相當了得！我沒說錯吧？"
2300105-35 = "咦咦？新，新婚人妻？"
2300105-36 = "[s1]「她不是人妻，是我的學生。」\n[s2]「沒錯，風華是世上最強的新婚人妻。」"
2300105-37 = "哇哈哈！那些小事就別管了！"
2300105-38 = "總之，有個會照顧自己的人就是好事。"
2300105-39 = "請，請別開這種玩笑！老師！"
2300105-40 = "那麼，小姐今天要買什麼呀？"
2300105-41 = "啊，請問有鰻魚嗎？"
2300105-42 = "鰻魚？當然有！"
2300105-43 = "奇普托斯最頂級的鰻魚就在我們家！"
2300105-44 = "[s]「怎麼突然要買鰻魚……？」"
2300105-45 = "鰻魚料理不是很能補充精力嗎？"
2300105-46 = "老師晚上為了工作，似乎每晚都熬夜弄得自己筋疲力盡。"
2300105-47 = "所以我想讓老師吃頓鰻魚料理！"
2300105-48 = "我想現在這就是，我能做到的最大幫助了。"
2300105-49 = "有人肯為你這麼盡心盡力，你還真好命！"
2300105-50 = "真拿你們沒辦法！今天就把我們店裡最頂級的鰻魚拿出來吧！"
2300105-51 = "謝謝您！"
2300105-52 = "啊，當然，就算是最高級的鰻魚，還是會算我合理的價格吧？"
2300105-53 = "小姐還真是精呢！"
2300105-54 = "[s]「等等，風華。你說能補充精力的料理……」"
2300105-55 = "哇啊，用這個鰻魚一定可以做出很美味的料理！"
2300105-56 = "呵呵，要怎麼料理才好呢？"
2300105-57 = "果然要王道的鰻魚飯三吃？稍微灑點鹽烤一烤好像也很好吃！"
2300105-58 = "小姐竟然這麼積極，這下晚上不就睡不著了嗎！哇哈哈！"
2300105-59 = "那怎麼行，該休息的時候就要好好休息！"
2300105-60 = "最重要的除了健康還是健康。老師，您明白吧？"
2300105-61 = "呵！竟然連這部分都照顧到了，兩位真是愛的火熱啊！"
2300105-62 = "說，說什麼愛。老闆真是的……"
2300105-64 = "（完全沒辦法插入兩人的對話之中，就這麼買了一堆鰻魚回去）"

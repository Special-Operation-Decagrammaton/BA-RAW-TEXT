[translation]
2300105-1 = "#title;또 장 보러 가요!"
2300105-2 = "3;후우카;06;저번엔 폐를 끼쳐서 죄송했습니다.\n#3;stiff\n#3;a\n#3;em;[속상함]"
2300105-3 = "[s] \"괜찮아. 날 위해 그런 거잖아.\""
2300105-4 = "3;후우카;01;후후후……, 선생님은 늘 그렇게 말씀해주시네요."
2300105-5 = "3;후우카;02;아, 이럴 때가 아니라, 실패를 발판 삼아 오늘은 특별한 걸 대접해드릴까 해요.\n#3;hophop\n#3;em;[반응]"
2300105-6 = "3;후우카;03;선생님, 오늘도 같이 장 보러 가주실래요?\n#3;greeting\n#3;em;[반짝]"
2300105-7 = "#all;hide"
2300105-8 = "#place;3번가 시장"
2300105-9 = "#wait;1000"
2300105-10 = "[ns] \"오늘은 뭘 살 거야?\""
2300105-11 = "3;후우카;99;그때 이후로 저 곰곰이 생각하다 깨달았어요.\n#3;em;…\n#3;a"
2300105-12 = "3;후우카;05;단순히 음식을 많이 만드는 것만이 정답이 아니란 것을.\n#3;em;[반응]"
2300105-13 = "3;후우카;00;선생님을 위해서라면 더욱 특별한 요리를 만드는 게 좋지 않을까. 하고 말이죠."
2300105-14 = "3;후우카;01;오늘은 그걸 위해 특별한 식재료를 살 생각이에요.\n#3;greeting"
2300105-15 = "[s] \"특별한 식재료?\""
2300105-16 = "3;후우카;03;후후후, 어떤 재료일지는 기대해주세요.\n#3;hophop\n#3;em;[반짝]"
2300105-17 = "#all;hide"
2300105-18 = "#wait;1000"
2300105-19 = "[ns] \"여기는 생선 가게?\""
2300105-20 = "#na;생선가게 아저씨;어서옵쇼! 오늘도 신선한 물건이 잔뜩 들어왔습니다! 보고 가십셔!"
2300105-21 = "3;후우카;00;와, 고등어도 싱싱하고, 전갱이도 물이 잔뜩 올랐어요! \n#3;jump\n#3;em;[반짝]\n#3;a"
2300105-22 = "3;후우카;03;선생님! 선생님! 여기 성게알 좀 보세요!\n#3;m4\n#3;hophop"
2300105-23 = "3;후우카;03;이렇게나 싱싱하다면 바로 밥에 뿌려 먹어도 괜찮을 거 같아요!\n#3;greeting\n#3;em;[음표]"
2300105-24 = "[s] \"후우카, 진정해.\""
2300105-25 = "3;후우카;04;앗, 죄, 죄송해요.\n#3;stiff\n#3;em;[땀]"
2300105-26 = "3;후우카;02;이렇게 신선한 재료들을 보면 저도 모르게……."
2300105-27 = "3;후우카;99;이런 재료들이 나중에 어떤 요리가 될지 상상하는 것만으로도 가슴이 설레서…….\n#3;em;…"
2300105-28 = "3;후우카;00;아하하……. 역시, 좀 이상하죠?\n#3;m3"
2300105-29 = "[s] \"아냐. 후우카다운 걸.\""
2300105-30 = "3;후우카;99;에헤헤……."
2300105-31 = "3;후우카;02\n#3;em;[반응]\n#wait;1000"
2300105-32 = "3;후우카;02;앗, 이 임연수어도 구워 먹으면 맛있겠어요.\n#3;m2\n#3;hophop"
2300105-33 = "#na;생선가게 아저씨;오옷, 그쪽의 아가씨. 보는 눈이 좋은데!"
2300105-34 = "#na;생선가게 아저씨;핫핫핫! 새댁의 눈썰미를 보아하니 요리 솜씨도 일품이겠어! 안 그래?"
2300105-35 = "3;후우카;02;네엣? 새, 새댁이요?\n#3;em;[?!]\n#3;shake"
2300105-36 = "[s1] \"새댁이 아니라, 제가 가르치는 학생입니다.\"\n[s2] \"예, 후우카는 세계 최강의 새댁입니다.\""
2300105-37 = "#na;생선가게 아저씨;왓핫핫! 사소한 건 신경 쓰지 말라고!"
2300105-38 = "#na;생선가게 아저씨;어쨌거나 챙겨주는 사람이 있다는 건 좋은 일이잖아?"
2300105-39 = "3;후우카;08;노, 농담하지 말아주세요! 선생님!\n#3;stiff\n#3;em;[///]"
2300105-40 = "#na;생선가게 아저씨;그래서 아가씨께선 오늘 무얼 사러 오셨나?"
2300105-41 = "3;후우카;00;혹시 장어 있나요?\n#3;m3\n#3;em;[반응]"
2300105-42 = "#na;생선가게 아저씨;장어? 당연히 있지!"
2300105-43 = "#na;생선가게 아저씨;키보토스 최고의 장어를 취급하는 게 바로 우리 가게라고!"
2300105-44 = "[s] \"웬 장어……?\""
2300105-45 = "3;후우카;00;그 왜, 장어는 기력을 채워주는 스태미나 음식이라고들 하잖아요?"
2300105-46 = "3;후우카;99;선생님은 밤일 하시느라 매번 밤을 새면서 고생하시니까요.\n#3;em;…"
2300105-47 = "3;후우카;03;그런 선생님을 위해서 기력에 좋은 장어 요리를 대접해드리자!\n#3;em;[!]\n#3;jump"
2300105-48 = "3;후우카;01;그게 제가 할 수 있는 최선이라고 생각했어요."
2300105-49 = "#na;생선가게 아저씨;아가씨가 지극정성인걸. 그쪽은 좋겠어."
2300105-50 = "#na;생선가게 아저씨;옛다, 기분이다! 내 오늘 우리 가게에서 최고의 장어를 내어주지!"
2300105-51 = "3;후우카;03;감사합니다! \n#3;em;[반짝]\n#3;greeting"
2300105-52 = "3;후우카;00;아, 물론 아무리 최고급 장어라고 해도, 어디까지나 적정 가격으로 구매할 생각이지만요?\n#3;em;[반응]"
2300105-53 = "#na;생선가게 아저씨;이거, 당해낼 수가 없는 걸!"
2300105-54 = "[s] \"잠깐 후우카. 그, 스태미나 음식이라는 건…….\""
2300105-55 = "3;후우카;02;와앗, 이 장어라면 확실히 맛있는 요리가 가능할 거 같아요!\n#3;jump\n#3;em;[!]"
2300105-56 = "3;후우카;01;후후, 어떻게 요리하는 게 좋을까요?"
2300105-57 = "3;후우카;00;역시 정통파로 장어덮밥? 그냥 구워서 소금만 뿌려 먹어도 맛있을 거예요!\n#3;em;?"
2300105-58 = "#na;생선가게 아저씨;아가씨가 이렇게나 의욕적이라니, 그렇게 잔뜩 먹으면 밤에 쉴 수가 없겠어! 왓핫핫!"
2300105-59 = "3;후우카;05;그건 안 돼요. 그래도 쉴 때는 쉬어야죠!\n#3;em;[!]\n#3;hophop"
2300105-60 = "3;후우카;00;첫째도 건강, 둘째도 건강. 선생님, 아시겠죠?\n#3;greeting"
2300105-61 = "#na;생선가게 아저씨;허어! 그런 부분까지 똑 부러지게 챙기다니, 사랑이 뜨겁구먼!"
2300105-62 = "3;후우카;02;사, 사랑이라니. 그런, 아이참…….\n#3;em;[///]\n#3;stiff"
2300105-63 = "#all;hide"
2300105-64 = "#na;(차마 두 사람의 말을 지적하지 못한 채, 장어를 잔뜩 사서 돌아왔다.)"

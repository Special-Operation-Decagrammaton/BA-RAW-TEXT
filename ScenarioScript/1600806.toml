1600806-73 = "3;후부키;00;미안, 미안. 도넛 가게의 대기줄이 너무 길어서 말이야.\n#3;em;[재잘]\n#3;m3\n#3;hophop"
1600806-74 = "3;후부키;04;방금 하던 행동은…… 그게, 오는 길에 도넛을 길가에 떨어트려서 말이야."
1600806-75 = "3;후부키;00;분명 이 근처에 떨어트린 것 같은데 도통 보이질 않네.\n#3;em;[땀]\n#3;stiff"

[translation]
1600806-1 = "#title;게으른 경찰의 친절"
1600806-2 = "#na;(후부키의 상태를 보기 위해 발키리 경찰학교에 들른 김에 생활안전국 사무실을 방문했다.)"
1600806-3 = "#all;hide"
1600806-4 = "#place;생활안전국 사무실"
1600806-5 = "3;후부키;05;그러니까 그건 우리 업무가 아니라니까…….\n#3;em;[속상함]\n#3;a"
1600806-6 = "3;후부키;05\n#na;어린 소녀;하지만 일상에서 곤란한 일이 생기면 생활안전국을 찾아오라고 했었잖아?"
1600806-7 = "3;후부키;05\n#na;어린 소녀;사소해 보여도 내게는 엄청나게 곤란한 일이라고!"
1600806-8 = "3;후부키;04;그건 그렇긴 하지만, 이런 문제는 조금…….\n#3;em;…"
1600806-9 = "3;후부키;04\n#na;어린 소녀;그러지 말고 제발 한 번만 도와줘. 그 머리핀은 세상에 하나밖에 없는 물건이라고."
1600806-10 = "3;후부키;04\n#na;어린 소녀;할머니가 생일 때 만들어 준 소중한 머리핀이야. 다른 머리핀으로는 대신할 수 없어!"
1600806-11 = "3;후부키;02;분실물 관리 자체는 생활안전국의 업무이긴 하지만, 물건을 찾으러 출동하는 건 또 다른 일이야.\n#3;em;[반응]"
1600806-12 = "3;후부키;01;그 머리핀을 어디서 잃어버렸다고 했지?"
1600806-13 = "3;후부키;01\n#na;어린 소녀;그게, 분명 집을 나설 때까지만 하더라도 머리에 잘 붙어 있었는데…… 학교에 도착하고 보니 어느새 사라졌었어."
1600806-14 = "3;후부키;01\n#na;어린 소녀;등굣길에 어디서 떨어트렸나 봐……."
1600806-15 = "3;후부키;99;사정은 이해하지만, 어디서 잃어버렸는지도 모르는 분실물을 찾기 위해서 무작정 움직일 수는 없어.\n#3;em;…"
1600806-16 = "3;후부키;02;생활안전국이라 하더라도 동원할 수 있는 경찰력에는 한계가 있거든."
1600806-17 = "3;후부키;02\n#na;어린 소녀;거짓말하지 마! 생활안전국 학생들은 일이 없어서 매일 낮잠만 자고 있잖아!"
1600806-18 = "3;후부키;02\n#na;어린 소녀;그런데 내 머리핀을 찾아줄 시간은 없다니…… 너무해!"
1600806-19 = "3;후부키;04;으음. 낮잠을 잤다는 건 부인하지 않겠지만, 긴급 출동에 대비하기 위해서라도 사무실을 오랫동안 비울 수는 없거든.\n#3;stiff"
1600806-20 = "3;후부키;03;……대신 비슷한 분실물이 들어오면 알려줄 테니, 연락처라도 남겨 줄래?\n#3;em;[땀]\n#3;m4"
1600806-21 = "#na;어린 소녀;치잇…… 경찰은 순 엉터리야!\n#fontsize;100"
1600806-22 = "#st;[0,0];instant;1;"

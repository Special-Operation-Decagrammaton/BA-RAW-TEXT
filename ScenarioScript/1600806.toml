1600806-102 = "4;후부키;02;에에— 어째서 그런 귀찮은 일을 해야 하는데?\n#4;m3\n#4;em;[?]"
1600806-103 = "4;후부키;05;그렇게 성실한 모습을 보이면 금방 소문이 나서 너도나도 귀찮은 일을 잔뜩 떠맡길 게 분명하다고. 그런 건 딱 질색이야."
1600806-104 = "4;후부키;10;나는 도넛을 맛있게 먹는 것만으로도 충분해.\n#4;em;[반짝]\n#4;hophop"

[translation]
1600806-1 = "ความใจดีของตำรวจจอมขี้เกียจ"
1600806-2 = "(หลังเสร็จธุระที่สถาบันฝึกตำรวจวัลคิรี่ คุณครูก็แวะไปหาฟุบุกิที่สำนักรักษาความปลอดภัย)"
1600806-4 = "สำนักรักษาความปลอดภัย"
1600806-5 = "ก็บอกแล้วไงว่านั่นไม่ใช่งานของเรา..."
1600806-6 = "ไหนบอกว่าถ้ามีปัญหาอะไรเกิดขึ้นก็ให้มาที่สำนักงานรักษาความปลอดภัยได้ไงล่ะ?"
1600806-7 = "ถึงมันจะดูเป็นเรื่องเล็กน้อย แต่สำหรับฉันมันเป็นเรื่องใหญ่มากนะ!"
1600806-8 = "แต่ถึงอย่างนั้นก็เถอะ... ปัญหาแบบนี้มัน..."
1600806-9 = "อย่าพูดแบบนั้นสิ ช่วยฉันสักครั้งเถอะ กิ๊ฟติดผมอันนั้นมีแค่อันเดียวในโลกเลยนะ"
1600806-10 = "เป็นกิ๊ฟติดผมอันสำคัญที่คุณย่าทำให้ในวันเกิด เพราะงั้นไม่มีกิ๊ฟติดผมอันไหนมาแทนได้ทั้งนั้น"
1600806-11 = "การดูแลเรื่องของหายเป็นความรับผิดชอบของสำนักรักษาความปลอดภัยก็จริง แต่ว่าจะให้ออกไป#nช่วยกันตามหาของนั่นมันก็อีกเรื่องหนึ่งเลยนะ"
1600806-12 = "เมื่อกี้บอกว่าทำกิ๊ฟติดผมหายที่ไหนนะ?"
1600806-13 = "ตอนที่ออกจากบ้านฉันติดมันออกมาด้วย แต่พอมาถึงโรงเรียนก็หายไปซะแล้ว"
1600806-14 = "สงสัยจะทำหล่นไประหว่างทางมาโรงเรียน..."
1600806-15 = "ฉันเข้าใจว่าเธอเสียใจที่ทำของหาย  แต่พื้นที่กว้างขนาดนั้นจะให้เราไปตามหาของหาย โดยไม่มีเบาะแส คงเป็นไปไม่ได้หรอก"
1600806-16 = "ถึงจะเป็นสำนักรักษาความปลอดภัย แต่ก็มีข้อจำกัดเรื่องกำลังตำรวจที่ส่งออกไปทำงานได้อยู่เหมือนกันนะ"
1600806-17 = "อย่าโกหกเลย! พวกนักเรียนของสำนักรักษาความปลอดภัยไม่เห็นจะมีงานทำ วันๆ ก็เอาแต่#nนอนกลางวันไม่ใช่รึไง!"
1600806-18 = "ไม่มีเวลาตามหากิ๊ฟติดผมของฉันงั้นเหรอ... ทำเกินไปแล้วนะ!"
1600806-19 = "อืม...ฉันไม่ปฏิเสธเรื่องนอนกลางวันหรอกนะ แต่ต้องเตรียมพร้อมรับมือกับสถานการณ์ฉุกเฉิน#nตลอดเวลา ก็เลยปล่อยให้สำนักงานไม่มีคนอยู่นานๆ ไม่ได้น่ะ"
1600806-20 = "แต่ถ้ามีคนแจ้งเจอของหายที่คล้ายๆ แบบนั้นก็จะแจ้งไปให้นะ จะฝากช่องทางติดต่อเอาไว้รึเปล่าล่ะ?"
1600806-21 = "ชิส์... ตำรวจนี่ไม่ได้เรื่องเลย!"
1600806-27 = "เฮ้อ ถูกผู้ที่มาร้องเรียนต่อว่าอีกจนได้"
1600806-28 = "เอ๋ คุณครูเหรอ? มะ... มาดูอยู่ตั้งแต่เมื่อไรน่ะ?"
1600806-29 = "[s] “เมื่อกี้ก็ดูอยู่ตลอดเลย”"
1600806-30 = "ฮะฮ่า...ถูกเห็นสภาพที่น่าอายซะแล้ว"
1600806-31 = "ไม่ต้องห่วงหรอก พอต้องรับมือกับคำร้องเรียนของพลเรือนก็ต้องเจอเรื่องแบบนี้เป็นประจำอยู่แล้ว"
1600806-32 = "ขอให้ตามหาของหายบ้าง ขอให้ไปเปิดประตูที่ล็อกไว้บ้าง หรือไม่ก็ให้ช่วยตามหาสุนัข... #nคำขอแบบนี้ไม่มีที่สิ้นสุดเลย"
1600806-33 = "[s] “แล้วไปช่วยตามหากิ็ฟติดผมให้ไม่ได้เหรอ?”"
1600806-34 = "ทำตกไปตรงไหนก็ไม่รู้ เส้นทางที่เด็กคนนั้นใช้เดินทางมาโรงเรียนก็ไกลไม่ใช่น้อย"
1600806-35 = "จะให้ไปค้นหาตลอดระยะทางหลายกิโลเมตร เพื่อตามหากิ๊ฟติดผมที่ไม่รู้ว่ามีอยู่หรือเปล่า#nใช้เวลาทั้งวันก็คงไม่พอหรอก"
1600806-36 = "แล้วถ้ายอมทำตามคำขอเล็กๆ น้อยๆ แบบนี้ เดี๋ยวก็จะมีคำขอแบบเดียวกันเข้ามาเรื่อยๆ ก็เลยต้อง#nปฏิเสธไปอย่างช่วยไม่ได้น่ะ"
1600806-37 = "[s1] “ช่วยไม่ได้สินะ...”\n[s2] “ฟุบุกิก็เย็นชาเหมือนกันนะ”"
1600806-38 = "..."
1600806-39 = "แน่นอนอยู่แล้ว ก็ฉันเป็นตำรวจมืออาชีพที่ไม่หวั่นไหวกับความรู้สึกส่วนตัวยังไงล่ะ!"
1600806-40 = "..."
1600806-41 = "อ๊ะ จริงด้วย จู่ๆ ก็นึกขึ้นมาได้ โดนัทหมดพอดีเลย"
1600806-42 = "คุณครูช่วยอยู่ที่นี่แทนฉันแป๊บหนึ่งได้ไหม? เดี๋ยวจะรีบกลับมาก่อนถึงเวลาเปลี่ยนกะรอบถัดไป แค่ช่วยพูดคุยนิดๆ หน่อยๆ กับคนที่มาก็พอแล้วละ"
1600806-43 = "[s] “ไม่ใช่ว่าต้องเตรียมพร้อมไปออกปฏิบัติการฉุกเฉินเหรอ?!”"
1600806-44 = "ระ...เรื่องนั้น... มีคิริโนะกับคนอื่นๆ อยู่แล้วนี่..."
1600806-45 = "การซื้อโดนัทน่ะสำคัญกว่าการทำงานของสำนักงานรักษาความปลอดภัยอีกนะ!"
1600806-46 = "เอาเป็นว่าจะรีบกลับมาให้ทันก็แล้วกัน เพราะงั้นฝากด้วยนะ~"
1600806-55 = "(ใกล้จะถึงเวลาเปลี่ยนกะแล้ว แต่ฟุบุกิก็ยังไม่กลับมาตามที่สัญญาเอาไว้...)"
1600806-56 = "[ns] ออกไปตามหาฟุบุกิ"
1600806-59 = "ใกล้ๆ กับโรงเรียนประถมศึกษาของรัฐ เขต D.U."
1600806-62 = "(เจอฟุบุกิกำลังหาอะไรบางอย่างอยู่ในพุ่มไม้แถวๆ ทางไปโรงเรียนใกล้กับโรงเรียนประถมศึกษาที่#nอยู่ไม่ไกล)"
1600806-67 = "อืม นี่มันแค่ที่เปิดขวด..."
1600806-69 = "นี่ก็ไม่ใช่..."
1600806-70 = "[s] “ทำอะไรอยู่เหรอ?”"
1600806-71 = "อะ..เอ๋? คุณครู?! ทำไมถึงมาอยู่ที่นี่...?"
1600806-72 = "เลยเวลาเปลี่ยนกะแล้ว แต่ฉันยังไม่กลับไปก็เลยออกมาตามหางั้นเหรอ?"
1600806-73 = "โทษทีๆ คนต่อแถวรอที่ร้านโดนัทเยอะมากเลยน่ะ"
1600806-74 = "และเมื่อกี้คือ... เอ่อ... ฉันเผลอทำโดนัทตกระหว่างทางกลับน่ะ"
1600806-75 = "ทั้งๆ ที่น่าจะตกอยู่แถวนี้แท้ๆ แต่หาไม่เจอเลย"
1600806-76 = "[s] “งั้นให้ครูช่วยมั้ย?”"
1600806-77 = "ไม่ต้องหรอก คุณครูไม่ต้องช่วยก็ได้ คะ... คือว่า..."
1600806-79 = "เฮ้อ ปิดคุณครูไม่ได้เลยนะ"
1600806-80 = "ฉันรู้ว่าฉันพูดไปว่าไม่ควรทำอะไรแบบนี้ แต่พอเห็นผู้ร้องเรียนกลับไปพร้อมสีหน้าผิดหวัง#nแบบนั้นมันก็ทำให้รู้สึกผิดขึ้นมาน่ะ"
1600806-81 = "ไม่ว่าจะกินโดนัทไปเท่าไร ความรู้สึกพวกนั้นก็ไม่จางหายไปเลย"
1600806-82 = "เพราะงั้นที่ทำแบบนี้ก็เพื่อที่จะได้กินโดนัทอย่างเอร็ดอร่อยเท่านั้น! อย่าเข้าใจผิดนะ!"
1600806-83 = "[s] “เดี๋ยวครูช่วยหา”"
1600806-84 = "หือ? ทำไมล่ะ?"
1600806-85 = "[s] “ครูเองก็อยากกินโดนัทอร่อยๆ เหมือนกัน”"
1600806-89 = "ถ้างั้นก็ช่วยไม่ได้นะ! โดนัทอร่อยๆ เป็นเรื่องสำคัญสำหรับตำรวจอย่างมาก#nคงปฏิเสธไม่ได้หรอก"
1600806-90 = "ถ้างั้นคุณครูดูถนนฝั่งทางซ้ายทีนะ ฉันจะหาฝั่งขวาเอง"
1600806-93 = "(...ครู่ต่อมา)"
1600806-98 = "เจอกิ๊ฟติดผมที่เด็กคนนั้นพูดถึงแล้วล่ะ!"
1600806-99 = "เพราะได้คุณครูมาช่วยงานเลยเสร็จเร็วกว่าที่คิดไว้เลยนะเนี่ย ขอบคุณมากนะ!"
1600806-100 = "เอาละ ทีนี้ก็กลับไปบอกเด็กคนนั้นว่า 'บังเอิญ' เจอของที่ทำหายไปได้แล้วล่ะ"
1600806-101 = "[s] “จะไม่บอกเหรอว่าเป็นคนหาเจอเองน่ะ?”"
1600806-102 = "ฮ่ะฮ่ะ— ทำไมต้องทำอะไรน่ารำคาญแบบนั้นด้วยล่ะ?"
1600806-103 = "ถ้าเกิดบอกไปตามตรงแบบนั้น เดี๋ยวก็คงจะมีข่าวลือแพร่ไปทั่ว ทั้งคุณครูและฉันก็คงต้องเจอเรื่อง#nน่ารำคาญเพิ่มขึ้นอีกเยอะแน่ ฉันเกลียดอะไรแบบนั้นมากเลย"
1600806-104 = "ฉันขอแค่ได้กินโดนัทอร่อยๆ ก็พอแล้ว"
1600806-105 = "[s] “ถ้างั้นแวะซื้อโดนัทระหว่างทางกลับกันดีไหม?”"
1600806-106 = "เยี่ยมเลย! คุณครูจะเป็นคนจ่ายค่าโดนัทใช่มั้ย?"
1600806-107 = "[s3] “แน่นอนอยู่แล้ว”\n[s4] “เพื่อเป็นรางวัลให้ฟุบุกิไง\""
1600806-108 = "ถ้างั้นขอเป็นโดนัทเคลือบน้ำตาลของมาสเตอร์โดนัทนะ!"
1600806-109 = "ถ้างั้นขอเป็นโดนัทเคลือบน้ำตาลของมาสเตอร์โดนัทนะ!"
1600806-110 = "โดนัทน่ะอร่อยตลอดเวลาอยู่แล้ว แต่โดนัทของวันนี้เป็นโดนัทฟรีที่ได้จากคุณครูหลังเสร็จงาน...#nรสชาติคงจะยอดเยี่ยมสุดๆ ไปเลย"
1600806-112 = "(หลังจากคืนกิ๊ฟติดผมให้เจ้าของแล้ว คุณครูก็นั่งกินสุดโดนัทกับฟุบุกิอย่างเอร็ดอร่อย)"

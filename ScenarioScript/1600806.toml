1600806-31 = "3;후부키;03;신경 쓰지 마. 민원 처리를 하다 보면 자주 있는 일이거든."
1600806-32 = "3;후부키;05;잃어버린 물건을 찾아 달라, 잠긴 문을 열어 달라, 개를 찾아 달라…… 정말 끝도 없다니까."
1600806-33 = "[s] \"머리핀을 직접 찾아줄 수는 없는 거야?\""
1600806-34 = "3;후부키;02;어디서 떨어트렸는지 정확히 알면 또 모르겠지만, 저 아이의 통학로는 꽤나 길었거든.\n#3;em;[반응]"
1600806-35 = "3;후부키;99;수 km나 되는 길을 샅샅이 헤집어가며, 없을지도 모르는 머리핀을 찾으려면 하루를 다 써도 시간이 모자랄 거야."
1600806-36 = "3;후부키;05;한 번이라도 사소한 의뢰를 들어 주기 시작하면 계속 비슷한 민원이 들어올 테니, 이런 일은 냉정하게 거절해야 해."
1600806-37 = "[s1] \"그렇다면 어쩔 수 없지만…….\"\n[s2] \"후부키는 냉정하구나.\""

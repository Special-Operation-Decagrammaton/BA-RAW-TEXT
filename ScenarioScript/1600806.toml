1600806-77 = "3;후부키;07;아니. 딱히 선생님이 도와주지 않아도…… 그게, 그러니까…….\n#3;hophop"
1600806-78 = "3;후부키;07\n#3;em;…\n#wait;2500"
1600806-79 = "3;후부키;99;……후후, 역시 선생님은 못 속이겠네."
1600806-80 = "3;후부키;00;원칙적으로 안 된다고는 하지만, 무거운 표정으로 돌아가는 민원인들의 얼굴을 보고 있으면 어쩐지 마음이 무거워져서 말이야."
1600806-81 = "3;후부키;00;그런 기분으로는 도넛을 아무리 먹어도 마음이 편해지질 않아."
1600806-82 = "3;후부키;05;그러니까 이건…… 맛있는 도넛을 먹기 위한 농땡이의 일환일 뿐이야! 착각하지 말라고!\n#3;em;[반응]"

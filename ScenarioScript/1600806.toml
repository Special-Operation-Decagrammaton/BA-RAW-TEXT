[translation]
1600806-1 = "A Lazy Cop's Kindness"
1600806-2 = "After finishing some work at Valkyrie Police School, I stopped by the Public Safety Bureau's office to check on Fubuki."
1600806-4 = "Public Safety Bureau Office"
1600806-5 = "I'm telling you, that's not our responsibility."
1600806-6 = "But you said come to the Public Safety Bureau when I have a problem."
1600806-7 = "I know it may seem trivial, but this is very important to me!"
1600806-8 = "I get what you're saying, but this is kind of..."
1600806-9 = "Please, PLEASE help me out. There's only one hairpin like it in the world."
1600806-10 = "My grandma made it for my birthday. It's irreplaceable!"
1600806-11 = "Lost and found management IS a Public Safety Bureau job, but that's not the same as going out to look for a lost item."
1600806-12 = "Where did you lose the hairpin anyway?"
1600806-13 = "I swear it was in my hair when I left home...but it was gone by the time I arrived at school."
1600806-14 = "It must have fallen out while I was on my way."
1600806-15 = "I get you're broken up about this, but that's still too wide of a search area.#nWe can't go looking for something when you have no clue where it could be."
1600806-16 = "We're shorthanded as it is. We don't have the manpower to be assigning cadets to things like this."
1600806-17 = "You can't be serious! All you Public Safety Bureau students do is nap all day!"
1600806-18 = "And you're saying you don't have time to look for my hairpin? That's not fair!"
1600806-19 = "Hmph. Okay, you got me there when it comes to the napping...but!#nI'm serious about us not leaving the office for too long.#nWe have to stay on standby in case of an emergency."
1600806-20 = "All I can promise is that we'll give you a call if something matching your hairpin's description turns up. Mind leaving your number?"
1600806-21 = "The police are so useless!"
1600806-27 = "*sigh* Another scolding from a civilian."
1600806-28 = "Sensei? Have you been standing there this whole time?"
1600806-29 = "[s] \"I saw pretty much everything.\""
1600806-30 = "Haha...ha. Well, this is embarrassing."
1600806-31 = "Don't worry. This kind of thing happens all the time when dealing with civil complaints."
1600806-32 = "We get all kinds of requests to find lost items, open locked doors,#nfind missing dogs... The list goes on and on."
1600806-33 = "[s] \"You can't help find the hairpin?\""
1600806-34 = "Maybe I could, if she knew exactly where she dropped it.#nI don't have time to search her entire commute route."
1600806-35 = "It would take all day to cover the span of an area like that."
1600806-36 = "Besides, it's a slippery slope. If we make an exception or two for requests like that, then we'll be drowning in similar requests when word gets out.#nThat's why it's better to turn these things down."
1600806-37 = "[s1] \"I understand that, but still...\"\n[s2] \"I thought you sounded pretty cold.\""
1600806-38 = "..."
1600806-39 = "Even I have to be a professional sometimes. The police aren't supposed to be swayed by emotional pleas like that!"
1600806-40 = "..."
1600806-41 = "Oh, yeah. I just remembered that I'm out of donuts."
1600806-42 = "Think you can look after this place while I go out to get more?#nI'll be back before my next shift. Just tell people whatever if they come."
1600806-43 = "[s] \"I thought you were serious about being on standby?!\""
1600806-44 = "K-Kirino or another student can take care of those things..."
1600806-45 = "Buying donuts is an important part of Public Safety Bureau work!"
1600806-46 = "Anyway, I'll be right back. I'm counting on you!"
1600806-55 = "Some time passed, but Fubuki didn't return before her next shift was supposed to start."
1600806-56 = "[ns] Search for Fubuki."
1600806-59 = "Near the D.U. Public Elementary School"
1600806-62 = "I found Fubuki rummaging through the some bushes just next to a sidewalk near an elementary school."
1600806-67 = "Hmm. Nope, this is just a bottle opener."
1600806-69 = "This isn't it either."
1600806-70 = "[s] \"What are you doing?\""
1600806-71 = "S-Sensei?! What are you doing here?"
1600806-72 = "Oh. You came looking for me when I didn't return in time for my shift."
1600806-73 = "Sorry about that. The line was really long at the donut shop."
1600806-74 = "And then, on my way back, I...dropped a donut here. Yeah, that's it."
1600806-75 = "I'm sure it's around here somewhere, but I can't seem to find it."
1600806-76 = "[s] \"Can I help?\""
1600806-77 = "No, no. You don't have to do that. Because I..."
1600806-79 = "Oh, who am I kidding? I can't lie to you."
1600806-80 = "I know I said I'm not supposed to be doing something like this,#nbut I couldn't help it. It's draining to see helpless people every day."
1600806-81 = "Not even donuts can get that bad taste out of your mouth."
1600806-82 = "No, wait—never mind. I mean to say I'm just slacking off so I can enjoy my donuts. Don't take it the wrong way!"
1600806-83 = "[s] \"I'll help you look.\""
1600806-84 = "Huh? Why?"
1600806-85 = "[s] \"Let's just say I got a craving for donuts.\""
1600806-89 = "Okay, then. Donuts are an important part of a balanced cop's diet.#nYou shouldn't deny yourself for too long."
1600806-90 = "You take the left side, and I'll search the right."
1600806-93 = "A little while later..."
1600806-98 = "I found it! I found the hairpin that kid lost!"
1600806-99 = "That didn't take nearly as long as I thought it would.#nThanks for all your help."
1600806-100 = "Now we can go back and say that someone turned it in.#nShe'll be happy to have it back."
1600806-101 = "[s] \"Why not say you're the one who found it?\""
1600806-102 = "Why would I do that?"
1600806-103 = "I'll get saddled with jobs like this all the time if word gets out that I go out of my way to help people like this. I don't want even more on my plate."
1600806-104 = "All I wanna do is kick back and enjoy my donuts."
1600806-105 = "[s] \"Should we get some donuts on our way back?\""
1600806-106 = "Sounds good to me! Your treat?"
1600806-107 = "[s3] \"Of course.\"\n[s4] \"As a reward for working so hard.\""
1600806-108 = "Sweet! I'll take box of glazed ones from Master Donuts!"
1600806-109 = "Sweet! I'll take box of glazed ones from Master Donuts!"
1600806-110 = "I'm glad all of that's out of the way. Donuts are always tasty,#nbut nothing tastes better than FREE donuts!"
1600806-112 = "Fubuki and I returned to the office and made sure the hairpin was returned to its owner. After that, we enjoyed our donuts together."

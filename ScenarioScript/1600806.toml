1600806-98 = "4;후부키;00;찾았다! 아까 그 아이가 말한 그 머리핀이야!\n#4;hophop\n#4;em;[반짝]\n#4;m2"
1600806-99 = "4;후부키;03;생각보다 금방 끝났네. 선생이 도와준 덕분이야. 정말 고마워!"

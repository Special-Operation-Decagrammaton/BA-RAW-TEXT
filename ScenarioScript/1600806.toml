[translation]
1600806-1 = "怠惰警官的親切"
1600806-2 = "（難得來了女武神警察學園，為了看看吹雪就去了生活安全局的事務所）"
1600806-4 = "女武神警察學園．生活安全局"
1600806-5 = "都說了，那不是我們的工作……"
1600806-6 = "可是，有人跟我說有煩惱的事就去找生活安全局……"
1600806-7 = "我真的很煩惱！"
1600806-8 = "就算妳這麼說，這種問題也有點……"
1600806-9 = "拜託妳，那個髮夾是世界上只有一個、非常重要的……"
1600806-10 = "是奶奶在我生日的時候做給我的、重要的髮夾……！"
1600806-11 = "……雖然遺失物的管理是生活安全局的工作，不過特地尋找遺失物就另當別論了。"
1600806-12 = "妳是什麼時候發現髮夾不見的？"
1600806-13 = "出門的時候明明有夾好的……可是到學校之後才發現不知道什麼時候已經……"
1600806-14 = "掉在上學途中的路上，之類的……？"
1600806-15 = "……雖然了解妳的情況，不過如果連掉在哪裡都不確定的話，我們是不能隨隨便便就出動的哦。"
1600806-16 = "就算是我們生活安全局，人力也是有限的。"
1600806-17 = "騙人！就連我都知道生活安全局的學生都無所事事，整天都只會睡覺！"
1600806-18 = "明明是這樣卻跟我說沒有時間找我的髮夾……好過分！"
1600806-19 = "嘛，睡覺這一點我不否認。不過作為緊急出動的準備，是不能長時間離開事務所的。"
1600806-20 = "……總之，如果有類似的遺失物送來的話，我會連絡妳的。可以留下妳的聯絡方式嗎？"
1600806-21 = "……警察姐姐大笨蛋！"
1600806-27 = "……啊啊，又被罵了。"
1600806-28 = "……呃，老師？你，你從什麼時候開始看的……？"
1600806-29 = "[s] 「抱歉，從挺前面的時候。」"
1600806-30 = "這樣啊，感覺好像被你看到羞恥的場面了呢……"
1600806-31 = "算了，別在意。那種事經常發生的。"
1600806-32 = "像是幫忙找東西、開鎖、找寵物之類的……全都處裡的話就沒完沒了了。"
1600806-33 = "[s] 「不能幫她找髮夾嗎？」"
1600806-34 = "……如果能確定掉在哪個區域的話是沒問題啦，不過那孩子的上學路線還挺長的。"
1600806-35 = "要把路線上的每個角落都找過一遍的話，我想就算花一整天也不夠吧。"
1600806-36 = "這種委託哪怕只是接受一次，知道這件事的其他人可能就會來說「為什麼不幫我」。如果因為這種事變得忙碌，反而無法應對重要事情的話就本末倒置了。所以基本上只能拒絕。"
1600806-37 = "[s1] 「確實可能會變成這樣呢……」\n[s2] 「吹雪真冷靜呢。」"
1600806-38 = "……啊──。"
1600806-39 = "當然囉，再怎麼說我也是專業的警察。不能被小小的情緒給左右嘛。"
1600806-40 = "……啊──。"
1600806-41 = "話說回來，老師，剛好甜甜圈吃光了。"
1600806-42 = "雖然有點不好意思，不過在我去買甜甜圈的這段時間可以請你幫我顧一下嗎？我會在交班之前回來的，拜託了。"
1600806-43 = "[s] 「我是很樂意啦，不過緊急出動的準備怎麼辦呢？」"
1600806-44 = "那，那個就交給桐乃或者其他人……"
1600806-45 = "而且和生活安全局的工作比起來，甜甜圈比較重要！"
1600806-46 = "總之我會儘快回來的。那就交給你了。"
1600806-55 = "（然而，吹雪在過了交班時間後也沒有回來……）"
1600806-56 = "[ns] 去找吹雪"
1600806-59 = "D.U.中央區．公立小學附近"
1600806-62 = "（在上學路上的茂密樹叢中發現了正在找東西的吹雪）"
1600806-67 = "……呿，是開瓶器啊。"
1600806-69 = "這個也不是……"
1600806-70 = "[s] 「吹雪。」"
1600806-71 = "嗯……咦，老師！？為，為什麼會來這裡……！？"
1600806-72 = "咦，時間？"
1600806-73 = "啊……抱歉抱歉，今天排隊排得特別長。"
1600806-74 = "這個是那個……在回去的路上把甜甜圈搞丟了。"
1600806-75 = "果然圓的東西就是很會滾呢，我想應該是滾到這附近了……"
1600806-76 = "[s] 「……那我幫你吧？」"
1600806-77 = "呃，老師不幫我也沒關係的，你看嘛，那個……"
1600806-79 = "……呵呵，果然沒有騙過老師啊。"
1600806-80 = "……原則上是不行的唷。不過看到那種表情，要說內心毫無波瀾是騙人的。"
1600806-81 = "雖，雖然不能每次都幫忙……不過在那種心情下吃甜甜圈也不會覺得好吃的。"
1600806-82 = "所以這是為了吃到好吃的甜甜圈而在摸魚。就是這樣而已。"
1600806-83 = "[s] 「嗯，所以我會幫忙的哦。」"
1600806-84 = "……"
1600806-85 = "[s] 「因為我也想吃好吃的甜甜圈呀。」"
1600806-89 = "……那就沒辦法了。雖然很麻煩，不過也不能顧此失彼嘛。"
1600806-90 = "那麼老師就負責那邊吧。這邊就交給我。"
1600806-93 = "（幾分鐘後……）"
1600806-98 = "找到了，是髮夾！"
1600806-99 = "太好了……謝謝老師。"
1600806-100 = "那麼，就當作是「碰巧有人撿到」吧。"
1600806-101 = "[s] 「我覺得跟她說是幫她找到的也可以哦。」"
1600806-102 = "因為很麻煩嘛……"
1600806-103 = "如果被她發現的話，肯定又會帶來麻煩的案件的。絕對不想變成這樣。"
1600806-104 = "我只不過是想吃到好吃的甜甜圈而已。"
1600806-105 = "[s] 「這樣啊。那要不要現在去買甜甜圈呀？」"
1600806-106 = "好呀。啊，難道老師要請客嗎？"
1600806-107 = "[s3] 「當然囉。」\n[s4] 「因為吹雪很努力嘛。」"
1600806-108 = "那我要「MasterDonut」的[ruby=Glazed Donut]糖霜甜甜圈[/ruby]！"
1600806-109 = "那我要「MasterDonut」的[ruby=Glazed Donut]糖霜甜甜圈[/ruby]！"
1600806-110 = "雖然平時吃起來也很美味，不過今天既解決了一件麻煩事又是老師請客……哎呀，一定很好吃！"
1600806-112 = "（把髮夾還給失主後和吹雪一起享用了美味的甜甜圈）"

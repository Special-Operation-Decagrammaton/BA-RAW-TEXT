[translation]
1601806-1 = "The Captain's Hands"
1601806-2 = "Sensei, do you not get tired of running like that all the time?"
1601806-3 = "What if you fall and get hurt? Your skin is so sensitive, after all."
1601806-4 = "[s] \"I can't make my precious student wait!\""
1601806-5 = "(P-Precious student...)"
1601806-6 = "It's not a big deal."
1601806-7 = "The weather's nice. How about we go for a walk?"
1601806-9 = "So, she walked up to me, chest puffed out, and said..."
1601806-10 = "\"Captain! You'll have to go through me first!\""
1601806-11 = "...So I did! You should have seen it!"
1601806-13 = "But this other time, my helmet split. It was a good thing I was wearing it, obviously!"
1601806-14 = "And, even though we barely have a spare yen between us, they saved up. They took it in for repairs!"
1601806-15 = "So, yeah! I care about my crew. Obviously. They're not all bad."
1601806-17 = "...And she came back, bruises all up her arms, cut lip..."
1601806-18 = "So I said, \"Where are they?! I'll teach them to—\""
1601806-19 = "Huh? What's that?"
1601806-20 = "[s] \"Looks like ducks.\""
1601806-21 = "They're so small. I usually can't tell the difference between them and geese."
1601806-22 = "But this girl has some swagger, huh?"
1601806-23 = "And...six little babies following her. Aw."
1601806-24 = "[s1] \"But aren't those ducklings...\"\n[s2] \"...Headed straight for the sewer grate?\""
1601806-27 = "They are!"
1601806-28 = "Ah! The little ducklings fell!"
1601806-29 = "Lady! Be careful! You should have known that your babies are too small! You gotta watch out!"
1601806-30 = "*sigh* I guess there's no helping it."
1601806-31 = "Sensei, hold the grate up!"
1601806-40 = "― [log=라브]One, two, three, four, five, six. Perfect! [/log][wa:6000] "
1601806-42 = "― [log=라브]Rescued all six of them![/log]"
1601806-45 = "― [log=라브]You should listen to your mommy, [/log][wa:10] "
1601806-47 = "― [log=라브]okay? [/log][wa:10] "
1601806-50 = "― [log=라브]Momma Duck also seems to be doing fine now,[/log][wa:690] "
1601806-52 = "― [log=라브]so that's another problem solved![/log][wa:910] "
1601806-55 = "[ns] \"You're not a typical student, Rabu.\""
1601806-56 = "― [log=라브]Wh-Wh-Wh-What are you talking about?![/log][wa:1070] "
1601806-58 = "― [log=라브]Sensei, isn't that a bit rude? [/log][wa:440] "
1601806-61 = "― [log=라브]Huh?...Ah?! That's...[/log][wa:4600] "
1601806-64 = "[ns] \"I meant that the way you lead the Helmet Gang is also similar.\""
1601806-65 = "― [log=라브]Ah, ah! So that's what you meant! [/log][wa:1720] "
1601806-68 = "― [log=라브]Of course, a leader should [/log][wa:620] "
1601806-70 = "― [log=라브]have a compassionate side too! [/log][wa:10] "
1601806-73 = "― [log=라브](Is Sensei doing this on purpose?)[/log][wa:1930] "
1601806-75 = "― [log=라브](Maybe they're just clumsy?)[/log]"
1601806-78 = "― [log=라브](Even if they are, it pisses me off.)[/log]"
1601806-80 = "― [log=라브](But it's worse if it's intentional!) [/log][wa:10] "
1601806-83 = "― [log=라브](...There's no way that was on purpose... Right...?) [/log][wa:2940] "
1601806-87 = "Okay, let's stay on the grass from now on!"
1601806-88 = "And watch where you're going next time!"
1601806-89 = "Okay then, what were we talking about again?"
1601806-90 = "Did I already tell you how we took on 100 thugs with just the 3 of us?"
1601806-91 = "[s] \"By the way, are you okay with wearing that helmet?\""
1601806-95 = "[ns3] \"You realize that you put baby ducklings in there...\"\n[ns4] \"From the...sewer?\""
1601806-98 = "!"
1601806-99 = "You're the worst, Sensei! I hate you!"
1601806-104 = "Rabu quickly removed her helmet and fled into the park."

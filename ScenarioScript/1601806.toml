[translation]
1601806-1 = "สัมผัสของหัวหน้า"
1601806-2 = "วิ่งมาแบบนี้ทุกครั้งไม่เหนื่อยเหรอครู?"
1601806-3 = "ถ้าหกล้มบาดเจ็บจะทำยังไง"
1601806-4 = "[s] \"จะปล่อยให้นักเรียนคนสำคัญของครูรอได้ยังไงล่ะ!\""
1601806-5 = "(นะ... นักเรียนคนสำคัญของครูเรอะ...)"
1601806-6 = "มะ... มันก็ไม่มีอะไรมากหรอก"
1601806-7 = "วันนี้อากาศดี ฉันก็เลยคิดว่าจะไปเดินเล่นรอบๆ นี้สักหน่อย"
1601806-9 = "แต่จู่ๆ เจ้านั่นก็มายืนตรงหน้าฉัน"
1601806-10 = "แล้วพูดว่า 'หัวหน้า! ถ้าจะไปก็ผ่านฉันไปให้ได้ก่อน!' น่ะ"
1601806-11 = "ฮึก น่าเสียดายจัง อยากให้ครูได้เห็นเองจริงๆ นะ!"
1601806-13 = "แล้วก็มีครั้งหนึ่งที่หมวกกันน็อกของฉันพัง"
1601806-14 = "เจ้าพวกนั้นไม่ค่อยมีเงินกันแท้ๆ แต่ก็รวบรวมเงินที่มีไปซ่อมหมวกกันน็อกให้ฉันละ!"
1601806-15 = "บางครั้งเจ้าพวกนั้นก็มีมุมแบบนี้อยู่เหมือนกัน!"
1601806-17 = "ตอนที่พวกนั้นโดนทำร้ายมาหนักมาก"
1601806-18 = "ฉันก็เลยพูดว่า 'พวกนั้นอยู่ที่ไหน!! ฉันจะไปจัดการให้ราบคาบ-'"
1601806-19 = "โอ๊ะ? นั่นอะไรน่ะ?"
1601806-20 = "[s] \"เหมือนจะเป็นเป็ดนะ?\""
1601806-21 = "โอ้ เป็ดนี่เอง ฉันก็แค่สงสัยเพราะแยกระหว่างเป็ดกับห่านไม่ค่อยออกน่ะ"
1601806-22 = "ว่าแต่ว่าเจ้าพวกนั้นน่ารักดีนะ"
1601806-23 = "แถมยังมีลูกๆ อีกหกตัวด้วย"
1601806-24 = "[s1] \"แต่ว่าพวกเป็ด...\"\n[s2] \"พวกมันกำลังจะเดินข้ามตะแกรงท่อน้ำแฮะ\""
1601806-27 = "งั้นเหรอ?"
1601806-28 = "อ๊ะ!! มีลูกเป็ดตกลงไปในท่อแล้ว!"
1601806-29 = "พวกลูกเป็ดยังตัวเล็กอยู่ก็ควรจะระวังๆ หน่อยสิ! โธ่เอ๊ย!"
1601806-30 = "เฮ้อ ช่วยไม่ได้นะ"
1601806-31 = "ครู ช่วยยกตะแกรงขึ้นให้หน่อยได้มั้ย"
1601806-40 = "― [log=라브]หนึ่ง สอง สาม สี่  ห้า หก ดีละ![/log][wa:6480] "
1601806-42 = "― [log=라브]หาเจอครบหกตัวแล้ว![/log]"
1601806-45 = "― [log=라브]ต้องเชื่อฟังแม่กันสิ [/log][wa:10] "
1601806-47 = "― [log=라브]เข้าใจมั้ย? [/log][wa:10] "
1601806-50 = "― [log=라브]แม่เป็ดก็เหมือนจะไม่เป็นไรแล้ว[/log][wa:1210] "
1601806-52 = "― [log=라브]งั้นก็ถือว่าคลี่คลายแล้วเนอะ[/log][wa:1110] "
1601806-55 = "[ns] \"ราบุเนี่ยไม่เหมือนนักเรียนทั่วไปเลยนะ\""
1601806-56 = "― [log=라브]อะ...อะไรๆๆๆ พูดอะไรเนี่ย!!![/log][wa:1430] "
1601806-58 = "― [log=라브]ครู แบบนั้นมันเสียมารยาทนะ? [/log][wa:560] "
1601806-61 = "― [log=라브]หืม? อ๊ะ...! คะ...คือว่า...[/log][wa:4360] "
1601806-64 = "[ns] \"ใช้วิธีเหมือนกับวิธีที่นำกลุ่มแก๊งหมวกกันน็อกเลย\""
1601806-65 = "― [log=라브]อ่า อ๊ะ! หมายความว่าอย่างนั้นละ![/log][wa:1800] "
1601806-68 = "― [log=라브]คนเป็นหัวหน้าก็ต้อง[/log][wa:940] "
1601806-70 = "― [log=라브]มีมุมที่ใจกว้างแบบนั้นละ! [/log][wa:10] "
1601806-73 = "― [log=라브](ครูนี่ละก็ พลั้งปากไป)[/log][wa:2370] "
1601806-75 = "― [log=라브](หรือว่าตั้งใจกันแน่...?)[/log]"
1601806-78 = "― [log=라브](ไม่ว่าจะแบบไหนก็น่าโมโห!)[/log]"
1601806-80 = "― [log=라브](ถ้าจงใจจะยิ่งโมโหกว่าเดิมอีก!) [/log][wa:10] "
1601806-83 = "― [log=라브](คงไม่ได้ตั้งใจจริงๆ... หรอกเนอะ...?) [/log][wa:3540] "
1601806-87 = "ฮึบ ถ้ามาปล่อยตรงพื้นหญ้าแบบนี้ก็คงใช้ได้แล้วเนอะ"
1601806-88 = "เดินระวังๆ กันด้วยล่ะ!"
1601806-89 = "เอาละ เมื่อกี้เราคุยกันถึงไหนแล้วนะ?"
1601806-90 = "ฉันเล่าเรื่องที่เด็กๆ ของเราไปสู้กับพวกนักเลงแบบ 3 ต่อ 100 รึยัง?"
1601806-91 = "[s] \"ว่าแต่ว่าใส่หมวกกันน็อกไว้แบบนั้นได้แน่นะ?\""
1601806-95 = "[ns3] \"พวกเป็ดเมื่อกี้น่ะมันตกท่อมานะ...\"\n[ns4] \"พวกลูกเป็ดมันตกท่อมา... ไม่ใช่เหรอ?\""
1601806-98 = "!!!"
1601806-99 = "เกลียดครูชะมัดเลย!!"
1601806-104 = "(หลังจากนั้นราบุก็ถอดหมวกกันน็อกออกแล้ววิ่งหนีไป...)"

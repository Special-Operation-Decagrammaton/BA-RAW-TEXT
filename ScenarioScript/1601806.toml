[translation]
1601806-1 = "隊長的溫柔"
1601806-2 = "老師，你每次都跑過來不累嗎？"
1601806-3 = "要是摔倒的話怎麼辦啊。"
1601806-4 = "[s]「怎麼能讓重要的學生等我呢！」"
1601806-5 = "（重，重要的學生……）"
1601806-6 = "其，其實也沒什麼特別的事啦。"
1601806-7 = "只是覺得天氣不錯，想一起在附近散散步而已。"
1601806-9 = "然後啊，那傢伙就直挺挺地站在我面前跟我這麼說。"
1601806-10 = "「隊長！要走就打倒我再走吧！」這樣！"
1601806-11 = "真可惜，要是老師有親眼見到那一幕就好了！"
1601806-13 = "還有一次，在我的頭盔壞掉的時候……"
1601806-14 = "那些傢伙明明都很窮，結果居然一起湊錢幫我修好了！"
1601806-15 = "他們偶爾也有貼心的一面嘛！"
1601806-17 = "那個時候還被揍得鼻青臉腫地回來。"
1601806-18 = "然後我就說「那些傢伙在哪！！我要把他們全部揍扁！」──"
1601806-19 = "嗯？那是什麼？"
1601806-20 = "[s]「好像是鴨子？」"
1601806-21 = "哦哦，原來是鴨子啊。#n我一直都不太會分辨鴨和鵝，所以才覺得好奇。"
1601806-22 = "不過那小傢伙還挺有氣勢的嘛。"
1601806-23 = "後面還跟著六隻小鴨呢。"
1601806-24 = "[s1]「不過那些鴨子……」\n[s2]「好像正在往下水道的水溝上走？」"
1601806-27 = "真的耶？"
1601806-28 = "啊！！有小鴨掉下去了！"
1601806-29 = "真是的！小鴨還這麼小就該多注意一點啊！"
1601806-30 = "唉，沒辦法了。"
1601806-31 = "老師，幫我把那個水溝蓋抬起來吧。"
1601806-40 = "― [log=라브]一、二、三、四、五、六。很好！[/log][wa:7120] "
1601806-42 = "― [log=라브]六隻全都到齊了呢！[/log]"
1601806-45 = "― [log=라브]要乖乖聽媽媽的話哦，[/log]"
1601806-47 = "― [log=라브]你們。[/log]"
1601806-50 = "― [log=라브]母鴨看起來也沒問題了呢。[/log][wa:1930] "
1601806-52 = "― [log=라브]這樣就圓滿落幕了！[/log][wa:1870] "
1601806-55 = "[ns]「良舞看起來不太像一般的學生呢。」"
1601806-56 = "― [log=라브]你，你你你……你在說什麼啊！！[/log][wa:1950] "
1601806-58 = "― [log=라브]老師，那句話不會有點失禮嗎？[/log][wa:1120] "
1601806-61 = "― [log=라브]咦？……啊！？那個……[/log][wa:5000] "
1601806-64 = "[ns]「你帶領著頭盔團的模樣，看起來很成熟。」"
1601806-65 = "― [log=라브]啊，啊啊！原，原來是那個意思啊！？[/log][wa:2400] "
1601806-68 = "― [log=라브]當，當然！我可是隊長呢！ [/log][wa:1180] "
1601806-70 = "― [log=라브]這種程度做不到怎麼行呢！[/log]"
1601806-73 = "― [log=라브]（老師也真是的，真的只是說錯話嗎？）[/log][wa:2570] "
1601806-75 = "― [log=라브]（還是是故意的……？）[/log]"
1601806-78 = "― [log=라브]（不管哪種都讓人火大！）[/log]"
1601806-80 = "― [log=라브]（如果是故意的就更氣了！！）[/log]"
1601806-83 = "― [log=라브]（該不會，真的是故意那麼說的吧……？）[/log][wa:4300] "
1601806-87 = "嘿咻，這片草地應該沒問題吧。"
1601806-88 = "走路的時候要注意腳下哦！"
1601806-89 = "話說……我剛才講到哪裡了？"
1601806-90 = "是我們跟太妹3打100的那場戰鬥嗎？"
1601806-91 = "[s]「那頂頭盔……直接戴上去真的沒問題嗎？」"
1601806-95 = "[ns3]「剛才小鴨們掉下去的地方……」\n[ns4]「……不是下水道嗎？」"
1601806-98 = "！！！"
1601806-99 = "老師最討厭了！！"
1601806-104 = "（之後良舞迅速脫下頭盔，飛也似地跑向了遠方……）"

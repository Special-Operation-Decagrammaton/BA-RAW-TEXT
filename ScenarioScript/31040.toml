[translation]
31040-1 = "第4話;補習授業部の生徒たち（１）"
31040-3 = "え、えっと、そのですね……。"
31040-4 = "こうなったやむを得ない事情、というのは……。"
31040-5 = "ペロロ様のゲリラ公演に参加するために、テストをサボってしまって……それで……。"
31040-6 = "[s] \"……。\""
31040-7 = "うぅ……。"
31040-8 = "そ、そんな冷たい目で見ないでくださいぃ……！ちゃんと試験の日程は確認していたはずなんですっ。何かの間違いと言いますか、手違いと言いますか……。"
31040-9 = "……。"
31040-10 = "あうぅ……ご、ごめんなさい……。"
31040-11 = "[s] \"いや、私に謝らなくても大丈夫だけど……。\""
31040-12 = "は、はい。えっと、それで……。"
31040-13 = "その……ナギサ様に、先生のサポートを頼まれまして……。"
31040-15 = "……というわけで、ヒフミさん。先生をお手伝いすると共に、補習授業部を導いてくださいませんか？"
31040-16 = "はい！？わ、私がですか！？"
31040-17 = "はい。そもそも、ヒフミさんのような優等生でないと出来ないことですし。"
31040-18 = "わ、私はそんな、優等生というほどでもありませんし……そもそも成績も平均くらいで……今は落第の危機なのに……。"
31040-19 = "ふふ。私はヒフミさんの「愛」を高く評価してますから。それに、今度はヒフミさんから私に「愛」をお返ししていただく番……ですよね？"
31040-20 = "あ、あうぅ……。"
31040-21 = "ふふっ。そういうことですので、よろしくお願いしますね。補習授業部の部長さん。"
31040-24 = "[ns] \"部長だったんだ……！？\""
31040-25 = "あ、あくまでも臨時の、ですが……補習授業部は、特殊な形で限定的に作られた部活ですし……。"
31040-26 = "ぜ、全員が落第を免れたら、自然に部は無くなるはずです。"
31040-27 = "な、なので、えっと……その時まで、よろしくお願いします。先生。"
31040-28 = "[s] \"うん。よろしくね、ヒフミ。\""
31040-29 = "こんな状況ではありますが……担当の方が先生で良かったです。"
31040-30 = "あ、補習授業部の他のメンバーには、まだ会われてないんですよね？"
31040-31 = "名簿を確認したところ、メンバーは私を含めて四人みたいです。"
31040-32 = "とりあえず会いに行きましょうか、先生。まずはみんなで、どうすれば落第せずに済むかの計画を立てないと……。"
31040-35 = "[ns] ヒフミについていく。"
31040-38 = "正義実現委員会・教室"
31040-39 = "[ns] \"ここは……。\""
31040-40 = "あ、あぅ……あんまり来たくはなかったのですが……。"
31040-41 = "えっと、失礼します……どなたかいらっしゃいますか？"
31040-45 = "……。"
31040-46 = "あっ、こ、こんにちは。"
31040-47 = "……。"
31040-48 = "え、えっと……。"
31040-49 = "……何？"
31040-50 = "あ、あう……そ、その……。"
31040-51 = "……。"
31040-52 = "あうぅ……わ、私、何かしてしまったんでしょうか……。"
31040-53 = "[s] \"ただちょっと、人見知りなんだと思うよ。\""
31040-54 = "……だ、誰が人見知りよ！？"
31040-55 = "た、ただ単純に知らない相手だったから、警戒してるだけなんだけど！？"
31040-56 = "[s] \"多分、それを「人見知り」って言うんじゃないかな……？\""
31040-57 = "うっ……。"
31040-58 = "……そ、それで、正義実現委員会に何の用？"
31040-59 = "え、えっと……探してる方がいまして……。"
31040-60 = "はぁ！？正義実現委員会に人探しを依頼しようってこと？"
31040-61 = "私たちのこと、ボランティア団体か何かだと勘違いしてるわけ？そんなに暇じゃないんだけど？"
31040-62 = "いえ、えっと、ここに閉じ込められてるって聞いて……。"
31040-63 = "……はぁ？"
31040-64 = "ですから、えっと、その、良くないことをした方がここに……。"
31040-65 = "え、それってもしかして……？"
31040-70 = "こんにちは。もしかして、私のことをお探しでしたか？"
31040-71 = "！？！？"
31040-72 = "！？"
31040-73 = "[s] \"！？\""
31040-74 = "え、は、何で！？あ、あんたどうやって牢屋から出てきたの！？ちゃんとカギ閉めたのに！？"
31040-76 = "いえ、開いてましたよ？私のことを話されているような声が聞こえたので、こちらに来てみました。何かご用でしたか？"
31040-77 = "あら。大人の方、ということは……先生、ですね。あらためまして、こんにちは。なるほど、もしかして補習授業部の？"
31040-78 = "ま、待って！！その格好で出歩かないでよ！？ちょっとぉ！！"
31040-83 = "浦"
31040-85 = "和"
31040-89 = "ハ"
31040-91 = "ナ"
31040-93 = "コ"
31040-95 = "補習授業部の2年生、[ruby=うらわ]浦和[/ruby]ハナコ。"
31040-96 = "水着姿で学校を徘徊し、その現場を正義実現委員会に捕らえられる。"
31040-97 = "現在、正義実現委員会の元で監禁中（だったはず）。"
31040-101 = "……？何か問題でもありましたか、[ruby=しもえ]下江[/ruby]さん？"
31040-102 = "あるに決まってるでしょ！？何で学校の中を水着で徘徊するの！？"
31040-103 = "ですが、学校の敷地内であるプールでは、皆さん普通に水着になられますよね？ここもあくまで学校の敷地内で……あ、もしかして下江さんは、プールでは水着を着ないタイプですか？"
31040-104 = "え、は？それってどういう……"
31040-105 = "そうでしたか、下江さんは全裸で泳ぐのがお好きなんですね。流石は正義実現委員会、そういった分野まで網羅されているなんて。"
31040-106 = "ばっ、バカじゃないの！？着るに決まってるでしょ！？そ、そんなことするわけ……！"
31040-107 = "それにしても裸こそが正義、とは……かなり前衛的ですね。あまり考えたことはありませんでしたが、なるほど。試してみるのもまた一興……"
31040-108 = "と、とにかく早く戻って、早く！もうすぐ先輩たちが来ちゃうから！"
31040-109 = "あら、でもこの方々は私に会いに――"
31040-110 = "うるさいうるさいっ、この公共破廉恥罪！！早く戻れ！！"
31040-111 = "すみません、どうやら色々と混乱している状況のようですので、また後ほどお会いしましょうね？"
31040-116 = "……。"
31040-117 = "[s] \"……。\""
31040-120 = "はあ、はあ……。"
31040-121 = "え、えっと……。"
31040-122 = "この状況は一体……ハナコさんは、この後どうなるんですか？"
31040-123 = "そんなの当然死刑よ！エッチなのはダメ！死罪！"
31040-124 = "そ、そんなはずはないと思いますが……。"
31040-125 = "水着で学校を歩き回ったんだよ！？真っ昼間から！生徒がたくさんいる、広場のど真ん中で！！"
31040-126 = "……。"
31040-127 = "ですが、校内では校則で決められた服を着るものですよね？ですからきちんと学校指定の水着を……。"
31040-128 = "どうしてそこで水着なの！？制服を着ればいいでしょ！？っていうか話に入ってくるな！"
31040-129 = "あうぅ、と、取り合えず……。"
31040-130 = "い、今はちょっとハナコさんとお会いするのは難しそうなので……。"
31040-131 = "一旦、次のメンバーに会いに行きましょうか……。"
31040-132 = "えっと……。"
31040-133 = "もう一人は……[ruby=しらす]白洲[/ruby]アズサさん。"
31040-136 = "ただいま戻りました。"
31040-137 = "任務完了です！現行犯で白洲アズサさんを確保しました！"
31040-139 = "はい……はいぃっ！？"
31040-140 = "あっ、ハスミ先輩、マシロ。"
31040-141 = "コハルさん、お疲れ様です。あれ……？"
31040-142 = "[USERNAME]先生？"
31040-147 = "（シューッ、シューッ……）"
31040-148 = "……。"
31040-149 = "[s] \"……。\""
31040-150 = "……惜しかった。弾丸さえ足りてれば、もう少し道連れにできたのに。"
31040-151 = "もういい、好きにして。ただ、拷問に耐える訓練は受けてるから、私の口を割るのはそう簡単じゃないよ。"
31040-152 = "（シューッ、シューッ……）"
31040-157 = "白"
31040-159 = "洲"
31040-163 = "ア"
31040-165 = "ズ"
31040-167 = "サ"
31040-169 = "補習授業部の2年生、[ruby=しらす]白洲[/ruby]アズサ。"
31040-170 = "校内での暴力行為の疑いで正義実現委員会から追われていたところ、教材用催涙弾の弾薬倉庫を占拠。"
31040-171 = "約1トンの催涙弾を爆破させ、3時間にわたる抵抗の末に逮捕。"
31040-172 = "逮捕の寸前まで、各種ブービートラッ[ruby=即席爆発装置]プやIEDを用[/ruby]いて激しく抵抗。被害多数。"
31040-174 = "次回;補習授業部の生徒たち（２）"

31040-60 = "ว่าไงนะ?! คิดว่าที่นี่เป็นที่ที่เอาไว้ให้ตามหาคนหายรึไง?"
31040-61 = "ท่าทางจะเข้าใจผิดว่าเราคือชมรมจิตอาสานะ แต่พวกเราไม่ทำอะไรแบบนั้นหรอก"
31040-62 = "มะ... ไม่ใช่นะ... คนที่ฉันตามหาอยู่เขาบอกว่าติดอยู่ที่นี่น่ะ..."

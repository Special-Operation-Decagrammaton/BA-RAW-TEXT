[translation]
31040-1 = "Episode 4;Failing Students Part 1"
31040-3 = "So, th-the thing is..."
31040-4 = "...it's not my fault."
31040-5 = "There was a surprise Peroro show, and I had to skip my regular exam to attend. S-So that's why I'm failing now."
31040-6 = "[s] \"...\""
31040-7 = "..."
31040-8 = "D-Don't look at me like that! I was sure that I checked the exam date, but I must have made a mistake. Yeah..."
31040-9 = "..."
31040-10 = "I'm sorry..."
31040-11 = "[s] \"I'm not sure you have anything to apologize for.\""
31040-12 = "R-Right. So what happened was... "
31040-13 = "...Nagisa asked me to support you, Sensei."
31040-15 = "That's where the matter stands. Will you help Sensei lead the Make-Up Work Club, Hifumi?"
31040-16 = "What?! M-Me?!"
31040-17 = "Yes. This is a responsibility that only an honor student such as yourself can handle. "
31040-18 = "I-I'm not an honor student. My grades have always been average...and that was before I started failing."
31040-19 = "Haha. I've always found you to be rather compassionate. Besides, isn't it time you repaid your debt to me?"
31040-20 = "Well..."
31040-21 = "Haha. I take that to mean that you agree. I'm counting on you, my Make-Up Work Club president."
31040-24 = "[ns] \"You're the club president?!\""
31040-25 = "I-It's just a temporary title. The Make-Up Work Club is only a provisional club."
31040-26 = "We'll be disbanded once everyone raises their grades back up."
31040-27 = "B-But until then, I'll be working with you, Sensei."
31040-28 = "[s] \"Looking forward to it, Hifumi.\""
31040-29 = "I'm glad you're here. I don't know what I'd do otherwise..."
31040-30 = "Oh, have you met the other Make-Up Work Club members?"
31040-31 = "There should be three others. I checked the list to see who they are. "
31040-32 = "Let's go meet them, Sensei. We'll have our hands full with teaching and coming up with a plan to prevent them from failing."
31040-35 = "[ns] Follow Hifumi."
31040-38 = "Justice Task Force Club Room"
31040-39 = "[ns] \"Wait. Isn't this...?\""
31040-40 = "Oh, no. I never enjoy having to come here."
31040-41 = "Hello... Is anyone here? Hello?"
31040-45 = "..."
31040-46 = "H-Hello."
31040-47 = "... "
31040-48 = "E-Excuse me..."
31040-49 = "What?"
31040-50 = "W-Well, I'm, uh..."
31040-51 = "..."
31040-52 = "Are we being ignored...?"
31040-53 = "[s] \"Maybe she's shy.\""
31040-54 = "Wh-Who are you calling shy?!"
31040-55 = "I'm just wary of strangers!"
31040-56 = "[s] \"Yeah, they call that being shy.\""
31040-57 = "..."
31040-58 = "What brings you to the Justice Task Force? "
31040-59 = "U-Um... We're here to find someone. "
31040-60 = "What?! You think it's the Justice Task Force's job to find missing people?"
31040-61 = "This isn't the place for that. We don't do volunteer work."
31040-62 = "Th-That's not what we mean. We heard the person we're looking for is being detained here."
31040-63 = "They're locked up?"
31040-64 = "F-For...disorderly conduct. So, um..."
31040-65 = "Huh?"
31040-70 = "Are you here for me?"
31040-71 = "...?!"
31040-72 = "...?!"
31040-73 = "[s] \"...?!\""
31040-74 = "Wh-What the heck?! How did you get out of your cell?! I could have sworn I locked it tight!"
31040-76 = "You didn't mean to leave it open, then? I just walked right out when I thought I heard someone looking for me. Can I help you?"
31040-77 = "I didn't expect to see a teacher here. You must be the one in charge of the Make-Up Work Club, yes?"
31040-78 = "S-Stop making pleasantries and go get dressed! Who walks around in their swimsuit, you weirdo?!"

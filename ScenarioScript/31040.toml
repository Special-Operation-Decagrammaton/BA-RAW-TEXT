31040-74 = "อะ.. อะไรเนี่ย?! ออกจากห้องคุมมาได้ยังไง?! ฉันล็อกกุญแจไว้แล้วนี่นา?!"
31040-76 = "หืม? มันเปิดอยู่นะคะ? และฉันก็ออกมาเพราะคิดว่ามีคนเรียกหา ว่าแต่... มีเรื่องอะไรเหรอคะ...?"

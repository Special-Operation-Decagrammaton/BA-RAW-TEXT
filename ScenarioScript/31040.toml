31040-102 = "เฮ้อ ก็ตรงที่ใส่ชุดว่ายน้ำออกมาเดินในพื้นที่ของโรงเรียนไงล่ะ นี่เธอยังไม่รู้อีกเหรอ?!"
31040-103 = "หืม? แต่สระว่ายน้ำของโรงเรียนก็อยู่ในพื้นที่โรงเรียนนี่คะ? อย่าบอกนะว่าคุณชิโมเอะ...#nเป็นพวกไม่ใส่ชุดว่ายน้ำเวลาลงสระ?"
31040-104 = "ว่าไงนะ? พูดอะไรของเธอ..."
31040-105 = "อืม... คุณชิโมเอะเป็นพวกว่ายน้ำแบบล่อนจ้อนสินะคะ หรือว่าชมรมทวงความยุติธรรม#nจะทำเป็นตัวอย่างให้คนอื่นทำตาม..."
31040-106 = "พูดอะไรไร้สาระ!! มีพวกที่ทำแบบนั้นซะที่ไหน! อย่าพูดเหมือนมันเป็นรสนิยมที่มีอยู่จริงสิ!"
31040-107 = "หากว่าการเปลือยล่อนจ้อนคือจุดยืนใหม่ที่เรียกว่าความยุติธรรมล่ะคะ...? อืม...#nมันอาจจะฟังดูหยาบคายไปหน่อย แต่ลองเอาความคิดนี้ไปพิจารณาก็น่าจะดีนะ..."
31040-108 = "รีบๆ เข้าไปได้แล้ว! เข้าไปเลย! พวกรุ่นพี่จะมาแล้ว!"
31040-109 = "โอ๊ะ ทุกคนจะมาหาฉันเหรอ..."
31040-110 = "เงียบน่า!! หยุดพูดได้แล้ว! เข้าไปเลย! เข้าไป!"
31040-111 = "ก็ได้ค่ะ ตอนนี้น่าจะยังไม่สะดวก ไว้เจอกันใหม่นะคะทุกคน"

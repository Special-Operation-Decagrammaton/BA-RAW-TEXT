31040-95 = "Second-year from the Make-Up Work Club: Urawa Hanako. "
31040-96 = "Arrested for strolling around campus in her school swimsuit. "
31040-97 = "Currently in the custody of the Justice Task Force."
31040-101 = "Hmm? Is there a problem, Miss Shimoe?"
31040-102 = "Y-You can't wear a swimsuit on school grounds! That's common sense!"
31040-103 = "Hmm? But the school swimming pool is on school grounds as well... Do you prefer to swim without a swimsuit, Miss Shimoe?"
31040-104 = "Huh? What kind of...?"
31040-105 = "I never expected you to be the kind to skinny dip. Then again, I have heard that the Justice Task Force likes to lead by example."
31040-106 = "Don't be ridiculous! Who said anything about a matter of preference?!"
31040-107 = "Are you insisting that nudism is the only acceptable lifestyle? How avant-garde. Radical, certainly, but perhaps worth exploring..."
31040-108 = "Would you get back in your cell already?! My seniors will be here any minute!"
31040-109 = "Oh, my. Are they all coming to get a peep at me as well?"
31040-110 = "Shut up! Shut up! Just get in there!"
31040-111 = "Ta-ta, everyone. I'm a little preoccupied, so you'll have to see me some other time."

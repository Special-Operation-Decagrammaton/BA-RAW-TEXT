[translation]
31040-1 = "第4話;補課部的學生們（１）"
31040-3 = "這，這是……因為……"
31040-4 = "不得已的原因，其實是……"
31040-5 = "為了參加佩洛洛大人的臨時公演而忘了考試……所以才會……"
31040-6 = "[s]「……」"
31040-7 = "……"
31040-8 = "請，請不要用那種冰冷的眼神看著我……！#n明明有仔細確認過考試日期的……不知道是出了什麼差錯……"
31040-9 = "……"
31040-10 = "啊嗚……對不起…… "
31040-11 = "[s]「沒事，你不需要道歉……」"
31040-12 = "事情就是這樣……"
31040-13 = "還有……渚大人請我負責協助老師……"
31040-15 = "……就是這樣，日步美同學。#n可以請你一邊幫助老師，一邊領導補課部嗎？"
31040-16 = "什麼！？我，我嗎！？"
31040-17 = "是的。畢竟這是只有日步美同學這樣的優等生才做得到的事。"
31040-18 = "我，我應該不算是優等生才對……#n成績也只有平均水準……甚至現在還陷入留級危機……"
31040-19 = "呵呵。我對日步美同學的「愛」有很高的評價。#n而且現在是不是輪到日步美同學將「愛」還給我的時候了呢？"
31040-20 = "啊，啊嗚嗚……"
31040-21 = "呵呵，事情就是這樣。#n拜託你了唷，補課部部長。"
31040-24 = "[ns]「原來你是部長嗎……！？」"
31040-25 = "那，那個……終究只是暫時而已……#n畢竟補課部是以特殊形式成立的社團……"
31040-26 = "只要所有成員都能及格的話，社團自然也會消失才對……啊，啊嗚……"
31040-27 = "所，所以……在那之前還請多多指教，老師。"
31040-28 = "[s]「嗯。請多指教囉，日步美。」"
31040-29 = "不過負責人是老師真是太好了。#n如果是其他人的話，真不知道該怎麼辦才好……"
31040-30 = "啊，老師見過補課部的其他成員了嗎？"
31040-31 = "我剛才確認過名單……除了我之外應該還有三個人……"
31040-32 = "總之先去見見他們吧，老師。#n必須先和大家一起，建立該如何避免不及格的計劃才行……"
31040-35 = "[ns] 跟著日步美"
31040-38 = "實現正義部．教室"
31040-39 = "[ns]「這裡是……」"
31040-40 = "啊，啊嗚……雖然我不太想來這裡…… "
31040-41 = "那個，打擾了……請問有人在嗎？"
31040-45 = "……"
31040-46 = "啊，你好。"
31040-47 = "…… "
31040-48 = "那，那個……"
31040-49 = "……有什麼事？"
31040-50 = "啊，啊嗚……就是……"
31040-51 = "……"
31040-52 = "啊嗚嗚……我被無視了嗎……"
31040-53 = "[s]「看來是個怕生的孩子呢。」"
31040-54 = "……你，你說誰怕生啊！？"
31040-55 = "我只是單純對不認識的人保持警戒而已！"
31040-56 = "[s]「那不就是『怕生』嗎……」"
31040-57 = "……"
31040-58 = "所以來實現正義部有什麼事？"
31040-59 = "那，那個……我正在找人……"
31040-60 = "啊！？是要委託實現正義部找人？"
31040-61 = "你好像把我們誤會成志工團體了，我們才不負責那種事好嗎？"
31040-62 = "不，不是的……是我們要找的對象似乎被關在這裡……"
31040-63 = "……什麼意思？"
31040-64 = "怎，怎麼說呢……因為他做了違反風紀的事，所以……"
31040-65 = "咦……？"
31040-70 = "是來找我的嗎？"
31040-71 = "！？！？"
31040-72 = "！？"
31040-73 = "[s]「！？」"
31040-74 = "怎，怎，怎麼會！？你，你是怎麼從牢房出來的！？明明有好好上鎖才對啊！？"
31040-76 = "嗯？門是開著的唷？#n正巧聽到了似乎跟我有關的事，所以就出來看看情況……"
31040-77 = "哎呀，是大人呢。老師您好。#n這樣我就明白了，找我是因為補課部的事對吧？"
31040-78 = "等，等等！！不要穿成那樣走出來啦！？喂──！！"
31040-83 = "浦"
31040-85 = "和"
31040-89 = "花"
31040-91 = "子"
31040-95 = "補課部的2年級生，浦和花子。"
31040-96 = "穿著泳衣在學校徘徊，被實現正義部當場逮捕。"
31040-97 = "目前被監禁在實現正義部。"
31040-101 = "嗯？請問有什麼問題嗎，下江同學？"
31040-102 = "當然有！怎麼能穿著泳裝在校內徘徊呢！！"
31040-103 = "咦？可是學校泳池不也是校內嗎……難道下江同學是在泳池不穿泳裝的類型？"
31040-104 = "咦？你在說什麼……"
31040-105 = "啊啊，原來下江同學是裸泳派的呢。#n不愧是實現正義部，果然在許多方面都是眾人的榜樣。"
31040-106 = "你，你在胡說什麼！！哪有那種派別啊！！不要把你個人的喜好說成派別好不好！"
31040-107 = "不過裸體即是正義，這……還真是前衛呢。#n雖然有點激進，不過似乎值得考慮……"
31040-108 = "總，總之趕快回去，快點！前輩們就快來了！"
31040-109 = "哎呀，不過這兩位是為了找我才──"
31040-110 = "吵死了吵死了！！快點回去！！"
31040-111 = "不好意思，現在情況似乎有點混亂，我們稍後再見吧？"
31040-116 = "……"
31040-117 = "[s]「……」"
31040-120 = "哈啊，哈啊……"
31040-121 = "那，那個……"
31040-122 = "這個狀況究竟是……花子同學之後會怎麼樣呢？"
31040-123 = "那還用問嗎！！不可以色色！死刑！"
31040-124 = "我，我想應該不至於吧……"
31040-125 = "他可是穿著泳裝在學校走來走去耶！大白天的！在滿滿都是學生的廣場正中央！！"
31040-126 = "……"
31040-127 = "咦？可是在校內不就該穿著校規規定的服裝嗎？#n我明明有乖乖穿著學校指定的泳裝……"
31040-128 = "為什麼要穿泳裝啊！！穿制服不就好了！！"
31040-129 = "啊嗚……"
31040-130 = "現，現在要和花子同學見面似乎有點困難……"
31040-131 = "暫時先去見下一個成員吧……"
31040-132 = "嗯……"
31040-133 = "下一個成員是……白洲梓同學。"
31040-136 = "我回來了。 "
31040-137 = "已完成任務！順利逮捕現行犯白洲梓同學！"
31040-139 = "是……咦！？"
31040-140 = "啊，蓮實前輩，麻白。"
31040-141 = "小春同學，辛苦你了。#n咦……？"
31040-142 = "[USERNAME]老師？"
31040-147 = "（呼，呼……）"
31040-148 = "……"
31040-149 = "[s]「……」"
31040-150 = "（呼……）真可惜。要是彈藥足夠的話，應該至少能再拖三個人一起作伴的說。"
31040-151 = "（呼，呼……）算了，隨你們處置吧。#n不過我有接受過抵抗拷問的訓練，想從我口中問出情報可沒那麼簡單。"
31040-152 = "（呼，呼……）"
31040-157 = "白"
31040-159 = "洲"
31040-163 = "梓"
31040-169 = "補課部的2年級生，白洲梓。"
31040-170 = "在因涉嫌引發校園暴力行為而受實現正義部追捕的過程中，#n佔據了教材用催淚彈的彈藥庫。"
31040-171 = "引爆約1噸的催淚彈，歷經3個小時的抵抗後遭到逮捕。"
31040-172 = "直到被逮捕前，仍在使用各種陷[ruby=簡易爆炸裝置]阱和IED進行[/ruby]強烈反抗。"
31040-174 = "下一話;補課部的學生們（２）"

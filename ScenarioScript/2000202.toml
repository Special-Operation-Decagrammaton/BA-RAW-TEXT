[translation]
2000202-1 = "歡迎來到沙耶的研究室！"
2000202-2 = "沙耶的研究室前．走廊"
2000202-4 = "[ns]（敲門）"
2000202-6 = "唔唔唔唔，忍無可忍了！"
2000202-8 = "就算是沙耶前輩，我也沒辦法再忍耐下去了！#n我們並不是前輩的白老鼠唷！"
2000202-9 = "沒錯！已經不會，再參與前輩的實驗了！"
2000202-10 = "大，大家冷靜點。這次一定會成功才對！"
2000202-11 = "像那樣又做一樣的事！上次不是也那麼說了嗎！"
2000202-12 = "說了可以對所有毒產生耐性的靈藥，塗了之後皮膚變得像毒蛙一樣……！"
2000202-13 = "說了可以變得以空手擋下刀劍金鋼不壞的靈藥，塗了之後皮膚變得像石頭一樣開始龜裂……！"
2000202-14 = "但是，以結果來說全部的毒和刀劍都能擋下不是事實嗎？"
2000202-15 = "就算如此，我拒絕再變成奇怪的樣子了！"
2000202-16 = "沒錯，再也不要依靠沙耶前輩的藥了！"
2000202-17 = "等，等等！這次一定將真正的不老不死的藥──"
2000202-19 = "唔……走掉了。"
2000202-21 = "啊，老師。你來了啊！我在等你！"
2000202-22 = "[s]（逃跑）"
2000202-23 = "……等等，丟下我打算逃去哪裡啊！"
2000202-24 = "部員們說的靈藥？#n哈哈哈！不用擔心！這次開發的靈藥，和上次的東西不一樣，應該有確實的效果。"
2000202-25 = "這次要讓老師也一起，幫忙那個實驗！"
2000202-26 = "[s]（逃跑）"
2000202-27 = "就說了，不要跑！"
2000202-28 = "不能拜託其他學生嗎？#n不行，這次的研究需要老師！"
2000202-29 = "為了驗證「返老的效果」，讓年輕的學生嘗試也很難看出結果，必須是能容易比較效果的「大人」才行！"
2000202-30 = "來，來，老師。不會痛的……#n趕快來實驗吧！"
2000202-32 = "沙耶的研究室"
2000202-34 = "歡迎來到我的研究室，老師。"
2000202-35 = "啊，那裡的標本不要用手碰哦。還活著。"
2000202-36 = "[s]（詢問在這裡做什麼研究）"
2000202-37 = "剛才也說了吧？我在這裡，做為了製作不老不死的靈藥的研究。"
2000202-38 = "當然在那個過程，也會開發其他的秘藥……#n鍊丹術研究會究極的目的是，製作不老不死的靈藥。哈—哈—哈！"
2000202-39 = "[s]（詢問製作長生不老的靈藥，要做什麼）"
2000202-40 = "嗯？那當然是。#n不會變老，永遠作為女高中生活著，無限的做著研究……"
2000202-41 = "[s]「然後呢？」"
2000202-42 = "然後，被人們尊敬，享受被讚頌，然後……"
2000202-43 = "[s]「……然後？」"
2000202-44 = "那──個，然後……#n吵，吵死了！老師只要閉上嘴遵從我的研究就好了！"
2000202-47 = "（沙耶遞出了可疑的燒瓶）"
2000202-48 = "來，這就是這次新開發的不老不死的靈藥。有沒有看一眼就覺得很靈驗？"
2000202-49 = "[s1]「……」\n[s2]「……這真的就是，不老不死的靈藥？」"
2000202-50 = "嗯？在懷疑我嗎？偉大的我，是絕對不會說謊的！"
2000202-51 = "嗯？在懷疑我嗎？偉大的我，是絕對不會說謊的！"
2000202-52 = "就這樣一口氣喝下去的話，老師也能回到青澀年輕的時期了！"
2000202-53 = "[s]（不得已的把藥喝下）"
2000202-57 = "如何，有效果嗎？變得非常年輕的感覺，有嗎？"
2000202-58 = "[s]「手……」"
2000202-59 = "……手？"
2000202-60 = "[s]「手閃耀著金色光芒！」"
2000202-61 = "哈──哈──哈！真不愧是我。#n有把鍊金術應用在鍊丹術的價值。這次也成功了！"
2000202-62 = "為什麼要用那麼可疑的眼光看我？#n全身變成黃金的話就永遠不會變老也不會腐爛，以結果來說和得到了不老不死的身體一樣嘛。"
2000202-63 = "果然我是天才啊！哈──哈──哈！"
2000202-64 = "[s]（要求把身體變回原樣）"
2000202-65 = "怎麼，好不容易得到的不老不死的身體不喜歡嗎？#n真沒辦法呢～"
2000202-66 = "不用擔心。這次的靈藥是實驗品，一天就會恢復原狀。"
2000202-67 = "在那之前，就盡情享受閃閃發光的肌膚吧。唔──哈──哈──哈！"

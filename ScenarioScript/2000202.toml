[translation]
2000202-1 = "Welcome to Saya's Research Lab!"
2000202-2 = "Hallway in Front of Saya's Research Lab"
2000202-4 = "[ns] Knock on the door."
2000202-6 = "Ugh... I can't take this anymore!"
2000202-8 = "Save it, because I don't care anymore! We're not doing it! We're not your little guinea pigs!"
2000202-9 = "That's right! You can count us out of your little experiments!"
2000202-10 = "Let's all just calm down... I just know this next one will be successful."
2000202-11 = "That's what you always say!"
2000202-12 = "I used that \"impenetrable elixir\" you said is resistant to every poison in the world, and now I have toad's skin!"
2000202-13 = "And I used your \"indestructible elixir\" you said will let me stop a sword with my bare hands. Look at me! My skin may as well be made of stone!"
2000202-14 = "That just means it worked! I said you'd be able to stop a sword with your bare hands and now you can."
2000202-15 = "You never said anything about looking like a monster!"
2000202-16 = "You tell her! We're done taking your medicine, you quack!"
2000202-17 = "W-Wait a minute! I have this immortality elixir—"
2000202-19 = "Dang... Got away."
2000202-21 = "Oh, Sensei. There you are. I've been waiting for you."
2000202-22 = "[s] Run away."
2000202-23 = "Wait! Where do you think you're running off to?"
2000202-24 = "The elixirs my assistants were talking about? Hahaha! Fear not. The elixir I made this time is totally different from the others. It'll work for sure!"
2000202-25 = "Are you ready to test it out, Sensei?"
2000202-26 = "[s] Run away."
2000202-27 = "I said no running away!"
2000202-28 = "Why can't I ask some other students? Absolutely not. I need YOU for this research project!"
2000202-29 = "This elixir is for restoring youth, so trying it on students won't do. They're already youthful! I need an adult to use as the control group!"
2000202-30 = "Here we go, Sensei. I give you my word you'll live, so...let's go inside the research lab!"
2000202-32 = "Saya's Research Lab"
2000202-34 = "Welcome to my research lab, Sensei!"
2000202-35 = "I'd recommend not touching the samples over there. They're still alive."
2000202-36 = "[s] Ask what type of research she does here."
2000202-37 = "Weren't you listening? My immortality elixir, obviously."
2000202-38 = "Of course, I've chanced upon some other elixirs along the way...but the ultimate goal of the Eastern Alchemy Society is to develop an elixir that grants immortality. Hahaha!"
2000202-39 = "[s] Ask what the society is going to do with the immortality elixir."
2000202-40 = "Isn't it obvious? If I never grow old, I can be a student forever and do all sorts of research..."
2000202-41 = "[s] \"Yeah, and...?\""
2000202-42 = "And people will respect me and praise me and adore me..."
2000202-43 = "[s] \"...and?\""
2000202-44 = "Um...and... Ugh! You're so annoying! Can't you just sit quietly and listen to me?"
2000202-47 = "Saya gives me a suspicious-looking flask."
2000202-48 = "In your hands is my latest sample of our immortality elixir. I bet you feel younger just looking at it."
2000202-49 = "[s1] \"...\"\n[s2] \"...Can this REALLY grant immortality?\""
2000202-50 = "What, are you doubting me? I would never lie to you!"
2000202-51 = "What, are you doubting me? I would never lie to you!"
2000202-52 = "One swig and you'll feel the vitality pumping through you like you did when you were still a student!"
2000202-53 = "[s] Drink the elixir."
2000202-57 = "So? How is it? Feeling any younger?"
2000202-58 = "[s] \"My hands...\""
2000202-59 = "Your hands?"
2000202-60 = "[s] \"My hands are shining! They're turning into gold!\""
2000202-61 = "Hahaha! I knew it I knew combining all those alchemical formulas would prove effective. I've finally done it!"
2000202-62 = "Why are you looking at me like that? If your entire body turns to gold, that means you'll never grow old! That would make you immortal!"
2000202-63 = "I'm such a genius! Hahaha!"
2000202-64 = "[s] Tell her to turn you back to normal."
2000202-65 = "What? You don't like your immortal body? Well, I guess eternal life isn't for everyone..."
2000202-66 = "Don't worry. This elixir is just a prototype. It'll wear off by tomorrow."
2000202-67 = "I suggest you enjoy your golden skin while you can, though. Hahaha!"

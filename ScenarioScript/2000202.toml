[translation]
2000202-1 = "#title;사야의 연구실에 어서 오세요!"
2000202-2 = "#place;사야의 연구실 앞 복도"
2000202-3 = "#wait;1500"
2000202-4 = "[ns] 문을 두드린다."
2000202-5 = "#wait;2000"
2000202-6 = "#na;???;으으으으, 더는 못 참아요!\n#fontsize;80"
2000202-7 = "#wait;1500"
2000202-8 = "#na;연단방 부원 A;아무리 사야 선배라 하더라도 더는 못 참아요! #n저희는 선배의 모르모트가 아니라구요!"
2000202-9 = "#na;연단방 부원 B;맞아요! 더는 선배님의 실험에 따르지 않을 거라구요!"
2000202-10 = "3;사야;04;다, 다들 진정하는 것이다. 이번에는 분명 성공시킬 수 있을테니까!\n#3;em;[땀]\n#3;a"
2000202-11 = "#na;연단방 부원 A;또 똑같은 소리! 저번에도 그렇게 말했었잖아요!"
2000202-12 = "#na;연단방 부원 B;모든 독에 내성이 생긴다는 만독불침의 영약은 발랐더니 피부가 독개구리처럼 변해버리고……!"
2000202-13 = "#na;연단방 부원 A;맨손으로 도검을 막을 수 있다는 금강불괴의 영약은 발랐더니 피부가 돌처럼 갈라지고……!"
2000202-14 = "3;사야;07;그래도 만독과 도검을 막을 수 있게 된 건 사실이잖아?\n#3;em;[반응]"
2000202-15 = "#na;연단방 부원 A;아무리 그래도 이상한 꼴이 되는 건 더는 사양이에요!"
2000202-16 = "#na;연단방 부원 B;맞아요. 더 이상은 사야 선배의 약에 의존하지 않을 거예요!"
2000202-17 = "3;사야;07;자, 잠깐만! 이번에는 진짜 불로불사의 영약을—\n#3;m4"
2000202-18 = "3;사야;04\n#wait;3000\n#3;stiff"
2000202-19 = "3;사야;04;윽…… 가버린 것이다.\n#3;em;[땀]"
2000202-20 = "3;사야;00\n#3;em;[반응]\n#wait;1000"
2000202-21 = "3;사야;03;앗, 선생. 와주었구나! 기다리고 있었던 것이다!\n#3;hophop\n#3;m3"
2000202-22 = "[s] 도망친다."
2000202-23 = "3;사야;07;……잠깐, 나님을 두고 어딜 도망치려는 것이냐!\n#3;em;[!]"
2000202-24 = "3;사야;02;부원들이 말한 영약들? #n하-하-핫! 걱정하지 않아도 좋은 것이다! 이번에 개발한 영약은 전의 것들과는 달리 확실한 효과가 있을 테니까."
2000202-25 = "3;사야;01;선생도 같이 실험을 도와줬으면 하는 것이다!"
2000202-26 = "[s] 도망친다."
2000202-27 = "3;사야;07;그러니까, 도망치지 말라니까!\n#3;em;[!]\n#3;hophop"
2000202-28 = "3;사야;01;다른 학생에게 부탁하면 안 되냐고? #n아니, 이번 연구에는 선생이 꼭 필요하거든!"
2000202-29 = "3;사야;02;그도 그럴 것이 <젊음의 효과>를 검증하기 위해서는 어린 학생들만으로는 효과를 알기 어려우니까. 대조군이 되어 줄 <어른>이 있어야지!\n#3;em;[음표]"
2000202-30 = "3;사야;01;자, 자, 선생. 아프게 하지는 않을 테니까…… #n빨리 실험을 속행하는 것이다!\n#3;closeup\n#3;em;[!]"
2000202-31 = "#all;hide"
2000202-32 = "#place;사야의 연구실"
2000202-33 = "#wait;1000"
2000202-34 = "3;사야;03;나님의 연구실에 온 걸 환영하는 것이다, 선생.\n#3;greeting\n#3;em;[반짝]\n#3;a"
2000202-35 = "3;사야;07;아, 거기 있는 표본에는 손대지 않는 것이다. 아직 살아있거든.\n#3;m2"
2000202-36 = "[s] 이곳에서 무슨 연구를 하고 있었느냐고 묻는다."
2000202-37 = "3;사야;01;아까도 말했잖아. 나님은 이곳에서 불로불사의 영약을 만들기 위해 연구를 하고 있다고.\n#3;m3"
2000202-38 = "3;사야;03;물론 그 과정에서 다른 비약이 개발되기도 하지만…… #n연단방의 궁극적인 목표는 불로불사의 영약을 만드는 데 있는 것이다. 하-하-핫!\n#3;em;[음표]"
2000202-39 = "[s] 불로불사의 영약을 만들어서 무엇을 하고 싶은지 묻는다."
2000202-40 = "3;사야;00;응? 그야 당연한 것이다. #n늙지 않고 영원한 여고생으로 살아가면서, 무한히 연구를 하고……"
2000202-41 = "[s] \"그리고?\""
2000202-42 = "3;사야;01;그리고 사람들의 경외를 받고, 칭송을 즐기고……"
2000202-43 = "[s] \"……그리고?\""
2000202-44 = "3;사야;07;음, 그리고…… #n읏! 시끄러워! 선생은 조용히 나님의 연구에만 따라주면 되는 것이다!\n#3;stiff\n#3;em;[빠직]"
2000202-45 = "3;사야;01\n#3;greeting\n#wait;450\n#3;h\n#3;d"
2000202-46 = "3;사야;01\n#wait;1000\n#3;closeup\n#3;h\n#3;a"
2000202-47 = "#na;사야가 수상쩍어 보이는 플라스크를 건넸다."
2000202-48 = "3;사야;02;자, 이게 이번에 새로 개발한 불로불사의 영약인 것이다. 보기만 해도 영험해 보이지?\n#3;closeup\n#3;em;[반짝]"
2000202-49 = "[s1] \"…….\"\n[s2] \"……정말 이게 불사불사의 영약이야?\""
2000202-50 = "3;사야;07;뭐야, 의심하는 것이냐? 위대한 나님은 절대 거짓말을 하지 않는다고!\n#3;hophop\n#3;closeup"
2000202-51 = "3;사야;07;뭐야, 의심하는 것이냐? 위대한 나님은 절대 거짓말을 하지 않는다고!\n#3;hophop\n#3;closeup"
2000202-52 = "3;사야;02;이대로 쭉- 들이키면 선생도 파릇파릇했던 학창 시절로 돌아가게 되는 것이다!\n#3;em;[음표]\n#3;closeup"
2000202-53 = "[s] 마지못해 약을 마신다."
2000202-54 = "3;사야;02\n#3;d\n#3;closeup\n#wait;1000"
2000202-55 = "#st;[0,0];instant;1;"
2000202-56 = "#clearST\n#all;hide\n#wait;3000"
2000202-57 = "3;사야;07;어때, 효과가 있어? 막 젊어지는 느낌이 들고 그래?\n#3;em;[?]\n#3;a"
2000202-58 = "[s] \"손이……\""
2000202-59 = "3;사야;05;……손이?"
2000202-60 = "[s] \"손이 황금빛으로 빛나고 있어!\""
2000202-61 = "3;사야;00;하-하-핫! 역시 나님이야. #n연단술에 연금술을 응용해 본 보람이 있었어. 이번에도 성공인 것이다!\n#3;em;[재잘]"
2000202-62 = "3;사야;01;왜 그렇게 의심스러운 눈으로 쳐다보는 것이냐? #n온 몸이 황금이 되어버린다면 영원히 늙지도 썩지도 않을 테니, 결과적으로는 불로불사의 몸을 갖게 되는 셈이지."
2000202-63 = "3;사야;03;나님은 역시 천재야! 하-하-핫!\n#3;em;[!]\n#3;hophop"
2000202-64 = "[s] 몸을 원래대로 되돌려 달라고 한다."
2000202-65 = "3;사야;05;뭐야, 모처럼 얻은 불로불사의 몸이 마음에 들지 않는 것이냐? #n어쩔 수 없는 것이다~.\n#3;em;[?]"
2000202-66 = "3;사야;02;걱정은 하지 않아도 좋은 것이다. 이번 영약은 실험작이니, 하루만 지나면 원래대로 돌아올 테니까."
2000202-67 = "3;사야;03;그 전까지 반짝반짝 빛나는 피부를 마음껏 만끽하는 것이다. 음-하-하-핫!\n#3;em;[반짝]\n#3;hophop"

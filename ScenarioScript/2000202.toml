[translation]
2000202-1 = "ยินดีต้อนรับสู่ห้องทดลองของซายะ!"
2000202-2 = "ทางเดินด้านหน้าห้องทดลองของซายะ"
2000202-4 = "[ns] เคาะประตู"
2000202-6 = "ทะ... ทนไม่ไหวแล้วนะ!"
2000202-8 = "ถึงจะเป็นรุ่นพี่ซายะก็เถอะ แต่ฉันทนต่อไปไม่ไหวแล้วค่ะ!#nพวกเราไม่ใช่หนูตะเภาของรุ่นพี่นะคะ!"
2000202-9 = "ใช่แล้วค่ะ! พวกเราจะไม่ช่วยงานวิจัยของรุ่นพี่อีกแล้ว!"
2000202-10 = "ทะ...ทุกคนใจเย็นๆ ก่อน ครั้งนี้ต้องสำเร็จแน่ๆ!"
2000202-11 = "รุ่นพี่ก็เอาแต่พูดแบบนี้ตลอด! คราวก่อนก็พูดแบบนี้นี่คะ!"
2000202-12 = "ไหนบอกว่าเป็นยาวิเศษที่สามารถต้านพิษทุกชนิดบนโลกได้ไงล่ะ แต่ดูนี่สิคะ#nผิวของฉันกลายเป็นตุ่มเหมือนผิวคางคกไปแล้ว....!"
2000202-13 = "ไหนบอกว่าเป็นยาวิเศษที่ทำให้หยุดมีดได้ด้วยมือเปล่าไงล่ะคะ แต่ดูนี่สิคะ#nมือของฉันแข็งเหมือนหินไปแล้ว...!"
2000202-14 = "ตอนนี้เธอก็ใช้มือเปล่าหยุดมีดได้แล้วไม่ใช่รึไง?"
2000202-15 = "แต่ฉันไม่อยากมีรูปร่างแปลกๆ นี่คะ!"
2000202-16 = "ใช่แล้วค่ะ! เราจะไม่เชื่อใจยาของรุ่นพี่ซายะอีกแล้วค่ะ!"
2000202-17 = "ดะ..เดี๋ยวก่อนสิ! คราวนี้ฉันปรุงยาอายุวัฒนะ..."
2000202-19 = "อึ่ก... ไปกันซะแล้ว\n"
2000202-21 = "อ๊ะ ครู! มาพอดี! ฉันกำลังรออยู่เลย!"
2000202-22 = "[s] วิ่งหนี"
2000202-23 = "....เดี๋ยวสิ จะวิ่งหนีไปไหนน่ะ!"
2000202-24 = "ยาวิเศษที่สมาชิกชมรมพูดถึงงั้นเหรอ? ฮ่าฮ่าฮ่า! ไม่ต้องห่วงน่า!#nยาที่ฉันคิดค้นขึ้นคราวนี้ไม่เหมือนกับครั้งก่อนๆ หรอกนะ มันต้องได้ผลแน่!"
2000202-25 = "ครูมาช่วยฉันทดลองยาตัวนี้หน่อยได้มั้ย?"
2000202-26 = "[s] วิ่งหนี"
2000202-27 = "บอกว่าอย่าหนีไง!"
2000202-28 = "ทำไมฉันไม่ไปขอให้นักเรียนคนอื่นทดลองแทนน่ะเหรอ?#nไม่ได้ๆ คนที่ทดลองยาคราวนี้ต้องเป็นครูเท่านั้น!"
2000202-29 = "ฉันคงจะเอายาที่มีผลเรื่อง <คืนความอ่อนเยาว์> ไปทดลองกับนักเรียนไม่ได้หรอกจริงมั้ยล่ะ?#nต้องเอามาทดลองกับ <ผู้ใหญ่> แบบครูสิ!"
2000202-30 = "เอาล่ะๆ ครู ฉันสัญญาว่าครูจะไม่เจ็บตัวแน่นอน...#nรีบๆ เข้าไปในห้องทดลองกันเถอะ!"
2000202-32 = "ห้องทดลองของซายะ"
2000202-34 = "ยินดีต้อนรับสู่ห้องทดลองของท่านซายะ!"
2000202-35 = "อ๊ะ อย่าไปจับตัวอย่างทดลองที่อยู่ด้านโน้นล่ะ มันยังมีชีวิตอยู่"
2000202-36 = "[s] ถามซายะเรื่องการทดลองที่เธอทดลองอยู่"
2000202-37 = "เมื่อกี้ก็บอกไปแล้วไม่ใช่รึไง? ฉันกำลังทดลองเพื่อปรุงยาอายุวัฒนะอยู่ยังไงล่ะ"
2000202-38 = "ถึงระหว่างนั้นก็ปรุงยาตัวอื่นขึ้นมาด้วยก็เถอะ... แต่เป้าหมายของชมรมวิจัยศาสตร์การปรุงยา#nก็คือการปรุงยาอายุวัฒนะขึ้นมาต่างหาก ฮ่าฮ่าฮ่า!"
2000202-39 = "[s] ถามซายะว่าทำไมถึงอยากปรุงยาอายุวัฒนะขึ้นมา"
2000202-40 = "หือ? มันก็แน่นอนอยู่แล้วไม่ใช่รึไง ถ้าฉันไม่แก่ก็จะได้เป็นนักเรียนตลอดไป#nแล้วก็จะทำงานวิจัยได้ต่อแล้วก็..."
2000202-41 = "[s] \"แล้วก็...?\""
2000202-42 = "แล้วคนอื่นๆ ก็จะยกย่องชื่นชมฉันยังไงล่ะ...."
2000202-43 = "[s] \"...แล้ว?\""
2000202-44 = "อืม แล้วก็...#nฮึ่ย! หนวกหูน่า! ครูช่วยอยู่เงียบๆ แล้วทำตามที่ท่านซายะบอกก็พอ!"
2000202-47 = "ซายะยื่นขวดแก้วที่ดูน่าสงสัยมาให้"
2000202-48 = "เอ้า นี่คือยาอายุวัฒนะที่พัฒนาขึ้นมาใหม่ แค่เห็นก็เริ่มรู้สึกเหมือนเด็กลงแล้วใช่มั้ยล่ะ?"
2000202-49 = "[s1] \"......\"\n[s2] \"....นี่มันยาอายุวัฒนะจริงๆ เหรอ?\""
2000202-50 = "อะไรกัน ครูสงสัยท่านซายะงั้นเหรอ? ท่านซายะคนนี้ไม่โกหกคุณครูหรอกน่า!"
2000202-51 = "อะไรกัน ครูสงสัยท่านซายะงั้นเหรอ? ท่านซายะคนนี้ไม่โกหกคุณครูหรอกน่า!"
2000202-52 = "แค่ดื่มรวดเดียวให้หมด ครูก็จะรู้สึกกระชุ่มกระชวยมีกำลังวังชาขึ้นมาทันทีเลยล่ะ!"
2000202-53 = "[s] ดื่มยาในขวดแก้ว"
2000202-57 = "เป็นยังไง? รู้สึกอะไรบ้าง? รู้สึกเหมือนตัวเองเด็กลงบ้างมั้ย?"
2000202-58 = "[s] \"มือครู....\""
2000202-59 = "....มือเหรอ?"
2000202-60 = "[s] \"มือของครูส่องแสงสีทองระยิบระยับอยู่!\""
2000202-61 = "ฮ่าฮ่าฮ่า! สมกับเป็นท่านซายะจริงๆ สมแล้วกับที่ใช้วิธีการเล่นแร่แปรธาตุมาผสมเข้าด้วยกัน#nได้ผลดีจริงๆ แบบนี้ก็สำเร็จแล้วล่ะ!"
2000202-62 = "ทำไมถึงมองด้วยสายตาแปลกๆ แบบนั้นล่ะ? ถ้าตัวครูเปล่งแสงสีทองทั้งตัวเมื่อไหร่#nแสดงว่าครูจะไม่แก่แล้วยังไงล่ะ แสดงว่าคุณครูเป็นอมตะแล้ว!"
2000202-63 = "ท่านซายะนี่เป็นอัจฉริยะจริงๆ! ฮ่าฮ่าฮ่า!"
2000202-64 = "[s] ขอให้ซายะทำให้ร่างกายกลับเป็นแบบเดิมให้"
2000202-65 = "อะไรนะ? ครูไม่ชอบร่างกายที่เป็นอมตะงั้นเหรอ?#nช่วยไม่ได้น้า~\n"
2000202-66 = "ไม่ต้องห่วง ยาอายุวัฒนะอันนี้เป็นแค่ตัวทดลองเท่านั้น พรุ่งนี้ครูก็กลับมาเป็นปกติแล้วล่ะ"
2000202-67 = "เพราะฉะนั้น ขอแนะนำให้ครูดื่มด่ำกับช่วงเวลาที่มือยังเปล่งแสงสีทองแบบนี้อยู่ซะดีกว่า ฮ่าฮ่าฮ่า!"

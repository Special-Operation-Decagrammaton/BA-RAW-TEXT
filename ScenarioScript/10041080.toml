[translation]
10041080-1 = "後日談;贊助者"
10041080-4 = "唉……最後還是變成這樣了嗎？"
10041080-5 = "我們要去哪啊？是矯正局嗎？"
10041080-6 = "我想應該是吧。就我剛才隱約聽到的情況來看。"
10041080-13 = "唉～～～"
10041080-15 = "喂喂，一嘆窮三年啊。"
10041080-16 = "不用太灰心。#n對方畢竟是那個C&C，這不是我們能夠改變的事。"
10041080-21 = "不是，我沒有那個意思……"
10041080-22 = "話說你還真讓人刮目相看。#n老實說在被美甘寧瑠逮到的時候，我還以為你會裝作不認識，丟下我們不管呢。"
10041080-23 = "……嗯？"
10041080-24 = "對啊對啊！坦白講真的嚇了我一跳！"
10041080-25 = "不知道多久沒有被雇主坑了。#n如果下次有事的話，歡迎隨時找我！"
10041080-26 = "是……嗎？#n哈哈，能留下好印象就好。"
10041080-27 = "反觀我的雇主那邊……"
10041080-28 = "什麼？雇主？"
10041080-30 = "啊啊，這麼說來你也有贊助者對吧？#n看來你的處境也跟我們沒什麼兩樣。"
10041080-31 = "是啊，其實我也不清楚對方是個怎樣的人。#n只是因為他說會幫我達到目的，我才按照他說的去做罷了。"
10041080-32 = "但從現在這個情況看來……我似乎被拋棄了。"
10041080-33 = "啊……嗯……"
10041080-34 = "哎呀呀……"
10041080-35 = "沒關係。我完全可以理解。#n這個世界就是互相指使對方做事的關係嘛。"
10041080-36 = "而且我負責的事也失敗了……沒資格挑三揀四。"
10041080-41 = "你說誰拋棄了誰呀？"
10041080-46 = "……嗯？"
10041080-48 = "咦……？#n剛才那是什麼？你有沒有聽到什麼聲音？"
10041080-49 = "確實有聽到……"
10041080-60 = "門打開了……！？"
10041080-66 = "這裡是……"
10041080-67 = "……地下？"
10041080-72 = "是「安全的場所」哦。#n是我為了將各位弄出來，所以特別準備的地方。"
10041080-76 = "……！？#n這個聲音是……"
10041080-77 = "……雇主。"
10041080-78 = "咦……！？"
10041080-85 = "真令人難過。#n你居然以為我會就這樣拋下簽約的對象。"
10041080-86 = "雖然我確實出於需求而誘導了其他人……但我也負起了「責任」哦？"
10041080-87 = "你是……"
10041080-88 = "沒錯，我就是「笑咪咪教授」。"
10041080-89 = "這是我們第一次實際見面吧。"
10041080-90 = "哎呀，你看起來似乎有點緊張呢。#n我可是解救了即將被送去矯正局的你，稍微相信我一下也沒關係吧？"
10041080-91 = "雖然是這樣沒錯……但我反而更覺得奇怪。#n我負責的工作明明失敗了啊？"
10041080-92 = "失敗……？"
10041080-96 = "啊啊～看來我們似乎存在認知上的差異呢。"
10041080-97 = "認知差異……？"
10041080-98 = "沒錯，請別擔心。你負責的事情做得非常好。#n現在這場拯救計畫，也是因而產生的獎勵。"
10041080-99 = "……？？"
10041080-100 = "那是什麼意思……？#n打從一開始就另有安排嗎？"
10041080-101 = "……呵呵。很遺憾，這部分我必須保密。#n因為這跟各位現在做的事沒有關係。"
10041080-106 = "總之交易愉快。#n祝你們有美好的一天，路上小心。"
10041080-107 = "我還有其他事要忙，先告辭了……"
10041080-118 = "呃……"
10041080-120 = "那傢伙是誰啊……？"

[translation]
10041080-1 = "Afterword;Sponsor"
10041080-4 = "*sigh* So this is how it goes."
10041080-5 = "Where are we going? To the Corrections Bureau, right?"
10041080-6 = "Well, probably. I think I heard somebody say that."
10041080-13 = "*sigh*"
10041080-15 = "Oh, it's not the end of the world."
10041080-16 = "I guess there's no shame in losing to C&C, right?"
10041080-21 = "Well, that's not the issue, but..."
10041080-22 = "You know, when Mikamo Neru caught us, I thought you were going to leave us high and dry."
10041080-23 = "...What?"
10041080-24 = "Yeah, that's what I thought! You really surprised me!"
10041080-25 = "It's been a while since we got a client who didn't stab us in the back. Next time you've got a job, give us a call!"
10041080-26 = "Haha, if you say so. I'm glad I left a good impression."
10041080-27 = "On the other hand, my client is..."
10041080-28 = "Hm? Your client?"
10041080-30 = "Ah. You said you had a sponsor or something, right? I guess we're in the same boat."
10041080-31 = "Not that I know much about her. She just told me we could help each other, so I did what she asked me to do."
10041080-32 = "And...unlike you, I think I've been abandoned."
10041080-33 = "Oh. Um..."
10041080-34 = "Oh, my..."
10041080-35 = "It's fine. I understand. It happens. That's just how the world works, yeah?"
10041080-36 = "Besides, seeing as I failed my job...I'm in no position to question her."
10041080-41 = "Who are you saying abandoned whom?"
10041080-46 = "...? Huh?"
10041080-48 = "What...? What was that? Did you just hear something?"
10041080-49 = "I did..."
10041080-60 = "Is the door opening...?!"
10041080-66 = "This place is..."
10041080-67 = "...underground?"
10041080-72 = "It's a \"safe spot.\" Specially prepared to get you guys out."
10041080-76 = "*gasp* I know that voice."
10041080-77 = "...My dear client."
10041080-78 = "What...?!"
10041080-85 = "I'm hurt. Did you really think I'd abandoned you, after we signed a contract?"
10041080-86 = "Yes, I do serve my own interests first, but I do have a sense of responsibility."
10041080-87 = "...You're..."
10041080-88 = "Professor Smug, yes."
10041080-89 = "So we finally meet in person."
10041080-90 = "You look nervous. I just saved you from a trip to the Corrections Bureau. Can't you trust me just a little?"
10041080-91 = "So why DID you save me, after I failed?"
10041080-92 = "Failed...?"
10041080-96 = "Ah. That's where the misunderstanding is."
10041080-97 = "Misunderstanding...?"
10041080-98 = "Oh, don't worry about it. You did your part very well. I'm not saving you out of pity. This is a reward."
10041080-99 = "Huh?! "
10041080-100 = "So, what, you had a whole other plan I was just a part of?"
10041080-101 = "...Fufu. If I did, I couldn't tell you about it...other than to say it's not related to what you did."
10041080-106 = "Anyway, this has all been very amusing. Have a nice day, and a safe trip home. "
10041080-107 = "And if you'll excuse me, I'm a very busy woman."
10041080-118 = "...Um..."
10041080-120 = "Who was she...?"

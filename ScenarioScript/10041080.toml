[translation]
10041080-1 = "ย้อนวันวาน;สปอนเซอร์"
10041080-4 = "เฮ้อ... สุดท้ายก็เป็นอย่างนี้เหรอ?"
10041080-5 = "เราจะถูกพาไปไหนกันเนี่ย? คงจะเป็นที่คุมขังใช่มั้ย?"
10041080-6 = "ก็น่าจะเป็นอย่างนั้นละ เมื่อกี้เหมือนจะได้ยินผ่านๆ ว่าไปที่นั่นนะ"
10041080-13 = "เฮ้อออ"
10041080-15 = "ถอนหายใจอะไรขนาดนั้น เดี๋ยวก็อายุสั้นหรอก"
10041080-16 = "อย่าเพิ่งหมดกำลังใจให้มันมากไปนักเลย มันช่วยไม่ได้นี่นา อีกฝ่ายเป็นถึง C&C เลยนะ พวกเราทำอะไรพวกนั้นไม่ได้อยู่แล้วละ"
10041080-21 = "ไม่หรอกค่ะ ฉันไม่ได้หมดกำลังใจหรอก..."
10041080-22 = "จะว่าไป ฉันต้องมองเธอใหม่เลยนะ บอกตรงๆ ว่าตอนที่ถูกมิคาโมะ เนรุจับได้ พวกเราคิดว่าเธอจะ#nแกล้งทำเป็นไม่รู้จักเราแล้วหนีไปแล้วเสียอีก"
10041080-23 = "คะ...?"
10041080-24 = "ใช่ ใช่! ทำเอาฉันทึ่งเลยละ!"
10041080-25 = "นานแค่ไหนแล้วก็ไม่รู้เนอะที่เราไม่โดนผู้ว่าจ้างทรยศแบบนี้ ต่อไปถ้ามีงานอะไรก็มาเรียกใช้งานพวก#nเราอีกล่ะ"
10041080-26 = "งั้น... เหรอคะ? แหะๆ แต่ยังไงก็ค่อยยังชั่วนะคะที่ฉันมีภาพลักษณ์ที่ดีในสายตาพวกคุณ"
10041080-27 = "ในทางกลับกัน ผู้ว่าจ้างของฉันน่ะ..."
10041080-28 = "เอ๋? ผู้ว่าจ้าง?"
10041080-30 = "อ้อ จะว่าไปแล้ว เธอเคยบอกว่ามีสปอนเซอร์นี่เนอะ? สุดท้ายเธอก็อยู่ในสถานการณ์ที่ไม่ต่างจากพวก#nเราสินะ"
10041080-31 = "ใช่ค่ะ ที่จริงฉันก็ไม่รู้ค่ะว่าคนนั้นเป็นใคร แต่คนคนนั้นบอกว่าจะช่วยให้ฉันบรรลุเป้าหมาย ฉันก็เลยแค่ทำตามคำสั่งค่ะ"
10041080-32 = "แต่ดูจากสถานการณ์ตอนนี้แล้ว... ฉันว่าฉันน่าจะถูกทิ้งแล้วละค่ะ"
10041080-33 = "อ่า... อืม..."
10041080-34 = "เป็นงั้นไป..."
10041080-35 = "ไม่เป็นไรค่ะ ฉันเข้าใจค่ะ โลกนี้เป็นที่ที่ผู้คนต่างสั่งกันไปมาอยู่แล้วค่ะ"
10041080-36 = "แล้วฉันก็ล้มเหลวในงานที่ได้รับมอบหมายด้วย... ฉันคงมาบ่นไม่ได้หรอกค่ะ"
10041080-41 = "ใครทิ้งใครกันคะ?"
10041080-46 = "หืม...?"
10041080-48 = "เอ๋...? เมื่อกี้มันอะไรน่ะ? ได้ยินเสียงอะไรมั้ย?"
10041080-49 = "นั่นสิ..."
10041080-60 = "ประตูเปิดเองเฉยเลย...!?"
10041080-66 = "ที่นี่คือ..."
10041080-67 = "ใต้ดินเหรอ...?"
10041080-72 = "เป็น \"สถานที่ที่ปลอดภัย\" ค่ะ ฉันเตรียมสถานที่นี้ไว้เป็นพิเศษเพื่อจะพาพวกคุณออกไปค่ะ"
10041080-76 = "เสียงนี้มัน...!?"
10041080-77 = "ผู้ว่าจ้าง..."
10041080-78 = "ว่าไงนะ...!?"
10041080-85 = "น่าเสียใจนะคะ คุณคิดจริงๆ เหรอคะว่าฉันจะทิ้งคนที่ทำสัญญาด้วยน่ะ?"
10041080-86 = "แน่นอนว่าบางทีฉันก็ไปให้คำแนะนำคนอื่นบ้างเมื่อจำเป็น... แต่เห็นอย่างนี้ฉันก็ 'มีความรับผิดชอบ' นะคะ"
10041080-87 = "คุณคือ..."
10041080-88 = "ใช่ค่ะ ฉันคือ <ศาสตราจารย์ยิ้มหวาน> ค่ะ"
10041080-89 = "เป็นครั้งแรกที่ได้เจอตัวเป็นๆ เลยนะคะ"
10041080-90 = "เอ๋? ดูเหมือนจะประหม่ากันอยู่นะคะ ฉันมาช่วยให้ไม่ต้องถูกคุมขัง พวกคุณเชื่อใจฉันเถอะค่ะ"
10041080-91 = "ที่คุณพูดก็ถูกค่ะ... แต่กลายเป็นว่าฉันยิ่งสงสัยมากกว่าเดิม ก็ฉันทำงานไม่สำเร็จนี่คะ?"
10041080-92 = "ไม่สำเร็จ...?"
10041080-96 = "อ๋อ~ เราคงคิดต่างกันในเรื่องนั้นนะคะ"
10041080-97 = "คิดต่างกัน...?"
10041080-98 = "ค่ะ ไม่ต้องกังวลไปนะคะ คุณทำงานที่ได้รับมอบหมายได้ดีเพียงพอแล้วค่ะ แล้วแผนการช่วยชีวิตนี้ก็#nคือรางวัลสำหรับงานนั้นค่ะ"
10041080-99 = "...?? "
10041080-100 = "หมายความว่ายังไง...? คุณจะบอกว่ามีอุบายอื่นแฝงอยู่ตั้งแต่แรกเหรอคะ?"
10041080-101 = "ฮุฮุ... น่าเสียดายที่ต้องพูดอย่างนี้นะคะ แต่นั่นเป็นความลับค่ะ มันเป็นเรื่องที่ไม่เกี่ยวกับสิ่งที่พวกคุณ#nทำกันในตอนนี้หรอกค่ะ"
10041080-106 = "เอาเป็นว่า นี่คือการจ้างงานที่สนุกดีค่ะ กลับกันดีๆ นะคะ ขอให้วันนี้เป็นวันที่ดีค่ะ "
10041080-107 = "ฉันมีงานอื่นต้องไปทำน่ะค่ะ งั้นขอตัวก่อน..."
10041080-118 = "อะไรเนี่ย..."
10041080-120 = "อะไรของเค้าน่ะ..?"

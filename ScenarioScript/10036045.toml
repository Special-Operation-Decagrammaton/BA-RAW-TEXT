[translation]
10036045-4 = "ว้าก!"
10036045-5 = "พะ... พอแล้ว! ยอมแพ้แล้ว!"
10036045-10 = "อ่านสถานการณ์ออกเร็วดีนี่"
10036045-11 = "ตกลงว่ายากิโซบะจานละเท่าไรนะ?"
10036045-13 = "เฮือก! จะ... เจ็ดพัน... ไม่สิ! ให้กินฟรีเลยค่ะ!"
10036045-15 = "ไม่ ฉันไม่กินฟรีหรอก"
10036045-20 = "นี่มัน...?"
10036045-21 = "เงินไงล่ะ แล้วก็เอายากิโซบะ 3 จาน น้ำแข็งไส 1 ถ้วย ข้าวโพด กับไอศกรีมไปให้ลูกค้าที่นั่งอยู่ในร้าน#nตรงนั้นด้วย"
10036045-22 = "แล้วก็ไม่ต้องบอกล่ะว่าฉันเป็นคนสั่งอาหาร"
10036045-23 = "คะ... คุณจะจ่ายค่าอาหารให้โต๊ะนั้นหมดเลยเหรอคะ...?"
10036045-24 = "นึกว่าจะให้เอาอาหารไปเสิร์ฟฟรีๆ ซะอีก..."
10036045-25 = "ถ้าไม่ขายอาหารในราคาที่สมเหตุสมผลละก็ ฉันจะทำเหมือนยัยเด็ก 4 คนที่เธอพูดถึงเมื่อกี้ให้ดู"
10036045-26 = "...!"
10036045-27 = "ค่ะ... รับทราบค่ะ!"
10036045-31 = "[ns9] \"ซาโอริ เดี๋ยวครูจ่ายให้เอง\"\n[ns10] \"ซาโอริ ใช้บัตรของครูจ่ายเถอะนะ...\""
10036045-34 = "ไม่เป็นไรหรอก ครู ฉันขอปฏิเสธดีกว่า"
10036045-35 = "ฉันเป็นหนี้บุญคุณครูมาหลายต่อหลายครั้งแล้ว และที่สำคัญกว่านั้น..."
10036045-36 = "ฉันอยากใช้เงินของตัวเองซื้อของอร่อยๆ ให้ทุกคนกินน่ะ"
10036045-37 = "[s] (ซาโอริ... เป็นนางฟ้าเหรอเนี่ย?)"
10036045-38 = "เอาละ เราไปแอบดูทุกคนกินอาหารกันเถอะ"
10036045-41 = "อาหารที่สั่งได้แล้วค่ะ! "
10036045-42 = "ยากิโซบะ 3 จาน น้ำแข็งไส ข้าวโพด แล้วก็ไอศกรีมค่ะ!"
10036045-48 = "เอ๋? เราสั่งยากิโซบะไปแค่จานเดียวนะคะ?"
10036045-49 = "แค่โก่งราคายังไม่พอ แต่มาบังคับให้ซื้ออย่างอื่นด้วยเหรอ...?"
10036045-50 = "เฮือก... เรื่องที่กังวลเป็นจริงขึ้นมาเหรอคะเนี่ย...!"
10036045-52 = "มะ... ไม่ใช่อย่างนั้นนะคะ!"
10036045-53 = "เอ่อ คือว่า... ชะ... ใช่ค่ะ! พวกคุณถูกรางวัลจากกิจกรรมค่ะ!"
10036045-54 = "ยินดีด้วยค่ะ! คุณจะได้รับเงิน 7,000 เยนที่จ่ายมาก่อนหน้านี้ด้วยค่ะ!"
10036045-58 = "นี่! รีบมาช่วยงานทางนี้ได้แล้ว!"
10036045-64 = "ยะ... ยินดีด้วยนะคะ!"
10036045-69 = "แปลกจัง... นี่มันแผนการอะไรหรือเปล่า..."
10036045-70 = "ว้าววว! ขอบคุณนะคะ!"
10036045-71 = "ที่ผ่านมาพวกฉันเจอแต่เรื่องร้ายๆ มาตลอดเลย! แต่ก็มีวันที่โชคดีแบบนี้ด้วยสินะคะ!"
10036045-72 = "ถึงจะไม่รู้ว่าเป็นแบบนี้ได้ยังไง แต่ในเมื่อถูกรางวัลแล้วก็ต้องขอรับไว้ละนะ"
10036045-73 = "ฮิโยริ รีบกินกันเถอะ เดี๋ยวอาหารเย็นหมดพอดี "
10036045-74 = "ค่ะ...! นี่สินะ ยากิโซบะ...!"
10036045-79 = "อร่อยจังเลยค่ะ!"
10036045-81 = "ไม่ได้อร่อยถึงกับขึ้นสวรรค์... แต่ก็ไม่เลวเลยนะ"
10036045-82 = "พวกเรามีความสุขแบบนี้ก็ได้เหรอคะเนี่ย! คงไม่ได้ใช่มั้ยคะ! เรามีความสุขกันแบบนี้ อีกเดี๋ยวคงเกิดเรื่องไม่ดีขึ้นแน่ๆ เลยค่ะ!"
10036045-84 = "..."
10036045-85 = "[s] \"ดูอิ่มเอมใจจังเลยนะ ซาโอริ\""
10036045-86 = "นี่เป็นครั้งแรกเลยละที่ฉันใช้เงินที่หามาได้ซื้ออะไรให้ทุกคน"
10036045-87 = "พอเห็นทุกคนมีความสุข... ฉันก็มีความสุขไปด้วยน่ะ"
10036045-88 = "[s] \"งั้นซาโอริก็ควรกินอะไรกับเขาด้วยนะ\""
10036045-92 = "นี่มัน... ยากิโซบะ?"
10036045-93 = "ไปสั่งมาตั้งแต่ตอนไหนน่ะ?"
10036045-94 = "[s] \"ครูเผลอสั่งผิดเป็น 2 จานน่ะ ซาโอริช่วยครูกินอีกจานได้มั้ย?\""
10036045-95 = "งั้นเหรอ...? ครูก็ดูอิ่มเอมใจเหมือนกันนะ"
10036045-96 = "ถ้างั้นฉันจะกินละนะ ขอบคุณนะครู"

[translation]
10036045-4 = "Gahhh!"
10036045-5 = "S-Stop it! We give up!"
10036045-10 = "Oh, good, you got the message."
10036045-11 = "So how much was the yakisoba again?"
10036045-13 = "Eek! S-Seven thou... No! I mean it's free!"
10036045-15 = "No, no, that wouldn't be right."
10036045-20 = "A-Are you...?"
10036045-21 = "Paying you money, yes, at the rate you SHOULD have charged. Three bowls of yakisoba, one shaved ice, some corn, and some ice cream for the three girls sitting over there."
10036045-22 = "And don't tell them I'm the one who ordered them."
10036045-23 = "Y-You're paying for it?"
10036045-24 = "I thought you were gonna make us give it away."
10036045-25 = "If I did that, I'd be no different than you. I told you, I just want the prices to be fair."
10036045-26 = "*gasp*"
10036045-27 = "...Yes, right away, order up!"
10036045-31 = "[ns9] \"Saori, I'll pay for it.\"\n[ns10] \"Saori, we should use my card...\""
10036045-34 = "No thank you, Sensei. I respectfully decline."
10036045-35 = "I already owe you. Besides, more than that..."
10036045-36 = "...I want to buy them something good with the money I earned."
10036045-37 = "[s] \"(Is Saori...an angel?)\""
10036045-38 = "Now, let's go watch them enjoy it."
10036045-41 = "Here, your food's ready! "
10036045-42 = "Three bowls of yakisoba, shaved ice, corn, and ice cream!"
10036045-48 = "What? But we only ordered one bowl of yakisoba..."
10036045-49 = "...What is this? Are you extorting us to pay you more?"
10036045-50 = "Oh no, I was right. We ARE going to have to—"
10036045-52 = "No, not at all!"
10036045-53 = "This is uh... Y-Yeah! You won! Our giveaway!"
10036045-54 = "Congratulations! Oh, and here, here's the 7,000 yen you paid earlier!"
10036045-58 = "Hey! Come back me up, will you?"
10036045-64 = "C-Congratulations!"
10036045-69 = "Something's up here. What are you plotting?"
10036045-70 = "Waaah! Thank you!"
10036045-71 = "Finally, things are going our way for once! What a great day!"
10036045-72 = "I...can't say I understand, but we might as well enjoy it, yes?"
10036045-73 = "Come, Hiyori, before the food gets cold. Let's eat."
10036045-74 = "Yes...! So THIS is yakisoba!"
10036045-79 = "So delicious!"
10036045-81 = "I wouldn't quite say it's the \"taste of heaven,\" but it's decent."
10036045-82 = "Are we allowed to be this happy? No, right? We're going to have to pay for it later!"
10036045-84 = "..."
10036045-85 = "[s] \"Well, Saori, you look happy.\""
10036045-86 = "This is my first time buying them anything with the money I earned myself."
10036045-87 = "Watching them enjoy it... Yes, it does make me happy."
10036045-88 = "[s] \"You should get lunch too.\""
10036045-92 = "You're...giving me yakisoba?"
10036045-93 = "When did you get this?"
10036045-94 = "[s] \"Well, I ordered two bowls by mistake. You mind helping me eat it all?\""
10036045-95 = "...I won't say no to that. You look pretty happy yourself, Sensei."
10036045-96 = "All right. Thank you."

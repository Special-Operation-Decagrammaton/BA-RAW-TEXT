[translation]
10036045-4 = "呃啊！"
10036045-5 = "住，住手！我們認輸了！"
10036045-10 = "學得倒是還挺快的。"
10036045-11 = "那我再問你們一次──炒麵賣多少錢？"
10036045-13 = "噫噫！七，七千……不對！我是說免費！"
10036045-15 = "不，這也不行。"
10036045-20 = "這是……？"
10036045-21 = "是給你們的錢。#n幫我準備三份炒麵、烤玉米、冰淇淋和一碗刨冰，然後送去給店裡的那幾個客人吧。"
10036045-22 = "記得別說是我點的。"
10036045-23 = "您，您的意思是要幫他們付錢嗎……？"
10036045-24 = "還以為您會要我讓客人吃免錢的……"
10036045-25 = "如果不支付合理的費用，我的行為又跟你們有什麼區別呢？"
10036045-26 = "……！"
10036045-27 = "……收，收到。我馬上準備！"
10036045-31 = "[ns9]「沙織，錢就由我來付吧。」\n[ns10]「沙織，用我的卡片付吧……」"
10036045-34 = "沒關係的，老師。你的好意我心領了。"
10036045-35 = "除了已經給你添了很多麻煩之外，更重要的是……"
10036045-36 = "我希望能用自己賺來的錢，讓孩子們好好吃頓飯。"
10036045-37 = "[s] （沙織……根本就是天使吧？）"
10036045-38 = "那麼，去看看孩子們吃得開不開心吧。"
10036045-41 = "來，這邊是各位的餐點！"
10036045-42 = "三份炒麵、刨冰、玉米和冰淇淋！"
10036045-48 = "咦？我們不是只有點一份炒麵嗎？"
10036045-49 = "……難道把我們當肥羊宰不夠滿意，現在還要強迫消費？"
10036045-50 = "噫噫……擔心的事果然成真了……！"
10036045-52 = "不，不是這樣的！"
10036045-53 = "這個是……對，對了！是各位中獎了！"
10036045-54 = "恭喜！還有您剛才付的7000元也退還給您！"
10036045-58 = "喂！快點過來幫忙！"
10036045-64 = "恭，恭喜！"
10036045-69 = "怎麼看都很可疑……他們到底有什麼企圖……"
10036045-70 = "嗚啊啊啊！謝謝你們！"
10036045-71 = "我們一直以來都很倒楣的說！沒想到竟然有一天能被幸運女神眷顧！"
10036045-72 = "雖然不知道原因，不過我們就欣然接受這份好運吧。"
10036045-73 = "日和，趕快在食物涼掉之前開動吧。"
10036045-74 = "嗯……！這就是炒麵……！"
10036045-79 = "好好吃！"
10036045-81 = "雖然沒有到人間美味這麼誇張……不過的確蠻好吃的。"
10036045-82 = "我們真的可以這麼幸福嗎！肯定不行對吧！#n幸福之後肯定會有報應的對吧！"
10036045-84 = "……"
10036045-85 = "[s]「沙織，看來你似乎很滿足呢。」"
10036045-86 = "這是我第一次用自己賺來的錢請孩子們吃東西。"
10036045-87 = "所以看到他們吃得那麼滿足……我自己也很開心。"
10036045-88 = "[s]「那現在該輪到沙織吃午餐囉。」"
10036045-92 = "這是……炒麵？"
10036045-93 = "老師是在什麼時候……？"
10036045-94 = "[s]「我不小心點了兩份，不介意的話幫我吃一份吧？」"
10036045-95 = "……是嗎？老師看起來似乎也很開心。"
10036045-96 = "那我就恭敬不如從命了，老師。"

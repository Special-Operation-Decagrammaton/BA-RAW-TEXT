[translation]
84304300100-5 = "(เนรุกลับมายังที่ซ่อนตัว แล้วอธิบายเรื่องที่เกิดขึ้นให้ริโอะกับเซอาฟัง)"
84304300100-8 = "เกิดเรื่องแบบนั้นขึ้นสินะคะ..."
84304300100-9 = "แปลว่าอีกฝ่ายก็รู้เกี่ยวกับริโอะดี... และไม่ได้รู้แค่ว่าเป็น 'ประธานนักเรียน' ด้วย..."
84304300100-10 = "ฉันว่าประเมินแบบนี้น่าจะได้นะคะ"
84304300100-11 = "แต่เรื่องนั้นอีกฝ่ายเหมือนตั้งใจพูดให้เราได้ยิน ฉันว่าเราไม่ควรหวั่นไหวมากกว่านะ"
84304300100-12 = "ฟังอยู่ใช่มั้ย...? ริโอะ"
84304300100-14 = "อ่า... อื้อ ช่างมันเถอะ "
84304300100-15 = "ที่จริงคำพูดนั้นมันก็ไม่ได้ผิดอะไรด้วย"
84304300100-16 = "ไหนว่าช่างมันไง ยังเก็บเอามาคิดอยู่เลยนี่"
84304300100-17 = "แต่ความจริงก็คือความจริง เพราะอย่างนั้นฉันจึงต้อง 'พิสูจน์' ตัวเองยังไงล่ะ"
84304300100-18 = "พิสูจน์ตัวเอง..."
84304300100-19 = "ไม่สิ คือว่า ไม่ใช่อย่างนั้นหรอก..."
84304300100-20 = "เรื่องในครั้งนี้เป็นส่วนต่อขยายจากเหตุการณ์นั้นน่ะ ถ้าจะกลับมา ฉันก็ต้องมีผลงานที่เป็นที่ยอมรับ อย่างน้อยก็เพื่อให้ยืนหยัดต่อหน้าชาวมิลเลเนียมได้อย่างกล้าหาญ"
84304300100-21 = "ฉันน่าจะบอกเรื่องนั้นกับเธอไปแล้วนะ เนรุ"
84304300100-22 = "ช่างเถอะ... ต่อให้ฉันจะพูดคำเดิมซ้ำกันอีกกี่รอบ สำหรับเธอแล้วก็คงไม่มีประโยชน์หรอก"
84304300100-24 = "ผลงานงั้นเหรอ..."
84304300100-25 = "เอาเถอะ เลิกพูดเรื่องไร้สาระได้แล้ว คนจากโรงเรียนอื่นก็อยู่กับเราด้วยแท้ๆ "
84304300100-26 = "แล้วจากนี้ไปจะทำยังไงต่อ? ฉันผิดเองที่ให้พวกนั้นหนีไปได้ หรือว่าเราต้องรอจนกว่าเรื่องจะแดงกว่า#nนี้น่ะ?"
84304300100-27 = "ดูเป็นงานที่ไม่ง่ายเลยนะคะ ถ้าอีกฝ่ายรู้ตัวแล้วว่ากำลังถูกไล่ล่าอยู่ ก็คงไม่เคลื่อนไหวอย่างโจ่งแจ้ง#nเหมือนที่เคยทำ..."
84304300100-28 = "เรื่องนั้นไม่มีปัญหาหรอก ฉันเองก็จะไม่ปล่อยให้มีปัญหามากกว่านี้เหมือนกัน"
84304300100-29 = "มีวิธีหนึ่งที่ฉันพยายามจะไม่ใช้มาตลอด แต่ตอนนี้คงไม่มีทางเลือกอื่นแล้ว ฉันคงต้องเลือกทำก่อนที่#nเรื่องมันจะใหญ่ไปกว่านี้"
84304300100-33 = "วิธีที่พยายามจะไม่ใช้งั้นเหรอ?"
84304300100-34 = "หมายถึงอะไรเหรอคะ? ฉันยังไม่รู้เรื่องนี้มาก่อนใช่มั้ยคะ?"
84304300100-36 = "ยังไม่มีใครรู้ทั้งนั้นละ ในความเป็นจริงแล้ว นอกจากฉันก็ไม่มีใครรู้เลย"
84304300100-37 = "มีระบบหนึ่งที่ฉันเคยใช้สมัยที่ยังไม่ออกไปจากโรงเรียน... ซึ่งมันต่างจากของปัจจุบันนิดหน่อย"
84304300100-41 = "ฉันจะใช้ระบบ <บิ๊กซิสเตอร์ อัลกอริทึม>"

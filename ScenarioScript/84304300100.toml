[translation]
84304300100-5 = "（寧瑠返回了藏身處，並向莉央和聖亞說明情況）"
84304300100-8 = "居然發生了那種事啊。"
84304300100-9 = "所以對方已經知道莉央同學的事……而且還不單只是學生會長的身分……"
84304300100-10 = "這樣理解應該是對的吧。"
84304300100-11 = "不過那些話感覺是刻意說給我們聽的，所以還是別被過度影響比較好。"
84304300100-12 = "……聽到了吧？莉央。"
84304300100-14 = "啊，嗯。我並不在意。"
84304300100-15 = "……其實那些話本身也沒說錯。"
84304300100-16 = "不是，你明明就超在意的嘛。#n就跟你說沒必要放在心上的。"
84304300100-17 = "事實就是事實。#n所以我才需要「證明」自己。"
84304300100-18 = "證明……"
84304300100-19 = "等一下，我不是已經跟你講過……"
84304300100-20 = "這次的事也是從那之中延伸出來的。#n為了回來……為了能在其他千年學生面前抬頭挺胸，我需要立下功勞。"
84304300100-21 = "我應該跟你解釋過了才對，寧瑠。"
84304300100-22 = "……算了。#n事到如今，不管再跟你說幾遍同樣的話，你大概也聽不進去吧。"
84304300100-24 = "……功勞。"
84304300100-25 = "現在還有其他學園的人在，就別再說那些有的沒的了吧。"
84304300100-26 = "所以接下來該怎麼辦？#n抱歉剛才讓相關人員溜了，難道又得等到事情爆發嗎？"
84304300100-27 = "恐怕沒那麼容易。#n既然對方已經知道我們在追蹤，他們應該不敢像之前那樣大膽行動……"
84304300100-28 = "這點不用擔心。我們不會繼續等待問題發生了。"
84304300100-29 = "雖然我並不想使用這個方法，但現在也無可奈何。#n得在事情擴大之前使用它才行。"
84304300100-33 = "不想使用的方法？"
84304300100-34 = "那是什麼？是我沒聽說過的方法嗎？"
84304300100-36 = "你們兩個都是第一次聽到吧。#n實際上除了我之外，應該沒有任何人知道。"
84304300100-37 = "是在我還沒離開學園……跟現在不太一樣的時候所使用的系統。"
84304300100-41 = "……我要使用「大姐頭演算法」。"

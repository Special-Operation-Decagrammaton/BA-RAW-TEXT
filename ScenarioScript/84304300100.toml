84304300100-5 = "#na;(은신처로 돌아가, 리오와 세이아에게 있었던 일들을 설명하였다.)"
84304300100-6 = "5;네루 교복;01\n1;세이아;01\n#1;a\n#5;a\n#1;h\n#5;h"
84304300100-7 = "#wait;500"
84304300100-8 = "1;세이아;99;과연, 그런 일이 있었군요.\n#1;em;…"
84304300100-9 = "1;세이아;01;그러면 상대는 이미 리오 씨에 대해 알고 있다…… 단순히 '학생회장으로서 인지하고 있는 수준'은 아니다……."
84304300100-10 = "1;세이아;02;그렇게 인지하는 편이 맞겠지요."
84304300100-11 = "5;네루 교복;24;뭐, 그 부분은 일부러 들으라는 듯이 한 말이었으니, 오히려 휘둘리지 않는 게 중요하다고 봐야겠지.\n#5;em;[한숨]"
84304300100-12 = "5;네루 교복;23;……듣고 있지? 리오."
84304300100-13 = "#all;hide"
84304300100-14 = "3;리오;02;아, 응. 상관없어. \n#3;em;[반응]\n#3;a"
84304300100-15 = "3;리오;07;……사실 그 내용 자체는 딱히 틀린 이야기도 아니고 말이야."
84304300100-16 = "3;네루 교복;04;아니, 완전 신경 쓰고 있잖아. 방금 막 그걸 신경 쓰지 말라고 했잖아.\n#3;stiff\n#3;em;[세로선]"
84304300100-17 = "3;리오;01;하지만 사실은 사실이야. 그렇기 때문에, 나는 스스로를 '증명'할 필요가 있는 거고."
84304300100-18 = "3;세이아;01;증명…….\n#fontsize;50"
84304300100-19 = "3;네루 교복;06;아니, 그러니까. 그게 아니라…….\n#3;stiff"
84304300100-20 = "1;리오;02;애초에 이번 일도 그것의 연장선이야. 돌아오기 위해, 밀레니엄의 다른 학우들에게 떳떳하기 위해서라도 내게는 공적이 필요해.\n#3;m5\n#1;ar"
84304300100-21 = "1;리오;01;너에게는 미리 설명했을 텐데, 네루."
84304300100-22 = "3;네루 교복;24;……됐다. 이제 와서 같은 말 몇 번 더 해봐야 너한테는 씨알도 안 먹히겠지.\n#3;em;[속상함]"
84304300100-23 = "#all;hide"
84304300100-24 = "3;세이아;01;……공적.\n#fontsize;50"
84304300100-25 = "3;네루 교복;05;됐고, 다른 학교 사람도 듣는데 쓸데없는 소리는 거기까지 하지. \n#3;em;[한숨]"
84304300100-26 = "3;네루 교복;00;그래서 이제 어떻게 할 거야? 미안하지만 관련자들은 놓쳐버렸어. 또 일이 터질 때까지 대기하고 있어야 하나?"
84304300100-27 = "3;세이아;06;쉽지는 않아 보이네요. 이미 저희가 자신들을 추적하고 있다는 걸 알게 된 이상, 행동을 전처럼 대담하게 하지도 않을 거고…….\n#3;stiff"
84304300100-28 = "3;리오;01;그 부분은 문제없어. 우리도 더는 문제가 발생하기를 기다리고 있지 않을 테니까.\n#3;em;[반응]"
84304300100-29 = "3;리오;01;지금까지는 쓰지 않으려 했던 방법이지만, 지금으로서는 다른 방도가 없으니. 일이 커지기 전에 쓰는 수밖에 없어."
84304300100-30 = "#st;[0,0];instant;1;"
84304300100-31 = "#clearST"
84304300100-32 = "3;네루 교복;17\n#3;em;[?]\n#3;h\n#wait;1000"
84304300100-33 = "3;네루 교복;00;쓰지 않으려 했던 방법이라고?"
84304300100-34 = "3;세이아;04;그게 뭐죠? 저는 처음 듣는 내용일까요?\n#3;em;[땀]"
84304300100-35 = "#all;hide"
84304300100-36 = "3;리오;99;두 사람 모두에게 처음 듣는 이야기일 거야. 사실, 나 외에는 알고 있는 사람이 없다시피 하는 거니까."
84304300100-37 = "3;리오;07;내가 아직 학교를 떠나지 않았을 때…… 지금과는 조금 달랐던 때에 사용했던 시스템."
84304300100-38 = "#st;[0,0];instant;1;"
84304300100-39 = "#clearST"
84304300100-40 = "3;리오;01\n#3;h\n#wait;1200"
84304300100-41 = "3;리오;00;……<빅 시스터 알고리즘>을 사용할 거야.\n#3;closeup"

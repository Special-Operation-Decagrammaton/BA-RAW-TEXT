[translation]
84304300100-5 = "Neru returned to the hideout and told Rio and Seia what happened."
84304300100-8 = "...So that's what happened."
84304300100-9 = "Then our opponent already knows about Rio...and knows more about her than her name and station."
84304300100-10 = "We should keep that in mind."
84304300100-11 = "But apparently, she WANTED us to know that she knew that, so we shouldn't dwell on it."
84304300100-12 = "...You listening, Rio?"
84304300100-14 = "I am. And it doesn't matter. "
84304300100-15 = "...It's not that anything she said was particularly wrong."
84304300100-16 = "See, you're dwelling on it. I just told you not to."
84304300100-17 = "The facts are the facts. I just have to prove I can be better than that."
84304300100-18 = "Prove..."
84304300100-19 = "That's not what I mean..."
84304300100-20 = "That's why I'm here, you know. If I want to come back to Millennium, with my head held high, I'll need some kind of accomplishment."
84304300100-21 = "Like I told you, Neru."
84304300100-22 = "...Never mind. I don't think I can explain it in a way you'll understand."
84304300100-24 = "An accomplishment..."
84304300100-25 = "Let's drop it. There's someone from another school here. It wouldn't be appropriate to keep talking about it now. "
84304300100-26 = "So what's our next move? It sucks, but all our leads ran off. Are we just going to stand around until they do something else?"
84304300100-27 = "Hard to say. Now that they know we're tracking them, they're not going to move as boldly."
84304300100-28 = "We are NOT going to \"stand around until they do something else.\""
84304300100-29 = "...I was hoping it wouldn't come to this, but we have no other choice now. Before this escalates any further, we'll have to take drastic measures."
84304300100-33 = "Drastic measures?"
84304300100-34 = "What do you mean?"
84304300100-36 = "I haven't told either of you. Actually, I've never told anyone."
84304300100-37 = "Back before I left school...there was a SLIGHTLY different surveillance system. Which I can now access again."
84304300100-41 = "...I'm going to use the Big Sister Algorithm."

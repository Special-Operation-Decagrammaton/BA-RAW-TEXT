[translation]
70002020-1 = "วันที่เปล่งประกายของคิราระและเอริกะ 2"
70002020-5 = "ไฮฮาย! ยินดีที่ได้เจอนะ!"
70002020-6 = "ที่นี่คือห้องพักผ่อนของแพนเดโมเนียม โซไซตี้ใช่มั้ยนะ?"
70002020-7 = "ฉันมาที่นี่เพราะได้ยินว่าให้ลองทำกิจกรรมของชมรมได้น่ะ"
70002020-15 = "มาแล้วเหรอ..."
70002020-16 = "คนที่บอกว่าอยากสัมผัสเกียรติภูมิของประธานสภานักเรียนสถาบันเกเฮนน่า...!"
70002020-17 = "ยินดีต้อนรับสู่แพนเดโมเนียม โซไซตี้!"
70002020-22 = "หืม? นี่กล่าวต้อนรับพวกเราอยู่ใช่มั้ย?"
70002020-23 = "น่าจะนะ"
70002020-24 = "งั้นคุณมีหน้าที่ต้อนรับแขกของแพนเดโมเนียม โซไซตี้เหรอ?"
70002020-26 = "ว่าไงนะ...?! รับแขกเหรอ...?! "
70002020-27 = "ได้ยลโฉมท่านมาโคโตะผู้นี้แล้วยังกล้าพูดแบบนั้นอีก...?! "
70002020-28 = "เราคือผู้นำตลอดกาลของแพนเดโมเนียมโซไซตี้! ท่านมาโคโตะ ผู้นำที่ยิ่งใหญ่ที่สุดที่จะได้คิโวทอสมาครอบครองไว้ในกำมือ!"
70002020-29 = "อ้อ~ งั้นเหรอ~?"
70002020-30 = "ทำไมจู่ๆ ก็ทำหน้าเหมือนหมดสนุกเลยล่ะ..."
70002020-31 = "ไม่สิ... ไม่ได้ เราจะหวั่นไหวไปกับท่าทีของเด็กใหม่ที่ยังแยกแยะผิดชอบชั่วดีในโลกนี้ไม่ได้"
70002020-32 = "ฮึ่ม งั้นกลับไปที่จุดเริ่มต้นอีกรอบ..."
70002020-33 = "หึหึหึ...! สนใจอยากทำกิจกรรมของแพนเดโมเนียม โซไซตี้งั้นเหรอ?"
70002020-34 = "คิดดีแล้วละ คิราระและก็เอริกะ!"
70002020-35 = "หืม? ท่านประธานรู้จักชื่อพวกเราด้วยเหรอ?"
70002020-36 = "หึหึหึ ก็แหงน่ะสิ"
70002020-37 = "เราต้องจำชื่อคนที่พากเพียรมาที่แพนเดโมเนียม โซไซตี้แล้วก็คิดอยากลองทำกิจกรรมของเราได้อยู่แล้ว"
70002020-38 = "เรื่องแค่นี้น่ะไม่เหลือบ่ากว่าแรงของท่านมาโคโตะหรอก..."
70002020-39 = "หึหึหึ... หากพวกเธอมุมานะอยู่เรื่อยๆ ละก็ อาจจะได้เป็นผู้บริหารรุ่นใหม่ของแพนเดโมเนียม โซไซตี้ ในอนาคตก็ได้..."
70002020-40 = "อ่า ฉันไม่ได้สนใจตำแหน่งนั้นหรอกนะ"
70002020-41 = "ว่าไงนะ?! "
70002020-42 = "อึก เพราะมันต้องใช้เวลาอีกมากกว่าจะไปให้ถึงตรงนั้น คงคิดแบบนี้อยู่สินะ"
70002020-43 = "ใช่แล้วละ... การหวังให้ไกลและเคลื่อนไหวอย่างสุขุมคือข้อควรปฏิบัติของผู้นำที่ดี"
70002020-44 = "อืม... เธอหวังสูงถึงตำแหน่งนั้นเลยงั้นรึ โยซากุระ คิราระ...!"
70002020-45 = "เรายังไม่ได้คิดถึงเรื่องนั้นเลยนะ"
70002020-48 = "เชิญเลยค่ะ ยินดีต้อนรับสู่การลองทำกิจกรรมของชมรมนะคะ"
70002020-49 = "จะว่าไป... ไม่บ่อยเลยนะคะที่จะมีใครมาลองทำกิจกรรมของเรา"
70002020-51 = "อื้อ! ขอบใจนะ! ปกติแล้วแพนเดโมเนียม โซไซตี้ทำงานอะไรกันเหรอ?"
70002020-52 = "ได้ยินมาว่ามีบทบาทคล้ายๆ สภานักเรียนของสถาบันเกเฮนน่า"
70002020-53 = "งั้นก็คงจะเป็นงานพวกจัดการงบประมาณโรงเรียน หรือไม่ก็ทำงานเอกสารต่างๆ รึเปล่า?"
70002020-55 = "ถูกต้องแล้วค่ะ นั่นก็เป็นงานส่วนหนึ่งที่เราทำ"
70002020-56 = "แต่ว่างานหลักของเราคือการเป็นหน้าเป็นตาให้กับเกเฮนน่า เราจึงต้องประสานงานกับภายนอก และทำข้อตกลงกับบริษัทการค้าภายนอก... มันควรจะเป็นงานแบบนี้น่ะค่ะ"
70002020-57 = "แต่ว่า... มันช่างน่าละอายที่ปกติแล้วงานที่เราทุ่มเททำกันก็คือการเก็บกวาดสิ่งที่รุ่นพี่มาโคโตะไปก่อเรื่องเอาไว้..."
70002020-58 = "(เหล่...)"
70002020-59 = "หืม? ทำไมกัน อิโรฮะ? มีอะไรติดที่หน้าของเรารึ?"
70002020-60 = "เปล่าค่ะ... ไม่มีอะไรทั้งนั้นค่ะ เฮ้อ..."
70002020-62 = "งั้นคุณก็คงเหนื่อยไม่เบาเลยสินะ"
70002020-66 = "กลับมาแล้วค่า~"
70002020-67 = "เอ๋? พี่ๆ สมาชิกชมรมกลับบ้าน?"
70002020-69 = "เอ๋?"
70002020-70 = "ไง อิบูกิจัง!"
70002020-71 = "สวัสดีอิบูกิ เจอกันอีกแล้วนะ"
70002020-72 = "ว้าว! พี่ๆ! ยินดีที่ได้เจอนะ! มาเที่ยวกันเหรอ?"
70002020-73 = "วันนี้พวกฉันมาลองทำกิจกรรมชมรมแพนเดโมเนียม โซไซตี้ของอิบูกิจังน่ะ! แต่ก็นะ คงไม่ได้ต่างจาก#nมาเที่ยวเล่นหรอก!"
70002020-74 = "จริงเหรอ?! ยินดีต้อนรับนะ!"
70002020-75 = "แต่จะว่าไป นี่ก็นานแล้วนะที่เราไม่ได้เจออิบูกิ แต่พอเจอก็รู้สึกคุ้นเคยเหมือนเดิมเลย"
70002020-76 = "หรือเพราะเราได้เห็นรูปและข่าวเกี่ยวกับอิบูกิจากใน <แพนเดโมเนียม โซไซตี้รายสัปดาห์> บ่อยๆ?"
70002020-78 = "แบบนี้สินะ... งานที่รุ่นพี่มาโคโตะแต่งขึ้นมาแล้วให้จิอากิไปทำแทนก็ไม่ได้สูญเปล่าสินะคะ"
70002020-79 = "หึหึหึ! เพิ่งจะมาเห็นคุณค่าที่แท้จริงของเรารึไง! อิโรฮะ!"
70002020-80 = "ค่ะ..."
70002020-81 = "ฮึ่ม แต่ที่สำคัญกว่านั้น..."
70002020-83 = "อิบูกิ~"
70002020-84 = "เราซื้อพุดดิ้งไว้ในตู้เย็น..."
70002020-86 = "อิบูกิจัง เห็นว่าเล่นหมากเก็บเก่งเหรอ! ฉันอ่านเจอมาใน <แพนเดโมเนียม โซไซตี้รายสัปดาห์> น่ะ!"
70002020-87 = "เล่นให้พวกเราดูหน่อยได้มั้ย?"
70002020-88 = "อื้ม! ได้อยู่แล้ว!"
70002020-89 = "อิบูกิเป็นเซียนหมากเก็บเลยละ อิบูกิจะโชว์ให้พี่ๆ ดูเอง!"
70002020-90 = "ยะฮู้ว~ จะได้เล่นหมากเก็บกับอิบูกิจังเหรอเนี่ย น่าตื่นเต้นจัง~"
70002020-91 = "ตรงนี้ที่แคบ งั้นเราไปเล่นตรงโน้นกันเถอะ"
70002020-97 = "......"
70002020-98 = "อะ... อิบูกิ...? พุดดิ้ง... ในตู้เย็น..."
70002020-99 = "อ่า..."
70002020-101 = "อะ... อิบูกิ...?! ชอบคนที่เพิ่งเคยเจอมากกว่าเรางั้นเหรอ...!"
70002020-102 = "มะ... ไม่มีทางหรอก... ใช่มั้ย?!"
70002020-103 = "อิบูกิ! บะ... บอกมานะว่านี่คือเรื่องโกหกน่ะ! อิบูกิ...!"
70002020-109 = "ก็ถือว่าดีแล้วนะคะ"
70002020-110 = "งั้นวันนี้ก็อาจจะผ่านไปแบบเงียบๆ ได้นะคะ"
70002020-116 = "สนุกสุดๆ ไปเลยนะที่ได้เล่นกับอิบูกิจัง!"
70002020-117 = "แบบนี้คงไปทำกิจกรรมของชมรมต่อไปสายแน่ๆ เรารีบไปกันเถอะ"
70002020-118 = "อะฮ่าฮ่า! นั่นสินะ ต่อไปคือที่ไหนนะ?"
70002020-120 = "ต่อไปก็..."
70002020-123 = "เชิญเลยค่ะ! พวกเราชมรมโภชนาการแห่งเกเฮนน่าค่ะ!"
70002020-124 = "ยินดีต้อนรับสู่การลองทำกิจกรรมของเราค่ะ!"
70002020-126 = "*ฟุดฟิด* กลิ่นของอร่อย! รู้สึกหิวขึ้นมาเลยแฮะ!"
70002020-127 = "ฉันมาโรงอาหารก็บ่อย แต่นี่เป็นครั้งแรกเลยละที่ได้เข้ามาถึงในห้องครัว"
70002020-129 = "งั้นเหรอ ที่นี่ก็คือที่เตรียมอาหารให้นักเรียนเกเฮนน่า ยินดีต้อนรับสู่ห้องครัวของเกเฮนน่านะ"
70002020-130 = "เคยทำอาหารกันบ้างมั้ย?"
70002020-131 = "อืม... ก็มีทำมันฝรั่งต้มกับเนื้อที่บ้านบ้าง ทำได้ประมาณนั้นน่ะ"
70002020-132 = "อะฮ่า! ส่วนฉันไม่เคยทำเลย!"
70002020-134 = "ไม่เป็นไรค่ะ! เรื่องการทำอาหารน่ะ เรียนรู้ไปเดี๋ยวก็ทำได้ค่ะ!"
70002020-135 = "ถึงจะเป็นแค่การลองทำกิจกรรมชมรมก็เถอะ แต่วันนี้ฉันจะสอนให้อย่างตั้งใจเลยค่ะ!"
70002020-136 = "อืม ฉันเองก็อยากช่วยหรอกนะ แต่ว่าต้องทำข้าวเย็นให้ทุกคน"
70002020-137 = "ปกติแล้วฉันจะขับรถไปรับวัตถุดิบทั้งหมดแล้วขนมาไว้ที่นี่รวดเดียว จากนั้นก็ค่อยเตรียมอาหาร ถ้าทำแบบนั้นแล้วก็จะพอมีเวลาเหลืออยู่บ้าง..."
70002020-138 = "แต่ว่าตอนนี้รถ... รถขนเสบียงของชมรมโภชนาการ..."
70002020-142 = "อึก...!"
70002020-143 = "ระ... รุ่นพี่ฟูกะ!"
70002020-144 = "ฮู่ว... งั้นวันนี้ฉันขอฝากเรื่องการลองทำกิจกรรมชมรมกับจูริแล้วกันนะ"
70002020-145 = "ค่ะ! ไม่ต้องห่วงนะคะรุ่นพี่ฟูกะ! ฉันจะค่อยๆ สอนตั้งแต่พื้นฐานให้เลยค่ะ!"
70002020-146 = "ขอบใจนะ ถ้างั้นฉันขอตัวก่อน..."
70002020-150 = "เอาละ ทั้งสองคนตามฉันมาเลยค่ะ!"
70002020-151 = "ฉันจะพาไปดูอุปกรณ์ต่างๆ ของชมรมโภชนาการ และจะสาธิตทำอาหารให้ดูด้วยค่ะ!"
70002020-153 = "อะฮ่าฮ่า! รู้สึกเหมือนจะเป็นก้าวแรกของเชฟคิราระเลย ตื่นเต้นจัง!"
70002020-156 = "เอาละ นี่คือด้านในของห้องครัวค่ะ"
70002020-157 = "ตรงนี้คือที่เก็บถ้วยชาม ส่วนทางนี้ก็เตา..."
70002020-159 = "ปกติต้องทำอาหารมากแค่ไหนในห้องครัวกว้างๆ แบบนี้เหรอ?"
70002020-161 = "อืม... วันๆ หนึ่งก็ทำให้หลายพันคนเลยค่ะ"
70002020-163 = "เฮือก?! จริงเหรอ?!"
70002020-164 = "แต่ก็นะ แค่นักเรียนที่มาโรงอาหารในแต่ละวันก็เยอะมากแล้ว คงหนีไม่พ้นที่ต้องทำอาหารเยอะๆ สินะ"
70002020-165 = "แบบนี้ก็เหนื่อยแย่เลยนะ~"
70002020-166 = "ตอนแรกก็เหนื่อยอยู่หรอก แต่ว่าตอนนี้ฉันชินแล้วค่ะ!"
70002020-167 = "เอาละ ต่อไปจะเป็นสาธิตการทำอาหารจากผู้ช่วยที่มีฝีมือค่ะ!"
70002020-168 = "อันดับแรกคือเมนูพื้นฐาน นั่นก็คือข้าวห่อไข่ค่ะ!"
70002020-169 = "โอ้ว...?"
70002020-180 = "ทำอย่างนี้ แล้วก็อย่างนี้ จากนั้นก็ใส่จาน... แถ่นแท้น!"
70002020-182 = "เป็นยังไงบ้างคะ?"
70002020-186 = "นี่สินะผู้เชี่ยวชาญ..."
70002020-194 = "เดี๋ยวนะ... ฉันว่ามีอะไรแปลกๆ"
70002020-195 = "ปกติแล้วข้าวห่อไข่เป็นสีเขียวเหรอ?"
70002020-196 = "คะ? ไม่ใช่เหรอคะ?"
70002020-197 = "ละ... แล้วมันก็ขยับได้ด้วย? ทำอาหารอะไรมาเนี่ย?"
70002020-198 = "อะฮ่าฮ่า! กระดุกกระดิกได้ด้วย ดุ๊กดิ๊กๆ น่ารักจัง~!"
70002020-199 = "หืม? ยื่นมือออกมาด้วย จะทักทายกันเหรอ?"
70002020-200 = "ดะ... เดี๋ยวก่อนนะ นี่มันโอเคจริงๆ เหรอคิราระ?"
70002020-202 = "ทำไมล่ะ มันน่ารักออก? มาเลย ไฮไฟว์!"
70002020-207 = "ไฮไฟว์กันด้วย...?!"
70002020-211 = "เป็นสถานการณ์ที่คาดไม่ถึงเลยนะ... "
70002020-212 = "แต่ก็นะ นี่ก็เป็นนิสัยของคิราระจังอยู่แล้ว"
70002020-213 = "หืม? ออมเล็ตจัง?"
70002020-223 = "อ๊ะ หนีไปซะแล้ว"
70002020-224 = "ออมเล็ตจังงั้นเหรอ...? อย่าบอกนะว่านั่นคือชื่อน่ะ?"
70002020-225 = "ดะ... เดี๋ยวก่อนสิคะ! ออมเล็ตจัง!"
70002020-226 = "อื้ม... เป็นชื่อสินะ"
70002020-227 = "จะ... จู่ๆ ก็หนีไปแบบนั้นเดี๋ยวก็เป็นเรื่องหรอกคะ!"
70002020-228 = "ยะ... หยุดอยู่ตรงนั้นเลยนะคะ~!"
70002020-232 = "ชมรมโภชนาการก็... ต้องเหน็ดเหนื่อยไม่เบาเลยนะเนี่ย"
70002020-233 = "อะฮ่าฮ่าฮ่า! ดูสนุกและก็หัวหมุนดีแฮะ!"
70002020-234 = "ออมเล็ตจังงงง~~!"
70002020-236 = "(แล้วการลองทำกิจกรรมของชมรมโภชนาการก็ต้องจบลงเพราะเหตุที่เกิดในห้องครัว)"
70002020-241 = "ทั้งสองคนคือคนที่จะมาลองทำกิจกรรมของชมรมเราใช่ไหมคะ?"
70002020-243 = "สวัสดี! ฉันชื่อคิราระ! ฝากตัวด้วยน้า~"
70002020-244 = "ส่วนฉันเอริกะ"
70002020-246 = "สวัสดีค่ะ ฉันชื่อฮิมูโระ เซนะ เป็นหัวหน้าหน่วยแพทย์ฉุกเฉินค่ะ"
70002020-247 = "นึกไม่ถึงเลยนะว่าทางชมรมหน่วยแพทย์ฉุกเฉินก็เปิดให้คนอื่นมาลองทำกิจกรรมด้วย"
70002020-248 = "เห็นว่างานยุ่งกันตลอด ฉันเลยคิดว่าไม่น่าจะมีเวลาให้คนอื่นมาลองทำงานของหน่วยแพทย์น่ะ"

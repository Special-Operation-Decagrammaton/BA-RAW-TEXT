[translation]
70002020-1 = "キララとエリカのキラキラな日（２）"
70002020-5 = "はろはろ～！"
70002020-6 = "[ruby=パンデモニウム・ソサエティー]万魔殿の休憩室[/ruby]ってここであってる？"
70002020-7 = "体験入部したいんだけど、良いかな？"
70002020-15 = "……よく来た。"
70002020-16 = "――ようこ[ruby=パンデモニウム・ソサエティー]そ、万魔殿へ。[/ruby]"
70002020-17 = "ゲヘナ学園生徒会長であるこのマコト様と接する栄誉を、お前たちに授けよう。"
70002020-22 = "授かった～！で、合ってる？"
70002020-23 = "多分。"
70002020-24 = "どこかで見たことある気がするけど、あなたが受付の人？"
70002020-26 = "なっ……！？受付……！？"
70002020-27 = "このマコト様を……知らない、だと！？"
70002020-28 = "私こそ[ruby=パンデモニウム・ソサエティー]が、万魔殿の永[/ruby]遠不滅のリーダー！#nいつかキヴォトスの覇者となる最も偉大な指導者、マコト様だ！"
70002020-29 = "へー、そうなんだ？"
70002020-30 = "なんだこいつは……無礼な奴め……。"
70002020-31 = "……いや。まだ天地の見分けもつかぬ新人に、いちいち振り回されてはならない。"
70002020-32 = "こほん。話を戻そう……。"
70002020-33 = "キキキッ……！[ruby=パンデモニウム・ソサエティー]我が万魔殿の活[/ruby]動を体験したいと言ったな。"
70002020-34 = "歓迎しよう！キララ、そしてエリカよ！"
70002020-35 = "あれ？私たちの名前知ってるの？"
70002020-36 = "キシシッ、無論だ。"
70002020-37 = "我々万魔殿に直接足を運び、さらには体験入部を求める者の名を覚える程度のこと……。"
70002020-38 = "このマコト様にとっては造作もない。"
70002020-39 = "キキキッ……期待しても良いぞ。#n今後、我々万魔殿の幹部になることだって夢では――"
70002020-40 = "んー、それは良いかな。"
70002020-41 = "なにぃっ！？"
70002020-42 = "くっ。なるほど、そこまではまだ時間が必要、ということか。"
70002020-43 = "幹部ではなく下っ端だからこそ、見えてくる景色もあると……ふむ。"
70002020-44 = "そこまで見越していたのだな、[ruby=よざくら]夜桜[/ruby]キララ……！"
70002020-45 = "違うと思うけど……。"
70002020-48 = "はい、ありがとうございます。体験入部希望ですね。"
70002020-49 = "しかし体験入部だなんて、何と言うか……奇特な方々ですね。"
70002020-51 = "普段、万魔殿って何してるの？"
70002020-52 = "ゲヘナ学園の生徒会みたいな役割とは聞いてるけど……。"
70002020-53 = "学園の運営に関わる予算管理、とか？"
70002020-55 = "はい、そういう仕事もありますね。"
70002020-56 = "他にもゲヘナの顔として、対外業務や外部との契約などを担っていますが……。"
70002020-57 = "まぁ最近は……マコト先輩のやらかしに対する後始末が多いですね……。"
70002020-58 = "じー……。"
70002020-59 = "ん？何だ、イロハ。#nマコト様の顔に、尊厳以外なにか付いているのか？"
70002020-60 = "いえ、何でもありません。#nはぁ……。"
70002020-62 = "なんだか大変そうだね。"
70002020-66 = "たっだいまー！"
70002020-67 = "あれ？帰宅部のお姉さんたち？"
70002020-69 = "え？"
70002020-70 = "イブキちゃーん！はろはろ～！"
70002020-71 = "やっほ、イブキちゃん。また会ったね。"
70002020-72 = "わあ、お姉さんたち！会えて嬉しい！#n遊びに来てくれたのー？"
70002020-73 = "そうそう！今日は体験入部に来たんだ♪#nまあ、遊びに来たのと同じかな！"
70002020-74 = "ほんと？やったー！"
70002020-75 = "イブキちゃんと会うのは久しぶりなのに、全然そんな感じしないね。"
70002020-76 = "「週刊万魔殿」で、イブキちゃんの写真をいっぱい見てるからかな？"
70002020-78 = "なるほど……。#nマコト先輩とチアキが作っているあの週刊誌、無意味ではなかったのですね。"
70002020-79 = "クククッ！ようやくマコト様の真価が分かったか！"
70002020-80 = "はいはい……。"
70002020-81 = "さて……。"
70002020-83 = "イブキ～？"
70002020-84 = "何を隠そう、冷蔵庫にプリンがあるぞー？"
70002020-86 = "そういえばイブキちゃん、お手玉が得意なんだっけ？#n「週刊万魔殿」で読んだよ！"
70002020-87 = "よかったら見せてくれない？"
70002020-88 = "いいよー！"
70002020-89 = "お姉さんたちにもお手玉教えてあげる！"
70002020-90 = "やった～、イブキちゃんのお手玉♪"
70002020-91 = "あっちでやろっか。"
70002020-97 = "……！"
70002020-98 = "い、イブキ……？"
70002020-99 = "プリン……は……？"
70002020-101 = "い、イブキぃ！？#n私よりあいつらの方が良いと言うのか！？"
70002020-102 = "そ、そんな……違うよな？"
70002020-103 = "イブキ！う、嘘だと言ってくれ！#nイブキぃ！！"
70002020-109 = "……。"
70002020-110 = "今日は静かに過ごせそうですね。"
70002020-116 = "イブキちゃんと遊ぶの、すっごく楽しかった～！"
70002020-117 = "意外と時間使っちゃったね。#n次の体験入部に間に合わないかも、急ごう。"
70002020-118 = "あははっ、そうだね！次ってどこだっけ？"
70002020-120 = "次は……"
70002020-123 = "ようこそ、ゲヘナ給食部です！"
70002020-124 = "体験入部、歓迎します！"
70002020-126 = "わ～！美味しそうな匂い！お腹空いてきちゃった！"
70002020-127 = "食堂はよく来てたけど、キッチンに入ったのは初めてかも。"
70002020-129 = "ここでみんなの食事を作ってるの。#nゲヘナの台所へようこそ。"
70002020-130 = "ちなみに二人とも、料理経験はある？"
70002020-131 = "うーん、たまに肉じゃが作るくらいかな？"
70002020-132 = "あたしはからっきしー！"
70002020-134 = "大丈夫ですよ！これから勉強していけばいいですから！"
70002020-135 = "今日は私がお教えしますね！"
70002020-136 = "ごめんね、私も手伝えたら良かったんだけど、#n夕食の仕込みをしないといけなくて……。"
70002020-137 = "いつもみたいにトラックで一気に食材を運べれば、こんなに時間かからなかったのに……。"
70002020-138 = "私たちの……。"
70002020-142 = "私たちの、給食部のトラックが……！"
70002020-143 = "ふ、フウカ先輩！大丈夫です！#nきっと戻っ……何とかなります！"
70002020-144 = "と、とりあえずそういうことだから、#n後はジュリに任せるね。"
70002020-145 = "はい、お任せください！基礎から丁寧に教えます！"
70002020-146 = "ありがとう。それじゃあ二人も、ごゆっくり……。"
70002020-150 = "それでは、私についてきてください！"
70002020-151 = "施設見学の後に、実際の料理へと移っていきましょう。"
70002020-153 = "シェフ・キララの第一歩、って感じ？#nワクワクしてきた！"
70002020-156 = "こちらがキッチン内部です。"
70002020-157 = "ここが食器棚でこちらはグリル……コンロはこれで……。"
70002020-159 = "このキッチンでいつも何人分の料理を作ってるの？"
70002020-161 = "そうですね……数千人分くらいでしょうか。"
70002020-163 = "えっ！？マジ！？"
70002020-164 = "あーでも、毎日食堂に来る生徒数すごいもんね。"
70002020-165 = "大変そ～。"
70002020-166 = "最初は大変でしたが、もう慣れました！"
70002020-167 = "それではそろそろ、料理に移ります！"
70002020-168 = "今日はまず……基本の料理であるオムライスを！"
70002020-169 = "おお……！"
70002020-180 = "こうして器に盛れば……ジャーン！"
70002020-182 = "ど、どうでしょう？"
70002020-186 = "さすがベテランは一味違う――"
70002020-194 = "……いや、ちょっと待って。"
70002020-195 = "オムライスってこんな色だっけ？"
70002020-196 = "え？違うんですか？"
70002020-197 = "というかこれ動いてるんだけど？何作ったの？"
70002020-198 = "あははっ！くねくねしてるの、ちょっとキモカワい～！"
70002020-199 = "ん？手が出てきた、挨拶？"
70002020-200 = "ちょ、ちょっと待って、それ本当に大丈夫なの？"
70002020-202 = "え、かわいくない？#nハイタ～ッチ！"
70002020-207 = "通じ合った……！？"
70002020-211 = "ビックリしたけど……。"
70002020-212 = "まあ、こういうところもキララちゃんらしいね。"
70002020-213 = "あれ、オムちゃん？"
70002020-223 = "あっ、逃げた。"
70002020-224 = "……オムちゃん、って何？名前？"
70002020-225 = "ちょ、ちょっと待ってください！オムちゃん！"
70002020-226 = "……あ、名前なんだ。っていうか共通認識なんだ。"
70002020-227 = "逃げないでください！？"
70002020-228 = "ま、待って～！"
70002020-232 = "給食部も……色々大変だったね。"
70002020-233 = "あはははっ！なんか愉快で面白かったね！"
70002020-234 = "オムちゃぁぁん！！"
70002020-236 = "（給食部の体験入部は主催側の都合により中断された）"
70002020-241 = "あなた達が体験入部の希望者でしょうか。"
70002020-243 = "はろはろ～、キララでーす！よろしくお願いしま～す！"
70002020-244 = "私はエリカ、よろしく。"
70002020-246 = "救急医学部の部長、[ruby=ひむろ]氷室[/ruby]セナです。"
70002020-247 = "ここも体験入部を受け入れてるなんて、意外だね。"
70002020-248 = "いつも忙しそうっていうか、余裕無さそうだったのに。"
70002020-249 = "むしろ逆です。目が回るほど忙しいからこそ、体験入部を受けたのです。"
70002020-250 = "え？そうなの？"
70002020-251 = "現在、自治区内で不良たちのいざこざが勃発し、多数の死体……#nいえ、負傷者が移送されています。"
70002020-253 = "早速ですが皆さんは、戦力として対応していただきますので。"
70002020-254 = "え、良いの？私たち何も知らないけど？"
70002020-255 = "絆創膏貼るくらいならできるけどねー？"
70002020-257 = "ご心配なく、もちろん専門家でない皆さんに難しいことはさせません。"
70002020-258 = "私が注射の準備をしている間、皆さんは負傷者を落ち着かせていただければ。"
70002020-259 = "では、準備を！"
70002020-261 = "合点承知～。"
70002020-265 = "まぁ……やってみよっか。"
70002020-268 = "い……痛っ……。"
70002020-269 = "ちっ、まだいけるのに、膝が……。"
70002020-270 = "弱音はそこまでにしときな！#nこのままだとあたしらのエリアが奪われるんだぞ！"
70002020-272 = "こんな怪我でくたばってる場合かっ！"
70002020-273 = "おっし！"
70002020-274 = "早く抜け出すぞ！救急医学部の部長にバレないように、こっそりな！"
70002020-275 = "はい！姉御！"
70002020-280 = "はろはろ～！#n臨時だけど白衣の天使、キララ参上～！"
70002020-284 = "だ、誰だ！？"
70002020-286 = "今日一日、体験入部で入ったの。あなた達が負傷者さん？"
70002020-287 = "よろしくね～！"
70002020-289 = "よ、よろしくもなにも！あたしらは今から戻るんだよ！"
70002020-290 = "そうだそうだ！こんな所にいつまでも居られるか！"
70002020-292 = "ん？治療したくないの？"
70002020-293 = "その傷とか、放っておいたら結構痛いと思うけど？"
70002020-294 = "んなもん知るか！"
70002020-295 = "あたしらのエリアを守る方が大事なんだよ！"
70002020-297 = "そうなの？君たちのエリアって？"
70002020-298 = "そこの十字路から少し入った屋台裏の路地、あそこだよ。"
70002020-299 = "え？クレープ屋さんのとこ？あたし、そこ知ってる！"
70002020-300 = "めっちゃおいしいよね！#nあたし常連なんだ！"
70002020-302 = "え、えっと……そうなの？それは奇遇だね。"
70002020-303 = "いつもイチゴとソフトクリーム、チョコチップトッピングが好きなんだけど、そっちは？"
70002020-304 = "私はやっぱりバナナかな。"
70002020-305 = "パイナップルとアイスクリームの組み合わせは食べてみた？美味しかったよ！"
70002020-306 = "えっ、マジ？でもそれ聞くだけで美味しそう～！"
70002020-308 = "あたしは果物好きじゃないから、チョコチップクッキーと生クリーム特盛りだな！"
70002020-309 = "え～いいな！今度やってみよ♪"
70002020-310 = "あ、そうだ！ついでに――"
70002020-315 = "あっ！？救急医学部の部長！？"
70002020-325 = "思わず……おしゃべりに……。"
70002020-331 = "麻酔完了。"
70002020-332 = "患者に銃を向けても良いの？"
70002020-333 = "治療のために必要な措置です。#n何かを守る時には、やむを得ないこともあります。"
70002020-334 = "……お二方には素質がありますね。#nこのトラブルメーカーたちの足をきちんと止められるとは。"
70002020-335 = "まあ、狙ってやったわけじゃないけど……キララちゃんの力っていうか……。"
70002020-336 = "クレープ、一緒に食べに行きたかったなー……。"
70002020-337 = "IDでも残しておいたら？#nみんな目を覚ましたら、その後一緒に行けば良いでしょ。"
70002020-338 = "あっ、そうだね！部長、良いかな？"
70002020-342 = "本来なら、患者との個人的な連絡はよろしくありませんが……。"
70002020-343 = "今回は良いでしょう、皆さんが立派に仕事を遂行してくださったお礼に。"
70002020-344 = "やったー！ありがとう、部長！部長の分も買ってくるね！"
70002020-345 = "いえ、私は結構です。"
70002020-346 = "良いから良いから、遠慮しないで～！"
70002020-349 = "ぷは～！楽しかった～！"
70002020-350 = "こんなにたくさん部活があると思わなかった！"
70002020-351 = "おかげで、私も色んな経験ができたよ。"
70002020-352 = "それで、見つかった？"
70002020-353 = "ん？何が？"
70002020-354 = "体験入部の目的、忘れちゃったの？"
70002020-355 = "キララちゃんが入りたい部活を探してたんでしょ？"
70002020-356 = "あ、そうだった！うっかりうっかり、あははっ！"
70002020-357 = "うーん……どこもめっちゃ楽しかったよね。"
70002020-358 = "新しい友達もできて、色んな経験もできて！"
70002020-359 = "そうだなぁ……体験入部した中で、一番行きたいところ……。"
70002020-363 = "……無いかも！"
70002020-365 = "え？"
70002020-366 = "さっき、めっちゃ楽しかったって言ってなかった？"
70002020-367 = "うん！めっちゃ楽しかった！ワクワクしたし！"
70002020-368 = "イブキちゃんと遊んだことも、給食部のキッチンに入ったことも、#n患者さんの面倒を見たことも！"
70002020-369 = "どれも新鮮で楽しかった！"
70002020-370 = "じゃあどうして？"
70002020-371 = "うーん……その中から一つを選ぶってなると、それは……。"
70002020-372 = "何か勿体なくない！？"
70002020-373 = "勿体ない……？"
70002020-374 = "ほら！部活ってさ！"
70002020-375 = "入部したら毎日同じ活動することになるでしょ？"
70002020-376 = "それはそれで良いけど、あたしの性に合わないっていうか……。"
70002020-377 = "何か、もったいないなーって。"
70002020-378 = "……そっか。キララちゃんは毎日新しいことをしたいってこと？"
70002020-379 = "そうそう、さっすがエリカちゃん！あたしの気持ちを一番良く分かってる～！"
70002020-380 = "だってその方があたし的に、キラキラしてワクワクする最高の毎日になりそうだし？"
70002020-381 = "それってすっごく青春じゃん！"
70002020-386 = "例えば、新しい友達を作ったり――"
70002020-394 = "トラックを追いかけて走ったり――"
70002020-404 = "道に迷った友達を助けたり――"
70002020-407 = "そういう、毎回予想できないことがしたいの！"
70002020-408 = "でもそれ、帰宅部としていつもやってることじゃない……？何か違うの？"
70002020-409 = "ん～そうだけど！#n部活ってやっぱり、形式が大事なんだよ！"
70002020-410 = "青春の花は部活だし♪"
70002020-411 = "そう、なのかな……？"
70002020-412 = "でもそうなると、キララちゃんが望むような部活は無さそうだけど？"
70002020-413 = "そうなんだよねー……。"
70002020-414 = "うーーーん……。"
70002020-418 = "……あ！良いこと思いついた！"
70002020-419 = "どうしたの？"
70002020-420 = "無ければ作れば良いんだよ！"
70002020-421 = "キラキラな部活！"
70002020-422 = "毎日が想定外のワクワクに溢れた、新しい部活を！"
70002020-427 = "作る、か……そうだね。#nキララちゃんらしい結論。"
70002020-428 = "じゃあ部活の名前は何にする？"
70002020-429 = "う～ん、ワクワクして、キラキラな部活であってほしいから……。"
70002020-431 = "まんまだけど、「キラキラ部」とか？"
70002020-433 = "うん！語感も気に入った！エリカちゃんはどう？"
70002020-434 = "まあ、確かにそのままだけど……。"
70002020-435 = "良いんじゃない、何だかんだそれしか無さそうだし。"
70002020-436 = "私も賛成だよ、キラキラ部。"
70002020-437 = "いいね！んじゃ、設立記念にタピオカ飲みに行こっか！"
70002020-438 = "え、今から？"
70002020-439 = "思いついた瞬間からやりたいことをやるのが、あたしたちの部活動でしょ♪#nちょうど喉も渇いたし！"
70002020-440 = "……そうだね。ま、いつも通りか。"
70002020-441 = "んじゃ、行こ行こ～！"
70002020-442 = "新しいお店、見つけたんだ～！"
70002020-443 = "はいはい。"
70002020-453 = "あたし達「キラキラ部」――"
70002020-454 = "スタートだよっ！"
70002020-458 = "キララとエリカのキラキラな日"

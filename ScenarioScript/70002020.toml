[translation]
70002020-1 = "Kirara and Erika's Twinkling Day 2"
70002020-5 = "Yahoo! Nice to meet you!"
70002020-6 = "Are we in the right place? The Pandemonium Society break room?"
70002020-7 = "I heard we could do trial sign-ups here!"
70002020-15 = "...You've arrived."
70002020-16 = "You are the ones who sought to experience first hand the majestic greatness of Gehenna's student council president!"
70002020-17 = "Welcome to the Pandemonium Society!"
70002020-22 = "Majestic greatness? Uh, sounds cool, I think! Is this how you say hi here?"
70002020-23 = "I think that's what she was trying to say..."
70002020-24 = "You must be in charge of receiving guests? Like a hostess?"
70002020-26 = "H-Hostess?! Receiving guests...?"
70002020-27 = "This is your reaction to witnessing the visage of the Great Makoto?!"
70002020-28 = "I am the Pandemonium Society's eternal leader! The Great Makoto! I am destined to rule over all of Kivotos!"
70002020-29 = "Hm? Good for you!"
70002020-30 = "Your lack of interest is plastered all over your face..."
70002020-31 = "No! I won't let my self-esteem be affected by some newcomer who simply has yet to understand my greatness."
70002020-32 = "Ahem. Let us start over."
70002020-33 = "Kihehe! So, you seek to understand the very important work of the Pandemonium Society!"
70002020-34 = "I like the way you think! Kirara! Erika!"
70002020-35 = "Hm? How do you know our names?"
70002020-36 = "Kihehe. That should be a given."
70002020-37 = "Naturally, I memorized the names of the good-natured students who wanted to do a sign-up trial the Pandemonium Society!"
70002020-38 = "This kind of task is as easy as breathing for me, the Great Makoto."
70002020-39 = "Kihehe. If you put in the hard work and dedicate yourself to me, I sense great potential in you! You could even become an officer of the Pandemonium Society."
70002020-40 = "Ah. I'm not into all that \"hard work\" stuff."
70002020-41 = "What?!"
70002020-42 = "Tch. I see. You can only lead a horse to water."
70002020-43 = "Ah! Yes, you must consider the weight of responsibilities rather than flippantly accepting every opportunity. These are also qualifications of becoming a proper leader...!"
70002020-44 = "You were playing chess all along, Yozakura Kirara!"
70002020-45 = "Honestly, she wasn't thinking that far ahead."
70002020-48 = "Yeah, hi. Welcome to your trial."
70002020-49 = "It's pretty...rare for people to want to do a sign-up trial."
70002020-51 = "Really? Well, thanks! Do you guys do any fun stuff in the Pandemonium Society?"
70002020-52 = "They're more or less our student council."
70002020-53 = "So I'm guessing they take care of the academy's budget? A lot of paper pushing?"
70002020-55 = "I mean, that's all part of our job..."
70002020-56 = "...but for the most part we have to handle external affairs. We act as the face of Gehenna in acquiring contracts with vendors, stuff like that."
70002020-57 = "That's supposed to be our main role...but we spend most of our time cleaning up Makoto's messes and managing the fall out."
70002020-58 = "(stare)"
70002020-59 = "Huh? What're you looking at? Did I get pudding on my face?"
70002020-60 = "No... It's...nothing... *sigh*"
70002020-62 = "Seems like... you have it pretty rough?"
70002020-66 = "Ibuki is back!"
70002020-67 = "Oh? The Go-Home Club sisses!"
70002020-69 = "Huh?"
70002020-70 = "Oh my gosh! It's Ibuki! Hi!"
70002020-71 = "We meet again. Hi, Ibuki."
70002020-72 = "Yay! Ibuki is so happy to see you! Did you come to play with Ibuki?"
70002020-73 = "We wanted to see the club Ibuki was in and what it's like! Technically, I guess it's the same thing as coming to play!"
70002020-74 = "Really, really? Welcome!"
70002020-75 = "We haven't met up with Ibuki in a while, but, for some reason, it doesn't feel that way."
70002020-76 = "Maybe it's because I see so many pictures and articles of her everywhere? I think I saw one in \"Weekly Pandemonium Society\" just yesterday."
70002020-78 = "Hm... Makoto's crazy plot that Chiaki executed...actually did something..."
70002020-79 = "Kihehe! Bow down to my greatness! Acknowledge the value of my innovative ideas, Iroha!"
70002020-80 = "Yeah, yeah..."
70002020-81 = "Ahem. But we must attend to important matters..."
70002020-83 = "Ibuki!"
70002020-84 = "I put the pudding I bought for you in the fridge!"
70002020-86 = "By the way, Ibuki! In that \"Weekly Pandemonium Society\" article, I read that you're, like, super amazing at jacks!"
70002020-87 = "Do you wanna show us?"
70002020-88 = "Ibuki love jacks! Of course!"
70002020-89 = "Ibuki practiced it lots and lots and got really good, so Ibuki can teach you!"
70002020-90 = "Yahoo! Playing jacks with Ibuki sounds totally heart-pounding to me!"
70002020-91 = "It's a little cramped here. Let's go play over there."
70002020-97 = "..."
70002020-98 = "I-Ibuki? But...the pudding... I got you pudding..."
70002020-99 = "P-Pudd..."
70002020-101 = "Does Ibuki like them better than me? Even though she barely knows them? Ibuki?!"
70002020-102 = "That's...simply an impossibility! R-Right?"
70002020-103 = "Tell me I'm wrong! Please, Ibuki! IBUKIII!"
70002020-109 = "...I guess this works out."
70002020-110 = "We might actually have a quiet day for once."
70002020-116 = "Playing with Ibuki was super fun!"
70002020-117 = "Yeah, but we need to hurry to our next trial. We're gonna be late."
70002020-118 = "Hahaha! I didn't even notice the time. What's the next destination?"
70002020-120 = "Next is..."
70002020-123 = "Welcome to the Gehenna School Lunch Club!"
70002020-124 = "I hope you enjoy your trial with us!"
70002020-126 = "Yummy! It smells sooo good. I think my stomach's rumbling!"
70002020-127 = "We're obviously in the dining hall all the time, but I've never been in the kitchen before."
70002020-129 = "Most haven't. We make all of the meals for the students' lunches here!"
70002020-130 = "How much cooking experience do you two have?"
70002020-131 = "Uh, I guess I make some meat and potato stew at home sometimes..."
70002020-132 = "None! Zero! Hahaha."
70002020-134 = "That's okay! You can always learn to cook!"
70002020-135 = "Even though it's just a trial today, I'll try to teach you everything I can!"
70002020-136 = "I'd love to lend a hand, but I really need to get going on the evening meal."
70002020-137 = "Normally, we'd get all the ingredients, then, easy peezy! Transfer them to the kitchen! The truck makes this process smooth and easy."
70002020-138 = "But our truck... The School Lunch Club's truck...it's..."
70002020-142 = "...Ugh!"
70002020-143 = "F-Fuuka!"
70002020-144 = "*sigh* Well, that's the situation. So I'll have to leave you in Juri's hands today."
70002020-145 = "Don't worry about a single thing, Fuuka! I'll teach them all the basics!"
70002020-146 = "Thank you. I'll see you soon..."
70002020-150 = "For the two of you, please come this way!"
70002020-151 = "I'll give you a tour of the School Lunch Club's facilities, and then we'll do a cooking demonstration!"
70002020-153 = "Hahaha! How exciting! It's the making of Kirara, chef edition!"
70002020-156 = "This is our kitchen!"
70002020-157 = "We store all our plates here, the grill is here, and the stovetop over here..."
70002020-159 = "This kitchen is huge. How much food do you make in a day?"
70002020-161 = "Hm... We need to make a few thousand people's worth of meals on a daily basis!"
70002020-163 = "*gasp* Seriously?!"
70002020-164 = "I've never thought about it before, but it totally makes sense. A ton of students visit the dining hall every day!"
70002020-165 = "You work real hard in here!"
70002020-166 = "It was a bit demanding at first, but you get used to it eventually!"
70002020-167 = "Now then, please watch closely. As the sous chef in this kitchen, I'll give you a demonstration!"
70002020-168 = "We'll start with a very basic dish, omurice!"
70002020-169 = "Whoa...?"
70002020-180 = "Just a little bit of this, and this...plate it. And, ta-da!"
70002020-182 = "How is it?"
70002020-186 = "Professional chefs are on a different—"
70002020-194 = "...Hold up. This is...a little off."
70002020-195 = "Since when is omurice green?"
70002020-196 = "S-Since always?"
70002020-197 = "Actually, more importantly, is it...moving? How did you even make this?"
70002020-198 = "Hahaha! Look, it's squirming around. It's, like, gross but kinda cute?"
70002020-199 = "Oh my gosh! It's reaching out its little hand. I think it wants to say hi!"
70002020-200 = "W-Wait. Are you sure that's safe, Kirara?"
70002020-202 = "Isn't it cute, though? Gimme a high five!"
70002020-207 = "She's communicating with it?!"
70002020-211 = "I didn't know that was possible... "
70002020-212 = "I shouldn't be surprised, actually. That's just what makes you, you, Kirara."
70002020-213 = "Huh? Omu?"
70002020-223 = "Ah, it ran away."
70002020-224 = "Also, did you just name it?"
70002020-225 = "Omu! Come back!"
70002020-226 = "Yup. She named it."
70002020-227 = "I'm gonna get in trouble if you get loose!"
70002020-228 = "Please come back here!"
70002020-232 = "The School Lunch Club...has its own struggles, huh?"
70002020-233 = "Hahaha! I love the chaotic vibes!"
70002020-234 = "OMUUU!"
70002020-236 = "The School Lunch Club sign-up trial ended unexpectedly."
70002020-241 = "Are you the ones who signed up for the trial?"
70002020-243 = "That's us! I'm Kirara! Nice to meet you!"
70002020-244 = "I'm Erika."
70002020-246 = "Hello, I am the Medical Emergency Club president, Himuro Sena."
70002020-247 = "I was surprised we were even able to sign up for a trial."
70002020-248 = "You all are always so busy. I didn't think you'd have the time for it."
70002020-249 = "You're correct, but that's precisely why we're hosting a trial."
70002020-250 = "How so?"
70002020-251 = "Multiple corpses, excuse me, patients are being transferred here due to some territory battles between thugs in the district."
70002020-253 = "During your trial, you'll be helping with the emergency response team."
70002020-254 = "A-Are you sure? We're not exactly trained professionals..."
70002020-255 = "I'm pretty good at putting on band-aids!"
70002020-257 = "Rest assured. I wouldn't ask you to do anything that requires medical training."
70002020-258 = "Your job will be to comfort the injured patients while I prep their treatments."
70002020-259 = "Now, to your positions!"
70002020-261 = "To positions!"
70002020-265 = "Well, let's see how this goes."
70002020-268 = "Ouch... It hurts..."
70002020-269 = "Tch. I'd still be out there fighting, but I took a bullet to the knee..."
70002020-270 = "We're seriously gonna lose our territory at this rate! Stop being dramatic!"
70002020-272 = "You really need medical care because of a little scratch? Huh?"
70002020-273 = "What are we supposed to do?!"
70002020-274 = "We have to fight! Now shut up and follow me. We're gonna sneak past the Medical Emergency Club president!"
70002020-275 = "Okay...!"
70002020-280 = "Yahoo! Hello, patients! Temporary Angel Nurse Kirara, at your service? Did I say that right?"
70002020-284 = "Wh-Who are you?!"
70002020-286 = "We're just some sign-up trial participants. Are you the new patients?"
70002020-287 = "Nice to meet you!"
70002020-289 = "We ain't meeting no one! We're getting outta here!"
70002020-290 = "Yeah! You can't keep us here!"
70002020-292 = "Huh? You don't want to get treated for your wounds?"
70002020-293 = "They're pretty small, but I'm sure it still hurts."
70002020-294 = "We're thugs! Hardened thugs! Pain don't mean a thing to us!"
70002020-295 = "Protecting our territory comes before anything else!"
70002020-297 = "Really? Where's your territory?"
70002020-298 = "You know how if you walk a bit more from the intersection, there's an alley behind a food stall? It's right there."
70002020-299 = "Oh? I know where that is! That's where the crepe stall is!"
70002020-300 = "Oh my gosh, isn't that place super yummy? I'm a regular!"
70002020-302 = "R-Really? Small world, I guess."
70002020-303 = "My fave order is ice cream, strawberries, and chocolate chips! What do you get?"
70002020-304 = "Banana's pretty good."
70002020-305 = "You tried the pineapple and ice cream yet? It's a good combo."
70002020-306 = "I never even thought of that before! That sounds tasty!"
70002020-308 = "I don't like fruits! So, I just get a ton of chocolate chip cookies and whipped cream. That's the way to go."
70002020-309 = "Whoa! I'm totally gonna try that next time!"
70002020-310 = "I got it! Why don't we all—"
70002020-315 = "Gah?! Th-The president?"
70002020-325 = "Oops. I got a little carried away talking to them."
70002020-331 = "Anesthesia complete."
70002020-332 = "Is it really okay to be shooting patients like that?"
70002020-333 = "It was in the name of treatment. One step backwards, two steps forward."
70002020-334 = "I'm impressed at your natural talent. You kept those thugs in place while I prepared the shots."
70002020-335 = "We didn't do much, really... Consider it Kirara's superpower."
70002020-336 = "I wanted...to eat crepes...with them..."
70002020-337 = "Why don't you leave them your number? That way, we can go together when they wake up."
70002020-338 = "That's perf! Can I do that, President?"
70002020-342 = "Usually, our policy is to refrain from any personal contact with the patients outside of work."
70002020-343 = "But... I suppose we can consider it as thanks for your hard work."
70002020-344 = "Yahoo! Thanks, Pres! I'll get you one too, 'kay?"
70002020-345 = "That's...quite all right."
70002020-346 = "Don't even sweat it! I got you!"
70002020-349 = "Phew! The day really flew by!"
70002020-350 = "There's, like, so many clubs in this school!"
70002020-351 = "I had a lot of new experiences today, that's for sure."
70002020-352 = "So, did you find it?"
70002020-353 = "Hm? Find what?"
70002020-354 = "You totally forgot why we did all this, huh?"
70002020-355 = "We were trying to find a club you wanted to join, remember?"
70002020-356 = "Ah! Right! Hahaha! Yeah, it totally slipped my mind!"
70002020-357 = "Hm... Lemme think. The first one...and the second...and... Well, all of them were super fun!"
70002020-358 = "I made new friends and got to experience lots of new things!"
70002020-359 = "So out of all the clubs, the one I'd pick is..."
70002020-363 = "...none of them!"
70002020-365 = "Huh?"
70002020-366 = "You just said they were, and I quote, \"super fun\"!"
70002020-367 = "Yup! Fun! Heart-pounding!"
70002020-368 = "I loved playing with Ibuki, seeing the School Lunch Club's kitchen, and even helping with the patients!"
70002020-369 = "It really was totally fun!"
70002020-370 = "Then...what's the problem?"
70002020-371 = "Because, well... Don't you think it'd kinda be a waste..."
70002020-372 = "...to pick just one?"
70002020-373 = "A...waste?"
70002020-374 = "Yeah! Just think about it, Eri!"
70002020-375 = "If we join just one club, every day would be exactly the same."
70002020-376 = "It'd be the same friends, the same activities, the same routine... All the time!"
70002020-377 = "That... That's exactly what I'd call a waste!"
70002020-378 = "Hm... I get it now. You don't want to be tied down to one thing. You want to be able to have new experiences, all the time, right?"
70002020-379 = "That's exactly what I meant! You always get me, Eri!"
70002020-380 = "Because then every day would be a totally twinkling, heart-pounding day!"
70002020-381 = "Now, that's youth!"
70002020-386 = "For example... Making new friends..."
70002020-394 = "...chasing runaway trucks..."
70002020-404 = "...helping lost friends..."
70002020-407 = "I want my club activities to be unpredictable adventures, just like those!"
70002020-408 = "That's what we already do in the Go-Home Club, right? How's it different!"
70002020-409 = "Technically, yeah! But I want it to be a real club! That's what matters!"
70002020-410 = "Because clubs are the flowers of youth!"
70002020-411 = "Yes, ma'am..."
70002020-412 = "I don't think we're gonna be able to find a club like that, Kirara."
70002020-413 = "You're right... Clubs always just focus on the one thing, huh..."
70002020-414 = "Hmmm..."
70002020-418 = "Okay! I got it!"
70002020-419 = "Do tell."
70002020-420 = "If we can't find a club like that, we're just gonna make one!"
70002020-421 = "A super, totally twinkling club!"
70002020-422 = "A heart-pounding experience where you never know what's gonna happen next!"
70002020-427 = "You want to make a club... That's a very Kirara-answer to the problem."
70002020-428 = "What should we name it?"
70002020-429 = "Um... It's got to make your heart skip a beat...and sparkle like youth..."
70002020-431 = "Twinkle Twinkle Club?"
70002020-433 = "Yeah! I like that one! What do you think, Eri?"
70002020-434 = "It's definitely not your typical name..."
70002020-435 = "But I guess that's what makes it perfect. It's a weird club to begin with."
70002020-436 = "Twinkle Twinkle Club. Sounds good to me."
70002020-437 = "Yay! Then, as our first activity, let's go get a cup of bubble tea!"
70002020-438 = "Huh? Where's this coming from?"
70002020-439 = "Well, our club activities are whatever we want them to be, right? And I'm thirsty!"
70002020-440 = "Well, business as usual, then?"
70002020-441 = "Then, we're off!"
70002020-442 = "Not the same one as last time, though! I've had my eyes on this other one for a while."
70002020-443 = "Whatever you want."
70002020-453 = "Now, let the inaugural activity of our Twinkle Twinkle club..."
70002020-454 = "...begin!"
70002020-458 = "Kirara and Erika's Twinkling Day"

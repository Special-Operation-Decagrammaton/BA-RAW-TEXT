[translation]
70002020-1 = "綺羅羅和繪里香閃閃發亮的一天（２）"
70002020-5 = "呀齁！你們好！"
70002020-6 = "請問這裡是萬魔殿的休息室嗎？"
70002020-7 = "我們是來問能不能進行社團體驗的。"
70002020-15 = "……終於來了嗎。"
70002020-16 = "想要親自感受格黑娜的偉大學生會長，也就是我真琴大人魅力的人……！"
70002020-17 = "歡迎你們來到萬魔殿！"
70002020-22 = "嗯？雖然聽不太懂，但應該是在跟我們打招呼吧？"
70002020-23 = "好像是。"
70002020-24 = "所以你就是萬魔殿的接待人員嗎？"
70002020-26 = "什麼……！？接待人員……！？"
70002020-27 = "當著我真琴大人的面，竟然還說得出那種話……！？"
70002020-28 = "本人就是萬魔殿永遠的領袖！#n同時也是未來會將奇普托斯納為己有的，史上最偉大的領導者真琴大人！"
70002020-29 = "嗯～這樣啊～？"
70002020-30 = "為什麼看起來一點也不感興趣的樣子……"
70002020-31 = "不……不行。#n不能被一個還搞不清楚狀況的新人牽著鼻子走。"
70002020-32 = "咳哼，重新進入正題吧……"
70002020-33 = "嘻嘻嘻……！想體驗我們萬魔殿的社團活動嗎？"
70002020-34 = "那你們就來對地方了！綺羅羅，還有繪里香！"
70002020-35 = "嗯？議長居然知道我們的名字？"
70002020-36 = "嘻嘻嘻，那當然。"
70002020-37 = "難得有人親自造訪萬魔殿，而且還想要體驗我們的社團活動，#n我自然應該要記住你們的名字才對。"
70002020-38 = "這對我真琴大人來說，根本不算什麼……"
70002020-39 = "嘻嘻嘻……很好。#n只要努力持續精進自我，說不定我們萬魔殿的下一屆幹部就會是你們……"
70002020-40 = "啊，那個我沒什麼興趣。"
70002020-41 = "什麼！？"
70002020-42 = "唔，要達到那個地步，果然還是需要一些時間嗎？是這個意思嗎？"
70002020-43 = "沒錯……比起貿然躁進，緩慢而穩重地前進才是優秀的領導者……"
70002020-44 = "原來……你的眼光那麼長遠嗎，夜櫻綺羅羅……！"
70002020-45 = "我覺得他應該沒想那麼多哦。"
70002020-48 = "來，請進。#n歡迎兩位來體驗我們的社團活動。"
70002020-49 = "話說回來，社團體驗還真是……相當少見的事呢。"
70002020-51 = "嗯嗯！謝謝！那萬魔殿平常會做什麼呢？"
70002020-52 = "聽說你們就像格黑娜學園的學生會一樣……"
70002020-53 = "唔嗯，所以是處理學校預算，或者是處理文書作業之類的嗎？"
70002020-55 = "那些確實也是我們的工作內容。"
70002020-56 = "不過最主要的職務還是代表格黑娜執行對外工作，#n或是履行和外部廠商之間的合約……雖然話是這麼說……"
70002020-57 = "但實際上……跟那些事情相比，好像更多時候都在替真琴前輩收拾爛攤子……實在讓人感到有點自責。"
70002020-58 = "……（怒瞪）"
70002020-59 = "嗯？怎麼了，伊呂波？#n我真琴大人臉上沾到了什麼東西嗎？"
70002020-60 = "沒有……什麼也沒有。#n唉……"
70002020-62 = "嗯……看來那位同學似乎吃了不少苦頭呢。"
70002020-66 = "我回來了～！"
70002020-67 = "咦？是回家部的姐姐們？"
70002020-69 = "咦？"
70002020-70 = "伊吹醬！嗨～！"
70002020-71 = "你好呀，伊吹。又見面了呢。"
70002020-72 = "哇！姐姐們好久不見！今天是來玩的嗎？"
70002020-73 = "我們今天是來萬魔殿體驗社團活動的！#n嗯，其實就跟來玩的差不多哦！"
70002020-74 = "真的嗎！？歡迎你們！"
70002020-75 = "話說回來，我明明已經很久沒見到伊吹了，卻還是有種熟悉的感覺耶。"
70002020-76 = "是因為經常在《週刊萬魔殿》之類的地方，看到你的照片或新聞嗎？"
70002020-78 = "哎呀……看來真琴前輩交代千秋去辦的那些事……也不是完全沒有意義呢。"
70002020-79 = "咯咯咯！你總算明白我真琴大人真正的價值了嗎！伊呂波！"
70002020-80 = "是是是……"
70002020-81 = "哼哼，話說回來……"
70002020-83 = "伊吹～"
70002020-84 = "冰箱裡有我買回來的布丁……"
70002020-86 = "伊吹醬，我有在《週刊萬魔殿》上看過！聽說你很會玩抓石子遊戲！"
70002020-87 = "可以示範一次給我們看嗎？"
70002020-88 = "嗯！當然好呀！"
70002020-89 = "伊吹超會玩抓石子遊戲的哦，就讓我來教教姐姐們吧！"
70002020-90 = "好耶～居然能跟伊吹一起玩抓石子遊戲，真讓人興奮～"
70002020-91 = "來，這邊太擠了，我們去那邊玩吧。"
70002020-97 = "……"
70002020-98 = "伊，伊吹……？#n那個……布丁……"
70002020-99 = "呃……"
70002020-101 = "伊，伊吹……！？#n跟我相比，你居然更喜歡今天第一次見到的那些人嗎……！"
70002020-102 = "應，應該……沒有這種事吧！？"
70002020-103 = "伊吹！拜，拜託你告訴我這不是真的！伊吹……！"
70002020-109 = "嗯，這或許也是好事一樁。"
70002020-110 = "這樣我們就能平靜地度過這一天了。"
70002020-116 = "跟伊吹醬一起玩真開心！"
70002020-117 = "不過再玩下去的話，就要趕不上下一個社團體驗了，我們快點走吧。"
70002020-118 = "啊哈哈！說的也是，接下來是哪裡呢？"
70002020-120 = "接下來是……"
70002020-123 = "歡迎！這裡就是格黑娜供給部哦！"
70002020-124 = "歡迎你們來體驗社團活動！"
70002020-126 = "嗯！好香的味道！肚子好像有點餓了呢！"
70002020-127 = "雖然我們經常來餐廳，但這好像是我們第一次進到廚房裡。"
70002020-129 = "沒錯，這裡就是為格黑娜的學生們製作餐點的地方。#n歡迎來到格黑娜的廚房。"
70002020-130 = "你們有煮過飯嗎？"
70002020-131 = "唔，我有時候會在家裡做馬鈴薯燉肉。"
70002020-132 = "啊哈！我從來沒煮過飯耶！"
70002020-134 = "沒關係！反正煮飯這種事學了就會了！"
70002020-135 = "雖然只是體驗，不過我今天還是會認真教你們哦！"
70002020-136 = "唔，雖然我也很想幫忙，不過我還得去準備晚餐要供應的食物。"
70002020-137 = "其實本來應該要用卡車一次把食材運過來，藉由大量處理來節省時間……"
70002020-138 = "但是我們供給部的卡車……卡車……"
70002020-142 = "……唔！"
70002020-143 = "風，風華前輩！"
70002020-144 = "呼，總之今天的體驗活動就交給茱莉你負責了。"
70002020-145 = "沒問題！請不用擔心，前輩！#n我會從最基礎的部分開始慢慢教他們的！"
70002020-146 = "謝謝你，那我就先走了……"
70002020-150 = "好，現在請兩位跟我來！"
70002020-151 = "我會先帶你們參觀供給部的設施，然後再示範怎麼製作餐點！"
70002020-153 = "啊哈哈！難道這就是綺羅羅大廚踏出的第一步嗎？真讓人心動！"
70002020-156 = "來，這邊就是廚房內部。"
70002020-157 = "那邊是碗盤收納櫃，這邊是烤架，然後這邊是瓦斯爐……"
70002020-159 = "這麼大的廚房能做出多少份餐點啊？"
70002020-161 = "這個嘛……每天大概能做出幾千人份的餐點吧。"
70002020-163 = "咦！？真的嗎！？"
70002020-164 = "不過也對，每天來餐廳的學生數量多到數不清，這好像也是當然的。"
70002020-165 = "肯定很辛苦吧～"
70002020-166 = "雖然一開始的確很辛苦，不過也已經習慣了！"
70002020-167 = "那麼接下來，就由我這個資深助教來示範如何製作料理吧！"
70002020-168 = "首先就從最基本的料理，也就是蛋包飯開始！"
70002020-169 = "哦哦……？"
70002020-180 = "只要像這樣煮一煮，然後再裝到盤子上……鏘！"
70002020-182 = "怎麼樣呀？"
70002020-186 = "老手果然就是不一樣──"
70002020-194 = "……等等，好像有點怪怪的。"
70002020-195 = "蛋包飯應該是綠色的嗎？"
70002020-196 = "咦？難道不是嗎？"
70002020-197 = "而，而且重點是那東西還會動耶，你究竟煮了什麼東西出來？"
70002020-198 = "啊哈哈！蛋包飯蠕動的樣子，看起來既噁心又可愛～！"
70002020-199 = "嗯？它把手伸出來了，是要跟我打招呼嗎？"
70002020-200 = "等，等等，那樣真的好嗎，綺羅羅？"
70002020-202 = "咦，你不覺得它很可愛嗎？來，擊掌！"
70002020-207 = "竟然能交流……！？"
70002020-211 = "雖然沒有料到這樣的發展…… "
70002020-212 = "不過這的確很像是會發生在綺羅羅醬身上的事。"
70002020-213 = "嗯？歐姆醬？"
70002020-223 = "啊，它逃走了。"
70002020-224 = "……等等，你剛才說的歐姆醬，該不會是名字吧？"
70002020-225 = "等，等一下！歐姆醬！"
70002020-226 = "……看來真的是名字呢。"
70002020-227 = "這，這樣突然跑走，我會很困擾的耶！？"
70002020-228 = "請，請別再跑了～！"
70002020-232 = "看來供給部……也是各方面都很辛苦呢。"
70002020-233 = "啊哈哈哈！真是愉快又混亂的情形，真有趣！"
70002020-234 = "歐姆醬～～！"
70002020-236 = "（因為主辦方的原因，供給部的社團體驗暫時中斷）"
70002020-241 = "你們就是來體驗社團活動的學生嗎？"
70002020-243 = "嗨！我叫做綺羅羅！請多多指教～"
70002020-244 = "我叫做繪里香。"
70002020-246 = "兩位好，我是急救醫學部的部長冰室瀬奈。"
70002020-247 = "沒想到竟然連急救醫學部也有社團體驗，真令人意外。"
70002020-248 = "畢竟你們平時那麼忙，我還以為應該沒時間應付這種事。"
70002020-249 = "其實正好相反。#n就是因為我們忙得不可開交，所以才會招收體驗部員。"
70002020-250 = "咦？是嗎？"
70002020-251 = "目前自治區內的太妹們正在爭奪地盤，所以有很多屍……#n更正，我是說有很多傷患需要移送。"
70002020-253 = "所以你們兩位也必須立即投入支援才行。"
70002020-254 = "咦？這樣沒關係嗎？我們完全沒有醫療的相關知識耶？"
70002020-255 = "當然如果只是幫忙貼OK蹦的話，應該沒什麼問題～"
70002020-257 = "別擔心，我們不會要求非專業人士做太困難的事情。"
70002020-258 = "兩位只要在我準備替傷患打針的時候，幫我安撫傷患就行了。"
70002020-259 = "那麼，各就各位！"
70002020-261 = "各就各位～"
70002020-265 = "總之就先試試看吧。"
70002020-268 = "啊啊……好痛……"
70002020-269 = "呿，我其實還可以戰鬥的，要不是膝蓋中了一槍……"
70002020-270 = "你們少在那邊給我無病呻吟！再這樣下去，我們說不定會永遠失去地盤啊！"
70002020-272 = "只不過受了點小傷，你們就打算躺在這裡偷懶嗎！"
70002020-273 = "不，不然呢！？"
70002020-274 = "當然是馬上回到戰場啊！#n好了，大家快安靜地從床上起來！我們要趁急救醫學部長不注意的時候溜出去！"
70002020-275 = "是……！"
70002020-280 = "呀齁～各位傷患們～臨時白衣天使綺羅羅登場囉～"
70002020-284 = "你，你是誰啊！？"
70002020-286 = "我們今天是來體驗社團活動的。#n你們就是被移送到這裡的傷患嗎？"
70002020-287 = "請多指教哦～！"
70002020-289 = "誰需要你們照顧啊！我們現在就要逃離這個鬼地方！"
70002020-290 = "沒錯！現在可不能繼續待在這裡！"
70002020-292 = "嗯？你們不想治療嗎？"
70002020-293 = "就算傷得不是很嚴重，放著不管應該還是挺痛的吧？"
70002020-294 = "你以為我們這種心懷榮耀的太妹會在意那種事嗎！"
70002020-295 = "對我們來說，守住地盤更重要！"
70002020-297 = "是嗎？那你們的地盤在哪裡？"
70002020-298 = "十字路口再過去一點的小吃攤後面不是有個巷子嗎？就是那裡。"
70002020-299 = "嗯？你是說可麗餅攤車嗎？我知道那裡耶！"
70002020-300 = "那裡的可麗餅超好吃的！我是那家店的常客喔！"
70002020-302 = "哦，哦……是嗎？那還真巧。"
70002020-303 = "我每次都是點草莓加霜淇淋加巧克力碎片，你們呢？"
70002020-304 = "我可能還是比較喜歡香蕉口味的吧。"
70002020-305 = "你有吃過鳳梨加冰淇淋口味的嗎？那簡直是絕配！"
70002020-306 = "咦？真的嗎？我還是第一次聽說這樣的搭配，感覺很好吃耶！！"
70002020-308 = "我對水果沒興趣，所以都請老闆塞滿巧克力餅乾碎片和鮮奶油！"
70002020-309 = "哇！我下次也要這樣吃吃看！"
70002020-310 = "對了！既然已經說到這裡，不如我們就一起──"
70002020-315 = "啊！？急救醫學部長！？"
70002020-325 = "一不小心……顧著聊天……"
70002020-331 = "麻醉完畢。"
70002020-332 = "直接開槍射傷患沒問題嗎？"
70002020-333 = "這只是治療前的必要處置，也可以說是以退為進。"
70002020-334 = "話說回來，你們兩位還挺有天分的呢。#n居然能在我準備注射用具的時候，制服住那些愛惹事的傢伙。"
70002020-335 = "唔嗯……這該說是誤打誤撞……還是說是綺羅羅醬的天賦呢……"
70002020-336 = "我本來……還想跟他們一起去吃可麗餅的說……"
70002020-337 = "不然留個電話號碼給他們吧？#n等他們醒來之後再一起去也可以。"
70002020-338 = "啊，說得也對！部長，這樣應該沒關係吧？"
70002020-342 = "其實我們本來是禁止成員和患者私下聯絡的……"
70002020-343 = "但這次就通融一下吧。#n當成是你們表現得很好的獎勵。"
70002020-344 = "好耶！謝謝你，部長！我也會幫你買一份的！"
70002020-345 = "我就不用了……"
70002020-346 = "沒關係沒關係！不用客氣～"
70002020-349 = "噗哈！沒想到一天的時間就這樣過了！"
70002020-350 = "我之前完全不知道學校裡有這麼多社團呢！"
70002020-351 = "我也體驗到了很多新鮮事哦。"
70002020-352 = "所以你找到了嗎？"
70002020-353 = "嗯？找到什麼？"
70002020-354 = "你該不會忘了今天的目的了吧？"
70002020-355 = "綺羅羅醬不是為了找到想參加的社團，才去體驗社團活動的嗎？"
70002020-356 = "啊，對哦！我差點都忘了這件事，啊哈哈！"
70002020-357 = "唔嗯，我想想……每個地方都很有趣。"
70002020-358 = "不僅交到了新朋友，也體驗到了很多不同的新事物！"
70002020-359 = "在今天去過的那些社團之中，我最想去的……"
70002020-363 = "……果然還是沒有！"
70002020-365 = "什麼？"
70002020-366 = "可是你剛才不是說很有趣嗎？"
70002020-367 = "嗯！超級有趣的！而且也很心動！"
70002020-368 = "不管是跟伊吹醬玩遊戲，還是參觀供給部的廚房，甚至是照顧傷患！"
70002020-369 = "這些全都是我不想錯過的新奇體驗！"
70002020-370 = "那又為什麼不想去呢？"
70002020-371 = "因為……如果要從那些社團中選出一個的話，你不覺得……"
70002020-372 = "好像有點可惜嗎！？"
70002020-373 = "可……可惜？"
70002020-374 = "你想想看嘛，繪里醬！"
70002020-375 = "一旦選擇某個社團加入，之後不就每天都得過著差不多的生活了嗎？"
70002020-376 = "除了社團成員都是同樣的人之外，每天要做的社團活動也差不多……！"
70002020-377 = "那樣超可惜的吧！"
70002020-378 = "唔……我大概懂了。#n所以綺羅羅醬是想要每天都參加不同的社團活動，對吧？"
70002020-379 = "嗯！沒錯！不愧是繪里醬！你真的很了解我呢！"

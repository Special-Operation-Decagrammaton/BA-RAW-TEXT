[translation]
700-1 = "人多好辦事？"
700-4 = "聯邦學生會．接待室"
700-6 = "[ns]「呃，我記得……」"
700-10 = "啊，咦……"
700-11 = "[s]「！？」"
700-12 = "啊，啊哇哇哇哇……！？"
700-14 = "不好意思，再這樣下去的話……！呀啊！？"
700-15 = "[ns] 趕忙攙扶"
700-18 = "得，得救了……"
700-19 = "非，非常感謝……差點就跌倒了……"
700-20 = "……咦？"
700-21 = "夏，夏萊的老師！？不，不好意思，我沒注意到所以問候晚了……！"
700-22 = "[s]「那個，我記得你是……」"
700-23 = "啊，正式地進行自我介紹這可能還是第一次……#n我是聯邦學生會所屬，行政委員會「調停室」的步……"
700-24 = "現在是琳前輩……不，現在也擔任類似行政官秘書的工作。"
700-25 = "[s]「請多指教囉，步。」"
700-26 = "我，我才是……！能像這樣見到您，是我的榮幸。"
700-27 = "我聽過許多老師的事。該說各方面都很厲害嗎，不太清楚該怎麼說才好……"
700-28 = "不像我，光是處理這些文件就已經拚盡全力了……"
700-29 = "[s1]「文件量真不得了呢，需要幫忙嗎？」\n[s2]「有什麼我能做的嗎？」"
700-30 = "咦，咦咦……！？"
700-31 = "咦，咦咦……！？"
700-32 = "老，老師幫我的話……！"
700-33 = "不，我當然很高興……可是，這些工作每天都非常多，會不會太麻煩您……"
700-34 = "[s]「不會，沒關係的唷。」"
700-35 = "是，是嗎……"
700-36 = "那麼，嗯，就承蒙您的好意可以嗎……？"
700-41 = "那……這些可以先麻煩您嗎？"
700-43 = "（就這樣，今後要和聯邦學生會的步一起解決各種任務了）"

[translation]
700-1 = "รวมพลังเพื่องานที่เสร็จเร็วขึ้น"
700-4 = "ห้องรับรอง องค์การนักเรียน"
700-6 = "[ns] \"ครูมีงานเลยแวะมาน่ะ...\""
700-10 = "อะ...เอ๋~~~??"
700-11 = "[s] \"...?!\""
700-12 = "ขะ...ขอโทษค่ะ ระ...รอสักครู่นะคะ...?!  อะ...อ๊ายยย...?!"
700-14 = "ถะ...ถ้าแบบนี้จะล้มเอาได้นะคะ...?!"
700-15 = "[ns] จับไว้"
700-18 = "กะ...เกือบไปแล้ว..."
700-19 = "ขะ...ขอบคุณค่ะ เกือบล้มไปแล้วเชียว... "
700-20 = "เอ๊ะ เอ๋...?"
700-21 = "คะ...คุณครูจาก <ชาเล่ต์> เหรอคะ?! ขะ... ขอโทษด้วยค่ะ! เกือบทับคุณครูแบนแล้วเชียว..."
700-22 = "[s] \"เธอ...\""
700-23 = "อ๊ะ ขออภัยที่แนะนำตัวช้าไปนะคะ ฉันอายูมุจากฝ่ายไกล่เกลี่ยองค์การนักเรียนค่ะ"
700-24 = "ตอนนี้ฉันทำหน้าที่เป็นเลขาของรุ่นพี่ริน เอ่อ... ไม่ใช่ค่ะ เลขาของหัวหน้าฝ่ายบริหารด้วยค่ะ"
700-25 = "[s] \"ยินดีที่ได้รู้จักนะ อายูมุจัง\""
700-26 = "ค่ะ! ยะ...ยินดีที่ได้พบค่ะ คุณครู!"
700-27 = "ฉันได้ยินเรื่องของคุณครูมาหลายอย่าง... ละ... และคิดว่าคุณครูเป็นผู้ใหญ่ที่สุดยอดมากเลยค่ะ! หรือจะพูดว่าสุดยอดในหลายๆ เรื่องดีนะ..."
700-28 = "แค่จัดการเอกสารที่กองเป็นภูเขาอยู่ตรงนี้ ฉันก็เต็มกลืนแล้ว..."
700-29 = "[s1] \"เอกสารเยอะเลยนะ ให้ครูช่วยมั้ย?\"\n[s2] \"มีอะไรที่ครูช่วยได้บ้างรึเปล่า?\""
700-30 = "คะ...คะ~?!"
700-31 = "คะ...คะ~?!"
700-32 = "คะ...คุณครูจะช่วยงั้นเหรอคะ?"
700-33 = "ฉะ...ฉันดีใจที่คุณครูพูดแบบนั้นนะคะ... แต่ว่าเอกสารพวกนี้มันเยอะขึ้นทุกวัน คุณครูคงจะรำคาญแน่ๆ..."
700-34 = "[s] \"ไม่เป็นไรหรอก\""
700-35 = "ยะ... อย่างนั้นเหรอคะ..."
700-36 = "ถะ...ถ้าอย่างนั้นฉันก็จะขอรับความช่วยเหลือไว้ค่ะ"
700-41 = "ถ้างั้นเริ่มจากการตรวจสอบอันนี้ก่อนดีมั้ยคะ?"
700-43 = "(จากนั้นคุณครูก็ช่วยอายูมุจัดการรายงานและภารกิจด้วยกัน)"

[translation]
700-1 = "Many a Mickle Makes a Muckle"
700-4 = "General Student Council Reception"
700-6 = "[ns] \"Let's take care of business...\""
700-10 = "H-Huhhh?"
700-11 = "[s] \"...?!\""
700-12 = "I-I'm sorry, u-um, wait a minute...! Ahhh!"
700-14 = "I'm falling!"
700-15 = "[ns] Catch her."
700-18 = "Y-You saved me..."
700-19 = "Th-Thank you... I almost died..."
700-20 = "W-Wait...!"
700-21 = "Are you the Schale Sensei?! I'm so sorry! I-I could've crushed you!"
700-22 = "[s] \"You're...\""
700-23 = "Oh, that's so rude of me. I'm Ayumu from the General Student Council Regulatory Committee."
700-24 = "I'm also serving as Rin's...I mean, the chief administrator's secretary at the moment."
700-25 = "[s] \"Nice to meet you, Ayumu.\""
700-26 = "Yes! N-Nice to meet you, Sensei."
700-27 = "I've heard a lot about you... Everyone says you're an amazing person...in every way..."
700-28 = "Meanwhile, I can't even organize a pile of documents."
700-29 = "[s1] \"That's a big pile. Do you need help?\"\n[s2] \"Can I help with anything?\""
700-30 = "What?!"
700-31 = "What?!"
700-32 = "Y-you would help...me?"
700-33 = "That makes me very happy but...there's so much of it every day. I couldn't impose..."
700-34 = "[s] \"It's okay.\""
700-35 = "You...You mean it?"
700-36 = "Th-Then, I'd really appreciate it..."
700-41 = "Could you check this one first?"
700-43 = "(That was how I began solving many different tasks with Ayumu from the General Student Council.)"

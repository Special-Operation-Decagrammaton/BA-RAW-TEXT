[translation]
10033110-1 = "Epilogue;Invincible Memories"
10033110-2 = "I was expect– Ahem...assuming things would get out of hand with Gehenna involved, but it was actually pretty mild."
10033110-3 = "But congratulations to you all on a successful field trip. Not that I would expect anything less of Sensei. And Umika did great too."
10033110-4 = "It was an entertaining—excellent job done!"
10033110-5 = "[s] \"You were pretty concerned about this, weren't you?\""
10033110-6 = "What do you mean?"
10033110-7 = "[s1] \"You wouldn't have set up the meeting with the Prefect Team otherwise.\"\n[s2] \"I had a feeling you were scheming behind the scenes.\""
10033110-10 = "You give me too much credit. It was all a happy coincidence."
10033110-11 = "I wanted to see an intriguing story that'd be fun for everyone."
10033110-12 = "If it just so happened that the outcome was a meaningful one, well, I'm not complaining."
10033110-13 = "Mhm. All just a happy coincidence..."
10033110-14 = "[s] \"If you say so...\""
10033110-15 = "I do say so."
10033110-21 = "Waaah! How was this our fault?"
10033110-22 = "It was a little dramatic, sure! But it wasn't on purpose!"
10033110-24 = "Didn't the fire get put out?! So what's the big deal?"
10033110-25 = "Yeah, we even helped out! We were part of the festival's performance!"
10033110-33 = "Are you properly reflecting on the error of your ways while completing your volunteer hours, Mouryo?"
10033110-34 = "There's no way I just heard someone complaining, right?"
10033110-36 = "*gasp*!"
10033110-38 = "U-Us?! Complainin'? Ain't no way! Look how hard we're cleanin'!"
10033110-39 = "You could practically eat off this floor! And we cleaned this whole area!"
10033110-46 = "Yeah, yeah. You're doing great."
10033110-47 = "I've got more important matters to attend to. Bye! "
10033110-54 = "...Is she gone?"
10033110-55 = "Ugh! It's not fair! Not fair at all! Y'all better watch out at the next festival!"
10033110-57 = "Oh, cool. The tengu mask march is startin'."
10033110-58 = "Check it out! A yamabushi! I love those things!"
10033110-64 = "Are y'all even workin'?! We're supposed to be takin' responsibility!"
10033110-65 = "Yeah, yeah. But first, watch this, Leader!"
10033110-66 = "Torch in hand, up the stairs, and the bird flies!"
10033110-77 = "Is! That! So?!"
10033110-82 = "I'm surprised to see you assisting Hyakkiyako, Sensei."
10033110-83 = "[s] \"I got roped into it... Somehow...\""
10033110-84 = "Diligent as always, Sensei. If I'd been aware of the situation..."
10033110-85 = "[s] \"Hina?\""
10033110-90 = "Nothing at all. Just wishful thinking."
10033110-91 = "I am happy to have run into you, albeit a little late."
10033110-92 = "[s] \"I know. It's good to see you too, Hina.\""
10033110-93 = "R-Really...?"
10033110-97 = "Hold on. Did you forget about me?!"
10033110-98 = "I thought I was going to lose my mind during the Hyakkaryouran meeting! I was forced to handle every form of interference from those Pandemonium Society ingrates!"
10033110-99 = "Those raccoons! Should you not, on a field trip, go off to enjoy your stupid trip?! No! They choose to be disruptive, obstinate, and intractable every step of the way. Even through online communications!"
10033110-100 = "And furthermore! Why, simply WHY was the Prefect Team in charge of managing the meeting with Hyakkiyako?"
10033110-102 = "Is the Pandemonium Society not the student council? Should they not have been the ones to assume even one iota of responsibility? There's delegation and then there's—"
10033110-104 = "Ako."
10033110-105 = "What's done is done. Try to enjoy the rest of the festivities while we're still here."
10033110-106 = "H-Head Prefect?!"
10033110-107 = "[ns3] \"Then I'll take you on a tour of the test of courage.\"\n[ns4] \"I've been undergoing some vigorous tour guide training.\""
10033110-110 = "Sensei?!"
10033110-114 = "If...you don't mind."
10033110-115 = "H-Hmph. You're only off the hook because the head prefect is so magnanimous! Don't forget that!"
10033110-116 = "[s] \"Yes, yes. Of course.\""
10033110-119 = "Did you enjoy your field trip? I hope everyone had fun at Hyakkiyako! You're all welcome back at any time! "
10033110-120 = "Waaah! What goes up must come down, and we must say our sorrowful goodbyes!"
10033110-121 = "But I am not one to wallow in sadness! I'll just eagerly await the day our paths cross again!"
10033110-122 = "Bye bye, friends! We'll play Mushiqueen the next time we see each other!"
10033110-126 = "Hm? Oh... It's that time already. Bye, everyone."
10033110-131 = "We'll be boarding soon. It was nice to meet all of you, so keep in touch."
10033110-132 = "Goodbye, Umika, Pina, Kaede, Tsubaki! And you too, Sensei!"
10033110-133 = "I mean, I'm sure we'll run into each other sooner rather than later, Sensei."
10033110-134 = "Hahahaha! Don't ruin the mood!"
10033110-135 = "Hit us up if you're ever in Gehenna! Bye!"
10033110-140 = "[ns] \"See you soon!\""
10033110-142 = "Faster than we could blink, the field trip ended more or less safely, and with many memories for the students to take home."
10033110-143 = "New connections were forged, and with them, stories to tell for years to come."
10033110-148 = "Kiheeheehee... With this, my influence will extend beyond Gehenna and into Hyakkiyako... Zzz... Zzz..."
10033110-152 = "...Though for some, it just created delusions."
10033110-157 = "The afterparty! This is always the best part in the movies!"
10033110-158 = "Cheers!"
10033110-160 = "Cheers..."
10033110-165 = "I truly enjoyed your story, Umika. I'm thoroughly impressed."
10033110-166 = "I-It's nothing to be impressed about!"
10033110-167 = "Kaede, Tsubaki, you put forth exemplary work as well."
10033110-168 = "You mean it? Heehee!"
10033110-169 = "That makes me one step closer to being a proper lady! "
10033110-170 = "I wish you were there to see it! I couldn't believe it when she turned it into a festival!"
10033110-172 = "\"The fire you're seeing around you is an interactive part of the festival, which requires audience participation!\" That bit was mind blowing!"
10033110-174 = "I couldn't have done any of it without Erika and Kirara..."
10033110-175 = "And Sensei's support..."
10033110-176 = "It was Umika who stepped forward...and seized the moment."
10033110-177 = "No, no. It was due to each and every one of you! If not for you, I would've been at an utter loss. I nearly gave up!"
10033110-179 = "Umika! It's times like these you need to stop talking and just take the compliment!"
10033110-180 = "Oh!"
10033110-181 = "I-Isn't that...?"
10033110-182 = "Yes! The president of the Festival Department!"
10033110-188 = "I heard all the juicy details."
10033110-189 = "You need to be proud of what you accomplished, Umika. I couldn't have done any better myself. "
10033110-190 = "..."
10033110-191 = "Really...?"
10033110-192 = "[s] \"I told you so, Umika.\""
10033110-193 = "See? Everyone is saying it, so carry yourself with a little confidence!"
10033110-194 = "Puff out your chest and say, \"I made this happen! I can take any challenge and turn it into a successful festival!\""
10033110-195 = "It truly all still feels like a dream, but..."
10033110-196 = "I do rather like the idea of making everything a festival!"
10033110-197 = "E-Everything, you say?"
10033110-198 = "In retrospect, things turned out well because we made it a festival, right?"
10033110-199 = "[ns] \"(In the end, I guess a field trip IS a festival.)\""
10033110-200 = "When one festival ends, what do we do next, Pina?"
10033110-201 = "We begin preparations for the next one! We are the Festival Operations Department, after all!"
10033110-202 = "Yes! I'm brimming with ideas! We'll hold a shopping district festival, and hire a dance company with bells and flutes and shamisens and drums and—"
10033110-203 = "Wait, wait, wait! I'm glad you're so excited, but—"
10033110-204 = "Did I hear you right? I'm ready for the next event!"
10033110-206 = "*yawn* Make sure...to schedule in nap time."
10033110-228 = "Um, Sensei?"
10033110-229 = "[ns] \"Hm?\""
10033110-230 = "I'm not quite sure where to even begin, honestly."
10033110-231 = "But above all, I'd like to thank you, from the bottom of my heart."
10033110-232 = "[s5] \"There really is a lot I want to talk to you about too.\"\n[s6] \"First and foremost, congratulations.\""
10033110-235 = "C-Congratulations? For what?"
10033110-239 = "Oh, you're referring to a successful conclusion to my first festival?"
10033110-240 = "Heehee. Thank you, Sensei."
10033110-241 = "..."
10033110-242 = "But, Sensei?"
10033110-249 = "The next time you visit Hyakkiyako, please keep us in mind."
10033110-250 = "We'll put on a bigger, more exciting festival than anything you've ever experienced!"
10033110-254 = "Rowdy and Cheery"

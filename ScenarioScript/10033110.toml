10033110-2 = "3;니야;02;게헨나 여러분이 난동을 피우면서 어느 정도 일이 커지리라고는 기대–가 아니라 상정하긴 했습니다만. 난리도 아니었네요~\n#3;a\n#3;closeup"
10033110-3 = "3;니야;01;그래도, 멋지게 해결해 주셨습니다. 역시나 선생님. 그리고 마츠리부의 우미카 양이네요.\n#3;greeting"
10033110-4 = "3;니야;03;이번에 보여주신 활약. 무척 재미–가 아니라, 훌륭했답니다.\n#3;em;[음표]"
10033110-5 = "[s] \"그렇게 말하는 것 치고, 니야도 제법 걱정했지?\""
10033110-6 = "3;니야;02;어머나? 무슨 말씀이시온지?\n#3;em;[?]"
10033110-7 = "[s1] \"가령 선도부와 백화요란의 회담장소 지정이라던가.\" \n[s2] \"니야가 뒤에서 여러 가지를 꾸몄–준비했다는 걸 알았거든.\""

[translation]
10033110-1 = "บทส่งท้าย;ความทรงจำจะเปล่งประกายเสมอ"
10033110-2 = "ฉันไม่ได้ฟันธงไว้หรอกค่ะว่านักเรียนจากเกเฮนน่าจะก่อความวุ่นวายจนเกิดเรื่องใหญ่โต ฉันแค่เดาๆ ว่าอาจจะเกิดน่ะ แต่ก็ไม่ธรรมดาเลยใช่มั้ยล่ะคะ?"
10033110-3 = "แต่ยังไงคุณครูก็ช่วยคลี่คลายได้อย่างมืออาชีพเลยนะคะ สมแล้วที่เป็นคุณครู และคุณอุมิกะจากชมรม#nจัดงานเทศกาลก็ด้วย"
10033110-4 = "ผลงานที่แสดงให้เห็นในครั้งนี้ถือว่าน่าสนุก... ไม่สิ น่าประทับใจมากเลยค่ะ ยอดเยี่ยมเลย"
10033110-5 = "[s] \"ถึงจะพูดแบบนี้ แต่นิยะเองก็เป็นห่วงไม่น้อยเลยล่ะสิ?\""
10033110-6 = "อุ๊ย? พูดเรื่องอะไรคะเนี่ย?"
10033110-7 = "[s1] \"ทั้งเรื่องที่ประชุมของคณะกรรมการวินัยกับเฮียกกะเรียวรันด้วย\" \n[s2] \"ครูรู้นะว่านิยะบงการ ไม่สิ... เตรียมงานอยู่เบื้องหลังน่ะ\""
10033110-10 = "ตายจริง ไม่ใช่เรื่องบังเอิญหรอกเหรอคะ?"
10033110-11 = "ฉันแค่จัดการนู่นนี่นิดหน่อยเพื่อความสนุกก็เท่านั้นเองค่ะ"
10033110-12 = "และถ้าสิ่งนั้นจะเป็นเรื่องที่มีความหมายสำหรับใครขึ้นมา ก็ต้องถือว่าเป็นเรื่องที่ดีเลยนะคะ"
10033110-13 = "ใช่แล้วค่ะ ฉันไม่ได้ทำอะไรนอกเหนือจากนี้เลย"
10033110-14 = "[s] \"เป็นอย่างนี้เองสินะ...\""
10033110-15 = "เป็นอย่างนั้นละค่ะ"
10033110-21 = "ฮือๆ... ทำไมพวกเราต้องมาเจอเรื่องแบบนี้ด้วย..."
10033110-22 = "ถึงเราจะทำเกินกว่าทุกทีๆ ไปหน่อยก็เถอะ! แต่ก็!"
10033110-24 = "นั่นสิคะ! ยังไงสุดท้ายก็ดับไฟกันได้จนหมด และงานต้นไม้ศักดิ์สิทธิ์ก็สำเร็จลุล่วง!"
10033110-25 = "เราอุตส่าห์ไปเป็นส่วนหนึ่งของคณะการแสดงในงานเทศกาลและช่วยดับไฟแล้วแท้ๆ เลย!"
10033110-33 = "กำลังตั้งใจทำงานบำเพ็ญประโยชน์เพื่อสำนึกผิดอยู่มั้ยคะ? ปีศาจทุกๆ ตน?"
10033110-34 = "ฉันอาจจะหูแว่วไปเองก็ได้ แต่เมื่อกี้เหมือนได้ยินเสียงใครบ่นเลยนะคะ?"
10033110-36 = "อะ... อึ๊ก!!"
10033110-38 = "ไม่ได้บ่นเลยค่ะ! ไม่เห็นเหรอคะว่าเรากำลังตั้งใจทำความสะอาดมากเลย!"
10033110-39 = "ชะ... ใช่ค่ะ! เราทำความสะอาดตรงนี้ไว้จนไม่เหลือฝุ่นเลยนะคะ!"
10033110-46 = "ค่ะ คงจะเหนื่อยกันน่าดูเลยนะคะ"
10033110-47 = "ถ้าอย่างนั้นฉันขอไปตรวจงานที่อื่นต่อนะคะ ขอตัวก่อนละค่ะ"
10033110-54 = "ไปแล้วใช่ไหม...?"
10033110-55 = "ฮึ่ยย... น่าโมโหชะมัด...! ไว้ครั้งหน้า... พวกเราจะทำให้งานเทศกาล...!"
10033110-57 = "อ๊ะ เหมือนทางนั้นจะเริ่มขบวนหน้ากากเท็งงุแล้ว"
10033110-58 = "มียามาบูชิด้วยละ! ฉันชอบอันนั้น!"
10033110-64 = "นี่พวกเธอ! ตั้งใจทำงานบำเพ็ญประโยชน์กันหน่อยสิ! รับผิดชอบงานกันหน่อย!"
10033110-65 = "แป๊บเดียวค่ะหัวหน้า! ขอพวกฉันดูนี่ก่อนค่ะ!"
10033110-66 = "ถือคบเพลิง~ ขึ้นบันได~ หมู่ปักษาบินว่องไว!"
10033110-77 = "พวก~ เธอ~ นี่~ นะ~!"
10033110-82 = "แปลกแฮะ คิดไม่ถึงเลยว่าครูจะไปช่วยเป็นไกด์ถึงเฮียกคิยาโคเลย"
10033110-83 = "[s] \"จับพลัดจับผลูไปน่ะ...\""
10033110-84 = "ทำงานเหนื่อยน่าดูเลยนะคุณครู ถ้ารู้ก่อนว่าจะเป็นอย่างนั้น ฉันก็คง..."
10033110-85 = "[s] \"ก็คง...?\""
10033110-90 = "มะ... ไม่หรอก ไม่มีอะไร ก็แค่..."
10033110-91 = "ยังไงก็ถือว่าโชคดีที่ได้เจอกันตอนจบงานนะ"
10033110-92 = "[s] \"นั่นสินะ ครูก็ดีใจเหมือนกันที่ได้เจอฮินะ\""
10033110-93 = "งะ... งั้นเหรอ...?"
10033110-97 = "เดี๋ยวนะคะ ลืมกันไปหรือเปล่าคะว่าฉันก็อยู่ตรงนี้ด้วย?!"
10033110-98 = "แค่ต้องเจอกับเรื่องรบกวนและโดนแทรกแซงเหมือนเด็กๆ ตลอดการประชุมแลกเปลี่ยนกับ#nเฮียกกะเรียวรัน ฉันก็แทบจะเป็นโรคประสาทอยู่แล้วนะคะ!"
10033110-99 = "พวกแรคคูนนั่น! ถ้ามาทัศนศึกษาก็เที่ยวชมนู่นนี่อย่างสงบเสงี่ยมไปสิ ทำไมต้องมารบกวนกันทั้งแบบ#nออนไลน์และออฟไลน์ด้วยก็ไม่รู้!"
10033110-100 = "และยิ่งไปกว่านั้น! ทำไมการประชุมแลกเปลี่ยนกับเฮียกคิยาโคต้องเป็นหน้าที่ของคณะกรรมการวินัย#nด้วยล่ะคะ!?"
10033110-102 = "ถ้าพิจารณาเรื่องตำแหน่งแล้ว แพนเดโมเนียม โซไซตี้ต้องออกหน้าเองไม่ใช่เหรอ? ถ้าจะโยนภาระให้ก็ต้องมีลิมิตกันบ้างสิ แบบนี้มัน..."
10033110-104 = "อืม..."
10033110-105 = "แต่ในเมื่อเป็นแบบนี้แล้ว เรามาสนุกกับงานเทศกาลที่เหลือไม่ดีกว่าเหรอ? เรื่องมันก็เกิดไปแล้วนี่"
10033110-106 = "ทะ... ท่านประธาน...?"
10033110-107 = "[ns3] \"ถ้างั้นครูจะพาเที่ยวในเฮียกคิยาโคเอง\"\n[ns4] \"พอดีครูไปฝึกเป็นไกด์หน้างานมาหลายวันเลยน่ะ\""
10033110-110 = "ครูจะ... พาเที่ยวเหรอ...?!"
10033110-114 = "อืม งั้นก็ฝากด้วยนะครู..."
10033110-115 = "ฮะ... ฮึ่ม! นี่ฉันเห็นแก่ท่านประธานหรอกนะคะ"
10033110-116 = "[s] \"เอาละๆ\""
10033110-119 = "สนุกกันไหมคะทุกคน? มีช่วงเวลาดีๆ ในเฮียกคิยาโคกันหรือเปล่าคะ? แล้วฉันจะรอวันที่ได้พบกับทุกคนอีกนะคะ!"
10033110-120 = "ฮือ... นี่สินะคะที่บอกว่างานเลี้ยงย่อมมีวันเลิกรา..."
10033110-121 = "แต่ถึงอย่างนั้น พีน่าก็จะไม่เศร้าหรอกค่ะ! พวกเราต้องได้เจอกันใหม่อีกครั้งแน่นอนค่ะ!"
10033110-122 = "กลับดีๆ นะทุกคน! ไว้ครั้งหน้ามาแข่งดูเอลการ์ดมูชิควีนด้วยกันนะ!"
10033110-126 = "หะ... หืม? อ่า... ถึงเวลานี้แล้วสินะ... อืม... ต้องบอกลาให้เป็นการเป็นงานแล้วละ..."
10033110-131 = "งั้นพวกเรากลับก่อนนะ ทัศนศึกษาครั้งนี้สนุกมากเลย ไว้ติดต่อกันบ่อยๆ นะ"
10033110-132 = "ดูแลตัวเองด้วยนะ อุมิกะจัง พีน่าจัง คาเอเดะจัง สึบากิจัง! คุณครูก็ด้วย!"
10033110-133 = "แต่กับคุณครู เราอาจจะได้เจอกันในที่อื่นตามโอกาสนะ"
10033110-134 = "อะฮ่าฮ่าฮ่า แต่ถึงยังไงก็ต้องบอกลานี่นา!"
10033110-135 = "ถ้ามาเที่ยวเกเฮนน่าก็ติดต่อมานะ พวกเราไปละ! บ๊ายบาย!"
10033110-140 = "[ns] \"ไว้เจอกันใหม่นะ!\""
10033110-142 = "(การทัศนศึกษาจบลงด้วยดีและฝากความทรงจำมากมายไว้ให้กับทุกคน)"
10033110-143 = "(เหล่านักเรียนจากต่างโรงเรียนได้พบกัน ก่อให้เกิดสายใยระหว่างกัน และมีเรื่องราวใหม่ๆ ให้จดจำ...)"
10033110-148 = "หึหึหึหึ... และสิ่งนี้ก็ทำให้อิทธิพลของท่านมาโคโตะผู้นี้โด่งดังมาถึงเฮียกคิยาโค... งืม... งืม..."
10033110-152 = "(และก็ทำให้บางคนได้พบกับความฝันที่เกินจริงด้วย...)"
10033110-157 = "ถ้างั้นก็~ มากินเลี้ยงปิดงานกันค่ะ!"
10033110-158 = "ชนแก้ว!"
10033110-160 = "ชนแก้ววว..."
10033110-165 = "ฉันได้ยินเรื่องมาแล้วค่ะ ทำหน้าที่ได้ยอดเยี่ยมเลยนะคะ อุมิกะจัง"
10033110-166 = "คะ? มะ... ไม่หรอกค่ะ ฉันก็แค่..."
10033110-167 = "คาเอเดะจังกับสึบากิจังก็ทำได้ดีมากเลยค่ะ"
10033110-168 = "จะ... จริงเหรอ?! แหะๆ...!"
10033110-169 = "ฉันเข้าใกล้การเป็นเลดี้ที่ยอดเยี่ยมไปอีกก้าวแล้วสินะ!"
10033110-170 = "แต่ฉันก็ว่ามันสุดยอดจริงๆ นะ! คิดไม่ถึงเลยว่าเราจะเปลี่ยนทุกอย่างเป็นงานเทศกาลได้!"
10033110-172 = "ฉันก็เหมือนมีไฟลุกโชนในใจเลยค่ะ! \"เปลวไฟที่เห็นอยู่นี่คือส่วนหนึ่งของงานเทศกาลในวันนี้ค่ะ!\" ฉันจะไม่ลืมบทพูดนี้เด็ดขาดเลย!"
10033110-174 = "อะ... เอ่อ... นั่นเป็นเพราะคุณเอริกะกับคุณคิราระ..."
10033110-175 = "และคุณครูอยู่กับพวกเราด้วย..."
10033110-176 = "แต่คนที่ทำให้เกิดการเปลี่ยนแปลงทุกอย่างในตอนนั้น... ก็คืออุมิกะนะ..."
10033110-177 = "ไม่หรอกค่ะ! เป็นเพราะทุกคนช่วยอยู่ข้างกันต่างหาก... ถ้าไม่มีทุกคนละก็ ฉันคง..."
10033110-179 = "ถ่อมตัวอยู่นั่นแหละ! เวลาแบบนี้ต้องรู้จักรับคำชมอย่างตรงไปตรงมาสิ!"
10033110-180 = "อ๊ะ!"
10033110-181 = "สะ... เสียงนี้มัน...?!"
10033110-182 = "อ๊ะ ท่านประธานชมรมจัดงานเทศกาล!"
10033110-188 = "ฉันได้ยินเรื่องทั้งหมดมาแล้ว ได้ยินมาแบบไม่ขาดตกบกพร่องเลยละ"
10033110-189 = "นี่คือผลงานของเธอนะ อุมิกะ มีความมั่นใจในตัวเองหน่อยสิ ถึงฉันจะอยู่ด้วย แต่ฉันก็คงทำได้ไม่ดีเท่าเธอหรอกนะ"
10033110-190 = "......"
10033110-191 = "จริงเหรอคะ...?"
10033110-192 = "[s] \"ใช่แล้วละ อุมิกะ\""
10033110-193 = "ฉัน คุณครู และคนอื่นๆ ต่างก็พูดเหมือนกันหมดเลยนี่? ตอนนี้เธอมีความมั่นใจในตัวเองได้แล้วละ!"
10033110-194 = "เธอต้องพูดอย่างภาคภูมิใจว่างานนี้ฉันทำได้สำเร็จ ถ้าจะมีงานอื่นอีกก็เข้ามาเลย แล้วฉันจะเปลี่ยนให้#nทุกอย่างสนุกเหมือนงานเทศกาลเลยละ! แบบนี้ไง!"
10033110-195 = "เรื่องอื่นฉันยังไม่แน่ใจ และถึงฉันจะยังไม่รู้สึกว่านี่เป็นความจริงก็เถอะค่ะ แต่ว่า..."
10033110-196 = "การทำให้ทุกอย่างเป็นงานเทศกาลดูจะเป็นเรื่องที่ดีนะคะ!"
10033110-197 = "อะ... เอางั้นเหรอ?"
10033110-198 = "พอมาลองคิดดู ฉันว่าการทัศนศึกษาครั้งนี้จบลงด้วยดีเพราะความคิดที่ว่า 'มาทำให้เป็นงานเทศกาลกันเถอะ' น่ะค่ะ"
10033110-199 = "[ns] (และสุดท้ายก็ได้เป็นงานเทศกาลจริงๆ เลยละ...)"
10033110-200 = "ถ้างานเทศกาลงานหนึ่งจบลงไปแล้ว แล้วต่อไปจะเป็นยังไงเหรอคะพีน่า?"
10033110-201 = "ของมันก็แน่อยู่แล้ว ต่อไปก็คือการเตรียมเทศกาลต่อไปสิคะ! ก็พวกเราคือชมรมจัดงานเทศกาลนี่คะ!"
10033110-202 = "จะว่าไปแล้ว งานต่อไปก็คือเทศกาลย่านการค้าสินะคะ เราน่าจะตั้งกลุ่มนักเต้นขึ้นมา แล้วเตรียมเครื่องดนตรีพวกระฆัง ขลุ่ย กลอง..."
10033110-203 = "ดะ... เดี๋ยวก่อน หยุดก่อน! จะเริ่มเตรียมกันตั้งแต่ตอนนี้เลยเหรอ?"
10033110-204 = "หืม? อะไรน่ะ จะเริ่มทำอะไรกันเหรอ? ฉันขอร่วมวงด้วยคนสิ!"
10033110-206 = "งืม... ขอให้ฉันมีเวลานอนกลางวันด้วยนะ..."
10033110-228 = "นี่ คุณครูคะ?"
10033110-229 = "[ns] \"หืม?\""
10033110-230 = "ฉันอยากพูดกับคุณครูหลายอย่างเลย..."
10033110-231 = "แต่เหนือสิ่งอื่นใด ฉันต้องขอบคุณจริงๆ ค่ะ"
10033110-232 = "[s5] \"ครูก็มีเรื่องอยากพูดเยอะเลย...\"\n[s6] \"ไม่ว่ายังไงครูก็ดีใจด้วยนะ\""
10033110-235 = "คะ? แบบนี้หมายความว่ายังไงเหรอคะ...?"
10033110-239 = "อ้อ ดีใจด้วยที่งานเทศกาลจบลงได้ด้วยดีใช่ไหมคะ?"
10033110-240 = "แหะๆๆ... ขอบคุณค่ะ คุณครู"
10033110-241 = "......"
10033110-242 = "คุณครูคะ?"
10033110-249 = "ไว้คราวหน้าถ้ามาเฮียกคิยาโคอีก คุณครูต้องมาหาฉันให้ได้เลยนะคะ"
10033110-250 = "ในตอนนั้นฉันจะทำให้คุณครูได้เห็นเทศกาลที่น่าตื่นตาตื่นใจกว่านี้ให้ได้เลยค่ะ!"
10033110-254 = "ทัวร์วุ่นวุ่น วัยรุ่นอลเวง"

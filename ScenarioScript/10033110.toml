[translation]
10033110-1 = "尾聲;回憶總是無敵"
10033110-2 = "格黑娜的各位會引發騷動，並導致事件擴大……我本來是這麼期待──#n更正，是這麼預期的……果然非同小可呢～"
10033110-3 = "然而即便如此，各位依然帥氣地解決了一切。#n老師您，以及節慶營運管理部的海花同學果然很有一套呢。"
10033110-4 = "兩位在本次事件中的活躍表現，實在非常有趣──更正，是非常優秀。"
10033110-5 = "[s]「雖然仁耶嘴上這麼說，其實心裡也很擔心的吧？」"
10033110-6 = "哦？何以見得呢？"
10033110-7 = "[s1]「比如你特別指定了風紀委員會和百花繚亂會談的場地。」\n[s2]「我知道仁耶在私底下策劃──不對，是準備了很多東西。」"
10033110-10 = "哎呀，這只是個單純的巧合唷？"
10033110-11 = "我不過是為了追求趣味和興趣，因而編寫了這段故事。"
10033110-12 = "話雖如此，如果能碰巧成為對某人有意義的事，那倒也是好事一樁……"
10033110-13 = "僅此而已。"
10033110-14 = "[s]「原來如此……」"
10033110-15 = "沒錯沒錯～"
10033110-21 = "嗚嗚嗚……我們怎麼會遇到這種事情……"
10033110-22 = "雖然跟平時相比好像做的有點過火了，不過……！"
10033110-24 = "是啊！反正最後火勢被撲滅，神木祭也平安落幕了！"
10033110-25 = "我們也被當成慶典表演的一部分！在滅火上也有所貢獻！"
10033110-33 = "正在以志工服務作為反省的妖怪劇團的各位，情況還順利嗎？"
10033110-34 = "雖然可能是我的錯覺，但剛才好像聽見有人在抱怨的聲音呢。"
10033110-36 = "呃，咦！？"
10033110-38 = "沒有沒有！我們不是很努力地在打掃嗎！"
10033110-39 = "就，就是啊！就像你們看見的一樣，這個區域已經被掃得清潔溜溜了！"
10033110-46 = "呵呵，真是辛苦各位了。"
10033110-47 = "那麼，我們還得去其他地方，先告辭囉。 "
10033110-54 = "……他們走了嗎？"
10033110-55 = "唔唔唔……真氣人……！#n下次，下次有機會……一定要由我們親手，將慶典完全……！"
10033110-57 = "啊，那個天狗面具的隊伍好像開始排隊了。"
10033110-58 = "還有山伏耶！那個我喜歡！"
10033110-64 = "我說你們啊！志工服務認真一點！該負責的就要負責！"
10033110-65 = "等一下嘛，隊長！你先看看這個！"
10033110-66 = "提起火炬，登上階梯，鳥兒振翅！"
10033110-77 = "給～我～聽～話～！"
10033110-82 = "真意外。#n沒想到會由老師親自協助百鬼夜行。"
10033110-83 = "[s]「自然而然就變成這樣了……」"
10033110-84 = "辛苦你了，老師。#n早知道會這樣的話，我就……"
10033110-85 = "[s]「陽奈？」"
10033110-90 = "沒，沒什麼。老師……"
10033110-91 = "雖然在最後的最後才見到你，還是覺得很高興。"
10033110-92 = "[s]「就是說呀，我也很高興能見到陽奈哦。」"
10033110-93 = "是，是嗎……？"
10033110-97 = "請等一下，您應該沒有忘了我也在這裡吧！？"
10033110-98 = "本來在和百花繚亂會面的期間，#n就已經因為萬魔殿各種拙劣的妨礙和干涉，差點就要神經衰弱了！"
10033110-99 = "那些老狐狸！既然是來修學旅行，不就該好好享受嗎？#n為什麼老是要在背地裡做一些有的沒的來礙事呢！？"
10033110-100 = "而且話又說回來！#n跟百鬼夜行的交流會，到底為什麼要由我們風紀委員會來負責呢！"
10033110-102 = "無論從職責還是地位來看，不都應該要由萬魔殿出面嗎？#n推卸工作也該有個限度，這實在是──"
10033110-104 = "嗯……"
10033110-105 = "既然事已至此，還是好好享受剩下的慶典比較好吧？#n反正事情都已經發生了。"
10033110-106 = "委，委員長……？"
10033110-107 = "[ns3]「那就由我來為你們介紹百鬼夜行吧。」\n[ns4]「……我這幾天已經受了很多實戰訓練。」"
10033110-110 = "由，由老師親自……！？"
10033110-114 = "……嗯。那就麻煩你了，老師。"
10033110-115 = "哼，哼。看在委員長的面子上，這次我就睜一隻眼閉一隻眼吧？"
10033110-116 = "[s]「是是是。」"
10033110-119 = "大家，玩得還開心嗎？有沒有好好享受百鬼夜行呢？#n很期待能跟大家再次相遇哦。"
10033110-120 = "嗚嗚嗚……有相逢就有別離……"
10033110-121 = "但是不才菲娜，不會因此傷心或沮喪！#n總有一天，我們還會以不同的面貌再次見面的！"
10033110-122 = "大家路上小心！下次再一起進行甲蟲皇后對決吧！"
10033110-126 = "唔唔……嗯？啊，已經這個時間了啊……#n嗯……要確實打招呼才行……"
10033110-131 = "那我們走囉。#n這次玩得很開心，之後也常常聯絡吧。"
10033110-132 = "再見，海花醬、菲娜醬、楓醬、椿醬！還有老師也是！"
10033110-133 = "老師的話，感覺還有其他機會能見面呢。"
10033110-134 = "啊哈哈哈。不過現在畢竟是這種場合嘛！"
10033110-135 = "如果要來格黑娜的話，就聯絡我們吧！#n那我們走囉！啾！"
10033110-140 = "[ns]「大家再見！」"
10033110-142 = "（就這樣，修學旅行順利地結束了）"
10033110-143 = "（有了新的相遇、新的羈絆，以及新的故事……）"
10033110-148 = "嘰嘻嘻嘻……#n看來我真琴大人的影響力已經突破格黑娜，到達百鬼夜行了呢……呣喵……"
10033110-152 = "（還有人發現了嶄新（？）的夢想……）"
10033110-157 = "接下來～是慶功宴！"
10033110-158 = "乾杯！"
10033110-160 = "乾杯……"
10033110-165 = "我都聽說了唷，海花醬。#n真是太了不起了。"
10033110-166 = "咦？沒，沒有啦。我只是……"
10033110-167 = "楓醬還有椿醬也是，兩位都辛苦了。"
10033110-168 = "真，真的嗎！？嘿嘿……！"
10033110-169 = "這也算是朝更優秀的淑女邁出了一步吧！ "
10033110-170 = "不過回頭想想果然很厲害呢！居然能把那一切都變成慶典！"
10033110-172 = "在宣布「這場火也是慶典的環節之一」的時候！我也覺得非常熱血！"
10033110-174 = "那，那那那那，那是因為，有繪里香同學、綺羅羅同學……"
10033110-175 = "還有老師……在我身邊……"
10033110-176 = "不過……當時讓事情產生轉機的人……的確是海花唷……"
10033110-177 = "沒，沒有啦！那是因為有大家在……#n要不是有你們，我……"
10033110-179 = "怎麼能這麼說呢！#n這種時候就應該坦率地接受稱讚！"
10033110-180 = "啊！"
10033110-181 = "這，這個聲音是……！？"
10033110-182 = "啊，是節慶營運管理部的部長閣下！"
10033110-188 = "事情的所有情況，我都聽說了哦。"
10033110-189 = "是你做到的吧，海花。可以更引以為傲沒關係哦。#n因為即使有我在，我也不見得能做得更好。"
10033110-190 = "……"
10033110-191 = "真的嗎……？"
10033110-192 = "[s]「沒錯，海花。」"
10033110-193 = "我、老師，還有在場的大家不都是這麼說的嗎？#n更有自信一點！"
10033110-194 = "抬頭挺胸地說出來吧──#n「我做到了！以後的事情也放馬過來！我會把所有事都變成慶典」！"
10033110-195 = "雖然還是有點難以置信……"
10033110-196 = "不過把所有事都變成慶典，聽起來真不錯呢！"
10033110-197 = "你，你的重點是這個嗎？"
10033110-198 = "現在想想……這次也是因為讓修學旅行成為慶典的想法，才能順利結束的吧？"
10033110-199 = "[ns]（從結果來看，的確是把修學旅行變成了慶典……）"
10033110-200 = "那麼慶典結束之後，接下來會是什麼呢，菲娜？"
10033110-201 = "當然是下一場慶典囉！我們可是節慶營運管理部呀！"
10033110-202 = "既然如此，下次就在商店街的慶典上組織舞團……#n準備鐘、笛子、三味線和鼓──"
10033110-203 = "等，等等，先等一下！#n再怎麼說，這麼快就開始實在有點──"
10033110-204 = "什麼什麼？又要開始準備了嗎？也算我一個！"
10033110-206 = "唔嗯……記得幫我加入午睡時間……"
10033110-228 = "那個，老師？"
10033110-229 = "[ns]「嗯？」"
10033110-230 = "雖然有很多話想說……"
10033110-231 = "但最重要的是──真的非常謝謝你。"
10033110-232 = "[s5]「我也有很多話想說……」\n[s6]「但最重要的是──恭喜你。」"
10033110-235 = "咦？為何這麼說呢……？"
10033110-239 = "啊，是指慶典順利結束嗎？"
10033110-240 = "耶嘿嘿……謝謝老師。"
10033110-241 = "……"
10033110-242 = "老師。"
10033110-249 = "下次來百鬼夜行的時候，還請一定要來找我們哦。"
10033110-250 = "到時候，我一定會讓老師看見比現在更精彩、更盛大的慶典！"
10033110-254 = "熱熱鬧鬧  融融洽洽"

[translation]
84305300300-5 = "เอาละ ถ้างั้น..."
84305300300-6 = "ข้างนอกน่าจะจัดการไปได้บางส่วนแล้วละนะ"
84305300300-10 = "ว่าไง จะทำอะไรอีกมั้ยล่ะ...?"
84305300300-15 = "ฮะ... เฮือก!!"
84305300300-16 = "มะ... ไม่ค่ะ!! ยอมแพ้ ขอยอมแพ้ค่ะ!!"
84305300300-22 = "อึก..."
84305300300-23 = "อึก...!! ทำให้ฉันต้องลำบากอีกแล้ว..."
84305300300-24 = "ฝากไว้ก่อนเถอะค่ะ... สักวัน...!!"
84305300300-26 = "สักวันฉันจะกลับมาแก้แค้นให้จงได้!!"

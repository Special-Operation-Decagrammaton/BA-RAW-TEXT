[translation]
80000106-1 = "#title;모두 함께"
80000106-2 = "3;프라나;01;선생님. 오셨군요.\n#3;em;[반응]\n#3;a"
80000106-3 = "3;프라나;99;아아. 네. 아로나 선배는 지금 자고 있습니다. 완전 숙면 중입니다."
80000106-4 = "3;프라나;01;즉, 지금은 제가 선생님과 단둘이 있을 수 있는 타이밍. 그래서 이때를 놓치지 않고 준비했습니다."
80000106-5 = "[s] \"준비라니? 뭘?\""
80000106-6 = "3;프라나;99;네. 선생님은 오늘이 무슨 날인지 알고 계신가요?"
80000106-7 = "#st;[0,0];instant;1;"
80000106-8 = "#clearST"
80000106-9 = "#wait;2500"
80000106-10 = "[ns1] \"오늘은…… 발렌타인 데이니까……\"\n[ns2] \"즉, 준비라는 것은 초콜릿……?!\""
80000106-11 = "#wait;100"
80000106-12 = "#wait;100"
80000106-13 = "3;프라나;99;확인. 네, 맞습니다. 정답입니다."
80000106-14 = "3;프라나;01;상으로 쓰담쓰담을 해드리겠습니다. 자, 사양하지 말고 이쪽으로."
80000106-15 = "#st;[0,0];instant;1;"
80000106-16 = "#clearST"
80000106-17 = "3;프라나;01\n#3;d\n#wait;1000"
80000106-18 = "#wait;1000"
80000106-19 = "3;프라나;01\n#3;a\n#3;closeup\n#wait;1000"
80000106-20 = "3;프라나;02;네? 부끄럽다고요? \n#3;closeup\n#3;em;[?]"
80000106-21 = "3;프라나;99;이해. 제 품에 안겨서 부비부비하고 있는 타이밍에 아로나 선배가 깨버리기도 하면 어쩌지 하는 그런 걱정을 하고 계신 거군요?\n#3;closeup"
80000106-22 = "3;프라나;01;역시 그렇군요. 선생님은 부끄럼쟁이입니다. 잘 알고 있습니다. \n#3;closeup"
80000106-23 = "3;프라나;01;선생님은 기억나지 않으실 수도 있지만, 저는 선생님을 속속들이 알고 있으니까요. 아로나 선배만큼이나 잘 알고 있습니다.\n#3;closeup"
80000106-24 = "3;프라나;99;그러니까 선생님에게 발렌타인 데이 초콜릿을 드리겠습니다. \n#3;closeup"
80000106-25 = "#st;[0,0];instant;1;"
80000106-26 = "#clearST"
80000106-27 = "3;프라나;99\n#3;d\n#3;closeup\n#wait;1000"
80000106-28 = "#wait;1500"
80000106-29 = "#wait;1500"
80000106-30 = "#wait;2500"
80000106-31 = "[ns] \"프라나 쨩의 초콜릿!\""
80000106-32 = "3;프라나;01;그렇습니다. 제가 직접 만든 초콜릿입니다. 100% 프라나 함유입니다. 아로나 선배 몰래 만들었습니다.\n#3;a"
80000106-33 = "[s] \"으, 으응…….\""
80000106-34 = "3;프라나;99;심지어 아로나 선배가 자고 있는 이 타이밍에 드리는 게 포인트입니다. 선생님과 단둘이 있는 이 타이밍에요. 어떻습니까? 저의 음흉함이 느껴지나요? 후.후.후.\n#3;jump"
80000106-35 = "[s] \"……프라나 쨩도 지금 엄청 부끄러운 거구나?\""
80000106-36 = "#st;[0,0];instant;1;"
80000106-37 = "#clearST"
80000106-38 = "3;프라나;07\n#3;em;…\n#wait;2500"
80000106-39 = "3;프라나;07;……."
80000106-40 = "3;프라나;04;……침묵. 그 부분에 대해선 답변하지 않겠습니다."
80000106-41 = "3;프라나;12;……."
80000106-42 = "3;프라나;14;인정. ……네. 그런…… 것 같습니다."
80000106-43 = "[s] \"고마워. 프라나 쨩. 잘 먹을게.\""
80000106-44 = "#all;hide"
80000106-45 = "#na;프라나;……네. 부디."

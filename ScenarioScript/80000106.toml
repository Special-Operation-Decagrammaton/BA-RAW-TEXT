[translation]
80000106-1 = "ทั้งหมดด้วยกัน"
80000106-2 = "มาแล้วเหรอคะคุณครู"
80000106-3 = "อ่า... ค่ะ ตอนนี้รุ่นพี่อะโรน่ากำลังหลับอยู่ค่ะ หลับสนิทด้วยค่ะ"
80000106-4 = "หรือก็คือตอนนี้... เป็นช่วงเวลาที่ฉันจะอยู่กับคุณครูสองต่อสองได้ ดังนั้นฉันก็เลยเตรียมการเผื่อไว้ ไม่ให้พลาดโอกาสนี้ไปค่ะ"
80000106-5 = "[s] \"เตรียมงั้นเหรอ? เตรียมอะไรน่ะ?\" "
80000106-6 = "ค่ะ คุณครูรู้ใช่ไหมคะว่าวันนี้คือวันอะไร?"
80000106-10 = "[ns1] \"วันนี้... วันวาเลนไทน์น่ะ\"\n[ns2] \"ระ...หรือว่าเตรียมช็อกโกแลตมา...?!\""
80000106-13 = "ใช่ค่ะ ถูกต้องแล้วค่ะ "
80000106-14 = "ฉันจะลูบหัวให้เป็นรางวัลนะคะ เอาละค่ะ มาทางนี้สิคะ ไม่ต้องเกรงใจ"
80000106-20 = "คะ? เขินเหรอคะ? "
80000106-21 = "เข้าใจได้ค่ะ เป็นห่วงว่าถ้าเกิดตอนที่กำลังกอดฉันอยู่แล้วรุ่นพี่อะโรน่าตื่นขึ้นมาละก็จะทำยังไงดี#nใช่ไหมล่ะคะ? "
80000106-22 = "อย่างนี้นี่เอง ฉันทราบดีค่ะว่าคุณครูเป็นคนขี้อาย "
80000106-23 = "ไม่รู้ว่าคุณครูจำได้รึเปล่า แต่ฉันน่ะรู้จักคุณครูเป็นอย่างดี และรู้จักดีพอๆ กับรุ่นพี่อะโรน่าเลยค่ะ"
80000106-24 = "เพราะงั้นฉันจะให้ช็อกโกแลตวันวาเลนไทน์กับคุณครูค่ะ "
80000106-31 = "[ns] \"ช็อกโกแลตของพลาน่าจัง!\""
80000106-32 = "ใช่แล้วค่ะ ช็อกโกแลตที่ฉันทำเองค่ะ ใช้ส่วนผสมจากพลาน่า 100% ค่ะ ฉันแอบทำโดยที่รุ่นพี่อะโรน่า#nไม่รู้ค่ะ"
80000106-33 = "[s] \"อะ...อื้อ\""
80000106-34 = "นอกจากนี้สิ่งสำคัญคือต้องมอบให้คุณครูตอนที่รุ่นพี่อะโรน่าหลับอยู่ค่ะ เพราะจะเป็นช่วงเวลาที่ได้อยู่#nกับคุณครูสองต่อสอง เป็นยังไงบ้างคะ? สัมผัสได้ถึงเล่ห์เหลี่ยมของฉันไหมคะ? ฮุฮุฮุ"
80000106-35 = "[s] \"ตอนนี้พลาน่าจังคงเขินน่าดูเลยสินะ?\""
80000106-39 = "...... "
80000106-40 = "โหมดเงียบ... ฉันขอไม่ตอบในเรื่องนั้นค่ะ"
80000106-41 = "......"
80000106-42 = "ยอมรับ ใช่ค่ะ... ดูเหมือน... จะเป็นอย่างที่คุณครูพูดค่ะ"
80000106-43 = "[s] \"ขอบคุณนะพลาน่าจัง ครูจะกินให้อร่อยเลย\""
80000106-45 = "ค่ะ... ทานให้อร่อยนะคะ "

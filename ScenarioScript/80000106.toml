[translation]
80000106-1 = "Together with Everyone"
80000106-2 = "Sensei. You're here."
80000106-3 = "Ah. Yes. Arona is out like a light at the moment."
80000106-4 = "Meaning, we finally have a moment to talk alone. I didn't want to miss this perfect chance to prepare."
80000106-5 = "[s] \"Prepare what?\""
80000106-6 = "Don't you know what day it is, Sensei?"
80000106-10 = "[ns1] \"Today is Valentine's Day...\"\n[ns2] \"Which means, you must've prepared some chocolate?!\""
80000106-13 = "Affirmative. Yes, that's correct."
80000106-14 = "Here, I will give you one pat as a reward. Come here. Don't be shy."
80000106-20 = "What? Are you too dignified for head pats? "
80000106-21 = "Ah. You're worried that Arona might wake up while I'm giving you pats and become jealous?"
80000106-22 = "It seems Sensei is quite shy. I expected as much. "
80000106-23 = "You might not remember, but I've known you as long as Arona has."
80000106-24 = "So I will give you this Valentine's Day chocolate. "
80000106-31 = "[ns] \"Chocolate from Plana?!\""
80000106-32 = "Yes. I made this chocolate myself. It's made of 100% Plana. I kept a secret from Arona to not ruin the surprise."
80000106-33 = "[s] \"O-Okay...\""
80000106-34 = "I can finally spend time with you, without Arona. Pretty clever, aren't I, Sensei? Heeheehee."
80000106-35 = "[s] \"...Plana, did you not want Arona to see because you're a little shy too?\""
80000106-39 = "..."
80000106-40 = "...Silence. I do not need to answer that question."
80000106-41 = "..."
80000106-42 = "Acknowledged... Yes. I think...I am."
80000106-43 = "[s] \"Thank you, Plana. Your chocolate looks delicious by the way.\""
80000106-45 = "...Yes. Please enjoy."

[translation]
80000106-1 = "大家一起"
80000106-2 = "老師，您來了啊。"
80000106-3 = "沒錯，彩奈前輩正在睡覺，而且是熟睡狀態。"
80000106-4 = "這就代表，現在是我能跟老師單獨相處的時間。#n為了不錯過這個時機，我做好了準備。"
80000106-5 = "[s]「準備？是什麼準備？」"
80000106-6 = "是，老師知道今天是什麼日子嗎？"
80000106-10 = "[ns1]「今天是……情人節……」\n[ns2]「所以你準備的是巧克力嗎……！？」"
80000106-13 = "確認。沒錯，您答對了。"
80000106-14 = "給您摸頭作為獎勵。#n請別客氣，到這邊來吧。"
80000106-20 = "咦？您會害羞？"
80000106-21 = "理解。您是擔心被我抱在懷裡的時候，彩奈前輩要是醒過來該怎麼辦吧？"
80000106-22 = "果然如此。#n老師是個害羞的人，這點我很清楚。"
80000106-23 = "雖然老師可能不記得了，但我很了解老師。就跟彩奈前輩一樣了解。"
80000106-24 = "所以我要送老師情人節巧克力。"
80000106-31 = "[ns]「是星奈醬的巧克力！」"
80000106-32 = "沒錯，這是100%由星奈親手製作的巧克力。#n是我瞞著彩奈前輩偷偷做的。"
80000106-33 = "[s]「呃，嗯……」"
80000106-34 = "而且重點是選在彩奈前輩睡著，也就是和老師獨處的時機送給老師。#n\n如何？有感受到我的陰險狡詐嗎？呵．呵．呵。"
80000106-35 = "[s]「……看來星奈醬現在很害羞吧？」"
80000106-39 = "……"
80000106-40 = "……沈默。#n我不回答這個問題。"
80000106-41 = "……"
80000106-42 = "肯定…………您說的沒錯。"
80000106-43 = "[s]「謝謝你，星奈醬。我會好好享用的。」"
80000106-45 = "……是。請慢用。"

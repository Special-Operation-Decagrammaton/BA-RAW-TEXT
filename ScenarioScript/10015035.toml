10015035-5 = "1;수상한 밀레니엄 학생 B;00\n3;수상한 밀레니엄 학생 A;00\n#1;black\n#3;black"
10015035-6 = "5;수상한 밀레니엄 학생 C;00\n3;수상한 밀레니엄 학생 A;00;……사보타주는 계획대로 잘 진행되고 있겠지?\n#3;em;[?]\n#3;black\n#5;black\n#5;al"
10015035-7 = "5;수상한 밀레니엄 학생 C;00;문제없어. 신소재개발클럽의 복합 폭발 물질이 <황륜대제>에서 쓰기로 한 로봇을 박살 내는 걸 직접 내 두 눈으로 확인했으니까.\n#5;em;[반응]\n#5;black"
10015035-8 = "5;수상한 밀레니엄 학생 C;00;아예 처음부터 새로 만들지 않는 이상, 개회식 전까지 로봇을 수리하는 건 불가능할 거야.\n#5;black"
10015035-9 = "3;수상한 밀레니엄 학생 A;00;잘했어. 교내의 서버를 해킹해서 전산 장애를 일으키는 계획 쪽은 어때?\n#3;greeting\n#3;black"
10015035-10 = "1;수상한 밀레니엄 학생 B;00;그게…… 준비한 해킹툴이 서버의 보안 시스템에 막혀서 전부 무력화됐어…….\n#1;em;[땀]\n#1;black"
10015035-11 = "3;수상한 밀레니엄 학생 A;00;뭐? 그 해킹툴을 준비하는 데 얼마가 든 줄 알아?\n#3;em;[?!]\n#3;black"
10015035-12 = "1;수상한 밀레니엄 학생 B;00;어쩔 수 없잖아? 상대는 그 베리타스의 부부장이라고?\n#1;hophop\n#1;black"
10015035-13 = "1;수상한 밀레니엄 학생 B;00;세미나의 임원들조차 보안과 관련된 문제에서는 한 수 접고 들어가는 상대를 우리 같은 초짜가 어떻게 상대해?\n#1;black"
10015035-14 = "3;수상한 밀레니엄 학생 A;00;큿…… 하는 수 없지. 전산망을 이용한 사보타주는 포기하는 수밖에……\n#3;em;[속상함]\n#3;stiff\n#3;black"
10015035-15 = "3;수상한 밀레니엄 학생 A;00;하지만 이것만으로 세미나의 의지를 꺾기에는 아직 한참 모자라는데…… 다른 방법은 없을까?\n#3;black"
10015035-16 = "5;수상한 밀레니엄 학생 C;00;저기. 대신이라긴 뭣하지만, 공업 실습실 쪽에서 이런 걸 발견했는데……\n#5;em;…\n#5;black"

[translation]
10015035-6 = "...เรื่องทำลายงานน่ะ ยังเป็นไปตามแผนอยู่ใช่มั้ย?"
10015035-7 = "ไม่มีปัญหาอะไร ฉันเห็นกับตาเลยว่าหุ่นยนต์ที่จะใช้ในงาน <ฮาโลเฟสติวัล> โดนวัตถุระเบิดเชิงซ้อน#nของชมรมพัฒนาวัสดุใหม่ระเบิดไปหมดแล้วน่ะ"
10015035-8 = "ถ้าไม่ทำขึ้นมาใหม่ตั้งแต่ต้น ก็คงไม่มีทางซ่อมหุ่นยนต์เสร็จได้ทันก่อนที่พิธีเปิดจะเริ่มหรอก"
10015035-9 = "ทำได้ดีมาก แล้วแผนการแฮ็กเซิร์ฟเวอร์ภายในโรงเรียนเพื่อขวางการประมวลข้อมูลล่ะเป็นยังไงบ้าง?"
10015035-10 = "เรื่องนั้น... เครื่องมือแฮ็กที่เตรียมมาถูกไฟร์วอลล์ปิดกั้นไว้ได้หมด ก็เลยไม่ได้ผล..."
10015035-11 = "ว่าไงนะ? เครื่องมือแฮ็กที่เตรียมมานั่นมันแพงแค่ไหนรู้มั้ย?"
10015035-12 = "ก็มันช่วยไม่ได้นี่ อีกฝ่ายคือรองหัวหน้าชมรมเวอริทัสเลยนะ"
10015035-13 = "ขนาดสมาชิกของเซมิน่ายังยอมรับเรื่องการดูแลปัญหาเรื่องความปลอดภัย แล้วเราจะไปต่อกรด้วยได้#nยังไงกัน?"
10015035-14 = "ฮึ... ก็ช่วยไม่ได้นะ คงต้องยอมแพ้เรื่องแผนการขัดขวางการประมวลข้อมูล..."
10015035-15 = "แต่ถ้าแค่นี้คงยังไม่พอที่จะทำลายความน่าเชื่อถือของเซมิน่าได้... ไม่มีวิธีอื่นอีกแล้วเหรอ?"
10015035-16 = "คือ... จะว่าเป็นแผนสำรองก็ได้ แต่ฉันเจออะไรบางอย่างที่ห้องปฏิบัติงานวิศวกรรมด้วย..."
10015035-23 = "หุ่นยนต์' ตัวนี้ มันน่าจะยังไม่ได้ลงทะเบียนระบบรักษาความปลอดภัยนะ งั้นก็อาจจะใช้เครื่องมือแฮ็ก#nได้ใช่มั้ยล่ะ?"
10015035-24 = "ไม่เลวเลยนี่ ว่าแต่ชมรมวิศวกรรมไปพัฒนา 'หุ่นยนต์ต่อสู้' ไว้ตั้งแต่ตอนไหนเนี่ย?"
10015035-25 = "ที่มาจะเป็นยังไงก็ไม่สำคัญหรอก! ถ้าเราแฮ็กหุ่นยนต์ตัวนี้สำเร็จก็คงจะล้มงานมหกรรมแข่งขันกีฬาได้#nโดยที่ไม่ต้องออกแรงเองเลยด้วยซ้ำ"
10015035-26 = "ถึงจะรู้สึกผิดกับนักเรียนในเซมิน่าที่เตรียมงานมหกรรมแข่งขันกีฬากันมาอย่างหนัก แต่ก็ช่วยไม่ได้..."
10015035-27 = "เพื่อที่จะได้ไม่มีใครต้องเป็น 'เหยื่อ' อีกต่อไป..."
10015035-29 = "เราต้องล่ม <งานมหกรรมแข่งขันกีฬา> ให้จงได้!"

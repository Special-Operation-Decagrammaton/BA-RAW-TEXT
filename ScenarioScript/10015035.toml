10015035-23 = "3;수상한 밀레니엄 학생 A;00\n1;수상한 밀레니엄 학생 B;00\n5;수상한 밀레니엄 학생 C;00;이 '로봇'이라면 아직 보안 클라우드에 등록되지 않았을 테니 해킹툴을 사용할 수 있지 않을까?\n#5;em;[?]\n#5;black\n#1;black\n#3;black"
10015035-24 = "1;수상한 밀레니엄 학생 B;00;나쁘지 않네. 그보다 엔지니어부는 어느새 이런 '전투용 로봇'을 개발한 거지?\n#1;em;[반응]\n#1;black"
10015035-25 = "3;수상한 밀레니엄 학생 A;00;출처는 아무래도 좋아. 이 로봇을 해킹하는 데 성공한다면 직접 손을 쓰지 않고도 대운동회를 중단시킬 수 있을 거야.\n#3;greeting\n#3;black"
10015035-26 = "1;수상한 밀레니엄 학생 B;00;대운동회를 열심히 준비해 온 세미나의 학생들에게는 미안하지만 어쩔 수 없지……\n#1;black"
10015035-27 = "5;수상한 밀레니엄 학생 C;00;더 이상의 '피해자'를 늘리지 않기 위해서라도……\n#5;em;…\n#5;black"

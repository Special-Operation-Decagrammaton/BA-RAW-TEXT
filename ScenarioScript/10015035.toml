[translation]
10015035-6 = "……應該有順利照著計畫走吧？"
10015035-7 = "沒問題。#n我親眼看見新材料開發部的複合爆裂物質摧毀了預計在「晄輪大祭」使用的機器人。"
10015035-8 = "除非製造新的機器人，不然在開幕式前是不可能修理好的。"
10015035-9 = "做得好。駭入校內的伺服器引起通信故障的計畫呢？"
10015035-10 = "這個……準備好的駭入工具全被伺服器的安全系統擋下，所以無法發揮效用……"
10015035-11 = "什麼？你知道準備那些駭入工具花了多少錢嗎？"
10015035-12 = "這也沒辦法吧？對手可是貝里塔斯的副部長耶？"
10015035-13 = "就連研討會在安全相關的問題上也拿他沒轍，像我們這種新手又要怎麼對付他呢？"
10015035-14 = "呿……沒辦法。只好放棄利用網路破壞的方式了……"
10015035-15 = "但光憑這樣根本難以打擊研討會的意志……沒有其他方法了嗎？"
10015035-16 = "那個，要說替代方案的話……#n我在工業實習室發現了這種東西……"
10015035-23 = "這個「機器人」應該還沒登錄到安全系統的雲端上，駭入工具應該能起作用吧？"
10015035-24 = "這主意不錯。#n不過工程師部是什麼時候研發出這種「戰鬥用機器人」的呢？"
10015035-25 = "管它是從哪裡來的。#n只要能成功駭入這個機器人，不用親自動手就能讓大運動會停辦了。"
10015035-26 = "雖然對努力準備大運動會的研討會很抱歉，但這也是逼不得已的……"
10015035-27 = "為了避免出現更多的「受害者」……"
10015035-29 = "必須停止「大運動會」！"

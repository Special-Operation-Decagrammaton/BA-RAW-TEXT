10015035-1 = "#wait;1000"
10015035-2 = "1;수상한 밀레니엄 학생 B;00\n3;수상한 밀레니엄 학생 A;00\n5;수상한 밀레니엄 학생 C;00\n#1;black\n#3;black\n#5;black"

[translation]
10015035-6 = "Is everything going to plan?"
10015035-7 = "We're sabotaging left and right. I completely wrecked the robot the Material Development Club made. With the joints and circuit board fried, it's just scrap metal."
10015035-8 = "There's no way they'll repair that thing for their precious opening ceremony. They'd have to make a completely new one."
10015035-9 = "Good job. How is the hacking going? Did you manage to infiltrate the servers?"
10015035-10 = "About that... We couldn't exactly get past the server's security system."
10015035-11 = "Huh?! I bought the best hacking tools money has to offer for this job!"
10015035-12 = "I-I know, but this is the president of Veritas we're talking about here."
10015035-13 = "Even Seminar executives say challenging Chihiro is a lost cause. What are a bunch of amateurs like us supposed to do?"
10015035-14 = "Ugh... Fine. We'll have to let go of that route."
10015035-15 = "Petty tricks like this won't get Seminar to do anything! Is this all we've got?"
10015035-16 = "Um... Wh-What about this thing? I found it in the industrial lab..."
10015035-23 = "It's a really advanced robot...but it looks brand new. I bet they haven't set up all its security protocols yet. We could totally take control of it."
10015035-24 = "Not bad... When did the Engineering Department develop a combat robot like this?"
10015035-25 = "Nice plan. We hack this robot, and put an end to this farce of a field day without even showing our faces."
10015035-26 = "I don't have any grudge against the students who worked so hard to put this together, but..."
10015035-27 = "We have to do this! We won't let there be any more victims!"
10015035-29 = "We must stop the Kivotos Halo Festival, no matter what!"

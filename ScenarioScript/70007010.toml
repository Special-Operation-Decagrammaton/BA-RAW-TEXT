[translation]
70007010-1 = "การพบกันที่ไม่คาดคิด 1"
70007010-3 = "ดูจากที่อยู่แล้วก็ใช่นี่นา..."
70007010-4 = "ตอนนี้เป็นเวลาหกโมงเช้า... ไม่คิดเลยนะคะว่าการหาที่ออกกำลังกายที่เปิดตั้งแต่เช้าจะยากขนาดนี้..."
70007010-5 = "สมาชิกที่ห้องออกกำลังกายชอบบอกกันว่าจะไปห้องน้ำ แต่ก็เอาระเบิดพลาสติกไประเบิดประตูกัน"
70007010-6 = "ไหนจะสมาชิกที่กรีดร้องแล้วเอาปืนยิงหน้าต่างเพื่อจะหนีไปอีก ฉันพูดย้ำหลายครั้งว่าให้ติดตั้ง#nอุปกรณ์ป้องกันความปลอดภัยในห้องออกกำลังกายแล้วแท้ๆ"
70007010-7 = "ตอนนี้ห้องออกกำลังกายก็เลยปิดปรับปรุงอยู่ ในระหว่างรอซ่อมบำรุงหนึ่งสัปดาห์นี้ ฉันเลยต้องหาที่#nออกกำลังกายแห่งใหม่ค่ะ"
70007010-8 = "การซ่อมบำรุงครั้งนี้จะเพิ่มประตูกันระเบิดกับกระจกกันกระสุนเพื่อความปลอดภัยเข้าไปด้วย ป้ายห้องน้ำก็จะเปลี่ยนให้ใหญ่ขึ้น คงต้องคิดว่าเป็นเรื่องที่ดีละค่ะ"
70007010-16 = "อืม!"
70007010-17 = "บรรยากาศข้างในดูดีกว่าข้างนอกเยอะเลย"
70007010-18 = "โล่งอกไปทีที่มีเครื่องออกกำลังกายที่ตอบโจทย์การคาร์ดิโอของฉัน"
70007010-27 = "?"
70007010-29 = "?!"
70007010-30 = "(ตะ... ตายจริง!)"
70007010-31 = "(ตกใจจนเอามือทาบอกโดยไม่ทันได้รู้ตัวเลย)"
70007010-32 = "(ไม่คิดเลยว่าจะได้มาเจอกันในที่แบบนี้)"
70007010-33 = "(ในที่ออกกำลังกายเล็กๆ แบบนี้ ใครจะไปคิดว่าจะมีคนที่หุ่นเทพขนาดนี้อยู่ด้วย...!)"
70007010-34 = "(นี่เราประมาทไปสินะ ต่อไปคงต้องถ่อมตัวให้มากกว่านี้แล้วละ)"
70007010-36 = "ไม่ทราบว่า... มีธุระอะไรกับดิฉันหรือเปล่าคะ?"
70007010-37 = "ขอโทษที่เสียมารยาทค่ะ ฉันเดินหลงมาเพราะว่าหาห้องล็อกเกอร์ไม่เจอน่ะค่ะ"
70007010-38 = "อุ๊ยตาย ฮุฮุ เดินหลงมาถูกที่แล้วค่ะ ที่นี่ละค่ะ ห้องล็อกเกอร์ "
70007010-39 = "ขอบคุณค่ะ ฉันเพิ่งมาที่นี่เป็นครั้งแรก ก็เลยยังไม่รู้น่ะค่ะ"
70007010-40 = "ไม่ต้องขอบคุณกันหรอกค่ะ ดิฉันไม่ได้ทำอะไรให้เลยค่ะ"
70007010-41 = "ถ้ามีเรื่องที่ไม่รู้หรือต้องการอะไร ก็มาบอกดิฉันได้นะคะ"
70007010-45 = "(หุ่นดีแล้วยังใจดีด้วยแฮะ... ดูเป็นคนดีเลยนะ)"
70007010-48 = "เอาละ! ดื่มโปรตีนในเวลาน้ำชาตอนเช้าแล้ว งั้นก็มาเริ่มกิจวัตรประจำวันอย่างจริงจังกันเลยค่ะ!"
70007010-53 = "(ดื่มโปรตีนในเวลาน้ำชางั้นเหรอ...? ไม่เคยเห็นรูทีนแบบนี้มาก่อนเลยแฮะ)"
70007010-54 = "(แถมยังเตรียมอกไก่ มันเทศ แล้วก็กล้วยมากินอีก ถ้ากินตามลำดับแบบนี้ก็จะคล่องคอหน่อยสินะ)"
70007010-55 = "(อืม การแอบสังเกตคนอื่นออกกำลังกายอาจเป็นการกระทำที่เสียมารยาท เพราะมันจะไปขัดขวางคน#nที่ตั้งใจออกกำลังกายอยู่...)"
70007010-56 = "(แต่นี่เป็นรูทีนที่ฉันไม่เคยเห็นใครในมิลเลเนียมทำมาก่อนเลย จะบอกว่าทั้งคิโวทอสยังไม่เคยมีคนทำ#nแบบนี้เลยก็ยังได้)"
70007010-57 = "(ถึงมันจะเสียมารยาทไปหน่อย แต่ก็คงต้องสังเกตเอาไว้เพื่อการศึกษาแล้วละ)"
70007010-58 = "(วันนี้เป็นวันคาร์ดิโอของฉันก็จริง แต่ของดสักวันแล้วดูคุณคนนี้ออกกำลังกายดีกว่า)"
70007010-65 = "ถ้างั้นก็เริ่มด้วยบาร์เบลสควอทง่ายๆ ก่อนแล้วกันค่ะ"
70007010-66 = "เอ่อ ขอเสียมารยาทหน่อยนะคะ!"
70007010-67 = "ค่ะ มีเรื่องอะไรเหรอคะ?"
70007010-68 = "ที่จริงเครื่องสมิธแมชชีนของที่นี่มันค่อนข้างอันตรายถ้าจะใส่แผ่นน้ำหนักด้วยตัวเองน่ะค่ะ"
70007010-69 = "ถ้าคุณไม่รังเกียจ ดิฉันขอความช่วยเหลือหน่อยได้มั้ยคะ? ขอเบาๆ สัก 100 กิโลก็พอค่ะ"
70007010-70 = "(100 กิโล... นั่นมันหนักเลยนะ... แต่ยังบอกว่าเบาๆ งั้นเหรอ...?)"
70007010-71 = "ดะ... ได้สิคะ ฉันยินดีที่ได้ช่วยคนอื่นออกกำลังกายค่ะ"
70007010-72 = "อุ๊ยตาย ขอบคุณค่ะ!"
70007010-80 = "แบบนี้ใช้ได้มั้ยคะ?"
70007010-84 = "ทำไมใส่แผ่นละ 20 กิโล ข้างละ 2 แผ่นล่ะคะ?"
70007010-85 = "คะ?"
70007010-86 = "ต้องใส่ข้างละ 40 กิโล รวม 2 ข้างก็ 80 กิโล แล้วพอบวกน้ำหนักบาร์เบลอีก 20 กิโล ก็จะได้ 100 กิโล พอดีไม่ใช่เหรอคะ?"
70007010-87 = "โฮะๆๆ! คุณนี่ละก็ มีมุมที่แปลกจริงๆ เลยนะคะ"
70007010-88 = "ถ้าจะสควอท 100 กิโล ก็ต้องใส่ข้างละ 50 กิโลไปเลยสิคะ!"
70007010-89 = "ไม่นับน้ำหนักบาร์เบล 20 กิโลเหรอคะ?!"
70007010-90 = "บาร์เบลเป็นแค่อุปกรณ์ให้ใส่น้ำหนักเท่านั้น ทำไมถึงจะคิดน้ำหนักของมันด้วยล่ะคะ คุณนี่ละก็ คิดอะไรน่ารักมุ้งมิ้งจัง"
70007010-91 = "ถ้าต้องคิดน้ำหนักของบาร์เบลตอนออกกำลังกายด้วย ถ้างั้นตรงบาร์เบลก็ต้องเขียนกำกับไว้ว่าหนัก 20 กิโลสิคะ"
70007010-97 = "(คุณคนนี้ไม่ใช่คนปกติจริงๆ ด้วย!)"
70007010-98 = "(ปกติแล้วคนอื่นๆ ถึงขั้นต้องหักโหมเพื่อที่จะยกเพิ่มให้ได้อีกแค่ 1 กิโล แต่คุณคนนี้กลับไม่ได้สนใจน้ำหนัก 20 กิโลนี้เลยงั้นเหรอ)"
70007010-99 = "(แต่พอฟังดูแล้วมันก็ถูกอยู่นะ...)"
70007010-100 = "(นี่สินะ... 'ความแข็งแกร่ง'...!)"
70007010-105 = "ได้วอร์มร่างกายบ้างแล้ว งั้นก็ต้องต่อด้วยแลตพูลดาวน์!"
70007010-106 = "..."
70007010-107 = "(นี่เราแอบดูอย่างโจ่งแจ้งไปหรือเปล่านะ รู้สึกเหมือนคุณคนนั้นมองมาทางนี้อย่างนั้นละ...)"
70007010-108 = "(การสควอท 120 กิโล... ไม่สิ การสควอท 100 กิโลได้อย่างชิลๆ แบบนั้นมันน่าประทับใจมากเลย)"
70007010-109 = "(คงต้องไปออกตามรูทีนของตัวเองใกล้ๆ คุณคนนั้นแล้วละ)"
70007010-110 = "ฮืม วันนี้เป็นวันเวทเบาๆ งั้นก็ไม่ต้องขอให้คนอื่นมาเสริมน้ำหนักแล้วละค่ะ"
70007010-111 = "งั้นก็เริ่มกันเลย!"
70007010-112 = "หนึ่ง... สอง... สาม... สี่..."
70007010-113 = "(ถึงจะเวทหนักขนาดนั้น แต่ว่าฟอร์มก็ยังสวย แล้วก็หายใจได้คงที่ด้วยสินะ)"
70007010-114 = "ห้า... หก..."

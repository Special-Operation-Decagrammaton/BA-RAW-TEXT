[translation]
70007010-1 = "Met You by Chance 1"
70007010-3 = "This must be the place..."
70007010-4 = "Who'd have thought this would be the only fitness center open at 6 AM? Unbelievable."
70007010-5 = "Almost as unbelievable as my schoolmates blowing up our gym's bathroom with plastic explosives..."
70007010-6 = "Then shooting the elliptical out the window when I asked them to rerack their weights..."
70007010-7 = "Thanks to them, I have to commute to a new gym for a week while everything's renovated."
70007010-8 = "That said, it'll be nice to have blast-proof doors, bullet-proof glass, and...softer lighting in the restroom."
70007010-16 = "Mm!"
70007010-17 = "This place is nicer than I thought!"
70007010-18 = "At least there are plenty of free cardio machines. Those always fill up fast."
70007010-27 = "Wha...?"
70007010-29 = "?!"
70007010-30 = "(O-Oh my!)"
70007010-31 = "(I almost cried aloud. Screamed!)"
70007010-32 = "(To see such a woman! A goddess!)"
70007010-33 = "(Such separation, definition, and...vascularity! At this humble gym?)"
70007010-34 = "(I'm just standing here. I have to say something!)"
70007010-36 = "Excuse me. Do you need something?"
70007010-37 = "I'm a little lost. D-Do you know where the locker room is?"
70007010-38 = "Oh, my. Sweetheart, this IS the locker room. "
70007010-39 = "Er... Sorry! This is my first time here."
70007010-40 = "No need to apologize. We were all...beginners once."
70007010-41 = "Don't struggle in silence, sweetheart. Find me if you need more help!"
70007010-45 = "(She's so kind... What a welcoming person!)"
70007010-48 = "Right! Now that my morning protein teatime is over, let's get started."
70007010-53 = "(Protein tea...and she even has an elegant cup to go with it? Fascinating.)"
70007010-54 = "(And chicken breast, sweet potatoes, and bananas all layered together. How efficient!)"
70007010-55 = "(I know I shouldn't stare at the gym. I'd hate to be rude, but...)"
70007010-56 = "(I've never even heard of such a routine, let alone seen one!)"
70007010-57 = "(Such a paragon of fitness must be studied! Her secrets must be unearthed!)"
70007010-58 = "(And though today's my cardio day, maybe I can...integrate some NEW exercises...)"
70007010-65 = "Very well, let's start off gently with a few barbell squats."
70007010-66 = "Um, dear! Yes, you!"
70007010-67 = "Yes...ma'am?"
70007010-68 = "It's a tad dangerous to place the plates by myself on this squat rack."
70007010-69 = "May I ask for your help...if you don't mind? I'm thinking a breezy 100 kg."
70007010-70 = "(That's quite heavy... Wait, did she say \"breezy\"...?)"
70007010-71 = "O-Of course. I love helping someone...cultivate muscle."
70007010-72 = "Thank you so much!"
70007010-80 = "Does this look right to you?"
70007010-84 = "...Why did you only add two 20 kg plates?"
70007010-85 = "Pardon?"
70007010-86 = "40 kg on each side, so 80 kg added. Plus 20 kg from the bar weight. That's...100 kg?"
70007010-87 = "Heeheehee! Aren't you a silly one?"
70007010-88 = "If it's 100 kg, then you should put 50 kg on each side!"
70007010-89 = "B-But, the bar weighs 20 kg?!"
70007010-90 = "The bar is a mere accessory, darling. Ha! Counting bar weight...that's so cute!"
70007010-91 = "If the bar mattered, it'd have a dainty \"20 kg\" carved into it, wouldn't it?"
70007010-97 = "(She's...positively extraordinary!)"
70007010-98 = "(Everyone's out there trying to add 1 kg to their lifts, but she's treating 20 kg like it's nothing!)"
70007010-99 = "(What a mindset...a...a maximalized growth-focused grindset!)"
70007010-100 = "(So this is...what \"true strength\" means...!)"
70007010-105 = "That's enough of a warm-up. Time for some lat pulldowns!"
70007010-106 = "..."
70007010-107 = "(She's staring at me. She knows I've been looking...)"
70007010-108 = "(It's just been so long since I've seen a 120 kg—no, 100 kg—squat done. And with such form!)"
70007010-109 = "(I must act normal. Right...like I just happen to be doing the same exercise.)"
70007010-110 = "Hmm, we're keeping it light, so I won't ask her to get on top of the weights..."
70007010-111 = "Now then, let's go!"
70007010-112 = "One... Two... Three... Four..."
70007010-113 = "(Despite the heavy weight, she keeps her form and controls her breathing.)"
70007010-114 = "Five... Six..."

[translation]
70007010-1 = "偶然邂逅的你（１）"
70007010-3 = "從地址來看，應該是這裡沒錯……"
70007010-4 = "現在時間是早上六點……沒想到要找一間清晨營業的健身房竟然這麼困難……"
70007010-5 = "會員們不是說要去洗手間，結果用塑膠炸藥炸門……"
70007010-6 = "就是明明已經再三提醒在健身房內務必要關保險，#n卻還是尖叫著試圖開槍破壞窗戶逃出去……"
70007010-7 = "導致最終不得不進行修繕工程，這一週只能到處換健身房了。"
70007010-8 = "不過往好處想，剛好能趁這個機會增設防爆門與防彈玻璃，#n並換上比以前更大的洗手間指示牌……這樣會員們的安全應該也會更有保障吧。"
70007010-16 = "嗯！"
70007010-17 = "這間健身房的外表雖然普通，裡面倒是還挺不錯的。"
70007010-18 = "今天計畫要做的有氧訓練器材也很齊全，真是太好了。"
70007010-27 = "？"
70007010-29 = "！？"
70007010-30 = "（天，天啊！）"
70007010-31 = "（差點就不小心發出讚嘆了）"
70007010-32 = "（沒想到會在這種小型的健身房……）"
70007010-33 = "（遇見分離度與線條感都這麼出色的人……！）"
70007010-34 = "（真是讓人再次體會到了保持謙遜的重要性啊）"
70007010-36 = "請問……您有什麼事要找小女子嗎？"
70007010-37 = "不好意思。#n我正在找更衣室，結果不小心迷路了。"
70007010-38 = "哎呀，呵呵。#n看來您找對地方了，更衣室就在這裡沒錯唷。"
70007010-39 = "謝謝你。#n我是第一次來這間健身房，所以還不太熟。"
70007010-40 = "不用客氣。我只是做了該做的事而已。"
70007010-41 = "如果有不清楚或需要幫忙的地方，請儘管告訴小女子吧。"
70007010-45 = "（居然還這麼溫柔……看來是個很好的人呢）"
70007010-48 = "那麼！既然早上的蛋白質午茶時間也已經結束，就來正式開始訓練吧！"
70007010-53 = "（蛋白質午茶……？我還是第一次見到這種訓練流程）"
70007010-54 = "（原來如此……將雞胸肉、地瓜和香蕉由下而上依序擺放的話，吃起來就會很方便）"
70007010-55 = "（唔嗯……一直盯著別人的訓練過程，#n　除了會妨礙到自己的訓練之外，也是違反健身禮儀的行為……）"
70007010-56 = "（但這是我在千年和其他地方都前所未聞的全新訓練流程）"
70007010-57 = "（即便有點冒犯，也值得為了學習而參考一下）"
70007010-58 = "（今天雖然是有氧訓練的日子，不過就臨時改為仿效這位高手吧）"
70007010-65 = "那就先從最基本的槓鈴深蹲開始吧？"
70007010-66 = "不好意思，可以稍微打擾一下嗎？"
70007010-67 = "是，有什麼事嗎？"
70007010-68 = "其實這個深蹲架的構造有點危險，一個人裝槓片不是很安全。"
70007010-69 = "不介意的話，能麻煩您幫我裝到「輕鬆的」100kg嗎？"
70007010-70 = "（這個重量可不輕啊……但他卻說是「輕鬆的」……？）"
70007010-71 = "當，當然可以。#n能協助訓練總是件令人開心的事。"
70007010-72 = "哎呀，真是太感謝了！"
70007010-80 = "這樣可以嗎？"
70007010-84 = "那個……您怎麼好像只裝了兩片20kg的槓片？"
70007010-85 = "嗯？"
70007010-86 = "一邊40kg，兩邊就是80kg……加上槓的20kg不就是100kg嗎？"
70007010-87 = "呵呵呵！您還真有趣呢。"
70007010-88 = "所謂的100kg，不應該是兩邊各50kg的意思嗎？"
70007010-89 = "那槓的20kg呢！？"
70007010-90 = "槓只是用來固定槓片的工具而已，怎麼會算進重量裡面呢？#n您的想法還真可愛！"
70007010-91 = "如果要把槓的重量也算進去的話，上面不是應該要標示「20kg」才對嗎？"
70007010-97 = "（這位果然不是等閒之輩！）"
70007010-98 = "（當所有人都在想盡辦法多舉1kg的時候，他竟然把20kg當作不存在）"
70007010-99 = "（而且仔細想想，他說的話好像也挺有道理的……）"
70007010-100 = "（這……就是「強者」嗎！）"
70007010-105 = "身體也差不多熱開了，接下來是下拉訓練！"
70007010-106 = "……"
70007010-107 = "（他怎麼會看向我這邊……是我看得太明顯了嗎？）"
70007010-108 = "（好久沒見到有人這麼輕鬆地做著120kg……#n　不，是100kg的深蹲，一不小心就看到入迷了）"
70007010-109 = "（我也自然地在旁邊跟著做同樣的訓練吧）"
70007010-110 = "今天是輕量訓練日，就不麻煩別人站在槓片上加重了吧。"
70007010-111 = "那麼，開始吧！"
70007010-112 = "一……二……三……四……"
70007010-113 = "（舉著這麼重的重量，他的姿勢和呼吸卻依然穩定而平順……）"
70007010-114 = "五……六……"

70007010-1 = "#title;어쩌다 마주친 그대 1"
70007010-2 = "3;스미레;01\n#3;a\n#wait;1000"
70007010-3 = "3;스미레;01;주소를 보면 이곳이 맞는데……"
70007010-4 = "3;스미레;99;현재 시각은 오전 6시……. 아침부터 여는 헬스장을 찾기가 이렇게 힘들었을 줄이야……\n#3;em;[한숨]"
70007010-5 = "3;스미레;01;회원분들이 자꾸 화장실에 다녀온다면서 플라스틱 폭약으로 문을 폭파하시질 않나,"
70007010-6 = "3;스미레;04;헬스장 내에서는 안전장치를 걸어두라고 누차 말씀드렸음에도, 비명을 지르시면서 창문에 총을 쏘고 나가려고 하시질 않나,"
70007010-7 = "3;스미레;02;그 덕에 보수공사를 하느라, 일주일간은 이렇게 다른 헬스장을 전전하게 되었군요."
70007010-8 = "3;스미레;01;이참에 회원분들의 안전을 위해 방폭문과 방탄유리, 그리고 기존보다 더 큰 화장실 표지판도 새로 마련했으니 좋게 생각해야겠지요."

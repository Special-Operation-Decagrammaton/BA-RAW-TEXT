70007010-54 = "3;스미레;08;(확실히, 아래층부터 저렇게 닭가슴살, 고구마, 바나나 순서대로 두면 먹기 편할 것 같습니다.)\n#3;closeup"
70007010-55 = "3;스미레;04;(으음, 원래 다른 사람의 단련을 계속 지켜보는 것은, 체력 단련에 방해가 될 수 있는 헬스인들의 예의에 어긋난 행위이겠지만…….)\n#3;closeup"
70007010-56 = "3;스미레;99;(그러나 이것은 밀레니엄 안에서는 물론, 어디에서도 들은 바 없는 처음 보는 루틴.)\n#3;closeup"

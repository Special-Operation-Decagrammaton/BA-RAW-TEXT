[translation]
70007010-1 = "出会いは突然に（１）"
70007010-3 = "この辺りのはずですが……。"
70007010-4 = "いまは午前6時……早朝から営業しているジムを探すのが、こんなに難しいとは……。"
70007010-5 = "会員のみなさん、トイレに行く！とドアをプラスチック爆薬で吹き飛ばしたり――"
70007010-6 = "銃で窓を割り脱出しようとする人まで――ジム内では安全装置をかけるようお願いしているのですが……。"
70007010-7 = "おかげでジムが修理中の間、他の場所を利用することに……。"
70007010-8 = "ですが、これを機に防弾ガラスや防爆ドアも増設できましたし、トイレ案内も大きくしました。より良い環境作りにつながったと考えるべきですね。"
70007010-16 = "さて。"
70007010-17 = "小さなジムですが、設備が充実していますね。"
70007010-18 = "有酸素運動にピッタリな器具も揃っていて助かります。"
70007010-27 = "？"
70007010-29 = "！？ "
70007010-30 = "（な、なんと！）"
70007010-31 = "（危うく声が出そうになりました……！）"
70007010-32 = "（こんな場所で遭遇するなんて。）"
70007010-33 = "（なんという素晴らしい肉体美……）"
70007010-34 = "（私もまだまだトレーニング不足ですね……）"
70007010-36 = "あら、何かご用かしら……？"
70007010-37 = "すみません、迷ってしまって……ロッカールームはどちらでしょうか？"
70007010-38 = "うふふ。こちらよ。"
70007010-39 = "ありがとうございます。こちらのジムには今日初めて来たもので。"
70007010-40 = "どういたしまして。当然のことをしたまでですわ。"
70007010-41 = "またお困りのことがあったら、遠慮なくおっしゃってくださいね。"
70007010-45 = "（なんてお淑やかな人……）  "
70007010-48 = "それでは、朝のプロテインティータイムも終わったことですし、本格的にトレーニングを始めますわよ！"
70007010-53 = "（まるで優雅なティータイムのようにプロテインを楽しむとは……）"
70007010-54 = "（なるほど、鶏むね肉、サツマイモ、バナナ……トレーニングに最適な食事も完備しています……）"
70007010-55 = "（本来、他の方のトレーニングを眺めるのはマナー違反です……）"
70007010-56 = "（しかし、これはミレニアムで見たことも聞いたことのないメニュー……）"
70007010-57 = "（後学のために、失礼を承知で拝見させていただくとしましょう）"
70007010-58 = "（今日は有酸素運動を行う予定でしたが、少しだけこの方のメニューに合わせたトレーニングを行ってみますか）"
70007010-65 = "まずは、軽い運動……そうですね、バーベルスクワットから――"
70007010-66 = "……よろしいかしら？"
70007010-67 = "あっ、はい！何のご用でしょうか？"
70007010-68 = "このバーベルラック、1人でプレートを装着するのが少々難しいんです。"
70007010-69 = "軽く100kgほど着けようと思うのだけれど、手伝っていただけないかしら？"
70007010-70 = "（100kgを……軽く？） "
70007010-71 = "も、もちろんです。トレーニングのお手伝いができるのでしたら、喜んで。"
70007010-72 = "まあ！なんて心優しいお方！感謝いたしますわ。"
70007010-80 = "これで大丈夫ですか？"
70007010-84 = "なぜ、20kgを2枚……？私は100kgで――"
70007010-85 = "……え？"
70007010-86 = "片側に40kgずつ、両方で80kg。それにバーの重さ20kgを足して……合計100kgでは……？"
70007010-87 = "うふふ。斬新な発想をされますのね。"
70007010-88 = "100kgといえば、片側に50kgずつ付けるものですわ。"
70007010-89 = "ですが、バーの重さ分は……！？"
70007010-90 = "バーはただの固定具にすぎませんわ。それを重さに含めるなんて、可愛らしいことをおっしゃいますのね。"
70007010-91 = "もしバーの重さをカウントする必要があるなら、バーに「20kg」と大きく書かれているはずではなくて？"
70007010-97 = "（やはり、この方は身も心も規格外……！）"
70007010-98 = "（他のみなさんが1kgでも持ち上げられる重量を増やし、達成感を得ようとする中……この方は20kgを「無かったこと」に！）"
70007010-99 = "（でも、不思議と納得してしまうのはなぜでしょう……）"
70007010-100 = "（それこそが……「真の強さ」なのですね）"
70007010-105 = "体も十分ほぐれました。次はラットプルダウンとまいりましょうか！"
70007010-106 = "……"
70007010-107 = "（つい眺めすぎてしまったでしょうか……）"
70007010-108 = "（120kgのスクワットをあれほど軽々とこなす方を見るのは久しぶりでしたので、ついつい視線が……）"
70007010-109 = "（これではマナー違反ですね。そっと隣で同じメニューをこなすだけにしましょう）"
70007010-110 = "今日は軽めにこなしますから、ほかの方にウェイトになっていただく必要はありませんわね……。"
70007010-111 = "では、始めますわよ！"
70007010-112 = "いち！に！さん！し！"
70007010-113 = "（これほどの重量を扱いながら、フォームも呼吸も完璧です。……美しい）"
70007010-114 = "ご！ろく！"

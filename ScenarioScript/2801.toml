[translation]
2801-1 = "หนังสือคำร้องเพื่อห้องเรียนพิเศษ 1"
2801-2 = "พื้นที่รกร้างใกล้อาคารเรียนเก่า ห้อง 227"
2801-5 = "เฮ้อ... วันนี้หนาวกว่าปกตินะเนี่ย"
2801-6 = "หิมะตกหนักขนาดนี้ถ้ามัวแต่ยืนลังเลอยู่ละก็คงได้กลายเป็นก้อนมนุษย์หิมะแน่เลย..."
2801-7 = "แต่วันนี้ก็ถือว่าโชคดีที่เก็บกิ่งไม้แห้งที่เอาไว้ใช้ก่อกองไฟได้มากพอ แล้วก็ยังเก็บผลไม้สำหรับทานหลังอาหารมาได้ตั้งเยอะ... คงไม่ต้องห่วงว่าจะต้องอดแล้วค่ะ!"
2801-8 = "ดูอารมณ์ดีจังเลยนะโนโดกะ เก็บอะไรดีๆ ได้อย่างนั้นเหรอ?"
2801-9 = "อ๊ะ ชิกุเระจัง\n"
2801-10 = "ดูนี่สิคะ เก็บกิ่งไม้แห้งและผลไม้มาได้เยอะมากเลยค่ะ!"
2801-11 = "เมื่อเช้าหิมะตกหนักมากก็เลยกังวลว่าจะหาฟืนไม่ได้... แต่ก็โล่งอกไปทีที่เย็นนี้น่าจะได้กินอิ่ม นอนหลับในที่ที่อบอุ่นแล้วละ"
2801-12 = "ฮุฮุ อย่างนั้นก็ดีเลย"
2801-13 = "แต่ว่านะ เธอออกไปตากอากาศหนาวๆ ข้างนอกนานเกินไปรึเปล่า? แก้มแดงไปหมดแล้ว\n"
2801-14 = "งะ...งั้นเหรอ? มัวแต่เก็บกิ่งไม้จนลืมเรื่องอากาศไปเลย..."
2801-15 = "ก่อนอื่นไปหาที่หลบลมกันเถอะ ฉันจะก่อกองไฟให้เอง"
2801-18 = "เฮ้อ... พอได้ผิงไฟอุ่นๆ แบบนี้แล้วจู่ๆ ก็รู้สึกเพลียๆ ขึ้นมาเลยค่ะ... อา... อุ่นดีจัง"
2801-19 = "ดื่มโกโก้อุ่นๆ หน่อยมั้ยโนโดกะ?"
2801-20 = "อ๊ะ ขอบคุณค่ะ ชิกุเระจัง"
2801-21 = "ไม่หรอก โนโดกะเป็นคนหาฝืนมานี่นา ฉันต่างหากที่ต้องขอบคุณน่ะ"
2801-22 = "อีกอย่างแค่ได้เห็นรอยยิ้มของโนโดกะ... ฉันก็มีความสุขแล้วล่ะ"
2801-23 = "แค่ได้อยู่กับโนโดกะฉันก็พอใจแล้ว\n"
2801-24 = "ชิ... ชิกุเระจัง พูดอย่างนั้นฉันก็เขินแย่สิคะ..."
2801-26 = "โนโดกะ..."
2801-28 = "ชิกุเระจัง..."
2801-30 = "หยุด หยุดก่อน! หยุดเล่าก่อนค่ะ!"
2801-32 = "อาคารเรียนเก่า ห้องพิเศษ 227"
2801-33 = "นะ... นี่มันเรื่องอะไรกันคะเมรุจัง!"
2801-34 = "ทำไมฉันกับชิกุเระจังถึงได้จู้จี้กันเหมือนกับตัวเอกในนิยาย GL เลยล่ะคะ!?"
2801-35 = "หืม? ฉันก็แค่เขียนบันทึกความเป็นอยู่ของนักเรียนที่อาคารเรียนเก่าตามที่ถูกขอร้องมาเท่านั้นเองนะ?"
2801-36 = "แน่นอนว่าฉันปรุงแต่งด้วย 'เครื่องปรุง' ลงไปนิดหน่อย แต่เรื่องทั้งหมดก็เขียนมาจากเรื่องจริงทั้งนั้น ฮุฮุ..."
2801-37 = "นอกจากความหนาวและความหิวแล้ว ทุกอย่างก็คือเรื่องปรุงแต่งขึ้นมานี่นา?! เรื่องที่ฉันขอร้องไปคือ \"คำร้องที่แสดงให้เห็นถึงงสภาพความเป็นอยู่ที่ยากลำบากในอาคารเรียนเก่าของห้องเรียนพิเศษ 227!\" นะคะ ไม่ใช่เรื่องที่แต่งขึ้นแบบนี้ค่ะ!"
2801-38 = "ถึงพวกฉันจะส่งคำร้องไปมากแค่ไหน แต่ทางสำนักเลขาธิการก็ไม่เคยตอบกลับมาเลย... เพราะงั้นเลยคิดว่าถ้าขอให้นักเรียนคนอื่นเขียนให้ พวกเขาก็อาจจะฟังก็ได้…!"
2801-39 = "ก็ถ้าเขียนแต่ความจริงมันไม่สนุกนี่นา\n"
2801-40 = "ปกติแล้วถ้าจะดึงดูดความสนใจผู้อ่านก็ต้องใส่คำโกหกที่น่าฟังเข้าไปแบบนี้แหละ"
2801-41 = "หนังสือคำร้องไม่ต้องเขียนให้น่าสนใจก็ได้นี่คะ! แล้วอีกอย่างแบบนี้ไม่เห็นจะสนุกตรงไหนเลยค่ะ!!"
2801-42 = "อย่าโมโหไปเลยโนโดกะ ฉันว่ามันสนุกออกนะ"
2801-43 = "โดยเฉพาะการบรรยายฉากที่ทั้งสองคนนั่งผิงไฟอยู่ด้วยกัน..."
2801-44 = "...ชิกุเระจัง ตอนนี้พวกเราไม่ได้กำลังเตรียมลงประกวดงานเขียนวรรณกรรมนะคะ"
2801-45 = "ทั้งที่เขียนหนังสือคำร้องเพื่อจะบอกเล่าความเป็นจริงที่แสนทุกข์ทนและเย็นยะเยือกของอาคารเรียนเก่า แต่กลับใส่ความสัมพันธ์ที่ไม่บริสุทธิ์ระหว่างนักเรียนลงไปแบบนี้..."
2801-46 = "ถ้าส่งเรื่องนี้ไปที่สำนักงานเลขาธิการ พวกเขาก็คงจะพูดว่า \"ชีวิตที่ิอาคารเรียนเก่าก็ไม่ได้ยากลำบากเหมือนที่เขาลือกันนี่นา ดูท่าทางจะสนุกกันไม่น้อย...\" แล้วก็อาจโดนพักการเรียนนานขึ้นอีกก็ได้นะคะ!"
2801-47 = "ไม่น่าเชื่อถืออย่างงั้นเหรอ พูดเกินไปแล้ว บางทีเรื่องนี้อาจจะได้รับรางวัลวรรณกรรมของมิลเลเนียมไพรซ์ก็ได้ใครจะไปรู้"
2801-48 = "เรื่องพรรค์นั้นเอาไว้เขียนทีหลังเถอะค่ะ ตอนนี้พวกเราต้องการหนังสือคำร้องที่จะช่วยเราออกไปจาก#nอาคารเรียนเก่าแห่งนี้มากกว่านิยายต้นฉบับที่มีคุณค่าทางวรรณกรรมนะคะ!"
2801-49 = "ขอแบบที่สมจริงที่สุด! บรรยายความยากลำบากของพวกเรา! ช่วยเขียนให้ใหม่ด้วยค่ะ!"
2801-50 = "...รู้แล้วๆ จะเขียนให้ใหม่ก็แล้วกัน"
2801-52 = "เรียนท่านเลขาธิการที่เคารพ เหล่านักเรียนห้องพิเศษ 227 กำลังทุกข์ทรมานอย่างมาก เนื่องจากขาดแคลนเสบียง ยกตัวอย่างเช่น... ขนาดลูกอมเม็ดเล็กๆ ก็ต้องแบ่งกันกินสองคน...'"
2801-53 = "เยี่ยมไปเลย แบบนี้แหละค่ะ!"
2801-54 = "ช่วยยกตัวอย่างที่สมจริงแบบนี้อีกให้ถ่ายทอดถึงความลำบากของพวกเราได้ชัดเจนขึ้นด้วยค่ะ!"
2801-55 = "'เมื่อคราวก่อนตอนที่โนโดกะกำลังกินลูกอมที่หามาได้อย่างยากลำบาก...'"
2801-56 = "หืม...? เหมือนอยู่ๆ เรื่องก็เปลี่ยนแนวไปเลยนะคะ"
2801-57 = "ชิกุเระที่กลับเข้ามาที่ห้องเรียนทีหลังได้เห็นโนโดกะนั่งกินลูกอมอยู่คนเดียวจึงเดินเข้าไปใกล้ และเมื่อนึกถึงลูกอมที่ชุ่มไปด้วยน้ำลายของเด็กสาว ชิกุเระได้บังคับให้เธอเผยอริมฝีปากออก และลิ้นร้อนผ่าวของเธอก็ได้…'"
2801-59 = "เดี๋ยวก่อน หยุดก่อน! หยุด!"
2801-61 = "ทำไมเรื่องมันถึงได้กลายเป็นแบบนั้นอีกแล้วล่ะคะ?!"
2801-62 = "แต่ว่า...\n"
2801-63 = "สนุกดีนี่นา?"
2801-64 = "ตอนนี้เราไม่ได้ต้องการเรื่องสนุกนะคะ! เพราะชอบทำแบบนี้ไงถึงมีคนพูดกันว่าพวกบรรณารักษ์#nจากชมรมแนวร่วมปลดปล่อยความรู้ที่มีรสนิยมประหลาดๆ!"
2801-65 = "ฉันมันซื่อบื้อเองแหละค่ะที่มาขอให้เมรุจังช่วยเขียนหนังสือคำร้องให้!"
2801-66 = "ออกไปจากอาคารเรียนเก่าเดี๋ยวนี้เลยค่ะ!"
2801-69 = "ชิ มีตาหามีแววไม่... ถ้าผลงานชิ้นนี้โด่งดังขึ้นมาก็อย่ามาเสียดายทีหลังก็แล้วกัน!"
2801-71 = "บทความที่มีแต่เรื่องโกหกแบบนั้น ถึงจะให้ฟรีก็ไม่เอาหรอกค่ะ!"
2801-74 = "น่าเสียดายนะ ออกจะสนุกขนาดนี้"
2801-75 = "ชิกุเระจัง ฉันขอย้ำอีกครั้งนะคะ แค่ความสนุกเพียงอย่างเดียว ทำให้เราหลุดพ้นจากอาคารเรียนเก่า#nที่โหดร้ายแห่งนี้ไม่ได้นะคะ"
2801-76 = "สิ่งที่พวกเราต้องการในตอนนี้ก็คือ 'หนังสือคำร้องที่น่าเศร้าและสิ้นหวังจนแม้แต่พวกผู้บริหารที่จิตใจ#nหยาบกร้านยังต้องหลั่งน้ำตา' ต่างหากล่ะคะ!"
2801-77 = "พวกเราจะทนอยู่ในสภาพที่โดนละเลยและถูกปล่อยทิ้งไว้ในอาคารเรียนเก่าแบบนี้ไม่ได้...\n"
2801-78 = "ครั้งนี้เราจะต้องโน้มน้าวให้ประธานเชริโน่และกรรมาธิการสำนักเลขาธิการคนอื่นๆ มองเห็นการมีอยู่ของพวกเราให้ได้ และขอร้องให้ส่งพวกเรากลับไปอาคารเรียนหลักกันค่ะ!"
2801-79 = "มันก็จริงอยู่หรอกนะ... แต่ในสหภาพเรดวินเทอร์จะมีนักเรียนคนไหนที่เขียนบทความได้ดีกว่า <ชมรมแนวร่วมปลดปล่อยความรู้> อีกเหรอ?\n"
2801-80 = "อึ่ก ถึงจะเป็นเรื่องจริงก็เถอะ..."
2801-81 = "สิ่งที่จำเป็นสำหรับการเขียนหนังสือคำร้องไม่ใช่ถ้อยคำที่สละสลวย แต่เป็นความรู้สึกที่เข้าใจพวกเรา#nอย่างแท้จริงต่างหากค่ะ"
2801-82 = "จะต้องมีสหายคนอื่นที่ฝีมือการเขียนอาจจะยังไม่เก่งมาก แต่ก็เข้าใจความยากลำบากของพวกเรา และสามารถไว้ใจให้ช่วยเขียนหนังสือคำร้องให้เราได้อยู่ในสหภาพเรดวินเทอร์แน่นอนค่ะ!"
2801-83 = "เอาละ ชิกุเระจัง ไปตามหาพวกพ้องที่จะช่วยเราร้องเรียนกันเถอะ!"

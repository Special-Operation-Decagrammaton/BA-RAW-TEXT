[translation]
2801-1 = "227號特別班的請願書（１）"
2801-2 = "舊校舍227號鄰近廢墟"
2801-5 = "嗚嗚，今天特別冷呢……"
2801-6 = "雪又下個不停……站著不動的話感覺會變成雪人……"
2801-7 = "不過今天撿到了不少東西，今晚不用擔心餓肚子了！"
2801-8 = "妳好像很開心呢，和香。發生了什麼好事嗎？"
2801-9 = "啊，時雨醬。"
2801-10 = "妳看，撿到了好多樹枝！還有這些果實！"
2801-11 = "看來今晚可以填飽肚子，睡得暖暖的了……"
2801-12 = "這樣啊，那真是太好了。辛苦了。"
2801-13 = "但是不可以逞強哦。妳看，臉頰都凍紅了。"
2801-14 = "啊，啊咧？這麼嚴重嗎……？"
2801-15 = "趕快到屋子裡去吧，我馬上來升火。"
2801-18 = "呼，溫暖的感覺湧入了體內……好像整個人都活過來了……"
2801-19 = "和香，要喝可可嗎？"
2801-20 = "啊，非常感……謝謝時雨醬！"
2801-21 = "該道謝的是我才對。這麼冷的天謝謝妳啦。"
2801-22 = "……而且只要和香能像這樣露出笑容，我就很開心了。"
2801-23 = "謝謝妳，和香。謝謝妳願意和我在一起。"
2801-24 = "時，時雨醬……！？怎，怎麼突然說這些……"
2801-26 = "和香……"
2801-28 = "時雨醬……"
2801-30 = "停停停──！"
2801-32 = "舊校舍．227號特別班"
2801-33 = "愛，愛瑠醬！？這，這個故事到底是……！"
2801-34 = "為，為什麼我和時雨醬會這樣甜甜蜜蜜的……！？"
2801-35 = "問我為什麼，我只是收到了「紀錄舊校舍的學生們是在怎麼樣的環境裡生活」的委託，所以把發生的事情記錄下來而已……有什麼問題嗎？"
2801-36 = "當然多少加了點「調味料」，不過基本上都是根據事實寫成的呀。呵呵……"
2801-37 = "除了又冷又餓之外幾乎全都是捏造的不是嗎！？我拜託妳的只不過是記錄了「227號特別班在這嚴酷舊校舍的環境裡是多麼辛苦」的「請願書」，不是要妳創作故事！！"
2801-38 = "不管我們做什麼，但事務局都完全置之不理……如果是「其他學生的請求」的話，他們或許會聽進去，所以才拜託妳的。"
2801-39 = "可是，只寫事實的話不夠有趣啊。"
2801-40 = "為了持續引起讀者的興趣，有的時候「似是而非的謊言」也是必要的唷？"
2801-41 = "為什麼請願書需要在意「讀者的興趣」啊！而，而且這種內容……！"
2801-42 = "嘛嘛，我還挺樂在其中的唷？"
2801-43 = "篝火的場景特別棒呢，嗯。和香覺得呢？"
2801-44 = "時雨醬……我們現在不是在進行什麼文學獎的評比大會……"
2801-45 = "明明得把舊校舍悲慘的種種現實傳達出去才行……為什麼會變成這種，不，不健全的戀愛小說……"
2801-46 = "把這種東西送去事務局的話，說不定會被說「妳們在舊校舍過的挺快樂的嘛」， 反而可能會讓停學時間變得更長的……！"
2801-47 = "說是「這種東西」還真過分呢。這明明可能會是能在奇普托斯名留青史的名作。"
2801-48 = "現，現在不是討論文學價值的時候，不寫成正經的請願書的話……！"
2801-49 = "盡可能依據事實！請重新寫成能傳達我們苦衷的請願書！"
2801-50 = "真沒辦法，那就從頭開始……"
2801-52 = "「敬愛的書記長。227號特別班，目前正因嚴重的物資缺乏而過得非常辛苦。舉例來說，已經到了連一顆小小的糖果都要兩個人分著吃的程度。」"
2801-53 = "啊，不錯！照著這種感覺！"
2801-54 = "為了傳達我們的苦衷，請舉更多悲慘的例子吧！"
2801-55 = "「這是之前和香同學正在舔著費盡千辛萬苦得來的一顆糖果時發生的事……」"
2801-56 = "……愛瑠醬？用這種方式開頭沒問題嗎？我完全不知道有這種事……"
2801-57 = "「較晚進入舊校舍的時雨同學看見了和香同學。心裡想著在她的唾液中翻騰糖果的時雨，硬是撬開了她的嘴巴，將火熱的舌頭──"
2801-59 = "暫停──！！"
2801-61 = "為什麼又變成那樣了啊！？不管怎樣都會往那個方向發展嗎！？"
2801-62 = "可是……"
2801-63 = "不覺得這樣比較有趣嗎？"
2801-64 = "現在不需要有趣！所以才說你們嗜好擺第一的知識解放戰線……！"
2801-65 = "從一開始就不該拜託愛瑠醬的，是我的錯！"
2801-66 = "已經夠了，辛苦妳了！"
2801-69 = "竟然不知道這種展開有多好……等這個作品大賣之後才後悔就來不及了！"
2801-71 = "我，我才不在乎咧！"
2801-74 = "真可惜，還挺有趣的說。"
2801-75 = "時雨醬，問題不是那個……那樣無法達成我們的目的……"
2801-76 = "我們現在需要的是「只要讀了就連事務局那些沒血沒淚的人們都會哭得唏哩嘩啦的請願書」！"
2801-77 = "不能就這樣永遠待在這個舊校舍……"
2801-78 = "這次一定要向包含潔莉諾會長在內的事務局幹部們強調我們的存在，讓我們回到主校舍才行……！"
2801-79 = "這麼說也沒錯……但是赤冬聯邦學園裡還有能寫出比「知識解放戰線」更好文章的學生嗎？"
2801-80 = "唔，確實……一時之間想不出來……"
2801-81 = "可，可是，請願書需要的並不是寫作的能力！只要請能同情我們處境的人寫下他們真實的感受的話……！"
2801-82 = "這樣的人一定會在赤冬聯邦學園的某處才對！"
2801-83 = "來，我們走吧時雨醬！一起去找出「那個人」吧！"

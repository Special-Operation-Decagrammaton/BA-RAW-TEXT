[translation]
2801-1 = "A Petition for Spec Ops Part 1"
2801-2 = "Ruins Near Former Institute No. 227"
2801-5 = "It's so cold today!"
2801-6 = "And all this snow... I could very well turn into a snowman and die out here!"
2801-7 = "Heehee. Good thing I've got a bundle of dry branches and lots of fruit!"
2801-8 = "You look happy, Nodoka. Things went well?"
2801-9 = "Shigure!"
2801-10 = "It's true! Just look at my haul!"
2801-11 = "With all this snow, I thought I wouldn't find a single dry branch. But it turns out I'll have a nice cozy feast next to the fire."
2801-12 = "I'm glad to hear it."
2801-13 = "You need to take better care of yourself, though. Your face is red."
2801-14 = "R-Really? I guess I got a little carried away searching for supplies."
2801-15 = "Let's get you out of the cold. I'll make us a fire."
2801-18 = "*sigh* The fire's warming me up inside and out."
2801-19 = "Hot cocoa, Nodoka?"
2801-20 = "Thank you, Shigure. I don't know what I'd do without you."
2801-21 = "Me? You're the one who gathered wood for us. I'm grateful for you."
2801-22 = "And that adorable smile gives me the energy to keep going."
2801-23 = "We might be stuck here, but I'm happy to be stuck here with you, Nodoka."
2801-24 = "Sh-Shigure, I'm blushing..."
2801-26 = "Nodoka..."
2801-28 = "Shigure...."
2801-30 = "Stop, stop! Stop right now!"
2801-32 = "Former Institute No. 227"
2801-33 = "Wh-What in the heck is this, Meru?!"
2801-34 = "Why are Shigure and I protagonists in a romance novel?"
2801-35 = "What do you mean? I'm writing a story about the life of Former Institute#nNo. 227 students, just as you asked."
2801-36 = "I may have spiced up some of the details a little, but it's based on your lives!#nHeehee."
2801-37 = "A little?! Other than the fact that we're cold and hungry, everything is made up! I want to describe our lives here in these horrible conditions, not write an original story!"
2801-38 = "It didn't matter how loud we were. The Secretariat never responded... So we thought maybe if other students petitioned..."
2801-39 = "Hmm. No one cares about just your lives, though."
2801-40 = "Sometimes you need an interesting hook to get the readers reading."
2801-41 = "It's a petition! Not some story! And your version sucks anyway!"
2801-42 = "I kinda liked it."
2801-43 = "Especially the scene in front of the fire... It was romantic."
2801-44 = "Shigure. Please. Do you think all this work has been for a literary contest?"
2801-45 = "This is supposed to be about how awful and scary our lives are here!#nNot your fantasy teenage romance world."
2801-46 = "Imagine if we sent this to the Secretariat! That stupid Cherino would be like, \"They're supposed to be in punishment, but they're happy and in love! Suspend them forever!\""
2801-47 = "I think you're being a bit judgmental. This could be the next masterpiece in the history of Kivotos."
2801-48 = "Then do it on your own time! Right now, what we need is a petition to save us from our inevitable fate of starving to death in the cold at the Former Institute!"
2801-49 = "Please write it again—non-fiction this time!"
2801-50 = "Fine. I'll re-write it."
2801-52 = "\"Dear Great Leader. Our comrades of Spec Ops No. 227 are suffering from a serious shortage of supplies. We've even been forced to split our jawbreakers into two!\""
2801-53 = "Yes! Yes! That's perfect."
2801-54 = "Please include some examples so they understand our suffering."
2801-55 = "\"Nodoka was pitifully savoring her hard-earned candy...\""
2801-56 = "H-Huh? I don't like the direction this is going!"
2801-57 = "\"Shigure walked in to see her beloved Nodoka eating candy, all alone. She knelt down next to Nodoka and gently traced her mouth...\""
2801-59 = "Wait, stop! STOP!"
2801-61 = "Why are you doing this?!"
2801-62 = "Because..."
2801-63 = "It's fun?"
2801-64 = "We don't need fun right now! Ugh! I can't deal with the perverted librarians of the Knowledge Liberation Front!"
2801-65 = "I never should have placed my hopes and dreams in your hands."
2801-66 = "Please leave our home!"
2801-69 = "Hmph. Your loss. When my masterpiece becomes a hit, I'll be sure to forget you!"
2801-71 = "I don't care about your stupid, lying story!"
2801-74 = "What a shame. I wanted to see how it ended."
2801-75 = "I've said it before: We'll never escape this horrible place with your lackadaisical attitude."
2801-76 = "We need a petition that pulls at the Secretariat officers' heartstrings and makes them cry!"
2801-77 = "I won't let them keep neglecting us and our existences!"
2801-78 = "We need this appeal to work so we can go back to our regular lives."
2801-79 = "Yeah but...who are more capable writers than the Knowledge Liberation Front?"
2801-80 = "It doesn't matter!"
2801-81 = "A petition needs our sincere feelings, not flowery words."
2801-82 = "We just need to find comrades who are sympathetic to our situation.#nIt's not about the quality of the writing!"
2801-83 = "C'mon, Shigure! Let's find comrades to help us!"

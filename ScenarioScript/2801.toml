2801-5 = "3;노도카;04;으으…… 오늘따라 유난히 날씨가 춥네.\n#3;em;[속상함]\n#3;stiff\n#3;a"
2801-6 = "3;노도카;05;거기에 눈까지 이렇게나 펑펑 내리고 있으니, 잠시라도 머뭇거렸다가는 금세 눈사람이 되어버리겠어……."
2801-7 = "3;노도카;03;하지만 오늘은 운이 좋았는지 마른 나뭇가지도 충분히 주웠고, 식사 후에 먹을 나무 열매도 잔뜩 구했으니…… 굶을 걱정은 없겠어!\n#3;em;[음표]\n#3;greeting"
2801-8 = "3;노도카;03\n5;시구레;00;기분이 좋아 보이네, 노도카. 뭔가 좋은 물건이라도 주웠어?\n#3;m1\n#5;al\n#5;em;[?]"
2801-9 = "3;노도카;01;아, 시구레 쨩.\n#3;em;[반응]"
2801-10 = "3;노도카;03;이것 좀 봐. 마른 나뭇가지와 나무 열매를 잔뜩 주웠어!"
2801-11 = "3;노도카;01;아침부터 눈이 잔뜩 내려서 땔감을 구할 수 있을까 걱정했었는데…… 다행히 오늘 저녁은 따듯하고 배부르게 지낼 수 있을 것 같아.\n#3;em;[반짝]"
2801-12 = "5;시구레;08;후후, 그거 잘됐네."
2801-13 = "5;시구레;02;하지만 추운 밖에서 너무 오래 머무른 거 아냐? 볼이 발갛게 일어났어.\n#5;em;[...]"
2801-14 = "3;노도카;04;그, 그런가? 나뭇가지를 줍느라 정신이 팔려서 그만…….\n#3;em;[///]"
2801-15 = "5;시구레;03;우선 바람을 피할 수 있는 곳으로 가자. 내가 화톳불을 피워줄게."
2801-16 = "#all;hide"
2801-17 = "#wait;2000"
2801-18 = "3;노도카;03;하아…… 따듯한 불을 쬐고 있으니 몸이 노곤해져서…… 기분 좋아…….\n#3;em;[...]\n#3;greeting\n#3;a"
2801-19 = "5;시구레;09;코코아 마실래, 노도카?\n#5;em;[?]\n#5;al\n#3;m1"
2801-20 = "3;노도카;01;아, 고마워, 시구레 쨩. 덕분에 살았어.\n#3;em;[반응]"
2801-21 = "5;시구레;02;아니야, 장작을 구해온 건 노도카니까. 오히려 내가 고맙다는 말을 해야지."
2801-22 = "5;시구레;07;……게다가 노도카가 그렇게 웃어주기만 해도 나는 기쁘니까."
2801-23 = "5;시구레;08;노도카와 함께 있을 수 있다는 것 만으로도 나는 만족해.\n#5;em;[반짝]"
2801-24 = "3;노도카;04;시, 시구레 쨩. 부끄럽게 그런 말을 하면…….\n#3;em;[///]\n#3;stiff"
2801-25 = "#all;hide"
2801-26 = "3;시구레;09;노도카…….\n#3;closeup"
2801-27 = "#all;hide"
2801-28 = "3;노도카;01;시구레 쨩…….\n#3;closeup"
2801-29 = "#all;hide"
2801-30 = "#na;???;스톱, 스톱! 이 이야기는 중지에요!\n#fontsize;100"
2801-31 = "#all;hide"
2801-32 = "#place;구교사 227호"
2801-33 = "3;노도카;04;이, 이 이야기는 뭔가요, 메루 쨩!\n#3;stiff\n#3;a"
2801-34 = "3;노도카;05;어째서 저와 시구레 쨩이 GL 소설의 주인공들처럼 꽁냥거리고 있는 건가요!?\n#3;em;[?!]\n#3;hophop"
2801-35 = "1;메루;00;으응? 나는 분명히 구교사 학생들이 어떤 환경에서 지내고 있는지 기록해달라는 부탁을 받고 이야기를 쓴 것 뿐인걸?\n#1;em;[?]\n#1;ar\n#3;m5"
2801-36 = "1;메루;08;물론 '약간의 조미료'를 가미하긴 했지만, 여기에 적힌 내용들은 모두 사실에 기반한 것뿐이라고. 후후…….\n#1;em;[///]"
2801-37 = "3;노도카;05;춥고 배고픈 환경이라는 점만 빼면 전부 창작이잖아요?! 제가 부탁했던 건 '227호 특별반이 거친 구교사의 환경 속에서 얼마나 고생하고 있는가를 적은 탄원서' 이지, 오리지널 창작 스토리가 아니라고요!\n#3;em;[?!]\n#3;jump"
2801-38 = "3;노도카;04;저희가 그동안 계속 호소해왔지만, 사무국에서는 아무런 답변도 없어서…… 그래서 다른 학생의 부탁이라면 들어줄지도 모른다는 생각에 탄원서를 부탁한 건데……!"
2801-39 = "1;메루;01;하지만 사실만 적으면 재미없잖아.\n#1;stiff"
2801-40 = "1;메루;03;원래 독자의 흥미를 끌기 위해서는 가끔씩은 그럴싸한 거짓말도 섞어야 하는 법이라고.\n#1;em;[재잘]\n#1;jump"
2801-41 = "3;노도카;05;탄원서에 왜 흥미 요소가 필요한데요! 게다가 하나도 재미없거든요!!\n#3;em;[!]\n#3;hophop"
2801-42 = "5;시구레;09;너무 성내지 마, 노도카. 내가 보기에는 꽤 재미있었는 걸.\n#5;em;[반짝]\n#1;dl\n#3;m1\n#5;al"
2801-43 = "5;시구레;11;특히 화톳불 앞에서의 두 사람의 행동 묘사가 제법……."
2801-44 = "3;노도카;04;……시구레 쨩. 지금 우리는 문학 공모전 준비를 하고 있는 게 아니거든?\n#3;em;[속상함]\n#5;dr\n#3;m3"
2801-45 = "3;노도카;05;구교사의 현실을 처절하게 묘사하여 고충을 호소해도 모자랄 판에, 학생 간의 불순 연애를 다룬 스토리를 섞어 탄원서를 쓴다니……\n#3;stiff"
2801-46 = "3;노도카;04;이런 글을 사무국에 보냈다가는 \"구교사 생활이 힘들다더니, 소문과는 달리 뭔가 즐거워 보이네…….\" 라며 오히려 정학기간을 늘려줄 게 뻔하다고!\n#3;em;[!]\n#3;hophop"
2801-47 = "1;메루;02;허무맹랑하다니, 너무하네. 어쩌면 이 글이 키보토스의 역사에 길이 남을 명작이 될지도 모르는데.\n#3;m5\n#1;ar"
2801-48 = "3;노도카;05;그런 글은 다음 기회에 써주세요. 지금 저희에게는 문학적 가치가 담긴 창작 소설보다, 이 구교사에서 저희를 구해줄 탄원서가 더 급하다고요!"
2801-49 = "3;노도카;05;최대한 사실적으로! 저희의 고충을 담아서! 다시 써주세요!\n#3;em;[빠직]\n#fontsize;80"
2801-50 = "1;메루;05;……알았어, 알았어. 그럼 다시 한번 써볼게.\n#1;em;[속상함]\n#1;stiff"
2801-51 = "#all;hide"
2801-52 = "3;메루;99;'존경하는 서기장님. 227호 특별반의 동지들은 심각한 물자 부족으로 인해 고통받고 있습니다. 예를 들자면…… 작은 알사탕 하나도 두 사람이 나누어 먹을 정도이지요.'\n#3;greeting"
2801-53 = "#na;노도카;좋아요, 바로 그거에요!"
2801-54 = "#na;노도카;좀 더 저희의 고충이 잘 느껴지도록 현실적인 예시를 들어 계속 써 주세요!"
2801-55 = "3;메루;08;'지난번 노도카 양이 어렵게 구한 사탕 하나를 먹고 있었을 때의 일이었습니다…….'\n#3;em;[...]\n#3;stiff"
2801-56 = "#na;노도카;……으응? 갑자기 이야기의 장르가 바뀐 기분이 드는데요."
2801-57 = "3;메루;07;'뒤늦게 구교사에 들어온 시구레 양은 노도카 양이 혼자서 사탕을 먹는 것을 발견했습니다. 그녀의 침으로 젖은 사탕을 떠올리며 시구레 양은 노도카 양에게 가까이 다가가 입을 억지로 벌리고, 뜨거운 혀를…….'\n#3;em;[///]\n#3;hophop\n#3;closeup"
2801-58 = "#all;hide"
2801-59 = "#na;노도카;잠깐, 스톱! 스톱!\n#fontsize;80"
2801-60 = "#all;hide"
2801-61 = "1;메루;07\n5;노도카;04;어째서 이야기가 또 그 방향으로 흘러가는 건가요?!\n#1;a\n#5;a\n#1;h\n#5;h\n#5;em;[?!]\n#5;hophop"
2801-62 = "1;메루;01;하지만……\n#1;m2"
2801-63 = "1;메루;03;그 편이 재밌잖아?\n#1;em;[음표]\n#1;m3\n#1;greeting"
2801-64 = "5;노도카;04;재미는 지금 필요 없다고요! 이래서 비뚤어진 취향에 뇌가 절여진 지식해방전선의 사서들이란……!\n#5;em;[속상함]\n#5;stiff"
2801-65 = "5;노도카;06;메루 쨩에게 탄원서를 부탁하려던 제가 바보였어요!"
2801-66 = "5;노도카;05;당장 구교사에서 나가주세요!\n#5;em;[!]\n#5;m3\n#1;dl\n#bgshake\n#fontsize;80"
2801-67 = "#wait;500"
2801-68 = "#all;hide"
2801-69 = "3;메루;05;쳇, 이 명작을 알아보지 못하다니…… 이 작품이 대히트를 하고 나서 후회해도 소용없다고!\n#3;em;[속상함]\n#3;stiff"
2801-70 = "#all;hide"
2801-71 = "3;노도카;05;그런 거짓말로 가득한 엉터리 글, 거저 준다고 해도 안 받을 거라고요!\n#3;em;[빠직]\n#3;hophop"
2801-72 = "#bgshake\n#wait;1000"
2801-73 = "#wait;1000"
2801-74 = "5;시구레;11;아쉽네. 꽤 재미있는 글이었는데.\n#5;al\n#3;m1"
2801-75 = "3;노도카;06;시구레 쨩. 다시 말하지만, 재미만으로는 이 가혹한 환경의 구교사를 빠져나갈 수 없거든?\n#3;em;[반응]"
2801-76 = "3;노도카;05;지금 우리에게 필요한 건 '사무국의 피도 눈물도 없는 간부들조차 눈물 없이는 읽을 수 없는, 절절한 사연의 탄원서'라고!"
2801-77 = "3;노도카;04;이렇게 방치된 상태로 구교사에 계속 머무를 수는 없어…….\n#3;em;[...]"
2801-78 = "3;노도카;05;이번에야말로 체리노 회장을 비롯한 사무국의 간부들에게 우리의 존재를 어필해서 원래의 교실로 복귀하는 거야!\n#3;hophop"
2801-79 = "5;시구레;06;그건 그렇지만…… 붉은겨울 연방학원에 <지식해방전선>보다 글을 잘 쓰는 학생들이 모여 있는 동아리가 또 있을까?\n#5;em;[?]"
2801-80 = "3;노도카;04;윽, 그건 사실이지만……\n#3;em;[...]\n#3;stiff"
2801-81 = "3;노도카;02;뭐, 탄원서에 필요한 건 화려한 미사여구보다 우리를 가엾게 여기는 진실한 마음이니까."
2801-82 = "3;노도카;05;비록 글의 실력은 다소 모자라더라도, 우리의 고충을 이해하고 탄원서를 써 줄 수 있는 믿음직한 동지들이 붉은겨울 학원의 어딘가에 남아 있을 거야!\n#3;em;[!]\n#3;stiff\n#3;m3\n#5;dr"
2801-83 = "3;노도카;01;자, 시구레 쨩. 우리의 탄원을 도와줄 동지들을 함께 찾아 떠나자!\n#fontsize;80"
2801-84 = "#wait;1000"

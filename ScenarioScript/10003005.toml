[translation]
10003005-1 = "委員長需要休息"
10003005-3 = "要去度假了！"
10003005-7 = "……什麼？"
10003005-8 = "度假……？這麼突然……？"
10003005-10 = "哎呀……？大家這是什麼反應？我可不是在說笑喔？"
10003005-12 = "是能做什麼反應……"
10003005-13 = "聽到緊急呼叫，還以為出了什麼事呢……"
10003005-14 = "突然被炫耀要去度假……身為聽者也只會感到困擾而已……"
10003005-15 = "算了，那亞子醬是要去哪度假？"
10003005-17 = "……嗯？去哪度假……？"
10003005-18 = "不對不對不對！剛才說的不是我要去度假！"
10003005-19 = "怎麼會為了炫耀自己要去度假而召集大家呢？"
10003005-20 = "我在你們眼中像是會做那種事的人嗎……"
10003005-21 = "我說的「度假」，是指我們風紀委員會……"
10003005-22 = "不，正確來說，是讓委員長去度假！"
10003005-24 = "……委員長？"
10003005-25 = "怎麼這麼突然……？"
10003005-27 = "那是因為……最近，委員長的狀態不太尋常……"
10003005-28 = "感覺是累積了不少壓力，讓人不由得擔心起來……"
10003005-29 = "什麼意思？"
10003005-30 = "比如說今天上午，我去委員長辦公室的時候……"
10003005-34 = "委員長。這是整理好的本週的日程報告書，我放在這兒。"
10003005-35 = "然後是我泡好的咖啡，方便的話請享用。"
10003005-37 = "……嗯。"
10003005-39 = "前幾天偶然取得了不錯的豆子。"
10003005-40 = "所以我花了些時間沖泡，聞起來很香唷。"
10003005-41 = "……這樣啊。"
10003005-43 = "唉……"
10003005-44 = "（呵呵。連咖啡涼了都沒注意，專注於工作的委員長……一如既往的帥氣呢……！）"
10003005-45 = "嗯……？#n我說亞子，這個「關於與夏萊合作巡邏的提案書」是……？"
10003005-46 = "這個……？#n啊啊，關於下次的風紀委員會定期巡邏，我認為請夏萊稍作協助會比較好。"
10003005-47 = "……和夏萊一起巡邏？"
10003005-48 = "是的。不過，這還只是提案階段，委員長如果認為沒必要的話……"
10003005-49 = "……不，放著吧。如果能和夏萊合作，對風紀委員會來說或許不壞。"
10003005-50 = "……是啊。和夏萊……"
10003005-52 = "啊，委員長……！？那杯是我喝過的……！"
10003005-53 = "……啊，搞錯了。"
10003005-54 = "委員長竟然會犯那種錯誤，真是稀奇……"
10003005-55 = "等等。你說委員長不太尋常，就只是這樣……？"
10003005-56 = "這種小錯誰都可能會犯吧。#n有需要那麼大驚小怪嗎？"
10003005-57 = "我也覺得沒什麼問題耶……？"
10003005-58 = "還沒說完！在這之後……！"
10003005-60 = "……唔，話說回來。"
10003005-65 = "亞子泡的咖啡，果然很好喝。"
10003005-66 = "莫非……我們現在聽到的是亞子醬的妄想……？"
10003005-67 = "那個委員長，竟然會對入口的東西發表感想……"
10003005-68 = "亞子行政官，如果你累到出現幻聽的話，最好先休息一下……"
10003005-69 = "才不是呢！？是我親耳聽到的，才不是幻聽！"
10003005-71 = "嘛，如果這是真的……委員長，看來確實是累壞了……"
10003005-72 = "雖然委員長至今也不是完全沒說過……但他真的是說「很好喝」嗎？"
10003005-73 = "確定不是「還不錯」、「還能喝」或是「果然不能沒有咖啡因」之類的嗎？#n果然是行政官聽錯了吧……？"
10003005-75 = "我說……你們果然是在欺負我吧？"
10003005-76 = "唔嗯，嘛，暫且當亞子醬說的是事實……"
10003005-77 = "……這樣的話，事情就相當嚴重了。"
10003005-78 = "是吧！？果然在大家眼中也覺得奇怪吧！？"
10003005-79 = "是緊急狀況！！這樣下去會關係到風紀委員會的存亡！"
10003005-80 = "……咦，什麼意思？"
10003005-82 = "如果委員長因為過勞而倒下……要說那天就是風紀委員會的末日也不為過！"
10003005-83 = "那個……？"
10003005-84 = "一聽說委員長不在風紀委員[ruby=Pandemonium Society]會，萬魔殿想必[/ruby]不會袖手旁觀……"
10003005-85 = "為了掌握格黑娜的主導權，肯定會來鎮壓我們的！"
10003005-86 = "這麼一來，格黑娜學園……不，奇普托斯將會陷入前所未有的混亂之中！"
10003005-87 = "也就是說，這件事關乎奇普托斯的命運！"
10003005-90 = "雖然我也不是不明白你說的話……"
10003005-91 = "總而言之！"
10003005-92 = "現在最重要的，是讓委員長好好休息……！#n身為風紀委員會行政官的天雨亞子我在此宣布。"
10003005-93 = "為了委員長和風紀委員會……以及奇普托斯的未來！"
10003005-95 = "將進行「委員長需要休息」作戰！"
10003005-97 = "太誇張了吧……"
10003005-98 = "只要是和委員長有關的事，亞子行政官有時就會變成這樣……"
10003005-99 = "但問題是，委員長不會願意休息吧……#n我可從沒見過他休假……"
10003005-100 = "就是說啊。即使強迫他休假，沒過多久又會重新出現在學園裡……"
10003005-102 = "是啊……不管怎麼談論休息的話題，總是說「休息的話，一天5分鐘就夠了」……"
10003005-103 = "委員長，是個徹頭徹尾的工作狂啊……"
10003005-104 = "這個作戰，從一開始就不可行吧……？"
10003005-105 = "不！既然沒有理由，那就找個理由就好了！找個委員長也能接受的特別理由！"
10003005-106 = "辦的到嗎……？"
10003005-107 = "嗯，請交給我吧！正好前幾天，收到了萬魔殿的要求。"
10003005-108 = "「提交今年的夏季訓練計畫書」。"
10003005-109 = "唔……"
10003005-110 = "唉……又來了啊。"
10003005-111 = "那個，真的很麻煩呢……"
10003005-112 = "反正，他們也不是真的想要我們好好訓練吧……"
10003005-113 = "那些傢伙只要看到計畫書上出現任何不夠完善的地方，#n就會當場說什麼「這樣不行啊～不如改去這裡訓練如何？」之類的，根本是在找碴！"
10003005-114 = "要是又像去年一樣被送去欣嫩火山……嗚嗚，我討厭在夏天的火山訓練……"
10003005-115 = "但站在風紀委員會的立場又不能無視命令……#n唉……"
10003005-116 = "你們說的沒錯。所以今年的夏季訓練，在我和風紀委員會企劃部的成員們討論後，#n本來打算在附近做一些戰術訓練搪塞過去的……"
10003005-117 = "但現在情況不同了。#n我們就利用這個機會吧。"
10003005-118 = "難道讓委員長不得不接受的理由就是……？"
10003005-119 = "嗯，你說的沒錯，千夏。"
10003005-120 = "利用萬魔殿愛找麻煩這點，制定一個風紀委員會的集訓計畫！"
10003005-121 = "既然是萬魔殿的要求，委員長也不能拒絕吧！"
10003005-122 = "但是亞子醬。話雖如此，訓練就是訓練吧？"
10003005-123 = "這和讓委員長休息不是完全相反嗎？"
10003005-124 = "呵呵。這很簡單，伊織。"
10003005-127 = "今年的夏季集訓，就在海邊進行吧！"
10003005-128 = "去海邊，把委員長幽禁在飯店裡！"
10003005-129 = "……幽禁？"
10003005-130 = "什麼意思……？這跟休假有什麼關係……？"
10003005-131 = "就是所謂的「宅度假」呀，宅度假！"
10003005-132 = "「宅度假」……那是什麼？"
10003005-133 = "宅度假……我有聽說過。是「宅在飯店內度假」的簡稱……#n是指在飯店內悠閒地放鬆身心，感受放假氛圍的新度假形式吧？"
10003005-134 = "對，就是那個。"
10003005-135 = "首先以訓練為由將委員長帶到海邊。"
10003005-136 = "接著將委員長推入飯店，這段期間都不交代任何工作，藉此強迫他休息。"
10003005-137 = "然後只要讓委員長出不了飯店的房間就行了！"
10003005-138 = "亞子醬，這真的是休假嗎！？"
10003005-139 = "人類本來就是只要沒事做就會開始發呆的動物！#n只要強制遠離工作，肯定就會睡著的！"
10003005-140 = "一定要強迫他休息！委員長已經好幾天沒睡覺了哦……！"
10003005-141 = "唔……大致上明白了……"
10003005-142 = "但說到底，那個委員長有這麼好對付嗎……？"
10003005-143 = "呵呵，千夏。為此我準備了必勝的手段……"
10003005-145 = "就是夏萊的老師！"
10003005-146 = "請老師全力支持我們！"
10003005-147 = "[s1]「你說有事找我所以就過來看看……」\n[s2]「不過你剛剛是不是說了什麼奇怪的話……？」"
10003005-148 = "咦，啊？怎麼回事，為什麼要找老師……？"
10003005-149 = "咦，啊？怎麼回事，為什麼要找老師……？"
10003005-150 = "夏萊有充分的權限對格黑娜風紀委員會的訓練計畫提出建議。"
10003005-151 = "也就是說，只要老師合作，完全有可能將這次的訓練場地移師到海邊。"
10003005-152 = "老師連這種事都做得到嗎……我倒有點懷疑。"
10003005-153 = "畢竟是負責指導學生的老師，提出的意見想必是相當有影響力的吧。"
10003005-154 = "[s]「雖然我明白要做什麼，但真的會那麼順利嗎……？」"
10003005-155 = "哎呀，難道老師打算拒絕嗎？呵呵呵。"
10003005-156 = "如果是的話，我也有的是法子唷？"
10003005-157 = "在情報部蒐集的資料中，有很多關於老師的有趣資訊……"
10003005-158 = "哇，是平常的壞心眼亞子醬……"
10003005-159 = "亞子行政官，再怎麼說也不能對夏萊的老師那麼失禮……"
10003005-160 = "[s]「怎麼會呢，我不會拒絕的。倒不如說請讓我幫忙。」"
10003005-161 = "……？"
10003005-162 = "[s3]「這都是為了陽奈吧？」\n[s4]「大家的行動是出於善意，我當然會協助。」"
10003005-163 = "唔……沒，沒想到會是這種反應……"
10003005-164 = "唔……沒，沒想到會是這種反應……"
10003005-165 = "……嘛，的確是老師的作風。"
10003005-166 = "難得被擺了一道呢，亞子行政官。"
10003005-167 = "[s]「而且只要合作的話，就能看到大家穿泳裝的樣子對吧！？」"
10003005-168 = "雖然只有幾句，但誇獎你的我真的是笨蛋！變態！果然還是去死吧！"
10003005-170 = "（哎呀呀……）"
10003005-171 = "總，總之，既然已經確定老師願意合作！剩下的就是攻略委員長了……！"
10003005-173 = "嗯。知道了。"
10003005-174 = "……咦！？委，委員長，真的可以嗎……！？可以去嗎……！？"
10003005-175 = "有什麼不可以的，夏季集訓是例行活動吧？沒有拒絕的理由。"
10003005-176 = "說，說的也是呢！說的也是……！"
10003005-178 = "（唉……）"
10003005-179 = "（只要對象是委員長，亞子醬的企圖就會全暴露在臉上……）"
10003005-180 = "話說回來，今年的訓練場地已經準備好了。"
10003005-181 = "格黑娜欣嫩火山的94-13地區，山腳下的那間山莊……"
10003005-182 = "那裡的話，萬魔殿也不會有意見了吧。#n雖然環境惡劣，但要做就做徹底一點。"
10003005-183 = "又是那座火山！？明明沒有被萬魔殿逼迫！？"
10003005-184 = "……？"
10003005-185 = "請，請等一下，委員長。#n莫非連訓練計畫也已經……？"
10003005-186 = "嗯。我想說萬魔殿也差不多要開口了。"
10003005-187 = "（怎麼會……！這麼一來，所有的計畫都要泡湯了……！）"
10003005-188 = "（該，該怎麼辦才好……！？）"
10003005-191 = "[ns5]「說到夏季集訓，當然要去海邊啊！」\n[ns6]「說到夏季集訓，當然得穿泳裝吧！」"
10003005-192 = "……海邊？泳裝……？老師怎麼這麼突然……而且，怎麼會在這裡……？"
10003005-193 = "……海邊？泳裝……？老師怎麼這麼突然……而且，怎麼會在這裡……？"
10003005-194 = "嗯？亞子的意見？#n要在新的地點……進行新的訓練？"
10003005-195 = "是，是的！就是那樣！我已經提前告訴了老師……！"
10003005-196 = "委員長平常很是繁忙，不可能一直承擔所有的責任。"
10003005-197 = "所以這次訓練的企劃和進行……可以交給我來處理嗎？"
10003005-198 = "那倒是無妨，不過至今為止從沒在海邊集訓過……"
10003005-199 = "老，老師很了解海邊！相信一定會是很新穎及高效的訓練！"
10003005-200 = "……嗯。"
10003005-201 = "……知道了。"
10003005-202 = "既然亞子都這麼說了……"
10003005-203 = "……！可，可以嗎？"
10003005-204 = "嗯，畢竟是亞子直接向我提出的意見。#n行政官就是為了這種時候存在的。"
10003005-205 = "而且如你所說，事情全都由我處理的話，顯然也不夠有效率……"
10003005-207 = "那麼，這次就拜託你了。"
10003005-208 = "加油吧。"
10003005-211 = "（啊啊……）"
10003005-212 = "（沒想到會這麼順利……）"
10003005-213 = "（成，成功了……！）"
10003005-214 = "[ns]「好耶！去海邊囉──────！」"
10003005-216 = "（就這樣，風紀委員會今年夏季集訓的舞台，就決定是「海邊」了）"

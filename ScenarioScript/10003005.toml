[translation]
10003005-1 = "ท่านประธานต้องพักซะบ้าง"
10003005-3 = "เราจะไปพักผ่อนกันค่ะ"
10003005-7 = "คะ...? อะไรนะคะ"
10003005-8 = "วันหยุด...? เดี๋ยวนี้เลยเหรอ?"
10003005-10 = "เอ๋...? ทำไมทุกคนถึงแสดงท่าทางอย่างนั้นกันล่ะคะ? ฉะ...ฉันกำลังจริงจังอยู่นะคะ"
10003005-12 = "อืม... เรื่องนั้นมัน..."
10003005-13 = "เห็นติดต่อมาเพราะบอกว่ามีธุระด่วน ฉันก็นึกว่ามีภารกิจอะไรซะอีก..."
10003005-14 = "จู่ๆ ก็พูดว่าจะไปพักผ่อนขึ้นมาแบบนี้... สำหรับพวกเราแล้วมันค่อนข้างลำบากนะคะ"
10003005-15 = "ว่าแต่อาโกะจัง เธอวางแผนจะไปเที่ยวที่ไหนเหรอ?"
10003005-17 = "คะ? แผนไปเที่ยวเหรอคะ...?"
10003005-18 = "มะมะมะ...ไม่ใช่นะคะ! ฉันไม่ใช่คนที่จะไปพักผ่อนหรอกนะคะ!"
10003005-19 = "ทุกคนคิดว่าฉันเรียกทุกคนมาเพื่ออวดเรื่องจะไปเที่ยวพักผ่อนเหรอคะ ได้ยังไงกัน... ใจร้ายกันจังค่ะ"
10003005-20 = "หรือว่าปกติเห็นฉันเป็นคนแบบนั้นงั้นเหรอคะ?!"
10003005-21 = "ที่ฉันจะบอกก็คือ... คณะกรรมการวินัยของเราจะไปเที่ยวพักผ่อนกันค่ะ... "
10003005-22 = "หรือพูดให้ถูกก็คือ เราจะหาวันหยุดพักผ่อนให้กับท่านประธานกันค่ะ!"
10003005-24 = "คณะกรรมการวินัย...? วันหยุดของประธานคณะกรรมการวินัย?"
10003005-25 = "ทำไมจู่ๆ ถึงพูดถึงเรื่องวันหยุดล่ะคะ...?"
10003005-27 = "คือว่า... ช่วงนี้ท่านประธานดูไม่ค่อยเป็นของตัวเองเท่าไหร่เลยน่ะค่ะ"
10003005-28 = "ฉันคิดว่าเธอคงจะเครียดมากเกินไป ฉันเลยกังวลนิดหน่อยค่ะ..."
10003005-29 = "ประธานน่ะเหรอ?"
10003005-30 = "คือเมื่อเช้านี้... ตอนที่ฉันเข้าไปที่ห้องทำงานของท่านประธาน..."
10003005-34 = "ท่านประธานคะ นี่ตารางงานและสรุปรายงานของสัปดาห์นี้..."
10003005-35 = "แล้วนี่ก็กาแฟที่ฉันเตรียมมาให้ค่ะ เชิญดื่มได้เลยค่ะ"
10003005-37 = "อืม..."
10003005-39 = "เผอิญว่าฉันโชคดีได้เม็ดกาแฟอย่างดีมาค่ะ"
10003005-40 = "ฉันเพิ่งเอาไปบดมาแล้วก็ชงให้หัวหน้าเลยนะคะ รับรองว่าอร่อยแน่นอนค่ะ"
10003005-41 = "อ่า... งั้นเหรอ"
10003005-43 = "อืม..."
10003005-44 = "(ฮุฮุ ท่านประธานคงจะสนใจแต่งานจนไม่รู้ว่ากาแฟเย็นหมดแล้วสินะ... เท่สุดๆ เลย...)"
10003005-45 = "หืม? อาโกะ \"คำขอความร่วมมือการลาดตระเวนระหว่างชาเล่ต์และคิโวทอส\" มันคืออะไรน่ะ...?"
10003005-46 = "คะ? อ๋อ นั่นคือเอกสารคำขออนุญาตเพื่อขอความช่วยเหลือจากทางชาเล่ต์#nในตอนที่คณะกรรมการวินัยจะต้องออกลาดตระเวนค่ะ"
10003005-47 = "ออกลาดตระเวนกับชาเล่ต์เหรอ...?"
10003005-48 = "ค่ะ เป็นเอกสารที่ฉันเตรียมไว้สำหรับดำเนินการล่วงหน้าค่ะ แน่นอนว่าถ้าท่านประธานไม่อยาก#nให้ทางชาเล่ต์เข้ามายุ่งเกี่ยวละก็..."
10003005-49 = "ปะ...เปล่าหรอก ถ้าร่วมมือกับชาเล่ต์ล่ะก็คงเป็นประโยชน์กับทางเราแน่นอน"
10003005-50 = "ก็ได้... ร่วมมือกับชาเล่ต์..."
10003005-52 = "หืม? อ๊ะ ท่านประธานคะ นั่นมันแก้วของฉันนะคะ...!"
10003005-53 = "อ่า... โทษที ฉันหยิบผิดแก้วน่ะ"
10003005-54 = "แปลกจังที่ท่านประธานทำพลาดแบบนี้..."
10003005-55 = "เดี๋ยวๆ หยุดก่อน ที่บอกว่าหัวหน้าดูแปลกๆ นี่เพราะแค่หยิบแก้วกาแฟผิดงั้นเหรอ?"
10003005-56 = "เรื่องแค่นี้ใครๆ ก็พลาดกันได้นี่นา ประธานก็คงพลาดได้เหมือนกันไม่ใช่รึไง?"
10003005-57 = "มีอะไรที่ดูผิดปกติอีกงั้นเหรอคะ?"
10003005-58 = "ฉันยังเล่าไม่จบนะคะ! แล้วหลังจากนั้น..."
10003005-60 = "อืม อย่างที่ฉันเคยบอก"
10003005-65 = "กาแฟที่อาโกะชงให้นี่อร่อยจริงๆ "
10003005-66 = "เดี๋ยวก่อน อาโกะจังล้อเล่นใช่มั้ยเนี่ย...?"
10003005-67 = "เดี๋ยวก่อนนะคะ ท่านประธานพูดชมกาแฟที่คุณอาโกะชงงั้นเหรอคะ?"
10003005-68 = "เจ้าหน้าที่อาโกะ... ทำไมถึงโกหกเรื่องแบบนี้..."
10003005-69 = "ฉันไม่ได้โกหกนะคะ! ฉันได้ยินเองเต็มสองหูเลยค่ะ!"
10003005-71 = "อืม... ถ้าเป็นเรื่องจริงละก็... ประธานคงจะเครียดมากๆ แน่เลยละ..."
10003005-72 = "ปกติแล้ว ฉันไม่เคยได้ยินหัวหน้าชมว่า \"อร่อยจริงๆ\" เลยนะคะ"
10003005-73 = "ปกติแล้วจะเป็น \"ดีกว่าที่คิดนะ\" หรือไม่ก็ \"ก็พอกินได้\" หรือไม่ก็เป็น#n\"ได้ดื่มกาแฟสักหน่อยก็ทำงานต่อได้แล้วล่ะ\" แบบนี้น่ะค่ะ แน่ใจนะคะว่าไม่ได้ฟังผิดไป?"
10003005-75 = "คือ... นี่กำลังสบประมาทฉันอยู่งั้นเหรอคะ?"
10003005-76 = "ใจเย็นๆ ก่อนสิ ถ้าเป็นแบบที่อาโกะพูดจริงล่ะก็..."
10003005-77 = "สถานการณ์ตอนนี้ร้ายแรงมากเลยนะคะ..."
10003005-78 = "ใช่มั้ยล่ะคะ?! ทุกคนก็คิดว่าแปลกใช่ไหมล่ะคะ?!"
10003005-79 = "นี่เป็นสถานการณ์ฉุกเฉินนะคะ!! ถ้าปล่อยเอาไว้แบบนี้คณะกรรมการวินัยอาจถึงจุดสิ้นสุดเลยก็ได้นะคะ!"
10003005-80 = "หะ...หือ...? เธอหมายความว่ายังไงน่ะ?"
10003005-82 = "ถ้าเกิดท่านประธานทำงานหนักจนเป็นลมล้มพับไปละก็ วันนั้นอาจเป็นวันหายนะของคณะ#nกรรมการวินัยเลยก็ได้นะคะ!"
10003005-83 = "คะ...?"
10003005-84 = "และฉันไม่อยากจะคิดเลยว่าพวกแพนเดโมเนียม โซไซตี้จะลงมือทำอะไร ถ้าพวกเธอรู้ว่าท่านประธานไม่อยู่น่ะค่ะ"
10003005-85 = "พวกนั้นคงใช้โอกาสนี้ในการเข้ายึดครองอำนาจทั้งหมดในเกเฮนน่าแน่นอนค่ะ!"
10003005-86 = "ถ้าเป็นแบบนั้นล่ะก็... โรงเรียนเกเฮนน่าของเราคง... ไม่สิ... คิโวทอสจะต้องตกอยู่ในความวุ่นวาย#nอย่างที่ไม่เคยเกิดขึ้นก็ได้ค่ะ!"
10003005-87 = "หรืออีกอย่างก็คือ เรื่องนี้เป็นเรื่องที่สามารถกำหนดชะตากรรมของคิโวทอสได้เลยนะคะ!"
10003005-90 = "อืม... คงไม่ขนาดนั้นหรอก..."
10003005-91 = "จะบอกว่าท่านประธานไม่จำเป็นต้องหยุดพักบ้างอย่างนั้นเหรอคะ อิโอริ!"
10003005-92 = "เพราะงั้น... ฉันอามาอุ อาโกะ เจ้าหน้าที่อาวุโสของคณะกรรมการวินัยได้ตัดสินใจแล้วค่ะ ท่านประธานของเราต้องมีวันหยุดพักผ่อนบ้างค่ะ!"
10003005-93 = "ทั้งหมดนี่ก็เพื่ออนาคตของคณะกรรมการวินัย และอนาคตของคิโวทอสค่ะ... ใช่แล้วค่ะ#nเพื่อการนั้นเราจะเริ่มปฏิบัติการลับกันค่ะ!"
10003005-95 = "ปฏิบัติการลับ <ท่านประธานต้องพักซะบ้าง> ค่ะ!"
10003005-97 = "เวอร์เกินไปรึเปล่าน่ะ?!"
10003005-98 = "ถ้าเป็นเรื่องของท่านประธานละก็ เจ้าหน้าที่อาโกะมักจะจริงจังแบบนี้เสมอเลยนะคะ... เฮ้อ..."
10003005-99 = "ไอเดียนี้มันก็ดีอยู่หรอก แต่ปัญหาก็คือประธานคงไม่ยอมไปพักผ่อนง่ายๆ แน่#nประธานไม่เคยหยุดเลยสักวันนะ"
10003005-100 = "นั่นสิคะ ถึงเราจะบังคับให้ลาพักก็ตาม แต่หัวหน้าก็คงจะไปโรงเรียนอยู่ดี"
10003005-102 = "ค่ะ... ถ้าเป็นท่านประธานละก็ ต่อให้พูดกรอกหูเรื่องวันหยุดให้ตาย ก็คงจะตอบกลับมาว่า \"ถ้าเรื่องหยุดพักละก็ ฉันพักมาพอแล้วละ วันละห้านาทีก็พอ\" คงพูดแบบนี้แน่เลยค่ะ"
10003005-103 = "ประธานน่ะเป็นพวกบ้างานจะตาย..."
10003005-104 = "ถ้างั้นปฏิบัติการลับนี่ก็คงล้มเหลวสินะคะ"
10003005-105 = "ไม่ค่ะ! เราแค่หาเหตุผลขึ้นมาก็ได้นี่คะ! เหตุผลที่จะทำให้ท่านประธานไม่สามารถปฏิเสธได้!"
10003005-106 = "เรื่องนั้น...เป็นไปได้ด้วยเหรอ?"
10003005-107 = "แน่นอนค่ะ เป็นไปได้อยู่แล้วค่ะ!#nเมื่อไม่นานมานี้ฉันได้รับคำขอจากทางแพนเดโมเนียม โซไซตี้มาเรื่องหนึ่งค่ะ"
10003005-108 = "พวกเธออยากให้เราส่ง \"แผนการฝึกภาคฤดูร้อนของคณะกรรมการวินัย\" ของภาคฤดูร้อนนี้ค่ะ"
10003005-109 = "อึ่ก..."
10003005-110 = "เฮ้อ... อีกแล้วเหรอคะ?"
10003005-111 = "ยัยพวกนั้นหาเรื่องให้หงุดหงิดได้ทุกครั้งเลย"
10003005-112 = "แต่ดูแล้วยังไงสิ่งที่พวกเธอต้องการคงไม่ใช่แผนการฝึกของคณะกรรมการวินัยเลยนะคะ..."
10003005-113 = "ยัยพวกนั้นคงคิดจะอ่านแผนการฝึก แล้วถ้าเจอช่องโหว่อะไรนิดๆ หน่อยๆ ก็คงจะพูดว่า#n\"แบบนี้ไม่ได้ผลนะ~ ฝึกแบบนี้ดีกว่ามั้ย?\" แบบนี้ แล้วก็หาทางบีบให้เราไปฝึกในที่แปลกๆ อีกน่ะสิ!"
10003005-114 = "ปีที่แล้วยัยพวกนั้นก็พยายามส่งพวกเราไปฝึกที่เชิงเขาของภูเขาไฟฮินนอม... ฮึ่ย...#nมีใครเขาไปฝึกภาคฤดูร้อนที่ภูเขาไฟกันบ้างล่ะ..."
10003005-115 = "แต่ว่าคณะกรรมการวินัยอย่างเราก็คงจะเพิกเฉยคำขอของพวกเธอไม่ได้... เฮ้อ..."
10003005-116 = "ดังนั้นในตอนแรก ฉันคิดจะจัดการฝึกด้านกลยุทธ์ร่วมกับสมาชิกคนอื่นๆ... "
10003005-117 = "แต่ว่าตอนนี้สถานการณ์เปลี่ยนไปแล้วค่ะ เราจะใช้โอกาสนี้ค่ะ"
10003005-118 = "อย่าบอกนะคะว่าเหตุผลที่ท่านประธานไม่มีทางปฏิเสธได้ก็คือ...?"
10003005-119 = "ใช่แล้วล่ะ เรื่องนี้ค่ะ"
10003005-120 = "ฉันจะใช้โอกาสจากงานที่พวกแพนเดโมเนียม โซไซตี้ร้องขอมา วางแผนการฝึกค่ายฤดูร้อนแบบพิเศษสำหรับคณะกรรมการวินัยค่ะ!"
10003005-121 = "ถ้าบอกว่าเป็นงานที่ทางแพนเดโมเนียม โซไซตี้ร้องขอมาละก็ ท่านประธานก็คงปฏิเสธไม่ได้#nแน่นอนค่ะ"
10003005-122 = "หืม? แต่ว่ายังไงมันก็เป็นการฝึกอยู่ดีนี่นา แล้วจะให้ประธานพักผ่อนได้ยังไงกัน"
10003005-123 = "เราต้องไปฝึกฝนกันนะ แล้วมันจะเรียกว่าวันหยุดพักผ่อนได้ยังไงล่ะ?"
10003005-124 = "ฮุฮุฮุ ซิมเพิล อีส เดอะ เบสท์! เรื่องง่ายๆ เลยค่ะ อิโอริ"
10003005-127 = "สถานที่สำหรับการฝึกภาคฤดูร้อนของคณะกรรมการวินัยครั้งนี้... ก็คือทะเลค่ะ!"
10003005-128 = "และพอเราไปถึงทะเล เราก็จะคุมตัวขังท่านประธานเอาไว้ในห้องของโรงแรมที่ชายหาดค่ะ!"
10003005-129 = "คะ...?"
10003005-130 = "เอ่อ... ถ้าถูกขังแล้วจะเรียกว่าพักผ่อนได้ยังไง...?"
10003005-131 = "เรียกว่าการพักผ่อนในโรงแรมไงล่ะคะ การพักผ่อนในโรงแรมค่ะ!"
10003005-132 = "มันหมายความว่าไงน่ะ?"
10003005-133 = "ฉันเคยได้ยินมาค่ะ มันคือการพักผ่อนรูปแบบหนึ่งที่ใช้เวลาผ่อนคลายอยู่ในโรงแรมใช่ไหมคะ?"
10003005-134 = "ค่ะ ใช่แล้วค่ะ! และแผนการของเราก็คือ..."
10003005-135 = "ข้อแรก เราจะใช้ข้ออ้างในการฝึก พาท่านประธานไปที่ชายหาดค่ะ"
10003005-136 = "ข้อที่สอง พอไปถึงที่ทะเลและจับท่านประธานขังเอาไว้ในห้องโรงแรม แล้วเราก็จะไม่ให้ทำงาน#nอะไรเลยตลอดช่วงเวลาการฝึกค่ะ แน่นอนว่ารวมถึงการฝึกด้วยค่ะ"
10003005-137 = "ข้อที่สาม เราจะต้องป้องกันไม่ให้เธอออกมาจากห้องได้ค่ะ!"
10003005-138 = "ยิ่งฟังยิ่งไม่เหมือนการหยุดพักผ่อนเข้าไปทุกทีแล้วนะ...! อาโกะจัง?!"

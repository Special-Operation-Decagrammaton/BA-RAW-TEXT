10003005-64 = "#all;hide"
10003005-65 = "3;히나;17;아코가 내려준 커피는, 정말 맛있군.\n#3;closeup\n#3;em;[반짝]"
10003005-66 = "3;이오리;01;저기, 이거 혹시 아코 쨩의 망상……?\n#3;em;[?!]\n#3;shake"
10003005-67 = "3;치나츠;02;잠깐, 부장님이 먹는 거에 대해서 품평을 했다고요? \n#3;shake\n#3;em;[?!]"
10003005-68 = "3;치나츠;05;아코 행정관, 왜 그런 거짓말을……."
10003005-69 = "3;아코;05;아니거든요?! 이 두 눈과 귀로 똑똑히 보고, 또 들은 일이라구요?!\n#3;em;[?!]\n#3;shake"
10003005-70 = "#all;hide"
10003005-71 = "1;치나츠;01\n5;이오리;07;으음, 그 말이 사실이라면…… 부장, 정말 스트레스가 심해보이는데…….\n#5;em;…"
10003005-72 = "1;치나츠;05;품평을 했다 치더라도, 정말 맛있다고 말한 게 맞나요?\n#1;em;[?]"
10003005-73 = "1;치나츠;02;예를 들어 '생각보다 괜찮아.' 라거나, '이 정도면 먹을만 하군.' 이라던가, '역시 카페인이 있어야 일을 할 수 있어.' 라고 말한 걸 잘못 들은 게 아니고요?"
10003005-74 = "#all;hide"
10003005-75 = "3;아코;04;저기……, 역시 저 지금 괴롭힘 당하는 거 맞죠?\n#3;em;…"
10003005-76 = "1;이오리;06;아니, 뭐, 아코 쨩의 말이 정말 사실이라면…….\n#1;a\n#3;m5"
10003005-77 = "1;치나츠;05;……이건 심각한 안건이네요."
10003005-78 = "3;아코;09;그쵸?! 여러분이 봐도, 뭔가 이상하죠?!\n#3;em;[반응]"
10003005-79 = "3;아코;05;이건 비상사태예요!! 이대로 가다간 선도부의 존립이 위태롭다구요!\n#3;hophop"
10003005-80 = "1;이오리;07;으, 응……? 무슨 소리야?\n#1;em;[?]"
10003005-81 = "#all;hide"
10003005-82 = "3;아코;05;부장님께서 과로로 쓰러지기라도 했다간, 그날로 선도부는 궤멸할 테니까요!\n#3;closeup\n#3;em;[!]"
10003005-83 = "3;치나츠;02;네, 네에……?\n#3;stiff"
10003005-84 = "3;아코;09;부장님의 부재로 인해 무주공산이 된 선도부를 만마전이 가만히 내버려둘 리가 없겠지요."
10003005-85 = "3;아코;10;분명 게헨나의 주도권을 잡기 위해, 저희를 찍어 누르려고 할 게 틀림없습니다!\n#3;em;[반응]"
10003005-86 = "3;아코;10;그렇게 되면 저희 게헨나 학원……. 아니, 키보토스는 유래 없는 혼란에 빠지게 될 거예요!\n#3;stiff"
10003005-87 = "3;아코;05;즉 이건 그야말로 키보토스의 운명이 걸린 일이나 다름 없다구요!\n#3;closeup\n#bgshake"
10003005-88 = "#st;[0,0];instant;1;"
10003005-89 = "#clearST\n3;이오리;07\n#3;em;…\n#wait;2500\n#3;h"
10003005-90 = "3;이오리;06;으, 으음, 아무리 그래도 그렇게까지는……."
10003005-91 = "5;아코;09;그 정도로 부장님에겐 휴가가 절실히 필요하단 뜻이에요! 이오리!\n#5;al\n#5;hophop\n#3;m1\n#5;em;[반응]"
10003005-92 = "5;아코;05;그래서 저, 게헨나의 선도부 선임행정관 아마우 아코는 판단한 겁니다. 우리 선도부장님에겐 휴가가 필요하다고!"
10003005-93 = "5;아코;99;이것도 전부 선도부의 안녕과 키보토스의 미래를 위해서…… 네, 그걸 위한 비밀 작전을 개시하는 겁니다!"
10003005-94 = "5;아코;01\n#5;m3\n#3;dl\n#wait;1000"
10003005-95 = "5;아코;05;이름하여 <선도부장님에겐 휴식이 필요해!> 작전!\n#5;em;[!]\n#5;closeup"
10003005-96 = "#all;hide"
10003005-97 = "1;치나츠;01\n5;이오리;07;너무 거창하잖아?!\n#5;em;[?!]\n#5;shake"
10003005-98 = "1;치나츠;06;아코 행정관은 부장님이 관련된 일이라면, 가끔 이렇게 되어버리니까요……. 하아.\n#1;em;[속상함]"
10003005-99 = "5;이오리;02;다 좋은데. 문제는 부장이 휴가를 갈 리가 없잖아. 지금까지 줄곧 휴가라는 걸 써본 적이 없는 사람인데."
10003005-100 = "1;치나츠;02;그러게요. 억지로 휴가를 쓰라고 하셔도, 바로 학교에 출석하려고 들 걸요."
10003005-101 = "#all;hide"
10003005-102 = "3;아코;06;네……. 확실히 부장님이라면 제아무리 휴가 이야기를 꺼내더라도, '휴식이라면 충분히 취하고 있어. 하루에 5분씩.' 같은 말씀만 하실 테죠.\n#3;em;…"
10003005-103 = "5;이오리;06;부장, 말이 필요 없을 정도로 하드한 워커홀릭이니까.\n#5;a"
10003005-104 = "1;치나츠;02;그럼 방법이 없는 거 아닌가요?\n#1;a"
10003005-105 = "3;아코;09;아뇨! 이유라면 만들면 되어요! 부장님도 납득할 수밖에 없는 확실한 이유를!\n#3;em;[!]"
10003005-106 = "5;이오리;07;……그런 게 가능해?\n#5;em;[?]"
10003005-107 = "3;아코;03;네. 가능하고 말고요! 그렇지 않아도 바로 얼마 전, 만마전으로부터 한 가지 요청이 들어왔습니다. \n#3;em;[반짝]"
10003005-108 = "3;아코;01;이번 여름의 '선도부 하계 합숙 훈련 계획서'를 제출하라는 요구였죠."
10003005-109 = "5;이오리;07;……엑."
10003005-110 = "1;치나츠;06;하아……. 또 인가요?\n#1;stiff"
10003005-111 = "5;이오리;06;매번 귀찮게 군다니까."
10003005-112 = "1;치나츠;05;어차피 진짜로 필요한 건 선도부의 훈련 계획서 같은 게 아니겠죠……."
10003005-113 = "5;이오리;05;그 녀석들, 계획서에서 조금이라도 미흡한 부분이 보였다간 그 자리에서 '그걸로는 안되겠네~ 이쪽에서 훈련을 하지 그래?' 라면서 트집이나 잡아댈 거 아냐!\n#5;em;[빠직]\n#5;hophop"
10003005-114 = "5;이오리;07;작년처럼 또 멋대로 우리를 힌놈 화산 기슭으로 보내려고 들었다간……. 으으, 여름에 화산에서 훈련하는 건 질색인데.\n#5;stiff"
10003005-115 = "1;치나츠;06;하지만 선도부 입장상 마냥 무시할 수는 없다는 게……. 하아…….\n#1;em;[속상함]"
10003005-116 = "3;아코;99;때문에 원래는 이번 하계 훈련은 선도부의 작전부 학생들과 함께, 적당히 전술훈련을 하는 정도로 얼버무리려고 했습니다만."
10003005-117 = "3;아코;01;상황이 바뀌었습니다. 이걸 이용하도록 하지요.\n#3;em;[반응]"
10003005-118 = "1;치나츠;02;설마 부장님이 납득할 수밖에 없는 이유라는 게……?"
10003005-119 = "3;아코;07;네, 바로 그겁니다. 치나츠.\n#3;greeting\n#3;em;[음표]"
10003005-120 = "3;아코;08;만마전이 시킨 일, 그들의 귀찮기만 한 트집을 이용해. 선도부 하계 합숙 플랜을 짜는 거예요!"
10003005-121 = "3;아코;03;만마전의 요구라고 하면, 부장님도 거절할 수는 없을 테죠!\n#3;em;[반짝]"
10003005-122 = "5;이오리;07;엑, 하지만 그래봤자 결국 훈련이잖아? 어떻게 부장을 쉬게 한다는 거야?\n#5;stiff"
10003005-123 = "5;이오리;05;훈련에 끌고 간 시점에서, 이미 휴가고 뭐고 아니게 되는 거 아냐?\n#5;em;[반응]"
10003005-124 = "3;아코;01;후후후, 심플 이즈 베스트! 간단한 이야기예요. 이오리."
10003005-125 = "#all;hide"
10003005-126 = "#wait;1000"
10003005-127 = "#na;아코;이번 여름, 우리 선도부의 하계 합숙 훈련의 목표는……. 바다!"
10003005-128 = "#zmc;move;0,0;2000;150\n#na;아코;바로 그 바다에서, 부장님을 해변의 호텔에 유폐시키는 겁니다!\n#fontsize;90"
10003005-129 = "3;치나츠;02;……네?\n#3;em;[?]"
10003005-130 = "3;이오리;06;저기, 그게 휴가랑 무슨 연관이……?"

10003005-8 = "5;이오리;07;휴가……? 갑자기?\n#5;a"
10003005-9 = "#all;hide"
10003005-10 = "3;아코;04;어라……? 다들 왜 그렇게 반응이 시큰둥한 건가요? 저, 지금 굉장히 진지한 이야기를 하고 있다구요?\n#3;em;[?]"

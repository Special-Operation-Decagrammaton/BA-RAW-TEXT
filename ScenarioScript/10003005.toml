[translation]
10003005-1 = "The Head Prefect Needs a Break"
10003005-3 = "It's time for a vacation!"
10003005-7 = "Pardon me?"
10003005-8 = "A vacation? What are you talking about?"
10003005-10 = "I was expecting more of a reaction. Did it sound like I was joking?"
10003005-12 = "That's not what we meant..."
10003005-13 = "You called us here saying it was urgent."
10003005-14 = "We weren't exactly expecting you to so boastfully announce a vacation that has nothing to do with us."
10003005-15 = "Yeah, and where are you going, anyway?"
10003005-17 = "Huh? Excuse me?"
10003005-18 = "You've got it all wrong! I'm not the one who's going on vacation!"
10003005-19 = "Give me a little credit. Do I seem like the kind of person who would brag about going on vacation?"
10003005-20 = "Is that how you see me?!"
10003005-21 = "What I mean to say is that we, the Prefect Team, will be going on vacation."
10003005-22 = "Or more specifically, we'll be giving the head prefect a vacation!"
10003005-24 = "You want the head prefect to take a vacation?"
10003005-25 = "Where is this coming from?"
10003005-27 = "She hasn't been herself lately..."
10003005-28 = "I worry that the stress has gotten to her and is causing her condition to deteriorate."
10003005-29 = "Is she that stressed out?"
10003005-30 = "Well, when I went to visit her office this morning..."
10003005-34 = "Here's this week's schedule and a summarized report, Head Prefect. "
10003005-35 = "As well as a hot cup of coffee. Have a sip."
10003005-37 = "Hmm."
10003005-39 = "Fortunately, we had some exquisite beans in stock."
10003005-40 = "I slow brewed it myself. I'm sure you'll like it."
10003005-41 = "So you did."
10003005-43 = "Hmm..."
10003005-44 = "(The head prefect must be so focused on her work that she doesn't even notice that her coffee is getting cold...)"
10003005-45 = "Ako, what's this \"Schale-Kivotos Cooperative Patrol Request\"?"
10003005-46 = "Oh, that's an approval document I posted to receive help from Schale during the next scheduled Prefect Team patrol. "
10003005-47 = "A patrol with Schale?"
10003005-48 = "Yes. It's just a document prepared for procedural purposes. Of course, if you don't wish to receive Schale's help, then..."
10003005-49 = "No, that's not it. I'm sure working with Schale will be as beneficial as always."
10003005-50 = "Yes... With Schale..."
10003005-52 = "Hmm? Head Prefect, that's my mug you're drinking from!"
10003005-53 = "Oh. My apologies."
10003005-54 = "It's so unusual for you to make a mistake like that."
10003005-55 = "Hold the phone. Are you saying the head prefect is too stressed just because she accidentally took a sip of YOUR coffee?"
10003005-56 = "It could have just as easily been an honest mistake. She's not perfect, you know."
10003005-57 = "Please tell me something else raised a red flag."
10003005-58 = "Of course there's more to the story!"
10003005-60 = "As I was saying."
10003005-65 = "This coffee is exquisite, Ako."
10003005-66 = "No way! You're making that up!"
10003005-67 = "The head prefect complimented you on your coffee? "
10003005-68 = "Why would you lie to us like that, Senior Administrator?"
10003005-69 = "I'm not lying! I heard her say it with my own ears!"
10003005-71 = "Then, I guess you're right. Something really is wrong with the president."
10003005-72 = "I've heard her comments on food and beverages before, but I've never heard her call anything \"exquisite\"."
10003005-73 = "Are you sure you didn't mistake what she said? It wasn't something like \"satisfactory\" or \"adequate\"?"
10003005-75 = "This is harassment. Grade-A, certified harassment."
10003005-76 = "Calm down. If what you're saying is the truth..."
10003005-77 = "...then we have a serious matter on our hands."
10003005-78 = "That's what I've been trying to tell you this whole time."
10003005-79 = "This is an emergency! It could very well mean the end of the Prefect Team!"
10003005-80 = "How do you figure?"
10003005-82 = "If the head prefect were to collapse from burnout, then the Prefect Team could be targeted for annihilation within hours!"
10003005-83 = "What?"
10003005-84 = "And I can't imagine how the Pandemonium Society would react if they heard the head prefect were indisposed."
10003005-85 = "No doubt they would seize the opportunity to take control over Gehenna!"
10003005-86 = "If that happens, the academy—no... All of Kivotos will be thrown into chaos!"
10003005-87 = "Now do you understand?! The fate of Kivotos is at stake here!"
10003005-90 = "I think you may be exaggerating a little."
10003005-91 = "Do you deny that the head prefect desperately needs a vacation, Iori?"
10003005-92 = "That is why I, Amau Ako, senior administrator of the Prefect Team, have decided that our leader needs a vacation!"
10003005-93 = "This is for the sake of the head prefect, the Prefect Team, and the entirety of Kivotos!"
10003005-95 = "This is mission: The Head Prefect Needs a Break!"
10003005-97 = "Aren't you going a little overboard with this?"
10003005-98 = "Ako always gets like this when it comes to the president's well being."
10003005-99 = "This is all well and good, but I don't see the head prefect going along with this vacation idea so easily. She's not the type to take time off."
10003005-100 = "Yeah, even if we forced her to drop Prefect Team work, she'd probably just drown herself in schoolwork."
10003005-102 = "I'm well aware. If we even broach the subject to her, she'd probably say something like, \"I'm getting five minutes of rest per day as it is. Isn't that enough?\""
10003005-103 = "She is a workaholic, after all."
10003005-104 = "Then, is this mission doomed to fail?"
10003005-105 = "No! If she won't go on a vacation, then we'll come up with a reason for her to have no choice but to agree!"
10003005-106 = "Is that possible?"
10003005-107 = "Of course! This reminds me that the Pandemonium Society recently sent another request. "
10003005-108 = "They want us to submit details on the Prefect Team's yearly summer camp."
10003005-109 = "Tch."
10003005-110 = "*sigh* That again?"
10003005-111 = "They really know how to get on our nerves."
10003005-112 = "What do they need with our training schedule?"
10003005-113 = "They probably just want to pore over it and nitpick all the little details. Then they'll force us to go train somewhere ridiculous again."
10003005-114 = "Like when they tried to send us to the foot of the Hinnom Volcano last year. Who the heck trains at a volcano in the middle of summer?!"
10003005-115 = "Unfortunately, we don't have the authority to simply ignore their request..."
10003005-116 = "My original plans for summer camp were to hold some light tactical training with the other members."
10003005-117 = "However, now that we're here, let's try to use this to our advantage."
10003005-118 = "You mean to convince the head prefect? But how?"
10003005-119 = "Correct, Chinatsu, and good question."
10003005-120 = "I'm going to use the Pandemonium Society's irksomeness to plan a summer boot camp for the Prefect Team!"
10003005-121 = "The president won't be able to refuse if the Pandemonium Society is pressuring us into doing it."
10003005-122 = "But training is still training at the end of the day, right?"
10003005-123 = "How is this going to act as a vacation for the president?"
10003005-124 = "The answer is quite simple, Iori."
10003005-127 = "We'll hold our summer boot camp at the beach!"
10003005-128 = "And while we're there, the head prefect will be confined to a comfy hotel room!"
10003005-129 = "Huh?"
10003005-130 = "You want to lock her in her hotel for the entire trip? Isn't this supposed to be a vacation?"
10003005-131 = "It's called a hotelcation!"
10003005-132 = "A hotel what?"
10003005-133 = "I believe it's a type of vacation where you exclusively relax at a hotel, correct?"
10003005-134 = "Yes, that's exactly it."
10003005-135 = "First, we take the head prefect and visit the beach under the guise of holding summer training."
10003005-136 = "Second, right after we lock her up in the hotel, we don't schedule her for any work, training including."
10003005-137 = "Finally, we prevent her from leaving her room!"
10003005-138 = "This is sounding less and less like a vacation by the minute."
10003005-139 = "People who have nothing to do ultimately lose focus and take the time to rest. If we take all of her work away from her, then at the very least she can catch up on her sleep! "
10003005-140 = "We'll give her no other choice but to rest. Think of how long it's been since she got a proper night's sleep."
10003005-141 = "Okay, okay. I get it."
10003005-142 = "Will this plan truly work on her? How are we going to convince her?"
10003005-143 = "Heh heh. Don't you worry about that, Chinatsu. I have just the thing..."
10003005-145 = "It's Sensei from Schale!"
10003005-146 = "We'll be counting on your help, Sensei."
10003005-147 = "[s1] \"Wait, why did you ask me to come here?\"\n[s2] \"I have no idea what's happening.\""
10003005-148 = "W-Wait. Why is Sensei here?"
10003005-149 = "W-Wait. Why is Sensei here?"
10003005-150 = "Sensei has the ability to make recommendations on the Prefect Team's training plans due to the authority granted to Schale."
10003005-151 = "We'll be able to schedule our training to take place on the beach with Sensei's cooperation."
10003005-152 = "I knew Schale had a lot of power, but it really can do just about anything, huh?"
10003005-153 = "This is Sensei we're talking about. They were trusted with guiding the students, so Schale's actions carry considerable weight."
10003005-154 = "[s] \"That part I get, but is it really going to be that easy?\""
10003005-155 = "Are you having second thoughts? I hope you aren't thinking of declining."
10003005-156 = "But if you do, I have another plan."
10003005-157 = "The Intelligence Committee has found out several interesting things about your habits, Sensei..."
10003005-158 = "If anyone has bad habits, it's you, Ako."
10003005-159 = "You can't simply blackmail Schale like that, Senior Administrator."
10003005-160 = "[s] \"No, it's fine.\""
10003005-161 = "Huh?"
10003005-162 = "[s3] \"This is for Hina's sake, isn't it?\"\n[s4] \"It should have gone without saying that I'll help.\""
10003005-163 = "I...wasn't expecting you to go along with it so willingly."
10003005-164 = "I...wasn't expecting you to go along with it so willingly."
10003005-165 = "Well, this is Sensei we're talking about."
10003005-166 = "Even Ako has met her match."
10003005-167 = "[s] \"I get to come too, right? I'll see you all in swimsuits?\""
10003005-168 = "I should have known better than to give you praise, you creep!"
10003005-170 = "*shakes head*"
10003005-171 = "Th-That's irrelevant. As long as we have Sensei's cooperation, then all that's left to do is convince the head prefect!"
10003005-173 = "Very well. Understood."
10003005-174 = "A-Are you sure, Head Prefect? It's okay?"
10003005-175 = "What's the issue? The summer camp is an annual event. There's no reason to be opposed."
10003005-176 = "R-Right. I knew that."
10003005-178 = "*sigh*"
10003005-179 = "(Could you be any more obvious that you're up to something, Ako?)"
10003005-180 = "That reminds me that I already scouted a location for this year's camp."
10003005-181 = "The hell lodge at the foot of Gehenna's Hinnom Volcano in District 94-13."
10003005-182 = "Even the Pandemonium Society shouldn't have any complaints about that location. If we're to do this training, we may as well be thorough."
10003005-183 = "You want to go to the volcano again?! Even if the Pandemonium Society isn't forcing us to?!"
10003005-184 = "...?"
10003005-185 = "Hold on just a moment, Head Prefect. You already made arrangements?"
10003005-186 = "Yes, because I assumed the Pandemonium Society would begin putting pressure on us right about now."
10003005-187 = "(This is bad! Our plan could be doomed from the start...)"
10003005-188 = "(What am I going to do?)"
10003005-191 = "[ns5] \"Who needs a volcano when you have the beach! Swimsuits!\"\n[ns6] \"Summer means beaches which means swimsuits! Camping!\""
10003005-192 = "The beach? Swimsuits? What are you going on about, Sensei?"
10003005-193 = "The beach? Swimsuits? What are you going on about, Sensei?"
10003005-194 = "Is this what you wanted to talk to me about, Ako? A new site for training camp?"
10003005-195 = "Y-Yes! That's right! I was just discussing it with Sensei as well."
10003005-196 = "I wanted to take the initiative on planning our camp because I know how busy you always are."
10003005-197 = "Won't you allow me to take responsibility for organizing this year's camp? Just this once, so that your workload isn't so heavy?"
10003005-198 = "Hmm. But we've never done a training camp by the ocean before."
10003005-199 = "Sensei is very familiar with the area! With them with us, I'm sure our training will be even more efficient!"
10003005-200 = "I see."
10003005-201 = "Very well."
10003005-202 = "If this is what you insist, Ako."
10003005-203 = "Y-You're approving it?"
10003005-204 = "Yes, I'll leave organizing the training camp in your hands. This is why you're our senior administrator, after all."
10003005-205 = "And as you suggest, it isn't efficient for me to take on every single Prefect Team responsibility."
10003005-207 = "We'll follow your lead this time."
10003005-208 = "Do your best."
10003005-211 = "(Did that just...?)"
10003005-212 = "(Yes, I believe so.)"
10003005-213 = "(It worked!)"
10003005-214 = "[ns] \"We're going to the beach!\""
10003005-216 = "And that was how it was decided that this year's Prefect Team summer training would be held at the beach."

10003005-12 = "1;치나츠;01\n5;이오리;07;음, 그거야 뭐……."
10003005-13 = "1;치나츠;06;급한 용무가 있다며 호출하길래, 무슨 일인가 했더니…….\n#1;em;[땀]\n#1;stiff"
10003005-14 = "1;치나츠;05;갑자기 휴가를 간다고 자랑을 해도 듣고 있는 입장에선 곤란할 뿐인데요."
10003005-15 = "5;이오리;02;그래서 아코 쨩, 어디로 놀러갈 계획이야?\n#5;em;[반응]"
10003005-16 = "#all;hide"
10003005-17 = "3;아코;02;네? 놀러갈 계획……?"
10003005-18 = "3;아코;05;아니아니아니! 방금 건 제 휴가 이야기가 아니에요!\n#3;shake\n#3;em;[?!]"
10003005-19 = "3;아코;04;애당초 제 휴가를 자랑하려고 일부러 여러분을 불러냈다고 생각하시다니, 뭔가요? 괴롭힘?"
10003005-20 = "3;아코;06;혹시 평소에 저 그런 사람으로 비춰지고 있었나요?!\n#3;stiff\n#3;em;[속상함]"
10003005-21 = "3;아코;09;제가 말하는 휴가란, 어디까지나 저희 선도부……."
10003005-22 = "3;아코;05;아니, 보다 정확히 말하자면 부장님의 휴가를 말하는 거예요!\n#3;em;[!]\n#3;closeup"
10003005-23 = "#all;hide"
10003005-24 = "1;치나츠;01\n5;이오리;07;선도부……? ……부장의 휴가?"
10003005-25 = "1;치나츠;02;갑자기 그게 무슨 소리인가요……?"
10003005-26 = "#all;hide"
10003005-27 = "3;아코;06;그게……. 최근 부장님의 상태가 심상치 않아요.\n#3;em;…"
10003005-28 = "3;아코;06;요즘 들어 스트레스가 부쩍 심해지신 것 같달까. 그게 무척이나 걱정이 된달까……."
10003005-29 = "1;이오리;07;부장이?\n#1;a\n#3;m5\n#1;em;[?]"
10003005-30 = "3;아코;06;오늘 오전……. 부장님의 집무실을 찾았을 때 말이죠……."
10003005-31 = "#all;hide"
10003005-32 = "3;히나;01\n#3;a\n#wait;1500"
10003005-33 = "3;히나;01\n#3;h\n#wait;2500"
10003005-34 = "1;아코;01;부장님, 여기 이번 주 일정을 정리한 보고서와……. \n#1;a\n#3;m4"
10003005-35 = "1;아코;07;그리고 이건 제가 내린 커피입니다. 드셔보세요.\n#1;em;[반짝]"
10003005-36 = "1;아코;01\n#1;greeting\n#wait;1500"
10003005-37 = "3;히나;16;……음.\n#3;em;…"
10003005-38 = "#wait;1500"
10003005-39 = "1;아코;08;이번에 마침 운 좋게 좋은 원두를 얻었거든요."
10003005-40 = "1;아코;07;아침부터 느긋하게 시간을 들여 내린 커피니까. 분명 맛있을 거예요.\n#1;em;[음표]"
10003005-41 = "3;히나;02;……아아. 그래."
10003005-42 = "#wait;1500"
10003005-43 = "3;히나;01;흠…….\n#3;em;…"
10003005-44 = "1;아코;07;(후후, 커피가 식는 줄도 모르고 일에 집중한 부장님, 역시…… 멋져…….)"
10003005-45 = "3;히나;02;음? 아코, 이 '샬레와의 키보토스 순찰 업무 공조 요청서'라는 건……?"
10003005-46 = "1;아코;02;네? 아, 그건 다음에 있을 선도부 정기 순찰 기간 때, 샬레의 도움을 받고자 올린 결재 문서입니다. \n#1;em;[반응]"
10003005-47 = "3;히나;00;……샬레와 함께 순찰을?"
10003005-48 = "1;아코;01;네. 어디까지나 업무상의 절차를 위해 작성한 문서일 뿐이고, 물론 부장님께서 샬레의 도움 따윈 필요 없으시다고 말씀하신다면…….\n#1;greeting"
10003005-49 = "3;히나;99;……아아, 아니. 샬레와의 협력이라면, 분명 우리 선도부에게도 의미가 있겠지."
10003005-50 = "3;히나;16;그래……. 샬레와 말이지…….\n#3;em;…"
10003005-51 = "3;히나;16\n#3;greeting\n#3;h\n#wait;1000"
10003005-52 = "1;아코;04;응? 앗, 부장님, 그 찻잔은 제가 마시던 커피……!\n#1;stiff"
10003005-53 = "3;히나;02;아, 착각했나."
10003005-54 = "1;아코;01;부장님도 참, 그런 실수를 하시다니……."
10003005-55 = "#all;hide\n#na;이오리;잠깐, 스톱. 설마 부장이 이상하다는 게 이거 때문이야?"
10003005-56 = "#na;이오리;이 정도는 평범하게 할 수 있는 실수잖아. 평소대로의 부장 아냐?"

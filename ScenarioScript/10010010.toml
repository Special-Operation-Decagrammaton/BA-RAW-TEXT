[translation]
10010010-1 = "第1話;偷偷地想辦法……"
10010010-5 = "……原來如此。"
10010010-6 = "因為發生了那種事，所以才會來這裡。#n而這就是那本書……"
10010010-7 = "不對，應該說「本來是書的東西」……"
10010010-8 = "嗚嗚，對不起！真的很對不起……！！"
10010010-9 = "不，不是，我沒有責備你的意思……"
10010010-10 = "先，先冷靜下來吧日向同學……！"
10010010-15 = "……而且這裡是圖書館，請降低音量。"
10010010-17 = "是，是……"
10010010-19 = "呼。總之，這樣下去會很不得了的……"
10010010-20 = "這部經典對三一來說也是相當重要的東西。#n萬一這件事被發現的話，不知道會引起多大的騷動……"
10010010-24 = "咦，這麼說來箱子怎麼了呢？"
10010010-25 = "按照兩位剛才的說法，應該有裝著經典的箱子才對……？"
10010010-26 = "……咦？已經在典禮會場的教堂祭壇上了？"
10010010-27 = "所以是只放了一個空箱子的意思嗎？"
10010010-28 = "……原來如此。#n如果裡面是空的只要一摸就會被發現，所以就把[ruby=Kama Sutra]《慾經》[/ruby]放在裡面了。"
10010010-29 = "這樣確實多少能有混淆的效果……唔嗯……"
10010010-34 = "……咦？"
10010010-35 = "……老師剛才是說《慾經》嗎？#n為，為什麼要……！？"
10010010-36 = "[s]「該說手邊剛好有嗎……」"
10010010-37 = "那是會剛好帶著的書嗎！？"
10010010-38 = "為什麼會帶著《慾經》！？#n不，雖然該吐槽的不是這個……！"
10010010-39 = "咦，是老師替花子同學保管的……？"
10010010-40 = "[s1]「當時手忙腳亂的，所以才會發生這種意外……」\n[s2]「這不是日向的錯，都是因為我帶著那本書……」"
10010010-41 = "那，那是什麼意思……"
10010010-42 = "那，那是什麼意思……"
10010010-46 = "總，總之，雖然很想立刻替換成其他的書……"
10010010-47 = "不過要是多次潛入的話，被發現的可能性將會提高……#n但只要能讓經典恢復原狀，至少現在「箱子裡要放什麼替代品都沒問題」也是事實。"
10010010-51 = "得要在典禮前將這粉碎的經典「復原」完畢，並送回會場。否則……"
10010010-66 = "櫻子同學就要在眾人面前講讀《慾經》了，是嗎……"
10010010-67 = "不，不能讓櫻子大人做出那種事……"
10010010-69 = "我也不希望因此引發會讓三一分裂的騷動……#n既然兩位願意信任我並來找我商量，我也會助兩位一臂之力。"
10010010-70 = "雖然我真的很想這麼說……"
10010010-76 = "對不起，以我的實力實在有點……"
10010010-77 = "我身為圖書管理員，在一定程度上是能「修復壞掉的書」的，#n不過該說也只是普通的圖書管理員的程度嗎……"
10010010-78 = "但損壞到這種程度的話，憑我的能力實在是……"
10010010-79 = "與其說是「修復」，更該說是「復原」……#n不委託比我更專業的「專家」是很難辦到的。"
10010010-80 = "[s3]「這樣啊……」\n[s4]「『專家』……？」"
10010010-81 = "是的。如果把「修復」比喻為是在傷口貼上OK繃、塗上藥膏，#n「復原」就可以說是真正的手術了吧……"
10010010-82 = "是的。如果把「修復」比喻為是在傷口貼上OK繃、塗上藥膏，#n「復原」就可以說是真正的手術了吧……"
10010010-83 = "因此，需要的並不是身為圖書管理員的我，而是該領域的「專家」才對。"
10010010-88 = "再加上這是一本「古書」……某種意義上也能說是「古代遺物」。"
10010010-89 = "即便只是想把破損的書頁組合起來，沒有解讀古文的能力也是辦不到的。"
10010010-92 = "能勝任這份工作的人，在三一……不，就算放眼奇普托斯也屈指可數。"
10010010-93 = "所，所以沒有辦法了是嗎……！？"
10010010-94 = "嗚嗚！再，再這樣下去的話……！！"
10010010-95 = "啊，那個，日向同學。"
10010010-96 = "……？"
10010010-98 = "……請保持安靜。"
10010010-100 = "對不起……"
10010010-101 = "[s5]「不愧是志美子。」\n[s6]「好強……」"
10010010-105 = "呼……"
10010010-106 = "回歸正題，我們並非束手無策。"
10010010-107 = "該說是幫手嗎……也許有一個人能修復這部經典。"
10010010-108 = "不過該怎麼說呢，是個有點難委託……但是在古書方面的知識無人能及，#n處理這種事情的經驗也不在少數，並且已經幾個星期沒有見到的人。"
10010010-109 = "[s7]「……？」\n[s8]（最後那句話好像令人有點在意）"
10010010-110 = "確實是個非常厲害的人。甚至足以被稱為「古書館的魔術師」。"
10010010-111 = "確實是個非常厲害的人。甚至足以被稱為「古書館的魔術師」。"
10010010-112 = "當然這不代表他真的會使用魔法，#n只是因為他的技術，以及解決問題時的模樣而得到的「外號」。"
10010010-113 = "但是，那個……"
10010010-115 = "唔嗯……"
10010010-116 = "不知道該說是有點怕生，還是對他人的警戒心很強，又或者是說討厭太陽呢……"
10010010-117 = "基本上都待在古書館裡，是幾乎不會外出的那種人……"
10010010-118 = "不擅長與人相處，或者說是缺乏社會化……不，當然他並不是什麼壞人……"
10010010-120 = "算了，也沒什麼好隱瞞的。"
10010010-121 = "那個人就是和我一樣同屬「圖書委員會」，並且擔任委員長的……"
10010010-123 = "憂委員長。"

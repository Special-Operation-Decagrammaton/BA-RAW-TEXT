[translation]
10010010-1 = "Episode 1;On to Plan B..."
10010010-5 = "I see."
10010010-6 = "No wonder you came to me with this book."
10010010-7 = "Or rather, what's left of it."
10010010-8 = "Ah! I'm so sorry. This is all my fault!"
10010010-9 = "Easy now, Hinata. I didn't mean to make you feel even worse."
10010010-10 = "Just calm down for now. You don't need to apologize to me. Although..."
10010010-15 = "...this is still a library, and you do need to keep it down."
10010010-17 = "Sorry. I-I mean, okay."
10010010-19 = "Hmm... Still, this is a real problem you've got on your hands. "
10010010-20 = "That event is right around the corner, and there are a lot of people looking forward to it."
10010010-24 = "By the way. What happened to the box?"
10010010-25 = "You said the book was originally placed inside an old wooden box.#nWhere is it now?"
10010010-26 = "Wait. You left it at the altar where the event is taking place?"
10010010-27 = "So...that means it's just sitting there? Empty?"
10010010-28 = "Oh, so you put a similar book in its place so no one would notice."
10010010-29 = "Ah, so you put a copy of the kamasutra in its place."
10010010-34 = "Wait. What did you just say?"
10010010-35 = "Why choose THAT? Where did you even get a copy of that book?"
10010010-36 = "[s] \"I just happened to have it on me. No reason...\""
10010010-37 = "So you just carried around a copy of the kamasutra and left it where that ancient text is supposed to be?"
10010010-38 = "I don't even know where to begin with this. Who carries around a copy of the kamasutra?!"
10010010-39 = "What? You confiscated it from Urawa Hanako earlier and were going to return it to the library? "
10010010-40 = "[s1] \"We were in a hurry, and I forgot that's what the book was.\"\n[s2] \"We couldn't leave the box empty, so I put it in without thinking.\""
10010010-41 = "Y-You really should go back and put another book there..."
10010010-42 = "Y-You really should go back and put another book there..."
10010010-46 = "Still, it's only a temporary fix. The problem won't be solved until the original scripture is returned."
10010010-47 = "At least I have a grasp on the situation now."
10010010-51 = "The goal is to restore the scripture and return it to the cathedral in time."
10010010-66 = "Worst case scenario if we fail is that Sakurako will end up reading a passage from the kamasutra in front of hundreds of people instead of holy scripture."
10010010-67 = "Y-You're right. We can't let that happen."
10010010-69 = "It would make for an unforgettable story, but I don't think it would be worth all the chaos that would ensue. You came to me for advice, and I really do want to help..."
10010010-70 = "...but there's one problem."
10010010-76 = "I hate to disappoint you, Sensei, but I don't think there's anything someone like me can do."
10010010-77 = "It's true that I repair damaged books sometimes as a librarian, but I'm not a miracle worker."
10010010-78 = "I don't know where to begin with something damaged to this degree. "
10010010-79 = "It would take a complete restoration. You'll need someone with expertise."
10010010-80 = "[s3] \"A complete restoration?\"\n[s4] \"Expertise?\""
10010010-81 = "Yes. A repair is like putting a bandage on a small wound, whereas a restoration is like a major surgery or a resuscitation."
10010010-82 = "Yes. A repair is like putting a bandage on a small wound, whereas a restoration is like a major surgery or a resuscitation."
10010010-83 = "This is beyond the scope of a simple librarian like me. You'll need an expert."
10010010-88 = "Not only that, this book is old enough to be considered an artifact."
10010010-89 = "The text will need to be correctly deciphered in order for the pages to be put back together at all."
10010010-92 = "There are very few people in Kivotos, let alone Trinity, that are capable of pulling something like this off."
10010010-93 = "Th-Then what are we going to do?! How are we supposed to find someone like that?!"
10010010-94 = "Nooo...!"
10010010-95 = "H i n a t a..."
10010010-96 = "...?"
10010010-98 = "Shhh."
10010010-100 = "Sorry..."
10010010-101 = "[s5] \"Ever the librarian.\"\n[s6] \"I'd do as she says.\""
10010010-105 = "*sigh*..."
10010010-106 = "I never said it was impossible. In fact, I know someone who may be able to help."
10010010-107 = "You should meet with her and see if she can find a solution."
10010010-108 = "A fair bit of warning: She's a bit...eccentric. I promise you she's not a bad person, though, despite appearances."
10010010-109 = "[s7] \"Eccentric?\"\n[s8] \"(Now I'm curious...)\""
10010010-110 = "A-Anyway, I promise she's great at what she does. That's why people refer to her as the \"Magician of the Old Library\". "
10010010-111 = "A-Anyway, I promise she's great at what she does. That's why people refer to her as the \"Magician of the Old Library\". "
10010010-112 = "Not that she actually knows magic or anything like that. It's more like,#nthere's no problem she can't solve."
10010010-113 = "The only thing is..."
10010010-115 = "Well, how do I put it?"
10010010-116 = "She's very...wary of strangers...and a bit of a recluse."
10010010-117 = "She locks herself in the old library and seemingly never leaves."
10010010-118 = "I've never known her to be very social or good with interpersonal relationships.#nStill, I don't think she's a bad person."
10010010-120 = "Right, I should actually tell you her name."
10010010-121 = "She's the president of the Library Committee."

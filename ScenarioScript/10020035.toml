[translation]
10020035-19 = "唔……！！"
10020035-20 = "停，停下來！……你到底是誰？"
10020035-21 = "又被逃走了……"
10020035-26 = "星，星野前輩……剛才……"
10020035-27 = "不是我們所認識的白子醬，究竟是什麼意思……？"
10020035-29 = "……"
10020035-30 = "白子醬他……不會露出那種眼神。"
10020035-31 = "那是……"
10020035-40 = "讓你們久等了！多虧陽葵前輩，我們成功駭入第4區域的通訊網了！"
10020035-41 = "第4區域，我記得是……"
10020035-42 = "就是捕捉到[ruby=他]「白子」[/ruby]信號的位置。#n馬上就會顯示在畫面上，稍等一會。"
10020035-52 = "這，這裡是……"
10020035-62 = "白，白子前輩！？"
10020035-63 = "白子醬……？"
10020035-64 = "嗯。終於找到了。#n老師，大家……我一直在等你們。"
10020035-65 = "[ns]「白子，你還好嗎！？有沒有受傷！？」"
10020035-68 = "嗯，我沒事。#n只是在騎車回學校的途中被綁架了而已。"
10020035-69 = "我以為會被當成人質的是像茜香那樣的孩子，所以大意了。抱歉。"
10020035-70 = "什，什麼！？我說白子前輩？你那句話是什麼意思！？"
10020035-71 = "不過我知道大家會來救我……我沒事。#n只是關節有點痛而已。"
10020035-72 = "而且……他們並沒有加害於我，看來目的是贖金啊。"
10020035-73 = "哎呀～話說白子醬啊。你明明是人質，為什麼會打扮成那樣呢？"
10020035-74 = "嗯，這個是……我一直都把它放在背包裡。#n機會是留給準備好的人。"
10020035-75 = "因為不久之前，這裡似乎遭到了攻擊……#n所以在逃出去的時候就趁機把值錢的東西──"
10020035-80 = "在這種情況下……居然還在計畫這種事……"
10020035-81 = "唔……嗯……"
10020035-82 = "唔嘿～#n……白子醬真是在危機中找到轉機的天才呢。"
10020035-83 = "……不過，白子醬。#n大叔我不是說過了嗎？"
10020035-94 = "嗯……"
10020035-95 = "「一旦咱們慢慢開始習慣這種方式……之後就會變成完全不在乎」……"
10020035-96 = "「就算能用那種方式守住學校，又有什麼意義」……星野前輩這麼說過。"
10020035-98 = "……"
10020035-99 = "……白子醬。"
10020035-100 = "白子前輩……真的是白子前輩……"
10020035-101 = "唔嘿～記得真清楚呢。"
10020035-102 = "要乖乖待在那裡唷？#n我們馬上去救你。"
10020035-103 = "嗯。"
10020035-104 = "沒說完的話之後再說，好嗎？#n白子醬不在的這段期間真的發生了很多事喔？都是些聽完後會讓人忍不住落淚的事……"
10020035-105 = "嗯，我等著。"
10020035-106 = "星野前輩、大家、老師……#n我知道大家會來救我的。"
10020035-107 = "[s]「……嗯，那是當然的。」"
10020035-108 = "那──這裡──等──"
10020035-112 = "……"
10020035-113 = "白子醬……"
10020035-114 = "……那麼趕快前往下一個區域吧。"
10020035-115 = "──前往白子醬所在的第4區域。"
10020035-116 = "是！雖然還沒完全搞清楚狀況……"
10020035-117 = "不過比起理解情況，當務之急是救出白子醬！"
10020035-119 = "等等我們，前輩……我們馬上就過去！！"
10020035-121 = "剩下最後一個──方舟的最終區域，中央第4區域。"
10020035-122 = "接下來只要占領這裡……就能掌握方舟的管制系統。"
10020035-123 = "那樣「阿特拉哈西斯的方舟」就完蛋了！#n盡情啟動自爆程式吧！"
10020035-128 = "真正的白子同學所在的地方是第4區域的封閉區域。"
10020035-129 = "但是，如果想開啟通向那裡的門，#n就必須先破壞位於方舟上層的「特別區域」──裡面的控制室才行。"
10020035-130 = "「特別區域」……"
10020035-131 = "是的。由於特別區域在物理上與方舟分離，所以沒有受到駭入的影響。"
10020035-132 = "也就是說，除非有人破壞「特別區域」的控制室，#n否則就無法到達白子醬所在的地方。"
10020035-133 = "是的。只要能成功破壞那裡，白子同學所在的第4區域就會開啟吧。"
10020035-137 = "……看來果然得由我們出馬了。"
10020035-138 = "拜託老師在這段期間破壞「次元引擎」並且占領第4區域囉。"
10020035-139 = "為了讓白子醬順利逃出來，得把附近打掃乾淨才行。"
10020035-140 = "[s]「了解。大家小心點哦。」"
10020035-142 = "是，交給我們吧！"
10020035-143 = "「次元引擎」就拜託了唷！"
10020035-144 = "那我們就前往「特別區域」囉。#n等會見～"
10020035-148 = "那麼──這就是「阿特拉哈西斯的方舟」占領戰最後的戰鬥。"
10020035-149 = "這……就會是最後的戰鬥了呢。"
10020035-150 = "是這麼說沒錯啦……不過敵人似乎也很清楚這是「最後」一戰了唷？"
10020035-151 = "……？"
10020035-156 = "唔哇……非常大量的敵人正朝這裡過來。"
10020035-157 = "什，什麼！？"
10020035-159 = "……看來有必要再次進行船隻的防衛呢。"
10020035-163 = "呵呵。無須擔心。"
10020035-165 = "這裡的防衛就交給我們吧。"
10020035-166 = "都走到這一步了，這也沒辦法。"
10020035-167 = "沒錯，儘管放手做吧★"
10020035-168 = "話說，什麼時候才能吃到宇宙食物呢～？"
10020035-170 = "這邊，我們會想辦法守住的……！"
10020035-171 = "是。這裡請交給愛麗絲跟夥伴們吧，老師。"
10020035-172 = "愛麗絲醬……身體還好嗎？"
10020035-174 = "是。雖然HP還沒完全恢復，不過已經可以和大家一起戰鬥了！"
10020035-175 = "別太勉強自己哦，愛麗絲！"
10020035-177 = "是！"
10020035-179 = "老師……那麼，最後的占領戰也麻煩您了。"

[translation]
22190-1 = "Episode 19; Cheater!"
22190-10 = "...!"
22190-15 = "[ns] \"All of the C&C members are attacking, but there's not even a scratch...\""
22190-16 = "An increased durability using special metal... It's not just withstanding our attacks..."
22190-17 = "It's actively neutralizing them and countering at the same time."
22190-23 = "All projectiles are shot down, and all attacks aimed towards blind spots are avoided with evasive maneuvers."
22190-24 = "Wait, this is strange. That amount of data...doesn't make sense..."
22190-25 = "All the power and network calculation functions throughout the Fortress City of Eridu are being concentrated on her and that suit!"
22190-26 = "If its performance is enhanced using such a high amount data and calculation functions...that thing can essentially predict the near future."
22190-27 = "[s] \"It can see into the future...?\""
22190-28 = "Wh-What? That sounds like a final boss' ability in a video game or something!"
22190-29 = "That's cheating!"
22190-30 = "U-Ugh..."
22190-32 = "We can't even discuss strategy or tactics at this point..."
22190-33 = "We're going to end this by robbing their ragtag group of the variable that leads them: their precious Sensei."
22190-34 = "Yes, ma'am."
22190-35 = "Sensei! Run! We'll be finished if the president gets what she wants!"
22190-36 = "[s] \"Ugh...! But!\""
22190-41 = "[ns] \"(What do I do? How do we beat her?!)\""
22190-48 = "Sensei... The opponent...despite her capabilities...is bound to the earth..."
22190-52 = "[ns] \"!\""
22190-54 = "[ns] \"...Neru! Let's change our battlefield a little!\""
22190-55 = "What?!"
22190-56 = "[s] \"Our goal is...the rooftop!\""
22190-57 = "...!"
22190-58 = "Ha...! I got it, Sensei!"
22190-66 = "I'm gonna grab you and jump. Hold on tight so you don't get hurt!"
22190-68 = "[ns] \"Whoa!\""
22190-77 = "They escaped...! Toki, chase them!"
22190-110 = "Affirmative. I have arrived on the rooftop."
22190-111 = "They chose the rooftop to escape... Clever."
22190-112 = "...This is your chance to fight Toki in a small space."
22190-113 = "Is that what you were hoping for, Sensei?  "
22190-114 = "[s] \"No, it's not only that.\""
22190-116 = "[ns] \"Neru!\""
22190-119 = "...Above!"
22190-120 = "Ha!"
22190-123 = "It's no use! Employing evasive maneuvers...!"
22190-130 = "Of course a toy like that can bounce around everywhere like crazy."
22190-131 = "That's only when it's on the ground though, right?"
22190-133 = "How do you do in the sky?"
22190-134 = "...?!"
22190-147 = "...I was thrown out of the building...?"
22190-149 = "Hey now, you're not gonna tell me it can fly through the sky, right?"
22190-151 = "Let's see if something that size can evade while falling!"
22190-154 = "*pant* *pant* Where are they?! Where did they go?!"
22190-155 = "Neru and Sensei were definitely coming this way..."
22190-156 = "...!! Ack! Momoi! Above...!"
22190-166 = "Get back here!"
22190-170 = "Minor bullet damage...!"
22190-171 = "Initiating computational correction for gravitational acceleration during free fall."
22190-172 = "As long as Eridu's backup is functioning, not even a fall can hamper my movement."
22190-173 = "Initiating counterfire."
22190-178 = "What the...?! What is this?! Seriously!!"
22190-179 = "Escaping while sliding around in such heavy equipment...!"
22190-180 = "Ugh! It can't be! That's cheating! Damn you!!"
22190-181 = "Neru."
22190-182 = "I'm going to finish things here."
22190-186 = "Fire...!"
22190-187 = "Oh yeah! Do you think I'll just take it? Huh?!"
22190-194 = "(Just now...!)"
22190-195 = "The back is empty...!"
22190-196 = "Damage following the battle... Null."
22190-197 = "Resuming response."
22190-198 = "...?!?!"
22190-217 = "[ns] \"*pant* ... *pant* ...Neru!\""
22190-219 = "...Sensei, what about that blasted underclassman?"
22190-220 = "[s] \"Toki is... More importantly, Neru?! Are you okay?! You're hurt...!\""
22190-221 = "...Ah!"
22190-222 = "Th-This is nothing..."
22190-227 = "[ns] \"Neru?!\""
22190-229 = "Neru!"
22190-239 = "N-No...no way... Falling from a building with that much metal...and weight..."
22190-240 = "And there's...not even...the slightest sign of damage..."
22190-244 = "The weapon was originally designed in preparation for future threats against Kivotos."
22190-245 = "The performance of all functions and abilities of the Fortress City have accumulated within it. It wouldn't be an exaggeration to say that it's basically the Fortress City itself."
22190-246 = "Furthermore... It's a response measure prepared in case C&C planned a betrayal, just like this."
22190-247 = "Neru, you certainly are an excellent tool, but..."
22190-248 = "...you and the C&C members you lead are also a risk to me."
22190-249 = "I had to be prepared."
22190-250 = "[s] \"So this is the weapon's...true purpose...\""
22190-251 = "Toki, retrieve the Schale Sensei."
22190-252 = "...Yes, ma'am."
22190-256 = "Wait, it's taken damage...?!"
22190-257 = "A weakness...! Momoi! This is our chance! Use what you got from Utaha...!"
22190-258 = "I'm on it!"
22190-262 = "Hiyaaaaaa!"
22190-266 = "Target attempting escape. Shall I make chase?"
22190-267 = "No... There's no need for that."
22190-268 = "Our goal is to defend this place for the remaining time."
22190-269 = "...Understood."
22190-270 = "We just need to wait. They'll regroup and return."
22190-271 = "That's just how they are."
22190-272 = "And when that time comes..."
22190-274 = "...we'll do what we must."
22190-276 = "Next Episode; Gamers and Friends"

[translation]
22190-1 = "ตอนที่ 19;ผู้เล่นที่ใช้สูตรโกง"
22190-10 = "......!!"
22190-15 = "[ns] \"โดน C&C ทุกคนกระหน่ำโจมตี... แต่ก็ไม่มีรอยขีดข่วนเลย...\""
22190-16 = "คงกำลังเพิ่มความคงทนด้วยโลหะพิเศษ... ไม่สิ แค่ทนอยู่เฉยๆ งั้นเหรอ นี่ไม่ใช่ธรรมดาๆ แล้ว"
22190-17 = "พวกนั้นป้องกันและตัดกำลังการโจมตีทั้งหมดของเราคล่องมากเลย"
22190-23 = "ยิงใส่ทุกอย่างที่เรายิงไป แถมยังเคลื่อนไหวหลบเลี่ยงการโจมตีจากจุดบอดได้หมดด้วย"
22190-24 = "เดี๋ยวก่อน นี่มันแปลกๆ ปริมาณข้อมูลนี้มัน... เป็นไปไม่ได้..."
22190-25 = "ประสิทธิภาพการคำนวณเครือข่ายและพลังงานทั้งหมดของเมืองแห่งปราการเอริดูกำลังมุ่งเน้นไปที่ <แก๊ส> ปริศนานั่น...!"
22190-26 = "ถ้าเป็นประสิทธิภาพที่แข็งแกร่งขึ้นด้วยปริมาณข้อมูลและสมรรถนะการคำนวณละก็... ระดับนี้มัน... สามารถทำนายอนาคตอันใกล้และกำหนดอนาคตได้เลย..."
22190-27 = "[s] \"ทำนายอนาคตอันใกล้... ได้งั้นเหรอ?\""
22190-28 = "อะ... อะไรเนี่ย! ความสามารถอะไรแบบนั้น... ไม่ต่างจากสกิลกลโกงของบอสตัวสุดท้ายเลยนะ?!"
22190-29 = "แบบนั้นมันโกงกันนี่คะ!"
22190-30 = "อะ... อ่า..."
22190-32 = "มาหารือกันเรื่องกลยุทธ์และชั้นเชิงตอนนี้ก็สายไปแล้วละ..."
22190-33 = "ตัวแปรเดียวคือครู เราต้องหยุดคนคนนั้นไว้ด้วยการแย่งความสามารถในการสั่งการนั้นมา"
22190-34 = "ค่ะ มาดาม"
22190-35 = "คุณครู! รีบหนีไปเร็วเข้า! ถ้าสถานการณ์มันเป็นไปตามแผนของประธานละก็ ทุกอย่างได้จบเห่แน่!"
22190-36 = "[s] \"อึก...! แต่ว่า!\""
22190-41 = "[ns] (ทำยังไงดี?! ต้องทำยังไงถึงจะแก้ไขสถานการณ์นี้ได้...?!)"
22190-48 = "คุณครู... ฝ่ายตรงข้าม... ได้เปรียบ... เฉพาะ... บนบก..."
22190-52 = "[ns] \"!!\""
22190-54 = "[ns] \"...เนรุ! เปลี่ยนสถานที่กันเถอะ!\""
22190-55 = "ว่าไงนะ?!"
22190-56 = "[s] \"เป้าหมายคือ... ดาดฟ้า!\""
22190-57 = "......!!"
22190-58 = "ฮึ่ม...! เข้าใจแล้ว! ครู!"
22190-66 = "งั้นฉันจะคว้าตัวครูไว้แล้ววิ่งออกไป กัดฟันไว้ให้แน่นละ เดี๋ยวจะตกใจจนกัดลิ้นตัวเองไปซะก่อน!"
22190-68 = "[ns] \"เย้ย?!\""
22190-77 = "จะหนีงั้นเหรอ...! โทคิ! ไล่ตามไป!"
22190-110 = "ไล่ตามเป้าหมายมาจนถึงดาดฟ้าแล้วค่ะ"
22190-111 = "ที่ที่เลือกหนีมา... ทำไมต้องเป็นดาดฟ้าของอาคารด้วย"
22190-112 = "...ถ้าเป็นที่แคบๆ ก็คงจะสู้กับโทคิได้"
22190-113 = "คุณคิดแบบนี้สินะ ครูจากชาเล่ต์ "
22190-114 = "[s] \"ไม่ใช่นะ ครูไม่ได้อยากจะต่อสู้ด้วยเลย\""
22190-116 = "[ns] \"เนรุ!\""
22190-119 = "...ข้างบน!"
22190-120 = "เฮอะ!"
22190-123 = "ไม่มีประโยชน์หรอกค่ะ! ฉันหลบได้...!"
22190-130 = "ก็ถ้าเป็นของเล่นยอดเยี่ยมชิ้นนั้น ก็คงจะกระเด้งกระดอนไปทางนู้นทีทางนี้ทีได้"
22190-131 = "แต่ก็ทำได้แค่ตอนที่อยู่บนพื้นอย่างเดียวใช่ไหมล่ะ?"
22190-133 = "แล้วถ้าอยู่บนฟ้าล่ะ จะเป็นยังไง?!"
22190-134 = "......?!"
22190-147 = "คงกระเด้งออกจากอาคาร...?"
22190-149 = "เฮ้ยๆ อย่าบอกนะว่าบินไปบนฟ้าได้น่ะ ไม่ใช่หรอกเนอะ? ใช่ไหม?"
22190-151 = "มาดูซิว่าถ้ากำลังร่วงลงมา จะยังหนีฉันได้อยู่รึเปล่า?! นี่แน่ะ!"
22190-154 = "แฮ่ก... แฮ่ก...! อยู่ไหนน่ะ?! ไปไหนกันแล้ว?!"
22190-155 = "คุณครูกับรุ่นพี่เนรุ มุ่งหน้ามาทางนี้นี่นา..."
22190-156 = "......!! ทะ... ทางโน้น! โมโมอิ! ข้างบน...!"
22190-166 = "ย้ากก!"
22190-170 = "แค่ความเสียหายเล็กน้อยจากการยิง...!"
22190-171 = "เริ่มปรับการคำนวณความเร่งเนื่องจากแรงโน้มถ่วงในระหว่างที่ตก"
22190-172 = "ตราบใดที่ยังมีการสนับสนุนของเอริดูอยู่... ต่อให้ตกลงมาก็ไม่มีปัญหาเรื่องการเคลื่อนไหวค่ะ"
22190-173 = "จะเริ่มยิงตอบโต้แล้วนะคะ"
22190-178 = "โอ๊ย ร้อนๆๆ!! อะไรกันเนี่ย!!"
22190-179 = "ลื่นก็ลื่น แถมมีเหล็กหนักๆ แบบนั้นติดตัวแล้วยังหนีไปได้อีก...?!"
22190-180 = "ไม่นะ!! แบบนี้ไม่ได้สิ!! ยัยเด็กขี้โกง!!"
22190-181 = "รุ่นพี่เนรุ"
22190-182 = "ฉันขอจบเรื่องนี้ตรงนี้เลยนะคะ"
22190-186 = "ยิง...!"
22190-187 = "คิดว่าฉันจะยอมโดนเล่นงานจนหมดท่ารึไงเล่า...!"
22190-194 = "(เมื่อกี้มัน...!)"
22190-195 = "ข้างหลังว่างอยู่...!"
22190-196 = "การบาดเจ็บจากการต่อสู้ต่อเนื่อง... เป็นศูนย์"
22190-197 = "เริ่มโต้ตอบอีกครั้งค่ะ"
22190-198 = ".........?!?!"
22190-217 = "[ns] \"แฮ่ก...แฮ่ก...! เนรุ!\""
22190-219 = "ครู ยัยรุ่นน้องตัวดีนั่นล่ะ?"
22190-220 = "[s] \"โทคิยังอยู่... แต่ว่าเนรุ?! ไหวหรือเปล่าน่ะ?! แผลเธอ...!\""
22190-221 = "อ่า..."
22190-222 = "แผลแค่นี้ ไม่เท่าไรหรอก..."
22190-227 = "[ns] \"เนรุ?!\""
22190-229 = "รุ่นพี่เนรุ!"
22190-239 = "ปะ... เป็นไปไม่ได้... ตกลงไปจากอาคารพร้อมเหล็กกล้าขนาดนั้น..."
22190-240 = "แต่ไม่มี... บาดแผลให้เห็นเลยงั้นเหรอ..."
22190-244 = "<อาวุธ> นี้คือของที่ทำขึ้นมาตั้งแต่แรกเพื่อเตรียมพร้อมสำหรับภัยคุกคามที่จะมาเยือนคิโวทอส"
22190-245 = "ประสิทธิภาพที่รวมเอาศักยภาพทั้งหมดของเมืองแห่งปราการไว้... ถ้าจะบอกว่ามันก็คือเมืองแห่ง#nปราการเลยก็ไม่ผิด"
22190-246 = "ยิ่งไปกว่านั้น... มันยังเป็นมาตรการตอบโต้ที่เตรียมไว้เผื่อการทรยศ เหมือนกับที่พวกเธอ C&C ทรยศ#nฉันในครั้งนี้ไง"
22190-247 = "เนรุ เธอเป็นคนที่ยอดเยี่ยมมาก..."
22190-248 = "แต่ในขณะเดียวกันเธอและสมาชิก C&C ของเธอก็เป็นปัจจัยที่ไม่แน่นอนสำหรับฉัน"
22190-249 = "นั่นจึงเป็นเหตุผลที่ฉันเตรียมพร้อมไว้"
22190-250 = "[s] \"นี่เหรอคือ... คุณค่าที่แท้จริงของ <อาวุธ>\""
22190-251 = "โทคิ ไปพาตัวครูจากชาเล่ต์มา"
22190-252 = "...ค่ะ มาดาม"
22190-256 = "นี่มัน... ความเสียหายที่เกิดขึ้นกับแก๊ส...?"
22190-257 = "ได้โอกาสแล้ว! โมโมอิ! ตอนนี้แหละ! ของที่ได้รับมาจากอุทาฮะไง...!"
22190-258 = "อ้อ...! เข้าใจแล้ว!"
22190-262 = "ย้ากกก!!"
22190-266 = "พบการหลบหนีของเป้าหมาย ให้ตามไปเลยไหมคะ?"
22190-267 = "ไม่... คงไม่ต้องทำถึงขนาดนั้นหรอก"
22190-268 = "เป้าหมายของเราคือการปกป้องที่นี่จนกว่าจะหมดเวลา"
22190-269 = "...รับทราบค่ะ"
22190-270 = "พวกนั้นจะไปเตรียมอุปกรณ์แล้วก็กลับมาใหม่อีกครั้งด้วยจิตใจที่แน่วแน่"
22190-271 = "นี่แหละนิสัยของพวกนั้น"
22190-272 = "และในตอนนั้น..."
22190-274 = "─── ก็ค่อยเผด็จศึกให้ราบคาบไปเลย"
22190-276 = "ตอนต่อไป;ในฐานะเกมเมอร์ ในฐานะเพื่อน"

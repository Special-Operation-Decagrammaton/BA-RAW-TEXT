[translation]
22190-1 = "第19話;作弊玩家"
22190-10 = "……！！"
22190-15 = "[ns]「就算受到這種攻擊，也沒有任何損傷……」"
22190-16 = "用特殊金屬提升了耐久度……不對，並不是，承受住了……？"
22190-17 = "而是，讓所有攻擊都失效了……？"
22190-23 = "在子彈命中之前將其擊落，迴避從死角發動的攻擊……"
22190-24 = "等等，有點奇怪。#n這個數據量……怎麼可能……！"
22190-25 = "要塞都市埃里都所有的電力和演算能力，全部都集中在那個「機體」上……！？"
22190-26 = "沒錯──同時，被最先進演算能力強化的性能……#n就連預知未來並加以確認都能做到。"
22190-27 = "[s]「預知……未來？」"
22190-28 = "什，什麼！那不是最終Boss才會有的能力嗎！？"
22190-29 = "那種東西，不就是作弊嗎！"
22190-30 = "啊，啊嗚……"
22190-32 = "不妙。這已經不是戰略和戰術能克服的程度了……"
22190-33 = "身為唯一變數的老師──只要奪走你的指揮能力，就能畫下休止符了吧。"
22190-34 = "是的，主人。"
22190-35 = "老師！快逃！"
22190-36 = "[s]「唔……！但是！」"
22190-41 = "[ns]（該怎麼做……要怎麼做才能扭轉這個局面！？）"
22190-48 = "老師……對方是，陸上專用的……"
22190-52 = "[ns]「！！」"
22190-54 = "[ns]「……寧瑠！換個地方戰鬥吧！」"
22190-55 = "啊！？"
22190-56 = "[s]「往屋頂前進吧……！」"
22190-57 = "……！！"
22190-58 = "哈……知道了！我相信你！"
22190-66 = "那，為了不咬到舌頭，嘴巴給我閉緊啊！"
22190-68 = "[ns]「嗚哇！」"
22190-77 = "居然在這種時候逃跑……！季，追上去！"
22190-110 = "追擊目標，到達屋頂。"
22190-111 = "居然偏偏是在大樓的屋頂上──"
22190-112 = "……如果是狹窄的地方，就能和季一戰。"
22190-113 = "你是這麼判斷的吧，老師。"
22190-114 = "[s]「不，那不是我的目標。」"
22190-116 = "[ns]「寧瑠！」"
22190-119 = "……在頭上！"
22190-120 = "哈！"
22190-123 = "沒有用的！因為我可以迴避──"
22190-130 = "是啊。用那個大的誇張的玩具的話，應該能避開吧。"
22190-131 = "但那也僅限在[ruby=．  ．]地上[/ruby]吧？"
22190-133 = "那麼，在空中怎麼樣呢？"
22190-134 = "……！？"
22190-147 = "唔，被撞出建築物外了……？"
22190-149 = "喂喂，你的下一句話不會是你能在天上飛吧？"
22190-151 = "喂，放馬過來吧！#n讓我看看你能不能在墜落的途中閃避我的攻擊吧！"
22190-154 = "哈啊哈啊……！他們兩個到底跑去哪裡了！？"
22190-155 = "從他們的方向來看應該是這附近才對……"
22190-156 = "……！！在，在那裡！#n桃井，上面……！"
22190-166 = "吃我這招！"
22190-170 = "中彈……損傷，輕微……！"
22190-171 = "開始進行對重力加速度的演算。"
22190-172 = "只要有埃里都的力量……#n就算在空中，也不會對移動產生影響。"
22190-173 = "重新開始應對。"
22190-178 = "痛痛痛！！#n可惡，真的假的啊！"
22190-179 = "居然真的能在空中行動……！？"
22190-180 = "這根本是作弊啊！#n你這傢伙！！開什麼玩笑！？"
22190-181 = "寧瑠前輩。"
22190-182 = "這樣就結束了。"
22190-186 = "同時掃射……！"
22190-187 = "怎麼可能乖乖讓妳命中……！"
22190-194 = "（剛才……！）"
22190-195 = "背後有空檔……！"
22190-196 = "連續戰鬥造成的損傷……是零。"
22190-197 = "應對，重新開始。"
22190-198 = "…………！？！？"
22190-217 = "[ns]「哈啊……哈啊……！寧瑠，妳還好嗎！？」"
22190-219 = "啊啊，老師……那傢伙怎樣了？"
22190-220 = "[s]「季的樣子還沒……話說，妳的傷……！」"
22190-221 = "……啊啊。"
22190-222 = "這點程度根本不算……"
22190-227 = "[ns]「寧瑠！？」"
22190-229 = "寧瑠前輩！"
22190-239 = "怎，怎麼可能……明明從大樓掉了下來……"
22190-240 = "居然連一點傷……都沒有……"
22190-244 = "「[ruby=這個]武裝[/ruby]」打從一開始，就是為了面對奇普托斯未來的威脅，與要塞都市一起建造出來的。"
22190-245 = "集結了要塞都市的所有能力──#n也就是說，要說它就是要塞都市本身也不為過。"
22190-246 = "而且……也是為了應對妳們C&C背叛我的時候準備的對策。"
22190-247 = "寧瑠，妳的確很優秀……"
22190-248 = "妳，還有妳帶領的C&C──對我來說也是不安定的要素。"
22190-249 = "因此，才會為這一天的到來有所準備。"
22190-250 = "[s]「這就是『武裝』擁有的……力量。」"
22190-251 = "季，回收夏萊的老師吧。"
22190-252 = "……是的，主人。"
22190-256 = "這是……機體上，有傷害……？"
22190-257 = "有破綻……！桃井！就是現在！"
22190-258 = "嗯……！我知道了！"
22190-262 = "呀啊啊啊！！"
22190-266 = "確認目標逃跑。要追上去嗎？"
22190-267 = "不……沒有那種必要。"
22190-268 = "我們的目標只有在時間到之前，保護好這裡而已。"
22190-269 = "……我知道了。"
22190-270 = "不過，他們還會再來的吧。"
22190-271 = "畢竟他們就是那樣的人啊。"
22190-272 = "到了那個時候──"
22190-274 = "──就結束這一切吧。"
22190-276 = "下一話;作為玩家，作為好友"

3401-59 = "3;레이죠;11;……물론, 그것이 필요할 때가 있다는 것을, 인정하지 않는 것은 아니긴 합니다만."
3401-60 = "3;레이죠;03;그렇지만 문주님은 조금 예외입니다. 기본적으로 대화가 통하고, 때로는 자비도 보여 주시는 분이니 말입니다."
3401-61 = "3;레이죠;13;그런 문주님께서, 아무도 모르게 쿵후를 연습하고 계셨다니……!\n#3;em;[반짝]\n#3;closeup"
3401-62 = "3;레이죠;03;역시 아침 수련을 거르지 않길 잘했습니다. 거기에 오늘은 어째서인지 눈이 빨리 뜨여, 평소보다 이른 시간에 나온 것도 행운이었군요!\n#3;hophop"
3401-63 = "3;레이죠;13;그렇다면 이 기회에, 문주님과 더불어……!"

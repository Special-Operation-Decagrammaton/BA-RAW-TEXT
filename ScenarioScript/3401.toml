[translation]
3401-1 = "ยามเช้าที่พิเศษนิดหน่อยของซานไห่จิง 1"
3401-3 = "หนึ่ง สอง สาม สี่..."
3401-15 = "ฮู่ว ถึงจะเป็นสวนพยัคฆ์ขาว แต่เวลาแบบนี้คงไม่มีใครอยู่หรอกสินะ"
3401-16 = "อืม ถึงไม่อยากให้ใครเห็นว่ามาออกกำลังกายตอนเช้าก็เถอะ แต่มันก็ช่วยไม่ได้นะ... "
3401-25 = "ฮุฮุ พอได้ขยับร่างกาย สมองก็เริ่มแล่น และดูเหมือนร่างกายก็ดีขึ้นนิดหน่อยด้วย"
3401-26 = "และการที่ไม่มีคนมาคอยคุ้มกันก็ทำให้เรารู้สึกเป็นอิสระขึ้น..."
3401-27 = "แต่มันก็... จริงอยู่ที่บางครั้งเราก็อยากจะนอนตื่นสายบ้าง..."
3401-28 = "......"
3401-29 = "ในเมื่อดื่มด่ำกับอารมณ์พอแล้ว ก็คงจะต้องกลับแล้วละ"
3401-36 = "เรื่องเมื่อกี้นี้..."
3401-37 = "ฉันแอบคอยจับตาดูอยู่หลายต่อหลายครั้งแล้วก็จริงแต่ว่า...!"
3401-41 = "ท่านประมุขกำลังฝึกกังฟูงั้นเหรอ?!"
3401-45 = "อุรุชิบาระ คางุยะคนนี้ได้เห็นเรื่องที่น่าเหลือเชื่อเข้าแล้วละค่ะ..."
3401-46 = "เนื่องจากไม่มีข่าวลือหรือเรื่องซุบซิบอะไรให้ได้ยิน ฉันเลยนึกว่าตัวเองเข้าใจผิดไป...!"
3401-47 = "หากในโลกมีผู้สูงศักดิ์ที่เข้าใจกัน ต่อให้อยู่สุดปลายฟ้าก็จะรู้สึกเหมือนอยู่ใกล้กัน..."
3401-51 = "ในที่สุดท่านประมุขก็เข้าใจถึงความภักดีของพวกเราแล้วสินะคะ!"
3401-54 = "อันที่จริงฉันก็ไม่ได้ชื่นชอบพวกมังกรดำเท่าไรหรอกค่ะ"
3401-55 = "พวกนั้นน่ะทั้งชอบเอ็ดตะโร ไร้มารยาท และคิดว่าตัวเองคือกฎเกณฑ์ต่างๆ..."
3401-59 = "แน่นอนว่าฉันก็ปฏิเสธไม่ได้ว่ามีบางครั้งเรื่องพวกนั้นก็เป็นเรื่องจำเป็นเหมือนกันค่ะ"
3401-60 = "แต่ว่าท่านประมุขเป็นข้อยกเว้นค่ะ ท่านเป็นคนที่พูดคุยด้วยได้ตามปกติ และบางครั้งก็แสดงความเมตตาออกมาให้เห็นด้วยซ้ำ"
3401-61 = "ท่านประมุขคนนั้นกำลังฝึกกังฟูอยู่โดยไม่ให้ใครรู้..."
3401-62 = "อย่างที่คิดไว้เลย ดีแล้วละค่ะที่ฉันไม่ยอมพลาดการฝึกในตอนเช้า แถมวันนี้ไม่รู้ทำไมฉันถึงได้ตื่นเช้า และออกมาเร็วกว่าปกติอีกด้วย!"
3401-63 = "ถ้างั้นฉันจะใช้โอกาสนี้ ไปฝึกร่วมกับท่านประมุข...!"
3401-67 = "รอแทบไม่ไหวแล้วละ ฉันจะต้องบอกความจริงนี้ให้คนอื่นๆ รู้... ใช่แล้วค่ะ ก่อนอื่นฉันต้องแจ้งให้#nท่านประธานรู้ก่อนค่ะ! เริ่มจากตรงนั้นก่อนแล้วกัน!"
3401-73 = "อันที่จริง จากเหตุการณ์วุ่นวายต่างๆ ชมรมการแสดงงิ้วของเราได้ถูกสั่งกักบริเวณเพื่อให้ทบทวน#nตัวเองอยู่ระยะหนึ่งค่ะ"
3401-74 = "ไม่ใช่ว่าฉันคิดจะตั้งคำถามเกี่ยวกับการตัดสินใจของท่านประมุขหรอกนะคะ"
3401-75 = "แต่สิ่งที่ฉันกังวลคือท่านประมุขจะสูญเสียความไว้วางใจในชมรมการแสดงงิ้วของเราไป และจะไม่มีโอกาสให้พวกเราได้แสดงความภักดีให้ท่านเห็นอีก…!"
3401-76 = "แต่ว่าพอได้เห็นท่านฝึกฝนการแสดงงิ้วแบบนี้ มันก็แสดงให้เห็นแล้วค่ะว่าท่านประมุขไม่มีวันทอดทิ้ง#nพวกเรา!"
3401-77 = "คงไม่มีอะไรโชคดีกว่านี้แล้วละค่ะ!"
3401-78 = "ตอนนี้ การจัดสรรงบประมาณของชมรมการแสดงงิ้วมีความยืดหยุ่นมากขึ้น ทำให้สามารถจัดแสดงงิ้ว#nได้อย่างอลังการ ตื่นตาตื่นใจได้มากขึ้นด้วยค่ะ!"
3401-79 = "ตอนนี้บรรยากาศในชมรมการแสดงงิ้วค่อนข้างหม่นหมองไปสักนิด เพราะแบบนั้นเราเลยควรเผยแพร่#nความโชคดีของเราให้สมาชิกในชมรมได้รับรู้ค่ะ!"
3401-86 = "แล้ว... คิซากิฝึกกังฟูตอนเช้างั้นเหรอ?"
3401-87 = "ใช่แล้วค่ะ ฉันไม่อยากเชื่อเลยว่าจะมีคนอื่นที่ชื่นชมในความสุดยอดของกังฟูอยู่ แถมยังเป็นท่านประมุขอีกด้วย..."
3401-88 = "ในฐานะผู้ฝึกหัดกังฟู มันไม่มีเรื่องน่ายินดีกว่านี้แล้วละค่ะ!"
3401-89 = "เอ่อ... เรื่องนั้นน่ะ..."
3401-90 = "......"
3401-91 = "อืม นั่นสินะ"
3401-92 = "มีอะไรกวนใจอยู่รึเปล่าคะ ท่านประธาน?"
3401-93 = "เปล่าหรอก มันก็ไม่เชิงน่ะ"
3401-94 = "(แต่มันก็น่าแปลกแฮะ คิซากิที่ฉันรู้จักไม่ใช่คนที่จะทำอะไรแบบนี้นี่นา...)"
3401-95 = "แล้ว... เธอคิดว่าไงล่ะ เรย์โจว?"
3401-96 = "คะ? อืม คือว่า... ฉันอยากแจ้งข่าวดีแบบนี้ให้กับกลุ่มนักฝึกกังฟูได้รู้ค่ะ"
3401-97 = "ไม่ใช่แค่ในซานไห่จิงเท่านั้น แต่รวมถึงทุกคนที่อยู่ในคิโวทอสด้วย อันที่จริงนักเรียนที่ฝึกฝนศิลปะ#nการต่อสู้กับศิลปะการป้องกันตัวมีอยู่น้อยมากๆ"
3401-98 = "ถ้ามีสมาชิกเพิ่มขึ้นก็เป็นเรื่องที่ทุกคนควรจะได้ร่วมยินดีด้วยกันค่ะ!"
3401-99 = "เพราะงั้น... ท่านประธาน! วันนี้ฉันคงต้องขอเสียมารยาทสักหน่อยนะคะ!"
3401-104 = "ตื่นเต้นกับข่าวดีมันก็ดีอยู่หรอก..."
3401-108 = "เอาเถอะ นานๆ ทีจะเห็นเรย์โจวกระตือรือร้นแบบนี้!"
3401-109 = "ว่าแต่ว่าคิซากิ... อืม... ยังไงก็รู้สึกแปลกๆ อยู่ดีแฮะ"
3401-110 = "แต่ก็เอาเถอะ ถ้าคิซากิกำลังแอบฝึกกังฟูอยู่จริงๆ ละก็..."
3401-111 = "คราวหน้าฉันแอบทำขนมไปแจกบ้างดีมั้ยนะ?"
3401-114 = "จริงเหรอคะ หัวหน้า?"
3401-115 = "ใช่แล้วละค่ะ! ฉันเห็นมากับตาตัวเองเลยค่ะ!"
3401-119 = "แน่นอนว่าฉันคอยสังเกตอยู่ไกลๆ เพื่อไม่ให้ถูกจับได้ บางทีก็อาจจะมีคนพูดได้ว่าฉันอาจมองพลาดไป#nก็ได้ แต่ว่า..."
3401-120 = "แต่ฉันคนนี้เห็นมาด้วยสองตาของตัวเองเลยค่ะ!"
3401-121 = "ท่วงท่าแบบนั้น การวาดวงแขน การยืดเหยียดขึ้นไปบนฟ้า! ทุกๆ อย่างเลยค่ะ…!"
3401-122 = "มันคือท่วงท่า 'การร่ายรำแสดงงิ้ว' ของพวกเราไม่ผิดแน่ค่ะ!"
3401-123 = "การร่ายรำงิ้ว... ท่วงท่าที่ถูกกำหนดขึ้นมาเพื่อฝึกฝนการแสดงงิ้ว..."
3401-124 = "การร่ายรำที่เป็นเอกลักษณ์ของชมรมการแสดงงิ้วของเรา!"
3401-125 = "แต่มันไม่แปลกไปหน่อยเหรอคะ หัวหน้า? ท่านประมุขรู้ท่วงท่าในการแสดงงิ้วที่เป็นความลับของชมรม#nเราได้ยังไงกันคะ?"
3401-126 = "ไม่เลยค่ะ มันไม่มีอะไรแปลกเลยแม้แต่น้อยค่ะ ลองคิดดูให้ดีสิคะ ที่เป็นแบบนั้นก็เพราะว่า..."
3401-130 = "ท่านประมุขเป็นผู้รอบรู้ยังไงล่ะคะ!"
3401-135 = "ต้องเป็นแบบนั้นแน่ๆ เลยค่ะ"
3401-136 = "แต่ยังไงก็ตาม ไม่ว่าจะเป็นหยกที่ใสบริสุทธิ์ขนาดไหน ก็อาจมีเศษฝุ่นเกาะติดอยู่ได้..."
3401-137 = "ท่วงท่าของท่านประมุขเป็นท่วงท่าการแสดงงิ้วอย่างแน่นอน... ทว่าการเคลื่อนไหวนั้นยังขาดความลื่น#nไหลและเปิดเผยช่องว่างเป็นครั้งคราวค่ะ"
3401-138 = "เพราะแบบนั้น…! ตอนนี้ถึงเวลาที่ชมรมการแสดงงิ้วของเราจะต้องออกโรงแล้วละค่ะ!"
3401-139 = "นั่นสิคะ! ถ้าหัวหน้าพูดแบบนี้ ฉันคิดว่าต้องเป็นแบบนั้นจริงๆ นั่นแหละค่ะ!"
3401-142 = "รู้รึเปล่า ได้ยินข่าวรึยัง? ท่านประมุขของเราน่ะ..."
3401-143 = "อ้อ เรื่องนั้นเหรอ? ฉันก็ได้ยินมาเหมือนกันนะ! อ่า แต่ว่าถ้าทำพลาดละก็จะถูกพวกสมาชิกมังกรดำ#nต่อว่ามั้ยนะ..."
3401-144 = "แต่มันน่าทึ่งมากเลยไม่ใช่เหรอ? ท่านประมุขฝึกฝนตั้งแต่เช้าตรู่แบบนั้น..."
3401-145 = "ก็มีส่วนที่เข้าใจได้อยู่หรอก แต่มันก็อาจจะยากใจหลายๆ เรื่องนะ อย่างเช่นด้วยตำแหน่งแล้วก็อาจจะ#nวางตัวลำบากใช่มั้ยล่ะ?"
3401-151 = "เอ๋ สมาชิกชมรมวิจัยศิลปะป้องกันตัวไม่ใช่เหรอคะ? มีเรื่องอะไรงั้นเหรอคะ?"
3401-152 = "อ่า บังเอิญจังเลยนะคะ ดีใจที่ได้พบกันที่นี่ค่ะ"
3401-153 = "พวกคุณอาจรู้อยู่แล้วก็ได้ แต่ฉันมาเพราะ 'เรื่องนั้น' ของท่านประมุขน่ะค่ะ..."
3401-154 = "จากนี้ไป ฉันคิดว่าเป็นความคิดที่ดีที่จะมา 'ร่วมมือ' กับชมรมวิจัยศิลปะป้องกันตัวของพวกเรานะคะ!"
3401-155 = "…..."
3401-156 = "อันที่จริง ฉันก็ได้รับความช่วยเหลือจากสมาชิกชมรมวิจัยศิลปะป้องกันตัวมาเยอะมากเลยนะคะ"
3401-157 = "งั้นก็ดีค่ะ เป็นข้อเสนอที่น่าสนใจมากทีเดียว จนฉันเป็นฝ่ายอยากขอรบกวนพวกคุณเลยด้วยซ้ำค่ะ"
3401-158 = "เพื่อการฝึกฝนแล้ว... รบกวนสอนฉันในหลายๆ เรื่องเลยนะคะ"
3401-159 = "ค่ะ! เพื่อการฝึกฝน!"
3401-160 = "และเพื่อการนั้นแล้ว... ฉันมีเรื่องที่อยากจะบอกอยู่ด้วย..."
3401-161 = "ไหนๆ ก็ไหนๆ แล้ว คุณสนใจจะมาเข้าร่วมเป็นสมาชิกของชมรมวิจัยศิลปะป้องกันตัวมั้ยคะ?!"
3401-163 = "อ่า... เรื่องนั้นอาจจะลำบากสักหน่อย ต้องขอโทษด้วยจริงๆ ค่ะ ตอนนี้ฉันค่อนข้างยุ่งเพราะงานของ#nทางย่านการค้าค่ะ"
3401-164 = "อย่างนั้นเหรอคะ..."
3401-167 = "ทุกคนมาครบแล้วใช่มั้ยคะ?"
3401-171 = "ค่ะ หัวหน้า!"
3401-173 = "ที่นี่คือสวนพยัคฆ์ขาวที่ท่านประมุขใช้ฝึกท่วงท่าการแสดงงิ้วในยามเช้า..."
3401-174 = "ที่จริงแล้วสำหรับชมรมการแสดงงิ้วของเรา ใช้ที่นี่เป็นการแสดงงิ้วกลางแจ้งมานานแล้ว พวกเราก็เลย#nคุ้นเคยกับสถานที่เป็นอย่างดีค่ะ"
3401-175 = "แต่ถึงจะเป็นสถานที่เดียวกัน แต่ความหมายของมันก็เปลี่ยนไปตามแต่วัตถุประสงค์ของผู้ใช้งานค่ะ!"
3401-176 = "ว่ากันว่าหากจะปืนขึ้นไปบนผาสูง จะต้องเริ่มปีนจากจุดที่ต่ำที่สุดขึ้นไปก่อน"
3401-177 = "และในที่แห่งนี้ พวกเรา..."
3401-178 = "จะขอแสดงการร่ายรำงิ้วแบบฉบับดั้งเดิมเพื่อแสดงถึงความสูงส่งให้กับท่านประมุขได้ชมค่ะ"
3401-183 = "พวกเราเองก็จะทำตามค่ะ หัวหน้า!"

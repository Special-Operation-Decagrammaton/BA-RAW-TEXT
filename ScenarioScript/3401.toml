[translation]
3401-1 = "山海經的特別早晨（１）"
3401-3 = "一，二，三，四……"
3401-15 = "呼……即便是白虎公園，這個時段仍舊無人來往呢。"
3401-16 = "雖想避免做早操的模樣遭人撞見，然這也別無他法……"
3401-25 = "呵呵。活動過後不僅意識清醒，身體狀況似乎也好上許多。"
3401-26 = "此時亦無護衛隨行，感覺格外自由。"
3401-27 = "話雖如此……不時仍有懶起之意也是事實……"
3401-28 = "……"
3401-29 = "感慨就到此為止，是時候該回去了。"
3401-36 = "剛才那是……"
3401-37 = "為了保險起見而躲起來確認了好幾次……！"
3401-41 = "難道……門主大人在修練功夫嗎！？"
3401-45 = "我漆原輝夜，見到了難以置信的一幕……"
3401-46 = "因為沒有傳聞或風聲，還以為是我的錯覺……！"
3401-47 = "有道是：「海內存知己，天涯若比鄰。」……"
3401-51 = "門主大人終於明白了我們的一片忠心，親自開始練習京劇了！"
3401-54 = "其實我一直很看不慣玄龍門那群人。"
3401-55 = "既吵鬧又無禮，總是一副高高在上的態度……"
3401-59 = "……當然，我也不否認有時候擺架子是必要的。"
3401-60 = "但門主大人是個例外。#n不只基本上可以溝通，有時還會展現出慈悲的一面。"
3401-61 = "這樣的門主大人，竟然在悄悄地練習功夫……！"
3401-62 = "晨練沒有偷懶果然是正確的。#n而且今天還是因為莫名早起而提早出門，現在想來真是幸運！"
3401-63 = "那麼就趁這個機會，和門主大人一起……！"
3401-67 = "不，現在應該忍耐才對。#n必須先把這個消息告訴大家……對了，會長！先從會長說起吧！"
3401-73 = "……由於某些不光彩的原因，京劇部被迫自我反省了一段時間。"
3401-74 = "我對門主大人的決定並無二言。"
3401-75 = "唯一掛心的，只有京劇部恐將失去門主大人的信任，再也無從證明我們的忠心……！"
3401-76 = "然而，如今門主大人親自練習京劇，就代表他並未放棄我們吧！"
3401-77 = "這可真是喜事一樁！"
3401-78 = "如此京劇部的預算編列將會更加自由，#n往後便能舉辦更大、更華麗、更精彩的京劇表演！肯定是這樣沒錯！"
3401-79 = "正好現在京劇部的氣氛相對低迷，得趕緊將這個好兆頭傳遍整個京劇部才行！"
3401-86 = "所以，妃姬一大早在練功夫？"
3401-87 = "是的，會長！想不到除了我之外，竟然還有人能明白功夫的魅力。#n甚至還是那位門主大人……"
3401-88 = "身為一名習武之人，這真是太令人振奮了！"
3401-89 = "唔嗯……這個嘛……"
3401-90 = "……"
3401-91 = "嗯，就當作是這樣吧。"
3401-92 = "會長，有什麼讓您在意的事嗎？"
3401-93 = "不，沒有，沒什麼。"
3401-94 = "（……真奇怪。我認識的妃姬不是那種人啊……）"
3401-95 = "所以……你打算怎麼做，令女？"
3401-96 = "嗯？我打算……將這個消息分享給同為習武之人的同志。"
3401-97 = "畢竟不僅是山海經，即便放眼整個奇普托斯，修習武術的學生依舊寥寥無幾。"
3401-98 = "因此哪怕只是多了一個同志，也是件非常值得慶祝的事！"
3401-99 = "那麼，會長！我今天就先告辭了！"
3401-104 = "雖然說有幹勁是件好事……"
3401-108 = "算了，難得看令女這麼有精神，就隨他去吧！"
3401-109 = "不過妃姬他居然會……#n唔嗯……還是覺得有點奇怪。"
3401-110 = "但如果妃姬真的在鍛鍊功夫……"
3401-111 = "之後就做些點心偷偷送去給他吧！"
3401-114 = "那是真的嗎，部長？"
3401-115 = "當然！是我親眼見到的！"
3401-119 = "雖然為了避免被發現而保持了一段距離，也許有人會認為不夠精確……"
3401-120 = "不過我可是擁有能明察秋毫的雙眼！"
3401-121 = "那種姿態，那畫圓的手臂，以及向天伸展的動作！#n一切的一切……！"
3401-122 = "無疑是我們京劇部的「京劇舞蹈」！"
3401-123 = "京劇舞蹈……也就是為了練習與應用京劇動作而創造出的──"
3401-124 = "我們京劇部特有的舞蹈！"
3401-125 = "但是，部長。您不覺得有點奇怪嗎？#n門主大人為何會知道我們京劇部祕傳的「京劇舞蹈」呢？"
3401-126 = "不，這一點也不奇怪。你再仔細想想。畢竟……"
3401-130 = "門主大人是無所不知的！"
3401-135 = "說，說的也是！"
3401-136 = "不過即便是光滑清澈的玉石，也可能染上些許塵埃……"
3401-137 = "門主大人的動作，雖然確實出自京劇舞蹈……某些部分卻略顯美中不足。"
3401-138 = "因此！是時候輪到我們京劇部粉墨登場了！"
3401-139 = "有道理！聽完部長的話，我也覺得應該這麼做！"
3401-142 = "你聽說了嗎？我們的門主大人居然……"
3401-143 = "啊，你說那件事嗎？我也聽說了！#n話說要是被玄龍門的人發現，八成會挨罵吧……"
3401-144 = "可是你不覺得很厲害嗎？#n門主大人居然一大早就在練習那個……"
3401-145 = "也不是不能理解啦。#n或許門主大人也有許多立場之類的苦衷吧？"
3401-151 = "哎呀，你是武術研究部的成員對吧？#n有什麼事嗎？"
3401-152 = "啊，能碰巧在這裡遇見您真是太好了。"
3401-153 = "我想您應該比誰都清楚，有關門主大人的「那件事」……"
3401-154 = "所以即便只是暫時的也沒關係，您是否願意和我們武術研究部「合作」呢？"
3401-155 = "……"
3401-156 = "坦白說，我一直以來也受了武術研究部很多照顧。"
3401-157 = "好吧，這確實值得一試。#n反而是我該請你們幫忙才對。"
3401-158 = "為了修養和鍛鍊，請多多指教。"
3401-159 = "是！為了修養和鍛鍊！"
3401-160 = "除此之外，我還有一個請求……"
3401-161 = "您是否願意藉著這難得的機會，成為我們武術研究部的特邀成員呢……！"
3401-163 = "啊……這可能有點困難。#n真的很抱歉，但我現在光是商會的事就忙不過來了。"
3401-164 = "果然還是不行嗎……"
3401-167 = "大家都到齊了嗎？"
3401-171 = "是，部長！"
3401-173 = "這裡就是門主大人早上練習京劇舞蹈的白虎公園……"
3401-174 = "由於經常作為戶外京劇的表演場地……這裡對我們京劇部而言並不陌生。"
3401-175 = "然而即便是相同的地點，其意義也會根據立於此地之人與使用目的而有所改變！"
3401-176 = "所謂「欲窮千里目，更上一層樓」……"
3401-177 = "我們將在這裡……"
3401-178 = "向門主大人展示我們高雅的京劇舞蹈，藉此讚頌他那崇高的意志！"
3401-183 = "遵命，部長！"

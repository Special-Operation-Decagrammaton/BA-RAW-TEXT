[translation]
3401-1 = "A Slightly Special Morning in Shanhaijing 1"
3401-3 = "One, two, three, four..."
3401-15 = "Phew. At this hour, even White Tiger Park is deserted."
3401-16 = "Mm. It's the only time I can perform my morning stretches without being seen."
3401-25 = "Fufu. The movement wakes up my mind, and my body reaps the benefits as well."
3401-26 = "The freedom of operating without the constant surveillance of my bodyguards, or other attendants, is exhilarating as well."
3401-27 = "Although... I suppose it'd be pleasant to sleep in from time to time."
3401-28 = "..."
3401-29 = "Enough sentimental daydreams. I must return soon."
3401-36 = "Just now..."
3401-37 = "I hid, so I'd have a chance to confirm that I was really seeing what I was seeing!"
3401-41 = "Was the president...practicing kung fu?!"
3401-45 = "I, Urushibara Kaguya, have witnessed something unbelievable..."
3401-46 = "I was sure I must have been utterly mistaken, as I've heard not a whisper of rumor or gossip pertaining to this topic!"
3401-47 = "They say that no matter how far apart two souls are, you need only come to a mutual understanding to feel like old neighbors."
3401-51 = "And the president has finally understood our loyalty and passion for the Peking opera and is partaking herself!"
3401-54 = "Honestly, I never liked the people of Genryumon."
3401-55 = "They're loud, rude, and arrogant, and think they make all the rules..."
3401-59 = "...To be fair, they're a necessary evil, at times."
3401-60 = "But Madam has always been a bit of an exception. For starters, I can reason with her, and she shows mercy here and there."
3401-61 = "For THAT president to be secretly practicing kung fu...!"
3401-62 = "I'm so glad I didn't skip morning training. I knew there was a reason I woke up earlier than usual today, too!"
3401-63 = "In that case, I've gotta take the opportunity and go to President Rumi...!"
3401-67 = "Yeah, I can't lose this chance! I need to tell everyone. Okay, I'll start with our president! That's the best move!"
3401-73 = "...The Peking Opera Club has had to operate inconspicuously recently, due to...an unfortunate incident."
3401-74 = "Naturally, we never once questioned the president's decision!"
3401-75 = "But we feared deeply that we at the Peking Opera Club had lost her trust entirely, and we would never again happen upon another chance to prove our loyalty!"
3401-76 = "But, by practicing Peking opera dances herself, Madam has shown that, deep inside, she has not abandoned us at all!"
3401-77 = "How could one say that this is not the most exhilarating of news?"
3401-78 = "With this, the Peking Opera Club's budget will be set free! We shall put on the flashiest, most exquisite Peking opera performances yet! Yes!"
3401-79 = "The Peking Opera Club's overall atmosphere also happened to be a bit gloomy as of late, so I must spread this good news throughout the entire club!"
3401-86 = "So, Kisaki was practicing kung fu early in the morning?"
3401-87 = "That's right, President! For there to be someone, other than me, who appreciates the beauty of kung fu, and for it to be Madam President, of all people..."
3401-88 = "As a trainee, I can't help but be happy about this!"
3401-89 = "Um... That's uh..."
3401-90 = "..."
3401-91 = "Yeah. I suppose."
3401-92 = "Is something bothering you, President?"
3401-93 = "No, it's nothing."
3401-94 = "(It's just weird. The Kisaki I know isn't exactly the type to be gung-ho about kung fu.)"
3401-95 = "So... What's your plan, Reijo?"
3401-96 = "Hm? Well, uh... I think I should spread the news far and wide, to all the other trainees."
3401-97 = "The number of students who train in martial arts is really low, not only in Shanhaijing, but also throughout Kivotos as a whole."
3401-98 = "Having even one more person join us is something for all of us to gather around and celebrate!"
3401-99 = "That said, President! I'll be taking some time off today to address this!"
3401-104 = "It's nice to show enthusiasm and all, but..."
3401-108 = "Ah, well, it's a rare sight to see Reijo so pumped up."
3401-109 = "But, Kisaki, well... Seems a bit odd."
3401-110 = "I guess if Kisaki is actually secretly practicing kung fu..."
3401-111 = "...maybe I'll give her some secret encouragement, in the form of snacks!"
3401-114 = "Is that really true, President?"
3401-115 = "Of course! I saw it with my very own eyes!"
3401-119 = "I did keep my distance, as to not get caught, so some may question my testimony..."
3401-120 = "But I could see through the truth! With none other than my very own eyes!"
3401-121 = "That movement, her arm drawing an elegant circle, the postures pointing towards the sky! There can be no other conclusion! She was performing..."
3401-122 = "...the Peking Opera Club's \"Peking opera dance\" itself!"
3401-123 = "The Peking opera dance... The final culmination of all the Peking opera performance moves..."
3401-124 = "The Peking Opera Club's unique dance!"
3401-125 = "But President, isn't that kinda weird? How does Madam know about the club's secret dance? Considering it's a secret and all?"
3401-126 = "It isn't strange at all! The answer is perfectly obvious!"
3401-130 = "Madam knows everything!"
3401-135 = "When you put it that way, it totally makes sense!"
3401-136 = "But even the smoothest and purest of jades can have a flaw..."
3401-137 = "Madam's Peking opera dance, while undoubtedly emulating its beautiful flow, had some...unpolished and imperfect moves here and there."
3401-138 = "Therefore, this is the time for the Peking Opera Club to make their move!"
3401-139 = "I see! Hearing you say that really makes me feel like we should!"
3401-142 = "Did you hear? Did you hear? Madam has been—"
3401-143 = "Ah, that? Yeah. I heard too! Ah, we might get scolded by Genryumon members, if they hear us talking about it..."
3401-144 = "But isn't that incredible? THAT president, doing that kind of practice, and so early in the morning..."
3401-145 = "I kind of get it. After all, if people found it, it could cause her problems."
3401-151 = "Huh, aren't you Martial Arts Research Club members? What's going on?"
3401-152 = "Ah! What a coincidence! I'm glad we ran into you!"
3401-153 = "You probably know better than anyone, but it's about \"that\" regarding Madam..."
3401-154 = "Even if it's a temporary alliance, we were wondering if you'd want to collaborate with the Martial Arts Research Club!"
3401-155 = "..."
3401-156 = "Well, you've helped me out a lot in the past."
3401-157 = "Let's do it. Honestly, under the circumstances, I would've done the same thing."
3401-158 = "I'll be under your care, for discipline and training!"
3401-159 = "Yes! For discipline and training!"
3401-160 = "While we're on the topic..."
3401-161 = "Would you be interested in becoming an honorary member of the Martial Arts Research Club?"
3401-163 = "Ah...that might be a bit too much. I apologize. Promenade work keeps my schedule busy."
3401-164 = "I see..."
3401-167 = "Is everyone present?"
3401-171 = "Yes, President!"
3401-173 = "This is the White Tiger Park, where Madam comes to practice her Peking opera dance in the early hours of the morning."
3401-174 = "Naturally, us members of the Peking Opera Club are already very familiar with this place, since we often use it as an outdoor stage."
3401-175 = "It matters not if it's familiar to us! For the moment a different person takes the stage, its very existence changes!"
3401-176 = "They say that to reach high, you must first climb from low places."
3401-177 = "And so, from this very place..."
3401-178 = "We shall perform our sophisticated Peking opera dance for Madam! We shall honor her wishes!"
3401-183 = "We'll follow you anywhere, President!"

3401-73 = "3;카구야;11;……사실, 모종의 불미스러운 일로, 우리 경극부는 상당 기간 동안 자숙해야 하는 입장이 되기는 했죠.\n#3;em;…"
3401-74 = "3;카구야;12;문주님의 결정에 의문을 품는 것은 아닙니다."
3401-75 = "3;카구야;05;다만 한 가지 두려웠던 것은, 우리 경극부가 완전히 문주님의 신뢰를 잃어, 두 번 다시 충심을 증명할 기회를 얻지 못하게 되는 것이었으니……!\n#3;stiff"
3401-76 = "3;카구야;09;그러나 문주님께서 몸소, 이렇게 경극을 연습하는 것으로, 마음속으로는 결코 우리들을 저버리지 않으리라는 것을 보이셨으니!"
3401-77 = "3;카구야;07;이 어찌 경사라 하지 않을 수 있겠습니까!\n#3;em;[하트]\n#3;closeup"

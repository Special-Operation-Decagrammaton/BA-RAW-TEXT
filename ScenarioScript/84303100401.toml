[translation]
84303100401-6 = "หืม? มีเรื่องอะไรแล้วเหรอ?? เร็วจัง!!"
84303100401-7 = "ไม่ใช่ คุณเซอายังอยู่ข้างหน้าเราอยู่เลย รุ่นพี่..."
84303100401-9 = "ไม่เป็นไรหรอกค่ะ ฉันก็เริ่มจะคุ้นเคยกับความตื่นเต้นของคุณอาสึนะแล้วค่ะ"
84303100401-10 = "อ่า... อืม..."
84303100401-11 = "แต่แบบนั้นมันก็ใช่ว่าจะดีนะ..."

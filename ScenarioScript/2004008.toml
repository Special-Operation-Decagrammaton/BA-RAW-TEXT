[translation]
2004008-1 = "ซัตสึกิสั่นอยู่นะ"
2004008-3 = "สวัสดี ครู"
2004008-4 = "[s] \"สวัสดี ซัตสึกิ วันนี้ก็น่าจะงานยุ่งเลยละ\""
2004008-5 = "ฮุฮุ งานของชาเล่ต์ งานของหนึ่งในองค์กรที่สำคัญที่สุดในคิโวทอส..."
2004008-6 = "จะบอกว่างานนี้ทำให้ได้เชื่อมต่อกับข้อมูลลับที่คนธรรมดาทั่วไปเข้าถึงไม่ได้ ก็คงจะไม่เกินจริงน่ะนะ"
2004008-7 = "และเพราะอย่างนั้น เคียวโงคุ ซัตสึกิ หัวหน้าฝ่ายข่าวกรองแห่งเกเฮนน่าที่เป็นหนึ่งองค์กรที่สำคัญ#nที่สุดเหมือนกัน ก็เป็นบุคคลที่เหมาะสมกับการเข้าเวรที่สุดแล้ว"
2004008-8 = "ฉันจะวิเคราะห์ข้อมูลที่หาได้จากชาเล่ต์ให้ได้มากที่สุดเลย"
2004008-9 = "[s1] \"มีแค่งานเอกสารง่ายๆ น่า...\"\n[s2] \"แค่ช่วยงานเอกสารตรงนี้ก็พอแล้วละ\""
2004008-15 = "เอกสารกองโตเลยแฮะ"
2004008-16 = "คิดจะทดสอบความสามารถในการแยกแยะระหว่างหินกับหยกของฉันเหรอ?"
2004008-17 = "นอกจากการรวบรวมข้อมูลแล้ว การจำแนกและการวิเคราะห์ก็เป็นความสามารถที่หน่วยข่าวกรองต้อง#nมีด้วย"
2004008-18 = "งานแค่นี้ฉันทำเดี๋ยวเดียวก็เสร็จน่า"
2004008-20 = "(ถ้ามันเป็นงานที่ทำเสร็จได้เร็วๆ ตามที่ต้องการก็คงจะดีหรอก...)"
2004008-22 = "(สุดท้ายก็เสร็จงานตอนมืดค่ำแล้ว)"
2004008-25 = "ว่าไงล่ะ ครู? ความสามารถในการทำงานของฉันน่ะ เสร็จไวในพริบตาเลยใช่มั้ยล่ะ?"
2004008-26 = "[s] \"นั่นสินะ... ทำได้ดีเลยละ\""
2004008-27 = "ฉันรู้สึกเป็นเกียรติจังที่ได้รับโอกาสในการแสดงทักษะในฐานะผู้จัดการข้อมูลที่ยอดเยี่ยม"
2004008-28 = "ต่อไปตอนถึงเวรของฉันอีก ครูก็วางใจได้เลย ฮุฮุ"
2004008-29 = "อืม ท้องชักจะหิวแล้วสิ... ครูมีอะไรกินมั้ย..."
2004008-35 = "เอ๋? ทำไมจู่ๆ..."
2004008-46 = "...!!"
2004008-47 = "[ns] \"อ๊ะ ไฟดับเฉยเลย...\""
2004008-49 = "[ns] \"ไฟดับนี่นา ดีนะที่เซฟงานและจัดเอกสารเสร็จหมดแล้ว\""
2004008-50 = "......"
2004008-51 = "[s] \"ซัตสึกิ...?\""
2004008-52 = "......"
2004008-53 = "[s3] \"ซัตสึกิ?\"\n[s4] \"เป็นอะไรหรือเปล่า?\""
2004008-56 = "...!"
2004008-57 = "ฉันแค่ตกใจที่จู่ๆ มันก็มืดไปน่ะ"
2004008-58 = "ไฟมาดับอะไรตอนนี้เนี่ย แบบนี้ก็ยุ่งน่ะสิ..."
2004008-59 = "[s] \"นั่นสินะ ต้องเลิกงานแล้วแท้ๆ...\""
2004008-64 = "!!!"
2004008-70 = "[ns] \"อ๊ะ ลมพัดแรงจนหน้าต่างเปิดเองเลย...\""
2004008-74 = "[ns] \"ซะ... ซัตสึกิ?!\""
2004008-76 = "อึก ฉันแค่ตกใจที่จู่ๆ ก็มีเสียงดังน่ะ ก็แค่นั้นเอง!"
2004008-80 = "ฮู่ว ฮู่ว... นี่ ครู อยู่ตรงไหนน่ะ? มันมืดไปหมด ฉันมองไม่เห็นเลย"
2004008-81 = "ตรงนั้นหรือเปล่าน่ะ... รอเดี๋ยวนะ ฉันจะไปทางนั้นเอง"
2004008-85 = "ส่งเสียงเรื่อยๆ นะ ฉันจะได้รู้ว่าครูอยู่ตรงไหน"
2004008-86 = "จะผิวปาก ร้องเพลงเด็ก หรือเต้นแท็ปก็ได้ ทำอะไรก็ได้ ขอให้มีเสียงก็พอ..."
2004008-87 = "[s] \"แต่ว่า... ครูว่าแค่อยู่เฉยๆ ก็พอ...\""
2004008-94 = "[ns] \"อ๊ะ ลมพัดแรงจนของบนโต๊ะปลิวเลย...\""
2004008-98 = "[ns] \"ซัตสึกิ โอเคหรือเปล่า...?\""
2004008-100 = "ฉันโอเค ครู แต่ฉันว่าที่นี่อันตรายแล้วละ มันมืดเกินไป..."
2004008-101 = "อื้อ แบบนี้ละอันตราย ครู ห้ามหนีฉันไปไหนนะ ห้ามเด็ดขาดเลย ต้องอยู่ข้างๆ ฉันล่ะ"
2004008-105 = "[ns] \"ซัตสึกิ อย่าบอกนะว่า...\""
2004008-107 = "[ns] \"ซัตสึกิ... กลัวเหรอ?\""
2004008-108 = "ครูเป็นคนอย่างนี้สินะ..."
2004008-109 = "วิเคราะห์จุดอ่อนของฉันได้ในพริบตาเลย"
2004008-110 = "[s] \"เรื่องแบบนี้ แค่ดูก็รู้แล้วหรือเปล่า...\""
2004008-111 = "ต่อให้ปฏิเสธไปก็คงเปล่าประโยชน์สินะ"
2004008-112 = "ใช่แล้วละ... ฉันไม่ชอบที่มืดกับอะไรที่น่ากลัว ไม่ชอบเอามากๆ เลย"
2004008-113 = "อืม เหมือนกับสถานการณ์ตอนนี้เลยละ"
2004008-114 = "ถ้าไม่มีครูอยู่ด้วยละก็ ฉันคงสติกระเจิงไปแล้วก็ได้..."
2004008-118 = "เมื่อไรไฟจะมานะ...?"
2004008-122 = "ไม่รู้งั้นเหรอ? ทำไมล่ะ? ทำไมถึงไม่รู้? นี่เป็นอาคารของชาเล่ต์ไม่ใช่เหรอ? อย่างน้อยเรื่องแบบนี้ครู#nต้องรู้สิ"
2004008-123 = "อึก... ฉันไม่ชอบเลย ไม่ชอบที่มืดๆ แบบนี้..."
2004008-124 = "[s] \"ก็ได้ งั้นเราก็อยู่ด้วยกันจนกว่าไฟจะมานะ\""
2004008-125 = "อื้อ ไว้ขยับตัวตอนมองเห็นแล้วดีกว่า"
2004008-126 = "เอาละ มาทางนี้สิ ครู มาอยู่ข้างๆ ฉันไว้"
2004008-128 = "(คุณครูชวนซัตสึกิคุยนู่นนี่และจับมือเธอไว้ตลอดจนกว่าจะหายตัวสั่น)"
2004008-132 = "!!"
2004008-140 = "[ns] \"โอ้ ไฟมาแล้ว\""
2004008-141 = "ฮู่ว... ในที่สุด..."
2004008-145 = "เอาละ ครู งั้นเราก็เลิกงานกลับบ้านกันเถอะ"
2004008-146 = "[s5] \"กลับมามีเรี่ยวแรงเหมือนเดิมแล้วแฮะ...\"\n[s6] \"อื้อ เลิกงานกันเถอะ!\""
2004008-152 = "จะว่าไป วันนี้ฉันโดนครูจับจุดอ่อนได้อีกอย่างแล้วนะ"
2004008-153 = "พอเจอครูละก็ ไม่มีอะไรเป็นไปตามแผนเลย"
2004008-154 = "แต่ก็ไม่เป็นไรหรอก"
2004008-155 = "เพราะครูที่ฉันรู้จักคงไม่เอาจุดอ่อนของฉันมาเล่นงานฉันหรอก ใช่มั้ยล่ะ?"
2004008-156 = "[s] \"อื้อ ครูไม่ใช้ประโยชน์จากจุดอ่อนของนักเรียนหรอก\""
2004008-157 = "ฮุฮุ กะไว้แล้วว่าครูต้องพูดแบบนี้"
2004008-158 = "ตรงกันข้าม ถ้าเป็นฉันก็คงใช้ประโยชน์จากจุดอ่อนนั้นอย่างแข็งขันเลยละ"
2004008-159 = "[s] \"ไม่ให้คนอื่นทำ แต่ตัวเองทำได้เนี่ยนะ...\""
2004008-160 = "เอาเถอะ ในเมื่อฉันก็ได้คำตอบที่แน่นอนแล้ว..."
2004008-165 = "เอาละ ครู งั้นเราไปหาอะไรกินกันมั้ย? ฉันหิวแล้วน่ะ"
2004008-167 = "(หลังจากกินอาหารเย็นกับซัตสึกิอย่างเอร็ดอร่อย คุณครูก็เดินไปส่งเธอถึงหอพัก)"

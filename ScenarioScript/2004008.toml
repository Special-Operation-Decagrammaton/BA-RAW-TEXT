[translation]
2004008-1 = "Satsuki is Shaking"
2004008-3 = "Hi, Sensei."
2004008-4 = "[s] \"Hi, Satsuki. It's another busy day for me, I'm afraid.\""
2004008-5 = "Heehee, of course. You work at Schale, one of the most important institutions in Kivotos..."
2004008-6 = "...a veritable treasure trove of top secret information, hidden from the masses."
2004008-7 = "And as head of the Intelligence Committee, one of the most important organizations in Gehenna, I'm well suited to be a Student Rep here."
2004008-8 = "And through your work, I'll gather all the information I can."
2004008-9 = "[s1] \"It's just a bunch of boring paperwork...\"\n[s2] \"Here. I'm counting on you.\""
2004008-15 = "This is...quite a pile you've got here."
2004008-16 = "Are you testing my ability to pick out what's important?"
2004008-17 = "Well, that makes sense. The Intelligence Committee has to be able to find needles in a haystack."
2004008-18 = "I'll be done with this in the blink of an eye."
2004008-20 = "If only that kind of enthusiasm could make this job go faster."
2004008-22 = "We didn't finish until late in the night."
2004008-25 = "How'd I do, Sensei? I got it all done for you in no time at all, right?"
2004008-26 = "[s] \"Yeah... Great work.\""
2004008-27 = "Always a pleasure to show off my information processing skills."
2004008-28 = "Whenever I'm your Student Rep, you know the work is in good, swift hands. Heehee."
2004008-29 = "Hmm, I'm hungry. Sensei, do you want to go get a—"
2004008-35 = "Oh, what's going on?"
2004008-46 = "...!"
2004008-47 = "[ns] \"A power outage.\""
2004008-49 = "[ns] \"It's all right. The work's done. I saved everything.\""
2004008-50 = "..."
2004008-51 = "[s] \"Satsuki...?!\""
2004008-52 = "..."
2004008-53 = "[s3] \"Satsuki?\"\n[s4] \"Are you okay?\""
2004008-56 = "*gasp*"
2004008-57 = "I'm fine. I just...wasn't expecting it to get so dark all of a sudden."
2004008-58 = "A power outage at this hour, that's not good..."
2004008-59 = "[s] \"Yeah. It's about time to clock out...\""
2004008-64 = "...!"
2004008-70 = "[ns] \"Ah, the wind must've blown that window open.\""
2004008-74 = "[ns] \"S-Satsuki?!\""
2004008-76 = "I got startled by the loud noise, okay?"
2004008-80 = "*inhale* *exhale* Sensei? Where are you? I can't see you. It's too dark..."
2004008-81 = "...You're over there? Okay. Don't move. I'm coming your way."
2004008-85 = "Just keep making noise so I know where you are."
2004008-86 = "Whistle, sing, tap dance, whatever."
2004008-87 = "[s] \"Okay, I'm going to stay still, and...\""
2004008-94 = "[ns] \"Ah crud, the wind blew all my papers off the desk...\""
2004008-98 = "[ns] \"Satsuki, are you okay...?\""
2004008-100 = "I'm fine. This place gets DANGEROUS when it's dark."
2004008-101 = "VERY dangerous. Don't go off alone, Sensei. You stay right next to me."
2004008-105 = "[ns] \"Satsuki, are you, um...\""
2004008-107 = "[ns] \"Are you scared?\""
2004008-108 = "*sigh* Once again, you impress me, Sensei..."
2004008-109 = "You've found all my weaknesses."
2004008-110 = "[s] \"It wasn't hard...\""
2004008-111 = "Well, no use denying it now."
2004008-112 = "I am scared. And I hate scary things, and I REALLY despise the dark."
2004008-113 = "So in a situation like this..."
2004008-114 = "If you weren't here, I... I might have fainted..."
2004008-118 = "Is it going to be dark for much longer?"
2004008-122 = "...What do you mean, you're not sure? This is Schale! You don't know how your own office works?"
2004008-123 = "Ugh... I hate this so much..."
2004008-124 = "[s] \"All right. We'll stay together until the power comes back.\""
2004008-125 = "Right. And then, once it gets brighter, we can move."
2004008-126 = "Now you come here. Stay right next to me."
2004008-128 = "I quietly held her hand until she stopped shaking."
2004008-132 = "!!"
2004008-140 = "[ns] \"Oh good, there it goes.\""
2004008-141 = "*sigh* Finally..."
2004008-145 = "All right then, Sensei. Shall we clock out?"
2004008-146 = "[s5] \"You bounced right back from that.\"\n[s6] \"Yeah, let's clock out!\""
2004008-152 = "So you found another one of my weaknesses today."
2004008-153 = "Nothing ever goes as planned when I'm around you."
2004008-154 = "But no worries."
2004008-155 = "The Sensei I know would never exploit any of my weakness. Right?"
2004008-156 = "[s] \"Right. I would never want to do that, for any student.\""
2004008-157 = "Fufu, I thought you might say that."
2004008-158 = "Of course, I can't promise the same, if our roles are ever reversed."
2004008-159 = "[s] \"Is that how it goes...?\""
2004008-160 = "Well, now that we've established all that..."
2004008-165 = "You want to go get a bite to eat? I'm really hungry."
2004008-167 = "After a delicious meal with Satsuki, I escorted her to the dorms."

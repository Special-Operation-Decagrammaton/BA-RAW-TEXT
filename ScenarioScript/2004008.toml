[translation]
2004008-1 = "皐月在抖"
2004008-3 = "你好，老師。"
2004008-4 = "[s]「你好，皐月。今天應該也會很忙哦。」"
2004008-5 = "呵呵，夏萊作為奇普托斯最重要的機構之一，這裡的業務……"
2004008-6 = "和一般人接觸不到的機密情報，可說是息息相關。"
2004008-7 = "從這層意義上來說，同樣身為重要機構──#n也就是格黑娜情報部負責人的我京極皐月，就是最適合擔任值日生的人才。"
2004008-8 = "我會盡可能收集一切能從夏萊獲得的情報的。"
2004008-9 = "[s1]「這只是簡單的文書工作而已……」\n[s2]「來，麻煩你了。」"
2004008-15 = "量還真多呢。"
2004008-16 = "是想測試我判別重要程度的能力嗎？"
2004008-17 = "除了蒐集情報之外，進行分類與分析也是情報部應該具備的能力。"
2004008-18 = "這種程度我會迅速完成的。"
2004008-20 = "（雖然期許他能憑藉這股幹勁迅速完成工作……）"
2004008-22 = "（結果工作完成時，卻已經接近晚上了）"
2004008-25 = "我的工作能力怎麼樣啊，老師？#n轉眼間就完成了對吧？"
2004008-26 = "[s]「是啊……辛苦你了。」"
2004008-27 = "身為一名優秀的情報處理員，能有機會展現才能真讓人開心。"
2004008-28 = "今後我當值日生的日子，老師就放一百二十個心吧。唔呵呵。"
2004008-29 = "那麼，我肚子也有點餓了……#n老師，有沒有什麼吃的……"
2004008-35 = "嗯？怎麼突然……"
2004008-46 = "……！！"
2004008-47 = "[ns]「啊，停電了……」"
2004008-49 = "[ns]「幸好工作已經做完，而且也都保存好了。」"
2004008-50 = "……"
2004008-51 = "[s]「皐月……？」"
2004008-52 = "……"
2004008-53 = "[s3]「皐月？」\n[s4]「你還好嗎？」"
2004008-56 = "……！"
2004008-57 = "只是突然變黑，所以嚇了一跳而已。"
2004008-58 = "居然在這種時候停電，真麻煩……"
2004008-59 = "[s]「就是說呀，現在都該下班了……」"
2004008-64 = "！！！"
2004008-70 = "[ns]「啊，風大到窗戶都被吹開了呢……」"
2004008-74 = "[ns]「皐，皐月！？」"
2004008-76 = "唔……只是突然聽見那麼大的聲音，害我嚇到了而已！"
2004008-80 = "呼，呼……那個，老師現在人在哪裡？#n這裡太暗了我看不到。"
2004008-81 = "……是那邊嗎？#n……等我一下，我馬上過去。"
2004008-85 = "麻煩你持續發出一些聲音，這樣我才能知道老師的位置。"
2004008-86 = "不管要吹口哨、唱兒歌，或者踢踏舞都可以。#n只要有聲音就行了……"
2004008-87 = "[s]「沒關係……你待在原地就……」"
2004008-94 = "[ns]「啊，剛才風吹進來，桌上的東西都……」"
2004008-98 = "[ns]「皐月，你還好嗎……？」"
2004008-100 = "我沒事，老師。#n這裡還真危險呢。暗得要命……"
2004008-101 = "嗯，總之這裡很危險，老師。所以請不要離開我。#n一定，一定要緊緊靠著我哦。"
2004008-105 = "[ns]「皐月，難道說……」"
2004008-107 = "[ns]「你怕黑嗎？」"
2004008-108 = "不愧是老師……"
2004008-109 = "居然能瞬間看穿我的弱點。"
2004008-110 = "[s]「那種事一看就知道了……」"
2004008-111 = "在這種情況下，就算否認也沒有意義吧。"
2004008-112 = "沒錯……我非常非常討厭黑暗和恐怖的東西。"
2004008-113 = "……就像現在這種情況。"
2004008-114 = "如果老師不在的話，我恐怕會昏過去吧……"
2004008-118 = "這場停電會持續到什麼時候呢……？"
2004008-122 = "你說你也不知道……？#n為什麼？怎麼會？這不是夏萊的設施嗎？這種程度的事情，老師應該要知道吧？"
2004008-123 = "唔唔……討厭，這裡這麼黑……"
2004008-124 = "[s]「那我們就待在一起，直到電力恢復吧。」"
2004008-125 = "嗯，還是等亮了之後再行動比較好。"
2004008-126 = "再靠過來一點吧，老師。#n一定要緊緊靠在我旁邊哦。"
2004008-128 = "（為了讓皐月不再發抖，決定握住他的手並不斷聊著各種話題）"
2004008-132 = "！！"
2004008-140 = "[ns]「哦哦，燈亮了。」"
2004008-141 = "呼……終於……"
2004008-145 = "好了，老師。那我們回去吧？"
2004008-146 = "[s5]「精神恢復得真快……」\n[s6]「嗯，下班吧！」"
2004008-152 = "話說今天又被老師發現了一個弱點呢。"
2004008-153 = "總覺得每次遇到老師，事情似乎都不會按計劃進行。"
2004008-154 = "不過沒關係。"
2004008-155 = "依照我對老師的了解，你並不是會惡意利用我弱點的人……沒錯吧？"
2004008-156 = "[s]「嗯，我不希望利用學生的弱點。」"
2004008-157 = "呵呵，我就知道你會這麼說。"
2004008-158 = "不過如果情況相反，我倒是會非常積極地利用就是了。"
2004008-159 = "[s]「咦，怎麼這樣……」"
2004008-160 = "好了，既然都聽到了確切的回答……"
2004008-165 = "來吧，老師。#n我肚子餓了，要不要一起去吃點東西呀？"
2004008-167 = "（和皐月一起享用美味的晚餐之後，將他送回了宿舍）"

2000405-53 = "[ns] \"아이스 바 막대에 뭔가 쓰여있는데…….\""
2000405-54 = "3;마시로 수영복ND;02;아, 드디어 발견하셨군요. 그건 당첨 막대입니다.\n#3;em;[반응]\n#3;a"
2000405-55 = "3;마시로 수영복ND;01;아이스 캔디 중에는 당첨 막대를 통해 추가 아이스크림을 제공하는 상품이 있지 않습니까?"
2000405-56 = "3;마시로 수영복ND;99;이를 참고해서 저도 아이스 캔디 안에 특별한 당첨 메시지를 적어 두었습니다.\n#3;em;…"
2000405-57 = "3;마시로 수영복ND;01;만약 선생님께서 당첨 막대를 뽑으신다면 제가 준비한 특별 상품을 드리겠습니다."
2000405-58 = "[s3] \"그거 기대되는걸.\"\n[s4] \"어떤 상품이 당첨되었으려나…….\""

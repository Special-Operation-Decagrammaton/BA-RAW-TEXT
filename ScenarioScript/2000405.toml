[translation]
2000405-1 = "防止中暑對策"
2000405-2 = "無為濱．海水浴場"
2000405-3 = "呼～流了一身汗，真是舒暢。"
2000405-4 = "就這樣衝向涼爽的大海，一定會很舒服吧。"
2000405-5 = "但腿部的肌肉還沒完全舒緩，總之先再跑一輪吧。"
2000405-6 = "[s1] 「還沒游泳就快累死了……」\n[s2] 「『總之』是什麼意思……？」"
2000405-7 = "準備運動還沒結束唷。"
2000405-8 = "準備運動還沒結束唷。"
2000405-9 = "要是沒有確實做好暖身，下水之後腳抽筋可就不妙了。"
2000405-10 = "[s] 「我的體力已經先不妙了……感覺快中暑了……」"
2000405-11 = "原來如此。老師請放心。這次我有做準備了……"
2000405-14 = "[ns]「……這是？」"
2000405-15 = "這是防止中暑的對策。"
2000405-16 = "有冰棒和清涼的飲料……我已經在冰桶裡裝滿了能冷卻身體的各種涼品。"
2000405-17 = "訓練過程中有需要的話，請隨時告訴我。"
2000405-18 = "[s] 「可以現在馬上跟你要嗎……？」"
2000405-19 = "真，真的已經這麼嚴重了嗎……？"
2000405-20 = "不過也是，今天確實比平常更熱一點……"
2000405-24 = "那麼雖然早了點，我們一起邊吃冰棒邊休息吧。"
2000405-27 = "― 老師吃冰棒時，是咬著吃的那派嗎？[wa:2080] "
2000405-29 = "― 還是舔著吃的那派呢？[wa:710] "
2000405-32 = "― 我是，慢慢舔著吃的那派。[wa:2580] "
2000405-34 = "― 因為這樣，才能長時間享受冰棒的味道。[wa:2640] "
2000405-37 = "― 哈呣……舔……舔……[wa:3940] "
2000405-40 = "― ……什麼？吃的方式有點……？[wa:3150] "
2000405-43 = "― 在我看來，一如往常啊……[wa:1750] "
2000405-45 = "― 有什麼奇怪的嗎？[wa:540] "
2000405-48 = "― ……老師？總覺得你又[wa:2750] "
2000405-50 = "― 露出了奇怪的表情……[wa:1110] "
2000405-53 = "[ns] 「咦？冰棒的木片上有寫東西……」"
2000405-54 = "啊，代表老師「中獎」了。"
2000405-55 = "有些店家的冰棒也會有這種設計對吧？"
2000405-56 = "我就模仿他們，在製作冰棒的時候選了幾個木片寫上中獎訊息。"
2000405-57 = "根據「中獎」的類型，還能得到不同的特殊獎品唷。"
2000405-58 = "[s3] 「好耶！」\n[s4] 「還有種類呀？那我這是什麼呢？」"
2000405-63 = "我看看……"
2000405-64 = "恭喜！老師獲得特別獎「再來一組！特別訓練計畫」！"
2000405-65 = "[s] 「訓練！？這真的是有中獎！？」"
2000405-66 = "如同字面上的意思，能夠接受我「特別」設計的訓練計畫。中大獎耶！"
2000405-67 = "而且和其他獎項不同，只有這跟木片是特別獎…"
2000405-68 = "你的運氣真好。老師。"
2000405-69 = "[s] 全力逃跑"
2000405-70 = "啊，老師等一下！獎品只能在當天兌換唷！"
2000405-71 = "既然已經休息過了，那就先從這個「特別訓練計畫」一起開始吧！"
2000405-73 = "（後來便和麻白一起做了激烈的運動，完全沒力氣游泳了……）"

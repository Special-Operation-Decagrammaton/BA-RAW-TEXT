[translation]
2000405-1 = "Preventing Heatstroke"
2000405-2 = "Muigahama Beach"
2000405-3 = "It feels nice to work up a sweat before swimming."
2000405-4 = "It'll feel even better once I jump into the cool water."
2000405-5 = "Though I think our leg muscles could use one more warm-up set."
2000405-6 = "[s1] \"I'm already exhausted and we haven't even started swimming...\"\n[s2] \"How long are we gonna repeat this exercise?\""
2000405-7 = "What? But I feel like I'm just getting started."
2000405-8 = "What? But I feel like I'm just getting started."
2000405-9 = "You have to warm up your limbs completely to prevent cramping in the water."
2000405-10 = "[s] \"I feel another heat stroke coming on...\""
2000405-11 = "Don't worry. I took precautions this time."
2000405-14 = "[ns] \"Wait, is that...?\""
2000405-15 = "Measures to prevent heat stroke."
2000405-16 = "Popsicles, sodas... This cooler is full of things that can cool you down at a moment's notice."
2000405-17 = "Let me know if you need to take a break and have some ice cream once we begin our training."
2000405-18 = "[s] \"I think I need some right now...\""
2000405-19 = "You do? But it hasn't even been an hour yet."
2000405-20 = "I suppose it is a little hotter than usual today."
2000405-24 = "It's early, but shall we take a break and enjoy some popsicles?"
2000405-27 = "― Sensei, how do you like to enjoy a popsicle?[wa:960] "
2000405-29 = "― Do you prefer to lick it?[wa:110] "
2000405-32 = "― I prefer to  let mine melt first.[wa:1740] "
2000405-34 = "― It's easier to enjoy the flavor for longer.[wa:1640] "
2000405-37 = "― Mmm. *lick* *lick*[wa:3620] "
2000405-40 = "― What? Is there something wrong with how I'm eating?[wa:1670] "
2000405-43 = "― I think that's pretty normal.[wa:1070] "
2000405-45 = "― Is it strange?"
2000405-48 = "― Sensei... You're making[wa:2230] "
2000405-50 = "― a strange face again...[wa:590] "
2000405-53 = "[ns] \"There's something written on the popsicle stick\""
2000405-54 = "So you noticed. That means you win."
2000405-55 = "Did you know that some popsicles have prizes like that written on their sticks?"
2000405-56 = "That inspired me to write a message on this one I made myself."
2000405-57 = "You get a special prize since you found the winning stick."
2000405-58 = "[s3] \"How exciting.\"\n[s4] \"Oh, boy, I wonder what my prize is...\""
2000405-63 = "Let's see. It says..."
2000405-64 = "\"Congratulations! You have won One More Set of Special Exercises!\""
2000405-65 = "[s] \"What kind of prize is that?!\""
2000405-66 = "Exactly what it says. You've won a ticket for the special exercises I've prepared."
2000405-67 = "I can't believe you won it on your very first try."
2000405-68 = "You're very fortunate, Sensei."
2000405-69 = "[s] Run away."
2000405-70 = "You can't run away, Sensei! The winning ticket expires today!"
2000405-71 = "Let's do some special exercises now that we're done with our popsicles."
2000405-73 = "I became exhausted from doing Mashiro's intense warm-up exercises and eventually gave up on swimming."

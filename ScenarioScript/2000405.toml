2000405-64 = "3;마시로 수영복ND;03;축하합니다! <특별 체조 훈련 1세트 더!>에 당첨되셨군요!\n#3;closeup\n#3;em;[반짝]\n#3;jump"
2000405-65 = "[s] \"그게 뭐야!\""
2000405-66 = "3;마시로 수영복ND;02;<특별 체조 훈련 1세트 더!>는 제가 준비한 특별한 체조 훈련을 받으실 수 있는 당첨권입니다.\n#3;em;[반응]"
2000405-67 = "3;마시로 수영복ND;01;준비한 아이스 캔디 중 단 한 개에만 적어 둔 당첨 메시지인데, 거기에 당첨되시다니……"
2000405-68 = "3;마시로 수영복ND;03;운이 좋으시군요. 선생님.\n#3;em;[음표]"
2000405-69 = "[s] 도망친다."
2000405-70 = "3;마시로 수영복ND;05;도망치시면 안 됩니다, 선생님! 당첨권의 유효기간은 오늘까지라고요!\n#3;hophop"
2000405-71 = "3;마시로 수영복ND;03;자. 그럼 아이스 캔디도 다 먹었으니, 함께 특별 체조 훈련을 하도록 하죠!\n#3;greeting\n#3;em;[반짝]"
2000405-72 = "#all;hide"
2000405-73 = "#na;(이후, 마시로와 함께 격렬한 준비 운동을 하느라 지쳐 결국 수영은 포기했다…….)"

2000405-1 = "#title;열사병 방지 대책"
2000405-2 = "#place;무이가하마 해수욕장"
2000405-3 = "3;마시로 수영복ND;03;하아~ 수영을 하기 전에 기분 좋게 땀을 흘리니 상쾌하네요.\n#3;a\n#3;em;[반짝]"
2000405-4 = "3;마시로 수영복ND;99;이대로 시원한 바닷물에 뛰어든다면 분명 기분 좋겠죠~."
2000405-5 = "3;마시로 수영복ND;02;하지만 아직 다리 근육이 완전히 풀리지 않은 것 같으니, 한 세트만 더 뛰어볼까요?\n#3;em;[반응]"
2000405-6 = "[s1] \"수영을 하기도 전에 지쳤어…….\"\n[s2] \"언제까지 계속 체조만 반복할 셈이야?\""
2000405-7 = "3;마시로 수영복ND;01;네? 아직 준비 운동은 끝나지 않았는 걸요?"
2000405-8 = "3;마시로 수영복ND;01;네? 아직 준비 운동은 끝나지 않았는 걸요?"
2000405-9 = "3;마시로 수영복ND;05;팔 다리를 완벽하게 풀어 두어야 물에 들어갔을 때 쥐가 나지 않는다고요.\n#3;em;[반응]"
2000405-10 = "[s] \"이러다가 또 열사병으로 쓰러지겠어…….\""
2000405-11 = "3;마시로 수영복ND;03;걱정 마시길. 저번처럼 열사병으로 쓰러지는 일이 발생하지 않도록 이번에는 준비를 철저히 해 왔거든요.\n#3;em;[음표]"

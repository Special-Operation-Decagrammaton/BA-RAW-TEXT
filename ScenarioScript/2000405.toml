[translation]
2000405-1 = "วิธีป้องกันโรคลมแดด"
2000405-2 = "ชายหาดมูอิกาฮามะ"
2000405-3 = "ฮื้มม~ ได้เสียเหงื่อก่อนว่ายแล้วสดชื่นจังเลยค่ะ"
2000405-4 = "ถ้าได้กระโดดลงไปในน้ำทะเลเย็นๆ ตอนนี้เลยต้องรู้สึกดีแน่ๆ~"
2000405-5 = "แต่ว่ากล้ามเนื้อที่ขายังไม่คลายตัวดีเลย ไปวิ่งสักหนึ่งรอบดีมั้ยคะ?"
2000405-6 = "[s1] \"ครูเหนื่อยตั้งแต่ก่อนว่ายน้ำแล้ว...\"\n[s2] \"จะกายบริหารไปถึงเมื่อไหร่น่ะ?\""
2000405-7 = "คะ? แต่เรายังวอร์มร่างกายไม่เสร็จเลยนะคะ?"
2000405-8 = "คะ? แต่เรายังวอร์มร่างกายไม่เสร็จเลยนะคะ?"
2000405-9 = "ต้องคลายกล้ามเนื้อแขนขาก่อนสิคะ เวลาลงไปในทะเลจะได้ไม่เป็นตะคริว"
2000405-10 = "[s] \"เดี๋ยวก็เป็นลมแดดไปอีกหรอก...\""
2000405-11 = "ไม่ต้องเป็นห่วงหรอกค่ะ รอบนี้ฉันเตรียมตัวมาอย่างดีแล้ว รับรองว่าไม่เป็นลมแดดไปเหมือนครั้งที่แล้ว#nหรอกค่ะ"
2000405-14 = "[ns] \"นี่มัน...?\""
2000405-15 = "วิธีป้องกันโรคลมแดดไงคะ"
2000405-16 = "ฉันเตรียมของกินเย็นๆ ที่จะทำให้ร่างกายสดชื่นมาเต็มกระติกน้ำแข็งเลยละค่ะ ทั้งไอติมแท่ง ทั้งน้ำ#nอัดลม! "
2000405-17 = "ถ้าคุณครูอยากทานน้ำแข็งหรือไอติมระหว่างการฝึกก็บอกฉันนะคะ"
2000405-18 = "[s] \"ขอตอนนี้เลยได้มั้ย...\""
2000405-19 = "แต่เราฝึกยังไม่ถึงชั่วโมงเลยนะคะ?"
2000405-20 = "ถึงวันนี้จะอากาศร้อนกว่าปกติก็เถอะ..."
2000405-24 = "ถึงจะถือว่าเร็วไปหน่อย... แต่เรามาพักกินไอติมแท่งกันก่อนดีมั้ยคะ?"
2000405-27 = "― ปกติคุณครูกัดไอติมเป็นคำแล้วค่อยกินรึเปล่าคะ?[wa:920] "
2000405-29 = "― หรือว่าค่อยๆ เลียให้ละลายคะ?[wa:10] "
2000405-32 = "― ส่วนฉันน่ะ ชอบเลียให้ละลายอย่างช้าๆ ค่ะ[wa:1500] "
2000405-34 = "― ถ้ากินแบบนั้นจะลิ้มรสความอร่อยของไอติมได้นานขึ้นค่ะ[wa:1320] "
2000405-37 = "― ง่ำ... แผล็บ แผล็บ[wa:3620] "
2000405-40 = "― เอ๋...? วิธีกินของฉัน  มันแปลกงั้นเหรอคะ?[wa:2070] "
2000405-43 = "― ฉันคิดว่า... มันธรรมดานะคะ...[wa:1070] "
2000405-45 = "― แบบนี้มันแปลกเหรอคะ?[wa:60] "
2000405-48 = "― ทำไม...คุณครูถึง...[wa:2390] "
2000405-50 = "― ทำหน้าตา มีพิรุธ แบบนั้นล่ะคะ?[wa:310] "
2000405-53 = "[ns] \"มีอะไรเขียนอยู่ที่แท่งไอติมด้วย...\""
2000405-54 = "ว้าว ในที่สุดก็เจอแล้ว นี่คือไม้ที่ถูกรางวัลค่ะ!"
2000405-55 = "ปกติไอติมแท่งก็จะมีแท่งที่มีรางวัลสุ่มอยู่ด้วยใช่มั้ยล่ะคะ"
2000405-56 = "ฉันเอาไอเดียนี้มาใช้ แล้วก็เขียนข้อความพิเศษไว้บนแท่งไอติมค่ะ"
2000405-57 = "ถ้าคุณครูได้ไม้ที่ถูกรางวัล ฉันจะให้รางวัลพิเศษที่เตรียมมาค่ะ"
2000405-58 = "[s3] \"อยากรู้จังว่าคืออะไร\"\n[s4] \"ของพิเศษที่ว่าคืออะไรน่ะ...\""
2000405-63 = "ไหนขอดูหน่อยค่ะ... รางวัลคือ..."
2000405-64 = "ยินดีด้วยค่ะ! คุณครูได้รับรางวัล <ฝึกกายบริหารพิเศษเพิ่มอีก 1 เซ็ต!> ค่ะ!"
2000405-65 = "[s] \"รางวัลอะไรเนี่ย!\""
2000405-66 = "<ฝึกกายบริหารพิเศษเพิ่มอีก 1 เซ็ต!> คือบัตรกำนัลออกกำลังกายสุดพิเศษที่ฉันเตรียมไว้ค่ะ!"
2000405-67 = "นี่ฉันเตรียมไม้ที่ถูกรางวัลไว้แท่งเดียวเองนะคะ..."
2000405-68 = "คุณครูดวงดีจังเลยที่หยิบถูกแท่ง"
2000405-69 = "[s] วิ่งหนี"
2000405-70 = "อย่าหนีสิคะคุณครู! บัตรกำนัลหมดอายุวันนี้นะคะ!"
2000405-71 = "เอาละ ไหนๆ ก็กินไอติมแท่งหมดแล้ว เรามาออกกำลังแบบพิเศษด้วยกันเถอะค่ะ!"
2000405-73 = "(จากนั้นคุณครูก็วอร์มร่างกายกับมาชิโระอย่างดุเดือดจนเหนื่อยและว่ายน้ำไม่ไหว...)"

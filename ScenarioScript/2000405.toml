2000405-15 = "3;마시로 수영복ND;03;열사병 방지 대책입니다.\n#3;em;[반짝]"
2000405-16 = "3;마시로 수영복ND;01;아이스 캔디부터 청량 음료까지…… 몸을 식혀줄 수 있을 만한 시원한 음식들을 아이스박스에 가득 담아왔답니다."
2000405-17 = "3;마시로 수영복ND;02;선생님께서도 훈련 중에 차가운 빙과가 필요하시면 바로 말씀해주세요."

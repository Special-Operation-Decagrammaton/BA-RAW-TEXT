[translation]
33030-1 = "ตอนที่ 3;หาความจริง 3"
33030-2 = "ห้องคุมตัว ทรีนิตี้"
33030-5 = "นึกว่าจากนี้ไปจะไม่ได้เจอหน้ากันแล้วซะอีก"
33030-6 = "จะเป็นอย่างนั้นไปได้ไงล่ะคะ? เราไม่ใช่คนอื่นไกลนะคะ "
33030-7 = "อืม... ก็คงงั้น ก็เราเป็นเพื่อนที่รู้จักกันมาตั้งแต่เด็กนี่"
33030-8 = "......."
33030-9 = "ว่าแต่... ทำไมถึงมาหาฉันล่ะ? ถ้าจะมาสอบสวนกันละก็ ฉันเหนื่อยกับเรื่องนี้แล้วนะ"
33030-10 = "ถ้านางิจังมาหาด้วยตัวเอง... ก็คงแปลว่ามีอะไรที่สำคัญกว่า?"
33030-11 = "......."
33030-12 = "สควอดของอาเรียส..."
33030-13 = "หน่วยปฏิบัติการพิเศษที่จัดตั้งขึ้นอย่างลับๆ โดยประธานสภานักเรียนอาเรียส "
33030-14 = "สงสัยเรื่องสควอดเหรอ? แต่ฉันก็พูดไปหมดแล้วในการสอบสวนนะ "
33030-15 = "ทั้งเรื่องช่องทางการติดต่อกับอาเรียส และสมาชิกสควอดของอาเรียสด้วย#nฉันบอกเรื่องที่รู้ไปจนหมดแล้วนี่?"
33030-16 = "ค่ะ... ฉันเองก็ตรวจสอบเรื่องนั้นมาแล้ว "
33030-17 = "ถ้ายังไม่เชื่อ ก็ลองถอดเล็บเหมือนที่เคยทำเมื่อก่อนดูไหมล่ะ? วิธีแบบที่ชมรมซิสเตอร์ทำไง"
33030-18 = "ไม่ใช่วิธีของชมรมซิสเตอร์หรอกค่ะ มันคือของกลุ่มสาวกในอดีต... อีกอย่าง#nตอนนี้ฉันไม่ยอมให้ใช้วิธีป่าเถื่อนแบบนั้นหรอกค่ะ"
33030-19 = "อะฮ่ะฮ่า อืม... ฉันก็แค่พูดไปอย่างนั้นแหละ ฉันรู้ดีว่านางิจังที่อ่อนหวานไม่ชอบเรื่องแบบนั้นเอามากๆ"
33030-20 = "......."
33030-21 = "ถึงมันจะดูตลกที่ฉันพูดแบบนี้ แต่ตอนนี้เรื่องอาเรียสมันไม่สำคัญแล้วไม่ใช่เหรอ?"
33030-22 = "คนที่อยู่เบื้องหลังอย่างฉันได้หายตัวไปแล้ว ตอนนี้อาเรียสเองก็คงไม่มีกองกำลัง ไม่มีอาวุธ แล้วก็ไม่มีเสบียงด้วย"
33030-23 = "ถึงจะยังมีสควอดกับกองกำลังหลงเหลือ แต่ตัวเลขแค่นั้นชมรมทวงความยุติธรรมก็คงจะจัดการได้อยู่ดี"
33030-24 = "ค่ะ... เรื่องนั้นฉันก็ตรวจสอบมาแล้วค่ะ โรงเรียนสาขาอาเรียสจะไม่เป็นปัจจัยอันตราย#nอย่างน้อยก็จนกว่าสนธิสัญญาเอเดนจะได้รับการลงนาม"
33030-25 = "อืม... ฉันเห็นด้วย ที่จริงฉันเองก็อยากรู้ตำแหน่งของเขตปกครองตนเองอาเรียสหรอกนะ#nแต่มันไม่ง่ายเลย "
33030-26 = "คนที่รู้วิธีเข้าไปในเขตปกครองตนเองก็คงจะมีแค่ซาโอริที่เป็นผู้นำสควอด"
33030-27 = "ถ้าหากสงสัยเรื่องนี้ล่ะก็ ไปถามจากอาซึสะน่าจะได้คำตอบเร็วกว่านะ เพราะถึงจะเป็นคนทรยศ แต่ก็เป็นผู้เกี่ยวข้องอยู่ดี"
33030-28 = "คือว่า....  "
33030-29 = "อาซึสะจังอยู่ภายใต้การคุ้มครองของชาเล่ต์ใช่ไหม? อ่าฮะฮ่าฮ่า อืม... เข้าใจแล้วล่ะ"
33030-30 = "ก็นางิจังไปทำตัวไม่ดีกับ คุณครู [USERNAME] ไว้นี่นา คงไม่สะดวกใจที่จะไปถามสินะ"
33030-31 = "เพราะคนเป็นครูก็ต้องอยู่ข้างนักเรียนวันยังค่ำ ครูคงทำทุกวิถีทางเพื่อปกป้องอาซึสะจัง"
33030-32 = "......."
33030-33 = "นางิจัง หลังจากนั้นได้ไปพบคุณครูบ้างไหม? ดูจากสีหน้าแล้ว คงไม่ได้ไปพบมาละสิ?"
33030-34 = "อื้ม ฉันพอจะเข้าใจนะ ก็เล่นทำตัวไม่ดีไว้ซะขนาดนั้น จะเอาหน้าที่ไหนไปเจอได้ล่ะ... ดูเอาก็รู้ว่ากำลังหลีกเลี่ยงอยู่เพราะรู้สึกแบบนี้ อะฮ่ะฮ่ะฮ่า นางิจังเนี่ยยังเป็นสาวน้อยอยู่เลยนะ"
33030-35 = "ก็นะ... แต่ฉันเองก็เป็นเหมือนกัน"
33030-36 = "คุณครูมาพบฉันอยู่หลายครั้งเลยล่ะ กว่าฉันจะปฏิเสธได้ก็เล่นเอาลำบากอยู่เหมือนกัน"
33030-37 = "ก็นะ สถานะของฉันคือคนที่ถูกขังอยู่นี่นา ถ้าจะจับฉันมานั่งตรงหน้าก็คงทำได้ ว่าแล้วทำไมถึงไม่ทำสักหน่อยล่ะ เป็นคนที่น่ารำคาญใจจริงๆ เลยนะ"
33030-38 = "ฉันว่าจะบอกข้อมูลบางอย่างกับคุณครูแล้วทำให้สับสนสักหน่อย... แต่ก็ทำไม่ได้"
33030-39 = "มันจะง่ายขึ้นถ้าคุณครูเลือกที่จะเชื่อฉันหรือเชื่อนางิจัง แล้วก็ลงมือทำอะไรสักอย่าง"
33030-40 = "ไม่ก็เอาทุกอย่างที่ฉันพูดไปฟ้องนางิจังก็คงจะดี... บางทีตอนนี้เราน่าจะยิ้มและมองหน้ากันได้..."
33030-41 = "......."
33030-42 = "ช่างเถอะ ในที่สุดทุกอย่างก็เรียบร้อยแล้วไง ใช่ไหมนางิจัง?"
33030-43 = "ผู้ทรยศถูกจับตัวมาแล้ว ส่วนอาเรียสก็ไม่มีปัญหาอื่นอีกแล้ว "
33030-44 = "แค่สนธิสัญญาเอเดนสำเร็จลุล่วงด้วยดี นางิจังก็จะได้สันติภาพที่ต้องการมาตลอด"
33030-45 = "อืม ดีจังนะ โล่งอกไปที"
33030-46 = "......."
33030-47 = "ไม่หรอกค่ะ อะไรเหรอคะที่ว่าดี? "
33030-48 = "แล้วอะไรเหรอคะที่โล่งอก? คุณมิกะ... เป็นผู้ทรยศนะคะ... "
33030-49 = "คุณพยายามทำลายฮาโลของฉันนะคะ"
33030-51 = "......."
33030-52 = "ทำไมล่ะคะ...? เพราะเกลียดเกเฮนน่าเหรอ? ถึงได้คิดทำร้ายเพื่อนที่รู้จักกันมาเกือบทั้งชีวิต#nได้ลงเลยเหรอคะ...?"
33030-53 = "ทำไมล่ะ...? ทำไมทำแบบนี้คะ? เรื่องคุณเซอาก็ด้วย... "
33030-54 = "......."
33030-55 = "ตอนที่ฉันได้ข่าวว่าคุณเซอาเสียชีวิต... "
33030-56 = "ตอนนั้นฉันทั้งกลัวทั้งกังวล และคิดว่าฉันอาจจะเป็นรายต่อไปก็ได้..."
33030-57 = "เพราะจากเราสองคนแล้ว เธอเป็นคนที่หลักแหลมที่สุด และยังมีอาวุธแห่งการฝันบอกเหตุ#nเรียกได้ว่าเป็นบุคคลอันตรายที่สุดในทรีนิตี้เลย เธอก็เลยถูกบุกโจมตีก่อน"
33030-58 = "พอคุณมิกะปลอดภัยจากทางนั้นแล้ว รายต่อไปก็คงต้องเป็นฉัน... "
33030-59 = "หมายความว่ายังไงกันน่ะ...?"
33030-60 = "ฉันเคยคิดนะคะว่าถ้าฉันเป็นอะไรไป... ก็คงให้คุณมิกะดูแลงานต่อ"
33030-61 = "เพราะแบบนี้ก็เลยพยายามหาตัวคนร้ายให้ได้ก่อนที่คุณมิกะจะถูกทิ้งไว้คนเดียวค่ะ ฉันไม่อยากให้คุณได้รับบาดเจ็บ..."
33030-63 = "ใครกันนะ...? เกเฮนน่า? องค์การนักเรียน? พี่ใหญ่ของมิลเลเนียม? จอมเผด็จการแห่งเรดวินเทอร์? หรือราชาทมิฬแห่งซานไห่จิง? หรือว่า... หรือจะเป็น..."
33030-64 = "ผู้ทรยศ... ใครคือผู้ทรยศกันแน่...? อย่าบอกนะว่า... ไม่สิ... แต่ว่า..."
33030-65 = "แต่ก็... "
33030-66 = "พอได้แล้วล่ะ นางิจัง"
33030-67 = "มันไม่ใช่เรื่องซับซ้อนขนาดนั้นหรอก ก็แค่คนที่เกลียดเกเฮนน่าตั้งใจจะฆ่าเพื่อนที่คบกันมาตั้งแต่เด็ก อืม..."
33030-68 = "มีอะไรผิดพลาดหรือเข้าใจผิดไปหรือเปล่าคะ? หรือมีความจริงอื่นที่แตกต่างกันอย่างสิ้นเชิง... "
33030-69 = "อ่าฮะฮ่าฮ่า ความจริงอื่นงั้นเหรอ?"
33030-70 = "เพราะแบบนี้ไงฉันถึงได้ชอบนางิจังเอามากๆ อืม... นางิจังที่ไร้เดียงสาแบบนี้แหละ..."
33030-71 = "มันไม่มีความจริงอื่นอะไรหรอก ฉันนี่แหละที่ฆ่าเซอา และตั้งใจจะฆ่านางิจังด้วย"
33030-72 = "นางิจังก็รู้ดีนี่ว่าฉันชอบหรือไม่ชอบอะไร?  มันก็ง่ายๆ แบบนี้แหละ#nฉันไม่คิดจะญาติดีกับพวกเกเฮนน่าที่มีเขาได้ ก็แค่นั้น"
33030-73 = "แค่ได้อยู่ในพื้นที่เดียวกับพวกนั้นก็ขนลุกแล้ว นางิจังไม่รู้สึกแบบนี้เหรอ?"
33030-74 = "ก็เลยไปร่วมมือกับอาเรียสเหรอคะ?"
33030-75 = "อืม... ก็ฉันเป็นฆาตกรนี่นา หากมีอะไรที่ถูกใจ ก็ต้องทำตัวแบบนั้นแหละ "
33030-76 = "ถึงจะบอกว่าเซอาจังยังมีชีวิตอยู่ แต่ความจริงที่ฉันพยายามฆ่าเธอก็ไม่มีวันเปลี่ยนแปลง"
33030-77 = "นางิจังแค่ไม่เคยรู้น่ะว่าฉันมีตัวตนที่แท้จริงแบบนั้น"
33030-78 = "... ทำไม... ฉันถึง..."
33030-79 = "ทำไมถึงไม่รู้เลย ทั้งๆ ที่ก็อยู่ด้วยกันมานานงั้นเหรอ? "
33030-80 = "นางิจังน่าจะรู้คำตอบนี้ดีกว่าฉันนะ? "
33030-81 = "อืม... ฉันไม่รู้หรอก เพราะเราต่างเป็นคนอื่นของกันและกัน "
33030-82 = "......."
33030-83 = "ฉันขอกลับก่อนนะคะ... คุณมิกะ..."
33030-84 = "อืม... ฉันออกไปส่งไม่ได้ แต่ก็กลับดีๆ ล่ะ"
33030-87 = "......."
33030-91 = "ทำไมถึงโกหกแบบนั้นล่ะคะ?"
33030-92 = "เอ๋? วันนี้มีคนมาเยอะจัง คราวนี้คือเธอเองเหรอเนี่ย? ฮานาโกะจัง?"
33030-93 = "ค่ะ... ฉันมาที่นี่จนได้นะคะ พอดีว่านี่เป็นงานน่ะค่ะ... "
33030-94 = "อื้ม ก็จริงแฮะ ถ้าไม่ได้มากับนางิจัง ก็คงเป็นชมรมซิสเตอร์?#nตอนนี้เธอรับคำสั่งจากทางนั้นแล้วเหรอ?"
33030-95 = "แต่ก็ช่างเถอะ คงไม่ได้สำคัญอะไร ว่าแต่... เธอบอกว่าฉันโกหกเหรอ? มันหมายความว่าไงน่ะฮานาโกะจัง? ฉันไปพูดโกหกตอนไหนกันน่ะ?"
33030-96 = "......."
33030-97 = "ฉันเอาข้อมูลที่ได้จากชมรมซิสเตอร์มาดูเพื่อสรุปร่องรอยของคุณมิกะค่ะ#nทั้งวิเคราะห์เป้าหมาย วัตถุประสงค์ และอื่นๆ... ไม่ต่างจากการหาความจริงเลยค่ะ"
33030-98 = "ถ้าให้พูดง่ายๆ ก็คงเป็นการวิเคราะห์เพื่อรู้ว่าทำไมมิโซโนะ มิกะถึงก่อเหตุการณ์นี้น่ะค่ะ"
33030-99 = "โห นี่เธอมาอธิบายเรื่องนี้ต่อหน้าผู้เกี่ยวข้องเลยเหรอ? แปลกคนชะมัดเลย"
33030-100 = "คุณมิกะตั้งใจจะทำให้สนธิสัญญาเอเดนล้มเหลวเพราะไม่ชอบเกเฮนน่า ความตั้งใจนี้มันชัดเจนมากค่ะ"
33030-101 = "......."
33030-102 = "ฉันไม่รู้ว่าคุณมิกะถูกโน้มน้าวจากใครและทำไมถึงตัดสินใจทำเช่นนั้น แต่สุดท้ายแล้ว ก็ได้ไปร่วมมือกับอาเรียสเพื่อขึ้นเป็นโฮสต์คนใหม่"
33030-103 = "แผนการตอนแรกคงจะวางไว้ง่ายๆ ค่ะ น่าจะแค่ลักพาตัวเซอาจังไปคุมขังเอาไว้#nเพราะทำแค่นี้ก็ชิงตำแหน่งโฮสต์มาได้แล้ว"
33030-104 = "แต่สควอดของอาเรียสไม่ได้แค่คิดแบบนั้น พวกนั้นตั้งใจจะทำลายฮาโลของเซอาจังตั้งแต่แรกแล้วค่ะ"
33030-105 = "ถึงสิ่งที่เกิดขึ้นหลังจากนั้นจะมีอีกแง่มุมหนึ่งก็ตาม... "
33030-106 = "แต่สุดท้ายก็มีรายงานว่าคุณมิกะเป็นคนฆ่าเซอาจัง "
33030-107 = "ฉันคิดว่าหัวใจของคุณมิกะเริ่มแตกสลายตั้งแต่ตอนนี้นะคะ"
33030-108 = "อาจจะวิตกไปเลยก็ได้... เพราะตัวเองต้องกลายเป็นฆาตกร และเพราะกลับตัวไม่ทันแล้ว..."
33030-109 = "เมื่อกลายเป็นแบบนี้แล้ว ก็คงไม่มีทางเลือกนอกจากทำตามที่ตัวเองต้องการให้ถึงที่สุด...#nจะหยุดตรงนี้ไม่ได้..."
33030-110 = "เพราะความสิ้นหวังหรืออะไรสักอย่างกลายมาเป็นการยั่วยุให้เกิดการทำลายล้าง... "
33030-111 = "เดี๋ยวๆๆ "
33030-112 = "อย่าเดาใจคนอื่นตามอำเภอใจได้ไหม? "
33030-113 = "คนที่สั่งให้ฆ่าเซอาจังก็คือฉัน และคนที่จะแทงข้างหลังเพื่อนสมัยเด็กก็คือฉันด้วย#nความสิ้นหวัง? การยั่วยุ? พูดอะไรของเธอน่ะ? เพ้อเจ้อหรือเปล่า?"
33030-114 = "ไม่หรอกค่ะ... ฉันยังจำคำที่คุณเคยพูดไว้ได้อยู่ค่ะ"
33030-117 = "แต่ฉันไม่ได้สั่งให้ทำลายฮาโลหรอกนะ ฉันไม่ใช่ฆาตกร"

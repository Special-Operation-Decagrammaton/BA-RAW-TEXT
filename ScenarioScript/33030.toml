[translation]
33030-1 = "#title;제3화;포스트모템 3"
33030-2 = "#place;트리니티 유폐실"
33030-3 = "1;미카 비무장;01\n5;나기사;10\n#1;a\n#5;a\n#wait;1000"
33030-4 = "1;미카 비무장;01\n5;나기사;10\n#1;h\n#5;h\n#wait;1500"
33030-5 = "1;미카 비무장;02;이제 못 볼 거라고 생각했거든."
33030-6 = "5;나기사;01;……. 그럴 리가요. 저와 미카 씨 사이잖아요?"
33030-7 = "1;미카 비무장;99;응. 그렇지. 오랫동안 알고 지낸 소꿉친구 사이니까."
33030-8 = "5;나기사;99;……."
33030-9 = "1;미카 비무장;01;……그래. 왜 온 거야? 심문이라면 지금까지 지겹도록 했는데?"
33030-10 = "1;미카 비무장;02;나기 쨩이 직접 찾아온 거라면…… 뭔가 좀 더 중요한 뭔가가 있는 거야?"
33030-11 = "5;나기사;07;……."
33030-12 = "5;나기사;05;<아리우스 스쿼드>는……."
33030-13 = "1;미카 비무장;01;아리우스의 학생회장이 비밀리에 조직한 특작부대."
33030-14 = "1;미카 비무장;15;그게 궁금해? 그치만 나, 지금까지의 심문에서 다 말했는걸."
33030-15 = "1;미카 비무장;99;아리우스와의 접촉 계기, 아리우스 스쿼드의 멤버 구성까지. 아는 건 전부 다 말했단 말야?"
33030-16 = "5;나기사;07;……. 네. 그건 저도 확인했습니다."
33030-17 = "1;미카 비무장;14;응, 못믿겠으면 예전처럼 손톱이라도 뽑아 볼래? 시스터후드였던가, 걔들 방식대로 말야."
33030-18 = "5;나기사;05;……시스터후드가 아니라 과거 <성도회>의 방식입니다. 그리고 이젠 그런 야만적인 방법은 용납하지 않아요."
33030-19 = "1;미카 비무장;15;아하하. 응. 그냥 말해 본 거야. 알고 있어. 상냥한 나기 쨩은 그런 거 질색하는걸."
33030-20 = "5;나기사;07;……."
33030-21 = "1;미카 비무장;01;……내가 이런 말 하는 건 좀 웃기지만, 이제 아리우스 같은 건 아무래도 상관없지 않아?"
33030-22 = "1;미카 비무장;99;나라는 후원자가 사라졌으니, 아리우스는 이제 병력도, 무기도, 보급도 전부 끊겼을 거고."
33030-23 = "1;미카 비무장;01;<스쿼드>가 남아있다고 해도, 아리우스 분교의 남은 병력까지 다 합쳐도 정의실현부에게 정리될 수준일 거고."
33030-24 = "5;나기사;10;……네. 그 부분도 이미 검토를 끝냈습니다. 최소한 아리우스 분교는 에덴조약 시점까지는 위험 요소가 되지 못합니다."
33030-25 = "1;미카 비무장;02;……응, 동감이야. 사실 나도 아리우스 자치구의 위치 정도는 알아내고 싶었지만, 쉽지 않았어."
33030-26 = "1;미카 비무장;01;자치구로 들어가는 방법을 알고 있는 사람은 아마, <스쿼드>의 리더, 사오리뿐일걸?"
33030-27 = "1;미카 비무장;15;그게 궁금한 거라면 그 아즈사에게 물어보는 것이 빠르지 않아? 배신하긴 했지만 당사자니까."
33030-28 = "5;나기사;05;그건……"
33030-29 = "1;미카 비무장;10;아, 아즈사 쨩은 <샬레>의 보호 아래 있지? 아하하하. 응. 이해했어."
33030-30 = "5;나기사;04\n1;미카 비무장;02;나기 쨩, [USERNAME] 선생님에게 못되게 굴었잖아? 더 캐묻기가 불편했겠지?"
33030-31 = "1;미카 비무장;06;응, 선생님이라면 반드시 학생들의 편이니까. 어떻게든 아즈사 쨩을 보호하려고 했을 거고."
33030-32 = "5;나기사;04;……."
33030-33 = "1;미카 비무장;01;나기 쨩, 그 후에 선생님을 만난 적은 있어? 응, 표정을 보니 아니구나?"
33030-34 = "1;미카 비무장;14;응, 이해해. 그렇게 심하게 대해놓고 무슨 얼굴로 만나겠어……. 분명 그런 느낌으로 피해다닌 거잖아. 아하하하, 소녀구나, 나기 쨩."
33030-35 = "1;미카 비무장;08;……뭐, 그건 나도 마찬가지지만."
33030-36 = "5;나기사;07\n1;미카 비무장;06;선생님, 몇 번이고 나를 만나려고 찾아와서 말야. 거절하느라고 얼마나 곤란했는데."
33030-37 = "1;미카 비무장;15;뭐, 나는 이렇게 갇힌 신분이니까 강제로라도 앞에 앉혀버리면 될 텐데, 또 그렇게는 못하는 거려나. 아하하, 정말 성가신 사람이라니까."
33030-38 = "1;미카 비무장;99;……응, 그러게. 선생님에게 이런저런 정보를 흘려서 혼란을 주려고 했는데……. 잘 안되었어."
33030-39 = "1;미카 비무장;01;나의 말을 믿어주든가, 아니면 나기 쨩의 말을 믿든가…… 선생님이 어느 쪽으로든 움직여줬으면 그 뒤로는 더 간단했을 텐데."
33030-40 = "1;미카 비무장;02;아니면 차라리 내가 했던 말들을 전부 나기 쨩에게 일러바쳤으면……. 차라리 지금은 웃으면서 만날 수 있었을 텐데……."
33030-41 = "5;나기사;07;……."
33030-42 = "1;미카 비무장;01;뭐, 그러니까 말야. 결국 다 잘됐잖아? 나기 쨩?"
33030-43 = "1;미카 비무장;99;배신자는 이렇게 잡혔고, 아리우스는 더 이상 문제 될 것 없고."
33030-44 = "1;미카 비무장;03;이제 에덴조약만 무사히 잘 체결하면 나기 쨩이 원하던 평화를 얻을 수 있는 거잖아."
33030-45 = "1;미카 비무장;01;응. 잘됐네. 다행이야."
33030-46 = "5;나기사;07;……."
33030-47 = "#all;hide\n#na;나기사;……아뇨. 뭐가 잘되었다는 거죠?"
33030-48 = "#na;나기사;뭐가 다행이라는 거죠? 미카 씨가…… 배신자였잖아요……."
33030-49 = "#na;나기사;제 헤일로를 파괴하려고 했잖아요."
33030-50 = "1;미카 비무장;01\n5;나기사;05"
33030-51 = "1;미카 비무장;01;……."
33030-52 = "5;나기사;05;……어째서? 게헨나를 증오하기 때문에? 그런 이유로 10년 넘게 알고 지낸 소꿉친구인 저를…… 어째서?"
33030-53 = "5;나기사;06;왜……? 왜 그랬던 거죠? 세이아 씨까지 설마 어쩌다……? \n#5;stiff\n#5;em;[?]"
33030-54 = "1;미카 비무장;01;……."
33030-55 = "5;나기사;04;그때, 세이아 씨가 죽었다는 소식을 들었을 때……"
33030-56 = "5;나기사;07;저는 무섭고 두려웠지만, 그다음은 아마 나겠구나…… 그런 생각이 들었습니다."
33030-57 = "5;나기사;07;우리들 중 가장 현명하고, 예지몽이라는 무기까지 있는 그녀가, 말하자면 트리니티에서 가장 위험한 인물. 그러니까 가장 먼저 습격당한 거라고."
33030-58 = "5;나기사;04;미카 씨는 그런 쪽에서 무해하니까, 아마, 그다음 차례는 나라고……. \n#5;em;…"
33030-59 = "1;미카 비무장;04;이거 은근 디스……?"
33030-60 = "5;나기사;07;그래서 만약 제가 잘못되면…… 제 뒤를 미카 씨에게 맡기려고 했었어요."
33030-61 = "5;나기사;05;그래서 미카 씨가 혼자 남겨지기 전에 그 범인을 찾아내려고 했습니다. 당신마저 다치는 건 바라지 않았으니까……."
33030-62 = "#all;hide"
33030-63 = "3;나기사;05;대체 누가……? 게헨나? 총학생회? 아니면 밀레니엄의 그 빅 시스터? 아니면 붉은겨울의 그 독재자? 산해경의 그 검은 군주? ……아니면……. 아니면…….\n#3;closeup\n#3;em;…"
33030-64 = "3;나기사;06;배신자는…… 배신자는 누구……? 설마…… 아니, 어쩌면…… 하지만…….\n#3;closeup\n#3;stiff"
33030-65 = "#all;hide\n#na;나기사;그런데…… 그런데……."
33030-66 = "5;나기사;04\n1;미카 비무장;02;그만해. 나기 쨩."
33030-67 = "1;미카 비무장;99;이건 그렇게 복잡한 이야기가 아니야. 게헨나를 증오하는 내가 오랜 소꿉친구를 죽이려고 했던 거라고. 응."
33030-68 = "5;나기사;04;뭔가, 착오라든가, 오해가 있었던 건 아닌가요? 사실은 전혀 다른 진실이……."
33030-69 = "1;미카 비무장;14;아하하하. 다른 진실?"
33030-70 = "1;미카 비무장;15;이래서 내가 나기 쨩을 너무 좋아하는 거야. 응. 순진한 나기 쨩을."
33030-71 = "1;미카 비무장;01;그런 건 없어. 내가 세이아를 해치고, 나기 쨩을 해치려고 했어."
33030-72 = "1;미카 비무장;02;나기 쨩도 잘 알겠지만, 나 호불호가 강하잖아? 그냥 단순히 그런 거야. 뿔달린 게헨나 같은 녀석들과 사이좋게 지낼 수 없었던 것뿐이야."
33030-73 = "1;미카 비무장;15;그런 녀석들과 같은 공간에 있는 거 자체가 소름돋지 않아? 나기 쨩은 안 그래?"
33030-74 = "5;나기사;07;……그래서 아리우스와 손을 잡은 건가요?"
33030-75 = "1;미카 비무장;01;응. 나는 살인자니까. 마음에 안 드는 게 있다면, 그렇게 하는 게 당연하잖아?"
33030-76 = "1;미카 비무장;01;세이아 쨩이 사실은 살아있었다고 해도, 그렇다고 내가 그 아이를 죽이려고 했다는 사실이 사라지는 건 아니고."
33030-77 = "1;미카 비무장;02;나기 쨩은 그런 나의 진짜 모습을 전혀 모르고 있었던 거야."
33030-78 = "5;나기사;04;……. 어째서…… 저는……."
33030-79 = "1;미카 비무장;02;그렇게 오래 함께 있었는데도 몰랐냐고?"
33030-80 = "1;미카 비무장;01;그 대답은 나보다 나기 쨩이 더 잘 알고 있지 않아?"
33030-81 = "1;미카 비무장;03;응. 우리는 서로 타인이니까, 알 수 있을 리가 없잖아."
33030-82 = "5;나기사;07;……."
33030-83 = "5;나기사;10;……. 돌아가겠습니다. 미카 씨…….\n#5;em;[반응]"
33030-84 = "1;미카 비무장;02;응. 조심해서 가. 나기 쨩. 배웅은 하지 못하지만."
33030-85 = "#all;hide"
33030-86 = "1;미카 비무장;01\n#1;h"
33030-87 = "1;미카 비무장;99;……."
33030-88 = "#st;[0,0];instant;1;"
33030-89 = "#clearST\n#wait;2500"
33030-90 = "1;미카 비무장;12\n#1;h\n#wait;2500"
33030-91 = "5;하나코;05;……어째서 그런 거짓말을 하시는 거죠?\n#5;a\n#5;em;[?]"
33030-92 = "1;미카 비무장;02;어라. 오늘은 손님이 많네. 이번엔 너야? 하나코 쨩?"
33030-93 = "5;하나코;05;……네. 어쩌다보니 그렇게 됐네요. 이것도 일이라서요."
33030-94 = "1;미카 비무장;01;응, 그러네. 나기 쨩과 같이 온 게 아니라면 시스터후드? 넌 이제 그쪽의 명령을 듣는 거야?"
33030-95 = "1;미카 비무장;03;아니, 뭐든 상관없어. 그치만 거짓말이라니? 무슨 소릴 하는 거야, 하나코 쨩? 내가 무슨 거짓말을 했다는 거야?"
33030-96 = "5;하나코;05;……."
33030-97 = "5;하나코;99;시스터후드에게서 전해 받은 정보로 미카 씨의 행적을 정리해보았습니다. 목표, 목적 등을 분석하는…… 일종의 포스트모템 같은 거죠."
33030-98 = "5;하나코;01;즉, 미소노 미카는 어째서 이런 사건을 저질렀나? ……에 대한 분석이겠네요.\n#5;em;…"
33030-99 = "1;미카 비무장;04;우와, 당사자 앞에서 그런 걸 설명하는 거야? 완전 악취미."
33030-100 = "5;하나코;06;……미카 씨는, 게헨나를 증오해서 에덴조약을 망치려고 했습니다. 이 의도만큼은 분명해요."
33030-101 = "1;미카 비무장;02;……."
33030-102 = "5;하나코;06;누구에게 부추겨졌는지, 어떻게 그런 결심을 하게 되었는지는 모르겠지만, 결국 호스트가 되기 위해 아리우스와 손을 잡은 거죠."
33030-103 = "5;하나코;99;처음 계획은 단순히, 세이아 쨩을 납치해서 유폐시키는 정도였을 겁니다. 호스트를 빼앗는 건 그 정도로도 충분하니까."
33030-104 = "5;하나코;06;하지만, 그걸 실행하는 <아리우스 스쿼드>의 생각은 달랐습니다. 그들은 처음부터 세이아 쨩의 헤일로를 파괴할 계획이었어요."
33030-105 = "5;하나코;05;그 이후 벌어진 일은 또 다른 양상이 있지만……."
33030-106 = "1;미카 비무장;01\n5;하나코;06;어쨌든 미카 씨는 세이아 쨩이 죽었다, 라는 보고를 듣게 된 거죠. \n#5;em;[반응]"
33030-107 = "1;미카 비무장;09\n5;하나코;05;이때부터 미카 씨의 마음은 망가지기 시작했다고 생각해요."
33030-108 = "5;하나코;99;아마 패닉에 빠졌겠죠. 자신이 <살인자>가 되어버렸다. 자신은 이제 돌이킬 수 없게 되어버렸다……."
33030-109 = "5;하나코;05;이렇게 된 이상, 그래, 철저하게 자신이 원했던 대로 진행하는 수밖에 없다……. 여기서 멈춰서는 안 된다……."
33030-110 = "5;하나코;06;그런 자포자기랄까, 파괴적인 충동으로…… \n#5;em;…"
33030-111 = "1;미카 비무장;14;뭐야뭐야, 잠깐만. \n#1;stiff"

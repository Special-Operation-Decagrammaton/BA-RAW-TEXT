[translation]
33030-1 = "第3話;事後分析（３）"
33030-2 = "三一．監獄"
33030-5 = "我本來以為已經不會再見面了。"
33030-6 = "……那怎麼可能呢。我和彌香同學的感情可沒有這麼脆弱哦？"
33030-7 = "呵呵，說得也是呢。畢竟是青梅竹馬呀？"
33030-8 = "……"
33030-9 = "……所以，為什麼來這裡呢？審問的話，已經被問到厭倦了耶？"
33030-10 = "渚醬會親自過來，感覺是有除了審問之外重要的事情？"
33030-11 = "……"
33030-12 = "「奧利斯小隊」是……"
33030-13 = "奧利斯的學生會長在背後組織的，特殊部隊。"
33030-14 = "想問的只有這個？關於這個，我在審問的時候也說了唷？"
33030-15 = "以接觸奧利斯為契機，連奧利斯小隊的成員構成。我知道的全部都說了才對呀？"
33030-16 = "……是的。那個我也確認過了。"
33030-17 = "所以呢？你認為我還有所隱瞞是嗎？#n那要不要試試拔指甲？嘗試某些人的做法？像是修女會之類的？"
33030-18 = "……不是修女會，而是過去的「聖徒會」的做法吧。而且，那種野蠻的方法已經不被允許了。"
33030-19 = "啊哈哈，我只是說說唷。我知道嘛，溫柔善良的渚醬不喜歡那種事對吧？"
33030-20 = "……"
33030-21 = "……雖然這種事不該由我來說，但奧利斯的事已經無所謂了吧？"
33030-22 = "身為後盾的我已經不在了，奧利斯的兵器和補給應該都斷絕了才對。"
33030-23 = "雖然「小隊」還留著，但就算奧利斯分校集結剩餘的兵力，只要實現正義部出手也有辦法解決吧？"
33030-24 = "……是的，關於這個已經檢討過了。至少在伊甸園條約的階段，現在的奧利斯分校並不會是什麼危險因素。"
33030-25 = "嗯，就是啊。我也這麼認為……話說審問時也被問了，到最後還是不清楚奧利斯自治區的事呢。"
33030-26 = "清楚知道進入自治區方法的……我想大概只有「小隊」的隊長，沙織唷？"
33030-27 = "想知道這件事的話，稍微威脅梓醬問問看如何？#n就算是叛徒也是當事人，應該會知道些什麼吧？"
33030-28 = "那是，那個……"
33030-29 = "……？啊，啊──，我知道了。渚醬那麼支支吾吾的，該不會是那個？"
33030-30 = "對[USERNAME]老師耍了壞心眼，再對屬於夏萊的梓醬追問會很尷尬之類的？"
33030-31 = "嘛確實要做那種事的話，老師肯定會保護梓醬的呢。不過我想也不是把渚醬當作危險人物。"
33030-32 = "……"
33030-33 = "那個表情……渚醬，那之後沒有見過老師吧？"
33030-34 = "做了那麼過分的事，沒有臉見面……的感覺？啊哈，真是青春期的女孩子呢，渚醬。"
33030-35 = "……嘛，這部分我也一樣。"
33030-36 = "老師啊……好幾次好幾次為了見我，來到了這裡。每次都要拒絕他，也是挺辛苦的呢。"
33030-37 = "我畢竟處於這種被囚禁的立場，明明只要使用夏萊的權限或其他手段就能強制要我出來的……"
33030-38 = "……不過，老師不是那種人吧。#n渚醬也知道吧，我向老師透漏各種情報，試圖讓他混亂的事……如果被老師背叛的話，事情就簡單了。"
33030-39 = "就算不那麼做，如果相信我所說的一切，或是完全相信渚醬說的話……這樣一來，事情應該會更簡單明瞭才對。我也會更加更加的方便行動。"
33030-40 = "沒錯，所以如果能乾脆地，把我說過的話全部告訴渚醬的話……也許我現在就能堂堂正正地，笑著見來到這裡的老師了吧。"
33030-41 = "……"
33030-42 = "……吶渚醬。仔細想想，到頭來一切都很順利不是嗎？"
33030-43 = "抓到了「三一的叛徒」，奧利斯也不再是威脅。"
33030-44 = "這樣只要伊甸園條約締結的話，渚醬期望的和平不就變成現實了嗎。"
33030-45 = "圓滿結局，太好了太好了。"
33030-46 = "……"
33030-47 = "一點也不好……"
33030-48 = "哪裡好了啊，這個狀態……彌香同學是，叛徒……"
33030-49 = "為什麼，會想要破壞我的光環呢。"
33030-51 = "……"
33030-52 = "……為什麼呢？因為憎恨格黑娜嗎？因為那個理由，就把我……？"
33030-53 = "而且，聖亞同學的事也是。為何，為什麼……"
33030-54 = "……"
33030-55 = "那個時候，聽說聖亞同學死亡時……"
33030-56 = "衝擊和恐懼……還有同時，我想著「下一個肯定是我」。"
33030-57 = "我們之間最為聰明，甚至擁有預知夢作為武器的聖亞同學……最先襲擊可說是三一一級危險的她，某種意義上來說可以理解。"
33030-58 = "彌香同學在政治基本上有點那個……這樣的話，下一個肯定是我吧……"
33030-59 = "……該不會，我剛才被說壞話了？"
33030-60 = "所以，我想過如果我有個萬一……之後就都託付給彌香同學了。"
33030-61 = "因此我想在那之前，在彌香同學變成孤身一人之前……把犯人給找出來。更何況，我不希望連彌香同學也受傷……"
33030-63 = "到底是誰……格黑娜？聯邦學生會？還是那個千年的大姐頭？赤冬的獨裁者？山海經的那個黑色君主……？"
33030-64 = "叛徒是誰，一直在思考這個……難道是，不對說不定，可是……！"
33030-65 = "然後，我──"
33030-66 = "渚醬。"
33030-67 = "……已經夠了。這不是那麼複雜的事。最討厭格黑娜的我，為了那個也打算殺了青梅竹馬。只是這樣唷。"
33030-68 = "……不是因為其他的原因嗎？#n像是失誤、誤解……或是某些從事實看不見的真相……"
33030-69 = "……真相？啊哈哈！"
33030-70 = "啊啊真是的，所以我才會喜歡渚醬的呢，肯定是這樣。這麼，純真的渚醬。"
33030-71 = "沒有那種東西唷。我打算除掉聖亞醬，還有渚醬也是。就只是這樣。"
33030-72 = "渚醬很清楚吧？我的愛恨很激烈。只是這樣而已唷。無論如何都沒辦法和格黑娜友好相處，就是這樣而已。"
33030-73 = "沒辦法忍受和那種傢伙在同個空間。渚醬不是那樣嗎？"
33030-74 = "……所以，和奧利斯聯手了嗎？"
33030-75 = "嗯，我是殺人兇手唷？如果有看不慣的事情的話，這點程度是理所當然的吧？"
33030-76 = "就算聖亞醬還活著，我打算殺了那孩子的事實也不會消失。"
33030-77 = "渚醬不知道我這樣的另一面，只是這樣而已。"
33030-78 = "為什麼……我……"
33030-79 = "「我們明明相處了那麼長的時間，卻沒有注意到嗎」？"
33030-80 = "……那個答案，渚醬比我更清楚吧？"
33030-81 = "……「因為我們是[ruby=他人]不同的人[/ruby]」。對吧，怎麼可能會不知道呢？"
33030-82 = "…… "
33030-83 = "……今天就先回去了。"
33030-84 = "嗯，注意安全哦渚醬。雖然我沒辦法送妳出去。"
33030-87 = "……"
33030-91 = "……為什麼，要說那種謊呢？"
33030-92 = "嗯……今天客人真多呢。這次是花子醬嗎。"
33030-93 = "……要說我為什麼會來的話，是因為我的職責。"
33030-94 = "是嗎。不過既然你不是和渚醬一起過來，難道是受修女會的指使？莫非你加入他們了？"
33030-95 = "……算了，對我來說怎樣都無所謂。#n比起這個，「說謊」是什麼意思？我什麼時候，說了什麼謊？"
33030-96 = "……"
33030-97 = "結合從修女會得到的各種情報，我推測了彌香同學至今為止採取的行動，並藉此尋找目標和目的……可以說是一種類似事後分析的東西吧。"
33030-98 = "也就是，為什麼聖園彌香同學要引起這樣的事件呢……？"
33030-99 = "唔哇，要在當事人的面前說那個嗎？你的興趣真不錯呢？"
33030-100 = "……作為彌香同學憎恨格黑娜的結果，打算破壞伊甸園條約。這點應該是真的吧。"
33030-101 = "……"
33030-102 = "是被誰煽動的嗎，或是存在著那個「誰」嗎，然後雖然不知道有什麼樣的經過讓你下定了決心……最終，為了成為主席和奧利斯聯手了。"
33030-103 = "最初的計劃單純是，綁架聖亞醬並囚禁的程度而已吧。為了成為主席的話，那樣就足夠了。"
33030-104 = "然而，執行的「奧利斯小隊」的想法不一樣，她們從一開始就打算破壞聖亞醬的光環……"
33030-105 = "之後一連串的過程，雖然有各種觀點……"
33030-106 = "總之彌香同學，收到了「聖亞醬死了」的報告。"
33030-107 = "從這時候開始，彌香同學的內心開始崩壞了吧。"
33030-108 = "恐怕是，陷入了恐慌吧。聖亞醬竟然死了，變成了無法挽回的事，自己實際上，變成了「殺人兇手」……"
33030-109 = "事已至此，只能徹底做到最後了。不管要犧牲什麼，直到抵達最初描繪的地方為止……"
33030-110 = "以那種，可以說是自暴自棄的、破壞性的衝動……"
33030-111 = "吶吶，等一下啦。"
33030-112 = "可以不要擅自推測人家的心理嗎？"
33030-113 = "指示殺了聖亞醬的是我，想辦法排除青梅竹馬的渚醬也是我唷？頭腦應該聰明的花子醬竟然說自暴自棄、衝動什麼的，到底在說什麼啊？"
33030-114 = "……不。我，記得妳說過的話。"
33030-117 = "但是我並沒有說要破壞光環唷。畢竟我不是殺人兇手嘛。"
33030-118 = "聖亞醬變成那種狀態，可是事情會發展成這樣的契機唷？"
33030-119 = "從那之後各種事都無法回頭了呢……吶，你是怎麼想呢？"
33030-122 = "其他也有幾個不自然的部分。"
33030-123 = "雖然我那個時候認為「存在著三一真正的叛徒」，不過沒想到會真的在那裡現身。"
33030-124 = "要說為什麼的話，因為那會是丟棄自身最大優勢的行為。"
33030-125 = "從戰略上來思考的話，不可能會做出那樣的行動。"
33030-126 = "嗯，那個我也有在反省唷。啊啊，要是我再聰明一點的話──"
33030-127 = "彌香同學「害怕奧利斯把渚同學殺了」……不是這樣嗎？"
33030-128 = "……"
33030-129 = "像聖亞醬的時候一樣，奧利斯可能會把渚同學的光環給破壞也說不定。不是那麼想的嗎？"
33030-132 = "……就是這樣，能把渚醬還給我嗎？別擔心，不會傷害她的唷。不過可能得讓她剩下的學校生活裡都在牢裡渡過就是了。"
33030-135 = "……"
33030-136 = "彌香同學，妳很強。恐怕在純粹的戰鬥中，能和實現正義部的弦生同學一較高下吧。當然妳還有除此之外的強悍……"
33030-137 = "那時候，我雖然裝作游刃有餘的樣子，不過內心理解狀況相當的危險。"
33030-138 = "雖然說有修女會的支援，要壓制妳應該也不是簡單的事。我還設想了最糟的狀況，修女會的大家可能會全員退場。"
33030-139 = "……不過，妳卻投降了。「聖亞醬活著」，聽到這件事的瞬間。"
33030-140 = "……已經夠了。"
33030-141 = "所以，妳想說什麼？"
33030-142 = "所以我很可憐？其實並不想做那種事吧？還是說做了錯誤選擇的小笨蛋呢？"
33030-143 = "啊哈哈哈哈哈哈！"
33030-144 = "啊──，真是個有趣的孩子呢……"
33030-148 = "完全不是唷，我只是個叛徒。把朋友和夥伴出賣的，邪惡又腹黑的殺人兇手。"
33030-149 = "我沒有打算不正視那個事實唷。這樣的我，被大家討厭也沒辦法。"
33030-150 = "……如果，就算有其他理由好了。要怎麼知道呢？"
33030-151 = "我明明都已經說了那是真的。#n花子醬不惜否定這一點也想找出的究竟是什麼呢？"
33030-152 = "為什麼要對無法證明的事，那麼的固執呢？"
33030-153 = "我，只是……"
33030-154 = "……吶，聖亞醬現在怎麼樣了？花子醬，妳們感情很好吧？"
33030-155 = "聖亞醬真的沒事嗎？雖然有想過，「其實死了卻說謊」這種事應該沒有發生吧？但是那樣的話為什麼，沒有現身呢？"
33030-156 = "還是說，現在也還在用謊言欺負我呢？#n畢竟花子醬也相當腹黑嘛，這部分是不是也該懷疑一下比較好？"
33030-157 = "…… "
33030-158 = "……我今天就先告辭了，彌香同學。"
33030-159 = "關於剛才說的推測，我不會告訴任何人。當然渚同學也是。"
33030-160 = "嗯，妳高興就好？"
33030-161 = "還有，[USERNAME]老師也是。"
33030-162 = "……"
33030-163 = "因為是，「推測」呀。"
33030-164 = "……"
33030-165 = "……那麼再見。"
33030-169 = "……"
33030-170 = "…………"
33030-176 = "……雖然我也不差。不過花子醬也挺殘酷的呢。"
33030-178 = "[ns]「…………」"
33030-179 = "說是那麼說，還是像這樣全部告訴老師了……"
33030-180 = "原本是想對彌香同學耍一點壞心眼的……不過到最後感覺真的變成是在找碴一樣。"
33030-181 = "……當時血似乎都衝進腦袋裡了。下次得道歉才行……"
33030-182 = "不過，目前事情的前因後果似乎也只能這麼解釋了。"
33030-183 = "討厭格黑娜的彌香同學，為了成為主席襲擊了茶會。"
33030-184 = "指示襲擊的是聖園彌香同學。執行的是奧利斯小隊。然後最終，引爆聖亞醬所在房間的是白洲梓醬。"
33030-185 = "各自，有著不同的理由和目的……"
33030-186 = "行動的結果環環相扣，混雜著誤解和不信任，演變成現在這樣……"
33030-187 = "……這就是結論，是嗎。"
33030-188 = "[ns]「不好說呢……」"
33030-190 = "[ns]「比如說，彌香最初也只是想欺負聖亞而已……之類的。」"
33030-191 = "……老師？突然，說什麼……？"
33030-192 = "就算只是假設，我認為那也是相當極端的設想……那個，姑且思考看看的話……"
33030-193 = "考慮到彌香同學的性格……"
33030-194 = "實際上的情況先擺一邊，彌香同學被評論為「不適合政治」，從旁來看是不太會計算就行動的類型。"
33030-195 = "對每天說著難懂的話的聖亞醬，感到煩躁了……？"
33030-196 = "嘛，聖亞醬確實不能說是「性格很好」的感覺……"
33030-197 = "彌香同學針對這點想要欺負她，和奧利斯……"
33030-198 = "該，該說是太強硬嗎，還是說變成太過隨意的形式嗎……"
33030-199 = "[s]「嗯，也許是。」"
33030-200 = "……老師？很簡單就同意了呢……？"
33030-201 = "[s]「或者是，彌香的目的真的是想和奧利斯和好之類的。」"
33030-202 = "…… "
33030-203 = "和好是真正的目的，那個意圖被利用了……？#n然後以對格黑娜的憎惡被煽動的形式……"
33030-204 = "……不，老師想說的是──"
33030-205 = "我們沒辦法察覺彌香同學的真心……是這個意思嗎？"
33030-206 = "[s]「『抵達樂園之人的真相，是否能夠證明』……」"
33030-207 = "第五項的……"
33030-208 = "抵達樂園之人，無法被外界所觀測。#n無法觀測其存在……關於樂園存在證明的悖論……"
33030-209 = "[s]「……無法證明的東西，該怎麼證明呢。」"
33030-210 = "……"
33030-211 = "如果抵達了「他人的真心」的話……那就已經不再是他人。#n如果無法抵達的話，就無法理解真心……"
33030-212 = "樂園也，和他人的真心一樣……是這個意思嗎？"
33030-213 = "……確實，是這樣也說不定呢。我們沒有直接接觸他人真心的方法，也沒有證明那個真相的手段。"
33030-214 = "「[ruby=抵達了樂園]理解了他人的真心[/ruby]」這句話，該怎麼做才能證明是「真的」呢……"
33030-215 = "正所謂矛盾……是不可能的嗎。理解他人真心的方法，真的不存在嗎……"
33030-216 = "[s]「……肯定，沒有吧。」"
33030-217 = "……"
33030-218 = "[ns]「那一定是，不可能的證明……」"
33030-220 = "[ns]「這樣的話，只能相信了也說不定。」"
33030-222 = "[ns]「相信那裡存在著樂園。」"
33030-223 = "……"
33030-224 = "說的，也是呢。"

[translation]
33030-1 = "第3話;ポストモーテム（３）"
33030-2 = "トリニティ・監獄"
33030-5 = "もう会えないんじゃないかなって、そう思ってた。"
33030-6 = "……まさか。私とミカさんの仲ですよ？"
33030-7 = "ふふっ、それもそうだね。幼馴染なんだし？"
33030-8 = "……。"
33030-9 = "……で、どうしてここに来たの？尋問ならもう、飽きるほどされた後だけど？"
33030-10 = "ナギちゃんが直接来たってことは、それ以外に何か大事な用事でもある感じ？"
33030-11 = "……。"
33030-12 = "「アリウススクワッド」は……"
33030-13 = "アリウスの生徒会長が秘密裏に組織した、特殊部隊。"
33030-14 = "聞きたいのはそれだけ？それについては私、尋問の時にも言ったよ？"
33030-15 = "アリウスとの接触のきっかけから、アリウススクワッドのメンバー構成まで。知ってることは全部話したはずだけど？"
33030-16 = "……はい。それは私も確認しました。"
33030-17 = "それで？じゃあまだ何か、隠し事があるんじゃないかって？なら試しに爪でも剥いでみる？シスターフッドだっけ、どこかの誰かさんたちのやり方でさ。"
33030-18 = "……シスターフッドではなく、かつての「聖徒会」のやり方でしょう。それに、もうそのような野蛮な方法は許しません。"
33030-19 = "あははっ、言ってみただけだよ。知ってるもん、優しい優しいナギちゃんはそういうの苦手だもんね？"
33030-20 = "……。"
33030-21 = "……私がこんなことを言うのも何だけどさ、もうアリウスのことなんてどうでも良くない？"
33030-22 = "私っていう後ろ盾も無くなったことだし、もうアリウスの兵器も補給も全部途絶えつつあるはず。"
33030-23 = "「スクワッド」は残ってるけど、それにアリウス分校の残りの兵力を足し合わせたところで、正義実現委員会が動けば何とかなるんじゃない？"
33030-24 = "……はい、それについては検討済みです。少なくともエデン条約の段階で、今のアリウス分校は大した危険要素になりません。"
33030-25 = "うん、だよね。私もそう思う。……そういえば尋問でも聞かれたけど、最後までアリウスの自治区のことは分からなかったなぁ。"
33030-26 = "自治区への入り方をちゃんと知ってるのは……多分「スクワッド」のリーダー、サオリくらいだと思うよ？"
33030-27 = "それについて知りたいなら、アズサちゃんをちょっと脅して聞いてみたらどう？裏切り者とはいえ当事者なんだし、何か知ってるんじゃない？"
33030-28 = "それは、その……"
33030-29 = "……？あ、あー、分かった。ナギちゃんがそんなに歯切れが悪いのって、もしかしてあれ？"
33030-30 = "[USERNAME]先生に意地悪したから、これ以上シャーレの下にいるアズサちゃんに色々問いただすのは気まずいとか？"
33030-31 = "まあ確かにそんなことしようとしたら、先生はアズサちゃんを守ろうとするだろうね。別にナギちゃんを邪険に扱うってわけじゃないだろうけど。"
33030-32 = "……。"
33030-33 = "その顔……ナギちゃん、あれから先生に会ってないでしょ？"
33030-34 = "あそこまで酷いことをして、合わせる顔が無い……って感じ？あはっ、思春期の女の子だねえ、ナギちゃんも。"
33030-35 = "……ま、それは私も同じなんだけど。"
33030-36 = "先生さ……何度も何度も私に会おうと、ここまで来るの。そのたびに断るのも、結構大変なんだよね。"
33030-37 = "私はこうして閉じ込められてる立場なんだから、シャーレの権限でも何でも使って、強制的に出てこさせれば良いのにね？"
33030-38 = "……まあ、そういう人じゃないか。ナギちゃんも知ってるでしょ。私が先生に色々な情報を流して、混乱させようとしたこと……あれで先生が裏切ってれば、話は簡単だった。"
33030-39 = "そうでなくても、私の言うことを全部信じるか、ナギちゃんの言うことを全部信じるか……そうしてくれれば、もっと分かりやすい展開のはずだった。もっともっと動きやすかった。"
33030-40 = "そう、だからいっそナギちゃんにでも、私が言ったことを全部そのまま流したりしてれば……多分今頃は堂々と、ここまで来た先生に笑って会えてたんだろうな。"
33030-41 = "……。"
33030-42 = "……ねぇナギちゃん。考えようによってはさ、何だかんだで全部上手く行ったんじゃないの？"
33030-43 = "「トリニティの裏切り者」はこうして捕まった。アリウスはもう脅威にならない。"
33030-44 = "これでエデン条約さえ締結できれば、ナギちゃんの望んだ平和が現実になるじゃん。"
33030-45 = "ハッピーエンド、良かった良かった。"
33030-46 = "……。"
33030-47 = "何も良くありません……"
33030-48 = "何が良かったんですか、この状態で……ミカさんが、裏切り者で……。"
33030-49 = "どうして、私のヘイローを破壊しようとしたんですか。"
33030-51 = "……。"
33030-52 = "……どうしてですか？ゲヘナが憎いからですか？それが理由で、私のことを……？"
33030-53 = "それに、セイアさんの件もそうです。なぜ、どうして……。"
33030-54 = "……。"
33030-55 = "あの時、セイアさんが死んだと聞いた時……。"
33030-56 = "衝撃と恐怖……それと同時に、「きっと次は私だ」と思いました。"
33030-57 = "私たちの中で最も賢く、予知夢という武器まで持ち合わせたセイアさん……トリニティでも一等危険な彼女を最初に襲うのは、ある意味理解できます。"
33030-58 = "ミカさんは政治的には基本アレですし……となればきっと、次は私だろうなと……。"
33030-59 = "……もしかして私、今悪口言われてる？"
33030-60 = "ですから、もし私に何かあったら……後は全て、ミカさんに頼もうと思っていました。"
33030-61 = "だからその前に、ミカさんがひとりになってしまう前に……犯人を、見つけ出そうと思っていたんです。ましてや、ミカさんまで怪我をさせたくありませんでしたし……。"
33030-63 = "一体誰が……ゲヘナ？連邦生徒会？それともあのミレニアムのビッグシスターが？レッドウィンターの独裁者が？山海経のあの黒い君主が……？"
33030-64 = "裏切り者は誰なのか、ずっとそれだけを考えて……まさか、いやもしかしたら、でも……！"
33030-65 = "それで、私は――"
33030-66 = "ナギちゃん。"
33030-67 = "……もう良いの。これはそんな複雑なお話なんかじゃない。ゲヘナのことが大っ嫌いな私が、そのために幼馴染をも殺そうとした。それだけの話だよ。"
33030-68 = "……何かが、あったのではないですか？手違いが、誤解が……何か事実からは見えない、真実が……"
33030-69 = "……真実？あははっ！"
33030-70 = "あーもう、だから私はナギちゃんのことが好きなんだなぁきっと。こういう、純粋なナギちゃんのことが。"
33030-71 = "そんなものはないよ。私がセイアちゃんをやっつけようとした、その上ナギちゃんのことも。ただそれだけ。"
33030-72 = "ナギちゃんはよく知ってるでしょ？私、好き嫌いが激しいの。ただそれだけだよ。どうしてもゲヘナとは仲良くできなかった、それだけのお話。"
33030-73 = "あんな奴らと同じ空間にいるなんて耐えらんない。ナギちゃんはそうじゃないの？"
33030-74 = "……それで、アリウスと手を組んだのですか？"
33030-75 = "うん、私は人殺しだよ？気に食わないことがあったらそれくらい、当然のことでしょ？"
33030-76 = "セイアちゃんがたとえ生きてたとして、私があの子を殺そうとしたって事実が消えることは無い。"
33030-77 = "ナギちゃんは私のこういう側面を知らなかった、ただそれだけ。"
33030-78 = "どうして……私は……。"
33030-79 = "「私はあれだけ長い間一緒にいたのに、気づかなかったのか」？"
33030-80 = "……その答えは私よりも、ナギちゃんの方がよく分かってるでしょ？"
33030-81 = "……「私たちは他人だから」。ね、分かるわけないじゃん？"
33030-82 = "……。"
33030-83 = "……今日は、帰ります。"
33030-84 = "うん、気を付けてねナギちゃん。お見送りはしてあげられないけど。"
33030-87 = "……。"
33030-91 = "……どうして、そんな嘘をつくんですか？"
33030-92 = "うーん、今日はお客さんが多いね。次はハナコちゃんか。"
33030-93 = "……まあ私の方はどちらかと言いますと、役割上の都合ですが。"
33030-94 = "そっか。まあナギちゃんと一緒に来たわけじゃないなら、シスターフッドの差し金？もしかして傘下に入ったとか？"
33030-95 = "……まあ、私にとってはどっちでも良いことだけど。それよりさ、「嘘」ってどういうこと？私がいつ、何の嘘をついたって？"
33030-96 = "……。"
33030-97 = "シスターフッドからの情報などを合わせて、ミカさんのこれまでの動きを推測していたんです。それによって目標や目的を探る……一種のポストモーテムのようなものでしょうか。"
33030-98 = "つまり、聖園ミカさんはどうしてこのような事件を起こしたのか……？と。"
33030-99 = "うわぁ、当事者の前でそれを語るの？良い趣味してるね？"
33030-100 = "……ミカさんはゲヘナのことを憎んだ結果として、エデン条約を壊そうとしました。これは確かにそうでしょう。"
33030-101 = "……。"
33030-102 = "誰に煽り立てられたのか、あるいはその「誰か」がいるのか、そしてどういう経緯でその決心に至ったのかは分かりませんが……最終的に、ホストになるためにアリウスと手を組みました。"
33030-103 = "最初の計画は単純に、セイアちゃんを拉致して幽閉する程度だったのではないでしょうか。ホストになるためであれば、それで十分ですから。"
33030-104 = "しかし、それを実行する「アリウススクワッド」の考えは違いました。彼女たちは初めからセイアちゃんのヘイローを破壊するつもりだった……"
33030-105 = "その後の一連の流れは、これまた色々な見方がありますが……"
33030-106 = "とにかくミカさんは、「セイアちゃんが死んだ」と報告を受けました。"
33030-107 = "この時から、ミカさんの心は壊れ始めたのではないでしょうか。"
33030-108 = "おそらく、パニックに陥ったことでしょう。セイアちゃんが死んでしまうなんていう、取り返しのつかないことになってしまった、自分は実質的に、「人殺し」になってしまった……"
33030-109 = "こうなった以上、もう徹底的に最後までやり抜くしかない。何を犠牲にしてでも、最初に描いたところまで辿り着くしかない……"
33030-110 = "そんな、自暴自棄ともいえる破壊的な衝動で……"
33030-111 = "ねぇねぇ、ちょっと待ってよ。"
33030-112 = "勝手に人の心を推理しないでくれる？"
33030-113 = "セイアちゃんを殺せって指示したのも私、幼馴染であるナギちゃんをどうにかしようとしたのも私だよ？頭の良いはずのハナコちゃんが自暴自棄とか衝動とか、いったい何を言ってるの？"
33030-114 = "……いいえ。私は、あなたが言った言葉を覚えています。"
33030-117 = "でもヘイローを破壊しろとは言ってないよ。私は人殺しじゃない。"
33030-118 = "セイアちゃんがあんなことになっちゃったのが、ここまで事態が大きくなったきっかけなんだよ？"
33030-119 = "そこからもう色んなことがどうしようもなくなっちゃったわけだし……ねえ、その辺りどう思う？"
33030-122 = "他にも幾つか不自然な点があります。"
33030-123 = "私はあの時「トリニティの本当の裏切り者が存在する」とは思っていましたが、あそこで本当に姿を表すとはそこまで思ってませんでした。"
33030-124 = "なぜならそれは、ご自身の一番の利点を投げ捨てることになるからです。"
33030-125 = "戦略的に考えれば、あのような行動に出るはずがありません。"
33030-126 = "うん、それは私も反省してるよ。あーあ、私がもうちょっと賢かったら――"
33030-127 = "ミカさんは「アリウスがナギサさんを殺すのが怖かった」……そうではありませんか？"
33030-128 = "……。"
33030-129 = "セイアちゃんの時のように、アリウスがナギサさんのヘイローを破壊するかもしれない。そう思ったのでは？"
33030-132 = "……そういうわけだから、ナギちゃんを返してくれる？大丈夫、痛いことはしないよ。まあ、残りの学園生活は全部檻の中かもしれないけど。"
33030-135 = "……。"
33030-136 = "ミカさん、あなたは強いです。おそらく純粋な戦闘であれば、正義実現委員会のツルギさんとも十分に渡り合えるでしょう。もちろんあなたには、それ以外の強さもありますが……"
33030-137 = "あの時、私は余裕のある振りをしていましたが、内心ではかなり危険な状況だと分かっていました。"
33030-138 = "シスターフッドの支援があったとはいえ、あなたを制圧するのは簡単ではないはず。最悪の場合、シスターフッドのみなさんがリタイアしうるとまで想定していたくらいです。"
33030-139 = "……ですが、あなたは投降した。「セイアちゃんが生きている」、そのことを聞いた瞬間に。"
33030-140 = "……もう良いよ。"
33030-141 = "で、何が言いたいの？"
33030-142 = "だから私が可哀想だって？本当はそんなことをしたくなかったんじゃないかって？それとも間違った選択をしたおバカさんだねって？"
33030-143 = "あははははははっ！"
33030-144 = "あー、本当に面白い子だなぁ……。"
33030-148 = "全然違うよ、私はただの裏切り者。友達も仲間も売り飛ばした、邪悪で腹黒な人殺し。"
33030-149 = "その事実に目を背ける気は無いよ。こんな私、みんなに嫌われたって仕方が無い。"
33030-150 = "……もし、仮に他の理由があったとしてさ。どうやってそれを知るの？"
33030-151 = "だってそれが本当だって言ってるのに。それを否定してまで、ハナコちゃんは何を探そうとしてるわけ？"
33030-152 = "どうしてそこまで、証明しようのないことに固執するの？"
33030-153 = "私は、ただ……。"
33030-154 = "……ね、セイアちゃんは今どうしてるの？ハナコちゃん、仲良かったよね？"
33030-155 = "セイアちゃんって本当に無事なの？まさかとは思うけど、「本当は死んだのに嘘をついた」なんてことはないよね？でもそれならどうして、姿を現さないのかな？"
33030-156 = "それとも、今もまだ私を嘘で虐めてるところ？ハナコちゃんも結構腹黒だもんね、そこも疑った方が良さそうだったり？"
33030-157 = "……。"
33030-158 = "……今日はこれで失礼しますね、ミカさん。"
33030-159 = "今言った推測については、誰にも言いません。もちろんナギサさんにも。"
33030-160 = "うん、好きにすれば？"
33030-161 = "そして、[USERNAME]先生にも。"
33030-162 = "……。"
33030-163 = "「推測」、ですからね。"
33030-164 = "……。"
33030-165 = "……それでは。"
33030-169 = "……。"
33030-170 = "…………。"
33030-176 = "……私も大概だけど。ハナコちゃんも、結構残酷だねぇ。"
33030-178 = "[ns] \"…………。\""
33030-179 = "まあそうは言いつつ、こうして先生に全部伝えてしまったわけですが……。"
33030-180 = "少しだけ、ミカさんに意地悪をしようと思ったのですけれど……何だか最後は本当に、嫌がらせになってしまった感じもありました。"
33030-181 = "……頭に血が昇ってしまったようです。今度謝らないと……。"
33030-182 = "ですが、今のところ顛末はこういった形になるしか無さそうです。"
33030-183 = "ゲヘナのことが嫌いだったミカさんが、ホストになるためにティーパーティーを襲おうとした。"
33030-184 = "襲撃を指示したのは聖園ミカさん。実行したのはアリウススクワッド。そして最終的に、セイアちゃんがいた部屋を爆破したのは白洲アズサちゃん。"
33030-185 = "各々に、違う理由と目的があり……"
33030-186 = "その行動の結果が次から次へと連鎖し、誤解と不信が混ざり合い、今ここに辿り着いた……。"
33030-187 = "……これが結論、なのでしょうか。"
33030-188 = "[ns] \"どうなんだろうね……。\""
33030-190 = "[ns] \"例えばミカも、最初はただセイアに意地悪しようと思っただけ……とか。\""
33030-191 = "……先生？急に、何を……？"
33030-192 = "仮定の話だとしても、かなり極端な想定に思えますが……えっと、一応考えてみますと……"
33030-193 = "ミカさんの性格を考えるに……"
33030-194 = "実際のところはさておき、ミカさんは「政治に向かない」と言われるくらい、傍から見るとあまり計算などをせずに行動するタイプです。"
33030-195 = "毎日のように小難しいことを言ってくるセイアちゃんに、苛立ちを覚えていた……？"
33030-196 = "まあ、セイアちゃんは確かに「性格が良い」とはあまり言えない感じではありますが……。"
33030-197 = "ミカさんがそこに対して意地悪をしようとして、アリウスを……。"
33030-198 = "さ、流石に無茶と言いますか、恣意的過ぎる形になってしまうと言いますか……。"
33030-199 = "[s] \"うん、そうかもね。\""
33030-200 = "……先生？簡単に納得されるんですね……？"
33030-201 = "[s] \"或いはミカは、本当にアリウスと仲直りすることが目的だったとか。\""
33030-202 = "……。"
33030-203 = "仲直りすることが真の目的で、その意図を利用された……？そこでゲヘナに対する憎悪が煽られる形で……"
33030-204 = "……いえ、先生が仰りたいことは――"
33030-205 = "私たちにはミカさんの本心を察することなどできない……そういうことですか？"
33030-206 = "[s] \"「楽園に辿り着きし者の真実を、証明することはできるのか」……\""
33030-207 = "五つ目の……"
33030-208 = "楽園に辿り着いた者は、楽園の外で観測されることが無い。存在することを観測できない……楽園の存在証明に関するパラドックス……"
33030-209 = "[s] \"……証明できないものを、どう証明するのか。\""
33030-210 = "……。"
33030-211 = "もし「他者の本心」なんてものに辿り着いたら……それはもう、他人ではありません。辿り着けないなら、やはり本心など分かっていないということで……。"
33030-212 = "楽園も、誰かの本心も一緒……そういうお話ですか？"
33030-213 = "……確かに、そうかもしれませんね。私たちは誰かの心に直に触れる方法も、その真実を証明する術も持ってはいません。"
33030-214 = "「[ruby=楽園に辿り着いた]誰かの本心を理解した[/ruby]」という言葉を、どうすれば「本当」だと証明することができるのか……"
33030-215 = "正に矛盾……不可能なのでしょうか。他者の本心を理解する方法は、無いのでしょうか……。"
33030-216 = "[s] \"……無いんだろうね、きっと。\""
33030-217 = "……。"
33030-218 = "[ns] \"それはきっと、不可能な証明……。\""
33030-220 = "[ns] \"……だとすればもう、信じるしかないのかもしれない。\""
33030-222 = "[ns] \"そこには楽園がある、って。\""
33030-223 = "……。"
33030-224 = "そう、ですね。"
33030-225 = "考えてみれば、先生は最初からそうでしたね。この疑惑と疑念で満ち溢れたお話の、初めからずっと――"
33030-253 = "もちろんミカさんやナギサさんを含め、先生は生徒たちを疑わない……そういうことですか？"
33030-254 = "……たとえその結果として、誰かに裏切られても？"
33030-255 = "[s] \"その時はきっと、何か事情があるに違いないから。\""
33030-256 = "どうして……先生はどうして、そんなに……。"
33030-257 = "[s1] \"先生が生徒を信じないと、何も始まらない……。\"\n[s2] \"大人だから、みんなを信じたい。\""
33030-264 = "[ns3] \"ナギサとミカがいつかまた、\"\n[ns4] \"お互いに本音を打ち明けられる日が来てほしい。\""
33030-269 = "[ns] \"いつか、きっと。そのために私も……。\""

[translation]
2004006-1 = "Satsuki is Enduring"
2004006-2 = "As soon as I got Satsuki's message, I hurried to the Pandemonium Society."
2004006-9 = "Ah, Schale's Sensei. What brings you here today?"
2004006-13 = "Ah, Satsuki is..."
2004006-14 = "W-Well..."
2004006-15 = "[s] \"Did something happen?\""
2004006-16 = "Well, yes, you might say that..."
2004006-20 = "[ns] \"So you're telling me...\""
2004006-22 = "[ns] \"...she doesn't like vaccination shots, so she's hiding behind the door?\""
2004006-23 = "Well, you never know who might be afraid of needles, I suppose..."
2004006-28 = "Satsuki? Satsuki!"
2004006-29 = "You're the only one left!"
2004006-30 = "I'll make it quick and painless, so please come out!"
2004006-31 = "Don't lie to me! In what world is there a \"painless\" shot? I'm fine! Just go away!"
2004006-32 = "All Gehenna students are required to take this shot. I know you know that."
2004006-33 = "You want to end up bedridden with a miserable cold?"
2004006-34 = "That won't happen! I've never gotten a cold in my life!"
2004006-35 = "That's because you're..."
2004006-36 = "A-Anyways! That's not the issue here!"
2004006-42 = "So as you can see...yeah."
2004006-43 = "[s] \"She's got it rough...\""
2004006-46 = "[ns] \"Uh, hi. You want me to try talking to her?\""
2004006-47 = "Oh, Sensei."
2004006-48 = "Please go ahead. She won't listen to me at all..."
2004006-49 = "I'll leave it to you, then."
2004006-54 = "[ns] \"Satsuki? It's me.\""
2004006-56 = "...Sensei? Is it really you?"
2004006-57 = "...No. There's no reason for Sensei to be here."
2004006-58 = "Heehee, you do a great impression of Sensei, but you can't fool me. I'm the Pandemonium Society's Intelligence Committee Director, master of psychology..."
2004006-59 = "[s] \"It's really me, Satsuki. Could you please open the door?\""
2004006-60 = "..."
2004006-61 = "...Sensei, are you really there?"
2004006-66 = "...It is you. So then why are you here...?"
2004006-67 = "Ah, you saw my MomoTalk?"
2004006-68 = "Heehee, I suppose you saw right through my \"emergency rescue request.\""
2004006-69 = "Well, you see the problem. An unprecedented crisis, same as always..."
2004006-70 = "Now get me out of here."
2004006-71 = "[s] \"Just because you don't want the shot?\""
2004006-72 = "I really, really, REALLY don't want the shot!"
2004006-73 = "I don't like getting hurt! Especially shots, they're the worst!"
2004006-74 = "That sharp little needle, piercing through my poor, delicate skin like a spear..."
2004006-75 = "Then they press the syringe, and some mystery drug slips into my veins, into ME..."
2004006-76 = "[s1] \"That does make it sound really bad, but...\"\n[s2] \"It's over fast, though. Can you tough it out?\""
2004006-79 = "Sensei...it's not that simple."
2004006-80 = "Do you think you could endure it, Sensei?"
2004006-81 = "Not just the physical pain, but the terror of seeing that needle get closer and closer..."
2004006-82 = "And then that cold alcohol swab, rubbing against your skin, marking you for death!"
2004006-83 = "[s3] \"I heard you're the only one here who hasn't gotten it yet.\"\n[s4] \"Even Ibuki's gotten hers already...\""
2004006-86 = "Tch, even so..."
2004006-90 = "...What's with that face?"
2004006-91 = "Anyway, I just don't want to! As a student, I exercise my right to decline."
2004006-92 = "That's not a thing!"
2004006-93 = "Oh, can't you just check my name off the list and not worry about it?"
2004006-94 = "That would be medical fraud, so no!"
2004006-95 = "[s] \"Um, by any chance, do you happen to have any extra doses?\""
2004006-96 = "Hmm, yes. I do have a few..."
2004006-97 = "[s] \"Satsuki, how about if you get it with me?\""
2004006-98 = "Huh...?"
2004006-99 = "[s] \"Would that help you get through it?\""
2004006-100 = "Well...aren't you afraid of shots too, Sensei? It hurts a lot, you know!"
2004006-101 = "[s5] \"Of course it does, but...\"\n[s6] \"It won't be as scary if we face it together.\""
2004006-104 = "You know, if Sensei were going that far for me, I'd just get the shot."
2004006-105 = "Will you shut up?! I'm thinking..."
2004006-106 = "..."
2004006-107 = "...Together. At the same time."
2004006-108 = "[s] \"Yes. At the same time.\""
2004006-110 = "...Tch..."
2004006-112 = "Fine."
2004006-113 = "Give me the shot."
2004006-114 = "[s] \"Now you're talking!\""
2004006-118 = "She trembled through the whole ordeal, but we both got through it in the end."

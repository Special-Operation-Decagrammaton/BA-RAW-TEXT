[translation]
2004006-1 = "ซัตสึกิอดทนอยู่นะ"
2004006-2 = "(คุณครูรีบไปที่แพนเดโมเนียม โซไซตี้หลังจากได้รับข้อความของซัตสึกิ)"
2004006-9 = "คุณครูจากชาเล่ต์ สวัสดีค่ะ มีธุระอะไรที่นี่คะ..."
2004006-13 = "อ้อ ซัตสึกิน่ะเหรอคะ..."
2004006-14 = "คะ... คือว่า..."
2004006-15 = "[s] \"เกิดเรื่องอะไรขึ้นเหรอ?\""
2004006-16 = "จะเรียกว่าเกิดเรื่องมันก็ใช่อยู่..."
2004006-20 = "[ns] \"ว่าไงนะ...\""
2004006-22 = "[ns] \"ขังตัวเองไว้ในห้องเพราะไม่อยากโดนฉีดวัคซีนงั้นเหรอ?\""
2004006-23 = "ค่ะ... เอ่อ... เรื่องแบบนี้เกิดขึ้นบ่อยเลยค่ะ..."
2004006-28 = "คุณซัตสึกิ! คุณซัตสึกิ!"
2004006-29 = "ตอนนี้ในแพนเดโมเนียม โซไซตี้เหลือแค่คุณซัตสึกิคนเดียวค่ะ!"
2004006-30 = "จริงๆ เลย! ฉันจะฉีดให้รวดเร็วจนไม่รู้สึกว่าเจ็บเลยค่ะ รีบออกมาเถอะค่ะ!!"
2004006-31 = "อย่ามาโกหกเลย! มีด้วยเหรอการฉีดยาที่ไม่เจ็บน่ะ? ฉันแข็งแรงดี ไม่ต้องฉีดวัคซีนป้องกันอะไรหรอก กลับไปเถอะ!"
2004006-32 = "ไม่ได้หรอกค่ะ นักเรียนโรงเรียนเกเฮนน่าทุกคนต้องได้รับวัคซีนนี้ค่ะ"
2004006-33 = "อยากน้ำมูกไหลแล้วนอนป่วยบนเตียงเป็นสัปดาห์งั้นเหรอคะ?"
2004006-34 = "ฉันไม่ติดหรอก ฉันไม่เคยติดหวัดเลยสักครั้งเดียว!"
2004006-35 = "นั่นก็เพราะคุณ..."
2004006-36 = "เฮ้อ ออกมาเถอะค่ะ! กลัวเจ็บเป็นเด็กๆ ไปได้!"
2004006-42 = "อย่างที่คุณครูเห็นเลยค่ะ... สถานการณ์มันก็เป็นอย่างนี้ละค่ะ"
2004006-43 = "[s] \"เหนื่อยกันน่าดูเลยนะ...\""
2004006-46 = "[ns] \"เอ่อ... ครูขอช่วยพูดอะไรหน่อยได้มั้ย?\""
2004006-47 = "อ๊ะ คุณครู"
2004006-48 = "ได้สิคะ คุณซัตสึกิไม่ฟังที่ฉันพูดเลยค่ะ..."
2004006-49 = "ถ้างั้นก็รบกวนด้วยนะคะ"
2004006-54 = "[ns] \"ซัตสึกิ ครูเองนะ\""
2004006-56 = "ครู...? ครูจริงๆ เหรอ?"
2004006-57 = "ไม่สิ ไม่มีเหตุผลที่ครูจะมาอยู่ที่นี่หรอกน่า"
2004006-58 = "ฮุฮุ เลียนเสียงเก่งใช้ได้เลยนะ แต่ว่ากลโกงแบบนี้ใช้กับฉันไม่ได้ผลหรอก ฉันเป็นถึงหัวหน้าฝ่ายข่าว#nกรองที่ปราดเปรื่องเรื่องจิตวิทยาแห่งแพนเดโมเนียม โซไซตี้..."
2004006-59 = "[s] \"ซัตสึกิ นี่ครูจริงๆ ช่วยเปิดประตูให้หน่อยได้มั้ย?\""
2004006-60 = "......"
2004006-61 = "ครูตัวจริงเสียงจริงเหรอ?"
2004006-66 = "ครูจริงๆ ด้วย? มีธุระอะไรถึงที่นี่น่ะ..."
2004006-67 = "อ๊ะ มาเพราะข้อความใน MOMOTALK เหรอ?"
2004006-68 = "ฮุฮุ ตีความคำขอความช่วยเหลืออย่างเร่งด่วนจากฉันได้สินะ"
2004006-69 = "ตามที่ฉันบอกไปเลย ตอนนี้ฉันกำลังตกอยู่ในวิกฤตที่มาประจำทุกไตรมาส..."
2004006-70 = "เอาละ เข้ามาข้างในแล้วพาฉันหนีออกไปจากที่นี่หน่อยนะ"
2004006-71 = "[s] \"เป็นแบบนี้เพราะไม่อยากโดนฉีดยาเหรอ?\""
2004006-72 = "ใช่แล้ว ฉันไม่ชอบ!! เรียกว่าเกลียดได้เลยละ!!"
2004006-73 = "ก็ฉันไม่ชอบความเจ็บปวดนี่นา! โดยเฉพาะการฉีดยา มันเป็นความเจ็บปวดที่เลวร้ายที่สุดเลย!!"
2004006-74 = "ความรู้สึกที่มีเข็มบางๆ ที่แหลมคมทิ่มทะลุผ่านผิวอันบอบบางของฉัน..."
2004006-75 = "ความเจ็บปวดและก็ความกดดันจนทนไม่ไหวเวลากดก้านฉีดแล้วมียาอะไรก็ไม่รู้แทรกซึมเข้าสู่หลอด#nเลือดของฉัน..."
2004006-76 = "[s1] \"พอพูดอย่างนั้นมันก็ฟังดูเจ็บจริงๆ น่ะนะ แต่ทนดูสักหน่อยเถอะ!!\"\n[s2] \"แป๊บเดียวก็เสร็จแล้ว ทนเจ็บแค่หน่อยเดียวน่า นะ?\""
2004006-79 = "ครู... นี่มันไม่ใช่เรื่องที่จะมาโน้มน้าวกันได้ง่ายๆ หรอกนะ"
2004006-80 = "แล้วครูล่ะ ทนความเจ็บปวดนั้นได้เหรอ?"
2004006-81 = "มันไม่ใช่แค่ความเจ็บปวดทางกายเท่านั้นนะ ในทางจิตวิทยา ครูทนความน่ากลัวเวลาเข็มฉีดยา#nเข้ามาใกล้ๆ ผิวหนังได้เหรอ?"
2004006-82 = "ตอนโดนถูผิวในจุดที่จะถูกฉีดยาด้วยแอลกอฮอล์ ครูทนต่อความรู้สึกน่าขนลุกที่เหมือนการเตือน#nให้รู้ว่าจะเจอกับความเจ็บปวดและความสิ้นสุดของชีวิตได้งั้นเหรอ!"
2004006-83 = "[s3] \"เห็นว่าตอนนี้ในชมรมเหลือแค่ซัตสึกิคนเดียวเหรอ?\"\n[s4] \"แม้แต่น้องเล็กอย่างอิบูกิก็กล้าฉีดเลยนะ?\""
2004006-86 = "อึก มันก็จริงอยู่หรอก..."
2004006-90 = "อะไรกัน ทำไมทำหน้าแบบนั้นล่ะ?"
2004006-91 = "ก็ฉันไม่ชอบนี่! ฉันขอใช้สิทธิโดยชอบธรรมของนักเรียนในการปฏิเสธ"
2004006-92 = "ไม่มีสิทธิอะไรแบบนั้นหรอกค่ะ"
2004006-93 = "เขียนในสมุดบันทึกว่าฉีดยาฉันไปแล้วก็ได้ไม่ใช่เหรอ? แบบนั้นก็จะไม่มีใครต้องเจ็บปวดกับเรื่องนี้เลยนะ!"
2004006-94 = "จะให้ทำแบบนั้นได้ยังไงล่ะคะ! นั่นมันเป็นการโกหกนะคะ!!"
2004006-95 = "[s] \"เอ่อ วัคซีนที่ว่า... ยังมีเหลือมากกว่าหนึ่งคนหรือเปล่า?\""
2004006-96 = "อ่า ค่ะ ยังมีเหลืออยู่อีกหลายโดสค่ะ..."
2004006-97 = "[s] \"งั้นซัตสึกิมาฉีดยาพร้อมกับครูมั้ย?\""
2004006-98 = "หืม...?"
2004006-99 = "[s] \"เผื่อว่าจะทนเจ็บได้มากกว่าเดิมน่ะ\""
2004006-100 = "ครู... ไม่กลัวเข็มฉีดยาหรอกเหรอ? โดนฉีดยามันเจ็บมากๆ เลยนะ?"
2004006-101 = "[s5] \"มันก็... คงเจ็บอยู่ละนะ แต่เป็นความเจ็บแบบหารสอง...\"\n[s6] \"ถ้ามีเพื่อนฉีด ก็อาจจะน่ากลัวน้อยลงก็ได้นะ\""
2004006-104 = "มีคุณครูมาฉีดเป็นเพื่อนพร้อมกันแบบนี้ เป็นฉันคงยื่นแขนให้ฉีดแบบไม่ต้องคิดเลยค่ะ"
2004006-105 = "เงียบไปเลยนะ! ฉันกำลังคิดอยู่..."
2004006-106 = "......"
2004006-107 = "พร้อมกันนะ...?"
2004006-108 = "[s] \"อื้อ พร้อมกัน\""
2004006-110 = "อึก..."
2004006-112 = "ก็ได้"
2004006-113 = "ฉันจะยอมฉีดวัคซีน..."
2004006-114 = "[s] \"อื้อ คิดดีแล้วละ!\""
2004006-118 = "(ซัตสึกิสั่นไปทั้งตัว แต่สุดท้ายก็อดทนจนฉีดยาได้สำเร็จ...)"

[translation]
2004006-1 = "皐月在忍"
2004006-2 = "（接到皐月的聯絡後，趕忙前往了萬魔殿）"
2004006-9 = "夏萊的老師，您好。#n請問今天來有什麼事……"
2004006-13 = "啊，如果是找皐月議員的話……"
2004006-14 = "這，這個……"
2004006-15 = "[s]「發生什麼事了嗎？」"
2004006-16 = "確，確實是發生了一些事……"
2004006-20 = "[ns]「所以總而言之……」"
2004006-22 = "[ns]「皐月他因為害怕打預防針，所以躲在房裡閉門不出？」"
2004006-23 = "是的……#n雖，雖然這種事情時常發生……"
2004006-28 = "皐月議員！皐月議員！"
2004006-29 = "萬魔殿只剩下皐月議員還沒接種了哦！"
2004006-30 = "很快就會結束，真的不會痛的。#n麻煩請趕快出來！！算我拜託您了！！"
2004006-31 = "少騙人了！哪有打針不會痛的！#n不用管我沒關係，你們快走吧！"
2004006-32 = "不行，這次預防針是所有格黑娜學生都必須接種的！"
2004006-33 = "難道您真的要等到鼻涕直流，整整臥病在床一個星期才甘願嗎？"
2004006-34 = "我又不會感染！我從來沒有感冒過啊！"
2004006-35 = "那是因為您……"
2004006-36 = "沒，沒什麼！總之這不是問題所在！"
2004006-42 = "情況……就跟您見到的一樣。"
2004006-43 = "[s]「真是辛苦你們了……」"
2004006-46 = "[ns]「那個，可以讓我試著跟他談談嗎？」"
2004006-47 = "啊，老師。"
2004006-48 = "好的，因為議員他完全不聽我們的話……"
2004006-49 = "那就萬事拜託了。"
2004006-54 = "[ns]「皐月，是我。」"
2004006-56 = "……老師？真的是老師嗎？"
2004006-57 = "不對，老師怎麼會在這裡？"
2004006-58 = "呵呵，聲音還模仿得挺像的嘛。#n想用這種手段騙我是行不通的。我可是精通心理學的萬魔殿情報部部長……"
2004006-59 = "[s]「皐月，真的是我。能請你把門打開嗎？」"
2004006-60 = "……"
2004006-61 = "真的是老師嗎？"
2004006-66 = "竟然真的是老師！#n你為什麼會來這裡……"
2004006-67 = "啊，因為看到了MomoTalk嗎？"
2004006-68 = "呵呵，老師準確地察覺了我的緊急求救信號呢。"
2004006-69 = "就像你見到的一樣，我現在正身處定期造訪的空前危機之中……"
2004006-70 = "來，快點帶我逃離這裡吧。"
2004006-71 = "[s]「你是因為不想打針才這樣的嗎？」"
2004006-72 = "沒錯，就是不想！！非常不想！！"
2004006-73 = "我就是討厭痛嘛！#n尤其打針是我最最最討厭的！！"
2004006-74 = "那又細又鋒利的針頭，無情地刺穿我纖薄皮膚的感覺……"
2004006-75 = "當未知的藥物沿著針筒進入我的血管時，那種難以忍受的疼痛和壓力……"
2004006-76 = "[s1]「被你這麼一說確實感覺很痛！！」\n[s2]「不過那很快就結束了吧？要不要試著忍耐一下？」"
2004006-79 = "老師……這件事不像你說的那麼容易。"
2004006-80 = "老師能忍受那種痛苦嗎？"
2004006-81 = "我指的不僅僅是身體方面。#n在心理層面的那種……針頭逐漸逼近時的恐懼感，你能忍受嗎？"
2004006-82 = "冰冷的酒精棉擦拭著接種部位，彷彿宣告著我生命的終結與痛苦……#n那種毛骨悚然的感覺，老師有辦法忍受嗎！"
2004006-83 = "[s3]「萬魔殿就剩皐月還沒打針了是嗎？」\n[s4]「除了皐月以外的所有人都打過了吧？伊吹也是。」"
2004006-86 = "唔，是這樣沒錯……"
2004006-90 = "為什麼要露出那種表情啦！"
2004006-91 = "總之我就是不要！#n我要行使學生的拒絕權。"
2004006-92 = "根本沒有那種東西吧！？"
2004006-93 = "那直接把我的紀錄改成已接種不就好了？#n這樣就沒有人會受傷，事情也能圓滿落幕了不是嗎？"
2004006-94 = "怎麼可以呢！！這完全是造假行為啊！！"
2004006-95 = "[s]「那個，請問這次的預防針……還有備用的嗎？」"
2004006-96 = "啊，是還有一些……"
2004006-97 = "[s]「那麼皐月，要不要跟我一起打？」"
2004006-98 = "嗯……？"
2004006-99 = "[s]「我想這樣或許能幫助你忍耐。」"
2004006-100 = "老師你……不怕打針嗎？打針超痛的耶？"
2004006-101 = "[s5]「這麼嘛……痛是肯定會痛的……」\n[s6]「但如果兩個人一起的話，應該就不會那麼可怕了吧？」"
2004006-104 = "老師都這麼說了，換作是我早就接受了。"
2004006-105 = "少囉嗦！我正在考慮啦……"
2004006-106 = "……"
2004006-107 = "……你說同時嗎？"
2004006-108 = "[s]「嗯，我們同時。」"
2004006-110 = "唔唔……"
2004006-112 = "知道了。"
2004006-113 = "我會乖乖打預防針的……"
2004006-114 = "[s]「嗯，想通了就好！」"
2004006-118 = "（雖然皐月的身體一直抖個不停，但還是努力堅持到了最後……）"

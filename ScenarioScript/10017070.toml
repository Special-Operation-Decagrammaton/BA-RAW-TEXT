[translation]
10017070-1 = "第7話;暴風之丘"
10017070-2 = "咖啡廳「White&Mason」入口"
10017070-3 = "嘖，果然不是省油的燈呢……！"
10017070-4 = "不過他們也快要到極限了！#n就這樣繼續堅持下去！"
10017070-6 = "這到底是怎麼回事？"
10017070-8 = "哈哈，想知道嗎！？"
10017070-9 = "那我就大發慈悲地告訴你！#n事情很簡單！就是實現正義部搶走了我們的「炸雞」！"
10017070-10 = "然後我們利用這點，讓救護騎士團和實現正義部發生衝突！"
10017070-11 = "只是沒想到事情會這麼順利！哈哈哈！"
10017070-12 = "[s]「蓮實，你們真的搶了……他們的炸雞嗎？」"
10017070-14 = "雖然這是事實沒錯，不過老師……"
10017070-15 = "那個東西能不能被稱作是「炸雞」……我認為有很大的討論空間。"
10017070-20 = "少，少囉嗦！"
10017070-21 = "你對我們做的「地獄火炸雞」有意見嗎！"
10017070-23 = "地獄……？"
10017070-24 = "那是什麼！？"
10017070-25 = "[s]「……你剛才說是什麼炸雞？」"
10017070-27 = "我來說明吧！#n地獄火炸雞顧名思義，是考驗辣味極限的炸雞！"
10017070-28 = "不單單只有人工辣椒素！"
10017070-29 = "還加入了大量的奇普托斯最強辣椒──奇普托斯死神，史高維爾值高達220萬！"
10017070-30 = "這裡還有剩下一些！"
10017070-37 = "咦？只是用看的，眼睛就……"
10017070-38 = "嗚嗚嗚……辣到眼淚都留出來了……！"
10017070-39 = "真的耶，只是用手摸一下，好像就有股刺痛的感覺？"
10017070-40 = "哇，皮膚腫起來了！#n貼布，貼布在哪裡……！"
10017070-41 = "[ns1]「對人體的殺傷力也太強了吧！？」\n[ns2]「這已經接近有毒性的化學物質了吧……？」"
10017070-44 = "……順帶一提，這種東西沒有人會想吃。"
10017070-45 = "或者更準確地說……這東西並不能吃。"
10017070-46 = "而他們則打算把那些炸雞強行賣給路人，所以實現正義部才會出面……"
10017070-51 = "地獄火炸雞錯了嗎！？#n味覺永遠都需要新的挑戰！"
10017070-52 = "對呀對呀，格黑娜的傢伙也是這麼說的！"
10017070-54 = "總之……我們實現正義部，只是針對強迫推銷和接近味覺恐怖攻擊的行為……"
10017070-55 = "以及將自己的喜好強加於人的行徑，做出了相應的處置而已。"
10017070-56 = "同時也順帶回收了那些工業廢棄物。"
10017070-57 = "居然說我們的炸雞是工業廢棄物！？給我道歉！"
10017070-58 = "你們不只是強迫推銷，甚至還想加收其他的費用吧？"
10017070-59 = "不是，這也沒辦法吧！#n總是得把醬汁研發費和其他有的沒的費用賺回來才行！"
10017070-60 = "對啊對啊！我們也投資了不少錢，收點手續費有什麼關係！"
10017070-62 = "但是那個金額，已經超過炸雞原價的400%了吧？"
10017070-63 = "而且還用威脅的口吻說著：「敢不買的話，就讓你嚐嚐真正的地獄業火」。"
10017070-64 = "……事情就是這樣，美禰團長。"
10017070-65 = "……"
10017070-70 = "該說的都說完了吧？#n你們看起來已經兩敗俱傷了。"
10017070-71 = "我可是挺中意現在這滿目瘡痍的景象……那就繼續囉？"
10017070-72 = "果然破壞東西的時候，從內部下手就準沒錯。嘿嘿嘿……"
10017070-74 = "太，太過分了！"
10017070-75 = "我明明這麼相信大家……！"
10017070-76 = "竟然利用別人的好意，讓我們彼此爭鬥！"
10017070-77 = "而且，還是在所有人都該得到幸福的聖誕節！"
10017070-78 = "這樣就別怪聖誕老人不給你們禮物唷！"
10017070-83 = "……蛤？聖誕老人？"
10017070-84 = "看你好像還不知道就告訴你吧。#n聖誕老人是──"
10017070-86 = "不准再說下去了。"
10017070-90 = "怎，怎樣啦，突然這麼惡狠狠地盯著人看……"
10017070-91 = "真是抱歉啊，那我可要邊逃跑邊大喊：聖誕老人是不存──"
10017070-93 = "我已經請你們別再說下去了吧……！"
10017070-95 = "[ns3]「……再說下去，我可要生氣囉？」\n[ns4]「居然用這麼輕浮的態度踐踏別人的心意。」"
10017070-99 = "老，老師……！？"
10017070-100 = "原，原來能擺出這麼可怕的表情嗎……！？"
10017070-107 = "芹奈、花繪。"
10017070-109 = "團長……"
10017070-110 = "團長！"
10017070-112 = "我或許……已經沒有資格繼續擔任團長了。"
10017070-113 = "不過，即便只有現在也沒關係……能請你們助我一臂之力嗎？"
10017070-115 = "是，當然可以，團長！"
10017070-116 = "我們永遠會相信團長！"
10017070-118 = "非常感謝……那我們走吧。"
10017070-119 = "嘻嘻……"
10017070-125 = "也算我一份吧……"
10017070-130 = "咿！？"
10017070-131 = "怎麼回事！？#n他不是已經倒下了嗎！？"
10017070-132 = "我，我怎麼會知道！#n他剛才明明已經昏過去了啊！"
10017070-133 = "既然如此只能豁出去了！#n再怎麼說，他們也不是處在最佳狀態……！"
10017070-135 = "雖然不是出於本意……但從結果來看，所幸是保存了弦生這個最強戰力。"
10017070-137 = "嘰呀哈哈哈哈哈哈──！！"
10017070-138 = "來吧，讓我們結束這場鬧劇。"
10017070-140 = "胸懷榮耀和信念！"

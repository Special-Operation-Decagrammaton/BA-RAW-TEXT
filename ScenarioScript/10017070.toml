[translation]
10017070-1 = "Episode 7; Wuthering Heights"
10017070-2 = "White & Mason Entrance"
10017070-3 = "Hmph. This is harder than I thought!"
10017070-4 = "It's okay! They're almost done for! One more serious blow and we'll put them in the ground!"
10017070-6 = "Wh-What's even going on right now?"
10017070-8 = "You really wanna know? I'm sure you do!"
10017070-9 = "Fortunately for you, I love monologuing! It's simple! The Justice Task Force did, in fact, steal our chicken!"
10017070-10 = "And we used that absolutely true statement to pit the Remedial Knights against the Justice Task Force!"
10017070-11 = "I didn't expect it to go this well, though. Hahaha!"
10017070-12 = "[s] \"Hasumi, did you really steal their chicken?\""
10017070-14 = "We took something that they called chicken, Sensei, yes..."
10017070-15 = "But I don't know if it actually counted as chicken."
10017070-20 = "D-Don't you slander our chicken!"
10017070-21 = "Yeah! Don't you dare disrespect the creativity that went into our Hellfire Chicken!"
10017070-23 = "Hell... What?"
10017070-24 = "Your what?!"
10017070-25 = "[s] \"I'm sorry, could you say that again?\""
10017070-27 = "You're already impressed! As you should be! The Hellfire Chicken tests the physical bounds of spiciness itself!"
10017070-28 = "Without a single drop of artificial capsaicin!"
10017070-29 = "Right! Instead, we reached the heights of 2.2 million Scoville by using the infamous Kivotos Reaper, the most mouth-destroying pepper in all Kivotos!"
10017070-30 = "I brought the last bits of Hellfire Chicken we had left. Want to check it out?"
10017070-37 = "Oh! I feel my eyes burning just from looking at it."
10017070-38 = "Ugh... I'm tearing up. *sniffle*"
10017070-39 = "Hey, is it bad that I touched it and now feel a tingling sensation in my hand?"
10017070-40 = "Whoa! My skin is swelling up! Cooling patches! Where are the cooling patches?!"
10017070-41 = "[ns1] \"I can feel my taste buds burn up just by smelling it!\"\n[ns2] \"Does this count as biological warfare?!\""
10017070-44 = "Obviously, no one wanted to eat it."
10017070-45 = "Or should I say, no one was able to eat it."
10017070-46 = "Even then, we didn't take action until they started pressuring passersby into buying the chicken."
10017070-51 = "Th-They just didn't understand the art of Hellfire Chicken! We were just trying to challenge their preconceived notions and their taste buds!"
10017070-52 = "Even some Gehenna student agreed!"
10017070-54 = "Naturally, the Justice Task Force had to put a stop to their intimidation tactics and culinary acts of terror."
10017070-55 = "We had to punish them for literally forcing their tastes onto pedestrians."
10017070-56 = "And of course, we thought we might as well get rid of the industrial waste they called chicken."
10017070-57 = "Industrial waste?! Apologize to the spirit of Hellfire Chicken!"
10017070-58 = "You tried to extort people!"
10017070-59 = "Well, I mean, you gotta cover costs, you know? Sauce R&D, sourcing ingredients, comp for workplace accidents..."
10017070-60 = "Yeah! We're investors! In cutting-edge chicken technology! It's only fair for us to net a profit!"
10017070-62 = "A profit that exceeds four-hundred percent of your costs?"
10017070-63 = "And what about telling people, \"If you don't want to feel the burn of this chicken, I'll burn you instead\"?"
10017070-64 = "As you can see, Captain Mine, all that was the real issue."
10017070-65 = "..."
10017070-70 = "Are we done talking? Can we get to the fun part? Both the Justice Task Force and the Remedial Knights are in shambles now."
10017070-71 = "We've waited long enough. Should we let them start, or should we kick it off ourselves?"
10017070-72 = "Honestly, divide and conquer strategies are just so fun, you know?"
10017070-74 = "How callous!"
10017070-75 = "W-We trusted you!"
10017070-76 = "You took advantage of our good will to start a fight!"
10017070-77 = "And on Christmas, a day when everyone should be happy! You're the worst!"
10017070-78 = "The only thing you're getting from Santa Claus is a lump of coal!"
10017070-83 = "I'm sorry, what? Do you actually still believe in Santa?"
10017070-84 = "Oh, awesome, another chance to monologue. Santa—"
10017070-86 = "That's enough."
10017070-90 = "What? Stare daggers at me all you want, I'm not scared of someone like you!"
10017070-91 = "I'll make you run away crying! And I'll be shouting the truth about Santa behind you!"
10017070-93 = "I told you to stop!"
10017070-95 = "[ns3] \"Please don't make Serina and Hanae any angrier.\"\n[ns4] \"Taking advantage of good will... I can't stand that either!\""
10017070-99 = "Um, Sensei?"
10017070-100 = "Th-That face!"
10017070-107 = "Serina, Hanae."
10017070-109 = "Captain..."
10017070-110 = "Captain!"
10017070-112 = "I'm not sure I deserve that title right now."
10017070-113 = "But I need your help. Can you do that for me?"
10017070-115 = "Yes! Of course, Captain!"
10017070-116 = "We'll always believe in you, Captain!"
10017070-118 = "Thank you. Shall we get started?"
10017070-119 = "Krraaaggh..."
10017070-125 = "Me...too..."
10017070-130 = "E-Eeee!"
10017070-131 = "Wh-What's going on? I thought she collapsed during the fight!"
10017070-132 = "I-I have no clue! She looked exactly like a passed out newborn anteater just a moment ago!"
10017070-133 = "We've got no choice but to deal with it! I'm sure she's at least banged up!"
10017070-135 = "...In the end, our most valuable weapon, Tsurugi, was preserved. Albeit unintentionally."
10017070-137 = "Kekekekeke!"
10017070-138 = "Time to put an end to this nonsense!"
10017070-140 = "Go forth with faith and honor in your heart!"

[translation]
10017070-1 = "ตอนที่ 7;เนินเขามรสุม"
10017070-2 = "ทางเข้าคาเฟ่ <ไวท์&เมสัน>"
10017070-3 = "ไม่ง่ายดายจริงๆ ด้วยแฮะ...!"
10017070-4 = "ไม่เป็นไร! เจ้าพวกนั้นก็ใกล้จะไม่ไหวแล้ว! ถ้าเราโจมตีจังๆ ได้อีกครั้งหนึ่งก็ปิดจ๊อบได้!"
10017070-6 = "นะ... นี่มันอะไรกันคะเนี่ย?"
10017070-8 = "อยากรู้เรอะ? ก็คงอยากรู้แหละ! ต้องเป็นแบบนั้นอยู่แล้ว!"
10017070-9 = "ถ้าอยากรู้ฉันก็คงต้องอธิบายให้ฟัง! ไม่มีอะไรซับซ้อนหรอก! ก็ชมรมทวงความยุติธรรมแย่งไก่ทอด#nของพวกเราไป!"
10017070-10 = "เราก็เลยใช้เรื่องนั้นในการทำให้ชมรมอัศวินบรรเทาทุกข์กับชมรมทวงความยุติธรรมมาขัดแย้งกันเอง!"
10017070-11 = "ถึงจะไม่ได้หวังว่าพวกเธอจะเคลื่อนไหวกันอย่างนี้แต่แรกก็เถอะ วะฮ่ะฮ่ะฮ่า!"
10017070-12 = "[s] \"ฮาสุมิ แย่งไก่ทอดเด็กพวกนี้ไป... จริงเหรอ...?\""
10017070-14 = "ใช่แล้วค่ะคุณครู แต่ว่า..."
10017070-15 = "แต่ว่าเราต้องมาถกเถียงกันค่ะว่ามันคือ... วัตถุที่เรียกว่า 'ไก่ทอด' ได้จริงๆ หรือเปล่าค่ะ"
10017070-20 = "ละ... แล้วจะทำไมล่ะ!"
10017070-21 = "เธอกำลังดูถูกความคิดสร้างสรรค์ของไก่ทอดสูตรเผ็ดนรกที่พวกเราทำเรอะ!?"
10017070-23 = "สูตร... อะไรนะคะ?"
10017070-24 = "นรก... เหรอคะ?!"
10017070-25 = "[s] \"เมื่อกี้พูดว่าไก่ทอดอะไรนะ...?\""
10017070-27 = "ฉันอธิบายให้! ไก่ทอดสูตรเผ็ดนรกคือไก่ที่เอาไว้ทดสอบขีดจำกัดของความเผ็ด!"
10017070-28 = "แต่เราไม่ได้ใช้แค่แคปไซซินสังเคราะห์หรอกนะ!"
10017070-29 = "เราเลือกใส่พริกที่เผ็ดที่สุดในคิโวทอสอย่าง 'คิโวทอส รีปเปอร์' เพื่อชูความเผ็ดถึง 2,200,000 SHU ยังไงล่ะ!"
10017070-30 = "ฉันเอาไก่ทอดสูตรเผ็ดนรกที่เหลือมาด้วยกล่องหนึ่ง ถ้าอยากรู้ว่าเป็นยังไงก็มาดูกับตาเลย!"
10017070-37 = "หืม? แค่มองเฉยๆ ไอความเผ็ดก็ลอยมาปะทะลูกตาเลยค่ะ"
10017070-38 = "งือ... น้ำตาจะไหลออกมาให้ได้เลย... (สะอื้น)"
10017070-39 = "จริงด้วยค่ะ แค่เอามือแตะก็รู้สึกถึงความเผ็ดร้อนบนผิวหนังแล้วค่ะ"
10017070-40 = "ว้าย! ผิวเริ่มบวมแล้วค่ะ! แผ่นแปะ... แผ่นแปะอยู่ไหนนะ...?"
10017070-41 = "[ns1] \"แค่ได้กลิ่นก็แสบจมูกแล้ว!\"\n[ns2] \"นี่มันไม่ใช่อาหาร แต่เป็นสารเคมีที่เป็นพิษหรือเปล่า...?\""
10017070-44 = "ฉันขอบอกอีกอย่างว่า... ไม่มีใครอยากกินไก่นี้ด้วยหรอกค่ะ"
10017070-45 = "ควรจะบอกว่าไม่อยากกิน หรือมันกินไม่ได้ดีล่ะคะ?"
10017070-46 = "พวกคุณเคี่ยวเข็ญให้คนที่เดินผ่านไปมาซื้อไก่นรกอะไรนั่น ชมรมทวงความยุติธรรมก็เลยต้องออก#nปฏิบัติการ..."
10017070-51 = "ทำไมต้องเป็นไก่ทอดสูตรเผ็ดนรกด้วยน่ะเหรอ! รสชาติน่ะมันก็ต้องการความท้าทายใหม่ๆ อยู่เสมอไงละ!"
10017070-52 = "เด็กนักเรียนคนหนึ่งในเกเฮนน่าก็เคยพูดไว้อย่างนี้นะ!"
10017070-54 = "แต่ยังไงสิ่งที่พวกคุณทำก็คือการบังคับให้ซื้อและก่อการร้ายทางอาหาร..."
10017070-55 = "ชมรมทวงความยุติธรรมเลยเข้าไปทำโทษที่พวกคุณบังคับให้คนอื่นมีรสนิยมทางอาหารเหมือนตัวเอง#nก็เท่านั้นค่ะ"
10017070-56 = "และไหนๆ แล้ว ก็เลยเก็บขยะเศษอาหารหรือขยะอุตสาหกรรมนั้นมาด้วยค่ะ"
10017070-57 = "ขยะเศษอาหาร?! ขยะอุตสาหกรรม?! ขอโทษพวกเราเดี๋ยวนี้นะ!"
10017070-58 = "พวกคุณคิดจะขายแพงๆ ด้วยการบวกนู่นบวกนี่เข้าไปด้วยนี่คะ?"
10017070-59 = "เอ่อ... ก็... ก็ต้องรับค่าเหนื่อยไม่ใช่รึไง? อย่างเช่นค่าพัฒนาซอสเผ็ด หรือค่าจิปาถะอื่นๆ... "
10017070-60 = "ใช่! พวกเราลงทุนไปมหาศาลเลยนะ! จะขอเก็บค่าธรรมเนียมเพิ่มอีกนิดหน่อยจะเป็นอะไรไป!"
10017070-62 = "แล้วจำเป็นต้องเก็บค่าธรรมเนียมแพงกว่าต้นทุนไก่ทอดนั้นถึง 400% เลยเหรอคะ?"
10017070-63 = "แล้วใครกันคะที่พูดข่มขู่ว่า \"ถ้าไม่ซื้อไก่ทอด ฉันจะทำให้ไม่มีฟันไว้กินไก่ทอดอีกตลอดไปเลย หึหึหึ\""
10017070-64 = "...เรื่องมันก็เป็นอย่างนี้แหละค่ะ หัวหน้ามิเนะ"
10017070-65 = "......"
10017070-70 = "เอาเถอะ สรุปว่าคุยกันจบแล้วใช่ไหม? แต่ละคนสภาพดูไม่ได้เลย ทั้งชมรมทวงความยุติธรรม ทั้งชมรมอัศวินบรรเทาทุกข์"
10017070-71 = "รอจนเหนื่อยแล้วเนี่ย ถ้าคุยจบแล้ว พวกฉันจะได้เริ่มทำอะไรได้ตามใจชอบสักที"
10017070-72 = "ชักจูงให้เกิดการทะเลาะวิวาทกันเองเป็นกลยุทธ์ที่ใช้ได้ทุกงานเลยนะ เฮอะ สนุกเป็นบ้าเลย"
10017070-74 = "ทำเกินไปแล้วนะคะ!"
10017070-75 = "ฉันอุตส่าห์... เชื่อใจพวกคุณนะคะ...!"
10017070-76 = "ใช้ความปรารถนาดีของพวกเราเป็นเครื่องมือให้เราสู้กันเองงั้นเหรอคะ...!  "
10017070-77 = "มาหลอกลวงกันในวันคริสต์มาสที่ทุกคนต้องมีความสุขแบบนี้! นิสัยไม่ดีเลยค่ะ!"
10017070-78 = "แบบนี้ซานตาคลอสไม่ให้ของขวัญแน่นอนค่ะ!"
10017070-83 = "อะไรกัน ยังเชื่อว่าซานต้ามีอยู่จริงอีกเรอะ?"
10017070-84 = "สงสัยจะยังไม่รู้สินะ งั้นฉันจะสงเคราะห์ให้ ซานต้าน่ะ..."
10017070-86 = "ช่วยหยุดพูดด้วยค่ะ..."
10017070-90 = "อึก? อะ... อะไรของเธอเนี่ย? ถึงจะมาจ้องตาถลนแบบนั้น พวกฉันก็ไม่กลัวสักนิดหรอกเฟ้ย!"
10017070-91 = "เดี๋ยวทำให้ต้องร้องไห้หนีไปเลย! แล้วก็จะตะโกนเสียงดังให้รู้ไปเลยว่าจริงๆ แล้วตัวตนของซานต้าเป็น#nยังไง!"
10017070-93 = "ฉันขอแล้วใช่ไหมคะว่าให้หยุดพูดแค่ตรงนั้น...!"
10017070-95 = "[ns3] \"อย่าทำให้เซรินะกับฮานาเอะโมโหเลย เตือนแล้วนะ\"\n[ns4] \"ใช้ความปรารถนาดีเป็นเครื่องมือ... แบบนี้ยอมให้ไม่ได้...!\""
10017070-99 = "ฮะ... เฮือก? ครู...?"
10017070-100 = "ดะ... ดูทำหน้าเข้าสิ...!"
10017070-107 = "เซรินะ ฮานาเอะ"
10017070-109 = "หัวหน้า..."
10017070-110 = "หัวหน้า!"
10017070-112 = "ฉันไม่รู้หรอกนะคะว่าตัวเองมีคุณสมบัติในการเป็นหัวหน้าเพียงพอหรือเปล่า"
10017070-113 = "แต่ยังไงก็ตาม... ตอนนี้... ขอให้ฉันได้ยืมพลังของทั้งสองคนได้ไหมคะ?"
10017070-115 = "ค่ะ! ได้อยู่แล้วค่ะหัวหน้า!"
10017070-116 = "พวกฉันเชื่อมั่นในตัวหัวหน้าทุกเมื่อเลยค่ะ!"
10017070-118 = "ขอบคุณค่ะ ถ้างั้นก็ ไปลุยกันเลยค่ะ"
10017070-119 = "เคี๊ยกกก..."
10017070-125 = "ขอแจมด้วยสิ..."
10017070-130 = "เฮืออออกก?!!"
10017070-131 = "นะ... นี่มันอะไรกัน! ไม่ได้สู้กันเองจนสลบไปแล้วเหรอ?!"
10017070-132 = "ถามฉันแล้วฉันจะไปถามใครเล่า! เมื่อกี้ยังเห็นว่านอนเป็นผักกันอยู่เลยนี่หว่า?!"
10017070-133 = "ไม่มีอะไรมาหยุดยั้งเราได้หรอก! ถึงพวกนั้นจะเก่งแค่ไหน ก็ไม่ได้อยู่ในสภาพพร้อมที่จะต่อสู้หรอกน่า!"
10017070-135 = "แต่สุดท้ายแล้ว... เราก็ยังมีพลังที่สำคัญที่สุดที่ได้ชื่อว่าซึรุกินะคะ"
10017070-137 = "วะฮ่ะฮ่ะฮ่ะฮ่ะฮ่า!"
10017070-138 = "เพื่อยุติความวุ่นวายที่น่าเบื่อหน่ายนี้!"
10017070-140 = "ยึดมั่นในศรัทธาและความภาคภูมิใจ!"

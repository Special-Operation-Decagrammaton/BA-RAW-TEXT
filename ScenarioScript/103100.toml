[translation]
103100-1 = "Episode 10;To the Sky"
103100-12 = "Sensei, I have good news!"
103100-13 = "I'll start with the most important information..."
103100-14 = "I completed the operator outfits in time!"
103100-15 = "[s] \"Wh-Whoa?! I'm impressed!\""
103100-31 = "[ns] \"These are the operator uniforms!\""
103100-33 = "Um... Is this uniform mandatory?"
103100-34 = "Yeah! We're intergalactic battleship operators! There was a strict request that we follow the rules of the genre, so..."
103100-36 = "And just whose request was that?"
103100-37 = "It's technically not even a battleship, let alone an intergalactic one."
103100-38 = "*sigh* ...What am I doing here?"
103100-39 = "Heh... You gotta accept your fate. You have the ability to memorize that thick manual, so you happen to be here. That's just your luck."
103100-41 = "Rin... That coat looks good on you."
103100-45 = "Why is mine different from the rest?"
103100-46 = "[s] \"You're the captain, so obviously, you need a longer coat!\""
103100-47 = "..."
103100-48 = "Hahaha... I can wear this for a short amount of time, but..."
103100-49 = "Heehee. The people gathered here are in charge of the important role of calculating and verifying the multidimensional analysis."
103100-50 = "Such important roles require special clothes. It's not just a uniform. It detects physical conditions such as your brain waves and pulse so that you can perform your duties without any issues."
103100-51 = "Various functions such as flame retardancy, explosion prevention, and waterproofing have also been added. In other words, it's operator-exclusive equipment."
103100-53 = "It sounds like a remote control with a bunch of extra useless functions."
103100-54 = "Do we really need a waterproof uniform...?"
103100-55 = "There, there, everyone. What's done is done, and we're on a tight schedule. Let's begin."
103100-57 = "...Right."
103100-64 = "We will be boarding Utnapishtim's Ship to infiltrate the Ark of Atrahasis, 75,000 meters above Kivotos."
103100-65 = "Our objective is to occupy the Ark, disable it, and return safely to the ground."
103100-66 = "The following people will participate in this operation."
103100-71 = "The operators are Urawa Hanako, Amau Ako,"
103100-75 = "Okusora Ayane, Hayase Yuuka,"
103100-79 = "Onikata Kayoko, Akeboshi Himari,"
103100-83 = "Our operators are Yuraki Momoka and Iwabitsu Ayumu."
103100-87 = "...And I, Nanagami Rin, will work with Sensei to manage Utnapishtim's Ship."
103100-88 = "[s] \"Looking forward to working with you, everyone!\""
103100-89 = "After the Utnapishtim's Ship departs, the following people will be in charge of air traffic control and technical support."
103100-94 = "Veritas' Otose Kotama and Omagari Hare of Millennium."
103100-98 = "Konuri Maki, Kagami Chihiro, and..."
103100-102 = "...the Engineering Department's Nekozuka Hibiki, Shiraishi Utaha, and Toyomi Kotori."
103100-104 = "Next, after entering the Ark, the following people will help defend against possible raids and support the occupation."
103100-109 = "The Abydos Foreclosure Task Force's Takanashi Hoshino, Kuromi Serika, and Izayoi Nonomi."
103100-110 = "Ahaha. Looking forward to working with you all."
103100-111 = "Heh. Leave it to us."
103100-112 = "We're gonna kick some Chroma butt!"
103100-113 = "Yup, yup! We're going to rescue Shiroko."
103100-115 = "Yes. Members of the Foreclosure Task Force have also volunteered to secure the safety of Sunaookami Shiroko."
103100-116 = "Also..."
103100-123 = "Tendou Aris from the Game Development Department, who has the railgun, is the only person with a weapon on this ship. And..."
103100-131 = "Saiba Momoi, Saiba Midori, and Hanaoka Yuzu will support the occupation and provide backup as needed."
103100-132 = "P-Pleasure to work with you..."
103100-134 = "*sigh* ...Oh, well. I guess I'll have to take care of them."
103100-135 = "No horsing around. Your safety is the priority, got that?"
103100-137 = "And lastly..."
103100-138 = "Huh? Wasn't that everyone?"
103100-151 = "Aikiyo Fuuka of the Gehenna School Lunch Club...and the Gourmet Research Society will be in charge of meals."
103100-152 = "Hold up! Wait! This isn't right! At all!"
103100-154 = "Heeheehee. I'm looking forward to working with everyone."
103100-155 = "Both how and why am I here?!"
103100-156 = "I belong in the cafeteria! Not in an intergalactic battleship!"
103100-157 = "I mean, I understand. I'm here to provide meals. But how come the Gourmet Research Society is here instead of Juri?"
103100-158 = "Heeheehee. Isn't it obvious, Fuuka?"
103100-159 = "Because this is a chance to eat something we can't normally eat."
103100-161 = "We can't normally eat...?"
103100-162 = "Yes, the reason we're here is the same as always."
103100-163 = "It's to explore gastronomy!"
103100-164 = "We're here to find out how delicious food tastes in space!"
103100-168 = "Exactly what she said! Eating food in space... That's so special! An opportunity like that doesn't come every day!"
103100-169 = "In space movies, people are always drinking floating juice droplets with a straw. I've always wanted to try that."
103100-171 = "And we don't need any other reason! ★"
103100-173 = "Yes. Space food is a special kind of food that assumes weightlessness."
103100-174 = "There are many things to consider, such as the handling of liquids, a special environment where cooking is impossible, and the sterilization process to prevent possible mutations."
103100-175 = "And so..."
103100-180 = "That's why you're here, Fuuka!"
103100-185 = "But why does it have to be me?!"
103100-186 = "We have the School Lunch Club truck here just in case. We need you, Fuuka!"
103100-187 = "What?! The School Lunch Club truck...? How did you even manage that?!"
103100-188 = "Be proud of yourself. Together, we've ventured into mountains and rivers, and now we're going to space!"
103100-189 = "Right! There's no other truck that's gotten to experience zero gravity!"
103100-190 = "None of these experiences have been of my own free will... I don't need this..."
103100-191 = "[s1] \"(...)\"\n[s2] \"(We won't be high enough to experience zero gravity though.)\""
103100-196 = "Sensei. I heard that the only way to pilot Utnapishtim's Ship was through the power of Sanctum Tower."
103100-197 = "That was why Kaiser PMC tried to occupy Sanctum Tower right after excavating the ship."
103100-198 = "With the Sanctum Tower destroyed, as the owner of the Shittim Chest, operating the ship falls upon you, Sensei."
103100-199 = "[s] \"Yes. I know..\""
103100-200 = "As usual, we'll be counting on you."
103100-202 = "You're right. I can awaken this artifact with my abilities."
103100-203 = "However... This is different from other artifacts. I'll be okay, but.."
103100-204 = "Sensei... The power of this artifact will be delivered directly to the owner of the Shittim Chest. To you."
103100-205 = "[s] \"It's okay, Arona.\""
103100-206 = "S-Sensei, you have a normal human body! A single bullet can threaten your life! This is...!"
103100-207 = "[s] \"And haven't you protected me every time, Arona?\""
103100-208 = "B-But... This is on a totally different scale!"
103100-212 = "Please reconsider, Sensei. The load your human body will be forced to carry... It's..."
103100-214 = "...But I must warn you."
103100-215 = "[USERNAME] Sensei, once you do this, your body will receive irreversible damage."
103100-216 = "You won't be able to revert to your prior state...and you may even die."
103100-217 = "You're still willing to move forward?"
103100-218 = "Even knowing this could end in your death?"
103100-223 = "[ns] \"It'll be okay, Arona. Please do it.\""
103100-227 = "Sensei... Wh-Why? To what ends?"
103100-229 = "...Why would you do this?"
103100-230 = "You can't stop the destruction. According to my analysis, this future has been set in stone from even before your time."
103100-231 = "From the moment Sunaookami Shiroko came into existence into this world, its fate was determined."
103100-232 = "Time is not a continuous line. It only repeats in predetermined causes and effects."
103100-233 = "We're simply chess pieces within a deterministic world."
103100-234 = "..."
103100-235 = "Sensei, if you truly wanted to stop this..."
103100-236 = "You should have traveled to the past and eliminated Sunaookami Shiroko. Heehee. Cause and effect."
103100-240 = "You said I'd never understand you, and you were right. I find you utterly incomprehensible."
103100-241 = "Do you really think this fruitless struggling can change a predetermined future? Why do you believe in the impossible?"
103100-242 = "I don't understand. So allow me to ask again."
103100-247 = "Why do you fight?"
103100-251 = "[ns] \"...\""
103100-253 = "[ns3] \"As an adult, I protect children. As a teacher, I fight for my students.\"\n[ns4] \"I have to fulfill the responsibilities of an adult and the duties of a teacher.\""
103100-257 = "...No matter what you have to do?"
103100-258 = "No matter what it takes?"
103100-259 = "[s5] \"No matter what I have to do.\"\n[s6] \"No matter what it takes.\""
103100-262 = "..."
103100-263 = "Are you going to save your students, [USERNAME] Sensei?"
103100-268 = "[ns] \"Now you get it.\""
103100-271 = "S-Sensei?"
103100-275 = "[ns] \"...Rin. I have something I want to ask you.\""
103100-276 = "Huh? Oh, yes. What is it?"
103100-277 = "[s] \"It's about the second koan.\""
103100-281 = "You mean, \"By understanding the incomprehensible, can we understand?\" The question from the General Student Council president?"
103100-282 = "[s] \"...What did you insert as the object, Rin?\""
103100-283 = "...Is that important right now?"
103100-284 = "Well, at the time... I..."
103100-285 = "..."
103100-290 = "...Rin."
103100-295 = "Maybe we'll never truly understand each other."
103100-296 = "Maybe I'm that kind of a person to you...an incomprehensible mystery..."
103100-297 = "We have no choice to follow our parallel paths forever, never crossing each other."
103100-298 = "Maybe that's the point of this world."
103100-300 = "...But I think that's okay."
103100-301 = "Even if we never understand each other..."
103100-302 = "Even if we're only unsubstantial rumors to each other..."
103100-303 = "Even if we're like wind blowing between isolated islands that can never reach each other..."
103100-305 = "That's why I liked the way you completed the question, Rin."
103100-306 = "I'll cherish it. Forever."
103100-307 = "Yes..."
103100-312 = "By understanding the incomprehensibility of others, can we understand ourselves?"
103100-319 = "Can I answer you when we return to land?"
103100-320 = "[s] \"Yes. That's all I needed. Thank you.\""
103100-325 = "[ns] \"Then... This is it, isn't it?\""
103100-333 = "[ns] Connect the Shittim Chest to Utnapishtim's power supply."
103100-339 = "Main power activation confirmed!"
103100-348 = "Main control system operation complete...!"
103100-349 = "Checking the communication system for each zone, checking the calculation system... All clear. We're following the manual to a T!"
103100-358 = "Engine system clear."
103100-359 = "Checking the multidimensional analysis system. All clear!"
103100-368 = "Checking all control systems. All clear. All right, everything is functional!"
103100-369 = "Ready to take off on your command!"
103100-370 = "Sensei, we await your orders!"
103100-371 = "[ns7] \"Utnapishtim's Ship, take off!\"\n[ns8] \"Intergalactic battleship Utnapishtim, take off!\""
103100-381 = "Utnapishtim's Ship is departing!"
103100-396 = "Altitude rising. Currently at 780 meters...!"
103100-397 = "What about multidimensional analysis? Now?"
103100-399 = "Calculations have been finished, Hanako."
103100-400 = "Calculations complete! Starting the multidimensional analysis!"
103100-406 = "[ns9] \"...!!!\"\n[ns10] \"(My body... Ugh..!\")"
103100-409 = "...Sensei?"
103100-410 = "Sensei? What's wrong? You look unwell!"
103100-411 = "Oh... Sensei is shaking. Why are you sweating so much? ...Sensei?"
103100-412 = "[s] \"It's just motion sickness. Don't worry.\""
103100-413 = "...I'm sorry. Please hang on."
103100-414 = "System is operating normally!"
103100-415 = "Currently, Utnapishtim's Ship is in the same quantum superposition state."
103100-416 = "I still don't really get what that means."
103100-417 = "...It means we exist simultaneously in all possible universes."
103100-418 = "That's if there are parallel universes, right?"
103100-419 = "Hahaha... I hope a dimensional paradox doesn't happen..."
103100-420 = "It's okay. If that happens, we'll just be a meteor in the sky."
103100-422 = "Focus, everyone! Please set the target route!"
103100-423 = "Calculating the route to the Ark of Atrahasis at the target altitude of 75,000 meters... Setup complete."
103100-431 = "Wow, it's shaking so much..."
103100-432 = "H-Hold on a little longer, Sensei."
103100-434 = "We're going to rapidly accelerate to the Ark of Atrahasis now."
103100-435 = "Whoa! Everyone, hold on tight...! According to the manual, the speed is gonna be out of this world!"
103100-437 = "Accelerate, max output!"
103100-441 = "All right, let's see the artifact's performance! I'm excited."
103100-461 = "W-Waaaahhhh?!"
103100-462 = "A-Are you okay, Yuuka?!"
103100-463 = "I-I'm okay. I managed to hold on."
103100-464 = "What incredible acceleration..."
103100-467 = "Th-The wave value of the multidimensional analysis is unstable! Much more so than expected!"
103100-469 = "...No, we haven't crossed the critical point yet. Our calculations are still okay."
103100-471 = "However, it's going to be a rough ride. Will the ship hold up under the pressure?"
103100-475 = "[ns] \"(I'm going to pass out...)\""
103100-477 = "[ns] \"(I can't...feel my limbs anymore...)\""
103100-491 = "Do you really think this fruitless struggling can change a predetermined future? Why do you believe in the impossible?"
103100-499 = "[ns] \"(This place is...?)\""
103100-501 = "[ns] \"(It feels familiar...nostalgic...)\""
103100-510 = "Next Episode; The Start of the Story"

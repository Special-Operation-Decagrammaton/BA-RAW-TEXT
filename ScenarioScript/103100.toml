[translation]
103100-1 = "第10話;前往天上遙遠的彼方"
103100-12 = "老師，我有一個好消息。"
103100-13 = "那就是──"
103100-14 = "操作員服裝的製作，趕上了唷。"
103100-15 = "[s]「哦哦……！？」"
103100-31 = "[ns]「這就是操作員的服裝啊！！」"
103100-33 = "那個……這個真的有必要嗎？"
103100-34 = "唔呵呵♡因為收到了宇宙戰艦的操作員必須遵守類型規則的強烈要求……"
103100-36 = "那是誰的要求啊。"
103100-37 = "那個……不是已經得出，這不是宇宙戰艦的結論了嗎……"
103100-38 = "唉……為什麼連我也得……"
103100-39 = "哎呀哎呀，就接受命運吧。#n可以記住那～麼厚的操作手冊，並且還登上了這艘船，算你運氣不好唷。"
103100-41 = "琳前輩……大衣很適合您。"
103100-45 = "……為何只有我的設計不同呢？"
103100-46 = "[s]「因為琳是[ruby=艦長]船長[/ruby]呀！一定得穿長大衣吧！！」"
103100-47 = "唉……"
103100-48 = "啊，啊哈哈……只穿一陣子的話我覺得還不錯……"
103100-49 = "呵呵……在場的各位擔任著計算與驗證多次元詮釋的重要角色。"
103100-50 = "順帶一提，這套服裝會記錄使用者的腦波與脈搏等等身體狀況──#n甚至還有輔助使用者能順利執行任務的功能哦。"
103100-51 = "除此之外還加入了防火、防爆、防水之類──各式各樣的功能。#n請當成是「操作員的專屬裝備」吧♪"
103100-53 = "……不是「只有一堆多餘功能的遙控器」？"
103100-54 = "防水功能……？#n有什麼意義嗎？"
103100-55 = "好了好了♡時間不多了，別在意那些細節，進入正題吧。"
103100-57 = "……也對。"
103100-64 = "現在起，我們將搭乘「生命守護者本艦」，#n突入位於奇普托斯上空75,000m的「阿特拉哈西斯的方舟」……"
103100-65 = "必須占領方舟、使其機能無效化──並且安全回到地面。"
103100-66 = "現在開始點名──"
103100-71 = "操作員浦和花子、天雨亞子。"
103100-75 = "操作員奥空綾音、早瀬優香。"
103100-79 = "操作員鬼方佳世子、明星陽葵。"
103100-83 = "操作員由良木桃香、岩櫃步。"
103100-87 = "……以及我「生命守護者本艦」的總負責人──七神琳。"
103100-88 = "[s]「拜託大家了。」"
103100-89 = "「生命守護者本艦」出航後，留在地上負責航空控管與技術支援的是──"
103100-94 = "千年科學學園．貝里塔斯的音瀬小玉、小鈎晴。"
103100-98 = "小塗真紀、各務千尋。以及──"
103100-102 = "工程師部的猫塚響、白石詠葉、豊見亞都梨。"
103100-104 = "突入方舟後，負責提防襲擊，協助支援的是──"
103100-109 = "阿拜多斯對策委員會的小鳥遊星野、黑見茜香、十六夜野乃美。"
103100-110 = "拜，拜託各位了……！"
103100-111 = "OK～包在我身上。"
103100-112 = "很好！準備萬全了！"
103100-113 = "嗯嗯！大家一起去救白子醬吧☆"
103100-115 = "是的。為了確保砂狼白子的安全，對策委員會的各位自願協助了我們。"
103100-116 = "接著……"
103100-123 = "是目前這艘船唯一的武裝．電磁砲的持有者，遊戲開發部的天童愛麗絲──"
103100-131 = "以及才羽桃井、才羽綠、花岡柚子……#n以上4名成員將支援占領，並協助應對突發狀況。"
103100-132 = "請，請多多指教……"
103100-134 = "唉……真沒辦法，我來照顧你們吧。"
103100-135 = "……絕對不要勉強唷。安全最重要，知道了嗎？"
103100-137 = "最後──"
103100-138 = "嗯～？還有嗎？"
103100-151 = "負責餐點的格黑娜．供給部的愛清風華……以及美食研究會。"
103100-152 = "等一下等一下！這個發展也太奇怪了吧！？"
103100-154 = "唔呵呵，各位，請多多指教哦。"
103100-155 = "不是，為什麼我會在這裡啊！？"
103100-156 = "真是莫名其妙……宇宙戰艦是什麼啊！？"
103100-157 = "退一百步來說，如果是為了準備料理我還能理解……#n既然如此，為什麼來的不是茱莉而是美食研究會啊？"
103100-158 = "呵呵……那還用問嗎？"
103100-159 = "享用一生都不見得有機會品嘗到的料理的機會──就在眼前啊。"
103100-161 = "一生都不見得……？"
103100-162 = "沒錯。我們行動的理由永遠不會改變──"
103100-163 = "那就是追求美食！"
103100-164 = "──在宇宙中吃的食物會有多麼美味呢？"
103100-168 = "就是呀～！能在宇宙中吃飯的機會，也許再也不會出現了不是嗎！"
103100-169 = "在電影裡看過的那種用吸管吸飄浮在空中液體的場景，我早就想體驗看看了。"
103100-171 = "一定會很～有趣★"
103100-173 = "沒錯──所謂的宇宙食物，就是為無重力狀態製作的特別的食物。"
103100-174 = "對液體的處理，無法烹飪的特殊環境，防止食物中毒的殺菌過程等等……#n必須考慮的因素非常多，是非常深奧的類型。"
103100-175 = "因此……"
103100-180 = "風華同學才會在這裡！！"
103100-185 = "為什麼是我啊──！？"
103100-186 = "為了以防萬一，供給部的卡車也一起帶來了哦★#n所以風華同學也得一起來才行。"
103100-187 = "咦，連供給部的卡車也……！？#n是，是什麼時候……！？"
103100-188 = "多拿出一點自信吧。#n高山、河川……現在還要前往宇宙哦？這種體驗可不是常常有的。"
103100-189 = "對呀對呀！從來沒有看過經驗這麼豐富的卡車！這次可是無重力唷！？"
103100-190 = "不……那種經驗不要也罷……"
103100-191 = "[s1]（…………）\n[s2]（雖然不會到無重力的高度，不過就先保密吧……）"
103100-196 = "……老師，關於「生命守護者本艦」的啟動──#n我聽說本來是需要聖所之塔的力量。"
103100-197 = "凱薩PMC發現這艘船後，之所以想要掌握聖所之塔也是因為這個原因吧。"
103100-198 = "聖所之塔遭到破壞的現在，#n能夠啟動它的就只有「希迪姆的箱子」的持有者老師──你一個人了。"
103100-199 = "[s]「嗯，交給我吧。」"
103100-200 = "是……那就拜託老師了。"
103100-202 = "……沒錯。以我的能力啟動這個歐帕茲……是有可能的。"
103100-203 = "但是……這和先前的狀況不同。就算我沒問題……"
103100-204 = "寄宿在這個歐帕茲裡的力量……會影響「希迪姆的箱子」的持有者，也就是老師……"
103100-205 = "[s]「沒關係，彩奈。」"
103100-206 = "老，老師的肉體和普通的人一樣……！#n只要一顆子彈就可能會陷入危險的唷！"
103100-207 = "[s]「但是，彩奈總是會保護我對吧？」"
103100-208 = "但，但是，這個……和以前都不一樣……"
103100-212 = "請再重新考慮吧，老師……#n它會對老師造成多重的負擔，就連我都不清楚……"
103100-214 = "……但在那之前，我要警告你一件事。"
103100-215 = "在使用它的瞬間，[USERNAME]老師的肉體──#n將會受到無法挽回的傷害吧。"
103100-216 = "再也無法回復以前的狀態。#n──甚至可能置你於死地。"
103100-217 = "──即便如此也可以嗎？"
103100-218 = "就算結果顯而易見也一樣嗎？"
103100-223 = "[ns]「沒問題的，彩奈。拜託你了。」"
103100-227 = "為，為什麼──"
103100-229 = "……為什麼，要做到這種地步呢？"
103100-230 = "我們無法逃離這場破滅──#n這是自古就已經確定的事象……那就是我的結論。"
103100-231 = "沒錯，是砂狼白子──他存在於這個世界的瞬間就已經注定的結局。"
103100-232 = "時間並不會連續，只是既定因果的反覆重現──"
103100-233 = "我們──所有的存在，只是在決定論中的棋子罷了。"
103100-234 = "……"
103100-235 = "如果想阻止這一切──"
103100-236 = "你就應該回到過去殺了他才對……咯咯咯。"
103100-240 = "你曾誇下海口，說我絕對無法理解你對吧……#n沒錯。我至今依然無法理解你這個存在。"
103100-241 = "為何會認為既定的命運能夠改變呢？#n為何要刻意衝向迎來破滅的未來呢？"
103100-242 = "……我再次請問你。"
103100-247 = "……為什麼？"
103100-251 = "[ns]「…………」"
103100-253 = "[ns3]「以大人的身分──保護孩子，以老師的身分保護學生。」\n[ns4]「盡大人的責任──盡老師的義務，僅此而已。」"
103100-257 = "無論要用什麼方法……"
103100-258 = "無論付出多大的代價也一樣嗎？"
103100-259 = "[s5]「沒錯。無論要用什麼方法。」\n[s6]「無論要付出多大的代價。」"
103100-262 = "……"
103100-263 = "──你會去幫助學生吧？[USERNAME]老師。"
103100-268 = "[ns]「沒錯。」"
103100-271 = "……老師？"
103100-275 = "[ns]「琳，有件事我想問你。」"
103100-276 = "……？#n是，您請問。"
103100-277 = "[s]「是關於『第二項古則』的事。」"
103100-281 = "「透過無法理解的事物，是否能夠理解呢」──#n聯邦學生會長說過的那個提問嗎……？#n……是。我還記得。"
103100-282 = "[s]「……琳那時是怎麼回答的呢？」"
103100-283 = "為何，要這麼問呢……"
103100-284 = "不……我當時……"
103100-285 = "……"
103100-290 = "……琳醬。"
103100-295 = "我想，我們永遠都無法理解彼此吧。"
103100-296 = "對琳醬來說，我想必是個無法理解又不可思議的存在──"
103100-297 = "我們也許只能在無法觸及彼此的情況下──走在各自的道路上吧。"
103100-298 = "那一定──是這個世界的真意。"
103100-300 = "……不過，即便如此也沒關係。"
103100-301 = "就算是無法理解的存在，"
103100-302 = "就算我們對彼此來說，都像沒有實體的風……"
103100-303 = "從狹縫之間吹來的風──那樣的存在也沒關係。"
103100-305 = "正因如此……我很喜歡琳醬完成的句子。"
103100-306 = "所以，這個回答……我會好好記住的。"
103100-307 = "沒錯……我們……"
103100-312 = "「透過無法理解的[ruby=事物]他人[/ruby]，是否能夠理解[ruby=彼此]自己[/ruby]呢」"
103100-319 = "──這個回答可以等回到地上……再告訴老師嗎？"
103100-320 = "[s]「嗯，這樣就夠了，謝謝你。」"
103100-325 = "[ns]「那就出發吧。」"
103100-333 = "[ns] 將希迪姆的箱子連接生命守護者的啟動裝置"
103100-339 = "已確認主動力啟動！"
103100-348 = "主控制系統驅動完成……！！"
103100-349 = "各區域的通訊系統、演算系統全部確認完畢──#n目前為止都和操作手冊一樣。"
103100-358 = "引擎系統確認。"
103100-359 = "多次元詮釋系統確認完畢！"
103100-368 = "管制系統確認完畢……#n好！這樣所有系統都能使用了！"
103100-369 = "起飛準備完成！等待命令中！"
103100-370 = "老師，請下達出動命令……！"
103100-371 = "[ns7]「生命守護者本艦，出動！！」\n[ns8]「宇宙戰艦『生命守護者』，出動！！」"
103100-381 = "「生命守護者本艦」──開始離陸！！"
103100-396 = "高度上升……目前為780m！"
103100-397 = "現在可以啟動多次元詮釋系統了嗎？"
103100-399 = "計算已經結束。花子同學，麻煩你了。"
103100-400 = "計算完成……多次元詮釋系統，啟動！"
103100-406 = "[ns9]「…………！！！！」\n[ns10] （一股衝擊向全身襲來……）"
103100-409 = "……老師？"
103100-410 = "老，老師？您的臉色不太好。#n沒事吧……？"
103100-411 = "咦，老師是不是在發抖……？#n怎麼了嗎，老師……？"
103100-412 = "[s]「可能是有點暈船……」"
103100-413 = "……非常抱歉，請再忍耐一會。"
103100-414 = "已確認系統正常運作！"
103100-415 = "現在我們生命守護者本艦和方舟同樣成為了「機率性的存在」。"
103100-416 = "那個，這是什麼意思呢？"
103100-417 = "也許……是我們同時存在於所有可能存在的宇宙之中……的意思吧。"
103100-418 = "如果真的存在所謂的平行宇宙的話。"
103100-419 = "啊哈哈……希望不會發生次元悖論……"
103100-420 = "沒關係的。就算那樣，大概也只會被認為是一顆衛星吧。"
103100-422 = "閒聊先到這裡。#n──請設定航線目標！"
103100-423 = "計算抵達目標高度75,000m方舟的航線……設定完畢。"
103100-431 = "哇～還真晃呢……"
103100-432 = "請，請再忍耐一下，老師。"
103100-434 = "從現在起，將朝「阿特拉哈西斯的方舟」進行加速。"
103100-435 = "嗚哇，大家要抓緊哦！！#n如果手冊沒錯的話，速度會非常驚人！"
103100-437 = "動力全開……加速！！"
103100-441 = "來吧，讓我們看看「歐帕茲」的性能吧！"
103100-461 = "唔，唔呀啊啊啊！？"
103100-462 = "你，你沒事吧優香同學？"
103100-463 = "勉，勉勉強強……"
103100-464 = "真驚人的速度……"
103100-467 = "多，多次元詮釋的波動數值不穩定！遠比預期中還高！"
103100-469 = "……不，這種程度還沒超過臨界點。計算是正確的。"
103100-471 = "但是船身受到的傷害將會增加，這艘船是否撐得住呢……"
103100-475 = "[ns]（意識，變模糊了……）"
103100-477 = "[ns]（身體……不聽使喚……）"
103100-491 = "為何會認為既定的命運能夠改變呢？#n為何要刻意衝向迎來破滅的未來呢？"
103100-499 = "[ns]（這裡是……）"
103100-501 = "[ns]（總覺得，有股懷念的感覺……）"
103100-510 = "下一話;最初的故事"

[translation]
84305100100-6 = "……所以呢，現在該怎麼做？"
84305100100-7 = "該怎麼做……？"
84305100100-8 = "你剛才不是說了嗎？#n如果沒有你的生物特徵資料就想進去，事情會變得更複雜。"
84305100100-9 = "那個「會變得更複雜的方法」是什麼？"
84305100100-10 = "……無須驗證就進去的方法只有一個。"
84305100100-11 = "而那個方法……無法單獨達成。#n按照計算，至少需要兩個人。"
84305100100-12 = "怎麼，那不是剛剛好嗎。#n現在扣掉你正好剩兩個人。"
84305100100-13 = "之前我也說過，如果要兩人行動的話，跟你去不如跟他去。#n這是客觀事實。"
84305100100-14 = "包含要隱密行動，懂得藏身之類的原因在內。"
84305100100-15 = "……你對他的信任突然多了不少呢。"
84305100100-16 = "……哪有？我只是覺得跟試都沒試過的新人相比，有一兩次經驗的人更適合而已。"
84305100100-18 = "有經驗的人？#n可是我在這次行動中沒有做過潛入的工作啊……"
84305100100-19 = "不，那完全就是「潛入」。#n跟我初次見面的時候你也做得很好。"
84305100100-20 = "寧瑠，我之前也說過這麼做風險很大。"
84305100100-21 = "他並不是千年的學生。#n而是三一，甚至是茶會的一員。"
84305100100-22 = "如果事情出了差錯，到時候千年會陷入的麻煩……"
84305100100-23 = "哎，真是的。#n要說風險的話，你笨手笨腳地跑去那邊添亂的風險才大吧。"
84305100100-24 = "反正那個假設也沒有意義。#n你口中的「差錯」早就演變成無法追究責任的最糟情況了。"
84305100100-25 = "況且這麼做的目的，不就是為了避免「差錯」發生嗎？"
84305100100-26 = "我說的有錯嗎？你還有什麼不滿？"
84305100100-27 = "這……"
84305100100-29 = "……"
84305100100-30 = "……沒有。我知道了。"
84305100100-31 = "……哦？#n居然一下就同意了，真讓人有點意外。"
84305100100-32 = "看來你確實比以前好溝通一點了。"
84305100100-33 = "啊，這麼說來，聖亞。"
84305100100-34 = "……怎麼了？"
84305100100-35 = "要一起去是可以，但就像我一開始說過的，我不會特別照顧或關心你。#n這個部分你得自己看著辦。"
84305100100-36 = "畢竟我需要的是能「共事的人」。"
84305100100-37 = "……"
84305100100-38 = "……呵呵。"
84305100100-39 = "我知道。但如果碰上對我而言太困難的工作，我會馬上通知你。"
84305100100-40 = "雖然不好意思，但我相信寧瑠你肯定沒問題的。"
84305100100-41 = "嗯，就那麼做吧。你可別因為勉強自己而闖禍啊。"
84305100100-43 = "……"
84305100100-44 = "……來準備計畫吧。"

84305100100-5 = "1;리오;01\n5;네루 교복;01\n#5;a\n#1;a\n#1;h\n#5;h\n#wait;1000"
84305100100-6 = "1;리오;01\n5;네루 교복;00;……그래서. 어떻게 하면 되지?"
84305100100-7 = "1;리오;02;어떻게 하면 되냐니……?\n#1;em;[?]"
84305100100-8 = "5;네루 교복;24;네 입으로 말했잖아. 네 생체 정보가 없이 들어가려면, 일은 훨씬 더 복잡해진다고."
84305100100-9 = "5;네루 교복;00;그 '훨씬 더 복잡한 방법'이 뭐냐고."
84305100100-10 = "1;리오;07;……인증을 거치지 않고 들어가는 방법은 단 하나뿐이야.\n#1;em;…"
84305100100-11 = "1;리오;01;그리고 그 방법은……. 혼자서는 진행할 수 없어. 계산대로라면 2명은 필요해."
84305100100-12 = "5;네루 교복;03;뭐, 딱 맞네. 지금 너 빼고 두 명이니까.\n#5;em;[재잘]"
84305100100-13 = "5;네루 교복;22;아까도 말했지만 두 명이 갈 거라면, 너랑 가느니 이쪽이랑 가는 게 나아. 이건 객관적인 사실이지."
84305100100-14 = "5;네루 교복;00;은밀하게 행동하고, 몸을 숨길 줄 아는 행동 같은 걸 포함해서 말이야."
84305100100-15 = "1;리오;01;……잠깐 사이에 그녀에 대한 신뢰가 대단해졌네, 네루."
84305100100-16 = "5;네루 교복;23;……딱히? 한 번도 안 해본 신입보단 한두 번이라도 해본 경력직이 적합하다고 말하고 있을 뿐.\n#5;em;[?]"
84305100100-17 = "#all;hide"
84305100100-18 = "3;세이아;04;경력직이요? 하지만 이번 작전에 제가 했던 것들은 잠입이 아닌데……."
84305100100-19 = "3;네루 교복;21;아니, 충분히 '잠입'이었어. 나랑 처음 만날 때도 잘하고 있었고."
84305100100-20 = "1;리오;00;네루, 그렇지만 전에도 말했듯 이건 리스크가 너무 커.\n#1;ar\n#3;m5"
84305100100-21 = "1;리오;99;그녀는 밀레니엄의 학생이 아니야. 트리니티의, 그것도 티파티의 일원이지."
84305100100-22 = "1;리오;07;만일 일이 잘못되었을 때, 밀레니엄이 겪게 될 곤란함은…….\n#1;em;…"
84305100100-23 = "3;네루 교복;24;거 참 말 많네. 리스크는 네가 거기까지 가서 몸치로 발목 잡는 게 더 리스크고.\n#3;em;[한숨]"
84305100100-24 = "3;네루 교복;01;어차피 그 가정은 의미가 없잖아. 네가 말한 그 '잘못된 상황'은, 이미 그런 걸 따질 수 없는 최악의 상황인데."
84305100100-25 = "3;네루 교복;02;애초에 지금 이 모든 게 '그렇게 안 되게 하려고' 하는 짓 아냐? \n#3;em;[!]"
84305100100-26 = "3;네루 교복;01;그렇지? 내 말이 틀려? 왜, 또 뭐 불만이 있어?"
84305100100-27 = "1;리오;07;그건…….\n#1;stiff"
84305100100-28 = "#all;hide"
84305100100-29 = "3;세이아;01;……."
84305100100-30 = "3;리오;06;……아니. 알았어.\n#3;em;[한숨]"
84305100100-31 = "3;네루 교복;22;……? 오. 뭐야, 의외로 금방 수긍하네.\n#3;em;[반응]"
84305100100-32 = "3;네루 교복;03;그래도 확실히 전보다는 좀 대화가 통하게 됐다니까."
84305100100-33 = "3;네루 교복;01;아, 그러고 보니 세이아."
84305100100-34 = "1;세이아;04;……? 네?\n#1;em;[?]\n#1;ar\n#3;m5"
84305100100-35 = "3;네루 교복;22;같이 가는 건 좋지만 말이야, 처음에도 이야기했듯. 딱히 챙겨 주거나 보살펴 주진 않을 거야. 그 부분은 알아서 하라고."
84305100100-36 = "3;네루 교복;21;난 어디까지나, '같이 일할 사람'이 필요한 거니까."
84305100100-37 = "1;세이아;01;…….\n#1;em;…"
84305100100-38 = "1;세이아;99;……후후."
84305100100-39 = "1;세이아;02;알고 있어요. 하지만 제게 너무 어려운 일은 바로 말씀드릴 테니까요."
84305100100-40 = "1;세이아;03;그 부분은 미안하지만 네루가 해결해 줄 거라 믿습니다."
84305100100-41 = "3;네루 교복;03;훌륭해. 제발 그렇게 해 달라고. 혼자 무리하다 사고 치지 말고.\n#3;em;[재잘]"

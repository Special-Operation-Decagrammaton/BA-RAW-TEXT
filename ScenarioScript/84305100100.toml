[translation]
84305100100-6 = "So what do I need to do specifically?"
84305100100-7 = "Yes, that's the question..."
84305100100-8 = "You said that getting in there, without your biometric data, is much more complicated."
84305100100-9 = "So what is that more complicated method?"
84305100100-10 = "Getting in without verification? ...There's only one way."
84305100100-11 = "And you can't do it alone. I've run the numbers, and you'd need two people."
84305100100-12 = "Well, there are two of us, besides you."
84305100100-13 = "Honestly, even without the biometrics issue, if I had to pick one of you as a field partner for this op, I'd pick her."
84305100100-14 = "She's got a knack for infiltration."
84305100100-15 = "She's really grown on you, hasn't she?"
84305100100-16 = "...Not particularly, she just has a little more practical experience with stealth than you do."
84305100100-18 = "Experience? But I haven't been handling the stealth missions."
84305100100-19 = "No, you have, just a different kind. Plus you were sneaking around when we first met."
84305100100-20 = "We have to remember the risks, though."
84305100100-21 = "She's not a Millennium student. She's a Trinity student, a Tea Party one at that."
84305100100-22 = "If something goes wrong, Millennium will be in an ungodly amount of trouble."
84305100100-23 = "Nah. It'd be a bigger risk to drag you in there, with your two left feet."
84305100100-24 = "Besides, that trouble you're talking about is an absolute worst-case scenario. We can't make our decisions on those alone."
84305100100-25 = "Aren't we doing all this so that DOESN'T happen? "
84305100100-26 = "Right? Am I wrong here? What's the problem?"
84305100100-27 = "Well..."
84305100100-29 = "..."
84305100100-30 = "...All right, fine."
84305100100-31 = "Just like that, huh? Didn't think you'd come around so quickly."
84305100100-32 = "You're starting to listen more."
84305100100-33 = "Oh, right. Seia."
84305100100-34 = "Hm? Yes?"
84305100100-35 = "I don't mind bringing you along, but make no mistake, I'm going to be your partner, not your babysitter. I expect you to do your part."
84305100100-36 = "You and me, we're doing this together or not at all."
84305100100-37 = "..."
84305100100-38 = "...Fufu."
84305100100-39 = "Fair enough, but there may be some things I'll need you to handle instead of me."
84305100100-40 = "I apologize ahead of time, but I'm sure you'll be up to the task."
84305100100-41 = "Yep, just tell me right away. Don't try to overdo anything."
84305100100-43 = "..."
84305100100-44 = "...Then I'll draw up the plan."

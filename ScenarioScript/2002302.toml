2002302-118 = "ฮู่ว... ดูเหมือนว่างานด่วนจะเสร็จไปประมาณหนึ่งแล้วนะคะ......"
2002302-119 = "[s9] \"ทำได้ดีมากเลย! ดื่มอะไรก่อนสักแก้วมั้ย?\"\n[s10] \"ดื่มกาแฟสักแก้วก่อนมั้ย?\""
2002302-122 = "ถ้างั้นก็จะขอรับไว้ด้วยความยินดีค่ะ"

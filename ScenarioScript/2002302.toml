2002302-155 = "[ns] \"แล้วนี่......\""
2002302-156 = "คะ? คุณครูอยากพูดอะไรหรือเปล่าคะ?"
2002302-157 = "[s] \"ไม่... โกรธครูเหรอ??\""
2002302-158 = "โกรธงั้นเหรอคะ? นี่เป็นเรื่องที่ฉันต้องโกรธคุณครูด้วยเหรอคะ?"
2002302-159 = "วันนี้คุณครูทำผิดพลาดบ้างก็จริง... แต่มันไม่ใช่เรื่องที่ฉันต้องโกรธหรอกค่ะ"
2002302-160 = "จะว่าไป คุณครูมองตาฉันอย่างประหลาดๆ ชอบกลมาตั้งแต่ตอนเช้าแล้วนะคะ และดูเหมือนจะทำให้#nคุณครูจดจ่อกับงานของตัวเองไม่ได้ด้วย......"
2002302-161 = "คุณครูมีปัญหาอะไรกับฉันงั้นเหรอคะ?"
2002302-162 = "[ns] (เล่าข่าวลือที่ได้ยินมาจากนักเรียนคนอื่นให้ฟัง)"
2002302-163 = "ฮุฮุ... ฮุฮุฮุ......"
2002302-164 = "ข่าวลือเรื่อง 'หมาบ้า' น่ะเหรอคะ"
2002302-165 = "ไม่ต้องไปใส่ใจหรอกค่ะ ข่าวลือมันก็แค่ข่าวลือค่ะ"
2002302-166 = "ถึงจะมีใครเรียกว่า 'หมาบ้าแห่งกรมความมั่นคงสาธารณะ' แต่ฉันก็เป็นถึงผู้บริหารของสถาบันฝึก#nตำรวจวัลคิรี่ที่ชี้นำพลเมืองตามกฎหมาย อย่างน้อยฉันก็ควรจะควบคุมอารมณ์ตัวเองให้ได้สิคะ"
2002302-167 = "ฉันหน้าดุเป็นทุนเดิมอยู่แล้ว แถมยังค่อนข้างเข้มงวดกับรุ่นน้องในสถาบันฝึกตำรวจอีก ฉันขอยอมรับว่ามันก็มีคนไม่น้อยที่เกรงกลัวฉันค่ะ..."
2002302-168 = "แต่ถึงอย่างนั้นฉันก็ไม่โกรธอะไรง่ายๆ ต่อหน้าคุณครูหรอกนะคะ"
2002302-169 = "อีกอย่าง ฉันก็ไม่ติเตียนใครเพียงเพราะความผิดพลาดอย่างเดียวหรอกค่ะ"
2002302-170 = "ความผิดพลาดที่ไม่ได้มาจากเจตนาร้ายสามารถแก้ไขได้ด้วยความพยายามของตนเองค่ะ หากเราตำหนิไป อีกฝ่ายอาจจะกลัวจนซ่อนความผิดพลาดของตัวเองก็ได้ค่ะ"
2002302-171 = "เพราะแบบนั้นฉันก็เลยหวังว่าคุณครูจะพูดคุยกับฉันอย่างสบายใจนะคะ"
2002302-172 = "[s] \"นั่นเป็นความคิดที่เยี่ยมเลยนะ\""
2002302-173 = "ก็ฉันต้องรับผิดชอบในตำแหน่งหัวหน้ากรมความมั่นคงสาธารณะนี่คะ"
2002302-174 = "ถ้าต้องดูแลสมาชิกตำรวจที่มีบุคลิกเฉพาะตนสูง บางครั้งฉันก็เลยต้องใส่เสื้อผ้าที่ไม่เข้ากับร่างกายค่ะ"
2002302-175 = "[ns] \"แบบนี้นี่เอง เยี่ยมไปเลยนะ\""
2002302-177 = "[ns] \"...ว่าแต่ ครูขอถามอะไรหน่อยได้มั้ย?\""
2002302-178 = "ไม่ว่าอะไรก็ถามได้ตามสบายเลยค่ะ"
2002302-179 = "[ns13] \"ตอนไปเปลี่ยนชุด ครูเห็นคันนะเอาชุดสำรองไปก็จริง......\"\n[ns14] \"ว่าแต่... ชุดที่อยู่ข้างใน... จัดการยังไงเหรอ?\""
2002302-182 = "นะ... นั่นน่ะ... คือว่า......"
2002302-187 = "เรื่องนั้น......"
2002302-188 = "พูดแบบนี้มันเป็นการล่วงละเมิดทางเพศนะคะ!"

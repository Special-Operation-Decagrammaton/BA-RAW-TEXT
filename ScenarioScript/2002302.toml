2002302-139 = "[ns] \"ขะ... ขอโทษที! เปียกไปหมดแล้วเลย\""
2002302-145 = "...ไม่เป็นไรค่ะ เห็นทีคงต้องเปลี่ยนเสื้อผ้าแล้วละค่ะ"

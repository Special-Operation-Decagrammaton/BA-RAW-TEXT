[translation]
2002302-1 = "ข่าวลือของหัวหน้า"
2002302-2 = "สำนักงานชาเล่ต์"
2002302-8 = "สวัสดีค่ะคุณครู [USERNAME]"
2002302-9 = "ฉันคือโอกาตะ คันนะ หัวหน้ากรมความมั่นคงสาธารณะแห่งสถาบันฝึกตำรวจวัลคิรี่ มาเข้าเวรตามที่ฉัน#nบอกไปเมื่อวานค่ะ"
2002302-10 = "ฉันไม่เคยมาเข้าเวรและช่วยงานมาก่อนเลยอาจจะมีข้อบกพร่องอยู่บ้าง ยังไงก็ขอฝากเนื้อฝากตัวด้วย#nนะคะ"
2002302-11 = "[s1] \"รบกวนด้วยนะ คันนะ\"\n[s2] \"ขอฝากเนื้อ... ฝากตัวด้วยนะ\""
2002302-12 = "จะว่าไป นักเรียนคนอื่นของสถาบันฝึกตำรวจวัลคิรี่เหมือนจะเคยมาเข้าเวรที่ชาเล่ต์กันอยู่บ้าง......"
2002302-13 = "แต่ทำไมคุณครูถึงพูดแบบมีหางเสียงใส่ฉันล่ะคะ?"
2002302-14 = "จะว่าไป นักเรียนคนอื่นของสถาบันฝึกตำรวจวัลคิรี่เหมือนจะเคยมาเข้าเวรที่ชาเล่ต์กันอยู่บ้าง......"
2002302-15 = "และก็น่าจะมีบางคนที่พออยู่ต่อหน้าคุณครูแล้วจะลืมหน้าที่หลักของตำรวจ แล้วแสดงท่าทีโง่เขลาออก#nมา......"
2002302-16 = "ฉันกังวลจังค่ะว่าพวกนั้นจะมารบกวนคุณครูมากกว่ามาช่วย"
2002302-17 = "พวกนั้นมาพูดอะไรไร้สาระต่อหน้าคุณครูบ้างมั้ยคะ?"
2002302-20 = "คะ... คะ...? หัวหน้ากรมฯ คันนะเหรอคะ......?"
2002302-21 = "เรื่องที่ฉันบอกเป็นความลับนะคะ... หัวหน้ากรมฯ เป็นสัญลักษณ์ของความน่ากลัวในสถาบันฝึกตำรวจ#nเลยละค่ะ"
2002302-22 = "เธอเข้มงวดมากๆ แถมสีหน้าในเวลาปกติก็ยังน่ากลัวอีก......"
2002302-27 = "(กระซิบ)... ถึงกับได้ฉายาว่าเป็นหมาบ้าเลยนะคะ"
2002302-28 = "เพราะงั้นถ้าคุณครูได้พบหัวหน้า ก็อย่าไปทำให้เธออารมณ์ไม่ดีนะคะ"
2002302-29 = "ไม่ว่าจะเกิดเรื่องอะไรก็ห้ามเด็ดขาดเลยนะคะ......!"
2002302-34 = "[ns] \"มะ... ไม่มีใครพูดอะไรเลย......!\""
2002302-35 = "ถ้าอย่างนั้นก็โล่งอกไปทีค่ะ......"
2002302-36 = "คุณครูเหมือนจะเหงื่อตกตั้งแต่เมื่อกี้แล้ว รู้สึกไม่สบายตรงไหนหรือเปล่าคะ?"
2002302-37 = "[s3] \"จู่ๆ อากาศมันก็ร้อนขึ้นมาน่ะ...\"\n[s4] \"ปะ... เปิดแอร์กันดีมั้ย?\""
2002302-40 = "ฉันก็ไม่ติดอะไรหรอกค่ะ......"
2002302-41 = "ถ้างั้นฉันจะไปจัดการเอกสารอยู่ทางโน้นนะคะ"

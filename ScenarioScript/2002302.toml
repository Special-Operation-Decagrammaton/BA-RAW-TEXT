[translation]
2002302-1 = "局長的傳聞"
2002302-2 = "夏萊．辦公室"
2002302-8 = "您好，[USERNAME]老師。"
2002302-9 = "今天由我來擔任夏萊的值日生，#n我是女武神警察學園公安局的尾刃環奈。"
2002302-10 = "初次擔任值日生，若有不周到的地方，還請您多多指教。"
2002302-11 = "[s1]「請多指教，環奈。」\n[s2]「請多多……指教？」"
2002302-12 = "這麼說來，聽說我們女武神警察學園的學生已經擔任過值日生了……"
2002302-13 = "為，為何您要這麼拘謹呢……？"
2002302-14 = "這麼說來，聽說我們女武神警察學園的學生已經擔任過值日生了……"
2002302-15 = "明明在老師面前卻忘了警察的本分，讓您看見沒出息的樣子……"
2002302-16 = "別說是協助，我甚至擔心他們會不會妨礙到老師。"
2002302-17 = "他們是否有不當的行為呢？"
2002302-20 = "什，什麼？#n您說環奈局長嗎……？"
2002302-21 = "還請您替我保密，別說是我說的哦……#n他在警察學校裡就是恐怖的象徵。"
2002302-22 = "本就嚴格的個性配合那凶狠的神情……"
2002302-27 = "（竊竊私語）……甚至有[ruby=・    ・]狂犬[/ruby]這個外號。"
2002302-28 = "老師如果有機會見到環奈局長，還請注意別惹他生氣哦！"
2002302-29 = "絕對、無論發生什麼事都要注意哦……！"
2002302-34 = "[ns]「沒，沒什麼……！」"
2002302-35 = "那就好……"
2002302-36 = "從剛才開始您的臉色就不太好……#n身體有什麼不適嗎？"
2002302-37 = "[s3]「可能是有點熱吧……」\n[s4]「要，要不要開冷氣？」"
2002302-40 = "由您決定吧……"
2002302-41 = "那麼，我這就開始處理文件。#n有什麼需要幫忙的地方再麻煩您告知。"
2002302-47 = "[ns]（得千萬小心別惹環奈生氣……）"
2002302-53 = "老師。我正在整理上週女武神警察學園與夏萊共同進行的治安維護活動中使用的經費……"
2002302-54 = "請問夏萊這邊管理的收據放在哪裡呢？"
2002302-55 = "[s5]「啊，經費的收據……」\n[s6]「放在書桌的抽屜裡哦。」"
2002302-63 = "啊，是這個呢。"
2002302-64 = "Momo好友限定粉紅波卡背包，5千元……"
2002302-65 = "遊戲商店儲值卡，1萬元……"
2002302-66 = "甲蟲皇后卡片擴充包「巨大甲蟲的復活」3箱，5千元……？"
2002302-71 = "老師，這些收據是……？"
2002302-72 = "[s7]「咦！？」\n[s8]「是，是不是我不小心混在一起了……！」"
2002302-81 = "……我想私人的收據還是保管在其他地方比較合適，以免發生搞混的情況。"
2002302-82 = "如果不得不放在相同的地方，#n我個人推薦至少要用資料夾分開保管。"
2002302-83 = "[s]「是，是……」"
2002302-84 = "唉……那麼我繼續處理工作。"
2002302-90 = "老師。收據的分類，以及您剛才請我處理的懸賞通緝犯的目擊情報已經整理完畢。"
2002302-91 = "我將較容易確認目擊情報的區域以大頭針標示出來了，#n麻煩您一起確認。"
2002302-92 = "[s]「……已經完成了嗎？動作真快呢。」"
2002302-93 = "與女武神警察學園的業務相比，這不算什麼。"
2002302-94 = "這裡的文件不會因為某些枝微末節的規定就被退回。#n而且在女武神需要將影本送到文書紀錄室，這也會耽誤時間……"
2002302-95 = "夏萊的工作相對有彈性，所以處理起來較為容易。"
2002302-96 = "[s]「女武神的工作真辛苦呢……」"
2002302-97 = "……或許正如您所說。#n但是，遵守正確的程序也是警察的義務之一。"
2002302-98 = "啊，地圖上的標記並沒有固定，瀏覽的時候請小心──"
2002302-103 = "[ns]「抱，抱歉！我本來想貼在白板上！」"
2002302-109 = "……我似乎太晚提醒了呢。"
2002302-110 = "請別在意。#n沒有事先說明清楚的我也有責任。"
2002302-111 = "我會重新進行標註的。"
2002302-116 = "[ns]（氣氛有點凝重……）"
2002302-118 = "呼……#n這樣一來較為緊急的工作大致上都完成了。"
2002302-119 = "[s9]「辛苦了！」\n[s10]「要不要喝杯咖啡？」"
2002302-122 = "那麼就承蒙您的好意了。"
2002302-123 = "能麻煩您給我一杯冰咖啡嗎？"
2002302-124 = "[s11]「嗯，我很樂意！」\n[s12]「期待我準備最棒的咖啡吧！」"
2002302-131 = "那個，也許是我多慮了……"
2002302-132 = "老師的腳邊掉了一些文件，還請小心不要滑──"
2002302-135 = "[ns]「唔，唔啊！？」"
2002302-139 = "[ns]「抱，抱歉！被我弄濕了嗎？」"
2002302-145 = "……沒關係。#n不過看來得換套衣服才行了。"
2002302-146 = "跟您借用一下更衣室。"
2002302-147 = "那麼我先失禮了。"
2002302-155 = "[ns]「那個……」"
2002302-156 = "有什麼事嗎？"
2002302-157 = "[s]「就是，我是不是惹你生氣了……」"
2002302-158 = "我？對老師您？"
2002302-159 = "老師今天的失誤看起來確實比較多……#n但都並不是什麼需要生氣的事。"
2002302-160 = "這麼說來，老師工作時一直都注意著我的臉色呢？#n怪不得您無法專心。"
2002302-161 = "如果有什麼事的話，還請您直說無妨。"
2002302-162 = "[ns] 說出從其他學生口中聽見的傳聞"
2002302-163 = "呵呵，呵呵呵……"
2002302-164 = "「狂犬」的傳聞是嗎？"
2002302-165 = "請您不用在意。#n那只是傳聞罷了。"
2002302-166 = "即使被稱為「公安局的狂犬」，我依然處於依據法令引導市民的立場。#n身為女武神警察學園的幹部，更應注意公私分明。"
2002302-167 = "不過……我的長相天生就比較凶狠，對後輩們也較為嚴格，#n因此似乎確實有許多學生對我敬而遠之……"
2002302-168 = "但我不會因為剛才那些小事就生氣。"
2002302-169 = "況且……我也不會因為一些無傷大雅的失誤就責備他人。"
2002302-170 = "帶著惡意的犯罪姑且不論……偶發的失誤可以藉由反省來改善。#n如果加以責備，反而可能會因此失去改善的機會。"
2002302-171 = "所以還請老師不必抱持著過度的擔心，有事情儘管跟我說。"
2002302-172 = "[s]「謝謝你。真是可敬的的心態呢。」"
2002302-173 = "再怎麼說，我也是公安局的局長。"
2002302-174 = "也算是為了成為隊員們的榜樣──#n就算是不合身的服裝，偶爾也有穿上的必要。"
2002302-175 = "[ns]「這樣啊……你很努力呢。」"
2002302-177 = "[ns]「真的什麼都可以問嗎？」"
2002302-178 = "是的，請儘管問吧。"
2002302-179 = "[ns13]「我知道你有帶預備的制服……」\n[ns14]「但是那個……裡面是怎麼處理的……？」"
2002302-182 = "！？"
2002302-187 = "那……"
2002302-188 = "那只是單純的性騷擾！"
2002302-190 = "（之後被環奈狠狠訓斥了好一段時間……）"

2002302-103 = "[ns] \"ขะ... ขอโทษนะ! ครูแค่จะเอาไปติดที่บอร์ดน่ะ......!"
2002302-109 = "ขอโทษที่ฉันบอกไม่ทันค่ะ"
2002302-110 = "ไม่เป็นไรหรอกค่ะ เป็นความรับผิดชอบของฉันเหมือนกันที่ไม่ได้บอกคุณครูไว้ล่วงหน้า"
2002302-111 = "ฉันจะไปเก็บปากกาที่ร่วงตรงนั้นมาเองค่ะ"

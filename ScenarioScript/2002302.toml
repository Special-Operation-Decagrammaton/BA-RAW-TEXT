2002302-93 = "เทียบกับงานที่ฉันทำในสถาบันฝึกตำรวจวัลคิรี่แล้ว นี่มันงานหมูๆ มากค่ะ"
2002302-94 = "ไม่ต้องอนุมัติการชำระเงินในแต่ละส่วน ไม่ต้องดูเลขของหนังสือ แล้วก็ไม่ต้องส่งสำเนาให้ฝ่ายจัดเก็บ#nเอกสารด้วย"
2002302-95 = "เมื่อเทียบกันแล้ว งานของชาเล่ต์ค่อนข้างยืดหยุ่นและผ่อนคลายกว่าค่ะ"

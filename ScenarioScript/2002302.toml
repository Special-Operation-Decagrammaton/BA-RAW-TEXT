2002302-124 = "[s11] \"อื้ม รอแป๊บหนึ่งนะ!\"\n[s12] \"ครูจะเอากาแฟที่ดีที่สุดมาให้เลย!\""
2002302-131 = "เอ่อ คุณครูคะ ฉันอาจจะกังวลไปก่อนก็จริง แต่ว่า......"

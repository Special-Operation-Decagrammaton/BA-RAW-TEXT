2002302-81 = "ใบเสร็จสำหรับจับจ่ายส่วนตัวควรเอาไปเก็บไว้ที่อื่นสิคะ จะได้ไม่ปนกับใบเสร็จของงานราชการ"
2002302-82 = "ถ้าต้องเก็บไว้ด้วยกันอย่างหลีกเลี่ยงไม่ได้ ก็ใช้การติดฉลากสีเพื่อไม่ให้สับสนกันก็ดีนะคะ"

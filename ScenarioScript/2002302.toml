2002302-55 = "[s5] \"ใบเสร็จค่าใช้จ่ายเหรอ....\"\n[s6] \"อยู่ในลิ้นชักโต๊ะฝั่งตรงข้าม\""
2002302-63 = "ค่ะ เจอแล้วค่ะ"
2002302-64 = "กระเป๋าเป้ MOMO FRIENDS พิงค์กี้พาก้าลิมิเต็ดเอดิชั่น 5,000 เยน......"

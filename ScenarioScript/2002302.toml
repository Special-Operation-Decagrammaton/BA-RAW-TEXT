2002302-84 = "ถ้างั้นฉันจะทำงานต่อเลยนะคะ"
2002302-90 = "คุณครูคะ ฉันสรุปเรื่องราวของพยานที่เห็นอาชญากรในหมายจับตามที่คุณครูขอให้แล้วค่ะ"
2002302-91 = "ฉันเอาปากกาวางเพื่อทำเครื่องหมายตำแหน่งไว้บนเขตการปกครองให้แล้ว คุณครูจะได้วิเคราะห์#nตำแหน่งได้ค่ะ"

[translation]
90001030-1 = "ตอนที่ 3;ครั้งที่ 2"
90001030-4 = "เราติดตามร่องรอยที่หลงเหลือในธารน้ำแข็งอยู่นานแล้ว แต่ก็ยังไม่เห็นเค้าลางอะไรเป็นพิเศษเลยค่ะ"
90001030-5 = "เรามาสรุปสถานการณ์และพิจารณาจุดที่น่าสงสัยกันสักครู่มั้ยคะ?"
90001030-6 = "เอมิ ขอข้อมูลที่หน้าจอหน่อยค่ะ"
90001030-7 = "ได้เลย หัวหน้า"
90001030-15 = "ปฏิบัติการของเราแบ่งอย่างกว้างๆ ได้เป็น 3 ขั้นตอนค่ะ เราได้ต่อสู้กับเกวูราห์ เราค้นพบร่องรอยนี้ และเราก็กำลังติดตามร่องรอยที่ว่าอยู่"
90001030-16 = "แต่เรายังไม่ได้คำตอบว่าเกวูราห์กำลังทำอะไรอยู่ในที่แห่งนี้ค่ะ"
90001030-17 = "ที่ผ่านมามันก็คล้ายๆ แบบนี้ไม่ใช่เหรอ? ยกเว้นแต่เชเซ็ดที่เป็นโรงงานอาวุธกับเคเทอร์ที่ดูแลพื้นที่#nรกร้างจมน้ำน่ะ"
90001030-18 = "แต่ในระหว่างนั้น เราก็ได้เจอกับเด็ก 3 คนที่เรียกตัวเองว่าเป็นวิศวกรของเดคาแกรมมาทอน แล้วเด็กพวกนั้นก็พยายามจะโจมตีพวกเราด้วยค่ะ"
90001030-19 = "ใช่ค่ะ แต่สิ่งที่ฉันเป็นกังวลก็คือ เด็กๆ พวกนั้นพูดถึง <พลังของทวยเทพไร้นาม> ค่ะ"
90001030-20 = "ถ้าจะบอกให้ชัดเจน ต้องบอกว่าเป็น 'เทคโนโลยีต้องห้าม' มากกว่าด้วย"
90001030-21 = "นอกจากนี้ยังวิเคราะห์ได้ทันทีว่าอาวุธ 'อาบี เอชูห์' ของฉันใช้พลังนั้นอยู่ด้วยค่ะ"
90001030-22 = "ค่ะ โดยพื้นฐานแล้วเดคาแกรมมาทอนกับพลังของทวยเทพไร้นามไม่มีความเกี่ยวข้องใดๆ กันเลยค่ะ"
90001030-23 = "มีครั้งหนึ่งที่ฉันเคยคิดว่าอาจมีการเชื่อมโยงกันระหว่าง 2 สิ่งนี้ แต่สุดท้ายก็ไม่มีค่ะ"
90001030-25 = "ฉันไม่รู้ว่าทำไมพวกนั้นถึงเรียกเรามาไกลจนถึงที่นี่... แต่ตัวตนของพวกเราน่าจะเป็นสิ่งจำเป็นในการ#nทำให้ <พี่สาว> ที่ว่านั่นสมบูรณ์แบบค่ะ"
90001030-26 = "ถึงแม้จะไม่รู้ว่าพวกนั้นต้องการใครในหมู่พวกเรา... "
90001030-27 = "จะเป็น <อาบี เอชูห์> ที่มีเทคโนโลยีของนักบวชนิรนามและทวยเทพไร้นาม"
90001030-28 = "หรือว่าจะเป็น <กล่องแห่งซิสดิม> วัตถุหลงยุคที่ประธานองค์การนักเรียนทิ้งเอาไว้..."
90001030-29 = "[s] \"...\""
90001030-30 = "หรือถ้าไม่ใช่ ก็อาจจะเป็นพลังที่น่ากลัวของ 'บุคคลที่รู้ทุกอย่าง' อย่างผู้มีรอยยิ้มสดใสฮีลใจเหมือน#nยาวิเศษ อาเกโบชิ ฮิมาริ..."
90001030-31 = "(มีจริงซะที่ไหน)"
90001030-33 = "ตรงนี้เป็นแค่สมมติฐานของฉันค่ะ"
90001030-34 = "ถ้าเราสันนิษฐานว่าที่เหล่าวิศวกรเด็กที่บอกว่าตัวเองชื่อไอน์ ซอฟ ออร์เรียกพวกเรามาที่ธารน้ำแข็ง ก็เพื่อทำให้ตัวตนของ <พี่สาว> คนนั้นสมบูรณ์ละก็..."
90001030-35 = "สิ่งที่เด็กพวกนั้นต้องการมากที่สุดก็น่าจะเป็นข้อมูลเกี่ยวกับอาบี เอชูห์ค่ะ"
90001030-36 = "เป็นอย่างนี้สินะคะ"
90001030-37 = "[s] \"ข้อมูลเกี่ยวกับอาบี เอชูห์เหรอ?\""
90001030-38 = "มันเป็นเพียงสมมติฐานง่ายๆ ค่ะ คุณครู"
90001030-39 = "เด็กๆ พวกนั้นคงจะรู้ถึงลักษณะที่แท้จริงของ <พลังของทวยเทพไร้นาม> อยู่แล้วน่ะค่ะ"
90001030-40 = "ถ้าอย่างนั้น ขั้นตอนต่อไปที่จำเป็นก็คือ..."
90001030-41 = "ใช่ค่ะ <การพิสูจน์ข้อมูลว่าความรู้ที่มีอยู่นั้นมีความหมายมากแค่ไหน>"
90001030-42 = "หมายความว่าทางนั้นต่อสู้กับเราเพื่อจะเฝ้าสังเกตความสามารถของอาบี เอชูห์ และเพื่อเก็บข้อมูลการ#nต่อสู้อย่างนั้นเหรอ?"
90001030-43 = "[s] \"ถ้าอย่างนั้นการต่อสู้ทั้งหมดที่ผ่านมาก็...\""
90001030-48 = "ใช่แล้วค่ะ ทั้งหมดนั่นก็คือ... อุบายของเด็กพวกนั้นค่ะ"
90001030-49 = "แต่เรื่องที่ว่าพวกเธอต้องการอะไรจาก <การเฝ้าสังเกต> ยังคงเป็นปริศนาอยู่ค่ะ"
90001030-50 = "แต่ถึงยังไง เรื่องที่เรากำลังพูดถึงนี้เป็นเพียงแค่สมมติฐานเท่านั้น และยากที่จะบอกให้แน่ชัดว่าเป็น#nเรื่องจริงหรือไม่..."
90001030-51 = "แต่ถ้าหากเป็นไปตามที่หัวหน้าฮิมาริสันนิษฐาน เราก็อธิบายได้ว่าทำไมเกวูราห์ถึงประวิงเวลาการต่อสู้#nมาจนถึงตอนนี้ค่ะ"
90001030-52 = "อืม~ เรื่องเกวูราห์ก็เรื่องหนึ่ง แต่ก็ยังมีผู้เลื่อมใสตนใหม่ที่มาปรากฏตัวต่อหน้าเราอีก~"
90001030-53 = "การเปิดเผยร่องรอยต่างๆ ไว้ที่นี่ ก็คงหมายความว่าผู้เลื่อมใสตนนี้ก็กำลังเตร็ดเตร่ไปในธารน้ำแข็งด้วย#nจุดประสงค์บางอย่างเหมือนกันใช่มั้ย?"
90001030-54 = "ก็คงจะเป็นอย่างนั้นค่ะ"
90001030-55 = "อยากรู้จังเลยค่ะว่าหน้าตาเป็นยังไง"
90001030-56 = "ฉันเองก็อยากรู้เรื่องนี้มากกว่าใคร แต่ตอนนี้เรายังไม่มีเบาะแสเลยน่ะสิคะ"
90001030-57 = "แต่ว่า... ถ้าพิจารณาจากขนาดของร่องรอยที่ทิ้งไว้ในธารน้ำแข็งแล้ว ผู้เลื่อมใสตนนี้อาจมีขนาดใหญ่#nเกินคาดก็ได้"
90001030-58 = "และเราก็พอคาดเดาได้ว่า นี่คือผู้เลื่อมใสที่สามารถเคลื่อนไหวได้เป็นเวลานานด้วยพลังของตัวเองค่ะ"
90001030-59 = "พลังของทวยเทพไร้นาม เกวูราห์ วิศวกรของเดคาแกรมมาทอน และแผนการร้ายในธารน้ำแข็งของ#nผู้เลื่อมใสตนใหม่..."
90001030-60 = "[s] \"พอยกมาพูดทุกอย่าง ก็รู้สึกเป็นลางไม่ดีเลยนะ...\""
90001030-61 = "พวกนั้นกำลังมุ่งหมายอะไรอยู่กันแน่นะ..."
90001030-62 = "อะไรที่ยังไม่ปรากฏต่อสายตาของพวกเรา... ต้องมีอะไรที่ยิ่งใหญ่กว่านี้ซ่อนอยู่แน่ๆ..."
90001030-74 = "อะ... อะอะอะอะ... อะไรกันคะ? จู่ๆ ก็เกิดอะไรขึ้นน่ะ?!"
90001030-75 = "จู่ๆ ก็มีการยิงทางอากาศน่ะ...! ขืนบินอยู่อย่างนี้จะอันตรายนะ หัวหน้า"
90001030-76 = "กระแสลมก็ไม่เอื้ออำนวยด้วยค่ะ คุณครู"
90001030-77 = "[s] \"ลงจอดฉุกเฉิน!\""
90001030-78 = "ค่ะ ลงจอดฉุกเฉินค่ะ "
90001030-90 = "เราถูกล้อมแล้วสินะคะ"
90001030-91 = "จะฝ่าไปเหรอ? โทคิ?"
90001030-92 = "ค่ะ วางใจฉันได้เลยค่ะ"
90001030-107 = "เข้ามาเรื่อยๆ เลยแฮะ นี่ก็เพื่อเอาข้อมูลการต่อสู้อีกอย่างนั้นเหรอ?"
90001030-108 = "ไม่ค่ะ! นี่มัน...!"
90001030-112 = "(สิ่งที่เราได้เจอหลังจากติดตามร่องรอยก็คือ กองกำลังจำนวนมากของเดคาแกรมมาทอนที่เหมือนว่า#nกำลังรอพวกเราอยู่...)"
90001030-113 = "(หรือว่านี่จะเป็นกับดักที่ทางนั้นวางแผนไว้? ถ้าไม่อย่างนั้นก็...)"
90001030-118 = "หืม? จู่ๆ กองกำลังของศัตรูก็เริ่มล่าถอยอย่างนั้นเหรอ?"
90001030-126 = "ถ้าเป็นการล่าถอยเพราะยอมรับว่าตัวเองสู้กับเราไม่ไหวก็คงดีหรอก... แต่ดูไม่เป็นอย่างนั้นเลยค่ะ มันเหมือนกับว่า..."
90001030-130 = "?!"
90001030-131 = "นี่มัน... อย่าบอกนะคะว่า?!"
90001030-139 = "หัวหน้า! 15 เมตรจากใต้ดิน!"
90001030-140 = "เกวูราห์มาอยู่ในที่แบบนี้อย่างนั้นเหรอคะ?!"

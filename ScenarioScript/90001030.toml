90001030-47 = "3;히마리 방한복;01\n#3;a\n#wait;1000"
90001030-48 = "3;히마리 방한복;02;네, 맞아요. 전부 그 아이들의 노림수…… 라는 이야기가 되겠죠."
90001030-49 = "3;히마리 방한복;04;물론 그러한 <관측>을 통해 무얼 얻고자 했는가. 까지는 여전히 오리무중이에요."
90001030-50 = "3;히마리 방한복;06;그렇게 따진다면, 애당초 지금 나누는 이야기 자체가 어디까지나 전부 가정 하의 가정일 뿐, 진실이라고 단언하기 어려운 것도 있고……."
90001030-51 = "3;히마리 방한복;06\n2;토키 모드 1;07;다만 히마리 부장의 말씀대로라면, 게부라가 이제껏 지연전을 펼치려고 했던 이유도 설명할 수 있습니다.\n#3;m4\n#2;ar"
90001030-52 = "3;히마리 방한복;06\n2;토키 모드 1;07\n1;에이미 수영복ND;01;으음~ 게부라도 게부라지만, 거기에 더해, 새롭게 눈앞에 등장한 또 다른 예언자란 건가~\n#1;ar\n#2;m3\n#3;m5\n#1;em;[한숨]"
90001030-53 = "1;에이미 수영복ND;00;여기서 흔적을 드러냈다는 건, 이 예언자도 뭔가 목적을 가지고서 빙해를 표류하고 있다는 뜻이겠지?"
90001030-54 = "3;히마리 방한복;02;그렇게 되겠지요."
90001030-55 = "2;토키 모드 1;00;어떻게 생겼을지 궁금해지는군요."
90001030-56 = "3;히마리 방한복;02;저 역시 누구보다도 그걸 알고 싶습니다만, 지금으로서는 단서가 없군요."
90001030-57 = "3;히마리 방한복;05;단지…… 빙해에 남겨진 이 흔적의 규모를 고려했을 때, 예상외의 크기를 가지고 있을 것이라는 것.\n#3;em;…"
90001030-58 = "3;히마리 방한복;99;그리고 상당히 오랜 시간 동안…… 자력으로 움직일 수 있는 예언자라는 것 정도만을 추측할 수 있을까요."
90001030-59 = "1;에이미 수영복ND;99;이름 없는 신들의 힘과 게부라, 데카그라마톤의 엔지니어, 그리고 또 새롭게 나타난 예언자가 빙해에서 꾸미는 음모, 라……."
90001030-60 = "[s] \"늘어놓고 보니, 뭔가 불길한 느낌만 드네…….\""
90001030-61 = "3;히마리 방한복;99;그들은 대체 무엇을 노리고 있는가……."
90001030-62 = "3;히마리 방한복;05;여전히 저희들 눈에는 보이지 않는, 좀 더 커다란 무언가가 숨겨져 있을 것이……."

[translation]
90001030-1 = "第3話;第二次"
90001030-4 = "我們已經追蹤冰海上的痕跡一段時間了，但目前還沒有發現任何特殊的跡象。"
90001030-5 = "不如先整理一下目前的情況，並檢討有無可疑之處吧？"
90001030-6 = "英美，麻煩顯示畫面。"
90001030-7 = "了解，部長。"
90001030-15 = "我們目前為止的行動大致可分為三個階段。#n與葛夫拉交戰、發現痕跡，以及展開追蹤。"
90001030-16 = "然而最根本的問題──葛夫拉究竟在這裡做些什麼，目前依然不得而知。"
90001030-17 = "不是跟之前差不多嗎？#n只有軍需工廠的赫賽德，還有看守廢墟淹沒地區的凱瑟算是例外。"
90001030-18 = "途中我們還遇見三個自稱是十字神名工程師的孩子，並受到了對方的攻擊。"
90001030-19 = "沒錯。而我比較在意的是，那些孩子曾經提到過「無名之神的力量」。"
90001030-20 = "準確來說，他們的說法是「被禁止的技術」。"
90001030-21 = "同時我們也發現Abi-Eshuh裡同樣使用了這股力量。"
90001030-22 = "是的。不過基本上十字神名與無名之神的力量，應該沒有任何關聯才對。"
90001030-23 = "雖然我也曾有類似的懷疑，卻沒能找到兩者之間的關聯性。"
90001030-25 = "把我們叫到這裡來的原因……#n恐怕是因為要完成他們口中的「姐姐大人」需要我們的力量吧。"
90001030-26 = "雖然不清楚他們需要的是我們當中的誰……"
90001030-27 = "是反映無名祭司和無名之神技術的「Abi-Eshuh」……"
90001030-28 = "還是聯邦學生會長留下的歐帕茲「希迪姆的箱子」……"
90001030-29 = "[s] 「……」"
90001030-30 = "還是我這個超天才清楚系病弱美少女，「全知」明星陽葵的可怕力量……"
90001030-31 = "（這個肯定不是）"
90001030-33 = "接下來這些只是我的假設……"
90001030-34 = "那些孩子……那三名自稱是Ain、Soph和Aur的工程師把我們叫來冰海的目的，#n如果是為了完成他們口中的「姐姐大人」……"
90001030-35 = "那麼他們現在最需要的東西，應該是有關Abi-Eshuh的情報才對。"
90001030-36 = "原來如此。"
90001030-37 = "[s]「Abi-Eshuh的情報？」"
90001030-38 = "這是一個簡單的假設，老師。"
90001030-39 = "他們已經清楚「無名之神的力量」的實情。"
90001030-40 = "既然如此，接下來需要的……"
90001030-41 = "沒錯，就是「驗證那些既存知識所代表的涵義」……"
90001030-42 = "意思是透過跟我們戰鬥，觀測Abi-Eshuh的能力和戰鬥情報嗎？"
90001030-43 = "[s]「如果是這樣的話，先前那幾場戰鬥該不會……」"
90001030-48 = "嗯，沒錯。#n恐怕那些……全都是他們設下的圈套。"
90001030-49 = "當然，他們希望藉由「觀測」獲得什麼樣的情報，這點還無從得知。"
90001030-50 = "不過這些都只是基於假設的假設，目前還無法斷定是否屬實……"
90001030-51 = "但假如情況真的像陽葵部長說的一樣，#n葛夫拉一直採用拖延戰術的理由也就解釋得通了。"
90001030-52 = "唔嗯～光是葛夫拉就已經夠讓人頭痛了，現在竟然又冒出了另一名預言者嗎～"
90001030-53 = "既然它在這裡現身，就代表這名預言者也是為了某個目的，才在這片冰海漂流的吧？"
90001030-54 = "我想應該沒錯。"
90001030-55 = "真想知道它究竟是從哪裡冒出來的。"
90001030-56 = "雖然我也跟你一樣好奇，可惜我們現在一點線索也沒有。"
90001030-57 = "不過……既然能在冰海上留下如此龐大的痕跡，對方的體型肯定超乎我們的預期。"
90001030-58 = "並且可以推斷的是，對方應該……是個能靠自己的力量長時間運行的預言者。"
90001030-59 = "無名之神的力量、葛夫拉和十字神名的工程師，#n再加上新預言者在冰海地帶的陰謀……"
90001030-60 = "[s]「把這些東西一次羅列出來，真是讓人寒毛直豎……」"
90001030-61 = "他們究竟在盤算著什麼呢……"
90001030-62 = "看來這片冰海底下，潛藏著某個我們無法一探究竟的巨大陰謀呢……"
90001030-74 = "怎，怎怎怎怎，怎麼了？什麼情況！？"
90001030-75 = "對方突然展開了對空射擊……！#n繼續飛行的話會有危險吧，部長？"
90001030-76 = "而且目前的氣流對我們不是很有利。#n老師，該怎麼做呢？"
90001030-77 = "[s]「緊急降落！」"
90001030-78 = "是，準備緊急降落。"
90001030-90 = "……看來被包圍了呢。"
90001030-91 = "開始突破吧。季？"
90001030-92 = "是，請包在我身上。"
90001030-107 = "敵人正源源不絕地包圍過來……難道這也是為了蒐集戰鬥情報嗎？"
90001030-108 = "不！這是……！"
90001030-112 = "（在一路追尋的痕跡盡頭等待著我們的，是早已等候許久的大量十字神名兵力……）"
90001030-113 = "（這難道是對方設計好的陷阱嗎？又或者……）"
90001030-118 = "嗯？敵人突然開始撤離了。"
90001030-126 = "如果只是意識到自己屈居劣勢而主動解除包圍倒還無妨……#n但情況看來並非如此，反而像是……"
90001030-130 = "！？"
90001030-131 = "這……該不會是！？"
90001030-139 = "部長！在地下15m的位置──"
90001030-140 = "葛夫拉！原來它一直在這種地方嗎！？"

[translation]
90001030-1 = "Episode 3;Second"
90001030-4 = "We've been following the trail deeper into the Glacial Sea for a considerable time now, but there's nothing of significant note."
90001030-5 = "Let's pause to organize our data, and reevaluate our goals."
90001030-6 = "Please pull up the video, Eimi."
90001030-7 = "Yes, President."
90001030-15 = "Our actions can be categorized into three main stages. We battled Geburah, found this clue, and are now tracking it."
90001030-16 = "But at the core of our investigation, we were unable to determine Geburah's intentions here."
90001030-17 = "Hasn't it always been difficult to figure out the prophets' motives? Of course, there were the exceptions of Chesed that was a munitions factory, and Kether that was guarding the ruined submerged district."
90001030-18 = "And, during that, we encountered three strange children, who claimed to be engineers and followers of Decagrammaton. They attacked us."
90001030-19 = "That's all correct. However, what is truly of interest to me, was their mention of the Nameless Gods' power."
90001030-20 = "To be exact, they called it \"forbidden technology.\""
90001030-21 = "Yes. They realized immediately that it was the same power used on my weapon, Abi-Eshuh."
90001030-22 = "And so I came to the conclusion that there is no direct connection between Decagrammaton and the Nameless Gods."
90001030-23 = "I'd originally surmised that there must be some relation between the two, but I was incorrect."
90001030-25 = "There's too many unanswered questions... I don't know why they called us here, but it seems our presence here was the final component in completing this \"Elder Sister\" they spoke of."
90001030-26 = "Whether they needed all of us or just a specific individual, and why, I still don't know."
90001030-27 = "Maybe it was the Nameless Priests' and Gods' technology in the Abi-Eshuh they were after..."
90001030-28 = "Or even the Shittim Chest. There's still many unknowns around the General Student Council president's last gift to Schale."
90001030-29 = "[s] \"...\""
90001030-30 = "It could even be the super-delicate, genius-hacker Akeboshi Himari's fearsome gift of Omniscience!"
90001030-31 = "(That's not real.)"
90001030-33 = "That's what we know. The rest is my hypothesis."
90001030-34 = "But if the reason those children, the engineers who introduced themselves as Ein, Sof, and Ohr, called us to the Glacial Sea was to complete this \"Elder Sister\"..."
90001030-35 = "Then we can predict that the information they needed the most was data from Abi-Eshuh."
90001030-36 = "Yes. That appears accurate."
90001030-37 = "[s] \"Abi-Eshuh's data?\""
90001030-38 = "It's a simple supposition, Sensei."
90001030-39 = "They were already aware of the Nameless Gods' powers."
90001030-40 = "So, upon learning of such a power, what would be the natural next step?"
90001030-41 = "It would be to acquire and validate data, and confirm if it can be used to their advantage."
90001030-42 = "They fought us, in order to gather data on the Abi-Eshuh?"
90001030-43 = "[s] \"Then, the real purpose behind that fight...\""
90001030-48 = "Correct. It was all a part of their strategy."
90001030-49 = "Although, I'm still unclear on just what their strategy or motive was."
90001030-50 = "As a caveat, this is all pure speculation. Speculations we've been having trouble finding any shred of evidence for."
90001030-51 = "However, it would align with why Geburah has been refusing to meet us on the battlefield."
90001030-52 = "Hm, hmmm. And, on top of everything, we've encountered a new prophet."
90001030-53 = "To have left such a conspicuous trail, they must have some purpose in the Glacial Sea, right?"
90001030-54 = "That's likely the case."
90001030-55 = "I'm curious about its appearance."
90001030-56 = "Me as well, perhaps more than anyone else. But, again, we're left with no clues."
90001030-57 = "The only thing I can deduce, based on the trail we saw, is that it is unimaginably large."
90001030-58 = "I suppose I would also surmise that it's capable of moving alone for extended periods of time."
90001030-59 = "The Nameless Gods' power, Geburah, the engineers of Decagrammaton, and the unknown prophet's motives..."
90001030-60 = "[s] \"Listing it all out like that feels...ominous.\""
90001030-61 = "Just what are they after?"
90001030-62 = "There must be an answer, hiding just beneath the surface."
90001030-74 = "Wh-Wh-What's happening all of a sudden?!"
90001030-75 = "Anti-aircraft fire! We are under attack. We should land, President."
90001030-76 = "There are hostiles in the air as well. Your orders, Sensei?"
90001030-77 = "[s] \"Emergency landing!\""
90001030-78 = "Yes. Commencing emergency landing."
90001030-90 = "...We're surrounded."
90001030-91 = "I'll break through. Toki?"
90001030-92 = "Yes. I shall make quick work of them."
90001030-107 = "They are very persistent. Is this attack also with the intent to collect data?"
90001030-108 = "No! This...!"
90001030-112 = "(It's as if the trail we were following led us directly to this force of Decagrammaton troops...)"
90001030-113 = "(Was this all a trap? Or...)"
90001030-118 = "Huh? The enemy forces are suddenly retreating."
90001030-126 = "In the ideal case, they will have recognized their inferiority and planned a strategic escape. However, this does not appear to be that."
90001030-130 = "?!"
90001030-131 = "This is... Could it be?!"
90001030-139 = "President! Entity approaching from 15m below!"
90001030-140 = "This is where you've been! Geburah!"

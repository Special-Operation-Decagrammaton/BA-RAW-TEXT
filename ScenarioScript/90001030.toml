90001030-15 = "#na;히마리 방한복;우리의 행동은 크게 세 단계로 분류할 수 있었죠. 게부라와 교전했고, 이 흔적을 발견했고, 그 뒤를 추적하고 있어요."
90001030-16 = "#na;히마리 방한복;하지만 기본적으로 게부라가 이곳에서 뭘 하고 있었는지에 대해서는, 알아낼 수 없었어요."
90001030-17 = "#na;에이미 수영복ND;지금까지도 보통 비슷하지 않았어? 물론 군수 공장이었던 헤세드나, 폐허 수몰 지구를 지키고 있었던 케테르는 조금 예외였던 것 같지만."
90001030-18 = "#na;토키 모드 1;그런 상황에서 데카그라마톤의 엔지니어를 자칭하는 세 명과 만났고, 그 아이들은 우리를 공격하려 했습니다."
90001030-19 = "#na;히마리 방한복;맞아요. 하지만 제가 조금 더 신경 쓰이는 점이 있다면, 그 아이들이 <이름 없는 신들의 힘>에 대해 언급했다는 것이에요."
90001030-20 = "#na;에이미 수영복ND;정확히는 '그 금지된 기술'이라고 표현했지만."
90001030-21 = "#na;토키 모드 1;저의 무장, 아비 에슈흐에 그 힘이 사용되었다는 점 역시 한 번에 파악했지요."
90001030-22 = "#na;히마리 방한복;네. 기본적으로 데카그라마톤과 이름 없는 신들의 힘 사이에는 아무 관계성도 없었어요."
90001030-23 = "#na;히마리 방한복;한 때 둘 사이에 어떤 연관점이 있지 않을까 생각해 보았지만, 결국 아니었죠."
90001030-24 = "3;히마리 방한복;02\n#3;a"
90001030-25 = "3;히마리 방한복;02;그들이 어째서 우리를 이곳까지 불러들였는지는 모르겠지만…… 그 <언니>라는 존재를 완성시키는 데 저희의 존재가 필요했다는 거겠죠."
90001030-26 = "3;히마리 방한복;06;필요했던 게 저희 중 누구였는지는 알 수 없지만……"
90001030-27 = "3;히마리 방한복;06;무명사제와 이름 없는 신들의 기술이 반영되어 있는 <아비 에슈흐>였는지,"
90001030-28 = "3;히마리 방한복;05;아니면 총학생회장이 남긴 오파츠 <싯딤의 상자>였는지……."
90001030-29 = "[s] \"…….\""
90001030-30 = "3;히마리 방한복;11;그것도 아니면 초천재병약미소녀인 저 아케보시 히마리의 <전지>의 두려운 힘이었는지……."
90001030-31 = "3;에이미 수영복ND;04;(그거 가짜잖아.)"
90001030-32 = "3;히마리 방한복;01\n#3;a"
90001030-33 = "3;히마리 방한복;05;여기서부터는 저의 가설이지만요.\n#3;em;…"
90001030-34 = "3;히마리 방한복;02;그 아이들, 자신들을 아인, 소프, 오르라고 소개한 엔지니어들이 우리를 빙해로 불러낸 이유가, 그 <언니>라는 존재를 완성시키기 위해서였다고 가정한다면……."
90001030-35 = "3;히마리 방한복;01;그 아이들이 가장 필요로 했던 것은, 아무래도 아비 에슈흐에 관한 정보라고 추측할 수 있을 것 같아요."
90001030-36 = "3;토키 모드 1;07;과연, 그렇군요.\n#3;em;…"
90001030-37 = "[s] \"아비 에슈흐의 정보라니?\""
90001030-38 = "3;토키 모드 1;02;간단한 가정입니다. 선생님."
90001030-39 = "3;토키 모드 1;01;그녀들은 이미 <이름 없는 신들의 힘>의 실체를 알고 있었던 것이었겠죠."
90001030-40 = "3;토키 모드 1;05;그렇다면 그다음으로 필요하다고 생각되는 과정은………\n#3;em;…"
90001030-41 = "3;히마리 방한복;02;그래요. <알고 있는 지식이, 어느 정도의 의미를 지니는가에 대한 데이터 실증>……."
90001030-42 = "3;에이미 수영복ND;02;그 말은, 우리와의 전투를 통해 아비 에슈흐가 가진 능력이나 전투 정보 따위를 계속해서 관측하려고 했다는 뜻이야?\n#3;em;[?]"
90001030-43 = "[s] \"그러면, 여태까지 이어졌던 전투들이, 설마…….\""
90001030-44 = "#st;[0,0];instant;1;"

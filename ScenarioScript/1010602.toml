[translation]
1010602-1 = "ผลของความพยายาม"
1010602-2 = "ห้องพักผ่อนชาเล่ต์"
1010602-3 = "(คุณครูกำลังจัดห้องพักผ่อนเพราะซากุระโกะบอกว่าจะแวะมาหา)"
1010602-10 = "ฮุฮุฮุ..."
1010602-14 = "[ns1] \"ซากุระโกะ ในชุดไอดอลเหรอ...?\"\n[ns2] \"กะแล้วเชียวว่าต้องมาชุดนี้...\""
1010602-17 = "คุณครูคาดไว้แล้วสินะคะ แต่ก็นะ ก็คุณครูเป็นคุณครูนี่นา"
1010602-18 = "ค่ะ นี่คือ 'ผลสำเร็จ' ที่ฉันได้ค่ะ"
1010602-19 = "ความพยายามที่ฉันทำมาจนถึงตอนนี้เพื่อจะเข้าหาเหล่าซิสเตอร์..."
1010602-20 = "ในที่สุดก็เกิดผลที่มองเห็นได้..."
1010602-21 = "คะ...?"
1010602-22 = "รู้สึกเหมือนเดจาวูอย่างนั้นเหรอคะ? หมายความว่ายังไงคะ..."
1010602-30 = "[ns3] (ไม่พูดถึงตอนนั้นจะดีกว่านะ...)\n[ns4] \"อืม ไม่มีอะไรหรอก\""
1010602-33 = "หะ... หืม...? อะไรกันคะ? รู้สึกเหมือนคุณครูตั้งใจไม่พูดอะไรแฮะ..."
1010602-34 = "เอาเถอะค่ะ ที่ฉันมาหาในวันนี้ก็เพื่อบอกคุณครูเกี่ยวกับ 'ผลสำเร็จ' ของฉันค่ะ"
1010602-35 = "ที่ผ่านมาฉันติดต่อคุณครูเพื่อจะขอความช่วยเหลือหรือไม่ก็ขอคำปรึกษาใช่มั้ยคะ..."
1010602-36 = "แต่วันนี้ต่างออกไปค่ะ วันนี้ฉันมาเพื่อทำให้คุณครูรู้สึกผ่อนคลายและภาคภูมิใจค่ะ"
1010602-37 = "ค่ะ... ใช่ค่ะ ในที่สุดฉันก็ทำได้ค่ะ นี่คือการก้าวไปข้างหน้าอีกหนึ่งก้าวในฐานะของซิสเตอร์ และผู้นำของกลุ่มค่ะ"
1010602-38 = "ฉันจะใช้..."
1010602-39 = "พะ... พลังของชุดพิ... ไม่สิ ชุดไอดอล!!"
1010602-40 = "[s5] \"...?????\"\n[s6] \"เมื่อกี้จะบอกว่าชุดพิธีใช่มั้ย!!\""
1010602-43 = "อะแฮ่ม..."
1010602-44 = "ที่ผ่านมาเกิดเรื่องราวขึ้นมากมาย แต่สุดท้ายแล้ว..."
1010602-45 = "พอได้ใส่ชุดนี้ ฉันก็รู้สึกได้ว่าท่าทีที่เหล่าซิสเตอร์มีต่อฉันเปลี่ยนไปอย่างเห็นได้ชัดเลยค่ะ"
1010602-46 = "ฉันไม่รู้สึกว่าพวกเขากลัวหรือไม่กล้าเข้าหาฉันเลยค่ะ มีหลายครั้งที่เข้ามาชวนคุยก่อนด้วยนะคะ"
1010602-47 = "ก่อนหน้านี้ไม่ว่าจะทำยังไงก็ไม่ค่อยได้ผลเลย กลายเป็นว่าตอนนี้กลายเป็นโอกาสที่คาดไม่ถึงแล้วค่ะ"
1010602-48 = "ฉันก็เลยคิดได้ค่ะ จริงอยู่ที่ความตั้งใจและจิตใจของแต่ละคนเป็นสิ่งสำคัญ..."
1010602-49 = "แต่บางครั้ง 'ภาพลักษณ์ที่มองเห็นได้' ก็สำคัญไม่แพ้กันค่ะ!"
1010602-50 = "[s7] \"โอ้... เป็นอย่างนี้สินะ\"\n[s8] \"ถึงกระบวนการจะดูแปลกๆ แต่ก็ได้คำตอบแล้วสินะ\""
1010602-53 = "ฮุฮุฮุ... ใช่ค่ะ"
1010602-54 = "หลังจากนั้นฉันก็เลยใส่ชุดพิธี... ไม่สิ ใส่ชุดไอดอลนี้แทนชุดซิสเตอร์... แล้วทำงานในชมรมอยู่หลาย#nวันเลยค่ะ"
1010602-55 = "ตอนแรกฉันก็กังวลหรอกนะคะ แต่ก็ได้ผลที่ดีเกินคาดเลยค่ะ ฉันรู้สึกว่าเหล่าซิสเตอร์ปฏิบัติตัวกับฉัน#nอย่างสบายใจกว่าเดิมค่ะ"
1010602-56 = "พูดตามตรงว่าชุดนี้เคลื่อนไหวค่อนข้างลำบาก และต้องใส่เครื่องประดับค่อนข้างเยอะ..."
1010602-57 = "แต่ฉันคิดว่าความสบายใจของคนรอบข้างสำคัญกว่าความไม่สะดวกของฉันเมื่อใส่ชุดนี้ค่ะ ต่อไปฉันก็#nจะใส่ชุดนี้อีกค่ะ"
1010602-58 = "[s9] \"สุดท้ายแล้วก็ได้ผลดีเลยนะ\"\n[s10] \"เป็นความตั้งใจที่ยอดเยี่ยมเลย\""
1010602-61 = "ขอบคุณอีกครั้งสำหรับความช่วยเหลือที่ผ่านมานะคะคุณครู ขอบคุณมากค่ะ"
1010602-62 = "แน่นอนว่าในอนาคตฉันคงมีเรื่องมารบกวนคุณครูและต้องขอคำปรึกษาจากคุณครูอีก..."
1010602-63 = "แต่อย่างน้อยเรื่องในครั้งนี้ก็น่าจะปิดจบได้อย่างนี้ค่ะ และส่วนตัวแล้ว... ฉัน..."
1010602-64 = "ดีใจมากๆ เลยค่ะ..."
1010602-65 = "[s11] \"อืม อย่างนั้นครูก็ดีใจนะ\"\n[s12] \"น่าภูมิใจจังเลยนะ...\""
1010602-68 = "จะว่าไป เมื่อเช้าฉันบอกเรื่องนี้กับคนอื่นไปแล้วค่ะ พวกฉันน่าจะงานยุ่งไปอีกสักพักเลยค่ะ"
1010602-69 = "ทุกคนต้องไปวัดตัวกัน... แถมยังต้องไปคุยเรื่องค่าสั่งตัดด้วย..."
1010602-73 = "[ns13] \"ยังไงนะ...????\"\n[ns14] \"เดี๋ยวนะ เมื่อกี้บอกว่า 'ทุกคน' เหรอ?\""
1010602-76 = "[ns15] \"ทำไมถึงเป็น 'ทุกคน' เลยล่ะ?\"\n[ns16] \"คงไม่ได้ให้ทุกคนใส่กันหมดใช่มั้ย!? ใช่มั้ย!?\""
1010602-79 = "คะ...???"
1010602-80 = "ทำไมถึงตกใจล่ะคะ? มันก็แน่อยู่แล้ว..."
1010602-81 = "ชุดที่ลดความรู้สึกห่างเหินของกันและกันได้ จะมีชุดอะไรที่ได้ผลดีไปกว่าชุดนี้อีกล่ะคะ? นี่คือเส้นทางที่ซิสเตอร์ควรเดินตามค่ะ"
1010602-82 = "และถ้าทุกคนอยู่ในชุดนั้น ต่อไปก็จะไม่มีเรื่องเข้าใจผิด ไม่มีความขัดแย้ง..."
1010602-83 = "...!?"
1010602-84 = "คุณครู...!? ทำไมจู่ๆ ถึงจับมือฉัน...!?"
1010602-85 = "คะ... คุณครู...!!??!"
1010602-87 = "(คุณครูจับมือซากุระโกะวิ่งสุดกำลังไปยังชมรมซิสเตอร์)"
1010602-88 = "(เมื่อไปถึง ก็ได้เจอเหล่าซิสเตอร์ที่ถือใบสั่งตัดชุดด้วยความลำบากใจ...)"
1010602-89 = "(สุดท้าย 'แผนการให้ชมรมซิสเตอร์ทุกคนใส่ชุดไอดอล' ก็ต้องพับลง)"

1010602-44 = "3;사쿠라코 아이돌;01;그동안 많은 일들이 있었지만, 결과적으로……."
1010602-45 = "3;사쿠라코 아이돌;02;이 복장을 간간히 입게 된 뒤로, 저를 대하는 자매님들의 태도가 확연하게 달라진 것을 느꼈습니다."
1010602-46 = "3;사쿠라코 아이돌;07;무서워하거나 어려워하시는 느낌은 간 곳이 없었고, 먼저 말을 걸어 주신 적도 많았죠.\n#3;em;…"
1010602-47 = "3;사쿠라코 아이돌;01;그전까지는 어떻게 하려고 해도 잘되지 않았던 광경이, 뜻밖의 계기로 저에게 펼쳐진 것입니다."
1010602-48 = "3;사쿠라코 아이돌;06;그래서 깨달았습니다. 각자의 내면과 의도가 중요하다는 것은 물론 더 말할 필요 없는 사실이지만……."
1010602-49 = "3;사쿠라코 아이돌;18;때로는 '겉으로 보이는 이미지' 또한 그에 못지않게 중요한 가치를 지닌다는 것을!\n#3;em;[!]"

1010602-55 = "3;사쿠라코 아이돌;03;걱정과는 달리, 의외로 정말 효과가 있더군요. 많은 자매님들이 저를 좀 더 편하게 대하신다고 느껴졌습니다.\n#3;em;[반짝]"

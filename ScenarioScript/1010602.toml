1010602-33 = "3;사쿠라코 아이돌;04;으, 으음……? 뭘까요? 방금 뭔가 알 수 없는 배려가 느껴졌는데…….\n#3;em;[땀]"
1010602-34 = "3;사쿠라코 아이돌;02;아무튼 오늘 이렇게 찾아뵌 것은, 저의 '성과'에 대해 말씀드리기 위함이었습니다."
1010602-35 = "3;사쿠라코 아이돌;99;그간의 연락들은 모두 도움이나 상담을 구하고자 하는, 도움 요청이었지요…….\n#3;em;…"
1010602-36 = "3;사쿠라코 아이돌;01;허나 오늘은 다르거든요. 선생님께 작게나마 안도감, 혹은 뿌듯함을 드리기 위해서랍니다."
1010602-37 = "3;사쿠라코 아이돌;17;……네. 그렇습니다. 마침내 저는 해낸 것입니다. 시스터로서도, 집단을 이끄는 자로서도 한 단계 전진한 것입니다.\n#3;em;[반응]"

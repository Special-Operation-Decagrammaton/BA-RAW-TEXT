1004102-26 = "4;미사키;05;말해두겠지만, 나는 다른 아이들의 안전을 책임지고 있는 입장이야."
1004102-27 = "4;미사키;05;우리는 숨바꼭질 중이고, 우리를 찾으려는 술래들이 눈에 불을 켜고 우리를 쫓아다니고 있으니까."
1004102-28 = "4;미사키;05;그래서 선생님, 당신이 나와 연락하고 있는 것은 원칙적으로 있어서는 안 되는 일이야."

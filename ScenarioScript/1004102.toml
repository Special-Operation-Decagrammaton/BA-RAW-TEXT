[translation]
1004102-1 = "名為肉體的牢籠"
1004102-4 = "……"
1004102-5 = "[s]「……」"
1004102-6 = "……為什麼變成這樣？我沒打算要見老師啊。"
1004102-7 = "[s]「呃……那個……」"
1004102-8 = "為什麼約我碰面？"
1004102-9 = "你有什麼意圖？"
1004102-10 = "[s]「沒……沒有啊……」"
1004102-11 = "那我回去了。"
1004102-12 = "[s]「等，等一下！」"
1004102-13 = "……怎麼了？"
1004102-14 = "[s1]「因為總覺得……美咲讓人放心不下……」\n[s2]「而且我也不知道你在想什麼……」"
1004102-15 = "……所以呢？"
1004102-16 = "……所以呢？"
1004102-17 = "[s3]「所以……我想和美咲聊聊……」\n[s4]「我想更了解你……」"
1004102-18 = "……"
1004102-19 = "……"
1004102-20 = "……唉。"
1004102-26 = "我現在肩負著守護其他奧利斯同學的使命。"
1004102-27 = "必須躲避正在追查我們的所有目光。"
1004102-28 = "因此原則上我不能和外部人士聯絡。明白嗎？"
1004102-29 = "不過……"
1004102-30 = "算了，反正我們的命基本上也相當於掌握在你手裡。"
1004102-31 = "所以你要我做什麼？"
1004102-32 = "[s]「那我們來聊聊吧……」"
1004102-33 = "……"
1004102-34 = "[s]「或者有我能幫忙的事嗎？」"
1004102-35 = "沒有。"
1004102-36 = "啊……不過說到幫忙……確實有件事能讓你幫忙。"
1004102-37 = "[s]「太好了！不管什麼事你儘管說！」"
1004102-38 = "那麼……"
1004102-41 = "……誤差修正完畢。"
1004102-42 = "[s]「結束了？」"
1004102-43 = "嗯。我們使用的GPS裝置很老舊，所以只能在這麼高的地方修正誤差。"
1004102-44 = "但是我一個人來不了這種地方……"
1004102-45 = "這下我們短時間內應該不會迷路了。謝謝你，老師。"
1004102-46 = "[s]「能幫上美咲的忙我就放心了。」"
1004102-47 = "……放心？為什麼？"
1004102-48 = "[s]「……因為美咲很少表露出感情，我不知道是不是真的有幫上忙。」"
1004102-49 = "……是嗎。"
1004102-50 = "常有人這麼對我說呢……但別人怎麼想都跟我無關。"
1004102-51 = "既然事情搞定了，那就回去吧。"
1004102-52 = "[s]「你，你會餓嗎？要不要去吃點什麼？」"
1004102-53 = "不用。"
1004102-54 = "事情做完了就下去吧。"
1004102-58 = "[ns]「……呃，嗯。」"
1004102-63 = "……"
1004102-64 = "[s]「……」"
1004102-65 = "……"
1004102-66 = "……對不起，很不自在吧？感覺陪著我的人總會這麼想。"
1004102-67 = "我對任何事情都很無感。"
1004102-68 = "你剛才不是問我要不要去吃東西嗎？"
1004102-69 = "……我甚至對進食也不怎麼感興趣。"
1004102-70 = "就算餓了也只要吃下餓不死的份量就行，不會特別想吃什麼。#n反正到了胃裡全都一樣。"
1004102-71 = "[s]「可是不好好吃東西對身體不好呀。」"
1004102-72 = "……或許吧。但頂多也就是搞壞身體而已。#n肉體遲早會回歸塵土，只是沒有意義的容器而已，死就死了。"
1004102-73 = "[s]「是嗎……」"
1004102-74 = "就是這麼回事。"
1004102-75 = "[s]「但美咲難道沒有其他覺得重要的事物嗎……？」"
1004102-76 = "……不知道。"
1004102-77 = "會有那種東西嗎？"
1004102-78 = "就算覺得重要也都只是身外之物──"
1004102-86 = "！？"
1004102-92 = "[ns]「電梯停了？」"
1004102-93 = "……！？"
1004102-94 = "不是吧……偏偏選在這種時候……！"
1004102-95 = "報告，由於防災系統發生錯誤，整棟大樓目前已斷電。#n修復時間預計將為一小時左右。"
1004102-96 = "一，一小時……？等等……！"
1004102-97 = "等一下……！我現在──"
1004102-98 = "[s]「沒辦法了。」"
1004102-99 = "什麼叫沒辦法……一小時耶……"
1004102-100 = "[s]「嗯？你不是說今天沒事嗎……？」"
1004102-101 = "是，是沒錯啦……！"
1004102-102 = "但，但是現在……"
1004102-103 = "[s]「我們就放寬心等吧，馬上就會修好了。」"
1004102-104 = "那，可是……！"
1004102-105 = "[s]「你臉色看起來不太好耶……還好嗎？」"
1004102-106 = "別，別跟我說話──"
1004102-107 = "[s]「……美咲？你臉色很差耶？」"
1004102-108 = "……"
1004102-109 = "[s5]「沒事吧？」\n[s6]「有哪裡不舒服嗎？」\n[s7]「大致就行了，能跟我說嗎……」"
1004102-110 = "別，別跟我說話……"
1004102-111 = "別，別跟我說話……"
1004102-112 = "別，別跟我說話……"
1004102-113 = "我，我……"
1004102-114 = "[s8]「美咲，怎麼了？」\n[s9]「……？」\n[s10]「我能幫你做什麼嗎……」"
1004102-115 = "我有幽閉恐懼症啦！"
1004102-116 = "我有幽閉恐懼症啦！"
1004102-117 = "我有幽閉恐懼症啦！"
1004102-118 = "[s]「……」"
1004102-119 = "啊……"
1004102-125 = "[ns]「門開了！」"
1004102-127 = "喔！原來有人被困在電梯裡啊。電源已經修好了。抱歉造成兩位的不便。"
1004102-128 = "[s]「啊……是，謝謝。」"
1004102-130 = "……"
1004102-131 = "[s11] 下跪道歉\n[s12] 磕頭謝罪"
1004102-132 = "老師……"
1004102-133 = "老師……"
1004102-134 = "[s]「……美咲，真的很對不起。我什麼都不知道……」"
1004102-135 = "……別在意了。"
1004102-136 = "畢竟我會進出地下墓穴，我沒有說的話通常也不會察覺到……"
1004102-137 = "總之……我很怕身處在狹窄昏暗的地方。"
1004102-138 = "……也就是所謂肉體缺陷。這不是老師的問題，老師不用在意。"
1004102-139 = "[s]「……唔，嗯。」"
1004102-141 = "（美咲回去時，背影透露著一股淒涼）"

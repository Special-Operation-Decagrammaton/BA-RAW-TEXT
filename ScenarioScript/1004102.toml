1004102-43 = "อื้อ อุปกรณ์ GPS ที่เรามีตอนนี้มันเก่ามากแล้ว จะต้องอยู่ที่สูงๆ แบบนี้ถึงจะปรับค่าความคาดเคลื่อนได้"

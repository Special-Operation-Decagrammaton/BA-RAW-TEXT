[translation]
42150-1 = "第15話;SRTの正義"
42150-11 = "あぁ～生き返る～#n温水シャワーなんていつぶりだろ……"
42150-12 = "疲れた身体に……染み渡ります……"
42150-13 = "運動後のシャワーは最高だな……"
42150-14 = "ふう……。"
42150-15 = "……本当に、色々なことがあった日でしたね。"
42150-16 = "そうだな。公園にいた時より、あっという間に一日が終わった気がする。"
42150-17 = "やはり、規則正しい生活をするとメリハリがつくな。"
42150-18 = "サキは公園にいる時だって自分で時間割作って生活してたじゃん。#n大差ないでしょ。"
42150-19 = "……まぁでも。私も今日は大満足だったよ。#n普段はなかなか撃てない特殊弾を思う存分撃てたからね。"
42150-20 = "私も……これだけセキュリティ設備が整った施設は久しぶりだから……ちょっと安心できる気がする。"
42150-21 = "公園だと、道に迷った人とか、野生動物に会ってビックリしちゃうから……。"
42150-22 = "でも……"
42150-23 = "どうしたんだ？何か気になることでもあるのか？"
42150-31 = "……こんなに快適な生活をしてて……いいのかな？"
42150-32 = "栄養バランスの取れた食事と、温かいシャワーがあるだけで快適な生活と言うのは語弊があるかもしれませんが……"
42150-33 = "……公園での生活は、想像以上に皆さんに負担を強いていたのだと改めて反省しました。申し訳ないです。"
42150-34 = "そ、そういう意味じゃなくて……その……"
42150-35 = "ここでは、自分で判断しなくてもいいんだなぁって……"
42150-36 = "何を食べて良いのかとか、何をすべきなのかとか……#n間違った判断をしていないかとか……"
42150-37 = "全部、先輩が代わりに考えてくれるから……。"
42150-38 = "でも、他の人達が新体制に不安を覚えているなかで……私たちがこんな風にしてていいのかな……？"
42150-39 = "なんだか、身の丈に合わない服を着ているみたいで落ち着かなくて……"
42150-40 = "……他人と比べる事ではありません。"
42150-41 = "今日は本当に色々ありましたから、気持ちが落ち着かないのも分かります。"
42150-42 = "今は少し気が立っているんですよ。#n……ゆっくりと休んだら、じきに落ち着きます。"
42150-43 = "そうかな……"
42150-46 = "……ドラム缶風呂も、そう悪いものではなかったぞ。"
42150-47 = "そりゃあ……お湯を沸かすのは面倒だったし、#n狭いから身体を洗うのも大変だったけど……"
42150-48 = "それでも……その作業も、SRTの隊員として活動できているという実感になっていたからな。"
42150-50 = "今は、あの時よりは快適だけど……#n正直な話、金銭をもらって働く傭兵にでもなった気分だ。"
42150-51 = "私もそう思う。前はちょっとしたミサイルひとつ発射しただけで楽しかったけど……"
42150-52 = "いざ、思う存分撃っていいって言われたら、気が引けるというか。#n別にそんなに面白くないというか……いや、満足はしたけどさ……"
42150-53 = "でも、どこか息苦しい感じがしちゃって……"
42150-57 = "……ミヤコは大丈夫なのか？"
42150-58 = "は、はい？私ですか……？"
42150-59 = "私、は……"
42150-63 = "大丈夫です。この生活に満足しています。"
42150-64 = "皆さんが訓練に集中できる環境ですし、SRT特殊学園の復活にも貢献……#nRABBIT小隊の小隊長としてこれ以上にない待遇だと思っています。"
42150-65 = "……いえ、今は支隊長ですが。"
42150-66 = "……私たちは関係ないだろ。"
42150-67 = "[ruby=・   ・   ・]ミヤコ[/ruby]はこのままで大丈夫なのか？"
42150-68 = "[ruby=・   ・   ・   ・   ・   ・   ・]変わらない正義[/ruby]は……本当にこれでいいのか？"
42150-73 = "……お先に失礼します。#n皆さん、ゆっくり休んでくださいね。"
42150-81 = "………。"
42150-84 = "ふう……。"
42150-85 = "（シャワーを浴びてすぐ警備に入るのも久しぶりだ）"
42150-89 = "（夜風が頬を撫でる感覚……しっかりドライヤーで乾かせたから髪が重くない）"
42150-90 = "（装備も新しいものに交換したからなのか、軽く感じる……）"
42150-91 = "……皆さんも、きっとこの生活に慣れてくれるはず。"
42150-95 = "……？侵入警報？シャワー室がある建物の近く……？"
42150-96 = "あの辺に、外部と繋がる道路も出入り口もないのに……"
42150-97 = "……野生動物が引っかかっちゃったのかな？"
42150-101 = "[ns1] \"やあ、ミヤコ。\"\n[ns2] \"こんばんは。元気だった？\""
42150-104 = "……先生？"
42150-105 = "何故ここに……#nそれに、私たちの居場所をどうやって……"
42150-106 = "[ns] \"どうやって知ったのかは秘密だけど……。\""
42150-108 = "[ns] \"……この辺からRABBIT小隊の匂いがしてね。\""
42150-113 = "……逮捕します。"
42150-115 = "次回;先生の事情"

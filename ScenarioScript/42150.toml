42150-50 = "#na;사키 무소속;그런데 지금은 몸은 편하지만…… SRT의 대원이라기보다는 돈을 받고 일하는 용병이 된 것 같은 기분이야."
42150-51 = "#na;모에 무소속;나도 동감이야. 전에는 가벼운 소이탄 하나만 던져도 마냥 즐거웠는데……"
42150-52 = "#na;모에 무소속;막상 비싼 탄약을 마음껏 써도 좋다고 판을 깔아주니, 흥이 식었다고 해야 하나. 물론 즐겁긴 했지만, 뭔가……"

42150-11 = "#na;모에 무소속;아아~ 이게 얼마만의 온수 샤워야?"
42150-12 = "#na;미유 무소속;온몸이 노곤하니…… 녹아내리는 것 같아……"
42150-13 = "#na;사키 무소속;역시 기분 좋게 땀을 흘리고 하는 샤워가 최고라니까……"
42150-14 = "#na;미야코 무소속;후우……."
42150-15 = "#na;미야코 무소속;……정말 많은 일이 일어났던 하루였네요."
42150-16 = "#na;사키 무소속;그러니까. 공원에 있었을 때와 비교하면 하루가 정신없이 지나간 것 같아."
42150-17 = "#na;사키 무소속;역시 사람은 엄격한 규율 아래에서 규칙적인 생활을 해야 한다니까."
42150-18 = "#na;모에 무소속;사키 너는 공원에 있을 때도 시간표를 만들어 두고, 규칙적으로 생활했잖아. 뭘 새삼스럽게."
42150-19 = "#na;모에 무소속;……하지만 오늘은 나도 만족스러웠어. 공원에서는 쏠 기회가 거의 없었던 특수 탄환을 돈 걱정 없이 마음껏 쏴 볼 수 있었으니까."
42150-20 = "#na;미유 무소속;나도 이렇게 보안 설비가 갖춰진 훈련 시설은 오랜만이라…… 안심이 되는 것 같아."
42150-21 = "#na;미유 무소속;공원의 캠프는 가끔씩 길 잃은 시민들이나 야생 동물들이 찾아와서 깜짝 놀랄 때가 있으니까."
42150-22 = "#na;미유 무소속;하지만……"
42150-23 = "#na;사키 무소속;왜 그래, 미유? 뭔가 마음에 걸리는 거라도 있어?"

[translation]
42150-1 = "ตอนที่ 15;ความยุติธรรมของ SRT"
42150-11 = "ฮ้าา~ ไม่ได้อาบน้ำอุ่นมานานแค่ไหนแล้วนะ"
42150-12 = "แขนขาเปลี้ยไปหมด... เหมือนตัวจะละลายเลยละ"
42150-13 = "ได้อาบน้ำหลังเหงื่อออกนี่ละดีที่สุดแล้ว..."
42150-14 = "ฟู่..."
42150-15 = "... วันนี้เราเจอเรื่องกันมาเยอะไปหมดเลยนะคะ"
42150-16 = "นั่นน่ะสิ ถ้าเทียบกับตอนอยู่ในสวนสาธารณะแล้ว ถือว่าเป็นหนึ่งวันที่วุ่นวายเลยละ"
42150-17 = "ก็บอกแล้วนี่ว่าคนเราต้องใช้ชีวิตในกฎระเบียบอย่างเคร่งครัดซะบ้างน่ะ"
42150-18 = "ตอนอยู่ในสวนสาธารณะ ซากิก็ทำทั้งตารางเวลาและใช้ชีวิตตามกฎเกณฑ์อยู่ดีไม่ใช่เหรอ พูดเหมือน#nเพิ่งจะมาอยู่ในกฎงั้นแหละ"
42150-19 = "... แต่วันนี้ฉันก็พอใจเหมือนกันนะที่ได้กระหน่ำกระสุนปืนพิเศษโดยที่ไม่ต้องกังวลเรื่องเงินเลย ตอนอยู่#nสวนสาธารณะฉันไม่ได้มีโอกาสแบบนี้เลยนะ"
42150-20 = "ฉันก็ไม่ได้อยู่ในอาคารฝึกฝนที่มีอุปกรณ์รักษาความปลอดภัยครบครันแบบนี้มานานแล้ว... ก็เลยรู้สึก#nวางใจขึ้นมาเลยละ"
42150-21 = "ตอนอยู่ค่ายในสวนสาธารณะน่ะ บางทีฉันก็ต้องตกใจกับชาวเมืองที่หลงทางหรือสัตว์ป่าที่ออกมาหา#nกินกลางดึกด้วย"
42150-22 = "แต่ว่า..."
42150-23 = "เป็นอะไรเหรอ มิยุ? มีอะไรค้างคาใจงั้นเหรอ?"
42150-31 = "... เรามาอยู่สบายๆ กันแบบนี้ได้เหรอ?"
42150-32 = "ถึงการที่แค่ได้กินอาหารที่สมดุลและได้อาบน้ำอุ่นๆ มันอาจจะบอกว่าเป็นชีวิตที่สุขสบายไม่ได้ก็จริง..."
42150-33 = "แต่ตอนอยู่ในสวนสาธารณะเราต้องใช้ชีวิตอย่างยากลำบากกันมาก ฉันรู้สึกขอโทษต่อทุกคนจังเลยค่ะ"
42150-34 = "มะ... ไม่ใช่อย่างนั้นหรอก ที่ฉันจะบอกก็คือ..."
42150-35 = "อยู่ที่นี่เราไม่ต้องตัดสินใจอะไรกันเองเลยน่ะ"
42150-36 = "เราไม่ต้องคิดว่าจะกินอะไร จะทำอะไร หรือกลัวว่าจะตัดสินใจอะไรผิดพลาดหรือเปล่า..."
42150-37 = "ทุกอย่างเป็นการตัดสินใจจากพวกรุ่นพี่หมดเลย ฉันก็เลยไม่กังวล"
42150-38 = "แต่ตอนนี้ผู้คนในคิโวทอสต่างตกอยู่ในความกระสับกระส่าย... นักเรียน SRT อย่างพวกเราจะมาใช้ชีวิต#nสบายๆ แบบไม่ต้องกังวลอะไรแบบนี้ได้เหรอ?"
42150-39 = "มันเหมือนกับได้ใส่ชุดที่ไม่เข้ากับร่างกายเท่าไร ฉันก็เลยไม่สบายใจน่ะ..."
42150-40 = "... คงจะแค่คิดไปเองน่ะค่ะ"
42150-41 = "วันนี้เกิดเรื่องขึ้นตั้งมากมาย ไม่แปลกที่จะรู้สึกว่าจิตใจไม่สงบค่ะ"
42150-42 = "ไปอาบน้ำให้ผ่อนคลายตัว ได้นอนหลับสักตื่น แล้วความไม่สบายใจนั้นจะหายไปเองค่ะ"
42150-43 = "ฉันคิดไปเองจริงๆ เหรอ..."
42150-46 = "... ถ้าให้พูดตรงๆ ฉันว่าการได้อาบน้ำในถังพร้อมๆ กับทุกคนก็ไม่ได้แย่ไปซะทีเดียวหรอกนะ"
42150-47 = "แน่นอนว่าการเตรียมน้ำอาบมันก็ยุ่งยากอยู่ แล้วก็ต้องมากังวลด้วยว่าใครจะมาแอบดูหรือเปล่า และถัง#nน้ำก็เล็กจนล้างเนื้อล้างตัวได้ไม่สะดวกเท่าไร..."
42150-48 = "แต่อย่างน้อยในช่วงเวลาที่ยากลำบากนั้น ความรู้สึกของการใช้ชีวิตในฐานะสมาชิกของ SRT ก็ไม่เปลี่ยนไปเลย"
42150-50 = "ตอนนี้เราสบายตัวกัน... แต่ฉันกลับรู้สึกว่าเราเป็นทหารรับจ้างที่ทำงานเพื่อเงินมากกว่าเป็นสมาชิกของ SRT เสียอีก"
42150-51 = "ฉันก็เห็นด้วย เมื่อก่อนแค่ได้โยนระเบิดไฟลูกเล็กๆ ฉันก็สนุกแล้ว..."
42150-52 = "แต่พอจู่ๆ ก็ได้มาใช้กระสุนราคาแพงได้อย่างตามใจชอบ ฉันก็รู้สึกว่ามันหมดสนุกไปเลยน่ะ คือมันก็ยัง#nสนุกอยู่หรอกนะ แต่ว่า..."
42150-53 = "ฉันรู้สึกอึดอัดเหมือนถูกกีดขวางยังไงไม่รู้"
42150-57 = "... แล้วมิยาโกะล่ะ เป็นไงบ้าง?"
42150-58 = "คะ... คะ? เรียกฉันเหรอคะ...?"
42150-59 = "ฉัน..."
42150-63 = "ไม่เป็นไรค่ะ ฉันพอใจกับการใช้ชีวิตที่นี่ในตอนนี้ค่ะ"
42150-64 = "สมาชิกทุกคนตั้งใจฝึกฝนได้อย่างสะดวกสบาย และหากมันจะช่วยให้สถาบัน SRT กลับมาได้ละก็ ในฐานะหัวหน้ากองทหาร RABBIT แล้ว ฉันไม่มีเหตุผลที่จะลำบากใจหรอกค่ะ"
42150-65 = "... ไม่สิ ถึงตอนนี้จะเป็นแค่หัวหน้าหน่วยก็เถอะ"
42150-66 = "... ไม่ได้ถามสักหน่อยว่าพวกฉันอยู่แบบนี้กันแล้วมันดีหรือเปล่า"
42150-67 = "ถามเธอนั่นแหละ โอเคกับการอยู่อย่างนี้ไหมน่ะ?"
42150-68 = "ความยุติธรรมที่ไม่มีวันเปลี่ยนแปลงที่เธอพูดถึงมาตลอดน่ะ... แค่นี้ก็เพียงพอแล้วจริงๆ เหรอ?"
42150-73 = "... ฉันต้องขอตัวก่อนนะคะ ทุกคนอาบน้ำและพักผ่อนกันให้เต็มที่นะคะ"
42150-81 = "........."
42150-84 = "เฮ้อ..."
42150-85 = "(นานแล้วเหมือนกันนะที่เราไม่ได้อยู่เวรยามทันทีหลังจากอาบน้ำเสร็จ)"
42150-89 = "(พอได้มารับลมพัดผ่านเส้นผมที่เป่าจนแห้งแล้วมันสดชื่นดีจัง)"
42150-90 = "(พอได้อาวุธชิ้นใหม่มาใช้ ก็รู้สึกว่าตัวเบาลงกว่าแต่ก่อน...)"
42150-91 = "... เดี๋ยวสมาชิกคนอื่นก็คงจะปรับตัวให้เข้ากับการใช้ชีวิตแบบนี้ได้เร็วๆ นี้แหละเนอะ"
42150-95 = "... หืม? สัญญาณเตือนการบุกรุกเหรอ? มาจากด้านนอกอาคารอาบน้ำด้วย...?"
42150-96 = "แถวนั้นไม่มีถนนเชื่อมถึงภายนอกได้ แล้วก็ไม่มีทางเข้าด้วยนี่นา..."
42150-97 = "... หรือว่าเซ็นเซอร์ดังเพราะมีสัตว์ป่าออกมาเดิน?"
42150-101 = "[ns1] \"เป็นยังไงบ้าง มิยาโกะ\"\n[ns2] \"สวัสดีตอนค่ำนะ!\""
42150-104 = "... คุณครู?"
42150-105 = "ทำไมถึงมาอยู่ที่นี่ได้... แล้วทำไมถึงรู้ด้วยว่าพวกฉันอยู่ที่นี่..."
42150-106 = "[ns] \"เรื่องนั้นมันเป็นความลับน่ะ...\""
42150-108 = "[ns] \"... ครูได้กลิ่นกองทหาร RABBIT ออกมาจากแถวนี้น่ะ\""
42150-113 = "... ฉันขอจับกุมค่ะ"
42150-115 = "ตอนต่อไป;เหตุผลของคุณครูคนนั้น"

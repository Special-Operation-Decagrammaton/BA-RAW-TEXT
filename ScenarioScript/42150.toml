42150-47 = "#na;사키 무소속;물론 목욕물을 준비하는 것도 번거롭고, 누가 훔쳐보지 않을까 신경도 쓰이고, 통도 좁아서 만족스럽게 몸을 씻기도 어려웠지만……"
42150-48 = "#na;사키 무소속;그래도 최소한 그 고생을 하는 동안에는 SRT의 대원으로 살아가고 있다는 기분만큼은 변치 않았거든."

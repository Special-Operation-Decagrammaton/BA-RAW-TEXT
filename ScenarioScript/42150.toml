42150-31 = "#na;미유 무소속;……이렇게 편한 생활을 해도 괜찮은 걸까?"
42150-32 = "#na;미야코 무소속;균형 잡힌 식사와 따듯한 온수가 제공되는 것만으로 편한 생활이라고 하기에는 어폐가 있지만……"
42150-33 = "#na;미야코 무소속;공원에서 너무 힘든 생활을 계속하게 한 것 같아서 모두에게 미안하네요."
42150-34 = "#na;미유 무소속;그, 그런 뜻이 아니야. 내가 하고 싶은 말은……"
42150-35 = "#na;미유 무소속;이곳에서는 스스로 판단하지 않아도 괜찮잖아?"
42150-36 = "#na;미유 무소속;무엇을 먹을지, 무얼 해야 할지, 잘못된 판단을 내리지는 않았을지……"
42150-37 = "#na;미유 무소속;모두 선배들이 대신 고민해 주니까 불안하지가 않아."
42150-38 = "#na;미유 무소속;하지만 키보토스의 사람들은 지금도 불안에 떨고 있는데…… SRT의 학생인 우리가 이렇게 편하게 있어도 괜찮을까?"
42150-39 = "#na;미유 무소속;뭔가 몸에 맞지 않은 옷을 입은 것 같아서, 마음이 불편해……"
42150-40 = "#na;미야코 무소속;……분명 기분 탓일 거예요."
42150-41 = "#na;미야코 무소속;오늘 너무 많은 일이 있어서, 마음이 정리되지 않아 그런 걸 거예요."
42150-42 = "#na;미야코 무소속;씻고 난 뒤에 한숨 푹 자고 일어나면 그 불편함도 금방 사라질 겁니다."

[translation]
42150-1 = "Episode 15; SRT's Justice"
42150-11 = "Man... I haven’t had a decent, hot shower in forever."
42150-12 = "All of my tension just went woosh..."
42150-13 = "Nothing beats a shower after a long day of work..."
42150-14 = "Ahh."
42150-15 = "What an eventful day."
42150-16 = "Seriously! The days used to drag on so slowly at the park when we had nothing to do."
42150-17 = "This is why I'm saying people really benefit from strict rules and a regimented schedule."
42150-18 = "You say that as if you didn't wake up at precisely 5 AM every day at the park too..."
42150-19 = "...Okay, okay. I did have fun too. I got to fire off some special ammo that I've held back on in the park due to budget constraints."
42150-20 = "It's been a while since we've had the safety of a secure facility. It's reassuring."
42150-21 = "It's nice to not have to worry about wild animals or lost hikers like at the park."
42150-22 = "But..."
42150-23 = "Is something wrong, Miyu? Did something happen today?"
42150-31 = "No, it's just... Is all of this comfort really okay?"
42150-32 = "It seems a little silly, but I'd never appreciated the luxury of a hot shower and fresh-cooked meals until now."
42150-33 = "I can't help but feel guilty for making you all rough it on in the park for so long."
42150-34 = "N-No... I didn't mean that kind of comfort... Like..."
42150-35 = "W-We don't have to make any decisions here, right?"
42150-36 = "What we eat, what we do, e-even deciding if our last decision was good or bad..."
42150-37 = "The F-FOX squad chooses everything for us, so I don't have to be a-anxious about anything..."
42150-38 = "But should SRT students be living in that kind of comfort, wh-when everyone out there is scared b-because they don't know what's going to happen to Kivotos."
42150-39 = "It's like... I-It's like my clothes look like they fit, but they don't feel like it. I don't know..."
42150-40 = "It's natural to question such a big life change like this."
42150-41 = "You've been through a whirlwind of a day, so it makes sense you would have all these questions and feelings."
42150-42 = "Why don't you sleep on it, and things might feel clearer tomorrow."
42150-43 = "M-Maybe..."
42150-46 = "...Honestly, I kind of missed the makeshift barrel baths with everyone."
42150-47 = "Heating up the water was a pain, I was always worried about prying eyes, and the tub was too cramped for a proper wash..."
42150-48 = "But despite all that, I always felt a kind of pride as an SRT member, using our skills and know-how to survive."
42150-50 = "Now, I’m physically at ease... but instead of an SRT recruit, I feel more like a hired mercenary."
42150-51 = "I actually get what you're saying, for once. At the park, even the small-scale drills were exhilarating... They gave me a high."
42150-52 = "With unlimited access to top-tier gear now, it almost dulls the thrill. Don't get me wrong, it's exciting, but it was just...off."
42150-53 = "Like the same enjoyment just isn't there..."
42150-57 = "...What about you, Miyako?"
42150-58 = "Wh-What? Me...?"
42150-59 = "I..."
42150-63 = "I've found the conditions to be very satisfactory."
42150-64 = "The squad can focus wholly on training now, and not where our next meal is coming from. As the squad leader of RABBIT working towards the revival of SRT, I have no complaints."
42150-65 = "Well, deputy squad leader now. "
42150-66 = "Yeah, yeah. You still didn't answer my question."
42150-67 = "What about YOU? How are YOU doing? What are YOU thinking?"
42150-68 = "The unwavering justice you've idolized and wouldn't shut up about since I first met you... The facilities, the hot meals and warm beds, do all those things make it worth it for YOU, Miyako?"
42150-73 = "...Excuse me. I'll leave you all to it."
42150-81 = "..."
42150-84 = "..."
42150-85 = "(I'd forgotten. Guard duty right after a shower used to be one of my favorite shifts.)"
42150-89 = "(Feeling the breeze through my damp hair is weirdly comforting. Familiar...)"
42150-90 = "(Familiar where everything is unfamiliar. Even the equipment feels different from our old weapons.)"
42150-91 = "...They'll adjust to this lifestyle. It's good for them."
42150-95 = "What was that? An intruder? Why would someone break in through the shower room?"
42150-96 = "The entrance is on the other side of the building, and no common roads lead to here."
42150-97 = "Was it a wild animal...?"
42150-101 = "[ns1] \"Hey, Miyako.\"\n[ns2] \"Good evening!\""
42150-104 = "Sensei...?"
42150-105 = "How are you here? How did you even find us?!"
42150-106 = "[ns] \"That's kind of a secret...\""
42150-108 = "[ns] \"I guess I followed the scent of the RABBIT Squad...?\""
42150-113 = "...I'm placing you under arrest."
42150-115 = "Next Episode; Sensei's Predicament"

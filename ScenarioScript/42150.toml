[translation]
42150-1 = "第15話;SRT的正義"
42150-11 = "啊啊～活過來了～#n多久沒洗到熱水澡了呢……"
42150-12 = "彷彿滲進了……疲勞的身體裡……"
42150-13 = "運動後沖的澡果然最棒了……"
42150-14 = "呼……"
42150-15 = "……今天真的發生了很多事呢。"
42150-16 = "就是說啊。#n和在公園的時候比起來，今天感覺一眨眼就過去了。"
42150-17 = "果然過著規律的生活才能感受到張弛有度啊。"
42150-18 = "咲希在公園的時候不也按照自己做的行程表按表操課嗎？#n和現在也沒差多少吧？"
42150-19 = "……嘛，不過我今天也非常滿足。#n畢竟盡情射了一堆平時很難射到的特殊子彈啊。"
42150-20 = "我也是……很久沒住在保全設施這麼齊全的設施了……覺得比較能放心。"
42150-21 = "如果在公園，有時會遇到迷路的人或野生動物……"
42150-22 = "但是……"
42150-23 = "怎麼了？有哪裡不對勁嗎？"
42150-31 = "……我們過得這麼安逸真的好嗎？"
42150-32 = "雖然只因為均衡的飲食和溫暖的淋浴就稱之為安逸的生活，可能有點語病……"
42150-33 = "……不過這更加讓我反省到在公園的生活給大家添了超乎想像的負擔。真的很抱歉。"
42150-34 = "我，我不是那個意思……是那個……"
42150-35 = "我們在這裡不必自己做判斷……"
42150-36 = "像是要吃什麼、該做些什麼、有沒有做出錯誤的判斷……"
42150-37 = "全部都能交由前輩們考慮……"
42150-38 = "可是，其他人都還在為新體制感到不安的時候……我們這樣真的好嗎？"
42150-39 = "總覺得像是穿著不合身的衣服一樣，有點冷靜不下來……"
42150-40 = "……不需要和他人比較。"
42150-41 = "今天真的發生了許多事，所以會冷靜不下來我也能理解。"
42150-42 = "……好好休息之後，很快就會冷靜下來了。"
42150-43 = "是嗎……"
42150-46 = "……在汽油桶裡泡澡其實也沒那麼糟。"
42150-47 = "當然……準備洗澡水的確很麻煩，要在那麼窄的地方清洗身體也很不容易……"
42150-48 = "不過……那些工作也讓我感覺到自己正以SRT隊員的身分活動。"
42150-50 = "而現在雖然過得比那時舒適……#n但老實說，我覺得自己比起SRT的隊員，反而更像收錢辦事的傭兵。"
42150-51 = "我也有同感。#n明明之前光是丟個導彈就開心得不得了……"
42150-52 = "現在就算聽到可以盡情發射，好像也有點提不起勁。#n雖然是有覺得滿足沒錯啦……"
42150-53 = "不過，總覺得有種莫名的窒息感……"
42150-57 = "……都子覺得沒問題嗎？"
42150-58 = "什，什麼？我嗎……？"
42150-59 = "我……"
42150-63 = "沒問題。我很滿意現在的生活。"
42150-64 = "這是能讓大家專心訓練的環境，也能為SRT特殊學園的復活有所貢獻……#n我認為身為RABBIT小隊的小隊長，應該沒有比這更好的待遇了。"
42150-65 = "……不，現在已經是分隊長了才對。"
42150-66 = "……這與我們無關吧。"
42150-67 = "我問的是[ruby= ・     ・ ]都子[/ruby]真的覺得這樣沒問題嗎？"
42150-68 = "[ruby=  ・     ・     ・     ・     ・     ・     ・  ]不會動搖的正義[/ruby]……真的是這樣嗎？"
42150-73 = "……我先離開了。#n各位請好好休息。"
42150-81 = "…………"
42150-84 = "呼……"
42150-85 = "（好久沒有剛洗完澡就馬上站哨了）"
42150-89 = "（晚風撫過微濕的頭髮時，我的心情就會跟著雀躍起來）"
42150-90 = "（或許是因為裝備也換新的緣故，感覺輕鬆了不少……）"
42150-91 = "……大家一定也會適應這裡的生活的。"
42150-95 = "……嗯？入侵警報？#n而且還在有淋浴間的建築附近……？"
42150-96 = "那附近既沒有連外道路，也沒有出入口……"
42150-97 = "……是野生動物觸發警報了嗎？"
42150-101 = "[ns1]「嗨，都子。」\n[ns2]「你好呀。過得還好嗎？」"
42150-104 = "……老師？"
42150-105 = "怎麼會在這裡……#n而且，又是怎麼知道我們的位置……"
42150-106 = "[ns]「這點我必須保密，不過……」"
42150-108 = "[ns]「……可能是因為這附近有RABBIT小隊的味道吧。」"
42150-113 = "……你被逮捕了。"
42150-115 = "下一話;老師的情況"

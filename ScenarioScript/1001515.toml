1001515-117 = "เพราะอาริสึอยากให้ผู้คนมีความสุขกันเยอะๆ เลยค่ะ!"
1001515-121 = "อะไรของเด็กคนนั้นเนี่ย..."
1001515-125 = "เอ๋? เมื่อกี้เสียงอะไรน่ะ?"
1001515-126 = "......! ปะ... ปลอกกระสุนปืนที่ขัดลำกล้องอยู่หลุดออกมาแล้ว! "
1001515-130 = "แปลกจังแฮะ... กำไลเจอร์ เจอร์ เจอร์เมเนียมไม่น่าจะช่วยเรื่องพวกนี้ได้นะ...?"
1001515-135 = "(คุณครูกับอาริสึช่วยกันแจกสติกเกอร์คำชมให้กับนักเรียนคนอื่นๆ เสร็จแล้วก็กลับไปที่ห้องชมรม#nพัฒนาเกม)"

1001515-200 = "[ns] \"อื้อ ครูจะพกไว้นะ\""
1001515-201 = "ค่ะ คุณครู"
1001515-202 = "อย่างที่คิดเลยค่ะ อาริสึน่ะชอบคุณครูจริงๆ ด้วยค่ะ"

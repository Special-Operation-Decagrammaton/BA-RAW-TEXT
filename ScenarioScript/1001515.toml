[translation]
1001515-1 = "อาริสึกับสติกเกอร์คำชม"
1001515-2 = "(คุณครูมุ่งหน้ามาที่ห้องชมรมพัฒนาเกมตามที่อาริสึชวน)"
1001515-3 = "(และในตอนนั้นเอง...!)"
1001515-8 = "คุณครู!!!"
1001515-9 = "[s] \"อาริสึ!!!\""
1001515-10 = "ว้าว! คุณครูจริงๆ ด้วยค่ะ!"
1001515-15 = "(อาริสึวิ่งมากอดคุณครูด้วยแรงทั้งหมดที่มี!)"
1001515-16 = "(แรงโถมตัวเข้ากอดของอาริสึทำเอาคุณครูเกือบล้ม)"
1001515-19 = "เชิญค่ะคุณครู! อาริสึกำลังรออยู่เลยค่ะ!"
1001515-20 = "[s] \"อื้อ! แล้วอยากให้ครูดูอะไรเหรอ?\""
1001515-21 = "ฮุ ฮุ ฮุ... เรื่องนั้นน่ะ..."
1001515-22 = "นี่ค่ะ!"
1001515-24 = "(อาริสึยื่นเข็มกลัดพลาสติกเล็กๆ มาตรงหน้า!)"
1001515-26 = "[ns1] \"นี่มัน... เข็มกลัดไม่ใช่เหรอ?\"\n[ns2] \"มีเขียนไว้ว่า 'Good Job' ด้วยแฮะ\""
1001515-29 = "ไม่ใช่เข็มกลัดหรอกค่ะ แต่เป็นสินค้า <สติกเกอร์คำชมจากคุณครู> ของจริงเลยน่ะค่ะ!"
1001515-30 = "มันคืออะไรน่ะเหรอคะ? เอ่อ คือ..."
1001515-31 = "เมื่อนานมาแล้ว มีเกมแนวโร้กไลก์เกมหนึ่งที่ทุกคนช่วยกันสร้างขึ้นมาค่ะ"
1001515-32 = "และเราก็สร้างไอเทมนำโชคพิเศษที่หายากมากๆ ขึ้นมาด้วย..."
1001515-33 = "ไอเทมอันนั้นก็คือ <สติกเกอร์คำชมจากคุณครู> ค่ะ!"
1001515-34 = "ถึงจะแค่เก็บเอาไว้ในช่องเก็บของ ไม่ได้ใช้งานหรือติดตั้งไว้ที่อุปกรณ์ก็ช่วยเพิ่มความแข็งแกร่ง และโชคให้กับตัวละครได้..."
1001515-35 = "เป็นไอเทมที่ดีมากๆ เลยค่ะ!"
1001515-36 = "[s3] \"อื้อ อื้อ...\"\n[s4] \"เลยทำออกมาเป็นของจริงสินะ\""
1001515-39 = "ใช่แล้วค่ะ!"
1001515-40 = "เพราะงั้นตั้งแต่นี้ไป อาริสึเลยตั้งใจว่าจะแจกสติกเกอร์คำชมนี้ให้กับทุกคนเลยค่ะ!"
1001515-41 = "เอาละค่ะคุณครู เราออกไปผจญภัยด้วยกันเถอะค่ะ!"
1001515-43 = "(คุณครูถูกอาริสึที่กำลังตื่นเต้นจูงมือพาออกไปข้างนอก)"
1001515-45 = "สวัสดีค่ะทุกคน!"
1001515-46 = "สวัสดีค่ะอาริสึ สวัสดีค่ะคุณครู"
1001515-47 = "วันนี้มีอะไรถึงมาที่นี่เหรอคะ?"
1001515-48 = "ค่ะ! ฉันเอาสติกเกอร์คำชมมาให้ทุกคนค่ะ! นี่ไงคะ!"
1001515-49 = "สติกเกอร์ 'Good Job' เหรอ... ทั้งที่เราไม่ได้ทำอะไรเป็นพิเศษเลย แต่ไม่รู้ทำไมถึงรู้สึกอารมณ์ดีขึ้นมา"
1001515-50 = "แต่พอคิดดูแล้ว สติกเกอร์นี่เหมือนกับการที่คุณครูเป็นคนชมเลยนะคะ"
1001515-51 = "ขอบคุณนะคะ คุณครู"
1001515-52 = "[s] \"เอ่อ อื้อ... ครูไม่ได้ทำอะไรเป็นพิเศษเลย\""
1001515-53 = "ฮิฮิ แต่ถึงอย่างนั้น ฉันก็ชอบมันนะคะ"
1001515-54 = "ขอบคุณนะ อาริสึ จะเก็บไว้อย่างดีเลย"
1001515-55 = "ค่ะ จะต้องมีเรื่องดีๆ เกิดขึ้นอย่างแน่นอนค่ะ เพราะมันก็เป็นไอเทมที่ช่วยเพิ่มค่าสถานะโชคในเกมนี่คะ"
1001515-56 = "โชค... อื้อ ถ้ามีของแบบนั้นไว้ก็คงจะดีเหมือนกันนะ "
1001515-57 = "การพัฒนาวัสดุแบบใหม่บางครั้งมันก็ไม่ต่างอะไรกับการซื้อล็อตเตอร์รีเลยละ"
1001515-58 = "... ใส่ส่วนผสมลงไปในที่บดยาและใช้มือค่อยๆ บดไป จากนั้นก็เอาไปเผา"
1001515-59 = "แล้วก็เอามาทุบให้ละเอียด และนำมาบดใหม่ จากนั้นก็เอาไปผสมแล้วผสมอีก วนไปอย่างนั้น..."
1001515-60 = "มันเป็นขั้นตอนที่ต้องทำซ้ำไปซ้ำมาไม่รู้จบ และได้แต่ภาวนาให้มีผลลัพธ์ใหม่ๆ ปรากฏออกมา..."
1001515-61 = "เพราะงั้นขอร้องละค่ะ ช่วยทำให้เครื่องปั้นดินเผารอบนี้ออกมาสมบูรณ์แบบด้วยนะคะ ท่านสติกเกอร์คำชม!!!"
1001515-62 = "[s] \"คะ... คงทำงานหนักกันน่าดูเลยสินะ...\""
1001515-63 = "อาริสึก็ไม่ค่อยแน่ใจเหมือนกันค่ะ..."
1001515-64 = "แต่ผลลัพธ์ต้องออกมาดีแน่ๆ ค่ะ!"
1001515-65 = "ถ้างั้น อาริสึจะไปแจกสติกเกอร์คำชมให้กับคนอื่นๆ ต่อแล้วนะคะ!"
1001515-69 = "นี่ๆ! มาดูนี่เร็ว! มีลายใหม่ออกมาด้วยละ! "
1001515-70 = "เอ๋?! จริงเหรอ?!?!"
1001515-71 = "ก็ใช่น่ะสิ! "
1001515-76 = "อย่าบอกนะว่า..."
1001515-77 = "เป็นเพราะสติกเกอร์คำชม...?"
1001515-80 = "งั้นอาริสึไปก่อนนะคะ พยายามเข้านะคะ! ทุกอย่างต้องผ่านไปได้ด้วยดีแน่นอนค่ะ!"
1001515-81 = "แค่อวยพรกันแบบนี้ก็ขอบคุณแล้วละ พอต้องมาจัดการเซิร์ฟเวอร์เนี่ย จู่ๆ ก็อยากสวดมนต์ขึ้นมาเลย"
1001515-85 = "เอ๋...?"
1001515-86 = "แก้ปัญหาเซิร์ฟเวอร์ได้แล้วจริงดิ?!?!"
1001515-89 = "อะฮ่า สติกเกอร์คำชมสินะ"
1001515-90 = "ค่ะ! อยากให้นึกถึงอาริสึกับคุณครู แล้วเก็บรักษาไว้ให้ดีนะคะ"
1001515-91 = "แน่นอน ต้องเก็บไว้อย่างดีอยู่แล้วละ ขอบคุณนะ อาริสึ"
1001515-96 = "เอ๋? ถูกรางวัลที่สาม... จากการจับฉลากบัตรซื้ออาหารเหรอ?"
1001515-97 = "......"
1001515-98 = "งั้นวันนี้ต้องสั่งคาราอะเกะเพิ่มแล้ว"
1001515-101 = "เจ้านี่ละ! มันจะปล่อยรังสีอินฟราเรดและไอออนลบ ซึ่งดีต่อการไหลเวียนโลหิต! "
1001515-102 = "นอกจากนี้ยังช่วยลดเขม่าดำจากกระสุนปืน แถมพกติดตัวไว้ยังช่วยเรื่องกระสุนขัดลำกล้องได้ด้วยนะ!"
1001515-103 = "เจ้าสิ่งนี้ก็คือกำไลเจอร์ เจอร์ เจอร์เมเนียมยังไงล่ะ!!!"

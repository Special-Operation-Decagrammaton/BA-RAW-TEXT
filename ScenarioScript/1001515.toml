[translation]
1001515-1 = "Aris and the Praise Stickers"
1001515-2 = "As Aris requested, I headed to the Game Development Department Room."
1001515-3 = "It was at that moment..."
1001515-8 = "Sensei!"
1001515-9 = "[s] \"Aris!!\""
1001515-10 = "Yay, it's Sensei!"
1001515-15 = "Aris jumped into my arms with all her might..."
1001515-16 = "I almost fell back into the hallway!"
1001515-19 = "Welcome, Sensei! I have eagerly awaited your arrival!"
1001515-20 = "[s] \"Thanks! What did you want to show me?\""
1001515-21 = "Heeheehee! That would be..."
1001515-22 = "...This!"
1001515-24 = "She presented me with a small piece of plastic!"
1001515-26 = "[ns1] \"Is this...some sort of...a badge?\"\n[ns2] \"'It says 'Good Job'... Hmm.\""
1001515-29 = "It is not a badge. It is \"Sensei's Praise Sticker,\" an official piece of fan merchandise!"
1001515-30 = "You appear confused. Well..."
1001515-31 = "We all recently worked together to create a roguelike game."
1001515-32 = "In it, we programmed a unique and lucky item that was excessively difficult to obtain..."
1001515-33 = "...And it was called \"Sensei's Praise Sticker\"!"
1001515-34 = "Even while unequipped, it strengthens your character and boosts your luck...all from the safety of your inventory."
1001515-35 = "It is a very rare and wonderful item!"
1001515-36 = "[s3] \"Ah, I see...\"\n[s4] \"That's why you decided to make physical merch.\""
1001515-39 = "Correct!"
1001515-40 = "I would like to properly distribute this Praise Sticker merchandise to everyone!"
1001515-41 = "Then, Sensei, let us embark on a grand adventure!"
1001515-43 = "Aris and her boundless enthusiasm led me outside."
1001515-45 = "Greetings, everyone!"
1001515-46 = "Hi, Aris. Hello, Sensei."
1001515-47 = "What brings you to the lab?"
1001515-48 = "I am here to distribute your Praise Sticker! Please, acquire it!"
1001515-49 = "\"Good Job,\" huh? Yeah, I haven't done much, but it feels nice to be recognized."
1001515-50 = "And this is from Sensei, isn't it? You really think I'm doing okay?"
1001515-51 = "Thank you, Sensei."
1001515-52 = "[s] \"Oh, you're welcome... I didn't really do anything, though.\""
1001515-53 = "Hehe, but I like it all the same."
1001515-54 = "Thank you so much, Aris. I love it."
1001515-55 = "Yes, and I am positive that good things are on the horizon. This item should raise your Luck stat!"
1001515-56 = "Luck... Yeah, I'll take all I can get. "
1001515-57 = "...Developing new materials feels like playing the lottery."
1001515-58 = "You pulverize mediums with the mortar and pestle, bake them..."
1001515-59 = "...crush them into a powder again, grind, mix, mix again, shake, SHAKE..."
1001515-60 = "It's basically endlessly repeating that, ultimately praying for a breakthrough."
1001515-61 = "Please, Lord Praise Sticker, allow my work to correctly synthesize this time!"
1001515-62 = "[s] \"I-It must be a lot of work...?\""
1001515-63 = "While it's hard to know the future, my friend..."
1001515-64 = "...You will succeed this time!"
1001515-65 = "Now, I am off to distribute more Praise Stickers!"
1001515-69 = "Hey, hey! Hurry, the meter is stabilizing! You've got to look!"
1001515-70 = "What?! Really?!"
1001515-71 = "Yeah! "
1001515-76 = "Don't tell me..."
1001515-77 = "...The Praise Sticker...really worked...?"
1001515-80 = "Then, I must depart! Keep it up! Everything will turn out fantastically! Platinum!"
1001515-81 = "Thanks for that. I never prayed in my life...until I had to maintain these servers."
1001515-85 = "Huh...?"
1001515-86 = "The server error cleared?!"
1001515-89 = "Aha! So these are the stickers I've been hearing so much about..."
1001515-90 = "Yes! Please think fondly of me and Sensei as you cherish this sticker!"
1001515-91 = "Of course. Thank you, Aris."
1001515-96 = "Huh? I won...third place in the meal ticket raffle?"
1001515-97 = "..."
1001515-98 = "Sounds like I'm getting extra karaage today!"
1001515-101 = "Look, it emits infrared and negative ions to improve your blood circulation! "
1001515-102 = "It also keeps your gun barrel clean of grime, and even just carrying it on your body will reduce bullet jamming! Statistically!"
1001515-103 = "It's the ger-ger-germanium wristband! How could you not want it?!"
1001515-107 = "..."
1001515-108 = "*sigh* Business isn't going well today..."
1001515-109 = "Hello! Did you say that something was not going satisfactorily?"
1001515-111 = "Hm? Well, there..."
1001515-112 = "...might be a little problem, yeah..."
1001515-113 = "I see... Then put this in your inventory."
1001515-114 = "It is a Praise Sticker that shall raise your luck stat!"
1001515-115 = "Wh-What, is this a hustle? How much do you want?"
1001515-116 = "Nothing. It is freely given..."
1001515-117 = "...Because I would like more people to be happy!"
1001515-121 = "What was that...?"
1001515-125 = "Hm? What was that noise?"
1001515-126 = "...! The jammed bullet just popped out on its own! "
1001515-130 = "Strange... Did the ger-ger-germanium wristband actually work...?"
1001515-135 = "Aris and I distributed Praise Stickers to students all over campus before returning to the Game Development Department Room."
1001515-136 = "And, of course, any good day must end with...a round of video games!"
1001515-143 = "Thank you, Sensei."
1001515-144 = "[s] \"Hm? For what?\""
1001515-145 = "For accompanying me today on my mission. And..."
1001515-146 = "...for playing games with me like this."
1001515-147 = "I play with my Game Development Department companions quite frequently..."
1001515-148 = "But it is a rare encounter...to play games alone with you, Sensei."
1001515-149 = "It rewards me with precious and unique experience points."
1001515-150 = "[s] \"Oh, it was nothing.\""
1001515-151 = "Do not say that. I genuinely enjoy spending time with you."
1001515-152 = "If I were to quantify how much I enjoy this..."
1001515-153 = "If I were empowered by Sensei and a supply of Praise Stickers..."
1001515-154 = "I could stay up three nights in a row playing video games!"
1001515-155 = "[s5] \"You shouldn't overdo the video games...\"\n[s6] \"Three consecutive all-nighters would wear me out...\""
1001515-158 = "I-Is that so...? I apologize..."
1001515-159 = "But I am certain that you would also benefit from a Praise Sticker, Sensei. Mine has functioned magnificently."
1001515-160 = "When I had one pixel of HP left in a fighting game, I managed a \"just guard\" and blocked an ultimate attack!"
1001515-161 = "And I followed up with a super-ultimate reversal while in the rage state!"
1001515-162 = "[s] \"You really pulled that off?!\""
1001515-163 = "Yes, once! It was against Momoi!"
1001515-164 = "That day, the Game Development Department Room..."
1001515-165 = "...Uh, it..."
1001515-166 = "...quite literally almost exploded!"
1001515-167 = "[s] \"You should've called me!\""
1001515-168 = "N-Now that you mention it..."
1001515-169 = "Ah! I am sorry, Sensei!"
1001515-170 = "[s] \"It's okay, it's okay.\""
1001515-176 = "[ns7] \"But if it's 'my' sticker, then...?\"\n[ns8] \"I feel like it would be awkward for me to wear one.\""
1001515-179 = "Correct, Sensei. That is a genuinely good point."
1001515-180 = "Which is why..."
1001515-181 = "I made two Aris' Praise Stickers exclusively for you!"
1001515-182 = "[s] \"Aris' Praise Sticker?!\""
1001515-190 = "Yes! It is a special sticker, from me to you."
1001515-191 = "Your work deserves recognition!"
1001515-192 = "Of course, unlike \"Sensei's Praise Sticker,\" it will not solve problems or increase your luck stat..."
1001515-193 = "But I would like you to have it. I have an identical one."
1001515-194 = "Through this, I will always feel connected with you."
1001515-200 = "[ns] \"Yes. Of course.\""
1001515-201 = "Right, Sensei."
1001515-202 = "I really like you."
1001515-203 = "[s] \"Likewise.\""
1001515-204 = "Thank you, Sensei."
1001515-205 = "And while you are distracted, I shall execute a two-combo fan blow and a jumping kick, followed by a heavy punch stun! "
1001515-206 = "Finishing off with the special-arts level-3 super-ultimate move!"
1001515-210 = "[ns9] \"Y-You got me!!!\"\n[ns10] \"Aris...! I can't believe you'd be so sweet just to betray me!\""
1001515-213 = "Fufufu. That is right! Witness the merciless, cold-blooded path of Asura!"
1001515-214 = "Welcome to the world of fighting games!"
1001515-216 = "Aris and I continued to play video games afterward."
1001515-217 = "In between rounds, Aris always glanced at her \"Aris' Praise Sticker\" like it was precious piece of loot."

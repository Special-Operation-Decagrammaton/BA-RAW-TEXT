[translation]
1001515-1 = "愛麗絲與花丸貼紙"
1001515-2 = "（按照愛麗絲說的，前往了遊戲開發部的部室）"
1001515-3 = "（就在這時……！）"
1001515-8 = "老師！！"
1001515-9 = "[s]「愛麗絲！！！」"
1001515-10 = "哇！老師來了！"
1001515-15 = "（愛麗絲全力往懷裡衝了過來！）"
1001515-16 = "（老師差點就摔倒了！）"
1001515-19 = "你好呀，老師！愛麗絲一直在等你哦！"
1001515-20 = "[s]「嗯！話說你想給我看的東西是什麼呢？」"
1001515-21 = "哼哼哼……那就是……"
1001515-22 = "這個！"
1001515-24 = "（愛麗絲遞出了一個像是小塑膠徽章的東西！）"
1001515-26 = "[ns1]「這是……徽章之類的嗎？」\n[ns2]「上面寫著『Good Job』耶？」"
1001515-29 = "這不是徽章，而是「老師的花丸貼紙」的實體周邊哦！"
1001515-30 = "想知道那是什麼？#n唔嗯，該怎麼說呢……"
1001515-31 = "以前，大家曾經一起做過一款Roguelike遊戲。"
1001515-32 = "裡面有個真的很難取得的幸運系稀有道具……"
1001515-33 = "那就是「老師的花丸貼紙」！"
1001515-34 = "不需要裝備也不必使用，只要放在背包裡就能讓角色變強並提升幸運……"
1001515-35 = "是個非常棒的道具！"
1001515-36 = "[s3]「原來是這樣啊……」\n[s4]「所以你把它做成實體周邊了啊。」"
1001515-39 = "沒錯！"
1001515-40 = "接下來，愛麗絲要把這個花丸貼紙發給大家！"
1001515-41 = "所以老師。一起去冒險吧！"
1001515-43 = "（被充滿活力的愛麗絲拉著往外頭走去）"
1001515-45 = "大家好！"
1001515-46 = "嗨，愛麗絲、老師。你們好呀。"
1001515-47 = "今天有什麼事嗎？"
1001515-48 = "是！愛麗絲是來送花丸貼紙給大家的。請收下！"
1001515-49 = "「Good Job」……明明沒有做什麼特別的事，卻莫名感覺心情變好了呢。"
1001515-50 = "話說，這不就等於是老師在稱讚我嗎？"
1001515-51 = "非常感謝你，老師"
1001515-52 = "[s]「啊，嗯……雖然我其實也沒做什麼。」"
1001515-53 = "嘿嘿，不過我還是覺得挺好的。"
1001515-54 = "謝謝你，愛麗絲。我會好好珍惜的。"
1001515-55 = "是，一定會有好事發生的。#n因為這在遊戲裡面，也是能夠提升幸運值的道具哦。"
1001515-56 = "幸運……嗯，如果真的有效的話就太好了。 "
1001515-57 = "畢竟開發新材料的過程，有時候就像在玩刮刮樂一樣。"
1001515-58 = "把材料放進研缽裡，親手一一研磨後進行燒製……"
1001515-59 = "接著再將其打碎、研磨、混合、混合、旋轉、搖晃……"
1001515-60 = "不斷重複這個過程，並祈禱能夠出現某些新的結果……"
1001515-61 = "拜託了，請讓這次的陶瓷成功燒出來吧，花丸貼紙大人！！！"
1001515-62 = "[s]「你，你也挺辛苦的呢……」"
1001515-63 = "雖然愛麗絲也不太懂……"
1001515-64 = "不過相信一定會順利的！"
1001515-65 = "那麼，愛麗絲要去發花丸貼紙給其他人了！"
1001515-69 = "喂，喂！快點過來！圖表上出現了新的走勢！"
1001515-70 = "什麼！？真的假的！？！？"
1001515-71 = "真的啦！ "
1001515-76 = "難道……"
1001515-77 = "……真的是因為花丸貼紙？"
1001515-80 = "那麼愛麗絲就先離開囉。#n請加油！一切都會順順利利的！"
1001515-81 = "光是有你這麼說就夠了，謝謝。#n處理伺服器的時候，真的會讓人很想祈禱呢。"
1001515-85 = "咦……？"
1001515-86 = "伺服器的錯誤真的修好了！？！？"
1001515-89 = "啊，這就是那個花丸貼紙啊。"
1001515-90 = "是的！希望你能想著愛麗絲和老師，好好珍惜它！"
1001515-91 = "那是當然的。謝謝你，愛麗絲。"
1001515-96 = "哎呀？抽中了……餐券抽獎的三等獎？"
1001515-97 = "……"
1001515-98 = "今天就加點炸雞塊來吃吧！"
1001515-101 = "這個東西會釋放遠紅外線和負離子，對血液循環很有幫助！"
1001515-102 = "還能減少槍管的火藥碎屑，只要戴在身上就能消除卡彈問題！"
1001515-103 = "其名為「無所不能的鍺手環」！！！"
1001515-107 = "……"
1001515-108 = "唉……生意好像不太好呢……"
1001515-109 = "你好！請問你遇到什麼困難了嗎？"
1001515-111 = "咦？這倒也……"
1001515-112 = "……不能說完全沒有吧。"
1001515-113 = "原來如此啊……那麼請收下這個。"
1001515-114 = "這是能夠提升幸運屬性的花丸貼紙！"
1001515-115 = "咦，咦咦？這是在強迫推銷嗎！？"
1001515-116 = "不，是要送給你的。"
1001515-117 = "因為愛麗絲希望能讓更多人得到幸福！"
1001515-121 = "到，到底是什麼情況啊……"
1001515-125 = "咦？剛才那是什麼聲音？"
1001515-126 = "……卡，卡住的彈殼真的自己排出來了！"
1001515-130 = "真奇怪……？無所不能的鍺手環應該沒有那種效果才對啊……？"
1001515-135 = "（就這樣和愛麗絲一起將花丸貼紙發給許多學生，並回到了遊戲開發部的部室）"
1001515-136 = "（至於一天的收尾……當然得玩遊戲了！）"
1001515-143 = "謝謝你，老師。"
1001515-144 = "[s]「嗯？怎麼了嗎？」"
1001515-145 = "謝謝你今天一直陪著愛麗絲。#n還有……"
1001515-146 = "現在也這樣陪愛麗絲一起玩遊戲。"
1001515-147 = "雖然愛麗絲常常和遊戲開發部的朋友們一起玩……"
1001515-148 = "不過和老師兩個人單獨玩遊戲，卻是非常難得的經驗。"
1001515-149 = "這一切對愛麗絲來說，都是珍貴的稀有經驗值。"
1001515-150 = "[s]「哎呀，這點小事不算什麼。」"
1001515-151 = "不，愛麗絲非常喜歡和老師待在一起。"
1001515-152 = "要說有多喜歡的話……"
1001515-153 = "如果和老師在一起，再加上花丸貼紙……"
1001515-154 = "不只是今天，感覺甚至能連續通宵打三天的電動哦！"
1001515-155 = "[s5]「不能那樣一直打電動啦……」\n[s6]「老師沒辦法熬夜三天……」"
1001515-158 = "是，是嗎……？對不起……"
1001515-159 = "不過如果老師也收到花丸貼紙的話，一定什麼事都能做得更好的。#n比如愛麗絲就是這樣！"
1001515-160 = "在格鬥遊戲只剩下1像素的體力時，不只能完全擋下所有必殺技……"
1001515-161 = "還能在暴怒狀態下使出逆轉的超必殺技呢！"
1001515-162 = "[s]「你真的做到了嗎！？」"
1001515-163 = "沒錯！雖然只有在跟桃井對戰時成功過一次而已！"
1001515-164 = "那天，遊戲開發部的部室……"
1001515-165 = "那個，該怎麼說呢……"
1001515-166 = "總之差點就要爆炸了呢！"
1001515-167 = "[s]「下次也要揪我啦！」"
1001515-168 = "說，說的也是……？"
1001515-169 = "嗚嗚！對不起，老師！"
1001515-170 = "[s]「沒事沒事。」"
1001515-176 = "[ns7]「不過那個貼紙，是用我的名義給的對吧？」\n[ns8]「要是老師自己收下，感覺好像有點奇怪～」"
1001515-179 = "沒錯。老師說到關鍵了呢。"
1001515-180 = "就是因為這樣……"
1001515-181 = "所以愛麗絲，其實專門為老師做了兩張「愛麗絲的花丸貼紙」！"
1001515-182 = "[s]「愛麗絲的花丸貼紙！？」"
1001515-190 = "沒錯！是愛麗絲要送給老師的……"
1001515-191 = "愛麗絲稱讚老師的貼紙！"
1001515-192 = "雖然沒有像老師的花丸貼紙那麼厲害，能讓一切順利和提升幸運值……"
1001515-193 = "不過，還是希望老師可以收下。#n因為愛麗絲也帶著一樣的東西。"
1001515-194 = "這樣一來，愛麗絲就會有種隨時都跟老師連結在一起的感覺。"
1001515-200 = "[ns]「嗯，當然要收下。」"
1001515-201 = "是的，老師。"
1001515-202 = "愛麗絲果然真的很喜歡老師。"
1001515-203 = "[s]「老師也是一樣的哦。」"
1001515-204 = "非常謝謝你，老師。"
1001515-205 = "接著在說這些話的同時，使出二連扇飛加上跳躍強踢，接著用重拳打出暈眩！ "
1001515-206 = "最後是特殊技能等級3的超必殺技！！！"
1001515-210 = "[ns9]「被，被打倒了！！！」\n[ns10]「愛麗絲……！明明說了那麼多好話，結果居然用Ultra Combo對付我！」"
1001515-213 = "哼哼哼……沒錯！這就是沒血沒淚，也沒有師徒情誼的修羅之道！"
1001515-214 = "格鬥遊戲的世界就是這樣的！"
1001515-216 = "（就這樣和愛麗絲繼續開心地玩著電動）"
1001515-217 = "（無論輸還是贏，愛麗絲總會珍惜地看著「愛麗絲的花丸貼紙」）"

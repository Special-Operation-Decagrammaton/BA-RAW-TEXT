[translation]
10033090-1 = "Episode 9;This Festival Is Ours!"
10033090-3 = "Just what do you think you're doing?!"
10033090-9 = "Ain't it obvious? We're here to take back what's ours: the Tree of Deities ritual!"
10033090-10 = "The Tree of Deities ritual's meant for Hyakkiyako! It brings good fortune to us and only us!"
10033090-11 = "So I don't care if they were invited or whatever! It ain't meant for outsiders!"
10033090-12 = "[ns] \"What exactly is your objective here...?\""
10033090-13 = "Heeheehee... Don't get too scared, all right? I really thought this one through! It's so horrifyin' that it's like your worst nightmare! Even worse than your worst nightmare!"
10033090-14 = "That's right!"
10033090-16 = "What exactly...?"
10033090-17 = "Those gigantic fireworks you have there, the ones you're plannin' on settin' off at the end of the festival..."
10033090-19 = "We're gonna set them all off! During the day!"
10033090-21 = "I-Is this the big reveal?"
10033090-22 = "That's right! Mwahaha! I called this the \"Make the Impressive Fireworks Super Underwhelming by Setting Them off during the Day\" operation!"
10033090-23 = "I see you quakin' in your boots! I know, I know! I really outdid myself on this one. Y'all are so scared, you can't even speak!"
10033090-30 = "..."
10033090-31 = "..."
10033090-32 = "[ns] \"...\""
10033090-33 = "Hellooo?! What's with this lukewarm reaction?"
10033090-37 = "Y-You're totally underestimatin' us, aren't you? You don't think we can pull off a horrible act like this! You... Stop accusin' us of being scared!"
10033090-41 = "Y'all are the scared ones! Scared of us big, bad, scary criminals!"
10033090-42 = "[s] \"No one even said you were scared!\""
10033090-43 = "Why won't you believe me?! Dang it!"
10033090-45 = "What happened to the ritual?"
10033090-47 = "I dunno. Maybe this is a part of it?"
10033090-48 = "Oh yeah! I heard the Princess Waraku performance they put on regularly is interactive. Maybe they're doing the same thing here."
10033090-49 = "You're smarter than I think sometimes."
10033090-50 = "Maybe if we wait it out, something cool will happen."
10033090-52 = "..."
10033090-59 = "Erika. Erika."
10033090-60 = "This...probably isn't a performance, right?"
10033090-61 = "I'd say not!"
10033090-62 = "How do you want to go about this? Sensei first?"
10033090-63 = "They'll probably be with Umika too."
10033090-70 = "Cease this immediately! I won't allow you to meddle with our schedule!"
10033090-71 = "The fireworks will occur, exactly on time, in the evening as I scheduled."
10033090-72 = "That's why my plan is so diabolical! We're settin' them off right now whether you like it or not!"
10033090-74 = "Heeheehee. Someone hasn't done their homework!"
10033090-75 = "As she said! The fireworks aren't at this location! In the normal ritual, the fireworks are set up hours beforehand, but today they're being brought in just before the end of the ritual."
10033090-77 = "H-Huh?! That's not how it's normally done! I-I didn't know that! That's so unfair! You suck!"
10033090-78 = "?!?!"
10033090-80 = "Is something wrong, Umika? Your expression appears shocked and concerned!"
10033090-81 = "W-Well! Um..."
10033090-83 = "Is this the pile of fireworks here? L-Leader! Over here."
10033090-85 = "H-How is that possible?"
10033090-86 = "(Me attempting to get ahead of schedule and set up the fireworks beforehand...backfired?)"
10033090-90 = "No! I will not allow this, Mouryo!"
10033090-91 = "I'll fight to my very last breath to protect this festival! For the Gehenna students, and for Sensei."
10033090-92 = "You will not lay a single finger on these fireworks!"
10033090-93 = "C-Calm down, Umika!"
10033090-94 = "U-Um, not to interrupt, but are you sure it's okay to fight in the Tree of Deities Plaza? That feels wrong for some reason!"
10033090-96 = "...Sometimes sacrifices have to be made. For the greater good."

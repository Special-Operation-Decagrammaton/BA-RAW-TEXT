[translation]
10033090-1 = "ตอนที่ 9;เทศกาลนี้เป็นของพวกเรา!"
10033090-3 = "จะทำอะไรของพวกคุณกันคะ!!!!!"
10033090-9 = "ก็เห็นชัดอยู่แล้วนี่! พวกเราชาวปีศาจจะเอางานต้นไม้ศักดิ์สิทธิ์นี้คืนมา!"
10033090-10 = "งานต้นไม้ศักดิ์สิทธิ์เป็นเทศกาลเพื่อความสงบสุขและสันติภาพของเฮียกคิยาโค ที่จะจัดขึ้นแค่ปีละครั้ง#nเท่านั้น..."
10033090-11 = "พวกฉันไม่อยากให้คนนอกเข้ามายุ่มย่ามกับเทศกาลของเราหรอกนะ ถึงจะได้รับเชิญมาก็เถอะ!"
10033090-12 = "[ns] \"พวกเธอคิดจะทำอะไรกันแน่น่ะ?\""
10033090-13 = "ฮุฮุฮุ... ฟังแล้วก็อย่าตกใจล่ะ พวกฉันวางแผนการที่ทั้งพิถีพิถันและยิ่งใหญ่เอาไว้แล้ว... และมันจะน่ายำเกรงจนเด็กที่ร้องไห้อยู่ต้องกลั้นน้ำตาไว้ไม่ให้ไหลลงมาเลยละ..."
10033090-14 = "และนั่นก็คือ!"
10033090-16 = "คะ... คือ...?"
10033090-17 = "ดอกไม้ไฟขนาดมหึมาที่ใช้จุดเล่นในการละเล่นดอกไม้ไฟตอนกลางคืน! ที่เรียกได้ว่าเป็นไคลแมกซ์#nของงานต้นไม้ศักดิ์สิทธิ์...!"
10033090-19 = "ใช่แล้วละ! ฉันจะเอามาจุดในตอนกลางวันให้หมดเลย!"
10033090-21 = "คะ...?"
10033090-22 = "ฮุฮุฮุ... และนี่คือแผนการ <เอาดอกไม้ไฟที่จะระยิบระยับเมื่อจุดในยามค่ำคืนมาจุดตอนกลางวันแสกๆ เพื่อให้ความประทับใจเป็นศูนย์!>..."
10033090-23 = "เป็นไง? น่ากลัวมั้ยล่ะ? ยอดไปเลยใช่มั้ยล่ะ? เจอแผนการที่พิถีพิถันและยิ่งใหญ่ของพวกฉันไปจน#nอึ้งกิมกี่กันเลยล่ะสิ??"
10033090-30 = "......"
10033090-31 = "......"
10033090-32 = "[ns] \"......\""
10033090-33 = "อะไรกัน! สายตาที่กำกวมแบบนั้น!"
10033090-37 = "อย่าบอกนะว่า... คิดว่าพวกฉันจะกลัวจนทำตามแผนการที่น่ายำเกรงนี้ไม่ได้น่ะ? งั้นก็ต้องคิดใหม่แล้วละ! เพราะปีศาจอย่างพวกเราน่ะ! ปีศาจอย่างพวกเราน่ะ!"
10033090-41 = "เป็นเด็กเจ้าปัญหาที่ทั้งมีฝีมือและมีความน่าเกรงขาม! อย่ามาดูถูกพวกเรานะ!"
10033090-42 = "[s] \"พูดอวยตัวเองแบบนั้นยิ่งน่าดูถูกเข้าไปใหญ่มั้ย?!\""
10033090-43 = "กะ... ก็พูดให้รู้ไว้ไงว่าพวกเราเป็นเด็กแบบนั้น!!"
10033090-45 = "ทำไมจู่ๆ ก็เอะอะโวยวายกันล่ะ?"
10033090-47 = "นั่นน่ะสิ หรือว่าจะเป็นการแสดงที่เตรียมไว้ให้?"
10033090-48 = "จะว่าไปแล้ว ได้ยินว่าที่เฮียกคิยาโคมีองค์หญิงวาราคุด้วยนี่นา? แล้วก็การแสดงที่ผู้ชมมีส่วนร่วมด้วย นี่คือการแสดงอะไรแนวๆ นั้นเหรอ?"
10033090-49 = "แหม รู้ดีกว่าที่คิดนะเนี่ย"
10033090-50 = "เอาเถอะน่า รอดูไปก่อนเถอะ คงต้องมีอะไรบ้างแหละ"
10033090-52 = "......"
10033090-59 = "เอริกะจัง เอริกะจัง"
10033090-60 = "อืม... คงจะเป็นอย่างนั้นสินะ"
10033090-61 = "อืม อาจจะเป็นอย่างนั้นนะ"
10033090-62 = "เอาไงดี? ไปหาคุณครูมั้ย?"
10033090-63 = "อืม ไปหาอุมิกะจังดีกว่า"
10033090-70 = "พอได้แล้ว! หยุดนะคะทุกคน! จากนี้ฉันจะไม่ยอมให้เกิดเรื่องอะไรที่ทำให้กำหนดการของเรา#nเปลี่ยนแปลงอีกแล้วค่ะ!"
10033090-71 = "ดอกไม้ไฟต้องจุดตอนกลางคืนตามที่วางแผนไว้นะคะ!"
10033090-72 = "เพราะแบบนี้ไงล่ะ พวกเราถึงจะเอาดอกไม้ไฟพวกนั้นมาจุดให้เสียของตอนนี้เลย!"
10033090-74 = "ฮุฮุฮุ... ไม่รู้อะไรซะแล้ว!"
10033090-75 = "ใช่แล้วค่ะ! ดอกไม้ไฟที่เราจะใช้ในวันนี้แตกต่างจากที่ใช้ในงานต้นไม้ศักดิ์สิทธิ์ทั่วไป! เพราะเราไม่ได้เตรียมเอาไว้ก่อน และจะมีการจัดส่งตอนกลางคืนค่ะ!"
10033090-77 = "วะ... ว่าไงนะ?! ทำไมขั้นตอนถึงต่างจากของเดิมล่ะ! ทำไมไม่รักษาประเพณี!"
10033090-78 = "?!?!"
10033090-80 = "เอ๋? อุมิกะ? ทำไมทำหน้าอย่างนั้นล่ะคะ?"
10033090-81 = "คือว่า... เรื่องนั้น...!"
10033090-83 = "เอ๊ะ หัวหน้า? แต่ตรงนั้นเหมือนมีดอกไม้ไฟวางกองอยู่เลยนะ...?"
10033090-85 = "ทำไมถึงเป็นแบบนั้นไปได้ล่ะ?"
10033090-86 = "(อะไรกัน...! ฉันอุตส่าห์เตรียมดอกไม้ไฟมาก่อนเพราะอยากทำเวลาให้ตรงตามกำหนดการ แต่กลายเป็นว่า...?)"
10033090-90 = "ไม่ได้นะคะ! ไม่ได้เด็ดขาดเลยค่ะ พวกปีศาจ!"
10033090-91 = "เพื่อนักเรียนจากเกเฮนน่าทุกคน และเพื่อคุณครูที่อยู่ตรงนี้... ฉันจะปกป้องงานต้นไม้ศักดิ์สิทธิ์ให้ได้ค่ะ!"
10033090-92 = "ฉันจะไม่ให้พวกคุณแตะต้องดอกไม้ไฟนั่นแม้แต่ปลายนิ้วเลยค่ะ!"
10033090-93 = "จะ... ใจเย็นๆ นะคะ อุมิกะ!"
10033090-94 = "อ่า... เอ่อ... จะไม่เป็นไรเหรอ? เราจะส่งเสียงดังโวยวายตรงนี้ได้เหรอ? นี่งานต้นไม้ศักดิ์สิทธิ์นะ?"
10033090-96 = "ถ้าจำเป็นก็ต้องทำนั่นละ ถ้ายังนิ่งเฉยอยู่... คงได้เกิดเรื่องใหญ่กว่าเดิมแน่"

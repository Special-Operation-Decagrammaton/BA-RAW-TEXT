[translation]
10033090-1 = "第9話;這是我們的慶典！"
10033090-3 = "現在是在做什麼！！！！！"
10033090-9 = "那還用問嗎！這個神木祭……將由我們妖怪劇團重新搶回來！"
10033090-10 = "神木祭可是一年只有一次……祈求百鬼夜行和平與安寧的慶典……"
10033090-11 = "這樣的慶典！即使是受到了邀請，我也不喜歡有外人參與！"
10033090-12 = "[ns]「……所以你們具體打算怎麼做？」"
10033090-13 = "哼哼哼……聽了可別嚇到哦。#n我們制定的這個連哭泣的孩子都會被嚇到不敢哭，既縝密又偉大的計劃……"
10033090-14 = "那就是！"
10033090-16 = "就，就是……？"
10033090-17 = "把本來該在晚上施放，可以稱作是神木祭高潮的超大型煙火……！"
10033090-19 = "在大太陽底下全部發射！"
10033090-21 = "咦……？"
10033090-22 = "哼哼哼……這就是──#n「在大白天發射本該在夜晚綻放的最美煙火，讓人興致全失計畫」……！"
10033090-23 = "怎麼樣？怕了吧？厲害吧？很了不起對吧？#n在這可怕縝密又偉大的計劃面前，怕得連話都說不出來了吧？？？"
10033090-30 = "……"
10033090-31 = "……"
10033090-32 = "[ns]「……」"
10033090-33 = "怎樣啦！那個微妙的視線是什麼意思！"
10033090-37 = "該，該不會是覺得我們會怕到不敢實施，所以瞧不起我們吧？#n如果是的話你可就錯了！我們妖怪劇團！妖怪劇團可是……！"
10033090-41 = "總之就是非常了不起又可怕的問題學生！不要小看我們！"
10033090-42 = "[s]「說這種話才會被別人小看吧！？」"
10033090-43 = "隨便你怎麼說啦！！"
10033090-45 = "怎麼好像突然吵了起來？"
10033090-47 = "不知道耶，這也是表演的一部分嗎？"
10033090-48 = "這麼說來，百鬼夜行有個叫「和樂公主」的表演對吧？#n好像聽說能讓觀眾直接參與，這個會不會也是類似的東西？"
10033090-49 = "你怎麼那麼懂啊？"
10033090-50 = "總之我們就等著看吧。他們肯定會做點什麼的。"
10033090-52 = "……"
10033090-59 = "繪里香醬，繪里香醬。"
10033090-60 = "嗯……果然沒那麼簡單吧？"
10033090-61 = "對呀，我也覺得。"
10033090-62 = "該怎麼做？先去老師那裡嗎？"
10033090-63 = "嗯，去海花醬那裡看看吧。"
10033090-70 = "請你們住手！我已經沒辦法再容忍更多意外了！"
10033090-71 = "煙火必須配合好時機，準確地在晚上施放！"
10033090-72 = "不管不管！我們就是要現在放煙火！"
10033090-74 = "哼哼哼……真是只知其一，不知其二啊！"
10033090-75 = "沒錯！這次的煙火和一般神木祭的作法不同！#n我們並沒有事先準備好，而是在晚上發射前才會送到這裡！"
10033090-77 = "你，你說什麼！？#n這跟說好……不，跟傳統的作法完全不一樣吧！好卑鄙！"
10033090-78 = "！？！？"
10033090-80 = "咦？海花？為什麼露出那種表情？"
10033090-81 = "那個……那個……！"
10033090-83 = "哎呀，隊長？那邊不知道為什麼擺放著煙火堆耶……？"
10033090-85 = "怎麼回事──？"
10033090-86 = "（怎麼會……！#n　是，是因為我心想這次一定要配合好行程，擅自提前移動了煙火造成的嗎……？）"
10033090-90 = "絕對不行！妖怪劇團！"
10033090-91 = "不管是為了格黑娜的學生們，還是為了老師……我都會守護神木祭！"
10033090-92 = "絕對……絕對不會讓你們對煙火動手的！"
10033090-93 = "冷，冷靜點，海花！"
10033090-94 = "呃，在，在這裡戰鬥沒問題嗎？#n這裡可是神木祭的廣場哦？"
10033090-96 = "……只能這麼做了。#n否則……狀況會變得更嚴重的。"

[translation]
90001065-3 = "ฝ่าด่านป้องกันไปให้ได้! โทคิ ฝากด้วยนะ!"
90001065-4 = "ค่ะ ทุกคนช่วยหลบออกทีนะคะ"
90001065-12 = "ทำลายอุปกรณ์น่าสงสัยเรียบร้อยแล้วค่ะ การส่งคลื่นรบกวนหยุดลงแล้วค่ะ!"
90001065-16 = "เชื่อมต่อสายได้อีกครั้งแล้ว! ทุกคนเป็นยังไงกันบ้าง?"
90001065-17 = "ถ้าเชื่อมต่อไม่ได้ ก็คงจะน่าผิดหวังในหลายๆ ด้านเลยละค่ะ ฮู่ว... ถือว่าโล่งอกไปทีนะคะ"
90001065-18 = "อืม การควบคุม AMAS ก็กลับมาแล้ว "
90001065-19 = "รถเทรลเลอร์ของท่านริโอะก็กลับมาทำงานอีกครั้งแล้วค่ะ ค่อยยังชั่วนะคะ "
90001065-20 = "ทุกคนอยู่ที่ไหนกันน่ะ...?"
90001065-23 = "พอดีเราเห็นอะไรบางอย่างที่เหมือนอุปกรณ์ปล่อยสัญญาณรบกวนที่นี่ เราก็เลยมาตรงนี้กันระหว่างที่#nสัญญาณถูกแทรกแซงน่ะ"
90001065-24 = "แต่พอทำลายอุปกรณ์ที่ว่า ก็เหมือนจะเจออย่างอื่นที่ใหญ่กว่าเดิมไปอีก"
90001065-25 = "ไม่ใช่แค่ในธารน้ำแข็ง แต่บนพื้นดินด้วยเหรอ...?"
90001065-26 = "ถ้าอยู่ในระดับนี้เลยละก็... อย่าบอกนะว่า..."
90001065-27 = "วิเคราะห์อะไรได้เหรอคะ? ริโอะ?"
90001065-32 = "ฉันยังฟันธงเลยไม่ได้ "
90001065-33 = "แต่สิ่งหนึ่งที่แน่ชัดก็คือ ปริมาณทรัพยากรที่ขุดได้ในพื้นที่นี้..."
90001065-34 = "มันมีปริมาณมากกว่าทรัพยากรที่ผู้เลื่อมใสรูปร่างเรือในธารน้ำแข็งทำได้อีก"
90001065-35 = "พวกนั้นไม่มีทางรวบรวมทรัพยากรจำนวนมากโดยไม่มีเหตุผลหรอก การลงมือทำอะไรสักอย่างต้องมี#nจุดประสงค์อยู่แล้ว"
90001065-36 = "แล้วทำไมพวกนั้นถึงต้องการทรัพยากรมากมายขนาดนี้ด้วยล่ะ?"
90001065-37 = "หรือว่าเด็กๆ พวกนั้นและเดคาแกรมมาทอน...?"
90001065-39 = "(คิดจะสร้างอาณาจักรของตัวเองกันอยู่?)"
90001065-43 = "จากนี้เราจะทำยังไงต่อดีล่ะคะ... คุณครู?"
90001065-44 = "[s] \"มาสำรวจของพวกนี้กันก่อนเถอะ... \""
90001065-45 = "จะไม่อันตรายเหรอคะ?"
90001065-46 = "แต่ก็ดูอันตรายน้อยกว่าเมื่อกี้ละน่า แล้วก็เรากลับมาติดต่อกับประธานได้แล้วด้วย"
90001065-47 = "ใช่ค่ะ จุดประสงค์หลักของพวกเราคือการสำรวจสถานที่และติดตามผู้เลื่อมใสอยู่แล้วนี่คะ"
90001065-48 = "ถ้ากองกำลังของศัตรูโผล่มาอีก ฉันก็แค่ต้องจัดการพวกนั้นเหมือนที่เคยทำมาก่อนค่ะ ก็ฉันเป็นเมด และสายลับที่แข็งแกร่งที่สุดนี่คะ"
90001065-49 = "ฟังดูเหมือนเป็นคำพูดที่สื่อถึงบางอย่างที่เป็นลางไม่ดีเลยนะคะ..."
90001065-50 = "แต่ก็เอาเถอะค่ะ ฉันว่ามันน่าทึ่งตรงที่มีการสร้างเครื่องไม้เครื่องมือขนาดนี้ไว้ในพื้นที่ทุนดราที่ไม่มี#nอะไรเลยค่ะ"
90001065-51 = "และคิดว่ามันคุ้มค่าที่จะสำรวจดูด้วยค่ะ"
90001065-52 = "อย่างที่ริโอะบอก ตอนนี้เหมือนจะมีบางอย่างที่แตกต่างออกไปจากสิ่งที่เราค้นพบมาค่ะ"
90001065-53 = "กะไว้แล้วเชียวว่าต้องพูดแบบนั้น..."
90001065-54 = "ค่ะ ก็หัวหน้าฮิมาริเป็นคนแบบนั้นนี่คะ"
90001065-55 = "เหมือนว่าเดี๋ยวนี้จะพูดใส่ร้ายฉันเพิ่มมากขึ้นนะคะ..."
90001065-59 = "แต่ก็เอาเถอะค่ะ ทุกคนคะ เรามาสำรวจกันต่ออย่างระมัดระวังเถอะค่ะ"
90001065-61 = "ตอนต่อไป;สำรวจ"

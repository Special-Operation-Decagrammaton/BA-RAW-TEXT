[translation]
90001065-3 = "Break through the enemy defenses! Please, Toki!"
90001065-4 = "Yes. You all can stay back."
90001065-12 = "Facility destroyed... Success! We've cut off the jamming signal!"
90001065-16 = "Is everyone okay? My signal just came back online."
90001065-17 = "I would've been sorely disappointed if it hadn't. Well... For now, I suppose I'll say it's a relief."
90001065-18 = "Yes. I've regained control over the AMAS as well. "
90001065-19 = "I also have access to Rio's trailer. A job well done. "
90001065-20 = "Where are you, currently...?"
90001065-23 = "The facility responsible for the jamming signal. We moved to this location when we realized what had happened."
90001065-24 = "However, after the eradication of the first building, we've discovered another massive one behind it."
90001065-25 = "Never mind something like this existing on land, but on the Glacial Sea?"
90001065-26 = "Something of this scale... Could it be...?"
90001065-27 = "Have you realized something, Rio?"
90001065-32 = "Nothing I can assert with absolute certainty. "
90001065-33 = "There is one thing I can say. The amount of resources being mined in this region..."
90001065-34 = "...it far exceeds the mining done by the prophet I'd been researching, out in the Glacial Sea."
90001065-35 = "No one would have put this much of their workforce into mining for no reason. There must be a specific need for these resources."
90001065-36 = "But this begs the question...what could they possibly need this much material for?"
90001065-37 = "Could those children, and Decagrammaton...?"
90001065-39 = "(Could they truly be planning on building a new kingdom?)"
90001065-43 = "...What should we do now, Sensei?"
90001065-44 = "[s] \"...Let's explore this facility.\""
90001065-45 = "Isn't that pretty dangerous?"
90001065-46 = "Our odds have improved. And we have Ms. Rio back."
90001065-47 = "Yes. The mission is to track down the prophet and explore the terrain."
90001065-48 = "If enemy forces appear again, I can defeat them once more. I am the strongest maid and secret agent."
90001065-49 = "That...evokes an ominous feeling of sorts..."
90001065-50 = "Regardless, I second the motion. Someone went through the trouble of building a facility like this in an abandoned tundra."
90001065-51 = "That, in and of itself, is worth investigating."
90001065-52 = "As Rio mentioned, there's something bubbling underneath it all that we have yet to bring to the surface."
90001065-53 = "Affirmative. The president responded as expected."
90001065-54 = "Yes. I've said before, President Himari has such a side."
90001065-55 = "There's been a growing number of conspiracy theories about me lately..."
90001065-59 = "Ahem! Anyways. Tread carefully, everyone."
90001065-61 = "Next Episode;Exploration"

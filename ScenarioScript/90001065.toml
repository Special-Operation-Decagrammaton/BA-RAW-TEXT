[translation]
90001065-3 = "突破防禦兵力！季，拜託你了！"
90001065-4 = "是，請大家都離遠一點。"
90001065-12 = "已確認設施遭到破壞……！干擾電波停止了！"
90001065-16 = "大家都沒事吧？通訊總算恢復正常了！"
90001065-17 = "如果沒能恢復的話，我可是會很失望的。#n嗯……這的確稱得上是不幸中的大幸吧。"
90001065-18 = "是啊，現在AMAS的控制權回到我手中了。"
90001065-19 = "莉央大人的拖車也重新開始運作。真是太好了。"
90001065-20 = "你們現在所在的地方是……？"
90001065-23 = "我們在受到干擾的期間步行了一段路程。#n因為我們發現了一個疑似發射干擾電波的設施。"
90001065-24 = "然而在破壞了電波設施之後，卻再次發現了一個規模龐大的設施。"
90001065-25 = "不只是冰海，連陸地上的……這種地方也有？"
90001065-26 = "如此龐大的規模……難道……"
90001065-27 = "你發現什麼了嗎，莉央？"
90001065-32 = "現在還無法斷言。"
90001065-33 = "不過可以確定的是……#n對方在這個區域開採的資源量，與我這段期間一直在調查的預言者……"
90001065-34 = "與在冰海地帶的預言者相比明顯更多。"
90001065-35 = "它們不可能毫無理由地開採這麼大量的資源。#n這些行動的背後肯定存在某些目的。"
90001065-36 = "既然如此，它們開採大量資源的理由是什麼？"
90001065-37 = "難道那些孩子和十字神名……？"
90001065-39 = "（打算在字面意義上打造屬於自己的王國……？）"
90001065-43 = "……我們現在該怎麼做呢，老師？"
90001065-44 = "[s]「……先調查一下這個設施吧。」"
90001065-45 = "這樣不會很危險嗎？"
90001065-46 = "至少比之前好一點吧。#n畢竟還能跟會長聯絡。"
90001065-47 = "沒錯，我們的主要目的是調查現場和追蹤預言者。"
90001065-48 = "就算又遇到敵人的兵力，也只要像剛才一樣擊退它們就行了。#n因為我是最強女僕兼祕密特務。"
90001065-49 = "真是令人感到不安的台詞……"
90001065-50 = "好吧，我明白了。#n在這片荒蕪的凍原地帶上，竟然存在規模如此龐大的設施……"
90001065-51 = "我認為光是這點就值得我們一探究竟了。"
90001065-52 = "畢竟就如莉央所說，現在的情況似乎與我們已掌握的情報有所不同。"
90001065-53 = "就知道你會這麼說……"
90001065-54 = "沒錯，陽葵部長本來就有這樣的一面。"
90001065-55 = "最近我受人誤會的次數好像越來越多了……"
90001065-59 = "好吧，算了。#n那麼各位，保持警戒繼續探索吧。"
90001065-61 = "下一話;探索"

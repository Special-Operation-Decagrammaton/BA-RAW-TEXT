90001065-1 = "#wait;1000"
90001065-2 = "3;에이미 수영복ND;01\n#3;a"
90001065-3 = "3;에이미 수영복ND;05;방위 병력 돌파! 토키, 부탁해!\n#3;em;[!]\n#3;jump"
90001065-4 = "3;토키 모드 2;05;네. 모두 멀리 떨어져 주십시오."
90001065-5 = "#st;[0,0];instant;1;"
90001065-6 = "#clearST"
90001065-7 = "3;토키 모드 2;00\n#3;greeting\n#wait;1000"
90001065-8 = "#all;hide"
90001065-9 = "#wait;3500"
90001065-10 = "#wait;2500"
90001065-11 = "3;히마리 방한복;01\n#3;a"
90001065-12 = "3;히마리 방한복;11;시설 파괴 확인…… 됐어요! 방해 전파의 송출이 멎었어요!\n#3;em;[!]"
90001065-13 = "#st;[0,0];instant;1;"
90001065-14 = "#clearST"
90001065-15 = "#wait;1500"
90001065-16 = "3;히마리 방한복;11\n2;리오;05;모두, 괜찮아? 회선이 지금 막 다시 연결됐어!\n#3;m4\n#2;sig\n#2;a"
90001065-17 = "3;히마리 방한복;05;그렇지 않았다면 여러 가지로 실망스러웠을 거예요. 뭐…… 일단은 다행이라고 해 두죠."
90001065-18 = "3;히마리 방한복;05\n2;리오;02;그래. AMAS의 통제권도 다시 돌아왔어. \n#2;sig"
90001065-19 = "3;히마리 방한복;05\n2;리오;02\n1;토키 모드 2;01;리오 님의 트레일러도 다시 작동을 시작했군요. 잘된 일입니다. \n#1;ar\n#2;sig\n#2;m3\n#3;m5"
90001065-20 = "2;리오;01;당신들이 있는 그곳은……?\n#2;sig\n#2;em;[?]"
90001065-21 = "#all;hide"
90001065-22 = "3;에이미 수영복ND;01\n#3;a\n#wait;1000"
90001065-23 = "3;에이미 수영복ND;02;재밍된 사이에 이동해 봤어. 방해 전파를 방출하는 시설 같은 게 보이길래."
90001065-24 = "3;에이미 수영복ND;00;그런데, 전파 시설을 파괴했더니 추가로 또 엄청난 시설이 보이고 있어서 말이야."
90001065-25 = "3;리오;05;……빙해뿐만이 아니라, 육지 위의……. 이런 장소에서도?\n#3;sig"
90001065-26 = "3;리오;07;……이 수준이라면…… 설마……\n#3;sig\n#3;stiff"
90001065-27 = "3;히마리 방한복;02;뭔가 알아차린 것이 있나요. 리오?\n#3;em;[?]"
90001065-28 = "#st;[0,0];instant;1;"
90001065-29 = "#clearST"
90001065-30 = "3;히마리 방한복;02\n#3;d\n#wait;1000"
90001065-31 = "3;리오;07\n#3;a\n#3;sig\n#wait;1000"
90001065-32 = "3;리오;02;당장은 확답하기 어려울 것 같아. \n#3;sig"
90001065-33 = "3;리오;07;하지만 한 가지 확실한 것은, 이 지역에서 채취되었을 자원량은, 내가 그동안 조사했던 예언자…….\n#3;sig\n#3;em;…"
90001065-34 = "3;리오;01;빙해 지역에서 자원을 채굴하고 있었던 예언자가, 그곳에서 채취했을 자원량의 수치를 완전히 상회한다는 거야.\n#3;sig"
90001065-35 = "3;리오;02;그들이 의미도 없이, 이유도 없이 대량의 자원을 채취할 리가 없어. 행동을 취한다면, 거기엔 의도가 있을 터.\n#3;sig"
90001065-36 = "3;리오;01;그렇다면 대체 어째서 그들은 이만한 양의 자원을 채굴하고, 필요로 하고 있는 거지?\n#3;sig\n#3;em;[?]"
90001065-37 = "3;리오;04;설마 그 아이들은, 그리고 데카그라마톤은……?\n#3;sig"
90001065-38 = "3;리오;04\n#3;h\n#3;sig"
90001065-39 = "3;리오;04;(이름 그대로, 자신들만의 왕국이라도 지을 생각인 거야?)\n#3;h\n#3;sig"
90001065-40 = "3;리오;04\n#3;h\n#3;sig"
90001065-41 = "3;리오;04\n#3;d\n#3;sig\n#wait;1000"
90001065-42 = "3;히마리 방한복;01\n#3;a\n#wait;1000"
90001065-43 = "3;히마리 방한복;02;……이제부터 어떻게 하는 것이 좋을까요. 선생님?\n#3;em;[?]"
90001065-44 = "[s] \"……이 시설을 탐색해 보자.\""
90001065-45 = "3;히마리 방한복;05;위험하지 않을까요?"
90001065-46 = "3;히마리 방한복;05\n2;에이미 수영복ND;00;그렇지만 조금 전보단 나을 거 아냐. 회장과의 통신도 다시 연결됐고.\n#2;ar\n#3;m4"
90001065-47 = "3;히마리 방한복;05\n2;에이미 수영복ND;00\n1;토키 모드 2;01;그렇습니다. 저희의 근본적인 목적은, 현장의 탐색과 예언자의 추적이기도 했으니까요.\n#1;ar\n#2;m3\n#3;m5"
90001065-48 = "1;토키 모드 2;02;혹시 또다시 적 병력이 나타난다면, 조금 전과 같이 제가 물리치면 되는 일입니다. 저는 최강의 메이드이자 비밀 요원이기에.\n#1;em;[반짝]"
90001065-49 = "3;히마리 방한복;06;……그거, 무언가의 불길한 예감 같은 대사처럼 들리기도 하네요…….\n#3;em;[땀]"
90001065-50 = "3;히마리 방한복;02;아무튼, 좋아요. 이런 아무것도 없는 툰드라 지역에, 이 정도의 시설을 건설하다니."
90001065-51 = "3;히마리 방한복;03;그건 그 자체만으로도 조사해 볼 가치가 있는 일이라고 생각되기는 하네요."
90001065-52 = "3;히마리 방한복;05;리오의 말대로, 우리가 알아냈던 정보와는 무언가 다른 일이 일어나고 있는 듯하니 말이죠."
90001065-53 = "2;에이미 수영복ND;04;그런 식으로 말할 줄 알았어…….\n#2;stiff"
90001065-54 = "1;토키 모드 2;00;네. 히마리 부장은 그런 면이 있는 분이시니까요."
90001065-55 = "3;히마리 방한복;06;최근 저에 대한 음해가 늘어나고 있는 것 같은데 말이죠…….\n#3;em;[속상함]"
90001065-56 = "#st;[0,0];instant;1;"
90001065-57 = "#clearST"
90001065-58 = "3;히마리 방한복;06\n2;에이미 수영복ND;04\n1;토키 모드 2;00\n#1;h\n#2;h\n#3;h\n#1;dl\n#2;dl\n#3;m3\n#wait;1000"
90001065-59 = "3;히마리 방한복;10;아무튼, 좋아요. 그러면 여러분. 조심하면서 탐색을 계속하도록 하죠."

[translation]
1012903-1 = "โดดเด่นจนละสายตาไม่ได้"
1012903-3 = "(วันนี้ช่างเป็นวันที่สงบสุขจริงๆ)"
1012903-4 = "(คุณครูคิดแบบนั้นเลยออกมานั่งที่สวนสาธารณะ)"
1012903-10 = "คุณครู!!"
1012903-11 = "ขอโทษนะคะ ฉันขอใช้พื้นที่ด้านหลังม้านั่งหน่อยนะคะ!"
1012903-12 = "[s] \"สึซึมิ?! จู่ๆ มีอะไรเหรอ??\""
1012903-18 = "ช่วยมองไปข้างหน้าและทำนิ่งๆ ไว้ด้วยค่ะ"
1012903-19 = "ฉันถูกไล่ตามอยู่ค่ะ"
1012903-20 = "[s] ทำตามที่สึซึมิบอก"
1012903-25 = "หายไปไหนแล้วน่ะ? เห็นวิ่งมาทางนี้อยู่นะ"
1012903-26 = "ถ้าจับได้จะเอาคืนให้สาสมเลย!!!"
1012903-27 = "ล้อมสวนสาธารณะไว้!! ห้ามให้ยัยนั่นออกไปได้เด็ดขาด!!"
1012903-28 = "พวกเรา! ไปล้อมสวนสาธารณะไว้!!"
1012903-29 = "ถ้าเจอยัยเด็กหัวขาวใส่ชุดนักเรียนทรีนิตี้สีเทาละก็จัดหนักได้เลย!"
1012903-34 = "[ns1] \"กลุ่มแฟนคลับเหรอ?\"\n[ns2] \"เพื่อนๆ เหรอ?\""
1012903-37 = "ใช่ที่ไหนกันล่ะคะ"
1012903-41 = "ดูเหมือนจะกระจายกันไปบริเวณรอบๆ สวนสาธารณะแล้วนะคะ"
1012903-42 = "ฉันกำลังเดินทางไปร้านซ่อมที่คุณครูบอก แต่จู่ๆ ก็โดนลอบโจมตีค่ะ"
1012903-43 = "ดูเหมือนจะวางกับดักไว้ตั้งแต่แรกแล้วด้วย ฉันพยายามตอบโต้แล้วแต่กระสุนดันมาหมดซะก่อนค่ะ"
1012903-44 = "ฉันรอดมาได้หวุดหวิดเพราะคุณครูเลย แต่ตอนนี้จะทำยังไงดี..."
1012903-45 = "[s] \"อีกฝ่ายมีกี่คนเหรอ?\""
1012903-46 = "ฉันไม่รู้จำนวนที่แน่นอนหรอกค่ะ..."
1012903-47 = "ฉันจับกุมไปคร่าวๆ แล้วประมาณ 90 คน น่าจะเหลืออีกสักประมาณ 180 คนได้ค่ะ"
1012903-48 = "[s3] \"จับไป 90 คนเรอะ?!\"\n[s4] \"เหลืออีกประมาณ 200 คนเหรอ?\""
1012903-51 = "ฉันคิดว่า... ประมาณนั้นค่ะ"
1012903-52 = "ดูแล้วน่าจะฝ่าวงล้อมออกไปลำบากค่ะ"
1012903-53 = "ฮู่ว..."
1012903-54 = "ขอบคุณนะคะ คุณครู ตอนนี้ฉันพักเพียงพอแล้ว มีแรงพอที่จะตีฝ่าวงล้อมออกไปแล้วค่ะ"
1012903-55 = "คุณครูรีบออกไปจากสวนสาธารณะก่อนเถอะค่ะ จะได้ไม่โดนลูกหลงไปด้วย"
1012903-60 = "อ๊ะ..."
1012903-61 = "[s] \"เป็นอะไรรึเปล่า? บาดเจ็บเหรอ?\""
1012903-62 = "สงสัยว่าขาจะพลิกน่ะค่ะ"
1012903-63 = "แบบนี้คงจะวิ่งไม่ได้แล้ว แต่ยังไงก็ต้องลองดู..."
1012903-64 = "[s5] \"ห้ามฝืนตัวเองเด็ดขาดเลยนะ!\"\n[s6] \"มาหาวิธีอื่นกันเถอะ!\""
1012903-67 = "อีกฝ่ายเปิดเผยเรื่องลักษณะของฉันไปแล้ว ถ้าจะตีฝ่าวงล้อมออกไป การปะทะกันคงเป็นเรื่องที่หลีกเลี่ยงไม่ได้ค่ะ"
1012903-68 = "ไม่เป็นไรหรอกค่ะ ฉันจะลองหาทางเอง เพราะงั้น..."
1012903-69 = "[s7] \"ครูมีวิธีนะ...\"\n[s8] \"ทำตามครูแล้วกันนะ\""
1012903-72 = "ฉันคงทำเรื่องที่จะทำให้คุณครูเป็นอันตรายไม่ได้หรอกค่ะ!"
1012903-73 = "[s] \"ครูเป็นครูของสึซึมินะ?\""
1012903-77 = "ขะ... เข้าใจแล้วค่ะ ถ้างั้นต้องทำยังไงคะ..."
1012903-80 = "คะ... คุณครู..."
1012903-83 = "การใส่เสื้อตัวนี้คือ 'วิธีดีๆ' งั้นเหรอคะ?!"
1012903-84 = "[s] \"ค่อยยังชั่วที่กำลังจะเอาชุดไปซ่อมพอดีเลย!\""
1012903-85 = "ด้วยจำนวนที่น้อยกว่าและเคลื่อนไหวไม่สะดวกจะทำให้เป็นฝ่ายเสียเปรียบได้ค่ะ"
1012903-86 = "นะ... นี่กำลังล้อฉันเล่นอยู่เหรอคะ?!"
1012903-87 = "[s9] \"เมื่อกี้พวกนั้นพูดมาแล้วนี่นา\"\n[s10] \"พวกนั้นบอกว่าจะจับ 'เด็กที่ใส่ชุดนักเรียนทรีนิตี้สีเทา' น่ะ\""
1012903-90 = "!!"
1012903-91 = "อย่างนี้... นี่เอง... "
1012903-92 = "อีกฝ่ายได้รับข้อมูลเกี่ยวกับลักษณะของฉันแค่การบอกปากต่อปาก"
1012903-93 = "ฉันคิดว่าพวกเขาคงจะแค่บอกต่อกันไปโดยไม่ได้มีรูปหรืออะไรที่บ่งบอกถึงตัวตนของฉันมากกว่านั้นค่ะ"
1012903-94 = "เพราะงั้นถ้าปลอมตัวละก็... คงจะหลีกเลี่ยงการปะทะกันได้สินะคะ"
1012903-95 = "แต่ถึงยังไงให้ใส่ชุดนี้ฉันก็เขินนะคะ...!"
1012903-96 = "[s11] \"สาวน้อยเวทมนตร์คือผู้ที่ต่อสู้เพื่อความยุติธรรมนะ\"\n[s12] \"ชุดมันก็เหมาะกับสถานการณ์ดีไม่ใช่เหรอ?\""
1012903-99 = "ถ้าคุณครูพูดถึงขนาดนั้น... เฮ้อ เข้าใจแล้วค่ะ"
1012903-100 = "แต่ยังไงคุณครูก็ช่วยเว้นระยะเพื่อความปลอดภัยของตัวเองด้วยนะคะ"
1012903-101 = "[s] \"ที่จริงครูยังมีแผนอีกอย่างหนึ่งนะ\""
1012903-109 = "ยังไม่เจอตัวยัยเด็กที่ใส่ชุดนักเรียนทรีนิตี้ใช่มั้ย?"
1012903-110 = "อื้อ ตอนนี้ก็ให้คนอื่นๆ ทยอยออกไปหาแล้วละ"
1012903-111 = "ถ้าจับได้จะขยี้ให้แหลกเลยคอยดู!!"
1012903-117 = "นั่นอะไรน่ะ?"
1012903-121 = "ทะ... เทอร์ไมต์ ไวต์ปรากฏตัวแล้ว~!"
1012903-126 = "?????"
1012903-127 = "ข้างๆ นั่นคุณครูจากชาเล่ต์ใช่รึเปล่า?"
1012903-128 = "แถมกำลังใช้มือถือถ่ายวิดีโออยู่ด้วย?"
1012903-130 = "เตรียมพร้อม... เปิดฉากยิงได้! ☆"
1012903-131 = "[s] \"ทำหน้าเขินๆ กว่านี้อีกหน่อยสิ!\""
1012903-135 = "ดะ... ดวงตาของคุณ... กระแทกใจ~☆"
1012903-137 = "คุณครูของชาเล่ต์มีงานอดิเรกแบบนี้สินะ..."
1012903-138 = "นี่ พวกเขามาทางนี้แล้ว หลีกทางไปเร็ว"
1012903-139 = "สงสัยนั่นจะเป็นงาน 'เข้าเวรตัวแทน' ที่เลื่องลือของชาเล่ต์ละมั้ง"
1012903-140 = "เฮ้อ... ดูเหนื่อยน่าดูเลย..."
1012903-141 = "ขะ... ขอบคุณที่เปิดทางให้นะคะ เหล่าภูตน้อย!"
1012903-142 = "อ่า... ค่ะ..."
1012903-143 = "ไปกันเถอะ อย่าไปสบตากับครูเข้าล่ะ..."
1012903-149 = "ได้ผลจริงๆ ด้วยค่ะ"
1012903-150 = "ฉันนึกไม่ถึงเลยว่าคุณครูจะวางแผน 'แปลงโฉม' เป็นตากล้องแบบนี้ด้วย..."
1012903-151 = "[s13] \"อ๋อ เดี๋ยวครูเอาไปตัดต่อให้นะ พูดต่อเลยๆ\"\n[s14] \"เอ้า ต่อบทได้เลย เทอร์ไมต์ ไวต์!\""
1012903-157 = "นี่คือกะถ่ายจริงจังเหรอคะ!!!!"
1012903-159 = "(หลังจากนั้น คุณครูกับสึซึมิก็ออกมาจากสวนสาธารณะ)"
1012903-160 = "(กลุ่มนักเลงก็คอยเลี่ยงไม่เข้ามาใกล้ทั้งสองคนอีก)"

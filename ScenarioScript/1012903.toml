[translation]
1012903-1 = "To Believe So Blindingly"
1012903-3 = "It was another peaceful day..."
1012903-4 = "...or so I thought. I sat on a park bench."
1012903-10 = "Sensei!"
1012903-11 = "I'll be requisitioning the space behind the bench for a moment. Please do not mind!"
1012903-12 = "[s]\"Suzumi?! What's happening?\""
1012903-18 = "Keep your eyes forward. Act natural. Don't look at me."
1012903-19 = "I am being pursued."
1012903-20 = "[s]Follow Suzumi's orders."
1012903-25 = "Where'd she go? She went this way, right?"
1012903-26 = "Catch her and make her pay! This is personal!"
1012903-27 = "Surround the park! Don't let her get out!"
1012903-28 = "Got it! Cover all the exits!"
1012903-29 = "If you see some white-haired pale freak in a Trinity uniform, take her out!"
1012903-34 = "[ns1]\"Your fans?\"\n[ns2]\"Your friends?\""
1012903-37 = "Quite the opposite."
1012903-41 = "They've retreated to the park outskirts for now."
1012903-42 = "You see, I was heading to the tailoring shop you mentioned, but was suddenly ambushed."
1012903-43 = "I believe it was an intentional trap. I attempted to defend myself, but ran out of ammo."
1012903-44 = "Thanks to you, I can now catch my breath. Though, how I should proceed is unclear."
1012903-45 = "[s]\"How many thugs are there?\""
1012903-46 = "I couldn't make an exact calculation."
1012903-47 = "While I defeated roughly 90 people, I fear that was less than half of their true number."
1012903-48 = "[s3]\"90?!\"\n[s4]\"So, you're fighting against 200 people?\""
1012903-51 = "That...may be accurate."
1012903-52 = "Escaping appears to be....quite the challenge."
1012903-53 = "*sigh*"
1012903-54 = "Thank you, Sensei. I think I've recovered slightly. I have assessed a weak point and will now rush to freedom."
1012903-55 = "Please exit the park peacefully before then. I don't want you to be caught in the crossfire."
1012903-60 = "Ow... Ah...."
1012903-61 = "[s]\"Oh, are you hurt?\""
1012903-62 = "I may have....slightly sprained my ankle."
1012903-63 = "I don't think I can run. But, perhaps, I can crawl my way to—"
1012903-64 = "[s5]\"Don't overexert yourself!\"\n[s6]\"Let's find another way!\""
1012903-67 = "They...already know my appearance. They called me \"pale!\" I think a confrontation is inevitable, as I cannot sneak by."
1012903-68 = "It's all right. I'll do something about it, so you should..."
1012903-69 = "[s7]\"I have a good idea...\"\n[s8]\"Please listen to me.\""
1012903-72 = "I can't put you in danger, Sensei!"
1012903-73 = "[s]\"But I'm YOUR Sensei, Suzumi.\""
1012903-77 = "O-Okay. Then what should I..."
1012903-80 = "S-Sensei..."
1012903-83 = "So...this outfit was your \"good idea\"?"
1012903-84 = "[s]\"You already had it! You were on your way to the tailor!\""
1012903-85 = "This is a tactical disadvantage. We are outnumbered and this dress limits my maneuverability."
1012903-86 = "I-Is this a joke?!"
1012903-87 = "[s9]\"But you heard them, right?\"\n[s10]\"They're looking for a Trinity girl.\""
1012903-90 = "!"
1012903-91 = "You're...compelling. Now that I consider it..."
1012903-92 = "They probably are looking for a girl in a gray Trinity uniform."
1012903-93 = "And I don't think they have a picture of me."
1012903-94 = "Which is why, if I...may be so audacious, could I possibly sneak by with this disguise?"
1012903-95 = "But still, this is too embarrassing...!"
1012903-96 = "[s11]\"Magical girls are warriors of justice.\"\n[s12]\"Don't you think the outfit suits the situation?\""
1012903-99 = "Even if you say that... *sigh* Fine."
1012903-100 = "But you should maintain some distance for your safety, Sensei."
1012903-101 = "[s]\"Sorry. I still have a role to play.\""
1012903-109 = "You haven't seen her, right? That Trinity girl?"
1012903-110 = "Not yet. Plenty of others have come through, though..."
1012903-111 = "She better start praying! I'll tear her apart!"
1012903-117 = "Who's that?"
1012903-121 = "Th-Thermite White has arrived!"
1012903-126 = "?"
1012903-127 = "Isn't that Schale's Sensei next to her?"
1012903-128 = "They're taking a video with their phone?"
1012903-130 = "The marksman is ready, fire! Pew! ☆"
1012903-131 = "[s]\"A little more coy! Work it!\""
1012903-135 = "R-Right in your eyes... Flashbang! ☆"
1012903-137 = "So this is what Schale's Sensei is into..."
1012903-138 = "They're gradually coming this way. Just let them pass."
1012903-139 = "I guess this is standard Student Rep duty."
1012903-140 = "Damn... These students have it rough..."
1012903-141 = "Th-Thank you for letting us pass, my supportive fairies! Blessings upon you!"
1012903-142 = "Ah... Sure..."
1012903-143 = "Let's just beat it. Don't make eye contact with the teacher..."
1012903-149 = "It actually worked."
1012903-150 = "I appreciate your role, Sensei. Evidently, I needed a director."
1012903-151 = "[s13]\"We'll fix it in the edits.\"\n[s14]\"Keep selling your lines, Thermite White!\""
1012903-157 = "Wait, you're really filming!?"
1012903-159 = "I escaped the park with Suzumi."
1012903-160 = "The other thugs never suspected a thing. We passed through without issue."

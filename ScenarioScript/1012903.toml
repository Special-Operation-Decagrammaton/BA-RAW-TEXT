[translation]
1012903-1 = "耀眼得令人眩目"
1012903-3 = "（今天也很和平呢）"
1012903-4 = "（正當懷抱著這樣的心情，坐在公園的長椅上時……）"
1012903-10 = "老師！！"
1012903-11 = "稍微借用一下長椅後方，恕我失禮了！"
1012903-12 = "[s]「鈴美！？突然怎麼了？」"
1012903-18 = "請您裝作若無其事地看向前方。"
1012903-19 = "我正在被人追趕。"
1012903-20 = "[s] 遵從鈴美的指示"
1012903-25 = "跑哪去了？明明是這個方向沒錯啊？"
1012903-26 = "抓到之後一定要給他好看！！！"
1012903-27 = "把公園包圍起來！！絕對不能讓他逃了！！"
1012903-28 = "大家，圍住這個公園！！"
1012903-29 = "一旦看到白色頭髮、穿灰色三一制服的傢伙就直接幹掉！"
1012903-34 = "[ns1]「是你的粉絲嗎？」\n[ns2]「是你的朋友嗎？」"
1012903-37 = "……並不是這樣的。"
1012903-41 = "他們好像到公園外圍去了呢。"
1012903-42 = "我正打算前往您推薦的修補店，結果就突然遭到了襲擊。"
1012903-43 = "似乎是早已設下陷阱，打算在這裡埋伏我。#n雖然想試著反擊，不過手邊的彈藥已經用完了。"
1012903-44 = "幸虧老師讓我有了喘息的機會，可是接下來該怎麼辦呢……"
1012903-45 = "[s]「對方有多少人？」"
1012903-46 = "確切的人數我也不太清楚……"
1012903-47 = "截至目前大約壓制了90人左右，但敵人還剩下兩倍以上。"
1012903-48 = "[s3]「90個人！？」\n[s4]「所以剩下的敵人還有200人左右？」"
1012903-51 = "我想……應該相去不遠。"
1012903-52 = "照這樣下去，恐怕很難突破包圍。"
1012903-53 = "呼……"
1012903-54 = "謝謝您，老師。#n我已經休息夠了，應該能設法從較弱的地點加以突破。"
1012903-55 = "為了避免受到波及，請您趕緊離開這座公園吧。"
1012903-60 = "好痛……"
1012903-61 = "[s]「還好嗎？是不是受傷了？」"
1012903-62 = "好像稍微扭到腳了。"
1012903-63 = "要跑起來可能有點困難，不過總會有辦法的……"
1012903-64 = "[s5]「不能勉強自己！」\n[s6]「我們找找其他辦法吧！」"
1012903-67 = "對方已經掌握了我的特徵……想突破包圍勢必會引發衝突。"
1012903-68 = "不必擔心，我會想辦法的。#n還請老師務必……"
1012903-69 = "[s7]「其實我有個好辦法……」\n[s8]「希望你能按照我說的去做。」"
1012903-72 = "我不能讓老師陷入危險！"
1012903-73 = "[s]「我可是鈴美的老師哦？」"
1012903-77 = "啊……我明白了。#n那麼該怎麼做呢……"
1012903-80 = "老，老師……"
1012903-83 = "穿上這套衣服就是您所謂的「好辦法」嗎！？"
1012903-84 = "[s]「你剛好要去修補店，真是太巧了！」"
1012903-85 = "人數本就屈於劣勢，行動不便又會導致情況更加不利。"
1012903-86 = "您，您是在開玩笑嗎！？"
1012903-87 = "[s9]「他們剛才不是這麼說的嗎？」\n[s10]「『穿灰色三一制服的傢伙』。」"
1012903-90 = "！！"
1012903-91 = "原來如此……"
1012903-92 = "對方大多是以口頭方式傳達我的特徵……"
1012903-93 = "就是因為沒有照片這類具體的外貌資訊，所以才會選擇這樣的方式吧。"
1012903-94 = "因此只要變裝……就能在不引發衝突的情況下順利脫身。"
1012903-95 = "話雖如此，這副打扮還是太害羞了……！"
1012903-96 = "[s11]「魔法少女是戰鬥的正義使者。」\n[s12]「這套服裝不是正好符合現在的情境嗎？」"
1012903-99 = "就算您這麼說……唉，好吧。"
1012903-100 = "那麼為了安全起見，請老師先跟我保持距離。"
1012903-101 = "[s]「其實我的計畫還有下一步……」"
1012903-109 = "還沒出現對吧？那個穿著三一制服的傢伙。"
1012903-110 = "嗯，其他人已經解除包圍放行了。"
1012903-111 = "要是被我逮到，絕對讓他吃不完兜著走！！"
1012903-117 = "那是什麼？"
1012903-121 = "Thermite White，登場～！"
1012903-126 = "？？？？？"
1012903-127 = "旁邊那個人不是夏萊的老師嗎？"
1012903-128 = "是在用手機拍影片……？"
1012903-130 = "從準備OK的Shooter開始射擊！☆"
1012903-131 = "[s]「表情再害羞一點！」"
1012903-135 = "向，向你的眼眸……釋放Flashbang～☆"
1012903-137 = "原來夏萊的老師有這種癖好啊……"
1012903-138 = "喂，他往這邊過來了。#n解除包圍讓他通過吧。"
1012903-139 = "這就是夏萊的值日生工作嗎？"
1012903-140 = "哇……真是太辛苦了……"
1012903-141 = "謝，謝謝你們讓我通過，各位妖精們！"
1012903-142 = "啊……嗯……"
1012903-143 = "快點走吧，免得跟那個老師對上視線……"
1012903-149 = "真的成功了呢。"
1012903-150 = "沒想到老師的「變身」計劃，居然是擔任攝影師……"
1012903-151 = "[s13]「啊，剛才那段我會剪掉的。」\n[s14]「繼續說台詞吧！Thermite White！」"
1012903-157 = "原來您真的在拍嗎！！！！"
1012903-159 = "（之後和鈴美一起離開了公園）"
1012903-160 = "（途中就算被其他太妹們看見，他們也都遠遠地避開了）"

[translation]
80000071-1 = "Messily Wrapped Valentine's Chocolate"
80000071-2 = "Plum Blossom Garden"
80000071-3 = "I visited Plum Blossom Garden on Schale business."
80000071-4 = "Welcome, Sensei."
80000071-5 = "I'm sorry I couldn't come to you! As you can see, I'm a busy bee!"
80000071-6 = "[s] \"What's with all the chocolate?\""
80000071-7 = "Isn't it obvious? They're Valentine chocolates!"
80000071-8 = "Normally, we wouldn't give the children sweets. It's not good for them."
80000071-9 = "But today is the Valentine's Day, so, I'm going to be handing these out in the afternoon as a special treat."
80000071-10 = "[s] \"You're such a good teacher, Kokona!\""
80000071-11 = "It's not Kokona! It's Instructor Kokona!"
80000071-12 = "I-I mean... I just said it out of habit."
80000071-13 = "You set me up for that one, huh?"
80000071-14 = "Ugh! Teachers are—I mean, you're no fair, Sensei!"
80000071-15 = "[s] \"I really do think you're a good instructor, Kokona.\""
80000071-16 = "H-Hmph! Well, of course I am!"
80000071-17 = "But because you said so, you can have chocolate."
80000071-18 = "I almost forgot to get you any, but I remembered at last minute. So I got you chocolate."
80000071-19 = "But I barely even remembered. It was at the very last instant."
80000071-24 = "[ns] \"Thank you, Kokona! But…\""
80000071-25 = "Wh-What? You think this chocolate looks different than the others?"
80000071-26 = "Nope! No way! It was just the last thing I bought when I went to get chocolate for the students! I got them all at the same place!"
80000071-27 = "[s] \"But the packaging isn't as neat...\""
80000071-28 = "What are you talking about? You're not suggesting...someone wrapped it up by hand?"
80000071-29 = "Ridiculous! M-Maybe the store staff was tired that day!"
80000071-30 = "[s] \"Oh, sure. I see.\""
80000071-31 = "What's with that all-knowing smile?"
80000071-32 = "Stop that! You're ruining my mood."
80000071-33 = "[s] \"So I can just eat the chocolate here, right?\""
80000071-34 = "H-Here?"
80000071-35 = "What? Absolutely not! Nope!"
80000071-36 = "I can't believe even you would be this clueless of etiquette. I'm disappointed!"
80000071-37 = "Huh...? If it's just from a store, you should be able to eat it anywhere?"
80000071-38 = "Well, yeah. I guess so, but..."
80000071-39 = "But no! If you're going to eat it, do it when you get back to Schale."
80000071-40 = "And don't share it with anyone! Okay? Okay."
80000071-45 = "Kokona fled the scene."
80000071-53 = "Suddenly, she reappeared, as quickly as she had left..."
80000071-54 = "Promise me, okay?!"

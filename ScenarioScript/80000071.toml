[translation]
80000071-1 = "#title;서투르게 포장된 발렌타인 초콜릿"
80000071-2 = "#place;매화원"
80000071-3 = "#na;(샬레의 업무차 매화원을 방문했다.)"
80000071-4 = "3;코코나;03;어서 오세요, 선생님.\n#3;a\n#3;em;[반응]"
80000071-5 = "3;코코나;02;마중을 못 나가서 죄송해요. 이것들 때문에 조금 바빴거든요."
80000071-6 = "[s] \" 이 초콜릿들은 다 뭐야?\""
80000071-7 = "3;코코나;02;뭐긴요. 발렌타인 초콜릿들이죠."
80000071-8 = "3;코코나;99;초콜릿같이 너무 단 것은 사실 아이들에게 좋지 않지만……\n#3;em;…"
80000071-9 = "3;코코나;01;오늘은 발렌타인 데이니까, 오후에 원생들에게 간식 대신으로 나눠주려고요."
80000071-10 = "[s] \"역시 코코나 쨩은 훌륭한 교관이네!\""
80000071-11 = "3;코코나;10;코코나 쨩이 아니에요! 교관이라구요!\n#3;hophop\n#3;em;[스팀]"
80000071-12 = "3;코코나;06;읏…… 반사적으로 말해버렸네요."
80000071-13 = "3;코코나;12;이렇게 대꾸할 줄 알고 동시에 말씀하신 거죠?"
80000071-14 = "3;코코나;10;어른은 치사해요…… 아니, 선생님은 치사해요!\n#3;hophop"
80000071-15 = "[s] \"그래도 코코나가 좋은 교관이라는 사실은 변하지 않아.\""
80000071-16 = "3;코코나;99;흐, 흥! 그렇게 말씀하신다면야 어쩔 수 없죠!"
80000071-17 = "3;코코나;01;그런 선생님에게, 특별히 이 초콜릿을 드릴게요.\n#3;em;[반짝]"
80000071-18 = "3;코코나;04;사실 그냥 넘어갈 뻔했는데, 마지막에 생각나서 사 온 거예요."
80000071-19 = "3;코코나;11;정말 마지막에서야 간신히 생각난 거니까요!\n#3;stiff"
80000071-20 = "#st;[0,0];instant;1;"
80000071-21 = "#clearST"
80000071-22 = "3;코코나;11\n#3;m5\n#wait;1000"
80000071-23 = "#wait;2500"
80000071-24 = "[ns] \"고마워, 코코나 쨩! 그런데……\""
80000071-25 = "3;코코나;02;네, 네? 이 초콜릿, 어딘가 다른 초콜릿들과 다른 것 같다고요?\n#3;em;[?]"
80000071-26 = "3;코코나;11;그, 그럴 리가요! 원생들에게 나누어 줄 초콜릿을 산 곳에서, 마지막으로 산 건데요?\n#3;stiff"
80000071-27 = "[s] \"하지만 그렇다기엔 포장도 어딘가 서투르고……\""
80000071-28 = "3;코코나;02;직접 누군가가 손으로 포장한 것 같다…… 고요?"
80000071-29 = "3;코코나;06;무, 무슨 소리를 하시는 거예요! 매, 매장 언니가 그날따라 피곤했나 보죠, 뭐!\n#3;m3\n#3;em;[반응]\n#3;hophop"
80000071-30 = "[s] \"흐음…… 그래. 그렇구나.\""
80000071-31 = "3;코코나;05;뭐예요, 그 '알 것 같다'는 웃음은."
80000071-32 = "3;코코나;10;뭔가 기분 나빠지거든요? 그만둬 주실래요?"
80000071-33 = "[s] \"그럼 이 초콜릿, 여기서 먹어도 되는 거지?\""
80000071-34 = "3;코코나;11;여, 여기서요?\n#3;em;[?!]\n#3;shake"
80000071-35 = "3;코코나;11;안 돼요! 그건 절대 안 돼요!\n#3;hophop"
80000071-36 = "3;코코나;10;선생님이 그 정도로 예의도 몰랐다니, 실망이에요!"
80000071-37 = "3;코코나;00;예? 매장에서 산 거라면 어디에서 먹어도 큰 상관없는 거 아니냐구요?"
80000071-38 = "3;코코나;11;그건, 그렇지만. 그렇긴 하지만……\n#3;em;[땀]"
80000071-39 = "3;코코나;06;그래도 안 돼요! 드실 거면 샬레에 돌아가서 드세요.\n#3;hophop"
80000071-40 = "3;코코나;12;아무한테도 나눠 주면 안 돼요. 아셨어요?"

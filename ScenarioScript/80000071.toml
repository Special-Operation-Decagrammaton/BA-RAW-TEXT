[translation]
80000071-1 = "ช็อกโกแลตวาเลนไทน์ที่ห่อมาแบบลวกๆ"
80000071-2 = "สวนต้นบ๊วย"
80000071-3 = "(คุณครูแวะมาที่สวนต้นบ๊วยเพราะมีธุระของทางชาเล่ต์)"
80000071-4 = "เชิญเลยค่ะคุณครู"
80000071-5 = "ขอโทษนะคะที่ไม่ได้ออกไปรับ ฉันกำลังยุ่งนิดหน่อยเพราะเจ้านี่ค่ะ"
80000071-6 = "[s] \"ช็อกโกแลตพวกนี้มันอะไรกันน่ะ?\""
80000071-7 = "จะอะไรล่ะคะ ก็ช็อกโกแลตวาเลนไทน์ไงคะ"
80000071-8 = "พวกขนมที่มีรสหวานมากๆ อย่างช็อกโกแลตไม่ดีต่อพวกเด็กๆ..."
80000071-9 = "แต่ว่าวันนี้เป็นวันวาเลนไทน์ ฉันก็เลยจะเอามาแบ่งให้พวกเด็กๆ เป็นขนมตอนบ่ายแทนค่ะ"
80000071-10 = "[s] \"โคโคน่าจังเป็นผู้ฝึกสอนที่ยอดเยี่ยมเลยนะ!\""
80000071-11 = "ไม่ใช่โคโคน่าจังสักหน่อยค่ะ! ผู้ฝึกสอนต่างหากค่ะ!"
80000071-12 = "อึก... เผลอตอบโต้ไปซะแล้วจนได้ค่ะ"
80000071-13 = "คุณครูพูดแบบนั้นเพราะรู้ว่าฉันจะตอบกลับแบบนี้สินะคะ?"
80000071-14 = "ผู้ใหญ่นี่โหดร้ายจริงๆ... ไม่สิ คุณครูต่างหากที่โหดร้ายค่ะ!"
80000071-15 = "[s] \"แต่ที่โคโคน่าเป็นผู้ฝึกสอนที่ดีน่ะเป็นเรื่องจริงนะ\""
80000071-16 = "ฮะ...ฮึ่ม! ถ้าคุณครูพูดแบบนั้นก็ช่วยไม่ได้นะคะ!"
80000071-17 = "ฉันจะให้ช็อกโกแลตพิเศษเป็นของขวัญก็แล้วกันค่ะ"
80000071-18 = "อันที่จริงฉันเกือบลืมไปแล้ว แต่เพิ่งนึกขึ้นมาได้ตอนท้ายนี่เองค่ะ"
80000071-19 = "ฉันเพิ่งนึกออกเมื่อตอนนาทีสุดท้ายนี้เลยนะคะ!"
80000071-24 = "[ns] \"ขอบคุณนะโคโคน่าจัง! แต่ว่า...\""
80000071-25 = "คะ... คะ? ช็อกโกแลตนี้ดูไม่เหมือนช็อกโกแลตอันอื่นเลยเหรอคะ?"
80000071-26 = "จะ...จะเป็นไปได้ยังไงกันคะ?! ฉันซื้อช็อกโกแลตชิ้นนี้มาพร้อมกับช็อกโกแลตที่จะให้เด็กๆ นะคะ?"
80000071-27 = "[s] \"แต่ว่ามันเหมือนจะห่อแบบลวกๆ มาด้วยเลยนะ...\""
80000071-28 = "เหมือนกับว่าใครบางคนห่อด้วยมือมาให้... งั้นเหรอคะ?"
80000071-29 = "พะ... พูดอะไรอย่างนั้นคะ! พะ...พี่สาวที่ร้านขายช็อกโกแลตคงจะเหนื่อยเลยห่อแบบเบี้ยวๆ มาให้มั้งคะ!"
80000071-30 = "[s] \"อืม... อย่างนี้นี่เอง\""
80000071-31 = "อะไรกันคะ รอยยิ้มกรุ้มกริ่มเหมือน \"รู้แล้วละ\" นั่นน่ะ"
80000071-32 = "เห็นแล้วไม่สบอารมณ์เลยนะคะ? ช่วยเลิกยิ้มแบบนั้นได้มั้ยคะ?"
80000071-33 = "[s] \"ครูกินช็อกโกแลตที่นี่เลยได้มั้ย?\""
80000071-34 = "ทะ... ที่นี่เหรอคะ?"
80000071-35 = "ไม่ได้ค่ะ! ห้ามกินตรงนี้นะคะ!"
80000071-36 = "คุณครูไม่รู้ธรรมเนียมเลยเหรอคะ น่าผิดหวังจริงๆ เลยค่ะ!"
80000071-37 = "เอ๋? ถ้าเป็นของที่ซื้อมาจากที่ร้าน จะกินที่ไหนก็ไม่ผิดงั้นเหรอคะ?"
80000071-38 = "ระ... เรื่องนั้นก็จริงอยู่ แต่ว่า..."
80000071-39 = "แต่ยังไงก็ไม่ได้ค่ะ! ถ้าจะกินก็กลับไปกินที่ชาเล่ต์นะคะ"
80000071-40 = "แล้วก็ห้ามเอาไปแบ่งคนอื่นด้วยค่ะ เข้าใจรึเปล่าคะ?"
80000071-45 = "(พูดจบโคโคน่าก็รีบวิ่งออกไปที่ไหนสักแห่ง)"
80000071-53 = "(และจู่ๆ เธอก็วิ่งกลับมา แล้วก็พูดต่อว่า...)"
80000071-54 = "ห้ามเอาไปแบ่งใครนะคะ!"

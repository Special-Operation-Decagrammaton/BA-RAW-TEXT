[translation]
80000071-1 = "包裝粗糙的情人節巧克力"
80000071-2 = "梅花園"
80000071-3 = "（因為夏萊的工作來到了梅花園）"
80000071-4 = "啊。你好，老師。"
80000071-5 = "抱歉沒能在入口迎接你，準備多花了一些時間。"
80000071-6 = "[s]「難道說，這些全都是巧克力？」"
80000071-7 = "沒錯，畢竟是情人節啊。"
80000071-8 = "雖然總是吃甜食其實不太好……"
80000071-9 = "不過畢竟是難得的情人節，所以下午我想發給學生們當作點心。"
80000071-10 = "[s]「不愧是心菜教官！」"
80000071-11 = "不是心菜教官，是心菜醬！"
80000071-12 = "呃，啊……已經變成一種反射動作，不小心就說反了……"
80000071-13 = "你是故意那麼說，想讓我上鉤的對吧？"
80000071-14 = "真奸詐啊，大人……不對，老師真是壞心眼！"
80000071-15 = "[s]「抱，抱歉……不過我真的覺得很有教官的樣子哦。」"
80000071-16 = "是，是嗎……！#n既然如此，那就沒辦法了！"
80000071-17 = "對這樣的老師……特，特別送你這個巧克力。"
80000071-18 = "本來是只打算準備孩子們的份，不過偶然想到了老師……"
80000071-19 = "真的，只是偶然想到的哦！"
80000071-24 = "[ns]「謝謝！……咦？」"
80000071-25 = "怎，怎麼了嗎？咦，只有這個巧克力和其他的有點不一樣……？"
80000071-26 = "怎，怎麼會呢……！#n對，對了！因為老師的那份是想到之後才買的，所以種類可能不一樣……不對，就是不一樣！"
80000071-27 = "[s]「但是，包裝有點……」"
80000071-28 = "不，不像是店裡的人包裝的，是嗎……？"
80000071-29 = "為，為什麼會這樣呢……#n會，會不會是店裡的姐姐太累，所以不小心失敗了之類的？"
80000071-30 = "[s]「……確實可能是那樣？」"
80000071-31 = "怎，怎麼了，突然笑瞇瞇的。"
80000071-32 = "能，能不能不要笑的那麼奇怪……！？"
80000071-33 = "[s]「這個，我可以現在在這裡吃嗎？」"
80000071-34 = "在，在在在在，在這裡吃嗎？"
80000071-35 = "不行！請不要那麼做！"
80000071-36 = "要做那種壞心的事的話，就要請你還給我了唷！"
80000071-37 = "嗯？因為好不容易收到了巧克力，想趕快吃完告訴我感想……？"
80000071-38 = "啊嗚，這，這個……可是……"
80000071-39 = "果，果然還是不行！請回夏萊之後再吃！"
80000071-40 = "絕對要一個人吃哦。知道了嗎？"
80000071-45 = "（留下這些話的心菜逃跑似地跑走了）"
80000071-53 = "（才剛這麼想，又突然跑回來說了一句……）"
80000071-54 = "約好了唷！"

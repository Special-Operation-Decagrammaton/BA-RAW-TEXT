[translation]
51170-1 = "Episode 17;Rumors of the Streets 1"
51170-2 = "Lantern Festival Plaza"
51170-4 = "Preparations are complete! Right this way."
51170-12 = "The eagle has landed! I repeat, the eagle has landed!"
51170-20 = "Wow! It looks as if it was made just for you."
51170-22 = "How does it fit? Is anything uncomfortable?"
51170-24 = "Not any more than usual."
51170-25 = "Heehee. You look stunning, Lady Kadenokouji. It is wonderful to see you finally stepping into your role."
51170-26 = "I'm thrilled our lady decided to quit this Hyakkaryouran nonsense and return home."
51170-27 = "Now everything is back the way it should be! "
51170-32 = "Um... Yukari..."
51170-33 = "You're well aware, but this event will be the centerpiece of the festival. You as the Kadenokouji miko will perform the ritual dance on stage at midnight."
51170-34 = "There are cameras set up to live stream your performance to all of Hyakkiyako."
51170-35 = "It'll be a great symbol of rebirth and new beginnings for the students here."
51170-37 = "Yes! So it's like you're the symbol of a better tomorrow, of Hyakkiyako's hope!"
51170-38 = "To think a tradition this cool would have been lost to history! I am very honored I get to experience it."
51170-39 = "Everyone's real excited!"
51170-44 = "Here's a schedule and a list of—"
51170-45 = "Heehee. How kind of you, but Lady Kadenokouji requires no such assistance. She has studied tirelessly in the ritual arts since she was but a small child."
51170-46 = "Since she was a child?!"
51170-48 = "Naturally. My education began as soon as I could read and write. "
51170-49 = "I assure you, everything will be fine."
51170-50 = "That's good to hear, but..."
51170-51 = "Will YOU be fine?"
51170-52 = "Yes."
51170-53 = "I..."
51170-54 = "I am perfectly fine."
51170-55 = "Okay... If you say so."
51170-56 = "In that case, it's time to take our places!"
51170-61 = "Yes... Everything is fine."
51170-66 = "At least, it will be."
51170-72 = "And that concludes my report."
51170-73 = "Are you crazy, Kikyou? Why would you indulge her succession contest? "
51170-74 = "...Ugh, I know why! She really meant it with her whole heart. But you were still too harsh..."
51170-75 = "Well, you didn't tell me all this just so I could chastise you."
51170-76 = "..."
51170-77 = "I know she went to see you too, before coming to me."
51170-78 = "I assumed you would want to know the ending. "
51170-79 = "I didn't manage to deter her in the slightest, did I? Oh, Yukari... "
51170-80 = "Tsk. I meant what I said though. There's nothing to go back to."
51170-81 = "We can be done now, Kikyou."
51170-82 = "...Done?"
51170-83 = "Let's lay the past to rest. You don't have to reach out at the slightest hint of nostalgia."
51170-84 = "Don't worry about updating me, or thinking about what I might want. I've moved on. I'm searching for my youth."
51170-85 = "I don't have time to waste on a relic like the Hyakkaryouran. So let's lay it to rest."
51170-91 = "...Consider it buried."
51170-92 = "I'm relieved to hear our feelings on this subject align. "
51170-93 = "...I do hope you find your youth."
51170-94 = "But take care of yourself, Renge. You look unwell. "
51170-95 = "Your bones look as if they would snap if I so much as touched you."
51170-96 = "What?! Kikyou! Hey!"
51170-100 = "You think you can just have the last word and then run away?! Ugh!"
51170-101 = "UGH!"
51170-102 = "Worry about taking care of yourself, you overgrown cat!"
51170-103 = "*sigh* You dummy..."
51170-104 = "Why are you reopening old wounds..."
51170-106 = "Huh?!"
51170-107 = "Are you okay, Renge? What happened?!"
51170-108 = "Renge?"
51170-109 = "*yawn*"
51170-114 = "Oh, sorry. Nothing happened!"
51170-115 = "Just a blast from the past..."
51170-116 = "Is it related to the Hyakkaryouran?"
51170-117 = "How'd you... "
51170-118 = "It doesn't matter. None of that matters anymore, as a matter of fact!"
51170-119 = "After all, I'm here as a member of the Inner Discipline Club to enjoy the Lantern Festival."
51170-120 = "Attending festivals is a quintessential experience for those seeking their youth! So let's go be youthful!"
51170-121 = "Right, Pres? Mimori? Kaede?"
51170-127 = "I don't mean to be rude, Renge, but your deception skills are atrocious."
51170-129 = "Wh-What?"
51170-132 = "Can you say that again with a straight face? That none of it matters to you anymore?"
51170-133 = "You should hear the way you were talking about it. \"Hyakkaryouran this\" and \"Hyakkaryouran that,\" all the time!"
51170-135 = "Was it really that much...?"
51170-136 = "If you don't care, why were you so upset by your phone call?"
51170-141 = "I believe it's because it still matters to you all too much, no?"
51170-142 = "Heehee. Don't even try to deny it, Renge. You're talking to Mimori the Mind Reader of Hyakkiyako! Nothing escapes her watchful eye."
51170-143 = "You might as well own up to everything now!"
51170-144 = "K-Kaede, please! I claim no such thing!"
51170-150 = "What's the point even if I do admit it?"
51170-151 = "It's done. Everything's over."
51170-152 = "I can scream and cry and throw a temper tantrum right in the middle of this square. It won't bring back Nagusa and the others."
51170-153 = "I won't dig up skeletons that have already been buried."
51170-154 = "I've already told you all. Those days are behind me. I'm Renge of the Inner Disciplinary Club now."
51170-155 = "If you really felt that way, you wouldn't have been so kind to Yukari."
51170-156 = "Me? Kind to Yukari? That's not the word I would've used."
51170-157 = "I...really hurt her. Yukari, I mean."
51170-158 = "The opposite, actually. You tried to relieve her of the pain of being the one left waiting."
51170-159 = "I don't think someone who can shoulder their underclassman's burdens like that doesn't care at all."
51170-160 = "And regarding Kikyou... Aren't you two childhood friends?"
51170-161 = "..."
51170-162 = "I don't think she holds it against you. What are friends for, after all?"
51170-163 = "Relationships are forged through the good and bad times. We lose our temper, cry our hearts out, and say things we don't mean. But the bond underneath never wavers."
51170-164 = "I've had some similar experiences, after all."
51170-166 = "Really?! Even you, Mimori?"
51170-167 = "Heehee. I'm hardly perfect, Kaede."
51170-168 = "I have a childhood friend of my own, and things haven't always been easy with her."
51170-169 = "Isn't that right, Tsubaki?"
51170-171 = "...Mad Mimori is worse than my scariest nightmare."
51170-173 = "Oh, oh! I actually know exactly what you mean!"
51170-174 = "E-Excuse me?!"
51170-175 = "You two..."
51170-179 = "Let's focus on the matter at hand."
51170-184 = "...It's too late."
51170-185 = "I can't go back now. I already resigned from the Hyakkaryouran. I've met all of you in the process of finding my youth. I'm already walking down this path."
51170-186 = "Organizations and titles aren't what matter here. Don't you want to talk to the people most precious to you one last time? Tell them how you really feel?"
51170-187 = "But...how would they react? Wouldn't I just upset them more?"
51170-188 = "Those things are outside of your control. What matters is what YOU want to do."
51170-189 = "Vice President Mimori..."
51170-195 = "Renge, as president of the Inner Discipline Club, I'm officially cancelling your trial membership."
51170-197 = "Huh?!"
51170-199 = "That frees you up to do what you need to do."
51170-200 = "But don't worry. We'll help you."
51170-201 = "Because we made lots of memories together as the Inner Discipline Club, right?"
51170-203 = "Tsubaki, Mimori, Kaede..."
51170-209 = "You're right. I can't run away now."
51170-211 = "Kikyou filled me in on their succession contest."
51170-212 = "For Yukari to hear all that from her, right after everything I said..."
51170-213 = "She won't say it outright, but I know Kikyou wants me to check on Yukari."
51170-215 = "It's a little annoying when she's perfectly capable of doing it herself, but..."
51170-216 = "I can't just leave Yukari like that. I need to talk to her."
51170-219 = "If that's what you want, let's make that happen."
51170-220 = "Yeah! We'll find Yukari together!"
51170-222 = "Thanks, all of you."
51170-230 = "Whoa. Fireworks!"
51170-231 = "That signifies the beginning of the Lantern Festival."
51170-232 = "In that case, we don't have much time. Let's—"
51170-237 = "Run! Save yourself!"
51170-242 = "What's happening?"
51170-253 = "M-Mimori? Tsubaki! What ARE those?"
51170-254 = "!!"
51170-256 = "No idea. But I can say quite confidently they're not here to enjoy the festival."
51170-266 = "What the...?! Everyone, don't let your guard down! Not even for a moment!"
51170-267 = "Prepare yourselves!"
51170-278 = "Wh-Wh-What's happening?!"
51170-284 = "Whoa!"
51170-297 = "Be careful, President!"
51170-298 = "P-P-President!!!"
51170-300 = "I'm okay! Nice save, you two. "
51170-301 = "More importantly, the festival is ruined..."
51170-302 = "Actually, most importantly, where did these monsters even come from?!"
51170-304 = "President... This reminds me of the day the sky turned red..."
51170-305 = "Wh-What?! Do...do you think it's something similar?"
51170-306 = "What do we do...?"
51170-308 = "Don't look at me! This is way beyond a ninja's knowledge!"
51170-309 = "There's no end to them! We're going to be surrounded in no time."
51170-314 = "(Do I make a tactical escape?)"
51170-315 = "(But there are so many festival-goers who haven't escaped.)"
51170-316 = "(And I can't just leave Tsukuyo and Izuna behind! I'm their president!)"
51170-324 = "Waaah?"
51170-325 = "E-Eek!"
51170-332 = "President! Tsukuyo! Have no fear!"
51170-335 = "I-Izuna?"
51170-336 = "Izuna...?"
51170-338 = "After all, our lord is here at Hyakkiyako."
51170-339 = "And our lord has commissioned us, the Ninjutsu Research Club, with an important mission."
51170-345 = "I won't give up until I've finished the job, nin nin!"
51170-346 = "Now those are the words of a ninja! Let's do this, Izuna. "
51170-347 = "Whenever something beyond our understanding happens, Sensei always puts things right!"
51170-352 = "So let's put our faith in them, and the Ninjutsu Research Club will focus on helping the students to safety to buy Sensei more time!"
51170-354 = "Understood! As ninjas should!"
51170-355 = "We're on our way, my lord!"
51170-365 = "Vice President Kaho! We're receiving reports of unidentified creatures causing chaos at the Lantern Festival."
51170-366 = "It seems to be concentrated in the West District! The injuries keep increasing!"
51170-367 = "Vice President! The Merchants Guild is now reporting the same sightings!"
51170-369 = "What do we do?! Vice President Kaho!"
51170-371 = "The first thing for everyone to do is to calm down! Immediately!"
51170-372 = "How did this..."
51170-373 = "What matters now is gathering intel and organizing this chaos. Niya! "
51170-379 = "You're telling me as soon as the festival started weird monsters started attacking everyone?"
51170-380 = "Taking all of the context into consideration..."
51170-382 = "Nature's Beauty."
51170-387 = "Here I thought that letter was some silly threat to riot or stage a coup."
51170-392 = "I dismissed Schale's assistance. Why bother them over some frivolous rumor?"
51170-393 = "It seems I've played right into their hands."
51170-395 = "How was I supposed to know, anyway? Nature's Beauty is supposed to be a long-forgotten urban legend."
51170-396 = "I can't predict every single possible future, you know!"
51170-397 = "What was it? What did I miss? Nothing happens by coincidence, and there's no such thing as accidents..."
51170-399 = "Niya."
51170-401 = "...Was it Kuzunoha? Is that where this all started?"
51170-402 = "Niya..."
51170-403 = "Was I too complacent with the Hyakkaryouran? Sure, Ayame's disappearance piqued my interest, but I figured the Hyakkaryouran will do as the Hyakkaryouran does..."
51170-404 = "If I had dug into them deeper, could I have prevented this? "
51170-405 = "Niya...!"
51170-406 = "I need to think. There must've been something right under my nose... Sometimes too many clouds can make us miss even the moon..."
51170-411 = "NIYA—"
51170-422 = "I bonk you. Bad President Niya."
51170-430 = "Ch-Chise? What the...?!"
51170-431 = "Chise?!"
51170-436 = "..."
51170-437 = "!!"
51170-438 = "Don't succumb to fear."
51170-439 = "Avert your eyes, you cannot."
51170-440 = "Steel your heart's resolve."
51170-441 = "President Niya. Everyone is scared and confused."
51170-442 = "They need you."
51170-447 = "Chise..."
51170-448 = "...Ah."
51170-449 = "Aah..."
51170-450 = "..."
51170-455 = "Nyahaha. My little Chise's grown wise."
51170-456 = "It looks like it's time for me to get my hands dirty."
51170-457 = "Kaho. Get in contact with the Festival Department and find out what's happening on the ground."
51170-459 = "Yes, ma'am."
51170-466 = "I can't get through. Our communications are being jammed..."
51170-467 = "Jammed? I'm not surprised, but...tsk."
51170-468 = "They're leaving me no choice, aren't they? Looks like I'm entering the fray."
51170-469 = "While I do that, Kaho, you're in charge. The Merchants Guild is close by. They'll lend a hand."
51170-470 = "In a fight like this, information is our strongest weapon. Organize a timeline of events, and we can form a response team from there. Whatever happens, Kaho, think with the facts and be decisive."
51170-471 = "Don't worry. If anything goes wrong, you can blame me."
51170-473 = "Understood. I won't let you down."
51170-474 = "You've heard President Niya's orders. The Yin-Yang Club will mobilize with its full force!"
51170-476 = "From this moment on, speed and efficiency are of the essence. I believe in each and every one of you."
51170-477 = "Yes, ma'am!"
51170-479 = "Next Episode;Rumors of the Streets 2"

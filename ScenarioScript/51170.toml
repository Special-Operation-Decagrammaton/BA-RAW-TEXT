[translation]
51170-1 = "第17話;漫步街道的怪談（１）"
51170-2 = "燈籠祭會場．廣場"
51170-4 = "這裡準備完成了！"
51170-12 = "現在輪到巫女登場──！"
51170-20 = "啊啊！果然如我所料！#n非常適合您唷，小姐！"
51170-22 = "有沒有哪裡不舒服？#n需要什麼東西嗎……"
51170-24 = "不必擔心。我已經很習慣這種穿著了。"
51170-25 = "呵呵！是啊！沒錯！#n這就是勘解由小路該有的面貌！我們殷切期盼的樣子！"
51170-26 = "小姐能離開百花繚亂回來這裡，實在是萬幸啊……！"
51170-27 = "太好了！這樣就不必再擔心，一切都會回歸正軌了！"
51170-32 = "咳哼……紫同學。"
51170-33 = "如你所知，這次慶典的高潮是在氣氛活躍起來時，#n在特別準備的舞台上由「勘解由小路的巫女」舞動慶典儀式之舞。"
51170-34 = "設備也已經準備就緒，紫同學的舞姿將會透過電視和網路向整個百鬼夜行轉播……"
51170-35 = "那支舞所代表的意義是送舊迎新……"
51170-37 = "沒錯！它所帶有的意義是望向更好的明天、更美好的未來……！"
51170-38 = "可惜聽說20年前就被廢止了。#n沒想到會有機會能再次一睹風采！"
51170-39 = "菲娜我也非常期待！"
51170-44 = "順序都整理在這裡了……"
51170-45 = "呵呵，這點不必擔心。#n因為小姐從小就一直認真學習和儀式有關的「舞」。"
51170-46 = "……是嗎？"
51170-48 = "是啊，那本來就是小女子應盡的義務。"
51170-49 = "儀式的順序我全都記得，所以不必擔心。"
51170-50 = "那確實令人相當感激，不過……"
51170-51 = "真的沒問題嗎……？"
51170-52 = "嗯。"
51170-53 = "小女子……"
51170-54 = "小女子沒問題的。"
51170-55 = "我知道了。"
51170-56 = "好，那麼就前往舞台吧！"
51170-61 = "是……這樣就行了。"
51170-66 = "全部。"
51170-72 = "事情就是這樣。"
51170-73 = "居然真的和紫……進行了繼承戰…… "
51170-74 = "而且對象還不是別人而是你，剛才聽到的時候我還有點不可置信咧。#n不過……"
51170-75 = "……特地把這件事告訴我的理由是什麼？"
51170-76 = "…………"
51170-77 = "那孩子在來到調停室之前先和你見過面了吧。"
51170-78 = "所以我覺得在道義上，應該把結果告訴你。"
51170-79 = "紫……都已經說到這種程度了居然還不放棄…… "
51170-80 = "……呿！那又怎樣。#n我已經警告過了，就算回去也沒有意義。"
51170-81 = "所以已經夠了，桔梗。"
51170-82 = "…………夠了？"
51170-83 = "看你一副還留有遺憾的樣子……已經不必再聯絡我了。"
51170-84 = "我不需要你的關心。#n因為……我決定去尋找我的青春。"
51170-85 = "現在的我，對已經結束的百花繚亂沒有興趣。"
51170-91 = "…………………………………………是嗎。"
51170-92 = "也對，你之前說過是為了追尋青春而離開。"
51170-93 = "……知道了。你說的對，我也和你有同樣的想法。這個話題就到此結束吧。#n蓮華，既然你已經下定決心，之後就隨你高興吧。"
51170-94 = "看在我們是朋友的份上，祝你以後能吃香喝辣過好日子。"
51170-95 = "至於要好到什麼程度……嗯，胖個10kg左右比較好吧。"
51170-96 = "啥！？等等，你什麼意思……！"
51170-100 = "可惡，又把自己的話說完就跑了！桔梗這傢伙！"
51170-101 = "唔唔……！"
51170-102 = "你自己去吃香喝辣啦！"
51170-103 = "唉……真是……"
51170-104 = "明明一切都結束了，為什麼還……"
51170-106 = "哇啊！？"
51170-107 = "發生什麼事了嗎！？蓮華前輩！"
51170-108 = "蓮華醬？"
51170-109 = "呼啊……？"
51170-114 = "不……沒什麼。"
51170-115 = "只是一點私事……而且都已經過去了。"
51170-116 = "是百花繚亂的事對吧？"
51170-117 = "這個嘛…… "
51170-118 = "不，現在都已經無所謂了！#n百花繚亂的事……我再也不管了！"
51170-119 = "這可是難得的慶典哦？#n身為修行部的成員，忙著享受都來不及了……我才沒有閒工夫瞎操心呢。"
51170-120 = "因為……盡情享受慶典也是修行的一環！#n青春可是不等人的，現在就向夜晚奔去吧，少女！"
51170-121 = "對吧？椿部長、三森副部長、楓。"
51170-127 = "蓮華醬很不擅長說謊呢。"
51170-129 = "嗯……？"
51170-132 = "再也不管百花繚亂？#n這不是你的真心話吧？"
51170-133 = "沒錯！蓮華前輩來到這裡之後也一直在說百花繚亂的事，顯然還有所留戀！"
51170-135 = "我，我才沒有……！#n不是你說的那樣……"
51170-136 = "如果真的不在意的話……剛才講完電話後根本不必生氣吧？"
51170-141 = "椿醬說的沒錯。#n蓮華醬，你不想就這樣結束一切吧？"
51170-142 = "呵呵，你可能很想否認，但三森前輩可是百鬼夜行最強的讀心術師哦！#n蓮華前輩的內心已經全都被看穿了！"
51170-143 = "在他面前說謊是沒用的！蓮華前輩！"
51170-144 = "啊，楓醬，沒有那種事啦～！"
51170-150 = "……為什麼所有人都要說那種話呢。"
51170-151 = "事情……都已經結束了。"
51170-152 = "不管再怎麼高喊，名草前輩和大家……不希望離開的人都不會回來了。"
51170-153 = "與其這樣……不如讓一切都劃下句點。"
51170-154 = "我明明只是拋開了一切……來找尋青春而已。#n可是……為什麼……"
51170-155 = "就算事實如此……蓮華你還是對紫很溫柔呢。"
51170-156 = "我……對紫很溫柔……？怎麼可能。"
51170-157 = "當時的我盡說些讓紫受傷的話……"
51170-158 = "只會讓等待的人感到痛苦的社團沒有也罷──蓮華你曾經這麼說過。"
51170-159 = "當時蓮華說的話，其實全都是為了紫著想……#n出於不希望後輩受傷的心意……我想大家應該都很清楚。"
51170-160 = "蓮華醬之前說過和桔梗醬是青梅竹馬對吧。"
51170-161 = "…………"
51170-162 = "偶爾就會遇到這種情況。#n出於擔心而說出口是心非的話。"
51170-163 = "或者因為太過擔心，一氣之下說出會讓自己後悔的話……"
51170-164 = "我也曾遇過類似的事，所以非常清楚。"
51170-166 = "三森前輩也是！？真的嗎！？"
51170-167 = "呵呵，沒錯唷，楓醬。"
51170-168 = "我和椿醬也是青梅竹馬……我們之間發生過很多事呢。"
51170-169 = "對吧？椿醬。"
51170-171 = "…………真的生起氣來的三森可是很可怕的哦……"
51170-173 = "哦哦！好像可以想像！"
51170-174 = "咦，咦咦！？"
51170-175 = "你們兩個真是的……"
51170-179 = "所以，蓮華醬。"
51170-184 = "我都已經……"
51170-185 = "離開百花繚亂……到修行部體驗入部了……#n事到如今……"
51170-186 = "不過蓮華還有真心話……想傳達給重視的人們對吧？"
51170-187 = "事到如今……還來得及嗎……#n他們不會覺得我很厚臉皮……？"
51170-188 = "我認為最重要的是「心意」哦，蓮華醬。"
51170-189 = "三森副部長……"
51170-195 = "……蓮華的體驗入部到此結束。這是部長命令。"
51170-197 = "咦！？"
51170-199 = "去做你想做的事吧。"
51170-200 = "我們也會幫忙的。"
51170-201 = "看在我們都曾是修行部的份上！對吧！？"
51170-203 = "椿、三森、楓……"
51170-209 = "……嗯。我確實有想做的事。"
51170-211 = "剛才我聽桔梗說了。"
51170-212 = "他可能對紫說了有點過分的話。"
51170-213 = "所以……有點擔心。希望我能去見見紫。"
51170-215 = "……叫別人去做自己該做的事，這點確實很像他的作風。"
51170-216 = "我想去找紫談談。"
51170-219 = "好，那現在就一起去找他吧。"
51170-220 = "好！大家一起出動吧！"
51170-222 = "大家，謝謝你們。"
51170-230 = "啊，是煙火！"
51170-231 = "看來燈籠祭正式開始了呢。"
51170-232 = "我們也趕緊……"
51170-237 = "哇啊啊啊！快，快逃！"
51170-242 = "發生什麼事了嗎？"
51170-253 = "……咦咦咦！？#n椿前輩！三森前輩！那，那個是什麼！？"
51170-254 = "！！"
51170-256 = "……我也不清楚，但感覺好像不能當朋友呢。"
51170-266 = "唔……！大家小心！"
51170-267 = "過來了！"
51170-278 = "這這，這是什麼情況啊！？"
51170-284 = "嗚，嗚喵啊啊！？"
51170-297 = "部長！您沒事吧！？"
51170-298 = "部長～！"
51170-300 = "啊，嗯！我沒事……！"
51170-301 = "不過慶典會場已經亂成一團……！"
51170-302 = "這些怪物到底是從哪裡冒出來的！？"
51170-304 = "部長，這……感覺和上次天空變紅的時候一樣………"
51170-305 = "什，什麼！？#n跟那時候……一樣嗎！？"
51170-306 = "部，部長！伊樹菜醬！#n現，現在該怎麼辦！？"
51170-308 = "我我我也不知道！"
51170-309 = "怪物從四面八方冒出來……！該怎麼辦才好……！"
51170-314 = "（該，該逃走嗎！？）"
51170-315 = "（可是慶典會場人數眾多，相當危險……）"
51170-316 = "（更何況我身為部長，不能讓伊樹菜和月夜有危險……！）"
51170-324 = "哇啊啊！？"
51170-325 = "部長！！"
51170-332 = "不必擔心！部長！月夜閣下！"
51170-335 = "伊，伊樹菜？"
51170-336 = "伊樹菜醬……？"
51170-338 = "因為主公正好在百鬼夜行這裡！"
51170-339 = "而且還請我們忍術研究部幫忙！"
51170-345 = "所以伊樹菜會回應主公的要求，全力以赴！"
51170-346 = "……嗯！伊樹菜說的對！先幫幫這裡的人吧！"
51170-347 = "發生這種事……老師大人一定會想辦法的！"
51170-352 = "在那之前，我們忍術研究部──百鬼夜行的特務會守護大家！"
51170-354 = "是，是！我知道了！"
51170-355 = "那麼！作戰開始！忍忍！"
51170-365 = "佳穗副部長！會場外圍出現來歷不明的東西……已經引發騷動！"
51170-366 = "有消息指出發生在西區的混亂導致傷患不斷出現！"
51170-367 = "佳穗副部長！商會發出了出現來歷不明怪物的通報……！"
51170-369 = "佳穗副部長……！該怎麼做……！"
51170-371 = "請各位冷靜！先冷靜一下……！"
51170-372 = "這……究竟……"
51170-373 = "慶典會場出現了來歷不明的「怪物」……該怎麼辦才好，仁耶大人！"
51170-379 = "在慶典開始的同時發動未知的襲擊……能預見當前事態的線索……"
51170-380 = "只有一個。"
51170-382 = "……花鳥風月部。"
51170-387 = "……我判斷那封信單純只是預告百鬼夜行將會發生動亂的威脅。"
51170-392 = "所以才斷定把夏萊捲入瑣碎「傳聞」而虧欠人情是下下策。"
51170-393 = "從一開始就是我判斷錯誤嗎……？"
51170-395 = "況且花鳥風月部只不過是存在於記錄、流言與傳聞中的怪談。"
51170-396 = "……我當初應該要假設他們真實存在嗎？"
51170-397 = "我究竟疏忽了什麼？#n有其他我沒想到的要素……或者沒注意到的線索嗎？"
51170-399 = "仁耶大人。"
51170-401 = "……從現身的時機來看，他們會不會和葛葉有關？#n還是說……"
51170-402 = "仁耶大人……"
51170-403 = "有關係的是百花繚亂……？#n雖然委員長消失的事有點可疑……是他們故意隱藏情報嗎？"
51170-404 = "為了防範威脅，應該追查他們才對嗎？"
51170-405 = "仁耶大人……！"
51170-406 = "必須查出沒能獲得的情報……未能掌握的蛛絲馬跡……#n以及犯下致命錯誤的是什麼地方──"
51170-411 = "仁耶──"
51170-422 = "仁耶部長。#n噠，要彈額頭。"
51170-430 = "呃！？知，知世……！？"
51170-431 = "知世醬！？"
51170-436 = "………………"
51170-437 = "！！"
51170-438 = "就算再害怕"
51170-439 = "也不該視而不見"
51170-440 = "抬頭面對吧"
51170-441 = "仁耶部長，什麼都不做是不行的。"
51170-442 = "你看，大家都很害怕。"
51170-447 = "知世……"
51170-448 = "……啊。"
51170-449 = "啊啊……"
51170-450 = "…………"
51170-455 = "喵哈哈，知世說的對。"
51170-456 = "要是陰陽部部長窩在這裡，就無法成為大家的榜樣了呢～"
51170-457 = "佳穗，聯絡節慶營運管理部，告知現在的情況吧。"
51170-459 = "是，是！"
51170-466 = "啊，現在無法進行通訊。#n似乎受到了某些妨礙……"
51170-467 = "是嗎？畢竟是這種規模的騷亂，這也是有可能的～"
51170-468 = "嗯，沒辦法了。我直接走一趟吧。"
51170-469 = "佳穗，能麻煩你向之前協助過慶典進行的商會打聽情報嗎～？"
51170-470 = "現在的首要之務是整理情況，建立能進行全盤考量的基礎。#n麻煩你依照時間和地點彙整情報。"
51170-471 = "至於失誤的清算，之後再做也不遲。"
51170-473 = "……是！我知道了！請交給我吧！"
51170-474 = "各位都聽清楚了吧！#n從現在起，我們陰陽部要照仁耶大人的指示行動！"
51170-476 = "這是和時間的賽跑！#n全力以赴吧，拜託各位了！"
51170-477 = "是！！"
51170-479 = "下一話;漫步街道的怪談（２）"

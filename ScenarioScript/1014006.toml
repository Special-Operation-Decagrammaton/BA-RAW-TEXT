[translation]
1014006-1 = "#title;단장하는 여우"
1014006-2 = "#wait;1500"
1014006-3 = "#all;hide"
1014006-4 = "#place;FOX 소대 HQ"
1014006-5 = "[ns] \"다들 자리에 있어?\""
1014006-6 = "3;쿠루미;02;어라, [USERNAME] 선생님?\n#3;a\n#3;em;[반응]"
1014006-7 = "3;쿠루미;01;오늘 예정된 작전은 없었을 텐데…… HQ에는 무슨 일이야?"
1014006-8 = "[ns] \"지난 번에 해수 구제를 도왔던 농가에서 선물이 와서.\""
1014006-9 = "#st;[0,0];instant;1;"
1014006-10 = "#clearST"
1014006-11 = "#wait;1300"
1014006-12 = "[ns1] \"감자를 혼자 먹기는 부담스러울 정도로 받았는데……\"\n[ns2] \"필요하면 좀 나눠줄까 해서.\""
1014006-13 = "#wait;10"
1014006-14 = "#wait;10"
1014006-15 = "3;쿠루미;03;오, 고마워! 감자야 언제나 쓸모가 많지.\n#3;em;[!]"
1014006-16 = "3;쿠루미;08;구워먹고, 삶아먹고, 튀겨먹고…… 무슨 요리를 하더라도 꼭 필요한 게 감자니까."
1014006-17 = "3;쿠루미;07;다른 소대원들 하고 맛있게 나눠 먹을게.\n#3;em;[음표]"
1014006-18 = "[s] \"그나저나 오늘은 혼자 있는 거야?\""
1014006-19 = "3;쿠루미;02;응. 다들 개인적인 일 때문에 자리를 비웠거든."
1014006-20 = "3;쿠루미;01;혹시 다른 전할 말이라도 있었던 거야?"
1014006-21 = "[s3] \"그건 아니지만.\"\n[s4] \"쿠루미와 단 둘이라니, 조금 긴장돼서.\""
1014006-22 = "#st;[0,0];instant;1;"
1014006-23 = "#clearST"
1014006-24 = "#wait;1000"
1014006-25 = "3;쿠루미;09;……그게 무슨 징그러운 소리야? 새삼스럽게."
1014006-26 = "[ns] \"그나저나 쿠루미는 뭘 하고 있었어?\""
1014006-27 = "3;쿠루미;02;응? 보다시피, 방패를 손질하고 있었어."
1014006-28 = "3;쿠루미;01;최근에 작전을 여러번 나가다 보니까 흠집이 생기고, 페인트가 벗겨진 곳이 눈에 띄게 늘어나서……\n#3;em;[...]"
1014006-29 = "3;쿠루미;01;연마제로 흠집을 제거하고, 색도 새로 칠하려고."
1014006-30 = "[s] \"그렇구나. 고생이 많네.\""
1014006-31 = "#st;[0,0];instant;1;"
1014006-32 = "#clearST"
1014006-33 = "#wait;1000"
1014006-34 = "[ns5] \"그나저나 매번 이렇게 방패를 손질하는 거야?\"\n[ns6] \"방패의 특성상 흠집이 나기 쉬울텐데……\""
1014006-35 = "#wait;10"
1014006-36 = "#wait;10"
1014006-37 = "3;쿠루미;02\n#3;em;[?]\n#wait;1300"
1014006-38 = "3;쿠루미;03;아, 무슨 뜻인지 알겠어. 굳이 이렇게 매번 칠할 필요는 없다는 거지?"
1014006-39 = "3;쿠루미;01;확실히 방패는 총알을 막기 위해 만들어진 물건이고, 긁히고 부숴지는 게 역할인지라 늘 깨끗하게 정비할 필요는 없지만……"
1014006-40 = "3;쿠루미;02;그래도 나는 늘 작전에 나가기에 앞서 방패를 깨끗이 닦아두곤 해.\n#3;em;[반응]"
1014006-41 = "3;쿠루미;07;작전을 할 때 상대가 가장 먼저 보게 되는 건, 보통 포인트맨이 들고 있는 이 방패잖아?"
1014006-42 = "3;쿠루미;08;어찌보면 이 방패가 소대의 첫 인상이라고 할 수 있는 만큼, 언제나 깨끗한 상태로 작전에 임하고 싶었어."
1014006-43 = "3;쿠루미;02;물론 실제 전투에 들어가면 방패든, 상대의 얼굴이든 눈에 들어오지 않을 때가 많지만."
1014006-44 = "3;쿠루미;11;……역시 이런 건 자기만족에 불과하려나.\n#3;em;[한숨]"
1014006-45 = "[s7] \"그래도 난 멋진 마음가짐이라고 생각해.\"\n[s8] \"그런 마음가짐이 FOX 소대를 더 강하게 만드는 거겠지.\""
1014006-46 = "#wait;10"
1014006-47 = "#wait;10"
1014006-48 = "3;쿠루미;07;그, 그렇지? 선생님이라면 알아줄 거라고 생각했어!\n#3;em;[반짝]"
1014006-49 = "3;쿠루미;08;내가 납득할 수 없는 상태로는 상대 앞에 자신 있게 나설 수 없거든. 설령 그게 적이라 할지라도!"
1014006-50 = "3;쿠루미;08;그래서 가끔은 마음에 드는 스티커도 방패에 붙여서 이렇게 내보이고 있어."
1014006-51 = "3;쿠루미;03;이것 봐. 이건 저번에 잡지에서 부록으로 받은 스티커인데, 귀엽지?\n#3;greeting"
1014006-52 = "[s] \"오, 귀여운데?\""
1014006-53 = "#st;[0,0];instant;1;"
1014006-54 = "#clearST"
1014006-55 = "#wait;1000"
1014006-56 = "[ns] \"생각해보니, 나도 저번에 경품으로 받은 스티커가 있어.\""
1014006-57 = "3;쿠루미;02;이건 귀여운 고양이가 인쇄된 스티커잖아?"
1014006-58 = "3;쿠루미;11;귀여워라……\n#3;em;[///]"
1014006-59 = "[s] \"자, 이것도 괜찮다면 방패에 붙이는 게—\""
1014006-60 = "3;쿠루미;04;이걸 방패에 붙일 리가 없잖아!\n#3;jump"
1014006-61 = "3;쿠루미;05;이렇게 귀여운 고양이 사진을 총알이 쏟아지는 방패 앞에 붙이라니, 선생님에게는 사람의 마음이 없는 거야?\n#3;hophop\n#3;em;[스팀]"
1014006-62 = "3;쿠루미;05;방패에 이런 걸 붙여두고 있으면 다들 FOX 소대는 피도 눈물도 없는 귀신 집단이라고 생각할 게 분명하다고!"
1014006-63 = "[s9] \"미안, 거기까지는 생각이 닿지 못했어.\"\n[s10] \"그럼 스티커는 다시—\""
1014006-64 = "#wait;10"
1014006-65 = "#wait;10"
1014006-66 = "#st;[0,0];instant;1;"
1014006-67 = "#clearST"
1014006-68 = "3;쿠루미;01\n#3;m4\n#3;jump\n#wait;1000"
1014006-69 = "3;쿠루미;00;……싫어."
1014006-70 = "3;쿠루미;99;이건 선생님이 준 거니까, 안 돌려줄 거야."
1014006-71 = "3;쿠루미;12;방패에 붙이지 않는다 하더라도 붙일 곳은 많으니까. 일기장이라든지, 군용 수첩이라든지……\n#3;em;[...]"
1014006-72 = "[s] \"쿠루미. 혹시……\""
1014006-73 = "3;쿠루미;09;서, 선생님이 준 물건이라서 그렇게 소중히 여기는 건 아니거든?\n#3;em;[///]\n#3;shake"
1014006-74 = "3;쿠루미;09;이건 그저…… 고, 고양이가 귀여운 탓이니까!"
1014006-75 = "3;쿠루미;09;차, 착각하지 말라고! 이 바보!\n#3;hophop"
1014006-76 = "#all;hide"
1014006-77 = "#na;(이후, 쿠루미의 매도를 들으며 즐거운 정비 시간을 가졌다.)"

[translation]
1003902-1 = "RABBIT 4, Hide"
1003902-4 = "Large Shopping District Near the Hub"
1003902-5 = "On the day I had plans with Miyu..."
1003902-9 = "Miyu was being pushed around in the crowd in front of the shopping district."
1003902-14 = "...Huh? Oh, excuse me."
1003902-15 = "I-It's okay, my fault..."
1003902-21 = "...Sorry."
1003902-22 = "How strange, I didn't even see you there."
1003902-23 = "I-It's okay... Just k-keep going..."
1003902-27 = "Oh... Sensei..."
1003902-28 = "Y-You came. I've been w-waiting."
1003902-29 = "[s1] \"...Are you okay?\"\n[s2] \"You were being pushed around a lot.\""
1003902-30 = "It's okay. It happens at b-busy places."
1003902-31 = "It's okay. It happens at b-busy places."
1003902-32 = "Since I was born, I've never had a presence..."
1003902-33 = "So people r-run into me a lot."
1003902-34 = "It makes me good at hiding... I got a p-perfect in the SRT sniper t-test...."
1003902-35 = "But the t-teacher forgot about me...and left. I s-stayed in the training grounds all night."
1003902-36 = "I-It got dark and started raining too."
1003902-37 = "But no one told me to leave, so..."
1003902-38 = "I-I'm so insignificant, SRT Academy doesn't even remember me..."
1003902-39 = "Th-The same thing will happen with everyone. I'll be f-forgotten...like a pebble on the street..."
1003902-40 = "I'll b-be all alone..."
1003902-41 = "[s3] \"I'll always look for you when you're gone.\"\n[s4] \"I could never forget about your existence, Miyu.\""
1003902-42 = "S-Sensei always finds me..."
1003902-43 = "S-Sensei always finds me..."
1003902-44 = "You make th-things better..."
1003902-45 = "S-Since you're here, m-maybe they'll even see me today."
1003902-46 = "[s] \"How could anyone not see you if you're right there?\""
1003902-47 = "Haha...ha... I h-hope you're right..."
1003902-48 = "L-Let's get some camping supplies?"
1003902-50 = "Miyu's worries turned into reality very quickly..."
1003902-52 = "How can I help you? If you're going to camp alone, I recommend the solo camping supplies over here..."
1003902-53 = "Th-There are two of us... Sensei and I..."
1003902-54 = "Eek! Have you been there the whole time?"
1003902-62 = "After that, she kept getting pushed around by the crowd..."
1003902-63 = "S-Sorry! I didn't know you were there!"
1003902-64 = "I-It's okay... I'm n-not very visible..."
1003902-66 = "...Even a machine didn't acknowledge her existence."
1003902-70 = "<Automatic door. Stand in front of the platform.>"
1003902-71 = "..."
1003902-72 = "Even the door d-doesn't see m-me."
1003902-75 = "[ns] \"...That's a rough life you lead.\""
1003902-76 = "Th-This always happens."
1003902-77 = "I'm a g-ghost. Unneeded and a-abandoned."
1003902-78 = "...I have zero presence. I'm u-u-useless."
1003902-79 = "[s] \"Maybe that can be your gift?\""
1003902-80 = "H-How can it be a good thing?"
1003902-81 = "It's really only useful on s-sniper missions..."
1003902-82 = "I don't want that..."
1003902-86 = "Oh. A cat."
1003902-87 = "So cute... It looks soft."
1003902-88 = "[s] \"Wait, that cat can be pretty vicious.\""
1003902-89 = "Really?"
1003902-90 = "But it looks nice to me."
1003902-91 = "Come here, kitty..."
1003902-95 = "Heehee, you're cute."
1003902-96 = "[s5] \"I can't believe you're petting it.\"\n[s6] \"I'm jealous! I want to pet it too!\""
1003902-97 = "You know... I g-guess, animals aren't ever scared of me..."
1003902-98 = "You know... I g-guess, animals aren't ever scared of me..."
1003902-99 = "Is it b-because I have no presence?"
1003902-100 = "Th-That's not the worst talent."
1003902-101 = "I'm happy I get to pet the cat, at least."
1003902-103 = "Afterward, Miyu and I had a fun time playing with the cat for a long time."

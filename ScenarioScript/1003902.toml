[translation]
1003902-1 = "RABBIT 4 ซ่อนตัวเรียบร้อยค่ะ"
1003902-4 = "ด้านหน้าห้างสรรพสินค้าขนาดใหญ่ เขตกลาง"
1003902-5 = "(วันที่นัดกับมิยุไว้...)"
1003902-9 = "(คุณครูมาถึงที่ด้านหน้าห้างสรรพสินค้า มิยุถูกคนอื่นๆ ที่เดินผ่านไปมาชนเข้าตลอด...) "
1003902-14 = "เอ๋...? ขอโทษจริงๆ"
1003902-15 = "มะ... ไม่เป็นไรค่ะ ฉันผิดเองค่ะ..."
1003902-21 = "ขะ...ขอโทษ!"
1003902-22 = "แปลกจังเลยนะ ไม่เห็นว่าเธอยืนอยู่ตรงนั้นเลย"
1003902-23 = "มะ...ไม่เป็นไรค่ะ เชิญไปต่อเถอะค่ะ"
1003902-27 = "อ๊ะ คุณครู..."
1003902-28 = "ชะ...เชิญค่ะ ฉันกำลังรอคุณครูอยู่เลยค่ะ"
1003902-29 = "[s1] \"ไม่เป็นไรใช่มั้ย...?\"\n[s2] \"มีคนเดินผ่านไปมาชนเยอะเลยนะ\""
1003902-30 = "มะ...ไม่เป็นไรค่ะ เป็นแบบนี้บ่อยๆ เวลาที่ไปในที่ที่คนเยอะๆ ค่ะ..."
1003902-31 = "มะ...ไม่เป็นไรค่ะ เป็นแบบนี้บ่อยๆ เวลาที่ไปในที่ที่คนเยอะๆ ค่ะ..."
1003902-32 = "ฉันเป็นมนุษย์จืดจางมาตั้งแต่เด็กๆ แล้วค่ะ..."
1003902-33 = "เพราะงั้นพวกคนที่เดินผ่านไปมาจึงมักจะไม่ได้สังเกตเห็นฉันและชอบเดินชนอยู่บ่อยๆ ค่ะ..."
1003902-34 = "แต่เพราะเป็นแบบนี้ การซ่อนตัวจึงเป็นความสามารถพิเศษของฉัน... ตอนอยู่ที่สถาบันเลยทดสอบ#nการซุ่มยิงได้คะแนนเต็มตลอดเลยค่ะ..."
1003902-35 = "แต่ก็มีตอนที่ครูฝึกลืมว่าฉันยังอยู่ที่สนามฝึกซ้อม... แล้วทิ้งฉันไว้ที่นั่นทั้งคืนก็มีนะคะ"
1003902-36 = "ตอนนั้นท้องฟ้ามืดๆ แถมฝนก็ตกอีกด้วย..."
1003902-37 = "แต่ไม่มีใครออกคำสั่งให้ฉันกลับได้..."
1003902-38 = "คงเพราะฉันเป็นนักเรียนที่ไร้ความสามารถและไม่น่าจดจำสำหรับสถาบัน SRT สินะคะ..."
1003902-39 = "เหมือนกับพวกก้อนกรวดข้างถนนที่ค่อยๆ ถูกลืมเลือนไปทีละนิดๆ จนกลายเป็นตัวตนที่ไม่มีใครจด#nจำได้..."
1003902-40 = "สุดท้ายก็จะถูกลืมเลือนและถูกทอดทิ้ง..."
1003902-41 = "[s3] \"ไม่เป็นไรนะ ครูสัญญาว่าจะไม่ลืมมิยุ\"\n[s4] \"ครูไม่มีวันลืมตัวตนของมิยุหรอกนะ...\""
1003902-42 = "นะ...นั่นสินะคะ เพราะคุณครูมักจะหาที่อยู่ของฉันเจอแล้วก็มาหาก่อนเสมอๆ เลย"
1003902-43 = "นะ...นั่นสินะคะ เพราะคุณครูมักจะหาที่อยู่ของฉันเจอแล้วก็มาหาก่อนเสมอๆ เลย"
1003902-44 = "ฉันรู้สึกปลอดภัยขึ้นนิดหน่อย เวลาที่อยู่กับคุณครูค่ะ..."
1003902-45 = "แถมวันนี้คุณครูก็ยังอยู่ด้วย คงเป็นไปไม่ได้ที่พวกพนักงานร้านจะไม่สังเกตเห็นฉัน..."
1003902-46 = "[s] \"ต่อให้จืดจางแค่ไหนก็คงไม่เกิดเรื่องแบบนั้นหรอกมั้ง?\""
1003902-47 = "อะฮ่าฮ่าฮ่า ถ้าวันนี้ไม่เกิดเรื่องแบบนั้นก็คงดีนะคะ..."
1003902-48 = "ถะ...ถ้างั้นไปที่ร้านขายอุปกรณ์ตั้งแคมป์กันเลยมั้ยคะ....?"
1003902-50 = "(แต่ว่าหลังจากนั้น สิ่งที่มิยุกังวลก็เกิดขึ้น...)"
1003902-52 = "ให้ช่วยอะไรมั้ยครับ? ลูกค้ามาคนเดียวแบบนี้ ผมอยากขอแนะนำ \"อุปกรณ์ตั้งแคมป์คนเดียว\"..."
1003902-53 = "ฉะ...ฉันเองก็มากับคุณครูนะคะ"
1003902-54 = "อะ... เอ๋? จู่ๆ ก็มีลูกค้าอีกคนด้วย...?!"
1003902-62 = "(และหลังจากนั้น มิยุก็ถูกคนที่เดินผ่านไปมาชนเข้าอย่างไม่หยุดหย่อน...)"
1003902-63 = "ทะ...โทษทีนะ! ฉันไม่เห็นจริงๆ ว่ามีคนยืนอยู่ตรงนั้น!"
1003902-64 = "มะ...ไม่เป็นไรค่ะ ฉันผิดเองที่เป็นมนุษย์จืดจางค่ะ..."
1003902-66 = "(แม้แต่เครื่องจักร อุปกรณ์ที่ทำงานไม่มีวันหยุดก็ปฏิเสธตัวตนของเธอ...)"
1003902-70 = "<ประตูจะเปิดอัตโนมัติเมื่อยืนบนแท่นวางด้านหน้า กรุณายืนให้ตรงบนแท่นวาง>"
1003902-71 = "..."
1003902-72 = "ตอนนี้แม้แต่ประตูอัตโนมัติก็เมินฉัน..."
1003902-75 = "[ns] \"เหนื่อยน่าดูเลยนะ...\""
1003902-76 = "เห็นมั้ยคะ...? ไม่ว่าเมื่อไรฉันก็เป็นแบบนี้ตลอดเลยค่ะ"
1003902-77 = "ไม่มีใครยอมรับในตัวฉัน และไม่มีใครต้องการ..."
1003902-78 = "เป็นตัวตนที่ไร้ประโยชน์จริงๆ เลยค่ะ"
1003902-79 = "[s] \"แต่ครูคิดว่าเป็นพรสวรรค์อย่างหนึ่งนะ\""
1003902-80 = "คะ...? ตัวตนจืดจางเกือบไร้ตัวตนแบบนี้เป็นพรสวรรค์อย่างหนึ่งเหรอคะ?"
1003902-81 = "ยกเว้นแค่ตอนทำภารกิจซุ่มยิง ฉันไม่ค่อยเจอเรื่องที่ตัวตนจืดจางแบบนี้มีประโยชน์สักเท่าไรเลยค่ะ..."
1003902-82 = "พรสวรรค์แบบนี้..."
1003902-86 = "เอ๋...? คุณเหมียวนี่นา..."
1003902-87 = "น่ารักจัง... ขนน่าจะนุ่มนิ่มดีนะคะ"
1003902-88 = "[s] \"เดี๋ยวก่อนนะ แมวตัวนั้น...\""
1003902-89 = "คะ...? คุณเหมียวตัวนี้ขึ้นชื่อว่าเป็นแมวที่ดุร้ายมากของย่านนี้เหรอคะ...?"
1003902-90 = "แต่ว่าดูไม่เห็นดุร้ายอะไรเลยนะคะ"
1003902-91 = "ดูเชื่องจะตาย มาทางนี้เร็ว~"
1003902-95 = "ฮิฮิ น่ารักจังเลย~"
1003902-96 = "[s5] \"ลูบหัวเจ้าแมวนั่นได้ด้วย...\"\n[s6] \"น่าอิจฉาจัง ครูก็อยากลูบหัวมันบ้าง!\""
1003902-97 = "พอมาลองคิดๆ ดูแล้ว... ฉันไม่เคยเห็นพวกสัตว์ป่าวิ่งหนี หรือทำท่าขู่ฉันเลยนะคะ"
1003902-98 = "พอมาลองคิดๆ ดูแล้ว... ฉันไม่เคยเห็นพวกสัตว์ป่าวิ่งหนี หรือทำท่าขู่ฉันเลยนะคะ"
1003902-99 = "คงเป็นเพราะความจืดจางของฉันละมั้งคะ..."
1003902-100 = "ถ้าเรื่องที่คุณครูบอกเป็นเรื่องจริง มันก็อาจเป็นพรสวรรค์อย่างหนึ่งก็ได้ค่ะ"
1003902-101 = "ถ้าไม่มีพรสวรรค์แบบนี้ ฉันก็คงจะไม่มีโอกาสได้เข้าใกล้น้องแมวน่ารักๆ แบบนี้แน่ค่ะ"
1003902-103 = "(จากนั้น คุณครูกับมิยุก็นั่งเล่นกับแมวจรจัด และใช้เวลาอย่างสนุกสนานด้วยกัน)"

[translation]
1003902-1 = "RABBIT4，要隱藏了"
1003902-4 = "中央區．大型商店街前"
1003902-5 = "（和美優約好的當天……）"
1003902-9 = "（一到約好的地方，就看到美優被路上的行人撞來撞去……）"
1003902-14 = "……哎呀，真是不好意思。有沒有受傷？"
1003902-15 = "沒，沒事的。對不起，是我不小心……"
1003902-21 = "……啊。"
1003902-22 = "抱歉，我應該有看路的啊。"
1003902-23 = "沒，沒關係……請別在意……"
1003902-27 = "啊……老師……"
1003902-28 = "你，你好。恭候多時了。"
1003902-29 = "[s1] 「……你還好嗎？」\n[s2] 「好像被很多人撞到了。」"
1003902-30 = "沒，沒事的。每次到人多的地方都會這樣……"
1003902-31 = "沒，沒事的。每次到人多的地方都會這樣……"
1003902-32 = "我從小的時候開始存在感就很薄弱……"
1003902-33 = "因為沒有被行人們注意到而被撞上已經是家常便飯了……"
1003902-34 = "不過，該說是多虧這點嗎，我很擅長潛伏……在SRT的狙擊考試也拿到了滿分……"
1003902-35 = "不過教官卻沒有發現我還留在訓練場，就這麼回去了……一整晚都被留在那裡……"
1003902-36 = "那個時候，太陽就這麼下了山，甚至開始下起雨來……"
1003902-37 = "可是卻沒有任何人注意到我，也不對我下達命令……"
1003902-38 = "果然我是個在SRT特殊學園中沒有容身之處的無能學生……"
1003902-39 = "會就這樣漸漸被人遺忘……像路邊的小石頭一樣，成為沒有人能認知到的存在……"
1003902-40 = "最後被悲慘地丟棄、遺忘……然後……"
1003902-41 = "[s3] 「別擔心，就算真的跟丟了，我也會立刻努力找你的。」\n[s4] 「而且至少我不會忘記美優的存在的。」"
1003902-42 = "老師總是能立刻找到我呢……"
1003902-43 = "老師總是能立刻找到我呢……"
1003902-44 = "老師待在一起的時候，我會比較安心。"
1003902-45 = "像這樣跟老師待在一起的話，店員應該就不會沒注意到我了吧……"
1003902-46 = "[s] 「店員……」"
1003902-47 = "嘛，我想只要實際去過就會知道了……"
1003902-48 = "那麼我們趕快走吧……？"
1003902-50 = "（可是在那之後也……）"
1003902-52 = "歡迎光臨，請問在找什麼呢？#n如果是現在流行的「單人露營用品」的話，就在這裡……"
1003902-53 = "啊，呃，那個……"
1003902-54 = "……咦！？真是失禮了，原來還有一起來的客人啊……"
1003902-62 = "（在那之後，美優也一直差點被往來的人們撞上……）"
1003902-63 = "哇！？抱，抱歉！我沒看到那裡有人……"
1003902-64 = "……沒，沒關係。是因為我存在感太低……"
1003902-66 = "（似乎就連自動門都很難識別到美優……）"
1003902-70 = "「此門為自動門。請站到門的前方」"
1003902-71 = "……"
1003902-72 = "連自動門都無視我……"
1003902-75 = "[ns] 「……真是辛苦你了。」"
1003902-76 = "我總是這樣……"
1003902-77 = "誰也認知不到，也沒有任何人需要……"
1003902-78 = "……存在感為零的，不被需要的孩子。"
1003902-79 = "[s] 「不覺得這也是一種才能嗎？」"
1003902-80 = "……存在感很低，是才能嗎？"
1003902-81 = "除了狙擊任務的時候之外，幾乎沒有覺得有用的時候……"
1003902-82 = "這種才能根本……"
1003902-86 = "啊，是貓呢……從哪裡來的呢……"
1003902-87 = "好可愛……毛好像也很柔軟……"
1003902-88 = "[s] 「啊，等等。我記得那隻貓好像是……」"
1003902-89 = "以凶暴聞名……是嗎？"
1003902-90 = "……應該，沒問題的。"
1003902-91 = "好乖好乖，乖孩子。過來這邊……"
1003902-95 = "呵呵，真可愛……"
1003902-96 = "[s5] 「竟然能摸到那隻貓……好厲害，這果然是一種才能。」\n[s6] 「我也想摸……」"
1003902-97 = "這麼說來……我好像從來沒有嚇跑野生動物或被牠們警戒過。"
1003902-98 = "這麼說來……我好像從來沒有嚇跑野生動物或被牠們警戒過。"
1003902-99 = "這也是多虧我存在感很低嗎……？"
1003902-100 = "確實，這麼想的話，這也是一種才能……也說不定呢。"
1003902-101 = "不然我可能也沒辦法像這樣撫摸這孩子了……"
1003902-103 = "（之後與美優一起跟野貓玩，度過了快樂的時光）"

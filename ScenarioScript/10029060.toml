[translation]
10029060-1 = "Episode 6;Repair"
10029060-2 = "Deeper Millennium Ruins"
10029060-4 = "We're almost there. According to the coordinates..."
10029060-5 = "So we've almost found the machinery, huh? We got here faster than I expected."
10029060-6 = "It's thanks to the route that the president gave us. Without that information, we would have wasted time wandering around."
10029060-7 = "It seems the facility is about the size of an industrial park."
10029060-8 = "Something this big was just sitting here, unnoticed?"
10029060-9 = "Unbelievable...! This really is a totally different world from my own!"

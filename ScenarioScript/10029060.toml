10029060-36 = "...My name is Eimi."
10029060-37 = "Huh?"
10029060-38 = "It leaves room for ambiguity if you simply call me \"you.\" Besides, you said it was fine if I call you Mikoto, so please call me Eimi."
10029060-42 = "W-Well... I guess I did say that, so I can't really complain."
10029060-43 = "All right, Eimi."
10029060-44 = "Let's go."
10029060-45 = "...Hm."

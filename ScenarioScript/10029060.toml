[translation]
10029060-1 = "ตอนที่ 6;ซ่อมแซม"
10029060-2 = "ชั้นล่างของพื้นที่รกร้างมิลเลเนียม"
10029060-4 = "ใกล้จะถึงแล้วละ ดูจากพิกัดแล้ว ถ้ามุ่งหน้าไปต่ออีกหน่อย..."
10029060-5 = "ก็จะเจอห้องที่มี 'เครื่องมือ' นั้น... งั้นเหรอ มาถึงเร็วกว่าที่คิดแฮะ"
10029060-6 = "หัวหน้าให้รูทเส้นทางไว้น่ะ ถ้าไม่มีข้อมูลก็คงจะลงมาถึงที่นี่ไม่ได้ด้วยซ้ำ"
10029060-7 = "ที่จริงแล้วขนาดของที่นี่มันเทียบเท่าได้กับนิคมอุตสาหกรรมแห่งหนึ่งได้เลย"
10029060-8 = "ที่ใหญ่โตขนาดนี้ถูกทิ้งร้างไว้โดยไม่มีใครรู้เลยเหรอคะ?"
10029060-9 = "ยอดไปเลย...!!  นี่สินะอีกโลกหนึ่ง!!"
10029060-10 = "ไม่หรอก จริงๆ โลกของเราก็ใช่ว่าจะไม่มีอะไรที่คล้ายๆ กับแบบนี้..."
10029060-11 = "... คะ? หมายความว่ายังไง..."
10029060-13 = "... โชคุโฮว"
10029060-14 = "ฉันยังไม่ได้พูดอะไรสักหน่อย"
10029060-15 = "ถ้ามาถึงแล้วก็ไปยืนอยู่แนวหน้าซะสิ คุณเรลกันเลเวล 5"
10029060-16 = "บะ... บอกว่าให้หยุดเรียกแบบนั้นไง!!"
10029060-17 = "งั้นเดี๋ยวฉันเรียกฉายาของเธอบ้างนะ...!"
10029060-18 = "... เฮ้อ"
10029060-19 = "ช่างเถอะ ฉันมาทำอะไรที่นี่กันแน่นะ..."
10029060-20 = "เอาละๆ พอดีฉันไม่ใช่ประเภทที่ต่อสู้จากแนวหน้าได้น่ะ"
10029060-22 = "ฉันว่าถ้าให้คุณมิซากะไปยืนประจันหน้าให้ ทุกคนน่าจะใจชื้นกว่านะ แล้วก็น่าจะตอบสนองต่อความ#nคาดหวังของพวกเราได้ดีด้วย"
10029060-23 = "หมายความว่ายังไง..."
10029060-29 = "... พูดจริงเหรอเนี่ย"
10029060-30 = "ฉันเห็นด้วย ดูจากสถานการณ์ที่ผ่านมา ฉันกับมิโคโตะน่าจะเหมาะกับการเป็นแนวรบแถวหน้าที่สุด"
10029060-32 = "ได้ยินแล้วใช่มั้ย? อีกอย่าง คุณมิซากะเองไม่ใช่เหรอที่บอกว่าจะให้ความร่วมมือน่ะ?"
10029060-33 = "เปล่าสักหน่อย แต่ก็ไม่ได้บอกว่าจะช่วยสู้อยู่ข้างหลังด้วย..."
10029060-34 = "... ก็ได้ๆ"
10029060-35 = "งั้นถ้าเปิดประตู ก็ให้ฉันกับทางนั้นบุกเข้าไปข้างในก่อนใช่มั้ย? ฉันถามเผื่อเจอสถานการณ์ที่ไม่คาดคิดน่ะ"
10029060-36 = "... ฉันไม่ได้ชื่อ 'ทางนั้น' ฉันชื่อเอมิ"
10029060-37 = "... หืม?"
10029060-38 = "ถ้าเรียกว่าทางนั้น มันอาจจะทำให้ฝ่ายที่ถูกเรียกสับสนได้นะ คนที่ขอให้เรียกชื่อก่อนก็เป็นมิโคโตะเองด้วย งั้นต่อไปก็เรียกฉันว่าเอมิเถอะ"
10029060-42 = "กะ... ก็ได้... ฉันพูดแบบนั้นไว้เอง งั้นก็คงว่าอะไรไม่ได้น่ะนะ"
10029060-43 = "เอาละ ถ้างั้นก็ เอมิ"
10029060-44 = "... เข้าไปข้างในกัน"
10029060-45 = "... อื้ม"
10029060-49 = "... ที่นี่เหรอ?"
10029060-50 = "... ที่นี่เหรอคะ? เป็นพื้นที่ขนาดใหญ่ที่ดูสำคัญมากเลยนะเนี่ย...  "
10029060-51 = "แต่ว่าก็ไม่เห็นมีอะไรพิเศษเลย..."
10029060-52 = "... อ๊ะ! อันนั้นหรือเปล่าคะ? เครื่องจักรกลขนาดใหญ่ที่แค่ดูปราดเดียวก็รู้ว่าต้องมีอะไรแน่!"
10029060-54 = "ฉันตรวจสอบแล้ว นั่นน่าจะเป็น 'เครื่องมือ' ที่ว่าจริงๆ นะ"
10029060-55 = "ใหญ่กว่าที่คิดอีกนะเนี่ย อยากแกะเล่นจัง"
10029060-56 = "...?"
10029060-57 = "เดี๋ยวก่อน แกะเล่นเหรอ? ไม่ได้จะมาซ่อมหรอกเหรอ?"
10029060-59 = "...!?  อะ... เอ่อ"
10029060-60 = "กะ... ก็ถ้าจะซ่อมจริงจัง เราก็น่าจะต้องแกะออกมาดูก่อนนี่คะ! ของมันก็แน่อยู่แล้วนี่นา!"
10029060-61 = "ใช่ ฉันจะสื่ออย่างนั้นแหละ ไม่ได้หมายความเป็นอย่างอื่นเลย"
10029060-62 = "อ่า แน่นอนอยู่แล้ว พูดอีกก็ถูกอีก"
10029060-67 = "ฉันไม่ได้คิดว่ามันจะต้องน่าสนุกหรืออะไรแบบนั้นเลยนะ"
10029060-68 = "[s1] \"นะ... นั่นสินะ\"\n[s2] \"เฮ้!\""
10029060-75 = "...? เสียงอะไรน่ะ?"
10029060-76 = "เครื่องมือนั่น...! เครื่องมันเริ่มทำงานแล้ว!!"
10029060-77 = "ก็พูดเสียงดังซะขนาดนั้น มันก็ธรรมดาแล้วละที่เครื่องจะตอบสนอง..."
10029060-78 = "ถ้างั้นก็..."
10029060-79 = "จะได้ดู..."
10029060-80 = "... อีกครั้งสินะ!?"
10029060-81 = "ทำไมต้องดีใจกันด้วย!?"
10029060-82 = "เพราะจะได้ดูการแสดงพละกำลังของคุณมิซากะอีกครั้งงั้นเหรอ?"
10029060-83 = "การแสดงพละกำลัง!?  เธอพูดว่าอย่างนั้นออกมาใช่มั้ย!?"
10029060-85 = "... เดี๋ยวก่อน"
10029060-86 = "ไม่สิ แปลกๆ แฮะ มันไม่เหมือนที่เคยเป็นเลย นี่มันไม่ใช่แพทเทิร์นที่จะมีแค่โดรนออกมาเพียงเท่านั้น"
10029060-90 = "แพทเทิร์นนี้ฉันไม่เคยเจอมาก่อน นี่มัน..."
10029060-94 = "[ns3] \"หรือจะเป็น 'การเคลื่อนย้าย' ที่ฮิมาริพูดไว้...?\"\n[ns4] \"แสงปริศนาจากรอบๆ...!?\""
10029060-101 = "...! เหมือน 'เครื่องมือ' จะเคลื่อนไหวได้เลย..."
10029060-103 = "ดะ... เดี๋ยวสิคะ! จะปล่อยไปแบบนั้นได้เหรอคะ?!  ถ้ามันส่งพวกฉันไปที่แปลกๆ ล่ะ...!"
10029060-104 = "น่าจะเป็นอย่างนั้นนะ ฉันได้ยินมาว่ามันมีฟังก์ชันแบบนั้นอยู่ด้วย"
10029060-105 = "การส่งสิ่งที่เป็นภัยคุกคามต่อตัวเองออกไปไกลๆ ตั้งแต่แรกคือการโต้ตอบที่มีประสิทธิภาพที่สุด"
10029060-106 = "ส่วนโดรนที่แห่เข้ามาก็เป็นการยื้อเวลาในการทำสิ่งนั้น"
10029060-112 = "... บาเรียกันกระสุนก็ถูกเปิดใช้ไว้ด้วย แบบนี้ต้องเข้าไปทำลายด้วยตัวเองแล้วละ"
10029060-113 = "สถานการณ์ร้ายแรงขนาดนี้ ทำไมยังพูดเนิบๆ ได้อยู่อีก!!"
10029060-114 = "คุณครู!!"
10029060-115 = "[s5] \"เข้าใจแล้ว!\"\n[s6] \"มาหยุดการเคลื่อนไหวของเครื่องมือกันก่อน!!\""
10029060-118 = "ฉันจะไปจัดการเดี๋ยวนี้ละ ฝากสั่งการด้วยนะ"
10029060-130 = "......"
10029060-131 = "... เอ่อ..."
10029060-132 = "คือว่า... นี่พวกเรา..."
10029060-133 = "มาซ่อมจริงๆ ใช่มั้ย...? ใช่มั้ย?"

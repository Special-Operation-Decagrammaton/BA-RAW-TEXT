10029060-14 = "I didn't say anything."
10029060-15 = "Since we're nearly there, why don't you lead the way, Miss Level 5 Railgun?"
10029060-16 = "I-I told you to stop saying that!"
10029060-17 = "You have some pretty impressive nicknames yourself, you know...!"
10029060-18 = "*sigh*"
10029060-19 = "Forget it. It's not worth it..."
10029060-20 = "Yes, yes. You understand, don't you? I'm not what you would call a frontline type of person."

[translation]
10029060-1 = "第6話;修理"
10029060-2 = "千年廢墟下層"
10029060-4 = "就快到了。#n座標顯示只要繼續前進……"
10029060-5 = "就能看到那個「設施」所在的房間。#n比想像中還早抵達呢。"
10029060-6 = "這都多虧部長提供了路線。#n如果沒有情報的話，光是找路就要花上好一段時間了。"
10029060-7 = "因為這整個設施的規模，幾乎相當於一個產業園區。"
10029060-8 = "這麼大規模的設施居然一直都被棄置不用？"
10029060-9 = "太厲害了……！！不愧是異世界！！"
10029060-10 = "雖然我們那裡也不是沒有類似的情況……"
10029060-11 = "……嗯？#n那是什麼意思……"
10029060-13 = "……食蜂。"
10029060-14 = "我什麼都沒說。"
10029060-15 = "既然到了就請你打頭陣吧，「[ruby=LEVEL5]超能力者[/ruby]的[ruby=Railgun]超電磁砲[/ruby]」同學？"
10029060-16 = "別，別那樣叫我好不好！！"
10029060-17 = "而且你不也有類似的外號嗎……！"
10029060-18 = "……唉。"
10029060-19 = "算了，再說下去也只是白費力氣……"
10029060-20 = "哎呀，終於明白了嗎？#n畢竟我不是在前線戰鬥的類型。"
10029060-22 = "御坂同學帶頭不僅可靠，對大家來說也是好事一件吧？在滿足期待的意義上。"
10029060-23 = "那又是什麼……"
10029060-29 = "……真的假的。"
10029060-30 = "我也同意。#n從目前的情況來看，現在的成員中，美琴和我是最適合打頭陣的人選。"
10029060-32 = "聽到了吧？而且說要合作的不也是御坂同學嗎？"
10029060-33 = "不是，我也沒說過要待在後面吧……"
10029060-34 = "……知道了知道了。"
10029060-35 = "那為了以防萬一，開門之後就由我和那邊那位先進去囉？"
10029060-36 = "……我不叫「那邊那位」，我叫英美。"
10029060-37 = "……咦？"
10029060-38 = "那種叫法可能會讓人搞錯對象。#n之後就叫我英美吧。"
10029060-42 = "唔……說的也是。"
10029060-43 = "好吧，那英美。"
10029060-44 = "……要進去囉。"
10029060-45 = "……嗯。"
10029060-49 = "……是這裡嗎？"
10029060-50 = "看起來的確是個寬廣又重要的空間……"
10029060-51 = "但是好像也沒看到什麼特別的東西……"
10029060-52 = "……啊！是那個嗎？#n那個巨大的機械裝置看起來很重要！"
10029060-54 = "嗯，那個應該就是我們要找的「設施」沒錯。"
10029060-55 = "比想像中大很多呢。拆開看看一定很有趣。"
10029060-56 = "……？"
10029060-57 = "等等，你剛才說要拆開看看？不應該是修理嗎？"
10029060-59 = "……！？#n是，是這樣沒錯……"
10029060-60 = "如，如果想好好修理就必須先拆開看看！這是理所當然的！"
10029060-61 = "嗯，我想說的就是這個意思，絕對沒有其他含意。"
10029060-62 = "啊啊，這是當然的。"
10029060-67 = "絕對不是因為覺得好玩才拆開。"
10029060-68 = "[s1]「……好，好吧。」\n[s2]「你們先冷靜！」"
10029060-75 = "……什麼聲音？"
10029060-76 = "設施……！設施動起來了！！"
10029060-77 = "畢竟發生了這麼大的騷動，該說是理所當然嗎……"
10029060-78 = "也就是說，這是……"
10029060-79 = "再次……"
10029060-80 = "……出手的機會！？"
10029060-81 = "為什麼一臉高興啊！？"
10029060-82 = "當然是因為有機會能再看到御坂同學的超能力秀囉？"
10029060-83 = "超能力秀！？你剛才是說超能力秀吧！？"
10029060-85 = "……等等。"
10029060-86 = "有點奇怪，情況和以往不同，並非單純只有警備無人機蜂擁而來。"
10029060-90 = "這是第一次看到的行動模式。難道……"
10029060-94 = "[ns3]「難道是陽葵提過的『轉移』……？」\n[ns4]「周圍出現了奇怪的光芒……！？」"
10029060-101 = "「設施」開始運作了……！"
10029060-103 = "先，先等一下！放著不管沒關係嗎！？#n會不會把我們轉移到奇怪的地方……！"
10029060-104 = "有這個可能。而且聽說它實際上也具備那種功能。"
10029060-105 = "把會對自己造成威脅的存在傳送到遠方，這是最有效率的。"
10029060-106 = "而大量的無人機將會爭取時間，好讓傳送順利進行。"
10029060-112 = "……連防彈護盾都出現了。#n不直接靠近的話似乎很難破壞。"
10029060-113 = "情況明明這麼糟，為什麼還說得這麼淡定啦！！"
10029060-114 = "老師！！"
10029060-115 = "[s5]「我知道了！」\n[s6]「總之先阻止設施運作吧！！」"
10029060-118 = "我立刻進攻。指揮就麻煩了。"
10029060-130 = "…………"
10029060-131 = "……那個……"
10029060-132 = "我們……"
10029060-133 = "是來修理設施的……對吧……？"

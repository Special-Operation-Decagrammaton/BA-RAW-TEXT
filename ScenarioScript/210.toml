[translation]
210-1 = "การบุกโจมตีชายหาดของอาชญากรจอมวายร้าย"
210-3 = "เจอกันอีกแล้วนะครู ฮุฮุฮุ..."
210-4 = "เฮ้อ อะไรกัน ทำไมถึงทำหน้าบอกบุญไม่รับว่า 'เธอมีอะไรอีกแล้วล่ะ?' แบบนั้นกันเล่า?"
210-5 = "ฮุฮุ... ก็นะ ตอนนี้เริ่มชินกับรูปแบบการชวนคุยแบบนี้แล้วใช่มั้ย? คิดซะว่าเป็นสัญญาณที่ดีก็แล้วกัน (ยิ้มกริ่ม)"
210-6 = "อืม... เรื่องก็คือคราวนี้น่ะ..."
210-7 = "ดูเหมือนตอนนี้หนึ่งในอาชญากรที่แหกคุกออกมา ดันไปก่อปัญหาอยู่ตรงชายหาดไหนสักแห่งอยู่น่ะ"
210-8 = "ส่วนเรื่องรายละเอียด... เนื้อหามันยืดยาวน่ารำคาญ ฉันเลยไม่ได้อ่านน่ะ แต่ดูเหมือนอาชญากรนั่นจะชิงเรือโฮเวอร์คราฟต์ไปใช้อยู่ล่ะมั้งนะ?"
210-9 = "เพราะงั้น... คงรู้แล้วใช่มั้ย? ว่าคราวนี้ทางชาเล่ต์ต้องออกไปจัดการแล้วน่ะ"
210-10 = "ฮะฮะฮ่าฮ่า ครูเองก็น่าจะพอเดาได้นี่นาว่ามันจะเป็นแบบนี้?"
210-11 = "เพราะงั้นช่วยรีบไปที่ชายหาดนั่นแล้วทำอะไรสักอย่างหน่อยก็แล้วกันนะ"
210-12 = "ส่วนฉัน... ก็จะกินมันฝรั่งทอดรสไข่ปลาเมนไทโกะรออยู่ที่นี่เอง (ยิ้มกริ่ม)"
210-17 = "ถ้างั้นก็ฝากด้วยน้า ครู~ "

[translation]
210-1 = "The Vicious Beachside Caper"
210-3 = "I'm back, Sensei. Heeheehee!"
210-4 = "Hm, you don't seem all that surprised to see me. "
210-5 = "Guess you're getting used to me popping up outta nowhere, huh, Sensei? Good. *munch crunch*"
210-6 = "Anyway. *crunch* The reason I'm here..."
210-7 = "You know that escaped Corrections Bureau prisoner? Well, someone spotted them causing trouble up the coast."
210-8 = "Something about a stolen hovercraft. Or a hovercraft rampage...? I don't know. Details bore me."
210-9 = "Either way, *crunch crunch* it's time for Schale to step in."
210-10 = "But you probably already knew that, right, Sensei? Of course, you did."
210-11 = "Just head up the beach and listen for the sounds of chaos. I'm sure you can handle it."
210-12 = "I'll keep an eye on things here. This package of cod roe crackers is all the excitement I need. *crunch munch*"
210-17 = "Goog wuck, Shenshei! "

[translation]
210-1 = "襲擊海邊的兇惡罪犯"
210-3 = "……又是我，老師。呵呵呵。"
210-4 = "一臉「唉，怎麼又來了？」的表情呢？"
210-5 = "呵呵。很好。老師也差不多習慣這個模式了吧？#n我認為這是個好兆頭。（喀滋）"
210-6 = "嘛，總之這次呢……"
210-7 = "似乎是一名從矯正局逃脫的囚犯正在海邊製造騷動。"
210-8 = "因為很麻煩，我懶得去察看細節……#n對方好像搶了一艘氣墊船，正在大鬧特鬧的樣子？"
210-9 = "所以說……你應該懂吧？又輪到夏萊上場了。"
210-10 = "啊哈哈哈，老師也大概猜到會是這樣的發展了吧？"
210-11 = "事情就是這樣，麻煩你去海邊想辦法處理一下囉。"
210-12 = "我會在這裡吃明太子餅乾等你的。（喀滋）"
210-17 = "那就拜託你囉，老師～ "

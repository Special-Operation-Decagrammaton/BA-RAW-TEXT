[translation]
11002-4 = "もうシャーレの部室は目の前よ！"
11002-5 = "今、この騒ぎを巻き起こした生徒の正体が判明しました。"
11002-7 = "ワカモ。百鬼夜行連合学院で停学になった後、矯正局を脱獄した生徒です。"
11002-8 = "似たような前科がいくつもある危険な人物なので、気を付けてください。"
11002-11 = "……あらら。連邦生徒会は来ていないみたいですね。フフッ、まあ構いません。"
11002-12 = "あの建物に何があるかは存じませんが、連邦生徒会が大事にしてる物と聞いてしまうと……壊さないと気が済みませんね……。"
11002-13 = "ああ……久しぶりのお楽しみになりそうです、ウフフフ♡"

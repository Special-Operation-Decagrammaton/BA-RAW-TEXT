[translation]
11002-4 = "ห้องชมรมของชาเล่ต์อยู่ข้างหน้านี้แล้ว!"
11002-5 = "เราได้ข้อมูลของนักเรียนที่ก่อความไม่สงบมาแล้วค่ะ"
11002-7 = "เธอชื่อว่าวาคาโมะ หลังจากถูกพักการเรียนในสหพันธ์เฮียกคิยาโค เธอก็ได้ไปอยู่ที่สำนักควบคุมแล้วก็หนีออกมา"
11002-8 = "วาคาโมะมีประวัติอาชญากรรมที่คล้ายกันหลายครั้งเลย ระวังตัวให้ดีนะคะ"
11002-11 = "แหม แหม... องค์การนักเรียนไม่มาที่นี่ด้วยตัวเองงั้นเหรอ เอาเถอะ ยังไงก็ไม่เป็นไรอยู่แล้ว"
11002-12 = "ฉันเองก็ไม่รู้ว่ามีอะไรอยู่ในอาคารนั้น แต่องค์การนักเรียนบอกว่ามันเป็นของสำคัญ...#nถ้าเราไม่ทำลายซะ ก็คงต้านไว้ไม่ได้..."
11002-13 = "ไม่ได้ตื่นเต้นแบบนี้มานานแล้วนะคะ ฮุฮุฮุ♡"

[translation]
10042050-1 = "ตอนที่ 5;WHAT A LOVELY DAY"
10042050-2 = "แปลกจังเลยนะคะ"
10042050-3 = "[s] \"อะไรเหรอ?\""
10042050-4 = "จู่ๆ ร่องรอยก็หายไปเสียอย่างนั้นค่ะ ซอสเมือกก็ไม่มีให้เห็นแล้ว... แล้วก็ไม่มีนักเรียนที่ซอสท่วมตัวด้วยค่ะ"
10042050-5 = "ตะ... แต่ว่า..."
10042050-6 = "ทำไมถึงมีนักเรียนนอนล้มอยู่เต็มไปหมดเลยล่ะคะ...?"
10042050-7 = "ต้องบอกว่านี่เป็นการ 'เปลี่ยนแพทเทิร์น' หรือเปล่าคะ?"
10042050-8 = "[s1] \"เปลี่ยนแพทเทิร์นงั้นเหรอ...\"\n[s2] \"ชินัตสึก็เริ่มเป็นนักสืบกับเขาด้วยแล้วสินะ\""
10042050-11 = "คะ? แพทเทิร์น...? นะ... นั่นสิคะ ทำไมฉันถึงใช้คำแบบนี้ไปด้วย...?!?!"
10042050-12 = "เราไปหาตัวอย่างมาสักตัวอย่างก่อนดีกว่าค่ะ ขอเลือกเป็นเหยื่อที่นอนอยู่ตรงโน้นนะคะ"
10042050-15 = "สวัสดีค่ะ เป็นยังไงบ้างคะ? ไม่ได้การละ... เหมือนจะหมดสติไปแล้ว"
10042050-16 = "โชคดีที่ฉันมีทักษะทำให้คนที่หมดสติกลับมาเป็นปกติได้ค่ะ"
10042050-21 = "จริงเหรอคะ? สมกับที่เป็นคุณเซนะเลยค่ะ!"
10042050-25 = "ฮะ... เฮือก?!"
10042050-26 = "โอ๊ย! อะไรเนี่ย?!"
10042050-27 = "[s] \"ทำแบบนี้ก็ได้เหรอ...?\""
10042050-28 = "ได้สิคะ ถ้าอยากให้ได้สติเร็วๆ ละก็ ไม่มีวิธีไหนดีไปกว่านี้แล้วค่ะ"
10042050-29 = "เอ่อ... รุ่นพี่เซนะ? วิธีนั้น... ปกติแล้วใช้เพื่อสงบสติอารมณ์ของผู้ป่วยคลุ้มคลั่ง หรือเพื่อเช็กว่านักเรียนแกล้งเป็นลมจริงหรือเปล่าไม่ใช่เหรอคะ...?"
10042050-30 = "แน่นอนว่าจะใช้กับจุดประสงค์นั้นได้เหมือนกันค่ะ ชินัตสึ นี่เป็นเครื่องมืออเนกประสงค์ที่ใช้ได้กับ#nทุกสถานการณ์น่ะค่ะ"
10042050-31 = "และเมื่อต้องจัดการกับนักเรียนเกเฮนน่าแล้ว บางครั้งเราก็ต้องไร้ความปรานีค่ะ"
10042050-32 = "หมายความว่าผู้ป่วยฉุกเฉินจะไม่ได้รับการปรานีงั้นเหรอ..."
10042050-33 = "ขอโทษด้วยค่ะ พอดีรุ่นพี่ของฉันเป็นคนแบบนี้..."
10042050-34 = "อะ... เอาเถอะค่ะ...! เราไปถามรายละเอียดจากนักเรียนคนนี้กันดีกว่าค่ะ!"
10042050-36 = "นั่นน่ะสิ... ทำไมฉันถึงมาอยู่ตรงนี้ได้นะ?"
10042050-38 = "คุณหมดสติไปพักหนึ่งน่ะค่ะ ไม่ทราบว่าพอจะจำอะไรเกี่ยวกับแพนเค้กที่เคลื่อนไหวได้หรือเปล่าคะ?"
10042050-39 = "แพนเค้กเหรอ...? เดี๋ยวนะ พอได้ยินคำนั้นก็เหมือนจะคิดอะไรออกเลย... อ๊ะ!"
10042050-40 = "แพนเค้ก! แพนเค้กสีม่วงตัวใหญ่ที่วิ่งวุ่นไปทั่วตามอำเภอใจนั่น!!!"
10042050-41 = "นั่นไม่ใช่แพนเค้กหรอกค่ะ ต้องบอกว่าเป็นสัตว์ประหลาดที่รูปร่างเหมือนแพนเค้กมากกว่า"
10042050-42 = "เรากำลังไล่ล่าเจ้านั่นอยู่ค่ะ อยากไปกับพวกเราด้วยมั้ยคะ?"
10042050-46 = "ไปด้วยกันเหรอ...?"
10042050-47 = "เหอะ... เหอะๆ..."
10042050-51 = "พอเลย... อย่ามาตลกน่า! ขืนไปก็โดนกันหมดน่ะสิ!"
10042050-52 = "ทั้งเธอและฉัน ไม่ว่าใครก็หนีเจ้านั่นไม่ได้หรอก!"
10042050-53 = "[s3] \"จะ... จู่ๆ ก็เป็นอะไรไปน่ะ?!\"\n[s4] \"ใจเย็นๆ ก่อน! อย่าเพิ่งส่งเสียงดังสิ!\""
10042050-56 = "ตกใจหมดเลยค่ะ"
10042050-60 = "?!"
10042050-61 = "ทุกคน หาที่ซ่อนตัวค่ะ!"
10042050-62 = "ตรงโน้นมีที่ที่ดูปลอดภัยค่ะ"
10042050-68 = "มากันครบหรือเปล่าคะ? มีใครตามมาไม่ทันหรือเปล่า..."
10042050-69 = "แย่ละสิ..."
10042050-70 = "ทะ... ทำไมเหรอคะ?"
10042050-71 = "ดูทางโน้นสิคะ"
10042050-72 = "มาแล้วสินะ... นั่นละเจ้าตัวปัญหา ในที่สุดก็มาถึงตรงนี้จนได้นะ"
10042050-73 = "ดีเลย ฉันกำลังหิวอยู่พอดี ขอกินบุฟเฟ่ต์แพนเค้กหน่อยเถอะ"
10042050-74 = "เมื่อกี้ว่ายังไงนะ?"
10042050-75 = "นี่เป็นอาการปกติของคนที่เพิ่งได้สติค่ะ บางทีก็จะแสดงอาการก้าวร้าวด้วย เคสแบบนี้มีให้เห็นบ่อยๆ ค่ะ"
10042050-77 = "แต่สถานการณ์มันไม่ปกตินะ!?!?"
10042050-82 = "ตอนจบมันถูกกำหนดไว้แล้ว ไม่ว่าจะกับใครทั้งนั้น! โลกนี้ไม่มีสิ่งที่เรียกว่าโชคชะตาที่หลบเลี่ยง#nได้หรอก ทุกคนต้องมุ่งหน้าไปสู่จุดจบเดียวกัน!"
10042050-83 = "ไม่ว่าจะผ่านไปทางไหน เจ้าแพนเค้กก็ทิ้งซอสเหนียวสีเขียวไว้ให้ตามตัวได้!"
10042050-84 = "ไปหามันเลย! ลืมตา! กู่ก้องแล้วยกปืนขึ้นสูงสุดฟ้า! เอาเลย!"
10042050-85 = "มองมาที่ฉันเลย! ฉันอยู่ตรงนี้ไง!"
10042050-86 = "สุดยอดเลย! วันนี้มันวิเศษชะมัด! เราได้เจอกันในเวลาที่แปลกประหลาดจริงๆ!"
10042050-87 = "ถ้ามีคนน่าสงสัยห้ามไม่ให้ไปตรงนั้นละก็ หัวเราะเยาะใส่ไปเลย!"
10042050-88 = "ถ้ามีสิ่งใดไล่ตามมา ก็ให้แยกย้ายสลายตัว!"
10042050-89 = "แล้วถ้าได้ยินเสียงแปลกๆ จากข้างนอก..."
10042050-90 = "ก็จงมีความรัก!!!!!"
10042050-98 = "[ns5] \"ปะ... ไปแล้วแฮะ...\"\n[ns6] \"เป็นเอามากเลยนะเนี่ย... \""
10042050-101 = "แบบนี้จะไม่เป็นไรเหรอคะ?"
10042050-102 = "อย่างที่บอกไปค่ะ เหยื่อที่ได้สติขึ้นมาอาจส่งเสียงดังวุ่นวายได้บ้าง แต่ก็ไม่เป็นอันตรายถึงกับชีวิตหรอกค่ะ"
10042050-103 = "ผลข้างเคียงนี้ค่อนข้างแปลก แต่ถ้าพิจารณาแค่ความรุนแรง ก็ถือว่ายังอยู่ในเกณฑ์ปกติค่ะ"
10042050-104 = "ปกติ? เกิดเรื่องแบบนี้บ่อยเหรอ...?"
10042050-105 = "ก็ที่นี่มีทั้งการปะทะระหว่างชมรม... แล้วพวกอันธพาลก็หาเรื่องต่อสู้กันบ่อยๆ ด้วยนี่คะ"
10042050-106 = "ชมรมโภชนาการน่าจะยุ่งอยู่กับงานของชมรมตลอดเวลา..."
10042050-107 = "ก็เลยไม่ได้ตระหนักว่าการเกิดอุบัติเหตุและการมีผู้ได้รับบาดเจ็บเป็นเรื่องธรรมดามากแค่ไหน#nในสถาบันเกเฮนน่าของเราค่ะ"
10042050-108 = "ในบางแง่ก็อาจบอกได้ว่า... เป็นโชคดีแล้วละค่ะ"
10042050-109 = "(โชคดี...? จริงเหรอเนี่ย...?)"
10042050-113 = "[ns] \"เกเฮนน่า... เป็นที่แบบไหนกันนะ...\""
10042050-114 = "สถานที่ที่ดวงอาทิตย์ขึ้นตามเวลาที่กำหนด โรงอาหารมีอาหารกลางวันให้กิน ส่วนชมรมหน่วยแพทย์ฉุกเฉินก็เคลื่อนย้ายศพ... ไม่สิ ส่งตัวผู้ป่วยค่ะ"
10042050-115 = "แน่นอนว่าก็มีเรื่องวุ่นวายเล็กๆ น้อยๆ เกิดขึ้นอยู่เสมอ แต่เกเฮนน่าก็เป็นอย่างนี้ละค่ะ เป็นเหมือนอย่างที่เป็นมาตลอด"
10042050-116 = "แต่ก็ต้องยกความดีความชอบให้ท่านประธานและคณะกรรมการวินัย...!"
10042050-117 = "ไม่สิ... ฉันไม่พูดโอ้อวดเรื่องนั้นดีกว่าค่ะ"
10042050-122 = "ทุกคนคะ เมื่อสักครู่รู้สึกถึงแรงสั่นสะเทือนและมวลของวัตถุบ้างมั้ยคะ?"
10042050-123 = "แรงสั่นสะเทือน? มวลของวัตถุ?"
10042050-124 = "จะว่าไป ฉันก็เหมือนจะได้ยินเสียงดังสนั่นอยู่สองสามรอบ..."
10042050-125 = "ค่ะ นั่นละค่ะ"
10042050-126 = "บางที 'การสำรวจ' อาจไม่จำเป็นอีกต่อไปแล้วก็ได้ค่ะ..."
10042050-127 = "[s] \"พูดแบบนั้น... หมายความว่ายังไงเหรอ?\""
10042050-128 = "ฉันว่า... ถ้าได้เห็นกับตาตัวเอง น่าจะเข้าใจง่ายกว่าค่ะ"
10042050-129 = "ทางโน้นไงคะ"
10042050-132 = "[log]เซนะชี้ออกไปไกลๆ แทนการพูดตอบอย่างเจาะจง[/log]"
10042050-135 = "[log]และสิ่งที่อยู่ตรงนั้น...[/log]"

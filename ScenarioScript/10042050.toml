[translation]
10042050-1 = "第5話;WHAT A LOVELY DAY"
10042050-2 = "真奇怪。"
10042050-3 = "[s]「怎麼說呢？」"
10042050-4 = "痕跡突然中斷了。#n沒看到黏液……醬汁，也沒看到沾滿醬汁的學生。"
10042050-5 = "不，不過……"
10042050-6 = "好像到處都是倒地不起的學生？"
10042050-7 = "現在應該認為「情節」開始發生變化了嗎？"
10042050-8 = "[s1]「『情節』啊……」\n[s2]「千夏也開始適應了呢。」"
10042050-11 = "咦？情節……？#n這，這麼說來，連我都不知不覺跟著……！？"
10042050-12 = "必須先找個樣本才行。#n就用倒在那邊的那個受害者吧。"
10042050-15 = "你還好嗎？#n不行……好像很難恢復意識。"
10042050-16 = "幸好我有能幫助昏迷者恢復意識的技術。"
10042050-21 = "真的嗎？不愧是瀬奈同學！"
10042050-25 = "噫噫──！？"
10042050-26 = "好痛！你做什麼啦！？"
10042050-27 = "[s]「……這樣是可以的嗎？」"
10042050-28 = "當然可以。#n要讓人快速清醒的時候，沒有比這更好的方法了。"
10042050-29 = "唔嗯……瀬奈前輩？#n那個東西平常不是用來讓暴走的患者鎮靜下來，或者確認學生是不是裝昏的嗎……？"
10042050-30 = "當然可以那麼使用，千夏。#n這是無論何時何地，都能視情況改變用法的萬能工具。"
10042050-31 = "而且面對格黑娜的學生，有時必須得狠心一點。"
10042050-32 = "對患者狠心不太好吧……"
10042050-33 = "對不起，我們的前輩有點……"
10042050-34 = "總，總之……！先來問問剛才醒來的患者怎麼說吧！"
10042050-36 = "我還搞不太清楚情況……我為什麼在這裡？"
10042050-38 = "你剛才短暫失去了意識。#n請問你對「會動的鬆餅」有什麼印象嗎？"
10042050-39 = "鬆餅……？#n等等，聽到鬆餅這個詞，腦海裡好像浮現了某些畫面……啊！"
10042050-40 = "是鬆餅沒錯！超大又到處橫衝直撞的紫色鬆餅！！！"
10042050-41 = "嚴格來說那並不是鬆餅，只是類似鬆餅的某種東西。"
10042050-42 = "你接下來打算怎麼做？要和我們一起行動嗎？"
10042050-46 = "一起……？"
10042050-47 = "哈，哈哈……"
10042050-51 = "開什麼玩笑……開什麼玩笑！#n我們全都會被它抓住的！"
10042050-52 = "你也是！我也是！我們全都一樣！#n絕對逃不掉的！"
10042050-53 = "[s3]「怎，怎麼突然這樣……！？」\n[s4]「你先冷靜點！大聲說話會有危險的！」"
10042050-56 = "這是恐慌症的症狀。"
10042050-60 = "！？"
10042050-61 = "大家，快躲起來！"
10042050-62 = "那邊看起來有安全的地方。"
10042050-68 = "大家都到齊了嗎？#n有沒有人脫隊……"
10042050-69 = "……哎呀。"
10042050-70 = "怎，怎麼了？"
10042050-71 = "請看那邊。"
10042050-72 = "來了……那個東西來了。#n你終究還是到這裡來了。"
10042050-73 = "沒錯，我們也該把機會讓給其他人了。"
10042050-74 = "他現在在說什麼？"
10042050-75 = "人在面對極端壓力的時候，反而會表現得非常激進。#n這是相當常見的案例。"
10042050-77 = "這種症狀發生的背景一點都不常見吧！？！？"
10042050-82 = "結局早已注定，任何人都一樣！#n沒有人能夠逃避命運，所有人都在朝著註定的結局前進！"
10042050-83 = "凡是你走過的路上，必將留下黏稠濃厚的綠色醬汁痕跡吧，鬆餅啊！"
10042050-84 = "尋找吧！睜開眼吧！#n放聲大喊，高舉槍枝！出航了！"
10042050-85 = "看我！看著我吧！我就在這裡！"
10042050-86 = "太棒了！真是精彩絕倫的一天！我們相遇的時間真是奇妙！"
10042050-87 = "要是有可疑人物說不要去那裡，就狠狠嘲笑他一頓！"
10042050-88 = "如果有東西追上來，就分頭行動！"
10042050-89 = "如果外面傳來奇怪的聲音……"
10042050-90 = "就去愛吧！！！！！"
10042050-98 = "[ns5]「走掉了……」\n[ns6]「這……」"
10042050-101 = "……真的沒問題嗎？"
10042050-102 = "就像我剛才說的一樣，雖然那看起來很嚴重，但是並不會影響性命或將來的行動。"
10042050-103 = "儘管傷勢的種類較為特殊，不過單就症狀而言還算是常見的水準。"
10042050-104 = "常見的……水準？"
10042050-105 = "例如社團間的爭端……或是跟太妹之間的衝突，在這裡可都是家常便飯。"
10042050-106 = "供給部的各位總是忙於供給部的工作……"
10042050-107 = "因此可能不太了解格黑娜發生的事件、意外和受害者的規模。"
10042050-108 = "……某方面來說，這或許也稱得上幸運吧。"
10042050-109 = "（幸運……？真的嗎……？）"
10042050-113 = "[ns]「格黑娜到底……是個什麼樣的地方……」"
10042050-114 = "太陽每天東升西落，供餐廚房負責供應午餐，急救醫學部負責運送屍體……患者。"
10042050-115 = "當然有時難免會出現一些小差錯，不過格黑娜依然會一如既往地運作下去。"
10042050-116 = "這都要多虧我們風紀委員會和委員長的努力……！"
10042050-117 = "……抱歉。這樣說得好像大家應該對我們感恩戴德一樣，請當我沒說過吧。"
10042050-122 = "話說回來，各位剛才有沒有感受到震動和壓迫感？"
10042050-123 = "震動？壓迫感？"
10042050-124 = "這麼說來，我好像有聽到幾聲巨響……"
10042050-125 = "嗯，沒錯。"
10042050-126 = "……或許我們不必再進行「搜查」了。"
10042050-127 = "[s]「這是……什麼意思？」"
10042050-128 = "直接……親眼見證比較快。"
10042050-129 = "就在那邊。"
10042050-132 = "[log]瀬奈沒有給出具體的回應，而是用手指向了某處。[/log]"
10042050-135 = "[log]隨後映入眼簾的是──[/log]"

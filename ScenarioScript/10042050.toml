[translation]
10042050-1 = "Episode 5;WHAT A LOVELY DAY"
10042050-2 = "How strange."
10042050-3 = "[s] \"What is?\""
10042050-4 = "The trail ends here. There's no more mucus — or syrup, rather — and no one's covered in it."
10042050-5 = "I-Instead..."
10042050-6 = "It looks like this latest victim just collapsed on her own."
10042050-7 = "Perhaps there's been a change in its behavioral pattern."
10042050-8 = "[s1] \"A 'pattern'...\"\n[s2] \"You sound like you're getting into this, Chinatsu.\""
10042050-11 = "W-Wait, when did I become an expert in all this...?!"
10042050-12 = "First, let's secure a sample. I'm sure we can find something on the victim over there."
10042050-15 = "Hello? Are you okay? ...This isn't good. She's unresponsive."
10042050-16 = "Not waking up, hmm? I have just the thing for that."
10042050-21 = "Ah, of course you do, Sena!"
10042050-25 = "E-Eek!!"
10042050-26 = "Ow, my ears! What the hell?!"
10042050-27 = "[s] \"...Are you allowed to do that?\""
10042050-28 = "Hey, when you need to wake someone up right away, this is how you do it."
10042050-29 = "Um... Sena? Don't we usually reserve that method for quelling a rampage, or checking if a student is really passed out instead of faking it...?"
10042050-30 = "Those are other valid uses as well, Chinatsu. This method is a versatile tool, for a wide variety of situations."
10042050-31 = "And when facing a student of Gehenna, one does sometimes need to be ruthless."
10042050-32 = "She could be in critical condition. How \"ruthless\" do you need to be with her?"
10042050-33 = "My apologies on Sena's behalf. She can be a bit..."
10042050-34 = "...Oh, look! She's waking up! Quick, let's ask her a bunch of questions."
10042050-36 = "Ugh, where am I? What am I doing here?"
10042050-38 = "You've been unconscious for some time. Now, listen carefully. Do you remember anything about a living pancake?"
10042050-39 = "A pancake...?! Wait, now that you mention it, I think I... AHHH!!"
10042050-40 = "The pancake!! The merciless, giant, purple pancake!!"
10042050-41 = "Technically, it's not a pancake. It just looks like one."
10042050-42 = "We're hunting it now. We could use your help, if you'd like to come with us."
10042050-46 = "Come with you...?"
10042050-47 = "Ha, haha..."
10042050-51 = "No way... No way! We'd be walking into a death trap!"
10042050-52 = "You! Me! All of us! It's unavoidable!"
10042050-53 = "[s3] \"Wh-What are you saying?!\"\n[s4] \"Easy! You don't have to shout!\""
10042050-56 = "She's in a panic."
10042050-60 = "*gasp*"
10042050-61 = "Everyone, hide!"
10042050-62 = "Over there."
10042050-68 = "Is everyone here? Are we missing anyone?"
10042050-69 = "...Oh, no."
10042050-70 = "Wh-What is it?"
10042050-71 = "Look over there."
10042050-72 = "Ha. Welcome back. Took you long enough."
10042050-73 = "I'm hungry, and you brought a whooole buffet."
10042050-74 = "What is she talking about?"
10042050-75 = "She's cornered, so she's showing aggression. It's a common response."
10042050-77 = "Nothing about this is common!"
10042050-82 = "We're all in one big race, and death is the finish line. We keep on running toward it every day."
10042050-83 = "Even you. Everywhere you went, with your gooey little syrup trail, every little ooze of it brought you here, to me."
10042050-84 = "Yeah, that's right, you see me? You see this gun! Let's go!"
10042050-85 = "I said look at me! Look at me! Right here!"
10042050-86 = "Ohoho, what a lovely day!"
10042050-87 = "If anyone stands in your way, laugh in their face!"
10042050-88 = "If anyone threatens you, tear 'em to shreds!"
10042050-89 = "And when you witness the inexplicable, the inevitable..."
10042050-90 = "EMBRACE IT WITH YOUR WHOLE DAMN HEART!!"
10042050-98 = "[ns5] \"...Well, that's one way to make an exit.\"\n[ns6] \"Wow...\""
10042050-101 = "...She didn't just die, did she?"
10042050-102 = "She seemed ready to, but no, her life wasn't in danger."
10042050-103 = "She definitely took a non-standard injury or two, but in terms of severity, it's well within the space of normal."
10042050-104 = "Again, what's normal about this?"
10042050-105 = "Remember, almost everyone here gets injured in club fights, or brawling with thugs."
10042050-106 = "Of course, with your School Lunch Club always so busy with its own work..."
10042050-107 = "...you may not be completely aware of how common such things are in Gehenna Academy."
10042050-108 = "...Which you ought to be rather grateful for, honestly."
10042050-109 = "(Grateful? Really...?)"
10042050-113 = "[ns] \"Just what kind of place IS this?\""
10042050-114 = "A place where the sun rises and sets, where the cafeteria serves lunch at lunchtime, and the Medical Emergency Club always has new bodies, I mean \"patients,\" to take care of."
10042050-115 = "There're hiccups here and there, but Gehenna will go on rolling like it always has."
10042050-116 = "And of course, with the Prefect Team and its Head Prefect steering the ship, we..."
10042050-117 = "...Forgive me. I shouldn't be boasting about such things."
10042050-122 = "That aside, everyone just felt the ground shake, right?"
10042050-123 = "What could have enough mass to cause that kind of tremor?"
10042050-124 = "I did hear those deep booms earlier..."
10042050-125 = "Indeed you did."
10042050-126 = "And perhaps the \"search\" is no longer necessary."
10042050-127 = "[s] \"What...do you mean?\""
10042050-128 = "Better to show you than tell you."
10042050-129 = "Over there."
10042050-132 = "[log]Without another word, Sena pointed off into the distance.[/log]"
10042050-135 = "[log]There, we could all see...[/log]"

83304300200-21 = "3;히나;99;……잘은 모르겠지만, 선생님 쪽도 그쪽 나름대로 고생이라는 거네.\n#3;em;[…]"
83304300200-22 = "3;히나;05;흠. 이오리, 네 말대로 확실히 선도부로서 이것들을 그냥 내버려둘 수는 없겠어."

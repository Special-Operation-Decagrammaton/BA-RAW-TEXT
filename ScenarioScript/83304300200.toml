[translation]
83304300200-9 = "ฮึ่มม~! ทำไมถึงมีขยะอยู่ทุกหนทุนแห่งแบบนี้นะ!"
83304300200-15 = "อิโอริ? ทำอะไรอยู่น่ะ?"
83304300200-16 = "อ๊ะ ประธาน! ไม่ใช่อะไรหรอก ก็พวกใบปลิวที่อยู่เกลื่อนพื้นพวกนี้น่ะสิ!"
83304300200-17 = "เจ้าพวกแพนเดโมเนียม โซไซตี้... มาโปรยใบปลิวที่มีเนื้อหาพิลึกๆ ไว้ทั่วเลย!"
83304300200-18 = "ถึงเราจะต้องเริ่มการฝึกกันแล้ว แต่ฉันปล่อยเรื่องนี้ไปไม่ได้ ก็เลยกำลังตามเก็บใบปลิวอยู่น่ะ จะเรียกว่าเก็บขยะอยู่ก็ได้หรอกนะ"
83304300200-19 = "ตามที่ได้ยินมา ระหว่างไปโปรยใบปลิวพวกนั้นก็เกิดเหตุโกลาหลกันด้วย"
83304300200-20 = "เห็นว่าประธานมาโคโตะทำตัวแปลกๆ ไม่เป็นตัวเอง สมาชิกแพนเดโมเนียม โซไซตี้กับคุณครูก็เลย#nต้องช่วยกันห้ามไว้"
83304300200-21 = "ถึงจะไม่รู้รายละเอียดมาก แต่คุณครูก็น่าจะต้องเหนื่อยไม่น้อยเลยนะ..."
83304300200-22 = "ฮึ่ม อิโอริ ในฐานะคณะกรรมการวินัย ฉันว่าเราคงปล่อยเรื่องนี้ไปไม่ได้อย่างที่เธอว่า"
83304300200-26 = "เรายังเหลือเวลาอยู่นิดหน่อยก่อนจะเริ่มการฝึก"
83304300200-31 = "ฉันจะไปช่วยเก็บด้วยอีกแรง"
83304300200-33 = "ได้เลย งั้นก็ลุยกันเลย!"

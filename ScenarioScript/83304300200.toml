[translation]
83304300200-9 = "啊啊～！真的到處都是這類的垃圾！"
83304300200-15 = "伊織？你在做什麼？"
83304300200-16 = "啊，委員長你看！滿地都是傳單！"
83304300200-17 = "萬魔殿的那些傢伙……到處在發這些內容很奇怪的傳單！"
83304300200-18 = "雖然訓練就快開始了，還是沒辦法放任不管……所以就在回收這些垃圾。"
83304300200-19 = "……聽說在發傳單的過程，好像還發生了某些騷動。"
83304300200-20 = "好像是萬魔殿的成員跟老師，在阻止想作亂的真琴議長。"
83304300200-21 = "……這件事我不太清楚，不過老師和你都很辛苦呢。"
83304300200-22 = "嗯……就像伊織說的一樣，身為風紀委員會的一員，當然不能對這種事袖手旁觀。"
83304300200-26 = "……反正離訓練還有一點時間。"
83304300200-31 = "我也來幫忙撿吧。"
83304300200-33 = "好，一起加油吧！"

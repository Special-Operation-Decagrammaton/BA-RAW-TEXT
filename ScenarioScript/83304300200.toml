[translation]
83304300200-9 = "Urgh! There's trash everywhere!"
83304300200-15 = "Iori? What are you doing?"
83304300200-16 = "Head Prefect! Just look at all these flyers everywhere!"
83304300200-17 = "The Pandemonium Society were throwing flyers with weird slogans everywhere!"
83304300200-18 = "I could hardly leave our streets full of litter, so I started picking up this trash."
83304300200-19 = "...And I heard there was a commotion when the flyers were being passed out."
83304300200-20 = "Something about the Pandemonium Society club members and Sensei stopping Chairman Makoto from going on a rampage."
83304300200-21 = "...I'm not sure about the details, but it seems like Sensei is having a difficult time."
83304300200-22 = "Hmm. You've got the right idea, Iori. As members of the Prefect Team, we can't abide by litter in our streets."
83304300200-26 = "...We have some time until our training begins."
83304300200-31 = "Let's clean these flyers up together."
83304300200-33 = "Good! Let's get this over with!"

[translation]
1000603-1 = "Campus Break"
1000603-2 = "Gehenna Academy Campus"
1000603-3 = "I ran into Iori at Gehenna Academy again right as I was about to take a nap."
1000603-4 = "..."
1000603-5 = "What do you think you're doing here, Sensei...?"
1000603-6 = "[s] \"Taking a little break.\""
1000603-7 = "Then do it in the break room, or better yet, Schale's lounge."
1000603-8 = "Isn't the floor uncomfortable? It's all stony and bumpy."
1000603-9 = "[s] \"Hard stone floors are good for your back, actually.\""
1000603-10 = "Who chooses to be uncomfortable?"
1000603-11 = "I've been wondering, Sensei... You wouldn't happen to be some sort of masochist, would you?"
1000603-12 = "I noticed you seemed to enjoy getting stepped on and kicked last time... Is that the kind of thing you're into?"
1000603-13 = "I don't get you..."
1000603-14 = "[s] \"Why don't you try lying down and see for yourself?\""
1000603-15 = "No way. People will think I've lost my mind."
1000603-16 = "What? You think I'd change my tune if tried it?"
1000603-17 = "So you're saying that jumping to conclusions is a bad habit?"
1000603-18 = "Hmm... You have a point."
1000603-19 = "Still... Who takes a nap in the middle of the campus? It's weird."
1000603-20 = "But if you insist..."
1000603-27 = "[s] \"What do you think? It's nice how cool the stone floor is, isn't it?\""
1000603-28 = "No. It's hard and uncomfortable..."
1000603-29 = "I was right. You really are a perverted masochist..."
1000603-30 = "Gross..."
1000603-32 = "The misunderstandings between Iori and me continue to pile up."

[translation]
1000603-1 = "การพักผ่อนในสนามโรงเรียน"
1000603-2 = "สนามของสถาบันเกเฮนน่า"
1000603-3 = "(ในตอนที่กำลังจะแอบงีบที่สนามในโรงเรียน คุณครูก็บังเอิญไปเจออิโอริเข้า)"
1000603-4 = "......"
1000603-5 = "คุณครูมาทำอะไรอยู่ตรงนี้งั้นเหรอ..."
1000603-6 = "[s] \"กำลังพักผ่อนอยู่น่ะ\""
1000603-7 = "ถ้างั้นก็ไปนอนพักที่ห้องพักผ่อนหรือสำนักงานของชาเล่ต์ก็ได้นี่"
1000603-8 = "มานอนบนพื้นหินแข็งๆ แบบนี้คงไม่ค่อยสบายตัวเท่าไหร่..."
1000603-9 = "[s] \"นอนบนพื้นหินแบบนี้มันดีต่อสุขภาพหลังนะ\""
1000603-10 = "ชอบความลำบากงั้นเหรอ...."
1000603-11 = "คุณครู... ฉันว่าจะถามคุณครูตั้งนานแล้ว... คุณครูเป็นพวกมาโซคิสม์งั้นเหรอ?"
1000603-12 = "คราวก่อนที่ถูกเหยียบเท้าก็เหมือนกัน ดูเหมือนคุณครูจะเป็นพวกชอบความเจ็บปวดเลยนะ"
1000603-13 = "ไม่ปลื้มเลยแฮะ..."
1000603-14 = "[s] \"อิโอริลองนอนตรงนี้ดูบ้างมั้ยล่ะ?\""
1000603-15 = "ไม่เอาหรอก เดี๋ยวจะดูเหมือนพวกคนประหลาดเอาได้"
1000603-16 = "ถ้าลองนอนดูแล้วฉันอาจเปลี่ยนความคิดงั้นเหรอ?"
1000603-17 = "การตัดสินอะไรโดยไม่ลองก่อน เป็นสิ่งที่ไม่ควรทำ?"
1000603-18 = "อืม... ที่พูดมาก็ถูก..."
1000603-19 = "แต่ว่า... มานอนกลางสนามโรงเรียนทั้งที่แดดจ้าแบบนี้น่ะเหรอ มันแปลกๆ นะ"
1000603-20 = "แต่ว่าถ้าคุณครูยืนกรานแบบนั้นล่ะก็ฉันจะลองดู..."
1000603-27 = "[s] \"เป็นยังไงบ้าง พื้นหินเย็นๆ ทำให้รู้สึกดีใช่มั้ยล่ะ?\""
1000603-28 = "ไม่ล่ะ... มันแข็งจนนอนไม่สบายเลย..."
1000603-29 = "ฉันคิดไม่ผิดจริงๆ คุณครูเป็นพวกมาโซคิสม์ที่ชอบความเจ็บปวดจริงๆ ด้วย..."
1000603-30 = "ไม่ปลื้มเลย..."
1000603-32 = "(อิโอริเข้าใจคุณครูผิดมากกว่าเดิม...)"

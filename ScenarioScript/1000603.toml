[translation]
1000603-1 = "於中庭的休息"
1000603-2 = "格黑娜學園．中庭"
1000603-3 = "（正打算在格黑娜學園的中庭裡睡午覺時遇見了伊織）"
1000603-4 = "……"
1000603-5 = "老師，你躺在這種地方做什麼……"
1000603-6 = "[s] 「我在休息。」"
1000603-7 = "要休息的話，在休息室或夏萊的辦公室不就好了。"
1000603-8 = "躺在這種凹凸不平的硬石板上只會很痛吧。"
1000603-9 = "[s] 「堅硬的石地板能刺激腰部，意外的很舒服哦。」"
1000603-10 = "痛得很舒服是……"
1000603-11 = "老師……我之前就在想了，難道你喜歡痛的感覺嗎？"
1000603-12 = "上次被鞋踩的時候也是，感覺你故意在享受痛苦……"
1000603-13 = "……總覺得有點噁心。"
1000603-14 = "[s] 「伊織要不要也躺一下看看？」"
1000603-15 = "不要，那樣一定會被人當成瘋子。"
1000603-16 = "你說只要躺過一次，我的想法就會有所改變？"
1000603-17 = "沒有親身嘗試過就下定論是不好的？"
1000603-18 = "唔嗯……確實是那樣沒錯……"
1000603-19 = "不過白天就在中庭躺著睡午覺……很奇怪。"
1000603-20 = "但既然你都那麼說了，就試一次吧……"
1000603-27 = "[s] 「如何？涼爽的石地板很舒服吧？」"
1000603-28 = "……又硬又痛……"
1000603-29 = "老師果然是一個喜歡被折磨的變態啊……"
1000603-30 = "真噁心……"
1000603-32 = "（伊織的誤會又加深了……）"

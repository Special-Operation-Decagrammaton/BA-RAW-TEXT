[translation]
10048010-1 = "Episode 1;Cloudy With a Chance of Trade Goods"
10048010-2 = "[log]Two hours earlier...[/log]"
10048010-4 = "Wildhunt Art Academy Main Gate"
10048010-5 = "The Veronica Special Exhibition was about to open at Wildhunt Art Academy."
10048010-6 = "It was to be a showing of exquisite art pieces owned by the Veronica Company, makers of fine luxuries."
10048010-7 = "I was called to Wildhunt to complete the typical paper and administrative work that this event required."
10048010-8 = "And, of course, the inspection was underway."
10048010-11 = "If you want this done quickly, put your open bag in the tray and raise your hands over your head."
10048010-12 = "All I have is paint. Is this really necessary?"
10048010-13 = "We have updated regulations. Caffeinated drinks are now banned."
10048010-14 = "What does that have to do with anything? This is paint! For an art school!"
10048010-15 = "...You could have mixed high concentrations of caffeine into your paint."
10048010-16 = "Oh, of course."
10048010-17 = "...No! Wait, what are you talking about?! Who'd drink paint?!"
10048010-18 = "There was a painter who did long ago..."
10048010-19 = "Why would someone...? And at THESE prices?!"
10048010-20 = "Enough! These are special orders from the Prefectural Council Captain! Please comply!"
10048010-21 = "P-Prefectural Council Captain?!"
10048010-22 = "If it's her order, I guess I have no choice..."
10048010-26 = "Let's see... This paint..."
10048010-27 = "All of these brands are permitted. And they are all new, unopened products."
10048010-28 = "Very well. Pass."
10048010-33 = "Now, NEXT. Proceed through... Huh?"
10048010-34 = "Oh, you're Schale's Sensei, aren't you?"
10048010-35 = "[s] \"Hello. You seem to be working hard.\""
10048010-36 = "Haha. Yes. It's been busy."
10048010-37 = "But we have our orders from the top..."
10048010-38 = "So, will you comply with the inspection?"
10048010-39 = "[s] \"Of course. Go ahead.\""
10048010-40 = "Now then, I will inspect the contents of your bag."
10048010-44 = "...Ah!"
10048010-45 = "[s] \"Is there a problem...?\""
10048010-46 = "Sensei, I must confiscate this pottery mug."
10048010-47 = "All outside ceramics are currently banned from campus ingress."
10048010-48 = "[s] \"Why?!\""
10048010-49 = "Last month, we found several units of forbidden pigment hidden inside some pottery."
10048010-50 = "[s] \"...\""
10048010-52 = "And the strict inspection continued."
10048010-54 = "All done."
10048010-55 = "Come here before you leave, and we will return your confiscated items."
10048010-56 = "Welcome back to Wildhunt, Sensei."
10048010-57 = "[s] \"Yeah, thanks. Good work.\""
10048010-59 = "I entered Wildhunt's gates. And it only took an hour before..."
10048010-60 = "...I finished my task."
10048010-62 = "Wildhunt Park"
10048010-64 = "While strolling through the campus after my work, I found some empty grounds."
10048010-65 = "There was still a long walk to the front gates..."
10048010-66 = "[ns] \"Maybe I should rest here for a bit.\""
10048010-67 = "And just as I was about to sit on the bench..."
10048010-68 = "Hey! Hey! Watch out!"
10048010-69 = "[ns] \"What?\""
10048010-71 = "I saw something fall from the sky."
10048010-72 = "It was round, green, and unfortunately large..."
10048010-74 = "[ns] \"...A bundle?\""
10048010-78 = "And then I lost consciousness."
10048010-80 = "[ns] \"...So that's how I got here.\""
10048010-81 = "D-Do you remember?"
10048010-82 = "We carried your unconscious body back to our dorm."
10048010-83 = "[s] \"But... What hit me...?\""
10048010-84 = "Ah, well..."
10048010-85 = "...Just a few...smuggled goods."
10048010-86 = "[s] \"Smuggled goods?!\""
10048010-87 = "Yes. My friend used a catapult to shoot them over the academy's walls."
10048010-88 = "[s] \"A catapult?\""
10048010-89 = "You just happened to be at the landing...and got hit..."
10048010-90 = "Huuu... Sorry about that..."
10048010-91 = "I sincerely apologize on behalf of the Free Trade Cartel..."
10048010-92 = "I never wanted to represent a VIOLENT club..."
10048010-93 = "[s] \"It's fine. I'm not that hurt.\""
10048010-94 = "Anyway, my friend, Fuyu..."
10048010-95 = "I told her not to use the catapult... I thought this might happen."
10048010-97 = "Nah, it was the only way."
10048010-101 = "When did you get here?"
10048010-102 = "There was a really good, legitimate, and necessary reason for the catapult, Prez."
10048010-103 = "Fine. I'm prepared to hear your nonsense."
10048010-104 = "Ha, good. Because the reason is..."
10048010-106 = "It was cool!"
10048010-107 = "...Please stop talking."
10048010-108 = "Why?!"
10048010-109 = "Why do you think?! Your catapult hurt someone!"
10048010-110 = "I put a lot of padding in the bag! It was really cushioned."
10048010-111 = "Yes...to protect the goods! Don't act like it was because you cared that someone might get hit!"
10048010-112 = "[s] \"Um, everyone please calm down...\""
10048010-116 = "Oh, so Sensei's up! Wow."
10048010-117 = "Are you trying to change the subject?!"
10048010-118 = "Nice to meet you, Sensei. I am Wakasa Fuyu, the Sales Manager of the Free Trade Cartel. I also...dabble in tech."
10048010-119 = "Sales Manager? I never gave you that title..."
10048010-123 = "I picked you up some ointment from the infirmary. Just put it right on that bruise."
10048010-124 = "And here's my card, if you please."
10048010-125 = "When did you make business cards?!"
10048010-126 = "Every legitimate businesswoman needs a business card."
10048010-127 = "Um... You are aware that our club is ILLEGITIMATE, as in...illegal?"
10048010-128 = "Yeah, and you're running it."
10048010-129 = "I! Never! Wanted! To be President!"
10048010-130 = "Don't get so heated, Prez. Everything turned out fine, didn't it?"
10048010-131 = "Nevertheless, I'll admit that we...inconvenienced Sensei."
10048010-132 = "So, if you need a little...\"assistance,\" we'll give you a free consultation."
10048010-133 = "How can you talk business at a time like this...?"
10048010-134 = "[ns1] \"First, I have a question...\"\n[ns2] \"What exactly does the Free Trade Cartel do...?\""
10048010-137 = "Excellent question, Sensei."
10048010-138 = "Let me explain our workflow, step-by-step."
10048010-139 = "\"Step-by-step\"...?! We smuggle in banned contraband and sell it."
10048010-140 = "I'm sure you realized the necessity of our business from the moment you entered Wildhunt, Sensei."
10048010-141 = "Fuyu? Are you ignoring me?"
10048010-142 = "You, and all students, are subject to unjustified, strict, persistent, and invasive searches based on random whims."
10048010-143 = "Wildhunt students have needs. We're artists! We're not meant to be limited, especially by such an arbitrary and capricious ban list."
10048010-144 = "So, that's where the Cartel comes in."
10048010-145 = "We help the student get the thing they need, and we charge a small service fee...a price for freedom."
10048010-146 = "And I assure you that our fees are VERY reasonable."
10048010-147 = "We provide a...freedom to trade money for essential items. Hence the name \"Free Trade Cartel.\""
10048010-148 = "[s] \"But you're breaking the rules...!\""
10048010-149 = "Fufu, I understand how you might feel that way."
10048010-150 = "I have a proposal, Sensei."
10048010-151 = "How about you spend some time with us and evaluate our club's activities?"
10048010-152 = "And, after that, you can use your infinite wisdom to decide for YOURSELF if what we do is truly bad, regardless of what the academy tells you to think."
10048010-153 = "How would you like that? Would you like to shadow us for a bit? Perform an educated audit?"
10048010-154 = "[s3] \"If you would let me, sure.\"\n[s4] \"I am curious, after all.\""
10048010-157 = "Do you agree, Prez?"
10048010-158 = "Regardless of what Sensei and I think, you're the one in power."
10048010-159 = "..."
10048010-160 = "...Yes. I would like for them to see things as they really are."
10048010-161 = "All right, then..."
10048010-168 = "Miyo! I buried everything!"
10048010-172 = "[ns] \"...Buried what?\""

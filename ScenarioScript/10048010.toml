[translation]
10048010-1 = "ตอนที่ 1;ของปลอมที่หล่นลงมาจากฟากฟ้า"
10048010-2 = "[log]2 ชั่วโมงที่แล้ว...[/log]"
10048010-4 = "ประตูหน้า สถาบันศิลปะไวลด์ฮันต์"
10048010-5 = "(<นิทรรศการพิเศษเวโรนิก้า> จะจัดขึ้นที่ไวลด์ฮันต์เร็วๆ นี้)"
10048010-6 = "(นี่คือนิทรรศการสุดพิเศษที่จัดแสดงคอลเลกชันภาพวาดของมูลนิธิแบรนด์หรู 'เวโรนิก้า')"
10048010-7 = "(คุณครูแวะมาที่สถาบันศิลปะไวลด์ฮันต์ เนื่องจากมีงานธุรการเกี่ยวกับนิทรรศการนี้ที่ต้องจัดการ)"
10048010-8 = "(ระหว่างรอการตรวจสัมภาระที่เข้มงวดอันเป็นเอกลักษณ์เฉพาะของไวลด์ฮันต์)"
10048010-11 = "เอาละๆ ถ้าอยากผ่านเข้าไปเร็วๆ ก็เปิดกระเป๋าแล้วเอามาวางตรงนี้ แล้วก็ยกมือทั้ง 2 ข้างขึ้น"
10048010-12 = "อะไรกัน ในกระเป๋าฉันก็มีแค่สีเอาไว้วาดรูป แล้วทำไมต้องตรวจละเอียดยิบถึงขนาดนี้ด้วย?"
10048010-13 = "ตามกฎที่ปรับปรุงใหม่ของโรงเรียน เครื่องดื่มที่มีคาเฟอีนสูงเกินไปก็ถูกเพิ่มเข้าไปในรายการสิ่งของ#nต้องห้ามแล้วด้วย"
10048010-14 = "แล้วมันเกี่ยวกับฉันยังไง? ก็บอกอยู่นี่ไงว่าในกระเป๋าฉันมีแต่สีน่ะ"
10048010-15 = "อาจมีคาเฟอีนปริมาณสูงในสีพวกนั้นก็ได้นี่..."
10048010-16 = "อ๋อ"
10048010-17 = "จะบ้าหรือไง พูดอะไรเหลวไหลไปได้...?! แล้วใครจะไปกินสีวาดรูปไม่ทราบ?!"
10048010-18 = "เมื่อก่อนก็มีจิตรกรที่เคยทำแบบนั้นอยู่นะ..."
10048010-19 = "แล้วจะไปกินของแบบนั้นทำไม...!"
10048010-20 = "เอาเถอะ! พอดีว่า... มันเป็นคำสั่งพิเศษจากหัวหน้าฝ่ายดูแลหอพักของเราน่ะ! ขอความร่วมมือด้วยนะ!"
10048010-21 = "หะ... หัวหน้าฝ่ายดูแลหอพักเหรอ?!"
10048010-22 = "ถ้าเป็นคำสั่งจากท่านผู้นั้นก็คงช่วยไม่ได้..."
10048010-26 = "ไหนดูซิ สีนี้มัน..."
10048010-27 = "อืม เป็นยี่ห้อที่ได้รับอนุญาตตามกฎของโรงเรียนทั้งหมดสินะ แล้วก็เป็นของใหม่เอี่ยมที่ไม่มีร่องรอย#nการแกะพลาสติกออกเลยด้วย"
10048010-28 = "ดีละ งั้นก็ผ่านได้"
10048010-33 = "เอาละ คนต่อไป... หืม?"
10048010-34 = "เอ๋ คุณครูของชาเล่ต์ไม่ใช่เหรอคะ?"
10048010-35 = "[s] \"สวัสดี ทำงานหนักน่าดูเลยนะ\""
10048010-36 = "ฮ่าฮ่า แน่นอนค่ะ ค่อนข้างหนักเลยละ"
10048010-37 = "แต่เบื้องบนสั่งมาให้ทำนี่คะ ฉันจะไปว่าอะไรได้..."
10048010-38 = "เอาเป็นว่า ฉันขอความร่วมมือในการตรวจสอบหน่อยนะคะ"
10048010-39 = "[s] \"ได้อยู่แล้ว ตรวจได้ตามสบายเลย\""
10048010-40 = "เอาละ งั้นฉันขอตรวจกระเป๋าหน่อยค่ะ"
10048010-44 = "เฮือก..."
10048010-45 = "[s] \"มีปัญหาอะไรหรือเปล่า...?\""
10048010-46 = "คุณครูคะ ฉันต้องขอริบแก้วเซรามิกใบนี้ไว้นะคะ"
10048010-47 = "ตอนนี้โรงเรียนของเราห้ามนำผลิตภัณฑ์เซรามิกทุกชนิดเข้ามาค่ะ"
10048010-48 = "[s] \"ทำไมล่ะ?!\""
10048010-49 = "เมื่อเดือนที่แล้วเราตรวจพบการลักลอบนำเข้าวัสดุสีต้องห้ามโดยการผสมสีพวกนั้นในเครื่องปั้น#nเซรามิกน่ะค่ะ ก็เลย..."
10048010-50 = "[s] \"......\""
10048010-52 = "(การตรวจสอบสัมภาระที่เข้มงวดยังคงดำเนินต่อไป)"
10048010-54 = "เอาละ เสร็จแล้วค่ะ"
10048010-55 = "ตอนออกจากโรงเรียน ถ้าคุณครูมาแจ้งฉัน ฉันจะคืนให้ค่ะ"
10048010-56 = "ยินดีต้อนรับเข้าสู่ไวลด์ฮันต์ค่ะ คุณครู"
10048010-57 = "[s] \"อื้อ ขอบใจนะ ตรวจของเหนื่อยแย่เลย\""
10048010-59 = "(1 ชั่วโมงหลังจากคุณครูเข้ามาในไวลด์ฮันต์)"
10048010-60 = "(คุณครูก็ทำงานของตัวเองเสร็จ)"
10048010-62 = "สนามไวลด์ฮันต์"
10048010-64 = "(ระหว่างเดินผ่านสนามไวลด์ฮันต์หลังเสร็จงาน คุณครูก็สังเกตเห็นสวนว่างเปล่าที่ไม่มีคนอยู่เลย)"
10048010-65 = "(สวนนี้อยู่ห่างจากประตูหน้าพอสมควร...)"
10048010-66 = "[ns] \"พักสักหน่อยแล้วค่อยไปดีกว่า\""
10048010-67 = "(ในขณะที่กำลังจะนั่งลงบนม้านั่ง)"
10048010-68 = "ขอโทษนะคะ! ตรงนั้นน่ะค่ะ! หนีไปค่ะ!"
10048010-69 = "[ns] \"หืม?\""
10048010-71 = "(ตอนนั้นคุณครูเห็นบางอย่างกำลังตกลงมาจากท้องฟ้า)"
10048010-72 = "(เป็นทรงกลม สีเขียว ขนาดใหญ่...)"
10048010-74 = "[ns] \"ห่อผ้าเหรอ...?\""
10048010-78 = "(และในตอนนั้นเอง คุณครูก็สลบไป...)"
10048010-80 = "[ns] \"ครูก็เลยมาตื่นอยู่ที่นี่สินะ...\""
10048010-81 = "จะ... จำได้แล้วเหรอคะ?"
10048010-82 = "ใช่แล้วค่ะ พวกฉันเป็นคนพาคุณครูที่สลบมาที่หอพักค่ะ"
10048010-83 = "[s] \"ว่าแต่... ห่อผ้าเมื่อกี้มันคือ...?\""
10048010-84 = "อ้อ อันนั้น..."
10048010-85 = "คือสินค้าที่ลักลอบนำเข้ามาค่ะ..."
10048010-86 = "[s] \"สินค้าลักลอบนำเข้า?!\""
10048010-87 = "ใช่ค่ะ มันเป็นสินค้าที่เราลักลอบนำเข้ามาโดยใช้เครื่องยิงจากนอกโรงเรียน..."
10048010-88 = "[s] \"ใช้เครื่องยิงเลยเหรอ?\""
10048010-89 = "แต่คุณครูนั่งอยู่ตรงจุดที่สินค้าจะตกลงมาพอดี... ก็เลยโดนเข้าไปเต็มๆ..."
10048010-90 = "ฮือออ... ขอโทษนะคะ..."
10048010-91 = "ฉันขออภัยในนามของชมรมการค้าพิเศษค่ะ..."
10048010-92 = "ถึงจะไม่อยากเป็นตัวแทนของชมรมแบบนี้เลยก็เถอะ..."
10048010-93 = "[s] \"ไม่เป็นไร ครูไม่ได้บาดเจ็บอะไรมากหรอก\""
10048010-94 = "จะว่าไป ยัยฟุยุ..."
10048010-95 = "ฉันอุตส่าห์เตือนแล้วว่าอย่าใช้เครื่องยิง เพราะอาจเกิดเรื่องแบบนี้ได้..."
10048010-97 = "ไม่ได้หรอก ก็ตอนนั้นเราจำเป็นต้องใช้นี่นา"
10048010-101 = "อะไรกัน มาตั้งแต่เมื่อไรคะ?"
10048010-102 = "ฉันมีเหตุผลที่เหมาะสมที่ต้องใช้เครื่องยิงนะ หัวหน้า"
10048010-103 = "ฉันรู้ว่าเป็นเรื่องเหลวไหล แต่ก็จะลองฟังดูค่ะ ไหนลองบอกมาสิคะ"
10048010-104 = "ฮุฮุ เหตุผลที่ว่าก็คือ..."
10048010-106 = "ก็มันเท่ดีไง!"
10048010-107 = "ต่อไปไม่ต้องพูดอะไรแล้วนะคะ..."
10048010-108 = "ทำไมล่ะ?!"
10048010-109 = "ถามมาได้นะคะ?! ก็มีคนต้องเจ็บตัวเพราะเครื่องยิงยังไงล่ะคะ!"
10048010-110 = "ฉันก็เลยห่อบับเบิลกันกระแทกไว้หลายๆ ชั้นแล้วไง!"
10048010-111 = "นั่นเป็นการทำเพื่อปกป้องตัวสินค้าต่างหากล่ะคะ! ไม่ได้ทำเพราะนึกถึงคนที่เดินๆ อยู่แล้วโดน#nสินค้าหล่นใส่หัวสักหน่อยค่ะ!"
10048010-112 = "[s] \"นี่ ครูว่าพวกเราใจเย็นๆ ก่อนนะ...\""
10048010-116 = "อ๊ะ ฟื้นแล้วสินะคะ คุณครู"
10048010-117 = "คิดจะเปลี่ยนเรื่องพูดงั้นเหรอคะ?!"
10048010-118 = "ยินดีที่ได้รู้จักค่ะ คุณครู ฉันชื่อวากาสะ ฟุยุ เป็นหัวหน้าฝ่ายธุรกิจของชมรมการค้าพิเศษค่ะ งานเกี่ยวกับเทคนิคฉันก็เป็นคนดูแลอยู่ค่ะ"
10048010-119 = "เป็นหัวหน้าเองตามใจเลยนะคะ... ฉันไม่เคยแต่งตั้งตำแหน่งแบบนั้นในชมรมสักหน่อย..."
10048010-123 = "นี่คือยาทาที่ฉันได้มาจากห้องพยาบาลค่ะ เอาไปทาตรงที่ฟกช้ำก่อนนะคะ..."
10048010-124 = "ส่วนนี่ก็นามบัตรของฉันค่ะ ช่วยรับไปด้วยนะคะ"
10048010-125 = "ไปทำนามบัตรมาตั้งแต่ตอนไหนน่ะ?!"
10048010-126 = "ของแบบนี้มันเป็นเรื่องพื้นฐานของการทำธุรกิจอยู่แล้ว"
10048010-127 = "คือนี่... รู้อยู่ใช่มั้ยคะว่าชมรมของเราเป็นชมรมที่ทำเรื่องผิดกฎหมายน่ะ?"
10048010-128 = "แล้วเธอก็เป็นหัวหน้าชมรมผิดกฎหมายนี่ด้วย"
10048010-129 = "คิดว่า! ฉันเป็น! หัวหน้า! เพราะอยากเป็น! เหรอคะ!"
10048010-130 = "อย่าวีนไปเลยน่า หัวหน้า ยังไงเราก็ปิดจ๊อบได้อย่างไร้ปัญหานี่นา"
10048010-131 = "แต่ถึงยังไงก็ต้องยอมรับว่าพวกฉันทำให้คุณครูพลอยเดือดร้อนไปด้วย..."
10048010-132 = "ถ้าคุณครูอยากได้ 'ความช่วยเหลือ' อะไรละก็ คำขอแรกฉันจะทำให้ฟรีเลยค่ะ"
10048010-133 = "อยู่ในสถานการณ์นี้แล้วจะยังหาลูกค้าอยู่อีก..."
10048010-134 = "[ns1] \"ว่าแต่... ครูสงสัยว่าชมรมนี้ทำอะไรกันน่ะ...?\"\n[ns2] \"ชมรมการค้าพิเศษทำกิจกรรมอะไรกันแน่น่ะ...?\""
10048010-137 = "เป็นคำถามที่ดีเลยค่ะ คุณครู"
10048010-138 = "งั้นฉันจะค่อยๆ อธิบายให้ฟังเลยค่ะ"
10048010-139 = "จะมีอะไรให้ต้องค่อยๆ อธิบายกันคะ... เราก็แค่ชมรมที่ลักลอบนำเข้าสินค้าต้องห้ามของโรงเรียน#nแล้วเอามาขายก็เท่านั้น"
10048010-140 = "ก็อย่างที่คุณครูได้เห็นตอนเข้ามาที่ไวลด์ฮันต์ละค่ะ"
10048010-141 = "คุณฟุยุ? เมินคำพูดของฉันเหรอคะ?"
10048010-142 = "จากการตรวจสัมภาระที่เข้มงวดทุกระเบียดนิ้ว และการควบคุมที่ไม่สมเหตุสมผล..."
10048010-143 = "นักเรียนหลายคนในไวลด์ฮันต์ก็เลยเอาของที่ตัวเองต้องการและจำเป็นต้องใช้เข้ามาในโรงเรียนไม่ได้ ด้วยเหตุผลที่ไม่ยุติธรรมว่าของพวกนั้นเป็นสิ่งของต้องห้าม"
10048010-144 = "พวกฉันก็เลยต้องเข้ามามีบทบาทยังไงล่ะคะ"
10048010-145 = "ชมรมการค้าพิเศษจะนำเข้าสินค้าที่ลูกค้าต้องการเข้ามาในโรงเรียน แล้วก็รับค่าธรรมเนียมจากคำขอ#nพวกนั้นค่ะ"
10048010-146 = "แล้วก็รับในราคาที่สมเหตุสมผลมากด้วยค่ะ"
10048010-147 = "การทำ 'การค้า' ด้วยวิธีที่ 'พิเศษ' นิดหน่อย นี่ละค่ะงานของ 'ชมรมการค้าพิเศษ' ของพวกฉัน"
10048010-148 = "[s] \"สุดท้ายแล้วก็เป็นการฝ่าฝืนกฎของโรงเรียนนี่นา...!\""
10048010-149 = "ฮุฮุ ฉันเข้าใจค่ะว่าทำไมถึงคิดแบบนั้น"
10048010-150 = "งั้นเอาแบบนี้มั้ยล่ะคะ คุณครู?"
10048010-151 = "ลองมาสังเกตการณ์กิจกรรมชมรมของพวกฉันด้วยตัวเองดูสิคะ"
10048010-152 = "แล้วคุณครูจะตัดสินได้เองค่ะว่าสิ่งที่พวกฉันทำเป็นเรื่องไม่ดีจริงๆ หรือเปล่า ถ้าไม่เอากฎของโรงเรียน#nเข้ามาเกี่ยวข้องด้วย"
10048010-153 = "ว่ายังไงล่ะคะ ลองมาสังเกตการณ์ดูสักงานมั้ยคะ?"
10048010-154 = "[s3] \"ถ้าอนุญาต ครูก็ยินดีนะ\"\n[s4] \"ที่จริงครูก็อยากรู้อยู่เหมือนกัน\""
10048010-157 = "แล้วหัวหน้าของเราล่ะ คิดว่าไง?"
10048010-158 = "ถึงฉันกับคุณครูจะเห็นพ้องต้องกันแล้วก็จริง แต่สุดท้ายแล้วอำนาจการตัดสินใจในเรื่องแบบนี้ก็อยู่ที่#nหัวหน้านี่นา"
10048010-159 = "......"
10048010-160 = "ค่ะ... ฉันก็ควรให้คุณครูได้เห็นการทำงานตามจริงของเราค่ะ"
10048010-161 = "ดีละ ถ้างั้นก็..."
10048010-168 = "มิโยะจัง! ฉันเอาไปฝังไว้ให้หมดแล้ว!"
10048010-172 = "[ns] \"ฝังอะไรนะ...?\""

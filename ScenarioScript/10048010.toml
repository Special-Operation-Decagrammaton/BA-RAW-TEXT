[translation]
10048010-1 = "第1話;如果交易品從天而降"
10048010-2 = "[log]兩小時前……[/log]"
10048010-4 = "狂獵藝術學院正門"
10048010-5 = "（不久後，狂獵即將舉辦「Veronica特展」）"
10048010-6 = "（這是一場展示名牌「Veronica」持有者的財團，其畫作收藏的特展）"
10048010-7 = "（由於有相關的行政業務要處理，因而來到了狂獵藝術學院）"
10048010-8 = "（再次面臨了那獨有且嚴格的安全檢查）"
10048010-11 = "來來來，想快點通過就把包包打開放在這裡，再把雙手舉高。"
10048010-12 = "不是，我的包包裡除了顏料之外什麼都沒有。#n真的有必要逐一檢查到這種程度嗎？"
10048010-13 = "依照這次更新的校規，咖啡因過高的飲料也被新增到禁止攜帶的品項之中了。"
10048010-14 = "那跟我有什麼關係？#n我的包包裡只有顏料而已啊？"
10048010-15 = "……不能排除在顏料裡混入了高濃度咖啡因的可能性。"
10048010-16 = "原來如此啊。"
10048010-17 = "……不是，你在跟我開玩笑啊！？#n到底誰會喝顏料啦！？"
10048010-18 = "以前真的有畫家曾經做過這種事……"
10048010-19 = "為什麼會想吃那個……！"
10048010-20 = "總之，這是舍監隊長的特別指示！麻煩配合一下！"
10048010-21 = "你，你說舍監隊長！？"
10048010-22 = "既然是那位大人的指示也沒辦法了……"
10048010-26 = "讓我看看。#n這些顏料……"
10048010-27 = "嗯，全都是校規允許的品牌。#n包裝也沒有拆封過的痕跡，可以認定是新品。"
10048010-28 = "好，可以通過。"
10048010-33 = "下一位……嗯？"
10048010-34 = "哎呀，您是夏萊的老師吧？"
10048010-35 = "[s]「你好，辛苦了。」"
10048010-36 = "哈哈，確實很辛苦呢。"
10048010-37 = "不過既然收到了上頭的指示，我們也只能照做……"
10048010-38 = "再麻煩您配合檢查囉？"
10048010-39 = "[s]「當然。你隨意檢查沒關係。」"
10048010-40 = "那麼，我來檢查一下您的包包。"
10048010-44 = "啊……"
10048010-45 = "[s]「有什麼問題嗎……？」"
10048010-46 = "老師，這個陶瓷馬克杯我得先扣留。"
10048010-47 = "現在所有陶瓷製品都禁止帶入校內了。"
10048010-48 = "[s]「為什麼！？」"
10048010-49 = "因為上個月查到有人試圖將被禁止的顏料，固化成陶瓷的形狀後偷渡進來……"
10048010-50 = "[s]「……」"
10048010-52 = "（就這樣進行著細緻到近乎苛刻的檢查）"
10048010-54 = "好，這樣就結束了。"
10048010-55 = "離開時再麻煩跟我們說一聲，我們會將扣留的物品歸還給您。"
10048010-56 = "歡迎來到狂獵，老師。"
10048010-57 = "[s]「嗯，謝謝。辛苦你了。」"
10048010-59 = "（進入狂獵之後，經過大約一個小時）"
10048010-60 = "（工作順利地結束了）"
10048010-62 = "狂獵空地"
10048010-64 = "（完成工作後，行走在狂獵校園裡時，發現了一片空無一人的空地）"
10048010-65 = "（距離正門還有一段距離……）"
10048010-66 = "[ns]「就在這裡稍微休息一下吧。」"
10048010-67 = "（正打算坐在長椅上休息的瞬間）"
10048010-68 = "那邊的人！快閃開！"
10048010-69 = "[ns]「嗯？」"
10048010-71 = "（依稀看見某個東西從天上掉了下來）"
10048010-72 = "（是個圓形、綠色，而且相當巨大的……）"
10048010-74 = "[ns]「……包裹？」"
10048010-78 = "（……接著下一秒便失去了意識）"
10048010-80 = "[ns]「……然後就在這裡醒來了。」"
10048010-81 = "你，你想起來了嗎？"
10048010-82 = "沒錯，是我們把昏倒的老師搬到宿舍來的。"
10048010-83 = "[s]「所以……那個包裹到底是……？」"
10048010-84 = "啊，那個……"
10048010-85 = "……是走私品。"
10048010-86 = "[s]「走私品！？」"
10048010-87 = "是的。是我們為了運進校內，從學院外用投石機發射進來的……"
10048010-88 = "[s]「投石機？」"
10048010-89 = "老師剛好待在落點上……結果就被砸中了……"
10048010-90 = "嗚嗚嗚……對不起……"
10048010-91 = "我代表特殊交易部向你道歉……"
10048010-92 = "雖然我本來也不想當什麼部長的……"
10048010-93 = "[s]「沒關係，反正也沒有受什麼嚴重的傷。」"
10048010-94 = "不過冬也真是的……"
10048010-95 = "我之前明明說過可能會出事，所以盡量別用投石機的……"
10048010-97 = "不，當下就只有這個辦法了。"
10048010-101 = "你什麼時候來的？"
10048010-102 = "我有不得不用投石機的理由啊，部長。"
10048010-103 = "雖然覺得你又會胡說八道，不過就說來聽聽吧。"
10048010-104 = "呵呵，那是因為……"
10048010-106 = "這樣很帥啊！"
10048010-107 = "……請你接下來都把嘴巴閉起來。"
10048010-108 = "為什麼！？"
10048010-109 = "這還用問嗎！？#n投石機都砸到人了耶！"
10048010-110 = "所以我才塞了一堆緩衝材料在包裹裡啊！"
10048010-111 = "你那是為了保護走私品，最好是為了保護被砸中的路人啦！"
10048010-112 = "[s]「那個，大家先冷靜下來……」"
10048010-116 = "啊，你醒啦，老師。"
10048010-117 = "直接轉移話題了！？"
10048010-118 = "初次見面，老師。我是特殊交易部的營業室長，若狹冬。#n同時也負責所有技術相關的業務。"
10048010-119 = "到底是誰同意你當室長的……我可從來沒給過那種職位……"
10048010-123 = "這是我從保健室拿來的藥膏，請塗在瘀青的地方……"
10048010-124 = "還有這是我的名片。請收下。"
10048010-125 = "你什麼時候印了名片啊！？"
10048010-126 = "隨身攜帶名片，可是商務人士的基本素養啊。"
10048010-127 = "那個……你知道我們社團是非法組織吧？"
10048010-128 = "我還知道你就是這個非法組織的首腦哦。"
10048010-129 = "我！看起來！像是自願擔任部長的嗎！？"
10048010-130 = "你先冷靜點嘛，部長。#n至少現在不是圓滿落幕了嗎？"
10048010-131 = "話雖如此，我們造成了老師的困擾也是事實……"
10048010-132 = "如果老師之後需要「幫助」的話，第一次委託就算你免費吧！"
10048010-133 = "都這種時候了還想著做生意……"
10048010-134 = "[ns1]「那個，我其實有個根本性的疑問……」\n[ns2]「特殊交易部到底在做什麼啊……？」"
10048010-137 = "這個問題問得很好，老師。"
10048010-138 = "接下來就由我一一向你說明吧。"
10048010-139 = "有什麼好一一說明的……不就只是偷偷把校規禁止的東西走私進來賣掉而已嗎。"
10048010-140 = "老師進入狂獵的時候應該也有看到才對。"
10048010-141 = "冬同學？你現在是在無視我嗎？"
10048010-142 = "嚴格到近乎執著的檢查，以及不合常理的管制措施……"
10048010-143 = "因此狂獵的學生就算真的很想要某樣東西，#n也經常會因為「禁止品項」這種莫名其妙的理由而無法帶進校內。"
10048010-144 = "這種時候，就輪到我們登場了。"
10048010-145 = "我們會把委託人想要的物品送進校內，並向委託人收取服務費。"
10048010-146 = "而且價格非常合理哦？"
10048010-147 = "運用略顯「特殊」的方法進行「交易」……這就是我們「特殊交易部」的工作。"
10048010-148 = "[s]「但這樣終究還是違反校規吧……！」"
10048010-149 = "呵呵，你會這麼想也無可厚非。"
10048010-150 = "那不如這樣吧，老師？"
10048010-151 = "你可以直接來參觀我們的社團活動。"
10048010-152 = "這樣應該就能判斷我們的行為，究竟是不是真的在做壞事了吧。"
10048010-153 = "怎麼樣？有沒有興趣呢？"
10048010-154 = "[s3]「你們如果願意的話，我很樂意。」\n[s4]「其實我也有點好奇。」"
10048010-157 = "部長的意見如何？"
10048010-158 = "就算老師和我都同意了，最終決定權還是在部長手上。"
10048010-159 = "……"
10048010-160 = "……好吧。#n就先帶老師實地觀察看看吧。"
10048010-161 = "很好，那麼……"
10048010-168 = "美代醬！我全都埋好囉！"
10048010-172 = "[ns]「……埋好什麼？」"

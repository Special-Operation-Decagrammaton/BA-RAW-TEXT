1001320-39 = "是的，剛看完電影……"
1001320-40 = "[s3] 「原來如此，是那麼回事啊。」\n[s4] 「難道說，收集這些是妳的興趣？」"
1001320-41 = "是，是啊……該說是，沒辦法丟掉嗎……"
1001320-42 = "是，是啊……該說是，沒辦法丟掉嗎……"
1001320-43 = "會，會很怪嗎……？聽說大部分的人，都會丟掉……"
1001320-44 = "啊，是，是嗎……能聽到您這麼說，就安心了……"
1001320-45 = "……咦？啊，是的。家裡是有很多……？"
1001320-49 = "……想，想看其他的！？那，那是……！"
1001320-50 = "確，確實，如果有什麼是老師知道的，可以一起聊天的話我會很高興……"
1001320-51 = "這個，那個……"
1001320-52 = "咕嘻，"
1001320-53 = "嘻嘻嘻嘻嘻嘻嘻嘻！"
1001320-57 = "不，不好意思……"
1001320-58 = "又一個人在擅自推測……"
1001320-59 = "[s5] 「不會，不如說如果弦生可以的話。」\n[s6] 「我才是，如果能有什麼共通話題的話我會很高興。」"
1001320-60 = "……！？"
1001320-61 = "……！？"
1001320-62 = "真，真的嗎……！不，不過，那個……"
1001320-63 = "那個，如果是在顧慮我的話，那個……"
1001320-64 = "……不。這種說法反而，更失禮呢。"
1001320-65 = "那麼那個，您不介意的話……"
1001320-70 = "（弦生的房間，被整理的相當乾淨）"

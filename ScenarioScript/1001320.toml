1001320-90 = "那是叫，《魔法海鮮籃》的漫畫……"
1001320-91 = "那，那是那個，《秒速五光年》呢……是SF戀愛的類型……"
1001320-92 = "那是《錫達尼號》……雖然是以前的電影，不過最近再上映……"
1001320-93 = "那個，這邊是……"
1001320-94 = "……"
1001320-95 = "……老師？"

1001320-110 = "和老師一起，看電影……"
1001320-111 = "和老師一起，看電影……"
1001320-112 = "……"
1001320-113 = "咿嘻，"
1001320-114 = "咿嘻嘻嘻……！"
1001320-115 = "咿哈哈哈哈哈哈！"
1001320-116 = "[s]移動到稍微遠一點的地方"
1001320-117 = "呀哈哈哈哈哈哈哈！！！"
1001320-124 = "[ns13] 「……宣傳手冊沒事真是太好了。」\n[ns14] 「弦生高興的話就再好不過了。」"
1001320-127 = "（那之後，和冷靜下來的弦生一起開始整理房間）"

1001320-72 = "如果知道會這樣的話，再稍微整理……"
1001320-73 = "啊，現在不是說這個的時候，那個……馬，馬上拿來！！"
1001320-86 = "[ns7] 「好厲害……」\n[ns8] 「相當多的數量呢。」"
1001320-87 = "是，是的。從很久以前，就開始……"
1001320-88 = "是，是的。從很久以前，就開始……"

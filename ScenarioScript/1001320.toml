[translation]
1001320-1 = "กล่องแสนพิเศษ"
1001320-2 = "(คุณครูออกมาที่ย่านการค้าแห่งหนึ่ง เลยใช้โอกาสนี้เดินเล่นพักผ่อนไปในตัว)"
1001320-3 = "(คุณครูเจอซึรุกิยืนป้วนเปี้ยนอยู่ที่ด้านหน้าโรงภาพยนตร์ในย่านการค้า)"
1001320-4 = "คิๆๆ... คิกๆๆ..."
1001320-9 = "คิกๆๆๆ แฮ่ๆๆ...!!"
1001320-13 = "อะ...อะไรกันน่ะ? ทำไมเด็กคนนั้นเป็นแบบนั้นล่ะ...?"
1001320-14 = "ชู่ว! เงียบๆ สิ ขืนพูดอะไรไม่เข้าท่าแล้วเผลอไปสบตากับเธอเข้าจะทำยังไง..."
1001320-21 = "คิกๆๆๆ... กรั่กๆๆ...!!"
1001320-23 = "ฮะ... เฮือก!"
1001320-27 = "นะ...นี่! รอด้วยสิ!!"
1001320-32 = "หึหึหึ... หือ...?"
1001320-33 = "[s1] \"ว่าไง ซึรุกิ\"\n[s2] ทักทายด้วยมือที่สั่นเทา"
1001320-34 = "...?!"
1001320-35 = "...?!"
1001320-36 = "เฮือกกก...?! คะ... คุณครู... ทำไมคุณครูถึงมาอยู่ที่นี่..."
1001320-37 = "คะ? ฉันถืออะไร... อยู่ในมืองั้นเหรอคะ?"
1001320-38 = "อา... คือว่านี่มัน... ตั๋วหนังกับแผ่นพับที่ได้มาตอนดูหนังเสร็จค่ะ"
1001320-39 = "คะ... ค่ะ ฉันเพิ่งจะ... ไปดูมา... เมื่อกี้ค่ะ"
1001320-40 = "[s3] \"หนังจบแล้วก็ยังไม่ยอมทิ้งเลยแฮะ\"\n[s4] \"ซึรุกิชอบเก็บสะสมตั๋วหนังเหรอ\""
1001320-41 = "คะ... ค่ะ ฉะ...ฉันแค่ไม่อยาก... ทะ...ทิ้งมันไปเท่านั้น..."
1001320-42 = "ชะ...ใช่ค่ะ... ฉะ...ฉันก็แค่... มะ...ไม่อยากทิ้งค่ะ..."
1001320-43 = "ดูแปลกๆ ใช่มั้ยคะ...? ที่เก็บตั๋วที่ดูเสร็จแล้วไว้แบบนี้..."
1001320-44 = "ไม่แปลกงั้นเหรอคะ... ขอบคุณนะคะ คุณครูพูดแบบนั้นฉันก็โล่งใจค่ะ"
1001320-45 = "คะ? ฉันมีเก็บไว้อีกรึเปล่าเหรอคะ? กะ...เก็บไว้เยอะเลยค่ะ... คะ...คุณครูถามทำไม... เหรอคะ"
1001320-49 = "ระ...หรือว่า... คุณครูอยากดูงั้นเหรอคะ?! ตั๋วพวกนั้นน่ะเหรอคะ?"
1001320-50 = "บางทีคุณครูก็อาจจะเจอเรื่องที่น่าสนใจก็ได้..."
1001320-51 = "ฉันเอามาให้ดูก็ได้ค่ะ..."
1001320-52 = "คิกๆ..."
1001320-53 = "คิกๆๆ กรั่กๆๆ...!!"
1001320-57 = "ปะ...เปล่าค่ะ ไม่ใช่นะคะ"
1001320-58 = "ขอโทษด้วยค่ะคุณครู ที่ฉันเผลอคิดอะไรเรื่อยเปื่อยไปคนเดียว..."
1001320-59 = "[s5] \"ไม่หรอก ขอบคุณนะ ครูดูได้แน่ใช่มั้ย?\"\n[s6] \"โอ้ งานอดิเรกของซึรุกิงั้นเหรอ หายากมากเลยนะ\""
1001320-60 = "...?!"
1001320-61 = "...?!"
1001320-62 = "จริงเหรอคะ ที่คุณครูพูดเมื่อกี้..."
1001320-63 = "ถ้าคุณครูเป็นห่วงฉันละก็... ไม่ต้องเป็นห่วงก็ได้นะคะ..."
1001320-64 = "มะ...ไม่ใช่นะคะ พูดแบบนี้คงเป็นการเสียมารยาทกับคุณครูสินะคะ... เข้าใจแล้วค่ะ"
1001320-65 = "ถ้างั้นคุณครู... ถ้าคุณครูยินดี ก็เชิญทางนี้ค่ะ..."
1001320-70 = "(คุณครูเดินตามซึรุกิเข้าไปในห้องที่ตกแต่งไว้อย่างเรียบง่าย และจัดวางสิ่งของอย่างเป็นระเบียบ)"
1001320-71 = "ชะ...เชิญเลยค่ะคุณครู หะ...ห้องอาจจะโทรมไปหน่อย..."
1001320-72 = "ถ้าฉันรู้ว่าคุณครูจะมา กะ...ก็คงจะทำความสะอาดให้ดีกว่านี้..."
1001320-73 = "มะ...ไม่สิ เรื่องนั้นไม่ใช่ประเด็นสักหน่อย... เชิญนั่งตามสบายเลยนะคะ ฉันจะไปหยิบของมาค่ะ!!"
1001320-86 = "[ns7] \"ว้าว....\"\n[ns8] \"สุดยอดเลย คงสะสมมานานแล้วสินะ\""
1001320-87 = "ค่ะ ฉันเก็บมาตั้งแต่เมื่อก่อนแล้ว..."
1001320-88 = "ค่ะ ฉันเก็บมาตั้งแต่เมื่อก่อนแล้ว..."
1001320-89 = "คะ...? มีอย่างอื่นอยู่เยอะเลยงั้นเหรอคะ? ค่ะ แต่ก็มีอยู่ไม่เยอะหรอกค่ะ"
1001320-90 = "อา... นั่นเป็นหนังสือการ์ตูนค่ะ เป็นการ์ตูนวัยรุ่น ชื่อ <ฟิช บาสเก็ต> ค่ะ"
1001320-91 = "อะ...อันนั้นเป็นบลูเรย์หนังแนวเมโลดราม่า เรื่อง <5 ปีแสงต่อวินาที>..."
1001320-92 = "ส่วนอันนั้นเป็นแผ่นพับหนังโรแมนติกชื่อ <โทไทนิค> ค่ะ เป็นหนังค่อนข้างเก่าแล้ว แต่เพิ่งเอามา#nฉายใหม่เมื่อไม่นานมานี้ค่ะ..."
1001320-93 = "อ๊ะ ส่วนอันนั้น..."
1001320-94 = ".........."
1001320-95 = "คุณครู...?"
1001320-96 = "[s9] \"ซึรุกิชอบแนวนี้จริงๆ สินะ\"\n[s10] \"เคยโชว์ให้คนอื่นดูบ้างมั้ย?\""
1001320-97 = "อา... คือว่า... "
1001320-98 = "อา... คือว่า... "
1001320-99 = "คะ? มะ...ไม่ใช่ค่ะ ฉันไม่ได้ตั้งใจจะปิดเอาไว้หรอกค่ะ แต่ว่าคนอื่นดูไม่ค่อยสนใจเรื่องพวกนี้เท่าไร..."
1001320-100 = "บางครั้งก็จะดูของพวกนี้ด้วยสีหน้าแปลกๆ หรือว่าหลับไปตอนที่ดูอยู่บ่อยๆ ..."
1001320-101 = "เพราะงั้นตอนนี้เลยมีแค่ฉันที่ดูคนเดียวค่ะ"
1001320-102 = "คะ...?"
1001320-103 = "อา... คุณครูบอกว่าถ้าจะไปดูหนัง... ก็ให้ชวนคุณครูไปด้วยได้... งั้นเหรอคะ?"
1001320-104 = "ถะ...ถ้าคุณครูไปด้วยจริงๆ ฉันก็รู้สึกซาบซึ้งค่ะ..."
1001320-105 = "...."
1001320-106 = "อ่า... คะ...?"
1001320-107 = "คุณครู...? เมื่อกี้คุณครู..."
1001320-108 = "ชะ...ชวนดูหนังด้วยกันเหรอคะ...? กับฉันเหรอคะ...? จะ...จะดูหนัง... หรือดูซีรีส์ก็ได้เหรอคะ...?"
1001320-109 = "[s11] \"ถ้าซึรุกิชอบ ครูก็ได้หมดนะ\"\n[s12] \"ถ้าซึรุกิยอมให้ครูดูด้วย ครูยังไงก็ได้เลย\""
1001320-110 = "คะ... คุณครูกับฉัน... ปะ...ไปดูหนังในโรงหนัง..."
1001320-111 = "คะ... คุณครูกับฉัน... ปะ...ไปดูหนังในโรงหนัง..."
1001320-112 = "คิ..."
1001320-113 = "คิกๆๆ..."
1001320-114 = "เคียกกกกๆๆๆ...!!"
1001320-115 = "กรั่กๆๆ คิกๆๆ...!!"
1001320-116 = "[s] พาหลบไปยังที่เงียบๆ อย่างคล่องแคล่ว"
1001320-117 = "วะฮะฮะฮ่าฮ่าฮ่า--!!!"
1001320-124 = "[ns13] \"โชคดีที่กล่องไม่เสียหายนะ\"\n[ns14] \"ดูสนุกใหญ่เลย ดีจังเลยน้า ซึรุกิ\""
1001320-127 = "(หลังจากนั้นพอซึรุกิกลับมา ทั้งสองคนก็ช่วยกันเก็บกวาดบริเวณรอบๆ ที่เละเทะไปหมด)"
1001320-128 = "(ระหว่างที่ซึรุกิกำลังทำความสะอาดอยู่ เธอก็ยิ้มและหัวเราะอย่างมีความสุข)"

[translation]
1001320-1 = "特別的箱子"
1001320-2 = "（偶然有了空閒時間，散步的順便來到了購物中心）"
1001320-3 = "（……在電影院前，發現弦生在那裡徘徊）"
1001320-4 = "嘻嘻，"
1001320-9 = "嚇哈……！"
1001320-13 = "吶，那邊那孩子……"
1001320-14 = "噓──小聲一點！不可以對上眼！會被吃掉的！"
1001320-21 = "嚇哈哈哈哈哈哈！！"
1001320-23 = "噫……！"
1001320-27 = "呃，喂！別丟下我啊！！"
1001320-32 = "……？"
1001320-33 = "[s1] 「呀，弦生。」\n[s2] 揮手打招呼"
1001320-34 = "……！？"
1001320-35 = "……！？"
1001320-36 = "老，老師……！？為，為什麼老師會在這裡……"
1001320-37 = "咦……這個，嗎……？"

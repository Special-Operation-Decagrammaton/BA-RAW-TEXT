[translation]
206-1 = "The World of Signs"
206-5 = "I am Golconde. Circumstances dictate that I come greet you."
206-6 = "Please forgive my rudeness. I'm afraid I have no choice but to keep my back turned, as you can see."
206-7 = "But of course! But of course!"
206-8 = "Ah, and this is Decalcomania, the one who acts as my body. "
206-9 = "We're good friends and a sign—one of illusion and non-realism. "
206-10 = "But of course!"
206-11 = "Like all signs, Decalcomania and I cannot exist on our own.#nThere is always text within that needs to be deciphered."
206-12 = "However, that doesn't bother us. All beings are signs.#nThat is the world that Decalcomania and I see."
206-13 = "In other words, a hellscape of signs and symbols—an existentialist's limbo."
206-16 = "There is, for example, Black Suit who adopted his own sign as his name. "
206-21 = "Or Maestro, who manifested its own text as an outward appearance. An excellent example."
206-22 = "Maestro has two heads because of its longing to decipher the text within it."
206-24 = "It's also the same for this city."
206-25 = "I've long thought about it while looking at this night view. "
206-26 = "But of course!"
206-27 = "The being you will meet is, so to speak, yet another variant of a sign."
206-28 = "Parody, homage... Those are the basics, but...that's not all of it."
206-29 = "In fact, this is a very rare case in which modern urban legends, ghost stories, or meaningless tales children often call \"creepypastas\" have reached a level of sublime on their own."
206-30 = "In other words, a new sublime separate from Mystic or Terror—a meaningful text born out of infinitely repeated coincidences. "
206-31 = "It is a sign that must be deciphered."
206-32 = "That's why I twisted the name of a great artist's work and titled it this:"
206-34 = "The Library of Lore."
206-35 = "But of course!"
206-36 = "It's funny to parody the first subject matter of the library, but I also think that's why this situation is such a wonderful sign."
206-37 = "It's a story in which the spirits of toys take their revenge. It also includes various homages... "
206-38 = "It can all be found within the database, though it's not something to be ignored."
206-39 = "An interesting feature of this library is how wonderfully unpredictable it is."
206-40 = "But of COURSE!"
206-45 = "I wish you luck, Sensei. I look forward to seeing what text you can glean from that sign."

[translation]
206-1 = "โลกแห่งสัญลักษณ์"
206-5 = "กระผมคือโกลคอนดา กระผมมีเหตุผลบางอย่างเลยต้องมาทักทายด้วยรูปลักษณ์แบบนี้"
206-6 = "หวังว่าคุณคงจะให้อภัยกับท่าทางที่ไร้มารยาทของกระผมด้วย เพราะว่าเราไม่มีทางเลือกอื่น#nนอกจากวิธีนี้แล้ว"
206-7 = "ใช่แล้ว! ใช่แล้ว!"
206-8 = "อ่า... และคนผู้นี้มีนามว่าเดคาโคมาเนีย ผู้คอยทำหน้าที่เป็นร่างกายแทนกระผมอยู่..."
206-9 = "พวกเราคือคู่หูหนึ่งเดียวผู้เป็นสัญลักษณ์ของภาพลวงตาและสิ่งที่ไม่เป็นจริง"
206-10 = "ใช่แล้ว!"
206-11 = "เช่นเดียวกับสัญลักษณ์อื่นๆ ทั้งหมด ทั้งเดคาโคมาเนียและตัวกระผมเองนั้นไม่สามารถอยู่ได้ด้วยตัวเอง และไม่ว่าเมื่อไรโลกใบนี้ก็เต็มไปด้วยข้อความที่ต้องตีความหมาย"
206-12 = "ทว่านี่ไม่ใช่แค่เพียงปัญหาของพวกเราเท่านั้น เพราะทุกสิ่งทุกอย่างที่มีอยู่ล้วนเป็นสัญลักษณ์#nและนั่นคือโลกที่กระผมและเดคาโคมาเนียมองเห็น"
206-13 = "หรือพูดอีกอย่างก็คือสัญญาณและสัญลักษณ์ที่ชั่วร้าย พรมแดนของสถานที่ชำระบาป#nของเหล่านักอัตถิภาวนิยม"
206-16 = "ตัวอย่างเช่น สูทดำที่นำชุดสูทสีดำมาใช้เป็นชื่อของตัวเอง"
206-21 = "หรือเมสโตรที่แปรเปลี่ยนสิ่งที่ต้องการสื่อให้เป็นรูปลักษณ์ขึ้น"
206-22 = "การที่เมสโตรมีสองศีรษะช่วยให้เขาสามารถอ่านและถอดรหัสความปรารถนาที่ซ่อนอยู่ภายใน#nข้อความได้..."
206-24 = "ซึ่งสิ่งนั้นก็เหมือนกับเมืองนี้"
206-25 = "กระผมได้คิดขณะที่มองท้องฟ้ายามค่ำคืนเช่นนี้... "
206-26 = "ใช่แล้ว!"
206-27 = "...ตัวตนที่คุณจะได้พบต่อไปนี้ คือการแปรสภาพความสนใจใน <สัญลักษณ์> ของกระผม"
206-28 = "การเย้ยหยัน การแสดงความเคารพ... สิ่งเหล่านั้นคือเรื่องพื้นฐาน... แต่ทว่าไม่ได้มีเพียงเท่านั้น"
206-29 = "ที่จริงแล้วการที่ตำนานของเมืองสมัยใหม่ เรื่องภูตผี หรือเรื่องเล่าสยองขวัญที่เล่าต่อกันมา ได้บรรลุถึงความสูงส่งด้วยตัวของมันเอง นับเป็นกรณีที่พบได้ยากมาก"
206-30 = "กล่าวอีกนัยหนึ่งก็คือความสูงส่งที่ถือกำเนิดขึ้นใหม่โดยปราศจากความลึกลับหรือความกลัว#nข้อความที่มีความหมายยิ่งที่ถือกำเนิดจากความบังเอิญซ้ำๆ ที่ไม่มีที่สิ้นสุด "
206-31 = "และสิ่งนั้นก็คือ <สัญลักษณ์> ที่จำเป็นจะต้องตีความอย่างไรล่ะครับ"
206-32 = "ดังนั้นกระผมจึงกลับชื่อผลงานของศิลปินผู้ยิ่งใหญ่ และตั้งชื่อตามนี้"
206-34 = "[ruby=The Library of Lore]ห้องสมุดอนันต์แห่งเรื่องลึกลับ[/ruby]"
206-35 = "ใช่แล้ว!"
206-36 = "การได้ล้อเลียนเนื้อเรื่องแรกของห้องสมุดนั้นเป็นเรื่องที่น่าขบขัน แต่กระผมก็คิดว่าสถานการณ์นี้#nเป็น <สัญลักษณ์> ที่ยอดเยี่ยมเช่นกัน"
206-37 = "ถึงมันจะเริ่มต้นจากเรื่องสยองขวัญถึงการล้างแค้นของวิญญาณร้ายของเหล่าของเล่นก็ตาม#nแต่ก็ยังมีการแสดงความเคารพในแบบต่างๆ รวมอยู่ด้วย"
206-38 = "นี่เป็นส่วนหนึ่งของฐานข้อมูลที่แน่นอน และเป็นสิ่งไม่สามารถมองข้ามไปได้"
206-39 = "และการที่ไม่สามารถคาดเดาอะไรได้ก็คือคุณสมบัติพิเศษที่น่าสนใจของห้องสมุดแห่งนี้"
206-40 = "ใช่แล้ว!!"
206-45 = "เช่นนั้นขอให้โชคดีนะครับ คุณครู กระผมจะตั้งตารอว่าคุณจะพบกับข้อความใดในสัญลักษณ์นั่น"

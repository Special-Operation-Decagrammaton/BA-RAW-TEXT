[translation]
206-1 = "#title;기호의 세계"
206-2 = "#wait;1000"
206-3 = "#wait;3000"
206-4 = "3;데칼코마니;01\n#3;a\n#wait;1500"
206-5 = "#na;골콩트;본인은 골콩트. 사정이 있어서 이런 모습으로 귀하에게 인사를 하게 되었습니다."
206-6 = "#na;골콩트;뒤돌아 서있는 것의 무례함을 용서해주길 바랍니다. 본인에겐 이외의 선택지는 존재하지 않으니까."
206-7 = "3;데칼코마니;01;그렇다! 그렇다!\n#fontsize;100\n#3;em;[!]"
206-8 = "#na;골콩트;……아, 그리고 이 자는 본인의 신체를 대행해주고 있는 데칼코마니라고 합니다. "
206-9 = "#na;골콩트;우리는 허상과 비실재를 상징하는 하나의 단짝이자, 기호입니다. "
206-10 = "3;데칼코마니;01;그렇다!\n#fontsize;100\n#3;em;[!]"
206-11 = "#na;골콩트;모든 기호가 그렇듯 데칼코마니와 본인 또한 스스로 존재할 수가 없습니다. 언제나 그 안에 해석되어지는 텍스트를 품고 있죠."
206-12 = "#na;골콩트;그러나 그것은 비단 저희들만의 문제는 아닙니다. 모든 존재자는 기호이니까요. 그것이 저와 데칼코마니가 바라보는 세계입니다."
206-13 = "#na;골콩트;말하자면 기호와 상징뿐인 지옥. 실존주의자들의 림보."
206-14 = "#all;hide"
206-15 = "3;검은 양복;01\n#3;a"
206-16 = "#na;골콩트;가령, 자신의 기호 그 자체를 자신의 이름으로 삼은 검은 양복이나, "
206-17 = "#st;[0,0];instant;1;"
206-18 = "#clearST"
206-19 = "3;검은 양복;01\n#3;d\n#wait;1000"
206-20 = "3;마에스트로;01\n#3;a"
206-21 = "#na;골콩트;자신의 텍스트를 외형으로 현현시킨 마에스트로가 좋은 예시가 되겠죠."
206-22 = "#na;골콩트;마에스트로의 머리가 두 개인 것은 그걸 통해 그 안의 텍스트를 해독해주길 바라는 갈망을 읽을 수 있을 것이고……."
206-23 = "3;데칼코마니;01\n#3;h"
206-24 = "#na;골콩트;그것은 또한 이 도시도 마찬가지인 것이죠."
206-25 = "#na;골콩트;……이 야경을 보면서 그런 생각을 해 보았습니다. "
206-26 = "3;데칼코마니;01;그렇다!\n#fontsize;100\n#3;em;[!]"
206-27 = "#na;골콩트;……. 지금부터 만나게 될 존재는 말하자면 제 관심사인 <기호>의 변종입니다."
206-28 = "#na;골콩트;패러디, 오마쥬…… 기본은 그런 것이지만……. 그것 뿐만은 아니죠."
206-29 = "#na;골콩트;사실 이것은 현대의 도시 전설, 괴담, 혹은 흔히 크리피파스타라고 불리는 무의미한 이야기가 스스로 숭고의 경지에 도달한, 아주 희귀한 케이스."
206-30 = "#na;골콩트;말하자면 신비도, 공포도 없이 태동한 새로운 숭고. 무한히 반복된 우연 속에서 탄생한 유의미한 텍스트. "
206-31 = "#na;골콩트;그것은 반드시 해석되어져야만 하는 <기호>인 것이죠."
206-32 = "#na;골콩트;그래서 저는 위대한 예술가의 작품의 이름을 뒤틀어, 이것을 이렇게 명명했습니다."
206-33 = "3;데칼코마니;01\n#3;h\n#3;em;…"
206-34 = "#na;골콩트;[ruby=The Library of Lore]괴담의 무한도서관[/ruby]이라고."
206-35 = "3;데칼코마니;01;그렇다!\n#fontsize;100\n#3;em;[!]"
206-36 = "#na;골콩트;그 도서관의 첫 소재를 패러디로 하게 되는 건 우스운 이야기이지만, 그렇기에 이 상황 또한 훌륭한 <기호>라고 볼 수 있을 것 같군요."
206-37 = "#na;골콩트;장난감들의 원혼이 복수하는 괴담에서 시작되었지만, 게다가 다양한 오마쥬들이 포함되어있지만, "
206-38 = "#na;골콩트;이것은 엄연한 데이터베이스의 일부. 무시할 수 있는 것은 아닙니다."
206-39 = "#na;골콩트;종잡을 수 없기에 흥미로운 게 이 도서관의 특징이겠죠."
206-40 = "3;데칼코마니;01;그렇다!!\n#fontsize;100\n#3;em;[!]"
206-41 = "#st;[0,0];instant;1;"
206-42 = "#clearST"
206-43 = "3;데칼코마니;01\n#3;d\n#wait;1000"
206-44 = "3;데칼코마니;01\n#3;a\n#wait;1000\n#3;closeup"
206-45 = "#na;골콩트;그럼 행운을 빕니다. 선생님. 저 기호에서 어떤 텍스트를 읽을 수 있을지, 기대하고 있겠습니다."

[translation]
2000009-1 = "ค่ำคืนนี้สำหรับคุณ!"
2000009-2 = "ทางเดินในโรงเรียนมิลเลเนียม"
2000009-3 = "คุณครู!"
2000009-4 = "มาแล้วเหรอ"
2000009-5 = "ขอบคุณที่มานะ แต่ตอนนี้คิดว่าคงไม่ใช่เวลาเหมาะที่จะมายืนคุยแบบนี้"
2000009-6 = "พอดีมีคนเข้าไปวุ่นวายกับโรงไฟฟ้าที่ 1 ที่อยู่ฝั่งตรงข้ามของสะพานมิลเลเนียมน่ะ"
2000009-7 = "คงเป็นฝีมือของพวกองค์กรวายร้ายที่คิดเล่นงานมิลเลเนียมอยู่"
2000009-8 = "ถ้าปล่อยไว้แบบนี้ไฟฟ้าทั้งหมดในโรงเรียนมิลเลเนียมก็จะถูกตัด"
2000009-9 = "ตอนนี้ยังเป็นช่วงกลางวันอยู่เลยไม่เป็นไร แต่ว่า..."
2000009-10 = "ถ้าเราแก้ไขไม่ทันก่อนที่ฟ้าจะมืดล่ะก็..."
2000009-11 = "มิลเลเนียมก็จะกลายเป็นเขตที่มืดสนิท"
2000009-12 = "[s] \"เดี๋ยวสิ... ขนาดนั้นเลยเหรอ?\""
2000009-13 = "ฉันไม่ได้พูดเล่นหรอกนะ"
2000009-14 = "ในเมืองแห่งวิทยาศาสตร์และเทคโนโลยีแบบนี้ หาไฟฉายหรือว่าเทียนไขไม่ได้ง่ายๆ หรอก"
2000009-15 = "แล้วอีกอย่าง... คืนนี้มีงานเทศกาลใหญ่ของมิลเลเนียมด้วย..."
2000009-16 = "นักเรียนหลายๆ คนตั้งตารอวันนี้กันมากเลย"
2000009-17 = "ที่จริงแล้วฉันเองก็เหมือนกัน!"
2000009-18 = "สิ่งที่พวกเราต้องทำก็คือไปซ่อมแซมโรงไฟฟ้าที่เสียหายนั่น"
2000009-19 = "พวกรุ่นพี่คนอื่นๆ ในชมรมกำลังพยายามซ่อมเครื่องปั่นไฟฟ้าภายในกันอยู่"
2000009-20 = "โรงไฟฟ้าเป็นส่วนที่ฉันรับผิดชอบก็เลยจะต้องไปที่นั่น"
2000009-21 = "คุณครูช่วยฉันหน่อยนะ"
2000009-23 = "โรงไฟฟ้าที่ 1 มิลเลเนียม"
2000009-25 = "อืม... เสียหายเยอะกว่าที่คิดไว้อีก"
2000009-26 = "สงสัยการต่อสู้จะรุนแรงมากเลยสร้างความเสียหายขนาดนี้"
2000009-28 = "คุณครู! มาเริ่มกันเลยเถอะ!"
2000009-30 = "ก่อนอื่นต้องตรวจสอบแกนหมายเลขหนึ่งก่อน... อึ่ก... มันพังหมดเลย"
2000009-31 = "เปลี่ยนเป็นแกนสำรอง... ดีล่ะ... เชื่อมต่อแกนที่หนึ่งเรียบร้อย!"
2000009-32 = "ตรวจสอบการทำงานของเครื่องเรียบร้อย... โล่งอกไปที ที่เครื่องกำเนิดไฟฟ้าไม่เสียหาย"
2000009-33 = "แต่ว่า... ถ้าเป็นแบบนี้คงซ่อมไม่เสร็จแน่ๆ"
2000009-34 = "ถ้าเกิดแกนทั้งสิบสามแกนเสียหายทั้งหมดละก็..."
2000009-35 = "ต่อให้เราลงมือซ่อมตอนนี้ก็เถอะ คงเสร็จไม่ทันก่อนมืดแน่ๆ"
2000009-37 = "ตรวจสอบแกนที่สามเรียบร้อย! โชคดีที่แกนเสียหายไม่มาก แค่เชื่อมต่อสายพลังงานใหม่ก็ใช้ได้แล้ว...!"
2000009-39 = "แกนหมายเลขเจ็ด... ซ่อมแซมเสร็จเรียบร้อย ฮู่ว... เชื่อมต่อเสร็จเกือบหมดแล้ว"
2000009-40 = "[s1] \"พักสักหน่อยดีมั้ย?\"\n[s2] \"เหลืออีกกี่อันเหรอ?\""
2000009-41 = ".....ตอนนี้เกือบครึ่งทางแล้วละ"
2000009-42 = ".....ตอนนี้เกือบครึ่งทางแล้วละ"
2000009-43 = "ทำยังไงดี ถ้าซ่อมเสร็จไม่ทันเวลาละก็..."
2000009-44 = "...ฮึก"
2000009-45 = "[s3] \"อย่าเพิ่งยอมแพ้สิ\"\n[s4] \"อยู่แบบไม่มีแสงไฟดูสักหนึ่งวันก็ไม่ได้แย่อะไรหรอก\""
2000009-47 = "....นั่นสินะ"
2000009-49 = "....ไม่ได้นะ!"
2000009-50 = "ฉันจะยอมแพ้....ไม่ได้"
2000009-51 = "ถึงจะซ่อมเสร็จไม่ทันเวลา..."
2000009-52 = "แต่ถ้ามายอมแพ้ก่อนแบบนี้จะเรียกตัวเองว่าไมสเตอร์แห่งมิลเลเนียมได้ยังไง"
2000009-53 = "คุณครู...รอฟังคำนี้อยู่งั้นเหรอ?"
2000009-54 = "อื้อ ฉันจะลองดูนะ"
2000009-56 = "ฉันจะพยายามให้ถึงที่สุด! ...หือ?"
2000009-57 = "หมายเลขแปด... ไม่เสียหาย?"
2000009-58 = "ระ...หรือว่า?!"
2000009-59 = "แกนหมายเลขเก้าเองก็แทบไม่เสียหายเลย?"
2000009-60 = "เราอาจซ่อมเสร็จได้เร็วกว่าที่คิดก็ได้นะ!"
2000009-61 = "คุณครู!"
2000009-63 = "เร่งมือเข้าเถอะ!"
2000009-65 = "เชื่อมต่อแกนหมายเลขสิบสามเสร็จสิ้น ระบบจะดำเนินการรีบูตใหม่..."
2000009-66 = "(ฮู่มมมมมมม)"
2000009-67 = "ขอร้องละ... ติดทีเถอะ"
2000009-69 = "(ฮู่มมมมมมม!)"
2000009-70 = "ว้าว! สำเร็จแล้ว!"
2000009-71 = "ขอบคุณมากนะคุณครู!"
2000009-72 = "ได้คุณครูช่วยไว้เลยทำให้รีบูตโรงไฟฟ้าได้สำเร็จแล้ว"
2000009-73 = "ถึงบางส่วนจะเป็นแค่การซ่อมแซมฉุกเฉินก็เถอะนะ ไว้ครั้งหน้าฉันจะมาซ่อมอีกทีหนึ่ง..."
2000009-76 = "......."
2000009-77 = "....คุณครู ขอบคุณที่คุณครูมาช่วยฉันวันนี้นะ"
2000009-78 = "ยังจำสัญญาที่ฉันบอกได้มั้ย? ที่ฉันบอกว่าจะให้คุณครูได้ดูดอกไม้ไฟที่ยอดเยี่ยมที่สุดน่ะ...?"
2000009-79 = "วันนี้ฉันคงรักษาสัญญาได้แล้วละ"
2000009-82 = "คุณครูออกมาข้างนอกหน่อยได้มั้ย?"
2000009-86 = "ถึงฉันจะเคยพูดไปแล้วหลายครั้ง... แต่จะขอพูดอีกรอบแล้วกัน"
2000009-89 = "― ขอบคุณนะ คุณครู ฉันได้เห็นวิวสวยๆ แบบนี้ เพราะคุณครูเลยนะ[wa:2920] "
2000009-91 = "― สวยใช่มั้ยล่ะ? โชคดีมากเลยที่มาทันเวลา[wa:1860] "
2000009-94 = "― หืม? ทำไมฉัน... ถึงต้องพยายามขนาดนี้น่ะเหรอ?[wa:1920] "
2000009-96 = "― เพราะฉันอยากทำให้นักเรียนของมิลเลเนียม[wa:900] "
2000009-99 = "― ได้เดินบนถนนอย่างปลอดภัยตอนกลางคืนน่ะ"
2000009-102 = "― เพราะนี่เป็นสิ่งเดียวที่ฉันจะทำให้ได้[wa:1860] "
2000009-105 = "― และสำหรับฉันเอง...[wa:480] "
2000009-107 = "― เวลาแบบนี้มีค่ามากกว่า 'ของขวัญ' เสียอีก[wa:1280] "
2000009-110 = "― เป็นยังไงบ้างคุณครู ตอนนี้ยังมีเวลาเหลืออยู่...[wa:4000] "
2000009-112 = "― คุณครู... จะอยู่กับฉันอีกหน่อยได้มั้ย?[wa:340] "
2000009-115 = "รู้สึกแปลกๆ จัง"
2000009-116 = "ที่จริงมันก็เป็นภาพวิวที่เคยเห็นเป็นประจำอยู่แล้ว"
2000009-117 = "แต่พออยู่กับคุณครู... ทำไมมันถึงได้..."
2000009-118 = "......"
2000009-119 = "....ดูสวยกว่าเดิมกันนะ?"

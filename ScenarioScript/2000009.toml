[translation]
2000009-1 = "把這晚贈與你！"
2000009-2 = "千年．走廊"
2000009-3 = "老師！"
2000009-4 = "你來了啊。"
2000009-5 = "謝謝。但現在似乎沒空好好打招呼了。"
2000009-6 = "剛才發現在橋的另一頭，有人在千年第1發電廠搗蛋。"
2000009-7 = "我猜會不會是某個嫉妒千年的不良組織所為。"
2000009-8 = "總之這樣下去千年的供電會被中斷掉。"
2000009-9 = "雖然現在天色還很亮還沒關係，"
2000009-10 = "如果到晚上都沒辦法解決這個狀況……"
2000009-11 = "千年將被黑暗籠罩。"
2000009-12 = "[s] 「太誇張了吧……」"
2000009-13 = "我不是在開玩笑。"
2000009-14 = "畢竟這所學校走在科技尖端，連蠟燭或檯燈都很少見。"
2000009-15 = "而且……今晚就要舉辦千年的夜景活動了……"
2000009-16 = "一定有很多學生……都在期待著這一天。"
2000009-17 = "……就和我一樣。"
2000009-18 = "現在我能做的，就是修理損壞的發電廠。"
2000009-19 = "其他工程師部的前輩們，正在全力搶修內部。"
2000009-20 = "所以我必須去發電廠那邊。"
2000009-21 = "請老師幫幫我。"
2000009-23 = "千年第1發電廠"
2000009-25 = "這狀況……比想像中來得嚴重。"
2000009-26 = "驅散不良組織時，看來經歷了很激烈的戰鬥。"
2000009-28 = "……動口不如動手，老師，開始吧！"
2000009-30 = "首先確認1號核心……果然被完全打爛了。"
2000009-31 = "更換為帶來的輔助核心……好……連結1號核心！"
2000009-32 = "確認能源啟動。太好了，電源機組沒事。"
2000009-33 = "不過……這樣下去沒完沒了。"
2000009-34 = "如果一直到13號核心也都是這個狀態的話……"
2000009-35 = "就算依序修下去…… #n也沒辦法在晚上之前趕完。"
2000009-37 = "3號核心確認完畢！ #n幸好狀態並不嚴重，只要修理電線就好……！"
2000009-39 = "7號核心……總算修理好了。 #n呼。總算接上了。"
2000009-40 = "[s1] 「休息一下吧……？」\n[s2] 「還剩多少？」"
2000009-41 = "……這樣的話，終於只剩一半了。"
2000009-42 = "……這樣的話，終於只剩一半了。"
2000009-43 = "怎麼辦，要是沒辦法趕上的話……"
2000009-44 = "……嗚。"
2000009-45 = "[s3] 「別放棄。」\n[s4] 「不借助文明力量生活一天，似乎也不錯。」"
2000009-47 = "……嗯。"
2000009-49 = "……不行！"
2000009-50 = "不能……放棄。"
2000009-51 = "即使這樣下去會趕不上……"
2000009-52 = "但要是就此放棄，就稱不上千年的巨匠了。"
2000009-53 = "……你說對吧？老師。"
2000009-54 = "……好了，繼續吧。"
2000009-56 = "至少要盡自己所能……嗯？"
2000009-57 = "……8號……良好？"
2000009-58 = "難，難不成？"
2000009-59 = "9號也幾乎是全新的？"
2000009-60 = "或，或許會比想像中還快結束！"
2000009-61 = "老師！ "
2000009-63 = "動作快！"
2000009-65 = "連結13號核心。系統重啟。"
2000009-66 = "（嗚噫……）"
2000009-67 = "拜託……拜託……"
2000009-69 = "（……嗡）"
2000009-70 = "──！成功了！"
2000009-71 = "真，真的很謝謝你，老師！"
2000009-72 = "託你的福，發電廠的動力才能全數重新啟動。"
2000009-73 = "當然，很多部分都還只是緊急處理，今後還得正式檢修才行。"
2000009-76 = "……"
2000009-77 = "……老師，我想報答你幫我的忙。"
2000009-78 = "之前說好要讓你看比煙火更迷人的東西……你還記得嗎？"
2000009-79 = "今天我想讓你看個好東西，當作回禮。"
2000009-82 = "要不要出去一下？"
2000009-86 = "雖然已經說過好幾次了……但我再鄭重說一次。"
2000009-89 = "― 謝謝，老師。多虧老師，才能守護住這個風景。[wa:4360] "
2000009-91 = "― 很漂亮吧？幸好能趕得上時間。[wa:2820] "
2000009-94 = "― 嗯？你問我為什麼要這麼努力嗎？[wa:3080] "
2000009-96 = "― 因為我想讓千年的學生們可以安全的……[wa:1700] "
2000009-99 = "― 走在閃耀的夜晚街道上。"
2000009-102 = "― 我能做的事……只有這些。[wa:2860] "
2000009-105 = "― 而且對我來說……[wa:880] "
2000009-107 = "― 這瞬間就已經比「禮物」還要珍貴了。[wa:2200] "
2000009-110 = "― 怎麼樣呀，老師？現在還有時間……[wa:5240] "
2000009-112 = "― 可以再……陪我一會兒嗎？[wa:1380] "
2000009-115 = "感覺好奇怪。"
2000009-116 = "明明是個每天都能看到，已經習慣的風景。"
2000009-117 = "但是和老師一起……就覺得……"
2000009-118 = "……"
2000009-119 = "……好美。"

[translation]
2000009-1 = "The Night Is Yours!"
2000009-2 = "Millennium School Hallway"
2000009-3 = "Sensei!"
2000009-4 = "About time."
2000009-5 = "Thanks, but I don't have time for chitchat."
2000009-6 = "Someone is causing trouble in Power Plant 1, just across the Millennium bridge."
2000009-7 = "It must be a group that holds a grudge against Millennium."
2000009-8 = "The academy is going to lose power at this rate."
2000009-9 = "We're lucky this is happening in broad daylight."
2000009-10 = "If something isn't done to fix this by nightfall..."
2000009-11 = "...then all of Millennium will be stranded in the dark."
2000009-12 = "[s] \"You have to be kidding me.\""
2000009-13 = "I'm dead serious."
2000009-14 = "Does a high-tech academy like this look like it has candles and flashlights lying around?"
2000009-15 = "More importantly...there's a big event scheduled for tonight."
2000009-16 = "A lot of students have been looking forward to it."
2000009-17 = "Especially me!"
2000009-18 = "We have to do something about the power plant."
2000009-19 = "The Engineering Department's leaders are doing everything they can to fix the power from this side."
2000009-20 = "The power plant is my responsibility, though, so I have to go myself."
2000009-21 = "I need your help, Sensei."
2000009-23 = "Millennium Power Plant 1"
2000009-25 = "This is worse than I thought..."
2000009-26 = "There must have been a fierce battle here."
2000009-28 = "Okay, Sensei. Let's get to work!"
2000009-30 = "Checking the first core... Oh, no. It's totally busted."
2000009-31 = "Switching with the auxiliary core I brought and...perfect. That's the first core connected!"
2000009-32 = "Energy flow confirmed! Thank goodness the power supply itself wasn't damaged."
2000009-33 = "Still, this is going to take a while."
2000009-34 = "All 13 cores could be in the same condition."
2000009-35 = "Even if we go as fast as we can, we might not finish before dark."
2000009-37 = "Third core checked! Luckily, it's not too damaged, so if we just restore the wires...!"
2000009-39 = "Seventh core down... I was barely able to repair it. Phew. That was really hard."
2000009-40 = "[s1] \"Why don't you take a little break?\"\n[s2] \"How much longer will it take?\""
2000009-41 = "We're only about...halfway there."
2000009-42 = "We're only about...halfway there."
2000009-43 = "What should we do? If we don't make it in time..."
2000009-44 = "*sob*"
2000009-45 = "[s3] \"Don't give up!\"\n[s4] \"A day off the grid won't be so bad.\""
2000009-47 = "...Right."
2000009-49 = "...No!"
2000009-50 = "I can't give up."
2000009-51 = "I may not finish on time..."
2000009-52 = "...but what kind of meister would I be if I gave up now?"
2000009-53 = "That's...what you wanted to hear, right, Sensei?"
2000009-54 = "Yeah. I'll do everything I can."
2000009-56 = "I'm going to give it...my all?"
2000009-57 = "Hey, the eighth core seems fine."
2000009-58 = "D-Don't tell me...!"
2000009-59 = "The ninth core is barely damaged?"
2000009-60 = "I'm going to finish with time to spare at this rate!"
2000009-61 = "Sensei!"
2000009-63 = "Hurry!"
2000009-65 = "All 13 cores connected! Restarting the system now..."
2000009-66 = "*vroom*"
2000009-67 = "Please work... Please work..."
2000009-69 = "*brrrrrr*"
2000009-70 = "Yes! We did it!"
2000009-71 = "Thank you so much, Sensei!"
2000009-72 = "I was able to get the power back on thanks to you."
2000009-73 = "This is only a temporary fix, though. Proper repairs will have to be done later, but still..."
2000009-76 = "..."
2000009-77 = "I want to repay you for all of your support, Sensei."
2000009-78 = "Do you remember my promise? When I said I'd show you something even better than the fireworks?"
2000009-79 = "I think it's time I made good on that."
2000009-82 = "Could you follow me for a bit?"
2000009-86 = "I know I'm only reiterating myself...but let me say it again."
2000009-89 = "― Thank you, Sensei. You made this great view possible.[wa:3080] "
2000009-91 = "― Beautiful, isn't it? I'm glad we made it in time.[wa:1420] "
2000009-94 = "― Hmm? Why was this so important to me?[wa:2200] "
2000009-96 = "― I wanted the Millennium students to be able to...[wa:460] "
2000009-99 = "― ...enjoy the streets when they're brightly lit like this."
2000009-102 = "― Something like this...is the only thing I know how to do.[wa:1060] "
2000009-105 = "― Besides, a moment like this...[wa:10] "
2000009-107 = "― ...is all the reward I need.[wa:1760] "
2000009-110 = "― What do you say, Sensei? The night is still young.[wa:3880] "
2000009-112 = "― Could you...stay with me a little longer?[wa:220] "
2000009-115 = "You know, it's strange."
2000009-116 = "The truth is, I see this same sight all the time."
2000009-117 = "But when I'm with you, Sensei, it all seems..."
2000009-118 = "..."
2000009-119 = "...so much more beautiful."

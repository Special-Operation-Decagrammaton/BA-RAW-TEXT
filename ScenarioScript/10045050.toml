[translation]
10045050-1 = "Episode 5;On the Brink of Elimination"
10045050-4 = "[ns] \"...kyou!\""
10045050-6 = "[ns] \"Kikyou!\""
10045050-9 = "*cough* *cough* *cough*"
10045050-13 = "Kikyou!"
10045050-18 = "Sensei...?"
10045050-19 = "[s1] \"Thank goodness, you're awake.\"\n[s2] \"Good thing the water wasn't too deep.\""
10045050-22 = "*cough* *cough*"
10045050-23 = "Wh-What...happened? What of the match? After falling in the ocean...my memory is hazy."
10045050-24 = "The match ended already. Chise and Izuna emerged as the victors."
10045050-25 = "The Hyakkaryouran...was eliminated."
10045050-26 = "...!!"
10045050-27 = "...Surely you did not sacrifice the match to save me?"
10045050-28 = "Pshhh! What're you even saying? Of course we did."
10045050-29 = "So the blame lies upon my shoulders..."
10045050-30 = "If I'd only confessed my mortal fear of water... We could have avoided such an ending."
10045050-32 = "I was under the impression that you simply disliked it, Kikyou!"
10045050-33 = "...I am loath to find myself under the sun, so very rarely did I venture near any bodies of water."
10045050-34 = "I cannot swim. I cannot enter water higher than my waist."
10045050-35 = "However, I am the operations officer of the Hyakkaryouran. How could I bring such shame upon my position? Upon the Hyakkaryouran itself?"
10045050-36 = "I apologize. To each one of you. My pride brought about true folly today."
10045050-37 = "You have no reason to apologize. I feel a bit guilty too."
10045050-38 = "I've known you since we were children, and I didn't realize at all..."
10045050-39 = "I'm sorry for neglecting you like that."
10045050-40 = "I BELIEVE I said that I apologize."
10045050-41 = "Well, apology not accepted! Because I'm the one at fault!"
10045050-42 = "No, I am!"
10045050-43 = "No, me!"
10045050-45 = "Fufu. The closeness you two exhibit is very heartwarming."
10045050-46 = "Kikyou, please do not shoulder such self-blame. We bear no ill will."
10045050-47 = "The only feeling I hold is a great relief that no true harm came your way."
10045050-48 = "...You hold no grudge?"
10045050-50 = "Remind me what our operation's mission was? It was to socialize, was it not?#nI believe we've more than achieved that."
10045050-51 = "Exactly! And so, as our operations officer, you completed your job perfectly!"
10045050-52 = "But..."
10045050-54 = "[ns] \"Don't worry so much! You still have a chance.\""
10045050-55 = "Chance? What chance?"
10045050-56 = "[s3] \"No spoilers!\"\n[s4] \"I'll see you at the beach volleyball court!\""
10045050-59 = "...Hm?"
10045050-62 = "The end is in sight for this year's fiery Hyakkiyako Water Festival!"
10045050-63 = "But we're very sad to see it go. Doesn't everyone else in the crowd feel the same way?"
10045050-67 = "I knew it! And that's why, thanks to popular demand, we have a special surprise for you!"
10045050-68 = "Drumroll, please! We'll be holding...a revival match!"
10045050-69 = "The eight players who were eliminated in the obstacle race will play beach volleyball with 2 players per team!"
10045050-70 = "The winning team will get their chance in the final round as well! A loser's bracket!"
10045050-71 = "So keep your chin up, everyone! And good luck!"
10045050-72 = "[ns] \"Now, I'll announce the completely random matchups!\""
10045050-74 = "[log]Beach Volleyball Match 1![/log]"
10045050-77 = "VS"
10045050-81 = "Me and Kikyou? This'll be a nice warm-up."
10045050-82 = "..."
10045050-84 = "UGHHH. Are you serious?!"
10045050-85 = "Stop crying! We're not out of the running yet!"
10045050-87 = "[ns] \"The next match!\""
10045050-89 = "[log]Beach Volleyball Match 2![/log]"
10045050-92 = "VS"
10045050-96 = "What a coincidence. You shall be my sister-in-arms, Nagusa!"
10045050-97 = "I cannot imagine losing with you by my side!"
10045050-98 = "Yes. Let's do our best."
10045050-100 = "Wh-What do we do? This feels totally unfair!"
10045050-101 = "Fufu. You're just as capable as they are. You only need the confidence to face them."
10045050-102 = "Please prepare yourselves to become my training targets."
10045050-104 = "Wow, these are some spicy matchups!"
10045050-105 = "We'll be taking a little break, but don't lose that excitement for match number 1!"
10045050-106 = "[ns] \"Stay tuned, everyone...!\""
10045050-108 = "(...No matter the outcome, only two may proceed to the finals.)"
10045050-109 = "(If I were to again be the cause of Renge's failure...)"
10045050-110 = "(...)"
10045050-111 = "(I must perform well.)"
10045050-112 = "(At least we will remain upon solid ground. This much, I can do.)"
10045050-113 = "(And regardless, our first opponents are of little concern. Renge alone could best them.)"
10045050-114 = "(So why is it...)"
10045050-115 = "(...that I feel this growing apprehension within me?)"

[translation]
10045050-1 = "第5話;淘汰的關頭"
10045050-4 = "[ns]「……梗……！」"
10045050-6 = "[ns]「桔梗……！」"
10045050-9 = "咳，咳咳！咳咳咳……！！"
10045050-13 = "桔梗！"
10045050-18 = "老師……？"
10045050-19 = "[s1]「你能醒過來真是太好了。」\n[s2]「幸好水不算太深。」"
10045050-22 = "咳，咳咳……！"
10045050-23 = "究，究竟……發生了什麼事？#n比賽怎麼樣了？掉進水裡之後我就……"
10045050-24 = "比賽已經結束了。#n晉級決賽的是知世同學和伊樹菜同學。"
10045050-25 = "我們……全都被淘汰了。"
10045050-26 = "……！！"
10045050-27 = "難道……是因為我？"
10045050-28 = "別在意！救同伴是理所當然的事。"
10045050-29 = "都是我的錯……"
10045050-30 = "如果我一開始就說出自己怕水……就不會發生這種事了。"
10045050-32 = "桔梗前輩並不是討厭水……而是怕水嗎？"
10045050-33 = "因為我不喜歡戶外活動的關係，幾乎不會到水邊去……"
10045050-34 = "所以當然不會游泳，更別說進到深水裡了。"
10045050-35 = "不過身為百花繚亂的作戰參謀……這種事情我實在說不出口。"
10045050-36 = "對不起。#n都怪我愛逞強……"
10045050-37 = "就說了沒關係嘛！#n而且這件事我也有責任。"
10045050-38 = "明明和桔梗是青梅竹馬，卻連這種事都不知道……"
10045050-39 = "我才該說抱歉。"
10045050-40 = "該道歉的是我才對吧？"
10045050-41 = "不，是我不好！"
10045050-42 = "是我！"
10045050-43 = "是我才對……！"
10045050-45 = "呵呵，兩位的感情真好呢。"
10045050-46 = "桔梗前輩。#n我們真的沒事，請別太自責了。"
10045050-47 = "小女子覺得，光是前輩平安無事就已經很值得慶幸了。"
10045050-48 = "……你們不怪我嗎？"
10045050-50 = "這次大會的目的不是團結嗎？#n我認為這個目的已經達成了。"
10045050-51 = "是呀，所以請別太責怪自己了。"
10045050-52 = "可是……"
10045050-54 = "[ns]「別擔心！還有機會！」"
10045050-55 = "機會？什麼機會？"
10045050-56 = "[s3]「這個就留到後面再揭曉吧。」\n[s4]「大家沙灘排球場見！」"
10045050-59 = "……？"
10045050-62 = "感謝各位參加百夜水上祭！#n轉眼間，大會也進入了尾聲。"
10045050-63 = "不過就這樣結束實在有點可惜……大家也這麼覺得吧？"
10045050-67 = "所以為了回應大家的熱情，我們追加了一場比賽！#n那就是……！"
10045050-68 = "敗部復活戰！"
10045050-69 = "在障礙賽中被淘汰的8位選手，將以兩人一組的方式比賽沙灘排球！"
10045050-70 = "最後獲勝的隊伍，將額外晉級最終決賽！"
10045050-71 = "祭典還沒結束，大家加油吧！"
10045050-72 = "[ns]「那麼～現在公布隨機抽選的對戰組合～！」"
10045050-74 = "[log]沙灘排球賽第1場！[/log]"
10045050-77 = "VS"
10045050-81 = "哦～跟桔梗同隊啊。#n而且第一個對手也還不錯嘛？"
10045050-82 = "……"
10045050-84 = "吼唷，為什麼偏偏是他們啦！？"
10045050-85 = "振作點！我們還有勝算！"
10045050-87 = "[ns]「接下來～下一組！」"
10045050-89 = "[log]沙灘排球賽第2場！[/log]"
10045050-92 = "VS"
10045050-96 = "哇哦，居然能跟名草前輩同隊！這是何等的巧合！"
10045050-97 = "只要和前輩一起，冠軍也是勢在必得了吧！"
10045050-98 = "嗯，一起加油吧。"
10045050-100 = "該，該怎麼辦？對手太強了！"
10045050-101 = "呵呵，拿出自信來。#n我們也是很強的哦。"
10045050-102 = "以修行的對手而言，完全不會讓人失望呢。"
10045050-104 = "哇，真是有趣的對戰組合！"
10045050-105 = "那麼稍作休息後，第一場比賽即將開始！"
10045050-106 = "[ns]「大家別轉台喔……！」"
10045050-108 = "（……無論結果如何，我們之中都有一半的人會被淘汰）"
10045050-109 = "（在這種情況下，如果又因為我害蓮華被淘汰的話……）"
10045050-110 = "（……）"
10045050-111 = "（我必須……好好表現才行）"
10045050-112 = "（這次不是水上的比賽，我應該能夠發揮實力）"
10045050-113 = "（而且第一場的對手不強，就算只有蓮華一個人也能應付）"
10045050-114 = "（但我為什麼……）"
10045050-115 = "（……還是有股不好的預感呢？）"

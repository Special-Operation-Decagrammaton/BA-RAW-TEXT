[translation]
10045050-1 = "ตอนที่ 5;โอกาสของผู้ตกรอบ"
10045050-4 = "[ns] \"...เคียว!\""
10045050-6 = "[ns] \"คิเคียว...!\""
10045050-9 = "แค่ก แค่กๆ! แค่กๆ แค่กๆ...!!"
10045050-13 = "คิเคียว!"
10045050-18 = "คุณครู...?"
10045050-19 = "[s1] \"โล่งอกไปทีนะที่รู้สึกตัวแล้ว\"\n[s2] \"ค่อยยังชั่วนะที่ตรงนั้นน้ำไม่ค่อยลึก\""
10045050-22 = "คะ... แค่กๆ...!"
10045050-23 = "กะ... เกิดอะไรขึ้น... งั้นเหรอ? แล้วการแข่งขันล่ะ? หลังจากตกลงไปในน้ำ ฉันก็จำอะไรไม่ได้เลย..."
10045050-24 = "การแข่งขันจบแล้วละ คนที่ได้เข้ารอบสุดท้ายคือคุณชิเซะกับคุณอิซุนะ"
10045050-25 = "ส่วนพวกเรา... ตกรอบกันทุกคน"
10045050-26 = "...!!"
10045050-27 = "อย่าบอกนะว่า... เป็นเพราะฉันน่ะ...?"
10045050-28 = "ไม่ต้องสนใจเรื่องแบบนั้นหรอกน่า! ถึงจะเป็นการแข่งขัน แต่ยังไงเราก็ต้องช่วยเพื่อนก่อนอยู่แล้ว"
10045050-29 = "เป็นความผิดของฉันเอง..."
10045050-30 = "ถ้าฉันบอกทุกคนก่อนว่าฉันกลัวน้ำ... ก็คงไม่เกิดเรื่องแบบนี้หรอก"
10045050-32 = "รุ่นพี่คิเคียวไม่ได้ไม่ชอบน้ำ... แต่กลัวน้ำเลยเหรอเจ้าคะ?"
10045050-33 = "พอฉันไม่ชอบทำกิจกรรมกลางแจ้ง ฉันก็เลยไม่มีโอกาสลงน้ำไปด้วย..."
10045050-34 = "ฉันก็เลยว่ายน้ำไม่เป็น ยิ่งให้ลงไปในน้ำลึกๆ ยิ่งไม่ได้ใหญ่เลย"
10045050-35 = "แต่ว่า... ฉันเป็นถึงที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรัน ก็เลยไม่กล้าบอกว่าฉันลงแข่งด้วยไม่ได้"
10045050-36 = "ขอโทษนะทุกคน ทั้งหมดเป็นความผิดของฉันเอง ถ้าฉันไม่ยึดกับอีโก้ของตัวเองมากเกินไป..."
10045050-37 = "ก็บอกว่าไม่เป็นไรไง ถ้าลองคิดดู ฉันก็มีส่วนที่ผิดเหมือนกัน"
10045050-38 = "ฉันเป็นเพื่อนกับคิเคียวมาตั้งแต่สมัยเด็ก แต่กลับไม่รู้เรื่องนี้เลย..."
10045050-39 = "ฉันขอโทษนะ"
10045050-40 = "ฉันต่างหากล่ะที่ผิด"
10045050-41 = "ไม่หรอก ฉันต่างหากที่ไม่ดีน่ะ"
10045050-42 = "ก็บอกว่าฉันผิดเองไง!"
10045050-43 = "ฉันต่างหากล่ะ...!"
10045050-45 = "ฮุฮุ รุ่นพี่ทั้งสองคนเข้ากันได้ดีจริงๆ เจ้าค่ะ"
10045050-46 = "รุ่นพี่คิเคียว พวกเราไม่เป็นอะไร เพราะงั้นไม่ต้องกังวลเลยนะเจ้าคะ"
10045050-47 = "แค่รุ่นพี่ปลอดภัยดี ข้าก็โล่งใจแล้วเจ้าค่ะ"
10045050-48 = "ไม่โกรธที่ฉันทำให้แพ้เหรอ...?"
10045050-50 = "จุดประสงค์ของการแข่งขันครั้งนี้คือการกระชับมิตรไม่ใช่เหรอ? ถ้างั้นก็ถือว่าพวกเราบรรลุจุดประสงค์#nแล้วละ"
10045050-51 = "ใช่เจ้าค่ะ ไม่ต้องตำหนิตัวเองหรอก"
10045050-52 = "แต่ว่า..."
10045050-54 = "[ns] \"ไม่เป็นไรน่า! โอกาสยังไม่หมดแค่นี้หรอกนะ!\""
10045050-55 = "โอกาสเหรอ? โอกาสอะไร?"
10045050-56 = "[s3] \"ครูเก็บไว้ให้ลุ้นทีหลังแล้วกัน\"\n[s4] \"ไว้เจอกันที่สนามวอลเลย์บอลชายหาดนะ!\""
10045050-59 = "...?"
10045050-62 = "ผู้เข้าแข่งขันในเทศกาลสวนน้ำเฮียกคิยาโคทุกคน! เผลอแป๊บเดียวการแข่งขันที่เตรียมไว้ก็ใกล้จะ#nหมดแล้วนะคะ"
10045050-63 = "แต่ถ้าจะให้จบทั้งอย่างนี้ก็น่าเสียดายแย่ ว่ามั้ยคะ?"
10045050-67 = "พวกเราก็เลยจัดการแข่งขันเพิ่มเพื่อตอบแทนการสนับสนุนของทุกคนค่ะ! และนั่นก็คือ...!"
10045050-68 = "การแข่งขันรอบแก้ตัว!"
10045050-69 = "เราจะให้ผู้เข้าแข่งขันที่ตกรอบจากการแข่งวิ่งวิบากบนผืนน้ำทั้ง 8 คนมาจับคู่แล้วแข่งวอลเลย์บอลชายหาดกันค่ะ!"
10045050-70 = "และทีมสุดท้ายที่ชนะจะได้เข้ารอบสุดท้ายไปด้วยค่ะ!"
10045050-71 = "งานเทศกาลยังมีให้สนุกกันต่อ ทุกคนก็สู้ๆ เข้านะคะ!"
10045050-72 = "[ns] \"เอาละ~ งั้นครูจะประกาศผลการสุ่มจับคู่ละนะ~!\""
10045050-74 = "[log]การแข่งขันวอลเลย์บอลชายหาด คู่ที่ 1![/log]"
10045050-77 = "VS"
10045050-81 = "โอ้โห ฉันได้อยู่ทีมเดียวกับคิเคียวเหรอเนี่ย? แล้วคู่แข่งรอบแรกก็ไม่เลวเลยด้วย?"
10045050-82 = "......"
10045050-84 = "ฮึ่ยย ทำไมต้องเป็นพวกนั้นด้วยนะ?!"
10045050-85 = "ตั้งสติหน่อยสิ! ถ้าตั้งใจเล่น พวกเราก็มีโอกาสชนะนะ!"
10045050-87 = "[ns] \"เอาละ คู่ต่อไป!\""
10045050-89 = "[log]การแข่งขันวอลเลย์บอลชายหาด คู่ที่ 2![/log]"
10045050-92 = "VS"
10045050-96 = "โอ้ว ข้าได้อยู่ทีมเดียวกับรุ่นพี่นางุสะด้วย! ช่างบังเอิญอะไรเช่นนี้!"
10045050-97 = "ถ้าข้าอยู่กับรุ่นพี่ ทีมเราชนะแน่นอนเจ้าค่ะ!"
10045050-98 = "อื้อ มาพยายามไปด้วยกันเถอะ"
10045050-100 = "ทะ... ทำยังไงดีคะ? คู่แข่งของเราเก่งมากเลยค่ะ!"
10045050-101 = "ฮุฮุ เราต้องมั่นใจเข้าไว้ค่ะ เราก็เก่งไม่แพ้กันนะคะ"
10045050-102 = "เป็นคู่แข่งที่เหมาะกับการฝึกฝนเลยค่ะ"
10045050-104 = "ว้าว เป็นการจับคู่ที่น่าสนใจจริงๆ เลยค่ะ!"
10045050-105 = "เราจะพักกันสักครู่ แล้วมาเริ่มการแข่งขันคู่แรกกันนะคะ!"
10045050-106 = "[ns] \"ทุกคนอย่าเปลี่ยนช่องไปไหนล่ะ...!\""
10045050-108 = "(ยังไงก็ต้องมีเฮียกกะเรียวรันตกรอบไป 2 คน....)"
10045050-109 = "(ได้มาแข่งรอบแก้ตัวแท้ๆ แต่ถ้าเรนเกะต้องตกรอบเพราะฉันอีกละก็...)"
10045050-110 = "(...)"
10045050-111 = "(ฉันต้อง... ตั้งใจเล่นให้ดีแล้วละ)"
10045050-112 = "(การแข่งขันนี้ไม่ต้องแข่งในน้ำ งั้นฉันต้องทำได้ดีแน่)"
10045050-113 = "(แล้วคู่แข่งทีมแรกก็ไม่ได้น่ากลัวเท่าไรด้วย ลำพังเรนเกะคนเดียวก็จัดการได้อยู่หมัดแล้ว)"
10045050-114 = "(ว่าแต่ทำไม...)"
10045050-115 = "(ทำไมฉันถึงรู้สึกไม่ดีตลอดเลยล่ะ...?)"

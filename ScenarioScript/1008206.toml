[translation]
1008206-1 = "Appreciation of Youth"
1008206-3 = "[ns] \"I should catch up on work before Renge gets here.\""
1008206-11 = "[ns] \"This pile should be good. Next is...\" "
1008206-14 = "By the time I'd cleared up the bulk of my work, it was almost time to meet with Renge."
1008206-18 = "[ns] \"...Oof. When was the last time I ate?\""
1008206-19 = "I had lost track of time working and had skipped a couple of meals. But right as I was about to sort out that situation..."
1008206-24 = "Sen—"
1008206-25 = "Ahem! Mentor! I'm here!"
1008206-26 = "Let's have another great day of pursuing our youth!"
1008206-30 = "...Are you okay, Mentor? You seem a bit drained. You don't have the same level of focus you normally do."
1008206-31 = "[s] \"It's nothing serious. Just tired from work.\""
1008206-32 = "Hm, is that so? "
1008206-33 = "Do you promise that's all it is?"
1008206-34 = "[s] \"I promise. I already feel better now that you're here.\""
1008206-35 = "Wh-What?!"
1008206-36 = "Y-You can't just say things like that, Sensei!"
1008206-37 = "It's a good thing I'm a youth apprentice! Otherwise that line might've knocked me off my feet! "
1008206-38 = "You truly are the mentor of youth!"
1008206-39 = "[s1] \"That really wasn't my intention.\"\n[s2] \"You leveled up from youth beginner!\""
1008206-44 = "Well, if you're feeling okay, then we have a long list of youth activities to tackle today!"
1008206-45 = "We don't have time to dawdle."
1008206-46 = "[s] \"Off we go!\""
1008206-52 = "We dedicated the entire day to discovering Renge's youth."
1008206-62 = "But then..."
1008206-67 = "Wow!"
1008206-68 = "It's been a fulfilling, youthful day, Mentor!"
1008206-69 = "I've gained a lot of experience today! I've wracked up so many points, I might even level up!"
1008206-70 = "I'm going to become a youth master before you know it, Mentor."
1008206-71 = "[s3] \"Youth beginner, then apprentice, then it's master next!\"\n[s4] \"I see! There's a leveling system!\""
1008206-74 = "I'm a big believer in following the proper process in all things!"
1008206-75 = "Thank you as usual for participating in—"
1008206-84 = "Huh? What's wrong? You're looking a little pale."
1008206-85 = "[s] \"Sorry, Renge. I just...\""
1008206-97 = "M-Mentor?!"
1008206-101 = "Say something! Mentor!"
1008206-105 = "...?"
1008206-108 = "Renge helped me get back to Schale somehow."
1008206-111 = "So, to summarize..."
1008206-112 = "You were too immersed in your work and skipped all your meals today?"
1008206-113 = "And then, after spending the entire day with me, you passed out from hunger?"
1008206-114 = "[s] \"...Yes, that's correct.\""
1008206-115 = "...Ughhhh."
1008206-116 = "[s] \"Um... Renge? Why are you making that face?\""
1008206-120 = "Sensei! How could you do something like this?!"
1008206-122 = "[ns] \"Whoa?! That's not the reaction I was expecting!\""
1008206-123 = "It doesn't matter how much work you have! Good nutrition is the cornerstone of health!"
1008206-124 = "It's the foundation for everything in the world! It's absolutely unacceptable to be skipping meals!"
1008206-125 = "What would've happened if I wasn't here today? What if you fainted on the street while you were alone?!"
1008206-126 = "Wait, wait, wait. If Sensei was too busy to even eat..."
1008206-130 = "Did that happen..."
1008206-131 = "...because of me?"
1008206-132 = "[s] \"What? Of course not. I just had a lot of work piled up.\""
1008206-133 = "I understand that, but..."
1008206-134 = "If I hadn't forced you into this youth mentorship with me, maybe your work wouldn't have piled up so much."
1008206-135 = "You've been helping me without a second thought for yourself."
1008206-136 = "This all happened because your schedule was overloaded with youth activities. Because of me..."
1008206-137 = "[s] \"I chose to help you, Renge. You didn't force me to do anything.\""
1008206-138 = "Sensei..."
1008206-139 = "..."
1008206-140 = "You seriously have to watch what you say in situations like this!"
1008206-141 = "That's another line you would've gotten me with if I wasn't a youth expert!"
1008206-142 = "[s] \"...Did you level up again?\""
1008206-143 = "How many times do I have to tell you to not worry about the little details!"
1008206-144 = "(All of this happened because of me and my pursuit of my youth. I have to make it up to Mentor somehow...)"
1008206-149 = "Ah."
1008206-150 = "I've had a good idea, so let's call it here today, okay? "
1008206-155 = "I have to go! But don't forget to eat something, Sensei! Seriously!"
1008206-156 = "I'll see you soon!"
1008206-160 = "[ns] \"Oh... Okay? Goodbye?\""
1008206-163 = "[ns] \"I didn't mean to make Renge worry like that.\""
1008206-165 = "I was still reflecting on the events of the day when I got a call."
1008206-172 = "[ns] \"Hello? This is Sensei.\""
1008206-174 = "Sensei! I was wondering if I could interest you in—"
1008206-175 = "...Huh? Am I scammer? You won't let it happen again?!"
1008206-176 = "Wh-What in the world are you saying?! Well. Actually. I guess that was kind of a suspicious opener."
1008206-177 = "But it really is me, Renge! It's not a scam! And I have an important question."
1008206-178 = "Well, um... I was just wondering if you had a favorite dish...or, you know, anything you can't eat. Any allergies?"
1008206-179 = "...Huh? Why am I asking? "
1008206-180 = "I-It's for a school project! I'm surveying a ton of people. Every single member of the Hyakkaryouran, in fact!"
1008206-181 = "Asking you was just an off-hand thought. Nothing serious, okay?!"
1008206-185 = "[ns] Answer Renge's questions."
1008206-189 = "...Okay. Let me just write that down... Perfect!"
1008206-190 = "I've got everything I need now! You better watch your back, Sensei!"
1008206-191 = "[s] \"Why is your default always to threaten people?!\""
1008206-192 = "I'll see you tomorrow!"
1008206-199 = "I hung up that chaotic conversation concerned but curious."
1008206-203 = "Finally, tomorrow came."
1008206-209 = "I was busying myself with work at Schale."
1008206-215 = "[ns] \"Hello, Renge. I thought you were visiting today.\""
1008206-219 = "I-I am! Kind of! I'm just mentally preparing myself to walk through the doors. "
1008206-220 = "Ugh! Actually walking into the building and handing it to you is too much, even for Youth Expert Renge!"
1008206-221 = "...You're here right, Sensei? You're at Schale? Are you by yourself?"
1008206-222 = "...Okay, good. Can you come outside for a second then, Sensei?"
1008206-223 = "I'll be at the park right by the building!"
1008206-224 = "I-I'll see you soon!"
1008206-232 = "[ns] \"She said she was at the park...\""
1008206-236 = "Sensei! Over here!"
1008206-237 = "Thank you for coming out to meet me."
1008206-238 = "You see, I realized that you weren't eating proper meals and falling behind on work because you were expending so much energy...on me."
1008206-239 = "[s] \"I really promise I was happy to do it.\""
1008206-240 = "I'm not happy to let you suffer because of me, okay?!"
1008206-244 = "That being said... This...This is for you!"
1008206-249 = "[ns] \"Ah...\""
1008206-254 = "[ns] \"A bento...?\""
1008206-255 = "― [log=렌게]R-Right![/log][wa:870] "
1008206-257 = "― [log=렌게]You're as perceptive as always! I expect nothing less.[/log][wa:110] "
1008206-260 = "― [log=렌게]I-I made this for you, Mentor![/log][wa:1890] "
1008206-263 = "[ns] \"I really appreciate it, but what is this for?\""
1008206-264 = "― [log=렌게]I've been being so selfish this whole time.[/log][wa:1350] "
1008206-266 = "― [log=렌게]I asked so much of you and gave nothing in return.[/log][wa:10] "
1008206-269 = "― [log=렌게]I've really been a nuisance...[/log][wa:10] "
1008206-271 = "― [log=렌게]So, I wanted to express my gratitude...[/log][wa:960] "
1008206-274 = "― [log=렌게]I-It's my first time making something like this...[/log][wa:40] "
1008206-276 = "― [log=렌게]So please don't expect restaurant-level quality...[/log][wa:1290] "
1008206-279 = "― [log=렌게]Maybe I haven't leveled up enough for this final event of youth.[/log][wa:1040] "
1008206-281 = "― [log=렌게]B-But I put my all into it![/log][wa:1490] "
1008206-284 = "[ns] \"...Thank you, Renge. I appreciate it.\""
1008206-285 = "― [log=렌게]Ah! Um... Really?[/log][wa:2620] "
1008206-288 = "― [log=렌게]I hope you[/log][wa:2290] "
1008206-290 = "― [log=렌게]e-enjoy it, then...[/log][wa:2280] "
1008206-293 = "I did it! I gave it to you, right?"
1008206-294 = "I'm considering this a level up of youth!"
1008206-298 = "Well! Okay! B-Bye, Sensei!"
1008206-304 = "I went back to my office and tried Renge's homemade bento. It was delicious."

[translation]
1008206-1 = "懷著對青春的感謝"
1008206-3 = "[ns]「在蓮華來之前必須先把工作搞定才行。」"
1008206-11 = "[ns]「這邊整理好了，接下來是……」 "
1008206-14 = "（回過神一看，不知不覺已經到蓮華說好要來的時間）"
1008206-18 = "[ns]「……話說我上次吃飯是什麼時候？」"
1008206-19 = "（就在回想因為忙著處理如潮水般湧來的工作，快被遺忘的上一餐時……）"
1008206-24 = "老師……！"
1008206-25 = "不，師父！我來了！"
1008206-26 = "今天也一起活力滿滿地進行「青春活動」……！"
1008206-30 = "……你怎麼了，師父？#n跟平常不同，整個人都攤在書桌上……"
1008206-31 = "[s]「沒什麼，只是工作有點累而已。」"
1008206-32 = "呃，是嗎？"
1008206-33 = "如果真的沒事就好……"
1008206-34 = "[s]「嗯，在百忙之中看到蓮華反而讓我有力氣了。」"
1008206-35 = "什麼！？"
1008206-36 = "居然出奇不意……果然不容小覷。"
1008206-37 = "如果不是像我這樣的「青春老手」，可能一下子就被剛才那句話給騙了……！"
1008206-38 = "嗯，不愧是師父！"
1008206-39 = "[s1]「我沒有那個意思……」\n[s2]「你已經從青春新手升級了啊……」"
1008206-44 = "來，為了進行新的「青春活動」，我今天也準備了各種情境。"
1008206-45 = "今天也全力出發吧！"
1008206-46 = "[s]「嗯，那我們走吧。」"
1008206-52 = "（就這樣，今天也依然朝「青春活動」邁進）"
1008206-62 = "（於是……）"
1008206-67 = "嗯～～！"
1008206-68 = "哇～今天也是充滿意義的一天呢！師父！"
1008206-69 = "這次我們也進行了很多「青春活動」，一定累積了很多分數和經驗吧。"
1008206-70 = "感覺離青春大師更進一步了！"
1008206-71 = "[s3]「青春新手的下一個等級是老手，接下來是大師啊！」\n[s4]「沒想到有這麼扎實的等級系統！」"
1008206-74 = "不管做任何事，最重要的都是腳踏實地。"
1008206-75 = "嗯，先不說這個了，謝謝師父今天也陪了我一整──"
1008206-84 = "……師父？你怎麼了？"
1008206-85 = "[s]「抱歉，蓮華。麻煩等我一下……」"
1008206-97 = "師，師父！？"
1008206-101 = "你沒事吧，師父……！"
1008206-105 = "…………咦？"
1008206-108 = "（在蓮華的幫助下，總算是回到了夏萊）"
1008206-111 = "也就是說……"
1008206-112 = "這段時間工作太忙，甚至想不起來最後一次吃飯是什麼時候？"
1008206-113 = "所以才餓到頭昏眼花暈倒了……是嗎？"
1008206-114 = "[s]「……嗯，就是這樣。」"
1008206-115 = "……………………"
1008206-116 = "[s]「那個……蓮華？為什麼露出那種表情……」"
1008206-120 = "這樣不行啦！老師！！"
1008206-122 = "[ns]「哇啊啊！？嚇我一跳！」"
1008206-123 = "不管再怎麼忙也要好好吃飯啊！？"
1008206-124 = "體力可是一切的基礎！#n居然不好好吃飯！真是太不應該了！"
1008206-125 = "今天幸好有我在你身邊，萬一我不在的話……"
1008206-126 = "啊，可是……老師平常忙到沒辦法按時吃飯的原因……"
1008206-130 = "該不會……"
1008206-131 = "……是因為我？"
1008206-132 = "[s]「因為蓮華？不是不是，真的只是因為工作太忙而已……」"
1008206-133 = "……不，我也很清楚。"
1008206-134 = "老師本來就忙著處理夏萊的工作，我還強迫你參加什麼「青春師徒關係」……"
1008206-135 = "雖然老師開心地答應了我……"
1008206-136 = "但因為「青春活動」變得更忙也是事實。#n所以才會發生這種事……"
1008206-137 = "[s]「你真的不必放在心上，蓮華。這是我心甘情願的。」"
1008206-138 = "老師……"
1008206-139 = "……"
1008206-140 = "真是的！都這種時候了還這麼說。"
1008206-141 = "要不是我是青春專家，早就被你騙了！"
1008206-142 = "[s]「……那個，是不是又多了一個新等級？」"
1008206-143 = "哎～別在意那種無關緊要的小事！"
1008206-144 = "（會發生這種事都是因為青春活動……那我能為老師做的……）"
1008206-149 = "啊。"
1008206-150 = "……好，我想到了一個好主意。#n今天先解散吧！"
1008206-155 = "我就先回去了，老師一定要記得吃飯哦！知道了嗎？"
1008206-156 = "下次見！"
1008206-160 = "[ns]「啊，嗯……路上小心。」"
1008206-163 = "[ns]「我讓蓮華太費心了嗎？」"
1008206-165 = "（蓮華離開後，回想著今天發生的種種……）"
1008206-172 = "[ns]「你好，這裡是夏萊……」"
1008206-174 = "啊！老師！是我啦！我蓮華啦！"
1008206-175 = "啊？詐騙？你才不會輕易上當！？"
1008206-176 = "我難得打電話過來，老師這是什麼反應啊！#n不過我剛才那樣好像還真的有點像詐騙……"
1008206-177 = "總之，我有個問題想問你……"
1008206-178 = "那個，就是……#n老師平常喜歡吃什麼……有沒有不能吃的食物之類的。"
1008206-179 = "總是要避開會過敏的食材比較好吧？#n嗯？為什麼要問這個？"
1008206-180 = "這是……問，問卷調查啦！百花繚亂的所有人我都會問！"
1008206-181 = "老師只是順便問一下而已！#n所以……可以告訴我嗎？"
1008206-185 = "[ns] 如實回答蓮華提出的問題"
1008206-189 = "……嗯，謝謝你。"
1008206-190 = "那麼……我會拿出全力的，老師。把脖子洗乾淨等著吧！"
1008206-191 = "[s]「你剛才是不是突然做了什麼危險的宣言！？」"
1008206-192 = "明天見！"
1008206-199 = "（有點讓人不知所措的對話結束後……）"
1008206-203 = "（到了第二天）"
1008206-209 = "（就在和昨天一樣處理夏萊的業務時……）"
1008206-215 = "[ns]「啊，蓮華。你不是說今天會來嗎？」"
1008206-219 = "啊，那個……去夏萊之前需要做一點心理準備。"
1008206-220 = "把這當成「青春活動」直接拿給你……果然還是太難了……"
1008206-221 = "……老師，你現在在夏萊對吧？#n旁邊有沒有其他人？應該只有老師一個人吧？"
1008206-222 = "那，那就好……#n現在……可以麻煩你出來一下嗎？"
1008206-223 = "我會在夏萊附近的公園等你。"
1008206-224 = "待會見……！"
1008206-232 = "[ns]「蓮華說要碰面的地方應該是這附近……」"
1008206-236 = "啊！老師！#n我，我在這裡……"
1008206-237 = "今天請老師出來不為別的……"
1008206-238 = "老師這幾天都以師父的身分陪著我，就連飯都沒有好好吃……#n而且我還給師父添了不少麻煩……"
1008206-239 = "[s]「不用放在心上啦……」"
1008206-240 = "不，就算老師不介意我也介意！"
1008206-244 = "所以……來……！這個給你……！"
1008206-249 = "[ns]「啊……」"
1008206-254 = "[ns]「這是便當……？」"
1008206-255 = "― [log=렌게]沒，沒錯！[/log][wa:990] "
1008206-257 = "― [log=렌게]居然一眼就發現了！不愧是師父！[/log][wa:1670] "
1008206-260 = "― [log=렌게]這，這是我為師父準備的……！[/log][wa:2530] "
1008206-263 = "[ns]「謝謝你的好意，但是蓮華為什麼突然幫我準備便當……」"
1008206-264 = "― [log=렌게]我至今為止，對老師說了很多任性的話……[/log][wa:2310] "
1008206-266 = "― [log=렌게]卻從來沒有好好報答……[/log][wa:1050] "
1008206-269 = "― [log=렌게]還給你添了麻煩……[/log][wa:540] "
1008206-271 = "― [log=렌게]那個，該說是感謝的心意嗎……[/log][wa:1960] "
1008206-274 = "― [log=렌게]這，這是我第一次做的……[/log][wa:1560] "
1008206-276 = "― [log=렌게]所以，味道我不太敢保證……[/log][wa:2770] "
1008206-279 = "― [log=렌게]而且這種事，對我來說感覺也還有點太早了……[/log][wa:2760] "
1008206-281 = "― [log=렌게]但，但是我很努力……！[/log][wa:2130] "
1008206-284 = "[ns]「……謝謝你，蓮華，我會好好享用的。」"
1008206-285 = "― [log=렌게]啊，呃，嗯……[/log][wa:3020] "
1008206-288 = "― [log=렌게]那，請，請慢慢……[/log][wa:2330] "
1008206-290 = "― [log=렌게]享，享用……[/log][wa:2800] "
1008206-293 = "……便，便當我已經交給你了哦！？"
1008206-294 = "這樣青春等級就又提高了！"
1008206-298 = "那……我先走了……！"
1008206-304 = "（於是回到夏萊品嚐蓮華的便當，味道非常柔和）"

[translation]
1008206-1 = "ความขอบคุณของวัยรุ่น"
1008206-3 = "[ns] \"ต้องทำงานค้างให้เสร็จก่อนที่เรนเกะจะมาแล้วละ\""
1008206-11 = "[ns] \"กองนี้เสร็จแล้ว งั้นต่อไปก็...\" "
1008206-14 = "(หลังจากทำงานแบบไม่ลืมหูลืมตา ก็ถึงเวลาที่เรนเกะบอกไว้ว่าจะมาหา)"
1008206-18 = "[ns] \"...จะว่าไป ข้าวมื้อสุดท้ายกินไปเมื่อตอนไหนนะ\""
1008206-19 = "(คุณครูมัวแต่ง่วนอยู่กับกองงานที่ค้างอยู่ เลยจำไม่ได้ว่าตัวเองได้กินข้าวมื้อสุดท้ายไปเมื่อไร และในตอนนั้นเอง...)"
1008206-24 = "คุณครู...!"
1008206-25 = "ไม่สิ ท่านอาจารย์! ฉันมาแล้ว!"
1008206-26 = "วันนี้ก็มาทำ <กิจกรรมวัยรุ่น> ให้มันกระปรี้กระเปร่ากันเถอะ...!"
1008206-30 = "...หืม? เป็นอะไรไปน่ะ? ท่านอาจารย์! ทำไมถึงหมดแรงอยู่บนโต๊ะแบบนั้นล่ะ? ปกติไม่เห็นเป็นแบบนี้#nเลยนี่นา"
1008206-31 = "[s] \"ครูไม่ได้เป็นอะไรหรอก แค่เหนื่อยจากงานนิดหน่อยน่ะ\""
1008206-32 = "หืม...? งั้นเหรอ...?"
1008206-33 = "ถ้าไม่เป็นไรก็ค่อยยังชั่วหน่อย"
1008206-34 = "[s] \"อื้ม พอเจอเรนเกะยิ่งทำให้มีแรงขึ้นด้วยซ้ำ\""
1008206-35 = "วะ... ว่าไงนะ?!"
1008206-36 = "พะ...พูดอะไรแบบนี้ออกมาได้หน้าตาเฉยเหมือนไม่รู้สึกอะไร ไม่ธรรมดาเลยนะเนี่ย..."
1008206-37 = "ถ้าเป็นคนอื่นที่ไม่ใช่ <วัยรุ่นผู้มีประสบการณ์> อย่างฉันละก็ อาจโดนเล่นงานจากคำพูดนั้นได้เลย...! "
1008206-38 = "สมกับเป็นผู้มีประสบการณ์ตัวจริง...!"
1008206-39 = "[s1] \"แต่ครูไม่ได้มีเจตนาแบบนั้นนะ...\"\n[s2] \"อัปเลเวลจากวัยรุ่นมือใหม่แล้วสินะ...\""
1008206-44 = "เอาละๆ วันนี้ฉันก็เตรียมเรื่องราวใหม่มาให้ทำ <กิจกรรมวัยรุ่น> อีกเหมือนเคย"
1008206-45 = "วันนี้ก็มาพยายามอย่างเต็มที่กันเถอะ!"
1008206-46 = "[s] \"อื้ม งั้นก็ไปกันเลย\""
1008206-52 = "(และคุณครูกับเรนเกะก็ออกไปทำ <กิจกรรมวัยรุ่น> อย่างมุ่งมั่นด้วยกันอีกหนึ่งวัน)"
1008206-62 = "(แต่ว่า...)"
1008206-67 = "อืมมม~~"
1008206-68 = "ฮื้มม~ วันนี้ใช้เวลาอย่างคุ้มค่ามากเลยละ! ท่านอาจารย์!"
1008206-69 = "วันนี้ฉันได้ทำ <กิจกรรมวัยรุ่น> หลายอย่าง ก็เลยได้ทั้งแต้มและสะสมประสบการณ์มาจนอัปเลเวลไปอีก#nขั้นได้เลยนะเนี่ย!"
1008206-70 = "รู้สึกเหมือนได้เข้าใกล้ 'วัยใสมาสเตอร์' เข้ามาอีกก้าวแล้ว!"
1008206-71 = "[s3] \"อัปเวลจากมือใหม่ สู่ผู้มีประสบการณ์ ไปถึงมาสเตอร์สินะ!\"\n[s4] \"มีระบบเลเวลจริงจังมากกว่าที่คิดนะเนี่ย!\""
1008206-74 = "ไม่ว่าจะทำอะไรก็ตาม สิ่งสำคัญก็คือการเดินหน้าไปทีละขั้นๆ อย่างจริงจังนะ"
1008206-75 = "เอาเถอะ ยังไงวันนี้ก็ขอบคุณนะที่มาอยู่ด้วย..."
1008206-84 = "หืม...? ท่านอาจารย์! เป็นอะไรไปน่ะ?"
1008206-85 = "[s] \"อ้อ เรนเกะ ขอโทษนะ ครูเหมือนจะ...\""
1008206-97 = "ทะ... ท่านอาจารย์?!"
1008206-101 = "เป็นอะไรรึเปล่า?! ท่านอาจารย์...!"
1008206-105 = "เอ๋...?"
1008206-108 = "(คุณครูกลับมาที่ชาเล่ต์ได้ด้วยความช่วยเหลือของเรนเกะ)"
1008206-111 = "งั้นก็สรุปได้ว่า..."
1008206-112 = "ที่ผ่านมาทำงานยุ่งมากๆ จนจำไม่ได้ว่ากินข้าวมื้อสุดท้ายไปตอนไหน?"
1008206-113 = "ก็เลยหิวจนเวียนหัวและเป็นลมไป... แบบนี้เหรอ?"
1008206-114 = "[s] \"...ใช่แล้ว\""
1008206-115 = "...ฮึ่ยยย"
1008206-116 = "[s] \"เดี๋ยวสิ... เรนเกะ? ทำไมทำหน้าอย่างนั้น...\""
1008206-120 = "แบบนั้นไม่ได้นะ!! คุณครู!"
1008206-122 = "[ns] \"เย้ย?! ตกใจหมด!\""
1008206-123 = "ต่อให้งานจะยุ่งแค่ไหนก็ต้องกินข้าวสิ!"
1008206-124 = "ไม่ว่าจะทำอะไรก็ต้องมีเรี่ยวแรงไว้ก่อน! ไม่กินข้าวได้ยังไง! ทำแบบนี้ไม่ได้นะ!"
1008206-125 = "วันนี้ถือว่ายังโชคดีที่มีฉันอยู่ด้วย นี่ถ้าเกิดว่าเป็นลมไปตอนอยู่คนเดียวจะทำยังไง?"
1008206-126 = "อ๊ะ แต่ว่า... ที่คุณครูต้องงานยุ่งจนลืมกินข้าว..."
1008206-130 = "หรือว่า..."
1008206-131 = "...เป็นเพราะฉัน?"
1008206-132 = "[s] \"หืม? เพราะเรนเกะงั้นเหรอ? ไม่หรอก เป็นเพราะครูงานยุ่งจริงๆ น่ะ...\""
1008206-133 = "...ไม่หรอก ฉันรู้แล้วล่ะ"
1008206-134 = "ปกติคุณครูก็หัวหมุนกับงานของชาเล่ต์อยู่แล้ว แต่ฉันยังไปดึงคุณครูให้มาช่วยให้คำแนะนำในการเป็น#nวัยรุ่นของฉันอีก"
1008206-135 = "ถึงแม้คุณครูจะยินดีให้ความร่วมมือก็เถอะ"
1008206-136 = "แต่มันก็จริงที่คุณครูงานยุ่งขึ้นเพราะมาทำ <กิจกรรมวัยรุ่น> กับฉัน จนเกิดเรื่องราวแบบนี้..."
1008206-137 = "[s] \"ถ้าเรื่องนั้นครูไม่เป็นไรจริงๆ เรนเกะ ครูเต็มใจช่วยนะ\""
1008206-138 = "คุณครู..."
1008206-139 = "..."
1008206-140 = "จริงๆ เลย! เกิดเรื่องแบบนั้นขึ้นแล้วยังมาพูดแบบนี้อีก"
1008206-141 = "นี่ถ้าฉันไม่ได้เป็นวัยรุ่นเอ็กซ์เปิร์ต ฉันคงไปไม่เป็นแล้ว!"
1008206-142 = "[s] \"...อัปเลเวลใหม่อีกแล้วเหรอ?\""
1008206-143 = "เฮ้อ~ อย่าสนใจเรื่องเล็กน้อยเลย!"
1008206-144 = "(ในเมื่อกิจกรรมวัยรุ่นทำให้เกิดเรื่องแบบนี้... จะมีอะไรที่ฉันพอทำได้บ้างนะ...)"
1008206-149 = "อ๊ะ จริงสิ!"
1008206-150 = "...อืม ดีละ ฉันปิ๊งไอเดียขึ้นมาได้พอดี งั้นวันนี้เราแยกย้ายกันก่อน! "
1008206-155 = "ฉันขอกลับก่อนนะ คุณครูก็หาข้าวกินด้วยละ กินให้ตรงเวลาด้วยนะ! เข้าใจใช่มั้ย?"
1008206-156 = "งั้นก็... บ๊ายบาย!"
1008206-160 = "[ns] \"อ่า... อื้ม... กะ... กลับดีๆ ล่ะ\""
1008206-163 = "[ns] \"ทำให้เรนเกะเป็นห่วงเกินไปรึเปล่านะ\""
1008206-165 = "(หลังจากเรนเกะกลับไป คุณครูก็นึกถึงเรื่องราวที่เกิดในวันนี้ และกำลังจะจัดการข้าวของ)"
1008206-172 = "[ns] \"ฮัลโหล...\""
1008206-174 = "อ๊ะ! คุณครู! ฉันเองนะ! เรนเกะ!"
1008206-175 = "ว่าไงนะ? รู้เลยว่าเป็นมิจฉาชีพ... และจะไม่ยอมโดนหลอกงั้นเหรอ?!"
1008206-176 = "ฉันอุตส่าห์โทรมาหาทั้งที พะ... พูดอะไรของคุณครูเนี่ย?! เอ่อ... ถึงเมื่อกี้ฉันจะพูดแพทเทิร์นเหมือนพวก#nมิจฉาชีพไปหน่อยก็เถอะ!"
1008206-177 = "ฉันมีเรื่องอยากถามน่ะ..."
1008206-178 = "คือว่า... แบบว่า... ปกติคุณครูมีอาหารที่ชอบกินหรือเปล่า... หรือว่ามีอะไรที่ไม่กินมั้ย? อะไรประมาณนี้น่ะ"
1008206-179 = "ก็... เราไม่ควรกินอะไรที่ตัวเองแพ้ไม่ใช่รึไง? อ่า ทำไมฉันถึงอยากรู้เรื่องแบบนั้นน่ะเหรอ? "
1008206-180 = "เอ่อ... อ้อ ทำแบบสำรวจน่ะ! แบบสำรวจ! พอดีฉันกำลังถามทุกคนในเฮียกกะเรียวรันอยู่!"
1008206-181 = "ก็เลยคิดว่ามาถามคุณครูด้วยดีรึเปล่า... ก็เลยโทรมานี่ละ! อื้ม คุณครูพอจะตอบฉันได้มั้ย..."
1008206-185 = "[ns] ตอบสิ่งที่เรนเกะถามอย่างละเอียด"
1008206-189 = "...ดีมาก แค่นี้ก็เพียงพอแล้ว"
1008206-190 = "ถ้างั้น... ฉันจะทุ่มสุดตัวแล้วลองทำดู คุณครูล้างท้องรอฉันได้เลย!"
1008206-191 = "[s] \"ทำไมต้องพูดเหมือนกับจะขู่กันตลอดเวลาเลยด้วยเนี่ย?!\""
1008206-192 = "งั้นเจอกันพรุ่งนี้นะ...!"
1008206-199 = "(หลังจากจบบทสนทนาที่รีบเร่ง...)"
1008206-203 = "(และเช้าวันใหม่ได้มาถึง...)"
1008206-209 = "(ในขณะที่คุณครูกำลังจัดการงานของชาเล่ต์อยู่เหมือนเมื่อวาน)"
1008206-215 = "[ns] \"อ้อ เรนเกะ บอกไว้ว่าวันนี้จะมาหาสินะ\""
1008206-219 = "อื้ม เรื่องนั้นน่ะ ต้องบอกว่าฉันต้องการเวลาเตรียมใจในการไปที่ชาเล่ต์สักหน่อย"
1008206-220 = "หรือต้องบอกว่าการเอาไปให้ด้วยตัวเองในรูปแบบของ <กิจกรรมวัยรุ่น> มันเป็นเรื่องยากดีล่ะ... ฮืมม..."
1008206-221 = "...คุณครู ตอนนี้อยู่ที่ชาเล่ต์ใช่มั้ย? ข้างๆ มีใครอยู่รึเปล่า? หรือว่าอยู่คนเดียว?"
1008206-222 = "ดะ... ดีละ... ถะ... ถ้างั้น ชะ... ช่วยออกมาหน่อยได้มั้ย ตอนนี้เลย..."
1008206-223 = "อื้ม ฉันจะรออยู่ที่สวนสาธารณะใกล้ๆ ชาเล่ต์"
1008206-224 = "ไว้เจอกันนะ...!"
1008206-232 = "[ns] \"ที่ที่เรนเกะให้มาหา น่าจะแถวนี้นะ...\""
1008206-236 = "อ๊ะ! คุณครู! ตะ... ตรงนี้..."
1008206-237 = "ที่ฉันเรียกให้คุณครูมาหาในวันนี้  ก็ไม่มีอะไรมากหรอก..."
1008206-238 = "หลายวันที่ผ่านมา คุณครูต้องมาสวมบทท่านอาจารย์เพื่อช่วยฉันจนไม่ได้กินข้าว... และฉันก็ทำให้คุณครู#nต้องเดือดร้อนในหลายๆ เรื่อง"
1008206-239 = "[s] \"เรื่องนั้นไม่เป็นไรเลย...\""
1008206-240 = "ไม่หรอก ถึงคุณครูจะบอกว่าไม่เป็นไร แต่ฉันเป็น!"
1008206-244 = "เพราะงั้น... เอ้านี่...! รับไปสิ...!"
1008206-249 = "[ns] \"อ่า...\""
1008206-254 = "[ns] \"นี่มัน... ข้าวกล่อง...?\""
1008206-255 = "― [log=렌게]ชะ... ใช่![/log][wa:790] "
1008206-257 = "― [log=렌게]มองแว็บเดียวก็รู้เลยเหรอ! สมแล้วที่เป็นท่านอาจารย์![/log][wa:230] "
1008206-260 = "― [log=렌게]ฉะ... ฉันเตรียมมาให้ท่านอาจารย์น่ะ...![/log][wa:1570] "
1008206-263 = "[ns] \"ขอบใจที่ให้นะ เรนเกะ แต่ทำไมจู่ๆ ถึงให้อะไรแบบนี้ล่ะ...\""
1008206-264 = "― [log=렌게]ที่ผ่านมาฉันเอาแต่ทำตามอำเภอใจกับคุณครู[/log][wa:1510] "
1008206-266 = "― [log=렌게]แต่ยังไม่เคยตอบแทนให้มันจริงๆ จังๆ เลยสักครั้ง...[/log][wa:10] "
1008206-269 = "― [log=렌게]และเพราะฉันสร้างปัญหาให้...[/log][wa:10] "
1008206-271 = "― [log=렌게]นี่เป็นของแทนคำขอบคุณจากฉันน่ะ...[/log][wa:1200] "
1008206-274 = "― [log=렌게]ฉะ... ฉันเพิ่งเคยทำเป็นครั้งแรก...[/log][wa:680] "
1008206-276 = "― [log=렌게]ก็เลยรับรองไม่ได้ว่าจะรสชาติดีรึเปล่า...[/log][wa:1690] "
1008206-279 = "― [log=렌게]การทำแบบนี้ สำหรับฉันแล้วมันถือว่ายังเร็วไปหน่อยด้วย...[/log][wa:1400] "
1008206-281 = "― [log=렌게]ตะ... แต่ฉันก็ตั้งใจทำให้เลยนะ...![/log][wa:1210] "
1008206-284 = "[ns] \"...ขอบใจนะ เรนเกะ ครูจะกินให้อร่อยเลย\""
1008206-285 = "― [log=렌게]อ่า... เอ่อ... อื้ม...[/log][wa:2420] "
1008206-288 = "― [log=렌게]ถ้างั้นก็ทะ... ทานให้...[/log][wa:1730] "
1008206-290 = "― [log=렌게]อะ...อร่อยนะคะ...[/log][wa:2360] "
1008206-293 = "ถะ... ถือว่าฉันให้แล้วนะ!"
1008206-294 = "งั้นฉันก็จะคิดว่ากิจกรรมวัยรุ่นได้อัปเลเวลขึ้นอีกระดับ! "
1008206-298 = "ถ้างั้น... ฉันไปแล้วนะ...!"
1008206-304 = "(คุณครูกลับมายังชาเล่ต์และกินข้าวกล่องของเรนเกะ และพบว่าเป็นข้าวกล่องที่มีรสชาติอบอุ่นหัวใจ)"

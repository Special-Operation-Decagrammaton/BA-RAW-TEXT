[translation]
10028060-1 = "第6話;事關努力，而非天賦"
10028060-3 = "哈哈……"
10028060-15 = "哈哈……哈哈哈……"
10028060-16 = "哎呀～真是累壞了。#n但畢竟都鬧成這樣了，這也是當然的吧？"
10028060-17 = "……不過還是順利抵達第一節車廂了！#n現在只要停下列車就行了吧？"
10028060-18 = "哈哈哈！"
10028060-19 = "[s1]「一，一花？你沒事吧……？」\n[s2]「文物好像全碎了……」"
10028060-22 = "哈哈。是啊，文物……"
10028060-34 = "唉，算了。管他是茶壺還是尿壺都好。#n就算回去會挨罵或被開除……也無所謂。"
10028060-35 = "而且前輩只要求我把東西帶回去，也沒說要完好無缺地帶回去嘛～#n說不定就這樣帶回去也行哦？哈哈哈哈！"
10028060-36 = "哈哈……哈哈哈……"
10028060-37 = "…………"
10028060-38 = "呼……"
10028060-39 = "我到底在胡說什麼。"
10028060-40 = "對不起，老師。#n我沒有想讓老師看到這副模樣的意思……"
10028060-41 = "真的好久沒把事情搞砸了……簡直是一團亂。"
10028060-42 = "今天本來想表現出好的一面給老師看，結果別說是好的一面……"
10028060-43 = "反而赤裸裸地展現出……我最不想讓人看到的樣子。"
10028060-44 = "唉……"
10028060-45 = "當時我應該再忍耐一下的……"
10028060-46 = "我到底為什麼會那麼做呢？真是太沒用了……"
10028060-50 = "……咦？"
10028060-51 = "你說不覺得我沒用嗎……？"
10028060-52 = "為什麼這麼說……我剛才明明犯了錯……"
10028060-53 = "不是嗎？"
10028060-54 = "……嗯？你說是這樣沒錯？"
10028060-55 = "什麼意思？老師果然也這麼認為嗎？#n那為什麼……"
10028060-56 = "……但是？"
10028060-57 = "但是什麼……？"
10028060-58 = "[s]「……」"
10028060-62 = "[ns3]「老實說，你已經忍得夠久了不是嗎？哈哈哈哈！！」\n[ns4]「我心裡也痛快了不少……所以我們應該算是共犯吧？」"
10028060-66 = "……呵。"
10028060-67 = "哈哈！哈哈哈！"
10028060-68 = "什麼嘛！結果老師的想法也跟我一樣啊？"
10028060-69 = "就是說嘛！看到那個樣子，誰能忍得下去啊！#n而且我也已經忍夠久了！"
10028060-70 = "沒錯沒錯，能忍到那時候已經很了不起了！#n哈哈哈哈哈！！"
10028060-71 = "[s5]「哈哈哈哈哈哈！！」\n[s6]「哈～哈哈哈哈！！」"
10028060-72 = "哈哈哈哈哈哈哈！！"
10028060-73 = "……我不是很喜歡那個笑聲。"
10028060-77 = "啊啊啊～"
10028060-78 = "總之我知道了。#n之後的事就回去再想吧。"
10028060-79 = "報告交給我就行了。#n我會強調老師是迫於無奈才出此下策，請不必擔心。"
10028060-80 = "……什麼？"
10028060-81 = "你要一起回去嗎？"
10028060-82 = "……回茶會？"
10028060-83 = "……為什麼？"
10028060-84 = "[s7]「我們應該一起去道歉。」\n[s8]「不能讓一花自己去。」"
10028060-87 = "……？？？"
10028060-88 = "那是什麼意思……老師沒理由跟我一起去道歉啊。"
10028060-89 = "畢竟運送公文包……還有協助老師這件事，都被我搞砸了。"
10028060-90 = "這一切都是因為我脾氣不好才發生的……老師為什麼要……"
10028060-91 = "[s9]「嗯？一花的脾氣很好啊？」\n[s10]「脾氣不好？一花嗎？沒這回事～」"
10028060-94 = "老師在說什麼啊？#n就算是安慰人，撒那種謊也只會有反效果而已。"
10028060-95 = "我很清楚自己的脾氣不好，所以才會努力忍耐……"
10028060-96 = "但你剛才也看到了吧？#n我最後還是爆炸了。"
10028060-97 = "老實說那才是我的本性……脾氣好只是我裝出來的而已。"
10028060-98 = "畢竟是「老師」，我想你一定早就知道了……"
10028060-99 = "還是老師只是為了避免說出「失望」兩個字才隨便敷衍我呢？"
10028060-100 = "……不是這樣？#n那……究竟是為什麼？"
10028060-101 = "[s11]「一花不是一直都很努力在忍耐嗎？」\n[s12]「所謂的『好脾氣』取決於後天的努力，而不是天賦。」"
10028060-107 = "……哇……"
10028060-108 = "嗯……"
10028060-109 = "哈……"
10028060-110 = "真的是……"
10028060-111 = "哈……！哈哈……！！"
10028060-112 = "原來……還能這麼拐個彎稱讚人的嗎……？#n老實說我真的沒想到。"
10028060-113 = "老師稱讚人的技術真不是蓋的。#n稱你是奇普托斯第二，恐怕沒人敢自稱第一呢。"
10028060-114 = "這真是，該怎麼說呢……"
10028060-115 = "就算我再不好……老師也能把它說成好的……哈哈……"
10028060-116 = "既然老師都這麼說了……"
10028060-117 = "嗯……我也不好意思再多說什麼。#n況且我心裡確實感覺舒服多了。"
10028060-118 = "總覺得有種一切都被老師看透了的感覺……雖然也不是什麼壞事。"
10028060-119 = "嗯……"
10028060-120 = "……真不敢相信。"
10028060-121 = "哈哈。"
10028060-122 = "看來……我今天是來對了呢。"
10028060-123 = "雖然把工作給搞砸了……"
10028060-124 = "不過既然老師說要和我一起去賠罪……"
10028060-125 = "那我就厚著臉皮拜託你囉？哈哈！！"
10028060-129 = "……老師。"
10028060-130 = "既然話都說到這了……"
10028060-131 = "……我想再拜託你一件事。"
10028060-132 = "如果老師願意的話……我果然還是不希望……"
10028060-133 = "剛才的那副模樣……那個……"
10028060-134 = "被三一的其他人……"
10028060-135 = "[s13]「不用擔心，我不會告訴任何人的。」\n[s14]「就當作是我們兩個之間的小祕密吧。」"
10028060-147 = "唔……"
10028060-148 = "原來不用我說，老師也已經全都明白了啊……"
10028060-149 = "有股被捉弄了的感覺……有點討厭，卻又有點開心。"
10028060-150 = "好奇妙的感覺……"
10028060-154 = "這樣下去不行。#n如果老是這樣的話，之後可能會時不時就向老師撒嬌。"
10028060-155 = "這絕對不是隨口說說而已，真的很危險。"
10028060-156 = "「只要有老師在，總會有辦法」──這種模糊的感覺會殘存在心中的某個角落……"
10028060-157 = "唉，真是的，都這個年紀了還撒嬌……"
10028060-158 = "唔……雖然我也不討厭就是了……"
10028060-163 = "……嗯？"
10028060-164 = "等等，那是什麼……？"
10028060-165 = "老師……你有看到嗎？#n就在前面那座橋上……"
10028060-166 = "那是……"
10028060-172 = "[ns15]「是溫泉開發部……嗎……」\n[ns16]「橋上堆滿了炸藥……？」"
10028060-176 = "嗯……"
10028060-177 = "……咦？"
10028060-178 = "為什麼要在那裡設置炸藥……？"
10028060-179 = "他們的部長還在車上耶……？"
10028060-180 = "……等等。#n部長還在車上……？"
10028060-184 = "……啊。"
10028060-187 = "在原定計畫中，如果我沒能成功切斷護送車廂，便會改為執行B計畫……"
10028060-189 = "也就是在約定地點，用炸彈讓列車翻覆，然後趁亂和成員們碰頭逃跑……"
10028060-191 = "別用那種表情看我嘛～"
10028060-193 = "不用擔心，只要有我在就不會發生那種事！"
10028060-195 = "……只要有我在！"
10028060-198 = "用炸彈讓列車翻覆……"
10028060-204 = "不會發生那種事！只要有我在！"
10028060-210 = "……「只要有我在」！"
10028060-215 = "啊……哈……"
10028060-216 = "原，原來是那個意思啊。"
10028060-217 = "[s17]「本來應該要求中斷的人，目前正處於昏迷狀態……」\n[s18]「因為這是佳澄原本設計的逃跑路線……」"
10028060-220 = "哈哈，哈哈哈……"
10028060-221 = "那個人……直到最後的最後還……真的是……"
10028060-223 = "……花樣有夠多，真討厭。"

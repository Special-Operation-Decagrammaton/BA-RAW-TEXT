[translation]
10028060-1 = "ตอนที่ 6;ไม่ใช่นิสัยโดยกำเนิด แต่เป็นความพยายาม"
10028060-3 = "แฮ่ก..."
10028060-15 = "แฮ่ก... แฮ่กกก.."
10028060-16 = "เฮ้อ~ เหนื่อยจังเลยค่ะ แต่ก็นะ ก่อเรื่องวุ่นวายไว้ขนาดนั้น จะไม่ให้เหนื่อยก็คงจะแปลกอยู่นะคะ?"
10028060-17 = "...แต่ยังไงเราก็มาถึงตู้หัวขบวนได้สักทีนะคะ! ทีนี้ก็เหลือแค่หยุดรถไฟก็พอใช่มั้ยคะ?"
10028060-18 = "ฮ่าฮ่าฮ่า!"
10028060-19 = "[s1] \"อะ... อิจิกะ? ไม่เป็นไรเหรอ...?\n[s2] \"วัตถุโบราณเหมือนจะแตกหมดแล้วนะ...\""
10028060-22 = "แหะๆ นั่นสิคะ วัตถุโบราณ... วัตถุโบราณ..."
10028060-34 = "ช่างเถอะค่ะ ฉันก็ไม่รู้ด้วยแล้ว ต่อให้เป็นชุดถ้วยชาหรือกระโถน หรือต่อให้กลับไปโดนสวดหรือโดน#nไล่ออกก็เถอะ... ไม่ต้องสนหรอกค่ะ "
10028060-35 = "ทางนั้นสั่งให้เราเอากลับมา แต่ไม่ได้บอกสักหน่อยว่าให้เอากลับมาในสภาพเดิม~ บางทีแบบนี้อาจจะ#nไม่เป็นอะไรก็ได้ค่ะ แหะๆๆๆ!"
10028060-36 = "แหะๆ... แหะๆๆ..."
10028060-37 = "........."
10028060-38 = "ฮู่ว..."
10028060-39 = "นี่ฉันเอาแต่พูดอะไรเหลวไหลคะเนี่ย"
10028060-40 = "ขอโทษค่ะคุณครู ฉันไม่ได้อยากจะให้เห็นฉันในแง่มุมแบบนี้เลย... ค่ะ"
10028060-41 = "ปกติฉัน... ไม่ได้เป็นคนชอบก่อเรื่องแบบนี้หรอกนะคะ แต่วันนี้ฉันทำให้ทุกอย่างยุ่งเหยิงไปหมดเลย"
10028060-42 = "คนที่บอกว่าอยากให้คุณครูได้เห็นฝีมือการทำงานที่ยอดเยี่ยม..."
10028060-43 = "แต่กลับมาทำให้เห็นการทำงานที่ยอดแย่แทน... ฉันเผลอไปเปิดเผยตัวตนจนหมดสิ้นเลยค่ะ..."
10028060-44 = "เฮ้อ..."
10028060-45 = "...ตอนนี้ควรจะอดทนเอาไว้แท้ๆ โธ่..."
10028060-46 = "ทำไมฉันถึงเป็นแบบนั้นนะ น่าสมเพชที่สุด..."
10028060-50 = "...คะ?"
10028060-51 = "ฉันไม่ได้ดูน่าสมเพชหรืออะไรแบบนั้นหรอกเหรอคะ? ...เอ๋"
10028060-52 = "อืม แบบนั้นมันแปลกๆ นะคะ... เมื่อกี้ฉันเพิ่งทำผิดไปเอง..."
10028060-53 = "...ไม่ใช่งั้นเหรอคะ?"
10028060-54 = "...คะ? มันเป็นความผิดอยู่ก็จริง?"
10028060-55 = "อ้าว? คุณครูก็ไม่ได้ปฏิเสธนี่คะ! แล้วถ้างั้นทำไมถึง..."
10028060-56 = "...แต่ว่า?"
10028060-57 = "...แต่ว่าอะไรคะ?"
10028060-58 = "[s] \"ก็...\""
10028060-62 = "[ns3] \"ว่ากันตามตรงก็ถือว่าอดทนได้มากแล้วนะ ฮ่าฮ่าฮ่าฮ่า!\"\n[ns4] \"ได้ปลดปล่อยตัวเองก็ดีเหมือนกัน ก็เป็นผู้สมรู้ร่วมคิดกันด้วยนี่?\""
10028060-66 = "ฮ่า..."
10028060-67 = "ฮ่าฮ่า! ฮ่าฮ่าฮ่า!"
10028060-68 = "อะไรกันคะเนี่ย~! สุดท้ายคุณครูก็คิดเหมือนฉันหรอกเหรอคะ?"
10028060-69 = "แต่ก็นะ ก็คงต้องเป็นอย่างนั้น เห็นแบบนั้นแล้วจะให้ทนอยู่ได้ยังไงล่ะคะ ว่ามั้ย? ก่อนหน้านั้นก็อดทน#nมาไม่รู้ตั้งเท่าไรแล้วด้วย!"
10028060-70 = "ใช่ ใช่แล้วละ ถือว่าทนมามากแล้ว! ฮ่าฮ่าฮ่าฮ่า!!"
10028060-71 = "[s5] \"ฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!\"\n[s6] \"วะฮ่าฮ่าฮ่าฮ่าฮ่า!\""
10028060-72 = "ฮ่าฮ่าฮ่าฮ่าฮ่าฮ่าฮ่า!!"
10028060-73 = "...ฉันไม่ชอบเสียงหัวเราะแบบนั้นเลยค่ะ"
10028060-77 = "อาา~"
10028060-78 = "แต่ก็ช่างเถอะค่ะ เอาเป็นว่าฉันเข้าใจแล้ว เรื่องที่ต้องกลับไปจัดการก็เดี๋ยวเอาไว้ค่อยคิดตอนกลับไปถึง#nก็แล้วกัน"
10028060-79 = "ยังไงฉันก็เป็นคนรายงานอยู่แล้ว ส่วนเรื่องของคุณครู ฉันจะบอกว่าคุณครูบอกว่าไม่เป็นไร ไม่ต้องกังวลนะคะ"
10028060-80 = "...คะ?"
10028060-81 = "จะไปด้วยกันเหรอคะ? ...ไปที่ไหน?"
10028060-82 = "...สภาน้ำชาเหรอคะ?"
10028060-83 = "...ไปทำไมคะ?"
10028060-84 = "[s7] \"ต้องไปขอโทษด้วยกันสิ\"\n[s8] \"ครูปล่อยให้อิจิกะไปคนเดียวไม่ได้หรอก\""
10028060-87 = "......???"
10028060-88 = "พูดอะไรของคุณครู... ไม่มีเหตุผลที่คุณครูต้องไปขอโทษด้วยกันเลยนี่คะ "
10028060-89 = "นี่มันเป็นเรื่องการขนส่งกระเป๋า... อีกอย่าง งานที่ต้องปกป้องคุณครู ฉันก็เป็นคนทำพังเอง"
10028060-90 = "เรื่องนี้มันเกิดขึ้นเพราะฉันนิสัยไม่ดีเอง... แล้วทำไมคุณครูถึงจะ..."
10028060-91 = "[s9] \"หืม? อิจิกะนิสัยดีจะตาย\"\n[s10] \"นิสัยไม่ดีงั้นเหรอ? อิจิกะน่ะนะ? ไม่ใช่สักหน่อย?\""
10028060-94 = "พูดอะไรไม่เข้าท่าคะ ฉันเข้าใจว่าอยากพูดปลอบใจกัน แต่ถ้าปลอบด้วยคำโกหก มันจะกลับได้ผลใน#nทางตรงกันข้ามนะคะ"
10028060-95 = "และฉันก็รู้ดีที่สุดว่าตัวฉันเองนิสัยไม่ดีค่ะ นั่นเป็นเหตุผลที่ฉันพยายามที่จะอดทนอยู่ตลอด..."
10028060-96 = "แต่เมื่อกี้คุณครูก็เห็นใช่มั้ยคะ... ว่าสุดท้ายแล้วฉันก็ระเบิดออกมาอย่างนั้น"
10028060-97 = "นิสัยโดยกำเนิดของฉันคงเป็นอย่างนั้นน่ะค่ะ ที่ว่าฉันนิสัยดีน่ะ มันเป็นแค่ท่าทางที่ฉันทำไปเพื่อปกปิด#nนิสัยโดยแท้จริงค่ะ"
10028060-98 = "ฉันคิดว่าคนที่เป็นครูน่าจะดูออกเสียอีก..."
10028060-99 = "ถ้าเกิดว่าไม่ใช่ แสดงว่าคุณครูแค่พูดไปอย่างนั้น เพื่อจะได้ไม่ต้องบอกว่าผิดหวังในตัวฉันใช่มั้ยคะ?"
10028060-100 = "...ไม่ใช่งั้นเหรอคะ? ถ้างั้น... มันคืออะไรเหรอคะ?"
10028060-101 = "[s11] \"อิจิกะพยายามที่จะอดทนมาตลอดนี่?\"\n[s12] \" 'นิสัยดี' ไม่ใช่นิสัยโดยกำเนิด แต่เป็นความพยายามนะ\""
10028060-107 = "...ว้าว..."
10028060-108 = "อ่า... อืม... อืม..."
10028060-109 = "ฮ่า..."
10028060-110 = "ว้าว เชื่อเขาเลย..."
10028060-111 = "...ฮะ...! ฮะฮ่า...!!"
10028060-112 = "คุณครู... ช่วยพูดซะดิบดีเลยนะคะ... นึกไม่ถึงเลยน้า~ ว่าจะได้ยินอะไรแบบนี้"
10028060-113 = "ฉันว่าความสามารถในการพูดให้สถานการณ์ดีขึ้นของคุณครูอยู่ในระดับสูงเลยนะคะเนี่ย จะบอกว่าเป็น#nยอดนักพูดก็ได้เลยละค่ะ"
10028060-114 = "ต้องบอกว่า... คุณครูเนี่ย..."
10028060-115 = "ต่อให้ฉัน... จะทำใจให้ไม่ดีใจ... แต่ก็ทำให้ฉันดีใจ... จนได้นะคะ แหะๆ..."
10028060-116 = "ก็ถ้ามาพูดแบบนั้นกับฉันละก็..."
10028060-117 = "อืม ถ้างั้น... ฉันก็ไม่มีอะไรจะพูดต่อแล้วค่ะ แล้วฉันก็รู้สึกสบายใจขึ้นมากเลยด้วย"
10028060-118 = "รู้สึกเหมือนโดนเปิดเผยตัวตนยังไงก็ไม่รู้ แต่แบบนี้ก็ถือว่า... ไม่ได้แย่อะไรหรอกนะคะ"
10028060-119 = "อืม..."
10028060-120 = "...ตายจริง"
10028060-121 = "แหะๆ"
10028060-122 = "ภารกิจคราวนี้... ฉันตัดสินใจไม่ผิดจริงๆ ค่ะที่รับทำ"
10028060-123 = "ถึงงานจะพังไม่เป็นท่าก็เถอะค่ะ..."
10028060-124 = "แต่ว่าเรื่องนั้น คุณครูก็บอกเองว่าจะไปขอโทษทางนั้นด้วยกัน เพราะงั้น..."
10028060-125 = "ฉันขอหน้าไม่อาย แล้วขอร้องคุณครูแบบนั้นดูสักครั้งนะคะ แหะๆ!!"
10028060-129 = "อ่า... คุณครูคะ"
10028060-130 = "ไหนๆ เรื่องมันก็เป็นแบบนี้แล้ว..."
10028060-131 = "ยังไงฉันก็หน้าไม่อายไปแล้ว ถ้างั้นฉันขออีกสักหน่อย... คือฉันมีเรื่องอยากขอร้องคุณครูน่ะค่ะ"
10028060-132 = "ถ้าเกิด... คุณครูไม่ว่าอะไรละก็... ไม่ทราบว่า..."
10028060-133 = "เอ่อ... นิสัยอีกด้านของฉันที่คุณครูได้เห็นไปเมื่อกี้น่ะค่ะ..."
10028060-134 = "คุณครูอย่าไปบอกคนอื่นในทรีนิตี้..."
10028060-135 = "[s13] \"ไม่ต้องห่วงนะ ครูไม่ไปเล่าให้ใครฟังหรอก\"\n[s14] \"ให้เป็นเรื่องที่เรารู้กันสองคนก็พอ\""
10028060-147 = "งือ..."
10028060-148 = "พูดแบบนี้ฉันไม่รู้จะพูดอะไรต่อเลยค่ะ เหมือนคุณครูรู้ทันไปหมดทุกอย่างเลย..."
10028060-149 = "คุณครูใช้คำพูดเก่งแบบนี้ ฉันรู้สึกเหมือนอารมณ์จะขุ่นๆ นิดหน่อย แต่ในทางกลับกัน ฉันก็ว่ามันก็ดีเหมือนกัน..."
10028060-150 = "รู้สึกแปลกจังเลยค่ะ..."
10028060-154 = "ไม่ได้การแล้วค่ะ ถ้าคุณครูทำแบบนี้เรื่อยๆ ละก็ ฉันอาจจะยิ่งดูเหมือนเด็กก็ได้"
10028060-155 = "นี่ไม่ใช่คำพูดที่ไม่มีแก่นสารจากฉันนะคะ แบบนี้มันอันตรายจริงๆ ค่ะ "
10028060-156 = "ส่วนหนึ่งในใจของฉันมีความรู้สึกคลุมเครือที่ว่า หากมีคุณครูอยู่ด้วย ทุกอย่างจะผ่านไปอย่างราบรื่น..."
10028060-157 = "เฮ้อ... อายุเท่านี้แต่ยังทำตัวเหมือนเด็กอยู่เลย แย่ชะมัด..."
10028060-158 = "แต่ฉัน... ก็ไม่ได้ไม่ชอบเท่าไรหรอกนะคะ"
10028060-163 = "...หืม?"
10028060-164 = "เดี๋ยวนะคะ นั่นมัน... อะไรเหรอคะ...?"
10028060-165 = "คุณครู? บนสะพานเหนือแม่น้ำ... ข้างหน้านั่น... คุณครูเห็นมั้ยคะ? นั่นน่ะ..."
10028060-166 = "นั่นมัน..."
10028060-172 = "[ns15] \"ชมรมพัฒนาออนเซ็น... นี่นา...\"\n[ns16] \"วัตถุระเบิดกองโตบนสะพาน...?\""
10028060-176 = "อ่า..."
10028060-177 = "...ทำไมล่ะ?"
10028060-178 = "ทำไมระเบิดถึงถูกติดตั้งอยู่บนนั้นล่ะคะ? เพราะอะไรกัน?"
10028060-179 = "แต่หัวหน้าของพวกเธอก็ยังอยู่บนรถไฟนี้ด้วยนะ...?"
10028060-180 = "...เดี๋ยวก่อน หัวหน้าก็อยู่ด้วย...?"
10028060-184 = "อา..."
10028060-187 = "ถ้าเป็นตามแผนเดิม จะมีการระเบิดรถไฟพลิกคว่ำในจุดที่กำหนด"
10028060-189 = "จากนั้นก็ใช้โอกาสตอนที่ทุกคนชุลมุนกันแอบติดต่อกับสมาชิกคนอื่นแล้วก็หนีไป..."
10028060-191 = "อย่ามองกันด้วยสีหน้าแบบนั้นสิ~"
10028060-193 = "ไม่ต้องกังวลหรอกน่า ตราบใดที่ฉันยังอยู่ดี เรื่องแบบนั้นไม่มีวันเกิดขึ้นแน่"
10028060-195 = "...ตราบใดที่ฉันยังอยู่ดีน่ะ!"
10028060-198 = "ระเบิดรถไฟให้พลิกคว่ำ..."
10028060-204 = "เรื่องแบบนั้นไม่มีวันเกิดขึ้นแน่! ตราบใดที่ฉันยังอยู่ดีน่ะ!"
10028060-210 = "...ตราบใดที่ฉัน \"ยังอยู่ดี\" น่ะ!"
10028060-215 = "อะ... อ๋อ..."
10028060-216 = "หมายความเอาไว้แบบนี้งั้นสินะคะ"
10028060-217 = "[s17] \"คนที่บอกให้หยุดรถไฟ ตอนนี้ก็สลบไปแล้ว...\"\n[s18] \"เพราะเดิมทีแล้วนี่คือแผนหลบหนีของคาสุมิ...\""
10028060-220 = "ฮ่าฮ่า... ฮ่าฮ่าฮ่า..."
10028060-221 = "ยัยคนนั้นเจ้าเล่ห์จนถึงที่สุดจริงๆ สินะ... เชื่อเขาเลย..."
10028060-223 = "...แบบนี้ฉันเกลียดมากๆ เลยละค่ะ"

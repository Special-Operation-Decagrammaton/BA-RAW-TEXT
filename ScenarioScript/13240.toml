[translation]
13240-1 = "第24話;列車砲"
13240-10 = "唔！！"
13240-17 = "真強啊……小鳥遊星野。"
13240-18 = "閃開，眼罩醬。我不想浪費時間。"
13240-19 = "必須在後輩們來之前處理掉那個列車砲才行。"
13240-20 = "我知道……列車砲的管制室在那裡。"
13240-21 = "但是不打倒我就別想過去！！我還能戰鬥！"
13240-25 = "……閃開。"
13240-27 = "還沒結束！！！"
13240-37 = "……攻略即將進入最後階段。"
13240-38 = "攻略方法其一「已經發生的事情無法挽回」。"
13240-39 = "其二「無法克服肉體的極限」。"
13240-40 = "其三「內心無法預測也無法控制」。"
13240-45 = "而最後是其四「千里之堤將潰於蟻穴」。"
13240-46 = "這是藉由滿懷貪欲和罪惡感的罪人，探索無法觸及的真理的活動。"
13240-47 = "在這場混亂的盡頭，我想必能聽到「第六項古則」的答案吧……"
13240-51 = "……嗯？"
13240-52 = "等等，有什麼東西……"
13240-59 = "到了……這裡就是學生會之谷嗎？"
13240-60 = "嗯，星野前輩應該就在這裡。"
13240-61 = "列車砲和蘇芳同學也是……"
13240-63 = "列車砲所在的葬學殿就在前面，我們趕緊出發吧！"
13240-71 = "…… "
13240-72 = "好像跟想像中不太一樣耶……？"
13240-73 = "這裡應該是數百年前，阿拜多斯歷代學生會長建造的展示館……才對……"
13240-74 = "機關炮和崗哨……那是高射炮嗎？#n展示館為什麼需要那種東西？"
13240-75 = "而且還有格黑娜的徽章。"
13240-76 = "……太，太奇怪了吧？#n為什麼在阿拜多斯沙漠的中央會有格黑娜的徽章？"
13240-77 = "…… "
13240-82 = "看那邊。"
13240-83 = "嗯？ "
13240-85 = "那個是……"
13240-88 = "[ns]「那就是……」"
13240-89 = "列車砲…… "
13240-90 = "等，等等？那個大小是正常的嗎？感覺不到遠近感耶……！？"
13240-91 = "列車砲「謝瑪塔」……#n真是大得超乎想像……"
13240-92 = "嗯……"
13240-95 = "[ns]「看來是格黑娜某個人的介入，促成了列車砲的誕生。」"
13240-96 = "應該就是向學生會提供點子，改變令人傷腦筋的沙漠橫貫鐵路事業的人……"
13240-97 = "但是我無法理解那個大小……#n以奇普托斯現在的技術，應該不可能運用那種龐然大物……"
13240-99 = "那麽……那到底……"
13240-100 = "……"
13240-102 = "沒錯！老師！"
13240-105 = "那不是普通的武器！#n從目前的分析結果來看，其中運用了奇普托斯不存在的技術！"
13240-106 = "也就是說那是古代兵器，或是與其相當的某種東西……！！"
13240-107 = "但是到目前為止，那些技術一直都是……#n難道說……？"
13240-108 = "[s]「蓋瑪特利亞……」"
13240-109 = "還，還需要進一步確認！我會再分析看看的！"
13240-110 = "嗚嗚……這種時候要是星奈醬在的話……"
13240-111 = "[s]「星奈的情況如何？」"
13240-112 = "目前還處在睡眠狀態。#n雖然沒什麼大礙……但看起來好像很累……"
13240-117 = "星，星奈醬！？"
13240-118 = "前輩……老師……"
13240-124 = "星奈醬？你沒事吧？有沒有哪裡不舒服？"
13240-125 = "[s]「你還好嗎，星奈？」"
13240-126 = "我睡著的時候……無意識中……發現有視線盯著這裡。"
13240-127 = "視線……？"
13240-128 = "沒錯，有人在盯著這裡……#n正在觀察這裡發生的……情況……"
13240-129 = "[s]「………………………………」"
13240-130 = "咦！？是誰？這裡一個人都沒有啊……！？"
13240-131 = "沒探測到這裡有其他人耶，星奈醬……？"
13240-132 = "但是……就因為是我……所以才能知道。#n這……這股視線是……"
13240-137 = "星奈醬……！？"
13240-146 = "這是……！？"
13240-147 = "槍聲？是那邊傳來的！"
13240-148 = "是星野前輩的槍聲！"
13240-149 = "快去看看！"
13240-154 = "老師？別愣在那邊了，快走吧！"
13240-155 = "[ns]「……知道了！」"

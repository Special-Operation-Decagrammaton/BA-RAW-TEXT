[translation]
13240-1 = "Episode 24;Train Cannon"
13240-10 = "Gah!"
13240-17 = "You truly are strong...Takanashi Hoshino."
13240-18 = "Move aside, Eyepatch. I don't have any more time to waste. "
13240-19 = "I need to take care of that Train Cannon before my underclassmen get here."
13240-20 = "That's right. I'm aware. The control room is over there. "
13240-21 = "But I won't let you get to it, not until you defeat me! I'm still... I'm still standing. "
13240-25 = "...Move."
13240-27 = "No. Not yet!"
13240-37 = "...Our strategy, at last, reaches the finale."
13240-38 = "Strategy one... \"What's done cannot be undone.\""
13240-39 = "Second. \"The body's limits cannot be overcome.\""
13240-40 = "Third. \"The heart cannot be predicted nor controlled.\""
13240-45 = "And lastly. \"The smallest hole can bring down the mightiest dam.\""
13240-46 = "This campaign delves into the elusive truth, driven by the greed and guilt of sinners. "
13240-47 = "At the end of this chaos, we shall finally uncover the answer to the sixth koan!"
13240-51 = "...Hm?"
13240-52 = "Wait, something's..."
13240-59 = "We're here... This is the Valley of Student Council Presidents?"
13240-60 = "Yeah, Hoshino should be here. "
13240-61 = "The Train Cannon and Suou, as well..."
13240-63 = "They should be that way. Let's hurry!"
13240-71 = "... "
13240-72 = "It's different from what I thought it'd be..."
13240-73 = "This is supposed to be an exhibit, created by the student council presidents of Abydos, hundreds of years ago..."
13240-74 = "Machine guns and guard posts... An anti-aircraft gun? Why would an exhibit have all this stuff?"
13240-75 = "Look. Gehenna's emblem. "
13240-76 = "...Th-That's really weird. Why would Gehenna's emblem be on display in the middle of the Abydos desert?"
13240-77 = "... "
13240-82 = "Hey, over there."
13240-83 = "Yes? "
13240-85 = "That's..."
13240-88 = "[ns] \"That's the...\""
13240-89 = "The Train Cannon... "
13240-90 = "W-Wait a second. It's THAT big?! Maybe my depth perception is off or something..."
13240-91 = "The Train Cannon Schemata... It's bigger than I could have imagined... "
13240-92 = "Yeah... "
13240-95 = "[ns] \"Someone from Gehenna must've been involved with its development.\""
13240-96 = "Yes... It must have been the same person who convinced the student council to redirect the Trans-Desert Railway Project."
13240-97 = "Even so, its size doesn't quite make sense... Kivotos just doesn't have the technology to operate something of that magnitude..."
13240-99 = "Then... That's a...."
13240-100 = "..."
13240-102 = "Yes, correct! Sensei! "
13240-105 = "That's no regular weapon! It has technology that simply doesn't exist in Kivotos at this time! "
13240-106 = "In other words, it's an ancient weapon, or at least something equivalent!"
13240-107 = "But until now, such technologies have been continuously... No, it can't be..."
13240-108 = "[s] \"Gematria...\""
13240-109 = "B-But, I still need to confirm some things! Please give me a little more time to analyze."
13240-110 = "Ugh... I wish Plana was here..."

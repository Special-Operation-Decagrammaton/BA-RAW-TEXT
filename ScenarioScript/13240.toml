13240-112 = "She's still asleep. There's nothing particularly wrong with her, but...she seems to be exhausted..."
13240-117 = "P-Plana?!"
13240-118 = "...Arona...Sensei... "
13240-124 = "Are you okay, Plana?! Are you hurting anywhere?"
13240-125 = "[s] \"How are you doing, Plana?\""
13240-126 = "...While I was asleep...floating in my unconsciousness... I sensed a gaze. "
13240-127 = "A gaze...?"
13240-128 = "...Yes, someone is watching...this place...everything that's happening here..."
13240-129 = "[s] \"...\""

[translation]
13240-1 = "ตอนที่ 24;ปืนแม่เหล็กไฟฟ้า"
13240-10 = "อึกก!"
13240-17 = "เก่งจังเลยนะ... ทาคานาชิ โฮชิโนะ"
13240-18 = "หลบไปเถอะ ผ้าปิดตาจัง ฉันไม่อยากเสียเวลา"
13240-19 = "ฉันต้องรีบทำลายปืนแม่เหล็กไฟฟ้าก่อนที่พวกรุ่นน้องจะมา"
13240-20 = "ใช่ ฉันรู้อยู่แล้วละ... ห้องควบคุมปืนแม่เหล็กไฟฟ้าอยู่ทางโน้น"
13240-21 = "แต่ถ้ายังทำอะไรฉันไม่ได้ เธอก็ไปที่นั่นไม่ได้หรอกนะ! เพราะฉัน... ยังไม่เป็นอะไรเลยสักนิด"
13240-25 = "หลบไป..."
13240-27 = "ไม่ให้ไปหรอก!!!"
13240-37 = "ใกล้จะถึงขั้นสุดท้ายของการโจมตีแล้วครับ..."
13240-38 = "วิธีโจมตีที่ 1 <สิ่งที่เกิดขึ้นแล้วไม่อาจหวนคืนได้>"
13240-39 = "วิธีที่ 2 <ฝืนขีดจำกัดของร่างกายไม่ได้>"
13240-40 = "วิธีที่ 3 <จิตใจเป็นสิ่งที่คาดเดาและควบคุมไม่ได้>"
13240-45 = "และวิธีที่ 4 <รอยแตกที่เล็กที่สุดทำให้เขื่อนที่ใหญ่ที่สุดพังทลายได้>"
13240-46 = "แคมเปญค้นหาความจริงที่ไม่สามารถเข้าถึงได้ด้วยแง่มุมของคนบาปผู้มีความโลภและความรู้สึกผิด"
13240-47 = "และในตอนท้ายของความวุ่นวายนี้ กระผมก็จะได้คำตอบของ <กฎโบราณข้อที่ 6> ครับ..."
13240-51 = "หืม...?"
13240-52 = "เดี๋ยวนะครับ มีอะไรบางอย่าง..."
13240-59 = "ถึงแล้ว... ที่นี่เหรอ หุบเขาของประธานสภานักเรียน?"
13240-60 = "อื้ม รุ่นพี่โฮชิโนะน่าจะอยู่ที่นี่นะ"
13240-61 = "ค่ะ รวมถึงปืนแม่เหล็กไฟฟ้า และก็คุณสุโอด้วย..."
13240-63 = "ค่ะ ปืนแม่เหล็กไฟฟ้าน่าจะอยู่ด้านโน้นนะคะ รีบไปกันเถอะค่ะ!"
13240-71 = "..."
13240-72 = "เหมือนมีบางอย่างไม่เหมือนกับที่ฉันคิดไว้เลย...?"
13240-73 = "มันควรจะเป็น... หอนิทรรศการของอดีตประธานสภานักเรียนอะบิดอสที่สร้างไว้เมื่อหลายร้อยปีก่อนสิ..."
13240-74 = "แต่นั่นมันปืนกล จุดตรวจ... แล้วก็ปืนใหญ่? ทำไมถึงต้องมีอะไรแบบนั้นในหอนิทรรศการด้วยล่ะ?"
13240-75 = "แถมนี่ยังเป็นเครื่องหมายของเกเฮนน่าอีก"
13240-76 = "มะ... มันแปลกๆ นะ ทำไมเครื่องหมายของเกเฮนน่าถึงมาอยู่กลางทะเลทรายอะบิดอสล่ะ?"
13240-77 = "..."
13240-82 = "นั่น ทางนั้น"
13240-83 = "หืม?"
13240-85 = "นั่นมัน..."
13240-88 = "[ns] \"นั่นมัน...\""
13240-89 = "ปืนแม่เหล็กไฟฟ้า..."
13240-90 = "ดะ... เดี๋ยวนะ? มันใหญ่ขนาดนั้นเลยเหรอ? ว่าแต่ทำไมถึงได้รู้สึกว่ามิติของมันแปลกๆ...!"
13240-91 = "ปืนแม่เหล็กไฟฟ้าแบบรางคู่ขนาน <เชมาตา>... มีขนาดใหญ่กว่าที่คิดเยอะเลยนะคะ..."
13240-92 = "อืม..."
13240-95 = "[ns] \"ตอนสร้างปืนแม่เหล็กไฟฟ้า มีใครบางคนจากเกเฮนน่ามาแทรกแซงน่ะ\""
13240-96 = "ค่ะ... คงเป็นคนที่เสนอไอเดียเปลี่ยนกิจการทางรถไฟข้ามทะเลทรายตัวปัญหาให้กับทางสภานักเรียน#nสินะคะ..."
13240-97 = "แต่ว่า... ฉันไม่เข้าใจเรื่องขนาดของมันเลยค่ะ... เทคโนโลยีของคิโวทอสในปัจจุบันก็ไม่น่าจะสร้าง#nปืนที่ขนาดใหญ่แบบนั้นได้นะ..."
13240-99 = "ถ้างั้น... มันคืออะไรกันแน่..."
13240-100 = "..."
13240-102 = "ค่ะ ใช่แล้วค่ะ! คุณครู!"
13240-105 = "นั่นไม่ใช่อาวุธทั่วไปหรอกค่ะ! มีการวิเคราะห์ว่านั่นเป็นเทคโนโลยีที่ไม่มีอยู่ในคิโวทอสในปัจจุบันค่ะ!"
13240-106 = "แปลว่ามันเป็นอาวุธโบราณ หรือเป็นบางอย่างที่เทียบเท่ากันค่ะ...!!"
13240-107 = "แต่ว่าเทคโนโลยีเหล่านั้นยังปรากฏถึงตอนนี้... หรือว่า...?"
13240-108 = "[s] \"เกมาเทรีย...\""
13240-109 = "ตะ... แต่ก็ยังต้องตรวจสอบเพิ่มอีกหน่อยค่ะ! หนูจะลองวิเคราะห์ต่อนะคะ!"
13240-110 = "ฮือ... เวลาแบบนี้อยากให้มีพลาน่าจังอยู่ด้วยจัง..."
13240-111 = "[s] \"พลาน่าเป็นยังไงบ้าง?\""
13240-112 = "ยังนอนไม่ได้สติอยู่เลยค่ะ เธอไม่ได้ดูมีปัญหาอะไรเป็นพิเศษ... แต่เหมือนว่าจะอ่อนเพลียมากเลยค่ะ"
13240-117 = "พะ... พลาน่าจัง?!"
13240-118 = "รุ่นพี่... คุณครู..."
13240-124 = "พลาน่าจัง? เป็นยังไงบ้างคะ? เจ็บตรงไหนหรือเปล่าคะ?"
13240-125 = "[s] \"พลาน่า เป็นยังไงบ้าง?\""
13240-126 = "ระหว่างฉันนอนหลับ... ภายใต้จิตใต้สำนึก... ฉันได้เจอกับสายตาของใครบางคนค่ะ"
13240-127 = "สายตาเหรอคะ...?"
13240-128 = "ค่ะ เหมือนมีใครบางคนกำลัง... เฝ้าดูสถานการณ์ที่เกิดขึ้นอยู่ตอนนี้... ที่นี่ค่ะ..."
13240-129 = "[s] \"...\""
13240-130 = "คะ?! คะ... ใครเหรอคะ? ที่นี่ไม่มีใครนะ...?!"
13240-131 = "ไม่มีการตรวจพบใครอื่นที่นี่นะคะ พลาน่าจัง...?"
13240-132 = "แต่ว่า... ฉันรู้ได้เพราะเป็นฉันค่ะ สายตาพวกนั้นมัน..."
13240-137 = "พลาน่าจัง...?!"
13240-146 = "นี่มัน...?!"
13240-147 = "เสียงปืนนี่นา? ดังมาจากทางโน้นค่ะ!"
13240-148 = "นั่นมันเสียงปืนของรุ่นพี่โฮชิโนะ!"
13240-149 = "รีบไปกันเถอะ!"
13240-154 = "คุณครู? อย่ามัวยืนเหม่ออยู่สิ รีบตามมาเร็วเข้า!"
13240-155 = "[ns] \"อื้อ... เข้าใจแล้ว!\""

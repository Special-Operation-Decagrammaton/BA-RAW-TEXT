[translation]
10048070-1 = "Episode 7;Thieving and Smuggling Hour"
10048070-2 = "Distant Cafe"
10048070-3 = "The sun is starting to set."
10048070-4 = "To think, in the dark of tomorrow's night, the Veronica Special Exhibition will open."
10048070-5 = "Can you imagine the glamor and majesty of the exhibition hall?"
10048070-6 = "Hm..."
10048070-7 = "Visitors will drift past the art without a single original thought, as if moved by a conveyor belt."
10048070-8 = "All while clustering in front of the famous works like ants on a piece of candy, nodding and grunting as if they actually feel something."
10048070-9 = "Or they might genuinely appreciate the exhibition?"
10048070-10 = "No. The public doesn't know. They don't sense the aura of an authentic piece or the crude insincerity of a forgery."
10048070-11 = "They don't actually LOOK at the work, you see."
10048070-12 = "For them, it's all the reputation and the price. They let THAT determine how they pretend to feel."
10048070-13 = "They study everything AROUND the painting, but never actually see its true form."
10048070-14 = "...I wonder, again and again. Will there ever be a day when the people truly value real art?"
10048070-15 = "Will the day of true sight ever dawn on the masses?"
10048070-16 = "I doubt it. That sun shall never rise."
10048070-17 = "Tell me, what do you think?"
10048070-22 = "I don't know about all that, but the cafe's about to close, so can you get up so I can stack the chairs?"
10048070-23 = "Ah, oh, ah, my apologies."
10048070-24 = "Th-Then, farewell!"
10048070-29 = "Wildhunt Storage"
10048070-30 = "Fufu, tomorrow the Special Exhibition opens."
10048070-31 = "This isn't our first time guarding the storage, but it is the most nerve-racking. I keep imagining that thief popping out of the shadows."
10048070-32 = "..."
10048070-33 = "Standing guard is difficult enough, and now one of the Seven Prisoners might be involved..."
10048070-34 = "Well, if she doesn't show up to the storeroom today, then I guess she's not coming."
10048070-35 = "Even if she IS some sort of legend, how could she possibly sneak by when all of us are standing here like—"
10048070-36 = "About that."
10048070-37 = "Hm?"
10048070-38 = "What do you suppose we are protecting, and from whom?"
10048070-39 = "Uh...protecting the art from the thief? More precisely, the Veronica pieces..."
10048070-40 = "Are we not protecting the pieces from those who wish to appreciate them?"
10048070-41 = "What are you talking about? The exhibition starts tomorrow. Anyone can come and take a look. We even have free tickets!"
10048070-42 = "But...the Veronica Foundation has decided which pieces are worthy of exhibition."
10048070-43 = "People can only view what the Foundation has curated. They can't freely choose what to see."
10048070-44 = "To say that anyone can freely access art...that's an illusion."
10048070-45 = "...Yeah, but I thought everything stored down here would be featured in the exhibition."
10048070-46 = "Perhaps, but the art pieces in this storeroom are only 10% of the Veronica Foundation's extensive collection."
10048070-47 = "The other 90% are underground somewhere collecting dust in a tomb much like this."
10048070-48 = "Entrapped in a state where no one can enjoy their beauty..."
10048070-49 = "Is that...just? For art to \"belong\" to one who seeks to hoard and seal it away?"
10048070-50 = "The Foundation owns this stuff, so...there's no helping it, right? It is what it is."
10048070-51 = "I guess you're correct in that the owner gets to decide what gets to be on display. But it's their right."
10048070-52 = "I'm not so sure. If someone \"bought\" all the rivers and lakes of the world and then decided that you didn't get to drink...would that be their right?"
10048070-53 = "But that's different."
10048070-55 = "It's truly not."
10048070-56 = "Art and aesthetics are inherent rights. That which is beautiful deserves to be shared."
10048070-64 = "Huh? What?! The lights...!"
10048070-69 = "*pop pop pop*"
10048070-70 = "S-Smoke bombs too...?!"
10048070-71 = "I-Is it the Benevolent Thief...?!"
10048070-72 = "Let's split. I'll cover the back door!"
10048070-73 = "Uh, yeah! I'll go for the gate!"
10048070-79 = "And so, you have arrived..."
10048070-84 = "...the Benevolent Thief."
10048070-86 = "Wildhunt Park"
10048070-87 = "The Benevolent Thief is here! Squad 1, 2, 3, report to Zone A!"
10048070-88 = "Remember your training! This is our school, our grounds! Press our advantage!"
10048070-92 = "Yes, ma'am! Heading to Zone A right..."
10048070-99 = "Huh?!"
10048070-100 = "Report! What's your status?!"
10048070-101 = "Two squad members fell in a crater!"
10048070-102 = "A...crater...? Why is there a...? Get them out!"
10048070-103 = "Yes! It's...I see shovel marks. It's dug like a trap!"
10048070-104 = "A trap?! I didn't authorize any—"
10048070-110 = "A smoke bomb?"
10048070-111 = "*cough* There's so many. Where are they...?"
10048070-112 = "Aaaahh! Report! I've lost visual!"
10048070-113 = "Who could do this?!"
10048070-117 = "Waah... Huuu... I'm sorry, Prefectural Council... I'm SO sorry, Hiromi..."
10048070-118 = "We made them as safe as we could. No one should get hurt..."
10048070-119 = "How's it look, Miyo? Did they fall in the holes?"
10048070-120 = "Uh, yeah. Immaculate work on the traps, Ritsu."
10048070-121 = "Aw, what about me? Don't I get a little praise?"
10048070-122 = "No. You and I are still on the clock. Mogul, take #3 and #5. And....action!"
10048070-123 = "Yup. #3 and #5, we're rolling."
10048070-127 = "More smoke! Get down! Or up! Or....ahhh!"
10048070-128 = "Gah! Ugh, another hole! Pull me out! Again!"
10048070-129 = "Where?! I can't see anything!"
10048070-131 = "Stay sharp, Scribe. A straggler's headed your way."
10048070-132 = "Copy. Mogul, watch the north-east slope. Your flank's vulnerable. Slow movements, don't rush."
10048070-133 = "Copy. Confirmed troops deployed to the west gate of the cache."
10048070-134 = "Take 12, on the mark...and action!"
10048070-135 = "#12... Hot set."
10048070-139 = "Feed is clean. Moving to command."
10048070-140 = "Copy."
10048070-144 = "*exhale*..."
10048070-145 = "Ugh..."
10048070-148 = "Checking in."
10048070-149 = "Miyo? You look a little... Are you okay?"
10048070-150 = "How could I be? Look at us, abetting a criminal and attacking our own Prefectural Council..."
10048070-151 = "Hey. Listen up, Miyo. Remember one thing whenever that little voice in your head makes you feel guilty."
10048070-152 = "Remember what...?"
10048070-153 = "...All the times the Prefectural Council confiscated our goods and cut into our profits!"
10048070-154 = "None of this would have happened if we weren't smuggling!"
10048070-155 = "Miyo, please, PLEASE be positive for once."
10048070-156 = "If this succeeds, we'll not only restore a piece of art to its rightful place, but we'll outsmart the greatest thief in history."
10048070-157 = "This story you wrote can have a happy ending."
10048070-158 = "Happy...ending..."
10048070-162 = "Yes, no matter how I feel, we can't close the book now."
10048070-163 = "Let's see this through, until the final page."
10048070-164 = "Fuyu, how many traps are left?"
10048070-165 = "None. We used them all."
10048070-166 = "Very well. Then we did all we could."
10048070-167 = "Now we can only hope that the Benevolent Thief was successful."
10048070-168 = "And if she still whiffs it after all our help, maybe she should retire."
10048070-169 = "...Indeed."
10048070-170 = "Now, Fuyu, do you still have the real \"The Love of Purple and Blue Light\"?"
10048070-171 = "Of course. It's safe and secure in my case."
10048070-172 = "Good, then let's fall back."
10048070-173 = "After all, the sun's going down..."
10048070-175 = "I find that some of the best conversations happen in the twilight."
10048070-179 = "...!"
10048070-180 = "The veil of darkness hides the performative expressions of day and allows one to speak the truth."
10048070-186 = "Good evening, my anonymous assistants."
10048070-187 = "It's a pleasure to meet you. I am the Benevolent Thief."
10048070-188 = "Shall we...have a little chat?"

[translation]
10048070-1 = "ตอนที่ 7;ยุคสมัยของจอมโจรและการค้าของเถื่อน"
10048070-2 = "คาเฟ่แห่งหนึ่ง"
10048070-3 = "พระอาทิตย์ใกล้จะตกแล้วนะครับ"
10048070-4 = "หลังจากผ่านค่ำคืนนี้ไป นิทรรศการพิเศษเวโรนิก้าก็จะเปิดให้เข้าชมแล้ว"
10048070-5 = "พอจะจินตนาการบรรยากาศในสถานที่จัดนิทรรศการได้มั้ยครับ?"
10048070-6 = "จะเป็นยังไงนะครับ..."
10048070-7 = "ผู้เข้าชมคงจะเดินผ่านผลงานศิลปะไปโดยไม่คิดอะไร เหมือนกับว่าพวกเขากำลังอยู่บนสายพาน#nลำเลียงละมั้งครับ"
10048070-8 = "แต่เมื่ออยู่ต่อหน้าภาพวาดที่มีชื่อเสียง พวกเขาก็คงแห่กันเข้ามาเหมือนฝูงมด แล้วก็คงพยักหน้าราวกับว่ารู้สึกอะไรบางอย่าง"
10048070-9 = "แต่ก็น่าจะรู้สึกอะไรได้ไม่ใช่เหรอครับ?"
10048070-10 = "ไม่หรอก คนส่วนใหญ่น่ะไม่รู้อะไรเลยสักอย่าง ทั้งเสน่ห์ของของจริง และความหยาบกระด้างของ#nของปลอม"
10048070-11 = "คนพวกนั้นไม่ได้ดูภาพวาดหรอกครับ"
10048070-12 = "พวกเขาดูชื่อเสียงและราคาซื้อขายของภาพ แล้วก็เอาไปตัดสินคุณค่าของภาพวาดกันตามอำเภอใจ#nมากกว่า"
10048070-13 = "สรุปก็คือพวกเขาแค่ดูข้อมูลที่อยู่รอบๆ รูปภาพเท่านั้นน่ะครับ"
10048070-14 = "แต่ถึงอย่างนั้นผมก็ยังสงสัยนะครับ... วันที่ทุกคนจะซาบซึ้งในคุณค่าของศิลปะได้เต็มที่..."
10048070-15 = "วันแบบนั้นจะมีจริงหรือเปล่า?"
10048070-16 = "แต่ผมก็ไม่คิดว่าวันนั้นจะมาถึงหรอกนะครับ..."
10048070-17 = "แล้วคุณคิดยังไงล่ะครับ?"
10048070-22 = "เรื่องนั้นผมไม่รู้หรอกครับ แต่ที่รู้คือร้านของเราใกล้จะปิดแล้ว ผมน่าจะต้องเชิญคุณลูกค้ากลับไปก่อน#nนะครับ"
10048070-23 = "อ๊ะ ฮะ... เฮือก ขอโทษด้วยครับ"
10048070-24 = "งะ... งั้นผมขอตัวก่อน"
10048070-29 = "โกดังเก็บงานศิลปะ ไวลด์ฮันต์"
10048070-30 = "ฮู่ว นิทรรศการพิเศษจะจัดขึ้นพรุ่งนี้แล้วสินะ"
10048070-31 = "นี่ก็ไม่ใช่ครั้งแรกที่เรามายืนเฝ้ายามที่โกดัง แต่ทำไมครั้งนี้รู้สึกประหม่าเป็นพิเศษนะ?"
10048070-32 = "......"
10048070-33 = "ปกติการยืนเฝ้ายามก็ไม่ใช่เรื่องง่ายอยู่แล้ว แต่งานนี้ยังมีเรื่องจอมโจรแห่งความเสน่หาเข้ามา#nเกี่ยวข้องด้วย..."
10048070-34 = "แต่ถ้าไม่โผล่มาภายในวันนี้ ก็ไม่น่าจะมาแล้วละเนอะ"
10048070-35 = "ถึงจะได้ชื่อว่าเป็นจอมโจร แต่ถ้าเรามีการรักษาความปลอดภัยที่หนาแน่นแบบนี้ ก็คงเข้ามาขโมยอะไรไปไม่ได้หรอก..."
10048070-36 = "แต่จะว่าไปนะคะ"
10048070-37 = "หืม?"
10048070-38 = "พวกเรากำลังปกป้องอะไรจากใครกันอยู่เหรอคะ?"
10048070-39 = "ก็... ปกป้องโกดังจากโจรไง? ถ้าจะพูดให้ชัดเจน ก็ต้องบอกว่าปกป้องผลงานศิลปะ..."
10048070-40 = "เราไม่ได้ปกป้องงานศิลปะจากผู้ชมงานหรอกเหรอคะ?"
10048070-41 = "หมายความว่ายังไงน่ะ? นิทรรศการจะเริ่มพรุ่งนี้อยู่แล้ว ไม่ว่าใครที่อยากมาชมงาน ก็ต้องได้ชมงานอย่างอิสระสิ"
10048070-42 = "แต่ฝ่ายที่ตัดสินใจว่าผลงานชิ้นไหนบ้างที่จะจัดแสดงในงานก็คือมูลนิธิเวโรนิก้าไม่ใช่เหรอคะ?"
10048070-43 = "ผู้คนมาชมได้แต่ผลงานที่มูลนิธิเลือกเท่านั้นละค่ะ ใช่ว่าจะได้เลือกชมผลงานได้อย่างอิสระสักหน่อย"
10048070-44 = "ความคิดที่ว่าทุกคนเพลิดเพลินกับงานศิลปะได้อย่างอิสระน่ะ เป็นแค่การคิดไปเองเท่านั้นละค่ะ"
10048070-45 = "เอ่อ... แต่นิทรรศการนี้จะจัดแสดงงานศิลปะทุกชิ้นที่อยู่ในโกดังนี้เลยนะ?"
10048070-46 = "ใช่ค่ะ แต่งานศิลปะที่อยู่ในโกดังนี้คิดเป็นแค่ 10% ของงานศิลปะทั้งหมดที่มูลนิธิเวโรนิก้าเป็นเจ้าของ"
10048070-47 = "ส่วนที่เหลืออีก 90% ยังคงถูกเก็บไว้ในโกดังเฉพาะของมูลนิธิ"
10048070-48 = "ในสภาพที่ไม่มีใครยลโฉมความงดงามนั้นได้..."
10048070-49 = "คิดว่านั่นเป็นเรื่องที่ถูกต้องแล้วเหรอคะ?"
10048070-50 = "แต่ก็... ไม่น่าจะทำอะไรได้หรือเปล่า ก็เจ้าของงานศิลปะพวกนั้นคือมูลนิธิเองนี่นา"
10048070-51 = "การจะเปิดเผยหรือปิดไว้ ก็คงขึ้นอยู่กับผู้ที่เป็นเจ้าของผลงานนั้นๆ นั่นละ"
10048070-52 = "งั้นเหรอคะ แล้วถ้าวันหนึ่งมีใครสักคนกว้านซื้อแม่น้ำและทะเลสาบทั้งหมดในโลก แล้วสั่งห้ามไม่ให้จ่ายน้ำดื่ม คุณจะรับสิ่งนั้นได้หรือเปล่าคะ?"
10048070-53 = "เดี๋ยวนะ นั่นมันคนละเรื่องกันต่างหาก"
10048070-55 = "ไม่หรอกค่ะ เรื่องเดียวกันนี่ละ"
10048070-56 = "ศิลปะและความงามคือสิ่งที่ต้องแบ่งปันให้ทุกคนได้เห็นค่ะ"
10048070-64 = "หืม?! อะไรน่ะ?! หลอดไฟในนี้...!"
10048070-69 = "ตู้มมม!"
10048070-70 = "มะ... มีม่านควันด้วย...!!"
10048070-71 = "ระ... หรือจะเป็น จอมโจรแห่งความเสน่หา...?!"
10048070-72 = "เราแยกกันก่อนดีกว่าค่ะ ฉันจะไปดูทางประตูหลังให้เองค่ะ!"
10048070-73 = "อะ... อื้อ! งั้นฉันจะไปฝั่งประตูหน้าให้!"
10048070-79 = "ใช่แล้วละค่ะ จอมโจรแห่งความเสน่หา..."
10048070-84 = "ฉันคนนี้... มาแล้วค่ะ"
10048070-86 = "สนามไวลด์ฮันต์"
10048070-87 = "จอมโจรแห่งความเสน่หาปรากฏตัว! ทีม 1-3 ไปรวมตัวกันที่โซน A!"
10048070-88 = "เคลื่อนไหวตามที่ฝึกซ้อมมา! ที่นี่คือถิ่นฐานของเรา! เราได้เปรียบกว่าอยู่แล้ว!"
10048070-92 = "ค่ะ! พวกเราจะไปที่โซน A เดี๋ยวนี้..."
10048070-99 = "หืม?!"
10048070-100 = "เกิดเรื่องอะไรขึ้นน่ะ?!"
10048070-101 = "จู่ๆ คนของเราก็ตกลงไปในหลุมค่ะ!"
10048070-102 = "ตกหลุม...? ทำไมถึงมีหลุมตรงนี้ล่ะ?!"
10048070-103 = "น่าจะมีใครมาวางกับดักไว้ค่ะ... "
10048070-104 = "กับดักงั้นเหรอ?! แต่พวกเราไม่เคยวางกับดักอะไรนะ?!"
10048070-110 = "ม่านควัน?!"
10048070-111 = "ม่านควันระเบิดมาจากตรงไหนอีก?!"
10048070-112 = "อ๊าาา นี่มันอะไรกัน...!"
10048070-113 = "ฉันไม่เคยเสนอให้เราทำอะไรแบบนี้นี่นา...!"
10048070-117 = "ฮือออ... ขอโทษนะคะ ฝ่ายดูแลหอพักทุกคน... ขอโทษนะคะ ฮิโรมิจัง..."
10048070-118 = "แต่ยังไงฉันก็เลือกใช้กับดักที่ทำให้ไม่เจ็บตัวแล้ว..."
10048070-119 = "เป็นยังไงบ้าง มิโยะจัง? กับดักทำงานได้ผลหรือเปล่า?"
10048070-120 = "อะ... อื้อ ขอบใจที่อุตส่าห์มาขุดหลุมและวางกับดักให้นะ ริตสึจัง"
10048070-121 = "แล้วฉันล่ะ? ไม่ชมฉันบ้างเหรอ?"
10048070-122 = "คุณยังต้องเหนื่อยกับฉันต่ออีกหน่อยนี่คะ เบอร์ 3 กับเบอร์ 5 แอคชั่น!"
10048070-123 = "ค่ะ เปิดกับดักเบอร์ 3 กับเบอร์ 5"
10048070-127 = "มีม่านควันอีกแล้ว!!"
10048070-128 = "ฉันตกหลุมตรงนี้แล้ว! ช่วยฉันด้วย!"
10048070-129 = "ตรงไหนน่ะ?! มองไม่เห็นเลยสักนิด!"
10048070-131 = "คนเดียวที่ไม่ตกหลุมไปทางโน้นแล้ว ระวังด้วยนะ"
10048070-132 = "รับทราบ ตอนนี้ฟุยุอยู่ตรงพื้นที่ลาดเอียงทางทิศตะวันออกเฉียงเหนือที่เป็นจุดอ่อนด้านการแทรกซึม ตอนเคลื่อนไหวก็ระวังด้วยนะคะ"
10048070-133 = "รับทราบ อ๊ะ พบการกระจายกำลังทางประตูทิศตะวันตกของโกดัง"
10048070-134 = "เบอร์ 12 แอคชั่น"
10048070-135 = "กับดักเบอร์ 12 ทำงานได้"
10048070-139 = "เคลียร์ทางนี้ได้แล้ว งั้นฉันจะไปรวมตัวกับทางนั้นนะ"
10048070-140 = "รับทราบ"
10048070-144 = "ฮู่วว..."
10048070-145 = "ฮืออ..."
10048070-148 = "ฉันมาแล้ว"
10048070-149 = "เดี๋ยวนะ เธอโอเคหรือเปล่า? สีหน้าไม่ค่อยดีเลย"
10048070-150 = "จะไปดีได้ไงล่ะคะ... ไม่ว่าจะทำด้วยเหตุผลอะไร แต่เราก็กำลังช่วยเหลืออาชญากร และโจมตีฝ่ายดูแลหอพักอยู่นะ..."
10048070-151 = "ถ้าทุกข์ใจแบบนั้น ก็ให้คิดถึงความจริงนี้ไว้ มิโยะ"
10048070-152 = "อะไรเหรอ...?"
10048070-153 = "หลายครั้งที่งานของเราพังไม่เป็นท่าก็เพราะฝ่ายดูแลหอพักพวกนั้น...!"
10048070-154 = "ถ้าไม่ลักลอบขนส่งสินค้า ก็ไม่มีเรื่องแบบนั้นหรอกค่ะ!"
10048070-155 = "แหะๆ แต่ยังไงก็คิดในแง่ดีไว้เถอะน่า มิโยะ"
10048070-156 = "ถ้าครั้งนี้เราทำสำเร็จ เราจะไม่เพียงแค่เปลี่ยนภาพปลอมแปลงเป็นภาพจริงได้ แต่ยังทำให้อาชญากร#nอย่างจอมโจรแห่งความเสน่หาต้องเดือดร้อนได้ด้วย"
10048070-157 = "เรื่องราวที่เธอเขียนจะจบลงอย่างแฮปปี้เอนดิ้งเลยนะ"
10048070-158 = "แฮปปี้... เอนดิ้ง..."
10048070-162 = "ค่ะ ไม่ว่าจะเป็นยังไง ฉันก็แก้ไขเรื่องราวที่ดำเนินมาถึงตอนนี้ไม่ได้แล้วค่ะ"
10048070-163 = "ไปกันให้สุดทางเลยค่ะ ให้ถึงตอนจบเลย"
10048070-164 = "ตอนนี้เราเหลือกับดักอยู่อีกกี่อันเหรอคะ ฟุยุ?"
10048070-165 = "ใช้ไปหมดแล้วละ"
10048070-166 = "ดีละ งั้นเราก็ทำในส่วนของพวกเราหมดแล้วค่ะ"
10048070-167 = "ที่เหลือก็แค่ภาวนาให้จอมโจรแห่งความเสน่หาขโมยของสำเร็จ..."
10048070-168 = "แต่เอาจริงๆ นะ ถ้าเราช่วยถึงขนาดนี้แล้วยังขโมยของออกมาไม่ได้ ก็ควรจะเลิกใช้ฉายาจอมโจร#nไปเลยว่ามั้ย?"
10048070-169 = "ก็จริงอยู่นะคะ..."
10048070-170 = "ว่าแต่ ฟุยุ เอาภาพ <ใครเล่าจะหลงใหลสีม่วงกับสีคราม> ของจริงมาใช่มั้ยคะ?"
10048070-171 = "ต้องเอามาสิ อยู่ในกระเป๋าของฉันน่ะ"
10048070-172 = "ดีละ งั้นตอนนี้เราก็ล่าถอยกันเถอะค่ะ"
10048070-173 = "พระอาทิตย์ก็กำลังจะตกแล้วด้วย..."
10048070-175 = "ตอนพระอาทิตย์ตกดินเป็นเวลาที่เหมาะกับการพูดคุยกัน ว่ามั้ยคะ?"
10048070-179 = "...!"
10048070-180 = "หลังจากพระอาทิตย์ลับขอบฟ้าไปแล้ว สีหน้าที่หลอกลวงจะถูกซ่อนไว้ สิ่งเดียวที่รับรู้ได้ก็มีแต่เสียงพูดที่แท้จริงเท่านั้น"
10048070-186 = "สวัสดีค่ะ ผู้ช่วยที่ฉันไม่รู้จักชื่อ"
10048070-187 = "ยินดีที่ได้พบนะคะ ฉันคือ <จอมโจรแห่งความเสน่หา> ค่ะ"
10048070-188 = "พวกเรามา... 'คุยกัน' สักเดี๋ยวมั้ยคะ?"

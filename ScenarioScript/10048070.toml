[translation]
10048070-1 = "第7話;怪盜與走私的時間"
10048070-2 = "某間咖啡廳"
10048070-3 = "太陽就快下山了呢。"
10048070-4 = "過了今晚之後，Veronica特展就要開幕了吧。"
10048070-5 = "你能想像展覽會場的景象嗎？"
10048070-6 = "這個嘛……"
10048070-7 = "觀眾們八成會像被放上輸送帶一樣，不假思索地從作品前匆匆走過……"
10048070-8 = "然後在知名的畫作前像螞蟻一樣擠成一團，彷彿若有所思似的點點頭吧。"
10048070-9 = "或許……他們真的有感受到什麼也說不定？"
10048070-10 = "不，大眾根本一無所知。#n無論是真跡所蘊含的氣場，還是贗品所帶有的粗劣。"
10048070-11 = "他們看的不是畫。"
10048070-12 = "他們看的只是那幅畫的名氣和交易價格，並擅自以此衡量畫作的價值。"
10048070-13 = "他們眼中所見到的，只不過是圍繞畫作的資訊罷了。"
10048070-14 = "……然而即便如此，我還是很好奇。#n所有人都能完整理解藝術價值的日子……"
10048070-15 = "那樣的日子，真的會到來嗎？"
10048070-16 = "至少我個人並不這麼認為……"
10048070-17 = "你是怎麼想的呢？"
10048070-22 = "這點我不是很清楚……#n不過我們咖啡廳快打烊了，可以麻煩您配合一下嗎？"
10048070-23 = "啊，啊啊，真不好意思。"
10048070-24 = "那，那我就先告辭了。"
10048070-29 = "狂獵收藏庫"
10048070-30 = "呼，明天特展就要開幕了啊。"
10048070-31 = "雖然不是第一次在收藏庫站崗，這次卻特別讓人神經緊繃呢……你不覺得嗎？"
10048070-32 = "……"
10048070-33 = "光是發呆站崗就已經很不容易了，這次還扯上了慈愛的怪盜……"
10048070-34 = "不過都到今天了還沒出現，我猜應該是不會來了吧。"
10048070-35 = "就算號稱是怪盜，面對這麼森嚴的警戒也不可能跑來自投羅網……"
10048070-36 = "可是話又說回來……"
10048070-37 = "嗯？"
10048070-38 = "我們究竟在保護什麼……又是在防範誰呢？"
10048070-39 = "這……當然是防止小偷闖入收藏庫吧？#n雖然嚴格來說應該是保護作品才對……"
10048070-40 = "不是保護作品免於觀眾的侵擾嗎？"
10048070-41 = "這是什麼意思？明天就是展覽會了耶？#n每個人都可以自由地欣賞啊。"
10048070-42 = "但是決定哪些作品能在展覽會上公開的，卻是Veronica財團。"
10048070-43 = "人們只能看見財團單方面挑選的作品，並不能自由地作出選擇。"
10048070-44 = "任何人都能自由地享受藝術……不過只是錯覺罷了。"
10048070-45 = "……可是我聽說這次的展覽會，預計會展出這個收藏庫裡所有的藝術品耶？"
10048070-46 = "沒錯。然而這個收藏庫裡的藝術品，也只佔Veronica財團擁有的10%而已。"
10048070-47 = "剩下的90%，如今依然被關在財團的倉庫之中。"
10048070-48 = "處於誰也無法享受其美麗的狀態……"
10048070-49 = "這樣真的是正確的嗎？"
10048070-50 = "唔嗯……既然那些藝術品的所有權在財團手上，這也是沒辦法的事吧。"
10048070-51 = "要展示什麼、要隱藏什麼……本來就是擁有者說了算。"
10048070-52 = "這倒未必。舉例來說……#n假如某天有人買下了世上所有的江河湖泊，並宣布禁止供應飲用水……你能接受嗎？"
10048070-53 = "不是，這跟那是兩回事吧。"
10048070-55 = "不，這兩件事並沒有不同。"
10048070-56 = "藝術和美麗──應當與所有人共享才對。"
10048070-64 = "咦！？怎麼回事！？#n電燈怎麼……！"
10048070-69 = "（轟隆！）"
10048070-70 = "煙，煙霧……！？"
10048070-71 = "難，難不成是慈愛的怪盜……！？"
10048070-72 = "總之先分頭行動吧。#n我去後門那邊！"
10048070-73 = "嗯，嗯！那我去正門！"
10048070-79 = "沒錯，慈愛的怪盜……"
10048070-84 = "……我，來了。"
10048070-86 = "狂獵空地"
10048070-87 = "慈愛的怪盜出現了！#n第1、2、3分隊往A區集結！"
10048070-88 = "按照訓練展開行動！#n這裡是我們的主場！對我們更有利！"
10048070-92 = "是！現在立刻往A區集結……"
10048070-99 = "咦！？"
10048070-100 = "怎麼了！？"
10048070-101 = "隊員們突然掉進坑裡了！"
10048070-102 = "坑……？那裡為什麼會有坑！？"
10048070-103 = "應，應該是有人設了陷阱……！"
10048070-104 = "陷阱！？我們沒有設置陷阱啊！？"
10048070-110 = "煙霧！？"
10048070-111 = "煙霧到底是從哪裡冒出來的！？"
10048070-112 = "唔啊，這是怎麼回事……！"
10048070-113 = "我可沒有設想過這種情況啊……！"
10048070-117 = "嗚嗚嗚……對不起，舍監隊的各位……#n對不起，裕美醬……"
10048070-118 = "不過，我設置的都是絕對不會受傷的陷阱……"
10048070-119 = "怎麼樣，美代醬？#n陷阱都有正常運作嗎？"
10048070-120 = "啊，嗯。設置陷阱辛苦了，律醬。"
10048070-121 = "我呢？不稱讚我一下嗎？"
10048070-122 = "你的話還要再辛苦一下吧。#n3號、5號，啟動。"
10048070-123 = "收到。3號、5號手動陷阱，啟動。"
10048070-127 = "又有煙霧彈！！"
10048070-128 = "我掉進坑裡了！快救我出來！"
10048070-129 = "你在哪裡啊！？我什麼都看不見！"
10048070-131 = "有一個沒中陷阱的人往你那邊過去了。小心一點。"
10048070-132 = "收到。冬所在的東北側斜坡容易被滲透，移動的時候請小心。"
10048070-133 = "收到。啊，確認到兵力朝收藏庫西門分散。"
10048070-134 = "12號，啟動。"
10048070-135 = "12號陷阱，啟動。"
10048070-139 = "這邊都排除完畢了。#n我過去跟你會合。"
10048070-140 = "收到。"
10048070-144 = "呼……"
10048070-145 = "嗚嗚……"
10048070-148 = "我來了。"
10048070-149 = "等等，你還好嗎？#n臉色看起來很差哦。"
10048070-150 = "怎麼可能好嘛……#n不管有什麼理由，我們都正在幫助罪犯攻擊舍監隊耶……"
10048070-151 = "煎熬的時候就回想一下吧，美代。"
10048070-152 = "回想什麼……？"
10048070-153 = "回想因為舍監隊而失敗的無數筆買賣啊……！"
10048070-154 = "當初不要走私不就好了嗎！？"
10048070-155 = "哈哈，總之往好處想吧，美代。"
10048070-156 = "只要這次成功，我們不僅能把贗品替換成真跡，甚至還能擺慈愛的怪盜一道。"
10048070-157 = "你所寫下的這個故事，將會迎來圓滿的結局。"
10048070-158 = "圓滿的……結局……"
10048070-162 = "也對。反正故事都寫到這裡也無法回頭了。"
10048070-163 = "就繼續走下去吧。直到結局為止。"
10048070-164 = "冬，現在還剩下幾個陷阱？"
10048070-165 = "全部用完了。"
10048070-166 = "很好，這樣我們能做的都已經做了。"
10048070-167 = "接下來就只能祈禱慈愛的怪盜可以順利完成偷竊了……"
10048070-168 = "不過說真的，要是都幫到這個地步還失敗的話，我看他還是別當怪盜了吧？"
10048070-169 = "……這倒也是。"
10048070-170 = "好……冬，《誰會喜愛紫與藍》的真跡有帶過來吧？"
10048070-171 = "當然。好好地放在我包包裡。"
10048070-172 = "嗯，那我們就撤退吧。"
10048070-173 = "太陽也差不多要下山了……"
10048070-175 = "日落時分，是個適合談話的時間呢。"
10048070-179 = "……！"
10048070-180 = "太陽落下後，虛假的表情將會褪去──唯有真實的聲音才會浮現。"
10048070-186 = "貴安，素未謀面的協助者們。"
10048070-187 = "初次見面。我是「慈愛的怪盜」。"
10048070-188 = "讓我們……稍微「聊聊」吧？"

[translation]
1601505-1 = "Sugar Crash"
1601505-2 = "（和愛莉在MomoTalk上聊完後，出發前往愛莉平時練習的練習室）"
1601505-6 = "……老師？"
1601505-10 = "你好！來這裡有什麼事嗎？"
1601505-11 = "我記得今天應該沒有……練習的行程才對……？"
1601505-12 = "……咦？"
1601505-13 = "問我為什麼會在這裡？那，那個……"
1601505-14 = "唔……說的也是，我為什麼會來這裡呢……啊哈，啊哈哈……！"
1601505-15 = "明明沒什麼事要做，卻還穿著樂團的練習服……"
1601505-19 = "不，不過比起這個！#n真是的……剛才是我先發問的耶，老師！來這裡有什麼事嗎？"
1601505-20 = "……嗯？是來找我的……？#n為什麼呢……？"
1601505-21 = "而，而且老師怎麼會知道我在這裡？#n我好像沒有跟你提過吧……？"
1601505-22 = "……咦？"
1601505-23 = "你說是直覺……？"
1601505-24 = "可能會覺得捨不得……你說我嗎？"
1601505-25 = "[s1]「練習室的租借時間也快到期了吧？」\n[s2]「我覺得如果是愛莉的話，應該會想再來看看這裡。」"
1601505-28 = "啊……"
1601505-29 = "對耶，仔細想想……"
1601505-30 = "雖然我自己沒有意識到，但或許就像老師說的一樣吧。"
1601505-34 = "原來都被老師預料到了，所以才會特地跑來這裡……"
1601505-35 = "……嘿嘿。"
1601505-36 = "不過老實說……#n剛才說我會覺得捨不得……只說對了一半，老師。"
1601505-37 = "該說是不捨嗎……其實……"
1601505-38 = "…………"
1601505-39 = "我只是……覺得這樣的感覺有點難受……"
1601505-40 = "[ns3]「因為樂團要結束了？」\n[ns4]「因為覺得一切可能會回歸原點？」"
1601505-44 = "……嗯。"
1601505-45 = "明明說得有點語無倫次，老師也一下就聽懂了呢。"
1601505-46 = "這段期間我思考了很多，也知道那並不代表一切……"
1601505-47 = "但是要阻止自己「產生那樣的情緒」……對我來說還是有點困難。"
1601505-48 = "總覺得……就像失去了什麼東西一樣。"
1601505-49 = "要大家繼續兼顧樂團的事，果然還是太勉強了吧……#n畢竟我們本來就是因為「放學後的甜點部」而聚在一起的。"
1601505-50 = "想要讓大家能堅持下去，不會感到疲憊的話……#n我們就必須做出取捨，專注在一件事情上。"
1601505-51 = "我也沒有想過要放棄甜點部，徹底轉向樂團活動……"
1601505-52 = "……沒錯。"
1601505-53 = "……我們終究還是「放學後的甜點部」。"
1601505-55 = "大家聚在一起閒聊……一起吃甜點……"
1601505-56 = "我們最終將會回歸……那平凡的日常生活吧？#n那裡才是我該待的地方……這就是我的結論。"
1601505-58 = "那種毫無壓力，同時卻也不值一提的……"
1601505-59 = "當，當然，我現在已經明白那樣也沒什麼不好！是真的！！"
1601505-60 = "但即便如此……！"
1601505-61 = "那樣的未來……"
1601505-62 = "果然還是……跟兩邊活動同時進行的現在有所不同……#n讓我有種好像失去了什麼的感覺……"
1601505-63 = "[s5]「嗯，如果你們沒打算繼續玩樂團的話……」\n[s6]「或許以後就再也體驗不到這種感覺了。」"
1601505-66 = "……是。"
1601505-67 = "應該……就像老師說的一樣吧。"
1601505-68 = "[s]「……但是。」"
1601505-69 = "……？"
1601505-70 = "但是……？"
1601505-71 = "……咦？"
1601505-72 = "……正因如此，反而可以換個角度來想……是嗎？#n怎麼說呢……？"
1601505-73 = "也是因為這樣……我們反而不會只「侷限於」樂團……？"
1601505-74 = "[s7]「是因為你們的情況如此，才能毫無後顧之憂地嘗試樂團。」\n[s8]「假如之後有別的機會，你們也可以繼續嘗試其他的事物。」"
1601505-77 = "…………！！"
1601505-78 = "老師……"
1601505-79 = "真是的，老師總是能隨口說出很棒的話呢。"
1601505-80 = "不對……說不定你其實只是在安慰我……"
1601505-81 = "…………"
1601505-82 = "……我是開玩笑的。"
1601505-83 = "但就算是那樣也沒關係，因為……"
1601505-84 = "聽完老師的話後，我的心情真的輕鬆了不少。"
1601505-85 = "……嘿嘿。"
1601505-86 = "啊啊～不管怎麼樣，樂團的事總算告一段落了呢～#n想不到最後竟然能和老師再看一眼練習室，感覺真不錯！"
1601505-90 = "……老師。"
1601505-95 = "……下次該挑戰什麼好呢？"

[translation]
1601505-1 = "Sugar Crash"
1601505-2 = "After talking to Airi on MomoTalk, I headed over to the band room she usually practiced in."
1601505-6 = "...Sensei?!"
1601505-10 = "Hello there! What brings you here?"
1601505-11 = "Was there a practice on the schedule today...?"
1601505-12 = "...What?"
1601505-13 = "Why am I here? W-Well..."
1601505-14 = "U-Um... Umm.... That is a good question! Why AM I here? Haha... Hahaha!"
1601505-15 = "There aren't any tasks to be done... And I'm even wearing my whole band outfit..."
1601505-19 = "M-More importantly! I'm the one who asked first, Sensei! What brought you here?"
1601505-20 = "...E-Excuse me? You came here for me? B-But...why?"
1601505-21 = "On top of that, how did you know I was here? I don't believe I mentioned to you—"
1601505-22 = "...What?"
1601505-23 = "A hunch? What kind of hunch...?"
1601505-24 = "You thought... I would be missing...practice...?"
1601505-25 = "[s1] \"The rental period on this band room is almost up, right?\"\n[s2]\"I had a feeling you'd want to see it, one last time.\""
1601505-28 = "Ah..."
1601505-29 = "When you put it that way..."
1601505-30 = "I don't think I realized... I believe you may be correct."
1601505-34 = "You anticipated my feelings before I felt them. So, you came all the way out here..."
1601505-35 = "Heehee."
1601505-36 = "But, well... I think you may be half right, half wrong."
1601505-37 = "It's not exactly that I miss it... It's more..."
1601505-38 = "..."
1601505-39 = "There's this...feeling. It just doesn't sit right with me."
1601505-40 = "[ns3] \"Because the band is disbanded?\"\n[ns4] \"Because it feels like going back to regular life?\""
1601505-44 = "...Yes."
1601505-45 = "It's as if you read my mind."
1601505-46 = "I couldn't help but reflect on this entire experience, and I know it's not quite that simple..."
1601505-47 = "But, at the end of the day, I don't think I can push away these feelings anymore."
1601505-48 = "I've been struggling with this feeling that...something important is slipping out of my fingers."
1601505-49 = "We became a club to pursue our love of sweets. It'd be too much for us to attempt to continue our band ventures."
1601505-50 = "Trying to chase after both will only lead the members to burning out... So, we have to choose one or the other."
1601505-51 = "And, of course, becoming a full-fledged band was never a viable option."
1601505-52 = "...Yes."
1601505-53 = "...We are After-School Sweets Club, after all."
1601505-55 = "We'll do as we've always done. We'll meet after school, chit-chat about the latest news over the latest dessert..."
1601505-56 = "We'll...return to everyday life, as it should be. That's the conclusion I came to, after all my reflection."
1601505-58 = "It'll be easy but not anything special..."
1601505-59 = "O-Of course, there's nothing wrong with that! I don't find it lacking or dislike it! Not at all!"
1601505-60 = "But...!"
1601505-61 = "Putting that aside..."
1601505-62 = "Right now, having both the band and the club, we're blessed with so much. On the other hand, this feeling of losing something important..."
1601505-63 = "[s5] \"Well, unless you want to keep up the band...\"\n[s6] \"...This is the last time you'll feel this way.\""
1601505-66 = "...Yes."
1601505-67 = "I suppose..."
1601505-68 = "[s] \"...However.\""
1601505-69 = "Hm?"
1601505-70 = "...However...?"
1601505-71 = "...What?"
1601505-72 = "...That's exactly why I can look at it from a different perspective? What do you mean, Sensei?"
1601505-73 = "We don't have to box ourselves in to just one thing?"
1601505-74 = "[s7] \"You all decided to start a band because of who you are as people.\"\n[s8] \"So, you'll be ready to grab the opportunity to try new things, when they arise.\""
1601505-77 = "...!"
1601505-78 = "Sensei..."
1601505-79 = "How do you always say such kind things with such a serious face?"
1601505-80 = "Unless... You're just trying to comfort me."
1601505-81 = "..."
1601505-82 = "...I'm just kidding."
1601505-83 = "It wouldn't matter either way, though."
1601505-84 = "Because, right now, just your words were enough to lift my spirit, Sensei."
1601505-85 = "Heehee."
1601505-86 = "So, this really is it for our band, isn't it? I'm glad I was able to take one last look around together with you, though. Perhaps things aren't too bad."
1601505-90 = "...Sensei."
1601505-95 = "What should I try next?"

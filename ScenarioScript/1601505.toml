[translation]
1601505-1 = "ชูการ์แครช"
1601505-2 = "(หลังจากคุย MOMOTALK กับไอริเสร็จ คุณครูก็มุ่งหน้าไปที่ห้องซ้อมดนตรีที่ไอริใช้เป็นประจำ)"
1601505-6 = "คุณครู...??? "
1601505-10 = "สวัสดีค่ะ! มีธุระอะไรเหรอคะ?"
1601505-11 = "วันนี้ฉันไม่มีซ้อมอะไรเป็นพิเศษ... แล้วก็ไม่ได้นัดคุณครูนี่นา...?"
1601505-12 = "คะ...?"
1601505-13 = "แล้วทำไมฉันถึงอยู่ที่นี่น่ะเหรอคะ? ระ... เรื่องนั้น..."
1601505-14 = "อ่า... เอ๋... นั่นสินะคะ ทำไมมาอยู่ตรงนี้เนี่ย... แหะๆ แหะๆๆ...!"
1601505-15 = "ทั้งๆ ที่ไม่มีอะไรให้ทำแท้ๆ แต่ก็ยังใส่ชุดตอนซ้อมกับเพื่อนๆ มาอีก..."
1601505-19 = "ระ... เรื่องนั้นช่างเถอะค่ะ! ฉันเป็นฝ่ายถามคุณครูก่อนนะคะ! มาที่นี่ด้วยเรื่องอะไรเหรอคะ?"
1601505-20 = "คะ...? มาหาฉันงั้นเหรอคะ...? หะ... หืม...? ทำไมเหรอคะ...?"
1601505-21 = "ละ... แล้วรู้ได้ยังไงคะว่าฉันอยู่ที่นี่? ฉันไม่ได้บอกไปนี่นา..."
1601505-22 = "คะ...?"
1601505-23 = "แค่คิดว่าน่าจะมาอยู่ที่นี่เหรอ? หมายความว่ายังไง..."
1601505-24 = "เพราะฉันน่าจะเสียดายอะไรอยู่...? ฉันเหรอคะ?"
1601505-25 = "[s1] \"จะว่าไป ใกล้หมดสัญญาเช่าห้องซ้อมแล้วใช่มั้ย?\"\n[s2] \"ครูคิดว่าไอริคงอยากเก็บความทรงจำของที่นี่ต่ออีกหน่อยน่ะ\""
1601505-28 = "อ่า..."
1601505-29 = "นั่นสินะคะ พอมาคิดดูแล้ว มันก็จริง..."
1601505-30 = "คงจะเพราะอย่างนั้นน่ะค่ะ แค่ฉันไม่รู้ตัวเท่านั้น ค่ะ... น่าจะใช่อย่างที่คุณครูว่าค่ะ"
1601505-34 = "คุณครูเดาออกหมดเลยนะคะเนี่ย ก็เลยมาที่นี่สินะ..."
1601505-35 = "แหะๆ..."
1601505-36 = "แต่ว่าที่จริงแล้ว... ที่คุณครูบอกว่าฉันเสียดายน่ะ มันถูกครึ่งไม่ถูกครึ่งค่ะ"
1601505-37 = "จะบอกว่าเสียดายที่มันจะจบแล้วก็ได้... แต่ที่จริงแล้ว..."
1601505-38 = "......"
1601505-39 = "อีกใจหนึ่งก็... ไม่อยากให้เป็นแบบนี้ด้วย..."
1601505-40 = "[ns3] \"เพราะวงดนตนตรีจบลงใช่มั้ย?\"\n[ns4] \"กลัวว่าจะกลับไปจุดเดิมอีกครั้งเหรอ?\""
1601505-44 = "ค่ะ..."
1601505-45 = "ฉันแค่พูดเปรยๆ ไปเอง แต่คุณครูก็เข้าใจได้ทันทีเลยสินะคะ"
1601505-46 = "ที่ผ่านมาฉันก็คิดนู่นนี่มากมายเลยค่ะ แต่ฉันก็รู้นะคะว่าทุกอย่างก็คงไม่จบแค่นี้..."
1601505-47 = "แต่การปฏิเสธว่า 'เราไม่ได้รู้สึกแบบนั้น' ก็ไม่ใช่เรื่องง่ายเลยค่ะ"
1601505-48 = "ฉันรู้สึกเหมือนว่า... สิ่งที่เคยมีจะหายไปหนึ่งอย่างน่ะค่ะ"
1601505-49 = "ถึงยังไงก็คงเป็นเรื่องที่เกินกำลังค่ะ ฉันอยู่ <ชมรมของหวานหลังเลิกเรียน> แท้ๆ แต่ถ้าจะให้ทำ#nกิจกรรมวงดนตรีต่อมันก็..."
1601505-50 = "ถ้าจะไม่ให้เหนื่อยล้ากับกิจกรรมที่จะทำ ฉันก็ต้องโฟกัสแค่สิ่งเดียว งั้นก็แปลว่าฉันต้องเลือกจาก 1 ใน 2 อย่าง..."
1601505-51 = "แต่ฉันก็ไม่เคยคิดว่าจะทิ้งชมรมแล้วไปเอาดีทางวงดนตรีเลยหรอกนะคะ"
1601505-52 = "ค่ะ..."
1601505-53 = "เพราะสุดท้ายแล้วฉันคือ <ชมรมของหวานหลังเลิกเรียน>"
1601505-55 = "ชมรมที่ทุกคนมาเจอกันและพูดคุยนู่นนี่กัน... กินของหวานด้วยกัน..."
1601505-56 = "ใช่ค่ะ... ฉันต้องกลับไปยังชีวิตประจำวันที่เรียบง่ายแบบนั้นค่ะ นั่นคือที่ที่ฉันจะอยู่... บทสรุปมันก็เป็น#nอย่างนี้ละค่ะ"
1601505-58 = "ชีวิตประจำวันที่ไม่มีอะไรต้องกดดัน แต่ในขณะเดียวกันก็ไม่มีอะไรให้โอ้อวด..."
1601505-59 = "นะ... แน่นอนว่าฉันไม่ได้ไม่ชอบชมรมหรือคิดว่าตัวเองบกพร่องเหมือนเดิมหรอกนะคะ!!"
1601505-60 = "แต่แค่...!"
1601505-61 = "มีทั้งความชอบและความเสียใจน่ะค่ะ..."
1601505-62 = "ต่อไปฉันคงไม่ได้ทำอะไร 2 อย่างเหมือนในตอนนี้แล้ว... รู้สึกเหมือนสูญเสียอะไรไปเลย..."
1601505-63 = "[s5] \"ก็นะ ถ้าจะไม่ทำวงดนตรีต่อ...\"\n[s6] \"ก็คงจะรู้สึกแบบนั้นก็ได้\""
1601505-66 = "ค่ะ..."
1601505-67 = "ก็คงใช่ค่ะ..."
1601505-68 = "[s] \"แต่ว่า...\""
1601505-69 = "...?"
1601505-70 = "แต่ว่า...?"
1601505-71 = "คะ...?"
1601505-72 = "ให้ลองคิดตรงกันข้ามดูเหรอคะ...? หมายความว่ายังไง..."
1601505-73 = "ฉันไม่จำเป็น... ต้องทำแค่ 'วงดนตรี' ต่อก็ได้...?"
1601505-74 = "[s7] \"ทุกคนลองทำวงดนตรีกันเพราะมีโอกาสเข้ามาไม่ใช่เหรอ?\"\n[s8] \"เอาไว้ถ้ามีโอกาสอื่นเข้ามา ก็ลองทำอย่างอื่นได้อีกนะ\""
1601505-77 = "......!!"
1601505-78 = "คุณครู..."
1601505-79 = "ขยันพูดคำคมแบบไม่รู้ตัวจังเลยนะคะเนี่ย"
1601505-80 = "แต่มันก็... เหมือนกับคุณครูพูดเพื่อจะปลอบใจฉันอย่างนั้นละ..."
1601505-81 = "......"
1601505-82 = "ฉันล้อเล่นค่ะ..."
1601505-83 = "แล้วก็ไม่เป็นไรหรอกค่ะ เพราะว่า..."
1601505-84 = "พอได้ยินคุณครูพูดแบบนั้น ฉันก็รู้สึกดีขึ้นมาบ้างแล้วค่ะ"
1601505-85 = "แหะๆ..."
1601505-86 = "เฮ้อ~ วงดนตรีคงจบแค่ตรงนี้สินะคะ~ ฉันได้มองดูห้องซ้อมเป็นครั้งสุดท้ายกับคุณครูเหรอคะเนี่ย แบบนี้อาจจะเป็นเรื่องดีก็ได้นะคะ!"
1601505-90 = "คุณครู..."
1601505-95 = "ถ้ามีโอกาสครั้งหน้า... ฉันจะลองทำอะไรดีคะ?"

[translation]
10023100-1 = "Episode 10;Listen Carefully. This is Important."
10023100-3 = "...You were planning this from the beginning."
10023100-4 = "Well, how about we say we operate under different value systems."
10023100-5 = "It was this mission of yours for you, and it was upholding my standards of beauty for me, like protecting the Clock King's Crown."
10023100-6 = "Are you always like this?"
10023100-7 = "What could the bunny mean by \"this\"? Hmmm...."
10023100-8 = "Perhaps \"this\" is believing the ends always justify my means? Oh! Or my utter lack of remorse for betraying allies at the drop of a hat or as long as it benefits me?"
10023100-9 = "Or being willing to give up everything for the sake of my faith?"
10023100-10 = "..."
10023100-11 = "There's your answer."
10023100-12 = "I hope that satisfied your curiosity. "
10023100-14 = "No, I don't understand."
10023100-15 = "How adorable. I never expected you to."
10023100-16 = "There were a few people who thought they could understand, but they all left reciting the same scripts."
10023100-17 = "\"I don't understand... I'll never forgive you! You monster!\""
10023100-18 = "I'm sure even the valiant Sensei will come to the same conclusion eventually."
10023100-19 = "I'm sure there are other ways to tackle this problem."
10023100-20 = "Okay, fine. Let me ask you this. Say I don't take the crown. Then what happens to it?"
10023100-21 = "Until Meitaro is arrested and proven guilty, it will be left to collect dust in the contraband storage of Valkyrie."
10023100-22 = "I see. So the artwork that's supposed to be shared with everybody...will be locked away, forgotten to the world?"
10023100-24 = "...Wouldn't it be shared with the public in some museum, if anything?"
10023100-26 = "You're right. It will be managed and exhibited by those who believe the value of artwork lies in its price tag."
10023100-27 = "Stop mincing your words, Benevolent Thief. What are you getting at?"
10023100-28 = "I am saying, neither is correct. Your side, my side, their side. None of us have the correct answer. "
10023100-37 = "I do not agree!"
10023100-38 = "Our party needs the Crown, or else we cannot clear the quest."
10023100-40 = "Heehee. I truly am sorry to say, but I can't give you that."
10023100-41 = "My only interest is in the art. That it is displayed somewhere it can be appreciated, as it deserves."
10023100-42 = "I suppose we couldn't reach an agreement?"
10023100-43 = "Our time together was short, but it was quite a fun adventure."
10023100-44 = "I did hope against all hopes that it wouldn't have to end this way."
10023100-45 = "I must say the same."
10023100-46 = "However, long goodbyes have never been my style."
10023100-47 = "Clean, flashy, and beautiful. As I've always been, as I'll always be."

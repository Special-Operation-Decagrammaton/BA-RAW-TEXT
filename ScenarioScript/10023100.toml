[translation]
10023100-1 = "第10話;請注意，這是重要的場面"
10023100-3 = "……打從一開始就在他的計畫之內啊。"
10023100-4 = "哎呀，我倒覺得我們只不過是利害關係一致而已吧？"
10023100-5 = "對小姐來說是「任務」，對我來說則是這個「時鐘王之冠」。#n況且，我有說過要和你共享美學嗎？"
10023100-6 = "你一直都抱持著這種生活方式嗎？"
10023100-7 = "呼呣──這個嘛……"
10023100-8 = "你指的是為了達成目的而不擇手段？#n還是──輕易地背叛結盟的對象？"
10023100-9 = "啊啊……抑或是有著為了自己的夙願放棄一切的覺悟？"
10023100-10 = "……"
10023100-11 = "若你是明知我的答案仍向我提問的話，我就告訴你吧──"
10023100-12 = "[ruby= ・     ・ ]都是[/ruby]。"
10023100-14 = "──真是無法理解呢。"
10023100-15 = "呵呵，我從未尋求過理解。"
10023100-16 = "只是嘴上說說的話想怎麼說都行吧？#n……但是大家最終都留下了相同的話並離我而去。"
10023100-17 = "懷疑，拒絕，排除──啊啊，我是怪物，這樣的話！"
10023100-18 = "小姐們也是一樣的對吧？#n……在那邊的老師也是。"
10023100-19 = "……我倒覺得還有其他解決的方法。"
10023100-20 = "那麼，我問你一個問題吧。#n假設我沒有把王冠帶走，之後會怎麼樣呢？"
10023100-21 = "銅田將會遭到逮捕，在其違法交易的嫌疑得到證實之前……#n應該會被扣押在女武神手上才對。"
10023100-22 = "也就是說，貴重的藝術品將會失去被欣賞的機會……這麼說沒錯吧？"
10023100-24 = "……明太郎先生如果被逮捕的話，宅邸的藝術品不是會被捐贈給博物館嗎？"
10023100-26 = "或許是吧。將會經由未曾試圖理解藝術品真正價值的人們之手，#n反覆受到流於形式的管理和展示吧。"
10023100-27 = "所以你究竟想說什麼？"
10023100-28 = "我想說的是，無論哪一種方式都不對。"
10023100-37 = "不行！"
10023100-38 = "愛麗絲和夥伴們需要那個王冠才能完成任務！"
10023100-40 = "呵呵……很遺憾，那樣我會很困擾的。"
10023100-41 = "所謂的藝術品，就該為小姐們這樣的人而存在……#n這才是我行動的動機。"
10023100-42 = "……同盟……結束了嗎……？"
10023100-43 = "呵呵，雖然短暫，但我非常愉快哦。"
10023100-44 = "以這種方式畫下句點……實在不是件令人開心的事呢。"
10023100-45 = "我也同樣感到遺憾。"
10023100-46 = "……不過遺憾而淒美的友情故事就到此為止。"
10023100-47 = "──是時候拉上帷幕了。"

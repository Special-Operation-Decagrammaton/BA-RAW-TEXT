[translation]
10017065-11 = "咖啡廳「White&Mason」入口"
10017065-17 = "（這種時候，如果一花在的話……！）"
10017065-18 = "（但現在，只能靠我自己的力量了……） "
10017065-25 = "唔！"
10017065-26 = "嗚……！"
10017065-27 = "……果然厲害啊，蓮實副部長。"
10017065-28 = "過獎了……美禰團長。"
10017065-29 = "正因如此才令人感到悲痛，擁有如此優秀實力的人……"
10017065-30 = "竟然奪走善良之人的炸雞！"
10017065-32 = "！？"
10017065-33 = "炸雞……"
10017065-34 = "難不成……這就是救護騎士團襲擊實現正義部的理由嗎？"
10017065-35 = "不然還會有什麼理由！"
10017065-36 = "我還以為有什麼其他的原因呢……"
10017065-37 = "像是那種不惜與實現正義部全體為敵的重大事件……"
10017065-38 = "或者是明知可能會發展成政治問題，仍不得不去做的嚴重事態……"
10017065-39 = "因此才像這樣特別挑聖誕節動手……！"
10017065-40 = "結果只是因為炸雞！？"
10017065-41 = "你難道不知道嗎，那個炸雞是──"
10017065-46 = "樣子真狼狽啊，實現正義部！"
10017065-47 = "這就是你們欺負弱小的下場！"
10017065-48 = "我們至今為止承受的痛苦，現在就加倍奉還！"
10017065-49 = "輪到自己遭殃的感覺怎麼樣啊？"
10017065-50 = "嘰哈哈哈，現在該我們出手了！"
10017065-52 = "咦……？這是什麼意思……？"

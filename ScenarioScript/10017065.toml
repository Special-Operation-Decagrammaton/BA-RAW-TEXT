[translation]
10017065-11 = "ทางเข้าคาเฟ่ <ไวท์&เมสัน>"
10017065-17 = "(ในเวลาแบบนี้ ถ้าอิจิกะอยู่ด้วยละก็...!)"
10017065-18 = "(แต่ตอนนี้เราคงไม่มีทางเลือกอื่น นอกจากแก้ไขสถานการณ์ด้วยพลังของเราเอง...) "
10017065-25 = "อึ้ก!"
10017065-26 = "อึกกก...!"
10017065-27 = "ยอดเยี่ยมเลยนะคะ รองหัวหน้าฮาสุมิ"
10017065-28 = "ชมกันเกินไปแล้วค่ะ หัวหน้ามิเนะ"
10017065-29 = "แต่ฉันก็ยังเสียใจนะคะ ที่ใช้ความสามารถโดดเด่นแบบนี้ไปกับเรื่องแบบนั้น"
10017065-30 = "ทำไมถึงไปแย่งไก่ทอดจากคนที่มีจิตใจดีได้ลงคอคะ!"
10017065-32 = "!!"
10017065-33 = "ไก่ทอด... เหรอคะ?"
10017065-34 = "นี่คือ... เหตุผลที่ชมรมอัศวินบรรเทาทุกข์มาบุกชมรมทวงความยุติธรรม... เหรอคะ?"
10017065-35 = "แล้วจะให้มีเหตุผลอื่นอีกเหรอคะ!"
10017065-36 = "ฉันก็นึกว่ามาด้วยเหตุผลใหญ่โตอะไรเสียอีก..."
10017065-37 = "ประเด็นร้ายแรงนี้อาจเปลี่ยนชมรมทวงความยุติธรรมให้เป็นศัตรูได้ และอาจพัฒนาไปสู่ปัญหาทางการ#nเมืองได้เลย..."
10017065-38 = "พวกคุณรู้ข้อนี้ดีแต่ก็ยังเคลื่อนไหวกัน... ฉันก็เลยคิดว่าคงมีสาเหตุอะไรยิ่งใหญ่อยู่เบื้องหลัง"
10017065-39 = "พวกคุณเลยมาบุกชมรมทวงความยุติธรรมของเราแบบนี้! ในวันคริสต์มาส!"
10017065-40 = "ไก่ทอดงั้นเหรอคะ? เพราะไก่ทอดเนี่ยนะ??"
10017065-41 = "พวกคุณน่าจะยังไม่รู้นะคะ! ว่าไก่ทอดนั่นน่ะ!"
10017065-46 = "สมน้ำหน้า! ชมรมทวงความยุติธรรม!"
10017065-47 = "ถ้ามารังแกคนไม่ดี ไม่สิ รังแกคนอ่อนแอ ก็ต้องรับโทษแบบนี้แหละ!"
10017065-48 = "พวกเธอต้องชดใช้ที่รังแกพวกเราตลอดเวลาที่ผ่านมา!"
10017065-49 = "รู้สึกยังไงบ้างล่ะที่โดนหลอกใช้? รอบนี้ก็ตาของพวกเธอแล้ว!"
10017065-50 = "คิกคิกคิก! สะใจเป็นบ้า!"
10017065-52 = "คะ...? ละ... หลอกใช้เหรอคะ?"

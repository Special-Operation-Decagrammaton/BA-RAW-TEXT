10017060-58 = "S-S-S-Sensei?!"
10017060-61 = "(I-I-I-I can't embarrass myself in front of Sensei!)"
10017060-64 = "Kyak! Gyaaaaaah?!"
10017060-69 = "Oh. The Justice Task Force president just passed out like a newborn anteater!"
10017060-70 = "Sensei, what did you do this time?"
10017060-71 = "[s3] \"I didn't do anything!\"\n[s4] \"Why are we just assuming it's my fault?!\""
10017060-75 = "What in the world is going on out here?!"
10017060-79 = "Tsurugi?! Wake up! What happened? Why is she passed out exactly like a newborn anteater?"
10017060-80 = "Ah. There you are, Vice President Hasumi."
10017060-81 = "The Remedial Knights? I see what's going on here."
10017060-82 = "The Remedial Knights launched an attack on the Justice Task Force on Christmas."
10017060-83 = "You're aware that this could turn into a political issue, correct?"
10017060-84 = "What, exactly, was the reason for this assault?"
10017060-85 = "Depending on your answer, the Justice Task Force will have no choice but to respond in kind!"
10017060-87 = "Huh?! W-Wait..."
10017060-88 = "We were just..."
10017060-90 = "As your true friends should, we are merely here to give the Justice Task Force a much-needed wake up call!"
10017060-91 = "What are you babbling about?!"
10017060-92 = "Vice President Hasumi, even you fail to understand?!"
10017060-93 = "I'm devastated. I'm completely heartbroken!"
10017060-94 = "We wish only for your salvation!"
10017060-95 = "I came here to revive the Justice Task Force! To reignite their sense of justice!"
10017060-96 = "I see now that you are lost. But never fear! As a true friend, I shall never shy away from showing you the way!"
10017060-97 = "...What? I am actually lost right now."
10017060-98 = "Tell me, Hasumi, where is the justice in taking from another? Where is the justice in indulging in your own greed on Christmas?"
10017060-99 = "What did we even take away? Can you please start by explaining that part?!"
10017060-100 = "And do you have any idea how hard it was to rent out White & Mason? Of course you don't!"
10017060-101 = "The struggle to rent this cafe... We had to fight through other clubs, conspiracies, and worst of all, bureaucracy!"
10017060-102 = "We even used Tsurugi's presence as a negotiation tactic! We barely pulled it off!"
10017060-103 = "Isn't that a bit manipulative?!"
10017060-104 = "Right or wrong, we did what we had to!"
10017060-105 = "Just do right!"
10017060-106 = "The point is that a lot of effort went into tonight!"
10017060-107 = "And then you threw it all out the window! It's all ruined!"
10017060-108 = "Effort doesn't excuse injustice! The Justice Task Force must be reminded of their purpose!"
10017060-109 = "You're so rigid! You've always been rigid! Remember what you did to that pound cake in your first year?"
10017060-110 = "Don't get ahead of yourself! Let's not start casting stones from glass houses! Or should we talk about that pudding from your first year?"
10017060-111 = "Say one more word, and I will declare war on the Remedial Knights!"
10017060-112 = "You bringing up that pound cake is tantamount to a war declaration itself!"
10017060-113 = "[s5] \"Um, hello?\"\n[s6] \"I'm not really sure about all that dessert stuff, but could I interrupt?\" "
10017060-117 = "Sensei?! I'm glad you're here! Please, listen. All of a sudden, Captain Mine—"
10017060-118 = "I apologize for the commotion, Sensei, but Vice President Hasumi—"
10017060-119 = "Hey! I asked Sensei first!"
10017060-120 = "I saw Sensei before you today!"
10017060-134 = "That's not how questions work! There's just no getting through to you!"
10017060-135 = "For the first time today, we're on the same page!"
10017060-137 = "Captain... I don't know what to do..."
10017060-138 = "..."
10017060-139 = "Serina, Hanae."
10017060-140 = "It's not my place to tell you how to deliver your aid right now."
10017060-141 = "You need to determine that for yourselves."
10017060-142 = "You can join me in saving the Justice Task Force from their own darkness."
10017060-143 = "Or you can give unconditional healing and support to those Justice Task Force members who need it."
10017060-144 = "Having a heart always willing to provide aid, that is where the Remedial Knights begin and end."
10017060-157 = "Wh-What do we do? What do we do?!"
10017060-158 = "First, let's help the captain. Then we need to tend to the injured."
10017060-159 = "Are you sure?"
10017060-160 = "I trust the captain, Hanae. But we also can't neglect the injured members of the Justice Task Force."
10017060-161 = "We don't have to choose a side! We'll help everyone instead!"
10017060-163 = "...Yeah! Medicine knows no borders! Right?"
10017060-164 = "Yes. Medicine knows no borders. That's what the Remedial Knights stand for."
10017060-165 = "But so many people got hurt..."
10017060-166 = "Even if we treat them, could the Remedial Knights and the Justice Task Force ever patch things up?"
10017060-167 = "All wounds heal. Right, Hanae?"
10017060-168 = "...What?"
10017060-169 = "Because we're going to treat them."
10017060-170 = "Oh!"
10017060-171 = "But first, we have to be ready to do that."
10017060-172 = "R-Right! I didn't think of that!"
10017060-173 = "Heehee. It's gonna be super busy."
10017060-174 = "And I'll be smiling the whole time!"
10017060-176 = "That's the spirit!"
10017060-177 = "As I said before, I won't give up on you, Justice Task Force!"
10017060-178 = "May my light pierce your clouded vision! Lead a life worthy of being called just!"

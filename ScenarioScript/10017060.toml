[translation]
10017060-1 = "ตอน 6;เหล่าคุณหนูตัวน้อย(?)"
10017060-2 = "ในเมืองคิโวทอส"
10017060-5 = "ยังอีกไกลเลยเหรอคะ ฮานาเอะจัง?"
10017060-9 = "ไปต่ออีกหน่อย... เดี๋ยวก็ถึงแล้วละค่ะ ใกล้จะถึงแล้วค่ะ!"
10017060-10 = "ทำไมถึงต้องเป็นทิศตรงข้ามกับที่พวกเราเคยมาทำกิจกรรมจิตอาสาด้วยนะ..."
10017060-11 = "แล้วก็ดันมาเกิดเรื่องแบบนี้ในค่ำคืนอันศักดิ์สิทธิ์เสียด้วย..."
10017060-12 = "อะฮ่าฮ่าฮ่า... ถึงจะไม่ใช่ค่ำคืนอันศักดิ์สิทธิ์ ชมรมอัศวินบรรเทาทุกข์ก็ต้องเตรียมพร้อมสำหรับทุกอย่าง#nอยู่แล้วละค่ะ..."
10017060-13 = "หวังว่าจะไม่มีใครได้รับบาดเจ็บนะคะ..."
10017060-15 = "ตู้มมมมมมม!!!!"
10017060-19 = "ว้ายยย?!"
10017060-20 = "เฮือกกกก!!?"
10017060-21 = "เสียงระเบิดนั่นมัน...?"
10017060-22 = "เราคงต้องรีบแล้วค่ะรุ่นพี่"
10017060-23 = "วิ่งไปเลยค่ะ! ให้เร็วกว่านี้อีก!"
10017060-25 = "ทางเข้าคาเฟ่ <ไวท์&เมสัน>"
10017060-28 = "แฮ่ก... แฮ่ก... แฮ่ก...!"
10017060-29 = "ขออภัยด้วยค่ะ... รุ่นพี่ซึรุกิ ฉันฝืนไปมากกว่านี้... ไม่ไหวแล้วค่ะ..."
10017060-34 = "เคี๊ยกกก....."
10017060-35 = "ฮึ่ม...! หัวหน้าซึรุกิ! เข้าใจแล้วละค่ะว่าทำไมคุณถึงได้ชื่อว่าเป็นอาวุธยุทธศาสตร์แห่งทรีนิตี้"
10017060-36 = "เคี๊ยกกก..."
10017060-37 = "กลับไปเลยนะ..."
10017060-38 = "ทำแบบนั้นไม่ได้หรอกค่ะ!"
10017060-39 = "ทำไมถึง... มาทำกับพวกเราแบบนี้...?"
10017060-40 = "เหลือจะเชื่อเลยค่ะ! ทำผิดไว้ร้ายแรงขนาดนั้น แต่ก็ยังไม่รู้สึกตัวอีกเหรอคะ?!"
10017060-41 = "นี่มันโศกนาฏกรรมขนานแท้เลยค่ะ! ไม่คิดเลยว่าชมรมทวงความยุติธรรมจะตกต่ำได้ถึงเพียงนี้!"
10017060-42 = "ฉันว่าตอนนี้ สิ่งจำเป็นสำหรับชมรมทวงความยุติธรรมไม่ใช่ปาร์ตี้ แต่เป็น 'ความช่วยเหลือ' ที่เข้มงวด และจริงใจค่ะ!"
10017060-43 = "เคี๊ยกกกกกก?!"
10017060-48 = "หัวหน้า!"
10017060-49 = "หัวหน้า...! เป็นยังไงบ้างคะ?"
10017060-51 = "ฮานาเอะ เซรินะ มาหาจริงด้วยนะคะ"
10017060-52 = "ไม่เป็นไรหรอกค่ะ ฉันยังทนได้อยู่"
10017060-53 = "คนที่มีความกล้าหาญที่จะพูดตักเตือน แบบนี้แหละค่ะที่เรียกว่าเพื่อนได้"
10017060-54 = "เราต้องยืนหยัดไว้ค่ะ! จนกว่าพวกเธอจะรับรู้ได้ถึงความจริงใจจากเรา!"
10017060-55 = "[s1] \"อ๊ะ ซึรุกิจังนี่นา\"\n[s2] \"สวัสดีซึรุกิจัง\""
10017060-58 = "คะ... คะคะคะคะคะ... คุณ... ครู?!"
10017060-61 = "(ทะ... ทะทะทะทะ... ทำไมต้องเป็นคุณครู... ที่ได้เห็นเราในสภาพแบบนี้ด้วย..?!)"
10017060-64 = "เคี๊ยก... เคี๊ยกกกกกกกกก?!"
10017060-69 = "อ๊ะ หัวหน้าชมรมทวงความยุติธรรมเป็นลมล้มพับไปเหมือนตัวกินมดแรกเกิดเลยค่ะ!"
10017060-70 = "คุณครูไปทำอะไรเธอคะเนี่ย?"
10017060-71 = "[s3] \"ครูยังไม่ได้ทำอะไรเลยนะ\"\n[s4] \"นี่สงสัยในตัวครูกันเหรอ?!\""
10017060-75 = "นี่มันเรื่องวุ่นวายอะไรกันคะ?!"
10017060-79 = "ซึ... ซึรุกิ?! ตั้งสติไว้ค่ะ! นี่มันเรื่องอะไรกันคะ? ทำไมซึรุกิสภาพเหมือนตัวกินมดเลย...?"
10017060-80 = "ออกมาจนได้นะคะ รองหัวหน้าฮาสุมิ"
10017060-81 = "ชมรมอัศวินบรรเทาทุกข์...? อย่างนี้นี่เองค่ะ เรื่องมันเป็นอย่างนี้สินะคะ"
10017060-82 = "ชมรมอัศวินบรรเทาทุกข์บุกรุกชมรมทวงความยุติธรรม... ในวันคริสต์มาส..."
10017060-83 = "พวกคุณทราบใช่ไหมคะว่านี่อาจจะกลายเป็นปัญหาทางการเมืองได้เลย?"
10017060-84 = "รู้ทั้งรู้แต่ก็ยังมาบุกรุกชมรมทวงความยุติธรรม เหตุผลคืออะไรเหรอคะ ชมรมอัศวินบรรเทาทุกข์?"
10017060-85 = "ชมรมทวงความยุติธรรมจะรับมือกับเรื่องนี้จากคำตอบที่ได้รับค่ะ...!"
10017060-87 = "คะ?! คือว่า... เรื่องนั้น..."
10017060-88 = "พวกฉัน... ก็แค่..."
10017060-90 = "มาดึงสติเพื่อนๆ ชมรมทวงความยุติธรรมก็เท่านั้นค่ะ!"
10017060-91 = "ไม่เห็นจะเข้าใจเลยค่ะ!"
10017060-92 = "รองหัวหน้าฮาสุมิก็ไม่รับรู้ถึงเรื่องที่ก่อไว้งั้นเหรอคะ?!"
10017060-93 = "เสียใจจังเลยค่ะ เสียใจอย่างสุดซึ้งเลยค่ะ!"
10017060-94 = "สิ่งที่พวกเราหวังคือการกลับตัวกลับใจของพวกคุณ!"
10017060-95 = "การที่ความยุติธรรมอันสูงส่งของชมรมทวงความยุติธรรมถูกปลุกขึ้นมาอีกครั้งบนแผ่นดินนี้!"
10017060-96 = "ถ้าพวกคุณยังหลับหูหลับตาอยู่อย่างนี้ เพื่อนอย่างพวกเราก็ต้องยื่นมือออกไปช่วยให้เห็นแสงสว่าง!"
10017060-97 = "คะ...? หมายความว่าอะไร..."
10017060-98 = "ไปแย่งของของคนอื่นที่มีเจตนาดีต่อเพื่อนมนุษย์ แล้วเอามากินให้ตัวเองอิ่มท้อง การกระทำนี้มันมี#nความยุติธรรมบ้างไหมคะ!"
10017060-99 = "คุณพูดว่าเราไปแย่งอะไรมานะคะ? ช่วยอธิบายให้ชัดเจนด้วยค่ะ!"
10017060-100 = "อีกอย่าง พวกคุณรู้ไหมคะว่าการเช่าร้าน <ไวท์&เมสัน> มันยากขนาดไหน? คงไม่รู้หรอกค่ะ!"
10017060-101 = "กว่าจะได้คาเฟ่ขนาดใหญ่แบบนี้ในทรีนิตี้มา ฉันถึงกับต้องต่อสู้แย่งชิงกับชมรมอื่นๆ!"
10017060-102 = "ไหนจะต้องเอาซึรุกิไปเป็นป้ายในการต่อรองให้อีกฝ่ายอกสั่นขวัญหายอีก! กว่าจะทำสัญญาเช่าได้ พวกคุณคิดไม่ถึงหรอกว่ามันยากขนาดไหน!"
10017060-103 = "ทำแบบนั้นกับหัวหน้าซึรุกิได้ยังไงกัน ไม่แรงไปหน่อยเหรอคะ?!"
10017060-104 = "ฉันกำลังบอกว่าเราต้องทำทุกวิถีทางเพื่อให้ได้ร้านนี้มาค่ะ!"
10017060-105 = "เลือกวิธีที่ไม่ทำร้ายคนอื่นสิคะ!"
10017060-106 = "เอาเถอะค่ะ! กว่าจะได้สถานที่จัดปาร์ตี้วันนี้มา พวกเราต้องเหน็ดเหนื่อยกันมากเลยนะคะ!"
10017060-107 = "แต่หัวหน้ามิเนะก็มาทำพังหมดเลยค่ะ! เข้าใจที่ฉันพูดไหมคะ? มันเละตุ้มเป๊ะหมดแล้วค่ะ!"
10017060-108 = "ฉันไม่หลับหูหลับตาให้คนที่ทำผิดหรอกค่ะ! ถึงเรื่องจะเกิดไปแล้ว แต่ก็ยังไม่สายเกินไปที่จะเอาหลัก#nการของชมรมทวงความยุติธรรมกลับมานะคะ!"
10017060-109 = "จุกอกจริงๆ เลย...! หัวหน้ามิเนะจำเรื่องนี้ได้ไหมคะ? เรื่องเค้กปอนด์ตอนปี 1...!"
10017060-110 = "ว้าว ว้าว ว้าว! หยิบเรื่องนี้มาพูดเหรอคะ! รองหัวหน้าฮาสุมิเองก็ไม่ใช่ย่อยนี่คะ? จำเรื่องพุดดิ้งตอน#nเป็นเด็กใหม่ได้ไหม...!"
10017060-111 = "ถ้าพูดอะไรมากกว่านี้ ฉันจะประกาศตัวเป็นศัตรูกับชมรมอัศวินบรรเทาทุกข์อย่างเป็นทางการเลยค่ะ...!"
10017060-112 = "คะ... คนที่เอาเรื่องเค้กปอนด์มาพูดก่อนคือรองหัวหน้าฮาสุมินะคะ?!"
10017060-113 = "[s5] \"นี่... ทุกคน?\"\n[s6] \"ครูไม่รู้หรอกนะว่าคุยเรื่องอะไรกัน แต่ขอแทรกหน่อยได้ไหม?\" "
10017060-117 = "คุณครู?! ดีเลยค่ะ งั้นช่วยฟังฉันหน่อยค่ะ จู่ๆ หัวหน้ามิเนะก็...!"
10017060-118 = "ขอโทษที่ทำให้เห็นพฤติกรรมด้านนี้ของฉันค่ะคุณครู ก็รองหัวหน้าฮาสุมิเขา...!"
10017060-119 = "ฉันเป็นฝ่ายชวนคุณครูคุยก่อนนะคะ!"
10017060-120 = "แต่วันนี้พวกฉันเป็นฝ่ายเจอคุณครูก่อนค่ะ!"
10017060-134 = "คงจะคุยกันดีๆ ไม่ได้แล้วสินะ"
10017060-135 = "เห็นด้วยเลยค่ะ ถือว่าเป็นครั้งแรกเลยนะคะที่เราเห็นตรงกัน"
10017060-137 = "หัวหน้า... พวกเราควรทำยังไงดีคะ..."
10017060-138 = "......"
10017060-139 = "เซรินะ ฮานาเอะ"
10017060-140 = "ฉันสาธยายให้ไม่ได้หรอกค่ะว่าอะไรคือ 'ความช่วยเหลือ' ที่เหมาะสมกับที่นี่ที่สุด"
10017060-141 = "ตอนนี้ทั้งสองคนต้องคิดและตัดสินกันให้ได้ค่ะ"
10017060-142 = "ทั้งสองจะมาช่วยฉันเปิดทางสว่างให้ชมรมทวงความยุติธรรมก็ได้..."
10017060-143 = "หรือจะเตรียมตัวช่วยเด็กสาวชมรมทวงความยุติธรรม... ที่อาจบาดเจ็บจนต้องรับการรักษาก็ได้ค่ะ"
10017060-144 = "ก็ 'การมีหัวใจที่อุทิศให้การบรรเทาทุกข์ ไม่ว่าจะที่ไหนหรือเมื่อไร' คือหลักสำคัญและก้าวแรกของเรา#nยังไงล่ะคะ"
10017060-157 = "เอาไงดีคะรุ่นพี่? เราจะทำยังไงกันดีคะ?!"
10017060-158 = "เราไปช่วยหัวหน้าก่อนก็แล้วกันค่ะ แล้วค่อยมาช่วยรักษาคนที่ได้รับบาดเจ็บอีกที"
10017060-159 = "แบบนั้นจะไม่เป็นอะไรเหรอคะ?"
10017060-160 = "ฉันเชื่อในหัวหน้าค่ะ ฮานาเอะจัง แต่ถึงอย่างนั้นก็ไม่อาจเพิกเฉยต่อชมรมทวงความยุติธรรมที่บาดเจ็บ#nได้อยู่ดีค่ะ"
10017060-161 = "เราไม่จำเป็นต้องเลือกแค่ฝ่ายเดียวนี่คะ ถ้าทั้งสองทางคือการช่วยเหลือ ก็เลือกทั้งสองทางเลยค่ะ!"
10017060-163 = "เข้าช่วยในพื้นที่ที่ต้องการความช่วยเหลือ...?"
10017060-164 = "ใช่ค่ะ เข้าช่วยในพื้นที่ที่ต้องการความช่วยเหลือ ก็พวกเราคือชมรมอัศวินบรรเทาทุกข์นี่คะ"
10017060-165 = "แต่ว่ามันมีคนได้รับบาดเจ็บเยอะแยะเลยนะ..."
10017060-166 = "หลังจากนี้ชมรมอัศวินบรรเทาทุกข์กับชมรมทวงความยุติธรรมจะกลับไปเป็นเหมือนเดิมได้ไหมคะ...?"
10017060-167 = "ไม่มีบาดแผลใดที่รักษาไม่หายหรอกค่ะฮานาเอะจัง ถูกไหมคะ?"
10017060-168 = "คะ...?"
10017060-169 = "ก็พวกเราเป็นคนที่ทำให้หายไงคะ"
10017060-170 = "อ้อ...!"
10017060-171 = "แต่ก็ต้องเตรียมใจให้พร้อมไว้ค่ะ "
10017060-172 = "นะ... นั่นสินะ! ฉันลืมไปเลยค่ะรุ่นพี่!"
10017060-173 = "แหะๆๆ แบบนี้พวกเรา... คงงานยุ่งจนหัวหมุนกันเลยนะคะ"
10017060-174 = "ถ้าจะต้องยอมรับเรื่องนี้ ฉันก็จะรับมันด้วยรอยยิ้มค่ะ!"
10017060-176 = "ใช่ค่ะ! ฉันก็ด้วยค่ะ!"
10017060-177 = "ชมรมทวงความยุติธรรมคะ!"
10017060-178 = "หวังว่าทัศนคติที่มัวหมองจะชัดเจน! และหวังว่าจะได้ใช้ชีวิตอย่างภาคภูมิภายใต้ความยุติธรรม!"

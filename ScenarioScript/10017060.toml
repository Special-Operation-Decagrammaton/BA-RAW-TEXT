[translation]
10017060-1 = "第6話;小婦人們"
10017060-2 = "奇普托斯．市內"
10017060-5 = "花繪醬，目的地在……？"
10017060-9 = "就快到了！"
10017060-10 = "居然剛好和我們進行慈善活動的位置，位於完全相反的方向……"
10017060-11 = "嗚嗚，真沒想到會在平安夜出這種事……"
10017060-12 = "啊哈哈……畢竟我們是救護騎士團，即使不是平安夜也得隨時準備好應對各種情況。"
10017060-13 = "希望至少不要有人受傷……"
10017060-15 = "（咚哐哐哐──！！！）"
10017060-19 = "呀啊──！？"
10017060-20 = "噫呀──！？"
10017060-21 = "這個爆炸聲，該不會是……？"
10017060-22 = "快走吧，前輩！"
10017060-23 = "嗯，趕緊走吧……！"
10017060-25 = "咖啡廳「White&Mason」入口"
10017060-28 = "哈啊，哈啊……！"
10017060-29 = "抱歉，弦生前輩……我已經……"
10017060-34 = "嘰耶耶……"
10017060-35 = "不愧是弦生部長……#n「三一的戰略兵器」的名號果然不是浪得虛名……"
10017060-36 = "嘰耶耶耶耶……"
10017060-37 = "你差不多也該住手……回去了吧……"
10017060-38 = "那可不行！"
10017060-39 = "……為什麼要這麼堅持？"
10017060-40 = "居然還問「為什麼」！？#n你還不明白自己做了什麼事嗎！？"
10017060-41 = "實現正義部，竟然淪喪至此……！"
10017060-42 = "看來，有必要施以更加高強度的「救護」！"
10017060-43 = "嘰耶耶──！！！"
10017060-48 = "團長！"
10017060-49 = "團長，沒事吧……！？"
10017060-51 = "花繪、芹奈，你們來啦。"
10017060-52 = "我不要緊，還撐得住。"
10017060-53 = "因為只有敢於說出忠言的人，才有資格以「朋友」自居。"
10017060-54 = "在我們的想法成功傳達之前，絕不能倒下！"
10017060-55 = "[s1]「啊，是弦生啊。」\n[s2]「晚安呀，弦生。」"
10017060-58 = "老，老老老老老師！？"
10017060-61 = "（其他人也就罷了，偏偏是在老師面前表現出這個樣子……！？）"
10017060-64 = "嘰，嘰耶耶耶──！？"
10017060-69 = "啊……！？#n弦生部長，像是剛出生的食蟻獸一般倒下了！"
10017060-70 = "你做了什麼嗎，老師？"
10017060-71 = "[s3]「我什麼都沒做啊！？」\n[s4]「是我做的嗎！？」"
10017060-75 = "這究竟是怎麼回事！？"
10017060-79 = "弦，弦生！？振作點，到底發生了什麼事！？#n為什麼會像剛出生的食蟻獸一樣……！？"
10017060-80 = "你總算出現了，蓮實副部長。"
10017060-81 = "救護騎士團的各位……？"
10017060-82 = "在聖誕節當天，對實現正義部發動襲擊……"
10017060-83 = "此事將有可能發展成政治問題，這點各位應該心知肚明吧？"
10017060-84 = "即便如此仍冒著風險這麼做……能告訴我理由嗎？"
10017060-85 = "根據你們的回答，我們也會做出相應的行動……！"
10017060-87 = "咦……！？"
10017060-88 = "我，我們是來……！"
10017060-90 = "是來以朋友的身分，喚醒實現正義部的！"
10017060-91 = "這可不算是說明啊！？"
10017060-92 = "這麼看來，蓮實副部長也不知道事態的嚴重性嗎！？"
10017060-93 = "悲痛，太令人悲痛了！"
10017060-94 = "我們是來為你們提供「救護」的！"
10017060-95 = "為了讓實現正義部的崇高正義，再次矗立在這片大地上！"
10017060-96 = "如果依舊執迷不悟的話，即便需要親自動手也在所不惜──這才是身為朋友該做的！"
10017060-97 = "……嗯？這是什麼意思……"
10017060-98 = "搶走善意之人的東西，哪裡算的上是正義！"
10017060-99 = "你說我們搶了什麼……？#n能請你從頭開始說明嗎？"
10017060-100 = "此外，更重要的是……請不要在這裡胡鬧！"
10017060-101 = "你知道要借到這個「White&Mason」是件多麼困難的事嗎！？#n我們可是突破了三一其他社團和委員會設下的重重阻礙……"
10017060-102 = "並由弦生親自到場談判，才好不容易借到的啊！"
10017060-103 = "由弦生部長出面談判，是不是有點犯規！？"
10017060-104 = "這就代表情況逼得我們不得不出此下策！"
10017060-105 = "這是強詞奪理！"
10017060-106 = "總之！#n都已經這麼辛苦了，請不要再引起風波了！"
10017060-107 = "再繼續胡鬧下去，對大家都沒有好處！"
10017060-108 = "即使是這樣也不行！#n現在還來得及，回頭是岸啊！"
10017060-109 = "真受不了……！#n團長你從以前就是這樣，1年級的時候也是為了吃那個磅蛋糕……！"
10017060-110 = "哇，哇，哇！不是說好不再提的嗎！？#n真要這麼說的話，副部長你也一樣吧？新入學的時候就為了布丁……！"
10017060-111 = "再繼續說下去的話，我真的會公開宣布與救護騎士團為敵的哦……！"
10017060-112 = "先提到磅蛋糕的是副部長你吧！？"
10017060-113 = "[s5]「那個……你們好？」\n[s6]「雖然不知道你們在說什麼，能讓我也加入談話嗎？」 "
10017060-117 = "老，老師！您來得正好。#n請聽我說！美禰團長突然就……！"
10017060-118 = "很抱歉讓您看到了奇怪的場面，不過蓮實副部長他……！"
10017060-119 = "是我先跟老師說話的！"
10017060-120 = "今天是我先見到老師的！"
10017060-134 = "……真的是無法溝通啊。"
10017060-135 = "這是我們今天第一次意見相同呢。"
10017060-137 = "我，我們到底該怎麼辦……"
10017060-138 = "……"
10017060-139 = "芹奈、花繪。"
10017060-140 = "此情此景，最需要「救護」的是什麼……我無法一言以蔽之。"
10017060-141 = "得由你們自己思考，做出判斷。"
10017060-142 = "看是要幫助我，喚醒執迷不悟的實現正義部。"
10017060-143 = "或者……對需要治療的實現正義部的少女們伸出援手。"
10017060-144 = "無論何時何地，都要保有救護之心。#n這對我們來說是最重要的。"
10017060-157 = "怎，怎麼辦，前輩！？"
10017060-158 = "……先幫團長吧。然後再給周圍受傷的人提供治療。"
10017060-159 = "這樣沒問題嗎……？"
10017060-160 = "我相信團長，這是毫無疑問的。但也不能對受傷的實現正義部成員見死不救。"
10017060-161 = "所以，不用非得二選一吧？兩邊都幫就行了！"
10017060-163 = "……「哪裡要救護，我就在哪裡」？"
10017060-164 = "沒錯，「哪裡要救護，我就在哪裡」！#n這就是救護騎士團！"
10017060-165 = "話雖如此，受傷的人這麼多……"
10017060-166 = "等一切結束後，救護騎士團和實現正義部還能和好如初嗎……？"
10017060-167 = "花繪醬……沒有傷是治不了的。"
10017060-168 = "咦……？"
10017060-169 = "因為我們會把它給治好。"
10017060-170 = "……！"
10017060-171 = "雖然也需要做好相應的覺悟就是了。"
10017060-172 = "原，原來如此！我明白了，前輩！"
10017060-173 = "看來接下來有得忙了呢。"
10017060-174 = "但無論如何，我都會掛著笑容！"
10017060-176 = "沒錯，這樣就對了！"
10017060-177 = "走吧，去喚醒實現正義部……！"
10017060-178 = "讓他們受陰霾覆蓋的視野重見光明！無愧正義之名！"

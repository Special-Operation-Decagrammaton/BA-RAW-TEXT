[translation]
31170-1 = "#title;제17화;트리니티의 배신자"
31170-2 = "3;미카;01;나기 쨩이 이런 시설까지 지원해주고, 보충수업에 꽤 제대로 지원해주고 있는 것 같네.\n#3;a"
31170-3 = "3;미카;10;잘 되어가? 몰래 다른 짓하고 있는 건 아니지? 응? 가령 학생들과 함께 수영장에서 파티라던가. 응, 그런 느낌으로!\n#3;hophop\n#3;em;[반짝]"
31170-4 = "[s] \"……….\""
31170-5 = "3;미카;04;……. \n#3;stiff"
31170-6 = "3;미카;08;그렇게 경계할 필요까진 없잖아, 선생님. 응, 나도 이래 봬도 섬세해서, 상처받는다구.\n#3;em;[속상함]"
31170-7 = "3;미카;02;식사는 제대로 하고 있어? 괜찮으면 내가 맛있는 음식이라도 좀 보내줄까? 케이크나 홍차 같은 거?"
31170-8 = "#st;[0,0];instant;1;"
31170-9 = "#clearST"
31170-10 = "3;미카;02\n#3;em;…\n#wait;2500"
31170-11 = "3;미카;14;……후후후. 알겠어.\n#3;em;[땀]"
31170-12 = "3;미카;15;선생님도 서론이 긴 건 별로 안 좋아하던가……. 그러면 바로 본론으로 들어갈게."
31170-13 = "3;미카;04;아. 그 전에 먼저…… 내가 여기 온 건 나기 쨩도 모르는 일이야. 자, 봐. 수행원도 없이 이렇게 혼자 왔다니까? \n#3;em;[반응]\n#3;stiff"
31170-14 = "3;미카;01;……."
31170-15 = "3;미카;02;……. 선생님. 나기 쨩에게 거래를 제안받았지?"
31170-16 = "[s] \"거래……?\""
31170-17 = "3;미카;01;트리니티의 배신자를 찾는 거, 말야."
31170-18 = "[s] \"……….\""
31170-19 = "3;미카;06;……. 하아. 그렇구나…… 예상했던 대로네. 정말이지, 나기 쨩도 참.\n#3;stiff\n#3;em;[속상함]"
31170-20 = "3;미카;05;선생님에게 제대로 된 정보를 주지도 않고, 다짜고짜 배신자를 찾아내라- 라고 한 거야? 정말로?"
31170-21 = "3;미카;05;이유도, 목적도 제대로 밝히지 않고? 왜 보충수업부가 이 조합인지 나기 쨩이 알려줬어?\n#3;em;[반응]\n#3;hophop"
31170-22 = "3;미카;08;정말이지…… 아무것도 알려주지 않고 선생님에게 큰 짐을 지워버렸네."
31170-23 = "[s] \"그 제안은 내가 거절했어.\""
31170-24 = "3;미카;09;……응? 거절? 왜?\n#3;em;[?]"
31170-25 = "3;미카;01;자신의 학생들을 의심하고 싶지 않아서? 아니면……?"
31170-26 = "[s] \"트리니티의 배신자를 찾는 건 내 역할이 아니야.\""
31170-27 = "3;미카;02;……헤에."
31170-28 = "3;미카;03;응, 그렇구나……. 선생님은 <샬레>의 소속이지. 말하자면 트리니티와는 무관계한 제3자. \n#3;em;[반응]\n#3;greeting"
31170-29 = "3;미카;01;트리니티라는 세계를 중심에 두고 있는 우리들로써는 조금 이해하기 어려울 수도 있겠지만."
31170-30 = "3;미카;99;……재미있네. 응. 맞는 말이야. 신선한 관점. 그래서 거절한 거구나."
31170-31 = "3;미카;01;그러면 선생님은 누구의 편이야? \n#3;em;[?]"
31170-32 = "3;미카;02;트리니티의 편이 아니라면…… 게헨나? 총학생회? 아니면 그 누구의 편도 아닌……."
31170-33 = "[s] \"나는 그냥 학생들의 편이야.\""
31170-34 = "3;미카;09;……."
31170-35 = "3;미카;08;……. 으, 으응. \n#3;stiff"
31170-36 = "3;미카;14;학생들의 편…… 응. 그렇구나…… 이 대답은 예상하지 못했어…….\n#3;em;[땀]"
31170-37 = "3;미카;14;……."
31170-38 = "3;미카;04;저, 저기……. 그렇……다는 건……"
31170-39 = "3;미카;15;선생님은…… 내 편이기도 하다는 뜻……도 될까? 저기, 나도…… 이래봬도 학생이고……. 응.\n#3;em;[?]"
31170-40 = "[s] \"필요하다면 미카의 편이 되어줄게.\""
31170-41 = "3;미카;11;…….\n#3;em;[///]\n#3;stiff"
31170-42 = "3;미카;15;우와…… 뭔가 대단한 말을 아무렇지도 않게 해버리는 구나, 선생님은……."
31170-43 = "3;미카;14;이게 어른의 화법? 뻔하지만 조금 기쁠지도……. 에헤헤헤."
31170-44 = "3;미카;99;하지만…… 동시에 그건 그 누구의 편도 아니라는 얘기이기도 하잖아? 나는 그런 거에 넘어가진 않아.\n#3;em;…"
31170-45 = "3;미카;01;응. 그러니까, 나는 내 관점에서 선생님과 거래를 제안하겠어. \n#3;greeting"
31170-46 = "[s] \"거래……?\""

[translation]
31170-1 = "Episode 17;Trinity's Traitor"
31170-2 = "Nagi is really going all-in, isn't she? Even signing off on you all using these facilities for your make-up work classes."
31170-3 = "So, how goes it? I hope you aren't simply pretending to keep busy so you can have pool parties with the students. You wouldn't do something like that, would you?"
31170-4 = "[s] \"...\""
31170-5 = "... "
31170-6 = "You don't have to be so wary, Sensei. You're going to hurt my feelings."
31170-7 = "Are you at least eating properly? I could always have your classes catered if you'd like. Would tea and cake be all right?"
31170-11 = "My apologies. I understand."
31170-12 = "You're not interested in small talk. In that case, I'll get straight to the point."
31170-13 = "And for the record, Nagi doesn't know I'm here right now. I'm by myself, as you can see. "
31170-14 = "..."
31170-15 = "She offered you a deal, didn't she?"
31170-16 = "[s] \"A deal...?\""
31170-17 = "I'm referring to searching for Trinity's traitor."
31170-18 = "[s] \"...\""
31170-19 = "I thought that might be it. She's a card, that one."
31170-20 = "She didn't even give you all the details, I'm willing to bet. She just dumped the responsibility in your lap and told you to get to work."
31170-21 = "And she didn't offer a proper reason or intent behind it either, did she? Did Nagi tell you why the Make-Up Work Club was founded this way?"
31170-22 = "Really... She told you nothing at all and burdened you with so much."
31170-23 = "[s] \"I rejected her offer.\""
31170-24 = "You did? Why?"
31170-25 = "Is it because you didn't want to suspect your own students, or...?"
31170-26 = "[s] \"It's not my role to find Trinity's traitor.\""
31170-27 = "Oh?"
31170-28 = "So that's it. You represent Schale, meaning you're ultimately an interloper in all of this—unbelonging to Trinity."
31170-29 = "It's only natural that those of us whose world revolves around Trinity would have difficulty understanding your reasoning."
31170-30 = "How fascinating. It's a fresh perspective if nothing else."
31170-31 = "Then whose side are you on, Sensei? "
31170-32 = "If you're not on Trinity's side...then Gehenna? The General Student Council? Or maybe you're on no one's side..."
31170-33 = "[s] \"I'm on the students' side.\""
31170-34 = "..."
31170-35 = "Aw... "
31170-36 = "I wasn't expecting you to say something like that."
31170-37 = "..."
31170-38 = "Well, if that's the case..."
31170-39 = "...does that mean you're on my side too? I know I may not seem like one sometimes, but I'm technically a student too...you know."
31170-40 = "[s] \"I'll be by your side if you ever need me to be.\""
31170-41 = "..."
31170-42 = "Wow... You sure know how to flatter a lady, Sensei."
31170-43 = "Are all adults this smooth? I guess there's no hiding how happy that made me. Heehee."
31170-44 = "But doesn't this also prove my point? If you're on everyone's side, that means you can never truly pick sides as well, does it not?"
31170-45 = "So why don't I cut you a deal of my own? "
31170-46 = "[s] \"A deal...?\""
31170-51 = "I'll tell you which member of the Make-Up Work Club is the traitor."
31170-52 = "[s] \"...!\""
31170-53 = "It's the same traitor that Nagi has been searching for—the very person she'll stop at nothing to expel."
31170-54 = "However, the truth is that the situation is much more complicated than it seems."
31170-55 = "It wouldn't be courteous of me to simply watch you be swayed by Nagi."
31170-56 = "Did you know that inviting you to be the Make-Up Work Club's homeroom teacher was my idea?"
31170-57 = "[s] \"You, Mika?\""
31170-58 = "Yup. Nagi was opposed to the idea. She said she didn't want to waste the favor you owed on something like this."
31170-59 = "..."
31170-60 = "I wanted it to be someone who was from neither Trinity nor Gehenna."
31170-64 = "Oh. And as for the traitor..."
31170-65 = "...she is indeed one of your Make-Up Work Club students."
31170-69 = "Shirasu Azusa."
31170-75 = "You're late."
31170-76 = "..."
31170-81 = "How are the preparations coming along?"
31170-82 = "Smoothly. All according to plan thus far."
31170-84 = "[s] \"It's Azusa?\""
31170-85 = "Correct. As you may know, she hasn't always attended Trinity."
31170-86 = "She was originally a student from Arius Satellite School, which broke away from the Trinity Union a long time ago."
31170-87 = "Well, \"student\" might not be fully accurate."
31170-88 = "Education was never truly a part of Azusa's experience."
31170-89 = "[s] \"Why are you telling me this?\""
31170-90 = "..."
31170-91 = "I'm sure you asked the same of Nagi at one point. Though, I can't fathom how she responded."
31170-92 = "I won't bore you with the excuses, so let me be blunt."
31170-101 = "You must protect her."
31170-103 = "The Eden Treaty;To be Continued in Chapter 2"

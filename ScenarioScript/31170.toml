31170-51 = "3;미카;02;보충수업부 안의 배신자가 누군지 알려줄게.\n#3;em;[반응]\n#3;closeup"
31170-52 = "[s] \"……!!\""
31170-53 = "3;미카;05;단, 그건 어디까지나 나기 쨩이 찾고 있는 <트리니티의 배신자>야. 퇴학시키려고 안간힘을 쓰고 있는 바로 그 당사자지.\n#3;closeup"
31170-54 = "3;미카;06;실제로는 훨씬 더 복잡하고 커다란 문제가 펼쳐져 있지만…….\n#3;closeup"
31170-55 = "3;미카;01;이대로 선생님이 나기 쨩에게 휘둘리는 걸 두고 보기만 해선 예의가 아니니까.\n#3;closeup"
31170-56 = "3;미카;02;……알고 있어? 선생님을 보충수업부의 담임으로 초대한 게 바로 나였다는 걸?\n#3;em;[?]\n#3;closeup"
31170-57 = "[s] \"미카가……?\""
31170-58 = "3;미카;01;응. 나기 쨩은 계속 반대했지만 말야. 빚을 지워뒀는데 이렇게 쓸 순 없다나? 어디 신세 진 거라도 있나 봐, 선생님.\n#3;greeting\n#3;closeup"
31170-59 = "3;미카;99;…….\n#3;closeup"
31170-60 = "3;미카;12;나는 트리니티도, 게헨나도 아닌 제3자의 입장이 필요했어.\n#3;em;…\n#3;closeup"

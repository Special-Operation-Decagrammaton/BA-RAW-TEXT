[translation]
31170-1 = "第17話;トリニティの裏切り者"
31170-2 = "にしてもナギちゃん、ずいぶん入れ込んでるみたいだねー。こんな施設まで貸し出しちゃって。"
31170-3 = "ところで、合宿の方はどう？遠いのを良いことに、何か楽しそうなことしてたりしない？例えばみんな水着でプールパーティーとか！"
31170-4 = "[s] \"………。\""
31170-5 = "……あはっ。"
31170-6 = "そこまで警戒されちゃうのは心外だなー。私こう見えても繊細で、傷つきやすいんだよ？"
31170-7 = "ところでここ、食事とか大丈夫？何か美味しいものでも送ろっか？ケーキとか紅茶とか。"
31170-11 = "……ふふっ、ごめんね。先生もあんまり長い前置きは好みじゃないかな？"
31170-12 = "じゃあ、本題に入るとしよっか？"
31170-13 = "あっ。ちなみに私がここにいることについて、ナギちゃんは知らないよ？見ての通り、付き添いも無しの私の単独行動！"
31170-14 = "というわけで、あらためて本題だけど――"
31170-15 = "……先生、ナギちゃんから取引とか提案されなかった？"
31170-16 = "[s] \"取引？\""
31170-17 = "例えば、そうだなぁ……「トリニティの裏切り者」を探してほしい、とか。"
31170-18 = "[s] \"…………。\""
31170-19 = "……ふぅ、やっぱり。もうナギちゃんったら、予想通りなんだから。"
31170-20 = "何か詳しい情報とかは？そういうのは何も無しで、ただ「探して」って言われた感じ？"
31170-21 = "理由とか、目的とかは？どうして補習授業部がこういうメンバーで構成されてるのかとか、ナギちゃんは教えてくれなかった？"
31170-22 = "……そっかー。もう、何も教えずに先生にこんな重荷を背負わせるなんて……。"
31170-23 = "[s] \"……その提案は、断ったよ。\""
31170-24 = "……え？そうなの？どうして？"
31170-25 = "自分の生徒たちを疑いたくないから？それとも――"
31170-26 = "[s] \"それは、私の役目とは違うかなって。\""
31170-27 = "……へえ？"
31170-28 = "そっかそっかぁ……確かに先生は、「シャーレ」の所属だもんね。トリニティとは本来無関係の第三者。"
31170-29 = "なるほどね。まあ、私たちにとってはずっと「トリニティ」そのものが世界の中心みたいな感じだから、アレだけど……。"
31170-30 = "……面白い答えだね。なるほど、新鮮かも。それはそれで正しいよね。"
31170-31 = "それじゃあ先生は、誰の味方？"
31170-32 = "もしトリニティの味方じゃないんだとしたら……ゲヘナの味方？連邦生徒会の味方？それとも、誰の味方でもない……とか？"
31170-33 = "[s] \"私は、生徒たちの味方だよ。\""
31170-34 = "……。"
31170-35 = "あ、あぁー……。"
31170-36 = "生徒たちの味方、かぁ……そっかぁ……それは予想外だったなー……。"
31170-37 = "……。"
31170-38 = "あ、あのさ……っていうことは、その……。"
31170-39 = "先生は一応、私の味方である……って考えても良いのかな？私も一応この立場とはいえ、生徒に変わりはないんだけど……。"
31170-40 = "[s] \"もちろん、ミカの味方でもあるよ。\""
31170-41 = "……わーお。"
31170-42 = "さらっとすごいことを言ってのけるね、先生……。"
31170-43 = "大人だねぇ。そういう話術？って思う気持ちもあるけど……うん、ちょっと純粋に嬉しいかも。えへへ……。"
31170-44 = "でも、それを額面通りに受け取るのもちょーっと難しいなぁ……だってそれは同時に、誰の味方でもないって解釈もできるよね？"
31170-45 = "だからそのまま受け取るんじゃなくて、私から先生に、取引を提案させてもらおうかな。"
31170-46 = "[s] \"取引……？\""
31170-51 = "補習授業部の中にいる「裏切り者」が誰なのか、教えてあげる。"
31170-52 = "[s] \"……っ！\""
31170-53 = "ナギちゃんの言う「トリニティの裏切り者」、今必死に探して退学にさせようとしているその相手。"
31170-54 = "実際のところ、もう少し複雑で大きい問題もあるんだけど……。"
31170-55 = "今このまま、先生がナギちゃんに振り回される姿をただただ見てる……なんていうのは、ちょっと申し訳ないなって。"
31170-56 = "……そもそも、先生のことを補習授業部の担任として招待したのは私だからね。このことは知ってた？"
31170-57 = "[s] \"ミカが……？\""
31170-58 = "うん、ナギちゃんにはずっと反対されてたんだけどね。せっかくの借りをこんな風に使うのはどうとかこうとかで。先生とナギちゃんの間に、色々あったんだね？"
31170-59 = "……まあ、私の方にも色々あって。"
31170-60 = "トリニティでもゲヘナでもない、第三の立場が欲しかったの。"
31170-64 = "……ああ、「裏切り者」のお話だったね。"
31170-65 = "補習授業部にいる「トリニティの裏切り者」、それは……"
31170-69 = "……[ruby=しらす]白洲[/ruby]アズサ。"
31170-75 = "遅かったな。"
31170-76 = "……。"
31170-81 = "首尾は？"
31170-82 = "……今のところ、計画通り。"
31170-84 = "[ns] \"アズサが……？\""
31170-85 = "うん。知ってるかもしれないけどあの子、実はトリニティに最初からいたわけじゃないんだ。"
31170-86 = "ずいぶん前にトリニティから分かれた、いわゆる分派……「アリウス分校」出身の生徒なの。"
31170-87 = "……うーん、よく考えると「生徒」って呼んで良いのか分からないんだけどね。"
31170-88 = "「何かを学ぶ」ということが無い生徒のことを、生徒って呼べるのかな？"
31170-89 = "[s] \"このことを、私に教える理由は何？\""
31170-90 = "……ふふっ。"
31170-91 = "……良い眼だね、本当に。期待しちゃうな。"
31170-92 = "あれこれ誤魔化しても仕方なさそうだし……うん、端的に言おっか。"
31170-101 = "あの子を、守ってほしいの。"
31170-103 = "エデン条約編;To be Continued in Chapter 2"

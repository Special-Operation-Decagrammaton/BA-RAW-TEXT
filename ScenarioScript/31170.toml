[translation]
31170-1 = "ตอนที่ 17;คนทรยศในทรีนิตี้"
31170-2 = "นางิจังจัดหาสิ่งอำนวยความสะดวกแบบนี้ให้ด้วยเหรอ ท่าทางจะดูแลชมรมชั้นเรียนเสริมอย่างดีเลยนะ"
31170-3 = "ทุกอย่างเรียบร้อยดีรึเปล่าน่ะ? ไม่ได้แอบทำอะไรไม่ดีกันเนอะ? อย่างเช่น...#nจัดปาร์ตี้ริมสระกับพวกนักเรียนหรืออะไรทำนองนั้นน่ะ!"
31170-4 = "[s] \"......\""
31170-5 = "..."
31170-6 = "ไม่เห็นต้องระแวดระวังขนาดนั้นเลยนี่คุณครู ทำแบบนี้ฉันก็น้อยใจเป็นนะ"
31170-7 = "อยู่ที่นี่ทานข้าวครบทุกมื้อรึเปล่า? ถ้าไม่ว่าอะไร ให้ฉันส่งอาหารอร่อยๆ มาให้เอาไหม?#nจะเอาเค้กหรือชาแดงดีล่ะ?"
31170-11 = "ฮุฮุฮุ... เข้าใจแล้วล่ะ"
31170-12 = "คุณครูก็ไม่ชอบบทนำที่มันยืดยาวนักใช่ไหมล่ะ...? งั้นฉันจะไปที่บทสรุปให้เลยก็แล้วกัน"
31170-13 = "อ้อ! แต่ก่อนหน้านั้นคุณครูต้องรู้ก่อนว่า... การที่ฉันมาที่นี่ นางิจังก็ไม่รู้หรอกนะ#nไม่เชื่อก็ดูสิ ฉันมาคนเดียวแบบไร้ผู้ติดตามเลยด้วย "
31170-14 = "..."
31170-15 = "... คุณครู... ได้รับข้อเสนอการแลกเปลี่ยนบางอย่างมาจากนางิจังใช่ไหม?"
31170-16 = "[s] \"การแลกเปลี่ยน...?\""
31170-17 = "ก็การหาตัวคนทรยศในทรีนิตี้ไง"
31170-18 = "[s] \"...\""
31170-19 = "... เฮ้อ เป็นเหมือนตามที่คาดไว้ไม่ผิดเลย นางิจังนี่นะ..."
31170-20 = "ไม่ให้ข้อมูลที่ถูกต้องกับคุณครู แล้วก็บอกให้มาหาคนทรยศเลยล่ะสิเนี่ย?"
31170-21 = "แล้วก็ไม่ได้บอกเหตุผลและเป้าหมายด้วยใช่ไหม? นางิจังบอกคุณครูหรือเปล่า#nว่าทำไมชมรมชั้นเรียนเสริมต้องเป็นนักเรียนพวกนี้?"
31170-22 = "เชื่อเขาเลย... ไม่บอกอะไรเลยแล้วเอาภาระที่หนักอึ้งมาให้คุณครูอย่างเดียวเลยสินะ"
31170-23 = "[s] \"ครูปฏิเสธข้อเสนอนั้นน่ะ\""
31170-24 = "หืม...? ปฏิเสธไปเหรอ? ทำไมล่ะ?"
31170-25 = "เพราะไม่อยากเกิดความเคลือบแคลงในนักเรียนของตัวเอง? หรือว่า...?"
31170-26 = "[s] \"เพราะการหาตัวคนทรยศในทรีนิตี้ไม่ใช่หน้าที่ของครูไง\""
31170-27 = "เอ๋..."
31170-28 = "อื้อ เป็นอย่างนี้นี่เอง... ก็คุณครูสังกัดอยู่ใน <ชาเล่ต์> นี่นะ เลยเปรียบได้กับเป็นบุคคลที่ 3#nที่ไม่เกี่ยวข้องกับทรีนิตี้"
31170-29 = "สำหรับพวกเราที่เป็นศูนย์กลางของโลกที่ชื่อทรีนิตี้แล้ว มันก็อาจจะยากที่จะเข้าใจ"
31170-30 = "แต่มันก็สนุกดีนะ... อื้ม คงเป็นมุมมองใหม่ๆ สินะ ถึงได้ปฏิเสธไป"
31170-31 = "ถ้างั้นคุณครูอยู่ฝั่งไหนกันล่ะ?"
31170-32 = "ถ้าไม่ได้อยู่ฝั่งทรีนิตี้... ก็คงเป็นเกเฮนน่า? หรือองค์การนักเรียน? หรือว่าไม่ได้เข้าข้างใคร..."
31170-33 = "[s] \"ครูอยู่ฝั่งนักเรียน\""
31170-34 = "..."
31170-35 = "... เอ่อ... อืม "
31170-36 = "อยู่ฝั่ง... นักเรียน... สินะ... ไม่ได้คิดถึงคำตอบนี้เลย..."
31170-37 = "..."
31170-38 = "งะ...งั้นก็... ถ้าเป็น... แบบนั้น..."
31170-39 = "ก็หมายความว่า... คุณครูก็อยู่ฝั่งฉันด้วยสิ ใช่ไหม? เอ่อ... คือว่า... เห็นแบบนี้ฉันก็...#nเป็นนักเรียนนะ... อื้ม"
31170-40 = "[s] \"ถ้าต้องการ ครูก็จะช่วยอยู่ฝั่งมิกะให้\""
31170-41 = "..."
31170-42 = "ว้าว... พูดประโยคเท่ๆ ออกมาเฉยๆ แบบนี้ได้เลยเหรอ... คุณครูเนี่ย..."
31170-43 = "นี่สินะวาทศิลป์ของผู้ใหญ่? แอบใจฟูอยู่เหมือนกันนะเนี่ย... ฮิฮิฮิ"
31170-44 = "แต่ว่า... ที่พูดไปก็หมายความว่าจะไม่อยู่ฝั่งใครเลยใช่ไหม? ฉันไม่ยอมให้เรื่องเป็นแบบนี้หรอกนะ"
31170-45 = "ฉันก็เลยจะเสนอข้อแลกเปลี่ยนกับคุณครูในมุมมองของฉันดู "
31170-46 = "[s] \"ข้อแลกเปลี่ยน...?\""
31170-51 = "แล้วฉันจะบอกว่าคนทรยศในชมรมชั้นเรียนเสริมคือใคร"
31170-52 = "[s] \"......!!\""
31170-53 = "คนนี้ก็คือ <คนทรยศในทรีนิตี้> ที่นางิจังก็ยังตามหาตัวอยู่#nผู้เกี่ยวข้องที่นางิจังใช้ความพยายามที่มีเพื่อไล่ออกจากที่นี่ไงล่ะ"
31170-54 = "ถึงจริงๆ แล้วตอนนี้จะเกิดปัญหาใหญ่ที่ซับซ้อนกว่าเดิมมากก็เถอะ..."
31170-55 = "แต่มันก็คงไม่สุภาพที่จะมาเห็นคุณครูถูกนางิจังครอบงำแบบนี้"
31170-56 = "คุณครูรู้อะไรไหม...? คนที่เชิญคุณครูมาดูแลชมรมชั้นเรียนเสริมก็คือฉันไงล่ะ"
31170-57 = "[s] \"มิกะเหรอ...?\""
31170-58 = "อื้ม แต่นางิจังก็คัดค้านมาตลอดเลย ก็ในเมื่อใช้หนี้ไปหมดแล้ว จะให้มาใช้งานแบบนี้ได้ไง?#nสงสัยจะมีอะไรบางอย่างติดค้างอยู่นะคุณครู"
31170-59 = "..."
31170-60 = "ฉันต้องการบุคคลที่ 3 ที่ไม่ได้มาจากทั้งทรีนิตี้หรือเกเฮนน่า"
31170-64 = "อ่า... ฉันหมายถึงคนทรยศน่ะ"
31170-65 = "คนทรยศของชมรมชั้นเรียนเสริมก็คือ..."
31170-69 = "ชิราสึ อาซึสะ"
31170-75 = "มาสายนะ"
31170-76 = "..."
31170-81 = "เตรียมตัวราบรื่นดีใช่ไหม?"
31170-82 = "ยังเป็นไปตามแผน..."
31170-84 = "[ns] \"อาซึสะเหรอ...?\""
31170-85 = "ใช่ จริงๆ แล้วเธอไม่ใช่เด็กจากทรีนิตี้หรอก"
31170-86 = "เธอเป็นนักเรียนของ <โรงเรียนสาขาอาเรียส> ที่แยกตัวออกจากสหพันธ์ทรีนิตี้เมื่อนานมาแล้วน่ะ"
31170-87 = "อืม... จริงๆ จะให้เรียกว่านักเรียนก็คงจะไม่ถูก"
31170-88 = "จะเรียกอาซึสะว่านักเรียนได้ไหมนะ? เพราะประสบการณ์ในการ <เรียนรู้> ถูกตัดออกตั้งแต่ตอนแรกเลย"
31170-89 = "[s] \"แล้วมาบอกความจริงนี้กับครูทำไมเหรอ?\""
31170-90 = "..."
31170-91 = "บางที... ฉันว่าคุณครูก็คงเคยถามนางิจังด้วยคำถามคล้ายๆ กันนะ แต่ฉันก็ไม่รู้หรอกว่านางิจัง#nตอบไปว่าอะไร"
31170-92 = "ช่างเหตุผลเถอะ ขอเข้าประเด็นเลยดีกว่า..."
31170-101 = "ฉันอยากให้ครูช่วยปกป้องเด็กคนนั้นน่ะ"
31170-103 = "องก์ <สนธิสัญญาเอเดน>; ติดตามต่อในบทที่ 2"

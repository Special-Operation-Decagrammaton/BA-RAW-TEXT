31170-85 = "3;미카;02;그래. 그 아이는 사실 트리니티 출신이 아니야.\n#3;a\n#3;em;[반응]"
31170-86 = "3;미카;01;오래전에 트리니티의 연합에서 갈라져 나온 <아리우스 분교> 출신의 학생이야."
31170-87 = "3;미카;99;……학생이라. 아니, 그런 표현은 조금 잘못되었을지도."
31170-88 = "3;미카;09;아즈사가 학생이라고 할 수 있을까? 애초에 <배움>이라는 경험이 배제되어 있는데."
31170-89 = "[s] \"이 사실을 내게 알려주는 이유가 뭐야?\""
31170-90 = "3;미카;01;……."
31170-91 = "3;미카;02;……아마 선생님은 나기 쨩에게도 비슷한 질문을 했겠지? 나기 쨩은 뭐라고 대답했는지 모르겠지만.\n#3;em;…"
31170-92 = "3;미카;01;응, 이런 저런 이유는 차치하고, ……핵심을 말하자면."

[translation]
31170-1 = "第17話;三一的叛徒"
31170-2 = "渚醬居然連這種設施都願意支援，看來在課程方面應該也提供了不少協助吧。"
31170-3 = "合宿還順利嗎？應該沒有偷偷做一些其他的事吧？#n比如和學生一起開泳池派對之類的！"
31170-4 = "[s]「……」"
31170-5 = "……"
31170-6 = "沒必要這麼警戒我吧，老師。#n別看我這樣，我也是很纖細、很容易受傷的唷？"
31170-7 = "話說在這裡有好好吃飯嗎？#n要不要送點好吃的過來？像是蛋糕或紅茶之類的？"
31170-11 = "……哈哈哈，抱歉。"
31170-12 = "老師好像不喜歡這麼長的開場白呢……那麼就進入正題吧。"
31170-13 = "啊，順帶一提……我在這裡的事，渚醬也不知道唷？#n就像你看到的一樣，我連隨從都沒帶，是自己一個人過來的。"
31170-14 = "……"
31170-15 = "……老師，你是不是從渚醬那邊收到了交易的提案？"
31170-16 = "[s]「交易？」"
31170-17 = "比如找出「三一的叛徒」之類的。"
31170-18 = "[s]「…………」"
31170-19 = "……唉，果然跟我想的一樣。#n渚醬也真是的。"
31170-20 = "完全沒提供老師像樣的情報，突然就開口要老師找出叛徒？真的嗎？"
31170-21 = "連理由跟目的都沒說？#n補課部為什麼會由這些成員組成，渚醬有告訴你嗎？"
31170-22 = "真的是……什麼都沒說就讓老師背負了沉重的包袱呢……"
31170-23 = "[s]「我拒絕了那個提案。」"
31170-24 = "……咦？是嗎？為什麼？"
31170-25 = "是因為不想懷疑自己的學生嗎？還是……？"
31170-26 = "[s]「因為找出三一的叛徒不是我的職責。」"
31170-27 = "嘿……"
31170-28 = "這樣啊……不過老師的確是「夏萊」的人呢。#n同時也是和三一無關的第三者。"
31170-29 = "對總是將「三一」視為世界中心的我們來說，可能有點難以理解……"
31170-30 = "……真有趣。#n那是個嶄新的觀點呢……所以才拒絕了嗎。"
31170-31 = "既然如此，老師是誰的友方呢？"
31170-32 = "如果不是三一的友方……難道是格黑娜？還是聯邦學生會？#n又或者……不是任何人的友方？"
31170-33 = "[s]「我是學生們的友方。」"
31170-34 = "……"
31170-35 = "唔嗯……"
31170-36 = "學生們的友方……#n這樣啊……真是預料之外的答案呢……"
31170-37 = "……"
31170-38 = "那，那個……所以也就是說……"
31170-39 = "老師你……也是我的友方……可以這麼認為嗎？#n畢竟……我也是個學生……"
31170-40 = "[s]「有必要的時候，我也會是彌香的友方。」"
31170-41 = "……"
31170-42 = "哇……若無其事地說出了很厲害的話呢，老師……"
31170-43 = "這就是大人的話術嗎？#n雖然是理所當然的事，但好像還是有點開心……耶嘿嘿。"
31170-44 = "不過……這同時也意味著老師不是任何人的友方吧？#n我不會這麼輕易就被拉攏的。"
31170-45 = "嗯，所以我希望以我的立場，向老師提出一筆交易。"
31170-46 = "[s]「交易……？」"
31170-51 = "我會告訴你補課部裡的「叛徒」是誰。"
31170-52 = "[s]「……！！」"
31170-53 = "不過那只是渚醬口中的「三一的叛徒」──#n也就是他正拚命尋找，希望將其退學的對象而已。"
31170-54 = "實際上的問題其實更加複雜而巨大……"
31170-55 = "就這樣看著老師一直被渚醬耍得團團轉……實在有點過意不去。"
31170-56 = "……你知道嗎？#n邀請老師擔任補課部導師的人其實是我哦？"
31170-57 = "[s]「是彌香……？」"
31170-58 = "嗯，雖然渚醬一直反對……說是好不容易借出的人情不想用在這裡之類的。#n老師和渚醬之間發生過什麼事嗎？"
31170-59 = "……"
31170-60 = "我希望能有除了三一與格黑娜之外，屬於第三方立場的人。"
31170-64 = "……啊啊，現在正在談「叛徒」的事呢。"
31170-65 = "補課部裡的「叛徒」是……"
31170-69 = "……白洲梓。"
31170-75 = "真慢啊。"
31170-76 = "……"
31170-81 = "準備情況如何？"
31170-82 = "……目前為止都按照計畫進行。"
31170-84 = "[ns]「梓……？」"
31170-85 = "沒錯。其實那孩子原本並不是三一的人──"
31170-86 = "而是很久以前從三一分裂出去的「奧利斯分校」出身的學生。"
31170-87 = "……唔嗯，稱之為「學生」可能有點不太恰當。"
31170-88 = "從來沒有「學習」經驗的梓，真的能算的上是一名「學生」嗎？"
31170-89 = "[s]「把這件事告訴我的理由是什麼？」"
31170-90 = "……"
31170-91 = "……我想老師應該也向渚醬提過相同的問題吧？#n不過渚醬會怎麼回答我就不清楚了。"
31170-92 = "嗯，別的理由先不說……直接講重點吧。"
31170-101 = "我希望你能保護那孩子。"
31170-103 = "伊甸園條約篇;To be Continued in Chapter 2"

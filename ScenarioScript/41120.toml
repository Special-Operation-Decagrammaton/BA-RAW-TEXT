41120-29 = "3;린;02;분명 SRT 학원은 총학생회장에게 면책 특권을 부여받아, 신속하게 범죄자를 제압할 수 있도록 만들어진 조직입니다.\n#3;closeup"
41120-30 = "3;린;42;하지만 그 특권은 올바른 목적이 있을 때만 가치를 가질 뿐…… 목적을 잃은 특권은 위험을 초래할 뿐입니다.\n#3;em;[반응]\n#3;closeup"
41120-31 = "3;린;20;……게다가 선생님도 아시겠지만, 총학생회 내부에는 SRT 학생들이 가진 무력을 두려워하는 임원들도 적지 않지요.\n#3;closeup"
41120-32 = "3;린;05;그런데 그 임원들을 달래기는커녕, 농성 중인 학생들의 장비를 새것으로 교체하겠다니…….\n#3;closeup"
41120-33 = "3;린;37;이를 강행했다가는 분명 행정위원회의 거센 반대에 부딪히게 될 겁니다.\n#3;closeup"

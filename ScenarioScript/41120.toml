[translation]
41120-1 = "第12話;雨に濡れた請求書"
41120-2 = "連邦生徒会・レセプションルーム"
41120-6 = "……何ですか、これは？"
41120-7 = "[s] \"忙しいところ申し訳ないんだけど、リンに一度見てほしくて……。\""
41120-8 = "「浸水被害に遭った『子ウサギ公園』における設備補修の提案書」ですか……。"
41120-9 = "……市民が使う公園を補修すること、それ自体には何も異論ありませんが。"
41120-10 = "これは、シャーレの活動に必要なことなのですか？"
41120-11 = "[s] \"そうではないんだけど……。\""
41120-12 = "ならば……SRTの生徒たちにとって必要、ということですか？"
41120-16 = "……沈黙は正解ですよ。"
41120-17 = "カヤからお話は聞きました。ヴァルキューレへの編入を拒否した、SRT特殊学園の生徒たち……彼女たちが公園で野宿しており、先生がそれを陰ながらサポートしていると。"
41120-18 = "それについて、何かを言おうというわけではありません。そもそもシャーレは自由な組織ですし……。"
41120-19 = "ただ私の立場から言わせていただきますと、彼女たちが公園にい続けるのを是とすることはできません。"
41120-20 = "[s] \"……市民がみんなで使うはずの公園を、占拠してるから？\""
41120-21 = "いえ。あの公園はほとんど訪れる人もいない、もともと辺鄙な場所に位置する公園です。"
41120-22 = "そもそも実のところ、近いうちに撤去する予定だった公園なのです。"
41120-23 = "ただ、それとは関係なく……"
41120-29 = "……確かにSRTは連邦生徒会長から特権を与えられた、迅速に犯罪者を制圧するための特殊な組織です。"
41120-30 = "しかしそのような特権は、正しい目的と正しい運用方法によって価値を発揮します。そうでなければ、ただ危険を招くだけです。"
41120-31 = "……先生もご存知の通り、連邦生徒会内部にはSRTの武力を恐れているメンバーも少なくありません。"
41120-32 = "そんな中、彼女たちを支援するような動きをした場合……"
41120-33 = "行政委員会から、強い反発が挙がるでしょう。"
41120-34 = "[s] \"リンが説得してくれたりは……？\""
41120-38 = "しません。"
41120-40 = "その後、助けを求めるために他の連邦生徒会メンバーにも会ってみたものの……。"
41120-41 = "……ほとんどみんな、取り付く島もなかった。"
41120-44 = "防衛室・オフィス"
41120-46 = "……なるほど、それでこちらへお越しになったと。"
41120-50 = "とにかくお疲れ様でした、お茶でもいかがですか？"
41120-51 = "……ふふっ。どうやらそんな余裕も無さそうですね。"
41120-52 = "いえ、シャーレがお忙しいのは存じておりますから……本来なら、もっとゆっくりお話したいところなのですが。"
41120-56 = "結論から申し上げますと……申し訳ないのですが、私の方もお手伝いはできそうにありません。"
41120-57 = "公的な扱いとして、SRT特殊学園はすでに閉鎖された学園……。"
41120-58 = "名目はさておき、実体としては「存在しない学園の生徒たちのために、連邦生徒会が直接支援する」という形になってしまいます。これは難しいでしょう。"
41120-59 = "その公園を、という名目でどうにかならないか……それも考えてみましたが、やはり難しそうです。あの地域は元々、再開発予定区域ということもあり……。"
41120-60 = "私にできることといえば、以前お伝えした通り、彼女たちの学籍データをそのまま維持することくらいで……。"
41120-61 = "お役に立てず、申し訳ございません。"
41120-62 = "[s1] \"ううん。こちらこそ、忙しい中ごめんね。\"\n[s2] \"それだけでも助かるよ、ありがとう。\""
41120-67 = "……先生。"
41120-68 = "彼女たちと過ごす日々は、楽しいですか？"
41120-69 = "[s] 頷く。"
41120-70 = "それは何よりです。"
41120-76 = "では引き続き、RABBIT小隊をよろしくお願いいたしますね。"
41120-81 = "あっ……。"
41120-82 = "[s] \"久しぶり。\""
41120-83 = "……またお会いするとは、奇遇ですね。"
41120-84 = "先生も、防衛室長にご用が？"
41120-85 = "[s] \"うん、カンナの方は？\""
41120-86 = "私は、その……。"
41120-87 = "個人的な用事、とでも言いましょうか……。"
41120-91 = "足を止めてしまって申し訳ありません、ではまた。"
41120-99 = "お疲れ様です、お待ちしてましたよ。"
41120-103 = "カンナ、そんなに緊張しないでください。何もあなたを虐めたくて呼んだわけではありません。"
41120-104 = "ただの進捗確認ですよ。"
41120-108 = "それで、「子ウサギタウン」の建設についてはいかがですか？"
41120-109 = "それが、付近で野宿している者たちが多く……。"
41120-110 = "建物の撤去作業が、少々遅れており……。"
41120-111 = "……はい？"
41120-115 = "それはつまり、こういうことでしょうか？"
41120-116 = "キヴォトスの治安を担うヴァルキューレ警察学校……"
41120-117 = "その精鋭である公安局が、放浪者たちの立ち退きに苦労していると？"
41120-118 = "で、ですがその、どうやら普通ではあり得ないような銃火器で武装しておりまして……！"
41120-119 = "こちらの武器では、なかなか対抗しきれず……。"
41120-120 = "それに加えて、あのSRTの生徒たちも公園に残り続けているため……。"
41120-121 = "あら、つまり私のせいだと？"
41120-122 = "し、失礼しました！そのようなことは決して……！"
41120-130 = "カンナ、私は責任感のある方が大好きです。"
41120-131 = "私は私の、あなたはあなたの責任をそれぞれ果たしましょう。"
41120-132 = "万が一、その責任を放棄されてしまうと……。"
41120-133 = "SRTみたいになってしまったとしても、私からは何も言えませんよ？"
41120-135 = "……。"
41120-136 = "ふふっ、では私からひとつアドバイスを差し上げましょう。"
41120-137 = "カンナは「三本の矢」についてご存知ですか？"
41120-138 = "一本の矢では簡単に折れてしまいます。しかしそれが複数集まれば、そうそう簡単には折れません。"
41120-139 = "公安局だけで難しいのであれば、「利害関係が合う人たち」を呼んではいかがですか？"
41120-140 = "それは、つまり……。"
41120-141 = "あら、そういうのは最後まで言わない方が「[ruby=いき]粋[/ruby]」ですよ。"
41120-142 = "は、はい……。"
41120-143 = "それでは、次回はもっと良いお知らせを期待してますね。"
41120-148 = "はぁ……全く、しっかり動いてくれる人が少なくて寂しいです。"
41120-149 = "どうも人に恵まれませんねぇ……。"
41120-151 = "……役に立てていなかったら申し訳ない。"
41120-152 = "いえいえ、あなたのことではありません。むしろあなたは、私にとって最高のパートナーですよ♡"
41120-153 = "さてさて……RABBIT小隊とシャーレの先生、あそこまで仲良くなるとは思ってもみませんでしたねぇ。"
41120-154 = "お互いに傷を作って、自然と離れると思っていたのですが……。"
41120-155 = "「専門家」としてはこの状況、どう見ますか？"
41120-157 = "予想からはズレてるけど……驚くようなことじゃないはず。"
41120-158 = "ふふっ……いつも通りつまらなくて、あなたらしい回答ですね。"
41120-163 = "……もう少し、近くで見てみないと。"
41120-165 = "次回;おいなりさん"

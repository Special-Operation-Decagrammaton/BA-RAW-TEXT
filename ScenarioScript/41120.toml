[translation]
41120-1 = "ตอนที่ 12;ใบคำร้องที่เปียกฝน"
41120-2 = "ห้องรับรอง องค์การนักเรียน"
41120-6 = "ใบคำร้องนี่มันอะไรกันคะ...?"
41120-7 = "[s] \"อยากให้ช่วยดูให้หน่อยน่ะ...\""
41120-8 = "คำร้องขอให้บำรุงรักษาและซ่อมแซมสิ่งอำนวยความสะดวกใน <โคะอุซางิ การ์เด้น> ที่ได้รับความเสีย#nหายเนื่องมาจากฝนตกหนัก..."
41120-9 = "การซ่อมบำรุงสวนสาธารณะที่พลเมืองใช้กันไม่ใช่เรื่องยากหรอกค่ะ"
41120-10 = "แต่เรื่องนี้ต้องให้ชาเล่ต์เข้ามาช่วยเลยเหรอคะ?"
41120-11 = "[s] \"อืม ก็ไม่ถึงขนาดนั้น...\""
41120-12 = "ถ้างั้น... นี่เป็นเรื่องสำหรับนักเรียน SRT เหรอคะ?"
41120-16 = "ถ้าเลี่ยงจะไม่ตอบแบบนี้... ก็แสดงว่าใช่สินะคะ"
41120-17 = "ฉันได้ยินมาจากหัวหน้าสำนักป้องกันแล้วค่ะว่านักเรียนบางคนจากสถาบัน SRT ที่ปฏิเสธการย้าย#nโรงเรียนกำลังพักอยู่ในสวนสาธารณะ และมีคุณครูคอยช่วยเหลืออยู่"
41120-18 = "ฉันไม่ได้จะกล่าวโทษอะไรหรอกนะคะ เพราะชาเล่ต์คือองค์กรที่จัดตั้งขึ้นเพื่อให้คุณครูได้ทำงาน#nอย่างมีอิสระอยู่แล้ว..."
41120-19 = "แต่สำหรับฉันแล้ว ฉันไม่เห็นด้วยเท่าไรค่ะที่นักเรียนพวกนั้นยังอยู่ที่สวนสาธารณะ"
41120-20 = "[s] \"เพราะพวกนั้นไปยึดสวนสาธารณะของชาวเมืองเหรอ?\""
41120-21 = "ไม่ใช่ค่ะ สวนสาธารณะนั่นอยู่ในเขตห่างไกลที่แทบจะไม่มีคนแวะไปอยู่แล้วค่ะ"
41120-22 = "สวนที่ถูกทิ้งไว้เฉยๆ แบบนั้นเดี๋ยวก็ต้องถูกรื้อถอนเข้าสักวันค่ะ"
41120-23 = "แต่ว่า..."
41120-29 = "สถาบัน SRT คือหน่วยงานที่สร้างขึ้นโดยได้รับสิทธิพิเศษในการยกเว้นความรับผิดชอบจากประธาน#nองค์การนักเรียน เพื่อให้สามารถปราบอาชญากรได้อย่างรวดเร็ว"
41120-30 = "แต่สิทธิพิเศษนั้นจะมีค่าก็ต่อเมื่อมีจุดประสงค์ที่ชอบธรรมเท่านั้น... สิทธิพิเศษที่ไร้จุดประสงค์มีแต่จะ#nก่อให้เกิดอันตรายน่ะค่ะ"
41120-31 = "และคุณครูก็อาจจะทราบดีว่าในองค์การนักเรียนยังมีกรรมการหลายท่านที่หวาดกลัวกำลังทหารของ#nนักเรียน SRT อยู่นะคะ"
41120-32 = "แทนที่จะมาปลอบโยนกรรมการ แต่กลับมาขออาวุธและอุปกรณ์ของนักเรียนที่ทำการประท้วงแบบนี้..."
41120-33 = "ถ้าคุณครูยังผลักดันเรื่องนี้ต่อไป อนาคตคงได้เจอการต่อต้านอย่างรุนแรงจากคณะกรรมการบริหารค่ะ"
41120-34 = "[s] \"รินช่วยไปเกลี้ยกล่อมให้หน่อยไม่ได้เหรอ...?\""
41120-38 = "ฉันไม่อนุญาตค่ะ"
41120-40 = "(หลังจากนั้นคุณครูก็ไปขอความช่วยเหลือจากหัวหน้าฝ่ายต่างๆ...)"
41120-41 = "(แต่ทุกคนก็ปฏิเสธกลับมา)"
41120-44 = "สำนักงานหัวหน้าสำนักป้องกัน"
41120-46 = "มาถึงที่นี่จนได้นะคะ..."
41120-50 = "ตั้งใจทำงานจังเลยค่ะคุณครู ดื่มชาสักแก้วก่อนไหมคะ?"
41120-51 = "ไม่เอาเหรอคะ...?"
41120-52 = "สงสัยจะยุ่งจนไม่มีเวลาสำหรับพูดคุยช้าๆ แบบสบายๆ สินะคะ"
41120-56 = "งั้นฉันจะเข้าประเด็นเลยแล้วกันนะคะ เรื่องนี้ฉันเองก็ช่วยคุณครูไม่ได้เหมือนกันค่ะ"
41120-57 = "สถาบัน SRT เป็นโรงเรียนที่ถูกสั่งปิด และถือว่าไม่มีตัวตนแล้ว..."
41120-58 = "การขอเงินสนับสนุนจากองค์การนักเรียนให้นักเรียนของโรงเรียนที่ไม่มีตัวตน มันเป็นเรื่องที่เป็นไป#nไม่ได้ค่ะ"
41120-59 = "แต่ถึงจะขอกู้เงินกองทุนโดยใช้ข้ออ้างว่าจะซ่อมบำรุงสวนสาธารณะ ฉันก็ต้องบอกว่าไม่ได้เหมือนกัน เพราะพื้นที่ในเขตนั้นเป็นพื้นที่ที่จะมีการปรับปรุงใหม่ค่ะ"
41120-60 = "สิ่งเดียวที่ฉันทำได้คือการรักษาระเบียนประวัติการศึกษาไว้ในระบบ จะได้ไม่ถูกลบหายไป..."
41120-61 = "ขอโทษนะคะที่ช่วยมากกว่านี้ไม่ได้"
41120-62 = "[s1] \"ไม่หรอก\"\n[s2] \"คายะช่วยครูได้มากแล้วล่ะ\""
41120-67 = "คุณครูคะ..."
41120-68 = "คุณครูมีความสุขที่ได้ใช้เวลาร่วมกับเด็กๆ กองทหาร RABBIT ไหมคะ?"
41120-69 = "[s] พยักหน้า"
41120-70 = "ได้ยินแบบนี้ก็ค่อยยังชั่วค่ะ"
41120-76 = "ฉันฝากนักเรียนกองทหาร RABBIT ด้วยนะคะ"
41120-81 = "อึก..."
41120-82 = "[s] \"ใช่ที่เราเจอกันในสถาบันฝึกตำรวจวัลคิรี่ไหม...\""
41120-83 = "บังเอิญจังเลยนะคะ... ที่ได้เจอกันอีกที่นี่"
41120-84 = "คุณครูก็มีธุระมาคุยกับหัวหน้าเหมือนกันเหรอคะ?"
41120-85 = "[s] \"อื้ม แล้วคันนะล่ะ?\""
41120-86 = "พอดีฉัน... เอ่อ..."
41120-87 = "มาที่นี่เพราะธุระส่วนตัวค่ะ ส่วนตัวมากเลย"
41120-91 = "งั้นไว้เจอกันใหม่นะคะ"
41120-99 = "เชิญค่ะหัวหน้ากรมความมั่นคงสาธารณะ กำลังรออยู่พอดีเลยค่ะ"
41120-103 = "ไม่ต้องประหม่าขนาดนั้นก็ได้ค่ะคันนะ ฉันไม่ได้เรียกมาเพื่อตำหนิหรอกนะคะ"
41120-104 = "ฉันแค่ต้องการฟังความคืบหน้าของงานที่ขอร้องไปเมื่อคราวก่อนน่ะ"
41120-108 = "การก่อสร้าง \"โคะอุซางิ ทาวน์\" ใหม่เตรียมการไปถึงไหนแล้วคะ?"
41120-109 = "เรื่องนั้น... เราเตรียมการอื่นๆ เสร็จหมดแล้วค่ะ แต่พวกฮิปปี้ที่มาพักในอาคารร้างยังไม่ยอมออกไป..."
41120-110 = "การรื้อถอนอาคารก็เลยล่าช้าอยู่ค่ะ"
41120-111 = "อื้ม~"
41120-115 = "หัวหน้ากรมฯ คะ ไม่คิดว่าที่พูดมาคือเรื่องเหลวไหลเหรอคะ?"
41120-116 = "สถาบันฝึกตำรวจวัลคิรี่มีหน้าที่ดูแลความสงบของคิโวทอส..."
41120-117 = "นักเรียนแถวหน้าจากกรมความมั่นคงสาธารณะถึงกับต้องลำบากในการขับไล่คนไร้บ้านเนี่ยนะคะ?"
41120-118 = "ตะ... แต่คนไร้บ้านที่อยู่ตรงนั้นต่างจากคนไร้บ้านทั่วไปนะคะ พวกนั้นติดอาวุธหนักที่ไม่ธรรมดาเลยค่ะ!"
41120-119 = "อุปกรณ์เข้าปราบปรามที่พวกเรามียังสู้ปืนของพวกนั้นไม่ได้เลยค่ะ"
41120-120 = "ไม่เพียงเท่านี้นะคะ... นักเรียน SRT ที่หัวหน้าคายะเมตตาไว้ยังมาใช้สวนสาธารณะรอบๆ เป็นแคมป์#nทหารอีก การเตรียมก่อสร้างใหม่ก็เลย..."
41120-121 = "ตายจริง คิดจะโทษว่าเป็นความผิดของฉันเหรอคะ?"
41120-122 = "ขะ... ขออภัยด้วยค่ะ!"
41120-130 = "หัวหน้ากรมฯ คันนะ ฉันน่ะชอบคนที่มีความรับผิดชอบนะคะ"
41120-131 = "ฉันทำในฐานะหัวหน้าสำนักป้องกัน และคุณก็ทำในฐานะหัวหน้ากรมความมั่นคงสาธารณะ เราแค่ต้องตั้งใจทำงานในส่วนของตัวเองและทำมันให้เต็มที่ค่ะ"
41120-132 = "ถ้ายังไร้ความรับผิดชอบและพูดจาอวดดีโดยที่ไม่รู้สถานะของตัวเองอยู่อีกละก็..."
41120-133 = "อาจจะลงเอยเหมือนสถาบันพิเศษ SRT ก็ได้นะคะ?"
41120-135 = "(กลืนน้ำลาย)"
41120-136 = "หึหึ ไหนๆ ก็กำลังลำบากอยู่ ฉันจะให้คำแนะนำตรงๆ สักอย่างแล้วกันค่ะ"
41120-137 = "หัวหน้ากรมฯ คันนะรู้จัก <คำสอนของลูกธนูทั้งสาม> ไหมคะ?"
41120-138 = "ลูกธนูจะหักได้ง่ายๆ หากอยู่แค่อันเดียว แต่หากมัดเป็นกำหลายๆ อันก็จะไม่หักได้ง่ายๆ"
41120-139 = "หากมีเรื่องที่กรมความมั่นคงสาธารณะจัดการด้วยตัวเองไม่ได้ ก็แค่ต้องไปขอความร่วมมือจาก 'ฝ่ายที่ถือผลประโยชน์ร่วมกัน' ค่ะ"
41120-140 = "หรือว่าจะหมายถึง..."
41120-141 = "คงไม่ใช่ว่าจะไม่มีไหวพริบจนถึงขนาดที่ฉันต้องบอกทุกอย่างหรอกใช่ไหมคะ?"
41120-142 = "ค่ะ..."
41120-143 = "ไว้ฉันจะรอฟังข่าวดีในครั้งหน้านะคะ"
41120-148 = "เฮ้อ... เดี๋ยวก็คนนั้นที เดี๋ยวก็คนนี้ที ไม่มีใครทำอะไรได้ดั่งใจเลยค่ะ"
41120-149 = "ทำไมฉันถึงไม่มีโชคจากคนอื่นบ้างนะ..."
41120-151 = "ที่พูดมาหมายถึงพวกเราเหรอ?"
41120-152 = "จะเป็นไปได้ยังไงล่ะคะ คุณคือพาร์ทเนอร์ที่ดีที่สุดในชีวิตที่ฉันได้เจอมาเลยนะคะ~ ♡"
41120-153 = "แต่ไม่นึกเลยนะคะว่ากองทหาร RABBIT กับครูจากชาเล่ต์จะสนิทสนมกันได้ขนาดนั้น"
41120-154 = "นึกว่าถ้าให้อยู่ด้วยกันจะยิ่งสร้างบาดแผลให้กันจนยอมไสหัวออกไปง่ายๆ เสียอีก..."
41120-155 = "ในฐานะ 'ผู้เชี่ยวชาญ' ไม่ทราบว่าคิดยังไงเกี่ยวกับเรื่องนี้คะ?"
41120-157 = "ต่างจากที่คาดการณ์ไว้มาก แต่ก็ไม่ได้ตกใจอะไรหรอก"
41120-158 = "เป็นคำตอบที่ไม่สนุกสมกับคุณเลยนะคะ"
41120-163 = "คงต้องจับตาดูอย่างใกล้ชิดต่อไปอีกหน่อยแล้วล่ะ..."
41120-165 = "ตอนต่อไป;จิ้งจอกกับซูชิเต้าหู้หวาน"

41120-16 = "3;린;99;……대답을 피하시는 걸 보니 정답인가 보군요."
41120-17 = "3;린;01;방위실장으로부터 이야기는 전해 들었습니다. 전학 가기를 거부한 SRT 학원의 일부 학생들이 공원에서 노숙을 하고 있고, 선생님이 그 뒤를 봐주고 계신다지요.\n#3;em;[반응]"
41120-18 = "3;린;02;그 사실을 비난하려는 것은 아닙니다. 애초에 선생님께서 내키는 일을 자유롭게 하실 수 있도록 만들어진 조직이 샬레이니……."
41120-19 = "3;린;42;다만, 제 입장에선 그 학생들이 아직도 공원에 머무르고 있다는 사실이 마뜩잖군요."
41120-20 = "[s] \"……시민들이 사용하는 공원을 점거하고 있어서?\""
41120-21 = "3;린;02;아니요. 그 공원은 방문하는 사람도 거의 없는 외진 곳에 위치한 공원이었으니까요."
41120-22 = "3;린;01;그대로 두어도 어차피 조만간 철거할 예정이었습니다."
41120-23 = "3;린;99;다만……"

[translation]
41120-1 = "Episode 12; Rain-Soaked Bills"
41120-2 = "General Student Council Reception"
41120-6 = "A proposal? What is it for?"
41120-7 = "[s] \"Just take a look at it.\""
41120-8 = "Hm... A proposal to repair and maintain the facilities in Kousagi Park that were damaged by the flood..."
41120-9 = "The task in and of itself isn't difficult."
41120-10 = "But how is this pertinent to Schale's activities?"
41120-11 = "[s] \"I mean, it's not exactly...\""
41120-12 = "Then, tell me. Is it pertinent to the SRT students?"
41120-16 = "...Your silence speaks volumes."
41120-17 = "I've read the report from the chief of defense. SRT Academy students have taken up residence in the very same park they staged a protest in. And you've been looking after them."
41120-18 = "A conundrum. It isn't my place to criticize you, Sensei. The Schale organization is structured in a way that I couldn't even if I wished."
41120-19 = "So, instead, my opinion. The fact that those students are living at the park is immensely distasteful."
41120-20 = "[s] \"Because they've taken over a public park for citizens?\""
41120-21 = "Hardly. It's a remote park with very few visitors."
41120-22 = "It would have been demolished at one point down the road regardless."
41120-23 = "However..."
41120-29 = "SRT Academy was at one point granted special immunity from the president of the General Student Council to maximize their effectiveness."
41120-30 = "But privileges should only be granted when it serves a purpose. With no purpose, privilege is dangerous."
41120-31 = "You're already well aware of how SRT Academy is perceived by most of the General Student Council. They fear them."
41120-32 = "And now you would like to house and arm these students who, in all technicality, are still in open rebellion?"
41120-33 = "Imagine the chaos that would ensue if the Administration Board were to hear of this."
41120-34 = "[s] \"Isn't there anything you can do, Rin?\""
41120-38 = "No. There is not."
41120-40 = "(I met with every single chief of staff to enlist help.)"
41120-41 = "(But every single response was a resounding no.)"
41120-44 = "Chief of Defense Office"
41120-46 = "...And now you've ended up here."
41120-50 = "You certainly have been busy, Sensei. Would you like some tea?"
41120-51 = "There's no need?"
41120-52 = "I suppose the urgency you feel can't be placated with pleasantries."
41120-56 = "Then right to the point. I'm afraid I can't help you either."
41120-57 = "No matter what its students say, SRT Academy no longer exists."
41120-58 = "As much as I've tried to find a loophole, it's impossible to use the General Student Council's budget for students of a non-existent academy."
41120-59 = "I tried to finance the park's renovation as an excuse, but that didn't work out either since the area's plans for redevelopment have already been approved."
41120-60 = "I'm afraid the extent of my power is maintaining the students' academic records so their data isn't expunged."
41120-61 = "I'm sorry. I wish I had a better answer for you."
41120-62 = "[s1] \"You've done so much already, Kaya.\"\n[s2] \"I'll figure it out one way or another.\""
41120-67 = "...Sensei."
41120-68 = "Have you enjoyed your time with the students of the RABBIT Squad?"
41120-69 = "[s] \"I'm fond of them.\""
41120-70 = "I'm happy to hear that."
41120-76 = "Please continue to look after those students, just as you have been."
41120-81 = "Ugh."
41120-82 = "[s] \"Back then, at Valkyrie Police School...\""
41120-83 = "What a coincidence. Hey there, Sensei."
41120-84 = "Do you have business with the chief of staff?"
41120-85 = "[s] \"Yes. You as well?\""
41120-86 = "Oh... Well..."
41120-87 = "More or less. Personal business."
41120-91 = "I expect I'll see you again, Sensei."
41120-99 = "Welcome, Public Peace Bureau Director. I'm glad you could make it."
41120-103 = "You look like your head is on a chopping block. You're not in trouble, Kanna."
41120-104 = "I just wanted a report on my last request."
41120-108 = "Tell me, Kanna. How much progress have we made on the reconstruction of Kousagi Town?"
41120-109 = "Well... Preparations are complete, at the least. But there's a stubborn group of hippies squatting in an abandoned building."
41120-110 = "We haven't been able to get them to vacate and it's causing delays in demolition."
41120-111 = "Come again?"
41120-115 = "Public Peace Bureau Director. Perhaps you misspoke?"
41120-116 = "The valiant Valkyrie Police School, protectors of Kivotos and keepers of peace."
41120-117 = "I would like you to think very carefully before you answer my next question. Are you to tell me that the elite of the elite of that school, the Public Peace Bureau, cannot muster the competence to rid us of a handful of hippies?"
41120-118 = "M-Ma'am. They're not your average, run-of-the-mill homeless population. We don't know how or where they procured them, but they're armed to the teeth with state-of-the-art weaponry!"
41120-119 = "They outmatch our riot gear and we haven't been able to gain a strategic advantage."
41120-120 = "Plus, those SRT students you helped out have settled down in the nearby park, making it even more difficult to move."
41120-121 = "I believe I told you to think carefully about your answer. Are you blaming me?"
41120-122 = "N-No, I beg your pardon, Chief of Staff."
41120-130 = "You see, Kanna. I like people who take responsibility."
41120-131 = "Me in my position as chief of defense, you as a director... We need to take responsibility for the duties of our roles."
41120-132 = "What I'm hearing from you right now, Director, is presumptuous nonsense. It's a disregard for your responsibilities. I hate that."
41120-133 = "And when people do things I hate, they end up in the same place as those SRT students."
41120-135 = "*gulp*"
41120-136 = "Heehee. Oh, Kanna. Just a little joke. But since you're struggling with my request, some advice."
41120-137 = "Are you familiar with the Lesson of Three Arrows?"
41120-138 = "A single arrow will snap like brittle bones. But a bundle of arrows will not crumble so easily."
41120-139 = "And so, what do you do if you encounter a problem the brittle Public Peace Bureau cannot solve? Simply gather more to your cause."
41120-140 = "You don't mean...?"
41120-141 = "I'm going to find someone less witless than you if you can't figure out what I mean."
41120-142 = "Y-Yes, ma'am."
41120-143 = "Fantastic. I'm looking forward to reading your report."
41120-148 = "Ugh. Why is every single person I must work with entirely incompetent?"
41120-149 = "I must have done something in a past life to deserve this punishment."
41120-151 = "You don't mean us, I hope."
41120-152 = "Oh, don't be silly. You're the best partner I've had in my life ♡"
41120-153 = "I will say, I didn't expect the RABBIT Squad and Sensei to become such fast friends."
41120-154 = "Quite the opposite effect of what I intended."
41120-155 = "As an expert, what's your take on the situation?"
41120-157 = "It's unexpected, but not surprising."
41120-158 = "Haha. A boring answer as usual."
41120-163 = "We'll keep a close eye on them."
41120-165 = "Next Episode; The Fox and the Inarizushi"

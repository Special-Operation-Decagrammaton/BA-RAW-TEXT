[translation]
41120-1 = "第12話;被雨淋濕的申請書"
41120-2 = "聯邦學生會．接待室"
41120-6 = "……這是什麼？"
41120-7 = "[s] 「百忙之中非常抱歉，不過我希望可以請琳看一下……」"
41120-8 = "《「兔寶寶公園」遭遇水災的設備補修提案書》是嗎……"
41120-9 = "……補修市民使用的公園，這件事本身沒有問題。"
41120-10 = "但這對夏萊的活動來說是必要的嗎？"
41120-11 = "[s] 「那倒不是……」"
41120-12 = "那您的意思是……這對SRT的學生們來說是必要的嗎？"
41120-16 = "……沉默等於肯定唷。"
41120-17 = "我從香耶那裡聽說了。拒絕編入女武神的SRT特殊學園的學生們……#n目前正在公園露宿，老師則在暗中支援。"
41120-18 = "關於這點我不想干涉。更何況夏萊是自由的組織……"
41120-19 = "只是由我的立場而言，不能允許她們一直待在公園。"
41120-20 = "[s] 「……因為佔領了原本該由市民們使用的公園嗎？」"
41120-21 = "不。那座公園幾乎沒有人會去，而且那本來就是位於偏僻位置的公園。"
41120-22 = "更況且實際上那座公園，預計會在近期撤除。"
41120-23 = "只是另一方面……"
41120-29 = "……SRT確實是由聯邦學生會長授予特權，為了迅速壓制犯罪者的特殊組織。"
41120-30 = "不過那樣的特權，需要有正確的目的和運用方法才能發揮價值。否則只會招來危險。"
41120-31 = "……如老師所知，聯邦學生會內部也有不少畏懼SRT武力的成員。"
41120-32 = "在這種情況下，做出支援她們的行動……"
41120-33 = "恐怕會引發行政委員會的強烈反彈吧。"
41120-34 = "[s] 「琳可以去幫我說服他們嗎……？」"
41120-38 = "才不要。"
41120-40 = "（之後為了尋求幫助，也去見了其他聯邦學生會成員……）"
41120-41 = "（……但幾乎沒有人想要幫忙）"
41120-44 = "防衛室．辦公室"
41120-46 = "……原來如此，所以才來到這裡。"
41120-50 = "總之辛苦您了，要喝茶嗎？"
41120-51 = "……呵呵。看來連那種心力都沒有呢。"
41120-52 = "不，我明白夏萊很忙碌……本來也是想慢慢聊的。"
41120-56 = "從結論上來說……很抱歉，我似乎也沒辦法幫忙。"
41120-57 = "官方處理上，SRT特殊學園已經是被關閉的學園。"
41120-58 = "名目姑且不論，實際狀況會是「聯邦學生會直接支援不存在的學園的學生們」。這恐怕很困難。"
41120-59 = "我也思考過是否能以那座公園為名目……但依然很困難。何況那個地區原本就預定要都更……"
41120-60 = "我能做的事就只有之前說的，幫她們維持學籍資料……"
41120-61 = "幫不上忙，非常抱歉。"
41120-62 = "[s1] 「不會，我才是。百忙之中抱歉了。」\n[s2] 「只有那樣也幫了大忙，謝謝你。」"
41120-67 = "……老師。"
41120-68 = "和她們度過的日子，開心嗎？"
41120-69 = "[s] 點頭"
41120-70 = "那真是太好了。"
41120-76 = "那RABBIT小隊就繼續拜託您了。"
41120-81 = "啊……"
41120-82 = "[s] 「好久不見。」"
41120-83 = "……沒想到還會見面，真巧呢。"
41120-84 = "老師也有事找防衛室長嗎？"
41120-85 = "[s] 「嗯，環奈呢？」"
41120-86 = "我是那個……"
41120-87 = "應該算是私事嗎……"
41120-91 = "不好意思叫住您，那麼再見。"
41120-99 = "辛苦了，我正在等你呢。"
41120-103 = "環奈，請不要那麼緊張。又不是要欺負你才叫你來的。"
41120-104 = "只是確認進度而已唷。"
41120-108 = "所以，「兔寶寶鎮」的建設進度如何呢？"
41120-109 = "關於這部分，有許多人在附近露宿……"
41120-110 = "建築物的撤除作業，稍微延宕……"
41120-111 = "……什麼？"
41120-115 = "所以你是這個意思嗎？"
41120-116 = "維護奇普托斯治安的女武神警察學園……"
41120-117 = "號稱精銳的公安局，在驅逐遊民們這件事上有困難？"
41120-118 = "不，不過，對方似乎以正常來說不可能會有的槍械進行了武裝……！"
41120-119 = "憑這邊的武器，實在是沒辦法對抗……"
41120-120 = "此外，那些SRT的學生們也還持續留在公園……"
41120-121 = "啊啦，所以說是我的錯？"
41120-122 = "失，失禮了！絕對沒有那種事……！"
41120-130 = "環奈，我喜歡有責任感的人。"
41120-131 = "我負責完成我的，你負責完成你的責任。"
41120-132 = "萬一有人放棄那個責任……"
41120-133 = "就算變成SRT那樣，我也不能說什麼唷？"
41120-135 = "……"
41120-136 = "呵呵，那就由我提出一個建議吧。"
41120-137 = "環奈知道「三矢之訓」嗎？"
41120-138 = "一支箭矢很容易被折斷。不過只要集合成複數，就沒有那麼容易被折斷了。"
41120-139 = "只靠公安局會有困難的話，不如叫上「利害關係一致的人」怎麼樣呢？"
41120-140 = "那也就是說……"
41120-141 = "哎呀，這種話不說破才是「識相」唷。"
41120-142 = "是，是的……"
41120-143 = "那麼，期待下次會有更好的消息哦。"
41120-148 = "唉……真是的，會確實行動的人很少，真讓人寂寞。"
41120-149 = "我還真是沒人緣呢……"
41120-151 = "……沒幫上忙的話很抱歉。"
41120-152 = "不會不會，不是在說你。不如說，你對我來說是最好的搭檔唷♡"
41120-153 = "話說回來……RABBIT小隊和夏萊的老師，沒想到會變得那麼要好呢。"
41120-154 = "還以為會互相傷害，自然分開呢……"
41120-155 = "身為「專家」，這個狀況你怎麼看？"
41120-157 = "雖然偏離預期……不過不值得驚訝。"
41120-158 = "呵呵……一如往常無趣，很像你的回答呢。"
41120-163 = "……得再稍微，就近觀察才行。"
41120-165 = "下一話;豆皮壽司"

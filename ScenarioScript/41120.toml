41120-8 = "3;린;99;침수 피해를 입은 <코우사기 공원>의 시설을 정비하고 보수하는 안건이라……."
41120-9 = "3;린;24;시민들이 사용하는 공원을 수리하고 보수하는 것 자체는 어려운 일이 아닙니다만."
41120-10 = "3;린;05;이 공사가 샬레의 활동에 필요한 일입니까?\n#3;em;[?]"
41120-11 = "[s] \"어, 그건 아닌데……\""
41120-12 = "3;린;42;그럼…… SRT의 학생들에게 필요한 일입니까?"

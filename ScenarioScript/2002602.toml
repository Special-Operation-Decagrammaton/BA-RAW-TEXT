[translation]
2002602-1 = "How Buildings Are Made"
2002602-5 = "Bus Stop outside D.U."
2002602-6 = "I had been working all night and ended up waiting for the first bus home the next morning."
2002602-12 = "To my surprise, there was a large group of students waiting at the stop, in spite of it being so early."
2002602-16 = "[ns] \"(Is there some kind of event today?)\""
2002602-17 = "It's been ages since I've had a job. I was ready to write off this whole month."
2002602-18 = "The timing couldn't be more perfect. There are some new goods in the shop that I was eying, and I need the cash."
2002602-19 = "I just hope it's nothing too hard this time. I hate lugging sand and cement around."
2002602-20 = "I hear you. Maybe some pipe fitting, or putting together a little home extension... That would be nice."
2002602-25 = "[ns] Wait for the bus."
2002602-32 = "I need five for scaffolding, ten for steel framing!"
2002602-37 = "Me! I can do it!"
2002602-38 = "Oh, me too, me too!"
2002602-40 = "All right. They're expecting us at the job site, so everybody in!"
2002602-52 = "[ns] \"W-Wait...\""
2002602-53 = "Hey, you! Stop lollygagging!"
2002602-54 = "You planning to pay us if we miss this gig?"
2002602-55 = "[s1] \"But I'm not—\"\n[s2] \"I just wanted to ride the bus...\""
2002602-68 = "Everybody in? Here we go!"
2002602-69 = "[ns] \"Please, wait just a second...!\""
2002602-71 = "The crowd of students carried me along with them, and off we went to an unknown location."
2002602-74 = "Good morning, laborers of Kivotos!"
2002602-75 = "I am Yasumori Minori of Red Winter Academy. I am responsible for managing today's work site!"
2002602-76 = "This is the first job in a while for most of us, so let's show them what we can do!"
2002602-77 = "And remember, a safe environment and fair wages are the right of every worker! If you feel you haven't received that here, come see me at the office here on site!"
2002602-78 = "Yeah!!"
2002602-79 = "Before we begin, I'll lead you in a cheer."
2002602-80 = "Woo!!"
2002602-81 = "Safety first!"
2002602-82 = "All right! All right! All right!"
2002602-83 = "All right! Everyone stay safe out there!"
2002602-84 = "[ns] \"They sure do have a lot of energy for this early in the morning...\""
2002602-85 = "...Oh?"
2002602-86 = "[USERNAME] Sensei? What are you doing here?"
2002602-87 = "[s3] \"I was abducted by a crowd of hard-working students.\"\n[s4] \"See, I was waiting for my bus, when...\""
2002602-91 = "Ah, so you were swept up by this morning's laborers..."
2002602-92 = "I'm sorry for bringing you here against your wishes. The Labor Party uses that bus stop as a gathering spot in the morning."
2002602-93 = "But now what do we do? I can't spare any vehicles to take you home, and we aren't close to any bus stops here..."
2002602-94 = "[ns] \"Don't worry about me.\""
2002602-96 = "[ns] \"I've been meaning to see how the Labor Party does its work, anyway.\""
2002602-97 = "Oh? Would you like to take a tour while you're here, then?"
2002602-98 = "I can't replace the time that you've lost, but after the workday, I'll treat you to an extra-large katsudon from a place nearby."
2002602-99 = "Their sauce is thick and the meat is plenty, so it's a hearty reward for a hard day's work."
2002602-100 = "If you ask me, the workday isn't over until you have a katsudon or a beef bowl to fill your stomach."
2002602-101 = "Now, before we begin... Put this on."
2002602-108 = "[ns] \"And this is...?\""
2002602-109 = "A hard hat and a hi-vis belt. The first most important thing on a job site is safety! And the second is also safety!"
2002602-110 = "Some of the equipment we use here is dangerous even for the sturdy students of Kivotos."
2002602-111 = "Stay away from any structure that looks unstable. And no matter what, watch your step!"
2002602-112 = "[s] \"Got it.\""
2002602-113 = "All right!"
2002602-114 = "Now then... Let's get to work!"
2002602-118 = "Welding team! Get those safety handrails up!"
2002602-124 = "Plaster team! We need 3 bags of mortar here! I want all those gaps in the plywood filled!"
2002602-125 = "[s5] \"Such speed...\"\n[s6] \"You finished a whole floor in a snap!\""
2002602-128 = "Impressed? Huh. Everyone seems a little slow today, if you ask me..."
2002602-129 = "[s] \"Are you kidding? This building will be done in no time!\""
2002602-130 = "Don't be so sure. The reason the Labor Party has so much trouble getting jobs is because we're slower than other groups."
2002602-131 = "Of course, our work quality is second to none in all of Kivotos..."
2002602-132 = "And I think the students here work at a fine pace, so I'm not sure why we're always behind schedule."
2002602-133 = "[s7] \"That's a mystery...\"\n[s8] \"But they're working so fast...\""
2002602-141 = "Ah, President Minori, hello! I believe this is our first time meeting in person, yes?"
2002602-142 = "I'm the president of Magma Construction. It's a pleasure, a real pleasure."
2002602-143 = "Ah, so you're our client. Thank you for giving us this opportunity."
2002602-144 = "Oh, it's nothing, nothing at all. Why, I should thank you for coming here on such short notice!"
2002602-145 = "...What brings you to the job site? Would you like to inspect our work?"
2002602-146 = "I can personally vouch that we are following safety regulations to the letter, so you have nothing to worry about."
2002602-147 = "Oh, no, it's nothing like that..."
2002602-148 = "To be quite frank with you, dear... I had a teeny, tiny favor to ask of you."
2002602-149 = "A favor."
2002602-150 = "You see—and oh, this is dreadfully embarrassing—I had an unexpected expense, and my funds aren't exactly liquid just now."
2002602-151 = "I just don't know if I have the funds to pay the Labor Party wages today."
2002602-155 = "Oh, but don't worry! I'll pay you back with interest tomorrow, so if we could just keep this between us—"
2002602-157 = "Attention, everyone! Stop work! Shut it down!"
2002602-164 = "No labor for no pay!"
2002602-165 = "Labor is the fight for human survival! There can be no labor without fair and equal payment!"
2002602-166 = "Anyone who comes to me, trying to get free work with honeyed words..."
2002602-167 = "...is a capitalist pig who doesn't know the true value of labor!"
2002602-168 = "I-I never said I wouldn't pay! I only need more time..."
2002602-169 = "Call it whatever you like! The Labor Party will accept no unequal terms."
2002602-170 = "We will not work one minute—one second—without fair compensation!"
2002602-171 = "Yeah! Yeah!"
2002602-172 = "Hmph... It seems nobody wants to work these days."
2002602-173 = "Fine, have it your way. Leave the site for today."
2002602-174 = "But I promise I'll have the money tomorrow. And then we can put all this nasty business behind us and get back to it, yes?"
2002602-175 = "If you can give us fair pay, we're happy to—"
2002602-176 = "Wait. What about the work we've already done today?"
2002602-177 = "I told you, I don't have any money today!"
2002602-178 = "Tomorrow! We can talk this out tomorrow!"
2002602-179 = "Ah-ha! This is how you planned to squeeze free labor out of us, you bourgeois..."
2002602-180 = "I think it's time we showed you the value of our labor!"
2002602-181 = "Blast team! Dynamite, now!"
2002602-182 = "Dynamite?! What are you planning...?!"
2002602-183 = "You're going to sabotage the work site over a little misunderstanding...?!"
2002602-184 = "Sabotage is such an ugly word. We're just equaling things out."
2002602-185 = "Anything we built without pay, we're going to demolish!"
2002602-186 = "Wait! If you destroy it, then you'll just have to build it again tomorrow!"
2002602-187 = "Think of how wasteful you're being!"
2002602-188 = "Don't you have pride as builders? As artists?"
2002602-189 = "Even capitalists understand that you have to pay for quality art."
2002602-195 = "I will ask you one last time. Do you have today's wages?"
2002602-196 = "I told you! I literally have no money in the—"
2002602-202 = "Tear it all down!"
2002602-208 = "Noooo!"
2002602-211 = "Haha... I've worked up an appetite from today's hard work."
2002602-212 = "Okay, everyone! Katsudon for everyone. My treat! Fill your stomachs!"
2002602-215 = "Three cheers for the president!"
2002602-216 = "I don't care what the job is, as long as President Minori is the foreman!"
2002602-218 = "Aaah... But why do our jobs always end up falling behind schedule? I really don't understand it."
2002602-223 = "I thought about answering her, but in the end I bit my tongue..."
2002602-225 = "I enjoyed some hot katsudon with the Labor Party before returning to Schale."

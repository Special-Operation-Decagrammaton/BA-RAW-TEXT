[translation]
2002602-1 = "建築是如何建成的"
2002602-5 = "D.U.郊外．公車站"
2002602-6 = "（由於在外頭的工作一直持續到了深夜，只好搭首班車回夏萊）"
2002602-12 = "（……儘管時間還早，公車站旁卻聚集了一大群學生）"
2002602-16 = "[ns]（今天有什麼活動嗎……？）"
2002602-17 = "哎呀～這是時隔多久的工作啊？#n我都已經放棄這個月了說。"
2002602-18 = "我才剛買了期待已久的新周邊，能接到工作真是太好了。"
2002602-19 = "希望這次的工作不會太辛苦～#n我已經受夠整天都在搬水泥的工作了。"
2002602-20 = "就是說啊。#n如果是配線工程就能輕鬆一點了……"
2002602-25 = "[ns] 安靜地等公車"
2002602-32 = "鷹架5人，鋼筋10人！"
2002602-37 = "我！我要做！"
2002602-38 = "我也要！我也想做！"
2002602-40 = "很好，快上車吧！#n馬上就到開工時間了！"
2002602-52 = "[ns]「哇……」"
2002602-53 = "喂！你站在那邊是要我們怎麼上車！？"
2002602-54 = "要是沒趕上的話，你承擔得起嗎！？"
2002602-55 = "[s1]「不是，我只是……」\n[s2]「在這裡等公車……」"
2002602-68 = "都上車了吧？好，出發！"
2002602-69 = "[ns]「等，等等……！」"
2002602-71 = "（……受到人潮的推擠，等回過神來已經搭上了廂型車）"
2002602-74 = "早安，奇普托斯的諸位勞動者！"
2002602-75 = "我是今天的工地現場監督，赤冬聯邦學園的安守實里！"
2002602-76 = "這是時隔已久的工作，全力證明我等的勞動力吧！"
2002602-77 = "當然，現場的安全與報酬的獲取是勞動者正當的權利！#n一旦有任何疑問，請立刻向現場事務所報告！"
2002602-78 = "哦哦！！"
2002602-79 = "那麼……開始工作吧！"
2002602-80 = "好！"
2002602-81 = "安全，第一！"
2002602-82 = "好！好！好！"
2002602-83 = "很好！那麼今天也謹記安全第一，努力加油吧！"
2002602-84 = "[ns]「……真有幹勁呢。」"
2002602-85 = "……嗯？"
2002602-86 = "這不是[USERNAME]老師嗎？#n你怎麼會來工地現場……！？"
2002602-87 = "[s3]「這個嘛……」\n[s4] 說明來龍去脈"
2002602-91 = "啊啊，原來是被人潮擠上了接駁車……"
2002602-92 = "真是抱歉。#n那個公車站是工務部的集合地點。"
2002602-93 = "不過真傷腦筋……現在沒有能夠送老師回去的車。#n離最近的車站也有一定的距離……"
2002602-94 = "[ns]「沒關係，別擔心。」"
2002602-96 = "[ns]「我也想看看大家平時是怎麼工作的。」"
2002602-97 = "……是嗎？#n既然如此，難得有這種機會，老師要不要在現場見習？"
2002602-98 = "作為占用你時間的補償，工作結束後我請你去一間我常去的店吃特大炸豬排丼。"
2002602-99 = "那裡的炸豬排不僅肉很厚，能夠滲入疲累身體的濃郁味噌湯更是一絕。"
2002602-100 = "果然在勞動過後就是要用丼飯填飽肚子才行啊！"
2002602-101 = "啊，對了。在開始見習之前，請一定要戴上這個。"
2002602-108 = "[ns]「……這個是？」"
2002602-109 = "安全帽跟安全帶。#n在工地現場最重要的東西，「一是安全，二也是安全」！"
2002602-110 = "就算奇普托斯的學生再怎麼強健，#n工地現場可是有很多比槍械更危險的東西，所以必須徹底注意安全才行。"
2002602-111 = "還有注意不要隨意靠近危險的地方。#n記得隨時留意腳步，知道了嗎？"
2002602-112 = "[s]「我會銘記在心。」"
2002602-113 = "好！"
2002602-114 = "那麼……開始充實的一天吧！"
2002602-118 = "焊接班！把這裡的護欄焊接好，然後裝上去！"
2002602-124 = "泥作班！拿三包砂漿過來這邊！把夾板的空隙填好！"
2002602-125 = "[s5]「速度真驚人……」\n[s6]「轉眼間就蓋好一層樓了……」"
2002602-128 = "……是嗎？#n今天大家好像都還沒恢復最佳狀態，感覺動作比平常還慢。"
2002602-129 = "[s]「以這個速度，一個禮拜就能蓋好一棟大樓吧。」"
2002602-130 = "很感謝你能這麼說，不過我們經常因為完工慢而被甲方責備呢。"
2002602-131 = "就算工期多少會有所延誤，但在完成度方面我倒是有無人能及的自信……"
2002602-132 = "大家明明都很努力，究竟為什麼會延誤呢……"
2002602-133 = "[s7]「明明已經這麼快了……」\n[s8]「真辛苦呢……」"
2002602-141 = "辛苦了，實里部長。#n這還是第一次直接向你問好吧？"
2002602-142 = "我是委託這次工程的岩漿建設的社長。#n哈哈哈，很高興見到你。"
2002602-143 = "啊啊，你就是這次的委託人嗎。#n謝謝你的委託。"
2002602-144 = "該道謝的是我才對。#n儘管工期有些胡來，你們願意接下真是幫大忙了。"
2002602-145 = "……話說回來，來這裡有什麼事嗎？#n進度都有按照計畫順利進行哦？"
2002602-146 = "現場的安全會由我負責把關，放心吧。"
2002602-147 = "啊～不是那樣的……"
2002602-148 = "其實……我有件事想拜託工務部。"
2002602-149 = "拜託？"
2002602-150 = "那就是，付款的時間與其他工地有所重疊……手上的現金不太夠了……"
2002602-151 = "所以說，當時雖然說好薪資是每日發放，想商量一下能不能改為下個月再……"
2002602-155 = "當然作為彌補，會提高你們的薪資。所以不好意思──"
2002602-157 = "所有人，停止工作！"
2002602-164 = "沒有工資的地方就沒有勞動！"
2002602-165 = "勞動是人們為了生存而做的抗爭！#n所有的勞動都必須獲得相應的價值！"
2002602-166 = "竟敢侮辱如此尊貴的行為……"
2002602-167 = "無法理解勞動價值之人的工作，我們沒打算接！"
2002602-168 = "先，先等等！我可沒說不給錢哦？#n只是希望你們能等到下個月……"
2002602-169 = "這是何等詭辯！#n我們是在雙方同意的基礎上，締結了提供勞動的合約！"
2002602-170 = "合約上沒有寫的勞動，我們一秒都不會提供！"
2002602-171 = "沒錯沒錯！"
2002602-172 = "嘖……真是群麻煩的小鬼頭。"
2002602-173 = "知道了知道了！你們今天就先回去吧。"
2002602-174 = "明天我會準備好日結的薪水……這樣作業就能重新開始了吧？"
2002602-175 = "能準備好錢的話，我們也承諾會提供勞力。"
2002602-176 = "……等等，那今天工作部分的薪水呢？"
2002602-177 = "啊，你剛才沒在聽我說話嗎？#n都說了今天手邊沒錢啊……"
2002602-178 = "真是的，夠了！明天再繼續工作也行！"
2002602-179 = "原來如此……你就是用這種不當對待勞動者得來的利益累積財富的啊。#n可惡的布爾喬亞……"
2002602-180 = "竟敢貶低勞動的價值，想必你已經做好相應的覺悟了吧！"
2002602-181 = "爆破班！把所有黃色炸藥準備好！"
2002602-182 = "黃，黃色炸藥……？#n你，你你你，你們打算做什麼？"
2002602-183 = "難道是要放棄工作嗎……？"
2002602-184 = "我們沒打算放棄。只是不會進行無償的勞動罷了。"
2002602-185 = "既然沒有收到工資……就把這些全都炸了！"
2002602-186 = "等，等等！就算把它們破壞掉，明天不還是要重新蓋回來嗎！"
2002602-187 = "把已經建造完的東西破壞掉不覺得可惜嗎！？"
2002602-188 = "你，你們對自己建造的建築都沒有榮譽感嗎！？"
2002602-189 = "搬出榮譽感當作理由是資本家的慣用手段。"
2002602-195 = "……最後，我再問你一次。#n今天的工資準備好了嗎？"
2002602-196 = "要我說幾次！#n明天就會拿來──"
2002602-202 = "那麼……引爆！"
2002602-208 = "啊啊啊……！"
2002602-211 = "哼……這樣一來，能夠理解勞動價值的人應該又增加了一個吧。#n肚子也有點餓了……"
2002602-212 = "好！今天我請所有人吃特大炸豬排丼！#n大家一起填飽肚子，快快樂樂地回去吧！"
2002602-215 = "哦哦！不愧是部長！"
2002602-216 = "部長，我會一輩子追隨你！"
2002602-218 = "話說回來……我們工務部明明有一群這麼優秀的部員，為什麼總是會延誤工期呢。真不可思議。"
2002602-223 = "（這個問題的答案顯而易見，但還是決定少說幾句……）"
2002602-225 = "（……之後在實里常去的店裡，#n　和工務部的大家一起吃了熱呼呼的豬排丼後回到了夏萊）"

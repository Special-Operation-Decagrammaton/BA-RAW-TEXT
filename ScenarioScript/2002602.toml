[translation]
2002602-1 = "อาคารสร้างขึ้นมาได้อย่างไรกัน?"
2002602-5 = "ป้ายรถบัสนอก D.U."
2002602-6 = "(หลังจากคุณครูทำงานให้ชาเล่ต์จนดึกดื่นก็ได้นั่งรถเที่ยวแรกกลับมาช่วงเช้าตรู่)"
2002602-12 = "(เช้าขนาดนี้ก็ยังมีนักเรียนรออยู่ที่ป้ายรถบัสเยอะมาก...)"
2002602-16 = "[ns] (เขามีงานอะไรกันเหรอ...?)"
2002602-17 = "โห~ เราไม่มีงานมานานเท่าไรแล้วเนี่ย? เดือนนี้อุตส่าห์ยอมแพ้ไปแล้วนะ"
2002602-18 = "กู้ดใหม่ที่รอคอยก็กำลังวางขาย ฉันไม่มีเงินซื้อพอดีเลย... โชคดีที่ยังมีงานเข้ามา"
2002602-19 = "แต่หวังว่างานจะไม่ยากเกินไปนะ~ ฉันยิ่งไม่ชอบขนทรายหรือซีเมนต์อยู่ด้วย"
2002602-20 = "ใช่ๆ เพราะถ้าเป็นงานเดินท่อหรือก่อสร้างภายใน เราจะไม่ต้องใช้แรงเยอะนี่เนอะ..."
2002602-25 = "[ns] รอรถประจำทางเงียบๆ"
2002602-32 = "นั่งร้าน 5 คน... โครงเหล็ก 10 คน!"
2002602-37 = "ฉัน! ฉันทำเอง!"
2002602-38 = "ฉันด้วย... ฉันเอาด้วย!"
2002602-40 = "เอาละๆ รีบขึ้นรถเถอะ เราเหลือเวลาไปไซต์งานไม่มากแล้ว!"
2002602-52 = "[ns] \"ดะ... เดี๋ยวก่อน...\""
2002602-53 = "เฮ้ย คนข้างหน้าน่ะ! อย่ามัวชักช้าอืดอาดสิ รีบขึ้นรถเร็วเข้า!"
2002602-54 = "ใช่! ถ้าคนเต็มแล้วเราพลาดงานวันนี้ขึ้นมา คุณจะรับผิดชอบหรือไง?"
2002602-55 = "[s1] \"คือครูไม่ได้...\"\n[s2] \"แค่กำลังรอรถประจำทางเฉยๆ...\""
2002602-68 = "ขึ้นรถครบแล้วใช่มั้ย? งั้นออกเดินทางเลยนะ!"
2002602-69 = "[ns] \"ดะ... เดี๋ยวก่อนสิ...!\""
2002602-71 = "(คุณครูโดนฝูงชนเบียดจนต้องจำใจขึ้นรถไปด้วย สุดท้ายก็นั่งรถมาที่ไหนก็ไม่รู้...)"
2002602-74 = "อรุณสวัสดิ์ แรงงานของคิโวทอสทุกคน!"
2002602-75 = "ฉันคือผู้ดูแลไซต์ก่อสร้างวันนี้ ยาสึโมริ มิโนริจากสหภาพเรดวินเทอร์!"
2002602-76 = "นานๆ ทีจะมีงานเข้ามานะ เรามาพิสูจน์คุณค่าของแรงงานด้วยการทำงานอย่างเต็มที่กันเถอะ!"
2002602-77 = "แน่นอนว่าค่าแรงและความปลอดภัยคือสิทธิ์ที่แรงงานควรได้รับ! ถ้ารู้สึกว่ามีอะไรผิดปกติแม้จะเป็นจุด#nเล็กๆ น้อยๆ ก็ตาม ขอให้รีบแจ้งสำนักงานภาคสนามทันที!"
2002602-78 = "โอ้!"
2002602-79 = "เอาละ... งั้นก็มาเตรียมช่วยเหลือการทำงานก่อนเลย!"
2002602-80 = "ได้เลย!"
2002602-81 = "ปลอดภัยไว้ก่อน!"
2002602-82 = "เยี่ยม! เยี่ยม! เยี่ยม! "
2002602-83 = "เยี่ยม! งั้นวันนี้ก็มาทำงานกันอย่างปลอดภัยนะ! "
2002602-84 = "[ns] \"เสียงปลุกใจกระหึ่มมากเลย...\""
2002602-85 = "หืม...?"
2002602-86 = "เอ๋? ครู [USERNAME]? มาทำอะไรที่ไซต์ก่อสร้างเนี่ย...?"
2002602-87 = "[s3] \"นั่นน่ะสินะ...\"\n[s4] อธิบายเหตุผลที่มาที่นี่ให้ฟัง"
2002602-91 = "อ๋อ ถูกฝูงชนเบียดเมื่อเช้าเลยจับพลัดจับผลูขึ้นรถมาด้วยอย่างนั้นเหรอ..."
2002602-92 = "ขอโทษนะที่ทำให้ต้องมีส่วนเกี่ยวข้องด้วยโดยที่ไม่ได้ตั้งใจน่ะ ก่อนรถเที่ยวแรกจะมา นักเรียน#nก่อสร้างจะใช้ป้ายรถบัสป้ายนั้นเป็นจุดรวมตัวเพื่อรอรถกันน่ะ"
2002602-93 = "ว่าแต่จะทำยังไงกับเรื่องนี้ดีล่ะ...? ตอนนี้ที่ไซต์งานไม่เหลือรถรับส่งนักเรียนเลยสักคัน สถานีรถไฟที่#nใกล้ที่สุดก็ต้องเดินไกลพอสมควรเลย..."
2002602-94 = "[ns] \"ไม่เป็นไรหรอก ไม่ต้องกังวลนะ\""
2002602-96 = "[ns] \"ครูอยากดูด้วยว่าปกติแล้วทุกคนทำงานกันยังไง\""
2002602-97 = "อย่างนั้นเหรอ...? งั้นครูอยากดูงานในไซต์งานก่อสร้างพร้อมกันมั้ยล่ะ?"
2002602-98 = "มันอาจจะชดเชยที่ทำให้ครูเสียเวลาไม่ได้ แต่ถ้าเสร็จงานแล้วฉันจะเลี้ยงข้าวหน้าหมูทอดแบบพิเศษ#nในร้านเจ้าประจำที่ฉันกินทุกครั้งเมื่อมาแถวนี้ให้เอง"
2002602-99 = "ข้าวหน้าหมูทอดเจ้านั้นให้แกงจืดเยอะมาก แถมให้เนื้อแบบจุกๆ ด้วย เรียกว่าคุณภาพคับถ้วยเลยละ..."
2002602-100 = "หลังจากใช้แรงงานอย่างภาคภูมิใจแล้ว เราต้องกินอาหารที่อิ่มท้องอย่างพวกข้าวหน้าหมูทอดหรือไม่#nก็ข้าวหน้าเนื้อ มันถึงจะรู้สึกว่างานแต่ละวันจบลงแล้วจริงๆ"
2002602-101 = "อ้อ ก่อนจะดูงาน... ใส่อันนี้ก่อนนะ"
2002602-108 = "[ns] \"อันนี้คือ...?\""
2002602-109 = "หมวกนิรภัยแล้วก็เข็มขัดนิรภัยน่ะ สิ่งสำคัญอันดับแรกในไซต์งานคือความปลอดภัย รองลงมาก็ความ#nปลอดภัยอีกเช่นกัน"
2002602-110 = "ต่อให้นักเรียนในคิโวทอสแข็งแกร่งแค่ไหน แต่ว่าที่ไซต์งานก่อสร้างก็ยังมีอุปกรณ์ที่อันตรายกว่าอาวุธ#nปืนอยู่เต็มไปหมด"
2002602-111 = "นอกจากนี้ก็ห้ามเข้าไปใกล้ๆ สิ่งปลูกสร้างที่ดูไม่มั่นคงและต้องคอยระวังเท้าของตัวเองอยู่เสมอด้วย เข้าใจมั้ย?"
2002602-112 = "[s] \"ครูจะจำไว้นะ\""
2002602-113 = "เยี่ยม!"
2002602-114 = "เอาละ งั้น... เรามาเริ่มงานอันน่าภาคภูมิใจของวันนี้กันเลยมั้ย?"
2002602-118 = "ทีมเชื่อม! เชื่อมราวกั้นตรงนี้ให้มั่นคงก่อนค่อยเอาขึ้นนะ!"
2002602-124 = "ทีมโบกปูน! เอามอร์ตาร์มาทางนี้สามกระสอบ! ฉาบใส่ช่องว่างระหว่างไม้อัดให้เรียบร้อย!"
2002602-125 = "[s5] \"ทำเร็วมากเลยนะเนี่ย...\"\n[s6] \"ไม่ทันไรตึกก็สูงขึ้นชั้นหนึ่งแล้ว...\""
2002602-128 = "หืม? อันนี้คือเร็วแล้วเหรอ? ฉันรู้สึกว่าทุกคนยังไม่คล่องมือกันก็เลยทำช้ากว่าปกติซะอีก..."
2002602-129 = "[s] \"ถ้าทำเร็วขนาดนี้ ผ่านไปหนึ่งสัปดาห์คงได้ตึกหนึ่งหลังแน่ๆ\""
2002602-130 = "ก็ไม่ได้เป็นงั้นเสมอไปหรอก ชมรมผู้รับจ้างของเรามักจะถูกผู้ว่าจ้างมองข้ามบ่อยๆ เพราะเรื่องทำเสร็จ#nช้านี่แหละ"
2002602-131 = "พวกเรามั่นใจว่าถึงจะก่อสร้างช้าไปบ้างแต่ก็เป็นที่หนึ่งเรื่องความสมบูรณ์แบบของงาน..."
2002602-132 = "นักเรียนก่อสร้างก็คิดว่าความเร็วการทำงานมันโอเคแล้วนะ แต่ไม่รู้ว่าทำไมถึงสร้างเสร็จช้าตลอดเลย"
2002602-133 = "[s7] \"ผิดคาดนิดหน่อยแฮะ...\"\n[s8] \"นี่ก็ทำเร็วมากแล้วนะ...\""
2002602-141 = "อ้าว หัวหน้ามิโนริ เพิ่งเคยเจอกันจริงๆ เลยมั้ยเนี่ย?"
2002602-142 = "ฉันคือประธานของแมกม่าการก่อสร้าง ผู้มอบงานสร้างตึกรอบนี้ให้พวกเธอ ยินดีที่ได้เจอกันนะ"
2002602-143 = "อ๋อ คุณคือผู้ว่าจ้างงานก่อสร้างรอบนี้เองเหรอ ขอบคุณที่มอบงานดีๆ ให้พวกเราท่ามกลาง#nสถานการณ์แบบนี้นะ"
2002602-144 = "ขอบคุณอะไรกัน เราต่างหากที่ต้องขอบคุณที่พวกเธอมารวมตัวทำงานให้ในเวลาเวลาสั้นๆ แบบนี้"
2002602-145 = "ว่าแต่ทำไมถึงมาที่ไซต์งานด้วยตัวเองล่ะ...? มาดูความเรียบร้อยระหว่างดำเนินงานเหรอ?"
2002602-146 = "มีฉันเป็นผู้รับผิดชอบเรื่องความปลอดภัยทั้งคน ไม่ต้องกังวลไปหรอกนะ"
2002602-147 = "อ๋อ ไม่ใช่เรื่องนั้นหรอก..."
2002602-148 = "ที่จริง... ฉันมีเรื่องอยากขอร้องนักเรียนก่อสร้างสักเรื่องน่ะ"
2002602-149 = "ขอร้องงั้นเหรอ?"
2002602-150 = "คือว่า... จู่ๆ เราก็มีเรื่องที่ต้องใช้เงินอย่างด่วนจี๋เลยน่ะ ตอนนี้พวกเราไม่เหลือเงินติดตัวแล้ว เพราะงั้น..."
2002602-151 = "วันนี้น่าจะจ่ายค่าแรงนักเรียนก่อสร้างไม่ได้แล้วละ..."
2002602-155 = "พรุ่งนี้เราจะให้ค่าแรงเยอะกว่าเดิมนะ วันนี้เลยอยากจะขอให้ทำงานแบบไม่มีค่าแรงไปก่อน..."
2002602-157 = "ทุกคน... หยุดทำงาน!"
2002602-164 = "ที่ไหนไม่มีค่าแรง ที่นั่นไม่มีการใช้แรงงาน!"
2002602-165 = "การใช้แรงงานคือการต่อสู้เพื่อความอยู่รอดโดยกำเนิดของมนุษย์! เพราะแบบนั้นเลยต้องมีการวางเงิน#nชดเชยล่วงหน้าเพื่อความอยู่รอดของแรงงาน!"
2002602-166 = "แต่ไม่คิดเลยนะว่าจะมาเอาเปรียบการต่อสู้อันทรงเกียรตินี้ด้วยคำพูดเสแสร้งเล็กๆ น้อยๆ แบบนี้..."
2002602-167 = "เราทนทำงานกับนายทุนที่ไม่รู้จักคุณค่าของแรงงานไม่ได้หรอกนะ!"
2002602-168 = "เดี๋ยวนะ ฉันพูดตอนไหนว่าฮุบเงินเข้ากระเป๋าตัวเอง ฉันแค่จะเลื่อนจ่ายค่าแรงนิดๆ หน่อยๆ เอง..."
2002602-169 = "ยังจะมาใช้วาทศิลป์อีก! การบริการคือสัญญาที่จะให้บริการแรงงานตามข้อตกลง..."
2002602-170 = "เพราะแบบนั้น มันก็เลยจะไม่มีการให้บริการแรงงานที่ไม่ได้ระบุในสัญญาแม้แต่ 1 นาที 1 วินาที!"
2002602-171 = "ใช่แล้ว พูดถูกเลย!"
2002602-172 = "เหอะ... ทำมาเป็นยึดมั่นในหลักการ"
2002602-173 = "เข้าใจแล้วน่า! ถ้างั้นวันนี้ก็กลับไปกันได้เลย"
2002602-174 = "เดี๋ยวพรุ่งนี้จะเตรียมเงินมาจ่ายให้แล้วกัน... ตั้งแต่พรุ่งนี้คือทำงานได้ใช่มั้ย?"
2002602-175 = "ถ้าเตรียมเงินมาจ่าย เราก็ทำงานให้ได้นะ..."
2002602-176 = "แต่เดี๋ยวก่อน... แล้วค่าแรงของงานช่วงเช้าจนถึงตอนนี้ล่ะ จะทำยังไง?"
2002602-177 = "ไม่เข้าใจที่ฉันพูดเหรอ? ก็บอกว่าวันนี้ไม่มีเงินไง!"
2002602-178 = "เดี๋ยวค่อยมาคุยด้วยพรุ่งนี้!"
2002602-179 = "อ่าฮะ... พวกคุณลดทอนคุณค่าของแรงงานด้วยวิธีนี้เองสินะ? พวกชนชั้นนายทุน..."
2002602-180 = "ถ้าให้วางตัวเป็นแบบอย่างกับเจ้าพวกที่ลดทอนคุณค่าของแรงงานละก็ เราทำได้หมดอยู่แล้ว...!"
2002602-181 = "ทีมระเบิด! เอาไดนาไมต์ที่มีมาให้หมดเลย!"
2002602-182 = "ดะ... ไดนาไมต์...? ธะ... เธอจะทำอะไร?"
2002602-183 = "อย่าบอกนะว่าจะก่อวินาศกรรมเพราะแค้นใจที่ถูกเลื่อนจ่ายค่าแรงน่ะ...?"
2002602-184 = "ก่อวินาศกรรมอะไรกัน พูดแรงไปแล้วนะ เราแค่จะเอาเงินทอนกลับไปด้วยเฉยๆ ก็แค่นั้นเอง"
2002602-185 = "บันไดตึกที่สร้างโดยไม่มีค่าแรงในวันนี้น่ะ... ระเบิดมันทิ้งให้หมดเลย!"
2002602-186 = "เดี๋ยวก่อนสิ! ถึงวันนี้พวกเธอจะทำลายมันไป พรุ่งนี้ก็ต้องมาสร้างใหม่อยู่ดีนะ!"
2002602-187 = "ทำลายน้ำพักน้ำแรงของตัวเองแล้วสร้างขึ้นมาใหม่แบบนั้น พวกเธอไม่เสียดายกันหรือไง?"
2002602-188 = "พวกเธอไม่มีศักดิ์ศรีของความเป็นนักออกแบบสถาปัตยกรรมกันเลยเหรอ?!"
2002602-189 = "ศิลปะน่ะ ถูกความมั่งคั่งครอบงำมาแต่ไหนแต่ไรแล้ว"
2002602-195 = "เอาละ... จะขอถามอีกครั้งนะ เตรียมค่าแรงของวันนี้ไว้แล้วหรือยัง?"
2002602-196 = "เมื่อกี้ก็บอกไปแล้วไง! ว่าวันนี้ไม่ได้เอาเงินติดตัวมาด้วย..."
2002602-202 = "ถ้าอย่างนั้นก็... ระเบิดเลย!"
2002602-208 = "โธ่เอ๊ย...!"
2002602-211 = "ฮุฮุ... วันนี้ก็ได้พิสูจน์คุณค่าของแรงงานอย่างภาคภูมิใจแล้ว เริ่มหิวขึ้นมาแล้วสิ"
2002602-212 = "รู้สึกดีมากๆ เลยแฮะ! วันนี้ฉันจะเลี้ยงข้าวหน้าหมูทอดแบบพิเศษให้ทุกคนเลย กินให้อิ่มแล้วค่อยกลับ#nกันนะ!"
2002602-215 = "ว้าว! สมกับเป็นหัวหน้าจริงๆ!"
2002602-216 = "ถ้าเป็นงานก่อสร้างจากคำสั่งของหัวหน้าละก็ พวกเราจะทำตามไปตลอดชีวิตเลย!"
2002602-218 = "จะว่าไปแล้ว... ทำไมงานก่อสร้างที่ชมรมผู้รับจ้างดำเนินการถึงได้เสร็จช้าตลอดเลยล่ะ? ไม่เข้าใจเลยจริงๆ"
2002602-223 = "(คุณครูเหมือนพอจะรู้คำตอบของปัญหานั้นแล้ว แต่ก็เลือกที่จะไม่พูดอะไรออกไป...)"
2002602-225 = "(จากนั้นคุณครูก็กินข้าวหน้าหมูทอดร้อนๆ พร้อมกับนักเรียนชมรมผู้รับจ้างที่ร้านแนะนำของมิโนริ แล้วค่อยกลับมายังชาเล่ต์...)"

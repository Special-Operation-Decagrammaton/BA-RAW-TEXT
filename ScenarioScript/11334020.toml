[translation]
11334020-1 = "#Y-02"
11334020-3 = "ฉันไปเสิร์ชหาวิธีดีดกีตาร์ในอินเทอร์เน็ตมา แล้วก็เจออะไรแปลกๆ อย่างการ <เล่นกีตาร์ด้วยฟัน> ด้วยละ"
11334020-4 = "ยะ... โยชิมิจัง...? จะ... จะทำตามเหรอ...?"
11334020-5 = "จะบ้ารึไง? ฉันไม่ใช่นัตสึนะ เห็นว่าแปลกดีก็เลยเอามาเล่าให้ฟังน่ะ"
11334020-7 = "ฉันไม่ใช่คนแบบนั้นนะ"
11334020-8 = "คิดว่าใช่ซะอีก..."
11334020-9 = "......"

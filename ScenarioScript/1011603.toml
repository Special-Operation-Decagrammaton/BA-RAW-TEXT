[translation]
1011603-1 = "The Lesson of the Two"
1011603-2 = "I arrived at the address Saori sent me and found a dazzling studio."
1011603-6 = "Sensei. This way."
1011603-7 = "[s1] \"So this is the studio?\"\n[s2] \"What a cool place!\""
1011603-10 = "They told me I'm free to use it since there are no shoots today."
1011603-11 = "So...please."
1011603-12 = "Teach me how to dance."
1011603-13 = "Dancing with a partner... I have no idea. I've never danced before."
1011603-14 = "[s] \"Oh, so I'm your first partner?\""
1011603-18 = "Yes."
1011603-19 = "You are my first..."
1011603-23 = "Right. I'm grateful to have such a...trustworthy partner."
1011603-24 = "So please lead me...gently."
1011603-25 = "[s] \"O-Of course...!\""
1011603-26 = "Hm? What's wrong? Are you nervous, Sensei?"
1011603-27 = "...I see. Honestly, I'm a bit anxious as well."
1011603-28 = "This is such a big room..."
1011603-29 = "And yet we're standing so close that we can feel each other's breaths."
1011603-30 = "[s] \"E-Enough talking! Let's get dancing!\""
1011603-31 = "...Perhaps that was too intimate. Is this also a new experience for you?"
1011603-32 = "But you were the only one I could ask for help."
1011603-33 = "...I would also like for you to be my partner for the shoot. Would that be acceptable?"
1011603-34 = "Ah, feel free to refuse. I know I'm asking for too much."
1011603-35 = "[s3] \"Not at all! Please let me!\"\n[s4] \"I was going to ask YOU first!\""
1011603-38 = "...Understood. Thank you, Sensei."
1011603-39 = "Now that we're committed, let's begin."
1011603-40 = "...Hm, but how do you begin a dance?"
1011603-41 = "Hm? With a greeting? A polite bow?"
1011603-42 = "I see. Very well. I'll learn."
1011603-44 = "A greeting for Sensei...no, my partner."
1011603-49 = "― [log=사오리 드레스 비무장]L-Like this...?[/log][wa:3620] "
1011603-52 = "― [log=사오리 드레스 비무장]If you say so... But this is a bit...[/log][wa:3610] "
1011603-53 = "― [log=사오리 드레스 비무장]Normally, I would never pose like this.[/log][wa:4450] "
1011603-56 = "― [log=사오리 드레스 비무장]I feel a bit uneasy when both my hands aren't free.[/log][wa:3120] "
1011603-57 = "― [log=사오리 드레스 비무장]It would be quite difficult if one didn't trust their partner.[/log][wa:4710] "
1011603-60 = "― [log=사오리 드레스 비무장]Could it be...that we curtsy this way to prove that?[/log][wa:4160] "
1011603-63 = "― [log=사오리 드레스 비무장]In that case...I'll hold this pose until you are satisfied.[/log][wa:3660] "
1011603-66 = "― [log=사오리 드레스 비무장]This is...proof of my trust.[/log][wa:3310] "
1011603-70 = "So curtsies carry deeper meaning than I assumed. That's a valuable lesson."
1011603-71 = "Hm? Why are you smiling? Did I misunderstand?"
1011603-72 = "...Anyway, let's move on to the next step."
1011603-73 = "Next is...holding each other's hands?"
1011603-77 = "G-Got it! I'm ready! Whenever you want, Sensei!"
1011603-78 = "[s] \"Let's go, Saori!\""
1011603-83 = "We're just holding hands... So why am I trembling?"
1011603-88 = "...I've seen this before, from a distance, while working security at a party."
1011603-89 = "I never thought I'd do it myself."
1011603-90 = "...It's all thanks to you."
1011603-91 = "Until now, all I knew was combat..."
1011603-95 = "Ah..."
1011603-96 = "...Right. So that's what the tremble was..."
1011603-97 = "It was because we drew closer before I realized."
1011603-98 = "I still have much to learn, but at least I have your support, Sen..."
1011603-103 = "W-Wait! Why are you touching my waist?"
1011603-104 = "I-I'm not ready for this yet...!"
1011603-108 = "Ah... I-Is that so? It's for the dance? My apologies."
1011603-109 = "I may be overthinking this."
1011603-110 = "So now... I put my hand on your shoulder?"
1011603-111 = "*inhale* Very well."
1011603-112 = "L-Let's go, Sensei!"
1011603-114 = "I diligently practiced dancing with Saori."

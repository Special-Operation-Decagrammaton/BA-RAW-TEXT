[translation]
1011603-1 = "บทเรียนสำหรับสองคน"
1011603-2 = "(สถานที่ที่ซาโอริบอกคือสถานที่ถ่ายทำที่หรูหรา)"
1011603-6 = "ครู ทางนี้"
1011603-7 = "[s1] \"นี่คือสถานที่ถ่ายทำสินะ?\"\n[s2] \"เป็นที่ถ่ายทำที่ยอดเยี่ยมไปเลยนะ!\""
1011603-10 = "วันนี้ไม่มีการถ่ายทำ แต่ฉันก็มาใช้งานได้น่ะ"
1011603-11 = "เพราะงั้นก็... รบกวนหน่อยนะ"
1011603-12 = "ช่วยสอนฉันเต้นรำหน่อยได้มั้ย?"
1011603-13 = "มันเป็นการเต้นรำกับคู่น่ะ... แล้วฉันก็ไม่รู้อะไรเลย ไม่เคยลองเต้นมาก่อนด้วย"
1011603-14 = "[s] \"โอ้ว งั้นครูก็จะได้เป็นคู่เต้นคนแรกของซาโอริสินะ?\""
1011603-18 = "จะว่าอย่างนั้นก็ได้"
1011603-19 = "ครั้งแรกของฉันก็คือกับครูงั้นเหรอ..."
1011603-23 = "อืม ค่อยยังชั่วที่คู่เต้นคนแรกคือผู้ใหญ่ที่เชื่อถือได้อย่างครู"
1011603-24 = "งั้นก็นำฉันเต้นอย่างอ่อนโยนด้วยนะ"
1011603-25 = "[s] \"ดะ... ได้แน่นอนอยู่แล้ว...!\""
1011603-26 = "หืม? มีอะไรเหรอ? หรือว่าครูก็ประหม่าเหมือนกัน?"
1011603-27 = "งั้นสินะ... บอกตามตรงว่าฉันก็ประหม่าอยู่นิดหน่อย"
1011603-28 = "ห้องนี้มันก็ตั้งกว้าง..."
1011603-29 = "แต่ก็ต้องมาอยู่ใกล้ชิดกันจนสัมผัสได้ถึงลมหายใจของกันและกัน..."
1011603-30 = "[s] \"ละ... เลิกพูดแล้วมาเริ่มซ้อมเต้นรำดีกว่า!\""
1011603-31 = "ดูจากที่ครูหลีกเลี่ยงการสนทนาแล้ว ครูเองก็คงไม่ชินกับสถานการณ์แบบนี้สินะ..."
1011603-32 = "แต่นอกจากครูแล้ว ฉันก็ไม่รู้จะไปขอร้องใครน่ะ"
1011603-33 = "ถ้าครูไม่ว่าอะไร ตอนถ่ายทำฉันอยากขอให้ครูมาเป็นคู่เต้นให้หน่อย... จะได้มั้ย?"
1011603-34 = "อ้อ ถ้าอึดอัด จะปฏิเสธก็ได้นะ ฉันพอเข้าใจน่ะว่ามันเป็นการขอร้องที่มากไปหน่อย"
1011603-35 = "[s3] \"ไม่เลย ขอให้ครูได้เป็นคู่เต้นเถอะนะ!\"\n[s4] \"ไม่เลย ครูว่าจะขอเป็นคู่เต้นอยู่แล้วด้วย!\""
1011603-38 = "งั้นเหรอ... ขอบคุณนะครู"
1011603-39 = "งั้นถ้าเราพร้อมกันแล้ว ก็มาเริ่มกันเถอะ"
1011603-40 = "เออ ว่าแต่การเต้นรำนี่มันเริ่มยังไงนะ...?"
1011603-41 = "หืม? เริ่มจากการทักทาย? การเต้นรำต้องเริ่มจากการทักทายคู่เต้นก่อนงั้นเหรอ?"
1011603-42 = "งั้นสินะ เข้าใจแล้ว ฉันจะเรียนรู้ไว้นะ"
1011603-44 = "ทักทายครู... ไม่สิ คู่เต้นของฉัน"
1011603-49 = "― [log=사오리 드레스 비무장]ทะ... ทำแบบนี้ได้อยู่มั้ย...?[/log][wa:3060] "
1011603-52 = "― [log=사오리 드레스 비무장]ถ้าครูว่าอย่างนั้นละก็... แต่ว่า... นี่มันค่อนข้างจะ...[/log][wa:2890] "
1011603-53 = "― [log=사오리 드레스 비무장]ถ้าเป็นปกติ ฉันไม่ทำท่าทางแบบนี้เด็ดขาด[/log][wa:4450] "
1011603-56 = "― [log=사오리 드레스 비무장]พอมือทั้งสองข้างไม่เป็นอิสระ มันก็อึดอัดนิดหน่อยนะ[/log][wa:3160] "
1011603-57 = "― [log=사오리 드레스 비무장]ถ้าไม่เชื่อใจคู่เต้น ก็คงยากละนะ[/log][wa:5910] "
1011603-60 = "― [log=사오리 드레스 비무장]หรือว่านี่จะเป็น... การทักทายเพื่อพิสูจน์สิ่งนั้นน่ะ?[/log][wa:4120] "
1011603-63 = "― [log=사오리 드레스 비무장]ถ้างั้น... ฉันจะอยู่ในท่านี้ จนกว่าครูจะพอใจเลย[/log][wa:4140] "
1011603-66 = "― [log=사오리 드레스 비무장]นี่คือ... หลักฐานของความเชื่อใจของฉันน่ะ[/log][wa:2830] "
1011603-70 = "การทักทายก็มีความหมายที่ลึกซึ้งได้กว่าที่คิดอีกนะ เป็นสิ่งดีๆ ที่ฉันได้เรียนรู้เลยละ"
1011603-71 = "หืม? รอยยิ้มแปลกๆ นั่นมันอะไรกัน? หรือว่าฉันเข้าใจอะไรผิดไป?"
1011603-72 = "เอาเถอะ... ไปที่สเต็ปต่อไปดีกว่า"
1011603-73 = "ต่อไปคือ... การจับมือกันงั้นเหรอ?"
1011603-77 = "ดะ... ได้สิ! ฉันเตรียมพร้อมมาจากบ้านแล้ว! เข้ามาเลย ครู!"
1011603-78 = "[s] \"งั้นครูจะเริ่มละนะ! ซาโอริ!\""
1011603-83 = "เราแค่ยืนใกล้ๆ แล้วจับมือกันเท่านั้นเอง... แต่ทำไมถึงสั่นแบบนี้ล่ะ?"
1011603-88 = "จะว่าไป เหมือนฉันเคยเห็นการเต้นที่ต้องจับมือกันแบบนี้ตอนไปทำงานบอดี้การ์ดในงานปาร์ตี้เลย"
1011603-89 = "ไม่คิดเลยนะว่าตัวเองจะได้มาเต้นจริงๆ"
1011603-90 = "ต้องขอบคุณครูเลยนะ..."
1011603-91 = "ที่สอนให้ฉันที่รู้แต่เรื่องต่อสู้ได้ลองทำอะไรหลายๆ อย่างแบบนี้"
1011603-95 = "อ่า..."
1011603-96 = "อืม... เป็นอย่างนั้นสินะ ที่จู่ๆ ฉันตัวสั่นเมื่อกี้..."
1011603-97 = "น่าจะเป็นเพราะระยะระหว่างฉันกับครู... ที่มันลดลงเรื่อยๆ"
1011603-98 = "ถึงฉันจะยังบกพร่อง แต่ต่อไปฉันก็รบกวนด้วยนะ ครู..."
1011603-103 = "ดะ... เดี๋ยว! ทำไมจู่ๆ ก็เอามือมาวางบนเอวฉันล่ะ?"
1011603-104 = "ฉะ... ฉันยังไม่ทันได้เตรียมใจเลย...!"
1011603-108 = "อ่า... งะ... งั้นเหรอ? มันเป็นส่วนหนึ่งของการเต้นรำนี่เอง? ขอโทษที่เข้าใจผิดนะ"
1011603-109 = "ฉันน่าจะคิดอะไรมากไปโดยไม่รู้ตัวน่ะ"
1011603-110 = "ตอนนี้ให้ฉัน... เอามือวางบนไหล่ของครูงั้นเหรอ?"
1011603-111 = "ฮู่ว... เข้าใจแล้ว"
1011603-112 = "งะ... งั้นจะทำอย่างที่ว่าละนะ! ครู...!"
1011603-114 = "(หลังจากนั้นคุณครูก็ซ้อมเต้นรำกับซาโอริอย่างขะมักเขม้น)"

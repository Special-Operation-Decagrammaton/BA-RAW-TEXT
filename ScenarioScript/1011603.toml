[translation]
1011603-1 = "兩人的課程"
1011603-2 = "（到達沙織給的地址後，眼前是一座華麗的攝影棚）"
1011603-6 = "老師，這邊。"
1011603-7 = "[s1]「這裡是攝影棚嗎？」\n[s2]「好棒的地方！」"
1011603-10 = "今天沒有人預約，可以自由使用。"
1011603-11 = "所以……我想拜託老師一件事。"
1011603-12 = "希望老師教我跳舞。"
1011603-13 = "雙人舞之類的東西……我完全不懂，也從來沒跳過。"
1011603-14 = "[s]「也就是說，我是沙織的第一個舞伴囉？」"
1011603-18 = "是啊。"
1011603-19 = "我的第一個舞伴是老師嗎……"
1011603-23 = "有老師這麼可靠的大人當我的第一個舞伴，真是太好了。"
1011603-24 = "所以，請溫柔地引導我吧。"
1011603-25 = "[s]「當，當然……！」"
1011603-26 = "嗯？怎麼了，老師覺得緊張嗎？"
1011603-27 = "……這樣啊。#n老實說，我也有點緊張。"
1011603-28 = "在這麼寬敞的房間裡……"
1011603-29 = "近到能感受到彼此的氣息……"
1011603-30 = "[s]「先，先別說這些了，我們趕快開始跳舞吧！」"
1011603-31 = "……看你急著轉移話題的樣子，原來老師也不習慣這種場合啊。"
1011603-32 = "可是在我腦海裡，能拜託的人好像就只有老師你而已。"
1011603-33 = "如果老師不介意的話，我想請老師在正式攝影時也擔任我的舞伴。"
1011603-34 = "啊，如果有壓力的話，要拒絕也沒關係。#n我也知道這種要求很強人所難。"
1011603-35 = "[s3]「不！請交給我吧！」\n[s4]「我正想主動提議呢！」"
1011603-38 = "……嗯。謝謝你，老師。"
1011603-39 = "那麼既然已經確認了彼此的決心，我們就開始吧。"
1011603-40 = "……唔嗯，不過該從哪裡開始呢？"
1011603-41 = "嗯？跳舞要從向舞伴行禮開始？"
1011603-42 = "原來如此，我知道了。#n我會努力學習。"
1011603-44 = "向老師……不，向舞伴的行禮。"
1011603-49 = "― [log=사오리 드레스 비무장]這，這樣就行了嗎……？[/log][wa:3780] "
1011603-52 = "― [log=사오리 드레스 비무장]既然老師都這麼說了……但是，這還是有點……[/log][wa:4250] "
1011603-53 = "― [log=사오리 드레스 비무장]這是平常，我絕對不會擺出的姿勢。[/log][wa:5370] "
1011603-56 = "― [log=사오리 드레스 비무장]雙手都被占用，讓人有點不安。[/log][wa:4600] "
1011603-57 = "― [log=사오리 드레스 비무장]不信任搭擋的話很難做到。[/log][wa:6710] "
1011603-60 = "― [log=사오리 드레스 비무장]難道這……就是表明這點的問候，是嗎？[/log][wa:5520] "
1011603-63 = "― [log=사오리 드레스 비무장]既然如此……在老師滿意之前，我就維持這樣吧。[/log][wa:5140] "
1011603-66 = "― [log=사오리 드레스 비무장]這就是……我信賴的證明。[/log][wa:3950] "
1011603-70 = "原來行禮也有這麼深刻的意義啊。#n我又學到了一課。"
1011603-71 = "嗯？為什麼要露出那種微妙的笑容？#n是我誤會了什麼嗎？"
1011603-72 = "……總之先進入下一個階段吧。"
1011603-73 = "接下來……要牽起彼此的手？"
1011603-77 = "我，我已經準備好了，隨時可以開始！#n來吧，老師！"
1011603-78 = "[s]「我要上囉！沙織！」"
1011603-83 = "明明只是靠近牽著手而已……為什麼我在顫抖呢？"
1011603-88 = "這麼說來，以前在宴會場負責保全工作的時候，也見過別人手牽手跳舞的樣子。"
1011603-89 = "沒想到我也能親身體驗啊。"
1011603-90 = "……這一切都要感謝老師。"
1011603-91 = "滿腦子只知道戰鬥的我，竟然能有這麼豐富的經驗。"
1011603-95 = "啊……"
1011603-96 = "……原來如此。#n剛才突然顫抖的原因……"
1011603-97 = "是因為在不知不覺間與老師拉近了距離嗎。"
1011603-98 = "雖然我仍有許多不足，今後還請老師多多指──"
1011603-103 = "等，等等！為什麼突然把手放在我的腰上？"
1011603-104 = "我，我還沒做好心理準備……！"
1011603-108 = "啊……是，是跳舞的動作嗎？#n抱歉，是我誤會了。"
1011603-109 = "看來是我不自覺想太多了。"
1011603-110 = "現在我……要把手放在老師的肩膀上嗎？"
1011603-111 = "呼……我知道了。"
1011603-112 = "要，要上囉！老師……！"
1011603-114 = "（之後繼續和沙織一起認真練習跳舞）"

[translation]
2600015-1 = "Someone's Responsibility"
2600015-2 = "I went out to take a casual stroll."
2600015-3 = "Hmm? Sensei?"
2600015-4 = "Fancy running into you here..."
2600015-8 = "[ns1] \"That sounds like... Oh, wow!\"\n[ns2] \"Chinatsu? It's Chinatsu!!\""
2600015-11 = "Y-Yes. It's me."
2600015-12 = "What a grandiose reaction. I appreciate it."
2600015-13 = "But I wouldn't have expected to see you here in the street so soon. Perhaps you took my message too seriously..."
2600015-14 = "...Ah."
2600015-15 = "Well, don't mistake my meaning, I..."
2600015-16 = "...Pardon?"
2600015-17 = "Am I not on my day off? Yes, I am. Just as I told you."
2600015-18 = "...My bag?"
2600015-23 = "Ah, this, you mean."
2600015-24 = "[s3] \"Even on your day off, you've got a full bag.\"\n[s4] \"It's a medicine bag. Do you expect to use it today?\""
2600015-27 = "Ah. So that's what you meant. My apologies. Perhaps I didn't explain well enough."
2600015-28 = "I have a day off from the Prefect Team specifically. I was planning to use it to visit the Medical Emergency Club."
2600015-29 = "Not that I think they're in dire straits, but they are always busy, so I'm sure they could use an extra hand."
2600015-30 = "[s5] \"Did they call you about that?\"\n[s6] \"So you're going to them on your own.\""
2600015-33 = "Well, I don't know if you remember, but I started out with the Medical Emergency Club."
2600015-34 = "Ever since then, I've carried this bag...and the knowledge of all the procedures I learned."
2600015-35 = "Their president, and the others, are..."
2600015-39 = "...well, they're all rather odd, but their skills are unquestionable."
2600015-40 = "[s7] \"So the whole club is like that, huh?\"\n[s8] \"That must've been rough on you.\""
2600015-43 = "Fufu. I never found them particularly hard to deal with."
2600015-44 = "And we all help each other with the work."
2600015-45 = "...Pardon?"
2600015-46 = "You want to ask me something?"
2600015-47 = "Hm... What could you want to know? I can guess, given the circumstances, but..."
2600015-48 = "...please feel free to ask. I'll answer to the best of my ability."
2600015-49 = "[s9] \"What made you join the Prefect Team, Chinatsu?\"\n[s10] \"Is there a reason why you changed clubs?\""
2600015-52 = "I guessed right. Fufu."
2600015-53 = "Well, no worries, I can answer that easily enough."
2600015-54 = "You're not the first one to ask me, you know."
2600015-55 = "To put it simply...let's say..."
2600015-56 = "...someone had to."
2600015-57 = "To be honest about it, I couldn't leave them the way they were."
2600015-58 = "[s11] \"Someone had to?\"\n[s12] \"You couldn't leave them...?\""
2600015-61 = "...That's right."
2600015-62 = "The Prefect Team and the Medical Emergency Club may be on good terms, but they're not the same organization."
2600015-63 = "The two presidents are on good terms as well, but there's no chain of command between them."
2600015-64 = "That said, the Prefect Team's work often results in casualties."
2600015-65 = "The Medical Emergency Club always deploys whenever that happens, of course, but the response can't always be immediate."
2600015-66 = "When I was with the Medical Emergency Club, I saw all that firsthand."
2600015-67 = "And I thought, \"The Prefect Team should have someone there who can handle medical responses right away.\""
2600015-68 = "Of course, neither of the two presidents are particularly flexible, so any talk of reorganization soon died in committee."
2600015-69 = "I'm sure everyone had their reasons, of course. Both presidents know the way things are."
2600015-70 = "But the only remaining option...was to be that \"someone\" myself."
2600015-71 = "And that's how I came to be where I am. Does that answer your question?"
2600015-72 = "Honestly, I don't mean to flatter myself, but the Prefect Team's resilience on the front line has improved since I transferred over..."
2600015-73 = "...or so the Head Prefect has said. I'm sure it's true. She makes it a point to speak objectively, after all."
2600015-77 = "[ns13] \"You really are amazing, Chinatsu.\"\n[ns14] \"This is one of the reasons why everyone loves you.\""
2600015-80 = "I-I swear I wasn't fishing for compliments when I brought this up."
2600015-81 = "But anyway, for that reason, I sometimes check in with the Medical Emergency Club."
2600015-82 = "And that's where I happen to be going right now."
2600015-83 = "...Um..."
2600015-84 = "So...what are you up to today, Sensei? From the message earlier, I'm sure today was..."
2600015-85 = "...Yes?"
2600015-86 = "You have business at the Medical Emergency Club too?"
2600015-87 = "...All of a sudden?"
2600015-88 = "Did...something JUST come up?"
2600015-89 = "[s] \"Well, maybe.\""
2600015-93 = "[ns] \"I also have a few things I can't leave alone.\""
2600015-97 = "Hah. You're hopeless, Sensei."
2600015-98 = "What can I say?"
2600015-99 = "Well...fine. Many hands make light work, right? I'm sure the Medical Emergency Club will agree."
2600015-100 = "Once again, I feel like I'm in your debt."
2600015-101 = "So with that in mind..."
2600015-102 = "...since you're visiting us this time, well..."
2600015-103 = "...on my next day off...why don't I..."
2600015-104 = "...go to Schale and help you?"
2600015-106 = "Afterwards, I visited the Medical Emergency Club with Chinatsu and helped with various tasks."
2600015-107 = "Everyone there welcomed Chinatsu as a good friend."

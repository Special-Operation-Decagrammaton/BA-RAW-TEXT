[translation]
2600015-1 = "เรื่องที่บางคนต้องทำ"
2600015-2 = "(คุณครูใช้เวลาสำรวจรอบๆ ครู่หนึ่ง)"
2600015-3 = "...? เอ๊ะ คุณครู?"
2600015-4 = "บังเอิญจังเลยนะคะที่เจอกันที่นี่..."
2600015-8 = "[ns1] \"เสียงนี้มัน...! โชคเข้าข้างแล้ว!!\"\n[ns2] \"ชินัตสึ? ชินัตสึนี่นา!!\""
2600015-11 = "ชะ... ใช่ค่ะ ฉันเองค่ะ"
2600015-12 = "รีแอคชั่นใหญ่เหมือนเดิมเลยนะคะ ถึงมันจะเป็นสิ่งที่น่าชื่นชมก็เถอะค่ะ..."
2600015-13 = "นึกไม่ถึงเลยนะคะว่าจะได้มาเจอคุณครูแบบนี้ ทั้งที่ไม่ได้ส่งข้อความไปนัดเลย..."
2600015-14 = "อ๊ะ..."
2600015-15 = "เอ่อ... ฉันไม่ได้สื่อในทางที่ไม่ดีนะคะ แค่มัน..."
2600015-16 = "คะ...?"
2600015-17 = "ถามว่าวันนี้เป็นวันหยุดของฉันหรือเปล่าน่ะเหรอคะ? ค่ะ... วันนี้เป็นวันหยุดของฉันเหมือนที่บอกไป#nเมื่อเช้าค่ะ"
2600015-18 = "กระเป๋า...?"
2600015-23 = "อ่า หมายถึงนี่สินะคะ"
2600015-24 = "[s3] \"ถึงจะเป็นวันหยุด แต่ก็พกของเต็มกระเป๋าเลยนะ\"\n[s4] \"นั่นกระเป๋ายานี่นา วันนี้มีเรื่องต้องใช้ด้วยเหรอ?\""
2600015-27 = "อ่า หมายถึงเรื่องนั้นเองสินะคะ ขอโทษด้วยนะคะ ฉันอาจอธิบายได้ไม่ดีเท่าไร"
2600015-28 = "ที่บอกว่าเป็นวันหยุดหมายถึงวันหยุดของคณะกรรมการวินัยค่ะ พอมีเวลาว่าง ฉันเลยว่าจะแวะไปที่#nหน่วยแพทย์ฉุกเฉินสักหน่อย"
2600015-29 = "ต่อให้ไม่ได้มีเรื่องอะไรเป็นพิเศษ... แต่ที่หน่วยแพทย์ฉุกเฉินก็งานยุ่งเหมือนกับที่คณะกรรมการวินัย ก็เลยอาจจะมีงานบางอย่างที่ฉันช่วยได้น่ะค่ะ"
2600015-30 = "[s5] \"หน่วยแพทย์ฉุกเฉินเรียกตัวไปเหรอ?\"\n[s6] \"ชินัตสึไปด้วยตัวเองสินะ\""
2600015-33 = "ใช่ค่ะ ไม่แน่ใจว่าคุณครูยังจำได้รึเปล่า แต่ว่าเดิมทีแล้วฉันเป็นสมาชิกของหน่วยแพทย์ฉุกเฉินค่ะ"
2600015-34 = "กระเป๋าใบนี้เองก็เป็นใบที่ฉันใช้มาตั้งแต่ตอนนั้นแล้ว... และก็ยังได้เรียนรู้เทคนิคการปฐมพยาบาล#nจากที่นั่นเยอะมากเลยค่ะ"
2600015-35 = "ทั้งหัวหน้าและคนอื่นๆ เอง..."
2600015-39 = "ถึงอาจจะเป็นคนแปลกๆ อยู่สักหน่อย แต่ฝีมือของพวกเขาก็เป็นของจริงค่ะ"
2600015-40 = "[s7] \"เป็นแบบนั้นกันทั้งหน่วยเลยสินะ...\"\n[s8] \"คงเหนื่อยแย่เลยนะ\""
2600015-43 = "ฮุฮุ ก็ไม่ได้เหนื่อยอะไรขนาดนั้นหรอกค่ะ"
2600015-44 = "ถึงงานของทางคณะกรรมการวินัย แต่งานของหน่วยแพทย์ก็คงเรียกว่าน้อยไม่ได้ค่ะ"
2600015-45 = "คะ...?"
2600015-46 = "มีเรื่องที่อยากถามอยู่ จะขอถามได้รึเปล่างั้นเหรอคะ?"
2600015-47 = "อืม... เรื่องอะไรเหรอคะ? ถึงฉันจะพอเดาคร่าวๆ ได้ว่าคุณครูจะถามอะไรก็เถอะค่ะ..."
2600015-48 = "ถามมาได้เลยนะคะ ฉันยินดีตอบค่ะ แต่ถ้าเป็นคำถามที่ตอบไม่ได้ ฉันก็จะบอกว่าตอบไม่ได้ค่ะ"
2600015-49 = "[s9] \"ทำไมชินัตสึถึงย้ายมาที่คณะกรรมการวินัยเหรอ?\"\n[s10] \"ทำไมถึงย้ายชมรมเหรอ?\""
2600015-52 = "คิดแล้วเชียวว่าต้องถามเรื่องนี้ ฮุฮุ"
2600015-53 = "อ๊ะ ไม่เป็นไรค่ะ เรื่องนี้ฉันตอบได้ค่ะ แล้วคำตอบมันก็ไม่ได้เป็นเรื่องใหญ่อะไรด้วย"
2600015-54 = "อันที่จริงเรื่องนี้นอกจากคุณครูแล้วก็มีหลายๆ คนเคยถามอยู่เหมือนกันค่ะ"
2600015-55 = "ถ้าให้สรุปง่ายๆ เลยก็คือ..."
2600015-56 = "จะเรียกว่ามันเป็นงานที่ใครสักคนต้องทำน่ะค่ะ"
2600015-57 = "พูดตามตรงแล้ว ฉันรู้สึกว่ามันเป็นเรื่องที่ \"ปล่อยไว้ไม่ได้\" มากกว่าค่ะ..."
2600015-58 = "[s11] \"งานที่ใครสักคนต้องทำ?\"\n[s12] \"ปล่อยไว้ไม่ได้...?\""
2600015-61 = "ค่ะ..."
2600015-62 = "คณะกรรมการวินัยและหน่วยแพทย์ฉุกเฉินเป็นชมรมที่มีความสัมพันธ์ที่ดีต่อกันค่ะ แต่ทั้งสองชมรมก็#nไม่ใช่ชมรมเดียวกัน"
2600015-63 = "ถึงหัวหน้าชมรมจะมีความสัมพันธ์ที่ดีต่อกัน แต่ถึงอย่างนั้นทั้งคู่ก็ไม่ได้อยู่ในสถานะที่จะออกคำสั่งซึ่ง#nกันและกันได้ "
2600015-64 = "แต่ว่าสมาชิกคณะกรรมการวินัยก็มักจะมีอาการบาดเจ็บจากการทำงานอยู่บ่อยๆ และงานของพวกเธอ#nก็มักทำให้มีผู้บาดเจ็บด้วย"
2600015-65 = "ถึงทางหน่วยแพทย์ฉุกเฉินจะเข้าไปปฏิบัติงานทุกครั้ง แต่บางครั้งก็ยากที่จะเข้าไปปฏิบัติงานได้ทันที"
2600015-66 = "เรื่องพวกนี้ฉันเจอมาด้วยตัวเองอยู่หลายครั้งหลังสมัครเข้าหน่วยแพทย์ฉุกเฉินค่ะ"
2600015-67 = "และมีบางคนบอกว่าถ้าทางคณะกรรมการวินัยมมีคนที่สามารถลงมือช่วยเหลือได้อย่างรวดเร็ว นอกจากรอหน่วยแพทย์ฉุกเฉินอย่างเดียวก็คงจะดี..."
2600015-68 = "แต่อย่างที่คุณครูทราบดี หัวหน้าทั้งสองคนของเราไม่ได้มีนิสัยยืดหยุ่นมากขนาดนั้น พวกเธอก็เลย#nปฏิเสธเรื่องการปรับปรุงโครงสร้างมาโดยตลอด"
2600015-69 = "ฉันคิดว่าพวกเธอก็คงมีเหตุผลหลายๆ อย่างค่ะ ไม่ใช่ว่าจะไม่รู้สถานการณ์หรอกค่ะ"
2600015-70 = "เพราะงั้นวิธีที่เหลืออยู่... ก็คือการที่ฉันย้ายตัวเองไปค่ะ"
2600015-71 = "ค่ะ เพราะงั้นเลยกลายมาเป็นแบบนี้ค่ะ เท่านี้น่าจะตอบคำถามของคุณครูได้แล้วใช่มั้ยคะ?"
2600015-72 = "มันค่อนข้างน่าอายอยู่บ้าง เพราะพูดแบบนี้ก็คงเหมือนฉันยกยอตัวเอง แต่ก็เป็นเรื่องจริงนะคะ#nที่หลังจากฉันย้ายมาที่คณะกรรมการวินัยแล้ว การปฐมพยาบาลสมาชิกแนวหน้าก็มีแนวโน้มที่ดีขึ้น..."
2600015-73 = "ประธานคณะกรรมการวินัยเองก็เคยประเมินไว้แบบนั้นด้วยค่ะ ปกติประธานไม่ใช่คนที่จะพูดอะไรด้วย#nความรู้สึกส่วนตัว เพราะงั้นคงจะเป็นเรื่องจริงแน่นอนค่ะ"
2600015-77 = "[ns13] \"คิดแล้วเชียวว่าชินัตสึเป็นเด็กที่น่าทึ่งมากๆ...\"\n[ns14] \"เพราะแบบนี้ไงทุกคนถึงรักชินัตสึน่ะ...\""
2600015-80 = "ระ... เรื่องนั้น... ฉันไม่ได้เล่าเรื่องนี้เพราะอยากให้คุณครูพูดแบบนั้นนะคะ"
2600015-81 = "แต่ยังไงก็ตาม ถ้ามีเวลาฉันจะแวะไปดูสถานการณ์ที่หน่วยแพทย์ฉุกเฉินเป็นครั้งคราวค่ะ"
2600015-82 = "ตอนนี้ก็กำลังจะไปที่นั่นเหมือนกันค่ะ"
2600015-83 = "อืม..."
2600015-84 = "ว่าแต่ว่าคุณครูมาทำอะไรที่นี่เหรอคะ? ในข้อความเมื่อกี้ ฉันบอกไปแล้วนี่นา..."
2600015-85 = "คะ...?"
2600015-86 = "คุณครูมีธุระที่หน่วยแพทย์ฉุกเฉินเหรอคะ?"
2600015-87 = "กะทันหันแบบนี้เลยเหรอคะ...?"
2600015-88 = "หรือว่า... เพิ่งจะมีธุระกะทันหันเหรอคะ?"
2600015-89 = "[s] \"นั่นสินะ จะว่ายังไงดีน้า...\""
2600015-93 = "[ns] \"ครูเองก็มีบางอย่างที่ 'ปล่อยไว้ไม่ได้' เหมือนกันน่ะ\""
2600015-97 = "จริงๆ เลย... ช่วยไม่ได้นะคะ"
2600015-98 = "ถ้าคุณครูพูดขนาดนี้แล้ว ฉันเองก็คงจะพูดอะไรได้ลำบากแล้วละค่ะ"
2600015-99 = "อืม... งั้นก็ดีค่ะ ยิ่งมีคนช่วยเยอะก็ยิ่งดี ทางหน่วยแพทย์ฉุกเฉินเองก็คงจะดีใจเหมือนกันค่ะ"
2600015-100 = "จู่ๆ ก็รู้สึกเหมือนเป็นหนี้บุญคุณกับคุณครูในเรื่องที่ไม่คาดคิดมาก่อนเลยนะคะ"
2600015-101 = "แต่ว่าแทนที่จะรู้สึกอึดอัดใจ ฉันกลับไม่ได้รู้สึกอย่างนั้น..."
2600015-102 = "คราวนี้คุณครูมาช่วยพวกเราแล้ว ถ้างั้น..."
2600015-103 = "วันหยุดคราวหน้า... ฉันจะไปช่วยงานคุณครูเอง..."
2600015-104 = "ฉันจะแวะไปที่ชาเล่ต์เองค่ะ"
2600015-106 = "(หลังจากนั้นคุณครูกับชินัตสึก็ไปช่วยงานต่างๆ ที่หน่วยแพทย์ฉุกเฉิน)"
2600015-107 = "(สมาชิกหน่วยแพทย์ฉุกเฉินทุกคนต้อนรับชินัตสึเป็นอย่างดี ราวกับว่ากำลังรอเธออยู่)"

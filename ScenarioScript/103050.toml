[translation]
103050-1 = "第5話;位於阿拜多斯的某物（２）"
103050-5 = "對策委員會．教室"
103050-8 = "呼呣……"
103050-15 = "呃……那個……歡迎來到，阿拜多斯……？"
103050-17 = "失禮了。"
103050-18 = "凱薩公司襲擊聖所之塔時……總裁是這麼對我說的。"
103050-21 = "我們要掌控聖所之塔。"
103050-22 = "……我們獲得了超古代兵器。#n因此需要聖所之塔的力量，就是這麼回事。"
103050-23 = "這樣一來，奇普托斯將由凱薩公司支配。#n並非蓋瑪特利亞，也非聯邦學生會……我們將成為學園都市的主人。"
103050-26 = "當時實在沒有餘力思考他話中的意義……但現在回想起來，他的說法相當不自然。"
103050-27 = "「超古代兵器」……很難想像那是私人企業的領袖會說出的詞彙。"
103050-28 = "除此之外，平時的我或許不會注意到吧……#n「凱薩公司」與「超古代兵器」──兩者之中的關聯。"
103050-29 = "是的……兩者的關聯就是──"
103050-33 = "原來是這樣啊～"
103050-34 = "星野前輩？"
103050-40 = "凱薩在阿拜多斯沙漠尋找的就是「超古代兵器」對吧？"
103050-43 = "阿拜多斯沙漠．挖掘區域附近"
103050-44 = "大叔我一直都很在意呢。#n凱薩搶奪阿拜多斯自治區土地的理由……"
103050-45 = "明明都已經沙漠化了為何還要搶走呢……#n原來是為了這個啊～"
103050-47 = "什麼「超古代兵器」啊！？#n居然為了那種東西做出這種事！？"
103050-48 = "凱薩所說的「尋寶」指的也是這個意思啊……"
103050-50 = "……嘛，代表那就是如此強大的武器吧。#n那種東西可是想買也買不到的。"
103050-51 = "沒錯。當時凱薩公司為了啟動「超古代兵器」而襲擊了聯邦學生會。"
103050-52 = "彷彿與整個奇普托斯為敵也無所謂……"
103050-53 = "如果這就是最近凱薩PMC在沙漠的人手特別多的原因……"
103050-54 = "那大叔我們只要現在到阿拜多斯沙漠取得「超古代兵器」就行了吧。"
103050-56 = "但，但是……那邊還是凱薩的私有土地──"
103050-57 = "嗯，不過現在狀態緊急。#n這裡就效仿白子醬的作風吧。"
103050-62 = "白子前輩的……作風！？"
103050-68 = "請，請等一下！我不是那個意思──"
103050-69 = "唉，雖然我不是很想這麼做……#n反正不要被發現就好了吧？快去快回吧。"
103050-70 = "只是為了捕獲白子醬而稍～微借用一下而已☆"
103050-78 = "唉……我知道了。只是為了應對情況借用一下……#n凱薩PMC已經撤離了那個基地，所以現在應該是無人狀態才對。"
103050-79 = "咦，是嗎？"
103050-80 = "是的。但那裡依然是凱薩的私有地。#n而且他們隨時都可能突然回來，請多加小心！"
103050-85 = "唔嘿～還以為需要戰鬥的說，害我有點失望。"
103050-92 = "唔呵呵，特地戴上面具的綾音醬真可愛呢☆"
103050-98 = "啊，啊嗚……那，那是因為……"
103050-99 = "那，只要把「超古代兵器」帶回來就可以了嗎？"
103050-100 = "比想像中還簡單……"
103050-102 = "不──我想要把它帶過來恐怕很困難吧。"
103050-103 = "陽葵同學……？"
103050-104 = "所以我們稍後也會過去的。#n希望各位能在全員到齊之前確保該處的安全。"
103050-106 = "「超古代兵器」有那麼大呀～"
103050-108 = "沒錯。"
103050-109 = "據老師所說，那個「超古代兵器」──"
103050-115 = "似乎是[ruby= ・     ・     ・     ・ ]宇宙戰艦[/ruby]。"
103050-121 = "宇宙戰艦！？"
103050-131 = "你，你們是什麼人！？"
103050-132 = "這是……什麼情況！？"
103050-141 = "這樣啊。因為聖所消失所以就跑回來了啊。"
103050-142 = "但是，這裡本來就是[ruby=我們]阿拜多斯[/ruby]的自治區！"
103050-143 = "就是啊！只是被凱薩擅自侵占了而已！"
103050-145 = "但，但是在文件上……"
103050-146 = "嗚嗚，這樣沒問題嗎……"
103050-147 = "反正整個奇普托斯都還在混亂之中，#n就算有什麼問題，老師應該也會想辦法處理的吧？"
103050-148 = "這就是大人的力量，對吧☆"
103050-149 = "啊，啊哈哈……"
103050-158 = "哇！"
103050-159 = "還沒完嗎！？"
103050-160 = "好～打起精神上吧～！"
103050-161 = "是！向指定座標移動！"
103050-162 = "老師，麻煩你指揮了！"
103050-163 = "[ns]「那麼，要開始囉！」"

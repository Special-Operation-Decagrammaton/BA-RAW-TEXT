[translation]
103050-1 = "ตอนที่ 5;สิ่งที่อยู่ในอะบิดอส 2"
103050-5 = "ห้องชมรมคณะกรรมการแผนงาน"
103050-8 = "ฮืม..."
103050-15 = "อ่า... ยังไงก็คงต้องบอกว่า... ยินดีต้อนรับ... สู่อะบิดอสนะคะ...? "
103050-17 = "ค่ะ ต้องขออนุญาตหน่อยนะคะ"
103050-18 = "ในตอนนั้นที่ไคเซอร์ คอร์เปอเรชั่นบุกโจมตีแซงค์ทัมทาวเวอร์ ประธานใหญ่พูดกับฉันว่าอย่างนี้ค่ะ"
103050-21 = "ฉันก็จะยึดครองแซงค์ทัมทาวเวอร์น่ะสิ "
103050-22 = "ทำไมน่ะเหรอ? ก็ฉันได้อาวุธยุทโธปกรณ์โบราณมาไว้ในมือแล้วน่ะสิ เพราะงั้นก็เลยต้องการพลังของ#nแซงค์ทัมทาวเวอร์ เรื่องรายละเอียดขอข้ามไปแล้วกัน"
103050-23 = "ตอนนี้คิโวทอสอยู่ภายใต้การควบคุมของไคเซอร์ คอร์เปอเรชั่นแล้ว เจ้าของเมืองแห่งการศึกษาแห่งนี้#nไม่ใช่ทั้งเกมาเทรียหรือองค์การนักเรียน แต่เป็นพวกฉันต่างหาก"
103050-26 = "ตอนนั้นฉันไม่มีเวลาที่จะคิดว่ากฎอัยการศึกกับหอคอยแห่งคำลวงจะมาถึงพร้อมกัน แต่พอลองคิดย้อน#nดูแล้ว มันเป็นคำพูดที่แปลกมากค่ะ"
103050-27 = "อาวุธยุทโธปกรณ์โบราณ? เป็นคำที่ฟังดูไม่เข้ากันกับหัวหน้าองค์กรธุรกิจเลยใช่ไหมล่ะคะ"
103050-28 = "เพราะในเวลาปกติ เราจะไม่สังเกตเห็นจุดเชื่อมโยงระหว่างคำว่า <ไคเซอร์ คอร์เปอเรชั่น> กับ <อาวุธยุทโธปกรณ์โบราณ> เลย"
103050-29 = "ค่ะ... และจุดเชื่อมโยงของทั้งสองก็คือ......"
103050-33 = "อะไรกัน เป็นแบบนั้นเองเหรอ...... อื้ม"
103050-34 = "รุ่นพี่โฮชิโนะ?"
103050-40 = "สุดท้ายแล้วที่ไคเซอร์หาอยู่ในทะเลทราย ก็คือ <อาวุธยุทโธปกรณ์โบราณ> สินะ"
103050-43 = "ใกล้ๆ เขตขุดค้นในทะเลทรายอะบิดอส"
103050-44 = "สาเหตุที่แท้จริงที่ไคเซอร์มาแย่งที่ดินในเขตปกครองตนเองอะบิดอสของพวกเราไปก็คือ... ฮืม..."
103050-45 = "ฉันก็สงสัยมาตลอดว่ามันคืออะไร... พอรู้เข้าก็แทบเข่าทรุดเลยแฮะ"
103050-47 = "<อาวุธยุทโธปกรณ์โบราณ> เหรอ? บ้าไปแล้วรึไง! ไม่ใช่เด็กๆ กันแล้วนะ! น่าสมเพชที่สุด!"
103050-48 = "ไม่คิดเลยว่าที่บอกว่ามาล่าสมบัติจะเป็นเรื่องจริง......"
103050-50 = "...... ไม่หรอก ถ้ามองดีๆ มันก็เหมาะกับสันดานของเจ้าพวกนั้นอยู่หรอก ถ้าเป็น <อาวุธทรงพลัง> ที่ซื้อด้วยเงินไม่ได้ พวกนั้นคงยอมทำทุกวิถีทางเพื่อให้ได้มันมา"
103050-51 = "ใช่ค่ะ ตอนนั้นไคเซอร์ คอร์เปอเรชั่นก็โจมตีองค์การนักเรียนด้วยเพียงเพราะเหตุผลที่ว่าได้ <อาวุธยุทโธปกรณ์โบราณ> มาไว้ในมือแล้วค่ะ "
103050-52 = "นั่นเป็นการเคลื่อนไหวราวกับตัวเองสามารถต่อสู้กับผู้คนทั่วทั้งคิโวทอสได้โดยไม่ต้องกังวลเกี่ยวกับ#nอนาคตเลยค่ะ"
103050-53 = "ใช่ ที่ช่วงนี้ไคเซอร์ PMC มาที่ทะเลทรายกันบ่อยขึ้น ก็คงเป็นเพราะเรื่องนั้นละ..."
103050-54 = "แล้วต้องทำยังไงต่อล่ะอายาเนะจัง? ให้เราไปที่เขตขุดค้น PMC แล้วเอา <อาวุธยุทโธปกรณ์โบราณ> นั่นกลับมาใช่ไหม?"
103050-56 = "ใช่ค่ะ แต่ที่ตรงนั้นยังเป็นพื้นที่ส่วนบุคคลของไคเซอร์......"
103050-57 = "โฮ้... อย่างนี้นี่เอง ถ้างั้นก็คงไม่มีทางเลือกอื่นนอกจากทำตามสไตล์ของชิโรโกะจังสินะ"
103050-62 = "คะ...?!"
103050-68 = "คะ?!  ดะ.. เดี๋ยวก่อนสิคะ!!  ฉันไม่ได้บอกว่าต้องทำอย่างนั้น......"
103050-69 = "ก็แค่อย่าให้โดนจับได้ก็พอแล้วใช่ไหมล่ะ? รีบเข้ารีบออกไง"
103050-70 = "อื้อ☆ ก็เราต้องได้สิ่งนั้นมา ถึงจะไปจับตัวชิโรโกะจังได้นี่คะ!"
103050-78 = "ตอนนี้ไคเซอร์ PMC ถอนกำลังออกจากฐานแล้วค่ะ! ข้างในนั้นน่าจะไม่มีใครเลยค่ะ!"
103050-79 = "หืม? งั้นเหรอ?"
103050-80 = "ใช่ค่ะ! แต่ยังไงนั่นก็เป็นพื้นที่ส่วนบุคคลของไคเซอร์... เราเลยไม่รู้ว่าไคเซอร์จะกลับมาอีกตอนไหน ทุกคนระวังตัวไว้ด้วยนะคะ!"
103050-85 = "อะฮ่า อย่างนี้นี่เองสินะ ลุงว่าจะเข้าไประบายความโกรธสักหน่อย เสียดายจัง"
103050-92 = "ถึงจะไม่มีคน แต่เราก็ต้องสวมหน้ากากไว้สินะคะ อายาเนะจังเนี่ย~ รู้งาน แล้วก็รู้ใจที่สุดเลย~☆"
103050-98 = "คะ? เออะ... เอ่อ..."
103050-99 = "แค่ไปเอามันมาไว้ที่นี่ก็สิ้นเรื่องใช่ไหม?"
103050-100 = "งานง่ายกว่าที่คิดอีกแฮะ......"
103050-102 = "ไม่ค่ะ คณะกรรมการแผนงานทุกคน เราย้ายสิ่งนั้นมาไม่ได้ค่ะ"
103050-103 = "คุณฮิมาริ...?"
103050-104 = "พวกคุณแค่ไปหาตำแหน่งของมันมาก็พอค่ะ "
103050-106 = "ย้ายอาวุธนั่นมาไม่ได้งั้นเหรอ? สงสัยมันจะใหญ่มากเลยนะ"
103050-108 = "ใช่ค่ะ"
103050-109 = "จากข้อมูลที่คุณครูได้มา <อาวุธยุทโธปกรณ์โบราณ> ที่ว่านั่นก็คือ..."
103050-115 = "เรือรบอวกาศค่ะ"
103050-121 = "ว่าไงนะ?!"
103050-131 = "อะ.. อะไรเนี่ย! พวกเธอมาที่นี่ได้ยังไง!! "
103050-132 = "เห็นว่าท้องฟ้ากลับมาเป็นปกติแล้วก็เลยเข้ามาดูฐานสักหน่อย หนอย...! มีผู้บุกรุกสินะ!!"
103050-141 = "ฮึ่ม พอหอคอยหายไป ไคเซอร์ก็ค่อยๆ กลับมาที่นี่กันสินะ"
103050-142 = "แต่เดิมทีแล้วตรงนี้เป็นที่ดินของเรานะคะ"
103050-143 = "ใช่ หน้าด้านมาอยู่ตรงนี้กันได้ไง!"
103050-145 = "แต่ว่า... ในเอกสารแล้ว ที่นี่ยัง..."
103050-146 = "อืม... จะทำแบบนี้ได้ไหมนะ..."
103050-147 = "แต่ตอนนี้คิโวทอสอยู่ในสถานการณ์ที่สับสนอลม่านอยู่นะ ครูน่าจะต้องมาแบ่งรับแบ่งสู้บ้างละน่า"
103050-148 = "ว้าว~☆ พลังของผู้ใหญ่!"
103050-149 = "อ่า... ฮะฮ่าฮ่า..."
103050-158 = "ว้าย?!"
103050-159 = "ยังมีพวกที่เหลืออยู่อีกอยู่เลยนี่!"
103050-160 = "ก็ดี งั้นมาจัดการให้หมดๆ ไปเลย!"
103050-161 = "ค่ะ! เราจะมุ่งหน้าไปยังพิกัดทันทีค่ะ!"
103050-162 = "คุณครูคะ รบกวนสั่งการหน่อยค่ะ!"
103050-163 = "[ns] \"เอาละ มาเริ่มกันเลย!\""

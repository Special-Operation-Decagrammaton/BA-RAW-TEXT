[translation]
103050-1 = "Episode 5; What's Hidden in Abydos 2"
103050-5 = "Foreclosure Task Force Room"
103050-8 = "Hmm."
103050-15 = "Um...so... Welcome to Abydos..."
103050-17 = "Yes, thank you for having us."
103050-18 = "When the Kaiser Corporation attacked Sanctum Tower, the president said..."
103050-21 = "We are occupying Sanctum Tower."
103050-22 = "Why? We recently acquired an ancient weapon, and we need the Sanctum Tower's power to... Ah, well. I won't bore you with the petty details."
103050-23 = "All you need to know is that Kivotos is now under control of the Kaiser Corporation. The Academy City belongs to us now. Not Gematria, not the General Student Council. Us."
103050-26 = "At the time, there was too much going on for me to really consider the implications of his words, but I did find the remark strange."
103050-27 = "An ancient weapon? It wasn't something I would expect coming from the mouth of a corporate president."
103050-28 = "Under normal circumstances, I likely wouldn't have noticed the connection between the Kaiser Corporation and this ancient weapon."
103050-29 = "Yes... It's certainly unexpected..."
103050-33 = "Huh. Is that so...? Hmm..."
103050-34 = "Hoshino?"
103050-40 = "So Kaiser was looking for this ancient weapon in the desert."
103050-43 = "Near the Abydos Desert Excavation Site"
103050-44 = "That was the reason Kaiser took land in the Abydos district..."
103050-45 = "I always wondered why they wanted it so badly... It's kind of anti-climactic now that I know the answer."
103050-47 = "Some long lost ancient weapon? What the heck is that? It sounds so dumb!"
103050-48 = "I didn't think it would literally be a treasure hunt..."
103050-50 = "I mean, in a way, that makes sense for them. If it's a powerful weapon that money can't even buy, they'll do anything to get their hands on it."
103050-51 = "Yes. At the time, the Kaiser Corporation attacked the General Student Council just because they obtained the ancient weapon."
103050-52 = "They didn't consider... No, they didn't believe there would be consequences. They were confident in their ability to fight all of Kivotos."
103050-53 = "And that's probably why Kaiser PMC activity going in and out of the desert has spiked recently..."
103050-54 = "So, Ayane, we're supposed to go to the PMC Excavation Site to obtain this ancient weapon, right?"
103050-56 = "Yes. But the desert is technically still Kaiser's property..."
103050-57 = "I see... Then I guess we'll just have to go in Shiroko-style."
103050-62 = "What?!"
103050-68 = "Huh?! W-Wait, that's not what I meant..."
103050-69 = "We just have to make sure we don't get caught. We'll move fast."
103050-70 = "Yeah! ☆ We need that weapon thingie so we can capture Shiroko!"
103050-78 = "Kaiser PMC left the base, so it'll be empty!"
103050-79 = "Oh? Really?"
103050-80 = "Yes! But it's still Kaiser's property...so I was just trying to say we need to be cautious because we don't know when they'll return!"
103050-85 = "*sigh* How disappointing. I thought I was going to get to let off some steam."
103050-92 = "No masks for this mission, I suppose. But you're so cute, putting yours on with us when you knew we didn't need it, Ayane. ☆"
103050-98 = "W-Well... That's..."
103050-99 = "So we just have to bring it here?"
103050-100 = "That sounds a little too simple..."
103050-102 = "No, Foreclosure Task Force. It's impossible to simply carry it out of the desert."
103050-103 = "Himari...?"
103050-104 = "What we need is for you to secure the location. "
103050-106 = "We can't move it? How big is this thing?"
103050-108 = "Bigger than you can imagine."
103050-109 = "According to Sensei's info, the ancient weapon is..."
103050-115 = "...An intergalactic battleship."
103050-121 = "What?!"
103050-131 = "Wh-What is this?!"
103050-132 = "The sky turned back to normal, so we came to check the base... And there are intruders!"
103050-141 = "Hmm, now that the sanctums are gone, Kaiser must be slowly coming back."
103050-142 = "But this was originally our land!"
103050-143 = "Yeah, you guys are just squatters!"
103050-145 = "But...on paper, it's still theirs..."
103050-146 = "Hm, maybe it's fine, actually..."
103050-147 = "Now that Kivotos is in chaos, I'm sure Sensei can swoop in later and say some adult mumbo jumbo to fix whatever we break! Metaphorically speaking!"
103050-148 = "Wow! ☆ The power of an adult!"
103050-149 = "If you say so. Hahaha..."
103050-158 = "Wha?!"
103050-159 = "They're still here!"
103050-160 = "Okay, let's get rid of them for good before we go!"
103050-161 = "Yes! Let's move forward to the coordinates!"
103050-162 = "Give us your commands, Sensei!"
103050-163 = "[ns] \"All right, let's claim an intergalactic battle ship!\""

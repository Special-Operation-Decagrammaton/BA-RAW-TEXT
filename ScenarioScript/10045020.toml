[translation]
10045020-1 = "第2話;第1回合：水槍生存遊戲"
10045020-4 = "持續壓制！先幹掉百花繚亂那群傢伙！！"
10045020-5 = "要趁這個機會，一吐之前的怨氣！！"
10045020-9 = "紫！那邊快被突破了，有辦法補救嗎？"
10045020-13 = "還，還撐得住！"
10045020-14 = "為什麼？明明是完美的作戰……"
10045020-15 = "我果然派不上用場……只會拖大家的後腿……"
10045020-17 = "喂喂喂，都給我打起精神來！！"
10045020-19 = "10分鐘前……"
10045020-21 = "四周是一望無際的沙灘。"
10045020-22 = "根據我的預測，大家應該都會為了生存而盡量避免離開掩體。"
10045020-23 = "所以我認為我們也用沙子構築防線，堅守陣地才是上策。"
10045020-24 = "那麼在那之前，就由小女子來爭取時間！"
10045020-26 = "雖然我比較偏好突擊，不過就聽桔梗的吧。"
10045020-27 = "就這麼決定了。依照桔梗的作戰行動吧。"
10045020-29 = "……到底是哪裡出了問題？"
10045020-30 = "按照計畫，不應該被捲進這種大規模戰鬥才對。"
10045020-34 = "呃啊啊啊……！"
10045020-35 = "啊！振作點！不是說好這場比賽結束後要一起去甜點咖啡廳的嗎！"
10045020-39 = "啊啊啊啊……！！"
10045020-40 = "這，這種毫不留情的攻擊……！#n百花繚亂的傢伙，我絕對饒不了你們……！！"
10045020-42 = "這分明是在遷怒！"
10045020-43 = "為什麼全都針對我們啊！！"
10045020-45 = "因為不先除掉你們的話，我們就沒有未來可言了！"
10045020-46 = "沒錯！反正總是得先把奪冠熱門踢掉，我們才有贏的可能！！"
10045020-47 = "都是你們害我們的活動資金全沒了，所以這次才一定要拿到冠軍獎金啊！！"
10045020-49 = "……原來還有這種賺人熱淚的理由啊。"
10045020-50 = "哼，那是你們自作自受！"
10045020-54 = "啊，危險，隊長……！！"
10045020-60 = "啊，啊啊啊啊……！！"
10045020-62 = "這，這怎麼可能……！"
10045020-63 = "你們這些傢伙，絕不饒恕！！"
10045020-64 = "啊啊，這就是仇恨的連鎖！戰場的悲哀！"
10045020-65 = "然而攜手跨越重重試煉，才是青春的[ruby=Romance]浪～漫[/ruby]！"
10045020-66 = "青春才沒有這麼血腥！"
10045020-71 = "哦哦，比賽剛開始就陷入了混戰！#n百花繚亂究竟能不能撐住呢！"
10045020-73 = "我們……去幫忙吧～"
10045020-74 = "是啊！畢竟先前欠了他們不少人情呢！"
10045020-75 = "呵呵，那就上吧？"
10045020-80 = "什，什麼？"
10045020-81 = "那，那是……！"
10045020-85 = "忍術研究部，前來助陣了……！忍忍！"
10045020-86 = "我其實不是忍術研究部的……"
10045020-87 = "總之……一起戰鬥吧～"
10045020-89 = "可惡，那些傢伙竟然加入了……！"
10045020-90 = "大家別怕！優勢還是在我們這邊！"
10045020-97 = "百花繚亂的各位！我們也來幫忙！"
10045020-98 = "雖然時間不長……但蓮華醬也曾是我們的部員！"
10045020-100 = "哦哦，是你們！"
10045020-101 = "可惡，那些傢伙的人數突然增加了……！？"
10045020-102 = "這下情勢逆轉了！"
10045020-103 = "好～！大家一起突擊，殲滅他們吧！！"

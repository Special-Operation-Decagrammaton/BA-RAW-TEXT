[translation]
10045020-1 = "ตอนที่ 2;รอบที่ 1: เกมปืนฉีดน้ำเซอร์ไววัล"
10045020-4 = "ยิงต่อไป! ต้องเอาชนะพวกเฮียกกะเรียวรันให้ได้!!"
10045020-5 = "ฉันจะใช้โอกาสนี้ชดเชยความเคียดแค้นที่สะสมมาให้หมดเลย!!"
10045020-9 = "ยูคาริ! เหมือนตรงนั้นจะมีช่องโหว่เลย พอซ่อมไหวหรือเปล่า?"
10045020-13 = "วะ... ไหวเจ้าค่ะ!"
10045020-14 = "ทำไมกันนะ? เป็นแผนการที่สมบูรณ์แบบแล้วแท้ๆ..."
10045020-15 = "ฉันยังไม่ไหวจริงด้วย... แบบนี้มีแต่จะรั้งทุกคนเปล่าๆ..."
10045020-17 = "นี่ ทุกคนตั้งสติกันหน่อยสิ!!"
10045020-19 = "10 นาทีก่อน..."
10045020-21 = "ชายหาดเปิดโล่งทุกทิศทางเลย"
10045020-22 = "จากการวิเคราะห์ของฉัน ถ้าอยากรอดในเกมนี้ ทุกคนต้องซ่อนตัวในกำบังให้ได้มากที่สุด"
10045020-23 = "เพราะงั้นพวกเราจะสร้างป้อมปราการจากทรายแล้วต้านทานการโจมตีอยู่ในนั้น"
10045020-24 = "ถ้างั้นข้าจะยื้อเวลาไว้ให้เองเจ้าค่ะ!"
10045020-26 = "ฮืม ฉันก็ชอบลุยแหลกหรอกนะ แต่ถ้าคิเคียวว่าอย่างนั้นก็คงต้องทำตาม"
10045020-27 = "งั้นก็ได้ข้อสรุปแล้วเนอะ เราจะทำตามกลยุทธ์ของคิเคียวกัน"
10045020-29 = "มันผิดพลาดตั้งแต่ตรงไหนนะ...?"
10045020-30 = "ถ้าทุกอย่างเป็นไปตามแผน ฉันก็ไม่ต้องเข้าไปพัวพันกับการต่อสู้ครั้งใหญ่แบบนี้สิ"
10045020-34 = "ว้ายยยย...!"
10045020-35 = "อ๊ะ! ตั้งสติหน่อยสิ! สัญญากันไว้แล้วนี่ว่าจบเกมนี้แล้วเราจะไปคาเฟ่ขนมหวานด้วยกันน่ะ!"
10045020-39 = "ว้ายยย...!!"
10045020-40 = "ยะ... ยิงกันไม่ปรานีเลยเหรอ! ยัยพวกเฮียกกะเรียวรัน ฉันไม่ยกโทษให้แน่...!!"
10045020-42 = "นี่มันอะไรกันเจ้าคะ!!"
10045020-43 = "ทำไมทุกคนถึงมารุมแต่พวกเราล่ะ?!"
10045020-45 = "ถ้าไม่กำจัดพวกเธอไปก่อน อนาคตของพวกฉันก็ไม่เหลือน่ะสิ!"
10045020-46 = "ใช่! ต้องกำจัดตัวเต็งให้ได้ก่อน พวกเราจะได้มีโอกาสชนะ!!"
10045020-47 = "พวกเราโดนหักเงินสนับสนุนก็เพราะพวกเธอ เพราะงั้นเราต้องชนะแล้วคว้าเงินรางวัลให้ได้!!"
10045020-49 = "ที่อยากชนะก็เพราะอย่างนี้สินะ..."
10045020-50 = "ฮึ่ม กรรมตามสนองต่างหากล่ะ!"
10045020-54 = "อ๊ะ อันตรายนะ หัวหน้า...!!"
10045020-60 = "วะ... ว้ายยยย...!!"
10045020-62 = "ปะ... เป็นไปได้ยังไง...!"
10045020-63 = "ยัยพวกนี้นี่ ฉันไม่ยกโทษให้แน่!!"
10045020-64 = "อ๊ะ นี่มันห่วงโซ่แห่งความแค้น! ความโศกเศร้าในสนามรบ!"
10045020-65 = "แต่การเอาชนะการทดสอบแบบนี้และลุกขึ้นให้ได้ก็เป็นเสน่ห์ของวัยรุ่นเหมือนกัน!"
10045020-66 = "วัยรุ่นไม่ผูกใจเจ็บกันแบบนี้หรอกนะ!"
10045020-71 = "โอ้ว สถานการณ์คุกรุ่นตั้งแต่เริ่มแข่งเลยค่ะ! เฮียกกะเรียวรันจะต้านทานไว้ได้นานแค่ไหนคะ!"
10045020-73 = "พวกเรา... ไปช่วยกันเถอะ"
10045020-74 = "ดีค่ะ! เฮียกกะเรียวรันก็ช่วยเหลือพวกเราไว้เยอะเลยนี่คะ!"
10045020-75 = "ฮุฮุ งั้นก็ไปกันเลยมั้ยคะ?"
10045020-80 = "อะ... อะไรเนี่ย?"
10045020-81 = "นะ... นั่นมัน...!"
10045020-85 = "ชมรมวิจัยศาสตร์นินจามาช่วยแล้วค่ะ...! นินนิน!"
10045020-86 = "แต่ฉันไม่ได้อยู่ชมรมวิจัยศาสตร์นินจานะคะ..."
10045020-87 = "จะชมรมอะไรก็เถอะ... ตอนนี้เรามาผนึกกำลังกันก่อน"
10045020-89 = "อึก พวกนั้นเข้ามาช่วยงั้นเหรอ...!"
10045020-90 = "ทุกคนอย่าเพิ่งกลัวไปก่อนนะ! พวกเรายังได้เปรียบอยู่!"
10045020-97 = "ฮะ... เฮียกกะเรียวรันทุกคน! พวกเราก็จะช่วยอีกแรงค่ะ!"
10045020-98 = "ถึงจะเป็นช่วงสั้นๆ... แต่เรนเกะจังก็เคยมาทำกิจกรรมของชมรมเรานี่เนอะ!"
10045020-100 = "โอ้ว พวกเธอ!"
10045020-101 = "อึก จู่ๆ ยัยพวกนั้นก็มีพันธมิตรเพิ่มขึ้นเฉยเลย...?!"
10045020-102 = "โอ้ว แบบนี้ก็พลิกเกมได้เลยนะเจ้าคะ!"
10045020-103 = "ดีละ! พวกเราเข้าไปจัดการพวกนั้นกันเลย!!"

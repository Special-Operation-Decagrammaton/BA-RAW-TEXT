[translation]
1011405-1 = "#title;웨이트리스의 서비스"
1011405-2 = "#na;(주리를 기다리고 있자니, 다급한 노크 소리가 들렸다!)"
1011405-3 = "#st;[0,0];instant;1;"
1011405-4 = "#clearST"
1011405-5 = "#wait;1200"
1011405-6 = "#wait;1400"
1011405-7 = "#wait;1500"
1011405-8 = "#wait;1100"
1011405-9 = "3;주리 아르바이트;10;선생니임~!\n#3;closeup\n#3;a\n#bgshake\n#fontsize;80"
1011405-10 = "[s] \"어서 와, 주리! 그리고 일단 진정하자!\""
1011405-11 = "3;주리 아르바이트;10;네, 네에……. 훌쩍…….\n#3;em;[훌쩍]"
1011405-12 = "3;주리 아르바이트;04;무슨 일이냐고요? 스토킹 같은 것이라도 당하고 있는 거냐고요?\n#3;em;[반응]"
1011405-13 = "3;주리 아르바이트;06;아뇨, 스토킹 같은 건 아니긴 한데……."
1011405-14 = "3;주리 아르바이트;07;네. 확실히 그것부터 말씀드려야겠네요.\n#3;em;[한숨]"
1011405-15 = "3;주리 아르바이트;07;그러니까 말이죠, 선생님. 제가 어쩌다 이 달의 웨이트리스에 선발된 건 좋았는데요…….\n#3;stiff"
1011405-16 = "3;주리 아르바이트;02"
1011405-17 = "#wait;500"
1011405-18 = "[ns1] \"카페에 방문하는 손님들의 숫자가.\"\n[ns2] \"대충 세어 봐도, 열 배는 넘게 늘어났다고?!\""
1011405-19 = "#wait;10"
1011405-20 = "#wait;10"
1011405-21 = "3;주리 아르바이트;04;처음에는, 잘 대응했어요.\n#3;em;[땀]"
1011405-22 = "3;주리 아르바이트;04;당연히 매출도 늘어나서 매니저님도 좋아하셨고, 저를 알아봐 주시는 분들도 계셨고……."
1011405-23 = "3;주리 아르바이트;08;엄청 부끄럽기는 했지만, 힘내라고 응원해 주시는 분들도 계셨었고요. 같이 사진을 찍자는 분들이라든가…….\n#3;em;[///]"
1011405-24 = "#all;hide"
1011405-25 = "3;주리 아르바이트;04\n#3;a\n#wait;1500"
1011405-26 = "3;주리 아르바이트;04\n#na;손님 A;귀여워요, 주리 씨! 혹시 특별 포즈 같은 거, 해 주실 수 있나요?"
1011405-27 = "3;주리 아르바이트;04;가, 감사합니다. 그런데 특별 포즈라니…… 그런 거, 해 본 적이 없는데요……."
1011405-28 = "3;주리 아르바이트;04\n#na;손님 B;아, 지금 표정 정말 귀여웠어요! 포즈보다 지금 표정이 더 나은 것 같아요!"
1011405-29 = "3;주리 아르바이트;07;그런, 가요……?"
1011405-30 = "3;주리 아르바이트;04"
1011405-31 = "3;주리 아르바이트;04\n#na;크로노스 기자;안녕하세요, 여러분! 현장 단독 돌격 취재, 크로노스 보도부입니다!"
1011405-32 = "3;주리 아르바이트;04\n#na;크로노스 기자;이번에는 지금 가장 화제가 되고 있는 분인, 우시마키 주리 씨와 인터뷰를 나눠 보려고 하는데요! 우선 인사 부탁드립니다!"
1011405-33 = "3;주리 아르바이트;08;아, 안녕하세요? 주리라고…… 합니다…….\n#3;em;[///]"
1011405-34 = "3;주리 아르바이트;08\n#na;크로노스 기자;네! 저희가 제보받은 대로라면, 주리 씨는 그 유명한 <이 달의 웨이트리스 선발 대회>에서……."
1011405-35 = "3;주리 아르바이트;08\n#na;크로노스 기자;거대 유리잔에 가득 찬 커피로, 경쟁자들의 방해를 일격에 날려버렸다던데, 그것이 사실인가요?!"
1011405-36 = "3;주리 아르바이트;10;네에?!?! 저, 저는 그런 적 없어요! 무거운 커피잔을 운반하기는 했지만, 그건 어디까지나 대회 종목이었고…….\n#3;em;[?!]\n#3;shake"
1011405-37 = "3;주리 아르바이트;10\n#na;크로노스 기자;이럴 수가, 들으셨나요. 시청자 여러분! 지금 저희의 제보가 절반은 맞았던 것으로 판명되었습니다!"
1011405-38 = "3;주리 아르바이트;10\n#na;크로노스 기자;이거야말로 이 달의 웨이트리스로 선발되신 분에게 어울리는, '무력'이라고밖에 할 수 없겠네요!"
1011405-39 = "3;주리 아르바이트;07;아뇨! 아니에요! 저는 그런 게 아니라, 그게, 그러니까……!\n#3;em;[땀]"
1011405-40 = "3;주리 아르바이트;07\n#na;크로노스 기자;그러면 다음 질문입니다! 또 하나의 제보에 따르면, 주리 씨는 밀레니엄제 로봇과의 대결에서……"
1011405-41 = "3;주리 아르바이트;07\n#na;크로노스 기자;'언젠가 끝은 올 거다. 나와 같은 웨이트리스들은 결국 사라지게 되겠지.'"
1011405-42 = "3;주리 아르바이트;07\n#na;크로노스 기자;'하지만 그것이 오늘은 아니다. 인간은 아직 패배하도록 만들어지지 않았다.'라는 하드보일드한 대사를 남기며……."
1011405-43 = "3;주리 아르바이트;07\n#na;크로노스 기자;그 건방진 밀레니엄제 로봇에게 승리하며, 로봇이 자폭하도록 만들어 버리셨다는데, 이것은 사실인가요?!"
1011405-44 = "3;주리 아르바이트;09;아니에요! 정말 아니에요!!! 저는 그런 게 아니라, 그게, 그러니까……!\n#3;em;[속상함]\n#3;stiff"
1011405-45 = "3;주리 아르바이트;06;그, 로봇분이 갑자기 자폭하려고 하셔서, 간신히 말리기는 했는데요……."
1011405-46 = "3;주리 아르바이트;06\n#na;크로노스 기자;들으셨습니까, 여러분! 이번에도 저희의 제보가 절반은 맞았습니다!"
1011405-47 = "3;주리 아르바이트;06\n#na;크로노스 기자;아시다시피 저희 크로노스 스쿨은 키보토스에서 가장 신속하고 정확하며 공정한 보도를 전해드리는 것을 목표로 하고 있으며."
1011405-48 = "3;주리 아르바이트;06\n#na;크로노스 기자;이번에도 그 목표를 지킬 수 있어서 정말로 다행이라고 생각합니다!"
1011405-49 = "3;주리 아르바이트;06\n#na;크로노스 기자;아울러 주리 씨와 같은 분들이 든든하게 자리를 지켜 주시는 한, 키보토스의 미래는 정말로 밝고 창창하다고밖에는–"
1011405-50 = "3;주리 아르바이트;10;조금이라도 좋으니 제 말을 정확히 들어주세요–!!!\n#3;closeup\n#3;hophop"
1011405-51 = "#all;hide"
1011405-52 = "3;주리 아르바이트;10;훌쩍…….\n#3;a\n#3;em;[훌쩍]"
1011405-53 = "[ns3] \"…….\"\n[ns4] \"그 뭐냐, 고생 많았어. 특히 마지막…….\""
1011405-54 = "#wait;10"
1011405-55 = "#wait;10"
1011405-56 = "3;주리 아르바이트;07;그리고 저는 잘 몰랐는데, 어느새 인터넷에도 소문이 전부 퍼져 있다더라고요……."
1011405-57 = "3;주리 아르바이트;04;막상 크로노스 분들이 기사를 긍정적으로 작성해 주셔서요. 매니저님께서도 축하해 주셨고…….\n#3;em;[땀]"
1011405-58 = "3;주리 아르바이트;04;축하해 주시는 것은 기쁘고 감사했지만, 퇴근길에도 저를 알아보고 사인해 달라는 분까지 계셨어서…….\n#3;stiff"
1011405-59 = "[s] \"그런 시선들이 부담스러웠던 거야?\""
1011405-60 = "3;주리 아르바이트;02;…….\n#3;em;[...]"
1011405-61 = "3;주리 아르바이트;05;아뇨. 그런 것은 아니에요."
1011405-62 = "3;주리 아르바이트;05;저를 알아봐 주시고, 좋아해 주시고, 저와 같이 사진을 찍거나 얼굴을 보고 싶다고 말씀해 주시는 분들이 그렇게 많았는데……."
1011405-63 = "3;주리 아르바이트;06;그런 것이 부담스럽다거나 싫은 것은, 아니에요.\n#3;em;[반응]"
1011405-64 = "3;주리 아르바이트;02;그렇지만 역시, 웨이트리스 일에 조금 매이게 된 것 같아서요."
1011405-65 = "3;주리 아르바이트;04;급양부 일정도 그만큼 빡빡해지고, 약간이지만 예전만큼은 대응하지 못하게 된 느낌도 있고."
1011405-66 = "3;주리 아르바이트;04;그러다 보니 선배에게도 많이 미안하기도 하고요…….\n#3;em;[세로선]"
1011405-67 = "3;주리 아르바이트;06;네……. 슬슬, 선배와 급식실이 기다리는 동아리로 돌아가야 하지 않을까, 그런 생각이 들었어요."
1011405-68 = "3;주리 아르바이트;04;……저에 대한 관심이 조금 과열되다 보니, 카페 자체에도 폐를 끼치게 된 것 같고요……."
1011405-69 = "[s] \"우리, 자리를 조금 옮길까?\""
1011405-70 = "3;주리 아르바이트;02;자리…… 요?\n#3;em;[?]"
1011405-71 = "#all;hide"
1011405-72 = "3;주리 아르바이트;02;여기는…… 선생님께서 사용하시는 휴게실 아닌가요?\n#3;a\n#3;em;[반응]"
1011405-73 = "[s5] \"맞아. 그리고 지금만큼은.\"\n[s6] \"외부로부터 완전히 단절된 곳이기도 하지.\""
1011405-74 = "#wait;10"
1011405-75 = "#wait;10"
1011405-76 = "3;주리 아르바이트;02;네……?"
1011405-77 = "[s] \"우선 말이야, 이 '현상'은…… 머지않아 가라앉을 거야.\""
1011405-78 = "3;주리 아르바이트;04;그리고 급양부로 돌아가는 문제는, 언제든 제 의지대로 그렇게 할 수 있을 거라고요……?"
1011405-79 = "3;주리 아르바이트;02;…….\n#3;em;[...]"
1011405-80 = "3;주리 아르바이트;99;그건…… 그렇겠네요. 선생님. 네. 이런 게 오래 갈 리가 없죠."
1011405-81 = "3;주리 아르바이트;00;크로노스 스쿨 분들이 찾아오셨을 때는 조금 놀라기는 했지만……."
1011405-82 = "3;주리 아르바이트;01;에헤헤. 그분들은 항상 재미있는 일을 찾아다니시곤 하니까요.\n#3;em;[반응]"
1011405-83 = "3;주리 아르바이트;02;그런데 굳이 장소를 바꾸신 이유가 있으신가요?"
1011405-84 = "[s] \"지금 주리에게 필요한 건, 혼자만의 시간인 것 같아서.\""
1011405-85 = "3;주리 아르바이트;02;혼자만의 시간……."
1011405-86 = "3;주리 아르바이트;06;그러고 보니, 요즘 그런 걸 가진 적이 거의 없었네요.\n#3;em;[땀]"
1011405-87 = "3;주리 아르바이트;02;급양부에서 동아리 활동을 했을 때는…… 물론 점심시간 전후로는 엄청 정신없었지만."
1011405-88 = "3;주리 아르바이트;99;지금에 비하면 확실히…… 네. 그랬었던 것 같아요."
1011405-89 = "3;주리 아르바이트;03;감사합니다, 선생님. 신경 써 주셔서요.\n#3;greeting"

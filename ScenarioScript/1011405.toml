[translation]
1011405-1 = "Service of a Waitress"
1011405-2 = "While waiting for Juri, I suddenly heard the sound of urgent knocking."
1011405-9 = "Senseiii!"
1011405-10 = "[s] \"Hey there, Juri! Why don't we calm down a little bit?\""
1011405-11 = "O-Okay... *sniffle*"
1011405-12 = "Hmm? I look like I'm being stalked?"
1011405-13 = "No, it's not that..."
1011405-14 = "But I do have something I need to tell you about."
1011405-15 = "You know, Sensei, I was really lucky to be selected as Waitress of the Month, and I'm not complaining about that, but..."
1011405-18 = "[ns1] \"...So you're telling me...\"\n[ns2] \"You have 10 times as many customers now?!\""
1011405-21 = "At first, I was able to handle them."
1011405-22 = "The Manager was thrilled, since it meant more money, and a lot of the customers recognized me..."
1011405-23 = "It was super embarrassing, but some of them were kind enough to give me words of encouragement. Some asked for selfies..."
1011405-26 = "You're so cute, Juri! Could you strike a pose for us?"
1011405-27 = "Th-Thank you. A pose...? I haven't really done that before..."
1011405-28 = "Oh, that expression was so cute! Way cuter than any pose you can make!"
1011405-29 = "Is that so...?"
1011405-31 = "Hello, everyone! This is the Kronos School of Journalism, with an on-site report!"
1011405-32 = "We're here to interview the latest person of interest, Ushimaki Juri herself! Can you say hello to the viewers?"
1011405-33 = "H-Hello. I'm...Juri..."
1011405-34 = "Yep! Now according to the information we received, Juri recently participated in the Waitress of the Month competition..."
1011405-35 = "Is it true that you swept away all your opponents with a huge glass full of coffee?"
1011405-36 = "What?! N-No, that never happened! I did move some giant cups of coffee, but that was just one of the events..."
1011405-37 = "Goodness, did you hear that, viewers?! It sounds like the information we got was at least half right!"
1011405-38 = "Truly, a fine feat of strength, worth of the Waitress of the Month!"
1011405-39 = "No! Not at all! I didn't do that, I, um...!"
1011405-40 = "Moving onto the next question! According to another report we received, you battled a Millennium robot!"
1011405-41 = "Apparently you said: \"A day may come when waitresses fail and we forsake our duties...\""
1011405-42 = "\"...but it is not this day! Humans aren't created to fail!\" right to the face of that mechanical menace!"
1011405-43 = "And then you claimed victory from that arrogant robot and forced it to self-destruct! Is there any truth to that?!"
1011405-44 = "No! That's not what happened! What I did was, well, um...!"
1011405-45 = "The robot did TRY to self-destruct, so I managed to convince it to not do that..."
1011405-46 = "Did you hear that, everyone?! Again, a report that was almost HALF-true!"
1011405-47 = "As you all know, we here at the Kronos School aim to give the most accurate, most balanced, FASTEST reports in Kivotos."
1011405-48 = "And we're very grateful that we were able to fulfill our duties yet again!"
1011405-49 = "With people like Juri fighting on the front line for us, all this reporter can say is that the future of Kivotos still shines bright—"
1011405-50 = "Please just listen and let me finish!"
1011405-52 = "...*sniffle*"
1011405-53 = "[ns3] \"...\"\n[ns4] \"Well, you did your best. Especially that last bit...\""
1011405-56 = "I didn't know this, but word spread all over the internet too..."
1011405-57 = "The students at Kronos ended up writing a positive report. The Manager congratulated me too..."
1011405-58 = "It's not like I didn't appreciate the acknowledgements, but people even asked for autographs on my way home..."
1011405-59 = "[s] \"All that attention sounds uncomfortable.\""
1011405-60 = "..."
1011405-61 = "It's...not quite that."
1011405-62 = "So many people recognized me, they liked me, they asked me to take pictures with them or just wanted to see my face..."
1011405-63 = "I don't DISlike that, and I'm not uncomfortable with it."
1011405-64 = "But at the same time, it feels like I'm being tied down to my job as a waitress."
1011405-65 = "The work I have at the School Lunch Club is getting more hectic, and I feel like I can't properly take care of everything the way I used to."
1011405-66 = "Which makes me feel guilty for letting down everyone else there..."
1011405-67 = "...so I'm starting to wonder if I should just go back to the cafeteria full-time, where my seniors are waiting."
1011405-68 = "But with so many fans coming to the cafe just for me, if I leave now, that'll leave the cafe in the lurch..."
1011405-69 = "[s] \"Real quick, do you want to take this conversation somewhere else?\""
1011405-70 = "Somewhere...else?"
1011405-72 = "So this is your lounge, huh?"
1011405-73 = "[s5] \"That it is. And for the moment...\"\n[s6] \"It's completely cut off from the outside.\""
1011405-76 = "Hmm...?"
1011405-77 = "[s] \"The kind of celebrity you're experiencing usually dies down fast.\""
1011405-78 = "And then after it does, I can just go back to the School Lunch Club whenever I want to?"
1011405-79 = "..."
1011405-80 = "You're... You're right, Sensei. Yeah. Something like this isn't going to last long."
1011405-81 = "The Kronos School students surprised me, but..."
1011405-82 = "Heeheehee. They always have a nose for a story, I guess."
1011405-83 = "By the way, why exactly are we in here?"
1011405-84 = "[s] \"You looked like you could use some time alone, Juri.\""
1011405-85 = "Some time alone..."
1011405-86 = "Now that you mention it, I haven't had any of that lately."
1011405-87 = "Even when it was just the School Lunch Club...lunch time's always been crazy there."
1011405-88 = "And NOW, well, yeah, \"time alone\" has not been a thing lately."
1011405-89 = "Thank you, Sensei. For thinking of me."
1011405-91 = "For a while afterwards, we continued to talk about whatever came to mind."
1011405-98 = "Not everything in the world needs purpose or meaning. Sometimes, we can just hang out and do nothing."
1011405-106 = "Oh my goodness... Where did the time go?!"
1011405-107 = "[s7] \"Time flies when you're having fun, I guess...\"\n[s8] \"I wish time would go this fast when I'm working.\""
1011405-110 = "You know, I... I think I've been selfish with you, Sensei."
1011405-111 = "Even if you tell me not to worry about it, I... I'm going to."
1011405-112 = "..."
1011405-113 = "But hey, Sensei?"
1011405-114 = "If you'd like...I learned how to make a specialty parfait at the cafe."
1011405-115 = "Do you want to try it?"
1011405-116 = "[s] \"A parfait...from you, Juri?\""
1011405-117 = "Yep! I mean, you don't really have to...if you don't want to."
1011405-118 = "[s9] \"Hmm... Very well. This place is now 'Cafe Schale'.\"\n[s10] \"Let me order one specialty parfait from Ms. Juri, please.\""
1011405-121 = "*gasp*"
1011405-122 = "Yes, of course!"
1011405-123 = "Please wait for one moment, dear \"customer.\""
1011405-124 = "As for the ingredients...oh there's that convenience store nearby!"
1011405-128 = "And so, I waited in the lounge for Juri's special parfait."
1011405-131 = "― [log=주리 아르바이트]Welcome to...[/log][wa:990] "
1011405-132 = "― [log=주리 아르바이트]Cafe \"Schale\"! [/log][wa:1690] "
1011405-135 = "― [log=주리 아르바이트]Yes, here's the special parfait you ordered![/log][wa:10] "
1011405-138 = "― [log=주리 아르바이트]Fufu... This is an interesting feeling...[/log][wa:1310] "
1011405-141 = "― [log=주리 아르바이트]This is a cafe just for you, Sensei.[/log][wa:770] "
1011405-143 = "― [log=주리 아르바이트]And I'm the only waitress here...[/log][wa:1650] "
1011405-146 = "― [log=주리 아르바이트]Sensei, did you know?[/log][wa:1730] "
1011405-148 = "― [log=주리 아르바이트]Parfait...means \"perfect\".[/log][wa:1520] "
1011405-151 = "― [log=주리 아르바이트]I'm not perfect.[/log][wa:2360] "
1011405-152 = "― [log=주리 아르바이트]I'm not even proficient.[/log][wa:1630] "
1011405-155 = "― [log=주리 아르바이트]But one day...I want to make...[/log][wa:1090] "
1011405-157 = "― [log=주리 아르바이트]the perfect parfait.[/log][wa:1810] "
1011405-161 = "[ns] \"Thank you for the treat!\""
1011405-162 = "H-How is it...?!"
1011405-163 = "I would be lying if I said I didn't brace myself just in case, but..."
1011405-164 = "[ns11] \"Huh... This is...not bad!\"\n[ns12] \"It's sweet, but it's also really salty and savory too...!\""
1011405-167 = "Really?!"
1011405-168 = "Now I don't know why you're getting salty and savory from a parfait, but..."
1011405-169 = "Thank goodness... Thank goodness, Sensei! I'm so happy right now!"
1011405-174 = "[ns] \"Whoa, Juri! Calm down!\""
1011405-176 = "Juri threw herself into my arms. I calmed her down."
1011405-177 = "We spent the rest of the day together, until we went back to our own places late at night."

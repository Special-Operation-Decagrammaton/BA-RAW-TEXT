[translation]
1011405-1 = "แฟนเซอร์วิสของพนักงานเสิร์ฟ"
1011405-2 = "(ระหว่างที่กำลังรอจูริ คุณครูก็ได้ยินเสียงเคาะประตูอย่างเร่งรีบ!)"
1011405-9 = "คุณครู~!"
1011405-10 = "[s] \"เข้ามาสิ จูริ! แล้วก็ใจเย็นๆ ก่อนนะ!\""
1011405-11 = "ค่ะ ค่ะ... (สะอื้น)"
1011405-12 = "สงสัยว่าฉันมีเรื่องอะไร และฉันกำลังโดนสะกดรอยตามหรือเปล่าน่ะเหรอคะ?"
1011405-13 = "ไม่ใช่หรอกค่ะ ไม่ใช่การสะกดรอยตามหรอก..."
1011405-14 = "ค่ะ ฉันคงต้องเล่าตั้งแต่เรื่องนั้นสินะคะ"
1011405-15 = "ที่จริงฉันก็ดีใจอยู่หรอกค่ะที่ได้รับคัดเลือกเป็นพนักงานเสิร์ฟดีเด่นประจำเดือน แต่ว่า..."
1011405-18 = "[ns1] \"มีลูกค้ามาร้านเยอะมากเลยงั้นเหรอ?\"\n[ns2] \"ตอนนี้ลูกค้าของร้านเพิ่มขึ้นเป็นสิบเท่าเลยงั้นเหรอ?!\""
1011405-21 = "ตอนแรกฉันก็รับมือไหวอยู่หรอกค่ะ"
1011405-22 = "แน่นอนว่าพอยอดขายเพิ่มขึ้น คุณผู้จัดการร้านก็ดีอกดีใจ แถมยังมีลูกค้าหลายคนที่จำฉันได้ด้วย..."
1011405-23 = "แม้ฉันจะเขินมาก แต่ก็มีลูกค้าที่คอยเชียร์และให้กำลังใจฉันค่ะ แล้วก็มีลูกค้าที่ขอถ่ายรูปด้วยกันด้วย..."
1011405-26 = "น่ารักจังเลยค่ะ คุณจูริ! ช่วยโพสท่าสวยๆ ด้วยได้มั้ยคะ?"
1011405-27 = "ขะ... ขอบคุณค่ะ ท่าสวยๆ งั้นเหรอคะ... ฉันไม่เคยโพสท่าอะไรแบบนั้นหรอกค่ะ..."
1011405-28 = "อ๊ะ หน้าตอนนี้กำลังน่ารักเลย! แบบนี้น่าจะน่ารักกว่าโพสท่าอีกค่ะ!"
1011405-29 = "งะ... งั้นเหรอคะ...?"
1011405-31 = "สวัสดีค่ะผู้ชมทุกท่าน! นี่คือการรายงานข่าวจากสถานที่จริงของชมรมข่าวโครโนสค่ะ!"
1011405-32 = "วันนี้เราจะมาสัมภาษณ์คุณอุชิมากิ จูริ ที่กำลังได้รับความสนใจเป็นอย่างมากในตอนนี้ค่ะ! ช่วยแนะนำตัวก่อนเลยค่ะ!"
1011405-33 = "สะ... สวัสดีค่ะ ฉันชื่อ... จูริค่ะ..."
1011405-34 = "ค่ะ! ตามข้อมูลที่เราได้มา ใน <การแข่งขันพนักงานเสิร์ฟดีเด่นประจำเดือน> ที่โด่งดัง..."
1011405-35 = "จริงหรือเปล่าคะที่คุณจูริโยนแก้วกาแฟขนาดยักษ์ใส่คู่แข่งจนหน้าหงายได้ในครั้งเดียวเลย?!"
1011405-36 = "คะ?!?! ฉะ... ฉันไม่เคยทำอะไรแบบนั้นนะคะ! ฉันได้ยกแก้วกาแฟหนักๆ ก็จริง แต่นั่นก็เป็นแค่การ#nแข่งขันเท่านั้น ไม่ใช่การทำไปเพื่อทำร้ายใคร..."
1011405-37 = "ตายจริง ทุกท่านได้ยินหรือเปล่าคะ! การรายงานข้อมูลของพวกฉันถูกครึ่งหนึ่งค่ะ!"
1011405-38 = "นี่สินะคะที่เรียกกันว่า 'พละกำลัง' ของพนักงานเสิร์ฟดีเด่นอย่างแท้จริง!"
1011405-39 = "ไม่ค่ะ! ไม่ใช่อย่างนั้นนะคะ! ฉันไม่ได้ใช้กำลังของตัวเองโจมตีคนอื่น...!"
1011405-40 = "ไปที่คำถามถัดไปเลยค่ะ! จากอีกข้อมูลที่เราได้มา ในการประชันกับหุ่นยนต์ของมิลเลเนียม คุณจูริได้ทิ้งคำพูดอย่างร้ายกาจไว้ว่า..."
1011405-41 = "'สักวันหนึ่งจุดจบจะมาถึง แล้วเหล่าพนักงานเสิร์ฟอย่างฉันก็คงหายไปในที่สุด'"
1011405-42 = "'แต่มันไม่ใช่วันนี้หรอก มนุษย์ไม่ได้ถูกสร้างออกมาให้ยอมแพ้หรอกนะ'..."
1011405-43 = "ว่ากันว่าคุณจูริเอาชนะหุ่นยนต์ของมิลเลเนียมที่อวดดีแล้วระเบิดพวกนั้นทิ้งไปเลย นั่นเป็นเรื่องจริงหรือเปล่าคะ?!"
1011405-44 = "ไม่ค่ะ! ไม่ใช่อย่างนั้นอย่างแน่นอนค่ะ!!! ฉันไม่ได้ทำอย่างนั้นเลยนะคะ...!"
1011405-45 = "หุ่นยนต์เหล่านั้นพยายามจะระเบิดทำลายตัวเอง ฉันก็เลยไปห้ามไว้ต่างหาก..."
1011405-46 = "ได้ยินหรือเปล่าคะผู้ชมทุกท่าน! ครั้งนี้ข้อมูลของเราก็ถูกตั้งครึ่งหนึ่งค่ะ!"
1011405-47 = "อย่างที่ทุกท่านทราบว่าโรงเรียนโครโนสของเรามีเป้าหมายในการรายงานข่าวที่รวดเร็ว แม่นยำ และเป็นธรรมที่สุดในคิโวทอส"
1011405-48 = "ฉันโล่งใจจริงๆ ค่ะที่เราก็รักษาเป้าหมายนั้นไว้ได้อีกครั้ง!"
1011405-49 = "ตราบใดที่เรามีคนที่ยืนหยัดอย่างคุณจูริ อนาคตของคิโวทอสก็คงสดใสและรุ่งเรืองตลอดไป..."
1011405-50 = "ได้โปรดฟังที่สิ่งที่ฉันพูดให้ชัดเจนด้วยเถอะค่ะ!!!"
1011405-52 = "(สะอื้น...)"
1011405-53 = "[ns3] \"......\"\n[ns4] \"ต้องเหนื่อยน่าดูเลยนะ โดยเฉพาะตอนสุดท้าย...\" "
1011405-56 = "ฉันก็ไม่รู้ว่าเป็นแบบนั้นไปได้ยังไง แต่ตอนนี้ข่าวลือก็แพร่ไปทั่วอินเทอร์เน็ตแล้วค่ะ..."
1011405-57 = "ที่จริงทางโครโนสก็เขียนข่าวให้ในเชิงบวก คุณผู้จัดการร้านก็มาแสดงความยินดีกับฉันด้วย..."
1011405-58 = "ฉันก็ดีใจและรู้สึกขอบคุณสำหรับการแสดงความยินดีอยู่หรอกนะคะ แต่หลังเลิกงานแล้วก็ยังมีคนที่จำ#nฉันได้และมาขอลายเซ็นฉัน"
1011405-59 = "[s] \"ลำบากใจที่มีคนเข้าหาแบบนั้นเหรอ?\""
1011405-60 = "......"
1011405-61 = "ไม่หรอกค่ะ ไม่ใช่อย่างนั้นหรอก"
1011405-62 = "มีคนมากมายที่จำฉันได้ พวกเขาชื่นชอบในตัวฉัน ทั้งขอถ่ายรูป แล้วยังบอกฉันว่าอยากเจอตัวจริงๆ สักครั้งด้วย..."
1011405-63 = "ฉันไม่ได้ไม่ชอบหรือรู้สึกว่าหนักใจหรอกค่ะ"
1011405-64 = "แต่ปัญหาก็คือ เรื่องแบบนี้ทำให้ฉันเริ่มผูกพันกับงานของพนักงานเสิร์ฟน่ะค่ะ"
1011405-65 = "ตอนนี้ตารางงานของชมรมโภชนาการก็แน่นกว่าเดิมด้วย แล้วฉันก็แอบรู้สึกว่าจัดการได้ไม่ดีเหมือนแต่#nก่อน"
1011405-66 = "พอเป็นแบบนี้ ฉันก็รู้สึกผิดต่อรุ่นพี่มากๆ เลยค่ะ..."
1011405-67 = "ค่ะ... ฉันเริ่มคิดว่าต้องกลับไปยังชมรมที่มีรุ่นพี่และโรงอาหารรออยู่แล้วค่ะ"
1011405-68 = "พอผู้คนให้ความสนใจในตัวฉันมากเกินไป มันก็สร้างปัญหาให้กับทางคาเฟ่ด้วยค่ะ..."
1011405-69 = "[s] \"ครูว่าเราเปลี่ยนที่กันดีมั้ย?\""
1011405-70 = "เปลี่ยนที่... งั้นเหรอคะ?"
1011405-72 = "ที่นี่... คือห้องพักผ่อนที่คุณครูใช้นี่คะ?"
1011405-73 = "[s5] \"ใช่แล้วละ ที่นี่ไม่มีใครเข้ามาหรอก\"\n[s6] \"ใช่แล้วละ เป็นที่ที่ตัดขาดกับโลกภายนอกได้ดีเลยละ\""
1011405-76 = "คะ...?"
1011405-77 = "[s] \"สิ่งที่จูริเจอในตอนนี้... เดี๋ยวมันก็จะค่อยๆ สงบลงนะ\""
1011405-78 = "ส่วนเรื่องการกลับไปชมรมโภชนาการ ฉันจะทำเมื่อไรก็ได้ที่ฉันต้องการงั้นเหรอคะ...?"
1011405-79 = "......"
1011405-80 = "มันก็... คงจะเป็นอย่างนั้นนะคะคุณครู ใช่แล้วค่ะ เรื่องแบบนี้คงไม่มีทางอยู่ตลอดไปหรอกค่ะ"
1011405-81 = "แม้ว่าตอนที่คนจากโรงเรียนโครโนสมาหา ฉันจะแอบตื่นเต้นอยู่นิดหน่อยก็เถอะ..."
1011405-82 = "แหะๆๆ ก็นักเรียนจากที่นั่นชอบหาเรื่องสนุกๆ มาทำข่าวอยู่ตลอดนี่คะ"
1011405-83 = "ว่าแต่ทำไมคุณครูถึงอยากให้เปลี่ยนสถานที่งั้นเหรอคะ?"
1011405-84 = "[s] \"ครูคิดว่าจูริน่าจะต้องการเวลาส่วนตัวบ้างน่ะ\""
1011405-85 = "เวลาส่วนตัว..."
1011405-86 = "จะว่าไป หมู่นี้ฉันก็แทบจะไม่มีเวลาส่วนตัวเลยค่ะ"
1011405-87 = "ตอนทำงานของชมรมที่ชมรมโภชนาการ... แน่นอนว่าฉันจะยุ่งมากในช่วงก่อนและหลังเวลาอาหาร#nกลางวัน"
1011405-88 = "แต่ถ้าเทียบกับตอนนี้แล้ว... ใช่ค่ะ ฉันยุ่งเกือบทั้งวันจนไม่มีเวลาให้ตัวเองเลยค่ะ"
1011405-89 = "ขอบคุณที่เอาใจใส่กันนะคะ คุณครู"
1011405-91 = "(หลังจากนั้นทั้งสองคนก็พูดคุยเรื่องไร้สาระนู่นนี่กันอยู่พักใหญ่)"
1011405-98 = "(เพราะบางอย่างก็ไม่จำเป็นต้องมีสาระอยู่ตลอดก็ได้)"
1011405-106 = "เอ๋...? เวลาล่วงเลยมาขนาดนี้แล้วเหรอคะ?!"
1011405-107 = "[s7] \"นั่นสินะ คุยเพลินจนลืมเวลาไปเลย...\"\n[s8] \"ตอนทำงาน~ ถ้าเวลาผ่านไปเร็วๆ แบบนี้~ ก็ดีสินะ~\""
1011405-110 = "พอมาคิดดูแล้ว... เหมือนว่าฉันมาเสียมารยาทกับคุณครูเป็นอย่างมากเลยค่ะ..."
1011405-111 = "ต่อให้บอกว่าไม่ต้องคิดมาก แต่ฉันก็ยังคิดมากอยู่ดีค่ะ!"
1011405-112 = "......"
1011405-113 = "อืม คุณครูคะ?"
1011405-114 = "ฉันเรียนวิธีทำสเปเชียลพาร์เฟต์มาจากคาเฟ่ด้วย... ถ้าคุณครูไม่ว่าอะไรละก็"
1011405-115 = "ให้ฉันทำให้ แล้วคุณครูลองชิมดูหน่อยมั้ยคะ?"
1011405-116 = "[s] \"พาร์เฟต์... ของจูริงั้นเหรอ?\""
1011405-117 = "ค่ะ! แต่ก็ไม่ต้องถึงกับ... ฝืนกินก็ได้ค่ะ"
1011405-118 = "[s9] \"ฮืม... ดีเลย งั้นก็เปิด 'คาเฟ่ชาเล่ต์' กัน\"\n[s10] \"งั้นขอสเปเชียลพาร์เฟต์ของคุณจูริหน่อยนะ\""
1011405-121 = "!!!"
1011405-122 = "ค่ะ ค่ะ!"
1011405-123 = "ช่วยรอสักครู่นะคะ 'คุณลูกค้า'"
1011405-124 = "ฉันจะ... รีบไปซื้อวัตถุดิบจากร้านสะดวกซื้อแถวนี้มาค่ะ!"
1011405-128 = "(แล้วคุณครูก็รอชิมสเปเชียลพาร์เฟต์ของจูริอยู่ในห้องพักผ่อน)"
1011405-131 = "― [log=주리 아르바이트]ยินดีต้อนรับสู่[/log][wa:910] "
1011405-132 = "― [log=주리 아르바이트]คาเฟ่ 'ชาเล่ต์' ค่ะ [/log][wa:1490] "
1011405-135 = "― [log=주리 아르바이트]ค่ะ สเปเชียลพาร์เฟต์ที่สั่งได้แล้วค่ะ![/log][wa:10] "
1011405-138 = "― [log=주리 아르바이트]ฮุฮุ รู้สึกแปลกใหม่จังเลยค่ะ[/log][wa:1830] "
1011405-141 = "― [log=주리 아르바이트]ในแง่หนึ่ง ที่นี่คือคาเฟ่สำหรับคุณครูเท่านั้น[/log][wa:410] "
1011405-143 = "― [log=주리 아르바이트]แล้วฉันก็ได้เป็นพนักงานเสิร์ฟคนเดียวของคาเฟ่นี้...[/log][wa:970] "
1011405-146 = "― [log=주리 아르바이트]คุณครู รู้หรือเปล่าคะ?[/log][wa:1690] "
1011405-148 = "― [log=주리 아르바이트]คำว่าพาร์เฟต์... แปลว่าสมบูรณ์แบบค่ะ[/log][wa:1120] "
1011405-151 = "― [log=주리 아르바이트]แน่นอนว่าฉันยังไม่สมบูรณ์แบบ[/log][wa:1880] "
1011405-152 = "― [log=주리 아르바이트]แล้วก็ยังไม่เก่งเท่าไรด้วย...[/log][wa:1430] "
1011405-155 = "― [log=주리 아르바이트]แต่สักวันหนึ่ง... ฉันก็คิดว่าอยากทำให้ได้ค่ะ[/log][wa:570] "
1011405-157 = "― [log=주리 아르바이트]ทำ 'พาร์เฟต์'... หรืออาหารที่สมบูรณ์แบบน่ะค่ะ[/log][wa:810] "
1011405-161 = "[ns] \"เอาละ ถ้างั้นครูจะกินให้อร่อยเลย!\""
1011405-162 = "ปะ... เป็นยังไงบ้างคะ...!"
1011405-163 = "(ที่จริงถ้าบอกไปว่าไม่ได้เตรียมใจไว้ก็คงเป็นการโกหก...)"
1011405-164 = "[ns11] \"หืม...? มีรสเค็มที่กลมกล่อม ใช้ได้เลยนะเนี่ย?\"\n[ns12] \"นอกจากรสหวานแล้ว รสเค็มที่กลมกล่อมก็โดดเด่นเลยนะ...!\""
1011405-167 = "จริงเหรอคะ?!"
1011405-168 = "ถึงคุณครูจะพูดเหมือนชมกัน แต่ฉันก็ไม่เข้าใจเท่าไรค่ะว่าทำไมพาร์เฟต์ถึงมีรสเค็มและรสกลมกล่อมได้..."
1011405-169 = "แต่ถึงยังไงก็โล่งอกไปทีนะคะ... โล่งอกจริงๆ เลย... คุณครู! รู้หรือเปล่าคะว่าตอนนี้ฉันมีความสุขมาก#nเลยค่ะ"
1011405-174 = "[ns] \"เดี๋ยว จูริ? ใจเย็นๆ ก่อน!\""
1011405-176 = "(จู่ๆ จูริก็เข้ามากอดจนคุณครูต้องทำให้เธอสงบลง)"
1011405-177 = "(หลังจากใช้เวลาอย่างสนุกสนานด้วยกันจนถึงดึกดื่น ทั้งสองคนก็บอกลากัน)"

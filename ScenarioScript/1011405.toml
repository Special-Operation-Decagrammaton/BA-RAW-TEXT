[translation]
1011405-1 = "服務生的服務"
1011405-2 = "（在等待茱莉的時候，突然傳來了急切的敲門聲！）"
1011405-9 = "老師～！"
1011405-10 = "[s]「快進來吧，茱莉！還有你先冷靜！」"
1011405-11 = "好，好的……嗚嗚……"
1011405-12 = "問我發生了什麼？是不是遇到跟蹤狂了？"
1011405-13 = "不，不是跟蹤狂……"
1011405-14 = "嗯，應該要先從這件事說起……"
1011405-15 = "事情是這樣的，老師。#n我獲選本月服務生雖然很好……"
1011405-18 = "[ns1]「咖啡廳的來客數……」\n[ns2]「大概增長了十倍以上！？」"
1011405-21 = "一開始還算能應付過來。"
1011405-22 = "營業額的相應增加讓經理很高興，也有人認出我來……"
1011405-23 = "雖然有點害羞，但許多人都會為我加油打氣，還有人想跟我合照……"
1011405-26 = "你本人好可愛哦，茱莉同學！#n可以請你擺幾個特別的姿勢嗎？"
1011405-27 = "謝，謝謝你。#n可是特別的姿勢……我從來沒有嘗試過……"
1011405-28 = "啊，剛才的表情真的很可愛耶！#n比起特別的姿勢，我更喜歡剛才的表情！"
1011405-29 = "是，是這樣嗎……？"
1011405-31 = "大家好！克洛盧斯新聞部來進行現場的獨家突擊採訪了！"
1011405-32 = "這次我們要訪問的是最近的話題人物──牛牧茱莉同學！#n請先跟大家打個招呼吧！"
1011405-33 = "大，大家好？我的名字叫做……茱莉……"
1011405-34 = "嗯！根據爆料指出，茱莉同學在知名的「服務生選拔大會」上……"
1011405-35 = "用裝滿咖啡的巨大玻璃杯，一舉擊退了眾多競爭者的干擾，這是真的嗎！？"
1011405-36 = "咦咦！？沒，沒有啦！#n雖然確實有端很重的咖啡杯，但那只是大會的比賽項目而已……"
1011405-37 = "什麼！各位觀眾們都聽到了嗎？#n他本人親自證實了爆料內容至少有一半是真的！"
1011405-38 = "居然擁有如此高強的「武力」，真不愧是本月服務生！"
1011405-39 = "不！不是！我沒有那樣，我剛才是說……！"
1011405-40 = "那麼下一個問題！#n根據另一個爆料，茱莉同學在與千年製機器人的對決中留下了……"
1011405-41 = "「我的時代總有一天會畫下句點。像我這樣的服務生遲早會被淘汰──」"
1011405-42 = "「但那並不是今天──人類敗北的時候尚未到來！」這樣硬派的宣言之後……"
1011405-43 = "打敗了傲慢的千年製機器人還讓它自爆了，請問這是事實嗎！？"
1011405-44 = "不是！真的不是！！！#n我才沒有做那種事，實際上只是……！"
1011405-45 = "因為那個機器人突然說要自爆，我好不容易才阻止了它……"
1011405-46 = "各位有聽到嗎！他再次證實了爆料的可信程度！"
1011405-47 = "眾所周知，我們克洛盧斯學園致力於向奇普托斯提供最迅速準確公正的報導。"
1011405-48 = "這次也很榮幸能貫徹這個目標！"
1011405-49 = "有像茱莉同學這樣優秀的人始終堅守著自己的崗位，#n奇普托斯的未來，想必會是一片光明──"
1011405-50 = "拜託好好聽我解釋──！！！"
1011405-52 = "嗚嗚……"
1011405-53 = "[ns3]「……」\n[ns4]「那個，真是辛苦你了。尤其是最後那段……」"
1011405-56 = "詳情我也不太清楚，但謠言好像已經傳遍網路了……"
1011405-57 = "雖然克洛盧斯的報導寫得很正面，經理他也有恭喜我……"
1011405-58 = "大家的祝賀也讓我感到高興跟感謝，#n可是就連下班回家的路上都有人認出我，跟我要簽名……"
1011405-59 = "[s]「大家的關注會讓你有壓力嗎？」"
1011405-60 = "……"
1011405-61 = "不，不是那樣的。"
1011405-62 = "有很多人認出我、喜歡我，想一起拍照或見我一面……"
1011405-63 = "我不覺得這是種困擾，或者感到有壓力。"
1011405-64 = "只是，這讓我有種被服務生的工作綁住了的感覺。"
1011405-65 = "就連供給部的工作也漸漸開始應付不過來……"
1011405-66 = "對前輩很不好意思……"
1011405-67 = "所以……我正在思考，自己是不是該回到前輩和廚房都在等待我的社團去了。"
1011405-68 = "況且大家對我的過度追捧，好像也對咖啡廳造成了一些負面影響……"
1011405-69 = "[s]「我們換個地方聊聊吧？」"
1011405-70 = "換個地方……？"
1011405-72 = "這裡……不是老師的休息室嗎？"
1011405-73 = "[s5]「沒錯，而且現在……」\n[s6]「這裡完全與外部隔絕。」"
1011405-76 = "嗯……？"
1011405-77 = "[s]「首先我想說的是，這個『現象』……很快就會平息下來。」"
1011405-78 = "至於要不要回到供給部，隨時都可以照我的意思去做……？"
1011405-79 = "……"
1011405-80 = "這……說的也是呢，老師。#n這種狀況應該不會持續太久才對。"
1011405-81 = "雖然克洛盧斯學園的人出現的時候，我真的嚇了一大跳……"
1011405-82 = "耶嘿嘿。畢竟那些人總是在到處挖掘新鮮事嘛。"
1011405-83 = "不過老師為什麼要特地換個地方呢？"
1011405-84 = "[s]「因為我覺得，茱莉現在最需要的就是屬於自己的時間。」"
1011405-85 = "自己的時間……"
1011405-86 = "這麼說來，我最近好像真的很久沒有屬於自己的時間了呢。"
1011405-87 = "雖然供給部在午餐時間前後也非常忙碌……"
1011405-88 = "不過和現在相比……嗯，好像真的是這樣沒錯呢。"
1011405-89 = "謝謝老師這麼為我著想。"
1011405-91 = "（之後的好一段時間內，都和茱莉聊著一些沒什麼意義的瑣事）"
1011405-98 = "（畢竟人生本來就不是凡事都要追求某些意義）"
1011405-106 = "咦……？不知不覺間已經這麼晚了！？"
1011405-107 = "[s7]「就是說啊，時間過得好快……」\n[s8]「如果工作的時候～時間也這樣過就好了～」"
1011405-110 = "回頭想想……我好像對老師做了很失禮的事……"
1011405-111 = "就算老師說沒關係，我還是會很在意！"
1011405-112 = "……"
1011405-113 = "那個，老師？"
1011405-114 = "如果你不介意的話……我在咖啡廳學到了特製百匯的食譜。"
1011405-115 = "老師願意嚐嚐看嗎？"
1011405-116 = "[s]「茱莉的……百匯？」"
1011405-117 = "嗯！不過如果不喜歡的話……不用勉強哦？"
1011405-118 = "[s9]「嗯……好，那麼現在這裡就是『Café．Schale』。」\n[s10]「請給我一份茱莉同學的特製百匯。」"
1011405-121 = "！！！"
1011405-122 = "好，好的！"
1011405-123 = "請您稍等，「客人」。"
1011405-124 = "食材……在附近的便利商店應該就能買齊！"
1011405-128 = "（於是就這樣，在休息室等待茱莉製作特製百匯）"
1011405-131 = "— [log=주리 아르바이트]歡迎光臨[/log][wa:1310] "
1011405-132 = "— [log=주리 아르바이트]「Café．Schale」！[/log][wa:1690] "
1011405-135 = "— [log=주리 아르바이트]來，這是您點的特製百匯！[/log][wa:960] "
1011405-138 = "— [log=주리 아르바이트]呵呵……感覺真不可思議。[/log][wa:2430] "
1011405-141 = "— [log=주리 아르바이트]這裡是老師專屬的咖啡廳──[/log][wa:1650] "
1011405-143 = "— [log=주리 아르바이트]我則是那間咖啡廳裡……唯一的服務生……[/log][wa:2170] "
1011405-146 = "— [log=주리 아르바이트]老師，你知道嗎？[/log][wa:2210] "
1011405-148 = "— [log=주리 아르바이트]百匯這個詞……似乎有「完美」的意思。[/log][wa:1800] "
1011405-151 = "— [log=주리 아르바이트]雖然我的料理技術別說是完美……[/log][wa:2360] "
1011405-152 = "— [log=주리 아르바이트]甚至還差的很遠……[/log][wa:2190] "
1011405-155 = "― [log=주리 아르바이트]但是有朝一日……我也希望能夠做出來。[/log][wa:1610] "
1011405-157 = "— [log=주리 아르바이트]「Parfait」……完美的料理。[/log][wa:1890] "
1011405-161 = "[ns]「那麼，我要開動了！」"
1011405-162 = "怎，怎麼樣呢……！"
1011405-163 = "（坦白講，要說自己一點都不緊張是騙人的……）"
1011405-164 = "[ns11]「嗯……雖然味道有點獨特，但還不錯耶？」\n[ns12]「除了甜味之外，鹹味和鮮味也很強烈……！」"
1011405-167 = "真的嗎！？"
1011405-168 = "雖，雖然我自己也不知道為什麼百匯會有強烈的鹹味和鮮味……"
1011405-169 = "不過真是太好了……#n老師！我真的非常開心！"
1011405-174 = "[ns]「哇啊，茱莉！你先冷靜！」"
1011405-176 = "（連忙安撫突然撲到自己懷中的茱莉）"
1011405-177 = "（共度愉快的時光到深夜之後，才各自回到了自己的崗位上）"

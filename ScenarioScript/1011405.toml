1011405-106 = "3;주리 아르바이트;10;어……? 어느새 시간이 이렇게 되었네요?!\n#3;a\n#3;em;[?!]\n#3;shake"
1011405-107 = "[s7] \"그러게. 시간 참 잘 간다…….\"\n[s8] \"일할~ 때도~ 이렇게~ 시간이~ 가면~ 얼마나~ 좋을까~\""

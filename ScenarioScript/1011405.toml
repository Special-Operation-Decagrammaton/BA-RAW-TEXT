1011405-114 = "3;주리 아르바이트;04;괜찮으시다면…… 카페에서 스페셜 파르페를 만드는 법을 배웠는데."
1011405-115 = "3;주리 아르바이트;08;한 번, 드셔 보시겠어요?"
1011405-116 = "[s] \"주리의…… 파르페?\""

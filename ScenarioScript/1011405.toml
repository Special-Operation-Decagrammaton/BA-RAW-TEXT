1011405-110 = "3;주리 아르바이트;06;생각해 보니…… 저, 선생님께 너무 실례되는 일을 한 것 같아요……."
1011405-111 = "3;주리 아르바이트;05;신경 쓰지 않아도 된다고 하셔도, 제가 신경 쓰이는걸요!\n#3;em;[!]"

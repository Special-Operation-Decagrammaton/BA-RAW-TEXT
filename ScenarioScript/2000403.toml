[translation]
2000403-1 = "海邊的狙擊手"
2000403-3 = "（收到麻白的訊息後，馬上來到約好的海邊，卻沒看見麻白的身影）"
2000403-4 = "[s] 「咦，麻白……？」"
2000403-5 = "啊，老師。我一直在等你呢。"
2000403-6 = "[s1] 「麻白？你在哪裡啊？」\n[s2] 「只聽見聲音，但沒看見人影……」"
2000403-7 = "嗯，與其說近在眼前……"
2000403-8 = "嗯，與其說近在眼前……"
2000403-9 = "不如說近在腳邊。"
2000403-10 = "[s] 「腳邊……？」"
2000403-13 = "呵呵，原來如此。距離這麼近也不會被察覺……"
2000403-14 = "很不錯，看來這次的衣服是買對了。"
2000403-15 = "[s3] 「我完全沒發現……」\n[s4] 「我怎麼會沒注意到呢……？」"
2000403-16 = "我其實一直都在這裡唷。"
2000403-17 = "我其實一直都在這裡唷。"
2000403-18 = "只是我有穿上這套吉利服。"
2000403-19 = "[s] 「吉利服？好像有聽過……？」"
2000403-20 = "簡單來說，是一種大多為狙擊手所使用的迷彩服。"
2000403-21 = "設計的目的是與自然環境融為一體，#n因此擁有絕佳匿蹤的效果，能讓他人無法察覺自己的存在。"
2000403-22 = "這次購買的是沙地用的款式，#n如果是在阿拜多斯這類的地方倒還好，在三一附近根本就沒有能測試的環境……"
2000403-23 = "正巧這次夏季訓練場所是在海邊，所以我就帶來了。"
2000403-24 = "[s] 「原來是這樣。感覺穿起來會很熱呢……」"
2000403-25 = "這也沒辦法，畢竟對狙擊手來說「等待」可是最重要的要領。"
2000403-26 = "也讓我體驗到在這種酷暑環境中的沙地上埋伏有多麼困難……#n不過目前也沒有相關的計畫就是了。"
2000403-27 = "[s] 「……麻白，你在這裡等了多久？」"
2000403-28 = "聯絡老師的三個小時前我就在這裡等了……所以大約是四個小時左右？"
2000403-29 = "跟平常的訓練相比，並不是太長的時間。"
2000403-34 = "那個，老師……？有什麼問題嗎？#n我現在有點……"
2000403-38 = "[ns5] 「麻白，你整個人熱得不得了啊！」\n[ns6] 「快點前往涼爽的地方吧！」"
2000403-39 = "沒，沒事的。而且訓練還沒結束。"
2000403-40 = "沒，沒事的。而且訓練還沒結束。"
2000403-41 = "按照訓練內容，至少還要再一個小時……"
2000403-42 = "……咦？老師？我的視線好像有點模糊……"
2000403-46 = "[ns] 「麻白！」"
2000403-48 = "（趕緊抱起了麻白，奔向附近的醫務室）"
2000403-50 = "無為濱急救中心．醫務室"
2000403-52 = "嗯……"
2000403-53 = "奇怪？這裡是……？"
2000403-54 = "難道我剛才……？"
2000403-55 = "[s] 「八成是中暑了。」"
2000403-56 = "……原來如此。不但沒有管好自己的身體狀況，還給老師造成困擾……真是對不起。"
2000403-57 = "酷暑果然是不能小看的對手……"
2000403-58 = "為了能撐更久一點，回去之後要再多加訓練……"
2000403-59 = "[s] 「不准訓練。」"
2000403-60 = "可，可是，如果不先透過訓練讓身體熟悉，等到實戰時可就麻煩了。"
2000403-61 = "我已經有慢慢習慣了，下次一定不會有問題……"
2000403-62 = "謝謝老師這麼為我擔心，我下次能忍住的……"
2000403-63 = "[s] 「不行。」"
2000403-64 = "但是……"
2000403-65 = "[s] 「要是病倒了，不就無法貫徹正義了嗎？」"
2000403-66 = "……原來如此。這麼一說確實有道理。"
2000403-67 = "如果敵人在我身體欠佳時現身，我一定會無法應對……#n這麼一想，顧好自己的身體也是一種「正義」呢。"
2000403-68 = "我明明是狙擊手，看事情的眼光卻似乎太短淺了……"
2000403-69 = "真不愧是老師。非常謝謝你。"
2000403-70 = "[s] 「等身體慢慢恢復了，再從游泳這類活動開始吧。」"
2000403-71 = "是！那今天我會全力休息的！"
2000403-72 = "[s] 「不需要連休息也那麼努力哦……」"
2000403-75 = "（之後，帶著身體復原的麻白回到了居住設施）"

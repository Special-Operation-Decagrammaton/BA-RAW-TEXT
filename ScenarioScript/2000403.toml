[translation]
2000403-1 = "Beach Sniper"
2000403-3 = "I went to the spot on the beach where we promised to meet after receiving Mashiro's message, but she was nowhere to be found."
2000403-4 = "[s] \"Where are you, Mashiro?\""
2000403-5 = "Oh, there you are, Sensei. I've been waiting."
2000403-6 = "[s1] \"Wait, where is that coming from?\"\n[s2] \"I can hear your voice, but I can't see where you are.\""
2000403-7 = "Uh, well..."
2000403-8 = "Uh, well..."
2000403-9 = "I'm below your feet."
2000403-10 = "[s] \"Below my feet?\""
2000403-13 = "I can't believe you couldn't see me at all."
2000403-14 = "I suppose this was a worthwhile investment after all."
2000403-15 = "[s3] \"I didn't notice you there whatsoever.\"\n[s4] \"Where in the world did you come from?\""
2000403-16 = "Like I said, I was lying in the sand without moving."
2000403-17 = "Like I said, I was lying in the sand without moving."
2000403-18 = "I was trying out the new ghillie suit I bought."
2000403-19 = "[s] \"Ghillie suit?\""
2000403-20 = "Yes, it's a camouflage suit for snipers made by weaving cloth or net."
2000403-21 = "It's very difficult to notice a sniper's presence when they're wearing one of these."
2000403-22 = "This new suit is designed for desert terrain like Abydos, so I didn't have a chance to test it near Trinity."
2000403-23 = "I thought the beach would be a good opportunity to test it out, so I tried it on."
2000403-24 = "[s] \"I thought you were gonna wear the swimsuit for training.\""
2000403-25 = "Yes, for swimming training. Patience is a virtue—especially for snipers."
2000403-26 = "This was a good opportunity to learn how to execute an ambush in a hot climate."
2000403-27 = "[s] \"How long have you been waiting?\""
2000403-28 = "Three hours before I contacted you, so about four in total."
2000403-29 = "Rather short compared to typical sniper training."
2000403-34 = "Is there a problem, Sensei?"
2000403-38 = "[ns5] \"You look like you're burning up!\"\n[ns6] \"I think you need somewhere to cool off!\""
2000403-39 = "No, I'm fine... Training has only just started."
2000403-40 = "No, I'm fine... Training has only just started."
2000403-41 = "If this was a typical sniper mission, I'd have another hour before I..."
2000403-42 = "Huh? Why am I so dizzy all of a sudden?"
2000403-46 = "[ns] \"Stay with me, Mashiro!\""
2000403-48 = "I carried Mashiro to the nearest doctor's office as quickly as I could."
2000403-50 = "Coastal Management Infirmary"
2000403-52 = "Hmm..."
2000403-53 = "Where am I?"
2000403-54 = "Did I pass out?"
2000403-55 = "[s] \"You fainted from heat stroke.\""
2000403-56 = "I see. My lack of strength must have inconvenienced you. My apologies."
2000403-57 = "The sweltering heat is a worthy foe, indeed."
2000403-58 = "I'll have to train even harder so that I'm able to last a little longer."
2000403-59 = "[s] \"No, training is suspended.\""
2000403-60 = "What? But I'll fail in a real combat situation if I don't adjust to the heat in advance."
2000403-61 = "This time was simply bad luck."
2000403-62 = "I promise not to be an inconvenience again. Please approve the training."
2000403-63 = "[s] \"No.\""
2000403-64 = "But..."
2000403-65 = "[s] \"You have to stay healthy if you want to uphold justice.\""
2000403-66 = "I've never thought of it like that before."
2000403-67 = "You have a point. I won't be able to respond properly if criminals appear while I'm exhausted due to excessive training."
2000403-68 = "How like a sniper to be so focused on the distant targets that she forgets what's right in front of her..."
2000403-69 = "Thank you, Sensei. Your advice is always helpful."
2000403-70 = "[s] \"Rest up and let's start with light swimming when you feel better.\""
2000403-71 = "Okay. I'll give it everything I have!"
2000403-72 = "[s] \"If anything, you should be giving it half of what you have...\""
2000403-75 = "We made our way back after Mashiro was done resting."

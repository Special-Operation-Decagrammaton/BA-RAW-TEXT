[translation]
2000403-1 = "#title;해변의 저격수"
2000403-2 = "#wait;2500"
2000403-3 = "#na;마시로의 메시지를 받고 약속한 해변으로 나왔지만, 마시로의 모습은 어디서도 보이지 않았다."
2000403-4 = "[s] \"어라, 마시로……?\""
2000403-5 = "#na;마시로;아, 선생님. 기다리고 있었습니다."
2000403-6 = "[s1] \"……어디에 있는 거야?\"\n[s2] \"……목소리는 들리는 데 모습이 보이질 않아.\""
2000403-7 = "#na;마시로;어, 그러니까……"
2000403-8 = "#na;마시로;어, 그러니까……"
2000403-9 = "#na;마시로;선생님의 발 밑 아래에 있습니다."
2000403-10 = "[s] \"발 밑 아래?\""
2000403-11 = "#zmc;move;0,-222;2528;2000\n#wait;2500"
2000403-12 = "#zmc;move;0,0;3160;250\n#wait;1250\n3;마시로;01\n#3;jump\n#3;a"
2000403-13 = "3;마시로;03;후후, 이렇게 가까이에서도 제 존재를 알아차리지 못하시다니…….\n#3;em;[재잘]"
2000403-14 = "3;마시로;03;역시 사비를 들여 새 옷을 구입한 보람이 있군요."
2000403-15 = "[s3] \"전혀 알아차리지 못했어…….\"\n[s4] \"어디에 있었던거야?\""
2000403-16 = "3;마시로;00;방금 말씀드린 대로 모래사장 위에 가만히 앉아 있었습니다."
2000403-17 = "3;마시로;00;방금 말씀드린 대로 모래사장 위에 가만히 앉아 있었습니다."
2000403-18 = "3;마시로;01;다만 새로 구입한 길리슈트를 착용하고 있었을 뿐이지요."
2000403-19 = "[s] \"길리슈트?\""
2000403-20 = "3;마시로;03;네, 천이나 그물 등을 엮어 만든 저격수용 위장복입니다.\n#3;em;[반짝]"
2000403-21 = "3;마시로;02;이 옷을 걸치고 있으면 여간해서는 저격수의 존재를 알아차릴 수 없지요."
2000403-22 = "3;마시로;99;이번에 구입한 길리슈트는 아비도스와 같은 사막 지형에서 사용되는 사막용 위장복이라, 트리니티 학원 근처에서는 도통 시험해 볼 기회가 없었는데…….\n#3;em;…"
2000403-23 = "3;마시로;01;마침 이번 여름 훈련 장소에 백사장이 있어서 착용해 보았습니다."
2000403-24 = "[s] \"수영복을 입고 훈련을 하는 게 아니었어?\""
2000403-25 = "3;마시로;02;물론 수영복을 입고 하는 수영 훈련도 계획하고 있습니다만, 저격수에게 가장 중요한 덕목은 '기다림'이니까요.\n#3;em;[반응]"
2000403-26 = "3;마시로;01;혹서기 환경에서의 매복이 얼마나 가혹한지 체험해 볼 수 있는 좋은 기회였습니다."
2000403-27 = "[s] \"얼마나 오랫동안 기다리고 있었던 거야?\""
2000403-28 = "3;마시로;99;선생님께 연락을 드리기 세 시간 전부터 기다리고 있었으니…… 대략 네 시간 정도?\n#3;em;…"
2000403-29 = "3;마시로;01;평소의 저격 훈련에 비하면 그리 긴 시간은 아닙니다만."
2000403-30 = "#st;[0,0];instant;1;"
2000403-31 = "#clearST\n3;마시로;01\n#wait;500"
2000403-32 = "3;마시로;01\n#wait;1000\n#3;d"
2000403-33 = "3;마시로;01\n#wait;500\n#3;closeup\n#3;a"
2000403-34 = "3;마시로;00;저, 선생님……? 무슨 문제라도?\n#3;stiff\n#3;em;[?]\n#3;closeup"
2000403-35 = "#st;[0,0];instant;1;"
2000403-36 = "#clearST\n#wait;500"
2000403-37 = "#wait;1500"
2000403-38 = "[ns5] \"피부가 불덩이 같아!\"\n[ns6] \"당장 시원한 곳으로 가자!\""
2000403-39 = "3;마시로;03;하, 하하…… 괜찮습니다. 아직 훈련은 끝나지 않았으니까요.\n#3;em;[반응]\n#3;closeup"
2000403-40 = "3;마시로;03;하, 하하…… 괜찮습니다. 아직 훈련은 끝나지 않았으니까요.\n#3;em;[반응]\n#3;closeup"
2000403-41 = "3;마시로;01;평소의 저격 임무를 고려하면 앞으로 한 시간 정도는 더…….\n#3;closeup"
2000403-42 = "3;마시로;04;……어라? 그런데 갑자기 왜 현기증이……\n#3;closeup\n#3;stiff"
2000403-43 = "#st;[0,0];instant;1;"
2000403-44 = "#clearST\n3;마시로;99\n#3;falldownL\n#wait;1500\n#3;closeup"
2000403-45 = "#all;hide\n#wait;1000"
2000403-46 = "[ns] \"마시로, 정신차려!\""
2000403-47 = "#all;hide"
2000403-48 = "#na;마시로를 황급히 근처의 의무실로 옮겼다."
2000403-49 = "#all;hide"
2000403-50 = "#place;해안관리소 내 의무실"
2000403-51 = "3;마시로;99\n#3;a\n#wait;1500"
2000403-52 = "3;마시로;01;으음…….\n#3;stiff"
2000403-53 = "3;마시로;02;어라? 이곳은……?\n#3;em;[?]"
2000403-54 = "3;마시로;04;혹시 제가 정신을 잃었던 건가요?"
2000403-55 = "[s] \"열사병으로 쓰러졌었어.\""
2000403-56 = "3;마시로;06;그렇군요. 컨디션으로 불량으로 인해 선생님께 폐를 끼치게 되다니…… 면목 없습니다."
2000403-57 = "3;마시로;99;역시 무더위는 만만하게 볼 수 없는 상대네요."
2000403-58 = "3;마시로;05;다음번에는 좀 더 오래 버틸 수 있도록 훈련 강도를 높여야…….\n#3;em;[반응]"
2000403-59 = "[s] \"아니, 훈련은 중지야.\""
2000403-60 = "3;마시로;04;네? 하지만 미리 훈련으로 더위에 익숙해지도록 노력하지 않으면, 정작 실전에서 쓰러질지도 모르는 걸요?\n#3;stiff"
2000403-61 = "3;마시로;06;이번에는…… 운이 나빴을 뿐입니다."
2000403-62 = "3;마시로;06;선생님께는 폐를 끼치지 않을 테니, 부디 허락해주세요.\n#3;em;…"
2000403-63 = "[s] \"안 돼.\""
2000403-64 = "3;마시로;06;하지만……."
2000403-65 = "[s] \"정의로운 사람이라면 자신의 몸도 소중히 여기는 법이야.\""
2000403-66 = "3;마시로;02;자신의 몸을 지키는 것 또한 정의…… 그런 생각은 해보지 못했습니다.\n#3;em;[!]"
2000403-67 = "3;마시로;05;확실히…… 과도한 훈련으로 몸 상태가 나빠졌을 때 악인들이 나타난다면, 제대로 대응할 수 없을 테니까요.\n#3;em;[반응]"
2000403-68 = "3;마시로;99;멀리 있는 표적을 노리느라, 가까운 표적을 놓치고 있었던 것일지도 모르겠습니다."
2000403-69 = "3;마시로;03;역시 선생님의 조언은 언제나 도움이 되는군요. 감사합니다.\n#3;em;[반짝]\n#3;greeting"
2000403-70 = "[s] \"푹 쉬고 몸이 회복되면 가벼운 수영부터 시작하자.\""
2000403-71 = "3;마시로;05;네. 그럼, 오늘은 최선을 다해 휴식하겠습니다!\n#3;em;[!]\n#3;jump"
2000403-72 = "[s] \"휴식에서까지 최선을 다할 필요는 없다니까…….\""
2000403-73 = "#wait;500"
2000403-74 = "#all;hide"
2000403-75 = "#na;시간이 지난 뒤, 회복된 마시로를 데리고 숙소로 돌아왔다."

[translation]
2000403-1 = "สไนเปอร์แห่งชายหาด"
2000403-3 = "(หลังจากได้รับข้อความ คุณครูก็มายังชายหาดที่นัดกันไว้ แต่พอมาถึงแล้วกลับไม่เจอมาชิโระเลย)"
2000403-4 = "[s] \"เอ๋? มาชิโระ...?\""
2000403-5 = "อ๊ะ คุณครู ฉันกำลังรออยู่เลยค่ะ"
2000403-6 = "[s1] \"อยู่ตรงไหนน่ะ...?\"\n[s2] \"ทำไมมาแต่เสียงล่ะ แล้วตัวล่ะอยู่ไหน...?\""
2000403-7 = "อ๋อ... คือว่า..."
2000403-8 = "อ๋อ... คือว่า..."
2000403-9 = "ฉันอยู่ข้างใต้เท้าคุณครูค่ะ"
2000403-10 = "[s] \"ใต้เท้าเหรอ?\""
2000403-13 = "อยู่ใกล้ๆ แบบนี้ยังไม่สังเกตเห็นฉันอีกเหรอ..."
2000403-14 = "ถือว่าคุ้มที่ลงทุนซื้อชุดใหม่มาแล้วละ"
2000403-15 = "[s3] \"ครูดูไม่ออกเลย...\"\n[s4] \"ไปซ่อนอยู่ตรงไหนน่ะ?\""
2000403-16 = "ฉันแค่นอนอยู่บนหาดโดยไม่ขยับตัวเฉยๆ ค่ะ"
2000403-17 = "ฉันแค่นอนอยู่บนหาดโดยไม่ขยับตัวเฉยๆ ค่ะ"
2000403-18 = "แต่ว่าฉันลองใส่ชุดพรางตัวที่เพิ่งซื้อมาใหม่อยู่ด้วย"
2000403-19 = "[s] \"ชุดพรางตัวเหรอ?\""
2000403-20 = "ใช่ค่ะ มันคือชุดพรางตัวของสไนเปอร์ที่ทอจากผ้าและตาข่าย"
2000403-21 = "ถ้าใส่ชุดนี้ไว้ ตอนกลางคืนก็จะไม่มีใครสังเกตเห็นตัวของสไนเปอร์เลยละ"
2000403-22 = "ชุดพรางที่ฉันซื้อมารอบนี้เป็นชุดสำหรับภูมิประเทศทะเลทรายแบบอะบิดอส ก็เลยไม่มีโอกาสได้ใส่#nตอนอยู่แถวๆ สถาบันทรีนิตี้เลย"
2000403-23 = "โชคดีที่ปีนี้เรามาทะเลกัน ฉันเลยคิดว่าเป็นโอกาสเหมาะที่จะได้ลองใส่ดูค่ะ"
2000403-24 = "[s] \"ไม่ใช่ว่าต้องฝึกในชุดว่ายน้ำหรอกเหรอ?\""
2000403-25 = "ที่จริงเราก็มีแพลนฝึกว่ายน้ำที่ต้องใส่ชุดว่ายน้ำค่ะ แต่ว่าสิ่งที่สำคัญที่สุดของสไนเปอร์ก็คือ 'การรอคอย' นี่คะ?"
2000403-26 = "นี่ถือเป็นโอกาสที่ดีเลยค่ะ มันทำให้ได้รู้ว่าการดักซุ่มในสภาพแวดล้อมที่ร้อนจัดมันโหดร้ายแค่ไหน"
2000403-27 = "[s] \"แล้วนั่งรอแบบนี้มานานแค่ไหนแล้ว?\""
2000403-28 = "ฉันติดต่อคุณครูไปเมื่อ 3 ชั่วโมงก่อน... อืม... รวมๆ แล้วน่าจะ 4 ชั่วโมงนะคะ"
2000403-29 = "แต่เทียบกับการฝึกลอบยิงทั่วไปแล้ว ก็ถือว่าไม่นานเท่าไรหรอกค่ะ"
2000403-34 = "มีอะไรหรือเปล่าคะคุณครู?"
2000403-38 = "[ns5] \"ผิวเธอไหม้หมดแล้ว!\"\n[ns6] \"รีบไปที่ร่มๆ เดี๋ยวนี้เลย!\""
2000403-39 = "ฮะฮะ...ไม่เป็นไรหรอกค่ะ ฉันยังฝึกไม่เสร็จเลยนะคะ"
2000403-40 = "ฮะฮะ...ไม่เป็นไรหรอกค่ะ ฉันยังฝึกไม่เสร็จเลยนะคะ"
2000403-41 = "ถ้าดูจากภารกิจลอบยิงจริงๆ แล้ว ฉันคงต้องอยู่แบบนี้อีกสัก... หนึ่งชั่วโมง?"
2000403-42 = "เอ๋? แต่ทำไมจู่ๆ ก็รู้สึกเวียนหัวขึ้นมา..."
2000403-46 = "[ns] \"มาชิโระ! ทำใจดีๆ ไว้!\""
2000403-48 = "รีบพามาชิโระไปยังห้องปฐมพยาบาลที่อยู่ใกล้ๆ"
2000403-50 = "ห้องปฐมพยาบาลในจุดบริการชายหาด"
2000403-52 = "อืม..."
2000403-53 = "เอ๋? ฉันอยู่ที่ไหนน่ะ...?"
2000403-54 = "ฉันเป็นลมไปเหรอคะ?"
2000403-55 = "[s] \"เป็นลมแดดก็เลยหมดสติไปน่ะ\""
2000403-56 = "อย่างนี้นี่เอง ฉันต้องมาทำให้คุณครูเดือดร้อนเพราะความผิดพลาดด้านสุขภาพเหรอคะเนี่ย... น่าละอาย#nที่สุดเลย"
2000403-57 = "อากาศร้อนอบอ้าวไม่ใช่สิ่งที่จะเผชิญหน้าได้ง่ายๆ จริงด้วย"
2000403-58 = "งั้นต่อไปจะต้องเพิ่มระดับการฝึกฝนให้อดทนได้นานกว่านี้แล้ว..."
2000403-59 = "[s] \"ไม่ได้นะ เลื่อนการฝึกออกไปเลย\""
2000403-60 = "คะ? แต่ถ้าไม่ฝึกฝนให้คุ้นเคยกับความร้อนไว้ล่วงหน้าละก็ ฉันอาจจะเป็นลมในการทำภารกิจจริงก็ได้#nนะคะ"
2000403-61 = "ครั้งนี้ก็... แค่โชคไม่ดีเท่านั้นละค่ะ"
2000403-62 = "ต่อไปฉันจะไม่ทำให้คุณครูเดือดร้อนอีก เพราะฉะนั้นอนุญาตให้ฝึกเถอะนะคะ"
2000403-63 = "[s] \"ไม่ได้\""
2000403-64 = "แต่ว่า..."
2000403-65 = "[s] \"คนที่มีความยุติธรรมต้องให้ความสำคัญกับร่างกายตัวเองด้วย\""
2000403-66 = "การดูแลตัวเองก็เป็นอีกหนึ่งความยุติธรรม... ฉันไม่เคยคิดเรื่องนี้มาก่อนเลยค่ะ"
2000403-67 = "ถ้าโหมฝึกหนักมากไปจนร่างกายไม่ไหว แล้วมีคนร้ายโผล่มาละก็ ตอนนั้นฉันคงรับมือไม่ทันแน่ๆ"
2000403-68 = "ฉันอาจจะพลาดเป้าหมายที่อยู่ใกล้ๆ เพราะเอาแต่จะยิงเป้าหมายที่อยู่ไกลออกไป"
2000403-69 = "ความช่วยเหลือของคุณครูเป็นประโยชน์ต่อฉันเสมอเลยค่ะ ขอบคุณนะคะ"
2000403-70 = "[s] \"ไปพักฟื้นร่างกายให้ดีก่อน แล้วมาฝึกว่ายน้ำเบาๆ แล้วกันนะ\""
2000403-71 = "ค่ะ งั้นวันนี้ฉันขอพักผ่อนให้เต็มที่เลยนะคะ!"
2000403-72 = "[s] \"ไม่ต้องเต็มที่ไปกับทุกอย่างก็ได้นะ...\""
2000403-75 = "(เวลาผ่านไปพักใหญ่ เมื่อมาชิโระตื่นแล้ว ทั้งคู่ก็พากันเดินกลับไปยังที่พัก)"

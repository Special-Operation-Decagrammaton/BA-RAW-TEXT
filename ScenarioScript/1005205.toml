[translation]
1005205-1 = "กิจวัตรประจำวันของโนอา เลขาแห่งเซมิน่า"
1005205-2 = "ร้านกาแฟใกล้ๆ โรงเรียนมิลเลเนียม"
1005205-3 = "(หลังจากเสร็จธุระที่มิลเลเนียม คุณครูก็แวะร้านกาแฟใกล้ๆ ก่อนกลับ)"
1005205-7 = "(...โนอากำลังครุ่นคิดอะไรบางอย่าง ท่ามกลางเอกสารกองโตที่วางอยู่รอบๆ ตัวเธอ...)"
1005205-8 = "[ns] \"โนอา...?\""
1005205-9 = "โอ๊ะ คุณครูเองเหรอคะ"
1005205-10 = "ฉันมัวแต่ยุ่งๆ อยู่กับเอกสารจนไม่ได้สังเกตว่าคุณครูมาเลยค่ะ ขออภัยด้วยค่ะ"
1005205-11 = "[s] \"ทำงานอะไรอยู่เหรอ?\""
1005205-12 = "ในฐานะเลขาของเซมิน่า ฉันมีหน้าที่ต้องตรวจสอบคำร้องจดทะเบียนสิทธิบัตรด้วยค่ะ"
1005205-13 = "ใกล้ถึงงานมิลเลเนียมไพรซ์แล้ว นักเรียนโรงเรียนมิลเลเนียมทุกคนก็กำลังทุ่มเทกับการวิจัยอย่างหนัก และยื่นขอจดสิทธิบัตรสิ่งประดิษฐ์ใหม่ๆ เยอะมากค่ะ"
1005205-14 = "การตรวจสอบคำร้องขอจดสิทธิบัตรที่ยื่นในนามของโรงเรียนมิลเลเนียมก็เป็นหนึ่งในงานสำคัญที่เลขา#nของเซมิน่าต้องรับผิดชอบค่ะ"
1005205-15 = "ปกติแล้วฉันจะทำงานอยู่ในห้องสำนักงาน แต่เห็นว่าวันนี้อากาศดีมาก เลยอยากออกมาเปลี่ยน#nบรรยากาศข้างนอกดูบ้างค่ะ"
1005205-16 = "ฮุฮุ การนั่งทำงานใต้แสงแดดอบอุ่นก็ถือว่าเป็นความสง่างามอย่างหนึ่งนะคะ"
1005205-17 = "[s] \"มีอะไรที่ครูช่วยได้รึเปล่า?\""
1005205-18 = "คงไม่ต้องถึงมือคุณครูหรอกค่ะ"
1005205-19 = "ถึงการตรวจสอบคำร้องขอจดสิทธิบัตรนี่จะเป็นหนึ่งในงานที่รับผิดชอบก็จริง แต่ก็เป็นหนึ่งในเรื่องที่ฉัน#nชอบมากเลยค่ะ"
1005205-20 = "และ... คุณครูจากชาเล่ต์คงไม่คิดที่จะพรากความสุขเล็กๆ น้อยๆ ของนักเรียนไปด้วยการอ้างว่าจะช่วย#nหรอกใช่มั้ยคะ?"
1005205-21 = "[s1] \"ถ้าพูดแบบนั้นก็ช่วยไม่ได้นะ...\"\n[s2] \"ถ้างั้นตอนกินกาแฟ ครูขอนั่งดูอยู่ข้างๆ ได้มั้ย?\""
1005205-22 = "คุณครูไม่ต้องใส่ใจฉัน และใช้เวลานั่งดื่มกาแฟได้ตามสบายเลยนะคะ"
1005205-23 = "แน่นอนค่ะ คุณครูไม่ต้องใส่ใจฉัน และใช้เวลานั่งดื่มกาแฟได้ตามสบายเลยนะคะ"
1005205-24 = "หรือว่าจะสังเกตการณ์การทำงานของเลขาของฉันก็ได้นะคะ...?"
1005205-25 = "[s] \"เรื่องสังเกตการณ์น่ะ ขอบายนะ...\""
1005205-26 = "ฮุฮุ ล้อเล่นค่ะ ตอนนี้ฉันไม่ได้เข้าเวรตัวแทนอยู่สักหน่อยนะคะ"
1005205-27 = "ถ้างั้นฉันขอเสียมารยาท... ใช้สมาธิกับงานสักครู่นะคะ"
1005205-29 = "(...ที่ด้านซ้ายของโนอามีเอกสารกองโตวางอยู่)"
1005205-30 = "อันนี้ก็ไปกองซ้าย... อันนี้ก็กองซ้าย..."
1005205-32 = "[ns] \"ใช้เกณฑ์อะไรตอนแยกเอกสารเหรอ?\""
1005205-33 = "ฉันแยกเอกสารโดยคำนึงว่าจะได้รับอนุญาตให้จดสิทธิบัตรหรือไม่ค่ะ"
1005205-34 = "เพื่อให้สะดวกต่อการแยกเอกสารในขั้นตอนต่อไป คำขอที่ตรงตามเงื่อนไขได้รับอนุญาตสิทธิบัตรจะ#nอยู่กองด้านขวา ส่วนที่ไม่ตรงเงื่อนไขก็จะอยู่ด้านซ้ายค่ะ"
1005205-35 = "[s] \"ถ้างั้นเอกสารที่อยู่ด้านซ้ายทั้งหมดนั่น...\""
1005205-36 = "ค่ะ เป็นเอกสารคำร้องที่ไม่ผ่านเงื่อนไขพื้นฐานและจะถูกปฏิเสธไปในภายหลังค่ะ"
1005205-37 = "น่าเสียดายที่ไอเดียหลายๆ อย่างไม่ได้รับการยอมรับว่าเป็นสิ่งประดิษฐ์ และจดสิทธิบัตรได้ค่ะ"
1005205-38 = "แต่ว่าความล้มเหลวคือบ่อกำเนิดของความสำเร็จ หากลองพยายามซ้ำๆ ไปเรื่อยๆ สักวันหนึ่งอาจมีคน#nที่จะเปลี่ยนกระบวนการความคิดของยุคสมัยก็ได้นะคะ"
1005205-39 = "[ns] ดูเอกสารที่อยู่กองด้านซ้าย"
1005205-40 = "คุณครูสนใจ <สุดยอดเครื่องทำความร้อนที่มีประสิทธิภาพถ่ายเทความร้อนได้สูง 99.99%> เหรอคะ?"
1005205-41 = "นั่นก็เป็นคำร้องที่น่าสนใจดีนะคะ แต่ว่ายังจดสิทธิบัตรไม่ได้เนื่องจากเป็น 'สิ่งประดิษฐ์ที่ยังไม่สมบูรณ์' ค่ะ"
1005205-42 = "แนวคิดเรื่องการเคลือบสารกันความร้อนภายในท่อถือเป็นแนวคิดที่ดี แต่ว่าไม่ได้เขียนรายละเอียด#nเกี่ยวกับส่วนผสมที่แน่นอนของสารกันความร้อนมาด้วยน่ะค่ะ"
1005205-43 = "[ns] \"นี่มัน...?\""
1005205-44 = "รายงานการวิจัยของชมรมพัฒนาวัสดุใหม่ที่สังเคราะห์สารระเบิดชนิดใหม่ที่พบขณะที่พัฒนากาว และไม่เคยมีรายงานมาก่อนน่ะเหรอคะ"
1005205-45 = "งานวิจัยที่ค้นพบสารเคมีประดิษฐ์ชนิดใหม่ก็น่าสนใจดีนะคะ แต่ว่า 'การค้นพบ' เพียงอย่างเดียว คงยื่นขอรับสิทธิบัตรไม่ได้หรอกค่ะ"
1005205-46 = "สิทธิบัตรสิ่งประดิษฐ์จะได้รับก็ต่อเมื่อมีวัตถุประสงค์และแรงบันดาลใจในการประดิษฐ์ที่ชัดเจนค่ะ"
1005205-47 = "[ns] \"ถ้างั้นอันนี้...\""
1005205-48 = "สำหรับ <อุปกรณ์ฟอกสีขาวในรูปแบบหน้ากากที่สามารถฟอกสีผิวและสีฟันให้ขาวขึ้นได้พร้อมกัน...>"
1005205-49 = "ถึงจะมีการอธิบายวัตถุประสงค์และหลักการอย่างละเอียด แต่น่าเสียดายมากค่ะที่แนวคิดเดียวกันนี้ มันมีการจดทะเบียนสิทธิบัตรไปแล้วเมื่อเดือนก่อนค่ะ"
1005205-50 = "ไม่ว่าไอเดียจะดีแค่ไหน แต่ถ้าเปิดเผยต่อสาธารณะช้า ก็จะอ้างสิทธิ์ความเป็นเจ้าของได้ยากค่ะ"
1005205-51 = "[s] \"โลกของสิทธิบัตรนี่ลึกซึ้งดีนะ...\""
1005205-52 = "สิทธิบัตรถือเป็นรางวัลประเภทหนึ่งสำหรับนักประดิษฐ์ที่เพียรพยายามสร้างผลงานขึ้นมาค่ะ"
1005205-53 = "หากไม่ดำเนินการพิจารณาอย่างเที่ยงธรรมแล้วละก็ อาจมีคนนำไปใช้ในทางไม่ชอบ หรือทำให้#nนักประดิษฐ์หมดกำลังใจไปก็ได้ค่ะ"
1005205-57 = "ตายจริง นี่มัน..."
1005205-58 = "สิ่งประดิษฐ์ชิ้นนี้ไม่มีส่วนไหนผิดพลาดเลย ฉันคิดว่าน่าจะยื่นจดสิทธิบัตรได้ค่ะ"
1005205-59 = "[s] \"คำขอไม่มีปัญหาเลยเหรอ?\""
1005205-60 = "ค่ะ ตรงตามเงื่อนไขยื่นจดสิทธิบัตรทุกอย่างเลยค่ะ"
1005205-61 = "ถ้าเป็นของชิ้นนี้ คงจะได้รับการยอมรับว่าเป็นสิ่งประดิษฐ์ใหม่ของมิลเลเนียมแน่นอนค่ะ"
1005205-62 = "คุณครูสนใจจะดูสักหน่อยมั้ยคะ?"
1005205-69 = "[ns3] \"อุปกรณ์รวบรวมและวิเคราะห์รูปแบบพฤติกรรมของคุณครูจากชาเล่ต์...\"\n[ns4] \"อุปกรณ์ทำนายตำแหน่งปัจจุบันของคุณครู...?\""
1005205-70 = "ฮุฮุ เป็นไอเดียสิ่งประดิษฐ์ที่น่าสนใจดีนะคะ"
1005205-71 = "ฮุฮุ เป็นไอเดียสิ่งประดิษฐ์ที่น่าสนใจดีนะคะ"
1005205-72 = "ถึงจะเคยมีงานวิจัยการรวบรวมข้อมูลพฤติกรรมของมนุษย์และวิเคราะห์มาหลายครั้งแล้ว..."
1005205-73 = "แต่นี่เป็นครั้งแรกที่มีการระบุบุคคลที่ใช้ศึกษาพฤติกรรม เลยเหมือนจะมีความแตกต่างอยู่กับสิทธิบัตร#nต่างๆ ที่ได้ขอไปก่อนหน้านี้แล้วอยู่นะคะ"
1005205-74 = "นอกจากนี้ มันก็ไม่ใช่หน้าที่ของฉันที่จะตัดสินเรื่องการหาผลกำไรจากสิทธิบัตรด้วย..."
1005205-75 = "แต่ถ้าเป็นอุปกรณ์ที่สามารถคาดเดาตำแหน่งของคุณครูได้ละก็ คงจะมีคนอยากซื้อเยอะมากแน่ๆ เลย#nใช่มั้ยล่ะคะ?"
1005205-77 = "[ns5] \"นี่มันละเมิดความเป็นส่วนตัวนะ!\"\n[ns6] \"สิทธิบัตรแบบนี้มันไม่ถูกต้องนะ!\""
1005205-78 = "โอ๊ะ คุณครูจะยื่นคำร้องคัดค้านเหรอคะ?"
1005205-79 = "โอ๊ะ คุณครูจะยื่นคำร้องคัดค้านเหรอคะ?"
1005205-80 = "ถ้าเป็นคำร้องคัดค้านสิทธิบัตรละก็ เราเปิดรับคำร้องอยู่ตลอดนะคะ..."
1005205-81 = "แต่ว่าคงไม่สามารถยื่นคำร้องด้วยคำพูดได้ เพราะงั้นรบกวนกรอกเอกสารคำร้องแล้วส่งมาด้วยนะคะ"
1005205-83 = "(...หลังจากนั้นก็มีการอภิปรายกันอย่างเผ็ดร้อนเรื่องการคัดค้านคำร้องกันอยู่พักใหญ่...)"

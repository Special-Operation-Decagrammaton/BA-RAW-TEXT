[translation]
1005205-1 = "#title;세미나 서기 노아의 평범한 일과"
1005205-2 = "#place;밀레니엄 학원 근처 카페"
1005205-3 = "#na;(밀레니엄에서의 업무를 마치고 돌아오는 길에 근처의 카페에 들렸다.)"
1005205-4 = "#st;[0,0];instant;1;"
1005205-5 = "#clearST"
1005205-6 = "3;노아;05\n#3;em;[...]\n#wait;3000\n#3;a"
1005205-7 = "#na;(……잔뜩 쌓인 서류 뭉치의 산 가운데에서 노아가 무언가를 골똘히 고민하고 있다.)"
1005205-8 = "[ns] \"……노아?\""
1005205-9 = "3;노아;02;어머나, 선생님이시군요.\n#3;em;[반응]"
1005205-10 = "3;노아;04;업무를 처리하느라 바빠 오신 걸 미처 알아차리지 못했습니다. 부디 양해를.\n#3;greeting"
1005205-11 = "[s] \"무슨 업무를 처리하고 있었는데?\""
1005205-12 = "3;노아;01;세미나의 서기로서 심사 요청이 들어온 특허를 검토하고 있었답니다."
1005205-13 = "3;노아;99;밀레니엄 프라이스를 앞둔 이 시기에는 밀레니엄 학원의 모두가 열심히 연구에 매진하는지라, 새로운 발명 특허도 잔뜩 출원되거든요."
1005205-14 = "3;노아;01;밀레니엄의 이름으로 출원되는 특허를 감정하고 정리하는 것도 세미나의 서기가 처리해야 할 중요한 업무 중 하나랍니다."
1005205-15 = "3;노아;01;본래라면 부실에서 일을 처리했겠지만, 오늘은 날이 좋아서 학원 밖에서 볕을 즐기고 싶어서요."
1005205-16 = "3;노아;03;후후, 따스한 볕 아래에서 밀린 일감을 처리하는 것도 제법 운치가 있네요.\n#3;em;[음표]"
1005205-17 = "[s] \"내가 도와줄 만한 일은 없을까?\""
1005205-18 = "3;노아;04;아뇨, 그러실 필요는 없어요.\n#3;em;[땀]\n#3;stiff"
1005205-19 = "3;노아;01;출원된 특허를 감정하는 건 업무이기도 하지만, 제가 제일 좋아하는 유희이기도 하거든요."
1005205-20 = "3;노아;05;설마…… 샬레의 선생님께서 일을 도와주신다는 핑계로 학생의 작은 즐거움을 빼앗아가지는 않으시겠지요?"
1005205-21 = "[s1] \"그렇다면 어쩔 수 없지만……\"\n[s2] \"대신 커피를 마시는 동안 옆에서 지켜보고 있어도 괜찮을까?\""
1005205-22 = "3;노아;01;물론이에요. 선생님께서는 저를 신경 쓰지 마시고 편하신 대로 여가를 즐겨주세요."
1005205-23 = "3;노아;01;물론이에요. 선생님께서는 저를 신경 쓰지 마시고 편하신 대로 여가를 즐겨주세요."
1005205-24 = "3;노아;02;아니면 서기 활동의 일환으로 저를 관찰하신다든가……?\n#3;em;[반응]"
1005205-25 = "[s] \"관찰 업무는 이제 봐줘…….\""
1005205-26 = "3;노아;03;후훗, 농담이에요. 애초에 지금은 샬레의 당번 활동 중도 아니니까요.\n#3;em;[음표]"
1005205-27 = "3;노아;05;그럼 저는 잠시 업무에 집중하느라…… 실례하겠습니다.\n#3;greeting"
1005205-28 = "#all;hide"
1005205-29 = "#na;(……노아의 왼편에 검토한 서류 다발이 잔뜩 쌓여간다.)"
1005205-30 = "#na;노아;이건 왼쪽…… 이것도 왼쪽……."
1005205-31 = "#all;hide"
1005205-32 = "[ns] \"문서를 정리하는 데 무슨 기준이라도 있는 거야?\""
1005205-33 = "3;노아;02;검토한 서류를 특허의 인정 여부에 따라 정리하고 있었답니다.\n#3;em;[반응]\n#3;a"
1005205-34 = "3;노아;01;나중에 구분하기 쉽도록 특허의 충족 요건을 만족한 문서는 오른쪽, 충족 요건을 만족하지 못한 제안서는 왼쪽에 놓고 있었지요."
1005205-35 = "[s] \"그럼 왼쪽의 이 문서들은 전부……\""
1005205-36 = "3;노아;07;네. 기본 요건을 만족하지 못하여 폐기될 예정인 제안서들입니다."
1005205-37 = "3;노아;04;안타깝지만 모든 아이디어가 발명으로 인정되어 특허로 등록될 수는 없으니까요.\n#3;em;[땀]"
1005205-38 = "3;노아;99;하지만 성공은 실패를 딛고 탄생하는 법. 이런 시도가 거듭되다 보면 언젠가는 시대의 패러다임을 바꿀 새로운 게임 체인저가 완성될지도 모르죠."
1005205-39 = "[ns] 왼쪽의 문서들을 살펴본다."
1005205-40 = "3;노아;02;<99.99%의 열전달 효율을 갖는 궁극의 보일러 기관>에 관심이 있으신가요?\n#3;em;[반응]"
1005205-41 = "3;노아;05;그건 흥미로운 제안이지만, 그건 '미완성 발명'이기 때문에 특허를 발행할 수 없습니다."
1005205-42 = "3;노아;07;연도 안쪽을 열 차단제로 코팅한다는 발상 자체는 좋았지만, 열 차단제의 정확한 성분을 제시하지 못했으니까요."
1005205-43 = "[ns] \"……이건?\""
1005205-44 = "3;노아;03;접착제를 개량하다 기존에 보고된 적 없는 새로운 폭발성 물질을 합성한 신소재개발클럽의 연구 보고서 말씀이시군요.\n#3;em;[반짝]"
1005205-45 = "3;노아;01;새로운 성질을 갖는 화학물질을 발견했다는 연구 자체는 흥미롭지만, '발견' 만으로는 발명 특허를 획득할 수 없으니까요."
1005205-46 = "3;노아;99;발명 특허는 실현 가능한 목적과 동기가 분명해야만 특허를 얻을 수 있답니다."
1005205-47 = "[ns] \"그럼 이건…….\""
1005205-48 = "3;노아;02;<피부 미백과 치아 미백을 동시에 할 수 있는 마스크 형태의 미백 장치> 같은 경우에는……\n#3;em;[...]"
1005205-49 = "3;노아;07;원리도 목적도 구체적으로 기술되어 있지만, 아쉽게도 이 아이디어는 지난달 엔지니어부에서 같은 특허를 먼저 등록했답니다."
1005205-50 = "3;노아;05;아무리 좋은 아이디어라 하더라도 공표가 늦으면 소유권을 주장하기 어렵답니다."
1005205-51 = "[s] \"특허의 세계란 심오하구나…….\""
1005205-52 = "3;노아;01;특허는 열심히 제품을 개발한 발명가들을 위한 일종의 보상이니까요."
1005205-53 = "3;노아;05;심사를 공정하게 처리하지 않으면 악용하는 사람이 생길 수도 있을뿐더러, 자칫 발명가들의 의욕을 꺾게 될 수도 있지요."
1005205-54 = "#st;[0,0];instant;1;"
1005205-55 = "#clearST"
1005205-56 = "3;노아;02\n#3;em;[반응]\n#wait;1000"
1005205-57 = "3;노아;02;어머나, 이건…….\n#3;greeting"
1005205-58 = "3;노아;05;이 발명품은 문제 되는 부분도 없고, 특허를 인정해도 괜찮을 것 같네요."
1005205-59 = "[s] \"그 제안서에는 문제가 없는 거야?\""
1005205-60 = "3;노아;01;네. 특허의 요건을 모두 만족하고 있어요."
1005205-61 = "3;노아;03;이만하면 밀레니엄의 새로운 발명품으로 인정해도 손색이 없겠어요.\n#3;em;[반짝]"
1005205-62 = "3;노아;01;선생님께서도 직접 한번 보시겠어요?"
1005205-63 = "#st;[0,0];instant;1;"
1005205-64 = "#clearST"
1005205-65 = "3;노아;01\n#wait;1000\n#3;d"
1005205-66 = "#wait;1200"
1005205-67 = "3;노아;03\n#3;closeup\n#wait;1000\n#3;a"
1005205-68 = "3;노아;03\n#3;greeting\n#wait;2000\n#3;closeup"
1005205-69 = "[ns3] \"샬레의 선생님의 행동 패턴을 수집하고 분석해서……\"\n[ns4] \"이를 바탕으로 선생님의 현재 위치를 예측하는 기기……?\""
1005205-70 = "3;노아;01;후후, 재미있는 발상이지요?\n#3;closeup\n#3;em;[음표]"
1005205-71 = "3;노아;01;후후, 재미있는 발상이지요?\n#3;closeup\n#3;em;[음표]"
1005205-72 = "3;노아;99;사람의 행동 패턴을 데이터화하여 행동 패턴을 예측하는 연구는 이미 여러 차례 진행되긴 했었지만……\n#3;closeup"
1005205-73 = "3;노아;01;특정한 한 사람, 그것도 선생님을 대상으로 한 연구는 이번에 처음인지라. 기존 특허에 위배되지 않는 충분히 차이가 있는 것 같네요.\n#3;closeup"
1005205-74 = "3;노아;05;게다가 특허의 상업성을 판단하는 건 제 몫이 아니지만……\n#3;em;[...]\n#3;closeup"
1005205-75 = "3;노아;03;선생님이 계신 곳을 예측하는 장치라면 아마 키보토스 내에서 충분히 수요가 있겠지요?\n#3;closeup"
1005205-76 = "#all;hide"
1005205-77 = "[ns5] \"사생활 침해잖아!\"\n[ns6] \"이 특허는 무효야!\""
1005205-78 = "3;노아;02;어머나, 이의신청인가요?\n#3;em;[?!]\n#3;shake\n#3;a"
1005205-79 = "3;노아;02;어머나, 이의신청인가요?\n#3;em;[?!]\n#3;shake"
1005205-80 = "3;노아;05;특허의 무효 신청이라면 언제든지 받고 있긴 합니다만……"
1005205-81 = "3;노아;03;구두로는 청구되지 않으니, 제대로 서류를 갖추어서 신청해 주세요.\n#3;em;[반짝]"
1005205-82 = "#all;hide"
1005205-83 = "#na;(……이후, 한동안 노아가 허가한 특허의 가부를 두고 한동안 열띤 토론을 벌였다.)"

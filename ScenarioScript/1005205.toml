[translation]
1005205-1 = "研討會書記乃愛的平凡日常"
1005205-2 = "千年附近的咖啡廳"
1005205-3 = "（處理完千年的工作後，在回去的路上順道去了新發現的咖啡廳）"
1005205-7 = "（……看見了在堆積如山的文件堆中，正在進行某種工作的乃愛）"
1005205-8 = "[ns]「……乃愛？」"
1005205-9 = "哎呀，老師。"
1005205-10 = "因為太專注於工作，沒發現老師來了，真是不好意思。"
1005205-11 = "[s]「你在處理什麼工作？」"
1005205-12 = "身為研討會的書記，我正在審核專利的申請文件。"
1005205-13 = "畢竟再過不久就要舉辦千年大賞，#n幾乎所有千年的學生都投入於發明及研究當中，因此近期送來的專利申請書特別多。"
1005205-14 = "而審核及整理專利申請文件，也是研討會書記的重要業務之一。"
1005205-15 = "雖然本來應該在部室內處理……#n不過因為今天天氣很好，就跑到外頭來享受一下日光浴了。"
1005205-16 = "呵呵，偶爾在溫暖的陽光下工作也挺不錯的呢。"
1005205-17 = "[s]「有沒有我能幫忙的地方？」"
1005205-18 = "不，沒關係。"
1005205-19 = "雖說審核專利文件是工作，但同時也是我最喜歡的時光。"
1005205-20 = "難道……夏萊的老師想以幫忙的名義，剝奪學生的小小樂趣嗎？"
1005205-21 = "[s1]「那好吧……」\n[s2]「那我可以在一旁邊喝咖啡邊看著吧？」"
1005205-22 = "那當然。老師不用在意我，請好好地享受休息的時光吧。"
1005205-23 = "那當然。老師不用在意我，請好好地享受休息的時光吧。"
1005205-24 = "或者，也可以像上次一樣，在一旁觀察我唷……？"
1005205-25 = "[s]「我已經不想再觀察別人了……」"
1005205-26 = "呵呵，開玩笑的。#n況且我現在也不是在夏萊值班呀。"
1005205-27 = "好了，那我要專心工作了……"
1005205-29 = "（……乃愛的左側開始慢慢堆起審核完畢的文件）"
1005205-30 = "這個是左邊……這個也是……"
1005205-32 = "[ns]「你在分類文件的時候有什麼特別的標準嗎？」"
1005205-33 = "我是按照專利的核發與否來決定的。"
1005205-34 = "為了方便之後分辨，我會把滿足專利申請條件的文件放在右邊，反之則放在左邊。"
1005205-35 = "[s]「這麼說來，左邊的那些文件都是……」"
1005205-36 = "是的，那些都是未滿足申請條件的提案書。"
1005205-37 = "很遺憾，並不是所有創意提案都能被認可為新發明，並且申請到專利。"
1005205-38 = "不過，正所謂失敗為成功之母。#n只要不停地嘗試，就有可能創造出能夠改變時代規則的發明。"
1005205-39 = "[ns] 翻看乃愛左手邊的文件"
1005205-40 = "老師對這個「99.99%熱傳導率的究極鍋爐機」有興趣嗎？"
1005205-41 = "那個提案雖然相當有趣，但目前只能稱得上是「半成品」，因此無法申請專利。"
1005205-42 = "在煙囪內側塗上隔熱劑的想法是不錯，但可惜沒有正確標明隔熱劑的成分。"
1005205-43 = "[ns]「……這個是？」"
1005205-44 = "那是新材料開發部繳交的研究報告書。#n他們似乎在改良黏著劑的過程中發現了一種全新的爆炸性物質。"
1005205-45 = "發現了具有全新特性的化學物質的研究本身雖然相當有趣，#n但光憑「發現」是無法取得專利的。"
1005205-46 = "還必須具備可具體實現的目的及動機才行。"
1005205-47 = "[ns]「那這個……」"
1005205-48 = "「可同時美白肌膚和牙齒的面膜型美白裝置」……"
1005205-49 = "雖然有具體記載其原理及目的，#n只可惜工程師部已經在上個月申請到相同想法的專利了。"
1005205-50 = "無論點子再怎麼棒，只要晚別人一步發表，就很難主張所有權了。"
1005205-51 = "[s]「專利的世界還真是深奧……」"
1005205-52 = "畢竟專利是給沒日沒夜努力研發產品的發明家的一種報酬。"
1005205-53 = "要是審查不夠公正就有可能被濫用，甚至反而阻礙了發明家的動力。"
1005205-57 = "哎呀，這個是……"
1005205-58 = "這個發明看起來沒有什麼問題，我想應該可以核發專利。"
1005205-59 = "[s]「那份提案書沒有任何缺失嗎？」"
1005205-60 = "是的，它滿足了所有條件。"
1005205-61 = "絕對有資格成為我們千年的新發明。"
1005205-62 = "老師也瞧瞧吧？"
1005205-69 = "[ns3]「收集夏萊老師的行為模式並加以分析……」\n[ns4]「藉此預測老師目前所在地點的裝置……？」"
1005205-70 = "呵呵，是個有趣的點子吧？"
1005205-71 = "呵呵，是個有趣的點子吧？"
1005205-72 = "將人類的行為模式數據化，預測其行為模式的研究雖然已有前例……"
1005205-73 = "但針對特定單一對象……也就是「老師」來進行研究還是首例。#n我認為它與其他現有專利並不牴觸，存在一定程度的差異性。"
1005205-74 = "而且，判斷專利是否具備商業價值並非我的管轄範圍……"
1005205-75 = "不過如果是能預測老師所在地點的裝置，我想在奇普托斯內應該會有需求才對。"
1005205-77 = "[ns5]「這根本是侵犯隱私！」\n[ns6]「這項專利無效！」"
1005205-78 = "哎呀，老師想提出異議嗎？"
1005205-79 = "哎呀，老師想提出異議嗎？"
1005205-80 = "如果是專利的無效申請的話，隨時歡迎……"
1005205-81 = "不過以口頭的方式無法受理，麻煩請準備好相關文件後再進行申請哦。"
1005205-83 = "（……之後，和乃愛針對核發專利的標準是否恰當展開了熱烈的討論）"

[translation]
1005205-1 = "The Daily Life of Secretary Noa"
1005205-2 = "Cafe Near Millennium School"
1005205-3 = "I stopped at a nearby cafe on my way back from work."
1005205-7 = "...And spotted Noa contemplating deeply over a pile of paperwork."
1005205-8 = "[ns] \"...Noa?\""
1005205-9 = "Oh, Sensei."
1005205-10 = "Sorry I didn't notice you, I was absorbed in my work."
1005205-11 = "[s] \"So, what's the work that requires so much of your attention?\""
1005205-12 = "One of my duties as Seminar's secretary is to review patents."
1005205-13 = "The Millennium Prize is coming up, so everyone at Millennium is kicking it into high gear, which includes submitting plenty of patent applications."
1005205-14 = "Evaluating and arranging these patents, both during and after application, are important parts of my job."
1005205-15 = "I usually work in the club room, but the weather is so nice today, and I wanted to go somewhere I could enjoy it."
1005205-16 = "Catching up on work under a warm sun is its own sort of cozy."
1005205-17 = "[s] \"Is there anything I can help you with?\""
1005205-18 = "No need."
1005205-19 = "This is my job, but it's also something I genuinely enjoy."
1005205-20 = "Unless... Sensei, you're not still trying to break my composure under the pretext of helping me, are you? Heehee."
1005205-21 = "[s1] \"If I can't help...\"\n[s2] \"Mind if I just drink my coffee next to you?\""
1005205-22 = "Feel free to sit. Don't worry about me and enjoy your time."
1005205-23 = "Feel free to. Don't worry about me and enjoy your time."
1005205-24 = "Or...perhaps you could try observing my every move again?"
1005205-25 = "[s] \"I'm good on record-keeping for now...\""
1005205-26 = "Heehee, just kidding. Unlike me, you don't seem to be on the clock anyway."
1005205-27 = "Speaking of which... I need to get back to this paperwork."
1005205-29 = "As time went on, the neat stacks of reviewed papers climbed ever higher."
1005205-30 = "This one...to the left... This one...also left..."
1005205-32 = "[ns] \"How are you categorizing the documents?\""
1005205-33 = "They are sorted according to whether or not the potential patents meet the basic requirements for consideration."
1005205-34 = "Proposals that meet the requirements are placed on the right. Those that don't are placed on the left."
1005205-35 = "[s] \"Then all these documents on the left are...\""
1005205-36 = "Yes. These are proposals that don't meet the basic requirements and will be discarded."
1005205-37 = "Unfortunately, there are various reasons that not all ideas can be registered as patents."
1005205-38 = "But success is born from failure. If these failures keep piling up, it might result in a game-changing invention, or maybe even a paradigm-shifting one."
1005205-39 = "[ns] Look through the rejected documents."
1005205-40 = "You're not interested in the Unlimited Boiler Works Engine that has 99.99% heat transfer efficiency?"
1005205-41 = "An interesting proposal, to be sure, but it can't be patented because the invention isn't actually complete."
1005205-42 = "The idea of coating the inside with highly insulating material is sound, but the actual materials and method of such insulation were not presented."
1005205-43 = "[ns] \"And this is...?\""
1005205-44 = "A research report from the New Material Development Club. While researching improved adhesives, they somehow synthesized a new explosive substance."
1005205-45 = "The discovery is fascinating, but discovery alone doesn't guarantee a patent."
1005205-46 = "A patent isn't just new knowledge, it is the use and specific application of that knowledge."
1005205-47 = "[s] \"What about this one?\""
1005205-48 = "In the case of the mask that can whiten skin and teeth at the same time..."
1005205-49 = "The patent is perfectly fine...except for the fact that the same thing was already patented by the Engineering Department last month."
1005205-50 = "At the end of the day, patents are about ownership, and in the world of patents, two owners cannot exist."
1005205-51 = "[s] \"The world of patents is profound...\""
1005205-52 = "It can seem cutthroat, but patents are vital in ensuring that the actual creators get due credit."
1005205-53 = "If patents aren't processed fairly, people can abuse the system, which discourages creators from pursuing new ideas."
1005205-57 = "Hmm... This..."
1005205-58 = "Well, this patent application could still make it through."
1005205-59 = "[s] \"Why the initial uncertainty?\""
1005205-60 = "It's an unusual invention, but it satisfies the basic requirements."
1005205-61 = "In fact, I think it would be very useful to Millennium."
1005205-62 = "Would you like to take a look, Sensei?"
1005205-69 = "[ns3] \"Collects and analyzes Sensei's behavioral patterns...\"\n[ns4] \"A device that tracks Sensei based on their every move and thought...?\""
1005205-70 = "Heehee. Interesting, isn't it?"
1005205-71 = "Heehee. Interesting, isn't it?"
1005205-72 = "Predictive analysis based on behavioral patterns and tendencies isn't a novel idea in and of itself..."
1005205-73 = "But this is the first time that it's been applied to a single person, and a teacher no less. It doesn't violate any existing patents, and the proposal is very...comprehensive."
1005205-74 = "And while it's not my job to judge the commercial viability of a patent..."
1005205-75 = "I believe there is plenty of demand in Kivotos for a device that could track you, right?"
1005205-77 = "[ns5] \"This is an invasion of my privacy!\"\n[ns6] \"This patent is complete nonsense!\""
1005205-78 = "Oh my, is that a sales pitch, or an appeal?"
1005205-79 = "Oh my, is that a sales pitch, or an appeal?"
1005205-80 = "You can appeal for the invalidation of a patent, of course, but..."
1005205-81 = "Verbal requests are invalid. Please apply using the proper channels and documentation."
1005205-83 = "After that, we had a heated debate over whether or not the patent was valid. Somehow, I feel like I lost."

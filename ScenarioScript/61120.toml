[translation]
61120-1 = "Episode 12; Field Trip 2"
61120-3 = "Over there, Subaru. Look! In the tree..."
61120-8 = "*sob* My precious baby... My kitty... *sob*"
61120-9 = "Meow..."
61120-14 = "A kitten is stuck in the tree?"
61120-15 = "It must have climbed up there without realizing how hard it would be to get down."
61120-16 = "Heh. I've only read about things like this happening."
61120-17 = "How do we get it down...? I tried my best, but I couldn't do much."
61120-18 = "..."
61120-19 = "I have an idea. Let's handle this Arius-style."
61120-20 = "Excuse me! Please step back!"
61120-24 = "Nyaaaagh?!"
61120-25 = "Wh-Whaaat?!"
61120-29 = "Wh-What are you doing?!"
61120-30 = "Did she just...shoot at the kitten?"
61120-34 = "Hissssss!!"
61120-37 = "Ah... That made it jump down."
61120-42 = "Got you. You're safe now."
61120-45 = "Here, your kitty..."
61120-46 = "*sniffle*..."
61120-47 = "WAAAHHH!"
61120-48 = "Uh, um...?"
61120-49 = "What were you thinking?!"
61120-50 = "What would you have done if my cat got hurt?! Or worse?"
61120-51 = "I-I was just..."
61120-52 = "Creatures tend to freeze if they're afraid."
61120-53 = "So I was just trying to shock it out of that..."
61120-54 = "What're they teaching kids at school these days?!"
61120-56 = "Huh? Look at that emblem! It can't be..."
61120-57 = "No, it is! They're Arius students?"
61120-58 = "They are?! Aren't they the ones who caused the Eden Treaty tragedy?"
61120-59 = "What are you delinquents doing in our neighborhood?!"
61120-64 = "...Ugh. This is why a child's upbringing is important."
61120-65 = "It's not just their fault. Surely part of the problem lies with Kivotos..."
61120-66 = "We're called the Academy City, but look how the students' education has been neglected."
61120-67 = "But other districts aren't nearly as terrible as them..."
61120-68 = "A NORMAL school would never let their kids run amuck like Arius does."
61120-69 = "That's true. Explosions and gun fights may be par for the course, but some kids are just bad kids."
61120-73 = "..."
61120-74 = "Come on, sweetie. You mustn't get too close to those people."
61120-75 = "Why...?"
61120-76 = "Just be good and listen to Mommy, okay?"
61120-77 = "Okay..."
61120-83 = "U-Uhhh..."
61120-84 = "Aaaaaah...!"
61120-85 = "Maia?! What's wrong?!"
61120-89 = "You haven't been paid for five days?"
61120-91 = "So you mean to say you don't have any academic records at all?"
61120-93 = "Get lost. If you're not going to take the job, I don't even want to talk to the likes of you."
61120-95 = "[log]I always thought that if it was outside...[/log]"
61120-97 = "[log]...things would be different.[/log]"
61120-101 = "[log]There's no paradise for runaways.[/log]"
61120-104 = "[log]But I still held onto my dreams.[/log]"
61120-107 = "[log]I fervently grasped for what they call \"hope.\"[/log]"
61120-110 = "Get a hold of yourself!"
61120-114 = "S-Subaru...?"
61120-115 = "I just remembered something."
61120-116 = "That day...happened just like this..."
61120-117 = "Do you mean?"
61120-118 = "Come on, Maia. Let's get up."
61120-119 = "If we stay like this..."
61120-120 = "..."
61120-121 = "People are REALLY going to start to judge us."
61120-122 = "Subaru, I..."
61120-123 = "Hey. You're safe right now."
61120-124 = "It's okay. Everything's going to be fine."
61120-125 = "..."
61120-126 = "Even I...almost got carried away."
61120-127 = "I can't let that happen again. I have to be the one to look out for everyone."
61120-129 = "[log]If things turned out that way, [wa:500]I think that would be wonderful.[/log]"
61120-135 = "Geez. That Sensei... I can't let my guard down around them."
61120-136 = "Eh? What about Sensei?"
61120-137 = "Nothing. Don't worry about it."
61120-138 = "Sensei...isn't a bad person."
61120-139 = "Relatively, you could probably say they're one of the good ones."
61120-140 = "But not every adult is like them. The world isn't all good either. That's for certain."
61120-141 = "Subaru...? Are you sure you're okay?"
61120-142 = "Yeah, yeah. Don't worry about me."
61120-143 = "We managed to safely return the kitten to its owner."
61120-144 = "That's what matters, right?"
61120-145 = "I-I think so?"
61120-146 = "Good. Let's head back."
61120-147 = "We don't want to attract anymore attention."
61120-150 = "Tea, tea!"
61120-151 = "Remember when we only had warm water to drink?"
61120-152 = "Thanks to Subaru, we've had things like \"tea\" now!"
61120-153 = "But it feels kind of different drinking it here!"
61120-154 = "Right? Like, everything is so busy around us, but we're just standing here, doing nothing and drinking tea..."
61120-155 = "This is amazing!"
61120-160 = "*sigh*"
61120-161 = "[s] \"Is everything okay? You look like you have something on your mind.\""
61120-162 = "Wh-What?! No. It's nothing. I'm fine!"
61120-163 = "[s] \"Really...? But—\""
61120-164 = "What a surprise. Hello, Sensei."
61120-166 = "And who are all these people?"
61120-172 = "Hello, Sensei! And all the friends I haven't met!"
61120-174 = "Wh-What?!"
61120-175 = "Uh, h-hello...?"
61120-180 = "[ns] \"What is the Vigilante Crew doing here?! And not studying?!\""
61120-181 = "W-We are studying! We're just...patrolling too!"
61120-182 = "Academic and public safety are equally important!"
61120-183 = "Huh...? I've already used that excuse?"
61120-184 = "You have, Reisa."
61120-185 = "Oh! That's good to hear!"
61120-186 = "(...No part of that is good, though.)"
61120-187 = "Anyway, who are these people?"
61120-189 = "W-We're..."
61120-190 = "Well, um..."
61120-194 = "We're also Sensei's students."
61120-196 = "Huh? Really? Us too!"
61120-197 = "..."
61120-198 = "So you're from Arius...right?"
61120-200 = "!!"
61120-201 = "..."
61120-203 = "\"Arius\"...?"
61120-205 = "Oh, right! I remember now! I heard about that!"
61120-206 = "Heeheehee! Come to think of it, even back then, that idol of the Vigilante Crew, this Uzawa Reisa...!"
61120-207 = "Yes, yes. Sure, exactly."
61120-208 = "I tried to explain it to her as simply and fairly as possible. Did I do okay, Sensei?"
61120-209 = "[s] \"Yes, you did great. Thank you, Suzumi.\""
61120-210 = "Thank you."
61120-217 = "(So that's how Trinity views what happened and Arius' involvement...)"
61120-218 = "(...People do tend to interpret things in a way that benefits them the most. Even so...)"
61120-219 = "(Heh...)"
61120-224 = "In any case, it's nice to see all of you enjoying yourselves here."
61120-225 = "Huh? Isn't that, like, totally normal? Why's it nice?"
61120-227 = "..."
61120-229 = "Uhhh... I feel like I stepped on a weird landmine. I'm real sorry!"
61120-230 = "No. It's fine. It'd be hard to understand from the point of view of a Trinity student."
61120-231 = "..."
61120-232 = "So this is the Vigilante Crew? I've heard that you do patrols around the district, without any pay or recognition."
61120-233 = "That's right! We stand for justice everywhere!"
61120-234 = "R-Reisa...?"
61120-235 = "That's impressive."
61120-236 = "Although, you must have a lot of free time."
61120-237 = "Yep! Trinity, Arius, honestly, I don't really get all of that stuff!"
61120-238 = "We just do this because we want to!"
61120-239 = "..."
61120-240 = "So...we want to help you out too, in our own way!"
61120-241 = "What...?"
61120-242 = "How?"
61120-243 = "Like this!"
61120-245 = "Look at this one! These thugs dug traps in the road to collect tolls from passersby..."
61120-246 = "And this is the photo of me shoving them headfirst into their own pit!"
61120-250 = "Wooow... So that's what someone looks like after being dug out upside-down..."
61120-251 = "That's hilarious! Ahahaha!"
61120-252 = "And then, this photo...!"
61120-257 = "I'm glad they're all getting along."
61120-258 = "Reisa can be a little...excessively energetic."
61120-259 = "It's a relief that it seems to be benefitting everyone here."
61120-260 = "..."
61120-261 = "..."
61120-262 = "Huh? You guys?"
61120-263 = "If Reisa or I did something to offend..."
61120-268 = "Uhm..."
61120-269 = "[s1] \"Don't worry, Suzumi.\"\n[s2] \"All relationships have to go at their own pace.\""
61120-272 = "I understand that."
61120-273 = "I just wish there was something I could do."
61120-279 = "How's everyone doing? Did you have fun with Reisa?"
61120-280 = "Subaru, we..."
61120-281 = "It's just...kind of..."
61120-282 = "..."
61120-284 = "Hello! I'm Uzawa Reisa! Your name was...Subaru, right?"
61120-286 = "..."
61120-290 = "Yes, that's right. I never properly introduced myself. Nice to meet you, Reisa. And you as well, Suzumi."
61120-291 = "I really am sorry if we did anything to upset you."
61120-292 = "Not at all. Nothing like that."
61120-293 = "If you really think about it, it's a little rude of us to even be here."
61120-294 = "Huh? I don't think that all. I'm really happy I got to meet all of you!"
61120-295 = "..."
61120-296 = "Even if it's just words, that's nice to hear. Thank you."
61120-297 = "It's similar to being told that if I just keep on living, everything will work out somehow."
61120-298 = "I think so too! Because there's lots of love in the world, and peace!"
61120-299 = "..."
61120-300 = "Let me ask you something. Sure, there's love, and there's peace."
61120-301 = "But what if there isn't? If things don't work out the way you think they will, what do you do?"
61120-302 = "E-Ehhh...?"
61120-306 = "[ns] \"...\""
61120-308 = "Why bring up something that scary all of a sudden, you ask? Hmm... no reason?"
61120-309 = "You don't always need some special reason to bring something up, do you?"
61120-313 = "[ns3] \"Suzumi, why don't you answer this one?\"\n[ns4] \"Just from your point of view.\""
61120-316 = "M-Me? Hmm..."
61120-317 = "Understood, Sensei. I'll do my best."
61120-318 = "Well, it's not as if I think it's a given that everything will always be okay."
61120-319 = "Things go wrong more often than not in life. That's just how it is."
61120-320 = "But I think you have to believe anyway."
61120-321 = "It's not a feeling, as much as a choice. A choice of the ideals we want to follow."
61120-322 = "...Ideals, huh."
61120-323 = "Yes."
61120-324 = "Those ideals won't be fulfilled today, tomorrow, maybe ever."
61120-325 = "However, if I can take at least one step a day towards achieving them, then that's enough for me."
61120-326 = "Progress isn't an overnight endeavor. It's the culmination of all the little choices we make."
61120-327 = "That's why we don't look to be paid for what we do. The justice we uphold is the compensation."
61120-328 = "Exactly! That's it! That answer was so you, Suzumi!"
61120-329 = "Haha. I see. That was very helpful."
61120-333 = "(What idealistic optimists, through and through. Most people see that as a good thing.)"
61120-334 = "(It makes it easy to ignore the fact that optimism is just the result of a good environment and circumstances.)"
61120-340 = "Um, Subaru...?"
61120-341 = "Yeah?"
61120-342 = "Ah... I see. Right."
61120-343 = "Sensei. If you'll excuse us for a bit. You too, members of the Vigilante Crew."
61120-344 = "I'm going to take a little stroll with these two."
61120-345 = "[s] \"Huh? O-Oh. Sure...\""
61120-353 = "What is it?"
61120-354 = "...Well, I can guess."
61120-355 = "This has been hard, hasn't it?"
61120-356 = "...Yes?"
61120-357 = "I think after those \"lessons,\" it feels even worse."
61120-358 = "Hm? How come?"
61120-359 = "The ones who were all buddy-buddy with the Vigilante Crew, they're the same ones who have been trying really hard in class."
61120-360 = "But for us..."
61120-361 = "We hate listening to those people talk."
61120-362 = "It just...makes us so mad."
61120-363 = "...Are we bad people, Subaru?"
61120-364 = "No. Not at all."
61120-368 = "That's the most natural reaction in the world. At least, that's how I'd feel."
61120-369 = "The world we've lived in... These Trinity kids couldn't even being to imagine."
61120-370 = "Subaru...!"
61120-371 = "In the end, believing that everything will work out is easy."
61120-372 = "Believing there's no sin in the world, that all its twisted parts will untangle somehow...is easy."
61120-373 = "...From what I've seen, those easy beliefs are the ones that are the furthest from reality."
61120-374 = "Have you heard? These days, they say the rich are kind."
61120-375 = "They're nice, gentle, and mild-mannered, even."
61120-376 = "It's because...the rich don't lack for anything."
61120-377 = "Through their eyes, the world must be such a beautiful, peaceful place."
61120-379 = "Ack..."
61120-380 = "But for us..."
61120-382 = "Exactly. That's their world. Our world is nothing like their soft bed of flowers."
61120-383 = "Privileged children like them will never understand."
61120-384 = "They can look at us and boo-hoo and pity us. At the end of the day, it just gives them a feeling of self-satisfied superiority."
61120-385 = "If those brats saw the hell we've experienced..."
61120-386 = "...would they look away? Or stand by their \"beliefs\"?"
61120-387 = "And..."
61120-388 = "Just how long will they keep averting their eyes from their own complicity in creating that hell?"
61120-389 = "S-Subaru? Are you okay?"
61120-390 = "Your face...! You look..."
61120-392 = "Huh? What about my face?"
61120-397 = "N-Never mind... It's nothing..."
61120-399 = "...?"
61120-400 = "Anyways, it's about time, isn't it? I'll let Sensei know that we should head back."
61120-401 = "Back home. Back to our Arius."
61120-418 = "[ns] \"Did everyone have fun on the field trip?\""
61120-419 = "Yes!"
61120-420 = "...Yes."
61120-425 = "Welcome back, Sensei, everyone."
61120-426 = "Your timing is impeccable. We have a...situation that may require your assistance."
61120-430 = "[ns] \"Huh...?\""
61120-433 = "U-Um. Sensei. Over there."
61120-437 = "Go forth with faith and honor in your heart."
61120-438 = "Medicine knows no borders."
61120-440 = "...?"
61120-441 = "[s] \"?!\""
61120-444 = "Good evening, Sensei. And..."
61120-445 = "...to all the rest, as well."
61120-446 = "[s] \"Mine?!\""
61120-447 = "Aha. Hah... Hello, Sensei..."
61120-448 = "Hellooo! It's us, Sensei!"
61120-449 = "[s] \"Serina and Hanae too?!\""
61120-453 = "[ns] \"How did you even know to come here?\""
61120-456 = "The sound of someone in need of aid called to us, so we marched towards it in accordance with our duty!"
61120-458 = "Oratorio of Days Gone By;To Be Continued in Chapter 2"

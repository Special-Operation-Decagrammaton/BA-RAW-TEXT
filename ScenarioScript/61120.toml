[translation]
61120-1 = "第12話;校外教學（２）"
61120-3 = "前輩，這邊！#n請看那棵樹上……"
61120-8 = "嗚哇～我的小貓咪～嗚哇哇～"
61120-9 = "喵嗚嗚嗚……"
61120-14 = "樹上有隻小貓……？"
61120-15 = "原來如此。#n因為好奇而爬了上去，結果就下不來了吧。"
61120-16 = "呵呵。我也是第一次實際遇到這種情況呢。"
61120-17 = "該怎麼辦才好……？#n我也有試著幫忙，卻一直不太順利……"
61120-18 = "……"
61120-19 = "我有一個辦法。#n這裡就用奧利斯的方式來解決吧。"
61120-20 = "稍微讓開一下。"
61120-24 = "喵啊啊啊！？"
61120-25 = "哇啊啊啊！？"
61120-29 = "那，那個學生在做什麼！？"
61120-30 = "他朝小貓待著的樹枝開槍了！"
61120-34 = "嚇啊──！！！"
61120-37 = "啊……小貓撐不住就跳下來了！"
61120-42 = "抓到了。已經沒事了哦。"
61120-45 = "來，這是你的小貓……"
61120-46 = "嗚嗚嗚……"
61120-47 = "嗚哇哇哇哇哇～"
61120-48 = "咦，咦咦……？"
61120-49 = "差點就出大事了你知道嗎！？"
61120-50 = "萬一小貓受傷或出了更嚴重的意外，你打算怎麼負責啊！學生！"
61120-51 = "可，可是……"
61120-52 = "生物一旦受到驚嚇，通常就不會輕易移動……"
61120-53 = "這種時候反而要給予更大的恐懼，才能迫使牠採取行動……"
61120-54 = "到底哪所學園會教這種東西啊……！"
61120-56 = "嗯？那個校徽，難道是……？"
61120-57 = "沒錯！是奧利斯……！"
61120-58 = "奧利斯？啊……就是簽訂什麼伊甸園條約的時候，鬧得沸沸揚揚的那些人嗎？"
61120-59 = "那些問題學生，居然敢大喇喇地出現在這種地方……？"
61120-64 = "所以我才說沒受過教育的孩子實在是……"
61120-65 = "不過有問題的恐怕不只那些孩子，而是奇普托斯整體的教育吧……"
61120-66 = "明明打著「學園都市」的名號，卻對學生的教育這麼疏忽……"
61120-67 = "可是其他學園也沒鬧出過那麼大的問題吧？"
61120-68 = "要是在正常的學園，那種事情搞不好根本不會發生……"
61120-69 = "這倒也是。#n雖然爆炸事件在奇普托斯頂多算是輕罪，但如果帶著惡意就完全是另一回事了……"
61120-73 = "……"
61120-74 = "來，我的小寶貝。#n不要離那些人太近哦。"
61120-75 = "為什麼……？"
61120-76 = "乖孩子，聽媽媽的話，好嗎？"
61120-77 = "知道了……"
61120-83 = "唔，唔唔……"
61120-84 = "啊啊啊啊啊……！"
61120-85 = "怎，怎麼了！？"
61120-89 = "嗯？才工作五天就想跟我要薪水？"
61120-91 = "等等，那不就等於沒有學籍嗎？"
61120-93 = "滾吧。如果不打算接受就別浪費我的時間。"
61120-95 = "[log]只要到了外面──[/log]"
61120-97 = "[log]一切都會跟以前不一樣。[/log]"
61120-101 = "[log]逃向的地方並不存在什麼樂園。[/log]"
61120-104 = "[log]但我還是想做夢。[/log]"
61120-107 = "[log]我也想感受……[wa:500]希望存在的那種感覺。[/log]"
61120-110 = "振作一點！"
61120-114 = "前，輩……？"
61120-115 = "我好像想起來了。"
61120-116 = "那天也是這樣的吧。"
61120-117 = "前輩……"
61120-118 = "總之先起來吧，舞彩。"
61120-119 = "要是繼續這樣待著……"
61120-120 = "……"
61120-121 = "別人更會覺得我們很奇怪的。"
61120-122 = "前輩，我……"
61120-123 = "嗯，我知道。現在已經安全了。"
61120-124 = "不用擔心，一切都會越來越好的。"
61120-125 = "……"
61120-126 = "不過，我剛剛也差點做了個短暫的夢呢。"
61120-127 = "這可不行啊。我得好好反省。#n至少我……必須隨時保持清醒。"
61120-129 = "[log]「如果可以的話，[wa:500]那就再好不過了。」[/log]"
61120-135 = "真受不了。#n夏萊的老師，果然不容小覷呢。"
61120-136 = "老師……？為什麼呢？"
61120-137 = "不，沒什麼。"
61120-138 = "老師他不是壞人……"
61120-139 = "某種意義上來說，應該算是個好大人吧。"
61120-140 = "但並不是所有大人……整個世界都是如此。"
61120-141 = "前輩……？#n發生什麼事了嗎……？"
61120-142 = "什麼都沒有哦。"
61120-143 = "總之，小貓已經平安回到主人身邊了。"
61120-144 = "那不就夠了嗎？"
61120-145 = "應該……是吧？"
61120-146 = "嗯，我們也差不多該回去了。"
61120-147 = "趁人群再次聚過來之前。"
61120-150 = "喝紅茶～紅茶～"
61120-151 = "以前都只有溫水而已……現在已經不一樣了呢……"
61120-152 = "這一切都要感謝昴前輩……"
61120-153 = "不過在這種地方喝，感覺也不太一樣呢。"
61120-154 = "哦哦……大家都匆忙地走過，而我們卻只是靜靜看著的這種感覺……"
61120-155 = "真不錯！"
61120-160 = "呼……"
61120-161 = "[s]「……怎麼了？你的臉色看起來不太好哦？」"
61120-162 = "咦，咦！？沒，沒什麼！#n我真的沒事！嗯！"
61120-163 = "[s]「是嗎……？不過──」"
61120-164 = "您好，老師。#n沒想到會在這種地方遇到您呢。"
61120-166 = "請問這幾位學生是……？"
61120-172 = "你好呀，老師！#n我還不知道名字的大家也是！"
61120-174 = "嗚，嗚咿！？"
61120-175 = "你，你好……？"
61120-180 = "[ns]「咦？是自衛隊！你們不用讀書嗎？」"
61120-181 = "我，我們有努力讀書哦！現在只是順便巡邏一下而已！"
61120-182 = "學業和維護街道秩序都不能疏忽！"
61120-183 = "咦……？這句話我以前是不是說過了……？"
61120-184 = "嗯，你的確有說過哦，澪紗同學。"
61120-185 = "這樣啊！那就好！"
61120-186 = "（不知道好在哪裡……）"
61120-187 = "話說，這幾位是誰呢？"
61120-189 = "我，我們是……"
61120-190 = "那個，就是……"
61120-194 = "我們也是老師的學生。"
61120-196 = "咦？那不就跟我們一樣嗎……？"
61120-197 = "……"
61120-198 = "是奧利斯的各位……對吧？"
61120-200 = "！！！"
61120-201 = "……"
61120-203 = "奧利斯……？"
61120-205 = "啊啊，我想起來了！#n之前確實有聽說過那件事呢！"
61120-206 = "呵呵呵。話說當時也是由自衛隊的王牌兼大家的偶像，我宇沢澪紗……！"
61120-207 = "是，是啊。確實有過那樣的事。"
61120-208 = "與奧利斯的各位相關的事，我只盡可能謹慎地說了重點……這樣可以嗎，老師？"
61120-209 = "[s]「謝謝。你真是幫了大忙，鈴美。」"
61120-210 = "嗯，感謝您的稱讚。"
61120-217 = "（原來三一是這麼看待那起事件和奧利斯的啊……）"
61120-218 = "（雖然人通常會以對自己有利的方向來解讀情勢……不過……）"
61120-219 = "（呵呵……）"
61120-224 = "總之，幸好老師和大家似乎都玩得很高興。"
61120-225 = "嗯？這不是身為學生理所當然的事嗎，鈴美同學？"
61120-227 = "……"
61120-229 = "咦……？我是不是說了什麼奇怪的話……？#n如果是的話，我向你們道歉！"
61120-230 = "不，沒關係的。#n從「你們的觀點」來看，這應該是「我們的問題」吧。"
61120-231 = "……"
61120-232 = "話說，你們剛才自稱是自衛隊……？#n明明沒有任何報酬……也會像這樣進行「巡邏」嗎？"
61120-233 = "沒錯！也就是在無法觸及之處伸張正義！"
61120-234 = "澪，澪紗同學……？"
61120-235 = "那還真是了不起呢。"
61120-236 = "雖然看起來有點閒就是了。"
61120-237 = "是的！老實說三一和奧利斯之類的事，我其實都不是很清楚！"
61120-238 = "只是因為我們想這麼做，所以就去做了而已。"
61120-239 = "……"
61120-240 = "所以……我們在這裡也想隨心所欲地幫助大家！"
61120-241 = "咦……？"
61120-242 = "要，要怎麼幫呢……？"
61120-243 = "就像這樣！"
61120-245 = "一起來看看這個吧！#n之前有群太妹，打算在路上挖陷阱收過路費……"
61120-246 = "這是我把他們頭朝下塞進陷阱裡的照片哦！"
61120-250 = "哇……原來人被倒著埋進土裡再拉出來會變成這樣啊……"
61120-251 = "超好笑的！啊哈哈哈！"
61120-252 = "還有這張照片是──！"
61120-257 = "一下就變親近了呢。真是太好了。"
61120-258 = "澪紗同學雖然有點過於活潑……"
61120-259 = "現在反而成為了優勢呢。"
61120-260 = "……"
61120-261 = "……"
61120-262 = "哎呀，你們是……？"
61120-263 = "如果我或澪紗同學……做了什麼失禮的事……"
61120-268 = "唔……"
61120-269 = "[s1]「沒事的，鈴美。沒事的。」\n[s2]「大家要這麼快就變熟，本來就不容易。」"
61120-272 = "雖然確實如此……"
61120-273 = "心裡還是有點不安呢。"
61120-279 = "你們沒事吧？#n有些人已經能和澪紗同學聊得很開心了哦。"
61120-280 = "前輩，我們……"
61120-281 = "總覺得還是有點……"
61120-282 = "……"
61120-284 = "你好！我是宇澤澪紗！#n記得你是……昴同學對吧？"
61120-286 = "……"
61120-290 = "是的。那麼我也正式向兩位問好。#n澪紗同學、鈴美同學，你們好。"
61120-291 = "那個……不好意思。#n如果我們自衛隊有任何失禮之處……"
61120-292 = "不不不，怎麼會失禮呢。"
61120-293 = "……某方面來說，真正失禮的反而是我們才對。"
61120-294 = "咦？不會呀？#n我很高興能遇見大家哦！"
61120-295 = "……"
61120-296 = "光是能聽見這番話，就讓人感覺放鬆了不少。"
61120-297 = "彷彿聽見了只要活下去，一切遲早會迎刃而解……這樣的答案。"
61120-298 = "我也這麼認為！#n因為世界上有愛與和平嘛！"
61120-299 = "……"
61120-300 = "那麼，能讓我請教一個問題嗎？#n就算愛與和平都確實存在……"
61120-301 = "一切卻依然不順利的話……該怎麼辦呢？"
61120-302 = "咦……？"
61120-306 = "[ns]「……」"
61120-308 = "為什麼突然問這麼可怕的問題？#n唔嗯……只是一時興起？"
61120-309 = "提出話題，應該不需要什麼特別的理由吧？"
61120-313 = "[ns3]「鈴美，你來說說看吧？」\n[ns4]「以自衛隊的立場來回答。」"
61120-316 = "由我來……回答是嗎？#n唔嗯……"
61120-317 = "知道了，老師。我會盡力回答。"
61120-318 = "昴同學。我們也不是一直帶著「一切都會順利」的想法過活的。"
61120-319 = "現實中往往都是不順利的情況比較多。#n這在某種意義上……或許是件無可奈何的事情也說不定。"
61120-320 = "不過即便如此，我們依然選擇相信。"
61120-321 = "因為我們──就是懷抱著那樣的理想活著的。"
61120-322 = "理想……是嗎。"
61120-323 = "是的。"
61120-324 = "當然，要立刻實現那樣的理想恐怕很困難……"
61120-325 = "不過只要能更接近它一步……我覺得就已經足夠了。"
61120-326 = "只要持續向前邁進，哪怕只有一點點也沒關係……#n最終所有人都能抵達那裡的可能性，應該也會隨之增加才對。"
61120-327 = "因此，正義本身就是一種回報。#n至於其他的報酬或代價……我認為目前還不需要。"
61120-328 = "沒錯！就是這樣！不愧是鈴美同學！"
61120-329 = "哈哈，原來如此。我學到了很多。"
61120-333 = "（還真是樂觀的不得了啊。雖然這一般來說是件好事……）"
61120-334 = "（不過也得先排除「那種樂觀主義，只有在允許那樣思考的環境才能孕育出來」──#n　這個事實就是了）"
61120-340 = "那個，前輩……？"
61120-341 = "怎麼了嗎？"
61120-342 = "啊啊……嗯，我明白了。"
61120-343 = "老師，還有自衛隊的各位……請容我們稍微失陪一下。"
61120-344 = "我有事想和這些孩子單獨聊一聊。"
61120-345 = "[s]「嗯？這樣啊。我知道了……」"
61120-353 = "有什麼事嗎？"
61120-354 = "……雖然提問的人是我，但我大概能猜到答案了。"
61120-355 = "已經快撐不住了對吧？"
61120-356 = "……是的。"
61120-357 = "說不定這也是「課程」的影響吧……"
61120-358 = "課程？怎麼說呢？"
61120-359 = "剛才能跟自衛隊親近起來的，都是平常對課程很有興趣的孩子。"
61120-360 = "可是我們……"
61120-361 = "雖然腦袋裡能夠理解，但不知道為什麼……"
61120-362 = "聽到那種話題的時候，總是會莫名地感到生氣……"
61120-363 = "搞不好……是因為我們是壞孩子的關係吧……"
61120-364 = "不。不是這樣的。"
61120-368 = "某方面來說，這反而才是理所當然的事情。#n至少我個人是這麼認為的。"
61120-369 = "因為我們所生活的世界，是那些孩子根本無法想像的。"
61120-370 = "前輩……！"
61120-371 = "相信一切都會順利是件容易的事。"
61120-372 = "相信世界沒有罪惡──相信現在扭曲的事物遲早會回歸筆直也是如此。"
61120-373 = "……然而據我所知，容易的事情往往都不會跟想像中一樣順利。"
61120-374 = "你們知道嗎？#n聽說最近的有錢人都很善良。"
61120-375 = "個性又好又溫和，甚至還很親切。"
61120-376 = "而原因通常是……因為他們什麼都不缺。"
61120-377 = "在他們眼中，世界想必既和平又美麗吧。"
61120-379 = "唔……"
61120-380 = "可是我們……"
61120-382 = "沒錯。但是世上的某些角落絕對不是如此。"
61120-383 = "而那些孩子，當然不可能連這些細節都考慮進去。"
61120-384 = "或許他們能表現出同情，也會覺得可憐……但那終究只是自我滿足罷了。"
61120-385 = "如果地獄降臨到了現實之中……"
61120-386 = "那些孩子究竟會選擇轉身逃離，還是試圖與地獄對抗呢？"
61120-387 = "還有──"
61120-388 = "他們究竟什麼時候──#n才會停止對「自己就是創造這地獄般歷史的當事人」的事實視而不見呢？"
61120-389 = "前，前輩！？你沒事吧……？"
61120-390 = "你剛才的表情……！？"
61120-392 = "咦？我的臉怎麼了嗎？"
61120-397 = "沒，沒事……什麼都沒有……"
61120-399 = "……？"
61120-400 = "知道了。那我去跟老師說一聲。#n我們也差不多該回去了。"
61120-401 = "回到我們的奧利斯。"
61120-418 = "[ns]「大家！校外教學開心嗎？」"
61120-419 = "開心！"
61120-420 = "……開心。"
61120-425 = "歡迎回來，老師。#n還有大家也是。"
61120-426 = "現在正好發生了一點狀況。"
61120-430 = "[ns]「什麼……？」"
61120-433 = "那，那個，老師。#n就是……"
61120-437 = "胸懷榮耀與信念。"
61120-438 = "哪裡要救護，我就在哪裡。"
61120-440 = "……？"
61120-441 = "[s]「！？！？」"
61120-444 = "您好，老師。以及……"
61120-445 = "在場的所有人。"
61120-446 = "[s]「美禰！？」"
61120-447 = "你，你好呀，老師。#n啊哈哈哈……"
61120-448 = "老師！我們來囉！！！"
61120-449 = "[s]「連芹奈跟花繪也在！？」"
61120-453 = "[ns]「你們……是怎麼知道這裡的！？」"
61120-456 = "對救護的直覺，指引我們來到了這裡！"
61120-458 = "流逝時光的聖劇篇;To be Continued in Chapter 2"

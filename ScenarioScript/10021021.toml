[translation]
10021021-2 = "เพลนาพาเทส!! ล้มลงไปแล้วค่ะ!!"
10021021-6 = "กะ...กรี๊ดดดดดด?!"
10021021-7 = "เรือถูกทำลายแล้วค่ะ!! คุณอายาเนะ! รีบอพยพเดี๋ยวนี้เลยค่ะ!"
10021021-8 = "ถ้าโดนลูกหลงจากระเบิดแบบนี้ละก็... อาจกระเด็นออกไปถึงอวกาศ หรือไม่ก็แตกเป็นเสี่ยงๆ แล้วตกสู่พื้นโลกได้ค่ะ!!"
10021021-9 = "ค่ะ! เข้าใจแล้วค่ะ!! รุ่นพี่! คุณครูคะ! เดี๋ยวเจอกันที่โลกนะคะ!"
10021021-10 = "...ขอฝากคุณครูด้วยนะคะ คุณริน!"
10021021-11 = "ค่ะ"
10021021-16 = "จำนวนคงเหลือของวงจรหลบหนี - 14 ครั้ง"
10021021-18 = "ถ้างั้นฉันเองก็จะเตรียมวงจรหลบหนีเอาไว้ให้พร้อมอพยพได้ตลอดเวลาค่ะ"
10021021-22 = "จำนวนคงเหลือของวงจรหลบหนี - 13 ครั้ง"
10021021-24 = "คุณครูคะ! ช่วยให้นักเรียนที่อยู่ที่นั่นอพยพด้วย <วงจรหลบหนี> ด้วยค่ะ!"
10021021-25 = "ไม่มีเวลาแล้วค่ะ คุณครู!! ต้องรีบอพยพทุกคนก่อนที่เรือจะระเบิดทั้งลำแล้วค่ะ!"
10021021-27 = "ค่ะ! เรื่องการเปิดใช้งาน <วงจรหลบหนี> ให้เป็นหน้าที่ของหนูเองค่ะ! คุณครู! ช่วยออกคำสั่งด้วยค่ะ!!"

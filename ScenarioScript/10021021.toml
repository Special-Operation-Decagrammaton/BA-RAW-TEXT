[translation]
10021021-2 = "誘騙者倒下了！！"
10021021-6 = "呀啊啊！？"
10021021-7 = "方舟被破壞了！！#n綾音同學，請立刻逃脫！！"
10021021-8 = "就這樣被爆炸波及的話，不是被彈向宇宙就是直直墜落地面！！"
10021021-9 = "……我知道了。前輩，老師……！大家，陸地上見吧！"
10021021-10 = "……老師就拜託你了。琳同學！"
10021021-11 = "是，交給我吧。"
10021021-16 = "「逃脫程式」：剩下14次"
10021021-18 = "我也得準備好隨時進行避難才行。"
10021021-22 = "「逃脫程式」：剩下13次"
10021021-24 = "老師！請讓那邊的學生逃脫吧！"
10021021-25 = "沒有時間了！必須在方舟完全摧毀之前──"
10021021-27 = "是，我會負責啟動「逃脫程式」！#n請老師下達指示！！"

[translation]
1000120-1 = "熱風"
1000120-2 = "（受英美的邀請，來到千年附近的沙漠進行調查）"
1000120-3 = "（……雖然調查了好一段時間，卻沒有什麼特別的發現）"
1000120-8 = "……唔嗯……"
1000120-13 = "唔──嗯……"
1000120-14 = "[s1]「……英美？」\n[s2]「還好嗎？會不會累……？」"
1000120-17 = "……啊。"
1000120-18 = "沒什麼，別在意。"
1000120-19 = "這種事經常發生。"
1000120-25 = "光是確認這裡沒有異常，就已經收集到足夠的資料了。"
1000120-26 = "而且這種長時間的外出，我也已經很習慣了。"
1000120-27 = "我反而有點擔心老師……"
1000120-28 = "老師還好嗎？#n看起來好像有點累。"
1000120-29 = "[s3]「唔嗯，或許吧……」\n[s4]「與其說是累了，不如說是因為太熱了。」"
1000120-32 = "確實。畢竟是這種天氣呢。"
1000120-33 = "既沒有風，又沒有能休息的陰影……"
1000120-34 = "就算帶了很多水，這種炎熱的天氣依然很容易讓人疲累。"
1000120-35 = "我也是，雖然熱習慣了……#n也已經滿身大汗……"
1000120-36 = "其實……我很想立刻脫掉衣服涼快一下……"
1000120-40 = "……我知道。就算想脫也會被老師阻止。#n這點我還是知道的。"
1000120-41 = "所以，這次我有做好對策。"
1000120-42 = "我之前說過了吧，「有為這種時候做準備」。"
1000120-43 = "那就是……"
1000120-50 = "[ns5]「小型電風扇？」\n[ns6]「意外的可愛……」"
1000120-54 = "……以貌取人可不行唷，老師。"
1000120-55 = "這東西可是比外表看起來更有用。"
1000120-56 = "不只是體積小方便攜帶……還請人進行了一些小改造，所以──"
1000120-57 = "只要把開關打開──你看。"
1000120-62 = "[ns7]「什，什麼？吹出了超強的風……！？」\n[ns8]「這不是一點小改造吧！？」"
1000120-65 = "為了突破現在的狀況，這種程度的風力是必須的。"
1000120-66 = "因為沒時間吹太久的風，這是為了快速降溫採取的對策。#n有這種風力的話，就能馬上變涼快了對吧？"
1000120-67 = "那麼……"
1000120-71 = "事情就是這樣，請老師過來我這邊。"
1000120-75 = "就算風力很強，終究還是小型的電風扇，能吹到風的範圍並不是很大。"
1000120-76 = "為了有效率地降低老師跟我的體溫，現在得要靠近一點才行。"
1000120-77 = "也就是說，必須盡可能緊靠彼此的身體。#n聽懂了嗎？"
1000120-81 = "……？#n老師？"
1000120-82 = "站在那裡只會熱而已唷？#n快過來吧。"
1000120-83 = "不用了……？"
1000120-84 = "身體靠太近的話不太好？#n為什麼？"
1000120-85 = "……這話說不通唷老師。#n現在沒有理由和我保持距離。要優先考慮效率才行。"
1000120-86 = "……唔嗯。"
1000120-87 = "都說來這裡了。"
1000120-92 = "……老師。"
1000120-94 = "（…………）"
1000120-95 = "（之後，和英美緊緊貼在一起，一同吹著電風扇的風乘涼）"
1000120-96 = "（不過因為英美身上散發的熱氣，就連電風扇的風也變成了熱風……）"

[translation]
1000120-1 = "ลมร้อน"
1000120-2 = "(คุณครูตามเอมิออกมาสำรวจทะเลทรายที่อยู่ใกล้ๆ โรงเรียนมิลเลเนียม)"
1000120-3 = "(...หลังจากใช้เวลาสำรวจบริเวณรอบๆ อยู่พักใหญ่ ก็ไม่พบสิ่งผิดปกติอะไร)"
1000120-8 = "...อืม"
1000120-13 = "อืมมมม..."
1000120-14 = "[s1] \"...เอมิ?\"\n[s2] \"เป็นอะไรรึเปล่า? เหนื่อยงั้นเหรอ...\""
1000120-17 = "อ่า..."
1000120-18 = "เปล่าหรอกคุณครู ไม่ต้องใส่ใจหรอก"
1000120-19 = "ถึงจะไม่ได้ผลลัพธ์ที่น่าพึงพอใจขนาดนั้น แต่เรื่องแบบนี้ก็เกิดขึ้นได้บ่อยๆ น่ะ"
1000120-25 = "แค่ตรวจสอบและยืนยันได้ว่าพื้นที่นี้ไม่มีสิ่งผิดปกติละก็ ถือว่าได้ข้อมูลที่มีประโยชน์มากแล้วละ"
1000120-26 = "การออกปฏิบัติงานนอกสถานที่นานๆ แบบนี้น่ะ... ฉันชินแล้ว"
1000120-27 = "คุณครูยังดูน่าเป็นห่วงมากกว่าอีก..."
1000120-28 = "แล้วคุณครูล่ะ? ไหวมั้ย? ถึงจะเป็นครั้งแรก แต่ก็นับว่าเดินช้าๆ นะ"
1000120-29 = "[s3] \"อืม ก็นะ...\"\n[s4] \"ไม่ค่อยเหนื่อยเท่าไรหรอก แต่ร้อนมากกว่า...\""
1000120-32 = "นั่นสินะ ยิ่งที่แบบนี้ อากาศยิ่งร้อนกว่าเดิมอีก"
1000120-33 = "ภูมิประเทศที่ไม่มีร่มเงาเลยแม้แต่นิดเดียว แดดร้อนเปรี้ยงๆ แถมยังไม่มีลมพัดอีก"
1000120-34 = "ถึงจะเตรียมตัวมาดีแล้วก็เถอะ แต่อากาศแบบนี้มันก็เหนื่อยง่ายจริงๆ นั่นแหละ"
1000120-35 = "ฉันเป็นคนขี้ร้อนด้วย ตอนนี้ก็เหงื่อไหลท่วมไปทั้งตัวแล้ว"
1000120-36 = "ปกติแล้วในสถานการณ์แบบนี้... การถอดเสื้อผ้าออกเพื่อระบายความร้อนในร่างกาย ถือเป็นวิธีที่ถูกต้อง..."
1000120-40 = "...รู้แล้วน่า ถ้าทำแบบนั้นคุณครูก็คงมาห้ามอยู่ดี ก็เลยโดนห้ามมาหลายครั้งแล้วนี่นา"
1000120-41 = "แต่ว่า... ถึงเป็นแบบนั้นก็ไม่เป็นไรหรอก"
1000120-42 = "บอกแล้วไง \"คิดแล้วว่าคงจะเกิดเรื่องแบบนี้ก็เลยเตรียมพร้อมเอาไว้แล้วละ\" น่ะ"
1000120-43 = "นั่นก็คือ..."
1000120-50 = "[ns5] \"พัดลมมือถือน่ารักๆ?\"\n[ns6] \"น่ารักซะจนแปลกใจเลย...\""
1000120-54 = "...ถ้าดูแค่ภายนอกแล้วตัดสินแบบนี้ก็แย่น่ะสิ คุณครู"
1000120-55 = "ฉันคิดว่ามันเป็นอุปกรณ์ที่มีประสิทธิภาพเหมาะกับสถานการณ์แบบนี้ก็เลยพกมาด้วยน่ะ"
1000120-56 = "ฉันคิดไว้แล้วว่าน่าจะเกิดสถานการณ์แบบนี้ ก็เลยไปขอให้ช่วยปรับแต่งมานิดหน่อยด้วยละ"
1000120-57 = "พอกดสวิตช์ตรงนี้..."
1000120-62 = "[ns7] \"ทะ...ทำไมลมแรงแบบนี้...?\"\n[ns8] \"แบบนี้ไม่ใช่แค่ปรับแต่ง 'นิดหน่อย' แล้ว!?\""
1000120-65 = "ในสถานการณ์ที่เลวร้ายที่สุด ก็ต้องจัดการแบบสุดโต่งเลยไงละ"
1000120-66 = "มันเป็นวิธีที่จะลดอุณหภูมิร่างกายลงได้อย่างรวดเร็ว เพราะไม่มีเวลายืนตากลมสบายๆ นานไงล่ะ อีกอย่าง ถ้าลมแรงๆ ก็ยิ่งช่วยลดเวลาลงได้ไม่ใช่รึไง?"
1000120-67 = "ถ้างั้น..."
1000120-71 = "เอาละคุณครู มาทางนี้สิ"
1000120-75 = "ถึงลมจะแรง แต่มันก็เป็นพัดลมมือถือ เลยมีข้อจำกัดเรื่องระยะอยู่น่ะ"
1000120-76 = "ถ้าจะให้ลมพัดโดนสองคนได้อย่างมีประสิทธิภาพละก็ คุณครูก็ต้องเข้ามาอยู่ใกล้ๆ ฉันให้มากกว่านี้"
1000120-77 = "พูดง่ายๆ ก็คือเราจะต้องยืนให้แนบชิดกันมากที่สุดเท่าที่จะทำได้ เข้าใจที่พูดรึเปล่า?"
1000120-81 = "...? คุณครู?"
1000120-82 = "ทำไมยังยืนเฉยอยู่อีกละ? บอกให้เข้ามาใกล้ๆ ฉันไง"
1000120-83 = "...ไม่เป็นไรงั้นเหรอ?"
1000120-84 = "ไม่ยืนใกล้ๆ กันจะดีกว่างั้นเหรอ? ทำไมล่ะ?"
1000120-85 = "...เหตุผลฟังไม่ขึ้นเลยนะ คุณครู... ตอนนี้ไม่มีเหตุผลที่ฉันกับคุณครูจะต้องยืนห่างกันสักหน่อย สถานการณ์ตอนนี้ควรเลือกทางเลือกที่มีประสิทธิภาพที่สุดสิ "
1000120-86 = "...อืม "
1000120-87 = "บอกให้มาทางนี้ไงล่ะ"
1000120-92 = "...มาสิ คุณครู"
1000120-94 = "(......)"
1000120-95 = "(หลังจากนั้นคุณครูก็จำใจต้องไปยืนแนบชิดกับเอมิ และยืนตากลมจากพัดลมมือถือกับเธอ...)"
1000120-96 = "(แต่ว่าเพราะความร้อนจากร่างกายของเอมิ ทำให้ลมจากพัดลมมือถือกลายเป็นลมร้อนไป...)"

[translation]
1000120-1 = "A Hot Wind"
1000120-2 = "I followed Eimi out to help her investigate in a desert near Millennium."
1000120-3 = "...Although the investigation went on for several hours, nothing out of the ordinary was found."
1000120-8 = "Hm..."
1000120-13 = "Hmmm..."
1000120-14 = "[s1] \"...Eimi?\"\n[s2] \"Are you okay? Do you feel tired?\""
1000120-17 = "...Oh."
1000120-18 = "No, Sensei. No need to worry about me."
1000120-19 = "Though the investigation is not very successful, that's not unexpected."
1000120-25 = "In fact, just knowing that there is nothing abnormal here is its own gain."
1000120-26 = "I'm fairly used to strenuous outdoor activities for extended periods of time."
1000120-27 = "I'm more worried about you, Sensei..."
1000120-28 = "Are you okay? Your pace has gotten much slower."
1000120-29 = "[s3] \"Mm. It's hotter than I expected.\"\n[s4] \"I'm not that tired, but it's really hot.\""
1000120-32 = "That's true. The climate here can be very taxing."
1000120-33 = "No shade whatsoever, strong and direct sunlight, and no wind..."
1000120-34 = "It's easy to get exhausted, even if we're well hydrated."
1000120-35 = "I get hot easily too. My condition is fine, but I'm already soaked in sweat right now."
1000120-36 = "In such situation, it'd be best to take our clothes off to help regulate the heat and sweat..."
1000120-40 = "...I know you'd stop me. I've learned from past experiences."
1000120-41 = "But there's nothing to worry about."
1000120-42 = "I've told you before, right? I prepare for everything, so that nothing is ever unexpected."
1000120-43 = "And here I have..."
1000120-50 = "[ns5] \"A pocket electric fan?\"\n[ns6] \"That's a rather cute-looking gadget you've brought.\""
1000120-54 = "...Don't judge a machine by its cuteness, Sensei."
1000120-55 = "I brought it because it was the best choice in terms of efficiency."
1000120-56 = "It's slightly modified for situations like this."
1000120-57 = "If I flip the switch on like this..."
1000120-62 = "[ns7] \"W-What the... What is this power output?\"\n[ns8] \"Are you sure it was a 'slight' modification?!\""
1000120-65 = "In extreme situations, extreme measures must be taken."
1000120-66 = "I knew we wouldn't have too much idle time, so it had to be strong enough to cool down our bodies quickly. The stronger the wind, the less time we'd need to spend fanning."
1000120-67 = "So..."
1000120-71 = "Come here, Sensei."
1000120-75 = "Despite its strong output, it's still a pocket electric fan. The area of effect isn't very big."
1000120-76 = "To efficiently cool off both of us, we must be close to each other."
1000120-77 = "Which means, you should move in as close as you can. Understood?"
1000120-81 = "...? Sensei?"
1000120-82 = "Why aren't you moving? I asked you to come closer."
1000120-83 = "...You're okay?"
1000120-84 = "It'd be better to not be too close? Why?"
1000120-85 = "...I fail to understand your logic. Whatever your reason may be, cooling you down is more important. We must prioritize efficiency right now."
1000120-86 = "Um... "
1000120-87 = "You need to come closer."
1000120-92 = "...Come, Sensei."
1000120-94 = "..."
1000120-95 = "Eimi and I took a short break with Eimi's electric fan."
1000120-96 = "However, the heat radiating from Eimi essentially turned the fan into a heater..."

[translation]
1005906-1 = "Wounds and Scars"
1005906-6 = "I received a report from the academy staff about an incident at Trinity."
1005906-7 = "...Mika is in the Self-Reflection Room, serving her detention for committing an act of violence on academy grounds."
1005906-8 = "[s] \"An act of violence…?\""
1005906-9 = "Yes. There was an incident today wherein Mika struck another student."
1005906-10 = "[ns1] \"…?!\" \n[ns2] \"What happened? Why?!\""
1005906-13 = "W-We are still investigating the details."
1005906-14 = "But it appears Mika didn't bring a swimsuit for her P.E. class today, despite knowing it was a swim day. She instead sat out and watched."
1005906-15 = "[s] \"...Her swimsuit?\""
1005906-16 = "Yes. She was incredibly tardy to begin with, and then wandered around the pool rather than participating. "
1005906-17 = "Mika's classroom behavior was inappropriate and disrespectful."
1005906-18 = "There were students who observed this behavior and, finding it distasteful, complained. That was when Mika reacted violently, striking the student."
1005906-22 = "[ns] \"...\""
1005906-23 = "Thankfully, the student sustained no injuries and Mika herself turned herself over for punishment. So the issue was resolved peacefully."
1005906-24 = "However, you are well aware that Mika's circumstances as a student are...complex. We hope this issue does not turn into a larger issue."
1005906-25 = "In conclusion, we were hoping that you, as Schale's representative, could oversee Mika's punishment."
1005906-26 = "[s] \"…Understood.\""
1005906-30 = "Thank you!"
1005906-34 = "I have other tasks to attend to, so please excuse me!"
1005906-38 = "[ns] \"...\""
1005906-44 = "I went to go see Mika, who was currently in detention."
1005906-50 = "[ns] \"Mika...\""
1005906-51 = "Look at that. In the end, things ended up like this..."
1005906-52 = "Are you disappointed? But you already knew I'm a bad student."
1005906-53 = "I'm a troublemaker that ruins everything if left unsupervised."
1005906-57 = "I just cause problems everywhere I go, so I'll probably..."
1005906-64 = "[ns] \"Are you okay? You're being bullied, aren't you?!\""
1005906-65 = "Wh-What?! "
1005906-66 = "[s] \"The swimsuit. Did you really just lose it?\""
1005906-70 = "I-I..."
1005906-71 = "You bought me that swimsuit, Sensei..."
1005906-78 = "Wh-What?!"
1005906-79 = "My swimsuit is gone? Did I misplace it somewhere?"
1005906-85 = "Heehee. The all-superior lady of the Tea Party can't even manage her own locker."
1005906-86 = "Well, maybe she's just so used to having people take care of her every need for her she doesn't know how."
1005906-87 = "She's so noble and high-class compared to us, maybe she just didn't want to be in the same pool as us commoners, right?"
1005906-88 = "Oh the trash bin seems to be full today. Is it because there is a lot to throw away? Heeheehee!"
1005906-89 = "..."
1005906-101 = "It's not there... I checked the trash bin and even the incinerator, but..."
1005906-102 = "I can't find it anywhere! Why is this happening? That swimsuit's really important to me..."
1005906-107 = "Oh my, why is there trash here?"
1005906-111 = "...!"
1005906-112 = "Oh! This isn't trash! It's just a disgusting, cut up swimsuit, isn't it?"
1005906-116 = "Well, it's more or less trash at this point."
1005906-125 = "How dare you..."
1005906-127 = "E-Eek?!"
1005906-128 = "What's she doing?! I thought Mika wasn't allowed to fight back anymore! She's supposed to be a shackled paper tiger!"
1005906-129 = "A-Are we going to die?"
1005906-136 = "(No...)"
1005906-137 = "(I can't do this again... I'm...)"
1005906-138 = "A witch! She's a witch! S-Save me!"
1005906-142 = "W-Wait! Don't leave me behind!"
1005906-146 = "Hey! Let me go! Wh-Whoa!"
1005906-152 = "O-Ouch... Ah...!"
1005906-157 = "My swimsuit... Sensei..."
1005906-159 = "..."
1005906-160 = "I'm so sorry, Sensei. You got me that swimsuit as a gift, and it's completely ruined... I don't even think it's fixable."
1005906-161 = "It's all my fault though. This is what I get for all the horrible things I've done... If I had just been a good girl, things like this wouldn't be happening to me..."
1005906-162 = "I promise I was really, really trying to be good this time... But, I messed it up again."
1005906-163 = "I'm always just ruining everything for you, Sensei! I was really excited to go to P.E. in the new swimsuit you got me..."
1005906-164 = "I'm just not meant to be good, I guess..."
1005906-165 = "I wanted to turn things around, and I tried so hard..."
1005906-166 = "[s] \"Okay, Mika. Do you have time today?\""
1005906-167 = "Huh?"
1005906-168 = "That came out of nowhere... Well, I do have a lot of time until my dorm's curfew, but..."
1005906-174 = "[ns] \"Then, would you like to attend Sensei's swimming class?\""
1005906-175 = "...What?"
1005906-182 = "Trinity Designated Convenience Store"
1005906-185 = "I see. The damage is severe, but it's actually not beyond repair."
1005906-187 = "..."
1005906-188 = "It'll obviously be a little bit patchy, but it'll be perfectly fine to swim in. Since it's within its warranty period, I'll do it for free."
1005906-189 = "[s] \"Then, please take care of it.\""
1005906-190 = "Of course. It shouldn't take too long, so please wait here."
1005906-194 = "And all patched up. Here you go! "
1005906-199 = "..."
1005906-200 = "So you can get clothes fixed up like this..."
1005906-201 = "I had no idea... I thought you just replaced clothing if they were damaged."
1005906-205 = "U-Um, Sensei... Where are we going? This isn't the way to the classroom..."
1005906-206 = "Didn't you say we were going to have a swimming class? Not that I really get what you mean by that still."
1005906-207 = "And actually, I'm pretty sure all of the pools are closed at this time..."
1005906-208 = "[s] \"There's a place I know.\""
1005906-213 = "Annex Pool"
1005906-215 = "Where...?"
1005906-220 = "Oh. I get it. This place..."
1005906-221 = "[s] \"You have a lot of memories here, right?\""
1005906-222 = "...Yeah. I do. "
1005906-223 = "This area ended up being abandoned for a while. It was worn down, dirty, and most people thought totally beyond repair. "
1005906-224 = "But look at it now... Pristine and beautiful."
1005906-225 = "[s3] \"That's right. It's the same for your ruined swimsuit.\"\n[s4] \"I think the same goes for other things as well.\""
1005906-228 = "..."
1005906-229 = "So does that mean we're going to have a swim class here, together?"
1005906-230 = "At an abandoned swimming pool in the middle of the night, just the two of us? Will you be all right? Don't you think it'd cause a lot of issues for you if we get caught?"
1005906-231 = "[s] \"...Huh? I-Is that so?\""
1005906-232 = "Well, I don't mind if we get caught! I'm going to go change into my swimsuit! Be right back! ☆"
1005906-236 = "[ns] \"H-Hold on, Mika?!\""
1005906-239 = "Ta-da! ☆"
1005906-240 = "Look, Sensei! It's a bit tight, but I think it's a perfect fit!"
1005906-244 = "What do you think? How is it? Does it fit me okay? It's just a school swimsuit, but do you like it?"
1005906-245 = "Hm? Hmmm??"
1005906-246 = "[s] \"Uh... Um... You're too close. Mika.\""
1005906-247 = "Ahahaha! What? It's just me, in a swimsuit, you know! You're gonna hurt my feelings if you keep backing away like that! ☆"
1005906-248 = "[s] \"...\""
1005906-259 = "...Oops. I might have gotten a little carried away there."
1005906-260 = "[s] \"Well, you've always been the type to act first and then regret it later.\""
1005906-261 = "Heehee. Yup, I guess someone's true nature doesn't really change. ☆"
1005906-265 = "Now, why don't you join me, Sensei? It's nice and refreshing!"
1005906-266 = "[s] \"No. I'm perfectly fine out here...\""
1005906-270 = "Beep! Who's there? This area is off limits at this time of the night!"
1005906-271 = "Wah?! It's security, Sensei!!"
1005906-272 = "[s5] \"I just remembered some urgent business! Then, please excuse us!\"\n[s6] Grab Mika and run away."
1005906-277 = "Sensei?!"
1005906-282 = "Sensei?!"

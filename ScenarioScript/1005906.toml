[translation]
1005906-1 = "บาดแผลและแผลเป็น"
1005906-6 = "(คุณครูได้ยินเรื่องราวที่เกิดขึ้นทั้งหมดที่เกิดจากบุคลากรคนอื่นในโรงเรียน)"
1005906-7 = "ตอนนี้มิกะกำลังถูกคุมประพฤติอยู่ในห้องสำนึกผิดเพราะไปก่อเหตุรุนแรงในโรงเรียน"
1005906-8 = "[s] \"เหตุรุนแรงเหรอ...?\""
1005906-9 = "ใช่ครับ วันนี้มิกะไปทำร้ายนักเรียนคนอื่นน่ะครับ"
1005906-10 = "[ns1] \"...?!!\" \n[ns2] \"เกิดเรื่องอะไรขึ้นเหรอ?\""
1005906-13 = "ผะ... ผมเองก็ไม่รู้รายละเอียดเท่าไร..."
1005906-14 = "แต่วันนี้ตอนคาบว่ายน้ำ มิกะไม่ได้เอาชุดว่ายน้ำมา"
1005906-15 = "[s] \"ชุดว่ายน้ำเหรอ...?\""
1005906-16 = "ครับ เธอมาถึงตอนใกล้จะหมดคาบแล้ว แล้วก็ไม่ยอมนั่งเรียนให้ดีๆ แต่กลับเดินไปเดินมา..."
1005906-17 = "พฤติกรรมในห้องเรียนของมิกะค่อนข้างไม่เหมาะสมและรบกวนคนอื่นครับ"
1005906-18 = "นักเรียนที่ไม่พอใจเรื่องนั้นก็เลยมารวมตัวกันประท้วงครับ แต่มิกะก็กลับใช้ความรุนแรง ทำร้ายนักเรียนพวกนั้น..."
1005906-22 = "[ns] \"...\""
1005906-23 = "โชคดีที่นักเรียนคนนั้นไม่ได้บาดเจ็บมาก ส่วนมิกะเองก็เต็มใจที่จะถูกลงโทษ สถานการณ์ก็เลยจบลง#nแบบนั้นครับ..."
1005906-24 = "มิกะเองก็เคยมีความผิดติดตัวอยู่ด้วย สถานการณ์ก็เลยยิ่งซับซ้อนกว่าเดิม... หวังว่าจะไม่เกิด#nเรื่องใหญ่กว่านี้นะครับ..."
1005906-25 = "เราก็เลย... อยากขอให้คุณครูจากชาเล่ต์รับตัวมิกะไปน่ะครับ..."
1005906-26 = "[s] \"เข้าใจแล้ว...\""
1005906-30 = "ขอบคุณมากครับ!"
1005906-34 = "ถ้างั้นผมขอตัวไปจัดการงานอื่นก่อนนะครับ!"
1005906-38 = "[ns] \"......\""
1005906-44 = "(ไปรับตัวมิกะที่ถูกคุมประพฤติอยู่)"
1005906-50 = "[ns] \"มิกะ...\""
1005906-51 = "...สุดท้ายฉันก็เป็นแบบนี้อีกแล้ว"
1005906-52 = "คุณครูผิดหวังรึเปล่า? แต่คุณครูก็รู้แล้วนี่นาว่าฉันเป็นนักเรียนเกเรน่ะ"
1005906-53 = "ฉันเป็นเด็กไม่ดีที่ถ้าปล่อยไว้ก็จะก่อแต่ปัญหาไม่จบไม่สิ้น"
1005906-57 = "ฉันทำให้คุณครูต้องลำบากมาถึงที่นี่เลย งั้นก็คงต้อง..."
1005906-64 = "[ns] \"เป็นยังไงบ้าง? ไม่ได้โดนใครรังแกมาใช่มั้ย?\""
1005906-65 = "หะ... หือ?!"
1005906-66 = "[s] \"ทำชุดว่ายน้ำหายเหรอ?\""
1005906-70 = "ฉะ... ฉัน..."
1005906-71 = "นั่นมัน... ชุดว่ายน้ำที่คุณครูซื้อให้แท้ๆ..."
1005906-78 = "ทะ... ทำไมล่ะ?!"
1005906-79 = "ทะ... ทำไมถึงไม่มีชุดว่ายน้ำ...?! มันหายไปไหนนะ...?!"
1005906-85 = "คิกคิก... อดีตคนจากสภาน้ำชาเนี่ย ไม่ดูแลของในตู้เก็บของเอาซะเลยนะคะ"
1005906-86 = "สงสัยที่ผ่านมามีคนอื่นคอยเป็นธุระจัดแจงให้ ก็เลยทำเองไม่เป็นน่ะ"
1005906-87 = "แต่ก็ดีเลยนะคะ ยังไงเธอก็เป็นคนสูงส่งอยู่แล้ว คงไม่อยากลงสระว่ายน้ำกับคนธรรมดาอย่างพวกเรา#nหรอกค่ะ"
1005906-88 = "จะว่าไป วันนี้ขยะเต็มถังเลย สงสัยจะมีอะไรให้ทิ้งเยอะเลยนะคะ? ฮ่าฮ่าฮ่า!"
1005906-89 = "......."
1005906-101 = "ไม่มี... ฉันไปค้นจากทั้งในถังขยะและเตาเผาขยะมาหมดแล้ว..."
1005906-102 = "แต่มันไม่มีเลย... ของสำคัญแท้ๆ... มันหายไปไหนนะ..."
1005906-107 = "ตายจริง มีขยะอะไรอยู่ตรงนี้ด้วยเนี่ย?"
1005906-111 = "...!!"
1005906-112 = "เหมือนจะเป็นชุดว่ายน้ำที่โดนกรรไกรตัดมากกว่าเป็นขยะนะคะ?"
1005906-116 = "แต่สภาพแบบนี้... มันก็เป็นขยะเหมือนกันนั่นแหละ"
1005906-125 = "นี่พวกเธอกล้าดียังไง..."
1005906-127 = "กะ...กรี๊ดดด...?!"
1005906-128 = "อะ... อะไรเนี่ย?! ไหนว่าจากนี้มิกะจะออกมาก่อเรื่องไม่ได้แล้วไง! ไหนใครว่าเป็นเสือถูกถอดเขี้ยวเล็บ#nแล้วไงล่ะ!"
1005906-129 = "จะ... จะโดนฆ่ามั้ยเนี่ย?!"
1005906-136 = "(ไม่ได้นะ...)"
1005906-137 = "(ฉันจะทำแบบนั้นอีกไม่ได้... ฉัน...)"
1005906-138 = "แม่มด! แม่มดอยู่ตรงนี้! ชะ... ช่วยด้วย!"
1005906-142 = "ระ... รอด้วย! ไปด้วยกันสิ!!"
1005906-146 = "ปะ...ปล่อยฉันนะ กะ...กรี๊ดดดดด?!"
1005906-152 = "โอ๊ย... เจ็บจัง... โอยยย......"
1005906-157 = "ชุดว่ายน้ำ..."
1005906-159 = "......."
1005906-160 = "คุณครู... ฉันขอโทษนะ ชุดว่ายน้ำที่คุณครูให้เป็นของขวัญมา... มันกลายเป็นขยะไปแล้ว...  ถูกฉีกเป็นชิ้นๆ หมดแล้วเลย..."
1005906-161 = "แต่มันก็สมควรแล้วละ ที่ผ่านมาฉันทำเรื่องที่ไม่ดีเอาไว้... ถ้าฉันเป็นคนดี เรื่องแบบนี้คงไม่เกิดขึ้น#nหรอก..."
1005906-162 = "ครั้งนี้ฉันพยายามอดทนแล้วนะ... แต่ว่ามัน... ไม่ไหวจริงๆ..."
1005906-163 = "ฉันทำให้คุณครูผิดหวังอยู่เรื่อยเลย... อุตส่าห์ตั้งตารอว่าจะได้ใส่ชุดว่ายน้ำใหม่ไปเรียนว่ายน้ำแท้ๆ..."
1005906-164 = "คนอย่างฉันคงทำดีไม่ขึ้นจริงๆ สินะ..."
1005906-165 = "ไม่ว่าจะทำยังไง ก็กลับไปเหมือนเดิมไม่ได้......"
1005906-166 = "[s] \"จริงสิ มิกะ วันนี้พอมีเวลามั้ย?\""
1005906-167 = "หืม...?"
1005906-168 = "จู่ๆ ก็ถามอะไรน่ะ? อืม... จริงๆ ก็อีกนานอยู่กว่าหอพักจะเรียกรายงานตัว..."
1005906-174 = "[ns] \"ถ้างั้นไปเรียนว่ายน้ำกันมั้ย?\""
1005906-175 = "...หืม?"
1005906-182 = "ร้านขายเสื้อผ้าทรีนิตี้"
1005906-185 = "ถึงชุดจะเสียหายเยอะมาก แต่ก็ไม่ถึงขนาดที่ซ่อมแซมไม่ได้หรอกครับ"
1005906-187 = "......."
1005906-188 = "ถ้าเอามาซ่อมก็อาจจะเห็นรอยตำหนิบ้าง แต่ก็ไม่เป็นปัญหาในการใช้งานครับ ตอนนี้ยังอยู่ในช่วง#nรับประกัน ทางร้านจะซ่อมให้ฟรีนะครับ"
1005906-189 = "[s] \"รบกวนด้วยนะ\""
1005906-190 = "ครับ ใช้เวลาซ่อมไม่นาน กรุณารอสักครู่นะครับ"
1005906-194 = "นี่ครับคุณลูกค้า "
1005906-199 = "......."
1005906-200 = "ชุดว่ายน้ำก็ซ่อมได้ด้วยเหรอเนี่ย..."
1005906-201 = "ไม่รู้มาก่อนเลย... นึกว่าถ้าขาดแล้วต้องซื้อใหม่อย่างเดียวซะอีก..."
1005906-205 = "นี่... คุณครู... จะไปไหนเหรอ? ห้องเรียนไม่ได้อยู่ทางนี้นะ..."
1005906-206 = "มะ... เมื่อกี้บอกว่าจะไปเรียนว่ายน้ำไม่ใช่เหรอ? ถึงฉันจะไม่เข้าใจที่คุณครูพูดก็เถอะ..."
1005906-207 = "อีกอย่าง เวลานี้ไม่น่าจะมีสระว่ายน้ำที่เปิดให้เข้าใช้ได้อยู่ด้วย..."
1005906-208 = "[s] \"ครูรู้จักอยู่ที่หนึ่ง\""
1005906-213 = "สระว่ายน้ำอาคารย่อย"
1005906-215 = "ที่นี่มัน..."
1005906-220 = "...ตรงนี้นี่เอง เกือบลืมสระตรงนี้ไปแล้ว..."
1005906-221 = "[s] \"เป็นสถานที่แห่งความทรงจำเลยใช่มั้ยล่ะ?\""
1005906-222 = "อื้ม... "
1005906-223 = "สระนี้ถูกทิ้งไว้นานแล้ว... ตอนแรกมันทั้งเก่าและก็เปื้อนจนแทบใช้ประโยชน์อะไรไม่ได้เลย..."
1005906-224 = "แต่ตอนนี้มันกลับมาสะอาดน่าใช้งานแล้ว"
1005906-225 = "[s3] \"ใช่ เหมือนกับชุดว่ายน้ำที่เคยขาดรุ่งริ่งแหละ\"\n[s4] \"ครูว่ามันก็เปรียบกับเรื่องอื่นได้เหมือนกันนะ\""
1005906-228 = "......."
1005906-229 = "ฉันจะได้เรียนว่ายน้ำกับคุณครูงั้นเหรอ?"
1005906-230 = "เรียนในสระว่ายน้ำไกลสายตาผู้คน... สองต่อสอง... ในกลางดึกแบบนี้เหรอ? ไม่เป็นไรแน่เหรอ? ถ้าใครจับได้ อาจเกิดปัญหาใหญ่ก็ได้นะ"
1005906-231 = "[s] \"หืม...? ระ... หรือว่าไม่ควร?\""
1005906-232 = "แต่ถึงจะโดนจับได้ ฉันก็ไม่ติดอะไรหรอกนะ☆ ไปเปลี่ยนชุดว่ายน้ำมาดีกว่า! รอเดี๋ยวนะคุณครู!"
1005906-236 = "[ns] \"เดี๋ยวสิ รอก่อน มิกะ?!\""
1005906-239 = "มาแล้ว☆"
1005906-240 = "คุณครู ดูนี่สิๆ เหมือนมันจะเล็กลงนิดหนึ่ง แต่ดูไม่ค่อยรู้เลยว่าเอาไปซ่อมมา"
1005906-244 = "คุณครูว่าไงบ้าง? สวยมั้ย? เหมาะกับฉันหรือเปล่า? ถึงจะเป็นชุดว่ายน้ำโรงเรียนแต่ก็ดูดีอยู่นะว่ามั้ย?"
1005906-245 = "ใช่มั้ย? คิดแบบนั้นมั้ย...?"
1005906-246 = "[s] \"อ่า... คือ... เข้ามาใกล้เกินไปแล้วนะ คุณมิกะ\""
1005906-247 = "อะฮะฮะฮ่า☆ อะไรกัน นี่มันชุดว่ายน้ำโรงเรียนม.ปลายนะ พอเห็นแล้วผงะไปเลยแบบนี้ ฉันเสียใจเหมือนกันนะ?"
1005906-248 = "[s] \"......\""
1005906-259 = "อืม... พอมาคิดๆ ดู ฉันก็เริ่มเขินขึ้นมาแล้วละ…"
1005906-260 = "[s] \"จะว่าไป มิกะเป็นพวกที่ลงมือทำก่อนแล้วค่อยคิดเสียใจทีหลังนี่นะ\""
1005906-261 = "อะฮ่าฮ่า☆ สงสัยฉันจะยังเป็นคนเดิมไม่เปลี่ยนน่ะ"
1005906-265 = "เอาละ คุณครูก็ลงมาด้วยกันสิ ในนี้เย็นสบายมากเลยนะ!"
1005906-266 = "[s] \"ไม่เอา ขอปฏิเสธดีกว่า......\""
1005906-270 = "ปี๊ดดดด! ใครอยู่ตรงนั้นน่ะ! ห้ามเข้าอาคารย่อยในเวลานี้นะ!"
1005906-271 = "วะ.... ว้ายย?! ยามมาแล้วแน่เลย คุณครู!!"
1005906-272 = "[s5] \"ครูเพิ่งนึกได้ว่ามีเรื่องด่วนต้องไปทำ! ขอตัวก่อนนะ!\"\n[s6] พามิกะหนีออกมา"
1005906-277 = "คะ... คุณครู?!"
1005906-282 = "คะ... คุณครู?!"

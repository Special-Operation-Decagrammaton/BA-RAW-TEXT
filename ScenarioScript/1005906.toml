[translation]
1005906-1 = "傷痕"
1005906-6 = "（詢問教職員事情的來龍去脈）"
1005906-7 = "……彌香同學因為在校內引起暴力事件，#n目前在反省室反省中。"
1005906-8 = "[s]「暴力事件，是嗎……？」"
1005906-9 = "是的。似乎是對其他學生動手了……"
1005906-10 = "[ns1]「…………！？」 \n[ns2]「到底發生了什麼事？」"
1005906-13 = "詳細的情況我也不是很清楚……"
1005906-14 = "不過今天游泳課時，#n彌香同學只是在一旁看著。"
1005906-15 = "[s]「……在一旁看著？」"
1005906-16 = "是的。而且是在課程快要結束時才抵達，#n並且沒有安分地在泳池旁觀摩，而是到處走來走去…… "
1005906-17 = "彌香同學的上課態度有問題。"
1005906-18 = "對此有所不滿的數名學生發起了抗議。#n結果彌香同學就對他們動了手……"
1005906-22 = "[ns]「…………」"
1005906-23 = "所幸該名學生的傷勢並不嚴重，#n彌香同學也自願受罰，事件才告一段落……"
1005906-24 = "考慮到彌香同學現在的立場，#n情況有點複雜……希望事情不會繼續鬧大……"
1005906-25 = "所以……那個，希望能把彌香同學交給夏萊的老師……"
1005906-26 = "[s]「……我知道了。」"
1005906-30 = "非常感謝！"
1005906-34 = "那麼我還有其他事，先告辭了！"
1005906-38 = "[ns]「……」"
1005906-44 = "（接管正在反省中的彌香）"
1005906-50 = "[ns] 「彌香……」"
1005906-51 = "啊哈哈……又變成這樣了呢。"
1005906-52 = "讓你失望了嗎……？#n不過老師早就知道了吧？我是不良學生。"
1005906-53 = "是動不動就會引發事件的……問題兒童。"
1005906-57 = "總是給你添麻煩……也差不多該──"
1005906-64 = "[ns]「彌香……你是不是被欺負了？還好嗎？」"
1005906-65 = "……呃，嗯！？"
1005906-66 = "[s]「泳裝，弄丟了嗎？」"
1005906-70 = "我……我……"
1005906-71 = "明，明明是，老師，買給我的……泳裝……"
1005906-78 = "怎，怎麼會！？"
1005906-79 = "泳裝呢……！#n咦？跑哪去了……！？"
1005906-85 = "噗……看來茶會的「公主」連管理置物櫃都不會啊。"
1005906-86 = "畢竟之前好像都是交給隨從做的嘛，#n這也難怪。"
1005906-87 = "不過這樣也好吧？畢竟是身分高貴的人……#n要和我們這些庶民用同一個泳池，肯定會很討厭的對吧？"
1005906-88 = "哎呀……垃圾桶滿了呢。#n是今天垃圾比較多嗎……噗。"
1005906-89 = "…………"
1005906-101 = "沒有……連垃圾桶跟焚化爐都翻過了……"
1005906-102 = "還是找不到……！#n怎麼會……？#n那是我重要的東西……到底在哪裡……"
1005906-107 = "哎呀，這裡怎麼會有垃圾啊？"
1005906-111 = "……！！"
1005906-112 = "與其說是垃圾，我看倒像泳裝？"
1005906-116 = "不過已經破破爛爛的，沒辦法穿了吧。"
1005906-125 = "你們，竟敢……"
1005906-127 = "噫，噫──！？"
1005906-128 = "搞，搞什麼啊！？#n不是說彌香已經是不會反抗的紙老虎了嗎！？"
1005906-129 = "要，要被殺了……！？"
1005906-136 = "（……不行）"
1005906-137 = "（……再這樣下去的話，我又會……）"
1005906-138 = "是，是魔女……！#n救，救命啊！！"
1005906-142 = "等等，別丟下我啊！"
1005906-146 = "喂，別抓我……！唔，唔哇啊啊！？"
1005906-152 = "痛痛痛……"
1005906-157 = "泳裝被……"
1005906-159 = "……"
1005906-160 = "老師……對不起。#n你買給我的泳裝，已經沒辦法穿了……"
1005906-161 = "不過，這也是理所當然的吧……#n畢竟我之前做了太多太多的壞事……#n如果我能當個「好孩子」，就不會發生這種事了吧……"
1005906-162 = "但這次……我真的，很努力……#n然而……卻還是失敗了呢……"
1005906-163 = "對不起……我總是一再辜負老師的好意……#n明明，很期待穿著這套泳裝去游泳的……"
1005906-164 = "……我果然做不到吧……"
1005906-165 = "無論怎麼做，都已經無法挽回了……"
1005906-166 = "[s]「……彌香，今天還有時間嗎？」"
1005906-167 = "……咦？"
1005906-168 = "時間……？#n嗯，嗯。離門禁時間還有很久……"
1005906-174 = "[ns]「那我們來上游泳課吧。」"
1005906-175 = "……咦？"
1005906-182 = "三一指定服飾販售店"
1005906-185 = "……這個嘛。#n雖然破損相當嚴重，但也不是無法修復。"
1005906-187 = "……"
1005906-188 = "雖然會留下縫過的痕跡，但正常穿的話應該是沒問題的。#n考慮到客人您剛買沒多久，這次就免費幫您處理吧。"
1005906-189 = "[s]「謝謝。」"
1005906-190 = "很快就能完成，還請稍等一會兒。"
1005906-194 = "讓兩位久等了，請收下。"
1005906-199 = "……"
1005906-200 = "原來連泳裝也能修啊……"
1005906-201 = "之前都不知道……#n我還以為不能穿了就只能買新的……"
1005906-205 = "老，老師……？#n你要去哪裡……？#n教室不是這個方向哦……"
1005906-206 = "老師說要上游泳課，對吧……？#n雖然我不知道要做什麼……"
1005906-207 = "而且現在這個時間，到處應該都已經關──"
1005906-208 = "[s]「我知道一個好地方。」"
1005906-213 = "合宿處．泳池"
1005906-215 = "這裡是……"
1005906-220 = "原來如此……這麼說來，還有這個地方呢。"
1005906-221 = "[s]「是個充滿回憶的地方，對吧？」"
1005906-222 = "……嗯。"
1005906-223 = "因為已經被擱置了好一段時間，都沒有好好維護，總是髒兮兮的……#n簡直髒亂到讓人不知如何是好……"
1005906-224 = "現在竟然變得這麼漂亮了。"
1005906-225 = "[s3]「嗯，泳裝也是一樣。」\n[s4]「我想其他事情也是一樣的哦。」"
1005906-228 = "……"
1005906-229 = "所以，現在要和老師開始上游泳課嗎？"
1005906-230 = "在這種深夜……又荒無人煙的地方，兩人獨處……？#n不會有問題嗎？被發現的話會很不妙的吧？"
1005906-231 = "[s]「啊！這，這麼說也對……」"
1005906-232 = "我是無所謂啦☆#n我現在就去換泳裝，等等我哦！"
1005906-236 = "[ns]「等，等等，彌香！？」"
1005906-239 = "鏘鏘～☆"
1005906-240 = "你看，老師！雖然稍微有點緊，不過幾乎完全復原了！"
1005906-244 = "怎麼樣怎麼樣？適合我嗎？#n學校指定的泳裝感覺也不錯吧？"
1005906-245 = "吶吶？？"
1005906-246 = "[s]「那個……彌香同學……有點靠太近了。」"
1005906-247 = "啊哈哈！什麼嘛，這可是女學生的泳裝唷？#n如果躲開的話，我會有點受傷的。"
1005906-248 = "[s] 「……」"
1005906-259 = "唔哇……冷靜想一想，突然覺得超級害羞……"
1005906-260 = "[s]「彌香是考慮之前會先採取行動的類型吧。」"
1005906-261 = "啊哈哈☆嗯。#n看來本性是沒那麼容易改變的。"
1005906-265 = "老師要不要也進來呀？#n非常舒服哦☆"
1005906-266 = "[s]「不，請容我拒絕……」"
1005906-270 = "嗶──！是誰在那裡！#n這個地方現在禁止進入！"
1005906-271 = "哇哇，老師！警衛衝過來了！？"
1005906-272 = "[s5]「我突然想到還有急事，抱歉！先告辭了！」\n[s6] 帶著彌香全速逃跑"
1005906-277 = "老，老師！？"
1005906-282 = "老，老師！？"

[translation]
13060-1 = "Episode 6;Sales Contract"
13060-3 = "What do you mean? Written...by Yume?"
13060-4 = "Yes. It states here that the Abydos Student Council purchased from Nephthys the rights to use some facilities created during the Trans-Desert Railway project."
13060-6 = "From Nephthys...?"
13060-8 = "...When a district falls apart, contracts like these get sold left and right."
13060-9 = "The Trans-Desert Railway was a joint project by the Abydos Student Council and Nephthys. But technically, the rights belonged to the student council, who put in the original order for the project."
13060-10 = "The student council sold those rights to Nephthys to repay their debt, and it seems the previous president, Kuchinashi Yume, attempted to repurchase the rights later down the road."
13060-11 = "...Which essentially sums up the contents of the contract."
13060-13 = "G-Give me that."
13060-15 = "Sales Contract... Abydos Student Council agrees to purchase the rights to...Trans-Desert Railway facilities from Nephthys...for one million yen...upon signing this contract, the buyer shall pay a contract fee of ten thousand yen..."
13060-16 = "The buyer shall be responsible for paying the remaining balance to the seller within the two-year period specified in this contract..."
13060-17 = "The compensation for the delayed payment of the remaining balance will be... "
13060-18 = "Signed... Abydos Student Council President... Kuchinashi Yume..."
13060-19 = "..."
13060-22 = "...Mm."
13060-23 = "That's Yume's handwriting. I'd know it anywhere."
13060-24 = "Precisely. The contract states that the Abydos Student Council purchased Trans-Desert Railway facilities from Nephthys for one million yen."
13060-25 = "When did she do this? And I didn't have a clue?"
13060-26 = "I've read and re-read every scrap Yume left behind. Every sheet of paper, memo, discarded notes... Everything."
13060-27 = "But I've never heard of this contract... I'd understand if it was from the previous student council, but there's no way I would miss any sign of Yume..."
13060-29 = "That's likely because the contract has not been completed yet."
13060-33 = "It was a time-based contract, and the originally agreed-upon payment has not been delivered as of yet."
13060-34 = "So the contract is still in progress?"
13060-35 = "Yes. That's correct. The contract has indeed been signed and notarized, but the payment itself has not been delivered, two years later."
13060-36 = "No one considered the contract to be of much importance, especially after the one managing it quit the company."
13060-37 = "So it was forgotten in a storage room until it was...accidentally discovered."
13060-39 = "Accidentally..."
13060-40 = "[s] \"Accidentally...\""
13060-41 = "Mm."
13060-43 = "It's created quite the conundrum for us. It would've been best if this contract had stayed buried."
13060-44 = "This single piece of paper has prevented us from acquiring all rights to the Trans-Desert Railway, as these affiliated facilities couldn't be included in our purchase."
13060-45 = "The rights to those facilities currently belong to the Abydos Student Council."
13060-47 = "And so...?"
13060-48 = "So, how would you like to proceed? Do you intend to uphold your end of the contract?"
13060-49 = "Excuse me? You came all this way to ask us that?"
13060-51 = "It's a rather significant matter."
13060-52 = "We will be holding a general creditors' meeting in two days' time to discuss the shares for the project, but we can't move forward until this is sorted out."
13060-53 = "General creditors' meeting...?"
13060-54 = "Like a big meeting for all the creditors?"
13060-55 = "Correct. All of the investors of the private equity fund will gather to discuss our plans moving forward."
13060-56 = "Now, Hoshino. As the representative of the Abydos Student Council, do you intend to pay the remaining balance stated in the contract to Nephthys?"
13060-58 = "..."
13060-59 = "This is all really sudden. You come barging in here and ask us to fulfill a contract we didn't even know about..."
13060-60 = "And furthermore, purchasing those kinds of rights..."
13060-61 = "You said the remaining balance was one million yen? We're already swimming in debt."
13060-62 = "Excellent, that's precisely what we wanted to hear! Who in their right mind would pay one million yen to acquire some abandoned scrap metal?"
13060-63 = "To my understanding, you children are already struggling to pay off your current debt. It wouldn't be wise to dig that hole deeper, now would it?"
13060-64 = "I'll take that as confirmation you're no longer interested in upholding your end of the contract!"
13060-66 = "In that case, why don't you just sign right here on this waiver, Hoshino? It's just a little paper that says you'll hand over any rights you have to the private equity fund."
13060-67 = "G-Gimme a sec here... I'm not all that keen on randomly signing contracts anymore..."
13060-69 = "[ns] \"Stop pressuring my students.\""
13060-71 = "Hm?"
13060-72 = "[s1] \"Any contract needs to be thoroughly reviewed before it's signed.\"\n[s2] \"Do you mind giving us time to look everything over first?\""
13060-75 = "Hm..."
13060-76 = "That's a problem for us..."
13060-77 = "Did we get ahead of ourselves...?"
13060-78 = "Regardless of your decision right now, this contract is set to expire in two days time."
13060-80 = "Just two days...?"
13060-85 = "In two days, it'll be exactly two years since the contract was signed. You can check the date for yourself. Once those two days are up, it's done and dusted."
13060-86 = "Which is why we scheduled that general creditors' meeting in exactly two days. We wanted to get a jump on things, but...we can wait."
13060-87 = "Let me spell it out for you."
13060-88 = "We're hosting the private equity fund's general creditors' meeting in two days, at the Abydos Central Station District Office."
13060-89 = "If you want to keep that contract alive, you'll need show up to the meeting before noon, state your intentions, and get it notarized."
13060-90 = "If you can, that is."
13060-91 = "...?"
13060-95 = "If...we can...?"
13060-96 = "..."
13060-98 = "Two days, District Office, noon. Don't forget. Miss it by even a millisecond, and the contract is null and void."
13060-99 = "That was the message we came to deliver. Thank you for your time."
13060-100 = "Very well then."
13060-101 = "Let's go."
13060-110 = "...?"
13060-111 = "C'mon, Highlander overseer! Aren't you our escort?"
13060-112 = "...Now then."
13060-117 = "Um..."
13060-118 = "..."
13060-119 = "Um... In other words..."
13060-121 = "Hell no! Forget this! I'm not listening to those scam artists!"
13060-122 = "Serika...?!"
13060-123 = "They think they can just throw fancy pieces of paper around and demand we give them all this money?"
13060-124 = "Who do they think they are? They're acting like they're royalty over some abandoned scraps of metal!"
13060-125 = "Wait, yeah! Why're they making such a big deal over a pile of junk? What're they hiding?!"
13060-129 = "D-Don't look at me like that, Shiroko... You look way too proud of me right now..."
13060-130 = "I agree with everything she said. And if even Serika can pick up on their suspicious intentions, we know there's something there."
13060-131 = "Hey! I'm not THAT gullible!"
13060-132 = "[s] \"She's right. Our first step is to figure out what secret they're hiding.\""
13060-133 = "Yes, I believe so as well. What's buried beneath that failed project..."
13060-134 = "[s3] \"We need to approach things carefully when it comes to contracts.\"\n[s4] \"We have time to figure out our game plan.\""
13060-135 = "...Understood."
13060-136 = "...Understood."
13060-137 = "Hoshino... What lies at the heart of this issue is the previous student council president, Kuchinashi Yume."
13060-141 = "We know this is a sensitive topic and that's why we've never broached it. But we need a full picture of the situation. So...just what happened while you and Yume served on the student council together?"
13060-142 = "A-Ayane...?"
13060-143 = "Please, Hoshino. We need to know what happened to the Abydos Student Council. I don't think we can solve this predicament without that."
13060-144 = "You know too, don't you? Nonomi?"
13060-146 = "Th-That's..."
13060-148 = "I've always wondered why the Foreclosure Task Force operates out of the School Festival Headquarters, rather than the student council room."
13060-149 = "And then there's the locked classroom on the first floor. Why seal shut a classroom in this abandoned building?"
13060-150 = "That room is the original student council room, isn't it, Hoshino?"
13060-151 = "I have questions too. Why did the previous president sign a contract putting the school in even more debt?"
13060-152 = "Huh? I thought Shiroko would've known these things, at least."
13060-153 = "I never pressed for details."
13060-154 = "Well... They did wrangle Shiroko off the streets..."
13060-155 = "That's... That's not what happened at all."
13060-157 = "Wait, everyone. We shouldn't pressure Hoshino like this. When she's ready—"
13060-158 = "Thanks, Nonomi. But it's okay."
13060-162 = "Our old student council pres... She was a walking danger sign, if I'm gonna be honest."
13060-163 = "She was...so naive. Always running headfirst into trouble and getting taken advantage of left and right."
13060-164 = "And she still managed to graduate somehow?!"
13060-165 = "...No. No, she didn't."
13060-170 = "...Yume went missing before she had the chance to graduate."
13060-171 = "...!!"
13060-172 = "Missing...?"
13060-176 = "She went missing?! How does that happen??"
13060-178 = "Who knows. She went missing, and she was...found thirty-three days later in the Abydos desert."
13060-179 = "She was found with her halo destroyed."
13060-180 = "Her halo...?"
13060-181 = "H-How?!"
13060-182 = "An accident, probably. I think she got lost in the desert."
13060-183 = "Probably?! But how? What happened to her?"
13060-184 = "...I don't know."
13060-185 = "What?!"
13060-186 = "Weren't you the vice president then?"
13060-187 = "That's... Well..."
13060-188 = "It's because...I had left, three days before Yume went missing."
13060-189 = "So I can't tell you what happened in the sixty hours before she was lost."
13060-190 = "It wasn't until later that I found out she went missing... But why she went that deep into the desert? Why she got lost? I don't know."
13060-191 = "What was she doing? What could have happened?"
13060-192 = "What... What was she thinking?"
13060-193 = "I hunted down the answers to those questions for a long time. I scoured every last remnant of Yume left on this planet looking for a clue. But nothing."
13060-194 = "And I was so sure everything would've been written down in that damn notebook. Hah."
13060-195 = "What notebook?"
13060-196 = "Yume had this silly little notebook she wrote everything down in. Even the most inconsequential things."
13060-202 = "So finding a trace of her like this, after all that searching..."
13060-203 = "It's suspicious as heck, isn't it? Like why was this contract aborted halfway?"
13060-204 = "And it suddenly shows up, two years after the contract was written? The signed date here, by this time, Yume was..."
13060-205 = "..."
13060-206 = "...Ah."
13060-207 = "?!"
13060-208 = "The date... It's..."
13060-209 = "H-Hoshino...?!"
13060-211 = "Thank you, as always, Hoshino! Stay safe, okay?"
13060-221 = "Hoshino?!"
13060-222 = "A-Are you okay? Here, sit down!"
13060-226 = "This date... The date written on this contract..."
13060-227 = "This date is..."
13060-228 = "It's the exact date Yume went missing."
13060-229 = "...!!"
13060-235 = "Who the hell would wanna visit some spot in the middle of a desert?! For once in your life, stop daydreaming!"
13060-239 = "You know what, actually, do whatever you want! I don't want it! I don't need it!"
13060-243 = "Forget this student council game! I'm done playing house with you!"
13060-254 = "[ns] \"Hoshino?!\""
13060-255 = "Wait, Hoshino! Come back!"
13060-256 = "I'm going after her."
13060-265 = "Shiroko! Wait!"
13060-266 = "Gah! Why are they like this? Should we go after them?"
13060-267 = "...It's okay. No one stands a chance of keeping up with Hoshino besides Shiroko anyway."
13060-268 = "I suppose, but still..."
13060-269 = "Ayane, if this contract was written the day Yume went missing... "
13060-270 = "That can only mean..."
13060-275 = "Yes. President Yume's disappearance and this contract..."
13060-277 = "They could be related..."
13060-283 = "Next Episode;The Body's Limits"

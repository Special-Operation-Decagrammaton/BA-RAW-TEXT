[translation]
13060-1 = "ตอนที่ 6;สัญญาซื้อขาย"
13060-3 = "หนังสือสัญญาที่รุ่นพี่ยูเมะเขียนไว้งั้นเหรอ...?"
13060-4 = "ครับ ใช่แล้วครับ และรายละเอียดข้างในบอกว่า <สภานักเรียนอะบิดอส> ซื้อสิทธิ์ในการใช้สิ่งอำนวย#nความสะดวกเสริมของทางรถไฟข้ามทะเลทรายมาจากเซนต์ เนฟธิส"
13060-6 = "จากเนฟธิสงั้นเหรอ...?"
13060-8 = "ถ้าเขตปกครองตนเองจะย่อยยับ ก็จะมีการซื้อขายหนังสือรับรองสิทธิ์แบบนี้กันเป็นธรรมดา"
13060-9 = "ทางรถไฟข้ามทะเลทรายเป็นโปรเจกต์ที่ <สภานักเรียนอะบิดอส> กับเนฟธิสทำร่วมกันก็จริง แต่โดยหลักการแล้ว สิทธิ์นี้เป็นของสภานักเรียนที่เป็นฝ่ายซื้อมา"
13060-10 = "จากนั้นก็มีการขายสิทธิ์ดังกล่าวให้เนฟธิสเพื่อใช้หนี้ และดูเหมือนว่าคุจินาชิ ยูเมะ ที่เป็นประธานสภา#nนักเรียนคนก่อนพยายามจะซื้อคืนมาน่ะครับ"
13060-11 = "และนี่ก็คือหนังสือสัญญาที่ว่า"
13060-13 = "ฉะ... ฉันขอดูหน่อย"
13060-15 = "สัญญาซื้อขาย... <สภานักเรียนอะบิดอส> ซื้อสิทธิ์ในการใช้สิ่งอำนวยความสะดวกเสริมที่เป็นส่วน#nประกอบของทางรถไฟข้ามทะเลทรายจากเนฟธิสในราคา 1 ล้านเยน... และจะจ่ายเงินมัดจำทันทีในจำนวน 1 หมื่นเยน... "
13060-16 = "สัญญาฉบับนี้จะมีผลทางกฎหมายเป็นเวลา 2 ปีนับตั้งแต่มีการลงนาม... และจะต้องจ่ายส่วนต่างให้#nเนฟธิสภายในระยะเวลาดังกล่าว... "
13060-17 = "ส่วนค่าชดเชยกรณีจ่ายส่วนต่างล่าช้า... "
13060-18 = "ลงชื่อ... คุจินาชิ ยูเมะ... สภานักเรียนอะบิดอส"
13060-19 = "......"
13060-22 = "ใช่แล้วละ"
13060-23 = "รุ่นพี่เป็นคนเขียนหนังสือฉบับนี้จริงๆ ฉันจำลายมือของรุ่นพี่ได้ดี..."
13060-24 = "ใช่แล้วครับ เป็นหนังสือสัญญาที่บอกว่า <สภานักเรียนอะบิดอส> ซื้อสิทธิ์ในการใช้สิ่งอำนวยความ#nสะดวกของทางรถไฟข้ามทะเลทรายจาก <เนฟธิส> ในราคา 1 ล้านเยนครับ"
13060-25 = "รุ่นพี่... ไปทำอะไรแบบนี้ไว้ตอนไหน... ทำไมไม่บอกฉัน..."
13060-26 = "ฉันเป็นคนที่รู้ทุกอย่างที่รุ่นพี่ทิ้งไว้... ต่อให้เป็นกระดาษหรือบันทึกสั้นๆ แผ่นเดียว หรือขยะอะไรก็ตาม ฉันรู้ดีทั้งหมด..."
13060-27 = "แต่เรื่องหนังสือสัญญานี่ฉันไม่เคยได้ยินมาก่อนเลย... ถ้าเป็นสภานักเรียนคนก่อนๆ น่ะไม่แน่ แต่ถ้าเป็นรุ่นพี่ยูเมะ ไม่มีทางที่ฉันจะไม่รู้ในสิ่งที่รุ่นพี่หลงเหลือไว้สิ..."
13060-29 = "อ้อ นี่เป็นสัญญาที่ยังไม่เสร็จสิ้นน่ะ งั้นก็เป็นไปได้ที่คุณจะไม่รู้"
13060-33 = "มันเป็นเหมือนหนังสือสัญญาชั่วคราวประเภทหนึ่ง แล้วการชำระเงินก็ยังไม่เสร็จสิ้นด้วยครับ"
13060-34 = "สัญญานี้ยังไม่เสร็จสิ้นเหรอคะ...?"
13060-35 = "ครับ ใช่แล้วครับ ถึงจะยืนยันได้ว่ามีการเขียนสัญญาและระบุเรื่องเงินมัดจำไว้แล้ว แต่ภายใน 2 ปีหลัง#nจากนั้นก็ไม่มีการชำระเงินครับ"
13060-36 = "หลังจากนั้นหนังสือสัญญาฉบับนี้ก็ไม่มีใครสนใจและเหมือนจะถูกปล่อยผ่านไป แถมเมื่อเวลาผ่านไป ผู้ที่รับผิดชอบก็ลาออกไปด้วย"
13060-37 = "มันก็เลยถูกปล่อยปละละเลย จนมีการค้นพบอีกครั้งโดยบังเอิญในโกดังเอกสารนี่ละครับ"
13060-39 = "โดยบังเอิญ..."
13060-40 = "[s] \"บังเอิญงั้นเหรอ...\" "
13060-41 = "อืม"
13060-43 = "นี่เป็นสถานการณ์ที่น่าปวดหัวสำหรับพวกเราเลยครับ ถ้าไม่เจอหนังสือสัญญานี้คงจะดีกว่า"
13060-44 = "เพราะเหตุนี้ เราจึงไม่ได้สิทธิ์เกี่ยวกับ <การใช้สิ่งอำนวยความสะดวกเสริม> ที่เป็นหนึ่งในสิทธิ์ทั้งหมด#nของ <ทางรถไฟข้ามทะเลทราย> ครับ"
13060-45 = "เพราะตอนนี้สิทธิ์ที่ว่าอยู่ระหว่างการซื้อขายระหว่าง <เนฟธิส> กับ <สภานักเรียนอะบิดอส>"
13060-47 = "ละ... แล้วมันยังไงล่ะ...?"
13060-48 = "เพราะแบบนี้ เราก็เลยอยากตรวจสอบให้แน่ชัดครับ พวกคุณมีความตั้งใจจะดำเนินการสัญญานี้ต่อหรือ#nเปล่าครับ?"
13060-49 = "คะ...? มาถึงที่นี่เพื่อถามเรื่องนี้น่ะเหรอคะ?"
13060-51 = "ก็ใช่น่ะสิ ก็มันคือปัญหาสำคัญของเรา"
13060-52 = "เราต้องจัดการเรื่องนี้ให้ถูกต้อง จะได้หารือเรื่องส่วนแบ่งใน <ทางรถไฟข้ามทะเลทราย> ในการประชุมสมัชชาเจ้าหนี้ที่จะจัดขึ้นในอีก 2 วันหลังจากนี้ได้"
13060-53 = "ประชุมสมัชชาเจ้าหนี้...?"
13060-54 = "การประชุมใหญ่ของพวกเจ้าหนี้งั้นเหรอ..."
13060-55 = "ใช่แล้วครับ เป็นการประชุมที่นักลงทุนทั้งหมดใน <กองทุนไพรเวทอิควิตี้> มารวมตัวกันน่ะครับ"
13060-56 = "<สภานักเรียนอะบิดอส> ยังต้องการชำระเงินที่เหลือให้เนฟธิสแล้วซื้อสิทธิ์ที่ว่าไหมครับ คุณโฮชิโนะ?"
13060-58 = "......"
13060-59 = "เดี๋ยวสิ... จู่ๆ ก็เข้ามาบอกให้เราตัดสินใจว่าจะทำตามสัญญาต่อหรือเปล่า..."
13060-60 = "แต่ต่อให้เราจะซื้อสิทธิ์นั้นไป..."
13060-61 = "อืม... ทั้งหมด 1 ล้านเยนใช่ไหมคะ? แต่ว่าตอนนี้เราไม่ได้อยู่ในสถานะที่จะเพิ่มหนี้ได้..."
13060-62 = "ใช่ไหมล่ะครับ? คิดดีแล้วละครับ ไม่จำเป็นต้องจ่ายเงินถึง 1 ล้านเยนเพื่อซื้อสิทธิ์ในการใช้#nกองเศษเหล็กที่ไร้ประโยชน์หรอกครับ!"
13060-63 = "ที่จริงตอนนี้ทุกคนก็ลำบากกับภาระหนี้สินอยู่แล้วไม่ใช่เหรอครับ? ไม่จำเป็นต้องสร้างหนี้เพิ่มหรอก!"
13060-64 = "เอาละ งั้นสรุปว่าทางนี้ไม่มีความตั้งใจจะดำเนินการตามสัญญานี้ต่อใช่ไหมครับ?"
13060-66 = "ถ้างั้นเชิญคุณโฮชิโนะลงนามในสารชี้แจงการสละสิทธิ์... เนื้อหาในนี้บอกว่าจะมอบสิทธิ์ทั้งหมดให้กับ <กองทุนไพรเวทอิควิตี้> ของพวกเราครับ"
13060-67 = "อ่า... ดะ... เดี๋ยวก่อนนะ จะให้เออออกันแบบนี้เลยเหรอ...?"
13060-69 = "[ns] \"รอเดี๋ยวก่อน\""
13060-71 = "หืม?"
13060-72 = "[s1] \"การลงชื่ออะไรเป็นเรื่องที่ต้องระมัดระวังอยู่แล้ว\"\n[s2] \"ช่วยรอสักครู่ก่อนจะได้หรือเปล่า\""
13060-75 = "ฮืม..."
13060-76 = "อืม... น่าจะลำบากแล้วละ"
13060-77 = "เราใจร้อนเกินไปรึเปล่านะ..."
13060-78 = "แต่ถึงยังไงอีก 2 วันหลังจากนี้ สัญญานี้ก็จะเป็นโมฆะอยู่แล้วครับ"
13060-80 = "2 วันเหรอ...?"
13060-85 = "เพราะถ้าดูตรงวันที่ หนังสือสัญญานี้จะครบ 2 ปีในอีก 2 วันพอดี ยังไงสัญญานี้ก็จะถูกยกเลิกโดย#nอัตโนมัติอยู่แล้วครับ"
13060-86 = "นั่นเป็นเหตุผลว่าทำไมถึงมีการประชุมสมัชชาเจ้าหนี้ในวันนั้นพอดี ผมก็อยากเร่งให้เร็วกว่านี้หน่อยนะ#nครับ แต่ก็อีกแค่ 2 วันเอง จะให้ผมรอก็ได้ครับ  "
13060-87 = "เอาละ พวกผมจะพูดให้ชัดเจนนะครับ"
13060-88 = "อีก 2 วันหลังจากนี้ จะมีการเปิดประชุมสมัชชาเจ้าหนี้ของ <กองทุนไพรเวทอิควิตี้> ที่สำนักงานสถานีกลางอะบิดอส"
13060-89 = "ถ้ายังอยากคงสัญญานี้ไว้ ก็ให้มาเข้าร่วมประชุมก่อนเวลา 12:00 น. แล้วแสดงความจำนงที่จะคง#nสัญญาไว้และขอรับการรับรองครับ"
13060-90 = "ถ้าคิดว่าทำได้น่ะนะ"
13060-91 = "......?"
13060-95 = "ถ้า... ทำได้... งั้นเหรอ?"
13060-96 = "......"
13060-98 = "อย่าลืมนะครับ วันมะรืน ตอนเที่ยง สำนักงานสถานีกลางอะบิดอส ถ้ามาช้าแค่วินาทีเดียว ก็จะถือว่าสัญญาเป็นโมฆะครับ "
13060-99 = "ธุระของพวกผมจบแล้ว ขอบคุณที่ตั้งใจฟังนะครับ"
13060-100 = "งั้นผมขอตัวก่อนละ"
13060-101 = "ผมก็ด้วย"
13060-110 = "......?"
13060-111 = "เอาละ ไปกันเถอะครับ ผู้ควบคุมจากไฮแลนเดอร์ คุณต้องไปคุ้มกันพวกเราสิครับ!"
13060-112 = "ถ้างั้นก็..."
13060-117 = "อืม..."
13060-118 = "......"
13060-119 = "อ่า... งั้นถ้าจะสรุปก็คือ..."
13060-121 = "เดี๋ยวสิ! ฉันว่ามันมีกลิ่นแปลกๆ นะ!!"
13060-122 = "เซริกะจัง...?!"
13060-123 = "จู่ๆ พวกเจ้าหนี้ก็มาหาเราและบอกว่าไปเจอหนังสือสัญญาแบบนั้นมา ก็เลยให้เราบอกว่าจะคงสัญญานั้นไว้รึเปล่า"
13060-124 = "แล้วสิทธิ์ในสัญญานั่น อย่างมากก็แค่บัตรใช้งานเศษเหล็ก ทำไมจะต้องทำให้เป็นเรื่องใหญ่โตด้วย?"
13060-125 = "แบบนี้มันยิ่งน่าสงสัยไม่ใช่รึไง! ฉันว่าพวกนั้นต้องซ่อนอะไรไว้แน่นอน!"
13060-129 = "อะไรกันน่ะ รุ่นพี่ชิโรโกะ... มองด้วยสายตาแบบนี้หมายความว่ายังไงน่ะ?"
13060-130 = "อืม ฉันเห็นด้วยนะ เพราะถ้าขนาดเซริกะยังบอกว่าน่าสงสัย งั้นก็ต้องมีอะไรบางอย่างแน่ๆ"
13060-131 = "ไม่สิ ถึงจะขอบใจที่ชมก็เถอะนะ แต่ทำไมฉันถึงรู้สึกโกรธขึ้นมาละเนี่ย..."
13060-132 = "[s] \"ใช่ เราต้องหาความลับของ <ทางรถไฟข้ามทะเลทราย> ให้ได้ก่อน\""
13060-133 = "ค่ะ คุณครูพูดถูกแล้วละค่ะ เราต้องรู้ให้ได้ว่ามีความลับอะไรซ่อนอยู่ภายใต้โครงการที่ทำไม่สำเร็จนั่น..."
13060-134 = "[s3] \"เรื่องนี้มีผลกับสัญญา งั้นเราต้องรอบคอบเข้าไว้ก่อนนะ\"\n[s4] \"เรายังพอมีเวลาอยู่ ต้องอย่าผลีผลามนะ\""
13060-135 = "เข้าใจแล้วค่ะ..."
13060-136 = "เข้าใจแล้วค่ะ..."
13060-137 = "ฉันมองว่ากุญแจของปัญหานี้อยู่ที่คุณคุจินาชิ ยูเมะ ที่เป็นประธานสภานักเรียนเมื่อ 2 ปีก่อนน่ะค่ะ รุ่นพี่โฮชิโนะ"
13060-141 = "แต่ว่า... ตอนนี้เรารู้เรื่องราวในอดีตเพียงแค่เศษเสี้ยวเองค่ะ คนที่ชื่อยูเมะกับรุ่นพี่โฮชิโนะในอดีต... มีเรื่องอะไรกันเหรอคะ?"
13060-142 = "อะ... อายาเนะจัง...?"
13060-143 = "รุ่นพี่โฮชิโนะ ช่วยเล่าเรื่องที่เกิดขึ้นในตอนที่มี <สภานักเรียนอะบิดอส> ให้พวกเราฟังหน่อยค่ะ เราจะได้เข้าใจปัญหานี้ได้อย่างถูกต้องยังไงล่ะคะ"
13060-144 = "รุ่นพี่โนโนมิก็รู้อะไรบางอย่างอยู่ใช่ไหมคะ?"
13060-146 = "ระ... เรื่องนั้น..."
13060-148 = "พอมาคิดๆ ดูแล้ว ห้องคณะกรรมการแผนงานนี้ไม่ใช่ห้องสภานักเรียน แต่เป็นห้องของสำนักงาน#nเทศกาลโรงเรียนค่ะ และที่ชั้น 1 ก็มีห้องเรียนที่ปิดล็อกไว้อย่างแน่นหนา..."
13060-149 = "ฉันว่ามันแปลกนะคะที่ในบรรดาห้องเรียนมากมาย มีแค่ห้องนั้นห้องเดียวที่ถูกล็อกเอาไว้อยู่"
13060-150 = "เดิมทีแล้วห้องนั้นคือห้องสภานักเรียนใช่ไหมคะรุ่นพี่? ทำไมห้องนั้นถึงล็อกอยู่ห้องเดียวล่ะคะ?"
13060-151 = "อืม ฉันก็สงสัยเหมือนกัน ทำไมประธานนักเรียนถึงคิดจะเพิ่มหนี้ให้โรงเรียนล่ะ?"
13060-152 = "ว่าไงนะ? รุ่นพี่ชิโรโกะก็ไม่รู้เหรอ?"
13060-153 = "อืม... ฉันไม่เคยได้ยินรายละเอียดเลย"
13060-154 = "แต่ก็นะ... รุ่นพี่ชิโรโกะถูกพวกรุ่นพี่จับตัวในระหว่างนั้นนี่นา"
13060-155 = "นั่นไม่ใช่การจับตัวสักหน่อย..."

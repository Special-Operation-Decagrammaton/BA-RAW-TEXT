[translation]
13060-1 = "第6話;買賣契約"
13060-3 = "你說是夢前輩簽的契約……？"
13060-4 = "沒錯，契約的內容是──#n「阿拜多斯學生會」要向奈芙蒂斯收購沙漠橫貫鐵路附加設施的使用權利。"
13060-6 = "向奈芙蒂斯……？"
13060-8 = "……自治區一旦沒落，這樣的權利就會淪為拿來交易的商品。"
13060-9 = "雖然沙漠橫貫鐵路是「阿拜多斯學生會」和奈芙蒂斯一起推動的計畫，#n但原則上這份權利是屬於承包人，也就是學生會的。"
13060-10 = "或許是為了還債，他們將權利賣給了奈芙蒂斯，#n而前任學生會長梔子夢打算再把它買回來吧。"
13060-11 = "那份契約就在這裡。"
13060-13 = "……讓，讓我看看。"
13060-15 = "買賣契約……「阿拜多斯學生會」以100萬元，#n向奈芙蒂斯收購沙漠橫貫鐵路附屬設施使用權利……並立即支付簽約金1萬元……"
13060-16 = "本契約於簽訂後具有兩年法律效力……同時需於期間內向奈芙蒂斯支付尾款……"
13060-17 = "關於未準時支付之延遲賠償金……"
13060-18 = "阿拜多斯學生會長……梔子夢……"
13060-19 = "……"
13060-22 = "…………沒錯。"
13060-23 = "這是前輩寫的沒錯……是我每天都在看的筆跡……"
13060-24 = "正是如此。這就是「阿拜多斯學生會」以100萬元，#n向「奈芙蒂斯」購買沙漠橫貫鐵路附屬設施使用權利的契約。"
13060-25 = "是，是在什麼時候……#n前輩他……在我不知道的時候……"
13060-26 = "……夢前輩留下的東西，我明明全部都知道的……#n哪怕是一張紙、一個字條，就連垃圾我也全都……"
13060-27 = "但這份契約我卻連看都沒看過……#n如果是以前的學生會還不好說，我怎麼可能會遺漏夢前輩留下的痕跡……"
13060-29 = "啊啊，因為這份契約還沒有履行完畢，會不知道也是情有可原。"
13060-33 = "畢竟契約中提及的款項也尚未完成支付啊。"
13060-34 = "意思是這份契約還在進行中嗎……？"
13060-35 = "沒錯，契約的簽訂與簽約金的交付都確認已經完成，#n然而卻在尚未支付尾款的狀態下，就這麼維持了將近兩年。"
13060-36 = "在那之後逐漸變得乏人問津……#n隨著時間過去，負責人似乎也離職了。"
13060-37 = "而契約就這麼被放置在文件倉庫裡，直到現在偶然被人發現。"
13060-39 = "偶然……"
13060-40 = "[s]「偶然……」"
13060-41 = "嗯……"
13060-43 = "對我們來說，這個情況也很頭痛。#n不要發現或許還比較好呢。"
13060-44 = "這份契約導致我們沒辦法獲得「沙漠橫貫鐵路」所有權利中的「附屬設施使用權」。"
13060-45 = "因為這項權利，目前仍處於「奈芙蒂斯」跟「阿拜多斯學生會」交易中的狀態。"
13060-47 = "所，所以呢……？"
13060-48 = "所以我們想跟各位進行確認。#n──你們是否有意繼續履行這份契約呢？"
13060-49 = "咦……？是為了問這個才特地來這裡的嗎？"
13060-51 = "沒錯，因為這個問題對我們很重要。"
13060-52 = "得把這件事處理好，才能在兩天後的債權團大會上討論「沙漠橫貫鐵路」的股份。"
13060-53 = "債權團大會……？"
13060-54 = "是什麼討債鬼聚會嗎……"
13060-55 = "是「私募基金」所有勢力將齊聚一堂的大會。"
13060-56 = "「阿拜多斯學生會」有向奈芙蒂斯支付尾款，買下這個權利的想法嗎？#n身為契約當事人的星野同學？"
13060-58 = "……"
13060-59 = "先等一下……突然莫名其妙地跑來這裡，又馬上要人決定要不要繼續履行契約……"
13060-60 = "不過就算買了那種權利……"
13060-61 = "那個……尾款是100萬元對吧？#n與其讓債務繼續增加……"
13060-62 = "說得真好！真是明智的決定。#n這種廢鐵堆的權利才不值得花100萬買下來！"
13060-63 = "實際上各位現在也因為要償還債務很辛苦了吧？#n沒必要讓債務變得更多。"
13060-64 = "很好，那我就理解為各位沒有繼續履行的意願囉？"
13060-66 = "那麼星野同學，請你在這份放棄同意書上簽名……#n上面的內容是將所有權利轉讓給我們「私募基金」。"
13060-67 = "啊，等，等一下……？這麼突然塞過來……？"
13060-69 = "[ns]「先等一下。」"
13060-71 = "嗯？"
13060-72 = "[s1]「簽名這種事必須非常謹慎。」\n[s2]「能麻煩你們稍等一會嗎？」"
13060-75 = "唔……"
13060-76 = "這……真傷腦筋。"
13060-77 = "果然還是太急了嗎……"
13060-78 = "沒關係，反正兩天之後，這份合約就徹底失效了。"
13060-80 = "兩天……？"
13060-85 = "你們看日期應該也知道，兩天後就是這份為期兩年的契約期滿的日子。#n到時候契約就會自動失去效力。"
13060-86 = "所以債權團大會的日期才會定在那一天。#n雖然本來希望能盡快解決……不過也就兩天而已，再等一等也無所謂。"
13060-87 = "我們現在明確地告訴各位。"
13060-88 = "「私募基金」的債權團大會預計將在兩天後，#n於阿拜多斯中央車站的區政廳大樓舉行。"
13060-89 = "如果想維持這份契約，只要在12點之前參加債權團大會，#n表明各位想要維持的意思，並進行公證就可以了。"
13060-90 = "如果做得到的話。"
13060-91 = "……？"
13060-95 = "做得到……的話……？"
13060-96 = "……"
13060-98 = "兩天後的正午12點，在中央車站的區政廳大樓，請千萬別忘記了。#n就算只差一秒……一旦超過時間，契約就會失去效力。"
13060-99 = "……我們要說的就是這些。#n感謝各位的耐心聆聽。"
13060-100 = "該說的都說完了。"
13060-101 = "走吧。"
13060-110 = "……？"
13060-111 = "快走吧，監察官。#n你還得護送我們啊！"
13060-112 = "……告辭。"
13060-117 = "嗯……"
13060-118 = "……"
13060-119 = "那個……所以結論是……"
13060-121 = "不不不！這件事怎麼看都很可疑吧！！"
13060-122 = "茜香醬……！？"
13060-123 = "那些討債鬼莫名其妙找上門來，說是偶然發現了這份契約，#n然後就叫我們決定要不要維持？"
13060-124 = "什麼跟什麼啊？費這麼大的功夫居然只是為了廢鐵的使用權？#n何必搞得這麼慎重？"
13060-125 = "這樣反而很可疑！那些傢伙一定隱瞞了什麼！"
13060-129 = "……怎樣啦，白子前輩。#n為什麼要用那種……好像覺得我很了不起的溫柔眼神看著我？"
13060-130 = "嗯，我也同意。#n如果連茜香都覺得可疑，那其中肯定有什麼問題。"
13060-131 = "雖然很感謝你的稱讚，但總覺得有點不爽……"
13060-132 = "[s]「得先找出『沙漠橫貫鐵路』的祕密是什麼才行。」"
13060-133 = "嗯，老師說的對。#n那項失敗的事業背後，到底隱藏著什麼祕密呢……"
13060-134 = "[s3]「這是跟契約有關的事，我們要慎重一點。」\n[s4]「現在還有時間。」"
13060-135 = "……我知道了。"
13060-136 = "……我知道了。"
13060-137 = "星野前輩。#n看來解決這個問題的關鍵，似乎就在2年前的學生會長──梔子夢同學身上。"
13060-141 = "不過……關於過去的事情，我們也只知道一些片段而已。#n那位叫做夢的學生會長……還有星野前輩以前發生了什麼呢？"
13060-142 = "綾，綾音醬……？"
13060-143 = "星野前輩。請把「阿拜多斯學生會」時期發生的事情告訴我們。#n只有這樣，我們才能準確掌握問題究竟出在哪裡。"
13060-144 = "野乃美前輩也知道些什麼吧？"
13060-146 = "那，那個……"
13060-148 = "……現在想[ruby=對策委員會的部室]想，這裡也不[/ruby]是原本的學生會辦公室，而是學園祭事務局的教室。#n而一樓那間被牢牢鎖住的教室……"
13060-149 = "那麼多空教室當中，唯獨只有那裡鎖著的確很奇怪。"
13060-150 = "那裡是原本的學生會辦公室對吧，前輩？#n為什麼只有那裡被鎖起來了呢？"
13060-151 = "嗯，我也很好奇。#n學生會長怎麼會簽下增加學校債務的契約呢？"
13060-152 = "咦？這件事連白子前輩都不知道嗎？"
13060-153 = "唔……我也不知道詳細的情況。"
13060-154 = "說的也是……畢竟白子前輩是後來被其他前輩抓進來的。"
13060-155 = "才不是被抓……"
13060-157 = "先，先等一下。#n大家突然這樣的話，星野前輩會很困擾……"
13060-158 = "……不，沒關係的。野乃美醬。"
13060-162 = "當時的學生會長……是個充滿問題的人。"
13060-163 = "簡單來說……那個人是個很容易被人利用的笨蛋。#n經常會被捲入各種風波。"
13060-164 = "這，這樣啊……真虧那位前輩能畢業呢。"
13060-165 = "……不，他並沒有畢業。"
13060-170 = "……夢前輩在畢業典禮之前失蹤了。"
13060-171 = "……！！"
13060-172 = "失蹤……？"
13060-176 = "失，失蹤！？怎麼回事？居然會失蹤？"
13060-178 = "夢前輩突然行蹤不明，後來在失蹤33天之後……在阿拜多斯沙漠被人發現。"
13060-179 = "以光環被破壞的狀態……"
13060-180 = "光環……？"
13060-181 = "怎，怎麼會！？"
13060-182 = "……好像是場意外。#n也許是在沙漠裡遇難了吧……"
13060-183 = "也許？遇難？實際情況到底是怎樣！？能不能說得具體一點！"
13060-184 = "……我也不知道。"
13060-185 = "啊！？"
13060-186 = "為什麼？前輩不是副學生會長嗎？"
13060-187 = "那是因為……"
13060-188 = "從夢前輩失蹤的3天前開始……#n我……就已經不在前輩身邊了。"
13060-189 = "在夢前輩失蹤前……大約60小時的行蹤……連我都不知道……"
13060-190 = "就連前輩失蹤的消息，我也是後來才知道的……#n前輩為什麼會去沙漠，為什麼會遇難……"
13060-191 = "當時他想做什麼，發生了什麼事情……"
13060-192 = "心裡在想什麼……"
13060-193 = "不管我怎麼找……怎麼追查前輩留下的痕跡……#n全部……全部都查過了……卻還是沒找到答案……"
13060-194 = "明明應該寫在那本手冊上的才對……"
13060-195 = "手冊……？"
13060-196 = "夢前輩一直都會把事情記錄在那本手冊裡……哪怕只是瑣碎的小事也一樣……"
13060-202 = "……可是現在，竟然發現了我所不知道的前輩的痕跡……"
13060-203 = "而且這件事的疑點可不只一個兩個。#n不僅是契約半途中止……"
13060-204 = "距離簽約已經過了兩年也是……#n在簽下這份契約的那天，夢前輩他……"
13060-205 = "………………"
13060-206 = "…………………………………………啊。"
13060-207 = "！？"
13060-208 = "這個日期是……………………"
13060-209 = "星，星野前輩……！？"
13060-211 = "一直都很謝謝你，星野醬！！要保重喔！"
13060-221 = "星，星野前輩！？"
13060-222 = "你，你沒事吧？"
13060-226 = "這個日期……這份契約上寫的日期……"
13060-227 = "這……"
13060-228 = "是夢前輩失蹤的那一天……"
13060-229 = "……！！"
13060-235 = "人們怎麼可能會跑到這種砂漠正中央來！不要再做白日夢了！！"
13060-239 = "我不需要那種東西！那種事請前輩自己做！！"
13060-243 = "學生會已經結束了！我要停止這場扮家家酒！"
13060-254 = "[ns]「星野！？」"
13060-255 = "星，星野前輩！？你要去哪裡！？"
13060-256 = "我去追他！"
13060-265 = "白子醬……！"
13060-266 = "怎，怎麼辦？我們也該追上去嗎？"
13060-267 = "……不，除了白子前輩之外，沒有人可以跟上星野前輩……"
13060-268 = "雖，雖然是那樣沒錯……可是……"
13060-269 = "綾，綾音醬。#n如果簽約的日期就是夢會長失蹤的日期，是不是代表……？"
13060-270 = "……嗯。#n如果是這樣的話……"
13060-275 = "夢會長……是在簽約之後……"
13060-277 = "當天就失蹤了……？"
13060-283 = "下一話;肉體的極限"

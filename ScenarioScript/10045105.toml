[translation]
10045105-2 = "唔啊……！#n我……竟然……"
10045105-7 = "呼……"
10045105-8 = "這下礙事的人都消失了呢。"
10045105-9 = "那麼各位，我們來一決勝負吧。"
10045105-10 = "在老師面前，決定誰才是百鬼夜行最強。"
10045105-11 = "請，請等一下！我們沒預料到會有人亂入……！"
10045105-12 = "被世人以罪人稱之的若藻我，本就無緣參與這種活動。"
10045105-13 = "因此即便只有片刻……我也希望能與老師共享這場祭典。#n難道就連這也不被允許嗎？"
10045105-14 = "這，這……"
10045105-15 = "什麼，災厄之狐要參加嗎！？"
10045105-16 = "好想看！絕對要看的吧……！！"
10045105-17 = "讓他比！讓他比！"
10045105-18 = "唔唔唔，居然連觀眾也在起鬨……"
10045105-19 = "……不過這樣搞不好能讓祭典的氣氛更加熱鬧。"
10045105-20 = "我明白了！#n為了回應各位觀眾的熱情……將會舉辦一場特別賽！！"
10045105-21 = "哦哦哦哦哦……！！"
10045105-23 = "[ns]「既然如此……就進行浮標推落對決吧。」"
10045105-25 = "[ns1]「用這個來決定誰是最強。」\n[ns2]「若藻也必須遵守規則哦。」"
10045105-29 = "啊啊，當然。"
10045105-30 = "只要能獲得閣下的認可──"
10045105-31 = "若藻我，欣然接受。"
10045105-32 = "[s]「嗯，看來若藻也滿意這樣的安排。」"
10045105-33 = "唔呵呵，那麼誰要與我一戰呢？#n若藻我，無論對手是誰都有自信得勝。"
10045105-34 = "既然如此……"
10045105-39 = "名草前輩……"
10045105-40 = "……要跟災厄之狐若藻對決嗎？"

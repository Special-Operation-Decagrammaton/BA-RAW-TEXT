[translation]
10045105-2 = "Ugh...! I... How could this...?"
10045105-7 = "*sigh*"
10045105-8 = "The hindrances have been removed."
10045105-9 = "So let us hold the match."
10045105-10 = "Let us battle before Sensei to prove our strength to them!"
10045105-11 = "W-Wait! I didn't plan for this at all!"
10045105-12 = "I am Wakamo, a sinner and a criminal. Even the idea that I may participate in such events is but a hazy dream."
10045105-13 = "And so my heartfelt wish is to just enjoy this brief moment in a festival, together with Sensei. Is that...so wrong?"
10045105-14 = "Th-That's..."
10045105-15 = "No way! THE Fox of Calamity is gonna play?"
10045105-16 = "I'll literally die if she does!"
10045105-17 = "LET HER PLAY! LET HER PLAY!"
10045105-18 = "The crowd is so hyped up..."
10045105-19 = "...I guess I shouldn't look a gift horse in the mouth."
10045105-20 = "We've got to give the people what they want, then! Let's hear three loud cheers for our unexpected, but welcome, new guest! We'll be holding a special match just for this event."
10045105-21 = "WOOOOOO!"
10045105-23 = "[ns] \"Then...we'll have another round of Knock-Out.\""
10045105-25 = "[ns1] \"There's no better game to determine strength.\"\n[ns2] \"Wakamo still has to follow the rules, of course.\""
10045105-29 = "Naturally."
10045105-30 = "I, Wakamo, shall gladly accept."
10045105-31 = "To be acknowledged by you, my dear, anything."
10045105-32 = "[s] \"I'm glad you're happy, Wakamo!\""
10045105-33 = "Heeheehee, then who shall be my opponent! I, Wakamo, will beat them, no matter who it is!"
10045105-34 = "In that case..."
10045105-39 = "Nagusa..."
10045105-40 = "...against Wakamo, the Fox of Calamity?"

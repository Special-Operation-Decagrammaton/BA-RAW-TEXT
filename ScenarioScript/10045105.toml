[translation]
10045105-2 = "อึกก...! นี่ฉัน... ต้องตกน้ำอีกแล้วเหรอ..."
10045105-7 = "ฮู่ว..."
10045105-8 = "แบบนี้ก็ไม่มีใครมาขัดขวางแล้วค่ะ"
10045105-9 = "เอาละค่ะทุกคน มาสู้กันค่ะ"
10045105-10 = "มาตัดสินกันต่อหน้าคุณครูว่าใครคือคนเก่งที่สุด"
10045105-11 = "ดะ... เดี๋ยวก่อนค่ะ! เราไม่อนุญาตให้ใครเข้ามาแทรกนะคะ...!"
10045105-12 = "วาคาโมะผู้นี้ถูกทุกคนตราหน้าว่าเป็นคนบาป ก็เลยเข้าร่วมงานเทศกาลแบบนี้ไม่ได้"
10045105-13 = "ฉันแค่อยากจะสนุกกับคุณครูในงานเทศกาลเท่านั้นเอง แค่ช่วงเวลาสั้นๆ ก็เป็นไปไม่ได้เหรอคะ?"
10045105-14 = "ระ... เรื่องนั้น..."
10045105-15 = "โอ้ว จิ้งจอกแห่งความพินาศจะร่วมแข่งขันด้วยเหรอ?!"
10045105-16 = "อยากดูแล้วละสิ! ให้เธอลงแข่งด้วยเถอะ...!!"
10045105-17 = "ให้แข่งเถอะ! ให้แข่งเถอะ!"
10045105-18 = "อึกก ทำไมผู้ชมถึงมีปฏิกิริยาแบบนี้ล่ะ..."
10045105-19 = "เดี๋ยวนะ... บางทีนี่อาจทำให้งานเทศกาลคึกคักกว่าเดิมก็ได้"
10045105-20 = "เข้าใจแล้วค่ะ! ในเมื่อทุกคนเรียกร้อง... ฉันก็จะจัดแมตช์พิเศษให้ค่ะ!!"
10045105-21 = "ว้าวววว...!!"
10045105-23 = "[ns] \"ถ้างั้น... เราจะเริ่มเกมผลักตกน้ำกันใหม่\""
10045105-25 = "[ns1] \"เราจะตัดสินกันว่าใครคือผู้ที่แข็งแกร่งที่สุด\"\n[ns2] \"วาคาโมะก็ต้องเล่นตามกติกานะ\""
10045105-29 = "อ่า... ได้เลยค่ะ"
10045105-30 = "วาคาโมะผู้นี้ยินดีทำตามคำสั่งค่ะ"
10045105-31 = "ถ้ามันจะทำให้คุณท่านยอมรับในตัวฉันละก็"
10045105-32 = "[s] \"ดีละ เอาเป็นว่าวาคาโมะพอใจกับกติกาการแข่งขันแล้ว\""
10045105-33 = "ฮุฮุฮุ แล้วฉันจะได้แข่งกับใครเหรอคะ? แต่ไม่ว่าจะเจอกับใคร วาคาโมะผู้นี้ก็มั่นใจว่าจะชนะอยู่แล้วค่ะ"
10045105-34 = "ไม่ว่าจะเจอกับใครงั้นเหรอ..."
10045105-39 = "รุ่นพี่นางุสะ..."
10045105-40 = "จะแข่งกับจิ้งจอกแห่งความพินาศเหรอ...?"

[translation]
1003003-1 = "#title;약선 요법"
1003003-2 = "#wait;2000"
1003003-3 = "#na;치나츠 온천;선생님, 치나츠입니다."
1003003-4 = "#na;치나츠 온천;말씀드린 물건을 가지고 왔습니다. 들어가도 괜찮을까요?"
1003003-5 = "[s] \"응, 들어와.\""
1003003-6 = "#st;[0,0];instant;1;"
1003003-7 = "#clearST"
1003003-8 = "#wait;1500"
1003003-9 = "#wait;1800"
1003003-10 = "3;치나츠 온천ND;01\n#3;a\n#wait;1500"
1003003-11 = "3;치나츠 온천ND;03;방문을 허락해 주셔서 감사합니다. 모처럼 좋은 재료를 구한 김에 선생님께도 보여드리고 싶었거든요.\n#3;greeting\n#3;em;[반짝]"
1003003-12 = "3;치나츠 온천ND;08;혹시 제가 선생님의 휴식을 방해한 것은 아닐지……."
1003003-13 = "[s1] \"나도 차가 마시고 싶던 참이었어.\"\n[s2] \"나도 치나츠가 보고 싶던 참이었어.\""
1003003-14 = "3;치나츠 온천ND;99;후후, 그러셨다니 다행이군요.\n#3;em;…"
1003003-15 = "3;치나츠 온천ND;04;……!?\n#3;em;[?!]\n#3;shake"
1003003-16 = "3;치나츠 온천ND;06;그, 그렇게 놀리시면 반응하기가 곤란합니다. 선생님.\n#3;em;[땀]\n#3;stiff"
1003003-17 = "3;치나츠 온천ND;01;다시 본론을 말씀드리자면, 오늘 선생님께 보여드리고자 하는 것은 약선차(藥膳茶)입니다."
1003003-18 = "[s] \"약선차?\""
1003003-19 = "3;치나츠 온천ND;02;예, 약선이란 약이 되는 음식이라는 뜻으로, 몸에 좋은 약재를 사용한 음식으로 식사와 함께 기력을 보충하는 요법입니다.\n#3;em;[반응]"
1003003-20 = "3;치나츠 온천ND;01;특히 약선차는 약초 등을 찻잎과 함께 달여 낸 요리이기 때문에, 흡수가 빠르고 향을 통해서도 심신을 안정시킬 수 있습니다."
1003003-21 = "3;치나츠 온천ND;99;그래서 격무에 지친 선생님을 위해 몇 가지 재료를 준비했습니다."
1003003-22 = "#st;[0,0];instant;1;"
1003003-23 = "#clearST"
1003003-24 = "3;치나츠 온천ND;01\n#3;d\n#wait;1000"
1003003-25 = "3;치나츠 온천ND;01\n#3;a\n#3;closeup\n#wait;1000"
1003003-26 = "#wait;1000"
1003003-27 = "3;치나츠 온천ND;01\n#3;greeting\n#3;closeup\n#wait;1500"
1003003-28 = "3;치나츠 온천ND;02;우선 첫 번째로 준비한 것은 꿀에 절인 생강을 이용한 생강차입니다.\n#3;closeup"
1003003-29 = "3;치나츠 온천ND;99;생강은 향이 맵고 아리긴 하지만 비타민이 풍부해 면역력을 높이는 데 도움이 되고, 혈액순환을 촉진해주는 효과가 있습니다.\n#3;closeup"
1003003-30 = "3;치나츠 온천ND;03;거기에 달콤한 꿀을 더했으니 매운맛은 줄여주고 기력은 높여주는 효과를 보실 수 있을 겁니다.\n#3;em;[반짝]\n#3;closeup"
1003003-31 = "#st;[0,0];instant;1;"
1003003-32 = "#clearST"
1003003-33 = "3;치나츠 온천ND;01\n#3;greeting\n#3;closeup\n#wait;1500"
1003003-34 = "3;치나츠 온천ND;02;그리고 다음으로 준비한 것은 말린 국화를 이용한 국화차입니다.\n#3;closeup"
1003003-35 = "3;치나츠 온천ND;01;국화에는 여러 가지 유익한 항산화 성분이 포함되어 피로 해소, 특히 눈의 피로를 경감시키는 데 효과가 있다고 합니다.\n#3;closeup"
1003003-36 = "3;치나츠 온천ND;99;게다가 국화가 우러나면서 나는 풍부한 향에는 심신을 안정시켜주는 효과가 있지요.\n#3;closeup"
1003003-37 = "3;치나츠 온천ND;01;그리고 또 준비한 것은……\n#3;em;…\n#3;closeup"
1003003-38 = "[s3] \"잠깐 기다려, 치나츠.\"\n[s4] \"그렇게 많이 마실 수는 없다고!\""
1003003-39 = "3;치나츠 온천ND;08;그, 그런가요……?\n#3;em;[땀]\n#3;stiff"
1003003-40 = "3;치나츠 온천ND;08;그, 그런가요……?\n#3;em;[땀]\n#3;stiff"
1003003-41 = "3;치나츠 온천ND;06;그러고 보니 선생님께서 한 번에 드실 수 있는 차에는 한계가 있는데, 제 의욕이 앞서 너무 많이 준비를 했군요."
1003003-42 = "3;치나츠 온천ND;09;저는 그저 선생님께서 빨리 피로를 해소하셨으면 좋겠다는 마음에……."
1003003-43 = "[s5] \"생강차면 충분해.\"\n[s6] \"국화차면 충분해.\""
1003003-44 = "3;치나츠 온천ND;01;네, 그럼 말씀하신 차를 준비하도록 하겠습니다.\n#3;em;[반응]"
1003003-45 = "3;치나츠 온천ND;01;네, 그럼 말씀하신 차를 준비하도록 하겠습니다.\n#3;em;[반응]"
1003003-46 = "#st;[0,0];instant;1;"
1003003-47 = "#clearST"
1003003-48 = "3;치나츠 온천ND;01\n#3;m4\n#wait;1200"
1003003-49 = "3;치나츠 온천ND;01\n#wait;1500"
1003003-50 = "#wait;1500"
1003003-51 = "#na;(치나츠는 물을 끓이고 분주히 차를 준비하기 시작했다.)"
1003003-52 = "[s] \"벌써부터 치유되는 기분이야…….\""
1003003-53 = "3;치나츠 온천ND;08;네? 아직 찻물이 채 끓지도 않았는걸요?\n#3;em;[?]\n#3;m3"
1003003-54 = "3;치나츠 온천ND;01;……후후, 하지만 어떤 기분이신지 조금은 알 것 같네요."
1003003-55 = "3;치나츠 온천ND;99;아무런 목적도 없이, 부담도 없이. 다구가 자아내는 청명한 소리에 귀를 기울이며 차를 즐기는 오후의 한때.\n#3;em;…"
1003003-56 = "3;치나츠 온천ND;01;최고의 휴식은 마음을 비우고 아무것도 하지 않는 시간에서 비롯된다는 말도 있으니……"
1003003-57 = "3;치나츠 온천ND;03;선생님과 함께하는 이 시간이야말로 진정한 의미의 '약선'일지도 모르겠습니다.\n#3;greeting\n#3;em;[하트]"
1003003-58 = "#all;hide"
1003003-59 = "#na;(이후, 치나츠와 함께 차를 나누어 마시며 여유로운 오후를 보냈다.)"

[translation]
1003003-1 = "Yakuzen Therapy"
1003003-3 = "Sensei, it's Chinatsu."
1003003-4 = "I brought the thing I mentioned earlier. May I come in?"
1003003-5 = "[s] \"Come in.\""
1003003-11 = "Thank you for having me. I was able to find some good ingredients, so I wanted to show them to you, Sensei."
1003003-12 = "Am I bothering you while you're resting?"
1003003-13 = "[s1] \"I was just thinking about drinking tea too.\"\n[s2] \"I wanted to see you as well, Chinatsu."
1003003-14 = "Heehee, I see. That's great."
1003003-15 = "...?!"
1003003-16 = "I-I don't know how to react to such jokes, Sensei."
1003003-17 = "To get back to the point, what I would like to show you today is yakuzen tea."
1003003-18 = "[s] \"Yakuzen tea?\""
1003003-19 = "Yes, yakuzen refers to foods that offer therapeutic benefits. It's a way to energize the body by cooking meals using herbal and medicinal ingredients beneficial for your health."
1003003-20 = "In particular, yakuzen teas are made by brewing medicinal herbs and tea leaves together, allowing for fast absorption as well as calming the mind and body with their aroma."
1003003-21 = "That's why I prepared some ingredients for you, who must be fatigued from overworking."
1003003-28 = "The first one I prepared is a ginger tea made with ginger pickled in honey."
1003003-29 = "Although ginger has a pungent and spicy aroma, it is rich in vitamins that help to boost immunity and promotes blood circulation."
1003003-30 = "And the sweet honey will reduce the spiciness while boosting energy."
1003003-34 = "The next one I prepared is chrysanthemum tea made from dried chrysanthemums."
1003003-35 = "Chrysanthemums contain several beneficial antioxidants said to be effective at relieving fatigue and reducing eye strain."
1003003-36 = "In addition, the rich fragrance of brewed chrysanthemums has a calming effect on the mind and body."
1003003-37 = "And the next one..."
1003003-38 = "[s3] \"Wait a minute, Chinatsu.\"\n[s4] \"I can't drink all of this!\""
1003003-39 = "I-Is that so?"
1003003-40 = "I-Is that so?"
1003003-41 = "I suppose I may have gone a bit overboard in my enthusiasm."
1003003-42 = "I only hoped to relieve your fatigue, Sensei..."
1003003-43 = "[s5] \"I'm fine with just a cup of ginger tea.\"\n[s6] \"I'm fine with just a cup of chrysanthemum tea.\""
1003003-44 = "Okay, then allow me to prepare it please."
1003003-45 = "Okay, then allow me to prepare it please."
1003003-51 = "Chinatsu boiled a pot of water and began preparing the tea."
1003003-52 = "[s] \"I feel better already...\""
1003003-53 = "Huh? The water hasn't even boiled yet."
1003003-54 = "Heehee. But I think I might know what you mean."
1003003-55 = "Without responsibility or burden, spending a peaceful afternoon while listening to the calming sounds of tea being brewed..."
1003003-56 = "It is said that the best rest comes from spending time emptying your mind and doing nothing."
1003003-57 = "Sensei, this time spent with you might be the true meaning of yakuzen therapy."
1003003-59 = "Afterwards, I spent a relaxing afternoon drinking tea with Chinatsu."

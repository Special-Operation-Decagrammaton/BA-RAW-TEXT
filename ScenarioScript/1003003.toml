[translation]
1003003-1 = "藥膳療法？"
1003003-3 = "打擾了，老師。"
1003003-4 = "我可以進去嗎……？"
1003003-5 = "[s] 「嗯，請進請進。」"
1003003-11 = "謝謝老師願意接受這麼突然的請求。#n因為臨時收到了很好的茶，所以想讓老師也品嚐看看。"
1003003-12 = "希望沒有打擾老師休息……"
1003003-13 = "[s1] 「不會，我也正好想喝杯茶呢。」\n[s2] 「我也正好想見千夏呢。」"
1003003-14 = "呵呵，那真是太好了。"
1003003-15 = "那，那是，那個……！？"
1003003-16 = "這，這樣捉弄我，我會不知道該怎麼反應的……"
1003003-17 = "咳哼。回到正題吧，我今天帶來的是「藥膳茶」。"
1003003-18 = "[s] 「藥膳茶？」"
1003003-19 = "是的。老師應該也知道，所謂「藥膳」就是指具有藥效的食物。#n可以說是一種藉由攝取對身體有益的食材，來補充精力的療法。"
1003003-20 = "至於「藥膳茶」，因為是將藥草之類的材料和茶葉一起熬煮，#n所以能快速被身體吸收，也能透過香味安定身心。"
1003003-21 = "我認為非常適合忙碌的老師。"
1003003-28 = "首先，這是用蜂蜜醃漬過的生薑泡的薑茶。"
1003003-29 = "生薑的氣味雖然強烈且獨特，卻含有豐富的維他命。#n既能提升免疫力，也可以促進血液循環。"
1003003-30 = "因為加上了甜甜的蜂蜜，所以整體口感應該會變得溫潤、好入口才對。"
1003003-34 = "接下來是用乾燥的菊花泡的菊花茶。"
1003003-35 = "菊花有許多對身體有益的抗氧化成分可以消除疲勞，特別是對減輕眼睛疲勞很有效。"
1003003-36 = "而且菊花的香氣也有著安定身心的效果唷。"
1003003-37 = "再來是……"
1003003-38 = "[s3] 「可，可以先等一下嗎？」\n[s4] 「那麼多會喝不下的……？」"
1003003-39 = "是，是那樣嗎……？"
1003003-40 = "是，是那樣嗎……？"
1003003-41 = "確實，我可能有點太興奮了……"
1003003-42 = "心裡只想著希望能幫上老師……"
1003003-43 = "[s5] 「能有這份心意就夠了，謝謝你。」\n[s6] 「那我就好好享用囉。」"
1003003-44 = "好的。那麼，我這就去準備。"
1003003-45 = "好的。那麼，我這就去準備。"
1003003-51 = "（千夏開始燒熱水，忙碌地做著各種泡茶的準備）"
1003003-52 = "[s] 「已經被這個景象療癒了……」"
1003003-53 = "咦……？連水都還沒燒開呢……？"
1003003-54 = "……呵呵，不過好像能明白這種感覺呢。"
1003003-55 = "沒有任何目的、悠閒地，細細聆聽著泡茶所發出的，令人安心的聲響……"
1003003-56 = "曾經聽過一種說法……最棒的休息，是從放空心靈的悠閒之中開始的。"
1003003-57 = "……光是跟老師待在一起，對我來說就已經像是「藥膳」一樣了。"
1003003-59 = "（之後跟千夏一起喝著茶，度過了悠閒的午後時光）"

[translation]
1003003-1 = "ยากุเซ็นบำบัด"
1003003-3 = "คุณครูคะ ชินัตสึเองค่ะ"
1003003-4 = "ฉันนำของที่บอกมาแล้วค่ะ ขอเข้าไปได้มั้ยคะ"
1003003-5 = "[s] \"อื้อ เข้ามาสิ\""
1003003-11 = "ขอบคุณที่อนุญาตให้ฉันเข้ามาค่ะ ฉันได้วัตถุดิบดีๆ มาเลยอยากเอามาให้คุณครูดูค่ะ"
1003003-12 = "ฉันมารบกวนเวลาพักผ่อนของคุณครูรึเปล่าคะ"
1003003-13 = "[s1] \"ครูกำลังอยากดื่มชาอยู่พอดีเลย\"\n[s2] \"ครูกำลังคิดถึงชินัตสึอยู่พอดีเลย\""
1003003-14 = "ฮิฮิ ถ้างั้นก็ค่อยยังชั่วหน่อยค่ะ"
1003003-15 = "...?!"
1003003-16 = "ถะ...ถ้าพูดแกล้งกันแบบนี้ ฉันจะทำยังไงล่ะคะ คุณครู"
1003003-17 = "กลับเข้าเรื่องกันเถอะค่ะ สิ่งที่ฉันนำมาให้คุณครูในวันนี้คือชาสมุนไพรค่ะ"
1003003-18 = "[s] \"ชาสมุนไพรเหรอ?\""
1003003-19 = "ใช่แล้วค่ะ ยากุเซ็นคืออาหารและเครื่องดื่มที่มีสรรพคุณทางยา การทานอาหารที่มีส่วนผสมจากวัตถุดิบ#nที่มีสรรพคุณทางยาจะช่วยบำรุงร่างกายได้ดีค่ะ"
1003003-20 = "โดยเฉพาะชาสมุนไพร เป็นชาที่ทำมาจากสมุนไพรต้มกับใบชา ร่างกายจึงดูดซึมได้อย่างรวดเร็ว#nอีกทั้งกลิ่นหอมของชาจะช่วยทำให้รู้สึกจิตใจสงบด้วยค่ะ"
1003003-21 = "ดังนั้นฉันเลยเตรียมวัตถุดิบมาสามชนิด เพื่อคุณครูที่อ่อนล้าเพราะทำงานหนักค่ะ"
1003003-28 = "วัตถุดิบชนิดแรกที่ฉันเตรียมมาก็คือชาขิงที่ทำจากขิงที่ดองในน้ำผึ้งค่ะ"
1003003-29 = "ถึงแม้ขิงจะมีกลิ่นฉุนและมีรสเผ็ด แต่ก็อุดมไปด้วยวิตามินและช่วยเพิ่มภูมิต้านทานร่างกาย#nอีกทั้งยังมีส่วนช่วยในเรื่องการไหลเวียนโลหิตด้วยค่ะ"
1003003-30 = "เมื่อนำไปดองในน้ำผึ้งก็จะช่วยลดความเผ็ดลง ทั้งยังช่วยเพิ่มพลังงานได้ด้วยค่ะ"
1003003-34 = "วัตถุดิบชนิดที่สองที่ฉันเตรียมมาก็คือชาเบญจมาศที่ใช้ดอกเบญจมาศอบแห้งมาต้มค่ะ"
1003003-35 = "ดอกเบญจมาศอุดมไปด้วยสารต้านอนุมูลอิสระหลายชนิด ที่มีประโยชน์ต่อการบรรเทาอาการ#nเหนื่อยล้า ทั้งยังช่วยบรรเทาอาการตาล้าได้ดีมากค่ะ"
1003003-36 = "นอกจากนี้กลิ่นหอมหวานของดอกเบญจมาศยังช่วยทำให้จิตใจสงบขึ้นด้วยนะคะ"
1003003-37 = "และต่อไปก็คือ..."
1003003-38 = "[s3] \"เดี๋ยวก่อนๆ ชินัตสึ\"\n[s4] \"ดื่มเยอะขนาดนั้นไม่ไหวหรอก!\""
1003003-39 = "งะ...งั้นเหรอคะ?"
1003003-40 = "งะ...งั้นเหรอคะ?"
1003003-41 = "ฉันตื่นเต้นมากเกินไป เลยเตรียมมาเยอะมาก จนลืมคิดไปเลยว่าคุณครูอาจจะดื่มไม่หมด..."
1003003-42 = "ฉันแค่อยากให้คุณครูคลายความเหน็ดเหนื่อยได้เร็วๆ..."
1003003-43 = "[s5] \"แค่ชาขิงก็พอแล้วละ\"\n[s6] \"แค่ชาเบญจมาศก็พอแล้วละ\""
1003003-44 = "ค่ะ ฉันจะเตรียมชาให้นะคะ"
1003003-45 = "ค่ะ ฉันจะเตรียมชาให้นะคะ"
1003003-51 = "(ชินัตสึเดินไปต้มน้ำสำหรับชงชา)"
1003003-52 = "[s] \"แค่นี้ก็รู้สึกหายเหนื่อยแล้ว...\""
1003003-53 = "คะ? ฉันยังต้มน้ำร้อนไม่เสร็จเลยนะคะ"
1003003-54 = "ฮิฮิ แต่ฉันคิดว่าพอจะเข้าใจที่คุณครูพูดนะคะ"
1003003-55 = "การได้มาพักผ่อนโดยไม่ต้องกังวลอะไร และใช้เวลายามบ่ายนั่งจิบชาฟังเสียงน้ำกาต้มน้ำเดือดแบบนี้..."
1003003-56 = "ฉันเคยได้ยินมาว่าการพักผ่อนที่ดีที่สุดคือการปล่อยจิตให้ว่างและไม่ทำอะไรค่ะ"
1003003-57 = "ช่วงเวลาที่ได้อยู่ร่วมกับคุณครูแบบนี้ อาจเป็นสิ่งที่หมายถึง \"การบำบัด\" ที่แท้จริงสำหรับฉันก็ได้ค่ะ"
1003003-59 = "(จากนั้น คุณครูกับชินัตสึก็ใช้เวลายามบ่ายนั่งดื่มชากันอย่างสบายๆ)"

[translation]
83306085400-6 = "ฉันเจอพุดดิ้งที่หายไปแล้ว"
83306085400-7 = "ว่าไงนะ?!  พูดจริงรึเปล่า?!"
83306085400-8 = "แล้วสรุปว่าคนที่ก่ออาชญากรรมร้ายแรงจนทำให้เราอกสั่นขวัญหายคือใครกัน?!"
83306085400-9 = "ถ้ารู้ว่าคนร้ายคือใครละก็ ท่านมาโคโตะผู้นี้จะใช้อำนาจทั้งหมดที่มีลงโทษอย่างสาสม!"
83306085400-10 = "คนร้ายที่ว่าน่ะ..."
83306085400-16 = "อ๊ะ! รุ่นพี่มาโคโตะ! รุ่นพี่ฮินะ! พุดดิ้งอันนั้นน่ะ!"
83306085400-17 = "อื้อ! อิบูกิ! มาได้จังหวะพอดีเลย! พุดดิ้งที่คนร้ายใจดำขโมยไปน่ะ...!"
83306085400-18 = "เมื่อกี้อิบูกิไปเจอพุดดิ้งในเต็นท์มาด้วยแหละ!"
83306085400-19 = "ก็เลยคิดว่าถ้าวางไว้อย่างนั้น ต้องโดนคุณมด คุณหมี คุณกระต่ายมาเอาไปกินแน่ๆ...!"
83306085400-20 = "อิบูกิก็เลยเอาไปใส่ไว้ในกระเป๋าสมบัติน่ะ!"
83306085400-21 = "กะว่าถ้ารุ่นพี่มาโคโตะ รุ่นพี่อิโรฮะ รุ่นพี่ซัตสึกิ แล้วก็รุ่นพี่จิอากิมากันพร้อมหน้า ก็จะหยิบมากินด้วยกัน!"
83306085400-22 = "เรื่องมันก็เป็นอย่างนี้แหละ"
83306085400-23 = "อะ... อะ... อิบูกิ..."
83306085400-24 = "หืม? ทำไมเหรอ~?"
83306085400-25 = "อ่า... อ่า... ปะ... เป็นอย่างนี้เองเหรอเนี่ย..."
83306085400-26 = "ขอโทษนะ...!! อิบูกิ...! เราไม่รู้ว่าอิบูกิ... มีเจตนาดีแบบนั้น...! เราผิดเองงงง!!!!"
83306085400-27 = "หืม...?"

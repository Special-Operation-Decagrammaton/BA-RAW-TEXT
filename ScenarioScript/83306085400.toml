[translation]
83306085400-6 = "找到不見的布丁了。"
83306085400-7 = "什麼！？真的嗎！？"
83306085400-8 = "所以是誰犯下了連鼎鼎大名的真琴大人也大吃一驚的罪行！？"
83306085400-9 = "讓我知道他是誰，我一定會動用一切的權力徹底懲罰犯人！"
83306085400-10 = "那個犯人……"
83306085400-16 = "啊！真琴前輩！陽奈前輩！那個布丁！"
83306085400-17 = "嗯！伊吹！你來的正好！幸好後來找到了被惡毒犯人偷走的布丁……！"
83306085400-18 = "伊吹我呀！剛剛在帳篷裡發現了這個布丁！"
83306085400-19 = "不過要是放在那邊可能會被螞蟻先生、小熊先生、兔子先生帶走……！"
83306085400-20 = "所以伊吹把它放進了寶箱裡！"
83306085400-21 = "等之後真琴前輩、伊呂波前輩！皐月前輩！千秋前輩都到了再一起吃吧！"
83306085400-22 = "看來就是那麼回事。"
83306085400-23 = "伊，伊，伊，伊吹……"
83306085400-24 = "嗯？怎麼了～？"
83306085400-25 = "啊，啊啊啊……我，我都不知道……"
83306085400-26 = "對不起……！！伊吹……！#n是我不知道伊吹這麼體貼的想法……！是我不好！！！"
83306085400-27 = "……嗯？"

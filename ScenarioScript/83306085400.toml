[translation]
83306085400-6 = "I found the missing pudding."
83306085400-7 = "What?! Truly?!"
83306085400-8 = "So, who is the doomed soul who dared to commit a crime that shocked even the Great Makoto?!"
83306085400-9 = "Give me their name, and I will pour every ounce of my authority into exacting my retribution!"
83306085400-10 = "About that..."
83306085400-16 = "Ah! Makoto! Hina! And the pudding!"
83306085400-17 = "Ah, Ibuki! Perfect timing! I've uncovered the criminal who stole our pudding!"
83306085400-18 = "Hmm? But Ibuki found that pudding inside our tent earlier!"
83306085400-19 = "Ibuki thought Mr. Ant, Mr. Bear, or Mr. Rabbit might come for a bite if we left it there!"
83306085400-20 = "So Ibuki put it in Ibuki's treasure bag!"
83306085400-21 = "That way, Makoto, Iroha, Satsuki, and Chiaki could share it with Ibuki when we all got back!"
83306085400-22 = "So, that's what happened"
83306085400-23 = "I-I-I-Ibuki..."
83306085400-24 = "Hm? What's wrong?"
83306085400-25 = "I-I-I-I... I-I didn't know..."
83306085400-26 = "I'm sorry, Ibuki! I was utterly blind to your kind heart! I was the criminal heeere!!!"
83306085400-27 = "...Wha?"

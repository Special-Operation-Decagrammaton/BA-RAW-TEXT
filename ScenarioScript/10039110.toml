[translation]
10039110-1 = "後日談;放學後的鬼屋"
10039110-3 = "哦哦……這裡就是三一的鬼屋主題咖啡廳啊……"
10039110-4 = "好，就來瞧瞧到底是這裡的鬼屋恐怖，還是我們學園的鬼屋恐怖吧。"
10039110-5 = "真令人期待！到底會是什麼樣子呢～"
10039110-16 = "吼喔喔……歡迎光臨……"
10039110-21 = "我……「弗蘭肯斯坦的怪物」……來為您點餐了～"
10039110-22 = "呃……這一點也不可怕吧？"
10039110-23 = "就，就是說啊……反而還有點可愛……"
10039110-27 = "……"
10039110-28 = "嘖，失敗了啊。#n那麼就換下一個……"
10039110-32 = "出來吧，「古代的惡靈」……！"
10039110-34 = "從地獄深處爬上來的死亡統治者啊！#n讓他們見識連大地都窒息的絕望詛咒吧……！！"
10039110-39 = "哇……！"
10039110-40 = "感覺會出現什麼不得了的東西……！"
10039110-52 = "喂，夏！幹嘛介紹得這麼誇張啦！"
10039110-56 = "……"
10039110-61 = "呃，呃啊……我是古代的存在，恐怖的木乃伊……"
10039110-62 = "不點餐的話會被詛咒的哦……"
10039110-68 = "這是……可愛系的咖啡廳嗎……？"
10039110-69 = "不是恐怖系的嗎……？"
10039110-71 = "……"
10039110-72 = "根本一點效果都沒有嘛！夏你這個笨蛋！！！"
10039110-73 = "可惡……連如此歷史悠久的怪物也不管用嗎……"
10039110-74 = "但這次可就不一樣了！"
10039110-78 = "地獄的業火，駭人的咆哮！即將吞噬一切的邪惡闇影！"
10039110-80 = "出來吧，地獄的魔獸！！「凱茜．帕魯格」！！"
10039110-86 = "就跟你說不要叫那個名字！！我只是普通的狼人而已！！"
10039110-87 = "喂喂……「普通的狼人」就讓你滿足了嗎？#n難道你打算餘生都這樣得過且過？有專屬的名號才能顯得你與眾不同啊！"
10039110-91 = "放棄無謂的爭論，快去幫客人點餐吧，地獄的魔獸……！！"
10039110-96 = "看我先把你宰了再說！！"
10039110-110 = "這裡是喜劇系咖啡廳嗎……？"
10039110-111 = "嗯，看起來是……"
10039110-114 = "喂，這樣真的好嗎？#n客人們感覺很失望耶。"
10039110-115 = "別緊張，我們幾個把期望值降得越低越好。"
10039110-116 = "「好戲」還在後頭呢。"
10039110-122 = "因為打著鬼屋的名號，可能有點過度期待了吧。"
10039110-123 = "這也沒辦法。#n不過也還算是別具特色吧。"
10039110-124 = "況且鬼屋這種東西，本來就得去遊樂園才有辦法好好享受……"
10039110-125 = "既然來都來了，不如就點個甜點吧？#n不曉得這裡有賣什麼……"
10039110-126 = "我們想要點餐～！請問有菜單嗎？"
10039110-133 = "嗯？"
10039110-138 = "怎，怎麼回事……"
10039110-148 = "……"
10039110-150 = "……"
10039110-152 = "那，那個，請問……"
10039110-157 = "……"
10039110-158 = "那個……點，點餐……"
10039110-167 = "哇，哇啊啊！！"
10039110-168 = "快，快跑！！！"
10039110-173 = "……"
10039110-174 = "居，居然逃跑了……？#n我明明只是按照夏醬說的站著而已……"
10039110-175 = "Excellent，實在太精彩了。"
10039110-176 = "能為「放學後的鬼屋」注入緊張成分的人……非面具殺人魔「薄荷小姐」莫屬。"
10039110-177 = "毫無感情的臉龐，永不停歇的步伐，再加上沉重的球棒──"
10039110-179 = "完全是讓人心驚膽跳的恐怖化身。"
10039110-180 = "夏，夏醬……這樣真的好嗎……？"
10039110-181 = "嗯，好到不能再好了。"
10039110-183 = "好你個頭啊！！#n明明是在經營咖啡廳，結果在點餐前就把客人嚇跑是想怎樣！？"
10039110-184 = "那種事很重要嗎？#n現在的愛莉可是繼《月光光心慌慌》後的新一代恐怖偶像……！！"
10039110-185 = "在我們這群烏合之眾裡，他可是唯一做好自己本分的人啊！"
10039110-186 = "什麼本分不本分的，難道我們有分配每個人得趕跑的客人數量嗎！？"
10039110-187 = "再這樣下去，營業額會掛鴨蛋的！！#n簡直糟透了！我們準備的飲料和甜點該怎麼辦才好啊！？"
10039110-188 = "唯有克服恐懼之人才有資格點餐……！！"
10039110-190 = "門檻太高了吧！！"
10039110-199 = "[ns]「愛莉還真厲害呢……」"
10039110-203 = "老，老師！？#n您是從什麼時候開始看的！？"
10039110-204 = "[s1]「是從『古代的惡靈』……」\n[s2]「還是從『地獄的魔獸』呢……」"
10039110-210 = "喂！！幹嘛躲在一旁偷看啦！！！全都給我忘掉！！！"
10039110-211 = "要是敢再提起一次我就揍飛你！！"
10039110-213 = "老師覺得怎麼樣？這間咖啡廳很不錯吧？"
10039110-214 = "[s]「嗯，我覺得很可愛呀。不錯不錯。」"
10039110-216 = "[ns3]「不過愛莉真的很嚇人呢。」\n[ns4]「那個表情，再配合姿勢跟道具的輔助……」"
10039110-220 = "是，是嗎……總覺得有種既高興又微妙的心情……"
10039110-221 = "這是讚美啦，讚美。#n而且還是最高級的那種。"
10039110-222 = "竟然擁有「恐怖」方面的天賦……挺不錯的嘛，愛莉？#n果然有擔任部長的資格。"
10039110-223 = "都，都說了沒有那種事……"
10039110-228 = "跟百般嘗試還是只能發出彆扭的「呃啊」聲的我比起來，確實讓人有點羨慕……"
10039110-229 = "[ns]「再表演一次吧，喜美！」"
10039110-233 = "少，少囉嗦！！去死啦！！"
10039110-235 = "唉……既然都說到這裡了，再這樣下去也不是個辦法。#n畢竟我們的主題可是鬼屋啊。"
10039110-236 = "要是四個人裡面只有愛莉一個人恐怖，實在說不過去吧？"
10039110-237 = "喂，你們是不是不太理解各自的角色啊？"
10039110-242 = "啊？"
10039110-243 = "你又想說什麼了？"
10039110-245 = "無論道具和服裝有多麼簡陋，都得把角色的精髓表現出來呀。"
10039110-246 = "而且從原作的設定來看，你們應該要比愛莉更可怕才對。#n就算只計算衍生創作物中的殺人數，你們也遠遠在他之上啊。"
10039110-247 = "就，就算你這麼說……"
10039110-249 = "你們為什麼要在鬼屋裡「裝可愛」呢！？"
10039110-253 = "是還指望著被當成女高中生對待嗎！！"
10039110-254 = "最好是啦！！我從來不想被當作是在裝可愛好不好！！"
10039110-255 = "那就給我好好鑽研角色！努力研究該怎麼做才能營造出恐怖的氛圍！"
10039110-256 = "少囉嗦！你那拙劣的裝扮又能嚇到多少人了啦！？"
10039110-257 = "誰叫「弗蘭肯斯坦的怪物」是這個陣容中最弱的……根本沒傷害過多少人。"
10039110-258 = "那你還好意思理直氣壯地胡說八道！"
10039110-259 = "唔，真糟糕！無法反駁我的話就打算訴諸暴力嗎！"
10039110-265 = "幫我綁住這傢伙！只要把他倒掛起來就夠可怕了吧！"
10039110-271 = "「弗蘭肯斯坦的怪物」是不會屈服的！#n直到超越造物主，找到終極的甜點為止！！"
10039110-278 = "大，大家……先冷靜下來好好想想吧。"
10039110-279 = "讓客人感到驚恐……真的是我們的目的嗎？"
10039110-284 = "呃……難道不是嗎？"
10039110-286 = "我們現在經營的不是「鬼屋」，而是以鬼屋為主題的「咖啡廳」。"
10039110-287 = "所以我覺得未必要這麼執著於「恐怖」這方面。"
10039110-288 = "……這麼說也有道理。"
10039110-289 = "因為太過專注於主題，就連我都在不知不覺間落入了思維的陷阱……"
10039110-290 = "嗯，而且也沒有人規定鬼就不能可愛……"
10039110-295 = "先等一下，為什麼我們現在才在討論這個？#n這種事不是應該一開始就確定好的嗎？"
10039110-296 = "哈，太天真了！#n要是一開始就追求完美，事情反而不會成功！"
10039110-297 = "天真的是你吧！#n之所以會搞成這樣，還不是因為你總愛亂加一些奇怪的東西……！"
10039110-298 = "喂！！所以到底該怎麼辦啦！？"
10039110-304 = "[ns]「大家看起來都很有精神，真是太好了……」"
10039110-307 = "（最終放學後的鬼屋，在改走可愛風格後大受好評）"
10039110-311 = "（愛莉的裝扮也在恐怖迷中獲得了幾近狂熱的人氣……）"

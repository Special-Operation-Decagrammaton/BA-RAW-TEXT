[translation]
10039110-1 = "Afterword;After-School Haunted House"
10039110-3 = "Oh... this is Trinity's version of the Haunted House-themed cafe..."
10039110-4 = "Okay, let's see how much scarier theirs is, compared to ours."
10039110-5 = "Yeah, I wonder what it's like!"
10039110-16 = "Raaar, welcome..."
10039110-21 = "I...am Frankenstein's monster! I have come to...take your order!"
10039110-22 = "Um...this isn't scary at all."
10039110-23 = "Y-Yeah... It's almost cute..."
10039110-27 = "Hm..."
10039110-28 = "That fell flat. Very well, next up..."
10039110-32 = "Ancient evil spirit, I summon thee!"
10039110-34 = "Ruler of death, crawl up from the depths of Hell! Spread your curse of despair, and suffocate the earth!"
10039110-39 = "Eek!"
10039110-40 = "Oh, this is gonna be awesome..."
10039110-52 = "Way to oversell it, Natsu..."
10039110-56 = "Um..."
10039110-61 = "G-Graaah... I am the...ancient mummy of fear..."
10039110-62 = "Order, or suffer my curse... "
10039110-68 = "That's cute, but, uh...are we in the wrong cafe?"
10039110-69 = "I thought this was supposed to be scary."
10039110-71 = "Um..."
10039110-72 = "Natsu, you dummy, what are we even doing here?!"
10039110-73 = "Ugh... But the mummy has such storied history. How could it fail?"
10039110-74 = "Very well. I'd hoped it wouldn't come to this..."
10039110-78 = "Let the infernal gates burst asunder, and let loose the terrible shadow beast!"
10039110-80 = "Come forth, you damnable creature! Let all face the wrath of Cath Palug!"
10039110-86 = "Don't call me that! I'm just a werewolf!"
10039110-87 = "Is that what you're going to settle for here? \"Just a werewolf?\" True terror deserves a proper name!"
10039110-91 = "Now, beast! These fools have entered our domain! Take their orders! Let their bellies ripen for your harvest!"
10039110-96 = "I'll harvest you!"
10039110-110 = "So it's a slapstick comedy cafe, then..."
10039110-111 = "Is it? That WOULD make sense..."
10039110-114 = "We are really letting down our customers here."
10039110-115 = "Not to worry, this is all part of the grand strategy."
10039110-116 = "We have yet to reveal the true terror."
10039110-122 = "...I mean, it SAYS \"Haunted House\" out there..."
10039110-123 = "Well, what were you really expecting? Come on."
10039110-124 = "It's a festival. Let's just enjoy it."
10039110-125 = "Might as well grab some dessert while we're here. What've they got?"
10039110-126 = "Hey, do you guys have a menu?"
10039110-133 = "...Huh?"
10039110-138 = "Wh-What was that...?"
10039110-148 = "..."
10039110-150 = "..."
10039110-152 = "U-Umm..."
10039110-157 = "..."
10039110-158 = "D-Do we order from you, or..."
10039110-167 = "AAAHHH!!"
10039110-168 = "R-RUN! Let's get outta here!"
10039110-173 = "..."
10039110-174 = "W-Why'd they run? I was just standing still like Natsu said..."
10039110-175 = "That was amazing. No notes."
10039110-176 = "The high-tension horror, the masked murderer... Miss Mint!"
10039110-177 = "That expressionless face, the footsteps always getting closer and closer, the drag of that heavy bat on the floor as she moves in for the kill..."
10039110-179 = "...and the heart knows nothing but fear."
10039110-180 = "N-Natsu, um...is everything okay?"
10039110-181 = "Yes. Everything's perfect. I'm sure of it."
10039110-183 = "How is it perfect? The customers ran off! They didn't even order anything!"
10039110-184 = "Oh, who cares about that, when we have the very icon here for the next generation of horror!"
10039110-185 = "From these humble origins in this ragtag ghost cafe, Airi will rise to stardom!"
10039110-186 = "By chasing away all our customers?!"
10039110-187 = "We're going to go flat broke at this rate! And then what do we do with all these drinks and desserts?"
10039110-188 = "We sell them to those who earn them, by conquering their fears!"
10039110-190 = "That's a pretty high bar to set, don't you think?!"
10039110-199 = "[ns] \"You did great, Airi.\""
10039110-203 = "S-Sensei? Did you see all that just now?"
10039110-204 = "[s1] \"I also saw the ancient spirit.\"\n[s2] \"And the shadow beast.\""
10039110-210 = "G'ahhh! You were watching the whole time? Just...forget everything you saw here, okay?!"
10039110-211 = "Especially the \"shadow beast.\""
10039110-213 = "What do you think, though, Sensei? Do you like the cafe?"
10039110-214 = "[s] \"I do. It's cute.\""
10039110-216 = "[ns3] \"Airi, though, she's terrifying.\"\n[ns4] \"Great expression, pose, props...\""
10039110-220 = "Y-You think so...? It's kind of good to hear you say that, but it also feels kind of..."
10039110-221 = "It's a compliment, a true compliment. The highest level of compliment."
10039110-222 = "The gift of fear... You're quite something, Airi. Worthy of the presidency, for sure."
10039110-223 = "I-I wouldn't say that..."
10039110-228 = "I wish I could be that scary. I just feel so awkward..."
10039110-229 = "[ns] \"Give it another shot, Yoshimi. Try to scare me.\""
10039110-233 = "NO WAY!"
10039110-235 = "Well, since we're on the subject, our act could use some work. This IS a haunted house, after all."
10039110-236 = "We're \"batting\" .250 here. That's not good enough."
10039110-237 = "Maybe we need to revisit your interpretations of the characters."
10039110-242 = "Huh?"
10039110-243 = "What are you trying to say?"
10039110-245 = "I'm saying, no matter how hastily made the props and costumes are, it's still our responsibility to express the characters to their fullest."
10039110-246 = "Think back to the roots of our characters, the books, the movies, the sequels. Our kill counts alone would put Airi's to shame."
10039110-247 = "B-But still..."
10039110-249 = "But nothing! Our cuteness has no place here!"
10039110-253 = "We may be students out there, but within these walls, we are CREATURES OF THE NIGHT!"
10039110-254 = "Who said anything about cuteness?"
10039110-255 = "Then do some more research! Study and master the very fundamentals of fear!"
10039110-256 = "Oh, you're one to talk! You think you're going to scare people looking like THAT?"
10039110-257 = "Frankenstein's Monster is the least scary thing here. The whole POINT of his story is that he's barely even a monster!"
10039110-258 = "Yeah, so why don't you shut up already?"
10039110-259 = "Ugh, I see. Since you can't refute my argument, you're resorting to force!"
10039110-265 = "I know how to make her scarier. Let's hang her upside down!"
10039110-271 = "Frankenstein's monster will not yield! Until it breaks free of its creator and finds the ultimate dessert!"
10039110-278 = "H-Hey, everybody? Could we all just take a breath and think about this for a second?"
10039110-279 = "What's our goal here? Is it really to scare the customers?"
10039110-284 = "Uh... Isn't it?"
10039110-286 = "Because this isn't really a haunted house. It's a cafe THEMED like a haunted house."
10039110-287 = "It doesn't HAVE to be scary."
10039110-288 = "...Point taken."
10039110-289 = "...Perhaps we were so engrossed in that theme that we ourselves became captives and victims here..."
10039110-290 = "Yeah, let's just be \"cute spooky.\""
10039110-295 = "Wait, we're changing gears NOW? What happened to your genius plan, Natsu?"
10039110-296 = "No plan is perfect. One must learn to adapt."
10039110-297 = "Oh no, you're not getting off the hook that easily! This was your idea!"
10039110-298 = "Hey, uh, so what's the new plan, then?"
10039110-304 = "[ns] \"It's good to see everyone so energetic.\""
10039110-307 = "They revamped the haunted house to a \"cute spooky\" vibe. After that, the customers all enjoyed themselves."
10039110-311 = "And Airi gained a cult following among horror enthusiasts..."

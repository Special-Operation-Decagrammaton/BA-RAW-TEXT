[translation]
1001808-1 = "คำมั่นสัญญา ณ สวนสนุก"
1001808-2 = "ทางเข้าสวนสนุกประตูหน้า"
1001808-5 = "คุณครูคะ ทางนี้ค่ะ ทางนี้"
1001808-6 = "ฮิฮิ... ได้มาเดินเล่นในสวนสนุกกับคุณครูโดยไม่ใส่ชุดตุ๊กตาแบบนี้ รู้สึกตื่นเต้นจังนะคะ....."
1001808-7 = "วันนี้ไม่ทำงานพาร์ทไทม์จะไม่เป็นไรหรือเปล่าน่ะเหรอคะ?"
1001808-8 = "วันนี้ไม่ใช่เวรฉันน่ะค่ะ"
1001808-9 = "สวนสนุกแจกบัตรฟรีสไตล์สองใบให้ไปใช้ตอนออกเวร... ฉันเลยอยากจะชวนคุณครูมาที่ที่ฉันทำงานค่ะ"
1001808-10 = "หรือว่า... ฉันรบกวนหรือเปล่าคะ...?"
1001808-11 = "[s] \"เปล่าหรอก ครูเองก็ชอบสวนสนุกนะ\""
1001808-12 = "โล่งอกไปที... ฉันกังวลว่าอาจจะรบกวนคุณครูที่กำลังยุ่งค่ะ"
1001808-13 = "ถ้างั้นวันนี้มาเล่นเครื่องเล่นด้วยกันนะคะ...!"
1001808-14 = "[s] \"ยูสึอยากเล่นเครื่องเล่นไหนเหรอ?\""
1001808-15 = "ไม่ว่าเครื่องเล่นไหนถ้าได้เล่นกับคุณครูก็ดีทั้งนั้นค่ะ... แต่ฉันก็ยังกลัวคนอยู่..."
1001808-16 = "ถ้าเป็นไปได้ขอเป็นเครื่องเล่นที่ไม่ค่อยมีคนก็จะดีค่ะ…"
1001808-17 = "[s1] \"ถ้างั้นไปนั่งชิงช้าสวรรค์กันเถอะ\"\n[s2] \"ถ้างั้นไปเล่นโรลเลอร์โคสเตอร์กันเถอะ\""
1001808-18 = "ดีเลยค่ะ! ชิงช้าสวรรค์มีคนน้อยและมองเห็นสวนได้จากระยะไกล..."
1001808-20 = "ทางนี้ค่ะ คุณครู ฉันแนะนำให้เองค่ะ!"
1001808-21 = "ระ... โรลเลอร์โคสเตอร์เหรอคะ? โรลเลอร์โคสเตอร์มีคนรอแถวเยอะ แล้วก็ยังเป็นเครื่องเล่นที่#nน่ากลัวด้วยนี่คะ...!"
1001808-22 = "คุณครูรอก่อนค่ะ! อย่าทิ้งฉันไว้คนเดียวนะคะ...!"
1001808-24 = "จากนั้นคุณครูก็ได้เล่นเครื่องเล่นกับยูสึอย่างสนุกสนาน..."
1001808-26 = "เฮ้อ...วันนี้สนุกมากเลยล่ะค่ะ"
1001808-27 = "สวนสนุกเป็นสถานที่ที่ไม่ว่ามาเมื่อไหร่ก็จะมีความสุข แต่พอได้มากับคุณครูก็ยิ่งมีความสุขขึ้นไปอีกค่ะ"
1001808-28 = "[s] \"ครูก็สนุกมากเลย\""
1001808-29 = "คือว่า..."
1001808-30 = "ก่อนที่จะแยกกัน... ฉันมีของขวัญที่อยากให้คุณครูน่ะค่ะ..."
1001808-31 = "...ถามว่าของขวัญไม่ใช่บัตรฟรีสไตล์ของสวนสนุกงั้นเหรอคะ?"
1001808-32 = "มะ... ไม่ใช่นะคะ!"
1001808-33 = "เรื่องนั้นมัน... ฉันเพียงให้เพราะอยากจะเล่นกับคุณครูเท่านั้นค่ะ"
1001808-34 = "ฉันซื้อของที่สมาชิกแต่ละคนชอบให้เป็นของขวัญ แต่ฉันคิดว่าแค่นั้นมันไม่พอที่จะมอบให้กับ#nผู้ใหญ่อย่างคุณครู... หลังจากที่คิดมานาน ฉันได้เตรียมมาแล้วค่ะ..."
1001808-40 = "นั่นคือสิ่งที่คุณครูใช้ได้ทุกเมื่อที่ต้องการ..."
1001808-41 = "...<บัตรฟรีสไตล์ของยูสึ> ค่ะ"
1001808-45 = "― ถ้าไม่มีคุณครูละก็... ฉันคงทำไม่ได้แน่ๆ ค่ะ[wa:3630] "
1001808-48 = "― ฉันมอบของขวัญให้ทุกคนได้ เพราะคุณครูเลยค่ะ[wa:3870] "
1001808-51 = "― ถ้าเกิดว่าคุณครูอยากให้ฉันช่วยอะไร[wa:1270] "
1001808-53 = "― ถ้าเกิดคุณครูจะให้ฉันช่วย ก็บอกฉันมาได้ตลอดเลยนะคะ[wa:3490] "
1001808-56 = "― ...ฉันจะตอบแทนคุณครูแน่นอนค่ะ[wa:2590] "
1001808-59 = "คุณครูชอบแบบนี้ฉันก็โล่งอกค่ะ"
1001808-60 = "ถ้าใช้บัตรนี้ จะสามารถขออะไรจากยูสึก็ได้อย่างนั้นน่ะเหรอคะ?#nค่ะ แน่นอนค่ะ..."
1001808-61 = "มะ... ไม่ว่าอะไรก็ได้..."
1001808-62 = "ทะ... ที่คุณครูคิดออกเลยค่ะ! ฉันไม่ได้คิดเรื่องแบบนั้นเลยนะคะ!"
1001808-63 = "ถึงจะบอกว่าเป็นบัตรฟรีสไตล์ แต่ห้ามทำเรื่องแปลกๆ เด็ดขาด! ห้ามค่ะ...!"
1001808-65 = "......"
1001808-66 = "ไม่ได้...เด็ดขาดค่ะ..."

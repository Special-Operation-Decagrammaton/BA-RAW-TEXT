1001808-59 = "3;유즈;03;좋아해 주시는 것 같아서 다행이에요.\n#3;a"
1001808-60 = "3;유즈;02;이 자유이용권을 사용하면 무엇이든 유즈에게 부탁할 수 있느냐고요? #n네, 그야 물론……\n#3;em;[?]"

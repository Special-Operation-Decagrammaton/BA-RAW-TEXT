1001808-62 = "3;유즈;08;무, 무슨 생각을 하시는 거예요! 그, 그런 생각으로 건넨 물건은 아니라고요!\n#3;shake\n#3;em;[?!]"
1001808-63 = "3;유즈;05;자, 자유이용권이라지만 이, 이상한 건 절대로! 절대로……!\n#3;hophop"

[translation]
1001808-1 = "A Promise at the Theme Park"
1001808-2 = "Theme Park Main Entrance"
1001808-5 = "Sensei, this way. Here."
1001808-6 = "Heehee It feels strange to walk around the theme park with you without my costume on..."
1001808-7 = "Is it okay for me to not work part-time today?"
1001808-8 = "Yes, I'm off today."
1001808-9 = "I received two free passes from the theme park to use on my day off... I wanted to show you around my place of work, Sensei."
1001808-10 = "A-Am I bothering you?"
1001808-11 = "[s] \"No, I like theme parks too.\""
1001808-12 = "I'm glad. Since you're so busy, I was worried that I might be bothering you."
1001808-13 = "Th-Then let's spend some time together riding the rides...!"
1001808-14 = "[s] \"What kind of rides do you like, Yuzu?\""
1001808-15 = "I'm fine with any ride that I can ride with you, but...I-I'm still scared of people..."
1001808-16 = "If possible, I prefer rides where there aren't too many people around..."
1001808-17 = "[s1] \"Then let's go ride the Ferris wheel.\"\n[s2] \"Then let's go ride the roller coaster.\""
1001808-18 = "Okay! There aren't too many people on the Ferris wheel, and you can look down and see the entire park from up high..."
1001808-20 = "This way, Sensei. I'll lead the way!"
1001808-21 = "A-A roller coaster? There's a long line for that, and it's a super scary ride too..."
1001808-22 = "S-Sensei, wait for me! Don't leave me here alone..."
1001808-24 = "And so I rode some fun rides with Yuzu..."
1001808-26 = "Whew... I had fun today."
1001808-27 = "Theme parks are always fun places to visit, but I had more fun because I came with you."
1001808-28 = "[s] \"I had fun too.\""
1001808-29 = "So..."
1001808-30 = "B-Before we say goodbye...I have a gift for you, Sensei."
1001808-31 = "Are you asking if the free pass to the theme park was the gift?"
1001808-32 = "N-No, it wasn't!"
1001808-33 = "Th-That's...that's just something I requested because I wanted to hang out with you."
1001808-34 = "I bought the members gifts they liked, but I felt that any gift I got for you wouldn't be good enough. So, after a lot of thinking, this is what I came up with..."
1001808-40 = "It's something you can use anytime you need to, Sensei..."
1001808-41 = "It's Yuzu's Season Pass."
1001808-45 = "― Sensei, if it wasn't for you... I wouldn't have been able to do it.[wa:2670] "
1001808-48 = "― I was able to give gifts to everyone thanks to you, Sensei.[wa:3190] "
1001808-51 = "― Sensei, just like how you helped me...[wa:1110] "
1001808-53 = "― If you're ever in a bind and you need me, let me know anytime.[wa:3010] "
1001808-56 = "― I will definitely make it up to you.[wa:2310] "
1001808-59 = "I'm glad you like it."
1001808-60 = "Can you ask me for anything if you use the pass? Yes, of course..."
1001808-61 = "A-Anything..."
1001808-62 = "Wh-What are you thinking?! I-I didn't give it to you with THAT in mind!"
1001808-63 = "I-It may be a free pass, but I-I would never allow anything weird! Never!"
1001808-65 = "..."
1001808-66 = "Never...allow...that..."

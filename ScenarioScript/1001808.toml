[translation]
1001808-1 = "於遊樂園的約定"
1001808-2 = "遊樂園．正門入口"
1001808-5 = "啊，老師，我在這裡……！"
1001808-6 = "嘿嘿……居然能不穿布偶裝和老師一起走在遊樂園裡，總覺得不可思議呢……"
1001808-7 = "你問今天的打工……是嗎？"
1001808-8 = "啊，今天我請假了。"
1001808-9 = "還有，那個……他們給了我兩張遊樂園的招待券，說是休假的時候可以用……所以就想說要好好招待老師。"
1001808-10 = "難，難道說，給你添麻煩了嗎……？"
1001808-11 = "[s] 「不會呀，我最喜歡遊樂園了。」"
1001808-12 = "太好了……#n我還擔心這樣約老師出來會不會造成困擾呢……"
1001808-13 = "那，那今天就一起搭一些遊樂設施，開心玩吧……！"
1001808-14 = "[s] 「柚子喜歡哪種設施呢？」"
1001808-15 = "跟，跟老師一起的話搭什麼都可以……雖，雖然還是有點害怕其他人……"
1001808-16 = "可，可以的話，還是選人比較少的設施比較好……"
1001808-17 = "[s1] 「那就搭摩天輪吧。」\n[s2] 「那就搭雲霄飛車吧。」"
1001808-18 = "啊，聽起來不錯呢……！摩天輪的話人又少，又能夠從高處把遊樂園一覽無遺……"
1001808-20 = "在這邊，老師，我帶你去……！"
1001808-21 = "咦，雲，雲霄飛車嗎？雲霄飛車的話一起搭的人也不少，而，而且重點是很可怕不是嗎……！？"
1001808-22 = "老，老師，請等等我！不要把我丟在這裡啊……！"
1001808-24 = "（之後，和柚子開心地搭遊樂設施並吃了飯）"
1001808-26 = "呼……今天過得真快樂，謝謝老師。"
1001808-27 = "雖然說遊樂園不管什麼時候來都很開心，但今天能跟老師一起來，比之前都還更開心。"
1001808-28 = "[s] 「我也很開心唷，謝謝你啦。」"
1001808-29 = "還有，那，那個……"
1001808-30 = "在回去之前……有個禮物想給老師……"
1001808-31 = "……你問禮物不是今天的遊樂園招待券嗎……？"
1001808-32 = "才，才不是……！"
1001808-33 = "那，那個只是……我想跟老師一起玩，所以才拜託老師來的……"
1001808-34 = "對部員的大家都買好了他們喜歡的禮物，但對已經是大人的老師，到底要送什麼禮物才好卻總是想不出來……於是我想了想，就準備了這個……"
1001808-40 = "老師想用的時候隨時都能用的……"
1001808-41 = "……「柚子的任意請求券」！"
1001808-45 = "― 要是沒有老師的話……我想我肯定做不到的。[wa:4550] "
1001808-48 = "― 能送禮物給大家，也是託老師的福。[wa:4910] "
1001808-51 = "― 就像老師幫助我一樣……[wa:2190] "
1001808-53 = "― 老師如果有需要我的時候，不管是什麼都請告訴我。[wa:4570] "
1001808-56 = "― ……我一定，會報答你的。[wa:3270] "
1001808-59 = "……呵呵。老師你能喜歡真是太好了。"
1001808-60 = "你問只要用這張任意請求券的話，無論什麼事都能拜託柚子嗎……？#n是，是的，那是當然，畢竟是報恩嘛……"
1001808-61 = "無，無論什麼事…………"
1001808-62 = "你，你在想什麼……！？才，才不是為了那種事才給你的，那個……！"
1001808-63 = "雖，雖然是任意請求券，那個……！奇，奇怪的事情是絕對……！絕對……！"
1001808-65 = "……"
1001808-66 = "……不，不可以……的喔……"

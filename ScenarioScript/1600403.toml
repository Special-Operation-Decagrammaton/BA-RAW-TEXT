[translation]
1600403-1 = "สิ่งสำคัญที่อยู่ภายใน"
1600403-2 = "อ๊ะ คุณครู! มาได้จังหวะพอดีเลยค่ะ! อยากได้ความช่วยเหลืออยู่พอดีเลย!"
1600403-3 = "อ่า~ เกิดเรื่องใหญ่เข้าแล้วค่ะ! และฉันก็แก้ปัญหาคนเดียวไม่ได้แน่!"
1600403-4 = "คะ? คุณครูคิดว่าเกิดเรื่องต่อสู้เหรอคะ...? ไม่หรอกค่ะ ไม่ใช่เรื่องแบบนั้นหรอก"
1600403-5 = "ก็แค่... อยากไปซื้อเสื้อผ้า แต่ว่าไม่มีใครไปด้วย..."
1600403-6 = "[s] \"...เสื้อผ้า?\""
1600403-7 = "ใช่ค่ะ! ก็ชุดที่ตัวเอกในหนังเรื่อง <ชิบะในสายลม> ใส่มันเท่สุดๆ ไปเลยล่ะค่ะ!"
1600403-8 = "ฉันก็เลยอยากจะซื้อชุดเดียวกันมาใส่บ้าง~ และไหนๆ ก็ไปซื้อแล้ว..."
1600403-9 = "ฉันก็เลยอยากเดินดูอย่างอื่นบ้าง น่าสนุกดีนะคะ! คุณครูคิดว่ายังไงล่ะคะ? ฮิฮิ"
1600403-10 = "คะ? ทำไมฉันถึงไม่ไปกับเพื่อนคนอื่นน่ะเหรอคะ? อืม... จริงๆ ฉันก็เอ่ยปากชวนไปแล้ว..."
1600403-11 = "......"
1600403-12 = "แต่บอกว่าจะไปเลือกซื้อผ้า บรรยากาศก็เปลี่ยนไป แล้วก็พากันหนีฉันไปหมด..."
1600403-13 = "ฉันเองก็ไม่รู้ค่ะว่าทำไมถึงเป็นแบบนั้นกัน พอถามเหตุผลก็ได้ฟังแต่คำขอโทษ..."
1600403-14 = "อ้อ! แล้วพวกเขาก็ถามเรื่องขนาดหน้าอกกับสไตล์การแต่งตัวด้วย..."
1600403-15 = "มันมีอะไรแปลกเหรอคะคุณครู? หรือว่าพีน่าทำอะไรผิดไป?"
1600403-16 = "(ตาเหลือบไปเห็นชุดของพีน่าที่ปกปิดร่างกายไม่หมด...)"
1600403-17 = "[s1] \"สไตล์ของพีน่าอาจจะไม่เหมือนกับคนอื่นน่ะ\"\n[s2] \"พีน่าไม่ได้ผิดอะไรหรอก...\""
1600403-18 = "คะ? คุณครูคิดว่าอย่างนั้นเหรอคะ?"
1600403-19 = "อย่างนี้แปลว่า...? เป็นความผิดของใครกันล่ะ...?"
1600403-20 = "ช่างเถอะค่ะ! เอาเป็นว่า!"
1600403-21 = "เอาเป็นว่าตอนนี้พีน่าไม่เหลือใครนอกจากคุณครูแล้วค่ะ! คุณครูจะช่วยใช่ไหมคะ?"
1600403-22 = "[s3] \"แน่นอนอยู่แล้ว\"\n[s4] \"คงไม่อยากเห็นครูหนีไปอีกคนใช่ไหมล่ะ?\""
1600403-23 = "เย้! ขอบคุณนะคะคุณครู! งั้นเราไปกันเลยค่ะ!"
1600403-24 = "เย้! ขอบคุณนะคะคุณครู! งั้นเราไปกันเลยค่ะ!"
1600403-25 = "ไปกันเล้ยย~!!"
1600403-27 = "โน่นไง! ตรงโน้นค่ะ! ร้านนี้มีเสื้อผ้าสไตล์คล้ายๆ กันอยู่เยอะเลยค่ะ!"
1600403-28 = "สนใจเสื้อผ้าร้านของเราเหรอ? หนูตาถึงมากเลยล่ะ!"
1600403-29 = "ฮุฮุฮุ ชมอะไรกันแบบนี้ล่ะคะ นี่คือการฝึกฝนเพื่อเป็นผู้ผดุงความยุติธรรมของฉันค่ะ!"
1600403-30 = "ผู้ผดุงความยุติธรรม...? ฉันไม่ค่อยเข้าใจที่หนูพูด... แต่ก็..."
1600403-31 = "อ๊ะ อยู่ตรงนั้นไง! ชุดนั้นแหละค่ะ! หาเจอแล้ว!"
1600403-32 = "นี่เป็นชุดที่ <ชิบะ> ตัวเอกจากหนังเรื่อง <ชิบะในสายลม> เคยใส่ค่ะ!"
1600403-33 = "พีน่าขอลองใส่ชุดนี้ดูได้ไหมคะ? ฉันอยากลองตอนนี้เลยค่ะ!"
1600403-35 = "ดะ... เดี๋ยวสิหนู! ชุดนี้มัน...!"
1600403-36 = "เอ่อ... อืม... ชุดนี้มัน... คับมากกว่าที่คิดนะคะ...?"
1600403-37 = "ไม่นะ!? ม่ายยยย! เดี๋ยวก่อน...!!"
1600403-38 = "แคว่กกก~! แคว่ก!"
1600403-40 = "...?"
1600403-41 = "ขะ..."
1600403-42 = "ขาดแล้วค่ะ..."
1600403-43 = "เพราะอะไรกันเนี่ย!? นี่แค่ลองใส่เองนะคะ...!"
1600403-44 = "ก็มันเป็นชุดของ <ชิบะ> ไงล่ะ..."
1600403-45 = "ก็เลยมีแต่ขนาดสำหรับชิบะน่ะ..."
1600403-47 = "(ทั้งสองขอโทษเจ้าของร้านพร้อมจ่ายค่าเสียหายและออกมาจากร้าน)"
1600403-48 = "(หลังจากนั้นก็ไปเดินดูเสื้อผ้าร้านอื่น แต่ก็หาขนาดที่เหมาะกับพีน่าไม่ได้เลย)"
1600403-49 = "(สุดท้ายตะวันก็ตกดิน และไม่ได้ซื้อเสื้อผ้าอะไรมาซักชิ้น)"
1600403-51 = "ทำไมการหาชุดที่พอดีตัวพีน่ามันยากแบบนี้ล่ะคะ..."
1600403-52 = "มาคิดดูแล้ว... ตัวเอกของเรื่อง <ชิบะในสายลม> กับ <เหมียวมาเฟีย>"
1600403-53 = "เป็นน้องหมากับน้องแมว... พีน่าก็เลยใส่ชุดของพวกเขาไม่ได้สินะคะ..."
1600403-54 = "อืม..."
1600403-55 = "แต่พีน่าก็อยากเป็นแบบนั้นนี่นา..."
1600403-56 = "หรือว่าสุดท้ายแล้วพีน่าจะเป็นแบบตัวเอกในหนังไม่ได้กันนะ..."
1600403-57 = "......"
1600403-58 = "[s] (ยื่นแผ่นหนังบลูเรย์ที่ซื้อในตลาดให้พีน่า)"
1600403-59 = "หืม? นี่มันอะไรเหรอคะ?"
1600403-60 = "<แก๊งแมวเหมียวเซ็กซี่>...? นี่มันหนังผู้ผดุงความยุติธรรมหรือเปล่าคะ?"
1600403-61 = "...! ไม่เคยได้ยินเรื่องนี้มาก่อนเลยค่ะ! ตัวเอกเป็นหัวหน้าฮีโร่เหรอคะเนี่ย?#nแถมยังเป็นน้องแมวอีก น่ารักจังเลย!!"
1600403-62 = "เอ่อ..."
1600403-63 = "แต่ว่าดูรูปจากหน้าปกแล้ว... เธอใส่ชุดโชว์ไหล่นี่คะ?"
1600403-64 = "นี่มันเหมือนกับ..."
1600403-65 = "เหมือนกับชุดที่พีน่าใส่อยู่เลยค่ะ!"
1600403-66 = "...เอ๋?"
1600403-67 = "ปกติตัวเอกจากหนังประเภทนี้ชอบใส่ชุดแบบนี้เหรอคะ? ชุดแบบที่พีน่าใส่อยู่เนี่ยนะ?"
1600403-68 = "ถึงจะไม่ได้เหมือนกัน 100% แต่มีส่วนที่คล้ายๆ กันเยอะเลย..."
1600403-69 = "...คะ?"
1600403-70 = "สิ่งสำคัญไม่ใช่ชุดที่ใส่... แต่เป็นจิตใจข้างในงั้นเหรอคะ...?"
1600403-71 = "พีน่ามีความรักในความยุติธรรมในจิตใจอยู่แล้ว ชุดที่พีน่าใส่ก็เลยเป็นชุดของผู้ผดุงความยุติธรรม#nไปโดยปริยายเหรอคะ?"
1600403-72 = "พีน่ากับ... ความยุติธรรม..."
1600403-73 = "......"
1600403-74 = "แหะๆๆ ...."
1600403-75 = "สงสัยต้อง... เลี้ยงชาคุณครูสักแก้วแล้วค่ะ"
1600403-76 = "พอได้ยินคุณครูพูดแบบนี้ พีน่าก็รู้สึกว่ามันจริงอย่างที่คุณครูพูดเลยค่ะ!"
1600403-77 = "ไม่อยากเชื่อเลยว่าปัญหาใหญ่ของฉันจะคลี่คลายได้ง่ายๆ แบบนี้!"
1600403-78 = "คะ? ไม่อยากดื่มชาเหรอคะ? ไม่เป็นไรค่ะ ไว้เป็นอย่างอื่นก็ได้ค่ะ"
1600403-79 = "ฮิฮิ..."
1600403-80 = "เพราะสิ่งที่สำคัญไม่ใช่แก้วชา แต่เป็นของที่อยู่ข้างในต่างหาก!"
1600403-82 = "(พีน่าอารมณ์ดีขึ้นแล้ว ทั้งสองเลยไปดู <แก๊งแมวเหมียวเซ็กซี่> ด้วยกัน)"
1600403-83 = "(พีน่าดูหนังอย่างสนุกและกลับบ้านไป เหมือนว่าเธอจะหายกังวลเรื่องเสื้อผ้าแล้ว)"

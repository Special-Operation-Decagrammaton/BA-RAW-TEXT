[translation]
1600403-1 = "What's on the Inside"
1600403-2 = "You got here just at the right time, Sensei! I could use your help."
1600403-3 = "Argh... This is bad! I can't handle this with just me!"
1600403-4 = "A fight? No? What made you think I got into a fight?"
1600403-5 = "I just need to buy some clothes, and I want you to come with me."
1600403-6 = "[s] \"...Clothes?\""
1600403-7 = "Of course. I watched Shiba of the Wind the other day, and the main character's outfit looked so cool!"
1600403-8 = "So I was gonna go buy the same clothes..."
1600403-9 = "Is that all right with you, Sensei? We can do a bit of window-shopping too. We're going to have so much fun."
1600403-10 = "Why didn't I ask my friends to go with me? Well, I asked them, but..."
1600403-11 = "..."
1600403-12 = "Every time I ask them to go shopping with me, they get all quiet and run away..."
1600403-13 = "It doesn't make any sense. I've asked them several times, but they just kept saying sorry..."
1600403-14 = "They all mentioned something about bust size or choice in style."
1600403-15 = "What do you think, Sensei? Am I doing something wrong?"
1600403-16 = "(At second glance, Pina's clothes are rather revealing.)"
1600403-17 = "[s1] \"I can see their point when it comes to wardrobe.\"\n[s2] \"...Some of that is out of your control.\""
1600403-18 = "H-Huh? You can?!"
1600403-19 = "What...does that mean? Is it under someone else's control?"
1600403-20 = "Well, regardless."
1600403-21 = "This is why I need your advice, Sensei. Will you come with me?"
1600403-22 = "[s3] \"I'd be happy to!\"\n[s4] \"I won't turn my back on you.\""
1600403-23 = "Yay! You're the best, Sensei. Let's go!"
1600403-24 = "Yay! You're the best, Sensei. Let's go!"
1600403-25 = "Let's go!"
1600403-27 = "Here's the store with the clothes I'm looking for!"
1600403-28 = "You appreciate our clothing? Then, you clearly have excellent taste."
1600403-29 = "Heh. Naturally! A rising gangster can't slack in the fashion department."
1600403-30 = "Gang...ster? I haven't the foggiest of what you're referring to, but very well."
1600403-31 = "There! That's the look I want. I already found it!"
1600403-32 = "This is the exact outfit worn by Shiba in Shiba of the Wind!"
1600403-33 = "Is it all right if I try it on? Because I really want to!"
1600403-35 = "H-Huh? Excuse me, ma'am! Those clothes are...!"
1600403-36 = "Huh? Are they the wrong size?"
1600403-37 = "Huh? W-Wait! Er...!"
1600403-38 = "*tear* *thud*"
1600403-40 = "...?"
1600403-41 = "It..."
1600403-42 = "...ripped."
1600403-43 = "Wh-What happened?! All I wanted to do was try it on!"
1600403-44 = "That's because it's Shiba's outfit..."
1600403-45 = "…it was custom tailored to fit him."
1600403-47 = "(We paid for the damages after profusely apologizing to the manager and left the store.)"
1600403-48 = "(We visited other boutiques, but Pina couldn't find anything she liked that would fit properly.)"
1600403-49 = "(The sun set without her having bought a single new piece of clothing.)"
1600403-51 = "I couldn't find anything that fits me..."
1600403-52 = "The main characters in Shiba of the Wind and Life of a Mafia Cat..."
1600403-53 = "...are dogs and cats now that I think about it. Of course I couldn't fit in their clothes."
1600403-54 = "*sigh*"
1600403-55 = "All I wanted to do was become a real gangster."
1600403-56 = "Maybe I don't have what it takes to be like Shiba or Mafia Cat..."
1600403-57 = "..."
1600403-58 = "[s] (I handed Pina a Blu-ray I bought at the market.)"
1600403-59 = "Huh? What's this?"
1600403-60 = "The Sexy Kitten Gang...? Is this a mobster movie?"
1600403-61 = "I've never seen this one before! Is the main character a mob boss? And she's a cat! How adorable!"
1600403-62 = "Um..."
1600403-63 = "But in the cover art...her shoulders are showing."
1600403-64 = "It kind of looks like..."
1600403-65 = "...what I'm wearing right now."
1600403-66 = "Huh?"
1600403-67 = "Is that what the heroines of mobster movies usually wear? What I'm wearing right now?"
1600403-68 = "It's not exactly the same, but it's close... That's amazing."
1600403-69 = "Huh?"
1600403-70 = "It's not the clothes but what's on the inside that matters?"
1600403-71 = "If I'm already a gangster, does that make my clothes gangster clothes...?"
1600403-72 = "Me... A real gangster..."
1600403-73 = "..."
1600403-74 = "Heehee."
1600403-75 = "I should treat you to tea one of these days, Sensei."
1600403-76 = "Because if it's coming from you, then it must be true!"
1600403-77 = "I was stressing so much, but I was so much closer to the solution than I ever thought!"
1600403-78 = "What's that? You don't want tea? Don't worry about sweating the details just yet."
1600403-79 = "Heehee."
1600403-80 = "After all, it's not what's on the outside of the container that matters but what's inside!"
1600403-82 = "(With Pina feeling better, we went to go watch The Sexy Kitten Gang.)"
1600403-83 = "(Seemingly satisfied with her newfound realization, Pina never complained about clothes ever again.)"

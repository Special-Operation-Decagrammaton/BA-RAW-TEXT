[translation]
1600403-1 = "重要的是內在"
1600403-2 = "啊，老師！幸好你來了！彷彿是神仙下凡！"
1600403-3 = "大事不好了！我一個人實在沒辦法解決！"
1600403-4 = "……你問我是不是跟別人起衝突了？沒有，才不是那樣呢！"
1600403-5 = "我是想要去買些衣服，所以才叫你來的。"
1600403-6 = "[s] 「……衣服？」"
1600403-7 = "沒錯！我之前看過的《浪客柴藏》裡主角穿的衣服，實在是太帥氣了！"
1600403-8 = "所以，我也想要去找找看有沒有一樣的衣服……"
1600403-9 = "順便也跟老師一起到處逛逛，你覺得怎麼樣呢？是不是覺得很棒！嘿嘿！"
1600403-10 = "……你說找其他的朋友？啊──……這個嘛，我是有試過……"
1600403-11 = "……"
1600403-12 = "不知道為什麼，每次我說要「一起去看衣服」，就算是平常很要好的大家也會逃走……"
1600403-13 = "明明其他時候不會這樣的，但就算我問他們為什麼，他們也只是跟我說抱歉……"
1600403-14 = "不然就是一下說胸圍怎樣、風格怎樣的……我也搞不太清楚……"
1600403-15 = "……難道說菲娜做了什麼不好的事嗎？"
1600403-16 = "（緊繃的衣服無法包覆住菲娜胸口的畫面映入眼簾）"
1600403-17 = "[s1] 「確實，有可能是菲娜（的身材）的錯。」\n[s2] 「……菲娜『本身』並沒有錯。」"
1600403-18 = "咦……！是，是這樣嗎！？"
1600403-19 = "什麼意思呢？那究竟是誰……？"
1600403-20 = "不管怎樣！就是因為這樣才叫老師來的！"
1600403-21 = "菲娜只能依靠老師了！老師願意幫我嗎？"
1600403-22 = "[s3] 「如果是這樣的話我很樂意！」\n[s4] 「我可不能臨陣脫逃……！」"
1600403-23 = "呀呼！謝謝老師！老師最棒了！那麼就立刻出發吧！"
1600403-24 = "呀呼！謝謝老師！老師最棒了！那麼就立刻出發吧！"
1600403-25 = "GoGo～！！"
1600403-27 = "那裡！就是那裡！我早就想要去逛逛看了！那間店有很多衣服很像是我要找的！"
1600403-28 = "對我們店裡的衣服很有興趣嗎？同學，你的眼光不錯嘛！"
1600403-29 = "哼哼哼，您過獎了。為了成為一名任俠，我可是不曾怠於訓練！"
1600403-30 = "這，這樣啊，不論如何……歡迎您到處看看。"
1600403-31 = "在那邊！就是那邊那件衣服！我一下就找到了！"
1600403-32 = "這就是《浪客柴藏》的主角「柴藏」穿的衣服！！"
1600403-33 = "菲娜可以去試穿看看嗎？可以吧？我這就去試穿！！"
1600403-35 = "耶？等，等等同學！那件衣服是……！！"
1600403-36 = "奇，奇怪？這件衣服好像……有點小……？"
1600403-37 = "嗯！？等，等等！Wait！Wait！！"
1600403-38 = "噗啪哩啪哩啪哩！"
1600403-40 = "……？"
1600403-41 = "……破，"
1600403-42 = "破掉了……"
1600403-43 = "……為，為為為為什麼！？我只是試穿一下而已啊……！"
1600403-44 = "因為那是主角「柴藏」的衣服所以……"
1600403-45 = "當然是依照柴犬的尺寸做的……"
1600403-47 = "（在那之後向店長不斷的道歉，付了衣服的賠償費用後離開了）"
1600403-48 = "（接下來雖然也逛了其他商店，卻還是找不到適合菲娜身材的衣服）"
1600403-49 = "（最終還沒有得到什麼成果，太陽就已經下山了）"
1600403-51 = "結果還是沒有找到……適合菲娜的衣服……"
1600403-52 = "不只是《浪客柴藏》和《任俠喵喵傳》，就連其他電影主角的衣服都不行……"
1600403-53 = "全都是貓貓狗狗的衣服……菲娜不能穿……"
1600403-54 = "……嗚嗚。"
1600403-55 = "菲娜……明明想成為任俠的說……"
1600403-56 = "菲娜……沒辦法成為「柴藏」或「任俠喵喵」嗎……"
1600403-57 = "……"
1600403-58 = "[s] （拿出之前買的BD）"
1600403-59 = "……嗯？這是什麼？"
1600403-60 = "《性感喵女俠》……？這是任俠電影嗎？"
1600403-61 = "我第一次看到這部電影！主角是女性的任俠嗎？母貓真可愛！"
1600403-62 = "啊……"
1600403-63 = "這個封面，還有這件露出肩膀的衣服……"
1600403-64 = "感覺……"
1600403-65 = "和菲娜現在穿的衣服……有點像……？"
1600403-66 = "……耶？"
1600403-67 = "你說任俠電影的女主角本來就常常穿成這樣？就像菲娜現在穿的這樣嗎？"
1600403-68 = "……確實……和菲娜穿的衣服很像。"
1600403-69 = "……哎？"
1600403-70 = "你說重要的不是衣服而是穿著衣服的人……？"
1600403-71 = "菲娜有屬於自己的任俠之心，所以菲娜穿的衣服就是任俠的衣服……嗎？"
1600403-72 = "菲娜的……任俠……"
1600403-73 = "……"
1600403-74 = "……嘿嘿。"
1600403-75 = "果然……未來某天和菲娜高舉茶杯，對茶言歡的對象就是老師也說不定呢。"
1600403-76 = "聽了老師的話之後，不知為何總是有這種感覺！"
1600403-77 = "當初那麼煩惱的問題，竟然這麼簡單就解決了！不愧是老師！"
1600403-78 = "什麼？那個不是茶杯嗎？是這樣嗎？不是大問題啦。"
1600403-79 = "……嘿嘿。"
1600403-80 = "畢竟重要的不是用什麼杯子，而是杯子裝了什麼嘛！"
1600403-82 = "（在那之後，和心情完全恢復的菲娜一起看了《性感喵女俠》）"
1600403-83 = "（菲娜心滿意足地回去了）"

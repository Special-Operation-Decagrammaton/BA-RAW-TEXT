10024050-63 = "3;코코나;03;네! 어떤 학생분에게, 현무상회의 식재료 박스를 학원 밖의 아는 사람에게 전달해 달라고 부탁받은 적이 있어요!\n#3;em;[반짝]\n#3;closeup"

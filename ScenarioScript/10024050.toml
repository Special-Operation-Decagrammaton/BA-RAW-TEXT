[translation]
10024050-1 = "ตอนที่ 5;ยิงปืนนัดเดียวได้นกสองตัว"
10024050-2 = "ภายในสวนต้นบ๊วย"
10024050-4 = "72 คะแนน 53 คะแนน 81 คะแนน 48 คะแนน..."
10024050-5 = "ฮู่ว... วันนี้นับคะแนนแค่นี้ก่อน! ยืดเส้นยืดสายสักหน่อยดีกว่า..."
10024050-6 = "ฮึ่ม... ทำไมพวกเด็กๆ ถึงขี้เกียจเรียนหนังสือกันขนาดนี้นะ?"
10024050-7 = "ไม่ได้ออกข้อสอบยากขนาดนั้นสักหน่อย ทำไมถึงมีนักเรียนต้องเรียนเสริมตลอดเลย"
10024050-8 = "พี่ชุนต้องมาจุ้นแล้วบอกว่าไม่ให้ออกข้อสอบยากอีกแน่เลย..."
10024050-15 = "ว่ายังไงจ๊ะผู้ฝึกสอน ไม่ได้เจอกันที่สวนต้นบ๊วยนานเลยเนอะ"
10024050-16 = "ท่านประธานรูมิ? สวัสดีค่ะ!"
10024050-17 = "เรียกว่าผู้ฝึกสอนเลยเหรอคะ! ฉันมีชื่อเพราะๆ ว่าโคโคน่านะคะ!"
10024050-18 = "จ้าๆ โคโคน่าจัง สบายดีไหม? เป็นผู้ฝึกสอนเหนื่อยหรือเปล่าน่ะ?"
10024050-25 = "(ถูกเรียกว่าโคโคน่าจังแล้วรู้สึกเหมือนเป็นเด็กน้อยเลย แอบเสียดายนิดหน่อยแต่ก็นะ...)"
10024050-26 = "(ฉันเป็นผู้หญิงที่สง่าผ่าเผย! เรื่องแค่นี้ฉันมองข้ามได้สบายมากค่ะ!)"
10024050-29 = "ไม่หวั่นเลยค่ะ ฉันก็เป็นผู้ฝึกสอนคนหนึ่งเหมือนกันนะคะ!"
10024050-30 = "เหนื่อยแย่เลยนะ โคโคน่าจัง มีอะไรที่ฉันพอจะช่วยได้บ้างไหม?"
10024050-31 = "เห็นยุ่งๆ อยู่ ไม่รู้ว่าพวกเรามารบกวนหรือเปล่านะคะ ผู้ฝึกสอนโคโคน่า"
10024050-32 = "ระ... รบกวนอะไรกันคะ! เชิญเลยค่ะ!"
10024050-33 = "ว่าแต่... คนของย่านการค้าเทพเต่าดำและมังกรดำอยู่ด้วยกันเหรอเนี่ย บรรยากาศแบบนี้หาดูยากนะคะ?"
10024050-34 = "เรื่องมันยาวอยู่น่ะ..."
10024050-36 = "ใช่ พูดได้ดีเลยนี่ ใครเขาจะเล่นกับพี่ๆ นิสัยไม่ดีพวกนั้นกัน พวกดูดีแค่ภายนอกและไม่รู้จักคุณค่าของ#nขนบธรรมเนียม พวกขี้โกหกชอบวางแผนลับหลังคนอื่นแบบนั้นน่ะ"
10024050-37 = "ใช่แล้วค่ะ ใครเขาจะสนิทกับพวกนิสัยไม่ดีแบบนั้นกันคะ พวกชอบกดขี่คนอื่น ชีวิตวนอยู่กับที่#nแล้วก็ไม่รู้จักพัฒนาตัวเอง"
10024050-43 = "...พูดพอแล้วยังน่ะย่านการค้าเทพเต่าดำ? ระวังคำพูดเอาไว้ซะบ้าง อย่างน้อยฉันก็มีคุณค่าอยู่นะ"
10024050-44 = "มังกรดำนั่นแหละค่ะที่ควรระวังคำพูด ที่นี่ไม่ใช่พื้นที่ของพวกคุณนะคะ"
10024050-46 = "อ่า แหะๆๆ..."
10024050-47 = "[s] \"เอาละๆ ทั้งสองคนพอได้แล้ว เราอยู่ต่อหน้าโคโคน่าจังนะ\""
10024050-48 = "ชิ..."
10024050-49 = "ฮึ่ม..."
10024050-51 = "ขอบคุณนะคุณครู ไกล่เกลี่ยได้ดีมากเลย"
10024050-52 = "เรามีเหตุผลที่มาที่นี่นะ โคโคน่าจัง..."
10024050-58 = "[ns] \"เคยขนส่งของออกนอกซานไห่จิงโดยไม่รู้ว่าข้างในเป็นอะไรไหม?\""
10024050-59 = "ส่งของออกนอกซานไห่จิงโดยไม่รู้ว่าข้างในกล่องเป็นอะไรเหรอคะ? เรื่องนั้น..."
10024050-60 = "อ้อ! จะว่าไปแล้ว...!"
10024050-61 = "ท่าทางจะมีของน่าสงสัยนะ?"
10024050-63 = "ค่ะ! มีนักเรียนคนหนึ่งเคยฝากส่งกล่องวัตถุดิบของย่านการค้าเทพเต่าดำให้คนรู้จักนอกโรงเรียนค่ะ!"
10024050-64 = "กล่องวัตถุดิบของย่านการค้าเทพเต่าดำที่ว่า คืออันนี้เองสินะ..."
10024050-65 = "อย่าเพิ่งด่วนสรุปค่ะ พอจะจำลักษณะของนักเรียนคนนั้นได้ไหมคะ?"
10024050-67 = "จำไม่ได้เลยค่ะ... จำได้แค่ใส่หน้ากากเอาไว้ เหมือนคนไม่สบายเลยน่ะค่ะ"
10024050-68 = "ปกปิดรูปลักษณ์อย่างนั้นสินะ... ดีละ ทีนี้ย่านการค้าเทพเต่าดำก็จะยิ่งถูกสงสัยเข้าไปอีก"
10024050-69 = "เอาหลักฐานอะไรมาฟันธงแบบนั้นกันคะ"
10024050-70 = "ก็ย่านการค้าเทพเต่าดำน่ะ ถ้าเพื่อวัตถุดิบอาหารแล้ว ไม่ว่าอะไรก็ยอมทำทั้งนั้นเลยไม่ใช่หรือไง ใช่ไหมล่ะ?"
10024050-71 = "ก็ไม่ปฏิเสธหรอกนะว่ามันเป็นแบบนั้น..."
10024050-73 = "ถ้ามีคนจากองค์กรกระจายสินค้าทำผิดกฎหมายจนต้องปกปิดหน้าตาตัวเอง คงมีคนติดต่อเข้ามาบอกฉัน#nแล้วละค่ะ"
10024050-74 = "โฮะ... น่าสนใจดีนะ ไม่ติดต่อมาบอกประธานรูมิซะด้วย?"
10024050-75 = "ก็นะ... งานของ 'ทางด้านนั้น' ฉันฝากเอาไว้ให้เรย์โจวเป็นคนจัดการเยอะอยู่พอสมควรเลยละ..."
10024050-76 = "จนถึงตอนนี้เรย์โจวก็ยังไม่เคยทำให้ฉันผิดหวังเลยด้วย เรื่องนั้นฉันรับรองได้"
10024050-78 = "อ๊ะ! แล้วก็ยังมีภารกิจแปลกๆ อยู่นิดหน่อยถูกส่งมาให้นักเรียนสวนต้นบ๊วยด้วยค่ะ"
10024050-80 = "ให้นักเรียนงั้นเหรอ?!"
10024050-82 = "หมายถึงให้เด็กๆ... เหรอคะ?"
10024050-83 = "ช่วยเล่ามาให้ละเอียดๆ หน่อยได้ไหมน่ะ...?"
10024050-84 = "อืม... บางครั้งสวนต้นบ๊วยจะมีภารกิจให้เด็กๆ ส่งของน้ำหนักเบาเพื่อฝึกปฏิบัติตามคำสั่งค่ะ"
10024050-85 = "แต่เมื่อไม่นานมานี้... มีบางภารกิจที่ให้เด็กๆ ส่งของให้คนนอกสถาบันค่ะ"
10024050-86 = "แล้วได้รับทำภารกิจนั้นหรือเปล่าคะ ผู้ฝึกสอนโคโคน่า"
10024050-87 = "คะ? ค่ะ... พอดีทางนั้นแจ้งว่าไม่ใช่เรื่องอันตรายแน่นอน และพวกเขาจะปกป้องเด็กๆ ให้เอง..."
10024050-88 = "ฉันเคยไปกับเด็กๆ อยู่ครั้งหนึ่งด้วยนะคะ ตอนนั้นไม่มีปัญหาใหญ่อะไรด้วยค่ะ"
10024050-90 = "คนในคิโวทอสที่กล้าแตะต้องเด็กๆ ของซานไห่จิง มันจะมีสักกี่กลุ่มกันล่ะคะ?"
10024050-95 = "ถูกหลอกใช้แล้วสินะ..."
10024050-96 = "คะ? หมายความว่ายังไงคะ?"
10024050-97 = "ไม่หรอกค่ะ ไม่มีอะไรค่ะผู้ฝึกสอนโคโคน่า พวกเรารบกวนแค่นี้แหละค่ะ ใช่ไหมคะคุณครู?"
10024050-98 = "[s] \"อ้อ... อื้ม ใช่ ใช่เลย! ขอบใจนะ โคโคน่าจัง!\""
10024050-104 = "คะ... คะ? ขอบใจเรื่องอะไรคะ? อ้าว จะไปไหนกันล่ะ? เดี๋ยวก่อนสิคะ"
10024050-110 = "ถนนซานไห่จิง"
10024050-112 = "รับมือได้ดีเลยนะเรย์โจว เรื่องพวกนี้เราไม่ควรพูดต่อหน้าเด็กๆ หรอกนะ"
10024050-113 = "คนนั้นอาจเป็นคนที่ไม่กล้าเปิดเผยหน้าตาต่อหน้าเด็กๆ ก็ได้นะคะหัวหน้าคณะกรรมการมินะ"
10024050-114 = "ไม่คิดเลยว่าจะหลอกใช้ความมีน้ำใจของเด็กๆ ที่ไม่รู้เรื่องราวแบบนี้ได้..."
10024050-120 = "ทำแบบนี้มันไม่สมควรได้รับการให้อภัยเลยด้วยซ้ำ ไม่ว่าจะแก้ตัวยังไงก็ตามแต่!"
10024050-121 = "ฉันจะจับพวกมันมาจัดการให้สิ้นซาก! ต่อให้ต้องใช้อำนาจทั้งหมดของมังกรดำก็ตาม!"
10024050-126 = "[ns] \"ใจเย็นๆ ก่อนนะ\""
10024050-127 = "คุณครูปล่อยเรื่องแบบนี้ไปได้งั้นเหรอ?"
10024050-129 = "ประเด็นมันอยู่ที่ความเป็นไปได้มากกว่า"
10024050-130 = "ฉันไม่รู้หรอกนะว่าเธอมีสิทธิ์ใช้อำนาจทั้งหมดของมังกรดำหรือเปล่า"
10024050-131 = "แต่เท่าที่รู้มา คิซากิเองก็ยังทำถึงขั้นนั้นไม่ได้เลยนะ"
10024050-132 = "คนอย่างเธอจะไปรู้เรื่องอะไรของท่านประมุขกันล่ะ?"
10024050-133 = "เอาเป็นว่า เราเป็นคนรู้จักที่พอรู้เรื่องกันและกันดีกว่า"
10024050-134 = "ว่าไงนะ...?"
10024050-135 = "[s] \"แค่จับคนร้ายแต่ไม่หาสาเหตุมันก็ไม่มีความหมายอะไรหรอกนะ\""
10024050-137 = "พูดได้เหมาะสมมากค่ะ คุณครู"
10024050-138 = "การตัดหางปล่อยวัดองค์กรระดับล่างเพื่อปัดความรับผิดชอบก็เป็นเหตุการณ์ที่เห็นได้บ่อยๆ"
10024050-139 = "ตอนดูแลองค์กรย่านการค้าเทพเต่าดำ... ก็มีเหตุการณ์ทำนองนี้เป็นครั้งคราวค่ะ"
10024050-140 = "ให้อิสระแก่องค์กรระดับล่างมากเกินไป มันก็จะเป็นแบบนั้นแหละ"
10024050-141 = "เราต้องเคร่งครัดเรื่องการบริหารองค์กร ต้องปฏิบัติตามกฎโดยไม่มีข้อยกเว้น"
10024050-142 = "แต่วิธีนั้นจะทำให้ผลลัพธ์ที่ออกมามันไม่มีประสิทธิภาพนะคะ"
10024050-143 = "ถ้าทุกอย่างต้องเคร่งครัด ก็ยากที่จะมีความยืดหยุ่นกับสถานการณ์ที่เปลี่ยนแปลงตลอดเวลาด้วย"
10024050-144 = "เพราะแบบนี้พวกเธอเลยถึงกับต้องมาสร้างความเดือดร้อนให้เด็กๆ ที่สวนต้นบ๊วยเลยล่ะสิ?"
10024050-145 = "ยังจะมัวสงสัยย่านการค้าเทพเต่าดำอยู่อีกเหรอเนี่ย เป็นคนหัวแข็งจริงๆ เลยนะคะ"
10024050-146 = "ฉันบอกไปแล้วนะคะ ว่าตอนนี้มันยังไม่มีอะไรที่ชัดเจน"
10024050-147 = "ใช่ แล้วก็เพราะว่ามันยังไม่ชัดเจนนี่ละ เราเลยต้องมาทำให้กระจ่างกันเสียก่อน"
10024050-148 = "พวกเราก็ไม่พอใจเหมือนกันนั่นละที่มันส่งผลกระทบมาถึงสวนต้นบ๊วยด้วย"
10024050-150 = "ถ้าเรื่องนี้มันเกี่ยวข้องกับย่านการค้าเทพเต่าดำทั้งหมดเลยละก็ เธอจะทำยังไงล่ะ?"
10024050-151 = "ฉันก็จะรับผิดชอบด้วยชื่อเสียงของตัวเอง พวกเธอจะปิดหรือยุบย่านการค้าก็เชิญเลย"
10024050-152 = "ท่านประธาน!"
10024050-154 = "ไม่ต้องห่วงไปหรอก ถ้ามันเป็นแบบนั้นขึ้นมาละก็ ฉันก็แค่ต้องเริ่มต้นใหม่อีกครั้ง"
10024050-155 = "อีกอย่างถ้าเราไม่ทำถึงขนาดนั้น ฉันว่าพวกเราก็คงไม่น่าจะโน้มน้าวมังกรดำได้ด้วย"
10024050-156 = "คุณครูมีความคิดอะไรดีๆ ไหม?"
10024050-162 = "[ns] \"มาวางกับดักกันดีกว่า\""
10024050-163 = "กับดักงั้นเหรอ?"

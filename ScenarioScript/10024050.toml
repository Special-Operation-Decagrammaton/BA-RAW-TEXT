[translation]
10024050-1 = "Episode 5;Once Taught, Thrice Learned"
10024050-2 = "Plum Blossom Garden"
10024050-4 = "72, 53, 81, 48..."
10024050-5 = "Phew, all done with grading! I could use a stretch..."
10024050-6 = "Gosh... I wish the kids would study more..."
10024050-7 = "I didn't even make the test that hard this time, but there are still kids who will need to do make-up work!"
10024050-8 = "I just know Shun is going to bother me again about the difficulty of the tests..."
10024050-15 = "Good day, little instructor. It's been a while."
10024050-16 = "President Rumi? Hi!"
10024050-17 = "But, uh, \"little\" instructor? I do have a name, you know!"
10024050-18 = "Ah, I'm sorry. Little Kokona, how have you been?"
10024050-25 = "(\"Little Kokona\" isn't any better...)"
10024050-26 = "(But I'm mature! I can let it go!)"
10024050-29 = "I've been good! Teaching the kids sure keeps me busy."
10024050-30 = "That's great, Kokona. Just great. Let us know if you need anything at all, okay?"
10024050-31 = "I hope we're not bothering you while you're busy, Instructor Kokona."
10024050-32 = "Oh, n-no. It's no bother! You're all welcome!"
10024050-33 = "It's, um... It's so unusual to see people from the Black Tortoise Promenade and Genryumon together."
10024050-34 = "So, about that..."
10024050-36 = "I'm glad you mentioned it! You stay clear of these bad girls. They spit on tradition, and they're always up to trouble."
10024050-37 = "I'd avoid these bullies, if you can. They close themselves off from the world, then pick on anyone who doesn't do the same."
10024050-43 = "...That's enough out of you. At least I have values."
10024050-44 = "Don't tell me what to do, Genryumon. This isn't your turf."
10024050-46 = "Ah-ha... Hahaha..."
10024050-47 = "[s] \"Poor Kokona. All this squabbling is giving her a panic attack.\""
10024050-48 = "Tsk."
10024050-49 = "Hmph."
10024050-51 = "Thanks, Sensei. Nice save."
10024050-52 = "So, we do actually have a reason for this visit, Kokona..."
10024050-58 = "[ns] \"Has anyone asked you to move any strange boxes lately?\""
10024050-59 = "Strange boxes? I don't think..."
10024050-60 = "Oh... Actually...!"
10024050-61 = "Got a hit, huh?"
10024050-63 = "Yes! A student did ask me to deliver a box of Black Tortoise Promenade ingredients to someone outside of the academy!"
10024050-64 = "...Of course it was from the Black Tortoise Promenade."
10024050-65 = "Stop jumping to conclusions! Instructor Kokona, what did this student look like?"
10024050-67 = "I didn't get a good look... I think she was sick, because she was wearing a mask."
10024050-68 = "So she hid her identity. An obvious Black Tortoise Promenade trick!"
10024050-69 = "Oh? And why's that?"
10024050-70 = "The Black Tortoise Promenade will do anything to get their hands on ingredients, right?"
10024050-71 = "Well... I can't deny that..."
10024050-73 = "But if one of our members was doing something so illegal that she had to hide her face, I'd have heard about it."
10024050-74 = "Now that's interesting. Not Rumi, but you?"
10024050-75 = "Well... Reijo does take care of a good amount of our \"on the ground\" work, let's say."
10024050-76 = "She hasn't missed anything yet. I can vouch for her."
10024050-78 = "Oh! And the students of the Plum Blossom Garden have been asked to do some weird errands lately."
10024050-80 = "The students?!"
10024050-82 = "You mean...the kids?!"
10024050-83 = "Please explain."
10024050-84 = "Um... So, we often have the kids do little deliveries and other errands for other students. It's good real-world training."
10024050-85 = "But lately...we've been getting requests to deliver things to people on the outside."
10024050-86 = "You didn't accept these requests, did you?"
10024050-87 = "Uh? Yeah... It didn't sound dangerous, and the students asking for help said they'd keep our kids safe."
10024050-88 = "I went with them once, too, just to be sure. Everything seemed okay."
10024050-90 = "Anyway... Who in Kivotos would dare mess with the students of the Plum Blossom Garden?"
10024050-95 = "...Despicable."
10024050-96 = "Hmm? Did you say something?"
10024050-97 = "Don't worry about it. Thanks for your time today, Instructor Kokona. Sensei?"
10024050-98 = "[s] \"Ah, right. Thank you for your time!\""
10024050-104 = "H-Huh? What? You're leaving already?"
10024050-110 = "Shanhaijing Streets"
10024050-112 = "Good thinking, Reijo. This isn't something we want to talk about in front of the kids."
10024050-113 = "...I just wanted to protect them from the look on Officer Mina's face."
10024050-114 = "Using innocent kids like that..."
10024050-120 = "Do they have no shame?!"
10024050-121 = "I will find them! And I will crush them! With all the might of Genryumon if I have to!"
10024050-126 = "[ns] \"Why don't you take some deep breaths?\""
10024050-127 = "You expect me to just let this go, Sensei?"
10024050-129 = "None of us are suggesting that, but let's think for a moment."
10024050-130 = "It would be nice if we could gather up all of Genryumon's might, as you put it."
10024050-131 = "But as far as I know, even Kisaki can't do that."
10024050-132 = "What do you know about the president?"
10024050-133 = "Let's just say she and I know just as much about each other as we should."
10024050-134 = "What does that mean...?"
10024050-135 = "[s] \"Whatever we do next, we should make sure we catch the ones who are actually responsible.\""
10024050-137 = "Good point, Sensei."
10024050-138 = "It's pretty common for lower-ranked members to get all the blame and responsibility in big organizations."
10024050-139 = "I've even seen it happen at the Black Tortoise Promenade."
10024050-140 = "That's because you give your underlings too much freedom."
10024050-141 = "There must be strict rules that every member of the group follows. No exceptions."
10024050-142 = "Yeah, rules so strict you can't adapt to the times."
10024050-143 = "When life throws us curve balls, our members have enough flexibility to react."
10024050-144 = "And what do you call tricking those poor kids at the Plum Blossom Garden? Being flexible?"
10024050-145 = "Get it through your thick skull! We had nothing to do with any of this!"
10024050-146 = "And you still don't have any concrete evidence, anyway."
10024050-147 = "That's why we should be working together. To gather evidence and find the real culprit."
10024050-148 = "We're as angry as you are about the Plum Blossom Garden being dragged into this, you know."
10024050-150 = "And what will you do when I prove that the Black Tortoise Promenade was behind this, after all?"
10024050-151 = "I'll take personal responsibility. Close the Promenade, scatter our members, whatever you want."
10024050-152 = "President!"
10024050-154 = "Don't worry. Even if we lose everything, we can always start again."
10024050-155 = "Besides, I don't think Genryumon will be moved by anything less than absolute conviction."
10024050-156 = "So, Sensei, what's our next move?"
10024050-162 = "[ns] \"It's time for us to set a trap.\""
10024050-163 = "A trap?"

10024050-42 = "#all;hide"
10024050-43 = "3;미나;14;……말 다 했나, 현무상회? 조심하라고. 나는 적어도 내 것은 되찾는 인간이야.\n#3;em;[빠직]\n#3;closeup"
10024050-44 = "3;레이죠;09;현룡문이야말로 말을 삼가시죠. 이곳은 당신들의 구역이 아닙니다.\n#3;em;[빠직]\n#3;closeup"

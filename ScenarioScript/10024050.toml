[translation]
10024050-1 = "第5話;舉一反三：一隅三反"
10024050-2 = "梅花園．內部"
10024050-4 = "72分、53分、81分、48分……"
10024050-5 = "呼，今天的分數都打完了！#n呼哇～……"
10024050-6 = "嗯～孩子們為什麼都這麼討厭唸書呢？"
10024050-7 = "明明題目都不是很難，卻總是有孩子需要補課……"
10024050-8 = "又要被旬姐姐念說難題太多了……"
10024050-15 = "你好呀，教官醬。#n好久沒在梅花園見面了呢。"
10024050-16 = "啊，瑠美會長，你好呀！"
10024050-17 = "話說，請不要叫我教官醬！#n我有心菜這個正常的名字！"
10024050-18 = "哈哈，抱歉抱歉。心菜醬太可愛了，不小心就……#n最近過得還好嗎？教官的工作做得如何？"
10024050-25 = "（雖然叫我心菜醬還是有種被當成小孩子的感覺……）"
10024050-26 = "（不過出色的淑女是不會一一計較這種事的！）"
10024050-29 = "過得很好唷！畢竟我是一名優秀的教官！"
10024050-30 = "好久不見，心菜教官。#n最近有什麼困擾嗎？"
10024050-31 = "突然來訪不知道有沒有造成你的困擾，心菜教官。"
10024050-32 = "怎，怎麼會打擾呢，太客氣了！#n歡迎來到梅花園！"
10024050-33 = "話說……玄龍門跟玄武商會的人一起來訪，還真是稀奇呢？"
10024050-34 = "因為發生了一些事情……"
10024050-36 = "雖然這並非我的本意……請聽我說，心菜教官。不可以和那些壞姐姐們玩哦。#n那些姐姐不懂何謂傳統，總是偷偷摸摸地好像在打什麼壞主意一樣。"
10024050-37 = "跟這種壞心眼的人們打交道並不是什麼好事哦。#n畢竟是群不願意接受新的文化，只會躲在殼裡面故步自封的人啊。"
10024050-43 = "……很會耍嘴皮嘛。勸你說話注意一點比較好哦？#n還是說，我看起來像是不會回嘴的人？"
10024050-44 = "你才該在說話前多動動腦袋。"
10024050-46 = "啊，啊哈哈……"
10024050-47 = "[s]「兩位，這可是在心菜醬面前哦。」"
10024050-48 = "呿……"
10024050-49 = "哼。"
10024050-51 = "謝謝你，幸好有老師在。"
10024050-52 = "話說，心菜醬。#n我們之所以會來這裡是因為……"
10024050-58 = "[ns]「最近有沒有內容物不明的東西寄放在這裡？」"
10024050-59 = "內容物不明的東西，是嗎……？#n我想想……"
10024050-60 = "啊！這麼說來……！"
10024050-61 = "你有什麼頭緒嗎？"
10024050-63 = "是！之前有人委託我把裝在玄武商會箱子裡的食材「轉交給在山海經外等著的人」！"
10024050-64 = "果然是玄武商會搞的鬼……"
10024050-65 = "這樣就下定論還太早了。#n心菜教官，還記得委託你的那位學生的長相跟穿著嗎？"
10024050-67 = "不……他可能是因為身體不舒服，所以戴著口罩……"
10024050-68 = "還隱藏了自己的臉嗎。#n玄武商會的嫌疑越來越重了。"
10024050-69 = "你是以什麼為根據斷定是我們做的呢？"
10024050-70 = "玄武商會為了食材什麼事都做得出來。#n難道不是嗎？"
10024050-71 = "這倒是無法否定……"
10024050-73 = "不過就算是下層組織，只要有人染指違法的手段，#n我就會率先收到連絡才對。"
10024050-74 = "哦？不是瑠美會長嗎？"
10024050-75 = "這個嘛……畢竟「那方面」的工作都已經交給令女了……"
10024050-76 = "令女的眼睛值得信賴。#n這點我可以保證。"
10024050-78 = "啊！還有……梅花園的孩子們好像也被委託了類似的「差事」。"
10024050-80 = "孩子們！？"
10024050-82 = "委託……孩子們嗎！？"
10024050-83 = "……可以說明得詳細一點嗎？"
10024050-84 = "唔嗯……那個，在梅花園的孩子們，#n會接受一些跑腿的委託作為處理事情的練習。"
10024050-85 = "平時大多是附近居民的委託……#n不過最近出現了一些將貨品送往山海經外的委託。"
10024050-86 = "於是就接受了嗎？"
10024050-87 = "咦……？是，確實接受了。#n因為對方說並不是危險的東西，而且就算發生什麼事也會保護孩子們……"
10024050-88 = "雖然我也只跟著去過一次，並沒有什麼特別的問題。"
10024050-90 = "再說，奇普托斯真的會有膽敢對山海經的孩子們動手的人嗎？"
10024050-95 = "……看來猜對了呢。"
10024050-96 = "那個，猜對什麼了呢……？"
10024050-97 = "不，沒什麼，心菜教官。#n我們差不多該離開了。"
10024050-98 = "[s]「謝謝你，心菜醬！」"
10024050-104 = "呃，咦？#n辛苦了……？"
10024050-110 = "山海經的街道"
10024050-112 = "你判斷的很好，令女。#n有些話不該在心菜醬面前說。"
10024050-113 = "……不能讓孩子們察覺。#n對吧，美奈執行部長。"
10024050-114 = "竟敢利用毫不知情的孩子們的善意……"
10024050-120 = "世界上可是有著絕對不可跨越的一線啊！"
10024050-121 = "我要立刻找出犯人，將其繩之以法！#n哪怕要動用玄龍門所有的力量也在所不惜！"
10024050-126 = "[ns]「先冷靜下來，美奈。」"
10024050-127 = "都聽到這種事了，老師還能默不作聲嗎？"
10024050-129 = "老師的意思是就算急急忙忙的也無濟於事吧。"
10024050-130 = "要是你真的有動員整個玄龍門的權限，那就另當別論。"
10024050-131 = "不過據我所知，就算是妃姬也很難辦到吧。"
10024050-132 = "……說的好像你很了解一樣啊？"
10024050-133 = "這個嘛，我們對彼此的事情都無所不知吧？"
10024050-134 = "什麼……？"
10024050-135 = "[s]「只逮捕現行犯是沒有意義的。」"
10024050-137 = "老師說的對。"
10024050-138 = "推卸全部責任，試圖斷尾求生的組織數不勝數。"
10024050-139 = "在玄武商會處理的事件中……#n也時常會看見切割下屬以規避責任的人。"
10024050-140 = "一旦交由個人來裁量，就勢必會發生這種事吧？"
10024050-141 = "要管理組織就必須要有嚴格的規則。#n不得出現任何例外。"
10024050-142 = "這必須強制使用缺乏效率的方法才得以成立。"
10024050-143 = "在現場可是得要面對瞬息萬變的狀況的啊。"
10024050-144 = "……所以才害得梅花園的孩子們成為了犯罪的幫兇嗎？"
10024050-145 = "居然還在懷疑玄武商會，真是死腦筋……"
10024050-146 = "我已經說過好幾次了，目前還沒有證據證明是我們做的。"
10024050-147 = "令女說的沒錯。#n正因如此，我們才會一起調查。"
10024050-148 = "竟然連梅花園都牽扯了進來，我們也非常生氣。"
10024050-150 = "如果這一切都跟玄武商會有關的話，你打算怎麼做？"
10024050-151 = "我會負起責任。#n不管是要停止商會活動還是要解散商會，我都悉聽尊便。"
10024050-152 = "會長！"
10024050-154 = "別擔心，令女。#n就算真的變成那樣，也只要從頭開始就好。"
10024050-155 = "要是不展現解散的覺悟的話，只會一直被懷疑而無法推進調查。"
10024050-156 = "那麼老師，你有什麼作戰嗎？"
10024050-162 = "[ns]「來設個圈套吧。」"
10024050-163 = "圈套……？"

10024050-28 = "#wait;500"
10024050-29 = "3;코코나;03;끄떡없어요! 저도 한 명의 교관이니까요!\n#3;greeting\n#3;em;[반짝]"
10024050-30 = "3;코코나;02\n1;미나;02;수고가 많군. 코코나 쨩. 뭐 필요한 거 없는가?\n#1;ar"
10024050-31 = "5;레이죠;02;바쁜데 실례하는 것은 아닌지 모르겠습니다. 코코나 교관.\n#5;al\n#5;em;[반응]"
10024050-32 = "3;코코나;03;시, 실례라뇨. 천만에요! 어서 오세요!\n#3;greeting"
10024050-33 = "3;코코나;02;그런데…… 현무상회분들과 현룡문분이 함께 계시다니, 드문 일이네요?\n#3;em;[?]"
10024050-34 = "5;레이죠;99;여기에는 그럴 만한 사정이……"
10024050-35 = "#all;hide"
10024050-36 = "3;미나;03;그래. 잘 말해 주었다. 저런 나쁜 언니들이랑 놀면 안 된단다. 전통의 가치도 모른 채 겉멋만 들어서, 허구한 날 뒤로 무언가를 꾸미는 언니들이랑은.\n#3;closeup"
10024050-37 = "3;레이죠;13;그렇습니다. 저런 심보 고약한 사람들과 어울려서는 안 됩니다. 한 장소에 갇혀 발전할 줄도 모르고 남을 억압하기만 하는 사람들과는 말이죠.\n#3;closeup"

10024050-17 = "3;코코나;05;그보다 교관 쨩이라뇨! 제게는 코코나라는 어엿한 이름이 있다구요!\n#3;hophop"
10024050-18 = "3;루미;00;그래, 그래. 코코나 쨩. 잘 지냈어? 교관 일은 힘들지 않고?\n#3;em;[재잘]"

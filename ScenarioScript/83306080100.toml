[translation]
83306080100-6 = "風華前輩在供給部準備平時供餐的期間……"
83306080100-7 = "我牛牧茱莉！為了萬魔殿的各位特別準備了外燴！"
83306080100-8 = "竟然跑來這種地方提供餐點，你還真是辛苦。"
83306080100-9 = "我希望能為因議事堂倒塌，陷入沮喪的各位萬魔殿成員，提供能恢復精神的餐點！"
83306080100-10 = "就算發生傷心的事也一定要好好吃東西！#n這樣就能稍微放鬆心情，變得更幸福！"
83306080100-11 = "（看真琴那個樣子，感覺也不像有多沮喪……）"
83306080100-12 = "那麼就先把鋁箔紙包覆的食材……放進桶子裡……"
83306080100-18 = "嗯……？"
83306080100-20 = "嗯？怎麼了？茱莉。"
83306080100-31 = "剛剛放進桶子的，是為了萬魔殿的各位準備的點心……"
83306080100-35 = "好，好像突然開始動起來了……！怎，怎麼會！？"
83306080100-37 = "（萬魔殿議事堂前方，是溫泉開發部特別想挖掘的地方……）"
83306080100-38 = "（也就是說……難道又是溫泉……？）"
83306080100-44 = "嗚，嗚哇啊啊啊！？各位請小心～！"

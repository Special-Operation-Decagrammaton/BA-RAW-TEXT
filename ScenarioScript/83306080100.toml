[translation]
83306080100-6 = "ตอนนี้รุ่นพี่ฟูกะกำลังเตรียมอาหารให้นักเรียนเกเฮนน่าอยู่ในชมรมโภชนาการ..."
83306080100-7 = "ฉัน อุชิมากิ จูริ! ก็เลยมาเสิร์ฟอาหารให้แพนเดโมเนียม โซไซตี้ทุกคนเป็นกรณีพิเศษเลยค่ะ!"
83306080100-8 = "มาเสิร์ฟอาหารให้ถึงที่แบบนี้เลยเหรอ ชมรมโภชนาการก็ทำงานกันหนักไม่เบาเลยนะ"
83306080100-9 = "ฉันอยากเสิร์ฟอาหารให้ทุกคนกินแล้วมีกำลังใจขึ้นมาอีกครั้งค่ะ! ถึงหอประชุมจะพังไปก็ไม่ต้องเศร้า#nนานนะคะ แพนเดโมเนียม โซไซตี้ทุกคน!"
83306080100-10 = "ถึงแม้จะมีเรื่องเศร้า แต่ยังไงเราก็ต้องกินข้าวให้อิ่มท้องค่ะ! เราจะได้อารมณ์ดีขึ้นและมีความสุขมากขึ้น#nยังไงล่ะคะ!"
83306080100-11 = "(แต่มาโคโตะไม่ได้ดูเศร้าขนาดนั้นนะ...)"
83306080100-12 = "ฉันก็เลยเอากระดาษฟอยล์ห่อวัตถุดิบ... แล้วเอาใส่ถังที่เตรียมไว้..."
83306080100-18 = "เอ๋...?"
83306080100-20 = "หืม? มีอะไรเหรอ? จูริ?"
83306080100-31 = "คือว่า... สิ่งที่ฉันใส่ไปในถังเมื่อกี้... คือของหวานที่ฉันเตรียมไว้ให้แพนเดโมเนียม โซไซตี้ทุกคน...!"
83306080100-35 = "ตะ... แต่อยู่ดีๆ เหมือนมันจะขยับได้เลยค่ะ...! ทะ... ทำไมล่ะ?!"
83306080100-37 = "(หน้าหอประชุมแพนเดโมเนียม โซไซตี้... ที่นี่เป็นที่ที่ชมรมพัฒนาออนเซ็นต้องการสร้างบ่อออนเซ็น#nเป็นพิเศษนี่นา...)"
83306080100-38 = "(ถ้างั้นก็แปลว่า... บ่อออนเซ็น...?)"
83306080100-44 = "วะ... ว้ายยยยย!?! ทุกคน~! ระ... ระวังด้วยค่ะ~!"

[translation]
83306080100-6 = "While Fuuka prepares the regular School Lunch Club menu for Gehenna students..."
83306080100-7 = "I, Ushimaki Juri, will cook a special field lunch for the Pandemonium Society!"
83306080100-8 = "You have a difficult task, trekking all the way out here to prepare meals."
83306080100-9 = "I just want to cheer up the Pandemonium Society a bit... They've been so down since the assembly hall collapsed. Maybe my food can help them."
83306080100-10 = "Even when we're sad, it's important to eat! Nurturing your body is the first step to nurturing your heart!"
83306080100-11 = "(From the expression on Makoto's face, their spirits don't seem very low to me...)"
83306080100-12 = "First I'll cover the ingredients in foil...and place them in this drum barrel..."
83306080100-18 = "...Huh?"
83306080100-20 = "Hm? Juri? Is something wrong?"
83306080100-31 = "I'm just preparing a dessert for the Pandemonium Society...!"
83306080100-35 = "B-But it just started moving...! Wh-Why?!"
83306080100-37 = "(We're outside the ruins of the Pandemonium Society's Assembly Hall...where the Hot Springs Department was excavating...)"
83306080100-38 = "(Has the water... Could it be the hot spring again?)"
83306080100-44 = "Wh-Waaaaaah?! Everyone— W-Watch out!"

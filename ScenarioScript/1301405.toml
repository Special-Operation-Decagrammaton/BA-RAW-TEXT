[translation]
1301405-1 = "ชุดว่ายน้ำกับกองไฟ"
1301405-3 = "(คุณครูไปที่ชายหาดที่เรนเกะรออยู่ตามเวลานัด)"
1301405-8 = "โอ๊ะ ท่านอาจารย์ เข้ามาสิ"
1301405-9 = "งั้นมาเริ่มจุดกองไฟกันเถอะ"
1301405-13 = "หืม? ไม่เห็นมีฟืนเลยงั้นเหรอ?"
1301405-14 = "ก็ต้องอย่างนั้นละ นี่คือการฝึกฝนนี่นา การก่อกองไฟต้องเริ่มตั้งแต่การสุมฟืนนี่ละ"
1301405-18 = "เอาละ ไปเอาฟืนตรงนั้นมาวางซ้อนๆ กัน!"
1301405-19 = "[s] \"อะ... อื้อ! ต้องได้เหงื่อสินะ ถึงจะเป็นวัยรุ่น!\""
1301405-20 = "โอ้ สมแล้วที่เป็นท่านอาจารย์! ความรู้แน่นเลยนะเนี่ย?"
1301405-21 = "ฉันว่าจะวางฟืนให้ออกมาในรูปทรงพิเศษๆ หน่อย"
1301405-22 = "มันจะได้อยู่ในความทรงจำไปนานๆ ยังไงล่ะ"
1301405-23 = "[s] \"มีรูปทรงพิเศษ... ที่คิดไว้แล้วเหรอ?\""
1301405-24 = "มีสิ ฉันถึงกับเอาพิมพ์เขียวมาเลยนะ"
1301405-25 = "เอาละ มาเริ่มกันเลย! เพื่อวัยรุ่นของพวกเรา!"
1301405-26 = "[s] \"พะ... เพื่อวัยรุ่นของพวกเรา...!\""
1301405-32 = "(แล้วคุณครูกับเรนเกะที่กระตือรือร้นเป็นพิเศษก็ช่วยกันวางฟืนเพื่อก่อกองไฟ)"
1301405-34 = "(ครู่ต่อมา...)"
1301405-38 = "เยี่ยมเลย... ได้เป็นตัวมังกรแล้ว!"
1301405-43 = "แต่มันออกมากองใหญ่กว่าที่คิดไว้เยอะเลยนะเนี่ย"
1301405-44 = "ฮุฮุ อาจเป็นเพราะอยู่กับท่านอาจารย์ ฉันก็เลยออกแรงทำได้มากขึ้นโดยไม่รู้ตัวเลยละ..."
1301405-45 = "[s] \"แต่ถ้าจะจุดไฟ... ก็น่าเสียดายแย่นะ?\""
1301405-46 = "ไม่หรอก กองไฟที่ไม่มีไฟมันจะไปมีความหมายอะไรล่ะ"
1301405-47 = "การดูไฟลุกโชนก็น่าสนุกนะ"
1301405-48 = "[s] \"แต่แท่งจุดไฟมันเหมือนจะเยอะเกินไปเลย...\""
1301405-50 = "[ns] \"แต่ก็คงไม่เป็นไรหรอกเนอะ...\""
1301405-51 = "งั้นเรามาจุดไฟด้วยกันเลยนะ?"
1301405-57 = "หนึ่ง สอง สาม...!"
1301405-63 = "[log](พวกเราไม่รู้เลย จนกระทั่งถึงตอนนั้น...)[/log]"
1301405-67 = "[log](ว่ามังกรพ่นไฟ หรือชื่ออะไรก็แล้วแต่)[/log]"
1301405-68 = "[log](จะพ่นไฟออกมาได้มากมายขนาดนั้น...)[/log]"
1301405-74 = "[ns] \"นะ... นี่อาจเป็นเรื่องใหญ่ก็ได้นะ...\""
1301405-75 = "ไฟกองใหญ่กว่าที่คิดไว้เยอะเลย?!"
1301405-82 = "อะ... อะไรกันเนี่ย?!"
1301405-83 = "อ๊ะ ร้อนจัง~! อันตรายแล้วละ!"
1301405-88 = "นี่มัน... เป็นเรื่องใหญ่เลยนะ"
1301405-89 = "[s] \"ไฟลุกท่วมใหญ่แล้ว...!\""
1301405-93 = "รีบดับไฟกันเถอะ!"
1301405-105 = "[ns] \"มันไม่ดับเลยสักนิด แต่กลับลุกโชนกว่าเดิมอีก!?\""
1301405-108 = "นะ... นี่สินะเปลวเพลิงมังกร... แต่ฉันก็ไม่ยอมแพ้ให้หรอก!"
1301405-112 = "เอาละ... มาสู้กัน!"
1301405-116 = "ฉันต้องดับไฟให้ได้เลย!"
1301405-132 = "(หลังจากนั้นคุณครูกับเรนเกะก็ช่วยกันดับไฟได้สำเร็จ...)"
1301405-136 = "(ช่างเป็นกองไฟที่ร้อนแรงกว่าที่คิดไว้มาก...)"
1301405-140 = "ฮู่วว ควบคุมไฟได้แล้วสินะ"
1301405-141 = "ใจร่วงไปที่ตาตุ่มเลย... ต่อไปฉันจะระวังให้มากกว่านี้นะ"
1301405-142 = "[s] \"ดับไฟได้แล้ว และได้บทเรียนวัยรุ่นแล้วด้วย...!\""
1301405-146 = "หืม? เดี๋ยวนะ ที่หน้าท่านอาจารย์..."
1301405-147 = "พรืด..."
1301405-148 = "ฮุ... ฮุฮุฮุฮุ...! เขม่าติดหน้าจนกลายเป็นแพนด้าไปแล้ว!"
1301405-149 = "มาทางนี้สิ ฉันจะปัดออกให้"
1301405-150 = "[s] \"ฝะ... ฝากด้วยนะ\""
1301405-156 = "หน้าดำหมดแล้ว..."
1301405-157 = "หลับตาสักเดี๋ยวนะ"
1301405-167 = "..."
1301405-168 = "(ฉันเคยดูใบหน้าของท่านอาจารย์ใกล้ๆ แบบนี้มาก่อนหรือเปล่านะ...?)"
1301405-169 = "(พออยู่ต่อหน้าท่านอาจารย์แล้ว...)"
1301405-170 = "(ระ... หรือว่านี่ก็คือวัยรุ่น?)"
1301405-171 = "[s] \"เรนเกะ? ทำไมถึงหยุดไปล่ะ?\""
1301405-175 = "มะ... ไม่มีอะไรทั้งนั้นแหละ! ฉันแค่คิดอะไรไปเรื่อยเปื่อยน่ะ..."
1301405-176 = "ช่างเถอะ ท่านอาจารย์หลับตาอีกรอบนะ! ฉันจะเช็ดรอบๆ ตาให้!"
1301405-178 = "(แล้วเรนเกะก็เช็ดคราบเขม่าบนหน้าของคุณครูให้อย่างเขินอาย)"
1301405-182 = "(นี่อาจเป็นช่วงเวลาของวัยรุ่น... จริงๆ ก็ได้)"

[translation]
1301405-1 = "Swimsuits and a Campfire"
1301405-3 = "When it was time, I headed out to the beach to meet Renge."
1301405-8 = "Hi there, Mentor!"
1301405-9 = "There's no time to waste! Let's get this campfire going."
1301405-13 = "Hm? You don't see any firewood?"
1301405-14 = "Were you expecting some? That would be way too easy for training. We need to collect and stack the firewood ourselves!"
1301405-18 = "All right! Let's start our stack over there!"
1301405-19 = "[s] \"Y-Yeah! Youth is pain and suffering!\""
1301405-20 = "That's what I'm talking about, Sensei!"
1301405-21 = "This is how I want to arrange the firewood for the campfire."
1301405-22 = "It's a bit unique, but I think that'll make it more memorable."
1301405-23 = "[s] \"Unique? How so?\""
1301405-24 = "Here, look! I drew a blueprint!"
1301405-25 = "Let us begin then! For our youth!"
1301405-26 = "[s] \"F-For our youth...!\""
1301405-32 = "Renge's enthusiasm was contagious, and I started eagerly preparing the campfire with her."
1301405-34 = "A lot of firewood later..."
1301405-38 = "Ta-da! Our dragon is complete!"
1301405-43 = "This is significantly bigger than the blueprint..."
1301405-44 = "I might've gotten a little swept up in the moment with you. Heehee."
1301405-45 = "[s] \"It feels like a bit of a shame to light this on fire...\""
1301405-46 = "I don't think so! If we don't light it, then we'll just have a \"camp\" with no \"fire!\""
1301405-47 = "This is nice, but sitting by a fire has its own charms."
1301405-48 = "[s] \"Okay...but that's an alarming pile of fire starters.\""
1301405-50 = "[ns] \"...Well, what's the worst that could happen?\""
1301405-51 = "Let's light it up together, okay?"
1301405-57 = "One. Two. Three...!"
1301405-63 = "[log]...It wasn't until that moment that we realized our mistake.[/log]"
1301405-67 = "[log]That to poke a raging dragon[/log]"
1301405-68 = "[log]would incite a hellfire flame...[/log]"
1301405-74 = "[ns] \"W-We might have a problem here.\""
1301405-75 = "This is NOT what I was expecting!!"
1301405-82 = "Wh-What in the world is that?"
1301405-83 = "Ow! Don't get close! Sparks are flying everywhere."
1301405-88 = "We...might have a problem here."
1301405-89 = "[s] \"The fire is way too strong!\""
1301405-93 = "I'll pour some water on it!"
1301405-105 = "[ns] \"It... It got bigger?!\""
1301405-108 = "A dragon's flame won't be tempered so easily! But neither will I!"
1301405-112 = "This is a battle!"
1301405-116 = "You will submit, fire!"
1301405-132 = "...Renge finally managed to put out the fire."
1301405-136 = "Neither of us had expected it to grow to that degree..."
1301405-140 = "Phew. It's finally out."
1301405-141 = "...Geez, I didn't think that would happen. I should've been more careful."
1301405-142 = "[s] \"No one was hurt in the end, so this can just be...a youth lesson!\""
1301405-146 = "Hold on. Mentor! Your face!"
1301405-147 = "...Pfft."
1301405-148 = "Ahahaha! You're covered in soot! You look like a panda."
1301405-149 = "Let me wipe it off for you."
1301405-150 = "[s] \"P-Please.\""
1301405-156 = "There's so much soot."
1301405-157 = "Please close your eyes for a second."
1301405-167 = "..."
1301405-168 = "(...I've never seen Mentor's face up close like this before.)"
1301405-169 = "(Mentor's right in front of me...)"
1301405-170 = "(Is this...a part of my youth?)"
1301405-171 = "[s] \"Renge? Did you get it all off?\""
1301405-175 = "Wh-What?! Yes! I definitely wasn't thinking anything weird!"
1301405-176 = "Close your eyes, Mentor! I haven't gotten it all off yet."
1301405-178 = "Renge seemed flustered as she got the rest of the soot off."
1301405-182 = "That exact moment...may have been the feeling of the \"youth\" she'd been chasing."

[translation]
1301405-1 = "泳裝與營火"
1301405-3 = "（準時來到了蓮華等候的海灘）"
1301405-8 = "哦，師父你來啦。"
1301405-9 = "那我們馬上開始營火晚會吧。"
1301405-13 = "咦？你說沒看到木柴？"
1301405-14 = "當然囉，因為這也是修煉的一部分。#n營火晚會就是從堆木柴開始的嘛。"
1301405-18 = "來，我們一起去那邊把木柴堆起來吧！"
1301405-19 = "[s]「嗯，嗯！流汗才是青春啊！」"
1301405-20 = "不愧是師父，果然很懂！"
1301405-21 = "這次呢，我想把木柴堆成特別的形狀。"
1301405-22 = "這樣才會更令人難忘。"
1301405-23 = "[s]「特別的形狀啊……你有什麼想法嗎？」"
1301405-24 = "當然有囉。我還畫了設計圖呢。"
1301405-25 = "那麼就開始吧！為了我們的青春！"
1301405-26 = "[s]「為，為了青春……！」"
1301405-32 = "（於是便跟著充滿幹勁的蓮華，努力堆起了營火的木柴）"
1301405-34 = "（過了一會……）"
1301405-38 = "嘿咻……龍完成了！"
1301405-43 = "比原本想像的還要大呢。"
1301405-44 = "呵呵，可能是因為師父也在的關係，不小心有點用力過猛了吧……"
1301405-45 = "[s]「這個……感覺點火有點可惜耶？」"
1301405-46 = "沒事沒事，營火少了火不就沒有意義了嗎？"
1301405-47 = "欣賞火焰才是營火的醍醐味啊。"
1301405-48 = "[s]「好像放了很多助燃劑……」"
1301405-50 = "[ns]「……算了，應該沒問題吧。」"
1301405-51 = "那就一起點火吧？"
1301405-57 = "一，二，三……！"
1301405-63 = "[log]（……直到那時我們才知道）[/log]"
1301405-67 = "[log]（滿懷憤怒的巨龍所吐出的火焰）[/log]"
1301405-68 = "[log]（竟然會旺盛到彷彿要將一切化為灰燼……）[/log]"
1301405-74 = "[ns]「這，這下好像不太妙……」"
1301405-75 = "比，比我想像中還大耶！？"
1301405-82 = "那，那是什麼！？"
1301405-83 = "好燙～！情況不妙！"
1301405-88 = "這下……好像真的糟了。"
1301405-89 = "[s]「火，火太旺了……！」"
1301405-93 = "快點滅火吧！"
1301405-105 = "[ns]「火不但沒熄，反而燒得更旺了！？」"
1301405-108 = "不，不愧是龍的火焰……但我不會輸的！"
1301405-112 = "來吧……決一勝負！"
1301405-116 = "一定要把它撲滅！"
1301405-132 = "（……之後總算是設法跟蓮華一起將火勢給控制住）"
1301405-136 = "（這場營火遠比預想中還要猛烈……）"
1301405-140 = "呼～總算是把火給控制住了。"
1301405-141 = "……真是嚇死我了。#n下次我會小心的。"
1301405-142 = "[s]「反正火也已經滅了，就把這次當成青春的教訓吧……！」"
1301405-146 = "咦？等一下。#n師父你的臉……"
1301405-147 = "……噗。"
1301405-148 = "噗，噗哈哈哈……！#n你的臉因為煤灰變成熊貓了耶？"
1301405-149 = "過來這邊吧，我幫你擦掉。"
1301405-150 = "[s]「麻，麻煩你了。」"
1301405-156 = "臉整個都黑掉了呢……"
1301405-157 = "先閉上眼睛吧。"
1301405-167 = "……"
1301405-168 = "（……我有在這麼近的距離看過師父的臉嗎？）"
1301405-169 = "（師父就在我的眼前……）"
1301405-170 = "（……這，這也是青春嗎？）"
1301405-171 = "[s]「蓮華？怎麼突然停下來了？」"
1301405-175 = "啊，沒，沒什麼！我到底在想什麼啊……"
1301405-176 = "總之快閉上眼睛吧！我要擦眼睛周圍了！"
1301405-178 = "（蓮華慌張地幫忙擦掉了臉上的煤灰）"
1301405-182 = "（這個瞬間……也許就是青春吧）"

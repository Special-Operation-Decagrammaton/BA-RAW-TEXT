[translation]
2002605-1 = "僅有兩人的鷹架"
2002605-2 = "赤冬聯邦學園．工務部事務所前"
2002605-8 = "咦……為什麼夏萊的老師會來這裡？"
2002605-9 = "有什麼事嗎？"
2002605-10 = "今天的作業因為寒流暫停了唷？"
2002605-11 = "[ns]「嗯，我有聽實里說了。」"
2002605-13 = "[ns1]「不過沒關係……」\n[ns2]「我只是想拿慰勞品給休息中的大家而已。」"
2002605-19 = "哇！是「天使24」中央店的限定巧克力！"
2002605-20 = "還有濃厚卡士達布丁！#n和事務局分發的布丁濃郁程度完全不同……！"
2002605-21 = "我們就感激地收下了，老師！"
2002605-22 = "[ns]「份量有很多，大家要好好地分著吃哦。」"
2002605-24 = "[ns]「話說回來，實里呢？」"
2002605-25 = "部長嗎？他在作業暫停的時候……"
2002605-26 = "……總是會去現場視察哦。#n說是會在意放在現場的工具和建材之類的。"
2002605-27 = "部長他的這種地方真是值得尊敬呢。"
2002605-28 = "不過今天應該不會去吧……？#n今天天氣冷到我剛剛才稍微出去一下，手就感覺快凍僵了。"
2002605-29 = "我也有同感。今天這麼冷的日子，就算是部長也不會去吧。#n我想應該會在圖書館哦？"
2002605-30 = "[s]「這樣啊，謝謝你們。我差不多該走了。」"
2002605-31 = "咦，已經要回去了嗎？"
2002605-32 = "啊，我們才應該道謝，謝謝老師帶來的慰勞品！#n下次也請務必到現場來哦！"
2002605-33 = "小心不要迷路了哦！"
2002605-37 = "[ns] 離開工務部的事務所，前往工地現場"
2002605-41 = "[ns3]「實里，你在那裡嗎？」\n[ns4]「實里里～♪」"
2002605-46 = "是誰啊，叫我什麼實里里的。"
2002605-51 = "……嗯？#n[USERNAME]老師？你怎麼會在這裡……？"
2002605-52 = "我不是用MomoTalk跟你說今天的工程取消了嗎……？"
2002605-53 = "[s5]「我聽部員們說實里可能會在這裡……」\n[s6]「我帶了一些慰勞品來哦。」"
2002605-56 = "居然還帶禮物來……我只不過是照合約工作而已。"
2002605-57 = "仔細想想……不管是赤冬還是校外的委託人，好像都不曾送過慰勞品啊。"
2002605-58 = "果然，會照顧我們這些勞動者的就只有老師一個人了。"
2002605-59 = "[s]「實里在現場做什麼呢？」"
2002605-60 = "我嗎？#n在散步，順便確認現場的安全。"
2002605-61 = "工程因為突然的寒流而暫停，所以想來看看工具跟建材保護的狀況。#n要是被風吹走就麻煩了，得趁現在整理一下才行。"
2002605-62 = "檢查結束之後，今天打算久違地悠閒一下。"
2002605-63 = "對了，有個景色我想讓老師看看。"
2002605-67 = "跟我來吧。"
2002605-72 = "― [log=미노리]呵呵，因為今天很冷，能清楚看到很遠的地方呢。[/log][wa:3620] "
2002605-74 = "― [log=미노리]來吧，老師也別站在那裡，爬上來吧。[/log][wa:4020] "
2002605-77 = "[ns]「這裡，兩個人一起上去沒問題嗎……？」"
2002605-78 = "― [log=미노리]不必擔心。[/log][wa:1320] "
2002605-80 = "― [log=미노리]這裡建造得很堅固，就算是大象爬上來也不會壞。[/log][wa:3140] "
2002605-83 = "― [log=미노리]……這麼說來，這個鷹架，[/log][wa:1900] "
2002605-85 = "― [log=미노리]和我們工務部，在某些方面感覺有點類似呢。[/log][wa:2600] "
2002605-88 = "― [log=미노리]雖然是建設不可或缺的重要材料，[/log][wa:1580] "
2002605-91 = "― [log=미노리]但只要工程結束，[/log][wa:760] "
2002605-92 = "― [log=미노리]就會像從未存在過一般消失的無影無蹤──[/log][wa:4020] "
2002605-95 = "― [log=미노리]或許是因為這樣吧。[/log][wa:1380] "
2002605-98 = "― [log=미노리]比起現場的任何風景，[/log][wa:620] "
2002605-99 = "― [log=미노리]從鷹架上俯瞰的這個景色，才是我最喜歡的。[/log][wa:4560] "
2002605-102 = "― [log=미노리]在建築物的邊緣向外一步之遙的距離，[/log][wa:2100] "
2002605-103 = "― [log=미노리]某個人在這片外牆的外側拚命揮灑汗水的、充滿痕跡的視角。[/log][wa:8340] "
2002605-106 = "― [log=미노리]……在完工的建築物上感受不到的這個景色。[/log][wa:3640] "
2002605-108 = "― [log=미노리]我想要，和老師共享。[/log][wa:2940] "
2002605-111 = "呵呵……怎麼樣啊，老師？#n從鷹架上往下俯瞰的景色。"
2002605-112 = "[s7]「雖然很漂亮沒錯……」\n[s8]「但因為太高，好像沒心力欣賞景色了。」"
2002605-115 = "也沒那麼高吧……"
2002605-116 = "……不，我之前曾經聽過。#n比起高樓大廈，人們在容易實際感受到高度的11m左右，反而會覺得更害怕。"
2002605-117 = "我知道了！#n那麼只要爬到感受不到害怕的高度不就好了嗎！！"
2002605-118 = "很好！既然已經決定了，我們趕快到屋頂上去吧，老師！！"
2002605-119 = "到屋頂上的話，就能不被恐懼影響，悠閒地欣賞風景了！"
2002605-121 = "（之後，為了阻止打算到更高鷹架上的實里費了不少工夫）"

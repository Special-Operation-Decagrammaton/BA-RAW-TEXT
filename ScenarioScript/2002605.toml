[translation]
2002605-1 = "นั่งร้านที่มีเพียงสองเรา"
2002605-2 = "หน้าสำนักงานแรงงานชมรมผู้รับจ้าง"
2002605-8 = "เอ๋? ผู้ใหญ่คนนี้คือ... คุณครูจากชาเล่ต์นี่นา?"
2002605-9 = "มาทำอะไรที่สำนักงานแรงงานเหรอ?"
2002605-10 = "อ้อ หรือว่ามาดูหน้างานบริการของเรา? งานวันนี้ถูกยกเลิกเพราะว่ามันมีกระแสลมหนาวฉับพลันน่ะ..."
2002605-11 = "[ns] \"อ๋อ... ครูได้ข่าวนั้นจากมิโนริแล้วละ\""
2002605-13 = "[ns1] \"ที่ครูมานี่ก็ไม่ได้มีอะไรมากหรอก...\"\n[ns2] \"แวะมาทั้งทีก็อยากเอาของว่างมาฝากนักเรียนที่กำลังพักเหนื่อยด้วย\""
2002605-19 = "ว้าว นี่มันช็อกโกแลตลิมิเต็ดเอดิชั่นที่มีขายเฉพาะในเอ็นเจล 24 สาขาเซ็นทรัลนี่นา?"
2002605-20 = "มีพุดดิ้งคัสตาร์ดรสเข้มข้นด้วย! ความเข้มข้นน่าจะต่างจากพุดดิ้งที่สำนักเลขาธิการส่งมาเลยนะเนี่ย..."
2002605-21 = "เดี๋ยวจะทานให้อร่อยเลยคุณครู!"
2002605-22 = "[ns] \"ครูเอามาเพียบเลย แบ่งกันกินดีๆ นะ\""
2002605-24 = "[ns] \"ว่าแต่มิโนริอยู่ไหนเหรอ?\""
2002605-25 = "หัวหน้ามิโนริเหรอ? จะว่าไปแล้วพวกเราถูกยกเลิกงานกะทันหัน หัวหน้ามิโนริคง..."
2002605-26 = "คงกลับไปไซต์งานเหมือนเคยแล้วแหละ.... ได้ยินว่าเป็นห่วงสภาพวัสดุอุปกรณ์ที่ทิ้งไว้ในไซต์งานน่ะ"
2002605-27 = "ก็หัวหน้ามิโนริทำงานด้วยใจจริงนี่เนอะ~"
2002605-28 = "แต่ถึงอย่างนั้นหัวหน้าก็ยังจะไปไซต์งานในวันที่อากาศหนาวๆ แบบนี้เหรอ? มันหนาวถึงขั้นแค่ออกมา#nนอกตึกเฉยๆ ยังแสบมือเลยนะ..."
2002605-29 = "อืม คิดเหมือนกันเลย ต่อให้เป็นหัวหน้ามิโนริก็คงไม่ไปไซต์งานในวันแบบนี้หรอก หรือว่าหัวหน้าจะไป#nห้องสมุดแทนหรือเปล่านะ"
2002605-30 = "[s] \"ครูขอตัวกลับก่อนนะ\""
2002605-31 = "หืม? จะกลับแล้วเหรอ?"
2002605-32 = "วันนี้ขอบคุณที่เอาของว่างมาฝากนะคุณครู คราวหน้าเจอกันที่ไซต์งานนะ~"
2002605-33 = "สหภาพเรดวินเทอร์กว้างขวางมากๆ อย่าเผลอกลับทางที่ไม่มีถนนล่ะ..."
2002605-37 = "[ns] ออกจากสำนักงานแรงงานแล้วมุ่งหน้าไปที่ไซต์งาน"
2002605-41 = "[ns3] \"มิโนริ... อยู่ตรงนั้นมั้ย?\"\n[ns4] \"มิโนริง~♪\""
2002605-46 = "ใครมาเรียกชื่อฉันแบบนั้นน่ะ...?"
2002605-51 = "หืม...? ครู [USERNAME] เองเหรอ? ทำไมมาอยู่ที่นี่ได้ล่ะ...?"
2002605-52 = "ฉันว่าฉันบอกใน MOMOTALK ไปแล้วนะว่างานวันนี้ถูกยกเลิกไปแล้ว... ครูจำวันผิดหรือเปล่า?"
2002605-53 = "[s5] \"ครูได้ยินสมาชิกชมรมคุยกันว่ามิโนริอาจจะอยู่ที่นี่น่ะ\"\n[s6] \"พอดีครูเอาของว่างมาให้กำลังใจนิดหน่อย\""
2002605-56 = "ของว่างเหรอ เราแค่ทำงานตามสัญญาก็เท่านั้นเอง... พอมาได้รับกำลังใจแบบนี้มันก็เขินๆ อยู่นะ"
2002605-57 = "พูดก็พูดเถอะ แม้แต่สำนักเลขาธิการเรดวินเทอร์ก็ยังไม่เคยส่งของว่างมาให้พวกเราเป็นพิเศษเลย..."
2002605-58 = "ว่าแล้วเชียวว่ามีแค่ครูที่เอาใจใส่แรงงานของพวกเราจริงๆ "
2002605-59 = "[s] \"มิโนริทำอะไรอยู่ที่ไซต์งานเหรอ?\""
2002605-60 = "ฉันเหรอ? ฉันมาเดินเล่นตามจุดต่างๆ แล้วก็ตรวจความปลอดภัยไปด้วยน่ะ"
2002605-61 = "พอเราถูกยกเลิกงานกะทันหันมันก็เลยมีอุปกรณ์หรือพวกผ้าใบกันน้ำที่ยังไม่ได้เก็บกัน เราต้องเก็บเอา#nไว้ไม่ให้ลมพัดไปน่ะ"
2002605-62 = "แถมนานๆ ทีจะได้ใช้เวลาว่างด้วย..."
2002605-63 = "จริงสิ จะว่าไปแล้ว ฉันมีวิวที่อยากให้คุณครูได้เห็นด้วยนะ"
2002605-67 = "ช่วยตามมาทางนี้เดี๋ยวหนึ่งได้หรือเปล่าล่ะ?"
2002605-72 = "― [log=미노리]ฮุฮุ คงเป็นเพราะวันนี้อากาศหนาว ฉันเลยมองเห็นระยะไกลได้ชัดแจ๋ว[/log][wa:2020] "
2002605-74 = "― [log=미노리]นี่ คุณครูก็อย่ามัวยืนตรงนั้น ขึ้นมามองจากบนนี้ดูสิ[/log][wa:2660] "
2002605-77 = "[ns] \"ตรงนี้... ขึ้นพร้อมกันสองคนได้เหรอ?\""
2002605-78 = "― [log=미노리]ไม่ต้องกังวลหรอกน่า[/log][wa:760] "
2002605-80 = "― [log=미노리]เราสร้างให้มันมั่นคงพอที่จะรับน้ำหนักช้างได้ทั้งตัวเลยนะ[/log][wa:1780] "
2002605-83 = "― [log=미노리]ว่าแต่นั่งร้านอันนี้...[/log][wa:1460] "
2002605-85 = "― [log=미노리]มิน่าฉันถึงรู้สึกว่ามันคล้ายกับชมรมผู้รับจ้างของเรา[/log][wa:1360] "
2002605-88 = "― [log=미노리]มันคืออุปกรณ์สำคัญที่ขาดไม่ได้สำหรับการก่อสร้างด้วยซ้ำ[/log][wa:20] "
2002605-91 = "― [log=미노리]แต่มันกลับหายไปหลังเสร็จงาน[/log][wa:10] "
2002605-92 = "― [log=미노리]ราวกับไม่เคยมีอยู่ตั้งแต่แรก...[/log][wa:3540] "
2002605-95 = "― [log=미노리]คงเพราะแบบนั้นแหละมั้ง[/log][wa:860] "
2002605-98 = "― [log=미노리]พอเทียบกับวิวในไซต์งานแล้ว[/log][wa:10] "
2002605-99 = "― [log=미노리]ฉันชอบวิวนี้ที่มองจากปลายเท้าของตัวเองที่สุดเลย[/log][wa:3480] "
2002605-102 = "― [log=미노리]ก้าวออกจากชายขอบอาคารก่อสร้างอีกสักก้าว[/log][wa:1220] "
2002605-103 = "― [log=미노리]เพื่อมองใครบางคนทุ่มเทหยาดเหงื่อแรงกายอยู่นอกกำแพงนี้[/log][wa:7300] "
2002605-106 = "― [log=미노리]วิวที่เรา...ไม่อาจสัมผัสได้จากอาคารที่สร้างเสร็จแล้ว[/log][wa:2360] "
2002605-108 = "― [log=미노리]ฉันอยากให้คุณครูได้มาเห็นด้วยน่ะ[/log][wa:2060] "
2002605-111 = "ฮุฮุ... เป็นไงบ้างครู? วิวมุมสูงของไซต์งานก่อสร้าง?"
2002605-112 = "[s7] \"วิวก็สวยดีอยู่หรอก แต่ว่า...\"\n[s8] \"ครูโฟกัสอะไรไม่ค่อยได้เพราะกลัวความสูงน่ะ...\""
2002605-115 = "มันไม่ได้สูงอะไรขนาดนั้นเลยนะ..."
2002605-116 = "จะว่าไปแล้วฉันเคยได้ยินเรื่องนั้นด้วยนะ เทียบกับตึกสูงๆ แล้ว มนุษย์เราจะกลัวความสูงระดับ 11m ที่สุดเลย เพราะมันสัมผัสได้ถึงระดับความสูงแบบจริงๆ..."
2002605-117 = "ถ้างั้นก็หมายความว่าเราดูวิวจากที่สูงเพื่อไม่ให้รู้สึกถึงความกลัวก็ได้แล้วเนอะ?"
2002605-118 = "งั้นตอนนี้เราขึ้นไปดาดฟ้ากันดีกว่าครู!"
2002605-119 = "ถ้าเป็นดาดฟ้า ครูก็จะได้ดูวิวไซต์งานแบบชิลๆ โดยที่ไม่ต้องรู้สึกกลัวเลยยังไงล่ะ!"
2002605-121 = "(จากนั้นคุณครูก็หมดแรงไปกับการที่มิโนริพยายามดึงให้ขึ้นไปบนนั่งร้านที่สูงกว่าอยู่พักใหญ่)"

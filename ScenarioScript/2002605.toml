[translation]
2002605-1 = "Hidden Scaffolds"
2002605-2 = "Red Winter Academy, Labor Party Workforce Office"
2002605-8 = "Oh? Isn't that Schale's Sensei?"
2002605-9 = "What brings you to the labor office?"
2002605-10 = "You aren't here for a tour of the job site, are you? Work was canceled today 'cause of bad weather."
2002605-11 = "[ns] \"Ah, Minori told me about that.\""
2002605-13 = "[ns1] \"I thought you could all use some cheering up.\"\n[ns2] \"I brought you snacks!\""
2002605-19 = "Wow! These are those limited-edition chocolates from Angel 24!"
2002605-20 = "Oh, look, there's custard pudding too! And it's not watery, like the pudding we get from the Secretariat..."
2002605-21 = "Thanks, Sensei!"
2002605-22 = "[ns] \"There's plenty for everyone, so help yourselves.\""
2002605-24 = "[ns] \"Anyway, where is Minori?\""
2002605-25 = "Good question. She always seems to vanish whenever work gets canceled unexpectedly..."
2002605-26 = "She usually goes to the work site to make sure all of our materials and equipment are secure."
2002605-27 = "Wow, President Minori sure works hard!"
2002605-28 = "I don't know if she went out there today, though. It's cold enough to give you frostbite out there..."
2002605-29 = "Yeah, you'd have to be crazy to go out and work on a day like today. I bet she went to the library, instead."
2002605-30 = "[s] \"Well, I'd best be going.\""
2002605-31 = "Already?"
2002605-32 = "Thanks for the snacks, Sensei. Come visit us on the job site sometime!"
2002605-33 = "Oh, and be careful not to get lost! Red Winter Academy is pretty big."
2002605-37 = "[ns] Head for the job site."
2002605-41 = "[ns3] \"Minori, Minori, Minoririri!\"\n[ns4] \"Minoriiing! ♪\""
2002605-46 = "Who's butchering my name...?"
2002605-51 = "Oh, [USERNAME] Sensei! What are you doing here?"
2002605-52 = "I'm sure I sent a notice on MomoTalk that work was canceled... Didn't you get it?"
2002605-53 = "[s5] \"Your club members said you might be here.\"\n[s6] \"I come bearing snacks!\""
2002605-56 = "I'm only doing what I was contracted to do. Extra rewards like this are too much..."
2002605-57 = "Now that I think of it, the Red Winter Office has never sent us snacks before. Nor have our clients..."
2002605-58 = "It looks like you're the only one looking after laborers like me, Sensei."
2002605-59 = "[s] \"Why are you out here, anyway?\""
2002605-60 = "I'm just walking the grounds and doing some safety inspections."
2002605-61 = "Because work was canceled so suddenly, some of our equipment and tarps and things were left laying around. I have to secure it all, so it doesn't fly away in the wind."
2002605-62 = "I can't think of any better way to enjoy a rare free day like this..."
2002605-63 = "Ah, there's actually something I want to show you."
2002605-67 = "Mind following me? Up this way."
2002605-72 = "― [log=미노리]Hahaha... On a cold, brisk day like this, I can see forever.[/log][wa:2100] "
2002605-74 = "― [log=미노리]Sensei, don't just stand there. Come and take a look.[/log][wa:2580] "
2002605-77 = "[ns] \"Uh... Will this support both of us?\""
2002605-78 = "― [log=미노리]There's nothing to worry about.[/log][wa:280] "
2002605-80 = "― [log=미노리]This scaffolding is so sturdy it can hold an entire elephant.[/log][wa:1580] "
2002605-83 = "― [log=미노리]Come to think of it, this scaffolding[/log][wa:900] "
2002605-85 = "― [log=미노리]is a lot like the Labor Party.[/log][wa:2200] "
2002605-88 = "― [log=미노리]Construction is impossible without it, but[/log][wa:500] "
2002605-91 = "― [log=미노리]it must disappear[/log][wa:400] "
2002605-92 = "― [log=미노리]like it never existed once the work is done...[/log][wa:2940] "
2002605-95 = "― [log=미노리]Maybe that's why...[/log][wa:980] "
2002605-98 = "― [log=미노리]I love standing up here on the scaffolding[/log][wa:10] "
2002605-99 = "― [log=미노리]and looking down at the job site from the top of the world.[/log][wa:3000] "
2002605-102 = "― [log=미노리]This is proof of the hard work of everyone[/log][wa:1100] "
2002605-103 = "― [log=미노리]who stood on the edge and built these walls with their own hands.[/log][wa:6820] "
2002605-106 = "― [log=미노리]...This proof, nowhere to be found on a finished building,[/log][wa:2120] "
2002605-108 = "― [log=미노리]is what I wanted to share with you, Sensei.[/log][wa:1620] "
2002605-111 = "So, what did you think? Looking down from so high up?"
2002605-112 = "[s7] \"It was pretty, but I'm glad to be back on solid ground.\"\n[s8] \"I felt dizzy, being so high up...\""
2002605-115 = "Surely you've been higher up than that before..."
2002605-116 = "Hm. Maybe a little height is scarier, since your brain can understand it, compared to the view from a tall building..."
2002605-117 = "I know! Let's find a spot too high up for your brain to even comprehend."
2002605-118 = "Let's go to the very top, Sensei!"
2002605-119 = "Up there, I bet you'll be able to take your time and really enjoy the view!"
2002605-121 = "It took me a little time and a lot of effort to convince Minori not to drag me to the top of the scaffolding..."

[translation]
2403-1 = "夜晚頃之，奔跑吧少女（１）"
2403-2 = "（那是，深夜1點過後的事情……）"
2403-5 = "嗯嗯嗯嗯嗯嗯……"
2403-7 = "（呣喵……嗯……）"
2403-9 = "（……？這個聲音，是什麼……？）"
2403-14 = "三森，如何？準備完了？"
2403-15 = "我看看……這個和那個，這樣就沒問題了吧？"
2403-16 = "嗯，那樣就沒問題。"
2403-17 = "……那就，走吧？"
2403-18 = "好的。小心不要吵醒楓醬，安靜的出去吧。"
2403-22 = "（嗯嗯，椿前輩……三森前輩……？）"
2403-23 = "兩個人，究竟要去哪裡……Zzz……"
2403-26 = "哈！？"
2403-27 = "……夢？"
2403-31 = "啊，楓醬。早安。"
2403-32 = "正好準備好早飯了，去洗個臉如何？"
2403-33 = "啊，嗯。"
2403-34 = "呼啊啊……"
2403-35 = "椿醬也是，不要站著睡回籠覺哦？"
2403-36 = "好了好了，和楓醬一起，"
2403-37 = "呼啊唔……嗯，媽媽……"
2403-38 = "我，我不是妳的媽媽唷！？"
2403-39 = "呼……"
2403-40 = "……椿醬？咦，難道真的睡著了嗎？請起來，椿醬！？"
2403-43 = "……"
2403-45 = "百夜堂"
2403-46 = "老師怎麼想！？"
2403-47 = "[s1] 「怎麼回事……？」\n[s2] 「就算妳突然問我『怎麼想』……」"
2403-48 = "為什麼反應那麼薄弱啊！？"
2403-49 = "為什麼反應那麼薄弱啊！？"
2403-50 = "老師你知道嗎？這是很深刻的問題唷，是大事件唷！？"
2403-51 = "是，是那麼嚴重的事嗎！？菲娜，完全聽不懂剛才的話！"
2403-52 = "[s] 「沒關係，我也不懂。」"
2403-53 = "為什麼！？明明是那麼大的事件！"
2403-54 = "前輩們竟然丟下我，兩個人單獨在深夜外出……！"
2403-55 = "確實這樣想的話，有點可疑呢？"
2403-56 = "對吧！？"
2403-57 = "很可疑唷！到處都很可疑！"
2403-58 = "而且還，看準我睡著的時候……這一定是，藏著什麼天大的祕密不會錯！"
2403-59 = "原來如此。瞞著部員，幹部兩人單獨一夜一夜的……我聞到了可疑事件的味道！"
2403-60 = "就是說啊！不愧是菲娜，很懂我～！來，給菲娜一個花朵貼紙！"
2403-61 = "太好了！非常謝謝！"
2403-62 = "[s] 「嗯……」"
2403-63 = "老師，那樣的話是沒辦法成為名偵探的唷！"
2403-64 = "如果被孤立在狂風暴雨中的孤島，或是橋樑斷裂的深山山莊裡怎麼辦！？"
2403-65 = "[s] 「我並沒有特別以名偵探為目標……」"
2403-66 = "總．而．言．之！根據我這個帥氣又可愛，持有驚人的推理能力，將來會以奇普托斯第一的美少女名偵探而名聲大噪的我的天才頭腦……！"
2403-69 = "雖然好像聽到了什麼很壯大的形容詞……"
2403-71 = "來，這是您點的草莓餡蜜唷～"
2403-72 = "啊，部長！"
2403-73 = "哇～咿！看起來好好吃～！"
2403-74 = "[s] 「謝謝妳哦，靜子。」"
2403-75 = "不，我只是把點的餐點拿過來而已，不是那種需要被道謝的事。"
2403-76 = "話說菲娜。就算是店裡空閒的時間帶，也要注意不要讓老師太困擾哦。"
2403-77 = "這點請不用擔心！這並不是在玩，而是作為百夜堂的店員，正在傾聽客人的煩惱而已！"
2403-79 = "是俠客電影的序幕也會常常出現的，傾聽稍微有點複雜事情的角色！"
2403-80 = "沒錯沒錯，對客人要親切才行！嚼嚼……"
2403-81 = "雖然那種話由客人來說有點不太適合……不過嘛確實是呢。"
2403-82 = "那就，畢竟機會難得……"
2403-83 = "來主人！為了讓這點草莓餡蜜變得更～好吃，靜子現在要來施魔法哦！"
2403-84 = "變得好吃──"
2403-85 = "啊，那個就不用了！"
2403-86 = "啊……咦？"
2403-87 = "那種東西是，為了把單價？拉高，店家擅自追加很多的服務吧？"
2403-88 = "之前我是這麼聽說的！身為獨當一面的淑女，是不會上那種當的！"
2403-89 = "等，等等！那種說法含有惡意吧！？我們對那種──"
2403-90 = "[s] 「根據店家，時而也會有那種闇黑面……」"
2403-91 = "老師！？"
2403-92 = "總之繼續剛才的，前輩們肯定瞞著我什麼不會錯的……嚼嚼。"
2403-94 = "嚼嚼……哈呣哈呣……所以，啊呣……"
2403-95 = "總之先全部吃完再說如何？"
2403-97 = "哈呣……（吞下！）呼，也就是說！"
2403-98 = "前輩們瞞著我，例如……在做著修行部的祕密任務之類的也說不定！"
2403-99 = "祕密任務是……有點想太多了吧？"
2403-100 = "嗯……不過，似乎也不是只有這一次……"
2403-101 = "前天和三天前，還有上週也是……嗯，感覺一週應該有五次。"
2403-102 = "已經幾乎是每天了嘛……"
2403-103 = "但是，為什麼只瞞著我，而且還是在深夜……？"
2403-104 = "[s] 「嗯……，肯定有什麼理由……」"
2403-105 = "哈！剛才，我的這個天才般的頭腦嗶嗶嗶的來了！"
2403-106 = "該不會，是在進行只要是大人的女性都會有所涉獵的……「夜生活」！？"
2403-107 = "果然身為出色的淑女，夜生活是很普通的事嗎！？因為我還沒成為出色的淑女，所以才不帶我去嗎！？"
2403-108 = "我覺得肯定不是……"
2403-109 = "咦～，但是那種事誰也不知道吧。啊，該不會……自己身為節慶營運管理部的部長，有在進行夜生活所以知道嗎！？"
2403-110 = "是那樣嗎部長！？"
2403-111 = "部長的夜生活……"
2403-112 = "也就是作為百夜堂的女主人，每夜都在守護著俠客們聚集的百鬼夜行街道的和平嗎！？不愧是部長，菲娜好感動！"
2403-113 = "[s] 「靜子的拳頭應該辦得到。」"
2403-114 = "怎麼可能啊！？而且說到「夜生活」的話，一般來說大概不是指那種，而是……"
2403-115 = "但是，把我丟下的其他理由……"
2403-116 = "該不會……因為我是，不可靠的後輩嗎？"
2403-117 = "我，對前輩們來說已經是……不需要的後輩，是這樣嗎……"
2403-118 = "楓……"
2403-119 = "……唉。那麼在意的話，實際去確認看看就知道了吧？"
2403-120 = "咦？"
2403-121 = "不要只是一直埋頭思考，這種時候趕快確認是最好的。"
2403-122 = "因為誤會就是從這種地方產生的。"
2403-123 = "實際，去確認……？"
2403-124 = "來，這個抹茶彈珠汽水也給你。趕快去吧？"
2403-125 = "不愧是部長！即使笨拙也有為對方著想的溫柔，這正是百夜堂的女主人！"
2403-126 = "[s] 「果然靜子很溫柔呢。」"
2403-127 = "不，不是那個，這個只是擺著那副臉的話以店家來說也很困擾，其他客人也會在意……沒錯，就只是這樣！"
2403-128 = "……嗯！"
2403-129 = "也許確實是那樣，果然節慶營運管理部的部長很厲害呢！真沒辦法就把這個花朵貼紙給妳吧！"
2403-130 = "不，我不需要……這是什麼？哪裡的貼紙？"
2403-131 = "我親手製作的！收集很多這個貼紙的話，沒想到竟然可以獲得豪華獎品當作禮物！"
2403-132 = "嘿～……獎品是什麼樣的？"
2403-133 = "收集10張貼紙的話，生日時我會唱歌給妳聽！"
2403-134 = "……讓人難以評論的獎品！"
2403-135 = "嘛這個先不說……這樣煩惱就解決了吧？回去直接問前輩們理由──"
2403-136 = "好！那就事不宜遲，今晚得跟蹤前輩們直接確認真相才行！"
2403-137 = "有在聽我說話嗎！？"
2403-138 = "每晚瞞著我在做什麼呢……也算是為了成為獨當一面的淑女，必須由自己親手解開謎題！"
2403-139 = "真不錯呢！菲娜也會幫妳加油的！"
2403-140 = "啊，老師當然也會協助吧？可愛學生的請求，應該不會拒絕吧？"
2403-141 = "[s] 「咦？嘛，我完全會協助……」"
2403-142 = "好，既然那麼決定了就事不宜遲唷！啊，謝謝妳的草莓餡蜜～！"
2403-145 = "真是的，有夠慌忙的……"
2403-146 = "啊，老師。和楓的份一起，麻煩你結帳哦♡"
2403-147 = "[s] 「果然會變成這樣！」"
2403-150 = "（就這樣到了晚上……）"
2403-154 = "…………"
2403-155 = "……！"
2403-156 = "椿前輩和三森前輩……已經走了嗎？"
2403-157 = "好，那我也……咻啪啪！"
2403-160 = "老師！這邊這邊！"
2403-161 = "[s] 「久等了。已經蠻晚了，還好嗎？會不會睏？」"
2403-162 = "畢竟是我自己說的啊！而且別看我這樣我可是獨當一面的淑女……以這個為目標的！"
2403-163 = "也喝了被三森前輩說不行的黑咖啡5杯，眼睛完全沒問題！"
2403-164 = "平常雖然被說「因為會睡不著而導致生活循環崩壞，所以不能喝唷」，不過今天是緊急情況所以沒辦法！"
2403-165 = "完美！我果然，很聰明！"
2403-166 = "呼啊……"
2403-167 = "[s] 「真的沒問題嗎……」"
2403-168 = "……嗯？老師怎麼了？"
2403-169 = "啊，不是在這邊悠閒的時候了！"
2403-172 = "快來，必須追上前輩們才行！走吧，跟蹤開始！"

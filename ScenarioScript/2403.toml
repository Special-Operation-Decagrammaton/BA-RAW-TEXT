[translation]
2403-1 = "Night Is Short, Go Run Girl. Part 1"
2403-2 = "(The middle of the night, a little past 1 AM...)"
2403-5 = "Mmm..."
2403-7 = "(So...shleepy...)"
2403-9 = "(What was that sound...?)"
2403-14 = "Did you prepare everything like I told you, Mimori?"
2403-15 = "Yes. You wanted this and this, right?"
2403-16 = "Yeah. That should be enough."
2403-17 = "Looks like everything is ready. Shall we?"
2403-18 = "Yes. Kaede could wake up at any moment, so let's hurry."
2403-22 = "(Tsubaki...? And Mimori?)"
2403-23 = "Where are you two going without me? Zzz..."
2403-26 = "Huh?!"
2403-27 = "Was I dreaming?"
2403-31 = "Kaede, are you awake? "
2403-32 = "I just started making breakfast. Wash your face first if you're up."
2403-33 = "Ah... Mmm..."
2403-34 = "*yawn*"
2403-35 = "The same goes for you, Tsubaki! Stop dozing off and get ready for breakfast. "
2403-36 = "Come on. Up and at 'em, Kaede."
2403-37 = "*yawn* Yes, Mom..."
2403-38 = "What?! I-I'm not your mom...!"
2403-39 = "Zzz... "
2403-40 = "Tsubaki? Did you just fall asleep here? It's morning! You can't fall asleep again!"
2403-43 = "..."
2403-45 = "Momoyodou"
2403-46 = "So that's what happened today! What do you think, Sensei?!"
2403-47 = "[s1] \"I was wondering what this was all about...\"\n[s2] \"I don't know about this...\""
2403-48 = "Hey! What's with that disappointing reaction?!"
2403-49 = "Hey! What's with that disappointing reaction?!"
2403-50 = "Don't you get it, Sensei? This is a major problem! It's really, really serious!"
2403-51 = "*gulp* Is it that serious?! I didn't realize!"
2403-52 = "[s] \"Naturally, since it wasn't very serious...\""
2403-53 = "Nuh-uh. This is what's so important!"
2403-54 = "The fact that they secretly went out at night without me is seriously... It's like really, uh...s-su...su..."
2403-55 = "Suspicious? You mean...?"
2403-56 = "Right! That's the word!"
2403-57 = "Suspicious! Suspicious times a million! Don't you think so?!"
2403-58 = "Why would they go out after only I fall asleep? They must be hiding something!"
2403-59 = "Yeah... Maybe they're, like, the only two members of some kind of secret society! We've got a mystery on our hands!"
2403-60 = "Good girl, Pina! I knew you'd get it. Have a compliment sticker!"
2403-61 = "Awww. Thank you, Kaede!"
2403-62 = "[s] \"I'm not sure about all this.\""
2403-63 = "You're too naive, Sensei! You'll never become a great detective with that level of deductive reasoning!"
2403-64 = "You'd in be in real trouble if you were isolated on a stormy remote island or stuck in a cabin in the middle of nowhere and the bridge was out!"
2403-65 = "[s] \"Things like that don't usually happen.\""
2403-66 = "ANYWAY! Unlike you, I'm cool, cute, and I have great detective skills. As a promising detective with a brilliant mind, my speculation is...!"
2403-69 = "Would you keep it down and enjoy the strawberry anmitsu you ordered? I can hear you tooting your own horn from all the way on the other side of the store."
2403-71 = "And these two are for you, Kaede. Sensei."
2403-72 = "Thanks Shizuko!"
2403-73 = "Okay, I'll admit the strawberry anmitsu looks delicious!"
2403-74 = "[s] \"Thank you, Shizuko.\""
2403-75 = "Just doing my job. We're not very busy right now, so I have a little time to chat."
2403-76 = "That aside, you all should listen to Sensei about this and quit joking around."
2403-77 = "But we're not joking around! And besides, listening to the troubles of customers is one of our duties at Momoyodou!"
2403-79 = "I'm like one of those teahouse servers from the vigilante movies!"
2403-80 = "That's right! You should be nicer to your customers! *munch* *munch*"
2403-81 = "Says the unwelcome guest... Okay, I concede that one was a little unprofessional."
2403-82 = "Let me start over again from the top."
2403-83 = "Ahem. Here you are, Master! The strawberry anmitsu you ordered! Now let me say the magic words to make it even tastier!"
2403-84 = "Hocus pocus, be more delicious..."
2403-85 = "That's okay. I'm good."
2403-86 = "Hmm?"
2403-87 = "Isn't that just one of those useless services the shops add at their own discretion so they can charge the customers extra?"
2403-88 = "I know all about it! I won't fall for such obvious tricks!"
2403-89 = "H-Hold on! What are you trying to say about us waitresses?!"
2403-90 = "[s] \"To think I trusted the service industry all this time...\""
2403-91 = "E-Even you, Sensei?!"
2403-92 = "Anyway, back to business. It's obvious my upperclassmen are hiding something from me. *munch*"
2403-94 = "So. *munch*"
2403-95 = "Can't this wait until after you're done eating?"
2403-97 = "*munch* *gulp* Ahhh... What I mean is this!"
2403-98 = "Whatever they're doing without me...is obviously related to some kind of secret Inner Discipline Club mission that I can't be a part of."
2403-99 = "A secret mission? What makes you think that?"
2403-100 = "This isn't the first time something like this has happened."
2403-101 = "It also happened yesterday and three days ago...as well as last week. In fact, it happens at least five times a week."
2403-102 = "So, basically, it happens every day..."
2403-103 = "What are they hiding from me? Why are they sneaking out at night without me? Huh? Sensei?"
2403-104 = "[s] \"I'm not sure.\""
2403-105 = "I've got it! I'm so smart. It can only be one thing."
2403-106 = "It's what every sophisticated woman does at night... They're going out to party!"
2403-107 = "That's what real ladies do every night, right? And I'm being left out because I haven't hit the heights of womanhood, is that it?!"
2403-108 = "Something tells me that's not even close to true."
2403-109 = "How would the president of the Festival Department know that? Do you also have secret nightly outings?!"
2403-110 = "Is that true, President?!"
2403-111 = "The president's nighttime outings..."
2403-112 = "That must be when you, the mistress of Momoyodou, clean the Hyakkiyako streets of scum and villainy each night! Right?! You're amazing!"
2403-113 = "[s] \"Shizuko does have a mean right hook...\""
2403-114 = "I do not! Besides, that's not what people do at night. It's usually more, you know..."
2403-115 = "But if that's not it, then why would they be leaving me behind?"
2403-116 = "Is it because I'm inexperienced underclassman? That has to be it, right?"
2403-117 = "Do my upperclassmen just see me as a useless kid?"
2403-118 = "Kaede..."
2403-119 = "*sigh* If it's bothering you that much, why not just confront them about it?"
2403-120 = "Hmm?"
2403-121 = "You're not going to solve anything by simply fretting about it forever."
2403-122 = "And you can clear up any misunderstandings this way. "
2403-123 = "Find out...for myself?"
2403-124 = "Yeah. Here, I'll give you this matcha ramune. I want you to drink it and head home instead of moping around here."
2403-125 = "I knew it, Shizuko! You pretend like you don't care, but you actually take good care of people. Just what I'd expect from the Momoyodou's idol!"
2403-126 = "[s] \"Nice assist, Shizuko!\""
2403-127 = "I-It's not like that! I only did it because you'd bring down all the other customers if you kept moping around like that."
2403-128 = "Find out for myself. That's... "
2403-129 = "...a great idea! I knew I could count on the Festival Department's president! I might even consider giving you a passing score. This calls for a compliment sticker!"
2403-130 = "Am I supposed to be happy about that? What's a compliment sticker?"
2403-131 = "Oh, it's something I made up! I'm giving one to each person who scores a point. And you may earn a reward if you collect enough stickers!"
2403-132 = "Did you say...reward? What kind of reward?"
2403-133 = "If you collect ten stickers, I will sing for you on your birthday!"
2403-134 = "You weirdo! Who would want something like that?!"
2403-135 = "*sigh* Well, anyway, this solves your problem, right? If you go back and ask them why..."
2403-136 = "That's right. That's why I'm going to follow them and find out for myself tonight!"
2403-137 = "Wait, how did you jump to that conclusion?!"
2403-138 = "It's the only way to uncover the truth for myself!"
2403-139 = "You go, Kaede! You have my full support!"
2403-140 = "You'll help too, right, Sensei? You wouldn't turn down the request of an adorable student, would you...?"
2403-141 = "[s] \"Y-Yeah, sure...\""
2403-142 = "Then let's get started, right away. Oh, and thanks for the anmitsu!"
2403-145 = "*sigh* That girl can't sit still for a single minute, can she? Oh, by the way..."
2403-146 = "Thanks for picking up the check, Sensei. ♥"
2403-147 = "[s] \"I knew this was going to happen!\""
2403-150 = "The following night..."
2403-154 = "Um..."
2403-155 = "*wide awake*!"
2403-156 = "Tsubaki and Mimori should be gone by now."
2403-157 = "Then, now's my chance!"
2403-160 = "Sensei, here. Over here!"
2403-161 = "[s] \"Hey, Kaede. You managed to stay up.\""
2403-162 = "Did you think I'd break my promise? I'm not some kid. I'm a respectably lady aspiring to become a fabulous lady."
2403-163 = "I snuck five cups of black coffee today just to stay up for tonight."
2403-164 = "She always tells me not to drink coffee, but this is an emergency!"
2403-165 = "My preparations couldn't be more thorough! I'm so smart!"
2403-166 = "*yawn*"
2403-167 = "[s] \"I have a bad feeling about this...\""
2403-168 = "Huh? What do you mean?"
2403-169 = "Gah! We don't have time for this, Sensei!"
2403-172 = "We have to find them before it gets too late. Let the chase begin!"

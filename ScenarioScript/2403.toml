2403-44 = "#all;hide"
2403-45 = "#place;백야당"
2403-46 = "3;카에데;14;……같은 일이, 오늘 있었는데 말이야!! 어떻게 생각해?! 선생님?!\n#3;a\n#3;em;[속상함]\n#3;stiff"
2403-47 = "[s1] \"갑자기 심각한 목소리로 불러 내길래 뭔가 했더니…….\"\n[s2] \"갑자기 어떻게 생각하느냐고 물어도 말이지…….\""
2403-48 = "3;카에데;12;아니~~! 그런 맥 빠진 반응은 뭐냐구~!\n#3;hophop"
2403-49 = "3;카에데;12;아니~~! 그런 맥 빠진 반응은 뭐냐구~!\n#3;hophop"
2403-50 = "3;카에데;15;알겠어? 선생님. 이건 대사건이라구? 엄청엄청 심각한 일이야!\n#3;em;[!]"
2403-51 = "1;피나;04;꿀꺽. 그 정도로 심각한 일인가요?! 피나, 방금 이야기만 듣고는, 전혀 깨닫지 못했습니다!\n#1;ar\n#1;em;[반응]\n#3;m5"
2403-52 = "[s] \"그야 심각한 내용이 아니었으니까……?\""
2403-53 = "3;카에데;15;그.러.니.까. 중요한 건 이거야!\n#3;em;[!]\n#3;jump"
2403-54 = "3;카에데;07;선배들이 나만 쏙 빼놓고 단 둘이서만 밤에 몰래 외출하다니, 그게 엄청나게, 그러니까……. 무지막지하게, 그……. 수, 수……. 수…….\n#3;stiff"
2403-55 = "1;피나;02;수상하다? 입니까?"
2403-56 = "3;카에데;11;맞아! 내가 말하고 싶었던 게 바로 그거야!\n#3;em;[반짝]\n#3;hophop"
2403-57 = "3;카에데;15;수상해! 수상함이 백만 배야! 안 그래?!"
2403-58 = "3;카에데;15;하필이면 내가 잠들고 난 뒤에서야 단둘이, 비밀스럽게, 나만 두고 외출이라니! 어디를 봐도 비밀이 있는 게 분명하잖아……!\n#3;hophop"
2403-59 = "1;피나;05;과연……. 조직원에겐 말하지 않고, 간부 둘이서만 공유하는 수상한 비밀! 벌써부터 사건의 냄새가 납니다!"
2403-60 = "3;카에데;03;응응! 그렇지?! 역시 피나는 뭘 안다니까! 자, 칭찬 스티커를 줄게!\n#3;em;[음표]\n#3;m4\n#3;hophop"
2403-61 = "1;피나;03;오! 고맙습니다! 카에데!\n#1;m2\n#1;em;[반짝]"
2403-62 = "[s] \"으음, 잘 모르겠는데…….\""
2403-63 = "3;카에데;04;선생님은 무르다니까! 그런 추리력으론 명탐정이 될 수 없다고?\n#3;m3\n#3;hophop\n#1;dl"
2403-64 = "#1;hide\n3;카에데;00;폭풍우 치는 외딴 섬이나, 다리가 끊어진 산장에 고립되면 큰일 나버릴 거야!\n#3;em;[반응]"
2403-65 = "[s] \"아니, 보통 없으니까 그런 일.\""
2403-66 = "3;카에데;09;하! 여! 간! 선생님과 다르게 멋지고, 귀엽고, 굉장한 추리력을 가지고 있어서. 아마 미래의 명탐정 소녀로 촉망받는 나님의 명석한 두뇌로 추리해 보자면 말이야……!\n#3;em;…"
2403-67 = "3;카에데;09\n#3;d\n#wait;1000"
2403-68 = "#all;hide"
2403-69 = "3;시즈코;01;거기, 듣는 사람이 깜짝 놀랄 정도의 자기 평가는 제쳐 두고, 자, 여기 주문한 딸기 안미츠야.\n#3;a\n#3;em;[음표]"
2403-70 = "3;시즈코;01\n#3;greeting\n#wait;1500"
2403-71 = "3;시즈코;02;선생님 것과 카에데, 네 것까지. 두 개."
2403-72 = "3;시즈코;02\n1;피나;03;앗, 부장……!\n#1;ar\n#1;em;[반응]"
2403-73 = "3;시즈코;02\n1;피나;03\n5;카에데;11;와! 딸기 안미츠! 맛있겠다!\n#5;al\n#5;em;[반짝]"
2403-74 = "[s] \"고마워, 시즈코.\""
2403-75 = "1;피나;03\n5;카에데;11\n3;시즈코;00;저야 손님이 주문한 메뉴를 내온 것뿐이니까요. 마침 손님이 뜸한 시간이기도 하구."
2403-76 = "1;피나;03\n5;카에데;11\n3;시즈코;06;하지만 피나, 아무리 지금이 손님이 별로 없는 때라고는 해도, 놀아주는 건 적당히 해. 선생님도 곤란해하는 눈치잖아.\n#3;em;[땀]"
2403-77 = "5;카에데;11\n3;시즈코;06\n1;피나;04;부장! 그건 틀립니다! 이건 노는 게 아니에요! 백야당의 점원으로서! 손님의 고민을 들어주는 겁니다!"
2403-78 = "#all;hide"
2403-79 = "3;피나;03;협객 영화에서도 자주 나오는, 찻집 점원의 역할이란 겁니다!\n#3;em;[반짝]\n#3;closeup"
2403-80 = "3;카에데;11;옳소! 우물우물! 손님에겐 좀 더 친절하게 대해달라!\n#3;em;[반응]\n#3;hophop\n#3;closeup"
2403-81 = "3;시즈코;06;갑자기 들이닥친 불청객한테 그런 소리를 들어도……. 으음. 아니, 확실히 방금 건 프로답지 못했네……. 반성할게.\n#3;stiff\n#3;em;[속상함]"
2403-82 = "3;시즈코;05;뭐, 그렇게까지 말한다면. 좋아."
2403-83 = "3;시즈코;03;흠흠. 자아~ 주인님~! 여기 주문하신 딸기 안미츠 세트랍니다~ 지금부터 제가 맛있어지는 주문을 걸어드릴게요~!\n#3;greeting\n#3;em;[반짝]"
2403-84 = "3;시즈코;02;자아~ 맛있어져라~ 맛있어져……"
2403-85 = "5;카에데;99;아, 그거라면 괜찮아.\n#5;al\n#3;m1\n#5;em;[반응]"
2403-86 = "3;시즈코;02;응?\n#3;stiff"
2403-87 = "5;카에데;05;그런 건 손님한테서 각종 비용을 청구하기 위해서, 가게에서 멋대로 추가하는 쓸데없는 서비스라는 거잖아?"
2403-88 = "5;카에데;15;다 알고 있으니까! 그런 뻔히 보이는 수법엔 당하지 않아!\n#5;em;[반응]"
2403-89 = "3;시즈코;04;자, 잠깐! 너, 서비스업을 뭐라고 생각하는 거야?!\n#3;stiff"
2403-90 = "[s] \"이것이……. 서비스업의 어둠……?\""
2403-91 = "3;시즈코;04;서, 선생님까지 그러기예요?!\n#3;shake\n#3;em;[?!]"
2403-92 = "5;카에데;99;어쨌거나. 하던 이야기를 계속하자면 말이야. 우물우물. 선배들이 내게 무언가 숨기고 있는 게 분명해…….\n#5;greeting"
2403-93 = "5;카에데;99\n#5;greeting\n#wait;1500"
2403-94 = "5;카에데;99;오물오물, 그러니까. 우물우물…….\n#5;greeting\n#5;em;…"
2403-95 = "3;시즈코;04;저기……. 일단 다 먹고 말해줄래?\n#3;em;[땀]"
2403-96 = "5;카에데;99\n#5;greeting\n#wait;1500"
2403-97 = "5;카에데;03;우물우물. 꿀꺽. 푸하아! 그니까. 그니까!\n#5;em;[반짝]"
2403-98 = "5;카에데;04;선배들이 나만 쏙 빼놓고 하는 일들……. 그건 분명…… 내가 있으면 방해가 되는, 비밀스러운 수행부 미션인 게 틀림없어!"
2403-99 = "3;시즈코;05;아니, 비밀스러운 미션이라니. 의미를 모르겠다구. 애당초 너무 지나친 생각 아냐?"
2403-100 = "5;카에데;06;하지만……. 오늘 같은 일이 있던 게, 이번만이 아닌걸……."
2403-101 = "5;카에데;06;그저께도 그랬고, 3일 전에도……. 저번 주에도 그랬었고, 일주일에 다섯 번 정도는…….\n#5;em;…"
2403-102 = "3;시즈코;04;그거, 그냥 거의 매일이란 소리잖아…….\n#3;em;[땀]"
2403-103 = "5;카에데;14;선배들이 내게 숨기고 있는 게 뭘까? 왜 나만 내버려두고 둘이서 밤에 몰래 나가는 거야? 응? 선생님?"
2403-104 = "[s] \"글쎄…….\""
2403-105 = "5;카에데;00;핫?! 방금 내 명석한 두뇌에 삐빗하고 왔어! 내 대단한 추리에 따르면 그건 혹시…….\n#5;em;[반응]\n#5;stiff"
2403-106 = "5;카에데;07;어른 여성이라면 다들 한다는……. 밤놀이?!\n#5;m3\n#3;dl"
2403-107 = "#3;hide\n5;카에데;14;멋진 레이디가 되기 위해선, 밤놀이도 빼놓을 수 없는 거야?! 카에데는 아직 멋진 레이디가 되지 못한 지망생일 뿐이니까. 껴주지 않는 거야?!\n#5;shake\n#5;em;[?!]"
2403-108 = "#5;hide\n3;시즈코;04;아마, 절대로 그런 이유는 아닐 거라고 생각해.\n#3;em;[땀]\n#3;stiff"
2403-109 = "5;카에데;10;그걸 마츠리부의 부장이 어떻게 알아? 혹시 그쪽 부장도 몰래 밤놀이를 하는 거야?\n#5;al\n#5;em;[반응]"
2403-110 = "1;피나;04;그런 건가요. 부장?!\n#1;ar\n#1;em;[!]"
2403-111 = "1;피나;08;부장의 밤놀이……."
2403-112 = "1;피나;03;즉 백야당의 안주인으로서, 밤마다 협객들이 뒤엉키는 백귀야행의 거리를 평정하고 계셨던 건가요?! 피나! 감동했습니다!\n#1;em;[반짝]\n#1;hophop"
2403-113 = "[s] \"시즈코의 펀치는 매섭지…….\""
2403-114 = "3;시즈코;04;그럴 리가 없잖아요?! 게다가 '밤놀이'라고 하면, 보통은 그런 걸 말하는 게 아니라, 그게…….\n#3;shake\n#3;em;[?!]"
2403-115 = "5;카에데;99;하지만 그런 이유가 아니라면, 나만 쏙 빼놓는 이유는 역시……."
2403-116 = "5;카에데;06;아직 내가 수행부에 들어온 지 얼마 안 된, 못 미더운 후배니까?"
2403-117 = "5;카에데;14;나, 선배들한테, 필요 없는 후배가 되어버린 걸까…….\n#5;em;[속상함]\n#5;stiff"
2403-118 = "1;피나;06;카에데……."
2403-119 = "3;시즈코;05;……하아. 그렇게까지 신경 쓰인다면, 직접 확인해보면 되잖아?"
2403-120 = "5;카에데;02;응?"
2403-121 = "3;시즈코;05;신경 쓰이는 걸 괜히 혼자서만 끌어안고 고민하기보다, 그런 건 직접 확인해보는 게 베스트야.\n#3;em;[반응]"
2403-122 = "3;시즈코;99;그럼 괜한 오해도 생기지 않을 테고."
2403-123 = "5;카에데;04;직접…… 확인을……?"

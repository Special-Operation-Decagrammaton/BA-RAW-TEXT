[translation]
2403-1 = "กลางคืนแสนสั้น เร่งมือกันเถอะ! 1"
2403-2 = "(กลางดึกหลังตี 1 เพียงเล็กน้อย...)"
2403-5 = "หืม..."
2403-7 = "(หาว... ง่วงจัง...)"
2403-9 = "(หืม เสียงเหรอ... เสียงอะไรน่ะ...?)"
2403-14 = "มิโมริ เธอเตรียมทุกอย่างที่ฉันบอกไว้เสร็จแล้วยังน่ะ?"
2403-15 = "ค่ะ เสร็จตามที่สึบากิจังบอกเลย อันนี้แล้วก็นี่ใช่ไหมคะ?"
2403-16 = "อื้อ เท่านี้ก็น่าจะพอแล้วล่ะ"
2403-17 = "เตรียมการเสร็จแล้ว... งั้นเราไปกันเลยไหม?"
2403-18 = "ค่ะ เดี๋ยวคาเอเดะจังจะตื่นเอา เราไปเงียบๆ ดีกว่านะคะ"
2403-22 = "(หืม... รุ่นพี่สึบากิ...? กับรุ่นพี่มิโมริ...?)"
2403-23 = "สองคนนั้น... ทิ้งฉันไว้แล้วไปไหนกันน่ะ... คร่อก..."
2403-26 = "เฮือก!!"
2403-27 = "เมื่อกี้ฝันไปหรอกเหรอ...?"
2403-31 = "คาเอเดะจังตื่นหรือยังคะ? "
2403-32 = "ฉันเพิ่งเริ่มเตรียมอาหารเช้า คาเอเดะจังถ้าตื่นแล้วมาล้างหน้าได้แล้วค่ะ"
2403-33 = "งือ... หาว..."
2403-34 = "หาววว..."
2403-35 = "สึบากิจังเองก็เหมือนกันเหรอคะ! เลิกงัวเงียแล้วมากินข้าวเช้าได้แล้วค่ะ "
2403-36 = "เร็วเข้า คาเอเดะจังเองก็มานี่เร็วเข้าเถอะค่ะ"
2403-37 = "หาว... จ้า... แม่จ๋า..."
2403-38 = "คะ?! แม่จงแม่จ๋าที่ไหนกันคะ ฉันไม่ใช่นะคะ...?!"
2403-39 = "คร่อกฟี้... "
2403-40 = "เดี๋ยวสิ สึบากิจัง...? มานอนตรงนี้ไม่ได้นะคะ?! นี่มันเช้าแล้วนะคะ?! ห้ามนอนต่ออีกสิคะ!"
2403-43 = "..."
2403-45 = "ร้านเฮียกคิยาโค"
2403-46 = "...วันนี้ก็เกิดเรื่องอีกแล้ว!! จะให้ฉันคิดยังไงได้กันล่ะ?! ใช่ไหมคุณครู?!"
2403-47 = "[s1] “จู่ๆ มาเรียกครูด้วยเสียงจริงจังแบบนั้น เกิดอะไรขึ้น...\"\n[s2] “ถึงจะมาถามว่าคิดยังไงกะทันหันแบบนี้ก็เถอะ...\""
2403-48 = "ไม่นะ~~! ตอบสนองแบบนั้นได้ยังไงกันล่ะ~!"
2403-49 = "ไม่นะ~~! ตอบสนองแบบนั้นได้ยังไงกันล่ะ~!"
2403-50 = "คุณครูเข้าใจมั้ย? นี่มันเรื่องใหญ่ไม่ใช่รึไง? เรื่องจริงจังนะ!"
2403-51 = "เฮือก เรื่องซีเรียสขนาดนั้นเลยเหรอคะ?! เรื่องที่พีน่าเพิ่งได้ยินไป ไม่รู้ว่ามันซีเรียสขนาดนั้นเลยนะคะ!"
2403-52 = "[s] “มันไม่ใช่เรื่องจริงจังขนาดนั้นสักหน่อย...?\""
2403-53 = "ไม่ใช่นะ นี่ เรื่อง สำ คัญ มากเลยนะ!"
2403-54 = "ฉันไม่อยากเชื่อเลยว่าพวกรุ่นพี่จะแอบออกไปกันสองคนโดยไม่มีฉัน นี่มันแย่มาก...#nร้ายกาจที่สุด... น่า... น่า..."
2403-55 = "น่าสงสัย? ใช่ไหมคะ?"
2403-56 = "ใช่แล้วล่ะ! ฉันอยากพูดคำนั้นแหละ!"
2403-57 = "น่าสงสัย! น่าสงสัยสุดๆ ไปเลย! ใช่ไหมล่ะ?!"
2403-58 = "ทำไมถึงปล่อยฉันไว้แล้วแอบออกไปข้างนอกกันสองคนหลังจากที่ฉันหลับด้วยล่ะ!#nไม่ว่าจะดูยังไงก็ต้องมีความลับกันแน่ๆ เลย...!"
2403-59 = "อย่างที่คิดไว้เลย... เก็บเป็นความลับกับสมาชิกและเป็นความลับที่รู้กันแค่สองคน!#nดูแล้วเรื่องนี้มีกลิ่นตุๆ นะคะ!"
2403-60 = "อื้ม! ใช่ไหมล่ะ?! พีน่าเข้าใจถูกต้องเลย! ให้สติกเกอร์ยกนิ้วติดดาวเลย!"
2403-61 = "โอ้! ขอบคุณค่ะ! คาเอเดะ!"
2403-62 = "[s] \"อืม ครูก็ไม่แน่ใจนะ...\""
2403-63 = "คุณครูนี่ใช้ไม่ได้เลย! อย่างนี้ก็เป็นยอดนักสืบที่มีความสามารถในการสันนิษฐานไม่ได้น่ะสิ?"
2403-64 = "คงจะลำบากแน่ๆ ถ้าถูกปล่อยให้อยู่ในเกาะห่างไกลกลางพายุหรือบ้านพักกลางเขาที่สะพานขาด#nแถมยังติดต่อกับโลกภายนอกไม่ได้!"
2403-65 = "[s] “ไม่... เรื่องแบบนั้นไม่ค่อยเกิดขึ้นหรอก\""
2403-66 = "ยังไงก็เถอะ! ฉันเป็นคนสุดเท่ น่ารักและมีความสามารถในการสันนิษฐานเป็นเลิศต่างจากคุณครู#nข้อสันนิษฐานด้วยสมองที่ชาญฉลาดของว่าที่สาวน้อยยอดนักสืบอย่างฉันก็คือ...!"
2403-69 = "เธอน่ะ เลิกยอตัวเองจนคนฟังตกใจได้แล้วล่ะ นี่อันมิตสึสตรอว์เบอร์รีที่สั่ง"
2403-71 = "ของคุณครูกับคาเอเดะ และนี่ของเธอสองที่"
2403-72 = "ว้าว หัวหน้า...!"
2403-73 = "ว้าว! อันมิตสึสตรอว์เบอร์รี่! น่ากินจัง!"
2403-74 = "[s] “ขอบใจนะ ชิซุโกะ\""
2403-75 = "ฉันแค่เอาเมนูที่ลูกค้าสั่งมาส่งให้ก็เท่านั้นเองค่ะ นี่เป็นช่วงที่ไม่ค่อยมีลูกค้าพอดี"
2403-76 = "แต่ว่านะพีน่า ถึงตอนนี้จะไม่ค่อยมีลูกค้าก็ควรจะเล่นให้พอดีนะ คุณครูเองก็ดูจะลำบากใจอยู่"
2403-77 = "หัวหน้า! ผิดแล้วค่ะ! นี่ไม่ใช่การเล่นค่ะ! ในฐานะพนักงานของร้านเฮียกคิยาโค#nฉันต้องรับฟังความกังวลของลูกค้าค่ะ!"
2403-79 = "นี่เป็นหน้าที่ของพนักงานร้านน้ำชาที่พีน่าเห็นในหนังต่อสู้บ่อยๆ ค่ะ!"
2403-80 = "ช่าย! ง่ำง่ำ! ปฏิบัติต่อลูกค้าให้ดีกว่านี้ซะด้วยล่ะ!"
2403-81 = "จู่ๆ ฉันก็ได้ยินเสียงแขกที่ไม่ได้รับเชิญ... อืม ไม่สิ เมื่อกี้ไม่ควรทำตัวไม่เป็นมืออาชีพ...#nเอาเป็นว่า... ฉันจะคิดทบทวนตัวเองใหม่ดูนะ"
2403-82 = "ถ้าตามที่เธอบอกล่ะก็ เอาล่ะนะ"
2403-83 = "อ่ะแฮ่ม นายท่าน~! เซ็ตอันมิตสึสตรอว์เบอร์รี่ที่สั่งได้แล้วค่ะ~#nฉันจะร่ายมนต์ที่ทำให้อร่อยยิ่งขึ้นนะคะ~!"
2403-84 = "โอม~ จงอร่อยเต็มเปี่ยม~ รสเยี่ยมทุกคำ..."
2403-85 = "อ่า ไม่เป็นไรหรอกนะ"
2403-86 = "หืม?"
2403-87 = "นั่นคือบริการที่ไม่จำเป็นที่เพิ่มเข้ามาในร้านค้าเพื่อเรียกเก็บค่าใช้จ่ายเพิ่มเติมจากลูกค้าใช่ไหมล่ะ?"
2403-88 = "ฉันรู้หมดทุกอย่าง! ฉันไม่เห็นด้วยกับอุบายที่โจ่งแจ้งนี้หรอก!"
2403-89 = "เดี๋ยวสิ! นี่เธอคิดว่าธุรกิจบริการเป็นแบบนั้นเหรอ?!"
2403-90 = "[s] “นี่คือ... ด้านมืดของธุรกิจบริการ...?\""
2403-91 = "แม้แต่คุณครูก็เป็นไปด้วยเหรอคะ?!"
2403-92 = "ยังไงก็เถอะ มาคุยเรื่องของฉันกันต่อดีกว่า ง่ำง่ำ ฉันมั่นใจว่าพวกรุ่นพี่ปิดบังบางอย่างจากฉันแน่ๆ..."
2403-94 = "ง่ำง่ำ เพราะอย่างนั้น ง่ำง่ำ..."
2403-95 = "นี่เธอน่ะ... กินให้หมดก่อนแล้วค่อยพูดสิ"
2403-97 = "ง่ำง่ำ เอื้อก ฮ่าาา! ก็เพราะอย่างงี้ไง!"
2403-98 = "เรื่องที่พวกรุ่นพี่ทำกันโดยไม่มีฉัน... มันก็มีแค่... ภารกิจของชมรมฝึกฝนที่เป็นความลับ#nถ้าฉันอยู่มันก็จะเป็นการรบกวน ไม่ผิดแน่!"
2403-99 = "ไม่สิ ภารกิจลับอะไรกัน ฉันไม่เข้าใจ เธอคิดมากไปรึเปล่า?"
2403-100 = "แต่ว่า... เรื่องที่เกิดขึ้นในวันนี้มันไม่ใช่ครั้งแรก..."
2403-101 = "เกิดเรื่องแบบนี้ขึ้นเมื่อวานซืน เมื่อสามวันก่อน... สัปดาห์ก่อนก็ด้วย ถึงห้าครั้งในหนึ่งสัปดาห์..."
2403-102 = "นั่นมันเกือบจะทุกวันเลยนี่..."
2403-103 = "พวกรุ่นพี่ปิดบังอะไรฉันอยู่กันนะ? ทำไมถึงแอบออกไปตอนกลางคืนกันสองคน? คุณครูคิดว่ายังไง?"
2403-104 = "[s] “คือว่า...\""
2403-105 = "เอ๋?! ฉันเพิ่งคิดได้จากสมองอันปราดเปรื่องของฉัน! จากการสันนิษฐานที่เยี่ยมยอดของฉัน นั่นก็คือ..."
2403-106 = "สิ่งที่ผู้หญิงที่เป็นผู้ใหญ่ทำ นั่นก็คือ...... เที่ยวกลางคืน?!"
2403-107 = "ก็เลยต้องเที่ยวกลางคืนเพื่อให้เป็นเลดี้ที่เพียบพร้อมงั้นเหรอ?!#nเพราะคาเอเดะยังเป็นแค่เด็กน้อย ไม่ได้เป็นเลดี้ที่เพียบพร้อม เลยให้ร่วมด้วยไม่ได้สินะ?!"
2403-108 = "ฉันคิดว่าไม่ใช่เพราะอย่างนั้นหรอกนะ"
2403-109 = "หัวหน้าชมรมเทศกาลรู้เรื่องนั้นได้ยังไงน่ะ? หัวหน้าเองก็เคยแอบไปเที่ยวกลางคืนเหรอ?"
2403-110 = "หัวหน้าเป็นอย่างนั้นเหรอคะ?!"
2403-111 = "หัวหน้าไปเที่ยวกลางคืน..."
2403-112 = "นายหญิงของร้านเฮียกคิยาโคไปตรวจตราถนนในเฮียกคิยาโคที่วุ่นวายทุกคืนงั้นเหรอคะ?!#nพีน่าประทับใจมากเลยค่ะ!"
2403-113 = "[s] “หมัดของชิซุโกะอันร้ายกาจที่ใช้ในการตรวจตรา...\""
2403-114 = "ไม่ใช่แน่นอนค่ะ! และก็ 'เที่ยวกลางคืน' มันไม่ใช่แบบนั้น มันคือ..."
2403-115 = "แต่ถ้าไม่ใช่เหตุผลนั้น อีกเหตุผลที่ฉันพอจะคิดออกก็คือ..."
2403-116 = "เพราะฉันเพิ่งเข้าชมรมฝึกฝนได้ไม่นาน เลยยังเป็นรุ่นน้องที่ไม่น่าไว้ใจงั้นเหรอ?"
2403-117 = "สำหรับรุ่นพี่ ฉันคงเป็นรุ่นน้องที่ไม่มีประโยชน์..."
2403-118 = "คาเอเดะ..."
2403-119 = "เฮ้อ... ถ้ากังวลขนาดนั้น ก็แล้วไม่ลองไปตรวจสอบด้วยตัวเองดูล่ะ?"
2403-120 = "หืม?"
2403-121 = "วิธีที่ดีที่สุดคือไปตรวจสอบด้วยตัวเอง ดีกว่ามานั่งกังวลเองแบบนี้นะ"
2403-122 = "จะได้ไม่เข้าใจผิดด้วย "
2403-123 = "ตรวจสอบ... ด้วยตัวเอง...?"
2403-124 = "ใช่ เอ้านี่ ฉันให้น้ำรามูเนะรสชาเขียว อย่าเอาแต่ทำหน้าบึ้งสิ ดื่มนี่แล้วกลับไปได้แล้วล่ะ"
2403-125 = "อย่างที่คิดไว้เลย! หัวหน้า! ถึงจะทำเป็นไม่ชอบใจ แต่ก็อ่อนโยนคอยใส่ใจอยู่เสมอ#nนี่แหละบอสของร้านเฮียกคิยาโคค่ะ!"
2403-126 = "[s] “ชิซุโกะ พึ่งพาได้จริงๆ!\""
2403-127 = "ไม่หรอก! ฉันแค่ทำหน้านิ่งก็เพื่อไม่ให้รบกวนลูกค้าคนอื่นค่ะ!"
2403-128 = "ตรวจสอบ... ด้วยตัวเอง...สินะ...! "
2403-129 = "อืม! เป็นความคิดที่ดีเลยล่ะ! สมแล้วที่เป็นหัวหน้าชมรมเทศกาล!#nฉันให้คะแนนเธอผ่านแบบคาบเส้น! ให้สติกเกอร์ยกนิ้วติดดาวเลย!"
2403-130 = "ถึงจะพูดอย่างนั้น... ฉันก็ไม่ดีใจสักนิดหรอกนะ! แล้วสติกเกอร์ยกนิ้วติดดาวนี่มันอะไรกัน?"
2403-131 = "อ๋อ! ฉันเป็นคนสร้างมันเอง! ไว้ให้คนที่ทำคะแนนได้คนละ 1 ชิ้น!#nถ้าสะสมสติกเกอร์ได้ครบจะมีของรางวัลด้วยนะ"
2403-132 = "ว้าว... รางวัลที่ว่าคืออะไรเหรอ?"
2403-133 = "ถ้าสะสมสติกเกอร์ครบ 10 ชิ้น ฉันจะไปร้องเพลงวันเกิดให้!"
2403-134 = "...ไม่เอา ของอย่างนั้นไม่อยากได้หรอก!"
2403-135 = "อ่า แต่ยังไงนี่ก็ช่วยแก้ปัญหาของเธอได้ใช่ไหม? กลับไปถามเหตุผลกับรุ่นพี่ของเธอด้วยตัวเอง..."
2403-136 = "อืม! ตัดสินใจได้แล้ว! ตามคำแนะนำของหัวหน้าชมรมเทศกาล! คืนนี้!#nฉันต้องตามรุ่นพี่เพื่อไปตรวจสอบด้วยตัวเอง!"
2403-137 = "ทำไมถึงสรุปไปเป็นอย่างนั้นได้ล่ะ?!"
2403-138 = "ทำไมพวกรุ่นพี่ถึงออกมาโดยที่ไม่มีฉันล่ะ... ฉันจะหาคำตอบด้วยตัวเอง!"
2403-139 = "เข้าใจค่ะ! พีน่าเองก็จะช่วยคาเอเดะด้วยค่ะ!"
2403-140 = "อ๊ะ คุณครูก็จะช่วยฉันด้วยใช่มั้ย? นักเรียนสุดน่ารักขอร้องเองเลยนะ จะช่วยฉันใช่ไหม? หืม?"
2403-141 = "[s] \"หืม ก็นะ...\""
2403-142 = "ในเมื่อตัดสินใจได้แล้วก็ไปกันเลย! อ๋อ! อันมิตสึอร่อยมากเลย!"
2403-145 = "เธอนี่อยู่เฉยๆ ไม่ได้เลยสินะ เฮ้อ จริงๆ เลย... ให้มันได้อย่างงี้สิ"
2403-146 = "ถ้างั้นก็ ขอรบกวนด้วยนะคะคุณครู~♡"
2403-147 = "[s] \"ได้สิ ตามนั้น...!\""
2403-150 = "(เมื่อถึงตอนกลางคืน...)"
2403-154 = "อืม..."
2403-155 = "...พรึ่บ!"
2403-156 = "รุ่นพี่สึบากิกับรุ่นพี่มิโมริ...ไปกันแล้วเหรอ?"
2403-157 = "ถ้างั้นฉันก็จะ... ตามไปด้วย!"
2403-160 = "คุณครู! ทางนี้ ทางนี้!"
2403-161 = "[s] \"อ๊ะ คาเอเดะ อย่าเพิ่งหลับ ตื่นก่อน\""
2403-162 = "หาว~ คิดว่าฉันจะทำตามที่สัญญาไว้ไม่ได้เหรอ? ถึงจะเห็นอย่างนี้แต่ฉันก็ไม่ใช่เด็กแล้วนะ!#nฉันคือเลดี้แสนน่ารักที่มีเป้าหมายจะเป็นเลดี้ที่เพียบพร้อม!"
2403-163 = "ฉันเตรียมตัวดื่มกาแฟดำมาถึง 5 แก้วเพื่อจะได้ตื่นมาคอยดูรุ่นพี่มิโมริทั้งคืนเลยนะ!"
2403-164 = "รุ่นพี่มิโมริบอกว่าปกติห้ามฉันดื่มนี่เด็ดขาด แต่วันนี้มันไม่ปกติแล้ว!"
2403-165 = "เตรียมพร้อมมาดีสุดๆ! ฉันนี่อัจฉริยะจริงๆ!"
2403-166 = "หาววว..."
2403-167 = "[s] \"อืม เหมือนจะมีลางสังหรณ์ใจไม่ดีนะ...\""
2403-168 = "หืม? ลาง? พูดอะไรน่ะ?"
2403-169 = "เอ๋?! ไม่ใช่เวลามาทำเรื่องแบบนี้นะ คุณครู!"
2403-172 = "รีบไปหาพวกรุ่นพี่ก่อนจะสายไปเถอะ! ตื่นเต้นจัง ออกไปสะกดรอยกันเลย!"

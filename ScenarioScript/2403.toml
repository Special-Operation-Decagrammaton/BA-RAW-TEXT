2403-34 = "5;츠바키;07;후아아암……\n#5;a"
2403-35 = "3;미모리;05;츠바키 쨩도 마찬가지예요! 꾸벅꾸벅 졸지만 말고, 아침 먹기 전에 준비를 끝내야죠. \n#3;em;[반응]"
2403-36 = "3;미모리;01;자자, 카에데 쨩하고 얼른 다녀오세요.\n#3;m2"
2403-37 = "5;츠바키;99;후아아암…… 네에……. 엄마……\n#5;em;…"
2403-38 = "3;미모리;04;네엣?! 저, 저는 엄마가 아니라구요……?!\n#3;shake\n#3;em;[?!]"
2403-39 = "5;츠바키;99;쿠울……."
2403-40 = "3;미모리;04;잠깐, 츠바키 쨩? 저기 츠바키 쨩……? 여기서 또 자버리는 건가요?! 벌써 아침이라구요?! 또 잠들면 안돼요!\n#3;hophop\n#3;em;[반응]"
2403-41 = "5;츠바키;99\n3;미모리;04\n#3;d\n#5;d\n#wait;1000"

2403-31 = "3;미모리;03;카에데 쨩. 일어났나요? \n#3;a\n#3;em;[반응]"
2403-32 = "3;미모리;01;지금 막 아침 준비하고 있으니까. 일어났으면 세수부터 하고 오세요."

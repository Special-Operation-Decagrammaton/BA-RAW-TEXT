[translation]
10002200-1 = "#title;후일담;밀레니엄 60 폭죽"
10002200-2 = "#wait;1500"
10002200-3 = "#na;밀레니엄 60폭탄;아, 안녕하세요. 밀레니엄 60 폭탄입니다. 밀레니엄 사이언스 스쿨 제입니다."
10002200-4 = "#na;밀레니엄 60폭탄;이, 일단은 네이팜 탄이에요! 키, 키는 23cm고 몸무게는 44kg입니다."
10002200-5 = "#na;밀레니엄 60폭탄;……나이는 비밀이에요."
10002200-6 = "#na;밀레니엄 60폭탄;아하하……. 왜 바다의 집 매점에 네이팜 탄 같은 게 있나 싶으시죠?"
10002200-7 = "#na;밀레니엄 60폭탄;그……. 원래는 폐건물 철거용으로 태어났는데, 그 일을 다른 중장비가 맡게 돼서 일거리가 없어져 버렸거든요."
10002200-8 = "#na;밀레니엄 60폭탄;이후로도 학교 내에선 제가 나설 일이 없어졌기 때문에, 이리저리 자리를 옮기다……. 결국 여기까지 오게 됐습니다."
10002200-9 = "#na;밀레니엄 60폭탄;……네. 벌써 여기 온 지도 꽤 오래 됐네요."
10002200-10 = "#na;밀레니엄 60폭탄;이 곳 바다는 예쁘고, 바람은 시원합니다. 아주 좋은 곳이에요."
10002200-11 = "#na;밀레니엄 60폭탄;물론 저에게 어울리는 곳은 아닌 것 같지만요. 가게에 온 뒤로도 계속 먼지만 쌓여가고 있답니다."
10002200-12 = "#na;밀레니엄 60폭탄;다른 아이들……. 특히 저기 폭죽 친구들은 하루가 멀다 하고 사람들이 데려가는데 말이에요."
10002200-13 = "#na;밀레니엄 60폭탄;자기가 할 일을 완수하며 모두에게 즐거운 추억을 주는 모습을 보고 있으면, 멋지기도 하고 부럽기도 합니다."
10002200-14 = "#na;밀레니엄 60폭탄;저도 이런 모습이 아니라 폭죽으로 태어났다면, 사람들을 즐겁게 할 수 있었을까요?"
10002200-15 = "#na;밀레니엄 60폭탄;그렇게 생각하면 조금, 아주 조금은 저에게도 바라는 것이 생기려고 합니다."
10002200-16 = "#na;밀레니엄 60폭탄;그것은……."
10002200-17 = "#na;수영복 불량배 SMG;아저씨!! 여기 폭죽! 폭죽 더 내놔!!"
10002200-18 = "#na;밀레니엄 60폭탄;……? 어라, 손님들이네요."

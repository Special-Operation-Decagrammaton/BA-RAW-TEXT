10002200-23 = "3;아즈사 수영복ND;06;아니. 인정할 수 없다. 이것들은 우리 측에서 먼저 선택했어. 무단으로 탈취하려 한다면 물리적 충돌도 불사할 것.\n#3;em;[빠직]\n#3;stiff"
10002200-24 = "5;수영복 불량배 SMG;02;이, 이런 빌어먹을. 여기서까지 우릴 방해하다니, 이젠 진짜 누가 불량배인지 모르겠네…….\n#5;al\n#3;m1\n#5;em;[속상함]"
10002200-25 = "5;수영복 불량배 SMG;01;아저씨!! 그럼 이건? 이것도 파는 거야?\n#5;em;[반응]\n#5;m3\n#3;dl"
10002200-26 = "5;수영복 불량배 SMG;01;이 대왕만 한 폭죽!\n#5;m5"
10002200-27 = "#na;밀레니엄 60폭탄;대왕 만한 폭죽? ……설마 저를 말하는 걸까요?"
10002200-28 = "1;폭죽가게 주인;00;허허허. 학생, 잘 못 골랐어. 그건 폭죽이 아니야. 네이팜 폭탄이지.\n#1;em;[재잘]\n#1;ar"
10002200-29 = "#3;hide\n5;수영복 불량배 SMG;05;뭔 상관이야!\n#5;em;[빠직]"
10002200-30 = "#3;hide\n5;수영복 불량배 SMG;02;환하게 터지기만 하면 되지! 그래서 터지냐고, 안 터지냐고!?\n#5;hophop"
10002200-31 = "1;폭죽가게 주인;00;허허허. 그야 터지긴 환하게 터지지. 그래 봬도 네이팜이니까 말이야. 그 한 발이면 하늘이 대낮처럼 훤해질 게다.\n#1;em;…"
10002200-32 = "#na;밀레니엄 60폭탄;……어?"
10002200-33 = "5;수영복 불량배 SMG;02;좋아. 그럼 이거 살 테니까! 돈은 이 정도면 됐지? \n#5;em;[반응]"
10002200-34 = "5;수영복 불량배 SMG;01;가져간다!!"
10002200-35 = "#na;밀레니엄 60폭탄;……어어?"
10002200-36 = "1;폭죽가게 주인;00;이, 이봐. 진짜 쓰려고? 그건 폭죽이 아니라 폭탄이잖아?\n#1;em;[?!]\n#1;shake"
10002200-37 = "5;수영복 불량배 SMG;02;뭔 소리야? 폭탄이든 폭죽이든 잘만 터지면 그만이지. 허공에서 터지면 다 폭죽이야!!"
10002200-38 = "5;수영복 불량배 SMG;03;아무튼 그럼 간다! 그럼 우린 바빠서 이만!!\n#5;hophop\n#5;em;[반응]"

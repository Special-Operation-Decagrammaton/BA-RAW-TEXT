[translation]
10002200-1 = "ย้อนวันวาน;ดอกไม้ไฟ มิลเลเนียม 60"
10002200-3 = "สะ...สวัสดี ฉันคือระเบิด มิลเลเนียม 60 ฉันถูกสร้างขึ้นโดยโรงเรียนวิทย์มิลเลเนียม"
10002200-4 = "ละ...และเป็นระเบิดนาปาล์มด้วยนะ! สะ...ส่วนสูง 23 ซม. น้ำหนัก 44 กิโลกรัม"
10002200-5 = "อะ...อายุเป็นความลับ"
10002200-6 = "อ่ะฮะฮะ... คงสงสัยใช่ไหมล่ะว่าระเบิดนาปาล์มอย่างฉันมาทำอะไรที่ร้านริมทะเล"
10002200-7 = "คือว่า... ที่จริงหน้าที่เดิมของฉันคือก็คือทำลายพวกอาคารรกร้าง แต่ว่าตอนนี้มีการพัฒนา#nอุปการณ์ที่ดีขึ้นกว่าฉันขึ้นมา ฉันเลยว่างงานอยู่พอดี"
10002200-8 = "หลังจากนั้นฉันก็ไม่มีงานที่โรงเรียนอีก เลยเตร็ดเตร่ไปเรื่อยๆ... และสุดท้ายก็มาถึงที่นี่"
10002200-9 = "อืม... ที่จริงฉันก็อยู่ที่นี่มานานแล้วล่ะ"
10002200-10 = "ทะเลที่นี่สวยงามมาก ลมก็พัดเย็นสบายดีด้วย เป็นสถานที่ที่ดีมากเลย..."
10002200-11 = "แน่นอนว่าที่นี่คงเป็นสถานที่ที่ไม่เหมาะกับฉันเท่าไร หลังจากมาที่ร้านนี้ฉันก็อยู่เฉยๆ#nจนฝุ่นจับไปหมดแล้ว"
10002200-12 = "พวกของอื่นๆ... โดยเฉพาะพวกดอกไม้ไฟตรงนั้น มักจะมีคนมาเลือกไปทุกวันเลยล่ะ"
10002200-13 = "พอเห็นพวกเธอได้ทำหน้าที่สร้างความทรงจำดีๆ ให้กับทุกคนแบบนั้น มันสุดยอดมากๆ#nแล้วก็น่าอิจฉามากเลย"
10002200-14 = "ถ้าฉันไม่ใช่ระเบิดนาปาล์ม แต่เป็นดอกไม้ไฟเหมือนคนอื่นๆ#nก็คงจะทำให้ผู้คนมีรอยยิ้มที่สนุกสนานได้ใช่ไหมนะ?"
10002200-15 = "พอคิดแบบนั้นก็รู้สึกเศร้านิดหน่อยแล้ว บางที...ฉันคิดว่าวันพรุ่งนี้อาจจะมีเรื่องดีๆ สำหรับฉันก็ได้"
10002200-16 = "นั่นก็คือ..."
10002200-17 = "นี่ลุง!! ฉันอยากได้ดอกไม้ไฟแบบนี้อีก!!"
10002200-18 = "...? โอ๊ะ? มีลูกค้ามาด้วยล่ะ!"
10002200-23 = "เดี๋ยวสิ ฉันยอมไม่ได้ ดอกไม้ไฟพวกนี้ พวกเราเลือกเอาไว้ก่อนแล้ว อย่าคิดว่าจะมาชุบมือเปิบ#nแล้วจะหนีไปได้หน้าตาเฉยนะ"
10002200-24 = "บะ...บ้าจริง ยัยเปี๊ยกพวกนี้ตามมาขัดขวางพวกเราถึงที่นี่เลยเหรอ#nฉันว่าพวกนี้ต่างหากที่เป็นพวกชอบก่อกวน..."
10002200-25 = "นี่ลุง!! แล้วอันนี้ล่ะ? อันนี้ขายรึเปล่า?"
10002200-26 = "ดอกไม้ไฟไซซ์บิ๊กเบิ้มนั่นน่ะ!"
10002200-27 = "ดอกไม้ไฟไซซ์บิ๊กเบิ้ม? หรือว่า... พวกเขาหมายถึงฉันงั้นเหรอ?"
10002200-28 = "โฮะๆ ขอโทษด้วยนะคุณหนู นั่นไม่ใช่ดอกไม่ไฟหรอก นั่นมันระเบิดนาปาล์มต่างหาก"
10002200-29 = "ใครสนกันล่ะ!"
10002200-30 = "แค่ระเบิดให้อลังการงานสร้างก็พอแล้วนี่! แล้วไอ้นั่นมันระเบิดได้รึเปล่าล่ะ!?"
10002200-31 = "โฮะๆ ถ้ามันระเบิดล่ะก็มันจะสว่างมากเลยล่ะ เห็นเก่าๆ แบบนี้แต่มันก็คือระเบิดนาปาล์มนะ#nถ้ามันระเบิดล่ะก็คงสว่างพอๆ กับดวงอาทิตย์เลย"
10002200-32 = "หืม...?"
10002200-33 = "ดีล่ะ ถ้างั้นพวกเราจะซื้อเจ้านี่ไป! เงินแค่นี้พอมั้ย? "
10002200-34 = "เอาไปล่ะนะ!!"
10002200-35 = "โอ๊ะ...?"
10002200-36 = "ดะ...เดี๋ยวสิ จะเอาไปใช้จริงๆ เรอะ? นั่นมันไม่ใช่ดอกไม้ไฟแต่เป็นระเบิดของจริงนะ"
10002200-37 = "พล่ามอะไรอีกเนี่ย? ก็บอกแล้วไงว่าจะระเบิดหรือดอกไม้ไฟก็ช่างหัวมันสิ ขอแค่มันระเบิดได้ก็พอแล้ว#nอะไรที่มันระเบิดบนฟ้าได้ก็คือดอกไม้ไฟนั่นแหละ!!"
10002200-38 = "เอาเป็นว่าฉันขอไปล่ะนะ! พวกเรากำลังยุ่งอยู่ บาย!!"
10002200-43 = "ถึงที่เธอพูดมันจะไม่ผิดก็เถอะ..."
10002200-45 = "สวัสดีค่ะ ฉันคือระเบิด มิลเลเนียม 60"
10002200-46 = "..."
10002200-47 = "ไม่สิ... ฉันคือดอกไม้ไฟ มิลเลเนียม 60"

[translation]
10002200-1 = "後日談其七;向天空許願"
10002200-3 = "你，你好。我是千年製爆彈60號。#n產自千年科學學園。"
10002200-4 = "那，那個，是顆凝固汽油彈！#n全，全長23cm，體重44kg……"
10002200-5 = "……年齡是祕密。"
10002200-6 = "為什麼海之家會有凝固汽油彈……你可能會這麼想吧？"
10002200-7 = "我本來是為了某種用途被製造出來的，不知因為什麼原因而被擱置不用……"
10002200-8 = "所幸我並沒有遭到「廢棄」，歷經幾位善心人士轉手後……最後來到了這裡。"
10002200-9 = "……是，來到這裡之後，已經過了好一段時間了。"
10002200-10 = "這裡有著美麗的大海和涼爽的風，是個很棒的地方。"
10002200-11 = "不過可能是因為我和這裡顯得有些格格不入，因此總是乏人問津，總在角落積灰塵。"
10002200-12 = "其他夥伴……尤其是那邊的煙火朋友，每天都會被各式各樣的客人帶走。"
10002200-13 = "看著他們盡自己應盡的職責，讓人們留下快樂回憶的模樣……老實說確實有些羨慕。那真是段佳話。"
10002200-14 = "如果我也是以煙火的型態誕生，是否也能和他們一樣讓大家開心呢？"
10002200-15 = "每當我心裡這麼想，總會覺得有些沉重。"
10002200-16 = "有朝一日，我也能──"
10002200-17 = "大叔！！這個我要了！還有其他煙火就全部拿出來吧！"
10002200-18 = "……哎呀，看來今天來了名熱情的客人呢？"
10002200-23 = "先等一下。那些是我們先選的。#n如果打算搶走的話，免不了會發生物理衝突。"
10002200-24 = "唔……體力已經所剩不多了，呿……！"
10002200-25 = "大叔！！那這個呢？這也是商品嗎？"
10002200-26 = "這個超大煙火！"
10002200-27 = "超大煙火……？#n該不會是在說我吧？"
10002200-28 = "哼哼，這位同學。#n雖然這不該大聲張揚……那不是煙火，是凝固汽油彈哦。"
10002200-29 = "無所謂！"
10002200-30 = "只要能華麗地爆開就行！名字什麼的不重要！"
10002200-31 = "那當然是會華麗地爆炸囉。#n甚至只要一發，天空就會亮得跟白天一樣啊。"
10002200-32 = "……咦？"
10002200-33 = "好。那就買這個了！這些錢夠嗎？"
10002200-34 = "不用找了！！"
10002200-35 = "……咦咦？？？"
10002200-36 = "先，先等一下。你們真的要用？#n那個不是煙火而是炸彈啊……"
10002200-37 = "反正都會在空中爆炸，炸彈跟煙火也差不多啦！"
10002200-38 = "總之我拿走啦！我們很忙，先走一步了！！"
10002200-43 = "……嘛，好像也沒說錯。"
10002200-45 = "……你好。我是千年製爆彈60號。"
10002200-46 = "……"
10002200-47 = "更正，是千年製煙火60號。"

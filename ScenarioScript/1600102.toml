[translation]
1600102-1 = "我行我素的她"
1600102-2 = "（哐啷哐啷）"
1600102-3 = "啊，主人歡迎回來！我馬上幫您帶位……"
1600102-4 = "……咦？"
1600102-5 = "哇，真的是主人！？您來了呀，我一直在等您唷！"
1600102-6 = "啊，但是還是先帶您到位置上吧。好嗎，主人？"
1600102-7 = "……嗯？主人？"
1600102-8 = "咦，說到主人……"
1600102-9 = "[s] 「……明日奈？」"
1600102-10 = "……雖然在這裡所有的客人都是用主人來稱呼的，但主人從一開始就是明日奈的主人對吧？"
1600102-11 = "主人雖然是主人，但要怎麼稱呼主人比較好呢？"
1600102-12 = "比主人更主人的主人？還是主人之上的主人？還是叫主人就好？"
1600102-13 = "但是主人在成為主人之前就是主人了但又同時是主人……？"
1600102-14 = "[s1] 「比主人更主人的主人還是主人之上的主人……？」\n[s2] 「這是哪，我是誰……」"
1600102-15 = "啊哈哈哈！主人那是什麼表情！真可愛！"
1600102-16 = "啊哈哈哈！主人那是什麼表情！真可愛！"
1600102-17 = "唔嗯，真複雜對吧？"
1600102-18 = "但是總之主人就是主人，就跟平常一樣叫您主人囉。"
1600102-19 = "嗯？你問我是不是在這裡打工？"
1600102-20 = "沒有，我只是客人喔！只是可能因為我穿著女僕裝，大家都把我當成店員了的樣子。"
1600102-21 = "難得到女僕咖啡廳來，就順便配合他們了。"
1600102-22 = "嗯？……時薪？合約？"
1600102-23 = "沒有啊？只是好玩而已。"
1600102-24 = "啊哈，那是什麼表情！啊哈哈哈哈！"
1600102-25 = "啊──，果然和主人在一起就很有趣呢。"
1600102-26 = "……嗯？"
1600102-27 = "叫你出來的理由？"
1600102-28 = "……啊，對吼！是我叫主人出來的對吧？"
1600102-29 = "我沒有忘記唷，這種小事別在意別在意！"
1600102-30 = "話說回來，是為什麼呢……"
1600102-31 = "啊，對了對了！"
1600102-32 = "今天要完成一個任務才行，是追捕某個人物的任務……"
1600102-33 = "所以就到咖啡廳來了！"
1600102-34 = "……嗯？這好像沒什麼邏輯？完全搞不懂……？"
1600102-35 = "為什麼執行任務要到咖啡廳來？"
1600102-36 = "嗯，那個……該怎麼說才好呢，唔……"
1600102-37 = "……突然這麼覺得？"
1600102-38 = "總覺得跟主人在這裡的話，就會有辦法的感覺？"
1600102-39 = "嗯，大概就是這樣！"
1600102-40 = "咦，就算叫我認真一點……"
1600102-41 = "不～要～我想和主人玩！這樣比較好～！"
1600102-42 = "還是說，難道主人很忙嗎？明明很忙還是被我硬叫出來了？"
1600102-43 = "啊，不是那樣？太好了，真幸運！☆"
1600102-44 = "嗯──，那既然主人也來了，打工就到此結束──"
1600102-47 = "嘿咻，讓我坐隔壁吧──！"
1600102-48 = "啊，女僕小姐！麻煩點餐～！"
1600102-49 = "[s3] 「一下就從女僕變成主人了。」\n[s4] 「在這裡玩真的沒問題嗎？任務呢？」"
1600102-50 = "沒問題沒問題～這裡的甜點套餐非常好吃唷！"
1600102-51 = "沒問題沒問題～這裡的甜點套餐非常好吃唷！"
1600102-52 = "（……哐啷哐啷）"
1600102-53 = "啊，歡迎回來，主人～！"
1600102-54 = "……"
1600102-55 = "……呼。好，看來是成功甩掉他們了呢。暫時就先待在這裡吧。"
1600102-56 = "真是難纏的傢伙們……"
1600102-57 = "位置……"
1600102-58 = "還有空位嗎……嗯，怎麼回事？女僕……？"
1600102-60 = "喂，你為什麼坐在這裡，還不趕快去幫客人點餐？"
1600102-61 = "咦？我？"
1600102-62 = "為什麼女僕會坐在位置上點菜啊……搞什麼？"
1600102-63 = "還不趕快起來……？"
1600102-64 = "……？"
1600102-65 = "……？"
1600102-66 = "[s] 「……明日奈？」"
1600102-67 = "……！"
1600102-68 = "發現目標！！"
1600102-69 = "呀吼──！在這裡碰到我就是你完蛋的時候！覺悟吧！！"
1600102-70 = "竟，竟然有埋伏！？不可能！！"
1600102-71 = "等……！"
1600102-75 = "（哐噹，咚滋，咚唰！）"
1600102-77 = "（結果明日奈抓住了那個男的，完成了任務）"
1600102-78 = "（問明日奈是不是一開始這麼計畫的……）"
1600102-79 = "……"
1600102-81 = "怎麼可能──！"
1600102-83 = "（……）"
1600102-84 = "（……總之任務結束，跟心情很好的明日奈一起品嘗美味的甜點，度過了這段時間）"

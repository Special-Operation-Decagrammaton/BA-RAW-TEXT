[translation]
1600102-1 = "เด็กสาวสายติสท์"
1600102-2 = "กรุ๊งกริ๊ง กรุ๊งกริ๊ง"
1600102-3 = "เชิญค่ะ ฉันจะพาไปที่โต๊ะเลยค่ะ..."
1600102-4 = "อ้าว?"
1600102-5 = "นายท่านนี่นา!? นายท่านมาจริงๆ ด้วย! กำลังรออยู่เลย!"
1600102-6 = "จริงสิ ฉันควรพานายท่านไปที่โต๊ะก่อน"
1600102-7 = "นายท่าน...?"
1600102-8 = "อืม... นายท่าน..."
1600102-9 = "[s] \"มีอะไรผิดปกติเหรออาสึนะ?\""
1600102-10 = "ปกติแล้วลูกค้าที่มาที่นี่จะถูกเรียกว่านายท่าน... แต่นายท่านก็เป็นนายท่านอยู่แล้วนี่นา?"
1600102-11 = "ปกตินายท่านเป็นนายท่านอยู่แล้ว งั้นฉันควรเรียกว่าอะไรนะ?"
1600102-12 = "นายท่านที่เป็นนายท่านอยู่แล้ว? หรือว่าจะเป็นนายท่านของนายท่าน? หรือแค่นายท่านเฉยๆ ก็พอ?"
1600102-13 = "นายท่าน... นายท่านของนายท่าน...?"
1600102-14 = "[s1] \"นายท่านของนายท่านที่เป็นนายท่าน\"\n[s2] \"ตกลงครูคือใครนะ...?\""
1600102-15 = "อะฮ่ะฮ่า! ดูทำหน้าเข้าสิ! ทำหน้าอึนแบบนี้แล้วน่ารักจังเลย!"
1600102-16 = "อะฮ่ะฮ่า! ดูทำหน้าเข้าสิ! ทำหน้าอึนแบบนี้แล้วน่ารักจังเลย!"
1600102-17 = "ใช้ชื่อแบบนั้นแล้วมันน่าสับสนใช่มั้ยล่ะ?"
1600102-18 = "ต่อให้ชื่อจะยาวแค่ไหน ยังไงก็เป็นนายท่านอยู่ดี ฉันจะเรียกว่านายท่านเฉยๆ แล้วกัน"
1600102-19 = "หือ? เหมือนฉันมาทำงานที่นี่มากกว่ามาเที่ยวงั้นเหรอ?"
1600102-20 = "ฉันมาเที่ยวน่ะถูกแล้ว! แต่พอใส่ชุดเมด คนอื่นก็เลยคิดว่าเป็นพนักงานของที่นี่น่ะ"
1600102-21 = "แถมยังเป็นคาเฟ่เมดอีก ฉันก็เลยทำตัวกลมกลืนไป ถือว่าช่วยคนอื่นด้วย"
1600102-22 = "หืม? ...ค่าแรงเหรอ?"
1600102-23 = "ไม่ได้หรอก ฉันทำเอาแค่สนุกเท่านั้นแหละ"
1600102-24 = "อะฮ่ะฮ่า! ดูสิๆ ทำหน้ามึนอีกแล้ว! ฮ่ะฮ่ะฮ่ะฮ่าา!"
1600102-25 = "ฮ่ะฮ่าา... นายท่านเนี่ยอยู่ด้วยแล้วสนุกตลอดเลย"
1600102-26 = "...หืม?"
1600102-27 = "สงสัยว่าทำไมถึงชวนมาที่คาเฟ่น่ะเหรอ?"
1600102-28 = "...อ่อ จริงสิ! ฉันเป็นคนชวนนายท่านมาที่นี่นี่นา!"
1600102-29 = "คิดว่าฉันลืมไปเหรอ? ไม่ลืมหรอก ก็แค่ไม่ค่อยสนใจเรื่องเล็กๆ น้อยๆ เท่านั้น!"
1600102-30 = "ช่างเถอะน่า ฉันชวนมาทำไมนะ..."
1600102-31 = "อ่อ! ใช่แล้ว!"
1600102-32 = "วันนี้เป็นวันแห่งการทำภารกิจลับน่ะ ฉันต้องติดตามและจับตัวบางคนให้ได้..."
1600102-33 = "ก็เลยชวนนายท่านมานั่งเล่นที่คาเฟ่น่ะ ฮิฮิฮิ"
1600102-34 = "...หืม? นั่นไม่ถือว่าเป็นคำตอบเหรอ? พูดอะไรเนี่ย... ไม่เห็นจะเข้าใจเลย"
1600102-35 = "อยากรู้ว่ามาทำภารกิจลับอะไรที่คาเฟ่อย่างนั้นน่ะเหรอ?"
1600102-36 = "อืม~ นั่นสินะ... เป็นคำถามที่ดีเลย... จะตอบยังไงดีล่ะ..."
1600102-37 = "...ไม่รู้สิ?"
1600102-38 = "ฉันแค่คิดว่าถ้าได้มานั่งเล่นที่นี่กับนายท่าน ภารกิจลับก็น่าจะสำเร็จได้?"
1600102-39 = "อืม... มันเป็นความรู้สึกของฉันน่ะ!"
1600102-40 = "เอ๋~? ฉันควรออกไปทำงานมากกว่าเหรอ?"
1600102-41 = "ไม่เอาหรอก~! ฉันจะอยู่ที่นี่กับนายท่าน ถ้าไม่ได้อยู่ด้วยกัน ฉันคงรู้สึกไม่ดี"
1600102-42 = "หรือว่าวันนี้นายท่านงานยุ่งงั้นเหรอ? ฉันชวนโดยไม่ได้ถามก่อนเลย"
1600102-43 = "อ่า... ไม่ได้ยุ่งหรอกเหรอ? งั้นก็โล่งอกไปที โชคดีจัง ☆"
1600102-44 = "อืม ไหนๆ ก็เหมือนนั่งเดตกันแล้ว งั้นฉันควรเลิกทำเป็นทำงานพาร์ทไทม์ดีมั้ย?"
1600102-47 = "ฮึบ! นั่งตรงข้ามแบบนี้ได้ใช่มั้ย?"
1600102-48 = "เอ่อ คุณเมด! ขอสั่งอาหารด้วยค่ะ!"
1600102-49 = "[s3] \"เปลี่ยนจากเมดเป็นนายท่านแล้วเหรอเนี่ย...\"\n[s4] \"มาเที่ยวเล่นอยู่แบบนี้ได้จริงๆ เหรอ?\""
1600102-50 = "บอกไปแล้วไงว่าอย่าสนใจเรื่องเล็กๆ น้อยๆ~ จริงสิ! <เซ็ตของหวานดิจิทัล> ของที่นี่อร่อยมาก..."
1600102-51 = "บอกไปแล้วไงว่าอย่าสนใจเรื่องเล็กๆ น้อยๆ~ จริงสิ! <เซ็ตของหวานดิจิทัล> ของที่นี่อร่อยมาก..."
1600102-52 = "...กรุ๊งกริ๊ง"
1600102-53 = "ค่า~ เชิญค่ะนายท่าน~"
1600102-54 = "......"
1600102-55 = "...เฮ้อ โล่งอกไปที ทิ้งระยะห่างเท่านี้ก็คงจะพอแล้วนะ ถ้ามาอยู่ที่นี่คงตามตัวไม่เจอ#nงั้นขอซ่อนตัวหน่อยแล้วกัน"
1600102-56 = "เล่นตามตัวกันซะขนาดนี้ ไม่เหนื่อยบ้างรึไงนะ เจ้าพวกนั้น..."
1600102-57 = "ไหนดูซิ มีที่ว่างบ้างมั้ย..."
1600102-58 = "อ่า ตรงนั้นว่างสินะ เอ๋? นั่นเมดนี่นา...?"
1600102-60 = "นี่! มัวแต่นั่งทำอะไรอยู่? ไม่รับออเดอร์เหรอไง?"
1600102-61 = "หืม? พูดกับฉันเหรอ?"
1600102-62 = "ก็ใช่น่ะสิ! เป็นเมดแล้วทำไมไปนั่งเลือกขนมอยู่ตรงนั้นเล่า!? มีสติดีอยู่รึเปล่า!?"
1600102-63 = "ยังไม่มาดูแลลูกค้าอีก...!"
1600102-64 = "......?"
1600102-65 = "......?"
1600102-66 = "[s] \"อาสึนะ?\""
1600102-67 = "......!"
1600102-68 = "เจอเป้าหมายแล้ว!!"
1600102-69 = "เยส!! สุดท้ายก็เจอกันที่นี่! ไม่รอดแล้วล่ะ~!!"
1600102-70 = "ทะ... ทำไมมาหลบซ่อนอยู่ที่นี่ล่ะ!? เป็นไปไม่ได้...!!"
1600102-71 = "เดี๋ยวก่อน...!"
1600102-75 = "ตึงตังตึงตัง!!"
1600102-77 = "(สุดท้ายชายที่น่าสงสัยก็ถูกอาสึนะจับตัว และแผนการลับของอาสึนะก็สำเร็จอย่างสวยงาม)"
1600102-78 = "(แต่เมื่อถามอาสึนะว่าเดาเส้นทางของชายที่น่าสงสัยไว้หรือเปล่า...)"
1600102-79 = "......"
1600102-81 = "ก็ไม่นะ!"
1600102-83 = "(...)"
1600102-84 = "(...จากนั้นก็ใช้เวลาที่เหลือนั่งกินของหวานกับอาสึนะ)"

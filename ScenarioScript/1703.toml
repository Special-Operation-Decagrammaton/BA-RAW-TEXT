1703-55 = "#place;성 테레사 종합병원 병실"
1703-56 = "#na;다음 날, 아침."
1703-57 = "5;하나에;03;여러분, 구호기사단이 도착했어요!\n#5;a\n#5;em;[반짝]\n#5;greeting"
1703-58 = "1;세리나;03;좋은 아침이에요, 여러분. 지난 밤에는 잘 주무셨나요?\n#1;greeting\n#1;a"
1703-59 = "#na;환자 A;아니……. 어제는 위층에서 밤새도록 소음이 이어져서 한숨도 자지 못했어……."
1703-60 = "#na;환자 B;한동안 요란한 총소리가 이어지더니, 마지막에는 무언가 폭탄 같은 게 터졌다니까! 난리도 그런 생난리가 따로 없었어!"
1703-61 = "#na;환자 A;그러고보니 어젯밤에는 간호사들 대신 두 사람이 당직을 섰다며? 뭔가 수상한 사람은 없었어?"
1703-62 = "1;세리나;04;그, 글쎄요……. 저희는 유령이 나온다는 말에 무서워서 4층 근처에는 가까이 가지도 않았거든요. #n포, 폭탄은 잘 모르겠네요.\n#1;stiff\n#1;em;[땀]"
1703-63 = "#na;환자 A;그게 뭐야. 밤늦게까지 병원에서 일을 하면서 유령 같은 걸 무서워하면 어떻게 해?"
1703-64 = "#na;환자 B;하지만 그 점이 또 세리나 쨩 다워서 귀엽다니까. 하하! #n그 쪽의 신입도 그렇게 생각하지?"
1703-65 = "5;가짜 유령;01;그, 그렇네요. 하하하…….\n#5;a\n#5;em;…"
1703-66 = "1;세리나;02;어머, 유령 씨. 여기에 계셨군요.\n#1;stiff\n#1;em;[반응]"
1703-67 = "1;하나에;05;어제는 말없이 사라지셔서 한참 찾아다녔다고요!\n#1;hophop\n#1;em;[!]"
1703-68 = "#na;환자 A;뭐야, 하나에 쨩. 오늘 아침에 입원한 이 신입 환자랑 아는 사이였어?"
1703-69 = "#na;환자 B;신입 주제에 하나에 쨩을 이미 알고 있다니…… 괘씸하잖아!"
1703-70 = "#na;환자 C;그나저나 유령이라니, 괴상한 별명이네. 왜 유령이라는 별명이 붙은 거야?"
1703-71 = "1;하나에;00;아, 그게 말이죠. 유령 씨는 그동안 4층의 무인 병동에서 몰래 유령 흉내를 냈던 그—\n#1;m2\n#1;em;[반응]"
1703-72 = "1;하나에;04\n5;가짜 유령;01;그, 그, 그게 아니라! 유령처럼 무섭게 생겼다고 해서 붙은 별명일 뿐이에요!\n#5;m3\n#5;hophop\n#1;m1"
1703-73 = "#na;환자 C;뭐야, 시시하게. 뭔가 거창한 사연이 있나 했더니만……."
1703-74 = "#all;hide"
1703-75 = "3;가짜 유령;01;너, 너희들, 도대체 정체가 뭐야?! #n어째서 입원한 곳까지 따라오며 나를 계속 괴롭히는 거냐고?!\n#3;em;[?!]\n#3;a"
1703-76 = "1;세리나;02;저희의 정체요? 저희는 환자가 있는 곳이라면 어디든 찾아가는 구호기사단이랍니다.\n#1;a\n#1;greeting"
1703-77 = "5;하나에;03;저희는 유령 씨를 괴롭히려는 게 아니라 치료하려는 거예요! #n무서워하실 필요는 조금도 없어요!\n#5;a\n#5;hophop\n#5;em;[반짝]"
1703-78 = "3;가짜 유령;01;하지만 너희들, 어제의 일로 앙심을 품고선……."
1703-79 = "1;세리나;01;앙심이라뇨? 환자 분께서 저희의 실수 때문에 다치셨으니, 빨리 회복하실 수 있도록 도와드리려는 것 뿐이에요.\n#1;em;[?]"

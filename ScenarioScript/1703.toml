[translation]
1703-1 = "無人病房的幽靈（３）"
1703-2 = "聖德蕾莎綜合醫院．4樓無人區域"
1703-3 = "咦？所以幽靈先生，其實你不是真的幽靈嗎？"
1703-4 = "對啦！我從剛剛不就一直在說嘛！"
1703-5 = "可是你的模樣和舉止都好逼真……我還以為是真的幽靈。"
1703-6 = "那麼，幽靈先生為什麼會在醫院裡徘徊呢？#n你難道在這種陰暗又沒有人的地方，獨自玩捉迷藏嗎？"
1703-7 = "誰會因為那種無聊的理由扮成幽靈！#n我之所以躲在這間醫院裡，是為了趁四下無人的時候偷東西！"
1703-8 = "偷東西？偷東西是壞事耶！？"
1703-9 = "那種事我也知道！可，可是，為了找回父親的遺物，我也別無他法……！"
1703-10 = "父親的遺物？為什麼會在醫院裡找那種東西呢？"
1703-11 = "那，那是因為……我父親去年在這間醫用做手術，那時候父親的項鍊不知道不小心弄丟在醫院哪裡了……只後也一直沒找回來，成了遺物。"
1703-12 = "我也不想給其他病患帶來困擾……但醫院不管說什麼都不讓我進來，我才出此下策！"
1703-14 = "原來有這樣的苦衷……那就沒辦法了。 "
1703-15 = "我們也來幫你一起找項鍊吧！"
1703-17 = "真，真的嗎？我假扮成幽靈偷東西，你們卻願意幫我嗎……？"
1703-18 = "只要對方遇到困難，不論是誰我們都會伸出援手。這是我們救護騎士團的宗旨。#n但也相對的，請你絕對不能碰其他貴重物品喔！"
1703-19 = "那當然！我答應你們，只要找到父親的項鍊，我就會立刻回去！"
1703-20 = "好了，花繪醬。我們一起找找看有沒有掉在這附近吧！"
1703-22 = "是的，前輩！"
1703-25 = "前輩，這個櫃子上有一個鐵箱！#n裡面似乎裝了很多貴重物品……請幫我把它拿下來！"
1703-26 = "請，請等一下！"
1703-28 = "嘿咻！#n好重唷……這裡面裝了什麼呢？怎麼這麼重？"
1703-29 = "……那個保險箱！"
1703-30 = "交出來！"
1703-34 = "哇！幽，幽靈先生，你怎麼突然撞上來！"
1703-35 = "哈哈哈，被騙了吧！這些蠢貨！"
1703-36 = "打一開始就沒有什麼父親的遺物！我入侵這間醫院就是為了拿錢去吃喝玩樂！"
1703-37 = "連這種事都不知道，還傻傻地幫我。三一的學生果然都是些單純的笨蛋！哈哈哈！"
1703-38 = "怎麼這樣！竟然利用別人的好意……太過分了！"
1703-39 = "說什麼笑話！有錯的當然是被騙的人，騙人的人根本沒必要誠實以對！"
1703-40 = "再見啦！這保險箱我帶走了！"
1703-43 = "前，前輩！你還好嗎？"
1703-44 = "我，我沒事。重點是要快點拿回保險箱……"
1703-45 = "不用擔心，前輩！#n我剛剛仔細看了，那個箱子不是保險箱，而是醫院使用的高壓滅菌器！"
1703-46 = "……咦？高壓滅菌器？"
1703-47 = "雖然的確跟保險箱一樣放滿了貴重物品，但那裡面同時還灌滿了高壓蒸氣。要是強行打開的話……就會轟隆！的一聲爆開來！"
1703-48 = "（轟隆隆隆隆隆隆隆！！）"
1703-49 = "呃啊啊啊啊！"
1703-50 = "…………"
1703-51 = "…………"
1703-52 = "花繪醬。以後這種事請早點告訴我。#n這下傷患不是變多了嗎。"
1703-53 = "知道了～"
1703-55 = "聖德蕾莎綜合醫院．病房"
1703-56 = "隔日早晨。"
1703-57 = "大家好，救護騎士團抵達囉！"
1703-58 = "各位早安！昨晚睡得好嗎？"
1703-59 = "唉唷……昨天樓上的噪音吵了一整夜，完全睡不著呢……"
1703-60 = "先是響了一陣子槍聲，後來還有東西爆炸！吵得不得安寧呢！"
1703-61 = "這麼說來，聽說你們兩個昨天晚上代替護理師值班了？沒有出現什麼奇怪的人嗎？"
1703-62 = "不，不知道耶……我們聽說4樓有幽靈出沒，都不敢靠近。#n也，也不清楚爆炸聲是怎麼回事……"
1703-63 = "你們經常在醫院上夜班，結果卻怕鬼呀？"
1703-64 = "不過這也很符合芹奈醬的個性，很可愛呢。哈哈哈！#n新來的，你也這樣覺得對吧？"
1703-65 = "就，就是說啊。哈哈哈……"
1703-66 = "哎呀，幽靈先生。原來你在這裡啊。"
1703-67 = "昨天一聲不響地跑掉了，害我們找你找好久喔！"
1703-68 = "怎麼啦，花繪醬。這個人今天早上才住進來，你們已經認識了啊？"
1703-69 = "明明是新來的，竟然已經跟花繪醬這麼要好……可惡！"
1703-70 = "話說回來，幽靈先生這綽號真奇怪。為什麼會取這種綽號？"
1703-71 = "啊，那是因為啊。幽靈先生他在4樓模仿幽靈──"
1703-72 = "沒，沒事沒事沒事！只是因為我長得跟幽靈一樣可怕，所以才幫我取那個綽號而已！"
1703-73 = "什麼嘛，這理由真普通。還以為有什麼有趣的故事……"
1703-75 = "你，你們到底是什麼人？！#n為什麼會纏著我到住院的地方？！"
1703-76 = "我們的真實身分？我們是救護騎士團，只要有病患的地方就有我們。"
1703-77 = "我們沒有纏著幽靈先生，我們只是要幫你治療！#n一點都不需要害怕！"
1703-78 = "不過你們，難道不會對昨天的事懷恨在心……"
1703-79 = "懷恨在心？你因為我們的失誤而受傷了，我只是想幫助你儘早康復而已。"
1703-83 = "只不過……我打針的時候會有點痛，要做好心理準備哦？"
1703-90 = "咿！是，是我錯了！所以拜託不要弄痛我……#n請原諒我吧──！"
1703-91 = "無人病房的幽靈"

[translation]
1703-1 = "The Ghost in the Ward Part 3"
1703-2 = "Saint Teresa General Hospital, 4th Floor - Empty Ward"
1703-3 = "Wait, what? You're not a real ghost?"
1703-4 = "Yeah! That's what I keep saying!"
1703-5 = "But all the special effects... And your acting was so good... I thought you were a real ghost!"
1703-6 = "Why were you wandering around pretending to be a ghost? Were you playing hide-and-seek in the empty ward?"
1703-7 = "Why would I pretend to be a ghost for a dumb reason like that?! I snuck in here to scare people away so I could steal things!"
1703-8 = "Steal things? Stealing is bad!"
1703-9 = "I-I know that! B-But, I had no choice... It was the only way to find my father's lost keepsake!"
1703-10 = "Your father's keepsake? Why would you search for something like that here in the hospital?"
1703-11 = "My father went into surgery at this hospital last year. But when it came time to leave, I forgot all about his necklace. That's how I lost it..."
1703-12 = "I didn't want to harm the other patients...but the hospital wouldn't let me up here, so I had no other choice!"
1703-14 = "So that was why... I understand."
1703-15 = "We'll help you find your father's keepsake!"
1703-17 = "Really? But I pretended I was a ghost so I could steal things... Are you sure?"
1703-18 = "It's the motto of the Remedial Knights to help anyone in trouble. Just promise us that you won't touch anything that doesn't belong to you!"
1703-19 = "Of course I won't! I promise I'll leave as soon as I get my father's necklace!"
1703-20 = "Okay! Hanae, let's look around and see if we can find anything important!"
1703-22 = "Okay!"
1703-25 = "There's an iron box on the shelf over here! I bet it contains a bunch of valuable stuff... Can you help me move it?"
1703-26 = "Oh! Hold on!"
1703-28 = "Ugh! Phew, that was heavy. I wonder what's in here."
1703-29 = "Hand it over!"
1703-30 = "Give me that safe!"
1703-34 = "Why are you doing this, Mr. Ghost?!"
1703-35 = "Hahaha, I fooled you, dummies!"
1703-36 = "I made up the whole story about my father's keepsake! I broke into this hospital to make some money for myself!"
1703-37 = "And you volunteered to help me. Trinity students are so naive! Hahaha!"
1703-38 = "What? How can you take advantage of other people's kindness? That's so mean!"
1703-39 = "It's your fault for believing me. I'm not responsible for your dumb decisions!"
1703-40 = "This safe is all mine now!"
1703-43 = "Hey! Are you okay?"
1703-44 = "I-I'm fine. But we have to get that stolen safe back from the ghost..."
1703-45 = "Don't worry. That box isn't an ordinary safe. It's an autoclave used in hospitals!"
1703-46 = "Huh? What's an autoclave?"
1703-47 = "Well, it does contain a lot of valuable equipment, so it's like a safe, but it's also full of high-pressure steam. If you force the door open, the whole thing will explode with a loud bang!"
1703-48 = "*bang*"
1703-49 = "Ahhh!"
1703-50 = "..."
1703-51 = "..."
1703-52 = "Hanae, please tell me that kind of stuff earlier next time. Someone's been seriously hurt."
1703-53 = "I will!"
1703-55 = "St. Teresa General Hospital Room"
1703-56 = "The next morning..."
1703-57 = "Ladies and gentlemen, the Remedial Knights have arrived!"
1703-58 = "Good morning, everyone. How did you sleep last night?"
1703-59 = "I couldn't sleep at all because of the noise from upstairs..."
1703-60 = "I heard a bunch of shooting noises and then I heard something that sounded like a bomb going off! It was crazy!"
1703-61 = "Come to think of it, you two took over watch duties for the nurses last night. Did you see anyone suspicious?"
1703-62 = "Well...we didn't even go close to the fourth floor because we were too afraid of the ghost. I... I have no idea about that bomb noise you heard."
1703-63 = "What? You can't be afraid of ghosts if you're gonna handle a night shift at the hospital!"
1703-64 = "But that's what makes Serina so cute! Don't you agree, newbie?"
1703-65 = "Uh, yeah. Hahaha."
1703-66 = "Oh, Mr. Ghost. There you are!"
1703-67 = "I've been looking for you ever since you disappeared without saying a word!"
1703-68 = "What are you talking about, Hanae? This patient just came in this morning. Have you two met already?"
1703-69 = "How come this newbie's already gotten to know Hanae?! I hate it!"
1703-70 = "By the way, Mr. Ghost is a weird nickname. How did you get it?"
1703-71 = "Oh, that's because Mr. Ghost pretended to be a ghost in the empty ward on the fourth floor..."
1703-72 = "No, that's not true! People call me that because they think I look scary... Like a ghost!"
1703-73 = "What? That's pretty boring. I was expecting something more interesting as a backstory than that..."
1703-75 = "What is wrong with you guys?! Who are you? Why do you keep following me around and harassing me?!"
1703-76 = "Us? We're the Remedial Knights! We go wherever the patients are."
1703-77 = "We're not trying to harass you. We wanna help you! You don't have to be afraid of us!"
1703-78 = "But how can I know for sure you're not holding a grudge over what happened yesterday?"
1703-79 = "What grudge? You got hurt because of our mistake, so we're just trying to help you heal up as quickly as possible."
1703-83 = "But...the injection is gonna sting, okay?"
1703-90 = "No, please, anything but a shot! I can't stand needles... Please spare me!"
1703-91 = "The Ghost in the Ward"

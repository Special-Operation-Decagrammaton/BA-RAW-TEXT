[translation]
1703-1 = "#title;무인 병동의 유령 씨 3"
1703-2 = "#place;성 테레사 종합병원 4층 무인 병동"
1703-3 = "3;하나에;04;네에? 유령 씨는 사실 유령이 아니었다고요?\n#3;shake\n#3;em;[?!]\n#3;a"
1703-4 = "5;가짜 유령;01;그렇다니까! 아까 전부터 그렇게 말하고 있었잖아!\n#5;a\n#5;em;[반응]\n#3;m1"
1703-5 = "#3;hide\n1;세리나;04;하지만 분장이나 연기가 너무나도 진짜 같아서…… 정말 유령인줄만 알았어요.\n#1;a\n#1;em;[땀]"
1703-6 = "1;하나에;02;그럼 어째서 유령 씨는 병원을 배회하고 계셨던 건가요? #n어두운 무인 병동에서 혼자 술래잡기라도 하셨던 건가요?"
1703-7 = "5;가짜 유령;01;그런 시시한 이유로 유령 흉내를 낼 것 같으냐! #n내가 이 병원에 숨어든 이유는 사람들이 도망친 틈을 타 물건을 훔치기 위해서 였다고!\n#5;hophop"
1703-8 = "1;세리나;06;훔친다고요? 도둑질은 나쁜 일이라구요!\n#1;shake\n#1;em;[?!]"
1703-9 = "5;가짜 유령;01;그, 그런 건 나도 알고 있어! 하, 하지만 잃어버린 아버지의 유품을 찾기 위해서는 어쩔 수가 없었는 걸……!\n#5;stiff"
1703-10 = "1;하나에;02;아버지의 유품이요? 그걸 왜 병원에서 찾고 계신가요?\n#1;em;[?]"
1703-11 = "5;가짜 유령;01;그, 그게 그러니까…… 우리 아버지는 작년에 이 병원에서 수술을 받으셨거든. 그런데 그 때 실수로 아버지의 목걸이를 병원에 두고 나오는 바람에…… 유품을 잃어버리고 말았어.\n#5;em;…"
1703-12 = "5;가짜 유령;01;나도 다른 환자들에게 폐를 끼치고 싶지는 않았지만…… 병원에서 나를 도통 들여보내주질 않아서 도저히 방법이 없었다고!\n#5;m3\n#1;dl\n#5;em;[!]"
1703-13 = "#all;hide"
1703-14 = "5;하나에;01\n1;세리나;04;그런 사정이 있었다면야…… 어쩔 수 없네요. \n#1;stiff"
1703-15 = "5;하나에;05;그럼 저희도 같이 유품을 찾는 걸 도와 드릴게요!\n#5;em;[!]\n#5;hophop"
1703-16 = "#all;hide"
1703-17 = "3;가짜 유령;01;저, 정말이야? 유령 흉내를 내며 도둑질을 하려 했던 나를 도와주겠다고……?\n#3;stiff"
1703-18 = "1;세리나;01;딱한 사정이 있는 사람이라면 누구든 가리지 않고 돕는 것이 저희 구호기사단의 좌우명이니까요. #n대신 다른 귀중품에는 절대 손대시면 안 돼요!\n#1;ar\n#1;em;[반응]\n#3;m5"
1703-19 = "3;가짜 유령;01;그야 물론이지! 아버지의 목걸이를 발견하면 바로 돌아가겠다고 약속할게!\n#3;greeting"
1703-20 = "1;세리나;01;자, 하나에 쨩. 그럼 이곳에 버려진 귀중품이 없는지 함께 찾아보도록 하죠!\n#1;m3\n#3;dr"
1703-21 = "#all;hide"
1703-22 = "3;하나에;03;네, 선배!\n#3;greeting\n#3;em;[반짝]"
1703-23 = "#all;hide"
1703-24 = "#wait;1500"
1703-25 = "#na;하나에;선배, 여기 선반 위에 철제 상자가 있어요! #n뭔가 귀중품이 잔뜩 담겨 있어서…… 같이 좀 들어주세요!"
1703-26 = "#na;세리나;자, 잠깐만 기다려주세요!"
1703-27 = "#all;hide"
1703-28 = "5;세리나;04;영차—! #n어휴, 무거워라……. 이 안에 무어가 들었기에 이렇게 무거운 걸까요?\n#5;greeting\n#5;a\n#5;em;[땀]"
1703-29 = "1;가짜 유령;01;……그 금고를.\n#1;a\n#1;em;…"
1703-30 = "1;가짜 유령;01;이리 내놔!\n#1;em;[반응]\n#1;m3"
1703-31 = "#all;hide"
1703-32 = "3;세리나;04\n#3;stiff\n#3;em;[!]\n#3;closeup\n#wait;800"
1703-33 = "#all;hide\n#bgshake\n#wait;1500"
1703-34 = "#na;세리나;가, 갑자기 이게 무슨 짓인가요. 유령 씨!"
1703-35 = "3;가짜 유령;01;하하하, 속았구나! 이 멍청이들!\n#3;em;[!]\n#3;hophop"
1703-36 = "3;가짜 유령;01;애초부터 아버지의 유품 같은 건 존재하지도 않았다고! 내가 이 병원에 침입한 이유는 유흥비로 쓸 돈을 마련하기 위해서 였지!"
1703-37 = "3;가짜 유령;01;그것도 모르고 바보같이 나를 돕다니. 역시 트리니티의 학생들은 순진하구만! 하하하!\n#3;em;[재잘]"
1703-38 = "#na;세리나;네에? 사람의 호의를 역으로 이용하다니…… 정말 너무해요!"
1703-39 = "3;가짜 유령;01;너무하기는! 속는 녀석이 바보지, 속이는 사람에게는 아무런 책임도 없다고!\n#3;hophop"
1703-40 = "3;가짜 유령;01;그럼 이 금고는 내가 가져가마!\n#3;em;[음표]"
1703-41 = "3;가짜 유령;01\n#3;dr\n#wait;1000"
1703-42 = "#all;hide"
1703-43 = "3;하나에;04;서, 선배! 괜찮으신가요?\n#3;a\n#3;hophop\n#3;em;[반응]"
1703-44 = "#3;m5\n1;세리나;04;괘, 괜찮아요. 그보다 유령 씨가 훔쳐간 금고를 빨리 되찾아야…….\n#1;a\n#1;greeting"
1703-45 = "3;하나에;00;걱정 마세요, 선배. #n저 상자는 평범한 금고가 아니라 병원에서 쓰는 고압멸균기거든요!\n#3;em;[음표]"
1703-46 = "1;세리나;04;……네? 고압멸균기요?\n#1;shake\n#1;em;[?!]"
1703-47 = "3;하나에;01;귀중한 장비가 잔뜩 담겨 있다는 점만 두고 본다면 금고나 다름없지만, 저 안에는 고압의 증기도 가득 차 있거든요. 강제로 문을 열기라도 한다면 통째로 쾅! 하고 터져 버릴거예요!\n#3;greeting"
1703-48 = "#na;콰앙!\n#fontsize;100\n#bgshake"
1703-49 = "#na;가짜 유령;으아아아악!\n#fontsize;80"
1703-50 = "1;세리나;04;………….\n#1;em;…"
1703-51 = "3;하나에;01;………….\n#3;em;…"
1703-52 = "1;세리나;05;하나에 쨩. 앞으로 그런 정보는 더 빨리 말해주세요. #n사람이 다쳤잖아요.\n#1;em;[반응]\n#1;jump"
1703-53 = "3;하나에;03;네에—.\n#3;greeting"

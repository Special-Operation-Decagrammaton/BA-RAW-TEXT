[translation]
1703-1 = "คุณวิญญาณในวอร์ดร้าง 3"
1703-2 = "หอผู้ป่วยร้างชั้น 4 โรงพยาบาลศูนย์เซนต์เทเรซา"
1703-3 = "คะ? ที่จริงแล้วคุณวิญญาณไม่ใช่วิญญาณจริงๆ เหรอคะ?"
1703-4 = "ก็ใช่ไงล่ะ! ฉันก็เพิ่งพูดไปไง!"
1703-5 = "แต่ว่า... ถึงเป็นคนที่เลียนแบบหรือแต่งตัวเหมือนวิญญาณก็ตาม มันเหมือนจริงมากเลย...#nจนฉันคิดว่าเป็นวิญญาณจริงๆ ซะอีก"
1703-6 = "ถ้างั้นทำไมคุณวิญญาณถึงเดินเตร็ดเตร่ไปทั่วโรงพยาบาลล่ะคะ?#nหรือว่ากำลังเล่นซ่อนแอบอยู่ในหอผู้ป่วยร้างนี่เหรอคะ?"
1703-7 = "คิดว่าฉันจะปลอมตัวเป็นวิญญาณด้วยเหตุผลงี่เง่าแบบนั้นเหรอ! ที่ฉันปลอมตัวเข้ามาซ่อนอยู่ใน#nโรงพยาบาลก็เพื่อจะไปขโมยของของคนที่ตกใจกลัวแล้วหนีไปต่างหากล่ะ!"
1703-8 = "ขโมยงั้นเหรอคะ? การขโมยเป็นสิ่งที่ไม่ดีนะคะ!"
1703-9 = "ระ...เรื่องนั้นฉันก็รู้เหมือนกันน่า! ตะ...แต่ว่าเพื่อที่จะตามหาสร้อยคอของพ่อแล้ว#nฉันก็ไม่มีทางเลือกอื่น...!"
1703-10 = "สร้อยคอดูต่างหน้าคุณพ่อเหรอคะ? ทำไมถึงมาตามหาที่โรงพยาบาลล่ะคะ?"
1703-11 = "ระ...เรื่องก็คือ... เมื่อปีที่แล้วพ่อของฉันเข้ารับการผ่าตัดที่โรงพยาบาลนี้ แต่ว่าตอนนั้น#nพ่อเกิดลืมสร้อยคอของพ่อเอาไว้ที่โรงพยาบาล... แล้วมันก็หายไป"
1703-12 = "ฉันเองก็ไม่อยากรบกวนผู้ป่วยคนอื่นหรอกนะ... แต่ว่าทางโรงพยาบาลไม่ยอมให้ฉันเข้าไป#nฉันเลยไม่มีทางเลือกอื่นแล้ว!"
1703-14 = "ถ้าเป็นอย่างนั้นล่ะก็... ช่วยไม่ได้นะคะ"
1703-15 = "ถ้างั้นฉันจะช่วยคุณหาของมีค่าเองค่ะ!"
1703-17 = "จะ...จริงเหรอ? เธอจะช่วยฉันทั้งที่ฉันปลอมตัวเป็นวิญญาณมาหลอกคน แล้วก็ขโมยของด้วยเนี่ยนะ?"
1703-18 = "คติของชมรมอัศวินบรรเทาทุกข์คือช่วยเหลือทุกคนที่ยากลำบากโดยไม่แบ่งแยกค่ะ#nแต่ว่าห้ามแตะต้องของมีค่าอื่นๆ เด็ดขาดเลยนะคะ!"
1703-19 = "แน่นอนอยู่แล้วสิ! ถ้าเจอสร้อยคอของพ่อเมื่อไหร่ ฉันสัญญาว่าจะรีบกลับทันทีเลย!"
1703-20 = "เอาล่ะ ฮานาเอะจัง มาช่วยกันดูเถอะว่ามีของมีค่าอะไรถูกทิ้งเอาไว้ที่นี่รึเปล่า!"
1703-22 = "ค่ะ รุ่นพี่!"
1703-25 = "รุ่นพี่คะ บนชั้นตรงนี้มีกล่องเหล็กอยู่ด้วยค่ะ! มีของมีค่าอยู่เต็มไปหมดเลย... มาช่วยกันดูหน่อยสิคะ!"
1703-26 = "ระ...รอเดี๋ยวก่อนค่ะ!"
1703-28 = "เอาล่ะ ฮึ่บบบ! เฮ้อ หนักจังเลย... ข้างในใส่อะไรไว้นะ ถึงได้หนักแบบนี้?"
1703-29 = "คือตู้เซฟอันนั้น..."
1703-30 = "ส่งมาเดี๋ยวนี้!"
1703-34 = "จะ...จู่ๆ คิดจะทำอะไรเหรอคะ คุณวิญญาณ!"
1703-35 = "ฮ่าฮ่าฮ่า ถูกหลอกแล้ว! เจ้าพวกหัวทึบเอ๊ย!"
1703-36 = "เรื่องเครื่องประดับของพ่อฉันน่ะ มันไม่ใช่เรื่องจริงตั้งแต่แรกแล้วล่ะ!#nที่ฉันบุกเข้ามาในโรงพยาบาลนี้ก็เพื่อมาหาเงินเอาไว้ไปเปย์ตัวเองต่างหากล่ะ!"
1703-37 = "พวกเธอช่วยฉันโดยที่ไม่รู้เรื่องรู้ราวอะไร เหมือนคนโง่เลยจริงๆ#nว่าแล้วเชียว พวกเด็กนักเรียนของทรีนิตี้น่ะ ใสซื่อเกินไปแล้ว! ฮ่าฮ่าฮ่า!"
1703-38 = "คะ? หลอกใช้ความใจดีของคนมาทำเรื่องแบบนี้... มันเกินไปแล้วนะคะ!"
1703-39 = "เกินไปตรงไหน! คนที่ถูกหลอกต่างหากที่โง่เอง ฉันต้องรับผิดชอบอะไรด้วยรึไง?"
1703-40 = "ฉันขอตู้เซฟนี่ไปก็แล้วกันนะ!"
1703-43 = "ระ...รุ่นพี่คะ! ไม่เป็นไรใช่ไหมคะ?"
1703-44 = "มะ...ไม่เป็นไรค่ะ ตอนนี้เราต้องรีบไปเอาหีบสมบัติที่คุณวิญญาณขโมยไปคืนมา..."
1703-45 = "รุ่นพี่ไม่ต้องห่วงนะคะ กล่องนั่นไม่ใช่แค่เป็นตู้เซฟธรรมดา#nแต่เป็นเครื่องอบฆ่าเชื้อแรงดันสูงที่โรงพยาบาลใช้อยู่ต่างหากค่ะ!"
1703-46 = "คะ? เครื่องอบฆ่าเชื้อแรงดันสูงเหรอคะ?"
1703-47 = "อืม... ถ้าพูดถึงเรื่องที่ว่ามันเก็บอุปกรณ์ล้ำค่าเอาไว้ข้างในล่ะก็คงไม่ต่างจากตู้เซฟธรรมดาเท่าไหร่#nแต่ว่าข้างในกล่องนั่นน่ะมีไอน้ำแรงดันสูงอยู่ด้วยนะคะ ถ้าเผลอไปเปิดมั่วๆ ล่ะก็...#nบึ้ม!... จะถูกระเบิดแน่ๆ ค่ะ~ "
1703-48 = "ตู้ม!\n\n"
1703-49 = "ว้ากกกกกก!"
1703-50 = "....."
1703-51 = "......."
1703-52 = "ฮานาเอะจัง~ ต่อไปช่วยรีบบอกข้อมูลพวกนี้ให้ด้วยนะคะ มีคนบาดเจ็บเลยเห็นไหมคะ"
1703-53 = "ค่าาาา~"
1703-55 = "ห้องพักผู้ป่วยโรงพยาบาลศูนย์เซนต์เทเรซา"
1703-56 = "เช้าวันต่อมา"
1703-57 = "ทุกคนคะ ชมรมอัศวินบรรเทาทุกข์มาถึงแล้วค่ะ!"
1703-58 = "อรุณสวัสดิ์ค่ะ ทุกคน~ เมื่อคืนหลับสบายไหมคะ?"
1703-59 = "คือว่า... เมื่อคืนที่ชั้นบนมีเสียงดังทั้งคืน ฉันเลยนอนไม่หลับเลยน่ะ"
1703-60 = "เสียงปืนยิงกันดังต่อเนื่องระยะหนึ่ง และในตอนท้ายก็ยังมีเสียงเหมือนอะไรระเบิดดังขึ้นด้วย!#nดูวุ่นวายสุดๆ เลยล่ะ!"
1703-61 = "พอมาคิดดูแล้ว เมื่อคืนทั้งสองคนก็เข้าเวรแทนคุณพยาบาลกันทั้งคืนเลยนะ?#nไม่มีใครเจออะไรที่น่าสงสัยเลยเหรอ?"
1703-62 = "นะ...นั่นสิคะ พอได้ยินว่าที่ชั้น 4 มีวิญญาณโผล่ออกมา พวกเราก็กลัวกันมาก#nเลยไม่ได้เข้าใกล้ชั้น 4 เลยค่ะ ระ...เรื่องระเบิดนั่น ฉันไม่รู้จริงๆ ค่ะ"
1703-63 = "อะไรกัน จะทำยังไงถ้ากลัวผีขนาดนี้แล้วต้องทำงานที่โรงพยาบาลในตอนกลางคืนน่ะ?"
1703-64 = "แต่แบบนั้นก็น่ารักพอๆ กับเซรินะจังเลยน้า ฮ่าฮ่า! นี่ คนที่มาใหม่ก็คิดแบบนั้นเหมือนกันใช่ไหมล่ะ?"
1703-65 = "นะ...นั่นสินะ ฮ่าฮ่าฮ่า..."
1703-66 = "อ๊ะ! คุณวิญญาณ อยู่ที่นี่เองเหรอคะ"
1703-67 = "ฉันตามหาตั้งนานนะคะ ทำไมเมื่อวานจู่ๆ ถึงหายไปไม่บอกไม่กล่าวเลย!"
1703-68 = "อะไรน่ะ ฮานาเอะจัง รู้จักกับคนไข้ที่แอดมิทเข้ามาเมื่อเช้าเหรอ?"
1703-69 = "ไม่อยากเชื่อเลยว่าคนที่มาใหม่จะสนิทกับฮานาเอะจังแบบนั้น... น่าอิจฉาสุดๆ เลย!"
1703-70 = "ว่าแต่ทำไมถึงได้ตั้งชื่อเล่นว่า \"วิญญาณ\" ล่ะ? แปลกจริงๆ เลยนะ"
1703-71 = "เอ่อ เรื่องนั้นน่ะ... คุณวิญญาณ... ที่จริงแล้วเขาแค่ทำตัวเลียนแบบวิญญาณอยู่ที่หอผู้ป่วยร้างชั้น 4..."
1703-72 = "มะ...ไม่ใช่อย่างนั้นนะ! แค่หน้าตาน่ากลัวเหมือนผีก็เลยได้ชื่อเล่นแบบนี้มาก็เท่านั้นเอง!"
1703-73 = "อะไรเนี่ย น่าเบื่อจริงๆ นึกว่าจะเป็นเรื่องที่น่าสนใจแท้ๆ เชียว"
1703-75 = "พะ...พวกเธอเป็นใครกันแน่?! ทำไมถึงต้องตามมาก่อกวนฉันที่โรงพยาบาลแบบนี้ด้วย?!"
1703-76 = "พวกเราเป็นใครน่ะเหรอคะ? พวกเราคือสมาชิกชมรมอัศวินบรรเทาทุกข์#nที่พร้อมจะไปช่วยผู้ป่วยทุกที่ยังไงล่ะคะ"
1703-77 = "พวกเราไม่ได้รังแกคุณวิญญาณนะคะ กำลังจะรักษาให้คุณต่างหากค่ะ!#nไม่ต้องกลัวพวกเราหรอกนะคะ!"
1703-78 = "แต่ว่าพวกเธอ... ที่โกรธเรื่องเมื่อวาน..."
1703-79 = "ความแค้นเหรอคะ? ผู้ป่วยได้รับบาดเจ็บเพราะความเลินเล่อของพวกเรา#nพวกเราอยู่ที่นี่ก็เพื่อช่วยดูแลให้ทุกคนหายโดยเร็วเท่านั้นค่ะ"
1703-83 = "คือว่า... การฉีดยาของฉันอาจจะเจ็บสักหน่อย เตรียมตัวให้พร้อมด้วยนะคะ"
1703-90 = "ฉะ...ฉันผิดไปแล้ว!   เพราะงั้น... ระ... เรื่องถูกฉีดยาแบบนั้น...#nยะ...ยกโทษให้ฉันด้วย!"
1703-91 = "คุณวิญญาณในหอผู้ป่วยร้าง"

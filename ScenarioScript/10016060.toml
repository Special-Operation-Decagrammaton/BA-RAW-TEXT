[translation]
10016060-1 = "第6話;合作（１）"
10016060-4 = "哈啊，哈啊……好像不在這裡呢。"
10016060-5 = "麻白，其他區域有發現嗎？"
10016060-6 = "我正從投射燈上觀察運動場周圍，沒有發現可疑的學生。"
10016060-7 = "其他在運動場的部員們收集了目擊證言，但說法不一……"
10016060-8 = "結果，還是無法確認問題學生的去向。"
10016060-9 = "[s]「桐乃，你對那名學生還有印象嗎？」"
10016060-11 = "印象嗎……唔嗯……"
10016060-12 = "整齊的短髮……體育服……好像還穿著運動鞋吧……"
10016060-13 = "嘛，只有這點印象的話，根本就找不到吧～#n大家在大運動會期間幾乎都是這種打扮。"
10016060-14 = "因為沒有什麼特徵，所以也不會覺得可疑。#n就這樣消失在記憶中了。"
10016060-15 = "唔……對不起。本官應該觀察得更仔細的……"
10016060-19 = "不，光是報告那名學生的存在就已經很有幫助了。"
10016060-24 = "（……但是，現在令人著急的是人手不足的問題）"
10016060-25 = "（要是這裡是三一的話，只需動員全體部員就能馬上找到目標的說……）"
10016060-26 = "……發生了什麼事嗎？"
10016060-27 = "這個聲音是……"
10016060-34 = "格黑娜、三一、千年的幹部們齊聚一堂……#n真是個奇妙的組合呢。"
10016060-35 = "才不是什麼奇妙的組合！可以不要隨便幫別人組隊嗎！？"
10016060-36 = "我也不想和你有什麼瓜葛……#n請容我拒絕成為妖怪女的同伴。"
10016060-37 = "你說誰是妖怪女啊！？"
10016060-38 = "啊哈哈……大家，請冷靜下來。"
10016060-40 = "三位怎麼會在這裡……？"
10016060-41 = "那個……我在從救護室回來的途中，發現兩位融洽地累倒在長椅上……"
10016060-42 = "所以現在正打算去咖啡廳喝點冰涼的飲料休息一下。"
10016060-43 = "話說蓮實同學，你的臉色不是很好……發生什麼事了嗎？"
10016060-44 = "不，沒什麼大不了的。"
10016060-45 = "只是從這兩位口中聽說了有學生擅自搬運競賽用的備品。"
10016060-46 = "雖然只是推測……但我想那些對競賽用備品出手的人，可能心懷不軌……"
10016060-48 = "咦！？這可不得了！"
10016060-49 = "是，是嗎？"
10016060-50 = "你們知道那些競賽用的備品有多貴嗎！#n如果被偷走的話，可是會損失不少錢啊……"
10016060-51 = "而且這次的備品說是集結了千年最尖端的科技也不為過……#n不排除會有被濫用的可能性。"
10016060-52 = "上個月，格黑娜也發生過有不良學生，#n在偷來的千年打掃機器人身上安裝火焰噴射器胡鬧的事件。"
10016060-53 = "光是一個打掃機器人就讓風紀委員會損失了一個中隊……#n如果是集結了尖端科技的備品，難以想像會造成多大的損失……"
10016060-54 = "……我想那個打掃機器人應該打從一開始就安裝了火焰噴射器吧……"
10016060-55 = "總之現在時間緊迫，我們得快點採取行動。"
10016060-56 = "優香同學，所有的備品都裝有電子標籤吧？"
10016060-57 = "請確認競賽結束後尚未歸還的備品目錄，#n以及使用該備品的競賽結束時間。"
10016060-58 = "我會確認主要設施的出入紀錄，並且整理該時段曾接近跑道的學生名單。"
10016060-59 = "那，那種事不用你說我也正在做了！"
10016060-65 = "……真是可疑呢。"
10016060-66 = "格黑娜是在打什麼如意算盤，為何要協助我們？"
10016060-67 = "啊……？"
10016060-68 = "你覺得我會為了協助三一而介入這種麻煩事嗎？"
10016060-69 = "我也是晄輪大祭實行委員會的一員。#n只是想防止出現會影響格黑娜學園營運的事件罷了。"
10016060-70 = "假如事件是由格黑娜的學生引起，導致我方得支付賠償金的話，那可就傷腦筋了。"
10016060-71 = "你不也是一樣嗎？"
10016060-72 = "……我就姑且相信你的說詞吧。"
10016060-74 = "那麼，我們先在這附近打聽一下有沒有可疑學生的目擊情報。"
10016060-75 = "瑪麗同學，麻煩你和我同行。"
10016060-76 = "好，好的！"
10016060-80 = "…………所以，你有看到抬著備品箱的學生往地下出口的方向移動囉？"
10016060-81 = "是啊。明明拿著裝滿鐵塊的箱子卻拒絕別人幫忙，我覺得有點奇怪。"
10016060-82 = "因為擔心他會不會受傷，所以我一直盯著他的背影，絕對不會錯的。"
10016060-83 = "我整理了競賽結束後沒有歸還的備品目錄和數量。"
10016060-84 = "有鉛球箱子和障礙賽跑的跨欄等等……東西還不少呢。"
10016060-85 = "競賽結束後，非選手身分卻進出運動場的學生名單如下。"
10016060-86 = "桐乃同學，這幾張臉孔有讓你想起什麼嗎？"
10016060-87 = "啊，拿走備品的就是這個人！"
10016060-89 = "總結一下目前的情況和掌握的證據……#n可以判定是照片中的這名學生把備品帶出了運動場並搬運到地下出入口。"
10016060-90 = "……田徑運動場的地下出入口？"
10016060-91 = "那邊的空間很狹窄，所以目前是閒置的狀態……#n為何要把備品送去那個地方呢？"
10016060-92 = "這個就直接去問犯人吧。"
10016060-93 = "好，趁他惹出麻煩之前，我們快走吧。"
10016060-95 = "晄輪大祭……每2年舉辦1次的奇普托斯最熱門運動慶典。"
10016060-96 = "如果能在這個所有媒體都聚焦的慶典上獲得關注的話，#n不但能成為學園歷史上的英雄，還能給後輩們留下訊息。"
10016060-97 = "換句話說……"
10016060-101 = "在這裡示威的話，影響力應該也會非常大！"
10016060-102 = "但是老大……#n這個田徑運動場不僅有各個學園的風紀委員會，甚至還有女武神警察學園的學生……"
10016060-103 = "如果像平常那樣示威的話，應該很快就會被實行委員會鎮壓了吧？"
10016060-104 = "這點倒是不用擔心。#n只要克洛盧斯學園的攝影機照著我們，實行委員會也不敢輕舉妄動。"
10016060-105 = "再加上我們已經佔領運動場的地下出入口，對方也無法使用炸彈之類的粗暴手段。"
10016060-106 = "對方只要突破不了我們的路障，便會改為嘗試談判！"
10016060-107 = "不愧是老大。這計畫真是厲害！"
10016060-108 = "就趁著這個勢頭，一償我們長久以來的夙願──週休4日政策！"
10016060-110 = "……就為了這種理由把這些備品用來當路障？"
10016060-112 = "實，實行委員……什麼時候……！？"
10016060-113 = "你們怎麼知道我們在這裡！？"
10016060-115 = "有不是選手的學生在運動場搬運備品的話，理所當然會引起注意的吧。"
10016060-116 = "而且這次的備品是交由機器人搬運，透過人力搬運這點就更加顯眼了……"
10016060-117 = "居，居然有這樣的盲點……"
10016060-118 = "話說回來，為什麼是週休4天？"
10016060-119 = "一週工作4次就算了，一週只工作3次……#n休息天數不覺得太長了嗎？"
10016060-120 = "吵，吵死人了！這個世界上有多少人喜歡工作啊！"
10016060-121 = "假如聯邦學生會真的有為學生著想，#n就該設立「一週休假不可低於4天」的共同校規吧！"
10016060-122 = "[s]「沒錯沒錯！」"
10016060-123 = "老師，請不要附和那種詭辯。你已經是大人了吧？"
10016060-124 = "咳……總而言之。#n妨礙「晄輪大祭」的行為是不可原諒的。"
10016060-125 = "從現在起，只要乖乖交出備品並撤退的話，我就不追究責任……#n但之後如果出了問題，我還是會索賠修理費用的！"
10016060-126 = "妳以為那樣的威脅對我們有效嗎？"
10016060-127 = "為了防止對方採取強硬手段，我們也準備了應對方法……"
10016060-133 = "……那就是把停在運動場外的戰車也一起帶來了！"
10016060-134 = "[s1]「戰車……？」\n[s2]「啊，那個應該不是戰車──」"
10016060-135 = "嗯？這不是戰車還能是什麼？"
10016060-136 = "嗯？這不是戰車還能是什麼？"
10016060-137 = "會配戴履帶、鐵甲以及機關砲的，也只有戰車了吧？"
10016060-138 = "[s3]（確實如此……）\n[s4]（無法反駁……）"
10016060-139 = "而且我們正好也把堅固的路障架好了。"
10016060-140 = "而且我們正好也把堅固的路障架好了。"
10016060-141 = "這道用鋼架和木頭砌成的堅固路障，#n除非格黑娜風紀委員會和三一實現正義部聯手，否則──"
10016060-147 = "……否則怎麼樣？"
10016060-149 = "老，老大……怎麼辦？#n風紀委員會、實現正義部和研討會一起出現了耶……？"
10016060-150 = "不，不用怕！我們還有戰車啊！"
10016060-151 = "就算對手是學生會的幹部，數量也不多。#n用火力硬拚還是有勝算的！"
10016060-152 = "那麼……"
10016060-153 = "去吧，「資產階級破壞者」！"
10016060-154 = "[s]「應援機器人又被取新名字了……」"

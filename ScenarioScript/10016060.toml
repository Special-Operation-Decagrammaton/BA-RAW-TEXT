[translation]
10016060-1 = "Episode 6;Cooperation 1"
10016060-4 = "*pant pant* It looks like they're long gone."
10016060-5 = "Mashiro, have you seen the students I described earlier? They should be carrying boxes of equipment."
10016060-6 = "Negative! I've been surveying the area from the light tower, and I haven't seen any students matching your description."
10016060-7 = "I've asked the other members to report if they saw anything, but I've been receiving varying responses..."
10016060-8 = "We haven't been able to pinpoint a credible location so far..."
10016060-9 = "[s] \"Kirino, do you remember what they looked like?\""
10016060-11 = "What they looked like? Er... Let me see..."
10016060-12 = "I think they had short hair and were wearing gym clothes... They were also wearing sneakers..."
10016060-13 = "You just described every student in Kivotos."
10016060-14 = "But she's right, they were pretty nondescript. They didn't really stand out to me, so I don't remember much."
10016060-15 = "I'm sorry... I should have gotten a better look at their faces..."
10016060-19 = "Don't apologize. We wouldn't have even been aware of the situation if not for you."
10016060-24 = "(It's a shame we're so shorthanded...)"
10016060-25 = "(If this was Trinity, the criminals would be apprehend by now.)"
10016060-26 = "Is there a problem here?"
10016060-27 = "I know that voice..."
10016060-34 = "The executives from Gehenna, Trinity, and Millennium all together? I never thought I'd see this combination..."
10016060-35 = "Us? A combination? Please don't consider us a set."
10016060-36 = "Hey, I don't like getting grouped with you either. I don't want to be seen as in cohorts with some monster."
10016060-37 = "Excuse me?! What did you just call me?"
10016060-38 = "Haha... Let's not fight, everyone... Please..."
10016060-40 = "What brings all of you here?"
10016060-41 = "I was coming back from the infirmary, and I happened to see these two collapsed onto a bench."
10016060-42 = "We decided to go to a cafe to recharge a little bit and get out of the heat."
10016060-43 = "But, Hasumi, you seem troubled. Is everything okay?"
10016060-44 = "I think so. It's likely nothing of concern."
10016060-45 = "These Valkyrie students here reported they saw some students moving equipment without permission."
10016060-46 = "I wanted to investigate it just in case. We wouldn't want the sports equipment to fall into the wrong hands..."
10016060-48 = "What did you just say?! That's an enormous concern!"
10016060-49 = "I-Is that so?"
10016060-50 = "Yes! Do you know how much all that equipment costs? If someone steals it, the financial losses..."
10016060-51 = "To make matters worse, all of the equipment was specifically developed for the Halo Festival using Millennium's technology, so the potential for malicious misuse is high."
10016060-52 = "Just last month some troublemakers from Gehenna attached a flamethrower to a cleaning robot that was stolen from Millennium and wreaked havoc."
10016060-53 = "A simple cleaning robot caused so much damage that an entire unit of the Prefect Team was incapacitated. If someone abuses equipment integrated with Millennium's technology, there's no telling what could happen."
10016060-54 = "...I hate to say it, but that cleaning robot probably already had the flamethrower installed."
10016060-55 = "That only proves my point. We need to act immediately."
10016060-56 = "Yuuka, all of Millennium's assets are equipped with electronic tags, right?"
10016060-57 = "Please check the inventory list for any equipment that wasn't returned after the games, and what time the respective game ended."
10016060-58 = "I'll check the access records for key facilities and put together a list of students who accessed the tracks around that time."
10016060-59 = "I-I'm already on it..."
10016060-65 = "...What a peculiar situation."
10016060-66 = "Why is Gehenna deigning to help any of us?"
10016060-67 = "Huh...?"
10016060-68 = "I'm not trying to help you, or Trinity, or Millennium!"
10016060-69 = "We're still executive members of the Kivotos Halo Festival. I'm simply doing my job to make sure nothing disrupts Gehenna's operations, just in case."
10016060-70 = "If the culprit is from Gehenna, we need to catch them quickly so we aren't billed with unnecessary charges."
10016060-71 = "Do you understand where I'm coming from?"
10016060-72 = "...I guess so."
10016060-74 = "We'll case the area and question any students to find potential witnesses."
10016060-75 = "Can we ask for your help, Mari?"
10016060-76 = "U-Understood!"
10016060-80 = "So you saw some students with equipment boxes heading toward an underground entrance?"
10016060-81 = "Exactly. They were struggling with a box full of metal pieces, but they rejected my offer to help them, rather aggressively I might add. I thought that was strange."
10016060-82 = "It stood out to me, so I watched to see what direction they went."
10016060-83 = "I put together a list of equipment that haven't been returned."
10016060-84 = "Boxes of shot put balls, hurdles for the solo obstacle race..."
10016060-85 = "And these are all the students who entered the stadium after the games even though they weren't contestants."
10016060-86 = "Kirino, do you recognize any of these faces?"
10016060-87 = "Oh! That person! That's the one who was moving the equipment!"
10016060-89 = "Based on all the evidence, it seems this student was secretly moving equipment down to the underground entrance of the stadium."
10016060-90 = "The underground entrance?"
10016060-91 = "But we opted to not use that space because it was too small to be of any use. What could they possibly do in there with all that equipment?"
10016060-92 = "The only way to find out is by catching them."
10016060-93 = "Let's get moving while the trail is still fresh."
10016060-95 = "The Kivotos Halo Festival is an exciting sports festival that happens every two years."
10016060-96 = "By participating in a festival splashed all over the news, you can make history as a hero and even become a leading role model leaving inspiring messages for the students that will follow after."
10016060-97 = "So that means..."
10016060-101 = "If we stage a protest here, its effects will ripple across all of Kivotos!"
10016060-102 = "But boss, security from every academy, and even students from Valkyrie Police School, are at the Athletic Stadium..."
10016060-103 = "If we try to protest, won't the Executive Committee just shut us down right away?"
10016060-104 = "There's nothing to worry about. With the Kronos channel's cameras recording every moment, even the Executive Committee won't be able to lift a finger against us."
10016060-105 = "Plus, as long as we're here at the underground entrance, they won't be able to use bombs for fear of damaging the stadium."
10016060-106 = "They'll fail to get through our barricade and be forced to negotiate!"
10016060-107 = "Boss, you really thought all of this through! You're amazing!"
10016060-108 = "Yes! Now let's use this momentum and start a protest for a three-day work week!"
10016060-110 = "...So you're telling me you stole our expensive equipment to create a barricade to argue for something as menial as a three-day work week?"
10016060-112 = "What? The Executive Committee is here?!"
10016060-113 = "How did they find us?!"
10016060-115 = "Unknown students not participating in the games were taking equipment from the stadium. Did you truly believe that wouldn't stand out?"
10016060-116 = "In addition, there are robots responsible for moving equipment for the field day, so it was even more suspicious."
10016060-117 = "I...didn't even think of that..."
10016060-118 = "More importantly, what nonsense were you spouting earlier. A three-day work week?"
10016060-119 = "I would understand a four-day work week, but three? You expect to have more weekend days than workdays in a week?"
10016060-120 = "Sh-Shut up! How many people in the world like working more than playing?!"
10016060-121 = "If the General Student Council truly cared about the students' wellbeing, they would give us four days of rest a week!"
10016060-122 = "[s] \"That's right!\""
10016060-123 = "Sensei! You're an adult, remember? You can't agree with them!"
10016060-124 = "But back to the subject... You need to face consequences for violating school rules and trying to disrupt the Kivotos Halo Festival."
10016060-125 = "I won't punish you for stealing the equipment if you return it immediately, but if we find any damages, you will be charged for the repairs!"
10016060-126 = "Do you think it'll be that easy to scare us off?"
10016060-127 = "We prepared something for exactly this scenario..."
10016060-133 = "We stole a tank that was parked outside the stadium!"
10016060-134 = "[s1] \"A tank...? Oh...\"\n[s2] \"Wait, that's probably not a tank...\""
10016060-135 = "Why do you sound confused? What else could it be besides a tank?!"
10016060-136 = "What do you mean? If it's not a tank, then what is it?"
10016060-137 = "It has continuous tracks, steel armor, and a machine gun. What else could it be?"
10016060-138 = "[s3] \"(She has a point...)\"\n[s4] \"(I can't argue that...)\""
10016060-139 = "Plus, we were just about to finish our super durable barricade!"
10016060-140 = "Plus, we were just about to finish our super durable barricade!"
10016060-141 = "This barricade is built with metal and wood. It's impenetrable! I bet even the Gehenna Prefect Team and Trinity Justice Task Force together couldn't get through it!"
10016060-147 = "...You called?"
10016060-149 = "B-Boss... What do we do? The Prefect Team, Justice Task Force, and Seminar are all here together!"
10016060-150 = "D-Don't be scared! We have a tank, remember?"
10016060-151 = "They might be members of the Student Councils, but there aren't many of them. We can just mow them all down!"
10016060-152 = "Well, then..."
10016060-153 = "Go, Bourgeois Crasher!"
10016060-154 = "[s] \"The cheer bot has yet another name...\""

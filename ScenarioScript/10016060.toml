[translation]
10016060-1 = "ตอนที่ 6;ความร่วมมือ 1"
10016060-4 = "แฮ่ก แฮ่ก... เหมือนว่าจะไม่อยู่ตรงนี้นะคะ"
10016060-5 = "มาชิโระ เจอพวกนักเรียนที่ลำเลียงอุปกรณ์ในพื้นที่อื่นบ้างมั้ยคะ?"
10016060-6 = "ตอนนี้ฉันกำลังมองรอบๆ สนามกีฬาอยู่จากหอเตือนภัย แต่ยังไม่เจอนักเรียนน่าสงสัยที่กำลังลำเลียง#nอุปกรณ์อะไรเลยค่ะ"
10016060-7 = "ฉันขอให้สมาชิกคนอื่นในสนามกีฬารวบรวมพยานหลักฐานให้แล้ว แต่คำให้การจากพยานแต่ละที่ก็#nสับสนปนเป..."
10016060-8 = "ตอนนี้เลยยังไม่รู้เลยน่ะค่ะว่านักเรียนที่มีปัญหากลุ่มนั้นไปที่ไหนแล้ว"
10016060-9 = "[s] \"คิริโนะ จำได้มั้ยว่านักเรียนพวกนั้นมีลักษณะเป็นยังไง?\""
10016060-11 = "หมายถึงลักษณะท่าทางเป็นยังไงใช่มั้ยคะ! อืม... ขอนึกก่อนนะคะ"
10016060-12 = "เหมือนจะไว้ผมสั้นและใส่ชุดกีฬา... แล้วคลับคล้ายคลับคลาว่าจะใส่รองเท้ากีฬาด้วยค่ะ..."
10016060-13 = "เฮ้อ— ให้ข้อมูลซะหาง่ายเลยนะ นักเรียนแถวนี้ก็แต่งตัวแบบนี้กันทั้งนั้นแหละ"
10016060-14 = "จากที่ฟังแล้ว การแต่งตัวของพวกนั้นธรรมดาเอาเสียมากๆ จนใครก็ต้องคิดว่าไม่น่าสงสัย เลยไม่ได้#nใส่ใจจะจำอะไรน่ะ"
10016060-15 = "ขะ... ขอโทษค่ะ... ฉันควรจะต้องสังเกตหน้าตาของพวกนั้นมาแท้ๆ..."
10016060-19 = "ไม่เป็นไรหรอกค่ะ แค่รายงานว่ามีนักเรียนแบบนั้นก็เป็นประโยชน์มากแล้วค่ะ"
10016060-24 = "(...แต่ก็น่าเสียดายอยู่นะคะที่คนทำงานเราน้อยไปหน่อย)"
10016060-25 = "(ถ้าที่นี่เป็นทรีนิตี้และเรียกคนออกมาช่วยหาได้ ก็คงจะหาตัวเจอได้เร็วๆ แล้วเชียว...)"
10016060-26 = "มีปัญหาอะไรกันหรือเปล่าคะ?"
10016060-27 = "เสียงนี้มัน...?"
10016060-34 = "กรรมการจากเกเฮนน่า ทรีนิตี้ และมิลเลเนียมมารวมตัวกันแบบนี้... เป็นการรวมตัวที่แปลกดีแฮะ"
10016060-35 = "ปะ... แปลกอะไรกันล่ะ! อย่าเอาคนมาผูกเข้าด้วยกันแล้วทำเหมือนเราเป็นพวกเดียวกันสิ!"
10016060-36 = "คิดว่าฉันก็อยากอยู่รวมกับคุณนักเหรอคะ? ฉันไม่ขอถูกมองว่าเป็นผู้หญิงประหลาดแบบนี้หรอกค่ะ"
10016060-37 = "ผู้หญิงประหลาดงั้นเหรอ?!"
10016060-38 = "เฮ้อ... อย่าทะเลาะกันสิคะทุกคน"
10016060-40 = "สามคนนี้มาอยู่ด้วยกันทำไมคะ...?"
10016060-41 = "ระหว่างทางกลับไปที่หน่วยพยาบาล ฉันเจอสองคนนี้นอนหมดแรงกันอยู่บนม้านั่งน่ะค่ะ..."
10016060-42 = "ฉันกำลังไปคาเฟ่พักผ่อนและหาอะไรเย็นๆ ดื่มฟื้นฟูพลังอยู่ค่ะ"
10016060-43 = "จะว่าไป คุณฮาสุมิ ทำไมทำสีหน้าแบบนั้นล่ะคะ มีปัญหาอะไรหรือเปล่าคะ?"
10016060-44 = "ไม่ค่ะ ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ"
10016060-45 = "ก็แค่นักเรียนจากสถาบันฝึกตำรวจวัลคิรี่รายงานมาว่าพบกลุ่มนักเรียนที่มาขนย้ายอุปกรณ์ที่ใช้ในการ#nแข่งขันไปตามใจชอบเลยน่ะค่ะ"
10016060-46 = "ถึงจะเป็นแค่การสันนิษฐาน แต่ฉันคิดว่าอาจจะมีใครที่ไม่น่ารักมายุ่งเกี่ยวกับอุปกรณ์ที่เราใช้ในการ#nแข่งขันก็ได้..."
10016060-48 = "หา? นี่มันเรื่องใหญ่มากเลยนะ!"
10016060-49 = "งะ... งั้นเหรอคะ?"
10016060-50 = "อุปกรณ์ที่ใช้ในการแข่งขันราคาไม่ใช่น้อยๆ เลยนะ! ถ้ามีใครมาขโมยไป เราเสียหายทางการเงินแน่..."
10016060-51 = "แถมอุปกรณ์ของงานแข่งขันกีฬาครั้งนี้ยังมาจากการบูรณาการเทคโนโลยีของมิลเลเนียมด้วย ดีไม่ดีพวกนั้นอาจเอาไปใช้ในทางเสียๆ หายๆ ก็ได้ค่ะ"
10016060-52 = "เดือนที่แล้วมีนักเรียนเกเรของเกเฮนน่าไปติดตั้งเครื่องพ่นไฟในหุ่นยนต์ทำความสะอาดที่นำเข้ามา#nจากมิลเลเนียม จนเกิดความวุ่นวายในโรงเรียนด้วยค่ะ"
10016060-53 = "แค่หุ่นยนต์ทำความสะอาดอย่างเดียวก็สร้างความเสียหายให้คณะกรรมการวินัยถึง 1 กองร้อยเลย แล้วถ้าเป็นอุปกรณ์แข่งกีฬาที่ใช้เทคโนโลยีมิลเลเนียม จะก่อปัญหาอะไรให้บ้างคะเนี่ย"
10016060-54 = "หุ่นยนต์ทำความสะอาดนั่นอาจจะมีเครื่องพ่นไฟติดตั้งไว้ตั้งแต่แรกก็ได้..."
10016060-55 = "แต่ก็เอาเถอะค่ะ เราไม่มีเวลากันมากแล้ว รีบมาเตรียมรับมือกันเถอะค่ะ"
10016060-56 = "คุณยูกะคะ อุปกรณ์ทุกอย่างในมิลเลเนียมมีป้ายอิเล็กทรอนิกส์กำกับไว้ใช่หรือเปล่าคะ?"
10016060-57 = "พอเสร็จการแข่งขันแล้ว ช่วยตรวจสอบรายการอุปกรณ์ที่ยังคืนไม่ครบ และเวลาสิ้นสุดการแข่งขันของ#nอุปกรณ์พวกนั้นด้วยนะคะ"
10016060-58 = "ส่วนฉันจะไปตรวจสอบบันทึกการเข้าออกอาคารหลักๆ และสรุปรายชื่อนักเรียนที่ใช้ยานพาหนะในช่วง#nเวลาดังกล่าวค่ะ"
10016060-59 = "ฉันเองก็กำลังทำแบบนั้นอยู่ ไม่ต้องสั่งกันขนาดนั้นก็ได้หรอกน่า!"
10016060-65 = "น่าแปลกจังเลยค่ะ..."
10016060-66 = "ทำไมนักเรียนเกเฮนน่าถึงมาช่วยพวกฉันล่ะคะ? มีแผนการอะไรในใจหรือเปล่า?"
10016060-67 = "หืม...?"
10016060-68 = "ฉันไม่ได้มาทำเรื่องน่ารำคาญแบบนี้เพราะอยากช่วยนักเรียนทรีนิตี้หรอกนะคะ?"
10016060-69 = "ฉันเองก็เป็นหนึ่งในคณะกรรมการจัดงานฮาโลเฟสติวัล และฉันก็แค่เข้ามาทำหน้าที่ของตัวเอง และป้องกันไม่ให้เกิดเหตุการณ์ที่จะเป็นอุปสรรคในการทำงานของสถาบันเกเฮนน่าก็เท่านั้นค่ะ"
10016060-70 = "และหากสมมติว่านักเรียนที่ก่อเหตุเป็นนักเรียนจากเกเฮนน่าจนเราถูกเรียกร้องค่าเสียหาย ก็คงจะเป็นเรื่องน่าเหนื่อยใจค่ะ"
10016060-71 = "คุณก็ไม่ได้คิดเหมือนกันหรอกเหรอคะ?"
10016060-72 = "...เอาเป็นว่าฉันจะเชื่อคำพูดนั้นก่อนก็แล้วกันค่ะ"
10016060-74 = "ถ้างั้นฉันขอตัวไปสืบจากผู้เข้าชมก่อนนะคะว่ามีใครเห็นนักเรียนที่ดูน่าสงสัยแถวนี้บ้างหรือเปล่า"
10016060-75 = "คุณมารี ช่วยไปกับฉันด้วยนะคะ"
10016060-76 = "ค่ะ!"
10016060-80 = "...เห็นนักเรียนที่ถือกล่องอุปกรณ์มุ่งหน้าไปยังทางเข้าชั้นใต้ดินอย่างนั้นเหรอคะ?"
10016060-81 = "ก็ใช่น่ะสิ ฉันคิดว่ามันแปลกๆ พวกนั้นน่ะขนกล่องที่มีแต่แท่งโลหะแล้วก็ร้องโอดโอยไปด้วย แต่พอถาม#nว่าจะให้ช่วยมั้ยก็โดนปฏิเสธกลับมา"
10016060-82 = "ฉันกลัวว่าจะล้มหัวคะมำก็เลยมองไม่ขาดสายตาว่าไปทางไหน ไม่มีทางพลาดได้หรอก"
10016060-83 = "ฉันสรุปรายการและจำนวนอุปกรณ์ที่ยังไม่ถูกส่งคืนหลังจากสิ้นสุดการแข่งขันมาแล้ว"
10016060-84 = "มีกล่องลูกกระสุนปืนใหญ่ที่ใช้ในการแข่งขันทุ่มน้ำหนักกับรั้วที่ใช้ในการแข่งขันวิ่งข้ามสิ่งกีดขวาง#nประเภทบุคคล และอื่นๆ..."
10016060-85 = "และหลังจากสิ้นสุดการแข่งขัน ก็มีนักเรียนคนอื่นที่ไม่ใช่นักกีฬาเข้ามาในสนาม ดังรายชื่อต่อไปนี้ค่ะ"
10016060-86 = "คุณคิริโนะ ในนี้มีคนที่คุ้นหน้าบ้างมั้ยคะ?"
10016060-87 = "อ๊ะ คนนี้ค่ะ! คนที่ขนย้ายอุปกรณ์เมื่อกี้นี้คือนักเรียนคนนี้เลยค่ะ!"
10016060-89 = "พอเอาหลักฐานมาประกอบกันแล้ว นักเรียนที่อยู่ในรูปนี้น่าจะกำลังแอบลำเลียงอุปกรณ์ออกไปยังทาง#nเข้าชั้นใต้ดินของสนามกีฬานะคะ"
10016060-90 = "...ทางเข้าชั้นใต้ดินของสนามแข่งขันกีฬางั้นเหรอ?"
10016060-91 = "แต่ตรงนั้นมันเป็นพื้นที่แคบๆ เราก็เลยไม่ใช้เป็นทางเข้าออกกันนี่นา ทำไมพวกนั้นถึงขนอุปกรณ์ไปไว้#nตรงนั้นกันล่ะ?"
10016060-92 = "เรื่องนั้นน่ะ ถ้าจับคนร้ายได้ก็ค่อยถามเหตุผลก็ได้ค่ะ"
10016060-93 = "เอาละ รีบเคลื่อนไหวกันก่อนจะเกิดเรื่องอะไรน่ารำคาญเถอะค่ะ"
10016060-95 = "ฮาโลเฟสติวัล... เทศกาลกีฬาที่ร้อนแรงที่สุดในคิโวทอสที่จัดขึ้นในทุก 2 ปี"
10016060-96 = "เทศกาลที่ทุกสื่อต่างให้ความสนใจ การแค่ได้แสดงฝีมือในงานก็ทำให้คุณเป็นวีรสตรีที่จะถูกจารึกใน#nหน้าประวัติศาสตร์ของโรงเรียนได้ และยังฝากข้อความให้รุ่นน้องเก็บไว้ในใจได้อีกด้วย"
10016060-97 = "และนั่นก็หมายความว่า..."
10016060-101 = "ถ้ามีการประท้วงในเทศกาลนี้ ก็จะสร้างแรงกระเพื่อมได้มากสุดๆ!"
10016060-102 = "บอส แต่ที่สนามแข่งขันกีฬานี้มีทั้งคณะกรรมการจากแต่ละโรงเรียน และมีนักเรียนจากสถาบันฝึก#nตำรวจวัลคิรี่มาด้วยนะคะ..."
10016060-103 = "ถ้าก่อการประท้วงเหมือนปกติทั่วไป คณะกรรมการจัดงานต้องรีบเข้ามาจัดการแน่ค่ะ"
10016060-104 = "อืม เรื่องนั้นไม่ต้องกังวลไป ถ้ากล้องของโครโนสจับมาที่เรา คณะกรรมการจัดงานก็คงไม่กล้าทำอะไร#nสุ่มสี่สุ่มห้าต่อหน้าสื่อหรอก"
10016060-105 = "และตราบใดที่เรายึดพื้นที่ทางเข้าชั้นใต้ดินของสนามกีฬาไว้ พวกนั้นก็คงไม่กล้าใช้ระเบิดหรืออุปกรณ์#nที่จะสร้างความเสียหายให้สนามกีฬาหรอก"
10016060-106 = "ถ้าเป็นแบบนั้น ฝ่ายตรงข้ามก็จะฝ่ากำแพงกั้นของพวกเราไม่ได้ จนสุดท้ายก็ต้องมาเจรจากับพวกเรา!"
10016060-107 = "สุดยอดเลยค่ะบอส เป็นอุบายที่ยอดเยี่ยมเลยค่ะ"
10016060-108 = "งั้นก็ลุยเลย เราต้องผลักดันนโยบายทำงานสัปดาห์ละ 3 วันที่เราคาดหวังกันมานานแล้ว—"
10016060-110 = "เอาอุปกรณ์ราคาแพงมาใช้เป็นเกราะป้องกันเพียงเพราะเหตุผลแบบนี้น่ะเหรอ?"
10016060-112 = "คณะกรรมการจัดงานเข้ามาได้ยังไง...?!"
10016060-113 = "รู้ได้ยังไงน่ะว่าพวกเราอยู่ที่นี่?"
10016060-115 = "นักกีฬาก็ไม่ได้เป็น แต่กลับเข้ามาในสนามกีฬาและขนอุปกรณ์ออกไปแบบนี้ ไม่ว่าใครก็ต้องสังเกต#nเห็นอยู่แล้วค่ะ"
10016060-116 = "แถมอุปกรณ์ส่วนมากที่ใช้ในฮาโลเฟสติวัลก็ถูกลำเลียงโดยหุ่นยนต์ ดังนั้นถ้าเป็นคนมาขนไปเองก็ต้อง#nสะดุดตาอยู่แล้ว..."
10016060-117 = "มะ... มีช่องโหว่แบบนี้อยู่ด้วยสินะ..."
10016060-118 = "จะว่าไป นโยบายทำงานสัปดาห์ละ 3 วันงั้นเหรอ?"
10016060-119 = "ถ้าสัปดาห์ละ 4 วันก็ว่าไปอย่าง นี่สัปดาห์ละ 3 วัน แบบนี้มีวันหยุดมากกว่าวันทำงานอีกไม่ใช่เหรอคะ?"
10016060-120 = "นะ... หนวกหูน่า!! พวกเธอไม่รู้หรอกว่ามีหลายคนในโลกที่ชอบการพักผ่อนมากกว่าการทำงานอยู่น่ะ!"
10016060-121 = "ยิ่งเป็นองค์การนักเรียนที่จัดตั้งมาเพื่อนักเรียนแล้วละก็ ยิ่งต้องบัญญัติกฎให้มีวันหยุดสัปดาห์ละ 4 วันสิ "
10016060-122 = "[s] \"เห็นด้วย!\""
10016060-123 = "คุณครู อย่าไปเห็นดีเห็นงามกับการใช้คารมแบบนี้สิคะ คุณครูเป็นผู้ใหญ่นะคะ?"
10016060-124 = "ฮึ่ม... แต่ยังไงการฝ่าฝืนกฎของโรงเรียนและมาขัดขวาง <ฮาโลเฟสติวัล> ก็เป็นสิ่งที่ยอมรับไม่ได้"
10016060-125 = "ถ้ายอมคืนอุปกรณ์และถอยกลับไปแต่โดยดี ฉันก็จะไม่ร้องขอให้รับผิดชอบต่อการกระทำ แต่ถ้าไม่ยอม และอุปกรณ์เกิดมีปัญหาอะไรขึ้นมา ฉันจะเรียกเก็บค่าซ่อมด้วย!"

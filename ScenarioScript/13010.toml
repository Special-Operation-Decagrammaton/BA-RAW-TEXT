[translation]
13010-1 = "ตอนที่ 1;บทเริ่มต้น"
13010-4 = "หาเจอจนได้"
13010-5 = "สหายเก่าแก่ของพวกเราที่ถูกขับไล่จากเกมาเทรียและถูกฝังผนึกไว้"
13010-7 = "ทรมาน... ทรมานเหลือเกิน..."
13010-8 = "ความทรมานของคุณสิ้นสุดลงแล้ว ตื่นขึ้นมาเถอะ <ผู้อาศัยอยู่ใต้พิภพ>"
13010-9 = "......"
13010-10 = "เสียงนี้มัน..."
13010-11 = "คุณเองเหรอครับ <ผู้สังเกตการณ์นิรนาม>..."
13010-12 = "ไม่ใช่ ครั้งนี้จงเรียกเราว่า <ฟรานซิส>"
13010-13 = "มะ... ไม่เป็นไรดีกว่าครับ ทิ้งกระผมไว้เถอะครับ... "
13010-14 = "กระผมไม่รู้ว่าคุณมาหาด้วยเหตุผลอะไร... แต่กระผมไม่สนหรอกครับ หึหึหึ..."
13010-15 = "ไม่ว่าจะเป็นเรื่องอะไรก็ตาม จากนี้ไปกระผมจะ..."
13010-18 = "เกมาเทรียถูกกวาดล้างแล้ว"
13010-19 = "......"
13010-20 = "หมายความว่ายังไง...?"
13010-22 = "ตอนนี้เกมาเทรียหายไปแล้ว จะมองว่าสลายตัวไปแล้วก็ได้"
13010-23 = "ส่วนสาเหตุก็มีเพียงอย่างเดียว"
13010-24 = "นั่นคือการมีอยู่ของครูจากชาเล่ต์ที่ชื่อ [USERNAME] ผู้บิดเบือนรูปแบบและเหตุผล"
13010-25 = "ณ ตอนนี้ การเผชิญหน้ากับคนคนนั้น..."
13010-26 = "ชู่ว..."
13010-31 = "ฮืม..."
13010-32 = "อย่างนั้นเองเหรอ... [ruby=โคเด็กซ์]หนังสือแห่งกฎ[/ruby]ถูกปรับปรุงใหม่แล้วสินะครับ"
13010-40 = "โลกใบใหม่... ครับ กระผมสัมผัสได้ ถึงสิ่งแปลกปลอมของโลกใบนี้"
13010-41 = "หากหนังสือเปลี่ยนไป และกฎเปลี่ยนไปแล้ว... ก็คงจะเป็นจุดเริ่มต้นของแคมเปญใหม่สินะครับ"
13010-42 = "ยะ... อย่างนั้นสินะครับ... หึหึหึ... ถ้าอย่างนั้นเรื่องราวก็แตกต่างออกไปน่ะสิ"
13010-43 = "คะ... คะ... คราวนี้หนังสือจะทำให้กระผมตระหนักอะไรได้นะ..."
13010-44 = "เมื่อกี้... พูดถึง [USERNAME] ใช่ไหมครับ...?"
13010-45 = "เขาเป็นบอสของแคมเปญนี้งั้นเหรอครับ...? ไหนดูซิ..."
13010-46 = "หนังสือแห่งกฎเล่มใหม่..."
13010-52 = "เมืองแห่งการศึกษา...?"
13010-58 = "แล้วเป็นครูที่นั่น...?"
13010-60 = "อะ... อะ... อะไรกัน... แบบนี้มัน... ยะ... ยากไม่ใช่เล่นเลยนี่ครับ...? ถ้าเป็นอย่างนี้ละก็..."
13010-64 = "แต่ไม่ว่าจะเป็นอะไร ก็ต้องมีวิธีเอาชนะเสมอครับ ไหนดูซิ... ช่องโหว่ จุดบอด ข้อบกพร่อง... เลือกใช้ได้หมดเลย..."
13010-65 = "อย่าดูถูกคนคนนั้นเชียวล่ะ ผู้อาศัยอยู่ใต้พิภพ"
13010-69 = "เราไม่สนใจหรอกนะว่าคุณเข้าใจโลกนี้แบบไหน... แต่ถ้าจะมาตัดสินโลกนี้ด้วยบอร์ดเกมหรืออะไร#nแบบนั้นเพียงอย่างเดียวละก็ คุณไม่สามารถได้ชัยชนะที่ถูกต้องมาครองหรอก"
13010-70 = "......"
13010-71 = "เราจะบอกคำตอบให้เอง วิธีที่จะเอาชนะคนคนนั้นได้ก็คือ..."
13010-77 = "อย่ามาขัดขวางกันนะ!!! แกน่ะมันขยะ!!!!"
13010-82 = "คนที่ไม่รู้จักความตายอย่างแกน่ะ! คนอย่างแกเนี่ยนะ?!?"
13010-83 = "เข้าใจถึงความเจ็บปวด ความโดดเดี่ยว และความกลัวของกระผมบ้างรึเปล่า!!"
13010-84 = "อย่ามาขัดขวางกันเลย <ผู้สังเกตการณ์นิรนาม>!! นี่เป็นแคมเปญของกระผมแต่เพียงผู้เดียว!!"
13010-85 = "สิ่งที่สำคัญที่สุดคือกระผมจะตระหนักรู้ถึงอะไรได้บ้างจากความลำเค็ญนี้ต่างหาก!!"
13010-86 = "และกระผมก็จะไม่ยอมให้เข้ามาขวางเด็ดขาด!!!!"
13010-91 = "อย่ามาแทรกแซงแคมเปญของกระผมตามอำเภอใจ!!"
13010-102 = "แฮ่ก... แฮ่ก..."
13010-103 = "เอะอะก็ชัยชนะ... ทำไมทุกคนถึงได้ยึดติดกับเรื่องแบบนั้นนักนะ?"
13010-104 = "ผลลัพธ์มันถูกกำหนดไว้แล้วไม่ใช่รึไง!! ยังไงพวกเราก็ต้องตายอยู่ดี! นั่นคือความจริงที่ไม่อาจเปลี่ยน#nแปลง!"
13010-105 = "ทุกคนมีชะตาที่จะต้องพบกับความพ่ายแพ้กันทั้งนั้น!! นั่นไม่ใช่สิ่งที่สำคัญหรอก!"
13010-106 = "ใช่... มันสำคัญแค่ว่า... กระผมจะประสบกับอะไรและตระหนักถึงอะไรได้จากกระบวนการ"
13010-107 = "ไม่อยากเชื่อเลยว่าคนอย่างแกจะกล้ายกชื่อการแสวงหาหนทางรู้แจ้งอันสูงส่งอย่าง <เกมาเทรีย> ขึ้นมา! ชะ... ชื่อนั้นน่ะ..."
13010-108 = "มันน่าเสียดายนะ!!!"
13010-110 = "แฮ่ก... แฮ่ก..."
13010-111 = "สะ... สงบสติอารมณ์ก่อน ต้องสงบสติอารมณ์..."
13010-112 = "ตอนนี้ต้องตัดสินใจแล้วว่า... ตะ... ต้องทำอะไร... "
13010-116 = "เกมาเทรียถูกกวาดล้างไปแล้วงั้นเหรอ?"
13010-117 = "ไม่สิ เกมาเทรียที่แท้จริงคือกระผมต่างหาก"
13010-118 = "จากนี้ไป กระผมคงต้องแสดงตัวตนที่แท้จริงของเกมาเทรียให้เห็นแล้วสินะครับ..."
13010-119 = "หึหึหึ... ดีครับ ดีเลย ก่อนอื่นคงต้องทำความรู้จักโลกใบนี้ก่อน... กฎใหม่... แคมเปญใหม่... "
13010-120 = "อ่า... ถ้าอย่างนั้นการแสวงหาหนทางรู้แจ้งของกระผมก็คงต้องเริ่มจากตรงนั้นสินะครับ"
13010-122 = "อะบิดอส..."
13010-123 = "อยากรู้จังเลยนะครับว่าจักรวรรดิที่สร้างความลึกลับอันยิ่งใหญ่เป็นครั้งแรกนั่นน่ะ... สุดท้ายแล้วจะเป็น#nยังไงในกฎครั้งนี้"
13010-125 = "ผมตั้งตารอเลยละครับ"
13010-130 = "ได้โปรด... อย่าทำให้ผมผิดหวังนะครับ"
13010-136 = "ดูนี่สิ! โฮชิโนะจัง!"
13010-138 = "สภานักเรียนเก่าฝังสิ่งที่ยิ่งใหญ่ไว้ในโอเอซิสอันกว้างใหญ่ในอะบิดอสด้วยละ!!"
13010-139 = "คะ? สิ่งที่ยิ่งใหญ่เหรอคะ?"
13010-140 = "อื้อ! เป็นของที่ใช้ในการแสดงดอกไม้ไฟน่ะ สงสัยจะเป็นพวกดอกไม้ไฟที่ทำจากแร่หายากนะ"
13010-141 = "ถ้ากระตุ้นตรงนี้ด้วยอุณหภูมิสูงๆ ก็จะเกิดประกายไฟจากพลาสม่าที่ทำให้ท้องฟ้าสวยงามน่ะ "
13010-142 = "ดูสิ มีดอกไม้ไฟรูปร่างแบบนี้ด้วย! น่ารักเนอะ?"
13010-146 = "เห็นว่าเดิมทีแล้วสิ่งนี้จะถูกใช้ในงานเทศกาล แต่ก็ไม่รู้ว่าทำไมมันถึงใช้งานไม่ได้ขึ้นมา ก็เลยเอาไปทิ้งไว้ในทะเลสาบน่ะ"
13010-147 = "ฮืม..."
13010-148 = "สุดยอดเลยว่ามั้ย? การทิ้งของที่มีส่วนผสมของแร่ธาตุที่มีมูลค่ามากกว่า 1 ล้านเยนต่อ 100 กรัมลงไป#nในทะเลสาบเพียงเพราะมันใช้งานไม่ได้น่ะ"
13010-149 = "นี่ต้องเรียกว่าเป็นสภานักเรียนอะบิดอส... หรือกลุ่มคนที่มีเงินเป็นกอบเป็นกำจนใช้เบาะปูพื้นสำหรับ#nออกกำลังกายที่ทำมาจากขนเป็ดดีนะ..."
13010-150 = "ถ้าเอาสัก 1 ใน 100 ของทรัพย์สินนั้นมาให้พวกเราก็ดีน่ะสิ... ฮือ..."
13010-151 = "แต่ว่าโอเอซิสนั่นมันแห้งไปนานแล้วไม่ใช่เหรอคะ? "
13010-152 = "อื้ม ก็ใช่นะ?"
13010-153 = "ตอนนี้เป็นแค่ที่ราบที่มีแต่ทรายจนไม่เหลือเค้าเดิมของโอเอซิสแม้แต่น้อยเลยนี่คะ? อยากจะสื่ออะไรเหรอคะ?"
13010-154 = "ฮุฮุฮุ โฮชิโนะจังนี่ยังไม่รู้อะไรเลยนะเนี่ย"
13010-155 = "นั่นมันเป็นเรื่องราวในสมัยที่มีทะเลสาบ งั้นก็แปลว่าเรื่องนี้มันเกิดขึ้นมานานมากแล้วใช่มั้ย?"
13010-156 = "แล้วยังไงเหรอคะ?"
13010-157 = "แปลว่าความจริงแล้ว... ดอกไม้ไฟราคาแพงนั่นน่ะ..."
13010-158 = "ถูกฝังอยู่ใต้ที่ราบทราย... หรือโอเอซิสที่แห้งไปแล้วนั่นละ"
13010-162 = "แร่ราคาแพงถูกฝังอยู่ใต้พื้นโอเอซิสขนาดใหญ่ที่แห้งไปแล้ว? แบบนี้เหรอคะ?"
13010-163 = "อื้อ!"
13010-167 = "รุ่นพี่ยูเมะ... รู้ตัวไหมคะว่ากำลังพูดเรื่องอะไรอยู่?"
13010-169 = "อ่า... คือว่า..."
13010-173 = "นี่ไม่ใช่เวลาจะมาอยู่เฉยกันอย่างนี้นะคะ! ถ้ามันเป็นอย่างที่รุ่นพี่ยูเมะว่า เราก็ต้องไปหามาเดี๋ยวนี้เลย#nสิคะ!"
13010-174 = "อื้อ ใช่แล้ว! นั่นละที่ฉันจะสื่อ! จากนี้เราจะไปล่าสมบัติกัน! "
13010-175 = "แฮะๆ~ ไปกันเดี๋ยวนี้เลยค่ะ! รุ่นพี่!"
13010-176 = "อื้อ! เราจะได้เป็นเศรษฐีกันแล้วนะโฮชิโนะจัง!"
13010-187 = "โฮชิโนะจัง... นั่นมัน..."
13010-188 = "เบาๆ สิรุ่นพี่! ฉันก็รู้สึกได้อยู่เหมือนกัน!"
13010-189 = "ใช่มั้ย? ฉันไม่ได้รู้สึกไปคนเดียวใช่มั้ย? งั้นเราควรจะหยุดกันแค่นี้รึเปล่า?"
13010-190 = "ละ... ลองขุดต่ออีกหน่อยมั้ยคะ...?"
13010-191 = "ขอโทษนะ.... น่าจะคว้าน้ำเหลวแล้วละ โฮชิโนะจัง"
13010-192 = "อะ... อึก..."
13010-194 = "นี่ โฮชิโนะจัง... เราทำพลาดกันตั้งแต่ตอนไหนน่ะ...?"
13010-195 = "ตั้งแต่ตอนที่รุ่นพี่เอาแผนการแปลกๆ มารึเปล่าคะ?"
13010-196 = "อ้าว... ตกลงเป็นความผิดของฉันเหรอ...? แต่ตอนนั้นโฮชิโนะจังก็ตื่นเต้นเหมือนกันนี่นา..."
13010-197 = "ฉะ... ฉันก็รู้ตัวดีค่ะ ไม่ต้องย้ำเรื่องนั้นหรอกค่ะ!"
13010-202 = "พอมาคิดดูแล้ว เราไม่จำเป็นต้องใส่ชุดว่ายน้ำมาด้วยซ้ำ..."
13010-203 = "รุ่นพี่ไม่ได้มีจุดประสงค์อะไรสินะคะ...?! แล้วทำไมถึงชวนใส่ตั้งแต่แรกล่ะ?"
13010-204 = "ก็... เผื่อไว้ว่าถ้าเราขุดดินไปเรื่อยๆ แล้วน้ำบาดาลจะระเบิดออกมาน่ะ..."
13010-205 = "มันจะเป็นไปได้ด้วยเหรอคะเรื่องแบบนั้น?!"
13010-207 = "ก็ถ้าเป็นแบบนั้น เราจะได้คลี่คลายเรื่องทะเลทรายได้ด้วยไง..."
13010-208 = "ได้ซะที่ไหนกันล่ะคะ!"
13010-209 = "ฮือออ..."
13010-211 = "อืม ถ้าไม่เขียนสิ่งที่เกิดขึ้นในวันนี้ลงไปเพื่อเป็นการสำนึกผิดละก็..."
13010-212 = "ดะ.. เดี๋ยวก่อน รุ่นพี่? กำลังเขียนอะไรอยู่เหรอคะ? "
13010-213 = "จะบันทึกเรื่องงี่เง่าที่เราไปทำกันเหรอ? น่าอายจะตาย ไม่ต้องบันทึกไว้นะคะ!"
13010-214 = "แต่มันคือหน้าที่ของประธานสภานักเรียนนะ... ต้องจดไว้สิ ต่อไปจะได้เป็นประโยชน์กับโฮชิโนะจัง..."
13010-215 = "ก็บันทึกนั้นมีแต่เรื่องที่ทำไม่สำเร็จนี่คะ! อีกอย่าง ใครจะไปรับช่วงต่อสมุดโน้ตขาดรุ่งริ่งแบบนั้นล่ะคะ!? ฉันจะซื้อเล่มใหม่ค่ะ!"
13010-216 = "งื้อ....."
13010-222 = "ห้องคณะกรรมการแผนงาน"
13010-223 = "เอาละ ฉันขอเริ่มการประชุมคณะกรรมการแผนงานอะบิดอส..."
13010-224 = "เอ๋? แต่ยังมาไม่ครบคนหนึ่งนะคะ?"
13010-228 = "อื้อ! คนดีคนเดิมที่ไม่มาสักที~☆"
13010-229 = "อื้ม รุ่นพี่โฮชิโนะไม่อยู่"
13010-230 = "อะไรกัน ไปไหนของเขาอีกน่ะ? ไปแอบงีบอยู่ตรงไหนอีกรึเปล่า?"
13010-231 = "เมื่อกี้เห็นว่านอนอยู่ห้องเรียนข้างๆ น่ะ"
13010-232 = "ว่าไงนะ? งั้นก็ควรตามตัวมาสิ รุ่นพี่ชิโรโกะ! เรามีประชุมกันนะ!"
13010-233 = "อะ... อืม... พอดีว่าไม่อยากปลุกน่ะ..."
13010-234 = "ทำไมเหรอ? หรือเพราะกำลังนอนหลับปุ๋ยอยู่?"
13010-235 = "ฉันเข้าใจค่ะ ก็ชิโรโกะจังเอ็นดูรุ่นพี่โฮชิโนะนี่คะ "
13010-236 = "ฉันจะไปให้เดี๋ยวนี้ละ"
13010-237 = "อ๊ะ งั้นฉันไปด้วยค่ะ ชิโรโกะจัง"
13010-242 = "อะไรกัน... ไม่เห็นจะต้องแห่กันไปหมดเลยก็ได้นี่"
13010-243 = "อะฮ่าฮ่า... ก็ทุกคนชอบรุ่นพี่โฮชิโนะนี่คะ..."
13010-246 = "รุ่นพี่โฮชิโนะ เราจะประชุมกันแล้ว"
13010-247 = "อื้อ ได้เวลาตื่นนอนแล้วนะคะ~☆"
13010-248 = "เอ๋...?"
13010-255 = "รุ่นพี่โฮชิโนะ?"

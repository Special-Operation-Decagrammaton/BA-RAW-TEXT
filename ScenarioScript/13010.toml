[translation]
13010-1 = "Episode 1;Prologue"
13010-4 = "I finally found you."
13010-5 = "Our old ally who was expelled from Gematria, buried, and sealed away."
13010-7 = "It hurts... It hurts..."
13010-8 = "No, your asceticism ends now. Rise up, \"Underground Dweller.\""
13010-9 = "..."
13010-10 = "...This voice."
13010-11 = "\"Anonymous Bystander,\" is that you...? "
13010-12 = "No. Call me \"Francis\" this time."
13010-13 = "No... It doesn't matter. Please...just leave me alone... "
13010-14 = "I don't know why you came to find me... But I'm not interested. Heeheehee..."
13010-15 = "Whatever it is... I no longer..."
13010-18 = "Gematria has been dispersed."
13010-19 = "..."
13010-20 = "What...do you mean?"
13010-22 = "Gematria is no more. Call it disbanded, call it dismissed."
13010-23 = "There is only one cause for it."
13010-24 = "It's the existence of Schale and [USERNAME] Sensei...that person who has twisted all rules of causality and genre. "
13010-25 = "To face them now, though..."
13010-26 = "...Shhh."
13010-31 = "...Hm."
13010-32 = "Well then. So the Codex has been updated..."
13010-40 = "The new world... Yes, I can feel it. The alien element in this world."
13010-41 = "If we've been handed a new edition...then the rules have changed, heehee. I suppose it's session zero of a new campaign."
13010-42 = "I s-s-see... Heeheehee. Then it's a whole new story."
13010-43 = "I wonder what lessons I'll learn from th-th-this edition..."
13010-44 = "Let's see... You said...[USERNAME]?"
13010-45 = "That's the big bad of this campaign? Then let's s-s-see."
13010-46 = "The new Codex is..."
13010-52 = "Academy City...?"
13010-58 = "And a Sensei...?"
13010-60 = "Wh-What the... Isn't that difficulty too h-h-high...? Something like this..."
13010-64 = "...But there's a strategy for everyth-th-thing. A blind spot...an elemental weakness...an Achilles' heel...anything is good..."
13010-65 = "Do not underestimate that teacher, Underground Dweller."
13010-69 = "Interpret this world how you will. But just because you pretend it's a tabletop game, it doesn't mean you're the winning player."
13010-70 = "..."
13010-71 = "I'll give you a hint. The...\"best build\" for fighting that person is..."
13010-77 = "Don't mess this up for me!!! You trash!!!"
13010-82 = "G-G-Garbage like you don't even know what death is!"
13010-83 = "To think vermin like you could ever understand my s-s-suffering, my solitude, my fear!!"
13010-84 = "Get lost, \"Anonymous Bystander\"!!! This is my campaign!!!"
13010-85 = "All that matters is the enlightenment of my asceticism!!!"
13010-86 = "Don't you DARE get in my way—!!!"
13010-91 = "Don't you DARE mess with myyy campaign—!!!"
13010-102 = "*huff*... *huff*..."
13010-103 = "Victory... Victory... Why is everyone obsessed over s-s-something as stupid as winning?"
13010-104 = "The ending is already set!!! We all die in the end! That doesn't change!"
13010-105 = "We're all fated to lose!!! But that's not what's important!"
13010-106 = "All that matters...is the journey... What you experience on the journey...and what realizations you come to... Now that has meaning."
13010-107 = "How dare you presume to clothe yourself in the sublime name of \"Gematria\"! I-I-It's..."
13010-108 = "An utter shame!"
13010-110 = "*huff*... *huff*..."
13010-111 = "C-C-Calm down. I need to calm down..."
13010-112 = "I need to...d-d-decide my opening move... "
13010-116 = "G-G-Gematria, dispersed?"
13010-117 = "No! I am the true Gematria!"
13010-118 = "I sh-sh-shall show the true face of Gematria from here on out…"
13010-119 = "Heeheehee. Good. Good! First I should learn about this world... This new codex. This new campaign... "
13010-120 = "Ahh. Hahaha...I should start with...that place."
13010-122 = "...Abydos."
13010-123 = "The empire that birthed the first great Mystics... I wonder how they've been written in this codex..."
13010-125 = "Heehee... I'm looking forward to it."
13010-130 = "Please... Don't you dare disappoint me."
13010-136 = "Hoshino, look!"
13010-138 = "This says that the old student council buried something amazing in the Great Abydos Oasis!"
13010-139 = "Huh? Something amazing?"
13010-140 = "Yes! It looks like something used for fireworks displays. It might be a bunch of firecrackers made from rare minerals."
13010-141 = "It says that if you burn it at a high temperature, it'll make some kind of plasma firework which fills the sky with beautiful light."
13010-142 = "Look, they could even make them explode into shapes like this! Isn't it cute?"
13010-146 = "I guess they wanted to use the fireworks for a festival... But for some reason, they didn't work properly and were dumped into the lake."
13010-147 = "...Hm."
13010-148 = "Isn't that amazing? Imagine dumping something made with a rare mineral that costs over a million yen per 100 grams just because it doesn't work right away..."
13010-149 = "But I guess we shouldn't expect more from the same Abydos Student Council who used gym mats made with duck feathers because they had more money than they could spend..."
13010-150 = "I wish they had left us even a hundredth of their budget... Ugh..."
13010-151 = "...But it's been a long time since that oasis dried up. "
13010-152 = "Yeah. You're right."
13010-153 = "That place is nothing but sand dunes now...we saw nothing like fireworks the last time we were there. What are you trying to say?"
13010-154 = "Hee...hee...hee... Hoshino, you only see the surface-level story, don't you."
13010-155 = "These records are from when there used to be a lake, which means it happened a very long time ago, right?"
13010-156 = "Just what are you implying?"
13010-157 = "Those expensive fireworks..."
13010-158 = "They must be buried somewhere beneath that sand."
13010-162 = "There are valuable minerals buried beneath the dried-up lakebed of the great oasis? Is that what you're saying?"
13010-163 = "Exactly!"
13010-167 = "...Yume. Do you have any idea how long excavating that desert might take?"
13010-169 = "Uh... Well..."
13010-173 = "We can't afford to waste any time! We have to get started right now!"
13010-174 = "Yeah! That's exactly what I'm saying! It's time for a treasure hunt! "
13010-175 = "Eheheheh! Let's go, Yume!"
13010-176 = "We're going to be rich, Hoshino!"
13010-187 = "Hoshino... Um..."
13010-188 = "Don't say it, Yume! I can feel it too!"
13010-189 = "Right? It's not just me, then? In that case...should we wrap up soon?"
13010-190 = "M-Maybe after digging just a bit more...?"
13010-191 = "Sorry, Hoshino... I think we're done for."
13010-192 = "U-Urgh..."
13010-194 = "Hoshino... Where did we go so wrong...?"
13010-195 = "When you came up with that ridiculous plan?"
13010-196 = "Aww... But Hoshino, you liked it too. Is it all my fault...?"
13010-197 = "...I-I know that already, you don't have to tell me!"
13010-202 = "Now that I think about it, we probably didn't need to wear our swimsuits at all..."
13010-203 = "...I mean, that was obvious, right?! Why did you say we should wear them in the first place?"
13010-204 = "Well... I thought we might be digging and then... Boom! We hit an aquifer and a burst of groundwater floods out..."
13010-205 = "Is that even possible?!"
13010-207 = "Just imagine! We strike it rich and solve the desertification crisis in the same moment...!"
13010-208 = "There's no way that could happen!"
13010-209 = "Aww..."
13010-211 = "Mmm. I have to write down everything that happened today...and reflect on my actions…"
13010-212 = "W-Wait, Yume— What are you writing? "
13010-213 = "You're going to record this idiocy? Don't do that—it's embarrassing!"
13010-214 = "But it's my responsibility as the Student Council President... So it can help you do better in the future..."
13010-215 = "First of all, the only thing that notebook has is our failures! And who would want such a dingy old thing handed down to them?! I'm going to buy a new one!"
13010-216 = "Aww..."
13010-222 = "Foreclosure Task Force Room"
13010-223 = "Okay, let's start our regular Abydos Foreclosure Task Force meeting..."
13010-224 = "...But before we begin, aren't we missing someone?"
13010-228 = "Yup yup! The one person who never shows up on time! ☆"
13010-229 = "Yes. Hoshino isn't here."
13010-230 = "Where has she run off to now? Don't tell me she's hiding somewhere to take a nap again!"
13010-231 = "I saw her sleeping in the classroom next door."
13010-232 = "What? Then you should have brought her, Shiroko! You knew we had a meeting!"
13010-233 = "I...did not wish to wake her up..."
13010-234 = "Why? Because she was dozing off without a care in the world again?"
13010-235 = "I understand. Shiroko has a soft spot for Hoshino. "
13010-236 = "I'll go get her now."
13010-237 = "Ah, I'll tag along, Shiroko."
13010-242 = "There's no need for everyone to go..."
13010-243 = "Ahaha... Well, everybody likes Hoshino too much to wait..."
13010-246 = "Hoshino. It's time for our meeting."
13010-247 = "Yup yup, it's time to wake up! ☆"
13010-248 = "...Hmm?"
13010-255 = "Hoshino?"
13010-261 = "Were you awake?"
13010-262 = "...Ah."
13010-263 = "...Right. We have a meeting, right?"
13010-264 = "Ah, my bad, my bad. This old timer forgets things all the time."
13010-265 = "Yes."
13010-266 = "Huh? You're not going to say something like \"You're not much older than us!\" this time?"
13010-267 = "Well, all right then...! Let's go! Ayane is scary when she's mad."
13010-271 = "Hoshino, wait for me."
13010-275 = "..."
13010-282 = "[ns] \"Ah, good. Everyone's here.\""
13010-283 = "Yes, Sensei. Now that the task force is assembled, let's begin."
13010-284 = "We'll start by discussing some odd movements detected in the Abydos District. "
13010-285 = "Odd movements?"
13010-286 = "Will there be trouble?"
13010-288 = "...Well, it's just something to keep an eye on for now..."
13010-289 = "What is it, Ayane?"
13010-290 = "It involves the Kaiser Group."
13010-292 = "We're all familiar with the Kaiser Corporation's previous excavations in the Abydos desert, which they only concluded recently."
13010-293 = "Although we were unaware of precisely what Kaiser was trying to find at first..."
13010-297 = "Well... We all know what they dug up."
13010-298 = "Although that ship was totally wrecked..."
13010-300 = "Yes. After the Utnapishtim was destroyed above the stratosphere, no trace of its remains have been found."
13010-301 = "And once the battleship was destroyed, Kaiser appears to have lost any interest in continuing their occupation of the Abydos desert."
13010-302 = "Kaiser pulled their forces out of the desert and now all of the ruins stand empty."
13010-304 = "Yes. We detected their activity and confirmed their retreat from the excavation site."
13010-305 = "Yeah! It was like a dream come true! They better not dare to set foot in Abydos again!"
13010-306 = "But Abydos is still in debt to Kaiser..."
13010-308 = "Yes... Our school still owes a debt to Kaiser. Their withdrawal had no impact on our financial situation."
13010-310 = "Though it does seem that the president of Kaiser Corporation is more interested in the new Sanctum Tower than the Abydos desert now..."
13010-312 = "But that's not the important point."
13010-313 = "The important point..."
13010-314 = "Yes."
13010-315 = "What's going on, Ayane?"
13010-317 = "To cut to the chase, Kaiser Group announced that they would convert Abydos' debt into bonds, which they'll sell on the debt market."
13010-318 = "What? Bonds...?"
13010-322 = "Debt market? Wh-What does that mean?"
13010-323 = "They're going to securitize their right to collect on our debt..."
13010-324 = "...Meaning, they're going to sell the ownership of our debt to someone else."
13010-325 = "What?! What'll happen then?"
13010-326 = "Whoever buys the bonds will be able to collect our debt payments..."
13010-327 = "D-Does that mean we'll have to pay back to someone other than Kaiser?! Isn't that a good thing?"
13010-329 = "That's..."
13010-330 = "No, that doesn't make sense..."
13010-331 = "Hoshino...?"
13010-332 = "People only buy bonds if they believe they can make a profit from them."
13010-333 = "On paper they can make a lot of money from us, but the debt of an academy that could close down at any moment is a huge risk."
13010-334 = "No one is going to buy bonds expecting to make a profit from five students who can barely make their debt payments."
13010-336 = "..."
13010-337 = "That's true but..."
13010-339 = "This is a sign that Kaiser has completely abandoned any interest in us...or will, if they can find someone to buy them out."
13010-340 = "...Well, I suppose they could be trying to recoup some of their losses by selling the debt off at a cheap price."
13010-341 = "D-Does that mean we'll have less debt to repay?"
13010-342 = "Unfortunately not, Serika. They're selling the rights to our debt at a lower price, but the amount we owe won't change..."
13010-343 = "They could sell the rights to collect one million yen for a thousand yen...but we'd still owe the million."
13010-344 = "I-I got it! You don't have to explain any more, Shiroko! "
13010-345 = "Hmm..."
13010-349 = "Ayane, how much of our debt has Kaiser converted into bonds? I would assume they didn't convert all of it."
13010-350 = "Yes...and according to what they announced, it's about 45% of what Abydos owes to the Kaiser Corporation."
13010-351 = "Hm... I wonder what they're up to..."
13010-353 = "Ah, but what if we buy our debt at the cheaper price...?!"
13010-354 = "If they're selling the rights at a low price, we can just buy it ourselves!"
13010-356 = "Yes. That's why I brought it up... "
13010-357 = "I was thinking of using the money we've saved to buy those bonds once the debt market opens."
13010-358 = "That's brilliant! Let's do it, Ayane!"
13010-359 = "We should keep an eye on the ups and downs, just like the stock market..."
13010-360 = "All right, then..."
13010-363 = "...H-Huh?"
13010-364 = "What's wrong?"
13010-365 = "Th-The price of our bonds...is skyrocketing!!"
13010-366 = "S-Skyrocketing?!"
13010-372 = "200%— 300%— No, 450% of face value?! S-Someone is buying the bonds at a crazy rate!"
13010-373 = "Wh-What?!"
13010-374 = "Who in the world...?!"
13010-375 = "Uh, th-there are a lot of them... Checking the purchaser... "
13010-380 = "...Sold out."
13010-381 = "Abydos' bonds...have been sold out... "
13010-382 = "J-Just who would..."
13010-383 = "W-We can check now..."
13010-384 = "The group that purchased all of the derivative linked bonds, which use Abydos' infrastructure industry as a guarantee... "
13010-388 = "...Nephthys Group?"
13010-389 = "..."
13010-390 = "...?!"
13010-391 = "..."
13010-393 = "...!!!"
13010-394 = "[ns] \"...!!!\""
13010-398 = "There. Opening moves worthy of a walkthrough."
13010-399 = "I hope you're prepared for your first turn, my dear player— No, my dear Sensei."
13010-401 = "We sh-sh-shall understand the true profundity of death through our game."
13010-410 = "Foreclosure Task Force Chapter 3"
13010-412 = "Traces of a Dream"

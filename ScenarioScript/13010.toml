[translation]
13010-1 = "第1話;序幕"
13010-4 = "終於找到了。"
13010-5 = "被逐出蓋瑪特利亞，遭掩埋封印的[ruby=OB]老同事[/ruby]。"
13010-7 = "好苦……好苦啊……"
13010-8 = "不，你的苦行已經結束了。#n醒來吧，「地下生活者」。"
13010-9 = "……"
13010-10 = "……這個聲音是。"
13010-11 = "「匿名的行人」，是你嗎……"
13010-12 = "不，叫我「法蘭西斯」吧。#n這次我是認真的。"
13010-13 = "算了……怎樣都無所謂。#n讓我一個人待著吧……"
13010-14 = "雖然不清楚你為何來找我……但我沒興趣。#n嘻嘻嘻……"
13010-15 = "反正……小生我已經……"
13010-18 = "蓋瑪特利亞潰滅了。"
13010-19 = "……"
13010-20 = "那是什麼意思……？"
13010-22 = "蓋瑪特利亞已經消失了。#n也可以說是解體或解散吧。"
13010-23 = "原因只有一個。"
13010-24 = "夏萊的[USERNAME]老師──那個人扭曲了因果與形式。"
13010-25 = "目前能對付他的……"
13010-26 = "……噓。"
13010-31 = "呼呣……"
13010-32 = "原來如此[ruby=規則書]，法典已[/ruby]經更新了啊。"
13010-40 = "新世界……沒錯，我感覺到了這個世界的異物感。"
13010-41 = "如果版本和規則都改變了……代表新活動又開始了吧。"
13010-42 = "原，原來如此……嘻嘻嘻。#n那就另當別論了。"
13010-43 = "這，這，這次的版本會為小生帶來何種領悟呢……"
13010-44 = "你說……[USERNAME]嗎……？"
13010-45 = "這個人是這次活動的頭目……？#n我瞧瞧……"
13010-46 = "新的法典是……"
13010-52 = "學園都市……？"
13010-58 = "那邊的老師……？"
13010-60 = "什，什麼……這樣難度應該相當高吧……？#n如果是這樣的話……"
13010-64 = "……不過無論如何還是會有攻略方法。#n我看看……盲點、弱點、缺點……不管什麼都好……"
13010-65 = "別小看那個人，地下生活者。"
13010-69 = "你要如何認知這個世界與我無關……#n但如果用那種像桌遊的東西規制這個世界，絕對無法獲得正當的勝利。"
13010-70 = "……"
13010-71 = "我告訴你答案吧。#n能贏過那個人的方法就是……"
13010-77 = "少給我礙事！垃圾！！！"
13010-82 = "就憑你這連「死」都不明白的傢伙！啊啊！？"
13010-83 = "你能理解我的痛苦、孤獨和恐怖嗎！？"
13010-84 = "別來妨礙我！！「匿名的行人」！#n這是完全屬於我的活動！！"
13010-85 = "重要的是透過此一苦行能獲得什麼樣的領悟！！"
13010-86 = "絕不能被你妨礙！！！"
13010-91 = "不准擅自介入我的活動──！！"
13010-102 = "哈啊……哈啊……"
13010-103 = "勝利……勝利……#n為何大家都要執著於那種東西呢？"
13010-104 = "結果不是早就注定了嗎！！#n我們總有一天都會死！這是不會改變的！"
13010-105 = "最終都會迎接失敗的命運！！但那並不是重點！"
13010-106 = "沒錯……重要的是過程……只有過程中的經歷與領悟才有意義。"
13010-107 = "像你們這種傢伙，竟然敢褻瀆「蓋瑪特利亞」這崇高構圖的名號！#n這，這……"
13010-108 = "未免太浪費了吧！！！"
13010-110 = "哈啊……哈啊……"
13010-111 = "先，先，先冷靜。必須冷靜下來……"
13010-112 = "接著該做什麼……得，得決定才行……"
13010-116 = "蓋，蓋，蓋瑪特利亞已經潰滅了？"
13010-117 = "不，真正的蓋瑪特利亞就是小生我。"
13010-118 = "今後得展現蓋瑪特利亞真正的面貌才行……"
13010-119 = "嘻嘻嘻。很好，看來得了解一下這個世界……#n新的法典，新的活動……"
13010-120 = "啊啊，看來……小生的構圖似乎該從[ruby= ・     ・ ]那裡[/ruby]開始。"
13010-122 = "……阿拜多斯。"
13010-123 = "那些強大的神祕最初誕生的帝國……#n真好奇在這次的法典中，會以什麼樣的形態……"
13010-125 = "很好，我很期待。"
13010-130 = "請……不要讓我失望。"
13010-136 = "你看你看！星野醬！"
13010-138 = "聽說以前的學生會，在阿拜多斯大綠洲埋了非常厲害的東西哦！！"
13010-139 = "什麼？非常厲害的東西？"
13010-140 = "嗯！好像是用某種稀有礦物製成的煙火。"
13010-141 = "據說運用了以高溫的刺激產生等離子火花，進而點亮天空的技術。"
13010-142 = "你看，還有這種形狀的煙火！很可愛吧？"
13010-146 = "本來是打算在慶典時使用……#n結果不知道為什麼無法正常啟動，所以剩下的就扔進湖裡了。"
13010-147 = "呼呣……"
13010-148 = "不覺得很厲害嗎？#n只因為故障，就把含有每100g超過100萬元礦物的東西扔進湖裡。"
13010-149 = "不愧是阿拜多斯學生會……有錢到能用鵝絨製體操墊的人……"
13010-150 = "如果能把財產的百分之1分給我們就好了……嗚嗚。"
13010-151 = "……可是那座綠洲很久之前就枯竭了吧。"
13010-152 = "嗯，應該是吧？"
13010-153 = "現在那裡只是一片沙漠平原，不管怎麼找也找不到那種東西。#n那又有什麼意義呢？"
13010-154 = "哼哼哼，看來星野醬只知其一不知其二呢？"
13010-155 = "這畢竟是湖泊還存在時的事……也就是非常久以前的事對吧？"
13010-156 = "所以前輩的意思是……？"
13010-157 = "換句話說，那些值錢的煙火其實是在乾枯的綠洲……"
13010-158 = "也就是那片沙平原底下。"
13010-162 = "有昂貴的礦物埋藏在乾枯的綠洲底下……是嗎？"
13010-163 = "嗯！"
13010-167 = "……夢前輩，你知道自己現在在說什麼嗎？"
13010-169 = "啊……這……"
13010-173 = "現在不是說這些的時候了！馬上出發去找吧！"
13010-174 = "嗯！我的意思就是這樣！立刻去尋寶吧！"
13010-175 = "唔嘿～趕緊出發吧！前輩！"
13010-176 = "嗯！我們要成為大富豪唷，星野醬！"
13010-187 = "星野醬……那個……"
13010-188 = "別說話，前輩！我現在也感覺到了！"
13010-189 = "對吧？不是只有我有這種感覺吧？#n那是不是差不多該結束了？"
13010-190 = "再，再稍微多挖一下……？"
13010-191 = "……抱歉，好像搞砸了呢，星野醬。"
13010-192 = "呃，呃唔……"
13010-194 = "吶，星野醬……我們是哪一步走錯了呢……？"
13010-195 = "會不會是從前輩帶著奇怪的計畫回來開始？"
13010-196 = "嗚嗚……星野醬明明也很開心……卻要怪在我身上嗎？"
13010-197 = "……這，這點我也知道，不要刻意說出來嘛！"
13010-202 = "現在仔細想想，好像也不需要特別換上泳裝吧……"
13010-203 = "……果然不是有所考慮才這麼說的嗎！？#n那到底為什麼要提議穿泳裝啊？"
13010-204 = "咦……我擔心挖地的時候，地下水可能會突然湧出來，所以才……"
13010-205 = "有那種可能嗎！？"
13010-207 = "這樣包含沙漠化在內的所有問題也能瞬間解決！迎接快樂結局……"
13010-208 = "別做夢了！"
13010-209 = "嗚嗚……"
13010-211 = "唔嗯，為了表示反省，得把今天發生的事寫下來才行……"
13010-212 = "等，等一下前輩？你在寫什麼？"
13010-213 = "要紀錄這麼愚蠢的行為？這樣太丟臉了，不要啦！"
13010-214 = "可是該說這是學生會長的義務嗎……這樣之後對星野醬也有幫助……"
13010-215 = "那裡面打從一開始就只有失敗的紀錄吧！#n而且誰會收下那種破舊的手冊啊！我要買新的！"
13010-216 = "嗚嗚……"
13010-222 = "對策委員會．教室"
13010-223 = "那麼阿拜多斯對策委員會的定期會議……"
13010-224 = "……應該要開始了，不過好像還少一個人呢？"
13010-228 = "嗯嗯！一直都沒看見的那個人～☆"
13010-229 = "嗯，星野前輩不見了。"
13010-230 = "不是吧，又跑哪去了？#n該不會又躲在哪裡睡覺吧？"
13010-231 = "我剛剛看見他在隔壁教室睡覺。"
13010-232 = "咦？那就該帶他過來呀，白子前輩！會議已經要開始了！"
13010-233 = "呃，嗯……因為我覺得叫醒他不太好……"
13010-234 = "為什麼？又睡到忘我了嗎？"
13010-235 = "我可以理解，白子醬對星野前輩太心軟了。"
13010-236 = "我現在去帶他過來。"
13010-237 = "啊，那我也要一起去，白子醬。"
13010-242 = "……沒必要兩個人一起去吧？"
13010-243 = "啊哈哈……因為大家都很喜歡星野前輩……"
13010-246 = "星野前輩，會議要開始了哦。"
13010-247 = "嗯嗯，該起床囉～☆"
13010-248 = "……咦？"
13010-255 = "星野前輩？"
13010-261 = "原來你醒著啊？"
13010-262 = "……啊啊。"
13010-263 = "對了……要開會對吧？"
13010-264 = "抱歉抱歉。大叔年紀大了，經常忘東忘西的。"
13010-265 = "呃，嗯。"
13010-266 = "咦？不吐槽我「年紀根本就沒差多少」嗎～？"
13010-267 = "好了好了～快走吧～#n要是綾音醬生氣可是很可怕的哦。"
13010-271 = "我也要一起，前輩。"
13010-275 = "……"
13010-282 = "[ns]「大家都到齊了呢。」"
13010-283 = "是，老師。#n既然大家都到齊了，我們就開始吧。"
13010-284 = "最近阿拜多斯自治區出現了特殊動向，我想先將相關資訊告訴大家。"
13010-285 = "特殊動向？"
13010-286 = "發生什麼事了嗎？"
13010-288 = "……是的。#n雖然目前還只是需要注意的程度……"
13010-289 = "究竟發生了什麼呢，綾音醬？"
13010-290 = "首先，事情的起因是凱薩公司。"
13010-292 = "就像大家知道的一樣，凱薩公司直到最近都還在阿拜多斯沙漠進行挖掘作業。"
13010-293 = "雖然我們之前並不清楚凱薩究竟在那邊尋找什麼……"
13010-297 = "不過……事實證明那樣的東西確實存在呢。"
13010-298 = "雖然現在已經支離破碎了……"
13010-300 = "沒錯，「生命守護者主艦」最終在平流層遭到破壞，就連殘骸或痕跡都沒有留下。"
13010-301 = "而在戰艦遭到破壞之後，凱薩似乎已經沒有理由繼續佔領阿拜多斯沙漠了。"
13010-302 = "在凱薩逐漸從沙漠撤退之後，現在那邊已經變成了空蕩蕩的廢墟。"
13010-304 = "嗯，確實是這樣沒錯。#n我也確認過他們已經離開挖掘地了。"
13010-305 = "真是太痛快了。以後最好再也不要來阿拜多斯了！"
13010-306 = "但是這並不代表我們欠凱薩的債務也一起消失了……"
13010-308 = "是的……我們學校的債權人是凱薩。#n情況並沒有任何改變……"
13010-310 = "而且凱薩公司的總裁，比起阿拜多斯沙漠，似乎更關注重建中的聖所之塔……"
13010-312 = "但接下來才是正題。"
13010-313 = "正題……"
13010-314 = "嗯。"
13010-315 = "發生了什麼事嗎，綾音醬？"
13010-317 = "從結論而言……#n凱薩公司想要把我們阿拜多斯的債務轉換為債券，並在[ruby=Debt Market]債務市場[/ruby]上販售。"
13010-318 = "什麼？轉換為債券……？"
13010-322 = "債務市場……？那，那是什麼？"
13010-323 = "就是把對我們的債權變成有價證券……"
13010-324 = "……簡單來說就是要把債權賣給其他人。"
13010-325 = "咦！？那會怎麼樣？"
13010-326 = "購買債券的人，將獲得向阿拜多斯討債的權利……"
13010-327 = "所，所以我們之後要還債給其他人，而不是凱薩是嗎！？#n這對我們來說是好事嗎？"
13010-329 = "這……"
13010-330 = "不，這實在不合理。"
13010-331 = "星野前輩……？"
13010-332 = "交易債權的目的是為了賺取利益。"
13010-333 = "但是購買這種隨時都可能倒閉的學園的債權，基本上是一件風險很大的事。"
13010-334 = "只靠5個人辛苦償還，隨時廢校都不足為奇的學園的債權……#n我不認為會有人想買。"
13010-336 = "……"
13010-337 = "可是……"
13010-339 = "雖然這是凱薩想完全撤出我們學園的徵兆，但前提也要有人願意收購吧。"
13010-340 = "……說不定他們會以便宜的價格出售哦。"
13010-341 = "那，那我們要還的債也會減少嗎？"
13010-342 = "不是這樣的，茜香醬。#n便宜出售的只是權利，並不代表我們的債務會減少……"
13010-343 = "嗯，只是用90萬元購買收取100萬元的權利而已，我們的債務還是100萬元。"
13010-344 = "我，我知道啦！不用再繼續說明了，白子前輩！"
13010-345 = "呃，嗯……"
13010-349 = "綾音醬，凱薩把我們多少的債務變成債券了呢？我想應該不是全部吧。"
13010-350 = "是，目前公告的金額……大約是凱薩公司持有阿拜多斯負債的45%左右……"
13010-351 = "唔嗯……這樣啊。#n他們到底在想什麼呢……"
13010-353 = "啊，那如果我們以低價購買的話……！？"
13010-354 = "對耶？如果對方想便宜出售權利的話，我們只要買下來就好了呀！"
13010-356 = "是，我也正打算那麼說…… "
13010-357 = "等債務市場開市之後，我打算用我們的儲蓄來購買債券。"
13010-358 = "這樣不是很好嗎？#n就這麼做吧，綾音醬！"
13010-359 = "要先像股市一樣，仔細觀察漲跌……"
13010-360 = "嗯，那麼……"
13010-363 = "……咦，咦咦？"
13010-364 = "怎麼了？"
13010-365 = "我，我們的債券……目前正在暴漲！！"
13010-366 = "暴，暴漲！？"
13010-372 = "債券面額的200%……300%……450%……！！？#n有，有人正在瘋狂收購債券！"
13010-373 = "咦咦……？"
13010-374 = "到底是誰……！？"
13010-375 = "這，這……人數非常多。#n難以確認買方是誰……"
13010-380 = "……已經銷售一空了。"
13010-381 = "阿拜多斯的債券……全部賣光了……"
13010-382 = "究，究竟是誰……"
13010-383 = "目前能確認的是……"
13010-384 = "集中收購以阿拜多斯基礎建設產業為擔[ruby=Derivatives Linked Bond]保的DLB的是[/ruby]……"
13010-388 = "奈芙蒂斯集團……？"
13010-389 = "……"
13010-390 = "……！？"
13010-391 = "……"
13010-393 = "……！！"
13010-394 = "[ns]「…………………！！」"
13010-398 = "好，攻略方法已經完成了。"
13010-399 = "開始吧，玩家……不，老師。"
13010-401 = "我們將會透過這次的遊戲，領悟死亡最深的含意吧。"
13010-410 = "對策委員會篇第3章"
13010-412 = "夢留下的痕跡"

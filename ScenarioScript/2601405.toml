[translation]
2601405-1 = "ความทรงจำระหว่างมาโรงเรียน"
2601405-2 = "อ๊ะ คุณครู"
2601405-3 = "ฉันคิดอยู่ว่าอยากเดินไปโรงเรียนกับคุณครูน่ะ ขอบคุณที่มาด้วยกันนะ"
2601405-4 = "[s1] \"แต่วันนี้วันหยุดนะ?\"\n[s2] \"จะไปโรงเรียนในวันหยุดเหรอ?\""
2601405-7 = "ใช่แล้วละ"
2601405-8 = "ฉันรู้ว่ามันดูแปลกถ้าจะไปโรงเรียนในวันหยุด..."
2601405-9 = "แต่ที่จริงแล้ว ตั้งแต่เริ่มทำกิจกรรม C&C ฉันก็ไม่ค่อยได้ไปโรงเรียนเหมือนนักเรียนปกติมากเท่าไรน่ะ"
2601405-10 = "ทุกครั้งฉันจะออกไปทำภารกิจเลย หรือต่อให้ไปโรงเรียนก็จะเดินอ้อมไปใช้เส้นทางอื่นเพื่อไม่ให้ใคร#nจำได้"
2601405-11 = "[s] \"ก็เพราะปลอมตัวเป็นเมดอยู่ใช่มั้ยล่ะ...\""
2601405-12 = "ฉันก็ไม่ได้ไม่สะดวกใจกับชีวิตแบบนั้นหรอกนะ แต่ตอนนี้ฉันอยู่ในชุดนักเรียนที่ไม่ได้ใส่มานานแล้ว"
2601405-13 = "ในเมื่อเป็นอย่างนี้แล้ว วันนี้ฉันก็เลยอยากเดินเข้าโรงเรียนอย่างคนอื่นดูบ้าง"
2601405-14 = "ฉันคิดว่าถ้าทำแบบนี้ วันหยุดน่าจะพิเศษและมีความหมายมากขึ้นอีกนิดหน่อยน่ะ"
2601405-15 = "[s] \"ถ้าได้ทำสิ่งที่ไม่ได้ทำมานาน ก็ต้องเป็นวันที่พิเศษแน่นอนเลยละ\""
2601405-16 = "อืม..."
2601405-17 = "ฉันอาจจะถามช้าไปหน่อย แต่ว่าคุณครูมากับฉันแบบนี้จะไม่เป็นอะไรเหรอ?"
2601405-18 = "มันอาจจะเป็นเรื่องพิเศษสำหรับฉัน แต่กับคุณครูแล้วมันอาจจะไม่มีความหมายเลยก็ได้..."
2601405-19 = "[s3] \"ไม่เป็นไรอยู่แล้ว ครูก็อยากทำแบบนี้เหมือนกัน\"\n[s4] \"ครูก็อยากลองเดินเข้าโรงเรียนกับคารินนะ\""
2601405-22 = "อืม ถ้าอย่างนั้นก็..."
2601405-23 = "ดีละ ถ้าออกเดินทางตั้งแต่ตอนนี้ คงไปถึงโรงเรียนได้ตามเวลาแน่นอน"
2601405-24 = "[s] \"เป็นตัวอย่างของนักเรียนที่ดีเลยนะนั่น\""
2601405-25 = "ก็ตอนนี้ฉันไม่ได้เป็นสายลับหรือเมด แต่เป็นนักเรียนนี่นา"
2601405-26 = "การตรงต่อเวลาเป็นสิ่งสำคัญนะ"
2601405-27 = "เอาละ ทางนี้"
2601405-29 = "เราหยุดตรงนี้สักครู่ แล้วพอรถไฟผ่านไปแล้วค่อยไปกันต่อ"
2601405-30 = "รอให้เปลี่ยนเป็นไฟแดงก่อน..."
2601405-31 = "ฮืม ฮื้มม ฮืม..."
2601405-34 = "เอาละ ข้ามไปกันเถอะ คุณครู"
2601405-35 = "[s] \"เมื่อกี้คือ?\""
2601405-36 = "อ้อ มะ... ไม่มีอะไรหรอก ก็แค่ฮัมเพลงเฉยๆ..."
2601405-37 = "ไม่รู้ทำไมนิสัยเก่าๆ ถึงกลับมาอีกนะ แค่ฮัมเพลงท่อนเดียว ไม้กั้นรถไฟก็เปิดเลย น่าทึ่งจังเลยเนอะ..."
2601405-38 = "ถึงมันจะเป็นเรื่องไร้สาระ แต่ก็น่าทึ่งนะที่ฉันจำมันได้ตลอดเลย"
2601405-39 = "[s] \"ไร้สาระอะไรกัน ครูว่าน่าสนใจออก\""
2601405-40 = "อะ... อืม งั้นเหรอ?"
2601405-41 = "แต่ก็นะ ถ้าคุณครูว่าอย่างนั้นฉันก็ค่อยโล่งใจหน่อย..."
2601405-43 = "ถ้าเดินตัดสวนสาธารณะนี้ไป จะไปถึงโรงเรียนได้เร็วขึ้นน่ะ"
2601405-44 = "[s] \"แต่ดูทางมันซับซ้อนอยู่นะ...\""
2601405-45 = "อืม อย่างที่คุณครูว่าเลย"
2601405-46 = "นอกจากเส้นทางจะยุ่งเหยิงนิดหน่อยแล้ว พวกป้ายบอกทางก็เก่าด้วย ถ้าไม่ดูให้ดีก็อาจเดินผิดทางได้#nเลยละ..."
2601405-47 = "ฮุฮุ แต่ดูตรงโน้นสิ"
2601405-48 = "ต้นไม้ตรงโน้นน่ะ ระหว่างกิ่งไม้มีรังนกอยู่ด้วย"
2601405-49 = "ถ้าใช้ตรงนั้นเป็นจุดเริ่มต้นแล้วเดินต่อไปข้างหน้า ก็จะเจอทางลัดไปยังทุ่งดอกไม้"
2601405-50 = "[s] \"คารินเป็นเหมือนมัคคุเทศน์เลยนะเนี่ย\""
2601405-51 = "อืม ฉันว่ามันตรงข้ามกันมากกว่า มันเป็นเคล็ดลับที่ฉันได้จากการเดินหลงทางอยู่หลายครั้งน่ะ"
2601405-52 = "แล้ววันนี้ก็เป็นครั้งแรกที่ฉันบอกทางคนอื่นแบบนี้ด้วย"
2601405-53 = "นี่ไม่ใช่เรื่องที่น่าชื่นชมหรอก ไม่ต้องสนใจหรอกนะ"
2601405-55 = "ต่อไปก็ลงบันไดตรงนี้ไป"
2601405-56 = "พอมาถึงประมาณนี้ เวลาก็จะเริ่มกระชั้นชิดแล้ว ฉันก็เลยต้องรีบนิดหน่อย"
2601405-57 = "บางทีก็เลยไถลลงมาตามราวบันได..."
2601405-58 = "[s] \"มันชันมากเลยนะ ไถลตามราวไปเลยเหรอ?\""
2601405-59 = "ใช่ ราวบันไดของที่นี่เชื่อมกันตลอดทาง ถ้าทรงตัวได้ก็จะลงมาอย่างรวดเร็วได้น่ะ"
2601405-60 = "ตะ... แต่ก็ใช่ว่าฉันจะไถลตามราวบันไดมาทุกครั้งหรอกนะ ฉันแค่ใช้วิธีนี้ตอนไม่มีเวลาน่ะ"
2601405-61 = "[s] \"อยากเห็นสักครั้งจัง\""
2601405-62 = "จะ... จะดูฉันไถลลงราวบันไดไปทำไม?"
2601405-63 = "วันนี้เรายังมีเวลา ฉันว่าจะเดินลงบันไดไปแบบปกติดีกว่า"
2601405-65 = "(แล้วคุณครูก็มาถึงโรงเรียนพร้อมกับคาริน...)"
2601405-67 = "อืม มาถึงแล้วสินะ"
2601405-68 = "มาถึงแล้วก็จริง..."
2601405-69 = "[s] \"เป็นอะไรไปเหรอ คาริน?\""
2601405-70 = "มาถึงโรงเรียนแล้วก็จริง... แต่มันไม่ได้รู้สึกพิเศษอะไรเลย"
2601405-71 = "เดิมทีแผนของวันนี้คือการเดินมาโรงเรียนเพื่อให้รู้สึกสดชื่น แต่พอมาถึงแล้วกลับไม่รู้สึกพิเศษเลย "
2601405-72 = "อืม ฉันล้มเหลวในการใช้วันหยุดที่มีค่าอีกแล้วสินะ"
2601405-73 = "คุณครูอุตส่าห์เดินมาด้วยถึงที่นี่แท้ๆ ขอโทษด้วยนะ"
2601405-74 = "[s] \"แต่ครูไม่คิดแบบนั้นนะ\""
2601405-75 = "คุณครู ไม่ต้องแกล้งปลอบฉันก็ได้..."
2601405-76 = "หืม? ไม่ได้แกล้งเหรอ?"
2601405-77 = "คิดว่าความลับที่ฉันบอกระหว่างเดินมาโรงเรียนด้วยกันคือสิ่งพิเศษงั้นเหรอ...?"
2601405-78 = "ความลงความลับอะไร?"
2601405-79 = "[s] \"สิ่งต่างๆ ที่ซ่อนอยู่ระหว่างทางมาโรงเรียนน่ะ\""
2601405-80 = "ทั้งเวลาที่รถไฟมา ทางเดินเล่น แล้วก็ราวบันได อะไรแบบนี้น่ะเหรอ?"
2601405-81 = "นั่นมันเป็นอะไรที่เล็กน้อยและไร้สาระมากต่างหาก..."
2601405-82 = "เป็นแค่สิ่งที่แค่ฟังเข้าหูซ้ายทะลุหูขวาไปก็ได้ ถึงได้รู้ไปก็ไม่มีประโยชน์หรอกน่า"
2601405-83 = "[s] \"แต่นั่นเป็นความลับที่มีแต่คารินเท่านั้นที่รู้นะ\""
2601405-84 = "ความลับที่มีเพียงฉันเท่านั้นที่รู้...?"
2601405-85 = "อืม ฉันคิดว่ามันเป็นเรื่องเล็กน้อย ก็เลยไม่เคยบอกใครมาก่อนเลย..."
2601405-86 = "[s5] \"และตอนนี้เป็นความลับที่เรารู้กันสองคนแล้ว\"\n[s6] \"และตอนนี้เป็นความลับของเราสองคนแล้ว\""
2601405-89 = "เราสองคนงั้นเหรอ..."
2601405-90 = "[s] \"เพราะงั้นการมาโรงเรียนกับคารินวันนี้ถึงพิเศษไงล่ะ\""
2601405-91 = "งั้นเหรอ?"
2601405-92 = "ฉันพอจะรู้แล้วละ..."
2601405-93 = "แค่ได้เดินมากับคุณครู ก็เป็นการมาโรงเรียนที่แสนพิเศษแล้วนะ"
2601405-94 = "ขอบคุณนะคุณครู"
2601405-95 = "[s] แบบนี้ครูก็สนุกดี ไว้คราวหน้าชวนครูมาอีกนะ\""
2601405-96 = "คราวหน้างั้นเหรอ..."
2601405-97 = "อย่างนี้สินะ ครั้งหน้าอาจจะเร็วกว่านี้อีกหน่อยก็ได้นะ"
2601405-98 = "[s] \"เร็วกว่านี้อีกหน่อยเหรอ?\""
2601405-99 = "ในเมื่อมาโรงเรียนแล้ว งั้นต่อไปก็กลับกันเถอะ"
2601405-103 = "ระหว่างเดินกลับจากโรงเรียนก็ฝากตัวด้วยนะ คุณครู"

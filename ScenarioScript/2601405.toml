[translation]
2601405-1 = "#title;등굣길의 추억"
2601405-2 = "3;카린 교복;02;아, 선생님.\n#3;em;[반응]\n#3;a"
2601405-3 = "3;카린 교복;01;등굣길에 선생님과 함께하면 좋을 것 같았는데, 이렇게 와 줘서 고맙다."
2601405-4 = "[s1] \"학교를…… 간다고요?\"\n[s2] \"휴일인데?\""
2601405-5 = "#wait;10"
2601405-6 = "#wait;10"
2601405-7 = "3;카린 교복;01;그 말대로다."
2601405-8 = "3;카린 교복;04;물론 휴일에 학교를 간다는 거, 이상해 보인다는 거 알고 있지만…….\n#3;em;…"
2601405-9 = "3;카린 교복;06;사실, C&C 활동을 시작한 이후로 평범하게 학교를 간 적이 그리 많지 않아서."
2601405-10 = "3;카린 교복;04;매번 임무수행을 위해 바로 출동하거나, 학교로 간다고 해도 이동 동선이 들키지 않도록 빙빙 돌아서 가는 경우가 많다."
2601405-11 = "[s] \"일단은 메이드로 위장하고 있으니 말이지…….\""
2601405-12 = "3;카린 교복;01;그 생활에 불만은 없지만, 지금은 모처럼 교복을 입고 있단 말이지."
2601405-13 = "3;카린 교복;03;이왕 이렇게 된 거, 오늘은 오랜만에 등굣길을 다시 걸어 볼까 하는 생각이 들었다.\n#3;em;[음표]"
2601405-14 = "3;카린 교복;03;휴일을 조금 더 특별하고, 의미 있게 보낼 수 있지 않을까 해서."
2601405-15 = "[s] \"확실히, 그동안 못했던 일이라면 특별한 하루가 되겠네.\""
2601405-16 = "3;카린 교복;01;음…….\n#3;em;…"
2601405-17 = "3;카린 교복;02;이제 와서 하는 얘기지만, 선생님, 정말 괜찮겠어?"
2601405-18 = "3;카린 교복;04;나한테는 특별한 일이지만, 선생님한테는 딱히 의미 없는 일일 텐데…….\n#3;em;[땀]"
2601405-19 = "[s3] \"물론 괜찮지.\"\n[s4] \"카린의 등굣길을 체험하고 싶은걸.\""
2601405-20 = "#wait;10"
2601405-21 = "#wait;10"
2601405-22 = "3;카린 교복;04;으음, 그렇다면야……."
2601405-23 = "3;카린 교복;03;좋아. 지금 출발하면 권장 등교 시간까지는 여유롭겠어.\n#3;em;[반응]"
2601405-24 = "[s] \"성실한 학생의 모범인걸.\""
2601405-25 = "3;카린 교복;03;지금 나는 에이전트도 메이드도 아닌, 그냥 학생이니까."
2601405-26 = "3;카린 교복;03;시간에 맞추는 건 당연한 일이다."
2601405-27 = "3;카린 교복;01;자, 이쪽이다.\n#3;em;[반응]"
2601405-28 = "#all;hide"
2601405-29 = "3;카린 교복;02;여기서 잠깐 멈췄다가, 기차가 지나간 뒤에 가야 한다.\n#3;a"
2601405-30 = "3;카린 교복;02;빨간불로 바뀌고부터……."
2601405-31 = "3;카린 교복;01;흠, 흐흠, 흠.\n#3;em;[음표]"
2601405-32 = "#all;hide"
2601405-33 = "3;카린 교복;01"
2601405-34 = "3;카린 교복;03;자, 건너자, 선생님."
2601405-35 = "[s] \"방금 그건?\""
2601405-36 = "3;카린 교복;08;아, 벼, 별거 아니야. 그냥 콧노래…….\n#3;em;[땀]\n#3;stiff"
2601405-37 = "3;카린 교복;08;어쩌다 보니 예전 버릇이 나온 거다. 딱 한 소절 흥얼거리면 차단기가 열리는 게 신기해서……."
2601405-38 = "3;카린 교복;06;쓸데없는 사실이지만 신기하게도 기억에 남아 있다."
2601405-39 = "[s] \"쓸데없다니, 흥미로운걸.\""
2601405-40 = "3;카린 교복;04;으, 음, 그런가?\n#3;em;[?]"
2601405-41 = "3;카린 교복;04;뭐, 선생님이 그렇다면 다행이지만……."
2601405-42 = "#all;hide"
2601405-43 = "3;카린 교복;02;학교로 가려면 이 공원을 가로지르는 편이 빨라.\n#3;a\n#3;em;[반응]"
2601405-44 = "[s] \"길이 좀 복잡해 보이는데…….\""
2601405-45 = "3;카린 교복;01;음, 그 말대로다.\n#3;em;…"
2601405-46 = "3;카린 교복;01;산책로가 조금 꼬여 있는 데다, 표지판도 오래돼서 자칫하다간 다른 길로 빠질 수도 있지만……."
2601405-47 = "3;카린 교복;03;후후, 하지만 저길 봐."
2601405-48 = "3;카린 교복;02;저 나무, 나뭇가지 사이에 새 둥지가 있지?\n#3;em;[반응]"
2601405-49 = "3;카린 교복;02;그걸 이정표 삼아서 전진하다가, 꽃밭 쪽으로 나가면 지름길이다."
2601405-50 = "[s] \"길잡이 같네, 카린.\""
2601405-51 = "3;카린 교복;04;으음, 오히려 몇 번이나 헤맨 끝에 터득하게 된 팁이니까 그 반대일 것 같다만…….\n#3;em;[땀]"
2601405-52 = "3;카린 교복;04;다른 사람한테 알려준 건 오늘이 처음이긴 하군."
2601405-53 = "3;카린 교복;01;대단한 건 아니니까 신경 쓰지 마."
2601405-54 = "#all;hide"
2601405-55 = "3;카린 교복;02;다음은 이쪽 계단을 내려가면 된다.\n#3;a\n#3;em;[반응]"
2601405-56 = "3;카린 교복;99;……이쯤 오면 슬슬 시간이 촉박할 때라서, 조금 급하게 가곤 했지."
2601405-57 = "3;카린 교복;01;난간을 타고 간다거나……."
2601405-58 = "[s] \"꽤 가파른데, 난간을 타고 갔다고?\""
2601405-59 = "3;카린 교복;02;그렇지. 여기 계단의 난간은 끊긴 곳 없이 끝까지 연결되어 있어서, 중심만 잘 잡으면 빠르게 내려갈 수 있다.\n#3;em;…"
2601405-60 = "3;카린 교복;08;……그, 그렇다고 내가 매번 난간을 타고 등교한 건 아니다. 아슬아슬할 때만 탔어.\n#3;stiff"
2601405-61 = "[s] \"한 번 보고 싶은걸.\""
2601405-62 = "3;카린 교복;08;내, 내가 난간 타는 걸 봐서 뭐 하게?\n#3;em;[///]"
2601405-63 = "3;카린 교복;05;그리고 오늘은 시간이 늦은 것도 아니니까, 평범하게 걸어 내려갈 거다."
2601405-64 = "#all;hide"
2601405-65 = "#na;(그렇게 카린과 함께 학교까지 왔다…….)"
2601405-66 = "#all;hide"
2601405-67 = "3;카린 교복;01;음, 도착했군.\n#3;a"
2601405-68 = "3;카린 교복;04;……도착은 했는데…….\n#3;em;…"
2601405-69 = "[s] \"왜 그래, 카린?\""
2601405-70 = "3;카린 교복;04;……그다지, 특별한 느낌이 없어.\n#3;em;[땀]"
2601405-71 = "3;카린 교복;04;당초 계획은 오랜만에 등교하면서 신선함을 느끼는 것이었는데, 막상 학교까지 와 보니 별다른 감흥이 없다."
2601405-72 = "3;카린 교복;06;으음, 보람찬 휴일을 보내는 건 이번에도 실패했군."
2601405-73 = "3;카린 교복;02;선생님, 여기까지 따라와 줬는데, 미안하다.\n#3;stiff\n#3;em;[속상함]"
2601405-74 = "[s] \"나는 그렇게 생각 안 하는걸?\""
2601405-75 = "3;카린 교복;04;선생님, 일부러 위로를…….\n#3;em;…"
2601405-76 = "3;카린 교복;01;응? 아니라고?"
2601405-77 = "3;카린 교복;04;……여기까지 오면서 내가 알려 준 비밀들이 엄청 특별하게 느껴졌다, 고……?\n#3;stiff"
2601405-78 = "3;카린 교복;04;비밀이라니, 무슨 말이지?"
2601405-79 = "[s] \"등굣길에 숨어 있던 여러 사실들.\""
2601405-80 = "3;카린 교복;01;기차가 오는 시간이나 산책로, 계단 난간 같은 거 말이야?\n#3;em;[?]"
2601405-81 = "3;카린 교복;04;……그건 정말 사소하고 쓸데없는 것들인걸."
2601405-82 = "3;카린 교복;99;한 귀로 흘려 버려도 전혀 무방한, 소일거리도 안 되는 잡담이었을 뿐이다."
2601405-83 = "[s] \"하지만 그건 카린만이 알고 있는 비밀이었잖아.\""
2601405-84 = "3;카린 교복;01;나만 알고 있는 비밀……?\n#3;em;…"
2601405-85 = "3;카린 교복;99;으음, 확실히, 너무 사소한 거라 생각해서 누구에게도 말한 적이 없었지……."
2601405-86 = "[s5] \"그리고 이제 그 비밀을 알고 있는 건,\"\n[s6] \"나와 카린 둘뿐이고.\""
2601405-87 = "#wait;10"
2601405-88 = "#wait;10"
2601405-89 = "3;카린 교복;08;둘뿐, 이라고…….\n#3;em;[///]"
2601405-90 = "[s] \"그러니까 오늘 카린과 한 등교는 특별했어.\""
2601405-91 = "3;카린 교복;99;그런가."
2601405-92 = "3;카린 교복;03;……조금은 알 것 같아."
2601405-93 = "3;카린 교복;03;선생님과 함께 걸은 것만으로도 특별한 등굣길이 되었군."
2601405-94 = "3;카린 교복;03;고맙다, 선생님.\n#3;em;[반응]"
2601405-95 = "[s] \"다음에도 불러 줘. 즐거웠으니까.\""
2601405-96 = "3;카린 교복;99;다음이라…….\n#3;em;…"
2601405-97 = "3;카린 교복;03;그렇군. 다음 동행은 조금 빠를지도 모르겠어."

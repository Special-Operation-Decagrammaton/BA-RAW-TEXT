[translation]
2601405-1 = "School Commute Memories"
2601405-2 = "Oh, Sensei."
2601405-3 = "I thought it would be nice to have you walk with me on the way to school. Thank you for coming."
2601405-4 = "[s1] \"You're going to...school?\"\n[s2] \"On a holiday?\""
2601405-7 = "Yes, I am."
2601405-8 = "I know it looks odd, going to school on a holiday..."
2601405-9 = "But the thing is, ever since I joined C&C, I've never had a normal school day."
2601405-10 = "I keep getting called out to missions, and even if I do get to stay, I tend to take the long way around to avoid giving my route away."
2601405-11 = "[s] \"Since you're undercover as a maid, after all...\""
2601405-12 = "It's not like I have any complaints about that life, but right now, I'm wearing a school uniform."
2601405-13 = "So I figured I might as well take the rare opportunity to just walk to school."
2601405-14 = "I thought it might make the day off more special."
2601405-15 = "[s] \"Sure! Do something you can't normally do.\""
2601405-16 = "Mm..."
2601405-17 = "Now that I've mentioned it, do you really want to come along, Sensei?"
2601405-18 = "It's a special occasion for me, but for you, it's just a walk."
2601405-19 = "[s3] \"Of course I want to come along.\"\n[s4] \"This walk is a big deal. I want to experience it.\""
2601405-22 = "Mmm, if you say so..."
2601405-23 = "Okay. If we leave now, we'll have plenty of time before the bell rings. Or would ring."
2601405-24 = "[s] \"You're a textbook example of a model student.\""
2601405-25 = "A student is all I am right now, not a maid or an agent."
2601405-26 = "Students make it in on time."
2601405-27 = "Come on, this way."
2601405-29 = "We have to wait here and cross after the train passes."
2601405-30 = "The red light should change in..."
2601405-31 = "Hmm, hm, hmm..."
2601405-34 = "Okay, let's cross, Sensei."
2601405-35 = "[s] \"What was that just now?\""
2601405-36 = "Ah. N-Nothing. Just humming..."
2601405-37 = "It's just an old habit. One time, the gate opened right in time with my humming, and that happened to stick with me."
2601405-38 = "Useless information, I know, but that's what's in my head."
2601405-39 = "[s] \"What do you mean? That's not useless, it's interesting.\""
2601405-40 = "M-Mmm, is that so?"
2601405-41 = "Well, I'm glad to hear you say that..."
2601405-43 = "Let's cross this park. It's a shortcut."
2601405-44 = "[s] \"This path seems a bit complicated...\""
2601405-45 = "You're right, it is."
2601405-46 = "You can actually get lost out here. The trails are all twisted, and the signs are old."
2601405-47 = "Fufu, but look over there."
2601405-48 = "You see the bird's nest between those branches up there?"
2601405-49 = "Go forward from there, and then exit towards the flower field. That's your shortcut."
2601405-50 = "[s] \"You'd make a good wilderness guide, Karin.\""
2601405-51 = "Well, I learned the hard way, after I got lost a few times."
2601405-52 = "Incidentally, it's my first time telling someone that."
2601405-53 = "No need to share it with anybody else. It's not that interesting."
2601405-55 = "Next, we just walk down these stairs."
2601405-56 = "...Usually, by the time I got here, I'd have to rush the rest of the way."
2601405-57 = "By sliding down the railings..."
2601405-58 = "[s] \"You slid down THESE railings? It's pretty steep.\""
2601405-59 = "Yes, but they go all the way down, so as long as you keep your balance, you can save time."
2601405-60 = "...I wouldn't do it every time, of course. Just when I was in a hurry."
2601405-61 = "[s] \"I kinda want to see it.\""
2601405-62 = "Y-You want to watch me slide down railings? What's the point of that?"
2601405-63 = "It's not like we're late today, so no, I'm just going to walk down like a normal person."
2601405-65 = "And so, I arrived at school with Karin..."
2601405-67 = "Mm, we're here."
2601405-68 = "...We're here, but..."
2601405-69 = "[s] \"What's wrong?\""
2601405-70 = "...It doesn't feel special."
2601405-71 = "I wanted the fresh experience of a normal walk to school, but now that I'm here, it just feels...ordinary."
2601405-72 = "Mmm, once again, I've failed to spend a meaningful day off."
2601405-73 = "I'm sorry, Sensei. I dragged you all this way for nothing."
2601405-74 = "[s] \"That's not how I see it.\""
2601405-75 = "Oh, now you're just trying to console me..."
2601405-76 = "...What? You're not?"
2601405-77 = "...You appreciated me telling you my secrets?"
2601405-78 = "What \"secrets\"?"
2601405-79 = "[s] \"I learned a lot about you on that walk.\""
2601405-80 = "Like with the timing of the train, and the trails, and those railings?"
2601405-81 = "...That's all just insignificant nonsense, though."
2601405-82 = "They're not special, they're not even worth thinking about..."
2601405-83 = "[s] \"But they were secrets that only you knew.\""
2601405-84 = "Secrets that only I knew...?"
2601405-85 = "Mmm, well, I suppose. They were so trivial, I never told anyone else."
2601405-86 = "[s5] \"And only two people know them now.\"\n[s6] \"Just you and me.\""
2601405-89 = "Just you and me..."
2601405-90 = "[s] \"So, my walk with you was a special one.\""
2601405-91 = "I see..."
2601405-92 = "...I think I might understand."
2601405-93 = "And you being here with me did make the walk special."
2601405-94 = "Thank you, Sensei."
2601405-95 = "[s] \"Feel free to call me next time, too. I had fun.\""
2601405-96 = "Next time..."
2601405-97 = "Well, that could be quite soon."
2601405-98 = "[s] \"Quite soon?\""
2601405-99 = "Well, what do we do now that we're here, and school's closed?"
2601405-103 = "We walk all the way back."

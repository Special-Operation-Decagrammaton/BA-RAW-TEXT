[translation]
2601405-1 = "上學路上的回憶"
2601405-2 = "啊，老師。"
2601405-3 = "我還在想如果可以跟老師一起去上學就好了，謝謝你過來。"
2601405-4 = "[s1]「去……上學？」\n[s2]「可是今天是假日耶？」"
2601405-7 = "沒錯。"
2601405-8 = "我也知道假日去學校有點奇怪……"
2601405-9 = "但我其實在開始C&C的活動之後，就很少像普通人一樣去上學了。"
2601405-10 = "每次都是直接去執行任務，就算去學校也得常常繞路，以免移動的路線被人發現。"
2601405-11 = "[s]「畢竟你總是偽裝成女僕……」"
2601405-12 = "雖然我對這樣的生活並沒有不滿，但既然現在難得穿上制服……"
2601405-13 = "所以今天我打算久違地走一趟上學的路。"
2601405-14 = "或許這樣能讓假日變得更加有意義。"
2601405-15 = "[s]「如果是先前沒能做的事，確實會成為特別的一天吧。」"
2601405-16 = "嗯……"
2601405-17 = "現在說可能有點晚了，但老師真的不介意嗎？"
2601405-18 = "雖然對我來說是件特別的事，但對老師來說可能沒有什麼意義……"
2601405-19 = "[s3]「我當然不介意。」\n[s4]「我也想一起體驗花凛上學的路程。」"
2601405-22 = "唔嗯，既然你都這麼說了……"
2601405-23 = "那好吧。現在出發的話，離建議的到校時間還有一點餘裕。"
2601405-24 = "[s]「真是勤奮的模範學生。」"
2601405-25 = "現在我既不是特務也不是女僕，只是一名普通的學生。"
2601405-26 = "所以準時到校是天經地義的事。"
2601405-27 = "來，往這邊。"
2601405-29 = "要在這裡停一下，等火車經過之後再走。"
2601405-30 = "從換成紅燈起……"
2601405-31 = "哼～哼哼～哼。"
2601405-34 = "好，我們走吧，老師。"
2601405-35 = "[s]「剛才那個是？」"
2601405-36 = "啊，沒，沒什麼。#n我只是在哼歌……"
2601405-37 = "以前的習慣不知不覺就跑出來了。#n只要哼唱一小節之後，斷路器就會神奇地打開……"
2601405-38 = "明明只是無關緊要的小事，卻不由得地記了下來。"
2601405-39 = "[s]「不會無關緊要啊，我覺得很有趣。」"
2601405-40 = "唔嗯，是嗎？"
2601405-41 = "如果老師那樣覺得的話就太好了……"
2601405-43 = "要去學校的話，穿過這個公園比較快。"
2601405-44 = "[s]「路線看起來有點複雜耶……」"
2601405-45 = "嗯，沒錯。"
2601405-46 = "不只步道彎彎曲曲的，標示牌也很老舊，一不小心就有可能走錯路……"
2601405-47 = "呵呵，不過你看那邊。"
2601405-48 = "那棵樹的樹枝之間，有一個鳥巢對吧？"
2601405-49 = "只要把那個當成路標，往花圃方向的這條路就是捷徑。"
2601405-50 = "[s]「花凛就像導遊一樣呢。」"
2601405-51 = "唔嗯，其實這是我迷路幾次後才領悟到的訣竅，所以好像跟你說的相反……"
2601405-52 = "但今天確實是我第一次把這條路告訴其他人。"
2601405-53 = "沒什麼了不起的，不用放在心上。"
2601405-55 = "接著從這邊的階梯下去就可以了。"
2601405-56 = "……通常到這裡之後，時間也所剩不多了，所以我都會加快腳步。"
2601405-57 = "或者滑欄杆下去……"
2601405-58 = "[s]「這裡還挺陡的耶，你都滑欄杆下去？」"
2601405-59 = "沒錯，因為這個階梯的欄杆一路連到盡頭，所以只要穩住重心就能迅速地滑下去。"
2601405-60 = "……不，不過我也不是每次都會滑欄杆的。#n只有在時間緊迫的時候才會出此下策。"
2601405-61 = "[s]「真想看看。」"
2601405-62 = "看，看我滑欄杆有什麼意思嗎？"
2601405-63 = "而且今天也不會遲到，我想正常地走下去。"
2601405-65 = "（就這樣和花凛一起來到了學校……）"
2601405-67 = "嗯，到了。"
2601405-68 = "但到是到了……"
2601405-69 = "[s]「怎麼了嗎，花凛？」"
2601405-70 = "……沒什麼特別的感覺。"
2601405-71 = "我本來是想從睽違許久的上學路程體驗新鮮感，#n結果真的來到學校之後，卻沒有什麼特別的感覺。"
2601405-72 = "唔嗯，本來還打算度過有意義的休假，但這次也失敗了呢。"
2601405-73 = "老師，麻煩你跟我到這裡來，真是對不起。"
2601405-74 = "[s]「我不這麼認為哦？」"
2601405-75 = "老師，不用特意安慰我……"
2601405-76 = "嗯？你說沒有？"
2601405-77 = "一路走來的路上，我告訴你的那些祕密讓你覺得很特別……？"
2601405-78 = "你說的祕密指的是？"
2601405-79 = "[s]「就是隱藏在上學途中的好幾個事實呀。」"
2601405-80 = "是指火車經過的時間、步道或階梯欄杆之類的嗎？"
2601405-81 = "……那些真的只是瑣碎又無關緊要的閒聊而已。"
2601405-82 = "就算聽完就忘了也沒關係，實在算不上什麼消遣。"
2601405-83 = "[s]「不過那些是只有花凛才知道的祕密。」"
2601405-84 = "只有我才知道的祕密……？"
2601405-85 = "唔嗯，因為我真心認為這沒什麼，所以確實沒有跟別人說過……"
2601405-86 = "[s5]「而且現在知道祕密的──」\n[s6]「就只有我跟花凛兩個人。」"
2601405-89 = "只有我們兩個人……"
2601405-90 = "[s]「所以今天，跟花凛一起上學是件很特別的事哦。」"
2601405-91 = "是嗎？"
2601405-92 = "……我好像有點明白了。"
2601405-93 = "光是能跟老師一起，上學的路就已經很特別了。"
2601405-94 = "謝謝你，老師。"
2601405-95 = "[s]「我也很開心，下次可以再找我哦。」"
2601405-96 = "下次啊……"
2601405-97 = "呵呵，看來下次的同行會來得很快呢。"
2601405-98 = "[s]「來得很快？」"
2601405-99 = "上學之後，當然得要放學囉。"
2601405-103 = "放學路上也請你多多指教，老師。"

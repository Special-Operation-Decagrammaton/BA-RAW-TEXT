[translation]
22175-6 = "The Avant Guard has slowed down, so now's the time, Engineering Department!"
22175-7 = "Roger!"
22175-8 = "I'll install the item we made just for this!"
22175-16 = "[ns] \"Wh-What is this thing?!\""
22175-17 = "It's equipped with autonomous tracking and is waterproof and dustproof."
22175-18 = "In addition, it boasts absolute stability, even in an absolute zero or high-temperature environment of over three thousand degrees!"
22175-19 = "The Engineering Department poured half a year's budget into making this masterpiece..."
22175-21 = "A state-of-the-art remote speaker!"
22175-26 = "..."
22175-30 = "*shock*"
22175-31 = "[ns] \"...Why does it have all those features?\""
22175-32 = "What an inane question, Sensei."
22175-33 = "Anytime it's possible to add a function..."
22175-34 = "...it only makes sense to add it."
22175-35 = "They said it best."
22175-36 = "Now..."
22175-37 = "Fire!"
22175-44 = "*gulp*"
22175-45 = "I wanna say something cool like that too!"
22175-46 = "Th-That's besides the point right now, Momoi!"
22175-47 = "...Please don't start speaking like that."
22175-55 = "...I'm proud of the speaker we made. It's fantastic."
22175-56 = "[s] \"That thing is a rocket! An explosive! Not a speaker!\""
22175-57 = "Semantics. Anyways, let's get to it, everyone!"
22175-58 = "...Wow, we actually managed to defeat it."
22175-60 = "It worked! Wow!"
22175-61 = "[s1] \"I don't know what the heck happened!\"\n[s2] \"The Avant Guard was...a formidable enemy!\""
22175-62 = "But...we were able to defeat it because we all worked together."
22175-63 = "But...we were able to defeat it because we all worked together."
22175-64 = "Yeah! It kind of feels like..."
22175-65 = "We successfully defeated a boss monster in a raid together!"
22175-67 = "All right, good job, everyone. But that was only the beginning."
22175-68 = "We have to move quickly while the network is occupied by the Mirror. I'll lead the way."
22175-69 = "Well, about that."
22175-70 = "You see..."
22175-71 = "...Sorry, I think we're at our limit."
22175-76 = "[ns] \"I-Is everyone okay?\""
22175-77 = "We managed to get the speakers installed, but it took everything we had..."
22175-78 = "It was very hard for us, being more indoor kind of people..."
22175-79 = "...I can't even move my fingers."
22175-80 = "As you can see, we have to retire here, at least for now."
22175-82 = "Utaha..."
22175-86 = "Yeah, it's okay! Thanks for your help! The speaker-rocket thing was incredible!"
22175-87 = "We'll take it from here!"
22175-92 = "[ns] \"Don't worry. We'll make sure to rescue Aris.\""
22175-94 = "Okay. We'll entrust her to you."
22175-95 = "Momoi."
22175-96 = "Yes?"
22175-97 = "I'll give this to you just in case. You should use it if you're in danger."
22175-98 = "Are you sure...?"
22175-99 = "Okay, got it!"
22175-100 = "I'll leave the rest to you!"
22175-101 = "Good luck, everyone."
22175-103 = "Next Episode; An Insurmountable Wall"

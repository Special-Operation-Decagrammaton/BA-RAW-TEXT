[translation]
22175-6 = "前衛君動作變遲鈍的現在就是機會！#n要上了唷，工程師部！"
22175-7 = "是！收到！"
22175-8 = "知道了。我來設置那個。"
22175-16 = "[ns]「到，到底要做什麼呢！？」"
22175-17 = "搭載自動追蹤功能，同時能夠防水防塵。"
22175-18 = "並且，就算是在絕對零度或3千度以上的高溫都能穩定運作，#n擁有超超超超安全認證保障的……！"
22175-19 = "花了半年預算製作的最強──"
22175-21 = "最新型遠距音響！"
22175-26 = "……"
22175-30 = "（困惑）"
22175-31 = "[ns]「……為什麼音響要有那種功能呢？」"
22175-32 = "那是個愚蠢的問題唷，老師。"
22175-33 = "功能這種東西啊！在能加的時候──"
22175-34 = "……加好加滿是鐵則。"
22175-35 = "正是如此。"
22175-36 = "那麼──"
22175-37 = "發射！"
22175-44 = "（……吞口水）"
22175-45 = "……好，好，好想說那句台詞，我快忍不住了……！"
22175-46 = "姐姐，拜託忍耐一下！"
22175-47 = "……絕，絕對沒有說出來的必要。"
22175-55 = "……果然是我們做的音響，聲音真是響亮呢！"
22175-56 = "[s]「是那種意義上的音響嗎！？」"
22175-57 = "哎呀哎呀那種小事先放一邊吧！#n總之，這樣一來……！"
22175-58 = "……嗯。總算是打倒了呢。"
22175-60 = "好耶──！打倒它了唷──！"
22175-61 = "[s1]「還搞不太清楚狀況的時候就打倒了……」\n[s2]「哎呀……真是個強敵呢，前衛君。」"
22175-62 = "……多，多虧大家一起同心協力，才，才能打倒它呢。"
22175-63 = "……多，多虧大家一起同心協力，才，才能打倒它呢。"
22175-64 = "就是啊。那個，該怎麼說呢……"
22175-65 = "成功討伐副本Boss了，之類的！！"
22175-67 = "大家辛苦了。不過，現在開始才是重點。"
22175-68 = "得趁「鏡子」還能維持網路的時候行動才行……#n我馬上帶路。"
22175-69 = "啊，關於這點……"
22175-70 = "那個……"
22175-71 = "……抱歉，我們似乎就到此為止了。"
22175-76 = "[ns]「還，還好嗎！？」"
22175-77 = "……那個瞬間，直到設置完音響都還好。"
22175-78 = "對我們這些室內派的人來說……#n剛，剛才的動作實在是太亂來了……"
22175-79 = "……已經，連一根手指都動不了了。"
22175-80 = "如你們所見。雖然沒能跟到最後很令人羞愧，但我們得在此告別了。"
22175-82 = "詠葉前輩……"
22175-86 = "別在意！沒關係的！謝謝妳們的幫忙！#n剛剛那個音響！非常帥氣哦！"
22175-87 = "接下來的事情我們會想辦法的！"
22175-92 = "[ns]「別擔心。我們一定會把愛麗絲帶回來的。」"
22175-94 = "……嗯。既然你都這麼說了。"
22175-95 = "桃井。"
22175-96 = "嗯？"
22175-97 = "這個給你。#n緊急的時候應該能派上用場。"
22175-98 = "這是……"
22175-99 = "嗯，我知道了。"
22175-100 = "那麼，大家……之後的事，就拜託你們了！"
22175-101 = "大家加油哦。"
22175-103 = "下一話;無法跨越的壁壘"

[translation]
22175-6 = "หุ่นรบล้ำยุคเคลื่อนไหวช้าลงแล้ว! ตอนนี้ละ! ชมรมวิศวกรรม!"
22175-7 = "ค่ะ! รับคำสั่งค่ะ!"
22175-8 = "ฉันจะติดตั้งของที่เตรียมมาเดี๋ยวนี้เลย"
22175-16 = "[ns] \"มะ... มันคือของอะไรกันน่ะ?!\""
22175-17 = "ติดตั้งฟังก์ชันติดตามอัตโนมัติ พร้อมด้วยฟังก์ชันกันน้ำและฝุ่น"
22175-18 = "ไม่ว่าจะในสภาพแวดล้อมศูนย์สัมบูรณ์หรือเป็นสภาพแวดล้อมที่มีอุณหภูมิสูงกว่า 3,000 องศา ก็จะคง#nความเสถียรภาพไว้ได้ แถมยังรับรองความปลอดภัยขั้นสูงสุด...!"
22175-19 = "สิ่งที่พิสูจน์ศักดิ์ศรีของชมรมวิศวกรรม ที่ใช้งบประมาณกว่าครึ่งปีในการสร้าง..."
22175-21 = "ลำโพงระยะไกลรุ่นใหม่ล่าสุด!"
22175-26 = "......"
22175-30 = "(อึ้ง)"
22175-31 = "[ns] \"เป็นแค่ลำโพง... ทำไมต้องมีฟังก์ชันพวกนั้นด้วยล่ะ?\""
22175-32 = "ถามอะไรโง่ๆ น่ะคุณครู"
22175-33 = "ฟังก์ชันพวกนี้จะได้ใช้ในเวลาของมันแหละ!"
22175-34 = "...การติดเอาไว้ก่อนคือวิสัยของมนุษย์"
22175-35 = "ก็ประมาณนั้นแหละ"
22175-36 = "เอาละ ถ้างั้น..."
22175-37 = "ยิงได้!"
22175-44 = "(กลืนน้ำลาย)"
22175-45 = "...โอ๊ยคันปากมากเลย อยากพูดบทแบบนั้นบ้าง!"
22175-46 = "อะ... อดทนไว้ก่อนนะพี่โมโมอิ!"
22175-47 = "...แต่ก็ดูเหมือนจะไม่ต้องพูดแล้วละ"
22175-55 = "สมกับที่เป็นลำโพงฝีมือพวกเรา เสียงกังวาลดีจริงๆ"
22175-56 = "[s] \"นี่คือความหมายของลำโพงของพวกเธอเหรอ?!\""
22175-57 = "เอาเถอะทุกคน! เจ้าลำโพงของเรา...!"
22175-58 = "อืม... ล้มได้อย่างหวุดหวิดเลยแฮะ"
22175-60 = "ได้ผลแล้ว! ว้าว!"
22175-61 = "[s1] \"ภายนอกถึงจะเป็นหุ่นกระป๋อง แต่จริงๆ เก่งกาจมากเลย!\"\n[s2] \"หุ่นรบล้ำยุค... เป็นคู่ต่อสู้ที่แข็งแกร่งมากเลยเนอะ!\""
22175-62 = "แต่ว่า... ทุกคนก็ร่วมมือกันจน ละ... ล้มพวกนั้นได้ค่ะ"
22175-63 = "แต่ว่า... ทุกคนก็ร่วมมือกันจน ละ... ล้มพวกนั้นได้ค่ะ"
22175-64 = "อื้ม! ต้องพูดยังไงดีนะ..."
22175-65 = "เหมือนทุกคนช่วยกันตีบอสจนตายได้อย่างงั้นแหละ!"
22175-67 = "เยี่ยม ทุกคนทำได้ดีมาก แต่ของจริงมันคือต่อจากนี้ไปแล้วละนะ"
22175-68 = "เราต้องรีบเคลื่อนไหวตอนที่ <กระจก> ยังยึดเครือข่ายไว้ได้อยู่ ฉันจะนำให้เอง"
22175-69 = "อ่า... คือว่า..."
22175-70 = "แบบว่า..."
22175-71 = "ขอโทษนะ... พวกเราน่าจะช่วยได้แค่เท่านี้"
22175-76 = "[ns] \"ทะ... ทุกคนเป็นยังไงกันบ้างน่ะ?!\""
22175-77 = "ช่วงเวลาวิกฤตของจริงเลย อุตส่าห์ทำได้ดีจนถึงตอนติดตั้งแล้วเชียว"
22175-78 = "ถือเป็นตารางงานที่โหดร้ายมากค่ะ... สะ... สำหรับคนที่ชอบอยู่แต่ในร่มอย่างฉัน..."
22175-79 = "ส่วนฉันแทบจะขยับนิ้วไม่ได้เลย..."
22175-80 = "ถึงจะน่าอับอาย แต่ท่าทางพวกเราคงต้องถอนตัวออกจากภารกิจนี้แล้วละ"
22175-82 = "รุ่นพี่อุทาฮะ..."
22175-86 = "อื้ม! ไม่เป็นไร! ขอบใจนะที่มาช่วย! ลำโพงเมื่อกี้เด็ดดวงไปเลยละ!"
22175-87 = "จากนี้ให้เป็นหน้าที่ของพวกเราเอง!"
22175-92 = "[ns] \"ไม่ต้องห่วงนะ พวกเราจะไปช่วยอาริสึมาให้ได้\""
22175-94 = "อืม... ถ้าพูดกันถึงขนาดนี้ก็..."
22175-95 = "โมโมอิ"
22175-96 = "หืม?"
22175-97 = "ฉันจะให้อันนี้เผื่อไว้ก่อน มันจะเป็นประโยชน์เวลามีเรื่องอันตรายน่ะ"
22175-98 = "นี่มัน..."
22175-99 = "อื้ม เข้าใจแล้ว!"
22175-100 = "งั้นจากนี้ต่อไปก็ฝากด้วยนะคะ!"
22175-101 = "พยายามเข้านะทุกคน"
22175-103 = "ตอนต่อไป;กำแพงที่ข้ามไปไม่ได้"

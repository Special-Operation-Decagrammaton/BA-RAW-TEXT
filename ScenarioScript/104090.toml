104090-5 = "#all;hide"
104090-6 = "4;시논;02;안녕하세요, 키보토스의 학생 여러분! 크로노스 보도부의 카와루 시논입니다!\n#4;a\n#4;em;[반짝]\n#4;hophop"
104090-7 = "4;시논;01;저는 지금 복구 작업이 한창 진행 중인 D.U. 시라토리구에 나와 있습니다. 저 뒤로 보이는 건물들이 이번에 복구가 진행되고 있는 건물들인데요."
104090-8 = "4;시논;05;시라토리구는 저번 사건 때 괴수와 거대로봇의 격전장이었던 만큼 키보토스에서 가장 큰 피해를 입었던 지역이었습니다.\n#4;em;[반응]"
104090-9 = "4;시논;01;하지만 벌써부터 저렇게 활기 넘치는 모습으로 복원되고 있군요! 멋집니다! 역시 도시 개발의 꽃은 재개발인가요! \n#4;m5\n#4;hophop"
104090-10 = "4;시논;05;하지만 총학생회 재무실장 오키 아오이 씨는 \"지금은 도시의 복구가 최우선.\" 이라는 말과 함께 긴급 복구 지원금을 승인, 통괄실에서 집행할 수 있게 협력했습니다.\n#4;m4"
104090-11 = "4;시논;99;나나가미 린 씨의 문책결의안이 여전히 계류되고 있는 상태에서 이런 결정은 정치 싸움보다 도시 복구를 우선한다, 라는 올바른 자세로 칭찬할 만하다는 평가를 받고 있지만……."
104090-12 = "4;시논;05;솟구치는 땅값과 건설 자재비는 누가 책임지나요! 재개발을 통해 얻는 이득은 과연 누가 취하게 될까요! 과연 거기에 부정이 없을까요? \n#4;em;[!]"
104090-13 = "4;시논;02;다음에는 이 부분에 대한 심층 취재를……"
104090-14 = "4;시논;05;네? 이상한 소리는 그만하라고요? 당신도 여기 땅 샀어? 엉? \n#4;shake\n#4;em;[?!]"
104090-15 = "#st;[0,0];instant;1;"
104090-16 = "#clearST"
104090-17 = "#all;hide\n#wait;1500"
104090-18 = "#na;안내 방송;화면 상태가 고르지 못해 죄송합니다. 잠시만 기다려 주세요."
104090-19 = "#all;hide"
104090-20 = "4;시논;99;……키보토스에 그 사건이 벌어진 지도 벌써 많은 시간이 흘렀습니다.\n#4;a"
104090-21 = "4;시논;06;키보토스 전역에 붉은 탑이 생겨나고 정체불명의 적들에게 공격당한다…… 이런 엄청난 사건이 벌어졌는데도 사건을 회고하는 키보토스 시민들의 반응은 시큰둥하기만 한데요."
104090-22 = "4;시논;08;주로 뭔가 큰 소동이 있긴 했는데 <샬레>의 활약으로 모든 것이 해결되었다…… 그래서 뭐? 라는 반응들입니다. \n#4;m3\n#4;em;…"
104090-23 = "4;시논;02;이거 고도의 <샬레>의 홍보 이벤트? 총학생회랑 짜고 치는 깜짝 카메라? 뭐 그런 반응들도 있네요. \n#4;m4\n#4;em;[반응]"
104090-24 = "4;시논;01;사실 이번 일로 가장 큰 피해를 입은 D.U.만 해도, 부상자도 적고 사상자는 제로."
104090-25 = "4;시논;99;사건의 규모에 비해서, 이 정도 피해만 발생한 것은 기적 같은 일이라고 평가하는 사람도 있지만요. 대부분의 시민은 별로 그런 게 와닿지는 않는 모양입니다."
104090-26 = "4;시논;02;다른 자치구에서도 딱히 피해 복구나 지원 요청이 들어오지 않고 있는 걸 보면 다들 비슷한 상황이 아닌가 싶네요."
104090-27 = "4;시논;05;아, 이번 사건의 가장 큰 피해자는 <총학생회>라는 분석도 있긴 합니다. 총학생회의 건물과 <생텀 타워>가 파괴되었으니까요!\n#4;hophop\n#4;em;[반응]"
104090-28 = "4;시논;02;키보토스의 행정 제어를 관리하는 <생텀 타워>의 소실…… 이제 큰일 난 거 아닌가? 키보토스는 이제 끝장인가? 멸망인가?! "
104090-29 = "4;시논;99;……그런 생각을 하시는 시청자분이 계시겠지만요. "
104090-30 = "4;시논;07;사실 생텀 타워는 최종 관리자인 총학생회장이 실종된 뒤부터 이미 유명무실한 상태였잖아요? 그러니까 없어진다고 해서 딱히 달라질 것도 없을걸요?\n#4;em;[음표]\n#4;greeting"
104090-31 = "4;시논;02;실제로 총학생회는 이 사건을 불가사의한 현상으로 인한 키보토스의 습격, 이라고만 평가할 뿐, 다른 설명을 내어놓지는 않고 있고……. "
104090-32 = "4;시논;01;뭔가 이 사건과 깊게 연관되었을 거라는 의혹을 받고 있는 <샬레>에서는, "
104090-33 = "4;시논;05;선생님이 알몸으로 들판에서 뛰어다니는 걸 봤다는 사람이 있는데 사실인가? 라는 질문에 노코멘트로 일관하고 있습니다!\n#4;hophop"
104090-34 = "4;시논;05;선생님이 극단적 자연주의자가 된 거라면 그럼 어째서 알몸에 태블릿 PC는 들고 있었는가? 라는 물음에 이것은 현대 문명과 자연의 공존을 주장하는 퍼포먼스라는 해석을 내놓은……."
104090-35 = "4;시논;06;……네? 음모론을 확산시키지 말라고요? 무슨 소리예요! 이건 음모론이 아니라…….\n#4;em;[?!]\n#4;shake"

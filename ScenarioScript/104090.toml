[translation]
104090-1 = "Episode 9; Epilogue 1"
104090-6 = "Hello, students of Kivotos! I'm Kawaru Shinon of the Kronos School of Journalism!"
104090-7 = "I'm currently in the Shiratori district, where restoration is in full swing. The buildings you see behind me are all being rebuilt as we speak!"
104090-8 = "The Shiratori district suffered most of the damage, as it was a battlefield for the monster and giant robot during the incident."
104090-9 = "But it's already looking vibrant! It's incredible! After all, redevelopment is the best part of development!"
104090-10 = "The General Student Council chief of finance, Oki Aoi, said, \"Right now, restoration of the city is top priority,\" and authorized emergency restoration support funds requested by the Supervisory Office."
104090-11 = "With Nanagami Rin's motion of censure still pending, this decision was praised for prioritizing urban restoration over political battles, but..."
104090-12 = "Who's responsible for the skyrocketing cost of land and construction materials? Who will benefit from the redevelopment? Is there a darker side to this story of hope? "
104090-13 = "Next time, we'll provide in-depth coverage on this..."
104090-14 = "What? You want me to shut up? Did you buy land here too? Huh?!"
104090-18 = "Sorry for the screen glitch. Please wait a moment."
104090-20 = "...A lot of time has already passed since the Sanctum incident besieged Kivotos."
104090-21 = "The red towers appeared all over Kivotos, and we were attacked by unknown enemies... Even though such a huge incident occurred, the reaction of the Kivotos citizens who can recall the incident is tepid at best."
104090-22 = "\"There was some big commotion, but everything was resolved thanks to the performance of Schale. So what?\" seems to be the general reaction."
104090-23 = "Some people even claimed, \"Is this some kind of Schale promotional event? A collusion with the General Student Council? Where are the hidden cameras?\" "
104090-24 = "In fact, even for D.U., which suffered the most from this incident, there were few injuries and zero casualties."
104090-25 = "Compared to the scale of the incident, some people say it was miraculous that only this amount of damage occurred, but most people have simply moved on with their lives."
104090-26 = "Seeing as how there are no requests for damage restoration or support from other districts, the situation seems to be the same all over Kivotos."
104090-27 = "And an analysis also concluded the biggest victim of this incident was the General Student Council, since the Student Council building and Sanctum Tower were destroyed!"
104090-28 = "The loss of Sanctum Tower, which managed administrative control of Kivotos... Isn't that a big deal? Is Kivotos over? Is it doomed?!"
104090-29 = "...I'm sure some viewers might be thinking that."
104090-30 = "But Sanctum Tower was already insignificant since the president of the General Student Council, the last manager, went missing, right? So we don't expect much change with its sudden destruction."
104090-31 = "The General Student Council evaluated this incident as an attack on Kivotos by a mysterious phenomenon, and hasn't offered any other explanation..."
104090-32 = "Schale is suspected to be deeply involved in this incident as well! "
104090-33 = "But it refuses to respond to rumors that someone saw Sensei running around a field naked!"
104090-34 = "If Sensei has become an extreme naturalist, then why run around holding a tablet PC? In response to this, one interpretation is that it was performance art about the coexistence of modern civilization and nature..."
104090-35 = "...Huh? Stop spreading conspiracy theories? What are you talking about?! This isn't a conspiracy theory..."
104090-39 = "We have another screen glitch. Our apologies."
104090-43 = "...In short, this is a high-level conspiracy being hidden by an apathetic public! Schale, don't hide the truth! Reveal it!"
104090-47 = "One more screen glitch. Please hold."
104090-49 = "The General Student Council's announced they're working on a project to reconstruct Sanctum Tower, and that the completed tower will be unveiled in the near future."
104090-50 = "It's a big project to rebuild Sanctum Tower according to the blueprint, but due to the difficulty of the process, there are rumors that they're collaborating with Kaiser Industries, a private construction company."
104090-51 = "The big players booming in the real estate market, via urban regeneration and redevelopment in the construction industry, will gain the most from this, while the people are suffering from soaring inflation and interest rates..."
104090-58 = "...Tsk."
104090-59 = "...So, that's the whole of it, Chief of Defense."
104090-60 = "You would have been in a very precarious situation without our help."
104090-61 = "Isn't it the same for you? Without my assistance, Kaiser would have filed bankruptcy by now."
104090-62 = "...Fair. With this, has our alliance been maintained?"
104090-63 = "Joining forces with the one who stabbed me in the back..."
104090-64 = "An ordinary person would never do that..."
104090-66 = "But ordinary people never achieve anything. Doing things out of the ordinary is what makes someone superhuman."
104090-67 = "Hmm."
104090-68 = "A superhuman can't be like the ordinary masses. I'm looking forward to working with you, General."
104090-69 = "Indeed... Hahaha... Fantastic. I can see why the president thinks highly of you."
104090-70 = "A true adult should be able to join hands with yesterday's enemy to aim for a greater cause."
104090-71 = "I'm not an idiot who would ruin plans because of some trivial emotions."
104090-72 = "All right. I look forward to working with you, Chief of Defense."
104090-74 = "..."
104090-75 = "..."
104090-79 = "Aris, we're here."
104090-80 = "Huh? Aris, what are you doing?"
104090-81 = "Assembling a plastic model?"
104090-85 = "No. It is not a plastic model. "
104090-90 = "What is it, then? A robot...?"
104090-91 = "Yes. I think this is...Kei. Probably."
104090-92 = "Huh? Kei?!"
104090-93 = "Y-You said she disappeared."
104090-94 = "Yes, Kei disappeared...and I have not seen her since."
104090-95 = "But when Kei disappeared...I saw a robot like this, for one second."
104090-97 = "So I am making it before my memory fades."
104090-98 = "Hm..."
104090-99 = "Aris..."
104090-100 = "Kei...really helped us! P-Perhaps...she could have become one of our party members."
104090-101 = "....Yes. If I see her again...I would like to ask her to become a party member. If she would like to."
104090-102 = "..."
104090-108 = "Huh? Is this an invite to an online battle?"
104090-112 = "...Huh? What's this?"
104090-113 = "What's wrong, Sis?"
104090-114 = "...A file I've never seen before is on my memory card."
104090-115 = "Are you sure you didn't just forget?"
104090-116 = "What do you mean? How could I forget about a saved file? I've never seen the file name before."
104090-117 = "Let's see..."
104090-123 = "Wait... This...is...?"
104090-124 = "What is it?"
104090-127 = "Kei.sav"
104090-129 = "The name on the saved file is...Kei?"
104090-130 = "K-Kei? Is that supposed to be Kei?"
104090-131 = "...!"
104090-133 = "L-Let's hurry and take this to Himari!"
104090-134 = "Yes!"
104090-139 = "Welcome, Game Development Department members."
104090-140 = "Hello."
104090-142 = "Huh? It's you! What are you doing here?!"
104090-143 = "C&C's..."
104090-144 = "President Rio's..."
104090-145 = "Yes... I'm Asuma Toki. Peace peace."
104090-149 = "P-Peace?!"
104090-150 = "Wh-What...?"
104090-151 = "President Himari taught you weird mannerisms."
104090-152 = "It's not weird. It's character emphasis. It's a strategy to take advantage of an opponent's weakness."
104090-153 = "As long as you're happy, I guess."
104090-154 = "President Rio is still in hiding, so I'm seeking employment."
104090-155 = "So that's why Toki's snooping around. Will you go to C&C's club room next?"
104090-156 = "...No. I think the upperclassmen are busy. I haven't seen them."
104090-157 = "I understand the situation. Since you are unemployed, would you like to join our party?"
104090-159 = "What?!"
104090-160 = "A-Aris..."
104090-164 = "Thank you for the invitation, but...I have another mission to take care of at the moment."
104090-166 = "But... If you would like to invite me again, next time... "
104090-172 = "Oh! Aris?"
104090-173 = "Hello, Himari."
104090-174 = "Himari! Can you look at this for us?"
104090-175 = "It's this!"
104090-179 = "A game console...?"
104090-181 = "Hmm... I see."
104090-182 = "What do you think?"
104090-183 = "Do you think that it's Kei?"
104090-184 = "..."
104090-185 = "I believe so. But I'm not an expert regarding the technology of the Nameless Gods, so I can't say with complete certainty."
104090-186 = "If such data occurred naturally...that would certainly be a supernatural phenomenon."
104090-187 = "As of now, it may be Kei, but we can't prove it."
104090-188 = "Th-That is how it is..."
104090-189 = "Yes, this data is only two kilobytes, and...even if we analyzed it bit by bit, we wouldn't be able to make sense of it."
104090-190 = "Unless that scared woman who's an expert on this technology finally comes back."
104090-191 = "I see. So it is neither a yes or a no right now."
104090-193 = "I hope...it is Kei. If it is Kei, then... Then, I..."
104090-194 = "Aris..."
104090-195 = "Aris..."
104090-200 = "Oh? What is that?"
104090-201 = "I...made this while thinking of Kei."
104090-202 = "I see... What excellent work, Aris."
104090-203 = "..."
104090-204 = "With your permission, would you like me to mod the robot?"
104090-205 = "Mod?"
104090-206 = "It would be nothing more than adding a USB memory function, but then you could..."
104090-207 = "You could put Kei's data in there."
104090-208 = "That's genius! You made this thinking of Kei! It's like you knew!"
104090-209 = "If you load the data..."
104090-210 = "...!"
104090-211 = "While it's true that I am a delicate and beautiful genius, please don't expect any miracles."
104090-212 = "It's just a small piece of hope to carry with you."
104090-214 = "Yes! I would like it!"
104090-215 = "Heehee. Leave it to me. Modding is where my genius truly shines."
104090-216 = "Especially considering I modded the exoskeleton of Toki over there. Although that girl didn't have such good taste."
104090-220 = "Let's see here... I actually bought some new memory recently...and I'll even add a key fob function."
104090-223 = "Voila! It's finished!"
104090-224 = "...!"
104090-225 = "Thank you, Himari."
104090-226 = "It came out good, Aris."
104090-227 = "Yes, Aris... I'm happy for you."
104090-228 = "Keep it safe so you don't lose it..."
104090-230 = "Thank you!"
104090-235 = "Next Episode; Epilogue 2"

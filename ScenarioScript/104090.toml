104090-49 = "4;마이;06;……그래서 총학생회는 생텀 타워를 다시 건설하는 프로젝트를 진행 중이며, 근시일 내에 완공된 타워를 공개하겠다고 발표했습니다.\n#4;a\n#4;stiff\n#4;em;…"
104090-50 = "4;마이;01;생텀 타워의 설계도대로 다시 제작하는 큰 프로젝트인데, 공정의 난이도 때문에 민간 건설 업체 <카이저 인더스트리>와 협력한다는 소문도 흘러나오고 있는데요."

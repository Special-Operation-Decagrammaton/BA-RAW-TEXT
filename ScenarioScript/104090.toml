104090-127 = "Kei.sav"
104090-129 = "ข้อมูลแบ็กอัป...... <Kei>......? "
104090-130 = "คะ... เคย์เหรอ? อ่านว่าเคย์ใช่ไหม? "
104090-131 = ".........!!!"
104090-133 = "ระ... รีบไปหารุ่นพี่ฮิมาริกันเถอะ!!"
104090-134 = "ค่ะ!!"
104090-139 = "ยินดีต้อนรับค่ะ ชมรมพัฒนาเกม"
104090-140 = "ว่าไง~"
104090-142 = "เอ๋? ธะ... เธอ?! ทำไมเธอถึงมาอยู่ที่นี่ได้ล่ะ?!"
104090-143 = "สมาชิกสังกัด C&C......?"
104090-144 = "คนของประธานริโอะ......?"
104090-145 = "...... ใช่ค่ะ ฉันคืออาซุมะ โทคิค่ะ พีซ- พีซ-"
104090-149 = "พะ... พีซ-?!"
104090-150 = "หะ... หืม......?"
104090-151 = "หัวหน้าฮิมาริสอนอะไรแปลกๆ ไว้น่ะ......"
104090-152 = "ไม่ใช่อะไรแปลกๆ ค่ะ มันเป็นคาแรกเตอร์ค่ะ เป็นกลยุทธ์ในการเจาะช่องว่างของฝ่ายตรงข้ามน่ะค่ะ"
104090-153 = "ก็นะ... ถ้าเจ้าตัวไม่คิดว่าแปลก ก็ไม่มีปัญหาอะไรหรอก......"
104090-154 = "ประธานริโอะยังคงปลีกวิเวกอยู่เหมือนเคย ฉันก็เลยกำลังหางานทำอยู่ค่ะ"

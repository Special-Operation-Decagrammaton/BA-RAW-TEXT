[translation]
104090-1 = "ตอนที่ 9;บทส่งท้าย 1"
104090-6 = "สวัสดีค่ะ นักเรียนคิโวทอสทุกคน! คาวารุ ชิน่อนจากชมรมข่าวโครโนสค่ะ!"
104090-7 = "ตอนนี้ฉันมาอยู่ที่เขตชิราโทริ D.U. ที่อยู่ระหว่างการฟื้นฟูครั้งใหญ่ค่ะ และอาคารเหล่านั้นที่อยู่ด้านหลัง ก็คืออาคารที่กำลังได้รับการฟื้นฟูอยู่ค่ะ"
104090-8 = "ชิราโทริเป็นเขตที่ได้รับความเสียหายมากที่สุดในคิโวทอส เนื่องจากถูกใช้เป็นสนามในการต่อสู้#nระหว่างปีศาจกับหุ่นยนต์ขนาดมหึมาที่เพิ่งเกิดขึ้นค่ะ"
104090-9 = "แต่ผ่านไปไม่เท่าไรก็ได้รับการฟื้นฟูจนกลับมาชีวิตชีวาเหมือนเดิมแล้วค่ะ! สุดยอดไปเลยนะคะ! การเกิดใหม่ของเมืองก็คือการพัฒนาใหม่สินะคะ! "
104090-10 = "ทางด้านคุณโอคิ อาโออิ หัวหน้าฝ่ายการเงินจากองค์การนักเรียนก็ได้อนุมัติเงินอุดหนุนการฟื้นฟู#nฉุกเฉินพร้อมเน้นย้ำว่า \"ตอนนี้การฟื้นฟูเมืองเป็นสิ่งสำคัญที่สุด\" ค่ะ"
104090-11 = "ท่ามกลางเรื่องมติไม่ไว้วางใจของคุณนานากามิ รินที่ยังไม่จบ การเลือกตัดสินใจเช่นนี้ทำให้ได้รับคำ#nชื่นชมมากมายว่าการฟื้นฟูเมืองต้องมาก่อนการต่อสู้ทางการเมืองค่ะ แต่ว่า......"
104090-12 = "ก็ยังมีคำถามที่ว่า ใครจะเป็นคนรับผิดชอบราคาที่ดินและวัสดุก่อสร้างที่พุ่งสูงขึ้น! สุดท้ายแล้วใครจะ#nได้รับประโยชน์จากการพัฒนาเมืองใหม่! แล้วจะมีการทุจริตให้เห็นหรือไม่? "
104090-13 = "ต่อไปเราจะมาพูดในหัวข้อนี้อย่างลึกซึ้ง......"
104090-14 = "คะ? ขอให้เลิกพูดอะไรไร้สาระงั้นเหรอคะ? คุณเป็นเจ้าของที่ดินตรงนี้เหรอ? ฮะ? "
104090-18 = "ขออภัยสำหรับการเผยแพร่ภาพที่ผิดพลาดค่ะคุณผู้ชม ช่วยรอสักครู่นะคะ"
104090-20 = "...... นี่ก็นานมากแล้วนะคะสำหรับเหตุการณ์นั้นที่เกิดขึ้นในคิโวทอส"
104090-21 = "หอคอยสีแดงปรากฏทั่วทั้งคิโวทอส ศัตรูที่เราไม่รู้จักกรูกันมาโจมตีเรา...... ถึงจะเกิดเรื่องใหญ่เป็น#nประวัติการณ์แบบนี้ แต่ก็ถือว่าชาวเมืองคิโวทอสดูจะเฉยๆ กันมากเลยนะคะ"
104090-22 = "ส่วนใหญ่จะคิดกันว่า เกิดเรื่องวุ่นวายขึ้นก็จริง แต่ <ชาเล่ต์> ก็แก้ไขสถานการณ์ทั้งหมดไว้ได้...... ประมาณนี้ค่ะ "
104090-23 = "แล้วก็มีบางส่วนที่คิดว่านี่เป็นการจัดฉากเพื่อประชาสัมพันธ์ <ชาเล่ต์> หรือไม่ก็เป็นการซ่อนกล้องที่#nมีการร่วมมือกับองค์การนักเรียนด้วยค่ะ "
104090-24 = "แถมใน D.U. ที่เป็นเขตที่ได้รับความเสียหายมากที่สุดก็มีผู้ได้รับบาดเจ็บน้อยมาก และไม่มีรายงานผู้#nเสียชีวิตเลย"
104090-25 = "การที่ความเสียหายมีเพียงเล็กน้อยเมื่อเทียบกับระดับความรุนแรงของเหตุการณ์แล้ว บางคนบอกว่า#nราวกับเป็นปาฏิหาริย์ แต่ก็ต้องยอมรับว่าชาวเมืองส่วนใหญ่ไม่ค่อยอินกับเหตุการณ์นี้เท่าไรค่ะ"
104090-26 = "ดูจากที่ไม่มีการขอความช่วยเหลือหรือการฟื้นฟูความเสียหายในเขตปกครองตนเองอื่นๆ แล้ว ดูเหมือนว่าในพื้นที่อื่นก็คงจะคล้ายๆ กันนะคะ"
104090-27 = "อ้อ มีการวิเคราะห์ออกมาด้วยค่ะว่าคนที่ได้รับความเสียหายมากที่สุดจากเหตุการณ์นี้คือ <องค์การนักเรียน> เพราะอาคารขององค์การนักเรียนและ <แซงค์ทัมทาวเวอร์> ถูกทำลายไปหมดเลยค่ะ!"
104090-28 = "ส่วนควบคุมการบริหารจัดการของคิโวทอสอย่าง <แซงค์ทัมทาวเวอร์> หายไป...... นี่มันเรื่องใหญ่เลย#nนะคะทุกคน! คิโวทอสจะถึงทางตันแล้วหรือเปล่าคะ? หรือว่าจะล่มสลายไปเลย?! "
104090-29 = "...... ผู้ชมบางท่านอาจตั้งคำถามเหมือนกันกับฉันนะคะ "
104090-30 = "เพราะความจริงแล้ว ตั้งแต่ประธานองค์การนักเรียนที่เป็นผู้บริหารสูงสุดหายตัวไป แซงค์ทัมทาวเวอร์ก็#nเป็นอาคารที่มีแต่ชื่อ แต่ไม่มีบทบาทนี่คะ? เพราะงั้นถึงมันจะหายไป ก็ไม่น่าจะมีอะไรเปลี่ยนแปลงมากนะคะ"
104090-31 = "ทางองค์การนักเรียนประเมินว่าเหตุการณ์นี้เป็นการบุกรุกคิโวทอสจากปรากฏการณ์ลึกลับ และไม่ได้อธิบายอะไรเพิ่มให้หายสงสัย...... "
104090-32 = "ส่วนทาง <ชาเล่ต์> ที่ถูกสงสัยว่ามีความเกี่ยวข้องอย่างลึกซึ้งกับเหตุการณ์นี้ "
104090-33 = "ก็ยังไม่ให้คำตอบใดๆ กับคำถามที่ว่า \"เป็นความจริงหรือไม่ที่มีคนบอกว่าเห็นคุณครูวิ่งเปลือยกายไป#nทั่วทุ่ง?\" ค่ะ!"
104090-34 = "ส่วนคำถามที่ว่า \"ถ้าคุณครูผันตัวมาเป็นนักธรรมชาตินิยมสุดโต่งที่ไม่ใส่เสื้อผ้าเลย แล้วทำไมถึงถือ#nโน้ตบุ๊กที่เป็นสิ่งของที่ไม่ได้มาจากธรรมชาติ?\" ก็มีคนตีความว่านี่เป็นการยืนยันการอยู่ร่วมกันของ#nธรรมชาติและอารยธรรมสมัยใหม่......"
104090-35 = "คะ......? อย่าแพร่ทฤษฎีสมคบคิดงั้นเหรอคะ? พูดอะไรกันคะ! นี่มันไม่ใช่ทฤษฎีสมคบคิดนะคะ แต่ว่ามันเป็น......"
104090-39 = "ขออภัยสำหรับการเผยแพร่ภาพที่ผิดพลาดค่ะคุณผู้ชม ช่วยรอสักครู่นะคะ"
104090-43 = "สรุปได้ว่านี่คือแผนการลับขั้นสูงที่สร้างปรากฏการณ์ให้คนแห่ทำตามกันค่ะ! เลิกปิดบังความจริง แล้วเปิดเผยตัวตนออกมาเถอะค่ะ <ชาเล่ต์>!!! "
104090-47 = "ขออภัยสำหรับการเผยแพร่ภาพที่ผิดพลาดค่ะคุณผู้ชม ช่วยรอสักครู่นะคะ"
104090-49 = "...... ขณะนี้องค์การนักเรียนก็เลยอยู่ระหว่างการสร้างแซงค์ทัมทาวเวอร์ขึ้นใหม่ และออกมาประกาศว่า#nการก่อสร้างจะแล้วเสร็จในอีกไม่ช้าค่ะ"
104090-50 = "การสร้างแซงค์ทัมทาวเวอร์ขึ้นใหม่ตามพิมพ์เขียวเดิมของอาคารเดิมถือเป็นโปรเจกต์ใหญ่เลยค่ะ#nเนื่องด้วยความยากของขั้นตอนการทำงาน ทำให้มีข่าวลือว่าการก่อสร้างนี้เป็นการร่วมมือกับบริษัทก่อ#nสร้างเอกชนที่ชื่อ <ไคเซอร์ อินดัสทรี> ด้วยค่ะ"
104090-51 = "แถมยังมีการวิเคราะห์ว่าผู้ที่ได้รับประโยชน์มากที่สุดคือนักลงทุนรายใหญ่จากอุตสาหกรรมการก่อสร้าง#nที่เฟื่องฟูในตลาดอสังหาริมทรัพย์... ส่วนคนที่เดือดร้อนจากราคาสินค้าและอัตราดอกเบี้ยที่พุ่งสูงขึ้น..."
104090-58 = "...... ชิ"
104090-59 = "....... ก็เลยกลายเป็นแบบนี้สินะ หัวหน้าสำนักป้องกัน"
104090-60 = "ถ้าไม่ได้ความช่วยเหลือจากพวกฉันละก็ เธอมีหวังโดนดูถูกยกใหญ่แล้ว"
104090-61 = "พวกคุณเองก็ด้วยไม่ใช่เหรอคะ? ถ้าไม่ได้ฉันช่วยไว้ ป่านนี้ไคเซอร์ก็คงกำลังเซ็นเอกสารล้มละลายกัน#nอยู่แล้วละค่ะ"
104090-62 = "ก็ได้... เอาเป็นว่าความร่วมมือของพวกเราจะยังคงอยู่เหมือนเดิมใช่มั้ย?"
104090-63 = "....... จะให้จับมือกับคนที่แทงข้างหลังกันงั้นเหรอ...... "
104090-64 = "ถ้าเป็นคนธรรมดา นี่คงเป็นเรื่องที่ทำไม่ได้อย่างเด็ดขาด......"
104090-66 = "แต่คนที่ทำในสิ่งที่คนธรรมดาไม่สามารถทำได้ ถือเป็น <ยอดคน> ใช่ไหมล่ะคะ?"
104090-67 = "โฮ้"
104090-68 = "ยอดคนต้องไม่เป็นเหมือนที่น่ารังเกียจแบบนั้นค่ะ ...เพราะงั้น ต่อไปก็ต้องรบกวนด้วยนะคะ นายพล"
104090-69 = "งั้นเหรอ...... หึหึหึ...... ยอดเยี่ยมไปเลยนะ สมแล้วที่เป็นคนที่ประธานใหญ่ยอมรับ"
104090-70 = "เพื่อความยุติธรรมแล้วละก็ ผู้ใหญ่ที่แท้จริงย่อมสามารถจับมือกับศัตรูในวันวานได้"
104090-71 = "ฉันไม่เหมือนกับพวกปัญญาอ่อนที่ถูกครอบงำได้ด้วยอารมณ์ความรู้สึกเล็กๆ น้อยๆ หรอกนะ "
104090-72 = "ก็ดี งั้นต่อไปก็ฝากด้วยละ หัวหน้าสำนักป้องกัน"
104090-74 = "......."

[translation]
104090-1 = "第9話;尾聲（１）"
104090-6 = "奇普托斯的學生們，大家好！我是克洛盧斯新聞部的川流詩音！"
104090-7 = "今天來到了正在進行修復作業的D.U.白鳥區。#n現在各位看見的就是修復中的建築物。"
104090-8 = "由於白鳥區是巨大機器人與怪獸激戰的地點，所以是奇普托斯受創特別嚴重的地區。"
104090-9 = "但各位請看！現在已經煥然一新，恢復回生氣蓬勃的樣子了！#n果然都市最重要的就是二次開發嗎？"
104090-10 = "聯邦學生會的財務室長扇喜碧表示「目前以修復城市為最優先事項」，#n批准了緊急復興支援金，並允許由統領室的行政官來執行。"
104090-11 = "在七神琳同學仍面臨究責決議案的情況下，#n其將街道修復優先於政治鬥爭的作法獲得了相當不錯的評價，然而──"
104090-12 = "土地與建設的費用，以及再次開發所產生的利益將流向何處尚未明朗──#n這究竟是否真的稱的上是為了市民呢！？"
104090-13 = "下次我們將會挖掘這其中的真──"
104090-14 = "什麼？叫我別說些奇怪的話？難道是相關人士──"
104090-18 = "～請稍待片刻～"
104090-20 = "──那個事件發生至今，已經過了相當長的一段時間。"
104090-21 = "奇普托斯全境出現赤紅的塔，遭受來歷不明敵人的攻擊……#n面對這樣前所未有的事件，市民們似乎仍有不解。"
104090-22 = "許多一般市民都表示#n「確實發生了大事，但『夏萊』的活躍讓事件圓滿落幕，所以也沒什麼吧」──"
104090-23 = "不過，也有「這是『夏萊』的宣傳活動？」「和聯邦學生會聯手策畫的整人企劃？」這一類的反應。"
104090-24 = "實際上，這次事件受創最嚴重的D.U.只有出現少數傷患，並沒有出現任何死者。"
104090-25 = "以本次事件的規模來看，這種程度的損害可以說是奇蹟……#n雖然也有這樣的意見，不過大部分的市民似乎並不是非常理解。"
104090-26 = "其他自治區也沒有傳來修復或支援的要求，可見其他地區恐怕也處於類似的狀況吧。"
104090-27 = "啊，此外也有這次事件最大的受害者是「聯邦學生會」這種看法。#n畢竟聯邦學生會的大樓與「聖所之塔」都遭到破壞了！"
104090-28 = "管理奇普托斯行政控制權的「聖所之塔」的消失……"
104090-29 = "奇普托斯就要這麼滅亡了嗎！？#n──相信一定有觀眾產生過這種不安的想法吧。"
104090-30 = "但是，其實聖所之塔在身為最終管理者的「聯邦學生會長」失蹤後，#n就已經處於空轉狀態了。因此就算消失也不會造成實際上的損害。"
104090-31 = "而聯邦學生會對本次事件僅以「不可思議的現象造成的襲擊事件」回應，#n完全沒有對事件的詳細情況進行說明。"
104090-32 = "至於被質疑和這個事件有密切關係的「夏萊」──"
104090-33 = "對於「老師全身赤裸在田野間奔跑」的目擊情報，一律以「不予置評」來回應！"
104090-34 = "因而產生了「如果以裸體主義者自居訴求回歸自然，又為何要拿著電子機器呢」的意見，以及「這是主張人類與自然共生的一種表演」的這種解釋──"
104090-35 = "……什麼？不要散布陰謀論？不，這是身為一個優秀的記──"
104090-39 = "～請稍待片刻～"
104090-43 = "所以，這不就是為了逃避大眾的目光而刻意保持沉默嗎！？#n「夏萊」應該立刻公布真──"
104090-47 = "～請稍待片刻～"
104090-49 = "……聯邦學生會正在推動聖所之塔的重建計畫，並且將於近期公開重建的聖所之塔。"
104090-50 = "由於是按照既有的聖所之塔設計圖進行的大規模計畫，#n有傳聞表示考量到施工難易度的原因，將會與民間企業「凱薩工業」共同合作。"
104090-51 = "對此，也出現「利益都被大型建商賺走了不是嗎」的聲音，#n面對持續攀升的利率和物價，市民們的不安也跟著水漲船高──"
104090-58 = "……呿。"
104090-59 = "……事情就是這樣，防衛室長。"
104090-60 = "如果沒有我們的幫助，你早就受到奇恥大辱了吧。"
104090-61 = "這點我們也是彼此彼此吧？#n要不是有我在，凱薩現在應該已經在申請破產了吧。"
104090-62 = "……合作依舊有效，我可以這麼認為吧？"
104090-63 = "要和背叛自己的人再次聯手啊……"
104090-64 = "……凡人想必會有所猶豫吧。"
104090-66 = "但是，達成凡人無法達成的事的正是「超人」。"
104090-67 = "……哦？"
104090-68 = "超人必須和那些凡庸之人劃清界線──往後還請多多關照，將軍。"
104090-69 = "咯咯咯……真了不起。不愧是總裁認可的人物。"
104090-70 = "真正的大人為了大義，就連昨日的敵人也能攜手合作。"
104090-71 = "我也並非會被無謂的感情左右而讓計畫白費的蠢蛋。"
104090-72 = "那麼，今後也拜託你了。防衛室長。"
104090-74 = "……"
104090-75 = "……"
104090-79 = "愛麗絲，我們回來囉～"
104090-80 = "咦？愛麗絲醬，你在做什麼？"
104090-81 = "做模型？"
104090-85 = "不，這不是模型……"
104090-90 = "這是什麼？機器人……？"
104090-91 = "……是的。這也許……是「Kei」。"
104090-92 = "咦！？這是Kei……？"
104090-93 = "那孩子……記得說是消失了……"
104090-94 = "是的……在那時消失了……並且在那之後再也不曾見到他。"
104090-95 = "但當時……Kei消失的瞬間……雖然只是一瞬間，愛麗絲似乎看見了這樣的機器人。"
104090-97 = "所以為了不忘記……便試著做了出來。"
104090-98 = "這樣啊……"
104090-99 = "愛麗絲醬……"
104090-100 = "Kei……結果他還是幫助了我們對吧……#n說不定，我們能成為同伴的說……"
104090-101 = "……是。如果，還能再見面的話……#n那個時候，愛麗絲想對他說「成為夥伴吧」。"
104090-102 = "……"
104090-108 = "嗯？這是在申請線上對戰嗎？"
104090-112 = "……咦？這是什麼？"
104090-113 = "怎麼了嗎，姐姐？"
104090-114 = "……儲存空間裡有個沒看過的存檔。"
104090-115 = "不是姐姐無意間建的嗎？"
104090-116 = "不可能在無意間建存檔吧！#n而且存檔的標題我也沒看過啊！"
104090-117 = "我看看……"
104090-123 = "咦……這是……"
104090-124 = "怎麼了嗎？"
104090-127 = "Kei.sav"
104090-129 = "存檔……「Kei」……？"
104090-130 = "是，是Kei對吧？這是唸Kei沒錯吧！？"
104090-131 = "……！！！"
104090-133 = "快，快拿去給陽葵前輩看看吧！！"
104090-134 = "是！！"
104090-139 = "遊戲開發部的各位，好久不見。"
104090-140 = "呀齁～"
104090-142 = "咦，咦？為什麼會在這裡！？"
104090-143 = "C&C的……"
104090-144 = "莉央會長的……"
104090-145 = "……是的。我是飛鳥馬季。Peace，Peace。"
104090-149 = "咦？剛才那是Peace手勢嗎？"
104090-150 = "……！？"
104090-151 = "部長又教了些奇怪的東西呢……"
104090-152 = "並不奇怪。做出與角色性格有所反差的動作，趁機攻擊敵人的破綻──#n換言之，這是戰術的一種。"
104090-153 = "……本人不介意的話倒是無所謂。"
104090-154 = "……莉央會長依然處於失蹤狀態，所以我目前正在絕讚求職中。"
104090-155 = "季最近總是在四處露臉呢……接下來是要去C&C的部室嗎？"
104090-156 = "……不，C&C的前輩們似乎很忙碌，在那之後就沒見到了。"
104090-157 = "原來如此，也就是說現在是無職狀態對吧。#n不介意的話，要不要一起組隊呀？"
104090-159 = "咦！？"
104090-160 = "愛，愛麗絲醬……"
104090-164 = "感謝你的邀請。不過現在我有其他任務在身……"
104090-166 = "下次有機會的話，還請務必讓我加入。"
104090-172 = "哎呀，這不是愛麗絲嗎？"
104090-173 = "你好，陽葵前輩。"
104090-174 = "有個東西想請你看看，於是就過來打擾了！"
104090-175 = "請看這個……！"
104090-179 = "遊戲機……？"
104090-181 = "……呼呣。原來如此。"
104090-182 = "怎麼樣呢？"
104090-183 = "和Kei醬有關係嗎……？"
104090-184 = "……"
104090-185 = "這個嘛……我並非研究「無名之神」的專家，所以也不敢保證……"
104090-186 = "但如果自然而然地出現了這樣的資料……已經足以被稱為「特異現象」了吧。"
104090-187 = "不過，就算這是「Kei」……以目前的狀態來看，想要證明這一點有點困難。"
104090-188 = "這，這樣啊……"
104090-189 = "是的。數據量僅有2KB……就算分析至位元單位……#n這究竟是什麼資料，我也難以做出結論。"
104090-190 = "除非那方面的專家，例如某個膽小鬼回來──"
104090-191 = "這樣啊……還是，什麼也沒搞懂呢……"
104090-193 = "要是這是Kei就好了，愛麗絲是這麼想的……#n這樣一來……這樣一來，愛麗絲就……"
104090-194 = "愛麗絲……"
104090-195 = "愛麗絲醬……"
104090-200 = "哎呀……那個是……？"
104090-201 = "這是……愛麗絲想著Kei製作出來的。"
104090-202 = "原來如此……做的真棒呢。"
104090-203 = "……"
104090-204 = "這個機器人，可以讓我稍微改造一下嗎？"
104090-205 = "改造……是嗎？"
104090-206 = "雖然說是改造，其實只是加上USB儲存的功能而已……這樣一來，或許……"
104090-207 = "啊……把Kei醬的資料放進這裡面……？"
104090-208 = "哇，真是天才！！在愛麗絲想著Kei製作出來的機器人裡……"
104090-209 = "放進這個資料的話……！"
104090-210 = "……！！"
104090-211 = "沒錯，我可是超天才病弱美少女。雖然我並不認為會因此引發特異現象……"
104090-212 = "嗯……就只是，加入了某人的心意……這種程度而已吧。"
104090-214 = "……是！！即使這樣也沒關係！"
104090-215 = "呵呵……我很擅長改造的，放心交給我吧。#n畢竟我可是「天才」呀。"
104090-216 = "順帶一提，季的動力裝甲也是我改造的唷。#n因為那個女人的品味實在有點微妙──"
104090-220 = "我看看……剛買來的硬碟……然後，再幫你加上鑰匙圈的功能吧。"
104090-223 = "好，完成了。"
104090-224 = "……！！"
104090-225 = "謝謝你，陽葵前輩。"
104090-226 = "太好了呢，愛麗絲。"
104090-227 = "嗯……愛麗絲醬，太好了。"
104090-228 = "把，把它掛好吧，小心別弄丟了……！"
104090-230 = "是！"
104090-235 = "下一話;尾聲（２）"

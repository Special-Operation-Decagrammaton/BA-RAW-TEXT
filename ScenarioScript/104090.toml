104090-80 = "เอ๋? อาริสึจัง ทำอะไรอยู่เหรอ?"
104090-81 = "ต่อกันพลาเหรอ?"
104090-85 = "ไม่ใช่ค่ะ นี่ไม่ใช่กันพลา...... "
104090-90 = "หืม? แล้วมันอะไรเหรอ? หุ่นยนต์เหรอ.......?"
104090-91 = "...... ค่ะ นี่น่าจะเป็น...... <เคย์> ค่ะ"

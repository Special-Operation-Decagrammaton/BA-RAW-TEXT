104090-93 = "เด็กคนนั้น...... หายไปแล้วตั้งแต่ตอนนั้น......"
104090-94 = "...... ใช่ค่ะ ตอนนั้นเคย์หายตัวไป...... และหลังจากนั้นอาริสึก็ไม่ได้เจอเธออีกเลยค่ะ "
104090-95 = "แต่ตอนนั้น...... ตอนที่เคย์หายไป...... อาริสึรู้สึกว่าอาริสึเห็นหุ่นยนต์หน้าตาแบบนี้อยู่เดี๋ยวหนึ่งน่ะค่ะ"
104090-97 = "อาริสึก็เลยมาสร้างหุ่นแบบนี้ ก่อนที่ความทรงจำจะหายไปค่ะ"
104090-98 = "อืม......"
104090-99 = "อาริสึจัง......"
104090-100 = "สุดท้ายแล้ว... เคย์ก็ช่วยพวกเราเอาไว้ใช่ไหม? บะ... บางที... เคย์อาจจะได้เป็นสหายกับพวกเราก็ได้..."
104090-101 = "...... ใช่ค่ะ ถ้าได้เจอกันใหม่ครั้งหน้า...... อาริสึจะไปขอให้เคย์เป็นสหายของพวกเราค่ะ"
104090-102 = "......."
104090-108 = "เอ๋? สมัครแข่งขันออนไลน์งั้นเหรอ? "
104090-112 = "...... หืม? นี่มันอะไรเนี่ย?"
104090-113 = "ทำไมเหรอพี่?"
104090-114 = "...... ในเมมโมรีมีไฟล์แบ็กอัปที่ไม่เคยเห็นมาก่อนน่ะสิ"
104090-115 = "มันมีอยู่แล้ว แต่พี่ลืมไปเองหรือเปล่า?"
104090-116 = "พูดอะไรของเธอ! ใครจะไปลืมไฟล์แบ็กอัปได้กันเล่า? แถมนี่เป็นชื่อที่เพิ่งเคยเห็นด้วย"

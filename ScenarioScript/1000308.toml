[translation]
1000308-1 = "A Casual Outing"
1000308-2 = "Trinity General School Gates"
1000308-3 = "I was really looking forward to today..."
1000308-4 = "If only the others didn't have something come up at the last minute..."
1000308-5 = "What am I supposed to do after school now?"
1000308-7 = "Is that you, Sensei? What brings you to Trinity?"
1000308-8 = "[s] \"I had some business to take care of, but I'm going on a walk now that I'm free.\""
1000308-9 = "Oh, okay. This is a happy coincidence!"
1000308-10 = "My friends and I were going to meet up here today so we could hang out..."
1000308-11 = "...but they all had to cancel because something important came up. Now it's just me. Heehee."
1000308-12 = "I've been at a loss on how to spend my day now..."
1000308-13 = "So what do you say, Sensei? If you're not busy, would you want to hang out?"
1000308-14 = "I'd be fine with just joining you on your walk... Please?"
1000308-15 = "[s] \"You're on.\""
1000308-16 = "Wow! Thank you, Sensei!"
1000308-19 = "Then, let's be off! I'll lead the way!"
1000308-22 = "― Where should we go now? Over there?[wa:2480] "
1000308-24 = "― Oh, what about that spot?[wa:2440] "
1000308-27 = "― Sure, I'll go anywhere as long as I'm with you![wa:2580] "
1000308-30 = "― Sensei, look over there! And there, there too![wa:5290] "
1000308-33 = "― I've been down this street so many times before. Why does everything look different now?[wa:1060] "
1000308-36 = "― Hmm? How long are you just gonna sit there?[wa:120] "
1000308-38 = "― All right! Let's go walk around some more![wa:10] "
1000308-41 = "― Huh? You like the scenery better from that angle?[wa:10] "
1000308-44 = "Whew. I had so much fun!"
1000308-45 = "I didn't have any hopes for today after the others canceled on me..."
1000308-46 = "Spending time with you made today better than it ever could have been!"
1000308-47 = "N-Not that I'm happy my friends canceled or anything."
1000308-48 = "Hey, Sensei? Can we go somewhere new next time?"
1000308-49 = "Don't be silly. Of course I'm not nervous about going somewhere new."
1000308-50 = "I'll have a good time anywhere as long as I'm with you!"

[translation]
1000308-1 = "偶然的外出"
1000308-2 = "三一綜合學園前．校門"
1000308-3 = "難得有外出的機會，我還很期待的……"
1000308-4 = "大家都突然說臨時有約，那也沒辦法……"
1000308-5 = "呼。那就先不管了。突然空下來的放學後的時間，該做什麼好呢……？"
1000308-7 = "咦，老師？為什麼到三一來了？"
1000308-8 = "[s] 「來這裡出差，因為還剩一點空閒時間，所以在散步。」"
1000308-9 = "這，這樣啊。真巧呢！"
1000308-10 = "我本來放學後也要跟朋友一起玩的……"
1000308-11 = "大家都突然想起臨時有約，所以一個人被丟下了，嘿嘿。"
1000308-12 = "所以正在煩惱接下來要做什麼呢……"
1000308-13 = "啊，對了！沒錯！要是老師也有空的話，可以陪我一下嗎？"
1000308-14 = "就算只是兩個人一起輕鬆散步也沒關係的……拜託了。"
1000308-15 = "[s] 「可以唷。」"
1000308-16 = "哇！謝謝你，老師！"
1000308-19 = "那我們趕快走吧！我帶老師參觀這附近！"
1000308-22 = "― 接下來要去哪裡呢？那邊？[wa:3400] "
1000308-24 = "― 嗯～～這樣的話去那裡怎麼樣呢？[wa:2840] "
1000308-27 = "― 是的，去哪裡都可以。只要能跟老師一起的話！[wa:3620] "
1000308-30 = "― 老師，請看那裡！那裡也，啊，還有這裡！[wa:6370] "
1000308-33 = "― 明明是平時看習慣的街道，為什麼變得這麼不一樣呢？[wa:3620] "
1000308-36 = "― 嗯？要在這裡休息到什麼時候呢？[wa:1240] "
1000308-38 = "― 來吧！再一起到處走走吧！[wa:1160] "
1000308-41 = "― 什麼？你說從那個角度看的景色很不錯嗎？[wa:1120] "
1000308-44 = "呵呵，今天好開心啊！"
1000308-45 = "突然被爽約的時候，還在煩惱該怎麼辦呢……"
1000308-46 = "最後能和老師一起度過快樂的時光，也算是因禍得福呢！"
1000308-47 = "當，當然，也不是說被爽約太好了的意思喔……！"
1000308-48 = "那個……老師。下次要不要事先約好，出門去更遠的地方呢？"
1000308-49 = "你說去不熟的地方可能會很累……是嗎？沒問題的！"
1000308-50 = "只要跟老師再一起的話，不管是哪裡，一定都會很開心的。"

[translation]
1000308-1 = "#title;우연한 외출"
1000308-2 = "#place;트리니티 학원 앞 교문"
1000308-3 = "3;히후미;01;모처럼의 외출이라 기대했었는데…….\n#3;a"
1000308-4 = "3;히후미;99;갑자기 다들 급한 약속이 생길 줄이야…….\n#3;em;[속상함]\n#3;stiff"
1000308-5 = "3;히후미;01;그나저나 갑작스럽게 비어 버린 이 방과 후 시간에는 무얼 하며 보내야 할까요?\n#3;m2"
1000308-6 = "3;히후미;02\n#3;em;[반응]\n#3;h\n#wait;1500"
1000308-7 = "3;히후미;00;어라, 선생님? 트리니티 학원에는 무슨 일이신가요?\n#3;m3\n#3;hophop"
1000308-8 = "[s] \"출장을 왔다가 시간이 남아서 산책을 하고 있었어.\""
1000308-9 = "3;히후미;03;아하, 그렇군요. 우연이네요!\n#3;em;[!]\n#3;greeting"
1000308-10 = "3;히후미;02;저도 오늘 방과 후에는 친구들과 이 근처에서 놀기로 했었는데……."
1000308-11 = "3;히후미;04;우연치 않게 다들 급한 약속이 생겨버려서, 혼자 남겨지고 말았네요. 헤헤.\n#3;em;[땀]"
1000308-12 = "3;히후미;99;그래서 지금부터 무얼 할지 고민하고 있었던 터라……."
1000308-13 = "3;히후미;00;아, 맞다! 그렇네요! 선생님께서도 시간이 남으신다면, 함께 어울려 주시지 않으시겠어요?\n#3;hophop\n#3;em;[반응]"
1000308-14 = "3;히후미;01;가볍게 단 둘이 산책을 하기만 해도 괜찮으니까…… 부탁이에요."
1000308-15 = "[s] \"좋아.\""
1000308-16 = "3;히후미;00;와아! 감사합니다, 선생님!\n#3;greeting\n#3;em;[반짝]"
1000308-17 = "3;히후미;00\n#3;d\n#wait;1500"
1000308-18 = "3;히후미;01\n#3;a\n#3;closeup\n#wait;1000"
1000308-19 = "3;히후미;03;그럼 서두르죠! 제가 안내해 드릴게요!\n#3;closeup\n#3;em;[음표]"
1000308-20 = "#all;hide"
1000308-21 = "#wait;4667"
1000308-22 = "#st;[-1200,-530];serial;60;― 이제 또 어딜 가볼까요? [wa:3200]저기?"
1000308-23 = "#wait;1000"
1000308-24 = "#st;[-1200,-630];serial;60;― 응, [wa:3000]저쪽은 어때요?"
1000308-25 = "#wait;3500"
1000308-26 = "#clearST"
1000308-27 = "#st;[-1200,-530];serial;60;― 응, [wa:1000]어디든 괜찮아요. [wa:2500]선생님과 함께니까-!"
1000308-28 = "#wait;4000"
1000308-29 = "#clearST"
1000308-30 = "#st;[-1200,-530];serial;60;― 선생님, [wa:1000]저기 좀 보세요! [wa:3000]저기, [wa:1250]앗, [wa:800]저기도요!"
1000308-31 = "#wait;3000"
1000308-32 = "#clearST"
1000308-33 = "#st;[-1200,-530];serial;60;― 늘 보던 거리였는데도 [wa:3500]왜 이렇게 새롭게 보일까요?"
1000308-34 = "#wait;5500"
1000308-35 = "#clearST"
1000308-36 = "#st;[-1200,-530];serial;60;― 으응? [wa:1000]언제까지 거기 앉아계실 거예요?"
1000308-37 = "#wait;3000"
1000308-38 = "#st;[-1200,-630];serial;60;― 자! [wa:800]좀 더 여기저기 보러 돌아다녀요!"
1000308-39 = "#wait;4200"
1000308-40 = "#clearST"
1000308-41 = "#st;[-1200,-530];serial;60;― 네? [wa:1000]그 각도에서 보는 풍경이 좋다고요?"
1000308-42 = "#wait;6000"
1000308-43 = "#clearST\n3;히후미;00\n#3;h"
1000308-44 = "3;히후미;03;하아, 오늘은 즐거웠어요!\n#3;em;[음표]"
1000308-45 = "3;히후미;99;약속이 취소되었을 때는 무얼 해야 하나 정말 막막했었는데……."
1000308-46 = "3;히후미;03;덕분에 선생님과 함께 즐거운 시간을 보낼 수 있었으니, 오히려 이득을 본 기분이네요!\n#3;greeting\n#3;em;[반짝]"
1000308-47 = "3;히후미;04;무, 물론 그렇다고 해서 약속이 취소된 게 기쁘다는 뜻은 아니에요!\n#3;stiff"
1000308-48 = "3;히후미;01;저…… 선생님. 다음번에는 미리 약속을 잡고 더 멀리— 나가보지 않으시겠어요?\n#3;em;[///]"
1000308-49 = "3;히후미;00;잘 모르는 곳은 부담스럽지 않냐고요? 괜찮아요!"
1000308-50 = "3;히후미;03;선생님과 함께라면, 어디든 즐거울 테니까.\n#3;em;[하트]\n#3;hophop"

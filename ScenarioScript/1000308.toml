[translation]
1000308-1 = "ออกไปข้างนอกโดยบังเอิญ"
1000308-2 = "หน้าประตูใหญ่ สถาบันทรีนิตี้"
1000308-3 = "ฉันตั้งหน้าตั้งตารอที่จะได้ไปเที่ยวอยู่เลย..."
1000308-4 = "แต่จู่ๆ เพื่อนๆ ก็มีธุระกะทันหันกันหมด..."
1000308-5 = "แล้วหลังเลิกเรียนฉันจะทำอะไรดีล่ะ?"
1000308-7 = "เอ๊ะ คุณครู? มาทำอะไรที่สถาบันทรีนิตี้เหรอคะ?"
1000308-8 = "[s] \"ครูมาธุระแถวนี้น่ะ พอดีมีเวลาเหลือเลยออกมาเดินเล่น\""
1000308-9 = "อ่อ อย่างนั้นเหรอคะ บังเอิญจังเลยนะคะ!"
1000308-10 = "ที่จริงวันนี้หลังเลิกเรียนฉันก็มีนัดกับเพื่อนๆ เหมือนกัน..."
1000308-11 = "แต่โชคไม่ดีที่ต้องยกเลิกนัดกะทันหัน ตอนนี้เลยแกร่วอยู่คนเดียวค่ะ แหะๆ"
1000308-12 = "ตอนนี้เลยกำลังคิดอยู่ว่าจะทำอะไรดี..."
1000308-13 = "อ๊ะ จริงสิ! ถ้าคุณครูมีเวลา เราไปเดินเล่นด้วยกันดีมั้ยคะ?"
1000308-14 = "เราไปเดินเล่นสบายๆ ด้วยกันได้มั้ยคะ...?"
1000308-15 = "[s] \"ก็ได้\""
1000308-16 = "ว้าว! ขอบคุณค่ะคุณครู!"
1000308-19 = "ถ้างั้นเราไปกันเถอะค่ะ! ฉันจะนำทางเองค่ะ!"
1000308-22 = "― ตอนนี้จะไปที่ไหนกันต่อดีคะ? ไปทางนั้นดีมั้ยคะ?[wa:2040] "
1000308-24 = "― อื้อ ไปที่นั่นกันดีมั้ยคะ?[wa:2400] "
1000308-27 = "― อื้ม ไปที่ไหนก็ได้ค่ะ ถ้าได้ไปกับคุณครู![wa:2860] "
1000308-30 = "― คุณครูคะ ดูตรงนั้นสิคะ! ตรงนั้นค่ะ อ๊ะ แล้วก็ตรงนั้นค่ะ![wa:4890] "
1000308-33 = "― ฉันเคยมาแถวนี้หลายครั้งแล้ว แต่ไม่รู้ว่าทำไมวันนี้ถึงดูต่างไปจากทุกๆ ครั้งกันนะ?[wa:1380] "
1000308-36 = "― หืม? คุณครูมานั่งอยู่ตรงนี้ตั้งแต่เมื่อไหร่เหรอคะ?[wa:10] "
1000308-38 = "― เอาล่ะ! ไปเดินดูรอบๆ กันดีกว่าค่ะ![wa:280] "
1000308-41 = "― คะ? วิวตรงนั้นสวยดีงั้นเหรอคะ?[wa:680] "
1000308-44 = "อ่า วันนี้สนุกมากเลยค่ะ!"
1000308-45 = "ตอนที่เพื่อนๆ ยกเลิกนัด ฉันไม่รู้เลยว่าจะทำอะไรต่อดี..."
1000308-46 = "ขอบคุณคุณครูมากนะคะที่มาเดินเล่นกับฉันแบบนี้ ตอนนี้ฉันรู้สึกสนุกมากเลยค่ะ!"
1000308-47 = "มะ...ไม่ได้หมายความว่าฉันดีใจที่เพื่อนๆ ยกเลิกนัดหรอกนะคะ"
1000308-48 = "คือ...คุณครูคะ คราวหน้าเรานัดกันไปเที่ยวที่ไหนไกลๆ... ด้วยกันมั้ยคะ?"
1000308-49 = "ฉันจะกังวลรึเปล่าเวลาที่ไปในที่ที่ไม่คุ้นเคยน่ะเหรอคะ? ไม่เป็นไรค่ะ!"
1000308-50 = "ถ้าไปกับคุณครูล่ะก็ไปได้ทุกที่เลยค่ะ"

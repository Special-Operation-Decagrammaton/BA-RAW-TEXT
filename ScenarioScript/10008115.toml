[translation]
10008115-7 = "（於是，在與黑龜組激戰之後……）"
10008115-8 = "唔，想不到，居然會在這種地方……！"
10008115-15 = "贏，贏了！！"
10008115-16 = "亞，亞瑠大人！不愧是您！"
10008115-17 = "呼……"
10008115-18 = "終於結束了啊。"
10008115-25 = "啊，發現賽錢箱了～！"
10008115-26 = "[s]「大家辛苦了。」"
10008115-27 = "唔嘿～辛苦了。#n老師、便利屋和大家都辛苦了～"
10008115-28 = "是，辛苦大家了！"
10008115-29 = "這樣總算是結束了……"
10008115-33 = "賽錢箱……"
10008115-34 = "白子醬，雖然可惜但不可以唷？#n這是必須歸還的物品哦？"
10008115-35 = "……我知道。"
10008115-36 = "……白子前輩，既然知道就麻煩把視線從賽錢箱移開。"
10008115-38 = "那麼事件似乎也結束了，我們回去吧？"
10008115-39 = "啊，茜香醬打工也辛苦囉～"
10008115-40 = "老師，下次見！"
10008115-41 = "[s]「嗯，大家路上小心。」"
10008115-47 = "那麼，把賽錢箱放到原來的位置上吧。"
10008115-48 = "說，說的也是！？那才是我們的目的！？那當然……！"
10008115-49 = "亞瑠醬，你破音了唷？#n該不會是事到如今突然覺得可惜？"
10008115-50 = "呵呵，你在說什麼。"
10008115-51 = "我怎麼可能會那麼想──"
10008115-59 = "啊，賽，賽錢箱的鎖頭……！？"
10008115-60 = "咦，怎麼會……？#n難道是因為騷動期間累積的損傷……之類的？"
10008115-64 = "咦，賽錢箱裡面……"
10008115-65 = "[s]「……是空的？」"
10008115-67 = "……咦？"
10008115-68 = "啊哈哈？什麼什麼，怎麼回事？"
10008115-69 = "咦咦咦────！？#n為，為什麼！？為什麼裡面是空的！？"
10008115-73 = "[ns]「這個聲音，難道是……！？」"
10008115-75 = "喝啊！！"
10008115-81 = "正義的英雄「凱坦澤」……在此登場！！"
10008115-86 = "……啊？"

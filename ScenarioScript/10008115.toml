[translation]
10008115-7 = "After our fierce battle with the Kurokame Gang..."
10008115-8 = "Th-This can't be! How could we lose?!"
10008115-15 = "W-We won!"
10008115-16 = "That was incredible, Aru!"
10008115-17 = "*sigh*"
10008115-18 = "It's finally over."

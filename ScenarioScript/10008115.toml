10008115-26 = "[s] \"Great work, everyone.\""
10008115-27 = "Phew. I'm beat. Nice work, everyone."
10008115-28 = "Seconded! You all were fantastic!"
10008115-29 = "The panic is finally over too."
10008115-33 = "About the offering box..."
10008115-34 = "Don't even think about it, Shiroko. Everything needs to go back to its rightful owners."

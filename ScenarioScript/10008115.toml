[translation]
10008115-7 = "(ในตอนที่การต่อสู้กับแก๊งคุโรคาเมะใกล้จะจบลง)"
10008115-8 = "อะ...อึก! พะ...พวกเราแพ้งั้นเหรอ...!"
10008115-15 = "ชะ...ชนะแล้ว!!"
10008115-16 = "ทะ...ท่านอารุ...! สุดยอดมากเลยค่ะ!"
10008115-17 = "เฮ้อ..."
10008115-18 = "จบสักทีนะ"
10008115-25 = "อ๊ะ เจอตู้บริจาคแล้วละ~!"
10008115-26 = "[s] \"เยี่ยมมากเลยทุกคน\""
10008115-27 = "อื้ม~ คุณครูเองก็ยอดมากเลย~ แล้วก็พวกหน่วยรับจ้างสารพัดด้วย เก่งมากๆ~"
10008115-28 = "ทุกคนยอดเยี่ยมมากเลยค่ะ!"
10008115-29 = "เท่านี้เรื่องวุ่นวายก็น่าจะจบลงแล้วนะ..."
10008115-33 = "...ตู้บริจาค..."
10008115-34 = "ชิโรโกะจัง~ น่าเสียดายแต่ไม่ได้น้า~ อันนี้ต้องเอาไปคืนนะคะ"
10008115-35 = "รู้แล้วละน่า"
10008115-36 = "รุ่นพี่ชิโรโกะ บอกว่าห้ามยุ่งกับตู้บริจาคไงล่ะคะ?!"
10008115-38 = "สถานการณ์ก็คลี่คลายแล้ว พวกเรากลับกันเลยมั้ย?"
10008115-39 = "เซริกะจังก็จัดการงานให้เสร็จล่ะ~"
10008115-40 = "คุณครูคะ ถ้างั้นพวกเราขอตัวก่อนนะคะ!"
10008115-41 = "[s] \"อื้อ กลับดีๆ นะ\""
10008115-47 = "เอาละ ถ้างั้นก็เอาตู้บริจาคไปคืนที่เดิมกันเถอะ"
10008115-48 = "ฮึ่ม! ใช่แล้ว! เพราะมันคือจุดประสงค์ของพวกเรา! อื้อ! ใช่แล้วล่ะ!"
10008115-49 = "อารุจัง~ เพิ่งมารู้สึกเสียดายเอาตอนนี้เหรอ?"
10008115-50 = "ฮุฮุ มุสึกิ ฉันไม่ใช่คนแบบนั้นสักหน่อย"
10008115-51 = "ถ้าสัญญาอะไรไว้ตั้งแต่แรก..."
10008115-59 = "นะ...นั่น! กุญแจตู้บริจาค...!"
10008115-60 = "หืม? ระ...หรือว่ากุญแจมันพังไปในตอนที่ตะลุมบอนกับพวกนั้น..."
10008115-64 = "เดี๋ยวนะ... แล้วเงิน...ในตู้บริจาคล่ะ?"
10008115-65 = "[s] \"ไม่มีอะไรอยู่ในนี้เลย...?\""
10008115-67 = "ไม่มีเงินอยู่ข้างในเลยเหรอ?"
10008115-68 = "ฮะฮะฮะ อะไรกัน?"
10008115-69 = "อะไรกันเนี่ยยย?!"
10008115-73 = "[ns] \"อ๊ะ เสียงนี้มัน?!\""
10008115-75 = "ย้าาาา!!"
10008115-81 = "ฮีโร่แห่งความยุติธรรม ไคเทนเจอร์... มาแล้วววว!!"
10008115-86 = "หา...?"

[translation]
12150-1 = "ตอนที่ 15;สงครามปิดล้อมอะบิดอส 2"
12150-3 = "อึกกก!!"
12150-4 = "นี่พวกแก! เป็นสุนัขที่เลี้ยงไว้แท้ๆ กล้าดียังไงถึงได้หันมาแว้งกัดเจ้าของ!"
12150-6 = "หนวกหูน่า!! แล้วมันเกี่ยวอะไรด้วยกันเล่า! ฉันอยากจับมือกับคุณครูมากกว่าพวกแกอีก!"
12150-7 = "อะฮ่าฮ่าฮ่า! หักหลังผู้ว่าจ้าง นี่แหละวายร้ายตัวจริง! คาดไม่ถึงเลยล่ะสิ?"
12150-9 = "หน่วยรับจ้างสารพัด...\n"
12150-10 = "ใช่ พูดถูกแล้วละ "
12150-11 = "...ใช่ค่ะ ฉันได้สติขึ้นมาแล้ว ตอนนี้เราไม่มีเวลามาลังเลกันนะคะ\n"
12150-12 = "ใช่! เรายังมีรุ่นพี่โฮชิโนะอยู่นะ! เราต้องช่วยรุ่นพี่โฮชิโนะกลับมา!"
12150-13 = "ฉันไม่สนใจการอนุมัติชมรมอะไรแล้ว! ถึงเราจะต้องเป็นพวกกลุ่มผิดกฎหมายก็เถอะ แต่ถ้าไม่ไปช่วยรุ่นพี่โฮชิโนะละก็..."
12150-15 = "ไม่ต้องคิดถึงเรื่องอื่น ตอนนี้สิ่งที่สำคัญที่สุดคือการช่วยรุ่นพี่โฮชิโนะ\n"
12150-16 = "นี่พวกแก!! ต่อต้านไปแล้วจะได้อะไรกลับมางั้นเรอะ! กล้าดียังไง...!"
12150-17 = "[s] \"พวกแกจับตัวนักเรียนคนสำคัญของฉันไป\""
12150-18 = "!!\n"
12150-19 = "[s] \"คงต้องขอตัวโฮชิโนะจังคืนมาแล้วละ\""
12150-20 = "อย่ามาตลกน่า! พวกแกมีสิทธิ์อะไรงั้นเหรอ..."

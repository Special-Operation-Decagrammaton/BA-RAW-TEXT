[translation]
12150-1 = "第15話;阿拜多斯攻防戰（２）"
12150-3 = "咕啊啊啊──！？"
12150-4 = "你們這些傢伙，不過是我養的狗竟敢……！"
12150-6 = "少，少囉嗦！！那種事我才不管！和老師合作比跟你容易多了，懂了嗎？"
12150-7 = "啊哈哈哈～背刺雇主對真正的惡人來說是理所當然的吧！連這種事都預料不到嗎？"
12150-9 = "便利屋的大家……"
12150-10 = "嗯，說的沒錯。"
12150-11 = "……多虧你們讓我清醒過來了。#n我們現在沒有時間猶豫。"
12150-12 = "沒錯！得把星野前輩搶回來才行！！"
12150-13 = "正不正式什麼的根本無所謂！就算我們是非法組織也要把星野前輩救回來！"
12150-15 = "救出星野前輩──現在重要的就只有這個。"
12150-16 = "你們這些傢伙──！#n這種無謂的抵抗又有什麼意義……！竟敢……！！"
12150-17 = "[s] 「……你們竟敢誘拐我重要的學生。」"
12150-18 = "！！"
12150-19 = "[s] 「該把星野還給我了。」"
12150-20 = "開什麼玩笑！老師，你根本沒有那種權力──"

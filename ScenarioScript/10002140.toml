[translation]
10002140-1 = "ย้อนวันวาน;ความฝันที่แตกต่าง"
10002140-3 = "Q: รู้สึกยังไงที่ได้สร้างปราสาททรายครั้งแรก?"
10002140-9 = "อ่า..."
10002140-10 = "อืม... คะ...? "
10002140-11 = "คือ... คุณครู..."
10002140-12 = "ขะ...ขอถามได้ไหมคะว่าคุณครู...กะ...กำลังทำอะไร...?"
10002140-13 = "...คะ? สัมภาษณ์...เหรอคะ? "
10002140-14 = "ปะ...เปล่าค่ะ ถะ...ถ้าคุณครูพูดแบบนี้ล่ะก็... สะ...แสดงว่าคุณครูมีไอเดียดีๆ#nอะ...อะไรอยู่ใช่ไหมล่ะคะ"
10002140-15 = "อืม... เมื่อกี้นี้คุณครูถามอะไรนะ..."
10002140-16 = "ใช่แล้ว ปราสาททราย..."
10002140-17 = "อืม..."
10002140-18 = "มะ... มันสนุกมากเลยค่ะ... นักเรียนคนที่ทำตัวอย่างให้ดู... ก็ทำตัวอย่างให้ดูได้ยอดเยี่ยมเลยค่ะ"
10002140-19 = "ฉันพยายามทำตามที่เธอทำให้ดูแบบสุดฝีมือแล้ว... ตะ...แต่ก็ทำออกมาได้ไม่ดีเท่าไหร่..."
10002140-20 = "อืม..."
10002140-21 = "ถะ...ถ้าคราวหน้ามีโอกาสอีกล่ะก็ ฉันก็อยากจะลองทำอีกค่ะ แต่ว่า... มันจะมีคราวหน้าอีกไหมนะ"
10002140-22 = "[s] \"ถ้ามีโอกาสก็อยากลองทำอีกงั้นเหรอ?\""
10002140-23 = "...! จะ...จะมีโอกาสอีกไหมคะ?"
10002140-24 = "ฉะ...ฉันอยากลองทำอีกค่ะ ถะ...ถ้ามีโอกาสก็อยากไปสร้างปราสาททรายอีกค่ะ...!!"
10002140-25 = "ฮี่... ฮี่ๆ... ปราสาททราย... คิกๆๆๆ..."
10002140-26 = "กร๊ากๆๆๆ...!"
10002140-29 = "Q: คิดยังไงกับเรื่องที่บอกเมื่อกี้เหรอ?"
10002140-35 = "...เอ๋?"
10002140-36 = "ฉะ.. ฉันเหรอคะ?"
10002140-37 = "อ๋อ... เรื่องปราสาททรายเหรอคะ?"
10002140-38 = "อ่ะฮะฮะฮะ..."
10002140-39 = "อ่า... นั่นสิคะ... คือ..."
10002140-40 = "ฉันอยากไป... ไปกับ..."
10002140-41 = "คือว่า... อา... อ่ะฮะฮะฮะฮะฮะ..."
10002140-43 = "อ่ะฮ่ะฮ่ะ ฮ่าฮ่าฮ่าฮ่า!!!"
10002140-45 = "(ผู้ถูกสัมภาษณ์เริ่มมีอารมณ์อ่อนไหว ดังนั้นเลยต้องหยุดการสัมภาษณ์แต่เพียงเท่านี้)"

[translation]
2004205-1 = "ความสนุกของการตั้งแคมป์"
2004205-2 = "ที่ตั้งแคมป์ใกล้ๆ มิลเลเนียม"
2004205-6 = "ฮู่ว เท่านี้ก็น่าจะกางเต็นท์เสร็จแล้ว..."
2004205-7 = "ทีนี้ก็น่าจะเหลือแค่การสนุกไปกับการตั้งแคมป์แบบชิลๆ แล้วละ!"
2004205-8 = "ขอบคุณที่ช่วยนะ คุณครู ฉันยังไม่ถนัดเรื่องการทำกิจกรรมกลางแจ้งแบบนี้สักทีเลย..."
2004205-9 = "[s] \"ไม่เป็นไร ไม่ใช่เรื่องใหญ่อะไรหรอก\""
2004205-11 = "[ns] \"แล้วต้องทำยังไงเหรอถึงจะได้ไอเทมจากเกมที่ว่า?\""
2004205-12 = "ก่อนอื่นเลยนะ <อีกานอนไม่หลับ> ที่เป็นมอนสเตอร์พิเศษที่จะแจกครั้งนี้จะหนีไปหลับตอนกลางวัน ก็เลยออกมาให้จับได้แต่ช่วงเย็นๆ เท่านั้นน่ะ"
2004205-13 = "ตามข้อมูลจากชุมชนออนไลน์แล้ว ถ้าเราเปิดระบบสื่อสารไว้ในสถานที่ที่กำหนดตอนประมาณหนึ่งทุ่ม มันก็จะ..."
2004205-14 = "[s] \"หนึ่งทุ่มเหรอ? แต่ตอนนี้เพิ่งจะบ่ายสองเองนะ?\""
2004205-15 = "ฉันก็เลยชวนมาตั้งแคมป์ก่อนล่วงหน้าไง!"
2004205-16 = "ที่ตั้งแคมป์นี้อยู่ตรงเชิงเขาที่ชัน ถ้าจะขึ้นมาให้ถึงประมาณหนึ่งทุ่ม ทางก็จะมืดจนอันตราย"
2004205-17 = "ฉันก็เลยมาจับจองที่ตรงนี้ไว้ล่วงหน้าแล้วก็รอก่อน ไว้ถึงเวลาแล้วค่อยไปจับ <อีกานอนไม่หลับ> ยังไงล่ะ"
2004205-18 = "ฮุฮุ เป็นยังไงล่ะ? เป็นแผนการที่สมบูรณ์แบบเลยใช่มั้ย?"
2004205-19 = "[s1] \"มันก็ไม่ได้แย่เท่าไรหรอกนะ แต่เราเหลือเวลาเยอะเลย...\"\n[s2] \"ก็ใช่อยู่หรอก แต่ระหว่างนี้เราจะทำอะไรล่ะ?\""
2004205-22 = "ไม่ต้องกังวลหรอก ขอแค่มีโทรศัพท์มือถือ ก็หาอะไรทำได้ง่ายๆ แล้ว"
2004205-23 = "ไหนดูซิ เรามาดูหนังที่ฉันโหลดไว้ในโทรศัพท์แล้วรอให้ถึงหนึ่งทุ่มดีมั้ย?"
2004205-28 = "เอ๋? แบตเตอรี่ไม่พอ?!"
2004205-29 = "แปลกจัง... เมื่อวานฉันชาร์จแบตไว้แล้วนี่"
2004205-30 = "หรือว่าเสียบสายชาร์จแล้วแต่ไฟไม่เข้า? ตอนนี้เหลือแบตเตอรี่แค่ห้าเปอร์เซ็นต์เอง..."
2004205-34 = "คะ... คุณครู มีที่ชาร์จแบตหรือแบตเตอรี่สำรองมาบ้างหรือเปล่า?"
2004205-35 = "[s] \"ครูก็ไม่ได้เอาแบตเตอรี่สำรองมาเหมือนกัน...\""
2004205-39 = "ไม่นะ ฉันทำผิดพลาดอย่างไม่น่าให้อภัยในวันที่สำคัญแบบนี้เหรอเนี่ย"
2004205-40 = "ถ้าปิดโทรศัพท์ไว้ตอนนี้แล้วเปิดอีกทีตอนใกล้ๆ หนึ่งทุ่มก็น่าจะได้ไอเทมอยู่หรอก แต่ว่า..."
2004205-41 = "ถ้าไม่มีโทรศัพท์มือถือ แล้วฉันจะทำอะไรระหว่างนั้นดีล่ะ!"
2004205-42 = "[s3] \"ลองเก็บมือถือแล้วดื่มด่ำกับธรรมชาติดูมั้ย?\"\n[s4] \"มาวาดรูปกันมั้ยล่ะ?\""
2004205-45 = "ไม่อะ... วันนี้ฉันคิดจะมาเล่นเกมให้เต็มที่ ฉันไม่มีแรงบันดาลใจทำอะไรอื่นหรอก"
2004205-46 = "อึก งั้นก็ช่วยไม่ได้"
2004205-47 = "ตอนนี้ฉันคงไม่มีทางเลือกอื่นนอกจากนั่งสมาธิแบบที่รุ่นพี่จิฮิโระชอบทำ..."
2004205-49 = "(อีกสักครู่ต่อมา)"
2004205-51 = "เบื่อ~ จัง~ เลย~"
2004205-52 = "คุณครู ฉันเบื่อ~ ทำไมทำสมาธิมันน่าเบื่อแบบนี้ล่ะ~"
2004205-53 = "ฉันนั่งมองตรงหน้าอยู่ตั้งนาน แต่เวลาเพิ่งผ่านไปแค่สิบนาทีเอง ไม่อยากจะเชื่อเลย!"
2004205-54 = "ไม่มีอะไรสนุกๆ ให้ทำเลยเหรอ? ถ้าให้ทำสมาธิแบบนี้ต่อไป ฉันคงเบื่อตายแน่~"
2004205-55 = "[s] \"แต่ว่าครูเอามาแต่หนังสือเนี่ยน่ะสิ\""
2004205-57 = "[ns] \"ส่วนของอย่างอื่นก็มีแต่พวกอุปกรณ์ตั้งแคมป์\""
2004205-58 = "ไหนดูซิ..."
2004205-59 = "ไฟฉายแบบชาร์จไฟด้วยตัวเอง... ต่อให้เอามาเปิดเล่นทั้งวันก็ไม่น่าสนุกนะ"
2004205-60 = "ส่วนลำโพงบลูทูธที่เชื่อมต่อกับโทรศัพท์มือถือได้ก็... ไม่มีประโยชน์ถ้าไม่มีโทรศัพท์มือถือ"
2004205-61 = "ส่วนทีวีแบบพกพา... ก็เปิดไม่ได้เพราะแถวนี้ไม่มีคลื่นวิทยุ"
2004205-65 = "หืม...? จะว่าไป ทีวีแบบพกพาเครื่องนี้มันดูคุ้นๆ นะ?"
2004205-66 = "[s] \"ตอนไปเข้าเวรคราวก่อนก็พกไปด้วยนี่นา?\""
2004205-68 = "[ns] \"ตอนนั้นก็บอกว่าเบื่อแล้วนั่งทำอะไรกับเครื่องนี้อยู่ไม่ใช่เหรอ?\""
2004205-69 = "อ้อ... นี่คือทีวีเครื่องนั้นสินะ!"
2004205-70 = "งั้นก็มีวิธีดีๆ น่ะสิ!"
2004205-75 = "ถ้ารันเฟิร์มแวร์แบบคัสตอมที่ติดตั้งไว้คราวก่อน แล้วปรับพอร์ตใหม่ละก็... ได้แล้ว!"
2004205-79 = "[ns] \"มีมนุษย์ต่างดาวในหน้าจอเฉยเลย...?!\""
2004205-80 = "ใช่! คุณครูจำได้มั้ย?"
2004205-81 = "เมื่อก่อนตอนที่ฉันชอบเล่นเกม <BOOM> มากๆ จนติดตั้งเกม <BOOM> ไว้ในอุปกรณ์#nอิเล็กทรอนิกส์ต่างๆ ในชาเล่ต์ไง"
2004205-82 = "[s] \"อ้อ เกมคลาสสิกนั่นน่ะเหรอ?\""
2004205-84 = "[ns] \"ตอนครูเห็นเกมเปิดอยู่ในหน้าจอตู้เย็น ครูตกใจมากเลยละ...\""
2004205-85 = "อืม อันนั้นมันก็รุนแรงไปหน่อย..."
2004205-86 = "แต่ก็เอาเถอะ ที่ฉันจะบอกก็คือหนึ่งในอุปกรณ์ที่ฉันติดตั้งเกม <BOOM> เอาไว้ก็คือทีวีเครื่องนี้น่ะ"
2004205-87 = "พูดง่ายๆ ก็คือ ตอนนี้ทีวีพกพาเครื่องนี้ก็ไม่ต่างจากเครื่องเล่นเกมที่เล่นเกม <BOOM> ของฉันได้!"
2004205-88 = "[s] \"งั้นก็เลยจะเล่นเกม <BOOM> ไปถึงค่ำเลยเหรอ?\""
2004205-89 = "ไม่ๆ จะให้มาเล่น <BOOM> อยู่หลายๆ ชั่วโมงก็ไม่ไหวหรอก"
2004205-90 = "เกมนี้ฉันเล่นจบไปหลายรอบแล้ว แถมยังเป็นเกมคลาสสิกที่กราฟิกก็ธรรมดาๆ อีก เล่นนานๆ คงเบื่อกันพอดี"
2004205-91 = "อืม งั้นขอเล่นเบาๆ สักแค่ครึ่งชั่วโมงก่อนดีมั้ย...?"
2004205-95 = "(แล้วมากิก็ถือทีวีแบบพกพาเข้าไปในเต็นท์)"
2004205-96 = "(ถึงจะบอกว่าจะเล่นเบาๆ แค่ครึ่งชั่วโมง แต่ก็หายไปในเต็นท์อยู่หลายชั่วโมง)"
2004205-98 = "(ราวๆ ห้าชั่วโมงต่อมา...)"
2004205-101 = "[ns] เข้าไปในเต็นท์เพื่อเรียกมากิ"
2004205-107 = "― [log=마키 캠핑]โธ่... ฮึ่ย... [/log][wa:1200] "
2004205-109 = "― [log=마키 캠핑]ตายที่จุดเดิมอีกแล้ว...[/log]"
2004205-112 = "[ns] \"มากิ ยังเล่นเกมอยู่อีกเหรอ?\""
2004205-114 = "[ns] \"ใกล้ถึงเวลาแล้วนะ\""
2004205-116 = "― [log=마키 캠핑]อื้อ ฉันบังคับเกมด้วยเครื่องนี้ยากกว่าที่คิดน่ะ...[/log][wa:540] "
2004205-119 = "― [log=마키 캠핑]ฉันว่าจะแค่ตีบอสตัวสุดท้ายให้ตาย[/log][wa:160] "
2004205-121 = "― [log=마키 캠핑]แต่ก็ตายที่เดิมอยู่ซ้ำๆ เลย[/log]"
2004205-124 = "[ns] \"ไหนบอกว่าเกมนี้เล่นจบไปแล้ว และถ้าเล่นไปนานๆ แล้วจะเบื่อไง?\""
2004205-126 = "― [log=마키 캠핑]คือว่า... มันยากขึ้นเพราะบังคับยากขึ้นน่ะ...[/log][wa:2460] "
2004205-128 = "― [log=마키 캠핑]ฉันก็เลยเกิดความอยากเอาชนะขึ้นมา[/log]"
2004205-131 = "― [log=마키 캠핑]แล้วแถวนี้ก็ไม่มีอะไรอย่างอื่นให้เล่นสนุกด้วย[/log][wa:10] "
2004205-133 = "― [log=마키 캠핑]ฉันก็เลยยิ่งโฟกัสกับเกมได้มากขึ้น[/log]"
2004205-136 = "― [log=마키 캠핑]หรือว่านี่คือเสน่ห์ของแคมป์ปิ้งตามที่ได้ยินมา?[/log][wa:360] "
2004205-139 = "[ns] \"แต่ใกล้จะถึงเวลาของมอนสเตอร์ตัวนั้นแล้วนะ?\""
2004205-141 = "― [log=마키 캠핑]อ๊ะ เวลาผ่านไปขนาดนั้นแล้วเหรอ? ยุ่งแล้วละสิ...[/log][wa:10] "
2004205-144 = "― [log=마키 캠핑]คุณครู นี่ตาสุดท้ายแล้ว ตาสุดท้ายแล้วจริงๆ... [/log][wa:2840] "
2004205-146 = "― [log=마키 캠핑]ช่วยรอฉันเดี๋ยวหนึ่งนะ![/log]"
2004205-154 = "บอสตายแล้ว! เคลียร์ได้แล้วละคุณครู!"
2004205-155 = "ฉันไม่ได้ตั้งใจเล่น <BOOM> แบบนี้มานานแค่ไหนแล้วนะ... นี่สินะความรู้สึกที่สัมผัสได้เฉพาะตอน#nออกมาตั้งแคมป์เท่านั้น"
2004205-156 = "จะว่าไป ฉันรู้สึกเหมือนลืมอะไรที่สำคัญไปเลย..."
2004205-157 = "อ๊ะ จริงด้วย! ต้องเปิดโทรศัพท์มือถือ!"
2004205-158 = "คุณครู ตอนนี้กี่โมงแล้วเหรอ?"
2004205-159 = "[s] \"ทุ่มครึ่งแล้ว...\""
2004205-160 = "มันเลยเวลาไปตั้งครึ่งชั่วโมงแล้วนี่นา?! หวังว่าคงไม่สายเกินไปนะ...?"
2004205-161 = "ออกมาเสียดีๆ เจ้า <อีกานอนไม่หลับ>!"
2004205-162 = "<ข้อความระบบ> 'อีกานอนไม่หลับ' บินหนีไปที่อื่นแล้ว..."
2004205-163 = "อะไรกัน ไม่ทันจริงๆ ด้วย!"
2004205-164 = "ฉันอุตส่าห์ตั้งใจมาตั้งแคมป์ในวันหยุดเพื่อจับมอนสเตอร์พิเศษแท้ๆ แต่ก็เอาแต่เล่นเกมจนจับ#nมอนสเตอร์ไม่ทัน..."
2004205-165 = "เพราะแบบนี้สินะถึงห้ามวางใจเวลาไปตั้งแคมป์น่ะ!"
2004205-166 = "แต่ไหนๆ ก็มาถึงที่นี่แล้ว จะกลับไปแบบมือเปล่าไม่ได้หรอก"
2004205-167 = "เอาละ คุณครู จากนี้ไปช่วยจับเวลาอยู่ข้างๆ ฉันหน่อยนะ"
2004205-168 = "ในเมื่อเป็นแบบนี้แล้ว ฉันจะเล่น <BOOM> ในทีวีพกพาเครื่องนี้ แล้วก็ทำลายสถิติโหมดความเร็วให้#nได้เลย!"
2004205-170 = "(หลังจากนั้นคุณครูกับมากิก็เล่นเกมอย่างสนุกสนานด้วยกันจนถึงดึกดื่น)"

[translation]
2004205-1 = "Joys of Camping"
2004205-2 = "Campgrounds near Millennium"
2004205-6 = "Phew, that should be it for the tent..."
2004205-7 = "All that's left now is to relax and enjoy camping!"
2004205-8 = "Thanks for your help, Sensei. I'm really not used to working with outdoor equipment..."
2004205-9 = "[s] \"It's fine. It wasn't hard work.\""
2004205-11 = "[ns] \"Anyways, what do you need to do to get that game item?\""
2004205-12 = "According to the lore, the special monster, Insomnia Crow, that's available right now can only be obtained in the evening, since it sleeps during the day."
2004205-13 = "Some online communities have said that you can get it by turning on the communication system around seven in the evening at specific locations..."
2004205-14 = "[s] \"In the evening?! But it's 2:00 PM right now!\""
2004205-15 = "Duh! That's why we're camping!"
2004205-16 = "This campground is on a steep mountainside, so it's pretty dangerous to try to climb it after it gets dark out."
2004205-17 = "So I figured we could set up shop in advance and catch Insomnia Crow as soon as the time hits."
2004205-18 = "Heehee, what do you think? A perfect plan, right?"
2004205-19 = "[s1] \"It's not the worst plan...\"\n[s2] \"What are you going to do until seven?\""
2004205-22 = "It's fine. As long as I have my phone, I can kill as much time as I need."
2004205-23 = "Hm, should we watch a movie while we wait, then? I downloaded one—"
2004205-28 = "Huh? Low battery?!"
2004205-29 = "That's weird... I swear I charged it last night!"
2004205-30 = "Maybe it wasn't plugged in all the way... I only have 5% remaining."
2004205-34 = "S-Sensei. You didn't, by chance, bring a portable charger, did you?"
2004205-35 = "[s] \"No. I didn't think to bring one...\""
2004205-39 = "Augh! I can't believe I made such a critical mistake on this important day!"
2004205-40 = "Well, I can just turn my phone off for now, and turn it back on around seven. That way I can still get the item."
2004205-41 = "But how am I supposed to entertain myself until then?!"
2004205-42 = "[s3] \"How about we try enjoying nature for once?\"\n[s4] \"Would you like to draw something?\""
2004205-45 = "...Not really. I'm so preoccupied with the game, I don't feel motivated to draw at all."
2004205-46 = "Ugh, it can't be helped."
2004205-47 = "Maybe I'll spend the weekend meditating like Chihiro always does..."
2004205-49 = "Moments later."
2004205-51 = "I! Am! Bored!"
2004205-52 = "Sensei, I'm boreeed. Booored."
2004205-53 = "It's only been ten minutes?! I swear I was spaced out for forever."
2004205-54 = "Did you bring anything fun to do, Sensei? At this rate, I might actually die of boredom!"
2004205-55 = "[s] \"I really just brought a book...\""
2004205-57 = "[ns] \"Everything else is just camping gear and essentials.\""
2004205-58 = "Let's see..."
2004205-59 = "A hand-crank flashlight... It wouldn't be fun to crank this all day."
2004205-60 = "A Bluetooth speaker that can be connected to a phone...isn't useful when I can't turn my phone on."
2004205-61 = "This portable TV...wouldn't be able to get any signal around here"
2004205-65 = "...Hm? Why does TV look familiar?"
2004205-66 = "[s] \"You took it when you were on Student Rep duty once.\""
2004205-68 = "[ns] \"You were bored then too, so you started tinkering around with it.\""
2004205-69 = "Ah... I remember that!"
2004205-70 = "Oooh, I've got an idea!"
2004205-75 = "If I turn on the custom firmware I installed last time, and reconfigure the terminal... It worked!"
2004205-79 = "[ns] \"Is that a space beast on the screen...?!\""
2004205-80 = "Correct! Sensei, do you remember?"
2004205-81 = "You remember when I was really into the BOOM challenge, so I installed it on a bunch of electronic devices in Schale?"
2004205-82 = "[s] \"Ah, you mean that classic game.\""
2004205-84 = "[ns] \"I learned that day that you could play games on a refrigerator screen.\""
2004205-85 = "Mmm, I might've gone a teeny bit overboard with that..."
2004205-86 = "Anyways, one of the electronic devices that I installed \"BOOM\" on was this portable TV."
2004205-87 = "In other words, this portable TV is no different from a \"BOOM\" exclusive game console right now!"
2004205-88 = "[s] \"So you intend on playing 'BOOM' until evening?\""
2004205-89 = "No way. I wouldn't be able to play \"BOOM\" for hours, not anymore."
2004205-90 = "I've cleared it a bunch of times, and it's a classic game with simple graphics."
2004205-91 = "I'll just give it a shot for half an hour or something..."
2004205-95 = "Maki disappeared into the tent with the portable TV."
2004205-96 = "Despite what she said, she didn't emerge from the tent again."
2004205-98 = "About five hours later..."
2004205-101 = "[ns] Enter the tent to check on Maki."
2004205-107 = "― [log=마키 캠핑]U-Ughhh...[/log][wa:1400] "
2004205-109 = "― [log=마키 캠핑]I died at the same spot again...[/log]"
2004205-112 = "[ns] \"Maki, are you still playing that game?\""
2004205-114 = "[ns] \"It's almost time—\""
2004205-116 = "― [log=마키 캠핑]Mhm. Using this controller is harder than I expected...[/log][wa:340] "
2004205-119 = "― [log=마키 캠핑]I'm on the final boss... [/log][wa:440] "
2004205-121 = "― [log=마키 캠핑]...but I keep making the same mistakes over and over again.[/log]"
2004205-124 = "[ns] \"Didn't you say you'd get bored quickly, since you've already played it a bunch of times?\""
2004205-126 = "― [log=마키 캠핑]Yeah, but these controls are making it super hard... [/log][wa:2100] "
2004205-128 = "― [log=마키 캠핑]And now my competitive spirit has risen to the challenge.[/log]"
2004205-131 = "― [log=마키 캠핑]And because there's no distractions here...[/log][wa:10] "
2004205-133 = "― [log=마키 캠핑]...I feel like I can really focus on just the game.[/log]"
2004205-136 = "― [log=마키 캠핑]Could this be the \"joy\" in camping that everyone always talks about?[/log][wa:10] "
2004205-139 = "[ns] \"It's almost time, though. Are you sure it'll be okay?\""
2004205-141 = "― [log=마키 캠핑]Ah, it's already that late? What do I do...?[/log][wa:10] "
2004205-144 = "― [log=마키 캠핑]Sensei, this really, truly is my last try...[/log][wa:2920] "
2004205-146 = "― [log=마키 캠핑]So please wait a just little longer![/log]"
2004205-154 = "I did it! I finally beat it, Sensei!"
2004205-155 = "It's been so long since I was immersed in playing \"BOOM\" like that... I suppose there are things you can only enjoy while camping."
2004205-156 = "But it feels like I'm forgetting something important..."
2004205-157 = "Ah, shoot! I should've turned my phone on!"
2004205-158 = "Sensei! What time is it?!"
2004205-159 = "[s] \"7:30...?\""
2004205-160 = "I'm thirty minutes late? Am I too late...?"
2004205-161 = "Please come out, Insomnia Crow!"
2004205-162 = "<SYSTEM> \"Insomnia Crow\" flew off somewhere..."
2004205-163 = "Waaah, I actually missed it!"
2004205-164 = "I came all the way to this campground, and on a weekend, to catch this special monster. How could I lose track of time playing games and miss it?"
2004205-165 = "This is why you shouldn't relax while camping!"
2004205-166 = "I can't go back with nothing to show for all this!"
2004205-167 = "Sensei. Your job from here on out is to time me."
2004205-168 = "Since it came down to this, I'm going to challenge myself to achieving this portable TV's \"BOOM\" speedrun record!"
2004205-170 = "Afterwards, Maki and I enjoyed our time playing video games together until late into the night."

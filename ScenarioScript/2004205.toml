[translation]
2004205-1 = "露營的醍醐味"
2004205-2 = "千年學園附近的露營區"
2004205-6 = "呼，這樣帳篷就整理好了……"
2004205-7 = "現在只要悠哉享受露營就可以了！"
2004205-8 = "謝謝你的幫忙，老師。#n我果然還是不太熟悉這種戶外活動的裝備……"
2004205-9 = "[s]「不客氣，這只是舉手之勞而已。」"
2004205-11 = "[ns]「話說，要怎麼樣才能獲得那個遊戲的道具呢？」"
2004205-12 = "首先呢，這次推出的特殊怪物「失眠烏鴉」，#n白天的時候在設定上都因為在睡覺而不會活動，所以只能在晚上獲得。"
2004205-13 = "根據論壇裡的情報，只要晚上七點在特定地點打開通訊功能就能夠獲得──"
2004205-14 = "[s]「晚上七點？可是現在才兩點耶？」"
2004205-15 = "所以我才會順便來露營呀！"
2004205-16 = "這個露營區的山路還挺陡的，如果晚上七點天黑了才上山會有點危險。"
2004205-17 = "因此我才會事先在這裡找好位置，等時間一到就立刻捕捉「失眠烏鴉」。"
2004205-18 = "呵呵，怎麼樣？這個計畫很完美吧？"
2004205-19 = "[s1]「這個計畫是還不錯……」\n[s2]「但我們七點前該做什麼呢？」"
2004205-22 = "不用擔心。只要有手機就能輕鬆打發時間了。"
2004205-23 = "我們就來看事先存到手機裡的電影，等到晚上再──"
2004205-28 = "咦？怎麼沒電了！？"
2004205-29 = "真奇怪……我昨晚明明有插好充電器才對呀。"
2004205-30 = "難道沒有充進去嗎？#n剩下的電量只有5%……"
2004205-34 = "老，老師，你有帶充電器或多的電池嗎？"
2004205-35 = "[s]「我也沒有多餘的電池……」"
2004205-39 = "嗚嗚，居然在重要的日子犯下這麼致命的失誤。"
2004205-40 = "雖然可以先把手機關機，等七點左右再開機獲得道具……"
2004205-41 = "但是沒有手機的話，七點之前究竟該做什麼才好呢！"
2004205-42 = "[s3]「偶爾就放下手機享受大自然吧。」\n[s4]「要不要來畫畫？」"
2004205-45 = "……我今天滿腦子都想著遊戲，根本沒有畫畫的靈感。"
2004205-46 = "嗚嗚，沒辦法了。"
2004205-47 = "只能像千尋前輩一樣，用冥想度過假日了……"
2004205-49 = "（不久之後……）"
2004205-51 = "好～無～聊～哦～"
2004205-52 = "老師，我好無聊～快無聊死了～"
2004205-53 = "我都已經發呆了那麼久，結果居然才過了十分鐘而已。#n真是不敢相信！"
2004205-54 = "沒有什麼好玩的東西嗎？#n再這樣下去，我會無聊死的～"
2004205-55 = "[s]「但是我帶來的東西就只有書而已。」"
2004205-57 = "[ns]「裝備也都是跟露營有關的用品。」"
2004205-58 = "我看看……"
2004205-59 = "手搖充電式手電筒……這個就算搖一整天也很無聊。"
2004205-60 = "能連接手機的藍芽音箱……手機無法開機就派不上用場了吧。"
2004205-61 = "隨身電視……這附近應該幾乎接收不到任何訊號才對。"
2004205-65 = "……嗯？這麼一看，這台隨身電視怎麼有點眼熟？"
2004205-66 = "[s]「這不是之前當值日生的時候帶著的電視嗎？」"
2004205-68 = "[ns]「當時你也說很無聊，結果把玩得還挺認真的。」"
2004205-69 = "啊啊……原來是當時的那台電視機啊！"
2004205-70 = "那我有一個好方法！"
2004205-75 = "只要執行我之前安裝好的客製化韌體，再重新調整一下裝置……成功了！"
2004205-79 = "[ns]「隨身電視的螢幕出現了宇宙怪物……！？」"
2004205-80 = "沒錯！老師你還記得嗎？"
2004205-81 = "我之前沉迷《毀滅狂戰士》的時候，#n不是在夏萊的很多電器裡都安裝了《毀滅狂戰士》嗎？"
2004205-82 = "[s]「啊，原來是那款經典遊戲啊。」"
2004205-84 = "[ns]「遊戲在冰箱的螢幕上啟動的時候，還真的嚇了我一跳……」"
2004205-85 = "嗯，那個確實是有點過頭了沒錯……"
2004205-86 = "總之，我當時安裝了《毀滅狂戰士》的電器裡也包含了這台隨身電視。"
2004205-87 = "換句話說，現在這台隨身電視，就等於是可以執行《毀滅狂戰士》的專屬遊戲機！"
2004205-88 = "[s]「所以你打算一直玩《毀滅狂戰士》到晚上？」"
2004205-89 = "不不不。#n不管怎麼說，要連續玩《毀滅狂戰士》好幾個小時實在有點困難。"
2004205-90 = "畢竟那款遊戲我已經通關很多次了，畫面也只是普通的經典遊戲而已。"
2004205-91 = "先簡單玩個半小時看看吧……？"
2004205-95 = "（於是真紀便拿著隨身電視進入了帳篷裡面）"
2004205-96 = "（然而情況與真紀所說的不同，他在帳篷裡一待就是好幾個小時）"
2004205-98 = "（大約五小時後……）"
2004205-101 = "[ns] 進去帳篷叫真紀"
2004205-107 = "― [log=마키 캠핑]唔，唔呃呃……[/log][wa:1520] "
2004205-109 = "― [log=마키 캠핑]又在同一個地方死掉了……[/log]"
2004205-112 = "[ns]「真紀，你還在玩遊戲嗎？」"
2004205-114 = "[ns]「時間差不多囉──」"
2004205-116 = "― [log=마키 캠핑]話說手把的操作也太難了吧……[/log][wa:1980] "
2004205-119 = "― [log=마키 캠핑]明明只剩下最後的頭目而已…… [/log][wa:840] "
2004205-121 = "― [log=마키 캠핑]我卻總是在同一個地方失誤……[/log]"
2004205-124 = "[ns]「你不是說這款遊戲已經玩過，很快就會玩膩了嗎？」"
2004205-126 = "― [log=마키 캠핑]跟平時不同所以難度提高了……可能是因為這樣吧。[/log][wa:3300] "
2004205-128 = "― [log=마키 캠핑]莫名激起了我的求勝心。[/log]"
2004205-131 = "― [log=마키 캠핑]畢竟也沒有其他娛樂……[/log][wa:920] "
2004205-133 = "― [log=마키 캠핑]反而讓我更專注在遊戲當中了。[/log]"
2004205-136 = "― [log=마키 캠핑]難道說，這就是所謂露營的醍醐味嗎？[/log][wa:1520] "
2004205-139 = "[ns]「你說的時間快到了，沒關係嗎？」"
2004205-141 = "― [log=마키 캠핑]咦！？已經這麼晚了嗎！？怎麼辦才好……[/log][wa:630] "
2004205-144 = "― [log=마키 캠핑]老師～只要再一次就好…… 這次真的是最後一次了……[/log][wa:3680] "
2004205-146 = "― [log=마키 캠핑]再等我一下下！[/log]"
2004205-154 = "終於贏了！我過關了唷，老師！"
2004205-155 = "好久沒有這麼熱衷於《毀滅狂戰士》了呢……#n果然只有在露營的時候，才能感受到這種特別的情調。"
2004205-156 = "話說，總覺得好像忘了什麼重要的事……"
2004205-157 = "啊，對了！要打開手機才行！"
2004205-158 = "老師，現在幾點了？"
2004205-159 = "[s]「7點30分……？」"
2004205-160 = "已經過半小時了！？#n該不會來不及了吧……？"
2004205-161 = "快點出現，「失眠烏鴉」！"
2004205-162 = "<SYSTEM>「失眠烏鴉」已經不知去向了……"
2004205-163 = "嗚啊，真的沒趕上！"
2004205-164 = "虧我還特地為了抓這隻特殊怪物，在假日跑來露營區的說，#n結果卻因為沉迷遊戲而忘了時間……"
2004205-165 = "果然在露營區就是不能掉以輕心！"
2004205-166 = "可是既然都已經來到這裡了，不能就這樣空手回去。"
2004205-167 = "好，老師。#n麻煩你接下來在旁邊幫我計算時間。"
2004205-168 = "反正事情都變成這樣了，我要用這台隨身電視挑戰《毀滅狂戰士》的TA新紀錄！"
2004205-170 = "（之後和真紀一起玩遊戲玩到了深夜）"

[translation]
90001190-1 = "Episode 19;Steel Continent"
90001190-4 = "Well, well, well. There I was, so curious about what our friends were doing, and here you still are."
90001190-5 = "[s] \"...!\""
90001190-9 = "Princess. No, Aris. Come this way..."
90001190-10 = "Is something the matter, Kei?"
90001190-11 = "My instinct is telling me that revealing ourselves to those children would be dangerous."
90001190-16 = "H-H-H-H-Hello! And you better be careful! W-We are now going to..."
90001190-17 = "...d-d-do something v-very scary to you all!"
90001190-18 = "While I still have significant doubts as to the necessity of this message, Sof insisted."
90001190-19 = "Yeah! So right now, we're..."
90001190-24 = "...declaring a war! Against all of you!"
90001190-27 = "A declaration..."
90001190-28 = "...of war?"
90001190-30 = "Let's hear them out. But before that, it would appear you've finally completed Netzach?"
90001190-35 = "Y-You're wrong! Netzach, dearest Netzach, was already completed a long time ago!"
90001190-36 = "Yeah! We were just hiding Netzach a bit, so it could become the Steel Continent!"
90001190-37 = "Ah, naturally it's beyond your comprehension to perceive what an incomparably prodigious feat this was."
90001190-38 = "It's simply the way of life for people of your feeble caliber, but what a shame, what a shame. I almost feel pity for you."
90001190-40 = "Steel Continent...?"
90001190-41 = "Oho? Not even Tsukatsuki Rio figured it out? Well, again, that only makes sense."
90001190-42 = "Great job, Ein! As expected! Look at you, achieving the unimaginable like it's just another day! That's what it is to be us!"
90001190-43 = "E-Ehehe. Thank you, Sof. I'll continue to work hard...!"
90001190-44 = "The Steel Continent! Yes!"
90001190-45 = "It's the evolved form of N-Netzach... "
90001190-46 = "And a continent made of metal, able to endlessly expand by using its Forbidden Power to convert any and all matter it touches!"
90001190-47 = "[s] \"A metal continent that can expand...?\""
90001190-48 = "Allow me to put it in such a way that even you, a simpleton, can understand."
90001190-49 = "To describe the Steel Continent in your limited vocabulary, it is that of the Nameless Gods' power."
90001190-50 = "A-And one of the biggest characteristics of that power...is that it can fundamentally change the composition of matter..."
90001190-51 = "And here's a pop quiz! What happens if a structure, made with that power, comes into contact with other surrounding matter?"
90001190-53 = "Impossible...!"
90001190-54 = "It can...modify the very composition of things it comes into contact with?!"
90001190-56 = "Good job! That's correct. Anything that touches the Steel Continent becomes one with the Steel Continent!"
90001190-57 = "It's an invincible continent with a voracious appetite that can expand as it pleases!"
90001190-58 = "Yes, yes! And if you set foot onto the Steel Continent unprepared..."
90001190-59 = "...y-you will instantly fuse with the Steel Continent! Forever!"
90001190-60 = "Ein? Sof? Ohr? Do you require my assistance in any way?"
90001190-61 = "E-Elder Sister?! No, it's okay! You don't have to worry about these things! We'll take care of all of it!"
90001190-62 = "Aren't you curious to learn just how far the Steel Continent can spread? Here is what you would call a \"plot twist\"! We, too, are curious!"
90001190-63 = "B-Because we don't know Netzach's limits... The Steel Continent's limits...!"
90001190-64 = "Exactly! I'm sure looking forward to seeing how big it can get! "
90001190-65 = "Our Netzach...the Steel Continent will eat everything on its path and grow and grow and grow!"
90001190-66 = "And it won't be long until Kivotos shares the same fate!"
90001190-67 = "Isn't it great? Isn't it incredible? Aren't you so shocked that you're at a loss for words?!"
90001190-68 = "[s] \"...There's one thing I want to ask.\""
90001190-69 = "What is it? Since we're declaring war and all, as a special service, we'll answer your question."
90001190-70 = "[s1] \"What is your goal in turning Kivotos into the Steel Continent?\"\n[s2] \"Are you trying to resurrect Decagrammaton?\""
90001190-73 = "Y-You... You adult! How dare you speak the master's name? Do not dirty the god of the ten divine letters! You're not worthy!"
90001190-74 = "...Incredible. Truly incredible. You prove yourself to be so time and again, Schale's Sensei. "
90001190-75 = "J-Just you wait... You'll see...! When the time comes, no one will speak so carelessly of the master's will...!"
90001190-76 = "Yes! We'll change your \"I don't believe it\" to \"I don't want to believe it\"!"
90001190-77 = "We'll show you no mercy, regardless of how you may beg! For in three days' time..."
90001190-78 = "...Kivotos will be no more! The Steel Continent will consume all!"
90001190-85 = "[ns] \"In three days...?\""
90001190-87 = "...Had anyone else said the things they just did, I would've dismissed it as delusion."
90001190-88 = "But coming from the engineers of Decagrammaton, we can hardly take it lightly."
90001190-89 = "What do we do? If we invade the Steel Continent unprepared..."
90001190-90 = "Yes. They said we would become part of the Steel Continent, never to return."
90001190-95 = "The likelihood of that is almost nil. The Steel Continent can likely only transform inorganic matter."
90001190-96 = "[s] \"Kei!\""
90001190-97 = "That's right. Why did you and Aris go into hiding when they appeared?"
90001190-98 = "...It felt like something bothersome would happen if we encountered those three now."
90001190-99 = "Anyways, I listened to the entire exchange, and my response..."
90001190-100 = "...It's a ridiculous joke."
90001190-101 = "I-Is that true, Kei?"
90001190-102 = "Yes, Princess... Aris. It's simply a degraded utilization of the Nameless Gods' power."
90001190-103 = "Oh, wow! You're so reliable! This is what it feels like when the design gets adjusted for enemies-turned-allies!"
90001190-104 = "No. In those cases, it's more typical for them to become weaker..."
90001190-105 = "Ah, so you know...about those kinds of game tropes too, Kei-Kei... That makes me happy..."
90001190-106 = "...? A-Ack!"
90001190-108 = "As Sensei already mentioned, one of the trademark powers of the Nameless Gods is material reconstruction."
90001190-109 = "Yes. Protocol ATRAHASIS was of a similar vein."
90001190-110 = "Yes, correct. Anyways, the Nameless Gods' power is capable of fundamentally changing the relationship between waves and matter itself."
90001190-111 = "I interpreted that as \"collection\" and \"transformation\" of data..."
90001190-112 = "There's no fundamental difference. In the end, matter is energy, and energy holds value."
90001190-113 = "The Steel Continent and Netzach, the proclaimed seventh prophet... There's nothing too special to note about them."
90001190-114 = "Even compared to Protocol ATRAHASIS, it's rudimentary. However..."
90001190-115 = "[s] \"What is it?\""
90001190-116 = "I suppose that material reconstruction at such a large scale cannot be summarily dismissed either."
90001190-117 = "And the fact that we have no means of retaliation against the Steel Continent."
90001190-118 = "...Tch."
90001190-121 = "What is our plan of action?"
90001190-122 = "Even assuming Kei's theory that the Steel Continent can only affect inorganic matter is correct, we still run into a plethora of issues."
90001190-123 = "Correct. To begin, I would surmise that my AMAS, and therefore Kei, would be unable to approach it."
90001190-124 = "It would render my Abi-Eshuh useless as well."
90001190-127 = "Um, by chance, does that also mean we wouldn't be able to use any equipment...or wear any clothes?"
90001190-128 = "Eek?! Does that mean we're all gonna have to go there NAKED?!"
90001190-129 = "Huh?! Wh-When you put it that way...!"
90001190-131 = "Is that an issue? I fail to see the problem."
90001190-132 = "Eimi, no. You're the only person here who feels that way."
90001190-134 = "Th-Th-Th-Th-This is too much for me!"
90001190-141 = "This is an excellent opportunity to flaunt my perfect maid's body. What do you think, Sensei?"
90001190-145 = "[ns] \"M-Me?!\""
90001190-146 = "Ah. However, I do not wish to flaunt to anyone besides Sensei. So I would like to change my stance. This is absolutely a problem."
90001190-147 = "T-Toki...?"
90001190-148 = "Taking a step back, there's a more fundamental problem underlying all of this, no?"
90001190-149 = "Exposing the body of this delicate beauty to extreme environments is, of course, a monumental concern."
90001190-150 = "However, I believe the Multidimensional Barrier protecting the Steel Continent is a much more pressing issue. As of now, it's impossible for us to even enter the area."
90001190-151 = "An important point of discussion. Thank you, Himari."
90001190-153 = "Wh-What can we do? In a video game, we would be able to find a barrier or route to bypass the obstacle..."
90001190-154 = "(Barrier...? Bypass route...?)"
90001190-155 = "...!!"
90001190-159 = "Um, w-wouldn't there be...a backdoor or something like that, then?"
90001190-160 = "Backdoor, you say? I suppose, but that's more of something a hacker would look for in code..."
90001190-161 = "Y-Yes. But if there was a physical backdoor..."
90001190-163 = "How did you reach that conclusion?"
90001190-166 = "Th-Th-Th-The thing is...! They said, um... They said they were gathering a massive amount of resources, right...? So maybe...!"
90001190-167 = "Ah!"
90001190-168 = "Right... The resources gathered in the tundra region were being shipped to Netzach's area."
90001190-169 = "That's right. They even built railroads and facilities to transport and process the resources, didn't they?"
90001190-170 = "Yes. And left behind guards to protect said railroads."
90001190-172 = "If Netzach is capable of converting all inorganic matter into its Steel Continent, then there would be no need to refine and process resources like that."
90001190-173 = "Exactly. They wouldn't have even needed to gather resources to begin with. If it worked as they said, it would only need to consume its surroundings to grow."
90001190-174 = "Meaning, they gathered, refined, and processed resources to...this may not be the correct expression, but to evolve Netzach."
90001190-175 = "We can reasonably speculate that everything they did was to evolve Netzach into the Steel Continent."
90001190-176 = "And finally, assuming that the processed resources were used for Netzach's evolution..."
90001190-177 = "Then there must be a backdoor route somewhere...that isn't affected by material reconstruction."
90001190-179 = "Whoa! You're amazing, Yuzu. That was quite literally UZQueen mode!"
90001190-181 = "Essentially, since it was necessary to import resources to evolve Netzach, it follows that we investigate their means of import."
90001190-182 = "Uh... So to put it in game terms... It's... You're saying we should find a shortcut, right?"
90001190-183 = "That's right, Momoi. Perhaps I should call you \"Wise Momoi\" now."
90001190-184 = "Huh? I-I don't really get it...but you're complimenting me, yeah? Ehe! That's right! This is me when I get serious!"
90001190-185 = "I'll correct myself. I'll list you as \"Seemed-Wise-but-Ended-Up-Being-a-Show-Off Momoi.\""
90001190-189 = "Didn't that get super long and super negative?! Am I part of some weird title system?!"
90001190-192 = "It seems we've mostly sorted out our next course of action."
90001190-193 = "We'll return to the tundra region and focus on uncovering the backdoor route they used to import resources."
90001190-194 = "Ms. Rio, I have a question. What about contacting Millennium or other places to request support?"
90001190-197 = "...I've considered it, but there's no time."
90001190-198 = "Based on their declaration of war, we only have about three days before the Steel Continent consumes all of Kivotos."
90001190-199 = "Calculating the time it would take to make calls, select individuals, go through administrative processes, all while keeping it confidential, as well as physically transport them here..."
90001190-200 = "Ah, right. It took us almost three days just to get here, right...?"
90001190-201 = "Yes. Realistically speaking, no matter what we do, there's no time."
90001190-203 = "You require a special unit that is flexible and readily available, regardless of conditions or process."
90001190-204 = "I guess that's basically my life until this point."
90001190-206 = "Um, Rio? Then what shall we do...?"
90001190-207 = "Yes, to use an expression befitting you..."
90001190-208 = "...we're going to protect the world this time."
90001190-209 = "Together with you, Rio?"
90001190-215 = "(How does one typically react in this kind of situation...?)"
90001190-216 = "(...)"
90001190-221 = "Yes. I'd be grateful if you thought of it that way."
90001190-225 = "Bum bum bum! Rio is now officially Aris' companion! The party limit has been expanded!"
90001190-226 = "(What a relief. It appears that was an acceptable response.)"
90001190-231 = "President, what do you think?"
90001190-232 = "I'll give her a 70 out of 100. That was very impressive, for her."
90001190-237 = "[ns3] \"Shall we head out then?\"\n[ns4] \"Is everyone packed? Make sure you don't forget anything!\""
90001190-240 = "Sensei? This isn't a leisurely picnic..."
90001190-241 = "My, my. Let them be. After all, being too nervous can negatively affect the odds of success."
90001190-242 = "As long as we don't lose sight of our goals, it's not a bad idea to alleviate some of the pressure."
90001190-243 = "Ms. Rio, I agree with President Himari. Once things become serious, there will be enough to be nervous about."
90001190-244 = "I-Is that so? Is that how these things go?"
90001190-245 = "Yes. I am positive that the best feeling one can achieve is saving the world with the same attitude as taking a morning walk."
90001190-247 = "That's right! Most parties that save the world start with basic quests, like pulling weeds or cleaning a room!"
90001190-248 = "...Maybe you can apply that attitude to cleaning the club room every once in a while."
90001190-249 = "H-Huh?! I actually took out the trash this time!"
90001190-250 = "Did you wash the dishes? Vacuum?"
90001190-251 = "Bleh."
90001190-253 = "It is okay, Momoi! I did the vacuuming!"
90001190-254 = "Aris, it's not okay. She's getting worse specifically because you keep spoiling and enabling her."
90001190-255 = "D-Did I do something wrong...?"
90001190-257 = "Absolutely not. In fact, it's everyone else here, besides you, who is in the wrong."
90001190-258 = "M-Me too...?"
90001190-259 = "...You, I'll excuse."
90001190-260 = "Th-Thank you, Kei-Kei... Heehee."
90001190-261 = "Is it my imagination, or is calling me \"Kei-Kei\" becoming the norm?"
90001190-262 = "[s] \"It's because you're Kei-Kei, after all!\""
90001190-263 = "You can shut up, Sensei!"
90001190-267 = "We can use my transport ship. It's not very big...but it's not small either."
90001190-268 = "I-I think it's plenty big, Ms. Rio..."
90001190-269 = "However, on a logical level, it'd be better to be able to bring a large variety of supplies."
90001190-270 = "Understood. Everyone, let's move out."
90001190-274 = "I'll handle transport for your wheelchair, President."
90001190-275 = "My, my. Should I have Sensei carry me on their back, then?"
90001190-276 = "You can princess-carry this delicate, frail frame of mine. I wouldn't protest at all. "
90001190-278 = "What do you think? Hm, Sensei? Don't you wish to jump at this opportunity to try such a thing with me?"
90001190-280 = "..."
90001190-281 = "Toki. Please carry Himari."
90001190-282 = "..."
90001190-283 = "Understood, Ms. Rio."
90001190-289 = "D-Did I ask you for your help?!"
90001190-290 = "It's okay, President Himari. People help each other during hard times, after all."
90001190-291 = "From my experience, Toki, every time you say something right, it's always to hide your true intentions!"
90001190-299 = "Waaaaaah... Senseiiii...!"
90001190-300 = "[ns] \"Now, now. Let's get going...\""
90001190-302 = "S-Sure, Sensei. Now then, Game Development Department, roll out!"
90001190-303 = "Yes!"
90001190-308 = "Next Episode;Foreshadowing"

[translation]
90001190-1 = "第19話;鋼鐵大陸"
90001190-4 = "哎呀哎呀。還以為你們在做什麼，原來還待在那裡啊。"
90001190-5 = "[s]「……！」"
90001190-9 = "王女。不，愛麗絲。請過來這邊……"
90001190-10 = "怎麼了嗎，Kei？"
90001190-11 = "我總覺得要是讓他們看到我的樣子，好像有點危險。"
90001190-16 = "你，你你你你，你們好！還有最好小心一點！#n因，因為我們接下來……"
90001190-17 = "要對你們做非常可怕，的事情！"
90001190-18 = "雖然我還是對這次通訊的必要性感到疑惑，但既然Soph那麼堅持……"
90001190-19 = "沒錯！我們現在……"
90001190-24 = "要向你們所有人宣戰！"
90001190-27 = "宣？"
90001190-28 = "戰？"
90001190-30 = "……那我就洗耳恭聽吧。#n話說你們似乎總算把涅察赫製造出來了呢？"
90001190-35 = "哪，哪有！？涅，涅察赫醬從很久以前就已經完成了呀……？？？"
90001190-36 = "沒錯！我們只是在涅察赫成為「鋼鐵大陸」之前，稍微躲起來一下而已！"
90001190-37 = "啊啊，這是多麽無以倫比的偉業，你們想必完全無法理解吧。"
90001190-38 = "考慮到你們的程度，這也是理所當然的……雖然還是相當遺憾，甚至讓人有點同情。"
90001190-40 = "鋼鐵大陸……？"
90001190-41 = "咦，那個調月莉央居然不知道這件事嗎？#n雖然仔細想想，這也是當然的。"
90001190-42 = "做得好，Ain！不愧是Ain！#n若無其事地做出意想不到的事情，這才是我們該做的！"
90001190-43 = "耶，耶嘿嘿。謝謝你，Soph。#n我以後也會努力的……！"
90001190-44 = "那麼！鋼鐵大陸是什麼呢～！"
90001190-45 = "是，是涅察赫醬進化之後的樣子…… "
90001190-46 = "使用那股「禁忌之力」來轉換接觸的物質、擴大自我領域的金屬大陸……！"
90001190-47 = "[s]「擴大自我領域的金屬大陸……？」"
90001190-48 = "為了讓理解能力不足的你們能夠理解，我來做個簡單的說明吧。"
90001190-49 = "如果用你們的說法解釋的話，構成鋼鐵大陸的是「無名諸神的力量」。"
90001190-50 = "而那股力量的重要特徵之一……就在於能從根本改變物質的組成……"
90001190-51 = "現在我問你們一個問題！#n既然如此，由那股力量製造出來的構造體，如果和周圍的物質接觸會發生什麼事呢？"
90001190-53 = "難道說……！"
90001190-54 = "會把周圍接觸到的所有物質，變成與自己相同的組成成分……！？"
90001190-56 = "沒錯，正確答案。#n觸及鋼鐵大陸的一切，都會變成鋼鐵大陸本身。"
90001190-57 = "無敵的鋼鐵大陸會吞噬周圍的一切來擴大自己！"
90001190-58 = "接著我再問一個問題。#n如果不做任何準備就踏入鋼鐵大陸會怎麼樣呢？"
90001190-59 = "會瞬間……跟鋼鐵大陸融為一體，永遠無法復原……！"
90001190-60 = "Ain？Soph？Aur？有什麼需要我幫忙的嗎？"
90001190-61 = "姐，姐姐大人！？沒，沒關係的！#n這種事不必勞煩姐姐大人！交給我們就行了！"
90001190-62 = "你們難道不想知道鋼鐵大陸能擴大到什麼程度嗎？#n其實我們也很好奇，因為──"
90001190-63 = "鋼鐵大陸……涅察赫醬的極限，就連我們也不知道……！"
90001190-64 = "沒錯！它究竟會變大到什麼程度，真令人期待！"
90001190-65 = "我們的涅察赫……鋼鐵大陸會吞噬周圍的一切，讓自己越變越大！"
90001190-66 = "不久之後，整個奇普托斯也會變得和鋼鐵大陸一樣吧！"
90001190-67 = "怎麼樣？很厲害吧？是不是嚇得說不出話來了！？"
90001190-68 = "[s]「……我想問你們一件事。」"
90001190-69 = "什麼事？既然正在宣戰，就特別回答你吧。"
90001190-70 = "[s1]「你們把奇普托斯變成鋼鐵大陸的目的什麼？」\n[s2]「難道是讓消失的十字神名復活嗎？」"
90001190-73 = "這，這可惡的傢伙……！不准你隨便稱呼那位大人的名字！#n那可不是你能隨便掛在嘴上的神聖十文字的名字啊！"
90001190-74 = "……從各種意義上來說，你還真厲害呢，夏萊的老師。"
90001190-75 = "等，等著瞧吧……！#n到了那個時候，就沒有任何人敢隨便談論那位大人的旨意了……！"
90001190-76 = "沒錯！我會把「不相信」變成「不想相信」的！"
90001190-77 = "到時候就算後悔，我們也不會手下留情喔～？#n而且根據我們的計算，奇普托斯……"
90001190-78 = "大概3天之後就會全部變成鋼鐵大陸了！"
90001190-85 = "[ns]「奇普托斯會變成鋼鐵大陸……？」"
90001190-87 = "……如果那些話是出自其他無名小卒之口，我想必會視為妄想症患者的一派胡言。"
90001190-88 = "但既然是十字神名的工程師那麼說，實在無法置之不理。"
90001190-89 = "不過該怎麼做？#n要是不做任何準備就進入鋼鐵大陸的話……"
90001190-90 = "他們說會立刻與鋼鐵大陸融為一體，永遠無法復原。"
90001190-95 = "我想那應該不太可能。#n會變成鋼鐵大陸的物質，僅限於無機物而已。"
90001190-96 = "[s]「Kei！」"
90001190-97 = "這麼說來，剛才你和愛麗絲都不見人影了呢。#nKei是刻意這麼做的嗎？"
90001190-98 = "……因為我總覺得要是遇到那三個人，各方面都會變得很麻煩。"
90001190-99 = "總之情況我都聽說了。簡單來說……"
90001190-100 = "那實在太荒謬了。"
90001190-101 = "真，真的嗎，Kei！？"
90001190-102 = "是啊，王女……愛麗絲。#n那充其量只是無名之神力量的劣化版罷了。"
90001190-103 = "哦哦……感覺真可靠！這就是敵人變成我方之後的加成嗎！"
90001190-104 = "不是，那樣通常都會變弱吧……"
90001190-105 = "啊，原來Kei醬也知道……那種遊戲的常識啊……#n有點開心……"
90001190-106 = "……？#n哎，哎呀！"
90001190-108 = "老師之前也說過，物質的再構築是無名之神的力量中，很具代表性的特質。"
90001190-109 = "是啊，就連協議ATRAHASIS也一樣。"
90001190-110 = "沒錯。在無名之神的力量中，蘊含著能從根本上改變波動與物質間的關聯的能力。"
90001190-111 = "我將其解釋為資料的「收集」與「變形」……"
90001190-112 = "本質的部分並沒有差別。#n因為物質即是能量，而能量則具有資訊值。"
90001190-113 = "因此那個鋼鐵大陸的現象與第7名預言者涅察赫，其實都沒什麼大不了的。"
90001190-114 = "跟協議ATRAHASIS相比，那只是基礎中的基礎而已。#n只不過……"
90001190-115 = "[s]「不過？」"
90001190-116 = "就引發如此大規模的物質再構築這點來看，恐怕還是不能忽視吧。"
90001190-117 = "況且我們也沒有對抗鋼鐵大陸的手段。"
90001190-118 = "……呿。"
90001190-121 = "該怎麼辦呢？"
90001190-122 = "即便Kei的假設屬實……也就是只有無機物會變成鋼鐵大陸，問題依舊沒有解決。"
90001190-123 = "是啊，到頭來我的AMAS和Kei還是無法接近鋼鐵大陸。"
90001190-124 = "我的Abi-Eshuh恐怕也無法使用。"
90001190-127 = "那個，如果是這種情況的話，穿在身上的衣服和裝備會不會全都不能用啊……？"
90001190-128 = "咦！？所以如果我們去到那裡就會變成全裸了嗎？"
90001190-129 = "什麼！？！？好，好像是耶……！！？？"
90001190-131 = "那又如何？我覺得完全沒問題啊？"
90001190-132 = "能這樣回答的人，應該就只有英美而已了吧……？"
90001190-134 = "我，我我我我我，我完全沒辦法……！"
90001190-141 = "不過這也是展現我完美身材的機會吧。#n您怎麼看呢，老師？"
90001190-145 = "[ns]「問，問我！？」"
90001190-146 = "啊，不過我不太想讓老師以外的人看見……所以還是更正一下看法吧。#n這確實是個問題。"
90001190-147 = "季，季……？"
90001190-148 = "大家先等一下。#n不是還有個根本性的問題嗎？"
90001190-149 = "當然必須讓我這清楚系病弱美少女的身體暴露在嚴寒之中，確實是個大問題……"
90001190-150 = "不過在那之前，鋼鐵大陸不是還有多次元防護罩嗎？#n換句話說，我們現在根本不可能進入。"
90001190-151 = "謝謝你，陽葵。你說到重點了。"
90001190-153 = "該，該怎麼辦？如果是遊戲的話，這種情況通常會有護盾或可以返回的路……"
90001190-154 = "（護盾……？可以返回的路……？）"
90001190-155 = "！！！"
90001190-159 = "那個……會不會有後門之類的？"
90001190-160 = "後門是嗎？不過後門一般是在駭入的時候……"
90001190-161 = "嗯，不過在這種情況下，也許會有物理層面的後門……"
90001190-163 = "那個結論是怎麼得出來的？"
90001190-166 = "那，那那那那，那是因為……！#n您不是說那些人在大量收集資源嗎……？所以我才想說……！"
90001190-167 = "！"
90001190-168 = "原來如此……在凍原地帶採集到的資源，正被送往與涅察赫位置相同的座標。"
90001190-169 = "而且還建造了鐵道和設施來對資源進行加工對吧？"
90001190-170 = "對方還留下了兵力負責守備鐵道。"
90001190-172 = "如果涅察赫只是把所有無機物都轉換成鋼鐵大陸的一部份的話，#n根本沒必要特地對資源進行精煉與加工。"
90001190-173 = "沒錯，甚至也沒必要採集資源。#n只要像那些孩子們說的一樣，吞噬周圍的一切就能成長了。"
90001190-174 = "也就是說，對方採集、精煉、加工資源的目的……#n雖然不確定這種說法是否恰當，暫且說是為了讓涅察赫進化吧。"
90001190-175 = "對此我們可以推測對方這麼做的理由，是為了讓涅察赫進化為鋼鐵大陸。"
90001190-176 = "假設加工的資源是為了用來讓涅察赫進化……"
90001190-177 = "那麼那裡的某個地方，一定存在著不受物質轉換影響的……後門路線。"
90001190-179 = "哇！不愧是柚子！UZQueen模式是最強的！"
90001190-181 = "也就是說，那些孩子們正在爭取資源製造涅察赫，所以必須調查輸入資源的手段吧。"
90001190-182 = "呃……如果用遊戲來比喻的話……對了！就是要找出捷徑的意思吧？"
90001190-183 = "沒錯，桃井。#n看來我必須稱呼你為「英明的桃井」了呢。"
90001190-184 = "嗯？雖，雖然不是很懂……但應該是在稱讚我吧？#n哼哼！我只要稍微認真一點就是這麼厲害哦！"
90001190-185 = "請容我更正一下。#n應該是「看似英明卻容易自大的桃井」才對。"
90001190-189 = "怎麼好像往負面的方向成長了啊！？#n那是什麼稱號系統嗎──！？！？"
90001190-192 = "我們的下一個行動已經幾乎可以決定了。"
90001190-193 = "那就是返回凍原地帶進行調查，找出被用於輸入資源的後門路線。"
90001190-194 = "我有一個問題，部長。#n要不要現在聯絡千年或其他地方請求支援？"
90001190-197 = "……那個方案我也想過，但是現在時間不夠。"
90001190-198 = "根據對方的宣戰內容，距離奇普托斯變成鋼鐵大陸只剩下3天而已。"
90001190-199 = "考慮到聯絡、人選、保密……#n並且完成所有行政流程後抵達這裡的時間……"
90001190-200 = "啊，對耶。#n我們光是來到這裡，就花了將近三天對吧……？"
90001190-201 = "沒錯。時間無論如何都是不夠的。"
90001190-203 = "所以我們需要能不受條件和過程限制，能立即應對的現場特殊部隊。"
90001190-204 = "某種意義上來說已經習慣了呢。"
90001190-206 = "那個，莉央前輩？#n也就是說，愛麗絲和夥伴們……"
90001190-207 = "是啊，如果以你的話來說……"
90001190-208 = "這次我們要去守護世界。"
90001190-209 = "是跟莉央前輩一起嗎？"
90001190-215 = "（等等，這種時候該怎麼回答呢……？）"
90001190-216 = "（……）"
90001190-221 = "是啊。如果你願意這麼想的話，我會很感謝的。"
90001190-225 = "乓啪喀乓！莉央前輩正式成為愛麗絲的夥伴了！隊伍上限增加了！"
90001190-226 = "（太好了。看來似乎沒選錯呢）"
90001190-231 = "你覺得呢，部長？"
90001190-232 = "這個嘛，大約70分左右吧。"
90001190-237 = "[ns3]「那麼就出發吧？」\n[ns4]「再檢查一下有沒有忘記帶東西哦！」"
90001190-240 = "老師？我們現在是要去遠足或郊遊嗎……"
90001190-241 = "哎呀，這有什麼不好嗎？#n如果過度緊張的話，成功率反而會下降的。"
90001190-242 = "既然要做的事情不會改變的話，不如乾脆卸下包袱，抱持輕鬆的心情開始也不錯。"
90001190-243 = "我也贊成陽葵部長的意見，莉央大人。#n反正一旦正式開始作戰，自然會有足夠的緊張感。"
90001190-244 = "是，是嗎……？"
90001190-245 = "是的。如果能以早上散步回來的心情守護世界，那就再好不過了。"
90001190-247 = "沒錯！救世小隊的第一個任務，通常都是從拔除庭院的雜草，或者打掃房間開始的！"
90001190-248 = "……真希望你打掃部室的時候，也能帶著那種心情。"
90001190-249 = "為，為什麼這麼說！？#n我這次明明有好好倒垃圾呀！？"
90001190-250 = "首先你沒洗碗，而且也沒用吸塵器。"
90001190-251 = "啊唔。"
90001190-253 = "沒關係的，桃井！愛麗絲有用吸塵器！"
90001190-254 = "就是因為愛麗絲醬老是寵著姐姐，才會讓姐姐養成壞習慣……"
90001190-255 = "是，是愛麗絲的錯嗎……？"
90001190-257 = "不，在我看來，除了愛麗絲以外的所有人都有錯。"
90001190-258 = "我，我也是嗎……？"
90001190-259 = "……柚子我可以睜一隻眼閉一隻眼。"
90001190-260 = "謝，謝謝你，Kei醬……耶嘿嘿。"
90001190-261 = "大家叫我Kei醬的次數怎麼越來越頻繁了……？"
90001190-262 = "[s]「因為Kei醬就是Kei醬呀！」"
90001190-263 = "請老師安靜一點！"
90001190-267 = "這次就用我的運輸船吧。#n雖然並不算大……卻也沒那麼小。"
90001190-268 = "已，已經夠大了吧，會長……？"
90001190-269 = "但是往更合理的方向想，那樣就能裝得下更多物資──"
90001190-270 = "好了，各位。我們快出發吧。"
90001190-274 = "我來幫忙搬輪椅，部長。"
90001190-275 = "哎呀，那麼就麻煩老師背我吧。"
90001190-276 = "當然，就算您要將我這清純又可愛的病弱美少女抱在懷裡，我也完全不介意的哦。"
90001190-278 = "怎麼樣？您意下如何呢？#n要不要趁著這個機會試試看？"
90001190-280 = "……"
90001190-281 = "季，把陽葵搬過來吧。"
90001190-282 = "……"
90001190-283 = "我明白了，莉央大人。"
90001190-289 = "我，我沒要求你們幫忙啊！？"
90001190-290 = "沒關係的，陽葵部長。#n有困難的時候本來就該互相幫助。"
90001190-291 = "從我的經驗來看，季好好說話的時候就是口是心非的時候吧──！？"
90001190-299 = "噫噫……老師……"
90001190-300 = "[ns]「好了好了，大家快出發吧……」"
90001190-302 = "嗯，老師。那麼遊戲開發部也要出動了！"
90001190-303 = "是！"
90001190-308 = "下一話;前兆"

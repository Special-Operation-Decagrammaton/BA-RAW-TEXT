13110-251 = "สำนักงานสถานีกลาง เขตฝั่งตะวันออก"
13110-256 = "ดีละ... กำลังเสริมให้ไปทางด้านโน้น"
13110-258 = "เอาละ ไปกัน! ไปทำงาน!"
13110-264 = "สำนักงานสถานีกลาง เขตฝั่งตะวันตก"
13110-270 = "เฮลิคอปเตอร์ติดอาวุธก็มาถึงแล้วสินะ ดีมาก "
13110-271 = "เอารถถังไปจอดในตำแหน่งที่กำหนด ส่วนผู้คุมตลาดมืดให้ไปเสริมพื้นที่ปิดล้อม"
13110-276 = "สำนักงานสถานีกลาง พื้นที่โล่งทางใต้"
13110-278 = "เอาละ รู้แผนการดีใช่มั้ย?"
13110-280 = "แน่นอน พวกเราจะทำงานให้ตามค่าจ้างเลย"
13110-286 = "ปืนแม่เหล็กไฟฟ้า... มรดกที่ผู้เหี้ยมโหดแห่งเกเฮนน่าทิ้งไว้ ไม่มีเหตุผลที่เราต้องเมินเฉยอยู่แล้ว หึหึ"
13110-288 = "สำนักงานสถานีกลาง ทางเข้าทางเหนือ"
13110-293 = "โฮ่โฮ่ ทางนี้ครับ มาจอดซ้อนกันตรงนี้เลยครับ จอดขวางไว้ให้หมดเลย"

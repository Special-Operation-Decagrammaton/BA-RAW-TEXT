[translation]
13110-1 = "Episode 11;Secret Revealed"
13110-8 = "Please, sit down."
13110-9 = "Much appreciated. So...this is the Foreclosure Task Force. To think I would end up here, under these circumstances..."
13110-14 = "As I said yesterday, Overseer Suou is employed by Nephthys and an ally. She escorted me here, after all."
13110-15 = "...I'll stay out of the conversation for now. "
13110-19 = "How long has it been? Two years, already? Have you been well, Miss?"
13110-20 = "Very much so. Thank you."
13110-21 = "How are your funds? If you would like to exchange your current card, I can provide you one with a higher limit."
13110-22 = "No, please don't bother. I don't use it very often, actually. But I do appreciate it, thank you."
13110-23 = "I see... Now, have you any thoughts on returning? "
13110-24 = "H-Huh? Return...?"
13110-25 = "Yes. We can re-enroll you at Highlander at any time, a moment's notice."
13110-26 = "Oh. Um..."
13110-28 = "Hey. You're obviously making her uncomfortable. "
13110-29 = "Yeah. Get to the point."
13110-31 = "Ah? Y-Yes, well..."
13110-32 = "I disagree. This line of questioning is perfectly valid."
13110-33 = "After all, Highlander and Nephthys were preparing to enter into an industry-academia alliance at the time of Nonomi's withdrawal. Her decision to remain in Abydos nearly ruined that."
13110-35 = "..."
13110-36 = "It was us who had to accept Nonomi's stubbornness and bear the brunt of that loss. Therefore, isn't it rude for you to treat us in this manner?"
13110-42 = "Keep it together, Shiroko! We can't cause any more problems, okay?!"
13110-43 = "Y-Yeah. I wasn't trying to..."
13110-45 = "It matters not. If you wish, I will fight you at any time. Come."
13110-46 = "Please...contain yourself, Suou."
13110-47 = "...Hmph."
13110-51 = "My apologies, Miss. I swear my intent in coming here was not to force you to return."
13110-53 = "Yes, I think it'd be best to move on to the reason for this visit."
13110-54 = "Yes...that was it. The hidden secret of the Trans-Desert Railway."
13110-56 = "..."
13110-57 = "..."
13110-62 = "To get straight to the point, the Trans-Desert Railway..."
13110-63 = "...was a front for a project to make an asymmetric power weapon, led by the Abydos Student Council and secretly executed by Saint Nephthys."
13110-69 = "...What?!"
13110-70 = "The student council...?"
13110-72 = "Asymmetric power weapon?"
13110-73 = "You're talking about...a weapon?"
13110-75 = "Yes, correct. The name of that weapon is..."
13110-76 = "...the Train Cannon Schemata."
13110-82 = "The Schemata was designed to be a massive cannon...or rather, a weapon fortress. It would have exceeded all conventional standards in terms of caliber, weight, range, and destructive force."
13110-83 = "The Trans-Desert Railway, stretching like a web across the vast Abydos district, wasn't meant for freight or passenger trains, but instead..."
13110-84 = "...a strategic explosives fortress, weighing over a ton, equipped with an ultra-long-range cannon capable of firing 1,200 millimeter high-explosive shells at ranges up to 500 kilometers. Can you fathom it?"
13110-85 = "It's a plan that started out with such a grandiose and delusional idea."
13110-86 = "Completion would have meant the capability to exert an unimaginable amount of control over all surrounding districts. Asymmetric power."
13110-89 = "A weapon..."
13110-94 = "Please, wait a moment! Wh-Why would the Abydos Student Council wish to construct something like this?"
13110-95 = "Shouldn't it be obvious?"
13110-96 = "It was an appealing tool, meant to be used to solve Abydos' debt problem."
13110-97 = "T-Tool...?"
13110-98 = "As I said. With such a powerful weapon, Abydos would have countless avenues to profit from. Perhaps not legitimate avenues, but that's hardly uncommon in Kivotos."
13110-100 = "Th-That's..."
13110-101 = "Schemata... Isn't that the name of THAT student council president? "
13110-103 = "That's right. The iron-fisted ruler, Schemata."
13110-105 = "Huh? Who is that?"
13110-106 = "A legendary student council president who earned the nickname when she ended the chaotic reign of seventy rival presidents, leading Abydos to its golden age."
13110-107 = "What? Seventy?!"
13110-109 = "While I'm not originally from Abydos, I've learned some of its history."
13110-110 = "Abydos was once the richest and most powerful district in Kivotos. It's said that all other districts both feared and admired it."
13110-111 = "Their deliberate choice in name is rather interesting, isn't it? It made their intent clear."
13110-112 = "That's right. There's no better way to make money in this city than a powerful weapon. "
13110-114 = "Hoshino..."
13110-115 = "Do you mean to say...the Trans-Desert Railway was, in reality, Nephthys' deceitful plan to cover up the manufacturing of this weapon?"
13110-120 = "N-No, not at all! I was not an executive, so I may not know all the details, but I can say with confidence that building the Trans-Desert Railway was their original intent. The plan for the Train Cannon was a later addition."
13110-121 = "Someone suggested the Cannon to the student council as an attempt to salvage the troublesome and unprofitable project."
13110-122 = "What? Who? Who would do that...?"
13110-123 = "That, I'm afraid I do not know the answer to. The project was conducted under such secrecy. "
13110-125 = "You can calm down, Miss. Nothing came of the project."
13110-126 = "As she said! In the end, we were tricked. Scammed... We were forced to conclude that the idea itself was nothing more than a delusional fraud."
13110-127 = "The sheer size of the Schemata far surpassed any existing weapon. Logically, there's simply no way something of that magnitude could even function!"
13110-128 = "And that was ultimately its greatest limitation. Despite the designer's confidence, they weren't able to make the Train Cannon's engine run. Both we and the Abydos Student Council were deceived."
13110-129 = "Thus, they stopped the project. The Train Cannon was left abandoned somewhere in the Abydos Desert."
13110-130 = "...That was, until very recently."
13110-136 = "Now, with new algorithms and simulation results, we believe we can successfully develop the Train Cannon."
13110-137 = "I'm not sure if the original engineer created the design anticipating future capabilities, or if it was simply coincidence, but..."
13110-139 = "...It's a treasure trove of innovative technologies ahead of its time. A mobile, strategic weapon whose existence alone would serve as a deterrent to other districts."
13110-140 = "You can consider the Train Cannon a gold mine, essentially."
13110-141 = "As you well know, people are coming out of the woodwork, trying to act quickly before the rest of the world finds out about this gold mine."
13110-142 = "That is precisely why the private equity fund is so obsessed with securing the rights to operate the Trans-Desert Railway's auxiliary facilities. "
13110-146 = "This Train Cannon is considered an auxiliary facility of the Trans-Desert Railway... Secure the rights included in the bond, and you secure the Train Cannon's operating rights."
13110-147 = "Their intentions and motivations may differ, but the varying factions of the private equity fund are all vying to profit from the Train Cannon. "
13110-150 = "They approached Nephthys, who had long-since forgotten about the abandoned project, and proposed an investment."
13110-151 = "The Trans-Desert Railway is a cautionary tale to us, a historical artifact we hoped to somehow preserve. So we accepted their offer."
13110-154 = "..."
13110-155 = "By the time we learned of the true nature of the project, it was too late to withdraw from the private equity fund."
13110-156 = "And we couldn't simply allow the Train Cannon to fall into the greedy hands of the other members, either. "
13110-157 = "You were right on that, at least. If a weapon like that is controlled by evil people, it's Abydos that'll be caught in the middle of a massive conflict."
13110-159 = "Can't we just bust it up?"
13110-160 = "Do you know the location of the Train Cannon, Butler?"
13110-162 = "No... Neither we nor the private equity fund have any idea where it is."
13110-163 = "To begin with, this project was highly confidential. It wouldn't have been beneficial for anyone if the details came out, so any related documents were likely destroyed."
13110-168 = "I see..."
13110-169 = "Come to think of it, the private equity fund did approach us regarding the location of the Train Cannon."
13110-170 = "It's only a matter of time before they find it. Once the Highlanders resume construction of the Trans-Desert Railway, they'll discover the Train Cannon's location rather quickly, I'd presume."
13110-171 = "The Highlanders themselves don't know of the Train Cannon's existence, but their fervent passion for trains and top-notch skills will make short work of the task."
13110-172 = "On top of that, the private equity fund endeavored to secure the Train Cannon through a legitimate contract. If we were to destroy it, the fees we would be required to pay in damages would be astronomical."
13110-173 = "Legitimate contract...?"
13110-174 = "Yes, they are rather fixated on the legalities of everything, likely because ownership of the Train Cannon was difficult to identify."
13110-175 = "The principal party is the Abydos Student Council, the executor is Nephthys, and an entirely different party designed it... All the while, the rights are tied up in a bond. "
13110-176 = "From a business standpoint, they're conducting themselves correctly. They're looking to settle any legal issues now, to avoid future complications."
13110-177 = "Does Kaiser not know about the existence of the Train Cannon? Why did they sell the bonds without a second thought?"
13110-178 = "Even if they are aware, I doubt they have much interest in the Train Cannon. The Kaiser president seems to be focused on the Sanctum Tower at the moment."
13110-179 = "And regardless, Kaiser's profit margins from the bond sales were something of a dream. They likely don't care about an unsubstantiated rumor in comparison to that."
13110-183 = "...But that was when something unexpected occurred."
13110-187 = "Some Highlander students discovered a contract signed by the previous Abydos Student Council president. "
13110-189 = "I'm not sure as to how or why this contract exists, but now that its existence is known, the private equity fund has realized that the rights to the Train Cannon will not pass onto them."
13110-190 = "Wait. Do you know anything about the contract?"
13110-191 = "Why did Yume— Why did the student council president proceed with this contract? What was happening at the time?"
13110-193 = "...Hoshino."
13110-198 = "My apologies. As I said, we weren't even aware of the contract's existence until the Highlander students happened upon it. We're still in the dark about the how or why."
13110-199 = "..."
13110-200 = "Nephthys was on the verge of bankruptcy at the time. We were occupied with selling off our assets at whatever price we could. "
13110-201 = "We saw the rights to the Trans-Desert Railway as worthless and sold them to the student council."
13110-202 = "... "
13110-203 = "In any case, the private equity fund is looking to get this contract squared away as soon as possible. It's important to them that everything in this process is seen as legitimate in the eyes of the law."
13110-204 = "This is why they're rushing to hold the general creditors' meeting, so they can officially nullify the contract."
13110-209 = "Tomorrow's meeting... Noon, at the Abydos Central Station District Office."
13110-210 = "That's correct. They approached the Abydos Student Council, the private equity fund's debtor, to officially notify them of their requirement to attend. "
13110-211 = "If the student council's representatives attend the meeting and forfeit the contract, or if they fail to attend, the contract will be void and the rights will revert to Nephthys, the original owner. "
13110-215 = "What?! Doesn't that mean...?!"
13110-216 = "...Unfortunately, no. The rights will technically return to Nephthys, but Nephthys is now a member of the private equity fund."
13110-217 = "Just like the bonds that were purchased under Nephthys' name, the rights will belong to the private equity fund. We wouldn't be in a position to dispense anything."
13110-222 = "...Then there's only one option left."
13110-228 = "I'll go to the general creditors' meeting and declare our intent to uphold our end of the contract."
13110-229 = "...That would be the logical conclusion. Then, the rights to the Train Cannon will remain with the Abydos Student Council."
13110-230 = "Right. We'll have to find a way to make the payments, but at least the private equity fund won't be able to get their hands on the Train Cannon."
13110-231 = "It'll buy us time to find the Train Cannon in the desert and destroy it."
13110-233 = "That's it then, right? Problem solved?"
13110-234 = "Technically, yes, but..."
13110-236 = "No, your plan will prove difficult to achieve, Takanashi Hoshino."
13110-241 = "The private equity fund is well aware of all this. They will do their utmost to prevent you from attending and certifying the contract."
13110-242 = "What? Try to stop her? How...?"
13110-243 = "It's simple. They intend to blockade the Abydos Central Station District Office. Hundreds of mercenaries will stand in the way of you and the meeting."
13110-244 = "What?!"
13110-249 = "The private equity fund's hired hands have likely already begun setting up blockades. They'll be defending the district office with armored vehicles, helicopters, anti-aircraft guns, and barricades."
13110-251 = "Central Station District Office East"
13110-256 = "...Good. The additional troops can be stationed over there."
13110-258 = "Move out! Time to get to work!"
13110-264 = "Central Station District Office West Access Road"
13110-270 = "Excellent. The helicopters are here. "
13110-271 = "Have the armored vehicles secure their designated positions, and have the market guards strengthen their blockade zones."
13110-276 = "Central Station District Office South Open Field"
13110-278 = "Good. Does everyone understand the plan?"
13110-280 = "Naturally. We'll complete the work we've been paid to do."
13110-286 = "The Train Cannon is a part of the Gehenna Tyrant Emperor's legacy. There's no reason to leave it languishing in this desert."
13110-288 = "Central Station District Office North Access Road"
13110-293 = "Oh, oh! Right here! Fortify the barricade here. As thick as you can!"
13110-297 = "Bring everything you can, whether it be an excavator, bulldozer, forklift, everything!"
13110-307 = "Heeheehee... If she doesn't arrive by noon tomorrow, the Train Cannon is ours."
13110-308 = "Just try and attend this meeting... Heehee..."
13110-310 = "Seriously?! They're going that far?"
13110-311 = "Hm...hundreds, you say?"
13110-312 = "Hm..."
13110-313 = "Against that many troops... How can just the five of us...?"
13110-315 = "W-Well, what about Sensei? Maybe if Sensei's there..."
13110-316 = "No. There's no justification for Schale to get involved with private business transactions."
13110-320 = "What? Why not?! Those private equity jerks are the ones being dishonest and messing with the contract! "
13110-322 = "No, Serika. There's no way to prove that."
13110-324 = "Wh-What do you mean?"
13110-325 = "Why do you think they're holding the meeting at the Central Station District Office? Dozens of Trans-Desert Railway lines intersect right at that point. "
13110-326 = "Ah! I understand. Besides the auxiliary facilities, the private equity fund owns all rights to the Trans-Desert Railway."
13110-327 = "Yup. Officially, they're just gonna say they're defending their property from trespassers."
13110-328 = "Th-That's so unfair! "
13110-334 = "...But who will attend the meeting? Just Takanashi Hoshino? Or all of you?"
13110-336 = "Huh? Well, obviously..."
13110-337 = "...all five of us."
13110-342 = "I posed my question incorrectly."
13110-343 = "More aptly, will the Abydos Student Council attend this meeting, or the Foreclosure Task Force?"
13110-344 = "Sorry? Th-That's..."
13110-345 = "Student Council President Yume wrote the contract listing the Abydos Student Council as the principal party, and only the Abydos Student Council. "
13110-346 = "Only one of the two can be acknowledged as your school's legitimate student council. The other will be shut down."
13110-347 = "Well, that only has any bearing if you successfully force your way in."
13110-348 = "..."
13110-350 = "For now, we need to focus on how to break through their defenses. "
13110-351 = "You make it sound like that'll be a walk in the park, Shiroko! "
13110-353 = "She's right. It's impossible. We'll need to find another way."
13110-355 = "...There is another way, miss."
13110-363 = "It's easy. Straightforward. Re-enroll in Highlander Academy, and become the student council president."
13110-364 = "Excuse me...?"
13110-370 = "I will instate you as the Highlander student council president. You will become an officer of Nephthys, and you will have the authority to void this contract."
13110-371 = "As both a Nephthys officer and the Highlander student council president, you'll have both factions of the private equity fund in your hands. It should be well within your power."
13110-372 = "Th-That...would work..."
13110-373 = "I'd have to leave Abydos...but also..."
13110-375 = "Rejected."
13110-376 = "What she said! I don't even wanna hear that kinda nonsense! Why would we ever agree to Nonomi leaving us?!"
13110-381 = "I have to agree. I can't go along with that plan. I won't leave Abydos!"
13110-382 = "I can't even consider that as a solution!"
13110-383 = "I suppose that's to be expected. It's rather difficult to break this...stubbornness of yours."
13110-384 = "There is a third option but...based on your attitudes, I don't believe it would be a possibility either..."
13110-388 = "A third one...? What is it?"
13110-389 = "It is rather drastic, I must warn you..."
13110-390 = "I don't care how drastic it is! Please, tell us."
13110-394 = "I will do as you ask. The third option..."
13110-395 = "...is to nullify the original Trans-Desert Railway sales contract."
13110-396 = "...?"
13110-397 = "You'll have to declare that the Abydos Student Council, the principal party of the contract, was a fake organization that had no rights to act as a student council. "
13110-398 = "What?!"
13110-404 = "In other words, we would certify that the Abydos Student Council, comprised of Kuchinashi Yume and Takanashi Hoshino, was an imposter organization and not the official student council."
13110-405 = "H-How is that a solution...?"
13110-406 = "It's my understanding that the student council president was elected by a simple raise-of-hands vote by the previous student council. It wouldn't necessarily be difficult to deny the legitimacy of such an unofficial process."
13110-407 = "Takanashi Hoshino, a member of that student council, would simply need to attend the meeting and confess to this fact. If we, the other party of the contract, acknowledge the admission, the contract itself would be nullified."
13110-408 = "More effective than the contract being canceled or suspended, it would be as if it never existed in the first place. "
13110-409 = "Then, Nephthys would own 100% of the rights to the Train Cannon, regardless of our affiliation with the private equity fund."
13110-410 = "What are you even suggesting? For us to use that kind of method...!"
13110-411 = "I did tell you it was likely impossible."
13110-412 = "..."
13110-413 = "There you have it. I've told you the great secret of the Trans-Desert Railway, but it appears you have no solution for the issue at hand..."
13110-417 = "You have until noon tomorrow. After that, the private equity fund will have what they want: the Train Cannon."
13110-418 = "We will do our utmost on our end, but please contact me if you settle on a plan of action. "
13110-419 = "I will see you at the general creditors' meeting tomorrow. Oh, and please ensure the private equity fund doesn't get word of our conversation."
13110-420 = "Goodbye, for now."
13110-429 = "*sigh*"
13110-430 = "Hm..."
13110-435 = "..."
13110-440 = "Now, now. This is no time to be twiddling our thumbs. Let's hold a meeting of our own."
13110-441 = "Hoshino..."
13110-442 = "This old-timer will be just fine, Nonomi. The clock's ticking, remember? "
13110-443 = "Our deadline's by noon tomorrow, so we'll have to figure something out tonight. We've got to put our heads together and focus. Right?"
13110-445 = "Yeah. Like Hoshino said. We'll think of something. "
13110-447 = "Okay..."
13110-448 = "That's our Shiroko! Always the positive one. Everyone, try to learn from Shiroko's lead!"
13110-450 = "Hm..."
13110-452 = "What're you saying all of a sudden?"
13110-453 = "Haha. There's too much tension from all these complicated matters."
13110-457 = "How about we take a break and then reconvene?"
13110-459 = "Next Episode;The Foreclosure Task Force's Beginning"

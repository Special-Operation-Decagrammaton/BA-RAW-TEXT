13110-307 = "ฮุฮุฮุ... เอาละ ถ้าเด็กพวกนั้นมาไม่ทันพรุ่งนี้เที่ยง ปืนแม่เหล็กไฟฟ้าก็จะตกเป็นของพวกเราครับ"
13110-308 = "ขัดขวางให้เต็มที่เลยนะครับ ฮุฮุ..."
13110-310 = "ว่าไงนะ?! ทำกันถึงขนาดนั้นเลยเหรอ?!"
13110-311 = "ฮืม... หลายร้อยคนเลยงั้นเหรอ?"
13110-312 = "อืม..."
13110-313 = "ถะ... ถ้ามีกองกำลังมากขนาดนั้น... พวกเราแค่ 5 คนคง..."
13110-315 = "ถ้ามีคุณครูมาช่วย ก็น่าจะได้หรือเปล่า?"
13110-316 = "ไม่ได้หรอก ครูจาก <ชาเล่ต์> เข้าไปแทรกแซงเรื่องธุรกิจส่วนบุคคลแบบนี้ไม่ได้"
13110-320 = "พูดอะไรน่ะ?! ก็ทางนั้นมาขัดขวางสัญญาแบบโจ่งแจ้งเลยนี่นา! "

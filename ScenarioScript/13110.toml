13110-395 = "การทำให้สัญญาซื้อขายทางรถไฟข้ามทะเลทรายเป็นโมฆะจากต้นทางไปเลยครับ"
13110-396 = "...?"
13110-397 = "นั่นก็คือการประกาศว่าที่จริงแล้ว <สภานักเรียนอะบิดอส> ที่เป็นผู้ทำสัญญาคือตัวปลอมที่ไม่มีสิทธิ์#nของสภานักเรียนตั้งแต่แรกครับ "
13110-398 = "คะ?!"
13110-404 = "เราจะไปยืนยันว่า... ที่จริงแล้ว <สภานักเรียนอะบิดอส> ที่ประกอบด้วยนักเรียนแค่ 2 คนคือคุจินาชิ ยูเมะ กับทาคานาชิ โฮชิโนะ ไม่ใช่สภานักเรียนอย่างเป็นทางการ แต่เป็นแค่กลุ่มที่แอบอ้างกันขึ้นมาเอง#nโดยที่ไม่ได้รับการอนุมัติครับ"
13110-405 = "อะ... อะไรกัน..."
13110-406 = "คุณบอกว่าประธานสภานักเรียนคนนั้นได้รับการเลือกจากการยกมือลงคะแนนเสียงของสภานักเรียน#nรุ่นก่อนใช่มั้ยครับ? คุณสามารถปฏิเสธหลักการในการรับช่วงต่อนั้นได้ครับ"
13110-407 = "โดยคุณโฮชิโนะ ทาคานาชิที่เคยสังกัดในสภานักเรียนนั้น จะไปเข้าร่วมการประชุมแล้วยอมรับสารภาพ#nเรื่องนั้นครับ แล้วถ้าพวกผมที่เป็นคู่สัญญายอมรับสิ่งนั้น สัญญาดังกล่าวก็จะเป็นโมฆะครับ"
13110-408 = "และถ้าเป็นแบบนั้น จะไม่ใช่ว่าสัญญาถูกยกเลิกหรือยุติ แต่มันจะไม่เคยมีอยู่เลยตั้งแต่แรกครับ "
13110-409 = "แล้วสิทธิ์ในปืนแม่เหล็กไฟฟ้าก็จะตกไปเป็นของเนฟธิส 100% โดยไม่สนว่าอยู่ใน <กองทุนไพรเวทอิควิตี้> หรือไม่"

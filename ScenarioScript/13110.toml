[translation]
13110-1 = "第11話;揭露的祕密"
13110-8 = "請坐……"
13110-9 = "謝謝……這裡就是對策委員會啊。#n沒想到會以這樣的方式來到這裡……"
13110-14 = "啊，就如我昨天所說，蘇芳監察官受雇於我們奈芙蒂斯，這次也負責擔任我的護衛。"
13110-15 = "……我就先退下了。"
13110-19 = "已經2年不見了呢，大小姐。#n這段時間過得好嗎？"
13110-20 = "……是，託你的福。"
13110-21 = "卡的額度沒問題吧？#n只要把卡片給我，我可以換一張額度更高的卡片給您。"
13110-22 = "不，不用了。#n目前沒有這個需要，而且也用不到那麼多……"
13110-23 = "這樣啊……您還是不打算回來嗎？"
13110-24 = "咦？這麼問的意思是……？"
13110-25 = "只要您一句話，要馬上進入高地人鐵道學園就讀也不成問題。"
13110-26 = "唔嗯……這……"
13110-28 = "喂，看不出來野乃美醬很為難嗎？"
13110-29 = "嗯，言歸正傳吧。"
13110-31 = "咦？這，這……"
13110-32 = "不，我們完全有資格這麼說。"
13110-33 = "奈芙蒂斯原本計畫要和高地人鐵道學園建立產學同盟。#n然而本來已經決定要入學的大小姐卻留在了阿拜多斯，導致同盟差點破裂。"
13110-35 = "……"
13110-36 = "你不覺得這對接受大小姐的任性、承擔大小姐造成的損失的對象很失禮嗎？"
13110-42 = "先忍耐一下！白子前輩！不能在這裡惹事！"
13110-43 = "唔，唔嗯。我才沒有……"
13110-45 = "無所謂。想打的話我隨時奉陪。"
13110-46 = "……蘇芳同學，麻煩你也克制一下。"
13110-47 = "……哼。"
13110-51 = "……失禮了，大小姐。#n我並不是來這裡要求您回來的。"
13110-53 = "我想我們還是趕緊切入主題吧……"
13110-54 = "沒問題……是那件事吧──#n隱藏在沙漠橫貫鐵路的祕密。"
13110-56 = "……"
13110-57 = "……"
13110-62 = "從結論來說，「沙漠橫貫鐵路」的背後……"
13110-63 = "隱藏著由阿拜多斯學生會主導，#n聖奈芙蒂斯祕密進行的「不對稱戰力兵器」製作計畫。"
13110-69 = "……咦！？"
13110-70 = "學生會……？"
13110-72 = "不對稱戰力兵器？"
13110-73 = "指的是……武器嗎？"
13110-75 = "正是如此。那個兵器的名字是……"
13110-76 = "「列車砲謝瑪塔」。"
13110-82 = "「謝瑪塔」在口徑、重量、射程、破壞力……各個方面都脫離了既有規格和常識，#n是座超大型的列車砲……不，應該稱之為要塞兵器比較恰當。"
13110-83 = "如蜘蛛網一般鋪設在廣闊的阿拜多斯自治區的「沙漠橫貫鐵路」……#n如果在鐵道上奔馳的不是貨車和客車……"
13110-84 = "而是搭載著「能將重達1噸以上的1,200mm高爆彈投射到500km外的超長距離火砲」#n的戰略砲擊要塞會怎麼樣？"
13110-85 = "是個以這樣天馬行空的構思為出發點制定的計畫。"
13110-86 = "然而這個計畫一旦完成，能用來遏制周圍自治區的[ruby=asymmetric power]不對稱戰力[/ruby]將會誕生。"
13110-89 = "…………兵器啊。"
13110-94 = "請，請等一下！？#n你說這是阿拜多斯學生會製造的……？怎麼會呢……！？"
13110-95 = "答案很明顯吧？"
13110-96 = "這是對解決阿拜多斯的債務[ruby= ・     ・ ]深具[/ruby][ruby= ・     ・     ・ ]魅力的[/ruby][ruby= ・     ・ ]工具[/ruby]。"
13110-97 = "工，工具……？"
13110-98 = "沒錯。能藉由強大兵器讓阿拜多斯獲利的手段多的是。#n雖然談不上正當，但這在奇普托斯並不罕見吧？"
13110-100 = "怎，怎麼會……"
13110-101 = "「謝瑪塔」……難道是那個學生會長嗎？"
13110-103 = "沒錯，你很清楚嘛？#n──鐵腕統治的謝瑪塔。"
13110-105 = "……他是誰？"
13110-106 = "那是平定了70名學生會長同時存在的混亂時期，#n引領阿拜多斯全盛期的那位「傳說中的學生會長」的別名……"
13110-107 = "什麼？70個學生會長！？"
13110-109 = "……雖然我不是阿拜多斯出身，但這裡的歷史我多少學過一點。"
13110-110 = "阿拜多斯曾經是奇普托斯最富有、最強大的自治區。#n據說奇普托斯的所有自治區，都對阿拜多斯感到既畏懼又羨慕。"
13110-111 = "從這個觀點來看，你不覺得為列車砲取這個名字實在很有趣嗎？"
13110-112 = "……這麼說也對。#n強大的武器才是最可靠的賺錢手段。"
13110-114 = "星野前輩……"
13110-115 = "也就是說……「沙漠橫貫鐵路」是奈芙蒂斯為了隱藏這個兵器而推動的詐欺事業嗎？"
13110-120 = "不，不是，不是那樣的！雖然不是負責人的我不清楚詳細情況……#n但總而言之，是先有沙漠橫貫鐵路的事業之後，「列車砲」計畫才出現的！"
13110-121 = "有人向學生會提供了這個「能一舉改變無利可圖又傷腦筋的事業」的點子……！"
13110-122 = "什麼？是誰？是誰做了那種事……"
13110-123 = "這點我也不清楚……#n畢竟這項事業本來就是祕密進行……"
13110-125 = "你先冷靜點吧，大小姐。#n要是計畫完成還能另當別論，但它最終被取消了。"
13110-126 = "沒，沒錯！該說這個計畫根本是場詐欺嗎……#n總之事後我們得出的結論是，那根本是空談、妄想、詐騙！"
13110-127 = "謝瑪塔的大小遠遠超越現存的所有兵器。#n按理來說，那種大小是不可能正常運作的！"
13110-128 = "尺寸終究存在物理上的極限。#n雖然設計者充滿自信，但最終列車砲的引擎並沒有發動。我們和學生會都被騙了。"
13110-129 = "因此這項列車砲計畫遭到中斷……#n現在也以未完成的狀態，被棄置在阿拜多斯沙漠的某處。"
13110-130 = "……以上為不久之前的狀況。"
13110-136 = "然而由於最近開發出了新演算法……#n其模擬結果顯示，這門列車砲實際上有可能實現。"
13110-137 = "不知道是那名技師的設計太有前瞻性，還是純屬偶然……"
13110-139 = "總之這是只要擁有就能產生威懾力的可動式戰略兵器。#n同時也是運用了劃時代創新技術的寶庫。"
13110-140 = "現在「列車砲」已經成為有如金礦般的存在。"
13110-141 = "而在金礦公諸於世之前，有人提前展開了行動。"
13110-142 = "沒錯，這就是「私募基金」執著於沙漠橫貫鐵路附屬設施使用權的原因。"
13110-146 = "因為列車砲屬於沙漠橫貫鐵路事業的附屬設施……#n一旦獲得債權中包含的權利，自然也會擁有列車砲的使用權。"
13110-147 = "儘管私募基金所屬勢力的企圖可能各不相同，#n總之他們都想獲得這門「列車砲」來謀取利益。"
13110-150 = "因此才會接近早已遺忘被廢除的列車砲計畫的奈芙蒂斯，並提出了投資的建議。"
13110-151 = "由於對我們來說，「沙漠橫貫鐵路」是無論如何都想保存下來的歷史資料。#n該說是他山之石還是反面教材呢……所以就接受了。"
13110-154 = "……"
13110-155 = "事後才得知計畫實情的我們，如今已無法從「私募基金」手中脫身……"
13110-156 = "不能讓列車砲落入「私募基金」手中。"
13110-157 = "說的也是。#n一旦那種兵器落入壞人手中，阿拜多斯將會被捲入巨大的紛爭漩渦。"
13110-159 = "我們先把它找出來破壞掉不就行了嗎？"
13110-160 = "你知道列車砲的位置嗎，管家？"
13110-162 = "不……我們和私募基金都不知道它在哪裡。"
13110-163 = "因為這項計畫本身就是祕密，相關文件似乎也全都被銷毀了。#n畢竟這對事業百害而無一利。"
13110-168 = "這樣啊……"
13110-169 = "現在回頭想想，「私募基金」之所以接近我們，恐怕也是為了查出列車砲的位置吧。"
13110-170 = "然而這也只是時間上的問題。#n一旦高地人鐵道學園重啟沙漠橫貫鐵道，列車砲的位置很快就會曝光。"
13110-171 = "雖然他們對列車砲的存在一無所知，#n但其對列車的熱愛已經到了不能自拔的地步，實力也是無庸置疑。"
13110-172 = "況且由於「私募基金」想透過正當的契約取得列車砲，#n如果我們隨便破壞的話，就必須支付巨額的損失賠償。"
13110-173 = "正當的契約……？"
13110-174 = "是的。可能是因為列車砲的所有權和來歷都不明確，所以他們對此相當執著。"
13110-175 = "當事者阿拜多斯學生會、執行者奈芙蒂斯，以及提供核心設計概念的人……#n再加上這項權利還被當成了債權的抵押品……"
13110-176 = "對於企業家來說，這也是理所當然的選擇。#n必須明確法律關係，才能避免留下後患。"
13110-177 = "凱薩不知道「列車砲」的存在嗎？#n不然為什麼會賣出債權呢？"
13110-178 = "這個嘛，我想凱薩就算知道，或許也不會對「列車砲」感興趣吧。#n畢竟凱薩總裁現在似乎更關心聖所之塔的情況……"
13110-179 = "況且凱薩光是賣出債權就獲得了鉅額的利潤。#n那些傳聞的真相究竟為何，對他們而言或許已經無關緊要了也說不定……"
13110-183 = "……然而卻發生了誰都預想不到的事。"
13110-187 = "那就是阿拜多斯前學生會長的契約被發現了。"
13110-189 = "雖然不清楚與之相關的來龍去脈……#n但既然契約已經曝光，列車砲的權利就不會交到私募基金手上。"
13110-190 = "等等……關於這份契約，你知道些什麼嗎？"
13110-191 = "為什麼夢前輩……學生會長會簽下這種契約呢？當時發生了什麼事嗎？"
13110-193 = "……星野前輩。"
13110-198 = "……不。如同我剛才所說，在這份契約被發現之前，我們就連它的存在都不知道。#n即使到了現在，其簽訂過程與之後的結果也都還沒搞清楚。"
13110-199 = "……"
13110-200 = "由於當時我們奈芙蒂斯瀕臨破產危機，被迫賤賣各種資產。"
13110-201 = "或許只是單純想將沙漠橫貫鐵路……這項無用資產的權利賣給學生會而已吧。"
13110-202 = "……"
13110-203 = "總之，私募基金打算優先解決這份契約的問題。#n畢竟就像剛才提過的一樣，正當的契約程序對他們很重要。"
13110-204 = "所以才會急著召開債權團大會，以便確實處理這份契約。"
13110-209 = "明天12點，在阿拜多斯中央車站的區政廳大樓……"
13110-210 = "……沒錯。私募基金已經向債務人「阿拜多斯學生會」確實進行了出席通報。"
13110-211 = "因此如果學生會的代表在大會中表示放棄契約，或者不參加大會……#n契約就會失去效力，而權利將回到原本的所有人奈芙蒂斯手中。"
13110-215 = "咦！？也就是說……！？"
13110-216 = "……不。權利只會回到作為「私募基金」成員的奈芙蒂斯。"
13110-217 = "就像我們是以奈芙蒂斯的名義購買債權一樣，#n這份權利也同樣屬於「私募基金」，我們無法隨意處置。"
13110-222 = "……既然如此，只剩下一個辦法了。"
13110-228 = "由我參加債權團大會，表示維持那份契約的意思。"
13110-229 = "……是的。#n如此一來，列車砲的權利就會屬於阿拜多斯學生會。"
13110-230 = "嗯，雖然費用只能像現在這樣慢慢還，但私募基金也會失去對列車砲動手的權利。"
13110-231 = "接著只要在這段期間翻遍沙漠，找出列車砲並破壞掉就行了。"
13110-233 = "有道理，這樣就能輕鬆解決了吧？"
13110-234 = "是這麼說沒錯……"
13110-236 = "不，事情沒這麼簡單。小鳥遊星野。"
13110-241 = "首先這件事「私募基金」也心知肚明。#n所以一定會試圖阻止你出席大會進行公證。"
13110-242 = "嗯？試圖阻止……要怎麼阻止呢……？"
13110-243 = "方法很簡單吧？#n派數百名傭兵封鎖阿拜多斯中央車站的區政廳大樓，不讓任何人進入就行了。"
13110-244 = "什麼！？"
13110-249 = "私募基金成員所僱用的傭兵，現在恐怕已經動用裝甲車、直升機、高射炮、路障……將中央車站的區政廳圍堵得水洩不通了吧。"
13110-251 = "中央車站區政廳大樓．東側地區"
13110-256 = "……好，追加兵力往那邊去吧。"
13110-258 = "走吧！該工作了！"
13110-264 = "中央車站區政廳大樓．西側通道"
13110-270 = "好，戰鬥直升機也到了。"
13110-271 = "戰車負責死守指定位置，市場守衛則負責強化封鎖區域。"
13110-276 = "中央車站區政廳大樓．南側空地"
13110-278 = "計畫都清楚了吧？"
13110-280 = "當然，既然收了錢就會好好辦事。"
13110-286 = "「列車砲」……呵呵。#n那可是格黑娜的雷帝留下的遺產，豈有不拿到手的道理。"
13110-288 = "中央車站區政廳大樓．北側通道"
13110-293 = "來來來，把路障堆在這裡，盡可能堆厚一點。"
13110-297 = "挖土機、推土機、怪手……把能用的全都派過來。"
13110-307 = "呵呵呵……只要他明天12點之前到不了這裡，列車砲就歸我們所有了。"
13110-308 = "做得到就試試看吧，呵呵……"
13110-310 = "什麼！？有必要做到那種地步嗎！？"
13110-311 = "哼……數百人啊？"
13110-312 = "唔嗯……"
13110-313 = "這麼龐大的兵力……只憑我們5個人……"
13110-315 = "有，有老師在應該有辦法吧？"
13110-316 = "不，「夏萊」的老師沒理由介入這場私人交易。"
13110-320 = "你在說什麼啊！？明明是他們在妨礙契約執行啊！"
13110-322 = "不，茜香醬……這恐怕沒辦法證明。"
13110-324 = "為，為什麼？"
13110-325 = "你想想看，召開大會的地點為什麼偏偏選在中央車站的區政廳大樓呢？#n因為那裡是「沙漠橫貫鐵路」數十條路線交匯的中心區域。"
13110-326 = "啊……！#n「沙漠橫貫鐵路」的權利，除了附加設施使用權之外都歸私募基金所有……"
13110-327 = "沒錯，那些傢伙八成會主張只是在保護自己的私有地。"
13110-328 = "哪，哪有這樣的！"
13110-334 = "話說回來，要出席大會的是星野你一個人──還是跟其他人一起呢？"
13110-336 = "嗯？那當然是……"
13110-337 = "當然是在場的5個人一起去。"
13110-342 = "……抱歉，是我問錯問題了。"
13110-343 = "你們是以「阿拜多斯學生會」的身分參加，還是以「對策委員會」的身分參加呢？"
13110-344 = "咦？那，那個……"
13110-345 = "學生會長夢在契約中代表的是阿拜多斯學生會……但是那如今只剩下名義而已吧？"
13110-346 = "既然如此，你們必須決定何者才是真正的學生會，並且關閉另一個社團才行。"
13110-347 = "不過話雖如此，這也是成功突破之後的問題。#n現在討論這件事的意義並不大。"
13110-348 = "……"
13110-350 = "簡單來說，參加大會的方法只有強行突破對吧。"
13110-351 = "不，那實在太困難了，白子前輩。"
13110-353 = "……嗯，那是不可能的。必須想想其他方法才行。"
13110-355 = "……當然還有其他方法，大小姐。"
13110-363 = "而且還是更輕鬆簡單的方法──#n只要大小姐重新入學高地人鐵道學園，並成為學生會長就行了。"
13110-364 = "什麼……？"
13110-370 = "我會讓大小姐成為高地人鐵道學園的學生會長。#n接著只要行使「奈芙蒂斯」幹部的權力，就能取消這筆契約。"
13110-371 = "奈芙蒂斯的幹部，以及高地人鐵道學園的學生會長……#n如此一來就能掌握私募基金的兩個勢力。要將契約當作沒發生也不是不可能的。"
13110-372 = "這……或許是這樣沒錯……"
13110-373 = "可是這麼一來，我就必須離開阿拜多斯……"
13110-375 = "駁回。"
13110-376 = "就是啊！你在胡說什麼啊！？野乃美前輩為什麼要離開這裡？"
13110-381 = "說的沒錯，我拒絕這種做法。我不想離開阿拜多斯！！"
13110-382 = "那才不是解決方案！"
13110-383 = "我想也是。#n要改變大小姐的倔強……不，要拗過您的固執是很困難的。"
13110-384 = "此外還有第三種方法……#n雖然現在看來，似乎也行不通……"
13110-388 = "第三種方法……？是什麼方法？"
13110-389 = "這個方法雖然有點過於激進……"
13110-390 = "沒關係！請告訴我吧。"
13110-394 = "我明白了。#n我所謂的第三種方法……"
13110-395 = "那就是……讓沙漠橫貫鐵路的買賣契約本身失效。"
13110-396 = "……？"
13110-397 = "也就是要主張契約當事者「阿拜多斯學生會」，其實並不具備學生會的權限。"
13110-398 = "咦！？"
13110-404 = "由梔子夢和小鳥遊星野組成的「阿拜多斯學生會」並非正式學生會──#n而是未經認可的冒牌組織……必須如此公證。"
13110-405 = "那，那是什麼意思……"
13110-406 = "那名學生會長只是前任學生會的成員，經由舉手表決選出來的對吧？#n要否定其正當性並不是不可能。"
13110-407 = "只要身為學生會成員的小鳥遊星野出席大會並承認這個事實，#n並且作為契約對象的我們也認可的話，契約本身就會失效。"
13110-408 = "如此一來，契約的結果將不會是取消或中止，而是會變得不曾存在。"
13110-409 = "那麼無論是否屬於「私募基金」，列車砲的權利都將100%歸我們奈芙蒂斯所有。"
13110-410 = "你在說什麼！！怎麼可能用那種方法……！！"
13110-411 = "……是啊，所以我才會說這個方法行不通。"
13110-412 = "……"
13110-413 = "總之我們已經說出了沙漠橫貫鐵路的祕密，可惜似乎沒能找出解決的好辦法……"
13110-417 = "期限只到明天12點。#n一旦過了這個時間，「私募基金」就會取得列車砲。"
13110-418 = "我們這邊也會再想想辦法。#n如果各位找出了什麼好方法，還請聯絡我們。"
13110-419 = "那麼明天的債權團大會上見吧。#n另外，今天的對話請別讓私募基金發現。"
13110-420 = "告辭。"
13110-429 = "……唔嗯。"
13110-430 = "嗯。"
13110-435 = "……"
13110-440 = "來來來，大家別發呆了，繼續開會吧。"
13110-441 = "星野前輩……"
13110-442 = "野乃美醬，大叔我沒問題的。#n而且不是沒時間了嗎？"
13110-443 = "明天中午前就要找到方法，所以期限只到今晚……我們應該認真思考，對吧？"
13110-445 = "嗯，前輩說的對。#n好好想想總會有辦法的。"
13110-447 = "是……"
13110-448 = "哎呀～白子醬總是這麼正向呢。#n大家要多向白子醬學習哦。"
13110-450 = "嗯……"
13110-452 = "為，為什麼突然就稱讚起來了啊！？"
13110-453 = "啊哈哈……#n剛才畢竟說了這麼多複雜的事……"
13110-457 = "大家稍微休息一下再集合吧。"
13110-459 = "下一話;對策委員會的起點"

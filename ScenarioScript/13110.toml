13110-375 = "ไม่อนุมัติ"
13110-376 = "ใช่! พูดอะไรเหลวไหลชะมัด! ทำไมรุ่นพี่โนโนมิต้องออกจากโรงเรียนนี้ด้วยล่ะ?"

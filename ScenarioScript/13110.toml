13110-417 = "พรุ่งนี้ก่อนเที่ยงนะครับ ถ้าเลยเวลานั้นไป ปืนแม่เหล็กไฟฟ้าก็จะตกอยู่ในกำมือของ <กองทุนไพรเวทอิควิตี้> ครับ"

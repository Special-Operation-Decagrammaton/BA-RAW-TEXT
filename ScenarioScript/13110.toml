[translation]
13110-1 = "ตอนที่ 11;ความลับเปิดเผย"
13110-8 = "เชิญนั่งตรงนี้ค่ะ..."
13110-9 = "ขอบคุณครับ... ที่นี่คือห้องคณะกรรมการแผนงานสินะครับ ไม่คิดเลยนะครับว่าจะได้มาที่นี่แบบนี้..."
13110-14 = "อ่า อย่างที่บอกไปเมื่อวานว่าผู้ควบคุมสุโอคือคนที่เนฟธิสว่าจ้างไว้น่ะครับ ครั้งนี้ก็มาคุ้มกันผมอยู่ครับ"
13110-15 = "ฉันออกไปก่อนดีกว่า..."
13110-19 = "ไม่ได้เจอกันมา 2 ปีเลยนะครับ ระหว่างนั้นไม่ได้มีเรื่องอะไรใช่มั้ยครับ คุณหนู?"
13110-20 = "ค่ะ... ต้องขอบคุณด้วยค่ะ"
13110-21 = "แล้วเรื่องวงเงินบัตรเครดิต ติดปัญหาอะไรหรือเปล่าครับ? ถ้าคุณหนูเอาบัตรใบนั้นมาคืน ผมจะเปลี่ยนบัตรแล้วเพิ่มวงเงินให้ครับ"
13110-22 = "มะ... ไม่ค่ะ ไม่จำเป็นหรอกค่ะ ฉันไม่ได้ใช้อะไรเยอะอยู่แล้ว..."
13110-23 = "งั้นเหรอครับ... แล้วไม่คิดจะกลับมาเหรอครับ? "
13110-24 = "คะ? กลับไปงั้นเหรอคะ...?"
13110-25 = "ถ้าคุณหนูตัดสินใจตอนนี้ ผมสามารถส่งคุณหนูกลับเข้าไปเรียนที่ไฮแลนเดอร์ได้นะครับ"
13110-26 = "อ่า... เอ่อ..."
13110-28 = "นี่ เห็นมั้ยว่าโนโนมิลำบากใจน่ะ "
13110-29 = "อืม เข้าเรื่องได้แล้ว"
13110-31 = "ครับ? อะ... เอ่อ..."
13110-32 = "นี่เป็นสิ่งที่ทางเราพูดได้น่ะ"
13110-33 = "เดิมทีเนฟธิสกับไฮแลนเดอร์มีแผนการที่จะเป็นพันธมิตรด้านอุตสาหกรรมและการศึกษากัน แต่พอ#nคุณหนูเปลี่ยนใจมาอยู่ที่อะบิดอสทั้งๆ ที่ตอนแรกจะไปไฮแลนเดอร์ ความร่วมมือที่ว่านั่นก็เกือบแตกหัก"
13110-35 = "..."
13110-36 = "กับฝ่ายที่ยอมรับความดื้อดึงและยอมจำนนต่อความเสียหายที่เกิดขึ้นจากคุณหนูแล้ว พวกคุณไม่คิดว่า#nมันเสียมารยาทไปหน่อยเหรอ?"
13110-42 = "เดี๋ยวก่อน! อดทนไว้! รุ่นพี่ชิโรโกะ! เราจะก่อปัญหาอะไรเพิ่มอีกไม่ได้นะ!"
13110-43 = "อะ... อื้ม ฉันก็ไม่ได้จะทำอะไร..."
13110-45 = "จะทำก็ได้นะ ถ้าพร้อมก็เข้ามาได้เลย แล้วฉันจะเป็นคู่ต่อสู้ให้"
13110-46 = "สุโอ ขอร้องละครับ ได้โปรดอดทนหน่อย"
13110-47 = "ฮึ่ม..."
13110-51 = "ต้องขออภัยด้วยครับ คุณหนู ผมไม่ได้มาที่นี่เพื่อบอกให้คุณหนูกลับมาหรอกครับ"
13110-53 = "ค่ะ ถ้างั้นก็รีบเข้าประเด็นเถอะค่ะ..."
13110-54 = "ครับ... เรื่องความลับที่ซ่อนอยู่ในทางรถไฟข้ามทะเลทราย..."
13110-56 = "..."
13110-57 = "..."
13110-62 = "ถ้าจะให้สรุปก็คือ ใน <ทางรถไฟข้ามทะเลทราย>..."
13110-63 = "มันมีแผนการสร้าง <อาวุธยุทโธปกรณ์อสมมาตร> ที่สภานักเรียนอะบิดอสเป็นผู้นำ และมีเซนต์เนฟธิส ดำเนินการให้อย่างลับสุดยอดซ่อนอยู่ครับ"
13110-69 = "คะ...?!"
13110-70 = "สภานักเรียน...?"
13110-72 = "ยุทโธปกรณ์อสมมาตร?"
13110-73 = "หมายถึง... อาวุธเหรอ?"
13110-75 = "ครับ ใช่แล้วครับ และชื่อของอาวุธอันนั้นก็คือ..."
13110-76 = "<ปืนแม่เหล็กไฟฟ้าแบบรางคู่ขนาน เชมาตา>"
13110-82 = "<เชมาตา> คือปืนแม่เหล็กไฟฟ้าแบบรางคู่ขนาน... ไม่สิ เป็นป้อมขนาดมหึมาที่มีน้ำหนัก ระยะยิง และพลังทำลายเกินขอบเขตมาตรฐานทั่วไปครับ"
13110-83 = "ถ้าสิ่งที่วิ่งอยู่บน <ทางรถไฟข้ามทะเลทราย> ที่กระจายอยู่เหมือนใยแมงมุมในเขตปกครองตนเอง#nอะบิดอสที่กว้างใหญ่ไพศาลนั่นไม่ใช่รถบรรทุกหรือตู้โดยสาร..."
13110-84 = "แต่เป็นป้อมทิ้งระเบิดเชิงกลยุทธ์พร้อมปืนระยะไกลสุดขั้วที่สามารถยิงหัวรบระเบิดแรงสูงขนาด 1,200 มม. ที่หนักกว่า 1 ตันไปได้ไกลกว่า 500 กม. ล่ะ?"
13110-85 = "แผนการนี้เริ่มจากความคิดที่เพ้อฝันแบบนั้นละครับ"
13110-86 = "และเมื่อเสร็จสมบูรณ์แล้ว ก็จะก่อกำเนิด[ruby=Asymmetric Power]พลังงานไฟฟ้าที่ไม่สมดุล[/ruby]ที่จะข่มเขตปกครองตนเองรอบๆ ได้ครับ"
13110-89 = "อาวุธ... งั้นเหรอ"
13110-94 = "ดะ... เดี๋ยวนะคะ! นี่คุณบอกว่าสภานักเรียนอะบิดอสกำลังทำอาวุธอะไรแบบนี้งั้นเหรอคะ...?#nทะ... ทำไมล่ะคะ...?!"
13110-95 = "มันก็เห็นได้ชัดอยู่แล้วนี่?"
13110-96 = "ก็มันเป็นเครื่องมือชวนหลงใหลที่แก้ไขปัญหาหนี้สินของอะบิดอสได้ไงล่ะ"
13110-97 = "คะ... เครื่องมือเหรอ...?"
13110-98 = "ใช่ ถ้ามีอาวุธที่ทรงพลังนี่ ก็มีวิธีมากมายที่จะทำกำไรจากอะบิดอสได้ ถึงมันอาจจะไม่ใช่วิธีที่ถูกต้อง แต่ของแบบนี้มันไม่ได้หากันได้ง่ายๆ ในคิโวทอสใช่มั้ยล่ะ?"
13110-100 = "มะ... ไม่นะ..."
13110-101 = "ชื่อ <เชมาตา>... มาจากประธานสภานักเรียนคนนั้นเหรอคะ? "
13110-103 = "ใช่ ก็รู้ดีนี่? กำปั้นเหล็ก เชมาตา"
13110-105 = "หมายถึงอะไรเหรอ...?"
13110-106 = "ฉายาของประธานสภานักเรียนในตำนาน คนที่ยุติยุคแห่งความสับสนวุ่นวายที่ประธานสภานักเรียน 70 คนในอดีตก่อไว้ แล้วนำอะบิดอสมาสู่ยุคทองน่ะ..."
13110-107 = "ว่าไงนะ? 70 คน?!"
13110-109 = "ถึงฉันจะไม่ได้จบจากอะบิดอส... แต่ฉันก็เรียนรู้ประวัติศาสตร์ของที่แห่งนี้มาบ้าง"
13110-110 = "ครั้งหนึ่งอะบิดอสเคยเป็นเขตปกครองตนเองที่แข็งแกร่งที่สุดในคิโวทอส ว่ากันว่าทุกเขตปกครองตนเองในคิโวทอสทั้งกลัวและอิจฉาอะบิดอสเลยละ"
13110-111 = "การตั้งชื่อปืนแม่เหล็กไฟฟ้าแบบนั้นมันก็น่าสนใจดีว่ามั้ยล่ะ? แค่ได้ยินชื่อก็รู้ได้เลยว่าต้องการอะไรจาก#nสิ่งนั้น"
13110-112 = "ใช่... อาวุธที่มีอานุภาพเป็นวิธีการหาเงินที่ชัดเจนที่สุดแล้ว "
13110-114 = "รุ่นพี่โฮชิโนะ..."
13110-115 = "ถ้าเป็นอย่างนั้น... ก็สรุปว่า <ทางรถไฟข้ามทะเลทราย> คือธุรกิจตบตาของเนฟธิสเพื่อปกปิดอาวุธนี้#nอย่างนั้นเหรอคะ?"
13110-120 = "มะ... ไม่ครับ ไม่ใช่อย่างนั้นครับ! ผมไม่ใช่คนที่รับผิดชอบ ก็เลยไม่ค่อยรู้เรื่องเท่าไร แต่ธุรกิจทางรถไฟ#nข้ามทะเลทรายนั้นมีมาก่อนอยู่แล้ว ส่วนแผนการ <ปืนแม่เหล็กไฟฟ้า> เพิ่งถูกเพิ่มมาทีหลังครับ"
13110-121 = "พอธุรกิจที่น่าปวดหัวนี้ทำกำไรไม่ได้ ก็เลยมีบางคนมาเสนอไอเดียเปลี่ยนแปลงธุรกิจนี้ให้กับทางสภา#nนักเรียนน่ะครับ...!"
13110-122 = "คะ? ใครเหรอคะ? ใครกันที่ทำเรื่องแบบนี้..."
13110-123 = "เรื่องนั้นผมเองก็ไม่แน่ใจครับ เพราะธุรกิจนี้ถูกดำเนินการอย่างลับสุดยอด... "
13110-125 = "ใจเย็นๆ ก่อนเถอะคุณหนู ถ้ามันเป็นไปตามแผนการก็คงอีกเรื่อง แต่นี่มันถูกยกเลิกไปก่อน"
13110-126 = "ใช่ครับ! ใช่เลยครับ! สุดท้ายแล้วแผนการนี้ก็เป็นการตบตาครับ... เราสรุปได้ว่าไอเดียนั้นคือการ#nจินตนาการเกินจริงและเป็นการหลอกลวงครับ!"
13110-127 = "เชมาตามีขนาดใหญ่เกินกว่าอาวุธที่มีในตอนนี้มาก และในความเป็นจริงแล้ว อาวุธที่มีขนาดมหึมา#nแบบนั้นคงไม่สามารถเคลื่อนไหวและทำงานได้ตามปกติหรอกครับ"
13110-128 = "ขนาดของมันเป็นข้อจำกัดทางกายภาพครับ ผู้ที่ออกแบบอาจจะเชื่อมั่นในตนเองสูง แต่สุดท้ายแล้ว#nเครื่องยนต์ของปืนแม่เหล็กไฟฟ้าก็ไม่ทำงานครับ ทั้งพวกผมและสภานักเรียนก็โดนหลอกกันหมดครับ"
13110-129 = "เพราะแบบนั้นแผนการปืนแม่เหล็กไฟฟ้าก็เลยชะงักไป แล้วก็ถูกทิ้งไว้ที่ไหนสักแห่งในทะเลทราย#nอะบิดอสทั้งๆ ที่ยังไม่เสร็จสมบูรณ์ครับ"
13110-130 = "จนกระทั่งเมื่อไม่นานมานี้..."
13110-136 = "เมื่อไม่นานมานี้มีการพัฒนาอัลกอริทึมใหม่ และมีการตั้งสมมติฐานว่าปืนแม่เหล็กไฟฟ้าสามารถใช้งาน#nได้ในความเป็นจริงครับ"
13110-137 = "ผมก็ไม่รู้ว่าคนที่ออกแบบมันขึ้นมาคาดคะเนอนาคตได้หรือว่าแค่บังเอิญกันแน่..."
13110-139 = "คลังสมบัติแห่งเทคโนโลยีล้ำสมัย อาวุธเชิงกลยุทธ์ที่เคลื่อนที่ได้ แค่มีไว้ก็สามารถยับยั้งพฤติกรรม#nของฝ่ายตรงข้ามได้"
13110-140 = "ตอนนี้ <ปืนแม่เหล็กไฟฟ้า> เป็นสิ่งที่ไม่ต่างจากเหมืองทองคำแล้ว"
13110-141 = "และก่อนที่เหมืองทองคำนี้จะกลายเป็นที่รู้จัก ก็มีกลุ่มคนที่เริ่มลงมือทำอะไรอย่างรวดเร็วปรากฏตัวขึ้น"
13110-142 = "ใช่ครับ นั่นเป็นเหตุผลว่าทำไม <กองทุนไพรเวทอิควิตี้> ถึงได้ยึดติดกับสิทธิ์ในการใช้สิ่งอำนวยความ#nสะดวกของทางรถไฟข้ามทะเลทรายครับ "
13110-146 = "เพราะปืนแม่เหล็กไฟฟ้าจัดเป็นสิ่งอำนวยความสะดวกของทางรถไฟข้ามทะเลทรายน่ะครับ... ถ้าได้สิทธิ์ที่รวมอยู่ในพันธบัตร ก็จะได้รับสิทธิ์ในการใช้ประโยชน์ปืนแม่เหล็กไฟฟ้าไปด้วยครับ"
13110-147 = "เป้าหมายของหลายกลุ่มอำนาจที่อยู่ในกองทุนไพรเวทอิควิตี้อาจจะแตกต่างกันได้บ้าง แต่พวกเขา#nต่างก็อยากได้ <ปืนแม่เหล็กไฟฟ้า> มาไว้ในครอบครองและจะหาผลประโยชน์จากมันครับ"
13110-150 = "แล้วก็มาเข้าหาเนฟธิสที่ถูกลืมเลือนไป จากนั้นก็มาเสนอการลงทุน"
13110-151 = "เพราะสำหรับพวกเราแล้ว <ทางรถไฟข้ามทะเลทราย> คือข้อมูลทางประวัติศาสตร์ที่อยากรักษาไว้ เป็นทั้งบทเรียนสอนใจและเป็นการนำสิ่งที่ไม่ดีของผู้อื่นมาปรับแก้ไขให้ดีด้วย... เราก็เลยเห็นชอบครับ"
13110-154 = "..."
13110-155 = "ถึงเราจะมารู้ธาตุแท้ของแผนการนี้ในภายหลัง แต่ตอนนี้เราก็ไม่สามารถถอนตัวจาก <กองทุนไพรเวทอิควิตี้> ได้แล้วครับ..."
13110-156 = "เราจะให้ปืนแม่เหล็กไฟฟ้าตกไปอยู่ในมือของ <กองทุนไพรเวทอิควิตี้> ไม่ได้ครับ "
13110-157 = "นั่นสินะ เพราะทันทีที่อาวุธแบบนั้นตกไปอยู่ในมือของพวกคนร้าย อะบิดอสก็คงตกอยู่ในวังวนของ#nความโกลาหลอันใหญ่หลวงเลยละ"
13110-159 = "งั้นพวกเราก็แค่ไปหาให้เจอแล้วทำลายทิ้งสิ?"
13110-160 = "รู้ตำแหน่งของปืนแม่เหล็กไฟฟ้ามั้ยคะ คุณพ่อบ้าน?"
13110-162 = "ไม่ครับ... ทั้งพวกเราและกองทุนต่างก็ไม่รู้ครับว่ามันอยู่ที่ไหน"
13110-163 = "แผนการนี้เป็นความลับสุดยอด พวกเอกสารที่เกี่ยวข้องก็น่าจะถูกทำลายไม่เหลือแม้แต่ฉบับเดียวแล้ว#nครับ มันเป็นธุรกิจที่ถึงรู้ไปก็ไม่มีอะไรดีขึ้นมาน่ะครับ"
13110-168 = "งั้นเหรอ..."
13110-169 = "ถ้ามาคิดดูตอนนี้ เหตุผลที่ <กองทุนไพรเวทอิควิตี้> มาเข้าหาเราก็น่าจะเพราะอยากได้ตำแหน่งของ#nปืนแม่เหล็กไฟฟ้านั่นน่ะครับ"
13110-170 = "แต่การหาปืนแม่เหล็กไฟฟ้านั่นก็ขึ้นอยู่กับเวลาเท่านั้นครับ เพราะถ้าไฮแลนเดอร์เริ่มก่อสร้างทางรถไฟ#nข้ามทะเลทรายใหม่ ตำแหน่งก็คงจะถูกเปิดเผยในไม่ช้าครับ"
13110-171 = "ถึงแม้ตอนนี้ทางไฮแลนเดอร์จะไม่รู้เกี่ยวกับปืนแม่เหล็กไฟฟ้าเลย แต่พวกนั้นก็คลั่งไคล้เรื่องรถไฟ#nเป็นอย่างมาก เลยทำให้มั่นใจในความสามารถได้แน่นอนครับ"
13110-172 = "นอกจากนั้น ทางกองทุนยังพยายามที่จะได้ปืนแม่เหล็กไฟฟ้านี้มาด้วยสัญญาที่สมเหตุสมผล ถ้าพวกคุณไปทำลายโดยพลการ ก็ต้องชดใช้ความเสียหายอย่างใหญ่หลวงเลยครับ"
13110-173 = "สัญญาที่สมเหตุสมผลงั้นเหรอคะ...?"
13110-174 = "ครับ อาจเป็นเพราะปืนแม่เหล็กไฟฟ้าเป็นวัตถุที่ตัวตนและกรรมสิทธิ์ยังไม่ชัดเจน พวกนั้นก็เลยยึดติด#nกับมันครับ"
13110-175 = "ผู้นำคือสภานักเรียนอะบิดอส ผู้ดำเนินการคือเนฟธิส และผู้เสนอไอเดียการออกแบบก็มีต่างหาก... แถมสิทธิ์ของมันก็ผูกติดอยู่กับพันธบัตรอีก "
13110-176 = "สำหรับนักธุรกิจแล้ว มันเป็นตัวเลือกที่สมเหตุสมผลเลยครับ ต้องยุติความเกี่ยวเนื่องทางกฎหมายให้#nชัดเจน ถึงจะไม่มีปัญหาตามมาครับ"
13110-177 = "ถ้าอย่างนั้นทางไคเซอร์ไม่รู้เกี่ยวกับ <ปืนแม่เหล็กไฟฟ้า> เลยเหรอคะ? ทำไมถึงได้ขายพันธบัตรไป#nอย่างง่ายดายล่ะคะ?"
13110-178 = "นั่นสิครับ ถึงจะบอกว่ารู้อยู่แล้ว แต่ทางไคเซอร์ก็ไม่น่าจะสนใจเกี่ยวกับ <ปืนแม่เหล็กไฟฟ้า> หรอกครับ เพราะตอนนี้ประธานใหญ่ของไคเซอร์น่าจะสนใจแซงค์ทัมทาวเวอร์มากกว่า..."
13110-179 = "แล้วไคเซอร์ก็ได้ผลประโยชน์มหาศาลจากการขายพันธบัตรไปแล้ว ตอนนี้อาจจะไม่สนใจกับข่าวลือ#nแบบนั้นแล้วก็ได้..."
13110-183 = "แต่แล้วในตอนนี้ก็ดันเกิดเรื่องที่ไม่มีใครคาดคิดขึ้นน่ะครับ..."
13110-187 = "หนังสือสัญญาของประธานสภานักเรียนอะบิดอสคนก่อนถูกค้นพบครับ "
13110-189 = "ผมไม่รู้ว่าทำไมถึงมีหนังสือสัญญาแบบนี้... แต่ในเมื่อมันถูกเปิดเผยออกมา สิทธิ์ของปืนแม่เหล็กไฟฟ้า#nก็เลยจะไม่ตกไปอยู่กับกองทุนไพรเวทอิควิตี้ครับ"
13110-190 = "เดี๋ยวก่อน... ทางเนฟธิสไม่รู้อะไรเกี่ยวกับหนังสือสัญญานี้เลยเหรอ?"
13110-191 = "ทำไมรุ่นพี่ยูเมะ... ทำไมประธานสภานักเรียนถึงได้ทำสัญญาฉบับนี้ขึ้นมาล่ะ? ตอนนั้นมันเกิดเรื่องอะไร#nขึ้นกันแน่?"
13110-193 = "รุ่นพี่โฮชิโนะ..."
13110-198 = "ไม่ครับ... อย่างที่บอกไปว่าพวกเราก็ไม่รู้เลยว่ามีหนังสือสัญญาฉบับนี้ จนกระทั่งมันถูกค้นพบนี่ละครับ แต่เรื่องที่เกิดขึ้นและผลลัพธ์หลังจากนั้น ทางเรายังวิเคราะห์ไม่ได้ครับ"
13110-199 = "..."
13110-200 = "ตอนนั้นเป็นช่วงที่เนฟธิสใกล้จะล้มละลาย สินทรัพย์ทั้งหมดที่มีก็เลยถูกขายออกไปในราคาที่ถูกมาก#nน่ะครับ "
13110-201 = "และเพราะแบบนั้น สิทธิ์ในทรัพย์สินที่ไร้ประโยชน์อย่างทางรถไฟข้ามทะเลทรายก็เลยถูกขายให้กับ#nสภานักเรียนครับ"
13110-202 = "..."
13110-203 = "แต่ทางกองทุนไพรเวทอิควิตี้ก็พยายามจัดการหนังสือสัญญาฉบับนี้ก่อน เพราะอย่างที่บอกไปว่า#nขั้นตอนการทำสัญญาที่เหมาะสมคือสิ่งสำคัญสำหรับพวกเขาครับ"
13110-204 = "พวกเขาก็เลยรีบเปิดการประชุมสมัชชาเจ้าหนี้เพื่อจะยกเลิกสัญญานี้ให้ได้อย่างชัดเจนครับ"
13110-209 = "พรุ่งนี้แล้วค่ะ... พรุ่งนี้ตอนเที่ยง ที่สำนักงานสถานีกลางอะบิดอส..."
13110-210 = "ครับ... ใช่ครับ กองทุนไพรเวทอิควิตี้คงมาที่ <สภานักเรียนอะบิดอส> ที่เป็นลูกหนี้เพื่อแจ้งให้มาเข้า#nร่วมอย่างชัดเจนน่ะครับ "
13110-211 = "เพื่อบอกให้ตัวแทนของสภานักเรียนมาเข้าร่วมการประชุมแล้วยกเลิกสัญญา หรือถ้าไม่ได้มาเข้าร่วม#nการประชุม สัญญาก็จะไม่มีผลในทางกฎหมาย แล้วสิทธิ์ก็จะตกไปอยู่กับเนฟธิสที่เป็นเจ้าของเดิมครับ "
13110-215 = "คะ?! งั้นก็แปลว่า...?!"
13110-216 = "ไม่ครับ... ยังไงเนฟธิสก็ยังเป็นสมาชิกของ <กองทุนไพรเวทอิควิตี้> ครับ"
13110-217 = "ต่อให้มีการซื้อพันธบัตรในนามเนฟธิส สิทธิ์นี้ก็จะตกเป็นของ <กองทุนไพรเวทอิควิตี้> พวกผมไม่สามารถจัดการอะไรได้ตามใจหรอกครับ"
13110-222 = "ถ้าอย่างนั้นก็เหลือแค่วิธีเดียวสินะ..."
13110-228 = "ฉันต้องไปเข้าร่วมการประชุมสมัชชาเจ้าหนี้ แล้วประกาศว่าจะคงสัญญานี้ไว้"
13110-229 = "ครับ... ถ้าเป็นอย่างนั้นสิทธิ์ของปืนแม่เหล็กไฟฟ้าก็จะตกเป็นของสภานักเรียนอะบิดอสเหมือนเดิมครับ"
13110-230 = "อื้ม เรื่องเงินน่ะ เราคงไม่มีทางเลือกอื่นนอกจากค่อยๆ ชดใช้ให้เหมือนตอนนี้ แต่ถ้าสิทธิ์ของปืนแม่เหล็กไฟฟ้าเป็นของเราละก็ กองทุนไพรเวทอิควิตี้ก็จะแตะต้องปืนไม่ได้"
13110-231 = "แล้วระหว่างนั้นเราก็ไปค้นหาปืนแม่เหล็กไฟฟ้าให้ทั่วทะเลทราย แล้วก็ทำลายมันซะ "
13110-233 = "นั่นสินะ ถ้าอย่างงั้นก็คลี่คลายเรื่องนี้ได้ง่ายๆ เลยนี่"
13110-234 = "มันก็จริงอยู่หรอก..."
13110-236 = "ไม่หรอก แบบนั้นน่าจะยากนะ ทาคานาชิ โฮชิโนะ"
13110-241 = "ทาง <กองทุนไพรเวทอิควิตี้> รู้เรื่องนั้นดีอยู่แล้ว พวกนั้นต้องพยายามขัดขวางไม่ให้เธอมาเข้าร่วม#nประชุมได้อย่างแน่นอน"
13110-242 = "คะ? จะขัดขวางเหรอคะ... ขัดขวางยังไงกัน...?"
13110-243 = "มันก็ง่ายๆ หรือเปล่า? ก็แค่ใช้ทหารรับจ้างหลายคนล้อมสำนักงานสถานีกลางอะบิดอสไว้ไง แค่นี้เธอก็เข้าไปในอาคารไม่ได้แล้ว"
13110-244 = "ว่าไงนะ?!"

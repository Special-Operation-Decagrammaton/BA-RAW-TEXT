13110-324 = "ทะ... ทำไมล่ะ?"
13110-325 = "คิดว่าทำไมสถานที่เปิดการประชุมถึงเป็นสำนักงานสถานีกลางล่ะ? เพราะที่นั่นเป็นศูนย์กลางที่ทาง#nรถไฟหลายสิบสายของ <ทางรถไฟข้ามทะเลทราย> มาบรรจบกันยังไงล่ะ "
13110-326 = "อ๊ะ...! เพราะถ้าไม่นับสิทธิ์ในการใช้สิ่งอำนวยความสะดวกเสริมของ <ทางรถไฟข้ามทะเลทราย> สิทธิ์อื่นทั้งหมดที่นั่นก็เป็นของกองทุนไพรเวทอิควิตี้..."
13110-327 = "ใช่ คนพวกนั้นก็แค่อ้างว่ากำลังปกป้องพื้นที่ส่วนบุคคลของตัวเอง"
13110-328 = "ทะ... ทำแบบนั้นได้ยังไง! "
13110-334 = "ว่าแต่... คนที่จะไปเข้าร่วมการประชุมคือเธอเหรอ โฮชิโนะ? หรือว่าคนอื่น?"
13110-336 = "หืม? มันก็... แน่นอนอยู่แล้ว..."
13110-337 = "ทั้ง 5 คนที่นี่ต้องไปกันทั้งหมด"
13110-342 = "ไม่สิ... ฉันถามผิดแล้วละ"
13110-343 = "พวกเธอจะเข้าร่วมในนามของ <สภานักเรียนอะบิดอส> หรือ <คณะกรรมการแผนงาน> กันล่ะ?"
13110-344 = "คะ? ระ... เรื่องนั้น..."
13110-345 = "ชื่อในหนังสือสัญญาที่ประธานสภานักเรียนยูเมะระบุไว้คือ <สภานักเรียนอะบิดอส> แต่เห็นว่าสภานักเรียนที่ว่าคงอยู่แค่ในนามใช่มั้ย? "
13110-346 = "ถ้าอย่างนั้นพวกเธอก็ต้องกำหนดว่าจะให้อะไรเป็นสภานักเรียนตัวจริงกันแน่ แล้วส่วนที่ไม่ได้เลือกก็#nต้องปิดไป"
13110-347 = "เอาเถอะ นี่จะเป็นปัญหาเมื่อพวกเธอฝ่าการขีดขวางนั้นไปได้ ไม่ใช่สิ่งสำคัญในตอนนี้หรอก"
13110-348 = "..."
13110-350 = "เอาเป็นว่าถ้าเราจะเข้าร่วมการประชุม เราต้องฝ่าสิ่งขีดขวางไป"
13110-351 = "มันไม่ใช่เรื่องง่ายๆ เลยนะ รุ่นพี่ชิโรโกะ "
13110-353 = "ใช่ค่ะ... มันเกินกำลังพวกเรา เราต้องหาวิธีอื่นค่ะ"
13110-355 = "มีวิธีอื่นอยู่ครับ... คุณหนู"
13110-363 = "เป็นวิธีที่ทั้งง่ายและสะดวกกว่ากันเยอะเลยครับ แค่คุณหนูกลับเข้าไปเรียนที่ไฮแลนเดอร์แล้วขึ้นเป็น#nประธานสภานักเรียนครับ"
13110-364 = "คะ...?"
13110-370 = "ผมจะทำให้คุณหนูเป็นประธานสภานักเรียนของไฮแลนเดอร์แล้วเป็นผู้บริหารของ <เนฟธิส> และถ้าคุณหนูใช้อิทธิพล ก็สามารถยกเลิกสัญญานี้ได้ครับ"
13110-371 = "ถ้าเป็นทั้งผู้บริหารเนฟธิสและประธานสภานักเรียนไฮแลนเดอร์... ก็เท่ากับว่าจะได้อำนาจของกองทุน#nไพรเวทอิควิตี้มาไว้ในกำมือ 2 อย่าง และการยกเลิกสัญญาก็จะไม่ใช่เรื่องที่เป็นไปไม่ได้ครับ"
13110-372 = "ระ... เรื่องนั้น... มันก็จริงอยู่..."

13110-382 = "แบบนั้นมันไม่ใช่วิธีแก้ปัญหาหรอกค่ะ!"
13110-383 = "ครับ ผมก็ทราบครับว่าคุณหนูจะไม่เห็นด้วย เพราะความดึงดัน... ไม่สิ ความดื้อรั้นของคุณหนูนั้นมันยากเกินจะต้านทานนี่ครับ"
13110-384 = "แต่นอกจากนี้ก็มีวิธีที่ 3 ด้วย... แต่ถึงพูดไปก็คงเป็นไปไม่ได้อีก..."

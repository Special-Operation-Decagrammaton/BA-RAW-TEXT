[translation]
70000020-1 = "可疑的交流會（２）"
70000020-2 = "（──於是，赤冬事務局和萬魔殿的交流會開始了）"
70000020-6 = "嘻嘻嘻！看到了嗎，會長？#n這次對我們萬魔殿再次舉行的信任投票率，突破了史上最低的紀錄！"
70000020-15 = "（真琴前輩……為了挽回失去的氣勢，從剛才開始就很拚命呢）"
70000020-16 = "一臉不知道是什麼意思的表情呢？#n我就特別告訴妳吧。"
70000020-17 = "反正絕大部分的學生根本就不懂政治！#n也就是說，與其讓學生對政治想東想西的，讓他們毫不關心反而更好支配！"
70000020-18 = "這3.8%的投票率，就是我們的權力不動如山的證明！"
70000020-20 = "真是無趣啊，議長。#n用那種天真拙劣的策略，可是很快就會倒台的哦？"
70000020-21 = "智惠，告訴她們這次赤冬總選舉的投票率吧。"
70000020-22 = "是300%，會長。"
70000020-24 = "什，什麼！？"
70000020-25 = "議長也知道吧？#n所謂的數字就是越大越好！"
70000020-26 = "想和我們赤冬聯邦學園對抗的話，就得有這種程度的支持度才行啊！"
70000020-27 = "怎，怎麼會這樣！#n居然會連支持度都輸……"
70000020-28 = "………………"
70000020-33 = "可惡，被看不起了嗎……！？#n身為萬魔殿議長的，我真琴大人……！！"
70000020-34 = "……既然計畫似乎也失敗了，那就沒有理由繼續留在這裡了吧？#n來，我們回去吧，前輩。"
70000020-35 = "還，還不行！#n敗給區區赤冬就這樣回去，這份屈辱我絕對……"
70000020-36 = "……嗯？"
70000020-43 = "這，這是……"
70000020-45 = "唔呣。妳注意到了啊，議長。"
70000020-50 = "書，書記長……？"
70000020-57 = "那是象徵咱的權威的肖像畫。"
70000020-58 = "咱過於有威嚴的姿態讓妳都看得入迷了啊。#n一見到就不禁肅然起敬對吧？"
70000020-59 = "不，完全不會……"
70000020-63 = "（話說，這真的可以堅稱是本人嗎？）"
70000020-64 = "（性別根本不一樣不是嗎……）"
70000020-67 = "妳似乎沒有欣賞藝術的能力啊。"
70000020-68 = "繪畫可是[ruby=propaganda]政治宣傳[/ruby]的基本。#n萬魔殿的議長就這點程度啊……"
70000020-69 = "哈哈哈，格黑娜的未來真是一片黑暗啊！"
70000020-70 = "妳說什麼？"
70000020-71 = "前輩……在這裡失控的話就前功盡棄了。"
70000020-72 = "請先冷靜下來。#n不然前輩心胸狹窄的一面就要曝光了。"
70000020-74 = "唔呣。別對每個小玩笑都斤斤計較，議長啊。"
70000020-75 = "而且就算妳心胸狹窄，咱這種偉大的會長也不會在意的！"
70000020-76 = "機會難得，就來做個紀念格黑娜和赤冬友好的紀念品吧。"
70000020-77 = "咱想想……議長有信念或座右銘嗎？"
70000020-83 = "信念……座右銘……？"
70000020-84 = "真琴前輩，妳之前有這麼說過吧？"
70000020-85 = "在擅自吃掉冰箱的布丁的時候……"
70000020-88 = "啊？布丁？"
70000020-89 = "嘻嘻嘻嘻嘻。#n沒錯，是我吃掉的。"
70000020-90 = "那又怎樣？#n以為我會道歉嗎？"
70000020-91 = "我也不是要你道歉……"
70000020-92 = "畢竟是真琴前輩，就算硬凹我也不覺得奇怪。"
70000020-93 = "嘻嘻嘻嘻嘻。給我聽好，伊呂波。真琴大人的字典裡沒有後悔和反省。"
70000020-94 = "身為萬魔殿的議長，那是理所當然的吧？"
70000020-95 = "我羽沼真琴──"
70000020-96 = "終我一生無怨無悔！"
70000020-97 = "啊，是……"
70000020-99 = "……唔呣，不愧是萬魔殿的議長啊。"
70000020-100 = "居然敢擅自吃掉別人的布丁……#n簡直無所畏懼。真了不起啊，真琴議長。"
70000020-101 = "很好，咱喜歡！"
70000020-102 = "智惠，把赤冬最有實力的匠人叫來！"
70000020-103 = "是的，書記長。"
70000020-104 = "就將與妳那充滿勇氣的姿態相稱的東西送給妳吧！"
70000020-106 = "（為什麼會變成這樣……）"
70000020-108 = "（幾天後，格黑娜校門前）"
70000020-114 = "……亞子，這是什麼？"
70000020-115 = "似乎是赤冬贈送給萬魔殿的雕像……"
70000020-116 = "這是，真琴議長……對吧？"
70000020-121 = "………………"
70000020-128 = "（向天高舉著拳頭的雕像，隨著Destroyer的槍聲響起一同消逝了）"
70000020-129 = "萬魔殿的赤冬巡迴錄"
70000020-141 = "鏘鏘～！伊吹來了唷！"
70000020-142 = "早哇～！#n呵呵，布丁布～丁♪"
70000020-143 = "……啊！"
70000020-144 = "伊，伊吹……那個……"
70000020-145 = "等，等等，伊吹……！"
70000020-147 = "咦……？#n伊吹的布丁……跑到哪裡去了……？"
70000020-148 = "伊吹……不能吃布丁嗎？因為伊吹是壞孩子嗎？"
70000020-149 = "沒有那種事唷。#n這一切的錯都是……"
70000020-150 = "伊，伊吹──！是我錯了──！#n我不知道那是伊吹的布丁，所以我就……我就──！！！"
70000020-151 = "伊吹對不起──！！！是我錯了，原諒我吧──！！！"
70000020-152 = "唉……"

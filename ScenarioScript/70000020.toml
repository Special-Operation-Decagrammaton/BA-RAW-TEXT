[translation]
70000020-1 = "A Suspicious Meeting 2"
70000020-2 = "And so, the Red Winter Office and Pandemonium Society's exchange meeting finally began."
70000020-6 = "Heeheehee! The turnout for the Pandemonium Society's reelection vote this year was the lowest it's ever been! Don't be too impressed, Great Leader."
70000020-15 = "(Makoto sure is running her mouth. Well, I guess I'll let this power struggle play out.)"
70000020-16 = "I see you don't understand. Allow me to illuminate you."
70000020-17 = "Politics is a mobocracy! Therefore, the fewer students that are engaged in politics, the more powerful we become!"
70000020-18 = "Our 3.8% voter turnout is a symbol of the Pandemonium Society's absolute power!"
70000020-20 = "That sounds like a load of rubbish to me, Chair Makoto. Your approach to power is that of an amateur!"
70000020-21 = "Tomoe, report the turnout for the Red Winter general election!"
70000020-22 = "The voter turnout for our last election was 300%, Great Leader."
70000020-24 = "Th-Three hundred?!"
70000020-25 = "Now do you understand? The bigger, the better!"
70000020-26 = "You could never outdo Red Winter Academy with such paltry tactics!"
70000020-27 = "H-How can this be?! How do I fight against those numbers?"
70000020-28 = "... *sigh*"
70000020-33 = "H-How dare they underestimate me? I am the great, the one and only Makoto!"
70000020-34 = "Yeah, yeah. Can we go back now?"
70000020-35 = "Absolutely not! I, the Chair of the Pandemonium Society, can't turn tail and run after such abject humiliation. I won't be defeated!"
70000020-36 = "...Huh?"
70000020-43 = "Wh-What in the world....?"
70000020-45 = "So. You've seen it."
70000020-50 = "G-Great Leader...!"
70000020-57 = "It's a self-portrait. The artist truly captured the intimidating power of my authority."
70000020-58 = "Isn't it incredible? I know, the wonder and awe rising up in your soul must be almost unbearable."
70000020-59 = "Th-That's not really how I would put it..."
70000020-63 = "(In what universe is that a painting of her?!)"
70000020-64 = "(To begin with, it's not even the same gender...)"
70000020-67 = "W-Well! You have bad taste in art!"
70000020-68 = "You call yourself the leader of Gehenna? With such poor understanding of propaganda?"
70000020-69 = "I truly worry for Gehenna's future."
70000020-70 = "Say that to me again. I dare you."
70000020-71 = "Hey, hey. No one wins if we fight here."
70000020-72 = "And, President Cherino, please calm down. Your approach is narrow-minded."
70000020-74 = "And you shouldn't react so pettily to mere conversation, Chair."
70000020-75 = "See, I'm completely unphased by you calling me narrow-minded."
70000020-76 = "Okay, okay. Allow me to offer you a gift, since this exchange meeting is for our schools to establish friendly relations."
70000020-77 = "What is your motto, Chair? Tell me the philosophy behind your beliefs."
70000020-83 = "What do you mean? My motto?"
70000020-84 = "Makoto's motto... It'd probably be..."
70000020-85 = "Oh. She said something after she stole pudding from the refrigerator once."
70000020-88 = "The pudding? "
70000020-89 = "Heeheehee. What about it? I ate it."
70000020-90 = "Were you looking for an apology?"
70000020-91 = "I mean, that's your business, but..."
70000020-92 = "You're just...so shameless."
70000020-93 = "Heeheehee. Let me take this opportunity to teach you something, Iroha. Self-reflection? Regret? Those things only hold you back. "
70000020-94 = "The chair of the Pandemonium Society would never stoop so low."
70000020-95 = "I, Makoto..."
70000020-96 = "...have zero regrets!"
70000020-97 = "....Okay. Sure. If you say so."
70000020-99 = "...I have underestimated you."
70000020-100 = "There is nothing more serious than pudding. I respect your fearlessness in so brazenly attacking our most precious resource, Chair Makoto."
70000020-101 = "Allow me to answer you in kind!"
70000020-102 = "Tomoe, summon the most skilled master in all of Red Winter!"
70000020-103 = "Yes, Great Leader!"
70000020-104 = "I'll gift you something on par with your unrelenting motto!"
70000020-106 = "(I don't understand either of them...)"
70000020-108 = "A few days later, in front of the Gehenna school gate..."
70000020-114 = "...What is this?"
70000020-115 = "The Pandemonium Society held an exchange meeting with Red Winter recently. Their president sent this...gift they created in honor of the event."
70000020-116 = "It's supposed to be Chair Makoto... I think."
70000020-121 = "..."
70000020-128 = "The strange statue was demolished into dust with Ishbosheth's gunfire."
70000020-129 = "The Red Winter Tour Log"
70000020-141 = "Ta-da! It's your favorite mascot, Ibuki!"
70000020-142 = "Heehee! Hi, hi! Ibuki hopes Ibuki's pudding is safe and sound!"
70000020-143 = "?!"
70000020-144 = "I-Ibuki... You see..."
70000020-145 = "Well... Um..."
70000020-147 = "What? Wh-Where's... Where's Ibuki's PUDDING?!"
70000020-148 = "How come Ibuki can't have it? D-Did Ibuki do something wrong? Was Ibuki a bad girl?"
70000020-149 = "No, Ibuki. You're not the one who was bad."
70000020-150 = "I-Ibuki! I'm sorry! I didn't know it was yours...and I... Regret! Self-reflection! AHHH!"
70000020-151 = "I'm the bad person! I've wronged you! I have so many regrets!"
70000020-152 = "*sigh*"

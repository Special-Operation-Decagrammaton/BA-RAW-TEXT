[translation]
70000020-1 = "งานแลกเปลี่ยนที่น่าสงสัย 2"
70000020-2 = "(งานแลกเปลี่ยนระหว่างสำนักเลขาธิการเรดวินเทอร์กับแพนเดโมเนียม โซไซตี้ได้เริ่มขึ้นแล้ว)"
70000020-6 = "หึหึหึหึ! เห็นหรือยังล่ะเลขาธิการ? การลงมติไม่ไว้วางใจของแพนเดโมเนียม โซไซตี้ครั้งนี้ มีสถิติต่ำสุดในประวัติศาสตร์เลย!"
70000020-15 = "(รุ่นพี่มาโคโตะดูพูดเยอะขึ้นนะ... หรือว่าพยายามจะกอบกู้อำนาจที่เสียไปเมื่อกี้กันนะ...)"
70000020-16 = "ทำหน้าแบบนั้น คงจะยังไม่รู้สินะว่ามันหมายความว่าอะไร งั้นเราจะบอกให้เอง"
70000020-17 = "สิ่งที่เรียกกว่าการเมืองน่ะ โดยพื้นฐานแล้วมันก็คือกฎหมู่นั่นแหละ! ยิ่งพวกนักเรียนไม่มีความสนใจ#nเรื่องการเมือง อำนาจของเราก็ยิ่งแข็งแกร่งขึ้น!"
70000020-18 = "เปอร์เซ็นต์การลงมติ 3.8% นี้คือตัวเลขที่แสดงอำนาจอันเป็นนิรันดร์ของพวกเรายังไงล่ะ!"
70000020-20 = "หน้าไม่อายจริงๆ เลยนะประธาน เจตนารมณ์ของพวกเธอมันดูไม่ต่างกับกลอุบายตื้นๆ ของพวกคนเห็นแก่ตัวเลย"
70000020-21 = "โทโมเอะ ผลการเลือกตั้งทั่วไปของเรดวินเทอร์ครั้งนี้อยู่ที่เท่าไรน่ะ?"
70000020-22 = "300% ค่ะท่านเลขาธิการ"
70000020-24 = "วะ... ว่าไงนะ?!!!!"
70000020-25 = "เห็นหรือยังล่ะ? มันก็ต้องบัตรเขย่งแบบนี้สิถึงจะดี!"
70000020-26 = "ถ้าจะประชันกับสหภาพเรดวินเทอร์ ตัวเลขต้องยิ่งใหญ่อลังการแบบนี้แหละ!"
70000020-27 = "ดะ... โดนเข้าแล้วสินะ?! อย่าบอกนะว่าเรื่องตัวเลขพวกเราก็ยังแพ้อีก?!"
70000020-28 = "............"
70000020-33 = "หนอย... ดูถูกกันเกินไปแล้ว...!! บังอาจมาเกทับท่านมาโคโตะผู้นี้ได้...!!"
70000020-34 = "รุ่นพี่... ถ้าแผนการมันล้มเหลวไปแล้ว เราก็ไม่มีเหตุผลที่จะต้องอยู่ที่นี่ต่อแล้วนี่คะ? กลับกันเถอะค่ะ"
70000020-35 = "ยังไม่กลับ! ถ้ากลับไปโดยที่ถูกเล่นงานแบบนี้ มันก็น่าอัปยศแย่สิ..."
70000020-36 = "หืม...?"
70000020-43 = "นะ... นี่มัน..."
70000020-45 = "เห็นเข้าจนได้แล้วสินะ ประธาน"
70000020-50 = "ละ... เลขาธิการ...!"
70000020-57 = "นั่นน่ะ ภาพเสมือนที่เป็นสัญลักษณ์แทนอำนาจและเกียรติยศของเราเองแหละ"
70000020-58 = "เป็นไงล่ะ? แค่ได้มองก็รู้สึกได้ถึงความยำเกรงจากส่วนลึกของจิตใจแล้วใช่ไหม?"
70000020-59 = "ไม่อะ... ไม่เห็นจะรู้สึกเลย"
70000020-63 = "(คนเรานี่มั่นหน้าคิดว่าคนในรูปคือตัวเองแบบนี้ก็ได้ด้วยเหรอ?)"
70000020-64 = "(มันไม่เห็นจะเหมือนกันตั้งแต่เพศแล้วนะ...)"
70000020-67 = "มีตาหามีแววไม่ในด้านศิลปะอย่างนั้นสินะ"
70000020-68 = "ถ้ามีพื้นฐานของการโฆษณาชวนเชื่อไม่เพียงพอ แบบนี้จะเป็นผู้นำของโรงเรียนได้ยังไง"
70000020-69 = "ขืนปล่อยให้เป็นแบบนี้ อนาคตของเกเฮนน่าต้องมืดมนแน่นอน!"
70000020-70 = "ว่าไงนะ? พูดแบบนี้ใครจะไปเมินเฉยอยู่ได้"
70000020-71 = "รุ่นพี่... ถ้าทะเลาะกันที่นี่ ทุกอย่างจะพังหมดเลยนะคะ"
70000020-72 = "ทำใจร่มๆ ก่อนเถอะค่ะ แบบนี้ความใจแคบของรุ่นพี่จะถูกเปิดเผยหมดนะคะ"
70000020-74 = "อย่าไปตอบสนองต่อทุกเรื่องไร้สาระเลย ประธาน"
70000020-75 = "อีกอย่าง ใจแคบก็แล้วมันยังไงกันล่ะ เรื่องนั้นเราไม่ใส่ใจหรอก"
70000020-76 = "เอาละ ไหนๆ นี่ก็เป็นงานเพื่อมิตรไมตรีของเรา งั้นเรดวินเทอร์จะสร้างของที่ระลึกเพื่อเป็นอนุสรณ์แก่#nมิตรภาพของเราให้"
70000020-77 = "ประธาน ปกติมีความเชื่อหรือคติประจำใจอะไรไหม?"
70000020-83 = "หืม? อะไรนะ? ความเชื่อ? คติประจำใจ...?"
70000020-84 = "ถ้ารุ่นพี่มาโคโตะมีอะไรแบบนั้นละก็..."
70000020-85 = "แต่ก่อนเคยมีคติพจน์อะไรที่ตะโกนออกไปหลังจากแย่งพุดดิ้งในตู้เย็นมากินไม่ใช่เหรอคะ?"
70000020-88 = "หา? พุดดิ้งเหรอ? "
70000020-89 = "หึหึหึหึหึหึ ใช่แล้ว เรากินไปเอง"
70000020-90 = "แล้วไงล่ะ? แล้วมันเป็นยังไงเหรอ? คิดว่าเราจะพูดขอโทษงั้นเหรอ?"
70000020-91 = "ไม่หรอกค่ะ ฉันไม่ได้อยากได้คำขอโทษ..."
70000020-92 = "จะว่าไป ตอนนี้รุ่นพี่มาโคโตะดูมั่นใจมากเลยนะคะ?"
70000020-93 = "หึหึหึหึหึ ฟังให้ดีนะอิโรฮะ เราไม่เสียใจหรือสำนึกผิดหรอก"
70000020-94 = "คำพวกนั้นไม่มีอยู่ในพจนานุกรมของประธานของแพนเดโมเนียม โซไซตี้หรอกนะ"
70000020-95 = "เพราะมาโคโตะผู้นี้..."
70000020-96 = "ไม่เคยรู้สึกผิดเลยสักครั้งในชีวิต!!"
70000020-97 = "อ่า... ค่ะ"
70000020-99 = "...... สุดท้ายแล้วก็คือคนที่ดูถูกไม่ได้สินะ"
70000020-100 = "กินพุดดิ้งเข้าไปตามใจตัวเองแบบนี้ เรานับถือในความแน่วแน่และความไม่รู้จักกลัวนี้จริงๆ ประธานมาโคโตะ"
70000020-101 = "ดีเลย ถูกใจเรายิ่งนัก!"
70000020-102 = "โทโมเอะ เรียกช่างฝีมือที่มีฝีมือที่สุดของเรดวินเทอร์มาได้เลย!"
70000020-103 = "ได้เลยค่ะ ท่านเลขาธิการ"
70000020-104 = "เราจะสร้างอนุสรณ์ที่เหมาะกับการตะโกนนั้นให้เอง!"
70000020-106 = "(นี่มัน... เรื่องอะไรกันเนี่ย...)"
70000020-108 = "(หน้าประตูโรงเรียนเกเฮนน่า ไม่กี่วันหลังจากนั้น)"
70000020-114 = "นี่มันอะไรกัน?"
70000020-115 = "รูปปั้นที่ถูกส่งมาหลังจากแพนเดโมเนียม โซไซตี้แวะไปที่เรดวินเทอร์ค่ะ..."
70000020-116 = "นี่คือ... ประธานมาโคโตะใช่ไหมคะ?"
70000020-121 = "........................"
70000020-128 = "(รูปปั้นปริศนาหายวับไปพร้อมกับเสียงปืนอิชโบเชท)"
70000020-129 = "บันทึกลาดตระเวนของแพนเดโมเนียม โซไซตี้"
70000020-141 = "แต่นแต๊น~☆ อิบูกิมาแล้ว!"
70000020-142 = "อื้ม! ว่ายังไงรุ่นพี่! พุดดิ้งของอิบูกิยังอยู่ดีใช่ไหม?"
70000020-143 = "?!"
70000020-144 = "อิ... อิบูกิ... คือว่า..."
70000020-145 = "แบบว่า... คือว่า...!"
70000020-147 = "หืม? พุดดิ้งของอิบูกิ... หายไปเหรอ...?"
70000020-148 = "อิบูกิ... จะไม่ได้กินพุดดิ้งเหรอ? เพราะอิบูกิเป็นเด็กไม่ดีเหรอ?"
70000020-149 = "มะ... ไม่มีทางเป็นอย่างนั้นหรอกค่ะ คนที่ไม่ดีน่ะ..."
70000020-150 = "อิ... อิบูกิ...! เราผิดไปแล้ว! เราไม่รู้ว่าเป็นของอิบูกิ... ก็เลย...!"
70000020-151 = "เรามันไม่ดีเอง! เราผิดไปแล้วววว!!"
70000020-152 = "เฮ้อ..."

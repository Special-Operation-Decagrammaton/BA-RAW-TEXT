[translation]
70000020-1 = "怪しい交流会（２）"
70000020-2 = "（――そうして、レッドウィンター事務局と万魔殿の交流会が始まった）"
70000020-6 = "キキキッ！見たか、会長？#n今回、我が万魔殿に対して再び行われた信任投票率は、過去最低の記録を更新したのだ！"
70000020-15 = "（マコト先輩……失った勢いを取り戻そうと、さっきから必死ですね)"
70000020-16 = "よく分からないって顔をしているな？#n特別に教えてやろう。"
70000020-17 = "どうせほとんどの生徒は政治なんて分からない！#nつまり、生徒が政治をああだこうだ考えるよりも、関心など持っていないほうが支配しやすい！"
70000020-18 = "この3.8%の投票率こそ、我々の権力が揺るぎないことを証明しているのだ！"
70000020-20 = "実にくだらないな、議長。#nそんな見通しの甘い拙策では、すぐに足元を掬われてしまうぞ？"
70000020-21 = "トモエ、今回のレッドウィンター総選挙の投票率を言うがよい。"
70000020-22 = "300%です、会長。"
70000020-24 = "な、なんだと！？"
70000020-25 = "議長も分かっただろう？#n数字というものは大きければ大きいほど良い！"
70000020-26 = "我がレッドウィンター連邦学園に対抗するというのなら、これくらいの支持を集めることだな！"
70000020-27 = "な、なんてことだあああ！#nまさか支持率でも負けるとは……。"
70000020-28 = "………………。"
70000020-33 = "くっ、見下されているのか……！？#n万魔殿の議長ともあろう、このマコト様が……！！ "
70000020-34 = "……計画も失敗したみたいですし、ここに残る理由もないのでは？#nほら、帰りましょう先輩。"
70000020-35 = "ま、まだだ！#nレッドウィンターなんぞにやられたまま帰るなど、そんな屈辱は決して……。"
70000020-36 = "……ん？"
70000020-43 = "こ、これはいったい……。"
70000020-45 = "うむ。気付いたか、議長。"
70000020-50 = "しょ、書記長……？"
70000020-57 = "それはおいらの権威を象徴する肖像画だ。"
70000020-58 = "あまりにも立派な姿に見惚れてしまったのだな。#n見ていると思わず敬意を表したくなるだろう？"
70000020-59 = "いや、全然……。"
70000020-63 = "（しかし、これを本人と言い張っていいものなのか？）"
70000020-64 = "（そもそも性別が違うじゃないか……）"
70000020-67 = "芸術を見る目がないようだな。"
70000020-68 = "絵画などプロパガンダの基本ではないか。#nこれが万魔殿の議長とは……。"
70000020-69 = "ははは、ゲヘナの未来は暗いな！"
70000020-70 = "なんだと？"
70000020-71 = "先輩……ここで暴れてしまっては、全て水の泡です。"
70000020-72 = "まずは落ち着いてください。#n先輩の心の狭さがバレてしまいます。"
70000020-74 = "うむ。ちょっとした冗談をいちいち気にしないことだな、議長よ。"
70000020-75 = "それに心が狭かろうとも、おいらのように偉大な会長は気にしないのだ！"
70000020-76 = "せっかくだから、ゲヘナとレッドウィンターの友好を記念して記念品を作るとしよう。"
70000020-77 = "そうだな……議長の信念や座右の銘を聞いても？"
70000020-83 = "信念……座右の銘……？"
70000020-84 = "マコト先輩、たしか前に言ってませんでした？"
70000020-85 = "冷蔵庫のプリンを勝手に食べた時の……。"
70000020-88 = "あぁ？プリン？"
70000020-89 = "キキキキキッ。#nああ、私が食べたとも。"
70000020-90 = "それがどうしたというのだ？#nこの私が謝罪するとでも思ったか？"
70000020-91 = "別に謝ってほしいわけでは……。"
70000020-92 = "マコト先輩のことだから、開き直られたところで何も思いませんよ。"
70000020-93 = "キキキキキッ。よく聞け、イロハ。マコト様の辞書には後悔も反省もない。"
70000020-94 = "万魔殿の議長ともなれば、そんなものなくて当然だろう？"
70000020-95 = "この[ruby=はぬま]羽沼[/ruby]マコト――"
70000020-96 = "我が生涯に一片の悔いなし！"
70000020-97 = "あ、はい……。"
70000020-99 = "……うむ、流石は万魔殿の議長だな。"
70000020-100 = "人のプリンを勝手に食べるだなんて……。#n恐れ知らずではないか。素晴らしいな、マコト議長。"
70000020-101 = "よし、気に入った！"
70000020-102 = "トモエ、レッドウィンターで一番の職人を呼んでこい！"
70000020-103 = "はい、書記長。"
70000020-104 = "その勇ましい姿に相応しい品を授けるのだ！"
70000020-106 = "（どうしてこんな話に……）"
70000020-108 = "（数日後、ゲヘナ校門前）"
70000020-114 = "……アコ、これは？"
70000020-115 = "万魔殿がレッドウィンターから送られた彫像らしいですが……。"
70000020-116 = "これ、マコト議長……ですよね？"
70000020-121 = "………………。"
70000020-128 = "（拳を空に突き上げた彫像は、デストロイヤーの銃声が響き渡ると跡形もなく消えた) "
70000020-129 = "万魔殿のレッドウィンター 巡回録"
70000020-141 = "じゃーん！イブキだよ！"
70000020-142 = "おっはよー！#nふふん、プリンプリ～ン♪"
70000020-143 = "……はっ！"
70000020-144 = "い、イブキ……それがですね……。"
70000020-145 = "ま、待ってくれ、イブキ……！"
70000020-147 = "あれ……？#nイブキのプリン……どこ……？"
70000020-148 = "イブキ……プリン、食べられないの？イブキが悪い子だから？"
70000020-149 = "そんなことありませんよ。#n悪いのは全部……。"
70000020-150 = "い、イブキィー！私が悪かったあああ！#nイブキのプリンとは知らず、私が……私があああー！！！"
70000020-151 = "ごめんなイブキィーーー！！！この通りだ、許してくれえええ！！！"
70000020-152 = "はぁ……。"

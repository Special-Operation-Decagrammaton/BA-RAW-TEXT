[translation]
1000708-1 = "永遠的回憶"
1000708-2 = "奇普托斯．繁華街"
1000708-4 = "那位，那位紅頭髮的同學！"
1000708-5 = "嗯？我嗎？"
1000708-6 = "沒錯，你就是上次用噴漆在這附近的牆上畫畫的那位學生吧？"
1000708-7 = "啊……那個……"
1000708-8 = "其實我是那面牆壁的主人。"
1000708-9 = "對不起！"
1000708-11 = "我沒有惡意，只是牆壁太髒亂了所以……"
1000708-12 = "拜託了，不要叫警察！"
1000708-13 = "不是不是警察什麼的，我沒有要生氣的意思。"
1000708-14 = "其實那面牆壁，本來就因為路人經過時老是亂丟垃圾還亂畫糟糕的塗鴉，正覺得困擾呢。"
1000708-15 = "但是多虧同學妳在那面牆上畫了美麗的畫，垃圾不但減少了許多，甚至連塗鴉也變少了。真的很謝謝妳。"
1000708-16 = "我，我只是，因為想做才做的， #n啊，啊哈哈……！"
1000708-17 = "關於這件事，如果妳願意的話，可不可以也在其他的牆壁上畫圖呢？"
1000708-18 = "終究只是請求，不會強迫妳的……"
1000708-19 = "我，我願意！請讓我畫！"
1000708-21 = "呵呵，所以我得到了在這面帥氣的牆上盡情作畫的許可了！"
1000708-22 = "竟然可以不顧他人眼光，隨心所欲地在牆上作畫，這種機會就連對知名塗鴉寫手來說都很難得！"
1000708-23 = "[s] 「我很期待真紀會畫出什麼樣的畫。」"
1000708-24 = "你在說什麼，老師。 #n你上次不是答應說要跟我一起畫圖嗎？"
1000708-25 = "老師也一起畫吧。 #n來，我的噴漆借給你用吧。"
1000708-26 = "[s] 「該怎麼畫呢……」"
1000708-27 = "不難唷。 #n隨心所欲的畫線並塗上顏色就好了。"
1000708-29 = "就算畫錯了，也可以隨意覆蓋過去…… #n放輕鬆畫吧！"
1000708-32 = "― 好，這樣感覺不錯吧？[wa:2940] "
1000708-34 = "― 從老師來看，如何？"
1000708-37 = "― 咦咦……為什麼反應那麼平淡？[wa:1940] "
1000708-40 = "― 再多燃燒點藝術魂來看嘛！"
1000708-42 = "― ……"
1000708-45 = "― 老師你畫了什麼？"
1000708-47 = "― 我看看……[wa:540] "
1000708-50 = "― 啊哈哈！這是什麼，真有趣！[wa:1700] "
1000708-53 = "― 你問我這麼高不會怕嗎？沒事，因為有老師在身邊啊。[wa:5780] "
1000708-56 = "― 有需要的話隨時都可以叫我。[wa:1160] "
1000708-58 = "― 牆壁也好，老師也好，我都會塗上不錯的色彩！[wa:1240] "
1000708-61 = "希望這面牆可以永遠留著，紀念我跟老師之間的回憶。"
1000708-63 = "……什麼的。忘了我剛剛說的話！"

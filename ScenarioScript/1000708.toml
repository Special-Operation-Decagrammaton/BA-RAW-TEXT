[translation]
1000708-1 = "Remember This Forever"
1000708-2 = "Downtown Kivotos"
1000708-4 = "Young lady! You with the red hair!"
1000708-5 = "Hmm? Me?"
1000708-6 = "Yeah, you're the one who spray-painted that wall, right?"
1000708-7 = "Oh, well..."
1000708-8 = "I'm the owner of that building."
1000708-9 = "I'm so sorry!"
1000708-11 = "I wasn't trying to cause trouble. It's just, the alley was so dirty—"
1000708-12 = "Please, don't call the police!"
1000708-13 = "I wasn't going to."
1000708-14 = "I've been so tired of people dumping trash back there and tagging the wall with ugly graffiti."
1000708-15 = "But there's been less litter and tagging ever since you painted it with your art. I don't know how to thank you."
1000708-16 = "O-Oh. I only did it because i-inspiration struck. H-Haha...!"
1000708-17 = "Would you be interested in painting the other side too?"
1000708-18 = "You don't have to if you don't want to, though..."
1000708-19 = "Of course I want to! I'd be happy to!"
1000708-21 = "Haha! I can't believe I have the green light to do whatever I want with this wall."
1000708-22 = "Graffiti artists are almost never given the freedom to paint whatever they want for however long they want. It's so exciting!"
1000708-23 = "[s] \"I can't wait to see what you're going to paint.\""
1000708-24 = "Where's this coming from, Sensei? You promised to be my apprentice, remember?"
1000708-25 = "You're going to be painting with me, obviously. Here, take my spray can, Sensei."
1000708-26 = "[s] \"What should I paint...?\""
1000708-27 = "Don't overthink it. Let your heart paint the lines, then fill in the colors."
1000708-29 = "You can always paint over any mistakes... So don't worry. Just pick up the spray can and get started."
1000708-32 = "― So, is this good enough?[wa:2380] "
1000708-34 = "― What do you think, Sensei?"
1000708-37 = "― Hmph... At least try to look impressed.[wa:940] "
1000708-40 = "― I need you to give me feedback like a professional art critic!"
1000708-42 = "― ..."
1000708-45 = "― So what did you paint, Sensei?"
1000708-47 = "― Uh...[wa:540] "
1000708-50 = "― Hahaha! What is that supposed to be? It looks so silly![wa:20] "
1000708-53 = "― Aren't I scared of heights? Not when I have you by my side.[wa:4380] "
1000708-56 = "― And I'll be by yours whenever you need me.[wa:10] "
1000708-58 = "― The wall, Sensei. I'll paint anything if it's for you![wa:10] "
1000708-61 = "I hope this wall stays here forever so I can always remember this moment with you."
1000708-63 = "I, uh... Pretend you didn't just hear that!"

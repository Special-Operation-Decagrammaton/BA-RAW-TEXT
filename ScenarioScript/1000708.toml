1000708-11 = "3;마키;05;본의는 아니었어요, 너무 벽이 지저분해서 그만—\n#3;greeting\n#3;em;[속상함]"
1000708-12 = "3;마키;05;그러니 제발 경찰서만큼은!\n#3;stiff"
1000708-13 = "5;행인;01;경찰서라니, 혼을 내려고 하는 게 아니야.\n#5;em;[땀]"
1000708-14 = "3;마키;04\n5;행인;01;안 그래도 그 벽은 지나가는 사람들이 자꾸 쓰레기를 버리거나 나쁜 낙서를 해서 골치를 앓고 있었거든."
1000708-15 = "5;행인;01;그런데 학생이 그 벽에 멋진 벽화를 그려준 덕분에 쓰레기도 크게 줄었고, 낙서도 많이 없어졌어. 정말 고마워.\n#5;em;[반짝]\n#5;greeting"
1000708-16 = "3;마키;04;그, 그, 그저 하고 싶어서 한 일인걸요. #n하, 하하……!\n#3;em;[땀]"
1000708-17 = "5;행인;01;그래서 말인데, 괜찮다면 다른 벽에도 그림을 그려주지 않을래?"
1000708-18 = "5;행인;01;너무 무리한 부탁이라고 생각되면 거절해도 상관없지만……\n#5;em;[...]"
1000708-19 = "3;마키;03;할 게요! 절대로 할 게요!\n#3;hophop\n#3;em;[반응]\n#3;m3"
1000708-20 = "#all;hide"
1000708-21 = "3;마키;07;후후, 그래서 이 멋진 회벽을 마음껏 칠해도 좋다는 허가를 받았단 말씀!\n#3;em;[음표]\n#3;a"
1000708-22 = "3;마키;03;남의 눈치를 안 보고 마음대로 벽에 그림을 그릴 수 있다니, 이런 기회는 유명 그래피티 라이터들에게도 흔치 않다고!"
1000708-23 = "[s] \"벌써부터 마키가 어떤 그림을 그릴지 기대가 되는 걸.\""
1000708-24 = "3;마키;02;무슨 소리야, 선생님. #n저번에 나랑 같이 그림을 그려주겠다고 약속 했잖아?\n#3;em;[반응]"

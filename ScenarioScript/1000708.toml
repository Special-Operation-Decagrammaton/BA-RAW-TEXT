[translation]
1000708-1 = "ความทรงจำที่ไม่เคยเลือนราง"
1000708-2 = "ย่านพลุกพล่านในคิโวทอส"
1000708-4 = "นี่นักเรียน... นี่ๆ เด็กนักเรียนผมแดงตรงนั้นน่ะ!"
1000708-5 = "หือ? เรียกฉันเหรอ?"
1000708-6 = "เธอเป็นคนที่วาดรูปกราฟิตี้บนผนังแถวๆ นี้เมื่อคราวที่แล้วใช่มั้ย?"
1000708-7 = "อ่อ... เรื่องนั้น..."
1000708-8 = "ที่จริงแล้วฉันเป็นเจ้าของที่นั่นน่ะ"
1000708-9 = "ขะ...ขอโทษนะคะ!"
1000708-11 = "ฉันไม่ได้มีเจตนาไม่ดีนะคะ แต่คือว่าผนังมันสกปรกเกินไปก็เลย..."
1000708-12 = "อย่าแจ้งตำรวจเลยนะคะ!"
1000708-13 = "ใครจะแจ้งตำรวจกันล่ะ ฉันไม่ได้เรียกเธอมาตำหนิสักหน่อย"
1000708-14 = "ที่จริงฉันเองก็ปวดหัวเรื่องที่คนชอบเอาขยะมาทิ้ง แล้วก็พวกเด็กมือบอนที่ชอบขีดเขียนผนัง#nจนสกปรกอยู่เหมือนกัน"
1000708-15 = "แต่พอได้เธอมาช่วยทำให้ผนังตรงนั้นมันดูดีขึ้น คนก็ทิ้งขยะน้อยลง แล้วก็พวกมือบอนชอบ#nขีดเขียนก็ลดลงไปเยอะเลย ขอบใจมากนะ"
1000708-16 = "คือ...คือฉันทำไปเพราะแค่อยากทำเท่านั้นเอง… ฮะฮะ...ฮ่าฮ่า!"
1000708-17 = "ถ้างั้นเธอจะช่วยวาดรูปลงบนกำแพงตรงอื่นให้ด้วยได้มั้ย?"
1000708-18 = "แต่ถ้าเธอไม่สะดวกล่ะก็บอกฉันมาได้นะ ไม่ต้องเกรงใจ..."
1000708-19 = "แน่นอนค่ะ ฉันจะทำ! ฉันจะวาดรูปให้เองค่ะ!"
1000708-21 = "ฮุฮุ ได้รับอนุญาตให้วาดภาพลงบนกำแพงได้ตามใจชอบแล้วล่ะ!"
1000708-22 = "นี่ฉันจะได้วาดรูปลงบนกำแพงโดยไม่ต้องหลบๆ ซ่อนๆ แล้วสินะ โอกาสดีๆ แบบนี้#nนักวาดกราฟิตี้เก่งๆ ยังแทบไม่มีโอกาสได้เลย!"
1000708-23 = "[s] \"ชักอยากรู้แล้วสิว่ามากิจะวาดรูปอะไร\""
1000708-24 = "พูดอะไรน่ะคุณครู คราวก่อนคุณครูสัญญาว่าจะมาวาดรูปกับฉันไม่ใช่รึไง?"
1000708-25 = "คุณครูก็มาวาดด้วยกันสิ เอ้า คุณครูใช้สเปรย์ของฉันก็ได้"
1000708-26 = "[s] \"วาดอะไรดีนะ...\""
1000708-27 = "ไม่เห็นจะยากเลย แค่พ่นสีลงไปตามความรู้สึกที่อยากวาด"
1000708-29 = "เพราะถ้าวาดผิดก็แค่วาดทับลงไปก็เท่านั้นเอง… ไม่ต้องกังวลหรอก วาดลงไปได้เลย"
1000708-32 = "― เอาล่ะ คุณครูคิดว่าแบบนี้ดีมั้ย?[wa:2060] "
1000708-34 = "― คุณครูคิดว่ายังไงบ้าง?"
1000708-37 = "― ชิ... ทำไมถึงทำหน้าแบบนั้นล่ะ?[wa:1300] "
1000708-40 = "― ลองสวมจิตวิญญาณศิลปินแล้วลองประเมินดูหน่อยสิ!"
1000708-42 = "― ..."
1000708-45 = "― คุณครูวาดอะไรเหรอ?"
1000708-47 = "― อืม...[wa:500] "
1000708-50 = "― ฮ่าๆๆ! อะไรกันเนี่ย น่าขำสุดๆ ไปเลย![wa:780] "
1000708-53 = "― สูงขนาดนี้ไม่กลัวเลยงั้นเหรอ? ไม่เป็นไรหรอก เพราะมีคุณครูอยู่ด้วยนี่นา[wa:3940] "
1000708-56 = "― ถ้าต้องการอะไรก็เรียกฉันได้เลยนะ[wa:400] "
1000708-58 = "― ทั้งกำแพงแล้วก็คุณครู... ฉันจะวาดให้สุดฝีมือเลยละ![wa:80] "
1000708-61 = "ฉันอยากให้กำแพงตรงนี้อยู่ตลอดไปจังเลย ฉันจะได้เอาไว้นึกถึงช่วงเวลาดีๆ กับคุณครู"
1000708-63 = "เอ่อ... ลืมเรื่องที่ฉันพูดไปเถอะ!"

[translation]
1013105-1 = "豆芽祭"
1013105-2 = "赤冬學園第3公共供給所廚房"
1013105-3 = "[ns]「不是綠豆芽，而是黃豆芽？」"
1013105-4 = "是的。綠豆芽是綠豆發芽而來……"
1013105-5 = "黃豆芽則是黃豆發芽而來的蔬菜。"
1013105-6 = "雖然綠豆芽比黃豆芽更加細嫩清爽，吃起來很順口……"
1013105-7 = "不過也因為熟得太快的關係，很容易就會煮到爛掉。"
1013105-8 = "[s]「這樣啊。話說豆芽祭又是什麼呢……？」"
1013105-9 = "那其實……只是我自己隨意取的名字而已。"
1013105-10 = "我每兩個星期，就會在週三用黃豆芽做鐵板料理……"
1013105-11 = "至於「我是不是沒有其他會做的料理」之類的問題，就請您先別問了……"
1013105-12 = "既然已經說到這裡，我就來對黃豆芽和綠豆芽進行「評論」吧。"
1013105-13 = "食材的生產方式剛才已經提過，這邊就不再贅述。"
1013105-14 = "綠豆芽比起黃豆芽更柔軟，所以直接生吃或稍微燙一下就很美味了。"
1013105-15 = "相反地，黃豆芽比綠豆芽體積更大，口感也相對較硬……"
1013105-16 = "如果沒有經過充分烹調，很難完全壓住它的口感和生味。"
1013105-17 = "不過也可以反過來利用這個特性，讓它在熬湯或吸收醬汁方面發揮優勢。"
1013105-18 = "特別是用黃豆芽熬成的湯，因為其獨特的風味，也被譽為身體不適時的早餐首選哦。"
1013105-19 = "[s]「你真的什麼都能評論耶……」"
1013105-20 = "老師，這些話我只偷偷告訴您──"
1013105-21 = "現在的評論家要是不這樣的話，根本無法維持生計啊！"
1013105-22 = "況且評論家本來就是以引發爭論為業的人！這樣才是正常的！"
1013105-27 = "咳哼，我似乎有點太激動了。#n讓您見到了難堪的一面……"
1013105-28 = "真的很抱歉，老師。"
1013105-29 = "[s]「沒事沒事……」"
1013105-30 = "那麼，我們重新回到今天的豆芽祭吧？"
1013105-31 = "我在豆芽祭上主要會做「豆芽炒豬肉」！"
1013105-32 = "在稍微燙過的黃豆芽上鋪上調味料和豬肉，接著一邊燉煮一邊拌炒。"
1013105-33 = "讓黃豆芽的蔬菜精華為豬肉增香，同時反過來吸收豬肉的油脂與醬汁……"
1013105-34 = "在寒冷的赤冬，這是一道能夠輕鬆快速地攝取熱量、維生素與纖維質的優質料理哦！"
1013105-35 = "[s]「哦哦，真令人期待呢。」"
1013105-36 = "那麼，就請您稍等一下囉！"
1013105-40 = "做好了，老師！"
1013105-41 = "想要配飯吃也可以，單獨當成配菜也不錯哦！"
1013105-42 = "老師喜歡麵包嗎？把麵包切開之後，像三明治一樣夾著吃也很棒。#n如果用黑麥麵包製作的話，更是別有一番風味！"
1013105-46 = "[ns1]「很好吃！那我就慢慢享用囉！」\n[ns2]「有股能放鬆心情……既懷念又溫馨的味道……」\n[ns3]「不是高級或奇特的料理，就像學生親自做的一樣……」"
1013105-50 = "咦？那當然……我本來就是個平凡的赤冬學生呀？"
1013105-51 = "豆芽炒豬肉還有很多，請您盡情享用！"
1013105-53 = "（就這樣和貴音一起，享用了溫馨的一餐）"

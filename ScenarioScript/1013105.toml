[translation]
1013105-1 = "Bean Sprout Festival"
1013105-2 = "Red Winter Third Shared Cafeteria Kitchen"
1013105-3 = "[ns] \"Soybean sprouts instead of mung bean sprouts?\""
1013105-4 = "Yes. Mung beans obviously grow into mung bean plants."
1013105-5 = "Soybean sprouts grow into soy bean plants."
1013105-6 = "I believe that the mung bean variety is smoother and has a cleaner flavor, but..."
1013105-7 = "...Because mung beans cook so quickly, they can become quite unappetizing within seconds."
1013105-8 = "[s] \"So what is this 'Bean Sprout Festival'...?\""
1013105-9 = "As for that name... It's something that I created on a bit of a whim."
1013105-10 = "It simply means that on every other Wednesday, I have a habit of grilling up soybean sprouts on a hot griddle."
1013105-11 = "...Please don't ask me if I didn't know how to make any other dishes..."
1013105-12 = "Since we're already at it, why don't we begin a critique on soybean sprouts and mung bean sprouts?"
1013105-13 = "I already told you how each ingredient is prepared, so we can skip that."
1013105-14 = "The mung bean sprout is softer than its soybean counterpart, so it's delicious both raw or after a short blanch."
1013105-15 = "Conversely, soybean sprouts are comparatively larger and quite hearty."
1013105-16 = "Unless they're cooked somewhat, they have an undesirable texture and aroma."
1013105-17 = "We can use this to our advantage when adding flavor to a broth or a sauce."
1013105-18 = "Soups made by boiling soybean sprouts are often considered to be some of the most delectable options for breakfast. They retain a striking and enjoyable flavor profile."
1013105-19 = "[s] \"You really do critique everything...\""
1013105-20 = "This stays between us, Sensei, so listen well."
1013105-21 = "To survive in this modern era, a critic must constantly be ready to articulate her educated opinion!"
1013105-22 = "A professional critic must always be prepared to rouse public discourse! This is to be expected!"
1013105-27 = "Ahem. I suppose I got a little carried away. I'm sorry about that."
1013105-28 = "My apologies, Sensei."
1013105-29 = "[s] \"It's fine.\""
1013105-30 = "Shall we move on to today's topic, the Bean Sprout Festival?"
1013105-31 = "For the festival, I usually stir-fry spicy soybean sprouts and pork!"
1013105-32 = "I start with slightly-cooked soybean sprouts, then I add accentuating spices and pork before stir-frying the whole thing."
1013105-33 = "The soybean sprouts' flavor adds depth to the pork while the sauce and the fat rendered from the pork coat the bean sprouts..."
1013105-34 = "That harmony makes this a perfect dish for cold winter days like this one. It's a symphony of calories, vitamins, and fiber!"
1013105-35 = "[s] \"Oh, that's exciting.\""
1013105-36 = "Indeed. Please give me a moment!"
1013105-40 = "The dish is ready, Sensei!"
1013105-41 = "You can have this over rice, or as a side dish!"
1013105-42 = "Or would you prefer bread? If you prefer a more \"hands-on experience,\" we can treat it as a sandwich filling. I recommend black bread!"
1013105-46 = "[ns1] \"Delicious! I'll dig in!\"\n[ns2] \"My heart's warming up... Such an exciting flavor...\"\n[ns3] \"It's not too gourmet or unique, but it's made with care by a student!\""
1013105-50 = "What? Well... I am a mere student of Red Winter after all...far from professional."
1013105-51 = "But if you're enjoying it, know that there's plenty left. Please help yourself!"
1013105-53 = "I continued sharing the heart-warming meal with Takane."

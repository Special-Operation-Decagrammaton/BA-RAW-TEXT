[translation]
1013105-1 = "เทศกาลถั่วงอก"
1013105-2 = "ห้องครัวโรงอาหารที่ 3 เรดวินเทอร์"
1013105-3 = "[ns] \"ไม่ใช่ถั่วงอกทั่วไป แต่เป็นถั่วงอกหัวโตเหรอ?\""
1013105-4 = "ค่ะ ถั่วงอกทั่วไปก็คือถั่วเขียวงอก"
1013105-5 = "ส่วนถั่วงอกหัวโตคือถั่วเหลืองงอกค่ะ"
1013105-6 = "แน่นอนว่าถั่วงอกทั่วไปทั้งนิ่มกว่าและให้รสชาติที่กลมกล่อมกว่าถั่วงอกหัวโต..."
1013105-7 = "แต่มันสุกง่ายไปหน่อย โดนความร้อนแค่เดี๋ยวเดียวก็นิ่มหมดแล้วค่ะ"
1013105-8 = "[s] \"แล้วงานเทศกาลถั่วงอกที่ว่าล่ะ...?\""
1013105-9 = "นั่นคือ... สิ่งที่ฉันคิดเอาเองตามอำเภอใจค่ะ"
1013105-10 = "ในวันพุธของทุก 2 สัปดาห์ ฉันจะทำอาหารปิ้งย่างที่มีถั่วงอกเป็นวัตถุดิบน่ะค่ะ"
1013105-11 = "อย่าถามฉันนะคะว่านั่นเป็นไม่กี่เมนูที่ฉันทำเป็นหรือเปล่า..."
1013105-12 = "ในเมื่อเป็นอย่างนี้แล้ว ฉันขอ 'วิจารณ์' เกี่ยวกับถั่วงอกธรรมดากับถั่วงอกหัวโตสักหน่อยดีกว่า"
1013105-13 = "ฉันอธิบายวิธีเตรียมวัตถุดิบแต่ละอย่างไปแล้ว งั้นฉันจะขอข้ามส่วนนั้นไปนะคะ"
1013105-14 = "ถั่วงอกทั่วไปให้เนื้อสัมผัสนุ่มกว่าถั่วงอกหัวโต จะกินดิบๆ หรือแค่เอาไปลวกเล็กน้อยก็อร่อยแล้วค่ะ"
1013105-15 = "ในทางกลับกัน ถั่วงอกหัวโตจะอวบและแข็งกว่าถั่วงอกทั่วไป"
1013105-16 = "ถ้าปรุงไม่นานพอ เนื้อสัมผัสและกลิ่นก็จะไม่ค่อยดีเท่าไรค่ะ"
1013105-17 = "แต่ก็ใช้ประโยชน์จากจุดนี้ได้โดยการใช้ทำน้ำซุปหรือเอาไปใส่ในอาหารที่อยากให้ซอสเข้าเนื้อค่ะ"
1013105-18 = "มีคำกล่าวที่ว่าซุปที่ทำจากถั่วงอกหัวโตที่มีรสชาติเป็นเอกลักษณ์ คืออาหารเช้าที่ดีที่สุดในวันที่รู้สึก#nไม่สบายด้วยค่ะ"
1013105-19 = "[s] \"วิจารณ์ในทุกแง่จริงๆ สินะ...\""
1013105-20 = "คุณครูคะ ฉันจะบอกให้แค่ที่นี่นะคะ"
1013105-21 = "นักวิจารณ์ในยุคปัจจุบันต้องทำอย่างนี้ละค่ะ! ถ้าไม่ทำแบบนี้ก็อยู่รอดไม่ได้หรอกค่ะ!"
1013105-22 = "นักวิจารณ์น่ะ! เป็นคนที่หาเลี้ยงชีพด้วยการสร้างข้อโต้แย้งตั้งแต่แรกแล้วค่ะ! ต้องเป็นแบบนี้ละค่ะถึงจะถูก!"
1013105-27 = "อะแฮ่ม ฉันเผลอตื่นเต้นไปหน่อยสินะคะ ให้คุณครูได้เห็นด้านที่ไม่น่ามองจนได้"
1013105-28 = "ขอโทษด้วยค่ะ คุณครู"
1013105-29 = "[s] \"ไม่เป็นไรเลย ไม่เป็นไร...\""
1013105-30 = "ถ้างั้นเรากลับเข้าเทศกาลถั่วงอกของวันนี้อีกครั้งดีมั้ยคะ?"
1013105-31 = "เมนูที่ฉันทำบ่อยๆ ในเทศกาลถั่วงอกก็คือ 'เนื้อย่างใส่ถั่วงอก' ค่ะ!"
1013105-32 = "ผัดถั่วงอกให้สุกพอประมาณ จากนั้นก็ใส่ซอสปรุงรสแล้ววางเนื้อหมูไว้ด้านบน รอสักพักแล้วก็ผัดต่อ"
1013105-33 = "น้ำซุปจากถั่วงอกช่วยเพิ่มรสชาติให้กับเนื้อหมู และถั่วงอกก็ยังดูดซับรสชาติของไขมันหมู กับซอสปรุงรส"
1013105-34 = "โดยเฉพาะในเรดวินเทอร์ที่อากาศหนาวเย็นแบบนี้ เมนูนี้คืออาหารจานเด็ดที่ทำง่าย รวดเร็ว ทั้งยังให้พลังงาน วิตามิน และใยอาหารครบถ้วนเลยค่ะ!"
1013105-35 = "[s] \"โอ้ อยากกินแล้วสินะ\""
1013105-36 = "งั้นช่วยรอสักครู่นะคะ!"
1013105-40 = "เสร็จแล้วค่ะ คุณครู!"
1013105-41 = "จะทานเปล่าๆ หรือจะทานกับข้าวก็ได้ค่ะ!"
1013105-42 = "หรือว่าคุณครูชอบขนมปังมากกว่าคะ? จะหั่นขนมปังแล้วทานแบบแซนด์วิชก็ได้นะคะ ขนมปังข้าวไรย์ก็อร่อยเหมือนกันค่ะ!"
1013105-46 = "[ns1] \"อาหารจากนักเรียนของครูคนนี้! อร่อยมากเลย!\"\n[ns2] \"รสชาติที่คิดถึง... กินแล้วอบอุ่นหัวใจจัง...\"\n[ns3] \"เมนูธรรมดาที่นักเรียนของครูทำให้... กินแล้วสุขใจจัง...\""
1013105-50 = "คะ? แต่ฉัน... เป็นแค่นักเรียนธรรมดาคนหนึ่งจากเรดวินเทอร์เองนะคะ?"
1013105-51 = "ฉันเตรียมถั่วงอกไว้เยอะเลย คุณครูทานเยอะๆ เลยนะคะ!"
1013105-53 = "(แล้วคุณครูกับทาคาเนะก็กินอาหารที่ทำให้หัวใจอบอุ่นด้วยกัน)"

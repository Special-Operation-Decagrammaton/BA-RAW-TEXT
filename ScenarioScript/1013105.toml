[translation]
1013105-1 = "#title;콩나물 축제"
1013105-2 = "#place;붉은겨울 제3 공용 급식소 주방"
1013105-3 = "[ns] \"숙주나물이 아니라, 콩나물?\""
1013105-4 = "3;타카네;07;네. 숙주나물은 녹두의 싹을 틔워서 먹는 나물이고.\n#3;a\n#3;em;[반응]"
1013105-5 = "3;타카네;00;콩나물은 콩을 싹 틔워서 먹는 나물이죠."
1013105-6 = "3;타카네;12;물론 숙주나물이 콩나물보다 더 부드럽고 맛이 깔끔해서 먹기 좋지만…….\n#3;em;…"
1013105-7 = "3;타카네;07;지나치게 빨리 익는 나머지, 순식간에 흐물흐물하게 되어 버리는 부분도 있거든요."
1013105-8 = "[s] \"그보다 콩나물 축제라는 건 뭐야……?\""
1013105-9 = "3;타카네;04;그건 제가…… 조금 멋대로 정한 것이기는 한데요.\n#3;em;[///]\n#3;stiff"
1013105-10 = "3;타카네;14;2주일에 한 번, 수요일에 콩나물로 철판구이 요리를 만들어 먹고는 했거든요."
1013105-11 = "3;타카네;06;……그게 제가 할 줄 아는 얼마 안 되는 요리냐고는, 묻지 말아 주시고요…….\n#3;em;[땀]"
1013105-12 = "3;타카네;08;이왕 이렇게 된 거, 콩나물과 숙주나물에 대한 '평론'을 해 보도록 하죠."
1013105-13 = "3;타카네;00;각각의 식재료를 어떻게 만드는지는 이미 말씀드린 바 있으니 넘어가도록 하겠습니다."
1013105-14 = "3;타카네;07;숙주나물은 콩나물에 비해 부드러워서, 생으로 먹거나 살짝 데치는 것만으로 충분히 맛있어지죠.\n#3;em;[재잘]\n#3;m4"
1013105-15 = "3;타카네;02;반대로 콩나물은 숙주나물보다 상대적으로 크기가 크고 억센 부분이 있어서."
1013105-16 = "3;타카네;01;어느 정도 충분히 조리하지 않으면, 식감과 냄새가 확실히 잡히지 않는데.\n#3;em;…"
1013105-17 = "3;타카네;07;이 부분을 거꾸로 이용해서, 국물을 내거나 소스를 배어들게 하는 데에는 더 유리한 부분이 있어요.\n#3;m3"
1013105-18 = "3;타카네;10;특히 콩나물로 끓인 국은, 그 독특한 풍미로 인해, 속이 좋지 않은 날의 아침 식사로 최고라는 말도 있죠.\n#3;em;[반짝]"
1013105-19 = "[s] \"정말 모든 걸 평론하는구나…….\""
1013105-20 = "3;타카네;05;선생님. 여기에서만 드리는 말씀인데요."
1013105-21 = "3;타카네;09;요즘 평론가는 그렇게 해야 해요! 안 그러면 생활을 유지하기 어렵다고요!\n#3;closeup\n#3;em;[!]"
1013105-22 = "3;타카네;09;평론가는 말이죠! 애초부터 논쟁을 불러일으키는 것을 직업으로 하는 사람이었어요! 이게 정상이라고요!\n#3;jump\n#3;closeup"
1013105-23 = "#st;[0,0];instant;1;"
1013105-24 = "#clearST"
1013105-25 = "3;타카네;17\n#3;em;[반응]\n#3;closeup\n#wait;1500"
1013105-26 = "3;타카네;06\n#3;d\n#3;closeup\n#wait;1000"
1013105-27 = "3;타카네;06;크흠. 조금 흥분하고 말았네요. 안 좋은 모습을 보여드렸어요.\n#3;a\n#3;em;[속상함]"
1013105-28 = "3;타카네;11;죄송합니다. 선생님."
1013105-29 = "[s] \"괜찮으니까, 괜찮으니까…….\""
1013105-30 = "3;타카네;07;그러면 다시, 오늘의 콩나물 축제로 들어가 보도록 할까요?"
1013105-31 = "3;타카네;08;제가 콩나물 축제에서 주로 요리하곤 하는 메뉴는, '콩불'이랍니다!\n#3;em;[반응]"
1013105-32 = "3;타카네;12;어느 정도 살짝 익힌 콩나물 위에, 양념과 돼지고기를 얹어 끓이듯이 볶아내서."
1013105-33 = "3;타카네;00;콩나물의 육수로 돼지고기에 향을 입히고, 콩나물에는 오히려 돼지고기의 기름 맛과 양념장을 배어들게 만드는……."
1013105-34 = "3;타카네;03;특히 이렇게 추운 붉은겨울에서는, 쉽고 빠르게 열량과 비타민, 섬유질을 모두 챙길 수 있는 멋진 요리죠!\n#3;em;[반짝]"
1013105-35 = "[s] \"오, 기대되네.\""
1013105-36 = "3;타카네;08;그러면, 조금만 기다려 주세요!\n#3;em;[음표]\n#3;m2"
1013105-37 = "#all;hide"
1013105-38 = "#wait;2000"
1013105-39 = "#all;hide"
1013105-40 = "3;타카네;07;다 되었답니다, 선생님!\n#3;a\n#3;em;[반응]"
1013105-41 = "3;타카네;10;밥 위에 얹어 드셔도 좋고, 반찬으로 드셔도 좋아요!"
1013105-42 = "3;타카네;08;아니면 빵이 좋으신가요? 빵을 잘 갈라서 샌드위치처럼 드시는 방법도 있으니까요. 검은 빵이 또 별미죠!\n#3;em;[재잘]"
1013105-43 = "#st;[0,0];instant;1;"
1013105-44 = "#clearST"
1013105-45 = "#wait;1500"
1013105-46 = "[ns1] \"맛있네! 잘 먹을게!\"\n[ns2] \"뭔가 마음이 푸근해지는…… 그립고 정겨운 맛이야…….\"\n[ns3] \"고급스럽거나 특별한 것이 아닌, 우리 학생이 해 준 것 같은 요리…….\""
1013105-47 = "#wait;10"
1013105-48 = "#wait;10"
1013105-49 = "#wait;10"
1013105-50 = "3;타카네;02;네? 그야…… 저는 그저 붉은겨울의 평범한 학생일 뿐인걸요?\n#3;em;[?]"
1013105-51 = "3;타카네;03;그보다 콩불은 얼마든지 더 있으니까요. 많이 많이 드셔 주세요!\n#3;jump"
1013105-52 = "#all;hide"
1013105-53 = "#na;(그렇게 타카네와 함께, 마음까지 따듯해지는 식사를 나눴다.)"

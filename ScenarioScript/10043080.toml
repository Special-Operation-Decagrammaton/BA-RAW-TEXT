[translation]
10043080-1 = "ตอนที่ 8;เกมที่จริงใจเริ่มจาก 2 เอาต์ในปลายอินนิ่ง 9"
10043080-2 = "ขอฉันดูหน่อยสิคะ ฉันรับมือกับอาการบาดเจ็บจากการเทรนนิ่งได้ค่ะ..."
10043080-6 = "อึก... อึกก..."
10043080-8 = "ปะ... เป็นยังไงบ้าง?"
10043080-9 = "รุ่นพี่ แผลเป็นยังไงบ้างคะ? แบบนี้จะไหวหรือเปล่า?"
10043080-14 = "อืม..."
10043080-15 = "ว่าไงคะ? เป็นยังไงคะ? รุ่นพี่???"
10043080-16 = "เท่าที่ดู กระดูกยังไม่แตกหรือหักค่ะ นี่เป็นข่าวดีเลยค่ะ"
10043080-17 = "แต่ว่า... ฉันว่ามันอันตรายถ้าจะหวดลูกต่อในวันนี้ค่ะ คุณควรให้มือได้พักอย่างน้อยสักสามวันเลย"
10043080-18 = "ถ้าไม่ระมัดระวังหรือหักโหมละก็ เส้นเอ็นอาจเสียหายถาวรเลยก็ได้ค่ะ..."
10043080-19 = "เสียหาย... ถาวรเลยเหรอคะ? เป็นไปได้ยังไง...!"
10043080-21 = "แล้วทำไมแบตเตอร์ลำดับที่ 4 ถึงโผล่มาเอี่ยวกับพวกเราในช่วงเวลาที่สำคัญอย่างนี้นะ!"
10043080-22 = "......"
10043080-23 = "ไม่สิ... ถ้าลองคิดดู มันเป็นความผิดของฉันเอง..."
10043080-24 = "ฉันไม่ควรก่อเรื่องเหลวไหลแบบนี้... ฉันไม่ควรให้มีการต่อสู้..."
10043080-25 = "แต่ถึงยังไง... ฉันก็ยอมรับว่า..."
10043080-26 = "ฉันอยากเห็นทีมชนะดูสักครั้งนี่นา! หรือถ้าแพ้ ก็อยากเห็นการแพ้ในแบบที่ยอมรับได้!"
10043080-27 = "แต่การแข่งที่ทำให้ยอมรับผลได้จริง ๆ มันไม่มีอยู่หรอก..."
10043080-28 = "มีแค่การฝึกซ้อมเท่านั้นละที่เรายอมรับได้อย่างสุดหัวใจ..."
10043080-30 = "คุณโค้ช...!"
10043080-31 = "เป็นคำที่กินใจฉันมากเลยค่ะ ต้องเอาไปจดไว้ในสมุดโน้ตเทรนนิ่งของฉันแล้วละ"
10043080-36 = "ตีไม่ได้เลยครับ! โฟร์บอล! เดินเบส!"
10043080-37 = "2 เอาต์ในช่วงท้ายของอินนิ่งที่ 9 ตอนนี้เบรฟส์ครองเบสได้เต็มแล้วครับ!"
10043080-38 = "ในกีฬาเบสบอล การเอ่ยถึงผลลัพธ์บางอย่างในบางสถานการณ์ถือเป็นเรื่องละเอียดอ่อน"
10043080-39 = "แต่ในสถานการณ์แบบนี้... ผมเองก็แอบหวังใน 'ผลลัพธ์นั้น' อยู่หน่อยๆ นะครับ"
10043080-41 = "แฟนๆ ทุกคนในสนาม! ต่อไปเป็นแบตเตอร์ลำดับที่ 4 ครับ!"
10043080-42 = "ช่วงเวลานี้ละครับ! บางทีแมตช์ของวันนี้อาจสร้างมาเพื่อช่วงเวลานี้ก็ได้!"
10043080-45 = "[ns] \"2 เอาต์? ปลายอินนิ่ง 9? เบสเต็ม? จริงเหรอเนี่ย?!\""
10043080-46 = "ถึงจะเป็นคำที่พูดทีเล่นทีจริงกัน แต่ก็มีคนที่บอกว่าเกมที่จริงใจเริ่มจาก 2 เอาต์ในปลายอินนิ่งที่ 9 ค่ะ..."
10043080-47 = "ไม่อยากเชื่อเลยนะคะว่าจะเกิดสถานการณ์แบบนี้จริงๆ..."
10043080-48 = "อ๊ายยย ทำยังไงดีล่ะคะโค้ช? แบตเตอร์สำรอง... ต้องหาแบตเตอร์สำรองค่ะ...!"
10043080-49 = "ปะ... เปอร์เซ็นต์การตีลูกของคนอื่นมัน...?"
10043080-50 = "ไม่ไหวหรอก... แบตเตอร์สำรองเหลืออยู่แค่ 2 คน แล้วเปอร์เซ็นต์การตีลูกก็อยู่ที่ 0.069% กับ 0.053%"
10043080-51 = "ถ้าตัวเลขจะห่วยแตกแบบนั้น ไปจับมือใครก็ได้บนอัฒจันทร์แล้วให้หลับตาตี ยังน่าจะทำได้ดีกว่าเลย!"
10043080-52 = "หมดหนทางแล้วเหรอ... สุดท้ายเกมวันนี้... ก็ต้องจบแบบนี้อีกแล้วสินะ..."
10043080-56 = "[ns] \"ไม่หรอก... เรายังมีหนทาง\""
10043080-61 = "เมื่อกี้บอกว่า... ยังมีหนทางงั้นเหรอ คุณครู?"
10043080-62 = "คืออะไรเหรอคะ?!!!"
10043080-63 = "[s] \"เรย์\""
10043080-64 = "ค่ะ คุณครู!"
10043080-65 = "[s] \"เรย์นั่นแหละ หนทางของเรา\""
10043080-69 = "คะ...?"
10043080-70 = "ใครนะ? ฉันน่ะเหรอคะ???"
10043080-71 = "ว่าไงนะคะ? พอมาพิจารณาโดยรวมแล้ว คนที่น่าจะตีลูกได้ดีที่สุดในตอนนี้คือฉันงั้นเหรอ?"
10043080-72 = "นี่คือเวลาที่จะแสดงตัวตนของแบตเตอร์ลำดับที่ 4 ของชมรมเบสบอลมิลเลเนียมให้ทุกคนเห็น#nงั้นเหรอคะ???"
10043080-73 = "เอ่อ... ใจเย็นๆ ก่อนนะคะ คุณครู เห็นอย่างนี้ฉันก็แยกแยะได้นะคะว่าอะไรคือสิ่งที่ฉันทำได้และไม่ได้"
10043080-74 = "ก่อนอื่นเลย ฉันเป็นนักเรียนโรงเรียนมิลเลเนียม และฉันก็เข้าถึงกีฬาเบสบอลจากการวิเคราะห์ข้อมูล#nกับสถิติมากกว่าการเล่นจริงค่ะ"
10043080-75 = "ชมรมเบสบอลมิลเลเนียม... เป็นแค่ทีมมือสมัครเล่นของโรงเรียนมัธยมปลายที่เรียกว่าเป็นทีมที่#nแข็งแกร่งไม่ได้ด้วยซ้ำค่ะ"
10043080-80 = "คะ... คุณครูคะ?!?!"
10043080-84 = "(คุณครูจับไหล่ของเรย์แน่น)"
10043080-85 = "เอ่อ... คุณครู ฉันเจ็บค่ะ ไม่สิ ที่จริงก็ไม่เจ็บหรอก แต่ว่า..."
10043080-86 = "คุณครูเอาหน้าเข้ามาใกล้มากไปหน่อย ฉันก็เลยเขิน..."
10043080-87 = "[s] สบตากับเรย์"
10043080-88 = "คะ... คะคะคะคะ... คุณครู?!"
10043080-89 = "[s] \"ฟังครูนะ เรย์ มองตาครู เรย์ทำได้\""
10043080-90 = "เอาเหตุผลอะไรมาเชื่อแบบนั้นคะ!"
10043080-91 = "[s1] \"เปอร์เซ็นต์การตีลูกของเรย์คือ 8% เลยนะ\"\n[s2] \"เรย์ตีลูกได้ถึง 8%... ตัวเลขนี้สูงกว่าในเกมมือถืออีกนะ!\""
10043080-94 = "คะ...?"
10043080-95 = "[ns3] \"ถ้าไม่เชื่อในตัวเอง ก็เชื่อในครูที่เชื่อเรย์อีกทีนะ\"\n[ns4] \"ยังไงซะการแข่งขันนี้มันก็ไม่มีอะไรจะเสียอยู่แล้ว!\""
10043080-99 = "[ns5] \"ต่อให้เรย์ทำพลาดก็ไม่มีใครว่าหรอก\"\n[ns6] \"ต่อให้เบรฟส์แพ้ ตอนนี้ก็ไม่ใช่เรื่องใหญ่โตหรอก!!\""
10043080-104 = "พอฟังดูแล้ว ที่คุณครูพูดมามันก็จริงอยู่นะคะ!"
10043080-105 = "จะบอกว่าพูดผิดก็... เถียงไม่ออกเลยแฮะ..."
10043080-106 = "อะ... อื้ม...!"
10043080-107 = "เบสบอล... เป็นกีฬาของทุกคน และดำเนินต่อไปได้เพราะมีคนเล่น"
10043080-108 = "จริงอยู่ที่แนวโน้มของเกมมุ่งไปที่สถิติ ตัวเลข และทฤษฎีมากขึ้นไปทุกวัน..."
10043080-109 = "แต่เพราะมันเป็นเกมกีฬาที่ขับเคลื่อนโดยคนเล่น บางครั้งความเชื่อมั่นในตัวเองก็มีบทบาทมากกว่า#nตัวเลขพวกนั้น"
10043080-111 = "ใช่แล้วละค่ะ เรย์ ต่อให้ผลการแข่งขันจะออกมาซ้ำเดิม แต่แฟนๆ จำนวนมากก็ยังคงมาที่นี่ เพื่อให้กำลังใจทีมอย่างไม่ลดละ"
10043080-112 = "นี่คือปรากฏการณ์ทางกีฬาที่อธิบายด้วยตัวเลขและสถิติไม่ได้นะคะ"
10043080-113 = "ออกไปจับไม้เถอะค่ะ ตีโดยไม่ต้องคาดหวังหรือเสียใจอะไร ฉันจะคอยเชียร์อยู่ตรงนี้ค่ะ"
10043080-118 = "รุ่นพี่..."
10043080-124 = "ได้ค่ะ แล้วฉันจะกลับมานะคะ"
10043080-137 = "ดูกันอยู่หรือเปล่าครับทุกคน! แบตเตอร์สำรองที่ไม่มีใครคาดหวัง แบตเตอร์สำรองที่ไม่มีใครคาดคิด แบตเตอร์สำรองที่ไม่มีใครรู้จัก!"
10043080-138 = "แบตเตอร์สำรองคนนั้น! กำลังสร้างผลงานที่ร้อนแรงที่สุดในแมตช์วันนี้เลยละครับ!"
10043080-142 = "แบตเตอร์สำรองคนนั้น... ใครกันน่ะ? ไม่เคยเห็นหน้ามาก่อนเลย..."
10043080-143 = "โชว์ฝีมือขนาดนี้ได้จาก 2 เอาต์และเบสเต็มในท้ายอินนิ่งที่ 9... แบตเตอร์สำรองคนนี้เล่นดีกว่า#nแบตเตอร์หลักอีกนะ..."
10043080-148 = "นี่สินะที่บอกว่าสงครามยังไม่จบ อย่าเพิ่งนับศพทหาร! ขอร้องละ สงครามในวันนี้... ขอให้!!!"
10043080-149 = "อึกกก... โอยยย... ไม่กล้าดูแล้ว หัวใจเต้นไม่เป็นจังหวะเลย โอ๊ยยยย..."
10043080-150 = "อ่า ได้โปรดเถอะ สิ่งศักดิ์สิทธิ์ทั้งหลาย แล้วก็แบตเตอร์สำรองที่ฉันไม่รู้จักชื่อ ได้โปรด..."
10043080-153 = "ทู สไตรค์ ทรี บอล... เราเรียกสถานการณ์นี้ว่าฟูลเคาท์ครับ ตัววิ่งเต็มเบสในท้ายอินนิ่งที่ 9"
10043080-154 = "ประโยคที่ว่า \"ถอยไม่ได้ แต่ที่ไปก็ไม่มี\" อาจมีไว้เพื่อช่วงเวลาแบบนี้เลยก็ได้นะครับ"
10043080-159 = "ในจังหวะนี้เอง พิชเชอร์! ถูกรั้งไว้ที่เบสแรกครับ! โชคดีที่ตัววิ่งไปถึงเร็ว!"
10043080-160 = "พิชเชอร์เองก็ดูประหม่าเลยนะครับ ก็ถือว่าไม่แปลกหรอก"
10043080-166 = "(ไม่ได้ยินเสียงอะไรเลย...)"
10043080-167 = "(ทั้งๆ ที่มีผู้ชมมากมาย และบรรยากาศก็ร้อนแรงขนาดนี้)"
10043080-168 = "(แต่ฉันกลับไม่ได้ยินเสียงอะไรเลย)"
10043080-172 = "พิชเชอร์ถูกรั้งไว้อีกแล้ว! ครั้งนี้เป็นเบส 3 ครับ!"
10043080-173 = "(คุณครูบอกให้ฉันเชื่อมั่นในตัวเอง)"
10043080-174 = "(แต่ถ้าเชื่อมั่นในตัวเองไม่ได้ ก็ขอให้เชื่อมั่นในคุณครู)"
10043080-175 = "(บอกตามตรงว่าฉันยังไม่รู้เลยว่ามันหมายความว่าอะไร แต่ว่า...)"
10043080-179 = "ออกไปจับไม้เถอะค่ะ ตีโดยไม่ต้องคาดหวังหรือเสียใจอะไร ฉันจะคอยเชียร์อยู่ตรงนี้ค่ะ"
10043080-180 = "(รุ่นพี่บอกว่าจะเชียร์ฉัน)"
10043080-186 = "แต่การแข่งที่ทำให้ยอมรับผลได้จริง ๆ มันไม่มีอยู่หรอก..."
10043080-187 = "(เขาพูดถูกแล้วละ โดยเฉพาะสำหรับทีมนี้... และสำหรับฉันด้วย)"
10043080-193 = "ถ้าการให้กำลังใจของฉันทำให้ใครบางคนมีแรงฮึดสู้ขึ้นมา... และถ้ามันช่วยให้เขาคนนั้นพยายาม#nอีกครั้งในสิ่งที่เกือบจะยอมแพ้ไปแล้ว..."
10043080-194 = "(และก็...)"
10043080-197 = "[log]\"ครูชอบการได้...\"[/log]"
10043080-199 = "[log]\"เฝ้าดูนักเรียนน่ะ\"[/log]"
10043080-203 = "(บางเรื่องที่อยากยอมแพ้)"
10043080-204 = "(แต่ก็ไม่อาจยอมแพ้ได้...)"
10043080-205 = "(...)"
10043080-206 = "(หายใจเข้าลึกๆ)"
10043080-207 = "(ตามองไปข้างหน้า)"
10043080-211 = "พิชเชอร์ เซ็ต โพซิชั่น! ลูกตัดสินครับ!"
10043080-214 = "สู้เขานะคะ เรย์! เรย์ทำได้! ไม่ต้องกดดันตัวเองนะคะ!"
10043080-215 = "ทำให้เต็มที่ จากนั้นก็ปล่อยให้เป็นหน้าที่ของผลลัพธ์ค่ะ"
10043080-216 = "ฉันชอบและชื่นชมคนที่ไม่ยอมแพ้ค่ะ!"
10043080-240 = "ตีโดนแล้วครับ! โดนไปเต็มๆ ข้อเลย!"
10043080-241 = "ไม่ธรรมดาเลยครับ!"
10043080-242 = "ไปหลังปีกซ้าย! หลังปีกซ้าย! กำแพงซ้าย! กำแพงซ้าย! ลอยลิ่วไปแล้วครับ! ลอยลิ่วไปเลย!"
10043080-243 = "เป็นการตีลูกที่มีพลังมากเลยครับ!!!"
10043080-248 = "ข้ามไปแล้วครับ!!! ข้ามไปแล้ว!!! ข้ามกำแพงซ้ายไปแล้ว!!! อย่างนั้นละ! โฮมรันแบบแกรนด์สแลม! เกมพลิกเลยครับ!!!"
10043080-249 = "ทีมคอร์กี้ เบรฟส์!!! ปิดการแข่งขันด้วยโฮมรันแบบแกรนด์สแลม!!!"
10043080-250 = "ในที่สุดก็ทำได้นะครับ! ผมแทบไม่เชื่อสายตาตัวเองเลย!!! เรื่องแบบนี้เกิดขึ้นได้จริงๆ สินะครับ!!!"
10043080-251 = "ใช่ครับ! ชัยชนะแรกของคอร์กี้ เบรฟส์ในชิราโทริซีรีส์!!! ชนะได้อย่างปาฏิหาริย์เลยครับ!!!"
10043080-254 = "(จำไม่ได้เลยว่าเกิดเรื่องอะไรขึ้น และได้ยินเสียงอะไรบ้าง)"
10043080-255 = "(แต่สิ่งที่จำได้อย่างแม่นยำก็คือ ความรู้สึกที่ 'ตีโดน' อะไรบางอย่าง)"
10043080-258 = "(และภาพอันตราตรึงของลูกบอลสีขาวที่ลอยสูงเป็นเส้นโค้งขึ้นไปบนฟ้า)"
10043080-263 = "คอร์กี้ ชนะแล้ว! คอร์กี้ ชนะแล้ว!"
10043080-264 = "เย้! คอร์กี้ ชนะแล้ว!!!"
10043080-266 = "ฮืออ... ในที่สุด... ในที่สุดก็ชนะ ในที่สุดก็ได้ชัยชนะแรกมาแล้ว...!"

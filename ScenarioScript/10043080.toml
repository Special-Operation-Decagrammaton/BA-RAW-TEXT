[translation]
10043080-1 = "Episode 8;9th Inning, 2 Outs, Life Begins"
10043080-2 = "Let me see. I have a little practice treating injuries in training..."
10043080-6 = "Ugh... Ugh..."
10043080-8 = "H-How's it look?"
10043080-9 = "It's fine. I'm sure it's fine. Right, Sumire?"
10043080-14 = "Well..."
10043080-15 = "Well, what? How is it? Huh?!"
10043080-16 = "The good news is, I don't think there's any broken bones."
10043080-17 = "But...swinging the bat today would be risky. I wouldn't use that wrist for at least three days."
10043080-18 = "Or you might end up with permanent ligament damage."
10043080-19 = "Permanent damage? Are you serious?"
10043080-21 = "He should've stayed down there where he belonged!"
10043080-22 = "..."
10043080-23 = "...I shouldn't say that. This is our fault..."
10043080-24 = "If we hadn't gone ahead with this stupid plan...if we'd just watched the game..."
10043080-25 = "But...still..."
10043080-26 = "I wanted to see us win! Or at least, I wanted to see an ACCEPTABLE game!"
10043080-27 = "...No game is acceptable, or unacceptable. "
10043080-28 = "Training, yes, but not games."
10043080-30 = "...Coach?"
10043080-31 = "That sounded good. I'm going to write it down."
10043080-36 = "And that's Ball Four! The Heroes get a base!"
10043080-37 = "The bottom of the ninth, two outs, and the bases are loaded!"
10043080-38 = "You know, some things you don't say out loud, in case you jinx them..."
10043080-39 = "But I REALLY want to see what happens next."
10043080-41 = "And the Heroes' cleanup hitter is on deck!"
10043080-42 = "This could be it, folks!"
10043080-45 = "[ns] \"Bottom of the ninth, two outs, bases loaded? Wow.\""
10043080-46 = "People joke that this is where the real game starts."
10043080-47 = "But yeah, here we are..."
10043080-48 = "Coach, can we send in a pinch hitter?"
10043080-49 = "Uh, who have we got left? What's their batting average?"
10043080-50 = "Oh, we're done. There's two guys left, and their batting averages are oh-six-nine and oh-five-three."
10043080-51 = "You could get anyone from the stands, have them swing with their eyes closed, and they'd probably have a better chance."
10043080-52 = "We've come all this way, and this is how it ends?"
10043080-56 = "[ns] \"No... No, we've still got one chance.\""
10043080-61 = "What's your plan, Sensei?"
10043080-62 = "Yeah, what is it?!"
10043080-63 = "[s] \"Rei.\""
10043080-64 = "Y-Yes? What?"
10043080-65 = "[s] \"No, I mean you're the plan, Rei.\""
10043080-69 = "...What?"
10043080-70 = "Me??"
10043080-71 = "What do you mean, \"I'm the best batter here?\""
10043080-72 = "What do you MEAN, \"It's time to show them what the Millennium Baseball Club's cleanup hitter is made of\"?!"
10043080-73 = "Look, I mean, thanks, but I know what I can and can't do."
10043080-74 = "I'm a Millennium student. The baseball club's all about data and statistical analysis."
10043080-75 = "...And we're an amateur high school team. We're not that good."
10043080-80 = "S-Sensei?!"
10043080-84 = "I clapped my hands down on both of Rei's shoulders."
10043080-85 = "Ow, Sensei! I mean, that didn't HURT..."
10043080-86 = "...but you're REALLY close..."
10043080-87 = "[s] Stare into Rei's eyes."
10043080-88 = "S-S-Sensei?!"
10043080-89 = "[s] \"Listen carefully, Rei. Look me in the eye. You can do this.\""
10043080-90 = "How are you so sure about that?"
10043080-91 = "[s1] \"Your batting rate is a whopping 0.08. Eight percent.\"\n[s2] \"That's much higher than...most mobile games' gacha rates!\""
10043080-94 = "...Huh?"
10043080-95 = "[ns3] \"Believe in yourself! Or believe in me, who believes in you!\"\n[ns4] \"There's nothing to lose in this game anyway!\""
10043080-99 = "[ns5] \"Even if you don't succeed...\"\n[ns6] \"...it's just another loss for the Heroes.\""
10043080-104 = "You know, that kind of almost makes sense..."
10043080-105 = "Well, it's not quite WRONG, but..."
10043080-106 = "Mm, hmm...!"
10043080-107 = "You know, baseball's played by people. For people."
10043080-108 = "These days, more and more, it's all about numbers and theory..."
10043080-109 = "...but people can't always be calculated that way."
10043080-111 = "He's right. All those losses, and people are still here to cheer for their favorite team."
10043080-112 = "Some things in sports, you can't put numbers on."
10043080-113 = "Go out there. No regrets. I'll cheer for you too."
10043080-118 = "Aw, Sumire..."
10043080-124 = "...Okay. Off I go."
10043080-137 = "Are you seeing this, everyone? They've made a last-minute call-up...from the stands!"
10043080-138 = "An unbelievable climax to an incredible game!"
10043080-142 = "Who is that pinch hitter? I've never seen her before..."
10043080-143 = "Bottom of the ninth, two outs, bases loaded...how do they still have a new batter available?"
10043080-148 = "If we lose, it's not the end of the world. If we lose, I'm not going to die. But still...can we win just this once?"
10043080-149 = "Ahh... Uhh... I can't look. I can't. My heart's going to explode. Ahhh..."
10043080-150 = "Whoever's up there, if you're listening, please guide that batter's swing...!"
10043080-153 = "Two strikes, three balls. Full count. Bases loaded. Bottom of the ninth."
10043080-154 = "It's the moment of truth."
10043080-159 = "Oh! And the pitcher attempts a pickoff to first base! The runner reacts in time."
10043080-160 = "That might be a sign the pitcher's getting nervous."
10043080-166 = "(...I don't hear anything.)"
10043080-167 = "(There's so many people watching. I can see them, all fired up.)"
10043080-168 = "(But I don't hear anything.)"
10043080-172 = "Another attempted pickoff! This time to third base!"
10043080-173 = "(Sensei said I should believe in myself.)"
10043080-174 = "(And if I can't, I should believe in Sensei, who believes in me.)"
10043080-175 = "(Honestly, I still don't really understand what that means...)"
10043080-179 = "Go out there. No regrets. I'll cheer for you too."
10043080-180 = "(Sumire's up there too.)"
10043080-186 = "No game is acceptable, or unacceptable."
10043080-187 = "(I think he's right. Especially for this team...maybe for me too.)"
10043080-193 = "I hope my cheers make them feel better, you know? Maybe it'll get 'em to keep trying, instead of giving up."
10043080-194 = "(And...)"
10043080-197 = "[log] \"Well, if I have to be honest...\"[/log]"
10043080-199 = "[log]\"It's because I like seeing you.\"[/log]"
10043080-203 = "(I might have given up.)"
10043080-204 = "(But maybe some things can't be given up...)"
10043080-205 = "(...)"
10043080-206 = "(Breathe in.)"
10043080-207 = "(Look forward.)"
10043080-211 = "The pitcher's winding up. Here it comes!"
10043080-214 = "No pressure, Rei! You got this!"
10043080-215 = "Just give it your best, and that's all that matters!"
10043080-216 = "You've got a great heart! Use it!"
10043080-240 = "It's a hit!"
10043080-241 = "Oh, my..."
10043080-242 = "It's flying out left, over the outfield. It's going, going..."
10043080-243 = "What a hit!"
10043080-248 = "GONE! And that's the ball game, folks! "
10043080-249 = "The Corgi Heroes come back with a GRAND SLAM!!"
10043080-250 = "Finally!! Oh, I never thought I'd see it happen!!"
10043080-251 = "That's right, it's the Corgi Heroes' first victory in the Shiratori series!! A miraculous win! This one's going in the history books!"
10043080-254 = "(I don't really remember much of what happened, or what I heard...)"
10043080-255 = "(What I do remember, is feeling the shock of the bat making contact...)"
10043080-258 = "(And I saw the ball, that white ball, arcing up into the sky...)"
10043080-263 = "Heroes win! Heroes win!"
10043080-264 = "Ahhh!! Heroes win!!"
10043080-266 = "*sob* We won... We finally won. Really, truly, for the first time, we finally won...!"
10043080-272 = "Eek?! What's happening...? Huh...? We won? We really won? Really? The Corgis won!!"
10043080-273 = "I thought it was impossible... I really thought it couldn't happen... There's no hope for this team, that's what I thought...!!"
10043080-277 = "Thank you... Thank you so much..."
10043080-278 = "Thank you so much for giving us our first victory..."
10043080-279 = "I wanted to win... I really wanted to win... Even if it's just once, I really wanted to win...!"
10043080-283 = "It was a long time coming...very long..."
10043080-284 = "But we can't be satisfied with this one victory. The Heroes have just begun to play!"
10043080-287 = "I don't really get it..."
10043080-291 = "...but I'm happy everyone else is happy!"

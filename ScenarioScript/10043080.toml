[translation]
10043080-1 = "第8話;人生從九局下半兩出局開始"
10043080-2 = "請讓我看一下吧。#n我在處置運動傷害方面有一點經驗……"
10043080-6 = "呃……唔唔……"
10043080-8 = "情，情況怎麼樣？"
10043080-9 = "前輩，球員他沒事吧？"
10043080-14 = "唔嗯……"
10043080-15 = "怎，怎麼了？"
10043080-16 = "首先好消息是，骨頭看起來沒有異常。"
10043080-17 = "但壞消息是……今天再用球棒的話，可能會有危險。#n至少得休息三天，避免動用這個部位才行。"
10043080-18 = "否則要是有什麼差錯的話，可能會導致韌帶永久損傷……"
10043080-19 = "永，永久損傷？#n怎麼會……！"
10043080-21 = "所以我才說，為什麼第四棒要在這種關鍵時刻跑到這裡來嘛！"
10043080-22 = "……"
10043080-23 = "……不。仔細想想，是我做錯了……"
10043080-24 = "如果我沒有做這種無謂的事……要是我什麼都沒做的話……"
10043080-25 = "但是……我還是……"
10043080-26 = "好想看到勇士隊贏球的樣子！#n就算輸也要輸得能讓人接受吧！！"
10043080-27 = "……比賽並沒有能不能接受這回事。"
10043080-28 = "能接受的就只有訓練跟練習而已。"
10043080-30 = "總教練……！"
10043080-31 = "真是金玉良言呢。#n我要寫在我的訓練筆記裡。"
10043080-36 = "沒有揮棒！沒有揮棒！四壞保送！"
10043080-37 = "九局下半兩出局，勇士隊達成滿壘！"
10043080-38 = "「在特定情況下預言特定結果」是棒球比賽中眾所周知的禁忌。"
10043080-39 = "但是面對這種情形……連我也忍不住有點期待「那個結果」呢。"
10043080-41 = "打序來到第四棒！是第四棒！#n球場裡的各位球迷們！"
10043080-42 = "這一刻終於來了！#n今天這場比賽，或許就是為了這個瞬間才一路走到現在的！"
10043080-45 = "[ns]「九局下半兩出局滿壘？真的假的！？」"
10043080-46 = "棒球界不是有句俗話說「棒球從九局下半兩出局才開始」嗎？#n雖然這通常有點半自嘲的意味……"
10043080-47 = "沒想到真的遇到這種情況了呢……"
10043080-48 = "怎，怎麼辦，總教練？#n代打，得找人代打才行……！"
10043080-49 = "剩，剩下的代打選手的打擊率是……？"
10043080-50 = "不行……我看行不通啊。#n現在只剩下兩個代打，一個的打擊率是零成六九，另一個則是零成五三……"
10043080-51 = "隨便從觀眾席抓個人上來閉眼揮棒都比他們準！"
10043080-52 = "沒辦法了嗎……#n今天也得迎接一樣的結局嗎……！"
10043080-56 = "[ns]「不……現在還有辦法。」"
10043080-61 = "老師你說……有辦法？"
10043080-62 = "什麼什麼！？是什麼辦法！！！"
10043080-63 = "[s]「莉。」"
10043080-64 = "是，是！"
10043080-65 = "[s]「那個辦法就是你。」"
10043080-69 = "……什麼？"
10043080-70 = "我，我嗎？？？"
10043080-71 = "你說綜觀所有條件，這裡打得最好的人就是我？"
10043080-72 = "是時候展現千年棒球部第四棒真正的實力了？？？"
10043080-73 = "那個，請老師先稍微冷靜一下。#n什麼事情能做，什麼事情不能做……我還是能分清楚的。"
10043080-74 = "首先我也是千年的學生，又是傾向透過數據統計分析探究棒球本質的那種球員。"
10043080-75 = "……而且千年棒球部在客觀上也絕不算強隊，只是業餘的高中球隊而已。"
10043080-80 = "老，老師！？！？"
10043080-84 = "（用力抓住莉的雙肩）"
10043080-85 = "那個，老師。#n這樣……雖然其實不痛……"
10043080-86 = "但臉靠那麼近，我快害羞死了……"
10043080-87 = "[s] 跟莉對視"
10043080-88 = "老，老老老老，老師！？"
10043080-89 = "[s]「你聽我說，莉。看著我的眼睛。你一定能做得到。」"
10043080-90 = "這麼說的根據是什麼！？"
10043080-91 = "[s1]「莉的打擊率足足有零成八，換句話說就是8%。」\n[s2]「這個機率……比一般手遊的中獎機率高多了！」"
10043080-94 = "……啊？"
10043080-95 = "[ns3]「你要相信自己！如果做不到的話，就相信相信你的我吧！」\n[ns4]「反正這場比賽，輸了也沒有什麼損失！」"
10043080-99 = "[ns5]「即使有個萬一，莉真的失手……」\n[ns6]「勇士隊輸球也不是什麼稀奇的事了嘛！！！」"
10043080-104 = "聽起來好像是這樣沒錯！"
10043080-105 = "確實……無法反駁……"
10043080-106 = "唔，唔唔……！"
10043080-107 = "棒球……是由人與人所構成的運動。"
10043080-108 = "儘管如今變得越來越仰賴統計數字和理論……"
10043080-109 = "不過既然操之於人，有時也會發生數字無法解釋，只能親自感受的情況。"
10043080-111 = "是啊，莉同學。#n這支敗績累累的球隊，今天依然吸引無數球迷到場支持……"
10043080-112 = "這不也是無法用機率和統計解釋──屬於運動的現象嗎？"
10043080-113 = "去打擊區不留遺憾地拚一次吧。#n我也會為你加油的。"
10043080-118 = "前輩……"
10043080-124 = "那麼我去去就回。"
10043080-137 = "各位觀眾都看見了嗎！#n現在站上打擊區的是沒有人期待、沒有人預料──甚至沒有人認識的代打！"
10043080-138 = "這位代打選手，將為今天這場比賽寫下最熱烈的結局！"
10043080-142 = "那個代打……是誰啊？#n從來沒見過……"
10043080-143 = "這支球隊在九局下半二出局滿壘的情況下，竟然還有能派上場的打者……"
10043080-148 = "就算這場輸了也不是世界末日。就算這場輸了我的人生也不會完蛋。#n就算這場輸了我也……不，拜託今天一定要──！！！"
10043080-149 = "呃……啊啊啊……不行，我真的不敢再看下去了。#n感覺心臟要爆炸了……"
10043080-150 = "老天爺啊，佛祖啊，不知道名字的代打大人啊……！#n算我求求你們了……！"
10043080-153 = "兩好三壞……也就是所謂的滿球數。#n再加上滿壘和九局下半……"
10043080-154 = "用「背水一戰」來形容這個局面，簡直再適合不過了。"
10043080-159 = "就在這時，投手牽制了一壘！#n幸好跑者腳程夠快！"
10043080-160 = "代表投手也跟著緊張起來了。這也是理所當然的。"
10043080-166 = "（……聽不見任何聲音）"
10043080-167 = "（明明聚集了這麼多人，氣氛這麼熱烈）"
10043080-168 = "（但我卻什麼都聽不見）"
10043080-172 = "投手再次牽制！這次是三壘！"
10043080-173 = "（老師跟我說要相信自己）"
10043080-174 = "（如果辦不到的話，就相信相信著我的老師）"
10043080-175 = "（老實說，我到現在還是不太懂那是什麼意思……）"
10043080-179 = "去打擊區不留遺憾地拚一次吧。#n我也會為你加油的。"
10043080-180 = "（前輩也說會為我加油）"
10043080-186 = "……比賽並沒有能不能接受這回事。"
10043080-187 = "（這句話似乎確實沒錯呢。#n　尤其是對這支球隊……或許對我來說也是）"
10043080-193 = "如果我的加油能帶給別人力量……#n讓人在放棄之前鼓起勇氣再挑戰一次……"
10043080-194 = "（還有……）"
10043080-197 = "[log]「也許是因為──」[/log]"
10043080-199 = "[log]「我喜歡看著你們吧」[/log]"
10043080-203 = "（那些一度想要放棄）"
10043080-204 = "（卻可能永遠無法放棄的事……）"
10043080-205 = "（……）"
10043080-206 = "（吸氣）"
10043080-207 = "（向前看）"
10043080-211 = "投手擺出了預備姿勢！決勝球來了！"
10043080-214 = "加油，莉同學！你一定能做到的！"
10043080-215 = "拚盡自己的全力，結果什麼的之後再去想就好！"
10043080-216 = "我最喜歡不輕言放棄的人了！"
10043080-240 = "打擊出去！"
10043080-241 = "這球相當不得了！"
10043080-242 = "飛向左外野手後方！飛向左外野手後方！左外野圍牆！左外野圍牆！#n飛出去了！飛出去了！一路向前飛，完全不回頭！"
10043080-243 = "是一記份量十足的重砲！！！"
10043080-248 = "越過去了！！！越過去了！！！#n是顆越過左外野圍牆的──再見逆轉滿壘全壘打！！！"
10043080-249 = "以滿壘全壘打為比賽畫下了句點！！！柯基勇士隊！！！"
10043080-250 = "終於！期盼了這麼久！#n天啊，我簡直不敢自己的眼睛！！！這一刻真的成為現實了！！！"
10043080-251 = "柯基勇士隊的白鳥系列賽首勝！！！在賽史上寫下奇蹟的一頁！！！"
10043080-254 = "（究竟發生了什麼，聽見了什麼聲音……我記得並不是很清楚）"
10043080-255 = "（只記得確實「打到了」某樣東西的紮實手感）"
10043080-258 = "（以及那飛向高空、劃出長長拋物線的白色殘影）"
10043080-263 = "柯基贏了！柯基贏了！"
10043080-264 = "啊啊啊！柯基贏啦！！！"
10043080-266 = "嗚嗚嗚……贏了……終於贏了。#n真的是第一次……！"
10043080-272 = "咦！？這到底是……咦……贏了？#n我們贏了？真的嗎？柯基贏啦！！！！！"
10043080-273 = "我本來……真的覺得不可能……#n一直都告訴自己，不要對這支球隊抱有任何希望的……！！！"
10043080-277 = "謝謝……太感謝了……"
10043080-278 = "謝謝你為我們帶來了這場首勝……"
10043080-279 = "我真的……好想贏突擊者隊……#n哪怕只有一次也好，也想體會勝利的滋味……！"
10043080-283 = "這一路走來……真是段漫長的路啊……"
10043080-284 = "但是不能因為這一勝就滿足。#n我們勇士隊的棒球傳奇，現在才要開始！"
10043080-287 = "雖然不太清楚怎麼了……"
10043080-291 = "不過既然大家都這麼高興，我也好開心！"

[translation]
1004902-1 = "#title;보충수업과 디저트"
1004902-2 = "#wait;1500"
1004902-3 = "3;카즈사;02;어, 여기야 선생님. 생각보다 금방 나왔네.\n#3;a\n#3;em;[반응]"
1004902-4 = "3;카즈사;01;……흐음. 듣던 것만큼은 바쁘지 않은가 봐?"
1004902-5 = "[s1] \"오늘은 확실히 좀 낫네.\"\n[s2] \"누가 부른 건데, 다 팽개치고 나왔지.\""
1004902-6 = "3;카즈사;03;흐응……. 내가 날을 잘 잡은 건가? 다행이네.\n#3;em;[음표]"
1004902-7 = "3;카즈사;10;느끼해, 선생님. 다른 애들한테까지 그런 식으로 말하는 건 아니지?\n#3;em;[땀]\n#3;stiff"
1004902-8 = "3;카즈사;02;뭐, 부른 이유는…… 그리 대단한 일은 아니고. 그냥 학생으로서 선생님께 부탁할 만한 일을 좀 가져왔달까."
1004902-9 = "3;카즈사;01;그러니까 대충 이런 건데……."
1004902-10 = "#st;[0,0];instant;1;"
1004902-11 = "#clearST"
1004902-12 = "3;카즈사;01\n#3;greeting\n#wait;1500"
1004902-13 = "[ns3] \"……보충시험 예상 문제지?\"\n[ns4] \"분량이 생각보다 꽤 많네……?\""
1004902-14 = "3;카즈사;99;아무래도 보충시험이 코앞이라서 말이야.\n#3;em;[속상함]"
1004902-15 = "3;카즈사;99;아무래도 보충시험이 코앞이라서 말이야.\n#3;em;[속상함]"
1004902-16 = "3;카즈사;01;보충시험이니만큼 난이도가 그리 높진 않다지만……. 내 입장에선 막히는 게 좀 있더라고. 그래서……."
1004902-17 = "3;카즈사;02;……뭐? 나?\n#3;em;[?]"
1004902-18 = "3;카즈사;04;공부 잘 못 하는 편이냐고?"
1004902-19 = "3;카즈사;04;우와, 되게 직설적으로 물어보네. 소심한 녀석이었다면 상처받았겠는걸.\n#3;em;[땀]"
1004902-20 = "3;카즈사;01;그렇지만 뭐……. 그래, 선생님이니까 정확하게 파악하는 것도 중요하겠지. 여기선 솔직하게 대답해 볼까."
1004902-21 = "3;카즈사;02;응. 나 공부 못하는 편이야. 완전 꼴찌까진 아니지만……. 하위권? 대충 70~80% 정도……?\n#3;em;…"
1004902-22 = "3;카즈사;07;그래서 이렇게 도움도 요청하는 거고 말이지."
1004902-23 = "3;카즈사;01;……뭐?"
1004902-24 = "3;카즈사;02;그렇게 안 보인다고? 보통 이상은 할 줄 알았다고?\n#3;em;[?]"
1004902-25 = "3;카즈사;99;……후우."
1004902-26 = "3;카즈사;01;유감스럽게도 틀렸어. 중학교 때부터 공부랑은 담을 쌓았었으니까."
1004902-27 = "3;카즈사;03;그래도 일단 감사하도록 할게. 진심인지 어떤지는 모르겠지만, 적어도 멍청해 보이지는 않는다는 뜻이고…….\n#3;em;[음표]"
1004902-28 = "3;카즈사;07;변명처럼 들릴 수도 있지만 그나마 이것도 오른 거거든. 나름대로 예습 복습도 챙겨서 하고 있다고."
1004902-29 = "3;카즈사;04;그렇지만……. 역시 그래도 이제 와서 갑자기 따라잡으려니 고생을 좀 하는 중이라서……."
1004902-30 = "#st;[0,0];instant;1;"
1004902-31 = "#clearST"
1004902-32 = "3;카즈사;04\n#3;em;…\n#wait;2500"
1004902-33 = "3;카즈사;05;……뭐야, 그 표정."
1004902-34 = "3;카즈사;05;아무리 그래도 불쌍하다는 듯이 보는 건 그만둬. 좀 열 받고 있거든."
1004902-35 = "[s5] \"아냐. 대견하다고 생각하고 있었어.\"\n[s6] \"오르고 있으니 괜찮지 않아?\""
1004902-36 = "3;카즈사;01;……흐음.\n#3;em;…"
1004902-37 = "3;카즈사;01;……흐음.\n#3;em;…"
1004902-38 = "3;카즈사;02;진짜야, 그 말? 일단 순수하게 받아들이긴 하겠지만……."
1004902-39 = "3;카즈사;04;……아니다. 이렇게 쓸데없는 소리를 하는 동안에도 시간은 가고 있으니까.\n#3;em;[속상함]\n#3;stiff"
1004902-40 = "3;카즈사;03;일단 바로 보충수업부터 시작하자. 하는 동안 마실 건 내가 살게. 내가 불렀으니까."
1004902-41 = "3;카즈사;01;응? 선생님이 산다고? ……선생님이니까?"
1004902-42 = "3;카즈사;04;음…….\n#3;em;…"
1004902-43 = "3;카즈사;99;……아니. 역시 안 돼. 내가 살게. 찝찝하면 집중도 안 될 거야.\n#3;stiff"
1004902-44 = "3;카즈사;03;설마 수업받을 학생의 집중도가 떨어질 짓을 하진 않겠지? 선생님이잖아."
1004902-45 = "3;카즈사;13;……훗. 좋아. 그럼 결정이야. 내가 사는 거로.\n#3;em;[음표]"
1004902-46 = "3;카즈사;01;그럼 시키는 건 내가 해 둘 테니까, 일단 여기 이 문제부터 좀……."
1004902-47 = "#st;[0,0];instant;1;"
1004902-48 = "#clearST"
1004902-49 = "3;카즈사;01\n#3;greeting\n#wait;1500"
1004902-50 = "3;카즈사;02;그다음엔 이쪽으로 이 범위부터……."
1004902-51 = "#all;hide"
1004902-52 = "#na;(이후 카즈사와 함께 보충 시험 범위를 천천히 둘러보았다.)"
1004902-53 = "#na;(카즈사는 진지하게 수업에 임했고, 내용도 보충 시험이니만큼 큰 문제가 없어 빠르게 진도를 뺄 수 있었다.)"
1004902-54 = "#all;hide"
1004902-55 = "3;카즈사;99;……후우…….\n#3;a\n#3;em;…"
1004902-56 = "3;카즈사;03;끝났다. 방금 게 마지막이었어."
1004902-57 = "3;카즈사;04;뭔가……. 이상하네. 이게 선생님이라는 사람의 힘인가……?"
1004902-58 = "3;카즈사;13;혼자 할 때는 분명 좀 막히는 부분도 꽤 있었던 거 같은데……. 이렇게 보니 다 엄청 쉬운 것 같잖아."
1004902-59 = "3;카즈사;02;진짜 이런 걸 틀렸었다고, 내가……? 인제 와서는 좀 어이가 없는걸.\n#3;em;[땀]\n#3;stiff"
1004902-60 = "3;카즈사;01;……뭐?"
1004902-61 = "3;카즈사;02;원래 문제라는 게 다 알고 보면 쉬운 거라고? 그, 그야 그렇겠지만……."
1004902-62 = "3;카즈사;03;……아무튼 덕분에 한번 쭉 훑어봤고, 이 정도면 시험 자체는 전혀 문제가 없을 거 같네.\n#3;em;[음표]"
1004902-63 = "3;카즈사;03;전부 선생님 덕분이야."
1004902-64 = "3;카즈사;13;……도와주셔서 감사합니다.\n#3;greeting"
1004902-65 = "3;카즈사;02;그럼 이제 선생님은 다시 돌아가는 건가? 매번 이렇게 애들 도와주고 바로 가는 거야?\n#3;em;[?]"
1004902-66 = "3;카즈사;01;……응?"
1004902-67 = "3;카즈사;01;가기 전에 디저트 하나 더 시키자고? 이번에는 선생님이 살 테니까……?"
1004902-68 = "3;카즈사;04;어……. 왜 그런 소릴…….\n#3;em;[땀]\n#3;stiff"
1004902-69 = "[s7] \"오늘은 나도 한가하니까.\"\n[s8] \"나도 찝찝한 건 싫으니까.\""
1004902-70 = "#st;[0,0];instant;1;"
1004902-71 = "#st;[0,0];instant;1;"
1004902-72 = "#clearST"
1004902-73 = "3;카즈사;04\n#3;em;…\n#wait;2500"
1004902-74 = "3;카즈사;00;……선생님."
1004902-75 = "3;카즈사;04;이 사람 이거 진짜 큰일 낼 사람이네. 아무렇지도 않게 그런 말이나 해대고…….\n#3;em;[땀]"
1004902-76 = "3;카즈사;01;……뭐, 좋아. 그런 말로 나오면 나도 아까 한 말이 있으니 반박하기가 어려우니까."
1004902-77 = "3;카즈사;07;그럼 아까는 내가 알아서 골랐으니, 이번에는 선생님이 알아서 주문해 줘. 그게 맞겠지?"
1004902-78 = "3;카즈사;03;난 딱히 음식 가리는 거 없으니까 걱정하지 말고.\n#3;em;[재잘]"
1004902-79 = "3;카즈사;99;그럼……. 뭐가 됐든……."
1004902-80 = "#st;[0,0];instant;1;"
1004902-81 = "#clearST"
1004902-82 = "3;카즈사;99\n#3;d\n#wait;1000"
1004902-83 = "3;카즈사;13;……잘 먹겠습니다, 선생님.\n#3;em;[음표]\n#3;a\n#3;closeup"
1004902-84 = "#all;hide"

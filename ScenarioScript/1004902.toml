[translation]
1004902-1 = "補課與甜點"
1004902-3 = "老師，在這裡。老師比我想的還要早到呢。"
1004902-4 = "……唔～嗯，看來老師比想像中的還要閒嘛。"
1004902-5 = "[s1]「我今天確實比較閒。」\n[s2]「為了千紗，我把工作放著不管了。」"
1004902-6 = "是嗎……看來是我挑對日子囉？那就好。"
1004902-7 = "這麼說有點噁心喔，老師……你該不會對其他女生也都這麼說吧？"
1004902-8 = "其實我找你來也不是有什麼大事……只是有件事情想拜託老師。"
1004902-9 = "就是這些……"
1004902-13 = "[ns3]「……補考的模擬試題？」\n[ns4]「分量還挺多的呢……？」"
1004902-14 = "畢竟再過不久就要補考了。"
1004902-15 = "畢竟再過不久就要補考了。"
1004902-16 = "雖然補考的難度比較低……不過我還有一些地方不太懂，所以……"
1004902-17 = "……嗯？什麼？"
1004902-18 = "你問我是不是不太擅長讀書？"
1004902-19 = "哇……這麼問也太直接了吧？有些人可能會因此受傷唷。"
1004902-20 = "不過……畢竟你是老師嘛，有必要正確掌握學生的學習狀況。"
1004902-21 = "我非常不擅長讀書。雖然還不到最後一名……但也算是後段班？#n大概在整體的70～80%左右……？"
1004902-22 = "所以我才會找你幫忙。"
1004902-23 = "……什麼？"
1004902-24 = "你說看起來不像？你以為我的成績在中上？"
1004902-25 = "……唉。"
1004902-26 = "很遺憾，你猜錯了。我從國中開始就和讀書搭不上邊。"
1004902-27 = "不過很感謝你這麼說。雖然不知道你是不是真心話，但也代表我看起來不笨……"
1004902-28 = "雖然聽起來像是在辯解，不過我真的有在進步，平時也有做預習和複習。"
1004902-29 = "但是……事到如今就算要急起直追也會有點吃緊……"
1004902-33 = "……你那是什麼表情啊？"
1004902-34 = "拜託不要用那種同情的眼神看我，莫名火大。"
1004902-35 = "[s5]「不，我覺得你很了不起。」\n[s6]「既然有在進步的話，那不就好了嗎？」"
1004902-36 = "……是嗎。"
1004902-37 = "……是嗎。"
1004902-38 = "真的嗎？總之先謝謝老師這麼看得起我……"
1004902-39 = "……不聊了。再講下去時間就要沒了。"
1004902-40 = "總之先開始補課吧。中途要喝什麼都由我請吧，畢竟是我找你來的。"
1004902-41 = "咦？你說你要請？……因為你是老師？"
1004902-42 = "唔──嗯……"
1004902-43 = "……不行，那樣還是不好，我請。不然我會有虧欠的感覺而無法集中。"
1004902-44 = "老師應該不會做出那種讓學生分心的事情吧？"
1004902-45 = "……呵呵。好，那就這樣說定了。這次就由我來請。"
1004902-46 = "那我先去點餐，老師你先幫我看看這題……"
1004902-50 = "然後是這個範圍……"
1004902-52 = "（之後，和千紗一起慢慢複習了補考的範圍）"
1004902-53 = "（因為千紗相當認真聽課，加上是補考內容所以沒什麼大問題，課程進展相當順利）"
1004902-55 = "……呼。"
1004902-56 = "結束了。"
1004902-57 = "好神奇喔……這就是老師的力量嗎……？"
1004902-58 = "自己讀書的時候明明會遇到不懂的地方……#n可現在回頭一看，那些問題看起來卻都非常簡單。"
1004902-59 = "我居然會錯這種問題……現在自己都覺得有點荒謬呢。"
1004902-60 = "……什麼？"
1004902-61 = "你說理解過後問題本來就會變簡單？雖，雖然那麼說是沒錯……"
1004902-62 = "……總之，有老師幫我把範圍從頭看過一遍，這下考試應該就沒有問題了。"
1004902-63 = "這全都是託老師的福。"
1004902-64 = "……謝謝老師幫我這個忙。"
1004902-65 = "那老師現在要回去了嗎？難道老師每次幫忙完就會馬上回去嗎？"
1004902-66 = "……嗯？"
1004902-67 = "你說在走之前想再點個甜點？而且這次由老師來請……？"
1004902-68 = "咦……但為什麼……"
1004902-69 = "[s7]「畢竟我今天也很閒嘛。」\n[s8]「我也不喜歡有虧欠的感覺。」"
1004902-74 = "……老師。"
1004902-75 = "又若無其事地說出那種話……總有一天會讓學生誤會出大事的。"
1004902-76 = "……好啊。既然老師這麼說了，我也不好反駁。"
1004902-77 = "那麼，剛才的餐點都是我點的，這次就隨老師的喜好點吧。這樣可以嗎？"
1004902-78 = "我不會特別挑嘴，你就放心點吧。"
1004902-79 = "所以……不管點了什麼……"
1004902-83 = "……我都不客氣囉，老師。"
1004902-85 = "（和千紗一起分享甜點和飲料後，回到了夏萊）"

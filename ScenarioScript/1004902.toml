[translation]
1004902-1 = "คาบเรียนเสริมกับของหวาน"
1004902-3 = "ทางนี้ คุณครู... มาเร็วกว่าที่คิดไว้อีกนะ"
1004902-4 = "อืม... ดูไม่ได้งานยุ่งมากเหมือนที่ได้ยินมาเลยนะ?"
1004902-5 = "[s1] \"วันนี้ครูพอมีเวลานิดหน่อยน่ะ\"\n[s2] \"คาซึสะชวนออกมาทั้งที ครูต้องหนีงานมาให้ได้สิ\""
1004902-6 = "อืม... ฉันเลือกวันได้เหมาะสินะ โชคดีจริงๆ"
1004902-7 = "ขนลุกน่า คุณครู คงไม่ได้พูดแบบนี้กับเด็กทุกคนหรอกใช่มั้ย? "
1004902-8 = "ก็นะ... ที่ฉันเรียกคุณครูออกมา ก็ไม่ได้มีอะไรมากหรอก ก็แค่มีเรื่องสอบนิดๆ หน่อยๆ ที่นักเรียนอยากขอร้องคุณครูน่ะ"
1004902-9 = "เรื่องก็ประมาณนี้แหละ..."
1004902-13 = "[ns3] \"ข้อสอบที่คิดว่าจะออกตอนสอบเสริมเหรอ?\"\n[ns4] \"ข้อสอบเยอะกว่าที่คิดอีกนะเนี่ย...?\""
1004902-14 = "ก็มันใกล้จะถึงวันสอบแล้วน่ะ"
1004902-15 = "ก็มันใกล้จะถึงวันสอบแล้วน่ะ"
1004902-16 = "ถึงการสอบเสริมมันจะไม่ได้ยากเท่าไหร่ แต่ฉันยังมีบางส่วนที่ติดขัดอยู่นิดหน่อยน่ะ ก็เลยอยากขอให้ช่วยหน่อย"
1004902-17 = "ว่าไงนะ ฉันเหรอ?"
1004902-18 = "ถามว่าฉันเรียนไม่เก่งหรือเปล่าน่ะเหรอ?"
1004902-19 = "โห... ถามจี้ใจดำกันจังเลยนะ ถ้าฉันเป็นพวกขี้กลัวคงรู้สึกเจ็บจี๊ดที่ใจแน่ๆ"
1004902-20 = "แต่ก็นะ... การวิเคราะห์ปัญหาให้ถูกต้องเป็นเรื่องสำคัญสำหรับคุณครูนี่นะ ถ้างั้นฉันจะตอบ#nอย่างตรงไปตรงมาเลยก็แล้วกัน"
1004902-21 = "ใช่แล้ว ฉันเป็นพวกเรียนไม่เก่งน่ะ เรียนไม่เก่งแบบสุดๆ เกือบๆ ที่โหล่เลยแหละ"
1004902-22 = "ก็เลยมาขอความช่วยเหลืออย่างนี้ไงล่ะ"
1004902-23 = "อะไรนะ...?"
1004902-24 = "ฉันดูไม่เหมือนแบบนั้นเลยงั้นเหรอ? คิดว่าทำได้ดีเกินเกณฑ์ปกติอีกงั้นเหรอ?"
1004902-25 = "เฮ้อ..."
1004902-26 = "น่าเสียดายที่คุณครูเดาผิดนะ ฉันไม่ถนัดเรื่องเรียนมาตั้งแต่สมัยม.ต้นแล้วละ"
1004902-27 = "แต่ยังไงก็ขอบคุณนะ ไม่รู้ว่าพูดจริงหรือแกล้งชม แต่อย่างน้อยก็แปลว่าฉันไม่ได้ดูหัวทึบขนาดนั้น..."
1004902-28 = "อาจจะฟังดูเหมือนข้อแก้ตัวก็ได้ แต่ฉันพูดจริงนะ ฉันพยายามอ่านหนังสือล่วงหน้า แล้วก็ทบทวน#nบทเรียนบ่อยๆ แล้ว"
1004902-29 = "แต่ว่า... จะต้องมาเรียนตามให้ทันในเวลาจำกัดแบบนี้ ฉันเลยติดๆ ขัดๆ นิดหน่อย..."
1004902-33 = "อะไรน่ะ ทำไมทำหน้าแบบนั้น..."
1004902-34 = "ถึงฉันจะดูน่าสงสารแค่ไหน แต่ช่วยเลิกทำตาเว้าวอนมองกันแบบนั้นได้มั้ย เห็นแล้วมันหัวร้อนนะ"
1004902-35 = "[s5] \"เปล่าสักหน่อย ครูคิดว่าน่าชื่นชมมากต่างหาก\"\n[s6] \"ตอนนี้กำลังพยายามอยู่นี่นา ไม่เป็นไรหรอก\""
1004902-36 = "อืม..."
1004902-37 = "อืม..."
1004902-38 = "พูดจริงเหรอ? เอาเป็นว่าฉันจะยอมเชื่อไปก่อนก็แล้วกัน..."
1004902-39 = "เดี๋ยวสิ มัวแต่คุยกันเรื่อยเปื่อยแบบนี้ มันเสียเวลาไปเปล่าๆ นะ"
1004902-40 = "มาเริ่มเรียนเสริมกันเลยดีกว่า เดี๋ยวฉันไปซื้อเครื่องดื่มมาให้เอง ก็ฉันเป็นคนเรียกคุณครูออกมานี่นะ"
1004902-41 = "หืม? คุณครูเป็นคนสอน... ก็เลยจะซื้อให้งั้นเหรอ?"
1004902-42 = "อืม..."
1004902-43 = "ไม่ละ ไม่ดีกว่า ฉันจะซื้อเอง เดี๋ยวถ้ามันคาใจมากๆ จะไม่มีสมาธิเรียนเอา"
1004902-44 = "คุณครูเป็นคุณครูนะ คงไม่อยากทำให้นักเรียนมีสมาธิลดลงหรอกใช่มั้ย?"
1004902-45 = "ฮึ ดีละ ตกลงแล้วนะ เดี๋ยวฉันจะซื้อเอง"
1004902-46 = "ฉันจะทำตามที่คุณครูสอน... เอาละ เรามาเริ่มกันที่โจทย์นี้แล้วกัน..."
1004902-50 = "ต่อไปก็มาเริ่มที่ตรงนี้..."
1004902-52 = "(หลังจากนั้น คุณครูก็อธิบายเนื้อหาโจทย์เรียนเสริมให้กับคาซึสะ)"
1004902-53 = "(คาซึสะตั้งใจฟังเนื้อหาที่สอนอย่างจริงจัง และเนื่องจากเนื้อหาข้อสอบเสริมไม่ได้ยากอย่างที่คิด เธอจึงสามารถเข้าใจเนื้อหาได้อย่างรวดเร็ว)"
1004902-55 = "เฮ้อ..."
1004902-56 = "เสร็จแล้ว เมื่อกี้เป็นข้อสุดท้ายแล้วละ"
1004902-57 = "รู้สึกแปลกจังเลยน้า หรือว่านี่เป็นเพราะพลังของคนเป็นครูกันนะ...?"
1004902-58 = "ตอนทำคนเดียวก็มักจะมีโจทย์ที่แก้ไม่ออกอยู่เยอะพอสมควร... แต่พอมาลองทำตอนนี้ ทุกอย่างดูง่ายไปหมดเลย"
1004902-59 = "ฉันทำโจทย์แบบนี้ผิดงั้นเหรอเนี่ย...? พอมาดูตอนนี้ก็แทบไม่อยากเชื่อเลย"
1004902-60 = "ว่าไงนะ...?"
1004902-61 = "ถ้าเข้าใจสิ่งที่โจทย์ถามก็จะแก้โจทย์ได้ง่ายๆ งั้นเหรอ? อืม มันก็จริงนะ..."
1004902-62 = "เพราะได้คุณครูมาติวให้ ฉันเลยแก้โจทย์ได้ผ่านฉลุย ถ้าเป็นแบบนี้ตอนสอบก็คงไม่มีปัญหาแล้วละมั้ง"
1004902-63 = "ต้องขอบคุณคุณครูเลยนะ"
1004902-64 = "อืม... ขอบคุณที่ช่วยติวให้นะคะ"
1004902-65 = "คุณครูจะกลับแล้วเหรอ ปกติพอติวให้นักเรียนเสร็จแล้วก็จะกลับเลยงั้นเหรอ?"
1004902-66 = "หืม...?"
1004902-67 = "ให้สั่งขนมหวานอีกอย่างมากินก่อนกลับเหรอ? และคราวนี้... คุณครูจะเป็นคนซื้อให้ด้วยเหรอ...?"
1004902-68 = "เอ่อ พูดอะไรน่ะ..."
1004902-69 = "[s7] \"วันนี้ครูว่างๆ น่ะ\"\n[s8] \"ครูก็ไม่ค่อยชอบมีอะไรคาใจเหมือนกันน่ะ\""
1004902-74 = "คุณครู..."
1004902-75 = "คุณครูนี่จริงๆ เลยนะ... พูดแบบนั้นออกมาได้หน้าตาเฉยเลย"
1004902-76 = "งั้นก็ดี ถ้าคุณครูพูดมาแบบนั้นแล้ว ฉันคงจะแย้งอะไรไม่ได้..."
1004902-77 = "เมื่อกี้ฉันเป็นคนเลือกมาทีหนึ่งแล้ว เพราะงั้นคราวนี้ให้คุณครูเป็นคนสั่งก็แล้วกัน ตกลงนะ?"
1004902-78 = "ฉันไม่ได้มีอะไรที่เลือกกินเป็นพิเศษ ไม่ต้องกังวลไปหรอกนะ"
1004902-79 = "ถ้างั้นก็... เลือกได้ตามสบายเลย..."
1004902-83 = "จะกินให้อร่อยเลยค่า คุณครู"
1004902-85 = "(จากนั้นคุณครูกับคาซึสะก็แบ่งขนมหวานกันกินอย่างเอร็ดอร่อย ก่อนจะกลับไปที่ชาเล่ต์)"

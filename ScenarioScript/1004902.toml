[translation]
1004902-1 = "Make-Up Work and Dessert"
1004902-3 = "Oh. Hi, Sensei. You got here pretty fast."
1004902-4 = "I was worried you'd be busy today."
1004902-5 = "[s1] \"Today was a little lighter than usual.\" \n[s2] \"I dropped everything because you're a priority.\""
1004902-6 = "I'm glad I'm not taking you away from anything important."
1004902-7 = "Weird, Sensei. I hope you don't talk to other students like that!"
1004902-8 = "Well, I called you because... It's not a big deal, but I brought something I need help with..."
1004902-9 = "So, you see..."
1004902-13 = "[ns3] \"...Is this about expected questions on the make-up exam?\"\n[ns4] \"That pile of papers is bigger than you.\""
1004902-14 = "Yeah. The make-up exam is right around the corner."
1004902-15 = "They're practice questions! The make-up exam is right around the corner."
1004902-16 = "I doubt the make-up exam will be that hard, but I'm having a little trouble on a few things."
1004902-17 = "Huh?"
1004902-18 = "...You want to know how badly I'm doing in my classes?"
1004902-19 = "That's so straightforward. You're lucky I'm not sensitive."
1004902-20 = "I guess you are helping me out... Fine."
1004902-21 = "I'm not exactly killing it grades-wise. I'm not the worst, but like...bottom twenty or thirty percent?"
1004902-22 = "Hence, why I need help."
1004902-23 = "Huh?!"
1004902-24 = "You thought I'd be in the middle at least?"
1004902-25 = "Hah."
1004902-26 = "I wish. But I pretty much never studied in middle school."
1004902-27 = "If you meant it, thanks. At least you don't think I'm dumb."
1004902-28 = "I've actually improved a lot recently! I study before and after class. I swear!"
1004902-29 = "But, I don't know... It's just a lot to catch up on."
1004902-33 = "...What's with that face?"
1004902-34 = "If that's a look of pity, I'm gonna punch you."
1004902-35 = "[s5] \"No, I was thinking of how proud I am of you.\"\n[s6] \"I'm really happy you've seen results from your hard work.\""
1004902-36 = "Hm..."
1004902-37 = "Hm..."
1004902-38 = "I never know if you mean what you say...but thanks, I think."
1004902-39 = "Anyway, I don't have time to chitchat like this."
1004902-40 = "Let's start reviewing. You can have one drink on me, since you're sacrificing your time today."
1004902-41 = "Huh? You feel like the teacher should still pay?"
1004902-42 = "Um..."
1004902-43 = "No. I have to pay you back, or I won't be able to concentrate on studying."
1004902-44 = "You wouldn't want to get in the way of my studying, would you?"
1004902-45 = "Heehee. Today's on me, then."
1004902-46 = "I'll go order. Can you look at my questions on this problem while I do?"
1004902-50 = "Oh, and, I was confused on this topic..."
1004902-52 = "Kazusa and I meticulously reviewed the pages for the make-up exam."
1004902-53 = "She took it very seriously, and since the content was a for a make-up exam, she progressed quickly."
1004902-55 = "*sigh*"
1004902-56 = "We did it. That was the last one."
1004902-57 = "Huh... Is this the difference of having a teacher?"
1004902-58 = "It was so much easier to get the concepts with you teaching me."
1004902-59 = "I can't believe I got all these wrong now. It's kind of insane."
1004902-60 = "What?"
1004902-61 = "Hindsight bias? It just seems obvious once I know the answer? I guess that makes sense..."
1004902-62 = "Anyway, I've reviewed everything, so I shouldn't have a problem with the exam."
1004902-63 = "You were a great teacher..."
1004902-64 = "...So, thank you."
1004902-65 = "You're leaving? I thought you were pretty free today."
1004902-66 = "Oh..."
1004902-67 = "No, I already told you I don't want you to buy me anything. Not even dessert."
1004902-68 = "Why are you so persistent?"
1004902-69 = "[s7] \"I'm just free today.\"\n[s8] \"I don't want to owe you anything either.\""
1004902-74 = "...Sensei."
1004902-75 = "You really, truly have a way with words."
1004902-76 = "Okay, fine. Just this once."
1004902-77 = "You should order, since I picked last time."
1004902-78 = "I'll eat anything, so choose whatever you want."
1004902-79 = "Whatever it is..."
1004902-83 = "...Thank you, Sensei."
1004902-85 = "Kazusa and I shared a dessert and chatted before I returned to Schale."

[translation]
90002010-1 = "第1話; Phase Shift"
90002010-4 = "Soph！我不是說過很多次了嗎？再這樣的話，Ain姐姐會生氣的。"
90002010-5 = "是，是我錯了。Ain姐姐！我不會再那樣了……"
90002010-6 = "很好。我這次就破例原諒你。耶嘿嘿。Ain姐姐知道Soph其實是位乖孩子的。"
90002010-7 = "還有你，Aur！不要總是欺負Soph！這次也是Aur開的玩笑太過分了！"
90002010-8 = "咦，但是是Soph他先……"
90002010-9 = "Aur！"
90002010-10 = "我，我知道了。我知道了啦。對不起……可以了吧？"
90002010-11 = "唔……雖然這個態度有點牽強……"
90002010-12 = "但就Aur而言，已經很好了！Ain姐姐稱讚你！"
90002010-18 = "Ain，你在做什麼？"
90002010-19 = "哇啊啊啊啊啊！？馬爾庫特姐姐大人！？"
90002010-22 = "這樣呀，照人類的說法來看，算是所謂的「扮家家酒」吧。"
90002010-23 = "這些機械人偶是Soph人偶和Aur人偶。"
90002010-24 = "沒，沒錯……對不起，馬爾庫特姐姐大人……"
90002010-25 = "沒關係，Ain。Ain開心的話，對我而言就足夠了。"
90002010-26 = "不過除了Soph人偶和Aur人偶以外，好像有很多其他的機械人偶？"
90002010-27 = "沒錯！這些孩子……所以說……"
90002010-28 = "是，是我的孩子！"
90002010-29 = "原來如此……？"
90002010-30 = "也是我的妹妹！"
90002010-31 = "這樣啊……"
90002010-32 = "還，還有，也就是說……這，這些孩子對馬爾庫特姐姐大人來說……馬爾庫特姐姐的妹妹，也是我的孩子和妹妹……"
90002010-33 = "我知道。Ain。這算是所謂的「姪女」嗎？"
90002010-34 = "是，是！沒錯！雖、雖然我不是很清楚……就是這樣沒錯！姐姐大人說的對！"
90002010-35 = "那麼，你們好。Ain的孩子兼妹妹們。我是馬爾庫特。"
90002010-36 = "咦，咦咦咦咦，姐姐大人跟我的孩子們打招呼了……！怎，怎麼辦……？幸福訊號過量，感覺我要燒壞短路了……！"
90002010-37 = "不過啊，Ain？"
90002010-38 = "是的，姐姐大人！"
90002010-39 = "沒有…我的人偶嗎？"
90002010-45 = "對，對對對對對，對不起，姐姐大人！我沒有預料到……不對！即便如此我也應該要想到的！必須為一切可能性做好準備！這都是我的錯！嗚嗚嗚……"
90002010-46 = "沒關係，Ain。沒關係，"
90002010-47 = "我們現在正等待著所謂的「最後時刻」。 "
90002010-48 = "所以我認為適當地放鬆也是很重要的。"
90002010-49 = "是，是……沒錯。以及為了那一刻……「無名之神的力量」流淌在鋼鐵大陸的 [ruby=Phase]位相[/ruby]也必須立刻改變……"
90002010-50 = "嗚嗚嗚……但凡沒有那個王女和侍女，就不會有這些額外的工作了……"
90002010-51 = "是的，真的辛苦你了。太感謝了。"
90002010-52 = "至於「馬爾庫特機械人偶」Ain隨時都可以為我製作，我完全不擔心呢！"
90002010-53 = "……！"
90002010-54 = "好的！姐姐大人，那是當然的！"
90002010-55 = "不過這樣馬爾庫特機械人偶也會成為Ain的孩子與妹妹呢。"
90002010-56 = "你好，Ain姐姐。"
90002010-57 = "呀啊啊啊啊啊！？"
90002010-58 = "馬爾庫特姐姐大人，叫，叫我，姐姐……"
90002010-63 = "我沒想到你會有那麼大的反應……"
90002010-65 = "……"
90002010-66 = "呼……這該怎麼辦呢……"
90002010-67 = "……"
90002010-68 = "提法瑞特……"
90002010-75 = "Soph，你在做什麼？"
90002010-76 = "呃啊！？馬爾庫特姐姐大人！？"
90002010-77 = "那，那個……"
90002010-78 = "看起來像密封完好的箱子呢。"
90002010-79 = "不……好像還是有點破損。那是什麼？"
90002010-80 = "這……所以說……"
90002010-81 = "……是提法瑞特的種子箱之一。"
90002010-82 = "那個，姐姐大人也知道吧？提法瑞特決定用種子代替自己被送出去……"
90002010-83 = "是的，然而我們選擇尊重這個決定。"
90002010-84 = "嗯，但是有幾個保存狀態不太好的箱子。"
90002010-85 = "……這是裡面狀態最不好的箱子。"
90002010-86 = "保存狀態不太好意味著什麼？"
90002010-87 = "就是……已經到了隨時都會發芽的狀態。"
90002010-88 = "但是就算在鋼鐵大陸發芽……"
90002010-89 = "我，我當然明白為了這種事煩惱很奇怪！這部分不要誤會！"
90002010-90 = "但是，提法瑞特……"
90002010-91 = "……"
90002010-92 = "Soph。首先提法瑞特此刻也還跟我們在一起。這一點是無庸置疑的。"
90002010-93 = "呃，嗯。也對……"
90002010-94 = "不過我也能理解Soph那份想要珍視「提法瑞特」想法的心意。"
90002010-95 = "所以這樣做如何？"
90002010-101 = "我們把種子偷偷地種在聖地。"
90002010-102 = "呃，姐姐大人！？但是這樣就會……！"
90002010-104 = "是的，我也很清楚。再怎麼說這也是違反我們規律的行為。"
90002010-105 = "但那裡是鋼鐵大陸的初始，也是現在唯一保有「土壤」的地方，不是嗎？"
90002010-106 = "雖說是因為只有那裡不適用「涅察赫」的能力，才能保有土壤……"
90002010-107 = "在聖地，那位的意志……"
90002010-108 = "但是如果種子在那裡仍可以戰勝一切發芽的話，"
90002010-109 = "在某種意義上，不就是提法瑞特留下的自由意志嗎？"
90002010-110 = "自由意志不僅僅是對人類與我們，甚至對那位也都是極其重要的要素。"
90002010-111 = "即便這一切深入探究的話，只不過是由錯覺編織而成的虛無。"
90002010-112 = "但，這樣，真的可以嗎……？"
90002010-113 = "當然不行。"
90002010-114 = "姐姐大人！？！？"
90002010-115 = "所以這算是跟我一起做的一種「壞事」吧？"
90002010-116 = "壞，壞事……！"
90002010-117 = "而且不是說做壞事會莫名有種興奮的感覺嗎？"
90002010-118 = "噢，嗯。特別是人類會那樣覺得……"
90002010-119 = "是的，所以這次我們就一起做一次壞事吧。"
90002010-120 = "Soph不是也因為不願遺忘提法瑞特而煩惱不是嗎？"
90002010-121 = "當然提法瑞特此刻也還跟我們在一起。"
90002010-122 = "最重要的是，我們正在等待「最後時刻」。"
90002010-123 = "是，是姐姐大人先提出要一起做這件事的……？"
90002010-124 = "是的，我們姐妹一起同心協力大鬧一場吧。"
90002010-125 = "嗯！"
90002010-130 = "可是，Soph。"
90002010-131 = "「無名之神的力量」的位相轉換還順利嗎？"
90002010-132 = "啊，你說那個啊？姐姐大人你不用擔心。現在即便那兩位來到鋼鐵大陸，也無法隨心所欲使用那股能量。"
90002010-133 = "……不過沒能從根源上徹底完成轉換，終究還是有點遺憾。"
90002010-134 = "但若是貿然行動，如今以那股力量所支撐的鋼鐵大陸也會變得無法使用……"
90002010-135 = "這樣呀，那麼不足的部分，就由我們來填補吧。"
90002010-136 = "嗯……姐姐大人說的沒錯。本該如此。"
90002010-140 = "Aur，你在做什麼？"
90002010-141 = "……"
90002010-142 = "……？"
90002010-143 = "這樣呀，沉浸在自己的世界裡呢。Aur。"
90002010-144 = "那麼，恕我失禮。"
90002010-152 = "喃喃自語……"
90002010-157 = "你到底在做什麼，Aur？"
90002010-158 = "咦……？"
90002010-162 = "馬爾庫特姐姐大人！？！？！？姐姐大人怎麼在這裡……！？！？"
90002010-163 = "別那麼驚訝。Aur。"
90002010-164 = "原則上我在鋼鐵大陸中，不存在「去不了」的地方吧？"
90002010-165 = "啊，好。好像是這樣沒錯……"
90002010-166 = "不過我很驚訝。Aur。是非常……「自然」的世界吧？"
90002010-167 = "……唔，算是吧？"
90002010-168 = "對我們大家而言，不是在意識迴路領域中……存在可以被稱為「黑盒子」的部分嗎？"
90002010-169 = "是的，若以人類的話來說，也稱為潛意識領域吧。"
90002010-170 = "不過我有點好奇那裡究竟是如何構成的，就嘗試把那附近的一部分意識迴路以大數據抽取的方式投放進去看看。"
90002010-171 = "哎呀，就因此重現心境世界了嗎？"
90002010-172 = "事情就是這樣。Soph總是把生命、自然掛在嘴邊，好像連我也被影響了。"
90002010-173 = "不過那也沒什麼大不了的。果然只是大驚小怪。"
90002010-174 = "就只是……"
90002010-175 = "只是……"
90002010-176 = "待在這裡的話，不知為何思考迴路雜訊之類的感覺會慢慢沉澱下來……"
90002010-177 = "這樣呀，照你這樣一說，我似乎也能感受到思考迴路的穩定。"
90002010-178 = "話說Ain和Soph跟我說，你們正在轉換〈無名之神的力量〉的位相嗎？"
90002010-179 = "啊，好。沒錯……呼。到了最後的最後，竟然還必須做這種事……"
90002010-180 = "因此姐姐大人的身體必須再調整一次。雖然不會花費太多時間。"
90002010-181 = "這所有的一切，都是因為那位 [USERNAME] 老師啊，真是的！"
90002010-182 = "來來來，別太生氣。Aur。"
90002010-183 = "如果與[USERNAME] 老師在這裡進行真誠的對話，他一定能理解我們的想法的。"
90002010-184 = "那麼現在，我們要不要一起躺下來做個日光浴？"
90002010-185 = "日光，浴嗎？"
90002010-186 = "就是一起躺下來，曬著太陽什麼事都不做。"
90002010-187 = "當然只是以電壓訊號形式呈現的「曬太陽的感覺」而已。"
90002010-188 = "只是接收到訊號後，我們的感覺迴路會回傳「滿足」的訊號。"
90002010-189 = "不過能夠和Aur一起度過這段時間，對我來說已經很有意義。"
90002010-193 = "當然，姐姐大人！"
90002010-194 = "是的，那麼就這麼做吧。"
90002010-198 = "畢竟我們的身體是要拿來等待「最後時刻」的。"
90002010-201 = "下一話; 運輸船"

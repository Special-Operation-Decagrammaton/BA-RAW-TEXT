1003005-68 = "3;치나츠 온천ND;08;이건 제가 아까 눈여겨보았던 그 리본…….\n#3;closeup"
1003005-69 = "3;치나츠 온천ND;04;하지만 저는 선생님께 아무런 도움도 드리지 못했는데, 어째서 답례품을…….\n#3;stiff\n#3;em;[땀]\n#3;closeup"

[translation]
1003005-1 = "回禮"
1003005-2 = "溫泉郷．紀念品店"
1003005-3 = "啊，老師。感謝您願意過來。"
1003005-4 = "在百忙之中打擾您，真不好意思。"
1003005-5 = "會不會打擾到您休息呢……？"
1003005-6 = "[s1] 「不會，沒關係的。」\n[s2] 「我剛好有時間。」"
1003005-7 = "這樣啊……那真是太好了。"
1003005-8 = "這樣啊……那真是太好了。"
1003005-9 = "啊，其實請老師過來是因為……想要買個伴手禮回去。"
1003005-10 = "[s] 「伴手禮？」"
1003005-11 = "是的。雖然說是半強迫獲得的休假，但休假就是休假。"
1003005-12 = "因為其他的部員們都在努力工作，而我卻在這裡休息。#n所以想要買點伴手禮回去作為回禮。"
1003005-13 = "可是我從來沒有遇過這種事，正在煩惱該買什麼比較好……"
1003005-14 = "所以想要請教經驗豐富的大人，也就是老師。"
1003005-15 = "[s3] 「原來如此。」\n[s4] 「唔嗯，一時之間沒什麼靈感呢……」"
1003005-16 = "是嗎……即使是一直都被學生們包圍著的老師，也會煩惱這個啊。"
1003005-17 = "是嗎……即使是一直都被學生們包圍著的老師，也會煩惱這個啊。"
1003005-18 = "[s] 「有什麼風紀委員的大家都喜歡的東西嗎？」"
1003005-19 = "呃，這個嘛……"
1003005-20 = "該說尤其是格黑娜嗎，大家都特別有個性，所以要找到大家都喜歡的東西有點……"
1003005-21 = "唔嗯……"
1003005-25 = "先一起把這裡有的東西都看過一遍吧？"
1003005-27 = "溫泉相關的伴手禮什麼都有呢，讓我有點吃驚。"
1003005-28 = "就算只看點心，也有幾十種口味跟形狀……"
1003005-29 = "看來會難以抉擇呢。"
1003005-30 = "[s] 「這個佩洛洛饅頭怎麼樣呢？」"
1003005-31 = "這隻奇怪的鳥真是到處都能看到呢……#n不過我至今都難以理解這個角色的魅力何在……"
1003005-32 = "雖然我並不討厭，但是風紀委員裡好像有人相當討厭這個角色，所以可能不太適合。"
1003005-33 = "嗯，其他還有……"
1003005-34 = "[s] 「這個入浴劑如何？」"
1003005-35 = "「格黑娜特製地獄入浴劑。#n　接觸濕氣的瞬間將會爆炸，能夠將周圍的環境轉眼變為地獄。放入冷水也OK」"
1003005-36 = "雖然好像很有趣……不過如果拿給風紀委員們的話，感覺會發生一些麻煩的事。#n更何況如果不是被我們，而是被某幾個格黑娜學生拿到的話……"
1003005-37 = "還，還是找個比較安全的紀念品吧……"
1003005-41 = "[ns] 「這個畫著溫泉標誌的蝴蝶結怎麼樣？」"
1003005-42 = "這個……看起來挺可愛的呢。"
1003005-43 = "很有溫泉的感覺，設計也不會太浮誇，當禮物感覺還不錯。"
1003005-44 = "啊，但是價格有點……如果要買所有人的量有點困難啊。"
1003005-45 = "雖然很可惜，不過得找其他的紀念品呢……"
1003005-46 = "老師，我們去那邊看看吧。"
1003005-48 = "（之後，和千夏一一物色著店裡陳列的商品）"
1003005-51 = "抹茶羊羹……"
1003005-52 = "確實，味道不會太甜所以大家應該都能接受，但這麼普通的禮物可以嗎……？"
1003005-53 = "[s5] 「紀念品最重要的是心意，而不是內容物嘛。」\n[s6] 「我覺得普通也沒什麼不好哦。」"
1003005-54 = "……呵呵，這樣啊。"
1003005-55 = "……呵呵，這樣啊。"
1003005-56 = "聽老師這麼說，我就放心了。"
1003005-57 = "謝謝您，老師。託老師的福總算是選出了好禮物。"
1003005-58 = "話說回來，老師剛才好像也買了什麼東西……"
1003005-59 = "老師也買了紀念品嗎？"
1003005-65 = "[ns] 「這是給千夏的回禮哦，收下吧。」"
1003005-66 = "……咦，給，給我的！？"
1003005-68 = "這是……啊，是剛才看過的蝴蝶結……"
1003005-69 = "可，可是，我明明什麼忙都沒幫上，為什麼要給我回禮呢……"
1003005-70 = "[s7] 「謝謝你平常一直關心著我的健康。」\n[s8] 「還有多虧有千夏在，度過了很多快樂的時光。」"
1003005-75 = "……老師真是個不可思議的人呢。"
1003005-76 = "簡直像是能看透我的心思一樣……"
1003005-77 = "再次感謝您，老師。"
1003005-78 = "這個蝴蝶結……我會好好珍惜的。"

1003005-76 = "3;치나츠 온천ND;01;말씀드리지 않아도 언제나 제 마음을 꿰뚫어 보듯 먼저 다가와 주시니……\n#3;closeup"
1003005-77 = "3;치나츠 온천ND;03;다시 한번 감사드립니다, 선생님.\n#3;em;[반짝]\n#3;greeting\n#3;closeup"

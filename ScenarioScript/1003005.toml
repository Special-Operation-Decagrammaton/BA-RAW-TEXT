[translation]
1003005-1 = "#Title;답례품"
1003005-2 = "#place;온천장 내 기념품점"
1003005-3 = "3;치나츠 온천ND;02;오셨군요, 선생님. 기다리고 있었습니다.\n#3;em;[반응]\n#3;a"
1003005-4 = "3;치나츠 온천ND;01;바쁘신 중에 시간을 내주셔서 감사합니다."
1003005-5 = "3;치나츠 온천ND;08;혹시 휴식 중에 제가 폐를 끼친 건 아닐지요."
1003005-6 = "[s1] \"그렇지 않아.\"\n[s2] \"마침 한가하던 참이었어.\""
1003005-7 = "3;치나츠 온천ND;03;그렇다면 다행입니다.\n#3;greeting\n#3;em;[반짝]"
1003005-8 = "3;치나츠 온천ND;03;그렇다면 다행입니다.\n#3;greeting\n#3;em;[반짝]"
1003005-9 = "3;치나츠 온천ND;01;오늘 선생님을 이곳에 모신 이유는…… 답례품을 고르는 일 때문이었습니다."
1003005-10 = "[s] \"답례품?\""
1003005-11 = "3;치나츠 온천ND;02;네. 반쯤 무리하게 떠안은 휴일이라고는 하지만, 휴가는 휴가.\n#3;em;[반응]"
1003005-12 = "3;치나츠 온천ND;01;다른 부원들이 열심히 일하고 있을 때 홀로 오프를 낸 것이니, 부원들을 위한 답례품 정도는 사서 돌아가는 것이 예의겠지요."
1003005-13 = "3;치나츠 온천ND;99;다만 저는 이렇게 홀로 휴가를 떠난 경험이 거의 없는지라, 어떤 종류의 답례품을 사가야 좋을지 좀처럼 감이 잡히질 않아서…….\n#3;em;…"
1003005-14 = "3;치나츠 온천ND;01;경험이 많은 어른이신 선생님께 조언을 구하고자 합니다."
1003005-15 = "[s3] \"여학생이 좋아할 만한 답례품이라니.\"\n[s4] \"나도 잘 모르겠는걸…….\""
1003005-16 = "3;치나츠 온천ND;08;그런가요? 선생님께서는 학생들로부터 인기가 많으신 분이니, 분명 학생들이 좋아하는 물건에 대해서도 잘 아시리라 생각했었습니다만…… 조금 의외군요.\n#3;em;[?]"
1003005-17 = "3;치나츠 온천ND;08;그런가요? 선생님께서는 학생들로부터 인기가 많으신 분이니, 분명 학생들이 좋아하는 물건에 대해서도 잘 아시리라 생각했었습니다만…… 조금 의외군요.\n#3;em;[?]"
1003005-18 = "[s] \"선도부원들은 보통 어떤 물건을 좋아해?\""
1003005-19 = "3;치나츠 온천ND;09;'보통' 좋아하는 물건이라고 해도……."
1003005-20 = "3;치나츠 온천ND;06;게헨나의 학생들은 워낙 다들 개성이 강하다 보니, 모두가 공통으로 좋아할 만한 물건을 꼽기가 쉽질 않네요.\n#3;em;[땀]\n#3;stiff"
1003005-21 = "3;치나츠 온천ND;09;으음……."
1003005-22 = "#st;[0,0];instant;1;"
1003005-23 = "#clearST"
1003005-24 = "3;치나츠 온천ND;09\n#3;m2\n#wait;1500"
1003005-25 = "3;치나츠 온천ND;08;우선은 진열된 물건을 하나씩 살펴보며 골라보도록 할까요?\n#3;em;[반응]"
1003005-26 = "#all;hide"
1003005-27 = "3;치나츠 온천ND;08;온천 기념품이라는 건 정말 다양하군요. 그 수에 조금 놀랐습니다.\n#3;em;[///]\n#3;a"
1003005-28 = "3;치나츠 온천ND;09;과자 하나만 두고 보더라도 맛과 모양에 따라 종류가 수십 가지로 나뉘니……."
1003005-29 = "3;치나츠 온천ND;06;생각보다 더 결정이 쉽지 않겠어요.\n#3;em;[속상함]\n#3;stiff"
1003005-30 = "[s] \"이 페로로 만쥬는 어때?\""
1003005-31 = "3;치나츠 온천ND;08;이 독특한 모양의 새는 정말 어디에나 있군요. 이 캐릭터의 어디가 매력적인 건지…….\n#3;em;[땀]"
1003005-32 = "3;치나츠 온천ND;09;저는 나쁘지 않습니다만, 게헨나 선도부에는 이 캐릭터를 싫어하는 부원들도 제법 있으니 페로로 만쥬는 곤란할 것 같네요."
1003005-33 = "3;치나츠 온천ND;01;다른 디자인의 물건을 찾아보는 게 좋겠습니다."
1003005-34 = "[s] \"이 특제 입욕제는 어떨까?\""
1003005-35 = "3;치나츠 온천ND;08;<게헨나 특제 지옥 입욕제. 습기에 닿는 순간 폭발하며 주변의 환경을 지옥처럼 만들어 드립니다. 찬물에 넣어도 OK.>\n#3;em;[반응]"
1003005-36 = "3;치나츠 온천ND;07;……흥미롭긴 하지만 부원들의 손에 들어가면 어쩐지 나쁜 일에 악용될 것 같아서 조금 우려가 되네요."
1003005-37 = "3;치나츠 온천ND;06;조금 더 얌전한 기념품을 찾아보는 게 좋겠습니다.\n#3;em;[땀]"
1003005-38 = "#st;[0,0];instant;1;"
1003005-39 = "#clearST"
1003005-40 = "#wait;2000"
1003005-41 = "[ns] \"온천 마크가 그려진 이 리본은?\""
1003005-42 = "3;치나츠 온천ND;08;이건…… 제법 귀여운 선물이군요.\n#3;em;…"
1003005-43 = "3;치나츠 온천ND;99;온천의 정취도 느껴지고, 취향도 타지 않으니 선물로는 나쁘지 않을 것 같습니다."
1003005-44 = "3;치나츠 온천ND;09;……다만 가격이 너무 비싸서 제 소지금으로 모두의 것을 사는 건 어려울 것 같네요."
1003005-45 = "3;치나츠 온천ND;06;아쉽지만 다른 답례품을 찾아야겠습니다.\n#3;stiff\n#3;em;[속상함]"
1003005-46 = "3;치나츠 온천ND;09;선생님, 다음 물건을 보러 가시지요."
1003005-47 = "#all;hide"
1003005-48 = "#na;(이후, 기념품점에 진열된 물건을 감상하며 한동안 물건을 골랐다.)"
1003005-49 = "#all;hide"
1003005-50 = "#wait;500"
1003005-51 = "3;치나츠 온천ND;06;……결국 마지막에 선택한 건 평범한 녹차 양갱이네요.\n#3;em;[땀]\n#3;a"
1003005-52 = "3;치나츠 온천ND;09;단맛이 강하지 않아 누구나 무난하게 좋아할 수 있다지만, 이런 평범한 선물로 정말 괜찮은 걸까요?"
1003005-53 = "[s5] \"답례품은 내용물보다 성의가 중요하니까.\"\n[s6] \"평범해서 오히려 더 좋아!\""
1003005-54 = "3;치나츠 온천ND;99;……후후, 그런가요.\n#3;em;…"
1003005-55 = "3;치나츠 온천ND;99;……후후, 그런가요.\n#3;em;…"
1003005-56 = "3;치나츠 온천ND;01;선생님께서 그렇게 말씀해 주시니 안심이 되네요."
1003005-57 = "3;치나츠 온천ND;03;오늘은 감사했습니다. 덕분에 좋은 선물을 고를 수 있었습니다.\n#3;greeting\n#3;em;[반짝]"
1003005-58 = "3;치나츠 온천ND;08;그나저나 선생님께서도 아까 무언가를 구매하시던 것 같았는데……"
1003005-59 = "3;치나츠 온천ND;09;선생님께서도 따로 답례품을 드릴 곳이 있으신 건가요?\n#3;em;[?]"

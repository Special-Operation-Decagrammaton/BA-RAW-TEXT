[translation]
1003005-1 = "ของขวัญขอบคุณ"
1003005-2 = "ร้านขายของที่ระลึกในออนเซ็น"
1003005-3 = "มาแล้วเหรอคะคุณครู ฉันกำลังรออยู่เลยค่ะ"
1003005-4 = "ขอบคุณที่สละเวลามาพบฉันนะคะ"
1003005-5 = "ฉันไม่ได้รบกวนเวลาพักผ่อนคุณครูใช่มั้ยคะ"
1003005-6 = "[s1] \"ไม่เลย\"\n[s2] \"ครูกำลังว่างอยู่พอดีเลย\""
1003005-7 = "ค่อยยังชั่วหน่อยค่ะ"
1003005-8 = "ค่อยยังชั่วหน่อยค่ะ"
1003005-9 = "ที่ฉันชวนคุณครูมาที่นี่ เพราะจะมาเลือกของขวัญขอบคุณค่ะ"
1003005-10 = "[s] \"ของขวัญขอบคุณเหรอ?\""
1003005-11 = "ถึงฉันจะโดนบังคับให้หยุด แต่ยังไงก็ถือว่าเป็นวันหยุดพักผ่อนอยู่ดี"
1003005-12 = "ในตอนที่สมาชิกคนอื่นๆ กำลังทำงานกันอย่างหนัก แต่ฉันกลับได้มาพักผ่อนคนเดียวแบบนี้#nฉันเลยคิดว่าจะซื้อของขวัญไปให้สมาชิกคนอื่นเป็นการตอบแทนค่ะ"
1003005-13 = "แต่ฉันไม่ค่อยได้ไปเที่ยวพักผ่อนคนเดียวแบบนี้สักเท่าไร เลยไม่รู้ว่าจะซื้อของขวัญอะไรดีค่ะ"
1003005-14 = "เลยอยากขอความช่วยเหลือจากคุณครูที่เป็นผู้ใหญ่หน่อยค่ะ"
1003005-15 = "[s3] \"ของขวัญที่เด็กนักเรียนหญิงจะชอบงั้นเหรอ\"\n[s4] \"ครูก็ไม่ค่อยรู้เหมือนกันแฮะ...\""
1003005-16 = "คุณครูเป็นคนที่ฮอตมากในหมู่นักเรียน ฉันเลยคิดว่าคุณครูจะรู้ว่านักเรียนหญิงชอบอะไรบ้างซะอีก ผิดคาดเลยนะคะ"
1003005-17 = "จริงเหรอคะ คุณครูเป็นคนที่ฮอตมากในหมู่นักเรียน ฉันเลยคิดว่าคุณครูจะรู้ว่านักเรียนหญิง#nชอบอะไรบ้างซะอีก ผิดคาดเลยนะคะ"
1003005-18 = "[s] \"ปกติแล้วสมาชิกคณะกรรมการวินัยชอบอะไรล่ะ?\""
1003005-19 = "ถ้าเป็นของที่ทุกคนชอบ..."
1003005-20 = "เด็กนักเรียนโรงเรียนเกเฮนน่ามักจะมีเอกลักษณ์เฉพาะตัวที่โดดเด่น...#nการเลือกของที่ทุกคนจะชอบเหมือนกัน มันไม่ใช่เรื่องง่ายเลยค่ะ"
1003005-21 = "อืม..."
1003005-25 = "ก่อนอื่นไปลองดูของที่วางขายก่อนแล้วค่อยเลือกดีมั้ยคะ?"
1003005-27 = "ของที่ระลึกจากออนเซ็นนี่มีหลายอย่างเลยนะคะ เยอะจนน่าตกใจเลยค่ะ"
1003005-28 = "ขนมชนิดเดียวกัน แต่ก็มีหลายรสชาติ หลายรูปแบบ..."
1003005-29 = "ตัดสินใจเลือกลำบากจริงๆ ค่ะ"
1003005-30 = "[s] \"มันจูรูปเพโรโร่นี่เป็นไง?\""
1003005-31 = "นกอ้วนรูปร่างแปลกๆ นี่มีอยู่ทุกที่เลยนะคะ ฉันไม่เข้าใจเลยว่าทำไมถึงได้เป็นที่นิยมขนาดนี้..."
1003005-32 = "มีสมาชิกของคณะกรรมการวินัยบางคนที่ไม่ชอบตัวละครนี้อยู่ด้วยค่ะ#nเพราะงั้นมันจูรูปเพโรโร่อาจไม่ใช่ตัวเลือกที่เหมาะเท่าไร"
1003005-33 = "ลองหาอย่างอื่นดีกว่านะคะ"
1003005-34 = "[s] \"ถ้างั้นบาธบอมบ์ชนิดพิเศษนี่ล่ะ?\""
1003005-35 = "<บาธบอมบ์นรกสูตรพิเศษของเกเฮนน่า ทันทีที่สัมผัสน้ำจะระเบิดทันที ทำให้สภาพแวดล้อม#nโดยรอบมีสภาพเหมือนตกอยู่ในนรก สามารถใช้กับน้ำเย็นได้>"
1003005-36 = "น่าสนใจมากค่ะ แต่ถ้าซื้อไปให้สมาชิกคนอื่นๆ ฉันคิดว่าพวกเธออาจจะเอาไปใช้ในทางที่ไม่ดีก็ได้#nเลยรู้สึกกังวลนิดหน่อยค่ะ"
1003005-37 = "ฉันว่าลองหาของที่เป็นอันตรายน้อยกว่านี้น่าจะดีกว่านะคะ"
1003005-41 = "[ns] \"โบว์ผูกผมที่มีสัญลักษณ์ของออนเซ็น?\""
1003005-42 = "นี่มัน... เป็นของขวัญที่น่ารักมากเลยค่ะ"
1003005-43 = "คนส่วนใหญ่ชอบโบว์ผูกผมน่ารักๆ แบบนี้ แถมมันยังมีสัญลักษณ์ของออนเซ็นติดอยู่ด้วย เป็นตัวเลือกที่ไม่เลวเลยค่ะ"
1003005-44 = "แต่ว่าราคามันแพงมาก แค่เงินเก็บของฉันคงจะซื้อให้ทุกคนไม่ไหวหรอกค่ะ"
1003005-45 = "ถึงจะน่าเสียดาย แต่คงจะต้องเลือกของขวัญอย่างอื่นแทนแล้วค่ะ"
1003005-46 = "ไปดูของอย่างอื่นกันเถอะค่ะ คุณครู"
1003005-48 = "(จากนั้น คุณครูกับชินัตสึก็เดินเลือกของในร้านขายของที่ระลึกอยู่พักใหญ่)"
1003005-51 = "สุดท้ายก็เลือกเป็นวากาชิรสชาเขียวธรรมดาๆ มาจนได้นะคะ"
1003005-52 = "รสชาติที่หวานพอดีๆ ที่ไม่ว่าใครก็คงชอบ แต่ว่าของขวัญธรรมดาแบบนี้จะไม่เป็นไรจริงๆ เหรอคะ?"
1003005-53 = "[s5] \"ความเอาใจใส่ถือเป็นเรื่องสำคัญกว่าของที่ให้อีกนะ\"\n[s6] \"ยิ่งธรรมดาสิยิ่งดี!\""
1003005-54 = "ฮิฮิ งั้นเหรอคะ"
1003005-55 = "ฮิฮิ งั้นเหรอคะ"
1003005-56 = "ถ้าคุณครูพูดแบบนี้ฉันก็วางใจค่ะ"
1003005-57 = "วันนี้ขอบคุณมากนะคะ ฉันเลือกของขวัญได้ก็เพราะคุณครูมาช่วยไว้เลย"
1003005-58 = "แต่เมื่อกี้เหมือนเห็นคุณครูซื้ออะไรมาด้วยนี่คะ"
1003005-59 = "คุณครูซื้อของขวัญไปให้ใครเหรอคะ?"
1003005-65 = "[ns] \"ของขวัญสำหรับชินัตสึไงล่ะ\""
1003005-66 = "คะ...? ของขวัญให้ฉันเหรอคะ?!"
1003005-68 = "นี่มัน... โบว์ผูกผมที่ฉันดูไปเมื่อกี้นี่นา"
1003005-69 = "แต่ว่าฉันไม่ได้ช่วยอะไรคุณครูเลยนะคะ ทำไมถึงซื้อให้ฉันล่ะคะ"
1003005-70 = "[s7] \"ตอบแทนที่คอยดูแลสุขภาพของครูมาตลอดไง\"\n[s8] \"ตอบแทนที่มาใช้เวลาอยู่ด้วยกันน่ะ\""
1003005-75 = "คุณครูทำให้ฉันประหลาดใจได้อยู่เสมอเลยนะคะ"
1003005-76 = "ถึงฉันจะไม่ได้พูดออกไป แต่รู้สึกเหมือนคุณครูอ่านใจฉันได้เลยค่ะ"
1003005-77 = "ขอบคุณนะคะ คุณครู"
1003005-78 = "โบว์ผูกผมอันนี้... ฉันจะเก็บรักษาไว้อย่างดีเลยค่ะ"

[translation]
1003005-1 = "A Thank-You Gift"
1003005-2 = "Souvenir shop in the hot springs resort"
1003005-3 = "There you are, Sensei. I've been waiting."
1003005-4 = "Thank you for taking time out of your busy schedule."
1003005-5 = "Hope I'm not interrupting your break."
1003005-6 = "[s1] \"Not at all.\"\n[s2] \"I was free.\""
1003005-7 = "I'm glad to hear that."
1003005-8 = "I'm glad to hear that."
1003005-9 = "I asked you here because...I have to get thank-you gifts."
1003005-10 = "[s] \"Thank-you gifts?\""
1003005-11 = "Yes. Even though I was kind of forced into it, I still went on vacation."
1003005-12 = "Since I took time off while the other members were working hard, returning with thank-you gifts is the least I can do."
1003005-13 = "However, I've never been on a vacation alone like this, so I have no idea what kind of gifts to buy them..."
1003005-14 = "That's why I'm seeking advice from an experienced adult like you, Sensei."
1003005-15 = "[s3] \"A thank-you gift that female students would like...\"\n[s4] \"I'm not sure either...\""
1003005-16 = "Really? You're very popular with the students, so I thought you would know what they would like...I'm a bit surprised."
1003005-17 = "Really? You're very popular with the students, so I thought you would know what they would like...I'm a bit surprised."
1003005-18 = "[s] \"Well, what kind of things do the Prefect Team members enjoy?\""
1003005-19 = "What do they enjoy..."
1003005-20 = "All the students at Gehenna are so unique, so it's not easy picking out something that everyone will like."
1003005-21 = "Hmm..."
1003005-25 = "Why don't we start by looking at the items on display?"
1003005-27 = "There are so many different kinds of hot springs souvenirs. I was a little surprised by the variety."
1003005-28 = "Take cookies for example. There are dozens of different types of cookies depending on the flavor and shape..."
1003005-29 = "It's going to be hard to make up my mind."
1003005-30 = "[s] \"How about some Peroro manju?\""
1003005-31 = "That uniquely-shaped bird is everywhere. I don't understand why it's so popular."
1003005-32 = "But quite a few members on the team hate it, so I don't think getting Peroro manju will work out."
1003005-33 = "I think we should find something with a different design."
1003005-34 = "[s] \"How about this special bath bomb?\""
1003005-35 = "<Gehenna Special Hell Bath Bomb. It explodes when it's exposed to moisture, making the surrounding area resemble hell. It works in cold water as well.>"
1003005-36 = "It's interesting, but I'm a bit concerned that my members will use it for something bad."
1003005-37 = "It would be better to find something less dangerous."
1003005-41 = "[ns] \"How about a ribbon with the hot springs symbol on it?\""
1003005-42 = "That's...a pretty cute gift."
1003005-43 = "Most people like ribbons, and it still shows it's from the hot springs."
1003005-44 = "Except, it's too expensive. I don't think I'll be able to afford one for everyone."
1003005-45 = "Unfortunately, we'll have to look for another gift."
1003005-46 = "Sensei, let's try over there."
1003005-48 = "We then perused the many displays for a while."
1003005-51 = "I think everyone will like this plain green-tea-flavored sweet bean jelly."
1003005-52 = "It's not too sweet, but still a treat. Is something so ordinary an appropriate gift, however?"
1003005-53 = "[s5] \"Your sincerity is more important than the actual gift.\"\n[s6] \"It's actually better because it's ordinary!\""
1003005-54 = "...Heehee, really?"
1003005-55 = "...Heehee, really?"
1003005-56 = "I am relieved to hear you say that, Sensei."
1003005-57 = "Thank you for today. I was able to select a gift thanks to you."
1003005-58 = "By the way, I saw you purchasing something earlier..."
1003005-59 = "Do you have someone you want to give a thank-you gift to as well?"
1003005-65 = "[ns] \"It's for you, Chinatsu.\""
1003005-66 = "...Huh?! A thank-you gift for me?!"
1003005-68 = "This is the ribbon I was looking at earlier..."
1003005-69 = "But I've only been helped by you, Sensei. Why would you get me a thank you gift..."
1003005-70 = "[s7] \"It's for taking care of my health.\"\n[s8] \"It's for spending a fun time with me.\""
1003005-75 = "...You really are something else, Sensei."
1003005-76 = "Even if I don't say anything to you, it feels as if you're able to read my heart..."
1003005-77 = "Thank you again, Sensei."
1003005-78 = "This ribbon... I will cherish it."

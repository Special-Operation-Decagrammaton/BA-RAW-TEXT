[translation]
10051110-1 = "บทส่งท้าย;กลับมาที่เดิมอีกครั้ง"
10051110-2 = "(วันต่อมา)"
10051110-4 = "ห้องทำงานของไชน์แคท"
10051110-5 = "เรื่องเมื่อวานนี้น่ะ ขอบใจมากเลยนะ"
10051110-6 = "ถึงแฟชั่นโชว์จะพังไม่เป็นท่า... แต่มันก็ไม่ใช่ความผิดของเธอหรอก"
10051110-7 = "ต้องขอบใจพวกเธอกับครูจากชาเล่ต์ที่ทำให้เกิดความเสียหายน้อยที่สุดนะ จะเรียกว่าทุกคนมาพิทักษ์แฟชั่นโชว์ไว้ยังได้เลยละ"
10051110-8 = "ว่าแต่ สรุปแล้วยังอยากกลับไปชมรมวิจัยศาสตร์นินจางั้นเหรอ?"
10051110-9 = "ค่ะ..."
10051110-10 = "อืม"
10051110-11 = "ก็ได้ ก็คงถูกต้องแล้วละ ก็เราต้องเลือกเส้นทางชีวิตของเราเองนี่เนอะ"
10051110-12 = "ฉันเองก็ผ่านมาแล้วเหมือนกัน..."
10051110-16 = "เราคุยกันยืดยาวไปแล้วละ มาจัดการงานที่เหลือให้เรียบร้อยดีกว่า"
10051110-17 = "เธอจะรับผิดชอบชุดของฉันที่เธอทำขาดยังไง?"
10051110-18 = "ระ... เรื่องนั้น...!"
10051110-19 = "วะฮ่าฮ่า! ล้อเล่นน่า"
10051110-20 = "เอ้านี่ รับไปสิ"
10051110-21 = "กล่องอะไรเหรอคะ...?"
10051110-25 = "นะ... นี่มัน...!"
10051110-26 = "ใช่แล้วละ ชุดเดรสที่เธอทำขาดยังไงล่ะ เมื่อคืนฉันโต้รุ่งเย็บให้เลยนะ"
10051110-28 = "ฉันให้เป็นของขวัญ"
10051110-29 = "...!"
10051110-30 = "อย่าเข้าใจผิดล่ะ ฉันให้เพราะไม่อยากให้แขกที่อุตส่าห์แวะมาหาตั้งแต่ต้นปีต้องกลับบ้านมือเปล่าน่ะ"
10051110-31 = "สวัสดีปีใหม่นะ"
10051110-32 = "หะ... ให้ชุดฉันเลยเหรอคะ...!"
10051110-33 = "กลับไปได้แล้ว ฉันงานยุ่งนะ"
10051110-38 = "ขอบคุณค่ะ...! สวัสดีปีใหม่นะคะ!"
10051110-40 = "ประตูหน้าห้องทำงานของไชน์แคท"
10051110-42 = "ช้าจังเลย สึคุโยะ..."
10051110-43 = "[s] \"เพิ่งเข้าไปยังไม่ถึง 5 นาทีเลยนะ...\""
10051110-44 = "ขะ... ข้าน้อยไม่สนเรื่องเวลาหรอก ที่สำคัญที่สุดคือการตัดสินใจต่างหาก!"
10051110-48 = "หัวหน้า! นายท่าน! สึคุโยะออกมาแล้วค่ะ!"
10051110-49 = "สึคุโยะ!"
10051110-54 = "ทะ... ท่านหัวหน้า! อิซุนะจัง! แล้วก็... คุณครูด้วยเหรอ?!"
10051110-55 = "[s] \"ตัดสินใจได้แล้วเหรอ สึคุโยะ?\""
10051110-56 = "ค่ะ! ฉัน..."
10051110-57 = "ฉัน... ชอบชมรมวิจัยศาสตร์นินจามากกว่าค่ะ!"
10051110-58 = "เยสสส!"
10051110-59 = "ยินดีต้อนรับกลับมานะคะ! ท่านสึคุโยะ!!"
10051110-60 = "ว่าแต่ ทำไมถึงมีกล้องด้วย...?"
10051110-61 = "[s] \"สหายกลับมาทั้งที ก็ต้องประกาศให้โลกรับรู้สิ!\""
10051110-62 = "เอ๋...?!"
10051110-63 = "ครั้งนี้ข้าน้อยตั้งกล้องไว้อย่างสมบูรณ์แบบเลยละ!"
10051110-64 = "ไว้ถ่ายทำเสร็จแล้วเราไปกินราเม็งกันเถอะค่ะ! นินนิน!"
10051110-65 = "ราเม็ง...!"
10051110-70 = "เอาละ ถ้างั้นก็ขอต้อนรับเข้าสู่ <วิถีนินจาสาว มิจิรุจจี้> นะ!"
10051110-78 = "มาเริ่มกันเลยค่ะ!"
10051110-82 = "วิถีแห่งความอับโชค ~ภารกิจพิทักษ์! แฟชั่นโชว์~"

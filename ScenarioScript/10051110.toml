[translation]
10051110-1 = "尾聲;回到原位"
10051110-2 = "（隔日）"
10051110-4 = "Shine Cat的辦公室"
10051110-5 = "昨天真是謝了。"
10051110-6 = "雖然秀搞砸了……不過那也不是你的錯。"
10051110-7 = "反而應該說，多虧有你們和夏萊的老師，才能把損害降到最低。"
10051110-8 = "還有……你說想回忍術研究部是吧？"
10051110-9 = "……是的。"
10051110-10 = "嗯，"
10051110-11 = "既然你是這麼想的，那就是正確的選擇。#n自己的路，應該由自己決定。"
10051110-12 = "……我也是這樣過來的。"
10051110-16 = "似乎閒聊太久了呢。#n趕緊把剩下的正事處理完吧。"
10051110-17 = "你弄破了我的禮服，打算怎麼負責呢？"
10051110-18 = "這，這……！"
10051110-19 = "噗哈哈！跟你開玩笑的。"
10051110-20 = "來，收下吧。"
10051110-21 = "盒子……？"
10051110-25 = "這，這是……！"
10051110-26 = "沒錯，就是你弄破的那件禮服。#n我昨晚熬夜把它修補好了。"
10051110-28 = "這是我送你的禮物。"
10051110-29 = "……！"
10051110-30 = "希望你別誤會。#n新年伊始，我只是不想讓今年第一位客人空手回去而已。"
10051110-31 = "新年快樂。"
10051110-32 = "咦，咦咦……！"
10051110-33 = "沒事的話就出去吧。我可是很忙的。"
10051110-38 = "……謝謝！新年快樂！"
10051110-40 = "Shine Cat辦公室正門"
10051110-42 = "動作真慢呢，月夜……"
10051110-43 = "[s]「人家才進去不到5分鐘而已……」"
10051110-44 = "重，重點是我心裡的時間啦！"
10051110-48 = "部長！主公！月夜閣下出來了！"
10051110-49 = "月夜！"
10051110-54 = "部，部長！伊樹菜醬！還有……老師！？"
10051110-55 = "[s]「決定好了嗎，月夜？」"
10051110-56 = "是！那個……"
10051110-57 = "我果然……還是喜歡忍術研究部！"
10051110-58 = "好耶──！"
10051110-59 = "再次歡迎你回來！月夜閣下！"
10051110-60 = "那個，為什麼會有攝影機……？"
10051110-61 = "[s]「既然夥伴回來了，當然得昭告天下囉！」"
10051110-62 = "咦……！？"
10051110-63 = "這次攝影機也設定得萬無一失！"
10051110-64 = "拍完之後大家再一起去吃拉麵吧！忍忍！"
10051110-65 = "拉麵……！"
10051110-70 = "那麼現在──「少女忍法帖小小三千留」！"
10051110-78 = "要開始囉！"
10051110-82 = "不忍之道～時裝秀警備任務！之卷～"

[translation]
1000206-1 = "นักชิมที่แท้จริง"
1000206-2 = "เขตนอกพื้นที่ D.U."
1000206-3 = "โอ๊ะ คุณครู?"
1000206-4 = "ไม่คิดว่าจะมาเจอคุณครูที่นี่เลยนะคะ"
1000206-5 = "ออกมาเดินเตร็ดเตร่อีกแล้วเหรอคะ?"
1000206-6 = "ฮุฮุ ฉันเองก็เหมือนกันค่ะ ดีใจจังที่เจอคุณครู"
1000206-7 = "[s] \"แล้วฮารุนะมาทำอะไรเหรอ?\""
1000206-8 = "ฉันกำลังลองเดินหาร้านอาหารใหม่ๆ อยู่ค่ะ"
1000206-9 = "ฉันลองไปร้านอาหารชื่อดังที่คนในโซเชียลมีเดียแนะนำมาแล้ว แต่ว่า...."
1000206-10 = "มันไม่เหมือนที่ฉันคิดเอาไว้เลยค่ะ...."
1000206-11 = "[s] \"อย่าบอกนะว่าระเบิดร้านทิ้งอีกแล้วน่ะ?\""
1000206-12 = "ฮุฮุ.... ฉันไม่ทำแบบนั้นทุกครั้งหรอกค่ะ"
1000206-13 = "อืม.... ช่วงนี้ฉันเอาแต่คิดเรื่องของกินอยู่บ่อยๆ…"
1000206-14 = "[s] \"คงคิดอะไรหลายๆ อย่างเลยสินะ\""
1000206-15 = "....ฮุฮุ ขอบคุณที่เป็นห่วงนะคะ"
1000206-16 = "ไหนๆ ก็บังเอิญเจอกันแล้ว เดินไปด้วยกันไหมคะ?"
1000206-17 = "[s] \"ได้สิ\""
1000206-21 = "(ระหว่างเดินคุณครูกับฮารุนะก็เดินคุยเรื่องอาหารกันไปเรื่อยๆ)"
1000206-22 = "(จู่ๆ คุณครูก็มาหยุดที่ร้านไทยากิ)"
1000206-23 = "[s] \"กินไทยากิกันไหม?\""
1000206-24 = "......ไทยากิเหรอคะ\n"
1000206-25 = "....ฮุฮุ ค่ะ คุณครูเลี้ยงหน่อยสิคะ"
1000206-27 = "ขอบคุณคร้าาบบบบบ!"
1000206-29 = "....ฮุฮุ"
1000206-32 = "― ฮุฮุ ได้เดินกลับบ้านด้วยกันแบบนี้ดีจังเลยนะคะ[wa:1040] "
1000206-34 = "― สุดท้ายก็ซื้อไทยากิมาเยอะเลย"
1000206-37 = "― ไทยากิ ไม่ดูเรียบง่ายไปหน่อยงั้นเหรอคะ?[wa:2160] "
1000206-40 = "― ไม่เลยค่ะ.. สำหรับฉันแล้ว ช่วงเวลานี้มันพิเศษที่สุดเลยค่ะ[wa:1620] "
1000206-43 = "― คือ...  คุณครูคะ ลองทานขนมนี่สิคะ[wa:1320] "
1000206-45 = "― ...ไม่เอาค่ะ อ้าปากสิคะ...\"อ้าม~\"[wa:1080] "
1000206-48 = "[ns] \"อ้าม~\""
1000206-49 = "― การได้กินของโปรด กับคนที่ชอบแบบนี้...[wa:2260] "
1000206-52 = "― แบบนี้มัน...."
1000206-55 = "[ns] \"จู่ๆ ก็รู้สึกเขินๆ แฮะ....\""
1000206-56 = "― หืม? ทำไมถึงทำหน้าแบบนั้น...ล่ะคะ?[wa:1660] "
1000206-59 = "― ฮุฮุ ฉันไม่ติดใจ ที่ทำหน้าแบบนั้นหรอกค่ะ[wa:2240] "
1000206-62 = "― ฉันหนาวรึเปล่างั้นเหรอคะ?[wa:820] "
1000206-65 = "― ไม่เลยค่ะ อุ่นดีแล้วค่ะ จริงๆ นะคะ[wa:2000] "
1000206-68 = "(คุณครูกับฮารุนะแบ่งไทยากิให้กันและเดินกลับบ้านอย่างมีความสุข)"

[translation]
1000206-1 = "The True Epicure"
1000206-2 = "D.U. Outskirts District"
1000206-3 = "Oh, Sensei?"
1000206-4 = "I didn't expect to run into you here. "
1000206-5 = "Out on another one of your walks?"
1000206-6 = "Same here. I'm glad I ran into you."
1000206-7 = "[s] \"What were you up to?\""
1000206-8 = "I've been scoping out new restaurants to try."
1000206-9 = "There was a place I wanted to check out that people have been raving about on social media..."
1000206-10 = "...but it was nothing like what I expected."
1000206-11 = "[s] \"Please don't tell me you blew up another restaurant.\""
1000206-12 = "Heh heh. Where would be the fun in doing that every time?"
1000206-13 = "The thing is...I have been thinking about food more deeply lately..."
1000206-14 = "[s] \"You must have a lot on your mind.\""
1000206-15 = "...Thanks for always looking out for me."
1000206-16 = "Now that we're here, want to go on a walk together?"
1000206-17 = "[s] \"I'd love to.\""
1000206-21 = "(Haruna and I talked about food as we walked.)"
1000206-22 = "On our way, a taiyaki store caught my eye."
1000206-23 = "[s] \"Care for some taiyaki?\""
1000206-24 = "...Oh, taiyaki."
1000206-25 = "Heh. I'd love some, Sensei!"
1000206-27 = "Thank you! "
1000206-29 = "...Heh heh."
1000206-32 = "― Heh. I'm enjoying walking home together.[wa:1240] "
1000206-34 = "― We have a bunch of taiyaki now too."
1000206-37 = "― Don't I think it's a bit underwhelming?[wa:2160] "
1000206-40 = "― No... To me, this moment is the pinnacle of luxury.[wa:1860] "
1000206-43 = "― Here, Sensei. This is for you.[wa:1440] "
1000206-45 = "― No. Open your mouth. Say \"ahhh.\"[wa:1120] "
1000206-48 = "[ns] \"Ahhh.\""
1000206-49 = "― Eating my favorite food with my favorite person.[wa:1820] "
1000206-52 = "― This is..."
1000206-55 = "[ns] \"I'm starting to feel a little bashful...\""
1000206-56 = "― Hmm? Why are you looking at me like that?[wa:1380] "
1000206-59 = "― Heh... Still, it doesn't particularly bother me.[wa:1920] "
1000206-62 = "― Aren't I cold?[wa:1260] "
1000206-65 = "― No. I feel warm, actually.[wa:2320] "
1000206-68 = "(Haruna and I cheerfully walked back home while sharing the taiyaki.)"

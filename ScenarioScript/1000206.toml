[translation]
1000206-1 = "真正的美食"
1000206-2 = "D.U.外圍區域"
1000206-3 = "哎呀，老師？"
1000206-4 = "沒想到又會偶然在這裡遇到你。"
1000206-5 = "今天也在悠哉地到處閒晃嗎？"
1000206-6 = "呵呵，那我也一樣。覺得有點開心同時又安心呢。"
1000206-7 = "[s] 「羽留奈在做什麼呢？」"
1000206-8 = "我為了開拓新的美食餐廳正在四處徘徊。"
1000206-9 = "雖然我去了一家在SNS被稱作是期待的新星的餐廳……"
1000206-10 = "跟我期待中的樣子實在差太多……"
1000206-11 = "[s]「難道又把店炸掉了嗎？」"
1000206-12 = "唔呵呵……就算是我也不會每次都做那種事。"
1000206-13 = "……不過，最近總覺得，對於吃飯這件事，想了很多……"
1000206-14 = "[s] 「煩惱了很多呢。」"
1000206-15 = "……呵呵，謝謝你溫柔的話語。 "
1000206-16 = "難得和老師見到面了，可以稍微在回家的路上一起走嗎？"
1000206-17 = "[s] 「當然。」"
1000206-21 = "（就在和羽留奈一邊聊著各種食物的話題一邊走著的時候）"
1000206-22 = "（鯛魚燒店出現在眼前）"
1000206-23 = "[s] 「要吃鯛魚燒嗎？」"
1000206-24 = "……鯛魚燒，嗎。"
1000206-25 = "……唔呵呵。好，拜託你了，老師。"
1000206-27 = "謝謝光臨！"
1000206-29 = "……呵呵。"
1000206-32 = "― 唔呵呵，竟然可以像這樣一起回家，[wa:2200] "
1000206-34 = "― 也買了這麼多鯛魚燒。"
1000206-37 = "― 你問我鯛魚燒不會太樸素嗎？[wa:3200] "
1000206-40 = "― 不……對我來說，這是最奢侈的瞬間了。[wa:3180] "
1000206-43 = "― 來，老師。這個給你。[wa:2240] "
1000206-45 = "―……不對。你要說「啊──」才對。[wa:1800] "
1000206-48 = "[ns] 「啊──」"
1000206-49 = "― 和最喜歡的人一起吃最喜歡的食物。[wa:3100] "
1000206-52 = "― 這正是……"
1000206-55 = "[ns] 「感覺好害羞……」"
1000206-56 = "― 嗯？你那個表情怎麼了嗎？[wa:2540] "
1000206-59 = "― 唔呵呵。那種反應，我也不討厭。[wa:3240] "
1000206-62 = "― 你問我會不會冷嗎？[wa:1460] "
1000206-65 = "― 不，很溫暖唷。真的。[wa:2960] "
1000206-68 = "（回家的路上和羽留奈融洽地分享著鯛魚燒）"

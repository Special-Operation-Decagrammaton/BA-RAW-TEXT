[translation]
1003503-1 = "การค้นหาเด็กที่หายตัวไป"
1003503-8 = "ข้างในห้องสมุดเก่า"
1003503-9 = "[ns1] \"อุย...!\"\n[ns2] \"เกิดอะไรขึ้น อธิบายหน่อย!\""
1003503-10 = "คะ... คุณครู!"
1003503-11 = "คะ... คุณครู!"
1003503-12 = "จะ... ใจเย็นๆ ก่อนนะคะ! คุณครู...! เหงื่อท่วมตัวหมดเลย!"
1003503-13 = "ตายแล้ว! คุณครูวิ่งแจ้นมาถึงที่นี่เลยเหรอคะ!? ไม่ได้ใกล้ๆ เลยนะ...!"
1003503-14 = "[s3] \"ไม่ต้องห่วงครูหรอก\"\n[s4] \"อุยล่ะเป็นยังไงบ้าง? หน้าซีดเป็นไก่ต้มเลย\""
1003503-15 = "เอ่อ... คือว่า... อืม... เรื่องมันมีอยู่ว่า..."
1003503-16 = "เอ่อ... คือว่า... อืม... เรื่องมันมีอยู่ว่า..."
1003503-17 = "แบบว่า..."
1003503-18 = "คือว่า... เด็ก... เด็กคนนั้นเค้า..."
1003503-19 = "[s] \"เด็กคนนั้นเค้า...?\""
1003503-20 = "คือว่า..."
1003503-21 = "[s] \"...คือว่า...?\""
1003503-22 = "ฮือออ...!!"
1003503-23 = "แงงงงงง แง...!!"
1003503-24 = "[s] \"อุย!?\""
1003503-26 = "(ปลอบอุยที่ร้องไห้แล้วฟังเรื่องที่เกิดขึ้นอย่างใจเย็น)"
1003503-28 = "คือว่า..."
1003503-29 = "ฮือๆ... ไม่ใช่อย่างที่คุณครูคิดหรอกค่ะ..."
1003503-30 = "ก็แค่... เด็กคนนั้นที่ฉันอ่านบ่อยๆ... ไม่สิ หนังสือน่ะ... ฉันหาเด็กคนนั้นไม่เจอแล้ว..."
1003503-31 = "แต่ยังไงก็คงจะอยู่ที่ไหนสักที่ในห้องสมุดนี้แหละค่ะ... ฉันส่งข้อความไปเพราะอยากถามว่าคุณครูจะ#nมาช่วยหาได้มั้ย..."
1003503-32 = "แต่พอเห็นคุณครูตกใจแบบนี้ ก็ถึงรู้ว่าคุณครูเข้าใจอะไรผิด..."
1003503-33 = "ฉันหมายถึงหนังสือ แต่คุณครูเหมือนจะเข้าใจว่าเป็นคน..."
1003503-34 = "ฉันก็เลยจะอธิบายให้กระจ่าง แต่คุณครูก็วิ่งหน้าตั้งมาที่นี่ก่อน..."
1003503-35 = "ต้องขอโทษด้วยค่ะ... ขอโทษที่ฉันใช้คำพูดแปลกๆ... ไม่น่าทำให้คุณครูเป็นห่วงเลย..."
1003503-36 = "ฮึ่ก... ฮึ่ก ฮึ่กๆๆ... ฮือ..."
1003503-37 = "[s5] \"ไม่เป็นไร ครูเข้าใจทุกอย่างแล้ว\"\n[s6] \"ไม่เป็นไรหรอก ดีแล้วแหละที่ไม่ใช่คน\""
1003503-38 = "คุณครู..."
1003503-39 = "คุณครู..."
1003503-40 = "ว่าไงนะคะ...? ดูผิดคาดเหรอคะ...?"
1003503-41 = "ฉันดูไม่เหมือนคนที่ทำหนังสือหายงั้นเหรอ? เอ่อ... คือว่า..."
1003503-42 = "ที่จริงแล้วฉันไม่ได้ทำหายหรอกค่ะ... พอดีมีสมาชิกคนอื่นเข้ามาทำความสะอาดแทนฉัน..."
1003503-43 = "[s7] \"มีคนมาทำความสะอาดแทนนี่เอง\"\n[s8] (อุยคนเดียวไม่น่าทำไหวอยู่แล้วนี่...)"
1003503-44 = "ตอนนั้นฉันไปนั่งหลบมุมแล้วเผลอหลับไปน่ะค่ะ ก็เลย..."
1003503-45 = "ตอนนั้นฉันไปนั่งหลบมุมแล้วเผลอหลับไปน่ะค่ะ ก็เลย..."
1003503-46 = "พอไปถามดู แต่ละคนก็ทำหน้าเหมือนไม่รู้จักหนังสือที่ฉันหาอยู่"
1003503-47 = "ก็อย่างที่คุณครูรู้... ชั้นหนังสือที่นี่มัน..."
1003503-48 = "[s9] \"น่าจะหาหนังสือยากเอาเรื่องเลย\"\n[s10] \"อืม หาคนเดียวไม่เจอแน่\""
1003503-49 = "คนอื่นมาช่วยทำความสะอาดแล้วทั้งที จะขอให้ช่วยหาหนังสือด้วยก็คง... ดูไม่ดี..."
1003503-50 = "คนอื่นมาช่วยทำความสะอาดแล้วทั้งที จะขอให้ช่วยหาหนังสือด้วยก็คง... ดูไม่ดี..."
1003503-51 = "ฉันก็เลยติดต่อคุณครูไป... เรื่องมันก็เป็นอย่างนี้แหละค่ะ "
1003503-52 = "ขอโทษอีกครั้งนะคะคุณครู"
1003503-53 = "คะ...? ไม่เป็นไรงั้นเหรอคะ?"
1003503-54 = "คุณครูจะช่วยฉันหา... งั้นเหรอ? จะ... จะช่วยฉันจริงๆ เหรอคะ!"
1003503-55 = "นี่ฉัน... ทำให้คุณครูเข้าใจผิดจนต้องลำบากมาที่นี่..."
1003503-56 = "แบบนี้ไม่ต่างกับเด็กเลี้ยงแกะเลยค่ะ... แต่ว่า..."
1003503-57 = "คะ...?"
1003503-58 = "ไม่ใช่อย่างนั้นเหรอคะ? ทำไมล่ะ..."
1003503-59 = "[s11] \"ก็เด็กคนนั้นก็เป็นของสำคัญของอุยนี่นา?\"\n[s12] \"ก็ตอนนี้อุยต้องการความช่วยเหลือจากครูไง\""
1003503-60 = "คุณครูคะ..."
1003503-61 = "คุณครูคะ..."
1003503-64 = "ฉันว่าที่ฉันคร่ำครวญอยู่นี่กลับยิ่งเป็นการรบกวนคุณครูมากขึ้นไปอีกค่ะ"
1003503-65 = "ได้ค่ะ... ถ้างั้นฉันจะขอรับความช่วยเหลือจากคุณครูไว้ค่ะ"
1003503-66 = "ขอบคุณมากนะคะคุณครู... ขอบคุณที่พูดอย่างนั้นกับฉันในสถานการณ์แบบนี้..."
1003503-67 = "คะ...? อยากรู้ว่าเด็กคนนั้นหน้าตาเป็นยังไงเหรอคะ? เด็กคนนั้นเค้า..."
1003503-68 = "เอ๋...?"
1003503-69 = "จะว่าไป... คุณครูเองก็... เรียกหนังสือว่า 'เด็กคนนั้น' เหมือนฉันเลยนะคะ...?"
1003503-70 = "......"
1003503-71 = "ช่างเถอะค่ะ ฉันเอาแต่ต่อความยาวสาวความยืดไปเรื่อย แต่ก็ขอบคุณที่เรียกแบบนั้นนะคะ"
1003503-72 = "หน้าตาของเด็กคนนั้นที่ฉันกำลังตามหาอยู่น่ะ..."
1003503-73 = "(คุณครูฟังชื่อและคำอธิบายคร่าวๆ จากอุยแล้วเริ่มหา 'เด็กคนนั้น' ด้วยกัน)"
1003503-75 = "(ห้องสมุดเก่ามีหนังสือมากกว่าที่คิด กว่าจะหาเจอก็ปาเข้าไปตอนค่ำๆ แล้ว)"

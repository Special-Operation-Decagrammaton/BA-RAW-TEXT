[translation]
1003503-1 = "尋找失蹤的孩子"
1003503-8 = "古書館內部"
1003503-9 = "[ns1] 「……憂！」\n[ns2] 「怎麼回事！？」"
1003503-10 = "老，老師！？"
1003503-11 = "老，老師！？"
1003503-12 = "請，請先冷靜一下！怎，怎麼滿身大汗……"
1003503-13 = "難，難道是從夏萊一路用跑的過來……？"
1003503-14 = "[s3] 「我的事無所謂。」\n[s4] 「憂你才是，臉色很差哦，還好嗎？」"
1003503-15 = "呃，那，那個……"
1003503-16 = "呃，那，那個……"
1003503-17 = "唔……"
1003503-18 = "是，是這樣的……"
1003503-19 = "[s] 「嗯。」"
1003503-20 = "……"
1003503-21 = "[s] 「……？」"
1003503-22 = "唔，嗚……"
1003503-23 = "嗚啊啊啊啊啊啊啊……"
1003503-24 = "[s] 「憂！？」"
1003503-26 = "（一邊安慰著哭泣的憂，一邊了解事情的狀況）"
1003503-28 = "所，所以說……"
1003503-29 = "那個，可，可能跟老師想像的那種事，不太一樣……"
1003503-30 = "是平常很常見到的孩子……書本，有1本找不到了……"
1003503-31 = "但是應該就在古書館裡面才對，所以想要請你一，一起找而已……"
1003503-32 = "對，對不起，等我注意到的時候已經太遲了……"
1003503-33 = "之後我會那個，小，小心不要造成誤會的……"
1003503-34 = "對不起，沒有好好表達……"
1003503-35 = "因，因為我的表達方式，害老師擔心了……"
1003503-36 = "……"
1003503-37 = "[s5] 「沒關係，別在意。」\n[s6] 「憂不用道歉的哦。」"
1003503-38 = "老師……"
1003503-39 = "老師……"
1003503-40 = "……？"
1003503-41 = "我弄丟書本讓你感到很意外，是嗎……？"
1003503-42 = "啊，那個，與其說是弄丟了……是，是請其他部員打掃的時候，那個……"
1003503-43 = "[s7] 「原來會有其他人來打掃啊……」\n[s8] （不擅長打掃嗎……）"
1003503-44 = "我，我那個時候，睡著了……"
1003503-45 = "我，我那個時候，睡著了……"
1003503-46 = "雖然後來有注意到，不過問了他們也說不知道……"
1003503-47 = "畢竟這裡就像你看到的一樣，那個……"
1003503-48 = "[s9] 「書本量非常多呢……」\n[s10] 「看來是大工程呢……」"
1003503-49 = "那個，所以才想要拜託老師幫忙的……"
1003503-50 = "那個，所以才想要拜託老師幫忙的……"
1003503-51 = "可是又表達得不好，那個……"
1003503-52 = "對，對不起……"
1003503-53 = "……？"
1003503-54 = "老師願意跟我一起找，是嗎……？"
1003503-55 = "明明給你添麻煩了……"
1003503-56 = "因為我的表達方式……"
1003503-57 = "沒有那種事……？"
1003503-58 = "為，為什麼……"
1003503-59 = "[s11] 「因為對憂來說真的是『重要的孩子』嘛。」\n[s12] 「表達方式沒有錯唷。」"
1003503-60 = "老師……"
1003503-61 = "老師……"
1003503-64 = "如，如果繼續說洩氣話，反而可能會造成老師的困擾呢……"
1003503-65 = "那就承蒙你的好意……"
1003503-66 = "非，非常謝謝你，老師。謝謝你能夠這麼，對我說……"
1003503-67 = "想問「那孩子的外表」是嗎？"
1003503-68 = "呃……"
1003503-69 = "「那孩子」……"
1003503-70 = "……"
1003503-71 = "……啊，不，抱歉。#n好，好像會聊太久，還是之後再說……總之先開始找吧。"
1003503-72 = "那個，要說特徵的話……"
1003503-73 = "（從憂那裡得知了外表和名字後，一起開始尋找「那孩子」）"
1003503-75 = "（儘管藏書量比想像中還多，總算是在天黑的時候找到了）"

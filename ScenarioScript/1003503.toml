[translation]
1003503-1 = "Finding a Missing Child"
1003503-8 = "Inside the old library"
1003503-9 = "[ns1] \"Ui!\"\n[ns2] \"What's going on? Details!\""
1003503-10 = "S-Sensei!"
1003503-11 = "S-Sensei!"
1003503-12 = "C-Calm down! You're drenched in sweat!"
1003503-13 = "Did you run all the way here?! That's such a long way..."
1003503-14 = "[s3] \"Don't worry about me. What's the situation?!\"\n[s4] \"ME?! Your face is pale! Are you okay?\""
1003503-15 = "Um... Let me explain what happened."
1003503-16 = "Um... Let me explain what happened."
1003503-17 = "Uh..."
1003503-18 = "Well..."
1003503-19 = "[s] \"Well...?\""
1003503-20 = "I..."
1003503-21 = "[s] \"You...?\""
1003503-22 = "Ugh...!"
1003503-23 = "Waaaaaah! *sob*"
1003503-24 = "[s] \"Ui, what's wrong?!\""
1003503-26 = "Ui cried out in embarrassment. I comforted her and listened to what happened."
1003503-28 = "So..."
1003503-29 = "*sniffle* It's not what you're thinking it is."
1003503-30 = "I just realized that...one of my precious children went missing.#nB-By which I mean one of my books."
1003503-31 = "I know it's around here somewhere, so I was hoping you could help me look for it..."
1003503-32 = "I figured you must have misunderstood that message based on your reaction."
1003503-33 = "You thought a living person had gone missing..."
1003503-34 = "I was going to clarify, but you got here so quickly and were in a panic."
1003503-35 = "I'm sorry—so sorry. I shouldn't be making excuses like this.#nI made you worry over nothing."
1003503-36 = "*sniffle* *sob*"
1003503-37 = "[s5] \"It's okay. Now I understand.\"\n[s6] \"It's all right. I'm just relieved.\""
1003503-38 = "Sensei..."
1003503-39 = "Sensei..."
1003503-40 = "Y-You're surprised, aren't you?"
1003503-41 = "It's not like me to lose something as precious to me as a book.#nWell, the thing about that is..."
1003503-42 = "...I didn't lose it, technically. It went missing after the other committee members cleaned the place."
1003503-43 = "[s7] \"Oh, so that's why it's this place is so much cleaner.\"\n[s8] \"(Makes sense. It'd be a lot to do on her own...)\""
1003503-44 = "I fell asleep while they were cleaning..."
1003503-45 = "I fell asleep while they were cleaning..."
1003503-46 = "I asked if they knew where it was after they were done, but no one seemed to know which book I was talking about."
1003503-47 = "In a library this large, losing a book is like losing a needle in a haystack."
1003503-48 = "[s9] \"Yeah, it must be really hard to find.\"\n[s10] \"I wouldn't expect you to find it alone.\""
1003503-49 = "I couldn't bring myself to ask for their help, though."
1003503-50 = "I couldn't bring myself to ask for their help, though."
1003503-51 = "So I contacted you instead. That's the full story."
1003503-52 = "Again, I'm sorry, Sensei."
1003503-53 = "What? Are you sure you don't mind?"
1003503-54 = "And you'll help me look for it...? Are you sure?"
1003503-55 = "*sigh* I'm inconveniencing you so much over something so trivial..."
1003503-56 = "Actually, it also feels like I was dishonest—that I tricked you into this."
1003503-57 = "Huh?"
1003503-58 = "You don't think so? Why...?"
1003503-59 = "[s11] \"Because the book really is precious to you.\"\n[s12] \"Because either way, you need my help.\""
1003503-60 = "Sensei..."
1003503-61 = "Sensei..."
1003503-64 = "And here I am, still wasting your time by sulking."
1003503-65 = "All right. I'll accept your help."
1003503-66 = "Thank you for being so understanding, Sensei."
1003503-67 = "Hmm? What does my lost child look like? I guess I never did say."
1003503-68 = "Wait."
1003503-69 = "Now you're starting to sound like me, saying something like that."
1003503-70 = "..."
1003503-71 = "Anyway, I really appreciate the help. Let's not waste any more of your time."
1003503-72 = "My child's cover looks like..."
1003503-73 = "Ui told me what the book's title was and described what the cover looks like.#nWe then began the search for her \"child\"."
1003503-75 = "The old library is home to even more books than I realized. Night had already fallen by the time we finally found Ui's book."

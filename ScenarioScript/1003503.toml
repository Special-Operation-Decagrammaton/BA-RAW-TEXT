1003503-28 = "3;우이;12;그러니까…….\n#3;a\n#3;em;…"
1003503-29 = "3;우이;12;훌쩍, 그게 선생님이 생각하신 그런 게 아니고……."
1003503-30 = "3;우이;17;그냥 그……. 자주 보던 아이……. 아니, 책이……. 한 권 안 보여서……."
1003503-31 = "3;우이;18;그래도 어차피 이 안 어딘가에 있을 테니, 같이 좀 찾아 주실 수 있냐는 말이었는데……."
1003503-32 = "3;우이;11;보내고 나서 선생님의 반응을 본 뒤에야 아 이게 오해가 생겼구나…….\n#3;em;[땀]"
1003503-33 = "3;우이;11;책 이야기를 한 건데 사람으로 착각하셨구나……하고 눈치채서……."
1003503-34 = "3;우이;12;그래서 말씀드리려고 했는데, 너무 심각한 표정으로 다급하게 오셔서…….\n#3;stiff"
1003503-35 = "3;우이;12;죄송합니다……. 죄송합니다, 제가 말을 이상하게 해서……. 괜히 선생님 걱정 끼쳐드리고…….\n#3;em;[속상함]"
1003503-36 = "3;우이;10;흐윽……. 흑흑흑…… 흑……."
1003503-37 = "[s5] \"괜찮아. 이젠 다 이해했어.\"\n[s6] \"아냐. 오히려 다행인 거지.\""
1003503-38 = "3;우이;18;선생님…….\n#3;em;…"
1003503-39 = "3;우이;18;선생님…….\n#3;em;…"
1003503-40 = "3;우이;17;……네……? 그나저나 의외……라고요?"
1003503-41 = "3;우이;13;저는 책을 잃어버릴 거 같지 않았다고요? 아…… 그건……."
1003503-42 = "3;우이;17;사실 제가 잃어버린 게 아니라……. 다른 부원들이 와서 저 대신 청소를 해주다가…….\n#3;em;[///]\n#3;stiff"
1003503-43 = "[s7] \"……청소를 대신해주는구나.\"\n[s8] (뭐, 본인에겐 무리일 것 같으니…….)"
1003503-44 = "3;우이;06;저는 그동안 구석에 앉아 있다가 잠들어 버렸거든요. 그래서……."
1003503-45 = "3;우이;06;저는 그동안 구석에 앉아 있다가 잠들어 버렸거든요. 그래서……."
1003503-46 = "3;우이;12;뒤늦게 물어봤는데 다들 제가 말하는 책이 무슨 책인지 잘 모르는 눈치라…….\n#3;em;[땀]"
1003503-47 = "3;우이;17;책장이라고 말해도…… 보시다시피 여기는……."
1003503-48 = "[s9] \"확실히 찾기 힘들겠네.\"\n[s10] \"응. 이건 혼자서는 무리지.\""
1003503-49 = "3;우이;15;그치만 이제 와서 찾는 것도 다시 같이 해달라고 부탁하기에는……. 눈치가 보여서…….\n#3;stiff"
1003503-50 = "3;우이;15;그치만 이제 와서 찾는 것도 다시 같이 해달라고 부탁하기에는……. 눈치가 보여서…….\n#3;stiff"
1003503-51 = "3;우이;07;그래서 선생님께 연락했던 거예요. 사정은……. 일단 그렇게 됐습니다……."
1003503-52 = "3;우이;06;다시 한번 죄송합니다, 선생님…….\n#3;em;[속상함]"
1003503-53 = "3;우이;02;……네? 괜찮으시다고요?"
1003503-54 = "3;우이;04;같이 찾자고요……? 저, 정말 괜찮으신 건가요? 그걸로?"
1003503-55 = "3;우이;10;저……. 그런 오해로 괜히 선생님 고생시켜드렸는데……\n#3;em;…"
1003503-56 = "3;우이;11;어떻게 보면 결과적으로 거짓말을 한 거라고요……. 그런데도…….\n#3;stiff"

1003503-9 = "[ns1] \"……우이!\"\n[ns2] \"무슨 일이야, 자세히 설명을!\""
1003503-10 = "3;우이;20;서, 선생님!\n#3;em;[!]\n#3;a"
1003503-11 = "3;우이;20;서, 선생님!\n#3;em;[!]\n#3;a"
1003503-12 = "3;우이;10;우, 우선 진정하세요! 선생님……! 땀 범벅이시잖아요!"
1003503-13 = "3;우이;18;세, 세상에! 거기서 여기까지 곧장 뛰어오신 거예요!? 거리가 얼만데……!\n#3;stiff"
1003503-14 = "[s3] \"내 쪽은 아무래도 좋으니 상황을!\"\n[s4] \"우이야말로 괜찮은 거야? 안색이 창백하다고!\""
1003503-15 = "3;우이;17;어……. 그러니까 그게요……. 으음……. 그게 어떻게 된 거냐면…….\n#3;em;[속상함]"
1003503-16 = "3;우이;17;어……. 그러니까 그게요……. 으음……. 그게 어떻게 된 거냐면…….\n#3;em;[속상함]"

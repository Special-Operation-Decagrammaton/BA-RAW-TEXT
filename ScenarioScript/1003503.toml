1003503-64 = "3;우이;05;……아무래도 이 이상 징징거리고 있는 건 오히려 더 민폐일 것 같네요."
1003503-65 = "3;우이;01;네……. 그럼 얌전히……. 감사한 마음으로 도움받겠습니다……."
1003503-66 = "3;우이;03;정말 감사합니다. 선생님……. 이런 상황에서까지 그렇게 말해 주시고…….\n#3;greeting"

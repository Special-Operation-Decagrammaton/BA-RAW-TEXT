10010130-120 = "It's heavier than you thought? Wh-What are you talking about?#nWhat's heavy?"
10010130-121 = "[s3] \"This. Mind taking it off my hands?\"\n[s4] \"Here. Mind holding on to this for me?\""
10010130-122 = "Um, sure."
10010130-123 = "Um, sure."

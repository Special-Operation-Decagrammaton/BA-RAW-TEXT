[translation]
10010130-1 = "ตอนที่ 13;หว่านพืชเช่นไร ย่อมได้ผลเช่นนั้น 3"
10010130-15 = "ทางเรากำลังปราบกลุ่มศัตรูนักเลง! พวกนี้ไม่ได้เก่งกาจมาก เรียกได้ว่าไม่ค่อยได้เรื่องเลยค่ะ!"
10010130-16 = "ถ้าไม่เก่งกาจมาก แล้วทำไมถึงใช้เวลานานขนาดนี้ล่ะ!? หรือว่ามีกันหลายคน!?"
10010130-17 = "เหมือนจะใช่ แต่ก็เหมือนจะไม่ใช่..."
10010130-22 = "อ๊ะ ตกใจหมดเลย! พวกนั้นกลับมาสู้ใหม่ได้เหมือนว่าได้รับการรักษาระหว่างต่อสู้อย่างนั้นแหละ..."
10010130-23 = "จะการ์ดตกไม่ได้เด็ดขาดค่ะ! ตามศัตรูไป แต่ก็ห้ามออกห่างจากวัตถุโบราณมากเกินนะคะ!"
10010130-24 = "ห้ามลืมนะคะว่าเป้าหมายของเราคือความปลอดภัยของวัตถุโบราณและคนในวิหารโบราณ!"
10010130-26 = "ค่ะ!!"
10010130-36 = "นี่มัน... เกิดเรื่องอะไรขึ้น...!?"
10010130-37 = "ทำไมพวกคุณนักเลง... ถึงมาโจมตีที่นี่แบบนี้ล่ะ...!?  ทำไมกัน...?"
10010130-41 = "เอ๊ะ... เสียงนี้มัน...? รถยนต์เหรอ...? หรือว่ารถบรรทุก...?"
10010130-46 = "ทุกคน! ข้างนอกเกิดเรื่องวุ่นวายนิดหน่อย แต่ก็อยู่ในความสงบกันก่อนนะครับ! ไม่ใช่เรื่องใหญ่อะไรหรอก!"
10010130-50 = "คุณคือ...?"
10010130-51 = "ระหว่างรอก็ลองทานนี่ดูสิครับ คิดเสียว่าเป็นรถบรรทุกปันสุขแล้วกัน!"
10010130-52 = "เค้กมิราเคิล 5000! วันนี้ไม่ได้มาขายแบบจำกัดจำนวน! แต่มาแจกเลยครับผม!"
10010130-53 = "ผมทำมาเยอะขนาดที่กินกันครบทุกคนแล้วยังเหลืออีกเป็นสิบกล่องเลย!!"
10010130-55 = "มารับกันไปเลยค่า~ เผลอๆ พรุ่งนี้ไม่มีแจกฟรีแล้วนะคะ~!"
10010130-56 = "เค้กนี่อร่อยมากเลยนะคะ~ ลองมาชิมกันดูสิคะ~"
10010130-58 = "ชะ... ชมรมของหวานหลังเลิกเรียนก็มาด้วยเหรอ...!?"
10010130-59 = "วิธีนี้จะได้ผลเหรอ...? คนที่มาร่วมงานนี้... เป็นคนตำแหน่งสูงๆ ทั้งนั้นไม่ใช่เหรอน่ะ?\n"
10010130-60 = "ถึงจะเป็นเค้กมิราเคิล 5000 ลิมิเต็ดเอดิชั่น แต่คนพวกนี้ก็ไม่น่าจะเป็นทาสของหวานเหมือนกับ#nพวกเรา..."
10010130-65 = "ฉัน! ขอให้ฉันด้วย! ขอฉันก่อน!"
10010130-66 = "ฮึ่ย หลบไปนะ! ขอให้ฉันก่อน!! เรื่องกินฟรีขอให้บอก ไม่มีหรอกคำว่าจ่าย!"
10010130-67 = "คิดจะแซงคิวงั้นเหรอ!? ทำไมไม่รักษาหน้าเลย...!"
10010130-68 = "ตอนนี้เรื่องนั้นสำคัญที่ไหนล่ะ!? นี่มันเค้กมิราเคิล 5000 เลยนะ!! ต้องลองชิมดูสักหน่อยสิ งานพระคัมภีร์ก็หยุดชะงักไปแบบนี้แล้ว!!"
10010130-72 = "ได้ผลด้วยแฮะ...?"
10010130-73 = "หยุดคิดทำอะไรไม่เข้าท่า แล้วมาช่วยฉันเร็วเข้า"
10010130-75 = "......"
10010130-76 = "สุดท้ายมนุษย์ก็เหมือนกันทั้งนั้น แต่การเลือกของพวกนั้นที่นี่ไม่เป็นเรื่องผิดหรอก\n"
10010130-77 = "เพราะเราอยู่เพื่อกินของอร่อยยังไงล่ะ นี่แหละคือชีวิต"
10010130-78 = "รู้แล้วละน่า พูดจบแล้วก็มาช่วยกันสักทีเถอะ อย่าเนียนเดินออกไปล่ะ"
10010130-79 = "บอกให้มาช่วยไง! ทั้งคู่เลย!!"
10010130-80 = "อื้ม..."
10010130-82 = "อะ... อะไรกันน่ะ? สถานการณ์นี้มัน...!? เกิดอะไรขึ้น...!"
10010130-83 = "ฉะ... ฉันเองก็... ขอมิราเคิล 5000 ด้วยคนสิ...! ฉันยังไม่เคยกินเลย...!"
10010130-84 = "ตะ... แต่เราเป็นฝ่ายพิธีการ ต้องอยู่เฝ้าพระคัมภีร์..."
10010130-88 = "(......)"
10010130-89 = "[s1] \"ไม่เป็นไรหรอก ไปเถอะ\"\n[s2] \"เดี๋ยวครูช่วยดูให้เอง\""
10010130-90 = "สะ... เสียงนี้มัน...?"
10010130-91 = "สะ... เสียงนี้มัน...?"
10010130-92 = "......!"
10010130-93 = "คะ... คุณครู?"
10010130-96 = "ศัตรูล่าถอยแล้วค่ะ! ตอนนี้ไม่มีการโจมตีแล้ว และฝ่ายเราได้รับความเสียหายเพียงเล็กน้อยค่ะ"
10010130-97 = "มีศัตรูที่กำลังล่าถอยให้เห็นอยู่ด้วย... ตามไปดีไหมคะ?"
10010130-98 = "ไม่ค่ะ ไม่เป็นไร อย่างที่ฉันบอกไปแล้ว เป้าหมายของเราคือสถานที่จัดงานและการรักษาความปลอดภัย ให้คนที่มาเข้าร่วมค่ะ"
10010130-99 = "ในระหว่างนี้ยังไม่มีการขอความช่วยเหลือจากภายในสถานที่จัดงานมาเลยด้วย..."
10010130-100 = "เอาเป็นว่าเราป้องกันเหตุจากข้างนอกได้สำเร็จ ตอนนี้ต้องกลับไปประจำตำแหน่งเดิมก่อน แล้วค่อยสืบหารายละเอียดเรื่องนี้ทีหลังค่ะ"
10010130-101 = "ทุกคน! กลับไปประจำตำแหน่งเดิม!"
10010130-102 = "กลับไปประจำตำแหน่งเดิม!!"
10010130-107 = "หายไปแล้ว..."
10010130-108 = "เงียบเหมือนไม่เคยมีอะไรเกิดขึ้นมาก่อนเลย... นี่มันเกิดอะไรขึ้นกันแน่...?"
10010130-112 = "...?"
10010130-113 = "เอ๋?"
10010130-114 = "คุณครู...?"
10010130-118 = "คะ... คุณครู!? ทำไมคุณครูถึงมาอยู่ที่นี่ได้ล่ะ...!? ไม่ได้อยู่ที่ห้องสมุดเก่าหรอกเหรอคะ...!? "
10010130-119 = "คะ...?"
10010130-120 = "หนักกว่าที่คิดงั้นเหรอ? มะ... หมายถึงอะไรคะ... อะไรหนักเหรอคะ?"
10010130-121 = "[s3] \"อันนี้น่ะ... ช่วยรับไปหน่อยสิ\"\n[s4] ยื่นของที่ถือไว้ให้ฮินาตะ"
10010130-122 = "อ๊ะ... ค่ะ ได้เลยค่ะ"
10010130-123 = "อ๊ะ... ค่ะ ได้เลยค่ะ"
10010130-124 = "ถ้าเรื่องยกของฉันช่วยได้อยู่แล้ว... แต่ว่า นี่มัน..."
10010130-125 = "เอ๋? นี่มัน...?"
10010130-126 = "คัมภีร์กระบวน 108 ท่าลับพิชิตรัก... นี่คะ...?"
10010130-127 = "อ่า..."
10010130-128 = "ว่าแต่... ทำไมถึงมาอยู่กับคุณครูได้..."
10010130-129 = "...????"
10010130-134 = "ทุกคนเงียบค่ะ! กรุณาอยู่ในความสงบ! ถึงก่อนหน้านี้จะมีเรื่องวุ่นวายเกิดขึ้น แต่เราจะเริ่มงานอีกครั้งค่ะ"
10010130-135 = "นี่คืองานสำคัญมากเลยนะคะ ทุกคนเช็ดเค้กที่ติดอยู่ตรงมุมปากด้วยค่ะ!"
10010130-139 = "เอาละ... มากันครบแล้วใช่ไหมคะ?"
10010130-141 = "เอ๋...?"
10010130-142 = "[s] \"หืม?\""
10010130-143 = "อ่า..."
10010130-144 = "[s] \"อืม... ใช่แล้ว\""
10010130-148 = "......!!!!"
10010130-150 = "ถ้างั้น... ฉันจะเปิดเผยสิ่งนี้ต่อหน้าทุกคนค่ะ! และนี่ก็คือ..."
10010130-158 = "บันทึกหมายเหตุฉบับที่ 4 จากพระคัมภีร์โบราณที่ตีความ#nผ่านสภาค่ะ!"

10010130-98 = "No, that won't be necessary. As I said, our mission is to protect the event site and the attendees."
10010130-99 = "We also haven't received any communication from that side."
10010130-100 = "In which case, I think it's safe to say mission accomplished. Let's return to our posts and investigate the details later."
10010130-101 = "Everyone, back to your positions!"
10010130-102 = "Understood!"

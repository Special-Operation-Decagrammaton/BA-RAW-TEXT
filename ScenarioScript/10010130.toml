[translation]
10010130-1 = "Episode 13;Reap What You Sow Part 3"
10010130-15 = "Clear out these troublemakers! Their forces aren't fighting back.#nThey shouldn't pose a threat!"
10010130-16 = "Then what's taking so long?! Do they outnumber us?"
10010130-17 = "I-It doesn't seem like it, but we can't say for sure..."
10010130-22 = "They just keep coming back. They must have a medical unit supporting them."
10010130-23 = "Don't let your guards down! We can't afford to stray too far from our posts!"
10010130-24 = "Remember: our top objective is to guard the cathedral and guests inside!"
10010130-26 = "Yes, ma'am!"
10010130-36 = "What in the world is going on outside?!"
10010130-37 = "Why would those hoodlums suddenly attack this place?"
10010130-41 = "Wait. That sounds like a car... No, wait. A truck?"
10010130-46 = "Excuse me, everyone! There's some sort of commotion going on outside,#nbut remain calm! The situation is under control!"
10010130-50 = "I-Is that who I think it is?!"
10010130-51 = "While you're waiting, try this. I've baked something special I want to share with everyone!"
10010130-52 = "This cake is called the Miracle 5,000! It's normally a limited-time item,#nbut not today! I'm giving it away for free!"
10010130-53 = "And I've made enough for everyone!"
10010130-55 = "Come and get it, everyone! Before it becomes a limited edition again tomorrow!"
10010130-56 = "Trust us—it's good. You're not gonna want to miss this!"
10010130-58 = "Th-The After-School Sweets Club too?!"
10010130-59 = "Is this plan really going to work? I thought the attendees were more of a high-brow crowd."
10010130-60 = "I know the Miracle 5,000 is a high-profile dessert, but I wouldn't expect them to go crazy for it like we—"
10010130-65 = "Give me the cake! I was in line first!"
10010130-66 = "Out of my way! I've been trying to get my hands on this cake all week!#nI don't care if it's free—I'd STILL be willing to pay for it!"
10010130-67 = "Hey, you're cutting in line! Don't you have any shame?!"
10010130-68 = "Shame? Who cares about shame at a time like this?! We're in the presence of the Miracle 5,000! Nothing will stop me from finally getting a taste!"
10010130-72 = "The plan is working?"
10010130-73 = "All right! Don't just stand there—we have to help out!"
10010130-75 = "..."
10010130-76 = "People are all same in the end, but that doesn't mean their reasoning is wrong.#nCake is a universal language."
10010130-77 = "To live is to eat. To eat is to live. That is what makes life worth savoring."
10010130-78 = "That's great and all, but you could be helping us, you know.#nStop trying to pontificate your way out of it."
10010130-79 = "Look who's talking! Both of you get over here and give us a hand!"
10010130-80 = "Coming..."
10010130-82 = "J-Just what is going on here? This wasn't part of tonight's schedule."
10010130-83 = "Though I'd be remiss to not take this opportunity to finally try the Miracle 5,000. I've been dying to try it as well!"
10010130-84 = "If only it weren't my duty to guard the scripture. I'm still the host..."
10010130-88 = "..."
10010130-89 = "[s1] \"It's fine. You go ahead.\"\n[s2] \"I'll cover for you and keep it safe.\""

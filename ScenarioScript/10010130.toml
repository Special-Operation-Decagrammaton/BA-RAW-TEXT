[translation]
10010130-1 = "第13話;It Serves You Right（３）"
10010130-15 = "「七跌八撞團」的戰力不怎麼樣……不，是相當弱！"
10010130-16 = "既然如此為什麼會花這麼多時間！"
10010130-17 = "不，不清楚，敵人也不是很多……"
10010130-22 = "雖然看得不是很清楚，不過很可能是在後方接受治療……#n但這個回歸速度，一般來說有可能會有這麼多醫療兵嗎……！？"
10010130-23 = "各位，請不要被目標所迷惑！不可以離這裡太遠！"
10010130-24 = "我們的目的是負責這一帶的警備！不要被敵人引走了！"
10010130-26 = "是！！"
10010130-36 = "這究竟是怎麼回事……？"
10010130-37 = "為什麼那些人會攻擊這裡呢……！？？"
10010130-41 = "……？這個聲音是車子的……不對，是卡車……？"
10010130-46 = "來來來！那邊的各位！雖然有點嘈雜不過請注意我這邊！"
10010130-50 = "你，你是……！"
10010130-51 = "在這種時候，為了冷靜下來就是要來點蛋糕對吧！"
10010130-52 = "這可不是普通的蛋糕，而是那款限定商品「Miracle5000」哦！#n而且今天竟然是免費發送！"
10010130-53 = "今天的量就算給這邊的所有人吃都綽綽有餘。要不要來一點呀！？"
10010130-55 = "請，請不用客氣～！說不定明天就會變回限定商品了哦～！"
10010130-56 = "而且當然是非常好吃的唷～！"
10010130-58 = "連，連放學後的甜點部的各位都……！？"
10010130-59 = "……這招真的行的通嗎？#n在這裡的不都是那些偉大的人嗎？"
10010130-60 = "就算是限定的「Miracle5000」，也不至於會像我們一樣──"
10010130-65 = "我，我要吃！我一直都很想吃吃看！"
10010130-66 = "哎咿，閃一邊去！是我先來的！#n這可是平時有錢也很難買到的那個「Miracle5000」……！"
10010130-67 = "我說你，可以不要插隊嗎？遵守禮節好不好啊！"
10010130-68 = "「Miracle5000」跟禮節誰比較重要啊！？"
10010130-72 = "還真想吃啊。"
10010130-73 = "好啦，趕快來幫忙吧。"
10010130-75 = "……"
10010130-76 = "到頭來所有人都是一樣的……不過這絕非什麼壞事。"
10010130-77 = "品嘗美味的食物，要說這就是人生也不為過。而且最重要的是，不要留下遺憾！"
10010130-78 = "我說夏，別若無其事地打算逃走。"
10010130-79 = "啊啊真是的，別說那些了快點過來！客人都已經來了！！"
10010130-80 = "好……"
10010130-82 = "這，這個狀況是怎麼回事……！"
10010130-83 = "「Miracle5000」……明明連我都還沒吃過……！"
10010130-84 = "但，但是我有我的職責……"
10010130-88 = "（……）"
10010130-89 = "[s1]「難得有這種機會，就去吃吃看吧？」\n[s2]「發生什麼事的話，我會想辦法處理的。」"
10010130-90 = "這，這個聲音是……？"
10010130-91 = "這，這個聲音是……？"
10010130-92 = "……！"
10010130-93 = "老，老師？"
10010130-96 = "報告！已確認「七跌八撞團」全體人員撤退！我方只受到輕微損傷！"
10010130-97 = "現在應該能進行追擊……該怎麼做呢？"
10010130-98 = "不，沒有那個必要。#n就如剛才所說，我們今天的任務是「會場的警備」。"
10010130-99 = "既然會場那邊也沒有特別聯絡……"
10010130-100 = "防守成功，詳細的調查之後再進行吧。"
10010130-101 = "那麼所有人，回到原來的崗位。"
10010130-102 = "是！！"
10010130-107 = "消，消失了……"
10010130-108 = "剛才為止的槍戰就像騙人的一樣……那究竟是……？"
10010130-112 = "……？"
10010130-113 = "……咦？"
10010130-114 = "老，老師……？"
10010130-118 = "老，老師怎麼會在這裡……！？#n您不是在古書館嗎……？"
10010130-119 = "……嗯？"
10010130-120 = "比想像中還重……？"
10010130-121 = "[s3]「……這個，可以幫我拿著嗎？」\n[s4] 把手上拿的東西交給日向"
10010130-122 = "……啊，好的。"
10010130-123 = "……啊，好的。"
10010130-124 = "當然沒問題……"
10010130-125 = "咦，這個是……"
10010130-126 = "《慾經》……？"
10010130-127 = "為什麼會在老師手上……？"
10010130-128 = "應該要在經典的箱子裡才對呀……？"
10010130-129 = "……？？？？"
10010130-134 = "請大家安靜！雖然發生了一些奇怪的狀況，不過典禮將再次開始。"
10010130-135 = "現在是重要的場合，請大家把嘴邊的蛋糕擦乾淨！"
10010130-139 = "呼……那麼重新開始典禮。"
10010130-141 = "那個，也就是說……"
10010130-142 = "[s]「嗯。」"
10010130-143 = "老，老師……"
10010130-144 = "[s]「……幸好趕上了。」"
10010130-148 = "……！！！！"
10010130-150 = "我向各位公布，這就是──"
10010130-158 = "經由公議會解釋的古代經典……其第四版的註釋本！"

[translation]
10001005-1 = "Prologue;The Great Student Council President"
10001005-2 = "Red Winter Academy Main Gate"
10001005-6 = "Hello, Sensei. Red Winter Academy welcomes you."
10001005-7 = "President Cherino is waiting inside."
10001005-8 = "This way..."
10001005-11 = "Red Winter Academy Presidential Office"
10001005-15 = "[ns] \"Is that...?\""
10001005-19 = "Are you referring to this portrait?"
10001005-20 = "This is Cherino, our esteemed president, Beautifier of Lands, Great Leader, Athletics Club Captain, Chief of Sanitation, Head of All Prefects, and Maven of Meal Service."
10001005-21 = "[s1] \"That's quite the resume.\"\n[s2] \"Nice mustache.\""
10001005-22 = "Great Leader. May I present to you...Sensei."
10001005-26 = "You have impeccable taste. Authority over all of Red Winter resides in that mustache."
10001005-27 = "I'm glad it is to your liking."
10001005-28 = "Great Leader. May I present to you...Sensei."
10001005-35 = "...Well done, Tomoe. As a true and loyal compatriot, you shall be bestowed with a medal of recognition."
10001005-36 = "You're too kind, O Great Leader."
10001005-38 = "Now, then... Welcome to the great Red Winter Academy, Comrade."
10001005-40 = "You stand before the illustrious Cherino!"
10001005-41 = "The esteemed president of Red Winter Academy, Beautifier of Lands, Great Leader, Chief of Sanitation..."
10001005-42 = "Uh..."
10001005-43 = "How did the rest go again...?"
10001005-44 = "Athletics Club Captain, Chief of Sanitation, Head of All Prefects, and Maven of Meal Service."
10001005-45 = "...What she said! Whatever! Just know I'm very important and I'm also in charge here! Consider yourself honored, Comrade!"
10001005-46 = "[s] \"You don't look like your portrait at all.\""
10001005-47 = "Huh? Don't get hung up on such trivial details! That portrait's supposed to be a projection of me a year from now. So there! "
10001005-48 = "Do you draw issue with my portrait, Comrade?"
10001005-49 = "I'd expect better taste from a grown-up..."
10001005-50 = "Wh-Wha...?!"
10001005-54 = "Great Leader?!"
10001005-55 = "Owww, owie..."
10001005-56 = "For the love of 'staches, Tomoe! How many times do I have to ask you to straighten out the carpet?! You wanna get crushed beneath my boot?!"
10001005-57 = "Ch-Cherino! Your m-m-mustache...!"
10001005-58 = "...Huh?"
10001005-59 = "Huh? Ack?! My mustache!"
10001005-68 = "Y-You saw nothing. C-Correct, Comrade Tomoe?"
10001005-69 = "Of course not, Great Leader."
10001005-70 = "[s] \"By the way, why did you call for me all of a sudden?\""
10001005-71 = "Heh. It's simple, really..."
10001005-72 = "To prepare for the Ivan Kupala!"
10001005-73 = "[s] \"What's that?\""
10001005-74 = "Comrade, you may know already, but the longest day of the year, the summer solstice, is fast approaching."
10001005-75 = "Red Winter Academy holds the Ivan Kupala Festival every year to commemorate this joyous time when the snow melts and the greenery is lush!"
10001005-76 = "The Ivan Kupala Festival is a unique tradition of Red Winter Academy, so the secretariat is mobilizing all of our students to prepare the best Ivan Kupala ever!"
10001005-77 = "Isn't that right, Chief Secretary Tomoe?"
10001005-78 = "Indeed. As per your orders, double shifts are in effect and exemplary workers are being publicly recognized. Due to your reforms, last week saw a two hundred and fifty percent increase in productivity."
10001005-79 = "...That's good, right?"
10001005-80 = "Excellent! This year's Ivan Kupala will be absolutely perfect!"
10001005-81 = "[s3] \"But the summer solstice is still a month away, isn't it?\"\n[s4] \"Is there something you need me to help with?\""
10001005-82 = "Do you think me a fool?! I'm well aware of that!"
10001005-83 = "Ha! Under my perfect leadership, our academy wants for nothing!"
10001005-84 = "The reason I sent for you specifically is...your position at Schale."
10001005-85 = "You must frequently interact with students from other academies due to your Schale work."
10001005-86 = "In order to spread the splendor of our great academy, we must first buy you off..."
10001005-87 = "Or is it \"sell you off\"...?"
10001005-88 = "Cherino! It's \"win you over\"!"
10001005-89 = "O-Of course! Because winning over a Schale member should be a priority!"
10001005-94 = "Now follow me, Comrade! We will behold the full glory of Red Winter Academy's preparations for the Ivan Kupala and spread word of its splendor throughout Kivotos!"

10001005-26 = "1;토모에;03;정확하게 보셨습니다. 붉은겨울의 모든 권위는 저 수염에서 나옵니다.\n#1;em;[반짝]\n#1;greeting"
10001005-27 = "1;토모에;01;마음에 드셨다니 다행입니다."
10001005-28 = "1;토모에;00;서기장님. 선생님을 모셔 왔습니다.\n#1;em;[반응]"

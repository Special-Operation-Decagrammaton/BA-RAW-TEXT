10001005-54 = "1;토모에;04;서, 서기장님?!\n#1;ar\n#1;hophop\n#1;em;[?!]"
10001005-55 = "#na;체리노;아, 아파……."
10001005-56 = "3;체리노;s2_05;토모에!! 여기 넘어지기 쉬우니까 카펫을 잘 펴두라고 했잖아! 숙청해버린다?!\n#3;em;[빠직]\n#3;hophop\n#3;a"
10001005-57 = "1;토모에;04;체, 체리노 쨩! 수, 수염! 수염……!\n#1;em;[땀]\n#1;stiff"

10001005-94 = "3;체리노;03;자, 콤라드! 이반 쿠팔라 축제를 준비하는 붉은겨울 학원의 모습을 눈에 똑똑히 담아, 그 위용을 키보토스 전역에 널리 알리는 거다!\n#3;closeup\n#3;em;[반짝]"

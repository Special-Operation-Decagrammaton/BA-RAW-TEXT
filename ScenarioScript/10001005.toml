10001005-40 = "3;체리노;01;이 몸이 바로 체리노!\n#3;a"
10001005-41 = "3;체리노;99;붉은겨울의 학생회장이자, 미화부장이자, 서기장이자 청소부장이자……"
10001005-42 = "3;체리노;02;어…….\n#3;em;…"
10001005-43 = "3;체리노;04;또 뭐였지…….\n#3;em;[땀]\n#3;stiff"
10001005-44 = "1;토모에;00;체육부장, 청소부장, 선도부장, 급식부장…….\n#1;ar\n#fontsize;50"
10001005-45 = "3;체리노;01;……그래! 하여튼 굉장한 건 다 도맡고 있는 매우 중요하신 몸이시다! 영광으로 생각하도록, 콤라드!\n#3;em;[반응]\n#3;hophop\n#1;dl"
10001005-46 = "[s] \"초상화랑 다르잖아.\""
10001005-47 = "3;체리노;05;하아? 하찮은 걸 신경 쓰는군! 그건 이 몸의 1년 뒤의 모습을 그린 것이다. 그러니 문제는 없어! \n#3;em;[빠직]\n#3;stiff"
10001005-48 = "3;체리노;05;내 초상화에 불만이라도 있나, 콤라드?"
10001005-49 = "3;체리노;05;어른이라면 그 정도는 눈치껏…… \n#3;hophop\n#3;em;[!]"
10001005-50 = "3;체리노;04;으햣?! \n#3;em;[?!]\n#3;shake"

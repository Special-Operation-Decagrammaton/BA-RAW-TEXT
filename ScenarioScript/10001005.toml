10001005-19 = "1;토모에;02;이 초상화 말씀이십니까? \n#1;em;[?]\n#1;a"
10001005-20 = "1;토모에;01;이분이 바로 저희 붉은겨울 학원의 학생회장이자, 미화부장이자, 서기장이자, 체육부장이자, 청소부장이자, 선도부장이자, 급식부장이신 체리노 님이십니다.\n#1;m3"
10001005-21 = "[s1] \"할 일이 많겠네.\"\n[s2] \"수염이 멋져.\""
10001005-22 = "1;토모에;00;서기장님. 선생님을 모셔 왔습니다.\n#1;em;[반응]"

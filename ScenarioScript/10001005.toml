[translation]
10001005-1 = "序幕;偉大的學生會長"
10001005-2 = "赤冬聯邦學園．正門"
10001005-6 = "……歡迎您的大駕光臨，老師。我謹代表赤冬聯邦學園衷心歡迎老師的到來。"
10001005-7 = "來吧，潔莉諾會長正在裡面等候您。"
10001005-8 = "這邊請……"
10001005-11 = "赤冬聯邦學園．會長辦公室"
10001005-15 = "[ns]「這是……」"
10001005-19 = "您對那幅肖像畫感到好奇嗎？"
10001005-20 = "這位就是我們赤冬聯邦學園的學生會長、環境美化部長、書記長、體育部長、#n整潔部長、風紀委員長兼供給部長的潔莉諾會長。"
10001005-21 = "[s1]「看起來很忙碌呢。」\n[s2]「鬍子很不賴。」"
10001005-22 = "書記長，我帶老師來了。"
10001005-26 = "是的，那個鬍子在赤冬象徵了權威。"
10001005-27 = "您喜歡的話就太好了。"
10001005-28 = "書記長，我帶老師來了。"
10001005-35 = "……辛苦你了，智惠秘書室長。#n果然是我最忠心的左右手。晚點授予你一枚勳章作為獎勵吧。"
10001005-36 = "這是我的榮幸，書記長。"
10001005-38 = "然後……歡迎來到我的赤冬聯邦學園，同志。 "
10001005-40 = "我就是潔莉諾！"
10001005-41 = "赤冬聯邦學園的學生會長、環境美化部長、書記長、整潔部長……"
10001005-42 = "那個……"
10001005-43 = "還有……還有什麼來著……"
10001005-44 = "（竊竊私語）體育部長、風紀委員長、供餐部長……！"
10001005-45 = "……就是那樣！總之，是個包辦了大小事的偉人！#n能和這樣的我相遇是你的榮幸，同志！"
10001005-46 = "[s]「和肖像畫有點不一樣……？」"
10001005-47 = "哈！那種小細節就別在意了！那只是畫了我未來的樣子，不成問題！ "
10001005-48 = "還是說同志對我的肖像畫有什麼不滿嗎？"
10001005-49 = "既然是大人，這點察言觀色應該還是……"
10001005-50 = "唔咿！？"
10001005-54 = "書，書記長！？"
10001005-55 = "痛痛痛……"
10001005-56 = "智惠！！我不是說過這裡很容易跌倒，一定要把地毯鋪平嗎！是想被肅清嗎！？"
10001005-57 = "潔，潔莉諾醬！鬍子！鬍子！"
10001005-58 = "……嗯？"
10001005-59 = "咦，唔，唔咿啊！咱的鬍子！"
10001005-68 = "……咳。今天也是個好天氣呢，智惠，你也這麼覺得吧？"
10001005-69 = "您說的是，書記長。"
10001005-70 = "[s]「話說今天突然找我來有什麼事呢？」"
10001005-71 = "呵呵呵，聽了可別嚇一跳，那就是……"
10001005-72 = "為了準備「伊凡．庫帕拉」！"
10001005-73 = "[s]「伊凡．庫帕拉？」"
10001005-74 = "我想同志應該知道，差不多快要夏至了。#n也就是說，一年之中白晝最長的日子即將來臨……"
10001005-75 = "雪開始融化，萌生綠芽的這個時期，#n赤冬聯邦學園每年都會舉辦「伊凡．庫帕拉」夏至慶典！"
10001005-76 = "「伊凡．庫帕拉」是赤冬聯邦學園的優良傳統！#n因此，事務局會動員全體學生來籌備，將其打造成最棒的「伊凡．庫帕拉」！"
10001005-77 = "是這樣吧？智惠秘書室長。"
10001005-78 = "是的。根據會長的指示實施兩班制，並對模範勞動者給予獎勵的成果，#n上週的產量相較前週成長了250%。"
10001005-79 = "嗯……那是代表事情進行得很順利吧？"
10001005-80 = "……這樣啊！很好，很好！想必這次的「伊凡．庫帕拉」也會很完美！"
10001005-81 = "[s3]「距離夏至還有一個月吧？」\n[s4]「有什麼我可以幫忙的嗎？」"
10001005-82 = "你把咱當傻瓜嗎！那種事咱當然知道！"
10001005-83 = "哈哈！在我完美的領導下，我們赤冬聯邦學園是無懈可擊的！"
10001005-84 = "之所以會在這個時間點找同志來……是因為你是夏萊的老師。"
10001005-85 = "身為夏萊的老師，你經常和其他學校的學生交流吧？"
10001005-86 = "為了利用這層關係宣揚我們赤冬聯邦學園的英姿，得先收買夏萊的老師……"
10001005-87 = "不，說「收買」好像不太對……？"
10001005-88 = "（竊竊私語）潔莉諾醬，要說「拉攏」。拉攏！"
10001005-89 = "對，沒錯！拉攏夏萊的老師，是提升我赤冬名聲的最好方法！"
10001005-94 = "來吧，同志！請將赤冬聯邦學園籌備夏至慶典的美麗模樣好好烙印在眼底，#n並透過各校的學生傳遍整個奇普托斯吧！"

10001005-35 = "3;체리노;00;……수고했네. 토모에. 역시 내 충직한 오른팔이야. 상으로 특별 전령 훈장을 수여하겠네.\n#3;black"
10001005-36 = "1;토모에;99;영광입니다. 서기장님.\n#1;em;[반짝]\n#1;greeting"
10001005-37 = "1;토모에;01\n#1;dl\n#wait;1000"
10001005-38 = "3;체리노;01;붉은겨울 학원에 온 걸 환영하네, 콤라드. \n#3;black\n#3;em;…\n#3;m3"

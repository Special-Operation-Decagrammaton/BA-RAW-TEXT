10001005-72 = "#1;hide\n3;체리노;01;이반 쿠팔라를 준비하기 위해서다!\n#3;closeup"
10001005-73 = "[s] \"이반 쿠팔라?\""
10001005-74 = "3;체리노;02;콤라드도 알고 있겠지만, 낮의 길이가 가장 긴 때— 하지가 머지않았느니라."
10001005-75 = "3;체리노;03;눈이 녹고 신록이 우거지는 이 경사스러운 때를 기념하기 위하여 붉은겨울 학원에서는 매년 이반 쿠팔라 축제를 열고 있지!\n#3;em;[재잘]\n#3;hophop"
10001005-76 = "3;체리노;02;이반 쿠팔라 축제는 붉은겨울 학원의 고유한 전통인 만큼, 사무국은 이를 성대히 기념할 수 있도록 학생들을 총동원하여 최고의 이반 쿠팔라를 준비하고 있느니라!"
10001005-77 = "3;체리노;01;그렇지 않은가, 토모에 총비서실장?\n#3;em;[반응]"
10001005-78 = "1;토모에;01;네, 회장님의 지시에 따라 2교대 근무를 실시하고 모범 노동자를 추려 포상한 결과, 지난주에는 생산량이 250%나 초과 달성되었습니다.\n#1;em;[반짝]\n#1;ar\n#3;m5"
10001005-79 = "3;체리노;02;어…… 그거, 잘 되고 있다는 뜻이지?"
10001005-80 = "3;체리노;03;좋아, 좋아! 이번 이반 쿠팔라 축제도 완벽하겠군!\n#3;em;[재잘]\n#3;hophop\n#3;m3\n#1;dl"
10001005-81 = "[s3] \"하지만 하지는 한 달 뒤잖아?\"\n[s4] \"내가 무언가 도와주어야 할 일이라도 있는 거야?\""
10001005-82 = "3;체리노;05;이 몸을 바보로 아는 겐가! 나도 그 정도는 알고 있느니라!\n#3;em;[빠직]\n#3;stiff"
10001005-83 = "3;체리노;01;하하! 이 몸의 완벽한 영도 아래 붉은겨울 학원에 부족한 점은 조금도 없느니라!\n#3;em;[반응]"
10001005-84 = "3;체리노;99;다만, 콤라드를 일부러 부른 이유는…… 그대가 샬레의 선생이기 때문이다."
10001005-85 = "3;체리노;01;샬레의 선생이라면 다른 학교의 학생들과도 교류가 활발할 터."
10001005-86 = "3;체리노;02;우리 붉은겨울 학원의 위용을 전파하기 위해서는 샬레의 선생부터 매수……\n#3;em;…"
10001005-87 = "3;체리노;04;아니, 매도……?\n#3;em;[땀]\n#3;stiff"
10001005-88 = "1;토모에;00;체리노 쨩, 포섭이요. 포섭!\n#1;ar\n#fontsize;55"
10001005-89 = "3;체리노;01;그, 그래! 샬레의 선생을 포섭하는 게 우선이라 생각했기 때문이다!\n#3;em;[!]\n#1;dl\n#3;hophop"

[translation]
10001005-1 = "บทเริ่มต้น;ประธานสภานักเรียนผู้ยิ่งใหญ่"
10001005-2 = "ประตูหน้า สหภาพเรดวินเทอร์"
10001005-6 = "สวัสดีค่ะคุณครู ยินดีต้อนรับเข้าสู่สหภาพเรดวินเทอร์ค่ะ"
10001005-7 = "ประธานเชริโน่กำลังรออยู่ข้างในค่ะ"
10001005-8 = "เชิญทางนี้ค่ะ..."
10001005-11 = "สำนักงานประธานสหภาพเรดวินเทอร์"
10001005-15 = "[ns] \"นี่มัน...\""
10001005-19 = "หมายถึงรูปวาดนี้เหรอคะ?"
10001005-20 = "ในรูปคือท่านเชริโน่ ที่เป็นทั้งประธานนักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายกีฬา#nหัวหน้าฝ่ายทำความสะอาด ประธานกรรมการ และหัวหน้าฝ่ายอาหารของสหภาพเรดวินเทอร์ค่ะ"
10001005-21 = "[s1] \"งานคงจะเยอะน่าดู\"\n[s2] \"หนวดเท่จังเลย\""
10001005-22 = "ท่านเลขาธิการ ฉันพาคุณครูมาแล้วค่ะ"
10001005-26 = "สะดุดตามากเลยใช่ไหมคะ? อำนาจทั้งหมดในเรดวินเทอร์มาจากหนวดนั่นแหละค่ะ"
10001005-27 = "ดีใจที่คุณครูชอบนะคะ"
10001005-28 = "ท่านเลขาธิการ ฉันพาคุณครูมาแล้วค่ะ"
10001005-35 = "ดีมาก โทโมเอะ สมกับเป็นมือขวาที่ซื่อสัตย์ของเรา แล้วเราจะมอบเหรียญกษาปณ์พิเศษให้เป็นรางวัล"
10001005-36 = "เป็นเกียรติอย่างมากค่ะท่าน"
10001005-38 = "ยินดีต้อนรับสู่สหภาพเรดวินเทอร์นะสหาย"
10001005-40 = "เราคือเชริโน่!"
10001005-41 = "เป็นประธานสภานักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่ายทำความสะอาด..."
10001005-42 = "อืม..."
10001005-43 = "มีอะไรอีกนะ..."
10001005-44 = "หัวหน้าฝ่ายกีฬา หัวหน้าฝ่ายทำความสะอาด ประธานกรรมการ แล้วก็หัวหน้าฝ่ายอาหาร..."
10001005-45 = "ใช่! เอาเป็นว่า เราคือคนที่ควบคุมเรื่องสำคัญๆ หลายเรื่องของที่นี่!#nถือว่าเป็นเกียรติของเธอที่ได้พบเรานะสหาย!"
10001005-46 = "[s] \"ตัวจริงไม่เห็นเหมือนในรูปเลย\""
10001005-47 = "หืม? ไปสนใจอะไรเรื่องเล็กๆ น้อยๆ แบบนั้นกันล่ะ! ในรูปคือเราอีกหนึ่งปีในอนาคตต่างหาก#nจะไม่เหมือนตอนนี้ก็ไม่เห็นจะแปลก!"
10001005-48 = "มีปัญหาอะไรกับรูปเรางั้นเหรอสหาย?"
10001005-49 = "นึกว่าผู้ใหญ่จะมีรสนิยมซะอีก..."
10001005-50 = "ว้าย!!"
10001005-54 = "ทะ.. ท่านเลขา!"
10001005-55 = "เจ็บจัง..."
10001005-56 = "โทโมเอะ!! เราบอกแล้วไม่ใช่เหรอว่าให้เอาพรมมาปูไว้เพราะพื้นตรงนี้เพราะมันมันลื่นง่ายน่ะ!#nเดี๋ยวโดนจัดการเลย!"
10001005-57 = "ชะ... เชริโน่จัง! หนะ... หนวด! หนวด...!"
10001005-58 = "หืม?"
10001005-59 = "เฮือกกก! หนวดเรา!"
10001005-68 = "เรื่องนี้ไม่เคยเกิดขึ้น ใช่ไหมโทโมเอะ?"
10001005-69 = "ชะ.. ใช่ค่ะท่าน!"
10001005-70 = "[s] \"ว่าแต่ ทำไมจู่ๆ ก็เรียกครูมาเหรอ?\""
10001005-71 = "ฮุฮุ ที่เรียกมาก็เพื่อ..."
10001005-72 = "เพื่อเตรียมอีวาน คูปาลาไงล่ะ!"
10001005-73 = "[s] \"อีวาน คูปาลา?\""
10001005-74 = "ก็วันที่มีช่วงเวลากลางวันยาวนานที่สุดของปียังไงล่ะ สหายเองก็น่าจะรู้ดีว่าใกล้ถึงวันนี้เข้ามาทุกที"
10001005-75 = "และที่สหภาพเรดวินเทอร์จะจัดเทศกาลอีวาน คูปาลา#nเพื่อเฉลิมฉลองช่วงเวลาที่น่ายินดีที่หิมะละลาย และมีพืชเขียวขจีเต็มไปหมด"
10001005-76 = "เทศกาลอีวาน คูปาลาคือประเพณีพิเศษของชาวสหภาพเรดวินเทอร์#nสำนักเลขาธิการก็เลยระดมนักเรียนทั้งหมดเพื่อไปเตรียมเทศกาลที่ยิ่งใหญ่นี้อยู่"
10001005-77 = "ใช่ไหมล่ะ หัวหน้าเลขานุการโทโมเอะ?"
10001005-78 = "ค่ะ เราจัดการทำงานแบบเปลี่ยนกะสองกะ และมอบรางวัลให้คนงานตัวอย่าง#nตามคำสั่งของท่านประธาน ทำให้ปริมาณผลิตมีมากกว่า 250% ค่ะ"
10001005-79 = "ปะ... แปลว่ากำลังไปได้สวยใช่ไหม?"
10001005-80 = "ดีเลย ดีเลย! งานเทศกาลอีวาน คูปาลาในปีนี้ก็ต้องออกมาไร้ที่ติ!"
10001005-81 = "[s3] \"แต่กว่าจะถึงวันนั้น ก็อีกเดือนหนึ่งเลยไม่ใช่เหรอ?\"\n[s4] \"ตอนนี้มีอะไรที่ครูช่วยได้เหรอ?\""
10001005-82 = "คิดว่าเราไม่รู้เหรอ!? เรื่องแค่นั้นเราต้องรู้อยู่แล้วน่า!"
10001005-83 = "ฮ่าฮ่า! ภายใต้การนำที่สมบูรณ์แบบของเรา สหภาพเรดวินเทอร์ไม่มีอะไรที่บกพร่องเลยแม้แต่น้อย!"
10001005-84 = "แต่เหตุผลที่เราเรียกสหายมาที่นี่... ก็เพราะสหายเป็นครูจากชาเล่ต์ไงล่ะ"
10001005-85 = "และถ้าเป็นครูจากชาเล่ต์ก็ต้องรู้จักกับนักเรียนของโรงเรียนอื่นด้วย"
10001005-86 = "เพื่อประกาศเกียรติภูมิของสหภาพเรดวินเทอร์ ครูจากชาเล่ต์ก็ควรจะช่วยรับสินบน..."
10001005-87 = "ไม่สิ ต้องเรียกว่าซื้อตัว...?"
10001005-88 = "เชริโน่จัง! ต้องพูดว่า 'ดึงมาเป็นพวก' สิ!"
10001005-89 = "ชะ.. ใช่! เราคิดว่าควรดึงครูจากชาเล่ต์มาเป็นพวก ก็เลยเรียกมาที่นี่ไง!"
10001005-94 = "เอาล่ะสหาย! เก็บภาพที่สหภาพเรดวินเทอร์ที่ตั้งใจเตรียมเทศกาลอีวาน คูปาลาในครั้งนี้#nแล้วไปประกาศเกียรติภูมิให้รู้ทั่วคิโวทอสไปเลย!"

1006102-60 = "3;사쿠라코;13;다들 저를 어려워한달까. 어째서인지 좀 어색해 한달까. 그런 게 좀 있어요."
1006102-61 = "3;사쿠라코;07;아무래도 다른 자매님들을 관리하는 직책이다 보니, 거리감이 느껴지는 걸까요?\n#3;em;[?]"

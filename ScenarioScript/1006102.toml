[translation]
1006102-1 = "容易被誤會的人"
1006102-5 = "（因為很在意MomoTalk的內容，於是抽空去了一趟大教堂）"
1006102-9 = "（由於在相對空閒的時段所以沒看見其他人，只看見遠處正在祈禱的櫻子）"
1006102-10 = "……"
1006102-11 = "[s1] 在附近等待祈禱結束\n[s2] 在旁邊一起祈禱"
1006102-19 = "……"
1006102-24 = "……？"
1006102-29 = "……！？#n老師，您什麼時候來的……！"
1006102-30 = "[s3]「抱歉打擾到你了。」\n[s4]「我沒有想嚇你的意思……」"
1006102-31 = "……不，不要緊。祈禱正好剛結束。"
1006102-32 = "……不，不要緊。祈禱正好剛結束。"
1006102-33 = "話說回來，老師有什麼事嗎？"
1006102-34 = "這個時段，應該沒有什麼特別的活動──"
1006102-35 = "──咦？"
1006102-36 = "是被我叫來的……？"
1006102-37 = "那個……我不是很清楚……"
1006102-38 = "MomoTalk……？"
1006102-42 = "[ns5]「因為你說在尋找和我說話的機會……」\n[ns6] 出示MomoTalk"
1006102-46 = "啊……原來如此……"
1006102-50 = "這是……"
1006102-51 = "那個，該怎麼說呢……"
1006102-52 = "其實沒有什麼特別的意思……只是單純想跟您打聲招呼。"
1006102-53 = "……是真的。"
1006102-54 = "……唉。"
1006102-55 = "看來我又造成誤會了呢……#n非常抱歉，老師。"
1006102-56 = "[s7]「沒關係，別在意。」\n[s8]「你說『又』……？」"
1006102-59 = "那個……其實我經常被周圍的人誤會……"
1006102-60 = "該說時常會有人覺得我的個性不太好親近嗎……"
1006102-61 = "果然……是因為我處於管理所有修女的立場，#n所以容易讓人覺得有距離嗎。"
1006102-62 = "為了改善這樣的狀況，我也曾向他人請教，卻不是很順利……"
1006102-63 = "啊，當然，大家都是心地善良的人，也很願意理解我的這一面。#n甚至給了我各種建議。"
1006102-64 = "這次傳給老師的MomoTalk也是聽取了其他修女的建議……"
1006102-65 = "聽說「在訊息的前後加上笑聲容易讓人覺得親切」……"
1006102-66 = "[s9]「原來如此……」\n[s10]「所以才會『唔呵呵』啊……」"
1006102-69 = "這讓我……有點擔心。#n如果只是個人的問題倒無所謂，但我是三一大教堂的修女。"
1006102-70 = "身為聽取人們煩惱的修女，#n希望能避免讓對方有所顧慮的情況。"
1006102-71 = "之所以希望能跟老師聊聊，其實也是想跟您商量這方面的事情。"
1006102-76 = "不好意思，耽誤您的時間了呢。#n詳細的內容就留到之後……"
1006102-77 = "非常抱歉讓您擔心了。#n不介意的話，請讓我送您一程吧。"
1006102-81 = "請跟我來。"
1006102-87 = "三一大教堂前的公園"
1006102-88 = "那麼我就送您到這邊……"
1006102-89 = "雖然只是短暫的時間，能和您說到話讓我感到很開心。"
1006102-90 = "……呵呵。"
1006102-91 = "那麼路上請小心──"
1006102-99 = "啊，是櫻子修女！"
1006102-100 = "您好。今天天氣也很好呢。"
1006102-102 = "哎呀，各位修女們。"
1006102-103 = "今天也是好天氣呢，呵呵……"
1006102-104 = "希望今天各位也能度過和平的一天。"
1006102-109 = "我一直都關注著各位的一舉一動唷……"
1006102-115 = "那麼，祝各位有美好的一天。唔呵呵。"
1006102-119 = "噫，噫噫……！是，是……！"
1006102-120 = "也祝您有美好的一天……！#n我，我們先告辭了──！"
1006102-125 = "哎呀，這麼匆忙的話可能會受傷的……"
1006102-129 = "[ns11]「居然在那種時候『笑』……」\n[ns12]「原來如此……這可真是……」"
1006102-132 = "……嗯？#n發生什麼事了嗎？"
1006102-133 = "沒什麼，是嗎？"
1006102-134 = "那真是太好了……"
1006102-135 = "那麼我就先告辭了。"
1006102-140 = "（看著頭紗隨風飄逸的櫻子離去後，回到了夏萊）"

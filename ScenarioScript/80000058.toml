[translation]
80000058-1 = "การตัดสินใจ"
80000058-2 = "(คุณครูออกมาที่สนามเด็กเล่นและบังเอิญเจอไอริที่นั่งอยู่ เธอดูท่าทางกำลังกระวนกระวายใจ)"
80000058-3 = "..."
80000058-9 = "คะ...คุณครูมาแล้วเหรอคะ!?"
80000058-10 = "เพิ่งมาถึงเหรอคะ? อา ค่อยยังชั่วหน่อย ฉันมัวแต่เหม่อจนไม่เห็นคุณครู... แหะๆๆ"
80000058-11 = "คะ? อยากรู้ว่าเรียกมาทำไมเหรอคะ? คือว่า... อะ... เอ๋? คุณครูน่าจะทราบดีอยู่แล้ว..."
80000058-12 = "ระ...หรือว่าคุณครูไม่ทราบนะ? ก็คุณครูยุ่งนี่นา... คิดแล้วเชียวว่าเรื่องแบบนี้อาจมีแค่เด็กๆ อย่างพวกเราที่สนใจ..."
80000058-13 = "ถะ...ถ้าเป็นแบบนั้นละก็... จะกลายเป็นว่าฉันไปรบกวนเวลาของคุณครูรึเปล่าคะ...?!"
80000058-14 = "[s1] \"ล้อเล่นน่า ครูพอเดาได้นะ\"\n[s2] \"เพราะเรื่องวันวาเลนไทน์ใช่มั้ยล่ะ?\""
80000058-15 = "...!"
80000058-16 = "...!"
80000058-17 = "ชะ...ใช่แล้วค่ะ คุณครูทราบอยู่แล้วสินะคะ"
80000058-18 = "ถะ...ถ้างั้น..."
80000058-22 = "ถ้าคุณครูทราบอยู่แล้ว... งั้นฉันก็ขอให้คุณครูเลยแล้วกันค่ะ! นี่ค่ะ!!"
80000058-28 = "[ns3] \"....\"\n[ns4] (เหมือนเดิมเลยสินะ...)"
80000058-29 = "..."
80000058-30 = "..."
80000058-31 = "คะ... คุณครู? คิดว่ายังไงบ้างคะ...? ทำไมจู่ๆ ก็เงียบไป ไม่ยอมพูดอะไรเลยล่ะคะ..."
80000058-32 = "คะ...?"
80000058-33 = "ทำไมถึงต้องให้มินต์ช็อกโกในวันวาเลนไทน์เหรอคะ?"
80000058-34 = "คือว่า... ว่าแล้วเชียว... คุณครูก็คิดเหมือนกันใช่มั้ยคะ? ที่จริงฉันเองก็คิดเรื่องนี้ไว้เหมือนกันค่ะ..."
80000058-35 = "แต่ว่าฉันคิดแล้วคิดอีก สุดท้ายก็คิดว่าต้องทำแบบนี้ค่ะ..."
80000058-36 = "อืม ฉันเองก็อธิบายไม่ถูกเหมือนกันค่ะ แหะๆๆ"
80000058-37 = "ถึงสุดท้ายฉันจะเลือกทำแบบนี้ แต่ก็ยังรู้สึกกังวลว่ามันจะจืดชืดไปรึเปล่าน่ะค่ะ"
80000058-38 = "[s5] \"ครูไม่มีทางคิดแบบนั้นหรอก\"\n[s6] \"ไม่เป็นไร ครูเข้าใจไอรินะ\""
80000058-39 = "...!"
80000058-40 = "...!"
80000058-41 = "ฮิฮิฮิ ขอบคุณค่ะ คุณครู..."
80000058-42 = "อ๊ะ..."
80000058-43 = "ฉันเกือบลืมบอกคุณครูไปเลย นี่ไม่ใช่มินต์ช็อกโกแลตธรรมดาหรอกนะคะ"
80000058-44 = "ช็อกโกแลตแบรนด์นี้จะใช้อัตราส่วนในการผสมช็อกโกแลตกับมินต์ที่ไม่เหมือนใคร ยิ่งกว่านั้นยังใช้เพนนีรอยัลที่ปกติเรากินไม่ได้มาสกัด..."
80000058-45 = "คะ...? มันต่างกันยังไงเหรอคะ?"
80000058-46 = "ต่างกันสิคะ! ต่างกันสุดๆ เลยค่ะ ฉันบอกคุณครูไปแล้วนี่คะ"
80000058-47 = "มันทำมาจากเพนนีรอยัลเลยนะคะ!? เป็นขนมหายากที่มีส่วนผสมของยาที่ปกติเราจะไม่มีทางกินได้#nเด็ดขาด...!"
80000058-48 = "..."
80000058-52 = "เข้าใจหรือเปล่าคะ...?"
80000058-53 = "[s] \"......\""
80000058-55 = "(สุดท้ายคุณครูก็กลับไปที่ชาเล่ต์ทั้งๆ ที่ไม่เข้าใจที่ไอริพูดเลย)"

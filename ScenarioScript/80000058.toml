[translation]
80000058-1 = "經過深思熟慮的結論"
80000058-2 = "（到公園後，看見了在鞦韆上坐立難安的愛莉）"
80000058-3 = "……"
80000058-9 = "老，老師！？你什麼時候來的……！？"
80000058-10 = "剛，剛剛才來的是嗎？這樣啊……不好意思，剛剛在想事情……耶嘿嘿……"
80000058-11 = "今，今天是那個，我想老師應該知道……"
80000058-12 = "啊，不，因為老師很忙，我並不是希望老師能知道的意思……"
80000058-13 = "啊，還是說，這樣會造成老師的麻煩……！？"
80000058-14 = "[s1]「我大概有猜到。」\n[s2]「如果不是我自作多情的話，是因為情人節嗎？」"
80000058-15 = "……！"
80000058-16 = "……！"
80000058-17 = "是，是的……"
80000058-18 = "那個……"
80000058-22 = "就算知道還是很緊張呢……請，請收下！"
80000058-28 = "[ns3]「……」\n[ns4]（果然還是平時的那個口味！）"
80000058-29 = "……"
80000058-30 = "……"
80000058-31 = "老，老師？那個……？"
80000058-32 = "……咦？"
80000058-33 = "薄荷巧克力……？"
80000058-34 = "果，果然這樣不太好嗎！？真抱歉，其實我自己也很猶豫……！"
80000058-35 = "看著菜單煩惱了很久之後，結果還是回到了這個選項……"
80000058-36 = "不好意思，沒辦法說明的很清楚……啊哈哈……"
80000058-37 = "繞了一大圈之後還是回到了原點的感覺……"
80000058-38 = "[s5]「你也為我考慮了很多呢，謝謝你。」\n[s6]「沒關係，我很開心唷。」"
80000058-39 = "……！"
80000058-40 = "……！"
80000058-41 = "謝，謝謝老師。"
80000058-42 = "……啊，那個。"
80000058-43 = "其實這個，並不是普通的薄荷巧克力。"
80000058-44 = "如你所見，這款產品中巧克力和薄荷比例有所改變，#n而且還用上了普通產品不會使用的唇萼薄荷……"
80000058-45 = "……看老師的表情，難道老師聽不太懂？"
80000058-46 = "請，請仔細看！完全不一樣唷……！"
80000058-47 = "這可是將一般來說不能直接食用的唇萼薄荷，以特殊的作法……！"
80000058-48 = "……"
80000058-52 = "……老師不覺得很厲害嗎？"
80000058-53 = "[s]「……」"
80000058-55 = "（雖然遺憾地不是很能理解，但還是美味地享用了）"

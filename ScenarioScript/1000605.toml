[translation]
1000605-1 = "祕密交易"
1000605-2 = "黑市"
1000605-4 = "哦，終於來了。"
1000605-5 = "當初夏萊的老師突然接近我們黑市的時候，我還懷疑過你的目的……"
1000605-6 = "呵呵，沒想到老師也對這種事情感興趣嗎？#n對你另眼相看了。"
1000605-7 = "[s] 「確定是真貨吧？」"
1000605-8 = "當然，我們黑市商人辦事向來乾淨俐落。"
1000605-9 = "「有錢就能買到一切」是我們的座右銘。"
1000605-10 = "[s] 和黑市的商人交易貨物"
1000605-12 = "那麼，就先來確認一下金額……"
1000605-16 = "到此為止了，壞蛋！"
1000605-17 = "嗚哇？為什麼格黑娜風紀委員會會在這裡……！"
1000605-18 = "既然交易已經完成……先告辭了！"
1000605-20 = "啊！站住，你這走私犯！"
1000605-24 = "呿……被他跑了啊。#n不過幸好有抓到另一個人……"
1000605-27 = "……老師？"
1000605-28 = "為什麼會在這種地方……#n不對，重點是你和剛才那個走私犯交易了什麼？"
1000605-29 = "[s1] 「這是誤會。」\n[s2] 「我不能說。」"
1000605-30 = "……你又插手了什麼難以啟齒的事嗎。"
1000605-31 = "……你又插手了什麼難以啟齒的事嗎。"
1000605-32 = "真沒出息……"
1000605-33 = "無論如何，我不能就這樣把現行犯放走。 #n把交易的東西交出來。"
1000605-34 = "[s3] 耍賴\n[s4] 假裝沒聽到"
1000605-35 = "又不是小孩子，快交出來！"
1000605-36 = "別裝沒聽到，快交出來！"
1000605-38 = "（交易的東西被伊織搶走了）"
1000605-39 = "這是……相簿？#n呃，這不是我的小學畢業紀念冊嗎？"
1000605-40 = "……老師怎麼會交易這種東西？"
1000605-41 = "[s5] 「為了不讓伊織的畢冊跑到別人手上……」\n[s6] 「這是夏萊公務上不可或缺的資料……」"
1000605-42 = "少騙人了！絕對是打算用來做奇怪的事吧！"
1000605-43 = "少騙人了！絕對是打算用來做奇怪的事吧！"
1000605-44 = "這個……變態！！"
1000605-46 = "（之後雖然被伊織狠狠罵了一頓，所幸還是留住了畢冊）"

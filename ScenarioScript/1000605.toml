[translation]
1000605-1 = "การแลกเปลี่ยนที่เป็นความลับ"
1000605-2 = "ตลาดมืด"
1000605-4 = "โอ้ ในที่สุดก็มาซะที"
1000605-5 = "ทำไมจู่ๆ คุณครูของชาเล่ต์ถึงมาที่ตลาดมืดแบบนี้ล่ะ..."
1000605-6 = "คิคิ ว่าแต่... ไม่คิดเลยว่าคุณครูก็สนใจเรื่องพวกนี้เหมือนกัน ต้องมองคุณครูใหม่แล้วล่ะ"
1000605-7 = "[s] \"ได้ของมารึเปล่า?\""
1000605-8 = "แน่นอน คนขายของตลาดมืดอย่างพวกเราต้องหามาได้อยู่แล้ว"
1000605-9 = "\"ขอแค่มีเงินมา พวกเราก็พร้อมจะหาของทุกอย่างที่คุณต้องการมาให้\"#nนี่คืออุดมการณ์ของพวกเราล่ะ"
1000605-10 = "[s] ทำการซื้อขายสินค้ากับคนขายของตลาดมืด"
1000605-12 = "ถ้างั้น... มานับเงินกันดีกว่า..."
1000605-16 = "หยุดเดี๋ยวนี้นะ พวกอาชญากรทั้งหลาย!"
1000605-17 = "อ๊ะ? ทำไมคณะกรรมการวินัยของเกเฮนน่าถึงมาอยู่ที่นี่ได้...!"
1000605-18 = "ตอนนี้ซื้อขายเรียบร้อยแล้ว... ถ้างั้นก็ลาก่อน!"
1000605-20 = "อ๊ะ! หยุดเดี๋ยวนี้นะ! พวกค้าของเถื่อน!"
1000605-24 = "ชิส์... ดันพลาดไปซะได้ แต่ก็ยังดีที่จับตัวมาได้หนึ่งคน..."
1000605-27 = "...คุณครูเหรอ?"
1000605-28 = "มาทำอะไรที่นี่...#nเดี๋ยวสิ แล้วเมื่อกี้ซื้อขายอะไรกับพวกค้าของเถื่อนนั่นล่ะ?"
1000605-29 = "[s1] \"เข้าใจผิดแล้วล่ะ\"\n[s2] \"ครูบอกไม่ได้...\""
1000605-30 = "...ดูเหมือนคุณครูจะปิดบังอะไรไว้อยู่สินะ"
1000605-31 = "...ดูเหมือนคุณครูจะปิดบังอะไรไว้อยู่สินะ"
1000605-32 = "น่าอนาถจริงๆ..."
1000605-33 = "แต่ถึงยังไงฉันก็คงมองข้ามอาชญากรรมที่เกิดขึ้นไม่ได้ ส่งของที่ซื้อจากพวกนั้นมาเร็วเข้า"
1000605-34 = "[s3] เจรจาว่าเป็นของที่ให้ไม่ได้จริงๆ\n[s4] แกล้งทำเป็นไม่รู้เรื่อง"
1000605-35 = "เลิกทำตัวเหมือนเด็กๆ แล้วส่งมาซะดีๆ!"
1000605-36 = "ไม่ต้องมาทำเป็นไม่รู้เลย ส่งมาซะดีๆ!"
1000605-38 = "(อิโอริแย่งของที่ได้มาจากคนขายของตลาดมืดไป)"
1000605-39 = "นี่มัน... อัลบั้มรูปนี่นา?#nเดี๋ยวก่อน นี่มันอัลบั้มรูปจบการศึกษาชั้นประถมของฉันไม่ใช่รึไง?"
1000605-40 = "...ทำไมคุณครูถึงมีมันได้ล่ะ?"
1000605-41 = "[s5] \"ครูพยายามป้องกันไม่ให้รูปจบการศึกษาของอิโอริหลุดออกไปน่ะ...\"\n[s6] \"พอดีมีงานของชาเล่ต์ที่ต้องใช้รูปนี้น่ะ...\""
1000605-42 = "ไม่ต้องมาโกหกเลยนะ! คิดจะเอาไปทำอะไรไม่ดีใช่มั้ยล่ะ!"
1000605-43 = "ไม่ต้องมาโกหกเลยนะ! คิดจะเอาไปทำอะไรไม่ดีใช่มั้ยล่ะ!"
1000605-44 = "คุณครู... คนโรคจิต!"
1000605-46 = "(หลังจากนั้นคุณครูก็ถูกอิโอริเทศนาชุดใหญ่ แต่โชคดีที่คุณครูก็ได้อัลบั้มรูปคืนมาจากอิโอริ)"

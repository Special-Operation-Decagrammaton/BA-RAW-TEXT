[translation]
22230-1 = "第23話;為王女準備的帕凡舞（２）"
22230-2 = "……確保資源失敗。系統關閉。"
22230-3 = "大家還好嗎！？"
22230-4 = "優香……！"
22230-5 = "乃愛前輩！"
22230-6 = "為，為什麼會，知道這裡……？"
22230-7 = "我已經非常清楚狀況非同小可了，老師！"
22230-8 = "雖然本來只打算告訴你們都市的位置就收手的……"
22230-9 = "呵呵，優香醬說，果然不能只做這些……#n還說得努力到最後才行對吧？"
22230-10 = "[s]「不愧是優香！時機太完美了！」"
22230-11 = "那是當然的。"
22230-12 = "比起這些，會長！！"
22230-14 = "！！"
22230-15 = "居然挪用研討會的預算建造都市……#n之後要說教了唷！請做好心理準備！"
22230-16 = "……優香。"
22230-20 = "確保資源程序錯誤。#n發生緊急狀況。為保護Divi:Sion電源及協議執行者，於埃里都中央塔集……"
22230-24 = "……有妨礙者？"
22230-25 = "不可能──都市內的殘存兵力為0。"
22230-26 = "發生邏輯錯誤。為了確認，將顯示畫面。"
22230-35 = "啊，那該不會是……！"
22230-39 = "[ns]「……是前衛君和工程師部！」"
22230-40 = "察覺到了可疑的跡象！工程師部華麗地復活了唷～！"
22230-41 = "到處都是品味奇怪的機械呢。"
22230-42 = "想必這就是……會長所說的，會從廢墟溢出的威脅吧。"
22230-43 = "呵呵……既然這樣，我們也不能輸。"
22230-44 = "如果對方是從廢墟爬出來的怪物……"
22230-45 = "那我們就是以宇宙為目標的技術人員。"
22230-52 = "我們可是剛剛獲得了由真紀的設計品味加以武裝的友軍哦。"
22230-53 = "沒錯！敵人的敵人就是友軍！我們改造過的敵人也是友軍！的說！"
22230-54 = "嗯……特別是，還裝上了以後在宇宙戰艦上也能用的火力兵器。"
22230-55 = "就算是廢墟的怪物，也不是「前衛君Mk.2」的對手。"
22230-56 = "那麼上吧！突進──！"
22230-57 = "好！掃除廢墟的雜魚們吧！"
22230-58 = "哦～！"
22230-66 = "改造前衛君……宇宙戰艦……"
22230-67 = "咦？她們在說什麼？"
22230-68 = "[s]「如果是宇宙戰艦那就沒辦法了！畢竟那是大家的浪漫啊！」"
22230-69 = "那個……老師在說什麼，我聽不太懂……"
22230-70 = "無法理解。無法判斷狀況。"
22230-71 = "修正命令並重新執行。追隨者避開與意料之外兵力的戰鬥，在埃里都中央塔集結……"
22230-72 = "很抱歉，那些孩子來不了這裡唷。#n塔的入口，已經由英美和C&C的成員阻擋了。"
22230-75 = "[ns]「咦？陽葵！？為什麼會在這裡！？」"
22230-76 = "呵呵。因為各種原因～該這麼說嗎？"
22230-77 = "陽葵……妳不是，逃跑了嗎……"
22230-78 = "逃跑什麼的……那樣不是很寂寞嗎。"
22230-79 = "因為對之後的狀況，多少有所預料。"
22230-80 = "所以逃出隔離設施後就連忙趕來這裡了。"
22230-81 = "畢竟是莉央……所以我預測妳可能又會引發什麼事件。"
22230-82 = "怎麼樣？#n呵呵──我猜對了嗎？"
22230-83 = "……"
22230-84 = "那麼，這就是＜Key＞……#n是為了驅動無名祭司的「歐帕茲」而存在的觸發AI吧。"
22230-85 = "就這麼放置不管的話，愛麗絲的人格想必會被＜Key＞給取代……#n依照無名祭司們的期望，以「無名諸神的王女」這個身分覺醒吧。"
22230-86 = "那，那樣的話……！"
22230-87 = "！！#n陽葵前輩……照妳這麼說……"
22230-88 = "愛麗絲醬，就會像這樣……"
22230-89 = "當然也有阻止的方法。"
22230-90 = "[s]「……究竟，該怎麼做呢？」"
22230-91 = "事態已刻不容緩……無名祭司已經展開行動了。"
22230-108 = "所以，在無名祭司抵達之前，要由我們將愛麗絲──"
22230-109 = "將因為＜Key＞的啟動而被隔離在資料庫深處的愛麗絲喚醒。"
22230-111 = "這樣一來，就能中止這個情況了吧。"
22230-115 = "那種事……真的做得到嗎？"
22230-116 = "可以把愛麗絲帶回來的意思嗎！？"
22230-117 = "當然可以。#n莉央，這裡有潛入裝備吧？"
22230-118 = "嗯，這裡有。#n……但那種事，實際上是辦不到的……！"
22230-119 = "[s] 「咦？」"
22230-120 = "太危險了。就算能侵入愛麗絲的精神世界，#n一個不小心很可能就回不來了。"
22230-121 = "再說，那種事到底誰會願意──"
22230-122 = "現在，能帶回愛麗絲的只有遊戲開發部和老師而已。"
22230-123 = "雖然伴隨著危險……但只有這個方法了。"
22230-125 = "……我願意做。"
22230-126 = "如果能……"
22230-127 = "把愛麗絲醬帶回來的話。"
22230-128 = "看到了吧？"
22230-129 = "……"
22230-130 = "那麼，我現在開始分析愛麗絲的精神並製造空隙。"
22230-131 = "請各位進入愛麗絲的精神世界，把她帶回來吧。"
22230-136 = "[ns]「……我知道了。出發吧！」"
22230-138 = "好，那麼開始吧。"
22230-143 = "……準備完畢。"
22230-144 = "那麼各位，拜託你們了。"
22230-148 = "下一話;自己想成為的人"

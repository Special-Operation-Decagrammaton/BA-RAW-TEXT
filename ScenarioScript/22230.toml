[translation]
22230-1 = "ตอนที่ 23;ลำนำแด่ธิดาแห่งทวยเทพ 2"
22230-2 = "\"......ระดมทรัพยากรไม่สำเร็จ ปิดระบบ...\""
22230-3 = "ทุกคนเป็นยังไงกันบ้าง?!"
22230-4 = "ยูกะ......!"
22230-5 = "รุ่นพี่โนอา!"
22230-6 = "มะ... มาที่นี่... ได้ยังไง...?"
22230-7 = "ฉันรู้ว่าสถานการณ์ทางนี้มันกำลังผิดปกติน่ะค่ะ คุณครู!"
22230-8 = "ตอนแรกฉันคิดแค่ว่าจะบอกตำแหน่งของเมืองนี้แล้วก็ถอยห่างออกมาน่ะค่ะ~"
22230-9 = "ฮุฮุฮุ แต่ยูกะจังบอกว่าจะหยุดแค่นั้นไม่ได้... เราต้องทำอะไรสักอย่างจนกว่าเรื่องนี้จะจบลงค่ะ"
22230-10 = "[s] \"ต้องแบบนี้สิยูกะ! สมบูรณ์แบบมาก!\""
22230-11 = "แค่นี้ไม่เท่าไรหรอกค่ะ"
22230-12 = "ที่สำคัญกว่านั้น ประธานคะ!"
22230-14 = "!!"
22230-15 = "ยักยอกเงินของเซมิน่ามาสร้างเมืองแบบนี้งั้นเหรอ ไว้ฉันจะเรียกมาดุให้เข็ดหลาบเลย! เตรียมใจไว้ได้เลยค่ะ!"
22230-16 = "ยูกะ..."
22230-20 = "\"กระบวนการระดมทรัพยากรผิดพลาด เกิดเหตุฉุกเฉิน รวมตัวที่หอคอยกลางของเอริดูเพื่อปกป้อง#nพลังงานของ Divi:Sion และผู้ปฏิบัติโปรโตคอล...\""
22230-24 = "...ผู้ขัดขวางงั้นเหรอ?"
22230-25 = "ไม่มีทางเกิดเรื่องแบบนั้นค่ะ ตอนนี้ไม่มีกองกำลังเหลือในเมืองแล้ว"
22230-26 = "เกิดข้อผิดพลาดทางตรรกะ แสดงหน้าจอเพื่อตรวจสอบ"
22230-35 = "อ๊ะ นั่นมัน…!"
22230-39 = "[ns] \"...หุ่นรบล้ำยุค! และก็ชมรมวิศวกรรม!\""
22230-40 = "ชมรมวิศวกรรมได้ลางสังหรณ์อะไรแปลกๆ! และกลับมาอีกครั้งแล้วค่า!"
22230-41 = "มีเครื่องจักรแปลกๆ เต็มไปหมดเลย"
22230-42 = "บางทีนี่อาจเป็น... ภัยคุกคามที่ประธานเคยบอกไว้ว่าจะออกมาจากพื้นที่รกร้างก็ได้"
22230-43 = "ฮุฮุ... ถ้าเป็นอย่างนั้น พวกเราก็แพ้ไม่ได้สิ"
22230-44 = "ถ้าอีกฝ่ายเป็นสัตว์ประหลาดที่คืบคลานออกมาจากพื้นที่รกร้างละก็..."
22230-45 = "ก็ต้องมาเจอกับวิศวกรที่อยากมุ่งสู่อวกาศแบบนี้"
22230-52 = "เหมือนเราได้พันธมิตรติดอาวุธที่มาจากเซนส์ในการออกแบบของมากิเลยละ"
22230-53 = "ใช่ค่ะ! ศัตรูของศัตรูก็คือพันธมิตร! และศัตรูที่เราปรับปรุงขึ้นใหม่ก็คือพันธมิตรด้วย!"
22230-54 = "อืม... ยิ่งเราติดอาวุธพลังเพลิงที่ใช้บนเรือรบอวกาศในอนาคตให้ด้วยแล้ว"
22230-55 = "สัตว์ประหลาดจากพื้นที่รกร้างหน้าไหนก็คงมาเทียบกับ <หุ่นรบล้ำยุค Mk.2> ของเราไม่ได้หรอก"
22230-56 = "ถ้างั้นก็มาลุยกันเลยมั้ย?"
22230-57 = "ค่ะ! เจ้าพวกสมุนจากพื้นที่รกร้าง! โดนพวกเราถล่มเละแน่ค่ะ!"
22230-58 = "โอ้ว~"
22230-66 = "ปรับปรุงหุ่นรบล้ำยุคใหม่... แล้วใส่อาวุธเรือรบอวกาศ..."
22230-67 = "เอ๋? แล้วเรือรบอวกาศมันไปเกี่ยวอะไรด้วยล่ะเนี่ย?"
22230-68 = "[s] \"ไม่เกี่ยวก็ไม่เป็นไรหรอก ก็มันเป็นความฝันของทุกคนนี่นา!\""
22230-69 = "คือว่า... ฉันไม่เข้าใจเลยค่ะว่าคุณครูพูดถึงอะไร..."
22230-70 = "ไม่อาจเข้าใจได้ ตัดสินสถานการณ์ไม่ได้"
22230-71 = "แก้ไขคำสั่งและสั่งการใหม่ เหล่าสาวกหลีกเลี่ยงการต่อสู้กับกองกำลังที่มาแบบไม่คาดคิด และไปรวม#nตัวกันที่หอคอยกลางแห่งเอริดู..."
22230-72 = "ขอโทษนะคะ แต่พวกนั้นเข้ามาถึงที่นี่ไม่ได้หรอกค่ะ เอมิกับสมาชิก C&C ปิดทางเข้าหอคอยไว้แล้วค่ะ"
22230-75 = "[ns] \"หืม?! ฮิมาริ?! ทำไมมาอยู่ตรงนี้ได้ล่ะ?!\""
22230-76 = "ฮุฮุ~ ก็นั่นสิคะ~ จู่ๆ ก็มาตรงนี้ได้ยังไงกันนะคะ?"
22230-77 = "ฮิมาริ นี่เธอหนีมา..."
22230-78 = "หนีอะไรกันล่ะคะ อย่าพูดแบบนี้สิคะ เสียใจจังเลยค่ะ"
22230-79 = "ฉันพอจะเดาได้ว่าสถานการณ์จะเป็นไปในทิศทางไหนต่างหากล่ะคะ"
22230-80 = "ก็เลยออกมาจากศูนย์กักกันแล้วรีบมาที่นี่น่ะค่ะ"
22230-81 = "ฉันก็แค่คาดการณ์ล่วงหน้าว่าจะเกิดอุบัติเหตุใหญ่ อย่างที่เป็นอยู่ทุกครั้งหากริโอะจะทำอะไรน่ะค่ะ"
22230-82 = "ว่ายังไงล่ะคะ? ฉันเดาถูกไหมคะ?"
22230-83 = "........."
22230-84 = "จะว่าไปแล้ว <Key>... นี่เป็น AI ที่เหนี่ยวนำให้เกิดการเปิดใช้งาน <วัตถุหลงยุค> ของนักบวชนิรนาม#nสินะคะ"
22230-85 = "ถ้าปล่อยให้เป็นแบบนี้ต่อไป บุคลิกของอาริสึต้องถูกแทนที่ด้วย Key... จะตื่นตัวในฐานะ <ธิดาแห่งทวยเทพไร้นาม> ตามที่นักบวชนิรนามต้องการค่ะ"
22230-86 = "ถะ... ถ้างั้น...!"
22230-87 = "!! รุ่นพี่ฮิมาริ... ถ้าเป็นความจริงอย่างที่รุ่นพี่ว่า..."
22230-88 = "อาริสึจังก็..."
22230-89 = "มีวิธีที่จะหยุดมันอยู่ค่ะ"
22230-90 = "[s] \"วิธี?! ต้องทำยังไงเหรอ?!\""
22230-91 = "มันเป็นสถานการณ์ที่เร่งด่วนมากค่ะ พวกนักบวชนิรนามเริ่มเคลื่อนไหวกันแล้ว"
22230-108 = "เพราะฉะนั้นเราจะต้องได้ตัวอาริสึมาก่อนที่พวกนักบวชนิรนามจะมาถึงค่ะ"
22230-109 = "เราจะปลุกอาริสึที่ถูกกักตัวไว้ในส่วนลึกของฐานข้อมูลด้วย <Key> ค่ะ"
22230-111 = "แล้วเราก็จะหยุดสถานการณ์ได้ค่ะ"
22230-115 = "เป็นไปได้ด้วยเหรอ?!"
22230-116 = "เราพาอาริสึกลับมาได้เหรอคะ?!"
22230-117 = "ค่ะ ทำได้ค่ะ เมืองเอริดูมีอุปกรณ์ไดรฟ์ใช่ไหมคะริโอะ?"
22230-118 = "แต่ว่า... เราทำเรื่องแบบนั้นไม่ได้หรอก!"
22230-119 = "[s] \"หืม?\""
22230-120 = "มันอันตรายเกินไป! ถึงเราจะแค่เข้าไปในโครงสร้างจิตใจของอาริสึ แต่ถ้ามีอะไรผิดพลาดขึ้นมา ก็จะย้อนกลับไม่ได้"
22230-121 = "ใครจะไปทำเรื่องแบบนั้นได้──"
22230-122 = "มีเพียงสมาชิกชมรมพัฒนาเกมกับคุณครูเท่านั้นค่ะที่พาอาริสึกลับมาได้"
22230-123 = "ถึงมันจะอันตรายมากๆ ก็เถอะ..."
22230-125 = "...ฉันจะทำค่ะ"
22230-126 = "ขอแค่ได้ช่วย..."
22230-127 = "ให้อาริสึจังกลับมาได้"
22230-128 = "เห็นแล้วใช่ไหมคะ?"
22230-129 = "........."
22230-130 = "ถ้าอย่างนั้นฉันจะวิเคราะห์โครงสร้างจิตใจของอาริสึและสร้างช่องว่างขึ้นมาค่ะ"
22230-131 = "ทุกคนได้โปรดเข้าไปในจิตใจของอาริสึ แล้วพาเธอกลับมาให้ได้นะคะ"
22230-136 = "[ns] \"เข้าใจแล้ว!\""
22230-138 = "ค่ะ ถ้าอย่างนั้นฉันจะเริ่มเลยนะคะ"
22230-143 = "...พร้อมแล้วค่ะ"
22230-144 = "ถ้าอย่างนั้นก็ขอฝากด้วยนะคะ ทุกคน"
22230-148 = "ตอนต่อไป;สิ่งที่อยากเป็น"

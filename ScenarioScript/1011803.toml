[translation]
1011803-1 = "Unexpected Cuteness"
1011803-2 = "Knock-knock-knock!"
1011803-3 = "Hi, Sensei!"
1011803-4 = "[s1] \"Hi, Nozomi.\"\n[s2] \"What brings you here?\""
1011803-7 = "Nothing serious, just a little nuisance is all."
1011803-8 = "Here, look at this."
1011803-9 = "[s] \"What am I looking at?\""
1011803-14 = "Meet Shuppo. The new Board of Administration mascot."
1011803-15 = "Somebody won a design contest for it, or something."
1011803-16 = "Can't be all that popular, if we're just giving the merch away."
1011803-17 = "[s] \"So this is Shuppo's promotional tour.\""
1011803-18 = "Yeah, see the little Highlander uniform?"
1011803-19 = "They told me to take this one to Schale, for publicity."
1011803-20 = "I don't see the point, really. Do you even like these things at all?"
1011803-21 = "[s] \"I do like cute things, sure.\""
1011803-22 = "Heh, so you think it's cute. Pahyahya!"
1011803-23 = "I don't really get cuteness in general."
1011803-24 = "Even when other kids go like, \"This is so cute, kyaa...\" I don't really get it."
1011803-25 = "I'm not sure I've ever really had that reaction to anything."
1011803-26 = "I mean, if someone says it's cute, I'll take their word for it, but whatever."
1011803-27 = "[s] \"You've never found anything cute in your life?\""
1011803-31 = "[ns] \"...Hang on a sec.\""
1011803-36 = "[ns] \"...Okay, what do you think of this?\""
1011803-37 = "What is that?"
1011803-38 = "[s] \"It's a doll. I won it at the arcade. Pretty cute, yeah?\""
1011803-39 = "Heh, guess so."
1011803-43 = "[ns3] \"You don't sound too enthused.\"\n[ns4] \"All right, let's move on to...\""
1011803-49 = "[ns] \"Here, how about this one?!\""
1011803-50 = "That just looks disturbing."
1011803-51 = "[ns5] \"The great monster Orteganos is disturbing?!\"\n[ns6] \"Aw, no way!\""
1011803-54 = "Do YOU think that one's cute, Sensei?"
1011803-55 = "I mean, does anyone?"
1011803-56 = "Pahyahya! I don't get it."
1011803-57 = "[s] \"Okay, I WILL make sure you call something 'cute' today!\""
1011803-59 = "I showed her all the merch I had..."
1011803-67 = "...but it was no use."
1011803-70 = "[ns] \"*sigh* Last one. What do you think of this?\""
1011803-72 = "Pfft...!"
1011803-73 = "[ns7] \"Huh? Was that an actual response?\"\n[ns8] \"Right? Cute, huh??\""
1011803-76 = "P-Pfft... No... It's not that."
1011803-80 = "But the way you keep on showing me things..."
1011803-81 = "You know, holding them out and asking me, \"How about this?\""
1011803-82 = "THAT..."
1011803-83 = "That's cute to me, you know?"
1011803-84 = "[ns] \"What...?!\""
1011803-85 = "Pahyahya!! I'm serious!"
1011803-86 = "[ns] \"...\""
1011803-88 = "That made me upset, for some reason. I turned away from her..."
1011803-89 = "P-Pfft... Sensei, are you mad?"
1011803-90 = "I mean, mission accomplished, right? I called something \"cute\"..."
1011803-96 = "You didn't say it couldn't be you..."
1011803-97 = "[s] \"Heh.\""
1011803-99 = "She kept making fun of me a while longer, then headed back."

[translation]
1011803-1 = "ความน่ารักที่คาดไม่ถึง"
1011803-2 = "ก๊อกๆๆ~"
1011803-3 = "สวัสดี~ คุณครู!"
1011803-4 = "[s1] \"สวัสดี โนโซมิ มีอะไรเหรอ?\"\n[s2] \"ว่าไง โนโซมิ มีธุระอะไรเหรอ?\""
1011803-7 = "ไม่ใช่เรื่องใหญ่อะไรหรอก แค่เป็นเรื่องที่ฉันขี้เกียจทำน่ะ"
1011803-8 = "เอ้า นี่ไง"
1011803-9 = "[s] \"นี่มัน...?\""
1011803-14 = "นี่คือซูโปจัง เป็นมาสคอตที่คณะกรรมการบริหารจัดทำขึ้นใหม่น่ะ"
1011803-15 = "เห็นว่าเป็นผลงานที่ได้รับเลือกในการประกวดหรืออะไรนี่แหละ"
1011803-16 = "แต่ถ้าเอามาทำเป็นกู้ดแล้วเหลือจนต้องแจกจ่ายแบบนี้ งั้นก็แปลว่าไม่ได้รับความนิยมมากเท่าไร"
1011803-17 = "[s] \"อ้อ มาที่นี่เพราะจะเอาอันนี้มาให้ครูสินะ\""
1011803-18 = "ดูสิ มันใส่ชุดนักเรียนไฮแลนเดอร์ด้วย"
1011803-19 = "ฉันได้รับคำสั่งให้เอามาไว้ที่ชาเล่ต์ เพื่อสร้างความนิยมให้โรงเรียนเราน่ะ"
1011803-20 = "ว่าแต่ของแบบนี้จะสร้างความนิยมให้ได้เหรอ? แล้วคุณครูชอบอะไรแบบนี้หรือเปล่า?"
1011803-21 = "[s] \"ครูชอบของที่น่ารักอยู่แล้ว\""
1011803-22 = "หืม~ คุณครูคิดว่ามันน่ารักสินะ วะฮะฮ่า!"
1011803-23 = "ฉันแยกแยะไม่ค่อยออกน่ะว่าอันไหนน่ารักไม่น่ารัก"
1011803-24 = "เด็กคนอื่นพอเห็นก็กรี๊ดกร๊าดแล้วบอกว่า น่ารักจัง~ แต่ไม่รู้สิ ฉันไม่อินเลย"
1011803-25 = "จะว่าไปฉันก็ไม่เคยคิดว่าอะไรน่ารักเลยนะ"
1011803-26 = "แต่ถ้าใครบอกว่าอะไรน่ารักก็จะแค่เออออตาม ก็มันไม่ใช่เรื่องไม่ดีนี่เนอะ!"
1011803-27 = "[s] \"ไม่เคยรู้สึกว่าอะไรน่ารักงั้นเหรอ?\""
1011803-31 = "[ns] \"รอครูเดี๋ยวหนึ่งได้มั้ย?\""
1011803-36 = "[ns] \"เอ้านี่ อันนี้เป็นไงบ้าง?\""
1011803-37 = "นี่มันอะไรเหรอ?"
1011803-38 = "[s] \"ตุ๊กตาที่ครูคีบจากตู้มาเมื่อคราวก่อน ไม่น่ารักเหรอ?\""
1011803-39 = "ฮืม~ ไม่รู้สิ~"
1011803-43 = "[ns3] \"ทำไมปฏิกิริยาเป็นแบบนี้ล่ะ!\"\n[ns4] \"งั้นก็ตัวต่อไป!\""
1011803-49 = "[ns] \"เอาละ ตัวนี้เป็นไง?!\""
1011803-50 = "ทำไมหน้าตามัน... ไม่น่ามองอย่างนี้ล่ะ?"
1011803-51 = "[ns5] \"ไม่น่ามองงั้นเหรอ? นี่มันโมเดลเต่ายักษ์กาเมร่าเลยนะ?!\"\n[ns6] \"อึก ไม่อยากเชื่อเลย! ขอโทษนะกาเมร่า!\""
1011803-54 = "คุณครูมองว่ามันน่ารักเหรอ?"
1011803-55 = "เดี๋ยวนะ ไม่ใช่แค่คุณครู แต่คนส่วนใหญ่ก็คิดว่ามันน่ารักด้วยงั้นเหรอ?"
1011803-56 = "วะฮะฮ่า! ฉันเข้าไม่ถึงจริงๆ เลยนะเนี่ย"
1011803-57 = "[s] \"วันนี้ครูต้องได้ยินคำว่าน่ารักจากโนโซมิให้ได้เลย!\""
1011803-59 = "(แล้วคุณครูก็เอากู้ดของตัวเองมาโชว์อีกหลายชิ้น...)"
1011803-67 = "(แต่ก็ไม่มีประโยชน์...)"
1011803-70 = "[ns] \"ฮู่ว... ตัวสุดท้าย เจอนี่หน่อยเป็นไง!\""
1011803-72 = "พรืด!"
1011803-73 = "[ns7] \"หืม? เมื่อกี้หัวเราะเหรอ?\"\n[ns8] \"ใช่มั้ยล่ะ น่ารักใช่มั้ยล่ะ??\""
1011803-76 = "อะ... อึก... ไม่หรอก... ไม่ใช่อย่างนั้น"
1011803-80 = "คุณครูพยายามเอานู่นนี่ให้ฉันดูอยู่ใช่มั้ยล่ะ?"
1011803-81 = "เอาตัวนู้นตัวนี้ออกมา แล้วถามฉันว่าเป็นยังไงบ้าง น่ารักหรือเปล่า"
1011803-82 = "ที่คุณครูทำแบบนั้นน่ะ..."
1011803-83 = "มันก็น่ารักอยู่นะ"
1011803-84 = "[ns] \"ว่าไงนะ...!!\""
1011803-85 = "วะฮะฮ่า!! ก็มันจริงนี่! ฉันว่าน่ารักดีนะ"
1011803-86 = "[ns] \"...\""
1011803-88 = "(คุณครูกลับมานั่งด้วยความขุ่นเคืองใจ...)"
1011803-89 = "โธ่... คุณครู~ งอนตุ๊บป่องเหรอ~?"
1011803-90 = "แต่ก็บรรลุเป้าหมายแล้วไม่ใช่เหรอ? ไหนว่าอยากได้ยินคำว่าน่ารักจากฉันไง~"
1011803-96 = "ทำไมล่ะ~? คุณครูจะน่ารักไม่ได้เหรอ?"
1011803-97 = "[s] \"อึก...!\""
1011803-99 = "(แล้วโนโซมิก็แกล้งคุณครูอยู่อีกพักใหญ่ก่อนจะกลับไป...)"

[translation]
1011803-1 = "意外的可愛"
1011803-2 = "叩叩叩～"
1011803-3 = "哈囉～老師！"
1011803-4 = "[s1]「嗨，希望。」\n[s2]「你說的事情是什麼？」"
1011803-7 = "雖然不是什麼大事，但是還挺麻煩的。"
1011803-8 = "來，你看這個。"
1011803-9 = "[s]「這是……？」"
1011803-14 = "它叫做咻啵醬，是行政委員會新推出的吉祥物。"
1011803-15 = "好像是設計比賽還是什麼的得獎作品之類的。"
1011803-16 = "看來人氣不怎麼樣嘛。#n賣不完的周邊多到我們得到處幫忙清庫存。"
1011803-17 = "[s]「哦哦，所以你是來給我這個的嗎？」"
1011803-18 = "你看，它身上穿著高地人的制服對吧？"
1011803-19 = "上頭的人要我把它放在夏萊，看能不能提高我們的知名度。"
1011803-20 = "這種東西真的能提高知名度？#n老師你會喜歡嗎？"
1011803-21 = "[s]「我還挺喜歡可愛的東西的。」"
1011803-22 = "嘿～原來老師覺得它可愛啊？噗哈哈！"
1011803-23 = "我其實不太能理解就是了。"
1011803-24 = "大家會哇哇叫說「好可愛哦～」的東西，我都不是很懂。"
1011803-25 = "這麼說來，我好像從來沒有覺得什麼東西特別可愛過。"
1011803-26 = "對我來說都沒什麼感覺……雖然這樣也沒什麼不好的啦！"
1011803-27 = "[s]「沒覺得什麼東西可愛過？」"
1011803-31 = "[ns]「你等我一下！」"
1011803-36 = "[ns]「來，這個怎麼樣？」"
1011803-37 = "這是什麼？"
1011803-38 = "[s]「是我之前在遊戲中心抓到的娃娃。可愛吧？」"
1011803-39 = "嘿～這樣啊～"
1011803-43 = "[ns3]「反應也太冷淡了吧！」\n[ns4]「那我換下一個！」"
1011803-49 = "[ns]「你覺得這個怎麼樣！？」"
1011803-50 = "長得……讓人有點不舒服？"
1011803-51 = "[ns5]「不舒服！？這是大怪獸歐提咖努斯的公仔耶！？」\n[ns6]「這怎麼可能！」"
1011803-54 = "老師覺得那個可愛嗎？"
1011803-55 = "不只是老師，大部分人都這麼覺得？"
1011803-56 = "噗哈哈！我真的理解不了耶。"
1011803-57 = "[s]「今天，我一定要讓希望說出可愛兩個字！」"
1011803-59 = "（之後又繼續展示著收藏的周邊小物……）"
1011803-67 = "（結果還是完全沒有效果……）"
1011803-70 = "[ns]「呼……最後這個怎麼樣！」"
1011803-72 = "噗……"
1011803-73 = "[ns7]「哦？有反應了嗎？」\n[ns8]「怎麼樣？這個超可愛的吧？？」"
1011803-76 = "噗哈哈……沒有，不是啦。"
1011803-80 = "我只是覺得老師一直拿東西給我看……"
1011803-81 = "那樣忙東忙西，一問再問的樣子……"
1011803-82 = "看起來……"
1011803-83 = "好像有點可愛？"
1011803-84 = "[ns]「什麼……！！」"
1011803-85 = "噗哈哈！！因為真的很可愛呀！"
1011803-86 = "[ns] 「……」"
1011803-88 = "（不知為何有點不甘心，於是轉身背對希望……）"
1011803-89 = "噗噗……老師～你是生氣了嗎～？"
1011803-90 = "你明明已經達成目的了呀？#n不是想聽我說可愛嗎～"
1011803-96 = "怎麼了～？難道我不能覺得老師可愛嗎？"
1011803-97 = "[s]「唔……！」"
1011803-99 = "（後來又被希望戲弄了好一陣子……）"

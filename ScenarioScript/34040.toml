34040-63 = "3;세이아;06;지금 미카의 상황은 최악 중의 최악……."
34040-64 = "3;세이아;02;……그 아이는 언제나 어리광을 부리면서 살아왔습니다. 모두가 그녀를 떠받들고, 우러러보는 가운데 동화 속 공주님처럼 살아왔죠.\n#3;em;…"
34040-65 = "3;세이아;01;그런 그녀가 지금처럼 온 세상의 증오의 대상이 된 것은…… 아마도 태어나 처음 경험하는 상황……."
34040-66 = "3;세이아;01;그녀가 감당하기에는 너무 가혹한 것일지도 모르겠네요……."
34040-67 = "3;세이아;02;……네. 맞습니다. 지금은 미카를 그 수렁에서 구하는 것이 가장 시급한 일이에요. \n#3;em;[반응]"
34040-68 = "3;세이아;99;어째서 저는 그걸 깨닫지 못하고……."
34040-69 = "3;세이아;02;안개가 걷히는 느낌이네요……. 감사드립니다. 선생님. 제대로 미카의 문제부터 해결해야 합니다."

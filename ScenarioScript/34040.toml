[translation]
34040-1 = "第4話;於夢與海市蜃樓之間"
34040-3 = "[ns] 「奇普托斯，迎來終焉……？」"
34040-4 = "……"
34040-5 = "沒錯，就是這樣。"
34040-6 = "該說是迎來終焉而滅亡……還是最終迎來了那樣的結果呢……這就不得而知了。"
34040-7 = "[s] 「是怎麼樣的景象呢……？」"
34040-9 = "巨大的塔從天上飛來，虛空被染上緋紅──"
34040-12 = "不祥之塔如悲鳴般地鳴動……將這個世界一點一點地削去……#n接著，世界的碎片被「某個東西」給覆蓋。"
34040-13 = "削下的世界碎片如暴風雨般四處飛散的同時，#n黑色的光從天而降……世界將傾向終焉……"
34040-15 = "接著……奇普托斯的一切將會崩壞──"
34040-16 = "就連一點灰塵都不留，一切化為虛無消逝。"
34040-18 = "[ns] 「…………」"
34040-19 = "我所看見的究竟是單純的惡夢，還是真正的未來，抑或是觀測到過去發生過的事呢……"
34040-20 = "目前還無法分辨……不過，既然我已經看見了那個景象，就必須要看清其中的真相才行。"
34040-21 = "……"
34040-22 = "於是為了從那個景象中尋找線索，我在無盡的清醒夢之間徘徊。"
34040-23 = "……所謂的清醒夢，就是在認知到在做夢的情況下有意識地進入淺眠。作為能夠記住所有發生過的事情的代價，夢境和現實的交界將變得曖昧。"
34040-24 = "過度往返夢境和現實的我，已經分不清楚自己所在的世界究竟是哪一邊了。"
34040-25 = "[s] 「聽起來是非常危險的狀態……沒問題嗎？」"
34040-26 = "……嘛，如果否定這一點的話肯定是騙人的。不過就算這樣也必須要做。"
34040-27 = "如果是以前的我的話，肯定會害怕知道未來的事而躲在夢與現實的夾縫世界裡吧。但是，這次可不能這樣。"
34040-28 = "那個景象不是單純的惡夢，我的直覺是這麼告訴我的。"
34040-29 = "那是不存在於奇普托斯──也就是從奇普托斯的外部到來的東西。是遠遠超出我的想像、無法理解的存在。"
34040-30 = "雖然這只是我的推測，恐怕招來那個的就是「蓋瑪特利亞」──"
34040-31 = "我認為他們想招來奇普托斯外部的存在，並將奇普托斯導向終焉。"
34040-32 = "[s] 「……蓋瑪特利亞嗎？」"
34040-40 = "說不定還有阻止那個破滅的方法……所以我需要……"
34040-41 = "[ns] 「聖亞。」"
34040-42 = "……嗯？"
34040-43 = "[s1] 「如果是跟『蓋瑪特利亞』有關的事，還是立刻收手比較好。」\n[s2] 「聖亞現在在做著非常危險的事唷。」"
34040-44 = "……"
34040-45 = "……"
34040-46 = "啊啊，確實……追蹤那個集團的痕跡和自殺行為沒兩樣呢。"
34040-47 = "[s3] 「就算事實真的像聖亞推測的一樣，現在這種作法也是不行的。」\n[s4] 「這是需要好好蒐集情報，大家一起努力的事唷。」"
34040-50 = "……"
34040-51 = "[s] 「這種事情就交給大人吧。聖亞就好好的看著眼前的人吧。」"
34040-55 = "（彌香……）"
34040-56 = "……你說的對。"
34040-57 = "在沒有任何情報的狀態下被那個夢境給壓垮……我或許也迷失了自己吧。"
34040-61 = "而且，如果現在的我又出了什麼事的話，彌香他……他又會做出錯誤的決定吧。"
34040-62 = "……沒錯。"
34040-63 = "現在的彌香正處於能想像到的最惡劣的情況。"
34040-64 = "……那孩子一直以來都是活在寵愛之中。大家都崇拜他、讚美他──簡直像是童話裡的公主一樣的存在。"
34040-65 = "這樣的他卻像現在這樣──成為了被世界憎恨的對象，想必這是他出生以來第一次體驗這種事吧。"
34040-66 = "要讓他背負這種命運或許有點太慘忍了……"
34040-67 = "……現在把彌香從泥濘中拯救出來才是最優先的。"
34040-68 = "為什麼我一直都沒有注意到呢……"
34040-69 = "有種撥雲見日的感覺呢……謝謝你，老師。我們會一步一步地──首先就從彌香的問題開始解決吧。"
34040-70 = "[s] 「謝謝你，聖亞。話說回來，彌香想向你道歉唷。」"
34040-71 = "道歉……？我應該已經原諒過他了啊……"
34040-72 = "……啊啊，那是我在夢裡說的嗎。"
34040-73 = "這樣啊……彌香認為我還沒有原諒他啊。"
34040-74 = "自己所犯下的罪……最大的受害者就是我，他是這麼想的吧。"
34040-77 = "真傻呀……"
34040-78 = "任性、不假思索又衝動──貪心卻又會傷害自己的你……"
34040-79 = "簡直就像是童話裡會出現的，任性傲慢的惡役大小姐一樣呢。"
34040-80 = "然而……"
34040-82 = "想要欺負自己看不順眼的存在的惡役大小姐……"
34040-83 = "卻沒有出現在童話裡，而是成為了寓言的主題一般愚蠢的存在。"
34040-87 = "但是……如果那樣的他也有救贖的話……"
34040-88 = "那就是因為我保住一命，他才沒有成為殺人兇手這一點吧。"
34040-89 = "彌香能夠撐過這如同地獄一般的情況……或許也是因為這個事實的存在吧。"
34040-90 = "就算說我的安危已經成為彌香心靈的依靠也不為過吧。"
34040-91 = "……"
34040-92 = "明明我對他並不溫柔……他卻因為我而那樣……"
34040-93 = "……啊啊，就是說呀。"
34040-94 = "明明都已經不是小孩子了……我和彌香卻連一句「對不起」都說不出來……真是太慚愧了。"
34040-95 = "──現在就把彌香給叫來吧。"
34040-96 = "和他好好談談……然後我也參加明天的聽證會。"
34040-97 = "彌香的罪行中最嚴重的就是加害於我這件事──身為當事人的我如果能一起出現的話，多少能減輕他的罪吧。"
34040-102 = "您，您叫我嗎聖亞大人？"
34040-103 = "不好意思，我想見彌香一面。可以現在請他過來嗎？"
34040-104 = "彌，彌香大人是嗎？我，我知道了。我會向渚大人確認的。"
34040-105 = "謝謝你。還有……能告訴他我想盡可能跟彌香兩人單獨談話嗎。如果有其他人在場的話會很羞恥的……"
34040-106 = "我，我知道了！我會一起確認的！"
34040-111 = "[ns] 「那麼，我也一起去渚那邊，和他說這件事吧。」"
34040-112 = "嗯……謝謝你，老師。"
34040-113 = "我──可能是太久沒跟人接觸了……我先稍微躺一下。"
34040-114 = "……抱歉了，老師。我就先失禮了……"
34040-115 = "[s] 「那麼我們明天的聽證會上見吧。晚安，聖亞。」"
34040-116 = "……嗯，晚安。那麼請保重。"
34040-118 = "（把彌香跟聖亞都會參加明天的聽證會這件事告訴了渚）"
34040-119 = "（收到了開心的渚的感謝之後，為了明天的聽證會就早早回到了夏萊）"
34040-124 = "……那麼進入下一個議題。"
34040-125 = "終於來了！"
34040-126 = "我沒有異議……但是，我有件事情想先確認。"
34040-130 = "（……）"
34040-131 = "（真是的……本來只是想在彌香來之前休息一下的……不小心睡著了嗎）"
34040-132 = "（又是清醒夢……明明最近都越來越難從夢裡醒過來了……）"
34040-133 = "（不過……這裡是……）"
34040-135 = "瑪艾斯托洛，你有什麼在意的事嗎？"
34040-136 = "……"
34040-138 = "（……他們……難道是……！？）"
34040-139 = "我有個問題想問貝雅特里榭。"
34040-144 = "……什麼事呢？"
34040-145 = "（蓋瑪特利亞……！？）"
34040-147 = "下一話;無法理解的探究者"

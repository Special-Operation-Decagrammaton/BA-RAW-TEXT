[translation]
34040-1 = "ตอนที่ 4;ระหว่างความฝันกับภาพลวงตา"
34040-3 = "[ns] \"การล่มสลายของคิโวทอส...?\""
34040-4 = "......"
34040-5 = "ค่ะ ใช่แล้วค่ะ"
34040-6 = "ฉันไม่แน่ใจหรอกค่ะ... ว่าภาพที่เห็นคือการล่มสลาย... หรือภาพที่จะนำมาสู่การล่มสลายในที่สุด... "
34040-7 = "[s] \"เห็นภาพแบบไหนเหรอ...?\""
34040-9 = "มีหอคอยขนาดใหญ่ลงมาจากฟ้า และท้องฟ้าก็เปลี่ยนเป็นสีแดงค่ะ"
34040-12 = "หอคอยที่เป็นลางร้ายอันนั้น... ค่อยๆ กัดกร่อนและทำลายโลกทีละนิด... แล้วอะไรบางอย่างที่ดูเป็น#nลางบอกเหตุร้ายก็มาปกคลุมโลกนี้ไว้ค่ะ"
34040-13 = "แล้วแสงสีดำก็ส่องลงมาท่ามกลางพายุโหมกระหน่ำของเศษเสี้ยวของโลกที่ถูกฉีกเป็นชิ้นๆ... ฉันเห็นความพินาศที่เกิดอย่างต่อเนื่อง..."
34040-15 = "และสุดท้าย... ทุกอย่างในคิโวทอสก็เสื่อมสลายค่ะ"
34040-16 = "ทุกอย่างหายไป... ไม่มีเหลือแม้แต่ฝุ่น "
34040-18 = "[ns] \".........\""
34040-19 = "ฉันไม่รู้เลยค่ะว่าสิ่งที่ฉันเห็นเป็นแค่ฝันร้าย... เป็นการบอกเหตุในอนาคต หรือว่าจะเป็นเรื่องราวที่เคย#nเกิดขึ้นในอดีต... "
34040-20 = "ถึงตอนนี้จะยังมั่นใจอะไรไม่ได้ แต่ในเมื่อได้เห็นกับตาแล้ว... ฉัน... ต้องค้นหาความจริงว่าความฝันนั้น มันหมายความว่าอะไรค่ะ"
34040-21 = "......"
34040-22 = "ที่ผ่านมาฉันหลงเข้าไปอยู่ในความฝันที่ไม่มีสิ้นสุดเพื่อหาคำตอบจากความฝันนั้นค่ะ"
34040-23 = "แต่ความฝันที่รู้ตัวของฉัน... มันผสมทั้งความจริงและความฝัน และทั้งอนาคตและอดีตเอาไว้ด้วยกัน..."
34040-24 = "ตอนนี้ฉันก็เลยแยกแยะความฝันกับความจริงไม่ได้เลยค่ะ..."
34040-25 = "[s] \"ครูว่ามันอันตรายมากเลย... เราจะเป็นอะไรกันไหม?\""
34040-26 = "...... ค่ะ บางที... อาจจะอันตรายก็ได้ค่ะ"
34040-27 = "เมื่อก่อนฉันเอาแต่หนีเพราะกลัวการมองเห็นอนาคต แต่ในครั้งนี้ฉันจะไม่หนีค่ะ"
34040-28 = "ฉันต้องหาคำตอบด้วยตัวเองให้ได้... ว่าภาพการล่มสลายนั้น... คืออนาคตที่จะเกิดขึ้นจริงๆ... หรือว่ามันเป็นเพียงแค่ฝันร้าย..."
34040-29 = "ความพังพินาศนั้น... เดิมทีแล้วไม่ใช่ของคิโวทอสหรอกค่ะ มันมาจากภายนอกคิโวทอส..."
34040-30 = "ฉันคาดเดาเอาแบบนี้น่ะค่ะ... และต้นเหตุของมันอาจจะเป็น... <เกมาเทรีย>..."
34040-31 = "ฉันเดาว่าต้นเหตุอาจเป็นกลุ่มที่ไม่เปิดเผยตัวตนกลุ่มนั้นที่คุณครูอาจจะรู้จักค่ะ"
34040-32 = "[s] \"เกมาเทรียงั้นเหรอ...?\""
34040-40 = "บางทีเราอาจจะมีวิธีป้องกันความพังพินาศนั้นก็ได้ ฉันก็เลย..."
34040-41 = "[ns] \"เซอา\""
34040-42 = "คะ...?"
34040-43 = "[s1] \"ถ้ามันเกี่ยวกับพวกนั้น ตอนนี้เธอวางมือเสียเถอะ\"\n[s2] \"ตอนนี้เธอกำลังทำเรื่องอันตรายด้วยตัวคนเดียวอยู่นะ\""
34040-44 = "......"
34040-45 = "......"
34040-46 = "นั่นสินะคะ การตามล่าสิ่งที่ไม่อาจเข้าใจได้แบบนั้น... อาจจะเป็นเรื่องอันตรายจริงๆ ก็ได้..."
34040-47 = "[s3] \"เซอาจะใช้วิธีแบบนี้ไม่ได้ ไม่ว่ามันจะจริงหรือไม่ก็ตาม\"\n[s4] \"เราจะช่วยกันหาข้อมูล แล้วช่วยคิดหาทางออกไปด้วยกันนะ\""
34040-50 = "......"
34040-51 = "[s] \"ตอนนี้เรามีเรื่องที่สำคัญกว่าความฝันที่ยังหาคำตอบไม่ได้นะ\""
34040-55 = "มิกะ..."
34040-56 = "ค่ะ... คุณครูพูดถูก"
34040-57 = "ฉันยังไม่ได้ข้อมูลอะไรแท้ๆ... แต่กลับอยู่ไม่เป็นสุขเพราะถูกครอบงำด้วยภาพที่ได้เห็นในความฝัน"
34040-61 = "ถ้าตอนนี้ตัวฉันเกิดเป็นอะไรขึ้นมา... มิกะก็คง... จริงด้วยนะคะ... ถ้าเกิดอะไรขึ้นกับฉันละก็ ฉันคงช่วยเหลืออะไรมิกะไม่ได้"
34040-62 = "ใช่แล้วละค่ะ.."
34040-63 = "ตอนนี้สถานการณ์ของมิกะถือว่าเลวร้ายมากๆ..."
34040-64 = "เธอใช้ชีวิตเหมือนเป็นเด็กมาตลอดค่ะ... ทุกคนต่างก็ปรนนิบัติดูแลเธอ และให้ความเคารพเหมือนกับ#nเจ้าหญิงในเทพนิยายค่ะ "
34040-65 = "การต้องกลายเป็นเป้าของความเกลียดชังจากทั่วโลกอย่างในตอนนี้... สำหรับเธอแล้ว... คงจะเป็นครั้งแรกในชีวิตเลย..."
34040-66 = "นี่อาจจะโหดร้ายเกินกว่าที่เธอจะรับไหวก็ได้ค่ะ..."
34040-67 = "จริงด้วยค่ะ... ตอนนี้การช่วยมิกะออกมาจากสภาพที่ยากลำบากแบบนั้นเป็นเรื่องเร่งด่วนที่สุดค่ะ "
34040-68 = "ทำไมฉันถึงคิดไม่ได้นะ..."
34040-69 = "รู้สึกเหมือนเมฆหมอกจางลงเลยค่ะ... ขอบคุณนะคะคุณครู ฉันต้องแก้ปัญหาเรื่องมิกะก่อนแล้วละค่ะ"
34040-70 = "[s] \"คิดถูกแล้วละเซอา มิกะบอกว่าอยากขอโทษเธอนะ\""
34040-71 = "คะ...? แต่ฉันยกโทษให้เธอไปแล้ว..."
34040-72 = "เอ่อ... หรือว่ามันจะอยู่ในความฝัน..."
34040-73 = "อย่างนี้นี่เอง... มิกะคงคิดว่าฉันยังไม่ยกโทษให้เธอแน่เลยค่ะ"
34040-74 = "เธอน่าจะคิดว่าคนที่ได้รับความเสียหายมากที่สุดจากเรื่องที่เธอก่อขึ้น... ก็คือฉันเอง "
34040-77 = "มิกะเอ๊ย..."
34040-78 = "ยัยคนเอาแต่ใจ ไม่คิดหน้าคิดหลัง หุนหันพลันแล่น โลภมาก แถมยังคิดจะทำร้ายตัวเองอีก..."
34040-79 = "ช่างเหมาะกับบทลูกคนรวยที่อวดดีและหยิ่งยโสในเทพนิยายเหลือเกิน..."
34040-80 = "ทำไมกันนะ สุดท้ายแล้ว..."
34040-82 = "เด็กสาวตัวโกงที่พยายามรังแกเพื่อนที่เธอไม่ถูกใจคนนั้น..."
34040-83 = "ทำไมสุดท้ายถึงไม่ได้อยู่ในเทพนิยาย แต่กลับมาอยู่ในฝันร้ายแห่งการฆาตกรรมและการตายเสียแล้วล่ะ"
34040-87 = "แต่ถึงอย่างนั้นก็เถอะ... หากเธอเองได้รับการไถ่บาปเหมือนคนอื่นบ้าง..."
34040-88 = "ฉันก็คงจะไม่ตาย และเธอก็คงไม่ได้กลายมาเป็นฆาตกร"
34040-89 = "การที่มิกะยังทนต่อสถานการณ์ที่ย่ำแย่เหมือนนรกนี้ได้... ก็คงเป็นเพราะความจริงนั้นละค่ะ"
34040-90 = "ความปลอดภัยของฉันจะมีความหมายมากกับมิกะค่ะ"
34040-91 = "มิกะ..."
34040-92 = "ฉันทำตัวไม่ค่อยดีกับเธอเท่าไรเลย... แต่ทำไมเธอถึงได้..."
34040-93 = "ใช่แล้ว... จริงด้วยสินะคะ"
34040-94 = "เราทั้งคู่ไม่ใช่เด็กอนุบาลกันแล้ว... แต่ทั้งฉันกับมิกะต่างก็กลัวที่จะกล่าวคำขอโทษกัน... ช่างน่าอับอายจริงๆ ค่ะ"
34040-95 = "ฉันอยากขอให้ช่วยเรียกมิกะมาที่นี่ตอนนี้เลยค่ะ"
34040-96 = "ฉันอยากพูดคุยกับเธออย่างจริงจัง... และฉันจะไปเข้าร่วมการสืบพยานในวันพรุ่งนี้ด้วยอีกคนค่ะ"
34040-97 = "ข้อหาหนักที่สุดของมิกะคือการทำร้ายฉัน หากผู้ที่เกี่ยวข้องอย่างฉันไปเข้าร่วมด้วยก็จะน่าเป็นผลดีต่อ#nตัวมิกะค่ะ"
34040-102 = "เรียกหาฉันเหรอคะคุณเซอา?"
34040-103 = "ขอโทษนะคะ คือฉันอยากพบมิกะน่ะค่ะ ช่วยพาเธอมาที่นี่หน่อยได้ไหมคะ?"
34040-104 = "คะ... คุณมิกะน่ะเหรอคะ? ขะ... เข้าใจแล้วค่ะ ฉันจะไปแจ้งคุณนางิสะก่อนนะคะ!"
34040-105 = "ค่ะ ขอบคุณนะคะ อืม... ช่วยบอกคุณนางิสะว่าถ้าเป็นไปได้ ฉันอยากคุยกับมิกะแค่สองคนนะคะ มันเป็นเรื่องน่าอายนิดหน่อยน่ะค่ะ"
34040-106 = "ขะ... เข้าใจแล้วค่ะ! ฉันจะไปเดี๋ยวนี้เลยค่ะ!"
34040-111 = "[ns] \"เข้าใจแล้ว ครูเองก็จะไปบอกข่าวนี้กับนางิสะ\""
34040-112 = "เราคุยอะไรกันไปเยอะแยะเลยนะคะ"
34040-113 = "ฉันรู้สึกเพลียนิดหน่อย... ขอตัวไปนอนพักสักหน่อยนะคะ"
34040-114 = "ขอโทษที่เสียมารยาทนะคะคุณครู..."
34040-115 = "[s] \"ไม่เป็นไรหรอก ไว้เจอกันในการสืบพยานพรุ่งนี้นะเซอา\""
34040-116 = "ค่ะ... งั้นฉันขอตัวก่อน เดินทางกลับดีๆ นะคะ"
34040-118 = "(แล้วครูก็ไปบอกนางิสะว่าพรุ่งนี้ทั้งมิกะและเซอาจะมาเข้าร่วมการสืบพยาน)"
34040-119 = "(นางิสะกล่าวขอบคุณด้วยความดีใจ และบอกว่าพรุ่งนี้จะรีบไปที่ชาเล่ต์แต่เช้าเพื่อการสืบพยาน)"
34040-124 = "...... ถ้างั้นจะไปที่วาระถัดไป"
34040-125 = "ใช่!"
34040-126 = "ฉันไม่มีข้อเห็นต่าง แต่มีอะไรที่อยากจะตรวจสอบก่อน"
34040-130 = "(...)"
34040-131 = "(แย่ละสิ... นี่เราเผลอหลับไป... ระหว่างที่นอนรอให้มิกะมาหาเหรอเนี่ย)"
34040-132 = "(นี่คือความฝันที่รู้ตัวอีกแล้วหรือเปล่านะ... อาจเป็นเพราะช่วงนี้เรารู้สึกไม่ค่อยสบาย... การตื่นจากความฝันเลยยากขึ้นเรื่อยๆ...)"
34040-133 = "(ว่าแต่... ที่นี่มันที่ไหนกัน...)"
34040-135 = "พูดเลยสิครับ เมสโตร"
34040-136 = "......"
34040-138 = "(......!? คนพวกนี้...!? ระ... หรือว่า...!?)"
34040-139 = "ผมขอถามเบียทริซ"
34040-144 = "ค่ะ... หมายถึงฉันเหรอคะ? จะถามอะไรล่ะคะ?"
34040-145 = "(พวกนี้คือ... เกมาเทรีย...?!)"
34040-147 = "ตอนต่อไป;ผู้ค้นคว้าที่ไม่อาจเข้าใจได้"

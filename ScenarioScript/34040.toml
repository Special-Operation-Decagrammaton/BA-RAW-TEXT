34040-19 = "3;세이아;99;제가 본 것이 단순한 악몽인지, 아니면 정말로 미래를 예지한 것인지, 혹은 과거에 있었던 일을 보여줄 뿐인 것인지…… \n#3;em;…"
34040-20 = "3;세이아;05;지금으로선 어떤 것도 확신할 수 없지만……. 그것을 목격한 이상…… 저는…… 그 꿈이 의미하는 진실을 알아내야만 했습니다."
34040-21 = "3;세이아;05;……."
34040-22 = "3;세이아;08;그 꿈이 무엇인지 알아내기 위해 저는 끝없는 자각몽 속을 헤매고 다녔습니다."
34040-23 = "3;세이아;06;하지만 자각몽은 현실과 꿈, 미래와 과거를 이리저리 뒤섞어버리기 때문에…….\n#3;em;[속상함]\n#3;stiff"
34040-24 = "3;세이아;01;이제 꿈과 현실을 구분하지 못하는 지경에 이른 것 같네요……."
34040-25 = "[s] \"엄청 위험하게 들리는데…… 괜찮은 거야?\""
34040-26 = "3;세이아;99;……. 네. 아마도, 위험할지도 모르겠네요."
34040-27 = "3;세이아;01;저는 예전에 미래를 보는 것을 두려워해서 도망쳤었습니다. 하지만 이번에는 그럴 수 없었어요.\n#3;em;[반응]"
34040-28 = "3;세이아;06;그 멸망의 광경…… 그것이 진짜 미래인지, 아니면 그저 단순한 악몽인지…… 스스로 확인하지 않으면 안 된다고 생각해서……."
34040-29 = "3;세이아;99;그 파멸은…… 원래 키보토스의 것이 아닙니다. 키보토스의 외부에서부터 도래한 것……."
34040-30 = "3;세이아;01;여기서부터는 저의 추측이지만…… 아마도, 그 원인은……. <게마트리아>……."
34040-31 = "3;세이아;05;선생님도 알고 계신, 바로 그 정체불명의 집단이 아닐까……하고 추측하고 있습니다.\n#3;em;…"

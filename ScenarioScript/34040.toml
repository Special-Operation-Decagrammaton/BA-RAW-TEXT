[translation]
34040-1 = "第4話;夢と蜃気楼の狭間で"
34040-3 = "[ns] \"キヴォトスが、終焉……?\""
34040-4 = "……。"
34040-5 = "ああ、そうだ。"
34040-6 = "終焉を迎えて滅亡したというべきか……結果的にそこへと至ってしまうのか……それは[ruby=よう]杳[/ruby]として知れないけれどね。"
34040-7 = "[s] \"どんな光景だったの……？\""
34040-9 = "天から巨大な塔が飛来し、虚空が緋色に染められ――"
34040-12 = "不吉な塔は、まるで悲鳴を上げるように鳴動し……この世界を少しずつ削りとって……そうして、世界の破片を「何か」に被せていった。"
34040-13 = "削られた世界の欠片が嵐のように吹き荒れる中で、黒い光が天から舞い降りて……世界が終焉に傾いていく……。"
34040-15 = "そうして……キヴォトスのすべてが崩壊し――"
34040-16 = "塵一つ残さずに、すべてが虚無へと消えた。"
34040-18 = "[ns] \"…………。\""
34040-19 = "私が視たのが単なる悪夢なのか、それとも本当に未来を、あるいは過去に起きたことを観測したものだったのか……。"
34040-20 = "今のところ、何も分かってはいない……けれど、その光景を目にしてしまったからには、私は真実を見極めなければならない。"
34040-21 = "……。"
34040-22 = "そうしてあの光景が何かを明らかにするために、私は果てしない明晰夢の中を彷徨い歩いた。"
34040-23 = "……明晰夢は、夢である自覚をもって意識的に微睡みに沈む行為。起こった事を全て記憶できることの代償に、夢と現実の境界が曖昧になってしまう。"
34040-24 = "繰り返し夢と現実を行き来しすぎた私には今、自分が立っている世界がどちら側なのかさえ知覚できていない。"
34040-25 = "[s] \"すごく危険な状態に聞こえるけど……大丈夫？\""
34040-26 = "……まあ、否定をすれば嘘だろうね。しかし、それでも必要な事だ。"
34040-27 = "以前の私だったなら、未来を知ることを恐れて狭間の世界に逃げ込んでいただろう。けれど、今回ばかりはそうもいかない。"
34040-28 = "あの光景がただの悪夢ではないと、私の直感が告げているんだ。"
34040-29 = "アレはキヴォトスに存在し得ない――キヴォトスの外部から到来したモノ。私の想像を遥かに上回る、理解の及ばない存在。"
34040-30 = "これは私の推測だが、恐らくアレを招いたのは「ゲマトリア」――"
34040-31 = "彼らがキヴォトスに外部の存在を呼び寄せ、終焉に導こうとしているのではないかと考えている。"
34040-32 = "[s] \"……ゲマトリアが？\""
34040-40 = "もしかしたら、あの破滅を防ぐ方法があるかもしれない……だから、私は……。"
34040-41 = "[ns] \"セイア。\""
34040-42 = "……うん？"
34040-43 = "[s1] \"「ゲマトリア」に関わる事なら、今すぐ手を引いたほうがいい。\"\n[s2] \"セイアは今、あまりにも危険な事をしてるよ。\""
34040-44 = "……。"
34040-45 = "……。"
34040-46 = "ああ、たしかに……あの集団の痕跡を追うのは、自殺行為に近いかもしれないね。"
34040-47 = "[s3] \"セイアの推測が事実だったとしても、今のようなやり方はダメ。\"\n[s4] \"きちんと情報を集めて、みんなで協力してやる事だよ。\""
34040-50 = "……。"
34040-51 = "[s] \"そういう事は大人に任せて。セイアは、目の前にいる人をちゃんと見てあげて。\""
34040-55 = "（ミカ……）"
34040-56 = "……君の言うことはもっともだよ。"
34040-57 = "まだ何の情報もない状態であの夢に圧倒されて……私は、自分を見失っていただけなのかもしれない。"
34040-61 = "それに、今私に何か起きてしまえば。ミカが……彼女がまた選択を誤ってしまう。"
34040-62 = "……そう。"
34040-63 = "今、ミカは考え得る限りで最悪の状況下にある。"
34040-64 = "……あの子は今まで甘やかされながら生きてきた。皆が彼女を崇め、讃える――まるで童話に出てくるお姫様のような存在として。"
34040-65 = "そんな彼女が、今のような――世界から憎悪の対象になるというのは、おそらく生まれて初めての体験だろう。"
34040-66 = "彼女が背負うには、その運命は少し過酷すぎるかもしれない……"
34040-67 = "……今は、ミカをあの泥濘から救うことが最優先事項。"
34040-68 = "どうして私は、それに今まで気付かずに……。"
34040-69 = "霧が晴れたような気分だよ……ありがとう、先生。私たちは一歩ずつ――まずはミカの問題から解決していかなければならない。"
34040-70 = "[s] \"ありがとうセイア。ところで、ミカが謝りたがってたよ。\""
34040-71 = "謝る……？私は既に彼女を許したはずだが……。"
34040-72 = "……ああ、それは夢の中での話だったか。"
34040-73 = "そうか……まだ、ミカは私に許されていないと思っているのか。"
34040-74 = "自分が犯した罪……その一番の被害者が私だと、彼女は感じているのだろうから。"
34040-77 = "愚かだね……。"
34040-78 = "我が儘で、浅慮で、衝動的で――欲張りなくせに自傷的でもある君は……"
34040-79 = "童話に出てくるような、生意気で傲慢な悪役令嬢がお似合いだったのに。"
34040-80 = "よりによって……。"
34040-82 = "己の気に入らない存在を苦しめようとした悪役令嬢は……"
34040-83 = "童話ではなく、寓話の主題となる愚かな存在と成り果ててしまった。"
34040-87 = "だが……そんな彼女にも救いがあるとすれば……。"
34040-88 = "私が一命をとりとめた事で、彼女が辛うじて人殺しには墜ちなかったという点。"
34040-89 = "ミカがこの地獄のような状況に耐えていられるのは……その事実があるからなのだろうね。"
34040-90 = "私の安否は、ミカにとって心の拠り所になっていると言っても過言ではない。"
34040-91 = "……。"
34040-92 = "私は彼女に優しくなかったのに……彼女は私のせいであんな……。"
34040-93 = "……ああ、そうだな。"
34040-94 = "子供じゃあるまいに……私もミカも「ごめんね」の一言すら伝えられずにいるだなんて……恥ずかしい限りだ。"
34040-95 = "――今すぐ、ミカを呼んできてもらうとしようか。"
34040-96 = "彼女と言葉を交わし……そして、明日の聴聞会に私も参加する。"
34040-97 = "ミカの罪状の中で最も重いのは、私に危害を加えたことだから――その当事者である私が一緒にいれば、多少罪は軽くなるだろう。"
34040-102 = "お、お呼びでしょうかセイア様？"
34040-103 = "悪いが、ミカに会いたい。今すぐここに連れてきてもらえるかな？"
34040-104 = "み、ミカ様をですか？わ、分かりました。ナギサ様に確認してみます！"
34040-105 = "ありがとう。あと……なるべくミカと二人きりで話したいと伝えてくれないか。どうにも、他人が同席するのは恥ずかしいからね……。"
34040-106 = "か、かしこまりました！あわせて確認します！"
34040-111 = "[ns] \"それじゃあ、私もナギサのところに行って、この事を伝えてくるよ。\""
34040-112 = "ああ……ありがとう先生。"
34040-113 = "私は――久しぶりに人と接しすぎたみたいだ……少し、横になってくる。"
34040-114 = "……悪いが、先生。それでは失礼……。"
34040-115 = "[s] \"それじゃあ、明日の聴聞会で。おやすみセイア。\""
34040-116 = "……ああ、お休み。それでは、お気をつけて。"
34040-118 = "（明日の聴聞会に、ミカとセイアが参加することをナギサに伝えた。）"
34040-119 = "（喜ぶナギサの感謝の言葉を受け取りながら、明日行われる聴聞会のために早くシャーレに帰ることにした。）"
34040-124 = "……それでは次の議題を。"
34040-125 = "そういうこった！"
34040-126 = "異論は無い……が、その前に確認しておきたいことがある。"
34040-130 = "（……）"
34040-131 = "（やれやれ……ミカが来る前に少し休むつもりが……いつの間にか眠ってしまったのか）"
34040-132 = "（また明晰夢の中……最近、夢から目覚めるのがだんだん難しくなっているというのに……）"
34040-133 = "（しかし……ここは一体……）"
34040-135 = "マエストロ、何か気になることが？"
34040-136 = "……。"
34040-138 = "（……彼らは……まさか……！？）"
34040-139 = "ベアトリーチェに質問がある。"
34040-144 = "……はい、何でしょう？"
34040-145 = "（ゲマトリア……！？）"
34040-147 = "次回;不可解な探求者"

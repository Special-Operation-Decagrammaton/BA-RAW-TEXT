[translation]
2600503-1 = "Death By Macaron Challenge"
2600503-2 = "Sensei! You're here. What do I want? Well, you must have seen one of the signs on the way over here..."
2600503-3 = "That's right! There's a famous event held annually at this cafe. It's the..."
2600503-4 = "Macaron Eating Challenge!"
2600503-5 = "What's the Macaron Eating Challenge? Doesn't the name say it all? The team to eat the most wins."
2600503-6 = "All the participants get to eat macarons for free. ...Until they give up, that is."
2600503-7 = "Huh? What happens if you give up? Well, then you have to pay for every thing you've eaten. That means there's only one team that gets to eat for free!"
2600503-8 = "It actually can be a really dangerous event! Some people have even collapsed and had to be taken to the hospital!"
2600503-9 = "Do you understand, Sensei? We're not here to mess around. We're stepping out on to a battlefield!"
2600503-10 = "Huh? Aren't I buying? Of course, I'll pay for all the macarons if we lose."
2600503-11 = "But it's okay... We won't lose!"
2600503-12 = "Sensei, you're an adult and adults must have bigger stomachs! And you're a decent-sized adult at that!"
2600503-13 = "What's that? A stomach handles regular meals and desserts differently? No way! You're just worried!"
2600503-14 = "It's starting! Bring out the macarons!"
2600503-16 = "(Then the Macaron Eating Challenge began!)"
2600503-17 = "However, despite Yoshimi's high expectations, I quickly became nauseous after eating only seven macarons."
2600503-19 = "A-Agh... This is so hard... But I'm fine... I'm fine. I can eat more..."
2600503-20 = "Uh, Sensei? Why has your mouth stopped moving...?"
2600503-21 = "[s1] \"They're too rich... Kill...me...\"\n[s2] \"This war is a lost cause... Mother...\""
2600503-22 = "What are you doing?! You're an adult! Is that all you have in you?"
2600503-23 = "(Sensei's not looking so great... We'll lose the contest at this rate!)"
2600503-24 = "Sensei, you can still eat more! You only need to eat at least twenty more! You can do it!"
2600503-25 = "We can't give up after coming all the way here! Do you know how much we've eaten already?!"
2600503-26 = "I'll feed you Sensei! Just lie down and open your mouth!"
2600503-28 = "Wait! Where are you running off to?! Open your mouth! Here comes another macaron!"
2600503-29 = "[s] (Desperately shut your mouth.)"
2600503-30 = "Give up, Sensei. Resistance is futil—huh?"
2600503-31 = "Oh no, my footing! I... Wh-Whoaaaaaa!!"
2600503-33 = "*thud*"
2600503-35 = "Argh! That stings my behind..."
2600503-36 = "I thought I might've cracked my tailbone. Good thing there was something underneath me..."
2600503-37 = "Sensei? Where are you?"
2600503-38 = "[s] \"Uh...\""
2600503-39 = "..."
2600503-40 = "What?!"
2600503-41 = "Wh-Wh-What are you doing under there?! You pervert!"
2600503-42 = "Get out! No, wait... I'm the one who'll move. No, no! Hey! This is...!"
2600503-43 = "That's enough! Arrrggghhh!! I don't...! This is stupid! Ugh!"
2600503-45 = "(After that, Yoshimi stuffed the rest of the macarons in her mouth and ran away at an incredible speed.)"
2600503-46 = "(And since nobody ate more than her, the macarons were free!)"

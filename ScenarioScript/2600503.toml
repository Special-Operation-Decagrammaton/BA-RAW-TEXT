[translation]
2600503-1 = "馬卡龍挑戰"
2600503-2 = "啊，你來了啊，老師。我先說明一下今天叫你來的原因，你來的時候應該有看到看板吧？"
2600503-3 = "沒錯，就是為了這間咖啡廳每年都會舉辦的著名活動……"
2600503-4 = "「馬卡龍大胃王挑戰」！！！"
2600503-5 = "應該不用再特別說明了吧。如同字面上的意思，這活動就是要比看哪支隊伍能吃最多馬卡龍。"
2600503-6 = "所有參加的隊伍都可以免費吃馬卡龍。只要你不棄權或認輸。"
2600503-7 = "嗯？放棄會怎樣？當然是看你吃多少就要付多少錢囉。也就是說，真的能免費吃的只有一支隊伍！"
2600503-8 = "其實這個活動相當危險，每年都有人吃到昏倒而被送進醫院呢。"
2600503-9 = "所以說我們今天不是來玩的，是來上戰場的。明白了吧？"
2600503-10 = "嗯？當然啊，如果我們輸了的話，我會連老師的那份馬卡龍的錢一起支付。"
2600503-11 = "不過別擔心。今天不是付錢的日子，因為我們不會輸！"
2600503-12 = "老師是大人吧？既然是大人，那應該比我們這些學生還能吃。更何況體型比我還大！"
2600503-13 = "問題不在這裡？真囉唆耶，怎麼還沒開始就在說喪氣話呢。"
2600503-14 = "好了，要開始了！總之先去搜刮馬卡龍吧！"
2600503-16 = "（於是，馬卡龍大胃王挑戰開始了）"
2600503-17 = "（但和喜美的期待相反，才吃到第7個我就開始覺得反胃了）"
2600503-19 = "唔，唔唔……開始有點難受了……不行，我還能吃……"
2600503-20 = "老師？你怎麼從剛剛開始動作就停下來了？"
2600503-21 = "[s1] 「不行了……殺了我吧，讓我解脫吧……」\n[s2] 「這場仗，從一開始就是錯的……」"
2600503-22 = "你，你在說什麼啊！？明明是個大人怎麼才吃這麼點啊！？"
2600503-23 = "（太出乎意料了……！不過，我好像也撐不住了……再這樣下去……！）"
2600503-24 = "加油，老師！你還可以繼續吃的！至少要吃到20個！"
2600503-25 = "怎麼可以在這裡放棄！？想想我們目前為止吃了多少錢？！"
2600503-26 = "好了，躺下來！！嘴巴張開！我來餵你！"
2600503-28 = "別逃！快把嘴巴張開！快啊！"
2600503-29 = "[s] 拚死抵抗"
2600503-30 = "別，別做無謂的抵抗……！……老老實實待著……啊──"
2600503-31 = "等等，平衡有點……！啊，哇啊啊！？"
2600503-33 = "（咚唰，碰！）"
2600503-35 = "……唔，痛痛痛……竟然一屁股摔下來……"
2600503-36 = "\n幸好下面鋪了東西……老師，你沒事吧？"
2600503-37 = "……咦？老師？你在哪裡？"
2600503-38 = "[s] 「……」"
2600503-39 = "……"
2600503-40 = "……！！！"
2600503-41 = "你，你，你你你，你在那裡做什麼啊！變態！"
2600503-42 = "快，快讓開啦！該讓開的人是我！？怎樣都好啦！！你要待到什麼時候，嗚……！"
2600503-43 = "……嗚，嗚啊啊啊！！我不管啦！笨蛋！！去死，去死啦！！！！！啊啊啊啊啊啊啊啊啊！！！"
2600503-45 = "（之後，喜美在慌亂之中以令人難以置信的速度吞光了桌上所有的馬卡龍，然後逃走了）"
2600503-46 = "（當天也沒有人超越喜美的紀錄，所以我們吃掉的馬卡龍全部免費）"

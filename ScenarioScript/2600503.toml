[translation]
2600503-1 = "#title;마카롱 데스 챌린지"
2600503-2 = "3;요시미;07;왔구나, 선생님. 왜 여기로 오라고 했는지는 오면서 플랜 카드로 잘 봤겠지?\n#3;em;[반짝]\n#3;a"
2600503-3 = "3;요시미;07;그래. 이 카페에서 해마다 개최하는 명물 이벤트야. 바로……\n#3;greeting"
2600503-4 = "3;요시미;03;<마카롱 많이 먹기 챌린지>!!!\n#3;em;[!]\n#3;hophop"
2600503-5 = "3;요시미;02;마카롱 많이 먹기 챌린지가 뭐냐고? 말 그대로지. 가장 많이 먹은 팀이 이기는 게임."
2600503-6 = "3;요시미;07;참여팀들은 모두 마카롱을 공짜로 먹을 수 있어. 스스로 포기하지만 않는다면 말이야."
2600503-7 = "3;요시미;02;응? 포기하면? 그럼 먹은 것들 값을 전부 내야지. 즉 정말 공짜로 먹는 팀은 단 한 팀뿐!\n#3;em;[?]"
2600503-8 = "3;요시미;05;사실 굉장히 위험한 이벤트야. 쓰러져서 병원으로 이송되는 환자도 있거든!"
2600503-9 = "3;요시미;06;알겠어? 선생님! 우린 지금 놀러 온 게 아냐, 전장으로 뛰어든 거라고!\n#3;em;[!]\n#3;hophop"
2600503-10 = "3;요시미;02;응? 내가 사는 거 아니었냐고? 물론 맞지. 우리가 지면 내가 마카롱 값도 다 낼 거야.\n#3;em;[?!]\n#3;shake"
2600503-11 = "3;요시미;07;하지만 괜찮아. 하지만 우린 지지 않을 거니까!\n#3;greeting"
2600503-12 = "3;요시미;03;선생님은 어른이잖아? 어른이니까 들어갈 배도 더 많겠지! 체격도 크고!\n#3;em;[반짝]"
2600503-13 = "3;요시미;08;디저트용 배랑 밥 먹는 배는 다르다고? 시끄러워! 왜 벌써부터 약한 소리야!?\n#3;hophop\n#3;em;[빠직]"
2600503-14 = "3;요시미;06;자, 시작이다, 시작! 우선 저 마카롱들부터 싹 긁어오자고!\n#3;closeup"
2600503-15 = "#all;hide"
2600503-16 = "#na;(그렇게 시작된 마카롱 많이 먹기 챌린지.)"
2600503-17 = "#na;(하지만 요시미의 기대와 달리 7개도 채 넘기지 못해 속이 울렁거리기 시작했다.)"
2600503-18 = "#all;hide"
2600503-19 = "3;요시미;04;으, 으윽…… 힘들어…… 하지만 아직이야. 아직 더 먹을 수 있어……\n#3;a\n#3;em;[속상함]\n#3;stiff"
2600503-20 = "3;요시미;00;응? 선생님……? 뭐야, 왜 아까부터 입이 멈춰 있어……?"
2600503-21 = "[s1] \"이젠 너무 느끼해…죽…여줘…\"\n[s2] \"이 전쟁은 시작부터 잘 못 됐어… 엄마…\""
2600503-22 = "3;요시미;08;뭐, 뭐하는 거야! 어른인 주제에! 겨우 그게 다야?\n#3;em;[!]\n#3;shake"
2600503-23 = "3;요시미;08;(트, 틀렸어… 이미 제정신이 아니야… 이래서는…!)\n#3;em;[속상함]\n#3;stiff"
2600503-24 = "3;요시미;06;힘을 내, 선생님! 아직 더 할 수 있잖아! 아무리 그래도 20개는 먹어야지!\n#3;hophop"
2600503-25 = "3;요시미;08;안 돼. 여기까지 와서 포기할 수는 없어! 지금까지 먹은 게 얼만지는 알아!?\n#3;em;[반응]"
2600503-26 = "3;요시미;05;여기와서 드러누워! 선생님! 입만 벌려! 내가 먹여줄 테니까!\n#3;greeting"
2600503-27 = "3;요시미;05\n#3;closeup\n#bgshake\n#wait;1000"
2600503-28 = "3;요시미;06;어딜 도망가! 입 벌리라니까! 마카롱 들어간다!\n#3;em;[!]\n#3;closeup"
2600503-29 = "[s] (필사적으로 입을 틀어막는다.)"
2600503-30 = "3;요시미;08;쓸 데 없는 저항은…… 어?\n#3;em;[?]\n#3;closeup"
2600503-31 = "3;요시미;09;잠깐만, 중심이……! 어어, 어어어어어!!\n#3;closeup\n#3;shake"
2600503-32 = "3;요시미;09\n#3;closeup\n#3;falldownL\n#wait;1500"
2600503-33 = "#all;hide\n#na;우당탕탕!\n#fontsize;100\n#bgshake"
2600503-34 = "#zmc;instant;580,0;1896"
2600503-35 = "#zmc;instant;580,0;1896\n#na;요시미;……아윽 아파파파… 내 엉덩이야……"
2600503-36 = "#zmc;instant;580,0;1896\n3;요시미;00;꼬리뼈 찍는 줄 알았네. 밑에 뭐가 깔려 있어서 다행이다…… 선생님은 괜찮아?\n#3;closeup\n#3;greeting\n#3;a"
2600503-37 = "#zmc;instant;580,0;1896\n3;요시미;02;……? 선생님? 선생님 어디 있어?\n#3;closeup\n#3;em;[?]"
2600503-38 = "#zmc;instant;580,0;1896\n[s] \"……\""
2600503-39 = "#zmc;instant;580,0;1896\n3;요시미;01;……\n#3;closeup"
2600503-40 = "#zmc;instant;580,0;1896\n3;요시미;00;……!!!\n#3;em;[?!]\n#3;shake\n#3;closeup"
2600503-41 = "#zmc;instant;580,0;1896\n3;요시미;09;무, 뭐, 뭐뭐뭐, 뭐하는 거야, 거기서! 이 변태가!!\n#3;closeup\n#3;stiff\n#3;em;[반응]"
2600503-42 = "#zmc;instant;580,0;1896\n3;요시미;09;비, 비비! 비켜 당장! 아니! 비켜야 하는 건 나지. 아니아니! 그러니까! 이건 그……!\n#3;closeup\n#3;shake\n#3;em;[///]"
2600503-43 = "#zmc;instant;580,0;1896\n3;요시미;09;그러니까……! 으아아악!! 몰라! 바보! 그냥 죽어, 진짜아아아!!\n#3;closeup\n#3;hophop"
2600503-44 = "#all;hide"
2600503-45 = "#na;(직후 요시미는 믿을 수 없는 속도로 테이블의 마카롱을 전부 집어삼키고 도망쳤다.)"
2600503-46 = "#na;(그리고 요시미의 기록을 넘은 사람이 없었기 때문에, 먹은 마카롱들도 모두 공짜가 되었다.)"

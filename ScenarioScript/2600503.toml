[translation]
2600503-1 = "ศึกดวลกินมาการอง"
2600503-2 = "มาแล้วเหรอคุณครู! ในระหว่างทางมาคงจะเห็นป้ายอันหนึ่งแล้วใช่มั้ย? มันคือเหตุผลที่ฉันเรียกครู#nออกมาเองล่ะ"
2600503-3 = "ใช่แล้ว! จะมีกิจกรรมยอดนิยมกิจกรรมหนึ่งที่จะจัดที่คาเฟ่นี้ทุกปี มันคือก็..."
2600503-4 = "<ศึกดวลกินมาการอง> !!!"
2600503-5 = "ศึกดวลกินมาการองคืออะไรน่ะเหรอ? ชื่อก็บอกหมดแล้วไม่ใช่เหรอน่ะ? ทีมที่กินได้มากที่สุดจะเป็น#nผู้ชนะ"
2600503-6 = "ผู้เข้าร่วมกิจกรรมทุกคนจะได้กินมาการองฟรี... จนกว่าจะยอมแพ้ ก็แค่นั้นแหละ"
2600503-7 = "หือ? ถ้ายอมแพ้จะเป็นยังไงน่ะเหรอ? ก็จะต้องจ่ายทั้งหมดที่กินไปน่ะสิ#nจะมีเพียงทีมเดียวเท่านั้นที่จะได้กินฟรี!"
2600503-8 = "ที่จริงมันเป็นกิจกรรมที่อันตรายมาก! มีบางคนถึงกับเป็นลมจนต้องหามไปโรงพยาบาลเลยล่ะ!"
2600503-9 = "คุณครูเข้าใจใช่มั้ย? เราไม่ได้มาเล่นๆ เรากำลังจะก้าวเข้าสู่สนามรบนะ!"
2600503-10 = "หื้อ? ฉันจะจ่ายให้หรือเปล่าน่ะเหรอ? แน่นอนสิ ฉันจะจ่ายค่ามาการองทั้งหมดให้เลยถ้าแพ้"
2600503-11 = "แต่ไม่ต้องห่วงหรอก เราไม่มีทางแพ้แน่นอน!"
2600503-12 = "คุณครูเป็นผู้ใหญ่แล้วนี่ ผู้ใหญ่ก็ต้องมีกระเพาะที่ใหญ่กว่า และก็เป็นผู้ใหญ่ที่ร่างโตสมกับที่#nเป็นผู้ใหญ่แล้ว!"
2600503-13 = "อะไรนะ? กระเพาะอาหารทั่วไปกับของหวานไม่เหมือนกันเหรอ? เงียบไปเลย! ครูก็แค่กังวลเกินไป#nหรอกน่า!"
2600503-14 = "เอาล่ะ เริ่มแล้ว! ก่อนอื่นก็เอามาการองมาเลย!"
2600503-16 = "(ศึกดวลกินมาการองได้เริ่มขึ้นแล้ว)"
2600503-17 = "(ถึงแม้ว่าโยชิมิจะคาดหวังไว้สูง แต่คุณครูก็คลื่นไส้อย่างรวดเร็วหลังจากที่กินมาการองไปได้แค่ 7 ชิ้นเท่านั้น)"
2600503-19 = "อะ... อึ่ก... ยากจังเลย... แต่ฉันไม่เป็นไร... ฉันต้องไม่เป็นไร ฉันยังกินได้อีก..."
2600503-20 = "หือ? คุณครู...? อะไรกัน ทำไมหยุดกินแล้วล่ะ...?"
2600503-21 = "[s1] \"ครูไม่ไหวแล้ว... จะ...ตายแล้ว...\"\n[s2] \"สงครามนี้จบแล้ว... ช่วยด้วย...\""
2600503-22 = "ทำไมพูดแบบนี้ล่ะ?! ครูเป็นผู้ใหญ่นะ! ทำได้แค่นี้เองงั้นเหรอ?"
2600503-23 = "(คะ... คุณครูดูท่าไม่ดีแล้ว... ถ้าเป็นแบบนี้ต่อไปเราต้องแพ้แน่ๆ...!)"
2600503-24 = "เข้มแข็งหน่อยสิคุณครู! อย่างน้อยก็อีก 20 ชิ้นเท่านั้น! ต้องทำได้อยู่แล้ว!"
2600503-25 = "ไม่นะ เรามากันขนาดนี้แล้ว เราจะยอมแพ้ไม่ได้นะ! รู้หรือเปล่าว่าเรากินกันไปเท่าไหร่แล้ว?!"
2600503-26 = "ฉันจะป้อนให้เองคุณครู! มานอนลงตรงนี้แล้วอ้าปาก!"
2600503-28 = "เดี๋ยวก่อน! จะหนีไปไหนน่ะ?! อ้าปากเร็วสิ! ยัดมาการองเข้าไปเลย!"
2600503-29 = "[s] (พยายามปิดปากอย่างเอาเป็นเอาตาย)"
2600503-30 = "คุณครู ขัดขืนไปก็เปล่าประโยชน์... อ๊ะ?"
2600503-31 = "เดี๋ยวสิ จะล้มแล้ว! อะ... อ้ากกกกกกก!!"
2600503-33 = "โครม!"
2600503-35 = ".... อึ่ก เจ็บจัง... มีอะไรอยู่ด้านหลังเนี่ย..."
2600503-36 = "นึกว่ากระดูกก้นกบจะหักซะแล้ว ดีที่มีอะไรรองอยู่ข้างล่าง... คุณครูเป็นอะไรรึเปล่า?"
2600503-37 = ".....? คุณครู? คุณครูอยู่ที่ไหนน่ะ?"
2600503-38 = "[s] \"...\""
2600503-39 = "......."
2600503-40 = "........!!!"
2600503-41 = "ทะ... ทะ... ทะ... ทำไม... ทำไมครูถึงไปอยู่ข้างล่างได้ล่ะ?! คนบ้า!"
2600503-42 = "ขะ... ขะ... เขยิบออกไปเลยนะ! ไม่สิ เดี๋ยว... ฉันขยับเอง ไม่ ไม่! นี่มัน...!"
2600503-43 = "พอแล้ว! อ้ากกกกก!! ตาบ้า! ตายซะเถอะ! ย้ากกกกกกก!"
2600503-45 = "(หลังจากนั้นโยชิมิก็ยัดมาการองที่เหลือเข้าปากตัวเองแล้ววิ่งหนีออกไปด้วยความเร็วแสง)"
2600503-46 = "(และในเมื่อไม่มีใครกินได้มากกว่าเธอ เราก็เลยได้กินฟรีไป)"

[translation]
2602-1 = "#title;어른의 장난감 2"
2602-2 = "#place;산해경 찻집, <도원향>"
2602-3 = "3;슌;03;후후, 일이 빨리 끝난 덕분에 오랜만에 여유가 생겼네요.\n#3;a\n#3;em;[음표]"
2602-4 = "3;슌;01;오늘은 하루 종일 차를 마시며 느긋하게 사색을 즐겨야……."
2602-5 = "#na;산해경 학생 A;……저 사람이지? '그 물건'을 구입했다는 매화원의 교관이……"
2602-6 = "#na;산해경 학생 B;상냥하고 무해한 사람이라고 생각했었는데, 뒤로는 그런 흉측한 물건을 쓰고 있었다니…… 다시 봤어."
2602-7 = "#na;산해경 학생 A;……그나저나 현무상회는 그런 물건도 구해줄 수 있는 거야?"
2602-8 = "#na;산해경 학생 B;역시 없는 것 빼고는 다 있는 현무상회네……."
2602-9 = "3;슌;08;으음, 어째서인지 따가운 시선이…….\n#3;stiff\n#3;em;[땀]"
2602-10 = "3;슌;06;이상하네요. 요새 산해경의 거리를 오갈 때면 다른 학생들이 이상한 시선으로 쳐다보는 것만 같아요."
2602-11 = "3;슌;09;누군가의 원한을 살만한 일은 한 적이 없는데…… 어째서일까요?\n#3;em;…"
2602-12 = "[s] \"안녕, 슌.\""
2602-13 = "3;슌;02;어머. 안녕하세요, 선생님. 오랜만에 뵙는 것 같네요.\n#3;em;[반응]"
2602-14 = "3;슌;01;후후…… 이곳에는 차를 드시러 오셨나요?"
2602-15 = "[s] \"응. 슌도 휴식 중이었어?\""
2602-16 = "3;슌;03;네, 저도 간만의 비번이라 여유롭게 휴식을 즐기는 중이었답니다.\n#3;em;[반짝]\n#3;greeting"
2602-17 = "3;슌;02;휴식을 즐기는 것 치고는 표정이 안 좋아 보인다고요?"
2602-18 = "3;슌;99;아하하…… 예리하시네요."
2602-19 = "3;슌;01;다름이 아니라 사소한 고민이 하나 생겨서요.\n#3;em;[반응]"
2602-20 = "[s1] \"괜찮다면 내가 들어줄게.\"\n[s2] \"학생의 고민을 들어주는 건 선생의 의무니까.\""
2602-21 = "3;슌;03;감사합니다. 그럼 솔직하게 말씀드릴게요.\n#3;em;[반짝]\n#3;greeting"
2602-22 = "3;슌;03;감사합니다. 그럼 솔직하게 말씀드릴게요.\n#3;em;[반짝]\n#3;greeting"
2602-23 = "#st;[0,0];instant;1;"
2602-24 = "#clearST"
2602-25 = "3;슌;01\n#3;d\n#wait;1000"
2602-26 = "3;슌;01\n#3;a\n#3;closeup\n#wait;2000"
2602-27 = "3;슌;05;……어쩐지 요즈음 저를 쳐다보는 다른 학생들의 시선이 이상해진 것 같아요.\n#3;em;…\n#3;closeup"
2602-28 = "3;슌;06;평소에는 살갑게 먼저 인사를 건네던 학생들도 요즘은 거리를 두는 것 같고, 이렇게 찻집에 앉아만 있어도 저에 대해 수군거리는 소리가 조금씩 들려오니…….\n#3;closeup"
2602-29 = "3;슌;09;뭔가 잘못을 했나 돌이켜 생각해봐도, 뾰족하게 떠오르는 일이 없어서 곤란하네요.\n#3;em;[땀]\n#3;stiff\n#3;closeup"
2602-30 = "[s3] \"으음…….\"\n[s4] \"그건 아마도…….\""
2602-31 = "3;슌;02;선생님께서는 뭔가 알고 계신가요?\n#3;closeup"
2602-32 = "3;슌;02;선생님께서는 뭔가 알고 계신가요?\n#3;closeup"
2602-33 = "3;슌;05;제가 모르는 잘못이 있다면 주저하지 말고 부디 알려주세요!\n#3;em;[!]\n#3;closeup"
2602-34 = "[s] 슌에게 최근 들은 소문에 대해 말해준다."
2602-35 = "#all;hide"
2602-36 = "3;슌;08\n#3;em;…\n#3;a\n#wait;2500"
2602-37 = "3;슌;10;네에?! 제가 <어른의 장난감>을 갖고 있다는 소문이 돌고 있다고요?!\n#3;closeup\n#bgshake\n#fontsize;80"
2602-38 = "[s] \"목소리가 커.\""
2602-39 = "3;슌;08;아, 아앗…… 너, 너무 흥분해서 목소리가 커지고 말았네요.\n#3;stiff"
2602-40 = "3;슌;04;그, 그보다 어째서 이런 망측한 소문이 돌게 된 거죠? 어른의 장난감은 커녕 비슷한 물건도 구입한 적이 없는데!\n#3;em;[땀]"
2602-41 = "[s] 현무상회에서 구입한 물건에 관해 묻는다."
2602-42 = "3;슌;02;잠깐, 선생님이 어째서 그 물건에 대해 알고 계시는 건가요?"
2602-43 = "3;슌;10;네? 그 물건 때문에 제가 <어른의 장난감>을 구입했다는 소문이 퍼지고 있다고요?\n#3;shake\n#3;em;[?!]"
2602-44 = "3;슌;09;으으…… 분명 비밀로 전달해달라고는 했지만, 설마 그 물건이 이런 오해를 불러올 줄이야……."
2602-45 = "3;슌;10;그건 정말 아무것도 아니라고요!\n#3;em;[땀]"
2602-46 = "3;슌;08;정말 단순한…… 단순한…….\n#3;stiff"
2602-47 = "3;슌;09;……단순한 피부 개선용 마사지 롤러였어요.\n#3;em;…\n#fontsize;50"
2602-48 = "[s] \"마사지 롤러?\""
2602-49 = "3;슌;08;네. 요새 피부가 유난히 거칠어진 것 같아서 현무상회를 통해 피부 미용에 좋다는 마사지 롤러를 주문했었는데……\n#3;em;[반응]"
2602-50 = "3;슌;08;매화원의 교관이 피부 미용에 신경 쓴다는 소문이 나면 다른 학생들이 안 좋은 시선으로 볼까 봐 비밀로 해달라고 했었거든요."
2602-51 = "3;슌;09;그런데 걱정했던 것과는 정반대의 터무니없는 소문이 돌게 될 줄이야. 으으…….\n#3;stiff\n#3;em;[속상함]"
2602-52 = "3;슌;06;하는 수 없지요. 행동에 떳떳하지 못했던 제 잘못도 있으니, 일일이 찾아다니며 오해를 푸는 수밖에……."
2602-53 = "3;슌;02;그나저나 선생님. 그 <어른의 장난감>이라는 말은 누구에게 처음으로 들으셨던 건가요?\n#3;em;[반응]"
2602-54 = "3;슌;05;다른 건 어쩔 수 없다지만, 사건을 이렇게까지나 키운 범인이 누구인지는 알아야겠어요!\n#3;stiff"
2602-55 = "3;슌;05;……알고 계신 걸 전부 말씀해주세요!\n#3;closeup\n#3;em;[!]"
2602-56 = "#all;hide"
2602-57 = "#na;(슌의 기세에 눌려 전에 코코나와 만나서 했던 이야기를 모두 실토하였다.)"
2602-58 = "#all;hide"
2602-59 = "#wait;500"
2602-60 = "#na;매화원 학생 C;코코나 쨩. 슌 언니가 무시무시한 <어른의 장난감>을 가지고 있다는 게 사실이야?"
2602-61 = "3;코코나;05;코코나 쨩이 아니라, 코코나 교관이라니까!\n#3;hophop\n#3;a"
2602-62 = "3;코코나;01;뭐, 비밀이기는 하지만. 언니가 현무상회에서 무시무시한 <어른의 장난감>을 구입한 건 사실이야."
2602-63 = "3;코코나;99;어린아이는 보기만 해도 겁에 질려 얼어붙을 만큼, 오싹한 모습의 장난감이—\n#3;em;…"
2602-64 = "#st;[0,0];instant;1;"
2602-65 = "#clearST"
2602-66 = "#wait;2000"
2602-67 = "2;슌;05\n3;코코나;99\n#2;a\n#wait;1500"
2602-68 = "2;슌;05;……코코나 쨩?\n#2;em;[?]\n#3;m4"
2602-69 = "2;슌;05;……분명히 그때 안에 든 물건이 무엇인지 보지 않았다고 하지 않으셨나요?"
2602-70 = "3;코코나;11;으, 으햑?!\n#3;shake\n#3;em;[?!]"
2602-71 = "3;코코나;04;어, 언니? 오, 오늘은 비번 아니었어?!\n#3;em;[땀]"
2602-72 = "2;슌;99;네. 하지만 귀여운 여동생이 저에 대한 거짓말을 마구 퍼트리고 다닌다는 사실을 듣고 바로 돌아왔지요."
2602-73 = "3;코코나;11;거, 거짓말? 그럼 그 안에 들어있었던 게 어른의 장난감이 아니었단 말이야?\n#3;stiff"
2602-74 = "2;슌;05;당연하죠! 제가 왜 그런 걸 주문하겠어요?\n#2;em;[!]"
2602-75 = "2;슌;09;차라리 그 때 봉투 안을 확인해보았더라면, 일이 이만큼 커지지는 않았을 텐데…….\n#2;stiff\n#fontsize;50"
2602-76 = "2;슌;05;사실 여부를 떠나 매화원의 교관이나 되는 사람이 비밀 하나도 지키지 못하고 나쁜 말을 퍼트리고 다니다니…… 어린아이들이 무얼 보고 배우겠어요?\n#2;em;[반응]"
2602-77 = "2;슌;99;나쁜 말을 퍼트린 코코나 쨩에게는……"
2602-78 = "#all;hide"
2602-79 = "3;슌;05;언니의 특별 교육을 진행하겠습니다!\n#3;em;[!]\n#3;closeup\n#fontsize;80"
2602-80 = "#all;hide"
2602-81 = "3;코코나;09;으앙! 언니, 용서해 줘!\n#3;a\n#3;hophop"
2602-82 = "#all;hide"
2602-83 = "#na;이후 소문이 더 퍼져 나가는 것은 그쳤지만……"
2602-84 = "#na;슌이 무시무시한 <어른의 장난감>을 갖고 있다는 오해는 한동안 산해경 학생들 사이에서 사라지지 않았다……."
2602-85 = "#ENDING;어른의 장난감"

[translation]
2602-1 = "大人的玩具（２）"
2602-2 = "山海經．茶館「桃源鄉」"
2602-3 = "呵呵。沒想到會這麼快就把工作結束而有了餘裕，真是久違了呢。"
2602-4 = "今天一天，就這樣喝著茶悠閒度過……"
2602-5 = "……是那個人吧？買了「那個」的梅花園教官……"
2602-6 = "原本還以為是個溫柔又善良的人……人不可貌相呢。"
2602-7 = "比起這個，向那個……玄武商會委託的話，果然那種事也會通融啊……？"
2602-8 = "似乎是呢，不愧是那個有名的玄武商會……"
2602-9 = "……？總覺得，有視線……？"
2602-10 = "為什麼呢。最近像這樣在外面的時候，就會感覺到來自其他學生的視線……？"
2602-11 = "應該沒有和誰結怨呀……"
2602-12 = "[s] 「早安，旬。」"
2602-13 = "啊啦，老師。辛苦你了，感覺好久不見了呢。"
2602-14 = "老師也是，來喝茶的嗎？"
2602-15 = "[s] 「嗯，旬也在休息中？」"
2602-16 = "是的。因為久違的提早結束工作了，所以想稍微悠閒一下。"
2602-17 = "不過卻擺著無法釋懷的表情……是嗎？"
2602-18 = "呵呵……不愧是老師，很敏銳呢。"
2602-19 = "其實，該說是……煩惱嗎，有點在意的事情。"
2602-20 = "[s1] 「那個，我聽也可以嗎？」\n[s2] 「身為老師，如果是為了學生有我能做到的事我很樂意。」"
2602-21 = "……謝謝你，老師。"
2602-22 = "……謝謝你，老師。"
2602-27 = "其實……總覺得最近，該說是，會感覺到奇怪的視線嗎。"
2602-28 = "平常總是感情友好的人，不知為何和我保持距離……光是像這樣坐下，也感覺到經過的人看著我不知道在說著什麼……"
2602-29 = "雖然我回想了自己最近的作為，不過還是沒有特別想到什麼頭緒……"
2602-30 = "[s3] 「那個……」\n[s4] 「那大概是……」"
2602-31 = "老師，你知道些什麼嗎？"
2602-32 = "老師，你知道些什麼嗎？"
2602-33 = "請告訴我！如果我有什麼地方不好的話，我會改正的……！"
2602-34 = "[s] 將最近成為傳聞的旬的事情，告訴本人。"
2602-37 = "我，我買了「大人的玩具」！？"
2602-38 = "[s] 「太大聲了……！」"
2602-39 = "啊啊，不好意思……不，不小心，太興奮了……"
2602-40 = "比起這個為什麼會有那種，下，下流的傳聞……！？我，別說是大人的玩具了，就連那種類型的東西一次都沒有買過……！"
2602-41 = "[s] 詢問關於「在玄武商會買的東西」。"
2602-42 = "……？啊啦，老師為什麼提起那件事……？"
2602-43 = "咦，就是那個變成了「大人的玩具」的傳聞……？"
2602-44 = "唔唔，是那麼回事啊……！確實說了是祕密，不過竟然會變成這樣……！"
2602-45 = "不，不是的老師！"
2602-46 = "那只是單純的，單純的……"
2602-47 = "……單純的，用在肌膚上的按摩滾輪。"
2602-48 = "[s] 「按摩滾輪？」"
2602-49 = "是的……總覺得最近，肌膚有些粗糙。所以，才向玄武商會下訂了傳聞「對肌膚有效」的按摩滾輪……"
2602-50 = "我想著梅花園的教官竟然會在意美容什麼的，會讓人覺得不太好，所以才當作祕密的……"
2602-51 = "明明只是這樣，沒想到，沒想到會變成那麼，淫靡的傳聞……唔……"
2602-52 = "……沒辦法。畢竟原因在於我想保密，只能一點一點的解開誤會了……"
2602-53 = "……話說老師。那個「大人的玩具」這件事，是從誰聽說的呢？"
2602-54 = "再怎麼說以這麼快的速度散播實在是很奇怪……該不會，有誰正在積極的散播這件事的可能性……！"
2602-55 = "老師！請把知道的，全部都說出來！"
2602-57 = "（被旬的氣勢壓著，雖然實際上如何並不清楚……說著一些前言，將和心菜遇到時的事說出口了）"
2602-60 = "吶～吶～心菜醬。旬姊姊有「可怕的大人的玩具」是真的嗎～？"
2602-61 = "所以說不是心菜醬，是心菜教官！"
2602-62 = "……然後，雖然這是祕密。不過旬姊姊在玄武商會買「大人的玩具」是真的。"
2602-63 = "是小孩子光是看到就會失去意識，有著非常可怕外型的噁心玩具──"
2602-68 = "……心菜醬？"
2602-69 = "剛才說的話，可以詳細說給我聽嗎？"
2602-70 = "唔啊！？"
2602-71 = "旬，旬姊姊！？今，今天不是休息……！？"
2602-72 = "是的。不過我得知看來我可愛的妹妹，也許正在散播我的不實謠言……"
2602-73 = "咦，騙人！？那麼，裝在那裡面的不是「大人的玩具」嗎……！？"
2602-74 = "怎麼可能有那種事啊！？"
2602-75 = "啊啊真是，乾脆那時候讓妳確認內容物的話，就不會變成這樣……"
2602-76 = "這個先暫且不提。身為梅花園的教官，竟然沒辦法遵守與他人的祕密到處散播……孩子們看著那個樣子會成長成什麼樣，心菜醬也知道吧？"
2602-77 = "對於這樣的心菜醬……"
2602-79 = "作為姊姊，必須進行特殊的「教育」才行呢……？"
2602-81 = "唔哇啊啊啊！我不要那個！？原諒我──！！！"
2602-83 = "（總之，即使成功阻止了傳聞的源頭……）"
2602-84 = "不過旬有著「驚人的大人的玩具」這項誤解，還是在山海經的學生們流傳了一陣子……"
2602-85 = "大人的玩具"

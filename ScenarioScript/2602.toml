[translation]
2602-1 = "A Grown-Up's Toy Part 2"
2602-2 = "Shanhaijing, Peach Blossom Spring"
2602-3 = "I usually never have this much free time after work."
2602-4 = "This calls for some relaxing tea and meditation."
2602-5 = "That's her, right? The Plum Blossom Garden teacher who bought...you know."
2602-6 = "I always thought she was so sweet and innocent, but if that's the kind of thing she does in her spare time, who knows what she's into?"
2602-7 = "...By the way, can you really get stuff like that at the Black Tortoise Promenade?"
2602-8 = "I guess the Promenade really does have everything."
2602-9 = "Hmm. Why does it feel like other people are staring at me?"
2602-10 = "It's as though all the other students are staring at me any time I walk Shanhaijing's streets these days."
2602-11 = "I don't think I've done anything wrong. I wonder what's going on."
2602-12 = "[s] \"Hi, Shun.\""
2602-13 = "Oh. Hello, Sensei. I haven't seen you in a while."
2602-14 = "Are you here for some tea?"
2602-15 = "[s] \"You got it. Are you taking a break too?\""
2602-16 = "I'm done for the day, actually, so I've been trying to enjoy my down time."
2602-17 = "Ah. So you can sense that it's been a struggle for me."
2602-18 = "You're always so sharp, Sensei."
2602-19 = "It's nothing really—just a minor thing that's been bothering me."
2602-20 = "[s1] \"You can always tell me if you'd like.\"\n[s2] \"A sensei is supposed to listen to their students.\""
2602-21 = "Thank you. I'll be honest with you, then."
2602-22 = "Thank you. I'll be honest with you, then."
2602-27 = "For some reason, I get the feeling that the other students have been looking at me strangely."
2602-28 = "Even the ones that are usually the nicest have been keeping their distance. I can't even sit here in the teahouse without sensing that people are gossiping about me."
2602-29 = "But nothing comes to mind when I try to recall what it is I've done to warrant it."
2602-30 = "[s3] \"Um...\"\n[s4] \"It could be because of...\""
2602-31 = "Do you know something, Sensei?"
2602-32 = "Do you know something, Sensei?"
2602-33 = "If there's something I did wrong without realizing it, then please tell me!"
2602-34 = "[s] Tell Shun what likely started the rumor."
2602-37 = "What?! You think the rumors have do with me purchasing an adult toy?!"
2602-38 = "[s] \"Everyone can hear you.\""
2602-39 = "O-Oh... I may have gotten a little worked up there."
2602-40 = "M-More importantly, how did such an absurd rumor even start? I don't own that sort of thing!"
2602-41 = "[s] Ask about the item she purchased from the Black Tortoise Promenade."
2602-42 = "How do you know about that?"
2602-43 = "What?! That's where the rumor started from?!"
2602-44 = "*sigh* I did ask for that item to be delivered in secret, but I never thought it would cause such a misunderstanding..."
2602-45 = "You've got the wrong idea!"
2602-46 = "It's just a... It's a simple..."
2602-47 = "It's a massage roller to help my skin."
2602-48 = "[s] \"A massage roller?\""
2602-49 = "Yes. I've been particularly worried about my skin and getting wrinkles lately, so I ordered a massage roller from the Promenade that's said to be good for your skin."
2602-50 = "I thought it would be embarrassing if the students knew I was so concerned about wrinkles, so I wanted to keep it a secret."
2602-51 = "Never did I expect such a ridiculous rumor to spread all because I tried to hide the truth. Ugh..."
2602-52 = "This is all my fault for trying to keep secrets. I'll have to go around and try to clear up the misunderstanding."
2602-53 = "Do you know how this rumor started in the first place, Sensei?"
2602-54 = "I can't control everything people believe, but I'd like to know who would start such an insidious rumor!"
2602-55 = "Please tell me everything you know!"
2602-57 = "I couldn't stand the pressure and confessed everything that had happened between me and Kokona that day."
2602-60 = "Kokona. Is it true that Shun has a scary grown-up toy?"
2602-61 = "Don't just call me Kokona. Call me Instructor Kokona!"
2602-62 = "Well, it's a secret, but it is true that Shun purchased scary grown-up toy from the Promenade."
2602-63 = "It's a creepy-looking toy that will make a child freeze in fear just by looking—"
2602-68 = "Kokona?"
2602-69 = "Didn't you tell me that you didn't see what was inside?"
2602-70 = "E-Eek!"
2602-71 = "Sh-Shun? A-Aren't you off duty today?!"
2602-72 = "Yes, but then I heard my cute little sister has been spreading lies about me, so I came back right away."
2602-73 = "L-Lies? Then the item inside the bag wasn't a grown-up's toy?"
2602-74 = "Of course not! Why would I order something like that?"
2602-75 = "Are you saying that you didn't look inside at all, and that's why things had gotten so out of hand?"
2602-76 = "Whatever the case, it's unacceptable for a Plum Blossom Garden instructor to spread rumors. What kind of example are you setting for the young children?"
2602-77 = "So I've made a decision. For spreading such rude gossip..."
2602-79 = "...you'll have to undergo my special lesson!"
2602-81 = "Anything but that! Please forgive me, Shun!"
2602-83 = "The rumors stopped spreading after that day..."
2602-84 = "...but the misconception that Shun had a terrifying \"grown-up toy\" persisted among the Shanhaijing students for a while."
2602-85 = "A Grown-Up's Toy"

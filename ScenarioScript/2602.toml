[translation]
2602-1 = "ของเล่นของผู้ใหญ่ 2"
2602-2 = "ร้านน้ำชาซานไห่จิง <นิทานดอกท้อ>"
2602-3 = "ฮุฮุ งานเสร็จเร็วแบบนี้ จะได้มีเวลาว่างที่ไม่มีมานานสักทีนะคะ"
2602-4 = "วันนี้จะดื่มชาและปล่อยใจไปกับความคิดทั้งวัน..."
2602-5 = "...คนนั้นนี่? ผู้ฝึกสอนในสวนต้นบ๊วยที่ซื้อ 'ของนั้น' ไง..."
2602-6 = "ฉันนึกว่าเธอจะเป็นคนอ่อนโยนและไม่เป็นอันตราย แต่กลายเป็นว่าเธอใช้ของน่าเกลียดแบบนั้น... ต้องมองเธอใหม่ซะแล้วสิ"
2602-7 = "...แต่ย่านการค้าเทพเต่าดำสามารถหาของแบบนั้นได้ด้วยเหรอ?"
2602-8 = "ย่านการค้าเทพเต่าดำมีของทุกอย่างเว้นแต่หมดแล้วจริงๆ..."
2602-9 = "หืม ทำไมตากระตุกแบบนี้..."
2602-10 = "แปลกจังค่ะ ช่วงนี้เวลาเดินไปตามถนนในซานไห่จิง เหมือนนักเรียนคนอื่นมองฉันด้วยสายตาแปลกๆ ค่ะ"
2602-11 = "ฉันไม่เคยทำอะไรให้ใครเจ็บแค้นนะ... ทำไมกันนะคะ?"
2602-12 = "[s] \"สวัสดีชุน\""
2602-13 = "อุ๊ย สวัสดีค่ะคุณครู ไม่ได้เจอกันนานเลยนะคะ"
2602-14 = "ฮุฮุ... มาดื่มชาที่นี่เหรอคะ?"
2602-15 = "[s] \"อื้อ ชุนเองก็พักอยู่เหรอ?\""
2602-16 = "ใช่ค่ะ ตอนนี้ฉันกำลังดื่มด่ำกับเวลาพักผ่อนอยู่ค่ะ"
2602-17 = "ฉันดูไม่เหมือนกำลังดื่มด่ำกับเวลาพักผ่อนเหรอคะ?"
2602-18 = "ฮ่ะฮ่า... คุณครูนี่ตาดีจังเลยนะคะ"
2602-19 = "ไม่มีอะไรมากหรอกค่ะ แค่มีเรื่องกลุ้มใจนิดหน่อยค่ะ"
2602-20 = "[s1] \"เล่าให้ครูฟังได้นะ ถ้าเธอยินดี\"\n[s2] \"มันเป็นหน้าที่ของครูที่จะรับฟังเรื่องกลุ้มใจของนักเรียน\""
2602-21 = "ขอบคุณนะคะ ถ้างั้นฉันจะเล่าอย่างตรงไปตรงมาเลยนะคะ"
2602-22 = "ขอบคุณนะคะ ถ้างั้นฉันจะเล่าอย่างตรงไปตรงมาเลยนะคะ"
2602-27 = "...ช่วงนี้เหมือนว่านักเรียนคนอื่นจะมองฉันด้วยสายตาแปลกๆ ค่ะ ไม่รู้เลยค่ะว่าเป็นเพราะอะไร"
2602-28 = "ปกตินักเรียนทุกคนจะเข้ามาทักทายฉันก่อนอย่างอ่อนโยน แต่ช่วงนี้ดูห่างเหินไป แค่นั่งในร้านน้ำชาแบบนี้ก็ได้ยินเสียงซุบซิบเกี่ยวกับฉัน..."
2602-29 = "ถึงจะพยายามย้อนคิดดูว่าฉันไปทำผิดพลาดอะไรไว้บ้าง แต่ก็นึกเรื่องแบบนั้นไม่ออกเลยค่ะ"
2602-30 = "[s3] \"อืมม...\"\n[s4] “อาจจะเป็นเรื่องนั้น...\""
2602-31 = "คุณครูรู้อะไรบ้างไหมคะ?"
2602-32 = "คุณครูรู้อะไรบ้างไหมคะ?"
2602-33 = "ถ้าฉันทำผิดพลาดไปโดยไม่รู้ตัว บอกฉันได้เลยนะคะ!"
2602-34 = "[s] เล่าข่าวลือที่ได้ยินมาช่วงนี้ให้ชุนฟัง"
2602-37 = "คะ?! มีข่าวลือว่าฉันมี <ของเล่นของผู้ใหญ่> เหรอคะ?!"
2602-38 = "[s] \"เสียงดังเกินไปแล้วนะ\""
2602-39 = "อ๊ะ... ฉันตื่นเต้นมากจนเผลอพูดเสียงดังไปค่ะ"
2602-40 = "ที่สำคัญกว่านั้นคือ ทำไมข่าวลือที่น่าอายนี้ถึงแพร่กระจายออกไปได้มากกว่าค่ะ ฉันไม่เคยซื้อของเล่นของผู้ใหญ่แบบนั้นเลยนะคะ!"
2602-41 = "[s] ถามเรื่องของที่ซื้อไปจากย่านการค้าเทพเต่าดำ"
2602-42 = "เดี๋ยวค่ะ คุณครูรู้เรื่องของนั่นได้ยังไงคะ?"
2602-43 = "คะ? บอกว่าข่าวลือที่ฉันซื้อ <ของเล่นของผู้ใหญ่> มาจากของนั่นเหรอคะ?"
2602-44 = "อืม... จริงที่ฉันขอให้ส่งของให้อย่างลับๆ แต่ไม่คิดว่ามันจะกลายเป็นความเข้าใจผิดแบบนี้..."
2602-45 = "มันไม่มีอะไรแบบนั้นจริงๆ นะคะ!"
2602-46 = "มันเป็นแค่ของธรรมดา... ธรรมดา..."
2602-47 = "...แค่ลูกกลิ้งนวดหน้าบำรุงผิวธรรมดาเท่านั้นค่ะ"
2602-48 = "[s] \"ลูกกลิ้งนวดหน้าเหรอ?\""
2602-49 = "ค่ะ ช่วงนี้ผิวของฉันดูหยาบกร้าน ก็เลยสั่งลูกกลิ้งนวดหน้าที่ย่านการค้าเทพเต่าดำบอกว่าดีต่อการบำรุงผิวมาค่ะ..."
2602-50 = "ถ้ามีข่าวลือว่าผู้ฝึกสอนในสวนต้นบ๊วยสนใจเรื่องการบำรุงผิว มันก็อาจจะดูไม่ดีในสายตานักเรียนคนอื่น ฉันเลยขอให้เก็บเป็นความลับค่ะ"
2602-51 = "แต่ไม่คิดเลยว่าข่าวลือไร้สาระที่ตรงกันข้ามกับที่ฉันกังวลไว้ทีแรกมันจะแพร่กระจายออกไป อ่า..."
2602-52 = "ช่วยไม่ได้นะคะ มันเป็นความผิดของฉันที่ไม่ทำอย่างเปิดเผยเอง เพราะแบบนั้นฉันเลยทำได้แค่ตามแก้ไขความเข้าใจผิดเท่านั้น..."
2602-53 = "ว่าแต่คุณครูคะ เรื่อง <ของเล่นของผู้ใหญ่> นั่น คุณครูไปได้ยินมาจากใครเป็นคนแรกเหรอคะ?"
2602-54 = "แม้ว่าเรื่องอื่นฉันจะทำอะไรไม่ได้แล้ว แต่ฉันต้องรู้ตัวคนร้ายที่กุเรื่องนี้ขึ้นมาให้ได้ค่ะ!"
2602-55 = "...ช่วยเล่าทุกอย่างให้ฉันฟังด้วยค่ะ!"
2602-57 = "(หลังจากที่ถูกชุนคาดคั้น คุณครูก็เล่าทุกอย่างที่พบมากับโคโคน่าให้ฟัง)"
2602-60 = "โคโคน่าจัง ที่ว่าพี่ชุนมี <ของเล่นของผู้ใหญ่> น่ากลัวเป็นความจริงเหรอ?"
2602-61 = "ไม่ใช่โคโคน่าจังนะ ผู้ฝึกสอนโคโคน่าต่างหากล่ะ!"
2602-62 = "นี่เป็นความลับนะ เรื่องที่พี่ชุนซื้อ <ของเล่นของผู้ใหญ่> น่ากลัวๆ มาจากย่านการค้าเทพเต่าดำเป็นความจริงนะ"
2602-63 = "ของเล่นรูปร่างน่าขนลุก ระดับที่พอเด็กๆ เห็นแล้วก็จะกลัวจนขนลุกซู่เลยล่ะ"
2602-68 = "โคโคน่าจัง...?"
2602-69 = "ตอนนั้นบอกว่าไม่ได้เปิดดูของข้างในไม่ใช่เหรอคะ...?"
2602-70 = "ฮะ... เฮือก?!"
2602-71 = "พะ... พี่ชุน! วะ... วันนี้หยุดไม่ใช่เหรอคะ?!"
2602-72 = "ใช่ค่ะ แต่พี่ก็รีบกลับมาทันทีที่ได้ยินว่าน้องสาวที่น่ารักปล่อยเรื่องโกหกเกี่ยวกับพี่ออกไปค่ะ"
2602-73 = "เรื่องโกหกเหรอคะ? ถ้างั้นข้างในซองนั่นไม่ใช่ของเล่นของผู้ใหญ่เหรอคะ?"
2602-74 = "ไม่ใช่อยู่แล้วค่ะ! พี่จะสั่งของอย่างนั้นไปทำไมล่ะคะ?"
2602-75 = "ถ้าเปิดดูของในถุงตั้งแต่ตอนนั้น คงไม่เกิดเรื่องใหญ่ขนาดนี้..."
2602-76 = "ไม่ว่าจะเป็นความจริงหรือไม่ เธอผู้เป็นผู้ฝึกสอนในสวนต้นบ๊วย แต่ไม่สามารถรักษาความลับ#nและปล่อยข่าวลือไม่ดีออกไป... แล้วแบบนี้จะเป็นตัวอย่างให้เด็กๆ ได้ยังไงคะ?"
2602-77 = "โคโคน่าจังที่ปล่อยข่าวลือไม่ดี..."
2602-79 = "จะต้องได้รับการอบรมพิเศษจากพี่สาวคนนี้ค่ะ!"
2602-81 = "งือ! พี่คะ ยกโทษให้ด้วย!"
2602-83 = "แล้วข่าวลือก็สิ้นสุดลงนับจากนั้นเป็นต้นมา แต่ทว่า..."
2602-84 = "สายตาของนักเรียนซานไห่จิงที่เข้าใจผิดว่าชุนมี <ของเล่นของผู้ใหญ่> น่ากลัวๆ กลับไม่ได้หายไป..."
2602-85 = "ของเล่นของผู้ใหญ่"

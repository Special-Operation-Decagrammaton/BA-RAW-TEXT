[translation]
63020-1 = "#title;제2화;그럼에도 불구하고"
63020-2 = "1;니코 스바루;01\n5;사오리;S2_06\n#1;a\n#5;a\n#1;h\n#5;h\n#wait;1000"
63020-3 = "5;사오리;S2_05;그 앞에는, 무엇이 있지?"
63020-4 = "1;니코 스바루;04;……!\n#1;em;[!]"
63020-5 = "5;사오리;S2_02;이왕 과거라는 것을 이야기한 김에, 조금 더 그 이야기를 해 보도록 하지."
63020-6 = "1;니코 스바루;05;……지나간 추억에 집착하는 것은 노쇠와 약화의 증거라고 하던데, 이미 그렇게 된 건가요?\n#1;em;…"
63020-7 = "5;사오리;S2_06;그럴지도 모르지. 확실히 예전에 비해 무뎌졌다는 감각은 있다."
63020-8 = "5;사오리;S2_02; ……이것도 저것도, 선생 앞에서 우리가 함부로 꺼낼 이야기는 아닌 것 같긴 하지만."
63020-9 = "5;사오리;S2_99;하지만 그것을 대가로 얻게 된 것도, 분명히 있었다."
63020-10 = "5;사오리;S2_02;예전이 기억나는군. 가혹한 교관과 친절한 백부장의 이야기, 알고 있나?"
63020-11 = "1;니코 스바루;27;모를 리가요. 조직 운영에는 거의 필수적인 요소들이죠."
63020-12 = "1;니코 스바루;05;그런데 설마 자신이 친절한 백부장이었다는 말을 하고 싶은 것은 아니겠지요?"
63020-13 = "#st;[0,0];instant;1;"
63020-14 = "#clearST"
63020-15 = "1;니코 스바루;05\n5;사오리;S2_28\n#5;em;[한숨]\n#1;h\n#5;h\n#wait;1200"
63020-16 = "5;사오리;S2_03;그럴 리가. 나는 어떻게 봐도 가혹한 교관이었다. 친절한 백부장이라고 하면, 네 쪽이었지."
63020-17 = "1;니코 스바루;03;사람은 살아온 대로 살아갈 수밖에 없는 법이니까요."
63020-18 = "#all;hide"
63020-19 = "#na;사오리;그래. 이제 와서는 아무래도 상관없는 일이 되었지만, 스쿼드는 나름 선발을 거친 인원들이었다."
63020-20 = "#na;사오리;그리고 그 리더에게는 당연히, 다른 아이들보다 더 가혹한 훈련이 주어져야 했고."
63020-21 = "#all;hide"
63020-22 = "#na;사오리;……나는 결국 내 과거를 넘어서지 못했어. 배우고 경험한 대로밖에, 다른 모두를 대할 수 없었지."
63020-23 = "3;사오리;S2_06\n#3;a"
63020-24 = "3;사오리;S2_16;………다시 생각해 봐도, 정말 멍청한 짓이야.\n#3;stiff"
63020-25 = "1;니코 스바루;03;그 부분을 굳이 비하할 필요는 없습니다. 이것 참, 제가 여기에서 당신을 위로하게 될 줄은 몰랐네요.\n#1;ar\n#3;m5\n#1;em;[재잘]"
63020-26 = "1;니코 스바루;01;말씀드렸듯이, 사람은 살아온 대로 살아가기 마련이잖아요?"
63020-27 = "3;사오리;S2_03;그래. 나도 그렇게 생각했어."
63020-28 = "#st;[0,0];instant;1;"
63020-29 = "#clearST"
63020-30 = "1;니코 스바루;01\n3;사오리;S2_03\n#1;d\n#3;d\n#1;h\n#3;h\n#wait;1200"
63020-31 = "#all;hide"
63020-32 = "3;사오리;S2_05;아리우스에 있었을 때는 말이지.\n#3;a\n#3;closeup"
63020-33 = "#st;[0,0];instant;1;"
63020-34 = "#clearST"
63020-35 = "3;니코 스바루;04\n#wait;1000\n#3;closeup"
63020-36 = "3;니코 스바루;10;……뭐라고요?\n#3;em;[?]\n#3;closeup"
63020-37 = "3;사오리;S2_06;확률적인 이야기이지만, 사람은 사는 대로 생각하게 된다. 적지 않은 사람이 그래. 그리고 그 생각이 다시 자신의 삶을 재생산하지."
63020-38 = "3;사오리;S2_05;그런 관점에서 네 의견 역시, 틀린 것은 아닐 거다."
63020-39 = "3;사오리;S2_02;그러나 동시에…… 생각하는 대로 살아갈 가능성 역시 가지고 있는 것이, 사람이기도 하다."
63020-40 = "3;사오리;S2_99;아리우스를 나간 뒤 내가 배운 것이라면, 그 정도였을 거야."
63020-41 = "#st;[0,0];instant;1;"
63020-42 = "#clearST"
63020-43 = "3;니코 스바루;13\n#wait;1000"
63020-44 = "3;니코 스바루;05;무슨 말을 하고 싶은 겁니까?"
63020-45 = "3;사오리;S2_23;네가 느끼고 있는 것이 무엇인지 나는 안다. 나도 같았으니까."
63020-46 = "3;사오리;S2_02;길을 잃은 아이들에게 나아갈 길을 제시하고, 그 아이들에게 살아갈 의지를 불어넣어 주며."
63020-47 = "3;사오리;S2_99;거기에서부터 너 역시 살아갈 의미와 의지를 얻고 있었겠지."
63020-48 = "3;사오리;S2_05;하지만 그다음에는 무엇이 있지? 네가 이야기한 <아리우스의 방식>, 그 마지막에는?"
63020-49 = "#st;[0,0];instant;1;"
63020-50 = "#clearST"
63020-51 = "3;니코 스바루;05\n#3;em;…\n#wait;2500"
63020-52 = "3;사오리;S2_02;대답할 필요 없어. 우리 둘 다 알고 있으니까. 거기에는 오직…… 증오와 분노가 전부지."
63020-53 = "3;사오리;S2_06;그 외에는 아무것도 없다. 무의미해. 어떤 것도 남지 않지. 그건 그런 방식이니까."
63020-54 = "3;사오리;S2_06;나 역시 계속 아리우스에 남은 채, 다른 세상이 있다는 것을 알지 못하고."
63020-55 = "3;사오리;S2_99;……'선생님'을 만나지 못했다면…… 너와 조금도 다르지 않은 방식으로 살아가고 있었겠지."
63020-56 = "3;사오리;S2_02;계속해서 가혹한 교관을 연기하며, 내가 아는 것 이외의 모든 것을 부정하고."
63020-57 = "#na;사오리;우리의 것이라고 여긴 증오를, 끝없이 가슴 속에 품은 채 말이야.\n#3;hide"
63020-58 = "3;니코 스바루;09;……그 방식이 틀린 것이라고, 이제 와서 아리우스를 비난할 생각입니까?\n#3;stiff\n#3;em;[빠직]"
63020-59 = "3;사오리;S2_99;천만에. 그건 틀리거나 맞다고 판단을 내릴 수 있는 영역이 아니야. 그때에도 지금도, 그 생각에는 변함이 없어."
63020-60 = "3;사오리;S2_02;다만 자기가 알고 있는 테두리 바깥의 세상에 대해서, 조금이라도 좋으니 '공부'를 한 다음."
63020-61 = "3;사오리;S2_05;다시 한번 생각해 보는 것도, 때로는 도움이 될 수 있다는 이야기야."
63020-62 = "3;사오리;S2_06;……관점이란 건, 생각보다 더 자주 바뀌고 흔들릴 수 있는 것이니까."
63020-63 = "3;사오리;S2_99;아무것도 모르는 녀석들, 가령 네 표현으로는 트리니티의 아가씨들이 이런 말을 한다면."
63020-64 = "3;사오리;S2_03;그거야말로 가식과 위선에 가득 찬, 낙관주의자의 대책 없는 소리처럼 들릴지도 모르지."
63020-65 = "3;사오리;S2_05;하지만…… 최소한 나와 스쿼드는, 조금이지만, 이런 의견을 낼 수도 있을 거라고 생각한다."
63020-66 = "3;사오리;S2_06;……이 밑바닥에서 굴러먹은 것은, 너나 스쿼드나 모두 마찬가지였으니까."
63020-67 = "1;티파티 부원 A;03\n3;트리니티 학생;03\n5;티파티 부원 B;03\n#1;a\n#3;a\n#5;a\n#1;h\n#3;h\n#5;h"
63020-68 = "#na;사오리;그래. 대책 없는 낙관주의자 같은 거, 나도 좋아하지 않았다."
63020-69 = "#na;사오리;솔직히 말하자면, 싫어했지. 증오스러웠고, 미움밖에 가질 것이 없었어."
63020-70 = "#na;사오리;세상의 어떤 면은 이렇게나 끔찍한데, 그런 것들은 알아보려고도 하지 않고."
63020-71 = "#na;사오리;무작정 자기들만의 관점을 강요하는 것이 정말로 보기 싫었다."
63020-72 = "#na;사오리;하지만 어떤 낙관주의자들은 그렇지 않았어. 오히려……."

[translation]
63020-1 = "第2話;即便如此"
63020-3 = "在那前方……究竟有什麼呢？"
63020-4 = "……！"
63020-5 = "既然你提到了過去，不如就來多聊聊這個話題吧。"
63020-6 = "我曾聽說執著於過去的回憶，是老化和衰弱的證據。#n難道你現在已經變成那樣了嗎……？"
63020-7 = "或許是吧。#n我也確實感覺自己變得比以前遲鈍了。"
63020-8 = "雖然這個話題，似乎不太應該隨便在老師面前提起……"
63020-9 = "不過相對地，我也確實得到了一些東西。"
63020-10 = "不禁讓我回想起從前的事了呢。#n你知道嚴厲的教官和親切的百夫長的故事嗎？"
63020-11 = "我當然知道。#n那可是組織的運作上不可或缺的概念啊。"
63020-12 = "怎麼，你該不會想說自己是親切的百夫長吧？"
63020-16 = "怎麼可能。我的角色怎麼看都是嚴厲的教官吧？#n真要說誰是親切的百夫長的話，我看應該是你才對。"
63020-17 = "誰叫人們終究只能依照自己一路走來的方式活下去呢。"
63020-19 = "是啊。#n雖然事到如今已經無關緊要了，不過小隊成員本來就是歷經一番篩選後才選出來的。"
63020-20 = "而作為小隊的隊長，自然也必須接受比其他人更嚴苛的訓練。"
63020-22 = "……到頭來，我終究還是沒能超越自己的過去。#n只能用我所學過、所經歷過的方式去對待其他人。"
63020-24 = "……現在回想起來，真是愚蠢至極啊。"
63020-25 = "你倒也沒必要貶低那段經歷……#n真是的，沒想到我竟然會為了這種事安慰你。"
63020-26 = "我剛才不是說過了嗎？人本來就會按照過往的方式活下去。"
63020-27 = "沒錯，我也是這麼想的。"
63020-32 = "──不過是當我還在奧利斯的時候。"
63020-36 = "……你說什麼？"
63020-37 = "雖然並非完全如此，不過多數人往往會根據自己過往的生活來思考。#n而從中培養出的思考方式，又會回過頭來影響自己的生活。"
63020-38 = "從這個觀點來看，你的意見也並不算錯。"
63020-39 = "不過與此同時……人們也具有「按照自己思考的方式活下去」的可能性。"
63020-40 = "我在離開奧利斯之後所學到的……大概就是這件事吧。"
63020-44 = "你到底想說什麼？"
63020-45 = "我能理解你現在的感受──因為我也曾經和你一樣。"
63020-46 = "為迷失的孩子指引前進的道路，為那些孩子注入活下去的意志。"
63020-47 = "在此之中，你應該也獲得了自己活下去的意義和意志吧。"
63020-48 = "然而在這之後呢？#n以你所謂「奧利斯的方式」抵達的終點究竟是什麼？"
63020-52 = "你不回答也沒關係。答案我們都很清楚。#n那裡……只會有憎恨和憤怒而已。"
63020-53 = "除此之外什麼也沒有。#n既沒有意義，也不會留下任何東西。#n那種方式就是這樣的。"
63020-54 = "如果我也一直留在奧利斯，不知道還有其他世界存在的話……"
63020-55 = "如果沒有遇見「老師」的話……應該也會用跟你一模一樣的方式生活吧。"
63020-56 = "永遠扮演著嚴厲的教官，否定自己認知範圍以外的一切。"
63020-57 = "將那份自認屬於我們的憎恨，永無止境地放在心裡。"
63020-58 = "……意思是你事到如今，才要指責奧利斯的這種方式是錯誤的嗎？"
63020-59 = "我沒有這個意思──而且那也不是能夠判斷對錯的事。#n當時也好，現在也罷……這個想法從來沒有變過。"
63020-60 = "我只是想告訴你──#n哪怕只有一點也好，試著「學習」自己認知範圍之外的世界……"
63020-61 = "並且重新思考一次，有時或許會有所幫助而已。"
63020-62 = "……畢竟觀點這種東西，其實比想像中更容易改變和動搖。"
63020-63 = "如果這些話是由那些什麼都不懂的傢伙……用你的話來說，就是三一的大小姐吧。"
63020-64 = "如果是從他們的口中說出來，#n這些話聽起來或許只是樂觀主義者們不切實際、充斥著虛偽和偽善的空談罷了。"
63020-65 = "不過至少我和小隊……應該有資格提出這樣的意見才對。"
63020-66 = "……畢竟我們和你一樣，都曾經在底層打滾過。"
63020-68 = "沒錯，我也不喜歡不切實際的樂觀主義者。"
63020-69 = "坦白講，應該說很討厭才對。#n我對他們不存在憎恨以外的情感。"
63020-70 = "明明世界的某些部分是如此醜陋，他們卻連試著去了解都不願意。"
63020-71 = "只是一味地將自己的觀點強加在別人身上的模樣……簡直令人厭惡到難以直視。"
63020-72 = "然而也有部分的樂觀主義者並非如此。#n他們反而……"
63020-75 = "[log]「學生不應該向老師下跪。」[/log]"
63020-77 = "[log]「機會這種東西，沒有的話創造一個就好了。」[/log]"
63020-79 = "[log]「就算失敗了，只要再創造出下一個機會就好。」[/log]"
63020-82 = "明明清楚世界的某些部分令人畏懼──"
63020-83 = "也承認世界本來就殘酷而醜陋──"
63020-85 = "即便如此，還是有人絕不打算放棄。"
63020-86 = "我不確定你會怎麼想……不過我最終還是被說服了。"
63020-87 = "本來我其實是不喜歡「即便如此」這個說法的。"
63020-89 = "事到如今，似乎已經變得沒那麼討厭了。"
63020-90 = "說得一副自己高高在上的樣子，實際上你也沒多了不起吧。"
63020-91 = "明明只是個一離開奧利斯就得四處逃亡、躲避追捕的逃犯！"
63020-96 = "是啊，確實如你所說。"
63020-97 = "所以……我打算到此為止了。"
63020-98 = "什麼！？"
63020-102 = "[ns]「咦！？」"
63020-103 = "這件事我已經跟其他三個人談過了。"
63020-107 = "……嗯，算是吧。"
63020-108 = "耶嘿嘿……#n如果沙織姐姐這麼想的話……"
63020-109 = "嗯。就算是為了我們自己，這樣的生活都不應該再持續下去了。"
63020-110 = "很抱歉沒跟老師商量。#n本來想事先跟你說的，結果一直找不到合適的時機。"
63020-111 = "[s1]「那，那種事我完全不介意……！」\n[s2]「大家真的都可以接受嗎！？」"
63020-117 = "嗯。等這件事結束之後，我們就會去自首。"
63020-118 = "我們……實在已經累了。而且也厭倦了。"
63020-119 = "那種只能到處尋找陰暗的角落躲藏，無法堂堂正正地站在陽光之下的日子。"
63020-120 = "你們難道忘記自己的處境了嗎？你們可是恐怖分子啊。"
63020-121 = "甚至還是懷著明確的惡意發起了恐怖攻擊。"
63020-122 = "會被判處什麼樣的刑罰，根本無法想像不是嗎？"
63020-123 = "是啊。情況想必就和你說的一樣吧……不過我寧可選擇那樣。"
63020-124 = "自己所犯下的錯誤，本來就該由自己付出代價。"
63020-125 = "我不想再逃避面對自我了。"
63020-126 = "至於其餘奧利斯學生的處分，你也不必擔心。"
63020-127 = "我會說一切都是由我主導、由我執行的。"
63020-128 = "……某方面來說，也確實是這樣沒錯。"
63020-129 = "所以你肯定也──"
63020-134 = "[log=니코 스바루][FF6666]你到底想說什麼，錠前沙織。[-][/log]"
63020-137 = "什麼……？"
63020-138 = "我問你到底想說什麼。#n……算了，你不回答也沒關係。"
63020-139 = "就算不費力去讀你的心思，答案也非常明顯。"
63020-140 = "要去自首？不想再逃避了？"
63020-141 = "事到如今才想裝成好人嗎？#n想把一切都埋藏起來，假裝沒發生過嗎？"
63020-142 = "還是說，你打算裝成領悟真理的賢者？"
63020-143 = "用憐憫的態度看待世間萬物，彷彿一切都已經無關緊要了？"
63020-147 = "別笑死人了。#n除非你敢說自己獲得了世上所有的知識與智慧，否則還是省省吧。"
63020-148 = "少用那種一副什麼都懂的樣子俯視奧利斯，好像在看待自己的所有物一樣。"
63020-149 = "那種行為，和三一那些傢伙根本沒什麼兩樣……！"
63020-150 = "適可而止吧！別再跟我開玩笑了！#n根本什麼都沒有改變！一切都還在進行當中！"
63020-151 = "如果有長眼睛就看看[ruby=奧利斯]這裡[/ruby]吧！#n這裡跟你離開的時候有什麼不同？"
63020-152 = "外觀依然是廢墟一片，內部的某些地方甚至變得比當時還糟！"
63020-153 = "根本不知道夫人離開後的奧利斯是什麼樣子，還好意思隨便在那邊說三道四！"
63020-154 = "無論小隊還是老師都一樣，在那之後從來沒有關心過這裡！"
63020-155 = "即便如此依然守護著[ruby=奧利斯]這裡[/ruby]的人是我！是我們！"
63020-159 = "而不是明明有機會，卻拋下所有責任逃跑的[ruby=小隊]你們[/ruby]！"
63020-160 = "不是的，昴。#n我並不是要說那種了不起的大道理。"
63020-161 = "我從來沒有打算視自己為領悟真理的賢者……也沒有那種資格。"
63020-162 = "我只是……"
63020-163 = "只是……"
63020-166 = "（那天之後，第一次仰望的天空……是那麼地純粹而蔚藍）"
63020-167 = "（所以，我再次切身感受到了）"
63020-168 = "（啊啊──或許這個世界從很久以前，就一直以那副模樣存在於那個地方吧）"
63020-169 = "（眼看，看不飽。耳聽，聽不足）"
63020-170 = "（已有的事後必再有）"
63020-171 = "（已行的事後必再行。日光之下並無新事）"
63020-172 = "（幸福、痛苦、傲慢、謙遜……乃至於憤怒與憎恨）"
63020-173 = "（果真是如此啊）"
63020-175 = "一切皆為徒勞。無論去向何處，終將化為虛無。"
63020-178 = "只是開始為我剩下的人生……感到可惜而已。"
63020-179 = "……！"
63020-185 = "[log=니코 스바루]別用那種[/log]"
63020-186 = "[log=니코 스바루]方式說話。[/log]"
63020-187 = "[log=니코 스바루]背叛之後[/log]"
63020-188 = "[log=니코 스바루]遠走高飛的傢伙，[/log]"
63020-189 = "[log=니코 스바루]不准[/log]"
63020-190 = "[log=니코 스바루]說那種話。[/log]"
63020-193 = "[log=니코 스바루][FF6666]如果你們剩下的人生可惜的話──[-][/log]"
63020-195 = "[log=니코 스바루][FF6666]那在這裡的[-][ruby=[FF6666]奧利斯[-]][FF6666]我們[-][/ruby][FF6666]呢？[-][/log]"
63020-198 = "[log=니코 스바루][FF6666]為了那些無論如何都會回來的孩子們──[-][/log]"
63020-200 = "[log=니코 스바루][FF6666]拚命想守護這個巢穴的我呢？[-][/log]"
63020-203 = "過去！不會消失！！！"
63020-204 = "昴！？"
63020-205 = "過去永遠不會消失！而是會頑強地存活下來證明現在！"
63020-206 = "在這！名為波塔帕西斯的這個地方！#n縈繞於此的奧利斯分校的過去，就是我！"
63020-207 = "世上最重要的終究是自己！#n一旦自己死了，世界也會跟著死去！"
63020-208 = "既然如此，每個人的生活和存在方式便是世界本身！"
63020-209 = "沒有人能替他人承擔人生的責任，也沒有人能替他人活下去！#n所以我為孩子們消除了疑慮！"
63020-210 = "讓他們無論遇到什麼事情，都能夠堅強地活下去！"
63020-216 = "你錯了，夫人。這是無法改變的事實。"
63020-217 = "然而夫人所留下的一切……並非全然都是錯誤。"
63020-218 = "沒有意義的事情不會發生。#n事情正是因為發生了才有其意義。"
63020-219 = "所以，沒有任何痛苦是毫無意義的。"
63020-220 = "就像沒有任何過去是毫無意義的一樣。"
63020-225 = "怎，怎麼回事……總覺得不太對勁……？"
63020-241 = "……老師！快躲到我們後面！"
63020-247 = "你挑釁過頭了，隊長。"
63020-248 = "不，不是。我沒有要挑釁他的意思……"
63020-249 = "那些話待會再說吧，沙醬。"
63020-250 = "現在──"
63020-256 = "[log]第七位天使吹號。[/log]"
63020-258 = "[log]敗壞世界之人與虛偽之人，[/log]"
63020-261 = "[log]還有妄稱那名之人，[/log]"
63020-263 = "[log]敗壞的時候也就到了。[/log]"
63020-266 = "似乎得先處理真正緊急的事情才行。"
63020-268 = "下一話;吹號的天使"

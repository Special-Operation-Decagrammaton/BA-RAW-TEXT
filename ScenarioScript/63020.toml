[translation]
63020-1 = "ตอนที่ 2;ถึงจะเป็นอย่างนั้นก็ตาม"
63020-3 = "เบื้องหน้าของสิ่งนั้น มันมีอะไรรออยู่งั้นเหรอ?"
63020-4 = "...!"
63020-5 = "ไหนๆ ก็พูดเรื่องอดีตแล้ว งั้นก็มาคุยเรื่องนี้กันอีกหน่อยสิ"
63020-6 = "ว่ากันว่าการยึดติดกับอดีตคือหลักฐานของการมีอายุและความอ่อนแอ นี่เป็นแบบนั้นกันแล้วเหรอคะ...?"
63020-7 = "อาจจะเป็นอย่างนั้นก็ได้ ฉันก็รู้สึกอยู่ว่าตัวเองเชื่องช้ากว่าเมื่อก่อนมาก"
63020-8 = "ถึงเรื่องแบบนี้จะไม่ใช่เรื่องที่เราควรพูดคุยต่อหน้าครูก็เถอะ..."
63020-9 = "แต่ก็มีบางอย่างที่ฉันได้มาเพื่อแลกกับสิ่งนั้น"
63020-10 = "นึกถึงเรื่องสมัยก่อนเลยนะ เธอรู้จักเรื่องของผู้ฝึกสอนที่เข้มงวดกับผู้บังคับกองร้อยที่ใจดีหรือเปล่า?"
63020-11 = "ไม่มีทางไม่รู้หรอกค่ะ นี่แทบจะเป็นองค์ประกอบที่ขาดไม่ได้ในการบริหารจัดการองค์กรนี่คะ"
63020-12 = "แต่คงไม่บอกว่าตัวเองเป็นผู้บังคับกองร้อยที่ใจดีหรอกใช่มั้ยคะ?"
63020-16 = "ไม่มีทางหรอก ฉันคิดว่าตัวเองเป็นผู้ฝึกสอนที่เข้มงวด คนที่เป็นเหมือนผู้บังคับกองร้อยที่ใจดีน่ะ คือเธอต่างหาก"
63020-17 = "ก็คนเราไม่มีทางเลือกอื่นนอกจากใช้ชีวิตในแบบที่เคยใช้มานี่คะ"
63020-19 = "ใช่ ถึงตอนนี้มันจะไม่สำคัญแล้ว แต่สควอดก็เป็นกลุ่มที่มีแต่คนที่ถูกคัดเลือก"
63020-20 = "แล้วคนที่เป็นผู้นำก็ยิ่งต้องได้รับการฝึกฝนที่เข้มงวดกว่าสมาชิกคนอื่นด้วย"
63020-22 = "สุดท้ายฉันก็ก้าวข้ามอดีตของตัวเองไม่ได้... ฉันทำได้แค่ปฏิบัติต่อทุกคนตามแบบที่ฉันได้เรียนรู้ และประสบมาเท่านั้น"
63020-24 = "พอมาคิดดูอีกที นั่นเป็นเรื่องน่าสมเพชมากเลยละ..."
63020-25 = "ไม่ต้องเหยียบย่ำเรื่องนั้นหรอกค่ะ เฮอะ ฉันไม่คิดเลยนะคะว่าจะได้มาปลอบใจคุณที่นี่"
63020-26 = "อย่างที่ฉันบอกไปนี่คะ คนเราจะใช้ชีวิตตามแบบที่ตัวเองเคยใช้มาอยู่แล้วค่ะ"
63020-27 = "อื้อ ฉันก็คิดแบบนั้น"
63020-32 = "ตอนที่ยังอยู่ในอาเรียสน่ะนะ"
63020-36 = "ว่าไงนะคะ...?"
63020-37 = "ถึงจะมาจากแค่สถิติ แต่คนส่วนใหญ่จะคิดตามวิถีชีวิตของตัวเอง และความคิดนั้นก็จะก่อให้เกิด#nชีวิตใหม่ขึ้นมาอีก"
63020-38 = "ในแง่นั้นแล้ว ความคิดเห็นของเธอก็ไม่ผิดหรอก"
63020-39 = "แต่ในขณะเดียวกัน... คนเราก็มีโอกาสที่จะใช้ชีวิตในแบบที่ตัวเองคิดได้เหมือนกัน"
63020-40 = "นั่นคือสิ่งที่ฉันได้เรียนรู้หลังออกมาจากอาเรียสน่ะ"
63020-44 = "อยากจะสื่อว่าอะไรกันแน่คะ?"
63020-45 = "ฉันเข้าใจความรู้สึกของเธอ เพราะฉันเองก็เคยรู้สึกแบบนั้น"
63020-46 = "เธอชี้ทางให้เด็กๆ ที่หลงทาง และมอบกำลังใจในการมีชีวิตต่อไปให้กับเด็กเหล่านั้น"
63020-47 = "จากการทำแบบนั้น ฉันว่าเธอก็คงค้นพบความหมายและกำลังใจในการมีชีวิตอยู่ของตัวเองเหมือนกัน"
63020-48 = "แต่หลังจากนี้จะเป็นยังไงล่ะ? ตอนท้ายสุดของ <วิถีอาเรียส> ที่เธอพูดถึงคืออะไร?"
63020-52 = "ไม่จำเป็นต้องพูดหรอก เราต่างรู้คำตอบกันแล้วทั้งคู่ สิ่งที่หลงเหลืออยู่ในตอนท้าย... ก็มีแต่ความเกลียดชังและความโกรธแค้น"
63020-53 = "นอกจากนี้ก็ไม่มีอะไรอื่นแล้ว เปล่าประโยชน์ ไม่มีอะไรเหลือสักอย่าง มันเป็นวิถีแบบนั้นละ"
63020-54 = "ถ้าฉันยังอยู่ในอาเรียสต่อไปโดยที่ไม่รู้เลยว่าข้างนอกยังมีโลกใบอื่นอยู่"
63020-55 = "และถ้าฉันไม่ได้เจอกับ 'คุณครู'... ตอนนี้ฉันก็คงมีชีวิตที่ไม่ต่างกับเธอเท่าไรหรอก"
63020-56 = "ฉันคงยังสวมบทบาทของผู้ฝึกสอนที่เข้มงวด ปฏิเสธทุกสิ่งที่ฉันไม่รู้"
63020-57 = "และแบกรับความเกลียดชังที่คิดว่าเป็นของเราไว้ในหัวใจอย่างไม่มีวันสิ้นสุด"
63020-58 = "จะมาบอกว่าวิถีของเราผิด และจะมาวิจารณ์อาเรียสงั้นเหรอคะ...?"
63020-59 = "ไม่หรอก นี่ไม่ใช่สิ่งที่ฉันจะตัดสินถูกผิดได้ ความคิดนั้นยังคงไม่เปลี่ยนแปลง ไม่ว่าจะอดีตหรือปัจจุบัน "
63020-60 = "ที่ฉันจะบอกก็คือ การกลับมาคิดอีกครั้งหลังจากได้ 'เรียนรู้' เกี่ยวกับโลกภายนอกที่เกินขอบเขตความรู้#nของตัวเอง แม้จะแค่เล็กน้อยก็ตาม"
63020-61 = "ฉันว่าบางครั้งมันก็เป็นประโยชน์นะ"
63020-62 = "นั่นก็เพราะมุมมองของเรามันเปลี่ยนแปลงได้บ่อยกว่าที่คิดน่ะ..."
63020-63 = "ถ้าคนที่ไม่รู้อะไรเลย หรือคนที่เธอเรียกว่าคุณหนูจากทรีนิตี้มาพูดอะไรแบบนี้"
63020-64 = "ก็อาจฟังดูเหมือนคำพูดที่เสแสร้ง จอมปลอม และไม่มีแผนการของพวกคนที่มองโลกในแง่ดีก็ได้"
63020-65 = "แต่ว่า... อย่างน้อยฉันกับสควอดก็มีความคิดเห็นแบบนี้"
63020-66 = "นั่นก็เพราะทั้งเธอและสควอดต่างก็ใช้ชีวิตในจุดที่ลำบากที่สุดกันมาแล้วไงล่ะ..."
63020-68 = "อื้อ ฉันก็ไม่ชอบการมองโลกในแง่ดีโดยไม่มีแบบแผนเหมือนกัน"
63020-69 = "ถ้าให้พูดตามตรง ต้องบอกว่าเกลียดเลยละ ตอนนั้นฉันมีแต่ความเกลียดชังและความโกรธ"
63020-70 = "บางแง่มุมของโลกช่างน่ากลัวถึงขนาดนี้ แต่ฉันก็ไม่แม้แต่จะพยายามค้นหาข้อมูลเกี่ยวกับเรื่องเหล่านั้น"
63020-71 = "ฉันเกลียดมากที่ถูกคนพวกนั้นยัดเยียดความคิดเห็นของตัวเองให้ตามยถากรรม"
63020-72 = "แต่คนมองโลกในแง่ดีบางคนก็ไม่เป็นแบบนั้นหรอก คนพวกนั้นกลับ..."
63020-75 = "[log]\"นักเรียนไม่ควรมาคุกเข่าต่อหน้าครูนะ\"[/log]"
63020-77 = "[log]\"ถ้าไม่มีก็สร้างขึ้นมาก็ได้\"[/log]"
63020-79 = "[log]\"ถ้ามันล้มเหลวอีก ก็สร้างโอกาสต่อไปได้\"[/log]"
63020-82 = "ต่อให้รู้ว่าบางส่วนของโลกนั้นเลวร้ายมาก"
63020-83 = "ต่อให้ยอมรับว่าโลกถูกสร้างมาให้เลวร้ายและน่าเกลียดตั้งแต่แรกอยู่แล้ว"
63020-85 = "ถึงจะเป็นอย่างนั้น ก็ยังมีคนที่ไม่ยอมแพ้"
63020-86 = "ฉันไม่รู้ว่าเธอจะเป็นยังไง แต่กับฉันแล้ว... ฉันไม่มีทางเลือกอื่นนอกจากยอมถูกโน้มน้าว แล้วก็..."
63020-87 = "ถึงนี่จะเป็นคำที่ฉันแทบจะไม่ได้ใช้ในชีวิตประจำวันอีกแล้ว"
63020-89 = "แต่ฉันก็กลายเป็นคนที่ไม่ได้เกลียดคำว่า 'ถึงจะเป็นอย่างนั้นก็ตาม' สักเท่าไรแล้ว"
63020-90 = "พูดเหมือนกับตัวเองเก่งกาจมาจากไหนเลยนะคะ สุดท้ายแล้วคุณเองก็ไม่ได้พิเศษอะไรเหมือนกันนี่คะ"
63020-91 = "ถ้าออกจากอาเรียสไปตอนนี้ คุณมันก็แค่ผู้หลบหนีที่ต้องซ่อนตัว เพื่อไม่ให้ถูกจับกุมไม่ใช่เหรอ!"
63020-96 = "อื้อ ก็ถูกของเธอ"
63020-97 = "เพราะงั้นฉันก็เลยจะยอมแพ้แล้วละ"
63020-98 = "คะ!?"
63020-102 = "[ns] \"ว่าไงนะ?!\""
63020-103 = "ฉันคุยกับอีก 3 คนที่เหลือแล้ว"
63020-107 = "ก็อย่างที่ได้ยินนั่นละ..."
63020-108 = "แหะ... แหะๆ ถ้าพี่ซาโอริคิดอย่างนั้นละก็นะ..."
63020-109 = "อื้อ เราใช้ชีวิตแบบนี้ไปตลอดไม่ได้หรอก อย่างน้อยก็เพื่อตัวเราเอง"
63020-110 = "ขอโทษนะครู ฉันพยายามจะหาเวลาคุยแล้ว แต่จังหวะเวลาก็ไม่ลงตัวสักที"
63020-111 = "[s1] \"คะ... ครูไม่ว่าอะไรเลย แต่ทุกคนโอเคเหรอ?\"\n[s2] \"ไม่ต้องขอโทษครูหรอก แต่ทุกคนจะไม่เป็นไรเหรอ?!\""
63020-117 = "อื้อ หลังจากจบเรื่องนี้ พวกฉันจะไปมอบตัว"
63020-118 = "ฉันหมดแรงแล้วละ แล้วก็เบื่อเต็มทีแล้ว"
63020-119 = "เบื่อทั้งการเดินเตร็ดเตร่ในที่ที่มืดมิด และเบื่อที่ไม่อาจยืนหยัดอย่างกล้าหาญภายใต้ผืนฟ้าได้"
63020-120 = "ลืมไปแล้วเหรอคะ? พวกคุณคือผู้ก่อการร้ายนะคะ"
63020-121 = "แล้วยังเป็นการก่อการร้ายที่กระทำด้วยเจตนาร้ายด้วย"
63020-122 = "พวกคุณแทบจะเดาไม่ได้เลยนะคะว่าจะได้รับโทษแบบไหนน่ะ?"
63020-123 = "ใช่ ก็คงจะเป็นอย่างนั้น แต่การทำแบบนั้นก็คงดีกว่า"
63020-124 = "เราต้องรับผิดชอบต่อสิ่งที่ทำลงไปยังไงล่ะ"
63020-125 = "ฉันไม่อยากหนีจากตัวเองอีกต่อไปแล้ว"
63020-126 = "ส่วนเรื่องเด็กๆ อาเรียสที่เหลืออยู่ เธอไม่ต้องกังวลหรอก"
63020-127 = "ฉันเคยเป็นผู้นำทุกอย่าง และฉันจะรับผิดชอบในสิ่งที่ตัวเองทำ"
63020-128 = "ที่จริงแล้วก็มีส่วนที่เป็นอย่างนั้นจริงๆ..."
63020-129 = "เพราะงั้นเธอเองก็..."
63020-134 = "[log=니코 스바루][FF6666]อยากสื่ออะไรกันแน่ โจมาเอะ ซาโอริ[-][/log]"
63020-137 = "ว่าไงนะ...?"
63020-138 = "ฉันถามว่าอยากจะสื่ออะไรกันแน่ ไม่สิ ไม่ต้องตอบก็ได้"
63020-139 = "ต่อให้ฉันจะต้องพยายามอ่านใจเธอ แต่คำตอบมันก็ชัดเจนมากอยู่แล้ว"
63020-140 = "จะไปมอบตัวเพราะไม่อยากหนีอีกต่อไปแล้วใช่มั้ย?"
63020-141 = "ตอนนี้อยากมาแสร้งทำเป็นคนดี แล้วจะฝังกลบทุกสิ่งทุกอย่างราวกับไม่เคยมีอะไรเกิดขึ้นงั้นเหรอ?"
63020-142 = "หรือว่ากำลังวางแผนแสร้งทำเป็นนักปราชญ์ที่ตระหนักถึงความจริงแล้ว?"
63020-143 = "รู้สึกสงสารทุกสิ่งทุกอย่างในโลกราวกับมันไม่เคยทำร้ายเรางั้นเหรอ?"
63020-147 = "อย่ามาตลกนะ ถ้าเธออ้างไม่ได้ว่าเธอสะสมความรู้และปัญญาในโลกนี้มาหมดแล้ว ก็หยุดสักทีเถอะ"
63020-148 = "เลิกวิเคราะห์ทุกสิ่งราวกับว่าเธอรู้ดีไปหมดทุกอย่าง แล้วก็อย่ามาดูถูกอาเรียสราวกับว่าโรงเรียน#nเป็นของเธอเองด้วย"
63020-149 = "การทำแบบนั้นน่ะ มันไม่ต่างกับพวกทรีนิตี้เลยสักนิด...!"
63020-150 = "ไม่ต้องมาทำเป็นขำ! ไม่ต้องมาเล่นตลกเลยนะ! ไม่มีอะไรเปลี่ยนแปลงไปหรอก! ทุกอย่างมันก็ยังเหมือนเดิม!"
63020-151 = "ถ้าตายังมองเห็นอยู่ ก็ดูที่นี่สิ! นับตั้งแต่เธอจากไป อาเรียสมีอะไรเปลี่ยนไปบ้าง?"
63020-152 = "ภายนอกยังดูเหมือนซากปรักหักพังเหมือนเดิม แต่ภายในมีบางอย่างที่น่ากลัวยิ่งกว่าตอนนั้นเสียอีก!"
63020-153 = "ที่เธอบอกว่ารู้อะไรเกี่ยวกับอาเรียสหลังจากมาดามจากไปน่ะ มันเหลวไหลสิ้นดี!"
63020-154 = "ตั้งแต่นั้นมา ทั้งสควอด ทั้งคุณครูก็ไม่ได้สนใจใยดีพวกเราเลยด้วยซ้ำ!"
63020-155 = "คนที่ปกป้องอาเรียสมาตลอดคือฉันต่างหาก! พวกเราต่างหากล่ะ!"
63020-159 = "ไม่ใช่พวกเธอที่ปฏิเสธความรับผิดชอบทุกอย่าง ทั้งๆ ที่มีโอกาส แต่ก็เลือกที่จะหนีไป!"
63020-160 = "ไม่หรอก สุบารุ ฉันไม่ได้พยายามจะพูดอะไรที่ยิ่งใหญ่แบบนั้นหรอกนะ"
63020-161 = "นักปราชญ์ที่ตระหนักรู้ความจริงงั้นเหรอ? ฉันไม่ได้มีความคิดจะอวดอ้างความยิ่งใหญ่นั่นเลย แล้วก็ไม่มีสิทธิ์ทำแบบนั้นด้วย"
63020-162 = "ฉันก็แค่"
63020-163 = "ก็แค่..."
63020-166 = "(ท้องฟ้าที่ฉันแหงนมองเป็นครั้งแรกนับตั้งแต่วันนั้นเป็นสีฟ้าทั้งผืน)"

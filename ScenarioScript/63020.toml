[translation]
63020-1 = "Episode 2;In Spite of Everything"
63020-3 = "What lies ahead of it?"
63020-4 = "...!"
63020-5 = "Since we've already started talking about the past, let's go a little further down memory lane."
63020-6 = "...They say clinging to old memories is a sign of age and decline. Are you already that far gone?"
63020-7 = "Maybe so. I've been feeling a little duller lately."
63020-8 = " ...Though it's a bit rude to be speaking this way in front of Sensei."
63020-9 = "But I gained a lot in exchange."
63020-10 = "It reminds me of an old story. Do you remember the one about the harsh drill instructor and the kind centurion?"
63020-11 = "Of course. They're practically essential archetypes in running any organization."
63020-12 = "But you're not about to claim you were the kind centurion, are you?"
63020-16 = "Hardly. By any measure, I was the harsh instructor. If anyone was the kind centurion, it was you."
63020-17 = "People can only live the way they know how."
63020-19 = "Right. Not that any of it matters anymore, but the Squad members were each handpicked for their own reason."
63020-20 = "As their leader, I received the worst end of the stick, in terms of training."
63020-22 = "...And in the end, I continued that cycle. I turned around and treated others exactly how I'd been treated."
63020-24 = "...Looking back, I truly was a fool."
63020-25 = "Are you still beating yourself up about stuff like that? Honestly, I never thought I'd be the one comforting YOU here."
63020-26 = "People really do live exactly how they know."
63020-27 = "I used to think the same."
63020-32 = "Before I left Arius, that was."
63020-36 = "...What are you saying now?"
63020-37 = "It's not everybody, but people's lifestyles do generally tend to affect their way of thinking, which in turn pushes them further into that lifestyle."
63020-38 = "So, from that perspective, your view isn't wrong."
63020-39 = "There are other options. People can think and live the way they choose."
63020-40 = "That is the most important thing I've learned since leaving."
63020-44 = "Would you get to the point?"
63020-45 = "I know everything you're feeling right now. I felt the same way in your position."
63020-46 = "You gathered and guided lost students. Gave them a reason to live again."
63020-47 = "It slowly gave you the motivation to keep on pushing."
63020-48 = "But, tell me, what are you pushing towards? What is at the end of your \"Arius way\"?"
63020-52 = "We both know the answer to that. You'll be left with just hatred and rage."
63020-53 = "There's nothing else. It's meaningless. Nothing remains. That's the inevitable end of that path."
63020-54 = "Had I stayed in Arius, had I never experienced more of the world..."
63020-55 = "If I'd never met Sensei, I would be standing exactly where you are now."
63020-56 = "I'd still be playing the harsh instructor, denying everything beyond what I'd been taught."
63020-57 = "I would still be harboring what I thought was \"our\" hatred in my heart."
63020-58 = "...And now you're back, coming to say that our way of life was wrong all along?"
63020-59 = "No. There's no right or wrong when it comes to these things. I still believe that."
63020-60 = "We wanted you to study the outside world a little bit, to broaden your horizons a little."
63020-61 = "It can help, sometimes. Then make whatever decision you want."
63020-62 = "...Perspectives aren't as set in stone as they seem."
63020-63 = "If people who know nothing, like those \"Trinity girls,\" as you put it, said something like this..."
63020-64 = "...it'd probably sound like the empty prattle of naive optimists, full of pretense and hypocrisy."
63020-65 = "But...at the very least, I think the Squad and I have earned the right to speak on this subject, if only a little."
63020-66 = "...We've all rolled around in the same gutter, after all."
63020-68 = "I never liked reckless optimists either."
63020-69 = "To be honest, I hated them. With everything I had."
63020-70 = "They're the type to avert their eyes from all the horrific things happening in this world."
63020-71 = "Without knowing anything, they preach their beliefs and force them down your throat."
63020-72 = "But not all of them are like that. Actually..."
63020-75 = "[log]\"A student must never kneel to a teacher.\"[/log]"
63020-77 = "[log]\"Of course you have another chance.\"[/log]"
63020-79 = "[log]\"And if you don't, I'll make one.\"[/log]"
63020-82 = "Despite knowing horrible things happen in this world..."
63020-83 = "...and even while accepting that sometimes this world can be cruel and ugly..."
63020-85 = "...there are still people who never waver and never give up."
63020-86 = "...I don't know about you, but seeing something like that, it convinced me, through and through."
63020-87 = "It's a phrase people don't use as much anymore..."
63020-89 = "...but the phrase \"in spite of everything\" has grown on me."
63020-90 = "Oh, so you're just so wise now? I'd hardly start bragging about my life, if I were you!"
63020-91 = "The moment you leave Arius, you'll be back to being a fugitive, always running from the possibility of arrest!"
63020-96 = "Yeah. You're right."
63020-97 = "So I'm going to stop now."
63020-98 = "Huh?!"
63020-102 = "[ns] \"What?!\""
63020-103 = "The four of us have discussed it already."
63020-107 = "...Yeah. What she said."
63020-108 = "Heh, heehee. Whatever you say, Saori."
63020-109 = "Yes. We can't keep doing this for the rest of our lives, now can we?"
63020-110 = "Sorry, Sensei. We meant to tell you when the time was right, but it never worked out."
63020-111 = "[s1] \"Th-that's not what matters...!!\"\n[s2] \"Are you really planning on turning yourselves in?\""
63020-117 = "Yes. Once this is all over, that's what we intend to do."
63020-118 = "More than anything, I'm tired. I've had enough of this."
63020-119 = "I've been living in the shadows for too long. I've never been able to stand proudly under the open sky."
63020-120 = "Did you forget? You're all terrorists."
63020-121 = "What you did was clearly an act of terrorism, carried out with malice."
63020-122 = "Are you seriously trying to tell me you don't know what kind of sentence you'll get?"
63020-123 = "We know. But that's okay too. We'd rather have it that way."
63020-124 = "I need to pay the price for what I've done."
63020-125 = "I'm done running away from my past."
63020-126 = "Don't worry. The remaining Arius students will be fine."
63020-127 = "I intend to say I was the mastermind and instigator."
63020-128 = "...And to be honest, that's true, to an extent."
63020-129 = "So I'm sure you, too—"
63020-134 = "[log=니코 스바루][FF6666]What exactly are you saying to me, Joumae Saori?[-][/log]"
63020-137 = "What...?"
63020-138 = "I asked what you're saying to me right now. Actually, don't answer."
63020-139 = "I don't even need to try to read your mind. You're too predictable."
63020-140 = "You're going to turn yourself in? You don't want to run anymore?"
63020-141 = "You want to pretend to be some goody-two-shoes now? Just bury everything and pretend it never happened?"
63020-142 = "Or should I regard you as some enlightened sage now?"
63020-143 = "Are you looking down your nose at us, acting as if nothing in the world matters anymore?"
63020-147 = "Don't make me laugh. Unless you know every single thing this world has to offer, then drop this high-and-mighty act."
63020-148 = "Don't look down on Arius like it's yours, acting like you know the very meaning of life."
63020-149 = "The way you're acting is exactly the same as those despicable Trinity brats!"
63020-150 = "I don't want to hear another word out of you! Cut the bullshit! Nothing has changed! Nothing is different! Our lives are still happening RIGHT NOW!"
63020-151 = "Look around! Do things look different? Is Arius all fixed up now?"
63020-152 = "Oh, right! It's still all just ruins! On the inside, it's rotting even more than before!"
63020-153 = "You know NOTHING of what Arius, of what WE, went through after Madame disappeared! How dare you try to speak with authority!"
63020-154 = "All this time, none of you spared us a single thought! Not you. Not the Squad. Not even Sensei."
63020-155 = "I was the one who kept guard over Arius, over our home! We did!"
63020-159 = "Not you! Not the Squad! You threw away all your responsibilities and ran off to play house when we needed you the most!"
63020-160 = "Subaru... I never meant to claim anything so grand."
63020-161 = "A \"sage\"? I still don't know anything. I haven't done anything to deserve that."
63020-162 = "I just simply..."
63020-163 = "Simply..."
63020-166 = "(After that day, I remember the first sky I ever saw. It was so blue.)"
63020-167 = "(And that was also the first time I could really feel it.)"
63020-168 = "(I thought, \"Ah. Maybe the world around me has always been there, since long, long ago.\")"
63020-169 = "(The eye is not satisfied with just sight, nor the ear fulfilled with just hearing.)"
63020-170 = "(What has been will be again.)"
63020-171 = "(What has been done will be done again. In this universe, there is no such thing as \"new.\")"
63020-172 = "(Happiness, pain, pride and humility, anger...even hatred.)"
63020-173 = "(Truly.)"
63020-175 = "Vanitas vanitatum. All is in vain."
63020-178 = "I just...felt for the first time that the rest of my life was too precious to waste."
63020-179 = "...!"
63020-185 = "[log=니코 스바루]How dare you[/log]"
63020-186 = "[log=니코 스바루]speak like that?[/log]"
63020-187 = "[log=니코 스바루]You betrayed us.[/log]"
63020-188 = "[log=니코 스바루]Abandoned us.[/log]"
63020-189 = "[log=니코 스바루]Don't you ever[/log]"
63020-190 = "[log=니코 스바루]say that again.[/log]"
63020-193 = "[log=니코 스바루][FF6666]If your lives are so very precious,[-][/log]"
63020-195 = "[log=니코 스바루][FF6666]what about us here, in Arius?[-][/log]"
63020-198 = "[log=니코 스바루][FF6666]What about me, who stayed to protect the nest,[-][/log]"
63020-200 = "[log=니코 스바루][FF6666]for the sake of those who remained and would return?[-][/log]"
63020-203 = "You can't just make the past disappear!"
63020-204 = "Subaru?!"
63020-205 = "The past never just vanishes! It clings on! It proves the present!"
63020-206 = "This is Porta Pacis! The entire history of the Arius Satellite School converges within this place, within me!"
63020-207 = "In the end, the most important thing in this world is yourself! When you die, your world dies with you!"
63020-208 = "If that's so, then each person's way of life is their very proof of existence! Of their world!"
63020-209 = "No one will take responsibility for your life or live it in your place! That's why I stripped doubt away from the students!"
63020-210 = "So that no matter what happens, they can go on living, unafraid!"
63020-216 = "Madame was wrong for what she did. That's the honest truth."
63020-217 = "But not everything she left behind...was wrong."
63020-218 = "Nothing happens without meaning. Events gain meaning simply by happening."
63020-219 = "So there can be no such thing as meaningless suffering."
63020-220 = "And so, if there's no meaningless suffering, there can be no such thing as a meaningless past."
63020-225 = "Um... Is anyone else getting a little weirded out right now?"
63020-241 = "Sensei! Get behind us!"
63020-247 = "You pushed her too far, Leader."
63020-248 = "I-I wasn't trying to provoke her. I really wasn't."
63020-249 = "Yes, yes. We can discuss that later, Sao-Sao."
63020-250 = "Right now..."
63020-256 = "[log]When the seventh angel sounds the trumpet.[/log]"
63020-258 = "[log]Those who destroy the earth and those who are false...[/log]"
63020-261 = "[log]...and those who take thy name in vain,[/log]"
63020-263 = "[log]their time of destruction will finally come.[/log]"
63020-266 = "I think we need to deal with the most urgent matter at hand."
63020-268 = "Next Episode;Trumpeting Angel"

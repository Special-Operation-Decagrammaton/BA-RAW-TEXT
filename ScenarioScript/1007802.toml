[translation]
1007802-1 = "鬼怒川佳澄"
1007802-2 = "（前往佳澄告知的地點後，看見了似乎被遺棄許久的廢棄建築）"
1007802-6 = "……嗯？有客人來了嗎？"
1007802-7 = "啊啊……！原來如此，是老師啊！#n你來得正好，說不定我們的頻率挺合得來的哦。"
1007802-8 = "老師～！！這裡這裡！快過來吧～！！"
1007802-9 = "[s1]「是佳澄啊，我馬上過去。」\n[s2] 走向聲音傳來的地方"
1007802-17 = "啊，老師！！"
1007802-18 = "這裡這裡！"
1007802-19 = "哎呀，不是那裡，是這裡啦！！"
1007802-22 = "― [log=카스미]哈～哈哈哈哈！[/log][wa:1000] "
1007802-24 = "― [log=카스미]來得正是時候呢！[/log][wa:680] "
1007802-27 = "― [log=카스미]歡迎你來，老師。[/log][wa:720] "
1007802-29 = "― [log=카스미]這裡是我的第86祕密基地。[/log][wa:2030] "
1007802-32 = "― [log=카스미]問我在這裡做什麼？[/log][wa:1170] "
1007802-35 = "― [log=카스미]那還用問嗎，老師。[/log]"
1007802-37 = "― [log=카스미]說到我會做的事就只有一個。[/log][wa:1220] "
1007802-40 = "― [log=카스미]那就是……[/log]"
1007802-42 = "― [log=카스미]尋找新的溫泉點！[/log][wa:1780] "
1007802-45 = "[ns3]「溫泉點？」\n[ns4]「也就是說……」"
1007802-46 = "― [log=카스미]哈哈，老師。[/log][wa:1080] "
1007802-47 = "― [log=카스미]哈哈，老師。[/log][wa:1080] "
1007802-49 = "― [log=카스미]這麼快就理解真是太好了。[/log][wa:690] "
1007802-52 = "― [log=카스미]沒錯，正是如此。[/log][wa:460] "
1007802-54 = "― [log=카스미]我剛才正在思考實際要爆破的地點。[/log][wa:1560] "
1007802-57 = "― [log=카스미]呼呣……這裡好嗎？[/log][wa:2360] "
1007802-59 = "― [log=카스미]不……這裡也還挺……[/log][wa:1040] "
1007802-62 = "― [log=카스미]怎麼啦，老師？為什麼要用那種眼神看我？[/log][wa:3080] "
1007802-64 = "― [log=카스미]有什麼問題嗎？[/log][wa:920] "
1007802-67 = "難得有機會，我也想聽聽老師的意見，所以才會請老師過來。"
1007802-68 = "儘管挑選爆破地點總是讓人感到新鮮與刺激……但偶爾也想聽聽其他人的意見！"
1007802-69 = "當然也不是任何人的意見都會聽哦？#n我想聽的不是其他人，而是老師你的意見。"
1007802-70 = "……嗯？"
1007802-71 = "問我為什麼在這種地方？又為什麼是「這個月的第86個祕密基地」？"
1007802-72 = "哈～哈哈哈！怎麼問這麼理所當然的事呢，老師！#n當然是因為我正在被追捕啊。"
1007802-73 = "別看我這樣，我可是正被格黑娜懸賞通緝呢。#n總不能到處走動吧？"
1007802-74 = "而且制定爆破計畫……是需要高度專注的工作。"
1007802-75 = "所以才會在這種安靜的地方做準備。"
1007802-76 = "先別說這些雞毛蒜皮的小事了！#n重要的是爆破計畫！"
1007802-77 = "我現在會用腳趾指出候選的地點，麻煩老師給我意見可以嗎？"
1007802-78 = "那麼……我看看～"
1007802-79 = "這裡！這裡怎麼樣？百貨公司的地下！"
1007802-80 = "咦？有點微妙……？#n嗯……好像也是。"
1007802-81 = "那這裡怎麼樣？地鐵轉乘站！#n這裡等於已經挖了一半，所以可以痛快地挖得更深更火熱哦！"
1007802-82 = "一起找找看有沒有更新鮮一點的地方？#n嗯……是嗎？"
1007802-83 = "那就～唔嗯……"
1007802-84 = "嗯～～～～！！！！！"
1007802-86 = "（之後佳澄依然專挑人口密集與交通量大的地區進行提議）"
1007802-87 = "（儘管使出千方百計試圖將佳澄引到杳無人煙的地方，卻不是很順利……）"
1007802-89 = "唔嗯……！"
1007802-90 = "老師真的相當謹慎呢。#n這裡也不行，那裡也不行……"
1007802-91 = "但是不能再這樣下去。#n我已經快克制不住了！"
1007802-92 = "這裡就是這次爆破作業的最後一個候選地點！"
1007802-93 = "好！就決定是這裡吧。#n就算老師反對也沒用！已經沒有其他地點可選了！"
1007802-94 = "那麼地點就決定是……"
1007802-95 = "[s5]「決，決定是……？」\n[s6] 吞一口口水"
1007802-98 = "……就是這裡！！"
1007802-102 = "[ns7]「這裡是……空無一人的山谷……？」\n[ns8]「哦……這裡的話好像……」"
1007802-105 = "哈～哈哈哈哈！！那是什麼表情！#n看你一臉安心的樣子！"
1007802-106 = "嗯，不過至少反應比以前積極多了。"
1007802-107 = "來……怎麼樣啊？老師。#n這裡應該沒問題吧？該不會連這裡都要反對吧？"
1007802-108 = "[s9]「我想這裡應該沒問題。」\n[s10] 點頭"
1007802-111 = "很好很好！在最後的最後，我們的意見總算是達成一致了！"
1007802-112 = "那我就當老師贊成囉！結果等結束後再告訴老師！"
1007802-113 = "嗯嗯……！現在想想真是個不錯的地點啊……我很滿意！"
1007802-114 = "謝謝老師參加今天的會議！下次見囉，老師！！"
1007802-125 = "我真粗心，差點就忘了把裝備帶走了呢。"
1007802-126 = "那麼……"
1007802-127 = "真的要走囉！！"
1007802-133 = "（……看著佳澄離開後留下的空位，總算是鬆了一口氣）"

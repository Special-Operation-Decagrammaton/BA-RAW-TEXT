[translation]
1007802-1 = "คินุกาวะ คาสุมิ"
1007802-2 = "(คุณครูไปหาคาสุมิในสถานที่ที่เธอบอก และที่นั่นคืออาคารร้างที่ดูเก่าแก่)"
1007802-6 = "...หืม? มีใครมางั้นเหรอ?"
1007802-7 = "อ้อ...! คุณครูเองใช่มั้ย? มาได้จังหวะพอดีเลย เหมือนเราสื่อใจถึงกันได้เลยนะเนี่ย!"
1007802-8 = "คุณครู~!! ทางนี้ ทางนี้! มาทางนี้สิ~!!"
1007802-9 = "[s1] \"คาสุมินี่เอง ครูไปเดี๋ยวนี้ละ\"\n[s2] เดินไปทางที่ได้ยินเสียง"
1007802-17 = "อ๊ะ คุณครู!!"
1007802-18 = "ทางนี้ ทางนี้!"
1007802-19 = "ไม่ใช่ทางนั้น ทางนี้ต่างหากเล่า!!"
1007802-22 = "― [log=카스미]ว้าว~ วะฮะฮะฮ่า![/log][wa:640] "
1007802-24 = "― [log=카스미]มาได้จังหวะพอดีเลยนะ![/log][wa:160] "
1007802-27 = "― [log=카스미]ยินดีต้อนรับ คุณครู~[/log][wa:240] "
1007802-29 = "― [log=카스미]ที่นี่คือ กองบัญชาการลับที่ 86 ของฉัน[/log][wa:1070] "
1007802-32 = "― [log=카스미]ฉันมาทำอะไรอยู่ที่นี่น่ะเหรอ?[/log][wa:370] "
1007802-35 = "― [log=카스미]ถามแปลกๆ นะคุณครู[/log]"
1007802-37 = "― [log=카스미]งานที่ฉันทำมีเพียงอย่างเดียว[/log][wa:620] "
1007802-40 = "― [log=카스미]และนั่นคือ...[/log]"
1007802-42 = "― [log=카스미]ฉันกำลังหาพิกัดออนเซ็นใหม่อยู่ยังไงล่ะ~![/log][wa:500] "
1007802-45 = "[ns3] \"พิกัดออนเซ็นเหรอ?\"\n[ns4] \"งั้นก็หมายความว่า...\""
1007802-46 = "― [log=카스미]ฮะฮ่า คุณครู[/log][wa:840] "
1007802-47 = "― [log=카스미]ฮะฮ่า คุณครู[/log][wa:840] "
1007802-49 = "― [log=카스미]ดีจังเลยนะที่เราคุยกันรู้เรื่อง[/log][wa:10] "
1007802-52 = "― [log=카스미]อ้อ ใช่แล้วละ[/log][wa:260] "
1007802-54 = "― [log=카스미]ฉันกำลังตรวจสอบพื้นที่รอบๆ บริเวณที่จะไประเบิดอยู่น่ะ[/log][wa:80] "
1007802-57 = "― [log=카스미]ฮืม... ตรงนี้จะดีมั้ยนะ?[/log][wa:1760] "
1007802-59 = "― [log=카스미]ไม่สิ... ตรงนี้ก็ค่อนข้าง...[/log][wa:320] "
1007802-62 = "― [log=카스미]อะไรกัน คุณครู? ทำไมมองฉันด้วยสายตาแบบนั้นล่ะ?[/log][wa:2000] "
1007802-64 = "― [log=카스미]มีปัญหาอะไรหรือเปล่า?[/log][wa:360] "
1007802-67 = "ฉันอยากฟังความคิดเห็นของคุณครูด้วย ก็เลยเรียกมาหาน่ะ"
1007802-68 = "สำหรับฉันแล้ว... การเลือกสถานที่ที่จะระเบิดเป็นเรื่องที่ใหม่และน่าตื่นเต้นเสมอ แต่บางครั้งฉันก็#nอยากฟังความคิดของคนอื่นดูบ้าง"
1007802-69 = "แต่ก็ใช่ว่าฉันจะฟังคำของทุกคนไปเรื่อยหรอกนะ แต่นี่เป็นคุณครูไง! เป็นคุณครู ไม่ใช่ใครอื่น"
1007802-70 = "...หืม?"
1007802-71 = "ทำไมฉันถึงมาอยู่ในที่แบบนี้ และทำไมที่นี่ถึงเป็น 'กองบัญชาการลับที่ 86' น่ะเหรอ?"
1007802-72 = "วะฮะฮ่า! ถามอะไรแบบนี้กันเนี่ย คุณครู! มันก็แน่นอนอยู่แล้ว ก็ฉันกำลังถูกไล่ตามตัวอยู่น่ะสิ"
1007802-73 = "เห็นอย่างนี้ฉันก็เป็นคนที่ถูกหมายหัวจากเกเฮนน่าเชียวนะ จะให้ออกไปเดินอยู่ข้างนอกก็คงใช่ที่"
1007802-74 = "อีกอย่าง เรื่องการวางแผนระเบิดน่ะ... เป็นงานที่ต้องใช้สมาธิสูงมากเลยนะ"
1007802-75 = "ฉันก็เลยมักจะไปเตรียมงานในที่ที่ไม่เอะอะโวยวายมากเกินไปน่ะ"
1007802-76 = "เราเลิกคุยเรื่องหยุมหยิมกันเถอะ! เรื่องสำคัญคือแผนการระเบิดต่างหาก!"
1007802-77 = "งั้นจากนี้ฉันจะลองใช้นิ้วเท้ากดๆ ดู คุณครูก็ช่วยให้ความคิดเห็นด้วยนะ เข้าใจมั้ย?"
1007802-78 = "เอาละ... อืม... ไหนดูซิ~"
1007802-79 = "ตรงนี้! ตรงนี้เป็นยังบ้าง? อยู่ใต้ห้างสรรพสินค้าเลย!"
1007802-80 = "ว่าไงนะ? ไม่ค่อยโอเคเหรอ? งั้นเหรอ...? ฮืม... ก็อาจจะเป็นอย่างที่คุณครูบอกก็ได้"
1007802-81 = "ถ้างั้นตรงนี้ล่ะ? สถานีรถไฟใต้ดินที่เปลี่ยนสายไปเส้นอื่นได้! ตอนนี้มันถูกขุดไปครึ่งหนึ่งแล้ว งั้นเราก็ขุดลงไปให้ลึกอีก ให้เจอความร้อนแรงกว่าเดิมอีกได้เลย!"
1007802-82 = "ว่าไงนะ? ให้ไปหาที่ใหม่ที่ยังไม่เคยไปเหรอ? ฮืม... เอางั้นเหรอ?"
1007802-83 = "ถ้างั้นก็~ อืมมม..."
1007802-84 = "อืมมมมม~~!!!!!"
1007802-86 = "(หลังจากนั้นคาสุมิก็เอาแต่เลือกพื้นที่ที่มีประชากรหนาแน่น หรือไม่ก็เขตที่มีการจราจรขวักไขว่)"
1007802-87 = "(แม้คุณครูจะพยายามเกลี้ยกล่อมให้ไประเบิดบริเวณที่ที่ไม่มีผู้คน แต่ก็ไม่เป็นผล...)"
1007802-89 = "อืม...!"
1007802-90 = "คุณครูเป็นพวกที่รอบคอบจริงๆ เลยนะเนี่ย สาธยายเหตุผลที่ไม่ควรระเบิดเสียยืดยาวเลย"
1007802-91 = "แต่ก็ไม่ได้การแล้วละ ฉันทนความโลภนี้ไม่ได้แล้ว!"
1007802-92 = "ที่ที่ฉันจะให้ดูต่อไปคือจุดสุดท้ายในบรรดาสถานที่ระเบิดแล้ว"
1007802-93 = "เอาละ! ระเบิดจุดนั้นเลยแล้วกัน ถึงคุณครูจะไม่เห็นด้วย ฉันก็จะไม่ฟัง! มันไม่มีจุดอื่นเหลือแล้วนะ!"
1007802-94 = "และที่นั่นก็คือ..."
1007802-95 = "[s5] \"กะ... ก็คือ...?\"\n[s6] กลืนน้ำลายดังเอื๊อก"
1007802-98 = "...ตรงนี้!!"
1007802-102 = "[ns7] \"ตรงนี้มันหุบเขาเปล่าเปลี่ยว...?\"\n[ns8] \"โอ้ว ที่นี่ก็น่าจะ...\""
1007802-105 = "วะฮะฮะฮ่า!! ทำหน้าอะไรแบบนั้นน่ะ! สีหน้าดูโล่งใจจังเลยนะ!"
1007802-106 = "ถือว่าเป็นการตอบโต้ในเชิงบวกมากกว่าทุกที่ก่อนหน้านี้เลยนะ"
1007802-107 = "เอาละ...! ตรงนี้โอเคเลยใช่มั้ยคุณครู? ครั้งนี้ไม่คิดจะห้ามอีกใช่มั้ย?"
1007802-108 = "[s9] \"ถ้าเป็นตรงนี้ครูให้ผ่าน\"\n[s10] พยักหน้า"
1007802-111 = "ดีละ ดีเลย! ถึงจะเป็นจุดสุดท้ายในสุดท้าย แต่ยังไงความเห็นของเราก็ตรงกันอยู่นะ!"
1007802-112 = "งั้นเอาเป็นว่าคุณครูเห็นด้วย! ไว้ฉันจะมาบอกผลลัพธ์ต่างหากนะ"
1007802-113 = "อืม...! เลือกได้ยอดเยี่ยมมากเลย ถูกใจฉันมาก!"
1007802-114 = "ขอบคุณสำหรับการประชุมวันนี้นะ! แล้วไว้เจอกันคราวหน้านะคุณครู!!"
1007802-125 = "สตงสติไม่อยู่กับเนื้อกับตัวแล้ว เกือบลืมอุปกรณ์ไว้ที่นี่ซะแล้ว"
1007802-126 = "...ถ้างั้นก็"
1007802-127 = "ขอตัวก่อนก็แล้วกันนะ!!"
1007802-133 = "(...คุณครูเฝ้ามองคาสุมิเดินจากไปจนลับตา พลางถอนหายใจอย่างโล่งใจ)"

1007802-67 = "3;카스미;99;이왕이면 선생님의 의견도 듣고 싶어서 부른 건데 말이야.\n#3;a\n#3;em;…"
1007802-68 = "3;카스미;03;발파할 장소를 고르는 건……. 늘 새롭고 짜릿한 일이지만, 가끔은 다른 사람의 말도 좀 들어보고 싶어서 말이지!"
1007802-69 = "3;카스미;02;물론 아무 사람의 말이라고 다 들어주는 건 아니라고? 선생님이니까! 다른 누구도 아닌 선생님의 말이니까 말이야.\n#3;em;[음표]"
1007802-70 = "3;카스미;08;……응?"
1007802-71 = "3;카스미;11;애초에 왜 이런 곳에 있는 거냐고? 왜 '이번 달의 86번째 아지트'냐고?"
1007802-72 = "3;카스미;03;와핫핫! 당연한 걸 물어보네, 선생님은! 그야 당연히 내가 쫓기는 입장이니까 그렇지.\n#3;em;[재잘]\n#3;jump"
1007802-73 = "3;카스미;10;이래 봬도 게헨나의 수배령을 받고 있는 몸이라고. 아무 데에서나 막 움직일 순 없잖아?"
1007802-74 = "3;카스미;99;게다가 발파 계획을 수립하는 건……. 꽤나 고도의 집중력을 필요로 하는 일이라서 말이지.\n#3;em;…"
1007802-75 = "3;카스미;01;이런 때에는 너무 왁자지껄하지 않은 곳에서 준비하는 편이거든."
1007802-76 = "3;카스미;02;아무튼 사소한 이야기는 그만! 중요한 건 발파 계획이야, 발파 계획!\n#3;em;[!]"
1007802-77 = "3;카스미;01;그럼 지금부터 내가 발가락으로 잘 짚어 볼 테니까 의견을 제시해 줘. 알겠지?"

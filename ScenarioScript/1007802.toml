[translation]
1007802-1 = "Kinugawa Kasumi"
1007802-2 = "I followed Kasumi's directions to an old, abandoned building."
1007802-6 = "Is someone there?"
1007802-7 = "Ah, Sensei! Good timing!"
1007802-8 = "Come right over here!"
1007802-9 = "[s1] \"So it is you, Kasumi. Good. Be right there.\"\n[s2] Head toward the sound of Kasumi's voice."
1007802-17 = "Sensei!"
1007802-18 = "I'm here!"
1007802-19 = "No, not there! Over here!"
1007802-22 = "― [log=카스미]Wow! Wahaha![/log][wa:800] "
1007802-24 = "― [log=카스미]You couldn't have arrived at a better time![/log][wa:10] "
1007802-27 = "― [log=카스미]Welcome, Sensei...[/log][wa:320] "
1007802-29 = "― [log=카스미]...to my top secret hideout! Number 86 to be exact![/log][wa:510] "
1007802-32 = "― [log=카스미]What am I doing here?[/log][wa:690] "
1007802-35 = "― [log=카스미]I can't believe you had to ask, Sensei.[/log]"
1007802-37 = "― [log=카스미]You know I only ever do one thing.[/log][wa:380] "
1007802-40 = "― [log=카스미]It's my favorite thing in the whole world...[/log]"
1007802-42 = "― [log=카스미]Researching new and exciting hot spring spots![/log][wa:260] "
1007802-45 = "[ns3] \"New...hot spring spots?\"\n[ns4] \"B-But that would mean...\""
1007802-46 = "― [log=카스미]Haha! Sensei![/log][wa:800] "
1007802-47 = "― [log=카스미]Haha! Sensei![/log][wa:800] "
1007802-49 = "― [log=카스미]The look on your face is priceless. Haha![/log][wa:10] "
1007802-52 = "― [log=카스미]Eh-hem. Anyway... Yes, it's exactly what you think.[/log][wa:10] "
1007802-54 = "― [log=카스미]I'm looking for the perfect spot to blast into oblivion![/log][wa:10] "
1007802-57 = "― [log=카스미]Hm... Maybe here?[/log][wa:2040] "
1007802-59 = "― [log=카스미]No. That spot's no good. It needs to be epic![/log][wa:10] "
1007802-62 = "― [log=카스미]What? Sensei? Why are you looking at me like that?[/log][wa:1840] "
1007802-64 = "― [log=카스미]What's wrong?[/log][wa:680] "
1007802-67 = "If you have an opinion, I'd love to hear it."
1007802-68 = "I know what I'm looking for in a perfect demo location, but sometimes I appreciate input from others!"
1007802-69 = "Of course, I don't take just anyone's opinion. But you're Sensei. Of course I want to know what you think!"
1007802-70 = "Huh?"
1007802-71 = "Oh, there's a perfectly reasonable explanation for why I'm at my eighty-sixth hideout this month..."
1007802-72 = "Haha! The answer is obvious, Sensei. I'm on the lamb!"
1007802-73 = "Gehenna put a fat bounty on my head, so I have to be careful where I show my face."
1007802-74 = "Plus, planning a demolition demands a lot of focus."
1007802-75 = "Which means I need somewhere off the beaten path to do it, you know? Somewhere quiet."
1007802-76 = "I won't bore you with the details. What's important is the demo plan itself!"
1007802-77 = "I've got a few ideas brewing. Just for fun, I'll point out locations with my toes, and you can tell me what you think!"
1007802-78 = "Let's see... Hm..."
1007802-79 = "How about here, where the department store is? A hot spring would be way better than some dumb store."
1007802-80 = "You're not feeling that one? Hm... Maybe..."
1007802-81 = "Here? The subway transfer station is basically a giant hole in the ground as it is, which means we could dig even deeper!"
1007802-82 = "No? A fresher target, huh? Hm... Well, if you say so."
1007802-83 = "Then... Hm."
1007802-84 = "Ummmm!"
1007802-86 = "Kasumi continued picking high-traffic or heavily-populated areas."
1007802-87 = "I tried to redirect her to somewhere less crowded, but it was difficult."
1007802-89 = "Hm...!"
1007802-90 = "You're a thinker, aren't you Sensei? No matter what I pick, you find a reason not to use it."
1007802-91 = "Well, that ends now! I can't stand the rejection any longer!"
1007802-92 = "This next one is also the last one on my list of potential demo sites."
1007802-93 = "So even if you don't like it, you have to like it. Got it? Okay, here we go..."
1007802-94 = "It's..."
1007802-95 = "[s5] \"Yes. It's...?\"\n[s6] Gulp nervously."
1007802-98 = "Here!"
1007802-102 = "[ns7] \"An undeveloped valley?\"\n[ns8] \"Actually, this might be...\""
1007802-105 = "Wahaha! I can tell by the look on your face that you're relieved."
1007802-106 = "Or, well... It's the least displeased you've looked so far. Ha!"
1007802-107 = "So, what do you say, Sensei? This is the spot, right? No objections?"
1007802-108 = "[s9] \"This place should be just fine.\"\n[s10] Nod."
1007802-111 = "All right, all right! It really came down to the wire, but we finally found one we agree on!"
1007802-112 = "Now that I have your vote of confidence, I'll start work and keep you updated on progress!"
1007802-113 = "This worked out quite nicely, if I say so myself! I'm satisfied!"
1007802-114 = "Thanks for meeting with me today, Sensei! See you next time!"
1007802-125 = "Oh! I nearly forgot my gear!"
1007802-126 = "...well, then..."
1007802-127 = "See you later, Sensei!"
1007802-133 = "As I pondered the spot Kasumi had occupied only moments before, I sighed in relief."

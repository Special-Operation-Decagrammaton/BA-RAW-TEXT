[translation]
2003015-1 = "Call It a Change of Pace"
2003015-3 = "Ah, Sensei. Over here, if you please."
2003015-4 = "[s] \"Aren't you tired?\""
2003015-5 = "..."
2003015-6 = "I might have felt such a way at another time."
2003015-7 = "But it's curious. My weariness disappeared once I saw your face."
2003015-8 = "[s] \"There's something curious about my face?\""
2003015-9 = "Fufu. Is that what I said?"
2003015-10 = "Anyway, Sensei..."
2003015-11 = "Do I look different today?"
2003015-13 = "And the moment she said that..."
2003015-14 = "A chill ran up my spine..."
2003015-15 = "This was like something out of a movie!"
2003015-17 = "[ns] \"I-I wonder? Is it your clothes?\""
2003015-18 = "Fufu. That's a given, but far too general."
2003015-19 = "Something else. Something...more."
2003015-20 = "Though Haruna was smiling, I practically heard an invisible umpire declaring that I was striking out!"
2003015-22 = "[ns] \"Th-Th-Th-Then, your hair?!\""
2003015-23 = "I visited my favorite salon earlier."
2003015-24 = "But you are still missing it. Look past the obvious."
2003015-25 = "And no, it's not just the sunglasses."
2003015-26 = "Though she kept up the smile, I heard a resounding \"strike two!\""
2003015-27 = "Fufufu..."
2003015-28 = "I do not intend to torture you, Sensei. I only wished for a little whimsy."
2003015-29 = "But, truly, I hoped that you might notice..."
2003015-30 = "...Not that it's paramount. But it would be nice if you could...pleasantly surprise me."
2003015-31 = "Now, Sensei. Let me ask you again."
2003015-32 = "Do I seem different today?"
2003015-33 = "This was...the final pitch...!"
2003015-35 = "[ns] \"Oh! Your wing has an adornment!\""
2003015-37 = "?!?!"
2003015-38 = "[ns] \"(Huh...?)\""
2003015-39 = "A-As expected... Sensei..."
2003015-40 = "The one I've chosen...with my heart..."
2003015-41 = "It's like curating the finest gourmet food..."
2003015-43 = "Something felt serious, so I asked if Haruna was all right."
2003015-44 = "She seemed unnaturally startled. Her smile wavered."
2003015-46 = "Hm..."
2003015-47 = "I wear a different wing adornment depending on the occasion."
2003015-48 = "On a typical day, I wear a pendulum with ribbons."
2003015-49 = "When the situation requires a tad more decorum, I bear a circular heart."
2003015-50 = "None of these decisions are set in stone. They're all dependent on my mood or the environment."
2003015-51 = "[s] \"I...see?\""
2003015-52 = "Yes. It's something like that."
2003015-53 = "And today... I put on a butterfly decoration that I especially cherish."
2003015-58 = "Thank you for recognizing it, Sensei."
2003015-59 = "[ns] \"Right...\""
2003015-60 = "If you look closely, this butterfly is split into two unified halves."
2003015-61 = "It is at once the clouded yellow and the glasswing butterfly."
2003015-62 = "Do you know what each of them represents?"
2003015-63 = "[s] \"I don't... Will you tell me?\""
2003015-64 = "Fufu. If I were to direct you, it would diminish the joy and discovery of this fine dining experience. I'll leave the answer as a treat for the future."
2003015-65 = "But Sensei, the fact that it's half one and the other holds a greater meaning."
2003015-66 = "It means they're a pair. Together."
2003015-67 = "And a pair of butterflies symbolizes..."
2003015-71 = "..."
2003015-72 = "S-Sorry. Let's move away from this subject."
2003015-73 = "[s] \"What's wrong, Haruna?\""
2003015-74 = "I-It's nothing! Nothing is the matter."
2003015-75 = "[s] \"I don't really understand, but if you say so, Haruna...\""
2003015-79 = "[ns1] \"Anyway, you said that you really cherish it?\"\n[ns2] \"This is the stadium. Aren't you worried it could get damaged?\""
2003015-82 = "?!?!"
2003015-83 = "Th-That's..."
2003015-84 = "That is a real and present risk..."
2003015-85 = "But I thought that the one person who would appreciate its beauty would be here."
2003015-86 = "[s] \"I...see?\""
2003015-87 = "...Of course, that person tends to be a bit dense with such matters, so I have my doubts that they will catch on to the subtext."
2003015-88 = "..."
2003015-89 = "Isn't it fascinating, Sensei?"
2003015-90 = "Someone who notices the changes of small decorations like charms..."
2003015-91 = "When it comes to perceiving...what's but a step away..."
2003015-92 = "Refuses to glance at what's in front of them. It feels...almost intentional."
2003015-93 = "[s] \"Haruna? Are you...mad?\""
2003015-94 = "Ah, n-n-no! Not at all! Not even a smidgen."
2003015-95 = "I feel more so..."
2003015-96 = "...More so."
2003015-97 = "..."
2003015-98 = "Fufu. It's nothing."
2003015-99 = "Even this side of Sensei, I..."
2003015-100 = "Now Sensei. For today's fine dining..."
2003015-101 = "No."
2003015-102 = "I propose we spend a little more time here, you and me."
2003015-103 = "I would like to reward you for noticing my change."
2003015-104 = "Since Sensei always provides us with such tasty items, I believe it's my turn to give you something delicious in return."
2003015-105 = "They say a teacher's kindness is as boundless as the sky."
2003015-106 = "[s3] \"Such a sentiment from Haruna...\"\n[s4] \"I'm so touched, I could cry...\""
2003015-109 = "You are pleased?"
2003015-110 = "Come, I shall lead the way."
2003015-118 = "Haruna linked her arm in mine."
2003015-119 = "We explored every corner of the stadium."

[translation]
2003015-1 = "เปลี่ยนบรรยากาศสักหน่อยแล้วกันค่ะ"
2003015-3 = "อ๊ะ คุณครู ทางนี้ค่ะ"
2003015-4 = "[s] \"เหนื่อยรึเปล่า?\""
2003015-5 = "......"
2003015-6 = "ถ้าเป็นช่วงปกติฉันก็คงจะรู้สึกเหนื่อยค่ะ"
2003015-7 = "น่าแปลกนะคะ พอได้เห็นหน้าคุณครูแล้ว ความรู้สึกพวกนั้นก็หายไปหมดเลยค่ะ"
2003015-8 = "[s] \"ถึงเห็นหน้าครูก็ไม่น่ามีเรื่องอะไรสนุกๆ หรอก...\""
2003015-9 = "ฮุฮุ แล้วมันยังไงกันล่ะคะ?"
2003015-10 = "ว่าแต่ว่าคุณครูคะ"
2003015-11 = "วันนี้ฉัน... ดูมีอะไรแตกต่างไปจากเดิมมั้ยคะ?"
2003015-13 = "(ขณะที่ฮารุนะกำลังพูด...!)"
2003015-14 = "(จู่ๆ ก็รู้สึกขนลุกซู่และหนาวสั่นไปทั้งตัว!)"
2003015-15 = "(ซึ่งสถานการณ์แบบนี้มักปรากฎให้เห็นในภาพยนตร์บ่อยๆ!)"
2003015-17 = "[ns] \"นะ... นั่นสินะ? เป็นเพราะเสื้อรึเปล่านะ?\""
2003015-18 = "ฮุฮุ ใช่แล้วค่ะ"
2003015-19 = "มีอย่างอื่นนอกจากของที่เห็นชัดขนาดนั้นอีกมั้ยคะ?"
2003015-20 = "(ถึงฮารุนะจะยิ้มอยู่ แต่คุณครูกลับรู้สึกเหมือนได้ยินเสียงเธอนับ 'หนึ่ง' ดังมาจากที่ไหนสักแห่ง!)"
2003015-22 = "[ns] \"งะงะงะงะงั้น... งั้นคงเป็นทรงผม?!\""
2003015-23 = "ฉันขอให้ร้านทำผมที่ไปประจำทำผมให้ค่ะ"
2003015-24 = "นอกจากนั้นยังมีอย่างอื่นที่เห็นชัดอีกไม่ใช่เหรอคะ?"
2003015-25 = "แล้วแว่นกันแดดด้วยรึเปล่าคะ?"
2003015-26 = "(ถึงฮารุนะจะยังยิ้มอย่างสดใสอยู่ แต่คุณครูกลับรู้สึกเหมือนได้ยินเสียงเธอนับ 'สอง' ดังมาจากที่ไหน#nสักแห่ง!) "
2003015-27 = "ฮุฮุฮุ..."
2003015-28 = "ฉันรู้ดีค่ะว่านี่เป็นการกลั่นแกล้งที่ดูเอาแต่ใจไปสักหน่อย"
2003015-29 = "แต่ก็แค่เผื่อไว้ก่อนน่ะค่ะ เผื่อว่าถ้าเป็นคุณครูจะมองว่ายังไง"
2003015-30 = "ถึงคุณครูจะเดาไม่ถูกก็ไม่เป็นไร แต่มันก็มีโอกาสที่จะเดาถูกสักข้ออยู่บ้างใช่มั้ยล่ะคะ?"
2003015-31 = "เอาละค่ะ คุณครู ฉันจะถามอีกครั้งนะคะ"
2003015-32 = "วันนี้ฉัน... ดูมีอะไรแตกต่างไปจากเดิมมั้ยคะ?"
2003015-33 = "(นี่อาจจะเป็น... โอกาสสุดท้ายแล้ว...!)"
2003015-35 = "[ns] \"นั่นไง! เครื่องประดับปีก!!!\""
2003015-37 = "?!?!"
2003015-38 = "[ns] (เอ๋...?)"
2003015-39 = "สะ... สมกับเป็นคุณครู..."
2003015-40 = "คะ... คนที่ฉันเลือก... ให้อยู่ในใจ..."
2003015-41 = "เหมือนกับอากาศชั้นเลิศ..."
2003015-43 = "(บรรยากาศดูไม่ปกติเท่าไร คุณครูเลยถามฮารุนะว่าเป็นอะไรหรือเปล่า)"
2003015-44 = "(ฮารุนะยังคงยิ้ม แต่ดูมีท่าทีประหม่าและเคอะเขินเล็กน้อย...)"
2003015-46 = "อะแฮ่ม..."
2003015-47 = "จริงๆ แล้วฉันจะใส่เครื่องประดับปีกที่แตกต่างกันไปในแต่ละโอกาสค่ะ"
2003015-48 = "ตอนใส่ชุดธรรมดา ส่วนใหญ่ฉันจะติดเป็นเพนดูลัมที่มีริบบิ้นค่ะ"
2003015-49 = "แต่เวลาที่อยากแต่งให้ดูทางการขึ้นหน่อย ฉันจะติดเป็นเพนดูลัมรูปหัวใจกลมๆ ค่ะ"
2003015-50 = "แต่ก็ไม่ได้ตายตัวหรอกนะคะ บางครั้งก็เปลี่ยนไปตามอารมณ์หรือสภาพแวดล้อมค่ะ"
2003015-51 = "[s] \"อย่างนี้... นี่เอง\""
2003015-52 = "ค่ะ ก็เป็นแบบนั้นละค่ะ"
2003015-53 = "และวันนี้... ฉันลองใส่เป็นรูปผีเสื้ออันที่ชอบเป็นพิเศษมาค่ะ"
2003015-58 = "ขอบคุณอีกครั้งนะคะที่สังเกตเห็น"
2003015-59 = "[ns] \"อะ... อื้ม\""
2003015-60 = "ที่จริงแล้วหากสังเกตดีๆ จะเห็นว่าเครื่องประดับผีเสื้ออันนี้มันแยกออกเป็นสองชิ้นค่ะ"
2003015-61 = "เป็นผีเสื้อสีเหลืองกับผีเสื้อที่มีปีกสีใสค่ะ"
2003015-62 = "คุณครูทราบความหมายของผีเสื้อแต่ละชนิดมั้ยคะ?"
2003015-63 = "[s] \"ครูไม่รู้เลย...\""
2003015-64 = "ฮุฮุ ก็เหมือนกับถ้าลองชิมรสชาติไปล่วงหน้า ความสุขที่ได้ดื่มด่ำอาหารเลิศรสก็จะลดลงสินะคะ ถ้าอย่างนั้นก็อดเปรี้ยวไว้กินหวานก่อนแล้วกันนะคะ"
2003015-65 = "แต่รู้มั้ยคะคุณครู? คำว่า \"ครึ่งหนึ่ง\" นั้นน่ะ แท้จริงแล้วมันมีนัยยะที่ลึกซึ้งกว่าที่เห็นซ่อนอยู่นะคะ"
2003015-66 = "ความหมายที่ซ่อนอยู่ของมันก็คือผีเสื้อที่เป็นคู่กันยังไงล่ะคะ"
2003015-67 = "และที่บอกว่าผีเสื้อคู่หนึ่ง..."
2003015-71 = "......"
2003015-72 = "ขะ... ขอโทษค่ะ เราจบหัวข้อสนทนาเรื่องนี้ไว้เพียงเท่านี้ดีกว่าค่ะ"
2003015-73 = "[s] \"ทำไมล่ะฮารุนะ?\""
2003015-74 = "มะ... ไม่มีอะไรหรอกค่ะ! ค่ะ ไม่มีอะไรทั้งนั้นค่ะ!"
2003015-75 = "[s] \"ถึงไม่ค่อยเข้าใจ แต่ฮารุนะว่ายังไงครูก็ว่าตาม...\""
2003015-79 = "[ns1] \"ฮารุนะบอกว่าเป็นของที่ชอบมากๆ ไม่กลัวหล่นหายเหรอ?\"\n[ns2] \"ที่นี่เป็นสนามกีฬานะ มันอาจหล่นหายได้ จะไม่เป็นไรแน่นะ?\""
2003015-82 = "?!?!?!"
2003015-83 = "ระ... เรื่องนั้น..."
2003015-84 = "มะ... มันอาจเกิดเหตุการณ์อันตรายแบบนั้นก็ได้..."
2003015-85 = "แต่เพราะฉันเชื่อใจคนที่มาที่นี่ในวันนี้ยังไงล่ะคะ"
2003015-86 = "[s] \"งั้นเหรอ?\""
2003015-87 = "ถึงคนคนนั้นจะไม่ค่อยได้สนใจเรื่องแบบนี้เท่าไรก็เถอะค่ะ และดูเหมือนว่าเขาจะยังไม่สังเกตด้วยค่ะ..."
2003015-88 = "......"
2003015-89 = "น่าแปลกใช่มั้ยล่ะคะคุณครู?"
2003015-90 = "คนที่สังเกตเห็นแม้แต่ความเปลี่ยนแปลงเล็กๆ น้อยๆ ของเครื่องประดับ อย่างต่างหู..."
2003015-91 = "แต่สำหรับสิ่งที่อยู่ห่างไปเพียงก้าวเดียว..."
2003015-92 = "อ่า... การที่ไม่สนใจเลยแบบนี้มันทำให้ฉันคิดว่าจงใจทำนะคะ"
2003015-93 = "[s] \"ฮารุนะ? หรือว่า... โกรธครูเหรอ?\""
2003015-94 = "ปะ... ปะปะปะปะเปล่าค่ะ! จะเป็นอย่างนั้นได้ยังไงกันล่ะคะ ไม่จริงสักหน่อยค่ะ"
2003015-95 = "ก็แค่..."
2003015-96 = "แค่......"
2003015-97 = "......"
2003015-98 = "ฮุฮุ ไม่มีอะไรหรอกค่ะ"
2003015-99 = "เพราะสำหรับฉันแล้ว ถึงคุณครูจะมีมุมแบบนั้น..."
2003015-100 = "เอาละ คุณครู ถ้างั้นอาหารเลิศรสของวันนี้..."
2003015-101 = "ไม่สิ"
2003015-102 = "วันนี้คุณครูพอจะแบ่งเวลาไปสนุกสนานกับกิจกรรมที่เหลือของวันนี้ได้มั้ยคะ?"
2003015-103 = "และฉันก็อยากให้ 'รางวัล' ที่มองเห็น 'ความเปลี่ยนแปลง' ของฉันด้วยค่ะ"
2003015-104 = "คุณครูมักซื้อของอร่อยๆ ให้พวกเราตลอด ดังนั้นวันนี้ฉันเลยอยากซื้อของอร่อยๆ ให้คุณครู#nเป็นการตอบแทนบ้างค่ะ"
2003015-105 = "ดังคำกล่าวที่ว่า 'พระคุณของคุณครูยิ่งใหญ่กว่าผืนฟ้า' ไงล่ะคะ"
2003015-106 = "[s3] \"ฮารุนะมีจิตใจที่ลึกซึ้งขนาดนี้เลยเหรอ...\"\n[s4] \"ครูซึ้งจนน้ำตาจะไหลแล้ว...\""
2003015-109 = "เช่นนั้นคุณครูก็คงจะพอมีเวลาใช่มั้ยคะ?"
2003015-110 = "ไปกันเถอะค่ะ ฉันจะนำทางให้เองค่ะ"
2003015-118 = "(ฮารุนะเดินเข้าไปคล้องแขนกับคุณครูอย่างเป็นธรรมชาติ)"
2003015-119 = "(ทั้งสองคนเดินไปดูบริเวณต่างๆ ในสนามกีฬาด้วยกันอย่างสนุกสนาน)"

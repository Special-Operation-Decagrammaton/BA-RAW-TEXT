[translation]
2003015-1 = "就當作是換個心情"
2003015-3 = "啊，老師。這邊請。"
2003015-4 = "[s]「你不累嗎？」"
2003015-5 = "……"
2003015-6 = "如果是平常，或許會覺得有點累吧。"
2003015-7 = "不過這還真神奇。#n看見老師的臉之後，這種感覺全都消失了。"
2003015-8 = "[s]「我的臉其實也沒什麼有趣的吧……」"
2003015-9 = "呵呵，那可不一定哦？"
2003015-10 = "話說，老師？"
2003015-11 = "我今天，有沒有什麼不一樣的地方呢？"
2003015-13 = "（就在羽留奈說出這句話的瞬間……！）"
2003015-14 = "（寒意突然如電光一般竄過了脊背！）"
2003015-15 = "（這完全是戲劇或電影裡常見的情節！）"
2003015-17 = "[ns]「這，這個嘛……衣服？」"
2003015-18 = "呵呵，雖然這的確是最顯而易見的部分……"
2003015-19 = "除了這明顯的答案之外呢？"
2003015-20 = "（羽留奈雖然笑著，但彷彿聽見某處傳來了「一」的聲音！）"
2003015-22 = "[ns]「那，那那那，那是髮型嗎！？」"
2003015-23 = "我確實請了熟悉的髮型師幫忙整理過……"
2003015-24 = "不過這也同樣過於明顯了吧？"
2003015-25 = "同理，墨鏡也不是正確答案哦？"
2003015-26 = "（羽留奈雖然笑著，但彷彿聽見某處傳來了「二」的聲音！）"
2003015-27 = "呵呵呵……"
2003015-28 = "當然我也清楚，這是場任性且有些壞心的惡作劇。"
2003015-29 = "不過我還是想試試看……如果是老師究竟會如何？"
2003015-30 = "就算答不出來也沒關係，但是萬一那種可能性真的存在呢？"
2003015-31 = "來吧，老師。#n我再問您一次。"
2003015-32 = "我今天，有沒有什麼不一樣的地方呢？"
2003015-33 = "（這次，應該是最後的機會了……！）"
2003015-35 = "[ns]「是這個吧！翅膀上的裝飾！！」"
2003015-37 = "！？！？"
2003015-38 = "[ns]（咦……？）"
2003015-39 = "果，果然……老師您……"
2003015-40 = "就是我心裡……選定的那個人……"
2003015-41 = "宛如極致的美食一般……"
2003015-43 = "（感覺氣氛有些不對勁，於是開口詢問羽留奈的情況）"
2003015-44 = "（羽留奈似乎異常慌張，甚至露出了略顯僵硬的笑容……）"
2003015-46 = "唔，唔嗯……"
2003015-47 = "其實，我會根據場合更換翅膀上的飾品。"
2003015-48 = "比如穿便服時，大多會配戴附有緞帶的鐘擺款。"
2003015-49 = "在正式場合則是圓潤的心形款。"
2003015-50 = "不過這也並非絕對，最終依然會視心情或環境做出選擇。"
2003015-51 = "[s]「這，這樣啊？」"
2003015-52 = "沒錯，正是如此。"
2003015-53 = "而今天……我特別戴上了相當珍視的蝴蝶造型飾品。"
2003015-58 = "因此，我想再次感謝老師能注意到它。"
2003015-59 = "[ns]「嗯，嗯……」"
2003015-60 = "其實仔細看就會發現，這個蝴蝶裝飾是由左右兩邊所構成。"
2003015-61 = "一邊是黃色的蝴蝶，另一邊則是玻璃翅膀的蝴蝶。"
2003015-62 = "老師知道它們各自的含義嗎？"
2003015-63 = "[s]「不知道……」"
2003015-64 = "呵呵。若是提前知道味道，將有損品味的樂趣。#n這就留做日後的驚喜吧。"
2003015-65 = "不過老師……左右各半這件事，本身就帶有另一層意義。"
2003015-66 = "那就是，一對蝴蝶。"
2003015-67 = "而一對蝴蝶……"
2003015-71 = "……"
2003015-72 = "不，不好意思，這個話題還是到此為止吧。"
2003015-73 = "[s]「怎麼了嗎，羽留奈？」"
2003015-74 = "沒，沒事！真的沒什麼！"
2003015-75 = "[s]「雖然不是很懂，但既然羽留奈都這麼說了……」"
2003015-79 = "[ns1]「不過，你剛才說這是特別珍視的東西對吧？」\n[ns2]「萬一在運動會會場弄壞了怎麼辦，沒問題嗎？」"
2003015-82 = "！？！？"
2003015-83 = "這，這……"
2003015-84 = "雖然確實有這種風險……"
2003015-85 = "但我相信，今天一定會有某個人來到這裡。"
2003015-86 = "[s]「原，原來如此？」"
2003015-87 = "雖然那個人對這種事情有些遲鈍，所以可能不會察覺到那層意思……"
2003015-88 = "……"
2003015-89 = "您不覺得很奇妙嗎，老師？"
2003015-90 = "明明是連耳環這類微小的飾品變化都能注意到的人……"
2003015-91 = "卻偏偏對在那之後、近在咫尺的某樣事物毫不在意……"
2003015-92 = "簡直……就像刻意避開著視線一樣。"
2003015-93 = "[s]「羽留奈？你是不是……生氣了？」"
2003015-94 = "沒，沒沒沒沒，沒有！怎麼會呢！絕對沒有！"
2003015-95 = "只是……"
2003015-96 = "……只是。"
2003015-97 = "……"
2003015-98 = "呵呵，沒什麼。"
2003015-99 = "想必就連老師的這種部分，對我來說也是……"
2003015-100 = "老師？那麼今天的美食……"
2003015-101 = "不。"
2003015-102 = "應該說今天剩餘的時光，能否讓我與您共享呢？"
2003015-103 = "作為老師注意到我「改變」的獎勵……"
2003015-104 = "老師平常總是請我們吃好吃的東西，今天就換我招待老師吃點「美味」的東西吧。"
2003015-105 = "不是有句話說，師恩如天嗎？"
2003015-106 = "[s3]「羽留奈居然有這麼棒的心意……」\n[s4]「老師我感動到眼淚都要掉下來了……」"
2003015-109 = "看來您是答應了吧？"
2003015-110 = "那麼一起走吧。我來帶路。"
2003015-118 = "（被羽留奈自然地挽住了手臂……）"
2003015-119 = "（一起逛遍了會場的每個角落）"

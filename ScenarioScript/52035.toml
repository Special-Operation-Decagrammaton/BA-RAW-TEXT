[translation]
52035-2 = "Tch... I knew this wouldn't be easy!"
52035-3 = "But I know the pale one's secret shame!"
52035-10 = "Everyone, aim for her right! Her right arm is her weak point!"
52035-21 = "How utterly shameless!"
52035-25 = "You're too soft, Renge. There's no virtue or shame in strategy. All that matters is victory."
52035-27 = "Nagusa, now!"
52035-32 = "...Right. Though my weakness may be on full display..."
52035-33 = "...I still have friends who rely on me and keep me standing strong."
52035-35 = "Ugh... Boss, we can't take much more!"
52035-36 = "Maybe we'll let this haiku thing go and beat them at the next senryu competition instead!"
52035-38 = "Will you PLEASE stop talkin' about my haiku?!"
52035-42 = "Grrr... Until next time, Hyakkaryouran!"
52035-52 = "Wait. Wait a second!"
52035-56 = "Who's trying to ruin our festival? Where'd they go?"
52035-57 = "Do you people have any idea how much the Yin-Yang Club raised to pay for—"
52035-62 = "P-President, I understand the passion, but you can't just leave a meeting with the higher-ups...!"
52035-66 = "...Huh? The Hyakkaryouran?"
52035-67 = "Hm? You're right! Why is the Hyakkaryouran..."
52035-68 = "...When I heard about a \"haiku battle\" in the street I assumed it would be the Ninjutsu Research Club. But the Hyakkaryouran? Of all people?"
52035-73 = "Don't be ridiculous! We were the ones breaking it up!"
52035-74 = "...Anyway, does the Ninjutsu Research Club really have \"haiku battles\"?"
52035-75 = "I don't know much about it. Pina says they shout phrases a lot."
52035-77 = "Certain Mouryo were attempting to sabotage this haiku display. We arrived in hopes of peacefully mediating."
52035-78 = "However, the conflict escalated. We apologize for disrupting your festival preparations."
52035-79 = "No, please! We're grateful for your help!"
52035-80 = "The Mouryo crash every festival, no matter how much we invest in security. The Hyakkaryouran is a huge help!"
52035-81 = "On behalf of the Festival Operations Department and the Hyakkiyako merchant guild, I would like to express my gratitude."
52035-82 = "It's the sacred duty of the Hyakkaryouran to guard justice and curb chaos! We only wish you a peaceful and prosperous festival!"
52035-83 = "If you need help, call the Hyakkaryouran any time, day or night!"
52035-84 = "Oh, how funny you say that. If you're offering, the Momoyodou could use some helpers!"
52035-86 = "I'm sorry, but we are not in the business of running anyone's personal errands."
52035-87 = "The duty of the Hyakkaryouran is in ensuring the academy's safety and mediating conflict."
52035-88 = "Oh? That's unfortunate."
52035-89 = "We were hoping you could taste-test the new chestnut dango with special Trinity marron cream that we'll debut at this festival."
52035-93 = "But if the Hyakkaryouran is so busy, I guess we can find someone else."
52035-94 = "W-Wait. While we ARE busy, perhaps..."
52035-99 = "Too bad! Looks like the operations officer is all tied up with her noble tasks. I guess it'll just have to be the three of us..."
52035-104 = "Renge!"
52035-105 = "Fufu, just kidding. We have enough for everyone."
52035-109 = "Now, please follow me!"
52035-116 = "So sweet... It's really amazing!"
52035-117 = "This is truly dango? The inside is so soft and supple!"
52035-118 = "It's incredible! Who would have thought to combine a cream with wagashi?"
52035-119 = "And the savory scent of chestnuts brings to mind a manju, yet it all plays off the natural saltiness of the dango!"
52035-120 = "Yukari, you have chestnut cream on your face."
52035-121 = "And remember to brush your teeth right after. You don't want a sticky dessert getting stuck in your molars."
52035-125 = "O-Of course! I knew that!"
52035-127 = "This is quite innovative. You've captured the traditional appeal of the dango while adding novelty with the cream."
52035-128 = "However, I find the texture to be a little tiresome. Perhaps you can add tsukune in between the dango balls?"
52035-129 = "Then it wouldn't be a dessert!"
52035-130 = "Heehee! I'm glad everyone's enjoying it."
52035-131 = "We made these specifically for the Hyakkaryouran to thank you for your hard work. Please, have your fill!"
52035-132 = "You are much too gracious! It's you, the Festival Department, that livens up Hyakkiyako every season."
52035-133 = "Besides, we were...quite disappointing at the last Lantern Festival. You truly owe us nothing."
52035-134 = "Nonsense! The Festival Department was utterly overwhelmed last time. We hardly helped at all."
52035-135 = "Besides, it must have been terrible for the Hyakkaryouran, seeing as President Ayame had just disappeared—"
52035-143 = "A-Ah... Sorry! I didn't mean to—"
52035-145 = "...It's fine. Ayame shall return."
52035-146 = "When she does, I'll relay your kind wishes."
52035-147 = "Thank you. I'll...uh, leave you to it, then!"
52035-154 = "Um, excuse me. You see...we're working on an embankment around the central venue. It's sagging because of the recent rain."
52035-155 = "We're reinforcing its base with sandbags, but we could use a few strong hands."
52035-159 = "I'm sorry, but I don't have anyone to spare. Everyone's out securing supplies."
52035-160 = "Could you wait a bit? Once everyone's back, I'll lead them over—"
52035-164 = "If the safety of the festival is at stake, then the Hyakkaryouran shall rise to the occasion!"
52035-166 = "Sure. I could use a good workout."
52035-167 = "...Sounds like an ideal post-treat exercise."
52035-172 = "Great! In that case, I'll leave it to you—at least until the others return!"
52035-173 = "We shall not fail!"
52035-181 = "...This should be sufficient. I'll place those sandbags on top of the embankment, so stack them in order."
52035-182 = "They're heavy so pass them carefully."
52035-184 = "Don't worry! These are no heavier than my training weights."
52035-189 = "Fufu. Maybe it's due to all those dangos, but I am brimming with energy!"
52035-190 = "Nagusa, would you kindly pass me that bag?"
52035-191 = "Yes. Here you—"
52035-198 = "...Ugh."
52035-202 = "What's going on? What was that sound?"
52035-203 = "N-Nagusa! Are you all right?"
52035-209 = "Sure. Just...a sprained wrist."
52035-210 = "But you look so pained..."
52035-216 = "Nagusa, take off your bandages and show me your right arm."
52035-220 = "I told you, it's nothing..."
52035-225 = "Show me."
52035-236 = "This is..."
52035-237 = "...This doesn't look like a sprain to me."
52035-238 = "Nagusa, how long has your arm looked like this?"
52035-240 = "There was...a minor incident at the Great Snowfield. It'll heal soon, so you needn't worry."
52035-241 = "\"Heal soon\"? What happens if the wound festers and you can't use your arm anymore?"
52035-242 = "You need a doctor, right now! ...Wait, should we call an ambulance?"
52035-243 = "...There's no need to make a scene."
52035-249 = "Nagusa, if you'd please indulge me..."
52035-256 = "I think...the Kadenokouji family may be able to treat you."
52035-258 = "Next Episode;Honored Guest of the Kadenokouji Family"

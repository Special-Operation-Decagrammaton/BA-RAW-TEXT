52035-92 = "3;키쿄;12\n5;시즈코;99\n#3;em;[!]\n#3;stiff\n#5;h\n#3;h\n#wait;1000"
52035-93 = "5;시즈코;01;백화요란의 여러분이 그렇게 바쁘시다면 다른 분께 시식을 부탁드려야겠네요~\n#5;h\n#5;m4"

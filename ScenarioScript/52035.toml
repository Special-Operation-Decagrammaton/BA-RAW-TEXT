52035-125 = "3;유카리;09;무, 물론 기억하고 있사와요!\n#3;stiff"
52035-126 = "#all;hide"
52035-127 = "3;나구사ND;99;확실히 기존의 손님들이 좋아하는 정석적인 경단의 맛에 마롱 크림으로 새로운 풍미를 더한 것은 좋은 선택인 것 같아."
52035-128 = "3;나구사ND;03;하지만 단조로운 경단의 식감이 조금 아쉬운데…… 경단 사이에 다진 닭고기로 빚은 츠쿠네를 더하는 건 어떨까?\n#3;em;[반짝]"
52035-129 = "3;렌게;04;그럼 디저트가 아니게 되잖아?!\n#3;stiff"
52035-130 = "3;우미카;03;후후, 다들 마음에 들어 하시는 것 같아 다행이네요.\n#3;em;[재잘]"
52035-131 = "3;우미카;01;이 경단은 언제나 축제를 위해 힘써 주시는 백화요란 여러분을 위해 저희 마츠리부에서 준비한 것이니 사양 말고 마음껏 드셔 주세요!\n#3;greeting"
52035-132 = "5;유카리;01;그것 참 분에 넘치는 말씀이셔요. 사시사철 백귀야행의 풍경을 수놓는 멋진 축제를 앞장서 준비해 주시는 것은 언제나 마츠리부의 여러분이셨는걸요.\n#5;em;[반응]\n#5;al\n#3;m1"
52035-133 = "5;유카리;06;게다가 지난 등불 축제 때는 저희가 제대로 대응하지 못한 탓에 축제 준비에 여러모로 어려움을 끼쳤으니…… 정말로 면목이 없네요.\n#5;stiff"
52035-134 = "3;우미카;02;아녜요! 오히려 지난번에는 저희 마츠리부 일동 모두가 기절해 있던 탓에, 다른 분들이 축제를 수습하시는 동안 아무것도 하지 못했는걸요!"

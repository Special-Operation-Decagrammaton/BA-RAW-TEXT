52035-116 = "3;렌게;09;아아, 달콤해…… 진짜 끝내준다!\n#3;closeup\n#fontsize;80"
52035-117 = "3;렌게;03;이게 정말 내가 아는 경단이 맞는 거야? 달지 않고 부드러운 소 때문인지 양식 디저트를 먹는 것 같아!\n#3;closeup"
52035-118 = "3;유카리;14;소녀, 정말로 놀랐사와요! 트리니티 풍 디저어-트에 들어가는 크-림의 맛은, 화과자와는 전혀 어울리지 않을 것이라 생각했는데……\n#3;em;[재잘]\n#3;hophop"
52035-119 = "3;유카리;03;밤 만쥬 같은 고소한 알밤 향에, 부드러운 크-림의 단맛이 더해지니 짭짤한 경단과 참으로 잘 어울리는 것이와요!"
52035-120 = "1;키쿄;02;유카리, 입가에 밤 크림이 묻었어.\n#1;em;[반응]\n#3;m5\n#1;a"
52035-121 = "1;키쿄;07;그리고 경단같이 이에 달라붙기 쉬운 디저트를 먹고 난 뒤에 양치하는 것도 잊지 말렴."
52035-122 = "#st;[0,0];instant;1;"

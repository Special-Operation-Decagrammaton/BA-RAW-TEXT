[translation]
52035-2 = "可惡……百花繚亂果然不是省油的燈！"
52035-3 = "不過你們的弱點，我早就在上次戰鬥的時候完全掌握了！"
52035-10 = "大家，攻擊那傢伙的右側！#n他的右臂就是弱點！"
52035-21 = "竟然想利用對手的弱點來扭轉戰局，真卑鄙！"
52035-25 = "太天真了，蓮華。#n兵法中不存在王道與羞恥，會被記錄下來的就只有勝敗而已。"
52035-27 = "名草前輩，就是現在！"
52035-32 = "……沒錯。#n如今的我，無論面對誰都既脆弱又不足，甚至會輕易暴露弱點。"
52035-33 = "不過我有這些願意信任我、與我並肩作戰的珍貴夥伴。"
52035-35 = "唔啊……隊長，我們快撐不住了！"
52035-36 = "雖然可惜，但這次俳句大賽的事也只能先到此為止……還是放眼下次的川柳大賽吧！"
52035-38 = "我不是說過這跟俳句大賽沒關係了嗎！"
52035-42 = "可惡……給我記住，百花繚亂！"
52035-52 = "等等等等～！"
52035-56 = "敢在祭典準備期間鬧事的傢伙是誰啊？"
52035-57 = "知道陰陽部為這場祭典砸了多少錢──"
52035-62 = "部，部長～#n就算再怎麼急，也不能在和高層會議的途中突然衝出來啊……！"
52035-66 = "……咦？是百花繚亂的各位？"
52035-67 = "嗯？真的耶？#n各位為什麼會在這裡……"
52035-68 = "聽說祭典會場有人邊吟俳句邊打架的時候，我還以為是忍術研究部呢……#n結果竟然是百花繚亂啊？"
52035-73 = "那怎麼可能！我們是來阻止鬧事的傢伙的！"
52035-74 = "……話說，原來忍術研究部戰鬥的時候會吟唱俳句嗎？"
52035-75 = "其實我們也不太清楚，如果用菲娜的話來說……可能是「報上名號」之類的東西吧？"
52035-77 = "剛才是有一些妖怪劇團，因為對祭典會場的俳句招牌不滿而打算鬧事。#n我們只是想在衝突發生前「調停」而已……"
52035-78 = "如果妨礙到節慶運營管理部的話，真是不好意思。"
52035-79 = "不會不會，我們反而該感謝你們才對。"
52035-80 = "妖怪劇團每次有活動都會來搗亂，#n可惜警備的人力實在有限……百花繚亂的協助真的幫了很大的忙。"
52035-81 = "我代表節慶營運管理部和百鬼夜行商會，向你們致上最深的謝意。"
52035-82 = "不必客氣。讓百鬼夜行的學生能安心享受祭典……#n打擊不義、維護正義就是我們百花繚亂的使命！"
52035-83 = "如果需要幫忙的話，還請隨時聯絡！"
52035-84 = "啊，話說我其實有件與百夜堂業務相關的事，想請百花繚亂的各位幫忙……"
52035-86 = "抱歉，如果不是驅逐威脅祭典安全的不良學生的話，我們目前無法接受私人的委託。"
52035-87 = "百花繚亂的職責，終究在於守護學園的安全並調停紛爭──"
52035-88 = "哎呀，是嗎？#n那還真可惜。"
52035-89 = "即將在這次祭典首次推出，用三一產的栗子奶油製成的「特製栗子奶油團子」……#n我本來想請各位先試吃看看的說……"
52035-93 = "既然百花繚亂這麼忙也沒辦法，只好請其他人幫忙試吃囉～"
52035-94 = "等，等等！雖然我們的確很忙……"
52035-99 = "啊～啊，真可惜！#n看來百花繚亂的作戰參謀正忙著解決百鬼夜行的各種問題，只好我們三個自己去了！"
52035-104 = "蓮華！"
52035-105 = "呵呵，開玩笑的啦。#n團子準備得很充足。"
52035-109 = "請大家跟我來吧！"
52035-116 = "啊啊，好甜……太棒了！"
52035-117 = "這真的是我認識的團子嗎？#n既不會太甜，還有柔滑的奶香……感覺就像精緻的甜點一樣！"
52035-118 = "小女子也覺得很驚豔！#n原以為用在三一風甜點的奶油，會跟和菓子完全不搭……"
52035-119 = "結果栗子饅頭般的香濃栗香和柔滑奶油的甜味，居然會和鹹香的團子如此契合！"
52035-120 = "紫，你嘴角沾到栗子奶油了。"
52035-121 = "還有吃完這種容易黏牙的甜點之後，可別忘了要刷牙。"
52035-125 = "當，當然囉！"
52035-127 = "在傳統團子的風味中加入栗子奶油，確實是個能帶來新鮮感的好選擇。"
52035-128 = "不過團子的口感稍嫌單調……要不要試著在團子中間夾入雞肉丸子呢？"
52035-129 = "那就不是甜點了吧！？"
52035-130 = "呵呵，看大家似乎都很滿意的樣子，我就放心了。"
52035-131 = "這些團子是我們特別為一直守護著祭典的百花繚亂準備的，請盡情享用！"
52035-132 = "各位真是太客氣了。#n為百鬼夜行點綴四季風景的精彩祭典，都是節慶部的大家努力的成果。"
52035-133 = "況且上次燈籠祭也因為我們沒能妥善應對，#n導致準備工作出現了許多麻煩……實在很抱歉。"
52035-134 = "別這麼說！我們當時也都因為昏倒而沒幫上忙，還得靠別人收拾善後呢！"
52035-135 = "百花繚亂在菖蒲委員長突然失蹤後，想必也經歷了不少困難吧──"
52035-143 = "啊，啊啊……對不起！#n我說錯話了……"
52035-145 = "……沒關係，菖蒲他一定會回來的。"
52035-146 = "等菖蒲回來之後，我會親口轉達大家對他有多麼擔心。"
52035-147 = "謝謝，那就拜託你了！"
52035-154 = "那個，抱歉打擾一下。#n主會場周圍的護坡，因為昨天下雨的關係變得不太穩定。"
52035-155 = "我們打算用沙包加固一下，能請你們幫忙嗎？"
52035-159 = "糟糕……大家都去領祭典的物資了，現在人手不足。"
52035-160 = "能麻煩稍等一下嗎？#n等其他人回來之後就會立刻去幫忙──"
52035-164 = "既然關係到祭典的安全，這件事就交給我們百花繚亂吧！"
52035-166 = "好啊，我正好也想活動一下筋骨呢。"
52035-167 = "……當成飯後運動也不錯。"
52035-172 = "啊……那麼在其他人回來之前，就麻煩各位幫忙了！"
52035-173 = "交給我們吧！"
52035-181 = "……準備的沙包量應該夠了。#n我會把它們抬上護坡，麻煩你們依序堆好。"
52035-182 = "重量還挺重的，傳遞的時候小心別掉下去了。"
52035-184 = "不用擔心，這種重量在訓練的時候已經搬過無數次了。"
52035-189 = "呵呵，吃了那麼多好吃的團子之後，小女子現在充滿了活力！"
52035-190 = "名草前輩，能請你把那邊的沙包遞給我嗎？"
52035-191 = "嗯，我馬上──"
52035-198 = "……唔。"
52035-202 = "怎麼了？剛剛那個聲音是怎麼回事！？"
52035-203 = "前，前輩！你沒事吧？"
52035-209 = "我沒事，只是扭到手腕而已。"
52035-210 = "可是看起來不像只是扭傷……"
52035-216 = "前輩，麻煩你解開右手的繃帶。"
52035-220 = "其實真的沒什麼……"
52035-225 = "好了，快讓我看看吧。"
52035-236 = "這是……"
52035-237 = "……光看就知道這不是能輕忽的傷。"
52035-238 = "名草前輩，你是從什麼時候開始隱瞞這個傷口的？"
52035-240 = "這是之前在大雪原受的傷。#n很快就會好的，不用擔心。"
52035-241 = "這傷怎麼看都不像很快就會好吧！#n要是惡化到整隻手臂都不能用了怎麼辦！？"
52035-242 = "得馬上聯絡醫院……還是叫救護車？"
52035-243 = "……沒必要鬧得這麼大。"
52035-249 = "名草前輩，可以占用你一些時間嗎？"
52035-256 = "或許……勘解由小路家可以治好你的傷也說不定。"
52035-258 = "下一話;勘解由小路家的貴人"

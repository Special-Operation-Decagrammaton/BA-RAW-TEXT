52035-66 = "1;우미카;07;……어라? 백화요란 위원회 여러분?\n#1;stiff"
52035-67 = "3;시즈코;02;응? 정말이잖아? 백화요란분들이 어째서……\n#3;em;[?]"
52035-68 = "3;시즈코;01;……축제장에서 누군가가 하이쿠를 읊으며 싸움을 벌이고 있다고 해서 혹시 인법연구부인가 했는데, 설마 백화요란의 여러분이셨나요?"
52035-69 = "#st;[0,0];instant;1;"
52035-70 = "#clearST"
52035-71 = "#all;hide"
52035-72 = "3;렌게;02\n#3;em;[!]\n#wait;700"
52035-73 = "3;렌게;14;그럴 리가 없잖아? 우린 오히려 말썽을 부리려는 녀석들을 말리고 있었다고!\n#3;hophop"
52035-74 = "3;렌게;11;……그보다 인법연구부 부원들은 싸울 때마다 하이쿠를 읊는 거야?"
52035-75 = "3;시즈코;02;저희도 하이쿠에 대해서는 잘 모르지만, 피나가 말하는 '통성명' 같은 게 아닐까요?"
52035-76 = "#all;hide"
52035-77 = "3;나구사ND;02;일부 망량즈가 축제장에 설치된 하이쿠 간판의 내용에 불만을 갖고 행패를 부리기에, 분쟁이 일어나기 전에 '조정'을 하려는 것뿐이었지만……"
52035-78 = "3;나구사ND;01;마츠리운영관리부의 축제 준비에 방해가 되었다면 미안해."
52035-79 = "3;시즈코;03;아뇨, 아뇨. 오히려 도움을 받은 쪽은 저희들인걸요.\n#3;em;[재잘]"
52035-80 = "3;시즈코;01;행사 때마다 망량즈는 장소를 가리지 않고 나타나는데, 경비를 배치하는 데에도 한계가 있는지라. 백화요란 여러분의 도움이 큰 힘이 되고 있어요."
52035-81 = "3;시즈코;00;마츠리운영위원회와 백귀야행 상인회를 대신하여 깊은 감사의 인사를 드립니다.\n#3;greeting"
52035-82 = "1;유카리;14;괜찮사와요. 백귀야행의 학생 여러분들이 안심하고 축제를 즐기실 수 있도록 정의를 수호하고 불의를 무찌르는 것이 저희 백화요란이 하는 일이니까요!\n#1;em;[반짝]\n#1;hophop\n#1;ar\n#3;m5"
52035-83 = "1;유카리;07;도움이 필요한 일이 있으시다면 언제든 저희 백화요란을 불러주시길!"
52035-84 = "3;시즈코;02;아, 그러고보니 백야당의 업무와 관련하여 백화요란 여러분께 부탁드리고 싶은 일이 하나 있긴 했는데요."
52035-85 = "#all;hide"
52035-86 = "3;키쿄;02;미안하지만 축제의 안전을 위협하는 불량 학생들을 몰아내는 일이라면 모를까, 지금은 개인의 사사로운 의뢰는 받지 않고 있어.\n#3;em;[반응]"
52035-87 = "3;키쿄;99;백화요란의 책무는 어디까지나 학원 내의 안전을 지키고 분쟁을 조정하는 데 있으니까—"
52035-88 = "5;시즈코;00;어머나, 그런가요? 그렇다면 아쉽게 되었네요.\n#5;em;[?]\n#5;al\n#3;m1"
52035-89 = "5;시즈코;99;이번 축제에서 처음으로 선보일 예정이었던 트리니티산 특제 마롱 크림을 넣은 밤 경단의 시식을 부탁드리려 했는데……"
52035-90 = "#st;[0,0];instant;1;"

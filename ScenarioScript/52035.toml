[translation]
52035-2 = "ฮึ่ม... เป็นคู่ต่อสู้ที่สมน้ำสมเนื้อเลยนะ พวกเฮียกกะเรียวรัน!"
52035-3 = "แต่ตอนสู้กันคราวก่อน ฉันอ่านจุดอ่อนของพวกเธอไว้หมดแล้ว!"
52035-10 = "ทุกคนเล่นงานแขนขวาของยัยนั่น! จุดอ่อนของยัยนั่นก็คือแขนข้างขวานั่นละ!"
52035-21 = "จะพลิกเกมโดยใช้ประโยชน์จากจุดอ่อนของฝ่ายตรงข้ามงั้นเหรอ ไม่ละอายบ้างหรือไง!"
52035-25 = "ไม่รู้อะไรสินะ เรนเกะ เรื่องมนุษยธรรมหรือความละอายมันไม่มีอยู่ในยุทธศาสตร์การต่อสู้หรอก สุดท้ายสิ่งที่จะถูกบันทึกไว้มีแต่ใครเป็นผู้แพ้หรือชนะ"
52035-27 = "รุ่นพี่นางุสะ ตอนนี้ละเจ้าค่ะ!"
52035-32 = "ใช่... ตอนนี้ฉันทั้งบกพร่องและอ่อนแอจนอีกฝ่ายอ่านจุดอ่อนของฉันได้"
52035-33 = "แต่ฉันก็ยังมีเพื่อนๆ คนสำคัญที่ไว้ใจและอยู่เคียงข้างฉันตลอด"
52035-35 = "อึก... ต้านทานต่อไม่ไหวแล้วค่ะหัวหน้า!"
52035-36 = "ถึงจะน่าเสียดาย แต่เห็นทีต้องเลื่อนการกอบกู้ชื่อเสียงเรื่องกลอนไฮกุเอาไว้ก่อน ไว้ค่อยไปเอาชนะในการแข่งขันแต่งกลอนเซ็นริวครั้งหน้าแทนนะคะ!"
52035-38 = "ก็บอกแล้วไงว่ากลอนไฮกุของฉันไม่เกี่ยวอะไรด้วย!"
52035-42 = "ฮึ่มมม... ฝากไว้ก่อนเถอะ เฮียกกะเรียวรัน!"
52035-52 = "เดี๋ยวก่อน เดี๋ยวๆ~!"
52035-56 = "ใครกันคะที่มาขัดขวางการจัดเตรียมงานเทศกาลของเราน่ะ?"
52035-57 = "รู้มั้ยว่าชมรมจัดงานเทศกาลทุ่มเงินไปตั้งมากเท่าไรกับเทศกาลนี้..."
52035-62 = "หะ... หัวหน้าคะ~ ต่อให้ใจร้อนแค่ไหนก็ไม่ควรผลีผลามออกมาจากการประชุมกับคนใหญ่คนโตแบบนี้#nสิคะ...!"
52035-66 = "เอ๋...? เฮียกกะเรียวรันนี่คะ?"
52035-67 = "หืม? จริงด้วยสินะ? แล้วทำไมเฮียกกะเรียวรันถึงมาอยู่ตรงนี้..."
52035-68 = "ฉันได้ยินมาว่ามีคนมาท่องกลอนไฮกุแล้วต่อสู้กัน... ก็เลยคิดว่าเป็นชมรมวิจัยศาสตร์นินจาเสียอีก ตกลงเป็นพวกคุณจากเฮียกกะเรียวรันงั้นเหรอคะ?"
52035-73 = "จะเป็นแบบนั้นไปได้ยังไง? พวกฉันมาช่วยหยุดพวกที่พยายามจะก่อปัญหาอยู่ต่างหาก!"
52035-74 = "จะว่าไป... ชมรมวิจัยศาสตร์นินจาท่องกลอนไฮกุตอนต่อสู้ทุกครั้งเลยเหรอ?"
52035-75 = "พวกฉันก็ไม่ค่อยรู้เรื่องกลอนไฮกุมากหรอกค่ะ แต่มันน่าจะคล้ายๆ กับ 'การเอ่ยชื่อเสียงเรียงนาม' ที่พีน่าพูดถึงมั้ยคะ?"
52035-77 = "พวกปีศาจบางส่วนไม่พอใจสิ่งที่อยู่ในป้ายกลอนไฮกุที่จะติดในงานเทศกาล ก็เลยมาก่อปัญหา พวกฉันก็เลยพยายามจะ 'ไกล่เกลี่ย' ก่อนจะเกิดข้อพิพาทเท่านั้นเอง..."
52035-78 = "แต่ถ้าการกระทำของพวกฉันไปขัดขวางการเตรียมงานของชมรมจัดงานเทศกาล ฉันต้องขอโทษด้วยนะ"
52035-79 = "ไม่ค่ะๆ พวกคุณช่วยพวกเราไว้ต่างหากล่ะคะ"
52035-80 = "พวกปีศาจโผล่มาป่วนทุกครั้งที่จัดงานเทศกาล แต่พวกเราก็มีข้อจำกัดในเรื่องการจ้างเจ้าหน้าที่รักษา#nความปลอดภัย ความช่วยเหลือจากเฮียกกะเรียวรันเลยช่วยเราไว้ได้มากเลยค่ะ"
52035-81 = "ในนามของคณะกรรมการจัดงานเทศกาลและกลุ่มการค้าเฮียกคิยาโค ฉันขอขอบคุณพวกคุณจากใจจริงเลยค่ะ"
52035-82 = "ไม่เป็นไรหรอกเจ้าค่ะ พวกเราเฮียกกะเรียวรันมีหน้าที่ปกป้องความยุติธรรมและทำลายความอยุติธรรม เพื่อให้นักเรียนทุกคนในเฮียกคิยาโคสนุกกับงานเทศกาลได้อย่างสบายใจอยู่แล้วเจ้าค่ะ!"
52035-83 = "ถ้าต้องการความช่วยเหลือใดๆ ก็เรียกพวกเราเฮียกกะเรียวรันได้ทุกเมื่อเลยเจ้าค่ะ!"
52035-84 = "อ๊ะ จะว่าไปฉันมีเรื่องอยากขอร้องเฮียกกะเรียวรันเกี่ยวกับงานของร้านเฮียกคิยาโคอยู่พอดีเลยค่ะ"
52035-86 = "ขอโทษนะ ถ้าเป็นเรื่องการห้ามปรามนักเรียนเกเรที่มาก่อกวนงานเทศกาล พวกฉันก็พอช่วยได้อยู่ แต่เรื่องคำขอส่วนตัวน่ะพวกฉันไม่รับหรอก"
52035-87 = "นั่นก็เพราะหน้าที่ของเฮียกกะเรียวรันคือการไกล่เกลี่ยข้อพิพาทและรักษาความปลอดภัยในโรงเรียน..."
52035-88 = "อ๊ะ อย่างนั้นเหรอคะ? ถ้างั้นก็น่าเสียดายเลยนะคะ"
52035-89 = "ฉันว่าจะขอให้ช่วยชิมดังโงะเกาลัดที่ใส่ครีมเกาลัดสูตรพิเศษจากทรีนิตี้ที่จะวางขายเป็นครั้งแรกใน#nงานเทศกาลนี้สักหน่อยน่ะ..."
52035-93 = "แต่ถ้าเฮียกกะเรียวรันทุกคนงานยุ่ง ฉันคงต้องไปขอให้คนอื่นมาช่วยชิมแทนแล้วละค่ะ~"
52035-94 = "ดะ... เดี๋ยวก่อน ฉันยังไม่ได้บอกว่างานยุ่งเลย..."
52035-99 = "เฮ้อ~ งั้นก็ช่วยไม่ได้สินะ ที่ปรึกษายุทธศาสตร์ของเฮียกกะเรียวรันดูจะยุ่งกับการแก้ปัญหามากมาย#nในเฮียกคิยาโค งั้นคนที่รับคำขอได้ก็มีแค่พวกเรา 3 คนที่เหลือ"
52035-104 = "เรนเกะ!"
52035-105 = "ฮุฮุ ล้อเล่นค่ะ ฉันเตรียมดังโงะไว้ให้ชิมเหลือเฟือเลยค่ะ"
52035-109 = "เอาละ ทุกคนตามฉันมาทางนี้เลยค่ะ!"
52035-116 = "อ่า... หอมหวานจัง... อร่อยจนต้องร้องขอชีวิตเลย!"
52035-117 = "นี่คือดังโงะที่ฉันรู้จักจริงๆ เหรอเนี่ย? นอกจากจะไม่หวานแสบคอแล้ว เนื้อยังนุ่มจนรู้สึกเหมือนได้กิน#nขนมหวานสไตล์ตะวันตกเลยละ!"
52035-118 = "น่าทึ่งมากเลยเจ้าค่ะ! ข้าคิดว่ารสชาติของไส้คูริมุ~ ในของหวานจากทรีนิตี้จะไม่เข้ากันกับของหวาน#nของเราเสียอีก..."
52035-119 = "กลิ่นหอมๆ ที่คล้ายกับเกาลัดเข้มๆ กับความหวานของคูริมุ~ นุ่มๆ เข้ากันได้ดีกับดังโงะเค็มๆ เลยเจ้าค่ะ!"
52035-120 = "ยูคาริ มีครีมติดอยู่ตรงมุมปากน่ะ"
52035-121 = "ขนมดังโงะกินแล้วติดฟันง่าย กินเสร็จแล้วอย่าลืมแปรงฟันด้วยล่ะ"
52035-125 = "ขะ... ข้าไม่ลืมแน่นอนเจ้าค่ะ!"
52035-127 = "การเพิ่มรสชาติใหม่ด้วยครีมเกาลัดในดังโงะแบบดั้งเดิมที่กลุ่มลูกค้าชื่นชอบดูเป็นทางเลือกที่ดีเลยละ"
52035-128 = "แต่ฉันแอบเสียดายที่เนื้อสัมผัสของดังโงะมันเรียบง่ายไปหน่อย... ถ้ามีสึคุเนะไก่สับเสียบในดังโงะด้วย ก็น่าจะดีนะ?"
52035-129 = "แบบนั้นก็ไม่ใช่ของหวานน่ะสิ?!"
52035-130 = "ฮุฮุ โล่งอกไปทีนะคะที่ถูกปากทุกคน"
52035-131 = "ดังโงะพวกนี้น่ะ ชมรมเทศกาลเตรียมไว้ให้เฮียกกะเรียวรันที่อุทิศตัวเพื่องานเทศกาลในทุกครั้ง เพราะงั้นกินให้อิ่มกันเลยนะคะ!"
52035-132 = "ชมกันเกินไปแล้วเจ้าค่ะ คนที่เป็นแม่งานและช่วยเตรียมงานเทศกาลที่ทำให้พวกเราชื่นชมความงาม#nตลอดทั้งปีของเฮียกคิยาโคได้คือชมรมจัดงานเทศกาลต่างหากล่ะเจ้าคะ"
52035-133 = "ในเทศกาลโคมไฟที่เพิ่งผ่านมาพวกเรารับมือได้ไม่ดีพอ ชมรมจัดงานเทศกาลก็เลยต้องเจอความยาก#nลำบากหลายๆ ด้าน... ข้ารู้สึกละอายจริงๆ เจ้าค่ะ"
52035-134 = "ไม่เลยค่ะ! ที่จริงแล้วตอนนั้นพวกเราชมรมจัดงานเทศกาลหมดสติกันทุกคน พวกเราก็เลยไม่ได้ทำอะไรเลย คนอื่นๆ ต่างหากค่ะที่มาช่วยงานไว้!"
52035-135 = "เฮียกกะเรียวรันเองก็น่าจะต้องลำบากไม่น้อยตั้งแต่ที่จู่ๆ หัวหน้าอายาเมะก็หายตัวไปด้วยค่ะ..."
52035-143 = "อ่า... อ๊ะ ต้องขอโทษด้วยค่ะ! ฉันเผลอพูดเสียมารยาทไป..."
52035-145 = "ไม่เป็นไรหรอก... อายาเมะจะกลับมาแน่นอน"
52035-146 = "ถ้าอายาเมะกลับมา ฉันจะบอกให้เองว่าทุกคนเป็นห่วงกันมากแค่ไหน"
52035-147 = "ขอบคุณค่ะ ต้องรบกวนด้วยนะคะ!"
52035-154 = "เอ่อ ขอเสียมารยาทหน่อยนะครับ พอดีคันหินที่เราก่อไว้รอบๆ ที่จัดงานเทศกาลมันไม่ค่อยมั่นคง เพราะว่าฝนตกหนักเมื่อคืนน่ะครับ"
52035-155 = "พวกผมว่าจะเอากระสอบทรายมาวางซ้อนเพื่อช่วยเสริมคันหิน พวกคุณพอจะช่วยอีกแรงได้มั้ยครับ?"
52035-159 = "แย่ละสิ... ตอนนี้ทุกคนออกไปรับวัสดุที่จำเป็นในการเตรียมงานเทศกาลกันอยู่ กำลังคนก็เลยไม่พอ"
52035-160 = "ช่วยรอสักครู่ได้มั้ยคะ? ถ้าสมาชิกชมรมคนอื่นกลับมาแล้ว ฉันจะให้ไปช่วยทันที..."
52035-164 = "ถ้าเป็นเรื่องความปลอดภัยของงานเทศกาลละก็ ให้เป็นหน้าที่ของเฮียกกะเรียวรันเถอะเจ้าค่ะ!"
52035-166 = "ดีเลยนะ ฉันอยากขยับร่างกายอยู่พอดีเลย"
52035-167 = "ออกกำลังกายหลังกินของหวานก็ไม่แย่นะ..."
52035-172 = "อ่า... งั้นฉันต้องขอรบกวนด้วยนะคะ ช่วยแค่ถึงตอนที่สมาชิกชมรมจัดงานเทศกาลกลับมาก็พอค่ะ!"
52035-173 = "วางใจได้เลยเจ้าค่ะ!"
52035-181 = "กระสอบทรายเท่านี้ก็น่าจะพอแล้วละ... ฉันจะยกไปวางไว้ให้เอง ที่เหลือก็ช่วยกันวางซ้อนให้ทีนะ"
52035-182 = "กระสอบมันค่อนข้างหนัก ตอนส่งให้กันก็ระวังอย่าให้หล่นด้วยล่ะ"
52035-184 = "ไม่ต้องห่วงหรอก ตอนฝึกซ้อมฉันยกของน้ำหนักเท่านี้มาจนชินมือแล้ว"
52035-189 = "ฮุฮุ คงเพราะได้กินดังโงะอร่อยๆ จนอิ่ม ข้าเลยรู้สึกมีพลังล้นเหลือเลยเจ้าค่ะ!"
52035-190 = "รุ่นพี่นางุสะ ส่งกระสอบตรงนั้นให้ข้าหน่อยได้มั้ยเจ้าคะ?"
52035-191 = "อื้อ จะไปเอามาให้เดี๋ยวนี้ละ..."
52035-198 = "อึก..."
52035-202 = "เกิดเรื่องอะไรน่ะ? เมื่อกี้เสียงดังมากเลยด้วย!"
52035-203 = "ระ... รุ่นพี่! เป็นอะไรหรือเปล่าเจ้าคะ?"
52035-209 = "ไม่ต้องห่วงหรอก ฉันแค่ข้อมือเคล็ดนิดหน่อยน่ะ"
52035-210 = "แต่มันดูน่าจะเจ็บมากกว่าแค่ข้อมือเคล็ดนะเจ้าคะ..."
52035-216 = "รุ่นพี่ ถอดผ้าพันแผลที่แขนขวาให้ฉันดูหน่อย"
52035-220 = "บอกว่าไม่ใช่เรื่องใหญ่อะไรไง..."
52035-225 = "ขอฉันดู"
52035-236 = "นี่มัน..."
52035-237 = "ไม่ใช่แผลที่เห็นแล้วจะปล่อยผ่านได้เลยนะเจ้าคะ..."
52035-238 = "รุ่นพี่นางุสะ ซ่อนบาดแผลแบบนี้ไว้ตั้งแต่เมื่อไรกันเจ้าคะ?"
52035-240 = "ฉันได้แผลนี้มาจากทุ่งหิมะใหญ่เมื่อคราวก่อนน่ะ เดี๋ยวมันก็หายน่า ไม่ต้องกังวลกันหรอก"
52035-241 = "นี่มันดูเหมือนแผลที่หายได้ง่ายๆ งั้นเหรอ? ถ้าแผลมันกำเริบจนใช้แขนขวาไม่ได้ล่ะจะทำยังไง!"
52035-242 = "ต้องติดต่อโรงพยาบาล... ไม่สิ ต้องเรียกรถฉุกเฉินทันทีเลยมั้ยเนี่ย?"
52035-243 = "ไม่ต้องทำให้เป็นเรื่องใหญ่ขนาดนั้นก็ได้..."
52035-249 = "รุ่นพี่นางุสะ ถ้าไม่ว่าอะไรละก็ ข้าขอเวลาสักครู่ได้มั้ยเจ้าคะ?"
52035-256 = "บางที... ตระกูลคาเดโนะโคจิของข้าอาจช่วยรักษาแผลของรุ่นพี่ได้เจ้าค่ะ"
52035-258 = "ตอนต่อไป;ผู้มีเกียรติแห่งตระกูลคาเดโนะโคจิ"

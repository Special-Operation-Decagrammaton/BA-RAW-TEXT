52035-62 = "1;우미카;04;부, 부장님~ 아무리 급하셔도 높으신 분들과의 미팅 중에 갑자기 뛰쳐나가시면……!\n#1;em;[땀]"
52035-63 = "#st;[0,0];instant;1;"

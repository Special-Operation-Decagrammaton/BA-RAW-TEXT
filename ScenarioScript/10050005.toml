[translation]
10050005-1 = "序幕;No Risk, No Return."
10050005-2 = "赤冬聯邦學園．圖書館"
10050005-7 = "愛瑠前輩，你還好嗎……？"
10050005-8 = "在紅葉眼裡，這看起來像是還好的樣子嗎……？"
10050005-9 = "確實不像……"
10050005-10 = "……我發現了一件事。"
10050005-11 = "是什麼事呢，前輩？"
10050005-12 = "原來人一旦餓了三天左右，反而就不會感覺到飢餓了呢……"
10050005-13 = "可是相對地，身體也會一點力氣都沒有……"
10050005-14 = "而且那也只是暫時的，只要再餓一下又會滿腦子都是食物了吧？"
10050005-15 = "反正我現在也是那樣，應該無所謂吧……"
10050005-16 = "怎麼會無所謂啦……"
10050005-17 = "公共食堂的內部整修……什麼時候才會結束啊？"
10050005-18 = "聽說……暫時是明天的樣子。"
10050005-19 = "那這場慘劇明天就能結束了吧……太好了……"
10050005-20 = "順帶一提，他們昨天也是這麼說的……"
10050005-21 = "……是工務部那些人又罷工了嗎？"
10050005-22 = "不用想也知道…… "
10050005-23 = "……看來還得再等上一個星期吧。"
10050005-24 = "我們是不是該想辦法做點什麼了……？"
10050005-25 = "留在圖書館的成員們已經趴在地上，開始用殭屍般的眼神互相盯著對方了……"
10050005-26 = "我們又不是沒有行動才變成這樣，而是因為行動了才變成這樣的吧……"
10050005-27 = "一切都是書賣不出去，付費訂閱網站的人數也沒有增加的錯！"
10050005-28 = "啊，明明沒力氣又不小心喊太大聲了……"
10050005-33 = "嗚嗚嗚……都是因為事務局不準時發社團經費……"
10050005-34 = "本來想靠賣書來補貼經費，結果還是失敗了……"
10050005-35 = "知識解放戰線的未來，#n就跟「被撕掉關鍵頁面的限定珍藏版同人誌」的命運一樣漆黑一片……"
10050005-36 = "接著文明將被黑暗壟罩，人類也終將走向衰退……"
10050005-42 = "最近過得好嗎？知識解放戰線的各位。#n讓各位又愛又恨的出版部負責人來囉～呣呵呵。"
10050005-43 = "依舊是一副狼狽不堪的樣子呢，Meruri同學。#n圖書館的地板和床的區別……你應該能分辨出來吧？#n差不多該起來囉。"
10050005-44 = "是是是……隨便你愛怎麼說都行……"
10050005-45 = "咦……？Meruri同學的反應居然這麼平淡！？#n你還好嗎Meruri同學？該不會是碰上什麼大事了吧！？"
10050005-47 = "要說大事的話，確實算是大事吧……八雲前輩、貴音前輩。"
10050005-48 = "哼嗯？看來事情的發展跟計畫中不太一樣……#n你所謂的大事指的是什麼呢，紅葉？"
10050005-49 = "請問……你們有什麼吃的東西嗎……？"
10050005-50 = "咦……？"
10050005-52 = "呀啊啊！肚子好痛！"
10050005-53 = "餓了三天之後突然狼吞虎嚥，很容易引發胃抽筋的。#n來，先喝點水吧。"
10050005-54 = "八雲前輩、貴音前輩……謝謝你們。#n我們一度以為真的要出事了呢。"
10050005-55 = "不用客氣，有困難的時候本來就該互相幫助呀。#n當然費用還是得照常收取哦？呣呵呵。"
10050005-57 = "費用聽起來真是怪可怕的……#n算了，好歹是救了快死的社團一命，這次也只好認了……"
10050005-58 = "我能理解問題的起因是社團經費的遲發……#n不過話雖如此，情況也比想像中嚴重太多了吧？"
10050005-59 = "那個……我們本來想說既然都這樣了，乾脆提前出版日程先賺點經費……#n結果就稍微做得有點過頭了……"
10050005-60 = "啊啊～原來上週緊急送到出版部的原稿是這麼回事啊？#n難怪連印刷費都要跟我們賒帳……"
10050005-61 = "真是千金難買早知道……"
10050005-62 = "所以我們出版部，才會在來收利息的時候正好目睹了那個場面啊。"
10050005-63 = "好，那就請你們支付利息吧。利息。"
10050005-64 = "你也看到我們現在的處境了吧！#n連飯都沒得吃還付什麼利息啊！要錢沒有，要命一條啦！"
10050005-65 = "真的可以要嗎？"
10050005-66 = "……你還真的要哦？"
10050005-67 = "當然，而且利息還是得照算哦。"
10050005-68 = "惡魔……這裡有惡魔！"
10050005-70 = "不過這樣還是有點奇怪呢，Meruri同學。#n就算你的作品大多賣不出去，創作起來又總是我行我素……"
10050005-71 = "老是喜歡寫一些不考慮市場反應、目空一切的故事……"
10050005-72 = "你到底是來收利息還是來挖苦人的啦？選一個好不好！"
10050005-73 = "先聽我把話說完！#n總之，你又不是沒有忠實粉絲，還有紅葉同學這麼優秀的編輯在……#n怎麼會滯銷到連伙食費都賺不到呢？"
10050005-74 = "那個……我們也沒想到銷量會這麼慘澹……"
10050005-75 = "……這裡還有庫存嗎？我來幫你們看看吧。"
10050005-80 = "怎，怎麼樣……？"
10050005-81 = "……首先，至少我已經找到原因了。"
10050005-82 = "什，什麼原因……？"
10050005-83 = "Meruri同學。你的作品基本上都既隨性又目中無人，#n並且優先考慮自己而非讀者的傾向非常強烈。"
10050005-84 = "雖然這反而讓你凝聚了小眾卻深厚的粉絲群體……#n同時卻也意味著你的作品很難走向大眾。"
10050005-85 = "結果這是什麼東西！#n既沒有Meruri同學特有的深度，又想半吊子地迎合大眾，結果兩邊都沒有做好！"
10050005-86 = "這種四不像的作品，無論核心粉絲還是大眾讀者都不會喜歡的！#n滿分5分我只能給你2分……不，是1.5分！"
10050005-87 = "Meruri同學不必回答我沒關係。#n請問這到底是怎麼回事呢，紅葉同學？"
10050005-88 = "那，那個……是因為想說這次要走不一樣的路線，做點大家都願意買單的東西……"
10050005-89 = "再加上截稿時間提前，愛瑠前輩又暴走了……#n我根本沒有多少時間可以編輯或修改……"
10050005-90 = "這確實是個有說服力的理由……不過似乎還有其他問題就是了。"
10050005-92 = "那是什麼……？"
10050005-93 = "讓我再提醒各位一次吧！#n我們出版部的宗旨是「出版、再版、流通」。正因如此……"
10050005-94 = "身為這個鐵三角的負責人，這種行銷策略簡直是不可原諒！"
10050005-95 = "噫噫！？"
10050005-96 = "呃啊！？"
10050005-97 = "就像貴音說的一樣，不但創作起來完全只顧自己高興……#n就連宣傳用的試閱本也是上傳到一個聽都沒聽過，連演算法都找不到的邊緣網站！"
10050005-98 = "那，那是因為上傳的經費不夠……"
10050005-99 = "少說那種沒出息的話！#n網路空間可是能夠從無到有的半無法地帶耶！"
10050005-100 = "只要有心，絕對能找到更好的網站做宣傳！#n你們到底想不想把書賣出去啊！"
10050005-101 = "只，只要作品夠好，大家自然會買單的！"
10050005-102 = "又是沒出息的話！#n你以為行銷的概念是說好聽的嗎？ "
10050005-103 = "知道明明做得很好，卻因為宣傳失敗而堆在倉庫裡的商品有多少嗎？#n雖然確切的數字我也不太清楚……！"
10050005-104 = "但是我敢肯定，至少跟知識解放戰線圖書館的館藏一樣多！"
10050005-105 = "這分明是在誇大其辭吧！？"
10050005-107 = "不！考慮到人類的歷史，數量搞不好還低估了呢！#n所以我才說這些創作者啊……！"
10050005-108 = "腦袋裡老是只想著創作創作，卻對怎麼宣傳跟推廣一點興趣都沒有！"
10050005-109 = "你今天是不是特別激動啊！？"
10050005-110 = "……那是因為你觸碰到部長的逆鱗了，Meruri同學。"
10050005-112 = "總之……情況我了解了，知識解放戰線。#n如果這些庫存無法以合理價格賣出的話……對我們出版部也確實是個麻煩。"
10050005-113 = "等等……既然如此……？#n哼嗯？這該不會……？"
10050005-114 = "部長？我怎麼突然有股不祥的預感……？"
10050005-115 = "等著看吧，貴音。呣呵呵。"
10050005-116 = "好吧，愛瑠。我們來做個交易吧。"
10050005-117 = "交易……？#n可以的話，我實在不太想跟你談那種事……"
10050005-118 = "總之先聽聽看嘛～你是被人騙大的嗎……？"
10050005-119 = "碰上你的時候通常都是……"
10050005-120 = "這可是能賺到錢的事哦？#n你不是很需要營運經費嗎？對吧對吧？"
10050005-121 = "唔唔……好吧。麻煩長話短說。"
10050005-122 = "感謝你加快談話的進度。#n從結論來說……知識解放戰線的庫存銷售，就交由我們來代理吧。"
10050005-124 = "咦……？"
10050005-125 = "……什麼？"
10050005-126 = "當然，天下可沒有白吃的午餐哦。#n我們會替不擅長宣傳和行銷的你們，負擔相關的費用和勞力……"
10050005-127 = "但是相對地，也會收取一定比例的利潤作為手續費──意下如何呢？"
10050005-128 = "我，我不要！每次跟你交易都沒什麼好事！"
10050005-129 = "愛瑠前輩，愛瑠前輩！#n我覺得八雲前輩說的也有道理……！"
10050005-130 = "畢竟我們確實沒辦法自己處理這麼大量的庫存……對宣傳和銷售方面也不夠瞭解。"
10050005-131 = "與其抱著庫存壯烈沉沒，用這種方式解決還比較好吧？"
10050005-132 = "而且我們哪有地方能堆庫存啊……書這種東西又重又佔空間……"
10050005-134 = "哦哦～果然還是有人可以溝通的嘛。#n哎呀，好說話的交易對象可是得來不易的呢？"
10050005-135 = "可惡，好不甘心……！#n但是紅葉說的沒錯，確實沒有更好的辦法了……#n好吧，知道了……我接受！"
10050005-136 = "很好，那麼就來擬定合約吧。#n至於比例嘛……我想想，九一分怎麼樣呢？"
10050005-137 = "……保險起見還是確定一下，九是我們這邊吧？"
10050005-138 = "你覺得有可能嗎？"
10050005-139 = "我就知道，你這個強盜！"
10050005-141 = "部長，部長！#n我也覺得這個比例有點過分了啦！"
10050005-143 = "赤冬校內街道"
10050005-144 = "唉……總算是把合約給簽好了。"
10050005-145 = "現在我們只要把這些庫存賣掉，然後再按照比例把錢匯過去就行了。"
10050005-146 = "話雖如此，這個數量還真不少呢。#n真是的，他們本來打算怎麼填補這些虧損啊。"
10050005-147 = "總之我們走吧，貴音！#n讓他們好好見識出版部的實力吧！"
10050005-152 = "怎麼可能……！"
10050005-157 = "居然連一本都沒賣出去……"
10050005-158 = "為什麼！？銷售策略明明很完美的啊！"
10050005-159 = "如果硬要分析的話……#n首先，雖然Meruri同學的書固然有它值得一讀的部分……"
10050005-160 = "但是在赤冬，大家對這種模式已經熟悉到不能再熟悉了。"
10050005-161 = "尤其這次的作品既無法吸引狂熱粉絲，也不受大眾歡迎……處於不上不下的狀態。"
10050005-162 = "無論故事再怎麼精彩，聽三次以上終究會膩的不是嗎？#n而且據說大部分的創作者終其一生，都只會圍繞著同樣的主題做變化……"
10050005-163 = "相對優秀的創作者能有兩種主題，只有千載難逢的天才能達到三種以上。#n當然Meruri同學也確實有嘗試做出變化……"
10050005-164 = "可惜讀者似乎連這些變化都已經見怪不怪了……至少在赤冬是如此。"
10050005-165 = "……真是犀利的見解呢，貴音。#n不過，實際上還有一個更根本的問題。"
10050005-166 = "是什麼呢，部長？"
10050005-168 = "那就是……赤冬學生們的錢包都瘦得可憐！"
10050005-169 = "提起那個話題只會讓所有人都想哭吧！？"
10050005-170 = "可是你想想看……人在沒錢的時候，最先縮減的不就是文化方面的開支嗎？"
10050005-171 = "部長……那是身為出版人應該有的發言嗎……？"
10050005-172 = "正是因為對這一點銘記在心，才代表我是十足的出版人啊！"
10050005-173 = "可，可是我們出版部的使命，不就是在這種困境下找出活路嗎……！？"
10050005-174 = "反正出版部一半以上的營運費用，#n都是靠潔莉諾會長的宣傳品跟《赤熊》的印刷費來補貼的啊！"
10050005-175 = "這種話從我們自己口中說出來也太悲哀了吧！#n而且《赤熊》的主編自從遭到肅清之後，就再也沒有出現過了！"
10050005-176 = "是啊……所以我們才把那些無處可去的編輯部學生收編進了出版部。"
10050005-177 = "唉……在那件事之前，出版部的收支狀況還能勉強打平的說。"
10050005-178 = "收留編輯部之後，出版部的財務狀況反而改善了很多才對吧？"
10050005-179 = "雖然是這樣沒錯，但我還是覺得受到事務局的干涉讓人不太舒服……"
10050005-180 = "呣呵呵。貴音會這麼說也是情有可原。畢竟你是評論家嘛。 "
10050005-181 = "不過對於負責出版部所謂……「生計」的我來說，現在的處境倒也不算太差哦。"
10050005-182 = "總而言之言而總之……我已經找出問題的根本原因了。"
10050005-183 = "是什麼呢，部長？"
10050005-184 = "那就是……"
10050005-185 = "想在沒錢的地方賺錢，打從一開始是個錯誤的選擇！"
10050005-186 = "赤冬的財政狀況，客觀而言確實比不上其他學園！"
10050005-187 = "雖然有句話叫「只要擰得夠用力，乾毛巾也能擰出水」……#n但那也不是所有情況都能拿出來用的！"
10050005-188 = "話，話是這麼說沒錯，可是現在還有什麼我們能做的事嗎……？"
10050005-189 = "有的，貴音。當然有。"
10050005-190 = "那是……什麼呢？"
10050005-191 = "做生意的重點──第一是地段，第二是地段，第三還是地段。"
10050005-192 = "既然沒錢就該往有錢的地方去。#n如果是有閱讀文化紮根的地方就更好了。"
10050005-193 = "有那種地方嗎？"
10050005-194 = "當然有。那個地方就是……"
10050005-196 = "……三一綜合學園。"
10050005-199 = "請等一下，部長！？#n你該不會打算進到三一校內推銷吧！？#n那可是其他學園的自治區哦！？！？"
10050005-200 = "沒有風險就沒有回報！#n快跟上來吧，貴音！要是跟不上節奏就要被我丟下了哦！"
10050005-205 = "部長？部長！？！？"

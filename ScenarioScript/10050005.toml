[translation]
10050005-1 = "Prologue;No Risk, No Return"
10050005-2 = "Red Winter Academy Library"
10050005-7 = "Are you okay, Meru...?"
10050005-8 = "What does it look like, Momiji...?"
10050005-9 = "Right... Of course not..."
10050005-10 = "I did learn one thing..."
10050005-11 = "What's that, Meru?"
10050005-12 = "It's not hunger that plagues you after starving for three days..."
10050005-13 = "It's a complete lack of energy..."
10050005-14 = "At least, for now. I'm sure it won't take much longer for every thought in your head to start revolving around food."
10050005-15 = "I'm already there, so maybe it'll be okay..."
10050005-16 = "I don't think so..."
10050005-17 = "Do you remember...when the cafeteria maintenance is going to be done?"
10050005-18 = "...They SAID tomorrow."
10050005-19 = "Just...one more day...of this tragic state. Thank goodness."
10050005-20 = "...They said the same thing yesterday."
10050005-21 = "...Is the Labor Party on strike again?"
10050005-22 = "Do I even need to answer? "
10050005-23 = "...Even a week seems optimistic at this point."
10050005-24 = "Do we need to...take action?"
10050005-25 = "We're shells of who we once were... Zombies, lying helplessly on this library floor."
10050005-26 = "Isn't that exactly how we got here? By \"taking action\"?"
10050005-27 = "This is all because our books wouldn't sell! And no one would subscribe to a premium membership on the website!"
10050005-28 = "Augh... I don't have the energy to yell..."
10050005-33 = "*sniff* *sob* At the true root of this evil lies the Secretariat for not approving our funding in time..."
10050005-34 = "No one can support themselves just by selling books anymore these days..."
10050005-35 = "The future of the Knowledge Liberation Front will be as dark as the fate of a limited-edition collector's fan book with the main pages ripped out..."
10050005-36 = "With this, civilization will sink into darkness, and humanity will take one giant leap backwards..."
10050005-42 = "Well, well, well. Have you been anticipating our long-awaited reunion, Knowledge Liberation Front? Whether you like it or not, the Publishing Department has arrived."
10050005-43 = "Unsightly as always, Meruri. I thought even you would be above using the library floor as a bed. Get up already, I beg of you."
10050005-44 = "Yeah, yeah... Blah, blah, blah..."
10050005-45 = "What...? What is this lackluster response? Has some tragedy befallen you, Meruri? Perhaps your slovenly lifestyle has finally caught up to you?"
10050005-47 = "It is a tragedy, it really is... Yakumo, Takane..."
10050005-48 = "Now, this isn't going exactly the way I'd anticipated. What's this tragedy of yours, Momiji?"
10050005-49 = "...Do you have any food?"
10050005-50 = "What...?"
10050005-52 = "Gah! Augh! My stomach hurts!"
10050005-53 = "Not even your brutish stomach can take such a sudden intake of food after three days of starvation. Here, water."
10050005-54 = "Thank you, Yakumo, Takane... I was about to write my will..."
10050005-55 = "During hard times like these, what're friends for, am I right? They're for charging daily interest until the debt is settled. Heh, heh, heh."
10050005-57 = "Textbook extortionist... Ugh. Considering you rekindled the dying embers of our club, I'll overlook it this once."
10050005-58 = "While the cause is obviously delayed club funding, the effect is a bit dramatic, don't you think?"
10050005-59 = "Well... I just thought that, while we were waiting, we could move up our publication schedule a little to help us get by until the money did come through. But we may have overdone it."
10050005-60 = "Ah, yes. The urgent manuscript you brought to us last week. Now I see why you asked to \"throw it on your bill,\" as you so eloquently put it."
10050005-61 = "I made a mistake...but how was I supposed to know?"
10050005-62 = "And thus, this is the sad scene the Publishing Department has walked in on during our quest to collect said debt, with interest."
10050005-63 = "Cough it up, then."
10050005-64 = "Seriously?! You've seen it for yourself: we can't even afford crackers! Take a pound of my flesh, why don't you?"
10050005-65 = "Deal."
10050005-66 = "...Seriously."
10050005-67 = "Yes. With interest."
10050005-68 = "You... You're the devil! The devil incarnate!"
10050005-70 = "However, I do find this rather peculiar. Despite your generally poor sales, and obstinate insistence on doing whatever you please..."
10050005-71 = "...not to mention your arrogant penmanship with little regard for trends or salability—"
10050005-72 = "Are you here to collect interest, or get on my nerves? I get it already!"
10050005-73 = "I am making a point, Meruri! Despite all of these shortcomings, you are supported by an excellent editor, Momiji, and a loyal fanbase. So how is it that you have fallen to such lows?"
10050005-74 = "Sales were...beyond abysmal... Even worse than usual..."
10050005-75 = "Do you have any remaining inventory? Consider it a free consultation."
10050005-80 = "S-So...?"
10050005-81 = "...I've identified the issue, at the least."
10050005-82 = "Wh-Which is...?"
10050005-83 = "Meruri. Willingly or not, you have developed a brand for yourself. Your manuscripts are yours and yours alone. You care little for the reader, and only for your artistic integrity."
10050005-84 = "This branding has been both a boon and a curse. Your dedicated fanbase would travel to hell with you, yet the probability of your breaking into the big leagues is nil."
10050005-85 = "But this...! I fail to think of one exculpatory excuse for this rat's nest of a manuscript! It lacks the Meruri flavor that is critical to your paltry success! Since when do you attempt to grovel at the feet of the masses?"
10050005-86 = "You've both betrayed your fans and STILL failed to find a palatable appeal! Out of five stars... You deserve... Why, hardly two! One-point-five!"
10050005-87 = "No, stop. I can't bear to hear your stuttering apologia, Meruri. Momiji, explain."
10050005-88 = "Sh-She said she wanted something different, u-um, \"something that works,\" I think were her words."
10050005-89 = "And then with the moving deadlines, there was a lot of pressure, and Meru went a little berserk... S-So I didn't actually get to do any editing... It was physically impossible, timeline-wise!"
10050005-90 = "...Fine. I'll allow it. I have another matter of contention, however."
10050005-92 = "That would be...?"
10050005-93 = "Pop quiz: What is the Publishing Department's motto? Answer: Publish, print, distribute."
10050005-94 = "Yes, and I'm the one who manages that holy trinity. So excuse me when I say that this marketing strategy is the most idiotic, unthought-out one I've ever had the misfortune of witnessing."
10050005-95 = "Gah?!"
10050005-96 = "HUH?!"
10050005-97 = "Take everything Takane said, and add on top of it the mess of a backwater website you uploaded your work to. Even I'VE never seen an address ending in \"dot-fake.\""
10050005-98 = "The big websites...are just too expensive for us."
10050005-99 = "All I hear are explanations for your inadequacy! It's the INTERNET! Do SOMETHING! "
10050005-100 = "It's like you don't WANT to sell anything. With just a little effort, you could've at LEAST found a better website than this slop!"
10050005-101 = "I-If you make something good, it's going to sell by itself!"
10050005-102 = "If that was true, marketing wouldn't even exist! "
10050005-103 = "It'd be impossible for me to count the exact number of excellent products that have been relegated to the void because of bad promotion!"
10050005-104 = "However, I'm confident it's at least as many books as you have here in the library of the Knowledge Liberation Front!"
10050005-105 = "You're exaggerating!"
10050005-107 = "No! If we were to take into account the history of mankind, the numbers would be STAGGERING. But creatives...!"
10050005-108 = "Creatives! Fiddlesticks! It's all about creating and artistic integrity, with zero business acumen or even the slightest interest in actually getting their works in front of the public eye!"
10050005-109 = "Wh-Where is all of this passion coming from?!"
10050005-110 = "You appear to have hit a nerve, Meruri."
10050005-112 = "Let's get back to business. To surmise, if the Knowledge Liberation Front doesn't profit from their remaining inventory, it'll spell trouble for the Publishing Department too."
10050005-113 = "Huh? But then...? Hm. Hmm. Hm? Could this...?"
10050005-114 = "President? You're making me rather nervous."
10050005-115 = "Let it be, Takane. Heh heh heh."
10050005-116 = "All right, Meru. I'll make you a deal."
10050005-117 = "A deal...? With you? Ugh... That sounds like a terrible idea, in every way humanly possible."
10050005-118 = "You need to give me a little more credit. I don't ALWAYS do you wrong."
10050005-119 = "Emphasis on the \"always.\""
10050005-120 = "Look, you need money. This deal will make you money. Do I really need to keep holding your hand through this?"
10050005-121 = "Ugh... Fine. Get to the point."
10050005-122 = "Thank you for saving us both the time. Here are the terms. We'll handle the Knowledge Liberation Front's remaining inventory."
10050005-124 = "What...?"
10050005-125 = "...Huh?"
10050005-126 = "There's no such thing as a free lunch, though, of course. We come in with our big pockets and fancy connections and handle the sales and distribution..."
10050005-127 = "...and get a percentage of the profits in exchange. Fair, no?"
10050005-128 = "Absolutely not! I refuse! Deals and exchanges and trades with you never end well for me!"
10050005-129 = "Meru! Meru! I think Yakumo has a point here...!"
10050005-130 = "She's right that there's no way for us to handle this massive inventory on our own, and we do have zero marketing resources..."
10050005-131 = "Is pride really worth sinking with all of this inventory?"
10050005-132 = "And they're taking up so much space... They're so heavy and bulky..."
10050005-134 = "Hm? A kindred soul? It's not often I meet a business partner who sees things the way I do."
10050005-135 = "Gah, this is the absolute worst! But you're right, Momiji. We're at the end of our rope, and this is our only lifeline. So, fine. Have it your way. I accept!"
10050005-136 = "Good choice. Let's begin contract negotiations, then. For the profit distribution... How about...9:1?"
10050005-137 = "...And we're the nine?"
10050005-138 = "Was that meant to be a joke?"
10050005-139 = "You're a crook, through and through!"
10050005-141 = "President, President! Even I must say, that rate is a bit aggressive, was it not?"
10050005-143 = "Red Winter Campus Street"
10050005-144 = "*sigh* ...Negotiations are, at last, complete."
10050005-145 = "Once we sell the inventory, it'll simply be a matter of sending them their cut of the profits."
10050005-146 = "And just look how much there is. Fiddlesticks, just how much were they hoping to make off this?"
10050005-147 = "Anyway, let's go, Takane! We'll show them what the Publishing Department is made of!"
10050005-152 = "It can't be...!"
10050005-157 = "We didn't manage to sell a single one..."
10050005-158 = "How?! It was a perfect selling strategy!"
10050005-159 = "If we must analyze the situation... To begin with, while Meruri's book does have some readable points..."
10050005-160 = "Hm, it's simply too predictable for the average Red Winter student."
10050005-161 = "And, as we discussed, it's an awkward in-between of alienating her fans while failing to pander to the masses."
10050005-162 = "No matter how good the story is, it loses its appeal after its third telling. They say the average artist tends to rinse and repeat what they know."
10050005-163 = "Seasoned artists have two or three specialties or genres they dabble in, and geniuses have even more. This would appear to be Meruri's attempt to grow."
10050005-164 = "But again, this type of literature is simply too commonplace here in Red Winter."
10050005-165 = "...Yes, exactly, Takane. But there's another fundamental problem."
10050005-166 = "What's that, President?"
10050005-168 = "It's that Red Winter students have empty wallets and rumbling stomachs!"
10050005-169 = "Even if it is true, that doesn't mean you should say it, President!"
10050005-170 = "Let's be honest, when money's tight, entertainment and cultural pursuits are the first to be cut from the budget."
10050005-171 = "President, how could you say that, as someone working in the publishing industry...?"
10050005-172 = "That's exactly why these issues are top of mind for me!"
10050005-173 = "R-Regardless, we'll simply overcome those trivial obstacles. Th-That's the Publishing Department's duty, is it not?"
10050005-174 = "More than half of our funds come from spreading President Cherino's propaganda and the Red Bear's printing fees anyway!"
10050005-175 = "Should you be saying that out here?! Especially when the previous Editor-in-Chief of Red Bear has been purged and is still missing!"
10050005-176 = "...Yeah. You're right. And all of the students in the Editing Department were transferred to us."
10050005-177 = "*sigh* Before that happened, the Publishing Department was doing just fine."
10050005-178 = "Actually, the Publishing Department's profits have jumped since the Editing Department joined."
10050005-179 = "It's more so the principle of the Secretariat interfering in our business."
10050005-180 = "Heh heh heh. You have the spirit of a critic, through and through, Takane. "
10050005-181 = "From the perspective of the Publishing Department's financial manager, I have no complaints about our current situation."
10050005-182 = "Anyways, back to our mystery, which I've conveniently solved. I know what the fundamental problem is with our current strategy."
10050005-183 = "What's that, President?"
10050005-184 = "Our core issue is that..."
10050005-185 = "...we're trying to make money somewhere there's no money!"
10050005-186 = "Compared to all the other schools, Red Winter is broke to its core!"
10050005-187 = "You can only squeeze so much liquid out of a dried towel!"
10050005-188 = "Wh-While I am in agreement with your assessment, I don't believe there's much we can do about that at the moment..."
10050005-189 = "There IS something we can do, Takane. There always is."
10050005-190 = "And what...would that be?"
10050005-191 = "The number one thing you should consider in business is positioning. The second? Positioning. And the third? Also positioning."
10050005-192 = "If there's no money, then follow its trail. Follow it somewhere where reading books is an integral part of the culture."
10050005-193 = "Is there such a place?"
10050005-194 = "Of course there is. And that place is..."
10050005-196 = "...Trinity General School."
10050005-199 = "Wait, President?! You intend to go to Trinity yourself?! An entirely different school district?!"
10050005-200 = "No risk, no return! Now, follow me, Takane! If you're slow to the tempo, I'll leave you behind!"
10050005-205 = "President? President?!?!"

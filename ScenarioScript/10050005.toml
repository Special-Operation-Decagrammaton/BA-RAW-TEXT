[translation]
10050005-1 = "บทเริ่มต้น;No Risk, No Return"
10050005-2 = "ห้องสมุด สหภาพเรดวินเทอร์"
10050005-7 = "รุ่นพี่เมรุ โอเคหรือเปล่าคะ...?"
10050005-8 = "ในสายตาของโมมิจิ ฉันดูโอเคหรือเปล่าล่ะ...?"
10050005-9 = "ไม่น่าจะโอเคค่ะ..."
10050005-10 = "แต่ฉันก็ได้เรียนรู้บางอย่างจากเรื่องนี้นะ..."
10050005-11 = "อะไรเหรอคะ รุ่นพี่?"
10050005-12 = "ถ้าเราอดอาหารติดต่อกันประมาณ 3 วัน ก็จะไม่รู้สึกหิวไปเลยละ น่าทึ่งใช่มั้ยล่ะ..."
10050005-13 = "แต่ร่างกายก็จะไม่มีเรี่ยวแรงด้วยนี่คะ..."
10050005-14 = "แล้วความไม่หิวตอนนี้มันก็แค่ชั่วคราวค่ะ ถ้าอดอาหารต่อไปอีกหน่อย ไม่ช้าไม่เร็วสมองก็จะคิดถึงแต่เรื่องอาหารค่ะ"
10050005-15 = "ที่จริงตอนนี้ก็คิดถึงอาหารแล้วละ..."
10050005-16 = "เห็นมั้ยล่ะคะ..."
10050005-17 = "การก่อสร้างในโรงอาหารรวม... จะเสร็จเมื่อไรเหรอ?"
10050005-18 = "เห็นว่าพรุ่งนี้นะคะ"
10050005-19 = "งั้นโศกนาฏกรรมนี้ก็จะจบลงในพรุ่งนี้สินะ... ค่อยยังชั่วหน่อย..."
10050005-20 = "แต่เมื่อวานก็บอกว่าจะเสร็จในวันรุ่งขึ้นเหมือนกันค่ะ..."
10050005-21 = "ชมรมผู้รับจ้างประท้วงหยุดงานอีกแล้วเหรอ...?"
10050005-22 = "จะเป็นอย่างอื่นไปได้ยังไงล่ะคะ... "
10050005-23 = "งั้นก็ต้องกินเวลาอีกเป็นสัปดาห์เลยสิ..."
10050005-24 = "พวกเราน่าจะต้องลุกมาทำอะไรบ้างแล้วนะคะ..."
10050005-25 = "สมาชิกชมรมที่อยู่ในห้องสมุดก็ทรุดลงไปนอนกับพื้น แถมยังเริ่มมองกันด้วยสายตาเหมือนซอมบี้แล้ว#nด้วยค่ะ..."
10050005-26 = "ที่ผลลัพธ์เป็นแบบนี้ ไม่ใช่เพราะเราไม่ทำอะไร แต่เป็นเพราะเราลงมือทำอะไรไปไม่ใช่เหรอ..."
10050005-27 = "ทั้งหมดนี้เป็นเพราะเราขายหนังสือไม่ออก แล้วจำนวนผู้ติดตามที่จ่ายเงินในเว็บไซต์ก็ไม่เพิ่มขึ้นต่างหากล่ะ!"
10050005-28 = "อ๊ะ ไม่มีเรี่ยวแรงอยู่แท้ๆ แต่ดันตะโกนออกไปเสียได้..."
10050005-33 = "อึกก... ทั้งหมดนี้เป็นเพราะสำนักเลขาธิการให้เงินสนับสนุนการทำกิจกรรมของชมรมไม่ตรงเวลาค่ะ..."
10050005-34 = "เราพยายามขายหนังสือเพื่อหาเงินเพิ่มแล้ว แต่สุดท้ายก็ล้มเหลวไม่เป็นท่า..."
10050005-35 = "อนาคตของชมรมแนวร่วมปลดปล่อยความรู้คงมืดมน เหมือนกับชะตากรรมของโดจินชิฉบับลิมิเต็ด#nเอดิชั่นที่ถูกฉีกหน้าที่มีเนื้อหาสำคัญออกไปแน่เลยค่ะ..."
10050005-36 = "และถ้าเป็นแบบนั้น อารยธรรมก็จะจมอยู่ในความมืดมิด แล้วมนุษยชาติก็จะค่อยๆ เสื่อมถอยไป#nในที่สุด..."
10050005-42 = "ไงคะ ชมรมแนวร่วมปลดปล่อยความรู้ สบายดีกันมั้ยคะ? ถึงเวลาปรากฏตัวของผู้รับผิดชอบจากชมรม#nสื่อสิ่งพิมพ์แล้วค่ะ ถึงจะเป็นคนที่เจอแล้วดีใจ แต่ไม่ยินดีก็เถอะ ฮิ ฮิ ฮิ"
10050005-43 = "ยังอยู่ในสภาพที่ดูไม่ได้เหมือนเดิมเลยนะคะ คุณเมรูริ ฉันว่าคุณก็น่าจะรู้นะคะว่าพื้นห้องสมุดไม่ใช่#nเตียงนอนน่ะ? ลุกขึ้นมาเถอะค่ะ"
10050005-44 = "อื้อ อื้อ... อยากพูดอะไรก็พูดเลย..."
10050005-45 = "เอ๋...? ทำไมคุณเมรูริถึงไม่มีชีวิตชีวาแบบนี้ล่ะคะ?! เป็นอะไรหรือเปล่าคะ คุณเมรูริ? ไม่ได้มีเรื่องอะไรใหญ่โตเกิดขึ้นใช่มั้ยคะ!?"
10050005-47 = "จะว่าเป็นเรื่องใหญ่โตก็ได้ค่ะ รุ่นพี่ยาคุโมะ รุ่นพี่ทาคาเนะ..."
10050005-48 = "หืม? คงมีอะไรที่ไม่เป็นไปตามแผนสินะ เรื่องใหญ่ที่ว่าคืออะไรเหรอคะ โมมิจิ?"
10050005-49 = "มีอะไร... ให้กินบ้างมั้ยคะ...?"
10050005-50 = "คะ...?"
10050005-52 = "โอ๊ย! โอ๊ยย! ปวดท้องจัง!"
10050005-53 = "ถ้ารีบสูบอาหารลงท้องทั้งๆ ที่อดมาตั้ง 3 วัน ก็จะปวดท้องแบบนี้เป็นธรรมดาละค่ะ อ่ะ ดื่มน้ำนี่ก่อนสิคะ"
10050005-54 = "ขอบคุณค่ะ รุ่นพี่ยาคุโมะ รุ่นพี่ทาคาเนะ... ขอสารภาพเลยค่ะว่าฉันแอบถามตัวเองว่ามันผิดปกติ#nหรือเปล่าที่พวกรุ่นพี่มาช่วยแบบนี้น่ะ"
10050005-55 = "พูดอะไรแบบนั้นคะ เมื่อถึงคราวลำบาก เราก็ต้องช่วยเหลือกันอยู่แล้ว แต่แน่นอนว่าฉันจะมาเรียกเก็บ#nเงินทีหลังค่ะ ฮิ ฮิ ฮิ"
10050005-57 = "การเรียกเก็บเงินของเธอฟังดูน่ากลัวอยู่นะ... แต่ก็เอาเถอะ อุตส่าห์เข้ามาช่วยชมรมที่กำลังจะอดตาย#nทั้งที ครั้งนี้ฉันคงว่าอะไรไม่ได้..."
10050005-58 = "ฉันรู้ว่าต้นเหตุของปัญหาคือความล่าช้าในการจ่ายเงินสนับสนุนการทำกิจกรรมของชมรมค่ะ แต่ถึงจะประสบปัญหานั้นกันอยู่ แต่อาการก็ดูร้ายแรงกว่าที่คิดอีกนะคะ?"
10050005-59 = "คือว่า... พอสถานการณ์เป็นแบบนี้ พวกฉันก็เลยขยับวันตีพิมพ์และวางจำหน่ายเข้ามา จะได้มีรายได้ทดแทนก่อน... แต่คงจะโหมงานกันหนักไปหน่อยน่ะค่ะ..."
10050005-60 = "อ้อ หมายถึงต้นฉบับเร่งด่วนที่เอามาให้ชมรมสื่อสิ่งพิมพ์เมื่อสัปดาห์ก่อนสินะคะ แล้วที่ขอผัดผ่อนการจ่ายค่าตีพิมพ์กับพวกฉันไว้ก่อนก็ด้วย..."
10050005-61 = "ไม่น่าทำเรื่องอะไรแบบนั้นเลย ฉันไม่รู้ว่ามันจะเป็นแบบนี้น่ะ..."
10050005-62 = "สรุปว่าชมรมสื่อสิ่งพิมพ์ของเรามาที่นี่เพื่อเรียกเก็บดอกเบี้ยจากยอดค้างชำระ แต่ต้องมาได้รู้เรื่องแบบนี้แทนสินะคะ"
10050005-63 = "เอาละ จ่ายดอกเบี้ยมาค่ะ ดอกเบี้ย"
10050005-64 = "ก็เห็นสภาพของพวกเราแล้วนี่นา! เงินจะซื้อข้าวกินยังไม่มีเลย แล้วจะเอาเงินที่ไหนมาจ่ายดอกเบี้ยล่ะ! ไม่มี ไม่หนี ไม่จ่าย อยากทำอะไรก็เชิญ!"
10050005-65 = "ให้ทำอะไรก็ได้จริงๆ เหรอคะ?"
10050005-66 = "จะทำจริงเหรอ...?"
10050005-67 = "ค่ะ แล้วก็จะเอาดอกเบี้ยด้วยค่ะ"
10050005-68 = "ปีศาจชัดๆ... มีปีศาจอยู่ตรงนี้!"
10050005-70 = "แต่ก็แปลกจังเลยนะคะคุณเมรูริ ต่อให้ผลงานของคุณเป็นงานที่ส่วนใหญ่ขายไม่ออก และยังเป็นงานที่คุณคิดทำตามใจชอบ"
10050005-71 = "นอกจากนี้ยังมีแต่เรื่องราวที่หยิ่งผยองและไม่สนใจปฏิกิริยาของตลาดเลย แต่ถึงยังไงก็..."
10050005-72 = "ตกลงว่ามาเก็บดอกเบี้ยหรือถากถางคนอื่นน่ะ? เลือกเอาสักอย่างสิ!"
10050005-73 = "ฟังฉันพูดให้จบก่อนสิคะ! ที่ฉันจะบอกก็คือ ใช่ว่าพวกคุณจะไม่มีแฟนนักอ่านตัวยง นอกจากนี้ยังมี#nบรรณาธิการที่ยอดเยี่ยมอย่างคุณโมมิจิด้วย ยอดขายก็ควรจะดีในระดับหนึ่งจนพอจ่ายค่าอาหารสิคะ?"
10050005-74 = "เรื่องนั้น... อันที่จริงพวกฉันก็คิดไม่ถึงเหมือนกันค่ะว่าจะขายไม่ออกแบบนี้..."
10050005-75 = "ยังมีหนังสือเหลืออยู่บ้างมั้ยคะ...? ขอฉันดูหน่อยค่ะ"
10050005-80 = "คะ... คิดว่ายังไงล่ะ?"
10050005-81 = "ก่อนอื่นเลยนะคะ ฉันรู้สาเหตุแล้วค่ะ..."
10050005-82 = "อะ... อะไรเหรอคะ...?"
10050005-83 = "คุณเมรูริ ต้นฉบับของคุณทั้งไร้เหตุผลและหยิ่งผยองโดยเนื้อแท้ นอกจากนี้ยังให้ความสำคัญกับตัวเอง#nที่เป็นผู้สร้างสรรค์ผลงานมากกว่าผู้อ่านด้วยค่ะ"
10050005-84 = "แต่ในทางตรงกันข้าม ส่วนนั้นกลับสร้างฐานแฟนคลับที่ถึงจะน้อยแต่ก็เหนียวแน่นได้ แต่ถึงยังไงก็ยังมีปัญหาเรื่องการสร้างความนิยมในวงกว้าง"
10050005-85 = "แล้วนี่มันอะไรกันคะ! มันทั้งขาดความลึกซึ้งที่เป็นเอกลักษณ์เฉพาะของคุณเมรูริ แล้วก็ดูพยายามทำ#nตามกระแสอย่างครึ่งๆ กลางๆ จนหาจุดยืนของตัวเองไม่ได้เลยค่ะ!"
10050005-86 = "เพราะอย่างนี้ก็เลยเป็นแค่ต้นฉบับครึ่งๆ กลางๆ ที่ดึงดูดผู้อ่านกลุ่มไหนไม่ได้ ไม่ว่าจะแฟนคลับตัวยง#nหรือมหาชนก็ตามค่ะ! ฉันขอให้คะแนน 2 เต็ม 5... ไม่สิ ให้ 1.5 คะแนนดีกว่าค่ะ!"
10050005-87 = "ไม่เป็นไรค่ะ คุณเมรูริไม่ต้องตอบฉันก็ได้ นี่มันอะไรกันคะ คุณโมมิจิ?"
10050005-88 = "คะ... คือว่า... ครั้งนี้เราคิดว่าต้องทำอะไรที่แตกต่างออกไป อะไรที่จะขายได้จริงๆ..."
10050005-89 = "แล้วยิ่งกำหนดส่งงานถูกขยับเข้ามา รุ่นพี่เมรุก็เลยต้องปั่นงานแบบไฟลุก ส่วนฉันก็ไม่มีเวลาตรวจทาน#nหรือแก้ไขงาน..."
10050005-90 = "ค่ะ... นั่นเป็นเหตุผลที่ฟังขึ้นเลยค่ะ... แต่ดูเหมือนจะมีปัญหาอีกอย่างหนึ่งด้วยนะคะ"
10050005-92 = "อะไรเหรอ...?"
10050005-93 = "มาทบทวนกันอีกครั้งนะคะ คำขวัญของชมรมสื่อสิ่งพิมพ์ก็คือ 'ตีพิมพ์ พิมพ์เพิ่ม วางจำหน่าย' และเพราะอย่างนั้น..."
10050005-94 = "ในฐานะผู้รับผิดชอบทั้ง 3 กระบวนการนั้น กลยุทธ์การตลาดแบบนี้เป็นสิ่งที่ให้อภัยไม่ได้ค่ะ!"
10050005-95 = "เฮือก?!"
10050005-96 = "เฮือก!?"
10050005-97 = "อย่างที่ทาคาเนะบอก ผลงานนี้ถูกสร้างขึ้นตามใจล้วนๆ ส่วนเว็บไซต์ที่เอาไว้อัปโหลดตัวอย่าง#nเพื่อโปรโมตผลงานก็เป็นเว็บร้างที่ไม่มีใครรู้จักเลยนี่คะ?!"
10050005-98 = "กะ... ก็เราไม่มีเงินไปจ่ายค่าอัปโหลด..."
10050005-99 = "หยุดพูดไร้สาระได้แล้วค่ะ! อินเทอร์เน็ตเป็นพื้นที่กึ่งไร้กฎหมายที่เราสร้างอะไรก็ได้จากความว่างเปล่า! "
10050005-100 = "ถ้าตั้งใจจริงๆ เราก็โปรโมตในเว็บไซต์ที่ดีกว่านี้ได้ค่ะ! ตกลงอยากขายของกันจริงๆ หรือเปล่าคะ!"
10050005-101 = "ถะ... ถ้าทำผลงานดีๆ ได้ เดี๋ยวมันก็ขายดีเองนั่นละ!"
10050005-102 = "พูดอะไรเพ้อเจ้ออีกแล้ว! ถ้างั้นโลกนี้จะต้องมีการตลาดไปทำไมล่ะคะ?"
10050005-103 = "ถึงฉันจะไม่รู้แน่ชัดว่ามีหนังสือเยอะแค่ไหนที่ต้องถูกตีกลับมาค้างสต๊อกเพราะการโปรโมตที่ไม่ดี!"
10050005-104 = "แต่ก็มั่นใจว่าต้องพอๆ กับจำนวนหนังสือที่เก็บไว้ในห้องสมุดของชมรมแนวร่วมปลดปล่อยความรู้#nแน่นอนค่ะ!"
10050005-105 = "พูดเว่อร์ไปหรือเปล่า?!"
10050005-107 = "ไม่ค่ะ! ถ้านึกถึงประวัติศาสตร์ของมนุษยชาติและช่วงเวลาที่ยาวนานนั้น มันจะยิ่งเยอะกว่านั้นอีกค่ะ! ก็เพราะอย่างนี้ละ พวกนักสร้างสรรค์ก็เลย...!"
10050005-108 = "ก็เลยรู้แค่วิธีสร้างสิ่งนั้นขึ้นมา แต่ไม่มีความสนใจที่จะเผยแพร่ผลงานให้เป็นที่รู้จักอย่างกว้างขวาง!"
10050005-109 = "ดูเหมือนวันนี้เธอจะจริงจังเสียเหลือเกินนะ?!"
10050005-110 = "น่าจะเป็นเพราะคุณเมรูริไปสะกิดจุดเดือดของหัวหน้าเข้าให้น่ะค่ะ..."
10050005-112 = "เอาเถอะ ชมรมแนวร่วมปลดปล่อยความรู้ เอาเป็นว่าฉันพอเข้าใจสถานการณ์แล้ว  ถ้าสินค้าค้างสต๊อก#nพวกนี้ขายไม่ออกในราคาปกติ... ก็ย่อมเป็นเรื่องยากลำบากสำหรับชมรมสื่อสิ่งพิมพ์เหมือนกันค่ะ"
10050005-113 = "เอ๋? งั้นถ้าเป็นอย่างนั้น...? ฮืม ฮืม หืม? ถ้าเกิดว่า...?"
10050005-114 = "หัวหน้า? ฉันเริ่มกังวลขึ้นมานิดหน่อยแล้วนะคะ...?"
10050005-115 = "ฉันจัดการเองค่ะ ทาคาเนะ ฮิ ฮิ ฮิ"
10050005-116 = "งั้นก็ดีค่ะ เมรุ เรามาจับมือกันมั้ยล่ะคะ?"
10050005-117 = "จับมือกัน...? อึก ถ้าเป็นไปได้ฉันก็ไม่อยากร่วมมือในเรื่องแบบนี้กับเธอเลย..."
10050005-118 = "ลองฟังดูก่อนสิคะ พูดเหมือนเจอมิจฉาชีพมาบ่อยงั้นละ"
10050005-119 = "ก็เจอมาบ่อยอยู่นะ..."
10050005-120 = "แต่นี่คือเรื่องการทำเงินนะคะ อยากได้เงินไปต่อลมหายใจชมรมไม่ใช่เหรอคะ? หรือว่าไม่อยาก?"
10050005-121 = "อึก... ก็ได้ งั้นก็เข้าประเด็นมาเลย"
10050005-122 = "ค่อยคุยกันง่ายหน่อย ขอบคุณนะคะ ถ้าจะให้สรุปเลยละก็ พวกฉันจะจัดการขายหนังสือค้างสต๊อก#nของชมรมแนวร่วมปลดปล่อยความรู้ให้ค่ะ"
10050005-124 = "คะ...?"
10050005-125 = "คะ...?"
10050005-126 = "แต่โลกนี้ก็ไม่มีอะไรได้มาฟรีๆ หรอกนะคะ สำหรับพวกคุณที่มีจุดอ่อนเรื่องการโปรโมตและการตลาด#nเป็นพิเศษแล้วละก็ พวกฉันจะรับภาระค่าใช้จ่ายและลงแรงกับเรื่องนั้นเอง..."
10050005-127 = "และจะขอรับค่าเหนื่อยเป็นกำไรตามสัดส่วนที่กำหนดค่ะ ว่ายังไงล่ะคะ?"
10050005-128 = "มะ... ไม่เอาด้วยหรอก! เท่าที่ฉันเคยจับมือทำอะไรกับพวกเธอมา ไม่เคยเห็นจะมีเรื่องดีๆ เลย!"
10050005-129 = "รุ่นพี่เมรุ รุ่นพี่เมรุ! แต่ฉันคิดว่า... ที่รุ่นพี่ยาคุโมะพูดมาก็สมเหตุสมผลนะคะ...!"
10050005-130 = "มันก็จริงที่พวกเราจัดการหนังสือค้างสต๊อกจำนวนมหาศาลนี้ด้วยตัวเองไม่ได้ และเราก็มีข้อบกพร่อง#nเรื่องการโปรโมตและการตลาดจริงๆ ค่ะ..."
10050005-131 = "แทนที่จะกอดหนังสือพวกนี้ไว้แล้วปล่อยให้เรือล่ม ฉันว่าเรายอมให้คนอื่นมาช่วยพายเรือจะไม่ดีกว่า#nเหรอคะ?"
10050005-132 = "ที่สำคัญ เราก็ไม่มีที่เก็บหนังสือด้วยค่ะ... ก็เล่มหนังสือของเราทั้งหนาและก็หนักนี่คะ..."
10050005-134 = "เอ๋ ตกลงเราคุยกันไม่รู้เรื่องเหรอคะ? แต่คู่ค้าที่เราสามารถพูดคุยด้วยได้น่ะหาไม่ได้ง่ายๆ นะคะ?"
10050005-135 = "ฮึ่ย น่าโมโหชะมัด...! แต่ก็อย่างที่โมมิจิบอก ตอนนี้เราไม่มีวิธีอื่นที่ชาญฉลาดแล้ว... ก็ได้ ฉันยอมรับข้อเสนอ!"
10050005-136 = "ดีค่ะ งั้นมาเริ่มเขียนสัญญากันก่อนเลยค่ะ ส่วนการแบ่งสัดส่วนก็... เอาเป็น 1 ต่อ 9 ดีมั้ยคะ?"
10050005-137 = "ขอถามเผื่อๆ นะ... พวกฉันได้ 9 ใช่มั้ย?"
10050005-138 = "ได้ไงล่ะคะ?"
10050005-139 = "กะไว้แล้วเชียวว่าต้องเป็นแบบนี้ หน้าเลือดจริงๆ เลย! "
10050005-141 = "หัวหน้าคะ หัวหน้า! แม้แต่ฉันยังคิดว่าสัดส่วนนั้นมันเกินไปหน่อยเลยนะคะ?!"
10050005-143 = "ถนนในเรดวินเทอร์"
10050005-144 = "เฮ้อ...  ยังไงก็ได้ทำสัญญามาจนได้นะคะ"
10050005-145 = "จากนี้เราก็แค่ต้องขายหนังสือค้างสต๊อกนั่นให้หมด แล้วโอนเงินในสัดส่วนที่ตกลงให้ทางนั้นสินะคะ"
10050005-146 = "แต่ยังไงหนังสือก็เยอะใช่เล่นเลยนะคะ จริงๆ เลยเชียว ไม่คิดกันเลยหรือไงนะว่าถ้าขายไม่หมดจะ#nขาดทุนแค่ไหนน่ะ"
10050005-147 = "มาพยายามกันเถอะค่ะ ทาคาเนะ! เราจะแสดงศักยภาพของชมรมสื่อสิ่งพิมพ์ให้ทุกคนได้เห็นค่ะ!"
10050005-152 = "ไหงเป็นงี้ล่ะ...!"
10050005-157 = "ขายไม่ออกเลยสักเล่มค่ะ..."
10050005-158 = "ทำไมล่ะคะ?! นี่เป็นกลยุทธ์การขายที่สมบูรณ์แบบแท้ๆ!"
10050005-159 = "ถ้าให้ฉันวิเคราะห์... อย่างแรกเลย หนังสือของคุณเมรูริก็มีส่วนที่น่าสนใจอยู่..."
10050005-160 = "แต่ในเรดวินเทอร์ นี่คือประเภทหนังสือที่ทุกคนคุ้นเคยกันดีอยู่แล้วค่ะ"
10050005-161 = "ยิ่งไปกว่านั้น อย่างที่ฉันเคยบอกไปว่าเล่มนี้เนื้อหาครึ่งๆ กลางๆ ไม่น่าเป็นที่นิยม และคว้าใจผู้อ่านไม่ได้ค่ะ"
10050005-162 = "ต่อให้เนื้อเรื่องจะดีแค่ไหน แต่ถ้าได้อ่านเกิน 3 รอบก็ย่อมเบื่อเป็นธรรมดาใช่มั้ยคะ? ว่ากันว่าผลงาน#nของนักสร้างสรรค์ส่วนใหญ่ ต่อให้ดัดแปลงยังไงก็อยู่ในธีมหลักเพียงธีมเดียวไปตลอดชีวิตค่ะ"
10050005-163 = "นักสร้างสรรค์ที่ยอดเยี่ยมจะสร้างผลงานได้ 2 ธีม ส่วนอัจฉริยะที่เหนือกว่านั้นก็ 3 ธีมขึ้นไปค่ะ แน่นอนว่าคุณเมรูริก็พยายามเปลี่ยนแปลงหลายๆ อย่างในแบบของเธอเอง..."
10050005-164 = "แต่อย่างน้อยในเรดวินเทอร์แล้ว การเปลี่ยนแปลงนั้นก็เป็นสิ่งที่ทุกคนคุ้นเคยกันดีอยู่แล้วค่ะ..."
10050005-165 = "นั่นสินะคะ... เป็นประเด็นที่ดีเลยค่ะ ทาคาเนะ แต่ฉันมองว่ายังมีปัญหาพื้นฐานอีกอย่างหนึ่งค่ะ"
10050005-166 = "อะไรเหรอคะ หัวหน้า?"
10050005-168 = "นั่นก็คือ นักเรียนเรดวินเทอร์กระเป๋าแบนกันทุกคนยังไงล่ะคะ!"
10050005-169 = "ถ้ายกเรื่องนี้มาพูด สุดท้ายจะมีแต่ตอนจบที่พวกเราทุกคนเจ็บปวดนะคะ?!"
10050005-170 = "แต่ก็ลองคิดตามนะคะ ถ้าผู้คนไม่มีเงิน ก็ย่อมลดการทำกิจกรรมพักผ่อนหย่อนใจเชิงศิลปวัฒนธรรม#nอยู่แล้วไม่ใช่เหรอคะ?"
10050005-171 = "จะบอกว่าต่อให้เป็นอย่างนั้น แต่ก็ยังจะทำธุรกิจสื่อสิ่งพิมพ์งั้นเหรอคะหัวหน้า...?"
10050005-172 = "ที่ฉันจะบอกก็คือ เราจะอยู่ในวงการธุรกิจสื่อสิ่งพิมพ์ได้ก็ต่อเมื่อเราไม่ลืมประเด็นนั้นต่างหากค่ะ! "
10050005-173 = "ตะ... แต่ถึงจะเกิดสถานการณ์ยากลำบากแบบนั้น หน้าที่ของชมรมสื่อสิ่งพิมพ์ของเราก็คือการหา#nทางออกให้ได้ไม่ใช่เหรอคะ...?!"
10050005-174 = "ยังไงค่าใช้จ่ายในการดำเนินงานของชมรมสื่อสิ่งพิมพ์มากกว่าครึ่งก็ได้มาจากสินค้าโฆษณาชวนเชื่อ#nของประธานเชริโน่และค่าเหนื่อยจากการพิมพ์ <เรดแบร์> อยู่แล้วนี่คะ!"
10050005-175 = "พูดเรื่องนั้นจากปากของเราเองแล้วก็ยิ่งเศร้านะคะ บรรณาธิการ <เรดแบร์> คนก่อนที่ถูกกวาดล้างไป#nก็ยังไม่มาปรากฏตัวเลยด้วย!"
10050005-176 = "ค่ะ... ใช่ค่ะ พอเป็นแบบนั้น เหล่านักเรียนจากกองบรรณาธิการที่ไม่มีที่ไปก็เลยย้ายเข้ามาอยู่ชมรม#nสื่อสิ่งพิมพ์ของพวกเรา"
10050005-177 = "เฮ้อ... ก่อนหน้านั้นชมรมสื่อสิ่งพิมพ์ก็หาเงินได้แค่พอประทังชมรมอยู่แล้วด้วย"
10050005-178 = "กลายเป็นว่าพอได้รวมกับกองบรรณาธิการ การเงินของชมรมสื่อสิ่งพิมพ์ก็ดีขึ้นมากเลยนะคะ"
10050005-179 = "แต่ถึงยังไง ฉันก็ไม่ค่อยสบายใจกับการแทรกแซงของสำนักเลขาธิการค่ะ..."
10050005-180 = "ฮิ ฮิ ฮิ ทาคาเนะก็มีเหตุผลที่จะพูดอย่างนั้นค่ะ ก็ทาคาเนะเป็นนักวิจารณ์นี่คะ "
10050005-181 = "แต่ในฐานะ... ผู้รับผิดชอบ 'สภาพการเงิน' ของชมรมสื่อสิ่งพิมพ์ ฉันคิดว่าสถานการณ์ในปัจจุบันก็#nไม่ถึงกับแย่มากค่ะ"
10050005-182 = "เอาเถอะค่ะ เอาเป็นว่าฉันไขปริศนาได้แล้ว ฉันพบต้นตอของปัญหาแล้วค่ะ"
10050005-183 = "คืออะไรเหรอคะ หัวหน้า?"
10050005-184 = "มันก็คือ..."
10050005-185 = "การพยายามหาเงินในที่ที่คนไม่มีกำลังซื้อยังไงล่ะคะ นั่นคือความผิดพลาดดีๆ เลยค่ะ!"
10050005-186 = "เราต้องยอมรับความจริงว่าสถานะทางการเงินของเรดวินเทอร์ย่ำแย่กว่าของโรงเรียนอื่นค่ะ!"
10050005-187 = "ถึงจะมีคำกล่าวที่ว่า 'ต่อให้เป็นผ้าขนหนูที่แห้งสนิทแค่ไหน ถ้าตั้งใจจริงๆ ก็จะบิดให้น้ำซึมออกมาได้' แต่มันก็ใช้ไม่ได้เสมอไปในทุกที่หรอกค่ะ!"
10050005-188 = "ทะ... ที่หัวหน้าพูดมาก็ถูก แต่ตอนนี้น่าจะไม่มีอะไรที่พวกเราทำได้นะคะ?"
10050005-189 = "ไม่หรอกค่ะ มีค่ะ ทาคาเนะ มันมีอยู่แน่นอนค่ะ"
10050005-190 = "มันคือ... อะไรเหรอคะ?"
10050005-191 = "ในทางธุรกิจ กล่าวกันว่าสิ่งสำคัญประการแรกก็คือทำเลที่ตั้ง รองลงมาก็คือทำเลที่ตั้ง และสุดท้ายก็ยังเป็นทำเลที่ตั้งอีกค่ะ"
10050005-192 = "ถ้าตรงนี้ไม่มีเงิน เราก็ต้องไปในที่ที่มีเงินหมุนเวียนค่ะ ยิ่งไปกว่านั้น ถ้าเป็นที่ที่มีวัฒนธรรมการอ่าน#nของตัวเองอยู่แล้วด้วย ก็จะยิ่งดีเลยค่ะ"
10050005-193 = "มีที่แบบนั้นด้วยเหรอคะ?"
10050005-194 = "มีสิคะ และที่นั่นก็คือ..."
10050005-196 = "โรงเรียนสามัญทรีนิตี้ค่ะ..."
10050005-199 = "เดี๋ยวนะคะ หัวหน้า?! พูดแบบนั้นหมายความว่าจะเข้าไปทำกิจกรรมส่งเสริมการขายในทรีนิตี้โดยตรง#nเหรอคะ?! แต่นั่นเป็นเขตปกครองตนเองของโรงเรียนอื่นนะ!?!?"
10050005-200 = "ถ้าไม่เสี่ยงบ้างก็จะไม่ได้อะไรเลยค่ะ! เอาละ ตามฉันมาค่ะ ทาคาเนะ! ถ้าตามมาไม่ทัน ฉันจะไม่รอนะคะ!"
10050005-205 = "หัวหน้า? หัวหน้า?!?!"

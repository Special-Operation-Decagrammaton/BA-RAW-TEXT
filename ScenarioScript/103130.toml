[translation]
103130-1 = "Episode 13;The Right of the Light 2"
103130-2 = "...It has begun."
103130-3 = "The basic concept of the Ark of Atrahasis is to collect and transform surrounding data."
103130-4 = "Furthermore, if it's not a copy, but an intervention from the original...regardless of the multidimensional analysis, we should be able to penetrate that barrier."

[translation]
103130-1 = "ตอนที่ 13;คุณสมบัติของแสง 2"
103130-2 = "...... เริ่มแล้ว"
103130-3 = "แนวคิดพื้นฐานของเรืออะทราฮาซิสคือการ <รวบรวม> ข้อมูลรอบๆ ตัวมา <ดัดแปลง>"
103130-4 = "หากไม่ใช่การคัดลอก แต่เป็นการแทรกแซงเข้าไปในตัวตนดั้งเดิมเลยละก็...... เราก็น่าจะเจาะบาเรียนั้น#nได้โดยไม่ต้องคำนึงถึงการวิเคราะห์พหุมิติ"
103130-6 = "ในตอนนั้น เรือที่จะเกิดขึ้นด้วยข้อมูลของเมืองแห่งปราการ...... มีรูปร่างเป็นเหมือนเกราะกำบังขนาด#nยักษ์ค่ะ"
103130-7 = "บางทีนั่นอาจเป็นเพราะมันถูกสร้างโดยมีพื้นฐานมาจากเมืองแห่งปราการที่สะท้อนความกลัวในจิตใจ#nของคุณนะคะ ริโอะ"
103130-8 = "...... อ่า ถ้าอย่างนั้นเรือที่อาริสึกำลังสร้างขึ้นมาตอนนี้ล่ะ......"
103130-9 = "ฮุฮุ ถ้าเป็นอย่างนั้นละก็...... เราได้คำตอบแล้วไม่ใช่เหรอคะ?"
103130-20 = "ข้อมูลของ <อุตนาพิชทิม> ถูกแยกออกและสร้างขึ้นใหม่ในอีกที่หนึ่ง!!  แบบนี้จะไม่เป็นไรใช่ไหม?"
103130-21 = "นะ... นั่นมัน......!!?"
103130-22 = "นั่นมันใหญ่เกินกว่าจะเป็นปืนได้นะ อย่าบอกนะว่า......!"
103130-23 = "นั่นมัน? ผลงานชิ้นเอกที่ชมรมวิศวกรรมภาคภูมิใจ....."
103130-24 = "ไม่สิ แต่ขนาดมันต่างออกไปนะคะ?"
103130-25 = "นั่นมัน..."
103130-26 = "ดาบแห่งแสง!!?"
103130-28 = "นั่นคือ <เรืออะทราฮาซิส> ที่แท้จริง และเป็น <หลักฐานของผู้กล้า> ที่สร้างขึ้นบนพื้นฐานของหัวใจ#nแห่งความกล้าหาญของอาริสึ..."
103130-29 = "นั่นสินะ ถ้าอยากจะเรียกชื่อ......"
103130-30 = "ก็คงต้องให้เป็น <ดาบแห่งแสง: ซูเปอร์โนวาแห่งอะทราฮาซิส> แล้วละค่ะ"
103130-32 = "พบเป้าหมาย ทะลุจุดวิกฤตการส่งจ่ายพลังงาน......!"
103130-33 = "ชาร์จพลังเวท...... 100% ค่ะ!"
103130-34 = "ไม้ตายแห่งความยุติธรรมที่ทำลายสิ่งชั่วร้าย..."
103130-38 = "... ก็ได้ อาริสึ"
103130-39 = "ฉันจะทำตามแบบของเธอ"
103130-43 = "ไปเลยผู้กล้า!! ช่วยโลกของเราด้วยเถอะ!!"
103130-45 = "แน่นอนอยู่แล้วค่ะ!! อาริสึไม่ละทิ้งคำขอร้องจากสหายอยู่แล้วค่ะ!"

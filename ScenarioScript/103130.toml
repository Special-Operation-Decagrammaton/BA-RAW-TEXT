103130-50 = "———— ทำลายล้าง!!!!!!!!!!!!!!!"
103130-58 = "ปล่อยพลังงานเข้มข้นสูงจากดาบแห่งแสง!!!"
103130-59 = "พลังงานที่ถูกปล่อยออกมากำลังตรงไปที่ <เรืออะทราฮาซิส>!!"
103130-60 = "คำนวณวิถีการยิง! ค่าคลาดเคลื่อน 0.003%!!  แบบนี้ไม่มีปัญหาค่ะ!"
103130-61 = "พลังงานที่ถูกยิงออกมาจะพุ่งเข้าใส่ใจกลางของเรืออะทราฮาซิสเลยค่ะ! แต่ว่า..."
103130-67 = "ค่ะ แต่ว่า... ดาบแห่งแสงจะเจาะ <บาเรียพหุมิติ> ของเรือได้หรือเปล่า...!?"

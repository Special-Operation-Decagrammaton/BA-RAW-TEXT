103130-60 = "Calculating the ejection trajectory! Error, 0.003%! No problem as is!"
103130-61 = "The ejected energy will soon reach the very center of the Ark of Atrahasis! But..."
103130-67 = "Yes, but...can the Sword of Light pierce the Ark's multidimensional barrier?"
103130-78 = "Aris...!"
103130-79 = "Aris—!"

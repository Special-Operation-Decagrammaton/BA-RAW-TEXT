[translation]
103130-1 = "第13話;「勇者」的資格（２）"
103130-2 = "……已經開始了。"
103130-3 = "「阿特拉哈西斯的方舟」的基本概念是將周圍的資料進行「收集」並將其「變形」。"
103130-4 = "因此如果由並非複製，而是其原型的存在來介入……#n就能不受多次元詮釋的影響，貫穿那個防護罩才對。"
103130-6 = "當時，試圖利用要塞城市的資料生成的方舟……#n外觀就像是巨大的避難所。"
103130-7 = "其原因……恐怕是因為那是以投射了莉央內心恐懼的要塞城市為基礎所建構的吧。"
103130-8 = "……那麼，現在愛麗絲創造出來的方舟是……？"
103130-9 = "……呵呵，答案已經揭曉了唷♪"
103130-20 = "「生命守護者」的資料遭到分解──並且正在重新構築！？#n這樣真的沒問題嗎？"
103130-21 = "咦，咦……"
103130-22 = "難以想像是槍的大小，難道──"
103130-23 = "！？那是我們工程師部的匠心之作……"
103130-24 = "等等，大小也差太多了吧！"
103130-25 = "那是……"
103130-26 = "光之劍……！？"
103130-28 = "沒錯，那就是真正的「阿特拉哈西斯的方舟」，#n同時也是以愛麗絲的[ruby=心]勇氣[/ruby]為基礎構築的「勇者的證明」──"
103130-29 = "嗯……要幫它取個名字的話，"
103130-30 = "就叫它「光之劍：阿特拉哈西斯的[ruby=Supernova]超新星[/ruby]」吧？"
103130-32 = "確認目標。突破輸出臨界點……！"
103130-33 = "魔力充電……100%！"
103130-34 = "粉碎邪惡的正義一擊……"
103130-38 = "……愛麗絲。"
103130-39 = "這裡──就借用你們的表現方式吧。"
103130-43 = "去吧，勇者啊……！#n拯救我們的世界！！！"
103130-45 = "沒問題！！#n愛麗絲會回應夥伴的期待！！"
103130-46 = "光──────"
103130-50 = "──────呀！！！！！！"
103130-58 = "光之劍……發射了超高濃度的能量！！"
103130-59 = "能量直直飛向了方舟……！！"
103130-60 = "正在計算光炮軌道──誤差為0.003%！沒有問題！"
103130-61 = "發射出的能量即將命中方舟的正中央！#n……但是──"
103130-67 = "……是呢。#n究竟光之劍能不能貫穿方舟的「多次元防護罩」呢……"
103130-78 = "愛麗絲……！！"
103130-79 = "愛麗絲────！！"
103130-100 = "正中目標！多次元防護罩遭到粉碎！！！"
103130-101 = "[s]「成功了！！！」"
103130-102 = "…………！！！"
103130-103 = "真的──貫穿了多次元防護罩……！"
103130-104 = "多次元防護罩因為無法維持「共存狀態」開始崩潰了──！"
103130-113 = "啊，啊啊……！？"
103130-114 = "愛，愛麗絲！？"
103130-115 = "愛麗絲醬！！快醒醒……！"
103130-117 = "愛，愛麗絲醬……！？還好嗎！？"
103130-118 = "我，我們正在把他帶到安全的地方！"
103130-119 = "……！？#n怎，怎麼會……"
103130-120 = "不……！雖然失去了意識，不過愛麗絲沒事！"
103130-121 = "嗯。只是睡著了而已……我們會帶他去醫務室，負責照顧他的……！"
103130-122 = "呃，嗯，拜託你們了……！"
103130-129 = "約5秒後將傳來衝擊波！#n請大家準備好應對衝擊！！"
103130-130 = "多次元防護罩的「共存狀態」消失！#n已經確定功能停止了！！"
103130-131 = "很好……也就是說，方舟已經毫無防備了對吧？"
103130-136 = "唔唔……！！"
103130-137 = "琳，琳前輩……！"
103130-138 = "不能放過這個機會……！！"
103130-139 = "咦，咦？"
103130-141 = "生命守護者，全速前進！！"
103130-142 = "現，現在嗎……！？"
103130-144 = "沒錯！#n得在敵人採取應對措施前突破才行！"
103130-145 = "是，是！我知道了！！"
103130-146 = "以最大速度……突進──！！"
103130-157 = "距，距離撞上防護罩剩下3秒……！！"
103130-158 = "嗚啊啊啊……應，應該沒問題吧？"
103130-159 = "現在多次元防護罩是無效狀態，一定沒問題的……！"
103130-160 = "是。就這樣突破防護罩進入方舟內部吧！！"
103130-161 = "……衝，衝擊要來了！！抓穩了！！"
103130-173 = "突破防護罩！！！綾音同學！緊急停止！"
103130-174 = "是！緊急停止程式，啟動！！"
103130-183 = "「生命守護者本艦」，反向推進裝置啟動！！#n注意引擎的過載！"
103130-184 = "即將與方舟本體發生碰撞！！#n請大家準備好應對第二波的衝擊！！"
103130-185 = "碰，碰撞方舟外壁！！"
103130-202 = "……"
103130-203 = "哈啊……哈啊……"
103130-204 = "成，成功了嗎……？"
103130-205 = "似，似乎是呢……"
103130-206 = "這裡是……方舟內部？"
103130-207 = "……是的。#n終於……成功進入方舟內部了。"
103130-208 = "[s]「太好了……大成功呢。」"
103130-210 = "哈啊……壽命都變短了……"
103130-211 = "沒想到這種做法真的成功了……"
103130-212 = "哈啊……腿都軟了呢……"
103130-214 = "竟然真的使用方舟對付方舟……#n居然會用這種方法突破，真是出乎我的意料。"
103130-215 = "是啊……愛麗絲他，真的拯救了世界。"
103130-217 = "……不。愛麗絲應該會這麼回答吧──"
103130-218 = "「因為有夥伴，所以才能成功」。"
103130-219 = "……"
103130-220 = "正確來說……莉央，是因為有你在。#n因為你所提出的想法。"
103130-221 = "我想就算是我這個超天才美少女也想不出那種方法。"
103130-222 = "……陽葵，我──"
103130-223 = "……雖然現在還沒成功。#n但如果──我們真的成功拯救了世界，"
103130-224 = "那一定是多虧了莉央──多虧有你在吧。"
103130-225 = "[s]「沒錯。莉央拯救了世界。」"
103130-227 = "我……"
103130-228 = "…………"
103130-229 = "……"
103130-233 = "莉央……？"
103130-249 = "王女……"
103130-250 = "永別了，Kei……"
103130-251 = "這樣一來愛麗絲……"
103130-253 = "對不起……明明，你已經，告訴過愛麗絲……"
103130-273 = "……王女啊。"
103130-274 = "你明明……知道使用那股力量會對自己造成危險……"
103130-275 = "……"
103130-276 = "明明自己的存在有可能消失──有可能會喪命……"
103130-279 = "為了我──為了拯救大家，連死亡都無所畏懼嗎。"
103130-280 = "這就是你的勇氣……這就是「勇者」嗎。"
103130-283 = "……不。你不能消失。#n我予以拒絕。"
103130-284 = "……請別擔心，你不會消失的……我拒絕那種事的發生。"
103130-287 = "應該消失的存在不是勇者──而是毀滅世界的「道具」。"
103130-288 = "這樣才是正確的。#n所以──"
103130-291 = "──這樣就可以了。"
103130-293 = "……還有，"
103130-294 = "請別向我道歉──愛麗絲。"
103130-302 = "Kei……"
103130-309 = "愛麗絲……是在做夢嗎？#n露出了溫柔的表情。"
103130-310 = "……"
103130-311 = "咦……？剛，剛才愛麗絲醬好像說了什麼……"
103130-312 = "愛，愛麗絲醬？#n「K」……？"
103130-313 = "愛麗絲……？#n哭了嗎……？"
103130-323 = "下一話;突入"

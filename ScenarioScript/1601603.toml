[translation]
1601603-1 = "無須特意解釋……"
1601603-2 = "（因為夏萊公務上的需要，到市區購買各式物品的途中……）"
1601603-8 = "哎呀，老師。#n沒想到會在這裡見到您呢。"
1601603-12 = "[ns1]「……嗯？這個聲音是……」\n[ns2]「……美禰？」"
1601603-18 = "您是為了夏萊的公務而來的嗎？#n呵呵，真巧呢。"
1601603-19 = "我也是來執行救護騎士團的公務。#n如果您不介意的話，就讓我陪您一同進行吧。"
1601603-23 = "老師？怎麼了嗎？#n您的表情好像……"
1601603-24 = "……啊啊，是這身衣服嗎？"
1601603-29 = "……原來如此。#n不好意思，是我沒有解釋清楚。"
1601603-30 = "雖然說是救護騎士團的公務，不過我今天其實是來進行一場慰問性質的表演。#n因此與平時的服裝相比，我認為換上這身服裝會更適合。"
1601603-31 = "不知道這樣的回答，您是否滿意呢？"
1601603-32 = "[s3]「啊啊，原來如此啊。真是辛苦你了。」\n[s4]「美禰真的很認真呢。」"
1601603-35 = "呵呵，不敢當。"
1601603-39 = "既然問題已經解決……那我們走吧。"
1601603-46 = "（……幾天後）"
1601603-52 = "（由於一些公務上的原因，和人約在一間附近的商務餐廳見面）"
1601603-58 = "……嗯？老師？？"
1601603-64 = "哎呀……居然又見到您了呢。#n我們不久前也曾在路上巧遇吧？"
1601603-65 = "當然，這種奇妙的巧合我非常歡迎……呵呵。"
1601603-66 = "[s5]「你來這裡也是為了表演嗎？」\n[s6]「你這次也穿著偶像服耶。」"
1601603-69 = "……嗯？"
1601603-70 = "啊，我這次並非為了表演而來，只是有很多人都向我推薦這裡的餐點。"
1601603-71 = "至於這身衣服……"
1601603-76 = "…………"
1601603-77 = "……只，只是為了符合餐廳的氛圍，結果就變成這樣了。嗯。"
1601603-78 = "這裡畢竟是間高級餐廳，我認為還是穿禮服來會比較適合。#n沒錯，就是這樣。"
1601603-79 = "[s7]（符合餐廳氛圍……？）\n[s8]（嗯？剛才那陣沉默是……）"
1601603-82 = "總，總之既然老師看起來還有事要忙，我今天就先離開了。"
1601603-83 = "不好意思，先告辭了……！"
1601603-89 = "（之後又碰巧在路上撞見了美禰好幾次）"
1601603-100 = "（而且每次都穿著偶像服，對此給出的解釋也越來越荒謬……）"
1601603-106 = "（……另一天）"
1601603-112 = "（因為加班到了深夜，所以打算去便利商店逛逛來提振精神）"
1601603-121 = "……咦？老師。#n這種時間您怎麼會來這裡呢？"
1601603-122 = "啊，剛才在加班是嗎？#n唔嗯……工作到這麼晚，真是辛苦您了。"
1601603-123 = "雖然我沒資格代表所有學生，但見到您為我們這麼努力，我還是希望向您說聲謝謝。"
1601603-124 = "而且……"
1601603-129 = "……啊。"
1601603-130 = "那個……老師。"
1601603-131 = "我……我這身服裝是因為……"
1601603-132 = "[s9]「等等，美禰。那個……」\n[s10]「其實你也不必每次都找藉口……」"
1601603-137 = "不，不是那樣的！請您聽我解釋……！#n我……！"
1601603-138 = "唔嗯……！該怎麼說呢，那個……"
1601603-142 = "……對了，休閒服！#n因為我現在是以個人，而非救護騎士團團長的名義外出，所以才會穿著休閒服……！"
1601603-143 = "不，等等……真的會有人把這種衣服當成休閒服嗎？#n唔……！！"
1601603-144 = "該怎麼說才對？怎麼解釋聽起來才會比較自然？"
1601603-145 = "不，先等一下。這種話直接在老師面前講出來好像也有點……！！"
1601603-150 = "嗯？老師，您剛才有說什麼嗎？"
1601603-151 = "……嗯？您說沒關係？#n您，您指的是……"
1601603-152 = "[s11]「我知道你喜歡可愛的事物，美禰。」\n[s12]「你只是穿上自己喜歡的衣服而已，我不覺得這有什麼問題。」"
1601603-155 = "啊啊，原來如此。我明白了。#n如果是這樣的話就太……"
1601603-156 = "好……了嗎？"
1601603-161 = "……老師？"
1601603-162 = "請等一下，老師。#n您剛才那番話……的意思是……"
1601603-169 = "原來……"
1601603-170 = "您打從一開始……就知道了嗎……"
1601603-171 = "這樣啊……"
1601603-176 = "……老師。"
1601603-182 = "[ns13]「美禰同學……！？」\n[ns14]「你的表情好有壓迫感！！」"
1601603-185 = "那個……"
1601603-187 = "……那種事情，下次請早點告訴我。"

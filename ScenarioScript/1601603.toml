[translation]
1601603-1 = "No Need to Explain..."
1601603-2 = "I was downtown, buying some items that we needed at Schale."
1601603-8 = "Sensei. How unexpected."
1601603-12 = "[ns1] \"...Huh? This voice is...\"\n[ns2] \"...Mine?\""
1601603-18 = "Did your work for Schale bring you here? What a pleasant coincidence."
1601603-19 = "Remedial Knights business has also compelled me here. If it pleases you, let us proceed together, until it is time for us to part ways."
1601603-23 = "Sensei? Is something wrong? Your expression..."
1601603-24 = "...Ah, my costume?"
1601603-29 = "I understand now. My apologies. My explanation was insufficient."
1601603-30 = "I am here on Remedial Knights duty, but for a tribute concert of sorts. My logic was that this costume would be better suited for such conditions."
1601603-31 = "Does that clear any misunderstandings?"
1601603-32 = "[s3] \"Ah, I see. You always have a lot on your plate.\"\n[s4] \"You're working hard, I see.\""
1601603-35 = "Heehee. These are simply my duties."
1601603-39 = "Now that your curiosity has been fulfilled... Shall we?"
1601603-46 = "...A few days later."
1601603-52 = "I was at a high-end restaurant for a work meeting."
1601603-58 = "...Hm? Sensei?"
1601603-64 = "Another unexpected coincidence. This happened just a few days prior."
1601603-65 = "Although, a coincidence which leads me to seeing you, Sensei, is certainly a good thing. Heehee."
1601603-66 = "[s5] \"Are you here for a concert?\"\n[s6] \"You're in your idol costume again.\""
1601603-69 = "Hm?"
1601603-70 = "No, no concert this time. I simply received a recommendation that the food here was delicious."
1601603-71 = "This costume just..."
1601603-76 = "..."
1601603-77 = "...h-happened to be the most appropriate outfit for the occasion... Yes..."
1601603-78 = "This is fine dining, after all. One should adapt to the situation. That sounds like a valid excuse."
1601603-79 = "[s7] \"(...For the occasion?)\"\n[s8] \"(What was with the pause earlier...?)\""
1601603-82 = "W-Well. I'm certain you naturally have a very busy schedule, so I shall be on my way."
1601603-83 = "Please excuse me. Let us meet again...!"
1601603-89 = "Mine and I continued to run into each other after that."
1601603-100 = "Every time I ran into her, she was still wearing her idol costume, and she gave increasingly strange excuses every time."
1601603-106 = "And then, the next day..."
1601603-112 = "I was working overtime, late into the night, so I went to visit a convenience store to wake myself up."
1601603-121 = "...Sensei? You are out rather late."
1601603-122 = "O-Overtime? I see. You are fulfilling your duty with diligence."
1601603-123 = "I cannot speak for everyone, but I'm certain everyone is grateful for all of your hard work."
1601603-124 = "And..."
1601603-129 = "...Ah..."
1601603-130 = "...Um... Sensei."
1601603-131 = "This is... I mean, this costume is..."
1601603-132 = "[s9] \"Mine, hold on a second.\"\n[s10] \"You don't have to make up an excuse for wearing it.\""
1601603-137 = "Th-That is not quite...! This is...um..."
1601603-138 = "Um! How shall I say this..."
1601603-142 = "Ah! Yes. This is simply casual wear. Today I stand before you not as captain of the Remedial Knights, but rather as a normal citizen. Therefore, I am dressed as a normal citizen would be."
1601603-143 = "Wait. Please hold. Do people don such attire as \"casual wear\"?"
1601603-144 = "How shall I approach this? How does one present themselves naturally in such a situation?"
1601603-145 = "D-Did I just say that out loud?"
1601603-150 = "Hm? What did you say, Sensei?"
1601603-151 = "...Excuse me? It's...okay? Wh-What could you mean...?"
1601603-152 = "[s11] \"I know you like cute things.\"\n[s12] \"I think it's good you're expressing yourself.\""
1601603-155 = "Yes. Um. Naturally. In that case, it's a relief..."
1601603-156 = "to...hear..."
1601603-161 = "...Sensei?"
1601603-162 = "Halt. Sensei. Those words...you just uttered...their meaning..."
1601603-169 = "...Ah. Yes."
1601603-170 = "You've known from the beginning. The very beginning."
1601603-171 = "I see..."
1601603-176 = "...Sensei."
1601603-182 = "[ns13] \"...?! Mine...?!\"\n[ns14] \"An intimidating stare!\""
1601603-185 = "Those..."
1601603-187 = "Those kinds of things...you should express immediately."

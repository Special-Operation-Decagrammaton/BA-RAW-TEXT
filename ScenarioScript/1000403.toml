[translation]
1000403-1 = "Reason to be Proud"
1000403-2 = "Gehenna Outskirts, Slums"
1000403-3 = "Hello, Sensei."
1000403-4 = "[s] \"Why here?\""
1000403-5 = "Because students are barred from here due to the recent prefect operation."
1000403-6 = "It had always been dangerous, but the operation should keep people completely clear for at least a few days."
1000403-7 = "Meaning I won't be spotted..."
1000403-8 = "...and we can meet here without concern."
1000403-9 = "[s] \"Aren't you too concerned with what other people think?\""
1000403-10 = "..."
1000403-11 = "They don't leave me any other choice. Besides, this is to your benefit."
1000403-12 = "I'm sure you're aware I have my share of enemies—both in and outside of school."
1000403-13 = "It's safer to assume that I'm always being watched."
1000403-14 = "You could be in grave danger...if you were spotted with me."
1000403-15 = "[s1] \"Why not just meet online, then?\"\n[s2] \"You could have sent an email or text.\""
1000403-18 = "..."
1000403-19 = "I-I suppose, but..."
1000403-20 = "I mean... "
1000403-21 = "..."
1000403-22 = "[s] \"Some things are better done in person.\""
1000403-23 = "...Oh, no..."
1000403-24 = "...I hope you're not patronizing me."
1000403-25 = "But, yes, you're right! Some things need to be done face-to-face."
1000403-26 = "Such as this!"
1000403-27 = "There's nothing wrong with us meeting in person to get business done!"
1000403-28 = "[s3] \"But if we WERE seen together late at night...\"\n[s4] \"Wouldn't it be problematic if we were seen together?\""
1000403-29 = "I...guess so? I'm not sure I understand what you're getting at..."
1000403-30 = "I...guess so? I'm not sure I understand what you're getting at..."
1000403-31 = "Late at night..."
1000403-32 = "Potentially a problem..."
1000403-33 = "In...other words..."
1000403-35 = "...?!"
1000403-36 = "She finally got what I was hinting at."
1000403-37 = "Wh-What are you suggesting? You and me, Sensei...?!"
1000403-38 = "Do you think I have no shame?!"
1000403-39 = "I would be happy to take care of a misunderstanding if that were the case..."
1000403-40 = "... "
1000403-41 = "But you have made your point. People do love to gossip like that."
1000403-42 = "Meeting with you at night is dangerous in and of itself."
1000403-43 = "Perhaps it would be better for us to meet during the day..."
1000403-44 = "...but those are always my busiest hours. Hmm."
1000403-45 = "..."
1000403-46 = "Then when would be a good time for us to meet, Sensei?"
1000403-48 = "Hina remained troubled and deep in thought."

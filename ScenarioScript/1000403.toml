[translation]
1000403-1 = "เหตุผลที่มีน้ำหนัก"
1000403-2 = "ย่านแออัด ชานเมืองเกเฮนน่า"
1000403-3 = "ว่าไงคุณครู"
1000403-4 = "[s] \"ที่นี่คือ...\""
1000403-5 = "3;히나;อ่อ พวกนักเรียนไม่ได้รับอนุญาตให้เข้ามาที่นี่เพราะปฏิบัติการของคณะกรรมการวินัยน่ะ"
1000403-6 = "ที่นี่เคยเป็นพื้นที่อันตราย แต่หลังจากปฏิบัติการครั้งล่าสุดก็น่าจะปลอดภัยไปสักสองสามวัน"
1000403-7 = "ฉันคิดว่าคงไม่มีใครจำฉันได้หรอก"
1000403-8 = "เพราะงั้นเรามาเจอกันที่นี่ได้\n"
1000403-9 = "[s] \"ฮินะกังวลเรื่องคนอื่นมากไปหรือเปล่า?\""
1000403-10 = "......"
1000403-11 = "ช่วยไม่ได้นี่นา ฉันทำแบบนี้ก็เพื่อคุณครูนะ"
1000403-12 = "คุณครูก็คงรู้ดีว่าฉันมีศัตรูอยู่เยอะ ทั้งในและนอกโรงเรียน"
1000403-13 = "พอคิดว่าถูกจับตาอยู่ตลอดแบบนี้มันก็จะปลอดภัยกว่ากัน"
1000403-14 = "ถ้าคนอื่นรู้เข้าว่าฉันออกมาเจอคุณครูละก็... คุณครูจะต้องตกอยู่ในอันตรายมากแน่ๆ"
1000403-15 = "[s1] \"ถ้างั้นวิดีโอคอลออนไลน์แทนก็ได้นี่นา?\"\n[s2] \"ส่งอีเมลหรือคุยแชทกันทุกวันก็ได้นี่นา\""
1000403-18 = "......"
1000403-19 = "ที่พูดมามันก็ถูกแต่ว่า…"
1000403-20 = "คือว่า..."
1000403-21 = "....."
1000403-22 = "[s] \"แต่บางครั้งมาเจอหน้ากันก็คุยกันได้สะดวกกว่านะ\""
1000403-23 = "......."
1000403-24 = "รู้สึกเหมือนคุณครูกำลังล้อฉันเล่นเลย"
1000403-25 = "ฉันไม่ได้พูดเล่นนะ! งานบางประเภทก็ควรจะต้องมาเจอหน้ากัน"
1000403-26 = "เรื่องนี้ก็เหมือนกัน!"
1000403-27 = "เราแค่มาเจอกันเพื่อทำงานให้เสร็จก็เท่านั้นเอง! มันไม่มีอะไรผิดปกติสักหน่อย!"
1000403-28 = "[s3] \"แต่ถ้ามีคนเห็นเราอยู่ด้วยกันตอนดึกแบบนี้...\" \n[s4] \"แล้วแบบนี้จะไม่เกิดเรื่องยุ่งยากกว่าเหรอ\""
1000403-29 = "...? งั้นเหรอ? ไม่เห็นเข้าใจเลย..."
1000403-30 = "...? งั้นเหรอ? ไม่เห็นเข้าใจเลย..."
1000403-31 = "กลางดึกแบบนี้..."
1000403-32 = "เรื่องยุ่งยาก... หลายๆ เรื่อง... งั้นเหรอ..."
1000403-33 = "อืม... งั้นเหรอ"
1000403-35 = "......?!\n\n"
1000403-36 = "(หลังจากคิดอยู่สักพัก ฮินะก็ได้ข้อสรุปบางอย่าง)"
1000403-37 = "คะ คะ คะ... คุณครูพูดเรื่องอะไรเนี่ย! ฉันกับคุณครูงั้นเหรอ...?!"
1000403-38 = "ฉันไม่มีทางทำเรื่องน่าอายแบบนั้นเด็ดขาด!"
1000403-39 = "ถ้ามีใครเข้าใจผิดแบบนั้นไปละก็ฉันจะจัดการ..."
1000403-40 = "......."
1000403-41 = "ที่คุณครูพูดมาก็ถูกแล้วล่ะ เพราะพวกคนที่ชอบข่าวลือมีอยู่ทั่วทุกที่"
1000403-42 = "พอมาคิดดูแล้วการนัดคุณครูออกมาเจอในตอนกลางคืนก็อันตรายจริงๆ ด้วย"
1000403-43 = "บางทีการนัดเจอกันตอนกลางวันน่าจะปลอดภัยมากกว่า"
1000403-44 = "แต่ตอนกลางวัน... ฉันมีงานอื่นที่ต้องจัดการเยอะไปหมด..."
1000403-45 = "......"
1000403-46 = "ถ้างั้นแล้วฉันจะไปเจอคุณครูตอนไหนดีล่ะ?"
1000403-48 = "(ฮินะครุ่นคิดอย่างหนัก)"

[translation]
1000403-1 = "堂堂正正的理由"
1000403-2 = "格黑娜外圍．貧民區"
1000403-3 = "嗨，老師。"
1000403-4 = "[s] 「這裡是……」"
1000403-5 = "啊啊，這附近是，之前受風紀活動的影響，學生們的進出受到限制的區域。"
1000403-6 = "本來是個危險的地方，不過已經從頭到尾清掃過一次了，所以暫時應該是安全的。"
1000403-7 = "看起來也沒有人注意到我。"
1000403-8 = "所以，可以放心和老師見面。"
1000403-9 = "[s] 「不用那麼在意周圍的人吧？」"
1000403-10 = "……"
1000403-11 = "沒辦法，這是為了老師。"
1000403-12 = "如你所知，我有很多敵人。學園內外都有。"
1000403-13 = "說是隨時隨地都會被盯上也不為過。"
1000403-14 = "所以這樣的我，如果被知道特別去見某個人的話……那個人可能會遭遇危險。"
1000403-15 = "[s1] 「那麼不直接見面，改在線上見面如何？」\n[s2] 「用郵件和訊息也能工作唷。」"
1000403-18 = "……"
1000403-19 = "……是那樣沒錯，但是……"
1000403-20 = "那個……"
1000403-21 = "……"
1000403-22 = "[s] 「……但是，也有必須面對面做的工作呢。」"
1000403-23 = "……"
1000403-24 = "……總覺得，好像被耍著玩。"
1000403-25 = "說的沒錯，有些工作要直接見面才能做。"
1000403-26 = "也就是說，這也包含在內……！"
1000403-27 = "說到底只是為了工作才見面的！沒有犯任何罪！"
1000403-28 = "[s3] 「但是，如果被看見兩人在深夜獨處的話……」\n[s4] 「……難道是，被各種遐想會感到困擾？」"
1000403-29 = "……？是嗎？我不太能理解……"
1000403-30 = "……？是嗎？我不太能理解……"
1000403-31 = "……就只是兩個人像這樣在深夜碰面而已。"
1000403-32 = "就這樣，遐想各種……各……各種……"
1000403-33 = "那個……那是指，那個……"
1000403-35 = "……！？"
1000403-36 = "（似乎得出了某種結論）"
1000403-37 = "說，說，說什麼呢！？我，我和老師……！？ "
1000403-38 = "我，我怎麼可能做出那種不知羞恥的事！"
1000403-39 = "馬上把那些誤解的傢伙們……"
1000403-40 = "……"
1000403-41 = "到處都有喜歡這種八卦的傢伙，沒辦法。"
1000403-42 = "……但仔細想想，深夜跟老師見面可能是件很危險的事。"
1000403-43 = "不如在白天堂堂正正的見面，可能更安全。"
1000403-44 = "但是白天……工作堆積如山……"
1000403-45 = "……"
1000403-46 = "我要，什麼時候和老師見面才好？"
1000403-48 = "（陽奈陷入了沉思）"

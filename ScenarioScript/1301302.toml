[translation]
1301302-1 = "The Legendary Fanzine Hunt"
1301302-2 = "Inside the Library"
1301302-4 = "I'm looking for the fanzine of legends!"
1301302-5 = "[s1] \"Such bountiful energy...!\"\n[s2] \"Wait, wait. I need some background first.\""
1301302-8 = "Oh, I'm sorry Sensei! I guess I got too excited..."
1301302-9 = "It's said that somewhere in Red Winter Academy, there's a fanzine that was put together by the previous Knowledge Liberation Front."
1301302-10 = "Doesn't the thought of a legendary fanzine make your heart just race?!"
1301302-11 = "It could contain information on our previous history, culture, and so much more!"
1301302-12 = "Ahem! The point is, it could help solve all the problems that the Knowledge Liberation Front is suffering through at this very moment!"
1301302-13 = "[s] \"You really think so...?\""
1301302-19 = "Yes! So let's go look for it, Sensei!"
1301302-20 = "...Hm? Paper is pretty easily damaged? You're right! That means the longer we wait, the more moisture it's absorbing! It's being damaged as we speak!"
1301302-21 = "Do I have any clues? Don't worry about the little details! I've come prepared!"
1301302-36 = "[ns] \"Um, Momiji? What is...that?\""
1301302-41 = "What's wrong, Sensei?"
1301302-42 = "This is how we're going to look for the legendary fanzine! Isn't it obvious?"
1301302-43 = "...Is something wrong?"
1301302-44 = "[s] \"I'm just not sure...if this is the best way to go about it...\""
1301302-45 = "What are you talking about, Sensei?"
1301302-46 = "The dowsing rod has such rich culture and history."
1301302-47 = "Normally they're used to look for veins of water..."
1301302-48 = "But utilizing the basic principles of dowsing, we should be able to find what's lost!"
1301302-49 = "Shh. Look. The copper rods...are already turning."
1301302-53 = "If we go in the direction that makes it turn faster..."
1301302-57 = "Spin, spin, spin..."
1301302-61 = "Here! I'm sure of it!"
1301302-62 = "I'll use my weapon and blow the whole place up!"
1301302-63 = "[ns] \"You'll end up destroying the fanzine you're looking for!\""
1301302-68 = "Oh, really? Th-Then what do we do?"
1301302-69 = "Digging...? But most of the earth under Red Winter is frozen solid, so it won't be easy."
1301302-70 = "But I guess that's better than blowing up the legendary fanzine..."
1301302-77 = "We've been digging for a whole meter! We haven't found even a single scrap of paper... Ugh..."
1301302-78 = "I wonder why? Was something wrong with my dowsing skills?"
1301302-79 = "[s] \"I don't think it has anything to do with your dowsing skills, per se...\""
1301302-80 = "You're right! Of course it doesn't! We just need to use a different method."
1301302-84 = "How about...a pendulum!"
1301302-85 = "Right now, it's barely moving..."
1301302-86 = "But it'll start rotating in wider and wider circles as we near our desired object."
1301302-88 = "Okay, never mind! Next, we'll use a magnetic field sensor!"
1301302-89 = "We can download a free app and make use of the phone's internal magnetic sensor!"
1301302-91 = "A vein detector!"
1301302-93 = "Tarot cards...!"
1301302-95 = "Astrology..."
1301302-97 = "Weeeeeh..."
1301302-98 = "[s] \"M-Momiji? Don't cry...\""
1301302-99 = "But...but I can't find the fanzine no matter what tool I use..."
1301302-100 = "[s] \"Is it that important?\""
1301302-101 = "..."
1301302-102 = "T-To me it is..."
1301302-103 = "It might not seem like a big deal to other people, and if we ever find it, it might even seem silly and stupid to Sensei..."
1301302-104 = "But that fanzine is a part of the Knowledge Liberation Front's history nonetheless..."
1301302-105 = "I'm sure I'd be able to see comics, artwork, and other data that I haven't been able to see before."
1301302-109 = "That's why I can't give up."
1301302-110 = "I know it's silly, so I'm sorry for involving you, Sensei."
1301302-111 = "I can just...look for it on my own. You can go back now..."
1301302-112 = "I'm sorry again... It was just a silly dream."
1301302-113 = "Thank you for today, Sensei. Please take care."
1301302-114 = "[s] \"Where are we looking next?\""
1301302-115 = "H-Huh? You don't have any reason to care about this fanzine..."
1301302-116 = "But you're still gonna help me look for it?"
1301302-117 = "..."
1301302-118 = "From the bottom of my heart, thank you, Sensei! And I'm really sorry again..."
1301302-122 = "...Normally after having such a touching moment, people tend to find what they're looking for..."
1301302-123 = "At least in manga they do..."
1301302-124 = "Ugh... I guess reality can't be that easy..."
1301302-125 = "[s3] \"Maybe the fanzine was inside us all along.\"\n[s4] \"Maybe it's the fanzine we have inside our hearts.\""
1301302-128 = "That line was straight out of some cheesy Saturday morning cartoon..."
1301302-132 = "Wait, Sensei. Inside... Inside..."
1301302-136 = "Sensei, could it be...?!"
1301302-137 = "[s] \"What is it, Momiji?\""
1301302-138 = "To the library! Immediately!"
1301302-140 = "The deepest part of the library is being used as storage these days."
1301302-141 = "It might just be the one place no one's thought to check!"
1301302-142 = "...!"
1301302-146 = "I found it, Sensei! The Knowledge Liberation Front's legendary fanzine!"
1301302-147 = "[s5] \"I can't believe it was stored here! Congratulations, Momiji!\"\n[s6] \"It's always in the last place you look!\""
1301302-150 = "You're right. Heeheehee. I'm so happy. This is all thanks to you."
1301302-151 = "What? You just said the first thing that came to mind?"
1301302-152 = "Well, it was still super helpful! Your words are what inspired me to come look in the storage!"
1301302-153 = "On top of that, you spent all day helping me look for it."
1301302-154 = "Okay! Let's see what's in it..."
1301302-160 = "..."
1301302-161 = "Heehee. Why is my heart beating so fast?"
1301302-162 = "This was undoubtedly made by our predecessors. It's filled with their works: some a little clumsy, some inspiring!"
1301302-163 = "But it screams with their feelings, the effort and desperation that they poured into making it!"
1301302-164 = "It's like the collective early works found in Komisen..."
1301302-165 = "What? Am I disappointed?"
1301302-166 = "Of course not. How could I be disappointed in finding more history of the Knowledge Liberation Front?"
1301302-167 = "Now, this doesn't hold all of the answers to our problems, or any great revelation."
1301302-168 = "But it gives me something more important. Seeing that our older seniors from long ago made this, with the feelings we still carry today. It gives me the courage to keep moving forward."
1301302-173 = "Heeheehee. Sensei?"
1301302-179 = "I'm so happy that you're here with me!"

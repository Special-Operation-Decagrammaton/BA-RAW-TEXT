[translation]
1301302-1 = "การเดินทางค้นหาหนังสือ"
1301302-2 = "ภายในห้องสมุดเก่า"
1301302-4 = "ไปหาโดจินชิในตำนานกันเถอะค่ะ!"
1301302-5 = "[s1] \"มีไฟสุดๆ ไปเลย...!\"\n[s2] \"ระ...รอเดี๋ยว ช่วยอธิบายให้ครูฟังหน่อยสิ\""
1301302-8 = "อ่า... ขะ...ขอโทษค่ะ คุณครู! ฉันตื่นเต้นมากไปหน่อย..."
1301302-9 = "คือว่า... ฉันได้ยินข่าวลือมาว่ามีโดจินชิในตำนานที่พวกรุ่นพี่ชมรมแนวร่วมปลดปล่อยความรู้เคยทำขึ้น#nซ่อนอยู่ในวิทยาเขตสหภาพเรดวินเทอร์น่ะค่ะ"
1301302-10 = "โดจินชิในตำนานของชมรมแนวร่วมปลดปล่อยความรู้... มันน่าตื่นเต้นมากเลยไม่ใช่เหรอคะ?!"
1301302-11 = "และแน่นอนว่าในนั้นมันจะต้องมีประวัติศาสตร์ เรื่องเก่าแก่ทั้งหมดของชมรม แล้วก็..."
1301302-12 = "ยังไงก็เถอะค่ะ! ในโดจินชิเล่มนั้นอาจมีเบาะแสยิ่งใหญ่ที่จะช่วยคลี่คลายปัญหาทุกอย่างที่เกิดขึ้นกับ#nชมรมแนวร่วมปลดปล่อยความรู้ซ่อนอยู่ก็ได้นะคะ!"
1301302-13 = "[s] \"ขนาดนั้นเลย...?\""
1301302-19 = "เอาละ รีบไปตามหาโดจินชิในตำนานกันเถอะค่ะ คุณครู!"
1301302-20 = "หนังสือเป็นสิ่งที่เปราะบางแล้วก็เสียหายง่ายมากเลยนะคะ แม้แต่ในตอนที่พวกเรายืนคุยกันอยู่แบบนี้ มันก็อาจจะโดนความชื้นกัดกินเสียหายจนแก้ไขไม่ได้เลยนะคะ!"
1301302-21 = "แล้วจะหาโดจินชิเจอได้ยังไงน่ะเหรอคะ? เรื่องนั้นไม่ต้องห่วงนะคะ ฉันหาวิธีเตรียมไว้แล้วค่ะ!"
1301302-36 = "[ns] \"คือว่าโมมิจิ...? นี่มัน...?\""
1301302-41 = "ทำไมเหรอคะ คุณครู?"
1301302-42 = "ฉันตามหาโดจินชิอยู่ไม่ใช่รึไง...งั้นเหรอคะ? ค่ะ ใช่แล้วค่ะ เพราะงั้นก็เลยจะใช้วิธีนี้ไงล่ะคะ"
1301302-43 = "...มีอะไรงั้นเหรอคะ?"
1301302-44 = "[s] \"วิธีนี้มัน...อาจไม่เหมาะเท่าไรนะ\""
1301302-45 = "หมายความว่ายังไงเหรอคะ คุณครู"
1301302-46 = "'ไม้ดาวน์ซิ่ง' น่ะเปี่ยมไปด้วยประสบการณ์และประเพณีที่ยาวนานนะคะ"
1301302-47 = "ถึงแต่เดิมจะใช้เป็นอุปกรณ์สำหรับค้นหาแหล่งน้ำ หรือตาน้ำก็ตาม..."
1301302-48 = "แต่ถ้าเอาหลักการของดาวน์ซิ่งมาใช้ให้ดีๆ ละก็ มันจะเอามาค้นหาสิ่งของที่หายไปได้ค่ะ!"
1301302-49 = "ชู่ว ดูสิคะ แท่งทองแดงมันเริ่มหมุนอย่างช้าๆ แล้วค่ะ"
1301302-53 = "ถ้าเดินไปถึงบริเวณที่แท่งทองแดงหมุนเร็วๆ ละก็..."
1301302-57 = "หมุนๆ หมุนๆ..."
1301302-61 = "ตรงนี้ค่ะ! ต้องใช่ตรงนี้แน่ๆ ค่ะ"
1301302-62 = "ถ้าใช้ปืน RPG ของฉันระเบิดที่นี่ละก็...!"
1301302-63 = "[ns] \"ทำแบบนั้นเดี๋ยวโดจินชิก็กลายเป็นปุ๋ยไปหรอก!\""
1301302-68 = "เอ๋? งะ...งั้นเหรอคะ...? ถ้างั้นจะทำยังไงดี...?"
1301302-69 = "ก่อนอื่นก็ให้ใจเย็นๆ แล้วค่อยๆ ขุดดินดูงั้นเหรอคะ? แต่ว่าดินของสหภาพเรดวินเทอร์ส่วนใหญ่มันแข็ง#nมากๆ จนใช้พลั่วขุดไม่ได้เลย..."
1301302-70 = "เข้าใจแล้วค่ะ ถ้าคุณครูพูดถึงขนาดนั้นละก็..."
1301302-77 = "ฮือออ... อุตส่าห์ตั้งใจขุดจนลึกกว่าหนึ่งเมตรแล้วแท้ๆ แต่ก็ยังไม่เจออะไรเลยค่ะ..."
1301302-78 = "ทำไมกันนะคะ? หรือว่าความสามารถในการใช้ดาวน์ซิ่งของฉันยังดีไม่พอคะ...?"
1301302-79 = "[s] \"ครูว่าไม่เกี่ยวกับความสามารถในการใช้ดาวน์ซิ่งหรอก...\""
1301302-80 = "งั้นเหรอคะ? ถ้างั้นคราวนี้ ฉันจะลองเปลี่ยนเป็นวิธีอื่นดูค่ะ"
1301302-84 = "นั่นก็คือ... เพนดูลัมค่ะ!"
1301302-85 = "ลูกตุ้มเริ่มแกว่งไปมาเล็กน้อยแล้ว..."
1301302-86 = "และถ้าในบริเวณใกล้ๆ มีสิ่งของที่หาอยู่ละก็ ลูกตุ้มก็จะแกว่งวนไปมาเป็นวงกลมเลยละค่ะ!"
1301302-88 = "ต่อไป! คราวนี้ฉันจะลองใช้ตัวตรวจจับสนามแม่เหล็กดูค่ะ!"
1301302-89 = "ดาวน์โหลดแอปฟรีมาติดตั้ง แล้วก็เอาเซ็นเซอร์ในโทรศัพท์มือถือมาประยุกต์ใช้...!"
1301302-91 = "ไหนลองเครื่องตรวจจับสายแร่ดูซิ...!"
1301302-93 = "ต่อไปก็ลองไพ่ทาโร่…!"
1301302-95 = "ละ...ลองใช้ศิลปะการดูดาว..."
1301302-97 = "มุแงงงงงง...."
1301302-98 = "[s] \"มะ...โมมิจิ? ไม่ต้องร้องนะ...\""
1301302-99 = "แต่ว่า... แต่ว่า... ไม่ว่าจะใช้วิธีไหน ก็หาโดจินชิไม่เจอเลยค่ะ..."
1301302-100 = "[s] \"มันสำคัญขนาดนั้นเลยเหรอ?\""
1301302-101 = "......"
1301302-102 = "ที่จริง... มันอาจไม่สำคัญอะไรเลยก็ได้ค่ะ"
1301302-103 = "มันอาจไม่ได้เป็นของสำคัญสำหรับคนอื่นๆ ก็ได้ค่ะ และบางทีมันก็อาจจะเป็นของที่น่าอายเกินกว่า#nที่จะเอามาให้คุณครูดูก็ได้ค่ะ..."
1301302-104 = "แต่ว่าโดจินชิเล่มนั้น... มันก็เหมือนเป็นส่วนหนึ่งของประวัติศาสตร์ชมรมแนวร่วมปลดปล่อยความรู้#nของเราน่ะค่ะ..."
1301302-105 = "ในนั้นอาจมีภาพการ์ตูน ภาพวาด หรือข้อมูลต่างๆ ที่ฉันยังไม่เคยเห็นอยู่ก็ได้ค่ะ"
1301302-109 = "เพราะงั้นฉันจะไม่ยอมแพ้หรอกค่ะ"
1301302-110 = "แต่ว่าฉันรู้สึกผิดจริงๆ นะคะ... ที่ทำให้คุณครูมาลำบากแบบนี้น่ะค่ะ"
1301302-111 = "ถ้างั้น คุณครูคะ... ฉันไม่เป็นไรแล้วค่ะ คุณครูกลับไปก่อนก็ได้นะคะ"
1301302-112 = "คุณครูใส่ใจและทำเพื่อฉันขนาดนี้... จนฉันรู้สึกละอายใจเลยค่ะ"
1301302-113 = "วันนี้ขอบคุณนะคะ คุณครู ตอนกลับระวังด้วยนะคะ"
1301302-114 = "[s] \"เอาละ จะไปหาที่ไหนกันต่อดี?\""
1301302-115 = "คะ..คะ? คือว่า...คุณครูไม่ต้องสนใจเรื่องโดจินชิเล่มนี้ก็ได้..."
1301302-116 = "แต่ว่าจะช่วยหา... ไปจนถึงที่สุดงั้นเหรอคะ?"
1301302-117 = "......"
1301302-118 = "ขะ...ขอบคุณนะคะคุณครู ขอบคุณจริงๆ ค่ะ! แล้วก็... ขอโทษอีกครั้งนะคะ..."
1301302-122 = "...ปกติซีนซึ้งๆ แบบนี้ มันควรเป็นซีนตอนที่ทำตามเป้าหมายได้สำเร็จแท้ๆ..."
1301302-123 = "หมายถึงถ้าเป็นในพวกการ์ตูนน่ะค่ะ..."
1301302-124 = "ฮือออ... โลกความเป็นจริงมันไม่ง่ายเลยนะคะ..."
1301302-125 = "[s3] \"บางทีโดจินชินั่นอาจเป็นสิ่งที่มองไม่เห็น แต่อยู่ในใจก็ได้\"\n[s4] \"มันอาจเป็นสิ่งที่อยู่ในจิตใจของพวกเราทุกคนก็ได้นะ...\""
1301302-128 = "นั่นมันบทพูดจากตอนสุดท้ายของการ์ตูนที่กำลังดังอยู่นี่คะ..."
1301302-132 = "เดี๋ยวก่อนนะคะ คุณครู ในจิตใจ... ในจิตใจ..."
1301302-136 = "คุณครูคะ หรือว่า...!"
1301302-137 = "[s] \"มีอะไรเหรอ โมมิจิ?\""
1301302-138 = "รีบไปที่ห้องสมุดของพวกเรากันเถอะค่ะ!"
1301302-140 = "ห้องที่อยู่ด้านในสุดของห้องสมุดที่ใช้เป็นห้องเก็บของในตอนนี้..."
1301302-141 = "สถานที่ที่ไม่มีใครเข้าไป... ถ้าเป็นที่นี่ละก็...?!"
1301302-142 = ".....!"
1301302-146 = "เจอแล้วค่ะคุณครู! โดจินชิของชมรมแนวร่วมปลดปล่อยความรู้ค่ะ!"
1301302-147 = "[s5] \"อยู่ที่แบบนี้เองเหรอเนี่ย...! ยินดีด้วยนะโมมิจิ!\"\n[s6] \"เหมือนคำที่ว่ายิ่งใกล้ยิ่งมองไม่เห็นจริงๆ ดีใจด้วยนะ โมมิจิ!\""
1301302-150 = "ค่ะ ฮิฮิฮิ ดีใจจังเลยค่ะ ทั้งหมดนี่เป็นเพราะคุณครูเลยนะคะ"
1301302-151 = "คะ? คุณครูแค่พูดไปเรื่อยเองงั้นเหรอคะ?"
1301302-152 = "ไม่หรอกค่ะ ฉันนึกถึงที่นี่ได้ก็เพราะคำพูดของคุณครูเลยค่ะ"
1301302-153 = "นอกจากนี้... วันนี้คุณครูก็คอยช่วยฉันตามหาโดจินชิทั้งวันเลยด้วยนี่คะ"
1301302-154 = "อ๊ะ เนื้อเรื่องของโดจินชิสินะคะ ถ้างั้นไหนดูซิ..."
1301302-160 = "......"
1301302-161 = "ฮิฮิ... จู่ๆ ก็รู้สึกตื่นเต้นยังไงก็ไม่รู้ค่ะ"
1301302-162 = "ภาพร่างหยาบๆ ลายเส้นดูฟุ้งๆ ยุ่งเหยิง..."
1301302-163 = "แต่ถึงอย่างนั้นก็ถ่ายทอดความรู้สึก 'อยากทำ' อันแน่วแน่ได้อย่างชัดเจน..."
1301302-164 = "มันเหมือนกับหนังสือรวมผลงานรุ่นแรกๆ ของโคมิเซ็นเลยค่ะ..."
1301302-165 = "คะ? ฉันผิดหวังหรือเปล่างั้นเหรอคะ?"
1301302-166 = "ไม่เลยค่ะ เพราะยังไงสิ่งนี้ก็เหมือนเป็นหน้าประวัติศาสตร์และบันทึกของชมรมของเราค่ะ"
1301302-167 = "แน่นอนว่าโดจินชิพวกนี้อาจช่วยแก้ปัญหาที่ชมรมเรากำลังเผชิญอยู่ไม่ได้ก็จริง แต่ว่า..."
1301302-168 = "จะว่ายังไงดีนะ พอคิดว่าเมื่อนานมาแล้วรุ่นพี่ของพวกเราทำหนังสือเล่มนี้ขึ้นมาด้วยความรู้สึกเดียวกัน#nมันเลยรู้สึกเหมือนมีแรงฮึดขึ้นมาน่ะค่ะ "
1301302-173 = "ฮิฮิฮิ... คุณครูคะ?"
1301302-179 = "ฉันน่ะ... ดีใจมากๆ เลยที่มีคุณครูอยู่ด้วยนะคะ!"

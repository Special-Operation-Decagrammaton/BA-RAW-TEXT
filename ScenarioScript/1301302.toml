[translation]
1301302-1 = "尋書之旅"
1301302-2 = "圖書館內部"
1301302-4 = "必須找出傳說中的同人誌！"
1301302-5 = "[s1]「好強的魄力……！」\n[s2]「等，等等，可以先說明一下嗎？」"
1301302-8 = "啊，不，不好意思，老師！#n我太心急了，不小心就……"
1301302-9 = "是這樣的……根據我收到的情報，#n赤冬聯邦學園的某處，似乎沉睡著過去的知識解放戰線製作的傳說中的同人誌。"
1301302-10 = "知識解放戰線的傳說同人誌，不覺得一聽就很興奮嗎！？"
1301302-11 = "其中一定寫著知識解放戰線的所有歷史和傳統，或者是……"
1301302-12 = "總之！說不定裡面會有能解決知識解放戰線面臨的所有問題的重大線索！"
1301302-13 = "[s]「有那麼誇張嗎……？」"
1301302-19 = "來吧，老師！#n一起去找傳說中的同人誌吧！"
1301302-20 = "書本是非常纖細的！在我們浪費時間的時候，同人誌也可能會因為潮濕而受損！"
1301302-21 = "要怎麼找出來是嗎？#n請包在我身上！方法已經準備好了！"
1301302-36 = "[ns]「那個，紅葉……？這個是……？」"
1301302-41 = "怎麼了嗎，老師？"
1301302-42 = "不是要找同人誌？#n沒錯，所以我才會用這個方法。"
1301302-43 = "哪裡出錯了嗎？"
1301302-44 = "[s]「這方法……好像不太對。」"
1301302-45 = "為什麼呢？老師。"
1301302-46 = "「探測棒」蘊含著悠久的傳統和經驗。"
1301302-47 = "雖然原本是用來尋找水脈的工具……"
1301302-48 = "不過只要善用探測棒的原理，也是能找到遺失物品的！"
1301302-49 = "噓，請看。#n現在銅棒……慢慢開始轉動了。"
1301302-53 = "走到旋轉速度加快的地方……"
1301302-57 = "轉啊轉，轉啊轉……"
1301302-61 = "這裡！一定是這裡沒錯。"
1301302-62 = "接下來只要用我的RPG把這裡炸開……！"
1301302-63 = "[ns]「那樣連同人誌都會一起粉碎的！」"
1301302-68 = "哦？說，說的也是……？#n那怎麼辦……？"
1301302-69 = "先冷靜下來慢慢把地面挖開？#n可是赤冬的冰原相當堅硬，用鏟子可能有點……"
1301302-70 = "我知道了。#n既然老師都這麼說了……"
1301302-77 = "唔唔……都已經挖超過1m了，卻什麼都沒發現……"
1301302-78 = "怎麼會……是因為我的探測實力不足嗎……？"
1301302-79 = "[s]「我覺得這應該和探測實力無關……」"
1301302-80 = "是嗎……？#n既然如此，只能嘗試其他辦法了。"
1301302-84 = "那就是……擺錘！"
1301302-85 = "現在雖然只是微微地擺動著……"
1301302-86 = "但是當靠近想找的物品時，擺錘就會大幅畫圓擺動！"
1301302-88 = "接著用磁場感應器來找吧！"
1301302-89 = "下載App之後，運用手機內建的磁感應器……！"
1301302-91 = "地脈探測器！"
1301302-93 = "塔羅牌……！"
1301302-95 = "占星術……"
1301302-97 = "嗚啊啊啊啊……"
1301302-98 = "[s]「紅，紅葉？別哭……」"
1301302-99 = "可是……可是不管怎麼做都找不到傳說的同人誌……"
1301302-100 = "[s]「是那麼重要的東西嗎？」"
1301302-101 = "……"
1301302-102 = "其實……可能並沒有那麼重要。"
1301302-103 = "也許找到之後會發現沒什麼大不了的，#n也可能是老師這麼辛苦幫忙，卻不好意思給老師看的東西……"
1301302-104 = "但是那本同人誌在某種意義上就等於是知識解放戰線的歷史……"
1301302-105 = "一定會有我從未見過的漫畫、圖畫和資料在裡頭沉睡。"
1301302-109 = "所以我不想放棄。"
1301302-110 = "只是老師這麼辛苦幫忙……讓我很過意不去……"
1301302-111 = "我一個人也沒問題的，今天請老師……先回去吧。"
1301302-112 = "讓老師這麼費心……不好意思。"
1301302-113 = "今天非常謝謝你，老師。#n回去的路上請小心。"
1301302-114 = "[s]「嗯～接下來要去哪裡找呢？」"
1301302-115 = "咦，咦？那個，老師其實和這件事沒有關係的……"
1301302-116 = "卻要……陪我一起找到最後嗎？"
1301302-117 = "……"
1301302-118 = "謝，謝謝老師。我真的……非常感激！#n還有……抱歉……"
1301302-122 = "……出現這麼感人的場面之後，照理來說目標就要實現了才對……"
1301302-123 = "至少漫畫裡是這樣的……"
1301302-124 = "嗚嗚……現實還真不容易呢……"
1301302-125 = "[s3]「也許……知識解放戰線的同人誌……」\n[s4]「就在我們的心裡也說不定……」"
1301302-128 = "很像是會在漫畫的最後一集出現的台詞呢……"
1301302-132 = "請等一下，老師。#n心裡……心裡……"
1301302-136 = "老師，該不會……！"
1301302-137 = "[s]「怎麼了，紅葉？」"
1301302-138 = "我們去圖書館看看！"
1301302-140 = "圖書館的最深處……當倉庫使用的房間……"
1301302-141 = "誰也不會去找的地方……說不定會在這裡……！？"
1301302-142 = "……！"
1301302-146 = "找到了，老師！是知識解放戰線的同人誌！"
1301302-147 = "[s5]「居然會在這種地方……！恭喜你，紅葉！」\n[s6]「這就是所謂的『遠在天邊，近在眼前』嗎？太好了，紅葉！」"
1301302-150 = "是！耶嘿嘿……真的……很開心。#n這全都多虧了老師。"
1301302-151 = "咦？那只是隨口說說而已？"
1301302-152 = "不……是因為老師的那句話，我才會想到這裡的。"
1301302-153 = "而且……老師今天還陪我找了一整天。"
1301302-154 = "啊，同人誌的內容？#n說的也是，我來看看……"
1301302-160 = "……"
1301302-161 = "呵呵……好像有點掃興呢。"
1301302-162 = "筆觸生澀又不是很流暢……"
1301302-163 = "不過「想畫」的想法倒有清楚傳達出來……"
1301302-164 = "就像漫博早期的同人誌合集一樣呢……"
1301302-165 = "嗯？會不會覺得失望？"
1301302-166 = "完全不會。這也是知識解放戰線的歷史和記錄。"
1301302-167 = "當然，這本同人誌也無法解決我們正在經歷的問題，但是……"
1301302-168 = "該怎麼說呢……能從中獲得勇氣。#n讓人實際體會到以前的前輩們，也是和我們抱持相同的想法創作作品……"
1301302-173 = "耶嘿嘿，老師！"
1301302-179 = "有老師在真是太好了！"

[translation]
10035075-2 = "อ๊ะ! หนีไปแล้ว!"
10035075-8 = "ลงไปในน้ำแล้วเหรอ..."
10035075-9 = "เราต้องไล่ตามมันไปค่ะ ถ้าปล่อยไว้อย่างนั้น มันก็จะขึ้นมาแล้วทำให้ผู้คนตื่นตระหนกอีกค่ะ"
10035075-10 = "แน่นอนสิครับ! เราจะปล่อยน้ำจากสระกลางแจ้งให้หมดเลย!"
10035075-11 = "ถ้าไม่มีที่ซ่อนตัว เจ้าจระเข้นั่นต้องโผล่ตัวมาให้เห็นอีกครั้งแน่นอน!"
10035075-12 = "ไว้ตอนนั้นค่อยโจมตีแล้วคุมตัวมันไว้ก็ได้ครับ!"
10035075-13 = "[s] \"ขอบคุณที่ร่วมมือนะ\""
10035075-14 = "ขอโทษที่เสียมารยาทไปเมื่อก่อนหน้านี้ด้วยนะครับ"
10035075-15 = "ผมไม่คิดเลยว่าสวนน้ำของเราจะมีจระเข้อยู่จริงๆ... มันมาจากไหนกันนะ"
10035075-16 = "เอาเถอะครับ ทางเราจะทำการค้นหาอีกครั้งเดี๋ยวนี้ครับ"
10035075-17 = "ถ้าเจอตัวมัน ผมว่าเจ้าหน้าที่ของเราน่าจะรับมือได้ พวกคุณจากวัลคิรี่ถอยออกมาได้แล้วละครับ"
10035075-18 = "เข้าไปอยู่ในอาคารด้วยกันเถอะครับ"
10035075-19 = "เป็นคำที่น่าฟังที่สุดของวันนี้เลยนะ"
10035075-20 = "แต่ถึงยังไงก็ยังอันตรายอยู่ดีนี่คะ"
10035075-24 = "ไม่สิ เรื่องจับตัวให้ทางสวนน้ำรับผิดชอบดีกว่า"
10035075-25 = "คะ? ทำไมล่ะคะ?"
10035075-26 = "ตอนนี้หน้าที่หลักของเราคือไลฟ์การ์ด"
10035075-27 = "เราต้องรักษาความปลอดภัยให้ลูกค้าของสวนน้ำมากกว่าไปจับจระเข้จักรกล"
10035075-28 = "อีกอย่าง... ฉันคิดว่าตัวการหลักของเรื่องนี้อยู่ในอาคารน่ะ"
10035075-30 = "ตัวการหลัก?!"
10035075-31 = "อย่างนี้สินะ"
10035075-32 = "คะ? หมายถึงใครเหรอคะ?"
10035075-33 = "[s] \"อืม เป็นเด็กคนนั้นจริงๆ เหรอ\""
10035075-34 = "บะ... บอกฉันด้วยคนสิคะ!"
10035075-38 = "เอาละ แค่นี้ก็น่าจะออกมาแล้ว"
10035075-39 = "ค้นให้ทั่ว ต้องหาให้เจอให้ได้!"
10035075-40 = "ฉันไม่ยอมหยุดให้บริการสวนน้ำที่เพิ่งจะเปิดหรอกนะ!"
10035075-41 = "ไม่ว่าจะจระเข้จักรกลหรือตัวอะไรก็ตาม ฉันไม่ปล่อยไว้แน่...!"
10035075-42 = "คุณเจ้าของสวนน้ำ! คงต้องมาดูทางนี้หน่อยแล้วครับ! "
10035075-43 = "ว่าไง! เจอจระเข้แล้วเหรอ?"
10035075-47 = "ยังหรอกครับ แต่ควรมาดูตรงนี้น่ะครับ"
10035075-48 = "ท่อระบายน้ำของสวนน้ำที่ระบายน้ำเสียออกไปข้างนอกสินะ ไหนดูซิ..."
10035075-49 = "นี่มัน?!"
10035075-50 = "ใช่ครับ เดิมทีเรามีลวดตาข่ายขึงไว้ แต่ตอนนี้มันถูกเจาะหมดแล้วครับ!"
10035075-51 = "ดูจากขนาดแล้ว น่าจะเท่าๆ กับจระเข้ที่เห็นเมื่อกี้เลยครับ"
10035075-52 = "อย่างนั้นสินะ เข้ามาทางนี้นี่เอง!"
10035075-53 = "แต่ว่ามันก็ยังไม่มีร่องรอยว่าออกไปแล้ว"
10035075-54 = "แสดงว่ามันยังอยู่ในสวนน้ำ ไปหาให้เจอเดี๋ยวนี้!"
10035075-56 = "รับทราบครับ! "

[translation]
10035075-2 = "啊！逃走了！"
10035075-8 = "潛入水裡了嗎……"
10035075-9 = "老闆，我們得趕緊追擊才行。#n要是置之不理，它遲早會再次出現引起混亂的。"
10035075-10 = "那當然！我現在就把戶外設施的水放掉！"
10035075-11 = "一旦失去藏身之處，鱷魚肯定會再次現身的！"
10035075-12 = "到時候就立刻發動攻擊並將其捕獲！"
10035075-13 = "[s]「感謝您的協助。」"
10035075-14 = "剛才真的很抱歉。"
10035075-15 = "沒想到真的有鱷魚……到底是從哪裡跑進來的。"
10035075-16 = "總之，我現在就派人展開搜索。"
10035075-17 = "只要能發現鱷魚的位置，#n憑藉我們的保全人員就足以應付，無須勞煩女武神的各位。"
10035075-18 = "還請先到室內去休息吧。"
10035075-19 = "這是我今天聽過最振奮人心的消息了。"
10035075-20 = "可是這樣危機還是沒有解除吧？"
10035075-24 = "不，捕捉的工作還是交給園方去處理比較好。"
10035075-25 = "嗯？為什麼呢？"
10035075-26 = "我們現在的身份是救生員。"
10035075-27 = "與捉捕機械鱷魚相比，保護遊客的安全才是首要工作。"
10035075-28 = "而且……我認為這起事件的主謀應該也在室內。"
10035075-30 = "主謀！？"
10035075-31 = "果然是這樣。"
10035075-32 = "咦？是誰？"
10035075-33 = "[s]「嗯，果然就是那個人吧。」"
10035075-34 = "也，也告訴本官嘛！"
10035075-38 = "好，這樣應該能逼它現身了。"
10035075-39 = "仔細搜，一定要找出來！"
10035075-40 = "才剛開幕的水上樂園，怎麼能就這樣毀於一旦！"
10035075-41 = "管你是機械鱷魚還是什麼鱷魚，我都不會放過……！"
10035075-42 = "老闆！這裡好像有點奇怪！"
10035075-43 = "什麼！？找到鱷魚了嗎？"
10035075-47 = "雖然還沒找到鱷魚，不過您看這裡。"
10035075-48 = "這是排放樂園廢水的排水口。我瞧瞧……"
10035075-49 = "這是！？"
10035075-50 = "沒錯，這裡本來應該有被鐵網封住，但現在卻打開了！"
10035075-51 = "從空隙的大小來看，我想應該足夠讓那隻鱷魚進出。"
10035075-52 = "原來是從這裡進來的！"
10035075-53 = "沒發現離開的痕跡就代表……"
10035075-54 = "它還在樂園裡，立刻把它找出來！"
10035075-56 = "是！老闆！"

[translation]
2004305-1 = "หลักฐานแห่งความสุข"
2004305-2 = "(คุณครูเดินไปยังสถานที่ที่อิซุมิบอก...)"
2004305-12 = "(เมื่อขึ้นไปถึงดาดฟ้า...)"
2004305-21 = "(อิซุมิก็วิ่งเข้ามากอด!)"
2004305-24 = "มาแล้วเหรอ คุณครู!"
2004305-25 = "[s] \"ครูมาแล้ว อิซุมิ!\""
2004305-26 = "เป็นยังไงบ้าง? ที่นี่เป็นสวนสาธารณะที่น่าทึ่งใช่มั้ยล่ะ?"
2004305-27 = "ใช่แล้วละ! นี่คือสวนสาธารณะลอยฟ้าที่อยู่บนอาคาร! เพิ่งเปิดเมื่อเดือนที่แล้วเองนะ!"
2004305-28 = "ปกติถ้าพูดถึงสวนสาธารณะ ก็จะนึกถึงสวนสีเขียวที่มีต้นไม้และหญ้ามากมาย..."
2004305-29 = "แต่ว่าที่นี่น่ะ! ก็อย่างที่เห็นว่ามันต่างออกไป!"
2004305-30 = "จู่ๆ ตรงนี้ก็มีอาคารสูงแห่งใหม่มาสร้างริมแม่น้ำ"
2004305-31 = "ได้ยินว่าจะมีการสร้างสวนสาธารณะจำลองตรงดาดฟ้าชั้น 4 ด้วยละ!"
2004305-32 = "ดูสิ! แม่น้ำกว้างมากเลย! เห็นไปถึงฝั่งนู้นเลยด้วย!"
2004305-36 = "ฮัดชิ้ว...!"
2004305-37 = "แหะๆๆ ลมที่พัดมาจากแม่น้ำมันเย็นอยู่นิดหน่อยนะเนี่ย"
2004305-41 = "หืม? อื้อ! ฉันไม่เป็นไรหรอก คุณครู ไม่เป็นอะไรเลย"
2004305-42 = "ที่นี่ทำให้รู้สึกสดชื่นในหลายๆ แง่เลยว่ามั้ย? "
2004305-43 = "[s] \"นั่นสินะ เป็นสวนสาธารณะที่อิซุมิน่าจะชอบเลย\""
2004305-44 = "อื้อ! วิวเมืองเป็นสิ่งที่ฉันได้เห็นทุกวันก็จริง..."
2004305-45 = "แต่แค่เปลี่ยนตำแหน่งนิดหน่อย วิวที่เห็นจากตรงนั้นก็เปลี่ยนไป..."
2004305-46 = "แค่นี้ก็จะได้สัมผัสความรู้สึกใหม่ที่แตกต่างไปอย่างสิ้นเชิงแล้วละ!"
2004305-47 = "จริงสิ คุณครู! นี่ไม่ใช่เวลามาพูดแบบนี้อยู่ ที่ฉันเรียกคุณครูมาที่นี่วันนี้ก็เพราะ!"
2004305-51 = "ท้าดา! นี่ไง ฉันเตรียมอาหารมาให้คุณครูละ!"
2004305-52 = "[s] \"หืม? ไม่ใช่โอเซจิ... นี่นา?\""
2004305-53 = "อื้อ! โอเซจิเป็นอาหารคู่กับปีใหม่ก็จริง แต่ถ้ากินแต่โอเซจิก็จะเบื่อเอาได้..."
2004305-54 = "ฉันก็เลยเอาอาหารปีใหม่หลายๆ อย่างที่กินกันในคิโวทอสมาให้น่ะ!"
2004305-55 = "มีทั้งโจ๊กนมที่ให้รสหวานนิดหน่อย ไดฟุกุที่ห่อด้วยใบตอง แล้วก็ขาหมูอบ..."
2004305-56 = "ส่วนของหวานก็มีผลไม้อบแห้งกับเครื่องเทศ แล้วก็มินซ์พายไส้ถั่วแน่นๆ!"
2004305-57 = "กว่าจะได้โจ๊กนมชามนี้ ต้องต้มนมด้วยไฟอ่อนๆ จากนั้นก็เอาข้าวไปบดแล้วเอาไปแช่น้ำ แล้วค่อยเอามาผสมกับนมที่ต้มไว้แล้วต้มต่อจนสุกเลยนะ"
2004305-58 = "ได้ยินว่าถ้าใส่น้ำตาลกับอบเชยนิดหน่อยในตอนท้าย ก็จะยิ่งอร่อยขึ้นด้วยละ!"
2004305-59 = "และไดฟุกุห่อใบตองอันนี้ ว่ากันว่าข้าวมีพลังในการป้องกันและกำจัดโชคร้าย..."
2004305-60 = "ถ้าใส่เนื้อหมูกับถั่วเขียวเป็นไส้ไดฟุกุทรงสี่เหลี่ยมที่ห่อใบตองอีกที ก็จะยิ่งอร่อยเลยละ!"
2004305-61 = "ส่วนขาหมูอบ ที่จริงก็เป็นอาหารที่กินได้ทั้งปี ไม่ใช่แค่ช่วงปีใหม่เท่านั้น..."
2004305-62 = "แต่ว่ากันว่าขาหมูอบในช่วงปีใหม่จะทำอย่างพิถีพิถันและพิเศษกว่าเดิม!"
2004305-63 = "และอย่างสุดท้ายก็คือมินซ์พาย! ที่จริงนี่เป็นของหวานที่นิยมกินในเทศกาลคริสต์มาสมากกว่า"
2004305-64 = "แต่เท่าที่ได้ฉันยินมา ถ้ากินมินซ์พายวันละนิดวันละหน่อยตั้งแต่วันคริสต์มาสถึงวันที่ 6 มกราคม เราจะโชคดีไปตลอดเลย!"
2004305-65 = "[s] \"แล้วอิซุมิไม่กินด้วยเหรอ?\""
2004305-69 = "ฉันเหรอ? ฉันไม่เป็นไรหรอก ฉันอยากให้คุณครูกินน่ะ"
2004305-75 = "นั่นก็เพราะว่า... แหะๆๆ ก็ฉันเตรียมอาหารทั้งหมดมาเพื่อคุณครูโดยเฉพาะนี่นา!"
2004305-78 = "― [log=이즈미 새해]นี่ คุณครู[/log][wa:420] "
2004305-81 = "― [log=이즈미 새해]อาหารปีใหม่น่ะ [/log]"
2004305-83 = "― [log=이즈미 새해]นอกจากโอเซจิแล้ว ยังมีอย่างอื่นอีกเยอะเลยละ[/log][wa:340] "
2004305-86 = "― [log=이즈미 새해]ฉันก็เลยเตรียมมาให้เพียบเลย! [/log][wa:1280] "
2004305-89 = "― [log=이즈미 새해]ฉันเหรอ? ฉันน่ะ...[/log][wa:1440] "
2004305-92 = "― [log=이즈미 새해]แค่ได้เห็นคุณครูกิน ฉันก็มีความสุขแล้ว [/log][wa:895] "
2004305-95 = "― [log=이즈미 새해]อีกอย่าง ยิ่งได้มาอยู่[/log][wa:990] "
2004305-98 = "― [log=이즈미 새해]กับคุณครูตามลำพังแบบนี้ ฉันก็ยิ่งมีความสุขนะ! [/log][wa:450] "
2004305-101 = "― [log=이즈미 새해]อ๊ะ! เมื่อกี้...[/log][wa:1000] "
2004305-104 = "― [log=이즈미 새해]ฉันเผลอพูดอะไรน่าอายออกไปจนได้...[/log][wa:305] "
2004305-107 = "― [log=이즈미 새해]ตะ... แต่ถึงยังไง! ฉันก็มีความสุขนี่เนอะ![/log][wa:500] "
2004305-109 = "― [log=이즈미 새해]งั้นไม่เป็นไรหรอก! ไม่มีปัญหา![/log][wa:210] "
2004305-112 = "เป็นยังไงบ้าง คุณครู?"
2004305-113 = "[s1] \"อื้อ อร่อยและสดใหม่มากเลย\"\n[s2] \"ครูชอบทั้งวิวและอาหารที่อิซุมิเอามาให้เลย\""
2004305-116 = "เยี่ยมไปเลย! แหะๆๆ ฉันอยากได้ยินคำนี้ละ"
2004305-117 = "ว่าแต่ทำไมฉันถึงเตรียมอาหารปกติมาให้น่ะเหรอ?"
2004305-121 = "......"
2004305-122 = "คุณครู สำหรับฉันแล้ว... ชีวิตน่าจะเป็นกระบวนการค้นหาสิ่งใหม่ๆ"
2004305-123 = "นั่นคงเป็นเหตุผลที่ฉันอยากลองทำอะไรใหม่ๆ และค้นหารสชาติที่ไม่เคยสัมผัสมาก่อน"
2004305-124 = "แต่ฉันได้รู้แล้วว่านั่นคือรสนิยมส่วนตัวของฉันที่ไม่มีใครเหมือน"
2004305-125 = "เพราะงั้น... ฉันจึงอยากให้คุณครูได้กินอาหารปกติทั่วไปแต่ก็ยังมีความพิเศษจากฉันน่ะ"
2004305-126 = "ก็อย่างที่ฉันพูดไปก่อนหน้านี้ แค่ฉันได้เห็นคุณครูกินอย่างเอร็ดอร่อย ฉันก็มีความสุขแล้วละ!"
2004305-130 = "(รอยยิ้มที่สดใสของอิซุมิเต็มไปด้วยพลังแห่งชีวิต...)"
2004305-131 = "(จนคนที่ได้เห็นรู้สึกสดชื่นและมีพลัง...)"
2004305-132 = "[ns] \"อิซุมิ\""
2004305-136 = "หืม? ทำไมเหรอคุณครู?"
2004305-140 = "[ns] \"ครูรู้สึกดีจังที่ได้อยู่กับอิซุมิแบบนี้\""
2004305-144 = "เอ๋...?"
2004305-145 = "อื้อ! ฉันก็ด้วย!"

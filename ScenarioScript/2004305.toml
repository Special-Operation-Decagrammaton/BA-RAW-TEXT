2004305-124 = "3;이즈미 새해;99;하지만 그건, 나만의 특이한 입맛이라는 것도, 이제는 알고 있어."
2004305-125 = "3;이즈미 새해;02;그러니까 선생님에게는…… 조금 일반적일지도 모르지만, 그러면서도 역시 조금은 특별한 음식을 주고 싶었어."
2004305-126 = "3;이즈미 새해;10;아까도 말했던 거지만 말이지. 나는 선생님이 맛있게 먹고 있는 걸 바라보는 것만으로, 이미 행복하니까!\n#3;em;[반짝]\n#3;hophop"

[translation]
2004305-1 = "幸福的證據"
2004305-2 = "（前往泉所說的地點……）"
2004305-12 = "（到達屋頂後……）"
2004305-21 = "（被快步衝來的泉抱住了！）"
2004305-24 = "歡迎你來，老師！"
2004305-25 = "[s]「我來囉，泉！」"
2004305-26 = "怎麼樣？這座公園很神奇吧？"
2004305-27 = "是蓋在頂樓上的屋頂公園哦！聽說是上個月才剛開放的！"
2004305-28 = "平常說到公園，大家可能會想到種滿樹木和花草的綠色庭園……"
2004305-29 = "不過這邊如你所見，跟一般的公園不太一樣！"
2004305-30 = "這裡是一棟沿著河岸建成的狹長型建築……"
2004305-31 = "然後在它的四樓屋頂上打造的人工公園！"
2004305-32 = "看！河面這麼寬闊！還看得到對岸耶！"
2004305-36 = "……哈啾！"
2004305-37 = "耶嘿嘿。果然冬天從河邊吹來的風還是有點冷呢。"
2004305-41 = "嗯？嗯！我真的沒事的哦，老師。"
2004305-42 = "這裡感覺真的很清新舒服對吧？"
2004305-43 = "[s]「就是說啊，一看就像是泉會喜歡的公園。」"
2004305-44 = "嗯！雖然是每天看慣了的都市風景……"
2004305-45 = "只要稍微換個地方，從不同的角度去看，風景就會變得完全不同……"
2004305-46 = "有種煥然一新的感覺！"
2004305-47 = "啊，對了！現在不是說這些的時候。#n我之所以請老師來這裡……"
2004305-51 = "鏘～！是因為我準備了東西要請老師吃！"
2004305-52 = "[s]「嗯？看起來好像……不是御節料理？」"
2004305-53 = "嗯！雖然現在是新年沒錯，不過只有御節料理感覺有點無聊……"
2004305-54 = "所以我從奇普托斯的各個地方，收集了各種新年食品！"
2004305-55 = "這裡有微甜的牛奶粥、用香蕉葉包的糯米糕、烤豬腳……"
2004305-56 = "至於餐後點心的部分，則是用碎果乾、香料、堅果做成的的百果派！"
2004305-57 = "牛奶粥是用小火加熱牛奶，再加上磨成糊的米之後慢慢燉煮製成。"
2004305-58 = "最後加一點砂糖和肉桂，味道還會變得更好！"
2004305-59 = "然後是這個用香蕉葉包的糯米糕，據說糯米有去除厄運和邪祟的力量……"
2004305-60 = "在用香蕉葉包成方形的糯米糕裡，加入豬肉和綠豆後一起吃就可以了！"
2004305-61 = "接下來是烤豬腳。#n雖然在新年以外的時候也很常吃……"
2004305-62 = "不過聽說在新年的時候，會做得比平常更用心一點哦！"
2004305-63 = "最後是百果派！#n其實這道甜點，在聖誕節的時候比較常見……"
2004305-64 = "聽說從聖誕節到隔年1月6日每天吃一個百果派，就會帶來好運！"
2004305-65 = "[s]「泉不吃嗎？」"
2004305-69 = "我嗎？沒關係，老師吃就行了。"
2004305-75 = "因為……耶嘿嘿，這是我專門為老師準備的！"
2004305-78 = "— [log=이즈미 새해]你知道嗎，老師。[/log][wa:460] "
2004305-81 = "— [log=이즈미 새해]聽說新年的料理，[/log]"
2004305-83 = "— [log=이즈미 새해]除了御節料理之外，還有很多種類哦！[/log][wa:1340] "
2004305-86 = "— [log=이즈미 새해]所以呢，我準備了非～常多！[/log][wa:1880] "
2004305-89 = "— [log=이즈미 새해]我？我的話……[/log][wa:1840] "
2004305-92 = "— [log=이즈미 새해]只要看著老師吃，就覺得很幸福了哦？[/log][wa:1735] "
2004305-95 = "— [log=이즈미 새해]還有……能像這樣和老師[/log][wa:1390] "
2004305-98 = "— [log=이즈미 새해]兩人待在一起就滿足了！大概吧！[/log][wa:1650] "
2004305-101 = "— [log=이즈미 새해]啊！那個……[/log][wa:1360] "
2004305-104 = "— [log=이즈미 새해]說了有點令人害羞的話……[/log][wa:1105] "
2004305-107 = "— [log=이즈미 새해]可，可是！真的很幸福！[/log][wa:1660] "
2004305-109 = "— [log=이즈미 새해]所以沒問題！沒事的！[/log][wa:970] "
2004305-112 = "老師，怎麼樣？"
2004305-113 = "[s1]「嗯，真的很好吃、很新鮮。」\n[s2]「不管是這片景色還是泉準備的料理，我都很喜歡。」"
2004305-116 = "太好了！耶嘿嘿。#n我就想聽到老師這麼說。"
2004305-117 = "問我為什麼準備了普通的料理？"
2004305-121 = "……"
2004305-122 = "對我來說……人生就是不斷追尋新事物的過程。"
2004305-123 = "所以我才會想嘗試新事物，尋找未曾體驗過的新滋味。"
2004305-124 = "但現在我已經意識到，那只是我個人獨特的口味而已。"
2004305-125 = "所以，或許對老師來說可能有點普通……我還是希望能讓老師品嘗到特別的料理。"
2004305-126 = "就像剛才說的一樣，我只要看到老師吃得開開心心的樣子就已經很幸福了！"
2004305-130 = "（在泉燦爛的笑容中……）"
2004305-131 = "（似乎蘊含著無限的活力，光是看著就讓人充滿力量……）"
2004305-132 = "[ns]「泉。」"
2004305-136 = "嗯？怎麼了嗎，老師？"
2004305-140 = "[ns]「能像這樣和泉待在一起，感覺真好。」"
2004305-144 = "咦……？"
2004305-145 = "嗯！我也是！"

2004305-22 = "3;이즈미 새해;03\n#3;a\n#3;h\n#3;closeup"
2004305-23 = "#wait;500"
2004305-24 = "3;이즈미 새해;10;어서 와, 선생님!\n#3;em;[재잘]\n#3;closeup"
2004305-25 = "[s] \"나 왔어, 이즈미!\""
2004305-26 = "3;이즈미 새해;02;어때? 뭔가 신기한 공원이지?"
2004305-27 = "3;이즈미 새해;03;맞아! 건물 위에 지어진 옥상 공원이야! 지난달에 새로 개장했대!"
2004305-28 = "3;이즈미 새해;99;보통 공원이라고 하면, 나무나 풀 같은 게 많은 녹색 정원 같은 것을 떠올리겠지만…….\n#3;em;…"
2004305-29 = "3;이즈미 새해;00;여기는 말이지! 보는 대로 조금 달라!"
2004305-30 = "3;이즈미 새해;02;어쩌다 보니까, 강변에 세로로 긴 건물이 세워지게 됐는데."
2004305-31 = "3;이즈미 새해;10;거기 4층 옥상에, 인공 공원을 만들자고 했대!\n#3;em;[반짝]\n#3;hophop"
2004305-32 = "3;이즈미 새해;02;봐! 강이 엄청 넓어! 저편까지 보여!"
2004305-33 = "#st;[0,0];instant;1;"
2004305-34 = "#clearST"
2004305-35 = "3;이즈미 새해;01\n#3;em;[!]\n#3;h\n#wait;800"
2004305-36 = "3;이즈미 새해;08;……에칫!\n#3;jump"
2004305-37 = "3;이즈미 새해;10;에헤헤. 그래도 강에서 부는 겨울바람은 조금 차갑네."
2004305-38 = "#st;[0,0];instant;1;"
2004305-39 = "#clearST"
2004305-40 = "3;이즈미 새해;01\n#3;em;[반응]\n#3;h\n#wait;1000"
2004305-41 = "3;이즈미 새해;02;응? 응! 난 괜찮아, 선생님. 아무것도 아니야."
2004305-42 = "3;이즈미 새해;03;그래도 여기, 뭔가 여러 가지로 기분이 신선해지지 않아? \n#3;m4"
2004305-43 = "[s] \"그러게. 이즈미가 좋아할 것 같은 공원이네.\""
2004305-44 = "3;이즈미 새해;01;응! 도시 풍경이란 건, 어떻게 보면 매일 보는 거지만……."
2004305-45 = "3;이즈미 새해;99;이렇게 장소가 조금 바뀌고, 거기에서 바라보는 경치가 변하는 것만으로…….\n#3;em;…"
2004305-46 = "3;이즈미 새해;03;완전히 새로운 느낌을 받을 수 있으니까!"
2004305-47 = "3;이즈미 새해;01;아, 참! 이럴 때가 아니야. 선생님을 여기로 부른 이유!\n#3;m3"
2004305-48 = "#st;[0,0];instant;1;"
2004305-49 = "#clearST"
2004305-50 = "3;이즈미 새해;02\n#3;greeting\n#wait;1500"
2004305-51 = "3;이즈미 새해;10;쨘! 여기, 선생님을 위해서 식사를 준비했어!\n#3;em;[반짝]"
2004305-52 = "[s] \"응? 오세치 같은 게…… 아니네?\""
2004305-53 = "3;이즈미 새해;01;맞아! 새해에는 역시 오세치 요리겠지만, 그것만이라면 조금 지루한 감도 있으니까……."
2004305-54 = "3;이즈미 새해;02;키보토스 여기저기에서 먹는, 다양한 새해 음식을 가져와 봤어!"
2004305-55 = "3;이즈미 새해;03;여기 살짝 단 맛이 나는 우유죽에, 바나나잎으로 감싼 찹쌀떡, 돼지 다리 오븐 구이……."
2004305-56 = "3;이즈미 새해;10;그리고 후식으로, 말려서 으깬 과일과 향신료, 견과류 같은 것으로 속을 채운 민스 파이까지!\n#3;em;[재잘]\n#3;hophop"
2004305-57 = "3;이즈미 새해;02;우유죽은 말이지. 우유를 약불로 데우다가, 갈아서 불린 쌀을 넣고, 마저 끓여서 만든 거래."
2004305-58 = "3;이즈미 새해;03;마지막에 설탕과 계피를 살짝 넣으면, 더욱 맛이 좋아진다더라구!"
2004305-59 = "3;이즈미 새해;99;그리고 바나나 잎으로 감싼 찹쌀떡은, 쌀에는 액운과 잡기를 없애는 힘이 있다고 해서……."
2004305-60 = "3;이즈미 새해;00;바나나 잎으로 감싼 사각형의 찹쌀떡 안에 돼지고기와 녹두를 같이 넣어 먹으면 좋다더라!\n#3;em;[!]"
2004305-61 = "3;이즈미 새해;03;그리고 돼지 다리 오븐 구이는, 사실 새해뿐만 아니라 언제 어느 때든 자주 먹는 음식이지만……."
2004305-62 = "3;이즈미 새해;10;새해에는 평소보다 조금 더, 특별히 정성을 들여서 만든다고 해!"
2004305-63 = "3;이즈미 새해;01;마지막으로 민스 파이는 말이야! 사실 크리스마스 때에 더 많이 먹는 후식이지만.\n#3;m2"
2004305-64 = "3;이즈미 새해;03;크리스마스부터 다음 해 1월 6일까지 하나씩 파이를 먹으면, 행운이 찾아온다는 모양이야!\n#3;em;[음표]"

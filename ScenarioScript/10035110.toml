[translation]
10035110-1 = "ตอนที่ 11;บทส่งท้าย"
10035110-3 = "ขอรบกวนหน่อยนะคะ!"
10035110-4 = "ฉันเจ้าหน้าที่ตำรวจคิริโนะจากสำนักรักษาความปลอดภัย มาที่กรมความมั่นคงสาธารณะเพราะมีธุระค่ะ"
10035110-5 = "ขอเข้าไปได้มั้ยคะ?"
10035110-6 = "ก็บอกแล้วว่าไม่ต้องพิธีรีตองขนาดนั้นก็ได้"
10035110-7 = "นั่นสินะคะ... ไม่มีใครตอบฉันเลย... ครั้งก่อนก็รู้สึกเหมือนจะเป็นอย่างนี้ด้วย..."
10035110-8 = "อื้ม เพราะงั้นก็แค่เข้าๆ ไปเถอะ"
10035110-9 = "และเราก็มาเพราะกรมความมั่นคงสาธารณะเรียกตัวมานี่นา"
10035110-10 = "อ๊ะ จริงด้วยค่ะ "
10035110-11 = "กรมความมั่นคงสาธารณะบอกว่าจะให้รางวัลเราที่ทำภารกิจไลฟ์การ์ดคราวก่อนได้สำเร็จลุล่วงค่ะ!"
10035110-12 = "ฉันตั้งตารอเวลานี้มากที่สุดเลย"
10035110-13 = "จะได้รางวัลอะไรนะ? วันพักร้อนสัก 10 คืน 11 วัน? บัตรกินมาสเตอร์โดนัทไม่อั้น 1 เดือน?"
10035110-14 = "เราอาจได้รับจ้างงานเป็นกรณีพิเศษจากสำนักความมั่นคงหรือกรมความมั่นคงสาธารณะก็ได้นะคะ!"
10035110-15 = "ถ้าเป็นแบบนั้นฉันขอปฏิเสธดีกว่า..."
10035110-22 = "มายืนทำอะไรตรงทางเข้าน่ะ?"
10035110-23 = "อยู่ตรงนี้มันเกะกะ ถ้าไม่เข้าไปข้างในก็ออกไปอยู่ข้างนอกซะสิ"
10035110-25 = "อ๊ะ! หัวหน้ากรมฯ!"
10035110-26 = "ทำหน้าเคร่งเครียดกับงานเหมือนเคยเลยนะ"
10035110-28 = "เงียบไปเลย"
10035110-29 = "เข้ามาสิ ยัยโคโนกะบอกไว้ว่าเตรียมรางวัลเอาไว้ให้แล้วน่ะ"
10035110-30 = "โอ้ว เป็นคำที่น่าฟังที่สุดของวันนี้เลย"
10035110-31 = "สปอยล์หน่อยได้มั้ยว่าเราจะได้อะไร?"
10035110-32 = "ฉันก็ไม่รู้เหมือนกัน"
10035110-44 = "ฮัดชิ่ว!"
10035110-49 = "อ๊ะ มาแล้วเหรอคุณพี่"
10035110-50 = "ไม่สบายงั้นเหรอ...?"
10035110-51 = "ฮัดชิ่ว!"
10035110-52 = "น่าจะใช่นะคะ แต่ไม่เป็นอะไรมากหรอกค่ะ พอดีฉันไปเจอเรื่องให้เป็นหวัด..."
10035110-53 = "เอาเถอะค่ะ ทุกคนมาได้จังหวะพอดีเลยนะคะ"
10035110-54 = "สวัสดีค่ะรองหัวหน้ากรมฯ! ฉันเจ้าหน้าที่ตำรวจคิริโนะ สังกัดสำนักรักษาความปลอดภัยค่ะ!"
10035110-55 = "นี่สินะคะคนที่คุณพี่ติดหนี้บุญคุณ~"
10035110-56 = "ไว้เราหาเวลาไปกินข้าวหน้าเนื้อด้วยกันสักมื้อเป็นไงคะ?"
10035110-58 = "เลิกพูดจาเหลวไหลได้แล้ว"
10035110-59 = "ธุระของวันนี้คือเรื่องให้รางวัล รีบๆ จัดการตรงนี้ให้เสร็จได้แล้ว ฉันมีงานต้องทำอีก"
10035110-60 = "เข้าใจแล้วค่ะ เอาละ นี่ค่ะ!"
10035110-62 = "โอ้วว ในที่สุด~"
10035110-63 = "เอ๋? เป็นซองกระดาษเล็กๆ นี่คะ?"
10035110-65 = "รู้สึกไม่ค่อยดีเลยแฮะ..."
10035110-66 = "ลองเปิดดูสิคะ"
10035110-76 = "นี่มัน..."
10035110-77 = "บัตรกำนัลใช้บริการสวนน้ำ <แอกิร์> นี่คะ"
10035110-79 = "ถูกต้องค่ะ!"
10035110-80 = "ตั้งใจทำงานมาแล้ว ก็ต้องตั้งใจเล่นน้ำด้วยค่ะ!"
10035110-81 = "ไปรอบนี้จะไม่ใช่ไลฟ์การ์ด แต่เป็นลูกค้าสวนน้ำแล้ว!"
10035110-82 = "ฉันคิดว่าแบบนี้น่าจะได้ประสบการณ์พิเศษกลับมา ฉันก็เลยไปหาบัตรกำนัลมาให้ค่ะ..."
10035110-83 = "แล้วนี่ทำไมทุกคนถึงทำหน้าแบบนั้นล่ะคะ?"
10035110-84 = "ให้ไปที่นั่นอีกเหรอ? แค่คิดก็ขยาดแล้วละ"
10035110-89 = "ฉันก็ยังปวดเนื้อปวดตัวไม่หายเลยค่ะ..."
10035110-91 = "ฉันไม่เอา"
10035110-96 = "อะ... อ้าว?"
10035110-97 = "แต่คุณพี่คะ ตอนกลับมาจากสวนน้ำ สีหน้าคุณพี่ดูมีความสุขมากเลยนะคะ"
10035110-98 = "ไม่ได้ชอบการเล่นน้ำหรอกเหรอคะ?"
10035110-99 = "งั้นเหรอ แต่ฉันไม่สนใจเรื่องการเล่นน้ำหรอก"
10035110-100 = "ถ้าวันนั้นฉันดูอารมณ์ดี... คงเป็นเพราะเรื่องอื่นน่ะ"
10035110-101 = "เรื่องอะไรเหรอคะ?"
10035110-107 = "บอกไม่ได้หรอก มันเป็นความลับสุดยอด"

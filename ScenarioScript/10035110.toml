10035110-84 = "You want me to go back there? I'm sick of the place."
10035110-89 = "I still have muscle aches all over my body..."
10035110-91 = "Here. Give it to someone else."
10035110-96 = "...Hm."
10035110-97 = "But Director, you seemed so happy when you came back last time."
10035110-98 = "Don't you like playing in the water?"
10035110-99 = "Do I? No, I have no interest in water activities at all."
10035110-100 = "If I was smiling...it was probably because of something else."
10035110-101 = "Something else like what?"
10035110-107 = "That's confidential."

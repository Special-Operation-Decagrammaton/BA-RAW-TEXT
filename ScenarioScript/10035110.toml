[translation]
10035110-1 = "Episode 11;Epilogue"
10035110-3 = "Excuse me!"
10035110-4 = "Officer Kirino from the Public Safety Bureau, reporting to the Public Peace Bureau on official business!"
10035110-5 = "Permission to enter!"
10035110-6 = "I told you, you don't need to be so formal."
10035110-7 = "I do notice they don't respond when I talk that way."
10035110-8 = "Right? So yeah, just walk on in."
10035110-9 = "Besides, they're the ones who called you over here."
10035110-10 = "Good point. "
10035110-11 = "They said they wanted to give me a reward for completing the dispatch mission."
10035110-12 = "Me too. I've been waiting."
10035110-13 = "What do you think it'll be? A ten-night, eleven-day vacation? A one-month free pass to Master Donut?"
10035110-14 = "Ooh, or a position with the Security Bureau or the Public Peace Bureau!"
10035110-15 = "I'd pass on that..."
10035110-22 = "Why are you standing in the doorway?"
10035110-23 = "You're in the way. Either come in or don't."
10035110-25 = "Oh! Director!"
10035110-26 = "Looking tired as always."
10035110-28 = "You be quiet."
10035110-29 = "Come on. Konoka says there's a reward for all three of us."
10035110-30 = "Music to my ears."
10035110-31 = "Can you tell us what it is? Just a hint."
10035110-32 = "No idea."
10035110-44 = "Achoo!"
10035110-49 = "Oh, you're here!"
10035110-50 = "...Do you have a cold?"
10035110-51 = "Achoo!"
10035110-52 = "Well, I do, but it's not a big deal. I kind of expected to catch one."
10035110-53 = "In any case, I was about to call you, but you're already here."
10035110-54 = "Hello, Deputy Director! I'm Officer Kirino, from the Public Safety Bureau!"
10035110-55 = "Nice to meet you. You've done great things for us!"
10035110-56 = "We should grab a bowl of gyudon together sometime."
10035110-58 = "Quit yapping."
10035110-59 = "The reward is the business at hand. Let's wrap that up and get back to work."
10035110-60 = "Absolutely. Here you go!"
10035110-62 = "All right!"
10035110-63 = "Huh. Little envelopes."
10035110-65 = "...I have a bad feeling about this."
10035110-66 = "Go ahead, open them."
10035110-76 = "These are..."
10035110-77 = "Wristbands for admission to the Aegir water park."
10035110-79 = "Correct!"
10035110-80 = "In recognition of all your hard work there!"
10035110-81 = "Now enjoy some time there as guests."
10035110-82 = "I requested them especially for you. It seemed appropriate."

[translation]
10035110-1 = "第11話;尾聲"
10035110-3 = "打擾了！"
10035110-4 = "生活安全局桐乃，因故拜訪公安局辦公室！"
10035110-5 = "請問可以進去嗎！"
10035110-6 = "就說了不用這麼一板一眼啦。"
10035110-7 = "好像也是……而且上次來的時候也沒有人回應……"
10035110-8 = "嗯嗯，所以直接進去就行了。"
10035110-9 = "反正是公安局找我們來的嘛。"
10035110-10 = "啊，說的也是。"
10035110-11 = "好像是要頒發上次派遣任務圓滿成功的獎勵給我們哦！"
10035110-12 = "我最期待的就是這一刻。"
10035110-13 = "究竟會給什麼呢？#n11天10夜的榮譽假？一個月份的MasterDonut免費兌換券？"
10035110-14 = "或是被警備局或公安局破例挖角！"
10035110-15 = "那個我就不用了……"
10035110-22 = "站在門口做什麼。"
10035110-23 = "路都被你們擋住了。#n有事的話就進去，不然就離開。"
10035110-25 = "啊！公安局長！"
10035110-26 = "還是一副被工作壓得喘不過氣的樣子呢。"
10035110-28 = "少說那些沒營養的話了。"
10035110-29 = "趕快進去吧。#n木乃香已經準備好獎勵了。"
10035110-30 = "哦哦，真是個好消息呢。"
10035110-31 = "能稍微透露一下是什麼嗎？"
10035110-32 = "我也不知道。"
10035110-44 = "哈啾！"
10035110-49 = "哦，您來啦，大姐頭。"
10035110-50 = "……感冒了嗎？"
10035110-51 = "哈啾！"
10035110-52 = "嗯，稍微有點感冒。#n不過沒什麼大不了的，只是一點小狀況而已。"
10035110-53 = "總之，我正好要去找您，沒想到您就來了。"
10035110-54 = "您好，副局長！我是生活安全局的桐乃！"
10035110-55 = "哦哦，大姐頭一直以來承蒙你們關照了～"
10035110-56 = "晚點一起去吃碗牛丼吧？"
10035110-58 = "別說廢話了。"
10035110-59 = "他們是來領獎的。#n工作很忙，趕快辦一辦吧。"
10035110-60 = "知道了。來，請收下！"
10035110-62 = "哦哦，終於～"
10035110-63 = "咦？是個小信封呢？"
10035110-65 = "……有種不祥的預感。"
10035110-66 = "打開看看吧。"
10035110-76 = "這個是……"
10035110-77 = "是「海神」水上樂園的門票。"
10035110-79 = "答對了！"
10035110-80 = "辛苦工作的人啊，回去吧！"
10035110-81 = "回去那曾經從事過救生員工作的水上樂園，以遊客的身份再次拜訪！"
10035110-82 = "……我想這可能會是很特別的經歷！#n所以就……特別向上級申請了……"
10035110-83 = "怎麼了，大家的表情好像不是很高興？"
10035110-84 = "又要去那裡？拜託饒了我吧。"
10035110-89 = "本官也是，到現在還全身痠痛呢……"
10035110-91 = "我也要退還。"
10035110-96 = "咦？"
10035110-97 = "可是前輩，您從水上樂園回來時的表情看起來挺好的呀。"
10035110-98 = "原來不是因為喜歡玩水的關係？"
10035110-99 = "有嗎？我其實對玩水沒什麼興趣。"
10035110-100 = "之所以看起來心情好，大概是因為……其他原因吧。"
10035110-101 = "是什麼樣的原因？"
10035110-107 = "這是機密。"

[translation]
10037080-1 = "ตอนที่ 8;ฟังคำของตุ๊กตา"
10037080-3 = "เปิดการแสดงงิ้วชุดใหม่อย่างกะทันหันงั้นเหรอ... น่าทึ่งจังเลยนะ"
10037080-4 = "การแสดงคราวที่แล้วก็สนุกดี งั้นครั้งนี้ก็คงจะมีอะไรสนุกๆ ให้ดูด้วยละนะ!"
10037080-5 = "อืม เราเองก็ตั้งตารอเหมือนกัน นานมากแล้วด้วยที่คางุยะไม่ได้แสดงความปรารถนาอันแรงกล้าถึง#nขนาดนี้ให้เห็น"
10037080-6 = "อื้อ! เราว่าตัวเองก็เริ่มชินกับท่วงทำนองประเภทนี้บ้างแล้วละ!"
10037080-7 = "นักแสดงที่ใส่ชุดเกราะวิ่งออกมายืนเรียงเป็นแถว..."
10037080-11 = "ครั้งนี้ตัวเอกก็ใส่ชุดเกราะสีดำสินะ! เราเริ่มเก็บรายละเอียดได้ทีละนิดๆ แล้วละ!"
10037080-12 = "ฮุฮุ เช่นนั้นหรือ? ถือเป็นเรื่องราวดีๆ จริงๆ เลยนะ"
10037080-22 = "การใช้ชีวิตเป็นเหมือนความฝันอันยิ่งใหญ่"
10037080-25 = "เหตุใดจึงจะใช้ชีวิตอย่างยากลำบากด้วยเล่า"
10037080-26 = "นอนอยู่ใต้เสาตามความพอใจ"
10037080-27 = "เมื่อตื่นขึ้นมาในทันใด ก็มองไปที่ลานตรงหน้า"
10037080-29 = "นกตัวหนึ่งร้องไห้อยู่ท่ามกลางหมู่บุปผา"
10037080-31 = "เข้าไปถามดีกว่า ว่าตอนนี้กี่ยามแล้ว"
10037080-32 = "เสียงนกขมิ้นตามสายลมในฤดูใบไม้ผลิ"
10037080-34 = "ขับขานเสียงดังพลางเฝ้ารอดวงเดือน"
10037080-39 = "ในบทนำจะเริ่มด้วยทัศนียภาพที่งดงามของโลกเหมือนเดิมเลยนะ..."
10037080-40 = "การแสดงงิ้วจะเป็นไปตามรูปแบบเดิมที่วางไว้น่ะ นี่ก็ไม่ต่างจากการทำตามคำสั่งหรอก"
10037080-41 = "แต่ครั้งนี้ดูเหมือนว่าหัวหน้าคางุยะจะเป็นคนเขียนเนื้อเรื่องใช่มั้ย?"
10037080-42 = "เขียนเรื่องได้ภายในไม่กี่วันเหรอเนี่ย ยอดเยี่ยมไปเลยนะ"
10037080-47 = "หมอกบางๆ ลอยขึ้นมาเหนือทะเลสาบ"
10037080-48 = "แสงแดดสุกสว่างรับปีที่อุดม"
10037080-49 = "โลกสงบสุข ไร้ซึ่งความปรารถนาอื่นใด"
10037080-50 = "มังกรและนกฟีนิกซ์มีพลังอันศักดิ์สิทธิ์ในปาก"
10037080-52 = "ทุกคนจงดูเข้าไว้ ราชาทมิฬกำลังเดินทอดน่องอยู่ในลาน"
10037080-53 = "บุคคลที่ฉลาดและเฉียบแหลม แต่ก็ทรรศนะคับแคบและใจดำ"
10037080-54 = "บุคคลที่มีอำนาจปกครอง แต่กลับหยิ่งทะนง"
10037080-58 = "บุคคลที่หลักแหลมขนาดที่รู้ว่าตัวเองบกพร่อง"
10037080-59 = "แต่ก็ไม่หาญกล้าพอจะเอาชนะสิ่งนั้นได้!"
10037080-64 = "เอ๊ะ... เอ๋?! ดะ... เดี๋ยวนะ นี่มัน...?"
10037080-65 = "เสียงก้องชะมัดเลย! พวกเราไม่ได้ฟังผิดใช่ไหม?"
10037080-66 = "อะ... อาจจะเป็นเรื่องราวในประวัติศาสตร์หรือการอุปมาอะไรก็ได้นี่นา? ลองฟังต่ออีกหน่อยแล้วกัน..."
10037080-67 = "แต่ถึงยังไงก็... แต่งให้สร้างความเข้าใจผิดได้ง่ายเลยนะ... ราชาทมิฬงั้นเหรอ..."
10037080-69 = "เราจะพูดในฐานะราชาทมิฬ"
10037080-70 = "การถกเถียงที่ซ่อนเร้นปกคลุมไปทั่วลาน ความขุ่นเคืองที่ปิดบังไว้ก็เผยตัวถึงคานค้ำหลังคา"
10037080-71 = "เราจะเปิดประตูบานที่ปิดไว้ แล้วให้วายุจากข้างนอกพัดเข้ามา"
10037080-72 = "นั่นคือวิถีของเรา ทุกคนจงฟังและทำตาม"
10037080-77 = "(...!? เปิดประตูบานที่ปิดไว้ แล้วให้วายุจากข้างนอกพัดเข้ามา...?)"
10037080-78 = "(รู้สึกไม่ค่อยดีเลยแฮะ... นักเรียนคนอื่นๆ จะเป็นยังไงบ้างนะ? โดยเฉพาะสมาชิกมังกรดำน่ะ...?)"
10037080-85 = "(เมื่อเทียบกับนักเรียนกลุ่มอื่นในซานไห่จิงแล้ว สมาชิกมังกรดำเป็นนักเรียนที่ตีความการแสดงงิ้วได้ดี#nเลยด้วย...!)"
10037080-86 = "(คางุยะ... เธอคิดจะทำอะไรของเธอน่ะ?!)"
10037080-88 = "จงมองไปรอบๆ แล้วย้อนคิดดูเถิด"
10037080-89 = "ผู้ที่ไม่เห็นด้วยกับเจตนารมณ์จะโดนลงโทษ"
10037080-90 = "พลังแห่งสวรรค์นั้นศักดิ์สิทธิ์เหลือคณานับ"
10037080-91 = "แล้วพรสวรรค์เล็กๆ ของมนุษย์จะมีประโยชน์อันใด"
10037080-93 = "นึกถึงอันตรายท่ามกลางความสงบ"
10037080-94 = "แล้วนึกถึงความสงบท่ามกลางอันตรายอีกครั้ง"
10037080-95 = "ในเมื่อความกลมกลืนของสวรรค์และโลกไม่อาจคาดเดาได้"
10037080-96 = "ข้าก็จะใช้พลังของวายุคลี่สิ่งที่ถูกกดไว้ แล้วกดสิ่งที่คลี่ไว้อีกครั้ง"
10037080-98 = "ทุกคนจงดูเข้าไว้ ปัญญาของมนุษย์นั้นสั้นถึงเพียงนี้"
10037080-99 = "ผู้ใดอวดสติปัญญาจะกลายเป็นคนโง่เขลา"
10037080-100 = "จงระวังโชคดีที่เกินขอบเขตและลาภลอยที่ไร้เหตุผล"
10037080-101 = "หากไม่มองด้วยทรรศนะที่สูงขึ้น ก็จะตกอยู่ในอุบายนั้น"
10037080-103 = "อะไรของพวกชมรมการแสดงงิ้วน่ะ?!"
10037080-104 = "พวกนั้นไม่พอใจอะไรท่านประมุขงั้นเหรอ? ถ้าเป็นอย่างนั้นก็บอกกันตอนที่ผู้มาเยือนจากเรดวินเทอร์ไม่อยู่สิ..."
10037080-105 = "ดะ... เดี๋ยวนะ หรือว่าที่พวกนั้นเป็นแบบนี้ก็เพราะผู้มาเยือนจากเรดวินเทอร์?!"
10037080-106 = "อ่า... จะว่าไป ถ้าเราไม่รับคณะผู้มาเยือนมาตั้งแต่แรก...?"
10037080-108 = "ทุกคนจงดูเข้าไว้ ราชาทมิฬก่อวายุลูกใหญ่แล้ว"
10037080-109 = "เปิดประตูบานที่ปิดอยู่เปิดออก ฝุ่นมหาศาลสาดเข้ามา"
10037080-110 = "วารีมิอาจต้านทานวายุ ปฐพีก็ร้าวแตกเป็นเสี่ยงๆ เพราะพวกตั๊กแตน"
10037080-115 = "บุคคลที่ยโสโอหังไม่อาจย้อนกลับไปดูตัวเองได้ น้ำตาจึงหยดลงบนพื้นดินแทนน้ำฝน!"
10037080-120 = "(...!)"
10037080-121 = "(คางุยะ... กำลังพูดถึงเรา...? มิหนำซ้ำยังพูดต่อหน้ามังกรดำทุกคนด้วย...?!)"
10037080-127 = "(อึก... ร่างกายเรายังไม่สมบูรณ์สินะ แต่ว่า...)"
10037080-133 = "เราจะพูดในฐานะราชาทมิฬอีกครั้ง"
10037080-134 = "ภูเขาไม่เกี่ยงความสูง ส่วนทะเลก็ไม่เกี่ยงความลึก"
10037080-135 = "แผ่นดินที่เหลือจะต้อนรับวายุ และผืนนภาจะโอบกอดก้อนเมฆ"
10037080-136 = "แม้เราจะทรยศสวรรค์ แต่เราจะไม่ยอมให้สวรรค์ทรยศเรา!"
10037080-137 = "พวกเราจะเห็นอกเห็นใจท่านอีกครั้ง โปรดจงสงบจิตใจและดูแลรักษาร่างกายของท่านเถิด"
10037080-138 = "เมื่อคิดว่าจะจบ ตอนนี้เองถึงตระหนักถึงการมีอยู่"
10037080-139 = "การยอมรับคำตักเตือนคือกฎของการดำรงอยู่"
10037080-140 = "หากท่านยอมสูญเสียพรรคพวกเพื่อแสดงหาผลประโยชน์เพียงเล็กน้อย จะไม่ให้พวกเราร้องรํ่ารําพัน#nได้อย่างไรกัน!"
10037080-145 = "คนที่ชื่อราชาทมิฬอะไรนั่นเป็นคนแน่วแน่จังเลยนะ แถมยังมีแรงขับเคลื่อนอีก นี่ละสิ่งที่ผู้นำควรมี!"
10037080-146 = "แล้วพวกลูกน้องน่ะเป็นอะไรกันหมด! ราชาก็ทำทุกอย่างด้วยเจตนารมณ์ที่ดีไม่ใช่เหรอ! "
10037080-147 = "พวกลูกน้องที่เป็นเหมือนนกกระจอกน่ะ ไม่เข้าใจนโยบายของผู้นำที่ยิ่งใหญ่อย่างพวกเราหรอก ว่าไหมล่ะ ประมุขคิซากิ?"
10037080-153 = "เอ๋? ทำไมสีหน้าไม่สู้ดีเลยล่ะ ไหวหรือเปล่า? ประมุข?"
10037080-157 = "อ่า... เราไม่เป็นอะไร ไม่มีปัญหา เลขาธิการเชริโน่"
10037080-158 = "(เธอไม่พอใจงานแลกเปลี่ยนครั้งนี้ถึงเพียงนี้เชียวหรือ คางุยะ)"
10037080-159 = "(ไม่สิ... หรือว่าคิดจะยื่นอุทธรณ์โดยการใช้การแสดงงิ้วเป็นเครื่องมือ...?)"
10037080-161 = "ราชาทมิฬก่อวายุลูกใหญ่"
10037080-162 = "ฝนจึงตกหนัก จนน้ำในแม่น้ำเอ่อล้น"
10037080-163 = "ภูเขาและทุ่งนาจมอยู่ใต้น้ำ คลื่นขนาดใหญ่ปกคลุมทะเล"
10037080-165 = "สายฟ้าและพวยน้ำพลิกแผ่นดิน เสียงร้องไห้และความขุ่นเคืองสะท้อนดังกึกก้อง!"
10037080-170 = "นี่พวกเราไม่ได้ฟังผิดไปใช่มั้ย?!"
10037080-171 = "แต่ถึงยังไง... ท่านประมุขก็เป็นคนเชิญแขกจากเรดวินเทอร์มาที่นี่ก่อนอย่างที่พวกนั้นเปรียบเปรย..."
10037080-172 = "แต่แขกจากเรดวินเทอร์ก็ไม่ได้ก่อเรื่องอะไรใหญ่โตนี่นา?!"
10037080-173 = "ไม่หรอก... ฉันว่าฉันพอจะรู้แล้วละ เขื่อนกั้นน้ำขนาดใหญ่ยังพังทลายได้เพราะรูเล็กๆ ไม่ใช่หรือไง"
10037080-174 = "หมายความว่า... ท่านประมุขจะเริ่มยอมรับกลุ่มอำนาจจากภายนอก โดยเริ่มจากคณะผู้มาเยือนจากเรดวินเทอร์งั้นเหรอ?"
10037080-175 = "ฉันก็หวังว่าจะไม่เป็นอย่างนั้นหรอกนะ... "
10037080-176 = "แต่เหตุการณ์โสมหมื่นปีครั้งก่อนก็ด้วย ฉันเริ่มมีข้อสงสัยนิดหน่อยแล้วละว่าท่านประมุขพยายามจะ#nรักษาประเพณีของซานไห่จิงจริงๆ หรือเปล่า..."
10037080-177 = "ระ... ระวังปากหน่อยสิ!"
10037080-178 = "ฉันก็พูดเบาๆ อยู่นี่ไง...!"
10037080-183 = "ความเจ็บปวดหลั่งไหลดั่งแม่น้ำ และความขุ่นเคืองก็ไปแตะท้องนภา"
10037080-184 = "ยาที่ดี แม้จะมีรสขมแต่ก็เป็นประโยชน์ต่อการรักษาโรค"
10037080-185 = "คำตักเตือนอาจฟังไม่รื่นหู แต่เป็นประโยชน์ต่อความประพฤติ"
10037080-186 = "หากเปลี่ยนใจตอนนี้ แล้วกลับมาเดินให้ถูกทาง"
10037080-187 = "ประเพณีก็จะยังคงอยู่เหมือนเดิมได้"
10037080-189 = "เราไม่ใช่คนผิด เราจะไม่ยอมทิ้งเจตนารมณ์หรอก!"
10037080-191 = "ได้โปรดกรุณาด้วยเถิด!"
10037080-192 = "นกกระจอกอย่างพวกเจ้าจะมารับรู้เจตนารมณ์ของนกฟีนิกซ์ได้อย่างไร!"
10037080-193 = "ไม่ว่าจะนกกระจอกหรือนกฟีนิกซ์ ก็มีชีวิตเหมือนกันหมด!"
10037080-198 = "(ฮะ... ฮึ่ยยยยย...!)"
10037080-199 = "(คางุยะคิดอะไรอยู่กันแน่...! ไม่สิ... ที่สำคัญกว่านั้น...)"
10037080-205 = "(บรรยากาศที่กระสับกระส่ายของสมาชิกมังกรดำเป็นปัญหาหนักกว่าอีก...!)"
10037080-206 = "(ถ้าจะถ่ายทอดสารนี้ออกมาเป็นข้อความแบบลายลักษณ์อักษร ก็อาจจะมีประสิทธิภาพน้อย...!)"
10037080-207 = "(แต่ถ้าส่งสารด้วยการแสดงอย่างเปิดเผยแบบนี้ละก็...!) "
10037080-208 = "(เราควรให้ประมุขออกไปจากที่นี่ แล้วไปซ่อนตัวไว้ก่อน!)"
10037080-214 = "นักแสดงถือธงที่วาดเป็นรูปเปลวไฟ... วิ่งขึ้นไปบนเวทีแล้วค่ะ"
10037080-215 = "การทำแบบนั้นคงเป็นการบอกว่า... โลกกำลังลุกเป็นไฟใช่ไหมคะ?"
10037080-216 = "ส่วนรอบนี้เป็นธงที่มีรูปน้ำไหล..."
10037080-217 = "ก็หมายความว่าเกิดน้ำท่วมอย่างนั้นเหรอคะ?"
10037080-218 = "สายฟ้ากับฝูงตั๊กแตน... หมายความว่ากำลังเกิดภัยพิบัติทั้งปวงในที่เดียวกันสินะคะ"
10037080-224 = "(ฉันเองก็ระมัดระวังตัวเผื่อเกิดเรื่องอะไรอยู่เหมือนกัน)"
10037080-228 = "(แต่แบบนี้มันคือ... การปฏิวัติสินะคะ) "
10037080-230 = "ทุกคนจงดูเข้าไว้ ในที่สุดราชาทมิฬก็ล้มลงด้วยการกระทำของตัวเอง"
10037080-231 = "ผู้เป็นประมุขย่อมต้องปกครองอย่างถูกทำนองคลองธรรม"
10037080-232 = "แต่กลับฝืนประกาศิตจากสวรรค์เพราะความบกพร่องและความโลภของตัวเอง"
10037080-233 = "แม้ทุกคนจะร่ำไห้ด้วยความโศกเศร้า แต่ก็ไม่มีอะไรหลงเหลืออยู่ดี"
10037080-235 = "พูดถึงประกาศิตจากสวรรค์ด้วย...!"

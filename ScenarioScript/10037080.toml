[translation]
10037080-1 = "第8話;側耳傾聽人偶之語"
10037080-3 = "怎麼突然要表演新的京劇……真稀奇。"
10037080-4 = "不過上次的京劇還挺不賴的，這次應該也可以好好期待一下吧！"
10037080-5 = "是啊，妾身也很期待。#n如此興致勃勃的輝夜，可真是久違了啊。"
10037080-6 = "唔呣！咱現在也慢慢能熟悉這種旋律了！"
10037080-7 = "身穿盔甲的演員們一個接一個地跑來，然後排成一列……"
10037080-11 = "這次的主角也穿著黑色的盔甲耶！咱好像開始看得出細節了哦！"
10037080-12 = "呵呵，是嗎？那真是太好了。"
10037080-22 = "浮生若夢。"
10037080-25 = "為何依然苦苦掙扎？"
10037080-26 = "何不橫躺在那梁柱下。"
10037080-27 = "忽然夢醒，望向庭院。"
10037080-29 = "鳥兒在那繁花間啼叫。"
10037080-31 = "出聲詢問現在是幾時。"
10037080-32 = "黃鸝之歌隨春風搖曳。"
10037080-34 = "高聲吟唱，靜待月升！"
10037080-39 = "序章好像都是在吟唱世間風情呢……"
10037080-40 = "畢竟京劇本來就有固定的編排規定，這也算是一種口令吧。"
10037080-41 = "不過這齣劇是輝夜部長新想出來的吧？"
10037080-42 = "才沒過幾天又重新投入創作之中，真是太厲害了。"
10037080-47 = "輕薄之霧，籠罩湖面。"
10037080-48 = "陽光明媚，今年亦將是個豐年。"
10037080-49 = "別無所求，世間太平。"
10037080-50 = "龍鳳呈祥，嘴含祥瑞之氣。"
10037080-52 = "看啊，諸位。黑色君主已步入庭院。"
10037080-53 = "機智而敏銳，卻視野狹隘的拙劣之人。"
10037080-54 = "居萬人之上，卻不曾將眼光放低之人。"
10037080-58 = "雖有智慧體認自身的不足──"
10037080-59 = "卻未有勇氣克服不足之人！"
10037080-64 = "咦……咦！？#n等，等等，這該不會是在……？"
10037080-65 = "你講話太大聲了！不會是我們聽錯了吧？"
10037080-66 = "應，應該只是在比喻……或者講述以前的故事吧？#n總之先繼續聽下去吧……"
10037080-67 = "就算是這樣……這歌詞也未免寫得太容易讓人誤會了吧……什麼黑色君主啊……"
10037080-69 = "妾身──黑色君主於此宣告。"
10037080-70 = "被掩蓋的爭執已蔓延至庭院，被隱匿的怨恨已觸及了椽木。"
10037080-71 = "妾身將敞開緊閉的門扉，引進外來之風。"
10037080-72 = "這就是屬於妾身的路，所有人聽此號令。"
10037080-77 = "（……！？敞開緊閉的門扉，引進外來之風……？）"
10037080-78 = "（總覺得不太對勁……#n　其他學生……尤其是玄龍門成員的反應如何？）"
10037080-85 = "（和其他山海經的學生相比，玄龍門的成員應該更能聽懂京劇歌詞的涵義才對……）"
10037080-86 = "（輝夜……他到底想做什麼！？）"
10037080-88 = "仔細審視，遙想往事吧。"
10037080-89 = "違逆者將受怒火折磨。"
10037080-90 = "蒼天之力神聖無比。"
10037080-91 = "凡人伎倆又有何用。"
10037080-93 = "居安思危。"
10037080-94 = "居危思安。"
10037080-95 = "天地造化如此無法預料。"
10037080-96 = "以風之力使抑制之物壯大，後使壯大之物再次沉寂。"
10037080-98 = "看啊，凡人的智慧是如此渺小。"
10037080-99 = "誇耀智慧之人將更顯愚昧。"
10037080-100 = "警戒那無福消受的好運與飛來的橫財吧。"
10037080-101 = "目光短淺之人，終將落入陷阱。"
10037080-103 = "京劇部的人是瘋了嗎！？"
10037080-104 = "他們是對門主有什麼不滿？#n就算真的是這樣，為什麼偏偏要在赤冬訪問團來的時候……"
10037080-105 = "等，等等。他們該不會就是因為赤冬訪問團才這麼做的吧！？"
10037080-106 = "唔……這麼說來，假如一開始就不邀請訪問團來的話……？"
10037080-108 = "看啊，各位。黑色君主已召來新風。"
10037080-109 = "緊閉的門扉敞開，漫天的塵埃在屋內肆虐。"
10037080-110 = "清水不敵勁風，大地苦於蟲患。"
10037080-115 = "若傲慢之人不懂自省，眼淚將代替雨水澆灌大地！"
10037080-120 = "（……！）"
10037080-121 = "（輝夜這是在對妾身……？而且還是在玄龍門的眾人面前……！？）"
10037080-127 = "（唔……妾身的狀態還沒有恢復，但是……）"
10037080-133 = "妾身──黑色君主再次宣告。"
10037080-134 = "山不厭高，海不厭深。"
10037080-135 = "遺地喜迎風，青天擁白雲。"
10037080-136 = "即便妾身願放棄天下，天下也不願捨棄妾身！"
10037080-137 = "敬請明察！應當沉心靜氣、調養生息。"
10037080-138 = "見微知著，持先見之明──"
10037080-139 = "傾聽忠言才是存續之道啊！"
10037080-140 = "若因小而失大，何不教人痛哭流涕！"
10037080-145 = "那個被稱為黑色君主的角色，還真有魄力和行動力啊。#n當然，領導者本來就該如此！"
10037080-146 = "相較之下，那些臣子們真不像話！全都是些各懷鬼胎的傢伙！"
10037080-147 = "當然，像咱們這種偉大領導者的政策，那些愚鈍的臣子想必是無法理解的。#n你說是不是，妃姬門主？"
10037080-153 = "咦？你的臉色看起來不太好……沒事吧，門主？"
10037080-157 = "啊……妾身沒事。#n汝無須擔心，潔莉諾書記長。"
10037080-158 = "（汝竟對本次的交流會感到如此不滿嗎，輝夜）"
10037080-159 = "（不……或許更應將其稱之為京劇形式的諫言……？）"
10037080-161 = "黑色君主已召來新風。"
10037080-162 = "天降暴雨，江水翻湧。"
10037080-163 = "山川已成汪洋，巨浪於海肆虐。"
10037080-165 = "雷電龍捲侵襲大地，悲鳴怨恨徘徊不散！"
10037080-170 = "真不是我們聽錯了吧！？"
10037080-171 = "可是，一開始的確是門主大人主動邀請赤冬訪問團來的……"
10037080-172 = "但訪問團也沒闖出什麼亂子啊！"
10037080-173 = "不……其實我能夠理解京劇部的心情。#n所謂「千里之堤，潰於蟻穴」。"
10037080-174 = "你的意思是說……#n赤冬訪問團只是個開始，門主大人接下來還會開放更多外部勢力進入山海經嗎？"
10037080-175 = "雖然我也不希望那樣……"
10037080-176 = "但經歷上次的萬年蔘事件後，我有時也會懷疑……#n門主大人是否真的有心要維持山海經的傳統……"
10037080-177 = "你，你可別亂說話！"
10037080-178 = "所以我不是已經講得很小聲了嗎……！"
10037080-183 = "苦痛如江水綿延，恨意已有如天高。"
10037080-184 = "良藥苦口利於病。"
10037080-185 = "忠言逆耳利於行。"
10037080-186 = "如願回心轉意，重回正途──"
10037080-187 = "自此再不偏頗，則一切尚有轉機。"
10037080-189 = "錯不在妾身，故妾身之意將不會屈服！"
10037080-191 = "敬請明察！"
10037080-192 = "燕雀安知鴻鵠之志！"
10037080-193 = "然燕雀與鴻鵠之命，豈有孰輕孰重！"
10037080-198 = "（唔……唔啊啊啊啊……！）"
10037080-199 = "（輝夜到底想做什麼……！不，比起那個……）"
10037080-205 = "（玄龍門的成員們各各面露不安才是最大的問題……！）"
10037080-206 = "（如果他是利用上奏檄文這種明著來的方式，或許效果還相對有限……！）"
10037080-207 = "（但他卻選擇了京劇表演這種既隱晦而公開的手段……！）"
10037080-208 = "（我看乾脆先送門主離開這裡好了！）"
10037080-214 = "……演員們舉著火焰圖案的旗幟，在舞台上跑來跑去的呢。"
10037080-215 = "我記得……這代表的是世界陷入火海的意思，對吧？"
10037080-216 = "然後這次又舉著流水圖案的旗幟……"
10037080-217 = "這指的是洪水嗎？"
10037080-218 = "雷電和成群的蝗蟲……意思似乎是指天災接連發生呢。"
10037080-224 = "（為了以防萬一，我一直在注意四周……）"
10037080-228 = "（……看來這是場政變呢）"
10037080-230 = "看啊，各位。黑色君主終將自食惡果。"
10037080-231 = "君主本該以正道治理天下。"
10037080-232 = "然而卻被自身的貪念和不足所縛，甚至違逆天意。"
10037080-233 = "眾人的悲痛和憤恨，最後究竟留下了什麼？"
10037080-235 = "竟然還提到了天意……！"
10037080-236 = "我現在終於明白輝夜部長到底想表達什麼了……"
10037080-237 = "可是……那是我們的門主耶……"
10037080-238 = "話雖如此……雖然我也不想往這方面去想……"
10037080-243 = "但要是門主真的無心守護山海經的傳統怎麼辦……？"
10037080-244 = "我，我才不要去想那種事！"
10037080-246 = "我們的家鄉就在那遠處。"
10037080-247 = "赤松和紅松鬱鬱蔥蔥。"
10037080-248 = "野兔在坑洞裡進進出出。"
10037080-249 = "無所覺的雉雞飛上橫樑。"
10037080-250 = "搗碎穀粒，煮制米飯。"
10037080-251 = "摘取野葵，烹煮熱湯。"
10037080-252 = "一桌美味即將出爐。"
10037080-253 = "可又有誰能與我同食？"
10037080-255 = "啊啊……這句歌詞真是令人心痛……"
10037080-256 = "因為一切都已衰亡，所以連個能一起吃飯的人都沒有了……"
10037080-260 = "……如果那就是山海經的未來呢？"
10037080-261 = "那怎麼……可能……！絕對不可能……！"
10037080-262 = "你看，連你都講得那麼沒自信。"
10037080-268 = "各位都聽好了。#n別忘了時刻謙虛自省、精益求精。"
10037080-269 = "傳承之物必有其淵源。"
10037080-273 = "若不知昨日的積累是明日的根基──"
10037080-274 = "若視天意而不見，故作糊塗，則終將迎來無可避免的下場。"
10037080-275 = "為了不讓此等悲劇發生──"
10037080-279 = "──我以山海經及其傳統之名，論劾現在的玄龍門門主龍華妃姬！"
10037080-288 = "……！"

[translation]
10037080-1 = "Episode 8;Listen to the Doll"
10037080-3 = "The premier show of a new performance, out of the blue... How fascinating."
10037080-4 = "Considering the first show was good, I'm sure it'll be great this time too!"
10037080-5 = "Yes. I'm looking forward to it. And it's been such a long time since Kaguya has been so enthusiastic about a piece."
10037080-6 = "Mm! I think I'm getting used to this sound!"
10037080-7 = "Oh, the actors dressed in armor, raced onstage in a line, and queued up neatly."
10037080-11 = "The lead role is wearing black armor this time too! I'm starting to recognize more of the details now!"
10037080-12 = "Fufu! Is that so? That's good to hear."
10037080-22 = "Living is like a big dream."
10037080-25 = "How can one struggle so fiercely to live life?"
10037080-26 = "Whatever happens, I lie beneath the pillar."
10037080-27 = "Suddenly I awake. I look into the yard."
10037080-29 = "A single bird calls out from among the flowers."
10037080-31 = "Let us inquire about what kind of time is now."
10037080-32 = "The sound of a nightingale is like the flowing of a spring breeze."
10037080-34 = "It sings loudly and awaits the moon's arrival!"
10037080-39 = "So... It always begins by setting the scene around the characters."
10037080-40 = "Peking opera always follows a prescribed form—almost as if it's been ordered to do so."
10037080-41 = "But it looks like Kaguya wrote this from scratch, right?"
10037080-42 = "Yes, she wrote up the whole performance in a matter of days. Impressive."
10037080-47 = "The light fog blooms above the lake."
10037080-48 = "The dappled sunlight promises a good harvest this year."
10037080-49 = "The world is peaceful, as I have nothing else to wish for."
10037080-50 = "The dragon and phoenix held auspicious energy in their mouths."
10037080-52 = "Look, people. The Dark Monarch is walking across the yard."
10037080-53 = "She is intelligent and sharp, yet narrow-minded and foolish."
10037080-54 = "She reigns and rules but cannot lower her gaze."
10037080-58 = "Though she is wise enough to know her own weaknesses."
10037080-59 = "But she is not brave enough to overcome them!"
10037080-64 = "H-huh...?! W-wait. Was that just...?"
10037080-65 = "You're talking too loud! Did we hear that right?"
10037080-66 = "I-it could just be an old idiom or metaphor, right? Let's keep listening..."
10037080-67 = "But still... They left it wide open to interpretation... The Dark Monarch, huh..."
10037080-69 = "I, the Dark Monarch, will borrow the authority to speak."
10037080-70 = "A hidden dispute pervades the yard, and ill-disguised resentment stretches to the rafters."
10037080-71 = "To this, I will open the closed door and call in the outside winds."
10037080-72 = "That is my path, so everyone shall listen and act accordingly."
10037080-77 = "(...?! Open the closed door and call in the outside winds...?)"
10037080-78 = "(I have a bad feeling about this... What will the other students think, especially Genryumon members...?)"
10037080-85 = "(But Genryumon members are well practiced at deciphering a Peking opera, compared to the other Shanhaijing students...!)"
10037080-86 = "(Kaguya... What are you thinking?!)"
10037080-88 = "Forgive and think back on the past."
10037080-89 = "Those who oppose her volition suffer her wrath."
10037080-90 = "The heavens' power is wholeheartedly divine as such."
10037080-91 = "Of what use could man's little tricks be."
10037080-93 = "Consider, fragility within peace."
10037080-94 = "Consider again, peace within fragility."
10037080-95 = "The harmony of heaven and sky is unpredictable as this."
10037080-96 = "So open up the things suppressed by the wind's power, and suppress again what's open."
10037080-98 = "Look, people. The wisdom of man is this short-lived."
10037080-99 = "Anyone who boasts of their wisdom will become foolish."
10037080-100 = "Beware of windfalls and fortune that overflows from the fountain without reason."
10037080-101 = "You must focus your gaze on higher places, or you will fall victim to those tricks."
10037080-103 = "What's with those Peking Opera Club kids?"
10037080-104 = "Are they upset with Madam for some reason? If so, they really shouldn't be airing their grievances in front of Red Winter's visitors..."
10037080-105 = "W-wait. Are they acting like this specifically because of those Red Winter visitors?!"
10037080-106 = "Oh... Now that I think about it, what if visitors were never accepted in the first place...?"
10037080-108 = "Look, people. The Dark Monarch has welcomed the wind in."
10037080-109 = "The closed door opens, and the dust goes rampant within."
10037080-110 = "The water cannot defeat the wind, and the earth is laid to waste by locusts."
10037080-115 = "The prideful one cannot reflect on oneself, and tears, not rain, wet the earth!"
10037080-120 = "(...!)"
10037080-121 = "(Would Kaguya really do this to me in front of all of Genryumon...?!)"
10037080-127 = "(Ugh... I must not be completely back to normal. However...)"
10037080-133 = "I, the Dark Monarch, will borrow the authority to speak once again."
10037080-134 = "The mountain does not shun height, and the ocean does not shun depth."
10037080-135 = "The remaining earth will welcome the wind, and the sky will embrace the clouds."
10037080-136 = "I may forsake the world, but I won't let the world abandon me!"
10037080-137 = "I humbly ask again. Please calm your spirits and take care of yourself."
10037080-138 = "She knows what will come before it happens, and she contemplates the end upon the beginning."
10037080-139 = "Accepting honest advice is the way to subsisting."
10037080-140 = "How can one not weep, after losing multitudes for the sake of a small gain!"
10037080-145 = "The Dark Monarch has a strong will...and drive! That's just as a leader should!"
10037080-146 = "And those lieges who fell for that! Everything is done with intention! "
10037080-147 = "There will always be short-sighted lieges who can't see the visions of distinguished leaders like us. Isn't that true, Madam Kisaki?"
10037080-153 = "Huh? You don't look so good. Are you okay? Madam?"
10037080-157 = "Ah... I'm okay. There's nothing wrong, Great Leader Cherino."
10037080-158 = "(Were you that displeased by the exchange meeting, Kaguya?)"
10037080-159 = "(More importantly, are you making an appeal in the form of a Peking opera...?)"
10037080-161 = "Now that the Dark Monarch has called in the wind."
10037080-162 = "Heavy rains fall from the sky, and the river overflows."
10037080-163 = "The mountains and fields are flooded, and the ocean roils."
10037080-165 = "Lightning and tornadoes ravage the earth, letting cries and resentment echo!"
10037080-170 = "We're not mishearing this, are we?!"
10037080-171 = "...It's true that the president invited the Red Winter visitors first..."
10037080-172 = "But it's not like that visiting group created a huge problem or anything!"
10037080-173 = "No... I think I'm starting to understand. Eventually, even the tiniest of holes can bring down a levee."
10037080-174 = "...So the president will start allowing external influences, starting with the Red Winter visitors."
10037080-175 = "I hope that won't happen... "
10037080-176 = "The same goes for the ten-thousand-year ginseng incident, but whether the president is really trying to protect the traditions of Shanhaijing... Well, sometimes I doubt her a little..."
10037080-177 = "W-Watch what you're saying!"
10037080-178 = "That's why I'm speaking quietly!"
10037080-183 = "Pain flows like the river, and resentment stretches to the skies."
10037080-184 = "Good medicine is bitter to the taste, but it is beneficial for illnesses."
10037080-185 = "Advice is bothersome to the ear but beneficial for one's conduct."
10037080-186 = "If one is to follow the path of goodness by changing one's heart even now."
10037080-187 = "They can revert without being carried away, forward or backward."
10037080-189 = "I am not wrong, so I will not compromise!"
10037080-191 = "I beg your kindness!"
10037080-192 = "How could a sparrow possibly comprehend the will of a phoenix!"
10037080-193 = "The life of a sparrow, the life of a phoenix, they are all the same lives!"
10037080-198 = "(Aughhh... Aughhh...!)"
10037080-199 = "(What could Kaguya possibly be thinking...! No, wait...)"
10037080-205 = "(The bigger problem is the anxious energy coming from Genryumon members...!)"
10037080-206 = "(The effect would have been lessened if this message was relayed in a straightforward, manifesto-type manner...!)"
10037080-207 = "(But to be discreet yet so public by holding a performance...!)"
10037080-208 = "(The president needs to be evacuated...now!)"
10037080-214 = "...Now the actors are holding flags with flames drawn on them and running around the stage."
10037080-215 = "That means the world is on fire, right?"
10037080-216 = "And the flags with flowing water on them..."
10037080-217 = "Do they represent a flood?"
10037080-218 = "Locust swarms and lightning... It seems like all of the natural disasters are happening at once."
10037080-224 = "(I've been watching carefully, just in case.)"
10037080-228 = "(...But I see this is a coup d'etat.)"
10037080-230 = "Look, people. The Dark Monarch has finally fallen over on her own."
10037080-231 = "A monarch should properly reign over their people."
10037080-232 = "But went against God's plan due to greed and inadequacy."
10037080-233 = "Even if everyone cries sorrowfully and gnashes their teeth, what could be left."
10037080-235 = "They mentioned God's plan...!"
10037080-236 = "...I at least know what President Kaguya is trying to say..."
10037080-237 = "But...that's our president she's talking about..."
10037080-238 = "Well, that's true... I can't bear to think about this, but..."
10037080-243 = "What if the president really had no desire to protect the traditions of Shanhaijing...?"
10037080-244 = "I-I can't think about something like that!"
10037080-246 = "That place you see over there is our home."
10037080-247 = "Overgrown with pine trees and pine nut trees."
10037080-248 = "The wild hare frequents the small hole."
10037080-249 = "The indifferent pheasant flies above the beams."
10037080-250 = "Strip and mash the grains into rice."
10037080-251 = "Pick the mallow leaves and boil them into a soup."
10037080-252 = "The soup and rice are ready in no time."
10037080-253 = "Who is there to eat with?"
10037080-255 = "Oh... Such heart-wrenching lyrics..."
10037080-256 = "To think there isn't a single person to eat with because everything is in decline..."
10037080-260 = "...What if that's the future of Shanhaijing?"
10037080-261 = "...No way...! That's impossible...!"
10037080-262 = "See. Even you don't sound confident. "
10037080-268 = "Listen well, people. Always be humble, reflect on yourself, and don't forget self-improvement."
10037080-269 = "There is reason behind everything."
10037080-273 = "She had no idea that the self-reflection of yesterday would continue into tomorrow."
10037080-274 = "As she turned her gaze from her divine destiny and feigned ignorance, her fate became inevitable."
10037080-275 = "To prevent something like this from occurring again..."
10037080-279 = "In the name of Shanhaijing and its traditions, I denounce Ryuuge Kisaki, president of Genryumon!"
10037080-288 = "...!"

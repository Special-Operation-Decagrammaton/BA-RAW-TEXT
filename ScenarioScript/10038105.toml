[translation]
10038105-11 = "ทำไมถึงเป็นแบบนี้ไปได้...?"
10038105-12 = "ฮุฮุฮุ ยังไม่รู้อีกหรือ? เช่นนั้นเราก็จะบอกให้รู้เอง"
10038105-16 = "ลองนึกถึงโรคระบาดที่เธอทำให้แพร่กระจายไปทั่วซานไห่จิงสิ พวกเราเรียกโรคนั้นว่าโรคเด็กลงน่ะ"
10038105-17 = "โรคนั้น... ทำให้อายุและโครงสร้างของร่างกายถดถอยกลับคืนสู่วัยเด็ก..."
10038105-21 = "อย่าบอกนะว่า?!"
10038105-22 = "ใช่ ด้วยเหตุนี้ ร่างกายของเราจึงกลับคืนสู่สภาพที่ดีที่สุดเท่าที่เคยเป็นมา"
10038105-23 = "ตั้งแต่ตอนไหนกัน...?!"
10038105-24 = "นั่นน่ะสิ ตั้งแต่ตอนไหนกันนะ?"
10038105-25 = "คิซากิ...!"
10038105-26 = "ฮุฮุฮุ เธอขุดหลุมฝังตัวเองแล้วละ ชินทานิ ไค"
10038105-27 = "ว่าอย่างไรเล่า? ถ้ายังจะสร้างปัญหาต่ออีกละก็"
10038105-31 = "เราก็จะได้เห็นดีกัน"
10038105-37 = "..."
10038105-41 = "ครั้งนี้เป็นความพ่ายแพ้ของฉัน"
10038105-42 = "แต่เธอคิดจะลงโทษฉันยังไงกันล่ะ คิซากิ?"
10038105-43 = "ที่เธอส่งฉันไปอยู่ห้องคุมขังตั้งแต่แรก ก็เพราะคิดว่าซานไห่จิงรับมือฉันไม่ไหวไม่ใช่เหรอ?"
10038105-44 = "..."
10038105-48 = "ก็จริงที่เธอเป็นนักเรียนที่เกินกว่าที่ซานไห่จิงจะรับมือได้ในหลายๆ แง่..."
10038105-49 = "แต่ถึงอย่างนั้น การตัดสินใจของมังกรดำก็ไม่เปลี่ยนแปลง"
10038105-50 = "เธอจะถูกส่งตัวไปอยู่ห้องคุมขังอีกครั้ง และครั้งนี้เธอจะได้อยู่ในห้องที่เข้มงวดขึ้นเป็นพิเศษ"
10038105-52 = "หึหึหึ... เธอนี่ยังเหมือนเดิมจริงๆ นะ คิซากิ แต่เธอเคยได้ยินมั้ยล่ะว่า..."
10038105-56 = "มีแต่คนบ้าเท่านั้นนั่นละที่ทำเรื่องเดิมซ้ำแล้วซ้ำเล่า แล้วหวังให้ผลลัพธ์ต่างออกไป"
10038105-58 = "จะพูดอะไรก็พูดเถอะ... ชินทานิ ไค"
10038105-59 = "ไม่ว่าเธอจะทำอะไรอยู่แห่งหนไหน มังกรดำก็จะจัดการเธอให้ได้ทุกครั้ง"
10038105-64 = "เล่นเอาหัวเราะไม่ออกเลยแฮะ หมดสนุกเลย ถ้างั้นครั้งนี้ฉันจะถามจากครูแล้วกัน"
10038105-65 = "[s] \"หืม? ครูเหรอ?\""
10038105-66 = "ใช่ ฉันสนใจสิ่งต่างๆ ในตัวครูมานานแล้ว"
10038105-67 = "ฉันได้ยินมาว่าครูคือผู้ใหญ่ที่อยู่เคียงข้างนักเรียนทุกคน เป็นอย่างที่ว่ามั้ยล่ะ?"
10038105-68 = "[s] \"ใช่ ได้ยินมาถูกแล้วละ\""
10038105-69 = "ถ้าอย่างนั้นก็นับรวมฉันด้วยหรือเปล่า?"
10038105-70 = "[s] \"แน่นอนอยู่แล้ว\""
10038105-71 = "โฮ่?"
10038105-76 = "ครู...!"
10038105-77 = "[s1] \"ถ้ายอมรับผิด และสัญญาว่าจะไม่ทำร้ายนักเรียนคนอื่นอีกน่ะนะ\"\n[s2] \"ถ้ากลับตัวกลับใจ ครูก็จะอยู่เคียงข้างเธอเอง\""
10038105-80 = "ต้องมีเงื่อนไขอะไรด้วยสินะ..."
10038105-81 = "แต่ฉันไม่คิดว่าตัวเองต้องสำนึกผิดหรือกลับตัวกลับใจหรอกนะครู"
10038105-82 = "[s3] \"ถ้าอย่างนั้น ครูก็ต้องทำให้เธอได้รับ 'บทเรียน' แล้วละ\" \n[s4] \"ถ้าอย่างนั้น เธอก็ต้องได้รับ 'บทเรียน' จากครูแล้วละ\" "
10038105-86 = "[ns] \"เพราะถ้าเป็นไปได้ ครูก็ไม่อยากยอมแพ้ในนักเรียนคนไหนเลย\""
10038105-90 = "ครู..."
10038105-91 = "..."
10038105-92 = "ถ้าอย่างนั้น นี่เป็นแค่การสมมติหรอกนะครู"
10038105-93 = "ฉันถามเพราะจู่ๆ ก็เกิดความสงสัยเป็นการส่วนตัวขึ้นมาน่ะ"
10038105-94 = "ไม่ว่าจะเป็นนักเรียนที่ทั้งเหลวไหลและดื้อด้านขนาดไหน"
10038105-95 = "ไม่ว่าจะเป็นนักเรียนที่ไม่ว่ายังไงก็ไม่ยอมสำนึกผิด หรือต่อให้เป็นนักเรียนที่เปรียบได้ดั่งกับปีศาจ..."
10038105-96 = "ถึงอย่างนั้น ครูก็จะยังเลือกทำเหมือนเดิมงั้นหรือ?"
10038105-100 = "[ns5] \"ต่อให้เป็นอย่างนั้น ครูก็จะพยายามให้ถึงที่สุด\"\n[ns6] \"ครูจะยังทำเหมือนเดิม เพราะนั่นคือหน้าที่ของครูอยู่แล้ว\""
10038105-103 = "แล้วถ้าเป็นนักเรียนที่ยังไงก็เคี่ยวเข็ญไม่ได้อยู่ดีล่ะ?"
10038105-104 = "[s] \"ครูขออะไรอย่างหนึ่งเถอะ ไค\""
10038105-111 = "[ns] \"ทำให้ครูไม่อยากยอมแพ้ในตัวเธอเถอะนะ\""
10038105-115 = "...!"
10038105-116 = "หึ... หึหึหึ... ฮ่าฮ่าฮ่าฮ่าฮ่า! พูดจี้จุดอ่อนฉันเลยนะ! คิดไม่ถึงเลยว่าจะมาไม้นี้!"
10038105-117 = "ดีละ งั้นก็จับตัวฉันไป ฉันจะยอมให้จับแต่โดยดี เพราะเห็นแก่คำตอบของครูหรอกนะ!"
10038105-118 = "ขอให้ฉันทำให้ครูไม่อยากยอมแพ้ในตัวฉันงั้นเหรอ... อ่า... สนุกดีนะ สนุกมากๆ เลยละ"
10038105-119 = "ชินทานิ ไค ยังมีสิ่งสุดท้ายที่เธอต้องทำ"
10038105-120 = "ว่ามาสิ ตอนนี้ฉันกำลังอารมณ์ดีเลยละ"
10038105-121 = "ซานไห่จิงต้องการยารักษาโรคเด็กลงให้หายขาด"
10038105-122 = "เรื่องนั้นเองเหรอ... โรคเด็กลงมีคุณสมบัติในการติดต่อได้ ดังนั้นยารักษาก็ต้องมีคุณสมบัติในการต้าน#nการติดต่อ และยานั่นก็ถูกผลิตไว้แล้ว"
10038105-123 = "เธอจะแจกจ่ายยานั้นตอนนี้เลยก็ได้ ไม่มีปัญหาอะไรหรอก"
10038105-124 = "หึหึหึ... ว่าแต่จะไม่เป็นอะไรเหรอ? ถ้ามีการแจกจ่ายยารักษา ร่างกายของเธอก็จะกลับไปอยู่ในสภาพ#nที่อ่อนแอนะ?"
10038105-125 = "คำถามนั้นเราไม่จำเป็นต้องตอบหรอก"
10038105-130 = "หากนั่นทำให้ซานไห่จิงกลับมาเป็นเหมือนเดิม และทำให้เราจัดเทศกาลเงาจันทร์ได้อย่างราบรื่นละก็"
10038105-131 = "มีเหตุผลที่เราจะไม่ทำเช่นนั้นด้วยหรือ?"
10038105-136 = "เธอยังอยากจะเป็นคนธรรมดาสามัญจนถึงวินาทีสุดท้ายเลยสินะ..."
10038105-140 = "ก็ดี อยากจะทำอะไรก็เชิญ แต่ถ้าวันหนึ่งเธอเสียใจกับการเลือกนี้ ฉันก็ไม่รู้ด้วยนะ"
10038105-141 = "ไม่จำเป็นต้องเตือนเราหรอก นั่นมันก็แค่การพูดพร่ำอันไร้ประโยชน์"

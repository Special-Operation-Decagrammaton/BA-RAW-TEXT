[translation]
10038105-11 = "這究竟是怎麼回事……？"
10038105-12 = "呵呵呵，還不明白嗎？#n那就讓妾身來告訴汝吧。"
10038105-16 = "想想汝在山海經散播的……吾等稱之為還童症的疾病吧。"
10038105-17 = "那是……讓身體年齡和結構退化回童年的……"
10038105-21 = "該不會！？"
10038105-22 = "正是如此。#n拜其所賜，妾身的身體反而回到了狀態最好的時候。"
10038105-23 = "是從什麼時候……！？"
10038105-24 = "這個嘛，究竟是從什麼時候呢？"
10038105-25 = "妃姬……！"
10038105-26 = "呵呵呵。是汝自掘墳墓了呢，申谷誡。"
10038105-27 = "汝接下來打算怎麼做？#n若是還想繼續鬧事──"
10038105-31 = "妾身也能奉陪到底哦？"
10038105-37 = "……"
10038105-41 = "是我輸了。至少這次確實如此。"
10038105-42 = "不過你打算怎麼處置我呢，妃姬？"
10038105-43 = "當初不也是因為山海經束手無策，所以才把我送去矯正局嗎？"
10038105-44 = "……"
10038105-48 = "就各方面而言，汝確實是山海經難以處置的學生……"
10038105-49 = "但玄龍門的裁決不會改變。"
10038105-50 = "汝將再次被送往矯正局。這次會送到更嚴格的地方。"
10038105-52 = "呵呵呵……你真是一如既往啊，妃姬。#n但世上有句話是這麼說的。"
10038105-56 = "「反覆同事，期待異果，實乃狂也」。"
10038105-58 = "……隨汝怎麼說吧，申谷誡。"
10038105-59 = "無論汝在何處有何意圖，玄龍門都會一次次地與汝對抗。"
10038105-64 = "簡直無聊到讓人興致全失。#n那麼，這次改問問老師吧。"
10038105-65 = "[s]「嗯？我？」"
10038105-66 = "沒錯。我一直對老師很感興趣。"
10038105-67 = "據我所知，老師是會和所有學生站在一起的大人對吧？"
10038105-68 = "[s]「嗯，沒錯。」"
10038105-69 = "那麼，這也適用於我嗎？"
10038105-70 = "[s]「當然。」"
10038105-71 = "哦？"
10038105-76 = "老師……！"
10038105-77 = "[s1]「如果誡保證不再利用其他學生。」\n[s2]「我隨時都會站在誡這邊。」"
10038105-80 = "……是有附加條件的啊。"
10038105-81 = "不過老師，我認為自己並沒有需要反省的地方。"
10038105-82 = "[s3]「既然如此，誡需要的就是『學習』。」\n[s4]「如果需要有人教你，我隨時都很樂意。」"
10038105-86 = "[ns]「如果可以，我不希望放棄任何學生。」"
10038105-90 = "老師……"
10038105-91 = "……"
10038105-92 = "那麼，老師。#n雖然這只是我個人突然產生的好奇心……"
10038105-93 = "我想向你提出一個假設性的問題。"
10038105-94 = "即便學生多麼荒唐、多麼無可救藥……"
10038105-95 = "即便他無論如何都不會反省，甚至被世人稱為怪物……"
10038105-96 = "即便如此，老師還是會做出相同的選擇嗎？"
10038105-100 = "[ns5]「就算這樣，我還是會盡力而為。」\n[ns6]「因為我們除此之外別無選擇。」"
10038105-103 = "假如真有一個無論如何都無法改變的學生呢？"
10038105-104 = "[s]「我有件事要拜託你，誡。」"
10038105-111 = "[ns]「不要讓我放棄你。」"
10038105-115 = "……！"
10038105-116 = "咯，咯咯……哈哈哈哈哈！#n這還真是出乎我的意料！你竟然會這麼說！"
10038105-117 = "好，抓我走吧。#n看在老師這個回答的份上，我會乖乖跟你們走！"
10038105-118 = "不要讓我放棄你……#n啊啊，真有趣，實在太有趣了。"
10038105-119 = "那麼，申谷誡。#n汝還有最後一件事要做。"
10038105-120 = "說吧。我現在心情很好。"
10038105-121 = "山海經需要能完全治癒還童症的藥。"
10038105-122 = "是為了那件事啊……#n還童症帶有傳染性，而治療藥也是如此。"
10038105-123 = "散佈治療藥倒不成問題，我隨時都能做到。"
10038105-124 = "咯咯……不過你確定嗎？#n散佈治療藥之後，你的身體也會回到病弱的狀態哦？"
10038105-125 = "答案顯而易見。"
10038105-130 = "若山海經能就此回歸正軌，月影祭得以順利舉辦──"
10038105-131 = "妾身豈有理由不這麼做呢？"
10038105-136 = "……直到最後也打算當一名凡夫俗子嗎。"
10038105-140 = "算了，隨你高興吧。#n就算你將來對這個選擇感到後悔，我也管不著哦？"
10038105-141 = "多說無益。"

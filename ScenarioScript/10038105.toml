[translation]
10038105-11 = "How is it possible...?"
10038105-12 = "Fufu. Do you still not understand? I'll explain, then."
10038105-16 = "You spread the Tyke Syndrome throughout Shanhaijing. Think about it carefully."
10038105-17 = "It regresses physical age back to childhood..."
10038105-21 = "No..."
10038105-22 = "Oh, yes. And thanks to that, my body is as healthy as it's ever been."
10038105-23 = "But when did you...?!"
10038105-24 = "Oh, I'm not sure. When was it?"
10038105-25 = "Kisaki, you...!"
10038105-26 = "Fufu. You fell for your own trick, Shintani Kai."
10038105-27 = "So what now? If you haven't had your fill of chaos yet..."
10038105-31 = "...we can keep going as long as you'd like."
10038105-37 = "......"
10038105-41 = "I've lost. This time."
10038105-42 = "So tell me, what do you intend to do with me, Kisaki?"
10038105-43 = "Shanhaijing couldn't hold me. You had me sent to the Corrections Bureau last time."
10038105-44 = "......"
10038105-48 = "Indeed, Shanhaijing has had a great many difficulties with you."
10038105-49 = "But Genryumon's decision stands."
10038105-50 = "You will be transferred back to the Corrections Bureau. And this time, you'll be sent to a much more secure location."
10038105-52 = "Keh heh keh heh... You are nothing if not consistent. But there's a saying, you know."
10038105-56 = "\"Repeating the same actions and expecting a different result is a sign of insanity.\""
10038105-58 = "Say and do as you will, Shintani Kai..."
10038105-59 = "But Genryumon will be there every time."
10038105-64 = "Oh, this isn't even mildly amusing anymore. Let me ask you, Sensei..."
10038105-65 = "[s] \"Huh? Me?\""
10038105-66 = "Yes, I've always had an interest in you."
10038105-67 = "I've heard you're \"always on the students' side.\" Is that true?"
10038105-68 = "[s] \"Yes, that's true.\""
10038105-69 = "Does that apply to me as well?"
10038105-70 = "[s] \"Always means always.\""
10038105-71 = "Hm?"
10038105-76 = "Sen—"
10038105-77 = "[s1] \"If you stop taking advantage of other students.\"\n[s2] \"Promise not to hurt them, and I'll be on your side.\""
10038105-80 = "...Ah, so there are strings attached."
10038105-81 = "But Sensei, what if I told you I've done nothing wrong?"
10038105-82 = "[s3] \"Then you need to 'study' some more.\"\n[s4] \"If you need someone to teach you, you can ask me.\""
10038105-86 = "[ns] \"I won't give up on any student, if I can help them.\""
10038105-90 = "Listen, Sensei..."
10038105-91 = "......"
10038105-92 = "...All right. This is a hypothetical question."
10038105-93 = "Purely for my own curiosity."
10038105-94 = "If a student is known as a monster..."
10038105-95 = "If they're completely hopeless, and refuse all self-reflection..."
10038105-96 = "...would you still say the same thing?"
10038105-100 = "[ns5] \"Even if that were the case, I'd still do my best.\"\n[ns6] \"It's the only thing I can do, for anyone.\""
10038105-103 = "But what if the student truly is beyond saving, no matter what?"
10038105-104 = "[s] \"Questions aside, I have one request...\""
10038105-111 = "[ns] \"Let me have faith in you.\""
10038105-115 = "......"
10038105-116 = "Keh, Keh heh... Hahahahaha! Well played! I was not expecting that response."
10038105-117 = "All right, take me away. After that answer, I won't resist at all."
10038105-118 = "\"Let me have faith in you\"... Ah, that was fun. So much fun."
10038105-119 = "One more thing, Shintani Kai."
10038105-120 = "Tell me, while I'm still in a good mood."
10038105-121 = "Shanhaijing needs a cure for Tyke Syndrome."
10038105-122 = "Oh, is that all...? Well, Tyke Syndrome is contagious, but the cure is contagious as well."
10038105-123 = "The treatment is easy to disperse. I could do it immediately."
10038105-124 = "Keh heh keh heh... But what will that mean for you? Once the treatment spreads, you'll return to your previous state, frailty and all."
10038105-125 = "It makes no difference what it means for me."
10038105-130 = "If we can return Shanhaijing to normal, and hold the Moonlight Festival in safety..."
10038105-131 = "...what more do we need?"
10038105-136 = "...An ordinary person, through and through."
10038105-140 = "Fine, as you wish. Even if a time comes when you regret this decision, it's none of my concern."
10038105-141 = "Believe me, I never will."

[translation]
212-1 = "葛夫拉：超乎常理的勇猛仲裁者"
212-2 = "嗯嗯……唔唔……"
212-3 = "啊，老師，你來啦。#n我現在有點忙……"
212-4 = "嗯？我今天看起來特別忙？#n我平常明明也有一堆麻煩事好嗎！？"
212-5 = "不過這次真的是不能拖延的緊急狀況……#n我正在檢查整個奇普托斯的列車運行時刻表。"
212-6 = "你問是什麼事讓我這麼著急？#n唔嗯……其實我現在沒空慢慢跟你聊……"
212-7 = "不過，也許這件事老師能幫上忙也說不定？"
212-8 = "你應該知道，奇普托斯的物流大多仰賴海運吧？"
212-9 = "畢竟船能運送的貨物量可是火車的數十倍。"
212-10 = "其中有一條穿越冰海的極地航線……#n因為能大幅縮短運輸距離的關係，是奇普托斯非常重要的路線之一。"
212-11 = "不過前陣子在那條極地航線附近，突然出現了一個巨大的不明自動機械！"
212-12 = "結果導致極地航線的運輸有所延誤，整個物流網也跟著大亂……"
212-13 = "身為負責奇普托斯所有公共交通網的交通室室長，#n這當然是我該處理的事情沒錯，但最嚴重的問題是──"
212-14 = "明太子的供應也因此中斷，導致我最愛的明太子洋芋片可能會停產啊！！"
212-15 = "……你那是什麼「這理由也太無聊了吧」的眼神？這可是大事耶！？"
212-16 = "我沒有明太子洋芋片根本活不下去，老師你也該重視這個危機才對。"
212-17 = "現在得動用夏萊與聯邦學生會的所有資源，全力恢復極地航線的運作才行。"
212-18 = "在我調整列車時刻表、盡量彌補物流損失的時候，#n老師你能不能去處理一下那個出現在極地的自動機械？"
212-19 = "啊，極地那邊超級冷的，記得帶個暖爐來保暖哦。#n應該會有幫助的。"
212-20 = "對了，我突然想到這說不定也能派上用場。#n在航線中斷之前，有艘貨船傳來這樣一段訊息──"
212-21 = "「其名為[ruby=Geburah]葛夫拉[/ruby]，乃超乎常理的勇猛仲裁者。」"
212-22 = "……威脅別人航線的傢伙還仲裁什麼啊？名字也太浮誇了吧。"
212-23 = "總之，這件事就拜託你囉～#n我現在只剩三箱明太子洋芋片了，真的撐不了太久！"

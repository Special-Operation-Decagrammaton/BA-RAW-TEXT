[translation]
212-1 = "Geburah, Ruler of Recklessness"
212-2 = "Mmm. Mmmm..."
212-3 = "Ah, Sensei. Welcome. I'm a bit busy right now..."
212-4 = "What? I look busy, \"unlike usual\"? I'm always busy with annoying little tasks, you know that!"
212-5 = "But there's an emergency right now, and I can't push back work... So I was looking over these train maps across Kivotos."
212-6 = "Why am I in such a hurry? Umm, I don't have time to relax and chat with you about it, Sensei..."
212-7 = "Wait, or maybe you can help me solve this problem..."
212-8 = "You might already know, but Kivotos relies on maritime transport for most of its logistics. "
212-9 = "Simply put, ships can carry dozens of times more than trains."
212-10 = "And there's a polar shipping route crossing the Glacial Sea. That's important to Kivotos, because it's a much faster route than others."
212-11 = "But recently, some mysterious, giant automaton appeared near that polar route."
212-12 = "As you can imagine, that's caused all kinds of shipping delays."
212-13 = "Now, as head of the Transportation Office, it's of course my job to take care of it anyway, but there's a bigger problem..."
212-14 = "It's caused a shortage of pollock roe, and now my favorite pollock roe chips might get discontinued!"
212-15 = "Why are you looking at me like that? You think that's petty? It's not, it's important!"
212-16 = "I can't go a day without my pollock roe chips. Show a little concern, Sensei."
212-17 = "With that in mind, we have to restore the polar route, even if it means mobilizing the full force of Schale and the General Student Council."
212-18 = "I'll handle rerouting the trains for now, but I want you, Sensei, to deal with that machine in the polar region."
212-19 = "Obviously, it'll be cold up north, so bring a radiator or something. I'm sure that'll help."
212-20 = "Ah. Now that I think about it, we got a message from a cargo ship before the lines went dead. Maybe it'll help you..."
212-21 = "\"Its name is Geburah, Ruler of Recklessness.\""
212-22 = "...I don't know that it's \"ruling\" anything so much as \"muscling in on someone else's territory,\" but there you have it."
212-23 = "Anyway, I hope you can take care of this quickly. I only have 3 boxes of pollock roe chips left."

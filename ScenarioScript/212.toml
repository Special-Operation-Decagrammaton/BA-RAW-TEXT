[translation]
212-1 = "#title;게부라, 합리를 넘어선 용기의 중재자"
212-2 = "3;모모카;24;으음. 으으음……\n#3;a"
212-3 = "3;모모카;02;아, 선생님. 어서 와. 나는 지금 좀 바빠서……\n#3;em;[반응]"
212-4 = "3;모모카;05;응? 평소와는 다르게 바빠 보인다고? 평소에도 이것저것 귀찮은 일은 잔뜩 있었거든?!"
212-5 = "3;모모카;17;하지만 지금은 일을 미룰 수 없는 긴급사태라…… 키보토스 전역의 열차 운행 도표를 검토하고 있었어."
212-6 = "3;모모카;06;무슨 일이길래 그렇게 서두르냐고? 으음, 느긋하게 선생과 이야기를 할 시간은 없는데……\n#3;stiff"
212-7 = "3;모모카;01;아니, 어쩌면 이 문제를 선생이 해결해 줄 수 있을지도……?\n#3;em;[!]"
212-8 = "3;모모카;11;혹시 알고 있을지도 모르겠지만, 키보토스 대부분의 물류는 바다를 통한 해상운송에 의존하고 있어."
212-9 = "3;모모카;12;배가 나를 수 있는 물자는 기차의 수십 배에 달하기 때문이지."
212-10 = "3;모모카;99;그중에는 빙해를 가로지르는 극지 항로도 있는데…… 화물의 운송 거리를 크게 단축할 수 있기 때문에 키보토스에서는 중요한 항로 중 하나지."
212-11 = "3;모모카;36;그런데 얼마 전에 그 극지 항로 근처에 무언가, 거대한 정체불명의 자율운행기계가 나타났다지 뭐야?!\n#3;em;[!]"
212-12 = "3;모모카;06;그 때문에 극지 항로를 통한 운송이 연착되고, 물류망도 잔뜩 꼬여버렸는데……"
212-13 = "3;모모카;05;키보토스의 모든 공용 교통망을 관리하는 교통실의 실장으로서 당연히 처리해야 하는 문제이기도 하지만, 무엇보다 가장 큰 문제는……\n#3;em;…"
212-14 = "3;모모카;38;극지에서 수송되는 명란젓의 공급이 부족해져서, 내가 좋아하는 명란 맛 감자칩이 단종될지도 모른다는 거야!\n#3;closeup"
212-15 = "3;모모카;05;뭐야, 그 한심한 사람을 쳐다보는 표정은. 이건 정말 중대한 문제라고?\n#3;hophop\n#3;em;[스팀]"
212-16 = "3;모모카;24;나는 이 명란맛 감자칩이 없으면 단 하루도 살아갈 수 없으니까 말이지. 선생도 좀 더 사태를 진지하게 바라보는 편이 좋을 거야."
212-17 = "3;모모카;38;그러니까, 지금은 샬레와 총학생회의 모든 역량을 총동원해서라도 극지 항로를 복구해야만 해.\n#3;em;[한숨]"
212-18 = "3;모모카;14;내가 열차 운행 도표를 조정해서 물류 손실을 보전하는 동안, 선생은 극지에 나타난 그 자율운행기계를 처리해 주었으면 좋겠어."
212-19 = "3;모모카;01;뭐…… 당연한 말이지만, 극지는 엄청나게 추울 테니 몸을 덥힐 수 있는 라디에이터라도 함께 챙겨가도록 해. 분명 도움이 될 거야."
212-20 = "3;모모카;02;참. 그러고 보니 도움이 될지도 모르겠는데, 극지 항로가 끊어지기 전에 화물선에서 이런 메시지를 받았다는데, 이게 혹시 도움이 될지 모르겠네.\n#3;em;[반응]"
212-21 = "3;모모카;01;<그의 이름은 [ruby=Geburah]게부라[/ruby]. 합리를 넘어선 용기의 중재자이니.>"
212-22 = "3;모모카;08;……남의 항로를 위협하는 녀석이 뭘 중재한다는 거야? 참, 쓸데없이 거창한 이명이네.\n#3;em;…"
212-23 = "3;모모카;12;여하튼 하루빨리 좀 부탁할게~ 이제 남은 명란 맛 감자칩이 세 박스 밖에 남지 않았거든."

[translation]
2601402-1 = "คารินตะลุยสตรีทฟู้ด"
2601402-2 = "เดินไปตามทิศที่ลมพัดจากตรงนี้อีกหน่อย..."
2601402-3 = "ไม่สิ หรือว่าทิศตรงข้ามจะดีกว่า..."
2601402-4 = "[s] \"คาริน\""
2601402-5 = "อ๊ะ คุณครู"
2601402-6 = "ขอโทษนะ ฉันไม่รู้เลยว่าคุณครูจะมา "
2601402-7 = "หืม? ฉันกำลังจดอะไรอยู่น่ะเหรอ?"
2601402-8 = "อ่า กำลังจด... จุดที่จะยิงสไนเปอร์ในจัตุรัสนี้น่ะ"
2601402-9 = "ไม่ใช่ว่าฉันได้ภารกิจอะไรมาหรอก มันก็แค่นิสัยอย่างหนึ่งของฉันน่ะ พอดีมันเป็นสิ่งที่ฉันทำเสมอ เมื่อเริ่มปฏิบัติการ ก็เลย..."
2601402-10 = "[s] \"แต่วันนี้วันหยุดไม่ใช่เหรอ?\""
2601402-11 = "อ่า มะ... มันก็ใช่น่ะนะ"
2601402-12 = "[s1] \"วันหยุดก็ต้องพักผ่อนสิ เอากระดาษโน้ตมาเลย\"\n[s2] \"ครูจะริบกระดาษโน้ตนี่ วันหยุดก็ต้องพักผ่อนให้เต็มที่สิ\""
2601402-15 = "อ๊ะ ถะ... ถ้าเอากระดาษโน้ตไปละก็...!"
2601402-16 = "อืม... แต่ที่คุณครูพูดมามันก็ไม่ผิดหรอก..."
2601402-17 = "ก็ได้ ในเมื่อวันนี้เป็นวันหยุด งั้นฉันจะพักเรื่องภารกิจไว้ก่อน"
2601402-18 = "งั้นควรไปทำอะไรดีล่ะ..."
2601402-19 = "[s] \"ปกติตอนทำภารกิจเสร็จจะทำอะไรเหรอ?\""
2601402-20 = "ก็เก็บกวาดที่หน้างาน แล้วก็เตรียมตัวสำหรับภารกิจต่อไป"
2601402-21 = "หรือไม่ก็ไปทำงานพาร์ทไทม์ที่ทำอยู่เรื่อยๆ..."
2601402-22 = "[s] \"แล้วมีงานอดิเรกมั้ย?\""
2601402-23 = "มะ... ไม่รู้สิ น่าจะการทำความสะอาดนะ?"
2601402-24 = "อืม แต่จะว่าไปมันก็เป็นเรื่องที่เกี่ยวกับภารกิจอีกที งั้นก็คงยากที่จะเรียกว่าเป็นงานอดิเรก..."
2601402-25 = "มาลองคิดดูแล้ว เหมือนฉันจะไม่มีกิจกรรมอะไรที่เรียกว่าเป็นการพักผ่อนอย่างแท้จริงได้เลยนะ"
2601402-26 = "[s] \"แบบนี้ไม่ได้สิ!\""
2601402-30 = "[ns] \"คารินต้องพักผ่อนบ้างนะ!\""
2601402-31 = "อ่า... งะ... งั้นเหรอ...?"
2601402-32 = "แต่ฉันก็ไม่รู้สึกว่าร่างกายเหน็ดเหนื่อยอะไรนะ..."
2601402-33 = "หืม? ถึงตอนนี้จะยังแข็งแรง แต่ต่อไปในอนาคตจะได้เจอหลายโรคเลยงั้นเหรอ?"
2601402-34 = "ทั้งปวดเส้นประสาท คอเคล็ด เหนื่อยเรื้อรัง...? พูดเรื่องอะไรเนี่ย..."
2601402-35 = "แต่ก็เอาเถอะ"
2601402-36 = "ไหนๆ วันนี้ก็ใส่ชุดนักเรียนจากปกติที่ใส่แต่ชุดเมด งั้นวันนี้ฉันจะพักผ่อนตามที่คุณครูบอกแล้วกัน"
2601402-37 = "แต่ว่าฉันไม่รู้ว่าจะพักผ่อนยังไง คุณครูต้องช่วยฉันหน่อยแล้วละ"
2601402-38 = "[s] \"ได้สิ ถ้างั้นก่อนอื่นต้อง...\""
2601402-42 = "[ns] \"ไปกินอะไรอร่อยๆ ก่อน!\""
2601402-45 = "มีงานเทศกาลเหรอ... คงจะจัดขึ้นเพราะมีงานโรงเรียนสินะ"
2601402-46 = "ถึงปกติฉันจะไม่ได้มาเดินงานเทศกาลมากเท่าไรก็เถอะ..."
2601402-47 = "งั้นเราจะกินของอร่อยๆ กันที่นี่เหรอคุณครู?"
2601402-48 = "[s] \"สตรีทฟู้ดนี่ละอร่อยอย่าบอกใครเลย\""
2601402-52 = "[ns] \"ถ้าอยากกินอะไรก็บอกครูได้เลยนะ\""
2601402-53 = "ฉันว่าเราเดินดูรอบๆ กันก่อนดีกว่า จะได้รู้ว่ามีอะไรขายบ้าง"
2601402-55 = "ไก่เสียบไม้อร่อยๆ จ้า~"
2601402-56 = "ร้านนี้มีฮอตดอกกับยากิโซบะด้วยจ้า~"
2601402-57 = "ทั้งไก่เสียบไม้ ฮอตดอก ยากิโซบะ... ดูน่าอร่อยไปหมดเลย"
2601402-58 = "ดีละ ฉันตัดสินใจแล้ว คุณครู ฉันอยากกินไก่เสียบไม้ร้านนั้น"
2601402-59 = "ขอสองไม้ค่ะ"
2601402-60 = "ได้เลย! ขอบใจนะ!"
2601402-61 = "เอ้า อันนี้ของคุณครู รับไปสิ"
2601402-62 = "[s] \"ไม่เก่งเลย...\""
2601402-63 = "อะไรเหรอ?"
2601402-67 = "[ns] \"คาริน... ปลดปล่อยความปรารถนาไม่เก่งเลยนะเนี่ย!\""
2601402-68 = "หะ... หืม?!"
2601402-69 = "พะ... พูดเรื่องอะไรเหรอ...?"
2601402-70 = "[s] \"ขอไก่เสียบไม้ ฮอตดอก ยากิโซบะ อย่างละสองไปเลย!\""
2601402-71 = "ได้เลย! รอเดี๋ยวนะ~"
2601402-72 = "นี่จ้ะ ได้แล้ว~"
2601402-73 = "ซะ... ซื้อทุกอย่างแบบนั้นเลยได้เหรอ...?"
2601402-74 = "หืม? ไหนๆ ก็ได้มาคลายเครียดทั้งที แต่ถ้าเอาแต่บังคับใจตัวเองอยู่ ก็จะกลับยิ่งเครียดงั้นเหรอ?"
2601402-75 = "มันก็ฟังขึ้นอยู่หรอกนะ... อืม..."
2601402-76 = "งั้นฉันจะรับไว้ละนะ ขอบคุณนะคุณครู"
2601402-77 = "ไปนั่งกินตรงโน้นกันเถอะ"
2601402-79 = "ไก่เสียบไม้อร่อยจัง คุณครูก็ลองกินบ้างสิ"
2601402-80 = "ยากิโซบะก็รสชาติดี..."
2601402-81 = "ถ้าซื้อไก่เสียบไม้มาแค่ไม้เดียว ฉันอาจจะเสียดายนิดหน่อยอย่างที่คุณครูว่าก็ได้นะ"
2601402-82 = "[s] \"ฮุฮุ ลองกินฮอตดอกนี่ด้วยสิ\""
2601402-83 = "อื้อ ได้สิ"
2601402-84 = "อืม อร่อยเหมือนกันนะเนี่ย"
2601402-85 = "[s] \"ได้ยินแบบนี้ก็น่าดีใจนะ งั้นครูกินบ้าง...\""
2601402-89 = "อ๊ะ! คุณครู ระวัง มันร่วงแล้ว!"
2601402-94 = "ระ... รับไว้ได้แล้ว"
2601402-95 = "[s] \"ยอดเลย คาริน!\""
2601402-96 = "อ่า... แต่ว่า คือ... ฉันรับไว้ได้ก็จริงอยู่..."
2601402-99 = "― [log=카린 교복]คะ... คุณครู รอเดี๋ยวนะ เดี๋ยวเดียวเท่านั้นละ[/log][wa:1270] "
2601402-100 = "― [log=카린 교복]พอมาคิดดู ถ้าจะให้เลยทั้งอย่างนี้ มันน่าจะมีปัญหานิดหน่อย...![/log][wa:1570] "
2601402-103 = "― [log=카린 교복]พะ... พอดีฉันเอาขารับมันไว้ มันน่าจะสกปรกนิดหน่อยน่ะ...[/log][wa:3680] "
2601402-104 = "― [log=카린 교복]อันนี้ เดี๋ยวฉันกินเอง ส่วนคุณครูน่ะ กินอันนี้ดีกว่า...![/log][wa:4070] "
2601402-107 = "― [log=카린 교복]อ่า...[/log][wa:1570] "
2601402-108 = "― [log=카린 교복]จริงสิ อันนี้ฉันกัดไปแล้วคำหนึ่งนี่นา...[/log][wa:1980] "
2601402-111 = "― [log=카린 교복]มะ... ไม่ เดี๋ยวก่อน! ไม่ใช่อย่างนั้นนะ ฉันไม่ได้จะหมายความแบบนั้น...![/log][wa:550] "
2601402-114 = "― [log=카린 교복]ไม้นี้ คงไม่ได้... [/log][wa:10] "
2601402-115 = "― [log=카린 교복]...! มะ... ไม่สิ ไม่ใช่![/log][wa:2280] "
2601402-118 = "[ns3] \"จะ... ใจเย็นๆ ก่อน คาริน จะไม้ไหนครูก็กินได้ทั้งนั้น...\"\n[ns4] \"ครูเข้าใจๆ ถ้าคารินโอเค ครูก็โอเคด้วยเหมือนกัน\""
2601402-119 = "― [log=카린 교복]มะ... ไม่ใช่นะ! ฉันไม่ได้ตั้งใจให้เป็นอย่างนั้นจริงๆ นะ![/log][wa:560] "
2601402-120 = "― [log=카린 교복]มะ... ไม่ใช่นะ! ฉันไม่ได้ตั้งใจให้เป็นอย่างนั้นจริงๆ นะ![/log][wa:560] "
2601402-123 = "― [log=카린 교복]มะ... ไม่ว่าจะให้ไม้ไหน มันก็...! [/log][wa:3330] "
2601402-124 = "― [log=카린 교복]อึก... ฉันควรทำยังไงดี...![/log][wa:3960] "
2601402-127 = "(คุณครูทำให้คารินใจเย็นลงได้ในที่สุด แล้วก็ได้กินฮอตดอกด้วยกัน...)"
2601402-129 = "อะ... อะแฮ่ม... ถึงเมื่อกี้จะทำตัวไม่ถูกไปหน่อย แต่ตอนนี้โอเคแล้วละ ฉันกลับมาเป็นปกติแล้ว"
2601402-130 = "ฮอตดอกก็อร่อยดีนะ"
2601402-131 = "[s] \"อื้อ อร่อยเลยละ...\""
2601402-132 = "อืม ฉันเขินกับวิธีการพูดของคุณครูจัง..."
2601402-133 = "อะ... เอาเป็นว่าวันนี้ขอบคุณนะ"
2601402-134 = "คุณครูทำให้ฉันรู้สึกว่าได้พักผ่อนอย่างแท้จริงเลยละ"
2601402-135 = "ครั้งหน้าอยากให้คุณครูจะมาสอนวิธีการพักผ่อนให้อีกจัง"

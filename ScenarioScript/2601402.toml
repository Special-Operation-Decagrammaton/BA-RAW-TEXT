[translation]
2601402-1 = "Karin's Daily Eating Log"
2601402-2 = "A bit more towards the wind here..."
2601402-3 = "No, maybe the other direction is better..."
2601402-4 = "[s] \"Karin.\""
2601402-5 = "Oh, Sensei."
2601402-6 = "I didn't know you were here. My apologies."
2601402-7 = "Hm? What was I taking notes on?"
2601402-8 = "Ah, uh...just the potential sniper nests in this plaza."
2601402-9 = "No, it's not like I have any particular mission. It's more of a habit. I always do this anyway, when a mission begins, so..."
2601402-10 = "[s] \"But isn't today your day off?\""
2601402-11 = "Well, y-yes."
2601402-12 = "[s1] \"Days off should be restful.\"\n[s2] \"I'm just going to hold onto that notepad.\""
2601402-15 = "Ah, i-if you take my notes...!"
2601402-16 = "Mmm...but you do make a good point."
2601402-17 = "Fine. I won't do mission-related work on my day off."
2601402-18 = "...So what should I do instead...?"
2601402-19 = "[s] \"What do you usually do when you're done with missions?\""
2601402-20 = "I clean up and prepare for the next mission."
2601402-21 = "I also do part-time work."
2601402-22 = "[s] \"What about hobbies?\""
2601402-23 = "U-Um, cleaning, I guess?"
2601402-24 = "Mmm, but that's also technically the extension of my mission, so it's hard to call it a hobby..."
2601402-25 = "Now that I think about it, I don't have many restful pastimes in my life."
2601402-26 = "[s] \"That's bad!\""
2601402-30 = "[ns] \"You need rest, Karin!\""
2601402-31 = "Oh... Y-You think so?"
2601402-32 = "I'm not physically tired or anything, though..."
2601402-33 = "What? I might not feel like it now, but it'll all come back later?"
2601402-34 = "Nerve pain, stiff neck, chronic fatigue...? What are you talking about...?"
2601402-35 = "Well, still, I get it."
2601402-36 = "Since I'm wearing a school uniform instead of a maid uniform, I'll rest today, like you suggested."
2601402-37 = "Though I'm not sure what I should do. Maybe you could advise me, Sensei."
2601402-38 = "[s] \"How about...\""
2601402-42 = "[ns] \"...you start by enjoying some festival food?\""
2601402-45 = "The festival... I see. I suppose there is one on campus..."
2601402-46 = "Although I don't have much experience with that kind of thing..."
2601402-47 = "Sensei, are we eating here?"
2601402-48 = "[s] \"Street food stalls are actually quite good.\""
2601402-52 = "[ns] \"Let me know if anything jumps out at you.\""
2601402-53 = "I'll have to see what's available. Let's look around together."
2601402-55 = "Tasty skewers here!"
2601402-56 = "We also have hot dogs and Yakisoba!"
2601402-57 = "Skewers, hot dogs, and Yakisoba... They all look tasty."
2601402-58 = "Okay, I've decided. Sensei, I'm getting that skewer."
2601402-59 = "Two, please."
2601402-60 = "Yup! Thank you!"
2601402-61 = "Here, this one's for you, Sensei. Take it."
2601402-62 = "[s] \"You should learn...\""
2601402-63 = "Excuse me?"
2601402-67 = "[ns] \"Karin, you should learn how to really express what you want!\""
2601402-68 = "U-Ugh?!"
2601402-69 = "Wh-What are you talking about...?"
2601402-70 = "[s] \"Skewer, hot dog, and Yakisoba. Two of each, please!\""
2601402-71 = "Yup! Thank you!"
2601402-72 = "Here you go!"
2601402-73 = "I-Is it okay to buy ALL that...?"
2601402-74 = "What? You say holding back would actually build up stress, when we're here to relieve stress?"
2601402-75 = "That does make sense but...um..."
2601402-76 = "All right, then. Thank you."
2601402-77 = "Let's go eat on the bench over there."
2601402-79 = "This skewer is good. You should try yours, Sensei."
2601402-80 = "This Yakisoba isn't half bad..."
2601402-81 = "You were right. If I'd settled for just the skewer, I would have regretted it."
2601402-82 = "[s] \"Fufu, try this hot dog too.\""
2601402-83 = "Okay, then."
2601402-84 = "Mm, also good."
2601402-85 = "[s] \"Glad to hear it. So—\""
2601402-89 = "Ah! Sensei, watch out, you'll drop it!"
2601402-94 = "...Got it."
2601402-95 = "[s] \"Nice catch, Karin!\""
2601402-96 = "Ah, um, I did catch it, but..."
2601402-99 = "― [log=카린 교복]S-Sensei, hold on, hold on just a moment.[/log][wa:1430] "
2601402-100 = "― [log=카린 교복]Now that I think about it, it'd be problematic to give this back to you...![/log][wa:1010] "
2601402-103 = "― [log=카린 교복]I... I grabbed it with my legs, so it's a bit dirty...[/log][wa:3720] "
2601402-104 = "― [log=카린 교복]Why don't I eat it, and you can take this one...?[/log][wa:4350] "
2601402-107 = "― [log=카린 교복]...Ah.[/log][wa:1570] "
2601402-108 = "― [log=카린 교복]Right, I already took a bite out of this...[/log][wa:1860] "
2601402-111 = "― [log=카린 교복]N-No, hold on! It's nothing like that. I didn't mean it like that at all...![/log][wa:310] "
2601402-114 = "― [log=카린 교복]Right, let's go with this... [/log][wa:10] "
2601402-115 = "― [log=카린 교복]...! N-No, no![/log][wa:2680] "
2601402-118 = "[ns3] \"C-Calm down, Karin. I'm okay with anything.\"\n[ns4] \"I understand. I'm okay as long as you are.\""
2601402-119 = "― [log=카린 교복]That's not it! I really didn't mean it like that![/log][wa:840] "
2601402-120 = "― [log=카린 교복]That's not it! I really didn't mean it like that![/log][wa:840] "
2601402-123 = "― [log=카린 교복]Wh-Whichever one I give you, it's...![/log][wa:3210] "
2601402-124 = "― [log=카린 교복]Ugh... What am I supposed to do...?[/log][wa:3600] "
2601402-127 = "I managed to calm Karin down, and we ate the hot dogs together."
2601402-129 = "A-Ahem, I panicked for a second, but...I'm good now. Nice and calm."
2601402-130 = "Those hot dogs were pretty good."
2601402-131 = "[s] \"Yeah, they were...\""
2601402-132 = "Ugh, I think I'm blushing..."
2601402-133 = "A-Anyway, thank you for today."
2601402-134 = "It felt like a proper day off."
2601402-135 = "I hope you can teach me more about de-stressing next time, too."

[translation]
2601402-1 = "每日外食錄花凛"
2601402-2 = "應該再沿著風向稍微……"
2601402-3 = "不對，反方向比較適合嗎……"
2601402-4 = "[s]「花凛。」"
2601402-5 = "啊，老師。"
2601402-6 = "抱歉沒注意到你來了。"
2601402-7 = "嗯？問我在做什麼筆記？"
2601402-8 = "啊，就是……我在記錄這個廣場的狙擊點。"
2601402-9 = "沒有，我並沒有接到任務，這只是我的習慣而已。#n每當作戰開始，我都會這麼做……"
2601402-10 = "[s]「但今天不是假日嗎？」"
2601402-11 = "唔嗯……是，是這樣沒錯。"
2601402-12 = "[s1]「在假日好好休息才是最重要的哦。」\n[s2]「這個我要沒收。」"
2601402-15 = "啊，便，便條紙被拿走的話……！"
2601402-16 = "唔唔……不過老師說的話也沒錯……"
2601402-17 = "我知道了。#n既然今天是假日，就別再做跟任務有關的事了吧。"
2601402-18 = "那該做什麼好呢……"
2601402-19 = "[s]「你平常任務結束之後都會做什麼？」"
2601402-20 = "收拾善後，接著準備下一個任務。"
2601402-21 = "或者努力打工……"
2601402-22 = "[s]「有沒有什麼興趣或愛好？」"
2601402-23 = "這，這個嘛……打掃應該算吧？"
2601402-24 = "唔嗯，不過那嚴格說起來也算是任務的延伸，好像有點難稱之為興趣……"
2601402-25 = "這麼說來，好像沒有真正說的上是休息的行為。"
2601402-26 = "[s]「這樣怎麼行呢！」"
2601402-30 = "[ns]「花凛也需要休息！」"
2601402-31 = "咦……是，是嗎……？"
2601402-32 = "但我其實並沒有覺得累……"
2601402-33 = "嗯？就算現在感覺不到，總有一天還是會回到自己身上？"
2601402-34 = "神經痛、脖子僵硬、慢性疲勞……？#n這是什麼意思……"
2601402-35 = "好吧，總之我知道了。"
2601402-36 = "既然難得穿上制服而不是女僕裝，我會聽老師的好好休息。"
2601402-37 = "不過我不知道該做什麼，所以希望老師可以幫忙。"
2601402-38 = "[s]「沒問題，那首先……」"
2601402-42 = "[ns]「我們去吃好吃的吧！」"
2601402-45 = "是慶典嗎……原來如此。#n似乎是跟學園的活動同時舉辦的樣子。"
2601402-46 = "雖然我和慶典沒什麼緣分……"
2601402-47 = "老師，我們要在這裡吃飯嗎？"
2601402-48 = "[s]「路邊攤的食物，意外還挺好吃的哦。」"
2601402-52 = "[ns]「想吃什麼儘管說。」"
2601402-53 = "這好像得逛逛才知道，我們先一起繞一圈吧。"
2601402-55 = "美味的烤串～"
2601402-56 = "熱狗和炒麵都有哦～"
2601402-57 = "烤串、熱狗、炒麵……看起來都很好吃的樣子。"
2601402-58 = "好，我決定了。#n老師，我要吃那個烤串。"
2601402-59 = "請給我兩個。"
2601402-60 = "沒問題！謝謝惠顧！"
2601402-61 = "來，這是老師的。請用吧。"
2601402-62 = "[s]「真是太生疏了……」"
2601402-63 = "什麼？"
2601402-67 = "[ns]「花凛你……很不擅長發洩欲望！」"
2601402-68 = "咦！？"
2601402-69 = "為，為什麼突然這麼說……？"
2601402-70 = "[s]「烤串、熱狗和炒麵全部都各來兩份！」"
2601402-71 = "沒問題！謝謝惠顧～"
2601402-72 = "請慢用～！"
2601402-73 = "全，全部都買沒問題嗎……？"
2601402-74 = "嗯？難得可以緩解壓力，如果這時候克制反而會有反效果？"
2601402-75 = "聽起來還挺有道理的……唔嗯……"
2601402-76 = "那我就心懷感激地收下了。"
2601402-77 = "去那邊的長椅坐著吃吧。"
2601402-79 = "這個烤串真好吃。老師也嚐嚐看吧。"
2601402-80 = "炒麵也不錯呢……"
2601402-81 = "老師說的沒錯，如果剛才只買一隻烤串的話，好像確實會有點遺憾。"
2601402-82 = "[s]「呵呵，也嚐嚐看這隻熱狗吧。」"
2601402-83 = "好，我吃吃看。"
2601402-84 = "嗯，這個也很好吃。"
2601402-85 = "[s]「太好了。那麼……」"
2601402-89 = "啊！老師小心，要掉下去了！"
2601402-94 = "接，接住了。"
2601402-95 = "[s]「接得漂亮，花凛！」"
2601402-96 = "啊，不過接是接住了……"
2601402-99 = "― [log=카린 교복]……啊！老師！先，先等一下！[/log][wa:2510] "
2601402-100 = "― [log=카린 교복]就這樣給你，好像有點……！[/log][wa:3490] "
2601402-103 = "― [log=카린 교복]那個，畢竟是我用腿夾住的，所以……[/log][wa:5200] "
2601402-104 = "― [log=카린 교복]這隻我來吃好了，老師就吃這邊的……！[/log][wa:5590] "
2601402-107 = "― [log=카린 교복]……啊。[/log][wa:1650] "
2601402-108 = "― [log=카린 교복]這邊是我已經吃過的……[/log][wa:3140] "
2601402-111 = "― [log=카린 교복]不，不是！我沒有那個意思……！[/log][wa:2750] "
2601402-114 = "― [log=카린 교복]果然還是把這邊的……[/log][wa:360] "
2601402-115 = "― [log=카린 교복]……！好像，也不太對！[/log][wa:2800] "
2601402-118 = "[ns3]「你，你先冷靜，花凛。我其實不介意的……」\n[ns4]「我明白你的意思，只要花凛不介意就行了。」"
2601402-119 = "― [log=카린 교복]我真的，沒有那個意思……！[/log][wa:2280] "
2601402-120 = "― [log=카린 교복]我真的，沒有那個意思……！[/log][wa:2280] "
2601402-123 = "― [log=카린 교복]無，無論給哪邊都……唔唔……[/log][wa:4130] "
2601402-124 = "― [log=카린 교복]我，我該怎麼辦才好……！[/log][wa:4520] "
2601402-127 = "（好不容易讓花凛冷靜下來後，一起吃了熱狗……）"
2601402-129 = "咳，咳哼。#n剛才雖然有點慌張，但我現在已經完全冷靜下來了。"
2601402-130 = "熱狗也很好吃。"
2601402-131 = "[s]「嗯，真好吃……」"
2601402-132 = "唔唔，老師的感想實在讓人有點害羞……"
2601402-133 = "總，總之，今天很謝謝你。"
2601402-134 = "託你的福，感覺度過了很不錯的假日。"
2601402-135 = "希望下次，你可以再教教我休息的方法。"

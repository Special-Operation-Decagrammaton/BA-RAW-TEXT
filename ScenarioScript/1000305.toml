[translation]
1000305-1 = "佩洛洛大人救援作戰"
1000305-2 = "遊戲中心"
1000305-5 = "老師，這裡！我在這裡！"
1000305-6 = "請看，這裡有個巨大的佩洛洛大人娃娃！"
1000305-7 = "那個看起來軟軟的腳……#n呼啊啊……光是看著就覺得被治癒了。"
1000305-8 = "那個玩偶好像是在去年的佩洛洛慶典上限量販售的……"
1000305-9 = "這可是連黑市上都買不到的娃娃，為什麼會在這裡呢？"
1000305-10 = "呵呵，不管怎樣，這可是拯救佩洛洛大人的絕佳機會。"
1000305-11 = "那麼……我要上了！"
1000305-14 = "啊啊，差一點……就差一點！"
1000305-16 = "……嗚嗚，明明感覺不錯的卻還是失敗了。"
1000305-17 = "但是不能放棄！下次一定……！"
1000305-18 = "喝啊啊！"
1000305-21 = "……嗚嗚，又失敗了。"
1000305-22 = "雖然還想繼續挑戰，但錢包已經……"
1000305-23 = "看來我跟佩洛洛大人的緣分只到這裡了……"
1000305-24 = "[s] 「看來是我出場的時候了。」"
1000305-25 = "咦……？老師也想要我的佩洛洛大人娃娃嗎？"
1000305-26 = "[s] 「讓你看看大人的力量吧。」"
1000305-27 = "大人的力量……！感覺有點興奮！"
1000305-28 = "究竟……"
1000305-30 = "（[USERNAME]，第148次挑戰……）"
1000305-31 = "[s] 「這次一定……！」"
1000305-32 = "那個，老師，大人的力量難道是……"
1000305-33 = "[s] 「做不到的時候，就挑戰到做得到為止才是大人！」"
1000305-34 = "啊哈哈……雖然看起來有點衝動，但某種意義上來說確實是很有效的方法呢……"
1000305-35 = "（感覺好像已經花了超過五位數的錢……）"
1000305-36 = "老師，FIGHT！請加油！"
1000305-37 = "[s] 「喝啊啊啊啊！」"
1000305-43 = "娃娃掉下來了呢！我們成功了，老師！"
1000305-44 = "雖然苦戰了超過100次……但還是成功完成了救援作戰！"
1000305-45 = "[s] 「來，這是給你的禮物。」"
1000305-46 = "咦！？要把這個佩洛洛大人娃娃給我嗎？"
1000305-47 = "但是，這是老師特地使用大人的力量才拿到的娃娃……真的可以嗎？"
1000305-48 = "[s] 「這種東西給真的想要的人才是最好的唷。」"
1000305-49 = "……或許是這樣沒錯。老師那種為了重要的事物不惜一切也不放棄的精神真了不起，感受到了真正的大人的感覺。"
1000305-50 = "非常謝謝你，老師。"
1000305-51 = "我會連同這分心意，好好珍惜這個娃娃的！"

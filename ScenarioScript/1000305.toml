[translation]
1000305-1 = "Peroro Rescue Mission"
1000305-2 = "Arcade"
1000305-5 = "Sensei, this way. Here!"
1000305-6 = "There's a big Peroro plush in the claw machine!"
1000305-7 = "Those soft feathers... Ah... My heart is melting just looking at it."
1000305-8 = "It must have come from last year's Peroro Festival."
1000305-9 = "These are hard to come by even secondhand. What's one doing here?"
1000305-10 = "Heehee. Well however he got here, this is our chance to rescue him!"
1000305-11 = "All right... Here we go!"
1000305-14 = "Oh! Just a little more... A little more!"
1000305-16 = "...Ugh. I couldn't do it."
1000305-17 = "But I'm not going to give up! I'll get it this time for sure!"
1000305-18 = "Haaa!"
1000305-21 = "...Gah. Not again."
1000305-22 = "I want to keep trying, but I'm broke..."
1000305-23 = "Maybe this is the end of the road for me and Peroro."
1000305-24 = "[s] \"Guess it's my turn, then.\""
1000305-25 = "Huh...? You want to take a shot at Peroro too, Sensei?"
1000305-26 = "[s] \"Allow me to show you the value of experience.\""
1000305-27 = "Oh, yeah—experience! Then, show me what you can do!"
1000305-28 = "Let's see..."
1000305-30 = "[USERNAME]'s 148th try..."
1000305-31 = "[s] \"I've got it this time for sure!\""
1000305-32 = "Um, Sensei... Are you sure your experience is valuable...?"
1000305-33 = "[s] \"I have the wisdom to never give up!\""
1000305-34 = "Haha. I don't know if I'd call that wise, but if it works, it works."
1000305-35 = "[3;히후미;04;(We've already spent over 10,000 yen doing this...)"
1000305-36 = "Keep going, Sensei! You got this!"
1000305-37 = "[s] \"HAAAAAA!\""
1000305-43 = "You did it, Sensei! He's all yours now!"
1000305-44 = "It took over a hundred tries...but you really did pull it off!"
1000305-45 = "[s] \"Here. For you.\""
1000305-46 = "Huh? I can have Peroro all to myself?"
1000305-47 = "But it was your experience and salary that won him... Are you sure?"
1000305-48 = "[s] \"He's better off in the hands of someone who understands his value.\""
1000305-49 = "That's very mature... Giving something away to honor its true value."
1000305-50 = "Thank you, Sensei."
1000305-51 = "I'll never forget what you've taught me today!"

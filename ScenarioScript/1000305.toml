[translation]
1000305-1 = "ปฏิบัติการช่วยท่านเพโรโร่!"
1000305-2 = "ร้านเกมตู้"
1000305-5 = "ทางนี้ค่ะคุณครู! ทางนี้!"
1000305-6 = "ดูสิคะ ในตู้คีบตุ๊กตามีตุ๊กตาท่านเพโรโร่ตัวใหญ่อยู่ด้วยค่ะ!"
1000305-7 = "ดูขนนุ่มๆ นั่นสิ....#nอ่า... แค่เห็นก็ใจละลายแล้วล่ะค่ะ"
1000305-8 = "ตุ๊กตาตัวนั้นเป็นตุ๊กตาลิมิเต็ดเอดิชั่นจากเพโรโร่ เฟสติวัลเมื่อปีที่แล้วไม่ผิดแน่..."
1000305-9 = "ทั้งที่เป็นกู้ดที่หายากมากๆ แม้แต่ในตลาดมืดเองก็ตาม ทำไมถึงมาอยู่ในตู้คีบตุ๊กตาแบบนี้ได้นะ?"
1000305-10 = "ฮุฮุ ช่างเรื่องนั้นก่อนดีกว่า ตอนนี้เป็นโอกาสดีที่จะได้ช่วยท่านเพโรโร่ออกมาแล้วค่ะ!"
1000305-11 = "ถ้างั้น... ลงมือกันเลย!"
1000305-14 = "อ๊ะ อีกนิดเดียวเอง... อีกแค่นิดเดียวแท้ๆ!"
1000305-16 = "ฮือ... คีบไม่ได้สักที"
1000305-17 = "แต่ฉันไม่ยอมแพ้หรอกนะคะ! คราวหน้าต้องคีบได้แน่ๆ...!"
1000305-18 = "ย้าาาาา!"
1000305-21 = "ฮือ... คีบไม่ได้อีกแล้ว"
1000305-22 = "อยากคีบต่ออยู่เหมือนกันแต่ว่าเงินจะหมดแล้ว..."
1000305-23 = "ฉันคงไม่มีโอกาสได้พาท่านเพโรโร่กลับบ้านแน่ๆ เลย"
1000305-24 = "[s] \"ถึงตาครูลองบ้างแล้วสินะ\""
1000305-25 = "คะ....? คุณครูก็อยากได้ตุ๊กตาเพโรโร่เหมือนกันเหรอคะ?"
1000305-26 = "[s] \"ครูจะโชว์พลังของผู้ใหญ่ให้ดูเอง\""
1000305-27 = "พลังของผู้ใหญ่...! ได้ยินแบบนี้ก็ชักจะตื่นเต้นแล้วค่ะ!"
1000305-28 = "แสดงให้ดูหน่อยสิคะ..."
1000305-30 = "[USERNAME] กำลังลองคีบตุ๊กตาครั้งที่ 148..."
1000305-31 = "[s] \"คราวนี้ต้องได้แน่.....!\""
1000305-32 = "คือว่า... คุณครูคะ นี่คือพลังของผู้ใหญ่จริงๆ เหรอคะ..."
1000305-33 = "[s] \"ผู้ใหญ่จะต้องพยายามจนกว่าจะได้ยังไงล่ะ!\""
1000305-34 = "ฮ่าฮ่า... ถึงจะดูสุดโต่งไปหน่อย แต่ก็คงเป็นวิธีที่เห็นผลที่สุดแล้วค่ะ"
1000305-35 = "(เงินที่ใช้คีบตุ๊กตาไปมันทะลุหลักหมื่นแล้วนะ...)"
1000305-36 = "สู้ๆ นะคะคุณครู! พยายามเข้านะคะ!"
1000305-37 = "[s] \"ย้าาาาากกก!\""
1000305-43 = "ตุ๊กตาหล่นลงมาแล้ว! สำเร็จแล้วค่ะคุณครู!"
1000305-44 = "ถึงจะต้องคีบไปตั้งร้อยกว่าครั้ง... แต่สุดท้ายคุณครูก็ทำสำเร็จแล้วค่ะ!"
1000305-45 = "[s] \"อ่ะ ครูให้เป็นของขวัญ\""
1000305-46 = "คะ? คุณครูจะให้ตุ๊กตาท่านเพโรโร่ตัวนี้กับฉันเหรอคะ?"
1000305-47 = "แต่คุณครูอุตส่าห์ตั้งใจมากกว่าจะได้ตุ๊กตามา... แล้วจะให้ฉันจริงๆ เหรอคะ?"
1000305-48 = "[s] \"สิ่งของจะมีค่าก็ต่อเมื่ออยู่กับคนที่เห็นคุณค่าของมันจริงๆ นะ\""
1000305-49 = "อย่างนี้นี่เอง... ผู้ใหญ่ต้องรู้จักเสียสละบางอย่างเพื่อแสดงถึงคุณค่าที่แท้จริงสินะคะ..."
1000305-50 = "ขอบคุณนะคะคุณครู"
1000305-51 = "ฉันจะจดจำสิ่งที่คุณครูพูดแล้วก็ดูแลตุ๊กตาตัวนี้อย่างดีเลยค่ะ!"

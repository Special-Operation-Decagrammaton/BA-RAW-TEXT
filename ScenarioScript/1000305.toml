1000305-3 = "2;히후미;01\n#2;h\n#wait;1500\n#2;a"
1000305-4 = "2;히후미;02\n#2;h\n#2;em;[반응]\n#wait;1500"
1000305-5 = "2;히후미;00;선생님, 이쪽이에요. 이쪽!\n#2;m3\n#2;hophop"
1000305-6 = "2;히후미;03;보세요, 거대한 페로로 님 인형이 뽑기 기계 안에 있어요!\n#2;m2"
1000305-7 = "2;히후미;00;저 보들보들한 깃털……. #n후아아…… 보기만 해도 마음이 녹아내리는 것 같아요.\n#2;em;[하트]\n#2;stiff"
1000305-8 = "2;히후미;01;분명 저 인형은 작년의 페로로 페스티벌에서 한정 제작된 물건일 텐데……. \n#2;m3"
1000305-9 = "2;히후미;02;블랙마켓에서도 구하기 어려운 저 인형이 어째서 여기에 있는 걸까요?\n#2;em;[반응]"
1000305-10 = "2;히후미;03;후후, 영문이 어찌되었든 페로로 님을 구출할 좋은 기회에요!\n#2;hophop"
1000305-11 = "#2;hide\n3;히후미;06;그럼…… 도전!\n#3;closeup\n#3;em;[!]"
1000305-12 = "#all;hide"
1000305-13 = "#wait;2500"
1000305-14 = "#na;히후미;아앗, 조금만 더…… 조금만 더!"
1000305-15 = "#wait;1500"
1000305-16 = "3;히후미;04;……으으, 아쉽게 실패하고 말았어요.\n#3;em;[속상함]\n#3;stiff\n#3;a"
1000305-17 = "3;히후미;05;하지만 포기할 수는 없어요! 다음에는 반드시……!\n#3;hophop"
1000305-18 = "3;히후미;06;하아아앗!\n#3;closeup\n#3;em;[!]"
1000305-19 = "#all;hide"
1000305-20 = "#wait;1500"
1000305-21 = "3;히후미;01;……으으. 또 실패하고 말았어요.\n#3;a\n#3;em;[땀]"
1000305-22 = "3;히후미;99;계속 도전하고 싶지만 더는 소지금이 없어서……."
1000305-23 = "3;히후미;04;아무래도 저 페로로 님과 저의 인연은 여기까지인가 봐요."
1000305-24 = "[s] \"이제 내가 나설 차례네.\""

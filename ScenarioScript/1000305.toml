1000305-43 = "3;히후미;03;인형이 넘어졌어요! 성공이에요, 선생님!\n#3;em;[반짝]\n#3;hophop\n#3;a"
1000305-44 = "3;히후미;00;비록 100번이나 넘게 걸리긴 했지만…… 그래도 멋지게 작전에 성공했네요!"

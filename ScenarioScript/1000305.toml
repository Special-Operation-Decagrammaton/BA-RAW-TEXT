1000305-47 = "3;히후미;01;하지만 선생님이 모처럼 어른의 힘을 발휘해서 뽑은 인형인데…… 괜찮으시겠어요?"
1000305-48 = "[s] \"물건은 진심으로 원하는 사람이 가졌을 때 가치가 있으니까.\""
1000305-49 = "3;히후미;99;과연…… 그렇군요. 진정한 가치를 위해서 포기할 줄도 아는 것이 진짜 어른…….\n#3;em;…"

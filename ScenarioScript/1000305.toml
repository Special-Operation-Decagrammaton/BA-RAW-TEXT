1000305-26 = "[s] \"어른의 힘으로 인형을 뽑는 걸 보여줄게.\""
1000305-27 = "3;히후미;00;어른의 힘……! 그렇게 말씀하시니 조금은 기대가 되네요!\n#3;em;[반응]"

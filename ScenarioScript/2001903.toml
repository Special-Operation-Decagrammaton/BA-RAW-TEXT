[translation]
2001903-1 = "Case 2. 請好好休息"
2001903-3 = "（與文件山之間的戰鬥終於結束了）"
2001903-4 = "（今天先戰術性撤退吧！剩下的就交給明天的我……）"
2001903-9 = "夏萊．休息室"
2001903-11 = "歡迎回來，主人！蹦蹦！"
2001903-15 = "（今天也出現幻覺了啊……）"
2001903-16 = "（……不，還是面對現實吧）"
2001903-17 = "[s1] 「嗨，朱音。話說，為什麼會在這裡……？」\n[s2] 「妳是怎麼進來的……？」"
2001903-18 = "我把鎖給解開了。"
2001903-19 = "我把鎖給解開了。"
2001903-20 = "您問我怎麼解鎖的，"
2001903-21 = "是嗎？"
2001903-27 = "是借用了一些力量。"
2001903-28 = "畢竟是緊急情況……呵呵。"
2001903-29 = "雖然也可以使用炸彈把門鎖炸飛……"
2001903-30 = "不過我想這樣會讓主人困擾。"
2001903-31 = "之前，主人也和我說過要控制一下炸彈的使用……"
2001903-32 = "咦？您問有需要這樣嗎？"
2001903-33 = "那是當然！"
2001903-34 = "對我來說，主人的健康狀態永遠是最優先考量的事項。"
2001903-35 = "看到您這麼疲憊的樣子……"
2001903-36 = "我的胸口就痛得難以忍受。內心真的十分痛苦……"
2001903-37 = "[s] 「妳有這份心情我就很開心了唷。」"
2001903-38 = "……有什麼我能為您做的事呢？"
2001903-39 = "雖然換了套服裝，不過我永遠都是主人的女僕。"
2001903-40 = "[s] 「既然如此，要跟我一起打掃嗎？」"
2001903-44 = "打掃……真的只要那樣就行了嗎……？"
2001903-45 = "主人沒有所謂的慾望嗎？"
2001903-46 = "呵呵……真是溫柔呢。"
2001903-47 = "我明白了。我會誠心誠意為主人服務的。"
2001903-49 = "（之後，我們便一起投入打掃工作）"
2001903-53 = "（不過因為朱音幾乎包辦了所有工作的緣故，我根本沒幫到什麼忙……）"
2001903-56 = "呵呵……讓我想起了與主人初次相遇的那天呢。"
2001903-57 = "因為主人那個時候也拜託我打掃。"
2001903-58 = "怎麼樣。變成一塵不染的房間了對吧。"
2001903-59 = "[s3] 「那時候的朱音真可愛呢。」\n[s4] 「現在的朱音也很可愛唷。」"
2001903-64 = "主，主人？怎麼突然說那種話……我……"
2001903-65 = "請，請稍等一下！我剛才泡了特別的茶。我這就去拿！"
2001903-74 = "這是特別為您準備的茶。請您品嚐看看。"
2001903-80 = "呵呵，我也很喜歡這個香味。您能喜歡真是太好了。"
2001903-81 = "其實我一直在找這種茶……總算是拿到了。"
2001903-82 = "能夠和主人一起享用這杯茶……"
2001903-83 = "朱音真的覺得好幸福。"
2001903-84 = "[s] 「話說回來，朱音也喜歡那套服裝嗎？」"
2001903-85 = "您說這套兔女郎裝嗎？"
2001903-86 = "怎麼說呢……有種新鮮的感覺。只是換了衣服，心情也會發生改變呢。"
2001903-87 = "而且活動起來也很方便……"
2001903-88 = "不過，我也再次感受到，對一個女僕來說，女僕裝有多麼地重要。"
2001903-89 = "主人覺得怎麼樣呢？"
2001903-90 = "[s] 「嗯？我的話……」"
2001903-91 = "請務必！讓我知道主人的意見。"
2001903-92 = "其實……"
2001903-93 = "從您來到我的房間時，我就一直這麼想了。"
2001903-99 = "您覺得如何呢，主人？"
2001903-100 = "穿著女僕裝的我，和穿著兔女郎裝的我，您喜歡哪一個呢？"
2001903-104 = "──各有各的好？"
2001903-105 = "雖，雖然您這麼說我很開心……"
2001903-106 = "不過，主人……朱音想聽到一個確切的答案。"
2001903-107 = "怎樣的我，更適合服務主人呢？"
2001903-108 = "我想聽到主人親口說出的答案！蹦蹦！"
2001903-109 = "[s] 「蹦蹦……？」"
2001903-110 = "沒錯。因為我現在是兔子朱音呀。"
2001903-111 = "來，是女僕呢？#n還是兔子呢？"
2001903-115 = "（朱音忽然湊到我的眼前）"
2001903-121 = "（咦，突然覺得眼皮好重……）"
2001903-130 = "哎呀，主人？"
2001903-134 = "呵呵……看來您真的很累呢。"
2001903-138 = "那麼我就先失禮了。"
2001903-139 = "晚安，主人。"

[translation]
2001903-1 = "Case 2. Best to Rest"
2001903-3 = "After fighting an army of documents for hours, the day ended in my strategic retreat."
2001903-4 = "I knew the battle would resume the next day."
2001903-9 = "Schale Lounge"
2001903-11 = "I've been waiting for you, Master! Boing, boing!"
2001903-15 = "I was seeing things again."
2001903-16 = "But this time, I knew it wasn't an illusion."
2001903-17 = "[s1] \"Nice to see you, Akane. Also, odd to see you.\"\n[s2] \"...How did you get in here?\""
2001903-18 = "I deactivated the lock, silly!"
2001903-19 = "I deactivated the lock, silly!"
2001903-20 = "How?"
2001903-21 = "This is on both of us. After all, I never said anything..."
2001903-27 = "I got some help."
2001903-28 = "It was an emergency, after all. Heehee..."
2001903-29 = "I could have just destroyed the lock with a bomb instead, of course..."
2001903-30 = "But I thought that'd cause trouble."
2001903-31 = "And you asked me not to do things like that..."
2001903-32 = "You think I've gone too far?"
2001903-33 = "That's impossible!"
2001903-34 = "Checking on Master's condition is my top priority."
2001903-35 = "You looked so tired that I could see you were overworked from a mile away..."
2001903-36 = "It hurts me to see you like that..."
2001903-37 = "[s] \"Thank you for your concern.\""
2001903-38 = "Now, is there anything I can help with?"
2001903-39 = "Regardless of what clothes I'm in, I'm your maid."
2001903-40 = "[s] \"How about we clean together?\""
2001903-44 = "Cleaning... Are you sure that's all?"
2001903-45 = "You have such a gentle heart, Master."
2001903-46 = "Heehee... Always so kind."
2001903-47 = "Okay! Time to do my best."
2001903-49 = "After that, we focused on cleaning...theoretically."
2001903-53 = "In reality, Akane pretty much finished everything before I got to help."
2001903-56 = "Heh heh. This reminds me of the first time we met."
2001903-57 = "Even then, it was all about cleaning."
2001903-58 = "What do you think? Spotless, right?"
2001903-59 = "[s3] \"You were so cute back then, Akane.\"\n[s4] \"You're as cute now as you were back then.\""
2001903-64 = "M-Master, what are you saying all of a sudden..."
2001903-65 = "W-Wait just a moment. I brought some special tea for you. I'll bring it out!"
2001903-74 = "This is today's special blend. Please try it."
2001903-80 = "Heehee, I like the scent too. I'm glad you like it."
2001903-81 = "I've been looking for it for a while...and just barely found it in time."
2001903-82 = "I'm so happy..."
2001903-83 = "that I get to drink this with you, Master."
2001903-84 = "[s] \"You seem to really like that outfit, Akane.\""
2001903-85 = "My bunny girl outfit?"
2001903-86 = "Heehee... It's kind of refreshing to wear something this different."
2001903-87 = "Surprisingly comfortable to move around in too."
2001903-88 = "But first and foremost, I'm a maid, so the maid uniform is still dear to me."
2001903-89 = "But what do you think of it, Master?"
2001903-90 = "[s] \"Huh? Me?\""
2001903-91 = "Yes! I want to hear your thoughts about it."
2001903-92 = "In fact, I've been wanting to hear them..."
2001903-93 = "ever since you visited me earlier!"
2001903-99 = "So, what do you think?"
2001903-100 = "Which do you prefer? Maid Akane or bunny girl Akane?"
2001903-104 = "Come on, be honest now."
2001903-105 = "I-I'm happy to hear that, but..."
2001903-106 = "Master, I need to make sure."
2001903-107 = "Which outfit is best for serving you?"
2001903-108 = "I want to hear you say it! Boing, boing!"
2001903-109 = "[s] \"...Boing, boing again?\""
2001903-110 = "Yes, because I'm a bunny now."
2001903-111 = "So? Maid or bunny?"
2001903-115 = "Akane was right in front of me."
2001903-121 = "My eyes felt heavy, like they wanted to close..."
2001903-130 = "Hello? Master?"
2001903-134 = "Heehee... I knew it. You must be incredibly tired."
2001903-138 = "Get some rest, Master."
2001903-139 = "I'll leave you in peace, now."

[translation]
2001903-1 = "Case 2. พักให้สบายนะคะ"
2001903-3 = "(คุณครูกำลังต่อสู้กับกองเอกสารอย่างหนักหน่วง)"
2001903-4 = "(ผลสุดท้ายก็ยอมแพ้และล่าถอย พรุ่งนี้ค่อยลุยใหม่แล้วกัน)"
2001903-9 = "ห้องพักผ่อนชาเล่ต์"
2001903-11 = "ฉันกำลังรออยู่เลยค่ะนายท่าน! ดึ๋ง ดึ๋ง!"
2001903-15 = "(คุณครูเหมือนเห็นภาพหลอน...)"
2001903-16 = "(รู้ตัวว่าไม่ได้เห็นภาพหลอนอยู่...)"
2001903-17 = "[s1] \"สวัสดี อาคาเนะ ว่าแต่เข้ามาทางไหนน่ะ...?\"\n[s2] \"เข้ามาได้ยังไงน่ะ...?\""
2001903-18 = "ฉันปลดอุปกรณ์รักษาความปลอดภัย แล้วก็เข้ามาค่ะ"
2001903-19 = "ฉันปลดอุปกรณ์รักษาความปลอดภัย แล้วก็เข้ามาค่ะ"
2001903-20 = "ฉันทำได้ยังไงน่ะเหรอคะ?"
2001903-21 = "ก็..."
2001903-27 = "แบบว่า... ได้รับความช่วยเหลือมานิดหน่อยค่ะ"
2001903-28 = "พอดีใช้เรื่องสถานการณ์ฉุกเฉินเป็นข้ออ้างน่ะค่ะ ฮุฮุ..."
2001903-29 = "อันที่จริงจะใช้ C4 ระเบิดอุปกรณ์รักษาความปลอดภัยไปเลยก็ได้..."
2001903-30 = "แต่ว่าถ้าทำแบบนั้นก็อาจจะเกิดเรื่องวุ่นวายได้น่ะค่ะ"
2001903-31 = "นายท่านก็ยังเคยบอกไม่ให้ฉันทำแบบนั้นด้วย"
2001903-32 = "ฉันไม่ต้องทำถึงขนาดนี้ก็ได้เหรอคะ?"
2001903-33 = "ได้ยังไงกันคะ! "
2001903-34 = "ความเป็นอยู่ของนายท่านคือสิ่งสำคัญที่ฉันต้องคำนึงถึงเป็นอันดับแรกเสมอค่ะ"
2001903-35 = "ตอนนี้สีหน้าของนายท่านดูเหนื่อยล้ามากๆ ตาก็โหล ใต้ตาก็ดำหมดแล้วค่ะ..."
2001903-36 = "ฉันเจ็บปวดนะคะที่เห็นนายท่านเป็นอย่างนี้..."
2001903-37 = "[s] \"แค่เป็นห่วงครูก็ขอบใจมากแล้วละ\""
2001903-38 = "แล้ว... มีอะไรที่ฉันพอจะช่วยนายท่านได้บ้างรึเปล่าคะ?"
2001903-39 = "ถึงจะเปลี่ยนมาใส่ชุดนี้ แต่ไม่ว่าเมื่อไหร่ฉันก็คือเมดตลอดกาลของนายท่านนะคะ"
2001903-40 = "[s] \"ถ้างั้นมาทำความสะอาดกันมั้ย?\""
2001903-44 = "ทำความสะอาด... แค่นั้นเหรอคะ?"
2001903-45 = "นายท่านนี่ไม่มีความโลภเอาซะเลยนะคะ"
2001903-46 = "ฮุฮุ... นายท่านนี่เอาใจใส่คนอื่นเสมอเลยนะคะ"
2001903-47 = "เข้าใจแล้วค่ะ ฉันจะตั้งใจทำงานอย่างเต็มที่เลยค่ะ"
2001903-49 = "(จากนั้นทั้งคู่ก็ช่วยกันทำความสะอาด)"
2001903-53 = "(อาคาเนะเป็นคนทำความสะอาดทั้งหมด จนคุณครูแทบไม่ได้ช่วยเลย...)"
2001903-56 = "ฮุฮุ นึกถึงวันที่ได้เจอกับนายท่านครั้งแรกเลยนะคะ"
2001903-57 = "ตอนนั้นนายท่านก็ขอให้ฉันทำความสะอาดเหมือนกันนี่คะ"
2001903-58 = "เป็นยังไงบ้างคะ? ห้องนี้สะอาดหมดจดไร้คราบฝุ่นแล้วค่ะ"
2001903-59 = "[s3] \"ตอนนั้นอาคาเนะน่ะ... น่ารักมากเลย\"\n[s4] \"ทั้งตอนนั้นแล้วก็ตอนนี้ อาคาเนะน่ารักมากเลยนะ\""
2001903-64 = "นะ... นายท่าน? ถ้าจู่ๆ พูดแบบนั้นละก็... ฉันคง..."
2001903-65 = "ดะ... เดี๋ยวก่อนค่ะนายท่าน วะ... วันนี้ฉันเอาใบชาพิเศษมาด้วยค่ะ ฉันขอตัวไปชงชามาให้#nนายท่านก่อนนะคะ!"
2001903-74 = "นี่ชาที่ฉันเตรียมมาค่ะ ลองดื่มดูสิคะ"
2001903-80 = "ฮุฮุ ฉันชอบกลิ่นนี้เหมือนกันค่ะ โล่งอกไปทีนะคะที่นายท่านชอบ"
2001903-81 = "ที่จริงฉันหาซื้อมานานแล้ว... มันหาซื้อยากมากเลยค่ะ"
2001903-82 = "อาคาเนะดีใจมากๆ เลยค่ะ"
2001903-83 = "ที่ได้ดื่มชากับนายท่านแบบนี้"
2001903-84 = "[s] \"ว่าแต่... อาคาเนะดูชอบชุดนี้มากเลยนะ?\""
2001903-85 = "หมายถึงชุดบันนี่เกิร์ลนี่เหรอคะ?"
2001903-86 = "ฮุฮุ... มันรู้สึกแปลกใหม่ดีค่ะ อาจจะเป็นเพราะชุดนี้ต่างจากชุดที่ใส่ทุกวันน่ะค่ะ"
2001903-87 = "แถมยังเคลื่อนไหวสะดวกอีกด้วยค่ะ"
2001903-88 = "แต่ว่ามันก็ทำให้ฉันรู้สึกได้ถึงความสำคัญของชุดเมดอย่างไม่เคยรู้สึกมาก่อนเหมือนกันค่ะ"
2001903-89 = "แล้วนายท่านคิดว่ายังไงบ้างคะ?"
2001903-90 = "[s] \"หืม? ครูน่ะเหรอ?\""
2001903-91 = "ใช่ค่ะ ฉันอยากฟังความคิดเห็นของนายท่านค่ะ"
2001903-92 = "อันที่จริง ฉันอยากฟังความเห็นของนายท่าน..."
2001903-93 = "ตั้งแต่ตอนที่นายท่านแวะมาที่โรงเรียนแล้วละค่ะ!"
2001903-99 = "นายท่านคิดว่ายังไงคะ?"
2001903-100 = "ฉันที่เป็นเมด กับฉันที่เป็นบันนี่เกิร์ล นายท่านชอบแบบไหนมากกว่ากันคะ?"
2001903-104 = "ไม่ว่าแบบไหนก็ชอบงั้นเหรอคะ? "
2001903-105 = "ดะ... ได้ยินแบบนั้นฉันก็ดีใจอยู่หรอกค่ะ..."
2001903-106 = "แต่ว่านายท่านคะ... อาคาเนะอยากได้ยินคำตอบชัดๆ ค่ะ"
2001903-107 = "ว่าชุดแบบไหนที่เหมาะจะใส่มาเพื่อ \"บริการ\" นายท่านมากกว่ากัน"
2001903-108 = "ฉันอยากได้ยินคำตอบนั้นจากปากนายท่านค่ะ! ดึ๋ง ดึ๋ง"
2001903-109 = "[s] \"ดึ๋ง ดึ๋ง...?\""
2001903-110 = "ค่ะ ก็ตอนนี้ฉันเป็นกระต่ายนี่คะ"
2001903-111 = "เอาละค่ะ นายท่านชอบเมดมากกว่า หรือว่าชอบกระต่ายมากกว่ากันคะ?"
2001903-115 = "(อาคาเนะขยับเข้ามาใกล้จนมาจ่ออยู่ตรงหน้าคุณครู)"
2001903-121 = "(แต่จู่ๆ คุณครูก็รู้สึกง่วงอย่างน่าแปลกใจ...)"
2001903-130 = "ตายจริง นายท่าน?"
2001903-134 = "ฮุฮุ... คงจะเหนื่อยมากจริงๆ สินะคะ"
2001903-138 = "วันนี้เชิญพักผ่อนให้สบายนะคะ นายท่าน"
2001903-139 = "วันนี้อาคาเนะขอตัวก่อนนะคะ"

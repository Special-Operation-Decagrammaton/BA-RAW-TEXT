[translation]
1001402-1 = "Izuna's Tailing Technique"
1001402-2 = "(I'm walking down the street on my way to buy something I need.)"
1001402-4 = "*shuffle*"
1001402-6 = "[ns] \"Huh?\""
1001402-9 = "*shuffle* *shuffle*"
1001402-11 = "*bump*"
1001402-12 = "Wh-Whoa?!"
1001402-15 = "Ouch..."
1001402-16 = "*gasp* A-Again!"
1001402-17 = "*shuffle* *shuffle*"
1001402-19 = "[ns] \"Um...\""
1001402-21 = "*shuffle* *shuffle* *shuffle*"
1001402-22 = "Mrrrow?"
1001402-24 = "Sh-Shh! Bad kitty! Shhh!"
1001402-25 = "I'm gonna get caught if you meow at me like that!"
1001402-26 = "Hmm. Maybe you can't understand me because you're a cat?"
1001402-27 = "I wonder if there's a ninja art for communicating with animals..."
1001402-30 = "M-Meow?"
1001402-32 = "Meow?"
1001402-33 = "You really didn't get that?!"
1001402-34 = "D-Darn it! That leaves me with no other choice."
1001402-35 = "Izuna's emergency evasion technique!"
1001402-41 = "Phew. I bet I won't get caught now!"
1001402-42 = "[s] \"...\""
1001402-44 = "[s1] Send Izuna a text.\n[s2] Try calling Izuna."
1001402-46 = "*ring ring* ♪"
1001402-48 = "*ring ring* ♪"
1001402-49 = "Gah! My phone!"
1001402-50 = "H-How do I turn it off?!"
1001402-52 = "What is going on...?!"
1001402-54 = "*tap*"
1001402-55 = "Whew. That was close."
1001402-56 = "[s3] \"How close?\"\n[s4] \"Your cover was blown way before that.\""
1001402-57 = "M-My lord?!"
1001402-58 = "M-My lord?!"
1001402-59 = "But how...?! How did you know I was here?!"
1001402-60 = "[s] \"I mean, you weren't exactly quiet...\""
1001402-61 = "You saw right through Izuna's advanced tailing technique?"
1001402-62 = "Are you...?"
1001402-63 = "[s] \"Am I what?\""
1001402-64 = "My lord..."
1001402-66 = "Could you come from a long line of ninjas...? *gulp*"
1001402-67 = "[s5] \"Indeed! My grandfather was a famous hamster ninja!\"\n[s6] \"What?! No!\""
1001402-68 = "Oh. I guess I was mistaken."
1001402-69 = "Oh. I guess I was mistaken."
1001402-70 = "What a shame..."
1001402-71 = "[s] \"Are you disappointed?\""
1001402-72 = "Izuna is a great enough ninja to protect you."
1001402-73 = "So it's okay if my lord is not a ninja!"
1001402-74 = "[s] \"Aren't you confident?\""
1001402-76 = "[ns7] \"If you're going to tail me, you should be a little quieter.\"\n[ns8] \"A ninja must always be aware of her surroundings.\"\n[ns9] \"Pro ninja tip: Keep your phone on silent.\""
1001402-77 = "(smile) Ah! Yes, I see!"
1001402-78 = "(smile) Ah! Yes, I see!"
1001402-79 = "(smile) Ah! Yes, I see!"
1001402-80 = "Every word of wisdom is like a rare gem!"
1001402-81 = "I'll have to write them all down!"
1001402-82 = "Where's my notebook?"
1001402-83 = "[s] \"By the way, why were you tailing me in the first place?\""
1001402-84 = "Oh, you really want to know?"
1001402-85 = "Isn't it obvious? To protect you, my lord!"
1001402-86 = "[s] \"Protect me...?\""
1001402-87 = "Don't you remember when I told you how worried I was?"
1001402-88 = "I was actually worried..."
1001402-89 = "...for you, my lord!"
1001402-90 = "[s] \"Why?\""
1001402-91 = "Izuna suddenly realized something."
1001402-92 = "You're such an important person."
1001402-93 = "Therefore, there HAS to be someone after you!"
1001402-94 = "[s] \"I promise you there isn't.\""
1001402-95 = "You shouldn't say that, my lord!"
1001402-96 = "You mustn't let your guard down."
1001402-97 = "Have you never seen a historical drama?"
1001402-98 = "Drinking anything you're handed is dangerous."
1001402-99 = "The moment you let your guard down is when the assassins swoop in!"
1001402-100 = "It's inevitable!"
1001402-101 = "[s10] \"I-Inevitable?\"\n[s11] \"But there's no one after me!\""
1001402-102 = "It's a cliche of every historical drama!"
1001402-103 = "It's a cliche of every historical drama!"
1001402-104 = "[s] \"C-Cliche?\""
1001402-105 = "So I kept thinking..."
1001402-106 = "What can Izuna do to keep you safe as you go about your day?"
1001402-107 = "After thinking it over again and again, I finally made up my mind!"
1001402-108 = "Starting today, I'll become your bodyguard and watch your every move!"
1001402-109 = "[s] \"So that's why you've been following me...\""
1001402-110 = "Heehee!"
1001402-111 = "That's right!"
1001402-112 = "I'm your guardian angel!"
1001402-113 = "[s] \"There's one small problem, Izuna.\""
1001402-114 = "A...problem?"
1001402-115 = "[s] \"You can't just follow someone around all day long.\""
1001402-116 = "H-Huh?"
1001402-117 = "B-But...! Izuna would do anything for you, my lord!"
1001402-118 = "[s] \"You didn't even ask permission. What if I don't approve?\""
1001402-119 = "But why?!"
1001402-120 = "[s] \"Everyone has a right to privacy and secrets they want to keep, right?\""
1001402-121 = "U-Ugh..."
1001402-122 = "I-I'm sorry, my lord."
1001402-123 = "[s] \"I'm not upset. I just want you to ask next time.\""
1001402-124 = "*grooowl*"
1001402-125 = "Oh..."
1001402-126 = "I haven't eaten anything since breakfast, so..."
1001402-127 = "[s] \"That won't do. Want to grab a bite to eat?\""
1001402-128 = "G-Grab a bite?"
1001402-129 = "[s12] \"Only if you're okay with it.\"\n[s13] \"You don't have to if you don't want to.\""
1001402-132 = "No, of course I want to!"
1001402-133 = "Let's go! And you can count on Izuna to protect you on the way!"
1001402-134 = "But no more tailing."
1001402-135 = "This time, I'll protect my lord front and center, like a proper ninja!"
1001402-136 = "[s] \"Okay, okay.\""
1001402-137 = "Heehee!"
1001402-139 = "Nin nin!"
1001402-141 = "(So, with a noisy Izuna as my escort, we made our way to the restaurant.)"

[translation]
1001402-1 = "於是伊樹菜開始跟蹤"
1001402-2 = "（出門買東西，走在街上時）"
1001402-4 = "唦唦──"
1001402-6 = "[ns]「……嗯？」"
1001402-9 = "唦唦唦──"
1001402-11 = "（喀）"
1001402-12 = "啊！？"
1001402-15 = "嗚嗚，腳被絆到了……"
1001402-16 = "再，再來一次！"
1001402-17 = "唦唦唦──"
1001402-19 = "[ns] 「那個……」"
1001402-21 = "唦唦……"
1001402-22 = "喵嗚？"
1001402-24 = "噓，噓──！貓咪閣下！噓唷！"
1001402-25 = "你叫這麼大聲會害我被發現的……！"
1001402-26 = "啊，難道因為是貓咪，所以語言不通？"
1001402-27 = "那麼，只要使用忍者自古以來和動物溝通時使用的動物溝通術……！"
1001402-30 = "喵，喵嗚？"
1001402-32 = "悠悠哉哉打哈欠的貓咪;……喵嗚？"
1001402-33 = "行不通！？"
1001402-34 = "欸咿！那就沒辦法了，"
1001402-35 = "緊急迴避之術！"
1001402-41 = "呼……這下移動時應該就不會被發現了。"
1001402-42 = "[s] 「……」"
1001402-44 = "[s1] 拿出手機\n[s2] 給伊樹菜打電話"
1001402-46 = "（嗶鈴♪嗶鈴♪）"
1001402-48 = "（嗶鈴♪嗶鈴♪）"
1001402-49 = "唔哇，啊！手機！"
1001402-50 = "這，這要怎麼關掉？哇啊！？"
1001402-52 = "把這個像這樣，這樣就……！？"
1001402-54 = "（嘟）"
1001402-55 = "呼，幸好順利解決了。"
1001402-56 = "[s3] 「什麼順利解決了？」\n[s4] 「老早就露餡了好嗎……」"
1001402-57 = "主，主公！？ "
1001402-58 = "主，主公！？ "
1001402-59 = "怎麼會……！您為什麼會察覺到伊樹菜！？"
1001402-60 = "[s] 「還有為什麼，你自己在後面吵吵鬧鬧的……」"
1001402-61 = "伊樹菜最擅長的跟蹤術竟然不管用！"
1001402-62 = "難道……"
1001402-63 = "[s] 「……難道？」"
1001402-64 = "主公也是…… "
1001402-66 = "忍者的後裔嗎……？（吞口水）"
1001402-67 = "[s5] 「誠然。在下乃傳奇忍者，服部哈姆次郎的後人是也！」\n[s6] 「……最好是有那種事。」"
1001402-68 = "不，不是嗎……"
1001402-69 = "不，不是嗎……"
1001402-70 = "真可惜……"
1001402-71 = "[s] 「可惜什麼……」"
1001402-72 = "雖然可惜但至少，伊樹菜是個完美的忍者！"
1001402-73 = "就算不是同道中人也沒關係！主公就是主公沒有問題！"
1001402-74 = "[s] 「馬上就振作了……」"
1001402-76 = "[ns7] 「如果要跟蹤，首先應該要更安靜才好喔。」\n[ns8] 「也要注意放輕腳步、觀察他人的視線。」\n[ns9] 「然後最重要的是，先把手機設成靜音。」"
1001402-77 = "哦哦！原來如此！上了一課！"
1001402-78 = "哦哦！原來如此！上了一課！"
1001402-79 = "哦哦！原來如此！上了一課！"
1001402-80 = "主公的每一句話都是金科玉律呢！"
1001402-81 = "必須全部抄下來才行！"
1001402-82 = "咦？伊樹菜的記事本去哪裡了呢……？"
1001402-83 = "[s] 「話說回來，為什麼要跟蹤我？」"
1001402-84 = "啊，這是因為啊，"
1001402-85 = "為了作為忍者護衛主公！"
1001402-86 = "[s]「護衛……？」"
1001402-87 = "前幾天，伊樹菜不是說過有些煩惱嗎？"
1001402-88 = "其實呢……"
1001402-89 = "是個和主公有關的煩惱！"
1001402-90 = "[s] 「……嗯？」"
1001402-91 = "伊樹菜那時候忽然這麼想，"
1001402-92 = "主公是個偉大的人……"
1001402-93 = "那麼隨時隨地被刺客盯上也不奇怪！"
1001402-94 = "[s] 「並沒有並沒有。」"
1001402-95 = "那怎麼行！"
1001402-96 = "正所謂大意失荊州！"
1001402-97 = "時代劇裡都是這麼演的！"
1001402-98 = "每當城堡的主公放鬆戒心，舉辦晚宴飲酒高歌的時候……"
1001402-99 = "就會被襲擊！"
1001402-100 = "這都是既定套路！"
1001402-101 = "[s10] 「是套路啊……？」\n[s11] 「不不不，我從沒有主辦過晚宴啊。」"
1001402-102 = "這些都是時代劇的老套路！"
1001402-103 = "這些都是時代劇的老套路！"
1001402-104 = "[s] 「是嗎……」"
1001402-105 = "所以為了讓主公能夠安心工作，"
1001402-106 = "伊樹菜思考過自己到底能做些什麼……"
1001402-107 = "而左思右想之後得到的結論！"
1001402-108 = "就是從早到晚監視主公的一舉一動，並且跟在您身邊保護您！"
1001402-109 = "[s] 「所以才會跟蹤我啊……」"
1001402-110 = "欸嘿嘿！"
1001402-111 = "是的！"
1001402-112 = "我是在暗中保護您！"
1001402-113 = "[s] 「但是，那樣可能有點困擾。」"
1001402-114 = "困擾……我有做什麼讓主公困擾的事情嗎？"
1001402-115 = "[s] 「沒有經過人家同意就跟蹤，你不覺得不太對嗎？」"
1001402-116 = "呃，啊，是……"
1001402-117 = "可，可是！伊樹菜是為了主公才暗中……！"
1001402-118 = "[s] 「但對方也有可能不喜歡這樣對吧？」"
1001402-119 = "唔，唔唔，那是……"
1001402-120 = "[s] 「而且每個人，都有不想被知道的祕密，不是嗎？」"
1001402-121 = "唔，唔唔……"
1001402-122 = "主公說的對……對不起，主公……"
1001402-123 = "[s] 「我沒有生氣，但以後記得要先問過我唷。」"
1001402-124 = "（咕嚕……）"
1001402-125 = "啊……唔……"
1001402-126 = "我從早就什麼也沒吃，沒力氣了……"
1001402-127 = "[s] 「那要不要一起去吃飯呢？」"
1001402-128 = "吃，吃飯？"
1001402-129 = "[s12] 「伊樹菜可以的話就走吧。」\n[s13] 「當然，沒辦法的話我也不強迫。」"
1001402-132 = "不，很樂意！我們走吧！主公！"
1001402-133 = "當然！在前往餐廳的這段路上，就由我伊樹菜來保護您的安全吧！"
1001402-134 = "這次不會偷偷跟在後面，"
1001402-135 = "而是在主公面前！以忍者的身分！展現完美的護衛能力！"
1001402-136 = "[s] 「拜託你囉。」"
1001402-137 = "欸嘿嘿！是的！"
1001402-139 = "忍忍！"
1001402-141 = "（就這樣，我們在伊樹菜十分引人側目的護衛下，一起前往了餐廳）"

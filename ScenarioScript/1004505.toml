[translation]
1004505-1 = "อยากรู้ความคิดในใจ..."
1004505-3 = "(ตอนคุณครูออกมาข้างนอก ก็พบว่าเป็นเวลาเย็นที่พระอาทิตย์ใกล้ตกแล้ว)"
1004505-9 = "(พอมาถึงชายหาด คุณครูก็เห็นว่าโฮชิโนะยืนจ้องมองขอบฟ้าอยู่บนหาดทราย)"
1004505-14 = "หืม ครูเหรอ...?"
1004505-15 = "ทำไมถึงมาที่นี่ล่ะ มีเรื่องอะไรเหรอ?"
1004505-16 = "[s1] \"ครูก็แค่อยากมาสักครั้งน่ะ\"\n[s2] \"ครูมาหาโฮชิโนะไง\""
1004505-17 = "หืม พูดเป็นเล่น"
1004505-18 = "หืม พูดเป็นเล่น"
1004505-22 = "ขอบอกไว้ก่อนนะ ฉันไม่ได้มีเรื่องกังวลใจอะไรหรอก"
1004505-23 = "ถ้าไม่พูดเอาไว้ก่อน เดี๋ยวครูก็จะเป็นห่วงอีก เพราะงั้นเลยบอกไว้ไม่ให้เป็นห่วงน่ะ"
1004505-24 = "ฉันแค่อยากมานั่งมองทะเลเฉยๆ ก็เท่านั้นเอง"
1004505-25 = "[s3] \"ก็ไม่แปลกหรอกนะ ก็เป็นโฮชิโนะนี่นา\"\n[s4] \"ครูก็คิดแล้วว่าต้องเป็นแบบนั้น\""
1004505-26 = "หืม? พูดแบบนี้ แสดงว่ารู้เหรอว่าฉันคิดอะไรอยู่?"
1004505-27 = "หืม? พูดแบบนี้ แสดงว่ารู้เหรอว่าฉันคิดอะไรอยู่?"
1004505-28 = "[s5] \"คงนั่งมอง \"ทะเล\" ตามที่บอกละมั้ง\"\n[s6] \"คงกำลังตั้งสมาธิอยู่กับสิ่งที่เห็นละมั้ง\""
1004505-29 = "ฮ่า ตอบได้ดีจริงๆ สมกับเป็นครูเลยน้า"
1004505-30 = "ฮ่า ตอบได้ดีจริงๆ สมกับเป็นครูเลยน้า"
1004505-31 = "ก็คงงั้นน่ะนะ เพราะถึงแค่มานั่งมองทะเลเฉยๆ แต่สำหรับฉันก็ไม่ใช่ว่าเป็นเรื่องที่เกิดขึ้นบ่อยๆ"
1004505-32 = "ฉันเห็นทะเลทรายที่กว้างสุดลูกหูลูกตามาก็บ่อยครั้ง แต่สิ่งที่เห็นตอนนี้คือทะเลผืนใหญ่#nที่แผ่ออกไปไม่สิ้นสุด มันสุดยอดจริงๆ เลยนะ"
1004505-33 = "ถ้าทะเลกว้างขนาดนี้ คงจะมีปลาเยอะแน่ๆ"
1004505-34 = "คงมีทั้งปลา ทั้งหอยเป๋าฮื้อ แล้วก็เจ้าวาฬด้วย..."
1004505-35 = "น่าเสียดายนะที่เห็นได้แค่บนผิวน้ำ มองไม่เห็นสิ่งที่อยู่ใต้น้ำเลย"
1004505-36 = "แต่ถึงจะเป็นแบบนั้น แค่คิดว่า \"มันอยู่ข้างใต้นั่น\" ก็รู้สึกดีแล้วละ"
1004505-37 = "อืม... รู้สึกดีจริงๆ เลยนะ"
1004505-38 = "[s7] \"ที่รีสอร์ตมีเรือดำน้ำทิ้งไว้บ้างมั้ยนะ...\"\n[s8] \"แค่ได้รู้สึกดีแบบนี้ก็พอแล้วเหรอ?\""
1004505-39 = "แฮ่รๆ คิดแล้วเชียวว่าครูจะต้องพูดแบบนี้"
1004505-40 = "แฮ่รๆ คิดแล้วเชียวว่าครูจะต้องพูดแบบนี้"
1004505-41 = "แต่ไม่เป็นไรหรอก ฉันขออยู่แบบนี้ดีกว่า"
1004505-42 = "ถ้าลงไปใต้ทะเล แบบนั้นก็จะมองไม่เห็นทะเลทั้งหมด จริงไหมล่ะ?"
1004505-43 = "ฉันอยากมองเห็นทะเลทั้งผืนในครั้งเดียวน่ะ ทั้งดูผิวน้ำจากบนชายหาด ทั้งมองทะเลกว้างๆ ด้วย ฉันไม่อยากพลาดอะไรเลย..."
1004505-44 = "แต่การจะดูทั้งสองอย่างในครั้งเดียวก็คงโลภเกินไปเนอะ..."
1004505-49 = "หืม...?"
1004505-53 = "อะไรน่ะ? เหมือนได้ยินเสียงบางอย่างมาจากที่ไกลๆ เลย..."
1004505-57 = "เอ๋..."
1004505-58 = "[s9] \"ปลากระบอกโดดขึ้นมาแฮะ\"\n[s10] \"มีปลากระบอกในที่แบบนี้ด้วยเหรอเนี่ย\""
1004505-63 = "ครู...? นั่น... นั่นปลาใช่ไหม? ปลาจริงใช่ไหม?!"
1004505-64 = "ปลาเพิ่งโดดขึ้นมาเหนือน้ำใช่ไหม? มีปลาที่ทำแบบนั้นได้ด้วยเหรอ แล้วโดดทำไมเหรอ...?"
1004505-68 = "ดูสิๆ โดดขึ้นมาอีกแล้ว! ครูดูสิ! เมื่อกี้มันโดดขึ้นมาอีกแล้ว!"
1004505-69 = "ดูนั่นสิ นั่นก็ด้วย อะไรกันน่ะ? โห... มีเยอะกว่าที่คิดเลยนะเนี่ย? อะไรกันน่ะ...!"
1004505-74 = "แหะๆๆ"
1004505-75 = "เมื่อกี้ทำตัวไม่น่าชมให้เห็นซะแล้ว ไม่ไหวๆ..."
1004505-76 = "เรื่องเมื่อกี้ช่วยทำเป็นไม่เห็นทีนะครู ตาลุงคนนี้ค่อนข้างขี้อายน่ะ"
1004505-80 = "โดดกันเก่งจังเลยน้า เจ้าปลาพวกนั้น..."
1004505-81 = "[s11] \"ดูเหมือนฝูงปลากระบอกเพิ่งว่ายผ่านไปนะ\"\n[s12] \"คุ้มค่าที่มานั่งมองแบบนี้แล้วนะ\""
1004505-82 = "นั่นสิน้า..."
1004505-83 = "นั่นสิน้า..."
1004505-84 = "แบบนี้เองสินะ พอมาดูอยู่แบบนี้ก็ได้เห็นทั้งสองอย่างเลย"
1004505-85 = "พอถึงเวลาที่สมควร เราก็จะได้เห็นทุกอย่างที่อยากเห็นสินะ ถือว่าดีทีเดียวเลย..."
1004505-86 = "อื้อ... ใช่แล้วละ"
1004505-93 = "เป็นการชมวิวที่คุ้มค่ามากเลย..."

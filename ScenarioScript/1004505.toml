[translation]
1004505-1 = "儘管看不見內在"
1004505-3 = "（一走到外頭，才發現太陽早就已經下山了）"
1004505-9 = "（發現獨自一人坐在海灘上眺望海平線的星野）"
1004505-14 = "咦，老師……？"
1004505-15 = "怎麼了？發生什麼事了嗎？"
1004505-16 = "[s1] 「只是來這裡晃晃。」\n[s2] 「來找星野的唷。」"
1004505-17 = "唔嘿……這樣啊。"
1004505-18 = "唔嘿……這樣啊。"
1004505-22 = "……我話先說在前頭，我可沒有什麼心事喔。"
1004505-23 = "要是不先說清楚，老師一定又會窮緊張，我也會過意不去。"
1004505-24 = "今天真的只是來這裡看海而已。"
1004505-25 = "[s3] 「是嗎。」\n[s4] 「我想也是。」"
1004505-26 = "唔嘿……那你知道大叔我現在在想些什麼嗎？"
1004505-27 = "唔嘿……那你知道大叔我現在在想些什麼嗎？"
1004505-28 = "[s5] 「就跟你自己說的一樣，只是在看『海』。」\n[s6] 「因為阿拜多斯沒有『海』，所以才會想看。」"
1004505-29 = "……真不愧是老師。完全正確。"
1004505-30 = "……真不愧是老師。完全正確。"
1004505-31 = "因為阿拜多斯沒有海。"
1004505-32 = "一望無際的沙漠我已經看膩了……"
1004505-33 = "但一望無際的水……真不可思議呢。"
1004505-34 = "有那麼多的水，應該也會有很多生物吧……#n像是魚、鮑魚……還有鯨魚……"
1004505-35 = "雖然和水族館不同，無法看到海裡的情況有點可惜……"
1004505-36 = "不過那也不錯，能讓人覺得「那裡面什麼都有」。"
1004505-37 = "……嗯，那也不錯。"
1004505-38 = "[s7] 「我記得渡假勝地裡好像有一台潛水艇……」\n[s8] 「看不到海裡也沒關係嗎？」"
1004505-39 = "唔嘿，我就知道老師會這麼說。"
1004505-40 = "唔嘿，我就知道老師會這麼說。"
1004505-41 = "不過沒關係，現在這樣就很好了。"
1004505-42 = "要是真的潛進海裡，反而會沒辦法眺望海面吧？"
1004505-43 = "而我也喜歡眺望海面～"
1004505-44 = "魚與熊掌不可兼得嘛……"
1004505-49 = "……嗯？"
1004505-53 = "什麼東西……？"
1004505-57 = "……哇！"
1004505-58 = "[s9] 「烏魚跳起來了。」\n[s10] 「沒想到這種地方居然有烏魚。」"
1004505-63 = "……那是魚嗎？是魚對不對！？"
1004505-64 = "牠剛才是不是跳出水面了？我第一次看到會跳的魚……！"
1004505-68 = "哇！又跳起來了！老師你看那邊！"
1004505-69 = "那裡也有！牠們跳的好起勁喔……！怎麼會這樣！？"
1004505-74 = "……嘿嘿嘿。"
1004505-75 = "……我好像有點太興奮了。"
1004505-76 = "老師，能請你當作剛才什麼都沒看見嗎？大叔覺得有點害羞。"
1004505-80 = "……那些魚一直跳出來呢。"
1004505-81 = "[s11] 「應該是剛好有烏魚群經過吧。」\n[s12] 「不枉費我們在這裡坐這麼久。」"
1004505-82 = "……就是說啊。"
1004505-83 = "……就是說啊。"
1004505-84 = "唔嘿……原來在水面上也能看到海裡的魚啊。"
1004505-85 = "……只要時機來臨，魚與熊掌都能兼得。"
1004505-86 = "……嗯。"
1004505-93 = "……真是上了一課呢。"

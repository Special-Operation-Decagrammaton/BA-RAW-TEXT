1004505-22 = "4;호시노 수영복ND;15;……혹시나 해서 하는 말인데, 뭔가 마음에 걸리는 게 있거나 그러는 건 아니야."
1004505-23 = "4;호시노 수영복ND;17;이런 말은 미리 해 두지 않으면 선생 또 걱정하니까. 그러지 말라는 의미에서 하는 말이지."
1004505-24 = "4;호시노 수영복ND;20;진짜 그냥 바다를 보고 있었을 뿐이라고."
1004505-25 = "[s3] \"뭐, 호시노라면 그렇겠지.\"\n[s4] \"그럴 거라고 생각하고 있었어.\""
1004505-26 = "4;호시노 수영복ND;17;호오? 마치 무슨 생각을 하는지 다 안다는 듯한 말투인걸?\n#4;em;[?]"
1004505-27 = "4;호시노 수영복ND;17;호오? 마치 무슨 생각을 하는지 다 안다는 듯한 말투인걸?\n#4;em;[?]"
1004505-28 = "[s5] \"말 그대로 '바다'를 보고 있었겠지.\"\n[s6] \"보고 있는 거에 집중하고 있었겠지.\""
1004505-29 = "4;호시노 수영복ND;02;히야. 대단하구만. 역시 선생이랄까."
1004505-30 = "4;호시노 수영복ND;02;히야. 대단하구만. 역시 선생이랄까."
1004505-31 = "4;호시노 수영복ND;15;뭐, 그렇지. 그냥 바다를 보고 있는 것뿐이라고는 해도, 사실 나한테는 그리 흔한 일이 아니니까 말이야."
1004505-32 = "4;호시노 수영복ND;99;끝없이 펼쳐진 모래는 많이 봐 왔지만, 끝없이 펼쳐진 물이라니……. 신기할 따름이야.\n#4;em;…"
1004505-33 = "4;호시노 수영복ND;17;저렇게 넓으니 안에 그 많은 물고기도 있을 수 있는 거겠지."
1004505-34 = "4;호시노 수영복ND;15;물고기도, 전복도……. 고래도……."
1004505-35 = "4;호시노 수영복ND;02;굳이 따지자면 물만 보이고 안을 볼 수 없다는 게 좀 아쉽긴 하지만.\n#4;em;[음표]"
1004505-36 = "4;호시노 수영복ND;01;그래도 이렇게나마 '저 안에 다 있다'라고 생각할 수 있는 거만 해도 나쁘지 않아."
1004505-37 = "4;호시노 수영복ND;99;……응. 나쁘지 않지."
1004505-38 = "[s7] \"리조트에 버려진 잠수정이 있던가.\"\n[s8] \"나쁘지 않은 정도로 괜찮겠어?\""
1004505-39 = "4;호시노 수영복ND;16;으헤, 선생이라면 그렇게 말할 거라고 생각했지."
1004505-40 = "4;호시노 수영복ND;16;으헤, 선생이라면 그렇게 말할 거라고 생각했지."
1004505-41 = "4;호시노 수영복ND;15;그치만 괜찮아. 지금은 그냥 이 상태로 있을래.\n#4;em;[반응]"

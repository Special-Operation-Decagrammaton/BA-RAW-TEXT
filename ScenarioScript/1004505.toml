[translation]
1004505-1 = "I Want to Read Your Mind"
1004505-3 = "I went outside, and the sun was already going down."
1004505-9 = "When I arrived at the beach, I saw Hoshino facing away from me, standing on the sand, gazing at the horizon."
1004505-14 = "Huh? Sensei...?"
1004505-15 = "What are you doing here? Did something happen?"
1004505-16 = "[s1] \"I just came to see what was up.\"\n[s2] \"I just saw you on the beach.\""
1004505-17 = "Heh. You're silly."
1004505-18 = "Heh. You're silly."
1004505-22 = "I'm not ruminating over anything, by the way."
1004505-23 = "If I don't clarify, you're going to worry something's wrong, huh?"
1004505-24 = "I'm just out here enjoying the waves."
1004505-25 = "[s3] \"I wasn't worried.\"\n[s4] \"That's what I figured.\""
1004505-26 = "Oh? Does this mean you can read my mind?"
1004505-27 = "Oh? Does this mean you can read my mind?"
1004505-28 = "[s5] \"Literally, you were looking at the ocean.\"\n[s6] \"You were focused on what you were looking at.\""
1004505-29 = "Wow, amazing, Sensei."
1004505-30 = "Wow, amazing, Sensei."
1004505-31 = "Well, ocean-gazing isn't normally a hobby of mine."
1004505-32 = "I've had ten lifetimes worth of sand, but all this water... It's hard to comprehend."
1004505-33 = "The ocean is so big...to be able to fit all these sea creatures..."
1004505-34 = "Fish, abalones, whales..."
1004505-35 = "It's a shame that I can only see the surface and not what's under the water."
1004505-36 = "But it's nice to just imagine what could be down there, too."
1004505-37 = "Yeah, it's nice."
1004505-38 = "[s7] \"There might be an abandoned submarine at the resort.\"\n[s8] \"Are you sure 'nice' is good enough?\""
1004505-39 = "Haha. I think I can read your mind too, Sensei."
1004505-40 = "Haha. I think I can read your mind too, Sensei."
1004505-41 = "But it's okay. I just wanna remember this."
1004505-42 = "Even if I do go underwater, I won't be able to see the entire ocean anyway."
1004505-43 = "I wish I could see all of it at once. What's up here and what's underneath."
1004505-44 = "Haha. There I go, being greedy again."
1004505-49 = "Huh?"
1004505-53 = "What was that? I heard something in the distance..."
1004505-57 = "Oh!"
1004505-58 = "[s9] \"They're jumping gray mullet.\"\n[s10] \"I didn't know there were gray mullet here.\""
1004505-63 = "Fish? Those are fish?!"
1004505-64 = "But the fish are jumping! Fish can do that?"
1004505-68 = "I-It jumped again! Sensei, look! It did it again!"
1004505-69 = "Over there, too! What? There are so many!"
1004505-74 = "Heehee."
1004505-75 = "I didn't mean to show that side of me. I got too excited."
1004505-76 = "Please pretend you didn't see that, Sensei. I'm a tad embarrassed."
1004505-80 = "...Those guys sure like to jump."
1004505-81 = "[s11] \"A school of gray mullet must have been passing by.\"\n[s12] \"That view was worth it.\""
1004505-82 = "How cool."
1004505-83 = "...I know."
1004505-84 = "It's nice. To sit and take in the world. You get to see things you normally wouldn't."
1004505-85 = "I guess good things take time to come. It was cool to see."
1004505-86 = "Well, okay."
1004505-93 = "...It was a pretty amazing thing to see."

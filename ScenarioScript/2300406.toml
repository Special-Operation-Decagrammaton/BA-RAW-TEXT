2300406-1 = "#title;보이고 싶지 않은 모습"
2300406-2 = "#place;샬레 빌딩 자전거 보관소 앞"
2300406-3 = "3;천둥이;00;\n#3;a\n#3;em;[반응]\n#wait;2500"
2300406-4 = "4;우타하;04;아아…… 곤란하게 되었네. 엔진이 완전히 퍼져버렸어.\n#3;m1\n#4;al\n#4;em;[속상함]"
2300406-5 = "4;우타하;06;자율주행 시험을 위해 잠깐 방치해 놓았는데, 그사이에 이렇게나 성대하게 고장이 날 줄이야……."
2300406-6 = "4;우타하;05;……설마 수리할 물건이 없다니까 선생님이 일부러 고장을 낸 건 아니겠지?"
2300406-7 = "[s1] \"그럴 리가 없잖아.\"\n[s2] \"오해다! 이건 오해야!\""
2300406-8 = "4;우타하;03;후후, 농담이야. 어지간한 힘으로는 천둥이를 일부러 고장 내는 것도 쉽지가 않을 테니까.\n#4;em;[재잘]"
2300406-9 = "4;우타하;03;후후, 농담이야. 어지간한 힘으로는 천둥이를 일부러 고장 내는 것도 쉽지가 않을 테니까.\n#4;em;[재잘]"
2300406-10 = "4;우타하;01;일단 이 상태로는 밀레니엄 학원까지 천둥이를 끌고 가기도 어려우니, 근처에서 기본적인 수리부터 마쳐야겠는데……."
2300406-11 = "4;우타하;02;선생님. 샬레의 빈 창고를 빌려주지 않을래? #n공구는 내가 가져왔으니까 장소만 빌려주면 돼.\n#4;em;[?]"
2300406-12 = "[s] \"그럼 옆에서 수리하는 모습을 지켜봐도 괜찮을까?\""
2300406-13 = "4;우타하;06;……장소를 빌리는 마당에 견학을 거절하는 것도 어렵겠지."
2300406-14 = "4;우타하;02;좋아, 마음대로 해. 대신 수리에 방해가 되지 않도록 멀리서 지켜봐야 해."
2300406-15 = "[s] \"알겠어.\""

[translation]
2300406-1 = "ภาพที่ไม่อยากให้เห็น"
2300406-2 = "หน้าพื้นที่เก็บจักรยานในอาคารชาเล่ต์"
2300406-4 = "อ่า... แย่แล้ว เครื่องยนต์ดับสนิทเลย"
2300406-5 = "ฉันปล่อยมันไว้แค่ครู่เดียวเพื่อไปทดสอบการขับขี่อัตโนมัติ จู่ๆ มันก็พังเฉยเลย..."
2300406-6 = "...หรือว่านี่คุณครูตั้งใจทำให้มันพังเพราะไม่มีอะไรเหลือให้ซ่อมแล้วน่ะ?"
2300406-7 = "[s1] \"จะเป็นแบบนั้นได้ยังไงกัน\"\n[s2] \"เข้าใจผิดแล้ว! มันเป็นเรื่องเข้าใจผิด!\""
2300406-8 = "ฮุฮุ ฉันล้อเล่นน่ะ เจ้าสายฟ้าไม่ได้ถูกทำให้พังได้ง่ายๆ หรอกนะ\n"
2300406-9 = "ฮุฮุ ฉันล้อเล่นน่ะ เจ้าสายฟ้าไม่ได้ถูกทำให้พังได้ง่ายๆ หรอกนะ\n"
2300406-10 = "การจะขนย้ายสายฟ้าไปที่โรงเรียนมิลเลเนียมมันไม่ได้ทำกันได้ง่ายๆ เราควรจะซ่อมแซมขั้นพื้นฐาน#nในที่ใกล้ๆ นี้ไปก่อน..."
2300406-11 = "คุณครูพอจะมีที่ว่างให้ฉันในชาเล่ต์บ้างมั้ย? ฉันมีเครื่องมือพร้อมแล้ว ฉันแค่ต้องการสถานที่ทำงาน"
2300406-12 = "[s] \"จะว่าอะไรมั้ยถ้าครูขอดูการซ่อมแซมด้วย?\""
2300406-13 = "ถ้าคุณครูตกลงที่จะช่วยฉันก็คงปฏิเสธคุณครูไม่ได้..."
2300406-14 = "ก็ได้ คุณครูมาดูตอนซ่อมก็ได้ แต่อย่ามารบกวนการทำงานของฉันก็พอ"
2300406-15 = "[s] \"ได้เลย\""
2300406-19 = "(คุณครูขนย้ายสายฟ้าที่ชำรุดไปที่คลังกับอุทาฮะ)"
2300406-22 = "― [log=우타하]ไหนดูซิ อืม ดูจากรอยแตกที่แกนเหมือนจะมีปัญหาที่ตัวรับน้ำหนักนะ[/log][wa:2220] "
2300406-24 = "― [log=우타하]ถ้าแบบนี้แสดงว่าตลับลูกปืนมีปัญหาสินะ...[/log][wa:10] "
2300406-27 = "― [log=우타하]อืม ดูเหมือนว่าจะต้องเปลี่ยนอะไหล่แล้วละ[/log][wa:1780] "
2300406-30 = "― [log=우타하]...คุณครู มาดูฉันซ่อมแบบนี้ สนุกงั้นเหรอ?[/log][wa:2400] "
2300406-32 = "― [log=우타하]ถ้าคุณครูโอเคละก็ ฉันก็ไม่มีปัญหาอะไรหรอก[/log][wa:960] "
2300406-35 = "― [log=우타하]แต่ว่ามันค่อนข้างอันตรายน่ะ[/log][wa:280] "
2300406-37 = "― [log=우타하]ฉันว่าคุณครูไปนั่งดูตรงโน้นดีกว่านะ[/log][wa:80] "
2300406-40 = "― [log=우타하]ตรงนี้มีพวกโลหะคมๆ กระจายอยู่เต็มไปหมด[/log][wa:10] "
2300406-42 = "― [log=우타하]ไหนจะกลิ่นน้ำมันที่ชวนเวียนหัว นอกจากนี้...[/log][wa:400] "
2300406-45 = "― [log=우타하]หน้าของฉันเปื้อนเหงื่อและเขม่าเต็มไปหมดเลย...[/log][wa:1620] "
2300406-48 = "― [log=우타하]เปล่า ไม่มีอะไรหรอก ลืมเรื่องที่พูดเมื่อกี้ไปเถอะ[/log][wa:2960] "
2300406-51 = "― [log=우타하]...ว่าแล้วเชียว อย่างที่คิดไว้เลย[/log][wa:20] "
2300406-53 = "― [log=우타하]น้ำมันหล่อลื่นแห้ง และลูกปืนก็สึกหมดแล้ว[/log][wa:740] "
2300406-56 = "― [log=우타하]ช่วยส่งประแจตรงนั้นมาให้หน่อยได้มั้ย?[/log][wa:340] "
2300406-59 = "― [log=우타하]อ่า...โทษที ที่พูดไปเมื่อกี้...[/log][wa:1580] "
2300406-61 = "― [log=우타하]พอดีมันพูดติดปากจนเคยชินน่ะ[/log][wa:420] "
2300406-64 = "― [log=우타하]...ถึงจะพูดแบบนั้น แต่มีใครสักคนมาช่วยแบบนี้ มันก็ดีกว่าจริงๆ[/log][wa:1860] "
2300406-66 = "― [log=우타하]แล้วก็คงปฏิเสธไม่ได้ด้วยว่า มันทำให้รู้สึกดีเหมือนกันน่ะ[/log][wa:40] "
2300406-69 = "― [log=우타하]หน้าของคุณครูก็อาจเปื้อนน้ำมันได้เหมือนกัน...[/log][wa:180] "
2300406-71 = "― [log=우타하]แต่คุณครูจะช่วยฉันหน่อยได้รึเปล่า?[/log][wa:10] "
2300406-74 = "หน้าอาคารชาเล่ต์"
2300406-75 = "ฮู่ว... มีคุณครูมาคอยช่วยแบบนี้ เลยซ่อมเสร็จเร็วกว่าที่คิดเลยนะ"
2300406-76 = "ถ้าไม่ได้คุณครูช่วยไว้ ฉันก็คงต้องใช้เวลาซ่อมทั้งคืนแน่เลย ขอบคุณนะ"
2300406-77 = "วันหลังขอแวะไปที่ชมรมวิศวกรรมเพื่อดูฉันซ่อมของอย่างอื่นได้รึเปล่างั้นเหรอ...?"
2300406-78 = "นั่นสินะ จะว่ายังไงดีล่ะ..."
2300406-79 = "ดูแล้วยังไงฉันก็คงทำตัวให้ดูไร้ที่ติต่อหน้าคุณครูไปตลอดไม่ได้อยู่ดี ก็ได้ คุณครูแวะมาได้ตลอด#nเลยนะ"
2300406-80 = "แต่ว่าพอไปจับพวกเครื่องจักรมาแบบนี้ รีบไปล้างหน้าก่อนจะดีกว่านะ"
2300406-81 = "คุณครู... ตอนนี้หน้าคุณครูเปื้อนเขม่าเต็มไปหมดแล้ว ตลกจัง"
2300406-82 = "ฮุฮุ ถ้างั้นเอาไว้เจอกันใหม่นะคุณครู"

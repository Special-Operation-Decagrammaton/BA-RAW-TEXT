2300406-75 = "3;우타하;99;후우…… 선생님이 도와준 덕분에 생각보다 수리를 일찍 끝낼 수 있었네.\n#3;a\n#3;em;…"
2300406-76 = "3;우타하;02;선생님이 도와주지 않았더라면 밤새도록 수리를 했어도 끝내지 못했을 거야. 고마워."
2300406-77 = "3;우타하;07;그럼 다음부터는 수리하는 모습을 보러 엔지니어부에 찾아가도 직접 괜찮겠느냐고?\n#3;em;[?]\n#3;stiff"
2300406-78 = "3;우타하;06;글쎄, 어떠려나……."
2300406-79 = "3;우타하;99;언제까지나 선생님 앞에서 흐트러지지 않은 모습만을 보일 수는 없으니까. #n그래, 괜찮아.\n#3;greeting"
2300406-80 = "3;우타하;01;대신 기계를 만지고 나면 바로 얼굴을 씻는 게 좋아.\n#3;em;[반응]"
2300406-81 = "3;우타하;02;선생님, 지금 검댕이 얼굴에 잔뜩 묻어서 아주 우스운 꼴이 되었거든."
2300406-82 = "3;우타하;03;후후. 그럼 다음에 보자, 선생님.\n#3;greeting\n#3;em;[///]"

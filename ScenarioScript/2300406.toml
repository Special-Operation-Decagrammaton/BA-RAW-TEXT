[translation]
2300406-1 = "Don't Watch Me"
2300406-2 = "Near the Schale Building's Bicycle Stands"
2300406-4 = "Ahhh... This is bad. The engine is completely dead."
2300406-5 = "I left it alone a bit to conduct an autonomous driving test and it broke down completely..."
2300406-6 = "...Sensei, did you break it on purpose because there was nothing left to repair?"
2300406-7 = "[s1] \"That's absurd.\"\n[s2] \"This is all a misunderstanding! A misunderstanding, I tell you!\""
2300406-8 = "Haha, just joking. It's not easy to break Thundergun on purpose."
2300406-9 = "Haha, just joking. It's not easy to break Thundergun on purpose."
2300406-10 = "Since it won't be easy to transport Thundergun all the way to the Millennium School, we should finish the basic repairs nearby..."
2300406-11 = "Sensei, could you lend me some space in Schale? I have the tools, I just need a place to work."
2300406-12 = "[s] \"Is it fine if I watch you with the repairs?\""
2300406-13 = "...I can't really refuse when you're agreeing to help me out."
2300406-14 = "Okay, do what you want. But you have to stay out of my way."
2300406-15 = "[s] \"No problem.\""
2300406-19 = "I transported the damaged Thundergun to storage with Utaha."
2300406-22 = "― [log=우타하]Let's see... Judging by the gap in the axle, there may be a problem with the bearings.[/log][wa:1260] "
2300406-24 = "― [log=우타하]The bearings must be defective or worn-down...[/log][wa:10] "
2300406-27 = "― [log=우타하]Worst-case scenario, I'll need to replace some parts altogether.[/log][wa:820] "
2300406-30 = "― [log=우타하]Do you intend on staying to watch, Sensei?[/log][wa:2360] "
2300406-32 = "― [log=우타하]It's no issue, however...[/log][wa:1600] "
2300406-35 = "― [log=우타하]Engineering is dangerous work,[/log][wa:160] "
2300406-37 = "― [log=우타하]so please observe from a safe distance.[/log][wa:10] "
2300406-40 = "― [log=우타하]I wouldn't want you to cut yourself on any of the equipment.[/log][wa:10] "
2300406-42 = "― [log=우타하]And the smell of oil will stick to your clothes for quite some time. B-But most of all... [/log][wa:10] "
2300406-45 = "― [log=우타하]My face is a mess because of the sweat and soot...[/log][wa:1420] "
2300406-48 = "― [log=우타하]However that's irrelevant to this situation! A-Anyways... The axle...[/log][wa:2160] "
2300406-51 = "― [log=우타하]It appears I was correct.[/log][wa:340] "
2300406-53 = "― [log=우타하]The bearings aren't lubricated properly, so there's a significant amount of wear-and-tear.[/log][wa:10] "
2300406-56 = "― [log=우타하]Pass me the wrench, Sensei.[/log][wa:740] "
2300406-59 = "― [log=우타하]Ah! Sorry. I didn't mean it like that![/log][wa:1300] "
2300406-61 = "― [log=우타하]Just a force of habit...[/log][wa:540] "
2300406-64 = "― [log=우타하]...Despite what I said, having someone nearby who can help me really is more efficient.[/log][wa:820] "
2300406-66 = "― [log=우타하]And I would be lying if I said this doesn't boost my mood too.[/log][wa:10] "
2300406-69 = "― [log=우타하]You may end up with a lot of grime on your face...[/log][wa:10] "
2300406-71 = "― [log=우타하]But would you mind lending me a hand?[/log][wa:10] "
2300406-74 = "In Front of the Schale Building"
2300406-75 = "Phew... I actually finished earlier than expected, thanks to your help."
2300406-76 = "Without you, I probably would have been here all night. So, thank you."
2300406-77 = "...You want to visit the Engineering Department to watch me repair things again?"
2300406-78 = "Well, let me think about it..."
2300406-79 = "I guess I can't always look flawless in front of you. Sure, you can visit."
2300406-80 = "Although, you'll have to remember to wash your face if you do."
2300406-81 = "Your face is covered in soot from all the machines. Looks pretty funny."
2300406-82 = "Heehee. See you later, Sensei."

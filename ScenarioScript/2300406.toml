[translation]
2300406-1 = "不想被看到的事物"
2300406-2 = "夏萊．自行車停車場前"
2300406-4 = "啊啊……傷腦筋呢。引擎完全不行了。"
2300406-5 = "雖然是為了進行自律行走測試才放置一段時間的，沒想到會故障得這麼徹底……"
2300406-6 = "……雖然只是我的猜測，就算沒有能修理的工具，老師該不會……"
2300406-7 = "[s1]「憑我贏不了雷醬的啊！」\n[s2]「誤會！冤罪！」"
2300406-8 = "呵呵，我是開玩笑的。#n沒有一定的力量是沒辦法破壞雷醬的呢。"
2300406-9 = "呵呵，我是開玩笑的。#n沒有一定的力量是沒辦法破壞雷醬的呢。"
2300406-10 = "不過話說回來，這個狀態要將雷醬帶去千年也很困難，#n不在這裡把基礎部分修好的話……"
2300406-11 = "老師，可以把夏萊的空倉庫借給我嗎？#n工具我有帶來，只要借我場地就可以了。"
2300406-12 = "[s]「那，可以在旁邊看你修理嗎？」"
2300406-13 = "……站在借用場地的立場，實在沒辦法拒絕呢。"
2300406-14 = "啊啊，隨你喜歡吧。#n相對的，因為有點危險，希望你可以確實保持距離。"
2300406-15 = "[s]「我知道了！」"
2300406-19 = "（和詠葉兩個人，將壞掉的雷醬移到了倉庫）"
2300406-22 = "― [log=우타하]我看看……呼呣，軸心周圍變鬆了呢。[/log][wa:4020] "
2300406-24 = "― [log=우타하]也就是說，軸承……[/log][wa:1080] "
2300406-27 = "― [log=우타하]嗯……搞不好有更換零件的必要也說不定呢。[/log][wa:2580] "
2300406-30 = "― [log=우타하]……老師，看這個，很有趣嗎？[/log][wa:3480] "
2300406-32 = "― [log=우타하]老師不介意的話，是無所謂啦……[/log][wa:2000] "
2300406-35 = "― [log=우타하]不過靠近的話會很危險，[/log][wa:920] "
2300406-37 = "― [log=우타하]所以我建議坐在那邊看。[/log][wa:1040] "
2300406-40 = "― [log=우타하]這邊到處散落著銳利的鐵屑，[/log][wa:1000] "
2300406-42 = "― [log=우타하]機油的味道也很重……而且……[/log][wa:1560] "
2300406-45 = "― [log=우타하]臉上變得都是汗水和煤灰，所以……[/log][wa:2780] "
2300406-48 = "― [log=우타하]不，沒什麼。忘記我剛才說的吧。[/log][wa:4320] "
2300406-51 = "― [log=우타하]……原來如此，跟我想的一樣。[/log][wa:780] "
2300406-53 = "― [log=우타하]似乎是潤滑油不夠，導致軸承部分磨損了。[/log][wa:1580] "
2300406-56 = "― [log=우타하]那邊的扳手，可以幫我拿過來嗎？[/log][wa:1220] "
2300406-59 = "― [log=우타하]啊……抱歉。剛才的是那個，[/log][wa:2300] "
2300406-61 = "― [log=우타하]出於平時的習慣就不小心……[/log][wa:980] "
2300406-64 = "― [log=우타하]……話雖如此，果然旁邊有人幫忙會更有效率，[/log][wa:3460] "
2300406-66 = "― [log=우타하]似乎也無法否定心情會變得高昂呢。[/log][wa:1640] "
2300406-69 = "― [log=우타하]老師你也，雖然臉上或許會沾滿煤灰……[/log][wa:1260] "
2300406-71 = "― [log=우타하]願意協助我嗎？[/log][wa:20] "
2300406-74 = "夏萊前"
2300406-75 = "呼……多虧有老師的幫助，修理比想像中還早完成呢。"
2300406-76 = "如果老師沒有幫忙的話，也許修理一整晚也沒辦法結束也說不定，謝謝你。"
2300406-77 = "嗯？那下次可不可以再來工程師部看我修理的樣子……嗎？"
2300406-78 = "唔嗯，這……"
2300406-79 = "嘛，也沒辦法總是保持體面的樣子呢。#n啊啊，我不介意唷。"
2300406-80 = "話說回來，碰過機械之後還是洗個臉比較好。"
2300406-81 = "老師的臉上都是煤灰，現在實在是變得很有趣呢。"
2300406-82 = "呵呵。那再見，老師。"

[translation]
10016120-1 = "Afterword; RABBIT Squad Episode"
10016120-4 = "...This is RABBIT 1. Time is 1930. Millennium students are currently retrieving supplies and equipment used in the festival."
10016120-5 = "Confirmed: the tank disguised as a cheer robot and sent to infiltrate the stadium - code name <Bourgeois Crasher> - has been rendered fully non-functioning."
10016120-6 = "Other than that, all robots whose security has not been reconfirmed were retrieved by what appeared to be a Veritas student."
10016120-11 = "Th-This is RABBIT 4... Confirming the movements of the l-labor students currently protesting on the outskirts of the Athletic S-Stadium."
10016120-12 = "They were shouting, \"G-Guarantee 3 days!\" and facing off with the Valkyrie s-students... But th-their morale took a h-hit when some of the audience left."
10016120-13 = "I-I guess they d-decided that there wasn't any use in p-protesting anymore."
10016120-18 = "This is RABBIT 2. I completed my patrol of the bleacher area from where the spectators exited, and I didn't see anything resembling suspicious explosives or flammable materials."
10016120-19 = "Everyone seems to have cleaned up their trash as they left, so we're good on that front too."
10016120-24 = "This is RABBIT 3. I just checked the electronic medical records of the aid stations, and while there were quite a few minor injuries during the event, thankfully there was nothing serious to report."
10016120-25 = "If you look at the reactions on social media, they're all pretty positive... Overall, I think it was quite a successful festival."
10016120-27 = "It looks like we've eliminated any remaining potential threats in the Athletic Stadium."
10016120-32 = "With that... Mission complete!"
10016120-36 = "Thank you all for your hard work..."
10016120-37 = "Even though SRT's results were the worst among the participating academies. Heh..."
10016120-38 = "Ugh... If we hadn't gotten hit by that tank, we could have gotten at least one win..."
10016120-39 = "Are we still going on about that?"
10016120-40 = "If that's the case, aren't you more disappointed about the first game of fetch? If someone had read the rules correctly, we wouldn't have been disqualified..."
10016120-41 = "Shut up. The girl who brings white phosphorus smoke bombs to the stadium is the weird one!"
10016120-42 = "A-Anyway, there were only f-four of us from SRT to begin with..."
10016120-44 = "There are only s-so many races we could have p-participated in, so m-maybe the results were inevitable?"
10016120-45 = "But Abydos High School only had five students, and they still managed to finish in the middle of the pack."
10016120-49 = "Mm...let's just say Saki failed us."
10016120-50 = "Hey!"
10016120-54 = "There's no need to get discouraged, Saki."
10016120-55 = "We had already been operating for over 24 hours, so it's only natural we were mentally and physically exhausted."
10016120-56 = "And thanks to our diligence in tracking the whereabouts of the military parts brought into Millennium, we were able to react in a quick and orderly manner when the tanks went on a rampage."
10016120-57 = "We've accomplished our most important goal of keeping the citizens safe, so let's be satisfied with that and call it a day."
10016120-58 = "...The public may only remember the outcome of the game, but our efforts don't go unnoticed."
10016120-59 = "That makes me feel a little better, I guess..."
10016120-60 = "I-I don't know if it's okay to say this, but..."
10016120-61 = "Actually, I think this operation is a little d-different from usual..."
10016120-62 = "What do you mean?"
10016120-64 = "It was...a little fun."
10016120-68 = "I-It's weird, isn't it...? That SRT, whose priority is s-supposed to be protecting the safety of citizens, was enjoying the operation..."
10016120-69 = "I-I really am just a useless person wh-who doesn't belong at SRT Academy..."
10016120-70 = "...No, I kind of get what you're saying."
10016120-71 = "It's been a while since we've been outside the base... Interacting with students from other academies...sweating side by side..."
10016120-72 = "I realized that these people right here are the citizens and society we work to protect."
10016120-78 = "Ah... Well, I guess I'm just trying to say sometimes you don't really understand the significance of something just by reading it in a textbook. You need to experience things firsthand to really realize SRT's purpose."
10016120-79 = "I'd say today was a good opportunity to really understand the significance behind SRT's mission."
10016120-80 = "Saki..."
10016120-84 = "I had a lot of fun at this field day, too."
10016120-85 = "I was able to play with a lot of data that I wouldn't normally have access to..."
10016120-86 = "And everyone was betting on which academy was going to win each race, so I got to pocket some extra cash too."
10016120-87 = "I think you're having a little too much fun!"
10016120-91 = "I agree with all of you. Today's operation kept us busy, but it was a great opportunity to see the citizens' smiles up close."
10016120-92 = "As a member of the SRT, I will cherish every day like today, and continue to do my best to bring justice—"
10016120-96 = "..."
10016120-97 = "It totally slipped my mind. We didn't have lunch today..."
10016120-98 = "B-Because I didn't have time to scavenge for e-expired lunch boxes like usual..."
10016120-99 = "We were so busy running around the only thing we ate was the red bean bread from the Bread-Eating race..."
10016120-100 = "Speaking of which, earlier a group of Gehenna students were taking food and barbecue equipment to the center field..."
10016120-101 = "A-Are they going to b-barbecue something there?"
10016120-102 = "The center field area is where they prepare the campfire for...the After-Party."
10016120-103 = "I haven't heard anything about being able to make a barbecue over the campfire, but..."
10016120-108 = "There might be some safety issues, so... Shall we go and...inspect?"
10016120-109 = "That's right! There are always accidents at events with big fires..."
10016120-110 = "...We're deeefinitely not going there to scrounge for some leftovers."
10016120-111 = "Unlike o-our earlier operation, it seems our g-goals are a bit different now, but..."
10016120-116 = "...Operation Crescent Moon, extended with a renewed purpose!"
10016120-117 = "Roger!"

[translation]
10016120-1 = "後日談;RABBIT小隊篇"
10016120-4 = "……這裡是RABBIT1。#n現在時間1930。已確認千年的學生回收了大運動會的備品和器材。"
10016120-5 = "也確認了偽裝成應援機器人進入會場的戰車──#n「資產階級破壞者」已完全停止運作。"
10016120-6 = "此外，穩定性不明的機器人也被似乎是「貝里塔斯」相關人員的學生全數回收。"
10016120-11 = "這，這裡是RABBIT4……#n正在確認田徑運動場外示威的工務部學生的動向……"
10016120-12 = "剛才還高喊著「週休4日」並和女武神學生對峙……#n但隨著觀眾減少，氣勢也有所減弱。"
10016120-13 = "也許是認為沒必要繼續在這裡抗爭……"
10016120-18 = "這裡是RABBIT2。#n已對觀眾離開後的觀眾席進行了全面巡查，沒有發現爆裂物或易燃的可疑物品。"
10016120-19 = "看來大家在離場時已經把垃圾收拾乾淨，應該沒必要再檢查了。"
10016120-24 = "這裡是RABBIT3。我剛剛確認了救護室的電子病歷，#n雖然有不少人在比賽中受到輕傷，所幸沒有出現重傷者。"
10016120-25 = "從社群媒體上的動向來看，大家的反應都很正面……#n整體看來似乎是場令人滿意的慶典。"
10016120-27 = "這樣的話，田徑運動場上殘存的有害危險因素應該都消除了。"
10016120-32 = "那麼……任務完成！"
10016120-36 = "大家真的辛苦了……"
10016120-37 = "順帶一提，SRT特殊學園的成績是參加學園中的最後一名。呵呵……"
10016120-38 = "唔……要是那時沒被戰車撞到，至少也能取得1勝……"
10016120-39 = "還在說那件事啊？"
10016120-40 = "真要那麼說的話，一開始的「借物競賽」不是更可惜嗎？#n如果有好好閱讀規則，就不會被取消資格了……"
10016120-41 = "吵死了。把白磷彈帶進場的傢伙更奇怪吧！"
10016120-42 = "不過我們學園參加的學生總數只有4個人……"
10016120-44 = "能參加的比賽也不多，拿到最後一名也是沒辦法的吧……？"
10016120-45 = "可是阿拜多斯高中全校也只有5個人參加，他們還是取得了中等的成績。"
10016120-49 = "嗯……就歸咎於咲希失常吧。"
10016120-50 = "喂！"
10016120-54 = "沒必要那麼沮喪，咲希。"
10016120-55 = "我們已經進行了超過24小時的作戰，免不了在精神和體力上受限。"
10016120-56 = "況且，也是多虧我們鍥而不捨地追蹤被運入千年學園的軍用零件的去向，#n當戰車肆虐時，才能在第一時間不慌不忙地應對。"
10016120-57 = "既然「守護市民安全」的第一目標已經實現，今天就以此感到滿足吧。"
10016120-58 = "……雖然人們只會記得比賽的結果，但我相信有「某個人」會記得我們的辛勞。"
10016120-59 = "如果真是那樣的話，倒是有點欣慰……"
10016120-60 = "雖然不知道在現在這種狀況下說這種話合不合適……"
10016120-61 = "和平時不一樣，這次的作戰，我其實有點……"
10016120-62 = "有點……？"
10016120-64 = "……有點開心。"
10016120-68 = "果，果然很奇怪吧……？#n本應保護市民安全的SRT居然在享受作戰……"
10016120-69 = "我果然是不適合SRT特殊學園的沒用孩子──"
10016120-70 = "……不，那種心情，我某種程度上也能感同身受。"
10016120-71 = "久違地到基地外頭，和其他學園的學生相互碰撞、流汗，讓我再次有所體悟。"
10016120-72 = "「這就是我們想守護的市民和社會啊。」"
10016120-78 = "啊，該怎麼說……不是有那種時候嗎！比起閱讀守則，親身體驗會更容易理解。#n畢竟有時很難實際感受SRT的目的……"
10016120-79 = "該說這是能切身感受SRT存在意義的好機會嗎……"
10016120-80 = "咲希醬……"
10016120-84 = "這次的大運動會，我也非常樂在其中。"
10016120-85 = "不但能接觸平時很難摸到的各種資料……"
10016120-86 = "還能下注哪個學園會贏得比賽，賺取一點零用錢……"
10016120-87 = "你樂過頭了！"
10016120-91 = "沒錯。#n雖然今天是因作戰而忙碌的一天，卻同時也是近距離看見市民們笑容的一天。"
10016120-92 = "身為SRT的一員，我會珍惜今天的寶貴日常，今後也為正義全力以赴──"
10016120-96 = "……"
10016120-97 = "都忘了我們今天連午餐都沒吃……"
10016120-98 = "因為今天和平常不同，連去撿報廢便當的時間都沒有……"
10016120-99 = "在四處奔波時唯一吃下肚的，只有吃麵包競走用的紅豆麵包……"
10016120-100 = "這麼說來，剛才有一群格黑娜的學生拿著食材和燒烤設備走向中央運動場……"
10016120-101 = "他們是想在那裡烤肉嗎？"
10016120-102 = "中央運動場的話……是準備「後夜祭」營火晚會的地方。"
10016120-103 = "但我並沒有聽說會在營火晚會時烤肉……"
10016120-108 = "可能有安全上的問題……過去看看吧？"
10016120-109 = "當，當然！畢竟涉及大火的活動總是伴隨著事故……"
10016120-110 = "……絕對不是在覬覦烤肉剩下的食材！"
10016120-111 = "總覺得目的和手段好像有點本末倒置……"
10016120-116 = "……那麼，讓我們延長一下新月作戰的期限吧！"
10016120-117 = "收到！"

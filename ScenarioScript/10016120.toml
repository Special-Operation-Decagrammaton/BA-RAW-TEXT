[translation]
10016120-1 = "ย้อนวันวาน; กองทหาร RABBIT"
10016120-4 = "...RABBIT 1 รายงาน เวลา 19:30 น. ตรวจสอบพบนักเรียนโรงเรียนมิลเลเนียมกำลังขนย้ายวัสดุ และอุปกรณ์ที่ใช้ในงานฮาโลเฟสติวัล"
10016120-5 = "ยืนยัน รถถังที่ปลอมแปลงเป็นหุ่นยนต์เชียร์และแทรกซึมเข้าไปในสนามกีฬา - โค้ดเนม <บัวร์วา ครัชเชอร์> หยุดทำงานอย่างสมบูรณ์แล้วค่ะ"
10016120-6 = "นอกจากนั้น หุ่นยนต์ทั้งหมดที่ไม่ได้รับการยืนยันความปลอดภัย ถูกนักเรียนที่เหมือนเป็นสมาชิก#nของทาง ‘เวอริทัส’ เก็บรวบรวมไปแล้วค่ะ"
10016120-11 = "RABBIT 4 ระ...รายงาน... ตรวจสอบพบความเคลื่อนไหวของกลุ่มนักเรียนชมรมผู้รับจ้างประท้วงอยู่ที่#nบริเวณรอบนอกสนามกีฬา..."
10016120-12 = "ตะ... ตั้งแต่เมื่อครู่นี้พวกเธอเอาแต่ตะโกนประท้วงว่า “ทำงานสัปดาห์ละ 3 วัน” และเผชิญหน้ากับ#nนักเรียนโรงเรียนวัลคิรี่ ตะ... แต่ดูเหมือนขวัญกำลังใจของพวกเธอก็ดูเหมือนจะลดลง เพราะชาวคิโวทอสที่มามุงดูเริ่มบางตาลงค่ะ"
10016120-13 = "ดะ... ดูเหมือนพวกเธอจะได้ข้อสรุปว่าไม่มีประโยชน์ที่จะยืนประท้วงที่นี่กันต่อค่ะ..."
10016120-18 = "RABBIT 2 รายงาน ตรวจสอบพื้นที่บริเวณอัฒจันทร์หลังจากผู้ชมทยอยออกไปเรียบร้อยแล้ว ไม่พบวัตถุต้องสงสัย หรือวัตถุระเบิดอะไรซ่อนอยู่"
10016120-19 = "ทุกคนคงจะเก็บขยะและทำความสะอาดบริเวณที่นั่งตัวเองก่อนออกไป คงไม่ต้องตรวจสอบเพิ่มแล้วละ"
10016120-24 = "RABBIT 3 รายงาน ฉันเพิ่งตรวจสอบรายงานการรักษาออนไลน์ของหน่วยพยาบาล ระหว่างงานเทศกาลมีผู้บาดเจ็บเล็กน้อย ไม่พบรายงานเกี่ยวกับผู้บาดเจ็บสาหัส"
10016120-25 = "ตรวจดูกระแสในโซเชียลมีเดียก็มีแต่เชิงบวก ไม่มีกระแสเชิงลบ... โดยรวมแล้วถือว่างานเทศกาล#nประสบความสำเร็จดีเลยทีเดียว"
10016120-27 = "เหมือนเราจะกำจัดปัจจัยที่ทำให้เกิดเรื่องอันตรายขึ้นในสนามกีฬาออกไปได้หมดแล้วนะคะ"
10016120-32 = "เท่านี้ก็... ภารกิจสำเร็จแล้วค่ะ!"
10016120-36 = "ขอบคุณทุกคนที่ทำงานอย่างหนักนะ..."
10016120-37 = "ถึงผลการแข่งขันรวม สถาบัน SRT จะได้ที่โหล่ก็เถอะนะ ฮุฮุ..."
10016120-38 = "อึก... ถ้าตอนนั้นไม่ถูกรถถังนั่นชนละก็ พวกเราคงชนะไปแล้ว..."
10016120-39 = "นี่ยังจะเว้าวอนเรื่องนั้นไม่เลิกอีกเหรอเนี่ย?"
10016120-40 = "ถ้าพูดแบบนั้น ตอนแข่ง <วิ่งยืมของ> ในตอนแรกน่าเสียดายกว่าอีกไม่ใช่รึไง? ถ้าใครบางคนอ่าน#nกติกาให้ดีๆ ก็คงไม่ถูกตัดสิทธิ์การแข่งหรอก..."
10016120-41 = "เงียบไปเลย คนที่พกระเบิดควันฟอสฟอรัสขาวมาสนามกีฬาน่ะแปลกกว่าอีก!"
10016120-42 = "ยะ... ยังไงก็เถอะนะ พวกเราก็มีแค่ 4 คนเอง..."
10016120-44 = "การแข่งขันที่เข้าร่วมได้กะ... ก็มีอยู่แค่ไม่กี่รายการ พะ... พวกเราจะได้ที่โหล่กันก็ไม่แปลกนี่นา...?"
10016120-45 = "แต่อะบิดอสก็มีกันแค่ 5 คนเองนะ พวกนั้นแข่งขันได้ลำดับกลางๆ กันได้เลย..."
10016120-49 = "อืม... เอาเป็นว่าที่ได้ที่โหล่ก็เพราะซากิแล้วกัน"
10016120-50 = "นี่!"
10016120-54 = "อย่าเสียใจไปเลยค่ะ ซากิ"
10016120-55 = "เราทำภารกิจติดต่อกันมานานกว่า 24 ชั่วโมง เป็นธรรมดาที่จะรู้สึกเหนื่อยล้าทั้งร่างกายและจิตใจค่ะ"
10016120-56 = "นอกจากนี้ ต้องขอบคุณระบบติดตามพิกัดอุปกรณ์ทางการทหารที่นำเข้ามาในโรงเรียนมิลเลเนียม ทำให้เราออกปฏิบัติการได้อย่างรวดเร็ว ตอนรถถังนั่นออกอาละวาดค่ะ"
10016120-57 = "เราบรรลุวัตถุประสงค์สำคัญอย่างรักษาความปลอดภัยของชาวเมืองแล้ว เพราะงั้นวันนี้ก็ถือว่าน่า#nพึงพอใจแล้วค่ะ"
10016120-58 = "...ถึงชาวเมืองจะจดจำเพียงแค่ผลของการแข่งขัน แต่ก็อาจมี “ใครสักคน” ที่จดจำความทุ่มเทของ#nเราได้แน่ค่ะ"
10016120-59 = "ถ้าเป็นแบบนั้นก็ค่อยรู้สึกดีขึ้นหน่อย..."
10016120-60 = "ฉะ... ฉันไม่รู้ว่าควรพูดเรื่องนี้ ในสถานการณ์แบบนี้รึเปล่า แต่ว่า..."
10016120-61 = "ที่จริงแล้วฉันคิดว่า... ปฏิบัติการครั้งนี้ต่างจากทุกครั้งที่เคยทำมา แล้วก็... "
10016120-62 = "แล้วก็...?"
10016120-64 = "แล้วมันก็สนุกดีน่ะ..."
10016120-68 = "มะ... มันฟังดูแปลกๆ สินะ...? ทั้งที่นักเรียนของ SRT ควรจะต้องนึกถึงความปลอดภัยของชาวเมือง#nเป็นอันดับแรก ตะ... แต่กลับรู้สึกสนุกกับการปฏิบัติการแบบนี้... "
10016120-69 = "วะ... ว่าแล้วเชียว ฉะ... ฉันคงไม่เหมาะกับการเป็นนักเรียนสถาบัน SRT จริงๆ..."
10016120-70 = "...ไม่หรอก ฉันเข้าใจความรู้สึกเธอนะ ฉันเองก็รู้สึกแบบนั้นเหมือนกัน"
10016120-71 = "พวกเราไม่ได้ออกมาจากฐานปฏิบัติการ แล้วก็พูดคุยกับนักเรียนโรงเรียนอื่น แล้วก็ร่วมแข่งขันแบบนี้#nมาสักพักแล้วนี่นา"
10016120-72 = "มันทำให้ฉันรู้สึกว่า “สถานที่แห่งนี้ และคนพวกนี้ก็คือชาวเมืองที่พวกเราต้องปกป้อง” น่ะ"
10016120-78 = "อะ...อะไรเล่า! ฉะ... ฉันแค่จะบอกว่าบางครั้งการได้สัมผัสประสบการณ์โดยตรงจะทำให้เข้าใจได้ดี#nกว่าการอ่านจากคู่มือ และจะทำให้เราเข้าใจวัตถุประสงค์ของสถาบัน SRT ได้ดีขึ้น..."
10016120-79 = "ฉันแค่จะบอกว่าวันนี้เป็นโอกาสดีที่จะได้เข้าใจถึงความสำคัญของวัตถุประสงค์ของภารกิจสถาบัน SRT..."
10016120-80 = "ซากิจัง..."
10016120-84 = "ฉันเองก็สนุกกับงานแข่งกีฬาปีนี้เหมือนกัน"
10016120-85 = "ฉันได้เล่นสนุกกับข้อมูลที่ไม่ได้เข้าถึงกันได้ง่ายๆ ด้วย..."
10016120-86 = "แถมระหว่างแข่งแต่ละรายการ ก็มีนักเรียนหลายๆ คนก็พนันกันว่าโรงเรียนไหนจะชนะ... ฉันเลยได้ค่าขนมมาเยอะพอสมควรเลยละ..."
10016120-87 = "เลิกทำอะไรแบบนั้นสักทีเถอะน่า!"
10016120-91 = "ค่ะ ฉันเองก็เห็นด้วยกับทุกคนนะคะ ปฏิบัติการวันนี้ทำเอายุ่งจนหัวหมุนเลยก็จริง แต่ก็นับว่าเป็น#nโอกาสดีที่ได้เห็นรอยยิ้มที่มีความสุขของทุกคนแบบนี้ค่ะ"
10016120-92 = "ในฐานะนักเรียนของสถาบัน SRT ฉันจะทำทุกวันให้เป็นวันที่มีคุณค่า และพยายามเต็มที่เพื่อรักษา#nความยุติธรรม---"
10016120-96 = "......"
10016120-97 = "ลืมสนิทเลยแฮะ วันนี้พวกเรายังไม่ได้กินมื้อเที่ยงกันเลยนี่นา..."
10016120-98 = "วะ... วันนี้เราไม่มีเวลาไปคุ้ยหา ขะ... ข้าวกล่องหมดอายุแบบทุกที..."
10016120-99 = "พวกเราวิ่งวุ่นไปโน่นมานี่ทั้งวัน แล้วก็ได้กินแค่ขนมปังถั่วแดงไปคนละชิ้นเอง"
10016120-100 = "พอมานึกๆ ดูแล้ว... เมื่อกี้มีนักเรียนเกเฮนน่ากลุ่มหนึ่งขนย้ายอุปกรณ์ทำบาร์บีคิวกับอาหารไปที่สนาม#nกลางด้วย..."
10016120-101 = "ระ... หรือว่าพวกเธอจะทำบาร์บีคิวกันนะ?"
10016120-102 = "สนามกลาง... สถานที่เตรียมแคมป์ไฟในงาน <อาฟเตอร์ปาร์ตี้> สินะคะ"
10016120-103 = "ฉันไม่รู้มาก่อนเลยว่าทำบาร์บีคิวที่แคมป์ไฟได้ด้วย..."
10016120-108 = "อาจเกิดปัญหาเรื่องความปลอดภัยขึ้นก็ได้ ถ้างั้น... พวกเราไปตรวจสอบกันหน่อยดีมั้ยคะ?"
10016120-109 = "อะ... เอาสิ! ที่ไหนมีไฟ มันมักจะเกิดอุบัติเหตุอยู่เสมอๆ..."
10016120-110 = "เราไม่ได้ไปที่นั่นเพราะหวังของเหลือจากบาร์บีคิวเลยนะ ไม่ใช่เลยสักนิด!"
10016120-111 = "ดะ... ดูเหมือนว่าวัตถุประสงค์กับวิธีการของปฏิบัติการจะเปลี่ยนไปนิดหน่อยนะคะ..."
10016120-116 = "ถ้างั้น... ปฏิบัติการจันทร์เสี้ยว... ออกปฏิบัติการต่อกันเถอะค่ะ!"
10016120-117 = "รับทราบ!"

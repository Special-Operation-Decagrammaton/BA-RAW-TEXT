1802-82 = "Tsurugi! What about you? How'd it go?"
1802-83 = "...Hmm?"
1802-84 = "Oh..."
1802-85 = "...It was a very pleasant gathering."
1802-86 = "I'm glad everyone enjoyed themselves."

[translation]
1802-1 = "實現正義部休假中（２）"
1802-2 = "三一綜合學園．校內庭園"
1802-3 = "（純文學社．午餐會）"
1802-4 = "你讀過吉本老師日前新出版的詩集了嗎？"
1802-5 = "那當然。老師將女生不得不和戀人分手的心境寫的好感傷……看得我心都揪在一起了。"
1802-6 = "……"
1802-7 = "這麼說來，野上老師的新散文集這個月底要上市了。"
1802-8 = "哎呀，我都忘了呢。前作太好看了，這次也好期待喔。"
1802-9 = "…………"
1802-10 = "嗯……麻白同學呢？最近有看什麼有趣的書嗎？"
1802-11 = "我、我嗎？那個，最近看過的書……啊，我有看一本《正義論》……"
1802-12 = "《正義論》……？那是什麼樣的書？詩集？散文？還是小說？"
1802-13 = "那、那本書的內容，是透過各種實際案例，來闡述何謂正義……"
1802-14 = "原來如此，是哲學書。非常適合總是認真進取的麻白同學呢。"
1802-15 = "不介意的話，可以跟我們分享一下內容嗎？"
1802-16 = "那個，「正義」這概念實在沒辦法簡單扼要說明……我想想……"
1802-19 = "（好難受…………好想快點回去實現正義部……）"
1802-20 = "（不知道前輩們都還好嗎……）"
1802-22 = "（紅茶社．臨時品茶會）"
1802-23 = "哎呀，蓮實同學，你這杯紅茶泡的真好喝。"
1802-24 = "真難得能喝到這麼美味的紅茶……"
1802-25 = "這方面我也不太清楚，但我有聽說紅茶的味道，很容易受到水溫和時間的影響。"
1802-26 = "只要照著基礎，並確實遵守時間與份量，就能泡出美味的紅茶了。"
1802-27 = "蓮實同學真不愧是實現正義部的成員。一舉一動都非常端莊……"
1802-28 = "是啊，用字遣詞也很有氣質，打扮的也漂亮……"
1802-29 = "兩位過獎了。我還有很多不成熟的地方。 "
1802-30 = "話說回來，這種茶葉聞起來很香呢。請問是哪裡的茶葉啊？"
1802-31 = "這些是格黑娜學園前幾天送來的交流禮物。由本校學生會「茶會」分給我們的，聽說是很稀有的紅茶──"
1802-32 = "……格黑娜？"
1802-33 = "……我太失態了。明明不知道是那群貨色給的東西，卻還如此悉心對待……"
1802-34 = "與其喝這種東西，還不如用泥巴漱口……！"
1802-35 = "剩下的茶葉就和落葉一起燒了吧。我們總不能泡那種垃圾來喝。"
1802-37 = "……真、真不愧是實現正義部的副部長。只要跟格黑娜扯上關係就絕不留情。"
1802-38 = "好、好可怕……"
1802-40 = "（放學後的甜點部．週一例會）"
1802-41 = "……"
1802-42 = "…………"
1802-43 = "………………"
1802-46 = "……………………"
1802-47 = "（空氣好沉重……）"
1802-48 = "（這什麼情形？！為什麼正義部部長會在這裡啊？！）"
1802-49 = "（你不要問我啊……）"
1802-50 = "哈……"
1802-51 = "（她在嘆氣了啦？！這是要我們怎樣？！）"
1802-52 = "（就、就說不要問我啊……！）"
1802-54 = "（要搭話看看嗎？）"
1802-55 = "（瘋了嗎？！被抓去吃掉怎麼辦！？）"
1802-57 = "（會被吃掉喔？！）"
1802-58 = "（再怎麼樣也不至於吧……）"
1802-59 = "……"
1802-60 = "咕嚇啊啊啊啊啊啊啊！！"
1802-61 = "（咿咿咿！？）"
1802-62 = "（！？）"
1802-63 = "（突、突然這是怎樣？！我們做了什麼嗎！？）"
1802-64 = "（就說了不要問我我也不知道啊……！）"
1802-65 = "………"
1802-66 = "……………"
1802-67 = "（啊，靜下來了）"
1802-68 = "喀嘿！"
1802-69 = "喀嘿嘿嘿嘿嘿嘿嘿嘿嘿！！"
1802-73 = "（好、好可怕……）"
1802-74 = "（莫名其妙耶……）"
1802-75 = "（真想回家……）"
1802-77 = "三一綜合學園．校內庭園"
1802-78 = "（第二天）"
1802-79 = "（休假後，正義部成員來到庭園集合）"
1802-80 = "沒想到和普通三一學生一起進行有格調的談話，會這麼困難……"
1802-81 = "……我則覺得從那次品茶會之後，大家就一直躲著我……"
1802-82 = "弦生前輩呢？前輩覺得如何？"
1802-83 = "……？"
1802-84 = "……"
1802-85 = "非常好玩。"
1802-86 = "而且大家都很歡迎我，好開心。"
1802-87 = "嘻嘻，嘰嘻。"
1802-88 = "嘰嘻嘻嘻嘻嘻嘻嘻嘻！"
1802-89 = "……"
1802-90 = "看來有度過一段相當開心的時光呢。"
1802-91 = "……真的假的？"
1802-92 = "雖然感覺像是被渚同學擺布，有點不愉快。但既然弦生開心起來，那就好了……還真是因禍得福呢。"
1802-93 = "看到弦生這麼愜意的表情，我就安心了。相信一定過了非常快樂的一天吧。"
1802-94 = "……不知道放學後的甜點部成員，是不是也這麼覺得呢？"
1802-97 = "噫嘻嘻嘻嘻嘻嘻嘻嘻！"
1802-98 = "實現正義部休假中"

1802-1 = "The Justice Task Force's Day Off 2"
1802-2 = "Trinity Garden"
1802-3 = "At a lunch meeting with the Pure Literature Appreciation Club..."
1802-4 = "Did you read Yoshimoto's book of poetry that just came out?"
1802-5 = "I did! Yoshimoto perfectly captured the mind of a woman going through a breakup... I was so moved."
1802-6 = "..."
1802-7 = "Oh, by the way, I heard Nogami's new essay is coming out at the end of the month."
1802-8 = "Is that true? I enjoyed the last one so much... I'm excited!"
1802-9 = "..."
1802-10 = "So...what about you, Mashiro? What books have you been enjoying recently?"
1802-11 = "O-Oh, me? I recently read this book called \"Justice: It's the Right Thing to Do\"..."
1802-12 = "What kind of a book is it? Poetry? Essays? Or a novel, maybe?"
1802-13 = "Well, no...it's a book with various examples of how to achieve justice..."
1802-14 = "Oh, so it's a philosophy book. That suits your serious character. Very cool."
1802-15 = "If you don't mind, could you tell us what it's about?"
1802-16 = "Well, it's a bit difficult to summarize the theme of the book..."
1802-19 = "(Ugh, this is torture... I just wanna go back to the Justice Task Force...)"
1802-20 = "(I wonder how everyone else is doing...)"
1802-22 = "A meeting at the Tea Club."
1802-23 = "Wow, you're quite skilled at making tea, Hasumi."
1802-24 = "Yeah, this is the greatest tea I've ever had!"
1802-25 = "I find the taste of tea is very dependent upon the temperature of the water and the boiling time."
1802-26 = "You must stick to the basics and keep track of time in order to make great tea."
1802-27 = "Your every action oozes with dignity and grace, Hasumi. It makes sense that you belong to the Justice Task Force."
1802-28 = "I agree! The way you speak is so classy, and your clothing is so sophisticated!"
1802-29 = "Well, thank you, but I don't deserve such compliments yet. I still have a long way to go."
1802-30 = "By the way, these tea leaves have a particularly good scent. Where did you get them?"
1802-31 = "These tea leaves were sent to us as exchange gifts from Gehenna Academy. They're quite hard to get usually, so the Tea Party gave us some."
1802-32 = "...Gehenna?!"
1802-33 = "I can't believe I was working so hard to make tea with leaves that came from those jerks!"
1802-34 = "I'd rather drink wastewater than have a drop of this tea!"
1802-35 = "Please burn these tea leaves along with the remaining ones from the garden. Don't drink this garbage!"
1802-37 = "Wow, the vice president of the Justice Task Force has no mercy when it comes to Gehenna!"
1802-38 = "It's scary..."
1802-40 = "At the After-School Sweets Club's regular Monday meeting."
1802-41 = "..."
1802-42 = "..."
1802-43 = "..."
1802-46 = "..."
1802-47 = "(This is uncomfortable...)"
1802-48 = "(What is happening?! Why is the Justice Force president here with us?!)"
1802-49 = "(Don't ask me! I have no idea...)"
1802-50 = "*sigh*"

[translation]
1301006-1 = "睡過頭"
1301006-2 = "千年．研討會"
1301006-3 = "老師和大家都一個樣，為什麼會遲到呢……？"
1301006-4 = "只要規律地睡覺、起床，就不會遲到了。為什麼這麼簡單的事情都做不到呢……"
1301006-5 = "如果千年的所有學生都能好好地遵守校規的話，我的工作就會減少很多……"
1301006-8 = "嗯……哎呀，已經是這個時間了。"
1301006-9 = "再不睡的話，會影響明天的……還有個夏萊的會議要參加。"
1301006-10 = "不快點結束工作的話……"
1301006-13 = "……？啊咧，什麼時候早上了……"
1301006-14 = "啊啊，當時還在做學生會的工作……搞砸了……"
1301006-15 = "比起那個，現在是幾點……"
1301006-16 = "上午11點！？我，我遲到了！"
1301006-17 = "趕緊梳頭髮……！不，在那之前先把會議的資料……！"
1301006-20 = "夏萊．辦公室"
1301006-22 = "我，我來晚了！"
1301006-23 = "[s] 「早安，優香。」"
1301006-24 = "對，對不起。昨天工作到很晚，就那樣睡著了……"
1301006-25 = "………"
1301006-26 = "那個，老師。你今天沒有遲到嗎？"
1301006-27 = "[s] 「嗯，昨天跟我說絕對不能遲到。」"
1301006-28 = "……抱歉！"
1301006-29 = "和老師說了一堆，自己卻遲到了……沒有辯解的餘地。"
1301006-30 = "既然事已至此，只能甘心接受懲罰。"
1301006-31 = "來，做什麼都行。請命令我吧！"
1301006-32 = "[s] 「這沒什麼大不了的……」"
1301006-33 = "不，罰則也是規則！如果自己說出口的東西只有自己是例外，有失身為研討會會計的面子！"
1301006-34 = "所以，請下令！"
1301006-36 = "[s] 「那麼，能去居住區睡個午覺嗎？」"
1301006-37 = "……耶？那算不上是懲罰吧……？"
1301006-38 = "如果不是合適的內容的話，不能算是懲罰。"
1301006-39 = "[s] 「總是努力不懈的優香最需要的處罰就是這個。」"
1301006-40 = "但是……"
1301006-41 = "[s] 「說好什麼命令都可以吧？」"
1301006-42 = "哈啊……真像是老師會說的話……"
1301006-43 = "我明白了。那麼按照您的命令，我稍微休息一下。"
1301006-44 = "但是，還是不能有「遲到也沒關係」的想法！今後我還是會嚴格監督老師是否遲到！"
1301006-45 = "當然，我也不會遲到的！"
1301006-47 = "在那之後，趁優香睡覺的時候，整理了研討會累積的工作。"

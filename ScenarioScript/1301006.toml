[translation]
1301006-1 = "Overslept"
1301006-2 = "Millennium Seminar Office"
1301006-3 = "Why is everyone at this academy always so late? Even the teachers."
1301006-4 = "If they just went to bed on time, they wouldn't oversleep. How hard is it to follow one simple rule...?"
1301006-5 = "My workload would be half what it is now if Millennium's students just knew how to control themselves."
1301006-8 = "*yawn* Look at the time..."
1301006-9 = "If I stay up any later, I might miss the morning meeting at Schale."
1301006-10 = "I should...hurry up...and finish..."
1301006-13 = "...Huh? Morning already?"
1301006-14 = "Did I fall asleep while doing Student Council work? Oh, no..."
1301006-15 = "What time is it...?"
1301006-16 = "Already 11 AM?! I-I'm late!"
1301006-17 = "I have to do my hair... No, I have to organize the documents for the meeting first...!"
1301006-20 = "Schale Executive Office"
1301006-22 = "I-I'm late!"
1301006-23 = "[s] \"Good morning, Yuuka.\""
1301006-24 = "I-I'm so sorry, Sensei. I was working late and overslept..."
1301006-25 = "..."
1301006-26 = "Hold on. Were you on time today?"
1301006-27 = "[s] \"Of course. Didn't you tell me to never be late yesterday?\""
1301006-28 = "...I'm sorry!"
1301006-29 = "I feel like such a hypocrite after yesterday... I have no excuse."
1301006-30 = "I'd understand if you held it against me."
1301006-31 = "I'll do anything to make it up to you—just say the word!"
1301006-32 = "[s] \"It's fine, Yuuka...\""
1301006-33 = "No! Rules are rules! What kind of treasurer would I be if I didn't follow the rules that I make?!"
1301006-34 = "Don't hold back. I'll do anything!"
1301006-36 = "[s] \"In that case, your punishment is to go to the Residence Hall and take a nap.\""
1301006-37 = "What...? But that's not a punishment."
1301006-38 = "I have to be punished if I'm going to learn my lesson."
1301006-39 = "[s] \"What you really need is rest. You're working too hard.\""
1301006-40 = "But..."
1301006-41 = "[s] \"Didn't you say you'd do anything?\""
1301006-42 = "*sigh* I should have seen this coming."
1301006-43 = "Have it your way. I'll take a break in the lounge, then."
1301006-44 = "But this doesn't mean you get to be late from now on. I'll be monitoring your attendance like a hawk."
1301006-45 = "And I won't be late either!"
1301006-47 = "While Yuuka rested in the lounge, I took care of some tasks for Seminar in her place."

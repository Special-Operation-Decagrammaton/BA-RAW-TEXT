[translation]
1301006-1 = "#title;늦잠"
1301006-2 = "#place;밀레니엄 <세미나> 학생 사무실"
1301006-3 = "3;유우카;05;학생들도, 선생님도, 왜 이렇게 다들 자주 지각을 하는 걸까?\n#3;a"
1301006-4 = "3;유우카;99;규칙적으로 자고 일어나면 지각할 일도 없을 텐데. 왜 다들 이 간단한 수칙도 지키지 못하는 건지…….\n#3;em;…"
1301006-5 = "3;유우카;01;밀레니엄의 모든 학생이 교칙에 맞추어 올바르게 생활한다면, 내가 할 일도 훨씬 줄어들 텐데 말이야."
1301006-6 = "#all;hide"
1301006-7 = "#wait;1000"
1301006-8 = "3;유우카;05;하암……. 벌써 시간이 이렇게 되었네.\n#3;stiff\n#3;em;[속상함]\n#3;a"
1301006-9 = "3;유우카;05;더 늦게까지 깨어있다가는 샬레의 내일 아침 회의에 늦을지도 모르겠어."
1301006-10 = "3;유우카;99;빨리 일을…… 마무리하지 않으면…….\n#3;em;…"
1301006-11 = "#all;hide"
1301006-12 = "#wait;2000"
1301006-13 = "3;유우카;06;……어라? 어느새 아침이 된 거지?\n#3;a\n#3;stiff\n#3;em;[반응]"
1301006-14 = "3;유우카;06;어젯밤 늦게까지 학생회 일을 하다가 깜빡 잠이 들었었나? 이런 불찰을……."
1301006-15 = "3;유우카;05;그나저나 지금 시간이……."
1301006-16 = "3;유우카;06;오전 11시?! 지, 지각이야!\n#3;jump"
1301006-17 = "3;유우카;06;우, 우선 머리 손질부터…… 아니, 그전에 회의 자료부터……!\n#3;shake\n#3;em;[속상함]"
1301006-18 = "3;유우카;06\n#3;dr\n#wait;1500"
1301006-19 = "#all;hide"
1301006-20 = "#place;샬레 집무실"
1301006-21 = "#wait;500"
1301006-22 = "3;유우카;06;느, 늦었습니다!\n#3;al"
1301006-23 = "[s] \"좋은 아침, 유우카.\""
1301006-24 = "3;유우카;06;죄, 죄송합니다. 선생님. 어제 늦게까지 일을 하다가 늦잠을 자는 바람에…….\n#3;stiff"
1301006-25 = "3;유우카;06;……….\n#3;em;…"
1301006-26 = "3;유우카;06;저, 선생님. 오늘은 지각하지 않으셨나요?"
1301006-27 = "[s] \"응, 어제 유우카가 절대로 늦지 말라고 했잖아?\""
1301006-28 = "3;유우카;04;……죄송합니다!\n#3;stiff\n#3;em;[속상함]"
1301006-29 = "3;유우카;99;선생님께 지각을 하지 말라고 그렇게 말해놓고서는, 정작 제가 지각을 하다니…… 입이 열 개라도 할 말이 없어요."
1301006-30 = "3;유우카;05;이렇게 된 이상 선생님이 내리는 벌을 달게 받겠습니다."
1301006-31 = "3;유우카;05;자, 어떤 곤란한 일이라도 괜찮으니 제게 명령해주세요!\n#3;jump\n#3;em;[반응]"
1301006-32 = "[s] \"괜찮은데…….\""
1301006-33 = "3;유우카;05;아뇨, 규칙은 규칙! 제 입으로 징계를 정해 놓고서 예외를 둔다면 세미나의 회계로서 체면이 서질 않아요!\n#3;hophop"
1301006-34 = "3;유우카;05;자, 명령을!\n#3;closeup\n#3;em;[!]"
1301006-35 = "#wait;1000"
1301006-36 = "[s] \"그럼 유우카는 생활관에 가서 낮잠을 자고 오도록.\""
1301006-37 = "3;유우카;06;네……? 그건 벌칙이 아니잖아요?\n#3;em;[?!]\n#3;shake"
1301006-38 = "3;유우카;05;제대로 된 벌을 주시지 않으면 반면교사가 되지 않는다고요."
1301006-39 = "[s] \"언제나 노력하는 유우카에게 필요한 건 벌이 아니라 휴식이야.\""
1301006-40 = "3;유우카;06;하지만…….\n#3;em;…"
1301006-41 = "[s] \"어떤 명령이라도 듣는다면서?\""
1301006-42 = "3;유우카;99;(한숨) ……정말, 선생님다운 명령이네요.\n#3;em;[속상함]"
1301006-43 = "3;유우카;07;알겠어요. 이번만큼은 선생님의 말씀대로 휴게실에서 조금 쉬도록 할게요.\n#3;greeting"
1301006-44 = "3;유우카;05;하지만 그렇다고 해서 앞으로 지각을 해도 괜찮다는 뜻은 아니에요. 앞으로도 선생님이 지각하지 않는지 엄격하게 지켜볼 거예요."
1301006-45 = "3;유우카;04;물론 저도 늦지 않을 테니까요!\n#3;em;[///]\n#3;stiff"
1301006-46 = "#all;hide"
1301006-47 = "#na;이후, 유우카가 휴게실에 자러 간 사이에 세미나의 밀린 일감을 대신 처리해 주었다."

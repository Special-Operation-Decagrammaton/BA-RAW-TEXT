[translation]
1301006-1 = "นอนตื่นสาย"
1301006-2 = "ห้องขององค์การนักเรียน <เซมิน่า> มิลเลเนียม"
1301006-3 = "ทำไมทั้งคุณครู ทั้งนักเรียนถึงชอบมาสายกันนักนะ?"
1301006-4 = "ถ้าทุกคนเข้านอนตรงเวลาก็คงไม่มาสายกันหรอก ทำไมทุกคนถึงไม่ยอมทำตามกฎกันนะ..."
1301006-5 = "ถ้านักเรียนทุกคนในมิลเลเนียมทำตามกฎล่ะก็... งานที่ฉันต้องทำก็คงจะลดลงกว่านี้"
1301006-8 = "ฮ้าววว... เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย"
1301006-9 = "ถ้าฉันอยู่ดึกกว่านี้ ฉันคงไปไม่ทันประชุมชาเล่ต์ตอนเช้าแน่ๆ"
1301006-10 = "ถ้าไม่รีบ...ทำให้เสร็จ...เร็วๆ ล่ะก็..."
1301006-13 = "...เอ๊ะ? เช้าแล้วงั้นเหรอ?"
1301006-14 = "นี่ฉันเผลอหลับไปตอนที่ทำงานให้ทางสภานักเรียนงั้นเหรอ? ไม่นะ..."
1301006-15 = "กี่โมงแล้วเนี่ย..."
1301006-16 = "สิบเอ็ดโมง?! สะ...สายแล้ว!"
1301006-17 = "ฉันต้องสระผมก่อน... ไม่สิ ฉันต้องรีบเตรียมเอกสารการประชุมก่อน...!"
1301006-20 = "สำนักงานชาเล่ต์"
1301006-22 = "สะ...สายแล้ว!"
1301006-23 = "[s] \"อรุณสวัสดิ์ยูกะ\""
1301006-24 = "ขะ... ขอโทษค่ะคุณครู เมื่อคืนฉันอยู่ทำงานจนดึกก็เลยตื่นสาย..."
1301006-25 = "........"
1301006-26 = "คือ...คุณครูคะ วันนี้คุณครูไม่ได้มาสายเหรอคะ?"
1301006-27 = "[s] \"ไม่สายนะ เมื่อวานยูกะบอกไม่ให้มาสายนี่นา?\""
1301006-28 = "...ขอโทษค่ะ!"
1301006-29 = "ทั้งที่บอกคุณครูว่าไม่ให้มาสายแท้ๆ และขอให้มาตรงเวลาแต่ว่าฉันกลับมาสายเอง...#nฉันยอมรับผิดทุกอย่างค่ะ"
1301006-30 = "ฉันยอมรับบทลงโทษทุกอย่างค่ะ"
1301006-31 = "ฉันจะทำทุกอย่างตามที่คุณครูบอกค่ะ!"
1301006-32 = "[s] \"ไม่เป็นไร...\""
1301006-33 = "ไม่ค่ะ กฎต้องเป็นกฎค่ะ! ถ้าฉันยอมละเว้นกฎให้กับตัวเอง ฉันคงเคารพตัวเองในฐานะนักบัญชี#nของเซมิน่าไม่ได้"
1301006-34 = "สั่งการมาได้เลยค่ะ!"
1301006-36 = "[s] \"ถ้างั้นยูกะก็กลับไปที่ที่พักแล้วก็นอนพักเถอะ\""
1301006-37 = "คะ...? นั่นไม่ใช่การลงโทษนี่นา?"
1301006-38 = "ถ้าคุณครูไม่ลงโทษฉัน... ฉันก็คงไม่ได้บทเรียนแน่ๆ ค่ะ"
1301006-39 = "[s] \"ยูกะตั้งใจทำงานมาตลอด และสิ่งที่ต้องการตอนนี้คือการพักผ่อนไงล่ะ\""
1301006-40 = "แต่ว่า..."
1301006-41 = "[s] \"เธอบอกว่าจะทำตามคำสั่งทุกอย่างไม่ใช่เหรอ?\""
1301006-42 = "(ถอนหายใจ) ...สมกับเป็นคุณครูจริงๆ เลยนะคะ"
1301006-43 = "เข้าใจแล้วค่ะ ฉันจะทำตามคำสั่งคุณครูแล้วกลับไปพักที่ห้องพักค่ะ"
1301006-44 = "แต่นี่ไม่ได้หมายความว่าต่อไปคุณครูจะมาสายได้นะคะ ต่อไปฉันจะคอยจับตาดูการเข้างานของ#nคุณครูค่ะ"
1301006-45 = "และฉันก็จะไม่มาสายแล้วค่ะ!"
1301006-47 = "หลังจากนั้นยูกะก็ไปนอนพักที่ห้องพักผ่อน คุณครูก็จัดการงานของเซมิน่าแทนยูกะ"

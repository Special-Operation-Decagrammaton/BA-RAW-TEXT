201050-3 = "3;린;05;당신이…… 총학생회장이라고요?"
201050-4 = "1;가짜 총학생회장;04;그렇습니다만…… 갑자기 왜 그러는 건가요, 린?\n#1;a\n#3;m5\n#1;em;[반응]"
201050-5 = "1;가짜 총학생회장;04;물론 제가 오랫동안 자리를 비우긴 했지만, 그렇게 ‘처음 보는 사람’처럼 대할 필요는……"

[translation]
201050-1 = "第5話;記憶の誤り"
201050-3 = "あなたが……連邦生徒会長？"
201050-4 = "ええ、そうですよ……どうされましたか、リン。"
201050-5 = "たしかに長い間、私は席を外していました。#nですが、まるで「初対面」のように接するなんて……。"
201050-6 = "いいえ。私はあなたを知りません。"
201050-8 = "……リン。"
201050-9 = "急に姿を消したことをずっと気にしていたのですか？"
201050-10 = "何を言っても言い訳にしかならないかもしれません。#nですが――"
201050-11 = "いいえ、言葉通りです。"
201050-12 = "初対面のはずです。私はあなたを知りません。#n顔も、声も、何もかも。"
201050-13 = "私の知る連邦生徒会長は、あなたではありません。"
201050-14 = "冗談だとしても、笑って流せる範疇を越えています。"
201050-15 = "……何かあったのですね。"
201050-16 = "失礼、今すぐアオイ……いえ、財務室長を呼んでくれますか？"
201050-17 = "行政官に関してお話が――"
201050-18 = "（この人は何を考えているのでしょうか？）"
201050-19 = "（人が来ればすぐに明らかになるというのに、財務室長を呼ぶだなんて――）"
201050-26 = "あら……リン行政官。ここにいたのね。"
201050-27 = "昨日は寮に戻らなかったと聞いたから心配していたの。#nまさか、休暇が終わってすぐに徹夜でもしたのかしら？"
201050-28 = "せっかく休みを取ってもらったのに、それでは意味がないじゃない。"
201050-29 = "今はそれよりもこの部外者を――"
201050-30 = "それで……何の用かしら、[ruby=・   ・   ・   ・   ・   ・]連邦生徒会長[/ruby]？"
201050-31 = "……え？"
201050-32 = "アオイ、今なんと……。"
201050-33 = "どうかしたのかしら？"
201050-34 = "連邦生徒会長に話しかけているのだけど。"
201050-35 = "アオイ……。"
201050-36 = "あなたは……この人を連邦生徒会長だと！？"
201050-37 = "リン先輩こそ何を言っているの？"
201050-38 = "当然のことを確認するなんて……。"
201050-39 = "この人が、私たちの連邦生徒会長でしょう？"
201050-44 = "……連邦生徒会長？元々あんなだったでしょ？"
201050-45 = "ちょっと雰囲気変わった気がするけど……それくらいじゃない？"
201050-47 = "そりゃ覚えてるよ。明太子味ポテチみたいな白金色を忘れるわけないじゃない。"
201050-48 = "え？髪は水色だった……？"
201050-49 = "勘違いじゃない？"
201050-51 = "連邦生徒会長の姿？もちろん覚えてるよ！"
201050-52 = "ピンク髪に緑の瞳をした――"
201050-53 = "って、これはカヤ元代行だっけ。うーん、たしか連邦生徒会長は……。"
201050-54 = "黒髪……だったっけ？"
201050-56 = "せ、先輩……そう何度も聞かれましても、私にはよく分かりません。"
201050-57 = "連邦生徒会長は、今も昔もお変わりありませんよ。"
201050-61 = "その……お言葉ですが……。"
201050-62 = "最近無理をしすぎたせいで、記憶に混乱が生じているのではないでしょうか？"
201050-64 = "……少しは落ち着きましたか？"
201050-65 = "なんだか、今日はリンらしくないですね。"
201050-69 = "どうして……皆さん覚えていないのですか。"
201050-70 = "あれほど長い時間を共にしてきたのに……どうして？"
201050-71 = "いえ、だからこそ……皆さんが連邦生徒会長だと思っているあなたは……#n誰なのですか？"
201050-72 = "これは……私のせいなのかもしれません。"
201050-73 = "長らく席を外していたせいで、あまりにも大きな負担をかけてしまいました。"
201050-74 = "人の記憶は過度なストレスや疲労などで容易に変わってしまうもの。#nですから、リンが私を覚えていなくても――"
201050-75 = "いいえ。"
201050-76 = "皆さんが覚えていなくても……彼女が残した痕跡、記録は残っていますから。"
201050-77 = "会長と一緒に撮った写真を見れば――"
201050-83 = "どうして……？"
201050-84 = "会長だけ……消えている……？"
201050-85 = "……ごめんなさい、リン。"
201050-86 = "しばらくは業務について考えなくても大丈夫です。#n私が巻き取りますから。"
201050-87 = "せっかくですし、もう少し休暇を楽しんでください。"
201050-88 = "たしかに、この写真は……。"
201050-93 = "[ns1] \"おっはよう！\"\n[ns2] \"昨日はぐっすり眠れた？\""
201050-97 = "[USERNAME]先生……！"
201050-98 = "ちょうどいいところにいらっしゃいました。先生にご確認したいことがあります。"
201050-99 = "この方は……連邦生徒会長ですか？"
201050-103 = "[ns3] \"この子が……？\"\n[ns4] \"私は知らないかな……。\""
201050-106 = "……やはり。"
201050-107 = "そう言ってくださると、信じていました。"
201050-108 = "私が記憶している連邦生徒会長は……間違っていないのですね？"
201050-109 = "[s5] \"リン、落ち着いて。\"\n[s6] \"その子も困ってるみたいだから。\""
201050-115 = "[ns] \"まずは話を聞いてみよう？\""
201050-116 = "あら……。"
201050-117 = "リンがここまで大人を頼るだなんて、珍しいですね。"
201050-118 = "良い変化だとは思いますが、なんだか少し寂しい気もします。ふふっ。"
201050-119 = "[s] \"……まずは君のことを教えてくれるかな。\""
201050-120 = "ええ。初めまして。"
201050-121 = "私はこの学園都市キヴォトスを管理する連邦生徒会の長、連邦生徒会長です。"
201050-122 = "自分で言うのも気恥ずかしいのですが、キヴォトスではそれなりに顔を知られてまして。#n私を知らないほうが珍しいと思うのですが……。"
201050-123 = "なかなか面白い反応ですね。"
201050-124 = "あなたはキヴォトスの外からいらしたのですか？"
201050-125 = "よければそちらの話も伺いたいのですが。"
201050-126 = "[s] \"私はシャーレで先生を務めている[USERNAME]だよ。\""
201050-127 = "シャーレ……？"
201050-128 = "それはどういった組織で？"
201050-129 = "[s7] \"超法規的な権限を持つ連邦捜査部。\"\n[s8] \"生徒の悩みを聞いたり解決したりする仕事をしてるよ。\""
201050-132 = "学園を超越する超法規的機関……。"
201050-133 = "それほどの権限を持つとなれば、連邦生徒会長の許可が必要なはずです。"
201050-137 = "ですが、私は許可した覚えがありません。"
201050-138 = "これは……流石に目を瞑ることはできませんね。"
201050-139 = "[s] \"……え？\""
201050-144 = "[ns] \"ええっ！？\""
201050-146 = "次回;超人の帰還"

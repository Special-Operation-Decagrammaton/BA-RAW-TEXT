201050-9 = "3;가짜 총학생회장;11;혹시 제가 갑자기 사라졌던 것 때문에 계속 마음을 쓰고 있었나요.\n#3;closeup\n#3;em;[땀]"
201050-10 = "3;가짜 총학생회장;02;무슨 말을 하더라도 변명이 될 수는 없겠지만, 그간의 경위에 대해 설명을 드리자면—\n#3;closeup"
201050-11 = "3;린;42;수사적인 표현으로 원망을 대신하는 게 아니라, 문자 그대로의 뜻입니다.\n#3;closeup"
201050-12 = "3;린;42;저는 당신을 모릅니다. 당신의 얼굴도 목소리도…… 전에 본 기억이 없습니다.\n#3;closeup"
201050-13 = "3;린;10;그런데 그 낯선 얼굴로 총학생회장을 자칭하다니……\n#3;closeup\n#3;stiff"
201050-14 = "3;린;10;혹시라도 누군가의 부탁을 받고 저를 놀리는 거라면 그만 둬 주세요. 도저히 웃을 수 있는 화제가 아니니까.\n#3;closeup"
201050-15 = "3;가짜 총학생회장;08;……아무래도 무언가 문제가 있는 모양이군요."
201050-16 = "3;가짜 총학생회장;04;의전팀, 지금 바로 아오이…… 아니, 재무실장을 불러주시겠어요?\n#3;greeting"
201050-17 = "3;가짜 총학생회장;04;수석행정관의 상태와 관련하여 할 이야기가 있습니다."

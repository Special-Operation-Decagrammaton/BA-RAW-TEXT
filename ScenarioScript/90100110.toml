[translation]
90100110-1 = "第11話;不可解"
90100110-2 = "連邦生徒会長執務室"
90100110-4 = "良い知らせがあります。"
90100110-5 = "白いかかし――通称「くねくね」の被害者たちが目を覚まし始めました。"
90100110-6 = "幸い、健康状態に大きな異常はないそうです。"
90100110-7 = "ただ病院が言うには、状態が急に好転した理由は分からないそうで。"
90100110-8 = "それもこれも、みなさんが怪異を退治してくれたお陰なのだろうと思っています。"
90100110-13 = "会長は報告書の内容をすべて信用しておられるのですか？"
90100110-14 = "ええ。あれはユキノ小隊長が書いたのでしょう？#nそれに、シャーレの先生のお墨付きもありましたから。"
90100110-15 = "信用しない理由がありません。"
90100110-16 = "……報告書でお伝えしていますが、今回の作戦で何を相手にしていたのかは、私たちにも定かではありません。"
90100110-17 = "ロアは、原因も対策もはっきりしない不可解。"
90100110-18 = "できることを全て試して……結果論として解決できたに過ぎません。"
90100110-19 = "それでも、結果として多くの者が救われました。"
90100110-23 = "結果は……重要ではありません。"
90100110-27 = "……市民の安全を軽視しているわけではありません。"
90100110-28 = "ただ……キヴォトスで不可解な事件が起きるのは珍しくないことです。#nしかし、ここまで多くの人的被害を伴うことは滅多にありませんでした。"
90100110-29 = "制御できない変数が日常にあると知れば……人は不安に陥ります。#n犯人を探し、動機を探し、責任を押し付けて、さらには――"
90100110-33 = "その銃口を、あなたに向けるかもしれません。"
90100110-38 = "ユキノさん。"
90100110-39 = "私が今、なにを考えているか、当ててみませんか？"
90100110-40 = "……私の心配は杞憂だと、お考えなのでしょうか？"
90100110-41 = "残念。不正解です。"
90100110-42 = "ついさっき、[ruby=おき]扇喜[/ruby]さんがお茶菓子を置いていってくれたんです。#nでも、見たことのないお菓子でして。"
90100110-43 = "甘いのにどこか懐かしいシトラスの香りがして、お茶によく合うのですが……#n包装にも材料が一切書かれていなくて。"
90100110-44 = "あなたと話しながらも、あれはなんだったんだろう、と考えてしまっていました。"
90100110-45 = "ふふっ、ごめんなさい。"
90100110-46 = "い、いえ。それは構いません。"
90100110-47 = "全く気づきませんでしたし……似たようなことは私にも時々ありますから。"
90100110-48 = "どうでもいい些細なことに思考を支配される。#nそんな「ありふれたこと」は、意外と頻繁に起こるものです。"
90100110-49 = "ですがそれを、正直に口にすることはほとんどありません。"
90100110-50 = "相手に失礼かもしれない、あるいは自分をおかしいと思われたくない。理由は様々でしょう。"
90100110-51 = "そもそも、率直な心情を晒して得られるものは多くないからこそ――"
90100110-52 = "人は心を隠したまま関係を続けて……結局、互いの心を完全には理解できない。#n大半の誤解はそこから生まれます。"
90100110-54 = "……ロアとは、そんな「意思疎通の欠如」が生み出した現象なのかもしれません。"
90100110-55 = "言葉にも文字にもならなかった……#n人々の心から零れ落ちてしまった想いが形を変えたメッセージ。"
90100110-58 = "理解できません。"
90100110-59 = "人を混乱させ、言葉さえ奪ってしまうような幻覚に、一体どんなメッセージがあるというのですか。"
90100110-60 = "その答えは、もうユキノ小隊長の口から聞いていますよ。"
90100110-62 = "――暑い日は屋外活動を控えること。"
90100110-63 = "「くねくね」は、存在しているだけで十分な警告になっていたのかもしれませんね。"
90100110-65 = "……たかが、それだけのために。"
90100110-66 = "ええ。それだけのために。"
90100110-70 = "ユキノ小隊長。さっき話したお茶菓子、実はまだ残ってるんです。#nよければおひとついかがですか？"
90100110-71 = "これを食べて、材料について考えてみれば――"
90100110-76 = "私たちはもう少しお互いを理解できるようになるかもしれませんね。"
90100110-79 = "暑い……。"
90100110-84 = "なんで外で待ってなきゃいけないわけ？"
90100110-85 = "建物の中じゃダメなの？"
90100110-86 = "あ、それは――"
90100110-87 = "おお。大胆だね。"
90100110-88 = "前に殴った幹部と鉢合わせても平気ってこと？"
90100110-89 = "うっ……それは困るけど……。"
90100110-90 = "一応、私たちは仮釈放の身だから。騒ぎになるようなのはまずいと思ったんだ。"
90100110-91 = "暑くても、もう少しだけ我慢だね。"
90100110-92 = "じゃあせめて日陰行こうよ。わざわざ広場のど真ん中で待つ必要なくない？"
90100110-93 = "いっそカフェとかさ。冷たいの飲みながら待っちゃダメ？"
90100110-94 = "ダメ。作戦支援カードが入ってる財布は、今ユキノが持ってるんだから。"
90100110-95 = "なんで？今まではニコが財布の管理してたじゃん。"
90100110-96 = "作戦報告に支出決裁も含まれてるから……カードも一緒に持っていくって言ってた。"
90100110-97 = "ああ、それなら仕方ないか。"
90100110-101 = "暑い……早くシャーレに帰りたい。"
90100110-102 = "それだけ聞いたらシャーレが家みたいだねぇ。"
90100110-103 = "どうせ誰も聞いてないって。この暑さで外歩いてる人なんて――"
90100110-104 = "あれ？あなた達……。"
90100110-105 = "えぇっ！？ち、違うから！#n今のはシャーレに行きたいって意味で、別に家とかそういう――"
90100110-106 = "……何の話？"
90100110-112 = "バイトちゃん、久しぶりだね。"
90100110-113 = "あの時の……。"
90100110-114 = "うん。ゲヘナ学園のエリカ。また会うなんてね。"
90100110-115 = "あ、あはは……そうですね。すごい偶然。"
90100110-116 = "今日もバイト中だったの？#nヒヤシンス学園からだと結構遠いのに。"
90100110-117 = "は、はい！今日は友だちと一緒だったので。"
90100110-118 = "その、あの時は……。"
90100110-122 = "ごめんなさい、嘘をつきました。#nあの時も、教えたモモトークは偽アカで……。"
90100110-123 = "あ、そういえば。そうだったね。#n帰って見直したら「存在しないアカウント」って出てびっくりしちゃった。"
90100110-124 = "それと、「ハイパーエイド」も実在しない飲み物だったみたいだし。#n友達にこの話をしたら、「幽霊でも見たんじゃないか」って、しばらく大騒ぎしてたよ。"
90100110-125 = "でも、幽霊じゃなかったなら……よかった。"
90100110-129 = "ごめんなさい……。"
90100110-130 = "いいのいいの。そんな謝らないで。"
90100110-131 = "誰だって隠したいものくらいあるしさ。#nたまたまあの時は……あんま見られたくなかったんでしょ？"
90100110-132 = "……怒らないんですか？"
90100110-133 = "なんで？別に損してないし。むしろ楽しい経験だったよ。"
90100110-134 = "あの時私が会ったのは誰だったんだろう。#nなんであの場所で、存在しない飲み物を配ってたんだろう、って。"
90100110-135 = "想像を膨らませながら、この数週間かなり楽しめた。"
90100110-136 = "それに、何か事情があったんだろうし。何も知らずに腹を立てたくない。"
90100110-137 = "ほら、嘘も貫き続ければ真となるって言葉もあるじゃない？"
90100110-142 = "理解してくれてありがとうございます。"
90100110-143 = "よかったら、この先のカフェで少し話さない？"
90100110-144 = "あそこの特製エイド、結構美味しくてさ。"
90100110-145 = "それが……私たち財布を置いてきちゃってて……。"
90100110-146 = "じゃあ、私が奢ろうか？"
90100110-150 = "その代わり……1個だけ正直に答えてほしいことがあるんだ。"
90100110-154 = "ど、どうする？正体探りに来てるっぽいよ。"
90100110-155 = "……話が長引く前に煙幕撒いて逃げる？煙幕弾ならある。"
90100110-156 = "そ、それはダメ！"
90100110-161 = "――前に飲んだ「ハイパーエイド」。あれ、どうやって作るの？"
90100110-162 = "友だちにも飲ませたかったのに、似た味の飲み物が全然見つからなくてさ。"
90100110-163 = "ああ、それなら簡単！市販のベルーガビタミン1錠に水500mlを入れて――"
90100110-164 = "ちょっ、オトギ！奢ってもらう前に情報吐かないでよ！#n交渉のテーブルに着くまでは機密情報でしょ！？"
90100110-165 = "ふふ、あなたたち、思ったよりずっと面白いね。話す甲斐がありそう。"
90100110-166 = "じゃ、行こ。今日は日差し強いし。"
90100110-171 = "はい、そうですね。"
90100110-173 = "……暑い日に外で長居するのは危険ですから。"

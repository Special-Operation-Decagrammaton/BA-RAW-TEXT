51245-55 = "怎麼回事？"
51245-56 = "嗯？這～是什麼意思？"
51245-59 = "你已經被逼入絕境了吧。"
51245-60 = "我明明已經一遍又一遍地摧殘你的心志。"
51245-61 = "然而你卻──"
51245-65 = "看看你自己狼狽的模樣吧，名草醬。"
51245-66 = "雙腿不停發抖，一把鼻涕一把眼淚的。"
51245-70 = "明明很想立刻拔腿就跑。"
51245-78 = "為什麼現在才做出那種像是當上「委員長」的舉動……？#n回答我啊，名草醬……！"
51245-79 = "事到如今……你還好意思模仿菖蒲嗎！"

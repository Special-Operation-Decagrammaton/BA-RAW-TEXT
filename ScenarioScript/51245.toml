51245-28 = "就算死命想逆轉這個故事……"
51245-29 = "我已經說過了，故事的絕對前提是無法扭轉的。#n打從一開始，前提在這個故事中就已經是既定事項。"
51245-31 = "沒有「資格」之人無法打倒「百物語」──"
51245-32 = "──從踏出第一步的時刻開始，這個故事的結局就已經注定了。"
51245-33 = "沒錯……"
51245-34 = "──只要「百花繚亂的委員長」不回來，只要菖蒲不在……"
51245-35 = "我就能用我的百物語──讓你們所有人和菖蒲一樣墜入黃昏……！！！！"

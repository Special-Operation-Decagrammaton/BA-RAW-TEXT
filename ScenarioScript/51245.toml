51245-218 = "……嗯。"
51245-220 = "[ns]「沒問題，我也會全力幫忙。」"
51245-221 = "……！"
51245-222 = "還沒……還沒完呢……！"
51245-226 = "啊！禁止做出可疑的舉動！"
51245-236 = "反正你們的子彈對我不管用……"
51245-237 = "對擁有怪書的我來說，這是不變的真理……！#n哈！從一開始就毫無意義……！"
51245-239 = "[ns]「就是現在！」"
51245-243 = "啊，唔……！？"
51245-244 = "為何攻擊會……！"
51245-257 = "…………"
51245-262 = "難道資格……？#n真的……假的？"
51245-263 = "名草……區區名草醬……！"
51245-264 = "不過是改變了心境，居然就能……觸及怪書的神祕？"
51245-266 = "哈啊！"
51245-271 = "可惡！還沒結束呢！"
51245-285 = "我的百物語……！"
51245-286 = "[ns]「蓮華！拜託你了！」"
51245-291 = "哈！交給我吧！"
51245-299 = "什麼！？居然瞬間就……！？"
51245-307 = "百花繚亂的突擊隊長，不破蓮華。"
51245-308 = "於百花繚亂紛爭調停委員會鍛鍊槍法兩年。"
51245-310 = "你最好知道一件事──#n在我奉獻青春磨練的百花繚亂射擊術面前，人海戰術是毫無意義的！"
51245-314 = "可惡！"
51245-321 = "總之先撤退！"
51245-326 = "居然在退路上……！？"
51245-329 = "選擇利用遮擋視野的瞬間進行撤退，並在確保安全後再次召喚百物語──#n你想必會採取這種計策吧。"
51245-333 = "但是很抱歉，要看穿你單純的思路簡直易如反掌。"
51245-337 = "別笑死人了！桐生桔梗！"
51245-338 = "反正你的攻擊對我根本不管用……！"
51245-345 = "咦……！？地面……？"
51245-346 = "攻擊不管用又如何？#n射擊地面讓你倒下不就行了嗎？"
51245-347 = "還是你想說因為擁有怪書就能飛上天？"
51245-352 = "……好吧！#n無貌形代……只要有無貌形代的話……！"
51245-354 = "就算是未完成的也好！只要有那個！"
51245-361 = "……沒有？為什麼？"
51245-366 = "無貌形代……已經不在這裡了。"
51245-367 = "小女子的「感情」不會再任你擺佈。我已經下定決心了。"
51245-368 = "……勘解由小路紫。"
51245-369 = "沒錯，我勘解由小路紫──"
51245-370 = "身為百花繚亂紛爭調停委員會的一員…… "
51245-371 = "箭吹棕櫚──我要逮捕你！"
51245-375 = "！！"
51245-381 = "唔…………！"
51245-382 = "繼續抵抗也沒有意義。"
51245-383 = "到底為什麼……？"
51245-384 = "……你們剛才不是還在互相中傷、詆毀、吵架嗎？"
51245-385 = "不是還在譴責傷害自己的謊言，指責對方嗎？"
51245-386 = "可是現在……卻說要逮捕我？#n為什麼？為什麼啊？到底為什麼……？"
51245-387 = "……因為哪怕從現在開始也好，我想好好面對大家。"
51245-388 = "即使那只是「演戲」也無所謂。"
51245-392 = "我想以百花繚亂的身分面對大家──"
51245-393 = "是啊！沒錯！"
51245-395 = "……！！！"
51245-396 = "[ns]「已經結束了，棕櫚。」"
51245-397 = "連夏萊的老師都…… "
51245-403 = "哈，哈哈。"
51245-409 = "啊哈，啊哈哈哈！！"
51245-410 = "啊哈哈哈哈哈哈哈哈哈哈哈！！！"
51245-414 = "名草醬……"
51245-415 = "名～草～醬～！"
51245-423 = "……好，很好。#n雖然真的很不滿意……！"
51245-424 = "但這次的故事就算你們贏吧……#n我接受……這個結局。"
51245-425 = "但是……別以為這樣就結束了。"
51245-426 = "下次我一定會……親手…… "
51245-427 = "創造獻給雛罌粟大人的「百物語」……！"
51245-431 = "[ns]「等等！大家小心！」"
51245-438 = "那傢伙突然把書給……！？"
51245-445 = "下一話;現在，向你"

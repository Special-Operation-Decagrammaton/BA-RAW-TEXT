[translation]
2600106-1 = "สีขาวที่เกือบจะโปร่งแสง"
2600106-2 = "ย่านอุปกรณ์อิเล็กทรอนิกส์ เขตกลาง"
2600106-4 = "(คุณครูเจอโคทามะกำลังทดสอบฟังเสียงอยู่ที่ร้านขายซีดีเพลงแห่งหนึ่ง ขณะที่มาเดินหาซื้อของ)"
2600106-9 = "...."
2600106-10 = "[ns] \"นี่ โคทามะ\""
2600106-11 = "...♪"
2600106-15 = "(โคทามะกำลังจดจ่ออยู่กับการฟังเพลง เลยไม่ได้สังเกตเห็นคุณครู)"
2600106-16 = "[s] เข้าไปหาโคทามะในร้าน"
2600106-22 = "― [log=코타마]อ๊ะ คุณครู[/log][wa:920] "
2600106-25 = "― [log=코타마]ขอโทษค่ะ...[/log][wa:340] "
2600106-26 = "― [log=코타마]ฉันกำลังฟังเพลงเลยไม่ทันเห็นคุณครูน่ะ[/log][wa:2335] "
2600106-30 = "[ns] \"ไม่เป็นไร กำลังฟังเพลงอะไรอยู่เหรอ?\""
2600106-31 = "― [log=코타마]หมายถึงเพลงนี้น่ะเหรอคะ?[/log][wa:805] "
2600106-34 = "― [log=코타마]...ฮิฮิ ไหนๆ ก็มาแล้ว...[/log][wa:2075] "
2600106-35 = "― [log=코타마]คุณครูเองก็ลองฟังดูสักหน่อยมั้ยคะ?[/log][wa:1790] "
2600106-39 = "[ns] \"มีหลายประเภทจนน่าตกใจเลยนะ\""
2600106-40 = "― [log=코타마]ใช่แล้วค่ะ ที่ฉันฟังอยู่ไม่ใช่เพลงหรอกค่ะ[/log][wa:665] "
2600106-41 = "― [log=코타마]แต่เป็นเสียงคนคุยหรือเสียงบรรยากาศในร้านกาแฟที่อัดเอาไว้[/log][wa:2035] "
2600106-44 = "― [log=코타마]เสียงพวกนี้เรียกว่า ASMR ค่ะ[/log][wa:10] "
2600106-47 = "― [log=코타마]ถึงจะไม่มีทั้งจังหวะ หรือทำนองเพลงก็จริง...[/log][wa:330] "
2600106-48 = "― [log=코타마]แต่ถ้าตั้งใจฟังดีๆ ละก็ จะได้ยินเสียงของผู้คนมากมายค่ะ [/log][wa:3905] "
2600106-51 = "― [log=코타마]เสียงของผู้คนที่ได้ยินในชีวิตประจำวันแบบนี้[/log][wa:10] "
2600106-52 = "― [log=코타마]สำหรับฉันแล้ว มันเป็นเสียงที่น่าดื่มด่ำกว่าเสียงอะไรเลย...[/log][wa:4465] "
2600106-55 = "― [log=코타마]เพราะงั้นฉันเลยหวังว่า...[/log][wa:200] "
2600106-56 = "― [log=코타마]จะได้ฟังเสียงนี้ต่อไปเรื่อยๆ เลยค่ะ[/log][wa:850] "
2600106-59 = "(หลังจากนั้น คุณครูก็ฟังเสียงต่างๆ ตามที่โคทามะแนะนำ)"
2600106-61 = "คุณครู วันนี้ได้ฟังเสียง ASMR แล้วรู้สึกยังไงบ้างคะ?"
2600106-62 = "[s] \"มีหลายประเภทจนน่าตกใจเลย\""
2600106-63 = "ช่วงนี้มีพวกอัลบั้มรวม ASMR สำหรับช่วยเพิ่มสมาธิในการทำงานออกมาเยอะมากด้วยค่ะ"
2600106-64 = "ทั้งเสียงในคาเฟ่ เสียงฝนตก แล้วก็เสียงอื่นๆ มีเสียง ASMR หลายประเภทเลยค่ะ"
2600106-65 = "[s] \"แล้วโคทามะชอบฟัง ASMR แบบไหนที่สุดเหรอ?\""
2600106-66 = "อืม นั่นสิคะ... ฉันชอบพวกเสียงจากร้านกาแฟแบบที่ฟังวันนี้ แล้วก็ชอบเสียงฝนด้วย..."
2600106-70 = "แต่ว่าที่ชอบที่สุดก็คงเป็นเสียงของคุณครูละมั้งคะ"
2600106-71 = "[s] \"เสียงของครูเหรอ?\""
2600106-72 = "ค่ะ พอได้ฟังเสียงที่อบอุ่น อ่อนโยนของคุณครู ฉันก็รู้สึกสงบและมีสมาธิมากขึ้นค่ะ"
2600106-73 = "แต่ว่าก็มีข้อเสียอย่างหนึ่งก็คือเสียงของคุณครูน่ะ ไม่มีวางขายทั่วไปน่ะสิคะ"
2600106-78 = "เพราะงั้นคุณครูคะ... ตอนนี้ขอฉันบันทึกเสียงของคุณครูอย่างเป็นทางการได้รึเปล่าคะ?"
2600106-79 = "[s] \"ไม่ได้\""
2600106-80 = "ตอบได้เย็นชาสุดๆ เลย~"
2600106-82 = "(หลังจากนั้น คุณครูก็ยื้อยุดฉุดกระชากกับโคทามะที่พยายามจะเปิดเครื่องบันทึกเสียงอยู่พักใหญ่...)"

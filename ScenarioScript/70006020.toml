[translation]
70006020-1 = "นักชม คุกกี้ และการบรรเทาทุกข์ 2"
70006020-2 = "มันเริ่มต้นด้วย... ข่าวลือแปลกๆ เกี่ยวกับฉันค่ะ"
70006020-4 = "ล็อบบี้โรงพยาบาลศูนย์เซนต์เทเรซา"
70006020-5 = "อืม..."
70006020-9 = "หัวหน้าคะ? มีเรื่องกังวลอะไรหรือเปล่าคะ? ดูไม่มีเรี่ยวแรงเลยค่ะ"
70006020-10 = "อ๊ะ! งั้นฮานาเอะจะช่วยเชียร์ให้เองค่ะ จะได้มีแรงยังไงล่ะคะ"
70006020-12 = "ไม่หรอกค่ะ ฉันไม่เป็นไร ก็แค่กังวลเรื่องข่าวลือแปลกๆ เกี่ยวกับฉันนิดหน่อยค่ะ"
70006020-14 = "ข่าวลือแปลกๆ เหรอคะ?"
70006020-15 = "อย่าบอกนะคะว่าเป็น... ข่าวลือที่ว่าหัวหน้าชอบสะสมเวชภัณฑ์เพราะชอบกลิ่นพลาสเตอร์ปิดแผล?"
70006020-17 = "ไม่ใช่ค่ะ"
70006020-18 = "หรือจะเป็นข่าวลือที่ว่า ที่หัวหน้าชวนคนอื่นไปร่วมพิธีชงชาเพราะอยากหาคนที่จะบรรเทาทุกข์ให้?"
70006020-19 = "ไม่ใช่ค่ะ..."
70006020-20 = "งั้นก็ต้องเป็นข่าวลือที่บอกว่าหัวหน้าแอบกินคุกกี้โปรตีนระหว่างเวลาน้ำชาเพื่อสร้างกล้ามเนื้อ?"
70006020-21 = "ไม่ใช่ค่ะ...!"
70006020-22 = "ข่าวลือเหลวไหลแบบนั้นมันมาจากไหนกันคะ? ฉันเริ่มกังวลหนักขึ้นแล้วนะคะ!"
70006020-23 = "ไม่ต้องกังวลให้มากหรอกค่ะ! ฉันรู้ค่ะว่าหัวหน้าไม่ได้เป็นอย่างในข่าวลือนั่น!"
70006020-24 = "จะว่าไป น่าแปลกนะคะที่ข่าวลือแปลกๆ มันแพร่ไปได้ขนาดนั้น"
70006020-25 = "ฉันก็แค่อยากให้คนอื่นรับรู้ถึงจิตวิญญาณแห่งการบรรเทาทุกข์ก็เท่านั้น..."
70006020-27 = "น่าเสียใจจังเลยนะคะ..."
70006020-28 = "ต้องทำยังไง หัวหน้าถึงจะหลุดพ้นจากข่าวลือแปลกๆ นั่นได้เหรอคะ?"
70006020-32 = "อ๊ะ...! เอาแบบนี้มั้ยคะ?"
70006020-33 = "หัวหน้าทำคุกกี้แล้วเอาไปแจกคนอื่นดีมั้ย?"
70006020-34 = "ถ้าได้คุกกี้ที่มาจากความจริงใจ การเข้าใจผิดของคนอื่นที่มีต่อหัวหน้าก็จะค่อยๆ หายไปเอง โดยธรรมชาติค่ะ!"
70006020-36 = "นั่นสินะคะ! ไหนๆ ถ้าจะทำแล้ว ก็ทำออกมาให้น่ารักเลยมั้ยคะ! อย่างพวกคุกกี้รูปลูกเจี๊ยบ อะไรประมาณนั้นน่ะค่ะ!"
70006020-37 = "คุกกี้รูปลูกเจี๊ยบงั้นเหรอ... เป็นไอเดียที่ดีเลยนะคะ"
70006020-39 = "เพราะงั้นฉันก็เลยตัดสินใจจะทำคุกกี้รูปลูกเจี๊ยบ แต่ก็เจอปัญหาเข้าจนได้ค่ะ..."
70006020-40 = "ฉันไม่เคยทำคุกกี้มาก่อนน่ะค่ะ"
70006020-41 = "เซรินะกับฮานาเอะเข้ามาช่วยก็จริง แต่คุกกี้ถาดแรกที่อบออกมามันดูไม่ได้เลยค่ะ"
70006020-42 = "มันออกมาไม่เหมือนลูกเจี๊ยบ แต่เหมือนนกไหม้ๆ ที่เกิดในนรกมากกว่า..."
70006020-43 = "ฉันก็เลยไปขอคำแนะนำจากร้านขนมปังชื่อดังในทรีนิตี้ค่ะ..."
70006020-44 = "แต่ไม่รู้ว่าเป็นเพราะตำแหน่งหัวหน้าชมรมอัศวินบรรเทาทุกข์ของฉันหรือเปล่า ฉันเลยได้มาแต่สูตร#nคุกกี้หรูหราที่มีไส้และน้ำตาลไอซิ่งเพียบเลย..."
70006020-45 = "คุณมิเนะชอบคุกกี้รูปลูกเจี๊ยบมากกว่าสินะคะ?"
70006020-46 = "ชะ... ใช่ค่ะ! นิยามคุกกี้ของฉันคือความน่ารักค่ะ!"
70006020-47 = "เพราะงั้นฉันก็เลยพยายามหาคนที่ให้คำแนะนำให้ได้ แล้วก็บังเอิญได้เจอคุณฟูกะในย่านการค้าค่ะ"
70006020-48 = "ที่นี่เป็นย่านการค้าแถวๆ ชาเล่ต์ ก็เลยไม่แปลกที่จะเจอนักเรียนเกเฮนน่ากับทรีนิตี้ แต่ยังไงก็น่า#nประหลาดใจอยู่นะคะ"
70006020-49 = "การพบกันของชมรมอัศวินบรรเทาทุกข์ชื่อดังและคุณฟูกะงั้นสินะ"
70006020-51 = "น่าทึ่งใช่มั้ยล่ะ? ฉันก็ประหลาดใจเหมือนกัน ถ้าให้เล่าคร่าวๆ เรื่องมันก็เป็นอย่างนี้น่ะ"
70006020-53 = "อ๊ะ วันนี้มีวัตถุดิบสดใหม่เข้ามาเพียบเลย"
70006020-54 = "ถ้างั้นก็ไม่ต้องกังวลเรื่องวัตถุดิบไปสักพักเลยนะ"
70006020-55 = "ตราบใดที่คนพวกนั้นไม่เข้ามายุ่มย่ามอีกน่ะนะ..."
70006020-60 = "ฮืม..."
70006020-64 = "อ่า... สวัสดีค่ะ มีเรื่องอะไรเหรอคะ...?"
70006020-65 = "สวัสดีค่ะ ไม่ทราบว่าสนใจกิจกรรมบรรเทาทุกข์มั้ยคะ?"
70006020-66 = "คะ...?"
70006020-67 = "ฉันชื่อมิเนะค่ะ เป็นหัวหน้าชมรมอัศวินบรรเทาทุกข์ โรงเรียนสามัญทรีนิตี้"
70006020-69 = "ทะ... ทรีนิตี้เหรอคะ? แล้วคุณก็เป็นถึงหัวหน้าชมรมอัศวินบรรเทาทุกข์ด้วย?!"
70006020-70 = "ใช่ค่ะ ฉันรู้สึกได้ถึงบางอย่างที่คล้ายกันของเราตั้งแต่ตอนที่เห็นคุณจากที่ไกลๆ แล้วค่ะ"
70006020-71 = "พอเห็นคุณเลือกวัตถุดิบที่จำเป็นอย่างละเอียดรอบคอบ ฉันก็นึกถึงตัวเองที่ใช้ความคิดอย่างหนักตอน#nเลือกเวชภัณฑ์ไปบรรเทาทุกข์ค่ะ"
70006020-72 = "งะ... งั้นเหรอคะ...? "
70006020-73 = "โดยเฉพาะสีหน้าที่เอื้ออารีของคุณราวกับกำลังคิดถึงคนหมู่มาก นั่นทำให้ฉันคิดเลยค่ะว่าคุณน่าจะ#nกำลังทำงานเกี่ยวกับการบรรเทาทุกข์อยู่ ฉันคิดถูกใช่มั้ยล่ะคะ?"
70006020-74 = "อ่า... ฉันเป็นหัวหน้าชมรมโภชนาการของเกเฮนน่าน่ะค่ะ..."
70006020-79 = "ว่าแล้วเชียว...! ฉันมองคนไม่ผิดจริงๆ ด้วยค่ะ!"
70006020-80 = "ฉันขอคุยอะไรด้วยสักครู่ได้มั้ยคะ? ฉันรู้สึกว่าเราน่าจะคุยกันรู้เรื่องน่ะค่ะ"
70006020-81 = "คะ? แต่ฉันเป็นนักเรียนเกเฮนน่านะคะ...?"
70006020-82 = "สำหรับเรื่องการบรรเทาทุกข์แล้ว ฉันว่าเราไม่ควรแบ่งแยกโรงเรียนค่ะ คิดเหมือนกันมั้ยคะ?"
70006020-83 = "เอ่อ... มันก็จริงอยู่หรอกค่ะ ถ้ามีใครหิวมา เราก็ควรบรรเทาความหิวโดยไม่สนว่าคนคนนั้นจะเป็นใคร..."
70006020-85 = "ถึงจะมีพวกคนที่หิวแล้วก่อเรื่องน่าปวดหัวก็เถอะค่ะ"
70006020-86 = "พวกคนที่หิวแล้วก่อเรื่องน่าปวดหัว...?"
70006020-88 = "ก็เลยได้รู้จักพวกฉันจากเรื่องนั้นสินะคะ"
70006020-89 = "ฉันก็เลยจะช่วยทำคุกกี้น่ะ"
70006020-90 = "ใช้โอกาสนี้ในการสนิทสนมกับชมรมอัศวินบรรเทาทุกข์ไว้ก็ไม่เสียหายนี่?"
70006020-91 = "เพราะงั้นวันนี้พวกเธอก็ยอมแพ้ไปแค่นี้เถอะ พวกฉันต้องไปซื้อวัตถุดิบคุกกี้น่ะ"
70006020-92 = "ได้ค่ะ เรื่องแผนการขอให้คุณฟูกะทำอาหารกลางวันให้ ฉันจะพับไปก่อน"
70006020-93 = "นั่นก็เพราะตอนนี้ฉันมีแผนการใหม่ค่ะ"
70006020-94 = "คุณมิเนะ ถ้าไม่เป็นการรบกวน ขอให้ชมรมชิมอาหารได้ชิมคุกกี้รูปลูกเจี๊ยบได้มั้ยคะ?"
70006020-95 = "ตั้งแต่ที่ฉันได้ฟังเรื่องนี้ ฉันก็สัมผัสได้ถึงอาหารเลิศรสน่ะค่ะ"
70006020-96 = "ฮุฮุฮุ อยากรู้จังเลยค่ะว่ารสชาติจะออกมาเป็นยังไง★"
70006020-97 = "ฉันชอบคุกกี้มากเลยละ! จริงๆ นะ!"
70006020-98 = "ถ้าแค่ชิม ก็ไม่ต้องจ่ายเงินใช่มั้ย? แหะๆๆ..."
70006020-100 = "ทุกคนก็กลับมามีเรี่ยวแรงกันแล้วสินะ"
70006020-101 = "ให้ลองชิมงั้นเหรอ... ถ้าเป็นเรื่องรสชาติละก็ ยังไงชมรมชิมอาหารน่าจะเชี่ยวชาญกว่าพวกฉัน"
70006020-102 = "แต่ฉันว่ามากคนก็ยิ่งมากความนะ..."
70006020-104 = "ไม่ต้องกังวลหรอกค่ะ พวกฉันก็แค่สงสัยในรสชาติคุกกี้รูปลูกเจี๊ยบของคุณมิเนะก็เท่านั้น"
70006020-105 = "แล้วถ้าคุณฟูกะเข้ามาช่วยจากใจจริง มันก็ไม่มีทางเป็นคุกกี้แปลกๆ ไปได้หรอกค่ะ"
70006020-106 = "ก็นะ... มันก็จริงอยู่หรอก..."
70006020-107 = "หัวหน้ามิเนะ จะเอายังไงเหรอคะ?"
70006020-108 = "ฉันเห็นด้วยค่ะ! จะได้ทำคุกกี้กับทุกคนเหรอเนี่ย ชักจะตื่นเต้นแล้วสิคะ!"
70006020-110 = "ดีเลยค่ะ งั้นเราก็ไปให้หมดนี่เลยค่ะ"
70006020-111 = "อ่า... ลางสังหรณ์ไม่ค่อยดีเลย..."
70006020-128 = "(หลังจากนั้นไม่นาน...)"
70006020-130 = "ห้องคหกรรม ทรีนิตี้"
70006020-131 = "อ๊ะ... กลิ่นน่าอร่อยโชยมาแล้ว เมื่อไรคุกกี้จะสุกนะ?"
70006020-132 = "ใกล้จะเสร็จแล้วละ รออีกเดี๋ยวนะ"
70006020-134 = "ใกล้แล้วสินะคะ ถ้างั้นก็ต้องเตรียมตัวแล้ว..."
70006020-135 = "นี่เรามาถึงห้องคหกรรมของทรีนิตี้กันเลยนะ... จะไม่เป็นอะไรจริงๆ ใช่มั้ย?"
70006020-137 = "ค่ะ ไม่เป็นไรค่ะ! ปล่อยใจ ปล่อยจอยตามแผนได้เลยค่ะ"
70006020-141 = "ตามแผนนะคะ"
70006020-142 = "ถ้าตามแผนละก็... อย่าบอกนะว่าถ้าไม่อร่อยแล้วจะระเบิดที่นี่ทิ้งน่ะ?!"
70006020-143 = "ฮุฮุฮุ ก็ไม่รู้สิคะ?"
70006020-145 = "ทุกคนคะ! รอกันนานเลยใช่มั้ยคะ?"
70006020-146 = "คุกกี้แสนน่ารักของหัวหน้ามิเนะเสร็จแล้วค่ะ!"
70006020-152 = "..."
70006020-154 = "รีบเอาไปอวดเลยค่ะ!"
70006020-155 = "ทุกคนจะต้องชอบกันแน่ๆ เลยละค่ะ"
70006020-157 = "ขะ... เข้าใจแล้วค่ะ"
70006020-158 = "ทุกคนคะ...! นี่คือคุกกี้ฝีมือฉันค่ะ!"
70006020-164 = "โอ้ว คุกกี้พวกนี้ แค่เห็นก็ทำให้หัวใจอบอุ่นแล้วนะคะ"
70006020-165 = "รูปลักษณ์ภายนอกฉันให้ผ่านค่ะ★"
70006020-166 = "ลูกเจี๊ยบตะมุตะมิจัง! น่ารักจนไม่กล้ากินเลยนะเนี่ย!"
70006020-167 = "สุดยอดไปเลย! งั้นก็กินได้เลยใช่มั้ย?!"
70006020-169 = "พอชมกันขนาดนั้น ก็รู้สึกเขินอยู่หน่อยๆ นะคะ..."
70006020-170 = "มีคำที่ว่า 'ปล่องไฟที่ไม่มีไฟ ก็ไม่มีควัน' ค่ะ..."
70006020-171 = "แต่ข่าวลือ สุดท้ายก็เป็นแค่ข่าวลือ ถ้าไปหลงเชื่อทั้งหมด ก็จะพลาดสิ่งสำคัญไปค่ะ"
70006020-172 = "...!!"
70006020-174 = "ว้าว! สำเร็จแล้วค่ะ หัวหน้า!"
70006020-175 = "แบบนี้คนอื่นก็จะได้เห็นตัวตนที่แท้จริงของหัวหน้าแล้วละค่ะ!"
70006020-177 = "ถะ... ถ้าเป็นอย่างนั้นฉันก็คงดีใจเลยละ..."
70006020-178 = "งั้นมาเริ่มชิมอย่างจริงจังกันเลยดีกว่าค่ะ"
70006020-183 = "ฮิฮิฮิ จะกินหัวก่อน? หรือกินตัวลูกเจี๊ยบก่อนดีนะ?"
70006020-184 = "ถ้ากินหัวก่อน มันก็น่าจะเจ็บน้อยลงนะคะ?"
70006020-186 = "จะทานให้อร่อยเลยค่ะ...!"
70006020-197 = "เดี๋ยวนะ รสชาตินี้มัน...!"
70006020-198 = "อันตรายแล้วละค่ะ★"
70006020-199 = "ไม่เคยกินคุกกี้แบบนี้มาก่อนเลย...!"
70006020-200 = "ต้องคอมเมนต์ว่ายังไงดีนะ... ถ้าให้พูดง่ายๆ ละก็..."
70006020-201 = "เป็นรสชาติที่น่าทึ่งมากๆ เลย...!!"
70006020-203 = "รสกลมกล่อมและหอมหวานของไข่ที่อบอวลอยู่ในปาก... รสชาตินี้ทำให้อดใจไม่ไหวเลย!"
70006020-204 = "ฉันชอบความรู้สึกของหญิงสาวที่สดใสร่าเริงที่สัมผัสได้จากในปากค่ะ"
70006020-205 = "คุกกี้อะไรเนี่ย รสชาติน่ารักจัง! ฉันกินอะไรมาก็หลายอย่างแล้ว แต่นี่เป็นครั้งแรกเลยที่ได้ลิ้มรสชาติที่#nน่ารักน่ะ!"
70006020-206 = "เราไม่ได้แค่ลิ้มรสชาติอาหารเท่านั้น แต่ยังรับรู้ได้ถึงความจริงใจของคนที่ทำด้วย..."
70006020-207 = "ฉันสัมผัสได้ถึงความจริงใจของคุณมิเนะจากคุกกี้นี้ค่ะ"
70006020-208 = "อ่า... เป็นอาหารเลิศรสที่จริงใจเลยค่ะ"
70006020-209 = "ชะ... ชมกันเกินไปแล้วค่ะ"
70006020-210 = "ขอบคุณมากนะคะ พอได้รับการยอมรับจากชมรมชิมอาหาร ฉันก็มีกำลังใจเลยค่ะ"
70006020-211 = "ที่จริงฉันกังวลว่าจะออกมาไม่อร่อยด้วยค่ะ..."
70006020-212 = "ฮุฮุ ฉันเองก็โล่งใจที่ไม่ต้องระเบิดที่นี่ทิ้งค่ะ"
70006020-213 = "คิดจะระเบิดจริงๆ ด้วยสินะ!"
70006020-214 = "แต่มันก็อร่อยไม่ใช่เหรอคะ?"
70006020-215 = "อื้อ! ฉันขอกินอีกได้มั้ย?"
70006020-217 = "ได้สิคะ ฉันทำไว้เยอะเลยค่ะ เชิญทานกันให้หนำใจเลยนะคะ"
70006020-218 = "ว้าว...!"
70006020-220 = "หัวหน้า คุกกี้นี้ต้องถ่ายทอดความรู้สึกของหัวหน้าให้คนอื่นรู้ได้อย่างแน่นอนเลยค่ะ"
70006020-221 = "ใช่ค่ะ! รองหัวหน้าฮาสุมิจากชมรมทวงความยุติธรรมก็น่าจะชอบด้วยค่ะ!"
70006020-223 = "รองหัวหน้าฮาสุมิ... หวังว่าฉันจะไม่โดนหัวเราะเยาะกลับมานะคะ"
70006020-225 = "รองหัวหน้าฮาสุมิเป็นคนที่มีมาตรฐานเรื่องของหวาน ถ้าเป็นคุกกี้รสชาติแบบนี้ละก็ น่าจะได้รับคำชม#nมากกว่านะคะ!"
70006020-226 = "หวังว่าคุกกี้นี้จะทำให้ทั้งสองคนใกล้ชิดกันขึ้นนะคะ"
70006020-228 = "ฮะ... ฮึ่ม...!"
70006020-229 = "เอาเป็นว่าขอบคุณมากนะคะ ฉันได้มีประสบการณ์ใหม่ๆ จากการช่วยเหลือของทุกคนเลย"
70006020-230 = "โดยเฉพาะกับคุณฟูกะ ฉันติดหนี้บุญคุณครั้งใหญ่เลยค่ะ ขอบคุณที่ช่วยทำคุกกี้แสนอร่อยนะคะ..."
70006020-234 = "หืม...? คุณฟูกะ?"
70006020-236 = "เอ๋? หายไปไหนแล้วนะ? เมื่อกี้ตอนทำคุกกี้ยังอยู่ตรงนี้อยู่เลยนี่คะ"
70006020-237 = "จะว่าไป เหมือนฉันจะไม่เห็นคุณฟูกะทั้งแต่เราเริ่มชิมคุกกี้กันแล้ว..."
70006020-239 = "ถ้างั้นพวกฉันขอตัวกลับก่อนนะคะ ชมรมอัศวินบรรเทาทุกข์"
70006020-240 = "อุ้บ...! อุ้บบบ!!"
70006020-241 = "คุณฟูกะ?! ทำไมมาถูกมัดอยู่อย่างนี้ล่ะคะ?!"
70006020-242 = "ลักพาตัวคุณฟูกะไปตั้งแต่ตอนไหนน่ะ...!"
70006020-243 = "ก็ตอนที่พวกคุณถือคุกกี้ออกมาจากห้องคหกรรมแหละค่ะ"
70006020-244 = "ดูเหมือนจะเอาแต่จับจ้องอยู่กับคุกกี้ที่เสร็จแล้วนะคะ★"
70006020-245 = "ทำเรื่องแบบนั้นในเพียงเวลาสั้นๆ ได้ยังไงกัน...?"
70006020-247 = "ฮุฮุฮุ คิดว่าพวกฉันเพิ่งรู้จักคุณฟูกะมาแค่วันสองวันเหรอคะ? เรื่องแค่นี้ง่ายจะตายไปค่ะ"
70006020-248 = "พูดอย่างกับภูมิใจในสิ่งที่ทำเลยนะ...!"
70006020-249 = "อุ้บ! อุ้บบ...!"
70006020-250 = "อ้อ ฟูกะบอกว่าอยากรีบทำอาหารกลางวันให้แล้วน่ะ!"
70006020-251 = "งั้นก็คงต้องกลับแล้วละนะ แต่ก่อนหน้านั้นต้องติดต่อคุณจูริก่อน..."
70006020-256 = "ค่ะ คุณฮารุนะ เจอรุ่นพี่มั้ยคะ?"
70006020-257 = "ค่ะ ฉันกำลัง 'ปกป้อง' ฟูกะให้ปลอดภัยอยู่ค่ะ"
70006020-258 = "ดูเหมือนว่าคุณฟูกะจะยุ่งอยู่กับการเลือกวัตถุดิบอาหารจนไม่ได้รับโทรศัพท์น่ะค่ะ"
70006020-259 = "อ๊ะ เป็นอย่างที่คิดจริงด้วยสินะคะ! งั้นฉันฝากรุ่นพี่ด้วยนะคะ...!"
70006020-260 = "วางใจได้เลยค่ะ ฉันจะพาไปส่งให้เองค่ะ"
70006020-264 = "ตอนนี้ฉันหมดธุระแล้ว ขอตัวก่อนนะคะ"
70006020-265 = "ขอบคุณสำหรับคุกกี้นะคะ★"
70006020-272 = "ทำแบบนี้กับเพื่อนได้ยังไงคะ!"
70006020-273 = "ฉันจะไล่ตามไปค่ะ! ออกบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญ!!"
70006020-278 = "ผะ... ผนังเป็นรูเลย..."
70006020-279 = "แหะๆๆ... คงยากที่จะเปลี่ยนภาพลักษณ์ของหัวหน้าไปสักพักใหญ่เลยนะคะ..."
70006020-281 = "ชมรมชิมอาหาร...! ฉันไม่ปล่อยพวกคุณคลาดสายตาไปหรอกนะคะ!"
70006020-282 = "ฮุฮุ คราวนี้จับไม่ได้ง่ายๆ หรอกค่ะ...!"
70006020-283 = "อุ้บ! อุ้บบบ!!"
70006020-290 = "(หลังจากนั้นก็เกิดการไล่ล่ากันอย่างดุเดือด...)"
70006020-291 = "นักชิม คุกกี้ และการบรรเทาทุกข์"

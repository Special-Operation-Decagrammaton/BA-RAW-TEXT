[translation]
70006020-1 = "美食與餅乾，還有救護（２）"
70006020-2 = "事情的開端……是關於我的奇怪傳聞。"
70006020-4 = "聖德蕾莎綜合醫院．大廳"
70006020-5 = "唔嗯……"
70006020-9 = "團長？你有什麼煩惱嗎？看起來沒什麼精神呢。"
70006020-10 = "啊！那花繪來幫你打氣，讓你振作起來吧！"
70006020-12 = "我沒事，謝謝你們。#n只是某些奇怪的傳聞讓我有點在意而已。"
70006020-14 = "奇怪的傳聞？"
70006020-15 = "難道是……團長之所以收集醫療用品，其實是因為喜歡貼布味的傳聞嗎？"
70006020-17 = "不是。"
70006020-18 = "那是說你邀請大家參加茶會，其實是為了尋找下一個救護對象的傳聞？"
70006020-19 = "不是的……"
70006020-20 = "所以是說你為了鍛鍊肌肉，在下午茶時間偷偷吃蛋白質餅乾的傳聞囉？"
70006020-21 = "也不是……！"
70006020-22 = "那些亂七八糟的傳聞到底是從哪裡傳出來的？#n害我現在全都開始在意了！"
70006020-23 = "請不用太擔心！我們都知道真正的團長不是那樣的人呀！"
70006020-24 = "但是這些傳聞居然會傳得這麼廣，實在讓人覺得奇怪。"
70006020-25 = "我明明只是想把救護的精神傳達給更多人而已……"
70006020-27 = "真令人難過……"
70006020-28 = "要怎麼做才能讓團長擺脫那些奇怪的傳聞呢？"
70006020-32 = "啊……！不如這樣吧？"
70006020-33 = "我們可以分送親手製作的餅乾給大家。"
70006020-34 = "收到充滿誠意的餅乾之後，大家自然就不會誤會團長了吧！"
70006020-36 = "聽起來很棒！#n既然要做就做成可愛的形狀吧！比如小雞的造型之類的！"
70006020-37 = "小雞造型的餅乾嗎……確實是個好主意。"
70006020-39 = "雖然決定要製作小雞餅乾，但問題是……"
70006020-40 = "我從來沒做過餅乾。"
70006020-41 = "即便有芹奈和花繪的協助，第一次的成品依舊慘不忍睹。"
70006020-42 = "那根本不是小雞，而像是從地獄中誕生的扭曲生物……"
70006020-43 = "為此我們還去請教了三一知名的甜點店……"
70006020-44 = "但可能因為我是救護騎士團團長的關係，#n只拿到了鋪滿餡料與糖霜的高級餅乾食譜……"
70006020-45 = "原來美禰同學更喜歡小雞餅乾啊？"
70006020-46 = "當，當然！可愛就是正義！"
70006020-47 = "總之，後來我就在尋求建議的過程中，在這附近的商店街遇到了風華同學。"
70006020-48 = "畢竟是夏萊附近的商店街，格黑娜和三一的學生會碰面也不奇怪……#n不過還是讓我有點吃驚呢。"
70006020-49 = "居然會是救護騎士團與風華同學的組合。"
70006020-51 = "對吧？我自己也覺得很神奇。#n當時的情況是這樣的……"
70006020-53 = "啊，今天也有很多新鮮的食材進貨呢。"
70006020-54 = "這樣就暫時不用擔心了。"
70006020-55 = "……只要那群傢伙不再來搗亂的話。"
70006020-60 = "哼嗯……"
70006020-64 = "那個……你好？#n請問有什麼事嗎……？"
70006020-65 = "您好。請問您對救護活動有興趣嗎？"
70006020-66 = "……咦？"
70006020-67 = "我是三一綜合學園，救護騎士團的團長美禰。"
70006020-69 = "三，三一？還是救護騎士團的團長！？"
70006020-70 = "是的。從遠處看到您時，我就感受到了一股莫名的親切感。"
70006020-71 = "您仔細挑選料理食材的樣子，讓我想起了自己在挑選救護用品時的模樣。"
70006020-72 = "是，是嗎……？"
70006020-73 = "尤其是那溫柔的表情……您想必也從事救護相關的工作對吧？"
70006020-74 = "這……我的確是格黑娜的供給部部長沒錯……"
70006020-79 = "果然……！我的直覺並沒有錯！"
70006020-80 = "可以麻煩您跟我聊聊嗎？#n我想我們一定很聊得來。"
70006020-81 = "咦？可是我是格黑娜的學生耶……？"
70006020-82 = "在救護這樣的大義面前，學園的區別根本無關緊要。#n您不這麼認為嗎？"
70006020-83 = "……嗯，也是啦。#n只要看到有人肚子餓，不管是誰我都會想讓他吃飽……"
70006020-85 = "雖然有些人真的很難應付就是了。"
70006020-86 = "難應付……？"
70006020-88 = "原來如此。所以才會提到我們的事啊。"
70006020-89 = "我也答應要幫忙做餅乾了。"
70006020-90 = "趁這個機會和救護騎士團打好關係也不壞吧？"
70006020-91 = "所以今天你們就放棄吧。#n我們要去買做餅乾的材料了。"
70006020-92 = "好吧。那麼請風華同學做午餐的計畫就暫時擱置……"
70006020-93 = "不過與此同時，我們也有了新的計畫。"
70006020-94 = "美禰同學。如果你不介意的話──小雞餅乾的試吃，可以交給我們美食研究會嗎？"
70006020-95 = "自從聽到這個故事之後，我就感受到了濃濃的美食氣息。"
70006020-96 = "呵呵，真期待會是什麼味道呢★"
70006020-97 = "我超喜歡餅乾的！真的真的！"
70006020-98 = "試吃的話應該就不用付錢了吧？耶嘿嘿……"
70006020-100 = "你們一下子就完全復活了呢……"
70006020-101 = "試吃是嗎……#n跟我們相比，美食研究會的各位似乎確實更懂得品味。"
70006020-102 = "我覺得還是別跟他們扯上關係比較好……"
70006020-104 = "不必擔心。我們只是單純對美禰同學的小雞餅乾感到好奇而已。"
70006020-105 = "況且只要風華同學認真幫忙，就不會再出現奇怪的餅乾了吧。"
70006020-106 = "嗯……是這樣沒錯啦……"
70006020-107 = "美禰團長，你覺得怎麼樣呢？"
70006020-108 = "我贊成！能跟大家一起做點心，光是想像就覺得很開心！"
70006020-110 = "我明白了，那麼就大家一起去吧。"
70006020-111 = "啊……我有種不祥的預感……"
70006020-128 = "（不久之後……）"
70006020-130 = "三一的料理實習室"
70006020-131 = "啊～味道好香哦。#n餅乾什麼時候才會好呀？"
70006020-132 = "很快就好了，再等一下吧。"
70006020-134 = "他是這樣說的。#n那我們也準備一下吧……"
70006020-135 = "竟然來到了三一的料理教室……真的沒問題嗎？"
70006020-137 = "當然沒問題。只要按照計畫享受就行了。"
70006020-141 = "按照計畫來。"
70006020-142 = "按照計畫……你該不會打算如果不好吃就炸掉這裡吧！？"
70006020-143 = "呵呵呵，誰知道呢？"
70006020-145 = "大家～久等了！"
70006020-146 = "美禰團長的可愛餅乾完成囉！"
70006020-152 = "……"
70006020-154 = "來，快讓大家看看吧！"
70006020-155 = "大家一定會喜歡的！"
70006020-157 = "我，我知道了。"
70006020-158 = "大家……這就是我做的餅乾！"
70006020-164 = "哎呀，光是看著就讓人感覺到溫暖呢。"
70006020-165 = "外觀絕對合格★"
70006020-166 = "真的好可愛！我都快捨不得吃了！"
70006020-167 = "好厲害好厲害！我可以開動了嗎！？"
70006020-169 = "被誇獎成這樣，我都有點不好意思了……"
70006020-170 = "雖然有句話說「無風不起浪」……"
70006020-171 = "但傳聞終究只是傳聞。#n要是全都信以為真，將會錯失真正的本質。"
70006020-172 = "……！！"
70006020-174 = "哇～成功了，團長！"
70006020-175 = "這樣就能讓大家知道團長真正的樣子了！"
70006020-177 = "如，如果真能如此的話，確實很讓人開心……"
70006020-178 = "那麼，現在就正式開始試吃吧。"
70006020-183 = "嘿嘿嘿～要先吃頭還是先吃身體呢？"
70006020-184 = "先吃頭比較不痛苦吧？"
70006020-186 = "我要開動囉……！"
70006020-197 = "且慢，這個味道是……！"
70006020-198 = "真是太厲害了★"
70006020-199 = "我從來沒吃過這種餅乾……！"
70006020-200 = "該怎麼形容呢……簡單來說就是……"
70006020-201 = "真的超級好吃……！！"
70006020-203 = "嘴裡充滿香濃又甜美的蛋香，讓人完全無法抗拒！"
70006020-204 = "在酥脆的口感中，還能感受到少女的清新氣息，實在太棒了。"
70006020-205 = "餅乾裡有可愛的味道耶！#n雖然我吃過很多東西，但可愛的味道還是第一次嘗到！"
70006020-206 = "……享用料理時除了味道之外，也同時是在品嘗製作者的心意。"
70006020-207 = "這塊餅乾之中，充滿了美禰同學的心意。"
70006020-208 = "啊啊，這毫無疑問是美食沒錯。"
70006020-209 = "……竟，竟然能得到這麼高的評價。"
70006020-210 = "真是非常感謝。#n能獲得美食研究會的認可，我也有更勇氣了。"
70006020-211 = "坦白說，我本來還擔心會失敗的……"
70006020-212 = "呵呵，我也很慶幸不用炸掉這裡了。"
70006020-213 = "你果然真的打算炸掉這裡啊！？"
70006020-214 = "不過真的很好吃對吧？"
70006020-215 = "嗯！我可以全部吃掉嗎？"
70006020-217 = "當然可以。#n我做了很多，請儘管吃吧。"
70006020-218 = "哇～！"
70006020-220 = "團長，這樣的餅乾一定能把你的心意傳達給大家的。"
70006020-221 = "沒錯！我覺得實現正義部的蓮實副部長應該也會喜歡！"
70006020-223 = "蓮實副部長啊……希望他不要嘲笑我。"
70006020-225 = "他對甜點有一定的標準，相信他一定不會嘲笑這麼好吃的餅乾的！"
70006020-226 = "希望你們兩位能因此變得更親近。"
70006020-228 = "是，是啊……！"
70006020-229 = "總之真的非常感謝各位。#n多虧了你們的幫忙，我才能獲得這次嶄新的體驗。"
70006020-230 = "尤其是風華同學。#n託你的福，餅乾才能這麼成功……"
70006020-234 = "……咦？風華同學？"
70006020-236 = "咦？人呢？#n剛剛做餅乾的時候還在的說……"
70006020-237 = "這麼說來，從開始試吃的時候就沒看到他了……"
70006020-239 = "那麼救護騎士團的各位，我們就先告辭了。"
70006020-240 = "唔……！唔唔唔！！"
70006020-241 = "風華同學！？你怎麼被綁起來了！？"
70006020-242 = "究竟是在什麼時候將風華同學……！"
70006020-243 = "就在你們拿著餅乾離開廚房的時候唷。"
70006020-244 = "大家都沉浸在餅乾的成品裡了呢★"
70006020-245 = "那麼短的時間內，怎麼可能……？"
70006020-247 = "唔呵呵，你們知道我們和風華同學相處多少時間了嗎？#n這種程度的事，對我們來說簡直輕而易舉。"
70006020-248 = "這種話不要說得一臉驕傲啦……！"
70006020-249 = "唔唔唔！唔唔唔唔……！"
70006020-250 = "啊～風華說他想快點幫我們做午餐！"
70006020-251 = "那我們就準備出發吧。#n在此之前先聯絡茱莉同學……"
70006020-256 = "啊，羽留奈同學。你找到前輩了嗎？"
70006020-257 = "沒錯，我們已經「保護」好他了。"
70006020-258 = "風華同學剛才似乎正在忙著挑選食材。"
70006020-259 = "啊，原來是這樣啊！#n那就麻煩你們繼續照顧前輩囉……！"
70006020-260 = "放心交給我們吧。#n我們會好好「護送」他的。"
70006020-264 = "既然任務已經完成，我們就先告辭了。"
70006020-265 = "餅乾真好吃～謝謝招待★"
70006020-272 = "竟然對朋友做出這種事……！"
70006020-273 = "開始追擊！#n哪裡要救護，我就在哪裡！"
70006020-278 = "牆，牆壁破了個洞……"
70006020-279 = "啊哈哈……#n看來團長的形象，短時間內是改不了了……"
70006020-281 = "美食研究會……！我絕對不會放過你們！"
70006020-282 = "呵呵，這次我們可不會被抓到的哦……！"
70006020-283 = "唔唔唔！唔唔唔唔唔！！"
70006020-290 = "（之後展開了一場激烈的追逐戰……）"
70006020-291 = "美食與餅乾，還有救護"

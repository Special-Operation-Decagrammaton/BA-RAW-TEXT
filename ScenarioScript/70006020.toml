[translation]
70006020-1 = "美食とクッキー、そして救護（２）"
70006020-2 = "……事の発端は、些細なことでした。"
70006020-4 = "聖テレサ総合病院・ロビー"
70006020-5 = "うーん……。"
70006020-9 = "団長？何かありましたか？元気がないようですが……。"
70006020-10 = "あっ！じゃあ元気が出るように、ハナエがエールを送ってあげます！"
70006020-12 = "いえ、大丈夫です。少々、変な噂を耳にしただけですので……。"
70006020-14 = "変な噂？"
70006020-15 = "もしかして……「医薬品を集めるのは、湿布の匂いが好きだから」という噂ですか？"
70006020-17 = "違います。"
70006020-18 = "じゃあ、「お茶会にみんなを招くのは、次の救護対象を見つけるため」という噂？"
70006020-19 = "違います……。"
70006020-20 = "「筋力を上げるために、ひっそりプロテインクッキーを食べている」という噂……？"
70006020-21 = "違いますよっ……！"
70006020-22 = "えっ、いやっ、なんですか、次から次へと……！全部気になってくるじゃないですか！"
70006020-23 = "心配しないでください！本当の団長は違うってみんな知ってますから！"
70006020-24 = "それならば、これほどまでに噂が立つのはおかしいではないですか。"
70006020-25 = "私はただ……一人でも多くの方に、救護の精神を届けたくて……。"
70006020-27 = "どうしてこんなことに……。"
70006020-28 = "どうすれば団長が変な噂から解放されるのでしょうか？"
70006020-32 = "あ……！こういうのはどうでしょう？"
70006020-33 = "手作りのクッキーを配るんです！"
70006020-34 = "心のこもったクッキーを貰えば、自然と誤解も解けるんじゃないでしょうか？"
70006020-36 = "いいですね！せっかくなら可愛いのにしませんか？ひよことか！"
70006020-37 = "ひよこのクッキー……それは、可愛いですね……。"
70006020-39 = "……そんなわけで、ひよこのクッキーを作ることになったものの……問題がありまして。"
70006020-40 = "私は……クッキーを作ったことがありません。"
70006020-41 = "セリナとハナエが作るのを手伝ってくれましたが、結果は惨憺たるものでした。"
70006020-42 = "ひよこではなく、こう……別の世界の生き物というか、何か違うものが生まれてしまい……。"
70006020-43 = "なので、伝手をたどって、トリニティの有名なパティスリーにもご教示いただいたのですが……。"
70006020-44 = "なぜか、難易度の高いレシピを教えられてしまって……。"
70006020-45 = "ミネさんはひよこのクッキーがよかったのですよね？"
70006020-46 = "ええ。可愛いは正義ですから。"
70006020-47 = "そんな折に、ここでフウカさんと出会ったのです。"
70006020-48 = "シャーレの近くですから、ゲヘナとトリニティの生徒が会うのもおかしくはありませんが……不思議な組み合わせですね。"
70006020-49 = "一体どんな風の吹き回しですか？"
70006020-51 = "きっかけ……いや、うん。#nうわっ、また変なのに絡まれた……って思ったんだよね……。"
70006020-53 = "うん！今日の買い出しも上手くいったかな。"
70006020-54 = "これでしばらくはよし、っと。"
70006020-55 = "……またあいつらに邪魔されなければだけど。"
70006020-60 = "ふむ……。"
70006020-64 = "ど、どうも……何かご用ですか……？"
70006020-65 = "こんにちは。救護活動に興味はありませんか？"
70006020-66 = "……えっ？"
70006020-67 = "失礼。私はトリニティ総合学園の救護騎士団団長、[ruby=あおもり]蒼森[/ruby]ミネと申します。"
70006020-69 = "と、トリニティ？しかも救護騎士団の団長！？"
70006020-70 = "はい。あなたを見つけたその時、シンパシーを感じまして。"
70006020-71 = "食材を見定めるその鋭い眼差し……まるで医療用品を選ぶ時の私のようでした。"
70006020-72 = "そ、そうなんですね……。"
70006020-73 = "特に、たくさんの人を想うその表情。あなたも「救護」に携わる方なのでしょう？"
70006020-74 = "救護……？えっと……給食部の部長ならやってますけど……。"
70006020-79 = "やはり……！私の目に狂いはありませんでした！"
70006020-80 = "少しお時間を頂けませんか？#nあなたとなら通じ合える気がするのです。"
70006020-81 = "でも、私はゲヘナの生徒ですよ……？"
70006020-82 = "「救護」の前では、所属など意味を成しません。#nそう思いませんか？"
70006020-83 = "まあ……はい。#nお腹が空いているなら、それが誰であれご飯を振る舞いたいですけど……。"
70006020-85 = "ちょっとだけ手のかかる奴らもいますけど……。"
70006020-86 = "「手のかかる奴ら」……？"
70006020-88 = "――なるほど。それで私たちの話を。"
70006020-89 = "クッキー作りも手伝うつもり。"
70006020-90 = "救護騎士団と仲良くなって困ることはないと思うし。"
70006020-91 = "だから今日は諦めて。ほら、帰った帰った。これからクッキーの材料を買いに行くんだから。"
70006020-92 = "……いいでしょう。フウカさんにお昼を作っていただく計画は保留とします。"
70006020-93 = "その代わり、と言ってはなんですが。"
70006020-94 = "ミネさん。差し支えなければ、私たち「美食研究会」にひよこクッキーの試食を任せていただけませんか？"
70006020-95 = "事情を伺ったあの時から、美食の気配を感じたのです。"
70006020-96 = "フフッ。どんな味か気になります★"
70006020-97 = "クッキー好き！だーいすき！"
70006020-98 = "試食ならタダってことでしょ？助かるー！"
70006020-100 = "あんた達、相変わらず復活早いよね……。"
70006020-101 = "試食ですか……。確かに、私たちよりは美食研究会の皆さんの方が詳しそうですね。"
70006020-102 = "関わらせたら碌なことにならないと思いますよ……。"
70006020-104 = "ご心配には及びません。あくまで「試食係」に徹するつもりですから。"
70006020-105 = "フウカさんが手伝うということなら、変なクッキーになる心配もないでしょうし。"
70006020-106 = "まあ、そうならないように頑張るけど……。"
70006020-107 = "ミネ団長、どうしますか？"
70006020-108 = "私は賛成です！皆さんとのお菓子作り、今から楽しみです～！"
70006020-110 = "そうですね、ここはお言葉に甘えて……皆さん、よろしくお願いいたします。"
70006020-111 = "不安だなぁ……。"
70006020-128 = "（しばらくして……）"
70006020-130 = "トリニティの調理実習室"
70006020-131 = "あっ！いい匂いしてきた！クッキー、そろそろかなぁ？"
70006020-132 = "もうできるから。大人しく待ってて。"
70006020-134 = "だそうですよ？私たちも準備をしましょうか。"
70006020-135 = "トリニティの調理実習室に来ちゃったけど……本当に大丈夫なんだよね？"
70006020-137 = "ええ、もちろん。計画通り楽しめばいいのです。"
70006020-141 = "計画通りに。"
70006020-142 = "計画通りって……美味しくなかったら爆破するつもり！？"
70006020-143 = "ふふっ、さあ。どうでしょうか。"
70006020-145 = "みなさん！お待たせしました！"
70006020-146 = "ミネ団長のクッキーが完成しましたよ！"
70006020-152 = "ふぅ……。"
70006020-154 = "団長、みなさんに見せてあげてください！"
70006020-155 = "きっと驚きますよ。"
70006020-157 = "わ、分かりました。"
70006020-158 = "……こちらです！"
70006020-164 = "あら。これはこれは……。"
70006020-165 = "見た目はバッチリですね。"
70006020-166 = "かわいいじゃない！食べるのが勿体ないくらい！"
70006020-167 = "すごいすごい！もう食べていい！？"
70006020-169 = "そんなに褒められては、少々照れくさいですね……#nでも、私が作ったと言って信じてもらえるでしょうか。"
70006020-170 = "火のない所に煙は立たぬ、とは言いますが……。"
70006020-171 = "噂は所詮、噂。すべて鵜呑みにしていては、本質を見落としてしまうもの。#n眼の前の人を見てこそですわ。ミネさんの噂の方が間違っていると分かります。"
70006020-172 = "本当ですか……！！"
70006020-174 = "わあ！良かったですね、団長！"
70006020-175 = "これで他の人にも、本当の団長を知ってもらえると思います！"
70006020-177 = "そうだと良いのですが……。"
70006020-178 = "では……いざ実食といきましょうか。"
70006020-183 = "えへへっ。頭から食べようかな？それとも体？"
70006020-184 = "頭からの方が苦しみが少なくて済むんじゃないでしょうか★"
70006020-186 = "それじゃ、いただきます……！"
70006020-197 = "こ、この味は……！"
70006020-198 = "あらあら……"
70006020-199 = "こんなクッキー、生まれて初めて……！"
70006020-200 = "なんというかこれ……"
70006020-201 = "おいしいっっ……！！"
70006020-203 = "口の中に広がる、卵の香ばしさと甘さ……たまんない！"
70006020-204 = "サクッとした歯ごたえ……焼き加減も完璧ですね。"
70006020-205 = "可愛い味がする！私、今までいろんなもの食べてきたけど可愛い味は初めて！"
70006020-206 = "……料理とは、作り手の想いも共に味わうもの。"
70006020-207 = "このクッキーから、ミネさんの真心が伝わってきます。"
70006020-208 = "嗚呼、確かな美食でございます。"
70006020-209 = "そ、そのようなお言葉……。"
70006020-210 = "すごく嬉しいです。美食研究会の皆さんから認められて自信がつきました。"
70006020-211 = "正直、失敗したらどうしよう、と心配していたので……。"
70006020-212 = "ふふっ。ここを爆破せずに済んでよかったです。"
70006020-213 = "やっぱりそのつもりだったの！？"
70006020-214 = "でも、美味しかったですね～？"
70006020-215 = "うんうん！ねえ、これ全部食べていい？"
70006020-217 = "もちろんです。たくさんありますので、好きなだけお召し上がりください。"
70006020-218 = "やったー！"
70006020-220 = "これならきっと、たくさんの方に思いを伝えられるはずです！"
70006020-221 = "はい！正義実現委員会のハスミさんも喜ぶと思います！"
70006020-223 = "ハスミ副委員長ですか……笑われないといいのですが。"
70006020-225 = "デザートに関しては一貫しているお方ですし、このクッキーを笑うはずありません！"
70006020-226 = "このクッキーで、お二人の溝が埋まるかもしれませんね！"
70006020-228 = "ふ、ふむ……。"
70006020-229 = "ともかく、皆さんありがとうございました。おかげで一歩踏み出せた気がします。"
70006020-230 = "特にフウカさんには大変お世話になり、素晴らしいクッキーが――"
70006020-234 = "フウカさん？"
70006020-236 = "あれ？どこに行かれたのでしょうか？さっきまでこちらにいらしたはずですが……。"
70006020-237 = "そういえば試食の時からいなかったような……。"
70006020-239 = "では救護騎士団の皆さん、私たちはそろそろ……。"
70006020-240 = "んっ……！んんーーっ！！"
70006020-241 = "フウカさん！？なんで縛られて！？"
70006020-242 = "いつの間にフウカさんを……！"
70006020-243 = "皆さんがクッキーの感想を聞いていらした時ですよ。"
70006020-244 = "完成したクッキーに、すっかり夢中になっていたようですね★"
70006020-245 = "あの一瞬で、ですか……？"
70006020-247 = "うふふっ。私たちはフウカさんと長い時間を一緒に過ごしてきたのです。この程度、朝飯前ですわ。"
70006020-248 = "自慢げに言うことじゃ無くない……？"
70006020-249 = "んんっ！んーーっ！！"
70006020-250 = "早くお昼を作りたい！ってフウカが言ってるよ！"
70006020-251 = "では行きましょうか。まずはジュリさんに連絡をして……"
70006020-256 = "あっ、ハルナさん。どうですか？先輩、見つかりました……？"
70006020-257 = "ええ、無事に「保護」いたしましたわ。"
70006020-258 = "フウカさんは食材選びで忙しかっただけのようです。"
70006020-259 = "そうでしたか！お手間をおかけしますが、引き続き先輩をよろしくお願いしますね！"
70006020-260 = "お任せください。これから送り届けますので。"
70006020-264 = "では、私たちはこれにて。"
70006020-265 = "クッキーご馳走さまでした★"
70006020-272 = "友人に対して、なんたる仕打ち……！"
70006020-273 = "追います！――救護が必要な場に救護を！！"
70006020-278 = "か、壁に穴が……。"
70006020-279 = "あはは……皆さんの誤解を解くのは、当分難しそうですね。"
70006020-281 = "美食研究会……！逃がしませんよ！！"
70006020-282 = "うふふっ、今度は捕まりませんわ……！"
70006020-283 = "んんっ！んんーーーーーっ！！！"
70006020-290 = "（その後、凄まじい追走劇が繰り広げられた）"
70006020-291 = "美食とクッキー、そして救護"

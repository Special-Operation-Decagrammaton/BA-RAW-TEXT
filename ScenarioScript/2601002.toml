[translation]
2601002-1 = "สไนเปอร์แห่งท่าเรือ"
2601002-2 = "ท่าเรือหมู่บ้านชาวประมง"
2601002-3 = "(วันต่อมา คุณครูไปที่ท่าเทียบเรือของท่าเรือที่มิยุใช้เป็นสถานที่ฝึกฝนเพื่อดูความเป็นอยู่ของมิยุ)"
2601002-4 = "(พอมาถึงท่าเรือ คุณครูก็เห็นแค่นักตกปลาไม่กี่คน และไม่เจอมิยุที่นั่น)"
2601002-5 = "...เอ๋?"
2601002-6 = "คุณครู...?"
2601002-7 = "[s1] \"มิยุ...?\"\n[s2] \"หืม? เสียงมาจากทางไหนนะ...\""
2601002-10 = "ทางนี้ค่ะ คุณครู... ตรงปลายสุดของท่าเรือ..."
2601002-11 = "อยู่ทางนี้ค่ะ......"
2601002-14 = "[ns] \"มาตกปลาอยู่ตรงนี้นี่เอง\""
2601002-15 = "― [log=미유 수영복]ฮิฮิ... แม้แต่คุณครูเองก็ยังไม่สังเกตเห็นเลย[/log][wa:1760] "
2601002-17 = "― [log=미유 수영복]ดูเหมือนคราวนี้จะปลอมตัวสำเร็จแล้วค่ะ[/log][wa:10] "
2601002-20 = "― [log=미유 수영복]เหมือนคำกล่าวที่ว่าถ้าจะซ่อนต้นไม้ก็ควรเอาไปซ่อนในป่า...[/log][wa:1400] "
2601002-23 = "― [log=미유 수영복]ถ้าจะแฝงตัวเข้าไปในกลุ่มนักตกปลา[/log][wa:160] "
2601002-25 = "― [log=미유 수영복]การมานั่งตกปลาแบบนี้ก็ดูเป็นธรรมชาติกว่าสินะคะ[/log][wa:10] "
2601002-28 = "― [log=미유 수영복]...แต่พวกนกนางนวลกับพวกนกทะเลชอบมานั่งบนหัวบ่อยๆ แบบนี้ [/log][wa:1980] "
2601002-30 = "― [log=미유 수영복]มันก็ลำบากอยู่นิดหน่อยค่ะ...[/log]"
2601002-33 = "― [log=미유 수영복]แต่ว่าฉัน... ชินกับเรื่องแบบนี้แล้วค่ะ[/log][wa:1000] "
2601002-35 = "― [log=미유 수영복]ฮิฮิ... ฮิฮิฮิ...[/log][wa:1280] "
2601002-38 = "― [log=미유 수영복]ฉันเลือกที่นี่เพราะมันมีอุปกรณ์ตกปลาอยู่[/log][wa:3000] "
2601002-40 = "― [log=미유 수영복]แต่ว่าก็เป็นสถานที่ที่เหมาะกับการพรางตัวเลยนะคะ[/log][wa:10] "
2601002-43 = "― [log=미유 수영복]ที่นี่เป็นสถานที่เปิด[/log][wa:380] "
2601002-45 = "― [log=미유 수영복]เลยเป็นที่ที่เหมาะสำหรับจับตาดูบริเวณรอบๆ ค่ะ[/log][wa:540] "
2601002-48 = "― [log=미유 수영복]แถมลมก็พัดอยู่ตลอด ทำให้ไม่ร้อนมาก[/log][wa:1340] "
2601002-50 = "― [log=미유 수영복]แล้วก็ยังมีหมวกฟางที่ใช้บังแดดอยู่...[/log][wa:10] "
2601002-53 = "― [log=미유 수영복]ละ...แล้วก็... วันนี้...[/log][wa:4740] "
2601002-56 = "― [log=미유 수영복]กะ...กะ...ก็มีคุณครู...[/log][wa:2660] "
2601002-58 = "― [log=미유 수영복]ยะ...อยู่กับฉันด้วยนี่คะ[/log]"
2601002-62 = "วะ...ว้ายยย...?"
2601002-63 = "ทะ...โทษทีนะ...! ฉันไม่เห็นเลยว่าเธอนั่งตกปลาอยู่ตรงนั้นน่ะ...!"
2601002-64 = "มะ...ไม่เป็นไรหรอกค่ะ... ฉันต่างหากที่เป็นฝ่ายผิด เพราะตัวตนที่จืดจางน่ะค่ะ..."
2601002-65 = "[s] \"ไม่เป็นไรนะ มิยุ?\""
2601002-66 = "...ค่ะ แค่ตกใจเสียงหวูดเรือนิดหน่อยค่ะ..."
2601002-67 = "อย่างที่เห็นเมื่อกี้นี้ค่ะ ตัวตนของฉันจืดจางมาก ชาวประมงอาจเลื่อนเรือมาจอดชิดกับคันเบ็ดตกปลา#nของฉัน... หรือไม่ก็โดนพวกนกทะเลรุม..."
2601002-68 = "ก็เลยทำให้มีสมาธิกับการตกปลาได้ไม่เต็มที่น่ะค่ะ..."
2601002-69 = "แต่ว่าฉันก็ชินแล้วที่ตัวตนจืดจางของฉันทำให้เกิดเรื่องแบบนี้... ฮ่าฮ่า..."
2601002-70 = "[s5] \"ตะ...แต่มันก็มีข้อดีอยู่นะ!\"\n[s6] \"ตะ...ตอนนี้อยู่ระหว่างภารกิจแฝงตัว อาจเป็นเรื่องดีก็ได้นะ!\""
2601002-73 = "งะ...งั้นเหรอคะ......"
2601002-79 = "...เอ๋?"
2601002-80 = "...คะ...ความรู้สึกแบบนี้มัน...?"
2601002-81 = "[s7] \"ปลาติดเบ็ดแล้วเหรอ...?\"\n[s8] \"ปลาติดเบ็ดแล้ว!\""
2601002-84 = "อะ...อึก... ตะ...ต้องรีบดึงเบ็ดขึ้นมา...!"
2601002-85 = "อึก...! นะ...หนักกว่าที่คิดไว้อีก... ฮึบบบ...!!"
2601002-86 = "ฮึบบบบ...!!!"
2601002-95 = "สะ...สำเร็จมั้ย......?"
2601002-97 = "...นะ...นี่มัน......"
2601002-101 = "[ns9] \"...ปลายักษ์...\"\n[ns10] \"ปลายักษ์... ตัวเบิ้มมากเลยแฮะ...\""
2601002-104 = "...งะ...งั้นเหรอคะ?"
2601002-105 = "ที่จริงฉันไม่ค่อยมีประสบการณ์ตกปลาทะเลเท่าไร เลยไม่รู้ว่าตัวขนาดนี้เรียกว่าใหญ่รึเปล่า..."
2601002-109 = "...!! เฮ้ย ทุกคนมาดูนี่เร็ว! ดูสิๆ ดูปลาที่เด็กคนนั้นตกขึ้นมาได้สิ! สุดยอดเลย!"
2601002-110 = "ปลาตัวใหญ่สุดๆ ไปเลยนะ! ตกปลาตัวใหญ่แบบนั้นได้ที่นี่งั้นเรอะ!?"
2601002-111 = "คะ คะ...? ฉะ...ฉันเพิ่งเคยมาที่นี่..."
2601002-112 = "นี่เด็กน้อย ตกปลานั่นมาได้ยังไงน่ะ?"
2601002-113 = "ปลานั่นเป็นปลาที่ระวังตัวสูงมาก ถ้ามันรู้ว่ามีมนุษย์อยู่ใกล้ๆ มันจะระวังตัวแจจนไม่ยอมกินเหยื่อเลย..."
2601002-114 = "เล็กพริกขี้หนูจริงๆ เลยนะเด็กคนนี้..."
2601002-115 = "มะ..ไม่ใช่เลยค่ะ ฉะ...ฉันก็แค่......"
2601002-116 = "มะ...มีความสามารถพิเศษแค่เป็นมนุษย์ตัวตนจืดจางจนคนอื่นไม่สังเกต..."
2601002-117 = "[s11] \"ตกปลาที่ระวังตัวสุดๆ ได้เพราะตัวตนจืดจางงั้นเหรอเนี่ย...\"\n[s12] \"เป็นความสามารถที่น่าทึ่งสุดๆ เลยนะ\""
2601002-120 = "ระ...เรื่องนั้น..."
2601002-121 = "เก็บซ่อนสัญชาติญาณการฆ่าได้แนบเนียนจนหลอกปลาที่ขี้ระแวงได้นี่เป็นพรสวรรค์ที่น่าอิจฉาจริงๆ นะ"
2601002-122 = "ฉันอยากมีพรสวรรค์แบบนั้นบ้างจังเลยน้า..."
2601002-123 = "มีเคล็ดลับฝึกพิเศษอะไรรึเปล่า?"
2601002-128 = "คะ...คือว่าเรื่องนั้น... ฉะ...ฉันก็แค่..."
2601002-129 = "แง๊งงงงง......!"
2601002-131 = "(หลังจากนั้น คุณครูก็รีบพามิยุที่ตื่นตระหนกเพราะถูกนักตกปลารุมถามหนีออกมาด้วยความเร็วแสง...)"

[translation]
2601002-1 = "Dock Sniper"
2601002-2 = "Fishing Village Dock"
2601002-3 = "The next day, I made my way to the dock at the fishing village, where Miyu was supposedly training."
2601002-4 = "I walked to the end of the pier. There was a group of fishermen, but no sign of Miyu..."
2601002-5 = "...Oh?"
2601002-6 = "S-Sensei?"
2601002-7 = "[s1] \"Miyu...?\"\n[s2] \"Hmm? Where's that voice coming from?\""
2601002-10 = "Over here, Sensei. At the edge of the pier..."
2601002-11 = "You're getting closer..."
2601002-14 = "[ns] \"Oh, you're fishing.\""
2601002-15 = "― [log=미유 수영복]Heehee... Even you didn't notice me, Sensei.[/log][wa:1760] "
2601002-17 = "― [log=미유 수영복]My disguise is perfect...again.[/log][wa:10] "
2601002-20 = "― [log=미유 수영복]There's an old saying: to hide a tree, put it in a forest...[/log][wa:1240] "
2601002-23 = "― [log=미유 수영복]If I want to blend in with the fishermen,[/log][wa:10] "
2601002-25 = "― [log=미유 수영복]then I'd better do some fishing, myself.[/log][wa:10] "
2601002-28 = "― [log=미유 수영복]...I just wish the seagulls would stop trying to nest[/log][wa:2100] "
2601002-30 = "― [log=미유 수영복]on my head...[/log]"
2601002-33 = "― [log=미유 수영복]Oh well. I'm used to things like that...[/log][wa:920] "
2601002-35 = "― [log=미유 수영복]Heehee... Heeheehee...[/log][wa:1080] "
2601002-38 = "― [log=미유 수영복]I chose this place because I happen to have a fishing rod,[/log][wa:2280] "
2601002-40 = "― [log=미유 수영복]but it really is a perfect spot for an undercover stakeout.[/log][wa:10] "
2601002-43 = "― [log=미유 수영복]Visibility here is really good,[/log][wa:10] "
2601002-45 = "― [log=미유 수영복]so I've got excellent sight lines.[/log][wa:980] "
2601002-48 = "― [log=미유 수영복]There's a nice breeze to keep me cool,[/log][wa:1180] "
2601002-50 = "― [log=미유 수영복]and I have a straw hat to shade my face...[/log][wa:10] "
2601002-53 = "― [log=미유 수영복]A-And...today…[/log][wa:5140] "
2601002-56 = "― [log=미유 수영복]Se-Se-Sensei...[/log][wa:2980] "
2601002-58 = "― [log=미유 수영복]is here with me...[/log]"
2601002-62 = "A-Ah...!"
2601002-63 = "Whoa, sorry! I didn't see you there...!"
2601002-64 = "N-No... It's my fault for being so...unnoticeable..."
2601002-65 = "[s] \"Are you okay, Miyu?\""
2601002-66 = "Yes. I was just caught off guard, is all..."
2601002-67 = "I'm so invisible to everyone...that fishermen keep parking their boats in front of my rod, and the birds gather around me..."
2601002-68 = "So...it's hard to actually do any real fishing..."
2601002-69 = "But...! I'm used to this kind of thing, so... Haha..."
2601002-70 = "[s5] \"L-Look on the bright side!\"\n[s6] \"It's better this way, since you're undercover right now.\""
2601002-73 = "Ah... Uh-huh..."
2601002-79 = "...Oh?"
2601002-80 = "I-I feel something...!"
2601002-81 = "[s7] \"Your fishing rod...!\"\n[s8] \"You hooked something!\""
2601002-84 = "Aaah... I've gotta...reel it in...!"
2601002-85 = "Waah! It's so heavy... Aaaah!"
2601002-86 = "Urgh...!"
2601002-95 = "D-Did I get it...?"
2601002-97 = "This...is..."
2601002-101 = "[ns9] \"...Nice catch.\"\n[ns10] \"Look at the size of that fish...\""
2601002-104 = "I-Is it good...?"
2601002-105 = "I'm not really experienced with ocean fishing, so I don't know how big is...big..."
2601002-109 = "Hey, guys! Look at the fish on that kid's hook!"
2601002-110 = "Dang, what a catch! I didn't know there were fish that big around here!"
2601002-111 = "A-Ah... I-It's my first time here, so I'm n-not sure..."
2601002-112 = "How'd you manage to catch a prize like that?"
2601002-113 = "That's a cautious species of fish, there. If it so much as smells a human, it swims off."
2601002-114 = "You look like a normal student, but you must be, like...some kinda fishing expert..."
2601002-115 = "N-No... I'm just..."
2601002-116 = "Nobody ever notices me... I'm really good at slipping under the radar..."
2601002-117 = "[s11] \"Catching a cautious fish by slipping under the radar, huh?\"\n[s12] \"That's a rare talent.\""
2601002-120 = "N-No, it's..."
2601002-121 = "Geez, I'm jealous. Imagine being so quiet and still that not even the fish know you're there."
2601002-122 = "I wish I could do that!"
2601002-123 = "Right? Hey, kid, what's your secret?"
2601002-128 = "U-Uh... I'm nothing special, really..."
2601002-129 = "Waaah..."
2601002-131 = "Miyu started panicking from all of the sudden attention, and I ended up having to carry her away."

[translation]
2601002-1 = "碼頭的狙擊手"
2601002-2 = "漁村碼頭"
2601002-3 = "（隔天，來到了美優正在訓練的碼頭）"
2601002-4 = "（雖然有幾名釣客，卻沒有看到美優的身影）"
2601002-5 = "……咦？"
2601002-6 = "老師……？"
2601002-7 = "[s1]「……美優？」\n[s2]「這個聲音，究竟是從哪裡……？」"
2601002-10 = "我在這裡，老師……在棧橋的盡頭……"
2601002-11 = "是這邊……"
2601002-14 = "[ns]「原來你在那裡啊。」"
2601002-15 = "― [log=미유 수영복]呵呵，居然連老師也沒有馬上發現， [/log][wa:2840] "
2601002-17 = "― [log=미유 수영복]看來這次也很完美。[/log][wa:780] "
2601002-20 = "― [log=미유 수영복]就像「想要隱藏一棵樹就要藏在森林裡」這句話說的一樣……[/log][wa:2560] "
2601002-23 = "― [log=미유 수영복]想融入釣客之中的話，[/log][wa:1040] "
2601002-25 = "― [log=미유 수영복]釣魚是最自然的。[/log][wa:1100] "
2601002-28 = "― [log=미유 수영복]……雖然海鷗或海鳥一直想站在我的頭上， [/log][wa:3420] "
2601002-30 = "― [log=미유 수영복]讓我有點困擾……[/log]"
2601002-33 = "― [log=미유 수영복]不過這種事……我已經習慣了……[/log][wa:1920] "
2601002-35 = "― [log=미유 수영복]呵呵，呵呵呵……[/log][wa:1640] "
2601002-38 = "― [log=미유 수영복]雖然是因為正好有釣具才選擇了這裡， [/log][wa:3880] "
2601002-40 = "― [log=미유 수영복]真是個非常適合潛伏的地方呢。[/log][wa:1330] "
2601002-43 = "― [log=미유 수영복]視野很開闊，[/log][wa:980] "
2601002-45 = "― [log=미유 수영복]要監視這附近也是最適合的。[/log][wa:1820] "
2601002-48 = "― [log=미유 수영복]風很涼爽，所以不會很熱，[/log][wa:2220] "
2601002-50 = "― [log=미유 수영복]還有能夠遮陽的草帽……[/log][wa:640] "
2601002-53 = "― [log=미유 수영복]而，而且……今天……[/log][wa:5300] "
2601002-56 = "― [log=미유 수영복]老，老，老師也……[/log][wa:3220] "
2601002-58 = "― [log=미유 수영복]……在我身邊。[/log]"
2601002-62 = "唔呀……！？"
2601002-63 = "抱，抱歉……！#n沒注意到你在那邊……！"
2601002-64 = "沒，沒關係……是我存在感太低的錯……"
2601002-65 = "[s]「美優，沒事吧？」"
2601002-66 = "……嗯。#n只是被聲音嚇到而已……"
2601002-67 = "我在這裡的存在感也很低，所以漁夫們會把船停在我的面前……#n或是海鳥會集中在我身邊……"
2601002-68 = "不太能專心釣魚……"
2601002-69 = "不過，一直以來都是這樣，我已經很習慣了……呵呵……"
2601002-70 = "[s5]「往，往好處想吧！」\n[s6]「畢竟正在潛伏，這反而是優點哦！」"
2601002-73 = "是，是這樣嗎……"
2601002-79 = "……咦？"
2601002-80 = "……這，這個感覺是……？"
2601002-81 = "[s7]「正在拉釣竿……！」\n[s8]「上鉤了！上鉤了哦，美優！」"
2601002-84 = "唔……得趕快捲線才行……！"
2601002-85 = "嗯呣……！#n比，比想像中，還重……唔唔……！！"
2601002-86 = "啊唔……！！"
2601002-95 = "釣，釣上來了…………？"
2601002-97 = "……這，這個是……"
2601002-101 = "[ns9]「……是條大魚。」\n[ns10]「這隻魚……是不是還挺大的？」"
2601002-104 = "……是，是嗎？"
2601002-105 = "其實，我沒什麼海釣的經驗，所以不是很清楚──"
2601002-109 = "……！#n喂，喂！那個學生釣到厲害的東西了！"
2601002-110 = "真是條大魚啊！#n這麼大的魚是怎麼釣到的啊！？"
2601002-111 = "那個……我，我也，不太清楚……"
2601002-112 = "話說這還真不可思議。"
2601002-113 = "那種魚的警戒心很強，只要察覺到人的氣息就會馬上逃走才對……"
2601002-114 = "莫非你是相當著名的釣客嗎……？"
2601002-115 = "不，不是的……像我這種人……"
2601002-116 = "只是存在感很低而已……"
2601002-117 = "[s11]「居然能釣到警戒心很強的大魚……」\n[s12]「美優有著很了不起的才能呢。」"
2601002-120 = "怎，怎麼這麼說……"
2601002-121 = "竟然能在隱藏氣息的情況下垂下釣線，實在是太令人羨慕了。"
2601002-122 = "真是讓人望眼欲穿的才能……"
2601002-123 = "是不是受過什麼特殊的訓練？"
2601002-128 = "那個……我只是，那個……這個……"
2601002-129 = "唔咦咦……"
2601002-131 = "（之後，帶著被釣客們追問到陷入恐慌的美優離開了碼頭）"

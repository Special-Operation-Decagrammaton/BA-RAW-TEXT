[translation]
10004020-1 = "ตอนที่ 2;ถังหูลู่และดินแดนในฝัน"
10004020-2 = "ย่านการค้าเทพเต่าดำ ซานไห่จิง"
10004020-3 = "คุณครู! ดูนั่นสิคะ! ขนมถังหูลู่ที่ทำจากส้มละค่ะ!"
10004020-4 = "ฉันเคยเห็นถังหูลู่ที่ทำจากลูกซานจาบ่อยๆ แต่นี่เป็นครั้งแรกที่เห็นถังหูลู่ที่ทำจากส้มเลยค่ะ!"
10004020-5 = "ผลส้มเสียบไม้อย่างเป็นระเบียบเหมือนดอกไม้สีเหลืองอร่ามแสนสวย... แค่ได้เห็นก็มีความสุขแล้วค่ะ"
10004020-6 = "อยากกินขนมถังหูลู่ส้มจังเลยค่ะคุณครู~ รสชาติน่าจะหวานอมเปรี้ยวนิดๆ ต้องอร่อยแน่เลยค่ะ!"
10004020-7 = "[s1] \"ตอนนี้เราไปตามหาชุนก่อนดีมั้ย?\"\n[s2] \"เดี๋ยวค่อยกินขนมดีกว่านะ\""
10004020-8 = "แต่ว่า... เมนูของร้านถังหูลู่ร้านนี้จะเปลี่ยนไปตามฤดูกาล... ถ้าไม่กินตอนนี้#nอาจจะไม่มีโอกาสได้กินอีกนานเลยก็ได้นะคะ"
10004020-9 = "แต่ว่า... เมนูของร้านถังหูลู่ร้านนี้จะเปลี่ยนไปตามฤดูกาล... ถ้าไม่กินตอนนี้#nอาจจะไม่มีโอกาสได้กินอีกนานเลยก็ได้นะคะ"
10004020-10 = "พอกินเสร็จแล้ว ฉันจะแปรงฟันให้สะอาดและเชื่อฟังพี่ชุนอย่างดีค่ะ เพราะงั้นแล้ว..."
10004020-11 = "ครูช่วยซื้อขนมให้หน่อยนะคะ~"
10004020-12 = "นะคะคุณครู~"
10004020-16 = "[ns3] \"ทำหน้าอ้อนแบบนั้น... ก็คงช่วยไม่ได้ล่ะนะ\"\n[ns4] \"งั้นแค่ไม้เดียวนะ\""
10004020-17 = "ว้าววว~ ขอบคุณค่ะคุณครู!"
10004020-18 = "ว้าววว~ ขอบคุณค่ะคุณครู!"
10004020-21 = "(เอ๊ะ? เหมือนรู้สึกว่าคุณครูจะนุ่มฟูกว่าปกติเลยนะ...)"
10004020-22 = "(หรือว่าเป็นเพราะฉันขอร้องในตอนที่เป็นเด็กแบบนี้กันเหรอคะ?)"
10004020-23 = "(ถ้าจะอ้อนให้คุณครูตามใจตอนที่เป็นเด็กแบบนี้... มันดูไม่ค่อยให้เกียรติคุณครูเท่าไหร่เลย...#nแต่ว่าตอนนี้ขอสนุกกับสิทธิพิเศษนี้สักหน่อยแล้วกันนะคะ)"
10004020-27 = "อื้มมม~ หวานจังเลย~ ว่าแล้วเชียวว่าถังหูลู่ของย่านการค้าเทพเต่าดำนี่อร่อยที่สุดเลยล่ะค่ะ"
10004020-28 = "คงเป็นเพราะเกล็ดน้ำตาลบางๆ ที่เคลือบอยู่บนผิวส้มที่ปอกเปลือกออกแล้ว พอกินเข้าไป#nมันก็เลยละลายในปากทันทีเหมือนเยลลี่เลยน่ะค่ะ~"
10004020-29 = "คุณครูคิดว่ายังไงคะ? อร่อยมั้ยคะ?"
10004020-30 = "[s5] \"อื้อ อร่อยดีนะ\"\n[s6] \"อร่อยสมกับเป็นอาหารของย่านการค้าเทพเต่าดำเลยนะ\""
10004020-31 = "ใช่มั้ยล่ะคะ? ย่านการค้าเทพเต่าดำเป็นย่านอาหารที่คนทั้งคิโวทอสชื่นชอบค่ะ#nเพราะว่าพอได้ชิมแล้วมันเกินความคาดหมายมากๆ เลยค่ะ"
10004020-32 = "ใช่มั้ยล่ะคะ? ย่านการค้าเทพเต่าดำเป็นย่านอาหารที่คนทั้งคิโวทอสชื่นชอบค่ะ#nเพราะว่าพอได้ชิมแล้วมันเกินความคาดหมายมากๆ เลยค่ะ"
10004020-33 = "โดยเฉพาะท่านประธานรูมิที่เป็นตัวแทนของย่านการค้า นอกจากอาหารพื้นเมืองของซานไห่จิงแล้ว#nเธอยังเอาวัตถุดิบและสูตรอาหารของโรงเรียนอื่นๆ มาปรุงเป็นเมนูฟิวชั่นใหม่ๆ ให้เราได้เห็นตลอดเลยค่ะ"
10004020-34 = "แต่ว่า <มังกรดำ> สภานักเรียนของทางซานไห่จิงดูเหมือนจะไม่ชอบอาหารของย่านการค้านี้ค่ะ#nทางสภามักจะบอกว่าอาหารที่นี่สร้างความเสื่อมเสียให้กับ \"ประเพณี\" และ \"ความมั่นคง\" ของ#nซานไห่จิงค่ะ"
10004020-35 = "ตามที่ฉันเคยได้ยินมา มีข่าวลือว่าเบื้องหลังพวกเขากำลังต่อสู้กันอย่างดุเดือดเพื่อชิงอำนาจ#nการปกครองซานไห่จิงอยู่ด้วย..."
10004020-36 = "[s] \"ชุนหลิงรู้เรื่องพวกนี้ได้ยังไงน่ะ?\""
10004020-37 = "ระ...เรื่องนี้คือว่า... พี่ชุนค่ะ พี่ชุนเล่าให้ฉันฟังค่ะ!"
10004020-38 = "พี่ชุนมักจะเล่าเรื่องต่างๆ อยู่เสมอ พออยู่กับพี่ชุนแล้วก็เลยรู้เรื่องพวกนี้เข้าน่ะค่ะ อ่าฮ่าฮ่า..."
10004020-39 = "สำหรับสวนต้นบ๊วย ทั้งทางมังกรดำกับย่านการค้าเทพเต่าดำต่างก็เป็นคนดีแล้วก็ใจดีมาก เพราะงั้นฉันเลยไม่อยากให้พวกเธอต่อสู้กันค่ะ..."
10004020-40 = "การดูแลเด็กไม่ใช่เรื่องง่ายๆ เพราะงั้นการดูแลและบริหารองค์กรที่ใหญ่ขนาดนั้น คงเป็นเรื่องยากที่จะ#nไม่มีเรื่องขัดแย้งเกิดขึ้นค่ะ"
10004020-41 = "[s7] \"ชุนหลิงพูดเหมือนผู้ใหญ่เลยนะ\"\n[s8] \"ชุนหลิงมีความคิดที่เหมือนผู้ใหญ่เลยนะ\""
10004020-42 = "คะ?! ฉันเหมือนคนอายุมากเหรอคะ?"
10004020-43 = "คะ?! ฉันเหมือนคนอายุมากเหรอคะ?"
10004020-44 = "ถึงร่างกายจะเป็นเด็ก... แต่ฉันก็ยังดูเหมือนคนอายุมากอยู่งั้นเหรอคะ?"
10004020-45 = "ถึงร่างกายจะเด็กลงแต่ว่าความคิดและการกระทำก็ยังเหมือนคนอายุมากงั้นเหรอคะ?!"
10004020-46 = "[s] \"เมื่อกี้ครูชมเธอนะ...\""
10004020-47 = "ชะ...ชมงั้นเหรอคะ?"
10004020-48 = "แบบนี้นี่เอง เพราะพวกเด็กๆ มักอยากจะโตไวๆ กัน... พอทำตัวเหมือนผู้ใหญ่ก็เลยได้รับคำชมสินะคะ!#nอ่าฮ่าฮ่า..."
10004020-49 = "ชุนหลิงก็เป็นแค่เด็กซนๆ เองค่ะ~"
10004020-50 = "[s] \"ว่าแต่เมื่อกี้ที่เธอพูดว่า \"ร่างกายเด็กลง\" น่ะ...\""
10004020-51 = "คะ... คุณครูคะ กินถังหูลู่หมดรึยังคะ? ดะ...ดูเหมือนว่าพี่ชุนจะไม่อยู่ที่นี่นะคะ"
10004020-52 = "ถ้าพี่ชุนไม่ได้อยู่ที่ย่านการค้าเทพเต่าดำล่ะก็ ฉันจะพาคุณครูไปดูที่อื่นต่อนะคะ"
10004020-53 = "ทางนี้ค่ะ ทางนี้~ รีบมาสิคะ!"

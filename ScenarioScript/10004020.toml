[translation]
10004020-1 = "第2話;糖葫蘆 in 夢幻島"
10004020-2 = "山海經．玄武商會"
10004020-3 = "老師，請看！是橘子的糖葫蘆唷！"
10004020-4 = "雖然經常看到山楂的糖葫蘆，但用橘子做的還是第一次見到呢！"
10004020-5 = "串在竹籤上的橘子閃爍著金光……光是看著就讓人興奮不已！"
10004020-6 = "老師不想嘗嘗看嗎？一定很酸甜可口唷！"
10004020-7 = "[s1] 「是水果糖一類的東西嗎？看起來確實很好吃……」\n[s2] 「但現在得先找到旬。」"
10004020-8 = "可，可是，這裡的菜單會隨著季節變化，如果錯過了，可能就再也吃不到了……"
10004020-9 = "可，可是，這裡的菜單會隨著季節變化，如果錯過了，可能就再也吃不到了……"
10004020-10 = "我吃完後，會好好刷牙的，也會乖乖聽教官旬姐姐的話～！"
10004020-11 = "就答應我這一次嘛～"
10004020-12 = "拜託～"
10004020-16 = "[ns3] 「都見到這種表情也沒辦法了……」\n[ns4] 「只能吃一個哦。」"
10004020-17 = "哇啊──！謝謝老師！"
10004020-18 = "哇啊──！謝謝老師！"
10004020-21 = "（嗯？老師好像比平時更溫柔耶……？）"
10004020-22 = "（是因為我現在的模樣嗎？）"
10004020-23 = "（雖然用這副模樣向老師撒嬌有點狡猾……但畢竟機會難得……！）"
10004020-27 = "嗯～又甜又好吃！玄武商會的糖葫蘆果然有其獨到之處！"
10004020-28 = "橘子塗了砂糖後，一放入嘴裡就像果凍般融化了……！"
10004020-29 = "如何，老師？不覺得很好吃嗎？"
10004020-30 = "[s5] 「嗯，這個真的很好吃。」\n[s6] 「玄武商會的食物，水準果然都很高呢。」"
10004020-31 = "對吧？玄武商會是能夠找到奇普托斯各地美食的美食勝地，#n不僅種類繁多而且都很美味哦！"
10004020-32 = "對吧？玄武商會是能夠找到奇普托斯各地美食的美食勝地，#n不僅種類繁多而且都很美味哦！"
10004020-33 = "特別是商會的代表瑠美會長，不僅精通山海經的傳統料理，#n對其他學校的料理和食材也很熟悉……！經常開發出各式的新菜色！"
10004020-34 = "但是山海經的學生會「玄龍門」卻批評玄武商會，#n說這種融合了各地特色的食物是「擾亂了山海經的傳統和穩定」，對其深惡痛絕……"
10004020-35 = "為了奪取山海經的主導權，兩股勢力在暗地裡展開了腥風血雨的鬥爭……"
10004020-36 = "[s] 「小旬對山海經的情況還真清楚呢……？」"
10004020-37 = "那，那是因為……對！有時會聽旬姐姐說起……！"
10004020-38 = "我在旁邊聽著，自然而然就知道了……啊哈哈……"
10004020-39 = "以梅花園……不，就我個人的角度來看，玄龍門和玄武商會都是親切的好人……#n可以的話，真希望他們不要吵架……"
10004020-40 = "要營運一個龐大的組織是很困難的。畢竟連照顧孩子都不是件容易的事……"
10004020-41 = "[s7] 「小旬是個深思熟慮的好孩子呢。」\n[s8] 「小旬的想法很像大人呢。」"
10004020-42 = "我，有給人那麼老的感覺嗎！？"
10004020-43 = "我，有給人那麼老的感覺嗎！？"
10004020-44 = "本來還以為這個狀態就能放心了……我果然看起來很有年紀嗎……！？"
10004020-45 = "就算返老還童也能從行為中感受到年紀……！？"
10004020-46 = "[s] 「我只是單純想稱讚一下而已……」"
10004020-47 = "……啊，是，是那樣嗎？"
10004020-48 = "說，說的也是呢！小孩子通常都想快點成為大人……#n所以「像大人」一類的句子是稱讚呢！啊哈，啊哈哈哈……"
10004020-49 = "小旬產生了奇怪的誤解……"
10004020-50 = "[s] 「話說回來，『返老還童』指的是……」"
10004020-51 = "老師的糖葫蘆吃完了嗎！？吃完了呢！#n旬姐姐似乎不在這裡，我們走吧！？"
10004020-52 = "既然不在玄武商會的話，我再帶老師去其他旬姐姐可能會去的地方！"
10004020-53 = "來，往這邊！老師！"

[translation]
10004020-1 = "#title;제2화;탕후루와 네버랜드"
10004020-2 = "#place;산해경 현무상회"
10004020-3 = "3;꼬마 슌ND;03;선생님, 저기 좀 보세요! 귤로 만든 탕후루예요!\n#3;hophop\n#3;em;[반짝]\n#3;a"
10004020-4 = "3;꼬마 슌ND;13;산사나무 열매로 만든 탕후루는 자주 보았지만, 귤로 만든 탕후루는 처음 봐요!"
10004020-5 = "3;꼬마 슌ND;01;막대 끝에 꽂힌 귤이 가지런히 진열된 모습이 마치 황금색의 꽃망울 같아서…… 보고만 있어도 즐거워지네요."
10004020-6 = "3;꼬마 슌ND;03;선생님, 하나만 먹어봐요. 분명 새콤달콤하니 맛있을 거예요!\n#3;em;[반응]"
10004020-7 = "[s1] \"지금은 슌을 먼저 찾아야 하지 않을까.\"\n[s2] \"군것질은 나중에 하자.\""
10004020-8 = "3;꼬마 슌ND;11;하지만…… 이 탕후루 가게의 메뉴는 철에 따라 매번 바뀌기 때문에 지금 먹어 두지 않으면 언제 또 먹을 수 있을지 모른다고요.\n#3;em;[속상함]\n#3;stiff"
10004020-9 = "3;꼬마 슌ND;11;하지만…… 이 탕후루 가게의 메뉴는 철에 따라 매번 바뀌기 때문에 지금 먹어 두지 않으면 언제 또 먹을 수 있을지 모른다고요.\n#3;em;[속상함]\n#3;stiff"
10004020-10 = "3;꼬마 슌ND;06;다 먹고 나면 양치도 똑바로 하고, 교관 언니들 말도 잘 들을 테니까……"
10004020-11 = "3;꼬마 슌ND;11;한번만 허락해주세요~"
10004020-12 = "3;꼬마 슌ND;11;제발요~\n#3;a\n#3;closeup"
10004020-13 = "#st;[0,0];instant;1;"
10004020-14 = "#clearST"
10004020-15 = "3;꼬마 슌ND;12\n#3;em;[반짝]\n#3;closeup\n#wait;2500"
10004020-16 = "[ns3] \"……그런 표정으로 쳐다보면 어쩔 수 없지.\"\n[ns4] \"그럼 한 개 뿐이야.\""
10004020-17 = "3;꼬마 슌ND;03;와아~ 감사합니다, 선생님!\n#3;hophop\n#3;em;[음표]"
10004020-18 = "3;꼬마 슌ND;03;와아~ 감사합니다, 선생님!\n#3;hophop\n#3;em;[음표]"
10004020-19 = "3;꼬마 슌ND;03\n#3;h"
10004020-20 = "#wait;1000"
10004020-21 = "3;꼬마 슌ND;02;(어라? 이상하게 평소보다 선생님이 더 무른 느낌이네요.)\n#3;em;[?]\n#3;stiff"
10004020-22 = "3;꼬마 슌ND;01;(이것도 다 어린 아이의 모습으로 부탁을 했기 때문일까요?)"
10004020-23 = "3;꼬마 슌ND;29;(이 모습으로 선생님의 호의에 기대는 건 조금 치사하다는 생각도 들긴 하지만…… 지금은 모처럼의 특권을 누려보도록 할까요.)\n#3;em;[음표]"
10004020-24 = "#all;hide"
10004020-25 = "3;꼬마 슌ND;99\n#3;greeting\n#3;a\n#wait;1000"
10004020-26 = "3;꼬마 슌ND;99\n#3;greeting\n#wait;1500"
10004020-27 = "3;꼬마 슌ND;28;으음~ 달콤해~. 역시 현무상회의 탕후루는 일품이네요.\n#3;em;[///]\n#3;stiff"
10004020-28 = "3;꼬마 슌ND;01;껍질을 벗겨낸 귤 위에 얇은 설탕을 입혀서 그런지, 입 안에 넣자마자 젤리처럼 녹아내리는 것 같아요~"
10004020-29 = "3;꼬마 슌ND;13;선생님이 드시기엔 어떠신가요? 맛있죠?\n#3;em;[반응]"
10004020-30 = "[s5] \"응, 맛있어\"\n[s6] \"현무상회의 음식은 하나같이 훌륭하네.\""
10004020-31 = "3;꼬마 슌ND;03;그렇죠? 현무상회는 키보토스 전역에서 찾아오는 먹거리 명소니까요. 무얼 먹어도 기대 이상이랍니다!\n#3;hophop\n#3;em;[반짝]"
10004020-32 = "3;꼬마 슌ND;03;그렇죠? 현무상회는 키보토스 전역에서 찾아오는 먹거리 명소니까요. 무얼 먹어도 기대 이상이랍니다!\n#3;hophop\n#3;em;[반짝]"
10004020-33 = "3;꼬마 슌ND;01;특히 상회의 대표이신 루미 회장님께서는 산해경의 전통 요리뿐만 아니라, 다양한 학교의 식재료와 조리법을 가미한 퓨전 요리에도 일가견이 있으신지라— 매번 멋진 신메뉴를 보여주곤 하세요."
10004020-34 = "3;꼬마 슌ND;12;하지만 산해경의 학생회인 <현룡문>은 현무상회의 이런 음식들이 산해경의 '전통'과 '안정'에 균열을 일으킨다며 싫어하는 모양이에요."
10004020-35 = "3;꼬마 슌ND;06;들리는 말에 의하면 산해경의 주도권을 잡기 위해 두 세력이 뒤에서 피비린내 나는 항쟁을 벌이고 있다는 소문도…….\n#3;em;…"
10004020-36 = "[s] \"슈에링은 그런 뒷사정을 어떻게 아는 거야?\""
10004020-37 = "3;꼬마 슌ND;08;이, 이건 그러니까…… 슌 언니, 슌 언니 덕분이에요!\n#3;em;[땀]\n#3;stiff"
10004020-38 = "3;꼬마 슌ND;09;슌 언니가 하는 이야기를 옆에서 주워듣다 보니 저도 모르게 알게 되어서요. 아하하……."
10004020-39 = "3;꼬마 슌ND;99;매화원에서 볼 때는 현룡문도 현무상회도 모두 친절하고 좋은 분들이라 싸우지 않으셨으면 좋겠지만……"
10004020-40 = "3;꼬마 슌ND;26;어린아이를 돌보는 것도 쉽지 않은데, 거대한 조직을 갈등 없이 운영한다는 건 더더욱 어려운 일이겠지요."
10004020-41 = "[s7] \"슈에링은 어른스럽구나.\"\n[s8] \"슈에링은 조숙하구나.\""
10004020-42 = "3;꼬마 슌ND;07;네?! 제가 그렇게 나이들어 보이나요?\n#3;shake\n#3;em;[?!]"
10004020-43 = "3;꼬마 슌ND;07;네?! 제가 그렇게 나이들어 보이나요?\n#3;shake\n#3;em;[?!]"
10004020-44 = "3;꼬마 슌ND;20;이 모습이라면 안심하고 있었는데…… 역시 저, 나이들어 보이나요?\n#3;em;[속상함]\n#3;stiff"
10004020-45 = "3;꼬마 슌ND;22;역시 어려졌다고는 하지만 행동거지에서 연륜이 묻어나는 건가요?!\n#3;a\n#3;closeup\n#3;hophop\n#fontsize;80"
10004020-46 = "[s] \"방금 한 말은 칭찬이었는데…….\""
10004020-47 = "3;꼬마 슌ND;07;……치, 칭찬이요?\n#3;em;[땀]\n#3;closeup"
10004020-48 = "3;꼬마 슌ND;08;그, 그렇죠. 어린아이들은 빨리 나이 들고 싶어하니까— 조숙하다는 말은 보통 칭찬이었죠! 아하하…….\n#3;stiff\n#3;closeup"
10004020-49 = "3;꼬마 슌ND;10;슈에링도 참, 덜렁이라니까~\n#3;em;[속상함]\n#3;closeup"
10004020-50 = "[s] \"그나저나 방금 어려졌다는 말은…….\""
10004020-51 = "3;꼬마 슌ND;09;서, 선생님. 탕후루는 다 드셨나요? 아, 아무래도 슌 언니는 여기에 없는 것 같아요.\n#3;em;[반응]"
10004020-52 = "3;꼬마 슌ND;10;현무상회에도 없다면, 제가 슌 언니가 갈 만한 다른 곳을 안내해 드릴게요."
10004020-53 = "3;꼬마 슌ND;13;이쪽이에요, 이쪽. 빨리 오세요!\n#3;hophop\n#3;em;[반짝]"
10004020-54 = "#st;[0,0];instant;1;"
10004020-55 = "#clearST"
10004020-56 = "3;꼬마 슌ND;13\n#3;dl\n#wait;2000"

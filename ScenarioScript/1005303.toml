[translation]
1005303-1 = "科學的烹飪祕訣"
1005303-2 = "千年科學學園．家政教室"
1005303-4 = "咦……老，老師？"
1005303-5 = "你，你怎麼會來這裡……"
1005303-6 = "[s1]「因為聽說優香在這裡練習做料理……」\n[s2]「所以想來幫優香的忙。」"
1005303-7 = "唔……沒想到老師居然會來……"
1005303-8 = "唔……沒想到老師居然會來……"
1005303-9 = "……要是知道老師會來，我就穿的正式一點了。"
1005303-10 = "[s]「……我是不是妨礙到你了？」"
1005303-11 = "沒有那種事！"
1005303-12 = "只是，那個……不想讓老師看到我羞恥的樣子。"
1005303-13 = "本來是打算，等做得更好一點再請老師吃的……"
1005303-14 = "[s]「優香親手做的料理……」"
1005303-15 = "……那是什麼表情？"
1005303-16 = "該不會是在擔心我做的料理不能吃吧？"
1005303-17 = "雖然沒有料理的經驗，但理論方面我已經完美掌握了，所以有一定的自信。"
1005303-18 = "所謂的料理就是將食材經由加熱與混合，加工成方便食用的型態。"
1005303-19 = "在這個過程中，食材會在物理上及科學上產生無數的變化。"
1005303-20 = "因此也有專家表示對科學的理解是精進料理不可或缺的。"
1005303-21 = "也就是說……完美理解科學的我，是不可能在料理上失敗的！#n對吧，老師？"
1005303-22 = "[s3]「雖然是有一點類似的部分……」\n[s4]「那麼，優香打算做什麼料理呢？」"
1005303-23 = "這本叫做《新手也沒問題！每天都能做的簡易便當》的人氣食譜推薦的是……"
1005303-24 = "這本叫做《新手也沒問題！每天都能做的簡易便當》的人氣食譜推薦的是……"
1005303-25 = "金平牛蒡和玉子燒……還有常見的章魚香腸。#n這種程度的話我也……"
1005303-26 = "好，首先從牛蒡的處理開始吧。"
1005303-27 = "我看看……為了去除澀味，要先在2L的水裡加1勺醋……"
1005303-31 = "嗯……"
1005303-32 = "[s]「有什麼問題嗎？」"
1005303-33 = "……老師。"
1005303-34 = "這份食譜裡沒有寫水的溫度。#n要假設是幾度的水呢？"
1005303-35 = "[s]「幾度都可以吧？」"
1005303-36 = "不可以！#n水的容積會隨著溫度而變化！"
1005303-37 = "要照著食譜做的話，就要連溫度都一樣才行！#n否則可能會因為水溫不同造成密度誤差的！"
1005303-38 = "假設因水溫而產生的密度差最高為0.040g/ml，所以最大誤差範圍為80g……"
1005303-39 = "要是因為用了比食譜上溫度還高的水來料理，導致牛蒡的酸味過重的話……"
1005303-40 = "[s5]「不用想那麼多的唷。」\n[s6]「冷靜點，優香。繼續做下去吧。」"
1005303-41 = "嗚嗚，好擔心……"
1005303-42 = "嗚嗚，好擔心……"
1005303-44 = "（然而，在那之後優香依然持續煩惱著）"
1005303-46 = "老，老師，怎麼辦！#n食譜上面寫要加紅糖，可是實習室裡只有白砂糖！"
1005303-47 = "要是因為加了白砂糖，導致發生了意料之外的化學反應……"
1005303-49 = "上面寫「用約60度的火煮2分鐘左右」……現在測得的溫度是50度……！"
1005303-50 = "這種情況要加熱多久才行啊！？#n話說2分鐘左右的「左右」具體來說是幾秒啊！？"
1005303-52 = "老，老師……！#n這個玉子燒，真的有在煎吧！？"
1005303-53 = "不，不要光顧著笑，說點什麼啊！"
1005303-57 = "終於……"
1005303-58 = "完成了！親手做的第一份便當！"
1005303-59 = "[s]「雖然花了3個小時……」"
1005303-60 = "這，這也沒辦法嘛！"
1005303-61 = "畢竟是第一次，火侯的控制又很困難。#n而且最重要的是……"
1005303-62 = "……不想讓[USERNAME]老師看到我失敗的樣子。"
1005303-63 = "[s]「做得很棒唷。」"
1005303-64 = "不過得花三小時的話，要在晄輪大祭當天早上準備可能有點困難。"
1005303-65 = "所以我想還是事先預訂便當，或是拜託其他朋友吧。"
1005303-71 = "至於今天做的這份便當……就請老師吃吧。"
1005303-72 = "[s]「這可是你第一次做的，真的可以給我吃嗎？」"
1005303-73 = "嗯。是老師的話……不，是老師才好。"
1005303-77 = "當，當然，是想請老師評價一下味道的意思。#n真的，只有這樣而已！"
1005303-83 = "……但是等你吃完以後……記得要告訴我感想喔。"
1005303-85 = "（於是便將優香做的便當帶回夏萊當成宵夜）"
1005303-86 = "（……雖然是冷掉的便當，卻有股溫暖的感覺，非常美味）"

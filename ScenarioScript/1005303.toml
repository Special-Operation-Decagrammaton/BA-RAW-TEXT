1005303-1 = "#title;과학적인 요리 비결"
1005303-2 = "#place;밀레니엄 학원 내 조리실습실"
1005303-3 = "3;유우카 체육복ND;01\n#3;a\n#wait;1000"
1005303-4 = "3;유우카 체육복ND;02;어, 어라? 선생님?\n#3;em;[?!]\n#3;shake"
1005303-5 = "3;유우카 체육복ND;15;어, 어째서 이곳에……\n#3;stiff"
1005303-6 = "[s1] \"유우카가 이곳에서 요리 연습을 한다고 해서……\"\n[s2] \"도와줄 건 없을까 싶어서.\""
1005303-7 = "3;유우카 체육복ND;04;우으…… 선생님이 요리 연습에 오실 줄은 몰랐는데……\n#3;em;[///]"
1005303-8 = "3;유우카 체육복ND;04;우으…… 선생님이 요리 연습에 오실 줄은 몰랐는데……\n#3;em;[///]"
1005303-9 = "3;유우카 체육복ND;14;이럴 줄 알았으면 좀 더 제대로 된 복장을 준비할 걸 그랬네요."
1005303-10 = "[s] \"……뭔가 내가 방해한 걸까?\""
1005303-11 = "3;유우카 체육복ND;04;그, 그런 건 아니에요!\n#3;em;[!]\n#3;jump"
1005303-12 = "3;유우카 체육복ND;08;다만 실수로라도 요리에 서툰 모습을 보이기라도 하면 부끄럽고……"
1005303-13 = "3;유우카 체육복ND;14;게다가…… 도시락이 잘 만들어지면 몰래 선생님 몫도 준비해서 드리려 했는데…….\n#fontsize;50"
1005303-14 = "[s] \"유우카의 수제 요리라…….\""
1005303-15 = "3;유우카 체육복ND;09;……뭔가요, 그 표정은?\n#3;em;[?!]\n#3;shake"
1005303-16 = "3;유우카 체육복ND;05;설마 제가 만든 요리가 이상할 거라고 생각하시는 건 아니시겠죠?"
1005303-17 = "3;유우카 체육복ND;99;물론 직접 요리를 해 본 경험은 부족하지만, 그래도 이론은 확실하니까요."
1005303-18 = "3;유우카 체육복ND;05;요리란 식재료를 가열하거나 혼합하여 먹기 좋은 형태로 가공하는 행위……\n#3;m2"
1005303-19 = "3;유우카 체육복ND;99;이 과정에서 식재료에는 무수한 물리적, 화학적 변화가 이루어지죠.\n#3;m4"
1005303-20 = "3;유우카 체육복ND;01;때문에 전문가들은 요리를 잘하기 위해서는 과학을 먼저 이해해야 한다고 해요.\n#3;m3"
1005303-21 = "3;유우카 체육복ND;07;그 말인즉…… 과학을 완벽하게 이해하고 있는 이상, 저는 절대로 요리에 실패하지 않아요!\n#3;em;[반짝]"
1005303-22 = "[s3] \"과학 실험과 요리는 조금 다른 것 같지만……\"\n[s4] \"그래서, 어떤 반찬을 만들 거야?\""
1005303-23 = "3;유우카 체육복ND;01;여기, <초보자도 할 수 있다! 매일 만드는 간단 도시락>이라는 인기 레시피 북의 추천에 따르면……\n#3;greeting"
1005303-24 = "3;유우카 체육복ND;01;여기, <초보자도 할 수 있다! 매일 만드는 간단 도시락>이라는 인기 레시피 북의 추천에 따르면……\n#3;greeting"
1005303-25 = "3;유우카 체육복ND;02;우엉조림과 문어 비엔나…… 그리고 달걀말이 정도면 괜찮을 것 같네요.\n#3;em;[반응]"
1005303-26 = "3;유우카 체육복ND;13;그럼 우선은 우엉의 밑 손질부터 시작해 볼까요?"
1005303-27 = "3;유우카 체육복ND;13;어디 보자, 우엉의 떫은맛을 빼기 위해 물 2L에 식초 한 스푼을 넣고……\n#3;greeting"

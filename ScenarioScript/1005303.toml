1005303-39 = "3;유우카 체육복ND;06;레시피에서 상정하는 물의 온도보다 더 뜨거운 물로 조리해서 자칫 우엉조림의 신맛이 너무 강해지기라도 하면……\n#3;em;[속상함]\n#3;stiff"

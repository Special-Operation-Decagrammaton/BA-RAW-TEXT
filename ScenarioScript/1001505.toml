[translation]
1001505-1 = "愛麗絲的選擇"
1001505-3 = "（愛麗絲坐在咖啡廳的角落，認真的玩著遊戲）"
1001505-4 = "（非常專心的看著畫面，甚至沒有注意到我靠近了）"
1001505-5 = "[s1] 「愛麗絲，早呀。」\n[s2] 「你在玩什麼遊戲呀？」"
1001505-8 = "啊，老師。早安。"
1001505-9 = "聽說這是最近流行的遊戲，實在是相當困難呢。愛麗絲正在煩惱該怎麼辦才好。"
1001505-10 = "常常要求愛麗絲做出困難的選擇……真是款高難度的遊戲。"
1001505-11 = "[s3] 「是怎麼樣的遊戲呢？」\n[s4] 「要做出什麼選擇呢？」"
1001505-12 = "首先，主角是被稱為胸毛王子的克羅馬魯諾王國的第3王子。"
1001505-13 = "首先，主角是被稱為胸毛王子的克羅馬魯諾王國的第3王子。"
1001505-14 = "[s] 「……嗯？」"
1001505-15 = "在巨大的胸肌上長出的叢林般的胸毛，是這個王國裡最有魅力的東西。"
1001505-16 = "[s] 「咦咦……？」"
1001505-17 = "周邊國家的首領們無論如何都想要與這位胸毛王子結為連理，於是展開了屍山血海的鬥爭，"
1001505-18 = "這次，最後留下來的候選人只有鬍鬚陛下和禿頭皇帝兩個人了。"
1001505-19 = "胸毛王子究竟要選擇鬍鬚陛下還是禿頭皇帝才會幸福呢？"
1001505-20 = "因為兩邊似乎都能帶給王子幸福的樣子，愛麗絲很煩惱……"
1001505-21 = "[s5] 「唔嗯……」\n[s6] 「還真是個困難的問題啊……」"
1001505-22 = "鬍鬚陛下有著在街頭裸奔的癖好。所以說能夠和胸毛王子分享共同的興趣，"
1001505-23 = "鬍鬚陛下有著在街頭裸奔的癖好。所以說能夠和胸毛王子分享共同的興趣，"
1001505-24 = "而禿頭皇帝不僅有帥氣的頭部，也是在肌肉狂歡節上獲勝無數次的、這個世界裡最帥的男人。想必肯定能讓王子的胸肌變得更大、胸毛也能更搶眼吧。"
1001505-25 = "[s7] 「那個遊戲，沒問題嗎……？」\n[s8] 「是個各方面都很危險的遊戲呢……」"
1001505-26 = "雖然不管選哪邊都好像能讓胸毛王子幸福，但也因為這樣硬是要排出優先順序的話……實在太困難了。"
1001505-27 = "雖然不管選哪邊都好像能讓胸毛王子幸福，但也因為這樣硬是要排出優先順序的話……實在太困難了。"
1001505-28 = "[s9] 「……我想，這必須交給愛麗絲自己來決定才行。」\n[s10] 「畢竟是愛麗絲煩惱後選出來的人，一定沒問題的。」"
1001505-31 = "是，非常謝謝你，老師。愛麗絲想要好好考慮後再下決定。"
1001505-32 = "是要選擇裸露的身軀還是更進一步的胸毛。"
1001505-33 = "是鬍鬚呢，還是禿頭呢。"
1001505-34 = "[s11] 「……那個遊戲，沒有年齡限制的嗎？」\n[s12] 「讓愛麗絲玩這種遊戲沒問題嗎……」"
1001505-38 = "（愛麗絲看了一會攻略網站，之後又煩惱了一段時間……）"
1001505-42 = "愛麗絲找到最佳解了！"
1001505-43 = "現在就回社團教室試試看！"
1001505-45 = "（留下這些話就開開心心地回去了）"

[translation]
1001505-1 = "การเลือกของอาริสึ"
1001505-3 = "(อาริสึนั่งกดโทรศัพท์อย่างตั้งใจอยู่ที่มุมหนึ่งในคาเฟ่)"
1001505-4 = "(กำลังมีสมาธิจดจ่ออยู่กับหน้าจอจนไม่รู้ว่ามีใครเดินมาใกล้ๆ)"
1001505-5 = "[s1] \"สวัสดีอาริสึ\"\n[s2] \"เล่นเกมอะไรอยู่เหรอ?\""
1001505-8 = "อรุณสวัสดิ์ค่ะ คุณครู"
1001505-9 = "เกมนี้กำลังเป็นที่นิยมกันในโรงเรียนช่วงนี้อยู่ค่ะ แต่มันก็ยากมากด้วย ฉันไม่รู้ว่าควรจะเลือกอันไหนค่ะ"
1001505-10 = "ให้อาริสึต้องตัดสินใจเรื่องยากๆ... เกมนี้ยากจังค่ะ"
1001505-11 = "[s3] \"เกมอะไรเหรอ?\"\n[s4] \"ต้องตัดสินใจเลือกอะไรเหรอ?\""
1001505-12 = "ตัวเอกเป็นองค์ชายที่ 2 แห่งอาณาจักรโครมาติก ชื่อว่าองค์ชายขนดกค่ะ"
1001505-13 = "ตัวเอกเป็นองค์ชายที่ 2 แห่งอาณาจักรโครมาติก ชื่อว่าองค์ชายขนดกค่ะ"
1001505-14 = "[s] \"อืม...\""
1001505-15 = "ขนหน้าอกที่ขึ้นดกเหมือนกล้ามหน้าอก ทำให้องค์ชายทรงเสน่ห์ที่สุดในอาณาจักรค่ะ"
1001505-16 = "[s] \"อ่อ....\""
1001505-17 = "ราชาในอาณาจักรข้างเคียงต่างแข่งขันกันดุเดือดเพื่อให้ได้ตัวองค์ชายขนดก"
1001505-18 = "ตอนนี้เหลือแค่จักรพรรดิหนวดและจักรพรรดิโป๊งเหน่งค่ะ"
1001505-19 = "องค์ชายขนดกต้องเลือกใครถึงจะมีความสุขเหรอคะ? ระหว่างจักรพรรดิหนวดกับจักรพรรดิ#nโป๊งเหน่ง"
1001505-20 = "ใครจะทำให้องค์ชายมีความสุขได้ อาริสึตัดสินใจยากจังค่ะ..."
1001505-21 = "[s5] \"อืม...\"\n[s6] \"เป็นปัญหาที่ยากนะ...\""
1001505-22 = "จักรพรรดิหนวดมีงานอดิเรกคือเปลือยกายวิ่งบนถนน เขาคงจะแบ่งปันงานอดิเรกกับองค์ชาย"
1001505-23 = "จักรพรรดิหนวดมีงานอดิเรกคือเปลือยกายวิ่งบนถนน เขาคงจะแบ่งปันงานอดิเรกกับองค์ชาย"
1001505-24 = "จักรพรรดิโป๊งเหน่งเป็นหนุ่มรูปงามที่สุดในโลกที่เคยชนะเทศกาลกล้ามเนื้อหลายครั้ง#nสามารถขยายกล้ามเนื้อหน้าอกและขับขนหน้าอกของเจ้าชายให้เด่นยิ่งขึ้นได้"
1001505-25 = "[s7] \"เกมนั่นน่ะ โอเคใช่มั้ย...?\"\n[s8] \"มันดูเป็นของอันตรายเลยนะ...\""
1001505-26 = "ไม่ว่าทางไหนตัวเอกก็น่าจะมีความสุข ทีนี้ก็มาเลือกข้อดีข้อเสีย... เป็นปัญหาที่ยากมากเลยค่ะ"
1001505-27 = "ไม่ว่าทางไหนตัวเอกก็น่าจะมีความสุข ทีนี้ก็มาเลือกข้อดีข้อเสีย... เป็นปัญหาที่ยากมากเลยค่ะ"
1001505-28 = "[s9] \"นี่เป็นปัญหาที่อาริสึต้องตัดสินใจนะ\"\n[s10] \"ถึงครูจะช่วยไม่ได้ แต่จะส่งกำลังใจให้\""
1001505-31 = "ขอบคุณมากเลยค่ะ คุณครู เรื่องนี้อาริสึต้องเลือกเองค่ะ"
1001505-32 = "ขนหน้าอกหรือวิ่งเปลือย"
1001505-33 = "หนวดหรือโป๊งเหน่ง"
1001505-34 = "[s11] \"...ดูน่าจะเป็นเกมที่อันตราย\"\n[s12] \"จะไม่เป็นไรใช่มั้ยนะ...\""
1001505-38 = "(อาริสึค้นหาเว็บไซต์การวางกลยุทธอยู่พักหนึ่งแล้วก็ยิ่งกลุ้มใจ)"
1001505-42 = "อาริสึว่าเจอทางออกแล้วค่ะ!"
1001505-43 = "ฉันจะกลับไปที่โรงเรียนและลองทำดูนะคะ"
1001505-45 = "(พูดเสร็จอาริสึก็กลับไปที่โรงเรียนด้วยใบหน้าที่เต็มไปด้วยความสุข)"

[translation]
10010085-1 = "ตอนที่ 8;เข้าขากันดี 2"
10010085-7 = "ถึงแล้วค่ะ! นี่คงเป็นอาคารย่อยเขตปกครองตนเองของชมรมอัศวินบรรเทาทุกข์สินะคะ"
10010085-8 = "เอ๋...?"
10010085-9 = "คุณครูคะ จะว่าไปแล้ว... ที่ที่เรามาไม่ใช่อาคารหลักของชมรมอัศวินบรรเทาทุกข์นี่คะ?"
10010085-10 = "ทำไมถึงไม่ไปอาคารส่วนกลางล่ะ... มีเหตุผลอื่นที่มาที่นี่หรือเปล่าคะ?"
10010085-14 = "คะ...? มีคนรู้จักที่นี่เหรอคะ?"
10010085-15 = "คนที่คุยง่าย แค่มองตาก็รู้ใจ... งั้นเหรอ? ใครเหรอคะ?"
10010085-16 = "[s1] \"เดี๋ยวก็ได้เจอแล้ว\"\n[s2] \"เดี๋ยวก็ออกมาแล้วล่ะ\""
10010085-17 = "คะ...? หมายความว่าไง..."
10010085-18 = "คะ...? หมายความว่าไง..."
10010085-19 = "มาแล้วเหรอคะคุณครู ฉันกำลังรออยู่เลยค่ะ"
10010085-20 = "เอ๋...?"
10010085-24 = "ฮิฮิ... นานแค่ไหนแล้วคะเนี่ยที่คุณครูไม่ได้มาหาฉันก่อน ดีใจที่ได้เจอนะคะ"
10010085-25 = "อ้อ สวัสดีค่ะ คุณฮินาตะใช่ไหมคะ? ยินดีที่ได้รู้จักค่ะ"
10010085-26 = "คะ...? อ่า... สะ... สวัสดีค่ะ..."
10010085-27 = "ว่าแต่... ทำไมถึงรู้ชื่อของฉันล่ะคะ...?"
10010085-28 = "คุณครูคะ...? คนที่บอกว่ารู้จัก... คือคนนี้เหรอคะ? จากชมรมอัศวินบรรเทาทุกข์สินะ..."
10010085-29 = "อ่า... สติฉันเตลิดไปไหนก็ไม่รู้ค่ะ"
10010085-30 = "ขอโทษนะคะ ฉันควรต้องบอกเหตุผลที่จู่ๆ ก็เข้ามาพบแบบนี้..."
10010085-31 = "ไม่เป็นไรค่ะ ฉันเองก็กำลังรอให้มาอยู่พอดีเลยละค่ะ"
10010085-32 = "...? คะ...?"
10010085-34 = "ไม่ค่อยมีเวลากันมากใช่ไหมคะ? งั้นฉันจะรีบนำทางให้ค่ะ เข้ามาสิคะ~"
10010085-40 = "คุณครูคะ...?"
10010085-41 = "ติดต่อไว้ล่วงหน้าก่อนเข้ามาเหรอคะ? นึกไม่ถึงเลยว่าจะเตรียมตัวขนาดนี้..."
10010085-42 = "[s3] \"อื้ม แค่คิดว่าเตรียมไว้ก่อนน่าจะดีน่ะ\"\n[s4] \"เรื่องนิดหน่อยน่ะ ไม่ต้องใส่ใจหรอก\""
10010085-43 = "หมายถึงอะไรคะ... ตะ... เตรียมไว้ก่อนงั้นเหรอ?"
10010085-44 = "อ่า... ก็ได้ค่ะ..."
10010085-45 = "เป็นยังไงบ้างเหรอคะ..."
10010085-52 = "ยาศักดิ์สิทธิ์... มีอยู่ในลิสต์ยาที่อยู่ในความครอบครองของชมรมอัศวินบรรเทาทุกข์จริงด้วยค่ะ"
10010085-53 = "นี่เป็นยาที่ใช้ในอดีต ก็เลยไม่สามารถหามาได้ทันที สงสัยจะต้องไปค้นจากคลังยาแล้วละค่ะ"
10010085-54 = "แต่ถึงจะเป็นยาตัวเก่า ถ้าจะไปเอามาใช้ก็ต้องมีการอนุมัติต่างหากค่ะ..."
10010085-55 = "แต่ครั้งนี้เรามีเวลาไม่มากพอ คุณครูเอาไปก่อนได้เลยค่ะ แล้วฉันจะเขียนในบันทึกให้เองนะคะ"
10010085-60 = "ส่วนจำนวนก็... สัก 2 ขวดก็น่าจะเหลือเฟือใช่ไหมคะคุณฮินาตะ?"
10010085-61 = "อ๊ะ... ใช่ค่ะ..."
10010085-62 = "นี่ คุณครูคะ...? คือว่า... ฉันยังไม่เข้าใจว่า..."
10010085-63 = "ทำไมคุณคนนี้ถึง... รู้รายละเอียดดีแบบนี้..."
10010085-64 = "[s5] \"พอสนิทกันแล้วก็คุยง่ายน่ะ\"\n[s6] \"เซรินะเป็นนักเรียนที่เตรียมพร้อมมากน่ะ\""
10010085-65 = "ยะ... อย่างนั้นเหรอคะ เยี่ยมไปเลยนะคะ..."
10010085-66 = "ยะ... อย่างนั้นเหรอคะ เยี่ยมไปเลยนะคะ..."
10010085-74 = "อืม... ถ้าฉันเดาไม่ผิด ต้องเป็นหนึ่งในขวดที่เรียงแถวกันอยู่บนผนังทางนั้น..."
10010085-80 = "เอ๊ะ..."
10010085-81 = "รอสักครู่ก่อนนะคะ ทางสำนักงานควบคุมติดต่อมา..."
10010085-85 = "ค่ะ... ค่ะ ได้ค่ะ... ตอนนี้เลยเหรอคะ?"
10010085-86 = "อืม... มะ... ไม่ค่ะ ได้อยู่แล้วค่ะ ค่ะ... ค่าา..."
10010085-90 = "อืม... คือว่า..."
10010085-91 = "คุณครูคะ... ขอโทษนะคะ พอดี..."
10010085-92 = "[s7] \"ไม่เป็นไรหรอก เรื่องงานต้องมาก่อนสิ\"\n[s8] \"รีบไปรีบมาเถอะ ไม่ต้องห่วงทางนี้\""
10010085-93 = "ถะ... ถ้างั้น... ค่ะ... ขอบคุณค่ะ!"
10010085-94 = "ถะ... ถ้างั้น... ค่ะ... ขอบคุณค่ะ!"
10010085-95 = "ขอโทษนะคะ ใจจริงฉันก็อยากช่วยหา แต่ผู้ป่วยเยอะจนโดนเรียกตัวน่ะค่ะ..."
10010085-96 = "ผู้ป่วยเหรอคะ? เกิดเรื่องอะไรขึ้นหรือเปล่าคะ?"
10010085-97 = "ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ แค่สัปดาห์นี้เป็นสัปดาห์ลาดตระเวนของชมรมทวงความยุติธรรม"
10010085-98 = "กองกำลังชมรมทวงความยุติธรรมต้องออกตรวจตั้งแต่ในโรงเรียนไปถึงเขตปกครองตนเองนอกเมือง..."
10010085-99 = "และระหว่างนั้นก็เจอทั้งพวกอันธพาลและแก๊งหมวกกันน็อก..."
10010085-100 = "อ่า... เป็นแบบนี้นี่เองสินะคะ เข้าใจแล้วละค่ะ"
10010085-101 = "แบบนี้คงยุ่งมากเลยนะคะ คนคงไม่พอแน่เลย..."
10010085-102 = "แหะๆๆ ค่ะ ตอนนี้ยุ่งมากเลย ที่นี่เป็นอาคารย่อย คนก็เลยถูกส่งมาไม่เยอะมากค่ะ"
10010085-103 = "ที่จริงแล้วที่อาคารพยาบาลนี้... ตอนนี้ฉันดูแลผู้ป่วยอยู่คนเดียวน่ะค่ะ"
10010085-104 = "คะ??! ทำคนเดียวเหรอคะ?! พยาบาลคนเดียวกับผู้ป่วยทั้งอาคารเนี่ยนะคะ...?"
10010085-105 = "ใช่ค่ะ มีบางครั้งที่ฉันก็กังวลว่าดูแลผู้ป่วยได้ไม่ทั่วถึงเท่าที่ควร..."
10010085-106 = "แต่ยังไงก็ต้องทำให้เต็มที่เท่าที่ฉันทำได้ค่ะ ก็นี่มันเป็นงานของฉันนี่คะ"
10010085-108 = "......"
10010085-109 = "แต่ในเมื่อสถานการณ์เป็นแบบนี้... ฉันต้องขอโทษด้วยนะคะคุณครู ฉันขอตัวก่อนค่ะ"
10010085-110 = "แล้วจะรีบกลับมานะคะ"
10010085-119 = "......"
10010085-120 = "คุณครูคะ..."
10010085-121 = "คือว่า... คือ..."
10010085-122 = "[s9] \"ครูรู้ ฮินาตะอยากช่วยใช่ไหมล่ะ?\"\n[s10] \"ไปเถอะ ครูจะหายาอยู่ทางนี้เอง\""
10010085-123 = "งือ คุณครู...!"
10010085-124 = "งือ คุณครู...!"
10010085-125 = "ขอบคุณนะคะ แล้วฉันจะรีบกลับมาค่ะ!"
10010085-132 = "โอ๊ะ คุณฮินาตะ!"
10010085-136 = "ขอบคุณนะคะที่ช่วย คุณฮินาตะเองก็กำลังยุ่งอยู่แท้ๆ เลย..."
10010085-137 = "จะว่าไป... ฉันยังไม่ได้อธิบายสถานการณ์ให้ฟังเลย แต่ทำไมถึงรู้ได้ล่ะคะ..."
10010085-139 = "(......)"
10010085-140 = "[ns] เริ่มหาขวดยา"
10010085-144 = "(คุณครูหายาศักดิ์สิทธิ์เจอแล้ว และรอนักเรียนทั้งสองกลับมา)"
10010085-151 = "(หลังเสร็จงานทั้งสองคนก็กลับมาด้วยสีหน้าที่สดใส)"

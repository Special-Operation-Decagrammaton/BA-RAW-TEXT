[translation]
10010085-1 = "第8話;有點相似的人們（２）"
10010085-7 = "就，就是那裡吧。救護騎士團的……！"
10010085-8 = "……咦？"
10010085-9 = "話說老師，雖然現在說可能有點晚了……#n為何不去救護騎士團的本館，而是來這棟別館呢……？"
10010085-10 = "有什麼理由嗎？"
10010085-14 = "……啊，有認識的人在這裡？"
10010085-15 = "是位很好溝通的人……？"
10010085-16 = "[s1]「我想應該快出現了。」\n[s2]「該說心思細膩嗎……嗯，大概就是那種感覺。」"
10010085-17 = "您指的是……？"
10010085-18 = "您指的是……？"
10010085-19 = "好久不見了，老師。我正在等你呢。"
10010085-20 = "咦，聲音是從哪裡傳來的……？"
10010085-24 = "呵呵。不管是像這樣見面還是老師主動來找我，感覺都久違了呢。總覺得很開心。"
10010085-25 = "啊，你好，日向同學。很高興見到你。"
10010085-26 = "你，你好！彼此彼此……！"
10010085-27 = "……咦？為什麼會知道我的名字……？"
10010085-28 = "這位就是老師剛剛所說，救護騎士團的人對吧？#n我應該沒有見過才對……"
10010085-29 = "……啊，沒什麼，我失禮了。"
10010085-30 = "得先說明來意才行呢。姑且還是介紹一下自己，我叫日向。今天來是因為──"
10010085-31 = "嗯，我知道你們的來意，也覺得你們應該差不多要過來了。"
10010085-32 = "……咦？"
10010085-34 = "你們趕時間對吧，請跟我來。"
10010085-40 = "那個，老師……？"
10010085-41 = "您有事先連絡過了是嗎……？"
10010085-42 = "[s3]「……先那麼理解比較好辦事。」\n[s4]「要說明會需要很多時間，之後再說吧。」"
10010085-43 = "先，先那麼理解……？"
10010085-44 = "呃……"
10010085-45 = "……？"
10010085-52 = "你們要找「精聖藥」對吧，那確實是救護騎士團保有的東西。"
10010085-53 = "不過現在幾乎沒有在使用，所以得從倉庫拿出來才行。"
10010085-54 = "平時其實是需要進行各種手續和核准的……"
10010085-55 = "不過這次時間緊迫，就偷偷拿出來吧。報告書我會想辦法處理的。"
10010085-60 = "那個……啊，兩瓶應該夠吧？日向同學？"
10010085-61 = "嗯，嗯……！"
10010085-62 = "那個，老師……？"
10010085-63 = "您連需要多少都已經說了嗎……？"
10010085-64 = "[s5]「並沒有，不過我想你很快就會習慣了。」\n[s6]「因為他是個總是準備萬全又貼心的孩子。」"
10010085-65 = "原，原來如此……真是了不起……"
10010085-66 = "原，原來如此……真是了不起……"
10010085-74 = "記得是在那邊的牆上……"
10010085-80 = "……嗯？"
10010085-81 = "不好意思，似乎傳來了聯絡……"
10010085-85 = "……是，是。啊，現在立刻嗎？"
10010085-86 = "呃……不，我想應該沒問題。好的，我知道了。"
10010085-90 = "那個，其實……"
10010085-91 = "老師，對不起……"
10010085-92 = "[s7]「沒關係，快去吧。」\n[s8]「謝謝你，幫大忙了。」"
10010085-93 = "好的，非常感謝。"
10010085-94 = "好的，非常感謝。"
10010085-95 = "日向同學，不好意思，我也很想幫到最後，但突然有患者被送進來……"
10010085-96 = "發，發生了什麼事嗎……？"
10010085-97 = "啊，不是什麼大事。#n這個星期有實現正義部的定期巡迴。"
10010085-98 = "會像平時一樣，連同郊外一起四處巡邏……"
10010085-99 = "在過程中，好像發生了不少事情。"
10010085-100 = "原，原來如此……"
10010085-101 = "真是辛苦呢，人手似乎也不太足夠……"
10010085-102 = "是的……畢竟這裡是別館，連救護騎士團的成員都很少過來。"
10010085-103 = "特別是現在這個時段，能處理患者的只有我一個人……"
10010085-104 = "咦！？也就是說要獨自照顧這棟別館裡的所有病人……！？"
10010085-105 = "是的，所以有時會無法為每位病人提供最完善的照護……"
10010085-106 = "但這也是不得已的。#n我還是會盡自己的全力，就算我一個人能做到的事情有限也一樣。"
10010085-108 = "……！"
10010085-109 = "事情就是這樣，不好意思。我先離開一會。"
10010085-110 = "我會盡快回來的。"
10010085-119 = "……"
10010085-120 = "那，那個……"
10010085-121 = "老師，我……我知道現在沒有時間了。不過，即便如此我也……！"
10010085-122 = "[s9]「想去幫忙嗎？」\n[s10]「沒關係，我會負責找到藥的。」"
10010085-123 = "……！"
10010085-124 = "……！"
10010085-125 = "謝，謝謝您！那麼我出發了！"
10010085-132 = "啊，日向同學。"
10010085-136 = "你也來幫忙了啊，非常感謝。百忙之中真是不好意思……"
10010085-137 = "那個，我什麼都還沒說……沒什麼，我確實是來幫忙的沒錯……"
10010085-139 = "（……）"
10010085-140 = "[ns] 看著兩人離開後，開始尋找精聖藥"
10010085-144 = "（在順利找到藥之後，兩人正好也回來了）"
10010085-151 = "（無法放任有困難的人不管的兩人，都帶著比剛才更快樂的表情）"

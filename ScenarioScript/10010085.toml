[translation]
10010085-1 = "Episode 8;Somewhat Similar Part 2"
10010085-7 = "I know this place! This annex building is under the Remedial Knights' control."
10010085-8 = "Wait a second."
10010085-9 = "We could have gone to the Knights' main building on campus as well."
10010085-10 = "Sensei, is there a reason you led us here instead?"
10010085-14 = "Oh, so you know someone who works here."
10010085-15 = "I suppose she must be the person to talk to. I wonder who it is..."
10010085-16 = "[s1] \"You'll meet her soon.\"\n[s2] \"She should be here any second now.\""
10010085-17 = "What do you mean?"
10010085-18 = "What do you mean?"
10010085-19 = "There you are, Sensei. I've been waiting for you."
10010085-20 = "Huh?"
10010085-24 = "Good to see you again. It's not very often you come to see me first."
10010085-25 = "You must be Hinata. It's nice to meet you."
10010085-26 = "Oh? Um, yes... Hello."
10010085-27 = "But...how did you know my name?"
10010085-28 = "Is this the person you were talking about, Sensei. She must be one of the Remedial Knights."
10010085-29 = "Wait. Where are my manners?"
10010085-30 = "I'm sorry. I should have explained why we're here first."
10010085-31 = "Oh, that's okay. Like I said, I've been expecting you."
10010085-32 = "You...have?"
10010085-34 = "I know you two don't have much time to spare, so follow me."
10010085-40 = "Um, Sensei?"
10010085-41 = "Did you message her in advance or something? I didn't even notice..."
10010085-42 = "[s3] \"Uh... Yeah, let's go with that for now.\"\n[s4] \"Don't think about it too hard.\""
10010085-43 = "Wh-What's that supposed to mean?"
10010085-44 = "Um... If you say so."
10010085-45 = "I'm still a little lost..."
10010085-52 = "You're looking for holy tonic, correct? It's a drug that has long ties with the Remedial Knights."
10010085-53 = "It was used more commonly in the olden days. We normally don't keep any on hand, so it would have to be retrieved from medical storage."
10010085-54 = "In fact, such old medicines have regulations and approval processes they need to go through to be withdrawn."
10010085-55 = "You two don't have time for that, though, so I'll get you what you need.#nYou can leave the paperwork to me and be on your way."
10010085-60 = "Will two bottles be enough, Hinata?"
10010085-61 = "O-Oh... Um, yes that should be plenty."
10010085-62 = "I still don't get it, Sensei."
10010085-63 = "How is she doing this?"
10010085-64 = "[s5] \"You get used to it.\"\n[s6] \"Serina is prepared for anything.\""
10010085-65 = "That's amazing..."
10010085-66 = "That's amazing..."
10010085-74 = "Hmm. It should be somewhere on this wall."
10010085-80 = "Oh."
10010085-81 = "The management office is calling me. Excuse me one moment..."
10010085-85 = "Yes, this is is Serina... Uh-huh... Right now?"
10010085-86 = "N-No, of course I can... Okay. Got it."
10010085-90 = "So, here's the thing."
10010085-91 = "Sorry, Sensei. They need me to go—"
10010085-92 = "[s7] \"It's fine. Work comes first.\"\n[s8] \"Don't worry about us. You should go.\""
10010085-93 = "O-Okay. Thanks."
10010085-94 = "O-Okay. Thanks."
10010085-95 = "Sorry about this. I would keep looking with you, but apparently there's been a rush of patients all of a sudden."
10010085-96 = "There has? Did something bad happen?"
10010085-97 = "Nothing major. It's just, the Justice Task Force is doing demonstrations this week."
10010085-98 = "They go on tours around the Trinity district and to the outskirts."
10010085-99 = "Which means they sometimes encounter thugs and Helmet Gangsters..."
10010085-100 = "Oh, now I get it..."
10010085-101 = "Having to treat them must keep you all very busy."
10010085-102 = "Haha. Yeah, it's not uncommon for us to be short handed. This is just an annex, so it doesn't get as many patients as other locations..."
10010085-103 = "...but I'm still the only one here who can take care of the patients in the ward."
10010085-104 = "Wh-What? You have to take care of all of them by yourself?"
10010085-105 = "That's right. I'm sometimes concerned that I don't have enough time to give them each the care that they deserve."
10010085-106 = "Though I still do the best that I can for them. That's my job, after all."
10010085-108 = "..."
10010085-109 = "Anyway, that's the situation... Sorry, Sensei, but I'll be gone for a bit."
10010085-110 = "I'll try to come back as soon as possible. See you, then."
10010085-119 = "..."
10010085-120 = "Sensei..."
10010085-121 = "U-Um..."
10010085-122 = "[s9] \"I know. You want to help her, right?\"\n[s10] \"You go. I'll find what we need.\""
10010085-123 = "...!"
10010085-124 = "...!"
10010085-125 = "Th-Thanks, Sensei. I'll be back soon!"
10010085-132 = "Oh, Hinata."
10010085-136 = "You wanted to help? Thanks for offering. I know how busy you are today."
10010085-137 = "Speaking of which, that's been on my mind this entire time. How did you know? Anyway, yeah... I couldn't just let you do all this by yourself."
10010085-139 = "..."
10010085-140 = "[ns] Look for the holy tonic."
10010085-144 = "It didn't take me long to find the holy tonic, so I quietly waited for Serina and Hinata to finish what they were doing."
10010085-151 = "After helping the patients in need, they both seemed to be somewhat happy and in better spirits."

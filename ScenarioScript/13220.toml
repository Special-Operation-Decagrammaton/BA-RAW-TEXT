[translation]
13220-1 = "Episode 22;Runaway Train"
13220-5 = "Welp. I got some bad news. Kaiser PMC's train is seconds away from catching up."
13220-6 = "Huh?!"
13220-7 = "Yuppies. We tried to lose them. It was no use."
13220-8 = "[s] \"What are our options?\""
13220-9 = "...None! You all hop off the train and get to the valley-thing. We'll hold them here."
13220-10 = "Wowie! Time to unleash secret technique! Train Drift!"
13220-12 = "Huh? B-But..."
13220-14 = "Restricted District Sector 35-9 is, like, an hour's walk from here. It'll be a breeze.#nUs? Nah, don't sweat it."
13220-15 = "No sweat. We'll stall them. Then, boom, surrender!"
13220-17 = "...Understood. "
13220-18 = "Thank you, CCC... "
13220-20 = "Pahyahyahya! Are we on the side of justice this time? It feels all wrong!"
13220-21 = "No... Heroes. We're heroes!"
13220-23 = "...So, if I got this right, we're jumping out as soon as the train stops...? "
13220-24 = "Yeah. Stay close to me, Sensei. I'll protect you."
13220-25 = "[s] \"Okay. Thanks, Shiroko. I'll owe you.\""
13220-31 = "There we go! Crash incoming! Get ready!"
13220-32 = "Ready!! "
13220-38 = "*CRASH* "

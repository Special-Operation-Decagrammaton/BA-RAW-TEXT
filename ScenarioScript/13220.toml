[translation]
13220-1 = "ตอนที่ 22;หัวรถจักรที่วิ่งเร็ว"
13220-5 = "อ่า มีข่าวไม่ค่อยดีแล้วละ พวกไคเซอร์ PMC ใกล้จะตามเราทันแล้ว"
13220-6 = "คะ...?!"
13220-7 = "อื้ม ฉันก็พยายามทิ้งช่วงห่างอยู่ แต่ไม่ไหวเลย"
13220-8 = "[s] \"ถ้างั้นเราต้องทำยังไงล่ะ?\""
13220-9 = "จะทำอะไรได้... พวกเราจะขวางพวกนั้นไว้ให้เอง ส่วนพวกเธอก็ลงจากรถไฟแล้วไปยังจุดหมายต่อ"
13220-10 = "โอ้ว หรือนี่คืออาวุธลับที่ซ่อนไว้?"
13220-12 = "คะ? ตะ... แต่ว่า..."
13220-14 = "ถ้าจะเดินเท้าไป <พื้นที่ปิด เขต 35-9> ก็น่าจะใช้เวลาประมาณ 1 ชั่วโมง คงไม่เกินกำลังพวกเธอหรอก แล้วก็ไม่ต้องห่วงพวกฉันหรอกนะ"
13220-15 = "อื้อ พวกฉันจะยื้อเวลาไว้ให้ พวกนั้นต้องยอมจำนนแน่"
13220-17 = "ค่ะ รับทราบค่ะ..."
13220-18 = "ขอบคุณที่ช่วยพวกเรานะคะ CCC ทุกคน..."
13220-20 = "วะฮะฮะฮะฮ่า! พูดเหมือนพวกฉันเป็นฝ่ายยุติธรรมเลย พวกฉันไม่ใช่คนแบบนั้นหรอก"
13220-21 = "ไม่หรอก เป็นฮีโร่ถูกแล้วละ"
13220-23 = "สรุปว่าถ้ารถไฟหยุด... ก็ให้พวกเราออกไปได้เลยใช่มั้ย?"
13220-24 = "อื้ม ฉันจะปกป้องคุณครูเอง อยู่ติดกับฉันไว้ล่ะ"
13220-25 = "[s] \"เข้าใจแล้ว งั้นก็รบกวนด้วยนะ ชิโรโกะ\""
13220-31 = "เอาละ จะปะทะกันแล้วนะ! เตรียมตัวให้ดี!!"
13220-32 = "เตรียมตัววว!"
13220-38 = "โครมมม!"

[translation]
13220-1 = "第22話;暴走列車"
13220-5 = "有個壞消息，馬上就要被凱薩PMC的火車追上了。"
13220-6 = "咦……！？"
13220-7 = "嗯～雖然想甩開～但沒辦法～"
13220-8 = "[s]「該怎麼辦才好？」"
13220-9 = "……沒辦法了。#n我們來阻止那些傢伙，你們找機會下火車前往目的地吧。"
13220-10 = "唔哦～封印的秘技～列車甩尾～"
13220-12 = "咦？可，可是……"
13220-14 = "「封鎖區35-9」距離這裡大約還剩1個小時的路程，並沒有遠到到不了的程度。#n還有，別擔心我們。"
13220-15 = "嗯～拖延時間之後～就會投降～"
13220-17 = "……是，我知道了。"
13220-18 = "感謝你們的幫忙，CCC的各位……"
13220-20 = "噗哈哈哈哈！#n感覺像是正義的夥伴耶？我們明明不是那種人啊？"
13220-21 = "不～是英雄～沒錯～"
13220-23 = "……所以簡單來說，火車一停下來我們就出去對吧？"
13220-24 = "嗯，我會保護老師。要緊緊貼著我哦。"
13220-25 = "[s]「我知道了。那就麻煩你囉，白子。」"
13220-31 = "好，馬上就要衝撞了！做好準備！！"
13220-32 = "預備～"
13220-38 = "哐噹──"

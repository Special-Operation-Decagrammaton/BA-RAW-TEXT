[translation]
1601002-1 = "巨匠的祕密嗜好"
1601002-2 = "芝町．外圍布料市場"
1601002-4 = "（在夏萊附近的市場偶然遇見了響）"
1601002-8 = "……啊，老師。"
1601002-9 = "沒想到竟然會在這麼偏僻的地方遇見老師，而且還是休假日。"
1601002-10 = "你是來買什麼布料嗎？"
1601002-11 = "……你說夏萊辦公室的窗簾壞了，想買新的替換嗎？"
1601002-12 = "……嗯，這樣啊。D.U附近確實沒幾個地方能找到窗簾用的大型布料。"
1601002-13 = "如果需要有偽裝功能的話，我可以推薦你幾間不錯的店家……"
1601002-14 = "[s]「一般的布料就行了。」"
1601002-16 = "[ns]「響來這裡買什麼呢？」"
1601002-17 = "……我嗎？"
1601002-18 = "我是來買製作新衣服的布料。"
1601002-19 = "顏色和材質的話，雖然網路上就查得到資訊……"
1601002-20 = "但畢竟是要穿在身上的東西，所以確認觸感還是很重要。"
1601002-21 = "[s1]「巨匠連衣服都自己做嗎？」\n[s2]「真厲害呢，響。」"
1601002-24 = "不是平時穿的衣服……"
1601002-25 = "我是要做Cosplay用的服裝。"
1601002-26 = "[s]「Cosplay……？」"
1601002-27 = "嗯。老師你也喜歡Cosplay嗎？"
1601002-28 = "[s3]「我對Cosplay也算是小有研究喔！」\n[s4]「我不太清楚那是什麼……」"
1601002-29 = "……那真是太好了。這樣我就不用從頭開始說明了。"
1601002-30 = "所謂的Cosplay，就是穿著和角色一樣的服裝，進行角色扮演遊戲。"
1601002-31 = "比如動畫、漫畫……或是遊戲內角色的穿著。因為大多數都沒有成品，所以不少玩家都會親自製作服裝。"
1601002-32 = "其實我最初只是想給步行用人體模型穿衣服，於是便一邊看教學影片一邊製作……"
1601002-33 = "結果反覆製作幾次後，就從此深陷其中了。"
1601002-34 = "[s]「製作衣服很開心嗎？」"
1601002-35 = "……唔嗯，準確來說，我覺得能扮演某個人很開心。"
1601002-36 = "所謂的Cosplay並不單只是穿上角色的服裝，還必須依照角色的想法來行動。"
1601002-37 = "如果平常只是過著普通的生活，就沒什麼機會以角色的立場來考慮事情。"
1601002-38 = "但Cosplay就會需要考慮各種可能性並反覆進行實驗，#n這點和我們工程師平時的工作不謀而合。"
1601002-39 = "況且……也能藉此稍微體驗一下自己感興趣的職業……"
1601002-40 = "[s5]「就像大運動會的時候嗎？」\n[s6]「……啦啦隊之類的嗎？」"
1601002-45 = "……老師，別取笑我了。"
1601002-46 = "當時是因為時間不足的關係，才無法充分揣摩啦啦隊的心境。"
1601002-47 = "再加上那件衣服是我剛開始接觸Cosplay時做的，有點不好意思被其他人盯著看……"
1601002-48 = "如果下次還有機會扮演啦啦隊的話，我相信我一定會做得更好。"
1601002-49 = "[s7]「你說這話的意思……」\n[s8]「你以後還會穿那套啦啦隊服嗎？」"
1601002-50 = "雖然是沒有特別去規劃……"
1601002-51 = "雖然是沒有特別去規劃……"
1601002-52 = "但哪天要是有人需要加油打氣的話……應該會穿上吧？"
1601002-53 = "雖然服裝對Cosplay很重要，但與角色相符的情境也是一樣的。"
1601002-54 = "[s]「這樣啊……所以你今天打算製作怎樣的服裝？」"
1601002-55 = "……問得好，老師。"
1601002-56 = "我今天打算製作在人氣動畫《異世界軍需工廠》中登場的女主人公的服裝……"
1601002-64 = "這個角色是從現代穿越到中世紀風格異世界的科學家，#n所以最大的特徵是穿著實驗用的白袍。"
1601002-65 = "但因為異世界尚未研發出化學纖維，所以不太可能使用聚酯纖維混紡的素材。"
1601002-66 = "如果是中世紀紡織技術能夠生產出的纖維，最有可能的是用亞麻製成的亞麻布……"
1601002-67 = "但是與作品的主視覺圖比起來，這裡販售的布料質感太過粗糙。"
1601002-68 = "……老師覺得呢？該用什麼材質的布料才能更貼近這名角色？"
1601002-72 = "[ns]「……選擇顏色接近的就行了吧？」"
1601002-73 = "這怎麼行，老師。嚴謹的背景考證是降低Cosplay違和感的重要前提唷。"
1601002-74 = "而且身為千年的巨匠，怎麼可能因此妥協。"
1601002-75 = "[s]「不愧是響呢。」"
1601002-76 = "唔嗯……我記得那邊好像有間販售天然纖維的專賣店。"
1601002-77 = "他們那邊也有很多遮光性不錯的冷色調布料，拿來當窗簾正好。"
1601002-81 = "……不如就一起去吧？"
1601002-83 = "（之後，和響一邊挑選著布料，一邊度過了美好的時光）"

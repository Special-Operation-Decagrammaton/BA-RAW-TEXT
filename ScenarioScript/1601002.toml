[translation]
1601002-1 = "A Meister's Hidden Habits"
1601002-2 = "Fabric Market, Shiba Town Outskirts"
1601002-4 = "I ran into Hibiki at a market near Schale."
1601002-8 = "...Hi, Sensei."
1601002-9 = "It's surprising to see you in a place like this on your day off."
1601002-10 = "What brings you to a fabric store?"
1601002-11 = "...You need to replace the curtains at Schale?"
1601002-12 = "It's true, D.U. isn't the place to shop for that."
1601002-13 = "If you need camouflage-ready fabric, I can recommend a place..."
1601002-14 = "[s] \"They're curtains, Hibiki, I just need normal fabric.\""
1601002-16 = "[ns] \"And what about you? What brings you here?\""
1601002-17 = "...Me?"
1601002-18 = "I'm shopping for fabric to make new clothes."
1601002-19 = "It's more convenient to order online, but..."
1601002-20 = "Clothes are something that end up on your skin, so checking the feel in person is important."
1601002-21 = "[s1] \"You make your own clothes?\"\n[s2] \"That's really impressive, Hibiki.\""
1601002-24 = "Oh, well, it's not like I make my everyday outfits..."
1601002-25 = "It's for cosplay."
1601002-26 = "[s] \"Cosplay...?\""
1601002-27 = "Yeah. Do you like cosplay?"
1601002-28 = "[s3] \"I am a known cosplay appreciator.\"\n[s4] \"I'm not that familiar with it...\""
1601002-29 = "That's good. I don't have to explain much, then."
1601002-30 = "Cosplay is where you dress up as and mimic a fictional character."
1601002-31 = "Since fictional outfits can get a bit...unique, the designs are often unavailable as ready-made clothes, so cosplayers recreate the outfits themselves."
1601002-32 = "At first, I just watched some videos to learn how to make clothes for walking dummies..."
1601002-33 = "But then I got really into it."
1601002-34 = "[s] \"You like making clothes?\""
1601002-35 = "Making clothes is fine... But what I really enjoy is the experience of being a different person."
1601002-36 = "Cosplay isn't just about dressing up. You really have to recreate the essence of the character you're playing."
1601002-37 = "You can't just act like an ordinary person while wearing a fancy outfit, you have to come across as an adventurer who has traveled across worlds, or as a wizard with knowledge of arcane magic."
1601002-38 = "Cosplay is also helpful for engineers because it makes you better at approaching things from different perspectives."
1601002-39 = "Plus...you can dabble in a different sort of life... You know, just for a little while..."
1601002-40 = "[s5] \"Like at field day?\"\n[s6] \"...When you were a cheerleader?\""
1601002-45 = "D-Don't make fun of me, Sensei."
1601002-46 = "I just didn't have enough time to fully inhabit the mind of a cheerleader back then."
1601002-47 = "And that cheerleader costume was my first attempt at cosplay, so I was just a bit self-conscious..."
1601002-48 = "My next cheerleader cosplay will be better, just you wait."
1601002-49 = "[s7] \"So that means...\"\n[s8] \"You have another cheerleader outing planned?\""
1601002-50 = "Well...no promises, but..."
1601002-51 = "Well...no promises, but..."
1601002-52 = "I mean, if I need to cheer someone on, why not wear the costume too?"
1601002-53 = "Like I said, cosplay is more than just the clothing. The right situation can help you immerse yourself in the character more than any arrangement of fabric."
1601002-54 = "[s] \"So, what kind of cosplay are you planning now?\""
1601002-55 = "...Excellent question, Sensei."
1601002-56 = "I'm going to make a costume for the heroine of the popular show, The Peaceful Life of the Strongest Munitions Factory Overseer in Another World."
1601002-64 = "This character worked as a scientist in the modern world, so she wears a white lab coat even in the medieval setting."
1601002-65 = "Of course, since polymer synthesis hasn't been developed in that world, it would be impossible to wear a polyester lab coat."
1601002-66 = "If we're talking about fabric that would fit with the medieval setting, it's likely to be linen..."
1601002-67 = "But based on key illustrations, the fabric seems too rough and light."
1601002-68 = "What do you think, Sensei? What kind of fabric would best express the look of this character?"
1601002-72 = "[ns] \"...Just pick similar colors?\""
1601002-73 = "Incorrect. Accurate historical research is an important element of immersion."
1601002-74 = "As a Millennium meister, I don't compromise when creating anything."
1601002-75 = "[s] \"What a Hibiki-like response.\""
1601002-76 = "Hmm... I think there's a store over there that specializes in natural fabrics."
1601002-77 = "Oh, and they should have fabrics in calm colors that block light well, so you can buy some material for new curtains."
1601002-81 = "Shall we shop together?"
1601002-83 = "Hibiki and I had a good time choosing fabrics. She did most of the choosing."

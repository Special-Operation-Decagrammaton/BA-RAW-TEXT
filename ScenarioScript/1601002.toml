[translation]
1601002-1 = "#title;마이스터의 은밀한 취미"
1601002-2 = "#place;시바타운 외곽 원단 시장"
1601002-3 = "#wait;2500"
1601002-4 = "#na;(샬레 근처의 시장에서 우연히 히비키와 마주쳤다.)"
1601002-5 = "#st;[0,0];instant;1;"
1601002-6 = "#clearST"
1601002-7 = "4;히비키;02\n#4;em;[반응]\n#4;a\n#wait;1200"
1601002-8 = "4;히비키;01;……안녕, 선생님.\n#4;m3"
1601002-9 = "4;히비키;01;휴일에 이런 외진 곳에서 선생님을 만나게 되다니 의외네."
1601002-10 = "4;히비키;02;원단 시장에는 무슨 일로 찾아온 거야?\n#4;em;[?]"
1601002-11 = "4;히비키;01;……샬레의 사무실에 걸어 둔 커튼이 상해서 새 원단을 구입하러 왔다고?"
1601002-12 = "4;히비키;99;……하긴. 커튼으로 쓸 만큼 커다란 원단을 구할 수 있는 곳은 D.U. 근처에 몇 없으니까.\n#4;em;…"
1601002-13 = "4;히비키;03;혹시 카모플라쥬 기능이 들어간 원단이 필요하다면 다른 곳을 추천해 줄 수도 있는데……."
1601002-14 = "[s] \"평범한 원단이면 돼.\""
1601002-15 = "#wait;1500"
1601002-16 = "[ns] \"히비키는 무슨 일로 온 거야?\""
1601002-17 = "4;히비키;02;……나 말이야?\n#4;em;[?]"
1601002-18 = "4;히비키;01;나는 새 옷에 쓸 옷감을 구입하기 위해 왔어."
1601002-19 = "4;히비키;01;색이나 재질만 확인하는 거라면 인터넷으로도 구입할 수 있지만……"
1601002-20 = "4;히비키;02;몸에 닿는 것이니 촉감도 직접 확인해 보고 싶어서."
1601002-21 = "[s1] \"마이스터는 옷도 직접 만드는 거야?\"\n[s2] \"대단하네, 히비키는.\""
1601002-22 = "#wait;10"
1601002-23 = "#wait;10"
1601002-24 = "4;히비키;99;물론 평상시에 입는 기성복을 만들려는 건 아니고……."
1601002-25 = "4;히비키;02;내가 만들려는 건 코스프레용 코스튬이야."
1601002-26 = "[s] \"코스프레……?\""
1601002-27 = "4;히비키;01;응. 선생님도 코스프레, 좋아해?\n#4;em;[?]"
1601002-28 = "[s3] \"코스프레라면 잘 알고 있지.\"\n[s4] \"잘 모르겠는데…….\""
1601002-29 = "4;히비키;03;……다행이네. 설명을 덜 수 있어서."
1601002-30 = "4;히비키;02;코스프레는 가상의 캐릭터처럼 의상을 입고 행동을 흉내 내는 일종의 놀이야.\n#4;em;[반응]"
1601002-31 = "4;히비키;21;가상의 캐릭터가 입는 의상이다 보니 기성품과는 디자인이 크게 다른 경우가 많아서 플레이어가 직접 만드는 경우가 잦거든."
1601002-32 = "4;히비키;99;처음에는 보행용 더미에 입힐 옷을 만들기 위해 의류 제작 영상을 참고한 것뿐이었는데……"
1601002-33 = "4;히비키;03;몇 차례 옷을 시험 삼아 만들다 보니, 어느새 푹 빠지게 되었어.\n#4;em;[반짝]\n#4;greeting"
1601002-34 = "[s] \"옷을 만드는 게 즐거운 거야?\""
1601002-35 = "4;히비키;02;……엄밀히 말하자면 다른 사람이 되어 생각해보는 경험이 즐거운 것이려나."
1601002-36 = "4;히비키;01;코스프레를 하기 위해서는 옷을 입는 데 그치지 않고, 연기하는 캐릭터처럼 생각하고 행동해야 하거든."
1601002-37 = "4;히비키;99;평범한 인생을 사는 사람이라면 이세계를 여행하는 모험가나, 복잡한 주문을 연구하는 마법사의 기분 같은 건 생각해 볼 일이 거의 없을 테니까."
1601002-38 = "4;히비키;01;이런 코스프레 활동은 다양한 가능성을 염두에 두고 실험을 반복하는 엔지니어식 사고에도 도움이 되거든."
1601002-39 = "4;히비키;03;게다가 평소에 관심이 있었던 직업을 가볍게 대리 체험해 볼 수도 있고…….\n#4;em;[반응]"
1601002-40 = "[s5] \"지난 대운동회 때처럼 말이지?\"\n[s6] \"……치어리더라든가?\""
1601002-41 = "#st;[0,0];instant;1;"
1601002-42 = "#st;[0,0];instant;1;"
1601002-43 = "#clearST"
1601002-44 = "4;히비키;01\n#4;em;…\n#wait;2500"
1601002-45 = "4;히비키;05;……놀리지 말아줘, 선생님."
1601002-46 = "4;히비키;06;그때는 시간이 없어서 '치어리더의 기분'을 충분히 상상해보지 못했던 것뿐이야."
1601002-47 = "4;히비키;05;게다가 그 치어리더 의상은 코스프레를 막 시작했을 때 어설프게 만든 시제품이라, 남들에게 보여주기엔 조금 부끄러워서……."
1601002-48 = "4;히비키;01;다음번에 다시 치어리더 코스프레를 한다면 분명 더 잘할 수 있을 거야."
1601002-49 = "[s7] \"그 말인즉……\"\n[s8] \"다음번에 또 치어리더 의상을 입을 계획이 있는 거야?\""
1601002-50 = "4;히비키;99;언제라고 확실히 정해둔 건 아니지만…….\n#4;em;…"
1601002-51 = "4;히비키;99;언제라고 확실히 정해둔 건 아니지만…….\n#4;em;…"
1601002-52 = "4;히비키;02;누군가를 응원해야 할 일이 생긴다면…… 다시 입을 수도 있지 않을까?"
1601002-53 = "4;히비키;01;코스프레에 중요한 건 의상보다 캐릭터에 몰입할 수 있는 적절한 상황이니까."
1601002-54 = "[s] \"그래서 오늘은 어떤 옷을 만들 예정이었어?\""
1601002-55 = "4;히비키;03;……좋은 질문이야, 선생님."
1601002-56 = "4;히비키;99;오늘은 인기 애니메이션 <이세계 군수공장>에 등장하는 히로인 캐릭터의 의상을 만들어볼까 하는데……"
1601002-57 = "#st;[0,0];instant;1;"
1601002-58 = "#clearST"
1601002-59 = "4;히비키;01\n#4;d\n#wait;1000"
1601002-60 = "#all;hide"
1601002-61 = "3;히비키;01\n#3;a\n#3;closeup\n#wait;1000"
1601002-62 = "#wait;1000"
1601002-63 = "3;히비키;01\n#3;greeting\n#3;closeup\n#wait;1500"
1601002-64 = "3;히비키;02;이 캐릭터는 현대 세계에서 과학자로 일했었기 때문에, 중세풍의 이세계 환경에서도 흰 실험 가운을 입고 다니는 게 특징이야.\n#3;em;[반응]\n#3;closeup"
1601002-65 = "3;히비키;01;물론 이세계에는 고분자 합성 기술이 개발되지 않았기 때문에 폴리에스터 혼방 소재의 실험 가운을 입지는 못했을 거야.\n#3;closeup"
1601002-66 = "3;히비키;99;중세 시대의 기술로 만들 수 있는 섬유라면 아마포로 만든 린넨 원단으로 만들었을 가능성이 높은데……\n#3;closeup"
1601002-67 = "3;히비키;02;이곳에서 취급하는 원단은 키 비주얼 일러스트에 비하면 지나치게 표면이 거칠고 가벼운 느낌이 강해.\n#3;closeup"
1601002-68 = "3;히비키;03;……어떻게 생각해, 선생님? 어떤 소재의 원단을 사용해야 이 캐릭터의 느낌을 더 잘 살릴 수 있을까? \n#3;em;[?]\n#3;closeup"
1601002-69 = "#st;[0,0];instant;1;"
1601002-70 = "#clearST"
1601002-71 = "#wait;2500"
1601002-72 = "[ns] \"……적당히 비슷한 색을 고르면 되지 않을까?\""
1601002-73 = "3;히비키;05;안 돼, 선생님. 정확한 고증이야말로 코스프레의 몰입감을 위한 중요한 요소 중 하나니까.\n#3;em;[반응]"
1601002-74 = "3;히비키;05;게다가 밀레니엄의 마이스터로서 작품을 만드는 데 적당히 타협한다는 건 있을 수 없는 일이야."
1601002-75 = "[s] \"언제나의 히비키 답네.\""
1601002-76 = "3;히비키;02;음…… 저쪽에 천연 섬유를 전문으로 취급하는 매장이 있는 것 같아.\n#3;em;…"
1601002-77 = "3;히비키;99;차광이 잘 되는 차분한 색감의 원단도 많으니, 커튼 소재를 찾기에도 좋을 거야."
1601002-78 = "#st;[0,0];instant;1;"
1601002-79 = "#clearST"
1601002-80 = "3;히비키;01\n#3;m4\n#wait;1200"
1601002-81 = "3;히비키;03;……그럼, 같이 한번 둘러볼까?\n#3;em;[?]"
1601002-82 = "#all;hide"
1601002-83 = "#na;(이후, 한동안 히비키와 원단을 고르며 즐거운 시간을 보냈다.)"

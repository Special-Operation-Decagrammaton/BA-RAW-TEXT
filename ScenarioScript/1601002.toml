[translation]
1601002-1 = "งานอดิเรกลับๆ ของไมสเตอร์"
1601002-2 = "ตลาดผ้า ชานเมืองชิบะทาวน์"
1601002-4 = "(คุณครูบังเอิญเจอฮิบิกิที่ตลาดใกล้ๆ ชาเล่ต์)"
1601002-8 = "หวัดดี คุณครู..."
1601002-9 = "แปลกจังนะ ที่เจอคุณครูในสถานที่ห่างไกลในวันหยุดแบบนี้น่ะ"
1601002-10 = "คุณครูมาที่ตลาดผ้าแบบนี้ทำไมน่ะ?"
1601002-11 = "ผ้าม่านหน้าต่างของชาเล่ต์ขาดแล้ว เลยมาซื้อใหม่เหรอ?"
1601002-12 = "ก็นะ... แหล่งซื้อผ้าขนาดใหญ่พอที่จะทำผ้าม่านได้ใน D.U. นี่ก็มีอยู่ไม่กี่ที่นี่นะ"
1601002-13 = "แต่ถ้าคุณครูต้องการผ้าม่านที่มีฟังก์ชั่นการอำพรางตัว ฉันแนะนำสถานที่ซื้อให้ได้นะ"
1601002-14 = "[s] \"แค่ผ้าธรรมดาก็พอแล้วล่ะ\""
1601002-16 = "[ns] \"แล้วฮิบิกิมาทำอะไรที่นี่เหรอ?\""
1601002-17 = "ฉันเหรอ?"
1601002-18 = "ฉันมาซื้อผ้าสำหรับตัดชุดใหม่น่ะ"
1601002-19 = "ถ้าต้องการดูแค่วัสดุกับสีละก็ ซื้อทางอินเทอร์เน็ตเอาก็ได้..."
1601002-20 = "แต่มันเป็นผ้าที่ต้องสัมผัสกับร่างกาย ฉันเลยอยากมาลองจับเนื้อผ้าเองน่ะ"
1601002-21 = "[s1] \"ไมสเตอร์ตัดชุดเองด้วยเหรอ?\"\n[s2] \"ฮิบิกินี่สุดยอดเลยนะ\""
1601002-24 = "ฉันไม่ได้ตัดชุดสำหรับใส่ทั่วไปหรอก..."
1601002-25 = "ฉันจะตัดชุดสำหรับคอสเพลย์น่ะ"
1601002-26 = "[s] \"แต่งคอสเพลย์เหรอ...?\""
1601002-27 = "อื้อ คุณครูเองก็ชอบแต่งคอสเพลย์เหรอ?"
1601002-28 = "[s3] \"เรื่องคอสเพลย์ครูรู้เยอะเลยนะ\"\n[s4] \"ครูไม่ค่อยรู้เลย...\""
1601002-29 = "ค่อยยังชั่วหน่อย จะได้ไม่ต้องอธิบายเยอะ"
1601002-30 = "คอสเพลย์เป็นการแต่งตัวและเลียนแบบการกระทำของตัวละครสมมุติน่ะ"
1601002-31 = "ชุดที่ใส่ก็จะเป็นชุดที่ตัวละครสมมุติตัวนั้นๆ ใส่ เพราะงั้นสไตล์หรือการออกแบบมันก็จะต่างไปจากชุดที่ใส่ทั่วไป คนที่แต่งคอสเพลย์เลยต้องทำชุดขึ้นมาเอง"
1601002-32 = "ตอนแรกฉันก็แค่ดูวิดีโอสำหรับทำชุดให้หุ่นยนต์ดัมมี่..."
1601002-33 = "แต่พอลองทำไปเรื่อยๆ แล้วก็กลายเป็นชอบไปน่ะ"
1601002-34 = "[s] \"ฮิบิกิชอบตัดเสื้อผ้าเหรอ?\""
1601002-35 = "อืม ถ้าพูดกันตรงๆ ละก็ ประสบการณ์ที่ได้ลองสวมบทบาทเป็นคนอื่นต่างหากที่สนุกน่ะ"
1601002-36 = "สำหรับการคอสเพลย์ ไม่ใช่แค่สวมเสื้อผ้าเหมือนตัวละครสมมุติ แต่เราต้องคิดและแสดงท่าทางให้เหมือนกับตัวละครด้วย"
1601002-37 = "ถ้าเป็นคนธรรมดาๆ ที่ใช้ชีวิตทั่วไป ก็แทบจะไม่ต้องคิดพวกเรื่องการเดินทางผจญภัยไปต่างโลก หรือการค้นคว้าเวทมนตร์ที่ซับซ้อนอะไรพวกนั้นนี่นะ"
1601002-38 = "การแต่งคอสเพลย์พวกนี้มีประโยชน์ในการคิดวิเคราะห์นะ เพราะมักจะต้องคิดถึงความเป็นไปได้ต่างๆ และทดลองทำซ้ำๆ น่ะ"
1601002-39 = "นอกจากนี้ ยังเป็นโอกาสให้ได้สัมผัสประสบการณ์เรื่องที่สนใจมาตลอดด้วย..."
1601002-40 = "[s5] \"เหมือนกับตอนงานมหกรรมกีฬาใช่มั้ย?\"\n[s6] \"อย่างพวกเชียร์ลีดเดอร์ใช่มั้ย...?\""
1601002-45 = "อย่ามาแซวฉันน่า คุณครู"
1601002-46 = "ตอนนั้นมันกระชั้นชิดมาก ฉันเลยจินตนาการถึง 'ความรู้สึกของเชียร์ลีดเดอร์' ได้ไม่เต็มที่น่ะ"
1601002-47 = "อีกอย่าง ชุดเชียร์ลีดเดอร์นั่นก็เป็นชุดตัวอย่างที่ฉันทำขึ้นตอนที่เริ่มเข้าวงการคอสเพลย์ใหม่ๆ เลยค่อนข้างอายที่จะให้คนอื่นเห็นน่ะ..."
1601002-48 = "คราวหน้าถ้าจะแต่งคอสเพลย์เป็นเชียร์ลีดเดอร์อีกละก็ ฉันคงทำได้ดีกว่านี้แน่ๆ"
1601002-49 = "[s7] \"ที่พูดนั่นหมายความว่าจะใส่อีกใช่มั้ย...?\"\n[s8] \"หมายความว่ามีแพลนจะใส่ชุดเชียร์อีกเหรอ?\""
1601002-50 = "ก็คงงั้น ถึงจะไม่รู้ว่าเมื่อไรก็เถอะ..."
1601002-51 = "ก็คงงั้น ถึงจะไม่รู้ว่าเมื่อไรก็เถอะ..."
1601002-52 = "ถ้าต้องไปให้กำลังใจใครอีกละก็... ฉันก็อาจจะใส่ชุดเชียร์อีกก็ได้นะ?"
1601002-53 = "สิ่งสำคัญในการแต่งคอสเพลย์คือสถานการณ์ที่เหมาะที่จะแสดงความเป็นตัวละครนั้นๆ มากกว่าพวกชุดซะอีก"
1601002-54 = "[s] \"แล้ววันนี้จะตัดชุดแบบไหนเหรอ?\""
1601002-55 = "ถามได้ดีเลยนะคุณครู"
1601002-56 = "วันนี้ฉันจะทำชุดของตัวละครเอกในแอนิเมชั่นที่ฮิตอยู่ตอนนี้ <โรงงานอาวุธในต่างโลก> น่ะ..."
1601002-64 = "ตัวละครตัวนี้เป็นนักวิทยาศาสตร์ในโลกปัจจุบัน ตัวละครนี้ดูโดดเด่นเพราะใส่ชุดกาวน์นักวิทยาศาสตร์ในต่างโลกที่เป็นสมัยยุคกลางน่ะ"
1601002-65 = "แน่นอนว่าในต่างโลกยังไม่มีเทคโนโลยีการสังเคราะห์สารต่างๆ เธอเลยไม่สามารถหาห้องแล็ปเพื่อทำวัสดุเส้นใยผสมโพลิเมอร์มาผลิตเสื้อกาวน์ได้"
1601002-66 = "ถ้าเป็นวัสดุเส้นใยที่พอจะหาได้ในยุคกลางละก็ คงจะเป็นพวกผ้าลินินที่ทอจากผ้าป่าน..."
1601002-67 = "ผ้าที่หาได้จากที่นี่ พอเทียบดูกับภาพโปรโมตของอนิเมะแล้ว เนื้อผ้ายังดูหยาบและดูเบาเกินไป"
1601002-68 = "คุณครูคิดว่ายังไง ฉันควรใช้เนื้อผ้าแบบไหนถึงจะสื่อความเป็นตัวละครนี้ออกมาได้ดีที่สุดกัน? "
1601002-72 = "[ns] \"เลือกสีให้ใกล้เคียงก็น่าจะพอแล้วมั้ย...?\""
1601002-73 = "ไม่ได้นะคุณครู การแสดงรายละเอียดให้ถูกต้อง ก็เป็นหนึ่งในปัจจัยสำคัญที่จะทำให้เราดื่มด่ำกับการแต่งคอสเพลย์ได้นะ"
1601002-74 = "นอกจากนี้ ในฐานะไมสเตอร์ของมิลเลเนียม ฉันจะไม่ยอมอะลุ่มอะหล่วยเรื่องการใช้วัสดุในการสร้างสรรค์ผลงานเด็ดขาด"
1601002-75 = "[s] \"คำตอบชัดเจนสมกับเป็นฮิบิกิเลยนะ\""
1601002-76 = "อืม... ด้านนั้นน่าจะมีร้านที่ขายพวกผ้าที่ทำจากวัสดุธรรมชาติอยู่นะ"
1601002-77 = "ที่นั่นมีผ้าโทนสีอ่อนๆ สบายตาที่กันแสงแดดได้ดีขายด้วย คงจะหาผ้าสำหรับทำผ้าม่านได้"
1601002-81 = "เราไปดูที่นั่นกันเลยมั้ย?"
1601002-83 = "(จากนั้นคุณครูกับฮิบิกิก็ใช้เวลาเลือกผ้าด้วยกันอย่างสนุกสนาน)"

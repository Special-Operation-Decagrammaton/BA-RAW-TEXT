[translation]
10040130-1 = "Afterword;When Everyone's Asleep"
10040130-2 = "Um..."
10040130-3 = "I can't drink anymore..."
10040130-4 = "Fufu... Next year... I'm gonna paint the world even more brilliantly..."
10040130-10 = "Oh my? You're awake?"
10040130-11 = "You don't want to sleep more? Didn't you work overnight for two days straight?"
10040130-12 = "I managed to rest a little, but I can't seem to fall back asleep."
10040130-13 = "And I'm really hoping to fix the server's security vulnerabilities."
10040130-14 = "I also need to establish some security measures so Koyuki can't give herself access so easily..."
10040130-15 = "Fufu. You truly are very diligent."
10040130-19 = "May I ask you one thing?"
10040130-20 = "What is it?"
10040130-21 = "Why didn't you join Seminar?"
10040130-22 = "What makes you ask that now?"
10040130-23 = "It occurred to me while spending time with everyone today. Veritas is a club created to resist control and promote the freedom of information to all, correct?"
10040130-24 = "In turn, you don't seem to quite fit the mold of the other carefree, playful Veritas members. And you maintain Millennium's servers and cyber security."
10040130-26 = "Do those two things not align? Freedom doesn't equate to indulgence. A life of freedom is one rife with responsibilities."
10040130-27 = "It's more so... For me, trying to control and take on the responsibilities of others' choices diminishes the inherent value of truth."
10040130-28 = "Like President Rio?"
10040130-29 = "If I had to give an example."
10040130-30 = "We may not be the best of friends now, but there was a time when our values aligned."
10040130-31 = "That was back when the three of us, including Himari, all collaborated to solve the various challenges that Millennium faced."
10040130-32 = "Rio and Himari? They worked together?"
10040130-33 = "I said they worked together, not that they got along."
10040130-37 = "Well... I suppose their relationship wasn't actually too bad."
10040130-38 = "Rio can be a bit reserved when it comes to talking about her feelings."
10040130-39 = "And Himari's the same way."
10040130-40 = "Himari may even secretly be hoping to reconcile with Rio."
10040130-41 = "Ah. Don't tell her I said that. She'd throw a fit."
10040130-42 = "Fufu, you don't have to worry about that. I have that much sense, at least."
10040130-44 = "*yawn* Look at the time..."
10040130-45 = "The server maintenance is more or less done. Should we head back?"
10040130-46 = "Thank you for all your hard work today."
10040130-47 = "What hard work? It's all par for the course."
10040130-48 = "Tomorrow, the day after that, the next year... Will these days always continue on?"
10040130-49 = "...No one can really say. But I believe so."
10040130-50 = "As secretary, someone who records every minute detail and change in life, I can think of nothing I'd like better than for these peaceful days to continue."
10040130-52 = "Thank you for everything, Chihiro."
10040130-53 = "I look forward to your support this year as well."

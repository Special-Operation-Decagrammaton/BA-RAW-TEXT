10040130-8 = "3;노아 파자마;01\n#3;a\n#wait;1000"
10040130-9 = "3;노아 파자마;02\n#3;em;[반응]\n#wait;1500"
10040130-10 = "3;노아 파자마;04;어머나? 그새 일어나셨네요."
10040130-11 = "3;노아 파자마;02;부부장님은 안 주무세요? 안 그래도 아까 듣자니 이틀 가까이 철야를 하셨다면서."
10040130-12 = "1;치히로 파자마;99;조금 자고 일어나서 그런지 지금은 잠이 안 오네.\n#1;em;[한숨]\n#1;a\n#3;m5"
10040130-13 = "1;치히로 파자마;02;그리고 생각이 난 김에 빨리 서버의 보안 취약점을 정비하고 싶어서."
10040130-14 = "1;치히로 파자마;01;이번에야말로 코유키가 마음대로 권한을 탈취하지 못하도록 확실히 보안 대책을 세워놔야지……"
10040130-15 = "3;노아 파자마;01;후후, 부부장님은 언제나 성실하시네요.\n#3;em;[음표]"
10040130-16 = "#st;[0,0];instant;1;"
10040130-17 = "#clearST"
10040130-18 = "1;치히로 파자마;01\n3;노아 파자마;99\n#1;h\n#3;h\n#3;em;[...]\n#wait;2500"
10040130-19 = "3;노아 파자마;02;저, 생각난 김에 저도 하나 여쭈어봐도 괜찮을까요?"
10040130-20 = "1;치히로 파자마;02;뭔데?"
10040130-21 = "3;노아 파자마;08;부부장님은 어째서 세미나에 입부하지 않으신 건가요?\n#3;em;[?]"
10040130-22 = "1;치히로 파자마;02;이제 와서 갑자기?"
10040130-23 = "1;치히로 파자마;02\n3;노아 파자마;02;오늘 부원들과 함께 어울리며 새삼 떠오른 것이지만, <베리타스>는 통제에 저항하며 밀레니엄의 정보를 자유롭게 공유하기 위해 만들어진 동아리잖아요?\n#3;em;[반응]\n#3;m3\n#1;dl"
10040130-24 = "3;노아 파자마;01;하지만 치히로 부부장님은 밀레니엄의 서버 보안을 유지하는 데 도움을 주시기도 하고, 다소 장난이 심한 베리타스의 다른 부원들과는 달리 금욕적인 면이 있는 것 같아서요."
10040130-25 = "#all;hide"
10040130-26 = "3;치히로 파자마;99;그야 당연하지. 자유와 방종은 엄연히 다른 개념이니까. 자유로운 삶에는 책임이 뒤따르는 법이야."
10040130-27 = "3;치히로 파자마;02;다만 나는…… 타인의 선택까지 책임지려 하는 건, 진리 본연의 가치를 퇴색시킨다고 생각한 것뿐이야."
10040130-28 = "3;노아 파자마;03;리오 회장처럼 말이죠?\n#3;closeup\n#3;em;[음표]"
10040130-29 = "3;치히로 파자마;99;굳이 예시를 꼽자면 말이지.\n#3;closeup\n#3;em;[한숨]"
10040130-30 = "3;치히로 파자마;01;지금은 서로 대립하고 있지만, 한 때는 리오와 생각이 일치했던 적도 있었어.\n#3;closeup"
10040130-31 = "3;치히로 파자마;02;그때는 히마리도 함께 세 사람이서 밀레니엄의 여러 난제를 해결하기 위해 노력했었지.\n#3;closeup"
10040130-32 = "3;노아 파자마;09;리오 회장과 히마리 부장이 함께 어울려 일한 적이 있었다고요? 뭔가 쉽게 상상이 가질 않네요.\n#3;em;[땀]"
10040130-33 = "1;치히로 파자마;99;함께 일했다고만 했지 사이가 좋았다곤 하지 않았어.\n#3;m5\n#1;ar"
10040130-34 = "#st;[0,0];instant;1;"
10040130-35 = "#clearST"
10040130-36 = "3;노아 파자마;09\n1;치히로 파자마;99\n#1;h\n#3;h\n#1;em;[...]\n#wait;2500"
10040130-37 = "1;치히로 파자마;02;음…… 아니, 어쩌면 사이가 좋았을지도."
10040130-38 = "3;노아 파자마;01;리오 회장도 은근히 마음을 드러내는 데에는 인색한 편이니까요."
10040130-39 = "1;치히로 파자마;99;그건 히마리도 마찬가지야.\n#1;em;[한숨]"
10040130-40 = "1;치히로 파자마;01;어쩌면 히마리도 내심 리오와 화해할 수 있는 계기를 찾고 있었을지도 모르지."
10040130-41 = "1;치히로 파자마;02;아, 히마리에게는 이런 말 하지 마. 분명 화를 낼 테니까.\n#1;em;[반응]"
10040130-42 = "3;노아 파자마;03;후후, 걱정 마세요. 저도 그 정도의 눈치는 있으니까요."
10040130-43 = "#all;hide"
10040130-44 = "3;치히로 파자마;06;하암…… 벌써 시간이 이렇게 되었나?\n#3;stiff\n#3;a"
10040130-45 = "3;치히로 파자마;01;서버 점검도 거의 끝났으니 슬슬 방으로 다시 돌아갈까.\n#3;greeting"
10040130-46 = "3;노아 파자마;01;오늘도 여러 문제를 해결해 주시느라 정말 수고 많으셨어요.\n#3;greeting"
10040130-47 = "3;치히로 파자마;99;수고는 뭘, 늘 하던 일의 반복일 뿐인데.\n#3;em;[반응]"
10040130-48 = "3;노아 파자마;01;내일도, 내년에도…… 오늘 같은 이런 일상들이 계속될 수 있을까요?\n#3;em;[?]"
10040130-49 = "1;치히로 파자마;02;……글쎄. 하지만 나는 계속될 거라고 믿어.\n#1;a\n#3;m5"
10040130-50 = "3;노아 파자마;99;작은 변화도 놓치지 않고 기록해야 하는 서기로서, 이 평온한 일상이 계속된다면 그만큼 기쁜 일은 없을 것 같네요."
10040130-51 = "#all;hide"
10040130-52 = "3;노아 파자마;03;그럼 올해도 잘 부탁드립니다, 선배.\n#3;closeup\n#3;em;[음표]\n#3;greeting"
10040130-53 = "3;치히로 파자마;03;올해도 잘 부탁할게, 후배님.\n#3;closeup"

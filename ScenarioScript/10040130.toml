[translation]
10040130-1 = "後日談;所有人睡著之後"
10040130-2 = "唔嗯……"
10040130-3 = "我已經喝不下了……"
10040130-4 = "呵呵……明年也要……把世界塗上更華麗的色彩……"
10040130-10 = "哎呀？你這麼快就醒了嗎？"
10040130-11 = "副部長，你不睡嗎？#n我剛剛才聽說你已經將近兩天沒睡了。"
10040130-12 = "可能是因為剛才睡了一會的關係，現在反而沒什麼睡意。"
10040130-13 = "而且我想趁還記得的時候，趕快整理出伺服器的保全弱點。"
10040130-14 = "這次一定要確實建立起防範對策，讓小雪再也無法輕易地奪取權限。"
10040130-15 = "呵呵，副部長還真是勤勞呢。"
10040130-19 = "對了，我正好想到了一件事。#n可以請教你一個問題嗎？"
10040130-20 = "是什麼樣的問題？"
10040130-21 = "你為什麼不加入研討會呢？"
10040130-22 = "怎麼突然問這個？"
10040130-23 = "我是看到你今天和貝里塔斯成員們相處的情形，才突然想到這個問題的。#n「貝里塔斯」成立的初衷是為了反抗控制，並保證千年學園內部的資訊能自由流通。"
10040130-24 = "但千尋副部長不僅經常協助維護千年的伺服器保全系統，#n跟其他喜歡惡作劇的貝里塔斯成員相比，也顯得十分安分守己。"
10040130-26 = "那是當然的。#n畢竟自由和放縱是截然不同的概念。自由的生活必定伴隨著責任。"
10040130-27 = "我只是覺得……#n如果我們連他人的選擇都要一併承擔的話，只會讓真理最純粹的價值褪色而已。"
10040130-28 = "你指的是莉央會長嗎？"
10040130-29 = "如果一定要找個例子的話……或許是吧。"
10040130-30 = "雖然我和莉央現在處於對立狀態，但我們也曾經有過共同的理念。"
10040130-31 = "當時我們加上陽葵三個人，都在為了解決千年面臨的難題而努力。"
10040130-32 = "你是說莉央會長和陽葵部長曾經共事過？#n總覺得那幅景象讓人有點難以想像呢。"
10040130-33 = "曾經共事過，並不代表關係就會變得融洽。"
10040130-37 = "嗯……不，或許他們其實關係挺好的吧。"
10040130-38 = "畢竟莉央會長也是個不善於表達內心情感的人。"
10040130-39 = "這點陽葵也是半斤八兩。"
10040130-40 = "或許陽葵他，其實也一直在尋找能跟莉央和解的契機也說不定。"
10040130-41 = "啊，麻煩幫我向陽葵保密。#n否則他肯定會大發雷霆的。"
10040130-42 = "呵呵，別擔心。#n這種事我還是明白的。"
10040130-44 = "呼啊……已經這麼晚了嗎？"
10040130-45 = "既然伺服器已經檢查得差不多了，我差不多也該回房休息了。"
10040130-46 = "謝謝你今天也幫我們解決了那麼多問題。"
10040130-47 = "不用客氣，反正也只是我的例行公事而已。"
10040130-48 = "不知道到了明天或明年……像今天這樣的日常是否還會存在呢？"
10040130-49 = "……這點我也不好說。#n但我相信，這樣的日常一定會持續下去的。"
10040130-50 = "身為必須將所有變化都記錄下來的書記……#n如果這麼平靜的日常能夠持續下去的話，那真是再幸福不過了。"
10040130-52 = "今年也要麻煩你多多指教了，前輩。"
10040130-53 = "也請你多多指教囉，後輩。"

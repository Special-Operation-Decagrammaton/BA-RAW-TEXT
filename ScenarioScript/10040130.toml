[translation]
10040130-1 = "ย้อนวันวาน;หลังจากทุกคนหลับไป"
10040130-2 = "งืมม..."
10040130-3 = "ดื่มต่อไม่ไหวแล้ว..."
10040130-4 = "ฮุฮุ... ปีหน้าฉันก็จะ... ทำให้โลกนี้มีสีสันมากขึ้นอีก..."
10040130-10 = "ตายจริง? ตื่นแล้วเหรอคะ?"
10040130-11 = "รองหัวหน้าจิฮิโระไม่นอนเหรอคะ? ไหนว่าทำงานจนไม่ได้หลับไม่ได้นอนมาสองคืนเลยไม่ใช่เหรอ"
10040130-12 = "คงเพราะฉันได้งีบไปก่อนหน้านี้น่ะ ตอนนี้ก็เลยนอนไม่หลับ"
10040130-13 = "และไหนๆ ก็นึกขึ้นได้แล้ว ฉันก็เลยอยากไปแก้ไขช่องโหว่ด้านความปลอดภัยของเซิร์ฟเวอร์ให้ได้#nเร็วๆ ด้วย"
10040130-14 = "ครั้งนี้ฉันคงต้องใช้มาตรการด้านความปลอดภัยอย่างเข้มงวด โคยูกิจะได้เข้ามาซุกซนตามอำเภอใจ#nไม่ได้อีก"
10040130-15 = "ฮุฮุ รองหัวหน้าจิฮิโระนี่ขยันจังเลยนะคะ"
10040130-19 = "จริงสิ ฉันเองก็เพิ่งนึกอะไรได้เหมือนกัน ขอฉันถามอะไรอย่างได้ไหมคะ?"
10040130-20 = "อะไรเหรอ?"
10040130-21 = "ทำไมรองหัวหน้าจิฮิโระถึงไม่เข้าชมรมเซมิน่าล่ะคะ?"
10040130-22 = "มาถามเรื่องนี้เอาตอนนี้เนี่ยนะ?"
10040130-23 = "ฉันเพิ่งนึกขึ้นได้ระหว่างเล่นสนุกกับสมาชิกชมรมในวันนี้น่ะค่ะ ก็ <เวอริทัส> เป็นชมรมที่ตั้งขึ้นเพื่อ#nต่อต้านการควบคุม และเพื่อแบ่งปันข้อมูลของมิลเลเนียมอย่างเสรีไม่ใช่เหรอคะ?"
10040130-24 = "ที่ฉันถามแบบนั้น เพราะรองหัวหน้าจิฮิโระทั้งช่วยรักษาความปลอดภัยให้เซิร์ฟเวอร์ของมิลเลเนียม และดูเป็นคนที่เคร่งครัด ต่างจากสมาชิกเวอริทัสคนอื่นๆ น่ะค่ะ"
10040130-26 = "มันก็แน่นอนอยู่แล้ว การมีอิสระกับการทำตามใจตัวเองเป็นคนละเรื่องกัน ชีวิตที่มีอิสระมาย่อมพร้อม#nกับความรับผิดชอบอยู่แล้วละ"
10040130-27 = "แต่ว่าฉัน... คิดว่าการรับผิดชอบกระทั่งการเลือกของคนอื่นทำให้คุณค่าของความจริงมันลดน้อยลงน่ะ"
10040130-28 = "เหมือนกับประธานริโอะน่ะเหรอคะ?"
10040130-29 = "ถ้าจะต้องให้ยกตัวอย่าง"
10040130-30 = "ถึงแม้ตอนนี้เราจะขัดแย้งกัน แต่ครั้งหนึ่งฉันกับริโอะก็เคยมีความคิดที่เหมือนกัน"
10040130-31 = "ตอนนั้นฉัน ริโอะ และฮิมาริ พวกเราสามคนทำงานร่วมกันเพื่อคลี่คลายปัญหาที่ยากจะแก้ไขต่างๆ ในมิลเลเนียม"
10040130-32 = "ประธานริโอะกับหัวหน้าฮิมาริเคยทำงานร่วมกันด้วยเหรอคะ? ฉันนึกภาพไม่ค่อยออกเลยค่ะ"
10040130-33 = "แค่ได้ทำงานร่วมกันน่ะ ใช่ว่าจะเข้ากันได้หรอก"
10040130-37 = "อืม... ไม่สิ บางทีเราอาจจะเข้ากันได้ก็ได้"
10040130-38 = "ประธานริโอะเองก็ไม่ค่อยเปิดเผยความรู้สึกของตัวเองใช่มั้ยล่ะคะ?"
10040130-39 = "เรื่องนั้นฮิมาริก็ไม่ต่างกันหรอก"
10040130-40 = "บางทีฮิมาริอาจจะกำลังหาโอกาสที่จะคืนดีกับริโอะอยู่ก็ได้"
10040130-41 = "อ้อ อย่าไปพูดอะไรแบบนี้กับฮิมาริล่ะ ฉันแน่ใจว่าถ้าได้ยินเข้าฮิมาริต้องโกรธแน่ๆ"
10040130-42 = "ฮุฮุ ไม่ต้องห่วงค่ะ เรื่องแบบนั้นฉันเองก็พอรู้อยู่ค่ะ"
10040130-44 = "ฮ้าว... เวลาผ่านไปขนาดนี้แล้วเหรอเนี่ย?"
10040130-45 = "การซ่อมบำรุงเซิร์ฟเวอร์ก็เกือบจะเสร็จแล้ว ฉันคงจะต้องกลับห้องแล้วละ"
10040130-46 = "ขอบคุณที่ทำงานหนักเพื่อแก้ไขปัญหาต่างๆ ให้พวกเรานะคะ"
10040130-47 = "ทำงานหนักอะไรกันล่ะ ฉันก็แค่ทำงานเดิมๆ ซ้ำๆ นั่นละ"
10040130-48 = "ทั้งวันพรุ่งนี้ และในปีหน้า... ชีวิตประจำวันของพวกเราจะดำเนินต่อไปได้เหมือนกับวันนี้หรือเปล่าคะ?"
10040130-49 = "ไม่รู้สิ... แต่ฉันเชื่อว่ามันจะเป็นแบบนี้ต่อไปนะ"
10040130-50 = "ในฐานะเลขานุการที่ต้องจดบันทึกทุกอย่างแม้แต่การเปลี่ยนแปลงเล็กๆ น้อยๆ ฉันคิดว่าไม่มีอะไรที่#nน่าดีใจไปกว่าการได้มีชีวิตประจำวันที่สงบแบบนี้ต่อไปแล้วค่ะ"
10040130-52 = "ถ้าอย่างนั้นปีนี้ฉันก็ขอฝากตัวด้วยนะคะ รุ่นพี่"
10040130-53 = "ปีนี้ฉันขอก็ฝากตัวเหมือนกันนะ รุ่นน้อง"

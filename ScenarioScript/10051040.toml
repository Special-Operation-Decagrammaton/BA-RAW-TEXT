[translation]
10051040-1 = "Episode 4;Ninja and Thief"
10051040-2 = "Fashion Show Banquet Hall"
10051040-4 = "La la."
10051040-5 = "La la la."
10051040-6 = "(I was so nervous...but there's not much to do...)"
10051040-7 = "(Everyone's nice and kind, so there's no trouble... Just eating appetizers and fawning over each other.)"
10051040-8 = "(Maybe I should just chat with the girls over the comms?)"
10051040-9 = "(The topic could be like...\"What are the key principles a ninja must uphold during a boring infiltration?\")"
10051040-10 = "(\"To remain stealthy, is it better to prepare onigiri or ration pellets?\")"
10051040-11 = "(Something like that, I guess...? Sounds...ninja-related, right?)"
10051040-12 = "[s] \"Oh, here you are, Michiru!\""
10051040-13 = "Aaaah! Y-You scared me!"
10051040-14 = "Sensei? You're here too, Honorable Sensei?"
10051040-15 = "Wait, you're not here for...PEEPING reasons, are you? Like last time?"
10051040-16 = "[s] \"Of course not!\""
10051040-17 = "Then it must be that...you've come here to make your debut as a model!"
10051040-18 = "Wow! You really ARE something, Honorable Sensei!"
10051040-19 = "[s] \"No, I'm just here because I was invited!\""
10051040-20 = "Oh, that's it? Eh, what a boring reason."
10051040-21 = "I was looking forward to seeing you strut on the runway."
10051040-22 = "[s] \"I don't think that's for me...\""
10051040-23 = "Hm? So, Sensei doesn't see themselves as a model..."
10051040-24 = "Then, naturally, Sensei must be interested in pursuing ninjutsu instead!"
10051040-25 = "[s] \"How did you reach that conclusion?!\""
10051040-26 = "Nyahaha! Anyway, Honorable Sensei, it's nice to see you."
10051040-27 = "...Because I happened to be struggling with unbearable boredom."
10051040-28 = "I even fantasized about ambushing random passersby!"
10051040-29 = "[s] \"Is that what a ninja should be doing?!\""
10051040-30 = "While one ambush is permitted before a formal introduction..."
10051040-31 = "...Obviously, I shouldn't do it here."
10051040-32 = "So I was just meandering around, to be frank."
10051040-33 = "Maybe it's because this is a formal event, but nothing's going to happen."
10051040-34 = "[s] \"Don't jinx it by saying that...\""
10051040-35 = "Eh, Honorable Sensei, you seriously believe in that stuff?"
10051040-36 = "Even if something happens here, I'm sure it'd be nothing seri—"
10051040-38 = "Beep! Beep! Beep!"
10051040-41 = "Eh."
10051040-42 = "Ehhhhhh?!"
10051040-43 = "That's the emergency signal?!"
10051040-44 = "Secret stealth undercover ninja squad, do you copy?"
10051040-45 = "\"Sparkling Shuriken,\" reporting in!"
10051040-46 = "Listen carefully. Shinecat's signature fashion piece is missing! It's stolen!"
10051040-47 = "If this stands, our show will be doomed!"
10051040-48 = "With respect to the other designers, people are only ACTUALLY here to see Shinecat's breathtaking design! Each of his pieces is an irreplaceable work of art, understand me?!"
10051040-49 = "E-Eek!!"
10051040-50 = "When I assess the timeline, it's clear that this crime was only JUST committed. The culprit is likely still in the building!"
10051040-51 = "Th-Then what should I do...?"
10051040-52 = "What do you mean?! Apprehend the thief! Why do you think we hired you?!"
10051040-53 = "Y-You have a point, but...!"
10051040-54 = "Nab them no matter what it takes! Do you copy?"
10051040-55 = "H-Hold on! Do you have any clues? What do they look like?"
10051040-57 = "If I knew what they looked like, I'd already HAVE them! Now get out there and get me some results!"
10051040-58 = "Yes! Understood."
10051040-59 = "I-In that case, we're on it!"
10051040-63 = "*exhale*"
10051040-64 = "You were right, Honorable Sensei... Jinxed. What should we do?"
10051040-65 = "Huh...? Honorable Sensei, you'll help too?"
10051040-66 = "Phew..."
10051040-67 = "Fu... Fufu..."
10051040-68 = "Th-Then there's no denying what we must do! We'll just have to show everyone the true power of the ninja!"
10051040-69 = "\"Whirling Doll\"! \"Waiting Arbor!\" Report!"
10051040-70 = "\"Whirling Doll,\" reporting for duty! Nin nin!"
10051040-71 = "\"Waiting Arbor.\" I'm...here! And...waiting."
10051040-72 = "You all heard the news, right? Our new priority is to catch that thief!"
10051040-73 = "Granted, we don't know what they look like. But that won't stop us! We shall bring them to justice and save the show!"
10051040-74 = "You already know the drill! A ninja...!"
10051040-75 = "...never gives up!"
10051040-76 = "N-No matter the adversity!"
10051040-80 = "That's right! Move out!"
10051040-82 = "Fashion Show Venue Sculpture Garden"
10051040-86 = "Home free."
10051040-87 = "And it was so easy. All I had to do was pretend to make a delivery, and...I slipped right in."
10051040-88 = "Still... Why did Shinecat come so fashionably early today? I almost ran right into him and those wonderfully manicured claws."
10051040-89 = "Well... At least I rescued this piece. It'll be safe with me."
10051040-90 = "And I'll be safe as long as I'm in all this dense foliage."
10051040-91 = "Ah, just look at it! Get a whiff! Shinecat's work, utter perfection."
10051040-93 = "Ah, Shinecat. The light of my life, the ember in my soul...!"
10051040-94 = "A one-of-a-kind piece of craftsmanship, constructed by the most brilliant mind in Kivotos."
10051040-95 = "And yet all clothes are meant to be worn, and therefore defiled... "
10051040-96 = "It's tragic that such a work of art could be considered so expendable."
10051040-98 = "Which is why the Dadaistic Helmet Gang has risen to the challenge!"
10051040-99 = "Truly magnificent outfits can only gain immortality through never being worn."
10051040-100 = "And that is why I will perfectly preserve this piece and hang it in our office! For eternity! For glory!"
10051040-101 = "Heehee, heeheehee, heeheehee..."
10051040-107 = "Hold on, where'd this weird tree come from?"
10051040-108 = "I... I'm not a tree..."
10051040-109 = "Oh, of course you're not. How could a tree suddenly appear and block my path?"
10051040-110 = "I'll be on my way, then. Good day."
10051040-111 = "Y-You can't go...!"
10051040-112 = "Why?"
10051040-113 = "You stole that dress, right...?"
10051040-114 = "Stole?! Please. "
10051040-116 = "I'm merely RELOCATING this dress to a place where it can fully embrace its potential! "
10051040-117 = "...To a place where the greatness of this work shall not be degraded!"
10051040-118 = "Look, if someone wears this great outfit and it gets worn and damaged... Wouldn't that be a tragedy? I'm giving it a good home."
10051040-119 = "R-Regardless of your reasons, it's theft..."
10051040-120 = "Tsk, I swear...no one knows how to appreciate art nowadays."
10051040-121 = "How can you call me a thief? I'm a preservationist! You wouldn't know art if it slapped you in the face."
10051040-122 = "Wait. ...Why am I even talking to you?!"
10051040-127 = "Th-This is \"Waiting Arbor\"! I've located the thief in the sculpture garden!"
10051040-128 = "Damn it! She's security! Outta my way! Move it!"
10051040-129 = "I-I won't!"
10051040-130 = "...For I am a ninja!!"
10051040-131 = "Am I supposed to know what that means?"
10051040-142 = "Inside the Fashion Show Venue"
10051040-144 = "Did you hear that?! Tsukuyo found the thief! In the sculpture garden out back!"
10051040-145 = "Let's move, President!"
10051040-147 = "Fashion Show Venue Sculpture Garden"
10051040-148 = "*huff* *huff* ...How are you so strong?!"
10051040-159 = "A-A ninja never gives up!"
10051040-160 = "That's n-not answering the question. Let me go!"
10051040-161 = "I-I won't!!"
10051040-163 = "[ns] \"Actually, you can ease up, Tsukuyo.\""
10051040-164 = "Because!"
10051040-165 = "Your friends have joined the battle! Nin nin!"
10051040-169 = "Together! We fight as one!"
10051040-170 = "President...! Izuna...!"
10051040-171 = "You cowards! How dare you gang up on one innocent person?"
10051040-172 = "How dare YOU steal someone's hard work!"
10051040-173 = "Sh-Shut it! I didn't steal this! I told you. I'm rehoming it to a place where it will get proper respect."
10051040-174 = "Eh, whatever! My words are wasted on you fools!"
10051040-176 = "Dadaistic Helmet Gang! Assemble!!"
10051040-185 = "Now, my comrades! Until this priceless piece of art is secure..."
10051040-186 = "...protect me with your lives!"

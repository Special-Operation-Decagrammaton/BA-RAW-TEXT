[translation]
10051040-1 = "ตอนที่ 4;นินจากับโจร"
10051040-2 = "ในห้องบอลรูม งานแฟชั่นโชว์"
10051040-4 = "ฮืม~"
10051040-5 = "ฮื้ม ฮืมม~"
10051040-6 = "(อุตส่าห์ประหม่ากับงาน... แต่เอาจริงๆ ก็ไม่มีอะไรให้ทำเลยนะ...)"
10051040-7 = "(ผู้คนก็สุภาพเรียบร้อยดี งั้นก็ไม่น่าจะมีปัญหาอะไร...)"
10051040-8 = "(ลองวิทยุหาอิซุนะกับสึคุโยะดูดีมั้ยนะ?)"
10051040-9 = "(ส่วนหัวข้อสนทนาก็ อืม... นินจาต้องทำอะไรในสถานการณ์แฝงตัวที่น่าเบื่อ?)"
10051040-10 = "(หรือไม่ก็ ในสถานการณ์แฝงตัว เราต้องกินข้าวปั้นหรืออาหารอัดเม็ดดี...)"
10051040-11 = "(เอาเป็นประมาณนี้แล้วกันเนอะ...?)"
10051040-12 = "[s] \"อ๊ะ มิจิรุ อยู่ตรงนี้นี่เอง\""
10051040-13 = "ว้ายย! ตะ... ตกใจหมดเลย!"
10051040-14 = "คุณครู? ไม่สิ ท่านอาจารย์ก็มาที่นี่ด้วยเหรอ?"
10051040-15 = "เดี๋ยวนะ หรือว่าจะมาขโมยชุดไปเหมือนคราวที่แล้ว...?"
10051040-16 = "[s] \"ไม่ใช่นะ!\""
10051040-17 = "ถ้างั้น... หรือว่าจะมาเดบิวต์เป็นซูเปอร์โมเดลที่นี่!"
10051040-18 = "จริงด้วยสินะ! ท่านอาจารย์เนี่ย ความสามารถรอบด้านจริงๆ เลย!"
10051040-19 = "[s] \"เปล่านะ ครูแค่มาเพราะได้รับเชิญมาต่างหาก!\""
10051040-20 = "อ๊ะ ได้รับเชิญมางานหรอกเหรอ? ก็นึกว่ามาเดินแบบเสียอีก"
10051040-21 = "ที่จริงข้าน้อยก็อยากเห็นท่านอาจารย์เดินแบบในเวอร์ชันซูเปอร์โมเดลเหมือนกันนะ"
10051040-22 = "[s] \"ไม่ดีกว่า ครูไม่อยากเห็นตัวเองทำแบบนั้นหรอก...\""
10051040-23 = "เอ๋? ไม่อยากลองเป็นซูเปอร์โมเดลดูเหรอ?"
10051040-24 = "หรือว่าท่านอาจารย์สนใจการเป็นนินจามากกว่าซูเปอร์โมเดลน่ะ!"
10051040-25 = "[s] \"ทำไมถึงพาเข้าเรื่องนินจาได้ล่ะเนี่ย?!\""
10051040-26 = "อะฮะฮ่า! ยังไงข้าน้อยก็ดีใจที่ได้เจอท่านอาจารย์อีกในที่แบบนี้นะ"
10051040-27 = "ข้าน้อยกำลังเบื่อกับงานอยู่พอดีเลย!"
10051040-28 = "เบื่อจนอยากจะซุ่มโจมตีแขกในงานที่เดินผ่านไปผ่านมาเลยละ!"
10051040-29 = "[s] \"นินจาทำแบบนั้นได้เหรอ?!\""
10051040-30 = "ได้สิ ปกตินินจาจะได้รับอนุญาตให้ซุ่มโจมตีได้หนึ่งครั้งก่อนทักทายกันอยู่แล้ว..."
10051040-31 = "แต่ข้าน้อยคงทำแบบนั้นที่นี่ไม่ได้หรอก..."
10051040-32 = "ตอนนี้ข้าน้อยทำได้แค่เดินไปเดินมาเรื่อยๆ เปื่อยๆ น่ะ"
10051040-33 = "เพราะนี่เป็นงานทางการหรือเปล่านะ ก็เลยไม่มีเรื่องอะไรเกิดขึ้นเลย"
10051040-34 = "[s] \"แต่ปกติถ้าพูดแบบนั้น ก็มักจะเกิดเรื่องเสมอนะ...\""
10051040-35 = "ไม่เอาน่า ท่านอาจารย์เชื่อลางร้ายอะไรแบบนั้นด้วยเหรอ?"
10051040-36 = "ต่อให้เกิดเรื่องอะไรในสถานที่แบบนี้ ก็คงไม่ใช่เรื่องใหญ่โต..."
10051040-38 = "ปี๊บ ปี๊บ ปี๊บ ปี๊บ!"
10051040-41 = "เอ๊ะ?"
10051040-42 = "เอ๋?!"
10051040-43 = "นี่มันสัญญาณวิทยุฉุกเฉินนี่นา...?!"
10051040-44 = "ทีมสายลับ ได้ยินมั้ยครับ?"
10051040-45 = "นะ... นี่คือสายลับหมายเลข 1!"
10051040-46 = "ฟังให้ดีนะครับ ก่อนหน้านี้ชุดของดีไซเนอร์ไชน์แคทถูกขโมยไปครับ!"
10051040-47 = "ถ้าไม่มีชุดพวกนั้น งานแฟชั่นโชว์ของเรา... ต้องพังไม่เป็นท่าแน่ๆ!!"
10051040-48 = "ก็ผู้ชมในวันนี้มาเพื่อชมชุดของดีไซเนอร์ไชน์แคทกันนี่ครับ!"
10051040-49 = "ฮะ... เฮือก?!"
10051040-50 = "ถ้าดูจากสถานการณ์หน้างานแล้ว ผมว่าคนร้ายน่าจะยังไปไม่ได้ไกลครับ มีโอกาสสูงมากที่จะยังอยู่ใน#nสถานที่จัดงานด้วย!"
10051040-51 = "ถะ... ถ้างั้นให้ทำไง..."
10051040-52 = "ถามมาได้นะครับ! ก็ต้องไปจับโจรมาสิครับ! พวกเราจ้างพวกคุณมาก็เพราะการนี้นะ!"
10051040-53 = "ระ... เรื่องนั้นมันก็จริงอยู่หรอก...!"
10051040-54 = "จับโจรมาให้ได้นะครับ ต่อให้ต้องใช้วิธีไหนก็ตาม! เข้าใจมั้ยครับ?"
10051040-55 = "ดะ... เดี๋ยวก่อน! ถ้างั้นบอกหน่อยว่าโจรแต่งตัวยังไง...!"
10051040-57 = "อะไรของคุณครับเนี่ย? ถ้าพวกผมรู้ ก็คงไปจับโจรเองแล้วสิครับ!"
10051040-58 = "จริงด้วยเนอะ?!"
10051040-59 = "งะ... งั้นก็รับทราบค่ะ!!"
10051040-63 = "ฮู่ววว..."
10051040-64 = "ทำยังไงดีล่ะ... ที่ท่านอาจารย์พูดไว้มันเป็นจริงขึ้นมาแล้วน่ะสิ..."
10051040-65 = "หืม...? ท่านอาจารย์ก็จะช่วยอีกแรงงั้นเหรอ?"
10051040-66 = "ฮึ่มม..."
10051040-67 = "ฮุ... ฮุฮุ..."
10051040-68 = "ถะ... ถ้างั้นก็ช่วยไม่ได้ล่ะนะ! ข้าน้อยต้องแสดงตัวตนที่แท้จริงของนินจาแล้วละ!!"
10051040-69 = "สายลับหมายเลข 2! สายลับหมายเลข 3! ตอบด้วย!"
10051040-70 = "สายลับหมายเลข 2 ค่ะ! นินนิน!"
10051040-71 = "สายลับหมายเลข 3... อยู่นี่ค่ะ!"
10051040-72 = "ดีละ เมื่อกี้ทุกคนได้ยินสถานการณ์แล้วใช่มั้ย? นับจากนี้ไป พวกเราจะไปจับคนร้ายที่ขโมยชุดกัน!"
10051040-73 = "แน่นอนว่าเราไม่รู้ว่าคนร้ายลักษณะเป็นแบบไหนด้วย! แต่ยังไงก็ต้องตามจับมาให้ได้!"
10051040-74 = "เข้าใจมั้ย? นินจาน่ะ! ไม่ว่าจะอยู่ในสถานการณ์ที่จนมุม...!"
10051040-75 = "หรือต้องเผชิญกับความยากลำบากแค่ไหน!"
10051040-76 = "กะ... ก็จะไม่มีวันยอมแพ้... เด็ดขาดค่ะ!"
10051040-80 = "ดีละ! ไปกันเลย!!"
10051040-82 = "สวนด้านหลังสถานที่จัดงานแฟชั่นโชว์"
10051040-86 = "ดีละ หลบหนีออกมาได้แล้ว"
10051040-87 = "พอปลอมตัวเป็นพนักงานส่งของ ก็ไม่มีใครสงสัยอะไรเลยจริงด้วย"
10051040-88 = "จะว่าไปคุณไชน์แคทน่ะ... ปกติชอบมาถึงตอนจะเริ่มงานเลยไม่ใช่เหรอ แต่ทำไมวันนี้ถึงมาเร็วก็ไม่รู้นะ? เกือบได้เฉียดกันแล้วมั้ยล่ะ ดีนะที่รอดมาได้"
10051040-89 = "เอาเถอะ... ยังไงเราก็เอาชุดเดินแบบออกมาได้แล้ว"
10051040-90 = "แล้วยิ่งเรามาหลบในสวนรกๆ แบบนี้ คงไม่มีใครหาเจอหรอก..."
10051040-91 = "เอาละ... สรุปว่าเราได้ชุดของคุณไชน์แคทมาแล้ว...!"
10051040-93 = "อ่า... ไชน์แคท แสงสว่างและเปลวไฟในชีวิตของฉัน...!"
10051040-94 = "เสื้อผ้าชิ้นเดียวในโลกที่ออกแบบโดยดีไซเนอร์ชื่อดังเพื่อการแสดงแฟชั่นโชว์...!"
10051040-95 = "แต่สุดท้ายเสื้อผ้าทุกชิ้นก็ต้องถูกสวมใส่โดยใครสักคน และน่าเศร้าที่มันมักจะจบลงด้วยความเสียหาย...  "
10051040-96 = "ช่างเป็นโศกนาฏกรรมที่ผลงานที่อาจสร้างแรงบันดาลใจให้ผู้คนมากมาย กลับถูกลดทอนให้เป็นแค่#nสินค้าบริโภคเท่านั้น...!"
10051040-98 = "'แก๊งหมวกกันน็อกหลุดโลก' ของเราก็เลยต้องออกหน้าอย่างหลีกเลี่ยงไม่ได้...!"
10051040-99 = "เสื้อผ้าที่ยอดเยี่ยมอย่างแท้จริงจะคงคุณค่าที่เป็นอมตะไว้ได้ ก็ต่อเมื่อมันไม่ถูกสวมใส่"
10051040-100 = "ต้องรักษาสภาพของชุดพวกนี้ แล้วเอาไปแขวนเก็บไว้ในห้องทำงานของพวกเราแล้วละ"
10051040-101 = "ฮุฮุฮุ อุฮุฮุ ฮุฮุฮุ..."
10051040-107 = "อะไรกัน ตรงนี้มีต้นไม้ตั้งแต่เมื่อไรเนี่ย?"
10051040-108 = "ฉะ... ฉันไม่ใช่ต้นไม้นะคะ..."
10051040-109 = "ใช่มั้ยล่ะ? จู่ๆ ต้นไม้จะโผล่มาขวางทางได้ยังไงกัน?"
10051040-110 = "เอาละ ถ้างั้นฉันขอตัวก่อน"
10051040-111 = "ปะ... ไปไม่ได้นะคะ...!"
10051040-112 = "ทำไมล่ะ?"
10051040-113 = "ก็... พวกคุณขโมยชุดมานี่คะ..."
10051040-114 = "ขโมยอะไรกัน! "
10051040-116 = "พวกฉันแค่จะย้ายชุดพวกนั้นไปในที่ที่แสดงคุณค่าที่แท้จริงของมันได้ต่างหาก!"
10051040-117 = "ย้ายไปยังที่ที่ความยิ่งใหญ่ของผลงานนั้นจะไม่ถูกบดบังยังไงล่ะ!"
10051040-118 = "ลองคิดดูสิ ถ้าเสื้อผ้าที่สวยงามขนาดนี้ถูกสวมใส่โดยใครก็ไม่รู้จนเก่าและขาดวิ่นไปหมดละก็... มันน่าเศร้ามากเลยไม่ใช่หรือไง?"
10051040-119 = "มะ... ไม่ว่าเหตุผลจะเป็นยังไง แต่นี่ก็เป็นการขโมยนี่คะ..."
10051040-120 = "ชิ... นี่ละนะพวกที่ไม่รู้คุณค่าของงานศิลปะ..."
10051040-121 = "มากล่าวหาคนอื่นว่าเป็นขโมยโดยที่ไม่รู้ด้วยซ้ำว่าศิลปะคืออะไร... ไม่สิ เดี๋ยวก่อนนะ"
10051040-122 = "ทำไมฉันถึงมาคุยกับเธออยู่เนี่ย...?!"
10051040-127 = "นะ... นี่คือสายลับหมายเลข 3! ฉันเจอโจรแล้วค่ะ! อยู่ข้างๆ รูปปั้นในสวนข้างหลังค่ะ!"
10051040-128 = "บ้าจริง! เธอเป็นเจ้าหน้าที่รักษาความปลอดภัยหรอกเหรอ!! หลบไปนะ!!"
10051040-129 = "มะ... ไม่หลบให้หรอกค่ะ!"
10051040-130 = "ฉันเป็นนินจานะคะ!!"
10051040-131 = "นินจงนินจาอะไร?!"
10051040-142 = "ด้านในที่จัดงานแฟชั่นโชว์"
10051040-144 = "ได้ยินแล้วใช่มั้ย?! สึคุโยะเจอโจรแล้ว! อยู่ในสวนข้างหลัง!"
10051040-145 = "ออกปฏิบัติการค่ะ! หัวหน้า!"
10051040-147 = "สวนด้านหลังสถานที่จัดงานแฟชั่นโชว์"
10051040-148 = "แฮ่ก... แฮ่ก... ทำไมยัยนี่ถึงแรงเยอะแบบนี้นะ?"
10051040-159 = "นะ... นินจาไม่มีวันยอมแพ้หรอกค่ะ!"
10051040-160 = "นินจาที่ว่ามันหมายความว่าอะไรกันแน่?! ปล่อยนะ!!"
10051040-161 = "ปะ... ปล่อยไปไม่ได้ค่ะ!!"
10051040-163 = "[ns] \"ไม่เป็นไร ตอนนี้ปล่อยได้แล้วละ สึคุโยะ\""
10051040-164 = "นั่นก็เพราะว่า!"
10051040-165 = "พวกเรามาช่วยสู้แล้วไงคะ นินนิน!"
10051040-169 = "จากนี้พวกเราจะร่วมมือกัน!!"
10051040-170 = "ท่านหัวหน้า...! อิซุนะจัง...!"
10051040-171 = "พวกขี้ขลาด! สามรุมหนึ่งงั้นเหรอ!"
10051040-172 = "การขโมยเสื้อผ้าของคนอื่นต่างหากที่ขี้ขลาดน่ะ!"
10051040-173 = "งะ... เงียบไปเลยนะ! ก็บอกว่าไม่ได้ขโมย แต่จะเอาไปไว้ในที่ที่เหมาะสม..."
10051040-174 = "ฮึ่ย ช่างเถอะ! ยังไงพวกฉันก็คาดการณ์ไว้แล้วว่าอาจเกิดสถานการณ์แบบนี้!"
10051040-176 = "แก๊งหมวกกันน็อกหลุดโลก! ระดมพล!!"
10051040-185 = "เอาละ สหายทุกคน! หน้าที่ของพวกเธอก็คือ..."
10051040-186 = "ปกป้องฉันจนกว่าจะเอาเสื้อผ้าออกจากตรงนี้ไปได้!"

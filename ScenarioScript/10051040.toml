[translation]
10051040-1 = "第4話;忍者與小偷"
10051040-2 = "時裝秀宴會場內部"
10051040-4 = "哼哼～"
10051040-5 = "哼哼哼～"
10051040-6 = "（本來還挺緊張的……想不到意外地清閒呢……）"
10051040-7 = "（大家都很紳士，看起來也沒什麼問題……）"
10051040-8 = "（要不要跟伊樹菜和月夜用無線電聊聊天？）"
10051040-9 = "（主題就選……在「無聊的潛入任務中，忍者必須遵守的『道』是什麼？」）"
10051040-10 = "（「潛入狀態下該吃飯糰還是兵糧丸……？」）"
10051040-11 = "（類似這樣的嗎……？）"
10051040-12 = "[s]「三千留，原來你在這裡啊。」"
10051040-13 = "唔喵啊！嚇，嚇我一跳！"
10051040-14 = "老師？老師大人也來了嗎？"
10051040-15 = "等等，你該不會跟上次一樣，是跑來偷看人家換衣服的吧……！"
10051040-16 = "[s]「才不是！」"
10051040-17 = "不然……是要在這裡以模特兒的身分出道？"
10051040-18 = "不愧是老師大人，真是深藏不漏！"
10051040-19 = "[s]「也不是。我只是因為收到邀請函才來的。」"
10051040-20 = "啊，是被邀請來的啊？#n哎呀，理由好普通哦。"
10051040-21 = "本來還期待能看見老師大人在舞台上走台步呢。"
10051040-22 = "[s]「我倒是一點也不想看見那種畫面……」"
10051040-23 = "嗯？老師對當時裝模特兒的人生沒什麼興趣？"
10051040-24 = "比起時裝模特兒，果然還是忍者更吸引老師嗎！"
10051040-25 = "[s]「為什麼會得出這種結論！？」"
10051040-26 = "喵哈哈！不過能在這種地方見到老師大人，還是很令人開心呢。"
10051040-27 = "老實說，我現在正好無聊到不行！"
10051040-28 = "甚至到了想隨機伏擊路人的程度了呢！"
10051040-29 = "[s]「忍者可以做那種事嗎！？」"
10051040-30 = "當然，在打招呼前進行一次伏擊是被允許的……"
10051040-31 = "……不過在這裡肯定不能這麼做嘛。"
10051040-32 = "所以我才會無聊地在這裡晃來晃去。"
10051040-33 = "可能因為是很正經的場合吧，真的什麼事都沒有呢。"
10051040-34 = "[s]「通常說那種話之後，就一定會出事……」"
10051040-35 = "哎呀，老師大人原來是那種迷信的人嗎？"
10051040-36 = "在這種地方就算出事，肯定也不會是什麼大──"
10051040-38 = "嗶嗶嗶嗶！"
10051040-41 = "咦……"
10051040-42 = "咦咦咦……！？"
10051040-43 = "這，這不是緊急訊號嗎……！？"
10051040-44 = "臥底團隊，有聽到嗎？"
10051040-45 = "臥，臥底01，收到！"
10051040-46 = "仔細聽我說。剛才Shine Cat設計師的時裝被偷了。"
10051040-47 = "要是不想點辦法的話……我們的時裝秀就要完蛋了！！"
10051040-48 = "今天到場的觀眾，全都是來看Shine Cat設計師的作品的啊！"
10051040-49 = "啊，咦……！？"
10051040-50 = "從現場的狀況來看，犯人應該還沒走遠……現在很可能還在會場裡！"
10051040-51 = "那，那該怎麼辦……"
10051040-52 = "還能怎麼辦！當然是抓住小偷啊！#n不然我們為什麼要僱用你們！"
10051040-53 = "話，話是這麼說沒錯啦……！"
10051040-54 = "無論用什麼手段都要抓到人！知道了嗎？"
10051040-55 = "先，先等一下！起碼告訴我一點長相特徵之類的吧……！"
10051040-57 = "你在說什麼傻話？#n要是知道小偷長什麼樣子的話，我們早就抓到人了不是嗎！"
10051040-58 = "好像有道理耶！？"
10051040-59 = "我，我知道了！！"
10051040-63 = "呼……"
10051040-64 = "怎麼辦……老師大人說的話成真了啦……"
10051040-65 = "咦……？老師大人說要幫忙？"
10051040-66 = "呼……"
10051040-67 = "嘶……呼……"
10051040-68 = "那，那就沒辦法了！#n這種時候就拿出我們忍者的真本事吧！！"
10051040-69 = "臥底02、臥底03！聽到請回答！"
10051040-70 = "臥底02收到！忍忍！"
10051040-71 = "臥底03……也收到了！"
10051040-72 = "剛才的通話內容，大家應該都聽到了吧？#n從現在開始，我們要去抓住偷衣服的犯人！"
10051040-73 = "雖然沒人知道犯人長什麼樣子，不過無論如何都要抓到！"
10051040-74 = "知道我的意思吧？#n所謂的忍者，無論身陷何種絕境……！"
10051040-75 = "無論遇到何種逆境！"
10051040-76 = "都，都絕對……不會放棄！"
10051040-80 = "好，上吧！！"
10051040-82 = "時裝秀會場後院樹林"
10051040-86 = "很好，順利逃出來了。"
10051040-87 = "果然偽裝成送貨員就不會被懷疑。"
10051040-88 = "話說Shine Cat大人也真奇怪……平常明明總是壓線抵達，今天怎麼會突然提早呢？#n差點就要撞個正著了。"
10051040-89 = "算了，反正作品都有順利救出來就好。"
10051040-90 = "躲在這種樹木茂密的地方，應該很難被發現才對……"
10051040-91 = "我總算……把Shine Cat大人的作品弄到手了……！"
10051040-93 = "啊啊，Shine Cat。#n我人生的光，我生命的火焰啊……！"
10051040-94 = "最偉大的設計師為時裝秀親手打造的，這世上獨一無二的衣服……！"
10051040-95 = "然而所有衣服都注定會被某個人穿上，最終面臨損壞的悲哀命運……  "
10051040-96 = "原本能帶給更多人靈感的藝術品，居然淪落為一介消耗品……這無疑是場悲劇！"
10051040-98 = "因此我們「達達主義頭盔團」才不得不挺身而出……！"
10051040-99 = "真正偉大的衣服，唯有永遠不被穿上才能獲得不朽的價值。"
10051040-100 = "所以這件作品必須經過防腐處理，永遠掛在我們組織的辦公室裡才行。"
10051040-101 = "呵呵呵，唔呵呵，呵呵呵……"
10051040-107 = "什麼，這裡原本有樹嗎？"
10051040-108 = "我……我不是樹……"
10051040-109 = "說的也是？畢竟哪有樹會突然長出來擋路呢。"
10051040-110 = "那我就先走一步囉？"
10051040-111 = "不，不可以……！"
10051040-112 = "為什麼？"
10051040-113 = "你，偷了衣服對吧……"
10051040-114 = "你說我偷！？ "
10051040-116 = "我只是把衣服，轉移到能發揮它真正價值的地方而已！ "
10051040-117 = "一個不會玷汙這件偉大作品的地方！"
10051040-118 = "這麼了不起的衣服，如果因為被某個人穿上而變舊變破……豈不是太令人悲傷了嗎？"
10051040-119 = "不，不管有什麼理由，竊盜就是竊盜……"
10051040-120 = "嘖，所以我才受不了這些不懂藝術價值的外行人……"
10051040-121 = "連藝術是什麼都不懂，還隨便把人當成小偷……不對，先等一下。"
10051040-122 = "……我為什麼要跟你解釋這麼多啊！？"
10051040-127 = "這，這裡是臥底03！#n發現小偷了！就在後院的雕像旁邊！！"
10051040-128 = "可惡！是警衛嗎！！給我閃開！"
10051040-129 = "我……我不要！"
10051040-130 = "因為我是忍者！！"
10051040-131 = "忍者又是什麼東西啊！？"
10051040-142 = "時裝秀會場內部"
10051040-144 = "聽到無線電了吧！？#n月夜發現小偷了！在後院！"
10051040-145 = "立刻出動！部長！"
10051040-147 = "時裝秀會場後院樹林"
10051040-148 = "哈啊，哈啊……這傢伙的力氣怎麼這麼大啊？"
10051040-159 = "忍，忍者是絕對不會放棄的！"
10051040-160 = "所以忍者到底是什麼啦！？快點放開我！！"
10051040-161 = "我，我不放！！"
10051040-163 = "[ns]「已經可以放手了，月夜。」"
10051040-164 = "因為……！"
10051040-165 = "我們也會一起戰鬥，忍忍！"
10051040-169 = "即刻參戰！！"
10051040-170 = "部長……！伊樹菜醬……！"
10051040-171 = "你們這群卑鄙的傢伙！竟然以多欺少！"
10051040-172 = "你偷別人的衣服難道就不卑鄙嗎！？"
10051040-173 = "少，少囉嗦！我這並不是偷，而是把作品送到能好好珍惜它的地方……"
10051040-174 = "嘖，算了！反正這種情況也在預料之中！"
10051040-176 = "達達主義頭盔團！集合！！"
10051040-185 = "同志們啊！在這件作品平安離開這裡之前……"
10051040-186 = "保護我吧！"

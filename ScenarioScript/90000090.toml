[translation]
90000090-1 = "ตอนที่ 9; รวบรวมข้อมูล 8 - เคเทอร์"
90000090-2 = "ห้องชมรมปรากฏการณ์ลี้ลับ"
90000090-5 = "รอกันนานเลยสินะคะ จากนี้ฉันจะเริ่มอธิบายภารกิจใหม่ให้ทราบค่ะ"
90000090-10 = "ว้าว"
90000090-11 = "[s1] \"ว้าว\"\n[s2] (ปรบมือ)"
90000090-12 = "อะไรกันคะ... ให้ความรู้สึกเหมือนบรรยากาศการประชุมวิชาการเลยนะคะ?"
90000090-13 = "อะไรกันคะ... ให้ความรู้สึกเหมือนบรรยากาศการประชุมวิชาการเลยนะคะ?"
90000090-14 = "ฉันก็แค่วิเคราะห์รูปแบบการปรากฏตัวของเคเทอร์ และกำหนดเส้นทางที่เราจะลอบเข้าไปเท่านั้น#nเองค่ะ"
90000090-15 = "อืม เป็นเรื่องที่มีแค่หัวหน้าฮิมาริเท่านั้นที่ทำได้ใช่มั้ยล่ะ? เยี่ยมไปเลย ปรบมือ-"
90000090-16 = "[s] \"สุดยอดเลย ปังมาก!\""
90000090-17 = "อย่างนี้เองสินะคะ..."
90000090-18 = "ถึงจะพยายามแค่ไหนก็ไม่อาจปิดบังความอัจฉริยะของฉันเอาไว้ได้ จะว่าไปก็เหมือนกับใบหน้า#nอันแสนงดงามของฉัน ที่ไม่ว่าใครก็ต้องยอมรับ และพูดเป็นเสียงเดียวกัน..."
90000090-19 = "ฮุฮุ... เอมิก็ไม่ธรรมดาเลยนะคะเนี่ย สัมผัสได้ถึงความอัจฉริยะของฉันด้วยเหรอคะ? ฮุฮุฮุ"
90000090-20 = "... อืม ก็ใช่ สัมผัสได้แบบสุดๆ เลย หมายถึงแรงกดกันน่ะ"
90000090-21 = "ฮุฮุ อย่างนั้นเหรอคะ"
90000090-22 = "[s] (เอมิเองก็เป็นคนอ่อนโยนเหมือนกันสินะ...)"
90000090-25 = "ก่อนอื่นฉันคำนวณพิกัดการปรากฏตัวของเคเทอร์ และระบุตำแหน่งที่เคเทอร์กำลังป้องกันอยู่#nมาได้แล้วค่ะ"
90000090-30 = "อยู่ในพื้นที่ที่ห่างไกลจากพื้นที่รกร้างจมน้ำ และเป็นเขตที่มีห้องวิจัยและห้องทดลอง"
90000090-31 = "ขอเรียกง่ายๆ ว่า <พื้นที่วิจัย> แล้วกันนะคะ"
90000090-33 = "<พื้นที่วิจัย>... พื้นที่เป้าหมายของพวกเราสินะ"
90000090-34 = "ใช่ค่ะ หรือถ้าจะให้ถูก ต้องบอกว่าเป็นสถานที่สุดท้ายที่ตรวจพบสัญญาณของเดคาแกรมมาทอน..."
90000090-35 = "เราต้องทิ้งระยะห่างจากผู้เลื่อมใสอย่างเคเทอร์ให้ได้ เพื่อไปถึงที่นั่นค่ะ"
90000090-36 = "แต่ถึงจะพูดว่าทิ้งระยะห่าง แต่ยังไงพวกเราก็ต้องเข้าไปยังพื้นที่นั้นและทำภารกิจค้นหาสัญญาณที่#nตรวจพบ..."
90000090-37 = "และก็คงจะไม่ใช่เรื่องง่าย เพราะกำลังถูกเคเทอร์ไล่ล่าอยู่..."
90000090-38 = "สรุปแล้วคือเราจำเป็นต้องทำให้เคเทอร์ยอมจำนนให้ได้ค่ะ"
90000090-39 = "สุดท้ายก็คือเราต้องกำจัดเคเทอร์ให้ได้ใช่มั้ย?"
90000090-40 = "ใช่แล้วค่ะ และตอนนี้เราจะทำการรวบรวมข้อมูลเพื่อปฏิบัติการให้สำเร็จค่ะ!"
90000090-41 = "ถ้าที่ผ่านมาคือการเล่นซ่อนหา ต่อจากนี้ไปคือการวิ่งไล่จับค่ะ!"
90000090-42 = "เคเทอร์เป็นคนไล่จับ... อ่า ไม่ใช่สินะ"
90000090-43 = "[s] \"อืม ถึงตาเราเป็นฝ่ายไล่จับบ้างแล้ว\""
90000090-44 = "ค่ะ ถ้างั้นเรามาเริ่มรวบรวมข้อมูลเพื่อจับกุมเคเทอร์กันเลยค่ะ!"

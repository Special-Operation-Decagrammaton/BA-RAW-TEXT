[translation]
90000090-1 = "Episode 10;Research Part 8: Kether"
90000090-2 = "Super Phenomenon Task Force Club Room"
90000090-5 = "Thank you for your patience everyone. Here's the new mission brief."
90000090-10 = "...Wow!"
90000090-11 = "[s1] \"Whoa...\"\n[s2] *applause*"
90000090-12 = "...Uh, you're making me feel like I'm about to present at the school's arts festival."
90000090-13 = "...Uh, you're making me feel like I'm about to present at the school's arts festival."
90000090-14 = "I'm just proposing a different infiltration route based on Kether's patterns."
90000090-15 = "Yes, but no one would be able to analyze its patterns and develop a route like you. So, consider us very impressed."
90000090-16 = "[s] \"Truly impressive. Excellent job!\""
90000090-17 = "...Thank you."
90000090-18 = "Try hard as I might, I simply cannot hide my genius. It's like my exceptional beauty, it's just so blatantly obvious it can't be ignored."
90000090-19 = "Haha... Not bad, Eimi. Good on you for noticing my superior intellect! Heeheehee."
90000090-20 = "...Uh-huh, yup. It's totally impossible to not notice... It's overwhelming..."
90000090-21 = "Heehee. Yes, yes, of course."
90000090-22 = "[s] (Aw, Eimi is so considerate...)"
90000090-25 = "First of all, I reverse-engineered the coordinates where Kether appeared to try and identify the territory it's defending."
90000090-30 = "It's focused on an area on the extreme outskirts of the Ruined Submerged District. An area with many research facilities and labs..."
90000090-31 = "For convenience, we'll refer to it as the \"Research District.\""
90000090-33 = "The Research District... So that's our target."
90000090-34 = "Correct. To be precise, our final target is the location where Decagrammaton's signal was detected."
90000090-35 = "And we must evade the prophet Kether to get there..."
90000090-36 = "And even if our evasion is successful, we still need to locate the detected signal and investigate the area..."
90000090-37 = "Kether will be hot on our tracks the entire time, making our task nearly impossible."
90000090-38 = "Which brought me to the conclusion that neutralizing Kether is absolutely necessary."
90000090-39 = "Our new mission objective is to defeat Kether, then?"
90000090-40 = "Correct. And starting now, our task is to collect any and all information that will help us achieve that end!"
90000090-41 = "So if this has been a game of tactical hide-and-seek so far, now it's a game of tactical tag!"
90000090-42 = "So Kether is It...? Or, no, wait..."
90000090-43 = "[s] \"Yes. So now we're It.\""
90000090-44 = "Indeed. Our mission to gather intel on how to attack Kether begins now!"

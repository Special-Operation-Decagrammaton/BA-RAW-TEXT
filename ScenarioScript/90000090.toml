[translation]
90000090-1 = "第10話;蒐集情報(8)凱瑟"
90000090-2 = "特異現象搜查部・部室"
90000090-5 = "讓各位久等了。#n接下來，開始新任務的會議吧。"
90000090-10 = "耶──！"
90000090-11 = "[s1]「耶──！」\n[s2]拍手"
90000090-12 = "……這個氣氛是怎麼回事。"
90000090-13 = "……這個氣氛是怎麼回事。"
90000090-14 = "只不過是完成了凱瑟的分析，#n要說明下一個潛入路線而已……"
90000090-15 = "嗯。#n不過這是只有陽葵部長才能辦到的事對吧，所以要拍手。"
90000090-16 = "[s]「謝謝你，陽葵。」"
90000090-17 = "……原來如此。"
90000090-18 = "也就是我的天賦想藏也藏不住的意思對吧。#n與我的美貌相比也一點都不遜色，不管是誰都會一目了然的狀況──"
90000090-19 = "呵呵……英美也總算是注意到我閃閃發光的天賦了啊。#n呵呵呵。"
90000090-20 = "……對呀，嗯。#n注意到了唷，在各種方面。"
90000090-21 = "呵呵，這樣啊……"
90000090-22 = "[s]（英美真善良啊……）"
90000090-25 = "首先，我從凱瑟出現的座標，大致篩選出了它所保護的區域。"
90000090-30 = "是在廢墟淹沒地區裡相當外圍的位置，有著研究室和實驗室等等的區域──"
90000090-31 = "為了方便，就稱為「研究地區」吧。"
90000090-33 = "「研究地區」……那邊就是我們的目的地吧。"
90000090-34 = "沒錯。雖然正確來說，捕捉到十字神名信號的地點才是最終目標……"
90000090-35 = "想要到達那裡，就必須甩掉預言者凱瑟。"
90000090-36 = "除此之外，就算成功擺脫了凱瑟，還是需要對區域進行探索……"
90000090-37 = "在被凱瑟追擊的狀態下，恐怕會有困難……"
90000090-38 = "所以說，讓凱瑟無力化是必要的。"
90000090-39 = "結果還是得打倒凱瑟嗎？"
90000090-40 = "沒錯。接下來，就要開始為此蒐集情報！"
90000090-41 = "如果說先前玩的是「捉迷藏」的話，#n接下來要玩的就是「鬼抓人」！"
90000090-42 = "凱瑟不是「鬼」啊。"
90000090-43 = "[s]「這次換我們當鬼了？」"
90000090-44 = "沒錯，正是如此。#n那麼……為了攻略凱瑟，開始蒐集情報吧！"

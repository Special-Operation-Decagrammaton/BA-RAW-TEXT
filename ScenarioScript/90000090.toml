90000090-11 = "[s1] \"와아-\"\n[s2] (박수를 친다)"
90000090-12 = "5;히마리;02;……. 뭐죠, 이 학예회의 발표 느낌은?\n#5;em;[땀]\n#3;m1\n#5;a"
90000090-13 = "5;히마리;02;……. 뭐죠, 이 학예회의 발표 느낌은?\n#5;em;[땀]\n#3;m1\n#5;a"
90000090-14 = "5;히마리;05;케테르가 출몰하는 패턴을 분석해서 우리의 다음 잠입 루트를 제시하는 것뿐인데요?"
90000090-15 = "3;에이미;03;응. 그건 역시 히마리 부장만이 가능한 일이잖아? 대단해. 그러니까 박수-\n#3;em;[음표]"
90000090-16 = "[s] \"대단해, 대단해.\""
90000090-17 = "5;히마리;03;……과연."
90000090-18 = "5;히마리;99;저의 천재성은 숨기려고 해도 숨길 수 없달까. 마치 저의 미모처럼 누구나 보기만해도 인정할 수밖에 없는 그런 느낌이랄까……"
90000090-19 = "5;히마리;01;후후…… 에이미도 제법이군요. 저의 천재성을 감지한 건가요? 후후후.\n#5;em;[반짝]"
90000090-20 = "3;에이미;04;……. 응. 그렇지. 엄청 느껴지고 있어. 압력 같은게.\n#3;em;[땀]"
90000090-21 = "5;히마리;09;후후. 과연. 과연."
90000090-22 = "[s] (에이미는 상냥하구나…….)"
90000090-23 = "#all;hide"
90000090-24 = "#wait;2000"
90000090-25 = "3;히마리;S2_05;일단 케테르가 출몰하는 좌표를 역산해서 케테르가 방어하고 있는 지역을 특정해 보았어요.\n#3;a"
90000090-26 = "#st;[0,0];instant;1;"
90000090-27 = "#clearST"
90000090-28 = "#all;hide\n#wait;1500"
90000090-29 = "#all;hide"
90000090-30 = "#na;히마리;폐허수몰지구에서도 꽤나 외곽에 있는 곳으로, 연구실이나 실험실 등이 있는 지역."
90000090-31 = "#na;히마리;편의상, <연구지구>라고 부르겠습니다."
90000090-32 = "#all;hide"
90000090-33 = "3;에이미;06;<연구지구>…… 저기가 우리의 목적지인 거네.\n#3;em;[...]\n#3;a"
90000090-34 = "5;히마리;S2_01;네. 정확히는 저 안에 데카그라마톤의 신호가 포착된 장소가 최종 목표이지만…….\n#3;m1\n#5;a"
90000090-35 = "5;히마리;S2_06;그곳에 도달하기 위해선 예언자 케테르를 따돌려야만 하겠죠……."
90000090-36 = "5;히마리;S2_05;하지만 따돌린다고 해도, 우리는 그 지역 안에서 우리가 포착한 신호를 찾아내고 탐색을 진행해야 하니……."
90000090-37 = "5;히마리;S2_04;케테르에게 추격당하고 있는 채로는 힘들겠죠…….\n#5;em;[속상함]"
90000090-38 = "5;히마리;S2_02;그래서 여기서는 케테르를 무력화시키는 것이 반드시 필요하다는 결론이에요."
90000090-39 = "3;에이미;05;결국 케테르를 쓰러트려야 하는 거지?\n#3;em;[?]"
90000090-40 = "5;히마리;S2_05;맞아요. 지금부터는 그것을 위한 정보 수집입니다!"
90000090-41 = "5;히마리;S2_11;지금까지는 숨바꼭질이었다면, 이제부터는 술래잡기예요!\n#5;em;[반응]"
90000090-42 = "3;에이미;06;케테르가 술래……가 아니구나.\n#3;em;[땀]"
90000090-43 = "[s] \"응. 이젠 우리가 술래야.\""
90000090-44 = "5;히마리;S2_03;네. 그럼 지금부터 케테르 공략을 위한 정보수집, 시작하겠습니다!\n#5;m3\n#3;dl"
90000090-45 = "#wait;500"

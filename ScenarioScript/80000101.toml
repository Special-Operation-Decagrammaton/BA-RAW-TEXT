[translation]
80000101-1 = "Something Very Important"
80000101-2 = "I visited Genryumon after receiving a message from Mina..."
80000101-3 = "...So that's when I thought to myself— What's the one thing that's the most important to me?!"
80000101-4 = "My shades? My striped coat? My twin pistols? They're critical. Vital! So up they go!"
80000101-5 = "The president's a given, as are the members under me, not to mention all my responsibilities. They all mean a lot to me."
80000101-6 = "[s] \"...So you're saying you've got so many important things that you can't choose?\""
80000101-7 = "Sure. Yesterday. The me of today's got it all figured out."
80000101-8 = "After a very long think, I've come to realize that what is most important to me!"
80000101-9 = "Piqued your curiosity have I? Good... You're keeping up. So what do I care for the most?"
80000101-10 = "It's..."
80000101-11 = "This!"
80000101-15 = "[ns] \"And this is...?!\""
80000101-16 = "I thought hard."
80000101-17 = "I mused, pondered, and then went straight back to thinking. This was my answer."
80000101-18 = "Something that stands among only the truly important. That thing..."
80000101-19 = "Is Genryumon itself!"
80000101-20 = "[s] \"So, that's what it was!\""
80000101-21 = "That's right! And today, according to global consensus, is Valentine's Day!"
80000101-22 = "Letting such an important day pass with no celebration would be downright unjust!"
80000101-23 = "[s] \"(I'm not sure what Valentine's Day has to do with justice...)\""
80000101-24 = "As such, I, Konoe Mina, have created a chocolate in the shape of Genryumon's crest for you, Sensei!"
80000101-25 = "[s] \"Oooh, lovely. Thank you. I'll enjoy it.\""
80000101-26 = "Wait!!"
80000101-27 = "What are you doing? You can't just break the Genryumon emblem!"
80000101-28 = "[s] \"But it's going to be super difficult to eat otherwise...\""
80000101-29 = "No! Absolutely not! Over my cold, dead body!"
80000101-30 = "How are you supposed to eat it then? Just gulp it down in one bite!"
80000101-31 = "The chocolate's too big for that? Well! Er. Um..."
80000101-32 = "..."
80000101-33 = "(What a mess. I didn't consider something like this would be a problem.)"
80000101-34 = "Come on! Say Ahhhh! Open wide and get it down in one!"
80000101-35 = "[s] \"I keep telling you, that's not happening...\""
80000101-36 = "Argh, this is so frustrating! Give it here! Do it like—!"
80000101-37 = "..."
80000101-38 = "It doesn't work?!"
80000101-39 = "[s] \"Of course not!\""
80000101-40 = "Hnngh, I can do this! I've got the powers of tradition, justice, and camaraderie on my side!"
80000101-44 = "...Oh."
80000101-45 = "[s] \"The chocolate Genryumon emblem broke?!\""
80000101-46 = "A-Ahhhh, what do I do, Sensei?"
80000101-47 = "I'm an executive officer of Genryumon! If word gets out that I chomped through a chocolate version of our logo...!"
80000101-48 = "Ahhhhh! Forgive me, my president! It wasn't on purpose! I know actions matter more than deeds but...!"
80000101-49 = "[s] \"Calm down, Mina. Deep breaths.\""
80000101-50 = "Y-Yeah... *phew* *hah* *phew* *hah*"
80000101-51 = "N-Now what?"
80000101-52 = "[s1] \"Ever heard the saying, no body, no crime?\"\n[s2] \"We should eat all of the chocolate and get rid of any trace it existed.\""
80000101-55 = "!"
80000101-56 = "I see... We could use that method!"
80000101-57 = "You always find a way, Sensei!"
80000101-58 = "Now then, let's kick off Operation: Eat the Evidence!"
80000101-60 = "Phew... What a lot of chocolate."
80000101-61 = "[s] \"Nice job, Mina...\""
80000101-62 = "No, that was all you."
80000101-63 = "Congratulations on helping me pull off the perfect crime!"
80000101-64 = "In light of your achievements, I'd like to deputize you as an honorary officer of Genryumon. What do you think?"
80000101-65 = "[s] \"No thank you. It's quite all right. Really.\""
80000101-66 = "No, Sensei. Think about it. This could be a mutually beneficial partnership."
80000101-67 = "Genryumon would get a powerful ally, and you could have our protection wherever you go..."
80000101-68 = "Huh? You sure you want to table this talk for now? Hm... I'm disappointed, but all right."
80000101-69 = "Wait... Aren't we forgetting something? I feel like we are."
80000101-70 = "Valentine's Day, the chocolate... Chocolate... I think I had something important to say regarding that..."
80000101-72 = "I barely managed to stop Mina from remembering whatever she had in mind and quickly wrapped up our conversation."

[translation]
80000101-1 = "#title;매우 중요한 것"
80000101-2 = "#na;(미나의 연락을 받고 현룡문에 방문했다……)"
80000101-3 = "3;미나;05;……그래서 생각했지. 내게 있어 손가락에 꼽을 정도로 중요한 것이 무엇일까!\n#3;a\n#3;em;…"
80000101-4 = "3;미나;11;선글라스? 줄무늬 코트? 쌍권총? 물론 전부 중요해. 하나같이 모두 중요해서 하나만 고를 수가 없을 정도로!"
80000101-5 = "3;미나;99;문주님은 당연하고, 챙겨줘야 할 부원들도 있고, 관리해야 할 사항도 많고. 그것들도 전부 내게는 중요한 것들이야."
80000101-6 = "[s] \"……중요한 게 너무 많아서, 고를 수 없었다는 이야기야?\""
80000101-7 = "3;미나;08;바로 그게 어제까지의 결론이었지. 하지만 오늘의 나는 다르다."
80000101-8 = "3;미나;14;수도 없이 이어진 고민의 끝에, 정말로 중요한 것이 무엇인지 스스로 깨닫게 되었으니까!"
80000101-9 = "3;미나;09;그게 뭔지 선생님까지 궁금해졌다고? 좋아, 좋아…… 흐름을 잘 따라오고 있군."
80000101-10 = "3;미나;07;그것은……"
80000101-11 = "3;미나;13;바로 이것이다!\n#3;em;[!]\n#3;closeup"
80000101-12 = "#st;[0,0];instant;1;"
80000101-13 = "#clearST"
80000101-14 = "#wait;1500\n#all;hide\n#bgshake"
80000101-15 = "[ns] \"이것은……?!\""
80000101-16 = "1;미나;05;생각했지.\n#1;a"
80000101-17 = "1;미나;06;생각하고, 고민하고, 살피고 고심한 끝에, 결론을 내렸어.\n#1;stiff"
80000101-18 = "1;미나;10;내게 있어 손에 꼽을 정도로 중요한 것. 그것은 바로……\n#1;m3\n#1;em;…"
80000101-19 = "1;미나;13;현룡문 그 자체라고 말이다!\n#1;closeup"
80000101-20 = "[s] \"그런 것이었나……!\""
80000101-21 = "1;미나;11;그렇다! 그리고 오늘은, 세간의 풍습에 따르자면 발렌타인 데이라는 날!\n#1;em;[!]"
80000101-22 = "1;미나;02;그런 세간의 기념일을, 아무 일 없이 지나가는 것도 대의에 어긋나는 일!"
80000101-23 = "[s] (발렌타인 데이와 대의는 상관없지 않을까……)"
80000101-24 = "1;미나;13;그리하여 나 코노에 미나! 현룡문의 상징 문양을, 이렇게 초콜릿으로 만들어 선생님에게 헌사 하려는 것이다!\n#1;em;[반응]"
80000101-25 = "[s] \"어…… 응. 그래. 고마워. 잘 먹을게.\""
80000101-26 = "1;미나;13;기다려!\n#1;em;[!]"
80000101-27 = "1;미나;11;뭘 하려는 거지? 지금 현룡문의 문양을, 부수어 쪼개려고 하는 것인가?!"
80000101-28 = "[s] \"아니, 하지만 그렇게 하지 않으면 먹을 수가 없고……\""
80000101-29 = "1;미나;14;안 돼! 용납할 수 없다! 적어도 내 눈에 흙이 들어가기 전까지는 불허한다!\n#1;hophop\n#1;em;[스팀]"
80000101-30 = "1;미나;13;그러면 어떻게 먹어야 하느냐고? 적어도 문양이 상하지 않도록, 한입에 먹어!"
80000101-31 = "1;미나;04;그러기에는 초콜릿이 너무 큰 거 아니냐고? 그것은! 그것, 은……\n#1;stiff"
80000101-32 = "1;미나;04;……"
80000101-33 = "1;미나;16;(곤란하다. 미처 생각하지 못했어.)\n#1;em;[땀]\n#1;stiff"
80000101-34 = "1;미나;11;아무튼! 근성이다! 근성으로 입을 벌려서 한입에 먹는 거야!\n#1;hophop"
80000101-35 = "[s] \"그러니까 그게 무리라는 건데……\""
80000101-36 = "1;미나;13;에잇, 답답하군! 잠깐 줘 봐! 이렇게 하면……!\n#1;em;[!]"
80000101-37 = "1;미나;01;……\n#1;stiff"
80000101-38 = "1;미나;04;왜 안 되는 거지?!\n#1;shake\n#1;em;[?!]"
80000101-39 = "[s] \"당연하잖아!\""
80000101-40 = "1;미나;14;아니야, 할 수 있어! 전통과 의와 협과 의지만 있으면, 어떤 난관이라도……!\n#1;stiff"
80000101-41 = "#st;[0,0];instant;1;"
80000101-42 = "#clearST"
80000101-43 = "#wait;1500"
80000101-44 = "1;미나;04;……아."
80000101-45 = "[s] \"현룡문 문양 초콜릿이…… 산산조각났어?!\""
80000101-46 = "1;미나;04;어, 어어어어어, 어떡하지, 선생님?\n#1;stiff\n#1;em;[땀]"
80000101-47 = "1;미나;06;다른 누구도 아니고, 현룡문의 집행부장인 이 내가, 현룡문의 문양을 훼손시켰다는 사실이 알려지면……!"
80000101-48 = "1;미나;06;아아아아, 죄송합니다, 문주님! 고의가 아니었습니다! 물론 이런 일은 고의냐 아니냐는 그다지 중요하지 않지만……!\n#1;em;[훌쩍]\n#1;stiff"
80000101-49 = "[s] \"진정해. 미나. 일단 심호흡을 하자.\""
80000101-50 = "1;미나;02;으, 으응…… 후우. 하아. 후우. 하아.\n#1;stiff"
80000101-51 = "1;미나;04;이제…… 다음은 어떡하지?"
80000101-52 = "[s1] \"완전범죄에는, 증거인멸이 무엇보다 중요해.\"\n[s2] \"그러니까, 이 초콜릿을 모두 먹어 없애는 거야.\""
80000101-53 = "#wait;10"
80000101-54 = "#wait;10"
80000101-55 = "1;미나;02;!\n#1;em;[전구]"
80000101-56 = "1;미나;15;그런가…… 그런 방법이 있었나!"
80000101-57 = "1;미나;15;과연 선생님이야! 결국 다시 방법을 찾아내는군!\n#1;em;[재잘]"
80000101-58 = "1;미나;01;그러면 지금부터…… 같이 초콜릿을 먹어 없애자!"
80000101-59 = "#all;hide"
80000101-60 = "3;미나;02;후우…… 제법 양이 많았어.\n#3;a\n#3;em;[한숨]"
80000101-61 = "[s] \"고생했어, 미나……\""
80000101-62 = "3;미나;06;아니, 고생한 것은 선생님 역시 마찬가지지."
80000101-63 = "3;미나;08;아무튼, 이것으로 선생님 덕분에 완전범죄가 성립된 셈이군!"
80000101-64 = "3;미나;02;그 공을 높이 사서, 선생님을 현룡문의 명예 간부로 추대할까 하는데, 어떻게 생각하지?"
80000101-65 = "[s] \"아니, 됐으니까. 정말 괜찮으니까.\""
80000101-66 = "3;미나;09;아니야, 선생님. 잘 생각해 보라고. 이건 서로에게 좋은 기회인지도 모른다.\n#3;em;[반응]"
80000101-67 = "3;미나;08;현룡문은 선생님이라는 강력한 아군을 얻게 되고, 선생님 역시 현룡문의 비호 아래 언제, 어디서든……"
80000101-68 = "3;미나;02;음? 정말 괜찮다고? 제발 그만둬 달라고? 흐음…… 그런가. 아쉽군.\n#3;em;[땀]"
80000101-69 = "3;미나;10;그런데…… 우리, 뭔가 잊어버리고 있지 않은가? 내게는 왠지 그런 생각이 드는데 말이야."
80000101-70 = "3;미나;14;발렌타인 데이, 초콜릿…… 초콜릿…… 그것과 관련하여 무언가 중요한 사건이나, 할 이야기가 있었던 것 같은데……\n#3;em;…\n#3;closeup"
80000101-71 = "#all;hide"
80000101-72 = "#na;(무언가를 생각해 내려는(?) 미나를 간신히 만류하며, 어떻게든 이야기를 마무리지었다.)"

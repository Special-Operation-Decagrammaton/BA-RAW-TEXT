[translation]
80000101-1 = "最重要的東西"
80000101-2 = "（接到美奈的聯絡，拜訪了玄龍門……）"
80000101-3 = "……所以我想過了。#n對我來說最重要的東西究竟是什麼呢！"
80000101-4 = "墨鏡？條紋大衣？雙槍？#n這些當然全都很重要，甚至讓人無法只選出一個！"
80000101-5 = "門主大人自不用說，那些需要照顧的成員，以及必須管理的事項……#n對我來說也全都是重要的東西。"
80000101-6 = "[s]「……意思是重要的東西太多了，你選不出來嗎？」"
80000101-7 = "到這邊為止是昨天下的結論，但今天的我已經不一樣了。"
80000101-8 = "歷經無數的苦惱之後，我已經釐清了自己真正重視的是什麼！"
80000101-9 = "連老師也覺得好奇了嗎？#n很好很好……別被我拋下了哦。"
80000101-10 = "答案……"
80000101-11 = "就是這個！"
80000101-15 = "[ns]「這是……！？」"
80000101-16 = "我思考過了。"
80000101-17 = "在苦惱、觀察和苦思之後，我得出了一個結論。"
80000101-18 = "對我來說最重要的東西，那就是……"
80000101-19 = "玄龍門本身！"
80000101-20 = "[s]「是這樣嗎……！」"
80000101-21 = "沒錯！而今天這個日子，在世間的習俗中是情人節！"
80000101-22 = "這樣的節日，如果無所事事地度過，實在有違大義！"
80000101-23 = "[s]（情人節跟大義應該沒什麼關係吧……）"
80000101-24 = "於是，我近衛美奈！要將玄龍門的紋樣製成巧克力獻給老師！"
80000101-25 = "[s]「啊……嗯。謝謝你，我會好好享用的。」"
80000101-26 = "且慢！"
80000101-27 = "老師剛才打算做什麼？是打算破壞掉玄龍門的紋樣嗎！？"
80000101-28 = "[s]「呃，可是不這樣的話該怎麼吃呢……」"
80000101-29 = "不行！我絕不容許！至少在我死之前絕不允許！"
80000101-30 = "問我不然該怎麼吃？#n……至少不能破壞到紋樣，一口吃掉吧！"
80000101-31 = "這巧克力要一口吃掉是不是太大了……？#n呃，這……"
80000101-32 = "……"
80000101-33 = "（完蛋，我沒考慮到這個問題）"
80000101-34 = "總之……就靠毅力吧！靠毅力張開嘴巴，一口吃掉它！"
80000101-35 = "[s]「根本不可能吧……」"
80000101-36 = "哎咿，真是的！先借我一下！#n只要像這樣……！"
80000101-37 = "……"
80000101-38 = "為什麼行不通！？"
80000101-39 = "[s]「那不是當然的嗎！」"
80000101-40 = "不，一定做得到！#n只要心懷傳統、大義、團結和信念，任何難關都能克服……！"
80000101-44 = "……啊。"
80000101-45 = "[s]「玄龍門紋樣的巧克力……碎掉了！？」"
80000101-46 = "該，該該該該該，該怎麼辦，老師？"
80000101-47 = "如果不是別人，而是身為執行部長的我毀壞了玄龍門紋樣的事被傳出去……！"
80000101-48 = "啊啊啊啊，非常抱歉，門主大人！我不是故意的！#n雖然是不是故意的根本不是重點……！"
80000101-49 = "[s]「冷靜點，美奈。先深呼吸。」"
80000101-50 = "嗯……呼，哈，呼，哈。"
80000101-51 = "那麼……接下來該怎麼辦？"
80000101-52 = "[s1]「如果想實施完美犯罪，就一定要消滅證據。」\n[s2]「把這個巧克力全部吃掉吧。」"
80000101-55 = "！"
80000101-56 = "原來如此……還有這種方法啊！"
80000101-57 = "真不愧是老師！！"
80000101-58 = "那從現在開始……我們一起把巧克力吃掉吧！"
80000101-60 = "呼……量還真多。"
80000101-61 = "[s]「辛苦了，美奈……」"
80000101-62 = "不，老師也同樣辛苦。"
80000101-63 = "總之，多虧老師的幫忙，完美犯罪才得以成立！"
80000101-64 = "為了表揚這份巨大的功績，我想推舉老師擔任玄龍門的榮譽幹部，你覺得如何？"
80000101-65 = "[s]「沒關係，真的不用……」"
80000101-66 = "不，老師。請好好考慮一下，或許這對雙方來說都是個好機會。"
80000101-67 = "玄龍門能得到老師這個強力的夥伴，老師則能獲得玄龍門的庇護，無論何時何地……"
80000101-68 = "嗯？真的不用？拜託我放棄這個想法？#n哼嗯……這樣嗎？真可惜。"
80000101-69 = "不過話說回來……我好像有種遺忘了什麼的感覺。"
80000101-70 = "情人節，巧克力……巧克力……#n總覺得有跟這些相關的重要事情要說……"
80000101-72 = "（努力勸阻(？)美奈試圖回想的行為，勉強結束了對話）"

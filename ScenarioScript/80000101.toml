[translation]
80000101-1 = "สิ่งที่สำคัญมาก"
80000101-2 = "(คุณครูมาที่มังกรดำหลังได้รับการติดต่อจากมินะ)"
80000101-3 = "ฉันลองคิดดูแล้วว่าสิ่งสำคัญมากๆ สำหรับฉันคืออะไรกัน!"
80000101-4 = "แว่นกันแดด? เสื้อโค้ตลายทาง? ปืนสั่นคู่? แน่นอนว่าของพวกนั้นสำคัญกับฉันทั้งหมด จะให้เลือกอย่างใดอย่างหนึ่งคงไม่ได้!"
80000101-5 = "นอกจากท่านประมุขแล้ว ก็ยังมีพวกสมาชิกคนอื่นๆ ที่ฉันต้องดูแล มีงานต่างๆ มากมายที่ต้องจัดการ เรื่องพวกนั้นน่ะ สำหรับฉันแล้วคือสิ่งสำคัญทั้งหมด"
80000101-6 = "[s] \"หมายความว่าเรื่องสำคัญเยอะเกินไป จนเลือกไม่ได้เหรอ?\""
80000101-7 = "จนถึงเมื่อวานนี้ฉันได้ข้อสรุปแบบนั้น แต่ว่าวันนี้ต่างออกไปแล้วละ"
80000101-8 = "หลังครุ่นคิดมาอย่างหนัก ฉันก็ตระหนักได้แล้วว่าสิ่งสำคัญที่สุดสำหรับตัวเองคืออะไร!"
80000101-9 = "คุณครูเองก็อยากรู้เรื่องนั้นใช่ไหมล่ะ? ดีละๆ... ทำความเข้าใจได้เร็วดีนี่"
80000101-10 = "และนั่นก็คือ..."
80000101-11 = "สิ่งนี้ยังไงล่ะ!"
80000101-15 = "[ns] \"นี่มัน...?!\""
80000101-16 = "คิดเอาไว้แล้วละ"
80000101-17 = "ฉันทบทวนและครุ่นคิดมาอย่างดีจนได้ข้อสรุปแล้ว"
80000101-18 = "สิ่งที่สำคัญที่สุดสำหรับฉัน นั่นก็คือ..."
80000101-19 = "มังกรดำทั้งหมดยังไงล่ะ!"
80000101-20 = "[s] \"อย่างนั้นเองเหรอ...!\""
80000101-21 = "ใช่แล้ว! และวันนี้วันวาเลนไทน์ที่คนทั่วโลกต่างเฉลิมฉลอง!"
80000101-22 = "วันเฉลิมฉลองของคนทั่วโลกแบบนี้ ถ้าปล่อยให้ผ่านไปอย่างไร้ความหมายก็คงจะขัดกับความ#nชอบธรรมอย่างมาก!"
80000101-23 = "[s] (วันวาเลนไทน์เกี่ยวอะไรกับความชอบธรรมก่อนเอ่ย...)"
80000101-24 = "เพราะงั้นฉัน... โคโนเอะ มินะ! ถึงได้แกะสลักช็อกโกแลตเป็นลวดลายสัญลักษณ์ของมังกรดำ เพื่อแสดงความนับถือต่อคุณครู!"
80000101-25 = "[s] \"เอ่อ... อื้อ ขอบคุณนะ ครูจะกินให้อร่อยเลย\""
80000101-26 = "ช้าก่อน!"
80000101-27 = "จะทำอะไรน่ะ? คิดจะทำลายสัญลักษณ์ของมังกรดำงั้นเหรอ?!"
80000101-28 = "[s] \"เดี๋ยวสิ ถ้าไม่หักครึ่งก็จะกินไม่ได้น่ะสิ...\""
80000101-29 = "ไม่ได้! ยกโทษให้ไม่ได้เด็ดขาด! ตราบใดที่ฉันยังมีลมหายใจอยู่ ฉันไม่มีวันยอมให้เกิดเรื่องอย่างนั้น#nเด็ดขาด!"
80000101-30 = "แล้วจะกินได้ยังไงน่ะเหรอ? งั้นก็กินเข้าไปภายในคำเดียวโดยไม่ทำให้สัญลักษณ์เสียหายก็สิ้นเรื่อง!"
80000101-31 = "ช็อกโกแลตมันไม่ใหญ่ไปหน่อยงั้นเหรอ? เรื่องนั้น...! เรื่องนั้น...น่ะ..."
80000101-32 = "......"
80000101-33 = "(แย่แล้ว ไม่ได้คิดถึงเรื่องนั้นเลย)"
80000101-34 = "ยังไงก็เถอะ! อ้าปากกว้างๆ แล้วก็กินเข้าไปในคำเดียวซะ!"
80000101-35 = "[s] \"ก็บอกว่ามันใหญ่เกินไปไง...\""
80000101-36 = "ฮึ่ย! น่าอึดอัดจริงๆ! เอามานี่ซิ! ทำแบบนี้...!"
80000101-37 = "....."
80000101-38 = "ทำไมไม่ได้ล่ะ?!"
80000101-39 = "[s] \"มันก็ไม่ได้อยู่แล้วสิ!\""
80000101-40 = "ไม่หรอก มันต้องได้สิ! ขอแค่มีความมุ่งมั่น ความเชื่อมั่นในประเพณี และความกล้าหาญ ไม่ว่าอุปสรรคใดก็ก้าวข้ามผ่านได้...!"
80000101-44 = "อ่า..."
80000101-45 = "[s] \"ช็อกโกแลตลายมังกรดำ... กลายเป็นเศษเล็กเศษน้อยไปแล้ว?!\""
80000101-46 = "อะ...เอ๋~~ ทำยังไงดีล่ะคุณครู?"
80000101-47 = "ไม่ใช่ใครอื่น แต่ดันเป็นฉัน... หัวหน้าคณะกรรมการของมังกรดำคนนี้ที่ทำให้สัญลักษณ์ของมังกรดำ#nพังลงไปกับมือ...!"
80000101-48 = "อ๊าาาา ขอโทษค่ะท่านประมุข! ฉันไม่ได้ตั้งใจจริงๆ ค่ะ! แน่นอนว่าจะตั้งใจหรือไม่ตั้งใจก็ไม่ใช่ประเด็น#nสำคัญในตอนนี้...!"
80000101-49 = "[s] \"ใจเย็นๆ ก่อนมินะ หายใจเข้าลึกๆ ก่อนนะ\""
80000101-50 = "ฮือ... ฮู่ว... ฮู่ว... "
80000101-51 = "ตอนนี้... จะทำยังไงต่อดีล่ะ?"
80000101-52 = "[s1] \"การทำลายหลักฐานคือสิ่งสำคัญของอาชญกรรมไร้ที่ติ\"\n[s2] \"เพราะงั้นเราต้องกินช็อกโกแลตนี่ให้หมดไม่ให้เหลือสักชิ้น\""
80000101-55 = "! "
80000101-56 = "งั้นเหรอ... มีวิธีแบบนั้นด้วยเหรอเนี่ย!"
80000101-57 = "สมกับเป็นคุณครูจริงๆ! สุดท้ายก็หาทางออกได้จริงๆ ด้วย!"
80000101-58 = "งั้นตั้งแต่นี้ไป... มาช่วยกันกินช็อกโกแลตให้หมดเถอะ!"
80000101-60 = "ฮู่ว... มันเยอะจริงๆ ด้วยนะ"
80000101-61 = "[s] \"เก่งมากเลยมินะ...\""
80000101-62 = "ไม่หรอก คนที่ลำบากคือคุณครูต่างหาก"
80000101-63 = "ยังไงก็เถอะนะ อาชญากรรมสมบูรณ์แบบครั้งนี้สำเร็จได้เพราะคุณครูเลยละ!"
80000101-64 = "เพื่อยกย่องคุณงามความดีของคุณครู ฉันจะเสนอชื่อให้คุณครูได้รับหน้าที่เจ้าหน้าที่กิตติมศักดิ์ของ#nมังกรดำ แบบนี้ดีไหม?"
80000101-65 = "[s] \"ไม่ดีกว่า ไม่เป็นไร\""
80000101-66 = "ไม่ได้สิคุณครู ลองคิดให้ดีๆ ก่อน นี่อาจเป็นโอกาสดีของทั้งสองฝ่ายก็ได้นะ"
80000101-67 = "มังกรดำก็จะได้พันธมิตรที่แข็งแกร่งอย่างคุณครูมาร่วมด้วย ส่วนคุณครูก็จะได้รับการคุ้มกันภายใต้ชื่อ#nของมังกรดำ ไม่ว่าตอนไหน ไม่ว่าเมื่อไร..."
80000101-68 = "หืม? ไม่เป็นไรจริงๆ งั้นเหรอ? หยุดคิดเรื่องนั้นจะดีกว่างั้นเหรอ? ฮึ่ม... งั้นเหรอ น่าเสียดาย"
80000101-69 = "แต่ว่า... พวกเราลืมอะไรไปรึเปล่า? ฉันรู้สึกเหมือนว่าเราลืมอะไรไปสักอย่างน่ะ"
80000101-70 = "วันวาเลนไทน์ ช็อกโกแลต... ช็อกโกแลต... ดูเหมือนมันจะมีเรื่องสำคัญบางอย่างในวันแบบนี้ด้วย..."
80000101-72 = "(คุณครูพยายามตัดจบเรื่องให้เร็วที่สุด ขณะที่มินะพยายามคิดอะไรบางอย่างอยู่...)"

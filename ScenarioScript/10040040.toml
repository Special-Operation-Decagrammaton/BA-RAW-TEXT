[translation]
10040040-1 = "ตอนที่ 4;ถ้าจะให้บอกตามจริง"
10040040-2 = "(คุณครูเดินหนีออกมาได้สักพักตามการบอกทางของโคทามะกับฮาเระ...)"
10040040-6 = "ดีละ คุณครู หยุดอยู่ตรงนั้นเดี๋ยวหนึ่งก่อน"
10040040-7 = "ต่อไปก็เดินไปให้สุด แล้วเลี้ยวขวาเข้าไป..."
10040040-8 = "เดี๋ยวก่อนค่ะ...!!"
10040040-13 = "ฉันได้ยินเสียงบางอย่าง เป็นเสียงอื่นที่ไม่ใช่เสียงจากคุณครูค่ะ"
10040040-17 = "[ns1] \"ฝั่งตรงข้ามเหมือนมีคนอยู่เลย...\"\n[ns2] \"รู้สึกว่ามีคนอยู่ที่ฝั่งตรงข้ามนะ...!\""
10040040-20 = "ห่างออกไป 40 เมตรสินะ จากเสียงที่ได้ยินตอนนี้ คนคนนั้นจะเลี้ยวเข้ามาในอีก 6 วินาทีค่ะ"
10040040-21 = "มีที่ให้ซ่อนตัวมั้ยนะ...!"
10040040-22 = "ประตูที่อยู่ข้างๆ คือประตูห้องครัว"
10040040-23 = "ฉันจะแฮ็กอุปกรณ์ล็อกประตูให้ ถ้าได้สัญญาณแล้วก็เข้าไปเลยนะ คุณครู"
10040040-31 = "[ns3] \"ขอบใจนะ ทั้งสองคนเลย!\"\n[ns4] รีบเปิดประตูเข้าไป"
10040040-40 = "อ๊ากกกก!! หัว... หัวฉัน...!!"
10040040-41 = "[ns5] \"โอ๊ยๆๆๆ...\"\n[ns6] \"โดนอะไรแข็งๆ เขกหัวเนี่ย...\""
10040040-48 = "เอ๋...!?"
10040040-49 = "คุณครู! คุณครูนี่คะ!? ทำไมคุณครูถึงมาอยู่ในที่แบบนี้ล่ะ...!?"
10040040-50 = "ฮู่ว... ทำเอาตกใจหมดเลย"
10040040-51 = "ฮึ่ย~ ฉันคิดว่าเป็นหนึ่งในรุ่นพี่เซมิน่าซะอีก ตกใจจนหัวใจลงไปอยู่ที่ตาตุ่มแล้วนะคะ!!"
10040040-52 = "[s7] \"ครูก็ตกใจเหมือนกันนั่นละที่เจอเราในห้องนี้!!\"\n[s8] \"มาซ่อนอยู่ในที่แบบนี้เองสินะเนี่ย\""
10040040-55 = "ค่ะ ฉันต้องทิ้งระยะห่างจากพวกรุ่นพี่ให้มากที่สุดก่อน แล้วจากนั้นค่อยหนีหรือทำอะไรก็ว่าไป"
10040040-56 = "เพราะว่าอาคารนี้น่ะ... แค่หนีออกมาได้ก็ใช่ว่าจะรอดหรอกค่ะ"
10040040-57 = "คะ...?"
10040040-58 = "อ้อ... ชุดนี้น่ะเหรอคะ? ค่ะ เห็นว่าเป็นชุดนอนที่รุ่นพี่ยูกะเอามาให้ฉันใส่น่ะค่ะ"
10040040-59 = "[s9] \"แล้วก็ยอมใส่ให้จริงๆ ด้วยนะ\"\n[s10] \"เชื่อฟังคำพูดของรุ่นพี่เหมือนกันนะเรา\""
10040040-62 = "ทำไมเหรอคะ...?"
10040040-63 = "มันเกี่ยวกันด้วยเหรอ? เรื่องหนีออกมาก็เรื่องหนึ่ง ส่วนเรื่องชุดก็อีกเรื่องหนึ่งสิคะ ฉันไม่ต้องปฏิเสธชุดที่รุ่นพี่ให้มาสักหน่อย?"
10040040-64 = "หรือว่าคุณครูมีปัญหาอะไรหรือเปล่าคะ...?"
10040040-65 = "ไม่มีงั้นเหรอคะ? ฮ่าฮ่า! แล้วจะมาแซวฉันตั้งแต่แรกทำไมเนี่ย!"
10040040-66 = "อืม... จะว่าไป นี่เราเจอเรื่องใหญ่กันแล้วนะคะ ถึงเราจะทิ้งระยะห่างได้แล้วก็เถอะ แต่จากนี้ไปต่างหากที่เป็นปัญหา..."
10040040-67 = "ที่นี่มีอะไรน่ะเหรอคะ? อ้อ... นั่นสินะ นี่คงเป็นครั้งแรกของคุณครูในการหลบหนีจากเซมิน่าสินะคะ"
10040040-68 = "มันไม่ใช่เรื่องง่ายเลยค่ะ! นอกจากกล้องวงจรปิดแล้วก็ยังมีกุญแจอิเล็กทรอนิกส์ โดรนรักษาความปลอดภัย กำแพงกั้นอัตโนมัติ... ถ้าจะให้ไล่พูดทั้งหมด คงไม่จบไม่สิ้นสักทีหรอกค่ะ!"
10040040-69 = "คะ...?"
10040040-70 = "ทำไมฉันถึงรู้ดีขนาดนี้น่ะเหรอคะ? ก่อนอื่นเลย ก็ฉันเป็นสมาชิกของเซมิน่า..."
10040040-74 = "แล้วฉันก็เป็นคนที่เผชิญกับเรื่องพวกนั้นมามากกว่าใครในโลกนี่คะ ฮุฮุฮุ"
10040040-75 = "[s11] \"เป็นเรื่องที่เล่าอย่างภาคภูมิใจได้ขนาดนั้นเลยเหรอ...\"\n[s12] \"เหมือนครูจะได้รับความช่วยเหลือจากผู้เชี่ยวชาญเลยนะ\""
10040040-78 = "ถือเป็นโชคดีของผู้หลบหนีมือใหม่อย่างคุณครูแล้วละค่ะ เพราะตอนนี้คุณครูอยู่กับฉัน คุโรซากิ โคยูกิ ผู้เชี่ยวชาญที่สุดในบรรดาผู้เชี่ยวชาญอีกที!"
10040040-79 = "จากนี้ไปคุณครูเชื่อใจฉันได้เลยค่ะ! ด้วยประสบการณ์การหนีหลายสิบครั้งที่ฉันสั่งสมมาในอาคารที่#nเหมือนกับเขาวงกตแห่งนี้..."
10040040-83 = "หืม...? เสียงเท้านี่นา...?"
10040040-84 = "ฮะ... เฮือก...! ก้มต่ำๆ ไว้ค่ะ!!"
10040040-85 = "ประตูบานนี้เป็นกระจก... ถ้ายืนตัวตรงอยู่แบบนี้ ข้างนอกจะมองเห็นได้ค่ะ!"
10040040-86 = "ทางนี้ค่ะ มาทางนี้...!"
10040040-92 = "จริงๆ เลยเชียว... หนีไปไหนแล้วนะ? ยัยเด็กตัวแสบ!"
10040040-93 = "ฮุฮุ ได้มาเล่นซ่อนหาในที่แบบนี้เฉยเลย เป็นสิ้นปีที่สนุกดีนะคะเนี่ย"
10040040-94 = "โนอา! ไม่ต้องโลกสวยขนาดนั้นก็ได้นะ! จริงๆ เลย..."
10040040-95 = "ไม่ได้การละ เราแยกย้ายกันหาเถอะ โนอาไปหาในห้องที่อยู่สุดทางตรงโน้น ส่วนฉันจะหาจากห้องครัวตรงนี้เอง"
10040040-97 = "ว่าไงนะ จะเข้ามาข้างในนี้เหรอ...? ทะ... ทำไมล่ะ...? ทำไม...?"
10040040-99 = "จะไปหาในห้องครัวเหรอคะ? แต่ว่าห้องนี้น่าจะล็อกอยู่นะคะ?"
10040040-100 = "โนอาเองก็รู้ดีอยู่แล้วไม่ใช่เหรอว่าโคยูกิเป็นเด็กยังไง อุปกรณ์ล็อกแบบนี้ไม่ใช่อุปสรรคอะไรสำหรับ#nเด็กคนนั้นหรอก"
10040040-101 = "ฮุฮุ ก็จริงอยู่นะคะ"
10040040-104 = "[ns13] \"ยูกะฉลาดและรอบคอบจังเลยนะ...\"\n[ns14] \"ทางนั้นก็เป็นผู้เชี่ยวชาญในการหาเหมือนกันสินะ\""
10040040-107 = "ตอนนี้มันใช่เวลามาชื่นชมคนอื่นอยู่เหรอคะ...!"
10040040-108 = "ตรวจสอบให้รอบคอบไว้ไม่เสียหายหรอก ฉันฝากห้องทางโน้นด้วยแล้วกัน! แล้วฉันจะรีบไปหาในห้องครัวแล้วกลับมานะ!"
10040040-109 = "ฮุฮุ สู้ๆ นะคะ ยูกะจัง~"
10040040-114 = "ฮู่ว... ไหนลองดูซิ..."
10040040-121 = "เฮือก...!!"
10040040-122 = "[ns15] หนีไปซ่อนในจุดบอด\n[ns16] (คงต้องย้ายที่แล้วละ...!)"
10040040-129 = "ฮืม..."
10040040-130 = "ไม่มีใครอยู่เลยเหรอ? อุตส่าห์เข้ามาที่นี่เพราะสังหรณ์ใจแปลกๆ แท้ๆ"
10040040-135 = "...!"
10040040-136 = "[ns17] (ซวยแล้วไง...! เผลอไปชนกับอะไรน่ะ...)\n[ns18] (ทัพพีที่แขวนอยู่หล่นลงมาแล้ว...!!)"
10040040-139 = "คะ... ใครอยู่ตรงนั้นน่ะ...? โคยูกิ? โคยูกิใช่มั้ย!?"
10040040-140 = "กะไว้แล้วเชียวว่าต้องมาซ่อนอยู่ที่นี่! ออกมาเดี๋ยวนี้เลยนะ! ฉันรู้หมดแล้วว่าอยู่ตรงนั้นน่ะ...!!"
10040040-145 = "ยัยโคยูกิ...!!!"
10040040-146 = "[ns19] กลืนน้ำลายและคิดหาข้อแก้ตัว\n[ns20] (จะจบเห่แบบนี้งั้นเหรอ...!)"
10040040-156 = "หืม...!?"
10040040-165 = "อุวะฮ่าฮ่า!! รุ่นพี่ซื่อบื้อ ฉันอยู่ตรงนี้ต่างหากล่ะ! ตรงนี้จ้า~!!!"
10040040-166 = "[ns] (โคยูกิ...!!)"
10040040-168 = "อะ... อะไรกัน!? ไปอยู่ตรงนั้นตั้งแต่เมื่อไร...!?"
10040040-169 = "ยัยเด็กคนนี้นี่...! ถ้าจับตัวได้ละก็ ฉันไม่ปล่อยไปแน่!!"
10040040-173 = "อุวะฮ่าฮ่าฮ่า!! แน่จริงก็จับให้ได้สิคะ!!"
10040040-174 = "ทางนี้ค่า~~~!!!"
10040040-183 = "หยุดอยู่ตรงนั้นเลยนะ~!!"
10040040-192 = "[ns21] \"ครูจะไม่ลืมโคยูกินะ...\"\n[ns22] \"ขอบใจนะโคยูกิ ครูจะไม่ลืมเลย\""
10040040-197 = "เป็นการเสียสละที่ยิ่งใหญ่เลยละค่ะ..."
10040040-198 = "หลังจากเรื่องทั้งหมดนี้จบลง หากฉันมีโอกาส ฉันจะทำเว็บไซต์เป็นอนุสรณ์ให้นะคะ"
10040040-199 = "ไม่ได้มีใครตายสักหน่อย อย่าพูดเวอร์ขนาดนั้นเลย"
10040040-200 = "ใช่ค่ะ แฮ่ก... แฮ่ก..."
10040040-201 = "ใครตายกันล่ะคะ... อุวะฮ่าฮ่า... แฮ่ก แฮ่ก..."
10040040-206 = "[ns23] \"โคยูกิ!?\"\n[ns24] \"ไม่ได้โดนจับได้หรอกเหรอ...!?\""
10040040-209 = "ทำไมถึงถามอะไร... น่าเศร้าอย่างนั้นล่ะคะ... อุวะฮ่าฮ่า..."
10040040-210 = "ฉันบอกไปแล้วไม่ใช่เหรอคะ ว่าฉันน่ะเป็นผู้เชี่ยวชาญที่สุดในหมู่ผู้เชี่ยวชาญด้านการหลบหนีจากที่นี่! อุวะฮะฮ่า!"
10040040-211 = "ฮู่ว ฮู่ว... เฮ้อ... ทีนี้ค่อยหายใจหายคอได้แล้วนะคะ"
10040040-212 = "จะว่าไป คุณครูมีคนที่คอยช่วยเหรอคะ? สมกับที่เป็นคุณครูเลย!"
10040040-213 = "นี่สินะคะ 'พฤติกรรมปกติ' ที่คุณครูพูดถึงอยู่บ่อยๆ"
10040040-214 = "พูดแบบนั้นมันดูมีความหมายแตกต่างออกไปอยู่นะ..."
10040040-215 = "แต่ก็นะ ในเมื่อคุณครูหลบหนีตามเส้นทางที่ดีที่สุดที่ทางเราวิเคราะห์ได้"
10040040-216 = "ถ้างั้นก็เป็นเรื่องธรรมดาที่เส้นทางหลบหนีของคุณครูจะคล้ายคลึงกับเส้นทางของคุณที่มีประสบการณ์#nการหลบหนีมามากค่ะ คุโรซากิ โคยูกิ"
10040040-218 = "เท่ากับว่าตอนนี้พวกเราลงเรือลำเดียวกันแล้วสินะคะ! พันธมิตรพิชิตรุ่นพี่เซมิน่า เราต้องหลบหนีออกไปจากที่นี่อย่างปลอดภัยด้วยกันค่ะ! อุวะฮ่าฮ่า!!"
10040040-220 = "รู้สึกเหมือนได้เจอกับมากิอีกคนเลยนะ..."
10040040-221 = "ฉันก็คิดแบบนั้นเหมือนกันค่ะ จะว่าไป นี่ก็ใกล้ถึงเวลาที่มากิจะไปถึงแล้วนะคะ"
10040040-223 = "คะ...? มากิเกี่ยวอะไรด้วยน่ะเหรอคะ?"
10040040-224 = "ไม่มีอะไรมากหรอก มากิแค่กำลังไปที่นั่น เผื่อว่าจะเกิดเรื่องอะไรเข้าน่ะ"
10040040-225 = "อาคารนั้นมีระบบรักษาความปลอดภัยที่ค่อนข้างเข้มงวด ถ้าสถานการณ์ไม่เป็นไปตามที่หวัง ฉันก็วางแผนว่าจะพังประตูหรือหน้าต่างชั้นหนึ่งแล้วให้คุณครูออกมาน่ะ"
10040040-226 = "[s25] \"ต้องทำถึงขนาดนั้นเลยเหรอ...?\"\n[s26] \"ห้ามทำลายอะไรนะ แค่หนีไปอย่างเดียวพอ\""
10040040-230 = "ทำไมล่ะ? ฟังดูน่าสนุกดีออกนะคะ!?"
10040040-231 = "ไม่เป็นไรหรอกค่ะ ไม่เป็นไร! เซมิน่าน่ะรวยอยู่แล้ว เรื่องซ่อมก็แค่เรื่องจิ๊บจ๊อย..."
10040040-236 = "อืม... สุดยอดไปเลยนะ"
10040040-237 = "ฉันเองก็ได้ยินเกี่ยวกับความลำบากใจของยูกะอยู่บ่อยๆ แต่แบบนี้ก็ถือว่าเกินมาตรฐานไปหน่อยนะคะ"
10040040-238 = "ที่บอกว่าเหมือนมากิน่ะ... สงสัยต้องไปขอโทษเป็นการส่วนตัวแล้วละ"
10040040-240 = "ทำไมจู่ๆ ก็เปลี่ยนท่าทีกันอย่างนั้นล่ะ!?!?"
10040040-241 = "เพราะอย่างน้อยมากิก็..."
10040040-242 = "หืม...? ว่ายังไงนะคุณครู?"
10040040-243 = "รู้สึกกังวลเพราะเหมือนเรื่องจะใหญ่ขึ้นเรื่อยๆ งั้นเหรอ?"
10040040-244 = "คิดว่าควรสารภาพไปตามความจริง แล้วขอโทษกับเรื่องที่เกิดขึ้นอย่างนั้นเหรอ...?"
10040040-245 = "หาาา!! ได้ไงคะ!? ใครเขาทำแบบนั้นกัน!! หนีกันมาตั้งไกลแล้ว จะมาหักหลังฉันเอาดื้อๆ เหรอคะ!?"
10040040-246 = "ไม่ได้นะคะ ไม่ได้เด็ดขาดเลย! คุณครูต้องออกไปจากที่นี่พร้อมกันกับฉันค่ะ!! เราต้องรับผิดชอบร่วมกันสิคะ โทษก็ต้องหารสองด้วย!!"
10040040-247 = "พูดแบบนั้นอย่างมั่นใจได้ยังไงกันนะ..."
10040040-248 = "[ns27] \"ครูจะอธิบายเรื่องของโคยูกิให้เอง\"\n[ns28] \"ถ้าบอกไปตามจริง สองคนนั้นก็น่าจะเข้าใจนะ\""
10040040-251 = "บะ... แบบนั้นมัน...!"
10040040-252 = "อืม... แต่ว่า คุณครูคะ..."
10040040-253 = "ที่คุณครูเพิ่งพูดเมื่อกี้ ฉันว่ามันเข้าใจได้ยากอยู่นะ จะบอกไปตามความจริงว่ายังไงเหรอคะ?"
10040040-254 = "หรือว่าคุณครูจะบอกว่า..."
10040040-258 = "\"ตัวเองทิ้งงานที่ผู้ใหญ่ควรต้องทำ แล้วแอบเข้าไปในห้องสำนึกผิดกลางดึก"

[translation]
10040040-1 = "Episode 4;To Tell the Truth"
10040040-2 = "...I wonder how far I traveled under Kotama and Hare's guidance."
10040040-6 = "Nice, Sensei. Just a sec..."
10040040-7 = "Okay, go to the end of that hallway and turn right."
10040040-8 = "...Wait!"
10040040-13 = "I'm detecting something. These soundwaves don't match your voice's."
10040040-17 = "[ns1] \"On the other side!\" \n[ns2] \"There's someone there!\""
10040040-20 = "About forty meters out... They'll come around the corner in approximately six seconds."
10040040-21 = "Somewhere to hide...!"
10040040-22 = "The door to the right! It leads to the kitchen."
10040040-23 = "I'm working on unlocking the door now, so jump in there as soon as I get it."
10040040-31 = "[ns3] \"Thank you, both!\"\n[ns4] Rush into the kitchen."
10040040-40 = "Kyaaaah! My head, my head...!"
10040040-41 = "[ns5] \"Ouch, ouch, ouch...\"\n[ns6] \"What's this hard thing...?\""
10040040-48 = "...Huh?!"
10040040-49 = "Sensei?! Sensei, it's you?! What in the world are you doing here?!"
10040040-50 = "Phew... You scared me."
10040040-51 = "Gah! I really thought you were Yuuka or Noa. I think I just aged ten years!"
10040040-52 = "[s7] \"You scared me too!\"\n[s8] \"So this is where you've been hiding.\""
10040040-55 = "I can't escape until I fully shake them off."
10040040-56 = "In this building, no matter how far you run, the chase is never over!"
10040040-57 = "...What?"
10040040-58 = "...Oh, this outfit? It's the pajamas Yuuka bought for me!"
10040040-59 = "[s9] \"You were in the right state of mind to change?\"\n[s10] \"You really are good at taking whatever you can.\""
10040040-62 = "...Yes, and?"
10040040-63 = "Even if I'm on the lam, I don't see any reason to refuse a gift."
10040040-64 = "...Is there something wrong with that?"
10040040-65 = "...No? Yaha! Sensei, you're always so silly."
10040040-66 = "Um... Anyways, we're out of the pot and into the fire. I might've shaken them off, but this is the real challenge."
10040040-67 = "...What do I mean? Oh! Right! This is your first time having to escape from Seminar!"
10040040-68 = "This is no ordinary building! There's every form of security you could imagine: surveillance cameras, electronic locks, security drones, automatic barriers, and so much more!"
10040040-69 = "...What?"
10040040-70 = "How do I know this? Hey, I AM part of the Seminar staff, you know."
10040040-74 = "And there's no one else in this world who's experienced the full force of Seminar's security like I have. Fufufu."
10040040-75 = "[s11] \"You're awfully smug about this...\"\n[s12] \"I suppose it's good for us now, though.\""
10040040-78 = "In any case, young grasshopper, count your lucky stars that you've been paired with me, the veteran of veterans in the art of escaping, Kurosaki Koyuki!"
10040040-79 = "From now on, just trust me! This maze of a building is just my playground when it comes to outsmarting those upperclassmen—"
10040040-83 = "...Huh...? Footsteps...?"
10040040-84 = "Shhh...! We need to hide!"
10040040-85 = "That's a glass door! They'll totally catch us if we're just standing here!"
10040040-86 = "...Here, this way...!"
10040040-92 = "...Seriously, where did she go?!"
10040040-93 = "Fufu. An unexpected game of hide-and-seek in an unexpected location. What an interesting end to the year."
10040040-94 = "Noa! There's nothing interesting about that at all!"
10040040-95 = "Let's split up for now. Can you start from the end of the hallway, Noa? I'll check the kitchen here."
10040040-97 = "Wh-What, the kitchen?! Why, whyyy? Does she really have to be so thorough...?"
10040040-99 = "The kitchen? But it's locked."
10040040-100 = "Noa, you know what Koyuki is like. This kind of lock means nothing to her."
10040040-101 = "Heehee. That's true."
10040040-104 = "[ns13] \"Indeed, Yuuka has sharp instincts...\" \n[ns14] \"It looks like they're veterans of veterans too.\""
10040040-107 = "This is no time to be impressed!"
10040040-108 = "Being thorough never hurts. I'll come meet up with you after I check this area."
10040040-109 = "Fufu. Hang in there, Yuuka."
10040040-114 = "*sigh* Let's get this over with."
10040040-121 = "Eek...!"
10040040-122 = "[ns15] Hide in a blind spot.\n[ns16] \"(We need to get out of here!)\""
10040040-129 = "Hm..."
10040040-130 = "Was there really no one here? Maybe my gut instinct was wrong..."
10040040-135 = "...!"
10040040-136 = "[ns17] \"(Gah! What did I bump into?!)\"\n[ns18] \"(The ladle hung on the wall! It fell down!)\""
10040040-139 = "H-Hey, who's there...? It's you isn't it, Koyuki?"
10040040-140 = "I knew you were in here! Come out, right this instant!"
10040040-145 = "You little...! Koyuki!"
10040040-146 = "[ns19] Swallow and prepare your excuses.\n[ns20] \"(Is this how it ends...?!)\""
10040040-156 = "...Huh?!"
10040040-165 = "Nihaha! Silly Yuuka! Over here!"
10040040-166 = "[ns] \"(Koyuki!)\""
10040040-168 = "...Wh-What?! When did you get there...?!"
10040040-169 = "Just wait 'til I get my hands on you!"
10040040-173 = "Nihahaha! You gotta catch me first!"
10040040-174 = "Over here!"
10040040-183 = "Stop right there!"
10040040-192 = "[ns21] \"...I'll remember you forever.\"\n[ns22] \"...Thank you. Your sacrifice will not be in vain.\""
10040040-197 = "...That was a glorious sacrifice."
10040040-198 = "After all this is over, if given the opportunity, let's create a memorial for her."
10040040-199 = "Stop making it sound like she's dead."
10040040-200 = "That's right... *pant* *pant*"
10040040-201 = "Who said anything about dying? Ni...haha...ha..."
10040040-206 = "[ns23] \"Koyuki?!\"\n[ns24] \"You didn't get caught?!\""
10040040-209 = "Why would you...even think that...? Ni...ha..."
10040040-210 = "Didn't I say it already? There's no one better when it comes to escaping this prison! Nihaha!"
10040040-211 = "*pant* *pant* I just need to catch my breath..."
10040040-212 = "It looks like some other people are helping you, Sensei!"
10040040-213 = "Is this the result of what you always refer to as \"good everyday conduct\"?"
10040040-214 = "They probably meant something a little different..."
10040040-215 = "I suppose this makes sense. Since we've been moving according to the statistically safest route possible..."
10040040-216 = "...and you've been doing the same thing instinctively, our paths were bound to cross."
10040040-218 = "All I'm hearing is that we're partners in crime now! Yahoo to our escape alliance! Nihaha!"
10040040-220 = "...She kinda reminds me of Maki."
10040040-221 = "I was thinking the same thing. And, speak of the devil, she should be arriving soon."
10040040-223 = "...Hm? You're wondering why Maki's coming?"
10040040-224 = "Nothing too important. Just a back-up plan I put in place, just in case."
10040040-225 = "I wasn't sure if we could outsmart this building's security system. So I was planning on breaking some doors or windows on the first floor if the situation went south."
10040040-226 = "[s25] \"Isn't that going a little too far?\"\n[s26] \"Nuh-uh. Breaking things is out of the question.\""
10040040-230 = "But why? Isn't that a pretty good idea?!"
10040040-231 = "Really, don't even sweat it! Seminar's got a ton of money, so it'll be no big deal!"
10040040-236 = "...Hmm. Incredible."
10040040-237 = "We know that Yuuka undergoes a lot of suffering, but you're somewhat beyond what we imagined."
10040040-238 = "I'll have to apologize to Maki later for comparing them."
10040040-240 = "What's with the sudden change in attitude?!"
10040040-241 = "Well, Maki, at least—"
10040040-242 = "...Huh? Sensei, what did you say?"
10040040-243 = "...Things are getting a little too out of hand?"
10040040-244 = "...Sensei? You really want to just confess and suffer the consequences?"
10040040-245 = "EHHH?! No, no, no WAY! You can't betray me in the eleventh hour!"
10040040-246 = "You're seeing this through to the end, Sensei! You're helping me escape! This is partially your fault too, you know!"
10040040-247 = "She really knows no boundaries..."
10040040-248 = "[ns27] \"I'll explain your situation too, Koyuki.\"\n[ns28] \"If I tell the truth, I'm sure they'll understand.\""
10040040-251 = "B-But..."
10040040-252 = "...Hm. However, Sensei."
10040040-253 = "I'm having trouble following your line of logic. What will you tell them, exactly?"
10040040-254 = "Something like this, maybe?"
10040040-258 = "\"I, a full-grown adult, snuck into the Self-Reflection Room, while I was supposed to be working.\""
10040040-259 = "\"Then, to avoid getting caught playing cards with a student, I hid in the closet.\""
10040040-260 = "Oh, next will you say, \"I watched students playing in their pajamas from said closet for quite some time\"?"
10040040-261 = "\"And, now, since my escape wasn't going well, I'm confessing and coming clean with my transgressions.\""
10040040-262 = "...Well..."
10040040-263 = "...Is that what you plan on \"confessing\"?"
10040040-269 = "[ns29] \"...Which way is the exit again?\"\n[ns30] \"I have to escape this place! NOW!!\""
10040040-272 = "Nihaha! That's more like it!"
10040040-284 = "This sound...?!"
10040040-285 = "Security drones! They've...released the whole horde of them!"
10040040-287 = "Yuuka must be reaaal mad..."
10040040-288 = "Koyuki's teasing earlier must have sent her over the edge."
10040040-290 = "Enough of that! We needed to be at the first floor, like, five minutes ago!"
10040040-292 = "She's right about that, at least. It'd be easier to just hack all the drones, but I promised not to do stuff like that anymore."
10040040-293 = "Instead, we'll guide you to the fastest and safest route we can, and do our best to obscure the cameras."
10040040-294 = "If we were to try to fight the drones..."
10040040-296 = "Yahaha! Leave that to me, the veteran of veterans, Kurosaki Koyuki!"
10040040-297 = "Just give me the order, and I'll smash those little dudes to—"
10040040-298 = "...Huh? I shouldn't do that?"
10040040-299 = "Don't break the drones...? Not this again..."
10040040-300 = "But how else are we gonna escape?"
10040040-301 = "[s31] \"The drones and windows all belong to Seminar. No breaking.\"\n[s32] \"Let's find a way to subdue them without breaking them.\""
10040040-304 = "Um... How in the heck...?"
10040040-305 = "I can do it. I can manually shut them down without actually hacking them."
10040040-306 = "Since we're here, you can depend on us for that part."
10040040-307 = "Boo. I thought this was the perfect chance to knock Seminar's security system down a few pegs."
10040040-308 = "Yeah... *sigh*... We should just smash them..."
10040040-313 = "...You...are a part of Seminar, right?"
10040040-314 = "Well, I think she's more or less in the same position as us right now."
10040040-316 = "Anyway, if that's the decision, there's no time to hesitate! Let's do it right now!"
10040040-317 = "CHARGE!!"

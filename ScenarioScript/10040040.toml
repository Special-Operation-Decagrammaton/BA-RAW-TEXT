[translation]
10040040-1 = "第4話;老實說"
10040040-2 = "（……後來照著小玉和晴的指示，走了一段時間）"
10040040-6 = "很好，老師。#n請在那裡暫停一下。"
10040040-7 = "接下來只要走到盡頭，然後再往右轉……"
10040040-8 = "……！！等等。"
10040040-13 = "有其他動靜。我聽到了老師以外的聲音。"
10040040-17 = "[ns1]「……！在反方向……」\n[ns2]「有人的動靜……！」"
10040040-20 = "距離在40m以內。#n根據聲音的移動速度來看，對方大約6秒後會出現在轉角。"
10040040-21 = "請趕快找個地方躲起來……！"
10040040-22 = "你旁邊那扇門後就是廚房。"
10040040-23 = "我立刻幫你駭入解除鎖定，等門一打開就立刻躲進去吧，老師。"
10040040-31 = "[ns3]「謝謝你們！」\n[ns4] 匆忙打開門並躲進去"
10040040-40 = "呃啊啊啊──！！頭，我的頭啊……！！"
10040040-41 = "[ns5]「痛，痛死我了……」\n[ns6]「這，這硬邦邦的東西是什麼啊……」"
10040040-48 = "……咦！？"
10040040-49 = "老師！這不是老師嗎？#n你怎麼會在這裡……！？"
10040040-50 = "呼……嚇死我了。"
10040040-51 = "啊～！真是的！#n我還以為是前輩們咧，你差點把我嚇個半死！！"
10040040-52 = "[s7]「我也被你嚇了一跳好不好！！」\n[s8]「原來你躲在這種地方啊。」"
10040040-55 = "畢竟總得先把前輩們甩掉，才有可能逃走嘛。"
10040040-56 = "光是甩掉追兵……根本就逃不出這棟大樓。"
10040040-57 = "……嗯？"
10040040-58 = "……啊啊，你說這身衣服嗎？#n嗯，這好像是優香前輩要帶來給我穿的睡衣。"
10040040-59 = "[s9]「結果你還是乖乖換上了。」\n[s10]「真是個有好處絕不放過的孩子呢。」"
10040040-62 = "……怎麼了嗎？"
10040040-63 = "這兩件事有什麼關係？#n逃跑歸逃跑……沒必要連別人送的禮物也一併拒絕吧？"
10040040-64 = "難道這有什麼問題嗎……？"
10040040-65 = "……你說沒有？#n哈哈！真無聊。"
10040040-66 = "嗯……話說情況不太樂觀呢。#n雖然已經暫時甩掉他們了，但是難關現在才開始……"
10040040-67 = "之後還有什麼難關？#n……啊啊，畢竟老師是第一次嘗試逃離研討會嘛。"
10040040-68 = "這棟大樓真不是蓋的喔！#n監視器什麼的只是基本而已，其他還有像是電子鎖、警備無人機、自動隔間……#n要一一列出的話，根本說都說不完！"
10040040-69 = "……嗯？"
10040040-70 = "問我為什麼那麼清楚？#n那當然是因為我既是研討會的成員……"
10040040-74 = "也是世界上最常和那些東西打交道的人囉，呵呵呵。"
10040040-75 = "[s11]「這種事值得這麼驕傲嗎……」\n[s12]「你的經驗現在恰巧幫得上忙呢。」"
10040040-78 = "總之，老師你這個逃脫菜鳥運氣還真好！#n畢竟有我這個超級老手黑崎小雪作伴！"
10040040-79 = "接下來的一切就包在我身上吧！#n到目前為止，只有我曾經在這迷宮般的大樓裡，甩掉前輩們數十次……"
10040040-83 = "嗯……？有腳步聲……？"
10040040-84 = "噫，噫噫……！#n快把頭低下來，不要出聲！！"
10040040-85 = "這裡的門上有裝玻璃……這樣大搖大擺地站著，會被外面的人看到的！"
10040040-86 = "來，過來這邊……！"
10040040-92 = "……真是的，小雪這傢伙到底跑哪去了啊？"
10040040-93 = "呵呵，竟然在這種地方玩捉迷藏，真是個有趣的跨年夜呢。"
10040040-94 = "乃愛！你不要擅自把事情美化好不好！真是的……"
10040040-95 = "這樣下去不行，我看我們分頭去找吧。#n乃愛你從盡頭的房間開始搜，我從這邊的廚房開始。"
10040040-97 = "咦，他要進來這裡……？#n為，為什麼會特地……？"
10040040-99 = "廚房？可是這裡不是都鎖著嗎？"
10040040-100 = "你也很清楚小雪的能耐吧？#n像這種鎖定裝置，對那傢伙來說一點意義都沒有。"
10040040-101 = "呵呵，這倒也是。"
10040040-104 = "[ns13]「不愧是優香，真是聰明……」\n[ns14]「看來他也不只和你交手一兩次了。」"
10040040-107 = "喂，你是在佩服什麼啦！現在是佩服他的時候嗎……！"
10040040-108 = "反正仔細檢查一下也沒什麼壞處。#n那邊就拜託你了，我馬上就過去！"
10040040-109 = "呵呵，加油，優香醬～"
10040040-114 = "呼……那我就來……"
10040040-121 = "噫噫……！！"
10040040-122 = "[ns15] 躲到視線死角\n[ns16]（看來得先換個位置才行……！）"
10040040-129 = "唔……"
10040040-130 = "沒人在嗎？#n我是覺得哪裡怪怪的才進來看看的說。"
10040040-135 = "……！"
10040040-136 = "[ns17]（糟糕……！剛才躲的時候不小心撞到了……）\n[ns18]（掛在鉤子上的湯勺要掉下來了……！！）"
10040040-139 = "是，是誰在那裡……？#n小雪？是小雪對吧！？"
10040040-140 = "我就知道你躲在這裡！立刻給我出來！#n我早就知道你就躲在那裡了……！！"
10040040-145 = "小雪你這傢伙……！！！"
10040040-146 = "[ns19] 一邊吞口水，一邊思考著藉口\n[ns20]（難道要在這裡結束了嗎……！）"
10040040-156 = "……嗯！？"
10040040-165 = "尼哈哈哈！！#n笨蛋前輩，我在這裡！在這裡啦～！！！"
10040040-166 = "[ns]（小雪……！！）"
10040040-168 = "……什，什麼！？#n你怎麼一下就跑到那裡去了……！？"
10040040-169 = "你這傢伙……！#n要是被我逮到，我絕對不會放過你！！"
10040040-173 = "尼哈哈哈哈！！抓得到我就來呀！！"
10040040-174 = "我在這裡～～～！！！"
10040040-183 = "你給我站住～！！"
10040040-192 = "[ns21]「……我會記得你的。」\n[ns22]「……謝謝，我不會忘了你的。」"
10040040-197 = "……黑崎小雪同學壯烈犧牲了呢。"
10040040-198 = "等這件事落幕之後，我一定會找時間為他做一個追思網站的。"
10040040-199 = "人家現在還好好的，怎麼說得像是他已經死掉了一樣。"
10040040-200 = "就是說啊，呼……呼……"
10040040-201 = "你是在詛咒誰死啊……#n尼哈哈……呼，呼……"
10040040-206 = "[ns23]「小雪！？」\n[ns24]「你沒被抓到嗎……！？」"
10040040-209 = "你說這種話……我可是會很難過的哦……尼哈哈……"
10040040-210 = "我不是說過了嗎？#n我可是世界上逃離這裡最多次的超級老手！尼哈哈！"
10040040-211 = "呼，呼……哈啊……總算活過來了。"
10040040-212 = "話說回來，原來你還有幫手啊，真不愧是老師！"
10040040-213 = "這就是你常說的「平時的所作所為」嗎？"
10040040-214 = "我是覺得意思有點不太一樣啦……"
10040040-215 = "不過畢竟我們是按照最佳的逃脫路線移動……"
10040040-216 = "所以會碰上擁有豐富逃脫經驗的老手，就結果而言也是相當合理的，黑崎小雪同學。"
10040040-218 = "無論如何，從現在起我們就是夥伴了！#n我們是要一起平安逃出這裡的盟友！尼哈哈哈！！"
10040040-220 = "……總覺得他跟真紀有點像。"
10040040-221 = "我也有同感。#n這麼說來，真紀應該也快到了吧。"
10040040-223 = "……嗯？為什麼要提到真紀？"
10040040-224 = "其實也沒什麼。#n只是為了以防萬一，所以你們得往他那裡移動才行。"
10040040-225 = "畢竟這棟大樓的保全系統幾乎滴水不漏，#n要是情況真的不樂觀的話，我們打算破壞一樓的門窗送老師出去。"
10040040-226 = "[s25]「有必要做到那種程度嗎……？」\n[s26]「破壞公物是不行的，這個提議駁回。」"
10040040-230 = "為什麼？這樣不是很好嗎！？"
10040040-231 = "不用擔心那種事啦！#n反正我們研討會有的是錢，這點程度……"
10040040-236 = "……唔嗯，真不簡單。"
10040040-237 = "雖然經常聽說優香在為小雪同學的事傷腦筋，沒想到他竟然誇張到這種地步。"
10040040-238 = "看來之後得為剛才說他像真紀的事……向真紀道個歉才行。"
10040040-240 = "態度竟然一百八十度大轉變！？！？"
10040040-241 = "畢竟真紀至少……"
10040040-242 = "……嗯？老師剛才說什麼？"
10040040-243 = "感覺事情越鬧越大了……？"
10040040-244 = "還是要乾脆據實以告，然後好好道歉……？"
10040040-245 = "咦咦咦咦──！！哪有這樣的啊！！#n都到這種時候了，老師居然要背叛我嗎！？"
10040040-246 = "不行，絕對不行！#n你得跟我一起逃離這裡才行！！我們要一起承擔罪行！！"
10040040-247 = "竟然能理直氣壯地說出這種話……"
10040040-248 = "[ns27]「我也會幫你好好解釋的。」\n[ns28]「只要乖乖說出真相，他們肯定會原諒我們的。」"
10040040-251 = "怎，怎麼這樣……！"
10040040-252 = "唔嗯……可是老師。"
10040040-253 = "老實說我有點不太理解老師剛才說的話。#n你所謂的說出真相是指什麼呢？"
10040040-254 = "該不會是打算……"
10040040-258 = "「身為大人卻不乖乖完成自己的工作，還在大半夜裡潛入反省室」"
10040040-259 = "「結果差點在和學生通宵玩鬧時被抓包，只好匆忙躲進衣櫃裡」"
10040040-260 = "「接著在衣櫃裡目睹其他穿著睡衣的學生跑來後」"
10040040-261 = "「在嘗試逃離研討會大樓時發現行不通，所以決定自首」"
10040040-262 = "把這樣的真相……"
10040040-263 = "……說出來吧？"
10040040-269 = "[ns29]「……哪裡可以逃出去？」\n[ns30]「我絕對要逃出去！！！」"
10040040-272 = "尼哈哈哈！！這樣才對嘛……！"
10040040-284 = "這個聲音是……！？"
10040040-285 = "是警備無人機嗎。#n看來他們連平時休眠的無人機都放出來了！"
10040040-287 = "優香……看來他很生氣。"
10040040-288 = "肯定是因為小雪同學剛才捉弄他的關係。"
10040040-290 = "現在沒時間說這些了！#n我們得趕快移動到一樓才行！！"
10040040-292 = "這麼說也對。#n雖然我其實比較傾向用駭入無人機的方式來幫助老師，但我這次決定不這麼做。"
10040040-293 = "我們只會為你們指引最快速且安全的路徑，並癱瘓監視器的系統。"
10040040-294 = "至於和無人機之間的戰鬥……"
10040040-296 = "尼．哈．哈．哈．哈！！#n就交給我這個超級老手黑崎小雪吧，老師！"
10040040-297 = "只要老師願意幫我指揮，區區幾架無人機根本……"
10040040-298 = "……嗯？不行？"
10040040-299 = "不能打壞無人機……？#n你怎麼又說這種話……"
10040040-300 = "可是我們得想辦法逃離這裡才行啊……？"
10040040-301 = "[s31]「無人機和門窗都是研討會的財產，不能隨便破壞。」\n[s32]「我們來找找不用破壞機器也能制服它們的方法吧。」"
10040040-304 = "嗯……？真的有這種方法嗎……？"
10040040-305 = "有是有啦。#n就算不駭入無人機，也有在制服它們後手動關閉電源這個方法。"
10040040-306 = "也對，正好我們也在，這部分我們會想辦法支援你們的。"
10040040-307 = "雖然我原本以為，這是個難得能削弱研討會保全系統的機會……實在有點可惜。"
10040040-308 = "就是說啊……#n唉……應該把它們通通剷除才對的……"
10040040-313 = "那個……你真的是研討會的成員嗎？"
10040040-314 = "畢竟他現在的立場跟我們差不多……"
10040040-316 = "總之既然已經決定好了，現在沒什麼好猶豫的了吧！#n立刻行動──！！！"
10040040-317 = "CHARGE──！！！"

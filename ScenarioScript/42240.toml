42240-58 = "3;마이;00;알겠습니다. 그럼 마지막으로……\n#3;em;[반응]"
42240-59 = "3;마이;01;카야 실장이 긴급 성명 발표 당시 샬레의 선생님을 부른 목적은 무엇이었을까요?"
42240-60 = "3;마이;02;공개 회선으로 호출한 걸 보면 선생님과의 관계를 숨길 생각은 없었던 모양입니다만……"
42240-61 = "3;마이;00;카야 실장은 샬레로부터 키보토스를 마음대로 통제할 수 있는 무기나 권한을 넘겨받으려 한 게 아니었을까요?\n#3;em;[?]"
42240-62 = "5;데카르트;00;아, 그건 제가 확실하게 답변드릴 수 있습니다!\n#5;al\n#3;m1"
42240-63 = "5;데카르트;02;카야 실장이 샬레의 선생님에게 요구한 것은 다름 아닌…… 샬레 건물의 편의점에서 폐기되는 도시락이었을 겁니다!\n#5;em;[!]"
42240-64 = "#st;[0,0];instant;1;"

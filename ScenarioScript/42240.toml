[translation]
42240-1 = "第24話;エピローグ"
42240-2 = "クロノススクール、第7共用スタジオ"
42240-4 = "チャンネルをご覧の皆さん、こんにちは！#nクロノス報道部の[ruby=かざまき]風巻[/ruby]マイです！"
42240-5 = "本日、「風巻マイの時事分析」チャンネルでは、前回の連邦生徒会長代行交代と子ウサギ駅爆破未遂事件について詳しくお伝えしていきます。"
42240-6 = "市民の皆さんが既にご存知のように、先日の緊急声明発表で[ruby=なながみ]七神[/ruby]リン首席行政官が失脚し、当時の防衛室長だった[ruby=しらぬい]不知火[/ruby]カヤが新しい連邦生徒会長代行として就任しました。"
42240-7 = "カヤ室長は、就任直後に発表した複数の行政命令の整合性が合わず議論の的になり――その後、子ウサギ駅の爆破テロを仕向けていたことが発覚した事から弾劾裁判が行われ――[ruby=そつい]訴追[/ruby]されました。"
42240-8 = "この事件と関連して「カイザーコーポレーション」の子会社、「カイザーセキュリティ」がカヤ室長から巨額のリベートを受け取っていたことが明らかになり、カイザーグループは再び議論の中心に立つことになりました。"
42240-9 = "しかし、カイザーグループの代表は「子会社役員の暴走に過ぎず、本社の方針とは無関係」と声明を発表しています。"
42240-10 = "事件の規模がここまで大きくなったというのに、連邦生徒会は明確な回答を出さず、様々な疑惑が浮上しています。"
42240-11 = "本日「風巻マイの時事分析」チャンネルでは、これらの疑惑についてわかりやすく説明してくださる時事専門家の方をお招きして、お話を伺ってみたいと思います！"
42240-12 = "時事専門家――デカルトさん、どうぞ！"
42240-19 = "ごきげんよう。D.U.最速の時事専門家であり、「所有せずとも確かな幸せを探す集い」……略して「所確幸」リーダーのデカルトです！"
42240-20 = "こ、こんにちは、デカルトさん。"
42240-21 = "なんか……すごい名前の集まりですね。"
42240-22 = "あ、我々の活動に興味があるのですか？"
42240-23 = "我々は専門家であり「所有せずとも確かな幸せを探す集い」、略して「所確幸」は……"
42240-24 = "いえ、それは説明していただかなくて結構です。"
42240-25 = "今日は連邦生徒会をめぐる様々な疑惑についてお伺いできればと。"
42240-26 = "ちぇっ……"
42240-27 = "最初の質問です！"
42240-28 = "今回の不正や内乱の疑いで拘束されたカヤ防衛室長は、この犯罪が私利私欲によるものではないと固く否定しています。"
42240-29 = "カヤ室長は、矯正局に移送されている時でさえも「本当の超人が現れ、あなた達のような愚民も私の意思を理解することになる」と言い続けておりました。"
42240-30 = "この「超人」は果たして誰を指しているのでしょうか？#nシャーレの先生……？それとも連邦生徒会長……？"
42240-31 = "でもなければまさか……明かされていない秘密があったりするのでしょうか！？"
42240-33 = "……そんなはずないじゃないですか。"
42240-34 = "防衛室長を操れるほどの人物だったら、そもそもクーデターみたいな面倒な手段を使うこともないでしょう。"
42240-35 = "敗者の遠吠えに過ぎない話なので、耳を傾ける必要もありません。"
42240-37 = "そ、そうなのでしょうか……"
42240-38 = "続いて次の質問です。"
42240-39 = "カヤ室長が拘束された際、一部の市民が「カイザーセキュリティ」の役員以外にも数人のセーラー服の生徒が一緒に護送される姿を目撃したそうです。"
42240-40 = "そのセーラー服の生徒はどこの学園の誰なのか、身元がはっきりしない状態です。"
42240-41 = "噂によれば――彼女らは、閉鎖されたSRT特殊学園の隊員だとか――"
42240-43 = "――そんなはずないじゃないですか！？"
42240-48 = "き、急になんでそんなに怒るんですか？"
42240-49 = "SRT特殊学園の隊員は正義のために危険を冒して戦った勇敢な生徒です！"
42240-50 = "そんな生徒を事件の犯人と同列に扱うなんて……なんと失礼な！"
42240-51 = "詳しい経緯は申し上げられないのですが、その生徒がSRT特殊学園出身の隊員だというのはすべてフェイクニュースです！"
42240-52 = "私の賞味期限切れの焼肉弁当にかけて誓います！"
42240-54 = "（……それは確信がないという意味では？）"
42240-58 = "わかりました。それでは最後に……"
42240-59 = "カヤ室長が緊急声明を発表した日に、シャーレの先生を呼んだ目的は一体何だったのでしょう？"
42240-60 = "公開回線で呼び出したところを見ると、先生との関係を隠すつもりはなかったようですが……"
42240-61 = "カヤ室長は、シャーレからキヴォトスを自由に操れる武器や権限を譲り受けるつもりだったのでしょうか？"
42240-62 = "あ、それは確実にお答えできます！"
42240-63 = "カヤ室長がシャーレの先生に要求したのは……シャーレのコンビニで廃棄されるはずだったお弁当です！"
42240-67 = "廃棄されるはずだった……お弁当……？"
42240-68 = "はい。シャーレのコンビニはその規模に比べて訪れる客の数が限られていますので、いつも大量のお弁当が廃棄されているのです。"
42240-69 = "その莫大な量のお弁当を見ると……誰でも欲しがるに違いありません！"
42240-71 = "シャーレと連邦生徒会の間の弁当交渉が決裂したということは、その後しばらくシャーレのコンビニにお弁当が納品されていなかったという事実からも推測できます！"
42240-73 = "……。"
42240-74 = "ですが皆さん！連邦生徒会と交渉をせずとも、廃棄弁当を簡単に手に入れる方法があります！"
42240-75 = "今すぐ「所確幸」に入会すると、無料の鶏ガラ唐揚げ、そしてもやし弁当を1つおまけで――"
42240-80 = "ただいま映像が乱れております。しばらくお待ちください。"
42240-81 = "何をするんだ、お前たち！"
42240-82 = "この私にこんな扱いをして――"
42240-86 = "皆様、申し訳ございません。ご参加いただいた時事問題専門家のデカルトさんは、急な用事で席を外されました。"
42240-87 = "本日の「風巻マイの時事分析」チャンネルは緊急編成番組、「イカの神秘：海の栄養は語る」に代わります。"
42240-88 = "どうかチャンネルはそのままで……！"
42240-92 = "……シノンは一体どこから、[ruby=あの変人]時事の専門家[/ruby]を連れてきたんだろ？"
42240-97 = "矯正局、特殊収容所B棟207号"
42240-99 = "……矯正局の生活も思ったより悪くないね。"
42240-100 = "決まった時間に起きて日課をして、体を鍛えて……#n規律に沿って生活するという点だけは、SRT特殊学園と大して変わらないのかも。"
42240-101 = "でも、献立においなりさんがないのは残念かな。"
42240-102 = "あぁ……作りたてのおいなりさんが恋しい……"
42240-108 = "囚人番号5021番、差し入れが届いている。"
42240-113 = "……差し入れ？誰からですか？"
42240-114 = "差出人はわからない。上から直接届いたものでね。"
42240-118 = "中に手紙が同封されているから、確認するように。"
42240-122 = "おかしいな……矯正局の外から手紙を送る人なんていないのに……"
42240-127 = "……ミヤコちゃん？"
42240-130 = "O月O日0400。RABBIT小隊、小隊長・月雪ミヤコ。#n子ウサギ公園での生活が落ち着いたため、現状報告いたします。"
42240-131 = "RABBIT小隊全員、事故や病気などなく勤務を続けており――"
42240-135 = "……いえ、もう少し柔らかい表現を使ったほうがよさそうですね。"
42240-136 = "お元気でしょうか、先輩。ミヤコです。"
42240-139 = "あの日、作戦がすべて終了した後。#n私たちは再び子ウサギ公園に戻りました。"
42240-140 = "どこに帰るべきか、皆さんと長らく話し合いましたが……やはりこの場所しかありませんでした。"
42240-141 = "SRT特殊学園の他に私たちの理想を実現できる学園はないですし……"
42240-142 = "私たちがここにいる限り、SRTの正義のための闘いは続くのですから。"
42240-149 = "カヤ室長が拘束された後、リン首席行政官は連邦生徒会長代行の座に復帰しました。"
42240-150 = "強引な行政命令もすべて撤回され、D.U.も徐々に安定を取り戻しつつあります。"
42240-151 = "一時的にリン行政官に反対する勢力が減ったからか、彼女を非難する世論も多少は収まったようですが……"
42240-152 = "キヴォトスには、まだまだ解決しなければならない問題が山積みなので……"
42240-153 = "リン行政官と連邦生徒会役員たちの苦労の日々は、これからも続きそうです。"
42240-155 = "私たちが先輩方を制圧し、カヤ室長の犯罪を告発したという事実は、取り急ぎ、外部には公表しない事になりました。"
42240-156 = "連邦生徒会としても、自分たちの手で閉鎖を決めたSRT特殊学園の支援を受けたという事実を正式に認められないでしょうし……"
42240-157 = "私たちも、先輩方の恥を広めたくなかったので。"
42240-159 = "そのため、今回の事態を終息させた功績を、対外的にはすべてカンナ局長のものにしてもらいました。"
42240-160 = "そのおかげで、カンナ局長と公安局の生徒は予定より早く仕事に復帰できました。"
42240-161 = "……彼女の決断が少しでも報われたようで安心しています。"
42240-166 = "そういえば、生活安全局のキリノさんは今回の功績で警備局に転科できるチャンスを得たようですが……なぜか断ったそうです。"
42240-167 = "前回の戦闘を通じて、何か気づきがあったのでしょうか。"
42240-169 = "RABBIT小隊は……その代わりというほどでもないのですが、連邦生徒会より、ここ、子ウサギ公園に滞在して問題ないと正式に許可をもらいました。"
42240-170 = "本来撤去する予定の公園だった上に、子ウサギタウンの管理問題が浮いてしまった関係で、思いの外簡単に許可が下りたみたいです。"
42240-171 = "おかげで、ヴァルキューレの皆さんと、肩の力を抜いて向き合えるようになりました。"
42240-172 = "もちろん、公園での生活はまだまだ不便な所が多くて、[USERNAME]先生に助けられていますが……"
42240-174 = "シャーレ・休憩室"
42240-176 = "ふぁ……さっぱりした……"
42240-177 = "シャワー室ありがとね、先生。"
42240-178 = "こうも暑くなるとお風呂を沸かすために火起こしするのも大変でさぁ。"
42240-179 = "[s1] \"どういたしまして。\"\n[s2] \"前も言ったけど、シャーレのシャワー室はいつでも使っていいからね。\""
42240-182 = "ふふ、せっかくだし冷蔵庫も貸してもらおっかな……"
42240-189 = "先生、この間頼まれた事故現場の弾痕調査の結果を持ってきたんだが……"
42240-193 = "モエ、おま……なんだその格好。"
42240-194 = "まさか、一人でシャーレのシャワー室に入ったのか？"
42240-195 = "あ、それが……"
42240-196 = "昨日の夜、私のテントの扇風機が壊れちゃって、もう汗だくでさぁ……"
42240-197 = "勝手に一人だけシャーレでさっぱりしてるなんて……"
42240-198 = "……この裏切り者ぉ！"
42240-199 = "[s3] \"あ、そうだ。サキ。\"\n[s4] \"シャンプー、この前頼まれた香りで買っておいたよ。\""
42240-204 = "あ、ありがとう……助かる。"
42240-209 = "……なに、サキ。あんたも来てたの？"
42240-210 = "あーあ、一体どっちが裏切り者なのやら。"
42240-211 = "そ、それは、その……"
42240-212 = "この前、シャーレ当番中に鉄帽の中が蒸れてしまったから髪を洗っただけで……！"
42240-213 = "私は誰かさんみたいにシャワーまで浴びてない！"
42240-214 = "シャワー室を借りた時点で同じだっての！"
42240-222 = "おはようございます、先生。"
42240-223 = "午前の作戦で汗ばんでしまって……シャワー室を借りてもいいでしょうか……？"
42240-227 = "あれ……？サキと、モエ……？"
42240-235 = "ミヤコ――！？"
42240-242 = "慣れるまで少し時間はかかりそうですが、きっとみんなで仲良く過ごせると思います。"
42240-243 = "……私たちには、[USERNAME]先生という心強いサポーターがいますから。"
42240-245 = "本来は矯正局の規定上難しいことですが、先生に特別にお願いして、ささやかながら差し入れをお贈りします。"
42240-246 = "ニコ先輩の手作りおいなりさんとは比べ物にもならないコンビニ弁当ですが、今の私たちに用意できるのはこのくらいなので。"
42240-247 = "報告は以上です、どうかお元気で。"
42240-248 = "RABBIT小隊、小隊長・月雪ミヤコより。"
42240-253 = "あはは……先輩に送る初プレゼントがコンビニ弁当だなんて。"
42240-254 = "それはちょっとあんまりだよ、ミヤコちゃん……"
42240-258 = "……でも、元気そうでよかった。"
42240-265 = "午前の駆け足、終わり……！"
42240-266 = "かなり体力が落ちちゃったみたい。#n駆け足でもうくたくたよ……"
42240-267 = "あれ？それって……いなり寿司じゃない？"
42240-268 = "わあ、この香り……久しぶりに嗅いだから涙出そう……"
42240-269 = "それ……私たちが食べてもいいの？"
42240-271 = "うん、もらったんだ。"
42240-272 = "ユキノちゃんも呼んで、みんなで食べよう。"
42240-273 = "やったぁ！"
42240-275 = "でも、矯正局でコンビニ弁当なんて……珍しいわね。"
42240-276 = "このいなり寿司は誰からなの？"
42240-278 = "うーん、そうだね……誰って言えばいいんだろ……強いて言うなら……"
42240-285 = "――「明日」からのプレゼント、かな。"

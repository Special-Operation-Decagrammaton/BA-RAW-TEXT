42240-73 = "3;마이;02;…….\n#3;em;…"
42240-74 = "3;데카르트;02;하지만 여러분. 총학생회와 협상을 하지 않고도 폐기 도시락을 손쉽게 얻을 수 있는 방법은 또 있습니다!\n#3;greeting\n#3;em;[반짝]\n#3;closeup"

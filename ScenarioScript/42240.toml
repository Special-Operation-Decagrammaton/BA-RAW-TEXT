[translation]
42240-1 = "ตอนที่ 24;บทส่งท้าย"
42240-2 = "สตูดิโอสาธารณะที่ 7 โรงเรียนโครโนส"
42240-4 = "สวัสดีค่ะท่านผู้ชมทุกท่าน! ท่านผู้ชมกำลังอยู่กับคาซามากิ มาอิแห่งชมรมข่าวโครโนสค่า!"
42240-5 = "รายการ <วิเคราะห์ข่าวกับคาซามากิ มาอิ> วันนี้ จะเป็นการนำเสนอข้อมูลเชิงลึกเกี่ยวกับการเปลี่ยน#nรักษาการแทนประธานองค์การนักเรียนและเหตุการณ์พยายามก่อระเบิดที่สถานีโคะอุซางิค่ะ"
42240-6 = "ชาวเมืองหลายคนอาจทราบกันแล้วว่า หัวหน้าฝ่ายบริหารนานากามิ ริน ถูกปลดออกจากตำแหน่งตาม#nแถลงการณ์ฉุกเฉินเมื่อคราวก่อน และชิรานูอิ คายะ ตำแหน่งหัวหน้าสำนักป้องกันในขณะนั้นก็ได้ขึ้น#nเป็นรักษาการแทนประธานองค์การนักเรียนคนใหม่นะคะ"
42240-7 = "ท่ามกลางการถกเถียงเรื่องความเหมาะสมของคำสั่งบริหารที่หัวหน้าสำนักฯ คายะประกาศใช้ทันทีหลัง#nจากได้รับตำแหน่ง ก็มีการตรวจพบว่าเธอเป็นผู้อยู่เบื้องหลังการลอบวางระเบิดที่สถานีโคะอุซางิ จนมี#nการพิจารณาถอดถอนค่ะ"
42240-8 = "นอกจากนี้ยังมีการเปิดเผยว่า <ไคเซอร์ ซิเคียวริตี้> ที่เป็นบริษัทลูกของ <ไคเซอร์ คอร์เปอเรชั่น> ได้รับเงินสินบนจำนวนมหาศาลจากหัวหน้าสำนักฯ คายะ ไคเซอร์กรุ๊ปจึงตกเป็นศูนย์กลางของการ#nวิพากษ์วิจารณ์อีกครั้งค่ะ"
42240-9 = "แต่โฆษกของทางไคเซอร์กรุ๊ปก็ออกมาหลีกเลี่ยงความรับผิดชอบและอ้างว่า 'เหตุการณ์นั้นเป็นแค่การ#nทุจริตของกรรมการบริษัทลูก ซึ่งไม่เกี่ยวข้องกับนโยบายของสำนักงานใหญ่' ค่ะ"
42240-10 = "แม้เหตุการณ์จะใหญ่ขนาดนี้ แต่ทางองค์การนักเรียนก็ยังไม่ออกมาให้คำตอบที่ชัดเจน จึงทำให้เกิดข้อสงสัยหลายอย่างตามมาค่ะ"
42240-11 = "<วิเคราะห์ข่าวกับคาซามากิ มาอิ> ในวันนี้ เราอยู่กับผู้เชี่ยวชาญข่าวสารบ้านเมืองที่จะมาอธิบาย และพูดคุยอย่างจริงจังเกี่ยวกับสถานการณ์นี้ค่ะ!"
42240-12 = "ยินดีต้อนรับผู้เชี่ยวชาญข่าวสารบ้านเมือง คุณเดการ์ตค่ะ!"
42240-19 = "สวัสดีครับ ผมเดการ์ต ผู้เชี่ยวชาญเหตุการณ์ปัจจุบันทันด่วนที่สุดใน D.U. และเป็นผู้นำ <กลุ่มแสดงหาความสุขโดยไม่ต้องเป็นเจ้าของ>... หรือเรียกสั้นๆ ว่ากลุ่ม <ความสุขเล็กๆ> ครับ!"
42240-20 = "อ่า... สวัสดีค่ะคุณเดการ์ต"
42240-21 = "ชื่อกลุ่มของคุณ... ยอดเยี่ยมมากเลยนะคะ"
42240-22 = "อ๊ะ สนใจเกี่ยวกับกลุ่มของพวกเราเหรอครับ?"
42240-23 = "<ความสุขเล็กๆ> ของเราคือ <กลุ่มผู้แสวงหาความสุขเล็กๆ แบบไม่ต้องครอบครอง>..."
42240-24 = "ไม่เป็นไรค่ะ คุณเดการ์ตไม่ต้องอธิบายเกี่ยวกับกลุ่มของคุณก็ได้ค่ะ"
42240-25 = "วันนี้เราเชิญคุณมาถามเกี่ยวกับข้อสงสัยมากมายที่มีต่อองค์การนักเรียนน่ะค่ะ"
42240-26 = "ชิ..."
42240-27 = "คำถามแรกค่ะ!"
42240-28 = "หัวหน้าสำนักป้องกันคายะที่ถูกจับกุมในข้อหาทุจริตและก่อความขัดแย้งภายในปฏิเสธอย่างหนักแน่น#nว่าอาชญากรรมนี้ไม่ได้เกิดจากผลประโยชน์ส่วนตัว"
42240-29 = "ระหว่างถูกจับกุมและส่งตัวไปยังห้องคุมขัง หัวหน้าสำนักฯ คายะก็กล่าวว่า 'หากยอดคนตัวจริงออกมา#nปรากฏตัว ประชาชนที่โง่เขลาอย่างพวกเธอก็จะเข้าใจเจตนาของฉัน' ด้วยค่ะ"
42240-30 = "คุณคิดว่ายอดคนที่หัวหน้าสำนักฯ คายะพูดถึงจะเป็นใครเหรอคะ? คุณครูจากชาเล่ต์...? หรือว่าประธานองค์การนักเรียน...?"
42240-31 = "หากว่ายังไม่ใช่สองคนนี้ หรือว่า... จะมีคนอื่นที่อยู่เบื้องหลังอีกคะ?!"
42240-33 = "...ไม่มีทางเป็นอย่างนั้นหรอกครับ"
42240-34 = "หากมีผู้อยู่เบื้องหลังที่พอจะควบคุมหัวหน้าสำนักป้องกันได้ ก็คงไม่เลือกใช้วิธีที่น่ารำคาญอย่างการ#nปฏิวัติตั้งแต่แรกหรอกครับ"
42240-35 = "มันก็แค่การระบายความโกรธของผู้แพ้เท่านั้นน่ะครับ ไม่ต้องไปสนใจฟังหรอกครับ"
42240-37 = "งะ... งั้นเหรอคะ..."
42240-38 = "ถ้างั้นมาที่คำถามต่อไปค่ะ"
42240-39 = "ตอนที่หัวหน้าสำนักฯ คายะถูกจับกุม ชาวเมืองบางคนบอกว่านอกจากกรรมการของ <ไคเซอร์ ซิเคียวริตี้> แล้ว ก็เห็นนักเรียนหลายคนในชุดกะลาสีถูกควบคุมตัวไปด้วยค่ะ"
42240-40 = "แต่ตอนนี้ยังไม่มีการเปิดเผยอย่างชัดเจนค่ะว่านักเรียนที่ใส่ชุดกะลาสีนั้นเป็นใคร และมาจากโรงเรียนไหน "
42240-41 = "ตามข่าวลือบอกว่านักเรียนพวกนั้นเป็นสมาชิกของสถาบัน SRT ที่ถูกยุบไปเมื่อนานมาแล้ว..."
42240-43 = "จะเป็นแบบนั้นได้ยังไงกันล่ะครับ?!"
42240-48 = "ทะ... ทำไมจู่ๆ ก็หงุดหงิดใส่กันแบบนี้ล่ะคะ?"
42240-49 = "สมาชิกของสถาบัน SRT เป็นนักเรียนที่กล้าหาญที่ยอมเสี่ยงชีวิตเพื่อสู้กับความอยุติธรรมนะครับ!"
42240-50 = "ทำไมถึงปฏิบัติกับนักเรียนพวกนี้ราวกับเป็นอาชญากรของเหตุการณ์นี้ด้วย... นี่คือการกล่าวหาร้ายแรง#nมากนะครับ!"
42240-51 = "มันยากที่จะลงรายละเอียดนะครับ แต่การบอกว่านักเรียนพวกนี้คืออดีตสมาชิกสถาบัน SRT มันเป็นข่าว#nปลอมครับ!"
42240-52 = "ต่อให้ต้องเอาข้าวหน้าเนื้อย่างหมดอายุเป็นเดิมพัน ผมก็จะยืนยันเหมือนเดิมครับ!"
42240-54 = "(...แปลว่าเขาก็ไม่ได้มั่นใจเท่าไรสินะ?)"
42240-58 = "เข้าใจแล้วค่ะ ถ้างั้นก็คำถามสุดท้าย..."
42240-59 = "ที่หัวหน้าสำนักฯ คายะเรียกคุณครูชาเล่ต์เข้าไปพบตอนประกาศแถลงการณ์ฉุกเฉิน คุณคิดว่าเธอมีจุด#nประสงค์อะไรเหรอคะ?"
42240-60 = "ดูจากการเรียกตัวออกอากาศขนาดนั้นแล้ว เธอคงไม่คิดที่จะปิดบังความสัมพันธ์ที่มีกับคุณครูนะคะ..."
42240-61 = "หัวหน้าสำนักฯ คายะไม่ได้ทำเพราะอยากได้อาวุธหรือสิทธิในการควบคุมคิโวทอสได้ตามใจจาก#nชาเล่ต์หรอกเหรอคะ?"
42240-62 = "อ้อ ถ้าเป็นเรื่องนั้นผมสามารถตอบได้เลยครับ!"
42240-63 = "สิ่งที่หัวหน้าสำนักฯ คายะขอจากคุณครูชาเล่ต์ก็คือ... ข้าวกล่องเหลือทิ้งจากร้านสะดวกซื้อสาขาอาคาร#nชาเล่ต์ครับ!"
42240-67 = "ขะ... ข้าวกล่องเหลือทิ้งเหรอคะ...?"
42240-68 = "ใช่ครับ ร้านสะดวกซื้อสาขานั้นมีลูกค้าเข้าน้อยเมื่อเทียบกับขนาดของร้าน ก็เลยมีข้าวกล่องหมดอายุ#nเหลือเยอะตลอดเลยครับ"
42240-69 = "ถ้าเห็นข้าวกล่องจำนวนมากขนาดนั้น... ไม่ว่าใครก็ต้องอยากได้ครับ!"
42240-71 = "แต่ผมว่าการเจรจาระหว่างชาเล่ต์กับองค์การนักเรียนไม่สำเร็จครับ เพราะตอนนี้ไม่มีข้าวกล่องส่งมา#nขายในร้านสะดวกซื้อสาขาอาคารชาเล่ต์มาสักพักแล้ว!"
42240-73 = "......."
42240-74 = "แต่ว่าทุกท่านครับ ผมมีวิธีการหาข้าวกล่องเหลือทิ้งแบบง่ายๆ โดยไม่ต้องไปเจรจากับองค์การนักเรียน#nอยู่นะครับ!"
42240-75 = "เพียงแค่สมัครเข้ากลุ่ม <ความสุขเล็กๆ> ตอนนี้ คุณจะได้คาราอะเกะกระดูกไก่ฟรี และข้าวกล่องหน้า#nถั่วงอกอีกกล่องเป็นของแถม..."
42240-80 = "ขออภัยที่เราต้องตัดภาพไปนะคะ ช่วยรอสักครู่นะคะ"
42240-81 = "ทำอะไรของพวกคุณเนี่ย!"
42240-82 = "คิดว่าปฏิบัติกับผมแบบนี้แล้วจะอยู่แบบสุขสบายได้งั้นเหรอ...!"
42240-86 = "ต้องขออภัยด้วยค่ะท่านผู้ชมทุกท่าน ผู้เชี่ยวชาญ คุณเดการ์ต ผู้เชี่ยวชาญข่าวสารบ้านเมืองที่เชิญมา#nในวันนี้มีธุระด่วนเข้ามา จึงออกจากห้องส่งไปแล้วค่ะ"
42240-87 = "<วิเคราะห์ข่าวกับคาซามากิ มาอิ> วันนี้ต้องจบลงเท่านี้ และต่อไปจะเป็นรายการ <คุณครูหน้าเห่ยของฉัน> แทนค่ะ"
42240-88 = "อย่าเปลี่ยนช่องไปไหนนะคะ...!"
42240-92 = "... ทำไมชิน่อนถึงไปเอาคนไม่เต็มเต็งแบบนั้นมาเป็นผู้เชี่ยวชาญกันนะ?"
42240-97 = "ห้องคุมขังพิเศษหมายเลข 207 อาคาร B"
42240-99 = "... การใช้ชีวิตในสำนักควบคุมก็ไม่ได้เลวร้ายอย่างที่คิดแฮะ"
42240-100 = "เราได้ตื่นตรงเวลาแล้วก็เริ่มทำกิจวัตรประจำวัน ได้ฝึกฝนร่างกาย และได้ใช้ชีวิตตามระเบียบวินัยด้วย แบบนี้ก็ไม่ได้ต่างจากสถาบันพิเศษ SRT เท่าไรนะ"
42240-101 = "แต่ก็มีข้อเสียตรงที่ไม่มีซูชิเต้าหู้หวานในรายการอาหารเนี่ยแหละ"
42240-102 = "อ่า... คิดถึงซูชิเต้าหู้หวานอุ่นๆ ที่ทำมาใหม่ๆ จัง..."
42240-108 = "หมายเลข 5021 มีคนส่งอาหารมาให้"
42240-113 = "ส่งอาหาร...? ใครส่งมาเหรอคะ?"
42240-114 = "ไม่ปรากฏชื่อผู้ส่ง มันเป็นของที่ส่งโดยตรงมาจากคนระดับสูงน่ะ"
42240-118 = "ข้างในมีจดหมายแนบมาด้วย หาอ่านเอาเองล่ะ"
42240-122 = "แปลกจัง ไม่น่ามีใครส่งจดหมายมาให้ฉันนี่นา..."
42240-127 = "... มิยาโกะจัง?"
42240-130 = "วันที่ X เดือน X เวลา 04:00 น. สึคิยูกิ มิยาโกะ หัวหน้ากองทหาร RABBIT #nรายงานสภาพการใช้ชีวิตในโคะอุซางิ การ์เด้นค่ะ"
42240-131 = "กองทหาร RABBIT ทุกคนยังทำงานต่อเนื่องได้โดยไม่มีอุบัติเหตุหรือโรคภัยใดๆ..."
42240-135 = "... ไม่สิ น่าจะต้องใช้ประโยคที่ฟังดูนุ่มนวลกว่านี้หน่อยสินะคะ"
42240-136 = "ฝากความคิดถึงมาทางจดหมายนะคะรุ่นพี่ ฉันมิยาโกะเองค่ะ"
42240-139 = "หลังจากปฏิบัติการวันนั้นจบลง พวกฉันก็กลับมาที่โคะอุซางิ การ์เด้นกันอีกครั้งค่ะ"
42240-140 = "ฉันคุยกับสมาชิกอยู่นานว่าจะไปอยู่ที่ไหนดี... แต่ก็มีแค่ที่เดียวที่คิดออกค่ะ"
42240-141 = "นอกจากสถาบันพิเศษ SRT แล้วก็ไม่มีโรงเรียนไหนที่ทำให้อุดมการณ์ของพวกฉันเป็นจริงได้เลย..."
42240-142 = "ตราบใดที่พวกฉันยังอยู่ที่นี่ การต่อสู้เพื่อความยุติธรรมของ SRT ก็จะยังดำเนินต่อไปค่ะ"
42240-149 = "หลังจากหัวหน้าสำนักฯ คายะถูกจับตัวไป หัวหน้าฝ่ายบริหารรินก็ได้กลับมาเป็นรักษาการแทนประธาน#nองค์การนักเรียนอีกครั้งค่ะ"
42240-150 = "คำสั่งบริหารแสนดื้อดึงก็ถูกถอนไปทั้งหมดแล้ว D.U. ก็เลยค่อยๆ กลับมารู้สึกมั่นคง และน่าอยู่อีกครั้งค่ะ"
42240-151 = "พอกลุ่มคนที่ต่อต้านเจ้าหน้าที่รินลดน้อยลงไปในทันทีทันใด เสียงของชาวเมืองที่ตำหนิเธอก็ดูเหมือน#nจะเงียบลงไปบ้าง..."
42240-152 = "แต่ในคิโวทอสก็ยังเหลือปัญหาที่ต้องคลี่คลายอีกเยอะเลยค่ะ"
42240-153 = "ฉันว่าเจ้าหน้าที่รินกับกรรมการองค์การนักเรียนคนอื่นคงต้องเจอกับศึกหนักกันต่อนะคะ"
42240-155 = "ส่วนเรื่องที่พวกฉันปราบปรามรุ่นพี่และเอาผิดหัวหน้าสำนักฯ คายะ พวกฉันจะเก็บเรื่องนี้เป็นความลับ#nต่อคนนอกองค์การนักเรียนก่อนค่ะ"

[translation]
42240-1 = "Episode 24; Epilogue"
42240-2 = "Kronos School, Public Studio 7"
42240-4 = "Good evening! It's Kazamaki Mai from Kronos School of Journalism!"
42240-5 = "Today on 'Kazamaki's Current Events', we're discussing the shake-up in the General Student Council president's office and the dastardly plot to nuke Kousagi Station."
42240-6 = "As you all well know, Chief Officer Nanagami Rin was recently ousted by Defense Chief Shiranui Kaya as acting General Student Council president in a shocking coup that turned Kivotos on its head! "
42240-7 = "She didn't stay for long, however! The public's distaste grew as she implemented harsh rules and even harsher regulations. It all exploded into her eventual impeachment when it was revealed that she was the one behind the Kousagi terror plot!"
42240-8 = "Imagine the entire world's shock! To make matters worse, further digging implicated Kaiser Security, a branch of Kaiser Corp. It seemed they accepted hefty bribes from Kaya, putting the corporation back in the hot seat!"
42240-9 = "Yet, Kaiser Group claims it's the rogue act of a single executive, and has nothing to do with the company. They strongly denounced this executive's behavior!"
42240-10 = "But even with the scope of this controversy ballooning every day, it's been absolute crickets from the General Student Council! Can the public trust this council at all anymore?"
42240-11 = "Joining me today to discuss this very serious topic further..."
42240-12 = "...is our expert in current affairs, Descartes!"
42240-19 = "Hello. I’m Descartes, leading expert on current events and head of the Pursuers of Non-Possessive Happiness, or the Pursuers!"
42240-20 = "Hello and welcome, Descartes."
42240-21 = "It seems like you lead quite the eccentric group."
42240-22 = "Oh! Are you interested in joining?"
42240-23 = "We in the Pursuers of Non-Possessive Happiness, or Pursuers, are—"
42240-24 = "While we'd love to hear more about that another time, today we have a much more pressing issue!"
42240-25 = "We've invited you here today so we can ask you about the various issues surrounding the General Student Council."
42240-26 = "Tsk."
42240-27 = "First question!"
42240-28 = "Chief of Defense Kaya has been adamantly denying all allegations of abusing the office for personal gain since her arrest."
42240-29 = "In fact, while she was being transported to the Corrections Bureau, she claimed: \"When a real superhuman appears, you ignorant masses will finally understand!\""
42240-30 = "Just who or what is the superhuman that she mentioned? Schale's Sensei...? Or perhaps the previous General Student Council President?"
42240-31 = "If not, do you think there was another meaning to what she was saying?!"
42240-33 = "...Of course not."
42240-34 = "If there was really some superhuman that could control the Council and everyone else, Kaya never would've fallen to such shady dealings to get what she wanted."
42240-35 = "It's nothing more than the mad rantings of a loser. I wouldn't give her words any meaning."
42240-37 = "I-I see..."
42240-38 = "Next question, then!"
42240-39 = "When Chief Kaya was arrested, there were sightings of students in unfamiliar uniforms being detained and escorted away."
42240-40 = "Despite questions and rumors flying, nothing has been confirmed about the identity of these students."
42240-41 = "Some gossip even suggests they might be from the disbanded SRT Academy—"
42240-43 = "That's utter nonsense!"
42240-48 = "Wh-Why do you say that?"
42240-49 = "SRT Academy students are the ones who bravely fought alongside the oppressed as we rose up against Kaiser's corruption!"
42240-50 = "It's absurd to think that these courageous pupils would be associated with such a scandal!"
42240-51 = "While I can't disclose my informants, I can confidently state that these rumors about them being from SRT Academy are totally baseless!"
42240-52 = "I can bet my expired yakiniku bento on that!"
42240-54 = "(...If you bet something so gross, it seems like you're not confident at all...)"
42240-58 = "We might have to pass on that one! Haha! And for our last question..."
42240-59 = "What was Chief Kaya's motive for summoning Schale's Sensei during her public address?"
42240-60 = "Given it was via a public broadcast, it's evident that Defense Chief Kaya had no intentions of concealing her association with the teacher..."
42240-61 = "Was her aim to exert control over Schale and increase her influence over Kivotos?"
42240-62 = "Ah, that one’s simple!"
42240-63 = "What Chief Kaya sought from Sensei...were likely the expired bentos that were taken from Schale’s store!"
42240-67 = "Expired...bentos...?"
42240-68 = "Correct. Given the low foot traffic at that store, leftovers are inevitable."
42240-69 = "Any observer would be tempted by the sight of piles and piles of expired bentos!"
42240-71 = "That is exactly why bentos deliveries to Schale's convenience store were blocked during Kaya's reign! The bento negotiations must have fallen through."
42240-73 = "..."
42240-74 = "But folks, fret not! You can still get your hands on those lunches without any dealings with the General Student Council!"
42240-75 = "By joining the Pursuers, you’ll get a complimentary chicken bone karaage and a mung bean sprout bento!"
42240-80 = "Sorry folks! Looks like a technical hiccup. We'll be back shortly."
42240-81 = "What are you doing to me?!"
42240-82 = "How dare you treat me like this?! I will sue—"
42240-86 = "Sorry, folks. It appears our current affairs expert, Descartes, had pressing matters elsewhere."
42240-87 = "The rest of today's Kazamaki Mai's analysis of current events will be replaced with My Squiddie Sensei!"
42240-88 = "Stay tuned, folks!"
42240-92 = "Where in the world did Shinon find that guy?"
42240-97 = "Corrections Bureau, Special Camp B-wing Unit 207"
42240-99 = "...You know, life here isn't nearly as bad as I thought it would be."
42240-100 = "It isn't too different from SRT Academy. A routine wake-up, exercising, and strict schedules..."
42240-101 = "The only shortfall might be the absence of inarizushi during meals."
42240-102 = "Oh... Just last night I had a dream about a piping hot inarizushi..."
42240-108 = "Prisoner 5021. You have a special meal."
42240-113 = "...A special meal? What do you mean?"
42240-114 = "A gift from some anonymous sender. Must be someone pretty high in the ranks."
42240-118 = "They left you a letter too."
42240-122 = "Strange. No one outside would send me a letter..."
42240-127 = "...Miyako?"
42240-130 = "00/00 at 0400. RABBIT Squad leader Tsukiyuki Miyako. A little late, but reporting! Life in Kousagi Park has returned to normal."
42240-131 = "RABBIT Squad is operational with no injuries or exceptions..."
42240-135 = "...This sounds incredibly formal, doesn't it?"
42240-136 = "This isn't how I wanted to talk to you. Hi. It's Miyako."
42240-139 = "We've been back at Kousagi Park since the operation ended."
42240-140 = "The squad members and I debated for a little bit on what to do, but at the end of the day, this park is our home now."
42240-141 = "The only academy that holds our ideals of justice is SRT Academy..."
42240-142 = "So we'll stay here, and continue fighting for SRT the best we can."
42240-149 = "Following Kaya's arrest, Administrator Rin re-assumed the position of Acting General Student Council President."
42240-150 = "Kaya's harsh orders were all withdrawn, and things are finally starting to feel normal in the D.U. again."
42240-151 = "Administrator Rin has a lot of goodwill to ride on right now, so things are relatively quiet."
42240-152 = "Although, for some reason it seems like there's never any end to conflict and problems in Kivotos."
42240-153 = "I'm sure Rin and the rest of them are going to be very, very busy for the next couple of months."
42240-155 = "We've kept your involvement with Kaya's crimes under wraps. Only the General Student Council knows."
42240-156 = "Admitting the General Student Council sought SRT Academy’s help, the same academy they closed, would have been tricky, so they've been cooperating."
42240-157 = "And we didn't want to be the one to tell the world. I felt like you should, when you're ready."
42240-159 = "Director Kanna was officially credited for returning peace to Kivotos."
42240-160 = "She and the Public Peace Bureau students resumed duties quicker than anticipated because of that."
42240-161 = "I was happy to see her dedication to what she thought was right was rewarded in the end."
42240-166 = "I heard Kirino, from the Public Safety Bureau, was offered a spot in the Public Peace Bureau for her role in this...but she surprisingly declined."
42240-167 = "A battlefield epiphany, maybe?"
42240-169 = "As for RABBIT Squad... We've finally been granted official permission from the General Student Council to stay in Kousagi Park."
42240-170 = "It was a simpler decision for the Council, since Kousagi Town obviously isn't being developed anymore."
42240-171 = "It's been really nice! We can even meet with the Valkyrie students and move more freely now."
42240-172 = "Life in the park definitely wasn't the easiest option... [USERNAME] Sensei has been pretty instrumental in helping make it work though!"
42240-174 = "Schale Lounge"
42240-176 = "I haven't gotten a chance to actually shower like that in so long ."
42240-177 = "Thanks for letting us use Schale's facilities, Sensei."
42240-178 = "The barrel baths can be fun and all, but sometimes it's a huge chore when you just want to relax!"
42240-179 = "[s1] \"Anytime.\"\n[s2] \"Like I've said, feel free to use it whenever.\""
42240-182 = "Heehee, since we're discussing hospitality, let me raid the fridge then..."
42240-189 = "Sensei, I brought the ballistics analysis from the scene that you asked for..."
42240-193 = "Moe... Why do you look like that?"
42240-194 = "No way... No way you snuck over here and used Schale's showers by yourself!"
42240-195 = "Um..."
42240-196 = "My tent's fan failed, and I got really sweaty yesterday, so..."
42240-197 = "You came and showered without us!"
42240-198 = "You traitor!"
42240-199 = "[s3] \"Saki, the shampoo you wanted just came in.\" \n[s4] \"I got the shampoo with the scent that you wanted.\""
42240-204 = "Really, thanks!"
42240-209 = "...Hang on, you've been showering here too?"
42240-210 = "Who's the traitor now? Huh?"
42240-211 = "I-I mean!"
42240-212 = "I get really sweaty under my helmet sometimes! I was on Schale duty, what was I supposed to do?!"
42240-213 = "And I only washed my hair! I didn't use the whole thing, unlike somebody I know!"
42240-214 = "It doesn't matter how much of the shower you used! Using half of it is still using it!"
42240-222 = "Good morning, Sensei."
42240-223 = "Can I use the shower? It was really hot during morning patrols today..."
42240-227 = "Huh...? Saki? Moe?"
42240-235 = "Miyako!"
42240-242 = "...Well, it might take a little bit of time to adapt."
42240-243 = "But with [USERNAME] Sensei on our side, I think we'll be okay."
42240-245 = "We had to get a little creative to comply with the Corrections Bureau's regulations, but we prepared a small meal for you."
42240-246 = "It's not Niko's homemade cooking, but a store-bought inarizushi is the best we could do."
42240-247 = "That concludes my report. I hope you are well."
42240-248 = "Tsukiyuki Miyako, RABBIT Squad Leader."
42240-253 = "I finally get a gift from my adorable underclassmen, and it's a bento from a convenience store?"
42240-254 = "I guess that's classic Miyako though."
42240-258 = "...I'm glad to hear they're doing well."
42240-265 = "I just finished my morning run."
42240-266 = "Same! But I think my stamina's already decreasing... That took a lot out of me."
42240-267 = "Hold up. Is that...inarizushi?"
42240-268 = "The smell... It's divine! I... I might cry."
42240-269 = "Are we... Is it...poisoned?"
42240-271 = "Of course not. It was a gift."
42240-272 = "Call over the others and we'll share it."
42240-273 = "Let's do it!"
42240-275 = "What a rare treat in the Corrections Bureau..."
42240-276 = "Who even sent this to you?"
42240-278 = "Hm, who indeed?"
42240-285 = "Let's say it was a gift from my tomorrow..."

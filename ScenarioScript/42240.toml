42240-68 = "5;데카르트;00;네, 샬레의 편의점은 그 규모에 비해 방문하는 손님의 숫자가 제한되기 때문에 언제나 많은 양의 도시락이 폐기되고 있지요.\n#5;em;[반응]\n#5;m3\n#3;dl"
42240-69 = "5;데카르트;02;그 막대한 양의 도시락을 본다면…… 누구라도 탐을 낼 게 분명합니다!"
42240-70 = "#all;hide"
42240-71 = "3;데카르트;05;샬레와 총학생회 간의 도시락 협상이 결렬되었다는 건, 이후 한동안 샬레 건물의 편의점에 도시락이 납품되지 않았다는 사실을 통해 짐작할 수 있지요!\n#3;closeup"

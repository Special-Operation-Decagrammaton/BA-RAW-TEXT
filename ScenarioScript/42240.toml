[translation]
42240-1 = "第24話;尾聲"
42240-2 = "克洛盧斯學園．第七公共錄影棚"
42240-4 = "各位觀眾，大家好！#n我是克洛盧斯新聞部的風卷麻衣！"
42240-5 = "本次「風卷麻衣的時事分析」頻道將會深度探討上次的聯邦學生會長代理更換，#n以及兔寶寶站爆炸未遂事件。"
42240-6 = "如市民朋友們所知，在七神琳行政官因為緊急聲明失勢後，#n時任防衛室長的不知火香耶便繼任為新的聯邦學生會長代理。"
42240-7 = "香耶室長在就任後隨即因發表的數道行政命令前後不一而引發爭議──#n在那之後，又因為策畫兔寶寶站的爆破恐攻一事曝光而面臨彈劾審判──遭到起訴。"
42240-8 = "此外，「凱薩公司」子公司「凱薩保全」收受香耶室長巨額回扣一事也被公諸於世，凱薩集團再度成為了話題的焦點。"
42240-9 = "然而，凱薩集團的代表發聲明表示──#n「本次事件是子公司職員的獨斷行為，與本公司的經營方針無關」。"
42240-10 = "即使事件的規模已經擴大到這種程度，聯邦學生會依舊沒能給出明確的回答，#n導致各式各樣的疑惑不斷浮出水面。"
42240-11 = "今天「風卷麻衣的時事分析」頻道邀請到一名時事專家，#n將為我們清楚好懂地解答這些疑惑！"
42240-12 = "時事專家──笛卡爾先生，有請！"
42240-19 = "各位觀眾朋友，我是D.U.最快的時事專家，#n也是「就算無所有也要蒐集確實的幸福」……簡稱「所確幸」的領袖笛卡爾！"
42240-20 = "您，您好，笛卡爾先生。"
42240-21 = "這……是個聽起來很厲害的組織呢。"
42240-22 = "啊，你對我們有興趣嗎？"
42240-23 = "我們這個「就算無所有也要蒐集確實的幸福」，簡稱「所確幸」是……"
42240-24 = "不，這點不必說明沒關係。"
42240-25 = "今天希望您能為我們解開圍繞聯邦學生會的種種謎團。"
42240-26 = "呿……"
42240-27 = "那麼請教您第一個問題！"
42240-28 = "本次由於不當行為和內亂的嫌疑遭到逮捕的香耶防衛室長，#n在被捕後堅稱這場犯罪並非出於私利私慾。"
42240-29 = "即便是在被移送至矯正局的途中，#n香耶室長依舊表示「等到真正的超人現身，你們這些愚民就會明白我的意思了」。"
42240-30 = "這位「超人」指的究竟是誰呢？#n是夏萊的老師……？還是聯邦學生會長……？"
42240-31 = "又或者是……事件的背後難道還有某些不為人知的祕密嗎！？"
42240-33 = "……那怎麼可能呢。"
42240-34 = "如果真的有足以控制防衛室長的人物，根本就不必用政變這麼麻煩的手段吧。"
42240-35 = "那不過是敗者的哀號罷了，根本沒有聽的價值。"
42240-37 = "是，是這樣嗎……"
42240-38 = "那麼下一個問題。"
42240-39 = "在香耶室長遭到逮捕時，部分市民似乎目擊到了除「凱薩保全」的幹部外，#n還有數名身穿水手服的學生一同被護送的場景。"
42240-40 = "那些身穿水手服的學生究竟是哪個學園的人，目前依舊不明。"
42240-41 = "有傳聞說──他們可能是遭到關閉的SRT特殊學園的學生──"
42240-43 = "──那怎麼可能呢！？"
42240-48 = "您，您為什麼突然這麼激動？"
42240-49 = "SRT特殊學園的隊員都是能為了正義冒險戰鬥的勇敢學生！"
42240-50 = "竟然把那些學生和事件的犯人混為一談……真是太失禮了！"
42240-51 = "雖然不能說出詳細的來龍去脈，#n但說那些學生是SRT特殊學園出身隊員的全都是假新聞！"
42240-52 = "我以過期的燒肉便當發誓！"
42240-54 = "（……這是指他沒自信的意思嗎？）"
42240-58 = "我明白了，那麼最後一個問題……"
42240-59 = "香耶室長發布緊急聲明時，邀請夏萊老師的目的究竟為何呢？"
42240-60 = "從利用公開管道邀請老師這點來看，他似乎沒有打算隱瞞與老師之間的關係……"
42240-61 = "香耶室長是不是打算從夏萊手中得到能自由操縱奇普托斯的武器或權限呢？"
42240-62 = "啊，這點我倒是能夠明確地回答你！"
42240-63 = "香耶室長向夏萊的老師要求的……就是本該在夏萊便利商店裡報廢的便當！"
42240-67 = "本該報廢的……便當……？"
42240-68 = "沒錯。夏萊便利商店的來客數與規模相比實在有限，#n因此總是會有大量的便當遭到報廢。"
42240-69 = "看到那麼大量的便當……無論是誰都肯定會心動的！"
42240-71 = "這點可以從夏萊和聯邦學生會之間的便當協商破裂後，#n夏萊大樓的便利商店就有好一陣子沒有便當進貨來推測！"
42240-73 = "……"
42240-74 = "不過各位觀眾不用擔心！#n其實有一個不與聯邦學生會交涉也能輕鬆取得報廢便當的方法！"
42240-75 = "只要現在加入「所確幸」，就能免費獲得一份豆芽菜便當和唐揚雞骨──"
42240-80 = "～畫面出現異常，請稍待片刻～"
42240-81 = "你們要對我做什麼！"
42240-82 = "竟敢這樣對待我──"
42240-86 = "各位觀眾，非常抱歉。#n方才那位時事專家笛卡爾先生臨時有急事必須先行離開。"
42240-87 = "本期「風卷麻衣的時事分析」將改播臨時節目「我的魷魚老師」。"
42240-88 = "請不要轉台哦……！"
42240-92 = "……詩音到底是從哪裡找來[ruby=那個怪人]時事專家[/ruby]的啊？"
42240-97 = "矯正局．特殊收容所B棟207號"
42240-99 = "……矯正局的生活也比想像中還好嘛。"
42240-100 = "在固定的時間起床上課、鍛鍊身體……#n就過著規律的生活這點，好像其實跟SRT特殊學園沒什麼兩樣。"
42240-101 = "不過沒有供應豆皮壽司倒是有點遺憾。"
42240-102 = "啊……真懷念剛做好的豆皮壽司……"
42240-108 = "犯人編號5021，有你的包裹。"
42240-113 = "……包裹？是誰寄來的？"
42240-114 = "我也不知道寄件人是誰，因為高層親自拿來的。"
42240-118 = "裡面還有一封信，記得打開來看。"
42240-122 = "真奇怪……應該沒有人會從矯正局外寄信給我才對啊……"
42240-127 = "……都子醬？"
42240-130 = "O月O日0400，RABBIT小隊，小隊長月雪都子。#n由於已經在兔寶寶公園安頓下來，特此進行現況報告。"
42240-131 = "RABBIT小隊全員皆無任何異常，將繼續執行勤務──"
42240-135 = "……不，好像還是用更輕鬆的語氣比較適合呢。"
42240-136 = "前輩們都還好嗎。我是都子。"
42240-139 = "那天，在作戰全部結束之後，我們再次回到了兔寶寶公園。"
42240-140 = "對於該回到哪裡這點，我和大家商量了很久……#n最終還是選擇了這個地方。"
42240-141 = "畢竟除了SRT特殊學園之外，沒有能實現我們理想的學園……"
42240-142 = "也因為我們認為只要待在這裡，就能繼續為SRT的正義戰鬥下去。"
42240-149 = "自從香耶室長被逮捕後，琳首席行政官重回了聯邦學生會長代理之位。"
42240-150 = "不合理的行政命令全都遭到撤回，D.U.逐漸恢復了原本的平靜。"
42240-151 = "或許是因為反對琳行政官的勢力暫時減少，批評他的聲浪也多少收斂了一些……"
42240-152 = "但奇普托斯必須解決的問題仍舊堆積如山……"
42240-153 = "琳行政官與聯邦學生會幹部們辛勞的日子，今後似乎還會持續下去。"
42240-155 = "制服前輩們、揭發香耶室長罪行的是我們的事實，目前暫時決定不向外界公布。"
42240-156 = "對聯邦學生會來說，#n想必也無法正式承認受到了自己決議關閉的SRT特殊學園支援的事實吧……"
42240-157 = "我們也不希望讓前輩們的面子受損。"
42240-159 = "因此，平息本次事態的功勞，對外全都歸功給了環奈局長。"
42240-160 = "環奈局長和公安局的學生們也因而提前回歸了工作崗位。"
42240-161 = "……他所做的決斷似乎多少獲得了回報，我也感到相當欣慰。"
42240-166 = "這麼說來，聽說生活安全局的桐乃同學因為本次事件中的貢獻，#n得到了能夠轉調警備局的機會……但不知為何，他似乎婉拒了。"
42240-167 = "也許是在先前的戰鬥中得到了某些體悟也說不定。"
42240-169 = "至於RABBIT小隊……雖然不算是作為補償，#n不過聯邦學生會正式准許我們駐紮在兔寶寶公園了。"
42240-170 = "畢竟本來就是預計要拆除的公園，眼下兔寶寶鎮的管理問題又浮上水面，#n所以意外輕鬆地獲得了許可。"
42240-171 = "拜其所賜，我們終於得以放心地面對女武神的學生。"
42240-172 = "當然，在公園裡的生活依舊存在許多不便，需要[USERNAME]老師的幫忙……"
42240-174 = "夏萊．休息室"
42240-176 = "呼……舒服多了……"
42240-177 = "謝謝你借我用淋浴間，老師。"
42240-178 = "最近天氣這麼熱，為了洗澡而燒水也是相當累人啊。"
42240-179 = "[s1]「不用客氣。」\n[s2]「跟之前說的一樣，夏萊的淋浴間隨時都可以使用哦。」"
42240-182 = "呵呵，既然老師都這麼說了，我就順便借用一下冰箱吧……"
42240-189 = "老師，我把你上次拜託我的事故現場彈痕調查結果帶來了……"
42240-193 = "萌，你……那身打扮是怎麼回事。"
42240-194 = "你該不會自己一個人偷偷跑來用夏萊的淋浴間吧？"
42240-195 = "啊，該怎麼說呢……"
42240-196 = "昨天晚上我帳篷裡的電風扇壞了，所以熱得滿身大汗……"
42240-197 = "居然自己偷偷跑來夏萊快活……"
42240-198 = "……你這個叛徒！"
42240-199 = "[s3]「啊，對了，咲希。」\n[s4]「洗髮精，我買了你之前說想要的香味回來哦。」"
42240-204 = "啊，謝謝……"
42240-209 = "……什麼嘛，咲希。#n原來你也來過嗎？"
42240-210 = "啊～啊，到底誰才是叛徒啊。"
42240-211 = "那，那個，那是因為……"
42240-212 = "之前來夏萊當值日生的時候，鋼盔裡流了很多汗才在這裡洗個頭髮而已……！"
42240-213 = "我才不像某人連澡都洗了！"
42240-214 = "在借用淋浴間的時間點就半斤八兩了吧！"
42240-222 = "早安，老師。"
42240-223 = "早上的作戰流了好多汗……可以借用一下淋浴間嗎……？"
42240-227 = "咦……？#n咲希、萌……？"
42240-235 = "都子──！？"
42240-242 = "要適應這樣的生活可能還需要一段時間，不過我想大家一定能相處得很好。"
42240-243 = "……因為我們還有[USERNAME]老師這個可靠的後盾。"
42240-245 = "本來在矯正局的規定上是不能這麼做的，#n不過老師特別出面拜託，所以破例讓我們送了一些小小的慰勞品來。"
42240-246 = "雖然這些便利商店的便當比不上仁子前輩親手做的豆皮壽司，#n不過現在的我們能準備的也只有這些了。"
42240-247 = "以上就是我的報告，還請務必保重。"
42240-248 = "RABBIT小隊，小隊長．月雪都子敬上。"
42240-253 = "啊哈哈……送給前輩的第一份禮物竟然是便利商店的便當。"
42240-254 = "都子醬也太過分了吧～"
42240-258 = "……不過，幸好他們聽起來都過得很好。"
42240-265 = "晨跑完畢……"
42240-266 = "體力好像衰退了不少。#n才跑個步而已就筋疲力盡了……"
42240-267 = "咦？這不是……豆皮壽司嗎？"
42240-268 = "哇，這股香味……實在太久沒聞到，害我的眼淚都快流出來了……"
42240-269 = "這些……我們可以吃嗎？"
42240-271 = "嗯，是我們收到的禮物。"
42240-272 = "把雪乃醬叫來，大家一起吃吧。"
42240-273 = "好耶！"
42240-275 = "不過，矯正局竟然會有便利商店的便當……真是少見呢。"
42240-276 = "這些豆皮壽司是誰送來的？"
42240-278 = "唔嗯，這個嘛……該說是誰送的好呢……"
42240-285 = "──就當成是來自「明天」的禮物吧。"

[translation]
42240-1 = "#title;제24화;에필로그"
42240-2 = "#place;크로노스 스쿨, 제7 공용 스튜디오"
42240-3 = "#wait;500"
42240-4 = "3;마이;03;안녕하세요, 시청자 여러분! 크로노스 보도부의 카자마키 마이입니다!\n#3;em;[재잘]\n#3;hophop\n#3;a"
42240-5 = "3;마이;01;오늘 <카자마키 마이의 시사 분석> 채널에서는 지난번 있었던 총학생회장 대행 교체 및 코우사기 역 폭파 미수 사건에 대해 심층 보도를 하고자 합니다."
42240-6 = "3;마이;99;많은 시민 여러분들이 알고 계시다시피, 지난 긴급 성명 발표를 통해 나나가미 린 수석행정관이 실각하고, 당시 방위실장이었던 시라누이 카야가 새로운 총학생회장 대행으로 취임했었는데요."
42240-7 = "3;마이;00;카야 실장은 취임 직후 발표한 여러 행정명령의 정합성으로 인해 논란에 휩싸인 데 이어, 코우사기 역의 폭파 테러를 뒤에서 사주한 것이 발각되며 탄핵 소추되었습니다.\n#3;em;[!]\n#3;jump"
42240-8 = "3;마이;01;이 사건과 관련하여 <카이저 코퍼레이션>의 자회사, <카이저 시큐리티>가 카야 실장으로부터 거액의 리베이트를 받았다는 사실이 밝혀지며 카이저 그룹은 다시 한번 논란의 중심에 서게 되었는데요."
42240-9 = "3;마이;02;하지만 카이저 그룹의 대변인은 '자회사 임원의 일탈일 뿐, 본사의 방침과는 관련이 없다' 며 논란에 선을 긋고 책임을 회피했습니다."
42240-10 = "3;마이;99;사건의 규모가 이처럼 커졌는데도 총학생회에서는 뚜렷한 답변을 내놓지 않아 여러가지 의혹이 계속해서 불거지고 있는데요."
42240-11 = "3;마이;00;오늘 <카자마키 마이의 시사 분석> 채널에서는 이 의혹들에 대해 속 시원히 설명해 주실 시사 전문가 한 분을 모시고 진지한 이야기를 나누어 볼까 합니다!\n#3;em;[!]\n#3;closeup"
42240-12 = "3;마이;03;시사 전문가— 데카르트 씨, 나와주시죠!\n#3;em;[반짝]\n#3;greeting\n#3;closeup"
42240-13 = "#st;[0,0];instant;1;"
42240-14 = "#clearST"
42240-15 = "3;마이;03\n#3;d\n#3;closeup\n#wait;1000"
42240-16 = "#all;hide"
42240-17 = "#wait;1800"
42240-18 = "3;데카르트;00\n#3;a\n#wait;1500"
42240-19 = "3;데카르트;03;안녕하십니까. D.U.에서 가장 빠른 시사 전문가이자, <소유하지 않고도 확실한 행복을 찾는 모임>…… 줄여서 <소확행>을 이끌고 있는 데카르트라고 합니다!\n#3;em;[반짝]"
42240-20 = "1;마이;02;아, 안녕하세요, 데카르트 씨.\n#1;em;[반응]\n#1;ar\n#3;m5"
42240-21 = "1;마이;00;뭔가…… 대단한 이름의 모임을 이끌고 계시네요."
42240-22 = "3;데카르트;00;아, 저희의 활동에 관심이 있으십니까?\n#3;em;[?]"
42240-23 = "3;데카르트;03;저희 <소유하지 않고도 확실한 행복을 찾는 모임>, 줄여 <소확행>은……\n#3;m4"
42240-24 = "1;마이;03;아뇨, 데카르트 씨의 모임에 대해서는 설명해주시지 않아도 괜찮습니다.\n#1;em;[반응]"
42240-25 = "1;마이;01;오늘은 총학생회를 둘러싼 여러 의혹에 대해 질문드리기 위해 모셨으니까요."
42240-26 = "3;데카르트;02;쳇……\n#3;em;[속상함]\n#3;stiff"
42240-27 = "1;마이;00;첫 번째 질문입니다!\n#1;m3\n#3;dr"
42240-28 = "1;마이;01;이번 비리 및 내란 의혹으로 구속된 카야 방위실장은 이번 범죄가 자신의 사리사욕에 의한 것임을 완강히 부정하고 있는데요."
42240-29 = "1;마이;02;카야 실장은 체포되어 교정국으로 이송되는 중에도 '진짜 초인이 나타나면 너희 같은 우민들도 내 뜻을 이해하게 될 것'이라며 알쏭달쏭한 소회를 밝혔습니다."
42240-30 = "1;마이;03;여기서 카야 실장이 말한 초인은 과연 누구일까요? 샬레의 선생님……? 아니면 총학생회장……?\n#1;em;[?]"
42240-31 = "1;마이;02;그도 아니라면 설마…… 밝혀지지 않은 배후가 더 있기라도 한 걸까요?!"
42240-32 = "#all;hide"
42240-33 = "3;데카르트;02;……그럴 리가 없잖습니까.\n#3;em;…"
42240-34 = "3;데카르트;00;방위실장을 좌지우지할 수 있을 정도의 배후가 얽혀있었다면 애초에 쿠데타 같은 귀찮은 방법을 사용하지도 않았을 겁니다."
42240-35 = "3;데카르트;02;패배자의 분풀이 같은 소리일 뿐이니 귀담아들을 필요도 없습니다."
42240-36 = "#all;hide"
42240-37 = "3;마이;02;그, 그런가요……\n#3;em;[땀]"
42240-38 = "3;마이;01;그럼 이어서 다음 질문입니다.\n#3;greeting"
42240-39 = "3;마이;00;카야 실장이 구속되었을 때 일부 시민들이 <카이저 시큐리티>의 임원들 이외에도 세일러복 차림의 학생 여럿이 함께 호송되는 모습을 목격했다고 하는데요."
42240-40 = "3;마이;01;그 세일러복 차림의 학생들은 어느 학교의, 누구인지, 신원이 확실히 밝혀지지 않은 상태입니다."
42240-41 = "3;마이;02;소문에 의하면 그 학생들이 오래전 폐쇄된 SRT 학원의 대원들이라는 소문도—"
42240-42 = "#all;hide"
42240-43 = "3;데카르트;05;—그럴 리가 없잖습니까?!\n#3;em;[!]\n#3;closeup\n#fontsize;100"
42240-44 = "#st;[0,0];instant;1;"
42240-45 = "#clearST"
42240-46 = "#all;hide"
42240-47 = "3;마이;04\n#3;shake\n#3;em;[?!]\n#wait;800"
42240-48 = "3;마이;06;가, 갑자기 왜 그렇게 화를 내시는 건가요?\n#3;stiff"
42240-49 = "3;데카르트;02;SRT 학원의 대원들은 정의를 위해 위험을 무릅쓰고 불의에 맞서 싸운 용감한 학생들입니다!\n#3;hophop"
42240-50 = "3;데카르트;05;그런 학생들을 이번 사건의 범인들과 같은 취급을 하다니…… 그 무슨 무례한 발언입니까!"
42240-51 = "3;데카르트;02;자세한 경위를 말씀드리기는 어렵습니다만, 그 학생들이 SRT 학원 출신의 대원이라는 것은 모두 잘못된 가짜 뉴스입니다!"
42240-52 = "3;데카르트;05;제 유통기한 지난 야키니쿠 도시락을 걸고서라도, 단연히 말씀드리겠습니다!\n#3;stiff\n#3;em;[!]"
42240-53 = "#all;hide"
42240-54 = "3;마이;02;(……그 정도면 확신이 없다는 뜻 아닌가?)\n#3;em;…"

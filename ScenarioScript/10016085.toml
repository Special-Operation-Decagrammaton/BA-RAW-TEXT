[translation]
10016085-2 = "騎馬打仗結束後，剩下的大型競賽就只剩下學園對抗接力賽了吧？"
10016085-3 = "嗯，沒錯。#n可能會影響總冠軍的賽事基本上都結束了。"
10016085-4 = "沒想到萬年吊車尾的千年竟然有機會爭奪總冠軍……#n這次的「晄輪大祭」與往年不同，真的是處處充滿意外呢。"
10016085-5 = "聽說夏萊的老師為了讓不擅長運動的學生也能享受慶典，#n對比賽的內容進行了調整……是因為這個緣故嗎？"
10016085-6 = "騎馬打仗項目最有冠軍相的格黑娜和三一，#n因為從預賽就展開對決導致體力耗盡可能也是一部份的原因吧。"
10016085-7 = "如果是百鬼夜行那種程度的對手，現在的我們應該也能贏……！"
10016085-8 = "好！等等的騎馬打仗就乘著這股氣勢，為千年一舉拿下總冠軍──"
10016085-9 = "嗯？那個究竟是……"
10016085-19 = "唦唦唦！這樣就準備完成了！"
10016085-20 = "借助蓮實閣下的力量完成的忍法……築城之術！"
10016085-21 = "真，真的沒問題嗎……？"
10016085-22 = "重心不是太穩定，只要稍微用力推一下，感覺馬上就會倒下來……"
10016085-23 = "晃來～晃去～"
10016085-24 = "不必擔心。兩側選手的職責並非固定騎手。"
10016085-25 = "楓同學和伊樹菜同學注意從側面與後方接近的敵人，將位置回報給知世同學。"
10016085-26 = "是索敵任務呢……知道了！"
10016085-27 = "交給我吧！#n這比追趕飛來飛去的獨角仙要簡單多了！"
10016085-28 = "總覺得百鬼夜行的騎馬姿勢非常奇怪……"
10016085-29 = "似乎只要稍微碰一下就會立刻倒下呢……"
10016085-30 = "好！那就先從那些傢伙下手！"
10016085-31 = "收到！上吧！"
10016085-35 = "知世閣下！敵人正從北北東方向接近中！"
10016085-36 = "哇啊……已經開始了嗎……？"
10016085-42 = "好，好高……！？"
10016085-43 = "遠遠看還沒發現……這樣無論如何也拿不到啊！"
10016085-48 = "沒，沒關係！只要用身體的衝撞來破壞馬的重心……！"
10016085-50 = "帽子～"
10016085-51 = "Get～"
10016085-52 = "咦，什麼時候！？"
10016085-53 = "可惡！本以為能贏的！"
10016085-55 = "不愧是知世閣下！疾如風快如閃電！"
10016085-56 = "哼哼！知世可是「百鬼夜行．歌牌最強決定賽」的冠軍。"
10016085-57 = "單論手的速度是絕對不會輸的！"
10016085-59 = "騎手是容易被敵人瞄準的危險角色，但同時也是奪取敵人帽子的重要存在……"
10016085-60 = "雖然兩側的平衡不太穩定，但把騎手交給知世同學是正確的決定。"
10016085-61 = "知世，從右邊來了！"
10016085-65 = "只要趁機突襲的話──"
10016085-71 = "兩頂～"
10016085-72 = "這樣也沒用嗎……！"
10016085-74 = "由千年對上百鬼夜行的騎馬打仗決賽，出現了意想不到的景象！"
10016085-75 = "百鬼夜行的知世選手，才剛開賽就從千年手中奪走了2頂帽子！"
10016085-76 = "雖然姿勢看起來搖搖晃晃，但防禦力宛如一座堅固的堡壘，#n讓千年的騎兵們一一敗下陣來。"
10016085-77 = "對於亟欲取得總冠軍的千年來說，這是一場不能輸的比賽！#n最後的贏家究竟會是誰呢？"
10016085-79 = "這樣下去，根本不是百鬼夜行的對手……"
10016085-80 = "真紀！快想想辦法！！"
10016085-81 = "嗯？我嗎？"
10016085-82 = "我只是代替晴前輩參加比賽的說……"
10016085-83 = "而且我的運動神經也不是特別好……"
10016085-84 = "但真紀是「貝里塔斯」的駭客吧？"
10016085-85 = "沒有像駭入之類的那種……貝里塔斯的技術能用來對抗嗎？"
10016085-89 = "唔嗯……雖然要是千尋前輩發現，可能又會被臭罵一頓……"
10016085-90 = "但既然被人拜託也沒辦法了。"
10016085-91 = "就派出從晴前輩手中借來的「雅典娜3號」吧！"
10016085-93 = "唔……不知不覺間，百鬼夜行的隊伍只剩下我們了……"
10016085-94 = "然後對方居然還有三支隊伍！"
10016085-95 = "我，我們擊敗了兩支隊伍，所以……從剩下的帽子數量來看……"
10016085-96 = "應，應該只剩下一支隊伍！"
10016085-97 = "……咦？數目對不起來耶？#n哎呀呀，這到底是怎麼回事？"
10016085-102 = "啊哈哈，終於察覺到了嗎？"
10016085-103 = "這是我們隊伍的全像投影！"
10016085-104 = "使用「雅典娜3號」新搭載的全像投影功能，製造出了分身！"
10016085-105 = "嘻嘻嘻～能分辨出哪個才是真的嗎？"
10016085-107 = "哪有這樣的呀！在比賽中使用道具算犯規了吧！？"
10016085-108 = "……很遺憾，要因此判定犯規可能有點困難。"
10016085-109 = "按照晄輪大祭的規定，比賽中禁止使用槍械或炸彈。#n不過並沒有明文規定禁止使用全像投影……"
10016085-110 = "想不到還有這種使用方法……#n看來下一屆晄輪大祭得追加全像投影的相關規定才行。"
10016085-111 = "竟然同時製造出兩個分身……不愧是千年！#n不到最後關頭都不能輕忽大意呢！"
10016085-112 = "為了不讓對手有分辨真偽的時間，應該會立刻發動攻擊。"
10016085-113 = "伊樹菜同學，月夜同學。是時候發揮兩位的特技了！"
10016085-114 = "我，我們的特技……？"
10016085-115 = "對……那就是──忍術。"
10016085-116 = "……！#n對！忍術！"
10016085-117 = "……忍術？那只是類似魔術的東西吧？#n好像很有趣呢！"
10016085-118 = "那麼，千年的全像投影和百鬼夜行的忍術──能成功騙過對手眼睛的便是贏家！"
10016085-119 = "來囉來囉，要從三個方向同時進攻囉！"
10016085-123 = "唔……"
10016085-124 = "月，月夜流忍法！"
10016085-129 = "……抓到了！#n這樣就是千年獲勝了──"
10016085-133 = "哎呀？為什麼這裡會有狐狸娃娃……？"
10016085-134 = "帽子跑去哪了……？"
10016085-139 = "──這裡。"
10016085-140 = "哇，哇啊！在那裡嗎！？"
10016085-147 = "唔，被打敗了……"
10016085-148 = "……這是最後一個了。"
10016085-149 = "太好了！我就知道知世能辦到！"
10016085-150 = "啊……差點就掉下來了……"
10016085-152 = "不愧是月夜閣下！竟然能在瞬間完美再現空蟬之術……伊樹菜十分感動！"
10016085-153 = "假如掉包知世和狐狸娃娃的時機再晚一點的話，#n帽子一定會被奪走的！"
10016085-155 = "飛高高～真好玩。"
10016085-156 = "哈，哈哈……我沒有自信能再來一次……"
10016085-157 = "比，比起那個，知世前輩……我的頭髮好像快掉了……差不多可以放手了……"
10016085-159 = "知世選手，展現出如雜技般的動作，漂亮地奪走了真紀選手的帽子！"
10016085-160 = "在剛才的攻防戰中，千年最後的騎兵也倒下了……"
10016085-161 = "是百鬼夜行隊獲得了勝利！"
10016085-163 = "……太好了！"
10016085-167 = "咳哼……如此缺乏冷靜，真不像我啊。"
10016085-171 = "蓮實閣下，蓮實閣下～！伊樹菜拚盡全力了～！"
10016085-172 = "這場勝利全靠蓮實閣下想出的妙計！"
10016085-173 = "是，我全都看見了。#n大家真的表現得相當活躍。"
10016085-174 = "部長倒下的時候，我還以為大勢已去……"
10016085-175 = "沒，沒想到像我這樣的存在，也能起到作用……"
10016085-176 = "真的，真的非常感謝……嗚，嗚哇～……"
10016085-177 = "能夠得勝都多虧了大家的努力，要感到榮幸的人反而是我才對……"
10016085-178 = "感謝蓮實閣下！#n伊樹菜也感到非常開心！"
10016085-179 = "所屬的學園雖然不同，卻能齊心協力運用各自的優點來獲得勝利，這精采的瞬間……"
10016085-180 = "就感覺自己像是在柴犬汪藏導演的作品中登場的主角一樣！"
10016085-181 = "之後還想和蓮實閣下一起比賽！"
10016085-182 = "可是……我是三一的學生唷……？"
10016085-183 = "下次遇到時，說不定是以敵人的身分戰鬥。"
10016085-184 = "就算那樣也沒關係！"
10016085-185 = "只要是和蓮實閣下在一起，無論是敵是友都無所謂！#n一定會很有趣的！耶嘿嘿。"
10016085-186 = "沒錯沒錯！我也非常開心！"
10016085-187 = "我，我也很開心……！"
10016085-191 = "呵呵，是嗎。那真是太好了。"
10016085-192 = "……話雖如此，我可不會手下留情哦？"
10016085-193 = "身為三一的學生，比賽時必定會全力以赴。"
10016085-195 = "是，伊樹菜也會全力戰鬥的！"
10016085-196 = "還，還請務必多多指教！"
10016085-197 = "嘻嘻，下次見～！"

[translation]
10016085-2 = "หลังจากการแข่งขี่ม้า ช่วงบ่ายนี้ก็เหลือแค่การแข่งวิ่งผลัดประเภททีมใช่มั้ย?"
10016085-3 = "ใช่ การแข่งขันที่มีคะแนนสูงๆ ที่มีผลต่อรางวัลชนะเลิศคะแนนรวมก็แข่งไปเกือบหมดแล้ว"
10016085-4 = "มิลเลเนียมที่เป็นผู้เข้าชิงที่โหล่ได้มาลุ้นผลชนะเลิศคะแนนรวมเหรอเนี่ย... ฮาโลเฟสติวัลปีนี้เกมพลิก#nหลายรอบเลยเนอะ"
10016085-5 = "ได้ยินข่าวลือว่าคุณครูชาเล่ต์ช่วยปรับโปรแกรมให้นักเรียนที่ไม่สนใจเรื่องการออกกำลังกายได้สนุกกับ#nการแข่งขันด้วย... หรือว่าจะเป็นเพราะเรื่องนี้นะ?"
10016085-6 = "ต้องขอบคุณเกเฮนน่ากับทรีนิตี้เลยนะที่ต่อสู้กันอย่างดุเดือดตั้งแต่รอบคัดเลือกมาจนถึงรอบชิง ทั้งสองทีมเอาแต่สู้กันจนหมดแรงเลย"
10016085-7 = "จะยังไงก็เถอะ ถ้าระดับแค่สหพันธ์เฮียกคิยาโค ฉันว่าพวกเราเอาอยู่...!"
10016085-8 = "ดีละ เราจะชนะในการแข่งขันครั้งนี้ เพื่อให้มิลเลเนียมได้ลุ้นในรางวัลชนะเลิศคะแนนรวมของการแข่งขัน#nทั้งหมด—"
10016085-9 = "หืม...? นั่นมันอะไรน่ะ?"
10016085-19 = "นินนิน! เตรียมพร้อมอย่างสมบูรณ์แบบแล้วค่ะ!"
10016085-20 = "ศาสตร์นินจาที่สมบูรณ์ได้ด้วยความช่วยเหลือจากท่านฮาสุมิ!"
10016085-21 = "บะ... แบบนี้จะไม่เป็นไรเหรอคะ...?"
10016085-22 = "ฉันรู้สึกไม่มั่นคงเลย เหมือนว่าถ้าโดนผลักแม้แต่นิดเดียวก็จะล้มแล้วละค่ะ"
10016085-23 = "ส่ายไป~ ส่ายมา~"
10016085-24 = "ไม่เป็นไรค่ะ นักกีฬาที่เป็นปีกซ้ายขวาไม่ได้มีหน้าที่ในการตรึงคนขี่หรอกค่ะ"
10016085-25 = "คุณคาเอเดะ คุณอิซุนะ คุณทั้งสองต้องคอยจับตาดูทั้งข้างหน้าและข้างหลัง หากมีศัตรูที่เข้ามาใกล้ ต้องบอกตำแหน่งของศัตรูให้คุณชิเซะรู้ทันทีค่ะ"
10016085-26 = "ให้สอดส่องศัตรูสินะคะ... เข้าใจแล้วค่ะ!"
10016085-27 = "ถ้าเทียบกับการใช้สายตาไล่ด้วงกว่างแล้ว งานแบบนี้มันง่ายกว่าหลายเท่า วางใจฉันได้เลย!"
10016085-28 = "เหมือนจะเห็นม้าเปิ่นๆ อยู่ตัวหนึ่งแฮะ..."
10016085-29 = "ดูทรงแล้ว ฉันว่าแค่เข้าไปแตะก็ล้มระเนระนาดแล้วละ"
10016085-30 = "งั้นเราเล่นงานม้าตัวนั้นก่อนเลยมั้ย?"
10016085-31 = "เอาสิ! ไปกันเลย!"
10016085-35 = "ท่านชิเซะ! มีม้าศัตรูเข้ามาหาเราจากทิศตะวันออกเฉียงเหนือค่ะ!"
10016085-36 = "วะ... ว้าว... ระ... เริ่มแล้วเหรอคะเนี่ย?"
10016085-42 = "สะ... สูงชะมัดเลย...?!"
10016085-43 = "พอเข้ามาดูใกล้ๆ กลายเป็นว่านักกีฬาคนนี้ตัวสูงมากจนแทบจะเอื้อมมือไปไม่ถึงเลย!"
10016085-48 = "มะ... ไม่เป็นไร! เข้าไปชนให้เสียหลักเลย แล้วตอนนั้นค่อยแย่งหมวกมา..."
10016085-50 = "หมวก—"
10016085-51 = "จับได้แล้ว"
10016085-52 = "อ๊ะ โดนเอาหมวกไปตั้งแต่ตอนไหนเนี่ย?!"
10016085-53 = "ตะ... ตกรอบซะแล้ว!"
10016085-55 = "สมกับที่เป็นท่านชิเซะ รวดเร็วปานสายฟ้าแลบเลยค่ะ!"
10016085-56 = "ฮุฮุ ก็ชิเซะเป็นแชมป์ไพ่คารุตะของเฮียกคิยาโคนี่นา"
10016085-57 = "ขยับมือไวไม่มีใครเกินเลยละ!"
10016085-59 = "ถึงคนขี่ม้าจะเป็นจุดอ่อนในการแข่งขันเพราะสามารถโดนโจมตีได้ แต่ก็เป็นคนเดียวที่แย่งหมวกของ#nอีกฝ่ายมาได้..."
10016085-60 = "ถึงความสมดุลของทั้งสองข้างจะไม่คงที่เท่าไร แต่การวางตัวนักกีฬาที่มือไวให้อยู่ในตำแหน่งคนขี่ม้า#nก็ถือว่าคุ้มค่าเลยค่ะ"
10016085-61 = "ชิเซะ มีศัตรูมาทางขวา!"
10016085-65 = "ใช้ช่องว่างแล้วจู่โจมจากข้างๆ —"
10016085-71 = "— ได้สองใบแล้ว"
10016085-72 = "ดะ... โดนเข้าจนได้...!"
10016085-74 = "ตอนนี้เราอยู่กันที่สนามแข่งขี่ม้ารอบชิงชนะเลิศระหว่างมิลเลเนียมกับเฮียกคิยาโคค่ะ และก็มีเหตุการณ์#nที่ไม่คาดคิดเกิดขึ้นด้วยค่ะ!"
10016085-75 = "นักกีฬาชิเซะในตำแหน่งของคนขี่ม้าจากทีมเฮียกคิยาโคชิงหมวกของฝ่ายตรงข้ามได้ถึง 2 ใบตั้งแต่#nนาทีแรกของการแข่งขันเลยค่ะ!"
10016085-76 = "ถึงม้าของเฮียกคิยาโคจะดูเก้ๆ กังๆ ไปหน่อย แต่การป้องกันที่แข็งแกร่งดั่งป้อมปราการนี้ทำให้คนขี่ม้า#nฝั่งมิลเลเนียมเข้ามาแย่งหมวกไปไม่ได้เลยค่ะ"
10016085-77 = "เพื่อรางวัลชนะเลิศคะแนนรวม ทางมิลเลเนียมจะแพ้ไม่ได้เลย...! สุดท้ายแล้วใครกันที่จะได้เป็นผู้ชนะ!"
10016085-79 = "ถ้ายังเป็นแบบนี้ต่อไป มีหวังเราได้แพ้ราบคาบทั้งๆ ที่ยังไม่ได้เอื้อมมือไปชิงหมวกสักใบแน่..."
10016085-80 = "มากิ ช่วยทำอะไรสักอย่างทีสิ!"
10016085-81 = "หืม? ฉันเหรอ?"
10016085-82 = "ฉันแค่มาเข้าร่วมแทนรุ่นพี่ฮาเระที่ถูกวางตัวให้เป็นคนขี่เองนะ? ไม่ได้เป็นตัวจริงตั้งแต่แรกสักหน่อย"
10016085-83 = "อีกอย่าง ฉันก็ไม่ได้เก่งทางด้านสมรรถภาพทางกายด้วย..."
10016085-84 = "แต่มากิก็เป็นแฮ็กเกอร์ที่สังกัดอยู่ใน <เวอริทัส> ที่โด่งดังไม่ใช่เหรอ?"
10016085-85 = "ไม่มีวิธีจัดการปัญหาด้วยเทคโนโลยีของเวอริทัสบ้างเหรอ... พวกการแฮ็กอะไรแบบนั้นน่ะ?"
10016085-89 = "อืม ถ้าโดนรุ่นพี่จิฮิโระจับได้คงโดนดุแน่..."
10016085-90 = "แต่ในเมื่อมาขอร้องกันแบบนี้ก็ช่วยไม่ได้"
10016085-91 = "คงต้องใช้ <อาเธน่า 3> ที่ยืมมาจากรุ่นพี่ฮาเระแล้วละ...!"
10016085-93 = "ทะ... ทีมสหพันธ์เฮียกคิยาโคเหลือแค่พวกเราแล้ว..."
10016085-94 = "แล้วทีมของฝ่ายตรงข้ามล่ะ ยังเหลือกันอีกกี่ทีม?"
10016085-95 = "ระ... เราจัดการไปได้สองทีมแล้ว ถ้าดูจากจำนวนหมวกที่เหลือก็..."
10016085-96 = "ละ... เหลือหมวกแค่ใบเดียวแล้วค่ะ!"
10016085-97 = "เอ๋...? แต่ศัตรูยังมีให้เห็นสามทีมเหมือนเดิมนี่คะ? นี่มันอะไรกันคะเนี่ย?"
10016085-102 = "ฮิฮิ... เพิ่งจะมารู้สินะ?"
10016085-103 = "เมื่อกี้พูดถูกแล้วละ เพราะสองทีมที่อยู่ตรงนี้คือโฮโลแกรมที่ฉายภาพปลอมไงล่ะ!"
10016085-104 = "ฉันลองใช้ฟังก์ชันใหม่ในการฉายภาพโฮโลแกรมกับ <อาเธน่า 3> แล้วสร้างดัมมีขึ้นมาน่ะ"
10016085-105 = "เป็นยังไงล่ะ? คิดว่าจะหาตัวจริงเจอมั้ย?"
10016085-107 = "อะไรกัน! เอาอุปกรณ์อื่นมาใช้ในการแข่งขันแบบนี้มันผิดกฎไม่ใช่เหรอ?"
10016085-108 = "น่าเสียดายที่กฎในการตัดสิทธิ์มันคลุมเครือนะคะ"
10016085-109 = "ตามกฎของฮาโลเฟสติวัล มีการสั่งห้ามไม่ให้ใช้ปืนหรือระเบิดในการแข่งขี่ม้า แต่ไม่มีระบุไว้ว่าห้าม#nหลอกล่อฝ่ายตรงข้ามด้วยโฮโลแกรมค่ะ"
10016085-110 = "ไม่คิดเลยนะคะว่าจะหยิบวิธีแบบนั้นมาใช้... เห็นทีต้องเพิ่มกฎห้ามใช้โฮโลแกรมในฮาโลเฟสติวัลครั้ง#nหน้าแล้วละค่ะ"
10016085-111 = "สร้างภาพหลอกพร้อมกันถึงสองภาพเลยเหรอ... นี่สินะมิลเลเนียม เป็นคู่แข่งที่ประมาทไม่ได้เลยนะคะ!"
10016085-112 = "ทางนั้นจะโจมตีเข้ามาทันที เพื่อให้เราไม่มีเวลาในการแยกแยะตัวจริงตัวปลอมค่ะ"
10016085-113 = "คุณอิซุนะ คุณสึคุโยะ ถึงเวลาใช้ความสามารถพิเศษของคุณทั้งสองแล้วค่ะ!"
10016085-114 = "คะ... ความสามารถพิเศษของพวกฉันเหรอคะ...?"
10016085-115 = "ศาสตร์นินจาไงคะ!"
10016085-116 = "ศาสตร์นินจา!"
10016085-117 = "ศาสตร์นินจาเหรอ...? เหมือนมายากลอะไรทำนองนั้นใช่มั้ย? ฮุฮุ... น่าสนุกดีแฮะ"
10016085-118 = "งั้นก็มาดูกันเลยว่าระหว่างโฮโลแกรมของมิลเลเนียมกับศาสตร์นินจาของเฮียกคิยาโค อันไหนจะหลอก#nตาได้ดีกว่ากัน!"
10016085-119 = "เอาละ เข้าไปหาพร้อมกันจากสามทิศเลย—!"
10016085-123 = "วะ... ว้าว..."
10016085-124 = "ศะ... ศาสตร์นินจาของสึคุโยะ!"
10016085-129 = "คว้าได้แล้ว! ทีนี้มิลเลเนียมก็ชนะ—"
10016085-133 = "เอ๋? นี่มันตุ๊กตาสุนัขจิ้งจอกนี่นา...?"
10016085-134 = "แล้วคนขี่ม้าของทีมตรงข้ามอยู่ที่ไหนล่ะ?"
10016085-139 = "—ช้าจัง"
10016085-140 = "ว้าก! กลับมาที่เดิมเมื่อไรเนี่ย?!"
10016085-147 = "โธ่เอ๊ย— โดนเข้าให้แล้ว—"
10016085-148 = "...ได้หมวกสามใบแล้ว"
10016085-149 = "สำเร็จแล้ว ชิเซะ! ฉันรู้ว่าเธอต้องทำได้!"
10016085-150 = "อ่าาา... นะ... นึกว่าจะหยิบพลาดซะแล้วค่ะ"
10016085-152 = "เยี่ยมเลยท่านสึคุโยะ! เรียนรู้ศาสตร์นินจาของฉันได้อย่างแตกฉานในเวลานิดเดียวเอง... สุดยอดเลยค่ะ!"
10016085-153 = "ถ้าโยนท่านชิเซะขึ้นบนอากาศแล้วเปลี่ยนเป็นตุ๊กตาสุนัขจิ้งจอกช้ากว่านี้อีกแค่นิดเดียว หมวกก็อาจจะ#nถูกแย่งไปก็ได้ค่ะ!"
10016085-155 = "สูงอีก สูงอีก— สนุกมากเลย"
10016085-156 = "แฮ่ก... แฮ่ก... แต่ถ้าให้ทำอีกรอบคงไม่ไหวค่ะ..."
10016085-157 = "อีกอย่าง... รุ่นพี่ชิเซะคะ... ผมฉันจะหลุดแล้วค่ะ... หยุดดึงผมฉันก่อนได้มั้ยคะ...?"
10016085-159 = "นักกีฬาชิเซะแย่งหมวกของนักกีฬามากิได้ด้วยการโจมตีที่งดงามเหมือนกายกรรมเลยค่ะ!"
10016085-160 = "การโจมตีเมื่อสักครู่ทำให้ทีมของมิลเลเนียมตกรอบกันไปทั้งหมด..."
10016085-161 = "ชัยชนะจึงตกเป็นของทีมเฮียกคิยาโคค่ะ!"
10016085-163 = "...เยี่ยมเลย!"
10016085-167 = "อะแฮ่ม... เผลอปล่อยอารมณ์ร่วมไปซะได้ ไม่สมกับที่เป็นเราเลยนะคะ"
10016085-171 = "ท่านฮาสุมิ ท่านฮาสุมิ! เมื่อกี้เห็นหรือเปล่าคะ?"
10016085-172 = "พวกฉันชนะแล้วค่ะ! เพราะได้กลยุทธ์ของท่านฮาสุมิช่วยไว้แท้ๆ เลยค่ะ!"
10016085-173 = "ค่ะ ฉันก็จับตาดูอยู่ตลอดการแข่งขันค่ะ พวกคุณทุกคนแสดงฝีมือได้อย่างยอดเยี่ยมเลยค่ะ"
10016085-174 = "คิดว่าเราจะจบเห่ตั้งแต่รู้ว่าหัวหน้าล้มพับไปแล้วซะอีก..."
10016085-175 = "ขอบคุณที่ช่วยให้นักเรียนร่างใหญ่ไร้ประโยชน์อย่างฉันได้มีโอกาสแสดงฝีมือกับเขาบ้างนะคะ..."
10016085-176 = "ขอบคุณ... มากๆ เลยค่ะ... แง..."
10016085-177 = "ชัยชนะครั้งนี้เป็นผลงานของพวกคุณทุกคนต่างหากค่ะ ส่วนฉันเองก็โล่งอกที่ฉันเป็นประโยชน์สำหรับ#nพวกคุณ..."
10016085-178 = "เป็นประโยชน์มากเลยค่ะ! นอกจากจะแข่งชนะแล้ว พวกเราก็ยังสนุกกันมากด้วยค่ะ!"
10016085-179 = "ตอนที่พวกเราที่อยู่ต่างสถาบันมารวมใจเป็นหนึ่ง และใช้จุดแข็งของตัวเองคว้าชัยชนะมา..."
10016085-180 = "ตอนนั้นฉันรู้สึกเหมือนได้เป็นตัวเอกในผลงานของปรมาจารย์ผู้กำกับชิบะเลยค่ะ!"
10016085-181 = "ต่อไปหวังว่าจะได้แข่งขันร่วมกับท่านฮาสุมิอีกนะคะ!"
10016085-182 = "แต่ว่า... ฉันเป็นนักเรียนทรีนิตี้นะคะ"
10016085-183 = "ครั้งหน้าอาจจะได้เจอกันในฐานะศัตรูก็ได้ค่ะ..."
10016085-184 = "ไม่เป็นไรหรอกค่ะ!"
10016085-185 = "ไม่ว่าจะเป็นฝ่ายเดียวกันหรือฝ่ายตรงข้าม การได้แข่งกีฬากับท่านฮาสุมิก็ต้องสนุกอยู่แล้วค่ะ!"
10016085-186 = "ใช่ วันนี้ฉันก็สนุกมากๆ เลยละ!"
10016085-187 = "ฉะ... ฉันก็สนุกเหมือนกันค่ะ...!"
10016085-191 = "งั้นเหรอคะ..."

[translation]
10016085-2 = "The only other big match left after the cavalry battle is the academy relay race, right?"
10016085-3 = "Yup, these are the last chances to rack up a lot of points and take home the trophy!"
10016085-4 = "I can't believe Millennium actually has a chance to win the Halo Festival! We've always been last place... This year's field day has been filled with so many surprises."
10016085-5 = "According to rumors, that teacher from Schale adjusted the program so that students who aren't very good at sports could enjoy the games... Maybe that's the difference?"
10016085-6 = "Well, Gehenna or Trinity is the most likely winner of the cavalry game, but they're already exhausted from the preliminaries."
10016085-7 = "At least we can definitely beat Allied Hyakkiyako Academy! They'll be easy pickings."
10016085-8 = "Awesome! Let's beat them and secure Millennium's victory!"
10016085-9 = "...Huh? Wh-What in the world is that?"
10016085-19 = "Ta-da! Preparations are complete!"
10016085-20 = "We completed the ninjutsu...I mean, the castle fortification technique with Hasumi's help!"
10016085-21 = "Do...do you really think this is going to work?"
10016085-22 = "It feels kind of...unstable... We might topple over if someone even blows on us...!"
10016085-23 = "*shake shake*"
10016085-24 = "Don't worry. The left and right players aren't meant to protect the jockey."
10016085-25 = "Kaede and Izuna. You just need to watch the side and back, and tell Chise where the enemy is."
10016085-26 = "An enemy surveillance operation! Understood!"
10016085-27 = "This is way easier than finding a Hercules beetle with your bare eyes. We've got this!"
10016085-28 = "That's a funny-looking horse over there..."
10016085-29 = "They look like they're going to fall even without us doing anything."
10016085-30 = "Should we attack that one first?"
10016085-31 = "Yeah! Target the weak first!"
10016085-35 = "Chise! The enemy jockey is approaching from the northeast!"
10016085-36 = "Ahhhh! Are they c-coming for us already?!"
10016085-42 = "Wait, they're huge!"
10016085-43 = "They're so tall up close! I can't even reach her hat!"
10016085-48 = "Don't panic! They're so unstable, we can just crash into them and take their hat!"
10016085-50 = "The hat..."
10016085-51 = "It's mine."
10016085-52 = "Huh?! Where's my hat?"
10016085-53 = "They... They got me!"
10016085-55 = "Chise! Was that a ninjutsu? You moved so fast!"
10016085-56 = "Heehee. Chise is the champion of the karuta tournament at Hyakkiyako."
10016085-57 = "When it comes to dexterity, no one is more skilled!"
10016085-59 = "The enemy might focus on the jockey as a weakness, but the jockey is also the only one who's able to attack."
10016085-60 = "We may be a little unstable, but thankfully our jockey has quick hands."
10016085-61 = "Chise! Another enemy to your right!"
10016085-65 = "Ambush them from their blind spot."
10016085-71 = "Now I have two."
10016085-72 = "Sh-She got me...!"
10016085-74 = "The cavalry battle finale between Millennium and Hyakkiyako is taking place as we speak! And this event has taken a very unexpected turn!"
10016085-75 = "The Hyakkiyako team has already disqualified two jockeys within the first minute with Chise as their jockey!"
10016085-76 = "They might have looked funny at the beginning, but the horses from Hyakkiyako have established a strong defense that the other horses can't seem to penetrate."
10016085-77 = "Millennium can't afford to lose this match if they want to keep their first place lead... Who will come out on top?"
10016085-79 = "We're going to lose without even putting up a fight at this rate..."
10016085-80 = "Maki! Help me out here!"
10016085-81 = "...Huh? Me?"
10016085-82 = "I thought I was just filling out numbers because Hare bailed... She was supposed to be the jockey!"
10016085-83 = "And physical strength isn't exactly my strong point."
10016085-84 = "Aren't you the most famous hacker in Veritas or something?"
10016085-85 = "Isn't there something you can do?!"
10016085-89 = "Ugh... Chihiro's gonna flip out on me if she finds out..."
10016085-90 = "But I may as well help if I'm here..."
10016085-91 = "I'll use the Athena-3 I borrowed from Hare!"
10016085-93 = "We're the only ones left from Hyakkiyako..."
10016085-94 = "How many enemies are left?"
10016085-95 = "W-We got rid of two teams ourselves, so..."
10016085-96 = "I think...there's only one team left!"
10016085-97 = "A-Are you sure?! There's three teams in front of me right now!"
10016085-102 = "Heehee. A little late to the party, aren't ya?"
10016085-103 = "Two of the teams you see are fake holograms!"
10016085-104 = "We created dummies using the hologram projection function built into the Athena-3."
10016085-105 = "Whatcha think? Not such a walk in the park anymore, huh?"
10016085-107 = "Wh-What the heck?! Isn't using that kind of technology cheating?"
10016085-108 = "...Unfortunately, the rules are a bit too vague for it to be considered cheating."
10016085-109 = "There are rules against using guns and bombs during the cavalry battle, but there's nothing about creating illusions with holograms. It's just not explicitly stated."
10016085-110 = "No one expected them to use that sort of technology... They'll probably have to add some rules against the use of holograms for the next festival."
10016085-111 = "Ugh! And they made two of them! There's no end to the surprises with Millennium!"
10016085-112 = "They're likely going to rush you. We don't have time to figure out which one is the real one."
10016085-113 = "Izuna and Tsukuyo. It's time for you to shine!"
10016085-114 = "...Huh? Wh-What do I do...?"
10016085-115 = "Ninjutsu!"
10016085-116 = "Ninjutsu!"
10016085-117 = "...Ninjutsu? Isn't that kind of like magic? Well, this should be interesting."
10016085-118 = "So it's the Millennium's holographic technology against Hyakkiyako's ninjutsu... Let's see which one's better!"
10016085-119 = "Now! Let's get it!"
10016085-123 = "Ahhhh!"
10016085-124 = "Ts-Tsukuyo Ninja Scroll!"
10016085-129 = "Hahaha! I got it! Millennium wins!"
10016085-133 = "Huh? It's... It's just a doll."
10016085-134 = "Then where's the enemy jockey?"
10016085-139 = "You're very slow."
10016085-140 = "What? How are you so fast?!"
10016085-147 = "Sh-She...got me...!"
10016085-148 = "...Now I have three."
10016085-149 = "That's our champion! I knew you'd win, Chise!"
10016085-150 = "Eek! I thought we were done for!"
10016085-152 = "We aren't thanks to you, Tsukuyo! You performed that ninjutsu so fast! You're awesome!"
10016085-153 = "If you were even a second slower in switching Chise and the doll, they would've had our hat!"
10016085-155 = "It was like, woosh! I was so high!"
10016085-156 = "Hahaha... I don't think I could do that again..."
10016085-157 = "Um... Chise... Can you please...let go now? I think my hair's going to fall out..."
10016085-159 = "Chise stole Maki's hat with an extravagant acrobatic strike!"
10016085-160 = "All of Millennium's jockeys are now disqualified..."
10016085-161 = "Which means the Hyakkiyako team is the winner!"
10016085-163 = "Nice!"
10016085-167 = "Ahem. I got a little too excited for a moment."
10016085-171 = "Hasumi! Hasumi! Did you see that?"
10016085-172 = "We won! And it was all thanks to you, Hasumi!"
10016085-173 = "Yes, I watched every moment. You did excellently."
10016085-174 = "I thought...we were done for...when the president fainted."
10016085-175 = "You... You even let a b-big, useless student like me play an important role..."
10016085-176 = "Thank you so much... *sob*"
10016085-177 = "Please, this victory belongs entirely to each of you. I'm happy to have assisted."
10016085-178 = "Heehee! It was so much fun!"
10016085-179 = "Everyone worked together regardless of affiliation and used their strengths to achieve this victory..."
10016085-180 = "It felt like I was the main character in a movie by Shiba Dog Wang Wang!"
10016085-181 = "I hope we'll be able to play another game with you, Hasumi!"
10016085-182 = "But...I'm a Trinity student."
10016085-183 = "Next time, we may be enemies..."
10016085-184 = "That's okay!"
10016085-185 = "It doesn't matter if we're allies or enemies. As long as we can play with you, it'll be fun!"
10016085-186 = "Yeah! I thought it was a blast!"
10016085-187 = "I'll...never forget this experience!"
10016085-191 = "That's how it is..."
10016085-192 = "...But please don't think I'll be merciful if we meet on the field."
10016085-193 = "As a Trinity student, I'll always put in my full effort to anything I do."
10016085-195 = "I wouldn't expect anything less!"
10016085-196 = "See you again next time!"
10016085-197 = "See you!"

10031040-74 = "3;마코토;05;우리는 어찌하여 이 고단한 삶을 살아가는가!\n#fontsize;100\n#bgshake"
10031040-75 = "3;마코토;05;이유는 간단하다! 행복해지기 위해서다!\n#3;jump\n#3;em;[!]"
10031040-76 = "3;마코토;99;행복은 삶의 의미이자 목적이요. 곧 총체적인 목표!"
10031040-77 = "3;마코토;01;자고로 삶이란, 바로 그 목표를 이루기 위해 끊임없이 투쟁하고 이어나가는 행위의 총칭인 것이다!"
10031040-78 = "3;마코토;00;그 시점에서 나 마코토는 생각했다! 바로 그 행복을 쟁취하기 위해. 삶을 이어 나가기 위해. 필요한 것은 무엇인가. \n#3;jump"
10031040-79 = "3;마코토;99;끊임없는 생각을…… 생각…… 그래! 생각이다.\n#3;em;…"

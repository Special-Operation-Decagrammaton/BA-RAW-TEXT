10031040-49 = "3;이로하;01;혹시…… 이번에도 사츠키 선배가, 무언가를 했다든가?"
10031040-50 = "1;사츠키;04;아, 아냐! 억울해! 이, 이번만큼은 아무 짓도 안 했다고?!\n#1;ar"
10031040-51 = "3;이로하;01\n5;치아키;03;에이~ 뭐, 좋지 않나요? 이런 정열적인 모습! 열정적인 자태! \n#5;al"
10031040-52 = "1;사츠키;04\n3;이로하;01\n5;치아키;11;오히려 평소에 보기 힘든 모습인 만큼 역으로 먹힐 가능성이 있다고 할지. 제 서기의 혼이 불타고 있다고 할지!\n#1;dl\n#3;dl\n#5;m3\n#5;hophop"
10031040-53 = "5;치아키;08;앗! 이거라면 다음 만마전 정기 신문의 타이틀은 정해진 거나 다름없겠네요! 엄청난 반향을 일으킬 게 분명해!\n#5;em;[!]"
10031040-54 = "5;치아키;03;안 그래, 이로하 쨩?!\n#5;hophop\n#5;em;[반짝]"

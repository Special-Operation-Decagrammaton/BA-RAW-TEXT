10031040-62 = "3;이로하;06;……저런 모습이…… 반향을, 요?\n#3;em;[한숨]"
10031040-63 = "3;이로하;01;치아키, 진지하게 충고하는데. 진심으로 그렇게 생각한 거라면, 당신의 취향. 다시 생각해 볼 필요가 있을 거예요."
10031040-64 = "3;치아키;10;우왓. 너무해!\n#3;em;[훌쩍]"

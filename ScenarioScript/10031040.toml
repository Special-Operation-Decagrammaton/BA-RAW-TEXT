[translation]
10031040-1 = "ตอนที่ 4;เหตุผลเชิงปรัชญาของท่านประธาน"
10031040-2 = "(วันที่ 2 ที่คุณครูตกลงว่าจะช่วยเตรียมงานปาร์ตี้แห่งเกเฮนน่าของแพนเดโมเนียม โซไซตี้ วันนี้มาโคโตะก็ติดต่อเข้ามาอีกเหมือนเคย)"
10031040-7 = "อ้อ ครู การเตรียมงานปาร์ตี้ของเราใกล้จะเสร็จสมบูรณ์แล้วละ..."
10031040-8 = "ส่วนประธานกรรมการที่ได้รับหน้าที่สำคัญยิ่งในปาร์ตี้ครั้งนี้... เราเองก็ไม่รู้หรอกนะว่ายัยนั่น#nขยันซุ่มซ้อมเปียโนอยู่มากแค่ไหน หึหึหึ"
10031040-9 = "อยากจะเห็นการแสดงนั้นเร็วๆ แล้วละ"
10031040-10 = "[s] \"ฮินะต้องพยายามอยู่แน่นอน\""
10031040-11 = "งั้นเหรอ? "
10031040-12 = "ฮึ่ม... แต่สำหรับเรา... จะคาดหวังในพฤติกรรมที่น่าอับอายของประธานกรรมการวินัยก็คงเป็นอะไร#nที่น่าตื่นเต้นอยู่ไม่น้อย..."
10031040-13 = "หึหึหึ ที่สำคัญที่สุดคือ เราผู้นี้มีความรับผิดชอบที่ยิ่งใหญ่ในการเตรียม <ปาร์ตี้สุดพิเศษแห่งเกเฮนน่า>!"
10031040-14 = "ถ้าพูดถึงปาร์ตี้ นอกเหนือจากดนตรีหรือการแสดงแล้ว ครูคิดว่ายังมีอะไรที่สำคัญอยู่อีกบ้าง?"
10031040-15 = "[s1] \"นั่นสิ... ความหมายของปาร์ตี้เหรอ...?\"\n[s2] \"อืม... ก็น่าจะเป็นเรื่องอาหารละนะ?\""
10031040-16 = "โอ้... นั่นสินะ ที่ครูพูดก็มีเหตุผล"
10031040-17 = "ถ้าจัดปาร์ตี้ ก็ใช่ว่าแค่จัดๆ ขึ้นแล้วให้คนมาก็พอ แต่เราต้องคำนึงถึงความสำคัญ และจุดประสงค์ของปาร์ตี้ด้วย... และนั่นก็เป็นหน้าที่ที่ผู้นำที่ยิ่งใหญ่พึงมี"
10031040-18 = "ครูอยากจะพูดแบบนี้สินะ?"
10031040-19 = "[s3] \"เปล่านะ... ก็ไม่ถึงขนาดนั้น...\""
10031040-20 = "เอาเถอะ ถ้าเป็นเรื่องนั้นน่ะไม่ต้องห่วง ปาร์ตี้ครั้งนี้น่ะจะจัดขึ้นภายใต้จุดประสงค์ เพื่อพิสูจน์ให้ทุกคนได้เห็นว่า!"
10031040-21 = "การปกครองของท่านมาโคโตะผู้นี้ยิ่งใหญ่แค่ไหน แพนเดโมเนียม โซไซตี้ของเรามีอำนาจ และความสำเร็จรุ่งโรจน์เพียงใด! หึหึหึ!"
10031040-22 = "และนอกจากนั้น สิ่งที่จะขาดไปไม่ได้เลยในงานนี้ก็คือ... อาหารสำหรับปาร์ตี้!"
10031040-23 = "หึหึหึหึหึ!!  อย่างที่ครูว่าเลย!"
10031040-24 = "เพื่อตอบสนองต่อความคาดหวังของผู้เข้าร่วมงานปาร์ตี้อย่างสมบูรณ์แบบ... นอกจากอาหารตาที่พูดไปก่อนหน้านี้แล้วก็ต้องมีอาหารปากด้วย"
10031040-25 = "เราก็เลยสั่งอาหารพิเศษสำหรับงานปาร์ตี้จากชมรมโภชนาการ ให้มาเสิร์ฟในงานปาร์ตี้ครั้งนี้โดยเฉพาะ"
10031040-26 = "วันนี้เราจะลองชิมตัวอย่างอาหารกัน และจะประเมินว่าอาหารชุดนี้เหมาะสมดีแล้วหรือยังมีตรงไหนที่#nควรปรับปรุงอยู่อีก"
10031040-27 = "ว่ายังไงล่ะครู? เราอยากให้ครูมาช่วยหน่อย พอจะมีเวลารึเปล่า? "
10031040-28 = "[s] \"อืม เข้าใจแล้ว ครูจะไปหาเดี๋ยวนี้\""
10031040-29 = "หึหึหึ ได้ งั้นเราจะรอ"
10031040-41 = "(คุณครูไปถึงสถานที่จัดงานปาร์ตี้ของเกเฮนน่าตามที่ตกลงกับมาโคโตะไว้)"
10031040-42 = "[ns] \"ดูเป็นงานจริงจังมากกว่าที่คิดนะเนี่ย\""
10031040-43 = "(คุณครูมองดูรอบๆ สถานที่จัดงานปาร์ตี้และมองหามาโคโตะที่นัดเจอกันไว้ที่นี่)"
10031040-48 = "เฮ้อ... นี่มันเรื่องอะไรกันคะเนี่ย? "
10031040-49 = "หรือว่าครั้งนี้รุ่นพี่ซัตสึกิก็ไปทำอะไรไว้อีก?"
10031040-50 = "มะ... ไม่ใช่นะ! แบบนี้ไม่ยุติธรรมนะ! ครั้งนี้ฉันไม่ได้ทำอะไรสักหน่อย!"
10031040-51 = "เอาน่า~ ท่าทีตั้งอกตั้งใจแบบนั้น น่ามองออกนะคะ!"
10031040-52 = "ท่าทีแบบนี้ไม่ได้มีให้เห็นบ่อยๆ พอคนอื่นเห็นก็เลยประทับใจน่ะ เห็นแบบนี้แล้วเลขานุการอย่างฉันก็#nไฟแรงขึ้นมาเลยด้วย!"
10031040-53 = "อ๊ะ! เท่ากับว่าเราได้พาดหัวข่าวของหนังสือพิมพ์ประจำของแพนเดโมเนียม โซไซตี้แล้วนะคะเนี่ย! จะต้องได้รับการตอบรับที่ดีแน่นอน!"
10031040-54 = "ว่ามั้ย อิโรฮะจัง?!"
10031040-62 = "ท่าทีแบบนั้น... กับเสียงตอบรับดีๆ... น่ะเหรอคะ?"
10031040-63 = "จิอากิ ฉันขอเตือนอย่างจริงจังเลยนะ มีแต่เธอคนเดียวนั่นละค่ะที่คิดแบบนั้น กลับไปพิจารณาใหม่#nเถอะนะคะ"
10031040-64 = "อ๊ะ! เกินไปแล้วนะ!"
10031040-65 = "[s] \"นี่... ทุกคนมีเรื่องอะไรกันเหรอ?\""
10031040-66 = "อ๊ะ! คุณครูนี่นา!"
10031040-67 = "คุณครู! ก็คือว่า~ ทางนู้นน่ะ~! รุ่นพี่มาโคโตะอยู่ทางนู้น~!"
10031040-68 = "[s] \"มาโคโตะ...?\""
10031040-71 = "......"
10031040-72 = "ทำไม..."
10031040-73 = "[s] \"ทำไม...?\""
10031040-74 = "ทำไมพวกเราถึงต้องมาใช้ชีวิตลำบากยากเย็นกันแบบนี้!"
10031040-75 = "เหตุผลก็ง่ายๆ! ก็เพื่อมีความสุขไงล่ะ!"
10031040-76 = "ความสุขคือความหมายและจุดประสงค์ของชีวิต และนั่นคือเป้าหมายโดยรวม!"
10031040-77 = "ตั้งแต่โบราณมา ชีวิตก็คือชื่อเรียกของการต่อสู้ สู้ไปเรื่อยๆ เพื่อบรรลุเป้าหมาย!"
10031040-78 = "และท่านมาโคโตะผู้นี้ก็ไปคิดมาแล้ว! ว่าการที่จะได้ความสุขแบบนั้น และเพื่อดำเนินชีวิตต่อไป เรานั้นต้องการสิ่งใด "
10031040-79 = "เราคิด... คิดอย่างไม่หยุดหย่อน... ใช่! ความคิด!"
10031040-80 = "เรามีความคิด...! ก็เลยมีตัวตน!!"
10031040-81 = "มีตัวตนนนนน~~!"
10031040-82 = "มีตัวตนนน~!"
10031040-93 = "[ns] \"นะ... นี่มันเรื่องอะไรกัน? ทำไมจู่ๆ มาโคโตะถึง...\""
10031040-94 = "จู่ๆ รุ่นพี่มาโคโตะก็มีอาการแปลกๆ ไปค่ะ"
10031040-95 = "จะบอกว่าแค่แปลกคงไม่พอหรอก มาโคโตะจังเหมือนกลายเป็นอีกคนไปเลยนะ"
10031040-96 = "ต้องบอกว่ากลายเป็นอีกคนไปเลย หรือว่าเป็นคนเดิมที่ตื่นรู้อะไรมาดีนะ?"
10031040-97 = "[s] \"หืม...?\""
10031040-98 = "ไม่ว่าจะเป็นยังไงก็เถอะ แต่นี่ไม่ใช่สถานการณ์ปกติค่ะ "
10031040-99 = "การที่รุ่นพี่มาโคโตะพูดเรื่องแบบนั้น แค่จินตนาการก็ขนลุกแล้ว แต่นี่เราได้มาเห็นกับตากันเลยนะคะ"
10031040-100 = "หรือว่านี่คือฝันร้ายคะ...?"
10031040-101 = "อื้ม ต้องเป็นฝันร้ายแน่นอน"
10031040-102 = "[s] \"ทั้งสองคน ไม่ปรานีกันเลยนะ...\""
10031040-103 = "เว้นแต่ว่าจู่ๆ รุ่นพี่มาโคโตะจะเริ่มคิดลึกซึ้งเกี่ยวกับความจริงของชีวิตขึ้นมา..."
10031040-104 = "คือ... ฉันแค่ถามเผื่อๆ เอาไว้นะคะ รุ่นพี่มาโคโตะกินอะไรผิดสำแดงไปรึเปล่าคะ?"
10031040-110 = "อ้อ จะว่าไปแล้ว เมื่อกี้นี้..."
10031040-111 = "ท่านประธานลองชิมตัวอย่างอาหารที่จะเสิร์ฟในงานปาร์ตี้ที่ทางชมรมโภชนาการส่งมาให้น่ะค่ะ"
10031040-113 = "อาหารที่ชมรมโภชนาการส่งมาให้...?"
10031040-115 = "ค่ะ จากที่ได้ยินมา ตอนนี้หัวหน้าชมรมโภชนาการไม่อยู่เพราะมีสถานการณ์ที่เลี่ยงไม่ได้..."
10031040-117 = "รุ่นน้องคนอื่นในชมรมก็เลยเป็นคนทำอาหารตัวอย่างส่งมาให้เราน่ะค่ะ..."
10031040-121 = "[ns] \"อ่า...\""

10031040-93 = "[ns] \"저, 저기…… 이게 대체 어떻게 된 거야? 마코토는 갑자기 왜…….\""
10031040-94 = "3;이로하;05;……갑자기 마코토 선배의 상태가 이상해졌어요."
10031040-95 = "3;사츠키;04;저거, 이상해졌다는 말로 끝날 수준이야? 마코토 쨩. 아예 딴사람이 됐는데?\n#3;em;[?]"

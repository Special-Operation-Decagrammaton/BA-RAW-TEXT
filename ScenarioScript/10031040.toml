[translation]
10031040-1 = "#title;제4화;의장님의 철학적 사유"
10031040-2 = "#na;(만마전의 게헨나 파티 준비를 도와주기로 한 둘째 날. 이번에도 어김없이 마코토로부터 연락이 도착했다.)"
10031040-3 = "#all;hide"
10031040-4 = "#wait;3500"
10031040-5 = "#wait;1500"
10031040-6 = "3;마코토;01\n#3;a\n#3;sig\n#wait;1000"
10031040-7 = "3;마코토;02;아아, 선생. 슬슬 우리의 파티 준비도 무르익어 가는 느낌이군…….\n#3;sig"
10031040-8 = "3;마코토;03;이번 파티에서 특히나 중요한 역할을 맡았다고 볼 수 있는 선도부장은…… 과연 피아노 연습을 열심히 하고 있을는지 모르겠어. 키키킷.\n#3;sig\n#3;em;[재잘]"
10031040-9 = "3;마코토;10;그 결과물이 참으로 기대가 된단 말이야.\n#3;sig"
10031040-10 = "[s] \"히나는 지금도 노력하고 있을 거야.\""
10031040-11 = "3;마코토;02;그래? \n#3;sig\n#3;em;[?]"
10031040-12 = "3;마코토;01;흥, 뭐…… 물론 선도부장이 보여줄 추태를 기대하는 것도 나름의 유흥거리가 되겠지마는…….\n#3;sig"
10031040-13 = "3;마코토;03;키키킷. 그것과 별개로 지금 이 몸에겐 <게헨나 특별 파티>의 준비를 빈틈없이 해내야 한다는 막중한 책임이 있으니 말이다!\n#3;sig\n#3;jump"
10031040-14 = "3;마코토;02;파티라고 한다면, 음악이나 공연, 볼거리 외에도 무엇이 중요하다고 생각하나? 선생?\n#3;sig"
10031040-15 = "[s1] \"글쎄…… 파티가 가진 의미……?\"\n[s2] \"으음…… 역시 먹을 걸 빼놓을 수 없으려나?\""
10031040-16 = "3;마코토;01;호오…… 과연. 선생의 말도 일리가 있어.\n#3;sig"
10031040-17 = "3;마코토;99;파티가 열렸을 때, 단순히 열리고 마는 것이 아니라 그 파티가 어떠한 의미를 지니고 함의를 품고 있는지…… 그걸 염두하고 여는 것이 또한 우수한 지도자로서 갖춰야 할 덕목이다.\n#3;sig"
10031040-18 = "3;마코토;01;그렇게 말하고 싶은 것이로군?\n#3;sig\n#3;em;[?]"
10031040-19 = "[s3] \"아니, 거기까지는…….\""
10031040-20 = "3;마코토;01;뭐, 그런 거라면 걱정할 필요 없다. 이번 파티는 이 마코토 님의 치세가 얼마나 위대하고, 그간 쌓아온 우리 만마전의 위업이 얼마나 용맹 강대한지.\n#3;sig"
10031040-21 = "3;마코토;03;그것을 만인에게 증명하기 위한 자리─라는 번듯한 의미를 지닌 파티이니 말이다! 키시싯!\n#3;sig"
10031040-22 = "3;마코토;03;거기에 더해, 그런 자리에 또 빼놓을 수 없는 것이 바로…… 파티의 음식이겠지!\n#3;sig"
10031040-23 = "3;마코토;03;키키키키킷!! 과연! 선생! 그 말 그대로다!\n#3;sig\n#3;em;[재잘]"
10031040-24 = "3;마코토;01;파티를 찾는 이들의 오감을 휘어잡기 위해선…… 앞서 말한 볼거리 외에도 먹을거리를 빼놓을 수가 없는 법이지.\n#3;sig"
10031040-25 = "3;마코토;99;그런 의미에서 마침 이번 파티에서 먹을 수 있도록, 파티용 특제 요리를 급양부에 주문해 둔 참이다.\n#3;sig"
10031040-26 = "3;마코토;02;오늘 그 프로토타입에 대해 미리 시식해 보고, 어울리는지 아닌지. 부족함은 없는지 품평회를 가질 예정이다마는.\n#3;sig"
10031040-27 = "3;마코토;01;어떤가. 선생. 도움을 받고 싶은데. 시간은 괜찮나?\n#3;sig"
10031040-28 = "[s] \"응. 알았어. 지금 바로 갈게.\""
10031040-29 = "3;마코토;03;크크큭. 그래. 그럼 기다리고 있겠다.\n#3;sig"

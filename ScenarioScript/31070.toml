[translation]
31070-1 = "第7話;準備考試"
31070-2 = "（放學後的自習時間）"
31070-3 = "花子，這個問題該怎麼解呢？"
31070-4 = "嗯？啊啊，是因數分解的問題呢。#n這種時候可以用倍數判別法，像這樣……"
31070-5 = "嗯，原來如此。"
31070-6 = "……"
31070-9 = "……"
31070-10 = "小春醬？有什麼不懂的問題嗎？"
31070-11 = "沒，沒有！完全沒有！？"
31070-12 = "順帶一提，你現在看的那一頁不在這次的考試範圍裡唷。"
31070-13 = "咦，騙人！？"
31070-14 = "我，我也知道！只是在預習之後的範圍而已！"
31070-15 = "……"
31070-18 = "花子，這篇文章是什麼？"
31070-19 = "這是古代敘事詩的開頭呢。#n是「吟唱憤怒吧，詩歌之神──」的意思。"
31070-20 = "這樣啊，我懂了。"
31070-25 = "……"
31070-28 = "花子，這是……"
31070-29 = "這是重譯了古代語的詞語呢。#n要理解原文的話必須要有辭典……稍等一下哦。"
31070-30 = "這樣啊，那這個應該是「Gaudium et Spes」……也就是喜悅與希望吧。"
31070-31 = "啊，似乎是這樣沒錯呢。#n這是第二次公會議中提出的口號……不過比起這個，梓醬看得懂古代文字嗎？"
31070-32 = "嗯，我以前學過。"
31070-37 = "……"
31070-39 = "[ns]「感覺不錯呢。」"
31070-40 = "是！花子醬感覺很厲害……！而且梓醬也充滿學習慾望！"
31070-41 = "小春醬則是隱藏了實力……"
31070-42 = "看來說不定能輕鬆通過考試……！！"
31070-43 = "啊嗚嗚……真是太好了。#n我本來還非常擔心……"
31070-44 = "因為茶會其實下達了#n「如果第1次測驗有人不合格，所有人就必須在下次測驗前參加合宿」的命令……"
31070-45 = "[s]「合宿？」"
31070-46 = "是的，這部分的事情有點敏感……#n而且如果3次測驗全都不合格的話……啊嗚嗚……"
31070-47 = "[s]「全都不合格的話……？」"
31070-48 = "沒，沒什麼！我想那種事應該不會發生才對，不吉利的話題就先說到這裡……"
31070-49 = "目前看來，測驗似乎沒什麼問題！"
31070-53 = "不過話說回來，花子醬明明看起來很會念書，為什麼會不及格呢……？#n和我一樣是因為缺考嗎……？"
31070-55 = "第1次特別學力測驗當天"
31070-58 = "……"
31070-59 = "啊嗚……"
31070-63 = "呵呵。"
31070-64 = "……"
31070-67 = "[ns]「第1次測驗，大家要好好加油哦。」"
31070-68 = "讓，讓你見識見識菁英的力量！做好覺悟吧！"
31070-69 = "啊，啊哈哈……"
31070-70 = "好的。呵呵呵。"
31070-71 = "嗯，準備非常完美。"
31070-76 = "下一話;第1次特別學力測驗"

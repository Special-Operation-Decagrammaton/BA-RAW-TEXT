[translation]
31070-1 = "ตอนที่ 7;เตรียมตัวสอบ"
31070-2 = "(ชั่วโมงเรียนอิสระหลังเลิกเรียน)"
31070-3 = "ฮานาโกะ ฉันไม่เข้าใจโจทย์นี้เลย"
31070-4 = "หืม? นี่มันโจทย์การแยกตัวประกอบจำนวนเต็มนี่คะ แบบนี้ใช้กฎการหารเลขลงตัวได้เลยค่ะ#nทำแบบนี้นะ..."
31070-5 = "อืม แล้วก็..."
31070-6 = "......"
31070-9 = "......"
31070-10 = "หืม? โคฮารุจัง? มีตรงไหนที่ไม่เข้าใจเหรอคะ?"
31070-11 = "มะ.. ไม่หรอก! ไม่มี๊!"
31070-12 = "ตอนนี้หน้าที่กำลังดูอยู่ไม่ได้เอาไปออกสอบนะคะ"
31070-13 = "วะ.. ว่าไงนะ?!"
31070-14 = "ฉะ... ฉันรู้หรอกน่า! ก็แค่... ทวน... ใช่! แค่ทวนอยู่เท่านั้นแหละ!"
31070-15 = "......"
31070-18 = "ฮานาโกะ ฉันไม่เข้าใจความหมายของประโยคนี้เลย"
31070-19 = "อืม นี่มันวรรคแรกของโคลงโบราณนี่คะ?#nถอดความได้ว่า <เทพแห่งบทกลอน จงระบายความโกรธออกมา>"
31070-20 = "อ่า แบบนี้นี่เอง เข้าใจแล้วล่ะ"
31070-25 = "......"
31070-28 = "ฮานาโกะ ส่วนอันนี้..."
31070-29 = "อืม นี่คือการแปลภาษาโบราณค่ะ ถ้าอยากเข้าใจประโยคดั้งเดิมก็ต้องเปิดพจนานุกรม... แป๊บหนึ่งนะคะ"
31070-30 = "อ่า ถ้าเป็นเรื่องนั้นก็เข้าใจแล้วล่ะ Gaudium et Spes. คือความดีใจและความหวัง... อย่างนั้นเหรอ"
31070-31 = "ใช่แล้วค่ะ มันใช้เป็นสโลแกนของการประชุมสภาครั้งที่ 2 ค่ะ... จะว่าไป#nอาซึสะจังอ่านภาษาโบราณได้ด้วยเหรอคะ?"
31070-32 = "อืม เรียนมานานแล้วน่ะ"
31070-37 = "......"
31070-39 = "[ns] \"ช่วยเหลือกันดีจังเลย\""
31070-40 = "ใช่แล้วค่ะ! ฮานาโกะจังช่วยพวกเราได้มากเลย... แถมอาซึสะจังก็มีความมุ่งมั่นที่จะเรียนรู้อีกด้วย...!"
31070-41 = "ส่วนโคฮารุจังก็บอกว่าซ่อนพลังเอาไว้..."
31070-42 = "ฉันว่าพวกเราต้องสอบผ่านกันได้ง่ายๆ เลยล่ะ...!!"
31070-43 = "อ่า... เห็นแบบนี้ก็โล่งอกนะคะ ที่จริงฉันกังวลมากเลยล่ะค่ะ..."
31070-44 = "ความจริงแล้วสภาน้ำชามีคำสั่งมาว่า หากมีนักเรียนสอบตกตั้งแต่การสอบครั้งแรก#nก็ให้ไปเข้าแคมป์ฝึกฝนตั้งแต่การสอบครั้งต่อไปได้เลย..."
31070-45 = "[s] \"เข้าแคมป์เหรอ?\""
31070-46 = "ใช่ค่ะ มันเป็นเรื่องละเอียดอ่อนมาก... ถ้าสอบไม่ผ่านไปจนถึงรอบสุดท้ายล่ะก็..."
31070-47 = "[s] \"ถ้าสอบไม่ผ่าน...?\""
31070-48 = "มะ.. ไม่มีอะไรหรอกค่ะ! มันไม่เกิดเรื่องแบบนั้นหรอกค่ะ อย่าพูดเป็นลางดีกว่า..."
31070-49 = "ถ้าทุกคนมาเรียนเสริมกันแบบนี้ทุกวัน ก็ไม่น่าจะมีปัญหาเรื่องการสอบค่ะ!"
31070-53 = "ว่าแต่ ฮานาโกะจังก็ไม่ได้เข้าสอบจนถูกปรับให้ตกเหมือนฉันหรือเปล่าคะ...?#nดูเรียนเก่งมากเลยด้วยแล้วทำไมถึง..."
31070-55 = "วันสอบประเมินความสามารถทางวิชาการพิเศษครั้งที่ 1"
31070-58 = "......"
31070-59 = "อ่า..."
31070-63 = "ฮุฮุ"
31070-64 = "......"
31070-67 = "[ns] \"การสอบประเมินครั้งแรก ทุกคนทำให้เต็มที่นะ\""
31070-68 = "ฉะ... ฉันจะแสดงพลังของอีลีทให้เห็นเอง! ทุกคนรอดูได้เลย!"
31070-69 = "อ่า... อ่าฮ่าฮ่า..."
31070-70 = "ค่าา ฮุฮุฮุ"
31070-71 = "ลุยเลย ฉันเตรียมตัวมาอย่างดีแล้ว"
31070-76 = "ตอนต่อไป;การสอบประเมินครั้งที่ 1"

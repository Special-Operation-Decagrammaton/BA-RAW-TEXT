[translation]
1902-1 = "The Prefect Team's Unscheduled Audit"
1902-2 = "Prefect Team Conference Room"
1902-3 = "...And that sums up the plan for the Prefect Team's tactical training scheduled for next month. "
1902-4 = "This is what you came up with after refusing the plan the Pandemonium Society offered?"
1902-5 = "We believe the current plan to be more than acceptable."
1902-6 = "I believe the budget statement has already been submitted, so I would like to request the Pandemonium Society's approval after a review."
1902-7 = "I did receive and look over your statement, Senior Administrator."
1902-8 = "Then..."
1902-9 = "Your proposal has been rejected."
1902-10 = "Excuse me? That statement should be flawless."
1902-11 = "Perhaps so."
1902-12 = "Then why...?"
1902-13 = "It's rejected, and that's final."
1902-14 = "We could always adjust the statement if you feel we missed something."
1902-15 = "It's useless. Don't you understand that the budget will be rejected no matter how you adjust it?"
1902-16 = "For what reason? Why won't you tell me?"
1902-17 = "Fine. It's because I've thought for quite some time that the Prefect Team's budget needs to be reviewed more closely."
1902-18 = "How else would I be able to investigate whether or not our funds are being embezzled?"
1902-19 = "(Is she seriously saying this?! No one wastes Gehenna taxpayer money more than the Pandemonium Society.)"
1902-20 = "I-I see. That can only mean..."
1902-21 = "That's right. We've decided to conduct an audit of the Prefect Team starting immediately."
1902-22 = "Wait! You can't just do that!"
1902-23 = "This isn't on a whim. As I understand it, there's been some trouble within the Prefect Team lately."
1902-24 = "For example, a certain administrator aside from the head prefect arbitrarily commanding your troops...or something to that effect."
1902-25 = "...!"
1902-26 = "Ahaha! The look on your face!"
1902-27 = "(She usually ignores anything important we have to say, but of COURSE she would have found out about this. Tch.)"
1902-28 = "Lest you forget, Amau Ako, nothing escapes the Pandemonium Society!"
1902-29 = "(You snake!)"
1902-30 = "I believe there's been some sort of misunderstanding here, so I'll review the documents once more."
1902-31 = "Ah, I see. There must have been a mix-up."
1902-32 = "Is that how you want to play it...?"
1902-34 = "Very well! Prepare yourself for this audit, because this time there will be no escape! Hahaha!"
1902-39 = "Just great."
1902-43 = "There's work to be done, Iroha."
1902-44 = "What is it, Makoto?"
1902-45 = "Starting now, I am ordering an audit of the Prefect Team! Make sure you dig deep and uncover everything you can about them!"
1902-46 = "Show them what happens when you mess around with our budget. Prove to all of Kivotos just how terrifying the Pandemonium Society can be, Iroha!"
1902-47 = "If I must."
1902-48 = "Wh-What was that, Iroha?"
1902-49 = "*sigh* Nothing. So I just have to conduct an audit, right?"
1902-50 = "Yes! To destroy the Prefect Team!"
1902-51 = "It's just an audit. How is that supposed to crush them?"
1902-52 = "Heh heh heh... This is our opportunity to shake the Prefect Team to its core and see to it that they never walk all over the Pandemonium Society again."
1902-53 = "Whatever you say. Sure."
1902-54 = "Would you at least listen to me while I'm talking?"
1902-56 = "So...yeah! We're here to conduct an audit of the Prefect Team!"
1902-57 = "*sigh* What a bother..."
1902-58 = "Makoto trusted Ibuki with this job, so Ibuki is going to give it her very best!"
1902-61 = "W-Wait. We're starting right now?!"
1902-62 = "Our training is right around the corner. We'd be on an even tighter schedule if we had to conduct the audit now."
1902-63 = "What the heck is going on, Ako?! The president isn't even here!"
1902-66 = "Tch."
1902-67 = "Give up. This is a direct order from the top of the Pandemonium Society."
1902-68 = "This is perfectly fine. We have nothing to hide. You'll find our management to be perfect."
1902-69 = "In fact, once the Pandemonium Society finishes its needless investigation, it will finally understand that the Prefect Team has nothing to hide."
1902-70 = "So do your worst!"
1902-71 = "Ako is taking this a little too personally..."
1902-72 = "If anything, seeing her get this animated only makes me more nervous."
1902-75 = "Then, let's get started."
1902-76 = "The first place we would like to visit is..."
1902-77 = "...Prefect Team headquarters."
1902-79 = "Prefect Team HQ Hallway"
1902-80 = "Is there even anything to see in here? It's just hallways."
1902-81 = "Hmm. I see."
1902-82 = "Wh-What could it possibly be?"
1902-86 = "The Pandemonium Society's periodical newspaper hasn't been displayed for passersby."
1902-87 = "I'll have to deduct points."
1902-88 = "What?!"
1902-89 = "What the...?!"
1902-90 = "*sigh*"
1902-92 = "The Pandemonium Society's periodical must be posted on the bulletin board of all buildings so that the news can be delivered regularly. It's a school rule."
1902-93 = "Since when?!"
1902-94 = "Since Makoto proposed and put it into effect two months ago. I understand notice of such may not have been delivered to everyone yet..."
1902-95 = "...however, rules are rules."
1902-96 = "This is ridiculous!"
1902-97 = "Your tactical training's budget will have to be diverted to rectify this issue. "
1902-98 = "I'll mark it down as \"bulletin board maintenance\"."
1902-99 = "U-Ugh..."
1902-101 = "Moving on."
1902-103 = "Prefect Team HQ 2F Break Room"
1902-104 = "This is a break room regularly used by our members. Is it necessary to investigate here as well?"
1902-105 = "Yes. I'll need to check if all mandated supplies are in stock and if anything's expired."
1902-106 = "Such things will need to be investigated, otherwise your numbers would be inaccurate and fraudulent."
1902-107 = "In that case, I'm sure we have nothing to worry about!"
1902-108 = "Hey, Iroha?"
1902-109 = "What is it, Ibuki?"
1902-110 = "Do they not have hot cocoa?"
1902-113 = "They do not. That's another deduction. The budget will need to be diverted again to see to it that they have a wide enough variety here to serve guests."
1902-115 = "What?! Who drinks hot cocoa at this time of year?!"
1902-117 = "Who's to say? However, it's common sense to stock up on goods that will satisfy the various needs of any person that might visit. "
1902-118 = "More importantly, Makoto told us to nitpick over even the slightest things we could find fault with."
1902-119 = "Wait, what?! Were you supposed to share that part with us?!"
1902-120 = "Pretend you didn't hear it, then. I don't want to be here anymore than you do. "
1902-121 = "Moving on..."
1902-124 = "..."
1902-126 = "Iroha continued to mercilessly reduce or redistribute the Prefect Team's budget."
1902-128 = "This, that, this as well, and that too..."
1902-129 = "Cut back, change, cut back, remove, cancel, and cut back again."
1902-130 = "...!"
1902-131 = "*shakes head*"
1902-132 = "This is outrageous! Forget about complaining—I'm going to file a claim!"
1902-133 = "Saying that won't change anything. I'm just a civil servant doing my job. "
1902-134 = "I have nothing against the Prefect Team, personally, so it's pointless to shoot the messenger."
1902-140 = "The financial audit would continue for another three hours."
1902-142 = "In conclusion, about 95 percent of the existing tactical training budget has been reallocated."
1902-143 = "You've got to be kidding me! There's practically nothing left for training!"
1902-144 = "If these changes are final, our next training camp will have to be..."
1902-145 = "The final thing to do is..."
1902-149 = "La dee da dee da!"
1902-150 = "Hey, you. Watch where you're...!"
1902-156 = "Ibuki!"
1902-157 = "O-Ouch... *sniffle*"
1902-158 = "Are you all right, Ibuki? Are you hurt?"
1902-159 = "That was some fall. You okay?"
1902-160 = "*sniffle* Y-Yeah. I-Ibuki is okay...*sniffle*"
1902-164 = "And with that, your budget for the upcoming training as well as the next quarter is now zero."
1902-166 = "What?! What happened to the remaining five percent?!"
1902-167 = "Could you please explain?"
1902-168 = "It's simple: You made Ibuki cry."
1902-169 = "Oh, come on! You're not even trying to sound professional anymore!"
1902-170 = "Making Ibuki cry is the highest of violations."
1902-171 = "You're right! Makoto says that all the time!"
1902-172 = "But this is an office! Of course there's going to be stuff in the way if you go running around like a lunatic!"
1902-173 = "You knew in advance that we were coming, so you had ample opportunity to clear the way. If Makoto learns that Ibuki has been hurt..."
1902-174 = "...she would fly off the handle and cite you for injuring an auditor. I'm merely speeding along the process."
1902-175 = "I'd rather not make a second trip here to inform you of her decision."
1902-176 = "Tyranny!"
1902-177 = "At this point, the Prefect Team will have to redraw their budget from scratch, so please submit all related documents on how you will pay for your shortcomings."
1902-180 = "Hahaha! Well done, Iroha! You've performed marvelously!"
1902-181 = "Makoto."
1902-182 = "Do you understand now, Senior Administrator Ako? This is what happens when the Pandemonium Society gets serious."
1902-183 = "Tch."
1902-184 = "It's time you stopped your futile resistance and know your place!"
1902-185 = "The Prefect Team is nothing but a pawn of the Pandemonium Society!"
1902-186 = "Accept it, and get used to being underneath my heel!"
1902-187 = "All you have to do is roll over for us like the dogs that you are!"
1902-188 = "It's just an audit."
1902-189 = "The plans to redistribute the budget have been drafted, but they still need to be processed by the administration and... You're not listening."
1902-191 = "And that's what happened earlier."
1902-192 = "*nervous glance*"
1902-193 = "So it did. A lot happened while I was away."
1902-194 = "*sigh* Those snakes. I wanted to avoid seeing them, but there isn't much choice now."
1902-195 = "P-President?"
1902-196 = "Head...Prefect?"
1902-199 = "I'll be right back."
1902-203 = "After that, a corner of the Pandemonium Society's headquarters collapsed in an explosion and hail of gunfire for reasons unknown."
1902-204 = "But that's a story for another time..."
1902-205 = "The Prefect Team's Unscheduled Audit"

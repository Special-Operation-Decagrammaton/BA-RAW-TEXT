[translation]
1902-1 = "風波不斷的臨時會計審查"
1902-2 = "風紀委員會．大會議室"
1902-3 = "……以上，是預定下個月進行的戰術訓練企劃案。"
1902-4 = "哼嗯……[ruby=Pandemonium Society]我們萬魔殿提出[/ruby]的訓練計畫，似乎完全被打掉重建了？"
1902-5 = "……我們認為目前的企劃案比較合理。"
1902-6 = "這次訓練的預算案已經有提出了。內容和本次企劃案比對起來應該不會有問題，只要各位確認好應該就能正式定案了。"
1902-7 = "……啊啊，這麼說來確實有收到。我也看過了，確實沒問題。"
1902-8 = "那麼──"
1902-9 = "不過駁回。"
1902-10 = "……咦？但您剛剛說，沒有問題……"
1902-11 = "對，確實沒有問題。"
1902-12 = "那是為什麼……"
1902-13 = "不過還是駁回。"
1902-14 = "……若有哪些不足或需求，我們都可以做調整。"
1902-15 = "嘰嘰嘰……！別白費力氣，不管文件再怎麼改，結果都不會變。"
1902-16 = "……請問是為什麼呢？"
1902-17 = "那好，我就告訴你。我從以前就一直覺得……必須要更加精密核查風紀委員會的預算。"
1902-18 = "不管文件寫的再漂亮，也沒有人知道實際上是不是被汙了，或是花在一些不正經的用途上。你說是不是啊？"
1902-19 = "（你還好意思說……！？全格黑娜最會浪費預算的還不就是你！？）"
1902-20 = "呼。那請問您打算要……？"
1902-21 = "沒辦法了，我們趁這個機會來特地，為風紀委員會進行會計審查吧。"
1902-22 = "請、請等一下，這也太唐突……！"
1902-23 = "所以才說沒辦法啊。何況我還聽說最近風紀委員會有好多奇怪的動作。"
1902-24 = "例如，明明不是風紀委員長，某個行政官卻擅自挪用軍隊……之類的。"
1902-25 = "……！"
1902-26 = "嘰嘻嘻嘻……！你也會露出這麼不錯的表情啊！"
1902-27 = "（平常都把我們給的情報當耳邊風，就只有這種時候眼睛特別尖……！）"
1902-28 = "嘰嘰嘰嘰……！要我說幾次都行，天雨亞子。最好還是不要白費力氣，妄想走在萬魔殿前面！"
1902-29 = "真是個該死的老狐狸……！"
1902-30 = "（看來您似乎有些誤會，這部分也請讓我們稍微檢討一下）"
1902-31 = "啊，真心話和場面話弄反了……"
1902-32 = "……算、算了。"
1902-34 = "你們就把脖子洗乾淨等著吧！這次要你們徹底學到教訓！嘰嘰嘰嘰，嘰哈哈哈哈哈！！！"
1902-39 = "真是夠了……！"
1902-43 = "伊呂波，工作了。"
1902-44 = "……你叫我嗎？真琴前輩。"
1902-45 = "我命令你去風紀委員會進行會計審查！嘰嘰嘰嘰……把她們的祕密全都給我挖出來！"
1902-46 = "給那些討人厭的傢伙挫挫銳氣，讓她們明白我們萬魔殿的可怕！"
1902-47 = "……麻煩死了。"
1902-48 = "伊、伊呂波……？你說什麼……？"
1902-49 = "哈啊，我明白了。既然是工作那我就照辦。你剛剛說會計審查？"
1902-50 = "沒錯！上吧！徹底擊潰風紀委員會吧！"
1902-51 = "哪可能擊潰，不就是會計審查嗎。"
1902-52 = "嘰嘻嘻嘻嘻嘻……可惡的風紀委員會，#n這次一定要讓你們大受挫折，再也沒辦法在我面前擺架子──"
1902-53 = "喔是喔好喔。"
1902-54 = "算、算我求你了，至少聽我把話說完吧……"
1902-56 = "……因此，我們來進行審查了！"
1902-57 = "唉……"
1902-58 = "這是真琴前輩難得交派的任務，伊吹會加油的！"
1902-61 = "咦，從現在開始嗎！？"
1902-62 = "訓練都已經近在眼前了……"
1902-63 = "亞子醬，這是怎麼回事！？而且還偏偏挑委員長不在的時候……！"
1902-66 = "咕……！"
1902-67 = "請死心吧。這是萬魔殿高層直接下達的指示。"
1902-68 = "……算了無所謂。反正我們都是公開透明的管理，不管你們怎麼刺探都不痛不癢。"
1902-69 = "不如可以趁這個機會，證明我們無法動搖的清白之身，讓他們今後無法拿一些莫名其妙的藉口威脅我們。"
1902-70 = "來，要查就儘管查吧！"
1902-71 = "亞子醬，雖然充滿自信是好事……"
1902-72 = "但行政官每次這麼亢奮的時候，都反而讓人不安。"
1902-75 = "那我不客氣了。"
1902-76 = "首先是……"
1902-77 = "……風紀委員會的總部。"
1902-79 = "格黑娜風紀委員會總部．走廊"
1902-80 = "……走廊有什麼好看的啊？"
1902-81 = "……原來如此。"
1902-82 = "怎、怎樣啦……"
1902-86 = "沒有張貼萬魔殿發放的報刊呢。"
1902-87 = "扣分。"
1902-88 = "咦？！"
1902-89 = "什麼東西，沒聽說啊？！"
1902-90 = "……唉。"
1902-92 = "格黑娜校規規定，萬魔殿定期發放的報刊，不管哪個建築物的布告欄都一定要張貼。"
1902-93 = "有那種校規？！"
1902-94 = "因為這是上上個月真琴前輩提倡的新校規，所以有些地方確實可能還不知道。"
1902-95 = "……但校規就是校規。"
1902-96 = "你們這根本是暴政吧！？"
1902-97 = "看來戰術訓練的預算要先分一部份到這邊呢。改寫時也請載明預定要使用在這地方。"
1902-98 = "項目就寫「整頓布告欄」吧。"
1902-99 = "咕……！"
1902-101 = "下一個。"
1902-103 = "格黑娜風紀委員會總部．2F休息室"
1902-104 = "這裡是風紀委員平常使用的休息室……連這裡也要調查嗎？"
1902-105 = "是。要確認校規決定的相關公物是否完善，或是有沒有放置已經過期的物品……"
1902-106 = "要調查這些部分有沒有確實，不然這些數字也可能變成假帳。"
1902-107 = "照你這麼說，我們都有確實管理好，完全不用擔心！"
1902-108 = "欸欸，伊呂波前輩。"
1902-109 = "伊吹？怎麼了嗎？"
1902-110 = "這間休息室，沒有可可嗎？"
1902-113 = "原來如此……確實沒有。這要扣分。招待客人的準備沒有做確實，部分預算也要挪用到這裡。"
1902-115 = "哈？！可可也要扣分？！"
1902-117 = "畢竟不知道什麼時候會來怎麼樣的客人，那當然要確保品項齊全以應對各種不同的喜好……"
1902-118 = "這些都是真琴前輩交代我要「極盡可能當奧客找碴」。"
1902-119 = "這種話你可以大喇喇說出來嗎？！"
1902-120 = "那就請各位當作沒聽到吧。唉，話說回來為什麼我要做這種事……"
1902-121 = "去下一個地方吧……"
1902-124 = "……"
1902-126 = "（後來伊呂波也毫不留情地到處找碴，一步步刪減風紀委員會的預算，或變更用途）"
1902-128 = "這個、那個、還有那個……"
1902-129 = "刪減、變更、刪減、變更、刪減、變更。"
1902-130 = "……！"
1902-131 = "太過分了……"
1902-132 = "要找碴也該有個限度吧！而且你有些論調還顛三倒四的！"
1902-133 = "就算你這麼說，我終究只是個公務員。"
1902-134 = "我對你們沒有私人恩怨，純粹公事公辦……"
1902-140 = "（於是，經過大約3小時的會計審查（？）……）"
1902-142 = "以上確認各處狀況的結果……原定戰術訓練的預算有約95%應該要刪減，或是挪用成環境整理等其他項目。"
1902-143 = "太亂來了吧！這下我們要怎麼做訓練啊！？"
1902-144 = "要是這種手段行得通，下次的訓練恐怕……"
1902-145 = "好了，現在剩下……"
1902-149 = "哼哼～嚕嚕～♪"
1902-150 = "啊，伊吹！那前面是……！"
1902-156 = "伊吹！"
1902-157 = "好痛喔……嗚嗚……"
1902-158 = "伊吹你沒事吧！？有哪裡受傷嗎？！"
1902-159 = "你剛才好像摔的很嚴重耶……沒事吧？"
1902-160 = "吸、嗚嗚……啜啜……我、我沒有哭……我沒事……"
1902-164 = "……風紀委員會明年的預算全砍了。"
1902-166 = "什麼？！為什麼這麼突然？！"
1902-167 = "能請問一下是什麼原因嗎……？"
1902-168 = "因為你們讓伊吹哭了。"
1902-169 = "這連找碴都不算了！"
1902-170 = "讓伊吹哭的傢伙都不可饒恕。"
1902-171 = "嗚嗚……啊，那是真琴前輩每天都這麼說！"
1902-172 = "但剛才那個和我們沒關係啊……！辦公室擺這些東西很正常吧！？"
1902-173 = "既然知道我們要來，那就應該要事先收拾好。而且要是今天伊吹受傷的事情被真琴前輩知道了……"
1902-174 = "她一定會大發脾氣說什麼：「因為不夠體貼，害我們的重要人員受傷」。那可不是下年度預算就能了事的了。"
1902-175 = "你們應該慶幸今天只有這點處置。"
1902-176 = "太蠻橫了！！"
1902-177 = "好了，接下來……"
1902-180 = "嘰嘰，嘰哈哈哈哈哈！伊呂波，幹得好！幹得漂亮！"
1902-181 = "……"
1902-182 = "知道厲害了吧，亞子行政官？讓萬魔殿認真起來會有什麼下場！"
1902-183 = "咕……"
1902-184 = "嘰嘻嘻嘻！是時候停止毫無意義的反抗，認清現實了。"
1902-185 = "你們風紀委員會不過是我們萬魔殿的小嘍囉而已！"
1902-186 = "乖乖接受這個事實吧！"
1902-187 = "像小狗一般在我面前搖著尾巴屈服吧！！嘰嘰，嘰哈哈哈哈哈哈！"
1902-188 = "……前輩。就只是會計審查而已。"
1902-189 = "我姑且有重弄了一份預算分配案，但要正式核准依然需要通過整套行政程序，沒有通過就終究只是個方案……你有在聽嗎？"
1902-191 = "以上就是剛才發生的事情……"
1902-192 = "（一瞥）"
1902-193 = "……是嗎？"
1902-194 = "哈啊，那些老狐狸……可以的話我實在不想去見她們，但沒辦法了。"
1902-195 = "委，委員長……？"
1902-196 = "難道說……？"
1902-199 = "我過去一趟。"
1902-203 = "（聽說後來萬魔殿總部傳出劇烈槍響，並有部分設施隨著突如其來的爆炸聲崩塌……）"
1902-204 = "（但那就是另一個故事了……）"
1902-205 = "風波不斷的臨時會計審查"

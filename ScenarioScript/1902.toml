[translation]
1902-1 = "การตรวจสอบบัญชีนอกวาระ ของคณะกรรมการวินัย"
1902-2 = "ห้องประชุมคณะกรรมการวินัย"
1902-3 = "นี่คือรายงานสรุปแผนการฝึกยุทธวิธีของคณะกรรมการวินัยในเดือนหน้าค่ะ..."
1902-4 = "แผนการฝึกที่จะใช้แทนแผนการที่แพนเดโมเนียม โซไซตี้เสนอไปงั้นหรือ?"
1902-5 = "...ใช่ค่ะ ทางเราพิจารณาแล้วว่าแผนการนี้เหมาะสมกว่าค่ะ"
1902-6 = "ทางเรายื่นของบประมาณสำหรับการฝึกนี้ไปแล้ว รบกวนทางแพนเดโมเนียม โซไซตี้#nตรวจสอบและอนุมัติให้ด้วยค่ะ"
1902-7 = "อืม งั้นหรือ... ที่จริงเราตรวจสอบตามรายการงบประมาณตามที่เธอแจ้งมาแล้วละ"
1902-8 = "ถ้างั้น..."
1902-9 = "ไม่อนุมัติ"
1902-10 = "คะ...? บัญชีงบประมาณนี้ถูกต้องครบถ้วน ไม่น่ามีเหตุผลให้ต้องปฏิเสธการอนุมัติเลยนี่คะ"
1902-11 = "ก็อาจจะนะ..."
1902-12 = "ถ้าอย่างนั้นทำไมถึงไม่อนุมัติล่ะคะ..."
1902-13 = "แต่ถึงอย่างนั้นเราก็ไม่อนุมัติ"
1902-14 = "...ถ้ามีรายละเอียดส่วนไหนในรายงานบัญชีตกหล่นไป ฉันจะเขียนส่งไปใหม่ค่ะ"
1902-15 = "ไม่ต้องหรอก ไม่ว่าเธอจะเขียนรายงานบัญชีใหม่แบบไหน ไม่อนุมัติก็คือไม่อนุมัติ"
1902-16 = "ขอทราบเหตุผลได้มั้ยคะ...?"
1902-17 = "เราคิดมานานแล้วละว่าจำเป็นต้องพิจารณางบประมาณที่ใช้ในกิจกรรมต่างๆ ของคณะกรรมการวินัยให้ละเอียดขึ้นกว่าเดิม"
1902-18 = "ไม่อย่างนั้นจะรู้ได้อย่างไรว่าเงินงบประมาณของเราถูกยักยอกไปบ้างหรือไม่?"
1902-19 = "(พูดเรื่องแบบนี้ขึ้นมาได้ยังไง...? คนที่ใช้งบประมาณของเกเฮนน่าสิ้นเปลืองและสิ้นคิดกว่าใครๆ ก็คือพวกคุณไม่ใช่รึไง?!)"
1902-20 = "อะ... อะแฮ่ม อย่างนั้นเองเหรอคะ ถ้างั้นก็หมายความว่า..."
1902-21 = "ใช่แล้ว เราจะใช้โอกาสนี้ตรวจสอบบัญชีของทางคณะกรรมการวินัยไปด้วยเลย"
1902-22 = "เดี๋ยวก่อนสิคะ ทำอะไรตามอำเภอใจแบบนั้นได้ยังไงคะ...!"
1902-23 = "เราไม่ได้ทำตามอำเภอใจเสียหน่อย ได้ยินว่าช่วงนี้คณะกรรมการวินัยเองก็มีปัญหาเหมือนกันนี่"
1902-24 = "ตัวอย่างเช่น... มีเจ้าหน้าที่คนอื่นที่ไม่ใช่ประธานกรรมการวินัยมาสั่งการกองกำลังแทน... อะไรประมาณนั้น"
1902-25 = "...!"
1902-26 = "โฮะโฮะโฮะ! ดูทำหน้าเข้าสิ!"
1902-27 = "(ปกติก็ไม่เห็นสนใจเรื่องสำคัญที่รายงานไป แต่ดันรู้เรื่องแบบนี้ซะได้...ชิ!)"
1902-28 = "จำไว้ให้ดีล่ะ อามาอุ อาโกะ ไม่มีเรื่องไหนที่แพนเดโมเนียม โซไซตี้ไม่รู้!"
1902-29 = "(ยัยทานูกิจอมเจ้าเล่ห์...!)"
1902-30 = "ดูเหมือนจะมีการเข้าใจผิดบางอย่าง รบกวนตรวจสอบเอกสารอีกสักครั้งเถอะนะคะ"
1902-31 = "อ๊ะ หรืออาจมีข้อมูลที่คลาดเคลื่อนค่ะ"
1902-32 = "ฮะ... ฮึ่ม...! ย่อมได้"
1902-34 = "เอาละ! เตรียมตัวให้ดีล่ะ คราวนี้เราจะขุดให้ลึกถึงรากถึงโคน ทุกซอกทุกมุม ให้ดิ้นไม่หลุดเลย!"
1902-39 = "เฮ้อ..."
1902-43 = "อิโรฮะ เรามีงานให้ทำ"
1902-44 = "คะ เรียกฉันเหรอคะ รุ่นพี่มาโคโตะ"
1902-45 = "เราขอสั่งให้ตรวจสอบบัญชีของคณะกรรมการวินัยตั้งแต่ตอนนี้! ไปขุดคุ้ยทุกซอกทุกมุมเกี่ยวกับ#nเจ้าพวกนั้นมาให้ได้!"
1902-46 = "ใช้เรื่องงบประมาณกุมอำนาจไว้ แล้วสั่งสอนให้พวกนั้นเชิดหน้าต่อไปไม่ได้ซะ!#nแสดงความน่าเกรงขามของแพนเดโมเนียม โซไซตี้ ให้พวกนั้นได้เห็นซะ อิโรฮะ!"
1902-47 = "น่ารำคาญจริงๆ..."
1902-48 = "หืม? เอ๊ะ? อิ... อิโรฮะ...?"
1902-49 = "เฮ้อ... เข้าใจแล้วค่ะ แค่เข้าไปตรวจสอบสินะคะ"
1902-50 = "ใช่แล้ว! จัดการขยี้พวกคณะกรรมการวินัยซะ!"
1902-51 = "ก็แค่งานตรวจสอบนะคะ จะไปขยี้พวกเขาทำไมกัน..."
1902-52 = "โฮะโฮะโฮะ... ใช้โอกาสนี้ขยี้พวกคณะกรรมการวินัยให้จมดินไปซะ พวกนั้นจะได้ไม่กล้าหือ#nกับพวกเรา แพนเดโมเนียม โซไซตี้อีก..."
1902-53 = "ค่าๆ เอาตามที่สั่งเลยค่ะ"
1902-54 = "นี่... รอฟังให้จบก่อนแล้วค่อยตอบสิ..."
1902-56 = "เพราะงั้น... พวกเราเลยมาตรวจสอบบัญชีของคณะกรรมการวินัยกันน่ะ!"
1902-57 = "เฮ้อ... น่ารำคาญจริงๆ"
1902-58 = "นี่เป็นงานที่รุ่นพี่มาโคโตะฝากฝังให้ทำ เพราะงั้นอิบูกิจะทำให้เต็มที่เลย!"
1902-61 = "ดะ...เดี๋ยวก่อน! มันฉุกละหุกเกินไปรึเปล่า!"
1902-62 = "ตอนนี้ใกล้จะเริ่มการฝึกแล้วนะคะ ถ้าให้เตรียมการสำหรับการสุ่มตรวจบัญชีตอนนี้ทั้งที่ตารางงานเดิมก็แน่นอยู่แล้ว มันจะแย่เอานะคะ..."
1902-63 = "อาโกะจัง เรื่องมันเป็นยังไงกันแน่เนี่ย?! ตอนนี้ประธานก็ไม่อยู่ด้วยซะด้วยสิ!"
1902-66 = "อึก..."
1902-67 = "พยายามขัดขืนไปก็เปล่าประโยชน์ค่ะ เพราะนี่เป็นคำสั่งจากประธานสูงสุดของแพนเดโมเนียม โซไซตี้ค่ะ"
1902-68 = "เอาเถอะค่ะ... ถึงยังไงก็ไม่มีอะไรที่ต้องปิดบังอยู่แล้ว ทางเราเองก็ไม่ได้ทำงานกันแบบ#nขอไปทีหรอกนะคะ"
1902-69 = "อันที่จริง ถ้าการตรวจสอบที่ไร้สาระของทางแพนเดโมเนียม โซไซตี้จบลง ก็คงเข้าใจกันเสียที#nว่าทางคณะกรรมการวินัยไม่มีอะไรที่ต้องปิดบังค่ะ"
1902-70 = "เชิญตรวจสอบได้เท่าที่ต้องการเลยค่ะ!"
1902-71 = "อาโกะจัง กระตือรือร้นแบบนั้นมันก็ดีอยู่หรอก..."
1902-72 = "แต่พอเจ้าหน้าที่อาวุโสดูมั่นอกมั่นใจซะขนาดนั้น มันทำให้ฉันรู้สึกสังหรณ์ใจไม่ค่อยดีเลยค่ะ"
1902-75 = "ถ้างั้นจะเริ่มแล้วนะคะ"
1902-76 = "สถานที่แรกที่เราจะไปตรวจสอบกันก็คือ..."
1902-77 = "...อาคารสำนักงานคณะกรรมการวินัยค่ะ"
1902-79 = "ทางเดินในสำนักงานกรรมการวินัยเกเฮนน่า"
1902-80 = "ทางเดินมันมีอะไรงั้นเหรอ? ที่นี่ไม่มีอะไรให้ดูหรอกนะ"
1902-81 = "เอ่อ... อืม"
1902-82 = "อะ... อะไรเล่า? ทำไมถึงทำหน้าแบบนั้นล่ะ?"
1902-86 = "ไม่มีหนังสือพิมพ์ประจำที่แพนเดโมเนียม โซไซตี้แจกจ่ายแสดงไว้เลยนี่คะ"
1902-87 = "เรื่องนี้ต้องถูกหักคะแนนค่ะ"
1902-88 = "คะ?!"
1902-89 = "อะไรกัน?!"
1902-90 = "เฮ้อ..."
1902-92 = "ตามกฎของเกเฮนน่า หนังสือพิมพ์ประจำที่แพนเดโมเนียม โซไซตี้แจกจ่ายจะต้องติดอยู่ที่#nกระดานในทุกอาคารเพื่อแจ้งข่าวเวียนภายในสถาบันค่ะ"
1902-93 = "มีกฎแบบนั้นด้วยเหรอ?!"
1902-94 = "มันเป็นกฎที่รุ่นพี่มาโคโตะเสนอเมื่อสองเดือนที่แล้วค่ะ อาจจะยังไม่ได้แจ้งให้ทุกคนทราบ..."
1902-95 = "...แต่กฎก็คือกฎค่ะ"
1902-96 = "หะ... โหดร้ายชะมัด!"
1902-97 = "คงจะต้องดึงงบประมาณฝึกซ้อมยุทธวิธีของพวกคุณมาใช้จัดการเรื่องนี้แทนค่ะ"
1902-98 = "เหตุผลการโยกย้ายงบประมาณคือ 'การซ่อมบำรุงกระดานข่าว' ค่ะ"
1902-99 = "อะ...อึ่ก!"
1902-101 = "ไปต่อเลยแล้วกันนะคะ"
1902-103 = "ห้องครัว 2F ในสำนักงานกรรมการวินัยเกเฮนน่า"
1902-104 = "ที่นี่คือห้องครัวที่สมาชิกคณะกรรมการวินัยใช้ประจำค่ะ จะมาตรวจสอบที่นี่เหรอคะ?"
1902-105 = "ค่ะ ได้เตรียมของในห้องครัวไว้ตามกำหนดไว้ในกฎของโรงเรียนไว้รึเปล่า? หรือว่ามีของที่#nหมดอายุแล้วแต่ยังไม่ได้ทิ้งไปรึเปล่า?"
1902-106 = "ฉันจะตรวจสอบในส่วนนี้ด้วย เพราะการทำรายการบัญชีอาหารมันตกแต่งตัวเลขกันได้ค่ะ"
1902-107 = "เรื่องนั้นไม่มีอะไรต้องห่วงเลยค่ะ!"
1902-108 = "อืม~ รุ่นพี่อิโรฮะ~"
1902-109 = "มีอะไรเหรอ อิบูกิ?"
1902-110 = "ที่นี่ไม่มีโกโก้เหรอ?"
1902-113 = "อย่างที่คิดไว้เลย... ไม่มีสินะคะ เรื่องนี้ก็ต้องหักคะแนนค่ะ เพราะมีของไม่เพียงพอที่จะให้บริการ#nรับรองแขก สิ่งนี้จะถูกเปลี่ยนในรายการงบประมาณด้วยค่ะ"
1902-115 = "หา?! คะ... ใครเขาดื่มโกโก้กัน?!"
1902-117 = "เราไม่มีทางรู้ว่าจะมีแขกแบบไหนมาเยี่ยมเยือนบ้าง เพราะงั้นตามปกติแล้วก็ต้องเตรียม#nสิ่งของต่างๆ เอาไว้ให้พร้อมรับรองอย่างดีที่สุด"
1902-118 = "ที่สำคัญกว่านั้น รุ่นพี่มาโคโตะสั่งพวกเราว่า 'ให้ตรวจสอบอย่างละเอียดยิบ หาข้อผิดพลาดให้เจอ' ด้วยค่ะ"
1902-119 = "อะไรเนี่ย เรื่องแบบนี้มันต้องบอกกันด้วยรึไง?!"
1902-120 = "ช่างเถอะค่ะ อารมณ์มันพาไปน่ะ... ทำไมฉันต้องมาทำเรื่องแบบนี้ด้วยนะ เฮ้อ..."
1902-121 = "งั้นต่อไป..."
1902-124 = "..."
1902-126 = "(หลังจากนั้นอิโรฮะก็โยกย้ายและตัดงบประมาณของคณะกรรมการวินัยอย่างไร้ความปรานี)"
1902-128 = "นี่ด้วย นั่นด้วย โน้นด้วย..."
1902-129 = "ลด เปลี่ยน ลด ตัด ลด ตัดงบตรงนี้ด้วยค่ะ"
1902-130 = "!!!"
1902-131 = "... (ส่ายหน้า)"
1902-132 = "ไม่อยากจะเชื่อเลย! ฉะ... ฉันจะร้องเรียนเรื่องนี้แน่ๆ! "
1902-133 = "พูดแบบนั้นก็แย่สิคะ ฉันแค่มาทำงานนี้ตามหน้าที่เองนะ"
1902-134 = "ฉันไม่ได้มีเจตนาร้ายต่อคณะกรรมการวินัยนะคะ แค่ทำงานในฐานะผู้ดูแลระดับกลางก็เท่านั้น..."
1902-140 = "(หลังการตรวจสอบดำเนินไปประมาณ 3 ชั่วโมง)"
1902-142 = "ตอนนี้สรุปได้ว่า...งบประมาณการฝึกยุทธวิธีประมาณ 95% จะถูกจัดสรรใหม่นะคะ"
1902-143 = "นี่มันก็เป็นการบีบบังคับกันชัดๆ! ไม่เหลืองบสำหรับการฝึกเลยนี่!"
1902-144 = "ถ้าอย่างนั้นการฝึกครั้งถัดไปคงจะ..."
1902-145 = "ยังไม่หมดนะคะ..."
1902-149 = "ฮืม ฮืม~"
1902-150 = "อ๊ะ ตรงนั้น ระวังนะคะ...!"
1902-156 = "อิบูกิ...?!"
1902-157 = "อะ... อ๊าย! งือ..."
1902-158 = "ไม่เป็นไรนะ อิบูกิ! บาดเจ็บตรงไหนรึเปล่าคะ?!"
1902-159 = "เหมือนจะล้มไปแรงมากเลยนะ เป็นอะไรรึเปล่า?"
1902-160 = "ฮะ... ฮึ่ก... อิบูกิ มะ...ไม่เป็นไร... หรอก ฮะ... ฮือ..."
1902-164 = "นอกจากการปรับปรุงงบประมาณในครั้งนี้แล้ว ฉันจะสั่งระงับงบประมาณสำหรับการฝึกซ้อม#nในไตรมาสหน้าด้วยค่ะ"
1902-166 = "ว่าไงนะ?! ทำไมจู่ๆ ถึงทำแบบนี้ล่ะ?!"
1902-167 = "มีเหตุผลอะไรรึเปล่าคะ?"
1902-168 = "เพราะทำให้อิบูกิร้องไห้ยังไงล่ะ..."
1902-169 = "นี่มันเป็นข้ออ้างชัดๆ เลย!"
1902-170 = "เพราะอิบูกิเป็นคนสำคัญค่ะ"
1902-171 = "ว้าว... รุ่นพี่มาโคโตะก็พูดแบบนั้นอยู่ตลอดเหมือนกัน!"
1902-172 = "แต่ที่นี่คือสำนักงานนะ! มันก็ต้องมีของวางอยู่ทุกที่อยู่แล้วสิ!"
1902-173 = "ถ้ารู้ว่าพวกเราจะมาก็ควรจะต้องเก็บกวาดไว้แล้วสิคะ ถ้ารู้ว่าอิบูกิจะได้รับบาดเจ็บละก็..."
1902-174 = "รุ่นพี่มาโคโตะจะโมโหทันทีและพูดว่า 'ผู้ตรวจสอบได้รับบาดเจ็บเพราะขาดความเอาใจใส่'#nเพราะอย่างนั้นเราถึงได้มีการแจ้งล่วงหน้าไว้ก่อนยังไงล่ะคะ"
1902-175 = "ไม่ต้องพูดถึงครั้งหน้าแล้วละ เพราะพวกเราจะไม่มาที่นี่อีกแล้ว"
1902-176 = "ผะ... เผด็จการกันสุดๆ!"
1902-177 = "เราจะจัดสรรงบประมาณของคณะกรรมการวินัยในปีนี้ใหม่ กรุณาส่งเอกสารที่เกี่ยวข้องมาใหม่#nด้วยนะคะ"
1902-180 = "โฮะโฮะโฮะ อย่างนี้นี่เอง! อิโรฮะทำได้ดีมาก! การตรวจสอบเป็นไปด้วยดีสินะ!"
1902-181 = "คุณมาโคโตะ..."
1902-182 = "ตอนนี้เข้าใจแล้วรึยังล่ะว่าถ้าแพนเดโมเนียม โซไซตี้เอาจริงแล้วมันจะเป็นยังไง เจ้าหน้าที่อาวุโสอาโกะ"
1902-183 = "อึก..."
1902-184 = "เลิกต่อต้านอย่างไร้ความหมายได้แล้ว อามาอุ อาโกะ ถึงเวลาที่จะต้องรับรู้สถานะของตัวเอง#nกันบ้างแล้ว!"
1902-185 = "ว่าคณะกรรมการวินัยน่ะเป็นเพียงหมากในกำมือของเรา... แพนเดโมเนียม โซไซตี้!"
1902-186 = "จงยอมรับความยิ่งใหญ่ของเราแต่โดยดีซะเถอะ! จงยอมรับการอยู่ภายใต้อำนาจของเรา!"
1902-187 = "จงก้มหมอบคลาน ทำความเคารพเราดั่งสุนัขรับใช้ซะ!"
1902-188 = "ก็บอกว่าพวกเราแค่มาตรวจสอบเท่านั้นนะคะ..."
1902-189 = "จะยังไงก็เถอะ สรุปว่าจะมีการจัดสรรงบประมาณใหม่อีกครั้ง จากนี้จะเป็นขั้นตอนเกี่ยวกับ#nการบริหารจัดการ... พร้อมจะฟังหรือยังคะ"
1902-191 = "...วันนี้ก็เกิดเรื่องนี้ขึ้นอีกแล้ว..."
1902-192 = "(เหลือบมอง)"
1902-193 = "แล้ว... เกิดเรื่องอะไรขึ้นระหว่างที่ฉันไม่อยู่งั้นเหรอ..."
1902-194 = "เฮ้อ... เจ้าพวกทานูกินั่น... ถึงจะไม่ค่อยอยากเจอหน้าเท่าไร แต่คงไม่มีทางเลือกสินะ"
1902-195 = "ประธาน...?"
1902-196 = "ทะ... ท่านประธาน?"
1902-199 = "เดี๋ยวฉันมา"
1902-203 = "(หลังจากนั้นอาคารมุมหนึ่งสำนักงานใหญ่ของแพนเดโมเนียม โซไซตี้ก็ถูกถล่มจนพังยับเยิน#nจากระเบิดและกระสุนปริศนา โดยไม่ทราบตัวผู้ก่อเหตุแน่ชัด)"
1902-204 = "(และนั่นก็เป็นเรื่องราวที่เกิดขึ้นหลังจากนั้น...)"
1902-205 = "การตรวจสอบบัญชีนอกวาระ ของคณะกรรมการวินัย"

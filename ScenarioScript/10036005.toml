[translation]
10036005-1 = "Prologue"
10036005-4 = "Where is she? I know I saw her go this way."
10036005-5 = "Tch, that little rat...!"
10036005-11 = "Over there! Shoot her!"
10036005-17 = "NOW where'd she go?"
10036005-26 = "Guhhh..."
10036005-31 = "That's the last of them."
10036005-35 = "Now to take what I came for."
10036005-39 = "I've procured the information terminal. Here you are."
10036005-40 = "Whoa...! Yeah, this is it! I've finally got my hands on it!"
10036005-41 = "Heehee. Not bad, for a freelancer."
10036005-42 = "What's your secret?"
10036005-43 = "I don't have one."
10036005-48 = "I just did my homework, that's all."
10036005-49 = "Once you learn the guard shifts, the building layout, the enemy organization's internal conflicts, factions, and hierarchy, it's easy to get the job done."
10036005-50 = "Huh, you don't say...!"
10036005-51 = "Enough chit-chat. I'll take my commission now."
10036005-52 = "Ah, of course! Here, take it."
10036005-56 = "One, two, three... All right, it's all here."
10036005-57 = "Although..."
10036005-59 = "Hm? What's the problem? I gave you exactly what we both signed off on."
10036005-60 = "That's not the issue..."
10036005-65 = "(Minus the cost of equipment, ammo, and incidentals, this is pocket change. I'll barely be able to eat this week.)"
10036005-66 = "(I need a better-paying gig.)"
10036005-70 = "Huh, you don't look so good. You need more money?"
10036005-71 = "I can't give you a bonus or anything, but I can get you more work."
10036005-72 = "Oh?"
10036005-73 = "Yeah, you look like you can handle it. You interested?"
10036005-74 = "...Sure. Whatever pays the bills."
10036005-75 = "Good. All right, listen up."
10036005-76 = "They're about to hold the \"Helmet Gangster Grand Alliance Gathering.\""
10036005-77 = "...\"Grand Alliance Gathering\"?"
10036005-78 = "Yeah. It's hard to admit, me being an officer and all, but us Helmet Gangsters used to be little local gangs. Small fries."
10036005-79 = "That's all gonna change. We're coming together now, like one big united fist."
10036005-80 = "And that's good, 'cause we've got problems, like those hotheads breakin' out of the Corrections Bureau..."
10036005-81 = "*ahem* Anyway, back on topic..."
10036005-82 = "The \"Grand Alliance Gathering\" is gonna be this huge social event, with all the different chapters invited. Basically a festival."
10036005-84 = "You want me to work at a festival?"
10036005-85 = "That's right."
10036005-86 = "We got the most popular DJ in the Black Market for this thing, and they're gonna need a bodyguard-slash-assistant."
10036005-87 = "And I think you're the one for the job."
10036005-88 = "What do you say? You interested? Pay's good, I can tell you that."
10036005-89 = "An escort mission... I'm not exactly a professional bodyguard, but..."
10036005-90 = "...well, I don't have many options right now."
10036005-91 = "All right. I accept. Just tell me when and where."
10036005-92 = "Good call. It's gonna be in three days...at Outlaw Beach."
10036005-96 = "...Beach?"

[translation]
10036005-1 = "序幕"
10036005-4 = "逃哪去了？剛才明明還在這裡的啊！"
10036005-5 = "可惡，像老鼠一樣狡猾的傢伙……！"
10036005-11 = "在那裡！開槍！"
10036005-17 = "人呢？"
10036005-26 = "唔……"
10036005-31 = "……結束了嗎。"
10036005-35 = "去回收目標物吧。"
10036005-39 = "來，這就是你要的情報裝置。"
10036005-40 = "哦哦……！沒錯！就是這個！#n竟然真的拿到手了！"
10036005-41 = "原本還對自由接案的你沒抱什麼期望，沒想到結果這麼令人滿意。呵呵。"
10036005-42 = "有什麼成功的祕訣嗎？"
10036005-43 = "其實也沒什麼特別的。"
10036005-48 = "不過是堅持將任務徹底調查清楚的原則罷了。"
10036005-49 = "只要將敵人的位置、設施的構造……#n乃至於對方組織內部的矛盾和階級制度通通摸透，就能減少任務過程中的阻礙。"
10036005-50 = "哦哦，原來如此……！"
10036005-51 = "閒聊就先說到這裡吧。#n麻煩你支付委託的尾款。"
10036005-52 = "啊，當然當然！來，給你。"
10036005-56 = "一，二，三……嗯，確實收到了。"
10036005-57 = "不過……"
10036005-59 = "嗯？有什麼問題嗎？#n合約上寫的就是這個數字吧。"
10036005-60 = "啊，不是的，並不是委託費有問題。#n只是……"
10036005-65 = "（扣掉裝備、彈藥和固定成本後根本就沒賺多少錢……#n　就算努力節省餐費，這些錢大概也只夠撐一週左右……）"
10036005-66 = "（看來得找報酬更多的委託才行……）"
10036005-70 = "怎麼，你的臉色不太好啊。#n難道你很需要錢嗎？"
10036005-71 = "雖然我不能給你額外的報酬，但可以介紹新的工作給你。"
10036005-72 = "真的嗎？"
10036005-73 = "那當然。我是看在你事情處理得乾淨利落，覺得可以信任才告訴你的。#n有興趣嗎？"
10036005-74 = "……那就麻煩你了。#n我現在很需要錢。"
10036005-75 = "沒問題，那你聽好了。"
10036005-76 = "不久後將會舉辦一場「頭盔團聯歡會」。"
10036005-77 = "……「聯歡會」？"
10036005-78 = "沒錯，雖然我也是頭盔團的幹部之一……#n但說實話，以往的頭盔團只不過是個小打小鬧的鬆散組織罷了。"
10036005-79 = "然而那很快就會成為過去。#n我們今後將會強化組織的凝聚力，以壯大整體的力量為目標。"
10036005-80 = "畢竟最近有群危險的傢伙從矯正局越獄，導致不安因素急遽增加……"
10036005-81 = "咳哼，話題扯遠了，還是言歸正傳吧。"
10036005-82 = "「聯歡會」是所有頭盔團分部都會參加的大型聯誼活動……簡單來說就是一場慶典。"
10036005-84 = "慶典啊……那種地方有我能做的事嗎？"
10036005-85 = "當然有。"
10036005-86 = "我們為了這場慶典特地請來了黑市中最有名的DJ，#n所以需要有個人來擔任他的助手兼保鏢。"
10036005-87 = "我看你做起事來挺有一套，所以才考慮要不要把這件事交給你。"
10036005-88 = "怎麼樣？有興趣嗎？#n薪水很不錯哦。"
10036005-89 = "保鏢任務啊……我並不是很擅長保護別人……"
10036005-90 = "不，我現在的處境實在沒本錢挑工作。"
10036005-91 = "好，這個任務我接受了。#n告訴我時間和地點吧。"
10036005-92 = "很好，那就這麼說定了。#n時間是在三天之後，至於地點則是……「不法者海灘」。"
10036005-96 = "你說……海灘？"

[translation]
10036005-1 = "บทเริ่มต้น"
10036005-4 = "หายไปไหนแล้ว? เมื่อกี้ยังอยู่ตรงนี้อยู่เลย!"
10036005-5 = "โธ่เว้ย หนีไวเป็นบ้า...!"
10036005-11 = "อยู่ตรงโน้น! ยิงเลย!"
10036005-17 = "อยู่ไหนน่ะ?"
10036005-26 = "เอื้อกก..."
10036005-31 = "ปิดจ๊อบได้แล้วสินะ..."
10036005-35 = "งั้นขอรับของไปเลยก็แล้วกัน"
10036005-39 = "รับไปสิ นี่คือของที่เธอว่าจ้างให้ฉันไปหามา"
10036005-40 = "โอ้ว...! ใช่! ของชิ้นนี้ละ! ในที่สุดฉันก็ได้มันมาครองแล้วสินะ!"
10036005-41 = "ฉันไม่ได้คาดหวังอะไรมากเพราะเห็นว่าเธอเป็นแค่เด็กรับงานพาร์ทไทม์ แต่ก็ได้ผลลัพธ์ที่น่าพอใจเลยนะ ฮุฮุ"
10036005-42 = "มีเคล็ดลับอะไรในการทำงานเหรอ?"
10036005-43 = "ฉันไม่มีเคล็ดลับอะไรหรอก"
10036005-48 = "ก็แค่ยึดหลักการของตัวเองในการสืบหาและศึกษาข้อมูลเกี่ยวกับภารกิจให้ละเอียดน่ะ"
10036005-49 = "ถ้าได้วิเคราะห์ตำแหน่งศัตรู โครงสร้างของอาคาร ความขัดแย้งภายในองค์กรฝ่ายตรงข้าม รวมถึงแผนผังลำดับตำแหน่งของคนพวกนั้น ภารกิจก็สำเร็จได้ไม่ยากหรอก"
10036005-50 = "โอ้ว อย่างนี้สินะ...!"
10036005-51 = "หมดเวลาคุยแล้ว เธอต้องให้ค่าจ้างที่ฉันทำภารกิจสำเร็จตามที่สัญญาไว้"
10036005-52 = "อ๊ะ ฉันต้องให้แน่นอนอยู่แล้ว! นี่ไง รับไปสิ"
10036005-56 = "หนึ่ง สอง สาม... อืม ก็ครบอยู่หรอก"
10036005-57 = "แต่ว่า..."
10036005-59 = "หืม? มีปัญหาอะไรเหรอ? ฉันก็ให้ตรงตามที่ระบุในสัญญานะ"
10036005-60 = "มะ... ไม่หรอก ฉันไม่ได้มีปัญหากับเงินค่าจ้าง แต่ว่า..."
10036005-65 = "(ถ้าหักลบค่าอาวุธ ค่ากระสุน และค่าใช้จ่ายอื่นๆ ไป ก็คงเหลือไม่เท่าไร... ต่อให้ประหยัดค่าอาหาร แต่ฉันจะอยู่ได้ถึง 1 อาทิตย์มั้ยนะ...)"
10036005-66 = "(สงสัยต้องหาภารกิจที่ได้เงินดีกว่านี้แล้วละ...)"
10036005-70 = "อะไรกัน ทำไมสีหน้าไม่ดีเลย เธออยากได้ค่าจ้างมากกว่านี้ใช่มั้ยล่ะ?"
10036005-71 = "ฉันให้ค่าเหนื่อยจากภารกิจนี้เพิ่มไม่ได้หรอกนะ แต่ก็พอจะแนะนำงานใหม่ให้ได้"
10036005-72 = "จริงเหรอ?"
10036005-73 = "ใช่ พอเห็นว่าเธอทำภารกิจครั้งนี้ได้อย่างสมบูรณ์แบบ ฉันก็เลยเชื่อใจว่าจะจ้างงานเธอต่อได้น่ะ สนใจมั้ยล่ะ?"
10036005-74 = "งั้นฉันของานเพิ่ม... พอดีตอนนี้ฉันต้องการเงินน่ะ"
10036005-75 = "โอเค งั้นก็ตั้งใจฟังให้ดีละ"
10036005-76 = "เดี๋ยวจะมีการจัดงานของ <สหพันธ์แก๊งหมวกกันน็อก> ขึ้นในเร็วๆ นี้น่ะ"
10036005-77 = "<สหพันธ์แก๊งหมวกกันน็อก>...?"
10036005-78 = "ใช่ คนเป็นหัวหน้าแก๊งอย่างฉันจะมาพูดแบบนี้มันก็กระดากปากอยู่ แต่ที่ผ่านมาแก๊งหมวกกันน็อกเป็น#nแค่กลุ่มแก๊งย่อยๆ ที่ไม่ค่อยได้เรื่องได้ราว"
10036005-79 = "แต่จากนี้ไปจะไม่เป็นเช่นนั้นแล้ว เพราะพวกเราวางแผนที่จะพัฒนาความสามารถและขยายอำนาจใน#nฐานะองค์กรด้วย"
10036005-80 = "พวกตัวอันตรายที่เพิ่งหนีออกจากห้องคุมขังเมื่อไม่นานมานี้ก็ทำให้พวกเรากระสับกระส่ายกันไม่น้อย#nเลยด้วย..."
10036005-81 = "อะแฮ่ม ฉันพูดออกทะเลเกินไปแล้ว กลับเข้าเรื่องดีกว่า"
10036005-82 = "<งานสหพันธ์> ที่จะจัดขึ้นเป็นงานกระชับมิตรขนาดใหญ่ที่แก๊งหมวกกันน็อกย่อยทั้งหมดจะมารวมตัว#nกัน... พูดสั้นๆ ว่าเป็นงานเทศกาลของพวกเราก็ได้"
10036005-84 = "งานเทศกาลงั้นเหรอ... มีภารกิจอะไรให้ฉันทำในงานแบบนั้นกันล่ะ?"
10036005-85 = "ก็ต้องมีสิ"
10036005-86 = "เราได้ติดต่อดีเจที่มีชื่อเสียงที่สุดในตลาดมืดมาเพื่อสร้างความสนุกให้งานครั้งนี้ ก็เลยต้องการคนที่จะ#nมาเป็นผู้ช่วยและผู้คุ้มกันของเขาน่ะ"
10036005-87 = "ในเมื่อเธอทำภารกิจครั้งนี้มาได้อย่างสมบูรณ์แบบ ฉันก็เลยคิดว่าน่าจะเสนอภารกิจคุ้มกันดีเจคนนี้กับ#nเธอได้"
10036005-88 = "ว่าไงล่ะ? สนใจมั้ย? ค่าจ้างรายชั่วโมงก็น่าจะดีเลยด้วยนะ"
10036005-89 = "ภารกิจคุ้มกันงั้นเหรอ... แต่ฉันไม่คุ้นชินกับงานคุ้มกันเลย..."
10036005-90 = "ไม่สิ ตอนนี้ฉันจะมาเลือกงานอยู่ไม่ได้"
10036005-91 = "ก็ได้ ฉันจะรับภารกิจนี้ ขอรายละเอียดเรื่องเวลาและสถานที่ด้วย"
10036005-92 = "เยี่ยมเลย เธอคิดดีแล้วละ เทศกาลจะจัดในอีก 3 วันหลังจากนี้ และจะจัดขึ้นที่... <ชายหาดนอกกฎหมาย>"
10036005-96 = "ชายหาด... งั้นเหรอ?"

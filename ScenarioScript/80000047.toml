[translation]
80000047-1 = "#title;누군가를 위한 특별 앙케이트!"
80000047-2 = "#wait;1000"
80000047-3 = "3;시즈코;01;아! 선생님! 어서 오세요~! 백야당에 오신 걸 환영합니다! 데헷~!\n#3;em;[반응]\n#3;a"
80000047-4 = "3;시즈코;03;흐-흥~! 마침 시간에 딱 맞게, 늦지 않게 오셨네요! 장하다. 장해~!\n#3;hophop"
80000047-5 = "[s] \"뭐어, 시즈코가 중요한 부탁이 있다길래.\""
80000047-6 = "3;시즈코;02;후후후, 네. 그렇지 않아도 오늘은 발렌타인 데이잖아요?\n#3;em;[음표]"
80000047-7 = "3;시즈코;99;그걸 기념해서 오늘 오후부터, 저희 백야당에서도 특별 한정 디저트를 팔기로 했는데……."
80000047-8 = "3;시즈코;06;문제는 바로 그 한정 디저트의 메뉴를 뭘로 하는가예요.\n#3;em;[땀]\n#3;greeting"
80000047-9 = "[s] \"거기서부터 시작해야 하는 거야?\""
80000047-10 = "3;시즈코;05;핫?! 발렌타인 데이를 얕보면 안된다구요?!\n#3;em;[?!]\n#3;hophop"
80000047-11 = "3;시즈코;05;적당히 발렌타인 데이니까. 초콜릿이니까. 이 정도 메뉴로, 적당히 이렇게 하면 팔리는 거아냐? 라고 안일하게 접근했다가는…….\n#3;stiff"
80000047-12 = "3;시즈코;04;저희 백야당의 디저트를 사랑해주는 단골 손님은 물론, 평소 디저트에 깐깐하기 짝이 없는 자칭 <디저트 텐구>들에게 엉망진창으로 물어 뜯길지도 모른다고요?!\n#3;closeup"
80000047-13 = "3;시즈코;05;구체적으로 별점으로 돌아온단 말이죠! 요즘 같은 세상에는!\n#3;em;[!]\n#3;closeup\n#3;jump"
80000047-14 = "[s] \"헉, 그게 뭐야, 무서워?!\""
80000047-15 = "3;시즈코;01;그런 의미에서~ 자아, 여기 준비된 디저트가 있습니다~!\n#3;em;[음표]"
80000047-16 = "#st;[0,0];instant;1;"
80000047-17 = "#clearST"
80000047-18 = "3;시즈코;99\n#3;greeting\n#wait;1500"
80000047-19 = "3;시즈코;02;지금부터 차례차례 제가 엄선해서 준비한, 백야당의 발렌타인 데이 한정 디저트 후보 리스트를 내어 드릴 테니."
80000047-20 = "3;시즈코;03;맛보고, 어떤 것이 좋고, 어떤 것이 부족할지. 선생님의 적극적인 앙케이트! 받겠습니다!\n#3;em;[반짝]"
80000047-21 = "[s] \"오케이! 맡겨만 주라고!\""
80000047-22 = "#all;hide"
80000047-23 = "#na;(그리하여 시즈코에게 전폭적으로 협력하며 디저트 맛보기에 들어갔다.)"
80000047-24 = "#all;hide"
80000047-25 = "#na;(디저트 맛보기 행사의 전개는 그야말로 수라와도 같았다.)"
80000047-26 = "3;시즈코;05;이 디저트엔 어떤 맛을 더 더하는 게 좋을까요?!\n#3;em;[?]\n#3;greeting"
80000047-27 = "[s1] \"지금보다 더 달콤했으면 좋겠어.\"\n[s2] \"음, 지금보다 좀 더 짠맛이 있으면 좋을지도?\""
80000047-28 = "3;시즈코;01;흠흠, 과연 과연. 네 참고가 되었습니다.\n#3;em;[반응]"
80000047-29 = "3;시즈코;01;흠흠, 과연 과연. 네 참고가 되었습니다.\n#3;em;[반응]"
80000047-30 = "3;시즈코;00;그럼 다음으로 과자와 함께 덧붙일 음료에 관해서…….\n#3;hophop"
80000047-31 = "[s3] \"역시 여기엔 녹차지!\"\n[s4] \"역시 여기엔 홍차일까?\"\n[s5] \"역시 콜라는 옳아! 콜라 만세!\""
80000047-32 = "3;시즈코;04;과연……. 확실히 그런 느낌이 드네요!\n#3;stiff"
80000047-33 = "3;시즈코;04;과연……. 확실히 그런 느낌이 드네요!\n#3;stiff"
80000047-34 = "3;시즈코;04;과연……. 확실히 그런 느낌이 드네요!\n#3;stiff"
80000047-35 = "3;시즈코;01;좋습니다! 네! 채용하겠어요! 흐흥~!\n#3;em;[반짝]\n#3;greeting"
80000047-36 = "#all;hide"
80000047-37 = "#na;(약 1시간, 시즈코와 디저트 앙케이트를 마친 끝에)"
80000047-38 = "#all;hide"
80000047-39 = "3;시즈코;05;흠흠, 과연 그렇군요. 기호에 따라선 음료의 선택도 다양하게 충족시키는 게 좋고.\n#3;greeting\n#3;a"
80000047-40 = "3;시즈코;01;단순히 백야당의 시그니처를 표방한다고 화과자로만 한정하는 게 아니라, 양과자의 세련미도 쫓는다…….\n#3;em;[...]"
80000047-41 = "3;시즈코;02;여기선 좀 더 단맛으로, 여기선 좀 더 풍미를 잡아당기는 고소한 맛을 첨가하고……."

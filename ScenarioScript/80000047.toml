80000047-43 = "#clearST"
80000047-44 = "3;시즈코;02\n#3;greeting\n#wait;1500"
80000047-45 = "3;시즈코;03;네! 이걸로 다 됐습니다! 좋은 참고가 됐어요! 선생님! 세트 메뉴는 이것으로 완성이에요!\n#3;em;[반짝]\n#3;hophop"
80000047-46 = "#st;[0,0];instant;1;"

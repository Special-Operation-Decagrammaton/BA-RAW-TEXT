[translation]
80000047-1 = "แบบสำรวจพิเศษเพื่อใครบางคน"
80000047-3 = "อ๊ะ! คุณครู! เชิญเลยค่ะ~ ยินดีต้อนรับสู่ร้านเฮียกคิยาโคค่ะ! ฮิฮิ~!"
80000047-4 = "ฮื้อ~! มาตรงเวลา ไม่ช้าไม่เร็วเกินไปเลยนะคะ! เก่งมาก ดีมาก~!"
80000047-5 = "[s] \"ก็นะ ชิซุโกะบอกว่ามีเรื่องสำคัญที่จะขอให้ช่วยนี่นา\""
80000047-6 = "ฮิฮิฮิ ค่ะ... วันนี้เป็นวันวาเลนไทน์นี่นา"
80000047-7 = "ตั้งแต่ช่วงบ่ายเป็นต้นไป ร้านเฮียกคิยาโคของเราก็จะวางขายขนมชนิดพิเศษเพื่อฉลองวันวาเลนไทน์..."
80000047-8 = "แต่ปัญหาก็คือจะทำเมนูขนมชนิดพิเศษอะไรดีน่ะสิคะ"
80000047-9 = "[s] \"ต้องเริ่มจากตรงนั้นเลยเหรอ?\""
80000047-10 = "อ๊ะ?! ห้ามสบประมาทวันวาเลนไทน์เด็ดขาดเลยนะคะ?!"
80000047-11 = "ถ้าใช้แนวคิดง่ายๆ อย่าง \"วันนี้เป็นวันวาเลนไทน์ ก็ต้องเป็นช็อกโกแลตสิ จะขายไม่ได้เลยรึไง...\" แบบนี้ละก็... "
80000047-12 = "ก็อาจจะต้องมานั่งฟังคำบ่นของพวกลูกค้าประจำที่ชื่นชอบขนมหวานของร้านเรา หรือพวกลูกค้าทั่วไป#nที่ตั้งฉายาให้ตัวเองว่า <กูรูขนมหวาน> บ่นจนหูชาแน่ๆ ค่ะ!"
80000047-13 = "ถ้าทำแบบนั้นอาจโดนดูแคลนว่าเป็นร้านที่ไม่ดีก็ได้นะคะ! "
80000047-14 = "[s] \"เฮือก อะไรกันน่ะ น่ากลัวชะมัด!\""
80000047-15 = "เพราะงั้นแล้ว~ นี่ค่ะ ขนมหวานที่ฉันเตรียมเอาไว้~!"
80000047-19 = "ถ้างั้นตั้งแต่นี้ไปฉันจะเอาเมนูขนมหวานที่เป็นผู้ท้าชิงขนมหวานสุดพิเศษสำหรับเป็นขนมหวาน#nวันวาเลนไทน์ของเฮียกคิยาโคมาให้ชิมนะ"
80000047-20 = "คุณครูลองชิมดูว่าอันไหนดี อันไหนไม่ดี ฉันจะยอมรับแบบสำรวจรสชาติทั้งหมดของคุณครูเอง!"
80000047-21 = "[s] \"ได้เลย! ให้เป็นหน้าที่ครูเถอะ!\""
80000047-23 = "(จากนั้นคุณครูก็ให้ความร่วมมือกับชิซุโกะโดยการชิมขนมหวานอย่างดุเดือด)"
80000047-25 = "(เลเวลของการชิมขนมหวานของคุณครูดำเนินไปอย่างร้อนแรง)"
80000047-26 = "ขนมอันนี้ต้องเพิ่มรสอะไรลงไปดีคะ?!"
80000047-27 = "[s1] \"เพิ่มหวานกว่านี้อีกหน่อยดีกว่า\"\n[s2] \"อืม เพิ่มรสเค็มไปอีกนิดนึงดีมั้ย?\""
80000047-28 = "อืม... งั้นเหรอๆ โอเค ฉันจะจดไว้นะคะ"
80000047-29 = "อืม... งั้นเหรอๆ โอเค ฉันจะจดไว้นะคะ"
80000047-30 = "ถ้างั้นต่อจากขนมก็เป็นเครื่องดื่ม..."
80000047-31 = "[s3] \"ชาเขียวนี่แหละอร่อยเหาะ!\"\n[s4] \"ต้องกินกับชาเขียวสิ!\"\n[s5] \"โคล่านี่แหละเหมาะที่สุด โคล่าสุดยอด!\""
80000047-32 = "ว่าแล้วเชียว... ฉันเองก็คิดแบบนั้นเหมือนกันค่ะ!"
80000047-33 = "ว่าแล้วเชียว... ฉันเองก็คิดแบบนั้นเหมือนกันค่ะ!"
80000047-34 = "ว่าแล้วเชียว... ฉันเองก็คิดแบบนั้นเหมือนกันค่ะ!"
80000047-35 = "ดีล่ะ! ถ้างั้นก็เอาตามที่คุณครูบอกเลยค่ะ! ฮึฮืมมม~!"
80000047-37 = "(คุณครูใช้เวลาประมาณหนึ่งชั่วโมงก็ทำแบบสำรวจรสชาติกับชิซุโกะเสร็จ)"
80000047-39 = "อืมมม แบบนี้เองสินะคะ การมีเครื่องดื่มหลากหลายให้เลือกตามความชอบก็เป็นเรื่องที่ดี"
80000047-40 = "ไม่ได้จำกัดอยู่แค่ขนมหวานที่เป็นซิกเนเจอร์ของร้านเฮียกคิยาโคเท่านั้น แต่ก็มีความซับซ้อนของ#nรสชาติขนมตะวันตกด้วย..."
80000047-41 = "อันนี้เพิ่มรสหวานลงไป ส่วนอันนี้ก็ทำให้รสชาติเข้มข้นขึ้นอีก..."
80000047-45 = "ค่ะ! เท่านี้ก็เรียบร้อยแล้วค่ะ ได้ข้อมูลดีๆ เยอะเลยคุณครู! เท่านี้ก็ทำเมนูเสร็จแล้วค่ะ!"
80000047-50 = "[ns] \"อื้อ ค่อยยังชั่วหน่อยที่ครูช่วยได้\""
80000047-51 = "ฮิฮิ ช่วยได้เยอะเลยค่ะ"
80000047-52 = "เท่านี้ก็แก้ปัญหาเรื่องเมนูพิเศษวันวาเลนไทน์ได้แล้วค่ะ!"
80000047-53 = "[s] \"แต่ครูขอถามอะไรหน่อยสิ\""
80000047-54 = "คะ เรื่องอะไรเหรอคะ?"
80000047-55 = "หืม? แบบสำรวจรสชาติขนมนี่มีคุณครูทำแค่คนเดียวจะดีรึเปล่าน่ะเหรอคะ?"
80000047-56 = "อา... ระ... เรื่องนั้นน่ะ..."
80000047-57 = "ฮิฮิฮิ ฮ่าฮ่าฮ่า! ไม่เป็นไรหรอกค่ะ"
80000047-61 = "เซ็ตขนมพิเศษที่ขายที่ร้านเฮียกคิยาโคคราวนี้ มีความพิเศษมากๆ..."
80000047-62 = "ก็คอนเซ็ปต์ขนมของเราคือขนมที่ทุ่มเท เอาใจใส่ทำเพื่อใครบางคนไงล่ะคะ"
80000047-63 = "[s] \"หืม...?\""
80000047-64 = "เอาล่ะ! เลิกคุยเรื่องเล็กๆ น้อยๆ แล้วมาเปิดร้านกันเลยเถอะค่ะ!"

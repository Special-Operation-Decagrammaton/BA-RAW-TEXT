[translation]
80000047-1 = "特別的試吃大會"
80000047-3 = "啊，老師歡迎你來～！歡迎光臨百夜堂～！"
80000047-4 = "哼哼～！♪時間剛剛好，不愧是老師呢。真厲害！"
80000047-5 = "[s]「嗯，因為聽說有重要的請求。」"
80000047-6 = "呵呵呵……沒錯，正是如此。今天是情人節對吧？"
80000047-7 = "所以從今天下午開始，我們「百夜堂」也會販售特別的限定甜點！"
80000047-8 = "但問題是，我還不知道要賣什麼……"
80000047-9 = "[s]「啊，要從那裡開始啊。」"
80000047-10 = "是的，可不能小看情人節唷！"
80000047-11 = "要是抱持著情人節＝巧克力這麼單純的想法……"
80000047-12 = "別說是平時的常客們，就連對甜點有所講究的人們也會給出很辛辣的評價的啊！！"
80000047-13 = "而且最近還有個叫做「甜點天狗」的迷之集團，#n特別喜歡用美食評論家的觀點留下一些討厭的評論……！#n餐點固然重要，但評論的星數也是一樣的！"
80000047-14 = "[s]「真可怕……」"
80000047-15 = "所以，我準備的就是這些！"
80000047-19 = "接下來我會依序拿出我準備的甜點。"
80000047-20 = "希望老師一個個試吃後告訴我感想！"
80000047-21 = "[s]「嗯，交給我吧！」"
80000047-23 = "（於是便以協助靜子的形式，開始了甜點試吃大會）"
80000047-25 = "（這個試吃大會，比想像中還要熱烈……）"
80000047-26 = "這道甜點老師覺得如何呢？"
80000047-27 = "[s1]「我個人可能喜歡再甜一點？」\n[s2]「補充一點鹹味的話，說不定會比較不膩。」"
80000047-28 = "呼呣呼呣，原來如此原來如此……我明白了！"
80000047-29 = "呼呣呼呣，原來如此原來如此……我明白了！"
80000047-30 = "那麼接下來，搭配這份點心的飲料……"
80000047-31 = "[s3]「果然還是綠茶吧。」\n[s4]「配合味道搭配紅茶如何？」\n[s5]「可樂！肯定是可樂！可樂萬歲！」"
80000047-32 = "這樣啊……感覺確實如此！"
80000047-33 = "這樣啊……感覺確實如此！"
80000047-34 = "這樣啊……感覺確實如此！"
80000047-35 = "不錯呢，就這麼辦！"
80000047-37 = "（之後，持續吃了約一個小時的甜點……）"
80000047-39 = "原來如此……雖然不限於這個商品，但飲料的種類可能真的不太夠呢。"
80000047-40 = "而展現百夜堂的特色雖然重要，#n但果然不應侷限於和菓子，應該納入各式各樣的調味方式……"
80000047-41 = "這個要增加甜味，至於這個則要引出原本的風味……"
80000047-45 = "好，這樣就OK了！非常感謝老師，新商品完成了！"
80000047-50 = "[ns]「辛苦了，有幫上忙就好。」"
80000047-51 = "當然有囉，幫大忙了。"
80000047-52 = "這樣就完美了！"
80000047-53 = "[s]「話說有件事我有點在意。」"
80000047-54 = "嗯？什麼事呢？"
80000047-55 = "咦，只參考老師一個人的意見會不會有問題……？"
80000047-56 = "啊，啊……"
80000047-57 = "那當然囉……耶，耶嘿嘿！耶嘿嘿嘿嘿！"
80000047-61 = "該說這是限定版嗎……是為特別的、"
80000047-62 = "非常重要的人特別準備的東西。"
80000047-63 = "[s]「……？」"
80000047-64 = "好！閒聊結束！那麼現在開始，百夜堂要悄悄開始營業囉！"

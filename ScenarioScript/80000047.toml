80000047-49 = "#wait;2500"
80000047-50 = "[ns] \"응, 도움이 됐다면 다행이네.\""
80000047-51 = "3;시즈코;02;헤헤, 엄청 도움이 되었다고요?\n#3;em;[음표]\n#3;a"
80000047-52 = "3;시즈코;03;이것으로 이번 발렌타인 데이도 전혀 문제없겠네요!"
80000047-53 = "[s] \"근데 한 가지, 물어봐도 될까?\""
80000047-54 = "3;시즈코;01;네? 무엇인가요?\n#3;em;[?]"
80000047-55 = "3;시즈코;02;으응? 이번 이벤트에 있어서 선생님, 한 명만의 의견을 참고해도 과연 괜찮겠느냐고요?"
80000047-56 = "3;시즈코;06;아……. 그, 그건…….\n#3;stiff"
80000047-57 = "3;시즈코;01;에헤헷, 아하핫!! 그야……. 괘, 괜찮다구요? 그도 그럴게.\n#3;em;[반응]\n#3;hophop"
80000047-58 = "#st;[0,0];instant;1;"
80000047-59 = "#clearST"
80000047-60 = "3;시즈코;01\n#3;d\n#wait;1000"
80000047-61 = "3;시즈코;99;이번 백야당에서 판매하는 한정판 디저트 세트는, 누가 뭐라고 해도 어어어엄청나게 특별한……\n#3;closeup\n#3;a"
80000047-62 = "3;시즈코;01;누군가를 위해 전력을 다해서 준비한 물건이라는 컨셉이니까요.\n#3;em;[하트]\n#3;closeup\n#3;greeting"
80000047-63 = "[s] \"……응?\""
80000047-64 = "3;시즈코;03;자! 잡담은 끝! 그럼 지금부터 백야당! 개시하겠습니다!\n#3;em;[재잘]\n#3;hophop"

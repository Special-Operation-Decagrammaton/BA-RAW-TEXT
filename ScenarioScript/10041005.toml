[translation]
10041005-1 = "Prologue;Millennium Expo"
10041005-6 = "Look, Sensei. We're almost there."
10041005-7 = "It's been some time since I visited last. And that was for a meeting."
10041005-12 = "The school of science and technology..."
10041005-13 = "...Millennium Science School."
10041005-17 = "Thank you for coming along with me."
10041005-18 = "Not that I relish being in your debt..."
10041005-27 = "...but there was no other way. Nagisa would never have approved the trip, had I not brought you with me."
10041005-28 = "That conversation grew...rather heated before you arrived."
10041005-29 = "Therefore, I don't know how you see it, Sensei, but this is a \"trial\" for me."
10041005-30 = "For the others as well, perhaps, but especially for me."
10041005-36 = "We will see whether I, Yurizono Seia, can stand firm or not. This is a moment of truth..."
10041005-38 = "...and a way to prove myself."

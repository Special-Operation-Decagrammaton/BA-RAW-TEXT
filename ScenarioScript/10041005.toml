[translation]
10041005-1 = "序幕;千年博覽會"
10041005-6 = "你看那邊，老師。我們就快到了。"
10041005-7 = "總覺得好久沒有來到這裡了。#n上次來的時候，還是為了會談的事呢。"
10041005-12 = "科學與技術的學校……"
10041005-13 = "……「千年科學學園」。"
10041005-17 = "謝謝老師今天特地陪我過來。"
10041005-18 = "其實我本來也不希望用這種方式給老師添麻煩……"
10041005-27 = "但我實在別無選擇。#n如果不這麼做的話，渚是絕對不會允許我外出的。"
10041005-28 = "沒錯，光是有老師在我身邊……我就已經安心了不少。"
10041005-29 = "因此，雖然我不清楚老師的想法，但這對我來說是場「考驗」。"
10041005-30 = "除了他們兩人之外，也是我對自己的一場考驗。"
10041005-36 = "不僅是為了確認「百合園聖亞」能否獨當一面……"
10041005-38 = "……也是為了「證明」這一點。"

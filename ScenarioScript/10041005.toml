[translation]
10041005-1 = "บทเริ่มต้น;มิลเลเนียม เอ็กซ์โป"
10041005-6 = "ดูตรงนั้นสิคะ คุณครู เราใกล้ถึงกันแล้วค่ะ"
10041005-7 = "รู้สึกเหมือนไม่ได้มาที่นี่นานมากๆ เลย เมื่อก่อนฉันเคยมางานประชุมน่ะค่ะ"
10041005-12 = "ที่โรงเรียนแห่งวิทยาศาสตร์และเทคโนโลยีแห่งนี้..."
10041005-13 = "ที่ <โรงเรียนวิทย์มิลเลเนียม>..."
10041005-17 = "ขอบคุณที่สละเวลามาเหน็ดเหนื่อยกับฉันในวันนี้นะคะ"
10041005-18 = "พูดตามตรงว่าฉันไม่อยากติดหนี้บุญคุณใครแบบนี้..."
10041005-27 = "แต่มันก็ไม่มีหนทางอื่นแล้วค่ะ เพราะถ้าไม่ทำแบบนี้ นางิสะก็คงไม่อนุญาตให้ฉันออกมาข้างนอกหรอก#nค่ะ"
10041005-28 = "ค่ะ อย่างน้อยก็ก่อนที่คุณครูจะมา... ระหว่างพวกเราก็คุกรุ่นเลยละ"
10041005-29 = "เพราะงั้น คุณครูคะ ฉันไม่รู้หรอกนะคะว่าคุณครูจะคิดยังไง แต่สำหรับฉันแล้ว นี่คือ 'บททดสอบ' ค่ะ"
10041005-30 = "ไม่ใช่บททดสอบจากสองคนนั้น แต่อาจเป็นบททดสอบที่ฉันมีให้ตัวเองก็ได้"
10041005-36 = "บททดสอบเพื่อยืนยันและ 'พิสูจน์' ว่า <ยูริโซโนะ เซอา>..."
10041005-38 = "สามารถยืนหยัดได้ด้วยตัวเองค่ะ..."

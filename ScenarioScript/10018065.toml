[translation]
10018065-2 = "Ugh, dammit!"
10018065-7 = "Wahhh, that was so tough!"
10018065-8 = "Hmm..."
10018065-9 = "It seems Nyao Foods takes this Sparrow business more seriously than I thought."
10018065-14 = "What makes you say that?"
10018065-15 = "[s] \"They've gone through a lot of trouble for just a single restaurant.\""
10018065-19 = "...It's not Sparrow itself that matters, but its refusal to submit is a focal point."
10018065-20 = "Focal point?"
10018065-21 = "For those who don't want to join Nyao Foods..."
10018065-22 = "...it's become a bit of a rallying point."
10018065-23 = "Huh? The owner just wants to protect their business."
10018065-24 = "Yeah, and there are other owners thinking the same thing."
10018065-25 = "Regardless of the owner's intentions, the fact that Sparrow is still around..."
10018065-26 = "It's a bad look for Nyao Foods, and it encourages other businesses to resist the company."
10018065-27 = "And instead of a PR department, Nyao Foods has us."
10018065-28 = "It's our job to get rid of Sparrow in the most striking way possible."
10018065-29 = "It'll teach other business owners a lesson."
10018065-30 = "[s] \"And you're fine with that?\""
10018065-31 = "...Well, it's not exactly an airtight plan."
10018065-33 = "Then why follow such a maniac?"
10018065-35 = "'Cause I need to pay rent."
10018065-36 = "[s] \"Rent?\""
10018065-37 = "Right, we're not helping Nyao Foods, we're working for Nyao Foods."
10018065-38 = "Aside from the whole intimidation tactics thing, we get paid to collect, process, package, and distribute ingredients and products."
10018065-39 = "For the Gourmet Helmet Gangsters, Nyao Foods is just a job creator."
10018065-40 = "It's not like we're doing this for fun."
10018065-41 = "And it's not just us."
10018065-43 = "There are plenty of people who'll be better off working for Nyao Foods, including local shop owners."
10018065-49 = "What about the people who don't want that?"
10018065-50 = "Not my problem. I'm just doing my job."
10018065-51 = "[s] \"Is there any way we can negotiate?\""
10018065-52 = "...No idea. You'd have to speak with our employer directly."
10018065-53 = "But good luck finding out the location of Nyao Foods' headquarters!"
10018065-60 = "Oh, it's on their website."
10018065-61 = "Where?"
10018065-65 = "\"Nyao Foods' number one priority is to provide affordable and delicious food for the betterment of local communities. To visit us...\""
10018065-70 = "I don't get paid enough for this..."
10018065-75 = "Oh, they fled!"
10018065-76 = "Makes sense to me. ★"
10018065-81 = "Should we get going ourselves?"

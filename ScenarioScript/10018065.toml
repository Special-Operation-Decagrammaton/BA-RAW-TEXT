[translation]
10018065-2 = "嗚，該死……！"
10018065-7 = "唔啊～真累人呢！"
10018065-8 = "哼嗯……"
10018065-9 = "這麼看來，喵食品似乎比想像中還在意麻雀亭的存在呢。"
10018065-14 = "何以見得？"
10018065-15 = "[s]「不然你們也不會這麼執著於一間店吧。」"
10018065-19 = "……這點我並不否認。#n麻雀亭確實是個關鍵的角色。"
10018065-20 = "關鍵的角色？"
10018065-21 = "還有許多人不想加入喵食品的旗下。"
10018065-22 = "而麻雀亭的存在，正是將他們團結在一起的因素。"
10018065-23 = "哦？可是老闆娘只是想守護自己的店而已吧？"
10018065-24 = "雖然不知道老闆娘是怎麼想的，#n但很多店家都覺得「既然麻雀亭還在努力，那就不能認輸」。"
10018065-25 = "無論這是不是老闆娘的初衷，但事實就擺在眼前──"
10018065-26 = "只要麻雀亭還存在，這些不願意歸順喵食品的人就會繼續留下來。"
10018065-27 = "會長他……喜歡大場面。"
10018065-28 = "所以現在正在思考該如何以最引人注目的方式，施行剷除麻雀亭的計畫。"
10018065-29 = "違逆我們會落得什麼下場，用麻雀亭來殺雞儆猴再適合不過了。"
10018065-30 = "[s]「你們真的認為這麼做是正確的嗎？」"
10018065-31 = "……不認為，但我們別無選擇。"
10018065-33 = "那為何要追隨那種人呢？這樣不是很奇怪嗎？"
10018065-35 = "我們也要餬口啊。"
10018065-36 = "[s]「餬口？」"
10018065-37 = "你們知道喵食品讓多少人有工作嗎？"
10018065-38 = "從收集食材、加工，一直到擺放在店鋪前的一系列工作都需要人手。"
10018065-39 = "你說的那些工作都被饕餮頭盔團包辦了吧。"
10018065-40 = "沒錯。但我們也不是喜歡才這麼做的。"
10018065-41 = "不僅僅是我們。這個商店街的人也一樣。"
10018065-43 = "加入喵食品並不是什麼壞事。#n有些人反而覺得是件好事。"
10018065-49 = "但是……不想加入的人又該怎麼辦？"
10018065-50 = "這與我無關。我只是聽從上面的指示而已。"
10018065-51 = "[s]「不能透過協商來解決嗎？」"
10018065-52 = "……我不知道。#n你們要是真想這麼做的話，不如直接找他本人談談吧。"
10018065-53 = "但前提是你們得先知道總公司的位置！"
10018065-60 = "啊，找到官網了。"
10018065-61 = "我來看看。"
10018065-65 = "「喵食品今天也為了提供物美價廉的食物，不分日夜地全力以赴。地址是……」"
10018065-70 = "隨你們高興吧……"
10018065-75 = "啊，逃走了！"
10018065-76 = "看來事情的全貌漸漸浮出水面了呢★"
10018065-81 = "我們也開始行動吧？"

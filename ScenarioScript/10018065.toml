[translation]
10018065-2 = "บะ... บ้าชะมัด...!"
10018065-7 = "ว้า~ เหนื่อยจังเลย!"
10018065-8 = "หืม..."
10018065-9 = "ดูเหมือนว่าทางเนียวฟู้ดจะเอาจริงกับร้านซุซุเมะมากกว่าที่คิดนะคะ"
10018065-14 = "ทำไมถึงคิดแบบนั้นล่ะ?"
10018065-15 = "[s] \"ไม่งั้นก็คงไม่ลงแรงกับร้านค้าเล็กๆ ร้านเดียวแบบนี้หรอก\""
10018065-19 = "ที่พูดมาก็ไม่ผิดหรอก... ร้านซุซุเมะน่ะเป็นร้านศูนย์กลางนี่นา"
10018065-20 = "ร้านศูนย์กลางงั้นเหรอคะ?"
10018065-21 = "เหล่าผู้คนที่ไม่อยากตกอยู่ภายใต้อำนาจของเนียวฟู้ด"
10018065-22 = "ร้านซุซุเมะน่ะ ทำหน้าที่เป็น \"ศูนย์กลาง\" ในการรวมคนพวกนั้นเอาไว้น่ะสิ"
10018065-23 = "เอ๋? เจ้าของร้านแค่อยากรักษาร้านของตัวเองเอาไว้เองนะ?"
10018065-24 = "คนที่คิดแบบนั้นน่ะ ไม่ได้มีแค่เจ้าของร้านคนนั้นคนเดียวสักหน่อย"
10018065-25 = "เจ้าของร้านคนนั้นจะตั้งใจหรือไม่ตั้งใจก็ตาม แค่การที่ร้านซุซุเมะทู่ซี้ยืนหยัดอยู่แบบนี้น่ะ"
10018065-26 = "มันแสดงให้เห็นว่ามีคนที่ไม่ต้องการเข้าร่วมกับเนียวฟู้ดอยู่ยังไงเล่า"
10018065-27 = "ท่านประธาน... เป็นคนที่ชอบใช้กลวิธีเชิงรุกน่ะ"
10018065-28 = "เพราะงั้นไม่ว่ายังไง เขาจะต้องใช้ทุกวิธีเพื่อกำจัดร้านซุซุเมะอย่างแน่นอน"
10018065-29 = "เพื่อเป็นตัวอย่างให้กับพวกคนที่ยังดื้อด้านอย่างเจ้าของร้านซุซุเมะ เป็นการเชือดไก่ให้ลิงดูไงล่ะ"
10018065-30 = "[s] \"วิธีแบบนั้น... คิดว่ามันโอเคจริงๆ เหรอ?\""
10018065-31 = "...ฉันก็ไม่ได้คิดว่ามันโอเคเท่าไหร่หรอก"
10018065-33 = "แล้วทำไมถึงยอมเป็นลูกน้องคนแบบนั้นล่ะ? เพี้ยนรึเปล่า?"
10018065-35 = "เพราะเขา... ให้งานพวกเราทำน่ะสิ"
10018065-36 = "[s] \"งานเหรอ?\""
10018065-37 = "คิดว่าใครทำงานให้ทางเนียวฟู้ดอยู่ล่ะ?"
10018065-38 = "ตั้งแต่การรวบรวมวัตถุดิบ ขนส่ง แพ็กสินค้าและส่งจำหน่ายตามร้านต่างๆ มันเป็นงานที่ต้องใช้คนเยอะ#nมากเลยไม่ใช่รึไง?"
10018065-39 = "งานพวกนั้น... เขาเสนอให้พวกคุณทำสินะคะ"
10018065-40 = "ชิ... พวกเราทำเพราะอยากทำซะที่ไหนล่ะ"
10018065-41 = "ไม่ใช่แค่พวกเรานะ คนที่ย่านการค้านี้ก็เหมือนกันนั่นแหละ"
10018065-43 = "แน่นอนว่าก็มีคนที่อยากทำงานกับทางเนียวฟู้ดจริงๆ อยู่ด้วยเหมือนกัน"
10018065-49 = "แต่ว่า... แล้วคนที่ไม่อยากทำแบบนั้นล่ะคะ? "
10018065-50 = "จะไปรู้ได้ยังไงเล่า ฉันก็แค่ทำตามที่ผู้ว่าจ้างสั่งมาก็เท่านั้น"
10018065-51 = "[s] \"ไม่มีทางที่จะประนีประนอมกันได้เลยเหรอ?\""
10018065-52 = "...จะไปรู้ได้ยังไงเล่า ถ้าอยากรู้ขนาดนั้นละก็เข้าไปคุยเองเลยสิ"
10018065-53 = "แต่จะทำได้ก็ต่อเมื่อพวกเธอรู้ที่อยู่สำนักงานใหญ่ก่อนนะ!"
10018065-60 = "อ๊ะ มีเขียนอยู่ในหน้าเว็บไซต์ด้วยค่ะ "
10018065-61 = "ไหนๆ"
10018065-65 = "'เนียวฟู้ดพยายามอย่างหนักทั้งวันทั้งคืนเพื่อส่งมอบอาหารที่รสชาติอร่อย และมีคุณภาพให้กับทุกคน' 'วิธีเดินทางมาสำนักงานใหญ่...'"
10018065-70 = "อยากจะมุดดินหายไปเลยจริงๆ..."
10018065-75 = "อ๊ะ หนีไปแล้ว!"
10018065-76 = "แต่ฉันเข้าใจความรู้สึกของเขานะคะ★"
10018065-81 = "ถ้างั้นพวกเราก็ไปกันเลยมั้ยคะ?"

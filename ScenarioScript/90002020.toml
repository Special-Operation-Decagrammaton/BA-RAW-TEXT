[translation]
90002020-1 = "第2話; 運輸船"
90002020-3 = "各位乘客，大家好。我是各位的主駕駛，同時也是機長的飛鳥馬季。"
90002020-4 = "我們目前正位於雲層上之對流層頂約8公里高空，航線狀況一切運作正常。"
90002020-5 = "我們即將抵達目的地鋼鐵大陸，為預防突發亂流，請各位務必繫好安全帶，"
90002020-6 = "並將桌子豎直後收回原位。"
90002020-7 = "咦？好像沒有…… 桌子吧？"
90002020-8 = "我知道。我只不過是隨口說說罷了。"
90002020-9 = "呵呵。季機長意外地很愛開玩笑呢！ "
90002020-10 = "而我是負責操作與飛行輔助的明星陽葵♪"
90002020-11 = "雖然過程有點驚險，不過應該能按照預定時間順利抵達。"
90002020-12 = "大家心情如何？尤其是和那個時候相比。"
90002020-18 = "那時候飛得太高，反而沒有翱翔天際的感覺……"
90002020-19 = "……現在…… 真的有彷彿在空中飛翔的感覺。耶嘿嘿……"
90002020-21 = "雖說原先是因為需要才坐上副駕駛的位置，不過真的有必要增加這個職務嗎？會長？"
90002020-22 = "不管怎麼說還是有點沒有效率吧……"
90002020-23 = "這樣才比較合理。英美。 "
90002020-24 = "人員的增加意味著要顧慮的事也變多，所以有必要減輕季的負擔。"
90002020-25 = "不過因為我是完美的女僕，自己一個人也完全沒有問題的。莉央會長。"
90002020-26 = "百密必有一疏的。必須預防所有的變數。"
90002020-27 = "既然如此，我明白了。莉央會長。"
90002020-29 = "就算是這樣……太厲害了，莉央前輩！這艘運輸船，太驚人了！"
90002020-31 = "這是我第一次……可，可以完整看到內部構造……"
90002020-32 = "唔~嗯。原本還想一個個仔細參觀的。"
90002020-33 = "這也沒辦法，姐姐……你也知道目前的情況。"
90002020-39 = "是的，唔。駕駛艙一出去就是大廳。感覺是名副其實的公共空間？"
90002020-43 = "說實話好像比我房間乾淨……"
90002020-44 = "……麻煩你打掃一下吧。"
90002020-45 = "沒錯……我深刻體會到打掃的重要性。"
90002020-46 = "噗哈！？"
90002020-47 = "哇……這句話居然從你口中說出……"
90002020-50 = "某種意義來看，這裡是整艘運輸船最脆弱，卻也是最重要的空間。"
90002020-51 = "是的，這裡有直接通往外部的艙門，還有掉落裝置…… 也有 [ruby=Drop Pod]投放艙[/ruby]。"
90002020-52 = "帶來的AMAS也都正在機庫內配置吧？話說回來，好像看到不知名的……圓錐形？看到那種模樣的構造體？"
90002020-53 = "那是……"
90002020-54 = "……什麼都沒有。"
90002020-55 = "嘿…"
90002020-56 = "引擎聲音安靜得驚人……"
90002020-57 = "沒錯……甚至讓人覺得如果發生什麼事還可以躲在這裡……"
90002020-58 = "不過如果真的發生什麼事，這裡也是最危險的吧……？"
90002020-65 = "[ns1]「說實話，也太厲害了吧。」\n [ns2]「莉央，你是什麼時候準備的？」"
90002020-68 = "也不是什麼大不了的事。只不過是把千年發展至今的技術活用創造出來的。"
90002020-69 = "把想像得到的事情用研究加以實現……總會有辦法的。"
90002020-70 = "真正的難題是研究那些無法想像的事情。"
90002020-71 = "確實如此呢。能夠想像得到的事物，代表已有些蛛絲馬跡。"
90002020-72 = "困難的是…… 那些未曾想像過的事，卻突然蹦一下就把結果擺在眼前。"
90002020-73 = "[s]「有這種事？」"
90002020-74 = "當然。在研究超微觀世界或超宏觀世界時，經常會發生這種情況。"
90002020-75 = "就以重力為例吧。我們雖然都是與重力共生，但作為其根源存在的重力子的情況──"
90002020-76 = "卡，卡！莉央會長，說到這裡就好！你時不時就開始進行專業解說會被大家討厭喔！？"
90002020-77 = "是，是嗎？"
90002020-78 = "但是……已經習慣被討厭了……"
90002020-80 = "你接這種話要我們怎麼辦……"
90002020-85 = "……看來需要轉換一下氣氛。目前航線如何，季？"
90002020-87 = "目前沒有任何問題。鋼鐵大陸的訊號也逐漸增強。"
90002020-88 = "不過由於訊號過於強大，可能會導致難以確定著陸地點吧。"
90002020-90 = "咦？不能隨便找個地方著陸嗎？"
90002020-92 = "不建議這個想法，桃井。如果往防空系統完善的區域飛會出大事。"
90002020-93 = "嗯，這艘運輸船主要用於運輸與研究用途，所以防禦性能方面不太好。"
90002020-95 = "更何況是面對鋼鐵大陸…… 也就是名為「涅察赫」的第七位預言者。"
90002020-96 = "我們所具備的常識極有可能派不上用場。"
90002020-97 = "是的，事實上現在必須高空飛行還是低空飛行，都很難做出判斷。"
90002020-99 = "所以選擇藏身於濃厚的雲層之中，這樣至少能干擾可見光線、紅外線以及部分探測電波。"
90002020-100 = "……不過我們也因此難以用肉眼確認鋼鐵大陸的樣貌。"
90002020-102 = "我們無法提前偵測到「涅察赫」嗎？"
90002020-104 = "因為這次算是偷偷潛入。如果隨意發射電波，反而可能會招惹更大的麻煩。"
90002020-105 = "而且就如果剛才所說，訊號過於強大也引發了另一個問題。"
90002020-106 = "感測到的所有訊號，最後都會被歸為同一個來源。等於沒有了分析的意義。"
90002020-107 = "[s]「所以…… 結論是什麼？」"
90002020-108 = "……"
90002020-110 = "……"
90002020-111 = "大概也就只能小心翼翼地前進了。"
90002020-112 = "哇，居然就直接這樣說出來，季……"
90002020-113 = "有什麼問題嗎？"
90002020-114 = "……沒有。沒問題。"
90002020-115 = "雖然越來越混亂……說起來有點牽強，總之目的地……"
90002020-121 = "似乎即將抵達目標大陸。開始慢慢降低高度吧。"
90002020-133 = "哇啊！？"
90002020-134 = "什，什麼？季！？"
90002020-135 = "異常反應！是極其巨大的……質量體！"
90002020-136 = "具體說的話，是巨無霸機械手臂！"
90002020-137 = "訊號分析成功。是第九個預言者……「耶索德」！"
90002020-139 = "耶索德！？"
90002020-145 = "哇啊啊啊啊！？"
90002020-146 = "呃啊啊啊啊！？"
90002020-152 = "哇啊啊啊啊……！"
90002020-153 = "那，那是什麼啊啊啊啊！！！"
90002020-154 = "噫，噫噫……！呃呃……！！！"
90002020-156 = "大家快抓緊能抓的東西！受損情況報告！"
90002020-159 = "受損情況報告。引擎損壞。主引擎輸出尚可維持。輔助引擎多數嚴重損壞。"
90002020-160 = "引擎發生火災。啟動滅火裝置。"
90002020-165 = "高度與機體平衡無法維持…… 會長！再這樣下去……！"
90002020-166 = "要墜落了！"
90002020-171 = "引擎的火勢呢？狀況如何！"
90002020-172 = "已成功撲滅火勢！但外側火勢無法撲滅！"
90002020-173 = "進行引擎逆向噴射直到臨界點為止！"
90002020-177 = "執行引擎逆向噴射直至臨界點。啟動緊急迫降程序。即將與地面衝撞！"
90002020-191 = "[ns]「大家沒事吧！？」"
90002020-192 = "啊啊啊啊……眼冒金星……不對，還是地在旋轉……"
90002020-193 = "不過幸好有繫安全帶……"
90002020-194 = "必須靠著一個輪子站立的我才更辛苦吧……"
90002020-195 = "比，比起這個……這裡，是哪裡啊……？看起來不像傳聞中的鋼鐵大陸啊……？"
90002020-196 = "應該是鋼鐵大陸外圍殘存的地形。 "
90002020-197 = "在我們降落鋼鐵大陸的前一刻，遭受耶索德巨大的…… 機械手臂攻擊。"
90002020-199 = "結果就是被迫在這裡緊急迫降。"
90002020-212 = "又，又怎麼了！？"
90002020-213 = "雷達偵測到大量敵對勢力！季，連接外部攝影機！"
90002020-214 = "進行畫面輸出。"
90002020-229 = "當時種子保管所……在提法瑞特的種子保管所襲擊我們的那些個體。"
90002020-230 = "我們被包圍了！再這樣下去……！"
90002020-231 = "別擔心，莉央前輩！就由愛麗絲在這裡保護大家！"
90002020-236 = "啊，啊啊……！"
90002020-237 = "愛麗絲醬！？"
90002020-242 = "……"
90002020-243 = "遊戲開發部！準備出動！"
90002020-245 = "姐姐！"
90002020-246 = "我，我們嗎……？"
90002020-248 = "沒錯！不能全部交給愛麗絲一個人吧？我去去就回，老師！"
90002020-254 = "我，我知道了！姐姐真的是……"
90002020-255 = "一個人……為了大家…… 大家……為了一個人……"
90002020-260 = "等等，各位！"
90002020-261 = "[s]「……」"
90002020-263 = "[ns]「英美，遊戲開發部的孩子們交給你了。」"
90002020-264 = "咦？我？"
90002020-265 = "……"
90002020-266 = "知道了，老師。儘管交給我吧。"
90002020-272 = "[ns]「莉央和季，請努力修好運輸船。」"
90002020-273 = "嗯？呃……嗯。我知道了，"
90002020-274 = "開始行動吧。莉央會長。目前需要緊急處理的應該是引擎。"
90002020-276 = "我們沒事要做嗎？"
90002020-277 = "[s]「Kei和陽葵……先待命！」"
90002020-278 = "哎呀，難道老師是不信任我們嗎？"
90002020-279 = "啊哈。是指有人必須要負責應對整體狀況的意思吧。既然如此，好，我明白了。"
90002020-287 = "嗚哇，真的看不到盡頭！"
90002020-288 = "但是絕不能就此退縮！不管怎樣都要守護老師和大家！"
90002020-293 = "大家往後退一點。桃井跟我一起去吧。"
90002020-297 = "咦……？"
90002020-298 = "這個聲音是……英美！"
90002020-299 = "大家好。受老師之託來幫忙了。最前線就交給我跟桃井。"
90002020-300 = "愛麗絲在後方火力支援。也就是砲兵戰力。"
90002020-301 = "綠擔任指定射手。柚子擔任榴彈手。隊形中央就麻煩了。"
90002020-302 = "老師……收到！我知道了！拜託你了，英美！"
90002020-303 = "沒錯，盡全力試試看吧。"
90002020-305 = "沒，沒問題嗎？"
90002020-313 = "唔嗯，"
90002020-314 = "這點程度應該可以成功解決啦。"

[translation]
90001250-1 = "第25話;無法預測之物"
90001250-2 = "為什麼那兩個人會在這裡──！？"
90001250-3 = "總，總之得先確認到底是不是他們！"
90001250-4 = "其，其中一個我不太確定……但另一個肯定沒錯……！"
90001250-10 = "真的假的……？"
90001250-11 = "「無名諸神的王女」AL-1S……那些人好像稱他叫「愛麗絲」。"
90001250-12 = "那，那個……「無名諸神的王女」這個頭銜，聽起來好像有點危險耶……？"
90001250-13 = "啊，你說的對。#n抱歉，Ain。"
90001250-15 = "但不管怎麼看……都是他沒錯吧？"
90001250-16 = "可，可可可可，可是怎麼會呢……#n我們居然一直都沒有察覺到……怎麼會這樣？"
90001250-17 = "不，不管是才羽桃井、才羽綠，還是花岡柚子……明明都在我們的掌控之中啊……？"
90001250-19 = "雖然只是推測而已，不過應該是因為這個吧。"
90001250-26 = "……是指那個嗎？#n雖然只是根據現實狀況得到的結論。"
90001250-27 = "……大概吧。"
90001250-28 = "「無名諸神的鑰匙」……"
90001250-29 = "不知道發生了什麼事，外觀竟然變成那個樣子。"
90001250-30 = "看起來最近才被重新組裝過。#n不過這個品味……到底是誰做的啊……"
90001250-32 = "這，這這這這這，這已經……到了無法原諒的地步……！"
90001250-33 = "雖然不知道是誰，但我一定要讓他向組成那具身體的金屬和其他材料道歉！！！"
90001250-34 = "冷靜，Ain。#n我明白你的心情，但你先冷靜一點……"
90001250-36 = "如果那兩個人真的在那裡……"
90001250-44 = "……那他們能突破重圍也不奇怪了。"
90001250-45 = "可是，為什麼我們之前完全沒有觀測到任何動靜……？"
90001250-46 = "會不會就是因為……那個「鑰匙」呢？"
90001250-47 = "那，那個王女……我聽說他放棄了……自身存在的意義。"
90001250-61 = "確實是這樣沒錯。#n也就是說，那個王女還不知道完整掌握「禁忌之力」的方法。"
90001250-62 = "然而要是他有一把知道方法的鑰匙，情況就另當別論了。"
90001250-63 = "由此可以得到一個結論──那個鑰匙確實記得禁忌之力的使用方法。"
90001250-65 = "是，是啊……#n假如他不知道的話……早就被我們偵測到了……"
90001250-66 = "……作戰，要重新擬定嗎？"
90001250-67 = "應該……是必要的吧？"
90001250-68 = "那，那該從哪裡開始著手呢……？"
90001250-74 = "Ain？Soph？Aur？#n提法瑞特傳來了求助訊息，希望能徵求我們的意見。"
90001250-75 = "咦咦！？提法醬嗎……？"
90001250-76 = "這個情況，總覺得有點讓人頭痛呢。#n基本上我還是想以現場的判斷為準……"
90001250-77 = "不，我覺得沒那麼簡單。#n方法這種東西，提法瑞特應該也早就考慮過了才對。"
90001250-78 = "那是什麼意思……？"
90001250-79 = "……！#n難道說！？"
90001250-80 = "嗯，是啊。"
90001250-81 = "現在的提法瑞特真正需要的，應該是某種許可……不，是「決斷」和「鼓勵」才對。"
90001250-83 = "[ns]「總算通過隧道了呢。」"
90001250-84 = "嗯……而且這裡好像到處都長滿了苔蘚。"
90001250-85 = "感覺……有種青草的香味，很好聞……"
90001250-89 = "果然還是不太可能完全與外界隔絕。"
90001250-90 = "如果外界的濕氣和植物像這樣繼續入侵的話，環境可能會變得不太適合保存種子。"
90001250-91 = "又或者……這個程度的變數，本來就在他的設想之中。"
90001250-93 = "前面好像還有一扇關著的門。#n那裡會不會就是最重要的種子保管室呢？"
90001250-94 = "去看看就知道了。#n不過在那之前，我們先稍微休息一下如何。"
90001250-95 = "贊成！我的腳也開始痠了。"
90001250-97 = "愛麗絲知道！#n這裡就是打最終BOSS前的存檔點對吧！"
90001250-102 = "（稍微清理了一下苔蘚，騰出可以休息的空間）"
90001250-105 = "（或許是因為太累的關係，遊戲開發部的孩子們接連開始打盹）"
90001250-109 = "……"
90001250-110 = "[ns]「怎麼了，Kei？一直盯著苔蘚看。」"
90001250-111 = "嗯？沒，沒什麼。我只是……"
90001250-112 = "……"
90001250-113 = "突然聊這個可能有點突兀，不過所謂的生命究竟是什麼呢。"
90001250-114 = "哎呀，怎麼突然好奇這個呢，Kei？"
90001250-115 = "其實也沒什麼……"
90001250-116 = "只是看著它們突破銅牆鐵壁深入這裡……#n在如此惡劣的環境與嚴格的管控中依然生氣勃勃的樣子，突然有感而發而已。"
90001250-117 = "你是說苔蘚嗎？"
90001250-118 = "是啊。苔蘚是種約於四億年前出現，相當原始的植物。"
90001250-119 = "不過撇開這個事實不談，我突然意識到……生命原來是這麼不完美的存在啊。"
90001250-120 = "生命是如此脆弱、自我中心，而且完全不可預測。"
90001250-122 = "你的意思是生命很「任性」嗎？"
90001250-123 = "這個嘛……或許是吧。"
90001250-124 = "你說到重點了呢，Kei。#n生命的核心，恰恰就在於那隨心所欲、不受拘束的本質啊。"
90001250-125 = "舉例來說，邏輯電路是沒辦法憑直覺產生隨機亂數的對吧？"
90001250-126 = "……呿。"
90001250-128 = "[ns]「那是什麼意思，陽葵？」"
90001250-129 = "亂數的概念，其實比想像中更為複雜。#n事實上，電腦無法真正生成所謂的亂數。"
90001250-130 = "我們常見的「隨機」，其實都不是完全任意出現的值。"
90001250-131 = "沒錯。基本上都是經過特定方法計算而來，#n或者設定以毫秒為單位不斷變動的數值作為初始值……"
90001250-132 = "再經過一連串的計算，讓結果看起來像是隨機生成的而已。#n這就是所謂的偽亂數。"
90001250-133 = "想要生成真正的亂數，就必須輸入外來的資料。"
90001250-134 = "通常我們不會依靠手動輸入，而是測量自然界的隨機性後，將其轉換成亂數來使用。"
90001250-135 = "[s] 「原來如此……？」"
90001250-136 = "我在想，會不會生命的可能性──正是由這種機率、偶然與非線性所構成呢？"
90001250-137 = "也就是那些被你稱之為「任性」的部分。"
90001250-138 = "……所以說白了就是既不可控又無法預測嘛。#n我就是討厭這樣。"
90001250-139 = "不過你想想看……假如我們真的能掌控或預測一切的話，Kei也不會復活了吧？"
90001250-140 = "話題為什麼會扯到那裡去啊。"
90001250-141 = "Kei會僅僅因為「我就是想這麼做」而留下可能威脅自己存亡的決定性變數嗎？"
90001250-142 = "那種東西當然要立刻消除……"
90001250-146 = "啊。"
90001250-147 = "沒錯，我想說的就是這個。#n雖然生命充滿不確定性又恣意妄為……"
90001250-148 = "但也正因如此，才擁有了更多的可能性。"
90001250-149 = "生命就這樣在不經意間，不斷地拓展基因的多樣性。"
90001250-150 = "……也在無形之中留下了無可限量的機會。"
90001250-151 = "你的意思是試圖用計算和預測掌控一切，反而會縮限生存的可能性嗎？"
90001250-152 = "嗯，某方面可以這麼說吧？"
90001250-153 = "我一直都對「一切都能計算或預測」的觀點本身抱持懷疑的態度。#n比如量子穿隧效應不就是最好的例子嗎？"
90001250-155 = "……"
90001250-156 = "其實那屬於微觀領域的問題……"
90001250-157 = "然而那同樣也是確實存在的領域。"
90001250-158 = "而且請看。縱使撇開那些數理論點不談……#n你不覺得這些苔蘚光是存在在這裡，就已經夠可愛、夠可貴了嗎？"
90001250-159 = "……"
90001250-160 = "就像Kei之前說的一樣，每顆種子都蘊藏著各式各樣的可能性。"
90001250-161 = "……早知道我就不說那句話了。"
90001250-162 = "[ns1]「雖然聽不太懂，但我可以肯定一件事！」\n[ns2]「那就是Kei醬是害羞鬼！」"
90001250-165 = "不，不要再捉弄我了啦！"
90001250-167 = "我們就先從大前提開始說起吧。"
90001250-168 = "他們是生命體，而我們與提法瑞特則並非如此。"
90001250-169 = "此外，凡是有生命的東西都有極限──這是不言自明的事實。"
90001250-170 = "所以我們要攻破他們的極限！"
90001250-171 = "該，該怎麼做呢……？"
90001250-172 = "舉例來說……！"
90001250-174 = "……哦哦。"
90001250-175 = "那，那那那那那，那個方法有點……！"
90001250-176 = "但是肯定有效，不是嗎？"
90001250-177 = "是是是，是這樣沒錯……！"
90001250-178 = "就算用了那個方法，也傷不了鑰匙一分一毫吧……？"
90001250-179 = "雖然我覺得要是只剩下鑰匙自己，應該也做不了什麼就是了。"
90001250-180 = "會不會，就連那個王女也毫髮無傷……？"
90001250-182 = "……不會完全毫髮無傷的。#n現在的王女已經不一樣了。"
90001250-183 = "如果要用我們的方式來形容的話……他和平常相比，輸出功率有所減弱。"
90001250-184 = "以現在的程度來看，我們應該有辦法應付才對。#n這個方法我贊成。"
90001250-186 = "姐，姐姐，姐姐大人……怎麼看呢……？"
90001250-190 = "……"
90001250-191 = "Ain、Soph、Aur。#n我認為「必要之惡」的概念，有時對生命來說是不可或缺的。"
90001250-192 = "比如我聽說那個世界，有「天敵」這樣的存在。"
90001250-193 = "雖然乍看之下，是被捕食的一方單方面受害……"
90001250-194 = "然而如果少了「天敵」這個概念，整個生態系就會無法維持下去。"
90001250-196 = "啊，那個我也知道！#n如果狼都消失，只剩下鹿不斷繁殖的話，牠們的棲息地就會變成一片荒土！"
90001250-197 = "Soph對這種知識還真了解啊……"
90001250-198 = "是，是又怎樣，難道不行嗎？"
90001250-199 = "我也沒有那個意思啦。#n只是那也是我討厭生命體的原因之一而已。"
90001250-200 = "一個存在本身就必然帶有矛盾的系統，實在不太符合我個人的喜好……"
90001250-201 = "唔嗯……"
90001250-203 = "那麼Ain、Soph、Aur。#n既然已經決定好了，就把我們的想法傳達給提法瑞特吧。"
90001250-204 = "其實提法瑞特應該早已做出了客觀的判斷，只是可能也想參考其他節點的意見而已。"
90001250-205 = "哦……這麼聽起來，它是不是有點想分攤責任的意思？#n哎呀哎呀，提法瑞特也挺精明的嘛！"
90001250-206 = "你就非得解釋得這麼扭曲嗎……"
90001250-207 = "我，我覺得，沒關係……#n這樣我們就能幫上提法醬的忙了，對吧……？"
90001250-209 = "是啊。至少在那位大人名下──"
90001250-213 = "我們已經是一體的了。"
90001250-215 = "下一話;隱藏之物"

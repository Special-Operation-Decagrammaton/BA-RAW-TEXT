[translation]
90001250-1 = "Episode 25;The Unpredictable"
90001250-2 = "What are THOSE TWO doing here?!?!"
90001250-3 = "E-Everyone calm down! We need to verify if this is real first!"
90001250-4 = "O-One of them is unconfirmed, but the other one!"
90001250-10 = "Seriously...?"
90001250-11 = "The princess of the Nameless Gods, AL-1S...or \"Aris,\" as they call her."
90001250-12 = "U-Um... \"Princess of the Nameless Gods\" sounds really s-scary and dangerous, so..."
90001250-13 = "Ah, yes. My apologies, Ein."
90001250-15 = "Whatever we call her, that's absolutely, definitely her, no?"
90001250-16 = "B-B-B-B-But how...? All this time...n-none of us noticed?"
90001250-17 = "W-We already knew of...S-Saiba Momoi, Saiba Midori, and Hanaoka Yuzu...but not her?"
90001250-19 = "Now, this is pure speculation, but a worthwhile speculation, nonetheless."
90001250-26 = "...I agree. It has to be \"that,\" right?"
90001250-27 = "...Right?"
90001250-28 = "The key of the Nameless Gods..."
90001250-29 = "But...why does she look like that?"
90001250-30 = "While it does look hastily assembled, I must agree. What horrendous design!"
90001250-32 = "Th-Th-Th-Th-Th-This is...! U-U-Unforgivable...!"
90001250-33 = "The b-b-barbarian that made it must bow down and apologize to the metals, and all other materials, they used to create that...that...that th-thing!"
90001250-34 = "Calm down, Ein. Your feelings are absolutely valid, but you should still calm down."
90001250-36 = "Their presence..."
90001250-44 = "It's the missing puzzle piece we've been searching for, the answer to the riddle of their power."
90001250-45 = "But how did they stay hidden all this time?"
90001250-46 = "B-Because of that...key?"
90001250-47 = "T-To my understanding, the princess r-renounced her fate..."
90001250-61 = "Precisely. Which would lead one to believe that \"princess\" would be wholly unable to harness the Forbidden Power."
90001250-62 = "However, if the key were to unlock it for her... Well, that's a whole different issue."
90001250-63 = "The only rational conclusion is that the key remembers how to utilize the Forbidden Power."
90001250-65 = "Y-Yes...because they wouldn't have been able to hide from us...if they didn't know how..."
90001250-66 = "...I suppose we need to make a new plan?"
90001250-67 = "We...have to, right?"
90001250-68 = "Wh-Where do we even start?"
90001250-74 = "Ein? Sof? Ohr? Tiphareth requires aid. It is requesting counsel."
90001250-75 = "Wh-What?! Tiphy is...?"
90001250-76 = "What a headache. Usually, we should prioritize managing field operations, but..."
90001250-77 = "No, no. Tiphareth doesn't require our commands. It likely already has a plan it intends to pursue."
90001250-78 = "Th-Then what...?"
90001250-79 = "...! Do you mean...?!"
90001250-80 = "Yes, yes. Naturally."
90001250-81 = "Tiphareth searched not for command, but approval. Rather...for resolve. For courage."
90001250-83 = "[ns] \"We finally made it through.\""
90001250-84 = "Seriously...and straight into a room full of moss."
90001250-85 = "It's...sort of nice... It smells like grass."
90001250-89 = "I suppose the expectation that it would have been perfectly maintained all these years was a bit much. "
90001250-90 = "Allowing any outside vegetation or moisture inside would have negatively impacted the preservation of the seeds stored here."
90001250-91 = "Or perhaps...they anticipated this level of variable from its conception."
90001250-93 = "Is that door locked as well? Maybe it's a preservation room for the very important seeds."
90001250-94 = "We will only know once we investigate. However, I believe for right now, a respite is in order."
90001250-95 = "Completely on board with that! My legs hurt! "
90001250-97 = "I know what this is! There is always a save point before the final boss!"
90001250-102 = "I helped clear out some of the moss so everyone could have a spot to rest."
90001250-105 = "It didn't take long for the exhausted Game Development Department members to doze off."
90001250-109 = "..."
90001250-110 = "[ns] \"What's wrong, Kei? You're just staring at moss.\""
90001250-111 = "H-Huh? Nothing. It's nothing."
90001250-112 = "..."
90001250-113 = "Well. Um. This may seem like an unexpected topic, but I can't help but wonder what life is?"
90001250-114 = "Oh my. What brought this about, Kei?"
90001250-115 = "Nothing in particular."
90001250-116 = "I was simply observing the tenacity with which it has grown in the harsh environment of this facility."
90001250-117 = "You mean the moss?"
90001250-118 = "Yes. Moss is an ancient plant that first appeared somewhere around 400 million years ago."
90001250-119 = "But aside from the factual aspects of things, I have been beginning to feel that life is...wholly imperfect."
90001250-120 = "It's fragile, self-centered, and unpredictable."
90001250-122 = "It's erratic, in a way, isn't it?"
90001250-123 = "...Well, I suppose."
90001250-124 = "That's a keen observation, Kei. In fact, that erraticism is the very essence of life."
90001250-125 = "After all, a logic circuit cannot instinctively select a random number, no?"
90001250-126 = "...Tch."
90001250-128 = "[ns] \"What do you mean by that, Himari?\""
90001250-129 = "Randomness is a much more complicated concept than you'd expect. In fact, it's impossible for a computer to come up with an entirely random number."
90001250-130 = "Any \"randomness\" you see in society is not nearly as arbitrary as it seems."
90001250-131 = "As she said. A computer will still need to go through very specific calculations or utilize values that change by the millisecond to select a random number."
90001250-132 = "That's why it is more commonly called a \"pseudorandom\" number. Because, in reality, its simply a series of precise calculations that make it seem random."
90001250-133 = "To create an actual random number, the computer would require external input."
90001250-134 = "However, it would defeat the purpose to have people inputting random numbers. And so, we apply methods that measure natural randomness and then convert it to a \"random\" number."
90001250-135 = "[s] \"I see...?\""
90001250-136 = "And I believe that these probabilities, coincidences, and nonlinearities are the embodiment of the potential behind life."
90001250-137 = "Its erraticism, to be precise."
90001250-138 = "...Well, to be precise, that's what I don't like. It fundamentally can't be controlled or predicted."
90001250-139 = "But you know what, Kei? If everything in life was perfectly controlled and predicted, you would have never been revived."
90001250-140 = "How so?"
90001250-141 = "Consider this. If you identified a potentially threatening variable, what would you do? Would you leave it be, simply because you desire to?"
90001250-142 = "Desire has no role here. Something of that nature would have to be eradicated—"
90001250-146 = "Ah."
90001250-147 = "You see. Life may be erratic and uncertain..."
90001250-148 = "...but it is precisely those qualities that bolster the many branches of possibilities life holds."
90001250-149 = "And without even realizing it, life also diversifies its genetic pool in this way."
90001250-150 = "...Which then creates more and more possibilities."
90001250-151 = "You mean to say that precise calculations and predictions are, in reality, harmful to survival?"
90001250-152 = "Yes. Depending on your perspective."
90001250-153 = "I believe the better, primary question to ponder is if such calculations are even possible. If you factor quantum tunneling into the equation..."
90001250-155 = "..."
90001250-156 = "A story from a micro realm..."
90001250-157 = "But that realm clearly exists, does it not?"
90001250-158 = "And setting aside calculations and science, don't you think these adorable clumps of moss are worthy of praise simply for being here?"
90001250-159 = "..."
90001250-160 = "After all, Kei, each seed holds within it the potential to blossom into a plant or a tree, right?"
90001250-161 = "...I should not have said that..."
90001250-162 = "[ns1] \"There's only one thing I know for sure!\"\n[ns2] \"And that's that Kei-Kei is shy!\""
90001250-165 = "S-Stop making fun of me!"
90001250-167 = "Let me summarize."
90001250-168 = "They're living beings. We're not. Neither is Tiphareth."
90001250-169 = "The evident truth here is that all living beings have a limit."
90001250-170 = "So we should take advantage of those limits!"
90001250-171 = "H-How...?"
90001250-172 = "For example...!"
90001250-174 = "...Hm."
90001250-175 = "Th-Th-Th-Th-Th-Th-That's a bit...!"
90001250-176 = "A bit! But also very effective, isn't it?"
90001250-177 = "Th-Th-Th-That's true, but still...!"
90001250-178 = "E-Even if we were to try that, wouldn't the key be unaffected?"
90001250-179 = "A key is useless without a lock to unlock!"
90001250-180 = "B-But the princess... The princess could come out unscathed too, couldn't she?"
90001250-182 = "...No, she won't. Because of what she's become."
90001250-183 = "Compared to usual... Simply put, her output will likely decrease."
90001250-184 = "That decrease would be enough for our purposes, yes? I support this plan."
90001250-186 = "Wh-What about you, Elder Sister... What do you think?"
90001250-190 = "..."
90001250-191 = "Ein, Sof, and Ohr. I can say only that, oft times, within evil lies rationale for necessity."
90001250-192 = "To elaborate, there exists the beings they call \"predators\" in this world."
90001250-193 = "To the prey consumed, it is deemed cruel. Unusual."
90001250-194 = "However, lacking the existence of such a \"predator,\" the system itself crumbles to dust."
90001250-196 = "Ah, I know about that! Basically, if there's a lot of deer, but no wolves to eat them, the vegetation and land would all die!"
90001250-197 = "And there goes Sof, with her...surprising knowledge of such things."
90001250-198 = "What do you mean? Are you trying to say that's a bad thing?"
90001250-199 = "No, no, no. It's simply the embodiment of my disdain for living beings."
90001250-200 = "A system that necessarily contains contradictions in order to exist. It's utterly distasteful."
90001250-201 = "Ugh..."
90001250-203 = "Therefore, Ein, Sof, and Ohr. If this is the conclusion you desire, let us relay it to Tiphareth."
90001250-204 = "Naturally, Tiphareth possesses its own will and simply desires input and approval from other nodes."
90001250-205 = "Oh? To me, it would appear that it's attempting to divvy up accountability! Hah! Our Tiphareth is a cunning one!"
90001250-206 = "What goes on in your mind to have such twisted interpretations of others' intentions...?"
90001250-207 = "I-I'm okay with it. After all, that m-means we can help Tiphy, right?"
90001250-209 = "You are correct. For, under our master's name..."
90001250-213 = "...we are already one."
90001250-215 = "Next Episode;What Was Hidden"

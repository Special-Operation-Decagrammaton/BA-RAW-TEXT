[translation]
90001250-1 = "ตอนที่ 25;สิ่งที่คาดเดาไม่ได้"
90001250-2 = "ทำไมสองคนนั้นถึงมาอยู่ที่นี่ล่ะคะ?!?!"
90001250-3 = "กะ... ก่อนอื่นเราต้อง... ตรวจสอบก่อนว่ามันคือเรื่องจริงหรือเปล่า!"
90001250-4 = "คะ... คนหนึ่งยังไม่แน่... แต่อีกคนฉันมั่นใจค่ะ...!"
90001250-10 = "จริงเหรอเนี่ย...?"
90001250-11 = "<ท่านธิดาแห่งทวยเทพไร้นาม> หรือก็คือ AL-1S... แต่คนพวกนั้นเรียกว่า 'อาริสึ' ค่ะ"
90001250-12 = "อะ... เอ่อ... ชื่อ <ท่านธิดาแห่งทวยเทพไร้นาม> ฟังดูค่อนข้างอันตราย... เลยนะคะ...?"
90001250-13 = "อ่า นั่นสินะคะ ขอโทษนะคะ ไอน์"
90001250-15 = "แต่ถึงยังไงก็...? ใช่ใช่มั้ย?"
90001250-16 = "ตะ.... ตะตะตะ... แต่ว่าทำไม... ที่ผ่านมาเราถึงไม่สังเกตเห็นเลย... ล่ะคะ?"
90001250-17 = "ทะ... ทั้งไซบะ โมโมอิ ไซบะ มิโดริ ฮานาโอกะ ยูสึ... เราก็วิเคราะห์ได้ทั้งหมดแล้วนี่...?"
90001250-19 = "ฉันขอเดานะคะ บางทีอาจจะเป็นเพราะสิ่งนี้ก็ได้ค่ะ"
90001250-26 = "นั่นน่ะ... หมายถึงอันนั้นน่ะเหรอ...? ถึงจะเดาจากสถานการณ์จริงก็เถอะ"
90001250-27 = "อาจจะนะคะ...?"
90001250-28 = "<กุญแจของเหล่าทวยเทพไร้นาม>..."
90001250-29 = "เกิดเรื่องอะไรขึ้น ถึงได้อยู่ในสภาพแบบนั้นนะ"
90001250-30 = "เหมือนเพิ่งถูกประกอบขึ้นใหม่เมื่อไม่นานมานี้เลยค่ะ แต่ว่า... ใครกันนะที่มีเซนส์ในการออกแบบ#nแบบนั้น..."
90001250-32 = "นะ... นะนะนะนะนะ... นี่มัน...! เป็นอะไรที่ยกโทษให้ไม่ได้เลยค่ะ...!"
90001250-33 = "ถึงจะไม่รู้ว่าเป็นฝีมือของใคร แต่คนคนนั้นก็ควรขอโทษต่อโลหะและวัสดุอื่นๆ ที่เป็นส่วนประกอบของ#nร่างกายนั้นค่ะ!!!"
90001250-34 = "สงบสติอารมณ์ก่อน ไอน์ ฉันเข้าใจนะ แต่ตอนนี้ต้องใจเย็นก่อน..."
90001250-36 = "ถ้าสองคนนั้นอยู่ที่นั่นละก็..."
90001250-44 = "ฉันเข้าใจแล้วค่ะว่าผ่านสถานการณ์นั้นมาได้ยังไง..."
90001250-45 = "ว่าแต่ทำไมพวกเราถึงไม่เคยสังเกตเห็นมาก่อนเลยล่ะ...?"
90001250-46 = "น่าจะเป็นเพราะกุญแจนั่น... นะคะ?"
90001250-47 = "ตะ... แต่ฉันรู้มาว่า... คนที่ได้ชื่อว่าท่านธิดา... ละทิ้งความหมายของตัวตน... ของตัวเองไปนะคะ"
90001250-61 = "คงเป็นอย่างนั้นอย่างไม่ต้องสงสัยเลยค่ะ และนั่นก็หมายความว่าท่านธิดาคนนั้นไม่รู้วิธีใช้ 'พลังต้องห้าม' อย่างเต็มที่ด้วยค่ะ"
90001250-62 = "แต่ถ้ามีกุญแจที่จดจำวิธีการนั้นได้ ก็จะเป็นอีกเรื่องหนึ่ง"
90001250-63 = "และเพราะอย่างนั้น เราจึงสรุปได้ว่ากุญแจนั้นจำวิธีการใช้พลังต้องห้ามได้อยู่อย่างแน่นอน"
90001250-65 = "นะ... นั่นสินะคะ... เพราะถ้าจำวิธีการใช้พลังไม่ได้... ก็คงหลบการตรวจจับของเราไม่ได้ด้วยค่ะ..."
90001250-66 = "แบบนี้เราต้อง... วางแผนปฏิบัติการใหม่หรือเปล่าคะ?"
90001250-67 = "ก็คง... จำเป็นเลยละ"
90001250-68 = "ตะ... ต้องเริ่มจากตรงไหนก่อนดีคะ...?"
90001250-74 = "ไอน์ ซอฟ ออร์ ทิฟาเร็ธขอความช่วยเหลือเข้ามาค่ะ เห็นว่าอยากได้ความคิดเห็นน่ะค่ะ"
90001250-75 = "คะ... คะ?! ทิฟาจังเหรอคะ...?"
90001250-76 = "เริ่มปวดหัวแล้วสิ ที่จริงฉันก็อยากให้เน้นที่การตัดสินใจจากหน้างานหรอกนะ..."
90001250-77 = "ไม่หรอกค่ะ ฉันว่าไม่ใช่อย่างนั้นหรอก ทิฟาเร็ธคงคิดหาวิธีไว้แล้วน่ะค่ะ"
90001250-78 = "หมายความว่าอะไรคะ...?"
90001250-79 = "หรือว่า...?!"
90001250-80 = "ค่ะ เป็นอย่างนั้นละค่ะ"
90001250-81 = "สิ่งที่ทิฟาเร็ธต้องการในตอนนี้คือการอนุญาต... ไม่สิ 'การตัดสินใจ' และ 'การให้กำลังใจ' ค่ะ"
90001250-83 = "[ns] \"ในที่สุดเราก็ผ่านอุโมงค์มาได้แล้วสินะ\""
90001250-84 = "ค่ะ... แล้วที่แห่งนี้ก็มีมอสส์ขึ้นอยู่ทั่วเลยนะคะ"
90001250-85 = "ได้กลิ่นเหมือนหญ้าเลย... ดีจังเลยค่ะ..."
90001250-89 = "การดูแลที่นี่ให้สมบูรณ์แบบคงเป็นเรื่องยากนะคะ "
90001250-90 = "การมีความชื้นจากภายนอกและมีพืชขึ้นในลักษณะนี้ คงไม่ใช่สภาพแวดล้อมที่ดีในการเก็บเมล็ดพันธุ์#nเท่าไรค่ะ"
90001250-91 = "หรือไม่ก็... อาจเป็นไปได้ว่ามีการสันนิษฐานถึงตัวแปรแบบนี้เอาไว้แล้วตั้งแต่แรก"
90001250-93 = "มีห้องที่ประตูปิดไว้ด้วย? เป็นห้องเก็บเมล็ดพันธุ์ที่สำคัญหรือเปล่านะ?"
90001250-94 = "ลองไปดูเดี๋ยวก็คงจะรู้ค่ะ แต่ฉันขอเสนอให้เราพักผ่อนกันสักครู่ได้มั้ยคะ?"
90001250-95 = "เห็นด้วย! ขาของฉันก็เริ่มจะปวดแล้ว "
90001250-97 = "อาริสึรู้ดีค่ะ! นี่คือเซฟพอยต์ก่อนถึงบอสตัวสุดท้ายสินะคะ!"
90001250-102 = "(คุณครูปัดกวาดมอสส์เพื่อให้มีพื้นที่พักผ่อน)"
90001250-105 = "(เด็กๆ ชมรมพัฒนาเกมคงจะเหนื่อยกันมาก ก็เลยเริ่มสัปหงกกัน)"
90001250-109 = "..."
90001250-110 = "[ns] \"เป็นอะไรหรือเปล่า เคย์? เห็นจ้องมอสส์อยู่ตั้งนานแล้ว\""
90001250-111 = "คะ? มะ... ไม่ค่ะ ฉันก็แค่..."
90001250-112 = "..."
90001250-113 = "ฉันรู้ว่ามันแปลกที่จู่ๆ ฉันก็พูดแบบนี้ แต่ชีวิต... คืออะไรเหรอคะ?"
90001250-114 = "ตายจริง จู่ๆ เป็นอะไรไปคะ เคย์?"
90001250-115 = "เปล่าหรอกค่ะ ก็แค่..."
90001250-116 = "ฉันคิดว่ามันน่าทึ่งที่ได้เห็นพวกเขาที่พยายามเติบโตท่ามกลางสภาพแวดล้อมที่โหดร้ายในสถานที่#nที่มีการควบคุมแบบนี้น่ะค่ะ"
90001250-117 = "หมายถึงมอสส์เหรอ?"
90001250-118 = "ใช่ค่ะ มอสส์เป็นพืชดึกดำบรรพ์ที่มีมาตั้งแต่ประมาณ 400 ล้านปีก่อนแล้ว"
90001250-119 = "แต่นอกเหนือจากข้อเท็จจริงนั้นแล้ว ฉันก็ยังรู้สึกว่าชีวิตช่างเป็นสิ่งที่ไม่สมบูรณ์แบบค่ะ"
90001250-120 = "ชีวิตเป็นสิ่งที่เปราะบาง เอาตัวเองเป็นศูนย์กลาง และคาดเดาไม่ได้"
90001250-122 = "จะบอกว่าสิ่งมีชีวิตเป็นสิ่งที่ทำตามใจคิดสินะคะ?"
90001250-123 = "ก็... จะว่าอย่างนั้นก็ได้ค่ะ"
90001250-124 = "เป็นมุมมองที่ดีเลยนะคะ เคย์ เพราะแก่นแท้ของชีวิตอยู่ที่ 'การทำตามใจคิด' นั่นละค่ะ"
90001250-125 = "ก็อย่างเช่น การที่เราสร้างลอจิกเกตจากตัวเลขสุ่มที่ขึ้นอยู่กับสัญชาติญาณไม่ได้ยังไงล่ะคะ"
90001250-126 = "ชิ..."
90001250-128 = "[ns] \"หมายความว่ายังไงเหรอ ฮิมาริ?\""
90001250-129 = "ตัวเลขสุ่มเป็นแนวคิดที่ยากกว่าที่คิดค่ะ และในความเป็นจริงคอมพิวเตอร์ก็สร้างตัวเลขสุ่มไม่ได้"
90001250-130 = "ค่า 'สุ่ม' ที่เราเห็นกันบ่อยๆ นั่นน่ะ ไม่ได้เป็นค่าสุ่มที่แท้จริงหรอกนะคะ"
90001250-131 = "ใช่แล้วละ ปกติแล้วจะเริ่มจากการคำนวณด้วยวิธีที่กำหนดไว้ หรือไม่ก็ใช้ค่าที่เปลี่ยนไปทุกๆ หน่วยมิลลิวินาทีเป็นค่าเริ่มต้น "
90001250-132 = "จากนั้นก็ผ่านกระบวนการคิดคำนวณอีกหลายขั้นตอน แล้วทำให้มนุษย์เห็นว่าเป็นค่าที่สุ่มขึ้นมา แบบนี้เรียกว่าการสุ่มแบบเทียมน่ะ"
90001250-133 = "ถ้าจะสร้างตัวเลขสุ่มอย่างแท้จริง ก็ต้องมีการป้อนข้อมูลจากภายนอก"
90001250-134 = "โดยปกติแล้วแทนที่จะให้มนุษย์ป้อนตัวเลขสุ่ม เราจะใช้วิธีการวัดความสุ่มตามธรรมชาติแล้วแปลงให้#nเป็นตัวเลขสุ่มแทนค่ะ"
90001250-135 = "[s] \"อย่างนี้สินะ...?\""
90001250-136 = "และฉันก็คิดว่าความน่าจะเป็น ความบังเอิญ และระบบที่ไม่เป็นเชิงเส้นเหล่านี้คือความเป็นไปได้ของ#nสิ่งมีชีวิตค่ะ"
90001250-137 = "ส่วนที่บอกว่าทำตามใจคิดนั่นละค่ะ"
90001250-138 = "โดยพื้นฐานแล้วมนุษย์ก็เลยควบคุมไม่ได้... แล้วก็คาดเดาไม่ได้ด้วยค่ะ นี่ละสิ่งที่ฉันไม่ชอบ"
90001250-139 = "แต่ถ้าพวกเราเป็นสิ่งที่ควบคุมและคาดเดาได้ เคย์ก็คงฟื้นคืนชีพมาไม่ได้นะคะ?"
90001250-140 = "ทำไมถึงเข้าเรื่องนี้ล่ะคะ?"
90001250-141 = "ถ้าเคย์เจอสิ่งที่คิดว่าจะมาคุกคามตัวเอง แล้วเคย์จะคิดว่า 'อ๋อ อย่างนั้นเหรอ' แล้วปล่อยตัวสิ่งนั้นไป#nหรือเปล่าคะ?"
90001250-142 = "ก็ต้องกำจัดให้เรียบอยู่แล้ว..."
90001250-146 = "อ่า..."
90001250-147 = "ค่ะ ก็อย่างนั้นละค่ะ สิ่งมีชีวิตเป็นสิ่งที่ไม่แน่นอนและทำตามใจคิด..."
90001250-148 = "แต่เพราะเป็นอย่างนั้น พวกเราถึงขยายขอบเขตความเป็นไปได้ที่เราเลือกได้"
90001250-149 = "และด้วยวิธีนี้ สิ่งมีชีวิตจึงเพิ่มความหลากหลายทางพันธุกรรมโดยที่ตัวเองก็ไม่รู้ตัวค่ะ"
90001250-150 = "และสุดท้ายแล้วจะทำให้เกิดโอกาสในชีวิตเพิ่มมากขึ้นด้วย..."
90001250-151 = "จะบอกว่าการคำนวณและคาดการณ์ทุกอย่างอาจเป็นการลดความเป็นไปได้ในการอยู่รอดอย่างนั้น#nเหรอคะ?"
90001250-152 = "ค่ะ ตามมุมมองแล้วน่าจะเป็นอย่างนั้นนะคะ?"
90001250-153 = "ฉันสงสัยด้วยค่ะว่าเราคำนวณและคาดการณ์ทุกสิ่งได้หรือเปล่า ไหนจะมีเรื่องอุโมงค์ควอนตัมและอื่นๆ อีก"
90001250-155 = "..."
90001250-156 = "นั่นมันเรื่องระดับไมโครเลยนะคะ..."
90001250-157 = "แต่มันก็เป็นสิ่งที่มีอยู่จริงอย่างชัดเจนค่ะ"
90001250-158 = "ดูนี่สิคะ ฉันว่าเราหยุดการพูดคุยเชิงคำนวณนี้ไว้ก่อน... แล้วมาดูพวกมอสส์นี่เถอะค่ะ แค่การที่พวกมัน#nมาขึ้นอยู่ตรงนี้ก็น่ารักและพิเศษแล้วว่ามั้ยคะ?"
90001250-159 = "..."
90001250-160 = "เหมือนที่เคย์บอกว่าเมล็ดพืชแต่ละเมล็ดซ่อนความเป็นไปได้ของต้นไม้หนึ่งต้นไว้ไงคะ"
90001250-161 = "ฉันไม่ควรพูดอะไรแบบนั้นเลยค่ะ..."
90001250-162 = "[ns1] \"ครูไม่ค่อยเข้าใจหรอก แต่ที่รู้คือเคย์จังขี้อายนะเนี่ย!\"\n[ns2] \"ที่ครูสรุปได้วันนี้ก็คือ เคย์จังเป็นเด็กขี้อาย!\""
90001250-165 = "ละ... เลิกแกล้งฉันได้แล้วค่ะ!"
90001250-167 = "มาพิจารณาจากเงื่อนไขหลักกันก่อน!"
90001250-168 = "พวกนั้นเป็นสิ่งมีชีวิต แต่พวกเราไม่ใช่ ทิฟาเร็ธเองก็ด้วย"
90001250-169 = "สิ่งมีชีวิตทุกชนิดล้วนมีขีดจำกัด และนี่ก็คือข้อเท็จจริงที่ชัดเจน"
90001250-170 = "เพราะงั้นเราเลยต้องเล่นกับขีดจำกัดนั้น"
90001250-171 = "ยะ... ยังไงเหรอคะ...?"
90001250-172 = "ก็อย่างเช่น...!"
90001250-174 = "โอ้ว..."
90001250-175 = "บะ... บะบะบะบะบะ... แบบนั้นมัน...!"
90001250-176 = "แต่มันจะได้ผลแน่นอนนะ หรือว่าไม่เห็นด้วย?"
90001250-177 = "มะมะมะ... มันก็จริงอยู่หรอกค่ะ...!"
90001250-178 = "แล้วก็... ต่อให้ใช้วิธีนั้น แต่กุญแจนั่นก็น่าจะยังปกติดีนะคะ...?"
90001250-179 = "ก็นะ แต่ฉันไม่คิดว่าลำพังกุญแจนั่นจะทำอะไรคนเดียวได้หรอก"
90001250-180 = "แต่ว่า... ก็มีความเป็นไปได้ว่าท่านธิดานั่นก็จะไม่เป็นอะไรด้วยนะคะ...?"
90001250-182 = "แต่ก็ไม่สมบูรณ์เหมือนเดิมหรอก... ก็ท่านธิดาเป็นแบบนั้นอยู่แล้วนี่นา"
90001250-183 = "ถ้าจะนิยามด้วยคำของพวกเรา... ก็ต้องบอกว่าพลังที่จ่ายออกมาอาจจะน้อยลงเมื่อเทียบกับตอนปกติ"
90001250-184 = "แต่ถ้าเป็นอย่างนั้นก็น่าจะโอเคไม่ใช่เหรอคะ? ฉันเห็นด้วยนะคะ"
90001250-186 = "ละ... แล้วพี่... พี่มัลคูธ... คิดยังไงเหรอคะ...?"
90001250-190 = "..."
90001250-191 = "ไอน์ ซอฟ ออร์ ฉันคิดว่าสิ่งมีชีวิตก็ต้องมี 'สิ่งที่ไม่ดีแต่จำเป็น' บ้างค่ะ"
90001250-192 = "ฉันเคยได้ยินมาว่าในโลกนั้นมีสิ่งที่เรียกว่าศัตรูตามธรรมชาติอยู่"
90001250-193 = "แม้ว่าเหยื่อจะเป็นฝ่ายที่ถูกกินเพียงฝ่ายเดียว"
90001250-194 = "แต่ถ้าไม่มีแนวคิดเรื่องศัตรูตามธรรมชาติ ระบบนิเวศน์ก็คงอยู่ไม่ได้ค่ะ"
90001250-196 = "อ้อ เรื่องนั้นฉันรู้นะ! ว่ากันว่าถ้าป่ามีแต่ฝูงกวางและไม่มีสุนัขจิ้งจอกเลย ผืนป่าตรงนั้นก็จะตายในที่สุด"
90001250-197 = "ซอฟรู้อะไรแบบนั้นดีจังเลยนะคะ..."
90001250-198 = "ทำไมล่ะ จะทำไม? ฉันรู้ไม่ได้หรือไง?"
90001250-199 = "ก็ใช่ว่าจะไม่ได้หรอกค่ะ เพราะอย่างนั้นละฉันถึงได้ไม่ชอบสิ่งมีชีวิต"
90001250-200 = "การดำรงอยู่ที่โอบกอดความไม่สมเหตุสมผลเอาไว้ด้วย ของแบบนั้นไม่ใช่สไตล์ฉันเลยค่ะ..."
90001250-201 = "ฮึ่ม..."
90001250-203 = "ไอน์ ซอฟ ออร์ ถ้าตัดสินใจได้แล้วก็ไปบอกกับทิฟาเร็ธด้วยเถอะค่ะ"
90001250-204 = "ที่จริงทิฟาเร็ธก็น่าจะตัดสินใจเชิงวัตถุวิสัยไปแล้ว แล้วตอนนี้ก็แค่อยากได้การตัดสินใจของโหนดอื่นๆ ประกอบเท่านั้นค่ะ"
90001250-205 = "เอ๋? ทำไมฟังดูแล้วเหมือนการแบ่งความรับผิดชอบเลยล่ะคะ? ทะทะทะ... ทะทิฟาเร็ธก็หลักแหลม#nพอตัวเลยนะเนี่ย!"
90001250-206 = "จำเป็นต้องบิดเบือนและตีความแบบนั้นหรือไง..."
90001250-207 = "ฉะ... ฉันว่าดีค่ะ ก็พวกเรา... จะได้ช่วยทิฟาจังนี่คะ...?"
90001250-209 = "ใช่ค่ะ อย่างน้อยภายใต้ชื่อของท่านผู้นั้น"
90001250-213 = "พวกเราก็... เป็นหนึ่งเดียวกันอยู่แล้วนี่คะ"
90001250-215 = "ตอนต่อไป;สิ่งที่ซ่อนอยู่"

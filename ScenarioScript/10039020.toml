[translation]
10039020-1 = "ตอนที่ 2;เส้นทางแห่งไอดอล: ชุด"
10039020-2 = "เป็นอย่างนี้เองสินะคะ..."
10039020-6 = "ถ้าเป็นเรื่องนั้น ทั้ง 2 คนก็มาถูกที่แล้วละค่ะ!!"
10039020-7 = "ถ้าพูดถึงไอดอล ก็ต้องเรื่องวิชวลค่ะ! เพราะนิยามของไอดอลคือความน่ารัก แค่น่ารักก็เป็นไอดอลได้แล้วค่ะ!!!"
10039020-8 = "[s1] \"นะ... โนโนมิ...!?\"\n[s2] \"โนโนมิดูมีความตั้งใจอย่างแรงกล้าเลยนะ...!?!?\""
10039020-11 = "วะ... วิชวลหรอคะ? อย่างนี้... นี่เอง"
10039020-12 = "เอ๋...? ทำไมถึงตกใจล่ะคะ? ฉันคิดว่าทั้ง 2 คนก็น่าจะทราบกันอยู่แล้วเสียอีก..."
10039020-13 = "เห็นว่ามาเพราะเรื่องไอดอลไม่ใช่เหรอคะ? ทุกคนทราบว่าพวกฉันเองก็กำลังเตรียมการเรื่องไอดอล#nกันอยู่ ก็เลยมาหาใช่ไหมล่ะคะ?"
10039020-14 = "ถ้าต้องการอะไรก็บอกได้เลยนะคะ นี่เป็นโอกาสที่พวกเราจะได้ช่วยเหลือคุณครูทั้งที ทุกคนจะต้องช่วยอย่างเต็มใจแน่นอนค่ะ!"
10039020-15 = "...!"
10039020-16 = "ขอบคุณค่ะ! คุณพูดอย่างยินดีแบบนี้ ฉันไม่รู้เลยค่ะว่าต้องขอบคุณยังไงดี..."
10039020-20 = "ตะ... แต่ว่า... นี่อาจเป็นคำถามที่ไม่ควรก็ได้ แต่ว่า..."
10039020-21 = "แล้วคนอื่นๆ ล่ะคะ... ตอนนี้คนอื่นๆ กำลังยุ่งกันเหรอคะ? พอดีฉันเห็นแต่คุณโนโนมิน่ะค่ะ..."
10039020-22 = "อ้อ... เรื่องนั้นเหรอคะ~"
10039020-26 = "ฮุฮุ ได้จังหวะพอดีเลยนะคะ"
10039020-27 = "ทั้ง 2 คนพอจะช่วยอะไรฉันสักอย่างได้มั้ยคะ?"
10039020-28 = "[s3] \"จู่ๆ ก็ให้เควสเหรอ?\"\n[s4] \"เกิดเรื่องอะไรขึ้นอย่างนั้นเหรอ?\""
10039020-31 = "จะว่าอย่างนั้นก็ได้ค่ะ เรามีไอเดียดีๆ ก็จริง แต่ทุกคนก็ขี้อายกันน่ะค่ะ"
10039020-32 = "...??"
10039020-33 = "ไอเดีย...? ขี้อาย...?"
10039020-34 = "เอาละๆ! ไว้ฉันจะอธิบายให้ระหว่างทางค่ะ"
10039020-35 = "ตอนนี้ฉันว่าเราต้องออกวิ่งกันสักหน่อยค่ะ... พอจะไหวมั้ยคะ?"
10039020-36 = "ค่ะ ไหวอยู่แล้วค่ะ! ฉันจะรอรับแต่ความช่วยเหลือได้ยังไงกันคะ!"
10039020-37 = "ฉันเองก็จะช่วยอีกแรงค่ะ! ขอให้ฉันได้มีส่วนช่วยด้วยเถอะนะคะ!"
10039020-38 = "ตายจริง ช่างเป็นคำตอบที่น่าชื่นใจจังเลยค่ะ! ขอบคุณนะคะ~"
10039020-39 = "คุณครูก็... ไหวใช่มั้ยคะ? ฉันจะติ๊ต่างว่าคุณครูก็จะช่วยนะคะ?"
10039020-40 = "[s5] \"อืม... ต้องช่วยสิ\"\n[s6] (คิดว่ามันแปลกๆ แต่ก็พยักหน้าตอบรับไปก่อน)"
10039020-43 = "อื้อ! ดีเลยค่ะ☆ แบบนี้ก็น่าจะคลี่คลายปัญหาได้ค่ะ! ถ้างั้นทั้ง 2 คนตามฉันมาเลยค่ะ!"
10039020-44 = "ไปกันเลย~☆"
10039020-52 = "กำลังสู้ยิบตาอย่างที่คิดไว้เลยนะคะชิโรโกะจัง เป็นยังไงบ้างคะ?"
10039020-53 = "อืม ไม่ง่ายเลย ยิ่งกว่าที่จินตนาการไว้ซะอีก"
10039020-54 = "พูดตามตรง... ฉันไม่ได้เห็นการต่อต้านอย่างรุนแรงแบบนี้มานานแล้ว นี่มันยากยิ่งกว่าตอนที่สู้กับ PMC ไคเซอร์อีก"
10039020-55 = "แล้วรุ่นพี่โฮชิโนะล่ะคะ?"
10039020-56 = "อยู่ทางโน้นน่ะ..."
10039020-58 = "แหะ... แหะๆๆ... ขอโทษนะรุ่นน้อง... ฉันได้แค่นี้จริงๆ..."
10039020-64 = "อืม... รุ่นพี่โฮชิโนะก็ไม่ไหวเหรอเนี่ย นี่ไม่ใช่สถานการณ์ปกติแล้วนะคะ"
10039020-65 = "[ns7] \"ฮะ... โฮชิโนะ!? เป็นยังไงบ้าง...!?\"\n[ns8] \"นี่มันเรื่องอะไรกันน่ะ!?\""
10039020-68 = "มะ... มีการปะทะกันเหรอคะ...!? ทั้ง 2 คนสู้กันอยู่เหรอคะ!?"
10039020-69 = "โนโนมิ...? คนนี้คือ...?"
10039020-70 = "ชุดนักเรียน... ทรีนิตี้...?"
10039020-72 = "ใช่แล้วค่ะ นี่คือคุณมารีจากชมรมซิสเตอร์ คุณมารีกับคุณครูมาช่วยพวกเราค่ะ"
10039020-73 = "แล้วก็ เอ่อ อืม... ฉันควรต้องอธิบายสถานการณ์ใช่มั้ยคะ..."
10039020-74 = "ไม่! ไม่เด็ดขาดเลย!! ฉันไม่ยอมรับอะไรแบบนี้หรอกนะ!!"
10039020-78 = "[ns9] \"เสียงนี้มัน...?\"\n[ns10] \"หืม? เซริกะเหรอ...?\""
10039020-82 = "เอ๋ ครูก็มาด้วยเหรอเนี่ย แหะๆ..."
10039020-83 = "โธ่ๆ ได้เห็นสภาพที่ไม่น่าดูตั้งแต่ตอนกลางวันแสกๆ เลยนะเนี่ย"
10039020-84 = "พอดีรุ่นน้องที่น่ารักของเรากำลังโมโหร้ายน่ะ ฉันก็พยายามจะเข้าไปโน้มน้าวแล้ว แต่กลายเป็นว่าพวกฉันโดนดีเข้าจนได้"
10039020-88 = "หืม...? เรื่องอะไรน่ะเหรอ? ก็..."
10039020-89 = "อื้อ! เรื่องไอดอลไงคะ!"
10039020-94 = "คะ...?"
10039020-95 = "ไอดอล...? เหรอคะ...?"
10039020-96 = "ขะ... ขอโทษนะคะ แต่สถานการณ์ตอนนี้มันเกี่ยวกับไอดอลยังไง..."
10039020-97 = "เรื่องนั้นน่ะเหรอ ก็ครั้งนี้ที่ทรีนิตี้จะมีการจัดงานเทศกาลโรงเรียนครั้งใหญ่ใช่มั้ยล่ะ? แล้วก็จะมีอีเวนต์#nไอดอลที่นั่นด้วย"
10039020-98 = "โนโนมิจังก็เลยจะตั้งวงไอดอลขึ้นมาแล้วไปสมัครเข้าร่วมดูน่ะ"
10039020-99 = "แล้วเราก็... มีการ 'สัญญา' เรื่องนี้กันไว้แล้วด้วย~"
10039020-100 = "และตอนนี้ที่ยังสมัครได้ก็เหลือแต่แบบไอดอลดูโอ้เท่านั้น เราก็เลยจะทำตาม 'สัญญา' ที่เคยทำไว้#nก่อนหน้านี้..."
10039020-101 = "วงดูโอ้เด็กปี 1... ทุกคนยังจำได้ดีเลยละ"
10039020-105 = "[ns11] \"อ้อ~ เข้าใจอย่างแจ่มแจ้งแล้ว\"\n[ns12] \"นั่นสินะ เคยมีสัญญาแบบนั้นกันนี่เนอะ\""
10039020-108 = "เด็กพวกนี้ดื้อไม่ใช่เล่นเลยน้า~ ทีตอนนั้นละคุยโม้ซะยกใหญ่ว่าจะเป็นไอดอลให้~"
10039020-109 = "ใช่มั้ยล่ะ? เซริกะจัง? อายาเนะจัง?"
10039020-111 = "ระ... เรื่องนั้น...! ก็เคยพูดไว้อยู่หรอก...!!"
10039020-112 = "แต่ก็ไม่ได้แปลว่า!! จะต้อง 'ใส่ชุดแบบนั้น' ด้วยนี่นา...!!"
10039020-113 = "ใช่ค่ะ!! เราไม่เคยสัญญาเรื่องชุดกันนี่คะ! แบบนี้มันเกินไปนะคะ!!"
10039020-115 = "[ns] (ชุดแบบนั้นงั้นเหรอ...?)"
10039020-117 = "งั้นเหรอคะ? แต่ชุดที่พวกฉันเตรียมไว้ก็เป็นชุดที่ไอดอลใส่กันจริงๆ นี่คะ"
10039020-118 = "ถึงจะเปลี่ยนเป็นชุดอื่นก็ไม่น่าจะต่างกันนะคะ ชุดไอดอลเป็นชุดที่ต้องสะดุดตาตั้งแต่แรกอยู่แล้วละค่ะ"
10039020-119 = "ตะ... แต่ถึงอย่างนั้นก็เถอะ...!!"
10039020-120 = "ที่จริงฉันคิดว่าทั้งคู่คงจะอาย เลยต้องใช้เวลาในการทำใจยอมรับน่ะค่ะ☆"
10039020-121 = "จะอายอยู่ไม่ได้สิ เราต้องส่งแผนการไอดอลก่อนเดดไลน์นะ แล้วเราก็ต้องรีบถ่ายรูปชุดเพื่อเอาไปใส่#nในแผนการไอดอลด้วย"
10039020-122 = "ได้ยินแล้วใช่มั้ย อายาเนะ!? ทนอีกหน่อยนะ! อดทนแค่อีก 2-3 วันก็พอ!!"
10039020-123 = "ฉันรู้ค่ะ! รู้ดีว่าเราจะแพ้ไม่ได้เด็ดขาด!!"
10039020-124 = "ไม่คิดเลยนะว่าอายาเนะจังจะเอาเฮลิคอปเตอร์ออกมาประท้วงแบบนี้"
10039020-125 = "ท่าทางจะอายมากเลยนะนั่น แหะๆ..."
10039020-126 = "เซริกะจังกับอายาเนะจังตอบโต้เราอย่างดุเดือด แต่ถึงอย่างนั้นพวกฉันก็ลงมือทำอะไรมากไม่ได้ค่ะ..."
10039020-130 = "แต่ถ้าคุณครูมาช่วยสั่งการ และเราได้ความช่วยเหลือจากคุณซิสเตอร์อีกคนละก็ เราน่าจะคลี่คลาย#nเรื่องนี้ได้อย่างรวดเร็วและสงบสุขนะคะ ฮุฮุ"
10039020-132 = "คะ... คะ!?"
10039020-133 = "อ่า คะ... คือว่า... เอ่อ... ฉะ... ฉัน...!"
10039020-134 = "ทั้ง 2 คนได้ยินแล้วใช่มั้ย? ถ้างั้น... ครั้งนี้ก็รบกวนด้วยล่ะ"
10039020-135 = "เรา 'สัญญา' กันไว้แล้วนี่ ใช่มั้ยล่ะ?"
10039020-136 = "อืม การรักษาสัญญาเป็นเรื่องสำคัญนะ สัญญาไว้แล้วก็ต้องทำตามสิ"
10039020-140 = "[ns13] \"ใช่... สัญญาต้องเป็นสัญญา\"\n[ns14] \"ต้องรักษาสัญญาที่ตัวเองให้ไว้สิ\""
10039020-143 = "...!"
10039020-144 = "สัญญาที่ตัวเองให้ไว้..."
10039020-145 = "ใช่แล้วค่ะ... ค่ะ...! ถ้างั้นฉันก็จะช่วยอีกแรงค่ะ...!"
10039020-147 = "อื้อ อื้อ! ต้องอย่างนี้ละค่ะ! ขอบคุณนะคะ คุณครู!"
10039020-148 = "ถ้างั้นก็...!"
10039020-157 = "ลุยเลยค่า~☆"

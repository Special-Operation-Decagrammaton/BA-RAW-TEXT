[translation]
10039020-1 = "Episode 2;The Road to Pop Idol Stardom: The Costume"
10039020-2 = "...So that's how it is."
10039020-6 = "If that's the case, you two have definitely come to the right place!"
10039020-7 = "When it comes to idols, it's all about the visuals! Cuteness is their defining trait. If you're cute, that solves everything!"
10039020-8 = "[s1] \"...?! No-Nonomi...?\"\n[s2] \"You seem incredibly motivated...\""
10039020-11 = "V-Visuals...? I see...?"
10039020-12 = "Oh...? You look surprised. I would've thought you already knew that."
10039020-13 = "Well, since you came to US for help, you must know we're already preparing for an idol gig ourselves."
10039020-14 = "If you need anything, just let me know. It's a rare opportunity to help Sensei, so everyone will gladly pitch in!"
10039020-15 = "Aw!"
10039020-16 = "Thank you! I'm so grateful to all of you."
10039020-20 = "Um, though...and pardon me for asking this..."
10039020-21 = "Is everyone else...busy right now? It seems like there's no one here except you."
10039020-22 = "Oh. Well, that's because..."
10039020-26 = "Heehee. Actually, you bring up a good point."
10039020-27 = "Could you two maybe help me with one little thing?"
10039020-28 = "[s3] \"Whoa, is this a quest?\"\n[s4] \"Is there something wrong?\""
10039020-31 = "Sort of. See, I'm all on board with us becoming idols, but some of us are a little...shy about it."
10039020-32 = "Hmm?"
10039020-33 = "Shy about which part?"
10039020-34 = "Here, let's just... I'll tell you all about it on the way."
10039020-35 = "We should actually run. Are you up for that?"
10039020-36 = "O-Of course! I could hardly accept your help without returning the favor, right?"
10039020-37 = "Let me do whatever I can!"
10039020-38 = "Oh my, that's a great answer. Thank you!"
10039020-39 = "Not to assume, Sensei, but would you mind helping too?"
10039020-40 = "[s5] \"Oh...well... Sure.\"\n[s6] Give an apprehensive nod."
10039020-43 = "Yes! Great! ☆ One problem solved! Now, both of you, please follow me!"
10039020-44 = "Let's go! ☆"
10039020-52 = "I see you've been struggling, Shiroko. Are you okay?"
10039020-53 = "I'm okay. But I never imagined it would be this hard."
10039020-54 = "Honestly, I haven't seen this kind of resistance in a long time. It's tougher than fighting the Kaiser PMC."
10039020-55 = "Is Hoshino holding up?"
10039020-56 = "...Look over there."
10039020-58 = "Heh, hehhh... Heh, hehhh... I'm sorry, everyone... This is the end for me..."
10039020-64 = "Even Hoshino's down. This is dire."
10039020-65 = "[ns7] \"H-Hoshino is down?!\"\n[ns8] \"W-What in the world is going on?!\""
10039020-68 = "I-Is this a combat situation...? Are you in the middle of a battle?!"
10039020-69 = "...Who's this, Nonomi?"
10039020-70 = "Is she from Trinity?"
10039020-72 = "She is. This is Mari, from the Sisterhood. She's here to help us."
10039020-73 = "So, to fill you in..."
10039020-74 = "Absolutely not! I refuse! No way!"
10039020-78 = "[ns9] \"That sounds like...\"\n[ns10] \"Serika...?\""
10039020-82 = "Oh, Sensei, you're here too, heh..."
10039020-83 = "Oof. Sorry you had to see this."
10039020-84 = "Our adorable juniors sure are feisty. All I did was try to talk them into this, but now they've gone off the rails."
10039020-88 = "...Huh? Talk them into what? Well..."
10039020-89 = "Being pop idols!"
10039020-94 = "Wait, what?"
10039020-95 = "...\"Being pop idols\"...?"
10039020-96 = "I-I'm sorry, I don't really understand how that fits together with...this..."
10039020-97 = "Well, you know Trinity is having their Academy Festival, right? It's going to have a pop idol event."
10039020-98 = "So Nonomi wanted to put a group together and sign up."
10039020-99 = "...Plus there's a...a promise involved."
10039020-100 = "The only category left to sign up for is the duo group category. So, since two of us had made that promise..."
10039020-101 = "...We're signing them up as a duo of first-year students. That's what they agreed to."
10039020-105 = "[ns11] \"Ah! I completely understand.\"\n[ns12] \"That's right. They did agree to something like that.\""
10039020-108 = "Kids these days. Running around like crazy, promising whatever. Back in my day, they KEPT their promises."
10039020-109 = "Right, Serika? Ayane?"
10039020-111 = "Well... I mean, we did promise, but..."
10039020-112 = "I didn't think we were going to have to dress up like...like that!"
10039020-113 = "Right? We never agreed to that part. This is totally unreasonable!"
10039020-115 = "[ns] \"(Dress up like...what, exactly?)\""
10039020-117 = "Is that the issue? But the clothes we put together are authentic idol costumes, aren't they?"
10039020-118 = "Even if we changed the costumes, you'd still be dressed to stand out. That's what idols do!"
10039020-119 = "B-But still...!"
10039020-120 = "I understand. Maybe you just need a little time—"
10039020-121 = "We don't have time. There's a deadline. If we don't get all the pictures taken and send our proposal in, it's over."
10039020-122 = "Did you hear that, Ayane?! We just have to hold on a little longer! Just a few more days!"
10039020-123 = "Right! We'll never give in."
10039020-124 = "...Wow, I didn't think she'd bring out a helicopter."
10039020-125 = "She must be REALLY embarrassed. Heh..."
10039020-126 = "Well, unlike them, we're going to have to hold back here..."
10039020-130 = "Still, with Sensei's guidance and this Sister's help, we can wrap things up in a nice, friendly way, don't you think?"
10039020-132 = "Huh? What?"
10039020-133 = "Ah, right. You, um... Okay, I'll just, um..."
10039020-134 = "Listen, you two! I understand you want to get out of this."
10039020-135 = "But you did make a promise. ...Right?"
10039020-136 = "It's important to keep your promises. It's how people learn to trust each other."
10039020-140 = "[ns13] \"That's right. A promise is a promise.\"\n[ns14] \"We all have to honor our commitments.\""
10039020-143 = "..."
10039020-144 = "\"Honor our commitments...\""
10039020-145 = "Right. Okay! I'm all in on this!"
10039020-147 = "All right! Thank you, Sensei!"
10039020-148 = "Okay!"
10039020-157 = "Let's go! ☆"

[translation]
10039020-1 = "第2話;偶像之路：服裝"
10039020-2 = "……原來是這麼回事呀。"
10039020-6 = "那麼兩位就來對地方了！！"
10039020-7 = "偶像果然還是得靠外表決勝負！#n可愛就是正義！！可愛能擺平一切！！！"
10039020-8 = "[s1]「……！？野，野乃美……！？」\n[s2]「突然好有幹勁……！？！？」"
10039020-11 = "外，外表……是嗎？"
10039020-12 = "咦……？為什麼這麼驚訝？#n我以為你們是知道才來找我的……"
10039020-13 = "兩位不是因為偶像的事而來的嗎？是知道我們也在準備才來的吧？"
10039020-14 = "所以如果有什麼需要，請儘管告訴我。#n難得有機會幫助老師，我想大家都會樂意幫忙的！"
10039020-15 = "……！"
10039020-16 = "謝謝你！居然答應地這麼爽快，真不知道該怎麼感謝才好……"
10039020-20 = "那，那個……雖然這麼說可能有點冒昧……"
10039020-21 = "其他人……大家現在都在忙嗎？#n好像只看到野乃美同學在這裡……"
10039020-22 = "啊……這個嘛～"
10039020-26 = "呵呵，說不定這樣正好。"
10039020-27 = "如果兩位不介意的話，可以幫我一個忙嗎？"
10039020-28 = "[s3]「居然有突發任務？」\n[s4]「發生了什麼事嗎？」"
10039020-31 = "可以這麼說吧。#n雖然主意本身不錯，只可惜大家都很害羞……"
10039020-32 = "……？？"
10039020-33 = "主意……？害羞……？"
10039020-34 = "來來來！詳細情況我們邊走邊說吧。"
10039020-35 = "可能需要小跑步過去……可以嗎？"
10039020-36 = "當，當然！我本來就認為不能單方面接受幫助！"
10039020-37 = "我願意幫忙。請務必讓我幫忙！"
10039020-38 = "哎呀，真是可靠的回答！那就謝謝你囉～"
10039020-39 = "……老師也可以吧？我就當你答應了唷？"
10039020-40 = "[s5]「這，這個嘛……好吧。」\n[s6] 雖然感覺有點奇怪，不過還是點頭答應"
10039020-43 = "嗯嗯！太好了☆這樣問題就解決了！#n那麼，兩位請跟我來！"
10039020-44 = "出發～☆"
10039020-52 = "果然陷入苦戰了呢。#n白子醬，你還好嗎？"
10039020-53 = "嗯。不好對付。簡直超乎想像。"
10039020-54 = "老實說……很久沒遇到這麼激烈的抵抗了。#n比和凱撒PMC戰鬥還要吃力。"
10039020-55 = "星野前輩呢？"
10039020-56 = "……在那邊。"
10039020-58 = "唔，唔嘿……抱歉啦，後輩們……我不行了……"
10039020-64 = "唔嗯……居然連星野前輩都倒下了。看來確實不簡單呢。"
10039020-65 = "[ns7]「星，星野！？居然倒下了……！？」\n[ns8]「這，這到底是什麼情況！？」"
10039020-68 = "正，正在交戰……！？#n你們在跟誰戰鬥嗎！？"
10039020-69 = "……野乃美？這個人是……？"
10039020-70 = "這副打扮，是三一的……"
10039020-72 = "沒錯。這位是和老師一起來幫助我們的修女，瑪麗同學。"
10039020-73 = "然後……唔嗯，情況是這樣的……"
10039020-74 = "絕對，絕對不行！！我絕不接受！！"
10039020-78 = "[ns9]「這個聲音是……？」\n[ns10]「嗯？茜香……？」"
10039020-82 = "咦，老師也來了呀。#n唔嘿……"
10039020-83 = "哎呀呀，大白天的就讓你們見到這種場面，真不好意思。"
10039020-84 = "我們的可愛後輩們還真固執呢。#n本來是想說服他們的，結果卻反而被狠狠教訓了一頓。"
10039020-88 = "……嗯？要說服什麼？#n這個嘛……"
10039020-89 = "嗯！是偶像唷！"
10039020-94 = "……咦？"
10039020-95 = "偶像……是嗎？"
10039020-96 = "不，不好意思，我不太明白現在的情況跟偶像之間的關聯……"
10039020-97 = "就是啊～這次三一舉辦的大型學園祭不是有個偶像活動嗎？"
10039020-98 = "所以野乃美醬就打算要組一個偶像團體報名參加。"
10039020-99 = "……畢竟有那個「約定」嘛～"
10039020-100 = "剛好團體申請又只剩下雙人組的名額，所以就依照「約定」……"
10039020-101 = "……一年級的雙人組。這件事大家都記得。"
10039020-105 = "[ns11]「啊～我完全明白了。」\n[ns12]「沒錯，確實有那樣的約定。」"
10039020-108 = "傷腦筋，年輕人就是血氣方剛的～#n那時候明明說得這麼有把握～"
10039020-109 = "對吧？茜香醬？綾音醬？"
10039020-111 = "那，那個……！#n雖然是這樣沒錯！！"
10039020-112 = "可是我真的沒想到居然得穿「那種衣服」……！！"
10039020-113 = "就是說啊！！那種事我從來沒聽過！實在太強人所難了！！"
10039020-115 = "[ns]（「那種衣服」……？）"
10039020-117 = "會嗎？但我們準備的就是偶像們穿的服裝呀？"
10039020-118 = "就算換別套也是一樣的唷？#n畢竟偶像服本來就是設計來引人注目的嘛～"
10039020-119 = "就，就算是這樣……！！"
10039020-120 = "哎呀～現在會抗拒只是因為害羞而已，不久後應該就能接受了☆"
10039020-121 = "那樣會有麻煩。#n偶像的企劃書得在期限內繳交。能拍攝的照片的時間不多了。"
10039020-122 = "你聽到了嗎，綾音醬！？#n再撐一下！只要再撐幾天就行了！！"
10039020-123 = "我知道了！絕對不能輸！！"
10039020-124 = "話又說回來，沒想到綾音醬竟然會動用直升機來反抗。"
10039020-125 = "看來是真的很害羞呢。唔嘿……"
10039020-126 = "和反應激烈的茜香醬和綾音醬不同，我們的手段不能太過強硬……"
10039020-130 = "但如果有老師的指揮和修女同學的幫助，我想應該能更和平快速地解決吧？呵呵。"
10039020-132 = "什，什麼！？"
10039020-133 = "啊，那個……我……！"
10039020-134 = "這樣兩位都明白了嗎？#n這次……就麻煩你們囉？"
10039020-135 = "……畢竟這是「約定」對吧？"
10039020-136 = "嗯，約定很重要。該遵守的就要遵守。"
10039020-140 = "[ns13]「……也對。約定就是約定。」\n[ns14]「自己做的約定就該遵守才對。」"
10039020-143 = "……！"
10039020-144 = "自己做的約定……"
10039020-145 = "……老師說的沒錯。#n嗯……！我也會幫忙的……！"
10039020-147 = "嗯嗯！就是這樣！謝謝你，老師！"
10039020-148 = "那麼……！"
10039020-157 = "……出發～☆"

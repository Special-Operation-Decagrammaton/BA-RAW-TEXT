[translation]
10015045-4 = "ห้องพักผ่อนแฮ็กเกอร์ เวอริทัส"
10015045-11 = "อืม คือว่านะ..."
10015045-12 = "ถึงจะพูดไปว่าถ้าเป็นเรื่องเกี่ยวกับงานมหกรรมแข่งขันกีฬาก็จะช่วยเต็มที่ก็เถอะ..."
10015045-13 = "แต่ถ้ามาขอให้ใส่ชุดเชียร์แบบนี้ฉันไม่เอาด้วยหรอกนะ..."
10015045-15 = "เข้าใจผิดแล้วละ จี้จัง"
10015045-16 = "พวกเราไม่ได้ใส่ชุดเชียร์ตามคำขอของใคร แต่ว่าใส่ด้วยความสมัครใจของตัวเองต่างหากล่ะ"
10015045-17 = "ให้พูดตามตรงก็คงต้องบอกว่าเราใส่ชุดนี้เพื่อชดเชยความผิดพลาดที่เกิดขึ้นละนะคะ"
10015045-18 = "เอาที่ง่ายๆ กว่านั้นก็ต้องเรียกชุดนี้ว่า 'ชุดลงโทษ' น่าจะถูกกว่า..."
10015045-23 = "...นี่คุณครูมีรสนิยมทำโทษนักเรียนโดยการให้ใส่ชุดแบบนี้งั้นเหรอ?"
10015045-24 = "[s] \"อย่าพูดเรื่องที่ชวนให้เข้าใจผิดแบบนั้นสิ!\""
10015045-25 = "ฮุฮุ ดูท่าทางกำลังจะสนุกกันอยู่ฉันเองก็ไม่อยากขัดหรอกนะคะ แต่ว่าเราไม่มีเวลากันแล้วละค่ะ"
10015045-26 = "คือว่าที่จริงแล้ว..."
10015045-33 = "หมายความว่า จนถึงขั้นตอนการสร้างหุ่นยนต์เชียร์ต้นแบบสำหรับเชียร์ก็ยังไม่มีปัญหาอะไร..."
10015045-34 = "แต่พอเชื่อมต่อการสื่อสารระยะใกล้แล้ว จู่ๆ หุ่นยนต์ก็เริ่มมีปฏิกิริยาตอบสนองแบบแปลกๆ แล้วก็#nอาละวาดงั้นเหรอ?"
10015045-35 = "ก็อย่างที่บอกนั่นแหละ พอโนอาตรวจสอบแบบร่างดูก็ไม่พบความผิดปกติอะไร..."
10015045-39 = "ได้ตั้งค่าเอนโทรปีขั้นต่ำของโปรโตคอลการเข้ารหัสเอาไว้สูงพอรึเปล่าน่ะ?"
10015045-40 = "...เปล่า"
10015045-41 = "แล้วได้ตรวจสอบความสมบูรณ์ของแพ็กเก็ตในขั้นตอนเชื่อมต่อเซิร์ฟเวอร์รักษาความปลอดภัยรึเปล่า?"
10015045-42 = "ไม่ได้ทำน่ะ"
10015045-43 = "แล้วก็คงจะไม่ได้อัปเดตเฟิร์มแวร์ที่ปรับปรุงช่องโหว่ใหม่... เมื่อเดือนที่แล้วด้วยสินะ"
10015045-49 = "ปกติก็เอาแต่ใส่ของที่ไม่จำเป็นตั้งเยอะตั้งแยะเข้าไปในสิ่งประดิษฐ์ แต่ทำไมถึงจัดการระบบรักษา#nความปลอดภัยสะเพร่าแบบนี้ล่ะ?"
10015045-50 = "ถึงจะมีเรื่องที่อยากจะพูดหลายอย่างเกี่ยวกับคำว่า 'ฟังก์ชันที่ไม่จำเป็น' อยู่ก็เถอะ..."
10015045-51 = "แต่หุ่นยนต์ที่เราสร้างในครั้งนี้ต้องมีปฏิสัมพันธ์กับผู้คนที่ใช้งานอุปกรณ์หลากหลายในพื้นที่ต่างๆ พวกเราก็เลยไม่ได้รอบคอบเรื่องระบบรักษาความปลอดภัยเท่าที่ควรน่ะ"
10015045-52 = "...และผลสุดท้ายนั่นก็เป็นความคิดที่ผิดพลาด"
10015045-53 = "แล้วอีกอย่าง ฉันก็คิดว่าถ้าเกิดปัญหาขึ้นมาก็จะไปขอความช่วยเหลือจากผู้เชี่ยวชาญเรื่องการรักษา#nความปลอดภัยอยู่แล้ว เพราะงั้นก็เลยประมาทไปหน่อยน่ะ"
10015045-55 = "พอเรื่องเป็นแบบนี้แล้วไม่ต้องมาโทษฉันเลยนะ ก็เห็นเป็นแบบนี้อยู่เรื่อย..."
10015045-56 = "ว้าว! ฮิบิกิเป็นคนออกแบบชุดนี้เองเลยเหรอ?"
10015045-57 = "เป็นการออกแบบที่ไม่เหมือนใคร สีสันก็สดใสได้ใจมาก... ยกนิ้วให้เลย!"
10015045-58 = "สำหรับฉันรู้สึกว่ากระโปรงมันจะสั้นไปหน่อยค่ะ..."
10015045-59 = "ไม่หรอกค่ะ! ตามรายงานของชมรมวิจัยวิทยาศาสตร์การกีฬาแล้ว มีรายงานผลการวิเคราะห์ว่า ยิ่งกระโปรงของทีมเชียร์สั้นเท่าไร การเชียร์ก็จะยิ่งมีประสิทธิภาพมากเท่านั้นค่ะ!"
10015045-60 = "หรือก็คือ การที่กองเชียร์ที่มีหน้าที่เอาใจช่วยให้คว้าชัยชนะมาได้ใส่กระโปรงสั้น นับว่าเป็นตัวเลือกที่#nสมเหตุสมผลแล้วค่ะ!"
10015045-62 = "ที่จริงชุดนี้ฉันตัดเอาไว้นานแล้วน่ะ ตอนนี้ไซซ์ก็เลยเล็กไปเท่านั้นเอง..."
10015045-63 = "อืม... ถ้ามีเวลาอีกสักหน่อยก็คงจะแก้ให้กระโปรงยาวกว่านี้..."
10015045-64 = "ไม่สิ... ถ้ามีเวลาไปปรับแก้ชุดก็น่าจะเอาเวลาไปตามหาคนร้ายไม่ดีกว่าเหรอ?"
10015045-65 = "นั่นสิคะ ตอนนี้สิ่งที่จำเป็นที่สุดก็คือการตามหาตัวคนร้ายที่แฮ็กหุ่นยนต์นะคะ"
10015045-66 = "ขอโทษจริงๆ นะคะที่ต้องขอให้ช่วยอีกครั้ง แต่ช่วยตามหาให้หน่อยได้มั้ยคะว่าคนร้ายที่แฮ็กหุ่นยนต์#nของชมรมวิศวกรรมอยู่ที่ไหนน่ะค่ะ"
10015045-67 = "วางใจได้เลย เรื่องแกะรอยตามกลับไปที่ตำแหน่งผู้ส่งมันไม่ใช่เรื่องยากอะไรอยู่แล้ว"
10015045-68 = "โคทามะ ตอนนี้เข้าถึงโมดูล RF ที่ติดตั้งไว้ทั่ววิทยาเขตมิลเลเนียมได้ใช่มั้ย?"
10015045-69 = "ถ้าฝ่ายนั้นใช้ระบบสื่อสารระยะใกล้ในการแฮ็กจากที่ไกลๆ ก็ต้องใช้เสาอากาศในการนำทางแน่ ถ้าใช้คลื่นไฟฟ้ารบกวนก็น่าจะคำนวณตำแหน่งโดยประมาณของแหล่งที่มาได้นะ"
10015045-70 = "ฉันไม่ได้... ติดตั้งโมดูล RF... ไว้ทั่ววิทยาเขตสักหน่อยนะคะ?"
10015045-71 = "ไม่ต้องทำเป็นไม่รู้เรื่องหรอก ฉันเห็นหมดแล้วว่าเมื่อกี๊กำลังแอบดักฟังบทสนทนาของคุณครูด้วยโมดูล#nภายนอกน่ะ"
10015045-72 = "[s] \"...หืม? นี่ครูโดนดักฟังอยู่ตลอดเลยเหรอ?\""
10015045-73 = "...แต่ถ้าไม่อยากทำก็ไม่เป็นไร ถ้าไม่อยากช่วย ฉันก็จะยึดมาเองแล้วค่อยตรวจสอบดูก็ได้ว่าเป็นเนื้อหา#nแบบไหน"
10015045-77 = "เชื่อมต่อเรียบร้อยแล้วค่ะ ให้ตรวจสอบข้อมูลส่วนไหนก่อนดีคะ?"
10015045-78 = "[s] \"นี่เดี๋ยวสิ คุณโคทามะ...\""
10015045-79 = "ขอโทษนะคุณครู เรื่องนั้นฉันจะจัดการให้ทีหลัง..."
10015045-83 = "ก่อนอื่นโคทามะ ช่วยจัดการตำแหน่งโมดูลที่มีคลื่นไฟฟ้ารบกวนถี่ๆ ในแต่ละช่วงเวลา โดยเน้นที่ห้อง#nปฏิบัติงานวิศวกรรมให้ทีนะ"
10015045-87 = "ส่วนสมาชิกที่เหลือก็ช่วยตรวจสอบให้ทีว่ามีการเข้าถึงเซิร์ฟเวอร์แบบผิดปกติรึเปล่า แค่ตรวจสอบ#nประวัติในช่วงที่ผ่านมาก็พอ คงจะใช้เวลาไม่นานหรอก"
10015045-88 = "ขอบคุณมากนะคะ ต้องมาขอความช่วยเหลือจากเวอริทัสซ้ำไปมาแบบนี้น่าอายจังเลยนะคะ..."
10015045-89 = "ไม่ต้องคิดมากหรอกน่า"
10015045-90 = "ก็บอกไปแล้วนี่ว่าฉันเองก็อยากให้งานมหกรรมแข่งขันกีฬาครั้งนี้จะเป็นเทศกาลที่ทุกๆ คนได้มาสนุก#nด้วยกันน่ะ"
10015045-91 = "แต่ว่านะ... รู้สึกเหมือนกำลังพลาดเรื่องที่สำคัญบางอย่างไปเลย"
10015045-93 = "เหมือนกับว่ากำลังมีปัญหาใหญ่กว่านี้กำลังเกิดขึ้นในที่ที่เราไม่รู้เลยยังไงยังงั้นแหละ..."

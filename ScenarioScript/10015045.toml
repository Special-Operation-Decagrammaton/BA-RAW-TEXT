[translation]
10015045-4 = "貝里塔斯．駭客休息室"
10015045-11 = "呃，那個……"
10015045-12 = "如果是要拜託和大運動會有關的事，我們當然很樂意幫忙……"
10015045-13 = "但如果要我們穿上應援團的服裝，實在恕難從命……"
10015045-15 = "這是誤會啦，千醬。"
10015045-16 = "我們並不是受人所託，而是憑自己的意志穿上這套服裝的。"
10015045-17 = "正確來說，是為了贖罪才穿上這套服裝的。"
10015045-18 = "也就是說，像是「懲罰遊戲」一樣……"
10015045-23 = "……原來老師有讓犯錯的學生穿上這種衣服的興趣啊？"
10015045-24 = "[s]「不要說那種會讓其他人誤會的話！」"
10015045-25 = "呵呵。雖然很想再旁觀一會……不過現在時間緊迫。"
10015045-26 = "其實是這樣的……"
10015045-33 = "也就是說，應援機器人的原型製作作業都很順利……"
10015045-34 = "但是在啟動近距離通訊功能後，機器人就開始發生異常並失控暴走了，對吧？"
10015045-35 = "對，就是那樣。#n乃愛檢查過設計圖了，設計上沒有任何問題……"
10015045-39 = "加密金鑰協商協定中的最低熵值設得夠高嗎？"
10015045-40 = "……不。"
10015045-41 = "有檢查再次連接安全伺服器的過程中收到的封包的完整性嗎？"
10015045-42 = "沒有。"
10015045-43 = "上個月發現漏洞後，韌體的改善更新……肯定是沒做吧。"
10015045-49 = "明明平時都會在發明中安裝一堆不必要的功能……為什麼對安全系統就這麼隨便呢？"
10015045-50 = "雖然想針對「不必要的功能」這句話反駁幾句……"
10015045-51 = "這次開發的機器人必須靈活應對各式各樣的環境……#n所以在安全措施上，我認為可以稍微放寬鬆一點。"
10015045-52 = "……雖然就結果來說是誤判了。"
10015045-53 = "畢竟我想就算出了問題，優秀的安全顧問也會伸出援手，所以可能多少有點大意了。"
10015045-55 = "別在這種時候把錯推到我身上。#n真是的……"
10015045-56 = "哇啊！這套服裝是響親自設計的嗎？"
10015045-57 = "大膽的設計與華麗的顏色……令人印象深刻！"
10015045-58 = "我覺得裙子有點太短了……"
10015045-59 = "才不會呢！#n運動科學研究部的報告指出，應援團的裙子越短，加油的效率就會越高！"
10015045-60 = "換句話說，應援團為求隊伍獲勝而穿上短裙，是非常合理的選擇。"
10015045-62 = "其實只是因為它是以前就製作好的服裝，所以尺寸才變小了……"
10015045-63 = "唔……如果能給我更多時間，就能把裙子稍微改長一點了……"
10015045-64 = "……不，與其花時間修改服裝，倒不如去追查犯人吧？"
10015045-65 = "沒錯。#n現在的當務之急是找出駭入機器人的犯人。"
10015045-66 = "一再麻煩各位真是不好意思……#n能請各位查出駭入機器人的犯人所在的位置嗎？"
10015045-67 = "交給我吧。#n逆向追蹤訊號來源本身並不困難。"
10015045-68 = "小玉，現在可以連接設置在千年研究區域各處的RF模組吧？"
10015045-69 = "如果對方是從遠處駭入近距離的無線通訊，那麼應該利用了定向天線才對。#n既然如此，我們就可以透過干擾電波計算出訊號來源的大概位置。"
10015045-70 = "學習館的RF模組……？#n沒有這種東西呀……？"
10015045-71 = "別裝傻了。#n你剛才在用外部模組竊聽老師的交談內容，我可是全都看到了哦？"
10015045-72 = "[s]「……嗯？我被竊聽了？」"
10015045-73 = "……不想幫忙的話也沒關係。#n既然你不願意合作，我只要直接扣押並確認內容就行了。"
10015045-77 = "已連接。請問要確認什麼資料呢？"
10015045-78 = "[s]「那個，小玉同學……？」"
10015045-79 = "真是不好意思，老師。等事情結束之後，我會好好確認的……"
10015045-83 = "首先，小玉以工業實習室為中心，依照時段整理經常受到電波干擾的模組的位置。"
10015045-87 = "其他人去確認伺服器是否有異常的登入。#n只要確認近期的紀錄即可，不會花太多時間。"
10015045-88 = "謝謝大家。#n竟然屢次受到貝里塔斯的協助，真是慚愧……"
10015045-89 = "不必放在心上。"
10015045-90 = "就像之前說過的一樣，我也希望這次的大運動會能成為所有人都能享受的歡樂慶典。"
10015045-91 = "但是……總覺得自己好像遺漏了更重要的事實。"
10015045-93 = "感覺在自己沒察覺到的地方，發生了更嚴重的問題……"

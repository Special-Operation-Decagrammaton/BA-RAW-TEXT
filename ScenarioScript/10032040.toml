[translation]
10032040-1 = "Episode 4;Didn't Expect That Much"
10032040-21 = "Move! We're not liable for any injuries or nothin' if you dare get in our way!"
10032040-22 = "This opera house is rather regal. Excellent."
10032040-23 = "Where is my seat? I cannot be late, as I am a person of sophistication."
10032040-24 = "You sure about this, Boss?"
10032040-25 = "Even now, we're gettin' intel on operatives gunnin' for you."
10032040-26 = "You really gonna stay and watch the show? This place is already crawlin' with enemies."
10032040-27 = "...Stop."
10032040-28 = "..."
10032040-29 = "The Don cannot show signs of weakness. That is when our enemies have truly won."
10032040-30 = "I do not hide. I do not run. If I wish to watch an opera, then I will do so."
10032040-31 = "And regardless, I have a failsafe should anything go wrong."
10032040-32 = "...A failsafe, Boss? Whazzat?"
10032040-33 = "Hoho. I would tell you, but then I would have to kill you."
10032040-34 = "Now, how much longer will you keep me standing here like some peasant?"
10032040-35 = "S-Sorry, Boss! This way!"
10032040-44 = "Don't they stand out too much with a whole entourage like that?"
10032040-45 = "It's impossible for someone with a title like his to hide. They chose intimidation over secrecy."
10032040-46 = "I respect their decision, but it certainly complicates the job for us. It's quite a bit of security we need to get by."
10032040-47 = "I'm beginning to see why those small fry wanted to just blow the whole thing up and get it over with."
10032040-48 = "I-I can do that right away! I'll blow those gang lowlifes to smithereens!"
10032040-49 = "[s1] \"L-Let's take a breather and rethink that, Haruka!\"\n[s2] \"That completely negates all the hard work Aru's done until now!\""
10032040-55 = "We can take things slow and wait for our chance. It's not like we didn't account for this."
10032040-56 = "I'm more worried about this failsafe they mentioned...and the current mood here..."
10032040-57 = "Well, we knew there were unknowns when it came to their security, but—"
10032040-61 = "Wait. What did you say?"
10032040-62 = "The current mood? What's wrong with the mood? I'm in a great mood!"
10032040-63 = "...Boss. Just look around us."
10032040-70 = "Oh? You could cut the tension with a knife."
10032040-71 = "What do you expect? That's the kind of aura a gang boss carries."
10032040-72 = "That's not what I'm talking about."
10032040-73 = "Look at everyone besides the Arancinos, the regular attendees. They're focused on Don, on what's happening around him, evaluating the situation."
10032040-74 = "What I'm trying to say..."
10032040-75 = "[s3] \"Are these more competitors?\"\n[s4] \"Didn't you get rid of all them?\""
10032040-78 = "...? Huh?"
10032040-79 = "...H-Huh?"
10032040-80 = "Th-That's impossible, isn't it?"
10032040-81 = "I-I mean, we did everything exactly according to plan! We eliminated anyone who wasn't a registered attendee or performer... Everyone left should be on the list..."
10032040-82 = "Are you... You're telling me everyone here with that suspicious squint in their eyes pretending to look busy...are after our target?"
10032040-83 = "If that's...what you're saying..."
10032040-87 = "Isn't that... Well, isn't that...everyone here?"
10032040-94 = "...Well..."
10032040-95 = "Yeah..."
10032040-96 = "It's pretty undeniable at this point."
10032040-100 = "...What..."
10032040-101 = "WHAT DID YOU SAY?!"
10032040-102 = "Hahaha! Amazing!"
10032040-103 = "Aru, Aru! Get this! You wanted to protect all these randoms, right? So you've been hunting down anyone even remotely suspicious! But in the end, everyone here is suspicious!"
10032040-104 = "That's the most hilarious thing I've ever heard! I'm gonna pull a muscle! Hahaha!"
10032040-105 = "H-Hey! Stop laughing! Nothing about this is funny!"
10032040-106 = "You're telling me not to laugh? How can I not? Who could've predicted this?"
10032040-107 = "I bet even Sensei couldn't have accounted for this. Huh, Sensei?"
10032040-108 = "[s5] \"That would've required a level of creativity I don't have.\"\n[s6] \"I guess hilarious is one word for it!\""
10032040-111 = "I refuse to believe this is happening! This isn't what I was told at all! Weren't there identity checks? I thought it was invite only!"
10032040-116 = "It's really not hard to get yourself on a list if you know the right people. We shouldn't have trusted it so blindly."
10032040-117 = "We had to sneak ourselves onto the list too! Remember, Aru?"
10032040-118 = "How are you guys so unfazed right now?!"
10032040-119 = "Ugh... This is giving me a stomach ache."
10032040-120 = "I just need to calm down. Let's review the facts... Think, Aru. Think!"
10032040-121 = "No one's going to do anything out in the open. For now, everyone's waiting for the opening move."
10032040-122 = "And there are security guards for a reason, right? Right! They're not going to just shoot up the place."
10032040-123 = "Considering that, what should we do? Maybe we make the first move? Wait for someone else and then counter? Do we even have time? Maybe someone will—"
10032040-124 = "AHHH! Yer done fer, Don Arancino!"
10032040-128 = "[ns7] \"The opening act!\"\n[ns8] \"Aru, things are already on fire.\""
10032040-131 = "Why?! HOW?!"
10032040-132 = "What is the meaning of security? Are they just here for decoration?!"
10032040-138 = "A few security guards versus the entire opera house... Who do you think wins?"
10032040-139 = "You wanna fight, Boss? Or wait it out?"
10032040-144 = "We should, um, okay... Okay. Just calm down... I need to observe the situation, and then we can—"
10032040-145 = "Yer in my way, you dirty lowlife!"
10032040-146 = "...Lowlife?"
10032040-147 = "...Me?"
10032040-148 = "Ah."
10032040-149 = "Boss, if you react like that—"
10032040-151 = "A LOWLIFE?! You dare talk down to Aru?!?!"
10032040-152 = "I'll rip you to pieces! You'll never speak again! This is Aru's job! Aru's target! Go away!!"
10032040-178 = "*sigh*"
10032040-179 = "Hahahahaha!! That's our Haruka! Never a dull moment with her!"
10032040-182 = "..."
10032040-183 = "Uh... Um... Ummm...!"
10032040-184 = "[s9] \"...Aru? Anyone home?\"\n[s10] \"What's the plan, Boss?\""
10032040-187 = "Gyah!"
10032040-188 = "The plan? Considering the...situation, we're going to do what we always do! Get the job done!"
10032040-189 = "Problem Solver 68, after them! We're taking down a gang boss!"

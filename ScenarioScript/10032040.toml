[translation]
10032040-1 = "ตอนที่ 4;ไม่คิดว่าจะเป็นถึงขนาดนั้น"
10032040-21 = "ทุกคนหลบไป ถ้ามาเกะกะอยู่ข้างหน้าแล้วเกิดเรื่องอะไรขึ้นมา ฉันไม่รับผิดชอบหรอกนะ"
10032040-22 = "โรงละครนี้ดีกว่าที่คิดไว้มากเลยแฮะ ถูกใจจริงๆ เลย"
10032040-23 = "ไหนที่นั่งฉันล่ะ? คนมีการศึกษาอย่างฉันไม่อยากทำให้การแสดงต้องล่าช้าจนรบกวนคนอื่นที่มาดูหรอก#nนะ"
10032040-24 = "จะไม่เป็นไรจริงๆ เหรอคะบอส?"
10032040-25 = "แหล่งข่าวบอกว่ายังมีพวกที่เพ่งเล็งบอสอยู่นะคะ จนถึงตอนนี้ก็ยังมีข่าวออกมาให้ได้ยินอยู่เลยค่ะ"
10032040-26 = "ในโรงละครโอเปร่าแห่งนี้ก็อาจจะมีคนพวกนั้นแฝงตัวมาด้วย ในสถานการณ์แบบนี้ บอสจะยังมาดูการแสดงอีกเหรอคะ..."
10032040-27 = "หยุดพล่ามได้แล้ว..."
10032040-28 = "......"
10032040-29 = "เธอไม่เข้าใจเลยสินะ ที่ฉันยกเลิกหรือเปลี่ยนกำหนดการเพราะกลัวเรื่องแบบนี้เป็นสิ่งที่ทางนั้นต้องการ"
10032040-30 = "ฉันจะทำตามกำหนดการเดิม เราต้องไม่หลีกเลี่ยงสิ่งนั้น แต่ต้องขัดขวางต่างหาก"
10032040-31 = "อีกอย่าง ฉันก็เตรียม 'แผนรับมือ' ไว้เผื่อแล้วด้วย..."
10032040-32 = "'แผนรับมือ' เหรอคะ...?"
10032040-33 = "หึหึ ใช่แล้ว แต่เธอไม่ต้องรู้หรอก เธอน่ะตั้งใจทำหน้าที่ของตัวเองให้ดีที่สุดก็พอ"
10032040-34 = "ถ้าเข้าใจแล้วก็รีบพาฉันไปนั่งได้แล้ว ยืนอยู่อย่างนี้แล้วเมื่อยชะมัด"
10032040-35 = "รับทราบค่ะบอส ถ้างั้นเชิญทางนี้ค่ะ..."
10032040-44 = "ถ้าจะไปไหนแล้วต้องมีคนประกบขนาดนั้น มันจะไม่ยิ่งสะดุดตาหรอกเหรอ...?"
10032040-45 = "คนใหญ่คนโตเบอร์นั้น ยังไงก็ซ่อนตัวไม่ได้อยู่แล้วละ ทำแบบนั้นอาจจะเป็นวิธีที่ฉลาดก็ได้"
10032040-46 = "แต่ก็จริงนะ เราจะจับตัวเขาท่ามกลางการคุ้มกันแบบนั้นก็ไม่ได้... วางเกมมาดีเลยนี่"
10032040-47 = "ฉันพอจะเข้าใจแล้วละว่าทำไมคนอื่นถึงคิดจะระเบิดโรงละครโอเปร่านี้ให้จบๆ ไปเลย"
10032040-48 = "หะ... ให้ฉันระเบิดตอนนี้เลยไหมคะ...? เราจะได้จัดการทั้งบอสและสมุนไปพร้อมๆ กันเลย...!"
10032040-49 = "[s1] \"จะ... ใจเย็น ฮารุกะ! ใจเย็นก่อนนะ...!\"\n[s2] \"แบบนั้นสิ่งที่เราทำมาก็หมดความหมายน่ะสิ...!\""
10032040-55 = "ไม่ต้องรีบร้อนหรอก เรื่องบอดี้การ์ดก็เป็นเรื่องที่เราคาดไว้อยู่แล้ว ถ้าไม่มีโอกาสเข้าถึงตัว เราก็แค่ต้องสร้างโอกาสขึ้นมา"
10032040-56 = "แต่สิ่งที่กวนใจฉันก็คือ... 'แผนรับมือ' ที่เขาพูดถึงกับบรรยากาศรอบๆ น่ะ"
10032040-57 = "แผนรับมืองั้นเหรอ... แปลว่ามีบางอย่างที่ทางนี้ก็ยังไม่รู้ด้วยสินะ"
10032040-61 = "หืม...? เดี๋ยวนะ..."
10032040-62 = "เมื่อกี้พูดว่าบรรยากาศรอบๆ ใช่มั้ย? มีอะไรผิดปกติงั้นเหรอ?"
10032040-63 = "ลองมองรอบๆ ดูสิ ประธาน"
10032040-70 = "เอ๋? รู้สึกเหมือนจะชุลมุนแปลกๆ นะ..."
10032040-71 = "มีอันธพาลตัวท็อปมาปรากฏตัวแบบนี้ คนอื่นๆ จะประหม่าก็ไม่แปลกหรอก..."
10032040-72 = "ผิดแล้ว... ไม่ใช่บรรยากาศแบบนั้นหรอก"
10032040-73 = "มีคนที่แกล้งทำเป็นหลบสายตา แต่ยังคงจับตาดูการเคลื่อนไหวของบอสอยู่ตลอด และในขณะเดียวกัน#nก็ดูสายตาคนรอบข้างไปด้วย"
10032040-74 = "บางที... นี่อาจจะ..."
10032040-75 = "[s3] \"เป็นพวก 'คู่แข่ง' ที่พูดถึงก่อนหน้าเหรอ...?\"\n[s4] \"หรือว่าเรายังจัดการไม่หมดน่ะ?\""
10032040-78 = "...? หืม?"
10032040-79 = "เอ๋...?"
10032040-80 = "ดะ... เดี๋ยวก่อนนะ แบบนี้มันไม่แปลกไปหน่อยเหรอ?"
10032040-81 = "เราจับคนน่าสงสัยที่ไม่ได้มีรายชื่ออยู่ในลิสต์ไปหมดแล้วนี่นา คนที่เหลือเป็นคนที่มีรายชื่ออยู่ในลิสต์#nเท่านั้นสิ!"
10032040-82 = "งั้นก็แปลว่า... ตอนนี้คนที่กำลังทำตัวน่าสงสัยและคอยสังเกตสายตาคนอื่นอยู่คือคนที่มาเล่นงาน#nอารันซิโนหมดเลยเหรอ?"
10032040-83 = "ถ้าจริงอย่างนั้นละก็..."
10032040-87 = "คนทั้งหมดที่นี่... คือคนที่หมายหัวดอน อารันซิโนอยู่เหรอ...?"
10032040-94 = "ก็..."
10032040-95 = "อย่างที่เห็น..."
10032040-96 = "น่าเสียดายที่เหมือนจะเป็นอย่างนั้นนะ..."
10032040-100 = "หา...?"
10032040-101 = "วะ... ว่าไงนะ~~!?!?"
10032040-102 = "ฮ่าฮ่าฮ่าฮ่าฮ่า!! สุดยอดไปเลย!"
10032040-103 = "อารุจัง เราอุตส่าห์จับตัวคนน่าสงสัยเพื่อจะปกป้องผู้บริสุทธิ์ แต่สุดท้ายคนที่นี่กลับเป็นคนที่น่าสงสัย#nทั้งหมดเลยเหรอ!?"
10032040-104 = "นี่มันยิ่งกว่าสุดยอดอีกนะ! สนุกสุดๆ ไปเลย~!!"
10032040-105 = "ยะ... อย่าหัวเราะสิ!! ตอนนี้มันใช่เวลามาตลกกันอยู่รึไง!?"
10032040-106 = "แต่มันเกินคาดไปเลยนี่! อารุจังคิดไว้แล้วเหรอว่าเรื่องมันจะเป็นแบบนี้น่ะ? ฉันยังคาดไม่ถึงเลยนะ"
10032040-107 = "แล้วคุณครูล่ะ? คุณครูคาดไว้รึเปล่าว่าจะสถานการณ์จะเป็นแบบนี้?"
10032040-108 = "[s5] \"ไม่เลย พล็อตนี้ยิ่งกว่าละครอีกนะ\"\n[s6] \"เกินคาดอย่างที่ว่าจริงๆ ด้วย\""
10032040-111 = "เรื่องเหลวไหลแบบนี้มีที่ไหนกัน!? แล้วลิสต์รายชื่อที่เราได้มาล่ะ!? ไหนจะบัตรเชิญเข้างานอีก!? ไม่เหมือนที่คุยกันไว้นี่นา!!"
10032040-116 = "ไม่แปลกหรอก จริงๆ แล้วลิสต์ของแขกน่ะ ถ้าจะปลอมแปลงขึ้นมาก็ทำได้ไม่ยาก การเชื่อลิสต์ที่ได้มา#nโดยไม่กังขาอะไรเลยก็เป็นเรื่องไร้เดียงสาเกินไปด้วย..."
10032040-117 = "อารุจัง~ พอมาคิดๆ ดูแล้ว ที่พวกเราเข้ามาที่นี่ได้ก็เพราะใครบางคนปลอมแปลงลิสต์รายชื่อนี้มาให้#nไม่ใช่เหรอ?"
10032040-118 = "แล้วทำไมถึงนิ่งเฉยกันได้ขนาดนี้ล่ะ!!"
10032040-119 = "โอย... หัวจะปวด..."
10032040-120 = "ทำยังไงดีล่ะ? ใจเย็นๆ ตั้งสติสิอารุ ตั้งสติแล้วคิด ต้องคิดหาทางออกให้ได้"
10032040-121 = "ตอนนี้คงยังไม่มีเรื่องรุนแรงหรอก บรรยากาศตอนนี้ก็แค่หยั่งเชิงกันอยู่..."
10032040-122 = "ละ... แล้วพวกบอดี้การ์ดก็ยังคุ้มกันอยู่ด้วย ใช่แล้วละ ตอนนี้คงไม่มีเหตุอะไรรุนแรงหรอก"
10032040-123 = "เอาไงดีล่ะ? เราจัดก่อนเลยมั้ย? หรือว่าต้องรอจนจบแล้วค่อยจัดการตอนนั้น? เราจะชิลได้เบอร์นั้นเลยเหรอ? แล้วถ้าเป้าหมายเราถูกคนอื่นเล่นงานไปก่อนล่ะ?"
10032040-124 = "ย้ากกกก!! เตรียมตัวโดนได้เลย ดอน อารันซิโน!!"
10032040-128 = "[ns7] \"อ่า... เริ่มแล้วสินะ\"\n[ns8] \"จะเกิดเรื่องรุนแรงแล้วสิ\""
10032040-131 = "จะทำยังไงดีล่ะ!!!!!!!"
10032040-132 = "ต้องทำยังไงล่ะ!!! บอดี้การ์ดก็มาคุ้มกันแน่นหนาซะขนาดนั้น!!!!"
10032040-138 = "ไม่ต้องกังวลหรอก~ บอดี้การ์ดแค่ไม่กี่คนคงรับมือทุกคนในโรงละครโอเปร่านี้ไม่ได้อยู่แล้ว~"
10032040-139 = "ทีนี้เราทำยังไงดีล่ะประธาน? ควรไล่ตามไปด้วยมั้ย? หรือว่าจะดูสถานการณ์ไปก่อน?"
10032040-144 = "อะ... อืม... ใช่แล้วละ เราต้องเย็นไว้ก่อน นิ่งเข้าไว้... แล้วจับตาดูสถานการณ์..."
10032040-145 = "นี่ เจ้าพวกลูกกระจ๊อก! อย่ามาขวางนะ!!"
10032040-146 = "หะ... หืม...? พวกลูกกระจ๊อก...?"
10032040-147 = "หมายถึงฉันเหรอ...?"
10032040-148 = "อ่า..."
10032040-149 = "ประธาน ถ้าทำปฏิกิริยาแบบนั้นไปละก็..."
10032040-151 = "ใครหน้าไหนกล้าเรียกท่านอารุว่าลูกกระจ๊อกไม่ทราบบบบบ!!"
10032040-152 = "ยกโทษให้ไม่ได้!! ออกไปให้หมดเลยนะ!! เป้าหมายนั่นเป็นของท่านอารุคนเดียวเท่านั้นนนน!!!"
10032040-178 = "เฮ้อ..."
10032040-179 = "ฮ่าฮ่าฮ่าฮ่าฮ่า!!! ต้องอย่างนี้สิฮารุกะจัง!! ไม่เคยทำให้ผิดหวังเลยนะ!!"
10032040-182 = "อ่า..."
10032040-183 = "อ่า... อ่าาา..."
10032040-184 = "[s9] \"อารุ...?\"\n[s10] \"เอาไงดีล่ะทีนี้?\""
10032040-187 = "เฮือก...!"
10032040-188 = "ยังจะมาถามอยู่อีก!? ในเมื่อเป็นอย่างนี้แล้ว... เรายังเหลือทางเลือกอื่นอีกรึไง!!"
10032040-189 = "ไล่ตามไป!! ทุกคนไปจับตัวบอสมา!!"

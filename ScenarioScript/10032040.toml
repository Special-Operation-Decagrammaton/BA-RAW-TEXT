[translation]
10032040-1 = "第4話;沒想到會走到這一步"
10032040-21 = "閃開閃開，要是繼續在前面亂晃，到時候發生什麼我可不管啊！"
10032040-22 = "這個地方比想像中還好，我很滿意。"
10032040-23 = "我的位置在哪？作為一個有教養的人，我可不想害表演延遲。"
10032040-24 = "……真的不要緊嗎，頭目。"
10032040-25 = "現在有人盯上了頭目的情報也正在不停湧入。"
10032040-26 = "恐怕就連這座歌劇院裡也……#n在這種情況下堅持觀看表演是否有點……"
10032040-27 = "……住口。"
10032040-28 = "…………"
10032040-29 = "看來你並不理解啊。#n因為那種事而取消或改變行程，反而才正中對方的下懷。"
10032040-30 = "行程就照常進行。#n我們該做的不是躲避，而是阻止。"
10032040-31 = "何況我也準備了以防萬一的「對策」……"
10032040-32 = "……「對策」是嗎？"
10032040-33 = "呵呵，沒錯，詳細情況你沒必要知道。#n你只要在能力範圍內顧好本分就行了。"
10032040-34 = "聽懂的話就趕快帶路吧。站著很累。"
10032040-35 = "……我明白了，頭目。#n請往這邊……"
10032040-44 = "……帶著那種規模的人群行走，不會更顯眼嗎？"
10032040-45 = "反正那種等級的大人物也不可能一直躲躲藏藏的。#n採取那種方式反而比較聰明。"
10032040-46 = "不過對我們來說卻不是件好事呢。#n想在那種狀態下綁架他……並不容易。"
10032040-47 = "我明白為什麼其他傢伙打算把整個歌劇院炸掉了。"
10032040-48 = "現，現在還來得及，要不要由我來炸掉……？#n以那個幫派頭目和小嘍囉為目標，不計代價地……！"
10032040-49 = "[s1]「你，你先冷靜一點，遙香……！」\n[s2]「要是那樣的話，我們至今為止的努力就都白費了……！」"
10032040-55 = "沒必要著急。#n有人護衛是預料中的事，我們只要創造機會就行了。"
10032040-56 = "讓我在意的……反而是他提到的「對策」跟周遭的氛圍。"
10032040-57 = "確實……對策啊，這代表還有事情是我們所不知道的。"
10032040-61 = "……嗯？等等，在那之前……"
10032040-62 = "周遭的氛圍？那是什麼意思？"
10032040-63 = "……仔細看看周圍，社長。"
10032040-70 = "咦？好像莫名有股不平靜的感覺……"
10032040-71 = "那當然是因為有大人物出現，所以才會緊張……"
10032040-72 = "……錯了，不是那種感覺。"
10032040-73 = "雖然他們假裝挪開視線，其實還是一直注視著頭目的一舉一動。#n甚至不只是頭目，而是觀察著四周的一切。"
10032040-74 = "說不定……說不定這是……"
10032040-75 = "[s3]「剛剛也提過的『競爭者』們……？」\n[s4]「居然還有嗎？」"
10032040-78 = "……？嗯？"
10032040-79 = "……咦？"
10032040-80 = "等，等一下。那樣有點奇怪吧？"
10032040-81 = "我們不是已經把名單上所有身分不明的人抓起來了嗎？#n這樣剩下的應該只有登錄過身份的人才對啊！"
10032040-82 = "而且……你說現在正偷偷觀察周遭的，都是對頭目虎視眈眈的人？"
10032040-83 = "如果這話是真的……"
10032040-87 = "代表在場的所有人……全都盯上了頭目……？"
10032040-94 = "……唔……"
10032040-95 = "……似乎是呢。"
10032040-96 = "雖然遺憾……但實際上似乎就是那樣沒錯。"
10032040-100 = "……你……"
10032040-101 = "你，你說什麼～～！？！？"
10032040-102 = "啊哈哈哈哈！！真的假的！"
10032040-103 = "也就是說，亞瑠醬明明為了不傷及無辜而抓住了那些可疑的人，#n結果實際上這裡的所有人都是可疑的人嗎！？"
10032040-104 = "我的天！有夠好笑～！！"
10032040-105 = "不，不要笑！！有什麼好笑的！？"
10032040-106 = "不覺得很厲害嗎！？#n亞瑠醬有預想到事情會變成這樣嗎？我完全沒想到耶？"
10032040-107 = "老師你呢？有預想到現在這個情況嗎？"
10032040-108 = "[s5]「沒有，這實在是出乎意料。」\n[s6]「從各種方面來說，確實很厲害。」"
10032040-111 = "怎麼可能有這麼不像話的事！？#n那身分查核呢！？邀請函呢！？到底有什麼意義！？事情怎麼會變成這樣！！"
10032040-116 = "不過，其實名單這種東西，如果有心要偽造的話並不困難。#n直接相信名單確實太天真了……"
10032040-117 = "亞瑠醬～仔細想想，我們也是靠人偽造名單才能進來的人嘛～？"
10032040-118 = "你們為什麼能這麼冷靜啊！！"
10032040-119 = "唔……我的胃在翻騰……"
10032040-120 = "現在該怎麼辦？#n冷靜，先冷靜一點，亞瑠。冷靜下來好好思考。"
10032040-121 = "現在應該還不會發生什麼事，大家看起來都還在觀察情況……"
10032040-122 = "而，而且還有保鏢貼身保護！#n沒錯，現在應該沒事。"
10032040-123 = "該怎麼辦呢？先下手為強？還是要等最後再出手？有那種餘裕嗎？#n最終先動手的……"
10032040-124 = "哦哦哦哦哦──！！覺悟吧！唐．阿蘭奇諾！！"
10032040-128 = "[ns7]「……啊，開始了。」\n[ns8]「馬上就出事了。」"
10032040-131 = "怎麼會！！！！！！！"
10032040-132 = "到底為什麼！！！保鑣不是還在嗎！！！！"
10032040-138 = "嗯～區區幾名保鑣也無法對付整座歌劇院裡的人嘛～"
10032040-139 = "現在該怎麼辦，社長？#n我們也追上去嗎？還是要先觀察情況？"
10032040-144 = "唔，唔嗯。先冷靜一下吧，冷靜下來後……再觀察情況……"
10032040-145 = "那邊那些小嘍囉！！少礙事！"
10032040-146 = "嗯……？小嘍囉……？"
10032040-147 = "……是在說我嗎？"
10032040-148 = "……啊。"
10032040-149 = "社長。你做出這種反應的話……"
10032040-151 = "你們這些傢伙竟敢說亞瑠大人是小嘍囉──！！"
10032040-152 = "不可饒恕！！都給我消失吧！！#n那是亞瑠大人的獵物啊啊啊──！！！"
10032040-178 = "……唉。"
10032040-179 = "噗哈哈哈哈哈！！！不愧是遙香醬！！果然不會辜負我的期待！！"
10032040-182 = "……啊……"
10032040-183 = "啊……呃……唔……"
10032040-184 = "[s9]「……亞瑠？」\n[s10]「你現在打算怎麼做？」"
10032040-187 = "……哈！"
10032040-188 = "什，什麼怎麼做！？#n既然事情都變成這樣了……現在沒時間選擇手段跟方法了！！"
10032040-189 = "我們追上去！！大家，抓住頭目！！"

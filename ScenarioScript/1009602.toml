[translation]
1009602-1 = "挑選泳裝"
1009602-2 = "（按環奈的要求，前往了女武神警察學園）"
1009602-4 = "您來啦，[USERNAME]老師。謝謝您答應我的請求。"
1009602-5 = "[s]「只要是環奈的請求，我隨時歡迎。」"
1009602-6 = "是，是嗎？謝謝您。"
1009602-7 = "如同我先前所說，希望老師能提供一些工作方面的建議。"
1009602-8 = "[s1]「是有關救生員工作的建議對吧？」\n[s2]「是有關泳裝的建議對吧？」"
1009602-11 = "是的，您說的沒錯。我一個人實在有點難以抉擇。"
1009602-12 = "詳細情況我們換個地方再繼續說吧。"
1009602-16 = "就是這裡。"
1009602-17 = "[s3]「先，先等一下！這裡不是更衣室嗎！」\n[s4]「兩人在這種地方獨處不太好啊！」"
1009602-20 = "我能理解老師驚嚇的心情。"
1009602-21 = "但是我已經用我的名字取得了使用權，因此不會有其他人進來。"
1009602-22 = "[s]「不是那個問題……」"
1009602-23 = "請老師看這裡。"
1009602-27 = "水上樂園的救生員在任務中必須穿著泳裝。"
1009602-28 = "而這些是女武神準備的泳裝。"
1009602-29 = "由於並不是非常嚴謹的任務，所以沒有指定服裝……#n結果反而讓我更不知道該穿什麼泳裝才好。"
1009602-30 = "因此才會厚著臉皮請老師幫忙。"
1009602-31 = "[s5]「所以環奈的意思是……」\n[s6]「要我幫環奈挑選要在水上樂園穿的泳裝對吧？」"
1009602-34 = "是的。"
1009602-35 = "其實我幾乎沒穿過泳裝，所以不清楚該以什麼標準來挑選。"
1009602-36 = "這些泳裝的設計雖然都很常見……"
1009602-37 = "但要是布料面積太小的話，我擔心看起來會有點不知羞恥。"
1009602-38 = "[s]「確實是很大膽的設計。」"
1009602-42 = "[ns]「如果擔心布料面積的話，選這個怎麼樣呢？」"
1009602-46 = "這樣反而讓人有點害羞……！"
1009602-47 = "我希望泳裝的設計能更符合任務！"
1009602-48 = "也就是說，最好是能清楚表現出我是救生員的泳裝。"
1009602-49 = "[s]「原來如此，那這套還挺適合的吧？」"
1009602-55 = "穿上這個，確實能一眼就知道是救生員……"
1009602-56 = "不過這種設計還是有點……"
1009602-57 = "[s]「我覺得設計很搶眼，還挺好的啊……」"
1009602-58 = "可以的話，我還是希望設計能再普通一點……比方說這種。"
1009602-62 = "設計中規中矩，而且遮掩身體的布料面積也夠。#n只要把救生員的臂章戴在這裡，就算從遠處也能輕鬆辨認出來了吧。"
1009602-63 = "老師怎麼看？"
1009602-64 = "[s]「我覺得環奈說的很有道理。」"
1009602-65 = "那我就來試穿看看吧。"
1009602-66 = "……"
1009602-67 = "那個，抱歉，老師……"
1009602-68 = "[s7]「哎呀！抱歉！」\n[s8]「我都忘了這裡是更衣室！」"
1009602-74 = "我穿好了，老師覺得如何呢？"
1009602-75 = "[s9]「我覺得很適合環奈。」\n[s10]「很可愛呀？完全OK吧？」"
1009602-77 = "什，什麼可愛，請千萬別這麼說。"
1009602-78 = "可愛這個詞實在不太適合我。"
1009602-79 = "那就決定選這套吧。"
1009602-80 = "結果還是我自己選了呢。#n明明都請老師來幫忙了……"
1009602-81 = "很抱歉讓老師白跑一趟。"
1009602-82 = "[s]「別這麼說。」"
1009602-86 = "[ns]「光是能協助你做出選擇，我就很滿意了。」"
1009602-90 = "……是。"
1009602-91 = "非常感謝您的幫忙。"

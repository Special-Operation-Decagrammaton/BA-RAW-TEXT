[translation]
1009602-1 = "Let's Pick a Swimsuit"
1009602-2 = "At Kanna's request, I headed to Valkyrie Police School."
1009602-4 = "Welcome, [USERNAME] Sensei. I appreciate you being here."
1009602-5 = "[s] \"Always happy to help you, Kanna.\""
1009602-6 = "I-Is that so? I appreciate it."
1009602-7 = "As I mentioned earlier, I reached out because I need some advice on my mission."
1009602-8 = "[s1] \"The lifeguard mission, right?\"\n[s2] \"And also on swimwear?\""
1009602-11 = "Yes, that's right. I'm having trouble making this decision on my own."
1009602-12 = "We should discuss the details somewhere else."
1009602-16 = "Over here."
1009602-17 = "[s3] \"W-Wait! This is the changing room!\"\n[s4] \"It's not appropriate for us to be alone in a place like this.\""
1009602-20 = "I understand you're surprised."
1009602-21 = "But I've secured access under my own authorization. No one else is going to walk in."
1009602-22 = "[s] \"That's not the issue...\""
1009602-23 = "Well, in any case, let me show you..."
1009602-27 = "Lifeguard duties at the water park require a swimsuit..."
1009602-28 = "...and these are the options Valkyrie's provided."
1009602-29 = "There's no official dress code for this, so I'm not sure which one's the best choice."
1009602-30 = "Sorry to drag you out here for this, but could you help me pick out the right one?"
1009602-31 = "[s5] \"So...\"\n[s6] \"...You're asking me to choose a swimsuit for you?\""
1009602-34 = "That's correct."
1009602-35 = "I rarely wear swimsuits, so I'm at a bit of a loss here."
1009602-36 = "This design is the most popular, but..."
1009602-37 = "...it's also quite revealing, and might come across as inappropriate."
1009602-38 = "[s] \"It certainly is a daring design.\""
1009602-42 = "[ns] \"If you're looking for more coverage, how about this one?\""
1009602-46 = "That might actually be even more embarrassing...!"
1009602-47 = "I'd prefer something more suitable for the actual mission!"
1009602-48 = "Something that clearly shows I'm a lifeguard."
1009602-49 = "[s] \"Hmm, I think this one's perfect.\""
1009602-55 = "That DOES show I'm a lifeguard but..."
1009602-56 = "...well, it shows a lot."
1009602-57 = "[s] \"I actually appreciate its boldness...\""
1009602-58 = "Still, something a bit more modest...like this one, for example."
1009602-62 = "Simple design, decent coverage, and with a lifeguard armband, it should be easily recognizable from a distance."
1009602-63 = "What do you think, Sensei?"
1009602-64 = "[s] \"I think you're right, Kanna.\""
1009602-65 = "Good. I'll go ahead and try it on."
1009602-66 = "..."
1009602-67 = "Excuse me, Sensei, but if you wouldn't mind..."
1009602-68 = "[s7] \"Oops! Sorry!\"\n[s8] \"I forgot we're in the changing room!\""
1009602-74 = "Well, how does it look?"
1009602-75 = "[s9] \"I think it looks good on you.\"\n[s10] \"It's cute. Definitely works!\""
1009602-77 = "P-Please refrain from calling me 'cute.'"
1009602-78 = "That adjective doesn't suit me at all."
1009602-79 = "And...all right! This one, it is."
1009602-80 = "Hmm, I asked for your help, but then I picked it out myself anyway."
1009602-81 = "Sorry to make you come all the way out here for nothing."
1009602-82 = "[s] \"Don't worry about it.\""
1009602-86 = "[ns] \"I'm glad I could help you make your choice.\""
1009602-90 = "...All right, then."
1009602-91 = "Thank you for your help."

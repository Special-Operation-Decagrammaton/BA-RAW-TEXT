1009602-16 = "3;칸나;02;이곳입니다.\n#3;em;[반응]"
1009602-17 = "[s3] \"자, 잠깐! 여긴 탈의실이잖아!\"\n[s4] \"이런 장소에서 단둘은 좋지 않아!\""
1009602-18 = "#wait;10"
1009602-19 = "#wait;10"
1009602-20 = "3;칸나;99;놀라시는 것도 이해합니다."
1009602-21 = "3;칸나;01;하지만 일단 지금은 제 이름으로 사용 권한을 받아 놓았으니, 다른 사람이 들어올 일은 없습니다."
1009602-22 = "[s] \"그런 문제가 아닌데요…….\""
1009602-23 = "3;칸나;02;그럼 이쪽을 봐주시기 바랍니다.\n#3;em;[반응]"
1009602-24 = "#st;[0,0];instant;1;"
1009602-25 = "#clearST"
1009602-26 = "3;칸나;01\n#3;greeting\n#wait;1500"
1009602-27 = "3;칸나;02;워터파크에서의 라이프가드 임무는 그 특성상, 수영복을 필수적으로 착용해야 합니다."
1009602-28 = "3;칸나;01;여기 있는 것은 발키리에서 준비해 준 수영복들입니다."
1009602-29 = "3;칸나;04;다소 느슨한 임무기에 공식적으로 지정한 복장은 없지만……그래서 더욱, 어떤 것을 입으면 좋을지 알 수가 없게 되어 버렸습니다.\n#3;em;…"
1009602-30 = "3;칸나;07;염치 불고하고 선생님께 도움을 요청하고자 합니다."
1009602-31 = "[s5] \"그러니까…….\"\n[s6] \"칸나가 워터파크에서 입을 수영복을 골라 달라는 거지?\""

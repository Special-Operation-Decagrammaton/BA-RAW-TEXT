[translation]
1009602-1 = "ไปเลือกชุดว่ายน้ำกัน"
1009602-2 = "(คุณครูไปที่สถาบันฝึกตำรวจวัลคิรี่ตามคำขอของคันนะ)"
1009602-4 = "มาแล้วเหรอคะคุณครู [USERNAME] ขอบคุณที่ตอบรับคำขอร้องจากฉันนะคะ"
1009602-5 = "[s] \"ครูยินดีช่วยคันนะเสมอเลย\""
1009602-6 = "งะ... งั้นเหรอคะ ขอบคุณค่ะ"
1009602-7 = "อย่างที่ฉันบอกไปล่วงหน้าว่าฉันอยากได้คำแนะนำเกี่ยวกับภารกิจครั้งนี้ค่ะ"
1009602-8 = "[s1] \"คำแนะนำเกี่ยวกับภารกิจไลฟ์การ์ดใช่มั้ย?\"\n[s2] \"คำแนะนำเกี่ยวกับชุดว่ายน้ำใช่มั้ย?\""
1009602-11 = "ค่ะ ฉันตัดสินใจคนเดียวไม่ได้น่ะค่ะ"
1009602-12 = "ไว้คุยรายละเอียดหลังจากเราไปถึงที่กันเถอะค่ะ"
1009602-16 = "ที่นี่ละค่ะ"
1009602-17 = "[s3] \"ดะ... เดี๋ยวนะ! นี่มันห้องเปลี่ยนชุดไม่ใช่เหรอ!\"\n[s4] \"มาอยู่ที่แบบนี้กันสองต่อสองมันไม่ดีหรอกนะ!\""
1009602-20 = "ฉันเข้าใจค่ะว่าทำไมคุณครูถึงตกใจ"
1009602-21 = "แต่ฉันได้สิทธิ์การใช้งานห้องนี้ในนามหัวหน้ากรมฯ มาแล้ว ไม่มีคนอื่นเข้ามาได้หรอกค่ะ"
1009602-22 = "[s] \"ปัญหาไม่ได้อยู่ที่เรื่องนั้นหรอกนะ...\""
1009602-23 = "งั้นช่วยดูทางนี้หน่อยนะคะ"
1009602-27 = "ไลฟ์การ์ดในสวนน้ำจำเป็นต้องใส่ชุดว่ายน้ำในการทำงานค่ะ"
1009602-28 = "และชุดทั้งหมดที่เห็นคือชุดว่ายน้ำที่ทางวัลคิรี่เตรียมไว้ให้"
1009602-29 = "นี่ไม่ใช่ภารกิจที่เข้มงวดนัก จึงไม่มีการกำหนดเครื่องแต่งกายอย่างเป็นทางการ... ฉันก็เลยยิ่งคิดไม่ตก#nค่ะว่าจะต้องใส่ชุดแบบไหนดี"
1009602-30 = "ถึงจะน่าละอาย แต่ฉันอยากขอความช่วยเหลือจากคุณครูค่ะ"
1009602-31 = "[s5] \"งั้นก็แสดงว่า...\"\n[s6] \"คันนะขอให้ช่วยเลือกชุดว่ายน้ำที่จะใส่ในสวนน้ำเหรอ?\""
1009602-34 = "ใช่แล้วค่ะ"
1009602-35 = "ที่จริงฉันแทบไม่เคยใส่ชุดว่ายน้ำ ก็เลยไม่มั่นใจในการเลือกน่ะค่ะ"
1009602-36 = "ตรงนี้เป็นชุดว่ายน้ำในดีไซน์ที่คนใส่กันเยอะค่ะ..."
1009602-37 = "แต่ว่ามันดูน้อยชิ้นมาก ฉันคงใส่แบบนี้ไม่ไหวหรอกค่ะ"
1009602-38 = "[s] \"ถ้าจะใส่ก็ต้องใจกล้าอยู่นะ\""
1009602-42 = "[ns] \"ถ้าติดเรื่องดีไซน์ งั้นก็ลองเป็นชุดนี้มั้ย?\""
1009602-46 = "ชุดนั้นยิ่งน่าอายเข้าไปใหญ่ค่ะ...!"
1009602-47 = "แทนที่จะเป็นชุดแบบนี้..."
1009602-48 = "ฉันอยากได้ชุดว่ายน้ำที่ใส่แล้วรู้ว่าเป็นเจ้าหน้าที่ให้ความช่วยเหลือด้านความปลอดภัยมากกว่าค่ะ"
1009602-49 = "[s] \"อืม งั้นชุดนี้ก็น่าจะเหมาะเลยนะ\""
1009602-55 = "ถ้าใส่ชุดนี้ ใครเห็นก็คงรู้ได้ทันทีว่าเป็นไลฟ์การ์ด แต่ว่า..."
1009602-56 = "ดีไซน์มัน... ค่อนข้าง..."
1009602-57 = "[s] \"ครูว่ามันดูเอาจริงเอาจังดีนะ...\""
1009602-58 = "แต่ฉันอยากให้เป็นชุดที่ดูไม่หวือหวา... อย่างเช่นชุดนี้"
1009602-62 = "ดีไซน์ก็เรียบง่าย แล้วก็ปกปิดร่างกายได้พอสมควรเลยค่ะ ถ้าติดปลอกแขนไลฟ์การ์ด ต่อให้อยู่ไกลๆ ก็น่าจะมองเห็นได้ว่ามั้ยคะ?"
1009602-63 = "คุณครูว่ายังไงคะ?"
1009602-64 = "[s] \"คันนะพูดถูกแล้วละ\""
1009602-65 = "งั้นฉันจะลองใส่ดูค่ะ"
1009602-66 = "..."
1009602-67 = "อ่า ขอโทษนะคะคุณครู พอดีว่า..."
1009602-68 = "[s7] \"จริงสิ! ขอโทษทีๆ!\"\n[s8] \"ที่นี่มันห้องเปลี่ยนชุดนี่เนอะ!\""
1009602-74 = "ฉันเปลี่ยนชุดมาแล้วค่ะ เป็นยังไงบ้างคะ?"
1009602-75 = "[s9] \"เข้ากับคันนะดีนะ\"\n[s10] \"น่ารักแฮะ ครูให้ผ่านเลย\""
1009602-77 = "นะ... น่ารักงั้นเหรอคะ อย่าพูดแบบนั้นเลยค่ะ"
1009602-78 = "คำพูดแบบนั้นไม่ค่อยเหมาะกับฉันหรอกค่ะ"
1009602-79 = "ถ้างั้นฉันจะเลือกชุดนี้ค่ะ"
1009602-80 = "สุดท้ายฉันก็เลือกชุดเองจนได้นะคะ อุตส่าห์ขอให้คุณครูมาช่วยเลือกแท้ๆ..."
1009602-81 = "ขอโทษที่ทำให้มาเสียเที่ยวนะคะ"
1009602-82 = "[s] \"ไม่หรอก\""
1009602-86 = "[ns] \"แค่ครูได้มาช่วยคันนะเลือกก็ดีใจแล้วละ\""
1009602-90 = "ค่ะ..."
1009602-91 = "ขอบคุณที่มาช่วยนะคะ"

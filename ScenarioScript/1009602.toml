[translation]
1009602-1 = "#title;수영복을 고르자"
1009602-2 = "#na;(칸나의 요청을 받고 발키리 경찰학교로 향했다.)"
1009602-3 = "#all;hide"
1009602-4 = "3;칸나;01;오셨군요, [USERNAME] 선생님. 부탁을 들어주셔서 감사합니다.\n#3;a\n#3;em;[반응]"
1009602-5 = "[s] \"칸나의 부탁이라면 언제든 환영이지.\""
1009602-6 = "3;칸나;04;그, 그렇습니까. 감사합니다.\n#3;em;[땀]\n#3;stiff"
1009602-7 = "3;칸나;02;미리 말씀드렸다시피, 제 임무에 대해 조언이 필요해서 부탁드렸습니다."
1009602-8 = "[s1] \"라이프가드 임무에 대한 조언이라고 했지?\"\n[s2] \"수영복에 대한 조언이라고 했지?\""
1009602-9 = "#wait;10"
1009602-10 = "#wait;10"
1009602-11 = "3;칸나;07;네, 그렇습니다. 저 혼자서는 결정하기가 어렵더군요."
1009602-12 = "3;칸나;01;자세한 이야기는 장소를 옮겨서 계속하시지요."
1009602-13 = "#all;hide"

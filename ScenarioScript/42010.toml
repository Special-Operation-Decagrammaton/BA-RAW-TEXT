[translation]
42010-1 = "第1話;狐狸做的夢"
42010-14 = "D.U.郊外，凱薩工業第2工廠前"
42010-17 = "（──2年前）"
42010-18 = "各位觀眾，大家好！#n我們是奇普托斯報導最正確、最快速的克洛盧斯學園新聞部！"
42010-19 = "今天在凱薩工業的第2工廠前為各位進行實況轉播。"
42010-20 = "雖然這裡的彈藥產量接近凱薩工業整體的3成，然而卻流傳著一個可疑的傳聞。"
42010-21 = "那就是……第2工廠疑似正在開發違反聯邦學生會條例的大規模破壞性武器！"
42010-22 = "凱薩工業方面雖強力否認此一事實，然而卻未能提出有效的反證，#n市民們依舊感到不安。"
42010-23 = "儘管女武神警察學園以盡速解決為目標，調查的情況似乎仍停滯不前。#n此外，也出現聯邦學生會長派遣了特別調查小隊的傳聞──"
42010-27 = "哇哇！剛，剛才工廠發生了爆炸……！"
42010-28 = "究竟發生了什麼呢？#n難道是傳說中的大規模破壞性武器──"
42010-30 = "咳咳，咳咳……"
42010-31 = "御伽，這是怎麼回事？#n我可沒聽說過出口有詭雷啊！"
42010-32 = "啊，我剛才正想說的。"
42010-33 = "你倒是早點說啊！"
42010-34 = "胡桃醬，你突然跑得太快了啦……"
42010-35 = "幸好作戰結束後，大家看起來也都沒事。"
42010-37 = "就在剛才，彈藥工廠裡出現了一群武裝學生！"
42010-38 = "他們就是那個特別調查小隊嗎！？"
42010-39 = "我們是克洛盧斯新聞部！#n麻煩請說幾句話吧！"
42010-41 = "啊哈哈……好像被包圍了呢……"
42010-42 = "……沒辦法了。#n趁這個機會介紹SRT也不錯，吧。"
42010-43 = "說到SRT……是聯邦學生會長組織的特殊部隊對吧？"
42010-45 = "奇普托斯的各位，初次見面。"
42010-46 = "我是SRT特殊學園，FOX小隊的小隊長七度雪乃。"
42010-47 = "SRT特殊學園是在聯邦學生會長的許可下，#n為解決女武神警察學園或各自治區的風紀委員難以應對的D.U.地區的犯罪而設立。"
42010-48 = "解決D.U.的犯罪……也就是說，SRT特殊學園將會取代女武神警察學園嗎？"
42010-49 = "……不是的。我們只是負責處理女武神警察學園無法觸及的犯罪，#n或是解決像這次一樣必須先發制人的事件的隊伍罷了。"
42010-51 = "原來如此，那麼這座第2工廠究竟發生了什麼呢？"
42010-52 = "或者說，這裡正在開發違法的大規模破壞性武器是事實嗎？"
42010-54 = "這個嘛……"
42010-58 = "嗯……這次的事件沒有限制報導，應該沒關係吧。"
42010-59 = "幾天前，我們透過匿名線人獲得的情報，#n取得了凱薩工業第2工廠存放著違反條例的強力炸彈的有力證據。"
42010-60 = "凱薩工業去年公開的「A.N.T.I.O.C.H.」──#n即在進行舊型熱壓手榴彈的改良事業時製作的彈道導彈用熱壓彈頭。#n在這裡保管的便是其樣品。"
42010-62 = "不過，我們剛才已經使其失去了功能，現在可以放心了。"
42010-63 = "彈道導彈用的熱壓彈頭……威力究竟有多大呢？"
42010-64 = "由於目前還是樣品，真實的威力尚不清楚……"
42010-66 = "不過根據彈頭的大小及既存的研究資料來推測，#n「A.N.T.I.O.C.H」彈頭爆炸的影響範圍或許可達半徑數km。"
42010-67 = "具，具有如此威力的炸彈，居然只以小隊的規模來處理……#n是否過於危險了呢？"
42010-68 = "我認為這是應該投入身著防護衣的工兵中隊的案件……"
42010-70 = "不，面對此等規模的炸彈，無論投入多少兵力都是沒有意義的。"
42010-71 = "這．種．時．候！#n就輪到我們SRT登場了！"
42010-72 = "SRT的小隊是由少數的菁英組成。#n因此能夠像這次的作戰一樣，在對方察覺之前掌握目標或進行壓制。"
42010-73 = "實際上，本次的作戰僅花費不到3分鐘便成功確保了彈頭。"
42010-74 = "……2分45秒。"
42010-75 = "如果沒有中途的交戰，應該還能再縮短15秒。"
42010-76 = "啊～是因為胡桃把應該丟向接近Delta地點警衛兵的閃光彈丟成了煙霧彈的關係吧？"
42010-77 = "我才沒搞錯！#n是因為那個傢伙戴著防閃光的特殊面罩。"
42010-78 = "再說，要不是有進行[ruby=Double Tap]雙連擊[/ruby]，被打倒的說不定就是我們了。"
42010-79 = "況且，如果御伽有事先擊倒那個警衛兵不就沒事了嗎？"
42010-80 = "那是因為……我忘了計算裝填好的彈藥數量……"
42010-81 = "只是在難以估計敵人數量的情況下，可愛狙擊手常犯的呆萌小失誤～"
42010-82 = "認真一點！"
42010-83 = "御伽醬、胡桃醬……在鏡頭前吵架有點……"
42010-85 = "總之，由於本次作戰以少數人員執行，因而得以迅速逮捕犯人並掌握事件真相。"
42010-86 = "在本次作戰取得的機密文件中，發現了與「A.N.T.I.O.C.H.」項目相關的複數人員收受賄賂並捏造彈藥工廠的安全報告書的事實。"
42010-87 = "而這些人員不只有凱薩集團的幹部，連防衛室的相關人員也在其中。"
42010-91 = "防衛室……不就是聯邦學生會的機構嗎？"
42010-92 = "雖然從結果來看，確實是揭露了聯邦學生會的安全保障存在漏洞……#n但依照聯邦學生會長指示行動的SRT公開這種情報真的沒問題嗎？"
42010-93 = "……沒有問題。"
42010-94 = "所謂正義，即符合真理的正確道理。"
42010-96 = "SRT的正義，面對任何情況都不會動搖。"
42010-107 = "…………"
42010-108 = "啊，雪乃醬。早呀。"
42010-110 = "……現在時間是？"
42010-111 = "奇普托斯標準時間……0315。"
42010-112 = "距離最後一班夜哨開始還有一點時間。要不要再多睡一會？"
42010-113 = "不必。我已經睡得很夠了。"
42010-116 = "……你好像做了個好夢呢。"
42010-117 = "為什麼會這麼想？"
42010-118 = "因為你睡覺的時候看起來很幸福。"
42010-119 = "……不，是個惡夢。"
42010-120 = "是在溫室裡生活時做過的，甜蜜的惡夢。"
42010-121 = "……這樣啊。"
42010-124 = "FOX4，請回報。"
42010-125 = "這裡是FOX4。#n目前聯邦學生會並沒有可疑的動向。"
42010-126 = "自從上次巨塔從天而降之後就一直處於混亂狀態。"
42010-127 = "特別是身為聯邦學生會長代理的琳行政官，由於在最混亂的情況下離開了崗位，#n在聯邦學生會內部也受到了指責。"
42010-128 = "也因此，他所提案的D.U.綜合復原政策似乎也很難順利通過。"
42010-129 = "嘛……畢竟我們在SRT學園關閉前襲擊聖所之塔時，#n刻意攻擊了支持琳行政官的派系，所以會庇護他的人所剩不多也是一部分原因。"
42010-130 = "……行政委員會主要部署的現況呢？"
42010-131 = "唔嗯，和之前一樣……文化室和保健室由於室長因上次的襲擊受傷，#n目前由次長們代理業務。"
42010-132 = "不過以次長的立場來看，我認為不太能期待他們的發言權。#n雖然工作本身應該不成問題。"
42010-133 = "那就好……繼續觀察吧。"
42010-137 = "那個……小隊長，不，FOX1。"
42010-138 = "我只是假設而已……"
42010-139 = "要是停職中的室長們回歸了的話該怎麼辦？"
42010-140 = "那樣一來……香耶室長會相當困擾吧……？"
42010-141 = "因應緊急狀況的緊急協議之前應該說過了吧。"
42010-142 = "「組成行政委員會的幹部中，支持七神行政官的幹部人數#n　[ruby= ・     ・ ]永遠[/ruby]不能多於支持不知火室長的幹部人數。」"
42010-143 = "要是支持七神行政官的勢力試圖回歸，就以「無法動彈」的程度加以處理。"
42010-147 = "……FOX4，了解。"
42010-152 = "FOX3，請回報。"
42010-153 = "這裡是FOX3。已按照計畫於北山區的鐵路車輛基地設置EMP炸彈，#n並使運行管理系統失效。主要電子設備的[ruby=癱瘓]破壞[/ruby]也已經完成。"
42010-154 = "EMP炸彈在爆炸後立刻進行了回收，#n因此負責的技術人員們應該也很難找到故障原因才對。"
42010-155 = "輿論的反應呢？"
42010-156 = "因為尚未公布事故的原因，大部分的市民似乎都認為是聯邦學生會的疏失。"
42010-157 = "我確認了SNS上的文章，火燒的還挺旺的。#n滿滿都是對交通室長和聯邦學生會長代理的批評。"
42010-158 = "了解。#nFOX3立刻回到HQ吧。"
42010-162 = "那個……這樣真的沒問題嗎……？"
42010-163 = "我剛才也遇到了因電車停駛去不了醫院而困擾的市民……"
42010-164 = "──那是會妨礙作戰進行的重要事項嗎？"
42010-168 = "……沒什麼。#nFOX3，報告完畢。"
42010-175 = "雪乃醬……我們這麼做真的沒問題嗎？"
42010-176 = "……什麼問題？"
42010-177 = "就算是為了讓SRT特殊學園復活，對市民造成這麼大的危害也有點……"
42010-181 = "我果然還是覺得……這並不是正義。"
42010-182 = "那是作戰中不需要有的問題。"
42010-183 = "我們是奉命執行作戰的武器。#n決定刀刃將揮向何處的並不是武器本身，而是握著刀柄的人。"
42010-184 = "面對敵人有所猶豫的武器──沒有作為武器的價值。"
42010-185 = "是非對錯……只有背負責任之人才能判斷。"
42010-186 = "…………"
42010-187 = "覺得過意不去的話要放棄也無所謂。#n我──FOX小隊會繼續進行作戰。"
42010-192 = "……FOX2，了解。"
42010-196 = "接下來剩下的……"
42010-197 = "就只有RABBIT小隊的處理了嗎。"
42010-198 = "RABBIT小隊？"
42010-199 = "什麼什麼，在說後輩們嗎？"
42010-200 = "……FOX3、FOX4。#n我剛才並沒有呼叫你們。"
42010-202 = "抱歉，突然聽到有趣的事情……"
42010-203 = "要去見後輩們嗎？#n我也想一起去！"
42010-204 = "唉……"
42010-206 = "反正事情剛好到一個段落了，#n大家久違地一起行動也不錯吧？"
42010-207 = "FOX3的作戰也結束了，#nFOX4在D-Day後也不必採取行動……"
42010-208 = "這麼說來，我們是不是連那個歡迎會都還沒幫RABBIT小隊舉辦？"
42010-209 = "啊啊，你是說SRT的慣例，要跟新人「玩樂」的歡迎會啊。"
42010-210 = "呵呵……那得趕快來準備派對用的豆皮壽司才行！"
42010-215 = "……算了，人多一點也沒什麼不好。"
42010-216 = "FOX3和FOX4結束目前的任務後立刻返回HQ。#n重新整備後，立刻開始進行「迎新派對」的準備。"
42010-221 = "了解！"
42010-225 = "畢竟是久違的邂逅，來盛大地迎接後輩們吧。"
42010-227 = "下一話;兔子做的夢"

42010-14 = "#place;D.U. 교외. 카이저 인더스트리 제2 탄약공장 앞"
42010-15 = "#wait;1000"
42010-16 = "#wait;500"
42010-17 = "#na;(……2년전.)"
42010-18 = "#na;크로노스 기자;안녕하세요, 시청자 여러분! 키보토스에서 가장 빠르고 정확한 뉴스를 전해드리는 크로노스 학원 보도부입니다!"
42010-19 = "#na;크로노스 기자;저희는 지금 카이저 인더스트리의 제2 탄약공장 앞에 나와있는데요."
42010-20 = "#na;크로노스 기자;카이저 인더스트리의 전체 탄약 중 3할 가까이를 생산하고 있는 이 조병창에 최근 수상한 소문 하나가 퍼지고 있다고 합니다."
42010-21 = "#na;크로노스 기자;그 소문은 바로…… 이 제2 탄약공장에서 총학생회 조례에 위배되는 대량파괴무기를 개발하고 있다는 의혹인데요!"
42010-22 = "#na;크로노스 기자;다만 카이저 인더스트리 측이 이 사실을 강력하게 부인하고 있는 데다가, 이 사실을 입증할 수 있는 뾰족한 증거 또한 나오지 않은 상황이라. 의혹만이 계속되고 있습니다."
42010-23 = "#na;크로노스 기자;발키리 경찰학교의 수사가 지지부진한 가운데, 또 다른 정보통에 의하면 이번에 총학생회장이 새롭게 조직한 특수조사팀을 파견했다는 소문도—"
42010-24 = "#st;[0,0];instant;1;"
42010-25 = "#clearST"
42010-26 = "#bgshake\n#wait;1000"
42010-27 = "#na;크로노스 기자;앗, 말씀드리는 순간 거대한 폭발이……!"
42010-28 = "#na;크로노스 기자;무슨 일일까요? 설마 소문의 그 대량파괴무기가 폭발하기라도 한 걸까요?!"
42010-29 = "#all;hide"
42010-30 = "#na;쿠루미;콜록, 콜록……"
42010-31 = "#na;쿠루미;뭐 하는 거야, 오토기! 출구에 부비트랩이 있다는 이야기는 못 들었다고!"
42010-32 = "#na;오토기;아. 그거 방금 말하려고 했는데."
42010-33 = "#na;쿠루미;나가기 전에 말해줬어야지!"
42010-34 = "#na;니코;쿠루미 쨩은 너무 의욕이 앞선다니까……."
42010-35 = "#na;유키노;그래도 작전이 끝난 뒤였고. 크게 다친 사람도 없어서 다행이야."
42010-36 = "#all;hide"
42010-37 = "#na;크로노스 기자;방금 폭발과 함께 탄약 공장에서 한 무리의 무장한 학생들이 나타났습니다!"
42010-38 = "#na;크로노스 기자;저들이 소문의 그 총학생회장이 조직한 특수조사팀일까요?"
42010-39 = "#na;크로노스 기자;저, 무슨 일이 일어난 건가요? 한 말씀 부탁드리겠습니다!"
42010-40 = "#zmc;instant;-158,333;1896\n#all;hide"
42010-41 = "#zmc;instant;-158,333;1896\n#na;니코;아하하…… 어느새 기자들이 잔뜩 몰려왔네요……."
42010-42 = "#zmc;instant;-158,333;1896\n#na;유키노;……어쩔 수 없지. 이참에 SRT의 소개를 정식으로 하는 것도 나쁘지 않고."
42010-43 = "#zmc;instant;-158,333;1896\n#na;크로노스 기자;SRT라면…… 혹시 그 총학생회장이 조직했다는 소문의 특수부대가 여러분인가요?"
42010-44 = "#zmc;move;-158,333;1896;10"
42010-45 = "#zmc;move;316,333;1896;500\n#na;유키노;키보토스의 시민 여러분께는 처음으로 인사드리는군요."
42010-46 = "#zmc;instant;316,333;1896\n#na;유키노;SRT 특수학원, FOX 소대의 소대장. 시치도 유키노입니다."
42010-47 = "#zmc;instant;316,333;1896\n#na;유키노;저희 SRT 특수학원은 총학생회장의 사전 활동 허가를 받은 특수 부대로, 발키리 경찰학교나 각 자치구의 선도위원들이 대응하기 어려운 D.U.의 범죄를 해결하기 위해 조직되었습니다."
42010-48 = "#zmc;instant;316,333;1896\n#na;크로노스 기자;D.U.의 범죄를 해결한다면…… 앞으로는 SRT 특수학원이 발키리 경찰학교를 대체하게 되는 건가요?"
42010-49 = "#zmc;instant;316,333;1896\n#na;유키노;……그렇지는 않습니다. 저희는 어디까지나 발키리 경찰학교의 손이 닿지 않는 사각지대의 범죄자나 이번처럼 선제 조치가 필요한 사건에 대응하는 팀일 뿐이니까요."
42010-50 = "#zmc;move;316,333;1896;10"
42010-51 = "#zmc;move;0,0;3160;500\n#na;크로노스 기자;그보다 지금 이곳, 제2 탄약공장에서는 무슨 일이 일어나고 있는 건가요?"
42010-52 = "#zmc;instant;0,0;3160\n#na;크로노스 기자;이곳에 그 소문의 대량파괴무기가 있다는 게 사실인가요?"
42010-53 = "#zmc;instant;-158,333;1896"
42010-54 = "#zmc;instant;-158,333;1896\n#na;니코;으음……"
42010-55 = "#st;[0,0];instant;1;"
42010-56 = "#clearST"
42010-57 = "#zmc;instant;-158,333;1896\n#wait;1500"
42010-58 = "#zmc;instant;-158,333;1896\n#na;니코;뭐…… 이번 사건에 대해서는 별도의 엠바고가 걸리지 않았으니 괜찮겠죠."
42010-59 = "#zmc;instant;-158,333;1896\n#na;니코;수일 전, 저희는 익명의 정보원으로부터 이곳 카이저 인더스트리 제2 탄약공장에 총학생회 조례에 위배되는 강력한 폭탄이 보관되고 있다는 증거를 입수했습니다."
42010-60 = "#zmc;instant;-158,333;1896\n#na;니코;카이저 인더스트리는 지난해 발표한 <A.N.T.I.O.C.H.>— 구형 열압력 수류탄 개량 사업으로 알려진 개발 프로젝트를 통해 탄도 미사일용 열압력 탄두를 제작하였고, 이곳에 그 시제품을 보관하고 있었습니다."
42010-61 = "#all;hide"
42010-62 = "#na;쿠루미;뭐, 그 폭탄은 우리가 방금 무력화시켰으니 이제는 안심해도 좋아."
42010-63 = "#na;크로노스 기자;탄도 미사일용의 열압력 탄두라면…… 위력이 얼마나 되는 건가요?"
42010-64 = "#na;니코;양산되지 않은 시제품이라 위력을 확신하긴 어렵습니다만……"
42010-65 = "#all;hide"
42010-66 = "#na;니코;탄두의 크기와 기존 연구 데이터를 기반으로 추측했을 때, <A.N.T.I.O.C.H> 탄두의 폭발이 영향을 끼치는 유효 반경은 수 km에 달할 것으로 추측됩니다."
42010-67 = "#na;크로노스 기자;그, 그 정도 위력의 폭탄이라면 소대 규모의 부대가 상대하기엔 너무 위험한 물건 아닌가요?"
42010-68 = "#na;크로노스 기자;제대로 방호복을 갖춰 입은 공병 중대를 투입한다든가……"
42010-69 = "#all;hide"
42010-70 = "#na;유키노;이 정도로 위험한 폭탄이라면 보병 병력을 얼마나 투입한다 하더라도 의미가 없습니다."
42010-71 = "#na;오토기;네. 오히려 그렇기 때문에 이런 작전에서는 저희 SRT가 나서야 하는 거죠!"
42010-72 = "#na;오토기;저희 SRT의 소대는 소수 정예의 팀으로 구성되어 있기 때문에, 이번 작전처럼 상대가 알아차리기 전에 목표를 확보하거나 요인을 제압하는 일에 특화되어 있습니다."
42010-73 = "#na;니코;이번 작전만 하더라도 건물에 진입한 뒤 탄두를 확보하는 데까지 3분도 걸리지 않았으니까요."
42010-74 = "#na;쿠루미;……2분 45초."
42010-75 = "#na;쿠루미;중간에 갑작스러운 교전만 없었더라면 15초는 더 단축할 수 있었을 거야."
42010-76 = "#na;오토기;아~ 쿠루미가 실수로 포인트 델타에서 다가오던 경비병에게 섬광탄이 아니라 연막탄을 던졌을 때 말이지?"
42010-77 = "#na;쿠루미;실수가 아니거든? 그 녀석, 섬광 방호 효과가 있는 특수 바이저를 쓰고 있었단 말이야!"
42010-78 = "#na;쿠루미;근거리에서 더블탭 사격을 하지 않았으면 역으로 이쪽이 당했을걸."
42010-79 = "#na;쿠루미;그보다 오토기. 어째서 내가 돌입하기 전에 그 경비병을 처치하지 못한 거야?"
42010-80 = "#na;오토기;아, 그게…… 장전해 둔 탄약의 숫자를 세는 걸 깜박하는 바람에……"
42010-81 = "#na;오토기;적의 숫자를 가늠하기 어려운 상황에서 저격수가 흔히 저지르는 사소하고 앙증맞은 실수라고 할까~"
42010-82 = "#na;쿠루미;작전 중의 실수에 그런 귀여운 형용사를 붙이지 마!"
42010-83 = "#na;니코;오토기 쨩, 쿠루미 쨩…… 기자 여러분이 보고 있으니 카메라 앞에서의 싸움은 조금……"
42010-84 = "#zmc;instant;0,0;2528"
42010-85 = "#zmc;instant;0,0;2528\n#na;유키노;그 말대로 이번 작전은 소수의 인원으로 신속하게 진행되었기 때문에 범인을 놓치는 일 없이 사건의 진상을 파악할 수 있었습니다."
42010-86 = "#zmc;instant;0,0;2528\n#na;유키노;이번 작전 중 탄약공장 내에 보관된 기밀 서류에서 카이저 그룹의 고위 임원들은 물론이고, 방위실 일부 임원들의 이름도 확인할 수 있었습니다만……"
42010-87 = "#zmc;instant;0,0;2528\n#na;유키노;이 임원들이 <A.N.T.I.O.C.H.> 프로젝트의 발족을 앞두고 금품을 수수하여 탄약공장의 안전 보고서를 허위로 기재했다는 사실이 발견되었습니다."
42010-88 = "#zmc;instant;0,0;2528\n#st;[0,0];instant;1;"
42010-89 = "#zmc;instant;0,0;2528\n#clearST"
42010-90 = "#zmc;move;0,0;2528;10"
42010-91 = "#zmc;move;0,0;3160;500\n#na;크로노스 기자;방위실이라면…… 키보토스의 치안을 책임지는 총학생회의 기관이 아닌가요?"
42010-92 = "#na;크로노스 기자;결과적으로는 총학생회의 치안에 허점이 있다는 것이 밝혀진 셈인데, 총학생회장의 지시를 받아 움직이는 SRT가 이런 정보를 공개해도 괜찮은 건가요?"
42010-93 = "#na;유키노;……문제없습니다."
42010-94 = "#na;유키노;정의란, 진리에 들어맞는 올바른 도리."
42010-95 = "#zmc;instant;316,333;1896"
42010-96 = "#zmc;instant;316,333;1896\n#na;유키노;SRT의 정의는, 그 어떤 상황에서도 변하지 않습니다."

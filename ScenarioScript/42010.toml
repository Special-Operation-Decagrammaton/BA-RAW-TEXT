[translation]
42010-1 = "Episode 1;The Fox's Dream"
42010-14 = "Outside of Kaiser Industries' Second Ammo Factory, D.U. Outskirts"
42010-17 = "...Two years ago."
42010-18 = "Good evening! And welcome to the Kronos School of Journalism channel, your one, true source for all the hottest news!"
42010-19 = "We are currently standing directly in front of the Kaiser Industries' Second Ammo Factory!"
42010-20 = "This factory produces nearly a third of Kaiser Industries' total ammunition, and recently, strange rumors have been circulating about this powerhouse."
42010-21 = "Allegedly, this Second Ammo Factory is developing weapons of mass destruction, in direct violation of  General Student Council policies!"
42010-22 = "However, Kaiser Industries is vehemently denying this, and the rumors remain unsubstantiated. But this story is nowhere near over yet!"
42010-23 = "With Valkyrie Police School's investigation stalling, another source tells us that the General Student Council President has dispatched a newly-formed special investigation team to—"
42010-27 = "Ah! Did you get that? There was a huge explosion. This is live! I repeat, this is live!"
42010-28 = "We're investigating the cause of the explosion now! Could this be a side effect of their illegal weapons development?!"
42010-30 = "*cough cough*"
42010-31 = "What the hell, Otogi? You didn't report the booby trap at the exit!"
42010-32 = "The...? Oh! Oh. Yeah. I was gonna tell you."
42010-33 = "Next time, tell us before we trigger the bomb!"
42010-34 = "Kurumi sure is motivated, as usual!"
42010-35 = "It happened after the operation was over, and no one was injured. It's okay."
42010-37 = "We've spotted what appears to be several heavily-armed students emerging from the dust!"
42010-38 = "Could they be the rumored Special Response Team recently established by the General Student Council President?"
42010-39 = "Excuse me, hello! May we have a word? Who are you?!"
42010-41 = "Heehee. It seems the paparazzi's caught up to us."
42010-42 = "There's no time like the present, I guess. The President has been wanting to formally introduce SRT."
42010-43 = "Did I hear you say SRT? Does that mean the rumors are true?"
42010-45 = "Greetings, citizens of Kivotos."
42010-46 = "I'm Shichido Yukino, leader of the FOX Squad from SRT Academy."
42010-47 = "The General Student Council President formed SRT and the FOX Squad to give Kivotos a means to more effectively fight against threats too great for any one district or the Valkyrie police to address."
42010-48 = "If you were made to solve crime in the D.U., does that also mean SRT Academy intends to eventually usurp Valkyrie Police School?!"
42010-49 = "We could never hope to replace the invaluable work Valkyrie does to protect the public. We are a specialized operations teams trained to respond swiftly to criminals or situations that present an imminent threat to Kivotos' safety, as you saw today."
42010-51 = "Speaking of today, what were you doing in the Kaiser's ammo factory?! What was the cause of the explosion just now?"
42010-52 = "Can you confirm if there really are weapons of mass destruction being developed here?!"
42010-54 = "Well..."
42010-58 = "I mean... We didn't receive any embargo orders. I don't think there's any harm in telling you, now that the operation's over."
42010-59 = "A few days ago, we received evidence from an anonymous source that a powerful bomb was being stored here at Kaiser Industries' Ammo Factory in violation of General Student Council's bylaws."
42010-60 = "Last year, Kaiser announced a development project called A.N.T.I.O.C.H. undertaking the modification of old thermobaric grenades. In actuality, they were developing and storing thermobaric warheads for ballistic missiles here."
42010-62 = "Our mission today was to neutralize these explosives, and I'm pleased to report our success."
42010-63 = "A thermobarbaric warhead?! Just how much danger were the people of Kivotos in?"
42010-64 = "It's a pre-production prototype, and we're still in the process of analyzing it..."
42010-66 = "But based on our research so far and simply the sheer size of the warhead, we estimate the A.N.T.I.O.C.H.'s radius when detonated could span several kilometers."
42010-67 = "Several kilometers?! And just your squad was enough to handle something so explosive?"
42010-68 = "I mean, wouldn't it have required an entire unit with tons of protective gear?"
42010-70 = "With a bomb that dangerous, it doesn't matter how much infantry you throw at it."
42010-71 = "What she said. It's exactly stuff like this that SRT's around for."
42010-72 = "SRT's made of small teams of elites trained in securing or neutralizing the targets before they even know what's happening, like we did in this operation."
42010-73 = "And we're pretty good at it! It took us less than three minutes to secure the warhead after infiltrating the building."
42010-74 = "...Two minutes and forty-five seconds to be exact."
42010-75 = "It would have been two minutes and thirty seconds had we not had to handle the unexpected engagement at the entrance."
42010-76 = "\"Unexpected engagement\"... Pfft. Do you mean, if it wasn't for Kurumi accidentally throwing a smoke grenade instead of a flash grenade toward Point Delta?"
42010-77 = "Accident?! The guards were wearing visors for flash protection!"
42010-78 = "I made a tactical decision to close the distance with a smoke grenade and incapacitate them."
42010-79 = "And that wouldn't have even been necessary if you had taken out the guard as detailed by the operation plans!"
42010-80 = "Oh. Heehee. Well, sometimes, I forget to count the number of rounds I have loaded."
42010-81 = "It's an adorable little mistake that's very common for snipers to make. How can we count all those teensy weensy enemies?"
42010-82 = "Don't act cute to distract from your mistakes!"
42010-83 = "Now, now. Otogi, Kurumi, let's not fight in front of the cameras!"
42010-85 = "To conclude, this operation was a success thanks to the discrete and timely manner in which we were able to execute our plan. The bomb is secured, and the suspect was apprehended."
42010-86 = "We were also able to identify the names of several executives of the Kaiser Industries, as well as some members of the Defense Office, listed on classified documents discovered in the factory..."
42010-87 = "It appears these executives accepted bribes in advance of the launch of the A.N.T.I.O.C.H. project in exchange for forging safety reports for the ammunition factory."
42010-91 = "Isn't the Defense Office...an agency of the General Student Council, responsible for policing Kivotos?"
42010-92 = "So ultimately, aren't you revealing holes in the General Student Council's security?! Is it okay for SRT, which operates under the direct order of the president, to reveal information like this?!"
42010-93 = "...You misunderstand."
42010-94 = "Justice is the path to preserving truth."
42010-96 = "No matter the obstacle, SRT's justice never wavers."
42010-107 = "..."
42010-108 = "Oh! Good morning, Yukino."
42010-110 = "Morning? What time is it?"
42010-111 = "0315. Kivotos Standard Time..."
42010-112 = "We have time until the next shift gets here. Rest more, while you can."
42010-113 = "I'm fine. Thank you for keeping watch."
42010-116 = "...Were you having a nice dream?"
42010-117 = "Hm... What makes you say that?"
42010-118 = "I thought I detected the barest hint of a smile in your sleep."
42010-119 = "Hah. It was more like a nightmare."
42010-120 = "A bittersweet memory that echoes in my mind."
42010-121 = "Ah... That, I understand."
42010-124 = "FOX 4. Status?"
42010-125 = "FOX 4 here. The General Student Council is still snoozin'."
42010-126 = "The General Student Council hasn't recovered from the apocalypse towers. They're still in turmoil."
42010-127 = "Acting President Rin's got it the worst. She's being criticized left and right for her seeming absence during the crisis."
42010-128 = "And because of that, no one wants to pass her D.U. Restoration Policy. They're at a total standstill."
42010-129 = "I guess that means the plan's working. If we hadn't attacked Sanctum Tower right before SRT closed and took out all of Rin's supporters, she wouldn't be facing the lion's den right now."
42010-130 = "And what of the Board of Administration?"
42010-131 = "Boring. The Culture and Medical officers still haven't recovered from injuries sustained during the raid. Senior managers are still quietly substituting for them."
42010-132 = "It's not affecting their day-to-day tasks, but the Board of Administration doesn't have any kind of official authority at the helm right now."
42010-133 = "That's good. Alert me immediately if there are any changes."
42010-137 = "Uh... Squad lead... I mean, FOX 1."
42010-138 = "But, what if..."
42010-139 = "What if the chiefs do recover and come back to the Board?"
42010-140 = "Wouldn't it just be over for Kaya?"
42010-141 = "I gave you the emergency protocols to review, FOX 4."
42010-142 = "\"At any given time, the Chief of Defense Kaya must always hold the majority support of the Board of Administration over Chief Officer Rin.\""
42010-143 = "\"Should Chief Officer Rin's supporters attempt to return to the Board, the FOX Squad is authorized to use any means necessary to sufficiently incapacitate them for the forseeable future.\""
42010-147 = "...FOX 4, out."
42010-152 = "FOX 3. Status?"
42010-153 = "FOX 3, reporting. We detonated the EMP bomb at the railroad vehicle base in the Kitayama District and disabled the operation management system. Their key electronic equipment has all been sabotaged."
42010-154 = "Immediate recovery of the EMP bomb was successful as well, so the cause of the malfunction will be near impossible to trace."
42010-155 = "Has the media picked up on it? How is the coverage?"
42010-156 = "The General Student Council hasn't made an official statement, likely because they can't identify the cause. So the public has been assuming it was an accident on the Council's part."
42010-157 = "The Director of Transportation and Acting General Student Council President Rin have been taking the brunt of blame. They won't be able to escape the media scrutiny for a while."
42010-158 = "Copy that. FOX 3, return to HQ immediately."
42010-162 = "FOX 1, I have a question... Do you think... Is this justice?"
42010-163 = "During the operation, we encountered a citizen unable to reach the hospital and receive care because the trains were down. If we carry on with this kind of—"
42010-164 = "Did that citizen interfere with your operation in any way?"
42010-168 = "...No. No, they did not. Understood. FOX 3, returning to HQ now."
42010-175 = "Yukino... Come now..."
42010-176 = "I don't need your quippy remarks right now, Niko."
42010-177 = "Then I won't quip. I'll follow you into hell for the revival of SRT, but what we're doing right now? We're harming innocent civilians."
42010-181 = "Kurumi wasn't wrong. This isn't the justice SRT fights for. Don't you think so?"
42010-182 = "I abandoned those kinds of questions when we took on this operation. I suggest you do the same."
42010-183 = "SRT has always been a weapon. Wherever the user decides to point that weapon and shoot it is both their privilege and responsibility."
42010-184 = "No one wants a weapon with its own free will. With an opinion."
42010-185 = "Morality... Ethics... Those concepts are the curse the user bears."
42010-186 = "..."
42010-187 = "If you can't accept your role, leave. I... The FOX Squad will persevere."
42010-192 = "...FOX 2, out."
42010-196 = "Right. Our last order of business..."
42010-197 = "We'll need to make contact with the RABBIT Squad."
42010-198 = "The RABBIT Squad?"
42010-199 = "You're gonna go see the little ones?"
42010-200 = "...FOX 3, FOX 4. Please don't speak out of turn."
42010-202 = "Sorry, sorry. I get excited at the prospect of a good time."
42010-203 = "I want to go see the underclassmen too though..."
42010-204 = "*sigh*"
42010-206 = "We've handled all of our urgent missions... Why don't we have a group bonding activity? When's the last time we were all together?"
42010-207 = "FOX 3 and 4 fulfilled all their orders already. Four won't even have to move until after D-Day."
42010-208 = "What she said! And the RABBITs haven't even had an initiation ceremony yet, you know."
42010-209 = "We would be bereft of SRT tradition if we didn't participate in at least a little light hazing."
42010-210 = "Heehee. I'll have to get started now if I want to have enough inarizushi for everyone."
42010-215 = "...Okay, okay. Convincing the underclassmen won't be easy, so it'll be better to show a united front anyways."
42010-216 = "FOX 3 and FOX 4, return to HQ and begin preparations for our welcome party."
42010-221 = "Roger!"
42010-225 = "It's been quite some time, so let's make sure it's a warm welcome."
42010-227 = "Next Episode; A RABBIT's Dream"

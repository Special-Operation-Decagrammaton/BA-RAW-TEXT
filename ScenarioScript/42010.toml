42010-124 = "3;유키노;02;FOX 4. 보고.\n#3;a\n#3;em;[반응]"
42010-125 = "3;유키노;02\n1;통신오토기;99;여기는 FOX 4. 총학생회에는 현재 특이 동향 없음.\n#1;a\n#3;m5"
42010-126 = "1;통신오토기;02;지난번 하늘에서 거대한 탑이 떨어진 이후로 총학생회는 계속해서 혼란의 연속이야."
42010-127 = "1;통신오토기;01;특히 총학생회장 대행인 린 행정관은 가장 혼란스러운 시기에 자리를 비운 건 때문에 총학생회 내에서도 계속 비난을 받고 있어."
42010-128 = "1;통신오토기;99;때문에 그녀가 제시한 D.U. 종합 복구 정책도 쉽게 가결되지 않고 난항을 거듭하고 있지."
42010-129 = "1;통신오토기;03;뭐…… 물론 우리가 SRT 학원 폐쇄 직전 생텀타워를 공격했을 때, 린 행정관의 지지파를 중점적으로 저격한 탓에 그녀를 비호해 줄 만한 사람들이 별로 남아있지 않다는 점도 한몫했겠지만."
42010-130 = "3;유키노;01;……행정위원회 주요 부서의 현황은?\n#3;em;[?]"
42010-131 = "1;통신오토기;01;음, 다른 쪽은 전과 동일하고…… 문화실과 보건실은 지난 습격 때 다친 실장들이 복귀하지 못해서 차장들이 업무를 대행하는 중이야."
42010-132 = "1;통신오토기;02;업무에는 지장이 없겠지만, 행정위원회에서의 발언권은 기대하기 어려울 거야."
42010-133 = "3;유키노;99;다행이네. 계속 주시해 줘."
42010-134 = "#st;[0,0];instant;1;"

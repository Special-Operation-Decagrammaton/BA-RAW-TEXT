[translation]
42010-1 = "ตอนที่ 1;ความฝันของสุนัขจิ้งจอก"
42010-14 = "ชานเมือง D.U. หน้าโรงงานกระสุนแห่งที่ 2 ของไคเซอร์ อินดัสทรี"
42010-17 = "(...... 2 ปีก่อน)"
42010-18 = "สวัสดีค่ะท่านผู้ชมทุกท่าน! นี่คือชมรมข่าวโครโนส แหล่งข่าวที่นำเสนอทุกเรื่องราวอย่างรวดเร็ว และแม่นยำที่สุดค่ะ!"
42010-19 = "ตอนนี้พวกฉันอยู่กันที่หน้าโรงงานกระสุนแห่งที่ 2 ของไคเซอร์ อินดัสทรีค่ะ"
42010-20 = "โรงงานผลิตอาวุธแห่งนี้ผลิตกระสุนได้กว่า 30% ของไคเซอร์ อินดัสทรีทั้งหมด และหมู่นี้ก็มีข่าวลือ#nไม่ชอบมาพากลเกี่ยวกับที่นี่ค่ะ!"
42010-21 = "และข่าวลือที่ว่าก็คือ... โรงงานกระสุนแห่งที่ 2 นี้กำลังพัฒนาอาวุธทำลายล้างขั้นสูงที่ขัดต่อระเบียบ#nขององค์การนักเรียนค่ะ!"
42010-22 = "แต่ทางไคเซอร์ อินดัสทรีก็ออกมาปฏิเสธข้อกล่าวหานี้อย่างจริงจัง และตอนนี้เราก็ยังไม่มีหลักฐาน#nที่ชัดเจนที่จะพิสูจน์ข้อกล่าวหานี้ ประชาชนก็เลยยังคงข้องใจกันต่อไปค่ะ"
42010-23 = "ท่ามกลางการสอบสวนที่ล่าช้าของสถาบันฝึกตำรวจวัลคิรี่ ก็มีข่าวลือว่าประธานองค์การนักเรียนได้ส่ง#nทีมสืบสวนพิเศษที่จัดตั้งขึ้นมาใหม่—"
42010-27 = "อ๊ะ จู่ๆ ก็เกิดการระเบิดครั้งใหญ่ขึ้นมาค่ะ...!"
42010-28 = "นี่มันเรื่องอะไรกันคะ? หรือว่าอาวุธทำลายล้างขั้นสูงที่ลือกันระเบิดไปแล้วอย่างนั้นเหรอคะ?!"
42010-30 = "แค่กๆ แค่กๆ..."
42010-31 = "อะไรเนี่ย โอโทกิ! ไม่เห็นรู้มาก่อนเลยว่าจะมีกับดักอยู่หน้าทางออกด้วย!"
42010-32 = "อ๊ะ กำลังจะบอกอยู่พอดีเลย"
42010-33 = "ก็น่าจะบอกกันตั้งแต่ก่อนออกมาสิ!"
42010-34 = "คุรุมิจังเนี่ย ชอบผลีผลามอยู่เรื่อยเลย..."
42010-35 = "แต่ยังไงปฏิบัติการของเราก็สำเร็จแล้ว โชคดีที่ไม่มีใครได้รับบาดเจ็บร้ายแรงนะ"
42010-37 = "มีกลุ่มนักเรียนติดอาวุธกลุ่มหนึ่งปรากฏตัวพร้อมเสียงระเบิดที่โรงงานกระสุนค่ะ!"
42010-38 = "พวกเธอจะใช่ทีมสืบสวนพิเศษของประธานองค์การนักเรียนหรือเปล่าคะ?"
42010-39 = "เกิดเรื่องอะไรขึ้นเหรอคะ? ช่วยบอกพวกเราหน่อยค่ะ!"
42010-41 = "อะฮะฮ่า... พวกนักข่าวมากันเต็มเลยนะคะ..."
42010-42 = "...ช่วยไม่ได้ งั้นใช้โอกาสนี้แนะนำ SRT อย่างเป็นทางการไปเลยก็ไม่เลวนะ"
42010-43 = "SRT งั้นเหรอ... หรือว่าพวกคุณคือหน่วยรบพิเศษที่ประธานองค์การนักเรียนจัดตั้งขึ้นคะ?"
42010-45 = "นี่เป็นครั้งแรกที่ได้ทักทายชาวเมืองคิโวทอสเลยละค่ะ"
42010-46 = "ฉันคือหัวหน้ากองทหาร FOX สถาบันพิเศษ SRT ชิจิโดะ ยูกิโนะค่ะ"
42010-47 = "สถาบันพิเศษ SRT ของพวกเราคือกองกำลังพิเศษที่ได้รับอนุญาตในการปฏิบัติการจากประธานองค์การ#nนักเรียน และถูกจัดตั้งขึ้นมาเพื่อแก้ปัญหาอาชญากรรมใน D.U. ที่สถาบันฝึกตำรวจวัลคิรี่ หรือแต่ละเขต#nปกครองตนเองรับมือได้ยากค่ะ"
42010-48 = "แก้ปัญหาอาชญากรรมใน D.U... หมายความว่าต่อไปสถาบันพิเศษ SRT จะมาแทนสถาบันฝึกตำรวจ#nวัลคิรี่เหรอคะ?"
42010-49 = "... ไม่หรอกค่ะ พวกฉันเป็นแค่ทีมที่รับมือกับอาชญากรที่ก่อเหตุในความดูแลของสถาบันฝึกตำรวจ#nวัลคิรี่ไปไม่ถึง หรือไม่ก็เหตุการณ์ที่ต้องใช้มาตรการโจมตีเหมือนครั้งนี้ค่ะ"
42010-51 = "จะว่าไปแล้ว เกิดเรื่องอะไรขึ้นกับโรงงานกระสุนแห่งที่ 2 นี้เหรอคะ?"
42010-52 = "ข่าวลือเรื่องอาวุธทำลายล้างขั้นสูงของที่นี่เป็นความจริงไหมคะ?"
42010-54 = "อืม..."
42010-58 = "ก็นะ... ยังไงก็ไม่ได้มีการห้ามพูดถึงสถานการณ์นี้ งั้นคงเล่าได้อยู่ค่ะ"
42010-59 = "เมื่อไม่กี่วันก่อน เราได้รับการรายงานจากหน่วยข่าวกรองนิรนามว่ามีการเก็บหลักฐานที่ชี้ว่าโรงงาน#nกระสุนแห่งที่ 2 ของไคเซอร์ อินดัสทรีกักเก็บระเบิดร้ายแรงที่ขัดต่อระเบียบขององค์การนักเรียนค่ะ"
42010-60 = "<A.N.T.I.O.C.H.> ที่ไคเซอร์ อินดัสทรีเปิดตัวเมื่อปีก่อน ได้สร้างหัวรบแรงดันความร้อนสำหรับขีปนาวุธ#nภายใต้โครงการที่รู้จักกันว่าเป็นธุรกิจพัฒนาระเบิดมือแรงดันความร้อน และก็เก็บต้นแบบไว้ที่นี่ด้วยค่ะ"
42010-62 = "แต่พวกเราก็เข้าไปทำให้ระเบิดพวกนั้นหมดสภาพแล้ว ตอนนี้ทุกคนก็เลยวางใจได้"
42010-63 = "หัวรบแรงดันความร้อนสำหรับมิสไซล์เหรอคะ... พลังของมันจะมากแค่ไหนกัน?"
42010-64 = "มันเป็นผลิตภัณฑ์ทดสอบที่ยังไม่ได้ผลิตขึ้นมาเป็นจำนวนมาก เลยทำให้ประเมินพลังได้ยากค่ะ..."
42010-66 = "แต่หากจะคาดการณ์จากขนาดของหัวรบและจากข้อมูลการวิจัยแล้ว การระเบิดของหัวรบ <A.N.T.I.O.C.H> น่าจะครอบคลุมรัศมีหลายกิโลเมตรเลยค่ะ"
42010-67 = "ระ... ระเบิดที่มีพลังขนาดนั้น จะไม่เป็นอันตรายเกินไปสำหรับกองกำลังขนาดเล็กที่จะรับมือเหรอคะ?"
42010-68 = "ทำไมไม่เรียกกองร้อยที่ใส่ชุดเกราะดีๆ มาทำงานแทนล่ะคะ..."
42010-70 = "ถ้าเป็นระเบิดที่อันตรายขนาดนั้น ต่อให้เรียกกำลังทหารราบมาแค่ไหนก็ไร้ความหมายอยู่ดีค่ะ"
42010-71 = "ค่ะ และในเมื่อเป็นแบบนั้น ยิ่งต้องเป็น SRT ที่ต้องออกโรงค่ะ!"
42010-72 = "หน่วย SRT ประกอบไปด้วยสมาชิกชั้นหนึ่งในจำนวนไม่มาก เลยสามารถจัดการเป้าหมายหรือค้นหา#nสาเหตุได้ก่อนที่ฝ่ายตรงข้ามจะรู้ตัว เหมือนในปฏิบัติการครั้งนี้ไงคะ"
42010-73 = "ปฏิบัติการครั้งนี้เราบุกเข้าอาคารและตามหาหัวรบเจอได้ในเวลาไม่ถึง 3 นาทีเลยนะคะ"
42010-74 = "... 2 นาที 45 วินาที"
42010-75 = "ถ้าไม่มีการปะทะระหว่างนั้น งานก็น่าจะเสร็จเร็วขึ้นอีก 15 วินาทีด้วยซ้ำ"
42010-76 = "อ้อ~ หมายถึงตอนที่คุรุมิพลาดโยนระเบิดควันใส่ยามที่วิ่งมาหาจากจุดเดลตา แทนที่จะเป็นระเบิดแสง#nใช่ไหม?"
42010-77 = "ไม่ได้พลาดสักหน่อย! ยามคนนั้นใส่กระบังหน้าพิเศษที่ป้องกันแสงวาบอยู่ต่างหากเล่า!"
42010-78 = "ถ้าฉันไม่ยิงสองนัดซ้อนในระยะประชิด เราคงได้โดนสวนกลับไปแล้ว"
42010-79 = "อีกอย่างนะ โอโทกิ ทำไมเธอถึงจัดการยามคนนั้นไม่ได้ก่อนที่ฉันจะเข้าไปล่ะ?"
42010-80 = "อ๋อ คือว่า... ฉันลืมนับจำนวนกระสุนที่โหลดมา ก็เลย..."
42010-81 = "จะเรียกว่าเป็นความผิดพลาดเล็กๆ น้อยๆ ของสไนเปอร์ในสถานการณ์ที่ประเมินจำนวนของศัตรู#nลำบากดีไหมน้า~"
42010-82 = "อย่าเรียกความผิดพลาดในการทำปฏิบัติการด้วยคำน่ารักๆ แบบนั้นสิ!"
42010-83 = "โอโทกิจัง คุรุมิจัง... พวกนักข่าวกำลังมองเราอยู่นะคะ อย่าทะเลาะกันต่อหน้ากล้องเลยค่ะ..."
42010-85 = "อย่างที่บอกไปค่ะว่าปฏิบัติการครั้งนี้ดำเนินการอย่างรวดเร็วด้วยคนจำนวนน้อย เราจึงวิเคราะห์สภาพ#nเหตุการณ์ได้โดยไม่พลาดตัวคนร้ายด้วยค่ะ"
42010-86 = "ในระหว่างปฏิบัติการครั้งนี้ เราเจอว่าเอกสารลับสุดยอดที่เก็บไว้ในโรงงานกระสุนมีทั้งชื่อของกรรมการ#nระดับสูงและกรรมการส่วนหนึ่งจากสำนักป้องกันด้วยค่ะ..."
42010-87 = "และเราได้พบความจริงที่ว่ากรรมการพวกนั้นได้รับเงินก่อนที่จะสร้างโปรเจกต์ <A.N.T.I.O.C.H.> และเขียนรายงานเท็จเกี่ยวกับความปลอดภัยของโรงงานกระสุนขึ้นมาค่ะ"
42010-91 = "สำนักป้องกันเหรอคะ... นั่นคือองค์กรขององค์การนักเรียนที่มีหน้าที่รักษาความสงบเรียบร้อยของ#nคิโวทอสไม่ใช่เหรอคะ?"
42010-92 = "สรุปแล้วเท่ากับว่าเราเจอช่องโหว่ในการรักษาความสงบเรียบร้อยโดยองค์การนักเรียน ว่าแต่ ถ้า SRT ที่ได้รับคำสั่งจากประธานองค์การนักเรียนมาอีกทีมาเปิดเผยข้อมูลแบบนี้จะไม่เป็นไรเหรอคะ?"
42010-93 = "... ไม่มีปัญหาหรอกค่ะ"
42010-94 = "เพราะความยุติธรรมคือหลักการที่ถูกต้องตามความจริง"
42010-96 = "ความยุติธรรมของ SRT จะไม่เปลี่ยนแปลงไปไม่ว่าจะในสถานการณ์ไหนค่ะ"
42010-107 = "........."
42010-108 = "อ๊ะ ยูกิโนะจัง ตื่นแล้วเหรอ"
42010-110 = "... นี่กี่โมงแล้วน่ะ?"
42010-111 = "ตามเวลาคิโวทอสก็... 03:15 น."
42010-112 = "ยังเหลือเวลาอีกหน่อยจนกว่าจะถึงเวรยามสุดท้ายนะ ทำไมไม่ไปนอนต่ออีกหน่อยล่ะ?"
42010-113 = "ไม่เป็นไร ฉันนอนมาพอแล้ว"
42010-116 = "... เหมือนจะนอนฝันดีมาเลยนะ"
42010-117 = "ทำไมถึงคิดแบบนั้นล่ะ?"
42010-118 = "ก็เห็นเธอเอาแต่นอนยิ้มน่ะ"
42010-119 = "... เปล่า ฝันร้ายต่างหากล่ะ"
42010-120 = "ฝันร้ายแสนหวานที่ฝันตอนอยู่ในห้องเรือนกระจก"
42010-121 = "... อย่างนี้นี่เองสินะ"
42010-124 = "FOX 4 รายงาน"
42010-125 = "นี่คือ FOX 4 ปัจจุบันไม่พบแนวโน้มความผิดปกติขององค์การนักเรียน"
42010-126 = "หลังจากมีหอคอยขนาดใหญ่ร่วงลงมาจากฟ้าเมื่อครั้งก่อน องค์การนักเรียนก็เจอแต่ความสับสนวุ่นวาย#nมาตลอด"
42010-127 = "โดยเฉพาะเจ้าหน้าที่รินผู้เป็นรักษาการแทนของประธานองค์การนักเรียน เธอได้รับการประณามจาก#nในองค์การนักเรียนเองด้วยว่าทิ้งหน้าที่ไปตอนที่เกิดความสับสนอลหม่านมากที่สุด"
42010-128 = "นโยบายการฟื้นฟู D.U. แบบบูรณาการที่เธอเสนอก็เลยไม่ได้รับการอนุมัติและต้องติดขัดซ้ำไปซ้ำมา"
42010-129 = "แต่ก็นะ... แน่นอนว่าตอนที่พวกเราโจมตีแซงค์ทัมทาวเวอร์ก่อนที่จะมีการปิดสถาบัน SRT เราลอบกำจัด#nฝ่ายที่สนับสนุนเจ้าหน้าที่รินเป็นสำคัญ ตอนนี้ก็เลยไม่เหลือใครที่พอจะคุ้มครองเธอได้"
42010-130 = "... แล้วหน่วยงานหลักของคณะกรรมการบริหารล่ะ ตอนนี้เป็นยังไงบ้าง?"
42010-131 = "อืม ตอนนี้ฝ่ายวัฒนธรรมและฝ่ายสุขภาพ... กำลังทำหน้าที่แทนหัวหน้าฝ่ายที่บาดเจ็บจากการโจมตี#nครั้งล่าสุดจนมากันไม่ได้"
42010-132 = "ถึงจะไม่เป็นอุปสรรคในการทำงานก็เถอะ แต่การมีสิทธิ์มีเสียงในองค์การนักเรียนน่าจะไม่ใช่เรื่องง่าย#nเลยละ"
42010-133 = "โล่งอกไปที ช่วยพินิจพิเคราะห์ให้ต่อหน่อยนะ"
42010-137 = "นี่... หัวหน้ากอง ไม่สิ FOX 1"
42010-138 = "แต่ว่า..."
42010-139 = "ถ้าพวกหัวหน้าฝ่ายที่เราโจมตีไปตอนนั้นกลับมายังคณะกรรมการบริหารล่ะ?"
42010-140 = "ถ้าเป็นแบบนั้น... หัวหน้าสำนักฯ คายะคงลำบากน่าดูเลยนะ...?"
42010-141 = "น่าจะมีการเผยแพร่โปรโตคอลฉุกเฉินสำหรับสถานการณ์ฉุกเฉินไปก่อนหน้านี้แล้วนะ"
42010-142 = "'จากกรรมการของคณะกรรมการบริหารทั้งหมด จำนวนคนที่สนับสนุนเจ้าหน้าที่นานากามิไม่มีวันมาก#nไปกว่าจำนวนคนที่สนับสนุนหัวหน้าชิรานูอิ'"
42010-143 = "หากกลุ่มที่สนับสนุนเจ้าหน้าที่นานากามิทำท่าจะกลับมาละก็ ให้ใช้มาตรการให้ทางนั้น 'เคลื่อนไหวไม่ได้' ก็พอ"
42010-147 = "... FOX 4 รับทราบ"
42010-152 = "FOX 3 รายงาน"
42010-153 = "นี่คือ FOX 3 ติดตั้งระเบิด EMP ในฐานทางรถไฟในเขตคิตะยามะและปิดระบบการจัดการตามแผนการ และทำลายอุปกรณ์อิเล็กทรอนิกส์หลักๆ เรียบร้อยแล้ว"
42010-154 = "ระเบิด EMP ถูกเก็บคืนมาได้ทันทีหลังจากระเบิด ต่อให้เป็นช่างเทคนิคก็น่าจะหาสาเหตุของความผิด#nปกติไม่ได้ไปสักระยะหนึ่งเลย"
42010-155 = "แล้วความเห็นของคนส่วนใหญ่ล่ะ?"
42010-156 = "ในเมื่อยังไม่มีการเปิดเผยสาเหตุที่แน่นอนของอุบัติเหตุนี้ พลเมืองส่วนใหญ่ก็เลยมองว่านี่คือความผิด#nพลาดขององค์การนักเรียน"
42010-157 = "ถ้าดูจากโพสต์ต่างๆ ในโซเชียล ตอนนี้มีแต่เขียนประณามเจ้าหน้าที่รินผู้เป็นตัวแทนของฝ่ายคมนาคม กับประธานองค์การนักเรียน เรื่องนี้น่าจะเป็นประเด็นไปอีกนานเลยละ..."
42010-158 = "รับทราบ FOX 3 กลับมาที่กองบัญชาการได้"
42010-162 = "นี่ ว่าแต่ว่า... แบบนี้มันจะไม่เป็นไรจริงๆ เหรอ...?"
42010-163 = "เมื่อกี้ฉันว่าจะไปโรงพยาบาล แต่ได้เจอกับชาวเมืองที่ต้องยากลำบากเพราะทางรถไฟขาดด้วย ถ้าเราทำตามแผนต่อไปแบบนี้ละก็—"
42010-164 = "ชาวเมืองคนนั้นขัดขวางการปฏิบัติการงั้นเหรอ?"
42010-168 = "... เปล่า ไม่มีอะไรแล้ว FOX 3 จบการรายงาน"
42010-175 = "ยูกิโนะ พวกเรา... จะไม่เป็นไรกันจริงๆ ใช่ไหม?"
42010-176 = "... อะไรเหรอ?"
42010-177 = "ก็ที่ทำเพื่อฟื้นฟูสถาบัน SRT แต่กลับไปทำให้ชาวเมืองได้รับผลกระทบโดยตรงไง..."
42010-181 = "... แบบนี้มันไม่ยุติธรรมนะ"
42010-182 = "ถามคำถามแบบนั้นในระหว่างทำปฏิบัติการได้ยังไง"
42010-183 = "พวกเราคืออาวุธฝึกฝนที่ทำปฏิบัติการตามคำสั่ง คนที่ต้องตัดสินใจว่าปลายอาวุธจะหันไปทางใด มันไม่ใช่ตัวอาวุธเองที่จะมาตัดสิน แต่เป็นคนที่จับอาวุธอีกทีต่างหาก"
42010-184 = "อาวุธที่รับรู้และกังวลว่าตัวเองต้องหันไปทางไหน เรียกได้ว่าไม่มีคุณค่าในฐานะอาวุธ"
42010-185 = "การตัดสินใจว่าอะไรถูกอะไรผิด... ต้องตัดสินใจโดยคนที่รับผิดชอบได้เท่านั้น"
42010-186 = "........."
42010-187 = "ถ้ายังมีอะไรติดใจ จะล้มเลิกตอนนี้ก็ได้นะ ฉันจะ... รับช่วงปฏิบัติการของกองทหาร FOX เอง"
42010-192 = "... FOX 2 ยืนยันการตรวจสอบค่ะ"
42010-196 = "งั้นจากนี้งานที่เหลือก็..."
42010-197 = "กำจัดกองทหาร RABBIT สินะ"
42010-198 = "กองทหาร RABBIT?"
42010-199 = "พวกรุ่นน้องน่ะเหรอ?"
42010-200 = "... FOX 3, FOX 4 เมื่อกี้ไม่ได้เรียกตัวนี่นา"
42010-202 = "ขอโทษที พอดีอยู่ๆ ก็ได้ยินเรื่องน่าสนุกขึ้นมาน่ะ..."
42010-203 = "ถ้าเป็นเรื่องไปหารุ่นน้องละก็ พวกฉันก็อยากไปด้วยนะ..."
42010-204 = "เฮ้อ..."
42010-206 = "เอาเถอะ ยังไงงานด่วนก็จบไปแล้ว ออกไปเคลื่อนไหวพร้อมสมาชิกกองทหารหน่อยก็น่าจะไม่เป็นไรนะ?"
42010-207 = "ปฏิบัติการของ FOX 3 ก็จบแล้ว ส่วน FOX 4 ก็ไม่จำเป็นต้องเคลื่อนไหวหลังจากวัน D-Day ด้วย..."
42010-208 = "จะว่าไป กองทหาร RABBIT ยังไม่ได้ทำพิธีรายงานตัวกันเลยนี่นา?"
42010-209 = "การทำตัวร้ายกาจใส่น้องใหม่นี่แหละคือธรรมเนียมของ SRT"
42010-210 = "ฮุฮุ... ถ้าจะเตรียมซูชิเต้าหู้หวานให้ทุกคนได้กินด้วยกัน ก็คงต้องรีบตั้งแต่ตอนนี้แล้วละ"
42010-215 = "... จะไปโน้มน้าวรุ่นน้องทั้งที ไปกันหลายๆ คนน่าจะดีกว่าคนเดียวแหละเนอะ"
42010-216 = "FOX 3 กับ FOX 4 ให้กลับมาที่สำนักงานใหญ่ทันทีที่สิ้นสุดเหตุการณ์ พอรวมกลุ่มได้แล้วก็ให้เริ่มเตรียม 'ปาร์ตี้ต้อนรับ'"
42010-221 = "รับทราบ!"
42010-225 = "ไม่ได้เจอกันมาตั้งนานเลยนี่เนอะ เรามาเตรียมรับน้องให้ยิ่งใหญ่กันเถอะ"
42010-227 = "ตอนต่อไป;ความฝันของกระต่าย"

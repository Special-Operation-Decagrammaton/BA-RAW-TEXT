42010-109 = "3;유키노;01\n#3;a"
42010-110 = "3;유키노;02;……지금 시각은?"
42010-111 = "#na;니코;키보토스 표준시로…… 0315시."
42010-112 = "#na;니코;말번초가 시작할 때까지는 아직 시간이 좀 남았는데. 더 자고 오지 그래?"
42010-113 = "3;유키노;99;괜찮아. 수면은 충분히 취했어."
42010-114 = "#all;hide"
42010-115 = "#wait;250"
42010-116 = "3;니코;03;……뭔가 좋은 꿈을 꾼 모양이네.\n#3;a\n#3;closeup"
42010-117 = "3;유키노;01;왜 그렇게 생각해?\n#3;closeup\n#3;a"
42010-118 = "3;니코;02;자는 동안 미소를 짓고 있더라고.\n#3;closeup"
42010-119 = "3;유키노;05;……아니. 악몽이었어.\n#3;closeup"
42010-120 = "3;유키노;99;온실 속에 머무르고 있었을 때 꾸었던 달콤한 악몽.\n#3;closeup\n#fontsize;50"
42010-121 = "3;니코;99;……그렇구나.\n#3;closeup"

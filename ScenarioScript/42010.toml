[translation]
42010-1 = "第1話;キツネの見る夢"
42010-14 = "D.U.郊外、カイザーインダストリー第2工場前"
42010-17 = "（――2年前）"
42010-18 = "みなさん、こんにちは！キヴォトスいち正確なニュースを#nいち早くお届けするクロノス報道部です！"
42010-19 = "本日はここ、カイザーインダストリー第2工場前から生中継で#nお伝えします。"
42010-20 = "第2工場はカイザーインダストリーの弾薬生産の約3割を占める工場ですが――"
42010-21 = "近年、この工場で連邦生徒会条例に反する大量破壊兵器が開発されているのではないかという疑惑が広まっております。"
42010-22 = "カイザーインダストリー側はこの事実を強く否定しておりますが、#n反証の証拠もなく、市民の不安は晴れません。"
42010-23 = "早期解決が求められておりますが、ヴァルキューレ警察学校の捜査は難航しているようです。また、連邦生徒会長が特別捜査チームを派遣したという噂も囁かれており――"
42010-27 = "わわっ！い、いま工場から爆発が……！"
42010-28 = "一体何があったのでしょうか？#nまさか、噂の大量破壊兵器が――"
42010-30 = "けほっ、けほっ……。"
42010-31 = "オトギ、ちょっとコレどういうこと？#n出口にブービートラップがあるなんて聞いてないんだけど！"
42010-32 = "それ、今言おうとしてたんだけどねぇ。"
42010-33 = "もっと早く言って！"
42010-34 = "はぁ、はぁ……クルミちゃん、突っ走りすぎだよ……。"
42010-35 = "全員、怪我は……大丈夫そうだな。#n作戦終了後でよかった。"
42010-37 = "たった今、弾薬工場から武装した生徒が現れました！"
42010-38 = "彼女らが、例の特別捜査チームなのでしょうか！？"
42010-39 = "こちらクロノス報道部です！#n――すみません！何か一言お願いします！"
42010-41 = "あはは……囲まれちゃったみたいだね？"
42010-42 = "……仕方ない。#nこれを機にSRTの紹介をするのも悪くない、か。"
42010-43 = "SRTといえば……連邦生徒会長が発足したという特殊部隊でしたね？"
42010-45 = "ええ、その通りです。"
42010-46 = "――キヴォトスの皆様、はじめまして。#nSRT特殊学園、FOX小隊の小隊長、[ruby=しちど]七度[/ruby]ユキノと申します。"
42010-47 = "SRT特殊学園は、連邦生徒会長の認可の下、#nヴァルキューレ警察学校や各自治区の風紀委員では対応が難しい#nD.U.地区の犯罪に対応するべく設立されました。"
42010-48 = "D.U.の犯罪に対応する……ということは、#nこれからはSRT特殊学園がヴァルキューレ警察学校の代わりになるのでしょうか？"
42010-49 = "……いいえ。#n私たちはあくまでヴァルキューレ警察学校の手の届かない所で起こる犯罪や、#n今回のように機先を制する必要がある事件に対応するチームに過ぎません。"
42010-51 = "なるほど、ご説明ありがとうございます。#n次に、この第2工場のことをお伺いしたいと思います。"
42010-52 = "ずばり、ここで法に反する大量破壊兵器が開発されているというのは事実でしょうか？"
42010-54 = "ええと……。"
42010-58 = "まあ今回の事件については口止めされてないし大丈夫かな。"
42010-59 = "……数日前、匿名の情報提供があり、カイザーインダストリー第2工場にて#n条例に違反する強力な爆弾の保管を示す有力な証拠を入手しました。"
42010-60 = "カイザーインダストリーは昨年発表した<A.N.T.I.O.C.H.>、#n旧型サーモバリック手榴弾の改良事業の際、弾道ミサイル用サーモバリック弾を#n製作していました。ここに保管されているのは、その試作品だったのです。"
42010-62 = "でも、私たちが無力化させてきたから、もう大丈夫。"
42010-63 = "弾道ミサイル用サーモバリック弾……#nそれは一体、どれほどの威力を持つのでしょうか？"
42010-64 = "試作品ですから、正確な数字は不明ですが――"
42010-66 = "弾頭の大きさと既存の研究データから推測するに、#n爆発の影響範囲は半径数kmに達するかと。"
42010-67 = "そ、それほどの爆弾を、小隊規模で処理するなんて……#nさすがに危険過ぎるのでは……？"
42010-68 = "防護服の工兵中隊を投入すべき案件に思えますが……。"
42010-70 = "いえ……逆に、この規模の爆弾はどれほど多くの兵を投入しても無意味です。"
42010-71 = "そ・こ・で！#n私たちSRTの出番というわけなんですよ！"
42010-72 = "SRTの小隊は少数精鋭のチームで構成されています。#nなので、今回のように相手に気付かれる前にターゲットを確保したり、制圧できるんです。"
42010-73 = "実際、今回の作戦でも3分足らずで弾頭の確保ができましたからね。"
42010-74 = "……2分45秒。"
42010-75 = "途中の交戦がなかったら、更に15秒は短縮できたはずよ。"
42010-76 = "あ～、クルミが警備兵に煙幕弾を閃光弾と間違えて投げちゃったからねぇ？"
42010-77 = "別に間違ってないわよ！#nあいつ、閃光対策の特殊バイザー着けてたの。"
42010-78 = "それに、ダブルタップしてなかったら、逆にこっちがやられてたじゃない。"
42010-79 = "というか、オトギが先に警備兵を倒してくれてたら済んだ話でしょ？"
42010-80 = "あれは……弾薬を数え忘れちゃっててつい……"
42010-81 = "敵の数が予測できない状況でやらかしちゃう#nキュートな狙撃手あるあるっていうかぁ……"
42010-82 = "真面目にやりなさいよ！"
42010-83 = "オトギちゃん、クルミちゃん……カメラの前でケンカするのはちょっと……。"
42010-85 = "……コホン。#nとにかく、今回の作戦は少数の人員で進められたため、#n犯人確保と真相の把握を迅速に行うことができたのです。"
42010-86 = "今回の作戦中に入手した機密文書……#nそこには、複数のメンバーが金品を受け取り、弾薬工場の安全報告書を捏造していたことが書かれていました。"
42010-87 = "そしてそのメンバーには、カイザーグループの幹部だけでなく、#n防衛室の関係者も挙げられていたのです。"
42010-91 = "防衛室といえば……連邦生徒会ではありませんか？"
42010-92 = "結果として連邦生徒会の安全保障に穴が発見されたわけですが……#n連邦生徒会長の指示で動くSRTがこういった情報を開示しても良いのでしょうか？"
42010-93 = "……問題ありません。"
42010-94 = "正義とは、理にかなった正しい道理のこと。"
42010-96 = "SRTの正義は、いかなる状況でも揺らぎはしません。"
42010-107 = "………。"
42010-108 = "あっ、ユキノちゃん。おはよう。"
42010-110 = "……時刻は？"
42010-111 = "キヴォトス標準時で……0315。"
42010-112 = "まだ最後の[ruby=ねずのばん]不寝番[/ruby]まで時間あるよ。もう少し寝たら？"
42010-113 = "いい、睡眠は十分に取れた。"
42010-116 = "……良い夢を見たんだね。"
42010-117 = "どうしてそう思うんだ？"
42010-118 = "寝ている間、幸せそうだったから。"
42010-119 = "……いや、悪夢だった。"
42010-120 = "温室の中で過ごしていた時に見た、甘い悪夢。"
42010-121 = "……そっか。"
42010-124 = "――FOX4、報告を。"
42010-125 = "はいはーい、こちらFOX4。#n現在、連邦生徒会に変わった動向なし。"
42010-126 = "相変わらずパニック状態だよ。#n巨大な塔が落ちてからずっとだねぇ。"
42010-127 = "特に連邦生徒会長代行のリン行政官は、一番混乱していた状況にいなかったから、#n連邦生徒会内でも非難の的だよ。"
42010-128 = "それもあって、彼女が提案したD.U.総合復旧政策も難航してるみたい。"
42010-129 = "まあ……私たちがSRT特殊学園閉鎖直前にサンクトゥムタワーを襲撃した時、#nリン行政官の支持派を念入りに攻撃したから、彼女を[ruby=ひご]庇護[/ruby]する人があまり残っていないっていうのもあるだろうけど。"
42010-130 = "了解した。#n――行政委員会の主要部署の現状は？"
42010-131 = "うーん、そっちも前と同じかなぁ。#n文化室と保健室は前回の襲撃で室長が怪我をしたから、今は次長が業務を代行してるよ。"
42010-132 = "でもまあ、次長って立場じゃ発言権は期待できないと思うけどね。#n業務自体の支障はないだろうけど。"
42010-133 = "なら安心だな……引き続き監視を頼む。"
42010-137 = "その……小隊長、いやFOX1。"
42010-138 = "もしもの話だけどさぁ……"
42010-139 = "休職中の室長たちが復帰したらどうするの？"
42010-140 = "そうなったら……カヤ室長、かなり困っちゃうよね……？"
42010-141 = "はぁ……非常時に備えた緊急プロトコルは前に伝えたはずだろう。"
42010-142 = "「行政委員会の役員のうち、[ruby=なながみ]七神[/ruby]行政官を支持する役員は、#n[ruby=・   ・]常に[/ruby][ruby=しらぬい]不知火[/ruby]室長を支持する役員より多くならない。」"
42010-143 = "[ruby=なながみ]七神[/ruby]行政官を支持する勢力が復帰しようとしたら、#n「動けなくなる程度」に措置すること。"
42010-147 = "……FOX4、了解。"
42010-152 = "――FOX3、報告を。"
42010-153 = "こちらFOX3、予定通り北山区の鉄道車両基地にEMP爆弾を設置して運行管理システムを無力化。主要電子設備の[ruby=サボタージュ]破壊工作[/ruby]も完了してる。"
42010-154 = "EMP爆弾は起爆後すぐに回収したから、#n当分はエンジニアたちも故障の原因を突き止められないはずよ。"
42010-155 = "ご苦労。市民の反応は？"
42010-156 = "事故の原因が発表されていないから、#n連邦生徒会のミスだと思っているみたい。"
42010-157 = "今SNSの投稿を確認してるけど、結構炎上してるわね。#n交通室長と連邦生徒会長代行の批判で溢れかえってる。"
42010-158 = "了解。#nでは、FOX3は直ちにHQに復帰せよ。"
42010-162 = "ねえ、変なこと言うかもしれないけど……本当にこのまま進めて大丈夫なの……？"
42010-163 = "さっきも電車が止まっちゃって、病院に行けずに困ってる人が……"
42010-164 = "――それは、作戦進行に重要な事項か？"
42010-168 = "……なんでもない。#nFOX3、報告は以上。"
42010-175 = "ユキノちゃん……私たち、本当にこのままでいいのかな？"
42010-176 = "……何が？"
42010-177 = "SRT特殊学園を復活させるためだとしても、市民にこれだけ危害を加えるのは……"
42010-181 = "やっぱり……正義じゃない気がするよ。"
42010-182 = "……その疑問は、作戦進行に不要だ。"
42010-183 = "私たちは命令に従い、作戦を遂行する武器。#nそして刃の先を向ける相手を選ぶのは武器ではなく[ruby=つか]柄[/ruby]を持つ者の役目。"
42010-184 = "相手を見て躊躇う武器など――武器としての価値がない。"
42010-185 = "物事の善悪とは、責任を持てる者だけが判断するものだ。"
42010-186 = "………。"
42010-187 = "気が引けるなら辞めても構わない。#n私は――FOX小隊は、作戦を続行する。"
42010-192 = "……FOX2、承知しました。"
42010-196 = "さて、残るは……。"
42010-197 = "RABBIT小隊の処理だけか。"
42010-198 = "RABBIT小隊？"
42010-199 = "なになに、もしかして後輩の話？"
42010-200 = "……FOX3、FOX4。今は呼び出していないんだが。"
42010-202 = "ごめん、急に面白そうな話が聞こえちゃったからさ～"
42010-203 = "後輩に会いに行くの？#n私も一緒に行きたい！"
42010-204 = "はぁ……。"
42010-206 = "まあ、ちょうど落ち着いたところだし、#n久々にみんなで一緒に動くのもいいんじゃない？"
42010-207 = "FOX3の作戦は終わったし、#nFOX4もD-Dayの後は特に動く必要はないし……。"
42010-208 = "あっ！そういえばさ、RABBIT小隊は例の歓迎会もやっていないんじゃない？"
42010-209 = "ああ、SRT慣例の新入りと「遊んで」あげる会ね。"
42010-210 = "ふふっ、そうだったね。#nならパーティ用においなりさんいっぱい作ろっと！"
42010-215 = "……まあ人数は多い方がいいか。"
42010-216 = "なら、FOX3とFOX4は今の任務を終え次第HQに復帰、#n再整備してすぐに「ウェルカムパーティー」の準備を始めるように。"
42010-221 = "了解！"
42010-225 = "久方ぶりの[ruby=かいこう]邂逅[/ruby]だ、後輩たちを盛大に迎えてやろう。"
42010-227 = "次回;ウサギの見る夢"

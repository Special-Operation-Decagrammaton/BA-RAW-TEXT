[translation]
10036060-1 = "第6話;黑暗中的襲擊者"
10036060-2 = "（水槍大賽結束後，瞞著三人偷偷去找沙織）"
10036060-7 = "啊，老師，有什麼事嗎？"
10036060-8 = "[s]「沒什麼，只是想來看看DJ表演準備得如何。」"
10036060-9 = "啊，表演準備得很順利。#n我剛才也把舞台周圍都打掃乾淨了。"
10036060-10 = "嗯？附近的氣氛好像亂哄哄的？#n……你說的沒錯。"
10036060-15 = "跟，跟緊一點。#n如果落單的話，說不定會被襲擊……！"
10036060-16 = "唉，又來了。我就說這裡很安全了。"
10036060-17 = "不過既然DJ有這個需求，我也多找了一些保鏢來。#n請儘管放心吧。"
10036060-18 = "唔嗯……這樣真的沒問題嗎……"
10036060-25 = "因為DJ B.o.B吩咐要特別注意周圍的安全。"
10036060-26 = "所以連看守會場外圍的兵力都被調過來加強戒備了。"
10036060-27 = "雖然我個人認為他有點擔心過頭，不過……"
10036060-28 = "[s]「還是會擔心，對吧？」"
10036060-29 = "……是啊。恐怕是職業病在作祟吧。#n明明知道不會有問題，但就是覺得有點不自在。"
10036060-30 = "[s]「真像沙織的作風。那要不要再去其他地方巡一巡？」"
10036060-31 = "嗯，我也覺得那樣比較好。"
10036060-32 = "畢竟外圍的兵力被調過來的話，戒備自然也會變弱……"
10036060-35 = "好，準備完畢。"
10036060-36 = "現在就等開始的信號了！#n偵察組！調查結果怎麼樣？"
10036060-37 = "……就跟教授預料的一樣。"
10036060-38 = "因為DJ要求加強戒備的關係，原本守衛會場外圍的兵力大部分都被撤走了。"
10036060-39 = "現在的警備相當薄弱。"
10036060-40 = "真是準確得令人害怕啊……"
10036060-44 = "是教授！"
10036060-45 = "快接電話！"
10036060-51 = "各位，是我。"
10036060-52 = "都準備好了嗎？"
10036060-54 = "當然！我們已經完成偵察工作，襲擊組也做好準備了。"
10036060-55 = "不過教授……你是怎麼知道DJ會要求加強戒備的？"
10036060-57 = "你們打算綁架的DJ B.o.B，在地下世界也算是個小有名氣的人物。"
10036060-58 = "除了你們對那個人的印象外，#n我還從他之前的表演、採訪和新聞報導，嘗試推敲出他大概是個什麼樣的人。"
10036060-59 = "由於在地下世界活動，所以膽子很小……#n一旦覺得有危險，就會把自己的安危放在第一位……"
10036060-60 = "因此在遭遇襲擊後，如果他認為危險尚未完全解除，則勢必會加強防護……"
10036060-61 = "既然人力無法憑空增加，也只能把腦筋動到多餘的人力身上。#n也就是說，他們很可能會調動外圍的警備人員。"
10036060-62 = "這就像是無須花費腦筋的既定開局一樣。"
10036060-63 = "接下來就看我們如何因應對方顯而易見的策略了。"
10036060-64 = "沒錯，下一步棋已經決定了──那就是突破變弱的警備，立即襲擊慶典會場。"
10036060-65 = "只要繼續推動棋局，你們想打擊頭盔團的目標也總算能如願以償了吧。"
10036060-66 = "話似乎說得太多了呢。#n現在你們已經知道行動的時機，接下來就看你們的表現了。祝各位武運昌隆。"
10036060-73 = "教授那傢伙，該不會是為了這次的行動，才把之前的計劃弄得那麼隨便的吧？"
10036060-74 = "怎，怎麼可能，肯定只是碰巧矇到的啦。"
10036060-75 = "總之最重要的是，我們總算能夠替大姐頭報仇雪恨了。"
10036060-76 = "嗚嗚！大姐頭，要是我們的心意能傳到矯正局的監獄裡就好了……！"
10036060-77 = "不要哭！越是悲傷的時候越要堅強！"
10036060-78 = "等所有人到齊就開始行動！#n勝利就在眼前，沒什麼好猶豫的了！"
10036060-80 = "那些傢伙是……太妹們？"
10036060-81 = "如果那些話是真的，他們打算對表演會場發動襲擊嗎……！"
10036060-82 = "雖然我沒有義務保護這裡，但我的契約還沒有履行完畢。#n更何況……"
10036060-86 = "……"
10036060-87 = "老師，或許這只是我的藉口，不過……"
10036060-88 = "[s]「你想要守護大家的慶典對吧？我也來幫忙。」"
10036060-89 = "啊啊……排除所有威脅吧！"
10036060-91 = "這裡是A組，已經做好準備。"
10036060-92 = "B組這邊也沒有任何異常。#n收到信號隨時都可以出發。"
10036060-93 = "這邊也準備好了。"
10036060-95 = "很好，這下就萬無一失了。"
10036060-96 = "頭盔團那些傢伙，肯定會被嚇得四處逃竄。"
10036060-97 = "雖然偷襲確實有點卑鄙……但這並不是單純的戰鬥，而是我們的復仇。"
10036060-98 = "好！上吧！去把頭盔團的慶典搞得天翻地覆！"
10036060-99 = "襲擊隊，聽到了嗎？立刻出發！"
10036060-100 = "（滋滋）這裡是C組，好像有點奇……（滋滋）"
10036060-101 = "嗯？訊號怎麼會這麼差？#nC組！聽到請回答！"
10036060-102 = "（滋滋）……"
10036060-103 = "（滋）"
10036060-104 = "怎麼回事……？"
10036060-105 = "咦……？（滋滋）#n……那是什麼？剛才好像有什麼東西！"
10036060-106 = "喂，你去確認一下──"
10036060-107 = "（滋）"
10036060-108 = "嗯？又斷掉了。#n這真的是訊號問題嗎？"
10036060-109 = "B組！聽到請回答！"
10036060-110 = "喂！那是什麼啊！快開槍！"
10036060-111 = "往這邊過來了！哇！"
10036060-112 = "（滋滋）……（滋滋滋）……"
10036060-113 = "（滋）"
10036060-114 = "咦……咦？大家？"
10036060-115 = "到，到底出了什麼事……？"
10036060-116 = "我，我也不知道……"
10036060-121 = "那，那是什麼？是誰！馬上給我滾出來！"
10036060-122 = "不不不，頭盔團怎麼可能會出現在這種地方，應該只是風聲而已啦！#n我，我去確認一下！"
10036060-123 = "喂，等等！"
10036060-129 = "！？"
10036060-130 = "別，別鬧了啦！你沒看我已經慌成這樣了嗎……！"
10036060-131 = "再，再那樣的話，我要開槍了哦……？"
10036060-138 = "咦，咦咦……？"
10036060-148 = "……太妹們好像撤退了，應該不用繼續追了吧？"
10036060-149 = "雖然他們人數不少，卻沒有事先想好友方遇襲時的對策。#n整體計畫還是太天真了。"
10036060-150 = "除此之外……也多虧有老師適時地從第三者的角度指揮。"
10036060-151 = "謝謝你。"
10036060-152 = "[s1]「真要說的話還是沙織你更厲害。」\n[s2]「能成功守住慶典真是太好了。」"
10036060-155 = "嗯，說的沒錯。#n雖然不清楚那些太妹為何要襲擊慶典會場……"
10036060-156 = "但無論他們有什麼原因，我都不能讓他們得逞。"
10036060-157 = "糟糕，好像花費太多時間在這些太妹們身上了。"
10036060-158 = "再不去準備舞台的話……！"
10036060-159 = "老師，雖然很抱歉……"
10036060-160 = "[s]「嗯，你快過去吧。」"
10036060-161 = "好的，那麼待會見。"
10036060-166 = "[ns3]「一下要綁架DJ……」\n[ns4]「一下要襲擊慶典會場……」"
10036060-172 = "[ns]「他們到底想做什麼呢……？」"
10036060-175 = "[ns]「慶典玩得還開心嗎？」"
10036060-176 = "啊，老師，歡迎回來。"
10036060-177 = "我們剛才去遊戲攤位逛了一圈。"
10036060-178 = "但結果不怎麼樣就是了。"
10036060-179 = "老師……剛才簡直是場災難……"
10036060-180 = "抽籤的時候連續抽到凶，連夾娃娃也完全沒夾中……"
10036060-181 = "我們果然已經沒有希望了……海邊的幸福就像浪花一樣轉瞬即逝……"
10036060-182 = "[s]「還有比遊戲攤位更值得期待的事哦，日和。」"
10036060-183 = "嗯？"
10036060-184 = "[s]「還有DJ表演呀！」"
10036060-186 = "……說的也是。"
10036060-187 = "我們都還沒看到沙醬努力準備的表演呢。"
10036060-188 = "距離表演開始沒剩多少時間了，我們就好好期待吧。"

10036060-56 = "#all;hide"
10036060-57 = "3;히죽히죽 교수;07;여러분이 납치할 예정이었던 DJ B.o.B의 경우엔 뒷세계에서 제법 유명한 인물이더군요.\n#3;sig"
10036060-58 = "3;히죽히죽 교수;03;여러분을 통해 전달받은 그자에 대한 인상비평은 물론, 기록으로 남아있는 DJ의 공연이나, 인터뷰, 뉴스 기사 등등을 참고하여 어떤 인물상인지 추론할 수 있었답니다.\n#3;sig"
10036060-59 = "3;히죽히죽 교수;99;뒷세계에서 활동하는 탓인지 겁이 많고, 자신이 위험에 처할지라면 누구보다 보신을 신경 쓸 타입…….\n#3;sig\n#3;em;…"
10036060-60 = "3;히죽히죽 교수;00;습격이 있었던 직후, 아직 위험이 해소되지 않았다고 판단했다면 당연히 경호를 보강할 테고…….\n#3;sig"
10036060-61 = "3;히죽히죽 교수;07;없는 병력을 만들어낼 수는 없으니 자연스레 여분의 인원. 외곽에 배치한 경계 병력을 데려올 것으로 추측할 수 있겠죠.\n#3;sig"
10036060-62 = "3;히죽히죽 교수;08;이건 머리를 쓸 필요도 없는, 수순이 정해진 오프닝 같은 거예요.\n#3;sig"
10036060-63 = "3;히죽히죽 교수;02;남은 것은 훤히 보이는 상대의 게임에 대비해, 이쪽이 어떠한 수를 착수하는가.\n#3;sig"
10036060-64 = "3;히죽히죽 교수;07;네, 이미 둬야 할 수는 정해져 있습니다. 약해진 경계를 돌파해, 즉시 축제장을 습격한다.\n#3;sig"
10036060-65 = "3;히죽히죽 교수;08;이렇게 게임을 끌어 나간다면 헬멧단에게 일격을 가한다는 여러분의 목적도, 마침내 완성될 수 있겠지요.\n#3;sig"
10036060-66 = "3;히죽히죽 교수;01;말이 길어졌네요. 결행 시점은 알려드렸으니, 이제부터는 여러분의 손에 달렸어요. 행운을 빕니다.\n#3;sig"

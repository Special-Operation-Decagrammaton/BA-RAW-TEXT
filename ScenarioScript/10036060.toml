[translation]
10036060-1 = "ตอนที่ 6;ผู้บุกรุกจากความมืด"
10036060-2 = "(หลังจบการแข่งขันปืนฉีดน้ำ คุณครูก็แอบทั้ง 3 คนไปหาซาโอริ)"
10036060-7 = "อ๊ะ ครู มีเรื่องอะไรเหรอ?"
10036060-8 = "[s] \"เปล่าหรอก ครูแค่อยากรู้ว่าเตรียมการแสดงของดีเจไปถึงไหนแล้วน่ะ\""
10036060-9 = "อ้อ ถ้าเป็นเรื่องนั้นน่ะ ฉันกำลังทำงานอย่างเต็มที่เลย เมื่อกี้ก็เพิ่งทำความสะอาบรอบๆ เวทีไปเอง"
10036060-10 = "หืม? เหมือนมีอะไรวุ่นวายแถวนี้งั้นเหรอ? ครูเองก็รู้สึกได้สินะ..."
10036060-15 = "มะ... มาประกบฉันไว้อย่าให้ห่าง ถ้าฉันอยู่คนเดียว ก็อาจจะโดนบุกทำร้ายก็ได้นะ...!"
10036060-16 = "เฮ้อ เป็นอย่างนี้อีกแล้ว ก็บอกแล้วไงคะว่าที่นี่น่ะปลอดภัยดี"
10036060-17 = "แต่ยังไงเราก็เพิ่มทีมคุ้มกันให้ตามที่คุณดีเจขอมาแล้วค่ะ ไม่ต้องห่วงนะคะ"
10036060-18 = "อืม... แบบนี้จะไม่เป็นไรใช่มั้ยนะ..."
10036060-25 = "ดีเจ B.o.B ยืนกรานว่าต้องใส่ใจกับเรื่องความปลอดภัยเป็นพิเศษน่ะ"
10036060-26 = "ฉันเลยไประดมกองกำลังที่เฝ้าระวังอยู่ด้านนอกเวทีให้มาคุ้มกันที่นี่แทน"
10036060-27 = "ฉันว่าดีเจ B.o.B ดูวิตกกังวลไปล่วงหน้าก็จริง แต่ก็ยอมรับว่า..."
10036060-28 = "[s] \"เป็นห่วงใช่มั้ย?\""
10036060-29 = "ใช่... คงเป็นนิสัยที่เกิดจากการทำงานน่ะ ฉันว่าคงไม่เกิดเรื่องใหญ่อะไร แต่มันก็กวนใจฉันมากเลยละ"
10036060-30 = "[s] \"สมกับเป็นซาโอริเลยนะ งั้นเราไปดูรอบๆ กันมั้ย?\""
10036060-31 = "อืม แบบนั้นก็น่าจะดีนะ"
10036060-32 = "เพราะถ้ากองกำลังด้านนอกย้ายไปอยู่ที่เวที การคุ้มกันภายนอกก็จะหละหลวมขึ้น..."
10036060-35 = "ดีละ เตรียมตัวเสร็จแล้ว"
10036060-36 = "ตอนนี้ก็เหลือแค่รอสัญญาณให้เริ่มทำตามแผน! ทีมสำรวจ! ไปแอบสืบสถานที่จัดงานเทศกาลมาแล้ว#nใช่มั้ย เป็นยังไงบ้าง?"
10036060-37 = "เป็นไปตามที่ศาสตราจารย์คาดไว้เลย"
10036060-38 = "ดีเจขอให้เพิ่มระดับการรักษาความปลอดภัย กองกำลังแก๊งหมวกกันน็อกที่คุ้มกันอยู่นอกงานก็เลยถูก#nย้ายตำแหน่งกันเกือบหมด"
10036060-39 = "ตอนนี้ก็เลยแทบจะไม่มีการคุ้มกันรอบนอกเลยน่ะ"
10036060-40 = "ราบรื่นจนน่าตกใจเลยแฮะ..."
10036060-44 = "ศาสตราจารย์ติดต่อมา!"
10036060-45 = "รีบรับสายสิ!"
10036060-51 = "สวัสดีค่ะทุกคน! ฉันเองค่ะ"
10036060-52 = "พร้อมแล้วหรือยังคะ?"
10036060-54 = "พร้อมแล้ว! เราไปสำรวจสถานที่มาแล้ว แล้วก็เตรียมการจู่โจมเสร็จหมดแล้วด้วย"
10036060-55 = "ว่าแต่ศาสตราจารย์... รู้ได้ยังไงเหรอว่าดีเจจะขอเพิ่มระดับการคุ้มกันน่ะ?"
10036060-57 = "ดีเจ B.o.B ที่พวกคุณจะลักพาตัวกันคือบุคคลที่มีชื่อเสียงในโลกสีเทาน่ะค่ะ"
10036060-58 = "ถ้าดูจากข้อมูลที่พวกคุณให้ฉันมา และจากบันทึกการแสดงโชว์ บทสัมภาษณ์ และบทความจากข่าวที่#nฉันไปหามาเพิ่มแล้ว ฉันก็อนุมานได้ค่ะว่าเขาเป็นคนแบบไหน"
10036060-59 = "คงเป็นเพราะเขาประกอบอาชีพอยู่ในโลกสีเทา เขาก็เลยขี้กลัวและหวาดระแวงสุดๆ เมื่อคิดว่าตัวเอง#nจะตกอยู่ในอันตรายค่ะ..."
10036060-60 = "หลังจากเจอการโจมตีก่อนหน้านี้ เขาก็คงประเมินว่าตัวเองคงยังไม่ปลอดภัย และก็ต้องขอเพิ่มระดับ#nการคุ้มกันให้แน่นหนาขึ้น..."
10036060-61 = "และในเมื่อไม่มีกองกำลังอื่นแล้ว ทางผู้จัดงานก็คงไม่มีทางเลือกอื่นนอกจากใช้กองกำลังเดิมที่มีมา#nเสริมเอา ฉันก็เลยคาดได้ว่าจะย้ายกองกำลังด้านนอกเข้าไปคุ้มกันในเวทีแทนค่ะ"
10036060-62 = "เรื่องแค่นี้เราไม่จำเป็นต้องใช้สมองเลยค่ะ นี่เหมือนเป็นการเริ่มเกมที่วางหมากเอาไว้แล้วด้วยซ้ำ"
10036060-63 = "งานที่เหลือก็แค่เตรียมรับมือกับการเล่นเกมของฝ่ายตรงข้ามที่อ่านออกได้อย่างชัดเจนค่ะ"
10036060-64 = "ใช่ค่ะ วิธีการน่ะถูกกำหนดไว้แล้วค่ะ เราจะฝ่าการคุ้มกันที่หละหลวมนั้นแล้วจู่โจมสถานที่จัดงานทันทีค่ะ"
10036060-65 = "หากเกมดำเนินไปอย่างนี้ เป้าหมายที่จะโจมตีแก๊งหมวกกันน็อกของพวกคุณก็จะสำเร็จได้ในที่สุดค่ะ"
10036060-66 = "ฉันพูดเยอะไปแล้วละค่ะ แล้วก็แจ้งเวลาในการลงมือกับพวกคุณไปแล้วด้วย จากนี้ก็ขึ้นอยู่กับพวกคุณ#nแล้วละค่ะ ขอให้โชคดีนะคะ"
10036060-73 = "ยัยศาสตราจารย์นั่นตั้งใจวางแผนการก่อนหน้านี้ให้ไม่ได้ผลเพื่อการนี้หรือเปล่านะ?"
10036060-74 = "มะ... ไม่หรอก ศาสตราจารย์คงไม่อยากให้แผนการที่ตัวเองตั้งใจคิดมาต้องล้มเหลวหรอกน่า"
10036060-75 = "เอาเถอะ สิ่งที่สำคัญตอนนี้คือเราต้องล้างแค้นให้ลูกพี่ใหญ่ของเราให้ได้"
10036060-76 = "อึก! ลูกพี่... ถ้าเราส่งใจไปถึงลูกกรงในห้องขังได้ก็ดีน่ะสิ...! ฮือ..."
10036060-77 = "หยุดร้องได้แล้ว! ยิ่งเศร้าเราก็ยิ่งต้องตั้งใจนะ!"
10036060-78 = "เราจะเริ่มลงมือตอนที่ทุกคนมารวมตัวกัน! เหลือเวลาอีกไม่นานแล้ว เราไม่เหลืออะไรให้ลังเลอีกแล้ว!"
10036060-80 = "พวกนั้นคือ... พวกแยงกี้สาวงั้นเหรอ...?"
10036060-81 = "ถ้าที่พวกนั้นคุยกันเมื่อกี้เป็นเรื่องจริง แปลว่าจะบุกมาโจมตีเวทีแสดงดนตรีงั้นเหรอ...!"
10036060-82 = "ถึงฉันจะไม่ได้มีหน้าที่คุ้มกันสถานที่ แต่ที่นี่ก็มีคนที่ฉันต้องคุ้มกันตามสัญญา อีกอย่าง..."
10036060-86 = "..."
10036060-87 = "ครู นี่อาจจะเป็นความดื้อรั้นของฉันก็ได้ แต่ว่า..."
10036060-88 = "[s] \"อยากปกป้องงานเทศกาลของทุกคนใช่มั้ยล่ะ ครูก็จะช่วยอีกแรง\""
10036060-89 = "อืม ต้องตัดปัจจัยเสี่ยงออก...!"
10036060-91 = "นี่คือทีม A พวกเราพร้อมบุกเข้าไปแล้ว"
10036060-92 = "ทีม B ก็กำลังสแตนด์บาย รอแค่สัญญาณก็เท่านั้น"
10036060-93 = "ทางนี้ก็พร้อมแล้วเหมือนกัน"
10036060-95 = "โอเค สมบูรณ์แบบ"
10036060-96 = "เจ้าพวกแก๊งหมวกกันน็อก คงจะหนีเตลิดจนขวัญหนีดีฝ่อกันแน่ๆ"
10036060-97 = "ถึงจะมองว่าการซุ่มโจมตีเป็นเรื่องขี้ขลาด... แต่นี่เป็นการล้างแค้นมากกว่าการต่อสู้"
10036060-98 = "ดีละ! ลุยเลย! ไปป่วนงานเทศกาลของแก๊งหมวกกันน็อกกัน!"
10036060-99 = "ทีมจู่โจม ได้ยินหรือเปล่า? เริ่มบุกได้เลย!"
10036060-100 = "(ซ่า)... นี่คือทีม C มันมีอะไรแปลกๆ... (ซ่า)"
10036060-101 = "หืม? ทำไมเสียงขาดไปล่ะ? ทีม C! ตอบด้วย!"
10036060-102 = "(ซ่าา)..."
10036060-103 = "(ตื๊ด)"
10036060-104 = "อะไรเนี่ย...?"
10036060-105 = "เอ๋? (ซ่า)... นั่นมันอะไรน่ะ? เหมือนจะเห็นอะไรบางอย่างเลย!"
10036060-106 = "นี่ ออกไปตรวจสอบซิ แล้วก็..."
10036060-107 = "(ตื๊ด)"
10036060-108 = "หืม? ตัดไปอีกแล้ว หรือจะมีปัญหาเรื่องสัญญาณจริงๆ นะ?"
10036060-109 = "ทีม B! ตอบด้วย!"
10036060-110 = "นี่! ใครอยู่ตรงนั้นน่ะ! ยิงเลย!"
10036060-111 = "มาทางนี้แล้ว! ว้าก!"
10036060-112 = "(ซ่าา)... (ซ่าา)..."
10036060-113 = "(ตื๊ด)"
10036060-114 = "หะ... หืม? ทุกคน?"
10036060-115 = "นะ... นี่มัน... เรื่องอะไรกันเนี่ย...?"
10036060-116 = "ฉะ... ฉันก็ไม่รู้..."
10036060-121 = "สะ... เสียงอะไร? ใครน่ะ? ออกมาเดี๋ยวนี้นะ!"
10036060-122 = "ไม่สิ แก๊งหมวกกันน็อกไม่มีทางมาอยู่ในที่แบบนี้ คงเป็นแค่เสียงลมพัดน่ะ! ฉะ... ฉันจะออกไปดูเอง!"
10036060-123 = "ดะ... เดี๋ยว เดี๋ยวสิ!"
10036060-129 = "?!"
10036060-130 = "ยะ... อย่าแกล้งกันสิ! แค่นี้ฉันก็ใจไม่ดีอยู่แล้วนะ...!"
10036060-131 = "ถะ... ถ้าไม่หยุดละก็ ฉันยิงจริงๆ นะ...?"
10036060-138 = "เอ๊ะ เอ๋...?"
10036060-148 = "พวกแยงกี้ล่าถอยกันไปแล้วสินะ... คงไม่ต้องตามไปก็ได้มั้ง"
10036060-149 = "ถึงพวกนั้นจะมีกันหลายคน แต่ดูจากการที่ไม่มีแผนสำรองในตอนที่ทีมโดนโจมตีแล้ว แผนการโดยภาพรวมๆ ก็คงไม่ได้รัดกุมนักหรอก"
10036060-150 = "อีกอย่าง... ครูก็ช่วยไว้ได้มากจากการอ่านเกมและออกคำสั่งอย่างเหมาะสมในฐานะบุคคลที่ 3"
10036060-151 = "ต้องขอบคุณด้วยนะครู"
10036060-152 = "[s1] \"ไม่หรอก ซาโอริเก่งกว่าครูอีกนะ\"\n[s2] \"โล่งอกไปทีนะที่ปกป้องงานเทศกาลเอาไว้ได้\""
10036060-155 = "อืม ก็จริงอย่างที่ครูว่า ฉันก็ไม่รู้หรอกนะว่าทำไมพวกแยงกี้สาวถึงได้มาซุ่มโจมตีสถานที่จัดงาน..."
10036060-156 = "แต่ไม่ว่าเหตุผลจะคืออะไร ฉันก็ไม่ควรนิ่งเฉยอยู่ดี"
10036060-157 = "แย่ละสิ ฉันมาขัดขวางพวกนี้จนลืมเวลาไปเลย"
10036060-158 = "ต้องรีบกลับไปเตรียมเวทีการแสดงแล้วละ...!"
10036060-159 = "ขอโทษนะครู..."
10036060-160 = "[s] \"อื้ม รีบไปเถอะ\""
10036060-161 = "อืม ไว้เจอกันนะ"
10036060-166 = "[ns3] \"พวกนั้นตั้งใจจะลักพาตัวดีเจงั้นเหรอ...\"\n[ns4] \"พวกนั้นตั้งใจจะโจมตีเวทีการแสดงงั้นเหรอ...\""
10036060-172 = "[ns] \"พยายามจะทำอะไรกันแน่นะ...?\""
10036060-175 = "[ns] \"สนุกกับงานเทศกาลกันอยู่มั้ย?\""
10036060-176 = "อ๊ะ คุณครู เข้ามาสิ"
10036060-177 = "พวกเราเพิ่งไปเล่นเกมตามซุ้มกันมาน่ะ"
10036060-178 = "ไม่ไหวเลยจริงๆ"
10036060-179 = "คุณครู... พวกเราไม่ได้เรื่องเลยค่ะ..."
10036060-180 = "ไปเสี่ยงเซียมซีก็เจอโชคร้ายติดต่อกัน ไปคีบตุ๊กตาก็คีบไม่ได้อีก..."
10036060-181 = "พวกเราคงไม่มีหวังจริงๆ น่ะค่ะ... ความสุขริมหาดของเราโดนคลื่นซัดหายไปในพริบตาเลยค่ะ..."
10036060-182 = "[s] \"มีอย่างอื่นที่น่าสนุกกว่าซุ้มเกมนะ ฮิโยริ\""
10036060-183 = "คะ?"
10036060-184 = "[s] \"ยังมีโชว์ของดีเจอยู่ไง!\""
10036060-186 = "นั่นสินะ..."
10036060-187 = "เรายังไม่ได้ดูการแสดงดนตรีที่ซัตจังตั้งใจเตรียมมาเลย"
10036060-188 = "โชว์ของดีเจเหลือเวลาอีกไม่นานแล้ว ฝากความสนุกไว้กับโชว์นั้นกันเถอะ"

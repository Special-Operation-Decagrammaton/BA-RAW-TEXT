[translation]
10036060-1 = "Episode 6;Ambush from the Darkness"
10036060-2 = "After the water gun competition, I snuck off to see Saori."
10036060-7 = "Ah, Sensei. What brings you here?"
10036060-8 = "[s] \"Nothing much. I was just curious how the concert prep was going.\""
10036060-9 = "We're ahead of schedule on that. We just finished cleaning up around the stage."
10036060-10 = "Hm? You think it looks hectic around here? I suppose it does."
10036060-15 = "You two, just s-stay right next to me. They might come after me if I'm all by myself!"
10036060-16 = "Look, you're fine. It's safe here."
10036060-17 = "We even got those extra bodyguards you asked for. Don't worry."
10036060-18 = "I hope it's enough..."
10036060-25 = "DJ B.o.B has been asking for more and more security."
10036060-26 = "We even pulled some perimeter guards over to the stage just to keep a closer eye on him."
10036060-27 = "It seems excessive to me, but..."
10036060-28 = "[s] \"You're worried something's going to happen?\""
10036060-29 = "...I am. Call it a work habit. Which is not to say that something WILL happen, but it does feel like it."
10036060-30 = "[s] \"That's on brand for you, Saori. Let's head over there, shall we?\""
10036060-31 = "Mm, sounds good."
10036060-32 = "I suppose they couldn't bolster the stage security without weakening the perimeter security."
10036060-35 = "Okay, ready."
10036060-36 = "Standing by! Scouting team, how did the spy mission go?"
10036060-37 = "...It's just like the professor told us."
10036060-38 = "The DJ asked for more bodyguards, so they had to reassign some of the perimeter guards."
10036060-39 = "So their defenses are stretched thin right now."
10036060-40 = "Surprisingly, the professor was spot on..."
10036060-44 = "That's her now!"
10036060-45 = "Hurry up and answer!"
10036060-51 = "Hello, everyone. It's me."
10036060-52 = "Are you all in position?"
10036060-54 = "Of course! We finished scouting, and the ambush team's all set to go."
10036060-55 = "But professor...how'd you know the DJ would ask for extra bodyguards?"
10036060-57 = "Turns out DJ B.o.B is a big shot in the underworld."
10036060-58 = "Based on your impressions of him, records of his concerts, interviews, news articles, et cetera, I was able to profile him."
10036060-59 = "He's very timid, and when danger strikes, which happens when you work with the underworld, he puts his own safety first."
10036060-60 = "He's already been ambushed once today, and he's got no reason to think it's over. So of course he'd want extra bodyguards."
10036060-61 = "But they have to come from somewhere, so naturally they chose whoever they could \"spare\": the guards with the fewest people to watch, there at the outskirts."
10036060-62 = "And thus, their opening move was obvious from the start."
10036060-63 = "Now we need to take advantage."
10036060-64 = "Our next move is obvious. Break through their weakened defenses and ambush the festival immediately."
10036060-65 = "Take control of the game early, and your victory will be inevitable. You'll finally land that blow on the Helmet Gang."
10036060-66 = "Ah, but listen to me ramble. You know what to do. The rest is up to you now. Good luck."
10036060-73 = "So when she gave us that earlier, clumsier plan, do you think that was actually part of this one?"
10036060-74 = "Nah, it probably just worked out that way."
10036060-75 = "The important thing is, we can finally get our revenge for Big Sis."
10036060-76 = "If only our hearts could reach her through those iron bars..."
10036060-77 = "Hey, don't get sentimental! We're all sad about it, but we need to keep it together."
10036060-78 = "Are we ready? No hesitation, no regrets. It's almost time..."
10036060-80 = "Thugs?"
10036060-81 = "They must be planning to ambush the stage."
10036060-82 = "...Hmm, this is a bit outside the scope of my contract, but I do have principles..."
10036060-86 = "..."
10036060-87 = "Sensei, am I just being stubborn, or...?"
10036060-88 = "[s] \"This festival's for everyone here, and you want to protect it. I'll help.\""
10036060-89 = "Right. Engaging the threats!"
10036060-91 = "This is A team. Ready to go."
10036060-92 = "B team's clear. Just give us the signal."
10036060-93 = "We're ready too."
10036060-95 = "Okay, perfect."
10036060-96 = "I bet those Gangster brats are going to cut and run, right off the bat."
10036060-97 = "You know, some people say ambushes are cowardly. But we're not here to fight them, we're here to punish them."
10036060-98 = "All right! Let's tear that festival down!"
10036060-99 = "Ambush team, do you copy? Move in!"
10036060-100 = "*static* ...This is C team. There's something wr— *static*"
10036060-101 = "Hm? Have we got a bad signal? C Team, come in. C Team, do you copy?"
10036060-102 = "*static*"
10036060-103 = "*thump*"
10036060-104 = "What's going on...?"
10036060-105 = "Huh? *static* What is that? I think I just saw something!"
10036060-106 = "Hey, go check it out—"
10036060-107 = "*thump*"
10036060-108 = "Okay, either we've got a REAL bad signal all of a sudden, or..."
10036060-109 = "...B team, come in!"
10036060-110 = "Hey! Over there! Shoot!"
10036060-111 = "They're coming this way! Ugh!"
10036060-112 = "*static* *static*"
10036060-113 = "*thump*"
10036060-114 = "H-Huh? H-Hey, guys?"
10036060-115 = "Wh-What's happening...?"
10036060-116 = "I-I don't..."
10036060-121 = "Wha— Who's there?! Come out where I can see you!"
10036060-122 = "There aren't any Helmet Gangsters out here. Probably just the wind. I-I'll go check it out!"
10036060-123 = "H-Hey, wait!"
10036060-129 = "*gasp*"
10036060-130 = "S-Stop making fun of me! I already have a bad feeling about this...!"
10036060-131 = "I-If you keep it up, I'm gonna shoot, okay...?"
10036060-138 = "H-Huh...?"
10036060-148 = "...The thugs are retreating. No need to chase them."
10036060-149 = "They had the numbers, but no contingency plans if a squad went down. Clumsy of them."
10036060-150 = "Of course, I had your perfectly timed orders and bird's-eye recon."
10036060-151 = "So thank you."
10036060-152 = "[s1] \"You were way more impressive than I was.\"\n[s2] \"I'm just glad we could protect the festival.\""
10036060-155 = "Heh, no argument here. Now that I think about it, why did they pull that ambush in the first place?"
10036060-156 = "Well, they probably had their reasons, but that doesn't mean they get their way."
10036060-157 = "OH! Look at the time."
10036060-158 = "I need to get the stage ready NOW."
10036060-159 = "Apologies, Sensei, but I have to go."
10036060-160 = "[s] \"No worries. Go ahead.\""
10036060-161 = "I'll see you later, then."
10036060-166 = "[ns3] \"They wanted to kidnap the DJ...\"\n[ns4] \"They wanted to attack the stage...\""
10036060-172 = "[ns] \"Just what are they up to...?\""
10036060-175 = "[ns] \"Enjoying the festival?\""
10036060-176 = "Ah, Sensei. Welcome."
10036060-177 = "We were just perusing the carnival games."
10036060-178 = "And losing miserably."
10036060-179 = "We're doomed, Sensei. Doomed!"
10036060-180 = "We drew one curse card after another, couldn't get a single plushie from the claw machine..."
10036060-181 = "There's no hope. Our happiness has been swept away like sand in the waves..."
10036060-182 = "[s] \"There's more here than carnival games, Hiyori.\""
10036060-183 = "Huh?"
10036060-184 = "[s] \"There's still the DJ concert!\""
10036060-186 = "Indeed."
10036060-187 = "The concert Sao-Sao worked so hard to prepare is still in store for us."
10036060-188 = "And it's about to begin. Let it be the bright finale to a wonderful day!"

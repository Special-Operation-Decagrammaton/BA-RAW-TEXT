[translation]
1005505-1 = "อย่างกลมเกลียว"
1005505-2 = "(คุณครูออกมารอชิกุเระใกล้ๆ ร้านอาหารในเมืองตามที่นัดกันไว้)"
1005505-6 = "(พอถึงเวลานัด ก็เห็นชิกุเระเดินชิลๆ มาจากไกลๆ)"
1005505-7 = "[ns1] โบกมือทักทาย\n[ns2] \"ชิกุเระ ครูอยู่ทางนี้\""
1005505-10 = "รู้แล้วน่า รู้แล้ว กำลังไปอยู่นี่ไง~"
1005505-15 = "ไม่ต้องโบกมือเรียกแบบนั้นก็ได้ เดี๋ยวก็สะดุดตาคนอื่นกันพอดี"
1005505-16 = "หรือว่าคุณครูตั้งใจทำแบบนั้น? อยากโชว์ให้คนอื่นเห็นเหรอว่าเรานัดมาเจอกัน..."
1005505-20 = "ฮ่ะฮ่า ล้อเล่นน่า! ไม่ต้องตกใจขนาดนั้นก็ได้"
1005505-21 = "สรุปว่า..."
1005505-22 = "แล้ว 'การตอบแทน' ที่ว่าคืออะไรล่ะ ถึงได้เรียกฉันออกมาเจอในย่านชุมชนที่อยู่ห่างจาก#nสหภาพเรดวินเทอร์แบบนี้"
1005505-23 = "หืม...? ร้านอาหาร? อ๋อ พามากินข้าวสินะ..."
1005505-24 = "[s3] \"ถ้ามีอะไรอย่างอื่นที่ชอบก็บอกได้นะ\"\n[s4] \"จะเปลี่ยนร้านก็ได้นะ แถวนี้ร้านเยอะแยะเลย\""
1005505-27 = "อืม... ฉันไม่ได้บอกว่าไม่ถูกใจสักหน่อย ชอบมากๆ เลยด้วยซ้ำ"
1005505-28 = "ก็แถวๆ สหภาพเรดวินเทอร์หรืออาคารเรียนเก่าไม่มีร้านอาหารหรูๆ แบบนี้นี่นา"
1005505-29 = "การได้กินอาหารอร่อยๆ ที่หากินได้ยาก ก็ถือเป็นความหรูหราอย่างหนึ่งในชีวิตของฉันเลยละ"
1005505-30 = "เอ่อ... คุณครูจองร้านไหนไว้แล้วหรือยัง?"
1005505-31 = "อ๊ะ จองแล้วสินะ งั้นวันนี้ฉันจะเชื่อรสนิยมคุณครูและยอมเป็นผู้ตามแล้วกัน"
1005505-37 = "รบกวนด้วยนะคุณครู"
1005505-46 = "(หลังจากนั้นคุณครูกับชิกุเระก็ทานอาหารในร้านอาหารและใช้เวลาด้วยกันอย่างเพลิดเพลิน)"
1005505-47 = "(...แต่ระหว่างทานอาหาร คุณครูก็ต้องเหนื่อยใจกับการห้ามไม่ให้ชิกุเระสั่งเหล้ามากินแทนอาหาร#nเรียกน้ำย่อย)"
1005505-54 = "งื้ม อร่อยสุดๆ ไปเลย ขอบคุณนะคุณครู"
1005505-55 = "อืม ต้องบอกยังไงดีนะ..."
1005505-56 = "วันนี้ฉันได้ประสบการณ์ใหม่ๆ กลับไปเพียบเลย"
1005505-57 = "ทั้งได้มาเที่ยวสองต่อสองกับคุณครู ได้กินอะไรอร่อยๆ ที่เห็นแล้วต้องอ้าปากค้างในร้านอาหารหรูๆ กับคุณครู ได้ดื่มชาร้อนๆ..."
1005505-58 = "...และได้ดูวิวทิวทัศน์ยามกลางคืนของเมือง"
1005505-61 = "― เป็นวิวที่สวยจังเลย...[wa:10] "
1005505-64 = "― ขอบคุณที่พามาดูทิวทัศน์"
1005505-66 = "― ที่สวยงามแบบนี้นะคุณครู[wa:1140] "
1005505-69 = "[ns5] \"ถ้าอยากมาอีก ครูจะพาออกมาบ่อยๆ นะ\"\n[ns6] \"ถ้าชิกุเระอยากมาก็ติดต่อครูมาได้ตลอดเลย\""
1005505-70 = "― พูดแบบนั้น... ฉันก็ดีใจนะ แต่ว่า...[wa:1220] "
1005505-71 = "― พูดแบบนั้น... ฉันก็ดีใจนะ แต่ว่า...[wa:1220] "
1005505-73 = "― ฉันน่ะ ชอบสถานที่ที่อยู่ตอนนี้มากกว่า[wa:440] "
1005505-76 = "― เพราะในเมืองแบบนี้น่ะ[wa:230] "
1005505-78 = "― มองไม่ค่อยเห็นดาวเท่าไหร่"
1005505-81 = "― เพราะในที่ที่สว่างเกินไป[wa:10] "
1005505-83 = "― จะไม่สามารถมองเห็นดวงดาวได้...[wa:860] "
1005505-86 = "― เพราะงั้น"
1005505-88 = "― การที่ฉันได้มองจากความมืดก็เพียงพอแล้วละ[wa:1090] "
1005505-91 = "― ขอแค่มีคนสำคัญ[wa:470] "
1005505-93 = "― และเครื่องดื่มอร่อยๆ..."
1005505-96 = "― จะอยู่ที่ไหนก็ไม่สำคัญหรอก[wa:10] "
1005505-99 = "จะว่าไป พอคิดถึงเพื่อนๆ ห้องเรียนพิเศษที่อยู่ที่อาคารเรียนเก่าก็รู้สึกผิดขึ้นมาแฮะ"
1005505-100 = "เพราะฉันได้รับการเอ็นดูจากคุณครูอยู่คนเดียวแบบนี้น่ะ"
1005505-101 = "...โนโดกะจะเกลียดฉันหรือเปล่านะ? ฮิฮิ"
1005505-102 = "[s7] \"จะมาด้วยกันทั้งหมดครูก็ไม่ติดนะ\"\n[s8] \"รอบหน้าพามาทุกคนเลยดีมั้ย?\""
1005505-108 = "อืม คุณครู..."
1005505-109 = "พูดแบบนั้น ฉันหักคะแนนความชอบนะ"
1005505-110 = "แต่ก็นะ ฉันคิดแล้วละว่าจะได้ยินคำตอบแบบนั้น ก็คุณครูเป็นแบบนั้นเสมอเลยนี่นา"
1005505-111 = "[s] \"อ้าว ดูทำหน้าเข้าสิ ครูทำอะไรผิดหรือเปล่า?\""
1005505-112 = "ฉันล้อเล่นน่า อืม อันที่จริง... ล้อเล่นครึ่งหนึ่ง จากใจจริงครึ่งหนึ่ง"
1005505-113 = "ถ้าคุณครูโอเค ฉันจะขอรับข้อเสนอนั้นไว้แล้วกัน"
1005505-114 = "เพราะเพื่อนๆ ห้องเรียนพิเศษต้องลำบากกันมากเลย ถ้าได้มีประสบการณ์แปลกใหม่ที่หาไม่ได้#nในชีวิตประจำวันแบบนี้ ทุกคนต้องสนุกกันมากแน่ๆ"
1005505-115 = "ร้านอาหารหรือสถานที่ที่อยากไปเป็นพิเศษงั้นเหรอ?"
1005505-119 = "อืม... คงเป็นที่ไหนก็ได้นั่นแหละ"
1005505-125 = "เพราะถ้าเป็นที่ที่นักเรียนห้องเรียนพิเศษทุกคนได้อยู่กับคุณครูละก็..."
1005505-126 = "ไม่ว่าจะเป็นที่ไหน ก็คงเป็นที่ที่มีความสุขที่สุดในโลกอยู่แล้ว"

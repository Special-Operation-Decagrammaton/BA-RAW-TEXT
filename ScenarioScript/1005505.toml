[translation]
1005505-1 = "悠悠哉哉"
1005505-2 = "（約好的那天，在市區的餐廳附近等著時雨）"
1005505-6 = "（看見了從遠處悠閒走來的時雨）"
1005505-7 = "[ns1] 向時雨揮手\n[ns2]「這裡這裡。」"
1005505-10 = "知道了知道了……"
1005505-15 = "那樣一直揮手的話，會吸引到很多視線的唷。"
1005505-16 = "還是說，你是故意要別人看的？"
1005505-20 = "開玩笑的，別那麼慌張。"
1005505-21 = "話說……"
1005505-22 = "這裡離赤冬實在是有點距離……#n不惜把我叫到這裡的「謝禮」會是什麼呢？"
1005505-23 = "要請我吃飯嗎？"
1005505-24 = "[s3]「嗯，如果有其他想去的地方再跟我說。」\n[s4]「畢竟難得來鬧區一趟。」"
1005505-27 = "唔嗯，首先還是吃個飯吧。"
1005505-28 = "赤冬的舊校舍附近可沒有這種鬧區和高級餐廳啊。"
1005505-29 = "好像也能吃到平時吃不到的料理？"
1005505-30 = "啊，難道……你已經預約好了嗎？"
1005505-31 = "……果然是這樣。那今天就讓老師護送吧。"
1005505-37 = "交給你囉，老師。"
1005505-46 = "（和時雨一起在餐廳享用餐點，度過了悠哉的時光）"
1005505-47 = "（……雖然在用餐時打算若無其事地點酒來喝的時雨讓人有點困擾就是了）"
1005505-54 = "感謝招待。謝謝你，老師。"
1005505-55 = "該怎麼說呢……"
1005505-56 = "嗯，是很開心又新鮮的經驗呢。"
1005505-57 = "像這樣和老師出門，在鬧區的餐廳吃非常驚人的高級料理……"
1005505-58 = "……以及，像這樣眺望都市的夜景。"
1005505-61 = "― 真是漂亮的夜景呢……[wa:440] "
1005505-64 = "― 謝謝你讓我看到"
1005505-66 = "― 這麼美的景色，老師。[wa:1660] "
1005505-69 = "[ns5]「時雨想要的話，隨時可以再來。」\n[ns6]「想來的話只要聯絡我一聲……」"
1005505-70 = "― ……你能這麼說，我很高興。[wa:2100] "
1005505-71 = "― ……你能這麼說，我很高興。[wa:2100] "
1005505-73 = "― 但我，果然還是喜歡現在的地方。[wa:1320] "
1005505-76 = "― ……在這種都市裡，[wa:710] "
1005505-78 = "― 看不太到星星對吧。"
1005505-81 = "― 在太過明亮的光線之中，[wa:480] "
1005505-83 = "― 會連星星都看不清楚的……[wa:1580] "
1005505-86 = "― 所以，"
1005505-88 = "― 我只要能在黑夜中眺望，就很滿足了。[wa:2010] "
1005505-91 = "― 只要有重要的人，[wa:710] "
1005505-93 = "― 和好喝的飲料的話……"
1005505-96 = "― 無論在什麼地方都無所謂嘛。[wa:300] "
1005505-99 = "雖然很好吃也很開心……但我不禁想起了舊校舍的事。"
1005505-100 = "老師的好意，居然只有我一個人收下……"
1005505-101 = "……會不會被和香討厭呢？之類的。"
1005505-102 = "[s7]「那樣的話，下次要不要大家一起來？」\n[s8]「那，下次就227號的大家一起來吧。」"
1005505-108 = "唔嗯……"
1005505-109 = "這樣要扣分唷，老師。"
1005505-110 = "不過，這也很像老師的作風就是了。"
1005505-111 = "[s]「感，感覺好像說錯了什麼……」"
1005505-112 = "呵呵，是開玩笑的唷。#n……大概一半是吧。"
1005505-113 = "老師不介意的話，我覺得是個不錯的提案。"
1005505-114 = "畢竟舊校舍處於那種環境……能到這種地方來的話，我想大家也會開心的。"
1005505-115 = "想去的商店或景點？"
1005505-119 = "唔嗯……哪裡都可以吧。"
1005505-125 = "只要227號組能在一起，而且老師也在的話……"
1005505-126 = "不管是哪裡，對我來說都是世界上最幸福的地方。"

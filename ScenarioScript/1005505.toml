[translation]
1005505-1 = "Intimately"
1005505-2 = "I was waiting for Shigure near a restaurant in the city to meet her."
1005505-6 = "After a while, I saw her walking towards me from a distance."
1005505-7 = "[ns1] Wave your hand.\n[ns2] \"I'm here, Shigure!\""
1005505-10 = "Geez, Sensei! I know, I'm coming!"
1005505-15 = "Stop waving like that! People might see us."
1005505-16 = "Or maybe you wanted to show off you were with me? *gasp* Sensei! Did you do that on purpose?"
1005505-20 = "Haha! Don't get so embarrassed. I was just teasing you."
1005505-21 = "So..."
1005505-22 = "Why did you want to meet downtown? It's a long ways out from Red Winter Academy."
1005505-23 = "You want to go to a restaurant? With me?"
1005505-24 = "[s3] \"If you have any preferences, let me know.\"\n[s4] \"Now that we're downtown, tell me what you like!\""
1005505-27 = "Well, thanks, Sensei. I'm glad I came."
1005505-28 = "We don't exactly get a lot of fine dining opportunities at the Former Institute."
1005505-29 = "I have to admit something like this is a pretty rare luxury for someone like me."
1005505-30 = "Did you by chance...already make a reservation somewhere?"
1005505-31 = "I kind of figured. Then, lead the way."
1005505-37 = "...I'm pretty excited."
1005505-46 = "Shigure and I enjoyed a nice meal at the restaurant and had a good time."
1005505-47 = "...Besides the fact that I spent half the dinner trying to stop Shigure from ordering vodka."
1005505-54 = "Wow. That was delicious. Thanks, Sensei."
1005505-55 = "How do I put this..."
1005505-56 = "You introduced me to a lot of new experiences today."
1005505-57 = "I had a really good time... I got to eat a meal with just you and me, and a delicious one at a fancy restaurant at that...and enjoy a warm cup of tea I could never find at the institute."
1005505-58 = "And just look at this view of downtown at night."
1005505-61 = "― It's such a beautiful view...[wa:10] "
1005505-64 = "― Thanks for showing me"
1005505-66 = "― this amazing night, Sensei.[wa:980] "
1005505-69 = "[ns5] \"If you want, we can go out more often.\"\n[ns6] \"You can tell me anytime you want something.\""
1005505-70 = "― That makes me happy, but...[wa:1540] "
1005505-71 = "― That makes me happy, but...[wa:1540] "
1005505-73 = "― Honestly, this moment right here is all I need.[wa:40] "
1005505-76 = "― You can't see[wa:550] "
1005505-78 = "― the stars in the city."
1005505-81 = "― There's too much light pollution,[wa:10] "
1005505-83 = "― so it blocks out their shine.[wa:900] "
1005505-86 = "― For me,"
1005505-88 = "― it's enough to gaze at them in the dark.[wa:1090] "
1005505-91 = "― As long as I get to share a drink[wa:10] "
1005505-93 = "― with someone I care about..."
1005505-96 = "― I don't need you to take me anywhere special.[wa:10] "
1005505-99 = "It actually makes me feel a little guilty about all the Spec Ops students back at the Former Institute."
1005505-100 = "I'm keeping your special treatment all to myself."
1005505-101 = "It might even make Nodoka hate me a little. Heehee."
1005505-102 = "[s7] \"We can all come here together.\"\n[s8] \"Should we call everyone at Spec Ops next time?\""
1005505-108 = "Hmm, Sensei..."
1005505-109 = "That was the wrong answer."
1005505-110 = "Well, I guess I more or less expected it."
1005505-111 = "[s] \"Oh, did I say something wrong?\""
1005505-112 = "I was kidding. Mostly."
1005505-113 = "If you want to, I don't think that's a bad idea."
1005505-114 = "The Spec Ops students work very hard. They'd be really happy to experience this too."
1005505-115 = "Do I have a preference as to where we would go?"
1005505-119 = "Anywhere, I guess."
1005505-125 = "As long as the Spec Ops and Sensei are with me..."
1005505-126 = "That's my happy place."

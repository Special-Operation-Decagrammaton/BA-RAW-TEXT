[translation]
10047005-1 = "บทเริ่มต้น;คำทำนาย"
10047005-5 = "เอาละ... ในที่สุดก็ถึงเวลาแล้วค่ะ"
10047005-6 = "เวลาที่จะบันดาลอนาคตใหม่ตามการชี้นำของอาร์คาน่า"
10047005-7 = "อุฮุฮุ... ถ้างั้นฉันจะเริ่มเลยนะคะ #nก่อนที่ <สิ่งเลวร้าย> จะนำพาจุดจบมาให้"
10047005-13 = "ผู้ที่ถูกชี้นำด้วยเสียงเพรียกแห่งโชคชะตา..."
10047005-14 = "การคุ้มครองของดวงดาวจะมอบความหวังให้ในไม่ช้า"
10047005-15 = "สิ่งนั้นคืออาทิตย์ยามรุ่งอรุณที่ขับไล่ความอยุติธรรม..."
10047005-16 = "และเป็นรถถังแห่งชัยชนะที่ฝ่าฟันอุปสรรค"
10047005-17 = "ขออำนาจอันยิ่งใหญ่นั้น จงโค่นล้มหอคอยแห่งการขบถ..."
10047005-19 = "และนำรุ่งอรุณอันสดใสมาให้"
10047005-24 = "โอ้ว ดวงชะตานี้มัน...!"
10047005-25 = "ไม่ผิดแน่ค่ะ นี่คือคำทำนายที่บอกว่าความปรารถนาของทุกคนจะเป็นจริง!"
10047005-26 = "อุฮุฮุ วันที่เซนส์ด้านศิลปะของฉันจะเฉิดฉาย... ก็คงใกล้เข้ามาแล้วด้วยค่ะ!"
10047005-27 = "ฮุฮุ อุฮุฮุฮุ..."
10047005-28 = "อุฮุฮุฮุฮุฮุ...!!"
10047005-32 = "เอาละ! จากนี้ไม่ว่าจะเจอกับอนาคตแบบไหน ฉันก็ไม่กลัวค่ะ!"
10047005-33 = "งั้นเรามาเริ่มกันเลยค่ะ!"
10047005-34 = "ก้าวแรกอันเจิดจรัสที่จะถูกจารึกไว้ในหน้าประวัติศาสตร์!"

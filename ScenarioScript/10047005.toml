[translation]
10047005-1 = "序幕;預言"
10047005-5 = "……很好，這一刻終於到來了。"
10047005-6 = "依循阿爾克那的指引，預示嶄新未來的時間。"
10047005-7 = "妞呵呵……那麼開始吧。#n在「禁忌之物」終結一切之前。"
10047005-13 = "「……受命運引導之人啊。」"
10047005-14 = "「星之庇佑將雕琢出希望。」"
10047005-15 = "「那是驅散不淨的黎明之太陽……」"
10047005-16 = "「也是突破絕望的勝利戰車。」"
10047005-17 = "「那股偉大的力量將摧毀不祥之塔──」"
10047005-19 = "「並迎來燦爛的曙光。」"
10047005-24 = "哦哦，這個占卜結果是……！"
10047005-25 = "毫無疑問……是大家的願望都將實現的預言！"
10047005-26 = "妞呵呵。能一展我藝術天賦的時刻……也近在眼前了！"
10047005-27 = "妞呵，妞呵呵呵……"
10047005-28 = "妞呵呵呵呵呵……！！"
10047005-32 = "好！無論將要面臨哪種未來都不足為懼！"
10047005-33 = "向前邁進吧！"
10047005-34 = "邁出那將銘刻於歷史──耀眼的第一步！"

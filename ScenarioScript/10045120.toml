[translation]
10045120-1 = "บทส่งท้าย;ตอนจบของเรื่อง"
10045120-5 = "ดอก#nไม้#nบาน#nสด#nใส"
10045120-7 = "ฤดู#nร้อน#nผ่าน#nพ้น#nไป"
10045120-9 = "สู่#nฤดู#nใหม่#nเย็น#nอุรา"
10045120-12 = "[log=치세 수영복]ดอกไม้บานสดใส[/log]"
10045120-13 = "[log=치세 수영복]ฤดูร้อนผ่านพ้นไป[/log]"
10045120-14 = "[log=치세 수영복]สู่ฤดูใหม่เย็นอุรา[/log]"
10045120-15 = "(สุดท้ายก็เกิดระเบิดขนาดใหญ่ในสวนน้ำที่เป็นสนามการแข่งขัน และทุกอย่างก็จมลงทะเล)"
10045120-16 = "(ตอนนี้ทุกคนจึงต้องมาช่วยกันสะสางเศษซากสวนน้ำ...)"
10045120-18 = "มะ... ไม่เป็นไรค่ะ! ถึงสนามแข่งจะได้รับความเสียหาย แต่การแข่งขันครั้งนี้ก็ประสบความสำเร็จ#nอย่างยิ่งใหญ่ จนต้องบันทึกไว้ในประวัติศาสตร์เฮียกคิยาโคเลยค่ะ!"
10045120-19 = "ใช่ค่ะ! เป็นการต่อสู้ที่เร้าใจมากเลยค่ะ!"
10045120-20 = "ทุกคนทำได้ดีมากเลยค่ะ ขอบคุณที่ช่วยเก็บกวาดในตอนท้ายกันด้วยนะคะ"
10045120-22 = "เทศกาลสวนน้ำครั้งนี้เป็นประสบการณ์ที่ดีเลยละ ผู้ชนะก็มาจากเฮียกกะเรียวรันด้วย"
10045120-24 = "ไม่เอาน่า... ไม่ใช่แค่ฉันคนเดียวสักหน่อยที่ชนะ"
10045120-25 = "ใช่แล้วค่ะ! อิซุนะเป็นผู้ชนะร่วมกับท่านเรนเกะนะคะ นินนิน!"
10045120-26 = "ถึงจะน่าเสียดายที่สนามได้รับความเสียหายจนสู้ต่อไม่ได้ แต่ที่ผ่านมาก็เป็นการต่อสู้ที่ดุเดือดเลยละ"
10045120-27 = "อิซุนะก็คิดอย่างนั้นค่ะ เป็นเกียรติมากจริงๆ ที่ได้สู้กับท่านเรนเกะค่ะ!"
10045120-29 = "นอกจากแมตช์หลักแล้ว แมตช์พิเศษที่จัดขึ้นก็ได้รับการตอบรับอย่างล้นหลามเลยเจ้าค่ะ!"
10045120-30 = "ใช่"
10045120-31 = "ถ้าไม่เกิดระเบิดขึ้น เรื่องราวจะเป็นยังไงต่อนะ?"
10045120-33 = "ว่าแต่คุณคนนั้นไปไหนแล้วล่ะคะ? ฉันไม่เห็นอยู่แถวนี้เลย"
10045120-34 = "คงไปช่วยเก็บกวาดอยู่ที่อื่นน่ะ"
10045120-35 = "ระหว่างนั้นก็คงฝึกว่ายน้ำไปด้วย"
10045120-38 = "ฮึบ... ฮู่ว... ฮึบ..."
10045120-44 = "หนึ่ง สอง หนึ่ง สอง..."
10045120-45 = "(ที่เรนเกะบอกว่าให้ <ผ่อนคลายและเป็นหนึ่งเดียวกับสายน้ำ> คือความรู้สึกแบบนี้สินะ)"
10045120-46 = "(ดีละ ตอนนี้ฉันว่ายท่าลูกหมาตกน้ำ... ไม่สิ ว่ายน้ำท่าพื้นฐานได้สมบูรณ์แบบแล้ว)"
10045120-47 = "(พอเริ่มคุ้นเคยแล้วก็คงฝึกท่าที่ยากกว่านี้ได้เองแหละ...)"
10045120-48 = "[ns1] \"โอ้ ตอนนี้ว่ายน้ำเก่งแล้วนะเนี่ย!\"\n[ns2] \"คิเคียวของครูเป็นแมวที่ชอบน้ำแล้วนะเนี่ย!\""
10045120-51 = "คุณ.. อ๊ะ... บุ๋มๆๆ... คุณครู?!"
10045120-55 = "[ns] \"ปะ... เป็นอะไรหรือเปล่า?!\""
10045120-56 = "...!!"
10045120-61 = "[ns3] \"ไม่ว่ายน้ำแล้วเหรอ?\"\n[ns4] \"ขอโทษนะ ครูมารบกวนหรือเปล่า?\""
10045120-64 = "ฉันเก็บกวาดเศษทุ่นที่ลอยอยู่ตรงนี้หมดแล้ว งั้นการฝึกว่ายน้ำก็จบเพียงเท่านี้"
10045120-65 = "ทำไมทำหน้าแบบนั้นล่ะ...? อยากดูท่าทางที่ดูไม่ได้ของฉันต่องั้นเหรอ?"
10045120-66 = "[s5] \"ดูไม่ได้อะไรกันล่ะ คิเคียวน่าภูมิใจมากต่างหาก\"\n[s6] \"คิเคียวเอาชนะจุดอ่อนของตัวเองได้อย่างน่าภูมิใจต่างหาก\""
10045120-69 = "ยังเรียกว่าภูมิใจไม่ได้หรอก"
10045120-70 = "แต่ก็นะ... เหตุการณ์ในครั้งนี้ทำให้ฉันได้เรียนรู้อะไรเยอะเลย"
10045120-71 = "จากนี้ไปถ้ามีอะไรที่ฉันทำไม่ได้ ฉันจะไม่ถืออีโก้แล้วกล้าบอกอย่างตรงไปตรงมา"
10045120-72 = "เพราะฉันรู้แล้วว่าต่อให้ตัวเองจะยังบกพร่อง แต่ก็ยังมีหลายคนที่คอยเชียร์และอยู่ข้างๆ ฉัน"
10045120-73 = "เรื่องที่ฉันพูดไปเมื่อกี้ อย่าไปบอกกับคนอื่นล่ะ... เข้าใจมั้ย?"
10045120-74 = "[s] \"ได้สิ! แต่มาฝึกว่ายน้ำกันต่อนะ! ครูจะช่วยเอง!\""
10045120-75 = "วะ... ว่าไงนะ...?"
10045120-79 = "งั้นก็ช่วยไม่ได้สินะ... ยังไงก็ดีกว่าให้ความลับถูกเปิดเผยละนะ"
10045120-83 = "โอ้? ว่ายน้ำกับคุณครูเหรอ?"
10045120-84 = "ระ... เรนเกะ?"
10045120-86 = "ในเมื่อเราเก็บกวาดหมดแล้ว งั้นเราก็ลงไปเล่นน้ำด้วยกันเถอะ"
10045120-87 = "เจ้าค่ะ! มาสนุกกับฤดูร้อนกับท่านอาจารย์ด้วยกันเถอะเจ้าค่ะ!"
10045120-89 = "งั้นใครขึ้นไปบนก้อนหินตรงโน้นได้ก่อนเป็นคนชนะ"
10045120-90 = "อ๊ะ จริงสิ ท่านอาจารย์ เมื่อกี้ท่านอาจารย์เป็นคนเขียนบทแนะนำผู้เข้าแข่งขันใช่มั้ย?"
10045120-91 = "เตรียมตัวเจอดีได้เลย!"
10045120-92 = "อ่า... จะว่าไป..."
10045120-93 = "[ns7] \"ฮุฮุ ใช่แล้วละ! ครูเขียนเอง!\"\n[ns8] \"ครูเขียนเอง แต่ไม่มีใครทำอะไรครูได้หรอก!\""
10045120-96 = "[ns] \"นั่นเป็นสิทธิ์ของผู้บรรยายและกรรมการตัดสินน่ะ!\""
10045120-97 = "ฮุฮุ จะชิลได้แบบนี้สักแค่ไหนกันนะ...?"
10045120-99 = "เอาละ งั้นเราจะนับหนึ่งถึงสามแล้วออกตัวพร้อมกันนะเจ้าคะ!"
10045120-100 = "หนึ่ง~!"
10045120-101 = "สอง!"
10045120-103 = "[ns] \"สาม~!\""
10045120-114 = "ดวงอาทิตย์เจิดจ้าใต้ท้องฟ้าสดใสสุดลูกหูลูกตา #nฤดูร้อนอยู่ตรงหน้า"
10045120-115 = "พร้อมเรื่องราวที่เต็มไปด้วยมิตรภาพและช่วงเวลาแห่งวัยรุ่นของทุกคน"
10045120-116 = "หนึ่งดอกไม้งามที่ผลิบานกลางร้อยบุปผา ~ศึกประชันบนผืนน้ำอย่างยุติธรรม~"

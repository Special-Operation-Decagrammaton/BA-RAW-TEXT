10045120-15 = "In the end, the stadium sank to the bottom of the ocean with the loud bang."
10045120-16 = "Everyone pitched in to help clean up whatever was left."
10045120-18 = "I-It's fine! The stadium might be in shambles, but this festival will be talked about in Hyakkiyako's history classes for years to come!"
10045120-19 = "I am in agreement! The competition had one invigorating match after the other!"
10045120-20 = "Excellent work, everyone! And thank you very much for helping with the cleanup!"
10045120-22 = "I truly enjoyed the experience. And we're also walking away with a victor among us."
10045120-24 = "Ehhh, I wasn't the only winner, though!"
10045120-25 = "Yes! We are joint winners, nin nin!"
10045120-26 = "It's a shame we couldn't finish, because of the stadium blowing up and all, but it was a really fun match!"
10045120-27 = "Izuna thinks so too. Izuna is honored to have gone against you!"
10045120-29 = "I personally enjoyed the exhibition match immensely! And the audience members certainly did as well!"
10045120-30 = "Yeah, me too."
10045120-31 = "I'll always wonder how things would've played out, if it weren't for that explosion."
10045120-33 = "Speaking of, where did Kikyou go? I haven't seen her since."
10045120-34 = "She's probably doing some cleaning on her own..."
10045120-35 = "...during her special swim training."
10045120-38 = "*inhale* *exhale*"
10045120-44 = "One, two. One, two..."
10045120-45 = "(Perhaps this is the \"relaxing and having fun\" Renge spoke of.)"
10045120-46 = "(Good. Now, I've nearly perfected this doggy padd— Ahem. This swimming method. I've nearly perfected this swimming method.)"
10045120-47 = "(And then, at last, I will move on to the next stroke...)"
10045120-48 = "[ns1] \"Look at you! You're a pro now!\"\n[ns2] \"You're a fishing cat now, Kikyou!\""
10045120-51 = "Se— *gurgle*... Sensei?!"
10045120-55 = "[ns] \"Y-You okay?!\""
10045120-56 = "...!!"
10045120-61 = "[ns3] \"Are you done swimming?\"\n[ns4] \"Sorry, did I make you stop?\""
10045120-64 = "It's fine. I simply found the opportunity to practice and clean wreckage at the same time, but I've finished here."
10045120-65 = "...Why do you look disappointed? Did you wish to keep watching me and my ridiculous form?"
10045120-66 = "[s5] \"More like impressive!\"\n[s6] \"Not everyone can overcome their fears so quickly.\""
10045120-69 = "...My progress is far from satisfactory."
10045120-70 = "However, I learned much from this experience."
10045120-71 = "I've learned that pride is only an obstacle. I shall not hide my weaknesses from my allies, and conduct myself with sincerity whenever I falter."
10045120-72 = "Because I know that even if I'm lacking, I will always have friends supporting me at my side."
10045120-73 = "...There will be consequences if you repeat these words to anyone else."
10045120-74 = "[s] \"Yes, ma'am! But only if you let me help you practice more!\""
10045120-75 = "Wh-What...?"
10045120-79 = "...I suppose it can't be helped. You leave me no choice."
10045120-83 = "Oh? Are you and Sensei doing some swimming practice?"
10045120-84 = "R-Renge?"
10045120-86 = "Let's all practice! We've finished cleaning up on our side."
10045120-87 = "Yes! We shall bask in the summer's glow with Sensei!"
10045120-89 = "All right! Last one to touch that rock and get back to shore is the loser!"
10045120-90 = "Ah, right. Mentor. #nYou're the one who wrote those player introductions, aren't you?"
10045120-91 = "You better watch your back!"
10045120-92 = "...Ah. I nearly forgot."
10045120-93 = "[ns7] \"Fufu, yes! It was me!\"\n[ns8] \"But you can't do anything about it!\""
10045120-96 = "[ns] \"That's the privilege of being an emcee!\""
10045120-97 = "Fufu. How long will you maintain that attitude, Sensei?"
10045120-99 = "Then, on the count of three, everyone!"
10045120-100 = "One...!"
10045120-101 = "Two!"
10045120-103 = "[ns] \"Three!\""
10045120-114 = "Endlessly clear, blue skies. The heat of an unrelenting sun.#nSummer has arrived!"
10045120-115 = "This is a story of friendship and youth."
10045120-116 = "A Flower Blooms Among the Hundred: Fair and Square Aquatic Showdown"

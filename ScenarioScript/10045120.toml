[translation]
10045120-1 = "尾聲;故事的結尾"
10045120-5 = "春#n焰#n熾"
10045120-7 = "夏#n將#n盡"
10045120-9 = "秋#n風#n來"
10045120-12 = "[log=치세 수영복]春焰熾[/log]"
10045120-13 = "[log=치세 수영복]夏將盡[/log]"
10045120-14 = "[log=치세 수영복]秋風來[/log]"
10045120-15 = "（最終，比賽場地在一場巨大的爆炸後沉入了海中）"
10045120-16 = "（現在大家正在清理殘骸……）"
10045120-18 = "沒，沒關係！雖然場地毀了，但這次大會絕對是百鬼夜行史上值得銘記的大成功！"
10045120-19 = "是啊！真是場讓人心跳加速的比賽！"
10045120-20 = "大家都辛苦了。#n謝謝你們幫忙收尾。"
10045120-22 = "畢竟是多虧了大家，我們才能獲得這麼棒的經驗。#n況且我們之中還誕生了冠軍呢。"
10045120-24 = "哎呀，奪冠的可不只有我一個人哦？"
10045120-25 = "沒錯！伊樹菜和蓮華閣下並列冠軍，忍忍！"
10045120-26 = "雖然因為場地壞了沒能分出勝負有點可惜，不過真是一場熱血的對決。"
10045120-27 = "伊樹菜也這麼覺得。#n能參與其中真是榮幸至極！"
10045120-29 = "除了正式比賽之外，特別賽也大受歡迎呢！"
10045120-30 = "就是說啊。"
10045120-31 = "如果沒有爆炸的話，真不曉得會怎麼發展呢。"
10045120-33 = "那位同學現在人在哪裡？好像沒看到他呢。"
10045120-34 = "大概是在其他地方清理殘骸吧。"
10045120-35 = "搞不好還在順便進行游泳特訓也說不定哦。"
10045120-38 = "吸──呼──吸──呼──"
10045120-44 = "一，二，一，二……"
10045120-45 = "（這就是蓮華說的「放鬆享受」的感覺嗎？）"
10045120-46 = "（很好。狗爬式……不，這種游法已經幾乎完美了）"
10045120-47 = "（只要再熟練一點就能進入下個階段……）"
10045120-48 = "[ns1]「哎呀，已經越游越上手了呢！」\n[ns2]「我們桔梗完全變成水中小貓了！」"
10045120-51 = "咦，啊，咕嚕……老師！？"
10045120-55 = "[ns]「你，你沒事吧！？」"
10045120-56 = "……！！"
10045120-61 = "[ns3]「不游了嗎？」\n[ns4]「抱歉，好像打擾到你了。」"
10045120-64 = "這邊的漂流物已經清理乾淨，所以練習也該結束了。"
10045120-65 = "……那是什麼表情？想一直看我出糗嗎？"
10045120-66 = "[s5]「出糗？任誰看了都覺得很了不起吧？」\n[s6]「桔梗可是光明正大克服了自己的弱點哦？」"
10045120-69 = "這種程度還差得遠呢。"
10045120-70 = "……不過這次事件確實讓我學到了很多。"
10045120-71 = "之後如果又遇到不擅長的事情，我不會再選擇逞強，而是會坦率地說出來。"
10045120-72 = "因為我已經明白就算自己並不完美……身旁還是有群比任何人都喜歡我的人。"
10045120-73 = "……剛才這些絕對不能告訴其他人，知道了嗎？"
10045120-74 = "[s]「好！不過條件是你要繼續練習游泳！我會在一旁幫你的！」"
10045120-75 = "什，什麼……？"
10045120-79 = "……沒辦法了，畢竟總不能讓祕密曝光啊。"
10045120-83 = "哦？要跟老師一起游泳嗎？"
10045120-84 = "蓮，蓮華！？"
10045120-86 = "我們也一起游泳吧。#n收尾工作已經結束了。"
10045120-87 = "好！要和老師一起享受夏天！"
10045120-89 = "那就比賽誰先游到那邊的岩石吧！"
10045120-90 = "啊對了，師父。#n剛剛的選手介紹詞是你寫的吧？"
10045120-91 = "給我記住！"
10045120-92 = "……啊啊，怪不得。"
10045120-93 = "[ns7]「哼哼！沒錯，正是在下！」\n[ns8]「不過沒有人可以制裁我！」"
10045120-96 = "[ns]「這就是活動解說員的特權！」"
10045120-97 = "呵呵，看你能得意到什麼時候……"
10045120-99 = "來吧，數到三就出發！"
10045120-100 = "一～！"
10045120-101 = "二！"
10045120-103 = "[ns]「三～！」"
10045120-114 = "晴朗的天空，炙熱的太陽。#n夏天，就在此處。"
10045120-115 = "這是一段，由友情與青春交織而成的盛夏物語──"
10045120-116 = "百中綻放的一朵～光明正大的水上對決～"

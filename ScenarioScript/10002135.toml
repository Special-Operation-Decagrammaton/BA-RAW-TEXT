10002135-66 = "3;하스미;99;……아아. 이것 때문에……. 저런…… 혹시 부담을 드렸던 걸까요.\n#3;closeup\n#3;em;[땀]\n#3;stiff"
10002135-67 = "3;하스미;01;……음? 리스트가 있어서 오히려 자연스럽게 진행이 된 거 같다고요?\n#3;closeup"
10002135-68 = "3;하스미;99;후훗……\n#3;closeup"
10002135-69 = "3;하스미;03;그렇게 말씀해 주시니 감사하네요. 어느 정도는 의도한 것이기도 합니다만……\n#3;em;[반짝]\n#3;greeting\n#3;closeup"

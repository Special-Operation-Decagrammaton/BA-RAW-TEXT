[translation]
10002135-1 = "第13話;夏日天空的願望清單"
10002135-2 = "（等到所有煙火全都用完時，海邊已充斥著火藥的味道）"
10002135-3 = "（本就已經很暗的海邊，又因焦黑的灰燼變得更加漆黑……）"
10002135-5 = "咳咳，咳咳！#n啊嗚……眼睛又被煙給……"
10002135-6 = "呼，是我們贏了呢。"
10002135-7 = "夜晚的沙灘，以及凝固汽油彈的味道……這就是海啊。還不賴。"
10002135-8 = "所以說真的不是這樣的梓醬……"
10002135-9 = "話說回來，為什麼又變成這樣了……"
10002135-10 = "啊嗚嗚……對，對了，這麼說來剛才還沒拍照……！"
10002135-11 = "[s1]「別擔心，我已經拍好了哦。」\n[s2]「我覺得是張很棒的照片。」"
10002135-12 = "咦咦……！？老，老師……！？#n是在什麼時候拍的！？"
10002135-13 = "咦咦……！？老，老師……！？#n是在什麼時候拍的！？"
10002135-16 = "哇啊啊……好厲害！"
10002135-17 = "這樣看起來好像只是在平凡玩著漂亮的煙火呢……！？"
10002135-19 = "啊，這張照片，也有拍到我們……是什麼時候拍了這麼多……"
10002135-20 = "[s]「弦生也要來看嗎？」"
10002135-22 = "……咕嘎！？唔咦咦！？"
10002135-23 = "……！！！！"
10002135-24 = "……那，那那個……唔……"
10002135-25 = "……謝謝……"
10002135-27 = "（之後盡可能地把海邊收拾乾淨，直到天亮為止）"
10002135-28 = "（把所有行李和垃圾全都搬到十字軍醬時，太陽也正好開始升起）"
10002135-30 = "[ns]「那麼我們回去吧。」"
10002135-36 = "（或許是因為玩得比想像中累，等回到戰車上後，大家幾乎都已進入了夢鄉）"
10002135-37 = "（與出發時的緊張氛圍不同，所有人都帶著安穩滿足的表情……）"
10002135-43 = "（……除了明明已經很疲倦卻還是努力駕駛著的日步美之外）"
10002135-45 = "（從海邊回來後的隔天）"
10002135-48 = "實現正義部社團教室"
10002135-51 = "哎呀，老師。好久不見了呢。"
10002135-52 = "非常感謝您的帶領。在海邊過得如何呢？"
10002135-53 = "麻白和弦生因有實現正義部的任務在身，因此暫時不在……"
10002135-54 = "不過弦生似乎已經恢復元氣，真是太好了。非常謝謝您。"
10002135-55 = "麻白也似乎稍微放鬆了一些。"
10002135-56 = "如果另外兩位同學也有樂在其中就再好不過了……#n老師您覺得如何呢？"
10002135-57 = "[s3]「雖然一開始似乎有點困惑……」\n[s4]「還是該說有點類似被暑假作業追著跑的感覺呢。」"
10002135-58 = "咦？ "
10002135-59 = "咦？ "
10002135-64 = "[ns] 拿出從兩人手中獲得的清單"
10002135-66 = "……啊啊，原來如此。#n我也想過這麼做是否有些多餘，果然造成困擾了嗎……？"
10002135-67 = "……您認為有清單反而有所幫助，是嗎？"
10002135-68 = "呵呵……"
10002135-69 = "非常感謝您能這麼說。#n這某方面也是我的本意沒錯……"
10002135-70 = "對那兩位來說，我認為弦生可能會是個不太好相處的對象。#n我是怕他們會尷尬，才會準備這份清單。"
10002135-71 = "如果反而讓他們兩位更加緊張的話，實在有點過意不去……"
10002135-72 = "不過我認為如果把該做的事明確地寫出來，至少那段時間能讓他們開心地享受……"
10002135-73 = "[s5]「不愧是蓮實呢。」\n[s6]「如果沒有它的話，想必會更加辛苦吧。」"
10002135-74 = "呵呵。#n聽見老師這麼說，心中的疲勞彷彿都一掃而空了。"
10002135-75 = "呵呵。#n聽見老師這麼說，心中的疲勞彷彿都一掃而空了。"
10002135-76 = "方便的話，還請您告知兩位同學「辛苦了」。"
10002135-77 = "比起我……我想由老師開口會更加合適吧。"
10002135-78 = "再次感謝您的協助，老師。"
10002135-83 = "那麼再會……"
10002135-88 = "[ns]「蓮實。」"
10002135-89 = "……有什麼事嗎？"
10002135-90 = "[s7]「下次蓮實也一定要一起去哦。」\n[s8]「如果蓮實也在，一定會更開心的。」"
10002135-91 = "……我也一起，是嗎？"
10002135-92 = "……我也一起，是嗎？"
10002135-93 = "呵呵，雖然我要離開這裡或許有些困難……"
10002135-94 = "您的心意我就感激地收下了。#n真希望有朝一日能夠實現呢。"
10002135-95 = "……嗯？"
10002135-96 = "除此之外還有其他事嗎？"
10002135-97 = "……這份清單？"
10002135-98 = "……呵呵，您果然非常敏銳呢……"
10002135-99 = "就當作是每個人在感到繁忙、疲勞時，都會想像一下的事情吧。"
10002135-100 = "就只是這樣。並不是什麼特別的事。"
10002135-101 = "聽您這麼一說，我差點忘記了，照片的部份拍的如何呢？"
10002135-102 = "那是因為我無法一起去，所以想要透過照片欣賞才提議的……請問有照片嗎？"
10002135-103 = "[s] 遞出照片"
10002135-109 = "謝謝您，那麼請容我過目……"
10002135-110 = "……？"
10002135-111 = "……老師？"
10002135-112 = "……這些是……？"
10002135-113 = "[s9]「令人眼睛一亮的照片。」 \n[s10]「是夏日海邊的願望清單哦。」"
10002135-119 = "……呵呵，確實如此。"
10002135-125 = "……拍的真不錯呢。"
10002135-126 = "夏日天空的願望清單"

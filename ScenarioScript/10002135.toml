[translation]
10002135-1 = "Episode 13;Summer Sky's Wishlist"
10002135-2 = "The beach reeked of gunpowder and napalm by the time the fireworks duel was over."
10002135-3 = "It was already dark outside, but it became pitch black in the smoke and soot left behind."
10002135-5 = "*cough* *cough* Ahhh! There's smoke everywhere."
10002135-6 = "The victory is ours."
10002135-7 = "The salt of the sea and napalm... So this is what the beach smells like at night. I quite like it."
10002135-8 = "You're getting it all wrong again, Azusa!"
10002135-9 = "We didn't come here to win battles..."
10002135-10 = "And I didn't even get any good pictures of the fireworks. What are we going to do now?"
10002135-11 = "[s1] \"No worries. I took one.\"\n[s2] \"I think this one should do nicely.\""
10002135-12 = "When did you manage to do that, Sensei?!"
10002135-13 = "When did you manage to do that, Sensei?!"
10002135-16 = "This is amazing!"
10002135-17 = "If I didn't know any better, this would look like a picture of a regular fireworks show!"
10002135-19 = "And then it became anything but that..."
10002135-20 = "[s] \"Do you want to take a look too, Tsurugi?\""
10002135-22 = "Huh? Me?!"
10002135-23 = "...!"
10002135-24 = "I, um... "
10002135-25 = "Yes, please..."
10002135-27 = "After that, we spent the night cleaning the beach."
10002135-28 = "The sun was just beginning to rise when we finished packing our things back onto the Crusadie."
10002135-30 = "[ns] \"All right. Let's go home.\""
10002135-36 = "Unsurprisingly, the others were exhausted after being up all night and slept through the entire trip home."
10002135-37 = "They all seemed completely relaxed after all the fighting they had done yesterday."
10002135-43 = "That is, all of them except for Hifumi, who still had to drive us home."
10002135-45 = "The next day."
10002135-48 = "Justice Task Force Room"
10002135-51 = "Good to see you again, Sensei."
10002135-52 = "I understand you escorted the others. I hope you enjoyed your trip."
10002135-53 = "Mashiro and Tsurugi are on duty at the moment, so I'm sorry they're not here to greet you."
10002135-54 = "Though I'm glad to say Tsurugi looks like she's back to her old self. I can't thank you enough."
10002135-55 = "Even Mashiro seems to be more relaxed and composed now."
10002135-56 = "What about the other two? Do you think the trip did them some good, Sensei?"
10002135-57 = "[s3] \"I think they did their best to have fun.\"\n[s4] \"They saw it more as a homework assignment.\""
10002135-58 = "Huh? "
10002135-59 = "Huh? "
10002135-64 = "[ns] Show the checklist."
10002135-66 = "Ah. It must have added some pressure."
10002135-67 = "The list was actually helpful, you said?"
10002135-68 = "Heehee."
10002135-69 = "Thank you for letting me know. I devised it with the best of intentions, yet I was still worried it would push them too far."
10002135-70 = "I know getting used to being around Tsurugi can be difficult, so my hope was that the list would help everyone break the ice."
10002135-71 = "My apologies if it only made life harder for those two from the Make-Up Work Club."
10002135-72 = "I thought having a list of clear tasks would help them enjoy their summer vacation."
10002135-73 = "[s5] \"I think it did its job.\"\n[s6] \"Would've been a lot worse without it.\""
10002135-74 = "Thank you, Sensei. That puts my mind at ease."
10002135-75 = "Thank you, Sensei. That puts my mind at ease."
10002135-76 = "The next time you see those two, could you tell them they won't have to worry about completing a checklist like that again?"
10002135-77 = "I think it would be better coming from you than me."
10002135-78 = "Thanks for everything again, Sensei."
10002135-83 = "Until we meet again."
10002135-88 = "[ns] \"Hasumi.\""
10002135-89 = "Huh?"
10002135-90 = "[s7] \"Why don't you join us next time?\"\n[s8] \"It'd be great if you came with us next time.\""
10002135-91 = "Huh? You want me to come next time?"
10002135-92 = "Huh? You want me to come next time?"
10002135-93 = "I see. I wouldn't be able to leave here for very long..."
10002135-94 = "...but thank you for the invitation. That alone makes my heart feel like it's already on a lovely vacation."
10002135-95 = "Huh?"
10002135-96 = "Is there something else you wanted to discuss?"
10002135-97 = "You're still curious about the list? How far ahead of time was it written?"
10002135-98 = "So you noticed, then. That's a hard question to answer."
10002135-99 = "Sometimes when I'm tired, I write down the things I would like to do someday."
10002135-100 = "That's all there is to it, so don't overthink it."
10002135-101 = "Oh, I nearly forgot. You took photos for every item too, correct?"
10002135-102 = "Even if I couldn't attend myself, I was hoping to see everyone having fun through the photos. May I take a look?"
10002135-103 = "[s] Show Hasumi the pictures."
10002135-109 = "Thank you. Let's see..."
10002135-110 = "...?"
10002135-111 = "Sensei?"
10002135-112 = "These pictures. Are they really...?"
10002135-113 = "[s9] \"See? Everyone had a good time.\"\n[s10] \"They're all from completing the wishlist.\""
10002135-119 = "They did have fun, didn't they?"
10002135-125 = "What lovely photos."

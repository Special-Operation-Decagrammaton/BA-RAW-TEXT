[translation]
10002135-1 = "ตอนที่ 13;ความปรารถนาในฤดูร้อน"
10002135-2 = "(หลังจากเปลวไฟสงบลงแล้ว กลิ่นของดินปืนและระเบิดนาปาล์มก็ลอยคละคลุ้งไปทั่ว)"
10002135-3 = "(ชายหาดที่มืดลงแล้วกลับดูมืดครึ้มยิ่งกว่าเดิมจากควันไฟที่หลงเหลืออยู่)"
10002135-5 = "แค่กๆ แค่กๆ! อ๊าาา... ควันเยอะจนแสบตาไปหมดแล้ว..."
10002135-6 = "พวกเราเป็นฝ่ายชนะแล้วสินะคะ"
10002135-7 = "กลิ่นระเบิดนาปาล์มตอนกลางคืนนี่ดีจังเลยนะ..."
10002135-8 = "เดี๋ยวสิ เข้าใจผิดแล้วนะคะ อาซึสะจัง..."
10002135-9 = "เราไม่ได้มาที่นี่เพื่อชนะการต่อสู้นะคะ..."
10002135-10 = "อ่า... ต้องเป็นเรื่องแน่ๆ... เรื่องรูปจะทำยังไงดีล่ะคะ...?? ถ้าเป็นแบบนี้คงไม่ได้รูปแน่ๆ..."
10002135-11 = "[s1] \"ไม่ต้องห่วง ครูถ่ายรูปไว้แล้วล่ะ\"\n[s2] \"ครูคิดว่ารูปนี้ก็ถ่ายออกมาสวยดีนะ\""
10002135-12 = "เอ๋...!? คุณครู...!? ถ่ายไว้ตั้งแต่เมื่อไหร่คะเนี่ย?!"
10002135-13 = "เอ๋...!? คุณครู...!? ถ่ายไว้ตั้งแต่เมื่อไหร่คะเนี่ย?!"
10002135-16 = "ว้าว... สุดยอดเลยค่ะ!"
10002135-17 = "ถ้าไม่รู้เบื้องหลัง มันก็ดูเหมือนเป็นรูปการเล่นดอกไม้ไฟสวยๆ ธรรมดาๆ เลยนะคะ...!?"
10002135-19 = "อะ...เอ๋? รูปนี้... คุณครูถ่ายรูปพวกเราเหรอคะ? ทำไมถึงได้ถ่ายรูปแบบนี้..."
10002135-20 = "[s] \"ซึรุกิ อยากดูรูปไหม?\""
10002135-22 = "เอ๋...!? แค่กๆ!?"
10002135-23 = "...!!!! "
10002135-24 = "ฉะ...ฉะ...คือ... "
10002135-25 = "ค่ะ... รบกวนด้วยค่ะ... "
10002135-27 = "(จากนั้นทุกคนก็ใช้เวลาช่วยกันเก็บกวาดตลอดทั้งคืน)"
10002135-28 = "(ตอนที่ทำความสะอาดเสร็จและขนทุกอย่างไปไว้ที่ครูเซเดอร์ก็เป็นตอนที่พระอาทิตย์เริ่มโผล่พ้นขอบฟ้า..)"
10002135-30 = "[ns] \"ถ้างั้นก็กลับกันเถอะ\""
10002135-36 = "(ทุกคนอ่อนล้าเพราะทำความสะอาดมาตลอดทั้งคืนทำให้หลับกันหมดในระหว่างทางที่กลับ)"
10002135-37 = "(แต่ว่าใบหน้าของทุกคนกลับดูมีความสุข...)"
10002135-43 = "(ยกเว้นแต่ฮิฟุมิที่เป็นคนขับครูเซเดอร์กลับด้วยสีหน้าที่ดูอิดโรย...)"
10002135-45 = "วันต่อมา"
10002135-48 = "ห้องชมรมทวงความยุติธรรม"
10002135-51 = "มาแล้วเหรอคะ คุณครู ไม่ได้พบกันนานเลยนะคะ"
10002135-52 = "คุณครูไปทะเลมาด้วยสินะคะ หวังว่าคุณครูจะมีช่วงเวลาที่สนุกสนานนะคะ "
10002135-53 = "ตอนนี้มาชิโระกับซึรุกิออกไปทำภารกิจอยู่ค่ะ ฉันต้องขออภัยแทนพวกเธอที่ไม่สามารถมาต้อนรับ#nคุณครูได้ด้วยค่ะ"
10002135-54 = "แต่ฉันรู้สึกดีใจนะคะที่ซึรุกิกลับมาเป็นคนเดิมแล้ว ต้องขอบคุณคุณครูจริงๆ ค่ะ"
10002135-55 = "มาชิโระเองก็ดูผ่อนคลายขึ้นด้วยเหมือนกันค่ะ"
10002135-56 = "แล้วอีกสองคน... พวกเธอเป็นยังไงบ้างคะ? คุณครูคิดว่าพวกเธอสนุกกับทริปนี้รึเปล่าคะ?"
10002135-57 = "[s3] \"ครูคิดว่าพวกเธอก็ดูสนุกดีนะ...\"\n[s4] \"พวกเธอดูเหมือนไปทำการบ้านมากกว่าน่ะ\""
10002135-58 = "คะ? "
10002135-59 = "คะ? "
10002135-64 = "[ns] (ยื่นรายการภารกิจที่ทั้งสองคนได้รับให้ดู)"
10002135-66 = "อ๋อ... รายการพวกนี้... หรือว่า... พวกเธอรู้สึกหนักใจเพราะรายการพวกนี้เหรอคะ"
10002135-67 = "หืม...? จะบอกว่าทริปเป็นไปได้ด้วยดีเพราะรายการพวกนี้เหรอคะ?"
10002135-68 = "ฮุฮุ..."
10002135-69 = "ขอบคุณที่บอกให้ฉันทราบนะคะ ถึงฉันจะตั้งใจเขียนรายการพวกนั้นขึ้นมา..."
10002135-70 = "แต่ดูเหมือนว่าสำหรับทั้งสองคนแล้ว การรับมือกับซึรุกิคงจะตึงมือพอสมควรเลยสินะคะ#nฉันเลยเตรียมรายการพวกนั้นขึ้นมาเพื่อทำให้ทุกคนสนิทกันค่ะ"
10002135-71 = "แต่ถ้ากลายเป็นว่าทำให้ทั้งสองคนเครียดแล้วล่ะก็... ฉันต้องขออภัยด้วยค่ะ..."
10002135-72 = "ฉันคิดว่าอย่างน้อยถ้ามีภารกิจที่ต้องทำให้สำเร็จล่ะก็ ฉันคิดว่าทุกคนคงจะสนุกกับสถานการณ์ได้#nแบบชิวๆ กัน..."
10002135-73 = "[s5] \"เป็นวิธีที่ได้ผลเลยทีเดียว\"\n[s6] \"ถ้าไม่มีรายการพวกนี้อาจจะแย่กว่านี้ก็ได้\""
10002135-74 = "ฮุฮุ ขอบคุณที่แจ้งให้ฉันทราบนะคะคุณครู กลัวฉันรู้สึกแย่เหรอคะ?"
10002135-75 = "ฮุฮุ ขอบคุณที่แจ้งให้ฉันทราบนะคะคุณครู กลัวฉันรู้สึกแย่เหรอคะ?"
10002135-76 = "คือว่าถ้าคุณครูสะดวกล่ะก็ คราวหน้าถ้าพบทั้งสองคน รบกวนบอกพวกเธอหน่อยนะคะว่าไม่ต้อง#nห่วงเรื่องรายการพวกนี้น่ะค่ะ"
10002135-77 = "ฉันคิดว่าถ้าคุณครูเป็นคนบอกพวกเธอ... คงจะดีกว่าฉันไปบอกเองแน่นอนค่ะ"
10002135-78 = "ขอบคุณและขออภัยในความไม่สะดวกในหลายๆ เรื่องเลยนะคะคุณครู"
10002135-83 = "ถ้างั้นขอตัวก่อนนะคะ"
10002135-88 = "[ns] \"ฮาสุมิ...\""
10002135-89 = "คะ...?"
10002135-90 = "[s7] \"คราวหน้าฮาสุมิเองก็ไปด้วยกันนะ\"\n[s8] \"ถ้าฮาสุมิไปด้วยก็คงจะสนุกกว่านี้อีกนะ\""
10002135-91 = "คะ...? คราวหน้าคุณครูอยากให้ฉันไปด้วย...?"
10002135-92 = "คะ...? คราวหน้าคุณครูอยากให้ฉันไปด้วย...?"
10002135-93 = "ฮุฮุ... งั้นเหรอคะ แต่ว่าถ้าฉันไปด้วยก็คงไม่มีคนดูแลงานทางนี้..."
10002135-94 = "ถึงอย่างนั้นก็ขอบคุณที่ชวนล่วงหน้านะคะคุณครู แค่คุณครูชวนฉันไปแบบนี้ก็รู้สึกเหมือนใจนุ่มฟู#nรู้สึกเหมือนได้ไปพักผ่อนมากเลยค่ะ"
10002135-95 = "หืม...?"
10002135-96 = "คุณครูอยากจะคุยเรื่องอะไรต่อหรือเปล่าคะ?"
10002135-97 = "อ่า... รายการนี่เหรอคะ? อ๋อ... อยากทราบว่าฉันทำเอาไว้ล่วงหน้านานแล้วรึเปล่างั้นเหรอคะ?"
10002135-98 = "ฮุฮุ เรื่องนี้อาจจะตอบยากอยู่นิดหน่อย..."
10002135-99 = "เวลาที่เหนื่อยๆ หรือช่วงที่มีงานรัดตัวมากๆ ฉันจะจดสิ่งที่ฉันคิดว่าอยากจะทำเอาไว้น่ะค่ะ"
10002135-100 = "ไม่มีอะไรเกินกว่านี้ค่ะ ไม่ต้องกังวลหรอกนะคะ"
10002135-101 = "แต่พอพูดถึงรายการพวกนี้แล้ว เหมือนฉันจะขอให้ถ่ายรูปมาให้ด้วยนี่คะ"
10002135-102 = "ถึงฉันจะไปกับทุกคนไม่ได้ แต่อย่างน้อยก็ยังได้ดูรูปของทุกๆ คนนะคะ...#nคุณครูได้เอารูปถ่ายมาด้วยรึเปล่าคะ?"
10002135-103 = "[s] (ยื่นรูปถ่ายให้)"
10002135-109 = "ขอบคุณค่ะ ขอฉันดูหน่อยนะคะ..."
10002135-110 = "...?"
10002135-111 = "คุณครู...?"
10002135-112 = "รูปพวกนี้... มันอะไรกันคะ?"
10002135-113 = "[s9] \"รูปที่ทุกคนกำลังสนุกสนานอยู่ไงล่ะ\"\n[s10] \"รูปทั้งหมดที่ถ่ายตามในรายการนั่นไงล่ะ\""
10002135-119 = "ฮุฮุ ค่ะ..."
10002135-125 = "ดูสนุกกันมากเลยนะคะ..."
10002135-126 = "ความปรารถนาในฤดูร้อน"

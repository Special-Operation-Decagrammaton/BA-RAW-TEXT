[translation]
2002606-1 = "奇普托斯的學生為何會不幸？"
2002606-2 = "夏萊．辦公室"
2002606-3 = "（今天擔任夏萊值日生的是實里）"
2002606-8 = "呣……"
2002606-9 = "呣嗯…………"
2002606-10 = "[s]「有什麼煩惱嗎？」"
2002606-11 = "……啊啊，真是抱歉。#n我沒打算怠慢夏萊的工作。"
2002606-12 = "只是，有件事讓我有點在意……"
2002606-13 = "[s]「你願意告訴我嗎？」"
2002606-14 = "不是別的，是和[USERNAME]老師有關的事……"
2002606-15 = "[s]「……我？」"
2002606-16 = "我之前有在MomoTalk上跟老師討論過讓奇普托斯的所有學生都能幸福的方法對吧。"
2002606-17 = "不幸的學生之所以會出現，#n就是因為少數的布爾喬亞獨佔了布丁一類的稀有資源。"
2002606-18 = "然而，如果與布丁不同，該資源是無形的情況下……"
2002606-19 = "究竟該如何分配才好。這就是我在煩惱的問題。"
2002606-20 = "[s]「我有點聽不太懂……」"
2002606-21 = "想擔任夏萊值日生的學生多到數不清，這點老師清楚嗎？"
2002606-22 = "想想這也是當然的。畢竟能夠獲得和老師單獨相處的寶貴時間啊。#n而且雖然說是值日生，由於工作量不多，反而能請老師協助想商量的事情。"
2002606-23 = "也就是說……擔任夏萊值日生的時間，可以說是一種讓學生幸福的無形資源！"
2002606-24 = "但是老師的時間有限。擔任夏萊值日生的機會不是人人都能擁有。#n也有部分的學生多次被選為值日生對吧。"
2002606-25 = "就像布爾喬亞能夠吃到多個布丁一樣，是導致社會不平等的原因沒錯！"
2002606-26 = "[s]「是，是嗎……？」"
2002606-27 = "布丁雖然能夠公平分配，但老師的時間並非如此。"
2002606-28 = "就算讓所有學生各擔任一天的值日生，也會存在還沒見到老師就畢業的學生。"
2002606-29 = "假如一天分配數百個學生，按時擔任值日生的話……"
2002606-30 = "[s1]「那可能有點困難……」\n[s2]「時間會被說明占滿，導致沒辦法工作吧……」"
2002606-33 = "說的沒錯。如果為了實現學生的幸福而無法工作就得不償失了。"
2002606-34 = "這全都是因為老師只有一個，而奇普托斯的學生實在太多而產生的問題。"
2002606-35 = "要是老師的身體能夠分裂就好了……"
2002606-36 = "[s3]「這沒辦法吧！？」\n[s4]「多麼可怕的想法！」"
2002606-39 = "呵呵……開玩笑的，開玩笑的啦。"
2002606-40 = "我也知道那種事情無法實現。"
2002606-41 = "再說，要是那麼容易就能找出幸福的方法，我們的同志們就不需要拚死抗爭了吧。"
2002606-42 = "[ns]「我理解實里的煩惱了。」"
2002606-44 = "[ns5]「但是擔任值日生也不代表就能變得幸福。」\n[ns6]「應該也會有不喜歡我的學生……」"
2002606-47 = "不，那種事情，絕對不可能！"
2002606-48 = "就拿現在的我來說，光是跟老師在一起就愉快到令人幸福。"
2002606-49 = "如果可以，我甚至想每天都把老師帶去工程現場──"
2002606-56 = "我，我剛才，說了什麼……？"
2002606-57 = "雖然是自言自語，身為工務部部長，應當成為勞動者們的典範之人……"
2002606-58 = "……竟然像個布爾喬亞一樣，試圖要獨佔老師！"
2002606-59 = "[s]「……是這個意思？」"
2002606-60 = "是因為最近多次接下學園外資本家委託的關係，#n連我自己都在不知不覺間被汙染了嗎……！"
2002606-61 = "老師，我必須要反省自己！"
2002606-62 = "請你坐在那裡仔細聽！#n如果有錯誤的地方還請你嚴厲地斥責我！！"
2002606-63 = "[ns]「沒必要做到那種程度吧……」"
2002606-66 = "（在那之後，傾聽了實里以反省為名的自我批判）"

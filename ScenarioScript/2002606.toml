[translation]
2002606-1 = "ทำไมนักเรียนกว่าครึ่งถึงไม่มีความสุข"
2002606-2 = "สำนักงานชาเล่ต์"
2002606-3 = "(วันเข้าเวรของมิโนริ...)"
2002606-8 = "อืม..."
2002606-9 = "อืมมม..."
2002606-10 = "[s] \"มีเรื่องกังวลอะไรหรือเปล่า?\""
2002606-11 = "อ๊ะ... ขอโทษที ฉันไม่ได้ตั้งใจจะพังงานของชาเล่ต์นะ"
2002606-12 = "แค่มีเรื่องคาใจนิดหน่อยน่ะ มัวแต่จมกับความคิด ก็เลย..."
2002606-13 = "[s] \"ถ้าไม่ว่าอะไร ครูพร้อมรับฟังนะ เล่ามาได้เลย\""
2002606-14 = "อืม... ก็ไม่มีอะไรมากหรอก แค่เรื่องที่ฉันกังวลมันเกี่ยวกับครู [USERNAME] น่ะสิ..."
2002606-15 = "[s] \"กังวลเกี่ยวกับครูเหรอ...?\""
2002606-16 = "ฉันเคยคุยกับครูผ่าน MOMOTALK เกี่ยวกับวิธีที่จะทำให้นักเรียนทุกคนในคิโวทอสมีความสุขมากขึ้น#nใช่มั้ยล่ะ?"
2002606-17 = "มันก็ไม่ได้ต่างไปจากปัญหาของคนส่วนมากนักหรอก การที่คนเราไม่มีความสุขในสังคม มันเกิดจาก#nการผูกขาดทรัพยากรหายากอย่างพุดดิ้งของชนชั้นนายทุนบางกลุ่มยังไงล่ะ"
2002606-18 = "แต่ถ้าทรัพยากรพวกนั้นไม่ได้มีรูปร่างที่นับได้เหมือนพุดดิ้งแล้วละก็..."
2002606-19 = "ฉันกำลังกังวลว่าจะแบ่งทรัพยากรพวกนั้นยังไงดีอยู่น่ะ"
2002606-20 = "[s] \"ครูไม่เข้าใจว่าพูดถึงเรื่องอะไร...\""
2002606-21 = "ครูสังเกตบ้างหรือเปล่าน่ะว่ามีนักเรียนอยากมาเข้าเวรที่ชาเล่ต์เยอะมากๆ จนนับไม่ถ้วนเลย?"
2002606-22 = "การเข้าเวรที่ชาเล่ต์คือโอกาสที่จะได้ใช้เวลากับครูสองต่อสอง แถมงานส่วนใหญ่ก็ไม่ได้หนักหนาอะไร นักเรียนหลายคนเลยอยากสมัครขอเข้าเวรที่ชาเล่ต์กันน่ะ"
2002606-23 = "พูดอีกอย่างก็คือ... การเข้าเวรที่ชาเล่ต์คือทรัพยากรไร้รูปร่างที่นำความสุขมาสู่พวกเรานั่นเอง!"
2002606-24 = "แต่ว่าครูก็มีเวลาจำกัด ทุกคนเลยไม่ได้ผลัดเข้าเวรอย่างเท่าเทียมกัน จะมีแค่นักเรียนบางกลุ่มที่ได้ทำ#nงานซ้ำๆ"
2002606-25 = "นี่คือการผูกขาดอย่างหนึ่งเลยนะ... มันคือพฤติกรรมต่อต้านโดยให้คนบางกลุ่มผูกขาดทรัพยากร#nเพื่อสร้างสังคมแห่งความเหลื่อมล้ำชัดๆ!"
2002606-26 = "[s] \"ยะ... อย่างนั้นเหรอ?\""
2002606-27 = "แต่พวกเราคงแบ่งเวลาของครูให้เหมือนกับการแบ่งพุดดิ้งไม่ได้"
2002606-28 = "ต่อให้นักเรียนทุกคนผลัดกันเข้าเวรคนละวันอย่างเท่าเทียมกัน ยังไงซะมันก็ต้องมีนักเรียนที่เรียนจบ#nโดยที่ไม่ได้เจอหน้าครูเลยตลอดชีวิตการเรียน"
2002606-29 = "หรือไม่ก็ต้องแบ่งนักเรียนมาเข้าเวรที่ชาเล่ต์เป็นร้อยๆ คนต่อวัน..."
2002606-30 = "[s1] \"แบบนั้นก็แย่เลยนะ...\"\n[s2] \"งานเข้าเวรของชาเล่ต์จะยิ่งวุ่นวายเอานะ\""
2002606-33 = "นั่นแหละๆ ถ้าทำให้งานของชาเล่ต์วุ่นวายเพื่อความสุขของทุกคน มันก็ไม่ต่างอะไรกับการเรียงลำดับ#nความสำคัญไม่เป็นไงล่ะ"
2002606-34 = "แต่เรื่องทุกอย่างนี้คือปัญหาที่เกิดจากการที่เรามีครูของชาเล่ต์เพียงแค่คนเดียวต่อนักเรียนหลายๆ คน#nในคิโวทอส..."
2002606-35 = "ถ้าแบ่งครูเป็นหลายชิ้นได้ก็คงจะเยี่ยมมากเลย..."
2002606-36 = "[s3] \"กลัวแล้ว!\"\n[s4] \"หยุดคิดแบบนั้นเถอะนะ!\""
2002606-39 = "ฮ่าๆ ล้อเล่นน่า ล้อเล่น"
2002606-40 = "ยังไงซะ สุดท้ายแล้วมันก็คงทำให้พอใจไปหมดทุกอย่างไม่ได้หรอกเนอะ"
2002606-41 = "ถ้าการหาวิธีทำให้ทุกคนมีความสุขมันง่ายขนาดนั้น เพื่อนพ้องในสหภาพเรดวินเทอร์คงไม่ต้องต่อสู้#nด้วยหยาดเหงื่อแรงกายขนาดนี้หรอก"
2002606-42 = "[ns] \"ครูเข้าใจความกังวลของมิโนริเป็นอย่างดีเลยนะ\""
2002606-44 = "[ns5] \"แต่การเข้าเวรที่ชาเล่ต์ไม่ได้รับประกันว่าเราจะมีความสุขขึ้นหรอก...\"\n[ns6] \"อาจจะมีนักเรียนที่อยู่กับครูแล้วรู้สึกอึดอัดก็ได้...\""
2002606-47 = "ไม่สิ ไม่มีทางอึดอัดกับเรื่องนั้นได้หรอก!"
2002606-48 = "ขนาดฉันอยู่กับครูยังรู้สึกสบายใจขึ้นเลย รู้สึกถึงความสุขได้อย่างแน่ชัดเลยละ"
2002606-49 = "ถ้าเป็นไปได้ฉันอยากพาครูไปไซต์งานด้วยทุกวันเลยนะ..."
2002606-56 = "นะ... นี่ฉันพูดอะไรออกไปเนี่ย...?"
2002606-57 = "ถึงจะพูดพึมพำอยู่คนเดียว แต่ในฐานะหัวหน้าที่ต้องเป็นแบบอย่างให้กับพวกคนงานแล้ว..."
2002606-58 = "นี่ฉันคิดจะผูกขาดครูไว้คนเดียวเหมือนกับพวกชนชั้นนายทุนเหรอเนี่ย...!"
2002606-59 = "[s] \"เอ๋... เธอน่ะเหรอ...?\""
2002606-60 = "หรือว่าช่วงนี้ฉันห่างจากสหภาพเรดวินเทอร์มาเจอกับพวกนายทุนบ่อยขึ้นจนเกิดความโลภโดยไม่ทัน#nได้รู้ตัว...!"
2002606-61 = "ครู... นับจากวินาทีนี้ฉันขอวิจารณ์ตนเอง!"
2002606-62 = "ครูช่วยนั่งฟังคำวิจารณ์ของฉันตรงนั้น แล้วถ้าฉันพูดอะไรผิดไปก็ว่ากล่าวแรงๆ ได้เลยนะ!"
2002606-63 = "[ns] \"ครูว่าไม่ต้องทำแบบนั้นก็ได้นะ...\""
2002606-66 = "(จากนั้นคุณครูก็นั่งฟังคำวิจารณ์ตนเองของมิโนริราวกับใช้วาทศิลป์อยู่พักใหญ่)"

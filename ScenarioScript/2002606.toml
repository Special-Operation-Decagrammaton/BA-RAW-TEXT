[translation]
2002606-1 = "#title;왜 학생의 절반은 불행한가"
2002606-2 = "#place;샬레 집무실"
2002606-3 = "#na;(미노리의 샬레 당번 날……)"
2002606-4 = "#st;[0,0];instant;1;"
2002606-5 = "#clearST"
2002606-6 = "3;미노리;99\n#3;a\n#wait;1000"
2002606-7 = "3;미노리;99\n#3;em;[...]\n#wait;2500"
2002606-8 = "3;미노리;99;으음……"
2002606-9 = "3;미노리;99;으으음…………\n#3;stiff"
2002606-10 = "[s] \"무슨 고민이라도 있어?\""
2002606-11 = "3;미노리;04;아앗, 미안. 샬레의 일을 사보타주하려던 생각은 아니었어.\n#3;em;[반응]"
2002606-12 = "3;미노리;04;다만 마음에 걸리는 일이 있어서. 생각을 하느라 조금……\n#3;stiff"
2002606-13 = "[s] \"괜찮다면 내가 들어줄 테니까 한번 말해봐.\""
2002606-14 = "3;미노리;02;으음…… 다름이 아니라 그 고민이 [USERNAME] 선생에 관한 것이라……"
2002606-15 = "[s] \"나에 대한 고민……?\""
2002606-16 = "3;미노리;01;전에 한 번 모모톡으로 키보토스의 모든 학생이 행복해질 수 있는 방법에 대해 이야기한 적이 있었잖아?"
2002606-17 = "3;미노리;02;대개의 문제가 그렇듯이, 사회의 불행은 일부 부르주아가 푸딩과 같은 희귀 자원을 독과점하고 있기 때문에 발생하는 것이지."
2002606-18 = "3;미노리;99;하지만 푸딩과 다르게 그 자원의 형태가 셀 수 없는 무형의 존재라면……"
2002606-19 = "3;미노리;01;어떻게 자원을 분배해야 좋을지 고민하고 있었어."
2002606-20 = "[s] \"무슨 뜻인지 잘 모르겠는데……\""
2002606-21 = "3;미노리;02;선생은 샬레의 당번 활동을 하고 싶어 하는 학생이 셀 수 없이 많다는 사실을 인지하고 있어?"
2002606-22 = "3;미노리;99;샬레의 당번 활동은 선생과 단둘이서 시간을 보낼 수 있는 기회인 데다가, 무겁지 않은 업무가 대부분이기 때문에 많은 학생들은 샬레의 당번 활동을 자원해서라도 하고 싶어 하지."
2002606-23 = "3;미노리;05;그 말인즉…… 샬레의 당번 활동은 행복을 가져다주는 무형의 자원 그 자체야!\n#3;em;[!]"
2002606-24 = "3;미노리;01;하지만 선생의 시간은 제한되어 있기 때문에 샬레의 당번 기회는 모두에게 공평하게 돌아가지 않고 일부 학생만이 반복해서 일과를 수행하고 있지."
2002606-25 = "3;미노리;05;이는 일종의 독과점…… 일부 특정 세력이 자원을 독식하여 불평등한 사회를 조성하는 반동행위나 다름없어!\n#3;jump"
2002606-26 = "[s] \"그, 그런가……?\""
2002606-27 = "3;미노리;01;하지만 푸딩과 달리, 선생의 시간은 공평하게 나눌 수가 없으니까."
2002606-28 = "3;미노리;01;모든 학생들이 평등하게 하루씩 돌아가며 당번 활동을 맡는다 해도 재학 중에 선생을 만나지 못한 채 졸업해 버리는 학생들도 발생할 거야."
2002606-29 = "3;미노리;99;아니면, 하루에 샬레에 찾아오는 당번 학생을 수백 명씩 배정한다거나……\n#3;em;[...]"
2002606-30 = "[s1] \"그건 곤란해……\"\n[s2] \"오히려 샬레의 당번 업무가 엉망이 되고 말 거야.\""
2002606-31 = "#wait;100"
2002606-32 = "#wait;100"
2002606-33 = "3;미노리;02;그건 그렇지. 모두의 행복을 위해 샬레의 업무를 엉망으로 만든다면, 본말이 전도되는 셈이니까.\n#3;em;[땀]\n#3;stiff"
2002606-34 = "3;미노리;99;하지만 이 모든 게 선생은 한 사람뿐이고, 키보토스의 학생은 셀 수 없이 많으니 발생하는 문제라……"
2002606-35 = "3;미노리;02;선생을 여러 조각으로 나누어 분배할 수 있다면 제일이겠지만……\n#fontsize;50"
2002606-36 = "[s3] \"무서워!\"\n[s4] \"그런 생각은 하지 말아주세요!\""
2002606-37 = "#wait;100"
2002606-38 = "#wait;100"
2002606-39 = "3;미노리;03;하하. 농담이야, 농담.\n#3;em;[재잘]\n#3;hophop"
2002606-40 = "3;미노리;03;결국 그래서는 아무도 만족할 수 없게 되어버릴 테니까."
2002606-41 = "3;미노리;07;애초에 모두가 행복해질 수 있는 방법이 그렇게 쉽게 떠오른다면 붉은겨울 학원의 동지들이 이렇게 땀 흘려 투쟁을 할 필요도 없겠지."
2002606-42 = "[ns] \"미노리의 고민은 충분히 이해했어.\""
2002606-43 = "#wait;1000"
2002606-44 = "[ns5] \"……하지만 샬레의 당번을 한다고 무조건 행복해지는 건 아니야.\"\n[ns6] \"나와 있는 시간이 불편한 학생도 있을 테고……\""
2002606-45 = "#wait;100"
2002606-46 = "#wait;100"
2002606-47 = "3;미노리;04;아니, 그런 일은 절대로 있을 수 없어!\n#3;jump"
2002606-48 = "3;미노리;04;나만 하더라도 선생과 함께 있을 때면 마음이 편안해지고, 분명하게 행복을 느낄 수 있으니까."
2002606-49 = "3;미노리;99;할 수만 있다면 선생을 매일 같이 작업 현장에 데리고 다니고 싶을 정도니—"
2002606-50 = "#st;[0,0];instant;1;"
2002606-51 = "#clearST"
2002606-52 = "3;미노리;99\n#3;em;[...]\n#wait;2500"
2002606-53 = "#wait;1000"
2002606-54 = "3;미노리;07\n#3;em;[///]\n#wait;1000"
2002606-55 = "#wait;1000"
2002606-56 = "3;미노리;04;내, 내가 무슨 소리를……?\n#3;em;[?!]\n#3;shake"
2002606-57 = "3;미노리;99;아무리 혼잣말이라지만 용역부의 부장으로서 노동자들에게 모범이 되어야 할 사람이……"
2002606-58 = "3;미노리;05;……마치 부르주아처럼 선생을 독과점하려는 생각을 하다니!"
2002606-59 = "[s] \"아…… 그쪽이야……?\""
2002606-60 = "3;미노리;06;최근 붉은겨울 학원을 벗어나 자본가들을 만날 일이 늘어나다 보니, 나도 모르게 탐욕에 물들고 말아버린 건가……!\n#3;stiff"
2002606-61 = "3;미노리;05;선생, 지금부터 나는 자아비판을 시작하겠어!\n#3;em;[!]"
2002606-62 = "3;미노리;05;그 자리에 앉아서 내 비판을 잘 듣고 잘못된 점이 있다면 호되게 질책해 줘!"
2002606-63 = "[ns] \"그럴 필요는 없다고 생각하지만……\""

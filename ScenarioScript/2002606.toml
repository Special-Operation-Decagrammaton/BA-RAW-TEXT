[translation]
2002606-1 = "The Source of Discontent"
2002606-2 = "Schale Executive Office"
2002606-3 = "On Minori's Schale duty day..."
2002606-8 = "Hmm..."
2002606-9 = "Hmmmmmmmm..."
2002606-10 = "[s] \"Something on your mind?\""
2002606-11 = "Ah, sorry! I'm not trying to sabotage Schale's work with my hmm-ing."
2002606-12 = "I just...had something on my mind."
2002606-13 = "[s] \"Want to talk about it?\""
2002606-14 = "Well, it actually has to do with you, [USERNAME] Sensei."
2002606-15 = "[s] \"Is that so...?\""
2002606-16 = "Remember when we were talking on MomoTalk about how to make everyone in Kivotos happy?"
2002606-17 = "You know, society's suffering can be traced back to the bourgeoisie monopolizing precious resources, like pudding."
2002606-18 = "But there's only so much pudding, and some resources are more...intangible."
2002606-19 = "I was wondering how a resource like that should be distributed."
2002606-20 = "[s] \"You'll have to walk me through this one.\""
2002606-21 = "Do you know how many students want to be on Schale's duty roster?"
2002606-22 = "Duty here means spending alone time with you, Sensei, and the work itself is pretty light. So many students sign up to be included."
2002606-23 = "In a way, Schale's duty roster is an intangible resource that makes people happy!"
2002606-24 = "Of course, your time isn't limitless. So duty days aren't equally distributed among the students, and only some students get to take more than one."
2002606-25 = "Isn't this a kind of monopoly? A small group get all of your attention. It's social inequality!"
2002606-26 = "[s] \"I...suppose...\""
2002606-27 = "Unlike pudding, your time cannot be equally distributed."
2002606-28 = "Even if we ensured that Schale duty was equally split, there are so many students that some will graduate before they even get to meet you."
2002606-29 = "Alternatively, we could assign a couple hundred students to Schale every day..."
2002606-30 = "[s1] \"We don't have that much room in the office...\"\n[s2] \"It'd be chaos. No work would get done.\""
2002606-33 = "That's true. Is it worth it to make everyone happy if it means Schale can't do its work?"
2002606-34 = "But all of this is an issue because there's only one of you, and there are many of us."
2002606-35 = "The ideal solution would be to divide Sensei into multiple pieces and distribute you..."
2002606-36 = "[s3] \"There's a scary idea!\"\n[s4] \"You shouldn't even be THINKING that!\""
2002606-39 = "Hahaha! I kid, I kid."
2002606-40 = "No one would be happy with a solution like that."
2002606-41 = "If it were so easy to make everyone happy, there'd be no need for my comrades at Red Winter Academy to continue the good fight."
2002606-42 = "[ns] \"I see where you're coming from, Minori.\""
2002606-44 = "[ns5] \"But I don't think a day with me is enough to make everyone happy.\"\n[ns6] \"I have a feeling there are some students who are glad not to get selected for duty days...\""
2002606-47 = "No, that isn't possible!"
2002606-48 = "Even I feel more at ease, and more happy, when I'm around you."
2002606-49 = "If I could, I'd bring you with me to the job site every day—"
2002606-56 = "Ah, what am I saying?!"
2002606-57 = "I know this is a private conversation, but as president of the Labor Party, I need to set an example to the proletariat..."
2002606-58 = "And here I am, thinking of monopolizing you like some dirty bourgeois!"
2002606-59 = "[s] \"I don't think you have anything to worry about...\""
2002606-60 = "Lately, I've been spending more time with...capitalists. Am I being infected by their greed?"
2002606-61 = "Sensei, I must perform a self-criticism session!"
2002606-62 = "Please sit there and observe. Do not hesitate to reprimand me with utmost severity for what I am about to confess!"
2002606-63 = "[ns] \"Is this really necessary...?\""
2002606-66 = "I sat and listened for a while to Minori's eloquent self-criticism."

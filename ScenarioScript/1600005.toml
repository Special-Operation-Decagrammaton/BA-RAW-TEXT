[translation]
1600005-1 = "วิธีผิด"
1600005-2 = "...! คะ... คุณครู... ครั้งนี้ก็ยอมออกมาหากัน... ด้วยสินะคะ..."
1600005-3 = "ขอบคุณมากนะคะที่มา..."
1600005-4 = "ฉะ... ฉันคิดว่าคุณครูไม่อยากเจอหน้าฉัน... แล้วเสียอีก..."
1600005-5 = "...คะ? ไม่ต้องคิดมากเหรอคะ...? จะ... จะไม่ให้คิดได้ยังไง..."
1600005-6 = "มะ... ไม่ใช่นะคะ! ฉันไม่ได้ตั้งใจจะเถียงคุณครูนะคะ ไม่ใช่เลย...!"
1600005-7 = "ก็ได้ค่ะ... แล้วฉันจะพยายาม... ไม่คิดมากดูนะคะ... ขอบคุณค่ะ..."
1600005-8 = "คะ... ครั้งนี้ฉัน... เอาของขวัญดีๆ มาให้แล้วค่ะ..."
1600005-11 = "นะ... นี่ค่ะ... หวังว่าคุณครูจะชอบ..."
1600005-12 = "[s1] \"กันพลาลิมิเต็ดเอดิชั่น!?\"\n[s2] \"ฟิกเกอร์อนิเมะ!?\""
1600005-13 = "มะ... มีอีกนะคะ นี่ค่ะ... แล้วก็นี่ด้วย... ฉันคิดว่าคุณครูน่าจะชอบอะไรแบบนี้... ก็เลย..."
1600005-14 = "มะ... มีอีกนะคะ นี่ค่ะ... แล้วก็นี่ด้วย... ฉันคิดว่าคุณครูน่าจะชอบอะไรแบบนี้... ก็เลย..."
1600005-15 = "นี่ไม่ใช่ของที่ฉันทำเองเหมือนคราวก่อน... เลยไม่น่าจะมีปัญหานะคะ...#nครั้งก่อนต้องขอโทษด้วยค่ะ..."
1600005-18 = "(ฮารุกะเอาสินค้ามากมายออกมาจากห่อที่สะพายไว้บนหลัง)"
1600005-19 = "(คนที่ชอบของแบบนี้จะรู้เลยว่าของพวกนี้ทั้งมีค่าและมีราคามาก)"
1600005-20 = "(ฮารุกะรู้ได้ไงว่าเราชอบอะไรแนวนี้... และไปหาของพวกนี้มาจากไหนนะ...)"
1600005-21 = "เป็นยังไงบ้างคะ... คุณครู?"
1600005-22 = "หรือว่า... ไม่ชอบคะ...? ว่าแล้วเชียว..."
1600005-23 = "[s3] \"นี่มันวิเศษไปเลย!\"\n[s4] \"ไปหาของพวกนี้มาจากไหนเหรอ?\""
1600005-24 = "......"
1600005-25 = "......"
1600005-26 = "หึหึ... หึหึหึ..."
1600005-27 = "โชคดีที่คุณครูชอบนะคะ... ฉันเองก็ดีใจไปด้วยเลย..."
1600005-28 = "ต่อไปฉันก็จะ... เพื่อคุณครูอีก..."
1600005-29 = "ซ่าา ซ่าาา!"
1600005-30 = "......?"
1600005-31 = "อะไรเนี่ย? ทำไมจู่ๆ ก็เปลี่ยนช่องเองล่ะ?"
1600005-32 = "ตัดเข้าข่าวด่วนเหรอ...?"
1600005-33 = "เอ่อ... อืม..."
1600005-34 = "[s] \"ฮารุกะ?\""
1600005-35 = "......"
1600005-37 = "(ทุกรายการในโทรทัศน์ถูกเปลี่ยนเป็นข่าวด่วน)"
1600005-38 = "ข่าวด่วนค่ะ เมื่อรุ่งสางของวันนี้มีเหตุการณ์จี้ปล้น และขโมยสินค้าจากร้านดังในย่านการค้า"
1600005-39 = "ผู้ก่อเหตุเอาเงินสดมาวางไว้ให้ แล้วคว้าไปแต่สินค้าหายากราคาแพง"
1600005-40 = "สันนิษฐานว่าผู้ก่อเหตุไม่ได้มาเพื่อชิงของมีค่า แต่น่าจะมีเป้าหมายอื่นค่ะ"
1600005-41 = "ตอนนี้ทีมสืบสวนคาดว่าผู้ก่อเหตุยังหนีไปไม่พ้นเขตปกครองตนเองทรีนิตี้..."
1600005-42 = "......"
1600005-43 = "[s] \"ฮารุกะ\""
1600005-44 = "......!!!"
1600005-45 = "คือ... คือว่า...!"
1600005-46 = "ทำไมถึงโดนจับได้ไวขนาดนี้ล่ะ...! คิดว่าจะเริ่มสืบหาตอนเย็นๆ ซะอีก...!"
1600005-47 = "คะ... คะ? ไม่ได้ถามฉันเรื่องนี้เหรอคะ? นะ... นั่นสินะคะ... ฉันไม่น่าทิ้งหลักฐานให้ตามตัวได้เลย..."
1600005-48 = "คะ? ไม่ใช่เรื่องนี้ด้วยเหรอคะ? อะ... อืม... ขอโทษนะคะ..."
1600005-49 = "ขอโทษค่ะ ขอโทษด้วยค่ะ ขอโทษนะคะคุณครู ขอโทษค่ะ ขอโทษจริงๆ ค่ะ ขอโทษ..."
1600005-50 = "[s] \"เอาไปคืนกันเถอะ\""
1600005-51 = "วะ... ว่าไงนะคะ!?!? ทะ... ทำไมล่ะ? แต่พวกนั้นยังไม่รู้เลยนะคะ... ว่าเป็นฉัน..."
1600005-52 = "มะ... ไม่ใช่ค่ะ... ฉันไม่ได้จะเถียงค่ะ...!"
1600005-53 = "ก็ได้ค่ะ... ถ้าคุณครูอยากให้ฉันทำแบบนั้นล่ะก็..."
1600005-55 = "(ไปคืนของทุกชิ้นที่ฮารุกะปล้นมาจากร้านค้าในย่านการค้า)"
1600005-56 = "(โค้งคำนับเพื่อแสดงความขอโทษกับฮารุกะ และร้านก็รับคืนทุกชิ้นเพราะยังไม่ได้แกะห่อออก)"
1600005-58 = "......"
1600005-59 = "ขอโทษนะคะ... ขอโทษจริงๆ ค่ะ..."
1600005-60 = "คุณครูต้องลำบากไปขอโทษขอโพยร้านค้า... ทั้งที่ฉันเป็นคนก่อเรื่องแท้ๆ..."
1600005-61 = "ตั้งใจว่าจะให้ของขวัญแท้ๆ แต่สุดท้ายก็ได้แต่รบกวนคุณครู... คนอย่างฉันนี่มัน..."
1600005-62 = "ต่อไปฉันจะ..."
1600005-63 = "จะไม่ทำให้คุณครูต้องรำคาญอีกแล้วค่ะ..."
1600005-64 = "[s5] \"ไม่ได้รำคาญหรอก\"\n[s6] \"เรียกครูมาเจอโดยไม่ต้องให้ของขวัญก็ได้\""
1600005-65 = "คะ...?"
1600005-66 = "คะ...?"
1600005-67 = "ตะ... แต่ว่า... ฉันสร้างปัญหาไว้นับไม่ถ้วนเลย..."
1600005-68 = "คะ? ฉันควรพูดคุยอย่างสบายใจมากกว่านี้เหรอคะ? ฉัน... กับคุณครูน่ะเหรอคะ...?"
1600005-69 = "จะให้ทำอย่างนั้นได้ไงล่ะ...! มะ... ไม่ใช่นะคะ! ฉันไม่ได้บอกว่าไม่ชอบ...! แต่ก็..."
1600005-70 = "อ่า... อะ... อะ..."
1600005-71 = "อ่า... เข้าใจแล้วค่ะ... ฉันจะพยายาม... ทำแบบที่คุณครูบอก... ค่ะ..."
1600005-72 = "คะ... คุณครูคะ..."
1600005-73 = "คุณครูไม่ได้...โกรธฉัน... ใช่ไหมคะ...? หรือว่าจะเกลียดฉันกว่าเดิม..."
1600005-74 = "ไม่เลยเหรอคะ...? ทำไมล่ะคะ... ฉันเป็นตัวปัญหาเอาขนาดนี้..."
1600005-75 = "[s7] \"ก็ฉันเป็นครูนี่นา\"\n[s8] \"มันหน้าที่ที่ครูต้องทำอยู่แล้ว\""
1600005-76 = "คะ...? แบบนี้แปลว่า..."
1600005-77 = "คะ...? แบบนี้แปลว่า..."
1600005-78 = "แปลว่าอะไรคะเนี่ย... ฉันไม่เข้าใจเลย... นั่นคือเหตุผลเหรอคะ..."
1600005-79 = "ฉันจะเข้าใจได้ในสักวัน... งั้นเหรอคะ...?"
1600005-80 = "......"
1600005-81 = "ขะ... ขอโทษค่ะ ฉันมันน่าสมเพชที่ยังไม่เข้าใจอยู่..."
1600005-82 = "เอาเป็นว่า... ฉันจะพยายามนะคะ..."
1600005-83 = "ฮิ... ฮิฮิ..."
1600005-84 = "ขอบคุณนะคะ... คุณครู..."
1600005-86 = "(ฮารุกะยืนอ้ำอึ้งอยู่สักพักแล้วรีบเดินจากไป)"
1600005-87 = "(โชคดีที่ฮารุกะพามาที่นี่ เพราะขากลับได้ซื้อสินค้าลิมิเต็ดเอดิชั่นที่ยังขายไม่ออกไปด้วย)"

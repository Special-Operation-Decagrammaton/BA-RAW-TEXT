[translation]
1600005-1 = "Improper Method"
1600005-2 = "S-Sensei! You actually showed up again..."
1600005-3 = "Thank you for agreeing to this."
1600005-4 = "I-I thought you'd never want to see me again..."
1600005-5 = "I shouldn't worry about last time? I-I can't do that..."
1600005-6 = "S-Sorry! I didn't mean to argue with you. What I meant was...!"
1600005-7 = "O-Okay. I'll try not to let it bother me. Thanks again..."
1600005-8 = "Th-This time, I want to give you a proper gift."
1600005-11 = "H-Here you go. I'm not sure if you'll like it..."
1600005-12 = "[s1] \"A limited-edition model?!\"\n[s2] \"An anime girl figure?!\""
1600005-13 = "Th-There's more. Here you go...and here's some more... I thought you might like them, so take them all."
1600005-14 = "Th-There's more. Here you go...and here's some more... I thought you might like them, so take them all."
1600005-15 = "I-I didn't make these like I did my first gift...so there shouldn't be anything wrong with them. Again, I'm sorry about last time..."
1600005-18 = "(A flood of collectibles poured out of the bundle on Haruka's back.)"
1600005-19 = "(Each and every one is incredibly expensive, with a value that only an insider would truly understand.)"
1600005-20 = "(Looking past where Haruka learned about these things—where did she get them?)"
1600005-21 = "Wh-What do you think, Sensei?"
1600005-22 = "A-Are they...not good enough?"
1600005-23 = "[s3] \"They're great. Every single one of these is amazing!\"\n[s4] \"Where did you get all of these?\""
1600005-24 = "..."
1600005-25 = "..."
1600005-26 = "Heh... Heh heh."
1600005-27 = "I'm glad that you like them...Sensei..."
1600005-28 = "If this is what you like...then I'll get you more."
1600005-29 = "*buzz* *buzz*"
1600005-30 = "...?"
1600005-31 = "Huh? Why did the channel change all of a sudden?"
1600005-32 = "Breaking news? What's going on?"
1600005-33 = "Uh... Um..."
1600005-34 = "[s] \"Haruka?\""
1600005-35 = "..."
1600005-37 = "(One by one, the broadcasts on every TV switch to the same news program.)"
1600005-38 = "Breaking news. Early this morning, a series of robberies took place across multiple gift stores in the shopping district."
1600005-39 = "Each robbery shares a defining characteristic: The offender only stole valuable and rare items, leaving the cash registers untouched."
1600005-40 = "It has been speculated that the offender's primary motivation was not monetary gain."
1600005-41 = "Investigators believe that the offender is still within the Trinity district..."
1600005-42 = "..."
1600005-43 = "[s] \"Haruka.\""
1600005-44 = "...!"
1600005-45 = "I-I can explain!"
1600005-46 = "I-I didn't think that they'd find out so soon! I was sure that they wouldn't start investigating until this evening!"
1600005-47 = "That's...not the kind of explanation you wanted? Right. I should have done more to throw them off the trail..."
1600005-48 = "Huh? That's not what you meant either? U-Um. Ugh... I'm sorry."
1600005-49 = "I'm sorry... I'm so sorry. I'm sorry I'm sorry I'm sorry I'm sorry..."
1600005-50 = "[s] \"Let's go return these.\""
1600005-51 = "But why?! It's not like they're on their way here. They haven't even figured out it was me yet..."
1600005-52 = "N-No...I'm still not trying to talk back to you..."
1600005-53 = "I-I understand... If you say so, Sensei."
1600005-55 = "(Haruka and I then went to every store in the shopping district, returning the goods that she stole.)"
1600005-56 = "(We profusely apologized, and, because the goods were still in their boxes, they were accepted—no harm, no foul.)"
1600005-58 = "..."
1600005-59 = "I'm sorry. I'm so sorry..."
1600005-60 = "You were roped into apologizing to all of them because of me."
1600005-61 = "I wanted to get you a gift, but I ended up causing more trouble. I just..."
1600005-62 = "I don't want to..."
1600005-63 = "...bother you anymore, Sensei."
1600005-64 = "[s5] \"You're not a bother.\"\n[s6] \"You don't have to buy my time with gifts.\""
1600005-65 = "I'm not...?"
1600005-66 = "I don't...?"
1600005-67 = "B-But...I've caused you so much trouble."
1600005-68 = "You think I should feel more comfortable around you? Me...? With you...?"
1600005-69 = "Th-That's impossible! I-I mean, I'm not saying that I don't want that! But still...!"
1600005-70 = "Uh... Ugh..."
1600005-71 = "I'll try. If you say it's okay, th-then I'll try to."
1600005-72 = "Hey, Sensei?"
1600005-73 = "Are you sure you aren't...mad at me? You don't hate me, do you?"
1600005-74 = "Not even a little? But why? How? I'm such a loser..."
1600005-75 = "[s7] \"I'm your teacher. I could never.\"\n[s8] \"It's a teacher's duty to accept their students for who they are.\""
1600005-76 = "Huh? Wh-What are you saying...?"
1600005-77 = "Huh? Wh-What are you saying...?"
1600005-78 = "I don't really get what you mean...or why that's enough of a reason."
1600005-79 = "I'll understand...someday in the future?"
1600005-80 = "..."
1600005-81 = "S-Sorry. I feel pathetic for still not understanding."
1600005-82 = "Okay. I'll do as you say..."
1600005-83 = "Heh heh..."
1600005-84 = "Thanks, Sensei."
1600005-86 = "(Haruka awkwardly lingered for a while longer before quickly walking away.)"
1600005-87 = "(I bought several collectibles on my way home that I never would have found if not for Haruka.)"

[translation]
1600005-1 = "並非錯誤的事物"
1600005-2 = "……！老，老師……您這次……也來了呢……！"
1600005-3 = "真的很感謝您特地過來一趟……"
1600005-4 = "我，我以為老師不會想再見到我了……"
1600005-5 = "……沒關係，不用在意……？不，不！那，那怎麼可能……！"
1600005-6 = "不，不是的！我絕對不是說我不聽老師的話，我不是那個意思……！"
1600005-7 = "我，我明白了……謝謝老師……"
1600005-8 = "然，然後……我這次準備了……更洽當的謝禮……"
1600005-11 = "請，請收下，雖然我沒什麼自信……"
1600005-12 = "[s1] 「限定版模型！？」\n[s2] 「限量美少女公仔！？」"
1600005-13 = "不，不只這樣……還有這個、這個……和這個，不知道老師會不會喜歡這些……"
1600005-14 = "不，不只這樣……還有這個、這個……和這個，不知道老師會不會喜歡這些……"
1600005-15 = "不過不像上次，這些都不是我做的……所以我想應該，不會有問題吧……上次真的很對不起……"
1600005-18 = "（滿滿的貴重周邊商品從遙香背上的提袋裡掉了出來）"
1600005-19 = "（每個要麼是高價品，要麼是行家才會知道的珍品）"
1600005-20 = "（先不管遙香怎麼會知道我的喜好，重點是她到底怎麼取得這些的……）"
1600005-21 = "您，您覺得怎麼樣……老師……？"
1600005-22 = "果，果然還是不滿意嗎……！？"
1600005-23 = "[s3] 「太厲害了，這些都是很棒的東西耶！」\n[s4] 「這麼多公仔，都是從哪兒弄到手的啊？」"
1600005-24 = "……"
1600005-25 = "……"
1600005-26 = "……呵呵……呵呵呵……"
1600005-27 = "看到您這麼開心，我也覺得很開心……老師……"
1600005-28 = "我以後也常常會像這樣……替老師……"
1600005-29 = "嗶嗶！"
1600005-30 = "……？"
1600005-31 = "……嗯？怎麼突然換頻道了？"
1600005-32 = "新聞快報……？"
1600005-33 = "啊……唔……"
1600005-34 = "[s] 「……遙香？」"
1600005-35 = "……"
1600005-37 = "（所有頻道的節目都陸續變成了新聞快報）"
1600005-38 = "新聞快報。今日清晨，商店街發生了竊盜事件。"
1600005-39 = "犯人留下現金之後，便偷走了店內的高價商品，行徑相當怪異……"
1600005-40 = "目前推測犯人的目的並非單純盜取財物，而是有其他特殊目的，目前也將循著這條方向進行搜查。"
1600005-41 = "相關人士指出，根據犯案時間推測，犯人目前應該還沒離開三一自治區……"
1600005-42 = "……"
1600005-43 = "[s] 「……遙香？」"
1600005-44 = "……！！！"
1600005-45 = "那……那個，這是……！"
1600005-46 = "沒，沒想到這麼快就被發現了……！我還以為警方大概要到晚上才會開始調查的……！"
1600005-47 = "咦，咦……？不是那個意思……？原，原來如此，對不起，我應該要弄得不會被人發現才對……"
1600005-48 = "咦？也不是這個意思？唔，唔唔……對不起……"
1600005-49 = "對不起……對不起對不起對不起對不起對不起對不起……"
1600005-50 = "[s] 「我們把東西還給人家吧。」"
1600005-51 = "咦，什麼？！？！為，為什麼……！可是警方還沒發現是我幹的，也還沒開始追上來啊……"
1600005-52 = "不，不是！這絕對不是在頂嘴……！"
1600005-53 = "……我，我明白了。既然老師都這麼說了……"
1600005-55 = "（之後我們走遍了商店街的所有商店，把遙香偷走的商品還了回去）"
1600005-56 = "（和遙香一起低頭道歉後，因為全都尚未拆封，所以店家也都當我們是單純退貨，原諒了我們）"
1600005-58 = "……"
1600005-59 = "對不起……真的很對不起……"
1600005-60 = "我害得老師也不得不和我一起到處跟人家道歉……"
1600005-61 = "我只是想讓老師高興，結果卻只會添麻煩……我真的……老是這樣……"
1600005-62 = "……到此為止。"
1600005-63 = "我以後不會……再煩老師了……"
1600005-64 = "[s5] 「沒有添麻煩唷。」\n[s6] 「就算沒事找我，只要肯跟我聯絡我就很開心了。」"
1600005-65 = "咦……？"
1600005-66 = "咦……？"
1600005-67 = "但，但是……我明明給老師添了那麼多麻煩……"
1600005-68 = "我怎麼可以……沒事就……打擾老師……"
1600005-69 = "不，不是的！我絕對不是說我不願意那樣做……！可是……！"
1600005-70 = "啊，唔……唔唔……"
1600005-71 = "我，我明白了……既然是老師吩咐的……我，我會……努力看看……"
1600005-72 = "……那，那個……老師……"
1600005-73 = "您真的……沒有，生氣嗎……？真的沒有討厭我嗎……"
1600005-74 = "……完全沒有？為，為什麼……為什麼對我這麼好……"
1600005-75 = "[s7] 「這還用說。」\n[s8] 「遙香現在還有很多能犯錯的機會。」"
1600005-76 = "……咦？那，那是什麼意思……"
1600005-77 = "……咦？那，那是什麼意思……"
1600005-78 = "……我，我完全聽不懂……我怎麼可以……為什麼這可以當作理由……"
1600005-79 = "以後慢慢了解就行了……？"
1600005-80 = "……"
1600005-81 = "對，對不起，都怪我還不成熟，還無法理解老師的意思……"
1600005-82 = "我會慢慢了解的，然後……"
1600005-83 = "……嘿……嘿嘿……"
1600005-84 = "……謝謝您……老師……"
1600005-86 = "（之後遙香又扭捏了好一會兒，才快步離開）"
1600005-87 = "（回去的路上，託遙香的福（？）買到了還沒賣掉的限定版周邊商品）"

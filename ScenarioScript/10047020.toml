[translation]
10047020-1 = "Episode 2;Wonderland of Hopes and Dreams"
10047020-2 = "I was on the way to Wildhunt Art Academy with Tsumugi."
10047020-5 = "It's a long underground tunnel...like a rabbit hole."
10047020-6 = "Maybe I should have worn my bunny girl costume after all."
10047020-7 = "Ha... I'm kidding. I do know that there's a time and place."
10047020-8 = "[s] \"S-So if things line up just right, maybe you will?\""
10047020-9 = "It could go any way. Who knows?"
10047020-10 = "Let's continue. I can hardly wait for you to meet everyone."
10047020-15 = "Follow me. It's only a little further."
10047020-20 = "[ns] \"Huh? Is this...?\""
10047020-21 = "You will submit to a brief inspection. We ask for your peaceful cooperation."
10047020-22 = "[s] \"I-Inspection?\""
10047020-23 = "Our Academy is a bit sensitive about outside contraband."
10047020-24 = "Don't worry. I'm certain you'll do fine."
10047020-29 = "Yes, looks good. You may proceed."
10047020-33 = "Heehee, then shall we get going?"
10047020-34 = "[s] \"Is Wildhunt always this strict?\""
10047020-35 = "There is a saying, \"art is an explosion.\""
10047020-36 = "We had...an incident where a student made that a reality."
10047020-37 = "Another student once pushed the limits with an experimental loudspeaker..."
10047020-38 = "...it shattered several windows."
10047020-39 = "[s1] \"I see why you need inspections...\"\n[s2] \"They sound very passionate...\""
10047020-42 = "Heh, art IS an explosion, after all."
10047020-43 = "Then, shall we keep going?"
10047020-48 = "Not long after..."
10047020-53 = "We're here."
10047020-54 = "Now, for a proper introduction. Welcome to the home of artistic endeavors..."
10047020-59 = "...Wildhunt Art Academy."
10047020-60 = "[ns] \"Wow...! It's breathtaking!\""
10047020-62 = "It's an Academy of artists, constructed by artists, for the advancement of artists."
10047020-63 = "It's not as big as the main trio, but our history rivals Trinity or Gehenna's."
10047020-64 = "Students live in strictly managed dorms where we cultivate our skills all night and day."
10047020-69 = "It sounds like a fight is happening nearby..."
10047020-71 = "What? \"Get with the times\"? Are you saying my view on art is outdated?"
10047020-72 = "I never said that! Maybe you should schedule an ear cleaning and get back to me!"
10047020-76 = "Tsk... In that case..."
10047020-77 = "Come at me, ignoramus!"
10047020-84 = "...Sometimes, we have intellectual debates over art theory."
10047020-85 = "[s] \"They are literally shooting each other?!\""
10047020-86 = "Art is about struggle and conquest, after all."
10047020-87 = "Then, shall we keep going? My dorm is right up here."
10047020-98 = "[ns] \"THIS is the daily life of an artist...?\""
10047020-100 = "Wildhunt Dormitory Hallway"
10047020-102 = "Now, our room is at the end of this hallway."
10047020-103 = "[s] \"Tsumugi's room...\""
10047020-107 = "[ns3] \"Will it be like a pleasant fairytale?\"\n[ns4] \"Will it be as intense as death metal?\""
10047020-110 = "Heehee... I suppose you'll have to see for yourself."
10047020-111 = "Our room is Dormitory 4, Unit 404..."
10047020-112 = "Some say it's ominous because 4 sounds similar to the word meaning \"death\" in other languages."
10047020-113 = "I, personally, find the symmetry very satisfying."
10047020-114 = "[s] \"W-We all need to die...!\""
10047020-115 = "Oh, were you inspired by my lyrics?"
10047020-116 = "I wouldn't take the number literally. I'm almost certain we're all alive. Just think of it as...subversive social commentary."
10047020-117 = "Anyway, since the number makes people uncomfortable, my roommates and I've given it a nickname."
10047020-121 = "Ah, and here we are. Let's go."
10047020-125 = "Here. Welcome to our humble dorm. It's...cozy, isn't it?"
10047020-126 = "[ns] \"...Oh. Something feels...mystical about it.\""
10047020-132 = "Heehee... Eheehee..."
10047020-133 = "You're finally here. The one drawn by the magic of Arcana."
10047020-138 = "I...also feel the pull of fate."
10047020-139 = "Aw, come on! This is our first meeting! Can you all be normal for once?!"
10047020-140 = "But the cards said a \"greeting of gravitas\" was ideal!"
10047020-141 = "Eri's readings...are very accurate."
10047020-142 = "*sigh* I'm sorry. Let me apologize on their behalf. They can't help but be freaks..."
10047020-147 = "I'll introduce you to my roommates."
10047020-148 = "This is the eldest, Kanoe."
10047020-153 = "I heard much from Mugi... Nice to meet you..."
10047020-154 = "Meow! Meooww!"
10047020-155 = "Caw! Caaww!"
10047020-157 = "[ns] \"Y-You have interesting pets...\""
10047020-158 = "When did they get here...?"
10047020-159 = "They're not mine... They usually leave on their own, so I try not to bother them."
10047020-160 = "[ns] \"I-I see...\""
10047020-165 = "Now, next is Eri, from my grade."
10047020-170 = "Sensei... Do you believe in MAGIC?"
10047020-171 = "[s] \"If you consider several overwhelming surprises to be magic... Sure.\""
10047020-172 = "As I thought! I knew you were one of us, Sensei!"
10047020-173 = "No, more than a teacher. You are a master!"
10047020-174 = "I feel an indescribable magical attraction in the room, Master!"
10047020-175 = "[ns] \"I'm a master...?\""
10047020-180 = "And this is the youngest, Rena."
10047020-185 = "Sensei, it's not too late! Run for your life!"
10047020-186 = "They're holding me here, but you still have a chance...!"
10047020-187 = "[s] \"You're...being held?\""
10047020-189 = "Heh, she's joking. As you can see, she's perfectly free and...quite spirited."
10047020-190 = "Lastly, I am Shiina Tsumugi. I'm the Snow White of this cottage, living among such...adorable people."
10047020-191 = "[s5] \"...I thought you were Sleeping Beauty?\"\n[s6] \"...I thought you were the rabbit?\""
10047020-194 = "I can be whatever I put my mind to. It is like that in art, where your..."
10047020-199 = "...persona..."
10047020-200 = "...is all that matters!"
10047020-202 = "[ns] \"Ah...\""
10047020-203 = "See? They're all weird! They can't be normal for a second!"
10047020-204 = "Heehee... What does \"normal\" even mean in Wildhunt?"
10047020-205 = "Yeah, admit it! You like spending time with us!"
10047020-206 = "Wh-Who would like this?"
10047020-210 = "You better watch out! One day, I'm going to prove to the world that you're all cultists!"
10047020-211 = "[s] \"Cultists? What is she talking about?\""
10047020-212 = "As I said, Wildhunt doesn't support official club activities."
10047020-213 = "But everyone needs hobbies other than one's major."
10047020-214 = "The desire for creation...is infinite..."
10047020-218 = "Yes! That's why I worked with my roommates and formed an unofficial club!"
10047020-219 = "We are a society of talented girls who investigate the philosophical and aesthetic ways in which the occult has shaped the history of art!"
10047020-223 = "We're the Occult Investigation Society! Or \"Occult Society\" for short! It's all very intellectual."
10047020-227 = "[ns7] \"Occult...Society?\"\n[ns8] \"So that's why the room is like this.\""
10047020-230 = "With that said, let's introduce ourselves again. Come on, girls!"
10047020-231 = "My name is Shirao Eri. My major is Painting!"
10047020-232 = "I'm the founding president of the Occult Society, and the last magician of this era, investigating the existence of magic!"
10047020-233 = "Shiina Tsumugi, as you know. I'm an Applied Music major, and Vice President of the Society."
10047020-234 = "I joined because...I want to know if I can summon a demon with the power of death metal."
10047020-235 = "You may call me...Itagaki Kanoe. My major is a secret."
10047020-236 = "If there's anything you don't know, you can ask me, because I know all..."
10047020-238 = "...WHATEVER it may be. Eheehee..."
10047020-239 = "Meow! Meooww!"
10047020-240 = "Caw! Caaww!"
10047020-244 = "See? You see what I mean? You gotta run from these freaks while you still can."
10047020-245 = "And the little one who pretends she's \"normal\" is Kinui Rena."
10047020-246 = "Despite her unusual aesthetic choices, she majors in Fashion Design."
10047020-247 = "You're the unusual one, accessorizing with eyeballs!"
10047020-248 = "*sigh* Believing in the occult. So stupid."
10047020-249 = "But the occult does exist! There are so many pieces of evidence...with eyewitnesses!"
10047020-250 = "Like a giant Peroro-shaped beast appearing at sea near D.U..."
10047020-251 = "Dancing dolls...in an abandoned amusement park... Heehee."
10047020-252 = "Unidentified monsters being pulled out of suspicious books?"
10047020-253 = "[s] \"Th-That sounds slightly off-topic...\""
10047020-258 = "[ns] \"Anyway, it seems like you girls have a lot of fun...\""
10047020-259 = "It's not just us. The whole Academy is fun, Master!"
10047020-260 = "In fact, shall we go tour the place together?"
10047020-264 = "Let's venture out and do a little occult investigation right now!"
10047020-269 = "[ns] \"Sure. Lead the way!\""
10047020-272 = "*sigh* Oh, whatever. There is no helping some people."
10047020-273 = "Then it's decided!"
10047020-274 = "Yes. Everyone, let's go together."
10047020-275 = "Wait! What's even the plan here?"
10047020-276 = "Of course, even before Master arrived, the plan was already cast in the threads of fate."
10047020-277 = "The first place is one of my favorites."
10047020-278 = "Heehee, oh, it's one of mine too."
10047020-279 = "Don't tell me... No! Not there?!"
10047020-280 = "Heehee... Yes."
10047020-281 = "...Please! I beg you! Don't start any trouble."
10047020-283 = "And so the Wildhunt tour began."

[translation]
10047020-1 = "第2話;夢想與希望的仙境"
10047020-2 = "（今天是要和紬一起去狂獵藝術學院的日子）"
10047020-5 = "這個地下隧道還真長呢。#n簡直就像兔子洞一樣。"
10047020-6 = "果然今天應該穿兔女郎裝來的嗎？"
10047020-7 = "呵……開玩笑的。#n我也是會看時間和場合的唷。"
10047020-8 = "[s]「意，意思是如果條件具備的話……？」"
10047020-9 = "究竟會如何呢？我也相當好奇。"
10047020-10 = "繼續前進吧。#n敬請期待接下來的際遇。"
10047020-15 = "請往這邊。再走一小段路就到了。"
10047020-20 = "[ns]「嗯？這裡是……？」"
10047020-21 = "即將進行檢查。麻煩配合。"
10047020-22 = "[s]「檢，檢查？」"
10047020-23 = "我們學院對於攜入外部的物品比較敏感。"
10047020-24 = "不過老師平常攜帶的東西應該沒問題的，您不必擔心。"
10047020-29 = "嗯，沒問題。可以通過了。"
10047020-33 = "呵呵，那麼我們走吧。"
10047020-34 = "[s]「狂獵的校規還挺嚴格的呢？」"
10047020-35 = "不是有句話說「藝術就是爆炸」嗎？"
10047020-36 = "曾經有人為了實踐這句話而攜帶危險的爆裂物進來，結果釀成了事故。"
10047020-37 = "還有某個音樂科的學生，帶了高功率的擴音器進來──"
10047020-38 = "把學院的玻璃窗震得粉碎。"
10047020-39 = "[s1]「看來檢查的確是必要的呢……」\n[s2]「大家的熱情還真驚人……」"
10047020-42 = "呵呵，畢竟藝術就是爆炸嘛。"
10047020-43 = "繼續前進吧？"
10047020-48 = "（不久之後……）"
10047020-53 = "好，我們到了。"
10047020-54 = "請容我向您介紹。#n這裡就是藝術的故鄉──"
10047020-59 = "「狂獵藝術學院」。"
10047020-60 = "[ns]「哇……！真漂亮！！」"
10047020-62 = "屬於藝術家、由藝術家打造、為藝術家而存在的學院。"
10047020-63 = "儘管規模不及三大學園，不過要論歷史可不遜於三一或格黑娜哦。"
10047020-64 = "學生們過著嚴格管理的宿舍生活，日夜磨練實力。"
10047020-69 = "（遠處傳來了爭吵聲）"
10047020-71 = "什麼？跟不上時代？#n我的藝術觀念是老古董！？"
10047020-72 = "我沒這麼說吧～？#n你的耳朵是不是塞住了？"
10047020-76 = "嘖……既然這樣！"
10047020-77 = "決鬥吧！！"
10047020-84 = "……偶爾也會因為觀點不同而爆發一些小衝突。"
10047020-85 = "[s]「這已經是物理上的衝突了吧！？」"
10047020-86 = "畢竟藝術是要自己去爭取的嘛。"
10047020-87 = "我們繼續走吧？#n前面就是我住的宿舍了。"
10047020-98 = "[ns]「這就是藝術家的日常啊……」"
10047020-100 = "狂獵學院宿舍走廊"
10047020-102 = "這條走廊的盡頭，就是我和朋友們住的房間。"
10047020-103 = "[s]「紬住的房間，總覺得……」"
10047020-107 = "[ns3]「會像童話世界一樣？」\n[ns4]「還是會走死亡金屬風呢？」"
10047020-110 = "呵呵，究竟是哪種呢？"
10047020-111 = "我們的房間是第4宿的404號室……"
10047020-112 = "有人覺得「4」的讀音跟「死」很像，所以帶有不祥的感覺。"
10047020-113 = "不過我個人對此倒是相當滿意，呵呵呵。"
10047020-114 = "[s]「人，人類的死亡是社會的福祉……！！」"
10047020-115 = "哎呀，看來老師對那段歌詞印象深刻呢。"
10047020-116 = "不過希望您不要只按字面上的意思來理解，將其視為純粹的社會批判就行了。"
10047020-117 = "總之，因為一般人覺得這個數字不吉利，我和室友們便另外幫它取了個特別的名字。"
10047020-121 = "啊，不知不覺就到了呢。我們進去吧。"
10047020-125 = "這裡就是我和朋友們生活的房間。很溫馨吧？"
10047020-126 = "[ns]「……哦哦，有種神祕的氛圍。」"
10047020-132 = "咿嘻……咿嘻嘻……"
10047020-133 = "你終於來啦。受阿爾克那引導之人。"
10047020-138 = "我也……感受到了命運的牽引。"
10047020-139 = "拜託！初次見面就不能用正常一點的方式打招呼嗎！？"
10047020-140 = "可是占卜說「最好用有氣氛的方式問候」……"
10047020-141 = "繪梨醬的占卜……比任何人的都要準確。"
10047020-142 = "唉，我替他們向你道歉。#n這裡就只有我一個正常人而已……"
10047020-147 = "那麼，我來介紹我的室友們。"
10047020-148 = "這位是大家的姐姐，鹿江前輩。"
10047020-153 = "我從紬醬口中聽說了很多你的事唷……請多指教……"
10047020-154 = "喵嗚！喵嗚嗚嗚！"
10047020-155 = "嘎啊！嘎啊啊！"
10047020-157 = "[ns]「你，你養了很特別的寵物呢？」"
10047020-158 = "是什麼時候跑進來的……"
10047020-159 = "其實我並不認識牠們……但牠們通常待一下就會離開的，你不必在意。"
10047020-160 = "[ns]「這，這樣啊……」"
10047020-165 = "接下來是和我同年級的繪梨。"
10047020-170 = "老師覺得……「魔法」是存在的嗎？"
10047020-171 = "[s]「如果一連串的驚奇能稱之為『魔法』的話……？」"
10047020-172 = "果然沒錯！我就覺得老師是「這邊」的人。"
10047020-173 = "那麼從現在起，請讓我稱呼老師為「[ruby=Master]御者[/ruby]」吧！"
10047020-174 = "因為我在這場相遇之中，感受到了難以言喻的魔力牽引！"
10047020-175 = "[ns]「原來我是御者啊……」"
10047020-180 = "然後這位是年紀最小的玲奈醬。"
10047020-185 = "老師！趁現在還來得及，快逃吧！"
10047020-186 = "我是已經被抓住了所以無可奈何，但你還有機會……！"
10047020-187 = "[s]「被抓住……什麼意思？」"
10047020-189 = "呵呵，這是在跟您開玩笑啦。#n他就和老師見到的一樣，是個充滿元氣的朋友。"
10047020-190 = "最後是我，椎名紬……和可愛的大家一起生活的白雪公主。"
10047020-191 = "[s5]「……不是睡美人嗎？」\n[s6]「……不是仙境裡的兔子嗎？」"
10047020-194 = "只要有那份心，我就可以成為任何人。#n就像在藝術之中──"
10047020-199 = "──「[ruby=Persona]創作人格[/ruby]」。"
10047020-200 = "……是很重要的！"
10047020-202 = "[ns]「哦哦……」"
10047020-203 = "看吧！大家都不太正常！"
10047020-204 = "咿嘻……#n狂獵的「正常」是什麼呢……？"
10047020-205 = "玲奈醬嘴上說討厭，其實很喜歡和我們一起住吧？"
10047020-206 = "誰，誰說我喜歡了！"
10047020-210 = "都給我等著瞧！#n總有一天我會證明你們全都是詐騙集團的！"
10047020-211 = "[s]「詐騙集團？什麼意思？」"
10047020-212 = "就如同我先前所說，狂獵並沒有正式的社團活動。"
10047020-213 = "不過除了專業科目之外，興趣活動也是必要的。"
10047020-214 = "畢竟創作的慾望……是無限的……"
10047020-218 = "沒錯！所以我在深入了解室友們的喜好後，成立了一個非官方的社團！"
10047020-219 = "探索神秘學為藝術史領域帶來的哲學與美學貢獻的研究會！"
10047020-223 = "神秘學研究會！簡稱「神秘研」！"
10047020-227 = "[ns7]「神秘……研？」\n[ns8]「所以房間才會布置成這種風格啊。」"
10047020-230 = "那麼，就讓我重新做一次自我介紹吧。"
10047020-231 = "我是白尾繪梨，主修是繪畫！"
10047020-232 = "是神秘研的初代會長，也是研究魔法的……當代最後的魔法師！"
10047020-233 = "椎名紬。#n主修實用音樂，擔任神秘學研究會的副會長。"
10047020-234 = "活動理由是……想知道死亡金屬是否真的能召喚惡魔？"
10047020-235 = "我是……板垣鹿江。主修是……祕密。"
10047020-236 = "有不懂的事就儘管問吧。#n因為我什麼都知道。"
10047020-238 = "什．麼．都．知．道．唷。#n咿嘻嘻……"
10047020-239 = "喵嗚！喵嗚嗚嗚！"
10047020-240 = "嘎啊！嘎啊啊！"
10047020-244 = "看見沒？大家都很奇怪對吧！？#n現在還不算太晚，快逃吧！！"
10047020-245 = "這位假裝正常的孩子是……衣斐玲奈。"
10047020-246 = "雖然飾品的品味很怪，但他主修的是時尚設計。"
10047020-247 = "戴著眼球髮飾的鹿江前輩才奇怪吧！"
10047020-248 = "唉……#n大家居然相信神秘學這種東西，真是群笨蛋。"
10047020-249 = "神秘學是真實存在的唷！#n有許多相關的目擊傳聞！"
10047020-250 = "像是出現在D.U.近海的佩洛洛型巨大怪獸……"
10047020-251 = "或是在封閉的遊樂園內……跳舞的人偶……咿嘻。"
10047020-252 = "還有從可疑書籍裡出現的神祕妖怪？"
10047020-253 = "[s]「那，那些似乎有點不太一樣……」"
10047020-258 = "[ns]「總之，宿舍的氣氛看起來十分愉快呢……」"
10047020-259 = "不只是宿舍，整所學院都充滿愉快的氛圍哦。"
10047020-260 = "御者要不要跟我們一起逛逛學院呢？"
10047020-264 = "在四處逛逛的同時，研究藝術中隱藏的神秘學吧！"
10047020-269 = "[ns]「嗯，那就麻煩你們帶路了！」"
10047020-272 = "……唉，算了。#n反正我已經警告過了。"
10047020-273 = "那就這麼決定了！"
10047020-274 = "好，一起出發吧。"
10047020-275 = "等等！有決定好要去哪裡了嗎？"
10047020-276 = "當然。早在御者到訪之前，就如命運般決定好了。"
10047020-277 = "第一個地點，是我最推薦的地方。"
10047020-278 = "呵呵，也是我最喜歡的地方哦。"
10047020-279 = "該不會是那裡！？"
10047020-280 = "咿嘻……答對了。"
10047020-281 = "……拜託千萬別惹上麻煩。"
10047020-283 = "（於是狂獵之旅就此展開）"

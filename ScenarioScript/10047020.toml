[translation]
10047020-1 = "ตอนที่ 2;ดินแดนมหัศจรรย์แห่งความฝันและความหวัง"
10047020-2 = "(วันนี้เป็นวันที่คุณครูจะไปสถาบันศิลปะไวลด์ฮันต์กับสึมุกิ)"
10047020-5 = "เป็นอุโมงค์ใต้ดินที่ยาวจังเลยนะคะ เหมือนกับโพรงกระต่ายเลย"
10047020-6 = "วันนี้น่าจะใส่ชุดบันนี่เกิร์ลมาแท้ๆ เชียว"
10047020-7 = "ฮุฮุ... ล้อเล่นค่ะ#nฉันรู้จักกาลเทศะดีค่ะ"
10047020-8 = "[s] \"แต่ถ้าสถานที่และเวลาเป็นใจ...?\""
10047020-9 = "ถ้างั้นจะเป็นแบบไหนกันนะ? ฉันเองก็อยากรู้เหมือนกันค่ะ"
10047020-10 = "งั้นเราก็ไปต่อเรื่อยๆ กันนะคะ ไปต่อด้วยความหวังว่าจะได้เจอกันอีกในอนาคต"
10047020-15 = "เอาละ ทางนี้ค่ะ เดินจากตรงนี้อีกเดี๋ยวเดียวก็ถึงแล้วค่ะ"
10047020-20 = "[ns] \"หืม? ที่นี่มัน...?\""
10047020-21 = "ขอตรวจสัมภาระสักครู่ค่ะ ขอความร่วมมือด้วยนะคะ"
10047020-22 = "[s] \"ตะ... ตรวจสัมภาระ?\""
10047020-23 = "โรงเรียนของเราเคร่งครัดเรื่องการนำของจากภายนอกเข้ามาค่ะ"
10047020-24 = "แต่คุณครูไม่ต้องกังวลนะคะ ถ้าเป็นของส่วนตัวของคุณครู ก็ไม่น่ามีปัญหาอะไรมากค่ะ"
10047020-29 = "ฮึ่ม ไม่พบสิ่งของต้องสงสัย เชิญผ่านได้ค่ะ"
10047020-33 = "ฮุฮุ ไปกันเถอะค่ะ"
10047020-34 = "[s] \"ที่ไวลด์ฮันต์มีกฎเกณฑ์เข้มงวดสินะ?\""
10047020-35 = "เคยได้ยินคำว่า \"ศิลปะคือการระเบิด\" ใช่มั้ยคะ?"
10047020-36 = "เคยมีนักเรียนที่เอาวัตถุระเบิดอันตรายเข้ามาในโรงเรียนเพื่อพิสูจน์คำที่ว่า จนสุดท้ายก็เกิดอุบัติเหตุน่ะค่ะ"
10047020-37 = "นอกจากนี้ยังเคยมีนักเรียนเอกดนตรีที่เอาเครื่องขยายเสียงกำลังไฟฟ้าสูงเข้ามา..."
10047020-38 = "แล้วก็เปิดเพลงจนกระจกหน้าต่างของโรงเรียนแตกกระจายเลยค่ะ"
10047020-39 = "[s1] \"งั้นก็สมควรจะตรวจอยู่หรอกนะ...\"\n[s2] \"ทุกคนมีแพชชั่นรุนแรงกันจังเลยนะ...\""
10047020-42 = "ฮุฮุ ก็ศิลปะคือการระเบิดนี่คะ"
10047020-43 = "งั้นเราไปกันต่อเลยมั้ยคะ?"
10047020-48 = "(คุณครูกับสึมุกิเดินต่ออีกไม่นาน...)"
10047020-53 = "เอาละ เรามาถึงกันแล้วค่ะ"
10047020-54 = "ฉันขอแนะนำอย่างเป็นทางการนะคะ#nที่นี่คือแหล่งกำเนิดของศิลปะ..."
10047020-59 = "<สถาบันศิลปะไวลด์ฮันต์> ค่ะ"
10047020-60 = "[ns] \"ว้าว...! สวยมากเลย!!\""
10047020-62 = "สถาบันแห่งศิลปิน โดยศิลปิน เพื่อศิลปิน"
10047020-63 = "ถึงที่นี่จะไม่ใหญ่โตเท่าโรงเรียนขนาดใหญ่ทั้งสาม แต่ในด้านประวัติศาสตร์เราก็ไม่แพ้ทรีนิตี้ หรือเกเฮนน่าเลยค่ะ"
10047020-64 = "นักเรียนของเราใช้ชีวิตในหอพักที่มีการจัดการอย่างเข้มงวด และพัฒนาทักษะของตัวเองกันตลอดเวลาค่ะ"
10047020-69 = "(คุณครูได้ยินเสียงเด็กทะเลาะกันมาจากไกลๆ)"
10047020-71 = "ว่าไงนะ? ตามยุคสมัยไม่ทัน? จะบอกว่ามุมมองในงานศิลปะของฉันมันล้าสมัยงั้นเหรอ?!"
10047020-72 = "ฉันไม่ได้ว่าอย่างนั้นสักหน่อย~?#nฟังผิดไปหรือเปล่า ไปแคะขี้หูบ้างนะ"
10047020-76 = "ชิ... ถ้างั้นละก็!"
10047020-77 = "มาเจอกันสักตั้ง!!"
10047020-84 = "ถึงจะมีการกระทบกระทั่งเล็กๆ น้อยๆ จากความเห็นที่แตกต่างกันบ้างก็เถอะค่ะ..."
10047020-85 = "[s] \"แต่นั่นกระทบกระทั่งทางกายกันเลยนะ?!\""
10047020-86 = "ก็ศิลปะเป็นสิ่งที่ต้องพิชิตมายังไงล่ะคะ"
10047020-87 = "งั้นเราไปกันต่อเถอะค่ะ ต่อไปเป็นหอพักที่ฉันอยู่ค่ะ"
10047020-98 = "[ns] \"นี่สินะชีวิตประจำวันของศิลปิน...\""
10047020-100 = "ทางเดินในหอพักไวลด์ฮันต์"
10047020-102 = "เอาละ ห้องที่อยู่สุดทางเดินคือห้องพักของฉันกับเพื่อนๆ ค่ะ"
10047020-103 = "[s] \"ห้องพักของสึมุกิ...\""
10047020-107 = "[ns3] \"น่าจะมีบรรยากาศของเทพนิยายนะ?\"\n[ns4] \"น่าจะให้ความรู้สึกแบบเดธเมทัลนะ?\""
10047020-110 = "ฮุฮุ จะเป็นแบบไหนกันนะ?"
10047020-111 = "ฉันอยู่หอ 4 ห้องพักที่ 404..."
10047020-112 = "บางคนบอกว่าเลข 4 ฟังดูเป็นลางร้าย เพราะออกเสียงคล้ายกับคำว่าความตายในบางภาษา"
10047020-113 = "แต่ฉันชอบเลขนี้มากๆ เป็นการส่วนตัวค่ะ ฮุฮุฮุ"
10047020-114 = "[s] \"คนที่ตีความไม่ดี ไปลงนรกซะเถอะ ไปไป!!!\""
10047020-115 = "ตายจริง คุณครูก็จำเนื้อเพลงนั้นได้ด้วยเหรอคะ"
10047020-116 = "แต่ถ้ายอมรับตามนั้นก็คงอยู่ห้องนี้ยากนะคะ คิดเสียว่าเป็นแค่ความเชื่อของคนบางกลุ่มดีกว่าค่ะ"
10047020-117 = "พอมันเป็นตัวเลขที่หลีกเลี่ยงไม่ได้ ฉันกับรูมเมทก็เลยใส่เอกลักษณ์เฉพาะตัวให้มันแตกต่างออกไป#nนิดๆ หน่อยๆ ค่ะ"
10047020-121 = "อ๊ะ มาถึงแล้วสินะ งั้นเราเข้าไปกันเลยค่ะ"
10047020-125 = "เอาละ นี่คือห้องที่ฉันกับเพื่อนๆ อยู่กันค่ะ ดูอบอุ่นและน่าอยู่ใช่มั้ยคะ?"
10047020-126 = "[ns] \"โอ้... รู้สึกลึกลับอย่างบอกไม่ถูกเลย\""
10047020-132 = "ฮิฮิ... ฮิฮิฮิ..."
10047020-133 = "มาหาจนได้นะคะ ผู้ที่ถูกดึงดูดด้วยเวทมนตร์แห่งอาร์คาน่า"
10047020-138 = "ฉันก็... รับรู้ได้ถึงแรงดึงดูดแห่งโชคชะตาเหมือนกัน"
10047020-139 = "เฮ้อ จริงๆ เลย! นี่เป็นการพบกันครั้งแรกแท้ๆ ทุกคนต้อนรับคุณครูแบบปกติกันไม่ได้หรือไง?!"
10047020-140 = "แต่ไพ่บอกว่า 'ควรทักทายให้ได้บรรยากาศ' นี่นา..."
10047020-141 = "การอ่านไพ่ของเอริจัง... แม่นยำเกินใครอยู่แล้ว"
10047020-142 = "เฮ้อ ขอโทษนะคะ ฉันต้องขอโทษแทนทุกคนด้วยค่ะ ห้องนี้มีฉันคนเดียวที่ปกติน่ะค่ะ..."
10047020-147 = "ฉันจะแนะนำรูมเมทให้คุณครูรู้จักนะคะ"
10047020-148 = "นี่คือรุ่นพี่คาโนเอะ เป็นรุ่นพี่คนโตของพวกเรา"
10047020-153 = "ฉันได้ยินเรื่องราวจากมุกิจังมาเยอะเลย... ฝากตัวด้วยนะ..."
10047020-154 = "เมี้ยว! เมี้ยววว!"
10047020-155 = "กา! กาาา!"
10047020-157 = "[ns] \"มะ... มีสัตว์เลี้ยงแปลกๆ ด้วยเหรอ? \""
10047020-158 = "เข้ามาตั้งแต่ตอนไหนอีกเนี่ย..."
10047020-159 = "ฉันไม่ได้เลี้ยงเด็กพวกนั้นไว้หรอก... ไม่ต้องใส่ใจหรอกนะ ปกติมาอยู่แป๊บเดียวก็ไปแล้ว"
10047020-160 = "[ns] \"งะ... งั้นสินะ...\""
10047020-165 = "เอาละ ต่อไปก็คือเอริ เพื่อนชั้นปีเดียวกับฉันค่ะ"
10047020-170 = "คุณครูคิดว่า... <เวทมนตร์> มีอยู่จริงมั้ยคะ?"
10047020-171 = "[s] \"ถ้ามันหมายถึงเหตุการณ์เซอร์ไพรส์หลายๆ อย่างละก็นะ...\""
10047020-172 = "กะแล้วเชียว! ฉันคิดไว้แล้วว่าคุณครูคือ <คนสายนี้> ค่ะ"
10047020-173 = "จากนี้ไปฉันต้องเรียกคุณครูว่ามาสเตอร์แล้วละ!"
10047020-174 = "ฉันรู้สึกได้ถึงแรงดึงดูดทางเวทมนตร์ที่ไม่อาจอธิบายได้จากการพบกันครั้งนี้น่ะค่ะ!"
10047020-175 = "[ns] \"ครูคือมาสเตอร์สินะ...\""
10047020-180 = "และนี่ก็คือน้องเล็ก เรนะจังค่ะ"
10047020-185 = "คุณครู นี่ยังไม่สายเกินไปหรอกนะ รีบหนีไปเร็วเข้า!"
10047020-186 = "ฉันต้องติดแหง็กอยู่ที่นี่อย่างช่วยไม่ได้ แต่คุณยังมีโอกาสหนีนะ...!"
10047020-187 = "[s] \"ติดแหง็ก... งั้นเหรอ?\""
10047020-189 = "ฮุฮุ เรนะจังล้อเล่นน่ะค่ะ เธอเป็นเด็กขี้เล่นน่ะ"
10047020-190 = "สุดท้ายก็คือฉันเองค่ะ ชิอินะ สึมุกิ ฉันคือสโนว์ไวท์ที่ใช้ชีวิตอยู่กับผู้คนที่น่ารักค่ะ"
10047020-191 = "[s5] \"ไม่ใช่เจ้าหญิงนิทราในป่าหรอกเหรอ...?\"\n[s6] \"ไม่ใช่กระต่ายจากแดนมหัศจรรย์หรอกเหรอ...?\""
10047020-194 = "ถ้าฉันตั้งใจ ไม่ว่าใครฉันก็สวมบทบาทได้ #nนั่นก็เพราะในงานศิลปะ..."
10047020-199 = "'ตัวละครสมมติ'"
10047020-200 = "เป็นสิ่งสำคัญนี่คะ!"
10047020-202 = "[ns] \"โอ้...\""
10047020-203 = "เห็นแล้วใช่มั้ยล่ะ? ไม่มีใครปกติเลยสักคน!"
10047020-204 = "ฮิฮิ... <ความปกติ> ของไวลด์ฮันต์หน้าตาเป็นยังไงนะ...?"
10047020-205 = "ถึงปากจะบอกว่าไม่ชอบ แต่ที่จริงแล้วเรนะจังก็ชอบการได้อยู่กับพวกเราไม่ใช่เหรอคะ?"
10047020-206 = "คะ... ใครบอกว่าชอบกันล่ะ!"
10047020-210 = "คอยดูเถอะ! สักวันหนึ่งฉันจะพิสูจน์ให้ได้เลยว่าทุกคนเป็นพวกงมงายน่ะ!"
10047020-211 = "[s] \"พวกงมงาย? หมายความว่ายังไงเหรอ?\""
10047020-212 = "อย่างที่ฉันเคยบอกไปว่าที่ไวลด์ฮันต์ไม่มีกิจกรรมชมรมอย่างเป็นทางการค่ะ"
10047020-213 = "แต่เราก็มีงานอดิเรกนอกเหนือจากงานในสาขาวิชา"
10047020-214 = "ก็ความปรารถนาที่จะสร้างสรรค์ผลงาน... มันไม่มีที่สิ้นสุดนี่เนอะ"
10047020-218 = "ใช่ค่ะ! ฉันก็เลยมาคิดว่ารูมเมททุกคนชื่นชอบอะไร แล้วตั้งชมรมไม่เป็นทางการขึ้นมาค่ะ!"
10047020-219 = "ชมรมที่ศึกษาแนวความคิดด้านปรัชญาและสุนทรียศาสตร์ ที่ได้รับอิทธิพลจากเรื่องลึกลับที่เรียกว่า#nรหัสยศาสตร์ในประวัติศาสตร์ศิลปะ!"
10047020-223 = "ชมรมวิจัยรหัสยศาสตร์ยังไงล่ะคะ!"
10047020-227 = "[ns7] \"ชมรมวิจัย... รหัสยศาสตร์?\"\n[ns8] \"ห้องพักก็เลยให้บรรยากาศแบบนี้สินะ\""
10047020-230 = "เอาละ ถ้างั้นฉันขอแนะนำตัวเองอีกครั้งค่ะ"
10047020-231 = "ฉันชื่อชิราโอะ เอริ อยู่เอกจิตรกรรม!"
10047020-232 = "เป็นทั้งหัวหน้าชมรมวิจัยรหัสยศาสตร์ และนักเวทคนสุดท้ายแห่งยุคที่ศึกษาเกี่ยวกับการมีอยู่ของ#nเวทมนตร์ค่ะ!"
10047020-233 = "ส่วนฉันชื่อว่าชิอินะ สึมุกิ#nเอกดนตรีประยุกต์ รับหน้าที่เป็นรองหัวหน้าชมรมรหัสยศาสตร์ค่ะ"
10047020-234 = "เหตุผลที่มาเข้าชมรม... ก็เพราะอยากรู้ว่าจะอัญเชิญปีศาจออกมาด้วยเดธเมทัลได้หรือเปล่า?"
10047020-235 = "ส่วนฉัน... อิตากาคิ คาโนเอะ วิชาเอกเป็นความลับ"
10047020-236 = "ถ้ามีเรื่องที่อยากรู้ก็ถามฉันได้เลย ไม่ว่าจะเรื่องอะไรฉันก็รู้ไปหมดทุกอย่างนั่นละ"
10047020-238 = "ไม่ ว่า จะ เรื่อง อะไร ก็เถอะ ฮิฮิฮิ..."
10047020-239 = "เมี้ยว! เมี้ยววว!"
10047020-240 = "กา! กาาา!"
10047020-244 = "เห็นมั้ยล่ะ? ไม่มีใครปกติสักคนเลยว่ามั้ย?!#nตอนนี้ยังไม่สายหรอกนะ รีบหนีไปเถอะ!!"
10047020-245 = "คนนี้ที่แสร้งทำเป็นคนปกติอยู่คนเดียว... ชื่อว่าคินุอิ เรนะ"
10047020-246 = "มีเซนส์แปลกๆ เกี่ยวกับเครื่องประดับ แต่เห็นอย่างนี้ก็อยู่เอกแฟชั่นดีไซน์นะ"
10047020-247 = "คนที่แปลกคือรุ่นพี่คาโนเอะที่เอาลูกตามาติดผมต่างหากล่ะ!"
10047020-248 = "เฮ้อ... ทุกคนหลงเชื่อเรื่องรหัสยศาสตร์ไปเสียได้ เหมือนพวกคนบ้าเลย"
10047020-249 = "แต่รหัสยศาสตร์มีอยู่จริงนะคะ! มีเรื่องเล่าจากคนที่เห็นเหตุการณ์ลึกลับเยอะแยะเลยด้วย"
10047020-250 = "ทั้งเรื่องสัตว์ประหลาดขนาดยักษ์รูปร่างคล้ายเพโรโร่ที่มาปรากฏตัวในทะเลแถบ D.U."
10047020-251 = "ไหนจะพวกตุ๊กตาเต้นได้... ที่อยู่ในสวนสนุกร้าง... ฮิฮิ"
10047020-252 = "แล้วก็ยังมีปีศาจปริศนาที่โผล่ออกมาจากหนังสือแปลกๆ ด้วยนะ"
10047020-253 = "[s] \"มะ... เหมือนจะเป็นคนละเรื่องกันนะ...\""
10047020-258 = "[ns] \"แต่ยังไงบรรยากาศในหอพักก็ดูสนุกสนานดีนะ...\""
10047020-259 = "ไม่ใช่แค่ในหอพักหรอกค่ะ ความสนุกมีไปทั่วทั้งโรงเรียนของเราเลยละ"
10047020-260 = "เอาละ ถ้างั้นเราไปทัวร์โรงเรียนกันมั้ยคะ?"
10047020-264 = "เดินชมโรงเรียนไปด้วย แล้วก็ศึกษารหัสยศาสตร์ที่ซ่อนอยู่ในศิลปะไปด้วยยังไงล่ะคะ!"
10047020-269 = "[ns] \"อื้อ งั้นครูฝากเป็นไกด์ให้หน่อยนะ!\""
10047020-272 = "เฮ้อ... ไม่รู้ด้วยแล้ว ยังไงฉันก็เตือนไปแล้วละนะ"
10047020-273 = "งั้นเอาตามนี้เลยค่ะ!"
10047020-274 = "ค่ะ ไปด้วยกันให้หมดเลย"
10047020-275 = "เดี๋ยวสิ! คิดไว้แล้วเหรอว่าจะเริ่มจากที่ไหนน่ะ?"
10047020-276 = "แน่นอนอยู่แล้วค่ะ โชคชะตากำหนดเรื่องนี้ไว้ตั้งแต่ก่อนมาสเตอร์จะมาถึงเสียอีก"
10047020-277 = "สถานที่แรกคือที่ที่ฉันแนะนำค่ะ"
10047020-278 = "ฮุฮุ ฉันก็ชอบที่นั่นเหมือนกันค่ะ"
10047020-279 = "อย่าบอกนะว่าจะไปที่นั่นน่ะ?!"
10047020-280 = "ฮิฮิ... ถูกต้องแล้วละ"
10047020-281 = "ขอร้องละ อย่าไปก่อเรื่องอะไรเลยนะ..."
10047020-283 = "(แล้วการทัวร์ไวลด์ฮันต์ของคุณครูก็เริ่มต้นขึ้น)"

[translation]
2000905-1 = "#Title;방수 수염"
2000905-2 = "3;체리노 온천ND;99\n#3;em;…\n#3;a\n#wait;2500"
2000905-3 = "3;체리노 온천ND;03;후후. 후후후…….\n#3;em;[///]\n#3;stiff"
2000905-4 = "[s] \"어쩐지 기분이 좋아 보이네.\""
2000905-5 = "3;체리노 온천ND;01;음, 오랫동안 이 몸을 괴롭혀 왔던 문제를 해결할 수 있는 좋은 방법이 떠올랐거든.\n#3;em;[반응]"
2000905-6 = "3;체리노 온천ND;99;이게 다 저번에 콤라드가 모모톡으로 가르쳐 준 사실 덕분이라네."
2000905-7 = "3;체리노 온천ND;01;이 몸에게 번뜩이는 영감을 제공한 콤라드에게는 특별 수염 지식 훈장을 수여하겠네."
2000905-8 = "3;체리노 온천ND;03;영광으로 알도록, 콤라드!\n#3;hophop\n#3;em;[음표]"
2000905-9 = "[s1] \"저번에 가르쳐 준 사실이라면…….\"\n[s2] \"백조가 물에 가라앉지 않는 이유?\""
2000905-10 = "3;체리노 온천ND;02;음. 콤라드에게 그 이야기를 듣고 이 몸은 곧바로 백조의 생태를 조사해 보았다네."
2000905-11 = "3;체리노 온천ND;02;음. 콤라드에게 그 이야기를 듣고 이 몸은 곧바로 백조의 생태를 조사해 보았다네."
2000905-12 = "3;체리노 온천ND;99;콤라드의 말처럼 백조는 꽁지깃에서 나온 기름 덕분에 물에 뜰 수 있다고 하더군.\n#3;em;[...]"
2000905-13 = "3;체리노 온천ND;05;게다가 반짝이는 기름기 덕분에 깃털이 더욱더 하얗게 반짝이는 효과까지 있다고 하니…… 백조의 권위는 기름에서 나온다고 해도 과언이 아니라네!"
2000905-14 = "[s] \"그게 체리노와 무슨 관계가 있어?\""
2000905-15 = "3;체리노 온천ND;02;……사실 이 몸은 온천의 탕에 들어가는 것을 그다지 즐기지 않았었다네.\n#3;em;[반응]"
2000905-16 = "3;체리노 온천ND;99;더운물 때문에 쉽게 피로해지는 것은 둘째 치더라도, 권위의 상징인 이 수염이 푹 젖어버리기 때문이었지."
2000905-17 = "3;체리노 온천ND;06;젖은 수염은 보기 싫은 모양이 되어버리는 것은 물론이고, 가끔은 접착력이 약해져 떨어지기까지 하니……"
2000905-18 = "3;체리노 온천ND;04;아, 아니. 수염이 떨어지는 일은 절대로 없다네! 이 수염은 가짜가 아닌 진짜 수염이니까!\n#3;stiff\n#3;em;[땀]"
2000905-19 = "3;체리노 온천ND;01;여하튼! 그래서 이 몸은 오랜 연구 끝에 드디어 수염이 젖지 않고도 탕을 즐길 수 있는 획기적인 방법을 발견한 것이다."
2000905-20 = "3;체리노 온천ND;99;그 방법은 바로……"
2000905-21 = "3;체리노 온천ND;05;수염에 기름을 바르는 것이다!\n#3;em;[!]"
2000905-22 = "3;체리노 온천ND;99;수염에 기름을 듬뿍 발라 두면 백조의 깃털처럼 물에 젖지 않아, 탕 속에서도 멋진 모양의 수염을 유지할 수 있는 데다가……."
2000905-23 = "3;체리노 온천ND;01;기름을 먹인 수염은 평소보다 더욱 반짝거릴 테니, 이 몸의 권위를 더 널리 뽐낼 수 있겠지?"
2000905-24 = "3;체리노 온천ND;03;후후, 반짝이는 멋진 수염을 보고 감탄할 학생들의 반응이 벌써부터 기대되는군.\n#3;em;[///]\n#3;stiff"
2000905-25 = "#st;[0,0];instant;1;"
2000905-26 = "#clearST"
2000905-27 = "3;체리노 온천ND;01\n#3;m4\n#wait;1200"
2000905-28 = "3;체리노 온천ND;01\n#3;greeting\n#wait;1500"
2000905-29 = "3;체리노 온천ND;02;그럼 바로 준비한 기름을 수염에 발라볼까.\n#3;em;…"
2000905-30 = "3;체리노 온천ND;01;붓에 기름을 묻혀 조금씩 수염에……."
2000905-31 = "#st;[0,0];instant;1;"
2000905-32 = "#clearST"
2000905-33 = "3;체리노 온천ND;99\n#3;greeting\n#wait;1000"
2000905-34 = "3;체리노 온천ND;99\n#3;greeting\n#wait;1500"
2000905-35 = "3;체리노 온천ND;99\n#3;em;[...]\n#wait;2500"
2000905-36 = "3;체리노 온천ND;05;……에잇, 귀찮아!\n#3;em;[빠직]"
2000905-37 = "#st;[0,0];instant;1;"
2000905-38 = "#clearST"
2000905-39 = "3;체리노 온천ND;05\n#3;stiff\n#wait;200"
2000905-40 = "3;체리노 온천ND;S2_05\n#wait;1500"
2000905-41 = "3;체리노 온천ND;S2_01;이렇게 일일이 기름을 바르다가는 끝도 없겠어!"
2000905-42 = "3;체리노 온천ND;S2_03;아예 수염을 기름병에 담아 둔 채로 방치하면 기름이 알아서 수염에 배어들겠지?\n#3;hophop\n#3;em;[음표]"
2000905-43 = "[s] \"수염이 떨어졌는데.\""
2000905-44 = "3;체리노 온천ND;S2_05;사소한 건 신경 쓰지 않는 것이다, 콤라드!\n#3;em;[!]\n#3;m3"
2000905-45 = "3;체리노 온천ND;S2_09;그럼 이 몸은 잠시 낮잠을 자고 올 테니 그동안 수염의 감시를 부탁하겠네!"
2000905-46 = "#st;[0,0];instant;1;"
2000905-47 = "#clearST"
2000905-48 = "3;체리노 온천ND;S2_09\n#3;dr\n#wait;2000"
2000905-49 = "#all;hide"
2000905-50 = "#wait;500"
2000905-51 = "3;체리노 온천ND;S2_02;오오…… 드디어 완성되었는가, 이 몸의 방수 수염이!\n#3;a\n#3;em;[///]\n#3;stiff"
2000905-52 = "3;체리노 온천ND;S2_03;기름이 잔뜩 배어 윤기가 흐르는 이 아름다운 자태를 좀 보라지. 이 수염을 쓰고 있으면 학생들도 이 몸의 빛나는 권위에 감탄을 금치 못할 거야!"
2000905-53 = "3;체리노 온천ND;S2_00;자, 그럼 한 번 직접 시착해볼까.\n#3;em;[반응]"
2000905-54 = "#st;[0,0];instant;1;"
2000905-55 = "#clearST"
2000905-56 = "3;체리노 온천ND;S2_09\n#3;greeting\n#wait;500"
2000905-57 = "3;체리노 온천ND;99\n#wait;1500"
2000905-58 = "3;체리노 온천ND;99\n#3;em;…\n#wait;2500"
2000905-59 = "3;체리노 온천ND;04;냄새 나!\n#3;em;[?!]\n#3;shake\n#fontsize;80"
2000905-60 = "#st;[0,0];instant;1;"
2000905-61 = "#clearST"
2000905-62 = "3;체리노 온천ND;04\n#3;stiff\n#wait;200"
2000905-63 = "3;체리노 온천ND;S2_07\n#wait;1500"
2000905-64 = "3;체리노 온천ND;S2_07;이, 이게 뭔가? 콤라드! 수염에서 엄청나게 냄새가 나고 있잖나?\n#3;em;[땀]"
2000905-65 = "3;체리노 온천ND;S2_06;코를 찌르는 독한 냄새에 머리가 아플 지경이야……"
2000905-66 = "[s] \"참기름을 써서 그런 게 아닐까?\""
2000905-67 = "3;체리노 온천ND;S2_07;그, 그런가?"
2000905-68 = "3;체리노 온천ND;S2_08;하지만 분명 기름병을 가져올 때만 하더라도 이렇게 냄새가 심하지는 않았는데…….\n#3;em;…"
2000905-69 = "[s] \"애초에 수염은 코 가까이에 붙이는 물건이니까.\""
2000905-70 = "3;체리노 온천ND;S2_06;으으, 어쩌지? 이런 일이 있을 거라고는 생각지도 못해서 여분의 수염을 준비하지 못했는데.\n#3;stiff\n#3;em;[땀]"
2000905-71 = "3;체리노 온천ND;S2_09;냄새나는 수염을 계속 쓰고 있을 수도 없고……"
2000905-72 = "[s] \"당분간은 수염 없이 지내는 수밖에……\""
2000905-73 = "3;체리노 온천ND;S2_08;붉은겨울 학원의 서기장이자 학생회장인 이 몸이 수염 없이 휴가를 보내야 한다니…….\n#3;em;[속상함]"
2000905-74 = "3;체리노 온천ND;S2_07;이는 있을 수 없는 일이야—!\n#3;closeup\n#3;hophop\n#fontsize;100"
2000905-75 = "#all;hide"

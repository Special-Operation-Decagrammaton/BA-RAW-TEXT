[translation]
2000905-1 = "Waterproof Mustache"
2000905-3 = "Heeheehee!"
2000905-4 = "[s] \"You're in a good mood.\""
2000905-5 = "Well, I've come up with a great solution to a problem that's been bothering me for a while."
2000905-6 = "This is all thanks to what Comrade told me on MomoTalk the other day."
2000905-7 = "I shall reward you the special Mustache Knowledge Medal for your assistance."
2000905-8 = "Feel honored, Comrade!"
2000905-9 = "[s1] \"If it's something I told you last time then it's...\"\n[s2] \"The reason swans don't sink in water?\""
2000905-10 = "After you told me, I immediately researched swans."
2000905-11 = "After you told me, I immediately researched swans."
2000905-12 = "Just like you said, swans can float on water thanks to the oil from their tail feathers!"
2000905-13 = "In addition, thanks to the shimmering oil, their feathers are shinier and whiter. It's no exaggeration to say that the swan's very authority comes from oil!"
2000905-14 = "[s] \"What does that have to do with you, Cherino?\""
2000905-15 = "To be honest, I didn't really enjoy being in the hot springs bath."
2000905-16 = "More importantly than getting tired in the hot water, my mustache, the symbol of my authority, got wet."
2000905-17 = "Not only does a wet mustache look bad, but also the adhesive weakened and the mustache would fall off."
2000905-18 = "I-I mean, it didn't fall off! It was just dampened! Since it's very real and not fake at all!"
2000905-19 = "Anyway! After some lengthy research, I have finally found an innovative way to enjoy the bath without getting my mustache wet."
2000905-20 = "And that is..."
2000905-21 = "by putting oil on my mustache!"
2000905-22 = "If I apply a lot of oil to my mustache like a swan's feathers, it won't get wet. So it will maintain its awesome shape even when I'm in a bath."
2000905-23 = "Plus, the oil will make my mustache shine even brighter, strengthening my authority!"
2000905-24 = "Heehee, I can't wait to see the students react in amazement when they see my awesome, shiny mustache."
2000905-29 = "I will now begin applying the oil!"
2000905-30 = "Dip a brush in the oil and apply a little bit to the mustache..."
2000905-36 = "Argh! How annoying!"
2000905-41 = "Applying oil like this will take forever!"
2000905-42 = "If I leave my mustache in the bottle of oil, the oil will naturally seep into the mustache, right?"
2000905-43 = "[s] \"Your very real mustache fell off.\""
2000905-44 = "Don't worry about little details, Comrade!"
2000905-45 = "I will be taking a nap now, so your orders are to guard my mustache!"
2000905-51 = "Is my waterproof mustache finally done?"
2000905-52 = "Bask in its glory, full of oil and glossy. When I wear this mustache, the students will be amazed by the authority radiating from me!"
2000905-53 = "Now, let me try it on."
2000905-59 = "It stinks!"
2000905-64 = "Wh-What is this, Comrade?! My mustache stinks!"
2000905-65 = "It's stinging my nose! I have a headache!"
2000905-66 = "[s] \"...Did you use sesame oil?\""
2000905-67 = "I-Is that so?"
2000905-68 = "But the bottle didn't smell this strong when I first got it..."
2000905-69 = "[s] \"Well, a mustache is something you put close to your nose.\""
2000905-70 = "Ugh, what should I do? I didn't even consider this outcome, so I didn't bring an extra mustache."
2000905-71 = "I can't wear this stinky mustache..."
2000905-72 = "[s] \"For the time being, you'll have to live without your mustache...\""
2000905-73 = "To think that I, the Great Leader and esteemed Student Council president of Red Winter Academy, will be spending vacation without my mustache."
2000905-74 = "That's just impossible!"

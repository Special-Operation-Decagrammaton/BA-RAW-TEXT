[translation]
2000905-1 = "หนวดกันน้ำ"
2000905-3 = "ฮุฮุ ฮุฮุฮุ..."
2000905-4 = "[s] \"ดูอารมณ์ดีจังเลยนะ\""
2000905-5 = "อื้อ เราคิดวิธีดีๆ ในการแก้ปัญหาที่กวนใจเรามานานได้แล้วล่ะ"
2000905-6 = "ต้องขอบคุณสหายด้วยที่ช่วยบอกความจริงให้กับเราทาง MOMOTALK เมื่อคราวก่อน"
2000905-7 = "สำหรับสหายที่ช่วยสร้างแรงบันดาลใจให้กับเรา เราจะมอบเหรียญรางวัลพิเศษผู้รอบรู้เรื่องหนวด#nให้ก็แล้วกัน"
2000905-8 = "ถือว่าเป็นเกียรติมากนะสหาย!"
2000905-9 = "[s1] \"ถ้าเป็นเรื่องที่ครูบอกไปเมื่อคราวก่อน...\"\n[s2] \"เหตุผลที่หงส์ไม่จมน้ำน่ะเหรอ?\""
2000905-10 = "อืม พอเราได้ยินเรื่องนี้จากสหาย เราก็สั่งให้ตรวจสอบระบบนิเวศของพวกหงส์ทันทีเลยล่ะ"
2000905-11 = "อืม พอเราได้ยินเรื่องนี้จากสหาย เราก็สั่งให้ตรวจสอบระบบนิเวศของพวกหงส์ทันทีเลยล่ะ"
2000905-12 = "เหมือนกับที่สหายบอกเรา พวกหงส์สามารถลอยน้ำได้เพราะน้ำมันที่ปล่อยออกมาจากขนตรงหาง"
2000905-13 = "นอกจากนั้นน้ำมันนั่นยังมีผลทำให้ขนเงางามเป็นประกายสวยงามขึ้นอีกด้วย...#nถ้าจะพูดว่าอำนาจของหงส์นั้นมาจากน้ำมันของมันก็คงจะไม่ใช่คำพูดที่เกินจริงเลย!"
2000905-14 = "[s] \"แล้วมันเกี่ยวกับเชริโน่ยังไงเหรอ?\""
2000905-15 = "ที่จริง เราไม่ค่อยชอบลงไปแช่ในบ่อออนเซ็นเท่าไรหรอก"
2000905-16 = "นอกจากน้ำร้อนจะทำให้รู้สึกเหนื่อยง่ายขึ้นแล้ว หนวดที่เป็นสัญลักษณ์แห่งอำนาจของเรา#nยังเปียกน้ำอีกด้วย"
2000905-17 = "หนวดที่เปียกน้ำน่ะ จะมีรูปร่างที่ไม่น่าดู และยังทำให้หลุดง่ายอีกด้วย..."
2000905-18 = "มะ...ไม่สิ ไม่มีทางที่หนวดจะหลุดออกเด็ดขาด! นะ...หนวดนี่ไม่ใช่หนวดปลอมนะ#nมันเป็นหนวดของเราจริงๆ!"
2000905-19 = "แต่ก็เอาเถอะ! หลังจากที่เราศึกษาวิจัยมาอย่างหนัก ในที่สุดเราก็พบวิธีที่จะเพลิดเพลิน#nกับการแช่น้ำโดยที่หนวดของเราจะไม่เปียกแล้ว"
2000905-20 = "และวิธีนั้นก็คือ..."
2000905-21 = "การทาน้ำมันที่หนวดยังไงล่ะ!"
2000905-22 = "หากใช้น้ำมันจำนวนมากทาไว้ที่หนวด มันก็จะไม่เปียกน้ำเหมือนขนของหงส์#nแล้วก็จะทำให้หนวดคงรูปไว้ได้ตอนที่แช่น้ำไงล่ะ..."
2000905-23 = "หนวดที่ทาน้ำมันจะมีความเงางามกว่าปกติ ทำให้เราสามารถแสดงอำนาจของเราไปได้#nกว้างขวางมากขึ้นด้วยใช่มั้ยล่ะ?"
2000905-24 = "ฮุฮุ เรารอที่จะเห็นปฏิกิริยาของพวกนักเรียนที่จะได้เห็นหนวดอันเงางามของเราไม่ไหวแล้วล่ะ"
2000905-29 = "ถ้างั้นก็มาใช้น้ำมันที่เตรียมมาทาลงบนหนวดกันเลยละกัน"
2000905-30 = "ใช้พู่กันจุ่มลงในน้ำมันและค่อยๆ ทาลงไปทีละเส้น..."
2000905-36 = "ฮึ่ย! น่ารำคาญจริงๆ!"
2000905-41 = "ถ้าค่อยๆ ทาน้ำมันทีละเส้นแบบนี้ล่ะก็จะเสร็จเมื่อไรก็ไม่รู้!"
2000905-42 = "ถ้าเอาหนวดจุ่มลงไปในกระป๋องน้ำมันเลย น้ำมันก็จะซึมเข้าไปในหนวดใช่มั้ย?"
2000905-43 = "[s] \"หนวดหลุดแล้วนะ\""
2000905-44 = "อย่าสนใจเรื่องเล็กๆ น้อยๆ เลยน่าสหาย"
2000905-45 = "ถ้างั้นเราจะไปพักนอนกลางวันก่อน ระหว่างนั้นก็ขอฝากให้สหายดูแลหนวดให้เราด้วยล่ะ!"
2000905-51 = "โอ้... ในที่สุดก็เสร็จสมบูรณ์แล้วงั้นเหรอ หนวดกันน้ำของเรา!"
2000905-52 = "ดูรูปร่างอันงดงามของหนวดเคลือบน้ำมันที่เงางามนี่สิ ถ้าติดหนวดอันนี้ไว้ล่ะก็ พวกนักเรียนคนอื่นๆ#nจะต้องทึ่งในความเจิดจ้าของอำนาจของเราแน่!"
2000905-53 = "เอาล่ะ ไหนลองเอามาติดดูหน่อยซิ..."
2000905-59 = "กลิ่นฉุนชะมัด!"
2000905-64 = "นะ...นี่มันอะไรกันเนี่ย? สหาย! หนวดของเรามีกลิ่นฉุนมากเลยนะ"
2000905-65 = "กลิ่นฉุนขึ้นจมูกจนทำให้รู้สึกปวดหัวเลย..."
2000905-66 = "[s] \"เป็นเพราะใช้น้ำมันงารึเปล่า?\""
2000905-67 = "งะ...งั้นเหรอ?"
2000905-68 = "แต่ตอนที่ถือขวดน้ำมันมา กลิ่นมันไม่ได้ฉุนขนาดนี้นี่นา..."
2000905-69 = "[s] \"ก็ติดหนวดไว้ใกล้จมูกนี่นะ เลยได้กลิ่นชัดเจน\""
2000905-70 = "จะ... จะทำยังไงดีล่ะ? เราไม่คิดว่าจะเกิดเรื่องแบบนี้ขึ้น เลยไม่ได้เตรียมหนวดสำรองมาด้วย"
2000905-71 = "จะให้เราติดหนวดที่มีกลิ่นฉุนแบบนี้ไปตลอดก็ไม่ได้..."
2000905-72 = "[s] \"งั้นก็คงต้องไม่ติดหนวดไปสักพัก...\""
2000905-73 = "เราที่เป็นเลขาธิการของสหภาพเรดวินเทอร์ และเป็นประธานสภานักเรียนจะต้องพักผ่อน#nโดยไม่มีหนวดงั้นเหรอ..."
2000905-74 = "จะให้เกิดเรื่องแบบนั้นไม่ได้เด็ดขาดนะ—!"

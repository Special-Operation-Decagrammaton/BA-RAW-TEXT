[translation]
2000905-1 = "防水鬍子"
2000905-3 = "哼哼，哼哼哼哼哼……"
2000905-4 = "[s] 「潔莉諾，你看起來很高興呢。」"
2000905-5 = "唔呣。因為咱想出了一個好方法，能解決長久以來折磨咱的問題。"
2000905-6 = "這都多虧了上次同志在MomoTalk上告訴咱的那件事。"
2000905-7 = "對提供靈感的同志，咱就特別授予知識鬍子榮譽勳章吧。"
2000905-8 = "這是你的榮幸哦，同志！"
2000905-9 = "[s1] 「上次我告訴你的事……」\n[s2] 「天鵝那件事？」"
2000905-10 = "嗯，聽完同志的那番話後，咱立刻去調查了天鵝的生態。"
2000905-11 = "嗯，聽完同志的那番話後，咱立刻去調查了天鵝的生態。"
2000905-12 = "就像同志說的一樣，天鵝是因為羽毛上有油脂，所以才能漂浮在水上的。"
2000905-13 = "而且那閃閃發亮的油還有讓羽毛看起來閃閃發光的效果……#n所以，要說天鵝的權威是來自於油脂也不為過！"
2000905-14 = "[s] 「……呃，原來如此？」"
2000905-15 = "你先聽咱說，同志……其實咱並不喜歡泡溫泉。"
2000905-16 = "雖然泡湯很容易讓人暈過去是其中一個原因……#n但更重要的問題是，象徵權威的這個鬍子會被弄濕！"
2000905-17 = "濕掉的鬍子不只是形狀會變得很難看，偶爾還會因為黏著力不足而脫落……"
2000905-18 = "不，不對，實際上鬍子是不會脫落的！因為這個鬍子是真正的鬍子！"
2000905-19 = "總之！經過咱長久的研究之後，#n終於發現了可以不弄濕鬍子，好好享受泡湯的絕佳方法！"
2000905-20 = "那個方法就是……"
2000905-21 = "在鬍子上抹油！"
2000905-22 = "把鬍子抹上油後，就會像天鵝的羽毛一樣不會被水弄濕。#n除了在洗澡的時候也能維持帥氣的形狀之外……"
2000905-23 = "抹過油的鬍子會比平常更加閃亮，所以咱的權威也會比以往更閃耀不是嗎？"
2000905-24 = "哼哼，太完美了……#n咱已經能想像學生們看見閃閃發光的帥氣鬍子時感動的反應了。"
2000905-29 = "那麼就趕快把準備好的油塗在鬍子上吧。"
2000905-30 = "用毛筆沾點油……"
2000905-36 = "……哎，麻煩死了！"
2000905-41 = "這樣一根一根地塗，根本就沒完沒了嘛！"
2000905-42 = "只要把整個鬍子泡進油裡放著就可以了吧。"
2000905-43 = "[s] 「卸下鬍子沒關係嗎……？」"
2000905-44 = "不要在意這種小細節，同志！"
2000905-45 = "那咱就先睡一下午覺，這段時間就交給你監視鬍子了！"
2000905-51 = "哦哦，終於完成了嗎……咱的防水鬍子！"
2000905-52 = "看看這吸滿油脂、散發潤澤的美麗姿態……#n只要戴著這個鬍子，學生們就會忍不住對咱耀眼的權威感到讚嘆了吧！"
2000905-53 = "好，那咱就趕緊試戴一下吧。"
2000905-59 = "唔啊啊啊！？"
2000905-64 = "這，這是怎麼回事！？同志，鬍子散發出了一股惡臭！？"
2000905-65 = "這個刺鼻的臭味……頭好痛……"
2000905-66 = "[s] 「這是，芝麻油……？」"
2000905-67 = "什麼？難道不能用芝麻油嗎？"
2000905-68 = "但是咱帶這罐油來的時候，味道沒有這麼誇張呀……"
2000905-69 = "[s] 「畢竟是貼在這麼靠近鼻子的地方……」"
2000905-70 = "這樣啊……怎麼辦，咱現在沒有備用的鬍子……"
2000905-71 = "可是也沒辦法一直忍受散發臭味的鬍子……"
2000905-72 = "[s] 「暫時先別戴著鬍子怎麼樣呢……？」"
2000905-73 = "什……身為赤冬學園的秘書長兼學生會長的咱，竟然得在沒有鬍子的狀態下渡假……"
2000905-74 = "這怎麼可以……！"

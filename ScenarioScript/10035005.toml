[translation]
10035005-1 = "Prologue"
10035005-4 = "Excuse me!"
10035005-5 = "Officer Kirino and Officer Fubuki from the Public Safety Bureau, reporting to the Public Peace Bureau on official business!"
10035005-6 = "Permission to enter!"
10035005-7 = "Why are you so nervous?"
10035005-8 = "We all go to the same school. Let's just walk on in. No one's going to care."
10035005-9 = "B-But isn't it standard procedure to check in when we enter another secretariat?"
10035005-10 = "Why are you standing in the doorway?"
10035005-11 = "You're in the way. Either come in or don't."
10035005-12 = "Oh! Public Peace Bureau Director Kanna, ma'am!"
10035005-13 = "Speak of the devil."
10035005-14 = "Just the person we wanted to see, Director."
10035005-15 = "Oh, you have business with me?"
10035005-16 = "Well, what is it?"
10035005-17 = "Ah, there's something I wanted to ask!"
10035005-18 = "Me first! When are you getting me that limited-edition cruller from Master Donut you promised me?"
10035005-19 = "H-Hey, don't say it like that!"
10035005-20 = "\"When are you getting me that...\" Come on, Fubuki!"
10035005-21 = "Well, it's the whole reason I came here!"
10035005-22 = "You had donuts earlier!"
10035005-23 = "...I don't have time for this nonsense."
10035005-24 = "I'll buy you the donut sometime next week."
10035005-25 = "Well, wait! I'M here on official business!"
10035005-26 = "We have a support request!"
10035005-27 = "A support request?"
10035005-28 = "Is there a shootout going on? I haven't heard any reports about it."
10035005-29 = "Oh no, it's not about combat. We need safety personnel!"
10035005-30 = "Ahem, as you might be aware, Director, the Aegir Water Park is about to open, aiming for the peak summer season."
10035005-31 = "However, they're short on lifeguards."
10035005-32 = "If Valkyrie Police School can provide additional lifeguards, the park is offering free passes."
10035005-34 = "Lifeguards, huh...?"
10035005-35 = "So a private company wants our cadets to moonlight as employees."
10035005-36 = "But if they can't keep the park safe already, why don't they just postpone the grand opening?"
10035005-37 = "Well, you know how it is...deadlines, contracts, backroom deals..."
10035005-38 = "But it could be good for us, don't you think?"
10035005-39 = "Normally, we'd be out patrolling under the blistering sun, or buried in paperwork, or handling malicious complaints..."
10035005-40 = "We've been so tied up, we couldn't even think about the water park."
10035005-41 = "But what if we could dip our feet in a cool, refreshing pool, lie in an inner tube, rocking back and forth with the waves...?"
10035005-42 = "Sometimes, we all need days like that, don't we?"
10035005-43 = "...Are you talking about an assignment or a vacation?"
10035005-44 = "Well, if it's an official work order, I'm not against it."
10035005-45 = "But why are you coming to me about this?"
10035005-46 = "I'm in a different department than you."
10035005-47 = "If you're making a request for dispatch approval, shouldn't you go to the Public Safety Bureau Director?"
10035005-48 = "Well..."
10035005-49 = "It's already been approved."
10035005-50 = "In that case, there's even LESS reason for you to come see me."
10035005-51 = "No, I'm sorry, Director, I wasn't clear..."
10035005-52 = "I'm here because you're part of the dispatch team."
10035005-56 = "...What?"

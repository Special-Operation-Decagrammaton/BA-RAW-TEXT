[translation]
10035005-1 = "序幕"
10035005-4 = "打擾了！"
10035005-5 = "生活安全局桐乃、吹雪，因故拜訪公安局辦公室！"
10035005-6 = "請問可以進去嗎！"
10035005-7 = "幹嘛那麼正經八百啊。"
10035005-8 = "反正都是同一所學校的學生，直接進去也沒人會在意吧。"
10035005-9 = "可，可是去其他辦公室的時候，都會像這樣通報吧？"
10035005-10 = "站在門口做什麼。"
10035005-11 = "路都被你們擋住了。#n有事的話就進去，不然就離開。"
10035005-12 = "啊！環奈公安局長！"
10035005-13 = "哦，說曹操曹操到。"
10035005-14 = "你來得正好，環奈局長。"
10035005-15 = "你們是來找我的？"
10035005-16 = "有什麼事嗎？"
10035005-17 = "是！其實是這樣的……！"
10035005-18 = "上次說好的MasterDonut限量版旋風甜甜圈，什麼時候才要買給我呀～"
10035005-19 = "什麼時候才要買──"
10035005-20 = "──不是要說這個啦，吹雪！"
10035005-21 = "但我是為了這個才來的耶？"
10035005-22 = "你剛才不是已經吃過了嗎！"
10035005-23 = "……要繼續胡鬧的話，我就先進去了。"
10035005-24 = "甜甜圈下週會買給你們。"
10035005-25 = "啊！不是的！我們是為公務而來的！"
10035005-26 = "有支援請求！"
10035005-27 = "支援請求？"
10035005-28 = "發生槍戰了嗎？據我所知沒發生什麼大事啊。"
10035005-29 = "那個，需要支援的不是戰鬥人員，而是安全人員！"
10035005-30 = "局長你也知道，「海神水上樂園」為了把握夏天的旺季而開幕了。"
10035005-31 = "結果卻發現救生員的人手不足。"
10035005-32 = "所以他們願意以免費入場券作為交換，請求女武神警察學園支援救生員。"
10035005-34 = "救生員啊……"
10035005-35 = "但為什麼女武神警察學園要充當私人企業的職員？"
10035005-36 = "安全人員不足的話，延後開幕不就行了嗎？"
10035005-37 = "話是這麼說沒錯，我想上層八成是和對方達成了某些協議……"
10035005-38 = "不過這對我們來說也不是什麼壞事吧？"
10035005-39 = "平時得在烈日下巡邏，或者處理堆積如山的文件，又或是應付惡意投訴……"
10035005-40 = "因為這些事情而忙得沒有機會去水上樂園逛逛。"
10035005-41 = "在冰涼的泳池裡泡腳，悠閒地躺在游泳圈裡享受人造浪。"
10035005-42 = "偶爾也需要這種日子嘛。"
10035005-43 = "……那是去渡假吧。"
10035005-44 = "如果是正式命令的話，我倒也不反對。"
10035005-45 = "但為什麼要跑來告訴我這些呢？"
10035005-46 = "我們所屬的部門又不一樣。"
10035005-47 = "要申請派遣的話，應該去找生活安全局局長才對吧。"
10035005-48 = "那個，其實……"
10035005-49 = "事前批准已經完成了。"
10035005-50 = "那不就更沒有理由找我了嗎？"
10035005-51 = "不是的，我們之所以來找局長您……"
10035005-52 = "是因為您也在派遣人員的名單之中。"
10035005-56 = "……啊？"

[translation]
10035005-1 = "บทเริ่มต้น"
10035005-4 = "ขอรบกวนหน่อยนะคะ!"
10035005-5 = "พวกเราเจ้าหน้าที่ตำรวจคิริโนะ และเจ้าหน้าที่ตำรวจฟุบุกิจากสำนักรักษาความปลอดภัย เรามาที่สำนักงานกรมความมั่นคงสาธารณะเพราะมีธุระค่ะ!"
10035005-6 = "ขอเข้าไปได้มั้ยคะ?"
10035005-7 = "ทำไมต้องเป็นทางการอะไรขนาดนั้นด้วยนะ"
10035005-8 = "เราเป็นนักเรียนโรงเรียนเดียวกันนะ ถึงจะเข้าไปก็ไม่มีใครสนใจหรอก"
10035005-9 = "ตะ... แต่ถ้าจะเข้าไปฝ่ายอื่น ก็ต้องแจ้งแบบนี้ก่อนไม่ใช่เหรอคะ?"
10035005-10 = "มายืนทำอะไรที่ทางเข้าน่ะ?"
10035005-11 = "อยู่ตรงนี้มันเกะกะ ถ้าไม่เข้าไปข้างในก็ออกไปอยู่ข้างนอก"
10035005-12 = "อ๊ะ! หัวหน้ากรมฯ คันนะ!"
10035005-13 = "โอ้ พูดถึงก็มาเลยแฮะ"
10035005-14 = "มาได้จังหวะพอดีเลย หัวหน้ากรมฯ คันนะ"
10035005-15 = "มีธุระกับฉันงั้นเหรอ?"
10035005-16 = "ธุระอะไร?"
10035005-17 = "ค่ะ! ธุระของฉันก็คือ..."
10035005-18 = "อยากรู้ว่าเมื่อไรจะซื้อโดนัทครูลเลอร์สุดลิมิเต็ดจากมาสเตอร์โดนัทให้ตามสัญญาน่ะ~"
10035005-19 = "ค่ะ เมื่อไรจะซื้อ..."
10035005-20 = "ไม่ใช่อย่างนั้นสิคะ ฟุบุกิ!"
10035005-21 = "แต่ฉันมาด้วยเรื่องนั้นนะ"
10035005-22 = "เพิ่งจะกินโดนัทไปเมื่อกี้เองไม่ใช่เหรอ!"
10035005-23 = "ถ้าจะมาพูดเรื่องไร้สาระ... งั้นฉันกลับละ"
10035005-24 = "ส่วนโดนัท ฉันจะซื้อให้อาทิตย์หน้าแล้วกัน"
10035005-25 = "อ๊ะ! ไม่ใช่นะคะ! พวกเรามาที่นี่เพราะเรื่องงานจริงๆ ค่ะ!"
10035005-26 = "เราได้รับคำร้องขอรับการสนับสนุนน่ะค่ะ!"
10035005-27 = "คำร้องขอรับการสนับสนุน?"
10035005-28 = "มีการดวลปืนกันที่ไหนงั้นเหรอ? เท่าที่ฉันรู้ ไม่น่ามีเหตุการณ์อะไรใหญ่ๆ นะ"
10035005-29 = "ไม่ใช่เรื่องต่อสู้หรอกค่ะ นี่เป็นคำร้องเกี่ยวกับการรักษาความปลอดภัยค่ะ!"
10035005-30 = "ก็อย่างที่หัวหน้ากรมฯ รู้ว่ามีการเปิดสวนน้ำ <แอกิร์> รับฤดูร้อนในปีนี้"
10035005-31 = "แต่ทางนั้นบอกว่าไลฟ์การ์ดมีไม่พอนี่สิ"
10035005-32 = "ก็เลยมาขอร้องสถาบันฝึกตำรวจวัลคิรี่ให้ช่วยไปเป็นไลฟ์การ์ดให้ และจะให้บัตรรวมเครื่องเล่นเป็นของ#nตอบแทน"
10035005-34 = "ไลฟ์การ์ดงั้นเหรอ..."
10035005-35 = "แต่ทำไมนักเรียนของสถาบันฝึกตำรวจวัลคิรี่ถึงต้องไปเป็นลูกจ้างให้ธุรกิจเอกชนด้วยล่ะ?"
10035005-36 = "ถ้ามีหน่วยรักษาความปลอดภัยไม่พอ ก็เลื่อนวันเปิดทำการไปก่อนก็ได้นี่?"
10035005-37 = "ก็นะ จะคิดอย่างนั้นก็ได้ แต่ทางนั้นก็คงมีเหตุผลของตัวเองนั่นละ"
10035005-38 = "แต่สำหรับพวกเราแล้ว นี่เป็นข้อเสนอที่ไม่เลวเลยนะ?"
10035005-39 = "เพราะปกติแล้วเราต้องลาดตระเวนกลางแดดจ้า หรือไม่ก็จัดการเอกสารกองโตเท่าภูเขา แล้วก็รับคำร้องของชาวเมือง..."
10035005-40 = "เราเจองานรัดตัวจนไม่เคยได้ไปสวนน้ำกันเลย"
10035005-41 = "นี่เป็นโอกาสที่จะได้แช่เท้าในสระว่ายน้ำเย็นๆ แล้วก็นอนชิลบนห่วงยางในสระคลื่นเลยนะ"
10035005-42 = "เราต้องได้พักผ่อนอย่างนั้นบ้างสิ"
10035005-43 = "นี่ไม่ใช่การพักร้อนสักหน่อย..."
10035005-44 = "ถ้ามีคำสั่งมาอย่างเป็นทางการ ฉันก็ไม่มีข้อโต้แย้งหรอก"
10035005-45 = "ว่าแต่ ทำไมฉันถึงต้องมาคุยเรื่องนี้กับพวกเธอด้วย?"
10035005-46 = "ฉันไม่ได้อยู่สังกัดเดียวกับพวกเธอนะ"
10035005-47 = "ถ้าจะขออนุมัติการส่งตัว ก็ต้องไปคุยกับสำนักรักษาความปลอดภัยของพวกเธอสิ"
10035005-48 = "เอ่อ คือว่า..."
10035005-49 = "มีการอนุมัติล่วงหน้าเรียบร้อยแล้วค่ะ"
10035005-50 = "งั้นก็ยิ่งไม่มีเหตุผลที่ต้องมาคุยกับฉันเลยสิ"
10035005-51 = "ไม่ใช่อย่างนั้นนะคะ พวกเราไม่ได้มาหาหัวหน้ากรมฯ เพื่อขออนุมัติ..."
10035005-52 = "แต่ในรายชื่อเจ้าหน้าที่ที่จะถูกส่งตัวไป มีชื่อท่านหัวหน้ากรมฯ ด้วยค่ะ"
10035005-56 = "ว่าไงนะ...?"

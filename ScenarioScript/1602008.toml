1602008-18 = "[ns1] \"무슨 낙서인가……?\"\n[ns2] \"저주의 주문인가……\""
1602008-19 = "#wait;100"
1602008-20 = "3;발키리 학생;04;그, 그런 불길한 말씀은 말아주세요!\n#3;em;[땀]"
1602008-21 = "3;발키리 학생;07;최근 D.U. 곳곳에 이와 같은 수수께끼의 문양이 그려져 있다는 신고가 들어와 조사를 진행중입니다만……"
1602008-22 = "3;발키리 학생;04;뭐랄까, 그려진 장소에 공통점이라고 할 만한 게 거의 없어서요.\n#3;em;[한숨]"
1602008-23 = "3;발키리 학생;07;범죄의 흔적도 없고, 그렇다고 뭔가를 전달하려는 것처럼 보이지도 않고……"
1602008-24 = "3;발키리 학생;09;하지만 수상해 보이는 건 마찬가지인지라, 경비국 차원에서 이 일대의 순찰을 강화 하고 있었습니다."
1602008-25 = "[s] \"고생이 많네……\""
1602008-26 = "3;발키리 학생;02;아닙니다. 발키리 경찰학교가 응당 수행해야 할 업무인걸요.\n#3;m3"
1602008-27 = "3;발키리 학생;00;나중에 선생님께서도 이런 문양을 발견하시거든, 꼭 신고 부탁드립니다!"
1602008-28 = "[s] \"응. 꼭 기억해둘게.\""

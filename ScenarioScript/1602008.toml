1602008-9 = "3;발키리 학생;00;충성, 수고 많으십니다.\n#3;greeting"
1602008-10 = "3;발키리 학생;02;발키리에 들어온 신고로 인해 이 주변을 수색중이었습니다."
1602008-11 = "[s] \"무슨 사건이라도 있었던 거야?\""
1602008-12 = "3;발키리 학생;00;아뇨. 사건이라 할 만한 일이 있었던 것은 아닙니다만……"
1602008-13 = "3;발키리 학생;02;선생님, 혹시 이런 문양을 보신 적이 있으십니까?"

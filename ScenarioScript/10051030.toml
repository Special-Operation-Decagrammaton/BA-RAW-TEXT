[translation]
10051030-1 = "ตอนที่ 3;พรสวรรค์ที่ได้เจอ"
10051030-2 = "ห้องชมรมหยินหยาง"
10051030-3 = "เมื่อวานเกิดเรื่องแบบนั้นขึ้นสินะคะ...?"
10051030-4 = "อ่า... มันเป็นเรื่องสุดวิสัยน่ะ..."
10051030-5 = "ไม่เป็นไรค่ะ ยังไงก็เอาชุดที่ขาดไปเย็บซ่อมมาให้แล้ว..."
10051030-6 = "แต่ว่า... ชมรมหยินหยางไม่น่ามีชุดเดรสไซซ์ใหญ่กว่านี้แล้วน่ะสิคะ"
10051030-7 = "เอ๋?!"
10051030-8 = "[s] \"เราไปหาซื้อจากร้านแถวนี้ไม่ได้เหรอ?\""
10051030-9 = "ที่จริงฉันก็ลองติดต่อห้องเสื้อที่อยู่แถวนี้แล้ว..."
10051030-10 = "ทางนั้นบอกว่าถ้าเป็นชุดเดรสไซซ์คุณสึคุโยะ ก็ต้องสั่งตัดต่างหากค่ะ"
10051030-11 = "งั้นเราก็ไปสั่งตัดตอนนี้เลยสิ...!"
10051030-12 = "ยังจำได้ใช่มั้ยคะว่าทุกคนต้องไปรวมตัวที่สถานที่จัดงานในอีกหนึ่งชั่วโมงข้างหน้าน่ะ...?"
10051030-13 = "เฮือก...!"
10051030-14 = "ช่วยไม่ได้สินะคะ"
10051030-15 = "ในเมื่อเป็นแบบนี้ งั้นก็มีแค่วิธีเดียวค่ะ"
10051030-16 = "มีวิธีอะไรด้วยเหรอ?"
10051030-17 = "ต้องมีสิคะ"
10051030-18 = "แต่ว่า... มันอาจเป็นวิธีที่ทำให้รู้สึกเศร้าใจนิดหน่อยก็ได้..."
10051030-19 = "หืม...?"
10051030-21 = "(1 ชั่วโมงต่อมา)"
10051030-22 = "(ในที่สุดภารกิจรักษาความปลอดภัยของชมรมวิจัยศาสตร์นินจาก็เริ่มขึ้น)"
10051030-24 = "ในห้องบอลรูม งานแฟชั่นโชว์"
10051030-26 = "ว้าว คนเยอะจัง ดูวุ่นวายกันไปหมดเลยนะ..."
10051030-27 = "เอาละๆ ตั้งสติเข้าไว้ มิจิรุจจี้! ยังไงก็ต้องทำงานให้เสร็จ!"
10051030-28 = "เอาละ อ่าๆ... สายลับหมายเลข 2? ได้ยินมั้ย?"
10051030-32 = "ค่ะ! นี่คือสายลับหมายเลข 2! ได้ยินชัดเจนค่ะ หัวหน้า!"
10051030-33 = "ตอนนี้อยู่ตรงไหนน่ะ?"
10051030-34 = "อยู่ทางด้านทิศตะวันออกของห้องบอลรูมตามที่ได้รับคำสั่งค่ะ!"
10051030-35 = "ดีมาก พยายามเข้านะ"
10051030-39 = "เอาละ ตรวจสอบตำแหน่งของอิซุนะเรียบร้อยแล้ว..."
10051030-40 = "ต่อไปก็... สายลับหมายเลข 3 ได้ยินหรือเปล่า?"
10051030-42 = "ประตูหน้าห้องบอลรูม งานแฟชั่นโชว์"
10051030-44 = "ค่ะ สายลับหมายเลข 3... ได้ยิน... แจ่มแจ้งค่ะ..."
10051030-45 = "ตอนนี้สายลับหมายเลข 3 มาอยู่ที่ประตูหน้างานค่ะ..."
10051030-46 = "ขะ... ขอโทษนะ สึคุโยะ..."
10051030-47 = "ขอโทษที่ส่งไปทำงานนอกสถานที่จัดงานคนเดียวนะ..."
10051030-48 = "ก็พวกผู้จัดงานน่ะสิ พวกนั้นยืนกรานว่าถ้าไม่สวมชุดเดรสมาก็จะไม่ให้เข้ามาในห้องบอลรูมเด็ดขาด..."
10051030-49 = "มะ... ไม่ใช่ความผิดของท่านหัวหน้าหรอกค่ะ!"
10051030-50 = "ผิดที่ฉันตัวใหญ่ไปจนใส่ชุดเดรสไม่ได้ต่างหาก..."
10051030-51 = "ตะ... แต่พอได้ใส่ชุดเดิมที่เคยใส่ ฉันก็กลับสบายใจขึ้นเยอะเลยค่ะ!"
10051030-52 = "ขอบใจที่เข้าใจนะ สึคุโยะ..."
10051030-53 = "ดีละ! ถ้าเสร็จภารกิจของวันนี้ ไว้เราไปกินราเม็งกัน!"
10051030-54 = "จะได้ถ่ายวิดีโอที่ไม่ได้ถ่ายคราวที่แล้วด้วย!"
10051030-55 = "ดะ... ดีเลยค่ะ ท่านหัวหน้า!"
10051030-56 = "เส้นใหญ่พิเศษ เพิ่มท็อปปิ้งมันหมู แล้วก็ปิดท้ายด้วยน้ำมันคั่วพริก..."
10051030-57 = "อ๊ะ?!"
10051030-58 = "เกิดเรื่องอะไรเหรอ?!"
10051030-59 = "ท่านหัวหน้า! ดะ... ดีไซเนอร์ไชน์แคทมาถึงแล้วค่ะ!"
10051030-67 = "รับทราบ! VIP มาถึงแล้ว! ทุกคนประจำตำแหน่ง!"
10051030-68 = "ต้องทำแบบนี้ใช่มั้ยนะ...?"
10051030-72 = "(ใจเย็นๆ ใจเย็นๆ เข้าไว้...!)"
10051030-73 = "(แค่ต้องสังเกตว่ามีคนน่าสงสัยอยู่หรือเปล่าก็เท่านั้น...!)"
10051030-79 = "นี่ ตรงโน้นน่ะ"
10051030-80 = "คะ... คะ?!"
10051030-81 = "เธอมายืนทำอะไรอยู่ตรงนี้?"
10051030-82 = "คะ...?! ฉะ... ฉันมา ระ... รักษาความปลอดภัย..."
10051030-83 = "แฟชั่นโชว์ใกล้จะเริ่มอยู่แล้ว ทำไมนางแบบถึงมาเดินเตร็ดเตร่อยู่นอกสถานที่จัดงานแบบนี้ล่ะ?!"
10051030-84 = "ว่าไงนะคะ?!"
10051030-85 = "ยังมาตกใจอะไรอยู่อีก? รีบเข้าไปสแตนด์บายในห้องนางแบบได้แล้ว!"
10051030-86 = "ฉะ... ฉะ... ฉะ...!"
10051030-88 = "ฉันไม่ใช่นางแบบนะคะ!"
10051030-93 = "หืม? เธอไม่ใช่นางแบบที่จะมาเดินในงานแฟชั่นโชว์หรอกเหรอ?"
10051030-94 = "แต่ใครมองก็คงเห็นว่าเป็นนางแบบนะ..."
10051030-95 = "เอ่อ... ฉันเป็นแค่เจ้าหน้าที่รักษาความปลอดภัยค่ะ..."
10051030-96 = "งั้นเหรอ แย่จริงๆ"
10051030-97 = "ฉันคงเข้าใจผิดไปน่ะ ขอโทษนะ"
10051030-98 = "แต่ว่านะ... ฮืม..."
10051030-105 = "น่าเสียดาย น่าเสียดายจริงๆ"
10051030-106 = "เกิดมาพร้อมรูปร่างและพรสวรรค์แบบนี้ แต่กลับมายืนรักษาความปลอดภัยซะงั้น..."
10051030-107 = "คะ...?"
10051030-108 = "มะ... ไม่มีอะไร ไม่ต้องใส่ใจหรอก"
10051030-109 = "มันก็แค่เสียงคร่ำครวญจากความเสียใจของฉันน่ะ"
10051030-110 = "ต่อให้มีพรสวรรค์ติดตัวมาตั้งแต่เกิด ก็ไม่ได้หมายความว่าเราต้องเดินตามเส้นทางนั้นเสมอไปนี่เนอะ"
10051030-111 = "แต่ถึงยังไงก็... ฮืม..."
10051030-112 = "...?"
10051030-113 = "ถ้าปล่อยไปเฉยๆ ก็ยิ่งน่าเสียดายใหญ่"
10051030-114 = "ถ้างั้นก็ บอกชื่อเสียงเรียงนามของเธอมาหน่อยสิ"
10051030-115 = "คะ?!"
10051030-116 = "ฉะ... ฉันชื่อโอโนะ สึคุโยะ..."
10051030-117 = "สังกัดชมรมวิจัยศาสตร์นินจา อายุ..."
10051030-118 = "พอแล้ว ฉันไม่อยากรู้หรอกว่าอยู่ชมรมอะไร"
10051030-119 = "โอโนะ สึคุโยะงั้นเหรอ... ดีละ ฉันจะจำไว้ให้ขึ้นใจเลย"
10051030-120 = "เพราะงั้นเธอก็จำฉันไว้ด้วยล่ะ"
10051030-121 = "เอ้า"
10051030-122 = "นะ... นามบัตรเหรอคะ...!"
10051030-123 = "ฉันกำลังยุ่ง งั้นขอตัวก่อนละ"
10051030-127 = "(มะ... เมื่อกี้มันเรื่องอะไรกันน่ะ?!)"
10051030-128 = "(ทำไมดีไซเนอร์คนดังถึงถามชื่อฉันล่ะ...? แถมยังยื่นนามบัตรให้ด้วย...?)"
10051030-129 = "(คิดอะไรของเขากันนะ?)"
10051030-130 = "(ฮืมม...)"
10051030-131 = "(ไม่หรอก คงไม่มีอะไร ไม่ต้องสนใจหรอก)"
10051030-132 = "(แค่ทำงานของตัวเองให้ดีก็พอ...!)"
10051030-133 = "เอาละ ปฏิบัติการรักษาความปลอดภัยของสึคุโยะ เริ่มได้!"
10051030-135 = "ห้องพักในงานแฟชั่นโชว์"
10051030-136 = "เอาละ เตรียมพร้อมกันดีแล้วหรือยัง?"
10051030-137 = "ทุกอย่างราบรื่นดีครับ คุณไชน์แคท!"
10051030-138 = "หวังว่าเสื้อผ้าที่ฉันส่งมาให้ล่วงหน้าจะอยู่ในสภาพดีนะ"
10051030-139 = "เสื้อผ้าพวกนั้นมีแค่ชิ้นเดียวในโลกเลยละ มันมีแค่อย่างละชิ้น แล้วฉันก็ไม่ได้ทำสำรองไว้ด้วย"
10051030-140 = "ครับ! ผมเอาไปแขวนไว้ในห้องเรียบร้อยแล้วครับ!"
10051030-141 = "ห้องนั้นไม่ได้รับแสงโดยตรง ส่วนเรื่องความชื้นกับกลิ่นไม่พึงประสงค์ก็หายห่วงเลยครับ!"
10051030-142 = "ลองเข้าไปเช็กดูมั้ยครับ?"
10051030-143 = "ไปดูสักหน่อยก็ดีนะ"
10051030-144 = "ใกล้ถึงเวลาที่พวกนางแบบต้องมาใส่ชุดกันแล้วด้วย"
10051030-145 = "ไหนล่ะห้องที่บอกว่าเก็บชุดเดินแบบของฉันไว้?"
10051030-146 = "ผมจะนำไปเองครับ"
10051030-147 = "เชิญทางนี้เลยครับ!"
10051030-151 = "ถึงแล้วครับ นี่คือห้องที่... อ้าว?"
10051030-152 = "อ่า... ทำไม... ประตูถึงเปิดอยู่ล่ะ?"
10051030-153 = "เกิดอะไรขึ้นน่ะ?"
10051030-154 = "มะ... ไม่มีอะไรทั้งนั้นครับ!"
10051030-155 = "แต่ชุดเดินแบบอยู่ในห้องนั้นหมดเลย..."
10051030-159 = "ฮะ... เฮือกก...!"
10051030-160 = "ทำไม? เกิดเรื่องอะไรงั้นเหรอ?"
10051030-161 = "ปะ... ปะ... เป็นแบบนี้ได้ยังไง...!"
10051030-162 = "คะ... คะ... คุณไชน์แคท..."
10051030-163 = "ขะ... ขะ... ขอ... ขออภัยด้วยครับ...!"
10051030-164 = "ไม่สิ ต้องบอกว่า... กะ... เกิดเรื่องใหญ่แล้วครับ!"
10051030-165 = "อะไรกัน? พูดให้มันเข้าใจหน่อยสิ!"
10051030-166 = "คะ... คือว่า..."
10051030-167 = "ชะ... ชุดของคุณไชน์แคท... ทั้งหมด...!"
10051030-168 = "ไม่สิ นี่เป็นแค่... คะ... ความฝัน...!"
10051030-169 = "พึมพำอะไรอยู่คนเดียวน่ะ? หลบไปเลย!"
10051030-173 = "ชะ... ชุดที่ฉันสรรสร้างมา...!"
10051030-174 = "หายไปหมดเลยงั้นเหรอ...!!"
10051030-175 = "ขะ... ขอโทษด้วยครับ เมื่อกี้ชุดทั้งหมดยังอยู่ที่นี่อยู่เลย...!"
10051030-176 = "นะ... หน็อย...!"
10051030-178 = "ระ... รีบไปจับคนที่ขโมยชุดไป แล้วเอาตัวมาที่นี่เดี๋ยวนี้!!"
10051030-179 = "ครับ?!"
10051030-180 = "ฟังไม่รู้เรื่องหรือไง?! ไปเอาตัวหัวขโมยชุดมาให้ฉันเดี๋ยวนี้เลย!!"
10051030-181 = "ถ้าจับหัวขโมยไม่ได้ ฉันจะไล่ทุกคนออกให้หมด! เข้าใจมั้ย?!"
10051030-182 = "ฮะ... เฮือก! เข้าใจแล้วครับ!!"

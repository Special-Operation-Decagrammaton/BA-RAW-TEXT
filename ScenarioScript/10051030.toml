[translation]
10051030-1 = "第3話;與才能的邂逅"
10051030-2 = "陰陽部．部室"
10051030-3 = "……原來昨天發生了那樣的事啊？"
10051030-4 = "嗯……陰錯陽差之下就變成這樣了……"
10051030-5 = "破損的禮服已經補好還回去了，因此這方面倒是不成問題……"
10051030-6 = "不過……陰陽部已經沒有更大件的禮服了。"
10051030-7 = "咦咦！？"
10051030-8 = "[s]「不能在附近的服飾店買嗎？」"
10051030-9 = "我也試著聯絡了附近的服飾店……"
10051030-10 = "……不過他們都表示月夜同學那種尺寸的禮服，必須另外訂做才行。"
10051030-11 = "那就現在馬上下單……！"
10051030-12 = "……一小時之後就要到會場集合了，你應該沒有忘記吧？"
10051030-13 = "啊……！"
10051030-14 = "沒辦法。"
10051030-15 = "事到如今也只能這麼做了。"
10051030-16 = "還有辦法嗎？"
10051030-17 = "那當然。"
10051030-18 = "只是……可能會有點讓人心痛就是了……"
10051030-19 = "嗯……？"
10051030-21 = "（一小時之後）"
10051030-22 = "（忍術研究部的護衛任務開始了）"
10051030-24 = "時裝秀宴會場內部"
10051030-26 = "哇，人真的好多哦。#n腦袋裡一片混亂……"
10051030-27 = "打起精神來吧，小小三千留！#n該做的事還是得做！"
10051030-28 = "啊，啊……臥底02？無線電聽得清楚嗎？"
10051030-32 = "是！這裡是臥底02！聽得很清楚，部長！"
10051030-33 = "目前位置是？"
10051030-34 = "按照指示在宴會場東側待命！"
10051030-35 = "好，辛苦了。"
10051030-39 = "伊樹菜的位置確認好了……"
10051030-40 = "……那麼臥底03，無線電聽得清楚嗎？"
10051030-42 = "時裝秀宴會場正門"
10051030-44 = "是，這裡是臥底03。聽，聽得很清楚……"
10051030-45 = "臥底03，正在會場正門待命……"
10051030-46 = "對，對不起，月夜……"
10051030-47 = "讓你一個人去會場外圍當警衛……"
10051030-48 = "主辦方那些傢伙，堅持不穿禮服就絕對不能進入宴會場裡面……"
10051030-49 = "部，部長不用道歉！"
10051030-50 = "是因為我沒事長這麼高大，穿不下禮服的錯……"
10051030-51 = "而，而且穿平時的衣服，心情反而輕鬆多了！"
10051030-52 = "謝謝你願意這麼說……"
10051030-53 = "好！等今天的任務順利完成之後，大家一起去吃拉麵吧！"
10051030-54 = "得把上次沒拍成的影片重新拍好才行！"
10051030-55 = "是，是！部長！"
10051030-56 = "麵條極粗，追加背脂，最後用辣油收尾……"
10051030-57 = "啊！？"
10051030-58 = "怎麼回事？！"
10051030-59 = "部長！Sh-Shine Cat設計師到了！"
10051030-67 = "VIP已抵達現場！全員各位就位！"
10051030-68 = "……這樣做沒錯吧？"
10051030-72 = "（保持冷靜，保持冷靜……！）"
10051030-73 = "（只要仔細觀察有沒有可疑人物就好……！）"
10051030-79 = "喂，那邊的。"
10051030-80 = "怎，怎麼了嗎！？"
10051030-81 = "你現在在這裡做什麼？"
10051030-82 = "咦……！？#n我，我正在進行警衛……"
10051030-83 = "馬上就是時裝秀的開場時間了，模特兒為什麼還在會場外面徘徊！？"
10051030-84 = "咦咦！？"
10051030-85 = "為什麼那麼驚訝？#n快點跑去休息室準備吧！"
10051030-86 = "我，我我我……！"
10051030-88 = "我不是模特兒！"
10051030-93 = "咦？你不是今天來走秀的模特兒嗎？"
10051030-94 = "不管怎麼看都像模特兒啊……"
10051030-95 = "我……我真的只是警備人員而已……"
10051030-96 = "哼嗯……這樣啊。"
10051030-97 = "看來是我誤會了。不好意思。"
10051030-98 = "不過話又說回來……"
10051030-105 = "可惜，太可惜了。"
10051030-106 = "明明擁有那樣的身材和天賦，卻在這裡負責警備……"
10051030-107 = "咦……？"
10051030-108 = "啊，沒什麼。別放在心上。"
10051030-109 = "只是稍微有感而發罷了。"
10051030-110 = "就算擁有天賦，也不代表非得走上那條路不可。"
10051030-111 = "話雖如此……哼嗯……"
10051030-112 = "……"
10051030-113 = "就這樣錯過，果然還是太可惜了。"
10051030-114 = "可以告訴我你的名字嗎？"
10051030-115 = "咦！？"
10051030-116 = "我，我叫大野月夜……"
10051030-117 = "是忍術研究部所屬，年紀是……"
10051030-118 = "不必了，我對你是哪個社團並不是特別感興趣。"
10051030-119 = "大野月夜啊……我會記住的。"
10051030-120 = "你也記住我吧。"
10051030-121 = "來。"
10051030-122 = "名，名片……！"
10051030-123 = "我還有事要忙，先告辭了。"
10051030-127 = "（剛，剛才發生了什麼事！？）"
10051030-128 = "（那麼厲害的人，為什麼要問我的名字……？而且還把名片給了我……？）"
10051030-129 = "（他到底在想什麼呢？）"
10051030-130 = "（呼……）"
10051030-131 = "（不行不行，不要多想那些事情）"
10051030-132 = "（我只要做好份內的任務就好……！）"
10051030-133 = "好，月夜的外部警備作戰，開始！"
10051030-135 = "時裝秀休息室"
10051030-136 = "準備都有順利進行嗎？"
10051030-137 = "當然，Shine Cat大師！"
10051030-138 = "我事先送來的衣服也有確實保管好吧？"
10051030-139 = "那些全都是世上只有一件的衣服，就連備用品都沒做。"
10051030-140 = "是！已經全都掛在裡面那間房間裡了！"
10051030-141 = "除了沒有陽光直射之外，除濕和除臭狀態也很完美！"
10051030-142 = "您要親自確認一下嗎？"
10051030-143 = "嗯，就這麼辦吧。"
10051030-144 = "差不多也到模特兒該穿上衣服的時間了。"
10051030-145 = "所以我的衣服放在哪一間呢？"
10051030-146 = "我來為您帶路。"
10051030-147 = "這邊請！"
10051030-151 = "這裡就是……咦？"
10051030-152 = "為什麼……門沒有上鎖？"
10051030-153 = "怎麼了嗎？"
10051030-154 = "沒，沒什麼！"
10051030-155 = "衣，衣服原本確實是掛在這個房間裡的……"
10051030-159 = "噫，噫噫……！"
10051030-160 = "怎麼？發生什麼事了嗎？"
10051030-161 = "這，這，這怎麼可能……！"
10051030-162 = "Sh-Sh-Shine Cat大師……"
10051030-163 = "非，非，非常抱歉……！"
10051030-164 = "不對，那個……大，大事不好了！"
10051030-165 = "你到底想表達什麼？有話想說就好好說清楚！"
10051030-166 = "就，就是……"
10051030-167 = "Sh-Shine Cat大師的作品……全部都……！"
10051030-168 = "不，我一定是在做夢吧……這肯定是一場夢……！"
10051030-169 = "到底在喃喃自語什麼啊？讓開！"
10051030-173 = "我，我的作品……！"
10051030-174 = "我的衣服不見了……！？"
10051030-175 = "對，對不起，明明直到剛才都還在的……！"
10051030-176 = "該，該死……！"
10051030-178 = "馬上把犯人給我抓來！！"
10051030-179 = "咦！？"
10051030-180 = "聽不懂我說的話嗎！？#n我要你們現在就去把偷走衣服的那個傢伙！抓到我面前來！！"
10051030-181 = "要是抓不到那個小偷，我就把你們全部開除！聽見沒有！？"
10051030-182 = "噫，噫噫！我明白了！！"

[translation]
10051030-1 = "Episode 3;Encountering Talent"
10051030-2 = "The Yin-Yang Club Room"
10051030-3 = "...So, all that happened yesterday?"
10051030-4 = "Uh... Yes. It was unfortunate."
10051030-5 = "As is life. Nevertheless, the dress is nicely mended, and you returned it in excellent condition."
10051030-6 = "But...and I feel deeply sorry for Tsukuyo, we don't have a larger dress in our inventory."
10051030-7 = "Eeh?!"
10051030-8 = "[s] \"Maybe we can go to a dress shop?\""
10051030-9 = "I've already contacted the nearby boutiques..."
10051030-10 = "...And I was told that a dress that would fit Tsukuyo would...need to be custom-made."
10051030-11 = "Then we should hurry and put in an order...!"
10051030-12 = "...You do realize that the event starts in an hour?"
10051030-13 = "...Ah!"
10051030-14 = "Well, this situation has forced our hands."
10051030-15 = "At this point, we only have one remaining option."
10051030-16 = "There's an option?"
10051030-17 = "Of course."
10051030-18 = "Although...it may break a girl's heart..."
10051030-19 = "Huh...?"
10051030-21 = "An hour passed."
10051030-22 = "At last, the Ninjutsu Research Club's security guard mission began."
10051030-24 = "Fashion Show Banquet Hall"
10051030-26 = "There sure are a lot of people. I can barely tell what's going on..."
10051030-27 = "Now, now. Get a hold of yourself, Michiruchi! All that matters is the mission!"
10051030-28 = "Okay, ah, ah. Focus. \"Whirling Doll,\" do you copy?"
10051030-32 = "Yes! Izuna can hear you fantastically, President!"
10051030-33 = "Please mind the codenames. What's your current location?"
10051030-34 = "Standing by at the east side of the banquet hall, as requested."
10051030-35 = "Okay, thank you."
10051030-39 = "Now then, since she's in place..."
10051030-40 = "...\"Waiting Arbor,\" do you copy?"
10051030-42 = "Fashion Show Banquet Hall Main Entrance"
10051030-44 = "Yes. I can hear you clearly..."
10051030-45 = "I am planted at the main entrance...observing..."
10051030-46 = "S-Sorry, Tsukuyo..."
10051030-47 = "For sending you out there alone..."
10051030-48 = "I'm really sorry about the dress code and that you had to miss out."
10051030-49 = "Th-There's nothing you should apologize for!"
10051030-50 = "It's my fault for being so large, imposing, and too big for that dress."
10051030-51 = "I-In fact, I...actually feel more comfortable out here. I get to wear my own clothes."
10051030-52 = "You're too good for us, Tsukuyo..."
10051030-53 = "Okay! Let's stay focused and we can get some big bowls of ramen once this is all over!"
10051030-54 = "We'll finish the video! Won't that be fun?"
10051030-55 = "S-Sounds great, President!"
10051030-56 = "Thick noodles, pork belly, drizzled with chili oil..."
10051030-57 = "Ah?!"
10051030-58 = "What's going on?!"
10051030-59 = "President! Shinecat is here! The designer!"
10051030-67 = "Okay, the eagle has landed! I mean...the cat! To your positions!"
10051030-68 = "...That sounded good, right?"
10051030-72 = "(Stay calm, stay calm...!)"
10051030-73 = "(Just stand and observe. Don't be awkward or obvious. No one's here to see me...)"
10051030-79 = "You."
10051030-80 = "M-Me?!"
10051030-81 = "What are you doing out here?"
10051030-82 = "Wha...?! I-I'm supposed to..."
10051030-83 = "The show's about to begin and you're just wandering outside? You're not even dressed! What kind of model are you?"
10051030-84 = "\"Model\"...of...a person?"
10051030-85 = "Get it together, girl! Stop looking shocked and get yourself to the green room!"
10051030-86 = "But I, I, I..."
10051030-88 = "...am not a model!"
10051030-93 = "Huh? You're not?"
10051030-94 = "You definitely have the look."
10051030-95 = "Eh... I'm just a security g-guard..."
10051030-96 = "Huh."
10051030-97 = "My apologies. I didn't mean to be so rude."
10051030-98 = "But... Hmm..."
10051030-105 = "What a shame."
10051030-106 = "Working security when you have such a body, such a natural magnetism..."
10051030-107 = "What...?"
10051030-108 = "I-It's nothing. Don't concern yourself."
10051030-109 = "Simply a visionary's lamentation..."
10051030-110 = "Nothing says that you must walk a certain path...even if you're a prodigy."
10051030-111 = "And yet... Hmm..."
10051030-112 = "...?"
10051030-113 = "It's a shame to part like this."
10051030-114 = "So, girl, why don't you tell me your name?"
10051030-115 = "What?!"
10051030-116 = "I-It's Ono Tsukuyo..."
10051030-117 = "I'm from the Ninjutsu Research Club, and I'm..."
10051030-118 = "Enough. I don't care about your past."
10051030-119 = "Your future, though? Ono Tsukuyo... I'll remember that name."
10051030-120 = "So you should remember mine."
10051030-121 = "Here."
10051030-122 = "A b-business card...!"
10051030-123 = "Speaking of that, I have business. Excuse me, Ono Tsukuyo."
10051030-127 = "(Wh-What just happened?!)"
10051030-128 = "(Why would someone like Shinecat ask for my name...? And give me a sleek business card on top of that...?)"
10051030-129 = "(What's he thinking?)"
10051030-130 = "(Augh...)"
10051030-131 = "(No, no. Let's not worry.)"
10051030-132 = "(I'm here for the job...!)"
10051030-133 = "Well then! Tsukuyo's outdoor security mission has officially begun!"
10051030-135 = "Fashion Show Green Room"
10051030-136 = "How are we looking?"
10051030-137 = "Brilliant, Shinecat!"
10051030-138 = "And you ensured that my dress was handled with care? Hung as I left it? Climate-controlled?"
10051030-139 = "That piece is one-of-a-kind. Couture. There are no spares."
10051030-140 = "Yes! It's hung up nicely in this room! It has a rack all to itself!"
10051030-141 = "And the room gets no direct sunlight, and we have a perfect dehumidification and deodorization system running."
10051030-142 = "Would you like to...inspect it yourself?"
10051030-143 = "Naturally."
10051030-144 = "These models better start getting dressed. We need time for quick mends."
10051030-145 = "So, which room is holding the wardrobe, again?"
10051030-146 = "I'll guide you."
10051030-147 = "Please follow me."
10051030-151 = "Okay, so this is our..."
10051030-152 = "Uh... Who... Why...is the lock not latching?"
10051030-153 = "Is there a problem?"
10051030-154 = "N-No! Of course not!"
10051030-155 = "It's supposed to be here! Your dress! The fashion!"
10051030-159 = "E-Eh...! AIYEEEEE!"
10051030-160 = "Hm? What's the matter?"
10051030-161 = "Th-Th-This can't be right...!"
10051030-162 = "Sh-Sh-Shinecat..."
10051030-163 = "I-I-I-I'm sorry...!"
10051030-164 = "This isn't right! Oh, this is terrible!"
10051030-165 = "What is it? Say it!"
10051030-166 = "W-Well..."
10051030-167 = "Your piece...your work...your beautiful dress..."
10051030-168 = "No, I must be...d-dreaming...!"
10051030-169 = "What are you, malfunctioning? Outta my way!"
10051030-173 = "M-My piece...!"
10051030-174 = "My design, my dress, is gone...?!"
10051030-175 = "I'm terribly sorry. It was here only a moment ago!"
10051030-176 = "E-Eeh...!"
10051030-178 = "Find them and bring them to me NOW!"
10051030-179 = "What?! Them?"
10051030-180 = "What doesn't compute? I'm saying FIND the thief and bring them to ME!"
10051030-181 = "If you don't catch that miserable looter, you're all fired! Do you understand THAT?!"
10051030-182 = "E-Eek! Yes!"

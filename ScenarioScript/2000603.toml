2000603-33 = "3;로봇 종업원;09;아뇨. 그렇다기보다는 가게의 영업 방침인지라…… 죄송합니다.\n#3;em;…"
2000603-34 = "5;사야 사복;04;치잇, 쩨쩨하기는…….\n#5;stiff"
2000603-35 = "5;사야 사복;02;하지만 그럴 줄 알고 이번에는 일행을 데려왔지!\n#5;em;[반응]\n#5;m3\n#3;dl"
2000603-36 = "5;사야 사복;03;자. 나와라, 네즈스케!\n#5;greeting\n#5;em;[반짝]"

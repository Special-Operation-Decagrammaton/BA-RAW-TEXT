[translation]
2000603-1 = "วันหยุดพักผ่อนของอัจฉริยะ"
2000603-2 = "(คุณครูรู้สึกกังวลเพราะข้อความของซายะเลยแอบตามเธอไป)"
2000603-4 = "ย่านการค้าเทพเต่าดำ ซานไห่จิง"
2000603-5 = "ฮึ่ย ทำไมทุกคนถึงไม่เชื่อฉันกันเลยล่ะ?!"
2000603-6 = "บอกตั้งกี่ครั้งแล้วนี่เป็นแค่ชีสเค้กธรรมดา ทำไมต้องทำท่าสงสัยแล้วหนีไปแบบนั้นด้วยนะ"
2000603-7 = "แต่ไม่เป็นไรหรอก วันนี้มีเนสึซึเกะมาด้วย พนักงานคงไม่ปฏิเสธแน่!"
2000603-8 = "ใช่ไหมเนสึซึเกะ?"
2000603-9 = "จี๊ดๆ จี๊ดๆ..."
2000603-10 = "เอาละ งั้นเราเข้าไปในร้านกันเลยเถอะ"
2000603-14 = "[ns] แอบตามซายะไป"
2000603-16 = "ร้านเค้กป็อปอัปในย่านการค้าเทพเต่าดำ"
2000603-18 = "ยินดีต้อนรับครับคุณลูกค้า มากี่ท่านครับ?"
2000603-19 = "ฉันมาคนเดียว!"
2000603-20 = "นั่นเพราะว่าวันนี้ฉันคืออัฉริยะผู้โดดเดี่ยว..."
2000603-22 = "ไม่สิ นักชิมผู้โดดเดี่ยวต่างหาก!"
2000603-25 = "ยะ... อย่างนั้นเหรอครับ ผมจะไปพาไปที่โต๊ะนะครับ"
2000603-27 = "จะรับอะไรดีครับ?"
2000603-28 = "ขอ <บลูเบอร์รี่ชีสเค้กสุดพิเศษสำหรับคู่รัก> อันนี้แหละ!"
2000603-29 = "ขะ...ขอโทษครับคุณลูกค้า เมนูนี้จำกัดเฉพาะคู่รักเท่านั้นครับ ถ้ามาแค่หนึ่งท่านจะสั่งไม่ได้นะครับ"
2000603-30 = "ว่าไงนะ? ที่ทำแบบนี้เพราะกลัวท่านซายะคนนี้กินไม่หมดแล้วเหลือทิ้งงั้นเหรอ?"
2000603-31 = "ไม่ต้องห่วงหรอก ถึงเห็นแบบนี้ ท่านซายะคนนี้ก็เป็นนักชิมที่ไม่เคยกินทิ้งกินขว้างเลยนะ"
2000603-32 = "ฉันเคยกินชีสหมดเป็นถังๆ ในครั้งเดียวเลยนะ รู้รึเปล่า!"
2000603-33 = "ไม่ใช่อย่างนั้นครับ คือว่ามันเป็นนโยบายของทางร้านเราน่ะครับ... ต้องขอโทษด้วยนะครับ"
2000603-34 = "ชิ วุ่นวายชะมัด..."
2000603-35 = "ฉันคิดแล้วว่าเรื่องแบบนี้จะต้องเกิดขึ้น ก็เลยพาเพื่อนมาด้วยยังไงล่ะ!"
2000603-36 = "เอาละ เนสึซึเกะ ออกมาเลย!"
2000603-37 = "จี๊ดๆ จี๊ดๆ..."
2000603-38 = "คู่หูนักวิจัยของฉัน เนสึซึเกะ!"
2000603-39 = "ตอนนี้ก็เท่ากับสองคนแล้ว แค่นี้ก็สั่งชีสเค้กสำหรับคู่รักได้แล้วใช่มั้ยล่ะ?"
2000603-40 = "เอ่อ... แต่ว่าการนำสัตว์เลี้ยงมานี่มัน..."
2000603-41 = "ว่าไงนะ?! เนสึซึเกะไม่ใช่สัตว์เลี้ยงนะ แต่เป็นครอบครัวของท่านซายะต่างหาก!"
2000603-42 = "[s1] \"ขอโทษนะ...\"\n[s2] \"พวกเรามาด้วยกันน่ะ...\""
2000603-43 = "โอ้! มาด้วยกันสินะครับ"
2000603-44 = "โอ้! มาด้วยกันสินะครับ"
2000603-45 = "ทำไมคุณครูถึงอยู่ที่นี่..."
2000603-46 = "[s] \"ขอเมนูชีสเค้กคู่รักที่เธอสั่งไปด้วยนะ\""
2000603-47 = "ครับผม รับออเดอร์เรียบร้อย จะเตรียมขนมมาให้เดี๋ยวนี้ครับ"
2000603-49 = "แปลกจังเลย ฉันคิดไม่ถึงเลยว่าจะเจอคุณครูที่นี่"
2000603-50 = "[s] \"ครูเป็นห่วงซายะเลยตามมาน่ะ\""
2000603-52 = "ว่าไงนะ? หรือว่าเป็นห่วงเพราะข้อความที่ฉันส่งไปใน MOMOTALK งั้นเหรอ?"
2000603-53 = "ไม่เห็นต้องเป็นห่วงเลย..."
2000603-54 = "แต่ก็นะ มาก็ดีแล้วละ พอคุณครูมาด้วยก็เลยได้สั่งชีสเค้กที่อยากกินสักที"
2000603-55 = "พนักงานที่นี่เป็นพวกหัวโบราณยึดแต่หลักการน่ะ ฉันเลยสั่งเมนูนี้ไม่ได้"
2000603-56 = "[s3] \"ทำไมไม่ชวนสมาชิกคนอื่นมาด้วยล่ะ\"\n[s4] \"แล้วนี่... เธอไม่มีเพื่อนเหรอ?\""
2000603-57 = "ฉันชวนมาแล้วนะ! ชวนตั้งสองครั้งเลยด้วย!"
2000603-58 = "สะ... เสียมารยาทที่สุดเลย! ท่านซายะเองก็มีเพื่อนอยู่นะ?!"
2000603-59 = "ก็แค่... พอฉันชวนคนอื่นมากินอาหารทีไร ทุกคนก็มักจะบอกว่ายุ่งแล้วก็หนีไปตลอดเลย"
2000603-60 = "แค่เพราะฉันคือท่านซายะ แต่ก็ไม่ได้หมายความว่าฉันจะผสมยาแปลกๆ ลงในอาหารทุกวันหรอกนะ"
2000603-61 = "ทุกคนจะระแวงกันเกินไปหรือเปล่า?"
2000603-62 = "[s] \"กรรมตามทันสินะ\""
2000603-63 = "กรรมงั้นเหรอ! อย่ามากล่าวหากันมั่วๆ นะ!"
2000603-64 = "ฉันไม่เคยบังคับให้ใครกินยาสักครั้งเลย"
2000603-65 = "นะ...แน่นอนว่าบางครั้งเพื่อการวิจัยก็มีสองสามครั้งที่เคยแอบผสมยาแล้วให้กินบ้าง..."
2000603-66 = "แต่ก็เอาเถอะ! ถึงคนอื่นๆ จะไม่ยอมมาเที่ยวด้วยกันในวันหยุด ฉันก็ไม่เสียใจหรอกนะ!"
2000603-67 = "เพราะว่าฉันยังมีเนสึซึเกะอยู่ไงล่ะ..."
2000603-68 = "ว่ากันว่าอัจฉริยะมักต้องใช้เวลาว่างตามลำพังไงล่ะ โฮะ-โฮะ-โฮะ!"
2000603-69 = "[s] \"ถ้างั้นครูกลับแล้วนะ\""
2000603-70 = "ดะ...เดี๋ยวสิ! ช่วยรอจนกว่าเค้กที่สั่งไปมาเสิร์ฟก่อนเถอะนะ!"
2000603-73 = "ขอโทษที่ทำให้รอนานนะครับ เมนู <บลูเบอร์รี่ชีสเค้กสุดพิเศษสำหรับคู่รัก> ที่สั่งได้แล้วครับ"
2000603-74 = "ในที่สุดก็ได้สักที!"
2000603-75 = "ฮุฮุฮุ บลูเบอร์รี่ชีสเค้กที่ทำจากชีสทั้งก้อน มีขายที่นี่ที่เดียวเลยนะ!"
2000603-76 = "ฉันอยากลองชิมมาตลอดเลย"
2000603-81 = "อื้ม! อร่อยจัง~ ♪"
2000603-82 = "[s] \"ชีสเค้กนี่ดูเหมือนจะเสียแล้วเลยนะ...\""
2000603-84 = "อย่าตัดสินแค่รูปลักษณ์ภายนอกสิ! ชีสเค้กที่บ่มเพาะจนได้ที่แล้วน่ะ จะต้องลองชิมดูเท่านั้นถึงจะรู้!"
2000603-85 = "ไว้ใจท่านซายะแล้วลองชิมดูสิ"
2000603-88 = "[s5] \"รสชาติไม่แย่อย่างที่คิดนะ...\"\n[s6] \"รสชาติอร่อยเข้มข้น ตรงข้ามกับหน้าตาเลยนะ\""
2000603-89 = "ใช่มั้ยล่ะ? ชีสเค้กที่บ่มจนได้ที่แล้วน่ะ มองด้วยตาอย่างเดียวไม่ได้หรอก#nต้องลองลิ้มรสด้วยลิ้นดูต่างหากล่ะ..."
2000603-90 = "ใช่มั้ยล่ะ? ชีสเค้กที่บ่มจนได้ที่แล้วน่ะ มองด้วยตาอย่างเดียวไม่ได้หรอก#nต้องลองลิ้มรสด้วยลิ้นดูต่างหากล่ะ..."
2000603-91 = "อุตส่าห์คิดว่าถ้าเป็นคุณครูจะเข้าใจรสชาตินี้ซะอีก"
2000603-92 = "คงเป็นเพราะมีคนมากินด้วยแหละมั้ง ถึงได้รู้สึกว่าวันนี้ชีสเค้กอร่อยกว่าปกติ ♪"
2000603-93 = "[s] \"ไหนเมื่อกี๊บอกว่าอยู่คนเดียวได้ไงล่ะ?\""
2000603-94 = "ถะ...ถึงจะพูดแบบนั้นก็เถอะ...! "
2000603-95 = "แต่บางครั้ง..."
2000603-96 = "วันหยุดที่ไม่ได้อยู่คนเดียวก็ไม่ได้แย่เท่าไรนะ"
2000603-98 = "(หลังจากนั้นคุณครูกับซายะก็ใช้เวลากินชีสเค้กก้อนใหญ่พิเศษด้วยกันอย่างเพลิดเพลิน)"

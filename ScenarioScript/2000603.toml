[translation]
2000603-1 = "天才的假日"
2000603-2 = "（因為很在意沙耶的訊息，於是偷偷跟在她後面）"
2000603-4 = "山海經．玄武商會"
2000603-5 = "唔唔，為什麼大家都不願意相信呢！？"
2000603-6 = "明明強調好幾次，只是個普通的起司蛋糕，沒有參雜任何藥物了……！"
2000603-7 = "……不過沒關係！只要帶著根津助就一定沒問題！"
2000603-8 = "對吧，根津助？"
2000603-9 = "啾……？"
2000603-10 = "好，那我們走吧！"
2000603-14 = "[ns] 跟在沙耶後面。"
2000603-16 = "玄武商會．蛋糕店"
2000603-18 = "歡迎光臨，請問客人有幾位呢？"
2000603-19 = "只有我一位！"
2000603-20 = "因為我是孤獨的天才……"
2000603-22 = "不，我今天是孤獨的美食家！"
2000603-25 = "原，原來如此……那麼，由我來替您帶位。"
2000603-27 = "請問客人要點什麼？"
2000603-28 = "我要這個「情侶專用特大藍紋起司蛋糕」！"
2000603-29 = "那個……對不起，客人。這個品項是情侶專用的限定餐點，只有一名客人會沒辦法點……"
2000603-30 = "什麼？是因為擔心我吃不完嗎？"
2000603-31 = "別擔心。別看我這樣，我可是個不會剩下任何食物的大胃王。"
2000603-32 = "我還曾吃完一整箱的起司呢！"
2000603-33 = "不，不是這個問題……只是我們這個餐點就是這麼規定的，真的很抱歉。"
2000603-34 = "呿，真是古板的店家……"
2000603-35 = "不成問題。還好我早猜到會這樣，這次帶了同伴來！"
2000603-36 = "好了，出來吧，根津助！"
2000603-37 = "啾啾。"
2000603-38 = "這是我的實驗搭檔根津助！"
2000603-39 = "現在我們有兩個人了，可以點這套情侶專用餐點了吧？"
2000603-40 = "呃嗯，那個，寵物可能會不方便當作同伴……"
2000603-41 = "根津助不是寵物，是我的家人！"
2000603-42 = "[s1] 「你好，不好意思……」\n[s2] 「我是和這個學生一起來的。」"
2000603-43 = "啊啦，真是失禮了。"
2000603-44 = "啊啦，真是失禮了。"
2000603-45 = "老，老師怎麼會在這裡……？"
2000603-46 = "[s] 「請給我們剛才說的那份蛋糕套餐。」"
2000603-47 = "好，我知道了。請兩位稍等一下。"
2000603-49 = "嚇我一跳……老師剛好也來這間店啊？"
2000603-50 = "[s] 「我是擔心沙耶才跟來的。」"
2000603-52 = "有什麼好擔心……該不會是那個MomoTalk吧？"
2000603-53 = "呣，剛剛的狀況我自己就能解決了……"
2000603-54 = "不過多虧老師幫忙，我才能成功點餐。"
2000603-55 = "這裡的店員太死腦筋了，這麼不知變通實在令人困擾。"
2000603-56 = "[s3] 「可以拜託其他鍊丹術研究會的成員，請她們一起來呀？」\n[s4] 「沙耶，先去交幾個朋友吧……」"
2000603-57 = "我已經問過了！而且問了兩次！"
2000603-58 = "太，太失禮了！我也是有朋友的好嗎！"
2000603-59 = "但奇怪的是，每次問要不要一起吃飯，對方就會說「突然有急事」，然後就逃跑了……"
2000603-60 = "我又不是每天都只吃添加奇怪藥物的食物。"
2000603-61 = "大家為什麼會這麼多疑？"
2000603-62 = "[s] 「我想這只能怪你平常的所作所為囉……」"
2000603-63 = "哪，哪有這麼嚴重！"
2000603-64 = "何況我可不曾強迫別人吃任何藥物！"
2000603-65 = "雖，雖然是有幾次為了實驗而說謊把藥塞給別人啦……"
2000603-66 = "總之！就算其他人放假時不願意陪我，我也完全不會覺得困擾！"
2000603-67 = "我還有一直陪伴著我的根津助……"
2000603-68 = "而且天才的休假本來就是孤獨的。唔──哈哈哈！"
2000603-69 = "[s] 「那我是不是應該回去比較好呢？」"
2000603-70 = "等，等等！至少先等到蛋糕送過來吧！！"
2000603-73 = "讓兩位久等了，這是客人點的「情侶專用特大藍紋起司蛋糕」。"
2000603-74 = "來了！"
2000603-75 = "哼──哼哼哼。只有這裡能品嘗到，使用整個藍紋起司的起司蛋糕……"
2000603-76 = "我早就想吃吃看了。"
2000603-81 = "嗯～♪果然很好吃～♪"
2000603-82 = "[s] 「它的顏色和味道怎麼有點……」"
2000603-84 = "它長這樣可不是因為壞掉了！這種熟成過的起司，要品嘗才能明白它的價值！！"
2000603-85 = "你就相信我，吃吃看一口吧。"
2000603-88 = "[s5] 「……喔，好吃。」\n[s6]「味道濃郁，感覺相當不錯。」"
2000603-89 = "對吧？真正熟成的起司不能用眼睛評論，而是要用舌頭感受的。"
2000603-90 = "對吧？真正熟成的起司不能用眼睛評論，而是要用舌頭感受的。"
2000603-91 = "我就覺得老師一定能理解這個味道。"
2000603-92 = "哼哼。或許是因為和別人一起吃的關係，雖然之前也有吃過類似的東西，但這次感覺又更美味♪"
2000603-93 = "[s] 「你剛才不是說自己一個人也不成問題嗎？」"
2000603-94 = "話，話雖如此……！"
2000603-95 = "不過……偶爾和根津助以外的人，嗯……"
2000603-96 = "偶爾和別人一起過假日，感覺也不賴。"
2000603-98 = "（後來吃完起司蛋糕後，也繼續陪沙耶度過了愉快的假日）"

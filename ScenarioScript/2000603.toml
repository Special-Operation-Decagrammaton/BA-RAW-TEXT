2000603-38 = "5;사야 사복;02;내 실험 파트너인 네즈스케인 것이다!"
2000603-39 = "5;사야 사복;03;이제 둘이 되었으니 이 커플 전용 특대 치즈 케이크를 주문할 수 있겠지?\n#5;em;[음표]\n#5;hophop"
2000603-40 = "1;로봇 종업원;04;으음…… 하지만 애완동물을 일행으로 치는 것은 조금…….\n#1;em;[땀]\n#1;ar\n#5;m5"
2000603-41 = "5;사야 사복;05;뭐라고?! 네즈스케는 애완동물이 아니라 나님의 가족이거든!\n#5;stiff\n#5;em;[빠직]"

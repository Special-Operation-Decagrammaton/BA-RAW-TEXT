[translation]
2000603-1 = "A Genius' Day Off"
2000603-2 = "Saya's last message concerned me, so I decided to go after her."
2000603-4 = "Shanhaijing Black Tortoise Promenade"
2000603-5 = "Ugh. Why wouldn't anyone believe me?!"
2000603-6 = "I keep saying we're just going out for normal cheesecake, but they all run away saying there must be something suspicious about it."
2000603-7 = "But that's okay! Nezusuke will be my plus one. There's no way they won't serve us now."
2000603-8 = "Isn't that right, Nezusuke?"
2000603-9 = "*squeak* *squeak*..."
2000603-10 = "Come on. Let's go inside."
2000603-14 = "[ns] Follow Saya."
2000603-16 = "Promenade Sweets Cafe"
2000603-18 = "Welcome. How many in your party?"
2000603-19 = "A table for one will do just fine!"
2000603-20 = "I'm a solitary genius for today..."
2000603-22 = "No, a solitary gourmet!"
2000603-25 = "I-I see. Allow me to show you to your table."
2000603-27 = "What can I get for you?"
2000603-28 = "I'd like the extra large blue cheese cheesecake for couples, please!"
2000603-29 = "Um...I'm very sorry, miss. As you said, that item is for couples only. We don't serve it to parties of one."
2000603-30 = "Why not? Worried that I can't finish it alone?"
2000603-31 = "Well, that's where you're wrong. I may look small, but I'm a gourmand through and through who never wastes her food."
2000603-32 = "I even ate a whole bucket of cheese in a single sitting once!"
2000603-33 = "No, it's not that. It's simply store policy. I'm terribly sorry."
2000603-34 = "Hmph. That's so stingy."
2000603-35 = "I thought this might happen, so I DID bring someone."
2000603-36 = "Come on out, Nezusuke!"
2000603-37 = "*squeak* *squeak*..."
2000603-38 = "Meet my lab partner, Nezusuke!"
2000603-39 = "Now that we're a party of two, can we order the extra large cheesecake for couples?"
2000603-40 = "Um...I'm sorry, but we don't consider pets to be customers."
2000603-41 = "What did you say?! Nezusuke isn't a pet—he's family!"
2000603-42 = "[s1] \"Excuse me...\"\n[s2] \"Actually, she and I are together.\""
2000603-43 = "Oh! You didn't mention someone else would be joining you."
2000603-44 = "Oh! You didn't mention someone else would be joining you."
2000603-45 = "What are you doing here, Sensei?"
2000603-46 = "[s] \"You heard the lady. The cheesecake for couples, please.\""
2000603-47 = "Yes, I've got the order. Coming right up."
2000603-49 = "I didn't expect to see you here."
2000603-50 = "[s] \"I followed you because I was worried.\""
2000603-52 = "What? Are you talking about that MomoTalk message from before?"
2000603-53 = "You didn't have to do that..."
2000603-54 = "Well, I'm glad you're here anyway. Now I can finally try that cheesecake I've wanted thanks to you."
2000603-55 = "They're real sticklers for rules here, so I've had the hardest time ordering it."
2000603-56 = "[s3] \"Why didn't you ask one of your clubmates to join you?\"\n[s4] \"Don't have any friends, huh?\""
2000603-57 = "I did ask! Twice!"
2000603-58 = "H-Hey, you don't have to be rude. I have friends..."
2000603-59 = "It's just, any time I suggest eating something to the others, they always suddenly run away saying they have other plans."
2000603-60 = "It's not like I want them to eat things mixed with my elixirs EVERY day."
2000603-61 = "Why are they so suspicious of me?"
2000603-62 = "[s] \"You reap what you sow.\""
2000603-63 = "Say what?! That's defamation of character!"
2000603-64 = "I have never forced anyone to try one of my experiments, technically speaking."
2000603-65 = "They always take it willingly...after I mix it in without telling them. You know how it goes."
2000603-66 = "Anyway! If they don't want to hang out with me on the weekends, then that's their loss!"
2000603-67 = "I'll always have Nezusuke, and what more do I need?"
2000603-68 = "It's normal for a genius like me to be solitary. Hahaha!"
2000603-69 = "[s] \"In that case, I'll be going.\""
2000603-70 = "W-Wait! At least stay until he serves us our cheesecake!"
2000603-73 = "Thank you for waiting. Here's the extra large blue cheese cheesecake for couples you ordered."
2000603-74 = "There it is! It's really here!"
2000603-75 = "Heh. This is the only place you can get cheesecake made exclusively with blue brain cheese. It's a delicacy, you know."
2000603-76 = "I've been waiting so long to try this."
2000603-81 = "It's just as delicious as I thought! ♪"
2000603-82 = "[s] \"It kind of looks like it's expired...\""
2000603-84 = "Don't judge a book by its cover! Aged cheese is an acquired taste. You have to try it for yourself to understand its true value!"
2000603-85 = "Just trust me and take a bite."
2000603-88 = "[s5] \"It's not as bad as I thought.\"\n[s6] \"It looked gross, but the strong flavor is really good.\""
2000603-89 = "Right? Aged cheese is meant to be enjoyed by your tongue, not your eyes."
2000603-90 = "Right? Aged cheese is meant to be enjoyed by your tongue, not your eyes."
2000603-91 = "I knew you would appreciate the taste."
2000603-92 = "And this cheesecake tastes so much better when you enjoy it with someone else. ♪"
2000603-93 = "[s] \"I thought you said you like to be alone on your days off.\""
2000603-94 = "Th-That's true, but...! "
2000603-95 = "Well, sometimes..."
2000603-96 = "...having a not-so-lonely day off isn't so bad."
2000603-98 = "Saya and I ate the huge cake together and enjoyed our day."

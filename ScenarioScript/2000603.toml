2000603-27 = "3;로봇 종업원;03;주문은 무어로 하시겠습니까?\n#3;greeting\n#3;em;[반짝]\n#3;a"
2000603-28 = "5;사야 사복;02;여기 메뉴판에 있는 <커플 전용 특대 블루치즈 케이크>로!\n#5;al\n#5;em;[!]\n#3;m1"
2000603-29 = "3;로봇 종업원;04;저…… 죄송합니다만, 손님. 그 메뉴는 커플 전용의 한정 메뉴인지라, 1인 손님께서는 주문하실 수 없습니다.\n#3;stiff\n#3;em;[땀]"
2000603-30 = "5;사야 사복;05;뭐? 나님이 다 먹지 못하고 남길까 봐 그러는 것이냐?\n#5;em;[?]"
2000603-31 = "5;사야 사복;01;걱정하지 않아도 괜찮은 것이다. 이래 보여도 나님은 어떤 음식이든 남기지 않는 대식가거든."

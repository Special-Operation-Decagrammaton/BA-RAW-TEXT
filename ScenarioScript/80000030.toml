[translation]
80000030-1 = "กุญแจมือปลอม"
80000030-2 = "สำนักรักษาความปลอดภัย สถาบันฝึกตำรวจวัลคิรี่"
80000030-3 = "คุณครูคะ คุณครู ดูนี่สิคะ!"
80000030-4 = "ฮิฮิ ดูออกมั้ยคะว่ามันคืออะไร?"
80000030-9 = "[ns] \"กุญแจมือเหรอ...?\""
80000030-10 = "ค่ะ แต่ถูกแค่ครึ่งเดียวนะคะ!"
80000030-11 = "นี่ไม่ใช่กุญแจมือของจริง แต่เป็นช็อกโกแลตรูปกุญแจมือค่ะ"
80000030-12 = "พอดีตอนที่ไปลาดตระเวนเมื่อเช้าฉันเจอช็อกโกแลตรูปร่างแปลกๆ แบบนี้วางขายอยู่ค่ะ"
80000030-13 = "พอเห็นช็อกโกแลตรูปกุญแจมือแบบนี้ก็คิดไอเดียดีๆ ได้ เลยซื้อมาค่ะ"
80000030-14 = "[s] \"ไอเดียดีๆ?\""
80000030-15 = "ค่ะ กุญแจมือเป็นอุปกรณ์ที่ใช้สำหรับจับคนร้ายใช่มั้ยคะ"
80000030-16 = "ตามกฎเวลาจับคนร้าย จะต้องสวมกุญแจมือพวกเขาข้างหนึ่ง แล้วก็สวมไว้ที่ตัวเองข้างหนึ่งเพื่อ#nป้องกันการหลบหนี"
80000030-17 = "ฉันชอบทำพลาดบ่อยๆ บางครั้งเลยชอบเผลอใส่กุญแจมือตัวเองอย่างเดียว และปล่อยให้คนร้าย#nหนีไปได้หลายครั้งเลยค่ะ..."
80000030-18 = "เพราะงั้นเวลาที่ใส่กุญแจมือพลาดเลยชอบคิดว่าอยากมีพลังเยอะๆ จะได้ทำลายกุญแจมือทิ้งไปได้..."
80000030-23 = "แต่ว่าถ้าเป็นกุญแจมือช็อกโกแลตอันนี้ละก็ ต่อไปจะได้ไม่ต้องห่วงเรื่องแบบนั้นอีกแล้วค่ะ!"
80000030-24 = "ต่อให้ใส่กุญแจมือผิด แต่แค่ออกแรงนิดหน่อยช็อกโกแลตก็น่าจะแตกได้ง่ายๆ ค่ะ"
80000030-25 = "แล้วก็เวลาที่ต้องไปดักซุ่มจับคนร้าย อาจมีอาการน้ำตาลตก อยากกินของหวานก็กินได้ทันที ยิงปืนนัดเดียวได้นกสองตัวเลยนะคะ"
80000030-26 = "เป็นยังไงคะ คุณครู แผนของฉันยอดเยี่ยมเลยใช่มั้ยคะ!"
80000030-27 = "[s] \"แต่คนร้ายก็คงหนีไปได้ง่ายๆ เหมือนกันนะ\""
80000030-31 = "จะ...จริงด้วยค่ะ ถ้าฉันใช้แรงหักกุญแจมือนี่ได้ พวกคนร้ายเองก็น่าจะทำได้เหมือนกัน..."
80000030-32 = "งั้นก็แปลว่าใช้กุญแจมือช็อกโกแลตนี่ก็ไม่ช่วยอะไรสินะ..."
80000030-33 = "ฮือ... ทำยังไงดีคะ คุณครู... ฉันคิดว่ามันน่าจะเอามาใช้ทำงานได้ก็เลยใช้งบของตำรวจซื้อไปแล้วค่ะ..."
80000030-34 = "ถ้าเกิดผู้บัญชาการรู้เข้า คงจะต้องถูกดุอีกแน่ๆ เลยค่ะ..."
80000030-36 = "(สุดท้ายคิริโนะก็ต้องมานั่งเขียนหนังสือสำนึกผิดหลังจากใช้งบตำรวจซื้อของไร้สาระไป...)"
80000030-37 = "(และคุณครูก็ได้รับช็อกโกแลตกุญแจมือที่ไม่สามารถใช้ได้มาเป็นของขวัญ...)"

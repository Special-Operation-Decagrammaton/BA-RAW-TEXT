[translation]
80000030-1 = "偽裝手銬"
80000030-2 = "女武神．生活安全局"
80000030-3 = "老師老師。請看這個！"
80000030-4 = "你看得出來這是什麼嗎？"
80000030-9 = "[ns]「手銬……？」"
80000030-10 = "是的，不過只答對一半！"
80000030-11 = "其實這不是真正的手銬，而是手銬造型的巧克力。"
80000030-12 = "今天上午巡邏的時候，我發現因為情人節的關係，正在賣這種特別的巧克力。"
80000030-13 = "由於突然浮現了一個好主意，所以我就立刻買下來了！"
80000030-14 = "[s]「好主意？」"
80000030-15 = "是的，手銬是用來束縛犯人的工具。"
80000030-16 = "根據情況，有可能為了防止犯人逃跑將其銬上手銬，#n並將另一邊銬在警察自己的手上。"
80000030-17 = "但是本官時常發生失誤，有時會發生只銬住自己，讓犯人逃之夭夭的狀況……"
80000030-18 = "所以我時常在思考如何處理這種情況，或是覺得要是我有怪力就好了……"
80000030-23 = "但如果是這個巧克力手銬，就不需要擔心這個問題了！"
80000030-24 = "即使誤銬到自己，只要稍微用點力就能粉碎它。"
80000030-25 = "而且在勤務中肚子餓的時候也可以吃……簡直就是一石二鳥！"
80000030-26 = "怎麼樣，老師？我的計劃很完美吧！"
80000030-27 = "[s]「但是，這對犯人來說也一樣……對吧？」"
80000030-31 = "……確，確實如此呢！？"
80000030-32 = "這，這樣就沒有銬上手銬的意義了……？"
80000030-33 = "該，該怎麼辦啊，老師……我以為對公務有幫助，所以就用經費買了這個……"
80000030-34 = "這樣又要被高層訓話了……"
80000030-36 = "（結果桐乃似乎因為將經費用在奇怪的地方，被處罰寫報告書……）"
80000030-37 = "（至於失去用處的手銬型巧克力，就作為桐乃的禮物心懷感激地收下了）"

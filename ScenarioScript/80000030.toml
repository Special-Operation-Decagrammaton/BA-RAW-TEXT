[translation]
80000030-1 = "#title;가짜 수갑"
80000030-2 = "#place;발키리 생활안전국 사무실"
80000030-3 = "3;키리노;08;선생님, 선생님. 이걸 봐주세요!\n#3;ar"
80000030-4 = "3;키리노;01;후후, 이게 무엇인지 알아보시겠나요?\n#3;em;[반응]\n#3;hophop"
80000030-5 = "#st;[0,0];instant;1;"
80000030-6 = "#clearST"
80000030-7 = "3;키리노;01\n#3;d\n#wait;1000"
80000030-8 = "#wait;2500"
80000030-9 = "[ns] \"수갑…… 아니야?\""
80000030-10 = "3;키리노;00;네, 하지만 절반만 정답입니다!\n#3;em;[반짝]\n#3;greeting\n#3;a"
80000030-11 = "3;키리노;01;이건 사실 진짜 수갑이 아니라, 수갑 모양의 초콜릿입니다."
80000030-12 = "3;키리노;03;오늘 오전에 순찰을 나갔는데 발렌타인 데이를 기념하여 가게에서 이런 특이한 모양의 초콜릿을 팔고 있더라고요.\n#3;em;[재잘]"
80000030-13 = "3;키리노;01;이 수갑 모양의 초콜릿을 보고 있노라니, 좋은 생각이 떠올라서 바로 구입했습니다!\n#3;greeting"
80000030-14 = "[s] \"좋은 생각?\""
80000030-15 = "3;키리노;09;네. 수갑은 범죄자를 구속하기 위해 사용하는 도구이니까요.\n#3;em;[반응]"
80000030-16 = "3;키리노;05;그래서 범죄자를 붙잡으면 멀리 도망가지 못하도록 제 손에 한쪽을, 범죄자의 손에 한쪽을 채우는데……."
80000030-17 = "3;키리노;06;저는 잔 실수가 잦다 보니, 가끔은 제 손만 결박된 채 범죄자를 놓칠 때가 자주 있었거든요…….\n#3;em;[땀]\n#3;stiff"
80000030-18 = "3;키리노;05;그래서 언제나 수갑을 잘못 찼을 때 부숴버릴 수 있는 괴력이 있으면 좋겠다고 늘 생각했습니다만……."
80000030-19 = "#st;[0,0];instant;1;"
80000030-20 = "#clearST"
80000030-21 = "3;키리노;05\n#3;m5\n#wait;1000"
80000030-22 = "#wait;1500"
80000030-23 = "3;키리노;00;이 초콜릿 수갑만 있다면 그런 걱정을 할 필요는 없습니다!\n#3;em;[음표]\n#3;hophop"
80000030-24 = "3;키리노;01;수갑을 잘못 차게 되더라도, 조금만 힘을 주면 산산조각을 낼 수 있으니까요.\n#3;m3"
80000030-25 = "3;키리노;99;게다가 잠복근무 중에 급하게 당분이 필요할 때 먹을 수도 있으니…… 일석이조의 물건이지요."
80000030-26 = "3;키리노;00;어떤가요, 선생님? 저의 완벽한 계획이!\n#3;em;[?]\n#3;jump"
80000030-27 = "[s] \"하지만 그건 범죄자도 마찬가지 아냐?\""
80000030-28 = "#st;[0,0];instant;1;"
80000030-29 = "#clearST"
80000030-30 = "3;키리노;04\n#3;em;…\n#wait;2500"
80000030-31 = "3;키리노;04;그, 그렇네요. 제가 힘으로 부술 수 있는 수갑이라면, 그건 범죄자도 마찬가지일 테니…….\n#3;stiff"
80000030-32 = "3;키리노;07;결국 구속의 의미가 없게 되어 버립니다…….\n#3;em;[속상함]\n#3;stiff"
80000030-33 = "3;키리노;06;우으…… 어쩌죠, 선생님…… 공무에 도움이 될 거라 생각해서 경비 처리를 해버렸는데…….\n#3;greeting"
80000030-34 = "3;키리노;06;이대로는 또 높으신 분들께 혼나 버리고 말 거예요…….\n#3;em;[땀]\n#3;stiff"
80000030-35 = "#all;hide"
80000030-36 = "#na;(결국 키리노는 엉뚱한 곳에 경비를 쓴 벌로 시말서를 쓰게 되었다…….)"
80000030-37 = "#na;(사용할 수 없게 된 수갑 모양의 초콜릿은 선물로 받았다.)"

[translation]
80000030-1 = "Fake Handcuffs"
80000030-2 = "Valkyrie Public Safety Bureau Office"
80000030-3 = "Sensei, Sensei! Have a look at these."
80000030-4 = "Can you guess what they are?"
80000030-9 = "[ns] \"Handcuffs?\""
80000030-10 = "You're half right!"
80000030-11 = "They may look like ordinary handcuffs, but they're actually made out of chocolate!"
80000030-12 = "I found these during my patrol this morning. What a fun twist on Valentine's Day Chocolate."
80000030-13 = "I had an ingenious idea the moment I laid eyes on them, so I had to buy them!"
80000030-14 = "[s] \"Ingenious idea?\""
80000030-15 = "Handcuffs are a tool for arresting criminals, right?"
80000030-16 = "Protocol is to put one on your wrist, and the other on the suspect so they can't escape."
80000030-17 = "But I'm clumsy, so sometimes I just put both of them on myself!#nAnd then the suspect gets away..."
80000030-18 = "I've always thought it would be nice if I was strong enough to just break them when that happens."
80000030-23 = "So then, with these chocolate handcuffs, all my problems are solved!"
80000030-24 = "Even if I put both cuffs on me, they'll break off with just a little force."
80000030-25 = "And I can eat them if I get hungry on a stakeout!"
80000030-26 = "Isn't it the perfect plan to combat crime, Sensei?"
80000030-27 = "[s] \"But wouldn't the suspect be able to break them too?\""
80000030-31 = "*gasp*! Y-You're right. If I can break the handcuffs, then so could the suspect."
80000030-32 = "That means there's no point in using them..."
80000030-33 = "What have I done, Sensei? I already added them to the work expenses for this month..."
80000030-34 = "I'm going to be in so much trouble."
80000030-36 = "Kirino had to write an apology letter for wasting department funds on frivolous purchases."
80000030-37 = "She also gave me the chocolate handcuffs as a gift."

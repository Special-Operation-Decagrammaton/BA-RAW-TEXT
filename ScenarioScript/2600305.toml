[translation]
2600305-1 = "ไม่ว่าที่ไหนเมื่อไรก็ต้อง 'เซรินะ'"
2600305-2 = "(ในวันที่งานเยอะสุดๆ คุณครูต้องเดินไปกลับอาคารกว่า 10 แห่งทั้งวัน)"
2600305-3 = "(แต่ยังเหลืออีก 3 แห่ง ต้องรีบไปอาคารถัดไปแล้ว)"
2600305-4 = "[s1] (ขึ้นลงโดยใช้ลิฟต์)\n[s2] (ขึ้นลงโดยใช้บันได)"
2600305-5 = "วืด... ติ๊ง!"
2600305-8 = ".....โครม!! ตู้ม!!"
2600305-9 = "ทดสอบ.. ทดสอบ.. ขออภัยผู้ที่อาศัยอยู่ทุกท่านค่ะ เกิดเหตุไฟฟ้าดับกะทันหัน..."
2600305-10 = "[s3] (เปิดประตูด้วยมือเพื่อออกไป)"
2600305-13 = ".....ตุ้บ!! ตู้ม!!"
2600305-14 = "(เริ่มก้าวเร็วลงบันได)"
2600305-19 = "โครม!! ตุ้บ! ตู้มตู้มตู้ม!! ตู้ม!"
2600305-20 = "ทดสอบ.. ทดสอบ.. ขออภัยผู้ที่อาศัยอยู่ทุกท่านค่ะ เกิดเหตุไฟฟ้าดับกะทันหัน..."
2600305-23 = "...คุณครู?"
2600305-24 = "คุณครู! บาดเจ็บเหรอคะ!?"
2600305-25 = "[s] \"...?\""
2600305-28 = "ตั้งสติไว้ค่ะคุณครู! เป็นอะไรหรือเปล่าคะ?"
2600305-29 = "ฉันเองค่ะ เซรินะ! จำฉันได้รึเปล่าคะ?"
2600305-30 = "เดี๋ยวนะคะ ฉันขอดูก่อนว่าบาดเจ็บตรงไหนมั้ย...!"
2600305-33 = "......"
2600305-34 = "ฮู่ว... โล่งอกไปทีค่ะ ...หัวเข่ากับแขนถลอก แต่ไม่ได้บาดเจ็บร้ายแรงค่ะ"
2600305-35 = "อาการเวียนหัวเป็นเพราะตกใจกับเหตุการณ์ที่เกิดกะทันหันค่ะ ไม่เป็นไรแล้วละค่ะ"
2600305-36 = "ก่อนอื่นต้องรักษาหัวเข่าและก็มือ..."
2600305-37 = "[s4] \"ขอบคุณนะ\"\n[s5] \"ไม่เจ็บสักนิดเลย สมกับเป็นเซรินะ\""
2600305-38 = "ขอบคุณค่ะ แต่ถือว่าฉันขอร้อง คุณครูเลิกทำเรื่องที่ต้องขอบคุณฉันเถอะนะคะ"
2600305-39 = "...ถ้าคุณครูบาดเจ็บ ถึงคุณครูจะพูดแบบนั้นฉันก็ไม่ดีใจเลยค่ะ"
2600305-40 = "จริงๆ เลย เพราะอย่างนั้นฉันถึงขอให้บอกหากมีปัญหายังไงล่ะค่ะ!"
2600305-41 = "คะ? มันคนละเรื่องกับเรื่องไฟดับมั้ยน่ะเหรอคะ? หมายความว่ายังไงคะ!"
2600305-42 = "ไม่ว่าจะเป็นความเหนื่อยล้า บาดเจ็บหรือไฟดับ หากทำให้คุณครูลำบากก็ถือเป็นเรื่องของฉันหมดค่ะ!"
2600305-43 = "ต่อไปถ้าอยากให้ฉันทำอะไรให้อีก เรียกฉันได้เลยนะคะ จะได้ไม่มีเรื่องแบบนี้ขึ้นอีก..."
2600305-46 = "ฮู่ว ดูนี่สิคะ ถ้าช้ากว่านี้อีกนิดคงจะเป็นแผลเป็นแล้วเชียว เกือบจะแย่แล้ว..."
2600305-47 = "โชคดีที่ฉันรีบมานะเนี่ย..."
2600305-48 = "...คะ?"
2600305-49 = "ฉันรู้ได้ยังไง... น่ะเหรอคะ?"
2600305-50 = "....."
2600305-51 = "นะ...นั่นสิคะ เรื่องนั้น...ฉันแค่... แค่ผ่านมาเฉยๆ...มั้งคะ?"
2600305-52 = "เวลานี้มันสำคัญที่ไหนล่ะคะ!? ผู้ป่วยเปลี่ยนเรื่องอีกแล้วนะ! นิสัยไม่ดี!!"
2600305-53 = "คะ? ฉันเป็นคนเปลี่ยนเรื่องงั้นเหรอคะ? มะ... ไม่ใช่เลยนะคะ ไม่มีทาง!?"
2600305-54 = "เอาเป็นว่า... ต่อไปคุณครูต้องเรียกฉันก่อนที่เกิดเรื่องขึ้นด้วยนะคะ!"
2600305-55 = "เข้าใจมั้ยคะ? สัญญานะคะ! ต้องบอกฉันนะคะ!"
2600305-56 = "รักษาเสร็จแล้ว ถ้างั้นฉันขอตัวนะคะ...!"
2600305-59 = "(เซรินะหายไปในความมืดอย่างรวดเร็วก่อนที่คุณครูจะทันได้ตอบกลับ)"
2600305-60 = "(หลังจากนั้นสักพักไฟฟ้าก็กลับมา คุณครูทำงานในวันนั้นได้เสร็จตามตาราง)"
2600305-61 = "(พอไปดูบันทึก CCTV ในอาคาร ก็กลับไม่เจอเซรินะเลย)"

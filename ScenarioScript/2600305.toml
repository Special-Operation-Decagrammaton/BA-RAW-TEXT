[translation]
2600305-1 = "Serina, Anytime, Anywhere"
2600305-2 = "(Today was busy again. I was commuting between ten or so buildings all day.)"
2600305-3 = "(I still have three more places to be, so I have to hurry and head to the next building.)"
2600305-4 = "[s1] (Go down using the elevator.)\n[s2] (Go down using the stairs.)"
2600305-5 = "*whirrr*... *ding*"
2600305-8 = "*rattle* *rattle* *thump*"
2600305-9 = "U-Uh. D-Due to the sudden power outage, we're asking for the understanding of all residents..."
2600305-10 = "[s3] (Open the door manually and leave.)"
2600305-13 = "*flop* *thump* *flop* *thump*"
2600305-14 = "(I walked down the stairs at a quick pace.)"
2600305-19 = "*rattle* *rattle* *thump* *thump* *thump*"
2600305-20 = "U-Uh. D-Due to the sudden power outage, we're asking for the understanding of all residents..."
2600305-23 = "...Sensei?"
2600305-24 = "Sensei! Are you hurt?!"
2600305-25 = "[s] \"...?\""
2600305-28 = "Get up, Sensei! Are you okay?"
2600305-29 = "It's me, Serina! Can you hear me?"
2600305-30 = "Slow down. I need to examine you for injuries!"
2600305-33 = "..."
2600305-34 = "Thank goodness. Your knee and arm suffered scratches, but you should be fine."
2600305-35 = "You'll be okay once the shock wears off."
2600305-36 = "All right. Let's get those scrapes patched up."
2600305-37 = "[s4] \"Thanks, Serina.\"\n[s5] \"It doesn't hurt at all. I can always count on you, Serina.\""
2600305-38 = "I appreciate it, but I'd rather you stop putting yourself in situations where you need my help."
2600305-39 = "It doesn't make me happy to hear you say that while you're hurt."
2600305-40 = "Seriously, this is why I told you to contact me if you need help!"
2600305-41 = "Power outage? What do you mean that there's nothing I can do about a power outage?"
2600305-42 = "I'll always be there to help you—whether you're fatigued, injured, or in a blackout, it's my job to be there!"
2600305-43 = "I'm begging you to call me when you're in trouble. I don't want this to keep happening…"
2600305-46 = "This proves my point. Had I arrived a little later, this would have left a scar. Is that what you want?"
2600305-47 = "You're lucky I came as soon as I could."
2600305-48 = "...What?"
2600305-49 = "How did I know...to look for you?"
2600305-50 = "..."
2600305-51 = "I-I don't know. It's a coincidence. I was...just passing by?"
2600305-52 = "Wh-Who cares how it happened?! You're changing topics again! Bad patient! Bad!"
2600305-53 = "What? I'm the one changing the topic? N-No I'm not! I would never!"
2600305-54 = "A-Anyway! Please call me before anything happens next time!"
2600305-55 = "Okay? Promise me. You. Phone. Me. Call!"
2600305-56 = "I-I'm done treating you, so...bye!"
2600305-59 = "(Before I could say another word, Serina quickly disappeared into the dark.)"
2600305-60 = "(The power eventually came back on and I was able to finish my day's schedule.)"
2600305-61 = "(I checked the security footage later, but couldn't find any record of Serina entering the building.)"

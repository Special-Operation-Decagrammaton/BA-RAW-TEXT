[translation]
2600305-1 = "無論何時何地何芹奈"
2600305-2 = "（事情堆積如山，整天往返了數十個地方）"
2600305-3 = "（因為還剩下3個地方要去，趕忙往下一個建築移動）"
2600305-4 = "[s1] （搭電梯下樓）\n[s2] （走樓梯下樓）"
2600305-5 = "嗡咿……啪"
2600305-8 = "……嘎噹！！嘎哐！！"
2600305-9 = "啊──，啊──。大樓廣播，現在因為突然停電……"
2600305-10 = "[s3] （用手打開門出去）"
2600305-13 = "嘎噠！嘎咕……咚唰！"
2600305-14 = "（快步走下樓梯）"
2600305-19 = "嘎！嘎噠，咚，咚唰！"
2600305-20 = "啊──，啊──。大樓廣播，現在因為突然停電……"
2600305-23 = "……師，老師！"
2600305-24 = "老師！你沒事吧！？"
2600305-25 = "[s] 「……？」"
2600305-28 = "請快醒醒，老師！聽得到我說話嗎！？"
2600305-29 = "是我，芹奈！認得我嗎！？"
2600305-30 = "請等一下，我幫您確認一下身體的狀況……"
2600305-33 = "……"
2600305-34 = "……呼。雖然膝蓋跟手腕有比較大的擦傷，但其他地方好像沒什麼問題。"
2600305-35 = "事情發生得很突然所以可能還有點頭暈，不過似乎沒有撞到頭，應該很快就會好一點的。請好好休息一下吧。"
2600305-36 = "總之先幫老師治療膝蓋跟手腕……"
2600305-37 = "[s4] 「謝謝。」\n[s5] 「真不愧是芹奈呢。」"
2600305-38 = "雖然這麼說我很感謝，但拜託老師請別再陷入這種不得不感謝我的情況了……"
2600305-39 = "……老師變成這樣，我想開心也開心不起來的。"
2600305-40 = "真是的，不是都再三跟老師說過有狀況就連絡我的嗎……"
2600305-41 = "你說遇到停電也沒辦法……？才不會呢！"
2600305-42 = "會讓老師痛苦的事，不管是疲勞、受傷還是停電，全都是我應該處理的！"
2600305-43 = "今後就算只是好像要發生什麼事的程度也沒關係，請通知我吧。這樣的話或許就能讓老師不會受傷了……"
2600305-46 = "真是好險……看這個傷口，要是再晚一點處理的話就會留下疤痕了。"
2600305-47 = "能用衝的趕上真是太好了……"
2600305-48 = "……咦？"
2600305-49 = "你說為什麼知道老師你在這裡……？"
2600305-50 = "……"
2600305-51 = "那個……該說是有這種感覺還是湊巧呢……？正好路過之類的……？"
2600305-52 = "現，現在不是在意這個的時候！又想要轉移話題了！不可以唷！"
2600305-53 = "想轉移話題的是我……？才，才才才才沒有唷？完全沒有！"
2600305-54 = "總，總之！！之後感覺要出事的時候請立刻叫我哦！"
2600305-55 = "知道了嗎？約好了唷！絕對要照做哦！"
2600305-56 = "那，那治療也差不多了我就先走……！"
2600305-59 = "（芹奈就這麼快速地消失在黑暗之中）"
2600305-60 = "（過了一會電力順利恢復，我也把工作做完了）"
2600305-61 = "（之後，我請人讓我看了入口的監視器，上面卻沒看到芹奈的身影）"

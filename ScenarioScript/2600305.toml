2600305-59 = "#na;(뭐라고 더 대꾸하기도 전에 세리나는 다시 재빨리 어둠 속으로 사라져버렸다.)"
2600305-60 = "#na;(잠시 후 전기는 돌아왔고, 그날 일정도 모두 무사히 마무리 지을 수 있었다.)"
2600305-61 = "#na;(하지만 이후 찾아본 그 건물의 CCTV 기록에서는, 어디서도 세리나를 찾아볼 수 없었다.)"

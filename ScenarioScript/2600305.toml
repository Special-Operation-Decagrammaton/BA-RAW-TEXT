2600305-28 = "#na;???;정신 차리세요, 선생님! 괜찮으세요?"
2600305-29 = "3;세리나;04;저예요, 세리나! 알아보시겠어요?\n#3;hophop\n#3;a\n#3;em;[반응]"
2600305-30 = "3;세리나;05;잠시만요. 우선 다치신 곳이 있는지부터……!"

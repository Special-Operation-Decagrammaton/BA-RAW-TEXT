2600305-33 = "3;세리나;05;……\n#3;em;…"
2600305-34 = "3;세리나;04;……후우. 다행이네요. ……무릎이랑 팔이 까지시긴 했지만, 크게 다치진 않으셨네요.\n#3;em;[속상함]\n#3;greeting"
2600305-35 = "3;세리나;04;어지러우신 건 그냥 갑작스러운 상황에 놀라셔서 그래요. 괜찮으실 거예요.\n#3;m3"
2600305-36 = "3;세리나;05;일단은 까진 무릎과 손부터 치료를 하시고……\n#3;greeting"
2600305-37 = "[s4] \"고마워.\"\n[s5] \"하나도 안 따갑네. 역시 세리나야.\""
2600305-38 = "3;세리나;05;말씀은 고맙지만, 부탁이니 제게 감사 받을 일을 그만 만들어 주세요.\n#3;em;…"
2600305-39 = "3;세리나;05;……다치신 상황에서 그렇게 말 해 주셔도 하나도 안 기뻐요.\n#3;em;…"
2600305-40 = "3;세리나;06;정말, 그러기에 제가 문제가 생기실 때 문자라도 달라고 그렇게 말씀을 드렸는데!\n#3;em;[!]\n#3;jump"
2600305-41 = "3;세리나;02;네? 정전이랑 그건 다른 일 아니냐고요? 그게 무슨 말씀이세요!"
2600305-42 = "3;세리나;06;선생님께서 곤란하신 일이면 그게 피로든 부상이든 정전이든, 다 제 일인 거죠!\n#3;hophop\n#3;em;[반응]"
2600305-43 = "3;세리나;05;앞으로는 좀 더 필요하실 때마다 미리 절 불러주시라고요. 그럼 이런 일도 없을 테니……"
2600305-44 = "3;세리나;05\n#3;greeting\n#wait;450"
2600305-45 = "3;세리나;05\n#3;closeup\n#wait;1000"
2600305-46 = "3;세리나;04;아우, 이것 봐. 조금만 더 늦게 왔으면 상처에 흉 질 뻔 했네, 큰일날 뻔 했어……\n#3;closeup\n#3;stiff"
2600305-47 = "3;세리나;05;부리나케 달려왔으니 망정이지……\n#3;em;…\n#3;closeup"
2600305-48 = "3;세리나;02;……네?\n#3;em;[?]\n#3;closeup"
2600305-49 = "3;세리나;02;그걸 어떻게 알고 찾아왔냐……고요?\n#3;closeup"
2600305-50 = "3;세리나;04;……\n#3;em;…\n#3;closeup"
2600305-51 = "3;세리나;04;그, 그그, 글쎄요? 그, 그건…… 그냥 어쩌다가……? 우연히 지나가다가……?\n#3;shake\n#3;em;[?!]"
2600305-52 = "3;세리나;06;지, 지금 그런 게 뭐가 중요해요!? 또 말 돌리는 환자! 나쁜 버릇!!\n#3;hophop"
2600305-53 = "3;세리나;04;네? 오히려 제가 말을 돌리는 거 아니냐고요? 아, 아아, 아니거든요? 절대 아니거든요!?\n#3;shake\n#3;em;[?!]"
2600305-54 = "3;세리나;05;아, 아무튼!! 아무튼 앞으론 무슨 일 생기기 전에 꼭 먼저 불러주세요!\n#3;stiff"
2600305-55 = "3;세리나;06;아시겠죠? 약속이에요! 꼭 연락하기예요!\n#3;hophop"
2600305-56 = "3;세리나;05;치, 치료도 다 끝났으니 저는 그럼 이만……!\n#3;greeting\n#3;em;[반응]"
2600305-57 = "3;세리나;05\n#3;dr\n#wait;1000"

[translation]
10028035-5 = "咻──！"
10028035-6 = "哎呀～！真讓人吃驚～！！"
10028035-7 = "老師的力量我之前就領教過，所以多少略知一二……"
10028035-12 = "不過這位小姑娘卻是出乎意料的厲害呀！？#n看來我得好好道歉才行！！"
10028035-13 = "一直稱呼你是「可愛的」小姑娘，實在太委屈你了！#n分明是個狠角色嘛！"
10028035-14 = "那個……"
10028035-15 = "你雖然這麼說，卻還是沒改掉那個稱呼呢……"
10028035-16 = "哎呀！我們就別在意那種小細節了，好嗎？"
10028035-20 = "既然兩位都這麼努力，我也應該有所表現對吧？"
10028035-23 = "現在你們兩位──不，是「我們」所乘坐的這節車廂，原本是「倒數第二節車廂」。"
10028035-24 = "然後那個叫什麼來著……是行李車廂嗎？#n它應該在列車的第一節，也就是駕駛艙和列車頭的下一節車廂。"
10028035-25 = "我收集了一些情報並考慮了各種情況。#n在這方面，我的腦筋算是動得挺快的。"
10028035-26 = "無論是要停下列車還是找回東西……"
10028035-27 = "我們都只能一起前往第一節車廂了～！"
10028035-28 = "在原定計畫中，如果我沒能成功切斷護送車廂，便會改為執行B計畫……"
10028035-29 = "也就是在約定地點，用炸彈讓列車翻覆，然後趁亂和成員們碰頭逃跑……"
10028035-30 = "[s]「原來如此，讓列車翻覆啊……」"
10028035-34 = "[ns1]「……你剛才說什麼？」\n[ns2]「『停下』指的就是這個嗎！？」"
10028035-37 = "哈～哈哈哈哈！！別用那種表情看我嘛～"
10028035-38 = "不用擔心，只要有我在就不會發生那種事！只要有我在！"
10028035-39 = "我們現在不是互助合作的關係嗎？#n就算是我也不會用那種方式背叛的。"
10028035-40 = "你們不是說要找到東西並帶回去嗎？而且還不能弄壞是不是？"
10028035-41 = "那當然不能讓列車翻覆囉。#n況且還有老師在場，要是真的出事就不得了了。"
10028035-42 = "雖然稍～微麻煩了一點，現在也只好「直接」讓列車停下來了～"
10028035-43 = "像我這種時常被追趕的人……"
10028035-44 = "……格外重視「約定」和「信用」。"
10028035-45 = "這樣事情才進行得下去……不是嗎？"
10028035-46 = "不過，該說是幸運嗎……"
10028035-53 = "這個小姑娘……以三一來說，還挺厲害的嘛？"
10028035-58 = "[ns3]「首，首先！得先找到公文包！」\n[ns4]「那，那個，他沒有別的意思！不是你想的那樣！！」"
10028035-61 = "啊哈，啊哈哈哈……"
10028035-62 = "……嗯？我又說錯什麼了嗎？你的臉色看起來不是很好耶？"
10028035-63 = "還是說其實沒有？誰叫你一直閉著眼睛說話，我看不出來嘛。#n哎呀，抱歉抱歉！哈～哈哈哈哈！"
10028035-64 = "雖然不知道我做錯了什麼，但我道歉！這樣行吧？可以吧？"
10028035-65 = "…………"
10028035-66 = "……………………"
10028035-67 = "呀～不錯不錯！看來你很能忍呢！！"
10028035-68 = "真厲害！就拜託你繼續保持囉～？"
10028035-69 = "……哈哈。"
10028035-70 = "嗯，首先……得先找到公文包……"
10028035-71 = "哈哈……"
10028035-72 = "[s5]「…………」\n[s6]「我之後一定會買好吃的補償你……」"
10028035-75 = "來～沒時間了！！大家一起出發吧！！"
10028035-76 = "反正除了我們之外，還有滿滿一車因為路線變更而生氣的乘客！#n只要大家齊心協力，沒有什麼事情是做不到的！"
10028035-77 = "好──！出發吧！！#n任何事都要貫徹始終才有意義！！"
10028035-78 = "從最後一節車廂──"
10028035-79 = "往第一節車廂移動～！！"

[translation]
10028035-5 = "Wahaha! This is the life!  "
10028035-6 = "What's this, what's this? Little Miss Cutie Pie has some bite to her bark!"
10028035-7 = "I know how Sensei operates, so I had no doubts there..."
10028035-12 = "But you, I might actually owe an apology! Who knew a Trinity kid could move like that?"
10028035-13 = "Oooh, it must've really been grating on you when I called you adorable, Miss Cutie Pie. I'm glad you didn't try to beat me up!"
10028035-14 = "...You..."
10028035-15 = "If you were actually sorry, you'd stop with the nickname, no?"
10028035-16 = "Move along, move along! Remember what we said earlier! Let bygones be bygones, or something!"
10028035-20 = "As a reward for being such great allies, I'll grant you a little reward! Knowledge!"
10028035-23 = "Right now, we're in what used to be the second to last car of this train. Now, obviously, it's the last!"
10028035-24 = "The luggage car you're looking for is aaall the way in the front of the train, right next to the driver's compartment."
10028035-25 = "I've got a sharp eye and a sharper mind, so I've figured out the general layout of this runaway train."
10028035-26 = "Whether our goal is to stop the train or find precious, lost belongings, there's only one way to go..."
10028035-27 = "Forward! The front of the train is where all the answers lie!"
10028035-28 = "According to the original plan, if I failed to detach the transport car and escape, I would've immediately switched to plan B..."
10028035-29 = "Which involved derailing the train with a bomb, exploiting the distraction, and reaching out to other club members to facilitate my escape, but..."
10028035-30 = "[s] \"Derailing the train... Makes sense...\""
10028035-34 = "[ns1] \"...Wait! Say that again?!\"\n[ns2] \"'No! No that doesn't make sense! Explain!\""
10028035-37 = "Wahahaha! You'll hurt my feelings if you keep looking at me like that, Sensei!"
10028035-38 = "Don't worry. As long as I'm still here, I won't let them do it! As long as I'm here!"
10028035-39 = "We formed a company together! Even I don't betray my coworkers!"
10028035-40 = "Look, you've got some important stuff in that bag, right?"
10028035-41 = "And Sensei's on this train too. It's not exactly in my best interests to derail the train, is it?"
10028035-42 = "I'm sure you guys get it. We're gonna have to take the long way around and slow this train down."
10028035-43 = "Living the kinda lifestyle we do out here..."
10028035-44 = "Well, you take note of who keeps their word and who doesn't."
10028035-45 = "You gotta know who you can trust. So I always keep my word."
10028035-46 = "Point is, things worked out, didn't they?"
10028035-53 = "I gotta admit though... I was pretty impressed by the little cutie pie. Could hardly believe she's from Trinity!"
10028035-58 = "[ns3] \"Th-The bag! Focus on the bag, Ichika!\"\n[ns4] \"She has trouble communicating! That's all!\""
10028035-61 = "I... Ahahaha... Sure. Okay."
10028035-62 = "Hm? Did you get your feelings hurt again? You've got a little wrinkle over your eyebrow. Right there!"
10028035-63 = "I can't tell what you're thinking at all with your eyes closed! You upset? Sorry if you are! Wahahaha!"
10028035-64 = "I'm not sure what I did wrong, but I apologize and all that! We're good now, yes?"
10028035-65 = "..."
10028035-66 = "..."
10028035-67 = "Whew! Great job! You're keeping up, more or less!"
10028035-68 = "You can do it! Let's keep working together, just like this!"
10028035-69 = "...Ha. Ha."
10028035-70 = "Right. We have to...find the bag first..."
10028035-71 = "Haha..."
10028035-72 = "[s5] \"...\"\n[s6] \"I'll treat you to whatever you want after this.\""
10028035-75 = "No more dilly-dallying! We're on a tight schedule, you two!"
10028035-76 = "How much you wanna bet there's a whole ton of passengers upset the train is going non-stop now! Let's rally the people together and get a party going!"
10028035-77 = "Good, good! Remember, if you don't make it to the front, all of this is for nothing!"
10028035-78 = "Now then. From the very last car..."
10028035-79 = "...All the way to the front!"

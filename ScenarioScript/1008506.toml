[translation]
1008506-1 = "無咖啡因"
1008506-2 = "千年學園附近的露營地"
1008506-5 = "啊，老師。歡迎你來。"
1008506-6 = "我提早把露營椅和桌子都組裝好了。"
1008506-7 = "[s1]「你不是說要實踐減少咖啡因攝取的方法嗎……」\n[s2]「為什麼突然跑來露營？」"
1008506-10 = "嗯，雖然露營不是主要的目的……"
1008506-11 = "我之前不是為了體驗數位遊牧民的生活，帶著筆電到野外工作過嗎？"
1008506-12 = "雖然那次就結果而言是失敗的……"
1008506-13 = "不過我後來仔細回想了一下，結果發現那天喝的能量飲料比平常少。"
1008506-14 = "雖然當天帶去的能量飲料本來就比較少……"
1008506-15 = "但假如直接創造無法攝取咖啡因的環境，說不定就能強迫自己減少攝取咖啡因了。"
1008506-16 = "[s3]「你是指強行戒斷成癮療法嗎……」\n[s4]「希望這個方法能成功。」"
1008506-19 = "嗯，所以我今天打算在找不到便利商店和冰箱的環境裡，進行離線工作打發時間。"
1008506-20 = "但我擔心途中可能會撐不下去，直接跑回學校……"
1008506-26 = "所以希望老師能在旁邊盯著我。"
1008506-27 = "[s5]「這種事就交給我吧！」\n[s6]「我們一起努力忍耐吧！」"
1008506-30 = "嗯，那我們馬上開始吧。"
1008506-36 = "（約一小時後……）"
1008506-41 = "唔……"
1008506-42 = "無法集中精神……"
1008506-43 = "這些工作我明明經常處理，可是現在腦子裡卻一團混亂，完全無法集中注意力……"
1008506-44 = "……看來戒斷症狀慢慢開始出現了。"
1008506-45 = "[s]「這麼快嗎？」"
1008506-46 = "唔……感覺越刻意強迫自己不要想能量飲料的事，就越會想起它。"
1008506-47 = "不過只要我努力把注意力集中在工作上，遲早就會忘了能量飲料的事吧……"
1008506-48 = "我想要試著再忍耐一下……"
1008506-50 = "（然而隨著時間流逝，晴的戒斷症狀越來越嚴重……）"
1008506-54 = "（……最後晴開始用雙手摀著臉，什麼事情也做不了）"
1008506-56 = "呃……唔……"
1008506-57 = "咖啡因……咖啡因不夠了……"
1008506-58 = "我的戒斷症狀越來越嚴重……現在腦海裡完全被咖啡因佔據了……"
1008506-59 = "怎麼辦，老師……？"
1008506-60 = "這樣下去我說不定會失去控制，跑去襲擊其他帳篷搶他們的咖啡來喝……"
1008506-61 = "[s]「那可不行……」"
1008506-63 = "[ns]「你等我一下。」"
1008506-71 = "[ns] 將裝著咖啡的保溫瓶遞給晴"
1008506-75 = "謝謝你，老師……"
1008506-80 = "呼……果然還是要有這個才行。"
1008506-81 = "能感受到咖啡因緩緩流入我疲憊的身體裡……彷彿身體要融化了……"
1008506-82 = "……話說回來，我竟然讓老師看到這麼沒用的一面。"
1008506-83 = "明明才信誓旦旦地說這次一定要戒掉咖啡因，沒想到卻連幾個小時都無法忍耐……"
1008506-84 = "看來要戒掉咖啡因應該是不可能的事吧。"
1008506-85 = "[s]「不，你表現得很好哦。」"
1008506-87 = "[ns]「其實我剛剛拿給你的是『無咖啡因』的咖啡。」"
1008506-91 = "嗯……？#n你說這個咖啡裡沒有任何咖啡因？"
1008506-92 = "可是為什麼我一喝下去就覺得渾身舒暢，連心情也振奮起來了呢……"
1008506-96 = "……難道最重要的還是決心嗎？"
1008506-97 = "還是因為咖啡是老師拿給我的，所以下意識地就催眠了自己……"
1008506-98 = "[s]「身體有什麼異狀嗎？」"
1008506-102 = "沒，沒什麼！"
1008506-103 = "老師給我的無咖啡因咖啡比想像中還有效……"
1008506-104 = "要是我下次又無法集中精神，不知道該如何是好的話……"
1008506-110 = "老師一定要再拿咖啡給我喝哦……知道了嗎？"

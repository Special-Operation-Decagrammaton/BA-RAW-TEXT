[translation]
1008506-1 = "ดีแคฟ"
1008506-2 = "ที่ตั้งแคมป์ใกล้ๆ โรงเรียนมิลเลเนียม"
1008506-5 = "อ๊ะ คุณครู เข้ามาสิ"
1008506-6 = "ฉันมาถึงก่อนเพราะจะเตรียมประกอบเก้าอี้และโต๊ะสำหรับแคมป์ปิ้งน่ะ"
1008506-7 = "[s1] \"ได้ยินว่าจะทดสอบวิธีลดคาเฟอีนไม่ใช่เหรอ...\"\n[s2] \"แล้วทำไมอยู่ๆ ถึงมาตั้งแคมป์เฉยเลย?\""
1008506-10 = "อื้ม แคมป์ปิ้งไม่ใช่วัตถุประสงค์หลักของฉันหรอก..."
1008506-11 = "แต่วันก่อนที่ฉันหอบโน้ตบุ๊คมาทำงานกลางแจ้งเพราะจะลองเป็นดิจิทัลโนแมดน่ะ"
1008506-12 = "ถึงมันจะจบลงด้วยความล้มเหลวก็เถอะ..."
1008506-13 = "แต่พอนึกย้อนกลับไปคิดถึงตอนนั้น ก็ได้รู้ว่าตอนนั้นฉันเหมือนจะดื่มเครื่องดื่มชูกำลังน้อยกว่าปกติ"
1008506-14 = "และเครื่องดื่มชูกำลังที่เอาไปก็เป็นแค่กระป๋องเล็กๆ ด้วย..."
1008506-15 = "เพราะงั้นฉันก็เลยคิดว่าถ้าเราสร้างสถานการณ์ที่ไม่สามารถกินคาเฟอีนได้ ต่อให้ต้องฝืนใจสักหน่อย ฉันก็น่าจะทนได้น่ะ"
1008506-16 = "[s3] \"ใช้วิธีหักดิบนี่เอง...\"\n[s4] \"ขอให้ได้ผลนะ\""
1008506-19 = "อื้ม วันนี้ฉันก็เลยจะมาทำงานแบบออฟไลน์ชิลๆ ในสภาพแวดล้อมที่ไม่มีทั้งร้านสะดวกซื้อและตู้เย็น"
1008506-20 = "แต่ระหว่างนี้ฉันอาจจะหมดความตั้งใจและอยากกลับห้องชมรมก็ได้..."
1008506-26 = "ฉันก็เลยอยากให้คุณครูช่วยดึงสติฉันน่ะ"
1008506-27 = "[s5] \"เรื่องนั้นไม่มีปัญหา\"\n[s6] \"มาอดทนไปด้วยกันเถอะ!\""
1008506-30 = "อื้ม งั้นก็เริ่มทำงานเลยดีมั้ย?"
1008506-36 = "(1 ชั่วโมงต่อมา...)"
1008506-41 = "อืม..."
1008506-42 = "จดจ่อกับงานไม่ได้เลย..."
1008506-43 = "นี่เป็นงานง่ายๆ ที่ปกติก็ทำอยู่บ่อยๆ แท้ๆ แต่วันนี้ฉันฟุ้งซ่านจนสมองเอาแต่คิดถึงเรื่องอื่น..."
1008506-44 = "...น่าจะเป็นอาการขาดคาเฟอีนนะ"
1008506-45 = "[s] \"เริ่มแล้วเหรอ?\""
1008506-46 = "อืม... พอสั่งจิตใต้สำนึกว่าต้องไม่นึกถึงเครื่องดื่มชูกำลัง ก็เหมือนจะยิ่งนึกถึงมากขึ้นไปอีก#nยังไงยังงั้นเลย"
1008506-47 = "แต่ถ้าโฟกัสกับงานไปเรื่อยๆ ก็คงไม่นึกถึงละมั้ง..."
1008506-48 = "งั้นฉันจะลองทนดูอีกหน่อย..."
1008506-50 = "(แต่ยิ่งเวลาผ่านไป อาการขาดคาเฟอีนของฮาเระก็ยิ่งหนักขึ้นทุกที...)"
1008506-54 = "(...สุดท้ายฮาเระก็เอามือกุมขมับเพราะทำงานไม่ได้เลย)"
1008506-56 = "อะ... อือ..."
1008506-57 = "คาเฟอีน... ฉันต้องการคาเฟอีน..."
1008506-58 = "ตอนนี้ฉันอาการหนักจนคิดถึงแต่คาเฟอีนอย่างเดียวเลย..."
1008506-59 = "ทำไงดีล่ะคุณครู...?"
1008506-60 = "ถ้าเป็นแบบนี้ต่อไป ฉันอาจไปบุกเต็นท์ของคนอื่นแล้วขโมยกาแฟมากินแบบไม่รู้ตัวก็ได้..."
1008506-61 = "[s] \"แบบนั้นไม่ได้นะ...\""
1008506-63 = "[ns] \"รอครูแป๊บหนึ่งนะ\""
1008506-71 = "[ns] ยื่นกาแฟจากขวดเก็บความร้อนให้"
1008506-75 = "ขอบคุณนะคุณครู..."
1008506-80 = "เฮ้อ... นี่แหละที่ฉันอยากได้"
1008506-81 = "พอร่างกายที่เหนื่อยได้คาเฟอีน... ก็เหมือนว่าจะละลายไปทั้งแบบนี้เลย..."
1008506-82 = "...จะว่าไป ฉันให้คุณครูได้เห็นสภาพที่น่าสมเพชของฉันจนได้"
1008506-83 = "คุยโวว่าครั้งนี้จะลดคาเฟอีนให้ได้แท้ๆ แต่ก็ทนได้แค่ไม่กี่ชั่วโมงเอง..."
1008506-84 = "สงสัยฉันกับคาเฟอีนจะแยกจากกันไม่ได้แล้วละ"
1008506-85 = "[s] \"ไม่หรอก ฮาเระยังอดทนได้ดีอยู่นะ\""
1008506-87 = "[ns] \"กาแฟที่ครูเพิ่งให้ไปเป็นกาแฟแบบดีแคฟน่ะ\""
1008506-91 = "หืม...? จะบอกว่ากาแฟนี้ไม่มีคาเฟอีนงั้นเหรอ?"
1008506-92 = "แต่พอฉันดื่มก็รู้สึกว่าร่างกายได้ผ่อนคลาย และอารมณ์ก็ดีขึ้นทันทีเลยนะ..."
1008506-96 = "นี่สินะที่บอกว่าความคิดเป็นสิ่งสำคัญ..."
1008506-97 = "พอคิดว่าเป็นกาแฟที่คุณครูให้ ฉันก็เหมือนถูกสะกดจิตโดยไม่รู้ตัวเลย"
1008506-98 = "[s] \"ร่างกายรู้สึกผิดปกติเหรอ?\""
1008506-102 = "ไม่ๆ ไม่ใช่อย่างนั้นหรอก"
1008506-103 = "กาแฟดีแคฟที่คุณครูให้มามันดีกว่าที่คิดน่ะ..."
1008506-104 = "ต่อไปถ้าเห็นว่าฉันสมาธิเตลิดหรือเหมือนจะล่องลอยไปมาละก็..."
1008506-110 = "ตอนนั้นคุณครูต้อง... ให้ฉันกินกาแฟของคุณครูอีกนะ..."

[translation]
1008506-1 = "De-Caffeine"
1008506-2 = "Camping site near Millennium School"
1008506-5 = "Ah, Sensei. Welcome."
1008506-6 = "I got here early to set up our camping table and chairs."
1008506-7 = "[s1] \"What's this about you trying to go caffeine free?\"\n[s2] \"I thought you weren't a fan of camping?\""
1008506-10 = "Camping is just a small part of it. You see..."
1008506-11 = "Do you remember when I was trying to be a digital nomad? Working on my laptop outdoors and all that?"
1008506-12 = "Although that idea was a total failure..."
1008506-13 = "I think it was only because I was having energy drink withdrawals at the time."
1008506-14 = "I didn't bring that many energy drinks outside. Once I started running out, things just got worse and worse."
1008506-15 = "This time, I just won't bring any energy drinks at all. Can't get withdrawal if you don't have caffeine in your system to begin with."
1008506-16 = "[s3] \"Doesn't quitting cold-turkey seem a bit risky?\"\n[s4] \"I hope you know what you're doing, Hare.\""
1008506-19 = "Of course. I'll just be doing some offline work in the great outdoors. No convenience stores or refrigerators, so I won't get tempted."
1008506-20 = "...And if I do get tempted. Not that I would, but if I did..."
1008506-26 = "I want you to look out for me, Sensei. You can be my sponsor!"
1008506-27 = "[s5] \"No problem.\"\n[s6] \"I'll support you every step of the way!\""
1008506-30 = "Great, shall we get started?"
1008506-36 = "Less than an hour later..."
1008506-41 = "Um..."
1008506-42 = "I can't focus..."
1008506-43 = "I've done this kind of work a million times before but looking at it today makes my brain all jumbled. I can't stop zoning out."
1008506-44 = "...I think I'm going through withdrawal."
1008506-45 = "[s] \"After only an hour?\""
1008506-46 = "Unn... I need to not think about energy drinks...but that just makes me think about energy drinks!"
1008506-47 = "I can do this. Forget about cool, tasty energy drinks. Focus on your work!"
1008506-48 = "I've got to hold on. I can do this!"
1008506-50 = "Hare could not, in fact, do it. Her withdrawal only got worse with time..."
1008506-54 = "...Until she ended up curled into a ball, face buried in her hands, unable to do anything."
1008506-56 = "Ugh... Aughhh..."
1008506-57 = "Caffeine... Need caffeine..."
1008506-58 = "My head is completely empty. There is only caffeine..."
1008506-59 = "What do I do, Sensei?"
1008506-60 = "At this rate, I'm thinking about ambushing another campsite and stealing all their coffee..."
1008506-61 = "[s] \"How about we don't do that...\""
1008506-63 = "[ns] \"Hold on just a second.\""
1008506-71 = "[ns] Hand her some coffee I brought in my thermos."
1008506-75 = "Thank you, Sensei..."
1008506-80 = "Aah...that hits the spot."
1008506-81 = "Sweet, sweet caffeine. I feel like I could just melt away."
1008506-82 = "...I can't imagine how pathetic I must look, Sensei."
1008506-83 = "All that talk, and I couldn't even last a few hours without caffeine."
1008506-84 = "It's hopeless. I'll never kick my energy drink addiction."
1008506-85 = "[s] \"No, you did great, Hare.\""
1008506-87 = "[ns] \"The coffee I gave you was decaf.\""
1008506-91 = "Huh? That coffee didn't have caffeine?"
1008506-92 = "But I felt relieved after I drank it. It completely lifted my spirits."
1008506-96 = "...I heard your state of mind matters with this sort of thing."
1008506-97 = "Or maybe it was because it was coffee from Sensei."
1008506-98 = "[s] \"How are you feeling now?\""
1008506-102 = "A little better."
1008506-103 = "Your decaf coffee just helped out more than I expected, Sensei."
1008506-104 = "The next time you see me wandering around glassy-eyed and caffeine starved..."
1008506-110 = "Could you brew me a cup?"

[translation]
32030-1 = "第3話;深夜密會"
32030-2 = "……原來如此。#n是和老師一起討論未來的事啊……"
32030-3 = "花子醬也有想跟老師商量的事……"
32030-4 = "那，那為什麼要穿著泳裝來！？是把泳裝當睡衣了嗎……！？"
32030-5 = "哎呀？我也穿著泳裝參加過禮拜堂的課程唷？#n我認為大家都太拘泥於既有的觀念了。"
32030-6 = "啊嗚……"
32030-7 = "[s] 「花子，你剛才說有關於梓的事想說是嗎？」"
32030-8 = "啊，是的。"
32030-9 = "……"
32030-10 = "……這樣也好。#n請日步美醬也一起聽吧。"
32030-11 = "其實梓醬……每天晚上都不知道跑去哪裡，總是天亮才會回來。"
32030-12 = "梓醬……"
32030-13 = "一開始我以為只是因為睡得不習慣而失眠了，不過似乎不是這樣呢。"
32030-14 = "不僅如此……我幾乎沒看過梓醬有好好睡過。"
32030-15 = "這麼說來……梓醬好像總是比我還早起，卻從來沒有比我還早睡過……"
32030-16 = "……我不知道梓醬究竟在做些什麼。但就算是強迫也差不多該讓他好好睡覺了。"
32030-17 = "總覺得梓醬他……好像非常不安的樣子。"
32030-18 = "……"
32030-19 = "雖然不知道有什麼原因，但我想要多少減輕一點他的不安……"
32030-20 = "再這樣下去的話，他總有一天會倒下的。"
32030-21 = "……老師和日步美也是唷？不好好睡覺可不行。"
32030-22 = "考試確實很重要沒錯，但最差也就是留級而已。#n和身體的健康比起來不算什麼吧？"
32030-23 = "[s] 「這……」"
32030-27 = "……"
32030-28 = "……如果是平常的話，或許是這樣沒錯。#n可是……"
32030-29 = "日步美醬……？"
32030-30 = "可是，這不只是「留級」而已……！考試只剩下2次，如果2次都不及格的話……"
32030-31 = "可是要退學的啊！我們就不得不離開三一了……！！"
32030-35 = "……退學？日步美醬，那是什麼意思……？"
32030-36 = "那，那種事情，校規是不會允許的吧。#n退學可是需要很多手續的，不會這麼簡單就……"
32030-37 = "[s] 「這是事實，花子。」"
32030-38 = "……老師？"
32030-39 = "……"
32030-44 = "[ns] 說出自己所知的補課部的實情"
32030-47 = "……"
32030-48 = "……"
32030-49 = "……原來如此，是這樣啊。#n如果3次考試都不及格的話，所有人都得退學……"
32030-50 = "雖然這種連坐制度本身不該成立……#n不過考量到夏萊超越法規的權限……我明白了。"
32030-51 = "現在應該不是說「我明白了」的時候，花子醬……"
32030-52 = "其實花子醬成績很好的對吧？#n就連三年級的困難考試，你也全都拿過滿分……而且還是在一年級的時候！"
32030-53 = "……"
32030-54 = "我是在為了模擬測驗，尋找以前考卷的時候發現的……抱歉偷看了你的成績……"
32030-55 = "為什麼要故意搞砸考試呢……？#n要是花子醬繼續這麼做的話，我們所有人都會……"
32030-56 = "……我之前完全不知道這件事。#n自己的補課結果竟然會連帶導致「所有人退學」……"
32030-57 = "……"
32030-58 = "不，就算我不知道，這也是不能原諒的對吧……"
32030-59 = "對老師、日步美醬……梓醬和小春醬都做了對不起你們的事。"
32030-60 = "對不起，老師。"
32030-61 = "日步美醬也是，對不起。"
32030-62 = "啊，啊嗚……沒，沒事的，花子醬……"
32030-67 = "……日步美醬說的沒錯，我是刻意考那種分數的。"
32030-68 = "果，果然……！！#n為什麼要做這種事呢……花子醬？有什麼原因嗎？"
32030-69 = "……這點我不能說。"
32030-70 = "……！？"
32030-71 = "因為一些非常私人的理由……#n不過我並不想因此讓大家受害。"
32030-72 = "所以玩笑就到此為止。"
32030-73 = "至少在補課部的大家都沒事之前，我會全力面對考試。"
32030-74 = "[s] 「……謝謝你，花子。」"
32030-75 = "不，不用這樣……！？這不是什麼值得老師感謝的事情……"
32030-76 = "反而是我應該道歉才對……裸體跪下道歉可以嗎？"
32030-77 = "啊，啊嗚……這樣道歉已經夠了！#n只要花子醬說之後會認真……我就放心了。"
32030-78 = "話說回來……知道這件事的只有日步美醬跟老師嗎？"
32030-79 = "咦？是的……除了我們之外，其他人都不知道……"
32030-80 = "原來如此……這麼看來，梓醬會不安的原因應該不是考試呢。#n似乎還有其他我不知道的事……"
32030-81 = "更重要的是……我很在意這個補課部存在的原因。"
32030-82 = "……"
32030-83 = "彌香同學……應該是做不到的吧。能做出這種事的也就只有渚同學了吧。"
32030-84 = "[s] 「……！」"
32030-85 = "但是，為什麼會在即將簽訂伊甸園條約的現在做出這種事……"
32030-86 = "不，難道說就是因為這樣才……？"
32030-87 = "……"
32030-88 = "…………"
32030-89 = "……我懂了。這個補課部就是要把有可能妨礙伊甸園條約的人聚集起來吧。"
32030-90 = "[s] 「……！？」"
32030-91 = "咦，咦！？"
32030-92 = "該說很像是渚同學的作風嗎？還是跟以前一樣像隻狡猾的貓呢。"
32030-93 = "貓，貓……？"
32030-94 = "既然要做乾脆一起處理更有效率……大概是這種邏輯吧。#n總覺得我們簡直被當成要洗的衣服來對待呢。"
32030-95 = "[s] 「實際上好像比『要洗的衣服』還過分就是了……」"
32030-96 = "……老師也是被渚同學擺了一道對吧。"
32030-97 = "利用老師的善意，讓老師接下幫助成績不佳的學生的職責，#n實際上則是要利用夏萊超越法規的權限……"
32030-98 = "但是反過來說，老師只是單純地為了我們而努力的呢……"
32030-99 = "……謝謝您，老師。老師果然是個好人呢，唔呵呵♡"
32030-100 = "花子醬好厲害……簡直像偵探一樣。"
32030-101 = "渚大人曾告訴我，希望我找出「三一的叛徒」……"
32030-102 = "……呵呵，原來是這樣啊。#n「三一的叛徒」……真像渚同學會用的表達方式呢。#n試圖阻礙身為茶會主席的他的計畫的人全都符合，是這個邏輯吧。"
32030-103 = "……梓醬在提交文件的時候就很可疑，會被懷疑也不奇怪呢。"
32030-104 = "至於小春醬……把他視為實現正義部的人質雖然有點牽強，但也還能接受……"
32030-105 = "……話說日步美醬為什麼會被懷疑呢？#n你和渚同學的關係不是還不錯嗎？"
32030-106 = "咦！？我，我果然也是嫌疑人嗎……？"
32030-107 = "啊，啊嗚嗚……是，是這樣沒錯……#n為什麼我也會被懷疑呢……？"
32030-108 = "[s] 「…………」"
32030-111 = "……關於梓醬的事，或許之後還需要多加討論呢。#n我也會多進行一些調查的。"
32030-112 = "是啊……如果花子醬有查出什麼的話，再麻煩你告訴我跟老師。"
32030-113 = "也就是說，我可以繼續參加這個深夜的密會了對吧？呵呵，真開心♡"
32030-114 = "在深夜的密室裡，三個人一起進行祕密的遊戲……真是讓人心動不已♡"
32030-115 = "啊嗚……這種說法有點……"
32030-116 = "[s] 「那麼時間也不早了，差不多該睡了吧。」"
32030-117 = "好的，那麼老師明天見。"
32030-118 = "兩位晚安。"
32030-121 = "嗯……廁所……"
32030-125 = "咦……老師的，房間？到現在還沒……"
32030-129 = "那麼老師，非常感謝……咦？"
32030-130 = "……！？"
32030-131 = "日，日步美！？你，你在老師的房間裡做什麼……！？"
32030-132 = "呵呵。那麼我很期待下次的深夜密會……"
32030-133 = "……咦？"
32030-134 = "……！"
32030-139 = "三，三個人一起……！？笨蛋、變態！淫亂族！！"
32030-141 = "（就這樣，迎來了第二天）"
32030-143 = "下一話;泳裝派對"

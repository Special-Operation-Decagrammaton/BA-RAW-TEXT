[translation]
32030-1 = "Episode 3;Secret Society"
32030-2 = "Now I get it. You've been coming here to talk to Sensei about our lesson plans."
32030-3 = "And you just needed some advice...?"
32030-4 = "But why do you keep calling your swimsuit your pajamas?! "
32030-5 = "You're talking to a girl who wore her swimsuit to chapel once. I don't understand why everyone is so uptight about these things."
32030-6 = "U-Uhhh..."
32030-7 = "[s] \"You said you wanted to talk to me about Azusa?\""
32030-8 = "Yes, that's right."
32030-9 = "..."
32030-10 = "It's okay, Hifumi. You can listen in too. "
32030-11 = "The thing is, she's gone out the last two nights and hasn't returned until almost sunrise."
32030-12 = "Azusa..."
32030-13 = "I was under the impression she was simply having trouble sleeping outside of her usual bed at first, but I don't think that's it."
32030-14 = "In fact, I've never actually seen her sleep at all."
32030-15 = "Come to think of it, neither have I. Azusa is usually the last one asleep, but the first one out of bed..."
32030-16 = "I'm not sure what she's up to, but I'm starting to think we may have to step in and force her to get some rest for her own good."
32030-17 = "I can't help but feel that she's...anxious about something."
32030-18 = "..."
32030-19 = "It's not my place to pry into her private life, but I think we owe it to her to help. Every girl needs a good night's sleep."
32030-20 = "I'm afraid she's going to end up collapsing sooner or later."
32030-21 = "And the same goes for the two of you. Stop staying up so late, and take better care of yourselves."
32030-22 = "Our club work is important, but it shouldn't take priority over your health. The worst that could happen is us failing. That's not worth sacrificing your health for."
32030-23 = "[s] \"That's...\""
32030-27 = "..."
32030-28 = "It's not that simple..."
32030-29 = "Hifumi?"
32030-30 = "Failing isn't the worst thing that could happen! If we fail the last two exams..."
32030-31 = "...we'll be expelled! We'll be forced to leave Trinity!"
32030-35 = "Expelled...? What are you talking about?"
32030-36 = "They can't expel us that easily. It's a long, complicated process that needs more valid reasoning than simply our grades."
32030-37 = "[s] \"She's telling the truth, Hanako.\""
32030-38 = "Sensei?"
32030-39 = "..."
32030-44 = "[ns] Tell her the truth about the Make-Up Work Club."
32030-47 = "..."
32030-48 = "..."
32030-49 = "I see... So that's how it is. We're going to be expelled if we don't all pass by the third exam."
32030-50 = "This arrangement and the collective punishment wouldn't be possible normally, but given Schale's extrajudicial authority is involved...it all makes sense."
32030-51 = "Does it? I don't think it makes sense at all."
32030-52 = "And that goes for you too! Didn't your grades use to be at the top of the class?! You were earning perfect scores in advanced third-year level classes despite only being a first-year!"
32030-53 = "..."
32030-54 = "I...found out while looking at last year's tests when I was putting together our mock exams. I'm sorry for invading your privacy."
32030-55 = "But why? Why did you choose to begin failing this year? If it keeps up, then the rest of us will be..."
32030-56 = "You'll have to forgive me. I never would have imagined that if even one Make-Up Work Club member failed, that we would all be... It's unthinkable."
32030-57 = "..."
32030-58 = "No. I shouldn't have been so naive."
32030-59 = "I owe you each an apology for all the trouble I've caused."
32030-60 = "I'm sorry, Sensei."
32030-61 = "I'm sorry, Hifumi."
32030-62 = "H-Hanako. It's fine—I already forgive you. "
32030-67 = "It's as you suspected. I've been intentionally scoring low on my exams. "
32030-68 = "But why?! What would compel you to do something like that?"
32030-69 = "I'm afraid I can't tell you."
32030-70 = "...?!"
32030-71 = "I have my reasons...but I don't want you all to suffer because of my choices."
32030-72 = "So you don't have to worry. It ends tonight."
32030-73 = "I'll pass my exams and keep the rest of the Make-Up Work Club safe. "
32030-74 = "[s] \"Thank you, Hanako.\""
32030-75 = "You don't have to thank me, Sensei."
32030-76 = "If anything, I should be the one making it up to you. What if I did a little striptease? Would that suffice?"
32030-77 = "N-No, you've already done plenty! You taking the exams seriously from now on is more than enough."
32030-78 = "Oh, I have a question. Are you two the only ones that know about all of this?"
32030-79 = "I think so. Sensei was the only person I had talked to about it until now."
32030-80 = "If that's the case, then expulsion isn't what's making Azusa anxious. That mystery is still unsolved..."
32030-81 = "Actually, I feel as though the Make-Up Work Club's entire founding is even more confusing after what you've told me."
32030-82 = "..."
32030-83 = "I doubt Mika could have arranged this. It must have been Nagisa's doing."
32030-84 = "[s] \"...!\""
32030-85 = "But why now? Why would she busy herself with something like this just days ahead of the Eden Treaty's signing? "
32030-86 = "Or is that the exact reason she's doing it?"
32030-87 = "..."
32030-88 = "..."
32030-89 = "Now I understand. The Make-Up Work Club's purpose is to herd any potential threats to the Eden Treaty."
32030-90 = "[s] \"...?!\""
32030-91 = "What?!"
32030-92 = "It's a very Nagisa-like thing to do. She can be a real conniving witch when she wants to be."
32030-93 = "D-Did you just call her a witch?"
32030-94 = "Nagisa is trying to wash out every problematic element at once. We're yesterday's dirty laundry, basically."
32030-95 = "[s] \"More like rotten apples, according to her.\""
32030-96 = "Her plans include you too, don't they, Sensei?"
32030-97 = "You probably accepted this job with the good intention of saving failing students, but in reality, you were a pawn for the sake of using Schale's extrajudicial authority."
32030-98 = "And yet that hasn't stopped you from doing everything you can for us."
32030-99 = "You truly are a wonderful person, Sensei. ♥"
32030-100 = "And you're more like a detective, Hanako. I'm amazed."
32030-101 = "Nagisa told me to find who \"Trinity's traitor\" could be."
32030-102 = "That's just like Nagisa—so melodramatic. Though I'm sure anyone who disagrees with her plans is a traitor in her mind."
32030-103 = "I can understand why Azusa would be a suspect given her background."
32030-104 = "I could be off-base, but it wouldn't surprise me if Koharu was essentially a hostage from the Justice Task Force."
32030-105 = "But what about you, Hifumi? I thought you were close with Nagisa."
32030-106 = "Me?! A-Am I really a suspect too? "
32030-107 = "I guess I'd have to be if she placed me here... Wh-What did I ever do to fall under suspicion?"
32030-108 = "[s] \"...\""
32030-111 = "We'll have to talk more about Azusa later. I'll see if I can't find out more about what's been going on."
32030-112 = "That'd be great. Please keep us in the loop if you learn anything. "
32030-113 = "Sure thing. So? Does this mean I'm officially a part of your secret midnight trysts?"
32030-114 = "The three of us, all alone late at night sharing a heart-pounding ménage à trois! ♥"
32030-115 = "That's not what's happening!"
32030-116 = "[s] \"It IS pretty late. Let's call it for tonight.\""
32030-117 = "You're right. We should be getting to bed."
32030-118 = "Good night."
32030-121 = "Hngh... Bathroom..."
32030-125 = "Is that light coming from Sensei's room? What are they still doing up at this hour?"
32030-129 = "I'll talk to you tomorrow, Sens—huh?"
32030-130 = "...?! "
32030-131 = "Wh-What were you doing in Sensei's room?!"
32030-132 = "Bye, Sensei. I'm looking forward to tomorrow night's ménage à trois!"
32030-133 = "Oh?"
32030-134 = "..."
32030-139 = "A threesome?! Lewd! Filthy! DEATH PENALTY!"
32030-141 = "It was the end of yet another day at boot camp."
32030-143 = "Next Episode;Swimsuit Symposium"

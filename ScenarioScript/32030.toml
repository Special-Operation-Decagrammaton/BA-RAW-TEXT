[translation]
32030-1 = "ตอนที่ 3;การประชุมลับ"
32030-2 = "แบบนี้เองสินะคะ... ฮิฟุมิจังมาหารือกับคุณครูเกี่ยวกับสิ่งที่จะทำในอนาคต..."
32030-3 = "ส่วนฮานาโกะจังก็มีเรื่องที่อยากปรึกษากับคุณครู... ก็เลยใส่ชุดนอน..."
32030-4 = "ซะที่ไหนกันล่ะคะ...!! ทำไมถึงเอาชุดว่ายน้ำมาใส่เป็นชุดนอนล่ะคะ...?!! "
32030-5 = "โอ๊ะ? แต่ฉันก็เคยใส่ชุดว่ายน้ำไปคลาสสวดมนต์นะคะ ฉันว่าทุกคนยึดติดกับแบบแผนมากเกินไปแล้วค่ะ"
32030-6 = "ฮือออ..."
32030-7 = "[s] \"เมื่อกี๊ฮานาโกะบอกว่าอยากปรึกษาเรื่องอาซึสะใช่ไหม?\""
32030-8 = "ค่ะ ใช่แล้วค่ะ"
32030-9 = "..."
32030-10 = "จริงสิ... ฮิฟุมิจังก็น่าจะอยู่ฟังด้วยนะคะ "
32030-11 = "อาซึสะจังเค้าออกไปข้างนอกทุกคืนเลยค่ะ กว่าจะกลับมาก็ปาไปเกือบเช้าแล้วค่ะ"
32030-12 = "อาซึสะจัง..."
32030-13 = "ตอนแรกฉันคิดว่าจะนอนไม่หลับเพราะแปลกที่ซะอีก แต่ไม่น่าจะใช่แล้วล่ะค่ะ"
32030-14 = "และที่ยิ่งอดคิดไม่ได้... คือว่า... ฉันไม่เคยเห็นอาซึสะจังนอนหลับแบบจริงจังเลยค่ะ"
32030-15 = "นั่นสิ... จะว่าไปฉันก็เห็นแต่อาซึสะจังที่ตื่นก่อน หรือไม่ก็ยังตาสว่างอยู่จนกลางดึก..."
32030-16 = "ฉันไม่รู้หรอกค่ะว่าอาซึสะจังทำอะไรอยู่... แต่รู้สึกว่าเราต้องทำให้อาซึสะจังนอนหลับให้ได้#nแม้จะต้องบังคับก็ตามค่ะ "
32030-17 = "ฉันว่า... อาซึสะจังต้องมีอะไรกังวลใจอยู่แน่เลยค่ะ"
32030-18 = "..."
32030-19 = "ถึงเราจะไม่รู้สาเหตุ แต่เราก็ต้องช่วยกันลดความกังวลของเธอนะคะ#nเป็นคนก็ต้องนอนหลับพักผ่อนใช่ไหมล่ะคะ?"
32030-20 = "ถ้าไม่ได้หลับไม่ได้นอนแบบนี้ก็เสียสุขภาพแย่เลยค่ะ"
32030-21 = "ไม่ใช่แค่อาซึสะจังนะคะ คุณครูกับฮิฟุมิจังก็เหมือนกันนะคะ ต้องรักษาสุขภาพด้วยนะคะ"
32030-22 = "คาบเรียนเสริมมันสำคัญก็จริง แต่อย่างมากที่สุดก็แค่สอบตกนี่คะ?#nเอาสุขภาพมาเปรียบเทียบไม่ได้หรอกค่ะ"
32030-23 = "[s] \"คือว่า...\""
32030-27 = "..."
32030-28 = "ไม่ใช่หรอกค่ะฮานาโกะจัง... ไม่ใช่อย่างนั้นหรอกค่ะ..."
32030-29 = "ฮิฟุมิจัง...?"
32030-30 = "มันไม่ใช่ \"อย่างมากก็แค่สอบตก\" นะคะ...!! ถ้าพวกเราสอบไม่ผ่าน ทั้ง 2 ครั้งในอนาคตล่ะก็..."
32030-31 = "พวกเราจะถูกไล่ออกค่ะ!!  เราต้องออกจากทรีนิตี้ค่ะ!"
32030-35 = "คะ?! ถูกไล่ออก...? หมายความว่าไงคะฮิฟุมิจัง..."
32030-36 = "ระ... เรื่องแบบนั้นมันไม่ถูกต้องตามกฎของโรงเรียนนะคะฮิฟุมิจัง การไล่ออกไม่ได้ทำง่ายๆ นะ..."
32030-37 = "[s] \"ฮานาโกะ นี่คือเรื่องจริง\""
32030-38 = "คุณครู...?"
32030-39 = "..."
32030-44 = "[ns] เล่าความจริงเกี่ยวกับชมรมชั้นเรียนเสริม"
32030-47 = "..."
32030-48 = "..."
32030-49 = "เอ่อ... เป็นแบบนี้เองเหรอคะ สอบตก 3 ครั้งแล้วไล่ทุกคนออก..."
32030-50 = "เดิมทีแล้วเราไม่มีระบบเหมารวมแบบนี้ แต่หากวิเคราะห์สิทธิกฎหมายที่ชาเล่ต์มีแล้ว... ก็พอจะเข้าใจได้ค่ะ"
32030-51 = "นี่ไม่ใช่เวลาจะมาพูดแบบนั้นนะคะ ฮานาโกะจัง..."
32030-52 = "ที่จริงแล้วฮานาโกะจังเรียนดีไม่ใช่เหรอคะ? ได้คะแนนเต็มจากหลักสูตรเรียนรู้เชิงลึก#nของชั้นปีที่ 3 มาด้วยนี่คะ? แถมตอนนั้นยังอยู่แค่ปี 1 อีกด้วย!"
32030-53 = "..."
32030-54 = "ฉันรู้เรื่องนี้มาระหว่างที่หาคำตอบของข้อสอบเก่าๆ น่ะค่ะ... ขอโทษนะคะที่แอบดูคะแนน..."
32030-55 = "ทำไมถึงทำข้อสอบออกมาไม่ดีล่ะคะ? ถ้าฮานาโกะจังเทการสอบอีก พวกเราทุกคนคง..."
32030-56 = "ฉันไม่รู้เรื่องนี้เลยค่ะ... ไม่รู้เลยว่าคาบเรียนเสริมต้องถูกตัดสินให้ออกจากโรงเรียนแบบเหมารวม..."
32030-57 = "..."
32030-58 = "ขอโทษนะคะ... แต่ถึงจะอ้างว่าไม่รู้ ก็คงไม่มีใครให้อภัยใช่ไหมคะ..."
32030-59 = "ฉันทำให้ทุกคนเดือดร้อนมากเลย ทั้งคุณครู ฮิฟุมิจัง อาซึสะจัง โคฮารุจัง..."
32030-60 = "ขอโทษนะคะคุณครู"
32030-61 = "ขอโทษนะคะฮิฟุมิจัง"
32030-62 = "เอ่อ... มะ... ไม่เป็นไรค่ะ ฮานาโกะจัง... "
32030-67 = "... ค่ะ ใช่ค่ะ ฉันยอมรับค่ะว่าฉันตั้งใจทำข้อสอบให้ออกมาไม่ดี "
32030-68 = "วะ... ว่าแล้วเชียว!!  แต่ทำไมถึงทำเรื่องแบบนี้ล่ะคะ... ฮานาโกะจัง? มีเหตุผลอะไรเหรอคะ?"
32030-69 = "เรื่องนี้คงบอกไม่ได้หรอกค่ะ..."
32030-70 = "…?!"
32030-71 = "ฉันมีเหตุผลส่วนตัวน่ะค่ะ... แต่ยังไงก็คงเอาเหตุผลนี้มาทำให้ทุกคนเดือดร้อนไม่ได้"
32030-72 = "ฉันจะไม่ทำแบบนั้นแล้วค่ะ"
32030-73 = "ฉันจะพยายามอย่างเต็มที่ อย่างน้อยก็จนกว่าชมรมชั้นเรียนเสริมทุกคนจะปลอดภัยค่ะ "
32030-74 = "[s] \"ขอบใจนะฮานาโกะ\""
32030-75 = "คะ? มะ...ไม่หรอกค่ะ เรื่องที่คุณครูต้องขอบใจฉันน่ะ..."
32030-76 = "ฉันต่างหากล่ะคะที่ต้องขอโทษคุณครู ขอให้ฉันได้ขอโทษคุณครูในตอนนี้ได้ไหมคะ?"
32030-77 = "เอ่อ... ขอโทษไปเพียงพอแล้วค่ะ! ไหนๆ ก็ให้คำมั่นว่าจะพยายามแล้ว แค่นี้ก็พอแล้วค่ะฮานาโกะจัง"
32030-78 = "ว่าแต่ มีแค่ฮิฟุมิจังกับคุณครูเท่านั้นเหรอคะที่รู้ความจริงเรื่องนี้?"
32030-79 = "คะ? ใช่ค่ะ... ไม่มีใครรู้นอกจากเรา..."
32030-80 = "งั้นเหรอคะ... ความกังวลของอาซึสะจังคงไม่ใช่เพราะการสอบแล้วล่ะค่ะ#nถึงแม้จะมีอีกหลายอย่างที่ฉันยังไม่รู้ก็เถอะ..."
32030-81 = "แต่ตอนนี้สิ่งที่ติดใจฉันมากกว่า... ก็คือการมีอยู่ของชมรมชั้นเรียนเสริมค่ะ"
32030-82 = "…"
32030-83 = "คนที่จะทำเรื่องแบบนี้ได้... ไม่น่าจะเป็นคุณมิกะ... น่าจะเป็นคุณนางิสะมากกว่า"
32030-84 = "[s] \"......!\""
32030-85 = "ทำไมนะ...? สนธิสัญญาเอเดนใกล้เข้ามาแล้วนะ ทำไมถึงมาทำเรื่องแบบนี้...? "
32030-86 = "เดี๋ยวนะ... หรือว่าเป็นเพราะเรื่องนี้...?"
32030-87 = "…"
32030-88 = ".........."
32030-89 = "เข้าใจแล้วล่ะค่ะ... ชมรมชั้นเรียนเสริมคือการรวมตัวของผู้ต้องสงสัย#nที่คาดว่าจะขัดขวางสนธิสัญญาเอเดน"
32030-90 = "[s] \"......?!?!\""
32030-91 = "คะ... คะ?!"
32030-92 = "สมกับที่เป็นคุณนางิสะเลยนะคะ นี่แหละค่ะสิ่งที่แมวตัวเมียแสนเจ้าเล่ห์ชอบทำ"
32030-93 = "มะ... แมวตัวเมีย?"
32030-94 = "จับทุกคนมามัดรวมไว้แล้วก็จัดการรวดเดียวเลยเพื่อประสิทธิภาพสูงสุด...#nคงจะใช้ตรรกะนี้คิดล่ะมั้งคะ คงจะมองเราเป็นผ้าที่โยนสุมๆ ในตะกร้าแน่เลยค่ะ"
32030-95 = "[s] \"จริงๆ ถูกมองเป็นขยะมากกว่าเสื้อผ้านะ...\""
32030-96 = "อย่างนี้ก็แสดงว่า... คุณครูก็โดนคุณนางิสะเล่นงานเหมือนกันสิคะ?"
32030-97 = "คุณครูอาจจะเข้ามาทำหน้าที่นี้เพราะเจตนาดีอยากช่วยเด็กที่สอบตก#nแต่จริงๆ แล้วคุณครูถูกใช้ประโยชน์จากสิทธิเหนือกฎหมายของชาเล่ต์"
32030-98 = "เพราะอย่างนี้ก็เลยพยายามช่วยพวกเราซะขนาดนี้สินะคะ..."
32030-99 = "คุณครูเนี่ย... เป็นคนดีจริงๆ เลยค่ะ อุฮุฮุ♡"
32030-100 = "นี่มันเหมือนกับดักเลยค่ะฮานาโกะจัง..."
32030-101 = "คือว่า... คุณนางิสะสั่งให้ฉันหาตัว <คนทรยศในทรีนิตี้> น่ะค่ะ"
32030-102 = "ฮุฮุ... คนทรยศในทรีนิตี้งั้นเหรอ พูดซะสมกับเป็นเค้าเลยนะคะ#nตรรกะที่คิดว่าคนที่ขัดขวางแผนการของตัวเองคือคนทรยศน่ะค่ะ"
32030-103 = "ทางนั้นอาจจะไม่ไว้ใจอาซึสะจังเพราะเอกสารมันน่าสงสัยจริงๆ..."
32030-104 = "แต่กับโคฮารุจัง... ไม่สิ กับเชลยจากชมรมทวงความยุติธรรม ฉันไม่เข้าใจเลยว่าทำไมถึงมาอยู่ที่นี่..."
32030-105 = "ฮิฟุมิจัง...? ทำไมฮิฟุมิจังถึงตกเป็นผู้ต้องสงสัยล่ะคะ? ฮิฟุมิจังไม่ได้สนิทสนมกับคุณนางิสะ#nหรอกเหรอคะ?"
32030-106 = "คะ?! คะ? ฉันก็เป็นผู้ต้องสงสัยเหรอคะ? "
32030-107 = " อ่า... อ่า คือว่า... คือว่า... นั่นสินะคะ... ทำไมถึงสงสัยในตัวฉันนะ..."
32030-108 = "[s] \".........\""
32030-111 = "เราต้องคุยเรื่องอาซึสะจังกันเพิ่มแล้วล่ะค่ะ... ฉันเองก็จะไปตรวจสอบอะไรมาเพิ่มด้วย"
32030-112 = "ค่ะ... ถ้าฮานาโกะจังสืบอะไรมาได้อีกก็มาบอกคุณครูกับฉันนะคะ "
32030-113 = "แปลว่าให้ฉันเข้ามาอยู่ในการประชุมลับกลางดึกด้วยใช่ไหมคะ? อุฮุฮุ ดีใจจัง♡"
32030-114 = "คนสามคนกับการแอบเล่นสนุกในห้องลับกลางดึก... แค่คิดก็ตื่นเต้นแล้วค่ะ♡"
32030-115 = "อ่า... ไม่ใช่การแอบเล่นสนุกนะคะ..."
32030-116 = "[s] \"วันนี้ดึกมากแล้ว พอแค่นี้ก่อนแล้วกัน...\""
32030-117 = "ค่ะ งั้นเจอกันใหม่พรุ่งนี้นะคะคุณครู"
32030-118 = "ราตรีสวัสดิ์ค่ะ"
32030-121 = "งืม... ห้องน้ำอยู่หนายย..."
32030-125 = "ห้องคุณครูเหรอ? ดึกดื่นป่านนี้แล้วทำไมยังไม่นอน..."
32030-129 = "ขอบคุณนะคะคุณครู... เอ๋?"
32030-130 = "...?!"
32030-131 = "ฮิ... ฮิฟุมิ?! ทำไมมาอยู่ใน... ห้องคุณครู?!"
32030-132 = "ค่า แล้วไว้เรามาแอบเล่นสนุกกันใหม่สามคน..."
32030-133 = "โอ๊ะ...?"
32030-134 = "…"
32030-139 = "สะ... เสื่อมมาก!!  ลงโทษ!! ต้องโดนลงโทษ!!!"
32030-141 = "(และอีกหนึ่งวันก็หมดไป... แบบนี้)"
32030-143 = "ตอนต่อไป;เสวนาชุดว่ายน้ำ"

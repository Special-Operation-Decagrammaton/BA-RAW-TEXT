[translation]
32030-1 = "第3話;深夜の密会"
32030-2 = "……なるほど。先生と一緒に、これからについてのご相談を……。"
32030-3 = "ハナコちゃんも先生に相談したいことがあって……。"
32030-4 = "で、ですがどうして水着で来るんですか！？パジャマが水着ってどういうことですか……！？"
32030-5 = "心が落ち着くんですよね。ですので私は、礼拝堂での授業にも水着で参加しましたよ？一度もっと、色々と柔らかく考えてみましょう♪"
32030-6 = "あうぅ……。"
32030-7 = "[s] \"ハナコ、さっきの話の続きは今じゃない方が良い？\""
32030-8 = "……アズサちゃんの件、ですよね。"
32030-9 = "……。"
32030-10 = "……いえ、大丈夫です。ヒフミちゃんも一緒に聞いていただければと思います。"
32030-11 = "実はアズサちゃん……毎晩のように、どこかへ出かけては夜明けまで戻ってこないことが続いていて。"
32030-12 = "そう、だったんですか……。"
32030-13 = "最初は慣れない場所で眠れないのかと思ったのですが、そうではないようです。"
32030-14 = "……私はアズサちゃんが夜にちゃんと眠っているところを、ほとんど見たことがありません。"
32030-15 = "たしかに私も……アズサちゃんはいつも先に起きてますし、私より早く寝てることも無かったような……。"
32030-16 = "……アズサちゃんが一体何をしてるのかは分かりません。ですがそろそろ、多少無理やりにでも寝かせてあげないといけないのでは、と。"
32030-17 = "何だかアズサちゃん……どこか、すごく不安そうで。"
32030-18 = "……。"
32030-19 = "どんな事情なのかは分かりませんが、どうにかその不安を少しでも軽減してあげたくって……。"
32030-20 = "このままですと、いつかは倒れてしまいます。"
32030-21 = "……先生とヒフミちゃんも、ですよ？しっかり寝ないとダメです。"
32030-22 = "確かに試験も大切ですが、ただ落第というだけです。身体の健康と比べられるようなものではないと思いませんか？"
32030-23 = "[s] \"それは……。\""
32030-27 = "……。"
32030-28 = "……普通だったら、そうかもしれません。でも……"
32030-29 = "ヒフミちゃん……？"
32030-30 = "ただ、ただ「落第」で済む話ではないんです……！あと2回、どちらの試験も不合格だったら……"
32030-31 = "退学なんです！私たちは、トリニティを去らないといけないんです……！！"
32030-35 = "……退学？ヒフミちゃん、それはどういう……？"
32030-36 = "そ、そんなこと、校則的に成り立ちません。退学は色々な手続きと理由が必要で、そんな簡単には……"
32030-37 = "[s] \"……。\""
32030-38 = "……先生？"
32030-39 = "……。"
32030-44 = "[ns] 補習授業部の裏の事情について、知ってることを話す。"
32030-47 = "……。"
32030-48 = "……。"
32030-49 = "……なるほど、そうだったのですね。全て不合格であれば、全員退学……。"
32030-50 = "この仕組み自体そもそもおかしいですが……なるほど、シャーレの超法規的権限が……。"
32030-51 = "ハナコちゃん……。"
32030-52 = "あ、そ、そういえばハナコちゃん、本当は成績良いんですよね？1年生の時に、3年生の難しい試験まで全部満点でしたよね……！？"
32030-53 = "……。"
32030-54 = "あの、ごめんなさい……模試のために昔のテスト用紙を探す途中に、見つけてしまって……。"
32030-55 = "ど、どうして今は、あんな点数を……？わざと、ですよね……？"
32030-56 = "……ごめんなさい、知らなかったんです。失敗したら、まさか「全員が退学」だなんて……。"
32030-57 = "……。"
32030-58 = "いえ、知らなかったからと言って、許されるものではありませんね……。"
32030-59 = "先生にも、ヒフミちゃんにも……アズサちゃんとコハルちゃんにも、申し訳ないことをしました。"
32030-60 = "ごめんなさい、先生。"
32030-61 = "ヒフミちゃんも、ごめんなさい。"
32030-62 = "い、いえ、その……。"
32030-67 = "……ヒフミちゃんの言った通り、私のあの点数はわざとです。"
32030-68 = "や、やっぱり……！？ハナコちゃん、どうしてそんなことを……？"
32030-69 = "……ごめんなさい、言えません。"
32030-70 = "……！？"
32030-71 = "私の、すごく個人的な理由なので……ですが、それでみなさんが被害を受けてしまうのは望むところではありません。"
32030-72 = "なので、安心してください。"
32030-73 = "最低限みなさんが退学にはならないよう、今後の試験は頑張りますので。"
32030-74 = "[s] \"……ありがとう、ハナコ。\""
32030-75 = "い、いえ……！？先生にそこまで、感謝していただくようなことでは……。"
32030-76 = "むしろ私が謝罪するべきことです、裸で手をつくだけで足りますでしょうか……？"
32030-77 = "いえそれは逆にやめていただけますと……！？今後頑張ってくださると聞けただけで、私は安心しました。"
32030-78 = "ありがとうございます。ところで……この事実を知っているのは、ヒフミちゃんと先生だけですか？"
32030-79 = "そうですね、私たち以外はまだ誰も……。"
32030-80 = "なるほど……となると、アズサちゃんの不安は試験に起因するものではなさそうですね。何か私がまだ知らないことがある、と……。"
32030-81 = "……いえ。それ以上に今は、この補習授業部の存在そのものが気になりますね。"
32030-82 = "……。"
32030-83 = "ミカさん……は無理でしょうし、まあこんなことを企むのはナギサさんでしょうか。"
32030-84 = "[s] \"……！\""
32030-85 = "ですが、どうしてエデン条約を目の前にしてこんな……。"
32030-86 = "いえ、むしろ目の前だからこそ……？"
32030-87 = "……。"
32030-88 = "…………。"
32030-89 = "……なるほど。この補習授業部は、エデン条約を邪魔しようとしている疑惑がある容疑者たちの集い、というところですか。"
32030-90 = "[s] \"……！？\""
32030-91 = "え、えっ！？"
32030-92 = "ナギサさんらしいと言いますか、相変わらず狡猾な猫ちゃんですねぇ。"
32030-93 = "ね、猫……？"
32030-94 = "どうせならまとめて処理してしまった方が効率的、といったロジックでしょうか。何だか私たちまるで、洗濯物みたいな扱いですね。"
32030-95 = "[s] \"（たしか「洗濯物」よりひどい言葉を聞いた気がする……）\""
32030-96 = "……先生も、ナギサさんにしてやられた形でしょうか。"
32030-97 = "「成績の振るわない生徒たちを助ける」という名目で、善意を利用されてこの役割を担い、その実シャーレの超法規的権限が利用されている……。"
32030-98 = "ですが逆に言えば、先生は純粋に私たちのために頑張ってくださっていたのですね……。"
32030-99 = "……ありがとうございます、先生。先生はやはり良い人ですね、ふふっ♡"
32030-100 = "ハナコちゃん、すごい……探偵みたいです。"
32030-101 = "「トリニティの裏切り者」……ナギサ様は、それを私に探して欲しいと仰っていました。"
32030-102 = "……ふふ、なるほど。「トリニティの裏切り者」ですか……ナギサさんらしい表現ですね。ティーパーティーのホストである彼女の計画を邪魔したら該当する、とも考えられるロジックですし。"
32030-103 = "……アズサちゃんは書類の時点で怪しかったので、疑われるのも無理はありませんね。"
32030-104 = "コハルちゃんは、どうして……強いて言えば、正義実現委員会の人質という観点なら無茶ではありつつも、納得はできますが……。"
32030-105 = "……あら、そう考えると、ヒフミちゃんはどうして容疑者になっているんです？ナギサさんと親しかったはずでは？"
32030-106 = "えっ！？わ、私もやっぱり容疑者なんですか……！？"
32030-107 = "た、確かに、親しくさせていただいていたような感じですが……ど、どうして私なのでしょう……？"
32030-108 = "[s] \"…………。\""
32030-111 = "……とにかくアズサちゃんとは、後でもう少しお話しをしてみた方が良いかもしれません。その他についても幾つか、私の方でも確認してみます。"
32030-112 = "はい。もし何か分かりましたら、教えてもらえると嬉しいです。"
32030-113 = "分かりました。ということは私もこの、深夜の密会に参加させていただけるということでよろしいですか？うふふ、嬉しいです♡"
32030-114 = "深夜の密室で、三人寄り添って秘密の遊びだなんて……ドキドキが止まりません♡"
32030-115 = "そ、その言い方はちょっと……。"
32030-116 = "[s] \"じゃあ、もう遅いしそろそろ寝ようか。\""
32030-117 = "はい、ではまた明日ということで。"
32030-118 = "そうですね、おやすみなさい。"
32030-121 = "んん……トイレ……。"
32030-125 = "あれ……先生の、部屋？こんな時間まで……。"
32030-129 = "それでは先生、ありがとうございま……あれ？"
32030-130 = "……！？"
32030-131 = "ひ、ヒフミ！？せ、先生の部屋で一体何を……！？"
32030-132 = "ふふっ。では、また夜の密会を楽しみに……"
32030-133 = "……あら？"
32030-134 = "……っ！"
32030-139 = "さ、三人……！？バカ、ヘンタイ！淫乱族っ！！"
32030-141 = "（そうしてまた、次の日を迎えることになる。）"
32030-143 = "次回;水着パーティー"

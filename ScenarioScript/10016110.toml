[translation]
10016110-1 = "後日談;美食研究會篇"
10016110-3 = "那個，可以再給我一杯櫻花蘇打嗎？"
10016110-4 = "我要墨魚剉冰，外加一盤加了花生醬的涼拌海參！"
10016110-5 = "我要蛋炒飯、拉麵、煎餃跟一碗中華丼……啊，還要一盤毛豆當小菜。"
10016110-9 = "……大家也吃太多了吧？ "
10016110-10 = "就算因為有「萬能餐券」可以不用付錢，也要注意別吃過頭哦。"
10016110-11 = "畢竟這附近似乎沒有販售腸胃藥的地方。"
10016110-12 = "居然說吃過頭……身為追求美食之人，才不會做那種有失格調的事。"
10016110-13 = "……只不過是因為這是比賽結束後的第一餐，所以胃口比平常要好罷了。"
10016110-15 = "「最能提振食慾的開胃菜是運動」這句俗諺果然有其道理。"
10016110-16 = "運動嗎……"
10016110-17 = "話說回來，羽留奈今天也有參加比賽嗎？"
10016110-18 = "當然。身為格黑娜學園的一員，肯定要參加幾個田徑項目。"
10016110-19 = "只可惜沒有留下什麼亮眼的成績。"
10016110-20 = "什麼嘛，那是值得用驕傲的語氣說出來的話嗎？"
10016110-21 = "當然囉。就像那位千年的書記在閉幕式上說的一樣，#n「晄輪大祭」的目的不在締造好成績，而是在創造學生們享受運動的契機。"
10016110-22 = "……這次的大運動會，我是真的盡情地享受了一番。"
10016110-23 = "而且除了我以外，其他部員都有在比賽中斬獲佳績，#n所以即使是風紀委員會，今天也拿我們沒辦法。"
10016110-24 = "我今天也很開心！"
10016110-25 = "平時吃人工製作的蕎麥麵，都會因為出餐速度緩慢而感到鬱悶……"
10016110-26 = "但這次總算遇到了能配合我進食速度的餵食機器。千年的技術力果然不同凡響☆"
10016110-28 = "假如機器沒有在中途故障的話，就能更開心了……呵呵。"
10016110-29 = "嗯，海參蘇打也超好喝的！"
10016110-30 = "我還是第一次喝到能將海參的風味最大化的飲料。"
10016110-31 = "聽說是使用了千年新開發的分子料理技術……這個，能在格黑娜的食堂重現嗎？"
10016110-33 = "在這之中不能不提的，#n就是淳子同學在最後的接力賽中上演了大逆轉，帶領格黑娜迎接勝利。"
10016110-34 = "呵呵。可惜沒將淳子同學超越阿拜多斯跑者時，#n風紀委員們臉上的驚訝表情記錄下來，真是遺憾。"
10016110-35 = "嗯嗯！那時候的淳子真的超帥的！"
10016110-36 = "哈哈……聽你們這麼一說，我好像還真的挺活躍的呢。"
10016110-42 = "淳子同學。"
10016110-43 = "今天的大運動會，玩得開心嗎？"
10016110-44 = "唔嗯……這個嘛。"
10016110-45 = "因為弄丟錢包，所以錯過了想吃的路邊攤美食，#n還因為誤會而被其他學園的風紀委員追著跑……"
10016110-46 = "和平常與美食研究會的大家一起度過的日常沒有太大的不同……"
10016110-54 = "……不過我很開心。"
10016110-55 = "那真是太好了。"
10016110-56 = "平時常吃的米飯或味噌湯之類的食物，往往會因為太過熟悉導致美味遭到低估……#n而我並不同意這種想法。"
10016110-57 = "可以讓人每天吃都吃不膩的食物，才是[ruby=美食]最美味的食物[/ruby]。"
10016110-58 = "就是說啊。#n像這種油膩的慶典小吃，第一次吃到的時候雖然驚豔，卻沒辦法一吃再吃。"
10016110-62 = "咳咳……是不是有燒焦的味道？"
10016110-63 = "感覺像是煙燻時才有的那種燒木頭的濃烈味道……"
10016110-64 = "啊，應該是在準備「後夜祭」的營火晚會與土風舞。"
10016110-65 = "……土風舞？那是什麼？"
10016110-66 = "啊，土風舞啊……就是營火晚會時圍著營火跳的舞蹈。"
10016110-70 = "一般來說，都會在營火下方的土裡埋食材燜熟，所以才叫土[ruby=封]風[/ruby]舞。"
10016110-77 = "……是啊，炕窯是自狩獵時代就流傳至今，歷史悠久的烹飪手法。"
10016110-78 = "哇，好像很好吃！"
10016110-79 = "那可以在營火上烤其他東西嗎？像是海參……或是土虱之類的！"
10016110-80 = "那當然。#n晄輪大祭的營火晚會肯定十分盛大，絕對有足夠的空間可以烤其他東西。"
10016110-81 = "嗯嗯，太好了！那就把將剩下的海參與土虱通通打包帶走吧！"
10016110-83 = "其他學生在跳「土風舞」的時候，我們就一邊烤土虱一邊跳「土虱舞」！"
10016110-90 = "……那個，亞伽里。後夜祭不是那種慶典吧。"
10016110-91 = "讓泉就這樣誤會下去，沒關係嗎？"
10016110-92 = "呵呵，有什麼關係呢。"
10016110-93 = "在充滿歡樂的慶典氣氛中，這種程度反而只是「日常」的一環。"
10016110-94 = "[ruby=Eat or Die]「為了美食不擇手段」[/ruby]不正是我們美食研究會的座右銘嗎？"
10016110-98 = "淳子同學準備好後就快點跟上吧。可不能錯過在營火上烤土虱吃的珍貴美食體驗。"
10016110-105 = "……是啊。這才是我們的「日常」。"

[translation]
10016110-1 = "Afterword; Gourmet Research Society Episode"
10016110-3 = "Another Cherry Blossom soda here, please."
10016110-4 = "A squid ink shaved ice and another dish of dried sea cucumber with peanut butter for me!"
10016110-5 = "More of the egg fried rice, ramen, fried dumplings, and the Chinese rice bowl for me... Oh, and another order of the edamame appetizer, please."
10016110-9 = "...Aren't you all overdoing it, even if it is free? "
10016110-10 = "I mean, yeah, our first place General Meal Ticket prize means we can eat as much as we want, but that doesn't mean we should."
10016110-11 = "There isn't even anywhere to get some digestive medicine to help..."
10016110-12 = "Overeat? As someone who pursues the gourmet, I would never commit such a classless act."
10016110-13 = "...It's just that after finishing the festival and finally getting to eat, my appetite is stronger than ever."
10016110-15 = "Looks like there's something to the old saying: \"Light exercise every day helps the appetite stay.\""
10016110-16 = "Light exercise..."
10016110-17 = "Now that I think about it... Haruna, did you participate in the races today?"
10016110-18 = "Yes. I represented Gehenna Academy in several track and field events."
10016110-19 = "Although I didn't do very well."
10016110-20 = "What the heck? Why do you sound so proud about that?"
10016110-21 = "As the Millennium's Secretary stated during the closing ceremony, the purpose of the Halo Festival is not to achieve results, but to create opportunities for each and every student to enjoy physical education."
10016110-22 = "...And I really had quite a lot of fun at the field day."
10016110-23 = "And unlike me, the other members of our club did really well in the events they participated in, so I'm sure that even Gehenna's Prefect Team will leave us alone today."
10016110-24 = "I had fun today too!"
10016110-25 = "Usually, wankosoba noodles made by hand take a long time to make, so I've always thought it was a little frustrating to wait..."
10016110-26 = "I didn't think I'd ever see an automatic machine that can make noodles at the speed I eat, but as expected of Millennium's technology... ☆"
10016110-28 = "If the machine hadn't broken down halfway through, I could have enjoyed it a little more... Fufu."
10016110-29 = "Mhm! And the sea cucumber soda was delicious!"
10016110-30 = "I don't think I've ever tasted a drink that managed to maximize the flavor of sea cucumber like that."
10016110-31 = "I heard that Millennium used a newly developed molecular cooking technique... Do you think we could recreate it back at Gehenna?"
10016110-33 = "And let's not forget that Junko came back from dead last to lead Gehenna to victory in the final relay."
10016110-34 = "Fufufu. It's a shame we didn't get to capture the looks of surprise on the faces of the Prefect Team when Junko overtook the Abydos runner."
10016110-35 = "Yeah! Junko looked so cool!"
10016110-36 = "Haha... I feel like I did something amazing when you say it like that."
10016110-42 = "Junko."
10016110-43 = "Did you enjoy the field day today?"
10016110-44 = "Hm... I'm not sure."
10016110-45 = "I lost my wallet and missed out on some food stalls I really wanted to try, was misunderstood and chased around by students who looked like they were members of another club..."
10016110-46 = "It wasn't that different from any other day with everyone in the Gourmet Research Society, but..."
10016110-54 = "...It was fun."
10016110-55 = "I'm happy to hear that."
10016110-56 = "Ordinary foods, such as rice and miso soup, are often undervalued because they have such a basic, familiar taste, but...I disagree with that idea."
10016110-57 = "Food you can eat every day without growing sick of it... This must be the pinnacle of gourmet cuisine after all."
10016110-58 = "That's right. These greasy festival foods are great here and there, but I don't think I can eat 'em too many times..."
10016110-62 = "*sniff* *sniff* Do you smell something burning?"
10016110-63 = "It smells like burning wood, like something you'd use to smoke something..."
10016110-64 = "Ah, it looks like they're preparing the campfire and pork dance we always do at the After-Party."
10016110-65 = "...Pork dance? What's that?"
10016110-66 = "Oh, the pork dance... It's when we all come together and dance around the campfire together."
10016110-70 = "It's called the pork dance because we usually have a huge whole pig cooking over the fire!"
10016110-77 = "...Yes, it's a gourmet experience stemming from time-honored culinary traditions practiced during the days of bonfires, meat, and hunting."
10016110-78 = "Wow, that sounds amazingly delicious!"
10016110-79 = "So, do you think it's okay to grill something else over the fire? Like sea cucumber or...or octopus?!"
10016110-80 = "Sure. The Halo Festival's campfire must be quite huge, so there should be plenty of room to grill whatever you please."
10016110-81 = "Ok, great! We can bring lots of leftover sea cucumbers and octopi and make yummy soda!"
10016110-83 = "While the other students are doing the pork dance, we'll do the octo dance!"
10016110-90 = "...Um, Akari. You know we don't do anything like that at the After-Party..."
10016110-91 = "Are you sure you want to give Izumi the wrong idea like that?"
10016110-92 = "Fufufu. Why not?"
10016110-93 = "This is just the kind of thing people do while wrapped up in the excitement of the festivities."
10016110-94 = "Eat or Die. I'll do anything for a good meal. Isn't that the motto of us at the Gourmet Research Society?"
10016110-98 = "Junko, when you're done cleaning up, let's go together! We can't afford to miss out on the rare gourmet experience of grilling and eating an octopus over a bonfire..."
10016110-105 = "Yes. I guess that's our normal, after all."

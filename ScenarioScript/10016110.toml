10016110-19 = "5;하루나 체육복ND;03;유의미한 성적은 거두지 못했지만요.\n#5;em;[음표]"
10016110-20 = "1;준코 학교 체육복;12;뭐야, 그게 그렇게 으스대면서 할 법한 이야기야?"
10016110-21 = "5;하루나 체육복ND;01;물론이지요. 폐회식 때 그 밀레니엄의 서기가 말했던 것처럼, 황륜대제의 목적은 성과를 내는 데 그치지 않고 학생 개개인이 체육을 즐길 수 있는 계기를 만들어 주는 데 있으니까요."
10016110-22 = "5;하루나 체육복ND;99;……저는 이번 대운동회를 정말 즐겁게 만끽했답니다."
10016110-23 = "5;하루나 체육복ND;01;게다가 저와는 달리 다른 부원 여러분들은 참가한 종목에서 좋은 성과를 거두었으니, 게헨나의 선도부라 하더라도 오늘만큼은 저희를 어찌하지 못하겠지요."
10016110-24 = "1;아카리 학교 체육복;03;저도 오늘은 즐거웠어요!\n#1;em;[반응]"

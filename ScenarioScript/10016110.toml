10016110-9 = "3;준코 학교 체육복;14;……다들 공짜라고 너무 무리해서 먹는 거 아냐? \n#3;a\n#3;em;[땀]"
10016110-10 = "3;준코 학교 체육복;11;1등 상으로 받은 <만능 식권> 덕분에 음식값은 무료라지만, 너무 과식은 하지 마."
10016110-11 = "3;준코 학교 체육복;11;이 근처에 소화제를 팔고 있는 곳은 없는 것 같으니까."
10016110-12 = "5;하루나 체육복ND;02;무리해서 음식을 먹는다니요. 미식을 추구하는 사람으로서 그런 품위 없는 일은 하지 않는답니다.\n#5;a\n#5;em;[반응]\n#3;m1"
10016110-13 = "5;하루나 체육복ND;99;……다만 대회를 끝마치고 식사를 하려니 평소보다 훨씬 입맛이 도는 것 같아서요."
10016110-14 = "#all;hide"
10016110-15 = "3;하루나 체육복ND;03;역시 입맛을 돋우는 최고의 전채는 가벼운 운동이라는 옛말이 틀리지는 않은 모양이네요.\n#3;closeup\n#3;em;[반짝]"

[translation]
10016110-1 = "ย้อนวันวาน; ชมรมชิมอาหาร"
10016110-3 = "ขอโทษค่ะ รบกวนขอซากุระโซดาอีกแก้วด้วยค่ะ"
10016110-4 = "ส่วนฉันขอเป็นบิงซูหมึกพ่นไฟ แล้วก็ปลิงทะเลแห้งผัดเนยถั่วอีกจาน!"
10016110-5 = "ส่วนฉันขอข้าวผัดไข่ ราเม็ง เกี๊ยวทอด แล้วก็ชาฮั่งอีกอย่างละจานค่ะ... อ๊ะ แล้วก็ขอถั่วทอดอีกจาน#nด้วยค่ะ"
10016110-9 = "....ถึงจะเป็นของฟรีก็เถอะ แต่พวกเธอไม่สั่งเยอะเกินไปหน่อยเหรอ? "
10016110-10 = "ถึงเราไม่ต้องจ่ายค่าอาหารเพราะใช้ <บัตรกำนัลอาหารครอบจักรวาล> ที่ได้เป็นรางวัลมาก็จริง แต่ก็ไม่เห็นต้องสวาปามกันขนาดนี้เลยนี่"
10016110-11 = "แถวนี้ไม่มีร้านขายยาลดกรดอยู่หรอกนะ..."
10016110-12 = "สวาปามงั้นเหรอคะ? ในฐานะผู้ที่แสวงหาอาหารเลิศรส ฉันไม่ทำเรื่องไม่สง่างามพรรค์นั้นหรอกค่ะ "
10016110-13 = "...แต่เหมือนว่าฉันจะอยากอาหารมากกว่าปกติ เพราะเพิ่งจะมีเวลาพักกินอาหารหลังจากแข่งกีฬา#nเสร็จน่ะค่ะ"
10016110-15 = "ดูเหมือนคำกล่าวที่ว่า “การออกกำลังกายเบาๆ จะช่วยทำให้เจริญอาหาร” จะเป็นเรื่องจริงนะคะ"
10016110-16 = "'ออกกำลังกายเบาๆ' งั้นเหรอ..."
10016110-17 = "ว่าแต่ว่าฮารุนะ... วันนี้เธอลงแข่งกีฬาด้วยเหรอ?"
10016110-18 = "ค่ะ ฉันเป็นตัวแทนโรงเรียนเกเฮนน่า เข้าร่วมแข่งวิ่งหลายรายการเลยค่ะ"
10016110-19 = "ถึงฉันจะทำคะแนนในการแข่งขันได้ไม่ดีเท่าไรก็เถอะค่ะ"
10016110-20 = "อะไรกัน เรื่องแบบนี้มันควรพูดด้วยท่าทางน่าภูมิใจรึไง?"
10016110-21 = "แน่นอนค่ะ ตามที่เลขาของทางมิลเลเนียมพูดไว้ในตอนพิธีปิดงาน จุดประสงค์ของงานฮาโลเฟสติวัล#nคือการสร้างโอกาสให้นักเรียนทุกคนได้สนุกกับกีฬา ไม่ใช่เพื่อมุ่งมั่นแค่เรื่องความสำเร็จเท่านั้นค่ะ"
10016110-22 = "...งานแข่งกีฬาครั้งนี้ ฉันเองก็สนุกมากๆ เหมือนกันค่ะ"
10016110-23 = "นอกจากนี้ สมาชิกคนอื่นๆ นอกจากฉันก็ทำคะแนนได้ดีในการแข่งที่เข้าร่วม เพราะงั้นฉันเลยคิดว่า#nอย่างน้อยวันนี้ พวกคณะกรรมการวินัยคงจะไม่มายุ่งกับพวกเราหรอกค่ะ"
10016110-24 = "วันนี้ฉันก็สนุกมากเหมือนกันค่ะ!"
10016110-25 = "ปกติแล้วเส้นวังโกะโซบะทำมือจะใช้เวลาทำค่อนข้างนาน ฉันเลยหงุดหงิดบ่อยๆ เวลาที่ต้องรอ..."
10016110-26 = "แต่เพิ่งเคยเห็นเครื่องจักรอัตโนมัติที่ทำเส้นโซบะได้ทันความเร็วการกินของฉันเป็นครั้งแรกเลยค่ะ เทคโนโลยีของมิลเลเนียมนี่สุดยอดจริงๆ เลยนะคะ ☆"
10016110-28 = "ถ้าเครื่องไม่พังไปกลางทางซะก่อน ฉันคงจะสนุกได้นานกว่านี้แท้ๆ... ฮุฮุ"
10016110-29 = "อื้ม โซดารสปลิงทะเลก็อร่อยมากเลย!"
10016110-30 = "ไม่เคยดื่มเครื่องดื่มที่ดึงรสชาติปลิงทะเลออกมาได้ดีขนาดนี้มาก่อนเลย!"
10016110-31 = "ได้ยินว่าที่มิลเลเนียมใช้เทคนิคการปรุงอาหารโมเลกุลที่คิดค้นขึ้นมาใหม่... เราเอามาใช้ที่ชมรม#nโภชนาการของเกเฮนน่าบ้างไม่ได้เหรอ?"
10016110-33 = "แล้วอย่าลืมว่าในการแข่งนัดสุดท้าย จุนโกะอุตส่าห์วิ่งสุดชีวิตเพื่อคว้าชัยชนะมาให้เกเฮนน่าด้วยค่ะ"
10016110-34 = "ฮุฮุ น่าเสียดายที่ไม่ได้ถ่ายรูปสีหน้าประหลาดใจของพวกคณะกรรมการวินัยเอาไว้ พวกเธอทำหน้า#nเลิ่กลั่กกันใหญ่เลยค่ะ ตอนคุณจุนโกะวิ่งแซงนักวิ่งของอะบิดอสมา"
10016110-35 = "อื้อ! ตอนนั้นจุนโกะดูเท่สุดๆ ไปเลยละ!"
10016110-36 = "ฮ่าฮ่า... ได้ยินแบบนั้นแล้วรู้สึกดีขึ้นเยอะเลยแฮะ"
10016110-42 = "คุณจุนโกะ"
10016110-43 = "งานแข่งกีฬาวันนี้... สนุกรึเปล่าคะ?"
10016110-44 = "อืมมม... ไม่รู้สิ"
10016110-45 = "ฉันทำกระเป๋าเงินหาย เลยอดกินของอร่อยๆ จากร้านแผงลอยที่เล็งไว้ ถูกเข้าใจผิดจนโดนนักเรียน#nโรงเรียนอื่นไล่ล่าอีก..."
10016110-46 = "อันที่จริงวันนี้ก็ไม่ได้ต่างจากวันทั่วๆ ไปของชมรมชิมอาหารเลย เพราะงั้น..."
10016110-54 = "....มันก็สนุกดีนะ"
10016110-55 = "ฉันดีใจที่ได้ยินแบบนั้นนะคะ"
10016110-56 = "อาหารธรรมดาๆ ที่หากินได้ทั่วไปอย่างข้าวสวยกับซุปมิโสะ มักถูกมองข้ามเพราะมีรสชาติธรรมดา และเป็นรสชาติที่เราคุ้นชิน แต่... ฉันไม่เห็นด้วยกับความคิดนั้นค่ะ"
10016110-57 = "อาหารที่กินได้ทุกวันโดยไม่รู้สึกเบื่อ... นั่นคือหนึ่งในสุดยอด 'อาหารเลิศรส' แสนอร่อยแน่นอนค่ะ"
10016110-58 = "ใช่แล้วละ อาหารในงานเทศกาลที่มันๆ เยิ้มๆ แบบนี้น่ะ รสชาติมันอร่อยก็จริง แต่ให้กินบ่อยๆ ก็คง#nไม่ไหวหรอก..."
10016110-62 = "ฟุดฟิดๆ... ได้กลิ่นอะไรไหม้ๆ รึเปล่า?"
10016110-63 = "กลิ่นเหมือนตอนเผาถ่านร้อนๆ เวลารมควันอะไรสักอย่าง..."
10016110-64 = "อ๊ะ ท่าทางจะกำลังเตรียมจุด ‘แคมป์ไฟ’ กับ ‘การเต้นรำพื้นเมือง’ ในงานอาฟเตอร์ปาร์ตี้กันสินะคะ"
10016110-65 = "....เต้นรำพื้นเมือง? คืออะไรน่ะ?"
10016110-66 = "งานเต้นรำพื้นเมือง... งานเต้นรำที่เราจะเต้นไปรอบๆ แคมป์ไฟกันน่ะค่ะ"
10016110-70 = "แล้วที่เต้นรำรอบๆ แคมป์ไฟก็เพราะเราจะมีการทำบาร์บีคิวกันที่แคมป์ไฟด้วยค่ะ!"
10016110-77 = "....ใช่แล้วค่ะ แคมป์ไฟกับเนื้อ... เป็นวิธีการปรุงอาหารเลิศรสที่เกิดขึ้นจากประเพณีการทำอาหารที่มี#nมาตั้งแต่สมัยโบราณค่ะ"
10016110-78 = "ว้าว คงอร่อยน่าดูเลย!"
10016110-79 = "เอาอย่างอื่นไปย่างที่แคมป์ไฟด้วยได้มั้ย? อย่างพวกปลิงทะเล... หรือพวกหมึกน่ะ!"
10016110-80 = "ได้สิคะ แคมป์ไฟของงานฮาโลเฟสติวัลคงมีขนาดใหญ่มาก เพราะงั้นคงมีที่พอให้เอาอาหารอย่างอื่น#nไปย่างได้อยู่แล้วค่ะ"
10016110-81 = "อื้อ ดีละ! เอาปลิงทะเลกับหมึกที่เหลือไปทำน้ำโซดาอร่อยๆ กันเถอะ!"
10016110-83 = "ตอนที่คนอื่นๆ “เต้นรำพื้นเมือง” กัน พวกเราก็มาย่างหมึกแล้วนั่งกินของอร่อยให้ฉ่ำปอดกันเถอะ!"
10016110-90 = "...นี่ อาคาริ งานอาฟเตอร์ปาร์ตี้น่ะ มันไม่ใช่งานแบบนั้นไม่ใช่เหรอ..."
10016110-91 = "ปล่อยให้อิซุมิเข้าใจผิดไปแบบนั้นจะไม่เป็นไรแน่นะ?"
10016110-92 = "ฮุฮุ... ก็นะ จะทำยังไงได้ล่ะคะ"
10016110-93 = "ว่ากันว่าเรื่องแบบนี้น่ะ เป็นแค่ 'เรื่องปกติ' ที่เกิดขึ้นได้ในบรรยากาศงานเทศกาลที่เต็มไปด้วยเรื่อง#nน่าตื่นเต้นนะคะ"
10016110-94 = "[ruby=Eat or Die]'ยอมทำทุกอย่างเพื่ออาหารแสนอร่อย'[/ruby] คือคติของเรานี่คะ?"
10016110-98 = "ถ้าคุณจุนโกะเก็บโต๊ะเสร็จแล้วก็ไปกันเถอะค่ะ โอกาสที่จะได้สัมผัสประสบการณ์อาหารเลิศรส อย่างพวกหมึกย่างที่แคมป์ไฟแบบนี้ พลาดไม่ได้หรอกนะคะ  "
10016110-105 = "...นั่นสินะ คำว่าธรรมดาสำหรับพวกเรา คงหมายถึงเรื่องแบบนี้แหละ"

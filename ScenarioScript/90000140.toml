[translation]
90000140-1 = "Episode 15;Glacial Sea 1"
90000140-4 = "[ns] \"We finally made it...\""
90000140-8 = "Yes. We have arrived. "
90000140-9 = "It is not as cold as the stories would have you believe. At least there is no wind to impede movement."
90000140-10 = "Who cares about movement?! It's bitterly cold. Freezing. Chilling. I can feel my blood slowing in my veins."
90000140-11 = "[s] \"You're dressed for the weather, Himari.\""
90000140-12 = "Of course. I must take care of this delicate yet incredibly intelligent brain. Cold like this is the arch-enemy of a genius like me."
90000140-13 = "I'm wearing two insulated suits to ensure the cold doesn't come near my soft, perfect skin. It's somewhat awkward and clunky, but at least I'm not like that monstrosity over there..."
90000140-14 = "Yes, over there."
90000140-20 = "My body feels so light. Is it the cool air here? "
90000140-30 = "Yes. My condition is excellent. This is good."
90000140-31 = "Eimi. I suppose there's no other way to broach the topic than head on. Have you had even a single moment of self-reflection on this journey? Any consideration for your life choices?"
90000140-32 = "Hm? What? Did I do something?"
90000140-41 = "...My outfit?"
90000140-42 = "Yes. I worked very hard on it. In fact, Sensei helped me."
90000140-43 = "Sensei...?"
90000140-44 = "Sensei?"
90000140-45 = "[s1] \"Don't ask... It's a long story...\"\n[s2] \"I really did try...\""
90000140-48 = "...Understood. My colleague is enjoying herself, so I have no complaints."
90000140-49 = "In fact, it is rare to see Eimi express such excited, positive emotions. Good job, Eimi."
90000140-50 = "You shrug things off so easily... It seems I have no power here."
90000140-51 = "*sigh* Let's get this over with and return to Millennium quickly."
90000140-52 = "Now, the pseudo-Decagrammaton signal originated from around here. We'll need to confirm if a new prophet or entity is residing here, or if it was simply a red herring."
90000140-53 = "The two of you will begin canvassing the area while Sensei and I set up base at a safe location."
90000140-54 = "Understood."
90000140-55 = "Yes, ma'am."

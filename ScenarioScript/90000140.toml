90000140-27 = "1;토키 모드 2;02\n5;히마리 방한복;05\n#1;h\n#5;h\n#wait;1500"
90000140-28 = "1;토키 모드 2;02\n5;히마리 방한복;05\n#1;h\n#5;h\n#1;em;…\n#5;em;…\n#wait;2500"
90000140-29 = "1;토키 모드 2;02\n5;히마리 방한복;05\n4;에이미 수영복ND;00\n#1;hide\n#5;hide\n#4;m3\n#4;hophop\n#wait;1000"
90000140-30 = "4;에이미 수영복ND;03;응. 컨디션 최고조야. 문제없어.\n#4;greeting\n#4;em;[반짝]"
90000140-31 = "4;에이미 수영복ND;03\n5;히마리 방한복;02;에이미…… 지금까지 말할 타이밍을 놓쳐서 그러는데요. 뭔가 이상한 걸 깨닫거나, 혹은 스스로를 돌아보거나 뭐 그런 건 없었나요?\n#4;m1\n#5;al"
90000140-32 = "4;에이미 수영복ND;02;응? 뭐? 어떤 거?"
90000140-33 = "#st;[0,0];instant;1;"

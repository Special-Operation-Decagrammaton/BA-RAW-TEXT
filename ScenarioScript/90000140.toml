[translation]
90000140-1 = "第15話;冰海（１）"
90000140-4 = "[ns]「到了……」"
90000140-8 = "是的，總算抵達了。"
90000140-9 = "氣溫雖然偏低，所幸風並沒有強到會影響移動。#n應該還撐得住。"
90000140-10 = "才沒有，明明就超冷的好嗎？#n連海都被結凍了哦？這裡可是極地哦？"
90000140-11 = "[s]「你準備的真周到呢，陽葵。」"
90000140-12 = "沒錯，對我這種清楚系病弱美少女來說，寒冷是最棘手的敵人。#n簡直就像宿敵一樣。"
90000140-13 = "所以我穿了兩件自己改造的隔熱衣。#n雖然現在身體變得很笨重，但總比著涼來的好……"
90000140-14 = "呀齁～"
90000140-20 = "總覺得身體比平常輕盈。#n是因為很涼爽的關係嗎？"
90000140-30 = "嗯，簡直狀態絕佳。"
90000140-31 = "英美……我之前一直沒找到問你這個問題的機會。#n你有沒有感覺自己哪裡怪怪的？或是試著回頭看看自己？"
90000140-32 = "嗯？什麼意思？"
90000140-41 = "啊，是指這套服裝嗎？"
90000140-42 = "這是老師和我一起想出來的，還挺費心的哦？"
90000140-43 = "老師……？"
90000140-44 = "老師？"
90000140-45 = "[s1]「這說來話長……拜託別問我……」\n[s2]「呃……那個，不知不覺就……」"
90000140-48 = "……原來如此。#n既然夥伴覺得開心，我也沒意見。"
90000140-49 = "而且好久沒看到英美這麼開心了。#n這或許也是好事一樁。"
90000140-50 = "這麼容易就接受了嗎……#n算了，現在怎樣都無所謂。"
90000140-51 = "唉……既然已經來到這裡，我們就專心執行任務，盡快回千年吧。"
90000140-52 = "我們是追著十字神名的信號來到這裡。#n任務的目標很簡單──那就是找遍這裡，確認是否有異常。"
90000140-53 = "在你們兩位搜查這附近的同時，#n我和老師會找出這片極地的安全地點，當成我們暫作停留的營地。"
90000140-54 = "嗯，了解。"
90000140-55 = "是的，主人。"

90000140-1 = "#title;제15화;빙해 1"
90000140-2 = "#wait;6500"
90000140-3 = "#wait;2500"
90000140-4 = "[ns] \"결국 여기까지 와버렸구나…….\""
90000140-5 = "#st;[0,0];instant;1;"
90000140-6 = "#clearST"
90000140-7 = "3;토키 모드 2;99\n#3;a\n#wait;1000"
90000140-8 = "3;토키 모드 2;99;네. 겨우 도착한 것 같네요. \n#3;greeting"
90000140-9 = "3;토키 모드 2;01;꽤 추운 날씨이지만, 그래도 바람이 불지 않아서 움직이는 데 문제는 없습니다. 어느 쪽이냐면 견딜만한 정도일까요."
90000140-10 = "3;토키 모드 2;01\n5;히마리 방한복;11;전혀 아닌데요. 엄청 춥거든요? 바다가 얼어붙을 정도잖아요? 극한지잖아요?\n#3;m1\n#5;al\n#5;em;[반응]"
90000140-11 = "[s] \"꽤 준비 많이 했구나, 히마리.\""
90000140-12 = "5;히마리 방한복;10;네. 저 같은 청초병약계열의 미소녀에게 추위는 최악의 적이니까요. 아치 에너미 같은 거예요. 숙적 같은 거예요."
90000140-13 = "5;히마리 방한복;05;덕분에 방열 슈트를 개조해서 두 겹이나 껴입었거든요? 덕분에 지금 몸이 엄청 둔해진 느낌이 들지만, 그래도 추운 것보단……."
90000140-14 = "3;토키 모드 2;01\n5;히마리 방한복;05\n#na;에이미 수영복ND;안녕~\n#3;h\n#5;h"

[translation]
90000140-1 = "ตอนที่ 14;ธารน้ำแข็ง 1"
90000140-4 = "[ns] \"ในที่สุดก็มากันถึงที่นี่เลยสินะ...\""
90000140-8 = "ใช่ค่ะ มาถึงที่นี่กันจนได้ "
90000140-9 = "ถึงอากาศจะค่อนข้างหนาว แต่ยังไงก็ไม่มีลมพัด งั้นก็คงไม่มีอุปสรรคในการทำงานค่ะ"
90000140-10 = "ไม่เลยค่ะ ฉันว่านี่มันหนาวมากเลยค่ะ ขนาดทะเลยังกลายเป็นน้ำแข็งทั้งผืนเลยนะคะ หนาวเข้ากระดูก#nเลยละค่ะ"
90000140-11 = "[s] \"เตรียมตัวมาดีจังเลยนะ ฮิมาริ\""
90000140-12 = "ใช่ค่ะ เพราะสำหรับผู้มีรอยยิ้มฮีลใจที่สวยสดใสแต่อ่อนแอแบบฉันแล้ว ความหนาวถือว่าเป็นศัตรูตัวฉกาจเลยละค่ะ"
90000140-13 = "เพราะแบบนี้ ฉันถึงต้องสร้างชุดสูทปล่อยความร้อนขึ้นมาแล้วใส่มาถึงสองชั้นเลย ตอนนี้ฉันรู้สึกหนักตัวมาก แต่ก็ยังดีกว่าต้องทนหนาวค่ะ..."
90000140-14 = "สวัสดี~"
90000140-20 = "รู้สึกตัวเบาหวิวกว่าปกติเลยละ เพราะว่าอากาศเย็นสบายรึเปล่านะ? "
90000140-30 = "อื้ม ร่างกายฉันพร้อมมาก ไม่มีปัญหาอะไรให้กังวล"
90000140-31 = "เอมิ... พอดีว่าฉันถูกขัดจังหวะพูดไปนิดหน่อยน่ะค่ะ คือว่า... รู้สึกถึงอะไรแปลกๆ บ้างไหมคะ หรือว่าได้ส่องกระจกก่อนออกมารึเปล่า?"
90000140-32 = "หืม? อะไร? อะไรเหรอ?"
90000140-41 = "อ๋อ ชุดนี้น่ะเหรอ?"
90000140-42 = "นี่คือผลลัพธ์จากการครุ่นคิดของฉันกับคุณครูเลยนะ ฉันอุตส่าห์ตั้งใจเลือกมาเลย..."
90000140-43 = "คุณครู...?"
90000140-44 = "คุณครู?"
90000140-45 = "[s1] \"เรื่องมันจะยาวน่ะ... อย่าถามอะไรจากครูเลยนะ...\"\n[s2] \"อืม... ก็ช่วยกันคิดไปคิดมาจนได้ชุดนี้...\""
90000140-48 = "อย่างนั้นเหรอคะ ถ้าพวกพ้องสนุกกับงาน ฉันก็ไม่มีปัญหาอะไรค่ะ"
90000140-49 = "แล้วเราก็ไม่ได้เห็นเอมิที่สดชื่นแบบนี้มานานแล้วด้วยค่ะ อะไรดีก็ว่าดีเถอะค่ะ"
90000140-50 = "เห็นด้วยง่ายขนาดนั้นเลยเหรอคะ... เอาเถอะค่ะ ตอนนี้คงไม่สำคัญแล้ว... "
90000140-51 = "เฮ้อ... ในเมื่อมาถึงที่นี่แล้วก็โฟกัสกับงานก่อนแล้วกันค่ะ เราจะรีบตรวจสอบให้เสร็จแล้วกลับมิลเลเนียมกันค่ะ"
90000140-52 = "เอาละ พวกเราติดตามสัญญาณได้จนมากันไกลถึงตรงนี้ เป้าหมายของพวกเราก็ง่ายๆ ค่ะ นั่นคือการค้นทุกซอกทุกมุมที่นี่เพื่อตรวจสอบว่ามีสิ่งผิดปกติรึเปล่า"
90000140-53 = "ระหว่างที่ทั้งสองคนค้นหาแถวนี้ ฉันกับคุณครูจะไปหาที่ปลอดภัยในพื้นที่หนาวสุดขั้วนี้แล้วตั้งเป็นค่าย#nสำรวจชั่วคราวของเราค่ะ"
90000140-54 = "อื้ม เข้าใจแล้ว"
90000140-55 = "ค่ะ มาดาม"

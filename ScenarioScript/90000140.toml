90000140-39 = "3;토키 모드 2;04\n#3;d\n#wait;1000"
90000140-40 = "3;에이미 수영복ND;01\n#3;a\n#wait;1000"
90000140-41 = "3;에이미 수영복ND;00;아아, 이 복장?"
90000140-42 = "3;에이미 수영복ND;02;이건 선생님이랑 나랑 같이 고민한 결과물이야. 나름 신경 쓴 건데?"
90000140-43 = "3;히마리 방한복;02;선생님……?\n#3;em;…"
90000140-44 = "3;토키 모드 2;02;선생님?"
90000140-45 = "[s1] \"말하자면 길어…. 나에게 묻지 말아줘…….\"\n[s2] \"으응…… 뭐, 어쩌다보니…….\""
90000140-46 = "#wait;100"
90000140-47 = "#wait;100"
90000140-48 = "3;토키 모드 2;99;……그렇군요. 동료가 즐겁다면 저도 문제없습니다."
90000140-49 = "3;토키 모드 2;03;게다가 이렇게 쾌활해진 에이미는 오랜만에 보는 것 같으니까요. 좋은 게 좋은 것이라고 배웠습니다."
90000140-50 = "3;히마리 방한복;06;그렇게 쉽게 납득해버려도…… 아니, 이젠 아무래도 상관없으려나……."
90000140-51 = "3;히마리 방한복;06;하아…… 일단 여기까지 왔으니까 임무에 집중하죠. 얼른 끝내고 밀레니엄으로 돌아가는 거예요.\n#3;em;[한숨]"
90000140-52 = "3;히마리 방한복;05;자, 저희는 데카그라마톤의 신호를 추적해서 여기까지 왔어요. 우리들의 목표는 간단합니다. 이곳을 샅샅이 뒤져서 이상한 것이 있는지 확인하는 것."
90000140-53 = "3;히마리 방한복;11;두 분이 이 주변을 수색하는 동안 저와 선생님은 이 극한지의 안전한 곳을 찾아 임시로 머물 베이스캠프를 확보해 두겠습니다."
90000140-54 = "3;에이미 수영복ND;03;응, 알았어.\n#3;greeting"
90000140-55 = "3;토키 모드 2;99;예스, 맴."
90000140-56 = "#all;hide"

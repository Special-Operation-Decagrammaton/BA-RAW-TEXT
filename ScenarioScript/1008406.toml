[translation]
1008406-1 = "เสียงสะท้อน"
1008406-7 = "แฮ่ก... แฮ่ก...!"
1008406-8 = "ทำไมอยู่ๆ ก็... จะชวนไปให้ถึงยอดเขาล่ะคะ?"
1008406-9 = "ต่อให้ไม่ขึ้นไปถึงยอดเขา แต่ก็บันทึกเสียงที่น่าฟังได้อยู่นะคะ..."
1008406-10 = "อีกอย่าง บนยอดเขาลมก็แรง ต้นไม้ก็มีน้อย ทำให้เกิดเสียงรบกวนได้ง่ายด้วย..."
1008406-11 = "[s] \"แต่โคทามะบอกเองไม่ใช่เหรอว่าเสียงที่หาฟังได้ยากจะยิ่งมีคุณค่าน่ะ?\""
1008406-12 = "อึ่ก..."
1008406-13 = "ไม่คิดเลยค่ะว่าสิ่งที่ฉันพูดจะเป็นโซ่ตรวนที่มัดฉันไว้เอง..."
1008406-14 = "[s1] \"มาออกแรงเดินอีกนิดเถอะ\"\n[s2] \"ยอดเขาอยู่ไม่ไกลแล้ว!\""
1008406-17 = "อึก..."
1008406-18 = "พออยู่กับรองหัวหน้าบ่อยๆ คุณครูก็ติดนิสัยของรองหัวหน้าไปด้วยนะคะเนี่ย..."
1008406-27 = "มาถึง... สักที"
1008406-28 = "ฉันขาสั่นจนก้าวไม่ออกแล้วค่ะ..."
1008406-32 = "คุณครู...? มีอะไรน่าสนใจอยู่ที่ฝั่งตรงข้ามของภูเขาเหรอคะ?"
1008406-37 = "[ns] \"ยะฮู้ว...\""
1008406-41 = "ยะฮู้ว..ว..ว"
1008406-43 = "[ns3] \"โคทามะ เมื่อกี้ได้ยินรึเปล่า?\"\n[ns4] \"เสียงของครูดังมาจากอีกฝั่งของภูเขาด้วย\""
1008406-46 = "งั้นเหรอคะ เป็นเสียงสะท้อนสินะคะ"
1008406-47 = "น่าจะเป็นเพราะอากาศหนาว สุมทุมพุ่มไม้ก็เลยมีไม่เยอะ เสียงสะท้อนจึงดังชัดเจนกว่าปกติน่ะค่ะ"
1008406-48 = "[s5] \"ดูไม่ค่อยสนใจเหมือนที่เป็นตามปกติเลย\"\n[s6] \"เหนื่อยเพราะขึ้นเขามาเหรอ?\""
1008406-51 = "ไม่หรอกค่ะ ฉันไม่ได้เหนื่อยขนาดนั้น..."
1008406-52 = "ที่จริงฉันไม่ค่อยชอบเสียงสะท้อนน่ะค่ะ"
1008406-53 = "[s] \"ทำไมล่ะ?\""
1008406-54 = "มันรบกวนการบันทึกเสียงน่ะค่ะ..."
1008406-58 = "เสียงสะท้อนเป็นปรากฏการณ์ที่เกิดขึ้นเมื่อเสียงเดิมไปกระทบกับกำแพงจนสะท้อนกลับมา ซึ่งโดยปกติจะสะท้อนกลับมาทันทีหลังจากที่เสียงดังขึ้นค่ะ"
1008406-59 = "เพราะงั้น คนที่อยู่กับเครื่องบันทึกเสียงอย่างฉันจะพยายามควบคุมสิ่งแวดล้อมเพื่อไม่ให้เกิดเสียง#nสะท้อนค่ะ"
1008406-60 = "แต่ตราบใดที่ไม่ได้บันทึกเสียงในพื้นที่ว่างเปล่า ยังไงก็จะเกิดเสียงสะท้อนเสมอ เพราะแบบนั้นมันก็เลยรบกวนการเกิดเสียงเดิมค่ะ"
1008406-61 = "เหมือนกับตอนนี้ค่ะ ฉันอยากบันทึกเสียงพูดแบบชัดๆ ของคุณครูมากกว่า..."
1008406-62 = "[s] \"เพราะอย่างนี้ถึงไม่ชอบเสียงสะท้อนสินะ...\""
1008406-64 = "[ns] \"แต่ถ้าลองฟังดู มันก็มีความงดงามในแบบตัวเองเหมือนกันอยู่นะ?\""
1008406-65 = "ไม่หรอกค่ะ ถ้ายังมีเสียงเดิมอยู่ เสียงสะท้อนก็เกิดขึ้นใหม่ได้ตลอดเวลา"
1008406-66 = "ท้ายที่สุดแล้ว เสียงสะท้อนก็เป็นแค่เสียงเดิมที่เสื่อมสภาพค่ะ"
1008406-67 = "ตามเรื่องเล่าโบราณ ว่ากันว่าเสียงสะท้อนคือเสียงของปีศาจต้นไม้ที่ชื่อว่า 'โคดามะ' ที่อาศัยอยู่ในป่าค่ะ"
1008406-68 = "และตอนเด็กๆ ฉันก็เคยโดนล้อเพราะเรื่องนั้น"
1008406-69 = "เสียงสะท้อนก็เลยเป็นปรากฏการณ์ที่ฉันไม่ชอบค่ะ ไม่ว่าจะเป็นเสียงสะท้อนจากอะไรก็ตาม"
1008406-70 = "[s] \"แต่จะคิดว่ามันเป็นเสียงที่เสื่อมสภาพทุกครั้งไม่ได้หรอกนะ\""
1008406-71 = "ทำไมล่ะคะ?!"
1008406-72 = "เสียงรบกวนที่แค่เลียนแบบคลื่นของเสียงต้นฉบับ เสียงแบบนี้มีความหมายพิเศษอื่นด้วยเหรอคะ?"
1008406-73 = "[s7] \"อย่างเช่นเสียงสะท้อนที่ได้ยินบนภูเขากับในถ้ำนั้นต่างกันยังไงละ\"\n[s8] \"ในเสียงสะท้อนยังมีคุณสมบัติของตัวกลางในการถ่ายทอดเสียงด้วยนะ\""
1008406-76 = "[ns] \"เพราะงั้นสุดท้ายแล้วเสียงเดิมที่ไม่ดัง อาจจะไม่มีอยู่จริงก็ได้\""
1008406-80 = "คารมคมคายจังเลยนะคะ..."
1008406-81 = "ต่อให้คุณครูจะพูดอย่างนั้น ฉันก็ไม่เปลี่ยนใจมาชอบเสียงสะท้อนหรอกค่ะ"
1008406-82 = "แต่ว่า..."
1008406-89 = "ยะฮู้ว…"
1008406-93 = "ยะฮู้ว..ว..ว"
1008406-97 = "ถ้าเป็นเสียงสะท้อนจากเสียงของคุณครูละก็ มันอาจจะมีคุณค่าในความหมายอื่นก็ได้ค่ะ"
1008406-98 = "แน่นอนว่าเสียงของคุณครูมีคุณค่าเสมอ ต่อให้มีเสียงรบกวนเล็กน้อยปนอยู่ด้วยก็ตามทีค่ะ"
1008406-99 = "เสียงของคุณครูที่ได้ยินผ่านเสียงสะท้อนจากภูเขาก็คือเสียงของคุณครูที่มีเสียงของ 'โคทามะ' ปนอยู่ด้วย"
1008406-105 = "คุณครูคะ ถ้าคุณครูไม่ว่าอะไร เรามาตะโกนไปภูเขาฝั่งตรงข้ามด้วยกันมั้ยคะ?"
1008406-106 = "เสียงประสานพิเศษที่มาจากการผสมกันของเสียงคุณครูกับเสียงของฉัน... ที่หาฟังได้จาก#nที่แห่งนี้เท่านั้น"
1008406-107 = "ฉันอยากได้ยินและชื่นชมเสียงนั้นค่ะ"
1008406-109 = "(จากนั้นคุณครูกับโคทามะก็สนุกกับการตะโกนบนยอดเขา และลงจากเขามาด้วยกัน)"

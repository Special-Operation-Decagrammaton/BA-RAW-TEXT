1008406-66 = "3;코타마 캠핑;01;메아리는 결국 원본 음성의 열화판에 불과하니까요."
1008406-67 = "3;코타마 캠핑;99;어느 오래된 전승에 따르면 메아리는 산속에 사는 '코다마' 라는 나무 요괴의 목소리라는 설도 있는데……"
1008406-68 = "3;코타마 캠핑;04;어릴 적에는 그 때문에 놀림을 당한 적도 있어서."
1008406-69 = "3;코타마 캠핑;05;……정말 어떤 의미로든 좋아할 수가 없는 현상입니다.\n#3;stiff"

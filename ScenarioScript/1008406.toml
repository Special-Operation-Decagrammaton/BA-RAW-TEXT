[translation]
1008406-1 = "Echo"
1008406-7 = "*huff* *huff*"
1008406-8 = "Why...do we have to climb...to the top all of a sudden?"
1008406-9 = "There are plenty of good sounds at the bottom of the mountain."
1008406-10 = "Plus, there's not a lot of trees up there, so it's super windy."
1008406-11 = "[s] \"But weren't you the one who said rare sounds have more value?\""
1008406-12 = "Ugh..."
1008406-13 = "I can't believe my own words got used against me."
1008406-14 = "[s1] \"Just a little further.\"\n[s2] \"I mean it, we're so close to the top!\""
1008406-17 = "Ugh..."
1008406-18 = "Sensei, I think hanging around our vice president has been a bad influence on you."
1008406-27 = "We're...here."
1008406-28 = "My legs are shaking. I can't take another step..."
1008406-32 = "Wait... Sensei, what's that across the mountain?"
1008406-37 = "[ns] \"Hello!\""
1008406-41 = "He...llo..."
1008406-43 = "[ns3] \"You hear that, Kotama?\"\n[ns4] \"I can hear myself from across the mountain.\""
1008406-46 = "...I see. It's an echo."
1008406-47 = "Due to the lack of foliage, the echo comes through loud and clear."
1008406-48 = "[s5] \"You don't seem as motivated as before.\"\n[s6] \"Are you tired from the hike?\""
1008406-51 = "It's not that I'm tired..."
1008406-52 = "I just don't like echoes that much."
1008406-53 = "[s] \"Why's that?\""
1008406-54 = "They get in the way of my recordings."
1008406-58 = "Echoes are a phenomenon where the original sound reflects against a wall then spreads out. It typically creates a reverberation, a sort of response to the original sound."
1008406-59 = "For people who use professional recording devices like me, we work hard to minimize the amount of echo in our environment."
1008406-60 = "Unless we record in a total vacuum, you're bound to get echoes and it distorts your recording of the original sound."
1008406-61 = "I just wanted to get a cleaner recording of Sensei's voice..."
1008406-62 = "[s] \"So that's why you don't like them...\""
1008406-64 = "[ns] \"But in a way, don't you think they could also be fun?\""
1008406-65 = "No. As long as I have the original recording, I can make my own echo."
1008406-66 = "In the end, an echo is nothing more than a cheap copy of a sound."
1008406-67 = "In old folklore, they say that echoes are the voices of tree-youkai called \"kodama\"."
1008406-68 = "Because my name sounds similar, kids used to make fun of me for it."
1008406-69 = "So I don't think I'll ever have any love for that phenomenon."
1008406-70 = "[s] \"Hmm, are you sure it's really just a cheap knock-off of a sound?\""
1008406-71 = "How could it not be?"
1008406-72 = "An echo is nothing more than an imperfect replica. What meaning could it possibly have?"
1008406-73 = "[s7] \"Just like how an echo sounds different in a cave versus a mountain...\"\n[s8] \"An echo is a reflection of the medium that made it.\""
1008406-76 = "[ns] \"A sound that doesn't make an echo may not even exist.\""
1008406-80 = "...Nonsense."
1008406-81 = "Waxing philosophical isn't going to make me change my mind on echoes."
1008406-82 = "B-But..."
1008406-89 = "Hello!"
1008406-93 = "He...llo..."
1008406-97 = "If that echo contains Sensei's voice, maybe it has a different sort of value."
1008406-98 = "Just like how your voice sounds pleasant even if other noises get mixed in."
1008406-99 = "The mountain creates an echo of your voice. In a way, maybe I'm a \"kodama\" who also mixes together their own echo."
1008406-105 = "Hey, Sensei. Do you want to scream at the mountain together?"
1008406-106 = "Let's make our own echo. A harmonic blend of our voices."
1008406-107 = "A sound we can only enjoy in a place like this."
1008406-109 = "Together, Kotama and I joyously shouted at the mountain, then headed back home."

[translation]
1008406-1 = "回音"
1008406-7 = "哈啊，哈啊……"
1008406-8 = "為什麼突然……說要爬上山頂？"
1008406-9 = "就算不爬到山頂，我們也能錄到很多不錯的聲音啊……"
1008406-10 = "而且山頂不只風強又沒什麼樹木，很容易錄到雜音……"
1008406-11 = "[s]「可是你不是說越是平常難聽到的聲音，錄下來的價值就越大嗎？」"
1008406-12 = "唔……"
1008406-13 = "沒想到竟然被自己說過的話反擊了……"
1008406-14 = "[s1]「我們再努力一下吧。」\n[s2]「山頂就不遠了！」"
1008406-17 = "唔……"
1008406-18 = "都是因為跟副部長走得太近的關係，老師才會學壞……"
1008406-27 = "終於到了……"
1008406-28 = "我的腳抖個不停，真的連一步都走不了了……"
1008406-32 = "老師……？#n山的對面有什麼特別的東西嗎？"
1008406-37 = "[ns]「呀齁～～～」"
1008406-41 = "呀齁～～"
1008406-43 = "[ns3]「小玉，你有聽到嗎？」\n[ns4]「我的聲音從對面傳回來了。」"
1008406-46 = "……原來如此，是回音啊。"
1008406-47 = "我猜可能是因為天氣冷和草叢低的關係，回音聽起來才會比平時更大聲也更清晰吧。"
1008406-48 = "[s5]「……你看起來好像沒有平常那麼興奮。」\n[s6]「是因為爬山太累的關係嗎？」"
1008406-51 = "不，我也沒有累到那種程度……"
1008406-52 = "老實說，我不太喜歡回音這種東西。"
1008406-53 = "[s]「為什麼呢？」"
1008406-54 = "……因為會妨礙我錄音。"
1008406-58 = "所謂的回音就是被反彈而擴散的聲音。#n這種像是有人在回話一樣的迴響現象，通常會在原本的聲音發出後立即產生。"
1008406-59 = "因此像我這種經常使用專業錄音器材的人，#n在錄音時都會盡可能控管周圍環境，以降低回音發生的可能性。"
1008406-60 = "然而只要不是在空無一物的地方錄音，回音就是無可避免的現象。#n這也是我們難以用錄音完整重現原聲的阻礙之一。"
1008406-61 = "像現在也是，我本來想錄下老師更清晰的聲音……"
1008406-62 = "[s]「原來你不喜歡回音啊……」"
1008406-64 = "[ns]「不過你不覺得回音聽起來有種獨特的風情嗎？」"
1008406-65 = "不覺得。#n因為只要有原本的聲音，我輕輕鬆鬆就能製造出[ruby=Echo]回音[/ruby]。"
1008406-66 = "說到底，回音只不過是劣化版的原聲罷了。"
1008406-67 = "其實以前還有個古老的傳說，說那些回音其實都是山裡的「木靈」發出來的聲音……"
1008406-68 = "我小時候還曾因為這個傳說被別人取笑呢。"
1008406-69 = "……因此無論從哪個角度來看，我都不覺得這個現象有多討喜。"
1008406-70 = "[s]「可是我不認為回音只是原聲的劣化版哦。」"
1008406-71 = "那又是為什麼呢？"
1008406-72 = "回音只不過是複製部分原聲波波形所形成的雜音，除此之外還有什麼價值嗎？"
1008406-73 = "[s7]「就好比山裡的回音和洞窟裡的回音有些許不同……」\n[s8]「傳遞聲音的媒介也是形成回音的因素之一。」"
1008406-76 = "[ns]「所以說不定回音裡頭會出現原本不存在的聲音喔。」"
1008406-80 = "……老師，你這是強詞奪理。"
1008406-81 = "所以就算你這麼說，我也不會因此喜歡上回音。"
1008406-82 = "不過……"
1008406-89 = "呀齁～～～"
1008406-93 = "呀齁～～"
1008406-97 = "……如果是老師說話的回音，說不定能另當別論呢。"
1008406-98 = "就算其中參雜了些許雜音，肯定也很有價值……"
1008406-99 = "畢竟老師在山裡製造出來的回音，就等於是老師和「木靈」的聲音融合而成的結晶。"
1008406-105 = "……老師，可以朝山的對面大喊幾聲嗎？"
1008406-106 = "這種由我們兩人的聲音製造出來的特殊合音……只有在這裡才能聽得到。"
1008406-107 = "所以我想要好好欣賞欣賞。"
1008406-109 = "（之後和小玉在山頂上盡情吶喊了好一陣子才下了山）"

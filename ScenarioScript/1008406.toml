1008406-58 = "3;코타마 캠핑;02;메아리는 원본이 되는 소리가 본래의 음성이 벽에 반사되어 울려 퍼지는 현상으로, 보통은 소리가 난 직후에 대답하듯 반향을 일으키곤 합니다."
1008406-59 = "3;코타마 캠핑;05;때문에 저처럼 전문적인 녹음 기기를 다루는 사람들은 메아리가 가능한 발생하지 않도록 환경을 통제하는 데 여러 가지 노력을 기울이지요."
1008406-60 = "3;코타마 캠핑;99;하지만 아무것도 없는 공허에서 녹음을 하지 않는 한, 메아리는 무조건 발생하기 때문에 본래의 음성을 재현하는 데 여러 가지 방해를 끼칩니다."
1008406-61 = "3;코타마 캠핑;06;지금도 그렇지만 좀 더 또렷한 선생님의 목소리를 녹음하고 싶었는데……\n#3;em;[속상함]\n#3;stiff"

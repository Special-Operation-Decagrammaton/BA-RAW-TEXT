[translation]
1600502-1 = "說到夏天的海邊……"
1600502-2 = "（抵達海邊後，看見身在遠處的弦生）"
1600502-6 = "（周圍非常安靜……可以說是杳無人煙。弦生不斷東張西望，好像在尋找什麼東西）"
1600502-7 = "……"
1600502-8 = "[s1] 「弦生，讓你久等了！」\n[s2] 向弦生揮手"
1600502-9 = "……！！"
1600502-10 = "……！！"
1600502-11 = "您，您好……老師……！"
1600502-12 = "謝，謝謝您願意來赴約。今，今天之所以會聯絡您……"
1600502-13 = "是因為需要老師的幫忙，光靠我一個人有點困難……"
1600502-14 = "……"
1600502-15 = "[s3] 「需要幫什麼忙呢？」\n[s4] 「妳好像在找什麼東西的樣子。」"
1600502-16 = "啊，是的，其實與其說在找東西……"
1600502-17 = "啊，是的，其實與其說在找東西……"
1600502-18 = "那個，從頭開始說明的話……"
1600502-20 = "（一小時前）"
1600502-24 = "……嘻嘻……嘻嘻嘻嘻嘻！！"
1600502-25 = "大海……！沙灘……！！！！！烈日！！！！"
1600502-26 = "青春……！青春的大海……！"
1600502-28 = "嘻嘻嘻嘻嘻嘻嘻！！！！"
1600502-29 = "嘻嘻……？"
1600502-31 = "嚇咿……！？那，那是什麼？"
1600502-32 = "……啊？"
1600502-33 = "海，海邊有奇怪的東西……"
1600502-34 = "怪，怪物……？不，是妖怪！？"
1600502-35 = "……？"
1600502-36 = "妖怪……？"
1600502-37 = "安靜點！她跑來這邊可就完了，我們快走吧！"
1600502-38 = "說，說的也是。反正附近的店家也陸續收攤了……"
1600502-39 = "讓她保持在視線裡，慢慢離開吧。#n要是眼睛對上了也不要挪開視線，而是要慢慢往後退……！"
1600502-40 = "……？？？"
1600502-41 = "（吵吵嚷嚷……）"
1600502-44 = "……"
1600502-47 = "咦……？"
1600502-49 = "於，於是現在這裡，只剩下我一個人而已……"
1600502-50 = "一想到這樣下去，會沒辦法看見像書裡寫的那樣，閃耀熱鬧的夏日光景……"
1600502-51 = "就覺得我必須找出那個「妖怪」，並將祂消滅掉……"
1600502-52 = "[s] 「……」"
1600502-54 = "[s] 「……！」"
1600502-55 = "但找了好久卻一直找不到……也不知道祂是不是消去氣息了……"
1600502-56 = "所，所以才會連絡老師，不知道老師有沒有什麼好辦法？"
1600502-57 = "[s] 「我想，那個應該是……」"
1600502-58 = "……老師？"
1600502-59 = "[s] 「……」"
1600502-61 = "[s5] 「這是個難題呢……」\n[s6] （說不出口，我實在說不出口……！）"
1600502-62 = "老，老師？怎麼把臉偏向奇怪的方向？難道說妖怪就在那裡……？"
1600502-63 = "老，老師？怎麼把臉偏向奇怪的方向？難道說妖怪就在那裡……？"
1600502-64 = "咦？沒事嗎……？是，是嗎，對不起……"
1600502-65 = "因為我看您突然露出一副恍然大悟的表情……"
1600502-66 = "但該怎麼辦呢……再這樣下去……"
1600502-67 = "都來到海邊了，現在卻好像……變得和故事中的海邊不一樣了……"
1600502-68 = "該，該怎麼辦呢……"
1600502-69 = "還是說應該放棄尋找，直接前往其他海邊呢？"
1600502-70 = "[s7] （那樣會擴大受害範圍……）\n[s8] 沉思"
1600502-71 = "我，我到底該怎麼做……"
1600502-72 = "我，我到底該怎麼做……"
1600502-73 = "嗯……"
1600502-74 = "……那，那個。"
1600502-75 = "果然太強人所難了嗎……我這一生都無法體會書中那種氣氛……"
1600502-76 = "……？"
1600502-77 = "您說這種寂靜的海邊也不錯……？"
1600502-78 = "的，的確，現在這狀況下的海確實很漂亮沒錯……"
1600502-79 = "[s9] 「而且兩人獨處，聽起來也很不錯呀。」\n[s10] 「兩人獨處的海邊，不覺得很浪漫嗎？」"
1600502-80 = "這，這麼說也對……"
1600502-81 = "這，這麼說也對……"
1600502-82 = "兩人獨處的海邊……"
1600502-83 = "……兩人獨處……"
1600502-84 = "……？"
1600502-85 = "……兩人，獨處？"
1600502-86 = "……！！！？！？"
1600502-87 = "[s] 「……弦生？」"
1600502-88 = "……嘰……"
1600502-89 = "[s] 「……嘰？」"
1600502-90 = "……嘰耶耶耶耶耶！！！"
1600502-93 = "（……？）"
1600502-95 = "（……變成孤獨一人的海邊了）"

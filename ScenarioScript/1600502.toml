[translation]
1600502-1 = "พรายสาวแห่งทะเลฤดูร้อน"
1600502-2 = "(พอมาถึงชายทะเลก็เห็นซึรุกิเดินทอดน่องอยู่ไกลๆ)"
1600502-6 = "(บริเวณรอบๆ ช่างปลอดโปร่งและเงียบสงบ และซึรุกิกำลังมองชะเง้อไปรอบๆ เหมือนกำลังหาอะไรอยู่)"
1600502-7 = "..."
1600502-8 = "[s1] \"ว่าไงซึรุกิ\"\n[s2] โบกมือทักทาย"
1600502-9 = "...!!"
1600502-10 = "...!!"
1600502-11 = "สะ... สวัสดีค่ะคุณครู...!"
1600502-12 = "ขอบคุณที่มาหานะคะ ทะ... ที่ฉันติดต่อไปวันนี้ก็เพราะ... เอ่อ..."
1600502-13 = "ฉันต้องการความช่วยเหลือจากคุณครู เพราะเรื่องนี้ฉันทำคนเดียวคงจะยากสักหน่อยค่ะ..."
1600502-14 = "..."
1600502-15 = "[s3] \"ให้ครูช่วยอะไรเหรอ?\"\n[s4] \"เหมือนกำลังหาอะไรอยู่เลยนะ?\""
1600502-16 = "เอ่อ.. ค่ะ ที่จริงฉันกำลังหาบางอย่างอยู่..."
1600502-17 = "เอ่อ.. ค่ะ ที่จริงฉันกำลังหาบางอย่างอยู่..."
1600502-18 = "คือเรื่องมีอยู่ว่า..."
1600502-20 = "(หนึ่งชั่วโมงก่อน)"
1600502-24 = "ฮิฮิ... คิคิคิ ฮี่ๆๆ!!"
1600502-25 = "ทะเล...! หาดทราย...!!!!! แดดจ้า...!!!!"
1600502-26 = "วัยว้าวุ่น...! ทะเลของวัยว้าวุ่น...!!"
1600502-28 = "กร๊ากๆๆๆๆ!!!"
1600502-29 = "คิกๆ... หืม...?"
1600502-31 = "เอ๋?! นั่นมันอะไรน่ะ?!"
1600502-32 = "หืม...?"
1600502-33 = "ทะ... ที่ชายหาดมีอะไรแปลกๆ อยู่ด้วย"
1600502-34 = "สะ... สัตว์ประหลาดเหรอ?! หรือว่าพรายน้ำ?!?"
1600502-35 = "...?"
1600502-36 = "สัตว์ประหลาด...? พรายน้ำ...?"
1600502-37 = "ชู่ว! เงียบๆ หน่อยสิ! ถ้ามันได้ยินขึ้นมาจะทำยังไง รีบออกไปจากตรงนี้กันเถอะ!"
1600502-38 = "อื้อ ดูนั่นสิ พวกพ่อค้าแม่ค้าแอบเก็บร้านกันแล้ว"
1600502-39 = "ทำเนียนๆ ไปแล้วไปที่หาดอื่นกันเถอะ"
1600502-40 = "หืม...???"
1600502-41 = "(เสียงกระซิบกระซาบ...)"
1600502-44 = "..."
1600502-47 = "ทำไมนะ...?"
1600502-49 = "เพราะแบบนั้นที่นี่ก็เลยเหลือฉันอยู่คนเดียวค่ะ"
1600502-50 = "ถ้าขืนเป็นแบบนี้ ฉันคิดว่าคงจะไม่ได้ชมวิวทะเลฤดูร้อนตามที่ฉันหวังเอาไว้..."
1600502-51 = "ตอนนี้ฉันก็เลยอยู่ระหว่างหาตัว \"พรายน้ำ\" แล้วก็จะกำจัดมันทิ้งค่ะ"
1600502-52 = "[s] \"...\""
1600502-54 = "[s] \"...?\""
1600502-55 = "แต่ว่าฉันไม่เจออะไรเลย และฉันก็ไม่คิดว่ามีคนอื่นอยู่ที่นี่อีกแล้วด้วยค่ะ..."
1600502-56 = "มีวิธีที่จะล่อมันออกมาบ้างมั้ยคะคุณครู?"
1600502-57 = "[s] \"อย่าบอกนะว่า 'พรายน้ำ' ที่คนอื่นพูดถึงนั่น...\""
1600502-58 = "คุณครูคะ...?"
1600502-59 = "[s] \"...\""
1600502-61 = "[s5] \"เอ่อ... อ๋อ เจอปัญหาแบบนี้อยู่สินะ\"\n[s6] (บอกไม่ได้ บอกเธอไม่ได้เด็ดขาด...!)"
1600502-62 = "คุณครูคะ? ทำไมดูกังวลแบบนั้นล่ะคะ? หรือว่ากำลังหาพรายน้ำอยู่เหรอคะ?"
1600502-63 = "ทำไมดูกังวลแบบนั้นล่ะคะคุณครู กำลังหาพรายน้ำอยู่เหรอคะ?"
1600502-64 = "เอ๋? ไม่มีอะไรงั้นเหรอคะ? ยะ... อย่างงั้นเหรอ ขออภัยด้วยนะคะ..."
1600502-65 = "คุณครูทำหน้าเหมือนรู้อะไรบางอย่าง ฉันก็เลยคิดว่าคุณครูเจอตัวมันแล้ว..."
1600502-66 = "อืม... ถ้าเป็นแบบนี้ต่อไปคงไม่ดีแน่..."
1600502-67 = "การได้มาเที่ยวทะเลแบบนี้ก็ดีอยู่หรอกค่ะ แต่ฉันคิดเอาไว้ว่ามันน่าจะ... ดูครึกครื้นกว่านี้..."
1600502-68 = "..."
1600502-69 = "ช่วยไม่ได้ค่ะ คุณครูคิดว่าฉันย้ายไปที่หาดอื่นดีมั้ยคะ?"
1600502-70 = "[s7] \"อืม ครูไม่คิดว่านั่นจะเป็นทางออกที่ดีนะ\"\n[s8] ไม่พูดอะไรแล้วส่ายหัวช้าๆ"
1600502-71 = "อย่างนั้นเหรอคะ เข้าใจแล้วค่ะ แล้วฉันควรทำยังไงดีคะ...?"
1600502-72 = "อย่างนั้นเหรอคะ เข้าใจแล้วค่ะ... แล้วฉันควรทำยังไงดีคะ...?"
1600502-73 = "อืม..."
1600502-74 = "..."
1600502-75 = "การหวังอะไรแบบนั้นคงจะมากเกินไป... สำหรับคนอย่างฉันสินะคะ#nหวังที่จะได้อยู่ในบรรยากาศสนุกสนานแบบนั้น..."
1600502-76 = "คะ...?"
1600502-77 = "ชายหาดที่เงียบสงบแบบนี้ก็ไม่ได้แย่... งั้นเหรอคะ?"
1600502-78 = "ยะ...อย่างนั้นเหรอคะ...? ทะเลที่เงียบสงบแบบนี้... ก็ดีเหมือนกันเหรอคะ?"
1600502-79 = "[s9] \"ก็คงต่างกันไปตามสถานการณ์น่ะ แต่มีแค่เราสองคนก็ไม่เห็นเป็นไรเลยนี่\"\n[s10] \"ทะเลที่มีคนแค่สองคนก็ชวนฝันดีนะ\""
1600502-80 = "อ่า... ยะ... อย่างนั้นเหรอคะ? ถ้าคุณครูพูดแบบนี้ก็คงไม่เป็นไร..."
1600502-81 = "อ่า... ยะ... อย่างนั้นเหรอคะ? ถ้าคุณครูพูดแบบนี้ก็คงไม่เป็นไร..."
1600502-82 = "ค่ะ... ทะเลที่มีกันแค่สองคน บางทีก็อาจจะ..."
1600502-83 = "มีแค่สองคน..."
1600502-84 = "...?"
1600502-85 = "ระ...โรแมน..."
1600502-86 = "...!!!!"
1600502-87 = "[s] \"ซึรุกิ...?\""
1600502-88 = "คิ..."
1600502-89 = "[s] \"คิ...?\""
1600502-90 = "คิคิคิ กร๊ากๆๆๆ!!"
1600502-93 = "(...?)"
1600502-95 = "(จากนั้นก็กลายเป็นทะเลที่เหลือแค่คนเดียว...)"

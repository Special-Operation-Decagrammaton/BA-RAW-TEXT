[translation]
2300703-1 = "不平凡的少女"
2300703-2 = "（前往花子所說的地點後，馬上看見了他所說的體育倉庫）"
2300703-3 = "（怎麼會一個人被關在這裡面呢……）"
2300703-4 = "（……？）"
2300703-5 = "（倉庫的門有微微敞開……？）"
2300703-6 = "[s] 開門看看"
2300703-8 = "（嘰咿──）"
2300703-10 = "體育室倉庫"
2300703-11 = "（……？）"
2300703-12 = "啊，您來了啊。老師，我在這裡。"
2300703-13 = "[s]「……花子？」"
2300703-16 = "老師您好。很高興見到您。"
2300703-17 = "[s]「……」"
2300703-19 = "[s] 「……？」"
2300703-20 = "謝謝老師為了我趕過來。"
2300703-21 = "[s] 「……？？」"
2300703-23 = "[s]「？？？？？？？？？？？」"
2300703-24 = "呵呵，怎麼了嗎。眼睛怎麼睜得那麼大？"
2300703-25 = "看起來非常困惑呢……"
2300703-26 = "……呵呵。"
2300703-27 = "請問有什麼問題嗎？"
2300703-28 = "[s1] 「……為什麼穿泳裝？」\n[s2] 「為什麼穿成那樣……？」"
2300703-29 = "……咦？"
2300703-30 = "……咦？"
2300703-31 = "穿泳裝……請問有什麼不妥嗎？"
2300703-32 = "這裡是三一的體育倉庫，也就是體育課會使用到的地方。"
2300703-33 = "而我現在穿的……"
2300703-34 = "就是學園規定的其中一種「體育課要穿的衣服」……不是嗎？請問有什麼不對嗎？"
2300703-35 = "我只是剛好穿著它，進到了倉庫裡而已……"
2300703-36 = "雖然不知道老師現在在想什麼，但我想這應該沒什麼奇怪的唷。"
2300703-37 = "還是說……老師其實在想著什麼「奇怪的事情」嗎？或是什麼「奇怪的嗜好」呢？"
2300703-38 = "說不定，其實真的和老師想像的一樣唷……"
2300703-39 = "呵呵，老師覺得呢？"
2300703-40 = "如果想知道的話，希望請老師能先說出自己在想什麼。"
2300703-41 = "那麼……要來對答案嗎？"
2300703-42 = "[s] 「……要不要先換上制服？」"
2300703-43 = "哎呀……您真的要我換衣服嗎？真的要我，在這裡當場換？"
2300703-44 = "老師……您比我想像的還要大膽呢。"
2300703-45 = "但就算我和老師感情再好，讓老師近距離盯著我慢慢脫衣服，還是有點……"
2300703-46 = "不過既然老師直接要求了……我身為學生就應該有所回應才行。"
2300703-47 = "那就請老師藉著這難得的機會，仔細觀察一下……我究竟成長了多少吧……"
2300703-48 = "[s3] 衝出倉庫\n[s4] 「這對精神的負擔實在太大了，適可而止吧……」"
2300703-49 = "呵呵，開玩笑的啦，開玩笑的。抱歉，老師的反應實在太有趣了，讓人忍不住。"
2300703-50 = "呵呵，開玩笑的啦，開玩笑的。抱歉，老師的反應實在太有趣了，讓人忍不住。"
2300703-51 = "我就不逗您了。能請您暫時轉過去嗎？我馬上就換好了。"
2300703-52 = "[s5] 轉身等待\n[s6] 轉身閉上眼睛等待"
2300703-57 = "哼嗯哼嗯～哼嗯哼哼嗯～♪"
2300703-58 = "嗯……好像勾到什麼東西了……老師，可以幫我一下嗎？"
2300703-59 = "[s7] （意志不動如山……）"
2300703-60 = "呵呵……真是專注。請再稍等一下。"
2300703-62 = "好。換好了。現在可以回頭看了。"
2300703-63 = "……老師？"
2300703-66 = "您看，我有好好穿上吧？"
2300703-68 = "哼嗯哼嗯～哼嗯哼哼嗯～♪"
2300703-69 = "嗯……好像勾到什麼東西了……老師，可以幫我一下嗎？"
2300703-70 = "[s8] （意志不動如山……）"
2300703-71 = "呵呵……還真專注。請再稍等一下就好了。"
2300703-73 = "好。換好了。現在可以回頭看了。"
2300703-74 = "……老師？"
2300703-76 = "您看，我有好好穿上吧？"
2300703-77 = "呵呵。多虧有您，我今天也玩得很開心。那我們出去吧？"
2300703-78 = "[s9] 「剛剛的難道是惡作劇嗎……？」\n[s10] 「這樣對心臟不太好，拜託別再捉弄人了……」"
2300703-79 = "對不起，老師。但就一定程度上來說，我是真的受了老師的幫助。"
2300703-80 = "對不起，老師。但就一定程度上來說，我是真的受了老師的幫助。"
2300703-81 = "這該怎麼說才好呢……"
2300703-82 = "……能像這樣獲得放鬆的時間，對我來說是很重要的。"
2300703-83 = "……？"
2300703-84 = "您問……這是什麼意思？"
2300703-85 = "呵呵，這是祕密。竟然想追問學生的祕密，這樣有違老師的職業倫理唷？"
2300703-86 = "那現在……"
2300703-87 = "哎呀？"
2300703-88 = "（嗶──！嗶──！！）"
2300703-90 = "那邊那兩個人！在這裡做什麼！？此處在這個時段禁止進出！"
2300703-91 = "體育設施僅限體育課程使用，除此之外必須取得學生會的許可！"
2300703-92 = "再來，那邊那位學……生？"
2300703-93 = "你手上拿的是什麼？禁止將公物攜帶出去──"
2300703-94 = "啊啊，這個嗎？"
2300703-95 = "這個呀……"
2300703-96 = "這是我剛剛才脫下，還熱呼呼的泳裝唷？"
2300703-97 = "……"
2300703-98 = "……？"
2300703-100 = "[s]「……？」"
2300703-103 = "……！！！！！？！！？！？"
2300703-105 = "（用盡全力逃走了）"
2300703-106 = "（後來等狀況平息下來才回去找警衛，但依然花了很長的時間才解開誤會）"

[translation]
2300703-1 = "เด็กสาวที่ไม่ธรรมดา"
2300703-2 = "(คุณครูมุ่งหน้าไปสถานที่ที่ฮานาโกะบอกไว้ และได้เห็นห้องเก็บของโรงพละปิดอยู่)"
2300703-3 = "(ไม่รู้เลยว่าเธอมาติดอยู่ที่นี่คนเดียวได้ยังไง...)"
2300703-4 = "(...?)"
2300703-5 = "(ประตูโกดังไม่ได้ล็อกอยู่หรอกเหรอ...?)"
2300703-6 = "[s] (เปิดประตูเข้าไป)"
2300703-8 = "(แกร็ก แอ้ด...)"
2300703-10 = "ห้องเก็บของโรงพละ"
2300703-11 = "(......?)"
2300703-12 = "มาแล้วเหรอคะคุณครู ทางนี้ค่ะ"
2300703-13 = "[s] \"ฮานาโกะเหรอ...?\""
2300703-16 = "สวัสดีค่ะคุณครู บังเอิญจังเลยนะคะที่มาเจอกันแบบนี้"
2300703-17 = "[s] “...”"
2300703-19 = "[s] “?\""
2300703-20 = "ตอนนี้ฉันเลยจะได้ออกไปอย่างปลอดภัยแล้วละค่ะ ขอบคุณนะคะ"
2300703-21 = "[s] “???\""
2300703-23 = "[s] “???????????\""
2300703-24 = "ฮุฮุ อะไรกันคะ ทำไมทำหน้าแบบนั้นล่ะ? ตาโตจนจะถลนออกมาแล้วนะคะ?"
2300703-25 = "ดูเหมือนคุณครูจะช็อกเลยนะคะ... ตัวแข็งไปแล้วด้วย!"
2300703-26 = "ฮิฮิ..."
2300703-27 = "ตอนนี้คุณครูคิดอะไรอยู่เหรอคะ..."
2300703-28 = "[s1] “...ทะ ทำไมใส่ชุดว่ายน้ำ?\"\n[s2] \"แต่งตัวแบบนั้นได้ยังไง...?\""
2300703-29 = "คะ...?"
2300703-30 = "คะ...?"
2300703-31 = "ทำไมถึงถามเรื่องนั้นขึ้นมาล่ะคะ? มีเรื่องอะไรหรือเปล่าคะ?"
2300703-32 = "ที่นี่เป็นโรงพละของทรีนิตี้ไม่ใช่เหรอคะ?"
2300703-33 = "และที่ฉันใส่อยู่นี่..."
2300703-34 = "ก็เป็นหนึ่งในเสื้อผ้าสำหรับใส่ในโรงพละที่โรงเรียนกำหนด...ไม่ใช่เหรอคะ? หรือว่าฉันเข้าใจผิด#nเหรอคะ?"
2300703-35 = "ฉันเข้ามาเอาของบางอย่าง แต่บังเอิญประตูดันปิดจนติดอยู่ในโกดังค่ะ"
2300703-36 = "ฉันไม่รู้ว่าคุณครูคิดอะไรอยู่แต่ว่า... คงไม่ใช่อย่างที่ฉันคิดหรอกนะคะ"
2300703-37 = "อืม... ไม่ใช่เหรอคะ?"
2300703-38 = "ฮิฮิ... หรือว่าใช่คะ?"
2300703-39 = "ฉันคงเดาไม่ถูกแน่เลยค่ะ"
2300703-40 = "ถ้าอยากรู้... ก็คงจะต้องถามจากคุณครูแล้วสินะคะ"
2300703-41 = "เพราะฉะนั้นช่วยบอกหน่อยได้มั้ยคะ? เมื่อกี้คิดอะไรถึงได้ถามแบบนั้นเหรอคะ?"
2300703-42 = "[s] \"ก่อนอื่นไปเปลี่ยนเป็นชุดนักเรียนก่อนเถอะ...\""
2300703-43 = "โอ๊ะ~ พูดจริงเหรอคะ? จะให้เปลี่ยนชุดงั้นเหรอคะ? ที่นี่ ตอนนี้เลย?"
2300703-44 = "ถึงคุณครู... ไม่ได้ดูเป็นคนแบบนั้น แต่ว่ากล้าหาญกว่าที่เห็นนะคะ"
2300703-45 = "ถึงจะเป็นฉันก็เถอะ แต่ให้อยู่กับคุณครูสองต่อสองในห้องปิดแบบนี้มันก็จะ..."
2300703-46 = "แต่ก็ไม่มีปัญหาค่ะ ถ้าคุณครูต้องการ... หน้าที่ของนักเรียนอย่างฉันก็คือตอบสนอง"
2300703-47 = "รอดูนะคะ ตอนนี้ ที่นี่ฉันจะ..."
2300703-48 = "[s3] ต้องรีบออกจากโกดังแล้ว\n[s4] \"ขอร้องละ อย่าล้อเล่นแบบนี้สิ\""
2300703-49 = "ฮิฮิ รู้แล้วค่ะ ฉันล้อเล่นค่ะ ขอโทษนะคะ พอดีแกล้งหยอกคุณครูแล้วมันสนุกนิดหน่อยน่ะค่ะ"
2300703-50 = "ฮิฮิ รู้แล้วค่ะ ฉันล้อเล่นค่ะ ขอโทษนะคะ พอดีแกล้งหยอกคุณครูแล้วมันสนุกนิดหน่อยน่ะค่ะ"
2300703-51 = "ฉันไม่แกล้งแล้วค่ะ ช่วยหันกลับหลังไปก่อนได้มั้ยคะ? ฉันจะเปลี่ยนเสื้อเดี๋ยวนี้เลยค่ะ"
2300703-52 = "[s5] หันหลังและรออย่างสงบ\n[s6] หันหลังแล้วหลับตารอ"
2300703-57 = "ฮึ่ม~ ฮึ่ม~ ฮึ่ม~ ฮือ~"

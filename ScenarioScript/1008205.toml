[translation]
1008205-1 = "The Essence of Youth: Childhood Friend"
1008205-5 = "[ns] \"That should finish up all my urgent work...\""
1008205-12 = "[ns] \"Finally. Time to sleep.\""
1008205-20 = "I finished work for Schale later than usual and headed home to sleep."
1008205-21 = "[ns] \"I'm meeting with Renge early tomorrow... Need to get rest...\""
1008205-43 = "[ns] \"(Ugh... Morning, already?)\""
1008205-47 = "I was exhausted from staying up late the night before, and I hit snooze on my alarm."
1008205-52 = "[ns] \"(Just a little more... Yeah... Just five more minutes...)\""
1008205-58 = "Okay. One...two..."
1008205-62 = "GOOD MORNING! "
1008205-68 = "Do you plan on staying in bed all day, sleepyhead?! It's morning already!"
1008205-75 = "[ns] \"U-Ugh?!\""
1008205-78 = "[ns] \"R-Renge?! What are you doing here?\""
1008205-79 = "Isn't it obvious?"
1008205-80 = "I'm fulfilling my duties as your childhood friend! "
1008205-81 = "You overslept, so of course I had to come in and wake you up!"
1008205-82 = "[s] \"...Huh? Childhood what?\""
1008205-84 = "I managed to get Renge to wait until I finished getting ready. She was eager to explain the situation to me."
1008205-86 = "I already told you on MomoTalk."
1008205-87 = "There are certain relationships people experience in their youth that we absolutely cannot skip over!"
1008205-88 = "Childhood friends! I'm here today as Sensei's friend who grew up by their side."
1008205-89 = "[s1] \"I'm pretty sure we didn't grow up together...\"\n[s2] \"I see a lot of issues with this premise...\""
1008205-92 = "C'mon, Sensei! You're normally a little quicker on the uptake."
1008205-93 = "There's something important to consider here. How does one define a childhood friend, Sensei?"
1008205-94 = "Are there established laws around this topic? Are there conditions you have to fulfill to be childhood friends?"
1008205-95 = "No! There's no industry standard for something like this."
1008205-99 = "A childhood friend, by definition, is someone you've been close to since you were young. By \"young,\" we mean in the past, or more precisely, before the present moment."
1008205-100 = "It just takes a little bit of imagination and an even tinier amount of exaggeration!"
1008205-101 = "We've known each other before this morning, so if we decide to be childhood friends, that's what we are!"
1008205-102 = "Don't focus on the details! What's important is the bright and shining future we're reaching towards!"
1008205-103 = "[s] \"I can't tell whether this makes sense or not!\""
1008205-104 = "Again, details, details!"
1008205-105 = "So, Sensei—I mean, Mentor!"
1008205-106 = "I've dubbed today's episode \"The Essence of Youth: Childhood Friend\"!"
1008205-107 = "We've cleared the \"wake your childhood friend up in the morning\" event already!"
1008205-111 = "So, on to the next!"
1008205-112 = "[s] \"O-Okay...\""
1008205-114 = "The logic was highly questionable to me. Regardless, Renge and I began our youth activities for the day."
1008205-116 = "Let's see here... The second event we need to clear..."
1008205-117 = "It has to be the \"walking to school together\" event!"
1008205-118 = "Apparently, childhood friends walk to school together every day and discuss this and that."
1008205-119 = "[s] \"And the source for that information came from...\""
1008205-120 = "I read it in a novel written by the author of \"Koi About Love\"."
1008205-121 = "[s] \"Just as I thought!\""
1008205-122 = "Let's head to school, Mentor!"
1008205-131 = "Something about this feels off..."
1008205-132 = "[s] \"What's wrong, Renge?\""
1008205-133 = "Is something as mundane as this really a youth activity?"
1008205-134 = "The sweet bliss of youth that childhood friends share... Shouldn't it be a medley of bitterness and nostalgia?"
1008205-135 = "How do we create that atmosphere? What am I missing here...?"
1008205-136 = "[s3] \"I'm not really sure, but we could start with talking?\"\n[s4] \"Childhood friends probably talk about anything and everything.\""
1008205-141 = "That's a good point!"
1008205-142 = "Childhood friends would rely on the shared interests they've cultivated over time."
1008205-143 = "They probably talk about their problems and listen to each other!"
1008205-144 = "You were so quick to get to the root of the problem! I'm starting to see that it's all in the details!"
1008205-145 = "On something casual like the morning walk to school, the topics of conversation would probably be light and easy."
1008205-146 = "Hm. I can do this."
1008205-147 = "I suppose it makes sense for me to start."
1008205-149 = "Did you watch TV last night?"
1008205-150 = "[s] \"Yup.\""
1008205-151 = "I saw a report that someone spotted a chupacabra in a mountain behind a town in the South District!"
1008205-152 = "People love chupacabras..."
1008205-153 = "Let's go catch it! We'd definitely go viral on social media!"
1008205-157 = "[ns] \"Back up, Renge. People don't plot chupacabra kidnappings walking to school.\""
1008205-158 = "Oh. Really? Why not?"
1008205-159 = "...It'd be better to talk about sports or a popular drama?"
1008205-160 = "Is that a typical youth topic? Because I don't really keep up with those kinds of things. "
1008205-161 = "A chupacabra is way more interesting and youthful! Everyone loves a good chupacabra story!"
1008205-162 = "...Some people don't even know what that is? "
1008205-163 = "Oh. I didn't think of that. Having a casual conversation with my childhood friend doesn't come as naturally as I thought it would."
1008205-164 = "Hm... Well, that's that! We can move on to the next event."
1008205-165 = "We still have a lot of time, after all. No need to despair."
1008205-168 = "I'll check my research. What should our third event be...?"
1008205-169 = "Oh! I've got it! The \"childhood friends tutor each other in their weakest subjects\" event!"
1008205-170 = "[s] \"That's a good one! You see that in manga a lot.\""
1008205-171 = "I got the stamp of approval from my mentor! Nice!"
1008205-172 = "I've been thinking about what I could teach you though..."
1008205-173 = "And there's really only one thing I know how."
1008205-177 = "*inhale*"
1008205-178 = "*exhale* Keep your body low. Take a half step forward."
1008205-179 = "[s] \"Renge...? What exactly are you trying to teach me?\""
1008205-183 = "Don't look so worried, Sensei."
1008205-184 = "I'm teaching you self-defense! I run a lot of these drills at the Hyakkaryouran, so you're in good hands."
1008205-185 = "There's all kinds of courses, like what to do in a shootout, how to defend against an attacker, or even how to navigate using just the stars!"
1008205-186 = "It would normally take someone around three years to master everything..."
1008205-187 = "But luckily, you've got me for a teacher!"
1008205-188 = "They don't call me Hyakkaryouran's Disciplinarian for nothing! Under my tutelage, you'll master everything within a year!"
1008205-189 = "[s] \"I forget how accomplished you are sometimes, Renge!\""
1008205-190 = "Then..."
1008205-195 = "Here we go!"
1008205-200 = "Renge and I acted out scene after scene as childhood friends."
1008205-204 = "We went to food stalls to get snacks after school together."
1008205-208 = "She said it would be a shame to just go home, so we went to karaoke and had a battle of voices there."
1008205-214 = "We stopped by a department store together to buy something Renge urgently needed."
1008205-220 = "The day was filled with fun youth activities."
1008205-225 = "Before we knew it, the sun was setting."
1008205-229 = "We really got through a lot today, didn't we?"
1008205-230 = "I think it's safe to say this was a successful day as childhood friends!"
1008205-231 = "[s] \"(More than childhood friends, today felt a lot more like...)\""
1008205-232 = "But we're not done yet, Mentor!"
1008205-233 = "After all, we haven't gotten to the real event of the day yet."
1008205-234 = "[s] \"Hm? What's that?\""
1008205-235 = "...Heehee."
1008205-236 = "There's one thing that sets childhood friends apart from other relationships."
1008205-237 = "After all, childhood friends have known each other their whole lives. It's a different level of closeness."
1008205-238 = "Their bond is tempered by years and years of friendship."
1008205-239 = "[s] \"That being said, we don't exactly fit the bill...\""
1008205-243 = "Th-That's not the point!"
1008205-244 = "What I'm trying to say is, there's one last hurdle we need to clear."
1008205-245 = "It's the \"call each other by our given names as we head home\" event!"
1008205-246 = "[s] \"Given names...?\""
1008205-247 = "Exactly! So I'm going to call you by your name now! "
1008205-248 = "Yup! I'm going to do it right now! So brace yourself, Mentor!"
1008205-249 = "[s] \"Y-Yes!\""
1008205-250 = "It's, um. Uh..."
1008205-251 = "...!"
1008205-252 = "I-I had a good time today, [USERNAME]...!"
1008205-253 = "[s] \"I had a lot of fun too, Renge.\""
1008205-257 = "R-Really?!"
1008205-258 = "That's a relief to hear. I was a little worried I was dragging you around. "
1008205-259 = "I'm happy to hear that."
1008205-260 = "It was pretty embarrassing to call you by your name, I have to admit. "
1008205-261 = "This whole childhood friend concept is a pretty difficult one."
1008205-265 = "W-Well, anyway! It's about time for us to head back."
1008205-267 = "[ns5] \"Don't you think we acted like more than just childhood friends today?\"\n[ns6] \"It kind of feels like we went on a date today.\""
1008205-274 = "...Haaah?"
1008205-280 = "W-W-Wait! "
1008205-281 = "Wh-Wh-What are you saying, Mentor?!"
1008205-282 = "[s] \"Huh?! Did I say something wrong?!\""
1008205-283 = "N-Not exactly wrong, but...! "
1008205-284 = "Th-That kind of concept...! That's not the right relationship...!"
1008205-285 = "This is just all too much!"
1008205-291 = "[ns] \"Ah... She left.\""

[translation]
1008205-1 = "สู่วัยรุ่น: เพื่อนสมัยเด็ก"
1008205-5 = "[ns] \"ทำงานที่ค้างไว้เสร็จแล้ว...\""
1008205-12 = "[ns] \"เตรียมตัวนอนดีกว่า...\""
1008205-20 = "(คุณครูทำงานของชาเล่ต์เสร็จและกำลังจะกลับไปนอนตามปกติ)"
1008205-21 = "[ns] \"เรนเกะบอกว่าจะมาหาพรุ่งนี้ งั้นก็ต้องรีบตื่นให้ทัน...\""
1008205-43 = "[ns] (งืม... เช้าแล้วเหรอเนี่ย...?)"
1008205-47 = "(ความเหนื่อยล้าสะสมทำให้คุณครูไม่สามารถลุกจากเตียงได้ทันทีเหมือนในตอนปกติ)"
1008205-52 = "[ns] (ขออีกนิดนะ... อืม... แค่อีก 5 นาทีพอ...)"
1008205-58 = "เฮ้อ ยังไม่เตรียมตัวอีก..."
1008205-62 = "อรุณ~ ซา~ หวาดดด~! "
1008205-68 = "จะนอนไปถึงไหนเนี่ย?! แดดส่องหน้าแล้วนะ!"
1008205-75 = "[ns] \"ฮะ... เฮือก?!\""
1008205-78 = "[ns] \"ระ... เรนเกะ?! ทำอะไรเนี่ย...?\""
1008205-79 = "ถามมาได้"
1008205-80 = "ฉันก็... มาปลุกเพื่อนสมัยเด็กที่นอนตื่นสายน่ะสิ... "
1008205-81 = "การทำแบบนี้คือ <หน้าที่> ของเพื่อนสมัยเด็กอยู่แล้วนี่?"
1008205-82 = "[s] \"ว่าไงนะ เพื่อนสมัยเด็กเหรอ...?\""
1008205-84 = "(หลังจากที่จัดการเรื่องวุ่นวายเสร็จและคุณครูแต่งตัวเสร็จเรียบร้อยแล้ว ก็มาฟังเรนเกะอธิบายสถานการณ์)"
1008205-86 = "ฉันบอกไปใน MOMOTALK เมื่อคราวก่อนแล้วนี่?"
1008205-87 = "ที่บอกว่าสำหรับวัยรุ่นแล้ว มีความสัมพันธ์อย่างหนึ่งที่ขาดไม่ได้"
1008205-88 = "และนั่นก็คือความสัมพันธ์ของเพื่อนสมัยเด็ก! วันนี้ฉันก็เลยมาหาคุณครูในฐานะเพื่อนสมัยเด็กน่ะ!"
1008205-89 = "[s1] \"...แต่เรนเกะไม่ใช่เพื่อนสมัยเด็กของครูนะ...\"\n[s2] \"ครูว่าแบบนี้มันไม่ได้นะ...\""
1008205-92 = "โธ่เอ๊ย คุณครูไม่รู้อะไรซะแล้ว!"
1008205-93 = "ถ้างั้นฉันก็ขอถามหน่อยแล้วกัน คุณครูคิดว่าเกณฑ์ของเพื่อนสมัยเด็กคืออะไรเหรอ?"
1008205-94 = "การเป็นเพื่อนสมัยเด็กมีบรรทัดฐานตามกฎหมายด้วยรึไง? หรือว่ามีเงื่อนไขพิเศษอะไรอีก?"
1008205-95 = "ไม่ว่าจะคำถามไหนก็ตอบได้แค่ <ไม่มี!>"
1008205-99 = "ความหมายตามพจนานุกรมของเพื่อนสมัยเด็กก็คือ 'เพื่อนที่สนิทกันมาตั้งแต่เด็ก' และคำว่าตั้งแต่เด็ก#nก็หมายถึงสมัยก่อน เท่ากับว่าเป็นเรื่องที่เกิดขึ้นในอดีต"
1008205-100 = "ถ้าเอามาวิเคราะห์แบบโอเวอร์ๆ หน่อยละก็ ต่อให้เราเพิ่งจะรู้จักกันเมื่อเช้าวันนี้ มันก็นับว่าเป็นอดีตไปแล้ว#nเหมือนกัน... เพราะงั้นถ้าเราตกลงว่าจะเป็นเพื่อนสมัยเด็กกันละก็..."
1008205-101 = "แค่นั้นก็เป็นเพื่อนสมัยเด็กกันได้แล้วไม่ใช่รึไง?"
1008205-102 = "มันไม่สำคัญหรอกว่าจะเริ่มยังไง สิ่งที่สำคัญกว่าคืออนาคตของเราต่างหาก!"
1008205-103 = "[s] \"เหมือนจะใช่ แต่ใจหนึ่งก็บอกว่าไม่ใช่...! แต่จะไม่เป็นไรแน่เหรอ?!\""
1008205-104 = "ไม่เอาน่า~ ไม่ต้องสนใจรายละเอียดขนาดนั้นหรอก!"
1008205-105 = "เอาเป็นว่าตกลงแล้วนะ คุณครู... ไม่สิ! ท่านอาจารย์!"
1008205-106 = "<กิจกรรมวัยรุ่น> ของวันนี้ก็คือ <ยุทธการเพื่อนสมัยเด็ก!>"
1008205-107 = "ภารกิจ <ปลุกเพื่อนตอนเช้า> ภารกิจแรกของเพื่อนสมัยเด็กก็ทำเสร็จไปแล้ว..."
1008205-111 = "เอาละ งั้นก็ไปต่อกันเลย คุณครู!"
1008205-112 = "[s] \"อะ... อื้ม...\""
1008205-114 = "(ถึงจะยังสงสัยอะไรหลายๆ อย่าง แต่กิจกรรมวัยรุ่นของเรนเกะกับคุณครูในวันนี้ก็เริ่มขึ้นแล้ว)"
1008205-116 = "มาเริ่มภารกิจที่สองในฐานะเพื่อนสมัยเด็กกัน!"
1008205-117 = "ขอตั้งชื่อว่าภารกิจ <ไปโรงเรียนพร้อมเพื่อนสมัยเด็ก>!"
1008205-118 = "เวลาเพื่อนสมัยเด็กไปโรงเรียนด้วยกัน ก็จะคุยกันว่าวันนี้จะมีเรื่องอะไรบ้าง"
1008205-119 = "[s] \"เอาข้อมูลมาจากไหนเหรอ...\""
1008205-120 = "อ้อ เจอมาจากในนิยายของคุณนักเขียน <ความรักคือปลาคาร์ฟ> น่ะ"
1008205-121 = "[s] \"ว่าแล้วเชียว...!\""
1008205-122 = "งั้นก็ไปโรงเรียนกันเถอะ ท่านอาจารย์!"
1008205-131 = "อืม... รู้สึกเหมือนจะไม่ใช่แบบนี้เลยแฮะ..."
1008205-132 = "[s] \"ทำไมเหรอ? เรนเกะ?\""
1008205-133 = "ท่านอาจารย์ แค่เดินไปโรงเรียนด้วยกันแบบนี้... มันจะเรียกว่าเป็นภารกิจของเพื่อนสมัยเด็กได้เหรอ?"
1008205-134 = "ถ้าจะให้เป็นภารกิจสดใสของเพื่อนสมัยเด็ก มันจะต้อง... ต้องมีบางอย่างที่ให้ความรู้สึกเปรี้ยวอมหวานมาก#nกว่านี้หน่อยสิ"
1008205-135 = "อืม~ ถ้าเป็นอย่างนั้น... จะต้องใช้อะไรมาเติมความรู้สึกนี้นะ...?"
1008205-136 = "[s3] \"ไม่รู้สิ พูดคุยกันระหว่างเดินเข้าโรงเรียนเหรอ?\"\n[s4] \"ถ้าเป็นเพื่อนกัน ปกติก็ได้คุยกันหลายๆ เรื่องไม่ใช่เหรอ?\""
1008205-141 = "ใช่! อย่างที่ท่านอาจารย์บอกเลย!"
1008205-142 = "ถ้าเป็นเพื่อนสมัยเด็ก... ก็จะต้องมีความเข้าอกเข้าใจที่สั่งสมมาจากการอยู่ด้วยกันมาตั้งแต่วัยเด็ก..."
1008205-143 = "แล้วเวลาคุยเรื่องสัพเพเหระกัน ก็จะใช้ความเข้าอกเข้าใจนี้มาสนับสนุนคำพูดของกันและกัน! ต้องเป็นแบบนี้แน่ๆ!"
1008205-144 = "สมกับที่เป็นท่านอาจารย์! มองถึงแก่นได้อย่างทะลุปรุโปร่งเลย! รายละเอียดเป็นเรื่องสำคัญสินะ!"
1008205-145 = "...พูดคุยในหัวข้อที่มีความรู้สึกร่วมกันระหว่างไปโรงเรียน"
1008205-146 = "อื้ม ฉันเข้าใจแล้วละ"
1008205-147 = "ดีละ งั้นฉันจะเริ่มเลยก็แล้วกัน"
1008205-149 = "รายการทีวีเมื่อวานน่ะ"
1008205-150 = "[s] \"อื้ม\""
1008205-151 = "มีรายงานว่ามีคนเจอชูปาคาบร้าบนภูเขาหลังหมู่บ้านในเขตภาคใต้ของเฮียกคิยาโคด้วยละ"
1008205-152 = "ชูปาคาบร้า..."
1008205-153 = "ถ้าจับเจ้าตัวนี้ได้ ต้องกลายเป็นประเด็นทอล์กออฟเดอะทาวน์แน่!"
1008205-157 = "[ns] \"ขอโทษนะเรนเกะ ทำไมเริ่มด้วยเรื่องยากๆ เลยล่ะ?!\""
1008205-158 = "เอ๋? งะ... งั้นเหรอ?"
1008205-159 = "ชวนคุยกันเรื่องผลการแข่งกีฬาหรือละครที่ดูเมื่อคืนน่าจะดีกว่างั้นเหรอ?"
1008205-160 = "อืม~ แต่เรื่องพวกนั้นฉันไม่ค่อยได้ดูเท่าไหร่เลยน่ะสิ... "
1008205-161 = "เรื่องชูปาคาบร้าไม่น่าสนใจกว่าหรอกเหรอ? ชื่อก็น่ารัก เหมือนกับตัวละครมาสคอตในย่านการค้า#nสักเขตอย่างนั้นแหละ"
1008205-162 = "เป็นเรื่องที่ชวนคุยต่อด้วยยากงั้นเหรอ? "
1008205-163 = "อืม... การคุยกับเพื่อนสมัยเด็ก... เป็นเรื่องยากกว่าที่คิดเลยนะเนี่ย..."
1008205-164 = "อื้ม! แต่ก็คงช่วยไม่ได้! เอาเป็นว่าจบเรื่องนี้ก่อน!"
1008205-165 = "ไม่เป็นไรหรอก! ยังไงวันนี้ก็ยังมีเวลาเหลืออีกตั้งเยอะ!"
1008205-168 = "และภารกิจเพื่อนสมัยเด็กอย่างที่ 3 ที่เราจะทำด้วยกันก็คือ...!"
1008205-169 = "<ภารกิจช่วยสอนเรื่องที่เพื่อนสมัยเด็กยังไม่เก่ง!>"
1008205-170 = "[s] \"เรื่องนี้น่าจะใช้ได้นะ ในการ์ตูนก็มีบ่อยๆ ด้วย\""
1008205-171 = "ใช่มั้ยล่ะ~?"
1008205-172 = "ฉันไปลองคิดมาเยอะแยะเลยละว่าจะสอนเรื่องอะไรให้คุณครูดี"
1008205-173 = "ในบรรดาเรื่องทั้งหมดที่ฉันสอนได้ ฉันว่าเรื่องนี้น่าจะเหมาะสมที่สุด"
1008205-177 = "(หายใจเข้า)"
1008205-178 = "ฮ่าา ย่อตัวลงต่ำๆ แล้วก้าวไปข้างหน้าครึ่งก้าว"
1008205-179 = "[s] \"เดี๋ยวก่อนเรนเกะ? จะสอนให้ทำอะไรน่ะ...\""
1008205-183 = "อ้อ ไม่ใช่เรื่องยากอะไรหรอก คุณครู"
1008205-184 = "วันนี้ฉันจะสอน <วิธีรับมือ> เรื่องสถานการณ์ปัญหาต่างๆ ที่สืบทอดกันมาในเฮียกกะเรียวรัน จากรุ่นสู่รุ่น"
1008205-185 = "การดวลปืนที่เกิดขึ้นอย่างกะทันหัน การป้องกันตัวจากเด็กเจ้าปัญหาที่อยู่ๆ ก็เข้ามาประชิดตัว รวมถึงวิธีอ่านทิศทางดวงดาวเมื่ออยู่ลำพังในอาณาเขตของศัตรู"
1008205-186 = "ถ้าจะทำความเข้าใจทั้งหมดนี้จนเชี่ยวชาญ ปกติแล้วจะใช้เวลาประมาณ 3 ปี..."
1008205-187 = "แต่ไม่เป็นไรหรอก ฉันมั่นใจว่าจะสอนเรื่องพื้นฐานตามคู่มือสามัญของเฮียกกะเรียวรันให้ได้"
1008205-188 = "ถึงใครจะว่ายังไง ฉันก็เป็นถึงหัวหน้าหน่วยจู่โจมของเฮียกกะเรียวรัน ฉันจะช่วยสอนอย่างละเอียด จนคุณครูเชี่ยวชาญในเรื่องพวกนั้นได้ภายในปีเดียวเลย"
1008205-189 = "[s] \"...มันก็เป็นเรื่องที่ควรเรียนจากเรนเกะอยู่หรอกนะ!\""
1008205-190 = "ถ้างั้นก็..."
1008205-195 = "ไปกันเลย!!"
1008205-200 = "(หลังจากนั้นคุณครูกับเรนเกะก็เริ่มเคลียร์ <ภารกิจเกี่ยวกับเพื่อนสมัยเด็ก> ด้วยกัน)"
1008205-204 = "(ระหว่างกลับบ้านด้วยกันหลังเลิกเรียน ก็แวะร้านริมทางเพื่อหาของกินเล่น)"
1008205-208 = "(เรนเกะบอกว่ายังไม่อยากกลับ จึงชวนกันไปคาราโอเกะเพื่อแข่งร้องเพลงกัน)"
1008205-214 = "(ระหว่างนั้นเรนเกะก็บอกว่ามีของที่อยากซื้อ คุณครูก็เลยโดนลากไปห้างสรรพสินค้า...)"
1008205-220 = "(หลังจากไปทำเรื่องสนุกสนานด้วยกันมาจนหมดวัน...)"
1008205-225 = "(พระอาทิตย์ก็ลับขอบฟ้าไป)"
1008205-229 = "อืมมมม~ วันนี้เราได้เคลียร์ภารกิจกันเยอะแยะเลย!"
1008205-230 = "อื้ม! ประมาณนี้ก็ถือว่า <ภารกิจเพื่อนสมัยเด็ก> ของเราเสร็จสมบูรณ์แล้วอย่างไม่ขาดตกบกพร่อง!"
1008205-231 = "[s] (ที่ทำด้วยกันทั้งวัน น่าจะเป็นอย่างอื่นมากกว่าภารกิจเพื่อนสมัยเด็กนะ...)"
1008205-232 = "แต่ว่าคุณครู ไม่สิ ท่านอาจารย์..."
1008205-233 = "ภารกิจเพื่อนสมัยเด็กที่แท้จริงยังไม่จบแค่นี้หรอกนะ"
1008205-234 = "[s] \"หืม? ภารกิจที่แท้จริงงั้นเหรอ?\""
1008205-235 = "...เฮ้อ"
1008205-236 = "เพื่อนสมัยเด็กน่ะไม่เหมือนเพื่อนธรรมดาๆ หรอกนะ"
1008205-237 = "เราไม่ได้เป็นเพื่อนกันเพราะแค่สนิทกัน... แต่เพราะมีกันและกันมาเป็นเวลานานจนเกิดเป็นความผูกพัน#nลึกซึ้ง"
1008205-238 = "ความสัมพันธ์ที่ใครอื่นเข้ามาทำให้พังทลายไม่ได้... นี่แหละความสัมพันธ์แบบเพื่อนสมัยเด็ก"
1008205-239 = "[s] \"นั่นก็เรื่องหนึ่ง แต่ครูว่าวันนี้เหมือนเราจะเริ่มภารกิจกันได้โดยทันทีเลยนะ...\""
1008205-243 = "อะ... เอาเถอะน่า ที่ฉันอยากพูดก็คือ... ก็คือ...!"
1008205-244 = "ในเมื่อมาถึงตรงนี้แล้ว... และในเมื่อเป็นภารกิจเพื่อนสมัยเด็ก... ก็ต้องจบด้วยภารกิจนี้..."
1008205-245 = "นั่นก็คือ <ภารกิจเรียกชื่อกันและเอ่ยคำลาก่อนแยกกันไป!>"
1008205-246 = "[s] \"เรียกชื่อ...?\""
1008205-247 = "เอาละ... จากนี้ฉันจะเรียกชื่อท่านอาจารย์! "
1008205-248 = "เตรียมตัวไว้ได้เลย ท่านอาจารย์!"
1008205-249 = "[s] \"ระ... รับทราบ!\""
1008205-250 = "เอ่อ... อืม... อ่า..."
1008205-251 = "...!"
1008205-252 = "[USERNAME]...... วะ... วันนี้ฉันสนุกมาก... เลย"
1008205-253 = "[s] \"อื้ม เรนเกะ ฉันก็สนุกเหมือนกัน\""
1008205-257 = "งะ... งั้นเหรอ?!"
1008205-258 = "ฉันก็กังวลว่าที่ลากเธอไปโน่นไปนี่... มันจะเหมือนการบังคับรึเปล่า "
1008205-259 = "งะ... งั้นก็ค่อยยังชั่วนะ"
1008205-260 = "ตะ... แต่ถึงจะอย่างนั้นก็เถอะ... ให้เรียกแค่ชื่อมันก็... ทำให้ฉันแอบเขินอยู่นะเนี่ย~"

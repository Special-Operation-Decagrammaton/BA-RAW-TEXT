[translation]
1008205-1 = "青春的定番：青梅竹馬"
1008205-5 = "[ns]「這樣堆積的工作就大致完成了……」"
1008205-12 = "[ns]「差不多該睡了……」"
1008205-20 = "（像平時一樣完成夏萊的工作後走向床鋪）"
1008205-21 = "[ns]「明天蓮華說會來找我，得早點起床……」"
1008205-43 = "[ns]（唔，已經早上了嗎……？）"
1008205-47 = "（不知道是不是因為日積月累的疲勞，無法像平常一樣馬上起床）"
1008205-52 = "[ns] （再睡一下好了……嗯……就5分鐘……）"
1008205-58 = "呼，預備……"
1008205-62 = "早～安～啊～老師！"
1008205-68 = "你要睡到什麼時候！？已經早上了！"
1008205-75 = "[ns]「唔哇啊啊！？」"
1008205-78 = "[ns]「蓮，蓮華！？為什麼突然……？」"
1008205-79 = "問我為什麼？"
1008205-80 = "叫醒賴床的青梅竹馬……"
1008205-81 = "不是我應盡的「義務」嗎？"
1008205-82 = "[s]「……你說青梅，什麼？」"
1008205-84 = "（趕緊在混亂過後冷靜下來整理衣著，聽蓮華詳細說明現在的情況）"
1008205-86 = "之前不是用MomoTalk說過了嗎？"
1008205-87 = "說到青春關係的精髓當然不能少了「那個」。"
1008205-88 = "沒錯，「那個」指的就是青梅竹馬！#n所以今天我是以青梅竹馬的身分來找老師！"
1008205-89 = "[s1]「……但蓮華和我不是青梅竹馬吧……？」\n[s2]「我這麼說可能不太恰當，但那個說法會不會有點牽強……？」"
1008205-92 = "嘖嘖嘖，這就是老師你有所不知了！"
1008205-93 = "那我問你，所謂青梅竹馬的標準是什麼？"
1008205-94 = "有法律上的標準或是什麼條件嗎？"
1008205-95 = "不管怎麼看，答案都是「沒有！」對吧。"
1008205-99 = "青梅竹馬在字典中的意思是「從小關係就很要好的朋友」……#n小時候就代表過去……也就是現在之前的意思。"
1008205-100 = "如果稍微解釋得誇張一點……#n就算今天早上才認識，只要決定當青梅竹馬──"
1008205-101 = "嗯，那就是青梅竹馬了不是嗎？"
1008205-102 = "重要的是我們的未來！"
1008205-103 = "[s]「這說法好像對，又好像不對……！這樣真的好嗎！？」"
1008205-104 = "哎呀～這種細節就別在意了！"
1008205-105 = "所以我決定了，老師……不，師父！"
1008205-106 = "今天的「青春活動」就是「從今天起就是青梅竹馬大作戰！」了！"
1008205-107 = "那麼既然青梅竹馬的第一個活動「Morning Call」已經達成……"
1008205-111 = "好，進行下一個吧！老師！"
1008205-112 = "[s]「呃，嗯……」"
1008205-114 = "（雖然感覺有點不對勁，但今天也和蓮華一起開始了青春活動）"
1008205-116 = "開始青梅竹馬的第二個活動吧。"
1008205-117 = "我將其命名為「和青梅竹馬一起上學」！"
1008205-118 = "因為青梅竹馬一起上學的時候，似乎都會聊類似「今天會發生什麼」之類的話題。"
1008205-119 = "[s]「這個情報的來源是……」"
1008205-120 = "嗯，我是在「戀愛鯉魚」的小說裡看到的。"
1008205-121 = "[s]「我就知道……！」"
1008205-122 = "那我們就趕緊出發吧，師父！"
1008205-131 = "……等等，感覺有點不太對……"
1008205-132 = "[s]「怎麼了？蓮華？」"
1008205-133 = "師父！只是單純這樣一起走……真的可以算是青梅竹馬活動嗎？"
1008205-134 = "怎麼說呢……你不覺得應該要有一點酸酸甜甜的元素嗎？"
1008205-135 = "啊啊……到底缺少了什麼……？"
1008205-136 = "[s3]「我不太明白你的意思，你指的是對話之類的嗎？」\n[s4]「上學途中的隨意閒聊應該挺重要的吧？」"
1008205-141 = "啊哈！就是那個！"
1008205-142 = "按照師父的說法，如果是青梅竹馬……應該會利用彼此相處至今形成的默契……"
1008205-143 = "在各種瑣碎的對話間附和彼此！"
1008205-144 = "真不愧是師父！一下就點出了重點！原來重要的是細節啊！"
1008205-145 = "……在上學途中，要用彼此容易產生共鳴的話題聊天。"
1008205-146 = "嗯，我記下來了。"
1008205-147 = "好，那就由我來開話題吧。"
1008205-149 = "我昨天在電視節目裡看到……"
1008205-150 = "[s]「嗯。」"
1008205-151 = "聽說不久之前，有人在百鬼夜行南部地區的後山發現了[ruby=Chupacabra]卓柏卡布拉[/ruby]。"
1008205-152 = "卓柏卡布拉……"
1008205-153 = "如果能抓到牠，一定會變成大新聞！"
1008205-157 = "[ns]「那個，抱歉。蓮華，這話題的門檻太高了吧！」"
1008205-158 = "嗯？是，是嗎？"
1008205-159 = "聊點運動比賽的結果或連續劇之類的話題應該比較好？"
1008205-160 = "唔嗯～可是我不常看那些。#n而且……"
1008205-161 = "還是卓柏卡布拉的話題比較有趣吧？#n不只名字很可愛，聽起來就像某個地區商店街的吉祥物一樣……"
1008205-162 = "還是很難跟上這個話題？"
1008205-163 = "唔嗯～青梅竹馬的對話……比想像中還難呢……"
1008205-164 = "沒辦法，這個話題就先聊到這吧！"
1008205-165 = "不過別擔心！今天時間還很多！"
1008205-168 = "我們接下來要進行的青梅竹馬活動就是這個──"
1008205-169 = "「青梅竹馬教對方不擅長科目的學習活動！」"
1008205-170 = "[s]「哦，那確實稱得上是定番呢。漫畫中也經常出現。」"
1008205-171 = "對吧～？"
1008205-172 = "所以該教老師什麼，我自己也想了很久……"
1008205-173 = "但想來想去還是這個最適合。"
1008205-177 = "嘶──"
1008205-178 = "哈──放低身體，腳向前踩半步。"
1008205-179 = "[s]「……那個，蓮華？你想教我的是……」"
1008205-183 = "啊，其實也沒什麼啦，老師。"
1008205-184 = "今天我要教老師百花繚亂代代相傳，能應對各種狀況的「應對方法」。"
1008205-185 = "從突然發生的槍戰、防禦突然逼近的問題學生……#n到在被孤立於敵陣時，根據星象掌握方向的方法都有。"
1008205-186 = "如果想全部精通，通常需要花上3年左右……"
1008205-187 = "但是別擔心，我對教這些百花繚亂的常規課程很有自信。"
1008205-188 = "畢竟我可是百花繚亂的突擊隊長啊。#n我會進行徹底的教學，讓老師在1年內精通這一切！"
1008205-189 = "[s]「……某種意義上好像是該向蓮華學習這些沒錯！？」"
1008205-190 = "那麼……"
1008205-195 = "要上囉！！"
1008205-200 = "（之後也一起完成各種「青梅竹馬活動」）"
1008205-204 = "（在放學後一起回家的路上去小吃攤吃零食……）"
1008205-208 = "（覺得直接回家很可惜，就順路去KTV比誰高分……）"
1008205-214 = "（突然想起有東西要買，結果就被帶去了百貨公司……等等等等）"
1008205-220 = "（就這樣開心地四處逛了一整天──）"
1008205-225 = "（回過神來才發現天色已晚）"
1008205-229 = "嗯～今天一整天都很努力地完成各種活動呢！"
1008205-230 = "很好！這樣確實可以說是完美達成了「青梅竹馬活動」！"
1008205-231 = "[s]（可是今天整天都膩在一起，與其說是青梅竹馬……）"
1008205-232 = "但是老師，不，師父……"
1008205-233 = "真正的青梅竹馬活動還沒結束。"
1008205-234 = "[s]「嗯？真正的活動？」"
1008205-235 = "……呼。"
1008205-236 = "青梅竹馬和普通朋友之間有著巨大的差別。"
1008205-237 = "並非只是關係好，而是由一起度過的漫長時間沉澱的深厚友誼……"
1008205-238 = "建立起別人不敢隨便冒犯的關係……才能稱之為青梅竹馬。"
1008205-239 = "[s]「話雖如此，我總覺得你今天只是一時興起……」"
1008205-243 = "總，總之我想說的是……！"
1008205-244 = "既然都走到這一步了……說到青梅竹馬……最後的活動非它莫屬……"
1008205-245 = "那就是「在離別前呼喚對方的名字說再見活動」！"
1008205-246 = "[s]「名字……？」"
1008205-247 = "所以……現在我會直接稱呼師父的名字！"
1008205-248 = "做好覺悟吧，師父！"
1008205-249 = "[s]「是，是！」"
1008205-250 = "那個……"
1008205-251 = "……！"
1008205-252 = "[USERNAME]………………今，今天很開心。"
1008205-253 = "[s]「嗯，蓮華，我也很開心。」"
1008205-257 = "真，真的嗎！？"
1008205-258 = "本來還很擔心這樣會不會太勉強老師……"
1008205-259 = "太，太好了……"
1008205-260 = "不，不過……直接叫老師的名字真的超害羞的～ "
1008205-261 = "要當青梅竹馬也真不容易啊……"
1008205-265 = "那，那我們回去吧……"
1008205-267 = "[ns5]「這麼看來，與其說我們今天進行的是青梅竹馬活動……」\n[ns6]「感覺更像普通的約會吧。」"
1008205-274 = "啊？"
1008205-280 = "哇，哇啊啊啊！"
1008205-281 = "你你你在說什麼啊？師父！？"
1008205-282 = "[s]「咦！？我說錯什麼了嗎！？」"
1008205-283 = "重點才不是說錯話……！"
1008205-284 = "約，約會什麼的……！"
1008205-285 = "對我們來說還太早了……！"
1008205-291 = "[ns]「啊……跑掉了。」"

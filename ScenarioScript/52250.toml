[translation]
52250-1 = "第25話;第三本怪書"
52250-2 = "哦哦……真是有趣的景象啊。"
52250-3 = "沒想到悲劇與喜劇竟能交織上演。"
52250-4 = "當喜劇壓過悲劇，無人再將目光投向恐懼之時……#n就連令人脊背發涼的怪談，也會如風聞一般輕易消散啊。"
52250-5 = "那個小鬼……竟敢讓我準備的風雅淪為笑柄……！"
52250-6 = "雛罌粟大人，您能容忍這種事嗎？"
52250-7 = "棕櫚……那個小鬼正在把小女的風雅變成笑話啊！"
52250-8 = "若是以恐懼為食的《稻亭物怪錄》裡出現那種滑稽的百物語，#n還有誰會畏懼這個怪談呢！"
52250-9 = "別太動怒了。"
52250-10 = "風雅的價值，取決於人們的判斷。"
52250-11 = "既然大眾更被棕櫚新編的故事所吸引，必然是因為你有所不足。"
52250-12 = "若有惋惜之處，留待下回寫出引人入勝的新故事便是。"
52250-13 = "我……無法容忍。"
52250-17 = "巴不得立刻讓黃昏吞噬那放肆的丫頭，好好欣賞他哀號的模樣──"
52250-27 = "……適可而止。"
52250-28 = "那孩子對我而言是什麼存在，你該不會不知道吧？"
52250-29 = "還是你想將自己的無能怪罪於我，藉此發洩不滿？"
52250-30 = "不，不敢……小女指的並非雛罌粟大人。"
52250-31 = "可你剛才確實說過，要讓黃昏吞噬棕櫚對吧。"
52250-32 = "此一行為將招致何等後果……身為怪藝家的你想必很清楚才是。"
52250-33 = "是，是……"
52250-34 = "無論採取什麼手段──你的故事無法喚起恐懼的結果都不會改變。"
52250-35 = "一名優秀的說書人，就連意料之外的變數也能化為伏筆……#n你卻因為故事不按你的心意發展，便對觀眾大聲斥責。"
52250-36 = "真是難看啊，蛇女。"
52250-37 = "非，非常抱歉……！"
52250-38 = "小女絕對沒有質疑雛罌粟大人的意思！"
52250-39 = "只是……只是無法壓抑自己的憤怒……"
52250-45 = "……夠了。"
52250-46 = "既然百花繚亂與夏萊的老師已經回到這裡，恐懼與分裂的舞台便已形同落幕。"
52250-47 = "後續就交給[ruby=菖蒲]一目[/ruby]來處理吧。"
52250-48 = "那個丫頭……不，棕櫚該如何處置？"
52250-49 = "這個嘛……#n雛鳥既已振翅離巢，倒也不必再強行召回……"
52250-57 = "找到你們了，花鳥風月部的傢伙！"
52250-58 = "土生薊……不，蛇女。#n你們的退路已經被完全封鎖了。"
52250-59 = "如果立刻投降，還能以百花繚亂的禮數對待……#n要是敢反抗的話，可別怪我們不客氣了。"
52250-60 = "百花繚亂的傢伙，什麼時候到這裡來了……"
52250-61 = "就算怪書的力量有所減弱，也不至於會輸給你們這些小角色吧？"
52250-62 = "如果你們還以為能跟上次一樣輕鬆取勝的話，那就大錯特錯了！"
52250-63 = "現在的我們可是有百花繚亂的代理委員長名草前輩，還有能驅魔的魔槍「百蓮」！"
52250-64 = "只要有名草前輩在，我們根本不怕你這種怪談家！"
52250-65 = "就說了我不是怪談家，是怪藝家才對！"
52250-66 = "……果然，人心依舊是不可解之物啊。"
52250-67 = "明知結局將走向虛無，為何仍執意重複陳腐的故事呢？"
52250-68 = "咦，那個女人是誰啊？#n之前從來沒見過……"
52250-69 = "那個人是……"
52250-74 = "你就是花鳥風月部的部長，雛罌粟對吧。"
52250-75 = "沒錯。終於能與你寒暄了呢，愚蠢的後輩啊。"
52250-76 = "……我可不記得有你這樣的前輩。"
52250-77 = "若僅憑一句話便能斬斷羈絆，菖蒲也早就這麼做了吧。"
52250-78 = "……"
52250-79 = "連自認摯友之人都沒能徹底割捨的你，又豈能定義初見之人呢？"
52250-80 = "正因如此，你才顯得無能而傲慢。"
52250-81 = "前輩，別聽他胡言亂語。"
52250-82 = "沒錯，他只是想動搖你而已。"
52250-83 = "看我趕緊一擊就讓他閉嘴──"
52250-84 = "請，請稍等一下，蓮華前輩！"
52250-85 = "小女子從那個花鳥風月部的部長身上……感覺到了一股詭異的氣息。"
52250-86 = "……果然即便卸下了職責，勘解由小路家的血脈也不會改變啊。"
52250-87 = "竟能在未見之下察覺另一部「怪書」的存在。"
52250-88 = "[s]「另一部怪書……？」"
52250-89 = "這種情況下，不可能還有其他怪書存在吧？"
52250-90 = "那個小鬼頭之前也說過，花鳥風月部手上的怪書只有兩本……"
52250-91 = "花鳥風月部原先共擁有三本怪書。"
52250-94 = "映照人類欲望的《稻生物怪錄》。"
52250-97 = "映照人類恐懼的《稻亭物怪錄》。"
52250-101 = "以及映照人類本身的……《稻生靈怪錄》。"
52250-102 = "棕櫚似乎認為《稻生靈怪錄》已於二十年前的大雪原中消失……"
52250-103 = "不，其實要說遺失了也沒錯。"
52250-104 = "因為它正被用來強行喚醒那些早已失去原本形態、本該結束的事物啊。"
52250-105 = "[s]「失去原本的形態……？」"
52250-106 = "無論你們還有多少怪書，我都不會退讓。"
52250-107 = "因為我已經在葛葉大人、[USERNAME]老師和百花繚亂的大家面前立下誓言──"
52250-108 = "絕不再讓菖蒲孤身一人了。"
52250-109 = "雛罌粟部長，菖蒲在哪裡？"
52250-111 = "……看來你還在做夢啊。"
52250-112 = "傳說中的葛葉、毫無怨言的完美委員長、永恆的友情……全都只是虛構出來的東西。"
52250-113 = "若你執意否定現實，試圖編造謊言……我就讓你面對現實吧。"
52250-114 = "那所有人都不願直視、位於視野之外的現實──就由我親自揭示。"
52250-123 = "[ns]「大家小心！」"
52250-130 = "下一話;黑暗中的本心"

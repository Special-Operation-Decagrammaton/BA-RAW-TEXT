[translation]
52250-1 = "Episode 25;The Third Tome"
52250-2 = "Oho. What a sight to behold."
52250-3 = "Tragedy and comedy meld into one. A story unlike anything we have yet to witness."
52250-4 = "Comedy reigns triumphant, and fear fades into a wisp of a dream. Ghost stories that once elicited terror, instead dissipate with the morning mist."
52250-5 = "That brat turned my elegant performance into...a joke!"
52250-6 = "Will you let this stand, Miss Kokuriko?!"
52250-7 = "Shuro mars my elegance with slapstick comedy!"
52250-8 = "Toutei's Phantom Illustrations feeds on fear to craft the inexplicable. This ridiculous Phantom Fable undermines the exquisite taste of the Hundred Ghost Stories!"
52250-9 = "Calm yourself."
52250-10 = "Art is in the eye of the beholder."
52250-11 = "If Shuro's story can catch the eye of said beholder, yours is simply lacking."
52250-12 = "Identify your shortcomings, so that next time you may write a story that will thrill and excite the soul."
52250-13 = "I...won't accept that."
52250-17 = "Right now, my only desire is to throw that insolent brat into the spirit realm while she screams and cries."
52250-27 = "...Enough."
52250-28 = "You are well aware of the meaning that child holds."
52250-29 = "You dare imply your ineptitude is of my doing?"
52250-30 = "N-No, not at all. That was not my intention, Miss Kokuriko..."
52250-31 = "You threatened to cast Shuro into the spirit realm, did you not?"
52250-32 = "You are a ghost artist yourself. You are no stranger to the consequences of such an action."
52250-33 = "Y-Yes, but..."
52250-34 = "The threads of your feeble story have frayed. No longer can you weave fear in the hearts of the people."
52250-35 = "A true storyteller capitalizes upon the unforeseen as foreshadowing to weave intricacies into their art. Your inelegant response, instead, is to castigate the audience for your lack of ability?"
52250-36 = "How disgraceful, snake charmer."
52250-37 = "M-My deepest apologies!"
52250-38 = "Someone such as I could never dream of questioning you, Miss Kokuriko!"
52250-39 = "I simply...allowed my disappointment to seep through—"
52250-45 = "...That'll do."
52250-46 = "Now that the head of the Hyakkaryouran and Schale's Sensei have returned, the chapter of fear and division has met its end."
52250-47 = "We shall allow Ayame's Hitotsume to take the stage."
52250-48 = "What about the brat— ...What of Shuro?"
52250-49 = "A question to ponder... However, I shall not be the bulwark against the path she is striving to forge for herself."
52250-57 = "There you are, Nature's Beauty!"
52250-58 = "Habu Azami...the snake charmer. Your reprehensible stories end, here and now."
52250-59 = "Surrender now, and the Hyakkaryouran shall mete out the mercy you do not deserve. Fight, and you will crumble under the full force of our retribution."
52250-60 = "The Hyakkaryouran... How did you make it all the way here?"
52250-61 = "Even if the tome has weakened, do you truly believe the likes of you could triumph in battle?"
52250-62 = "We, the Hyakkaryouran, will not be intimidated by you again!"
52250-63 = "Nagusa is the acting president of the Hyakkaryouran and wields the Hundred Lotus! Its great power will best all of you!"
52250-64 = "With Nagusa at our side, a ghostly bard like you cannot scare us!"
52250-65 = "How many times must I tell you, I am a ghost artist! Not some lowly bard! You imbeciles—!"
52250-66 = "...As always, the human heart remains an enigma."
52250-67 = "Tell me, why is it that humans pursue their futile endings to their inane plots?"
52250-68 = "Huh? Who's that? She wasn't there last time, was she?"
52250-69 = "That woman is..."
52250-74 = "The leader of Nature's Beauty, Kokuriko."
52250-75 = "Correct. At last, you greet me with a proper greeting, foolish junior."
52250-76 = "...I've never acknowledged someone like you as my senior."
52250-77 = "And if a single word could sever a bond, Ayame would have long done so."
52250-78 = "..."
52250-79 = "You cling to the illusion of your companion, refusing to cast her off after all that has happened. So how can you make such rash decisions about someone you know nothing of?"
52250-80 = "Ineptitude. Arrogance."
52250-81 = "Pay no mind to her drivel, Nagusa."
52250-82 = "Exactly. She's just trying to get under your skin and buy herself a little more time."
52250-83 = "I'll put her down right now. I'd like to see what she has to say after I—"
52250-84 = "P-Please wait, Renge!"
52250-85 = "I sense some sort of...strange energy exuding from the Nature's Beauty leader."
52250-86 = " You may have cast aside your duties, but the Kadenokouji blood is not so easily renounced."
52250-87 = "I'm impressed you're able to sense the presence of a tome."
52250-88 = "[s] \"A...tome?\""
52250-89 = "Seriously? There's ANOTHER one?!"
52250-90 = "That Nature's Beauty brat said there were only two!"
52250-91 = "Originally, Nature's Beauty was in possession of three tomes."
52250-94 = "Inou's Phantom Records, a reflection of human desire."
52250-97 = "Toutei's Phantom Illustrations, a reflection of human fears."
52250-101 = "And lastly, a reflection of humans themselves, Inou's Spirit Records."
52250-102 = "Shuro did believe that the Spirit Records vanished in the Great Snowfield 20 years past."
52250-103 = "More accurately, it was lost."
52250-104 = "Its story once ended, losing its form, but even originals can be altered and utilized when necessary."
52250-105 = "[s] \"'Once ended'...?\""
52250-106 = "Produce all the tomes you wish, I will not be deterred."
52250-107 = "I made a vow before Kuzunoha, [USERNAME] Sensei, and everyone in the Hyakkaryouran."
52250-108 = "I swore to never leave Ayame alone again."
52250-109 = "So tell me, President Kokuriko. Where is Ayame?"
52250-111 = "Do you still wander in the land of dreams?"
52250-112 = "The Great Prophet, Kuzunoha. She is the embodiment of absolution and eternal bonds, and a mere rumor. A tired, banal story."
52250-113 = "Allow me to shatter your lies."
52250-114 = "I shall pry open your clouded eyes and force you to accept reality."
52250-123 = "[ns] \"Everyone! Look out!\""
52250-130 = "Next Episode;True Intentions Within the Darkness"

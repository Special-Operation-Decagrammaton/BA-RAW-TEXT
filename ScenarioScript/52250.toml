52250-1 = "#title;제25화;세 번째 괴서"
52250-2 = "3;코쿠리코;04;호오…… 이것 참 흥미로운 광경이로구나.\n#3;a"
52250-3 = "3;코쿠리코;09;비극과 희극이 한데 어우러져 상연될 줄이야."
52250-4 = "3;코쿠리코;02;희극이 비극을 압도하니 아무도 공포에 눈을 돌리지 않고, 등골을 서늘케 할 괴담도 한낱 풍문처럼 쉬이 사라지는구나."
52250-5 = "3;아자미;29;저 꼬맹이가…… 내가 준비한 풍류를 웃음거리로 만들다니……!\n#3;em;[스팀]"
52250-6 = "3;아자미;27;코쿠리코 님, 이를 두고 보아야만 하겠습니까?"
52250-7 = "3;아자미;33;슈로가…… 그 꼬맹이가 제 풍류를 웃음거리로 만들고 있지 않습니까!\n#3;em;[빠직]"
52250-8 = "3;아자미;31;두려움을 먹이 삼아 신비를 잣는 <토테이붓카이로쿠>의 이야기에 저런 우스꽝스러운 백물어를 등장시킨다면 누가 이 괴담을 두려워하겠습니까!"
52250-9 = "1;코쿠리코;99;너무 성내지 말거라.\n#1;a\n#3;m5\n#1;em;…"

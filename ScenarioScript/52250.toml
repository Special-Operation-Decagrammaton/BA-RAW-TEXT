[translation]
52250-1 = "ตอนที่ 25;หนังสือลึกลับเล่มที่ 3"
52250-2 = "โอ้... น่าสนใจจริงๆ"
52250-3 = "คิดไม่ถึงเลยว่าโศกนาฏกรรมกับสุขนาฏกรรมจะอยู่ร่วมกันได้"
52250-4 = "ในเมื่อสุขนาฏกรรมมีชัยเหนือโศกนาฏกรรม ก็เลยไม่มีใครหันหลังให้ความกลัว เรื่องลึกลับที่ทำให้กลัวจนขนหัวลุกก็จะหายไปง่ายๆ เหมือนข่าวลือสินะ"
52250-5 = "ยัยเด็กตัวกะเปี๊ยกนั่น... ทำให้ความสง่างามที่ฉันเตรียมไว้กลายเป็นเรื่องน่าหัวเราะงั้นเหรอ...!"
52250-6 = "ท่านโคคุริโกะ จะไม่ทำอะไรเลยเหรอคะ?"
52250-7 = "ชูโระ... ยัยเด็กน้อยคนนั้นทำให้ความสง่างามของฉันเป็นเรื่องตลกขบขันอยู่นะคะ!"
52250-8 = "เรื่องราวของ <โทเท บุคไค โรคุ> ถักทอด้วยความลึกลับจากความกลัวที่กินเข้าไป ถ้าเอาตำนานร้อยเรื่องราวที่น่าขันแบบนั้นมาอยู่ในเรื่อง แล้วใครจะไปกลัวเรื่องลึกลับกันล่ะคะ!"
52250-9 = "เจ้าอย่าโมโหให้มากไปเลย"
52250-10 = "การตัดสินคุณค่าของความสง่างามขึ้นอยู่กับจิตใจของมนุษย์อยู่แล้ว"
52250-11 = "หากผู้คนให้ความสนใจเรื่องราวที่ชูโระแต่งขึ้นใหม่ นั่นก็เป็นเพราะเจ้ายังบกพร่องอย่างไม่ต้องสงสัย"
52250-12 = "และหากมีส่วนที่บกพร่อง เจ้าก็แค่รอเขียนเรื่องราวใหม่ให้ผู้คนตื่นเต้นอีกครั้ง"
52250-13 = "ฉัน... ยอมไม่ได้ค่ะ"
52250-17 = "ฉันอยากออกไปไล่ยัยเด็กตรรกะเพี้ยนคนนั้นแล้วโยนให้เป็นอาหารของห้วงอัสดงไปเสียเลย ฉันจะทำให้ยัยเด็กนั่นร้องคร่ำครวญให้ได้..."
52250-27 = "พอได้แล้วน่ะ..."
52250-28 = "เจ้าคงไม่ได้พูดเช่นนั้นเพราะไม่รู้ว่าเด็กคนนั้นมีความหมายอย่างไรกับข้า"
52250-29 = "หรือว่าเจ้ากำลังโทษว่าความบกพร่องของเจ้าเป็นเพราะตัวข้า ก็เลยมาหัวฟัดหัวเหวี่ยงกับข้าแทน?"
52250-30 = "มะ... ไม่ใช่อย่างนั้นนะคะ... ฉันไม่ได้พูดว่าท่านโคคุริโกะค่ะ"
52250-31 = "แต่เมื่อกี้เจ้าบอกว่าจะโยนชูโระลงไปเป็นอาหารห้วงอัสดงไม่ใช่หรือ"
52250-32 = "นักเล่าเรื่องพรั่นพรึงอย่างเจ้าน่าจะรู้ผลลัพธ์ของการกระทำเช่นนั้นนะ?"
52250-33 = "ฉะ... ฉันรู้ดีค่ะ..."
52250-34 = "ไม่ว่าเจ้าจะเลือกวิธีใด ผลลัพธ์ก็จะยังคงเหมือนเดิม นั่นคือเรื่องราวของเจ้าจะไม่น่ากลัวอีกต่อไป"
52250-35 = "นักเล่าเรื่องที่ดีจะงัดตัวแปรที่คาดไม่ถึงมาเป็นแผนสำรองลับในการดำเนินเรื่อง แต่นี่เจ้ากลับเอ็ดตะโรผู้ชมเพราะเรื่องราวไม่เป็นไปตามใจเจ้าต้องการ"
52250-36 = "การกระทำแบบนี้มันสกปรกนะ เฮบิโอนา"
52250-37 = "ขะ... ขอโทษค่ะ...!"
52250-38 = "ฉันไม่เคยสงสัยในเจตนาของท่านโคคุริโกะเลยแม้แต่น้อยค่ะ!"
52250-39 = "ฉันแค่... ระงับความโกรธของตัวเองเอาไว้ไม่ได้..."
52250-45 = "ก็เลยเผลอพูดไปอย่างนั้นค่ะ..."
52250-46 = "วินาทีที่เฮียกกะเรียวรันกับครูจากชาเล่ต์กลับมาถึงที่นี่ ฉากของความกลัวและความแตกแยกก็ปิดม่าน#nลงแล้วละ"
52250-47 = "คู่ต่อสู้หลังจากนี้ ข้าจะฝากไว้กับ[ruby=อายาเมะ]ฮิโตสึเมะ[/ruby]แล้วกัน"
52250-48 = "ถ้างั้นเด็กน้อยคนนั้น... ฉันหมายถึงชูโระน่ะค่ะ ท่านจะทำยังไงกับชูโระคะ?"
52250-49 = "ไม่รู้สิ ข้าไม่จำเป็นต้องเรียกลูกนกที่สยายปีกออกจากรังไปเองกลับมาหรอก..."
52250-57 = "เจอตัวแล้ว พวกชมรมความงามของธรรมชาติ!"
52250-58 = "ฮาบุ อาซามิ... ไม่สิ เฮบิโอนา ตอนนี้เธอทำอะไรไม่ได้แล้วละ"
52250-59 = "ถ้าเธอยอมจำนนแต่โดยดี ฉันก็จะปฏิบัติกับเธอด้วยมารยาทของเฮียกกะเรียวรัน แต่ถ้าขัดขืนละก็ รอเผชิญกับชะตากรรมที่เลวร้ายได้เลย"
52250-60 = "พวกเฮียกกะเรียวรัน มาถึงที่นี่ตั้งแต่เมื่อไร..."
52250-61 = "ต่อให้พลังของหนังสือลึกลับจะคลายลง แต่คิดว่าฉันจะยอมให้กับคนไร้ค่าอย่างพวกเธองั้นเหรอ?"
52250-62 = "ถ้าคิดว่าพวกเราจะโดนเล่นงานเหมือนครั้งก่อนละก็ คุณคิดผิดแล้วเจ้าค่ะ"
52250-63 = "ตอนนี้พวกเรามีทั้งรุ่นพี่นางุสะ รักษาการหัวหน้าเฮียกกะเรียวรัน และปืนปีศาจเฮียกกุเร็นที่ปราบได้#nกระทั่งวิญญาณเลยเจ้าค่ะ!"
52250-64 = "ถ้าพวกเรามีรุ่นพี่นางุสะ ต่อให้เป็นนักเล่าเรื่องลึกลับอย่างคุณ พวกเราก็ไม่กลัวหรอกเจ้าค่ะ!"
52250-65 = "ฉันบอกไปแล้วไม่ใช่เหรอว่าฉันไม่ใช่นักเล่าเรื่องลึกลับ แต่เป็นนักเล่าเรื่องพรั่นพรึงน่ะ!"
52250-66 = "จิตใจของมนุษย์เป็นสิ่งที่ยากแท้หยั่งถึงจริงๆ สินะ..."
52250-67 = "เหตุใดถึงอยากจะฟังเรื่องเดิมๆ ซ้ำแล้วซ้ำเล่า ทั้งๆ ที่รู้ว่ามันจะจบลงอย่างไร้ประโยชน์?"
52250-68 = "หืม? ผู้หญิงคนนั้นคือใครน่ะ? เหมือนไม่เคยเห็นมาก่อนเลย..."
52250-69 = "ผู้หญิงคนนั้นก็คือ..."
52250-74 = "คุณคือโคคุริโกะ หัวหน้าชมรมความงามของธรรมชาติสินะ"
52250-75 = "ถูกต้อง ในที่สุดเจ้าก็เรียกชื่อของข้าสินะ รุ่นน้องผู้โง่เขลา"
52250-76 = "ฉันจำไม่ได้เลยว่าเคยมีรุ่นพี่แบบเธอ..."
52250-77 = "หากเรายุติความสัมพันธ์ด้วยคำพูดเพียงคำเดียวได้ ข้าว่าอายาเมะก็คงทำไปแล้วละ"
52250-78 = "......"
52250-79 = "คนที่สลัดเพื่อนสนิททิ้งไม่ได้อย่างเจ้าจะปฏิเสธข้าที่เป็นถึงรุ่นพี่ได้เช่นนั้นหรือ?"
52250-80 = "เจ้าน่ะทั้งไร้ความสามารถ ทั้งหยิ่งยโส"
52250-81 = "รุ่นพี่ อย่าไปฟังคำพูดของผู้หญิงคนนั้นเลย"
52250-82 = "ใช่ เธอพ่นคำพูดได้ทุกอย่างก็เพื่อจะทำให้รุ่นพี่สั่นคลอนนะ"
52250-83 = "คนแบบนี้สมควรโดนโจมตีให้พูดอะไรน่ารังเกียจออกจากปากไม่ได้"
52250-84 = "ดะ... เดี๋ยวก่อนเจ้าค่ะ รุ่นพี่เรนเกะ!"
52250-85 = "ข้าสัมผัสได้ถึง... พลังปริศนาแปลกๆ จากหัวหน้าชมรมความงามของธรรมชาติคนนั้นเจ้าค่ะ"
52250-86 = "ถึงจะถอนตัวจากหน้าที่แล้ว แต่เลือดของคาเดโนะโคจิก็ยังไหลเวียนอยู่ในตัวเจ้า..."
52250-87 = "ถึงกับรับรู้ว่ามี 'หนังสือลึกลับ' เล่มอื่นแม้จะมองไม่เห็นได้ด้วยเชียวหรือ?"
52250-88 = "[s] \"หนังสือลึกลับเล่มอื่น...?\""
52250-89 = "จะมีหนังสือลึกลับเล่มอื่นเหลืออยู่ในสถานการณ์แบบนี้ได้ยังไงกัน?"
52250-90 = "เด็กตัวกะเปี๊ยกคนนั้นก็บอกว่าชมรมความงามของธรรมชาติมีหนังสือลึกลับแค่ 2 เล่มนี่นา..."
52250-91 = "เดิมทีแล้วชมรมความงามของธรรมชาติมีหนังสือลึกลับทั้งหมด 3 เล่ม"
52250-94 = "<อิโนะ โมโนโนเคะ โรคุ> ที่สะท้อนความปรารถนาของมนุษย์"
52250-97 = "<โทเท บุคไค โรคุ> ที่สะท้อนความกลัวของมนุษย์"
52250-101 = "และ <อิโน เรย์ไค โรคุ> ที่สะท้อนตัวมนุษย์เอง..."
52250-102 = "ชูโระคงคิดว่า <อิโน เรย์ไค โรคุ> หายไปในทุ่งหิมะใหญ่เมื่อ 20 ปีก่อนแล้ว..."
52250-103 = "ไม่สิ ถ้าจะบอกว่าหายไปแล้วก็ไม่ผิด"
52250-104 = "เพราะมันถูกใช้เพื่อฟื้นคืนสิ่งที่จบไปแล้วในสภาพที่สูญเสียรูปแบบดั้งเดิมของมันไป"
52250-105 = "[s] \"สิ่งที่จบไปแล้ว...?\""
52250-106 = "ต่อให้พวกเธอมีหนังสือลึกลับอีกกี่เล่ม ฉันก็ไม่คิดจะยอมแพ้ให้หรอก"
52250-107 = "เพราะฉันสาบานต่อหน้าท่านคุซึโนฮะ ต่อหน้าคุณครู [USERNAME] และต่อหน้าทุกคนในเฮียกกะเรียวรันไว้แล้ว..."
52250-108 = "ฉันสาบานไว้แล้วว่าจะไม่ปล่อยให้อายาเมะต้องอยู่เพียงลำพังอีกต่อไป"
52250-109 = "หัวหน้าโคคุริโกะ อายาเมะอยู่ที่ไหน?"
52250-111 = "เจ้ายังอยู่ในความฝันสินะ"
52250-112 = "ทั้งคุซึโนฮะในตำนาน ทั้งหัวหน้าที่สมบูรณ์แบบที่ไม่รู้จักความเกลียดชัง ทั้งมิตรภาพชั่วนิรันดร์ ทุกอย่างล้วนเป็นเรื่องที่แต่งขึ้นให้พูดคุยสนุกกันเท่านั้นละ"
52250-113 = "หากเจ้าปฏิเสธสิ่งนี้และพยายามเขียนความเท็จ ข้าก็จะแสดงความจริงให้ประจักษ์ต่อหน้าเจ้าเอง"
52250-114 = "ข้าจะแสดงความจริงที่อยู่นอกเหนือสายตา ความจริงที่ทุกคนพยายามหลีกเลี่ยงให้เจ้าได้เห็น"
52250-123 = "[ns] \"ทุกคนระวังนะ!\""
52250-130 = "ตอนต่อไป;ความในใจในความมืดมิด"

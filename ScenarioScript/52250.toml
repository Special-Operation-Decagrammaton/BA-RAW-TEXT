52250-11 = "1;코쿠리코;11;사람들이 슈로가 새롭게 지어낸 이야기에 더 이끌렸다면, 이는 필시 네가 부족한 까닭이다."
52250-12 = "1;코쿠리코;09;미진한 부분이 있다면 다음을 기약하여 사람들이 열광할 새로운 이야기를 다시 쓰면 되는 것이야."

[translation]
10001065-1 = "第6話;第二次勝利"
10001065-2 = "赤冬聯邦學園．圖書館"
10001065-3 = "唔唔，輸了……"
10001065-4 = "《巴士底監獄的薔薇～30週年限定版～》落入了不懂其價值的小孩手中……"
10001065-5 = "真是明珠暗投，對牛彈琴啊……"
10001065-6 = "以今天的敗北為契機，文明的森林將會焚燒、頹廢吧……"
10001065-7 = "說成這樣也太過分了吧！？而且咱才不小，到底要說幾次！"
10001065-11 = "……來，這本書還給你吧。咱已經不需要了。"
10001065-12 = "……咦？但到剛才為止，你不是都在說不管發生什麼事都要枕著這本書睡覺……"
10001065-13 = "和你們痛快地打了一場後，睡意全消。 #n午覺先保留，保留。"
10001065-14 = "而且，咱雖然不太明白，但這東西對你們來說似乎很重要……所以咱改變主意了。"
10001065-15 = "潔莉諾會長……"
10001065-16 = "話說回來，這本書真的那麼重要嗎？"
10001065-18 = "當然囉，潔莉諾會長！"
10001065-19 = "正如我前面說的，這本書是紀念《巴士底監獄的薔薇》出版30週年而推出的珍藏版。#n因為只印了100本，在書迷們之間也是一本難求的程度，可謂遠近馳名！"
10001065-20 = "尤其是附錄的特別短篇分鏡圖，是從未公開過的稀有物，價值連城，#n是每個《巴士底監獄的薔薇》的愛好者都想要的珍品！"
10001065-22 = "啊，這個當然是複製品，真本在三一的大圖書館內展示著。"
10001065-23 = "唔唔……知道了知道了！ #n所以說不要帶著閃閃發光的眼神一直靠過來！"
10001065-24 = "比起那個，如果三一的大圖書館有那麼珍貴的東西，#n與其看複製品，為何不直接去看呢？"
10001065-26 = "因為三一的大圖書館的藏書不開放其他學校的學生閱覽。"
10001065-28 = "身為赤冬聯邦學園的學生，只能滿足於複製品……"
10001065-29 = "呵呵呵，你真是什麼都不懂啊，紅葉！"
10001065-32 = "對於咱率領的赤冬聯邦學園來說，沒有什麼是不可能的！"
10001065-33 = "如果三一的圖書館不開放藏書給其他學校的學生，#n咱們只要佔領三一，統治它就行了！"
10001065-34 = "「知識解放戰線」的同志們，#n只要你們願意效忠咱，咱保證會公開至今為止你們從未見過的所有禁書！"
10001065-36 = "是，是真的嗎！？潔莉諾會長！？"
10001065-37 = "當然！在咱的帶領之下，不只是三一學園，就連格黑娜、千年、百鬼夜行都一樣，#n總有一天奇普托斯的所有學校都會落入咱的掌控之中！"
10001065-38 = "當然，在此之前，得先把佔據事務局的瑪麗娜趕出去，奪回權力才行……"
10001065-39 = "一切全聽從會長的命令！不，請讓我聽從！潔莉諾會長！"
10001065-40 = "僅僅用一句話就擄獲了知識解放戰線的同志們……不愧是會長！智惠我，十分感動！"
10001065-41 = "呵呵，所以咱不是說過了嗎。#n在偉大的潔莉諾大人的魅力面前，誰也無法抵擋的了！"
10001065-42 = "那麼，要從哪裡開始呢？#n去事務局把瑪麗娜委員長拖出來，沉入校舍後面的冰湖裡嗎？"
10001065-43 = "還是說，為了讓他再也不敢發起政變……搔他癢搔一整晚呢？"
10001065-44 = "等，等等！就算是咱，也沒想過這麼殘酷的事！"
10001065-45 = "別滿不在乎地說出那麼可怕的話……！"

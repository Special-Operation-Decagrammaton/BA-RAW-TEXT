[translation]
10001065-1 = "#title;제6화;두 번째 승리!"
10001065-2 = "#place;붉은겨울 학원 도서관"
10001065-3 = "3;모미지;04;으으, 실패해 버리고 말았어요…….\n#3;em;[땀]\n#3;stiff\n#3;a"
10001065-4 = "3;모미지;04;<바스티유의 장미~ 발매 30주년 한정 애장판>이 그 가치도 모르는 꼬맹이의 손에……."
10001065-5 = "3;모미지;06;돼지 목에 진주, 소 귀에 경문이에요.\n#3;em;[속상함]"
10001065-6 = "3;모미지;06;오늘의 패배로 문명은 불타고 인류는 퇴보하게 되겠죠…….\n#3;stiff"
10001065-7 = "5;체리노;05;말이 심하잖아! 그러니까 이 몸은 꼬맹이가 아니라고 하지 않았는가!\n#5;hophop\n#5;al\n#5;em;[빠직]\n#3;m1"
10001065-8 = "#st;[0,0];instant;1;"
10001065-9 = "#clearST"
10001065-10 = "5;체리노;99\n#5;greeting\n#wait;1500"
10001065-11 = "5;체리노;02;……자, 이 책은 돌려주겠네. 내게는 더 이상 필요 없어.\n#5;em;[반응]\n#5;m3"
10001065-12 = "3;모미지;02;네? 하지만 아까는 무슨 일이 있어도 이 책을 베고 주무시겠다고…….\n#3;em;[?!]\n#3;shake"
10001065-13 = "5;체리노;01;그대들과 싸우며 열심히 날뛰다 보니 잠이 싹 달아나서 말이야. #n낮잠은 보류다, 보류."
10001065-14 = "5;체리노;99;게다가 그대들에게는 소중한 물건인 것 같으니…… 마음이 바뀌었어."
10001065-15 = "3;모미지;02;체리노 회장…….\n#3;em;[///]\n#3;stiff"
10001065-16 = "5;체리노;02;그나저나 이런 책 쪼가리가 정말로 그렇게 귀한 물건이란 말인가?\n#5;em;[?]"
10001065-17 = "3;모미지;07\n5;체리노;02\n#3;h"
10001065-18 = "3;모미지;07;물론이에요, 체리노 회장!\n#3;em;[반짝]\n#3;hophop\n#3;m2\n#5;m4"
10001065-19 = "3;모미지;03;아까도 말씀드렸지만 이 책은 <바스티유의 장미>가 발매된 지 30주년이 된 것을 기념하여 나온 애장판으로, 100부밖에 인쇄되지 않아 마니아들 사이에서도 구하기 어려운 책으로 손꼽힌다고요!"
10001065-20 = "3;모미지;03;특히 부록으로 첨부된 특별 단편의 콘티는 그동안 단 한 번도 공개되지 않은 희귀판이라, <바스티유의 장미> 팬이라면 누구나 탐낼 만한 귀한 물건이지요!"
10001065-21 = "3;모미지;03\n5;체리노;04\n#3;h"
10001065-22 = "3;모미지;07;아, 물론 이 콘티는 복사된 사본이고 진본은 트리니티 대도서관의 서고에 전시되어 있지만요.\n#3;em;[하트]\n#3;hophop\n#3;m3\n#5;m5"
10001065-23 = "3;모미지;07\n5;체리노;04;으윽…… 알겠다, 알겠느니라! #n그러니 그렇게 눈에 불을 켜고 달려들지 않아도 되는 것이다!\n#5;em;[땀]\n#5;stiff"
10001065-24 = "3;모미지;07\n5;체리노;02;그나저나 그 귀중한 원판이 트리니티 학원의 대도서관에 있다면 이런 사본에 의지하지 말고 직접 가서 보면 되지 않느냐?\n#5;em;[반응]"
10001065-25 = "3;모미지;07\n5;체리노;02\n#3;h"
10001065-26 = "3;모미지;02;하지만 트리니티 대도서관의 장서는 다른 학원의 학생들은 열람할 수 없는걸요?"
10001065-27 = "3;모미지;02\n5;체리노;02\n#3;h"
10001065-28 = "3;모미지;06;붉은겨울 학원의 학생인 저희는 그저 사본으로 만족하는 수밖에…….\n#3;em;[속상함]\n#3;stiff"
10001065-29 = "5;체리노;99;후후후, 무르구나, 모미지!\n#5;m3\n#3;dl"
10001065-30 = "#wait;1000"
10001065-31 = "#all;hide"
10001065-32 = "3;체리노;01;이 몸이 이끄는 붉은겨울 학원에 불가능이란 없느니라!\n#3;closeup"
10001065-33 = "3;체리노;01;트리니티 학원의 도서관이 다른 학교의 학생들에게 장서를 개방하지 않는다면, 우리가 트리니티 학원을 점거해 지배해버리면 되는 것이다!\n#3;closeup"
10001065-34 = "3;체리노;03;<지식해방전선>의 동지들이 이 몸에게 충성을 맹세한다면, 그동안 그대들이 보지 못했던 모든 금서들을 공개하겠다고 약조하지!\n#3;em;[재잘]\n#3;hophop\n#3;closeup"
10001065-35 = "3;체리노;03\n#3;h"
10001065-36 = "1;모미지;02;그, 그게 정말이신가요? 체리노 회장?\n#1;ar\n#1;em;[반응]\n#1;hophop\n#3;m5"
10001065-37 = "3;체리노;01;물론이다! 이 몸의 영도라면 트리니티 학원은 물론이고, 게헨나, 밀레니엄, 백귀야행 등 키보토스의 모든 학원이 우리의 밑에 들어오게 될 테니 말이다!"
10001065-38 = "3;체리노;99;물론 그전에 사무국을 점거하고 있는 마리나 동지를 몰아내고 권력을 되찾는 게 우선 이겠지만…….\n#3;em;…"
10001065-39 = "1;모미지;07;회장님의 명령에 무조건 따르겠어요! 아니, 따르게 해주세요! 체리노 회장님!\n#1;hophop"
10001065-40 = "5;토모에;03;말 한마디로 지식해방전선의 동지들을 포섭하시다니…… 역시 회장님이시군요! 이 불초 토모에, 감격했습니다!\n#5;em;[반짝]\n#5;al\n#3;m3"
10001065-41 = "3;체리노;03;후후, 말하지 않았느냐. 이 위대하신 체리노 님의 카리스마 앞에서는 그 누구도 저항할 수 없다고!\n#3;em;[재잘]\n#3;hophop"
10001065-42 = "1;모미지;07;그럼 무엇부터 먼저 하면 될까요? 사무국에 가서 마리나 동지를 끌어내 교정 뒤에 있는 얼음 호수에 밀어 넣으면 될까요?\n#5;dr\n#3;m5"
10001065-43 = "1;모미지;03;아니면 다시는 쿠데타를 일으킬 생각조차 하지 못하도록 밤새 간지럼을 태우면 될까요?\n#1;em;[반짝]"
10001065-44 = "3;체리노;04;자, 잠깐! 아무리 이 몸이라도 그런 끔찍한 생각까지는 하지 않았느니라!\n#3;em;[땀]\n#3;stiff"
10001065-45 = "3;체리노;01;과격한 행동은 금지야, 금지!\n#3;hophop"
10001065-46 = "#continued"

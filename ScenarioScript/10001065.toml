[translation]
10001065-1 = "Episode 6;The Second Victory!"
10001065-2 = "Red Winter Academy Library"
10001065-3 = "Ugh, I lost..."
10001065-4 = "And The Rose of Bastille: 30th Anniversary Limited Edition is now in the hands of that ignorant little brat..."
10001065-5 = "Talk about casting pearls before swine..."
10001065-6 = "I'm sorry civilized society. I've failed you."
10001065-7 = "Stop being so dramatic! Also, I told you I'm not a little brat!"
10001065-11 = "...Here. Take the book. I don't need it anymore."
10001065-12 = "Huh? But you were so insistent on sleeping on it just a few minutes ago..."
10001065-13 = "Fighting you got me all worked up. My nap will have to wait."
10001065-14 = "Besides, you really seem to care about that book, so...I'll let you keep it."
10001065-15 = "President Cherino..."
10001065-16 = "Is this book really that valuable?"
10001065-18 = "Of course it is!"
10001065-19 = "Like I said, this is a limited edition printed for The Rose of Bastille's 30th anniversary. Only a hundred total copies were printed, so it's a hard item to come by."
10001065-20 = "Plus, the bonus story in the appendix is unique to this version. Any fan of the original would kill to get their hands on this book! "
10001065-22 = "Of course, this is just a copy. The original is on display at the Trinity Grand Library."
10001065-23 = "Geez. Quit it with the puppy dog eyes, I get it already!"
10001065-24 = "But if the original is at Trinity, why don't you go see it in person instead of obsessing over a copy?"
10001065-26 = "Well, outsiders don't have access to the books at Trinity's library."
10001065-28 = "Since we're Red Winter students, we'll just have to make do with our own copy..."
10001065-29 = "You should know something, my dear Momiji."
10001065-32 = "So long as I am at the helm of our Red Winter Academy, nothing is impossible!"
10001065-33 = "If Trinity's library is closed to students of other academies, then we'll just have to conquer Trinity General School!"
10001065-34 = "Have the Knowledge Liberation Front swear loyalty to me, and I promise to show you all the realm of books that have remained just out of reach until now!"
10001065-36 = "D-Do you really mean that, President?"
10001065-37 = "Of course! Under my leadership, all the academies of Kivotos: Gehenna, Millennium, Hyakkiyako, you name it, will fall before us!"
10001065-38 = "However, the first step to this glorious future is to drive Comrade Marina out of the secretariat so I can be president again..."
10001065-39 = "We'll follow you till the end! I mean, please let us follow you, President Cherino!"
10001065-40 = "I can't believe you've got the Knowledge Liberation Front begging to follow you... You're just too amazing, President!"
10001065-41 = "Heh. What did I tell you? No one can resist the undeniable charisma of the great Cherino!"
10001065-42 = "Now how should we handle Marina? Why not drag her out of the secretariat and throw her into the icy lake off campus?"
10001065-43 = "Or perhaps we tickle her into submission all night long so she'll never dare to stage a coup again?"
10001065-44 = "Wh-What the...? Hold on, even I wouldn't think of doing anything so cruel!"
10001065-45 = "Let's handle this like civilized people!"

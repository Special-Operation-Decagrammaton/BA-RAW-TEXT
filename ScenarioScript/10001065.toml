[translation]
10001065-1 = "ตอนที่ 6;ชัยชนะครั้งที่ 2"
10001065-2 = "ห้องสมุด สหภาพเรดวินเทอร์"
10001065-3 = "อึ้กก.. แพ้ให้จนได้..."
10001065-4 = "<กล้วยไม้แวร์ซายส์~ ฉบับพิเศษครบรอบ 30 ปี> ตกไปอยู่ในมือของเด็กตัวกะเปี๊ยก#nที่ไม่รู้ค่าของหนังสือได้ยังไง..."
10001065-5 = "เหมือนหัวล้านได้หวีเลยอย่างนั้นแหละ!"
10001065-6 = "ความพ่ายแพ้นี้จะทำให้อารยธรรมมอดไหม้ และมนุษยชาติก็จะถดถอย..."
10001065-7 = "พูดแรงเกินไปแล้วนะ! แล้วเราก็บอกไปแล้วไม่ใช่เหรอว่าเราไม่ใช่เด็กตัวกะเปี๊ยก!?"
10001065-11 = "....เอ้า รับหนังสือของเธอคืนไปเถอะ เราไม่ต้องการแล้วล่ะ"
10001065-12 = "คะ? แต่เมื่อกี้ดื้อดึงจะเอาหนังสือนี้ไปหนุนหัวให้ได้ไม่ใช่เหรอ..."
10001065-13 = "เราสู้เพื่อชิงหนังสือกับพวกเธอจนหายง่วงแล้วละ เอาไว้นอนตอนอื่นแล้วกัน"
10001065-14 = "อีกอย่าง ในเมื่อมันเป็นของสำคัญของพวกเธอ... เราเลยยอมเปลี่ยนใจแล้ว"
10001065-15 = "ประธานเชริโน่..."
10001065-16 = "ว่าแต่หนังสือนี้มันเป็นของหายากจริงๆ งั้นเหรอ?"
10001065-18 = "ก็ใช่น่ะสิคะประธานเชริโน่!"
10001065-19 = "อย่างที่ฉันบอกไปก่อนหน้านี้ หนังสือ <กล้วยไม้แวร์ซายส์> นี้พิมพ์ออกมาในจำนวนจำกัดแค่ 100 เล่ม#nเพื่อฉลองครบรอบ 30 ปีตั้งแต่มีการวางจำหน่ายครั้งแรก นักสะสมหนังสือบางคนยังหาซื้อไม่ได้เลยค่ะ!"
10001065-20 = "โดยเฉพาะอย่างยิ่ง สตอรี่บอร์ดพิเศษที่แนบมาในภาคผนวกเป็นเนื้อหาที่ไม่เคยเปิดเผยที่ไหนมาก่อน#nถ้าเป็นแฟนตัวยงของ <กล้วยไม้แวร์ซายส์> รับรองว่าต้องอยากได้มาเป็นเจ้าของแน่นอนค่ะ!"
10001065-22 = "อ้อ! สตอรี่บอร์ดในเล่มคือฉบับคัดลอกนะคะ เพราะฉบับจริงถูกจัดแสดงอยู่ในห้องเก็บหนังสือ#nในหอสมุดของทรีนิตี้"
10001065-23 = "อึก... รู้แล้วๆ เข้าใจแล้วน่า! เราคืนหนังสือให้แล้ว ทีนี้ก็เลิกจ้องกันด้วยสายตาอาฆาตได้แล้ว"
10001065-24 = "จะว่าไป ถ้าฉบับจริงที่ล้ำค่าอยู่ในหอสมุดสถาบันทรีนิตี้ ก็ไม่ต้องให้ค่ากับฉบับคัดลอก#nแล้วไปเอาฉบับจริงมาเลยไม่ดีกว่าเหรอ?"
10001065-26 = "ก็นักเรียนจากโรงเรียนอื่นไม่สามารถไปอ่านหนังสือในหอสมุดทรีนิตี้ได้นี่คะ"
10001065-28 = "นักเรียนสหภาพเรดวินเทอร์อย่างพวกเราทำได้แค่ชื่นชมจากฉบับคัดลอกเอาเท่านั้น..."
10001065-29 = "ฮุฮุฮุ โมมิจินี่ไม่รู้อะไรเอาซะเลย!"
10001065-32 = "ผู้นำสหภาพเรดวินเทอร์อย่างเราไม่มีอะไรที่เป็นไปไม่ได้!"
10001065-33 = "หากห้องสมุดของสถาบันทรีนิตี้ไม่เปิดให้นักเรียนจากโรงเรียนอื่นไปอ่านหนังสือ#nเราก็ไปยึดสถาบันทรีนิตี้แล้วควบคุมเองซะเลยสิ!"
10001065-34 = "หากพวกพ้องของ <ชมรมแนวร่วมปลดปล่อยความรู้> สาบานว่าจะจงรักภักดีต่อเรา เราสัญญาว่า#nจะทำให้ทุกคนได้อ่านหนังสือต้องห้ามที่ไม่เคยได้อ่านกันมาด้วย!"
10001065-36 = "จะ... จริงเหรอคะประธานเชริโน่?"
10001065-37 = "ก็จริงน่ะสิ! ไม่เพียงแค่สถาบันทรีนิตี้หรอกนะ เราจะทำให้ทุกโรงเรียนในคิโวทอส ทั้งเกเฮนน่า#nมิลเลเนียมและเฮียกคิยาโคมาอยู่ใต้การควบคุมของเราให้ได้!"
10001065-38 = "แน่นอนว่าก่อนหน้านั้นเราต้องขับไล่มารินะที่ยึดสำนักเลขาธิการไว้ แล้วชิงอำนาจกลับมาให้ได้ก่อน..."
10001065-39 = "ฉันจะทำตามคำสั่งของท่านประธานอย่างไม่มีเงื่อนไขเลยค่ะ! ให้พวกเราทำแบบนั้นเถอะนะคะ!#nท่านประธานเชริโน่!"
10001065-40 = "ดึงชมรมแนวร่วมปลดปล่อยความรู้มาเป็นพวกได้เพียงแค่ไม่กี่ประโยคเท่านั้น... สมกับเป็น#nท่านประธานที่สุดเลยค่ะ! น่าประทับใจมากเลย!"
10001065-41 = "ฮุฮุ ก็เราบอกไว้แล้วไงว่าไม่มีใครต้านทานเสน่ห์ท่านเชริโน่ผู้ยิ่งใหญ่คนนี้ได้"
10001065-42 = "งั้นทีนี้พวกเราต้องทำอะไรเหรอคะ? ไปลากตัวมารินะออกมาจากสำนักเลขาธิการ#nแล้วเอาไปทิ้งในทะเลสาปน้ำแข็งที่อยู่ด้านหลังสนามเลยไหมคะ?"
10001065-43 = "หรือว่าจะลงโทษด้วยการจั๊กจี้ทั้งคืนให้เลิกคิดที่จะก่อปฏิวัติอีกต่อไปเลยดีคะ?"
10001065-44 = "ดะ... เดี๋ยวก่อน! เห็นเราเป็นแบบนี้ แต่เราก็ไม่คิดอะไรที่โหดร้ายแบบนั้นหรอกนะ!"
10001065-45 = "ห้ามกระทำการรุนแรงเด็ดขาด นี่เป็นคำสั่ง!"

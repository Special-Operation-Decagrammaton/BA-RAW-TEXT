[translation]
33200-1 = "第20話;楽園の名前は（１）"
33200-2 = "真ん中は開けた、私たちは西の方を。"
33200-3 = "了解！"
33200-4 = "……私も手伝います。"
33200-5 = "ハスミさん……！"
33200-6 = "チナツさん、こうして肩を並べるのはあの時以来ですね。"
33200-7 = "いひひひひっ……。"
33200-8 = "い゛っ、正義実現委員長まで……。"
33200-13 = "……分かった、よろしく。"
33200-14 = "やあやあ、風紀委員長ちゃん。私たちも手伝うよ～。"
33200-15 = "アビドスの副会長……！"
33200-16 = "おっとっとー、寂しいなあ。「ホシノ」だよ。この間も会ったことだし、覚えてくれるとおじさんは嬉しい！"
33200-17 = "そういうホシノ先輩だって「風紀委員長ちゃん」って呼んでるじゃん。ちゃんと名前覚えてる？"
33200-18 = "いやいやまさか、えーっとんーと……"
33200-19 = "……おしゃべりはここまで。"
33200-21 = "行こう。"
33200-22 = "了解っ！"

[translation]
33200-1 = "Episode 20;The Name of Paradise Part 1"
33200-2 = "The central path is clear. Focus your efforts to the west!"
33200-3 = "Understood!"
33200-4 = "Allow us to lend a hand."
33200-5 = "Hasumi!"
33200-6 = "It's been a while, Chinatsu. We haven't fought side-by-side like this since we helped Sensei reclaim the Schale building."
33200-7 = "Kekeke..."
33200-8 = "S-Seriously? Looks like even the Justice Task Force president wants in on this."
33200-13 = "I see. Feel free to help."
33200-14 = "Hey there, Miss Head Prefect! Count us in too."
33200-15 = "A-Abydos' student council vice president..."
33200-16 = "Hey, don't be like that. You should remember my name's Hoshino. People calling me by titles and whatnot just makes me feel that much older than I already am!"
33200-17 = "You started it by referring to her title to begin with. Do you even remember HER name?"
33200-18 = "Uh, well... You see, when you get to be my age..."
33200-19 = "Enough chitchat."
33200-21 = "Let's go."
33200-22 = "Roger!"

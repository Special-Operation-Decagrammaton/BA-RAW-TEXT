[translation]
33200-1 = "ตอนที่ 20;นามแห่งสวรรค์ (1)"
33200-2 = "เส้นทางไปยังศูนย์กลางเปิดแล้วล่ะ พวกเราจะตีล้อมไปทางฝั่งตะวันตก"
33200-3 = "เข้าใจแล้ว!"
33200-4 = "ฉันจะร่วมมือด้วยคนค่ะ..."
33200-5 = "คุณฮาสุมิ...!"
33200-6 = "คุณชินัตสึ หลังจากตอนที่ช่วยคุณครูซ่อมแซมอาคารชาเล่ต์ก็ไม่ได้ร่วมสู้ด้วยกันมานานแล้วนะคะ"
33200-7 = "คิกๆๆ...!"
33200-8 = "อึ่ก! หัวหน้าชมรมทวงความยุติธรรมก็มา..."
33200-13 = "เข้าใจแล้ว... ตามสบายเลย"
33200-14 = "โย่ว~ ประธานกรรมการวินัยจัง~ พวกเราก็จะช่วยด้วยอีกแรงนะ"
33200-15 = "...!! รองประธานนักเรียนอะบิดอส..."
33200-16 = "เฮ้อ บอกว่าชื่อโฮชิโนะไงล่ะ เกินไปแล้วนะ คราวที่แล้วก็เกือบจะจัดหนักใส่กันแล้วแท้ๆ... น่าจะจำชื่อกันสักหน่อยสิ!"
33200-17 = "รุ่นพี่โฮชิโนะเองก็จำชื่อทางนั้นไม่ได้เหมือนกันไม่ใช่เหรอ?"
33200-18 = "เอ่อ.. อืม ก็นะ..."
33200-19 = "เลิกพูดเรื่องไร้สาระเถอะ..."
33200-21 = "ไปกันได้แล้วล่ะ"
33200-22 = "ค่ะ!"

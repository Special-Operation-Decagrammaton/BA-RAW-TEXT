[translation]
33200-1 = "第20話;樂園之名為（１）"
33200-2 = "中央已經突破，我們負責西方。"
33200-3 = "了解！"
33200-4 = "……我也來幫忙。"
33200-5 = "蓮實同學……！"
33200-6 = "千夏同學，像這樣並肩作戰還是那時以來第一次呢。"
33200-7 = "咿嘻嘻嘻嘻……"
33200-8 = "噫呃，連實現正義部長也……"
33200-13 = "……我明白了，拜託了。"
33200-14 = "呀啊呀啊，風紀委員長醬。我們也來幫忙唷～"
33200-15 = "阿拜多斯的副會長……！"
33200-16 = "哎呀呀，真寂寞呢。是「星野」唷。之前也見過了，能記得的話大叔會很高興！"
33200-17 = "那樣說著的星野前輩不是也以「風紀委員長醬」稱呼嗎。有確實記住名字嗎？"
33200-18 = "不不怎麼會，這個那個……"
33200-19 = "……談話就到此為止。"
33200-21 = "走吧。"
33200-22 = "了解！"

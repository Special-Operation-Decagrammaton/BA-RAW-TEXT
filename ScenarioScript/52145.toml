[translation]
52145-2 = "Meanwhile, in the Mansion of the Beyond..."
52145-15 = "*pant pant*"
52145-16 = "Ayame, are you able to continue the fight?"
52145-17 = "For now. What about you, Nagusa? Are you holding up?"
52145-18 = "I am well."
52145-19 = "But the Artifact Spirits persist... How can we move past them and rejoin the others?"
52145-20 = "At least I have you, Ayame. As long as you are here, we will make it."
52145-21 = "You always know what to do."
52145-25 = "..."
52145-30 = "You still don't get it."
52145-31 = "The human mind is a delicate, beautiful thing. It can never be fully understood."
52145-39 = "It's been so long, my dear Hyakkaryouran."
52145-50 = "You...you're the one who took Ayame from me."
52145-51 = "But, no, that was a hallucination. It wasn't real."
52145-52 = "Ayame said that I imagined it all."
52145-53 = "How curious. Then how do you know me, Nagusa?"
52145-54 = "Or is this also a dream? Am I...simply a manifestation of you losing your mind?"
52145-55 = "...I do not have time for this. You are nothing more than a monster and every word you weave is a lie."
52145-59 = "Ayame, on my signal, we will go together—"
52145-63 = "...Ayame?"
52145-64 = "She was right here... Wh-Where did you go, Ayame?"
52145-69 = "Where did I go? I was never with you, Nagusa."
52145-84 = "Aya...me...?"
52145-85 = "Ah. You're finally up."
52145-86 = "Did you have a nice dream, Nagusa?"
52145-87 = "I hope so, because now the true nightmare begins."
52145-88 = "...Impossible."
52145-89 = "The Ayame I know would never look at me like that..."
52145-96 = "Next Episode;The End of a Sweet Dream"

[translation]
52145-2 = "（另一方面，此時在「彼岸邸」本館……）"
52145-15 = "哈啊，哈啊……"
52145-16 = "菖蒲，你還好嗎？"
52145-17 = "還撐得住。名草你呢？"
52145-18 = "嗯，我沒事。"
52145-19 = "但是百物語還在不斷出現……#n明明必須盡快跟老師和其他部員會合，卻完全找不到空隙。"
52145-20 = "不過現在有菖蒲你在，所以一定沒問題的。"
52145-21 = "因為你和我不同，總是能輕鬆完成困難的任務。"
52145-25 = "……"
52145-30 = "看來你還是不明白呢。"
52145-31 = "人心，是無法互相理解的。"
52145-39 = "又在這裡碰面了啊，百花繚亂的孩子。"
52145-50 = "你是……那時帶走菖蒲的……"
52145-51 = "不，那只是場虛假的夢……那種事從來沒有發生過。"
52145-52 = "菖蒲已經親口告訴我沒有那種事了……"
52145-53 = "哦？那麼你又是怎麼認識我的？"
52145-54 = "還是你認為眼前的一切也是夢境呢？"
52145-55 = "……不可以被他動搖。#n對方是操縱怪書、蠱惑人心的魍魎，花鳥風月部的部長。"
52145-59 = "菖蒲，等我發出信號就一起夾擊──"
52145-63 = "……菖蒲？"
52145-64 = "剛才明明還在身邊的……你，你在哪裡，菖蒲？"
52145-69 = "在哪裡？我從一開始就不在你身邊啊。"
52145-84 = "菖……蒲……？"
52145-85 = "終於從夢中醒來啦。"
52145-86 = "做了場美夢嗎，名草？"
52145-87 = "那麼是時候該從夢中醒來，面對惡夢般的現實了。"
52145-88 = "……不可能。"
52145-89 = "我認識的菖蒲，才不會露出那種表情……"
52145-96 = "下一話;甜美夢境的終點 "

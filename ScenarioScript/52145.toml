[translation]
52145-2 = "(ในขณะเดียวกัน ในอาคารหลักของ <คฤหาสน์นิพพาน>...)"
52145-15 = "แฮ่ก... แฮ่ก..."
52145-16 = "อายาเมะ เป็นยังไงบ้าง?"
52145-17 = "ฉันยังทนได้อยู่ นางุสะล่ะ? เธอเป็นยังไงบ้าง"
52145-18 = "อื้อ ฉันไม่เป็นไร"
52145-19 = "เราต้องรีบไปรวมตัวกับคุณครูและสมาชิกคนอื่น แต่ตำนานร้อยเรื่องราวยังออกมาเรื่อยๆ จนไม่มีช่องว่างให้ไปได้เลย"
52145-20 = "แต่ยังไงครั้งนี้ฉันก็มั่นใจว่าจะไม่เป็นอะไร เพราะอายาเมะอยู่ตรงนี้กับฉันแล้ว"
52145-21 = "เพราะอายาเมะทำภารกิจยากๆ ได้ราบรื่นเสมอ ไม่เหมือนกับฉัน..."
52145-25 = "......"
52145-30 = "เจ้ายังคงไม่เข้าใจสินะ"
52145-31 = "ว่าจิตใจของมนุษย์เป็นสิ่งที่ไม่อาจเข้าใจได้"
52145-39 = "เราได้พบกันที่นี่อีกครั้งแล้วนะ เด็กแห่งเฮียกกะเรียวรัน"
52145-50 = "คุณคือคนที่พาอายาเมะไปตอนนั้น..."
52145-51 = "ไม่สิ นั่นเป็นความฝันหลอกลวง เรื่องนั้นไม่เคยเกิดขึ้นต่างหาก"
52145-52 = "ก็อายาเมะพูดออกมาจากปากของตัวเองแล้วนี่ว่าเรื่องแบบนั้นไม่เคยเกิดขึ้น..."
52145-53 = "โอ้ เช่นนั้นเจ้ารู้จักข้าได้อย่างไรเล่า?"
52145-54 = "คิดว่าตอนนี้ก็เป็นฉากหนึ่งในความฝันงั้นหรือ?"
52145-55 = "อย่าหวั่นไหวไปกับคำพูดพวกนั้น... อีกฝ่ายเป็นถึงหัวหน้าภูตผีปีศาจ หัวหน้าชมรมความงามของธรรมชาติที่ใช้หนังสือลึกลับล่อลวงผู้คน"
52145-59 = "อายาเมะ ถ้าเธอให้สัญญาณ ฉันจะโจมตีขนาบข้าง..."
52145-63 = "อายาเมะ...?"
52145-64 = "เมื่อกี้เธอยังอยู้ข้างๆ ฉันอยู่เลย... ปะ... ไปไหนแล้วน่ะ อายาเมะ?"
52145-69 = "ไปไหนงั้นเหรอ? ฉันไม่เคยอยู่ข้างๆ เธอตั้งแต่แรกต่างหาก"
52145-84 = "อายา... เมะ...?"
52145-85 = "ตื่นจากความฝันและจำฉันได้แล้วสินะ"
52145-86 = "ฝันเพลินพอแล้วยังล่ะ นางุสะ?"
52145-87 = "ถึงเวลาตื่นจากความฝันและเผชิญกับความจริงอันเลวร้ายได้แล้ว"
52145-88 = "เป็นไปไม่ได้..."
52145-89 = "อายาเมะที่ฉันรู้จัก... ไม่ได้มีสีหน้าแบบนั้น..."
52145-96 = "ตอนต่อไป;สุดปลายฝันอันแสนหวาน"

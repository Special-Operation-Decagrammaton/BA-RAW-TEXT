[translation]
2101-1 = "เหลือเพียงผู้เรียกขาน 1"
2101-2 = "ที่แห่งหนึ่งในบริเวณด้านนอกอะบิดอส"
2101-6 = "แฮ่ก แฮ่ก...."
2101-7 = "ร้อนจัง...! นี่เดินมาไกลแค่ไหนแล้วเนี่ย? เรามาถูกทางแน่ใช่ไหม?"
2101-8 = "ถึงตอนที่ดูแผนที่ก็คิดแล้วว่าน่าจะไกลมากๆ อยู่ก็เถอะ..."
2101-9 = "ถ้าตามแผนที่ตรงนี้ก็ถูกแล้วนี่นา... เดินมา 30 กิโลเมตรแล้วยังไม่เห็นเลยค่ะ"
2101-10 = "ว่ายังไงนะ?! ระยะทางมันเท่ากับเดินมาราธอนเลยนี่!!"
2101-11 = "อืม... แต่จะให้กลั้นใจเดินไปอีก 30 กิโลเมตรมันก็..."
2101-12 = "รุ่นพี่ชิโรโกะ ช่วยเงียบหน่อย..."
2101-13 = "อืม..."
2101-14 = "แหะ~ ลุงแก่ๆ คนนี้หลังกับเอวไม่ค่อยดีแล้ว อายุอานามเยอะแล้ว จะให้มาเดินแบบนี้มันก็..."
2101-15 = "ไม่ๆ เราไม่ได้อายุห่างกันขนาดนั้นนี่นา!!"
2101-16 = "ก็ใช่น่ะสิ พวกเธอไม่คิดเหรอว่าทำไมพวกเราถึงมาที่นี่กัน?"
2101-17 = "ทั้งหมดเป็นเพราะพวกรุ่นพี่นั่นแหละ! เพราะพวกรุ่นพี่เลย!"
2101-18 = "อืม…"
2101-19 = "แฮ่~"
2101-20 = "ว้าวววว-☆"
2101-21 = "อย่ามาทำเป็นไม่รู้ไม่ชี้นะ!!"
2101-22 = "ตอนนี้อย่ามาบอกนะว่าจำไม่ได้แล้วน่ะ?"
2101-23 = "จริงๆ เลยเชียว! ถ้าเมื่อวานพวกรุ่นพี่ไม่ทำให้อายาเนะโกรธล่ะก็...!"
2101-25 = "(วันก่อนหน้านี้ ณ ห้องชมรมคณะกรรมการแผนงาน)"
2101-26 = "....."
2101-27 = "....."
2101-28 = "....."
2101-29 = "....."
2101-30 = "....."
2101-31 = "ถ้าอย่างนั้นแล้ว อืม...."
2101-32 = "คนที่เขียนส่งมาว่า <เงินที่เหลือเอาไปใช้ซื้อลอตเตอรี, ชีวิตคือการยิงจุดตาย~ กลยุทธ์> คือใครคะ??"
2101-33 = "ลุงเองแหละ!"
2101-34 = "....."
2101-35 = "คนที่ส่ง <สรุปกลยุทธ์ และ 15 วิธีในการจับตัวประกันและบังคับให้ย้ายโรงเรียน> มาให้ฉันคือใครคะ?"
2101-36 = "ฉันเอง\n"
2101-37 = "..."
2101-38 = "อืม... เป็นข้อเสนอที่พอเป็นไปได้ บุกเข้าไปที่หอประชุมของเมืองข้างๆ#nเพื่อตรวจสอบโรงเรียนของเมืองข้างๆ"
2101-39 = "อืม... "
2101-40 = "คนที่ส่ง <ตารางการท่องเที่ยว ว้าววว! สุดสัปดาห์นี้ ไปปิกนิกข้างนอกด้วยกันนะคะ☆> มาให้ฉันคือใครคะ?"
2101-41 = "ค่า~ ฉันเองค่ะ!"
2101-42 = "..."
2101-43 = "เอ๊ะ... นี่คงจะไม่ใช่..."
2101-44 = "คือ... ลุงคิดว่ามันเข้าขั้นวิกฤตนิดหน่อยแล้วนะ ว่าไหม?"
2101-45 = "พวกเธอทำอะไรกันน่ะ!"
2101-46 = "ฉันบอกให้เอาแผนการดำเนินงานมาไม่ใช่รึไง ทำไมถึงมีแต่ลอตเตอรี ใบประกาศจับ#nแผนการท่องเที่ยวกับของไร้สาระพวกนี้ได้ล่ะ!!"
2101-47 = "บอกให้จริงจังกันหน่อยไงเล่า! ถ้าเป็นแบบนี้ อายาเนะคงจะทำหน้าบึ้งอีกแน่ๆ!"
2101-48 = "อ่า... ไม่เป็นไรค่ะ คุณคุโรมิ เซริกะ ยังมีเหลืออยู่อีกหนึ่งนะคะ"
2101-49 = "หือ? อายาเนะจัง....? ทำไมจู่ๆ ถึงใช้คำพูดสุภาพล่ะ... "
2101-50 = "สุดท้าย... คนที่เขียนว่า <เอกสารประกอบคำอธิบายการลงทุนบ่อน้ำมันหมุนเวียน> ส่งมาให้ฉัน?"
2101-51 = "ฉะ...ฉันเอง"
2101-52 = "..... "
2101-53 = "แต่ว่าอายาเนะจัง! ใครเห็นก็รู้ว่าเป็นเรื่องธุรกิจ...#nแถมแผ่นพับที่ได้มาจากงานบรรยายก็เป็นเรื่องเกี่ยวกับการเพิ่มผลกำไรอีก..."
2101-54 = "เซริกะจัง... น้ำมันน่ะ มันผุดขึ้นมาจากใต้ดินนะ"
2101-55 = "ระ...เรื่องนั้นฉันก็รู้! แต่ว่าน้ำมันพอนสึที่เพิ่งเจอเมื่อไม่นานมานี้มัน..."
2101-56 = "....."
2101-59 = "บอกว่าเอาแต่พอดีๆ ไงคะ!!!"
2101-66 = "......"
2101-67 = "ก็....."
2101-68 = "...เรื่องก็เป็นแบบนั้นแหละ ใช่แล้ว~"
2101-70 = "อ่า~ อายาเนะจังน่ากลัวจังเลย"
2101-71 = "อืม... ทั้งที่เป็นปฏิบัติการจำลองแท้ๆ..."
2101-72 = "ฉันแค่อยากให้ทุกคนได้ผ่อนคลายบ้าง..."
2101-73 = "ทำไมถึงได้พูดเหมือนเป็นเรื่องของคนอื่นเลยล่ะ!! เพราะพวกรุ่นพี่นั่นล่ะ พวกเราถึงต้องเป็นแบบนี้!"
2101-74 = "แหะๆ~ แต่ว่าเซริกะจังเป็นคนจุดชนวนขึ้นมาไม่ใช่เหรอ?#nเธอเป็นคนทำให้อายาเนะหมดความอดทนไม่ใช่รึไง?"
2101-75 = ".....?!\n\n"
2101-76 = "แม้แต่คุณเซริกะที่ฉันไว้วางใจ... ยังน่าผิดหวังแบบนั้นเลย?"
2101-77 = "นะ...นั่นมัน....?!"
2101-78 = "เพราะอายาเนะจังมักจะยอมอ่อนให้เซริกะจังตลอด~ เลยรู้สึกช็อกหนักมากสินะ~"
2101-79 = ".....!!\n"
2101-81 = "อ่า.... อ่า...\n"
2101-82 = "ทุกคนคะ..."
2101-83 = "ขอแค่สักครั้งก็ได้ค่ะ ช่วยตั้งใจทำงานกันบ้างเถอะนะคะ...."
2101-85 = "แล้วจู่ๆ ก็บ่นอะไรที่เหมือนพ่อแม่บ่นลูกที่ไม่ยอมทำงานแล้วนอนเล่นว่างๆ อยู่ที่บ้านมาหลายปีด้วย~"
2101-86 = "ฉันไปหางานพิเศษทำความสะอาดโรงยิมอื่นในเมืองมาแล้วล่ะ"
2101-87 = "\"พรุ่งนี้กรุณาไปเก็บกวาดขยะและทำความสะอาดโรงยิมเพื่อเตรียมงานนิทรรศการ...\"#nนี่คงเป็นงานสินะคะ?"
2101-88 = "ไปหางานพิเศษแบบนั้นมาตั้งเมื่อไหร่กันนะ~ อายาเนะจังนี่เป็นจอมวางแผนจริงๆ เลยน้า"
2101-89 = "แต่ว่า... อายาเนะจังมักจะชอบฝืนตัวเองอยู่ตลอด ฉันเลยเป็นห่วง..."
2101-90 = "ใช่ไหมล่ะ เพราะแบบนั้นอายาเนะถึงได้เป็นลมล้มพับไปเพราะความเครียดไงล่ะ วันนี้ก็เหมือนกัน!!"
2101-91 = "ถ้าพวกเรามาพร้อมกันหมด ก็คงไม่ต้องมาหลงแบบนี้หรอก!"
2101-92 = "ไม่เป็นไรหรอก~ บอกให้อายาเนะจังพักผ่อนอยู่ที่บ้านเถอะ~"
2101-93 = "แต่ก็ถือเป็นโอกาสดีที่จะเรียกคะแนนความเชื่อมั่นจากอายาเนะจังคืนมานะ ใช่ไหมล่ะ?"
2101-94 = "บางครั้งเราต้องแสดงให้เห็นว่าพวกเราก็สามารถทำเองได้ให้เธอเห็นนะ"
2101-95 = "ทุกอย่างมันก็ดีอยู่หรอก แต่ว่ามันไกลเกินไปแล้ว~ ใครก็ได้ช่วยให้ลุงขี่หลังหน่อยเถอะ~"
2101-96 = "พวกเราก็เหนื่อยเหมือนกันนะ! เดินมาตั้งกี่ชั่วโมงแล้วก็ไม่รู้..."
2101-97 = "อ๊ะ! ดะ...ดูนั่นสิคะ!"
2101-98 = ".....!"
2101-100 = "โรงยิมที่ปรับปรุงใหม่อย่างผิดกฎหมาย"
2101-101 = "......"
2101-102 = "?"
2101-103 = ".....?\n"
2101-104 = "(อะไรกันเนี่ย... นี่มันโรงยิมนี่นา? มีโรงยิมแบบนี้ด้วยเหรอ?)"
2101-105 = "อืม... โรงยิม... ใช่ไหมนะ? ดูไม่น่าใช่เลยแฮะ..."
2101-106 = "อะไรน่ะ พวกเธอ!! พวกเธอเป็นใครกัน!! "
2101-108 = ".....!!"
2101-109 = "พวกเธอมาที่นี่ทำไม!? เอ๋? เจ้าของโรงยิมงั้นเหรอ? เป็นเจ้าของที่นี่รึไง!?"
2101-110 = "พวกเราได้ยึดโรงยิมที่นี่เอาไว้แล้ว ถ้าไม่อยากเจอดีล่ะก็รีบออกไปจากที่นี่ซะดีๆ!"
2101-111 = "บอกไว้ก่อนเลย ฝีมือพวกเราไม่ธรรมดาหรอกนะ!! คิคิคิคิคิก!"
2101-112 = "อะไรกันน่ะ... คนพวกนั้น? จู่ๆ โผล่มาจากไหนกันเนี่ย?"
2101-117 = "....."
2101-118 = "อ่า~ งั้นเองเหรอ~"
2101-119 = "...แบบนี้นี่เอง งั้นสินะ เข้าใจแล้ว\n"
2101-120 = "ระ...รุ่นพี่ชิโรโกะ? รุ่นพี่หยิบอะไรออกมาน่ะ!? นั่นมันหัวรบระเบิดแรงสูงไม่ใช่รึไง!?"
2101-121 = "...อ่ะฮ่า☆ ฉันเข้าใจแล้วล่ะค่ะ"
2101-122 = "หือ?"
2101-124 = "ฉันจะมอบหมายงานที่เหมาะสมให้กับสมาชิกทุกคนค่ะ"
2101-125 = "งานพิเศษทำความสะอาดขยะในโรงยิมค่ะ เป็นงานที่เรียบง่ายแล้วก็ดูปกติใช่ไหมล่ะคะ"
2101-127 = "\"ขอให้ทำความสะอาดขยะที่กองอยู่ในโรงยิม\" อายาเนะบอกมาแบบนั้น"
2101-128 = "ขยะเหรอ?"
2101-129 = "ว่าแล้ว~ อายาเนะจังเองก็เหมือนกัน ถ้าเป็นงานแบบนี้คงจะทำได้แบบสนุกๆ สินะ?"
2101-130 = ".....!? ดะ... เดี๋ยวก่อนสิ! เดี๋ยวก่อนสิ รุ่นพี่! "
2101-131 = "เดี๋ยว...!!"
2101-135 = "ไม่มีเวลาแล้ว รีบลงมือกันเถอะ"
2101-136 = "ทำความสะอาด[ruby=กลุ่มอันธพาล]ขยะ[/ruby]"
2101-137 = "อื้ม~! ได้เวลาสั่งสอนแล้วล่ะค่ะ~☆\n\n"
2101-139 = "ฟิ้วววว!"
2101-140 = "ตู้มมมมม-☆\n\n"

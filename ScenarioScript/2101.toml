[translation]
2101-1 = "Stay Behind If Your Name Is Called Part 1"
2101-2 = "Somewhere along the Abydos Border"
2101-6 = "*panting*"
2101-7 = "It's so hot! How long have we been walking for? Are we even on the right path?"
2101-8 = "It didn't look that far on the map..."
2101-9 = "The map said it was this way and we've walked about 30 kilometers already...but I still don't see it."
2101-10 = "What?! That's like a whole marathon!"
2101-11 = "Yeah, but it's not that bad if you set your mind to it..."
2101-12 = "Be quiet, Shiroko..."
2101-13 = "*murmurs*"
2101-14 = "My back is bad enough at my age. I'm too old to be walking this far..."
2101-15 = "You're old enough to figure this out!"
2101-16 = "Haven't you thought about why we're wandering around here?"
2101-17 = "This is all your fault to begin with!"
2101-18 = "Hmm..."
2101-19 = "Heh!"
2101-20 = "Wow! ☆"
2101-21 = "Don't get distracted!"
2101-22 = "Don't tell me you've forgotten already!"
2101-23 = "Seriously! This wouldn't have happened if you didn't do that to Ayane yesterday!"
2101-25 = "(The day before, in the Foreclosure Task Force Room.)"
2101-26 = "..."
2101-27 = "..."
2101-28 = "..."
2101-29 = "..."
2101-30 = "..."
2101-31 = "So, um..."
2101-32 = "Who submitted \"Operation Use All Your Money to Buy Lottery Tickets! You Only Live Once!\"?"
2101-33 = "That'd be me! The wily veteran!"
2101-34 = "..."
2101-35 = "Who turned in \"Operation Briefing: 15 Ways to Hold a Large Number of Students Hostage and Forcibly Transfer Them to Another School\"?"
2101-36 = "That was me."
2101-37 = "..."
2101-38 = "Hmm. That just might work. We could raid the assembly hall of the neighboring village's academy during their assembly..."
2101-39 = "Uh, wait..."
2101-40 = "Who turned in \"Travel Plan: Wheeeee! Let's Have a Picnic Outside This Weekend! ☆\"?"
2101-41 = "Oh! That was me!"
2101-42 = "..."
2101-43 = "Uh...was that not what you were looking for?"
2101-44 = "My old age and wisdom says we might be in a bit of trouble here..."
2101-45 = "What the hell were you guys thinking?!"
2101-46 = "I asked you to bring me suggestions for our future endeavors, but all you've given me are lottery, crime, and vacation plans!"
2101-47 = "Take this seriously! Can't you see the stress wrinkles forming on Ayane's forehead?!"
2101-48 = "No worries, Miss Kuromi. We still have one left."
2101-49 = "Huh? What's with the formality all of a sudden, Ayane?"
2101-50 = "Lastly...who brought this one? \"An Entrepreneur's Guide to Promoting Your Renewable Petroleum Farm Business??"
2101-51 = "Th-That was me..."
2101-52 = "... "
2101-53 = "Hear me out, Ayane! It's a legit business model. And the pamphlet I received at the briefing promised some pretty decent profits."
2101-54 = "Serika... Petroleum is extracted from the ground."
2101-55 = "I... I know that! But there's this thing called Ponzi Petroleum that was recently discovered..."
2101-56 = "..."
2101-59 = "I've had enough of you guys!"
2101-66 = "..."
2101-67 = "...Huh."
2101-68 = "Now I remember."
2101-70 = "Ayane got really scary."
2101-71 = "To be fair, my plan was put though numerous simulations."
2101-72 = "I just wanted to get some peace of mind."
2101-73 = "Why are you guys talking like this doesn't involve you?! All of this is your fault!"
2101-74 = "Yeah, but you're the one who made Ayane flip out, Serika. You were the straw that broke the camel's back!"
2101-75 = "What?!"
2101-76 = "She had the face of someone who lost all hope—a desperate look filled with disappointment."
2101-77 = "Th-That's...!"
2101-78 = "Ayane has a soft spot for you, Serika, so it must have been even more of a shock."
2101-79 = "Uh...!"
2101-81 = "*panting*"
2101-82 = "Everyone, please..."
2101-83 = "Please, for goodness sake, do a proper job for once..."
2101-85 = "She seemed really fed up with it all."
2101-86 = "Then she got a part-time job cleaning up a gym in another town."
2101-87 = "It's to get rid of trash piled up in the gym so that a school arts festival can be held there tomorrow...right?"
2101-88 = "When did she start working part-time? Ayane is always thinking two steps ahead."
2101-89 = "But...I'm worried about Ayane, since she seems to be biting off more than she can chew..."
2101-90 = "That's exactly how Ayane got sick again today, from all the stress!"
2101-91 = "Had things gone as planned, all of us would be here together, and we certainly wouldn't be lost like we are now!"
2101-92 = "No worries. It's best that Ayane takes the day off."
2101-93 = "Actually, isn't this a chance for us to score some brownie points with her?"
2101-94 = "We ought to show her that we can get things done on our own from time to time."
2101-95 = "We should be fine, but it's pretty far. I'd be very appreciative if someone could give me a piggyback ride."
2101-96 = "We're tired too! We've been wandering about for hours..."
2101-97 = "Ah, look! Over there!"
2101-98 = "...!"
2101-100 = "Illegally Remodeled Gym"
2101-101 = "..."
2101-102 = "?"
2101-103 = "..."
2101-104 = "(What's this? Is this a gym...? Has there always been a gym here?)"
2101-105 = "Hmm...is it really a gym? It looks more like..."
2101-106 = "What the heck?! Who are you guys?! "
2101-108 = "...!"
2101-109 = "Hey, what are you punks doin' here?! Huh? Are you the owners of this gym? Is that it?!"
2101-110 = "We called dibs on this place already. If you don't wanna get hurt, scram!"
2101-111 = "Just so you know, we ain't no pushovers! Keheheheh!"
2101-112 = "What's with these guys? Where the heck did they come from?"
2101-117 = "..."
2101-118 = "Oh, is that so?"
2101-119 = "So, that's what's going on... I get it now."
2101-120 = "Shiroko? What did you just take out?! Is that a high-power explosive?!"
2101-121 = "Oh! I understand now too. ☆"
2101-122 = "Eh?"
2101-124 = "I have some honest, legitimate work for the members of the task force."
2101-125 = "It's an easy, part-time job where you clean all the trash out of a gym. It's honest, straightforward, and perfectly normal..."
2101-127 = "\"...Get rid of trash piled up in the gym.\" That's what Ayane told us."
2101-128 = "Trash...?"
2101-129 = "Ayane's pretty good, you know. I'm sure she had this all planned out!"
2101-130 = "Wha...?! H-Hold on!"
2101-131 = "Hold..."
2101-135 = "We don't have much time. Let's get started."
2101-136 = "Time to take out the villainous trash!"
2101-137 = "Yup! It's time to get rough! ☆"
2101-139 = "*whoosh*"
2101-140 = "*booooom* ☆"

[translation]
2101-1 = "唸到名字的人請留下來（１）"
2101-2 = "阿拜多斯．邊境"
2101-6 = "哈啊，哈啊……"
2101-7 = "好熱……！已經走很遠了吧？確定是這條路嗎？"
2101-8 = "應該沒有這麼遠才對啊……"
2101-9 = "從地圖上來看應該是往這邊沒錯……不過明明已經走了30km左右卻還看不到呢。"
2101-10 = "30km！？幾乎是馬拉松的距離了不是嗎！？"
2101-11 = "……不過，區區30km的話，"
2101-12 = "白子前輩不能當作參考標準所以請安靜。"
2101-13 = "……唔嗯。"
2101-14 = "大叔我的腰不太好，已經不是能負荷這種高強度行軍的年紀了啊～"
2101-15 = "都說了，我們的年紀明明差不多吧！！"
2101-16 = "話說回來，知道我們為什麼會陷入這種情況嗎？"
2101-17 = "是我們自己的錯吧！？"
2101-18 = "唔嗯……"
2101-19 = "唔嘿～"
2101-20 = "啊哈～☆"
2101-21 = "多少露出一點抱歉的表情吧！"
2101-22 = "嘛，雖然在「我們自己」裡，或多或少也和我有關……"
2101-23 = "真是的，那麼生氣的綾音醬真是好久沒見到了……！"
2101-25 = "（前一天，對策委員會社辦）"
2101-26 = "……"
2101-27 = "……"
2101-28 = "……"
2101-29 = "……"
2101-30 = "……"
2101-31 = "……那個。"
2101-32 = "「把所有剩餘的資金拿去買彩券，人生就是要放手一搏～作戰」是誰提出的呢？"
2101-33 = "是大叔我提出的！"
2101-34 = "……"
2101-35 = "「作戰：綁架大量的學生當作人質，並強迫他們轉學的15種方法」是誰提出的呢？"
2101-36 = "是我。"
2101-37 = "…………"
2101-38 = "可行性已經檢討過了。趁著隔壁學園的朝會時間，對講堂展開襲擊……"
2101-39 = "呃，綾音……？ "
2101-40 = "「旅行計畫表：這週末大家一起去野餐吧☆」是誰提出的呢？"
2101-41 = "是～是我！"
2101-42 = "………………"
2101-43 = "咦，有哪裡寫錯了嗎？"
2101-44 = "從大叔我看來，似乎是有～點危險的氣氛呢～"
2101-45 = "前輩們在開玩笑嗎！？"
2101-46 = "明明說要提出往後委員會的活動方案，為什麼會是買彩券、犯罪和旅行計畫啊！？"
2101-47 = "認真一點考慮啊！沒看到綾音醬一直皺著眉頭嗎！"
2101-48 = "……黑見茜香同學，還有一個提案。"
2101-49 = "綾，綾音醬……？怎麼突然用敬語……？ "
2101-50 = "最後，這份「可再生石油農場的投資說明」是哪位交上來的？"
2101-51 = "是，是我……"
2101-52 = "……"
2101-53 = "但，但是綾音醬！這是正經的事業，說明會上拿到的冊子上也說能有確實的收益……"
2101-54 = "茜香醬……石油不是在農場裡培育的東西，而是要從地底下挖出來…… "
2101-55 = "那，那個我也知道！可是最近發現的那個叫做絲綢石油的……"
2101-56 = "……"
2101-59 = "適可而止吧！！！！！"
2101-66 = "……"
2101-67 = "……哎呀，"
2101-68 = "果然會變成這樣呢～"
2101-70 = "哎呀～讓大叔我久違的害怕了呢，那樣的綾音醬。 "
2101-71 = "唔嗯……明明連模擬作戰都做過了……"
2101-72 = "我是希望能讓大家找回一點內心的從容……"
2101-73 = "都是因為在那種認真的場合開玩笑才會變成這樣的吧！"
2101-74 = "唔嘿～不過成為導火線的好像是茜香醬哦？就像最後按下了綾音醬的板機那種感覺？"
2101-75 = "我，我嗎！？"
2101-76 = "她露出了像是「我明明這麼相信你，居然連茜香醬都……」的表情唷？"
2101-77 = "這，這個……！"
2101-78 = "畢竟綾音醬總是很黏茜香醬嘛～或許受到了很大的衝擊呢～"
2101-79 = "……！！"
2101-81 = "哈啊……哈啊……"
2101-82 = "各位……"
2101-83 = "請稍微，認真一點……"
2101-85 = "簡直就像對著不去工作整天在家遊手好閒的孩子的父母一樣的感覺呢～"
2101-86 = "而所謂的「認真」具體的例子就是這個打掃的打工啊。 "
2101-87 = "為了明天的學園祭，清掃堆積在體育館的垃圾……是這麼說的對吧？"
2101-88 = "這種打工是什麼時候找到的啊～？哎呀～綾音醬是個做事有計畫的好孩子呢。"
2101-89 = "綾音醬雖然總是很認真，不過有時好像會獨自逞強，真讓人擔心……"
2101-90 = "所以綾音醬才會像今天一樣因為壓力而病倒了啊！"
2101-91 = "如果綾音醬有按照計畫一起來的話，我們或許就不會迷路了！"
2101-92 = "沒關係沒關係～機會難得，就讓綾音醬好好在家休息吧～"
2101-93 = "反過來說，這或許是個可以讓綾音醬說「想做就做得到嘛！」的機會唷？"
2101-94 = "難得有這種機會，偶爾也該讓她看看就算只有我們也能把事情做好的一面。"
2101-95 = "……雖然真的是這麼想的，不過也太遠了～誰都可以，快來揹大叔吧～"
2101-96 = "大家都一樣累啊！真是的，都不知道走幾個小時了……"
2101-97 = "啊！請看那邊！"
2101-98 = "……！"
2101-100 = "非法改建過的體育館"
2101-101 = "……"
2101-102 = "？"
2101-103 = "……？"
2101-104 = "（這，這是怎樣？這是體育館？）"
2101-105 = "唔嘿～這就是目的地體育館……嗎？與其說是體育館……"
2101-106 = "你們是誰！從哪裡來的！！"
2101-108 = "……！！"
2101-109 = "有何貴幹！難道你們是這個體育館的所有人嗎！？"
2101-110 = "真可惜，這裡已經被我們佔領了！不想受苦的話就對這個體育館死心吧！"
2101-111 = "不管對方是誰，我們都不會手下留情的！呵嘿嘿嘿嘿！"
2101-112 = "……那，那些傢伙是怎樣？突然就一副要打架的樣子……"
2101-117 = "啊啊……"
2101-118 = "這樣啊，原來是這麼回事～"
2101-119 = "……原來如此，我也懂了。"
2101-120 = "白，白子前輩？為什麼把炸彈拿出來了！？"
2101-121 = "……啊哈☆我也懂了～"
2101-122 = "咦……？"
2101-124 = "請各位做一件正經的工作。"
2101-125 = "是清掃體育館垃圾的打工。是件簡單的工作。"
2101-127 = "「清掃體育館的垃圾」，綾音是這麼說的。"
2101-128 = "……垃圾？"
2101-129 = "哎呀～綾音醬也挺會說的呢。這種事對我們來說或許真的是件簡單的工作呢？"
2101-130 = "……等，等一下！？難，難道……？ "
2101-131 = "前輩們！？"
2101-135 = "很浪費時間，快點開始吧。"
2101-136 = "[ruby=掃蕩惡徒]清掃垃圾[/ruby]。"
2101-137 = "處罰時間到囉～☆"
2101-139 = "咻……！"
2101-140 = "（哐啷啷啷☆）"

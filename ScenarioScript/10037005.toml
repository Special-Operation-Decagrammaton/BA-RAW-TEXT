10037005-41 = "3;체리노;S2_99\n#3;em;[zzz]\n#3;a\n#wait;2500"
10037005-42 = "3;체리노;S2_99;쿨……. 쿨……."
10037005-43 = "3;체리노;S2_03;그건 안 돼, 토모에……. 푸딩 강에 푸딩 댐을 건설하면, 푸딩이 막혀서 더 이상 먹을 수 없게 되어 버리잖아…….\n#3;em;[///]"
10037005-44 = "3;체리노;S2_99;우웅……. 하지만 카스텔라도, 딸기 우유도, 바나나 에클레어도…….\n#3;stiff"
10037005-45 = "#st;[0,0];instant;1;"
10037005-46 = "#clearST"
10037005-47 = "#wait;1500"
10037005-48 = "3;체리노;S2_99\n5;토모에;00;체리노 쨩? 아직 자고 있나요?\n#5;em;[?]\n#5;al\n#3;m1\n#3;h\n#5;h"
10037005-49 = "3;체리노;S2_03;음냐……. 음냐…….\n#3;em;[///]"
10037005-50 = "5;토모에;99;후훗. 체리노 쨩이 자고 있는 모습은 언제나 귀엽다니까요."
10037005-51 = "#st;[0,0];instant;1;"
10037005-52 = "#clearST"
10037005-53 = "3;체리노;S2_03\n5;토모에;01\n#5;m4\n#3;h\n#5;h\n#wait;1200"
10037005-54 = "5;토모에;00;하지만 체리노 쨩? 이제 일어날 시간이에요.\n#5;em;[반응]"
10037005-55 = "#st;[0,0];instant;1;"
10037005-56 = "#clearST"
10037005-57 = "5;토모에;00\n3;체리노;S2_03\n#3;stiff\n#3;h\n#5;h\n#wait;1200"
10037005-58 = "5;토모에;00\n3;체리노;S2_02\n#3;em;[?]\n#3;h\n#5;h\n#wait;1000"
10037005-59 = "3;체리노;S2_06;우웅……? 토모에……? 왜 그래. 낮잠 시간에는 깨우지 말라고 매번 말하잖아…….\n#3;stiff"
10037005-60 = "5;토모에;01;하지만 그 낮잠 시간은 지금 막 끝났는걸요?"
10037005-61 = "3;체리노;S2_04;어? 벌써? 우웅…….\n#3;em;[땀]"
10037005-62 = "3;체리노;S2_06;안 되겠어. 오늘은 낮잠 시간을 연장할 거야. 그러니까 5분만 더 잘게, 토모에……."
10037005-63 = "5;토모에;00;하지만 체리노 쨩, 아니, 체리노 서기장님께서 지금 처리해 주셔야 할 문서가 도착했습니다."
10037005-64 = "3;체리노;S2_01;문서……? 그런 건 토모에가 적당히 처리해 두면 되잖아……. 또 누가 쿠데타라도 일으킨 거야?\n#3;em;[한숨]"
10037005-65 = "5;토모에;99;아닙니다. 산해경 고급중학교의 학생회, 현룡문으로부터의 공문입니다."
10037005-66 = "3;체리노;S2_02;산해경 고급중학교……?\n#3;em;[?]"
10037005-67 = "#all;hide"
10037005-68 = "#wait;1500"
10037005-69 = "#wait;1200"
10037005-70 = "#all;hide"

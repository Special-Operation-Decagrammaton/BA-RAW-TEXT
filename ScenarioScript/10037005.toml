10037005-72 = "3;체리노;01;아하, 그렇군. 교류회 요청 소식인가. \n#3;em;[전구]\n#3;a"
10037005-73 = "3;체리노;99;못 할 것도 없지. 여기에서는 이 몸의 관대함을 보여야 할 시간이겠군!"
10037005-74 = "3;체리노;02;그렇지만 그 산해경이라는 곳에서 붉은겨울까지 오려면, 그것도 제법 큰일이겠는걸."
10037005-75 = "5;토모에;02;아닙니다. 체리노 서기장님. 그 반대입니다. 저희가…… 초대받은 것이에요.\n#5;em;[반응]\n#5;al\n#3;m1"
10037005-76 = "3;체리노;04;어엉? 그러면 우리가 붉은겨울 밖으로 나가, 산해경까지 가야 하는 거야?\n#3;em;[땀]"
10037005-77 = "5;토모에;01;그런 것이지요."
10037005-78 = "3;체리노;06;귀찮은데…….\n#3;stiff"
10037005-79 = "5;토모에;00;생각해 보세요, 체리노 쨩. 여행이라구요?\n#5;m4"
10037005-80 = "3;체리노;02;여, 여행?!\n#3;em;[?!]\n#3;shake"
10037005-81 = "3;체리노;99;흐, 흠! 그런 것이군. 좋다! 내 직접 그 요청을 받아들여, 산해경과의 교류회를 성공적으로 이어가도록 하지!"
10037005-82 = "5;토모에;03;역시 서기장님이십니다. 그 의연한 모습, 모두의 모범이 될 것이라 믿어 의심치 않습니다.\n#5;greeting"
10037005-83 = "3;체리노;00;당연하지! 이 몸은 아무튼 붉은 겨울의 학생회장이자, 미화부장이자, 서기장이자 청소부장이자, 체육부장, 청소부장, 선도부장, 급식부장."
10037005-84 = "#all;hide"
10037005-85 = "3;체리노;03;그리고 이달의 최우수 푸딩 시식가로 선정된 데다 카스텔라 생산 공정을 직접 지휘하는 체리노 님이니까!\n#3;closeup\n#fontsize;80"
10037005-86 = "3;토모에;03;그 말씀대로이십니다. 체리노 서기장님!\n#3;em;[반짝]\n#3;closeup"
10037005-87 = "#all;hide"
10037005-88 = "4;토모에;03\n1;체리노;99;음……. 그런데, 토모에. 지금 궁금한 게 하나 생겼는데."
10037005-89 = "4;토모에;00;네. 무엇인가요?\n#4;em;[반응]"

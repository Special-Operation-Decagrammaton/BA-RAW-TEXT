[translation]
10037005-1 = "#title;프롤로그;먼 곳으로부터의 편지"
10037005-2 = "#wait;1500"
10037005-3 = "#wait;1000"
10037005-4 = "#stm;[0,0];instant;100;<지금까지의 이야기>"
10037005-5 = "#wait;2000"
10037005-6 = "#all;hide\n#clearST\n#wait;1000"
10037005-7 = "#all;hide\n#wait;1500"
10037005-8 = "#na;(산해경의 특산물인 만년삼이 외부로 유출되었다.)"
10037005-9 = "3;레이죠;02;산해경만의 희귀 식물인 만년삼이라는 것이 있습니다.\n#3;em;[반응]\n#3;a"
10037005-10 = "3;레이죠;00;생산량이 한정적이기에, 외부 반출이 엄격하게 제한되어 있죠."
10037005-11 = "3;레이죠;99;그런데 그 만년삼을, 저희 현무상회가 식재료에 섞어 학원 외부로 반출하고 있다는 소문입니다."
10037005-12 = "#all;hide"
10037005-13 = "#wait;500"
10037005-14 = "#na;(산해경의 학생회에 해당하는 현룡문. 그 현룡문의 문주인 류우게 키사키는, 현무상회를 만년삼 유출의 범인으로 지목했다.)"
10037005-15 = "3;키사키;02;만년삼은 산해경에서도 희귀한 식물이라, 무단 채집이 금지되어 있지.\n#3;a"
10037005-16 = "3;키사키;99;그런 특산물이 산해경 밖에서, 그것도 현룡문의 지시 없이 유통되고 있다는 것은 큰 문제이니라."
10037005-17 = "3;키사키;05;현룡문으로서는 이를 좌시할 수 없도다. 현무상회는 이 문제에 대해 응당 답을 내어야 할 것이야.\n#3;closeup"
10037005-18 = "#all;hide"
10037005-19 = "#wait;500"
10037005-20 = "#na;(현무상회의 상회장인 아케시로 루미는, 누명을 풀기 위해 샬레의 선생님에게 도움의 손길을 요청했다.)"
10037005-21 = "3;루미;99;부탁…… 이라고 할까, 의뢰라고 할까.\n#3;em;…\n#3;a"
10037005-22 = "3;루미;01;우리 현무상회에서, 샬레에게 도움을 좀 요청하고 싶은 일이 있어서."
10037005-23 = "#all;hide"
10037005-24 = "#wait;500"
10037005-25 = "#na;(그러나 만년삼을 유출시킨 것은, 정작 현룡문의 간부 중 한 명이었으며.)"
10037005-26 = "3;현룡문 하급 간부;02;그래. 당신. 나는…… 당신의 위치가 필요했어. 그러려면 돈이 좀 있어야 했고.\n#3;em;[반응]\n#3;a"
10037005-27 = "3;현룡문 하급 간부;00;마침 만년삼의 약효를 원하는 사람이 있었어. 산해경 바깥에."
10037005-28 = "#all;hide"
10037005-29 = "#na;(현룡문의 간부와 만년삼을 거래한 것은, 금지된 약물과 비약 유통에 손을 대다가 산해경에서 추방된.)"
10037005-30 = "#na;(일곱 죄수 중 한 명인, 신타니 카이였다.)"
10037005-31 = "3;카이;99\n#3;h"
10037005-32 = "#wait;500"
10037005-33 = "3;카이;00;상관없다. 만년삼으로 할 수 있는 신약의 실험은 대부분 끝난 상태."
10037005-34 = "3;카이;03;하지만 아쉬움이 남는 것은 어쩔 수 없군. 아직 임상 시험의 자료는 충분히 축적되지 않았거늘."
10037005-35 = "#all;hide"
10037005-36 = "#wait;2000"
10037005-37 = "#wait;1500"
10037005-38 = "#all;hide"

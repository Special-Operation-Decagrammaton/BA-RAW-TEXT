[translation]
10037005-1 = "บทเริ่มต้น;จดหมายจากแดนไกล"
10037005-4 = "<ความเดิมที่ผ่านมา>"
10037005-8 = "(โสมหมื่นปีที่เป็นผลผลิตพิเศษของซานไห่จิงรั่วไหลออกสู่ภายนอก)"
10037005-9 = "ที่ซานไห่จิงมีพืชหายากที่ชื่อว่าโสมหมื่นปีค่ะ แล้วมันก็มีแค่ที่นี่เท่านั้นด้วย"
10037005-10 = "เนื่องจากมีปริมาณจำกัด โสมหมื่นปีก็เลยถูกควบคุมการส่งออกอย่างเข้มงวด"
10037005-11 = "แต่กลับมีข่าวลือว่าย่านการค้าเทพเต่าดำของเราส่งโสมหมื่นปีออกไปข้างนอกสถาบันโดยผสมไป#nกับวัตถุดิบอาหารน่ะค่ะ"
10037005-14 = "(มังกรดำ สภานักเรียนของซานไห่จิง ริวเกะ คิซากิผู้เป็นประมุขของมังกรดำชี้ว่าย่านการค้าเทพเต่าดำ เป็นตัวการที่ทำให้โสมหมื่นปีรั่วไหลออกสู่ภายนอก)"
10037005-15 = "ถึงซานไห่จิงจะเป็นแหล่งโสมหมื่นปี แต่มันก็เป็นพืชหายาก เลยต้องมีการห้ามเก็บโดยไม่ได้รับอนุญาต"
10037005-16 = "และการกระจายผลผลิตพิเศษออกไปข้างนอกซานไห่จิงโดยไม่ผ่านการอนุมัติจากมังกรดำก็เป็นเรื่อง#nร้ายแรง"
10037005-17 = "ในฐานะมังกรดำแล้วเราไม่อาจเพิกเฉยได้ ย่านการค้าเทพเต่าดำจะต้องให้คำตอบที่ชัดเจนเกี่ยวกับ#nปัญหานี้"
10037005-20 = "(อาเคชิโระ รูมิ ผู้เป็นประธานย่านการค้าเทพเต่าดำไปขอความช่วยเหลือจากคุณครูของชาเล่ต์เพื่อ#nแก้ไขข้อกล่าวหานี้)"
10037005-21 = "จะบอกว่า... นี่เป็นการขอร้องหรือว่าการไหว้วานดีนะ"
10037005-22 = "ย่านการค้าเทพเต่าดำของเรามีเรื่องจะขอความช่วยเหลือจากชาเล่ต์นิดหน่อยน่ะ"
10037005-25 = "(แต่ความจริงแล้ว คนที่ทำให้โสมหมื่นปีรั่วไหลออกไปก็คือหนึ่งในเจ้าหน้าที่ของมังกรดำ)"
10037005-26 = "ใช่แล้วละ ใช่ เธอนั่นแหละ... ฉันอยากได้ตำแหน่งของเธอ และถ้าจะทำแบบนั้นมันก็ต้องใช้เงิน"
10037005-27 = "ประจวบเหมาะกับที่มีคนนอกซานไห่จิงกำลังตามหาโสมหมื่นปีพอดี"
10037005-29 = "(คนที่ทำการซื้อขายโสมหมื่นปีกับเจ้าหน้าที่ของมังกรดำก็คือคนที่เข้าไปยุ่งกับการลักลอบซื้อขายยา#nต้องห้าม จนถูกไล่ออกจากซานไห่จิงไป)"
10037005-30 = "(เธอก็คือ ชินทานิ ไค หนึ่งในเจ็ดอาชญากร)"
10037005-33 = "ช่างเถอะ ยังไงฉันก็ทดลองยาตัวใหม่ที่ใช้โสมหมื่นปีเสร็จเกือบหมดแล้ว"
10037005-34 = "แต่อดเสียดายไม่ได้จริงๆ ที่ยังเก็บข้อมูลการรักษาด้วยโสมได้ไม่มากพอ"
10037005-42 = "งืม... ครอกฟี้..."
10037005-43 = "แบบนั้นไม่ได้นะ โทโมเอะ... ถ้าสร้างเขื่อนพุดดิ้งในแม่น้ำพุดดิ้ง พุดดิ้งก็จะถูกขวางจนเราอดกินน่ะสิ..."
10037005-44 = "งืม... แต่ว่าคาสเทลล่า... นมสตรอว์เบอร์รี่... แล้วก็เอแคลร์กล้วย..."
10037005-48 = "เชริโน่จัง? ยังนอนอยู่อีกเหรอคะ?"
10037005-49 = "งืมๆ... งืมๆ..."
10037005-50 = "ฮุฮุ เชริโน่จังเวลาหลับเนี่ย น่ารักเสมอเลยนะคะ"
10037005-54 = "แต่ว่าเชริโน่จัง ตอนนี้ได้เวลาตื่นแล้วละค่ะ"
10037005-59 = "หืม...? โทโมเอะ...? ปลุกกันทำไม ต้องให้เราบอกอีกกี่ครั้งว่าอย่าปลุกตอนนอนกลางวันน่ะ..."
10037005-60 = "แต่เวลานอนกลางวันเพิ่งหมดเมื่อกี้เลยนะคะ?"
10037005-61 = "เอ๋? หมดแล้วเหรอ? งืม..."
10037005-62 = "ไม่ได้การละ วันนี้เราต้องต่อเวลานอนกลางวันสักหน่อย ขอนอนต่ออีกแค่ 5 นาทีนะ โทโมเอะ..."
10037005-63 = "แต่เชริโน่จัง ไม่สิ ท่านเลขาธิการเชริโน่มีเอกสารที่ต้องไปจัดการนะคะ เอกสารเพิ่งมาถึงเมื่อกี้เลยค่ะ"
10037005-64 = "เอกสารเหรอ...? ถ้าเป็นเรื่องเอกสารละก็ โทโมเอะก็ช่วยจัดการให้ก็ได้นี่นา... หรือว่ามีใครจะปฏิวัติขึ้น#nมาอีกน่ะ?"
10037005-65 = "ไม่ใช่ค่ะ นั่นเป็นเอกสารราชการที่ส่งมาจากมังกรดำที่เป็นสภานักเรียนของโรงเรียนมัธยมซานไห่จิงค่ะ"
10037005-66 = "โรงเรียนมัธยมซานไห่จิง...?"
10037005-72 = "อ๋อ... แบบนี้นี่เอง ขอความร่วมมือในงานแลกเปลี่ยนงั้นเหรอ? "
10037005-73 = "เราทำให้ได้อยู่แล้ว ถึงเวลาแสดงการต้อนรับอย่างอบอุ่นจากเราแล้วสินะ!"
10037005-74 = "แต่ถ้าจะเดินทางจากซานไห่จิงมายังเรดวินเทอร์ ก็น่าจะไม่ใช่เรื่องง่ายเลยนะ"
10037005-75 = "ไม่ใช่ค่ะ ท่านเลขาธิการเชริโน่ ตรงกันข้ามเลยค่ะ พวกเรา... ได้รับคำเชิญให้ไปเยือนค่ะ"
10037005-76 = "เอ๋? หมายความว่าเราต้องออกจากเรดวินเทอร์แล้วไปยังซานไห่จิงงั้นเหรอ?"
10037005-77 = "ใช่แล้วค่ะ"
10037005-78 = "ขี้เกียจอะ..."
10037005-79 = "ลองคิดดูสิคะ เชริโน่จัง นี่คือการไปเที่ยวเลยนะคะ"
10037005-80 = "ปะ... ไปเที่ยวเหรอ?!"
10037005-81 = "ฮึ่ม... ฮึ่ม! อย่างนั้นสินะ งั้นก็ดีละ เราจะตอบรับคำเชิญ แล้วทำให้งานแลกเปลี่ยนกับซานไห่จิงนี้สำเร็จ#nให้ดู!"
10037005-82 = "สมแล้วที่เป็นท่านเลขาธิการค่ะ ความเด็ดเดี่ยวนี้จะเป็นตัวอย่างที่ดีให้ทุกคนอย่างไม่ต้องสงสัยเลยค่ะ"
10037005-83 = "แน่นอนสิ! ก็เราคือท่านเชริโร่ ผู้ที่เป็นทั้งประธานนักเรียน หัวหน้าฝ่ายตกแต่ง เลขาธิการ หัวหน้าฝ่าย#nกีฬา หัวหน้าฝ่ายทำความสะอาด ประธานกรรมการ และหัวหน้าฝ่ายอาหารของสหภาพเรดวินเทอร์"
10037005-85 = "แถมยังเป็นผู้ควบคุมกระบวนการผลิตขนมคาสเทลล่า และยังถูกเลือกให้เป็นสุดยอดนักชิมพุดดิ้งของ#nเดือนนี้อีกด้วย"
10037005-86 = "ถูกต้องอย่างที่ว่าเลยค่ะ ท่านเลขาธิการเชริโน่!"
10037005-88 = "อืม... ว่าแต่ โทโมเอะ เรามีเรื่องสงสัยอยู่อย่างหนึ่ง"
10037005-89 = "ค่ะ เรื่องอะไรคะ?"
10037005-93 = "ซานไห่จิงที่ว่า... มันอยู่ตรงไหนเหรอ?"

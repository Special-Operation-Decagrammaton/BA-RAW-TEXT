[translation]
10037005-1 = "Prologue;A Letter from a Faraway Place"
10037005-4 = "Previously, on Blue Archive..."
10037005-8 = "(The ten-thousand-year ginseng, a specialty good from Shanhaijing, had been smuggled somewhere off-campus.)"
10037005-9 = "There's a plant that grows only in Shanhaijing. The ten-thousand-year ginseng."
10037005-10 = "Because it's so hard to grow, its distribution and use are strictly controlled. And export of the ginseng is forbidden."
10037005-11 = "But rumor has it that the Black Tortoise Promenade has been smuggling ten-thousand-year ginseng off campus."
10037005-14 = "(Shanhaijing's equivalent to a student council is known as Genryumon. The president, Ryuuge Kisaki named the Black Tortoise Promenade as the culprit.)"
10037005-15 = "The ten-thousand-year ginseng is rare, even in Shanhaijing. Nobody can harvest it without our permission."
10037005-16 = "For a rare specialty such as this to be shipped outside of Shanhaijing without our express approval... Unthinkable."
10037005-17 = "Genryumon cannot let this go unpunished. The Black Tortoise Promenade must answer for it."
10037005-20 = "(The Black Tortoise Promenade's leader, Akeshiro Rumi, requested the help of Schale's Sensei in order to prove the Promenade's innocence.)"
10037005-21 = "I have a, let's say...a request. Or a commission."
10037005-22 = "The Black Tortoise Promenade needs your help."
10037005-25 = "(However, the culprit smuggling the ten-thousand-year ginseng was revealed as none other than an officer of Genryumon itself!)"
10037005-26 = "I needed your position. And to get it, I needed money."
10037005-27 = "I heard about someone outside Shanhaijing who wanted to get their hands on some ten-thousand-year ginseng."
10037005-29 = "(The outsider who bought the illicit ginseng from Genryumon officer was a Shanhaijing exile who had been ousted for distributing illegal drugs and elixirs.)"
10037005-30 = "(It was none other than one of the Seven Prisoners, Shintani Kai.)"
10037005-33 = "Little matter. I already gathered enough ginseng to finish my latest concoction."
10037005-34 = "Still, I'm disappointed that I didn't get to collect more data."
10037005-42 = "Zzz... Zzz..."
10037005-43 = "No, you can't, Tomoe... If you build a dam on the pudding river, it'll stop the flow of pudding, and no one will be able to eat it..."
10037005-44 = "Mmf... But the castella, strawberry milk, and banana eclairs..."
10037005-48 = "Cherino? Are you still asleep?"
10037005-49 = "Zzz... Zzz..."
10037005-50 = "Haha! She's always so adorable when she's sleeping."
10037005-54 = "It's time to get up, Cherino."
10037005-59 = "Huh...? Tomoe...? What's going on? I told you not to wake me during nap time..."
10037005-60 = "I'm afraid your scheduled nap is over."
10037005-61 = "Wha? Already? Urgh..."
10037005-62 = "All right. In that case, I will be extending my nap time today. Wake me up in 5 minutes, Tomoe..."
10037005-63 = "But, Cherino—I mean, Great Leader Cherino, we just received some very important documents for your eyes only."
10037005-64 = "Documents...? You can handle those, Tomoe... Unless there's been another attempt at a coup d'etat?"
10037005-65 = "Not quite. We received a missive from the Shanhaijing Academy student council."
10037005-66 = "Shanhaijing Academy...?"
10037005-72 = "Oh. It must be a request for an exchange meeting. "
10037005-73 = "I'll allow it. It's the perfect opportunity for me to show off my grand generosity!"
10037005-74 = "I expect it will be quite the undertaking for students of Shanhaijing to travel all the way to Red Winter."
10037005-75 = "On the contrary, Great Leader Cherino. We...were invited to visit them."
10037005-76 = "What? You mean we have to leave Red Winter and travel to Shanhaijing?"
10037005-77 = "I believe so."
10037005-78 = "What a pain..."
10037005-79 = "Think about it this way, Cherino. It's the perfect excuse for a trip."
10037005-80 = "A-A trip?!"
10037005-81 = "I-I see! I understand. Very well! I will personally accept this request and ensure that this exchange meeting with Shanhaijing is a rousing success!"
10037005-82 = "I would expect nothing less from our great leader. I do not doubt that your dignified countenance will serve as a model for us all."
10037005-83 = "Of course! After all, I am Red Winter's student council president, Chief Beautification Officer, Main Secretary, Chief of Sanitation, Athletics Club Captain, Head of All Prefects, Chief of Sanitation, and Maven of Meal Service."
10037005-85 = "More recently, I was selected as this month's most excellent pudding gourmet and even the director of castella production!"
10037005-86 = "As you say, Great Leader Cherino!"
10037005-88 = "Hm, but... Tomoe, I have a query."
10037005-89 = "What is it?"
10037005-93 = "This... Shanhaijing place. Where exactly is it?"

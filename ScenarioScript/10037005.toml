[translation]
10037005-1 = "序幕;來自遠方的信"
10037005-4 = "＜前情提要＞"
10037005-8 = "（山海經的特產「萬年蔘」遭到了非法外流）"
10037005-9 = "在山海經能夠採集到一種名叫「萬年蔘」的植物──"
10037005-10 = "由於採集量有限且稀有價值高，所以對外的輸出受到了嚴格的管制──"
10037005-11 = "然而近期卻出現了[ruby=我們]玄武商會[/ruby]向學園外部走私「萬年蔘」的傳聞……"
10037005-14 = "（山海經的學生會玄龍門，其門主龍華妃姬指控玄武商會就是將萬年蔘外流的犯人）"
10037005-15 = "萬年蔘於山海經實屬貴重，就連採集亦須獲得許可。"
10037005-16 = "聽聞如此特產在山海經外部──#n甚至是玄龍門亦不知情的地點流通，當然無法默不作聲。"
10037005-17 = "身為門主無法視而不見。#n那麼──汝等對此作何解釋？"
10037005-20 = "（為了洗刷冤屈，玄武商會的會長朱城瑠美決定向夏萊的老師尋求協助）"
10037005-21 = "該說是商量，還是請求呢……"
10037005-22 = "我們玄武商會這邊有事想委託夏萊。"
10037005-25 = "（結果萬萬沒想到，將萬年蔘外流的罪犯竟是玄龍門的幹部之一）"
10037005-26 = "沒錯。你實在太礙眼了。"
10037005-27 = "為了設法陷害你，就必須籌錢尋求協助。"
10037005-29 = "（與玄龍門幹部交易萬年蔘的，是由於涉及流通禁藥和祕藥而被山海經驅逐的──）"
10037005-30 = "（七罪人當中的一人──申谷誡）"
10037005-33 = "不過很遺憾，他們晚了一步。#n新藥的實驗正好已經結束了。"
10037005-34 = "硬要說的話，我倒是希望能多收集一些實驗數據……"
10037005-42 = "呣喵呣喵……"
10037005-43 = "不行啦，智惠……#n如果在布丁河上建造布丁大壩的話，布丁被堵住就吃不到了……"
10037005-44 = "唔嗯……可是蜂蜜蛋糕、草莓牛奶、香蕉閃電泡芙都……"
10037005-48 = "潔莉諾醬？還沒睡醒嗎？"
10037005-49 = "呣喵……呣喵……"
10037005-50 = "呵呵。潔莉諾醬的睡臉，不管什麼時候看都很可愛呢。"
10037005-54 = "聽得到我說話嗎？潔莉諾醬？#n該起床囉。"
10037005-59 = "唔……智惠……？#n咱不是說過……午睡時間不要打擾咱嗎……"
10037005-60 = "可是午睡時間剛才已經結束囉？"
10037005-61 = "咦？這麼快？唔唔……"
10037005-62 = "不行，今天的午睡時間要延長。#n讓咱再睡五分鐘就好，智惠……"
10037005-63 = "可是潔莉諾醬，不，潔莉諾書記長。#n我們剛才收到了一份需要書記長立即處理的文件。"
10037005-64 = "文件……？#n那種事智惠處理一下就好了嘛……還是又有誰發動政變了嗎？"
10037005-65 = "不是的。我們收到的是來自山海經高級中學的學生會．玄龍門的公文。"
10037005-66 = "山海經高級中學……？"
10037005-72 = "啊哈，原來如此。是交流會的邀請吧。"
10037005-73 = "想要的話也不是不行。#n就趁這個機會展現咱的大方氣派吧！"
10037005-74 = "不過要從那個叫山海經的地方來赤冬，感覺得花不少功夫呢。"
10037005-75 = "不是的，潔莉諾書記長。#n實際情況跟您所說的正好相反。受到邀請的……是我們才對。"
10037005-76 = "哦？意思是咱們要離開赤冬，去山海經嗎？"
10037005-77 = "正是如此。"
10037005-78 = "好麻煩……"
10037005-79 = "潔莉諾醬，你想想看，這可是要去旅行唷？"
10037005-80 = "旅，旅行！？"
10037005-81 = "唔，唔呣！原來如此，那好吧！#n咱就親自接受這份邀請，努力推動山海經交流會的成功吧！"
10037005-82 = "真不愧是書記長。#n我相信書記長那毅然決然的姿態，一定會成為眾人的榜樣。"
10037005-83 = "那當然！咱畢竟是赤冬的學生會長、環境美化部部長兼、書記長兼、體育部代表兼、整潔部部長兼、風紀委員長兼供餐部長。"
10037005-85 = "同時還被選為本月最優秀布丁試吃家，#n並親自指揮蜂蜜蛋糕生產工程的潔莉諾大人！"
10037005-86 = "您所言甚是，潔莉諾書記長！"
10037005-88 = "唔呣……話說，智惠。咱有個問題想問你。"
10037005-89 = "是，您請說？"
10037005-93 = "那個山海經……是在哪裡啊？"

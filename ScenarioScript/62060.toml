[translation]
62060-1 = "ตอนที่ 6;เด็กหลงทาง"
62060-3 = "ทุกคนทำได้ดีมาก"
62060-8 = "ปะ... เป็นหนึ่งวันที่วุ่นวายเลยนะคะ"
62060-9 = "ใช่เลยละ"
62060-10 = "แต่ถึงจะวุ่นวายแค่ไหน ทุกคนก็เหมือนจะไม่สั่นคลอนกันมากนะ"
62060-11 = "ก็นะ ระหว่างหลบหนี เราก็เจออะไรมาตั้งเยอะนี่"
62060-12 = "[s] \"ทุกคนแข็งแกร่งขึ้นสินะ...\""
62060-13 = "มันไม่ใช่ความตั้งใจของพวกฉันสักหน่อย"
62060-14 = "ว่าไงนะ? ปกติเราจะแข็งแกร่งขึ้นโดยที่เราไม่ต้องการงั้นเหรอ?"
62060-15 = "เฮ้อ... ไม่เคยพูดอะไรผิดแม้แต่ครั้งเดียวเลยนะ..."
62060-16 = "วะ... ว่าแต่ พวกเรา..."
62060-17 = "..."
62060-18 = "ถ้าเรื่องนี้จบลง เราก็จะต้องใช้ชีวิตด้วยการ... หลบหนีต่อไปเรื่อยๆ ใช่มั้ยคะ...?"
62060-19 = "ฮิโยริ...?"
62060-23 = "มะ... ไม่ใช่นะคะ! ฉันก็ชอบแบบนี้ค่ะ! แหะ... แหะๆ..."
62060-24 = "แต่ว่ามันก็..."
62060-25 = "แบบว่า..."
62060-26 = "ฉะ... ฉันนี่ก็แปลกจังเลยนะคะ! คงเป็นเพราะได้กลับมาอาเรียสอีกครั้งน่ะค่ะ ก็เลยคิดอะไรแปลกๆ ขึ้นมา..."
62060-27 = "[s1] \"ไม่หรอก ฮิโยริ ไม่ใช่อย่างนั้นหรอก\"\n[s2] \"เรื่องสควอดกับโรงเรียนสาขาอาเรียสน่ะ ครูผิดเอง...\"\n[s3] \"เรื่องนี้มาจากการละเลยหน้าที่ของครูเอง...\""
62060-33 = "คะ? มะ... หมายความว่ายังไงเหรอคะ?"
62060-34 = "ครู...?"
62060-35 = "..."
62060-40 = "คุณครู อย่าพยายามรับผิดชอบทุกอย่างมากเกินไปเลย"
62060-41 = "นี่คือเส้นทางที่พวกฉันเลือกเดิน งั้นพวกฉันก็ต้องแบกรับภาระที่อยู่ตลอดเส้นทางด้วยสิ"
62060-42 = "แต่ถ้ามันจะมีวิธีอื่นละก็..."
62060-43 = "ไว้ตอนนั้น เรามาช่วยกันคิดไปด้วยกันนะ"
62060-44 = "ส่วนตอนนี้เรามาคุยเรื่องที่คุณมิเนะขอพวกเราไว้กันก่อนดีกว่า"
62060-45 = "[s] \"เรื่อง 'ชีวิตประจำวัน' ใช่มั้ย...\""
62060-46 = "อื้อ ชีวิตประจำวันของอาเรียส"
62060-47 = "ที่จริงแล้วชีวิตประจำวันของอาเรียสต่างกับที่คนคนนั้นพูดไว้ลิบลับเลยละ..."
62060-48 = "มันก็... จริงอย่างที่ว่าค่ะ ถ้ามองในบางมุม ตอนนี้เด็กๆ อาเรียสกำลังเผชิญแต่สิ่งที่พวกเธอไม่เคยเจอ#nมาก่อนในชีวิตค่ะ..."
62060-49 = "ทั้งห้องเรียน... การเรียน... การไปทัศนศึกษา... นอกจากนี้ยังมีอุปกรณ์สำหรับกรองน้ำดื่ม แล้วก็ยาใหม่ๆ อีกหลายตัว..."
62060-51 = "ส่วนพวกของใช้ฉุกเฉิน พวกเธอก็ได้รู้จักกับผ้าห่มที่กักเก็บความร้อนได้จริงๆ ที่ไม่เหมือนเต็นท์ฉีกๆ ขาดๆ ที่เคยใช้"
62060-52 = "ไหนจะอาหารเสริมโภชนาการอีก ทุกอย่างนี้ล้วนเป็นสิ่งใหม่ของทุกคนที่นี่"
62060-53 = "นึกถึงคำนี้ขึ้นมาเลยนะ ที่บอกว่าชีวิตประจำวันของบางคนอาจเป็นปาฏิหาริย์ของใครอีกคนก็ได้"
62060-55 = "แต่คุณมิเนะขอให้ปกป้องสิ่งนี้ไว้ให้ได้มากที่สุดใช่มั้ยล่ะ?"
62060-56 = "การได้มีกิจวัตรซ้ำเดิมต่อไปได้เรื่อยๆ การได้เห็นบางอย่างในตัวเองพัฒนาขึ้นจากการใช้ชีวิตแบบนั้น..."
62060-57 = "ที่จริงแล้วมันไม่ใช่เรื่องง่ายอย่างที่คิดเลยละ"
62060-58 = "[s4] \"ใช่แล้วละ ครูก็เลยต้องพยายามมากกว่าเดิมไง\"\n[s5] \"ใช่แล้วละ ครูก็เลยยิ่งต้องทำหน้าที่ให้มากกว่าเดิมไง\""
62060-61 = "แต่ว่า... ฉันก็ไม่ชอบเรียนหนังสืออยู่ดีค่ะ..."
62060-62 = "[s] \"เดี๋ยวเหอะ! เป็นนักเรียนก็ต้องเรียนหนังสือสิ!\""
62060-66 = "ยะ... ยิ่งพูดแบบนี้ยิ่งเหมือนคุณครูเลยค่ะ...!"
62060-67 = "อ่า พอมาคิดดูแล้ว คุณครูก็เป็นคุณครูนี่เนอะคะ... ใช่ค่ะ..."
62060-68 = "[s6] \"ไม่ได้การละ! สงสัยต้องใช้ไม้เด็ด\"\n[s7] \"ครูต้องทำในสิ่งที่เด็กๆ ไม่ชอบมากที่สุดแล้วละ!\""
62060-73 = "คะ... คืออะไรเหรอ?"
62060-74 = "[s8] \"ครูจะประกาศว่าพรุ่งนี้เราจะเรียนกันตามปกติ!\"\n[s9] \"ครูจะ MOMOTALK หาทุกคนเลยว่าพรุ่งนี้เรามีเรียนกันปกติ!\""
62060-77 = "คุณครูเนี่ย ชอบแกล้งคนอื่นจริงๆ เลย..."
62060-78 = "ว่าไงนะ? คนเราจะแข็งแกร่งได้จากการเอาชนะสิ่งที่ตัวเองไม่ชอบซ้ำแล้วซ้ำอีกงั้นเหรอ?"
62060-79 = "เฮ้อ... ในอาเรียสก็มีคำพูดทำนองนั้นเหมือนกันอยู่แล้วเหอะ"
62060-80 = "มันก็จริงนะ..."
62060-81 = "ฮุฮุ แต่การเรียนของครูดีกว่าการฝึกซ้อมของอาเรียสหลายเท่าเลยนะ ถึงนี่จะเป็นแค่ความคิดเห็น#nส่วนตัวของฉันก็เถอะ"
62060-82 = "หรือว่าเธอคิดต่างออกไปล่ะ มิซากิ?"
62060-83 = "ฉันไม่เคยพูดแบบนั้นสักหน่อย..."
62060-88 = "ฮุฮุ"
62060-89 = "แหะ... แหะๆ..."
62060-94 = "ทำไมทุกคนแหย่แต่ฉันคนเดียวล่ะ!"
62060-109 = "เอ๋? MOMOTALK?"
62060-113 = "<วันนี้ทุกคนคงเหนื่อยกันมาก>"
62060-114 = "<แต่พรุ่งนี้เราจะจัดการเรียนการสอนตามปกติ>"
62060-115 = "<ขอให้นักเรียนทุกคนให้ความร่วมมืออย่างแข็งขัน>"
62060-116 = "อะไรเนี่ย? ล้อกันเล่นหรือเปล่า?"
62060-117 = "ไม่รู้เหรอว่าตอนนี้อะไรสำคัญน่ะ..."
62060-118 = "รุ่นพี่ยังไม่มาใช่มั้ย? ถ้ามา ฉันต้องไปฟ้องแล้วละ..."
62060-126 = "อ๊ะ รุ่นพี่! มาแล้วเหรอคะ! เมื่อกี้คุณครูส่ง MOMOTALK หาทุกคนเลยค่ะ...!"
62060-127 = "บอกว่าพรุ่งนี้..."
62060-129 = "ฉันรู้ค่ะ"
62060-131 = "คะ... คะ?"
62060-132 = "งะ... งั้นสินะคะ... ถ้ารุ่นพี่รู้แล้ว ก็โล่งอกไปทีค่ะ ค่ะ..."
62060-134 = "ค่ะ ฉันลบข้อความที่ได้รับไปแล้วค่ะ ไม่ต้องกังวลให้มากนะคะ"
62060-136 = "คะ...?"
62060-137 = "ลบไปเลย... เหรอคะ...?"
62060-142 = "ทำไมเหรอคะ มีปัญหาอะไรหรือเปล่า?"

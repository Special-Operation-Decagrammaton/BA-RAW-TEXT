62060-153 = "นี่ก็เป็นเวลาเข้านอนอยู่หรอก..."
62060-154 = "แต่อย่างน้อยเราควรตอบโต้คุณครูที่ส่ง MOMOTALK มาเหมือนว่าไม่รู้เรื่องและไม่ใส่ใจอะไร..."
62060-155 = "หรือไม่ก็ต้อง... ตอบโต้กับสควอดสักหน่อยหรือเปล่าคะ...?"
62060-156 = "เรื่องไมอาด้วย... ถึงเราจะเป็นฝ่ายไล่เด็กคนนั้นออกไป แต่ฉันว่าเราก็น่าจะต้องหาผ้าห่มให้สักหน่อย..."
62060-161 = "..."

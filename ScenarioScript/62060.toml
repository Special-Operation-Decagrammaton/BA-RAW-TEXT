62060-446 = "[s16] \"ใช่... แล้วก็โดดเรียนยกห้องเลยด้วย\"\n[s17] \"ใช่... ถึงจะเป็นเรื่องที่พอเดาได้ของเด็กวัยรุ่นม.ปลายก็เถอะ...\""
62060-449 = "ทำยังไงดีล่ะคุณครู? พวกฉันก็ออกจากอาเรียสไปนานแล้ว คงช่วยหาเบาะแสอะไรเป็นพิเศษไม่ได้..."

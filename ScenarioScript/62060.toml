[translation]
62060-1 = "Episode 6;Lost Child"
62060-3 = "Good work, everyone."
62060-8 = "T-Today really was something..."
62060-9 = "It really was."
62060-10 = "Despite that, all of you seem to be taking it in stride."
62060-11 = "Well, life on the run wasn't exactly a walk in the park."
62060-12 = "[s] \"You've all grown so strong...\""
62060-13 = "It wasn't because I wanted to, all right?"
62060-14 = "What? People usually grow the most when they have to, not because they want to?"
62060-15 = "Ugh. You're always annoyingly right."
62060-16 = "B-But we..."
62060-17 = "..."
62060-18 = "Once we're done here, we have to go back to being on the lam, don't we?"
62060-19 = "Hiyori...?"
62060-23 = "N-Nothing! I-I'm happy regardless! Eheehee..."
62060-24 = "But still..."
62060-25 = "Something is..."
62060-26 = "Aha...! Hah! Maybe I'm just having all these weird thoughts because we haven't been back here in a while..."
62060-27 = "[s1] \"No, Hiyori. It's not weird at all.\"\n[s2] \"When it comes to you all and Arius...\"\n[s3] \"...I bear responsibility for my negligence.\""
62060-33 = "What? Wh-What are you saying?"
62060-34 = "Sensei...?"
62060-35 = "..."
62060-40 = "You know, Sensei. Please don't feel that everything must rest on your shoulders."
62060-41 = "We're responsible for the choices we made, and it's our responsibility to carry that ourselves."
62060-42 = "But, for now, let's focus on what we can do now."
62060-43 = "We can figure something out together."
62060-44 = "First, I'd like to address Mine's request."
62060-45 = "[s] \"'Daily life', she said...\""
62060-46 = "Yes. Daily life in Arius."
62060-47 = "...Well, the daily life she described is the complete opposite of Arius' reality."
62060-48 = "Right... All these things the students experienced since we've gotten here were brand new..."
62060-49 = "Taking classes...studying...field trips... They even saw straws that could filter water, and types of medical supplies they didn't even know existed."
62060-51 = "These aren't just \"emergency supplies\" to them. The students received blankets with reliable insulation for once, not the scraps of fabrics they usually use."
62060-52 = "Even the nutrition kits they brought are foreign to Arius."
62060-53 = "I see. What are considered the trivialities of life for one, can also be miracles for another."
62060-55 = "Mine requested we protect this, yes?"
62060-56 = "Having a daily routine. Feeling secure in tomorrow. The growth that comes with such a life..."
62060-57 = "It's all surprisingly hard to come by."
62060-58 = "[s4] \"You're right, Misaki.\"\n[s5] \"That's where I need to do better, as a teacher.\""
62060-61 = "But...I really don't wanna study anymore..."
62060-62 = "[s] \"Shame! It's your duty as a student!\""
62060-66 = "Y-You totally just sounded like a teacher just now...!"
62060-67 = "Ah. Right. You ARE a teacher, aren't you?"
62060-68 = "[s6] \"All right! It can't be helped!\"\n[s7] \"What I'm going to do next is a student's worst nightmare!\""
62060-73 = "What...is that?"
62060-74 = "[s8] \"I'm sending out a mass text through MomoTalk!\"\n[s9] \"And announcing that class is still on tomorrow!\""
62060-77 = "You're cruel, Sensei."
62060-78 = "People grow and get stronger by pushing themselves to do things they don't want to?"
62060-79 = "*sigh* They say the same thing in Arius, although our version is a bit darker."
62060-80 = "I remember that..."
62060-81 = "Fufu. Personally, I prefer Sensei's version of class over Arius'. Of course, I can only speak for myself."
62060-82 = "Ah, I'm sure Misaki would disagree with me, right?"
62060-83 = "...I never said that."
62060-88 = "Heehee!"
62060-89 = "Heh. Heehee..."
62060-94 = "Why are you guys always like this when it comes to me?!"
62060-109 = "Huh? A MomoTalk?"
62060-113 = "\"Although it was hectic, thank you for your hard work today.\""
62060-114 = "\"Class will continue, as scheduled, tomorrow morning.\""
62060-115 = "\"We strongly urge all students to attend and participate!\""
62060-116 = "Are you kidding me right now?"
62060-117 = "Do they not understand how dire this situation is?"
62060-118 = "Is Subaru back yet? We need to tell her about this..."
62060-126 = "Ah, Subaru! You're here! Sensei just sent out this announcement to everyone...!"
62060-127 = "And it said—"
62060-129 = "I'm aware."
62060-131 = "Oh, you are?"
62060-132 = "I-I see... Well, that's good..."
62060-134 = "I just deleted it. Don't bother yourself with it."
62060-136 = "\"Don't bother\"...?"
62060-137 = "\"Deleted it\"...?"
62060-142 = "Is there a problem?"
62060-147 = "N-Not at all! "
62060-149 = "Well, then."
62060-150 = "It's getting late. Let's get back and get some rest."
62060-152 = "We're just going to...go to bed?"
62060-153 = "I mean, I guess it is late, but..."
62060-154 = "But what about Sensei? They don't know anything about us, but they still think they have the right to boss us around like this!"
62060-155 = "And the Squad too! Shouldn't we, like... I don't know, send in a complaint?"
62060-156 = "Oh, and Maia too... I know she can't come back, but shouldn't we at least get her a blanket so she doesn't freeze?"
62060-161 = "..."
62060-162 = "I'm really not in the mood to repeat myself."
62060-164 = "Subaru...?"
62060-165 = "Huh...?"
62060-172 = "Go."
62060-173 = "Sleep."
62060-174 = "Understood?"
62060-180 = "...!"
62060-181 = "U-Understood!"
62060-182 = "G-Good night, Subaru!"
62060-190 = "*sigh*"
62060-191 = "..."
62060-192 = "Maybe I'll just sleep in the Basilica today."
62060-193 = "..."
62060-194 = "I can still feel it...even here..."
62060-199 = "That feeling that I'll never fall asleep again, even if I die."
62060-209 = "..."
62060-210 = "What should I do now...?"
62060-211 = "..."
62060-212 = "Just like this..."
62060-213 = "...like this."
62060-215 = "I want to disappear..."
62060-221 = "Hm? This is..."
62060-222 = "..."
62060-226 = "Class tomorrow? Even now...?"
62060-227 = "Sensei, seriously..."
62060-228 = "..."
62060-229 = "Ugh..."
62060-232 = "\"It's perfect! Let's start with picking up the chairs!\""
62060-233 = "\"Look, there's even a podium and a blackboard!\""
62060-236 = "\"It's okay! That's why they call the first week 'syllabus week'!\""
62060-237 = "\"It's just a quick overview, and then attendance!\""
62060-248 = "*sob*"
62060-249 = "I wanna go..."
62060-250 = "I wanna go to...Sensei..."
62060-251 = "*sob*"
62060-256 = "Uwaaahhh...!"
62060-260 = "I had been staring at the ceiling, the events of the day running through my mind."
62060-261 = "The Book of Revelation...the blow of the trumpet...angels... I cycled through them again and again."
62060-269 = "[ns] \"Who is that...? Hiyori? Misaki?\""
62060-279 = "[ns] \"Maia?! Are you okay?!\""
62060-280 = "Um, Sensei...?"
62060-281 = "I'm really, really sorry..."
62060-282 = "But could I...sleep here...just for tonight?"
62060-283 = "Please..."
62060-284 = "I'll be gone in the morning...and I'll never bother you again... I promise..."
62060-288 = "[ns] \"Welcome in!\""
62060-289 = "Gah?!"
62060-297 = "[ns] \"Were you crying? Let's wash your face. You're soaked all the way through!\""
62060-298 = "I-I'm fine! I'm fine...but..."
62060-303 = "I did my best to wipe down her face with tissues and bottled water."
62060-304 = "...Maia immediately started to lap at the water, so I got her every variety of drink we had."
62060-305 = "At first, I wanted to ask her what happened, but after thinking about it..."
62060-308 = "..."
62060-309 = "[s10] \"Okay, let's get some rest for now.\"\n[s11] \"You can use this sleeping bag.\""
62060-312 = "Huh?"
62060-313 = "B-But...isn't this yours?"
62060-314 = "No? I shouldn't worry about it?"
62060-315 = "There's an extra foil blanket in the emergency kit?"
62060-316 = "N-No! That's not right! I'll use the foil blanket instead!"
62060-317 = "What? If I keep on insisting, you'll sleep outside without a blanket...? Th-That's even worse!"
62060-321 = "O-Okay... Then..."
62060-322 = "Thank you, Sensei..."
62060-323 = "Am I hungry? I-I'm okay! I'm totally fine!"
62060-328 = "[ns] \"Yeah, yeah. I knew you'd say that...\""
62060-329 = "I'm sorry..."
62060-338 = "Nom, nom. *gulp*"
62060-339 = "[s] \"Eat slowly, or you'll hurt your stomach.\""
62060-342 = "B-But... But..."
62060-343 = "This is good."
62060-344 = "Yeah... Really good..."
62060-345 = "..."
62060-346 = "*sob*"
62060-347 = "[s] \"...\""
62060-349 = "[ns] \"All done?\""
62060-350 = "Y-Yes... I'm feeling full now..."
62060-351 = "I should get some rest then?"
62060-352 = "..."
62060-353 = "Um, Sensei?"
62060-354 = "Are you not...going to ask me what happened...?"
62060-355 = "[s12] \"Let's get some rest while we still can.\"\n[s13] \"*yawn* Man! I am BEAT!\""
62060-361 = "I'm sorry."
62060-362 = "Because of me..."
62060-363 = "I'm...sorry..."
62060-364 = "What? Y-You'll flick my forehead if I don't stop?!"
62060-365 = "Everything's okay, so don't say anything and get some rest for now?"
62060-366 = "...I can figure out what I want to do tomorrow?"
62060-367 = "You're really okay with me staying here?"
62060-368 = "[s14] \"Yeah. And if you want to talk, you can.\"\n[s15] \"We're not in any rush.\""
62060-371 = "..."
62060-372 = "..."
62060-373 = "Thank you, Sensei."
62060-374 = "Thank you..."
62060-375 = "*sob*"
62060-377 = "Maia must have been exhausted, because it didn't take long for her to fall asleep."
62060-381 = "She was restless all night, clearly plagued by a bad dream."
62060-382 = "...But I thought I could at least do this much."
62060-390 = "Is everyone here?"
62060-392 = "Yes!"
62060-393 = "Well then, from now on..."
62060-394 = "Our destination is Porta Pacis."
62060-396 = "Yes, Subaru!"
62060-400 = "...Is this really okay?"
62060-401 = "It's so early... I guess that's why she told us to go to bed yesterday."
62060-402 = "But the sun isn't even up, and it looks like we're really going to Porta Pacis..."
62060-403 = "That means Sensei's class will probably..."
62060-404 = "But what if we don't find what we're looking for there?"
62060-405 = "Shh, she'll hear us...!"
62060-410 = "Is there a problem?"
62060-416 = "No! Not at all!"
62060-424 = "...\"Therefore keep watch\""
62060-428 = "\"because you do not know the day or the hour.\""
62060-437 = "..."
62060-438 = "..."
62060-439 = "D-Did no one...come...?"
62060-444 = "..."
62060-445 = "U-Um, Sensei? I believe this is what they'd call an \"unexplained absence.\""
62060-446 = "[s16] \"Yeah...and a group one, on top of that.\"\n[s17] \"There's nothing more unpredictable than high school girls, but still...\""
62060-449 = "What should we do, Sensei? It's been too long since we left Arius. We're unlikely to be able to squirrel out any of their hiding spots."
62060-453 = "...You intend to call Subaru?"
62060-454 = "..."
62060-455 = "Understood, Sensei."
62060-462 = "..."
62060-463 = "She's not...picking up?"
62060-464 = "[s18] \"I get that people might not like my educational policies...\"\n[s19] \"...but a mass ditch day is a bit...\""
62060-471 = "Um, Sensei? I probably know where they are..."
62060-475 = "You do, Maia?!"
62060-476 = "They're all probably..."
62060-480 = "...on their way to Porta Pacis."
62060-484 = "!!!"
62060-486 = "Next Episode;Porta Pacis 1"

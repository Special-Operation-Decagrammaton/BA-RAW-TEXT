[translation]
62060-1 = "第6話;迷路的孩子"
62060-3 = "大家都辛苦了。"
62060-8 = "真，真是不得了的一天呢……"
62060-9 = "確實如此。"
62060-10 = "不過就算面臨那種情況，大家似乎也沒有太過動搖。"
62060-11 = "這也沒辦法。#n畢竟在我們東奔西跑的期間，什麼怪事都經歷過了。"
62060-12 = "[s]「大家都變強了呢……」"
62060-13 = "我們也不是喜歡才那樣的好嗎？"
62060-14 = "什麼？你說人大多都是被逼著變強的？"
62060-15 = "……唉。老是愛說這種討人厭又無法反駁的話……"
62060-16 = "可，可是我們……"
62060-17 = "……"
62060-18 = "在這件事結束之後……又要繼續過著逃亡生活對吧……？"
62060-19 = "日和……？"
62060-23 = "沒，沒什麼啦！#n現在這樣我也挺喜歡的！耶，耶嘿嘿……"
62060-24 = "不過，果然還是……"
62060-25 = "覺得有點……"
62060-26 = "我，我還真奇怪！#n可能是太久沒回到奧利斯了，所以才會胡思亂想吧……"
62060-27 = "[s1]「不，日和。不是那樣的。」\n[s2]「關於你們和奧利斯分校的事……」\n[s3]「某方面來說也算是我的失職……」"
62060-33 = "咦？這，這是什麼意思？"
62060-34 = "老師……？"
62060-35 = "……"
62060-40 = "老師，希望你不要把責任過度地攬在自己身上。"
62060-41 = "這是我們自己選擇的道路，有些事物自然也該由我們來承擔。"
62060-42 = "所以，假如真的還有其他方法的話……"
62060-43 = "到時候我們再一起思考吧。"
62060-44 = "現在就先來討論美禰同學拜託我們的事情如何？"
62060-45 = "[s]「是指『日常』的事情啊……」"
62060-46 = "嗯，奧利斯的日常。"
62060-47 = "其實奧利斯的日常，和那個人所說的完全不同……"
62060-48 = "確實……是呢。#n現在奧利斯的孩子們正在經歷的，可能都是從來沒有體驗過的事情……"
62060-49 = "上課……學習……校外教學……#n能夠過濾汙水的工具和各種新的醫藥品……"
62060-51 = "雖然只是緊急用品，至少還有保暖效果充足的棉被，而不是拿破掉的帳篷來用。"
62060-52 = "就連改善營養用的補充食品，對這裡來說也是陌生的東西。"
62060-53 = "真是讓我再次體會到了「某個人的日常，可能是另一個人的奇蹟」這件事啊。"
62060-55 = "不過美禰同學卻說，希望我們能盡可能守護這樣的日常對吧？"
62060-56 = "守護這千篇一律，卻又值得一再重複的日常。#n光是這樣活著，就能讓自己的內心慢慢成長……"
62060-57 = "其實這件事，意外地沒有想像中那麼容易呢。"
62060-58 = "[s4]「美咲說的沒錯。」\n[s5]「所以我身為老師，更應該那麼做。」"
62060-61 = "可是……我果然還是不想念書……"
62060-62 = "[s]「哎呀！身為學生就是要讀書啊！讀書！」"
62060-66 = "剛，剛才那樣很像老師耶……！"
62060-67 = "啊，不過老師本來就是老師嘛……"
62060-68 = "[s6]「果然這樣不行！」\n[s7]「我要來做點孩子們最討厭的事了！」"
62060-73 = "那，那是什麼？"
62060-74 = "[s8]「就是明天也要正常上課！」\n[s9]「我要來發MomoTalk公告給大家！」"
62060-77 = "你還真夠壞的啊，老師……"
62060-78 = "什麼？你說人要能反覆戰勝討厭的事物才能變強？"
62060-79 = "唉……這句話在奧利斯也常說，只不過是比較扭曲的版本就是了。"
62060-80 = "那倒是呢……"
62060-81 = "呵呵，不過比起奧利斯式的訓練，我還是覺得上老師的課好多了。#n當然這只是我個人的感想。"
62060-82 = "你不是這樣嗎，美咲？"
62060-83 = "……我可沒這麼說過。"
62060-88 = "呵呵。"
62060-89 = "耶，耶嘿嘿……"
62060-94 = "為什麼老是要針對我啦！"
62060-109 = "咦？MomoTalk？"
62060-113 = "「今天發生了很多事情，大家都辛苦了。」"
62060-114 = "「不過明天的課程還是會照常進行。」"
62060-115 = "「請各位同學踴躍出席。」"
62060-116 = "什麼啊，這是在開玩笑嗎？"
62060-117 = "搞不清楚現在什麼才是最重要的是不是啊……"
62060-118 = "前輩還沒回來嗎？#n等他回來得跟他說才行……"
62060-126 = "啊，前輩！你回來啦！#n老師剛才傳了公告給大家……！"
62060-127 = "內容居然是──"
62060-129 = "我知道。"
62060-131 = "咦，咦？"
62060-132 = "這，這樣啊……那就好……"
62060-134 = "我已經把傳給我的訊息刪掉了，所以不用放在心上。"
62060-136 = "咦……？"
62060-137 = "刪，刪掉了……？"
62060-142 = "有什麼問題嗎？"
62060-147 = "沒，沒有！"
62060-149 = "那麼……"
62060-150 = "現在時候也不早了，趕快回去睡覺吧。"
62060-152 = "要……要睡了嗎？"
62060-153 = "雖然確實是該睡了沒錯，可是……"
62060-154 = "對於那個好像什麼都不知道，還跟沒事一樣傳MomoTalk給大家的老師……"
62060-155 = "還有小隊他們……是不是應該去抗議一下比較好……？"
62060-156 = "雖然我們把舞彩那孩子趕出去了……是不是至少該送條被子給他……"
62060-161 = "……"
62060-162 = "同樣的話我不想說第二次。"
62060-164 = "前輩……？"
62060-165 = "咦……？"
62060-172 = "回去。"
62060-173 = "睡覺。"
62060-174 = "聽懂了沒？"
62060-180 = "……！"
62060-181 = "知，知道了！"
62060-182 = "前輩晚安！"
62060-190 = "呼……"
62060-191 = "……"
62060-192 = "今天就在宗座聖殿這裡睡吧。"
62060-193 = "……"
62060-194 = "原來是這種感受啊。"
62060-199 = "這種到死都難以入睡的感覺。"
62060-209 = "……"
62060-210 = "接下來，該怎麼辦呢……"
62060-211 = "……"
62060-212 = "好想就這樣……"
62060-213 = "就這樣……"
62060-215 = "完全消失……"
62060-221 = "嗯？這是……？"
62060-222 = "……"
62060-226 = "上課……？明天也要……？"
62060-227 = "老師他也真是的……"
62060-228 = "……"
62060-229 = "嗚嗚……"
62060-232 = "「哇！不錯嘛！桌子已經擺好，只要把椅子扶起來就行了！」"
62060-233 = "「而且還有講桌和黑板！簡直是完美的教室！」"
62060-236 = "「第一堂課本來就只會點名！」"
62060-237 = "「然後再講個概要而已，所以別擔心！」"
62060-248 = "嗚……"
62060-249 = "我要去……"
62060-250 = "去找老師……"
62060-251 = "嗚嗚……"
62060-256 = "嗚哇啊啊啊啊啊啊啊啊……"
62060-260 = "（因為遲遲無法入睡，只好一直望著天花板……）"
62060-261 = "（啟示錄……號角聲……天使……這些詞彙始終在腦海裡徘徊……）"
62060-269 = "[ns]「是誰……？日和還是美咲嗎……？」"
62060-279 = "[ns]「你怎麼了，舞彩！？」"
62060-280 = "那個，老師……？"
62060-281 = "真的……真的很抱歉……"
62060-282 = "能，能不能……讓我借住一晚……？"
62060-283 = "拜託你了……"
62060-284 = "我明天就會消失，不會再給你添麻煩的……只要今天一晚就好……"
62060-288 = "[ns]「快進來吧！」"
62060-289 = "哇啊！？"
62060-297 = "[ns]「先洗洗臉吧。剛才哭過嗎？看起來很狼狽呢。」"
62060-298 = "沒，沒事的！我……我沒事……"
62060-303 = "（先用濕紙巾為他擦臉，擦不乾淨的部分就用瓶裝水盡量清洗）"
62060-304 = "（……因為舞彩甚至連那瓶水都想喝下去，所以又另外準備了很多飲料）"
62060-305 = "（雖然想問他發生了什麼事……）"
62060-308 = "……"
62060-309 = "[s10]「來來來，總之先好好休息吧。」\n[s11]「這個睡袋給你用。」"
62060-312 = "咦……？"
62060-313 = "可，可是這……不是老師要用的嗎……？"
62060-314 = "你說沒關係，要我不用在意……？"
62060-315 = "老師蓋急救箱裡的鋁箔毯就好了……？"
62060-316 = "不，不可以！這樣太奇怪了！#n我用那個鋁箔毯就好！"
62060-317 = "咦？繼續堅持的話，老師就要光著身體到外面睡了……？#n那，那樣更不行了吧！？"
62060-321 = "我，我知道了……"
62060-322 = "謝謝老師……"
62060-323 = "問我會不會餓？#n沒，沒事的！我完全沒問題！"
62060-328 = "[ns]「果然如我所料……」"
62060-329 = "對，對不起……"
62060-338 = "（嚼嚼……咕嘟……）"
62060-339 = "[s]「慢慢吃沒關係，不然可能會消化不良哦。」"
62060-342 = "可，可是……可是……"
62060-343 = "這個，好好吃。"
62060-344 = "真的……真的好好吃……"
62060-345 = "……"
62060-346 = "嗚……"
62060-347 = "[s]「……」"
62060-349 = "[ns]「吃完了嗎？」"
62060-350 = "是，是的……現在肚子也飽了……"
62060-351 = "老師已經要睡了嗎？"
62060-352 = "……"
62060-353 = "那個……老師？"
62060-354 = "你不問我……發生了什麼事嗎……？"
62060-355 = "[s12]「現在我們兩個都該睡覺了。」\n[s13]「呼啊～好累哦～」"
62060-361 = "對不起。"
62060-362 = "都是我的錯。"
62060-363 = "對……不起……"
62060-364 = "咦？再，再一直這樣的話就要彈我額頭！？"
62060-365 = "已經沒事了，現在什麼都不用說，好好休息就好？"
62060-366 = "……明天想不想離開都沒關係？"
62060-367 = "老師的意思是……就算要一直待著也沒關係……？"
62060-368 = "[s14]「嗯。如果某天有什麼話想說……」\n[s15]「到時候再慢慢告訴我就好。」"
62060-371 = "……"
62060-372 = "…………"
62060-373 = "謝謝你，老師。"
62060-374 = "真的很謝謝你……"
62060-375 = "嗚……"
62060-377 = "（舞彩似乎是累壞了，沒過多久便進入了夢鄉）"
62060-381 = "（也許是做了悲傷的夢，舞彩即使在睡夢中也會時不時地輾轉抽泣……）"
62060-382 = "（不禁讓人心想……這或許正是老師該做的事……）"
62060-390 = "大家都到齊了嗎？"
62060-392 = "是！"
62060-393 = "那麼接下來……"
62060-394 = "我們將如先前所說，出發前往波塔帕西斯。"
62060-396 = "是的，前輩！"
62060-400 = "……這樣真的沒問題嗎？"
62060-401 = "居然這麼早就……昨天之所以催我們去睡覺，就是為了這個吧。"
62060-402 = "太陽都還沒出來，而且接下來又要去那種地方……"
62060-403 = "老師的課，果然……"
62060-404 = "不過要是去到那裡，結果還是什麼都查不到怎麼辦……？"
62060-405 = "噓，會被聽到啦……！"
62060-410 = "有什麼問題嗎？"
62060-416 = "不！沒有！"
62060-424 = "……「所以你們要警醒」。"
62060-428 = "「因為你們不知道那一日、那一刻何時會到來」。"
62060-437 = "……"
62060-438 = "……"
62060-439 = "其，其他人……都沒有來嗎……？"
62060-444 = "……"
62060-445 = "唔嗯……老師？#n雖然我不是很清楚……這種情況就是俗稱的「曠課」對吧？"
62060-446 = "[s16]「是啊……而且還是集體曠課。」\n[s17]「雖然常說青春期的女高中生是最難以捉摸的……」"
62060-449 = "該怎麼辦呢，老師？#n我們也離開奧利斯一陣子了，所以沒辦法提供什麼特別的線索……"
62060-453 = "你說要先打電話給昴看看？"
62060-454 = "……"
62060-455 = "我知道了，老師。"
62060-462 = "……"
62060-463 = "他是不是……沒接電話……？"
62060-464 = "[s18]「就算我的教育方針未必能讓所有人喜歡……」\n[s19]「但是像這樣集體離家出走還是有點……」"
62060-471 = "那個，老師？#n我，我可能知道大家去了哪裡……"
62060-475 = "是哪裡，舞彩！？"
62060-476 = "大家應該……"
62060-480 = "是到「波塔帕西斯」去了……"
62060-484 = "！！！"
62060-486 = "下一話;波塔帕西斯（１）"

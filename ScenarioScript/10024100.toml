10024100-70 = "4;루미;02;이런 풍경을 원했던 건가?\n#4;em;[?]"
10024100-71 = "4;루미;02\n2;키사키;03;글쎄다. 산해경이 평화로울 수 있다면 그걸로 충분하다."

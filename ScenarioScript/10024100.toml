10024100-10 = "4;현룡문 부원 A;04;이, 이 음식은 뭐야? 도대체……!\n#4;em;[?!]\n#4;shake"
10024100-11 = "2;현무상회 부원 B;02;자, 자. 먹어 봐! 붉은겨울식 고기 수프에 와일드헌트식 포도 고기찜이라고!"

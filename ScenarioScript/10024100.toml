10024100-78 = "2;키사키;03;어쩌면 이 생소한 음식들 때문일 수도 있겠구나.\n#2;em;[...]"
10024100-79 = "2;키사키;99;신기한 조합이로다. 우유 얼음과 연유, 청포도와 팥앙금이라니……\n#2;greeting"

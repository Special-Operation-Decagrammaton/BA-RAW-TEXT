10024100-54 = "3;사야;03;그래! 좋은 생각이 났다! 역시 나님인 것이다!\n#3;jump\n#3;em;[!]"
10024100-55 = "3;사야;00;나님을 둘로 늘리는 비약을 만들면 되는 것이다!"
10024100-56 = "3;사야;99;한 명은 이곳에서 음식의 맛을 보고, 다른 한 명은 조용히 연구에 몰두하면 되는 것이 아니냐!\n#3;em;[음표]"
10024100-57 = "3;사야;04;그런데 잠깐, 그러려면 일단 연단방으로 돌아가 보아야 하는 것이 아니냐……"

10024100-39 = "1;코코나;12;코코나 쨩이 아니라 코코나 교관이라고!\n#1;hophop"
10024100-40 = "3;슌;14;그러면 코코나 쨩. 잠시 동안만 아이들을 부탁해요?\n#3;greeting"
10024100-41 = "1;코코나;02;어? 슌 언니, 어딜 가려고?!\n#1;em;[?]"

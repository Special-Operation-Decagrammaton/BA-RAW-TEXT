[translation]
10024100-1 = "บทส่งท้าย;ร่ำรวยด้วยความสุข"
10024100-2 = "(และแล้วความวุ่นวายจากการลักลอบส่งออกโสมหมื่นปีที่สั่นคลอนซานไห่จิงก็ได้จบลง)"
10024100-10 = "อะ... อาหารนี่มันอะไรกัน? ทำไมถึงได้...!"
10024100-11 = "เอาละๆ ลองชิมดูได้เลย! มันคือเนื้อตุ๋นองุ่นสูตรไวลด์ฮันต์ กินคู่กับซุปเนื้อสูตรเรดวินเทอร์!"
10024100-12 = "น้ำซุปสีชมพู...? เจ้านี่มันกินได้จริงๆ แน่นะ?"
10024100-13 = "สีมันเป็นแบบนั้นเฉยๆ มันคืออาหารชั้นเลิศที่มีรสกลมกล่อมและอมเปรี้ยว เนื้อตุ๋นก็นุ่มมากเลยนะ!"
10024100-18 = "แบบนี้จะดีเหรอ... แต่ตามธรรมเนียมของซานไห่จิงเรา... มันดู..."
10024100-19 = "กินๆ ไปก่อนเถอะแล้วค่อยคิดเรื่องนั้น นี่ถ้ากินหมดแล้วก็ยังมีของว่างสูตรทรีนิตี้รออยู่อีกนะ!"
10024100-20 = "ขนมที่อบพร้อมๆ กับเนยและน้ำตาล พอกินคู่กันกับชาที่ผสมกับนมแล้วมันเข้ากันกว่าที่คิดเลยนะ!"
10024100-22 = "ใส่นมลงไปในน้ำชางั้นเหรอ ใครที่ไหนเค้าทำกันแบบนั้น!"
10024100-24 = "อย่าเพิ่งพูดอะไรอย่างนั้นสิ ก็บอกให้ลองกินดูก่อน ถ้าอันนี้เป็นรสชาติที่ใช่ก็เป็นอาหารเลิศรสได้เลยนะ"
10024100-33 = "เอาละ เด็กๆ ทุกคน วันนี้คือเป็นวันจัดงานเลี้ยงโดยมีมังกรดำเป็นเจ้าภาพและย่านการค้าเทพเต่าดำ#nเป็นผู้จัดงานนะคะ"
10024100-34 = "มีงานเลี้ยงทั้งทีก็ขอให้กินและเล่นสนุกกันให้เต็มที่ แต่ขออย่ารบกวนคนข้างๆ เกินไปนะคะ"
10024100-35 = "ค่าา~"
10024100-36 = "หลังกินข้าวเสร็จก็ต้องกล่าวขอบคุณด้วย!"
10024100-37 = "กลับถึงบ้านแล้วก็อย่าลืมแปรงฟันด้วยนะ!"
10024100-38 = "โคโคน่าจังก็อย่าลืมแปรงฟันน้า~"
10024100-39 = "ไม่ใช่โคโคน่าจังสักหน่อย บอกให้เรียกว่าผู้ฝึกสอนโคโคน่ายังไงล่ะ!"
10024100-40 = "งั้นก็ขอฝากโคโคน่าจังดูแลเด็กๆ สักครู่นะคะ"
10024100-41 = "เอ๋? พี่ชุน... จะไปไหนน่ะ?!"
10024100-42 = "ฮุฮุฮุ พอดีว่าพี่ต้องไป 'พบ' คุณครูน่ะค่ะ"
10024100-46 = "เอ๋? แค่พี่คนเดียวเหรอ? ใจร้าย! ฉันก็อยากไปด้วยนะ...! ตะ... แต่ว่าพวกเด็กๆ..."
10024100-47 = "คอยดูเถอะนะ พี่ชุน! ไว้จะเอาคืนให้ได้เลย!"
10024100-52 = "วุ่นวายอะไรแบบนี้เนี่ย... อยากรีบกลับชมรมวิจัยศาสตร์การปรุงยาแล้ว..."
10024100-53 = "แต่ก็ไม่อยากพลาดอาหารพวกนี้สักอย่างเลย ทำยังไงดีล่ะเนี่ย..."
10024100-54 = "จริงด้วย นึกอะไรดีๆ ออกแล้ว! สมกับเป็นท่านซายะจริงๆ!"
10024100-55 = "ปรุงยาที่เพิ่มท่านซายะเป็นสองคนขึ้นมาซะก็สิ้นเรื่อง!"
10024100-56 = "ให้คนหนึ่งชิมอาหารอยู่ที่นี่ ส่วนอีกคนก็มุ่งมั่นทำงานวิจัยเงียบๆ แค่นี้ก็จบแล้ว!"
10024100-57 = "แต่ถ้าจะทำแบบนั้นเราต้องกลับชมรมวิจัยศาสตร์การปรุงยาก่อนนี่นา..."
10024100-58 = "ท่านซายะควรทำยังไงดีล่ะเนี่ย!"
10024100-59 = "แต่ว่าเมนูนี้อร่อยจริงๆ แฮะ... ง่ำๆ"
10024100-69 = "ครื้นเครงกันดีจังเลยนะ ประมุข"
10024100-70 = "อยากเห็นภาพบรรยากาศแบบนี้เองหรอกเหรอ?"
10024100-71 = "ไม่รู้สิ ถ้ามันทำให้ซานไห่จิงสงบสุขได้ก็พอแล้วละ"
10024100-72 = "ไม่คิดว่าตัวเองทำหน้าทำตาผ่อนคลายเกินกว่าจะพูดคำนั้นออกมาเหรอ? แล้วคุณครูล่ะ คิดว่ายังไงบ้าง?"
10024100-73 = "[s] \"เห็นทุกคนดูสนุกกันก็ดีแล้วละ\""
10024100-77 = "เห็นเป็นแบบนั้นงั้นหรือ?"
10024100-78 = "มันอาจจะเป็นเพราะอาหารแปลกตาพวกนี้ก็เป็นได้"
10024100-79 = "เป็นการผสมกันที่น่าทึ่งดีนะ น้ำแข็งป่นใส่นมข้นหวาน องุ่นเขียวกับถั่วแดงบด..."
10024100-81 = "อยากจะรับเพิ่มอีกหรือเปล่าคะ ท่านประมุข?"
10024100-82 = "ไม่ละ เราอยากลองชิมอย่างอื่นดูด้วย เราไม่ได้มาในงานแบบนี้นานแล้ว"
10024100-83 = "ฮ่าฮ่าฮ่า คิซากิเป็นคนกินยากมาแต่ไหนแต่ไรแล้วละ เห็นเธอกินเก่งแบบนี้ฉันก็ภูมิใจแล้ว"
10024100-84 = "... เราไม่ใช่น้องสาวของเธอสักหน่อย เราบอกตั้งแต่ก่อนหน้านี้แล้วไม่ใช่รึไง"
10024100-85 = "ก็แล้วมันทำไมล่ะ! เรารู้จักกันมาตั้งไม่รู้กี่ปีแล้วนะ! เอานี่ ลองกินอันนี้ด้วยสิ อันนี้ฉันใส่วิปครีมลงบน#nสตรอว์เบอร์รีแล้วห่อด้วยโมจิเลยนะ!"
10024100-87 = "หรือไม่ก็เอาเป็นชีสบอลทอดไหม? ได้เวลาล้างปากด้วยรสชาติที่เค็มพอดีๆ แล้วละนะ"
10024100-88 = "น่าสนใจ เอามาชิมทั้งหมดนั่นเลย"
10024100-90 = "(ความขัดแย้งของทั้งสองฝ่ายที่มีมาอย่างเนิ่นนานอาจไม่ได้จบลงอย่างง่ายดาย...)"
10024100-91 = "(แต่อย่างน้อยก็น่ายินดีที่ตอนนี้เข้าใกล้ความจริงแล้ว ความจริงที่ว่าทั้งสองสามารถยื่นมือหากันได้)"
10024100-92 = "เต่ามังกรผนึกกำลัง ~อนาคตที่รวมเป็นหนึ่งดั่งใจปรารถนา~"

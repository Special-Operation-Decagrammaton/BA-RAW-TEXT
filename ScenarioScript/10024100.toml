[translation]
10024100-1 = "Epilogue;Full House, Joyful Family"
10024100-2 = "And so, the case of the ten-thousand-year ginseng came to a close."
10024100-10 = "Wh-What in the world is this dish...?"
10024100-11 = "Red Winter-style soup made with Wildhunt-style grape-steamed meat! Try it!"
10024100-12 = "Soup isn't supposed to be pink... Is it even edible...?"
10024100-13 = "Don't mind the color! It's sweet, sour, and savory. And the meat is super tender!"
10024100-18 = "Erm, I'm not so sure...about all this foreign food..."
10024100-19 = "Just try it already. And then you've gotta taste these Trinity-style desserts!"
10024100-20 = "Did you know you can mix milk with tea? It's so good!"
10024100-22 = "Th-That's crazy! Why would you put milk in tea?"
10024100-24 = "Once you're used to it, you won't want to go back."
10024100-33 = "Everyone, Genryumon and the Black Tortoise Promenade came together to throw us a very special party today."
10024100-34 = "Eat and play as much as you want, but remember to use your inside voices."
10024100-35 = "Yes, Miss Shun!"
10024100-36 = "Be sure to thank them after you eat!"
10024100-37 = "And don't forget to brush your teeth when you get home!"
10024100-38 = "You too, Kokona! Brush your teeth!"
10024100-39 = "It's not \"Kokona.\" It's \"Instructor Kokona!\""
10024100-40 = "Kokona, would you please keep an eye on the children for a moment?"
10024100-41 = "Oh? Are you going somewhere?"
10024100-42 = "Heeheehee... I'm just having a little \"meeting\" with Sensei..."
10024100-46 = "What? But I want to...! B-But the kids..."
10024100-47 = "I'll remember this, Shun! And I will get even!"
10024100-52 = "It's so noisy here... I wanna get back to the Eastern Alchemy Society..."
10024100-53 = "But I don't wanna miss out on all this great food... What do I do...?"
10024100-54 = "Oh, I got it! I'm such a genius!"
10024100-55 = "I'll make an elixir that clones me!"
10024100-56 = "One copy of me can taste all the food, and the other can get back to my research!"
10024100-57 = "Hold on... All of my equipment is back at the lab, so I'd have to go there to make the elixir..."
10024100-58 = "What do I do?!"
10024100-59 = "But this...so good... Nom nom nom..."
10024100-69 = "This is quite the party, Madam Kisaki."
10024100-70 = "Is it everything you were hoping for?"
10024100-71 = "All that matters is that we have harmony in Shanhaijing."
10024100-72 = "Such a dour answer! But you can't hide that smile from me. How about you, Sensei?"
10024100-73 = "[s] \"Everyone's having a great time. I'd call it a success.\""
10024100-77 = "Do you think so?"
10024100-78 = "Maybe it's because of all this strange food..."
10024100-79 = "Frozen milk, condensed milk, grapes, and red bean paste... It's an intriguing combination."
10024100-81 = "Would you like another helping, Madam Kisaki?"
10024100-82 = "No, thank you. I want to try some of the others, too. I don't get this chance very often."
10024100-83 = "You always pick at your food like a bird. I'm glad to see you eating up for once!"
10024100-84 = "...Don't treat me like I'm your little sister. We've had this conversation before."
10024100-85 = "Come now. We've certainly known each other long enough! Here, I want you to try this strawberry creme rice cake!"
10024100-87 = "Or would you like a fried cheese ball? Something more savory would be a good change of pace..."
10024100-88 = "Interesting... I'll try them all."
10024100-90 = "A single party wasn't enough to clear up the tension between these two clubs..."
10024100-91 = "But it was wonderful to see them set aside their differences and celebrate together for at least one day."
10024100-92 = "Dragon & Tortoise, Working Together for a Better Future"

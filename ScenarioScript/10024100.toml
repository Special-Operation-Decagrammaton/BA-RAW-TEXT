[translation]
10024100-1 = "尾聲;充閭之慶：家有喜事"
10024100-2 = "（就這樣，「萬年蔘」的走私風波落幕了）"
10024100-10 = "這，這道料理到底是……！"
10024100-11 = "總之先吃吃看嘛！#n這是在赤冬風的湯裡加上狂獵風的蒸肉和葡萄的特製料理唷！"
10024100-12 = "湯是粉紅色的耶，這真的能吃嗎……？"
10024100-13 = "顏色雖然有點強烈，不過其芳香酸甜的口味可是絕品哦！#n而且蒸肉也是軟嫩得入口即化！"
10024100-18 = "真的，沒問題嗎……#n我們山海經的傳統……還有文化……"
10024100-19 = "不必在意那些枝微末節的小事啦！#n吃完之後還有三一風的茶點準備上桌哦！"
10024100-20 = "混合奶油和砂糖的烤點以及牛奶泡的茶，配合起來意外的不錯哦！"
10024100-22 = "居，居然把茶跟牛奶混在一起，我怎麼可能喝的下那種東西！"
10024100-24 = "哎呀，總之先喝一口看看！#n這也是令人上癮的美味哦。"
10024100-33 = "來，各位小朋友。#n這是玄龍門與玄武商會的大家舉辦的宴會唷～"
10024100-34 = "請大家盡情享用。#n不過要注意不能給周圍的人添麻煩哦？"
10024100-35 = "是～！"
10024100-36 = "吃完之後要記得說謝謝招待唷！"
10024100-37 = "還有回家之後不要忘了刷牙！"
10024100-38 = "心菜醬也不要忘記刷牙喔～！"
10024100-39 = "不是心菜醬，是心菜教官！"
10024100-40 = "那麼，心菜醬。#n孩子們可以暫時交給你嗎？"
10024100-41 = "咦？旬姐姐，你要去哪裡！？"
10024100-42 = "唔呵呵。#n姐姐我啊……接下來「有事」要找老師。"
10024100-46 = "咦？姐姐自己去真狡猾！#n我也……！唔，可是孩子們……"
10024100-47 = "真是的，旬姐姐！#n我要把冰箱裡的「巴根達斯」吃掉哦！"
10024100-52 = "……人這麼多真是讓人靜不下來啊～#n明明想早點回研究室去的說……"
10024100-53 = "不過每道料理看起來都很好吃……該怎麼做才好。"
10024100-54 = "對了，我想到了！真不愧是我！"
10024100-55 = "只要有能作出自己分身的藥就好了！"
10024100-56 = "這樣一來就能讓一個自己在這裡享用料理，另一個回去專心研究！"
10024100-57 = "不過這也得先回去一趟進行研究才行……"
10024100-58 = "這樣就吃不到這道料理了啊！"
10024100-59 = "……嗯呣，嚼嚼……#n每道料理真的都好好吃。"
10024100-69 = "大家似乎都很高興呢，妃姬。"
10024100-70 = "這就是你想看到的光景嗎？"
10024100-71 = "這個嘛，誰知道呢。#n妾身只期望山海經的和平，這倒也不壞。"
10024100-72 = "就這一點來說，大家的表情看起來都很放鬆呢？#n老師覺得呢？"
10024100-73 = "[s]「大家似乎都很享受，看起來心情很好。」"
10024100-77 = "在汝看來亦是如此嗎？"
10024100-78 = "……在這種時候，妾身稍微放鬆倒也無妨吧。"
10024100-79 = "話說這道料理的組合實在是不可思議。#n居然在牛奶冰上加煉乳、葡萄和糖果……"
10024100-81 = "需要我多拿一點過來嗎，門主大人？"
10024100-82 = "呵呵，機會難得，妾身也試著嘗嘗其他料理吧。"
10024100-83 = "呵呵。胃口小的妃姬居然這麼高興地吃著我的料理。#n對我來說──就像妹妹一樣呢。"
10024100-84 = "……妾身無意成為汝的妹妹，要說多少次才明白。"
10024100-85 = "有什麼關係！我們都認識多少年了！#n來，吃吃看這個吧。是在草莓上抹上鮮奶油，然後用麻糬包起來的哦！"
10024100-87 = "還是比較想吃炸起司球？#n一直吃甜食的話，會想吃點鹹的解膩對吧。"
10024100-88 = "呼呣，都讓妾身嘗嘗看吧。"
10024100-90 = "（組織之間長久以來的矛盾，也許無法立刻解決……）"
10024100-91 = "（但即便如此，嘗試向彼此釋出善意的現狀，依然讓人感到高興）"
10024100-92 = "龍武同舟 ～心中描繪的，是同一個未來～"

10024100-81 = "3;레이죠;02;더 가져다드릴까요, 문주님?\n#3;a\n#3;closeup\n#3;em;[반응]"
10024100-82 = "3;키사키;03;아니다. 다른 것도 맛보고 싶구나. 모처럼 이런 자리이니 말이다."
10024100-83 = "4;루미;07;하하하, 키사키는 예전부터 입이 짧았으니까 말이지. 이렇게 잘 먹는 모습을 보니 내가 다 뿌듯하네.\n#4;em;[재잘]\n#4;al\n#3;m2"
10024100-84 = "4;루미;07\n3;키사키;04;……나는 너의 여동생 같은 것이 아니다. 예전부터 말해 오지 않았느냐.\n#3;em;[...]"
10024100-85 = "4;루미;03;아무려면 어때! 알고 지난 게 몇 년인데! 자, 이것도 먹어 봐. 딸기 위에 크림을 바른 다음 떡으로 감싼 거라고!\n#4;greeting"
10024100-86 = "#all;hide"
10024100-87 = "3;루미;00;아니면 치즈볼 튀김을 가져다줄까? 슬슬 짭짤하고 고소한 것으로 입을 달랠 때가 됐지.\n#3;closeup\n#3;em;[음표]"
10024100-88 = "3;키사키;03;흥미롭구나. 전부 맛보도록 하지.\n#3;closeup"

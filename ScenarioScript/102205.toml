[translation]
102205-15 = "ปฏิบัติการป้องกันทุกเขตปกครองตนเอง สำเร็จ"
102205-19 = "เตรียมปฏิบัติโจมตีผู้พิทักษ์หอคอยทั้งหมด สำเร็จ"
102205-20 = "ถือว่าเตรียม <ปฏิบัติการบุกยึดหอคอยแห่งคำลวง> สำเร็จทั้งหมดแล้วค่ะ"
102205-21 = "ในไม่ช้า ฉันจะเริ่มนับถอยหลังสำหรับการเริ่มโจมตีทั้งหมดค่ะ"
102205-22 = "ช่วยรอสัญญาณจากฉันด้วยนะคะคุณครู"
102205-23 = "[s] \"ได้เลย ให้สัญญาณด้วยนะ รินจัง!\""
102205-27 = "...... ค่ะ!"

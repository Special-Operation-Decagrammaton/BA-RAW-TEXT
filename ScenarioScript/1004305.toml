[translation]
1004305-1 = "ด้วยใจที่เลือนรางข้างกองไฟ"
1004305-3 = "เท่านี้ก็เตรียมพร้อมแล้วละ"
1004305-4 = "ทุกคนทำได้ดีมาก ขอบคุณทุกคนมากเลย!"
1004305-10 = "[ns] \"เฮ้อ ในที่สุดก็เสร็จสักทีสินะ\""
1004305-11 = "(ถึงจะเกิดเรื่องวุ่นวายหลายๆ อย่างก็ตาม แต่สุดท้ายก็เตรียมงานเทศกาลเสร็จไปได้ด้วยดี)"
1004305-15 = "(ในตอนที่พอมีเวลาว่าง คุณครูก็ส่งข้อความไปหาวาคาโมะ)"
1004305-16 = "[s] \"<ครูเสร็จงานแล้วนะ วาคาโมะอยู่ไหนน่ะ?>\""
1004305-20 = "(คราวนี้คุณครูรู้สึกว่ามีบางอย่างแปลกไป เพราะถึงรออยู่นาน ก็ไม่มีข้อความตอบกลับจากวาคาโมะ)"
1004305-21 = "[s] \"วาคาโมะไม่ตอบเหรอเนี่ย แปลกจัง...\""
1004305-25 = "อากาศแย่ลงเรื่อยๆ เลยนะเนี่ย"
1004305-26 = "ดูจากที่ลมพัดแรงแบบนี้ คลื่นก็คงแรงเหมือนกันแน่ๆ"
1004305-30 = "(รู้สึกสังหรณ์ใจไม่ดี...)"
1004305-34 = "[ns] \"ขอตัวสักครู่นะ...\""
1004305-35 = "อ๊ะ คุณครูจากชาเล่ต์? เมฆฝนตั้งเค้าดำทะมึนมาแล้วนะ รอเดี๋ยวก่อนสิ!"
1004305-48 = "(หลังจากรู้สึกสังหรณ์ใจไม่ดี คุณครูก็ตัดสินใจวิ่งไปดูรอบๆ)"
1004305-52 = "[ns] \"แฮ่กๆ เจอสักที...\""
1004305-55 = "อ๊ะ คุณท่าน... มาแล้วเหรอคะ♡"
1004305-58 = "[ns] \"วาคาโมะ มาทำอะไรอยู่ตรงนี้น่ะ?\""
1004305-59 = "คะ?"
1004305-60 = "แน่นอนค่ะ วาคาโมะกำลังรอคุณท่านอยู่ไงล่ะคะ♡"
1004305-61 = "[s] \"อากาศแบบนี้ ยังมานั่งรอตรงนี้อีกเหรอ...?\""
1004305-62 = "ฮุฮุฮุ ถามอะไรแบบนั้นกันคะ คุณท่านนี่ชอบแหย่ฉันเล่นจริงๆ เลย"
1004305-63 = "ไม่เห็นต้องถามเลยนี่คะ..."
1004305-64 = "ก็ฉัน <สัญญา> กับคุณท่านเอาไว้แล้วนี่นา"
1004305-65 = "ที่คุณท่านบอกว่า <ตอนนี้ยุ่งอยู่ ช่วยรออีกหน่อย>"
1004305-66 = "หากคุณท่านบอกเช่นนั้นละก็ แน่นอนว่าวาคาโมะก็ต้องเชื่อคำพูดของคุณท่านอยู่แล้วค่ะ"
1004305-67 = "ไม่ว่าจะฝนตก หรือพายุหิมะถล่ม วาคาโมะผู้นี้ก็จะรอคุณท่านตามที่คุณท่านบอกค่ะ"
1004305-68 = "เพราะนั่นคือ <สัญญา> ยังไงล่ะคะ"
1004305-69 = "[s] \"สัญญา... นึกดูแล้วเมื่อวันก่อนที่โกดังก็พูดแบบนี้นี่นา...\""
1004305-72 = "ฮุฮุฮุ วาคาโมะให้สัญญากับคุณท่านแล้วนี่คะ ว่าจะทำให้วันนี้เป็นวันที่แสนพิเศษของคุณท่าน..."
1004305-73 = "เพราะฉะนั้นพวกตัวเกะกะที่ขัดขวางพวกเรา..."
1004305-74 = "ค่ะ-! วาคาโมะจะทำลายดอกไม้ไฟพวกนี้ให้สิ้นซากเลยค่ะ! "
1004305-77 = "[ns] \"วาคาโมะพยายามรักษาสัญญาสินะ...\""
1004305-78 = "ค่ะ ใช่แล้วค่ะ"
1004305-79 = "หรือว่าวาคาโมะ... ทำอะไรผิดหรือคะ?"
1004305-80 = "หรือว่าวาคาโมะทำอะไร... ที่รบกวนคุณท่าน...?"
1004305-81 = "[s1] \"เปล่าหรอก ครูผิดเองที่ปล่อยให้วาคาโมะรอแบบนี้ซะได้\"\n[s2] \"ครูควรอธิบายให้วาคาโมะเข้าใจมากกว่านี้แท้ๆ\""
1004305-82 = "คะ?"
1004305-83 = "คะ?"
1004305-84 = "ไม่เลยค่ะ ไม่เป็นไรเลยค่ะ วาคาโมะชินกับการรอคอยแบบนี้แล้ว..."
1004305-92 = "ว้าย?! คะ... คุณท่าน...?"
1004305-95 = "[ns3] \"ไม่เป็นไรซะที่ไหนกัน\"\n[ns4] \"ตัวเย็นขนาดนี้ยังบอกไม่เป็นไรอีก...!\""
1004305-96 = "คุณท่าน..."
1004305-97 = "คุณท่าน..."
1004305-98 = "คุณ... ท่าน..."
1004305-99 = "ตัวอุ่นจังเลยค่ะ..."
1004305-100 = "[s] \"จริงสิ วาคาโมะ รอครูแป๊ปนึงนะ!\""
1004305-101 = "อ๊ะ คะ...คะ...?"
1004305-108 = "นี่มัน... กองไฟ...?"
1004305-109 = "[s5] \"ก่อนกลับก็มาทำให้ตัวอุ่นขึ้นก่อนเถอะนะ\"\n[s6] \"เดี๋ยวครูจะนั่งอยู่ข้างๆ วาคาโมะเอง\""
1004305-114 = "...!"
1004305-115 = "ได้เลยค่ะ...♡"
1004305-121 = "ถะ...ถ้างั้น... ขอเสียมารยาทหน่อยนะคะ"
1004305-124 = "― ฮุฮุ อุ่นจังเลยค่ะ...[wa:2110] "
1004305-127 = "― แน่นอนว่า... อาจจะเป็นเพราะมีกองไฟอยู่ก็ได้...[wa:1070] "
1004305-130 = "― แต่คำพูดของคุณท่าน... ทุกๆ คำพูด...[wa:2810] "
1004305-133 = "― ตอนนี้... พอคิดว่าคุณท่าน...[wa:340] "
1004305-135 = "― พูดคำเหล่านั้นเพื่อวาคาโมะแล้ว..."
1004305-138 = "― ตัวฉันในตอนนี้...[wa:490] "
1004305-140 = "― ยังบกพร่องในหลายๆ เรื่อง[wa:600] "
1004305-143 = "― เวลาที่อยู่เคียงข้างคุณท่าน... ก็มักสร้างปัญหาให้คุณท่านบ่อยๆ...[wa:1940] "
1004305-145 = "― แล้วก็อาจจะทำอะไรผิดพลาดไปอีกก็ได้ค่ะ[wa:1820] "
1004305-148 = "― แต่ถึงอย่างนั้น... ฉันก็ยังอยากจะขออยู่เคียงข้างคุณท่าน[wa:2370] "
1004305-150 = "― แบบนี้ต่อไป...ได้หรือเปล่าคะ...?[wa:2020] "
1004305-153 = "[ns] \"อื้อ ได้เสมอเลย\""
1004305-154 = "― ขอบคุณมากค่ะ...[wa:120] "
1004305-156 = "― เพราะคุณท่านเป็นแบบนี้... ตัวฉัน...[wa:1800] "
1004305-160 = "(คุณครูและวาคาโมะนั่งชมแสงระยิบระยับจากท้องทะเลยามค่ำคืนข้างกองไฟด้วยกัน จนกระทั่ง#nวาคาโมะหายตัวเย็น)"

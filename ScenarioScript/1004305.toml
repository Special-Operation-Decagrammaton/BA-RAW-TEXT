[translation]
1004305-1 = "於營火旁閃爍的心意"
1004305-3 = "這樣準備就全都結束了。"
1004305-4 = "大家，辛苦了！"
1004305-10 = "[ns] 「呼，終於結束了。」"
1004305-11 = "（雖然過程中發生了許多騷動，不過最終還是順利完成了煙火大會的準備）"
1004305-15 = "（由於獲得了一段休息時間，便回覆了若藻的MomoTalk訊息）"
1004305-16 = "[s] 「『工作全部結束了哦。若藻在哪裡？』」"
1004305-20 = "（平時明明總是馬上就會回覆，這次卻遲遲沒收到若藻的回覆）"
1004305-21 = "[s] 「若藻居然沒回覆，真稀奇……」"
1004305-25 = "喔呀，天氣……"
1004305-26 = "風的樣子也很奇怪，看來海上會很狂亂呢。"
1004305-30 = "（突然間莫名地感到不安）"
1004305-34 = "[ns] 「……我暫時離開一下。」"
1004305-35 = "啊，老師請等一下！風雨越來越強了！"
1004305-48 = "（被突如其來的不安感驅使著身體，在周邊四處尋找時……）"
1004305-52 = "[ns] 「哈啊哈啊……找到了……」"
1004305-55 = "哎呀，老師。您來了呀♡"
1004305-58 = "[ns] 「……若藻，你在這裡做什麼？」"
1004305-59 = "嗯？"
1004305-60 = "唔呵呵，我在這裡一～直……恭候著閣下♡"
1004305-61 = "[s] 「在這種天氣裡，在這裡等我……？為什麼……」"
1004305-62 = "唔呵呵，竟然問這種問題……閣下真是壞心眼呢。"
1004305-63 = "那自然是……"
1004305-64 = "因為和閣下「約定」好了……"
1004305-65 = "「可以等我一下嗎？」"
1004305-66 = "因為閣下那麼說了……"
1004305-67 = "若藻我。就如您說的──無論是颳雨下雪。等著閣下是理所當然的。"
1004305-68 = "因為是那樣的「約定」。"
1004305-69 = "[s] 「約定……這麼說來，上次在煙火倉庫也是……」"
1004305-72 = "唔呵呵……因為和閣下「約定」好了。#n要將這一天，化為特別的一天送給您。"
1004305-73 = "因此，要把不斷妨礙著我們的這些障礙物……"
1004305-74 = "沒錯……也就是要把煙火本身給炸飛！"
1004305-77 = "[ns] 「所以若藻是為了遵守約定……」"
1004305-78 = "是的，是那樣沒錯……"
1004305-79 = "我……難不成……做錯了什麼嗎。"
1004305-80 = "做了會給閣下添麻煩的事情……之類的……？"
1004305-81 = "[s1] 「不，做錯事的是我才對。竟然讓你在這種地方等。」\n[s2] 「我應該跟若藻解釋清楚才對。」"
1004305-82 = "咦……"
1004305-83 = "咦……"
1004305-84 = "怎麼會，這種程度，我壓根不覺得──"
1004305-92 = "唔！？老，老師……？"
1004305-95 = "[ns3] 「……怎麼可能沒事啊。」\n[ns4] 「身體都變得這麼冰了……！」"
1004305-96 = "老師……"
1004305-97 = "老師……"
1004305-98 = "閣……下……"
1004305-99 = "……有點，熱。"
1004305-100 = "[s] 「……若藻，等我一下哦！」"
1004305-101 = "啊，呃，是……？"
1004305-108 = "這是……營火……？"
1004305-109 = "[s5] 「回去之前，先在這裡暖暖身體吧。」\n[s6] 「這段時間，我會坐在若藻身邊的。」"
1004305-114 = "……！"
1004305-115 = "好，好的……♡"
1004305-121 = "那，那麼，失禮了。"
1004305-124 = "― 呵呵，真是溫暖呢……[wa:2550] "
1004305-127 = "― 當然營火也是一部份的原因……[wa:2350] "
1004305-130 = "― 意識到閣下的聲音，您的一言一語……[wa:3530] "
1004305-133 = "― 現在都只為了我，[wa:1140] "
1004305-135 = "― 而編織……"
1004305-138 = "― ……我還有，[wa:930] "
1004305-140 = "― 很多不成熟的地方。[wa:1200] "
1004305-143 = "― 在閣下的身邊，添了許多麻煩……[wa:3900] "
1004305-145 = "― 或許，還會犯錯也說不定。[wa:2820] "
1004305-148 = "― 即使如此，我還能像這樣待在閣下的……[wa:3850] "
1004305-150 = "― 待在老師的，身邊嗎……？[wa:2820] "
1004305-153 = "[ns] 「當然……想待多久都行。」"
1004305-154 = "― 非常感謝您……[wa:440] "
1004305-156 = "― 正因為是這樣的閣下，我……[wa:2680] "
1004305-160 = "（在若藻凍僵的身體回暖之前，兩人一起眺望著水面上搖曳的營火）"

[translation]
1002403-1 = "My Personal Cheerleader"
1002403-2 = "I made my way out to the coastal road Shiroko told me about not long after she contacted me."
1002403-3 = "I could see her steadily approaching in the distance on her bicycle."
1002403-4 = "...?!"
1002403-5 = "Sensei?"
1002403-6 = "How did you get here?"
1002403-7 = "[s1] \"I wanted to check on you.\"\n[s2] Wave your hand."
1002403-8 = "Sensei..."
1002403-9 = "Sensei..."
1002403-10 = "Oh, what do you have there? Is it an energy drink?"
1002403-11 = "And you have a towel too. Did you bring these for me?"
1002403-12 = "You really didn't have to do this..."
1002403-13 = "It's nothing. Thank you. I could use both."
1002403-14 = "Um..."
1002403-15 = "Never mind. Hmm..."
1002403-16 = "Have you been worrying about me this entire time, Sensei?"
1002403-17 = "You haven't?"
1002403-18 = "But you came all this way just to give me a drink and a towel."
1002403-19 = "[s] \"Think of it as me being your cheerleader.\""
1002403-20 = "...!"
1002403-21 = "Cheerleader..."
1002403-22 = "You're my..."
1002403-23 = "...cycling cheerleader."
1002403-24 = "[s] \"Shiroko?\""
1002403-28 = "― Thank you, Sensei.[wa:1870] "
1002403-31 = "― Umm, I don't know what to say, but...[wa:2470] "
1002403-33 = "― I've never received support like this before...[wa:3040] "
1002403-36 = "― Sensei, when I'm around you...[wa:960] "
1002403-38 = "― something new happens every day.[wa:1070] "
1002403-41 = "― (Hmm? What's happening? My heart won't stop racing...)[wa:3930] "
1002403-44 = "― Strange. This is a pretty new experience too...[wa:3280] "
1002403-47 = "Thank you, Sensei. I'll make sure to repay your kindness later."
1002403-48 = "The towel..."
1002403-49 = "You want me to use the one you brought? I don't mind..."
1002403-50 = "...but that means you'll be returning with a used towel and empty bottle. You don't have to..."
1002403-51 = "[s] \"You're the star here. I'm just a cheerleader.\""
1002403-55 = "Okay. If you insist."
1002403-56 = "I feel much more invigorated after this. I'll keep pushing until I've finished the journey."
1002403-57 = "Because now..."
1002403-58 = "...I have my own personal cheerleader."
1002403-60 = "Shiroko gave me a copy of her riding map and then I returned to Schale."

[translation]
1002403-1 = "ผู้สนับสนุนของฉัน"
1002403-2 = "(คุณครูออกมารอแถวกลางถนนเลียบชายหาดที่ชิโรโกะบอกไว้ว่าจะมาถึง)"
1002403-3 = "(เห็นชิโรโกะปั่นจักรยานอย่างรวดเร็วมาแต่ไกล)"
1002403-4 = "...!?"
1002403-5 = "คุณครู...?"
1002403-6 = "ทำไมมาอยู่ที่นี่ได้...?"
1002403-7 = "[s1] \"ก็มาดูน่ะสิว่าชิโรโกะยังอยู่ดีมั้ย\"\n[s2] โบกมือให้"
1002403-8 = "คุณครู..."
1002403-9 = "คุณครู..."
1002403-10 = "เอ๋? มีอะไรอยู่ในมือน่ะ...? เครื่องดื่มชูกำลังเหรอ?"
1002403-11 = "มีผ้าเช็ดเหงื่อผืนใหม่ด้วย... เตรียมมาเพื่อฉันเหรอ...?"
1002403-12 = "ไม่เห็นต้องทำแบบนี้เลย ฉันก็มีเตรียมมา..."
1002403-13 = "มะ... ไม่สิ ขอบคุณนะ งั้นขอรับไว้แล้วกัน"
1002403-14 = "อืม..."
1002403-15 = "เปล่า... ไม่มีอะไรหรอก อืม..."
1002403-16 = "นี่ฉันกำลังทำให้คุณครูเป็นห่วงอยู่ใช่มั้ย..."
1002403-17 = "หืม...? ไม่ใช่อย่างนั้นเหรอ?"
1002403-18 = "แต่การที่คุณครูมาที่นี่ด้วยตัวเอง แถมยังมีเครื่องดื่มและผ้าเช็ดเหงื่อมาให้อีก..."
1002403-19 = "[s] \"คิดว่าครูเป็นผู้สนับสนุนก็แล้วกัน\""
1002403-20 = "...!"
1002403-21 = "ผู้สนับสนุน..."
1002403-22 = "คุณครูเป็น..."
1002403-23 = "ผู้สนับสนุนการปั่นจักรยานของฉัน..."
1002403-24 = "[s] \"ชิโรโกะ...?\""
1002403-28 = "― ขอบคุณนะ...คุณครู[wa:1910] "
1002403-31 = "― อา... ต้องพูดยังไงดีนะ...[wa:2950] "
1002403-33 = "― เป็นครั้งแรกเลย ที่ได้กำลังใจ... จากใครแบบนี้...[wa:3000] "
1002403-36 = "― ถ้าอยู่กับคุณครู[wa:1520] "
1002403-38 = "― ก็จะได้เจอเรื่องแบบนี้ ทุกวันเลยสินะ[wa:910] "
1002403-41 = "― (...? ทำไมกันนะ? เสียงหัวใจเต้นโครมครามเลย...)[wa:4250] "
1002403-44 = "― แปลกจัง เพิ่งเคย... เป็นแบบนี้เลยล่ะ[wa:3720] "
1002403-47 = "ขอบคุณนะคุณครู แล้วฉันจะตอบแทนทีหลังนะ"
1002403-48 = "งั้นฉันคืนผ้าก่อน..."
1002403-49 = "หืม? จะให้ใช้ผืนนี้ต่อเหรอ...? อืม... ฉันไม่ติดอะไรหรอกนะ..."
1002403-50 = "งั้นฉันควรเอาผืนที่ใช้แล้วให้คุณครู แล้วก็กระป๋องเปล่านี่ด้วย... แต่ว่ามัน..."
1002403-51 = "[s] \"มันเป็นงานของผู้สนับสนุนอยู่แล้ว\""
1002403-55 = "อื้ม... ก็ได้"
1002403-56 = "รู้สึกมีกำลังใจขึ้นมาแล้ว ฉันจะปั่นให้ครบระยะเลยล่ะ"
1002403-57 = "เพราะตั้งแต่นี้..."
1002403-58 = "ฉันมีผู้สนับสนุนแล้ว"
1002403-60 = "(คุณครูรับแผนที่ปั่นจักรยานมาจากชิโรโกะแล้วกลับมาที่ห้องทำงาน)"

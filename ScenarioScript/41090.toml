[translation]
41090-1 = "第9話;這い寄る影"
41090-2 = "子ウサギ公園付近・市場"
41090-4 = "（近くの市場まで、買い物に来ていた）"
41090-5 = "あっ、先生……！？"
41090-10 = "このようなところでお会いするとは、奇遇ですね！"
41090-11 = "[s1] \"あ、キリノ。お疲れ様。\"\n[s2] \"ここでもパトロール？\""
41090-12 = "はい、その通りです！今日も市民の安全のために！"
41090-13 = "はい、その通りです！今日も市民の安全のために！"
41090-14 = "それにこの辺りは、美味しい屋台がたくさんありまして……。"
41090-15 = "特にあそこのお肉屋さんのカツサンドは絶品で、何かを買うといつも揚げたてのコロッケをおまけしてくれたり……！"
41090-19 = "も、もちろん、それだけが目的というわけではありません！この辺は、不良たちがうろついているということもあってですね……！"
41090-20 = "[s] \"キリノの頑張りは知ってるよ、お疲れさま。\""
41090-21 = "あ、あははは……。"
41090-22 = "ところで、先日そこの公園で騒ぎを起こしたSRTの生徒たちについて、「後のことは全てシャーレに任せた」と伺ったのですが……"
41090-23 = "あれから大丈夫でしたか？何かトラブルなどが起きてなければ良いのですが。"
41090-24 = "例えば銃やトラップで先生を威嚇して、食べ物を奪ったり……"
41090-25 = "何か大きな要求をしたり、暴れたりですとか……！"
41090-26 = "[s3] \"だ、大丈夫……うん。\"\n[s4] \"みんな良い子たちだから。\""
41090-27 = "そうでしたか、なら良かったです。"
41090-28 = "そうでしたか、なら良かったです。"
41090-29 = "デモを起こし、ヴァルキューレに対抗するほどの方々でしたので、もしかしたら危ないのではと思っていたのですが……。"
41090-30 = "流石は先生、というところでしょうか！"
41090-31 = "私も先生のような立派な大人になるため、今日もまた精進します！"
41090-32 = "[s] \"まあ、私も全部が上手く行ってるわけじゃないけどね……。\""
41090-33 = "あ、そうなんですね。もし何かありましたらいつでも本官に、もしくはヴァルキューレ警察学校に連絡してください。"
41090-34 = "我々は年中無休24時間、市民の安全のために動きますので！"
41090-35 = "あ、ところで最近この辺りで、変な噂があるんですよ。それも原因でパトロールに来ていたのですが……。"
41090-36 = "[s] \"噂……？\""
41090-37 = "はい。どうやらこの辺で、武装した放浪者集団の方々が歩き回っているとか。"
41090-38 = "荒っぽい服装をした、定住地を持たない集団とのことなのですが……"
41090-39 = "どこで手に入れたか分からない強力な銃火器を持ち歩いており、市民の方々から不安の声が上がっているとのことで。"
41090-40 = "それに先日は、湾岸地帯に入り込んで廃材を盗んだというお話もありました。"
41090-41 = "一体何が目的なのでしょうか……？"
41090-42 = "[s] \"んん……？\""
41090-43 = "先生？何か思い当たることでもありましたか？"
41090-44 = "[s] \"いや、その情報だと多分違うはず……。\""
41090-45 = "そうでしたか。もし何か分かりましたら、ご連絡をお願いします！"
41090-46 = "それにしても以前のSRTの件はさておき、「強力な銃火器を持った放浪者集団」だなんて……。"
41090-47 = "何だかこのままでは、ヴァルキューレ警察学校の武装がまるで貧弱みたいに見えてしまいそうです。"
41090-48 = "この機にヴァルキューレも、より最新式の銃器に変えてもらうというのは……？"
41090-49 = "[s] \"なるほど？\""
41090-50 = "とはいえ、まあ難しいでしょうね……そもそも生活安全局の基本業務に、犯罪者の制圧は含まれていませんし……。"
41090-51 = "そもそもどうやらヴァルキューレ全体として、財政状況が良くないそうで……弾丸の補充にも一苦労です。"
41090-52 = "ですがご安心ください、いざとなれば徒手空拳でも市民の安全はお守りします！"
41090-53 = "それに前回の功績で、警備局に転科できるかもしれませんし……。"
41090-54 = "これからも引き続き、頑張っていこうと思います！"
41090-55 = "[s] \"うん、応援してるね。\""
41090-56 = "ありがとうございます！これも先生のおかげです！"
41090-57 = "では本官は引き続きグル……"
41090-58 = "いえ、パトロールに戻ります！"
41090-62 = "[ns] 買い物を終えてシャーレに帰る。"
41090-66 = "……。"
41090-70 = "……そこの君。"
41090-71 = "[USERNAME]先生かね？"
41090-72 = "[s] \"そうですけど……。\""
41090-74 = "君に用事があるんだ。"
41090-75 = "ついて来てくれるね？"
41090-82 = "[ns] \"（これ、麻酔……！？）\""
41090-91 = "（放たれた煙を吸ってしまい、目の前がぼやけて……）"
41090-95 = "（意識は闇の中へと沈んだ）"
41090-97 = "次回;無所有と焼肉弁当"

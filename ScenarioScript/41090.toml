41090-9 = "3;키리노;02\n#3;a\n#wait;1500"
41090-10 = "3;키리노;00;이런 곳에서 또 뵙게 되다니, 우연이네요!\n#3;greeting\n#3;em;[반짝]"
41090-11 = "[s1] \"안녕, 키리노.\"\n[s2] \"여기서 무얼 하고 있었던 거야?\""
41090-12 = "3;키리노;01;물론 오늘도 시민들의 안전을 위해 거리를 순찰하던 중이었지요."
41090-13 = "3;키리노;01;물론 오늘도 시민들의 안전을 위해 거리를 순찰하던 중이었지요."
41090-14 = "3;키리노;00;게다가 이 근처에는 간식을 파는 노점상이 많이 있으니까요."
41090-15 = "3;키리노;99;특히 저 앞의 정육점에서는 카츠샌드를 구입할 때마다 갓 튀겨낸 고로케를 하나 덤으로 주는데, 그 맛이 정말……\n#3;em;…"
41090-16 = "#st;[0,0];instant;1;"
41090-17 = "#clearST"
41090-18 = "3;키리노;07\n#3;em;[?!]\n#3;shake\n#wait;1200"
41090-19 = "3;키리노;04;무, 물론 그걸 노리고 이 거리를 순찰하는 건 아닙니다! 이 근처는 불량 학생들이 자주 어슬렁거리는 우범지역이기도 하니까요!\n#3;stiff"
41090-20 = "[s] \"키리노가 고생하는 건 잘 알고 있어.\""
41090-21 = "3;키리노;03;아하하…… 그렇게 말씀해 주시니 조금 부끄럽네요.\n#3;em;[땀]"
41090-22 = "3;키리노;01;그나저나 지난번 공원에서 소동을 벌였던 그 SRT 학생들의 관리를 선생님께서 맡게 되셨다고 들었는데요……"
41090-23 = "3;키리노;02;뭔가 또다시 말썽을 부리거나 수상쩍은 계획을 세우는 것처럼 보이지는 않던가요?"
41090-24 = "3;키리노;09;예를 들자면 선생님을 총으로 위협해서 먹을 것을 갈취한다든가……\n#3;stiff"
41090-25 = "3;키리노;08;사치스러운 거주 시설을 요구하며 난동을 부린다든가……!\n#3;em;[!]\n#3;closeup"
41090-26 = "[s3] \"걱정하지 않아도 괜찮아.\"\n[s4] \"모두 착한 아이들이니까.\""
41090-27 = "3;키리노;02;그렇습니까. 그건 조금 의외네요.\n#3;closeup"
41090-28 = "3;키리노;02;그렇습니까. 그건 조금 의외네요.\n#3;closeup"
41090-29 = "3;키리노;99;경찰에게 총을 겨누고 무력시위를 벌일 정도의 문제아들인 만큼, 분명 선생님의 말씀도 듣지 않을 거라 생각했습니다만…….\n#3;closeup"
41090-30 = "3;키리노;00;역시 총학생회가 포기한 문제아들도 선생님의 카리스마 앞에서는 순한 양이 되는 모양이군요.\n#3;greeting\n#3;em;[반짝]\n#3;closeup"
41090-31 = "3;키리노;03;본관도 선생님과 같은 훌륭한 어른이 되기 위해 노력하겠습니다!\n#3;closeup"
41090-32 = "[s] \"키리노가 생각하는 것만큼 대단하진 않지만……\""
41090-33 = "3;키리노;00;네. 혹시 나중에라도 문제가 생긴다면 언제든 발키리 경찰학교에 연락해주세요.\n#3;em;[반응]"
41090-34 = "3;키리노;01;발키리의 학생들은 연중무휴 24시간, 시민의 안전을 위해 깨어 있으니까요!"
41090-35 = "3;키리노;01;게다가 요새는 이 근처에 흉흉한 소문이 돌아서 자주 순찰을 나올 것 같기도 하고요."
41090-36 = "[s] \"흉흉한 소문?\""
41090-37 = "3;키리노;02;네. 듣자 하니, 요새 이 근처에 무장한 노숙자들이 돌아다니고 있다고 합니다."
41090-38 = "3;키리노;99;거친 옷을 입고, 폐기 도시락을 두고 싸우는 걸 보면 분명히 거주지가 불확실한 노숙자임이 분명한데……\n#3;em;…"
41090-39 = "3;키리노;05;어디서 구했는지 모를 중화기를 들고 다녀서 근처의 시민들이 불안에 떨고 있다는군요.\n#3;stiff"
41090-40 = "3;키리노;09;게다가 소문에 따르면 지난번에는 경비원이 지키고 있는 항만에 뻔뻔하게 기어들어가 안 쓰는 폐자재를 몰래 훔쳐 가기까지 했다고……."
41090-41 = "3;키리노;05;기껏 중화기를 들고 저지른 범죄가 쓰레기를 훔치는 것이라니…… 그 노숙자들은 도대체 무슨 생각일까요?\n#3;em;[?]"
41090-42 = "[s] \"혹시 그건…….\""
41090-43 = "3;키리노;02;뭔가 짚이는 점이라도 있으신가요, 선생님?"
41090-44 = "[s] \"아, 아무것도 아니야.\""
41090-45 = "3;키리노;00;그렇군요. 혹 나중에라도 무언가 알게 되신다면 꼭 신고 부탁드립니다!\n#3;em;[반응]"
41090-46 = "3;키리노;02;그나저나 큰일이네요. 불량 학생들이 들고 다니는 개인 화기만으로도 골치가 아플 지경인데, 이제는 노숙자들까지 중화기를 들고 다니다니……."
41090-47 = "3;키리노;06;이러다가는 치안을 담당하는 발키리 경찰학교의 무장이 제일 빈약해질지도 모르겠습니다.\n#3;em;[속상함]\n#3;stiff"
41090-48 = "3;키리노;09;아니. 어쩌면 이 핑계로 생활안전국에 최신식 화기를 지원해달라고 하는 건……?"
41090-49 = "[s] \"그건 역시 어렵지 않을까?\""
41090-50 = "3;키리노;03;역시 그렇겠지요. 생활안전국의 업무에 범죄자 소탕은 포함되어 있지 않으니까요.\n#3;em;[땀]"
41090-51 = "3;키리노;01;게다가 요즘은 학교의 재정상황도 좋지 않아 탄환을 구입하는 것조차 어렵다고 하니……."
41090-52 = "3;키리노;00;하지만 괜찮습니다. 비록 맨손뿐이라도 시민의 안전을 지키는 일은 포기할 수 없으니까요.\n#3;em;[반응]"
41090-53 = "3;키리노;99;게다가 지난번의 공적을 인정받아 경비국으로 전과를 가게 된다면 더 좋은 무기를 지급 받을 수도 있을 테니……"
41090-54 = "3;키리노;01;오히려 정의를 실현할 새로운 기회라고도 할 수 있겠네요!\n#3;greeting\n#3;em;[반짝]"
41090-55 = "[s] \"좋은 결과가 있었으면 좋겠네.\""
41090-56 = "3;키리노;03;헤헤, 응원해 주셔서 감사합니다!"
41090-57 = "3;키리노;01;그럼 본관은 계속해서 미식 탐방을……\n#3;m2"
41090-58 = "3;키리노;04;아니, 순찰을 계속하러 돌아가 보겠습니다!\n#3;stiff\n#3;em;[땀]"

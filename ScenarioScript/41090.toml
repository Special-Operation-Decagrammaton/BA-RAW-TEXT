[translation]
41090-1 = "Episode 9; A Suspicious Shadow"
41090-2 = "Market near Kousagi Park"
41090-4 = "(I was out at a nearby market to shop for some supplies for Schale.)"
41090-5 = "Is that you, Sensei?"
41090-10 = "What an unexpected meeting! Hi, Sensei!"
41090-11 = "[s1] \"Long time no see, Kirino.\"\n[s2] \"What are you doing out here?\""
41090-12 = "Yep! I'm patrolling the streets to protect the peace!"
41090-13 = "I'm patrolling the streets to protect the peace!"
41090-14 = "And, as an added bonus, checking out all of the street vendors here!"
41090-15 = "There's so many different snacks in this area! I recommend the butcher shop near the front over there. Their fried croquette is one of the best things I've—"
41090-19 = "O-Of course that's not why I'm patrolling this area! That would be shirking my duties. It just so happens that many troublemakers tend to hang out here after school!"
41090-20 = "[s] \"I never doubt your work ethic, Kirino.\""
41090-21 = "Ahaha... Th-Thank you, Sensei."
41090-22 = "But, Sensei. I heard you're taking over supervising the SRT students now."
41090-23 = "Has there been any trouble in that department?"
41090-24 = "They could be threatening you for food as we speak!"
41090-25 = "Or have they forced you out of your living facilities and taken over in a rampage?!"
41090-26 = "[s3] \"There's nothing to worry about.\"\n[s4] \"They're all good kids.\""
41090-27 = "Oh. I'm surprised to hear that."
41090-28 = "Oh. I'm surprised to hear that."
41090-29 = "Considering they're dangerous enough to point their guns at police officers, I was very concerned they would resist you at every opportunity, Sensei."
41090-30 = "But of course, that's simply the limitless charisma of our Sensei. Not even those horrible students could do anything about it!"
41090-31 = "I can only hope to become an exemplary adult like yourself one day, Sensei."
41090-32 = "[s] \"I'm really not as impressive as you seem to think, Kirino...\""
41090-33 = "You're so funny, Sensei! But if you do run into any problems, don't hesitate to ask Valkyrie Police School!"
41090-34 = "Valkyrie's students are standing by 24 hours a day, 365 days a year to ensure the safety of all our citizens!"
41090-35 = "We've also increased our patrols recently, considering all the atrocious rumors as of late."
41090-36 = "[s] \"Atrocious rumors?\""
41090-37 = "Unfortunately. There's been an influx of armed homeless people terrorizing this area."
41090-38 = "Based on their...appearance and incessant fighting over discarded boxed lunches, we've deduced these individuals must be homeless people without a permanent residence."
41090-39 = "Apparently they're armed with heavy firearms, as well. That's why we've increased our patrols."
41090-40 = "They even snuck into a guarded harbor and stole a load of waste material! They're incorrigible bad guys!"
41090-41 = "It is strange though. They're reported to be armed to the teeth, but only seem to be after trash. It's an enigma, but Valkyrie Police School is on the case!"
41090-42 = "[s] \"There's no way...\""
41090-43 = "What's wrong, Sensei? Did you think of something?"
41090-44 = "[s] \"Uh. I-It's nothing.\""
41090-45 = "I see. Well, please do be sure to report any suspicious activity you see!"
41090-46 = "There seems to be no end to issues lately. We already have our hands full policing delinquent students with their personal firearms, and now there's a rogue, unknown group that's heavily-armed?"
41090-47 = "At this rate, I'm going to be wielding a peashooter against a flamethrower! Or worse!"
41090-48 = "Maybe this is my chance to make a supply request for the Public Safety Bureau students to have the latest firearms?"
41090-49 = "[s] \"I think you already know the answer to that one.\""
41090-50 = "Haha, I guess I do. Our duties aren't even technically to fight crime head-on."
41090-51 = "And seeing how there's barely enough budget for bullets these days, I can't be selfish."
41090-52 = "I'll continue protecting the citizens and students of Kivotos, even if I have nothing left but my bare hands!"
41090-53 = "And I'm still looking forward to the possibility of being transferred to the Security Bureau as a reward for our recent achievements."
41090-54 = "Then I would receive better firearms and, therefore, a better way to protect the peace!"
41090-55 = "[s] \"You can do it, Kirino!\""
41090-56 = "Heehee! Sensei's encouragement always motivates me."
41090-57 = "Now, if you'll excuse me. That street vendor is calling my name..."
41090-58 = "Oops! I mean, back to patrol!"
41090-62 = "[ns] Head back to Schale."
41090-66 = "..."
41090-70 = "...Hey, you."
41090-71 = "Are you [USERNAME] Sensei?"
41090-72 = "[s] \"Yes, that's me.\""
41090-74 = "I've got a bone to pick with you."
41090-75 = "Will you come with me?"
41090-82 = "[ns] \"This is...an anesthetic?!\""
41090-91 = "(I inhaled the smoke the suspicious individual sprayed in my face, and my vision started to blur.)"
41090-95 = "(Then, I promptly lost consciousness.)"
41090-97 = "Next Episode; Non-Possession and Yakiniku Bentos"

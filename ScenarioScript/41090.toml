[translation]
41090-1 = "ตอนที่ 9;เงาต้องสงสัย"
41090-2 = "ตลาดใกล้ๆ โคะอุซางิ การ์เด้น"
41090-4 = "(คุณครูออกมาตลาดที่อยู่ใกล้ๆ เพื่อซื้อของใช้ของชาเล่ต์)"
41090-5 = "เอ๋? คุณครู...?"
41090-10 = "บังเอิญจังเลยนะคะที่ได้เจอกันที่นี่!"
41090-11 = "[s1] \"ว่าไงคิริโนะ\"\n[s2] \"มาทำอะไรอยู่ที่นี่เหรอ?\""
41090-12 = "ฉันกำลังลาดตระเวนท้องที่เพื่อความปลอดภัยของพลเมืองเหมือนทุกวันค่ะ"
41090-13 = "ฉันกำลังลาดตระเวนท้องที่เพื่อความปลอดภัยของพลเมืองเหมือนทุกวันค่ะ"
41090-14 = "แถมแถวนี้ยังมีร้านขายของอร่อยๆ เยอะแยะไปหมดเลยด้วยน่ะค่ะ"
41090-15 = "โดยเฉพาะร้านขายเนื้อที่อยู่ข้างหน้า ถ้าซื้อแซนด์วิชทงคัตสึจะแถมโคร็อกเกะทอดใหม่ให้ด้วยชิ้นหนึ่ง#nค่ะ อร่อยอย่าบอกใครเลย..."
41090-19 = "ตะ... แต่ฉันก็ไม่ได้มาลาดตระเวนเพราะจะกินอะไรหรอกนะคะ! ฉันมาที่นี่เพราะแถวนี้เป็นพื้นที่#nอาชญากรรมที่มีเด็กเกเรอยู่เยอะค่ะ!"
41090-20 = "[s] \"ครูรู้อยู่แล้วว่าคิริโนะตั้งใจทำงานแค่ไหน\""
41090-21 = "แหะๆๆ... พูดแบบนี้ฉันเขินนะคะ"
41090-22 = "จะว่าไป ฉันได้ยินมาว่าคุณครูเป็นคนรับผิดชอบนักเรียน SRT ที่ก่อความวุ่นวายในสวนสาธารณะเมื่อ#nคราวก่อนด้วย..."
41090-23 = "พวกนั้นกำลังทำพฤติกรรมก่อปัญหาหรือวางแผนน่าสงสัยอะไรอีกบ้างไหมคะ?"
41090-24 = "อย่างเช่น ใช้ปืนขู่กรรโชกคุณครูเพื่อเอาอาหาร..."
41090-25 = "หรือว่าขอของอำนวยความสะดวกในค่ายแล้วก่อความไม่สงบ...!"
41090-26 = "[s3] \"ไม่ต้องเป็นห่วงหรอก\"\n[s4] \"เด็กๆ พวกนั้นไม่ใช่เด็กไม่ดี\""
41090-27 = "งั้นเหรอคะ? คาดไม่ถึงเลย..."
41090-28 = "งั้นเหรอคะ? คาดไม่ถึงเลย..."
41090-29 = "ฉันคิดว่าเด็กเจ้าปัญหาที่เอาปืนจ่อตำรวจและประท้วงแบบใช้กำลังพวกนั้นจะไม่เชื่อฟังคุณครูซะอีกค่ะ ..."
41090-30 = "จอมปัญหาที่แม้แต่องค์การนักเรียนยังยอมแพ้คงเจอเสน่ห์ของคุณครูแล้วกลายเป็นเด็กใสซื่อขึ้นมา#nสินะคะ"
41090-31 = "ฉันเองก็จะเป็นผู้ใหญ่ที่ยอดเยี่ยมแบบคุณครูให้ได้ค่ะ!"
41090-32 = "[s] \"ครูไม่ได้ยอดเยี่ยมขนาดที่คิริโนะคิดหรอก...\""
41090-33 = "ถ้าเกิดปัญหาอะไรขึ้นในอนาคตก็ติดต่อเข้ามาที่สถาบันฝึกตำรวจวัลคิรี่นะคะ"
41090-34 = "เหล่านักเรียนของวัลคิรี่พร้อมให้บริการเพื่อความปลอดภัยของพลเมืองตลอด 24 โมงแบบไม่มีวันหยุด#nเลยค่ะ!"
41090-35 = "ฉันว่านักเรียนวัลคิรี่น่าจะมาลาดตระเวนแถวนี้บ่อยๆ เพราะได้ยินข่าวลือหนาหูจากที่นี่น่ะค่ะ"
41090-36 = "[s] \"ข่าวลือเหรอ?\""
41090-37 = "ใช่ค่ะ ว่ากันว่ามีคนไร้บ้านเตร็ดเตร่อยู่แถวๆ นี้ค่ะ"
41090-38 = "พวกนั้นแต่งตัวโทรมๆ และทะเลาะกันเรื่องข้าวกล่องหมดอายุ ฉันมั่นใจว่าต้องเป็นคนไร้บ้านที่ไม่มี#nที่อยู่เป็นหลักแหล่งแน่ๆ ค่ะ"
41090-39 = "แต่ปัญหาก็คือพวกนั้นมีอาวุธหนักกันด้วย ผู้คนในย่านนี้ก็เลยสั่นกลัวกันใหญ่เลยค่ะ"
41090-40 = "ข่าวลือยังบอกอีกด้วยนะคะว่าพวกนั้นแอบเข้าไปในท่าเรือที่มียามเฝ้าอยู่แล้วไปขโมยของที่จะทิ้ง#nออกมา..."
41090-41 = "เป็นถึงอาชญากรติดอาวุธ แต่ก็เที่ยวไปขโมยขยะ... พวกนั้นเป็นคนยังไงกันคะเนี่ย?"
41090-42 = "[s] \"หรือว่าจะเป็น...\""
41090-43 = "พอเดาอะไรออกเหรอคะคุณครู?"
41090-44 = "[s] \"มะ... ไม่มีอะไรหรอก\""
41090-45 = "งั้นเหรอคะ ถ้าได้เบาะแสอะไรเพิ่มก็รีบแจ้งเลยนะคะ!"
41090-46 = "นี่เป็นเรื่องใหญ่เลยค่ะ แค่มีเด็กเกเรติดอาวุธก็ว่าหนักแล้ว นี่ยังมีคนไร้บ้านติดอาวุธอีก..."
41090-47 = "ขืนเป็นแบบนี้ คนที่จะงานเข้าที่สุดคงเป็นผู้รับผิดชอบความสงบเรียบร้อยของบ้านเมืองอย่างสถาบัน#nฝึกตำรวจวัลคิรี่ค่ะ อาวุธของเราสู้ไม่ได้หรอกค่ะ"
41090-48 = "เอ๊ะหรือว่า... ใช้เรื่องนี้เป็นข้ออ้างเพื่อขออาวุธทันสมัยสำหรับสำนักรักษาความปลอดภัยดีไหมนะ?"
41090-49 = "[s] \"แบบนั้นไม่น่าจะง่ายหรือเปล่า?\""
41090-50 = "น่าจะอย่างนั้นนะคะ การกำจัดอาชญากรไม่ได้อยู่ในขอบเขตงานของสำนักรักษาความปลอดภัยน่ะค่ะ"
41090-51 = "แถมช่วงนี้สถานการณ์ทางการเงินของโรงเรียนก็ไม่ค่อยดี อย่าว่าแต่อาวุธดีๆ เลยค่ะ แค่ซื้อกระสุนปืนยังยากเลย..."
41090-52 = "แต่ไม่เป็นไรหรอกค่ะ ถึงต้องสู้มือเปล่า ฉันก็จะป้องกันความปลอดภัยของพลเมืองให้ได้ค่ะ"
41090-53 = "และถ้าฉันได้ย้ายไปสำนักความมั่นคงเพราะได้รับความดีความชอบจากผลงานครั้งก่อน ฉันก็จะได้รับ#nอาวุธที่ดีกว่าเดิม..."
41090-54 = "เรียกได้ว่าเป็นโอกาสครั้งใหม่ที่จะทำให้ความยุติธรรมเป็นจริงขึ้นมาค่ะ!"
41090-55 = "[s] \"หวังว่าจะได้ยินข่าวดีนะ\""
41090-56 = "ฮิฮิ ขอบคุณที่เป็นกำลังใจให้นะคะ!"
41090-57 = "ถ้าอย่างนั้นฉันขอไปตะลุยร้านเด็ด..."
41090-58 = "เอ๊ย! ขอไปลาดตระเวนพื้นที่ต่อนะคะ!"
41090-62 = "[ns] ซื้อของจากตลาดแล้วกลับไปยังชาเล่ต์"
41090-66 = "......"
41090-70 = "นี่คุณ..."
41090-71 = "คุณคือคุณครู [USERNAME] ใช่ไหม?"
41090-72 = "[s] \"ใช่ แล้วคุณคือ...\""
41090-74 = "ฉันมีธุระจะคุยกับคุณ"
41090-75 = "ช่วยตามมาสักครู่นะ"
41090-82 = "[ns] \"นี่มัน... ยาสลบเหรอ?!\""
41090-91 = "(ทันทีที่สูดควันยาสลบจากคนน่าสงสัย ภาพตรงหน้าครูก็เริ่มเลือนราง...)"
41090-95 = "(แล้วก็หมดสติไป)"
41090-97 = "ตอนต่อไป;การไม่เป็นเจ้าของและข้าวกล่องหน้าเนื้อย่าง"

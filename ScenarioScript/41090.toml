[translation]
41090-1 = "第9話;悄悄接近的黑影"
41090-2 = "兔寶寶公園附近．市場"
41090-4 = "（來到附近的市場買東西）"
41090-5 = "啊，老師……！？"
41090-10 = "沒想到會在這種地方見面，真巧呢！"
41090-11 = "[s1] 「啊，桐乃。辛苦了。」\n[s2] 「這裡也要巡邏？」"
41090-12 = "是的，就是那樣！今天也為了市民的安全！"
41090-13 = "是的，就是那樣！今天也為了市民的安全！"
41090-14 = "而且這一帶，有很多好吃的攤販……"
41090-15 = "那間肉販的豬排三明治特別好吃，不管買什麼總是會附贈剛炸好的可樂餅……！"
41090-19 = "當，當然，並不是只有這個目的！這一帶也有不良分子在徘徊……！"
41090-20 = "[s] 「我知道桐乃總是很努力，辛苦了。」"
41090-21 = "啊，啊哈哈哈……"
41090-22 = "話說回來，關於前幾天在公園引起騷動的SRT學生們，聽說「後續處分全權交給夏萊」……"
41090-23 = "在那之後都還好嗎？希望沒有發生什麼問題。"
41090-24 = "例如用槍或陷阱威嚇老師，搶奪食物……"
41090-25 = "或是提出什麼不得了的要求，或是到處大鬧……！"
41090-26 = "[s3] 「沒，沒問題……嗯。」\n[s4] 「大家都是好孩子。」"
41090-27 = "是這樣嗎，那就太好了。"
41090-28 = "是這樣嗎，那就太好了。"
41090-29 = "因為她們有能力引起示威對抗女武神，我還擔心會不會有危險……"
41090-30 = "不愧是老師呢！"
41090-31 = "為了成為像老師一樣優秀的大人，本官今天也要精進自己！"
41090-32 = "[s] 「嘛，我也沒有凡事都進行得很順利呢……」"
41090-33 = "啊，是那樣啊。如果有什麼事情，請隨時聯絡本官或女武神警察學園。"
41090-34 = "我們會為了市民的安全，全年無休24小時行動！"
41090-35 = "啊，話說最近這一帶有個奇怪的傳聞。來此巡邏也是因為這原因……"
41090-36 = "[s] 「傳聞……？」"
41090-37 = "是。聽說這一帶，似乎有武裝遊民集團在徘徊。"
41090-38 = "是個穿著破舊服裝，居無定所的集團……"
41090-39 = "隨身攜帶不知道從哪裡入手的強大火力，讓各位市民人心惶惶。"
41090-40 = "還聽說他們前幾天，闖進港灣地帶偷竊廢材。"
41090-41 = "到底是有什麼目的呢……？"
41090-42 = "[s] 「嗯嗯……？」"
41090-43 = "老師？您有什麼頭緒嗎？"
41090-44 = "[s] 「不，應該是我想錯了……」"
41090-45 = "是這樣嗎。如果知道了什麼的話，請您聯絡本官！"
41090-46 = "不過話說回來，除了之前的SRT，竟然還有「持有強大火力的遊民集團」……"
41090-47 = "感覺這樣下去，女武神警察學園的武裝看起來就好像很貧弱一樣。"
41090-48 = "不如女武神也趁這個機會，換成最新型槍械好了……"
41090-49 = "[s] 「原來如此？」"
41090-50 = "就算這麼但也很難吧……再說生活安全局的基本業務，並不包含壓制犯罪者……"
41090-51 = "更何況女武神整體的財政狀況似乎不太好……就連子彈的補給都很辛苦。"
41090-52 = "不過請放心，一旦有緊急狀況，就算是赤手空拳，本官也會保護市民的安全的！"
41090-53 = "而且因為上次的功績，也許可以轉調警備局也說不定……"
41090-54 = "本官接下來也會繼續努力！"
41090-55 = "[s] 「嗯，我支持你。」"
41090-56 = "謝謝您！這也是多虧了老師！"
41090-57 = "那麼本官就繼續美……"
41090-58 = "不，回去巡邏了！"
41090-62 = "[ns] 買好東西回去夏萊"
41090-66 = "……"
41090-70 = "……那邊那位。"
41090-71 = "是[USERNAME]老師嗎？"
41090-72 = "[s] 「是我沒錯……」"
41090-74 = "我有事找你。"
41090-75 = "你願意跟我來吧？"
41090-82 = "[ns] 「這是，麻醉……！？」"
41090-91 = "（吸入對方釋放的煙霧，眼前一片朦朧……）"
41090-95 = "（意識沉入了黑暗之中）"
41090-97 = "下一話;無所有和燒肉便當"

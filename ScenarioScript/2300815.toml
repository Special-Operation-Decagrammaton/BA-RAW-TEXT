2300815-1 = "#title;솔직한 마음"
2300815-2 = "#na;(시스터후드의 비품을 구매하기 위해 마리와 함께 쇼핑몰에 왔다.)"
2300815-3 = "#all;hide"
2300815-4 = "3;마리;04;후아…… 짐이 생각보다 많네요……\n#3;em;[땀]\n#3;stiff\n#3;a"
2300815-5 = "3;마리;04;바자회 용품 준비, 제의에 사용할 도구들, 봉사활동에 필요한 물품에 이번 달 간식까지……"
2300815-6 = "[s] \"응, 같이 오길 잘했네.\""
2300815-7 = "3;마리;00;그러게요. 선생님께 도움을 요청드리지 않았다면 큰일 날 뻔했어요."
2300815-8 = "3;마리;03;매번 감사할 따름이네요.\n#3;greeting\n#3;em;[반짝]"
2300815-9 = "[s] \"항상 마리가 이렇게 준비하는 거야?\""
2300815-10 = "3;마리;02;앗, 그렇지는 않아요. 보통 당번을 정해서 돌아가며 하거든요.\n#3;em;[반응]"
2300815-11 = "3;마리;07;그런데 다들 이래저래 바쁘시니, 제가 자청하는 경우가 많긴 하지요."
2300815-12 = "3;마리;01;오늘은 시간 되는 분이 아무도 안 계셔서 저 혼자였지만, 항상 이렇지는 않답니다."
2300815-13 = "[s] \"고생하네…… 마리……\""
2300815-14 = "3;마리;99;후후, 작은 도움이라도 될 수 있다는 사실이 감사할 뿐이죠.\n#3;em;[///]"
2300815-15 = "3;마리;00;그래도 이렇게 큰 쇼핑몰에 오면 주변에 구경할 거리가 많아서, 그것도 나름대로 재미랍니다."
2300815-16 = "3;마리;02;앗, 선생님. 저기 보세요. 귀여운 인형들이 가득하네요.\n#3;em;[반응]"

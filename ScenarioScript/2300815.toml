[translation]
2300815-1 = "จิตใจที่ซื่อตรง"
2300815-2 = "(คุณครูออกมาซื้อของใช้จำเป็นของชมรมซิสเตอร์กับมารีที่ห้างสรรพสินค้า)"
2300815-4 = "ฮู่ว... เยอะกว่าที่คิดอีกนะคะ"
2300815-5 = "ทั้งของใช้สำหรับงานออกร้านประมูลการกุศล อุปกรณ์ที่ใช้ทำพิธี ของจำเป็นสำหรับงานอาสา แล้วก็มีขนมของเดือนนี้..."
2300815-6 = "[s] \"อื้อ ดีแล้วละที่มาด้วยกันน่ะ\""
2300815-7 = "นั่นสินะคะ ถ้าไม่ขอให้คุณครูมาช่วยละก็เป็นเรื่องแน่ๆ เลยค่ะ"
2300815-8 = "ขอบคุณคุณครูที่มาช่วยทุกครั้งเลยนะคะ"
2300815-9 = "[s] \"มารีเป็นคนเตรียมแบบนี้ตลอดเลยเหรอ?\""
2300815-10 = "อ๊ะ ไม่ใช่หรอกค่ะ ปกติเราจะผลัดกันรับผิดชอบค่ะ"
2300815-11 = "แต่ทุกคนก็มีงานยุ่งมากๆ ฉันก็เลยมักอาสาทำให้บ่อยๆ น่ะค่ะ"
2300815-12 = "วันนี้คนที่ว่างอยู่มีแค่ฉันคนเดียว แต่ก็ไม่ได้เป็นแบบนี้เสมอหรอกค่ะ"
2300815-13 = "[s] \"เหนื่อยแย่เลยนะ มารี...\""
2300815-14 = "ฮุฮุ ถ้าฉันทำประโยชน์ให้ทุกคนได้นิดหน่อยก็ดีใจแล้วละค่ะ"
2300815-15 = "แล้วอีกอย่าง ถ้ามาที่ห้างสรรพสินค้าใหญ่ๆ แบบนี้ก็มักจะมีอะไรให้ชมเยอะแยะด้วย เพราะงั้นฉันเองก็#nค่อนข้างสนุกเหมือนกันค่ะ"
2300815-16 = "อ๊ะ คุณครู ดูนั่นสิคะ มีตุ๊กตาน่ารักๆ เต็มเลยค่ะ"
2300815-17 = "ตรงนั้นก็มีร้านเสื้อผ้าสวยๆ..."
2300815-18 = "เครื่องประดับตรงนี้ก็น่ารักมากเลยค่ะ..."
2300815-19 = "[ns] (เพิ่งเคยเห็นมารีเป็นแบบนี้เลยแฮะ...)"
2300815-20 = "นี่! พวกคุณสองคนน่ะ! ดูเข้ากันได้ดีมากๆ เลยนะ"
2300815-21 = "เอ๊ะ เอ่อ... หมายถึงพวกเราเหรอคะ?"
2300815-22 = "แล้วตรงนี้มีคนอื่นนอกจากพวกเธออีกรึไงล่ะ? คิกคิกคิก"
2300815-23 = "ลองแวะมาดูของในร้านเราก่อนสิ! มีเครื่องประดับน่ารักๆ เยอะเลยนะ!"
2300815-24 = "คะ... เครื่องประดับ..."
2300815-25 = "ของยอดฮิตติดแฟชั่นใหม่ๆ ทั้งนั้นเลย! เดี๋ยวฉันจะลดให้เยอะๆ เลย!"
2300815-26 = "[ns] \"ไปเลือกดูก่อนมั้ย?\""
2300815-28 = "คะ?! อ่า... เครื่องประดับน่ะเหรอคะ?"
2300815-29 = "[s1] \"ครูอยากให้เป็นของขวัญที่มารีขยันน่ะ\"\n[s2] \"เลือกอันที่ชอบได้เลย\""
2300815-32 = "อ๊ะ อ่า..."
2300815-38 = "มะ... ไม่ดีกว่าค่ะ"
2300815-42 = "อะแฮ่ม... ขอบคุณสำหรับคำพูดและน้ำใจค่ะ..."
2300815-43 = "แต่ในฐานะซิสเตอร์คนหนึ่ง ฉันควรจะต้องหลีกเลี่ยงเครื่องประดับฟุ่มเฟือยที่ไม่จำเป็นให้มากที่สุดค่ะ..."
2300815-44 = "นะ... แน่นอนว่าจริงๆ พอเห็นเครื่องประดับสวยๆ... แล้วฉันก็รู้สึกอยากได้..."
2300815-45 = "[s] \"แต่มารีใช้เข็มกลัดติดหน้าอกอยู่นี่นา?\""
2300815-46 = "อ่า... มะ... หมายถึงอันนี้เหรอคะ?"
2300815-50 = "เข็มกลัดติดหน้าอกอันนี้..."
2300815-51 = "ฉันซื้อมาเพื่อใช้เป็นเครื่องเตือนตัวเองไม่ให้ลืมคำปฏิญาณตนในฐานะซิสเตอร์ค่ะ"
2300815-52 = "เพื่อไม่ให้ลืมความตั้งใจตั้งแต่แรกของตัวเอง เหมือนกับดอกไม้สีขาวที่ไม่เหี่ยวเฉานี้ค่ะ..."
2300815-53 = "[s] \"อย่างนี้นี่เอง...\""
2300815-58 = "คุณครู... ฉันขอพูดอะไรสักหน่อยได้มั้ยคะ?"
2300815-59 = "[s] \"ได้อยู่แล้ว\""
2300815-63 = "ถึงที่นี่จะไม่ใช่ห้องสารภาพบาป... แต่ยังไงฉันก็คิดว่าควรจะพูดความจริงออกไปค่ะ..."
2300815-64 = "ที่จริงแล้วเข็มกลัดติดหน้าอกอันนี้..."
2300815-65 = "ฉะ... ฉันซื้อมาแค่เพราะว่ามันสวยดีค่ะ..."
2300815-66 = "[s] \"หืม?\""
2300815-67 = "ไม่ได้มีจุดประสงค์เพื่อเตือนใจตัวเองอะไรเลยค่ะ...!!"
2300815-68 = "ฉะ... ฉันซื้อมาแค่เพราะว่ามันสวยดี..."
2300815-72 = "อย่างที่บอกไปเมื่อกี้ค่ะ ข้อควรปฏิบัติของซิสเตอร์คือความเรียบง่ายและความซื่อสัตย์..."
2300815-73 = "ที่จริงแล้วก็ไม่ใช่ว่าฉันไม่สนใจเรื่องเครื่องประดับ... บางครั้งฉันเองก็อยากแต่งตัวน่ารักๆ เหมือนนักเรียนคนอื่นๆ บ้างเหมือนกัน..."
2300815-74 = "พะ... เพราะงั้นก็เลยติดเข็มกลัดติดหน้าอกอันนี้ค่ะ..."
2300815-75 = "เฮ้อ... ทั้งที่ยังมีความโลภทางโลกแบบนี้อยู่... แต่กลับแก้ตัวไปน้ำขุ่นๆ..."
2300815-76 = "ฉันไม่มีคุณสมบัติของซิสเตอร์เลยค่ะ..."
2300815-77 = "......"
2300815-78 = "แต่พอได้บอกความจริงกับคุณครูแล้วก็รู้สึกสบายใจขึ้นนิดหน่อยค่ะ"
2300815-79 = "[s] \"เข็มกลัดติดหน้าอกเป็นของฟุ่มเฟือยที่สุดที่มีสินะ...\""
2300815-80 = "ค่ะ...มันเป็นของที่ฉันเลือกมาแล้วก็รู้สึกกังวลว่ามันจะเป็นการทำบาปรึเปล่า..."
2300815-81 = "คุณครู... คิดยังไงเหรอคะ...? ผิดหวังในตัวฉัน... รึเปล่าคะ?"
2300815-82 = "[s] \"หึหึ น่ารักจัง...\" "
2300815-83 = "คะ... คะ?!"
2300815-84 = "[s3] \"ครูคิดว่าแค่นี้ไม่เป็นไรหรอกนะ\"\n[s4] \"ครูเคยบอกไปแล้วนี่นาว่าซิสเตอร์ก็เป็นนักเรียนน่ะ\""
2300815-87 = "ยะ... อย่างนั้นเหรอคะ ถ้าแค่นี้ไม่เป็นไรใช่มั้ยคะ..."
2300815-88 = "[s5] \"ก็ยังเป็นนักเรียนอยู่นี่นา...\"\n[s6] \"ยังเป็นนักเรียนอยู่นี่นาก็ต้องชอบของน่ารักๆ อยู่แล้ว\""
2300815-91 = "อย่างนั้นเหรอคะ..."
2300815-92 = "พอได้ยินคุณครูพูดแบบนี้... ฉันก็ค่อยโล่งใจขึ้นมานิดหน่อยค่ะ"
2300815-93 = "อะไรเป็นเรื่องทั่วไป และอะไรไม่ใช่เรื่องทั่วไป..."
2300815-94 = "ฉันเองก็ยังแยกแยะได้ไม่ค่อยดีเท่าไรเลยค่ะ ฮุฮุ"
2300815-95 = "ยังไงก็ขอบคุณสำหรับความใส่ใจของคุณครูนะคะ"
2300815-96 = "แต่สำหรับฉัน... แค่เข็มกลัดติดหน้าอกอันนี้ก็เพียงพอแล้วค่ะ"
2300815-97 = "[s] \"งั้นครูเลี้ยงของอร่อยๆ ให้แทนเครื่องประดับดีมั้ย?\""
2300815-98 = "จริงๆ เลยนะคะ... คุณครูชอบให้อะไรฉันอยู่เรื่อยเลยนะคะ ทั้งๆ ที่ตอนนี้คุณครูก็ให้อะไรต่ออะไรฉัน#nมาเยอะมากแล้วแท้ๆ..."
2300815-99 = "......"
2300815-106 = "ถ้าอย่างนั้นก็ขอรบกวนด้วยนะคะ"
2300815-108 = "(หลังไปทานอาหารแสนอร่อยกับมารีเสร็จแล้ว คุณครูก็กลับไป)"

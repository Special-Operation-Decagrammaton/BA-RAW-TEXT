[translation]
2300815-1 = "真實的心意"
2300815-2 = "（為了購買修女會所需的物資，和瑪麗一起來到購物中心）"
2300815-4 = "呼……東西比想像中還多呢……"
2300815-5 = "義賣會的用品、禮拜用的工具、志工活動的物品，以及這個月的點心……"
2300815-6 = "[s]「嗯，一起過來是對的。」"
2300815-7 = "就是說呀。#n要是沒拜託老師幫忙就糟了。"
2300815-8 = "真的非常感謝您。"
2300815-9 = "[s]「瑪麗一直都是自己準備的嗎？」"
2300815-10 = "啊，不是的。#n我們通常會排好班表輪流負責。"
2300815-11 = "只不過大家都很忙碌，所以我常常自願幫忙。"
2300815-12 = "今天剛好其他人都有事，所以只能由我一個人來準備……但這種情況並不多。"
2300815-13 = "[s]「真是辛苦你了……瑪麗……」"
2300815-14 = "呵呵，能幫上大家一點小忙，我就心滿意足了。"
2300815-15 = "而且能來到這麼大的購物中心，看見許多值得一逛的店家也挺有趣的。"
2300815-16 = "啊，老師。請看那裡。#n有好多可愛的娃娃呢。"
2300815-17 = "那邊有間漂亮的服飾店……"
2300815-18 = "這裡的飾品也好可愛……"
2300815-19 = "[ns]（好像第一次看見瑪麗的這一面……）"
2300815-20 = "那邊看起來關係很好的兩位！長相都非常出眾呢！"
2300815-21 = "那個……是，是說我們嗎？"
2300815-22 = "當然囉，這裡只有你們兩位不是嗎？呵呵呵。"
2300815-23 = "歡迎來我們店裡看看！有很多漂亮的飾品哦！"
2300815-24 = "飾，飾品……"
2300815-25 = "而且還都是最新流行的商品！我可以幫你們打很高的折扣哦！！"
2300815-26 = "[ns]「要挑看看嗎？」"
2300815-28 = "咦！？挑，挑飾品嗎？"
2300815-29 = "[s1]「瑪麗平常總是很努力，我想送你一點禮物。」\n[s2]「挑你喜歡的吧。」"
2300815-32 = "啊，唔嗯……"
2300815-38 = "沒，沒關係。"
2300815-42 = "那個……我很感謝老師的讚美和心意……"
2300815-43 = "但我身為一名修女，必須盡可能避免不必要的打扮與奢侈的享受……"
2300815-44 = "當，當然，看見這麼多漂亮的飾品……我也確實會萌生想要的心情……"
2300815-45 = "[s]「不過你不是有別頭飾嗎？」"
2300815-46 = "啊……您說的是這個嗎……"
2300815-50 = "這朵花……"
2300815-51 = "是為了避免忘記修女會的誓言而買的。"
2300815-52 = "時刻提醒自己要像這朵永不凋謝的白花一般，切勿忘記自己的初衷……#n這就是它所帶有的含意……"
2300815-53 = "[s]「原來如此……」"
2300815-58 = "老師……我可以跟您說實話嗎？"
2300815-59 = "[s]「儘管說。」"
2300815-63 = "雖然這裡不是告解室……但我還是覺得應該老實跟您說……"
2300815-64 = "這朵花……"
2300815-65 = "其，其實是因為漂亮才買的……"
2300815-66 = "[s]「嗯？」"
2300815-67 = "當然希望能在看到它時想起初心也是原因之一……！！"
2300815-68 = "但實際上……只是因為看它漂亮才會買下來……"
2300815-72 = "就像剛才跟您提過的一樣，修女必須具備簡樸和節儉的品德……"
2300815-73 = "但我其實並非對飾品沒興趣……也有想跟其他學生一樣打扮自己的心情……"
2300815-74 = "因，因此才會別上這朵花……"
2300815-75 = "唉……不只擁有這麼世俗的慾望……甚至還為此尋找理由……"
2300815-76 = "我真是名不合格的修女……"
2300815-77 = "……"
2300815-78 = "不過坦白告訴老師之後，心裡似乎稍微舒坦了一些。"
2300815-79 = "[s]「你最大的奢侈就是那朵花啊……」"
2300815-80 = "是的……這是我在思考過算不算罪惡後，挑選出來的物品……"
2300815-81 = "老，老師您……是怎麼想的呢？#n……對我感到失望了嗎？"
2300815-82 = "[s]「呵呵，真可愛……」 "
2300815-83 = "咦，咦咦！？"
2300815-84 = "[s3]「我覺得這種程度沒關係的。」\n[s4]「之前也跟你說過，瑪麗不僅是修女也是學生。」"
2300815-87 = "是，是嗎……這樣真的沒關係嗎……"
2300815-88 = "[s5]「你也正值青春年華。」\n[s6]「所以喜歡打扮自己和可愛的東西都是理所當然的。」"
2300815-91 = "這樣啊……"
2300815-92 = "……聽見老師這麼說，我也比較放心了。"
2300815-93 = "雖然理所當然的判斷標準……"
2300815-94 = "對我來說還有點困難就是了。呵呵。"
2300815-95 = "總之，老師的好意我心領了。"
2300815-96 = "對我而言，有這朵花就已經足夠了。"
2300815-97 = "[s]「那麽作為代替，我請你吃點好吃的東西吧？」"
2300815-98 = "真是的……老師您總是那麼為我付出。#n明明已經受了您很多的幫助……"
2300815-99 = "……"
2300815-106 = "那我就恭敬不如從命囉。"
2300815-108 = "（於是與瑪麗一起享用了美味的一餐後，回到了夏萊）"

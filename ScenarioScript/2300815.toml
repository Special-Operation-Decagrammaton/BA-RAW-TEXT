[translation]
2300815-1 = "Honest Feelings"
2300815-2 = "I met up with Mari at the shopping mall, to help her buy supplies for the Sisterhood."
2300815-4 = "Wow. This is quite the list."
2300815-5 = "Bake sale, philanthropy, and outreach supplies...as well as this month's snacks."
2300815-6 = "[s] \"Yup. It's a good thing we came together.\""
2300815-7 = "Absolutely. It would have been rather difficult without your assistance."
2300815-8 = "As usual, you have my gratitude."
2300815-9 = "[s] \"Do you always have to run these errands, Mari?\""
2300815-10 = "Ah, no! Not at all. We have a rotating system."
2300815-11 = "However, I volunteer quite often, as everyone has rather busy schedules."
2300815-12 = "I'm not usually alone, but no one else was available today."
2300815-13 = "[s] \"You really are a hard worker, Mari.\""
2300815-14 = "Heehee. I'm always grateful whenever I can lend a hand, however small the task may be."
2300815-15 = "Big malls like this one always have much to see, so it can actually be rather fun!"
2300815-16 = "Over there, for example. Look at those adorable dolls, Sensei!"
2300815-17 = "And that store has beautiful clothes."
2300815-18 = "These accessories are quite cute as well."
2300815-19 = "[ns] \"(I've never seen this side of Mari before.)\""
2300815-20 = "You two! You're having a great time together, aren't you?"
2300815-21 = "E-Eek? A-A-Are you speaking to us?"
2300815-22 = "Do you see anyone else around? Hohoho!"
2300815-23 = "Come take a look at our accessories! All the girls love them!"
2300815-24 = "A-Accessories..."
2300815-25 = "They're all the rage these days! C'mon! I'll even give you a discount!"
2300815-26 = "[ns] \"Why don't you pick something out?\""
2300815-28 = "Eh?! M-Me? An accessory?!"
2300815-29 = "[s1] \"I want to get you something, for always working so hard.\"\n[s2] \"Just choose one that you like!\""
2300815-32 = "A-Ah...."
2300815-38 = "I-I can't."
2300815-42 = "U-Um... I truly appreciate your thoughts and feelings, but..."
2300815-43 = "As a Sister, I cannot indulge in unnecessary extravagances and luxuries..."
2300815-44 = "O-Of course, the accessories here are very pretty, and I must admit that I would love to have one, but..."
2300815-45 = "[s] \"But what about the corsage you're wearing?\""
2300815-46 = "Ah... Y-You mean, this...?"
2300815-50 = "This corsage..."
2300815-51 = "I purchased this as a reminder to never forget the vows of the Sisterhood."
2300815-52 = "I wanted to encapsulate the feelings I had when I embarked on this journey, with this white flower that would never wither."
2300815-53 = "[s] \"I see...\""
2300815-58 = "...Sensei... May I speak freely?"
2300815-59 = "[s] \"With me, you always can.\""
2300815-63 = "This may not be a confession booth, but I still feel compelled to honesty."
2300815-64 = "This corsage..."
2300815-65 = "I-I...did buy it thinking that it was pretty."
2300815-66 = "[s] \"Hm?\""
2300815-67 = "Its primary purpose was a reminder to stay true to my heart!"
2300815-68 = "But I also liked the way it looked..."
2300815-72 = "As I mentioned earlier, the virtues of a Sister are frugality and selflessness..."
2300815-73 = "But I still have interest in accessories and the such. Sometimes, I even feel the desire to dress up, as other students do."
2300815-74 = "Wh-Which is why I like wearing this corsage."
2300815-75 = "*sigh* Not only am I giving into my worldly desires, but I'm also making excuses for them..."
2300815-76 = "I should be forced to denounce my vows."
2300815-77 = "..."
2300815-78 = "Although, I do...feel slightly more at ease, having told you my secret."
2300815-79 = "[s] \"So that corsage is a huge luxury to you.\""
2300815-80 = "Yes..."
2300815-81 = "P-Please tell me what you're thinking, Sensei. Are you...disappointed in me?"
2300815-82 = "[s] \"Ugh. So cute...\" "
2300815-83 = "E-Excuse me?!"
2300815-84 = "[s3] \"I think that's completely fine.\"\n[s4] \"I told you last time. You're a Sister AND a student.\""
2300815-87 = "T-Truly? It's...okay?"
2300815-88 = "[s5] \"You're still young, Mari.\"\n[s6] \"There's nothing wrong with dressing up or liking cute things.\""
2300815-91 = "I...I see."
2300815-92 = "I'm so relieved to hear you say that."
2300815-93 = "What's acceptable and what's not..."
2300815-94 = "...it appears I'm still figuring that out. Heehee."
2300815-95 = "For now, I'll simply have to accept and appreciate your words."
2300815-96 = "This one corsage will be enough."
2300815-97 = "[s] \"How about I treat you to something delicious instead, then?\""
2300815-98 = "Truly... You never stop trying to give. Even after I've received so much from you."
2300815-99 = "..."
2300815-106 = "In that case, yes. Please."
2300815-108 = "Mari and I ate a delicious meal together, and then I returned home."

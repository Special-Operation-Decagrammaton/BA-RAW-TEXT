[translation]
2201-1 = "不正經的事業計劃"
2201-2 = "三一學園．商店街"
2201-4 = "哎呀，真的嗎～？"
2201-5 = "真的～就在商店街盡頭那間咖啡廳……"
2201-8 = "哼～……這裡每個人都是一臉天下太平的樣子。"
2201-9 = "而且用字遣詞都一整個「千金大小姐」的感覺。"
2201-10 = "感，感覺大家都閃閃發亮的。 "
2201-11 = "像，像我這種人，真的可以待在這裡嗎……"
2201-12 = "啊，我想到一個好主意。要不要在這大街正中央引發爆炸呀？"
2201-13 = "……這哪叫好主意。"
2201-14 = "別這樣，無月。如果有要我們炸掉三一商店街的委託就另當別論。"
2201-15 = "但今天我們有別的事要處理，引發騷動可不是上策。"
2201-16 = "話說亞瑠醬，這回到底是什麼事情，要突然跑來三一啊？"
2201-17 = "呵呵呵，你們聽了可別嚇到。"
2201-18 = "這你不用擔心～，亞瑠說的話現在已經不會讓我嚇到了。"
2201-19 = "這倒是沒錯。"
2201-20 = "我，我可能會大吃一驚！已，已經做好心理準備了……！ "
2201-21 = "啊……可是亞瑠大人又說不要嚇到……這，這該怎麼辦！？"
2201-22 = "唉唷，你們不要吵啦！"
2201-23 = "咳，總之我們今天來三一的目的呢……"
2201-25 = "是因為這裡有一場創業說明會。"
2201-26 = "創業說明會？ "
2201-27 = "……辦在這種大小姐學園眼皮子底下？"
2201-28 = "沒錯。這是我透過認識的人脈打聽到的消息……"
2201-29 = "亞瑠醬有人脈？"
2201-30 = "……唉，聽起來就不可靠。"
2201-31 = "為，為什麼你們還沒聽就這種反應？！"
2201-32 = "我這個情報絕對可靠！這是上次那個委託人介紹的！"
2201-33 = "那個委託人說了：「我最近有個好消息，但是我只告訴亞瑠社長，記得要保密喔，好嗎？」……"
2201-35 = "這可是在奇普托斯地下社會也只有少數人知道的最高機密！"
2201-36 = "是個只在不法之徒間流傳的祕密事業……！"
2201-37 = "不覺得很不得了嗎？！"
2201-38 = "嗯哼～……既然亞瑠醬覺得OK，那我也沒意見。"
2201-39 = "不，不愧是亞瑠大人！好厲害！"
2201-40 = "哈哈哈，你們可以多誇我一點！"
2201-41 = "多虧我高明的生意手腕，才有辦法獲得如此珍貴的機會！"
2201-42 = "……希望至少不會出什麼麻煩事。"
2201-43 = "好了，趕快去說明會吧！可別遲到了。"
2201-46 = "哇～噢。好多人唷。"
2201-47 = "這些全都是要參加那什麼創業說明會的人嗎？"
2201-48 = "驚人的可不只有人數喔。"
2201-49 = "會來到這裡的企業家，都是地下社會裡屈指可數……在各個領域成功有為的企業家！"
2201-50 = "只要能讓這裡的人記得我們的長相，散播我們的名聲，對我們而言就是很大的收穫了。"
2201-51 = "而且，如果我們能對上台的企業進行投資並獲利……我們便利屋的未來就是彩色的了！"
2201-52 = "啊，有人上台了……"
2201-56 = "首先，請容我在這裡感謝主辦單位，邀請本公司參加今天的創業說明會。"
2201-57 = "我要先強調一下，今天這樣的機會，可是相當難得。"
2201-58 = "各位光是能來到這裡，就可說是相當幸運了。"
2201-59 = "沒錯，今天在場的各位，都是天選之人！"
2201-60 = "喔～……？"
2201-61 = "……？"
2201-62 = "果，果然啊！我們掌握創業關鍵了！"
2201-64 = "好了，別再聊我們公司了，現在就來為各位介紹，"
2201-65 = "本公司將為各位帶來，我們信心十足的產品！ "
2201-66 = "也就是……！"
2201-67 = "（鏘鏘──！）"
2201-68 = "「喀什米爾羊毛製的環保行動電池」！"
2201-70 = "喀什米爾……？"
2201-71 = "環保……？"
2201-72 = "……電池？"
2201-73 = "……？？？"
2201-75 = "這可不是個普通的行動電池！"
2201-76 = "而是利用AI進行深度學習，遴選出最有效率的原料，並大量使用製造……"
2201-77 = "以最高級素材，實現比任何電池都卓越的效能！"
2201-78 = "亞瑠醬，這個東西……"
2201-80 = "……"
2201-81 = "還，還不好說！我們再聽一下……！"
2201-83 = "那個企業家有說了……！"
2201-84 = "當然，本公司將提供的可不只這項產品！"
2201-85 = "本公司為了創造最大收益，將使用獨特的行銷系統……"
2201-86 = "帶來縝密考量避險方針的營運策略……"
2201-87 = "系，系統……避險……（筆記筆記）"
2201-88 = "……"
2201-89 = "時刻緊盯震盪劇烈的奇普托斯經濟指標，同時建立好無論何種狀況都能靈活應對的……"
2201-90 = "經，經濟指標……？"
2201-91 = "（發抖……）"
2201-92 = "……呼。"
2201-93 = "（欸欸……）"
2201-95 = "那麼，我們的說明就到這邊。"
2201-96 = "接下來就是大家期待已久的，能實際投資我們企業的方法……"
2201-97 = "請放心，一點都不複雜。只要各位購買會員卡來加入我們的服務系統就可以了！"
2201-98 = "只要購買會員卡，就能直接使用這套系統！"
2201-100 = "而且現在！只要購買這張500萬圓的會員卡，各位的天使階級就會馬上升級為「熾天使」！"
2201-101 = "各位客戶立刻就能率領100名天使了！"
2201-102 = "灌水也灌太多！？先是跟老鼠會沒兩樣的可疑業務，現在又給我扯宗教！！！"
2201-103 = "啊哈哈哈！亞瑠醬你終於吐槽了！"
2201-104 = "你終於承認這是老鼠會了，啊哈哈！"
2201-105 = "唉……社長，告訴你這地方的那個人……"
2201-106 = "我知道了啦！別再說了！！"
2201-107 = "那個，需要我把那位熟人除掉嗎？"
2201-108 = "嗚嗚……"
2201-109 = "一開始聽到創業說明會要辦在三一附近，我就猜到會這樣了。"
2201-110 = "感覺就是要欺騙那些不諳世事的千金大小姐。"
2201-111 = "噗哈哈哈！！人家明明是要釣大小姐，結果卻釣到亞瑠醬……！噗噗噗！"
2201-112 = "我很相信耶……人家說只告訴我，害我很相信耶……！"
2201-113 = "竟然敢，恩將仇報！！！"
2201-115 = "那，那邊幾位客人？請問有什麼事嗎？"
2201-116 = "我們單純秉持著健全的事業計畫，要提供機會給各位……"
2201-117 = "夠了。"
2201-118 = "竟敢浪費我們寶貴的時間。"
2201-119 = "客，客人，您這是……？這可是絕無僅有的機會啊……！"
2201-120 = "讓我們一起在此抓住夢想與希望……！"
2201-123 = "（緊抓）"
2201-124 = "咦，不是，要抓的不是我的肩膀，而是機會……"
2201-125 = "遙香。"
2201-128 = "是，是！"
2201-129 = "動手。"
2201-131 = "是！"
2201-132 = "一切遵從亞瑠大人的命令！"
2201-134 = "呃啊啊？！你，你們在做什麼？！"
2201-135 = "居，居然敢浪費亞瑠大人寶貴的時間……！全部，全部消失吧！！"
2201-136 = "……居敢企圖敲詐我們便利屋。"
2201-137 = "搞個不好，我們便利屋的資金就會被你巧妙的話術給全部騙走了！"
2201-138 = "亞瑠醬好誠實喔。"
2201-139 = "別說了啦！無月！佳世子！"
2201-141 = "反正我也開心夠了，開始吧！"
2201-142 = "唉……沒辦法了。"
2201-144 = "全都給我滅了！！"
2201-153 = "我們是實現正義部！ "
2201-154 = "我們接獲通報顯示，這裡正在舉辦一場非法創業說明會！"
2201-155 = "因此前來查緝！"
2201-156 = "……？"
2201-157 = "……沒有人在耶？"
2201-161 = "好險啊～，三一的實現正義部竟然也來了！"
2201-162 = "她們跟風紀委員會一樣麻煩……最好還是不要給她們碰到。"
2201-163 = "不過要是碰上了，我們家的風紀委員長的表情八成會扭成一團吧，感覺那樣也挺好玩的～"
2201-164 = "那，那要去嗎？只要亞瑠大人吩咐，我會全部……！"
2201-167 = "呃啊啊！你們不要把事情鬧大啦！"
2201-168 = "哈……"
2201-169 = "好，今天這事已經結束了！"
2201-170 = "我以後絕對不會再相信，任何熟人沒頭沒腦推薦的事業了！"
2201-171 = "我們不需要依賴別人，我們要親手壯大自己的事業！！"
2201-172 = "啊哈，這才是亞瑠醬～！"
2201-173 = "唉……我就知道會變成這樣。"
2201-174 = "好了，我們快撤吧！"
2201-178 = "是，是！"
2201-180 = "（於是，便利屋就像是要躲避實現正義部一般，奔馳在三一地區夜晚的街上）"
2201-181 = "不正經的事業計劃"

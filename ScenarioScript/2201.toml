[translation]
2201-1 = "A Shady Business Plan"
2201-2 = "Trinity Shopping District"
2201-4 = "Hahaha! Really?"
2201-5 = "Yes! At the dessert shop at the end of the shopping district..."
2201-8 = "Hmph! Everyone around here is so carefree."
2201-9 = "They must be the epitome of femininity."
2201-10 = "Th-They look like they're glowing!"
2201-11 = "C-Can someone like me even be here?"
2201-12 = "Hahaha. Wouldn't it be fun to blow up a bomb right in the middle of this place?"
2201-13 = "*shakes head*"
2201-14 = "Not unless an order came in to blow up the middle of Trinity's streets."
2201-15 = "Come on, Mutsuki. We came here on business today."
2201-16 = "What business do we have in the Trinity district, Aru?"
2201-17 = "Heehee. I'll tell you, but don't be too surprised."
2201-18 = "It's fine. I'm hardly ever surprised by anything you say."
2201-19 = "All right."
2201-20 = "I like surprises! I'm totally ready! "
2201-21 = "Oh wait...you don't want me to be surprised... Uh, then what should I do?"
2201-22 = "Ugh! It doesn't matter!"
2201-23 = "*clears throat* Anyway, I'll tell you why we came to Trinity today."
2201-25 = "We are here for a new business presentation."
2201-26 = "What?! A business presentation? "
2201-27 = "Why is something like that happening at Trinity?"
2201-28 = "Well, I heard about it from a connection I have..."
2201-29 = "A connection?"
2201-30 = "*pouts*"
2201-31 = "Why do you guys look so unhappy about this?!"
2201-32 = "This is solid information! The client I got to know through the last request said..."
2201-33 = "\"There's a good business opportunity here. I won't tell this to anyone else but you, Aru. Got it?\""
2201-35 = "This is top-secret information, available only to the deepest inner circles of Kivotos!"
2201-36 = "It's a business secret shared among outlaws..."
2201-37 = "Isn't that amazing?!"
2201-38 = "Hmm... If Aru says so, then it must be true."
2201-39 = "Yeah, it's amazing, Boss!"
2201-40 = "...Well?! Don't be shy! Compliment me more!"
2201-41 = "It was all thanks to my great business skills that I was able to score a valuable opportunity like this!"
2201-42 = "...I just hope this doesn't become too annoying."
2201-43 = "Let's hurry and get to the presentation! We can't be late!"
2201-46 = "Wow, there are so many people."
2201-47 = "So, are all these people here for the business presentation?"
2201-48 = "Some \"rare\" opportunity..."
2201-49 = "The businesspeople gathered here are said to be the best in their field... They're incredibly successful entrepreneurs!"
2201-50 = "If we can network and get our names out there, it'll definitely pay off for us."
2201-51 = "And if we can secure some business investments, Problem Solver could grow even more."
2201-52 = "Look, someone walked up to the podium..."
2201-56 = "First of all, I would like to thank all of the CEOs who are attending our business presentation today."
2201-57 = "These kinds of opportunities don't come every day."
2201-58 = "I can tell you, without hesitation... "
2201-59 = "...that you are the chosen ones!"
2201-60 = "Hmm... You don't say?"
2201-61 = "Really?"
2201-62 = "Oh! I knew it! I knew this was a special opportunity!"
2201-64 = "Now, allow me to introduce..."
2201-65 = "...our latest and greatest achievement!"
2201-66 = "It's the..."
2201-67 = "(Ta-da!)"
2201-68 = "Eco-Pride Cashmere Battery!"
2201-70 = "Eco..."
2201-71 = "Cashmere...?"
2201-72 = "...Battery?"
2201-73 = "...?"
2201-75 = "Note that this item is no mere battery!"
2201-76 = "Created from natural materials extracted using the most efficient methods available with deep learning AI..."
2201-77 = "...we've made a stunning achievement in creating a product that is more efficient than any other battery in the world, and using eco-friendly materials at that!"
2201-78 = "Oh, Aru, I think this is..."
2201-80 = "... "
2201-81 = "No, wait! Let's listen a little longer! "
2201-83 = "The most successful businessperson I know assured me of this!"
2201-84 = "In addition, what we're offering here goes beyond just this item!"
2201-85 = "We want to maximize your profits using a well-established marketing system..."
2201-86 = "...with a business strategy that fully considers hedging risks..."
2201-87 = "*taking notes* System... Hedging risks..."
2201-88 = "..."
2201-89 = "We have laid the foundation to flexibly respond to any situation, while carefully monitoring the Kivotos economic curve and its large fluctuations..."
2201-90 = "Kivotos...curve?"
2201-91 = "*shake*"
2201-92 = "Hmm..."
2201-93 = "*shocked*"
2201-95 = "So, that's the explanation..."
2201-96 = "Now, let's talk about how you can invest in our business."
2201-97 = "It's not hard at all. All you need to do is purchase a membership card to join our system."
2201-98 = "Yes, you can become a part of the system simply by purchasing a membership card!"
2201-100 = "Here, if you purchase this 5-million-yen membership card, you'll immediately be promoted to the Sephiroth rank!"
2201-101 = "And lucky customers get an immediate bonus of one hundred angels!"
2201-102 = "Ugh! It's like a cult mixed with a pyramid scheme!"
2201-103 = "Haha! Now you can't deny it any longer, Aru!"
2201-104 = "You just admitted that this business is a pyramid scheme!"
2201-105 = "*sigh* ...Boss. That businessperson you mentioned..."
2201-106 = "...I know! I don't wanna talk about it!"
2201-107 = "Uh, do you want me to get rid of that acquaintance of yours?"
2201-108 = "*looking sad*"
2201-109 = "I was wondering what kind of a business presentation would take place near Trinity General School."
2201-110 = "They targeted girls without any street smarts!"
2201-111 = "Haha! I can't believe you got tricked like that! *chuckles*"
2201-112 = "I really trusted them... I was told this was the highest level of info, reserved just for me..."
2201-113 = "How could they take advantage of my trust?!"
2201-115 = "Excuse me? What's all the commotion about?"
2201-116 = "We're here to share a sound business plan to those with an open mind..."
2201-117 = "Stop!"
2201-118 = "How dare you waste my precious time..."
2201-119 = "What's that? What are you talking about, dear customer? This is a very rare opportunity!"
2201-120 = "Grab this opportunity and make your dreams come..."
2201-123 = " *reaches out*"
2201-124 = "Huh? I didn't mean you should literally grab my shoulder!"
2201-125 = "Haruka."
2201-128 = "Yes!"
2201-129 = "Take care of it."
2201-131 = "Heh heh heh!"
2201-132 = "Got it, boss! Anything you say, Aru!"
2201-134 = "Argh?! What are you doing?!"
2201-135 = "How dare you waste Aru's precious time?! Get lost, all of you!"
2201-136 = "...How dare you try to take advantage of Problem Solver! I'll never let that happen!"
2201-137 = "We could have lost all of our funds if we fell for their stupid scheme!"
2201-138 = "You almost got away with it, thanks to Aru."
2201-139 = "Arrrgh! I've had enough! Mutsuki! Kayoko!"
2201-141 = "Hmm... Well, I still had fun. Okay, let's get started!"
2201-142 = "*sigh* I guess we have no choice."
2201-144 = "Everyone! Get them!"
2201-153 = "I'm here from the Justice Task Force! "
2201-154 = "I've heard reports of an illegal business presentation going on here!"
2201-155 = "Well, I'm here!"
2201-156 = "...Wha? What's all this mess?"
2201-157 = "Hmm, Hasumi... There's no one here!"
2201-161 = "I didn't expect Trinity's Justice Task Force to get involved!"
2201-162 = "They can be just as annoying as the Prefect Team. Don't get involved."
2201-163 = "Well, as long as we can piss off the head prefect, then I'm satisfied."
2201-164 = "J-Just tell me what to do! I'll take care of everything...!"
2201-167 = "Argh! I hate when things get complicated!"
2201-168 = "Ugh..."
2201-169 = "We're done here today, but mark my words...this will never happen again!"
2201-170 = "I'll never trust some random acquaintance's vague business advice again!"
2201-171 = "I'm going to take matters into my own hands and make my business successful!"
2201-172 = "Ahaha! That's our Aru!"
2201-173 = "*sigh* ...I knew something like this was gonna happen."
2201-174 = "Everyone... Retreat!"
2201-178 = "Y-Yeah!"
2201-180 = "Narrowly avoiding the Justice Task Force, Problem Solver raced through the Trinity district streets in the middle of the night."
2201-181 = "A Shady Business Plan"

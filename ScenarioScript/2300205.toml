[translation]
2300205-1 = "Radio Workout"
2300205-2 = "Schale House"
2300205-3 = "I was sleeping in on my day off, when..."
2300205-5 = "It's time for the radio workout!"
2300205-6 = "Sensei! Hurry up and get up!"
2300205-7 = "[s] \"Can't you let me rest on my days off...\""
2300205-8 = "No! If you insist on sleeping every minute of your off-time, you'll become a cow."
2300205-9 = "You may feel sluggish now, but once you move your body you'll feel much better!"
2300205-11 = "...And if you keep being lazy, I'll give you a big kick in the butt!"
2300205-12 = "[s] Reluctantly get out of bed."
2300205-14 = "Now let's start the radio workout! Follow the rhythm and do as I do!"
2300205-15 = "First is stretching! One, two!"
2300205-16 = "Not like that, Sensei! Stretch out your arms and put them next to your head!"
2300205-17 = "If you do it half-heartedly, I won't give you a gold star."
2300205-18 = "Now, from the beginning! One, two!"
2300205-20 = "Afterwards, Hanae and I did the radio workout together."

[translation]
2300205-1 = "#title;라디오 체조"
2300205-2 = "#place;샬레 하우스"
2300205-3 = "#na;모처럼의 휴일을 맞아 침실에서 늦은 아침까지 늦잠을 자고 있던 중에……."
2300205-4 = "3;하나에;01\n#3;a\n#wait;1500"
2300205-5 = "3;하나에;00;라디오 체조의 시간입니다!\n#3;closeup\n#3;em;[!]"
2300205-6 = "3;하나에;02;선생님! 침대 위에서 늦장 부리지 말고 어서 일어나세요!\n#3;hophop\n#3;closeup"
2300205-7 = "#all;hide\n[s] \"휴일에는 좀 더 쉬게 해줘…….\""
2300205-8 = "3;하나에;05;안 돼요. 휴일이라고 늦잠만 주무시면 진짜 소가 되어버리고 만다고요.\n#3;em;[!]\n#3;stiff"
2300205-9 = "3;하나에;00;지금은 귀찮게 느껴져도 일단 몸을 움직이면 훨씬 더 개운해질 거예요!"
2300205-10 = "#all;hide"
2300205-11 = "3;하나에;05;……자꾸 게으름 피우시면 엉덩이에 커다란 주사를 놓을 거예요!\n#3;hophop\n#3;closeup\n#3;em;[빠직]"
2300205-12 = "[s] 마지못해 침대에서 일어난다."
2300205-13 = "#all;hide"
2300205-14 = "3;하나에;00;자, 그럼 라디오 체조 시작할게요! #n리듬에 맞춰 잘 따라하세요!\n#3;greeting\n#3;em;[음표]\n#3;a"
2300205-15 = "3;하나에;01;우선은 발돋움 운동부터! 하나, 둘!\n#3;hophop"
2300205-16 = "3;하나에;05;그렇게 하면 안 돼요, 선생님! #n양팔을 더 곧게 뻗어 머리에 제대로 붙이셔야죠!\n#3;em;[반응]"
2300205-17 = "3;하나에;05;건성으로 따라 하시면 착한 아이 도장, 안 찍어드릴 거에요?"
2300205-18 = "3;하나에;02;자, 처음부터 다시! 하나, 둘!\n#3;hophop\n#3;em;[반짝]"
2300205-19 = "#all;hide"
2300205-20 = "#na;이후 하나에와 함께 구령에 맞추어 라디오 체조를 했다."

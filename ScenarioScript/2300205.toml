[translation]
2300205-1 = "ทำกายบริหาร"
2300205-2 = "บ้านพักของชาเล่ต์"
2300205-3 = "ระหว่างที่กำลังนอนตื่นสายอยู่ที่ห้องนอนในวันหยุด..."
2300205-5 = "ได้เวลาทำกายบริหารแล้วค่ะ!"
2300205-6 = "คุณครู! อย่ามัวแต่นอนขี้เกียจอยู่บนเตียงสิคะ ตื่นเร็วเข้าค่ะ!"
2300205-7 = "[s] \"วันหยุดอย่างนี้ ขอพักต่ออีกหน่อยนะ...\""
2300205-8 = "ไม่ได้ค่ะ ถ้ามัวแต่นอนในวันหยุด เดี๋ยวก็สันหลังยาวหรอกนะคะ"
2300205-9 = "ถึงตอนนี้จะรู้สึกรำคาญ แต่ถ้าได้ขยับร่างกายแล้วล่ะก็ จะทำให้รู้สึกสดชื่นขึ้นมากเลยค่ะ!"
2300205-11 = "...ถ้ายังขี้เกียจอยู่ ฉันจะฉีดยาเข็มใหญ่เข้าที่ก้นนะคะ!"
2300205-12 = "[s] ลุกขึ้นจากเตียงอย่างไม่เต็มใจ"
2300205-14 = "เอาล่ะ งั้นเรามาเริ่มทำกายบริหารกันเลยค่ะ! ทำตามฉันให้ตรงจังหวะนะคะ!"
2300205-15 = "ก่อนอื่นเริ่มจากยืนด้วยปลายเท้า! หนึ่ง สอง!"
2300205-16 = "ทำอย่างนั้นไม่ได้ค่ะ คุณครู! ต้องเหยียดแขนทั้งสองข้างไว้ข้างหัวสิคะ!"
2300205-17 = "ถ้าทำแบบไม่ตั้งใจ ฉันจะไม่ประทับตราเด็กดีให้นะคะ"
2300205-18 = "เอาล่ะ มาเริ่มใหม่ตั้งแต่ต้นอีกครั้งค่ะ! หนึ่ง สอง!"
2300205-20 = "หลังจากนั้นคุณครูก็ทำกายบริหารตามคำสั่งกับฮานาเอะ"

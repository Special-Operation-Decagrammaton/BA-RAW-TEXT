[translation]
2300205-1 = "廣播體操"
2300205-2 = "夏萊．居住區"
2300205-3 = "（難得的假日，想說可以賴床睡到正中午，卻在這時候……）"
2300205-5 = "廣播體操時間！"
2300205-6 = "好了，老師！別再窩在床上了，快點起來吧！"
2300205-7 = "[s] 「難得的假日，再睡一會兒……」"
2300205-8 = "不行！就算是假日也不能一直賴床，不然總有一天會永遠躺在床上起不來的！"
2300205-9 = "雖然現在會覺得很麻煩，但只要讓身體動一動，就會漸漸覺得神清氣爽……！"
2300205-11 = "……要是老師再繼續賴床，我就要在屁股上打上大大的一針！"
2300205-12 = "[s] 從床上彈起來。"
2300205-14 = "好，那麼開始廣播體操囉！#n讓我們跟著節奏──……！"
2300205-15 = "先從伸展運動開始！一、二、三、四！"
2300205-16 = "老師，動作要更有精神一點！#n兩隻手要伸的更直，手要確實抬起來！"
2300205-17 = "你這樣敷衍了事，我就不給你花丸印章囉！"
2300205-18 = "那麼重頭再來一遍，做個大大的伸展運動！一、二！"
2300205-20 = "（之後，便配合著花繪的口令，兩人一起做了廣播體操）"

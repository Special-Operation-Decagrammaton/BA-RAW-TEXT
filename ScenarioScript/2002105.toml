[translation]
2002105-1 = "等待你的到來"
2002105-2 = "歡迎你來，老師！"
2002105-3 = "耶嘿嘿。#n這麼說來，這還是第一次招待老師來這裡呢。"
2002105-4 = "雖然不是什麼了不起的地方，請老師別太拘謹！"
2002105-7 = "― 這是……[wa:1980] "
2002105-9 = "― 我自己為了迎接聖誕老人所做的準備。[wa:620] "
2002105-12 = "― 為了不讓聖誕老人覺得冷，[wa:780] "
2002105-14 = "― 把壁爐的火點起來……[wa:490] "
2002105-17 = "― 還在聖誕樹上加上了可愛的裝飾。[wa:1130] "
2002105-20 = "― 聖誕老人，[wa:920] "
2002105-22 = "― 我在等你唷～"
2002105-25 = "― 這麼一來，"
2002105-27 = "― 聖誕老人一定會在襪子裡放禮物的！[wa:1750] "
2002105-30 = "― 而且我今年……[wa:980] "
2002105-33 = "― 想要答謝聖誕老人！[wa:1770] "
2002105-36 = "― 耶嘿嘿，怎麼樣呀？[wa:1000] "
2002105-38 = "― 是我親手做的餅乾和新鮮的牛奶！[wa:1200] "
2002105-41 = "聖誕老人每年到了這個時候，#n都會非常辛苦不是嗎？"
2002105-42 = "但卻總是只有我收下他的好意，#n沒有為他做過什麼……"
2002105-43 = "所以今年，我無論如何也想報答他。"
2002105-44 = "希望這樣多少能讓聖誕老人更有精神就好了。"
2002105-46 = "（之後，在花繪做好襪子之前一直陪在她身邊）"
2002105-47 = "（做好襪子的花繪不知道是不是累了，在沙發上打起了瞌睡……）"
2002105-48 = "唔唔……今年的禮物……希望不要有人受重傷……"
2002105-49 = "還有……請給我強效消毒藥……"
2002105-50 = "[ns] 小心翼翼地享用花繪準備的牛奶和餅乾"
2002105-52 = "[ns] 出去買花繪的禮物"
2002105-54 = "（為了找到「強效消毒藥」，費了我一番工夫……）"

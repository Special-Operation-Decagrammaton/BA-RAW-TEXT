[translation]
2002105-1 = "Waiting for Santa"
2002105-2 = "Welcome, Sensei!"
2002105-3 = "Heehee. It's your first time in my room."
2002105-4 = "I know it's not much, but please make yourself comfortable."
2002105-7 = "― This is...my way of preparing[wa:980] "
2002105-9 = "― for Santa Claus to come![wa:340] "
2002105-12 = "― I got the fireplace nice and toasty,[wa:10] "
2002105-14 = "― so Santa won't be cold...[wa:10] "
2002105-17 = "― And I decorated the Christmas tree with lots of pretty decorations.[wa:10] "
2002105-20 = "― It's how I say,[wa:520] "
2002105-22 = "― \"Santa, I've been waiting for you!\""
2002105-25 = "― Then"
2002105-27 = "― he'll leave me a little gift in my stocking![wa:630] "
2002105-30 = "― But this year...[wa:620] "
2002105-33 = "― I'm gonna turn it around and give back to Santa![wa:210] "
2002105-36 = "― Heeheehee. What do you think?[wa:200] "
2002105-38 = "― Homemade cookies and fresh milk![wa:520] "
2002105-41 = "Santa Claus works really hard during Christmas, you know?"
2002105-42 = "I've always received from him without giving anything back..."
2002105-43 = "So, this year, I'm going to repay his kindness!"
2002105-44 = "I think that would make Santa happy!"
2002105-46 = "I stayed with Hanae until she finished making her stocking."
2002105-47 = "After finishing the stocking, she got tired and fell asleep on the couch."
2002105-48 = "Zzz... This year...Santa, please make sure...no one gets hurt..."
2002105-49 = "If that can't happen...please gift me a powerful disinfectant..."
2002105-50 = "[ns] Carefully eat a cookie with milk."
2002105-52 = "[ns] Go out to buy a gift for Hanae."
2002105-54 = "It was harder than I thought to find the kind of disinfectant she wanted..."

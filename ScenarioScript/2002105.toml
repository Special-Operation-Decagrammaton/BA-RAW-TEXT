[translation]
2002105-1 = "รอซานต้า"
2002105-2 = "เข้ามาสิคะคุณครู!"
2002105-3 = "แหะๆๆ นี่เป็นครั้งแรกเลยนะคะที่ฉันเชิญคุณครูมาที่ห้องตัวเองแบบนี้"
2002105-4 = "คุณครูทำตัวตามสบายได้เลยนะคะ"
2002105-7 = "― นี่คือ... การเตรียมตัว[wa:1260] "
2002105-9 = "― เพื่อรอรับคุณลุงซานต้าค่ะ[wa:300] "
2002105-12 = "― จุดไฟที่เตาผิงติดผนัง[wa:420] "
2002105-14 = "― เพื่อให้คุณลุงซานต้าไม่หนาว...[wa:10] "
2002105-17 = "― แล้วก็ตกแต่งต้นคริสต์มาสให้น่ารักๆ ค่ะ[wa:210] "
2002105-20 = "― เพื่อจะบอกว่า[wa:600] "
2002105-22 = "― คุณลุงซานต้า ฉันรออยู่นะคะ~"
2002105-25 = "― ถ้าทำแบบนั้น"
2002105-27 = "― ซานต้าจะใส่ของขวัญไว้ให้ในถุงเท้าค่ะ![wa:910] "
2002105-30 = "― และในปีนี้...[wa:740] "
2002105-33 = "― ฉันต้องตอบแทนคุณซานต้าให้ได้เลยค่ะ![wa:730] "
2002105-36 = "― แหะๆๆ เป็นไงบ้างคะ?[wa:600] "
2002105-38 = "― นี่คือขนมที่ฉันทำเองและนมสดๆ เลยค่ะ![wa:360] "
2002105-41 = "ก็ซานตาคลอสต้องเหนื่อยมากๆ ในเวลานี้ของทุกปีนี่คะ"
2002105-42 = "แต่ฉันกลับเป็นฝ่ายรับอย่างเดียว และไม่ได้ทำอะไรให้เลย..."
2002105-43 = "ปีนี้ฉันก็เลยอยากจะตอบแทนซานตาคลอสให้ได้เลยค่ะ"
2002105-44 = "ถ้าทำแบบนั้น ซานตาคลอสจะมีกำลังใจขึ้นมาบ้างใช่มั้ยคะ?"
2002105-46 = "(หลังจากนั้นคุณครูก็อยู่ข้างๆ ฮานาเอะจนเธอถักถุงเท้าเสร็จ)"
2002105-47 = "(เมื่อถักถุงเท้าเสร็จ ฮานาเอะก็เริ่มง่วงจนนั่งสัปหงกอยู่บนโซฟา)"
2002105-48 = "ฮ้าวว... ของขวัญปีนี้... ฉันไม่หวังอะไรนอกจากขอให้ไม่มีใครต้องบาดเจ็บเลยค่ะ"
2002105-49 = "แต่ถ้าไม่ได้... ก็ขอของขวัญเป็นยาฆ่าเชื้อแรงๆ แทนนะคะ..."
2002105-50 = "[ns] กินนมกับคุกกี้อย่างระมัดระวัง"
2002105-52 = "[ns] ออกไปซื้อของขวัญให้ฮานาเอะ"
2002105-54 = "(ยาฆ่าเชื้อแรงๆ หาซื้อได้ยากกว่าที่คุณครูคิด...)"

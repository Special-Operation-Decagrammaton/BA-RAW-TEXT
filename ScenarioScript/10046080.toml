10046080-194 = "Um, Sensei? Are you sleeping?"
10046080-195 = "[ns3] \"No, come in.\"\n[ns4] \"Yes, I'm fast asleep.\""
10046080-198 = "Well, since you're awake...one moment."
10046080-203 = "...As I thought. I know it's a little crowded with two people. I hope you don't mind."
10046080-204 = "It seems that sleep is eluding you too. Of course, it was an eventful day."
10046080-205 = "\"Where did Cinderella's mice come from?\""
10046080-206 = "And so we have our happy finale, despite the story that brought us here. A fun story, but it grows bitter as it steeps."
10046080-207 = "It's a story no one wants to recall, but someone should remember."
10046080-208 = "You may already know this, but I was originally supposed to have Nagisa's position."
10046080-209 = "Isn't it strange? She seems like the perfect hostess, the composed leader, the unflappable manager."
10046080-210 = "So, why was I initially selected to lead once upon a time?"
10046080-213 = "It's a simple reason."
10046080-214 = "\"The mice transformed into horses to pull the carriage.\""
10046080-217 = "What you saw earlier was the true Kirifuji Nagisa."
10046080-218 = "A lady who never loses her composure, and yet finds joy even in the everyday chaos."
10046080-221 = "...I know it's hard to imagine. She has grown quite...isolated in her gilded stable, surrounded by responsibility."
10046080-222 = "We're not very close. Perhaps in another world, but it didn't work out here."
10046080-223 = "Ultimately, Nagisa has pulled our carriage for a long time, straining until the princess arrived at the castle. ...Until someone got their happy ending."
10046080-224 = "...The carriage has arrived, but the horse has lost her true self. The journey transformed her."
10046080-225 = "This beach outing was penance, in a sense, but it cannot sustain itself."
10046080-226 = "I fear that if I don't see the \"true Nagisa\" at least once in a while, she will one day disappear forever."
10046080-227 = "...And she has good reason to be on edge."
10046080-228 = "Ah, I know this is a heavy topic for such a light summer night. I didn't want to say it."
10046080-229 = "...But I no longer have the reason or the wherewithal to hide it."
10046080-230 = "[s5] \"Have you talked to Nagisa?\"\n[s6] \"Maybe she wants a change.\""
10046080-235 = "...Are you joking? No. I didn't ask. I couldn't. Shame separates us from the animals."
10046080-236 = "[s] \"Then know that it'll be fine.\""
10046080-237 = "You sound so certain. What makes you so confident?"
10046080-238 = "[s7] \"It's a secret.\"\n[s8] \"One should avoid spoilers.\""
10046080-241 = "...!"
10046080-242 = "Fufu, very clever. Indeed, I told you that it's a curse to know everything beforehand."
10046080-243 = "So what you mean to say is that this is a story worth experiencing?"
10046080-244 = "[s9] \"Maybe, maybe not?\"\n[s10] \"It's special, but ordinary.\""

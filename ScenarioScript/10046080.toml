[translation]
10046080-1 = "ตอนที่ 8;สภาน้ำชาในคืนฤดูร้อน"
10046080-9 = "......"
10046080-10 = "......"
10046080-15 = "......"
10046080-16 = "เอ๋"
10046080-17 = "อะไรกันคะ...? นี่ฝีมือฉันเหรอคะ?"
10046080-25 = "มันอะไรกันคะ คุณมิกะ?"
10046080-29 = "นะ... นางิจัง...! ไม่ใช่นะ... นี่มัน...!"
10046080-30 = "ไม่หรอกค่ะ ฉันว่าไม่ต้องอธิบายก็ได้ค่ะ"
10046080-31 = "มีระเบิดวางไว้ในบ้านพักตากอากาศ... เหตุผลนี้มันชัดเจนมากค่ะ"
10046080-35 = "ฉันขอยุติวันหยุดพักร้อนของเราเท่านี้ค่ะ"
10046080-36 = "จับตัวทุกคนที่อยู่ตรงนี้ไว้! ฉันจะกักตัวทุกคนไว้จนกว่าจะวิเคราะห์สถานการณ์ได้ทั้งหมดค่ะ!"
10046080-37 = "ส่วนตัวการใหญ่ของเรื่องนี้ มิโซโนะ มิกะ ฉันจะให้กินแต่แยมโรลทั้ง 3 มื้อ"
10046080-39 = "โดยไม่ให้ดื่มนมแม้แต่สักหยดเดียวค่ะ!!"
10046080-45 = "...กะ!"
10046080-48 = "มิกะ! เป็นอะไรหรือเปล่าคะ?"
10046080-49 = "หรือว่าเพราะแรงระเบิดเมื่อกี้นี้...?"
10046080-50 = "นะ... นางิจัง..."
10046080-51 = "ไม่หรอก ฉัน คือว่า..."
10046080-52 = "ขอโทษนะคะ คุณมิกะ"
10046080-56 = "หืม...?"
10046080-57 = "ทำไมนางิจังถึงขอโทษล่ะ?"
10046080-61 = "ถามแปลกๆ... ถึงจะยังไม่รู้ว่ามีระเบิดได้ยังไง แต่ระเบิดเมื่อกี้ฉันเป็นคนจุดมันเองนี่คะ"
10046080-62 = "ฉันทำให้วันหยุดพักร้อนที่คุณมิกะอุตส่าห์ตั้งใจเตรียมมาต้องพังลงเสียได้ ต้องขอโทษด้วยนะคะ"
10046080-63 = "ไม่นะ ไม่สิ! นางิจังไม่ได้ทำผิดถึงขนาดกับต้องขอโทษสักหน่อย! ว่าแต่นางิจังจะจบทุกอย่างแค่นี้เลย#nก็ได้เหรอ?"
10046080-64 = "คะ? หมายความว่ายังไงคะ? หรือมีเรื่องอะไรที่ฉันพลาดไปหรือเปล่า?"
10046080-65 = "ก็... บ้านพักตากอากาศของเราถึงกับระเบิดเลยนะ?"
10046080-66 = "ก็ใช่ค่ะ"
10046080-67 = "แต่นั่นเป็นความผิดของฉันนะ?"
10046080-68 = "เราไม่ต้องกักตัวทุกคนที่เกี่ยวข้องไปสืบสวนตลอด 24 ชั่วโมงก็ได้เหรอ?!"
10046080-72 = "นี่คุณมิกะคิดว่าฉันเป็นคนยังไงเหรอคะ...?"
10046080-73 = "ฉันจะไปโทษใครได้คะ? ฉันเป็นคนที่กดสวิตช์นั่นเองเพราะความอยากรู้อยากเห็นที่ไร้การไตร่ตรอง#nของฉัน ไม่มีใครมาโน้มน้าวให้ฉันไปกดสวิตช์นั่นสักหน่อยนี่คะ"
10046080-74 = "แน่นอนว่าคำถามที่ว่าทำไมถึงได้มีระเบิดฝังอยู่ใต้บ้านพักตากอากาศและทำไมสวิตช์ถึงได้มาตกอยู่#nข้างหน้า เป็นสิ่งที่เรายังไม่รู้ค่ะ..."
10046080-75 = "แต่อย่างหนึ่งที่ฉันรู้ก็คือ"
10046080-76 = "คุณมิกะ"
10046080-81 = "ฉันคิดว่าคุณมิกะดูแปลกๆ ไปตลอดทั้งเย็นนี้เลยค่ะ"
10046080-82 = "ตอนนี้ฉันเข้าใจได้แล้วละค่ะ คุณมิกะพยายามป้องกันไม่ให้สถานการณ์นี้เกิดขึ้นใช่มั้ยคะ?"
10046080-83 = "เชื่อในตัวฉันเหรอ...?"
10046080-84 = "คะ?"
10046080-85 = "แต่ว่า... ฉันคือมิกะนะ?"
10046080-86 = "ทุกอย่างที่ฉันไปแตะต้องมักจะพังไม่เป็นท่า แล้วฉันก็ทำแต่เรื่องแย่ๆ กับคนอื่นด้วย"
10046080-87 = "แต่ยังไงก็เชื่อในตัวฉันงั้นเหรอ?"
10046080-88 = "พูดอะไรของคุณคะ คุณซื่อบื้อหรือเปล่าคะเนี่ย... ไม่สิ ฉันรู้มานานแล้วละค่ะว่าคุณเป็นคนซื่อบื้อ"
10046080-94 = "ฉันเชื่อในตัวคุณค่ะ"
10046080-98 = "ฮือ..."
10046080-100 = "ฮือ... แงงง!"
10046080-101 = "มะ... มิกะ?! ร้องไห้ทำไมคะ?!"
10046080-102 = "ก็นางิจังอ่ะ... แงงง!"
10046080-107 = "มิกะ"
10046080-111 = "อื้อ..."
10046080-114 = "ดีขึ้นแล้วหรือยังคะ?"
10046080-115 = "อื้อ..."
10046080-116 = "คุณนี่อยู่ไม่สุขจริงๆ เลยนะคะ มัวลุกลี้ลุกลนอยู่คนเดียว แล้วจู่ๆ ก็ร้องไห้ออกมาเสียอย่างนั้น"
10046080-117 = "ฉันรู้สึกมาตั้งนานแล้วค่ะว่าคุณน่ะเหมือนเด็กที่ต้องให้คนดูแลเลย"
10046080-118 = "นางิสะ... คุณเองก็เหมือนกันค่ะ"
10046080-122 = "คะ?!"
10046080-123 = "คุณหนูสุดห้าวคนนี้แค่ร้องไห้ขี้มูกโป่งเท่านั้นเอง แต่คุณกลับทำตัวเหมือนตัวเองไปก่ออาชญากรรม#nอะไรไว้อย่างนั้นละค่ะ"
10046080-124 = "ฉันละสงสัยจริงๆ ว่าทำไมทั้ง 2 คนที่ไม่เข้ากันเลยถึงได้เป็นเพื่อนกันมาตั้งแต่สมัยเด็กได้"
10046080-130 = "นี่ นางิจัง"
10046080-131 = "คุณมิกะ"
10046080-132 = "อ่า นางิจังพูดก่อนสิ"
10046080-133 = "ไม่หรอกค่ะ คุณมิกะพูดก่อนเถอะค่ะ"
10046080-134 = "......"
10046080-135 = "......"
10046080-140 = "อะไรกัน...? โชว์เล่นตลกกันอยู่เหรอคะ?"
10046080-141 = "มีคนซื่อบื้อในสภาน้ำชาตั้ง 2 คน แบบนี้ทรีนิตี้จะอยู่ยังไงคะเนี่ย"
10046080-142 = "ดะ... เดี๋ยวสิ! ตั้งแต่เมื่อกี้แล้วนะ! ทำไมถึงเอาแต่วิจารณ์คนอื่นล่ะ!"
10046080-143 = "เรื่องที่มันแน่นอนอยู่แล้ว ฉันจำเป็นต้องอธิบายเป็นคำพูดอีกเหรอคะ? นอกจากฉันแล้วมีใครในบรรดา#nพวกเราที่กำลังเผชิญหน้ากับปัญหาที่แท้จริงอยู่บ้างมั้ยล่ะคะ?"
10046080-144 = "ปัญหาที่แท้จริง?"
10046080-145 = "ใช่ค่ะ ก็ตอนนี้เราไม่มีที่นอนแล้วนี่คะ"
10046080-146 = "อ๊ะ"
10046080-148 = "อ่า"
10046080-149 = "[s] \"อ่า...\""
10046080-150 = "เห็นมั้ยล่ะคะ? แต่ก็เอาเถอะค่ะ... เรากางเต็นท์นอนกันก็ได้"
10046080-155 = "เอ่อ คุณเซอาคะ ฉันขอคุยด้วยหน่อยได้มั้ยคะ?"
10046080-156 = "ต้องขอโทษที่ขัดจังหวะระหว่างพูดนะคะ แต่พวกเราไม่ได้เตรียมเต็นท์เอาไว้น่ะสิคะ"
10046080-157 = "ถ้าจะหาเต็นท์ เราน่าจะต้องออกไปในเมืองกันเลย งั้นฉันว่าเราไปนอนในตัวเมืองกันน่าจะดีกว่า..."
10046080-158 = "อ่า ไม่เป็นไรหรอกค่ะ ฉันเอาติดรถมาน่ะค่ะ"
10046080-162 = "อ๊ะ ว่าแต่อิจิกะกับฮาสุมิใช้เต็นท์หลังเดียวกันได้มั้ยคะ? ฉันเอาเต็นท์มาแค่ 3 หลัง ถ้าจะแบ่งกันฉันว่า#nให้ทั้ง 2 คนนอนด้วยกันน่าจะสะดวกที่สุดน่ะค่ะ"
10046080-163 = "ส่วนคุณครูก็... ขอโทษด้วยนะคะ แต่คุณครูใช้เต็นท์ส่วนตัวของฉันได้มั้ยคะ? ถ้ามองในบางมุม การได้ใช้เต็นท์คนเดียวก็ถือเป็นการอยู่อย่างหรูหราฟู่ฟ่าอยู่นะคะ"
10046080-164 = "[s1] \"ขะ... ขอบใจนะ แต่ทำไมถึงมี 3 หลังเลยล่ะ...\"\n[s2] \"ว่าแต่ทำไมถึงเอาเต็นท์มา 3 หลังเลยล่ะ...?\""
10046080-169 = "ถ้าเรามาค้างคืนข้างนอก เราก็ต้องเตรียมพร้อมเพื่อรับมือภัยพิบัติไม่ใช่เหรอคะ?"
10046080-170 = "ต่อให้ตอนนี้เกิดภัยพิบัติขึ้นมาทันที ฉันก็มั่นใจว่าจะอยู่รอดได้ราวๆ 2 สัปดาห์ค่ะ นั่นเป็นเวลาเพียงพอที่การช่วยเหลือจะมาถึงค่ะ"
10046080-171 = "จะว่าไป... คุณเซอาก็มีด้านแบบนี้ติดตัวอยู่นานแล้วนะคะ จะเรียกว่าเป็นคนที่มีการเตรียมการอย่าง#nละเอียดถี่ถ้วนในเรื่องแปลกๆ หรือเป็นคนที่มีความคิดในเรื่องแปลกๆ ดีนะ?"
10046080-172 = "ฮุฮุ เรียกว่าเป็นทักษะของสุภาพสตรีแล้วกันค่ะ"
10046080-173 = "ยังไงก็เถอะค่ะ ฮาสุมิ อิจิกะ... แล้วก็คุณครูคะ"
10046080-174 = "พอจะช่วยฉันกางเต็นท์ได้มั้ยคะ?"
10046080-180 = "ฉันว่า 2 คนนั้นน่าจะต้องพูดคุยกันอีกนิดหน่อยน่ะค่ะ"
10046080-183 = "(คุณครูไปเอาเต็นท์มาจากรถของเซอา และเตรียมกางเต็นท์ให้เรียบร้อย)"
10046080-184 = "(น่าแปลกใจที่นางิสะดูสนุกกับการค้างคืนข้างนอกมากกว่าที่คิด)"
10046080-189 = "(เมื่อเวลาผ่านไปสักพัก... บรรยากาศข้างนอกก็เริ่มสงบลง)"
10046080-194 = "คือว่า คุณครูคะ? หลับหรือยังคะ?"
10046080-195 = "[ns3] \"ยังหรอก เข้ามาสิ\"\n[ns4] \"อื้อ ครูกำลังจะนอนเลยน่ะ...\""
10046080-198 = "ยังไม่นอนสินะคะ งั้นฉันขอเข้าไปหน่อยนะคะ"
10046080-203 = "เต็นท์หลังนี้เล็กเกินไปสำหรับ 2 คนจริงด้วยนะคะ... อึดอัดหน่อยนะคะคุณครู"
10046080-204 = "เหมือนคุณครูจะนอนไม่หลับนะคะ ฉันเข้าใจค่ะ ก็วันนี้ก็มีแต่เรื่องนี่คะ"
10046080-205 = "<หนูที่ลากรถฟักทองของเจ้าหญิงมาจากที่ไหนนะ?>"
10046080-206 = "ตอนจบที่มีความสุขของทุกคน กับเรื่องราวเบื้องหลัง เรื่องราวที่น่ายินดี แต่ยิ่งคิดก็ยิ่งขมขื่น"
10046080-207 = "เรื่องราวที่ไม่มีใครสงสัย แต่ก็มีใครสักคนต้องจดจำไว้"
10046080-208 = "คุณครูอาจเคยได้ยินมาก่อนว่าเดิมทีแล้วโฮสต์ของสภาน้ำชาคือฉัน ไม่ใช่นางิสะค่ะ"
10046080-209 = "คุณครูว่ามันไม่น่าสงสัยเหรอคะ? ไม่มีใครที่เหมาะกับการเป็นโฮสต์สภาน้ำชาเท่านางิสะเลย"
10046080-210 = "แต่ทำไมคนที่ถูกกำหนดให้เป็นโฮสต์ในตอนนั้นถึงไม่ใช่ 'นางิสะในตอนนั้น' แต่เป็นฉันล่ะคะ?"
10046080-213 = "เหตุผลง่ายๆ ค่ะ"
10046080-214 = "<หนูกลายร่างเป็นม้าเพื่อมาลากรถม้า>"
10046080-217 = "สิ่งที่คุณครูได้เห็นเมื่อกี้คือคิริฟุจิ นางิสะคนเดิมค่ะ"
10046080-218 = "คุณหนูที่ไม่เคยสูญเสียความสง่างามและความสบายใจ คุณหนูที่สนุกได้แม้ในเหตุการณ์ไม่คาดฝันที่#nเกิดขึ้นในชีวิต"
10046080-221 = "ฉันรู้ค่ะ... คงเป็นเรื่องยากจะจินตนาการใช่มั้ยล่ะคะ? เพราะนางิสะที่คุณครูเห็น ก็คือ 'นางิสะในตอนนี้' เสมอเลยนี่คะ"
10046080-222 = "พวกฉันไม่ได้เป็นเพื่อนที่ดีต่อกันมากหรอกค่ะ ถึงจะอยากทำแบบนั้น แต่ก็ทำไม่ได้ค่ะ"
10046080-223 = "สุดท้ายแล้วนางิสะก็ต้องลากรถม้าอยู่นานมาก เธอต้องทำเช่นนั้นเพียงลำพัง จนกว่าเจ้าหญิงจะมาถึง#nปราสาท และจนกว่าเรื่องราวจะจบลงอย่างมีความสุข"
10046080-224 = "รถม้ามาถึงแล้วก็จริง... แต่ม้ากลับลืมรูปลักษณ์เดิมของตนไปค่ะ"
10046080-225 = "ในแต่บางมุม นี่ก็ถือเป็นการไถ่บาปนะคะ ฉันรู้ค่ะว่าวิธีนี้อาจจะไม่ใช่วิธีแก้ปัญหาที่ดีที่สุด"
10046080-226 = "แต่ถึงยังไง ถ้าฉันไม่ได้เห็น 'นางิสะคนเดิม' อีกแม้แต่ครั้งเดียว ฉันก็จะกังวลราวกับว่าเธอคนนั้นจะ#nหายไปตลอดกาลค่ะ"
10046080-227 = "เห็นทีว่าคนอย่างฉันจะตำหนินางิสะว่าเป็นคนดื้อดึงไม่ได้นะคะ..."
10046080-228 = "ค่ะ นี่เป็นเรื่องหนักเกินกว่าจะมาฟังในค่ำคืนของฤดูร้อนใช่มั้ยล่ะคะ? เพราะแบบนั้นฉันก็เลยพยายาม#nไม่พูดถึงค่ะ"
10046080-229 = "แต่ว่าตอนนี้ฉันก็ไม่มีเหตุผลให้ซ่อนมันอีกต่อไปแล้วค่ะ"
10046080-230 = "[s5] \"ได้ไปถามนางิสะมาแล้วเหรอ?\"\n[s6] \"ไปถามนางิสะมาเหรอว่าไม่ชอบชีวิตตอนนี้หรือเปล่า?\""
10046080-235 = "คุณครูพูดแบบนี้ ล้อกันเล่นหรือเปล่าคะ...? เปล่าค่ะ ฉันไม่ได้ถามหรอกค่ะ ถ้าให้บอกตรงๆ ฉันถามแบบนั้นไม่ได้หรอกค่ะ ก็มนุษย์เป็นสัตว์ที่รู้จักความละอายใจนี่คะ"
10046080-236 = "[s] \"ถ้างั้นก็ไม่น่าเป็นไรหรอก\""
10046080-237 = "พูดอย่างมั่นใจทีเดียวนะคะ อะไรทำให้คุณครูยืนยันได้ขนาดนี้ล่ะคะ?"
10046080-238 = "[s7] \"เป็นความลับน่ะ\"\n[s8] \"การสปอยล์ไม่ใช่เรื่องดีหรอกนะ\""
10046080-241 = "...!"
10046080-242 = "ฮุฮุ โดนเข้าให้แล้วสิ ค่ะ ฉันเองก็เคยพูดไว้ว่าการรู้อะไรล่วงหน้าเป็นเรื่องน่าเบื่อ"
10046080-243 = "คุณครูจะบอกว่าเรื่องนี้ควรค่าแก่การติดตามสินะคะ"
10046080-244 = "[s9] \"อาจจะใช่ หรือไม่ก็ได้?\"\n[s10] \"การเปลี่ยนแปลงของนางิสะมันธรรมดาแต่ก็พิเศษน่ะ\""
10046080-247 = "เริ่มกลายเป็นปริศนาขึ้นมาเรื่อยๆ แล้วสินะคะ... เดิมทีแล้วบทบาทนี้ต้องเป็นของฉันแท้ๆ"
10046080-248 = "แต่สิ่งที่ฉันได้ฟังในตอนนี้... ค่ะ ฉันรู้ค่ะ เราไม่ควรสปอยล์เรื่องกันนี่คะ"
10046080-249 = "ฮุฮุ แต่ถ้าคุณครูถึงกับยืนยันแล้ว ฉันก็จะน่าจะรอจนกว่าจะได้รู้คำตอบนั้นได้โดยไม่ต้องกังวลค่ะ"
10046080-255 = "นี่ เซอาจัง! รีบมาเร็วเข้า!"
10046080-256 = "นางิจังเป็นบ้าไปแล้ว! นางิจังจั่วโจ๊กเกอร์ได้ 3 ครั้งรวดเลยละ!"
10046080-257 = "ฮุฮุฮุ มิกะ... ลืมไปแล้วเหรอคะว่าครั้งหนึ่งฉันเคยได้ฉายาว่าเป็นมือขวาของนางฟ้าน่ะ?"
10046080-261 = "แหม... ข้างนอกเสียงดังกันจังเลยนะคะ"
10046080-262 = "คงจะกำลังสนุกกันอยู่น่ะค่ะ"
10046080-263 = "ถ้างั้นฉันขอตัวก่อนนะคะ"
10046080-267 = "เซอาจัง! เร็วเข้าสิ!"
10046080-268 = "โฮ่... จะลากคุณเซอามาช่วยอีกแรงเหรอคะ? ถึงยังไงฉันก็ยังเหนือชั้นกว่าอยู่ดีค่ะ"
10046080-271 = "ทุกคนยังสนุกกับเรื่องบันเทิงที่ล้าสมัยอยู่อีกสินะคะ"
10046080-275 = "อะไรกัน ทำไมพูดจิกกัดกันแบบนั้นล่ะ?"
10046080-276 = "ฮุฮุ การเล่นเปิดไพ่มันก็สนุกดีอยู่หรอก แต่เรามาสนุกกับอะไรที่แปลกใหม่กว่านั้นกันดีมั้ยคะ?"
10046080-280 = "ทั้ง 2 คนอาจจะไม่เคยเห็นของแบบนี้มาก่อน แต่นี่คือสิ่งที่เรียกว่าเครื่องเล่นเกมค่ะ"
10046080-281 = "ฉะ... ฉันก็พอรู้เรื่องวิดีโอเกมหรอกนะ?! ใช่มั้ย นางิจัง?"
10046080-286 = "ชะ... ใช่ค่ะ! พูดถึงกิจกรรมยามว่างในร่มที่นักเรียนหลายคนชื่นชอบใช่มั้ยคะ?"
10046080-287 = "แต่จะว่าไปนี่ก็แปลกนะคะ ฉันไม่คิดเลยว่าคุณเซอาจะมีของแบบนั้นด้วย"
10046080-289 = "เพื่อนของฉัน... ให้เป็นของขวัญไว้ตอนงานแลกเปลี่ยนกับโรงเรียนวิทย์มิลเลเนียมน่ะค่ะ"
10046080-290 = "หืม? นอกจากพวกเรา เซอาจังก็ไม่มีเพื่อนที่ไหนไม่ใช่เหรอ?"
10046080-294 = "คะ? ฉันฟังผิดไปหรือเปล่าคะ? ถ้าเป็นเรื่องความสัมพันธ์กับเพื่อนนักเรียนต่างโรงเรียน ฉันทำได้ดีกว่า#nคุณมากนะคะ"
10046080-295 = "หืม? แล้วทำไมตอนวันหยุด เซอาจังถึงเอาแต่อยู่ในบ้านล่ะ?"
10046080-296 = "การไม่มีเวลากับไม่หาเวลามันเป็นคนละเรื่องกันเลยค่ะ"
10046080-301 = "กำลังพูดเรื่องน่าสนใจกันเลยนะคะ พูดถึงเรื่องความสัมพันธ์กับเพื่อนนักเรียน ฉันเองก็..."
10046080-306 = "นางิจัง... ขอโทษนะ แต่อย่าเพิ่งมาแทรกได้มั้ย?"
10046080-307 = "ขอโทษด้วยนะ แต่เรื่องนี้ไม่เกี่ยวกับนางิสะค่ะ"
10046080-311 = "คะ?!"
10046080-316 = "ทำไมถึงทำแต่กับฉันแบบนี้ล่ะคะ?! ฉันก็มีเพื่อนเหมือนกันนะคะ! มีเยอะเลยด้วย!"
10046080-317 = "อ้อ หมายถึงเด็กๆ ที่เรียกนางิจังว่าคุณนางิสะๆ น่ะเหรอ...?"
10046080-318 = "นางิสะ ความสัมพันธ์แบบนั้นน่ะไม่ใช่ความสัมพันธ์แบบเพื่อนหรอกค่ะ นั่นเรียกว่าบริวารมากกว่า"
10046080-319 = "นี่ เซอาจัง พูดแรงไปแล้วนะ..."
10046080-320 = "ก็ค่อยๆ ถึงเวลาที่นางิสะจะต้องเผชิญกับความจริงแล้วนี่คะ"

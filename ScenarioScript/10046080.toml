[translation]
10046080-1 = "第8話;仲夏夜的茶會"
10046080-9 = "…………"
10046080-10 = "…………"
10046080-15 = "…………"
10046080-16 = "這……"
10046080-17 = "……這是怎麼回事？是我造成的嗎？"
10046080-25 = "現在究竟是什麼情況，彌香同學？"
10046080-29 = "渚，渚醬……！#n事情不是你想的那樣，這是……！"
10046080-30 = "不，你不必解釋了。"
10046080-31 = "別墅裡被安裝了炸彈……此事代表的意義非常明確。"
10046080-35 = "渡假到此結束！"
10046080-36 = "立刻逮捕在場的所有人！#n在掌握所有情況之前一律拘留！"
10046080-37 = "至於事件的主謀聖園彌香──"
10046080-39 = "三餐只准吃蛋糕捲！而且不能配牛奶！！"
10046080-45 = "……香！"
10046080-48 = "彌香！你沒事吧？"
10046080-49 = "有沒有因為剛才的爆炸衝擊而受傷……？"
10046080-50 = "渚，渚醬……"
10046080-51 = "不是的……這是……"
10046080-52 = "對不起，彌香同學。"
10046080-56 = "……嗯？"
10046080-57 = "渚醬為什麼要向我道歉？"
10046080-61 = "問我為什麼……#n雖然不清楚原因，但剛才的爆炸是我引起的吧？"
10046080-62 = "糟蹋了彌香同學辛苦準備的渡假……真的很抱歉。"
10046080-63 = "不，不對不對！我不是這個意思啦！#n渚醬，事情就這樣含糊帶過真的沒問題嗎？"
10046080-64 = "嗯？為什麼這麼說？#n是我漏掉了什麼嗎？"
10046080-65 = "就是……別墅不是爆炸了嗎？"
10046080-66 = "所以呢？"
10046080-67 = "是我害的吧？照常理來說？"
10046080-68 = "不需要把所有人都拘留，然後24小時輪番審問嗎！？"
10046080-72 = "我在彌香同學心裡的形象究竟出了什麼問題……"
10046080-73 = "況且這又能怪誰呢？#n是我自己因為好奇而按下了開關……要說這是受人刻意引導，未免過於牽強了。"
10046080-74 = "當然別墅底下為何會埋著炸彈，開關又為什麼會掉在那裡……就是另一個問題了。"
10046080-75 = "不過，至少我明白了一件事。"
10046080-76 = "彌香同學。"
10046080-81 = "我整個下午都覺得你怪怪的。"
10046080-82 = "而現在我總算明白了……#n彌香同學一直在背後努力阻止這場災難對吧？"
10046080-83 = "……你相信我嗎？"
10046080-84 = "嗯？"
10046080-85 = "沒有啦，我的意思是……是我耶？"
10046080-86 = "無論做什麼都會搞砸，還曾經對大家做出很過分的事情……"
10046080-87 = "你願意……相信這樣的我嗎？"
10046080-88 = "還以為你要說什麼……你是笨蛋嗎？#n不，彌香同學是笨蛋這種事，我早就知道了。"
10046080-94 = "我當然相信你。"
10046080-98 = "……嗚。"
10046080-100 = "……嗚哇啊啊啊！"
10046080-101 = "彌，彌香！？你怎麼突然哭了！？"
10046080-102 = "因為，渚醬你……嗚哇啊！"
10046080-107 = "彌香。"
10046080-111 = "……嗯。"
10046080-114 = "哭完了嗎？"
10046080-115 = "……嗯。"
10046080-116 = "真是個愛給人添亂的人啊。#n一下子坐立難安，一下子突然飆淚的……"
10046080-117 = "我從以前就覺得，你這個人真的很讓人費心。"
10046080-118 = "……渚，你也一樣。"
10046080-122 = "咦！？"
10046080-123 = "這個任性大小姐只是隨性哭了一場而已，沒必要擺出好像犯下什麼大罪的表情好嗎。"
10046080-124 = "這麼不合拍的兩人居然是青梅竹馬，真是令人難以理解。"
10046080-130 = "那個，渚醬。"
10046080-131 = "彌，彌香同學。"
10046080-132 = "啊，你先說吧。"
10046080-133 = "沒關係，彌香同學先說。"
10046080-134 = "…………"
10046080-135 = "…………"
10046080-140 = "……這是什麼低智商的對話？"
10046080-141 = "茶會成員裡居然有兩個笨蛋，看來三一學園也快走到頭了啊。"
10046080-142 = "等，等一下！#n為什麼你從剛才就一副事不關己的樣子啦！"
10046080-143 = "這麼理所當然的事還要我說？#n我們之中除了我之外，有誰正視過現實的問題嗎？"
10046080-144 = "現實的問題？"
10046080-145 = "沒錯，我們睡覺的地方剛才爆炸了。"
10046080-146 = "啊。"
10046080-148 = "啊。"
10046080-149 = "[s]「啊。」"
10046080-150 = "看吧。#n……雖然在帳篷裡睡也不是不行啦。"
10046080-155 = "那個，聖亞大人。#n不好意思打斷您說話……"
10046080-156 = "雖然相當難以啟齒，但我們並沒有準備帳篷。"
10046080-157 = "如果要去市區採購的話，我認為直接在市區住宿會更加合適……"
10046080-158 = "啊啊，這不成問題。#n我車上有事先準備好的帳篷。"
10046080-162 = "那麼……蓮實和一花共用一頂行嗎？#n因為我只帶了三頂的關係，這樣分配會比較適合。"
10046080-163 = "至於老師就使用我的私人帳篷吧。#n能夠獨享一頂帳篷，某種意義上也算是種享受呢。"
10046080-164 = "[s1]「謝，謝謝……」\n[s2]「不過你為什麼要準備三頂帳篷……？」"
10046080-169 = "……？#n既然要外宿的話，隨時做好遇難的準備不是很正常嗎？"
10046080-170 = "哪怕現在立刻遇難，我也有信心能撐過兩週。#n這段時間足夠等到救援抵達了。"
10046080-171 = "這麼說來……聖亞大人從以前就是這樣的呢。#n該說是在奇怪的地方準備得很周全，還是想法有些跳脫……"
10046080-172 = "呵呵，請稱之為淑女的修養吧。"
10046080-173 = "那麼蓮實、一花……還有老師。"
10046080-174 = "能麻煩你們協助搭設帳篷嗎？"
10046080-180 = "我想他們兩位，應該還需要一些時間多聊聊才對。"
10046080-183 = "（從聖亞的車上拿出帳篷後，一起完成了睡前的準備）"
10046080-184 = "（出乎意料的是，渚似乎對這場突如其來的外宿感到有些開心）"
10046080-189 = "（……不久之後，外頭漸漸安靜了下來）"
10046080-194 = "老師，你睡了嗎？"
10046080-195 = "[ns3]「我還沒睡，你直接進來沒關係。」\n[ns4]「嗯，已經睡著了。」"
10046080-198 = "看來你還醒著，那我就打擾一下囉。"
10046080-203 = "……果然同時待兩個人還是有點壅擠呢。請多包涵。"
10046080-204 = "老師似乎有點難以入眠呢。#n我能理解，畢竟今天的確是個多事的一天。"
10046080-205 = "「拉著公主乘坐的南瓜馬車的老鼠，究竟從何而來？」"
10046080-206 = "在眾人迎接的幸福結局背後……那些細細回味便略顯苦澀的故事。"
10046080-207 = "或許沒有人在意，卻必須有人記得的故事。"
10046080-208 = "我想你可能聽過，原本應該擔任茶會主席的是我而不是渚。"
10046080-209 = "但你不覺得奇怪嗎？#n以茶會主席的身分而言，渚應該才是最適合的人選才對。"
10046080-210 = "那麼為何當時被推舉為主席的人是我，而不是「那時的渚」呢？"
10046080-213 = "理由很簡單。"
10046080-214 = "「老鼠為了拉馬車而變成了馬。」"
10046080-217 = "老師剛才見到的那個模樣，才是桐藤渚本來的面貌。"
10046080-218 = "無論何時都不失氣質與從容，甚至能將生活中的突發事件視為樂趣的大小姐。"
10046080-221 = "……我明白這可能有點難想像。#n畢竟老師一直以來所見到的都是「現在的渚」。"
10046080-222 = "我們原先並不是什麼好朋友。#n雖然希望如此卻沒能做到。"
10046080-223 = "結果，渚獨自拉著馬車走了好久好久。#n直到公主抵達城堡，直到故事迎來幸福的結局為止──始終孤身一人。"
10046080-224 = "儘管馬車已經抵達……拉著車前行的馬兒卻也遺忘了自己原本的模樣。"
10046080-225 = "某種意義上，這是種贖罪。#n同時我也清楚，這樣的方式絕非最終的解決方案。"
10046080-226 = "然而即便只是偶爾為之──#n如果無法親眼見到「原本的渚」，我總會擔心他會不會永遠回不來了。"
10046080-227 = "……這麼看來，我似乎也沒資格責怪渚的偏執啊。"
10046080-228 = "由於這個話題對仲夏夜而言實在有點沉重，我本來沒打算說出來的。"
10046080-229 = "不過事到如今，也沒有隱瞞下去的理由和餘地了呢。"
10046080-230 = "[s5]「你有問過渚嗎？」\n[s6]「問他會不會討厭現在的生活。」"
10046080-235 = "……這是在開玩笑嗎？#n我當然沒問過這個問題……或者嚴格來說是開不了口吧。#n人畢竟是具備羞恥心的動物啊。"
10046080-236 = "[s]「那就沒問題了。」"
10046080-237 = "你說得很篤定呢……能告訴我這麼說的根據何在嗎？"
10046080-238 = "[s7]「這是祕密。」\n[s8]「畢竟劇透是不對的嘛。」"
10046080-241 = "……！"
10046080-242 = "呵呵，被你反將了一軍呢。不過這樣也好。#n就像我之前說過的一樣，如果凡事都能提前知道就太無趣了。"
10046080-243 = "所以換句話說，這將會是個值得期待的故事……老師是這個意思吧？"
10046080-244 = "[s9]「或許是，但也可能不是？」\n[s10]「畢竟渚的改變雖然相當特別……卻也十分平凡啊。」"
10046080-247 = "……越來越像謎語了呢。#n這本來應該是我的角色才對。"
10046080-248 = "現在聽到的這些……啊啊，我知道。#n禁止劇透，對吧。"
10046080-249 = "呵呵，既然老師都這麼保證了，我就愉快地期待謎底揭曉的那一天到來吧。"
10046080-255 = "聖亞醬！你趕快過來！"
10046080-256 = "渚醬他真的怪怪的！居然能連續三次抽到鬼牌耶！？"
10046080-257 = "呵呵呵，彌香……你難道忘了我曾經被稱為「天使的右手」嗎？"
10046080-261 = "……外面有點吵鬧呢。"
10046080-262 = "看來他們似乎玩得很開心。"
10046080-263 = "那我也差不多該過去了。"
10046080-267 = "聖亞醬！快點快點！"
10046080-268 = "哦～要把聖亞同學也拉進來嗎？#n不過就算是這樣，我的優勢依然沒有改變唷。"
10046080-271 = "你們還是一如既往地喜歡這種老派的娛樂活動呢。"
10046080-275 = "什麼啦，又是那種自以為是的語氣？"
10046080-276 = "呵呵。雖然玩紙牌也不錯，但要不要來試試更新鮮的娛樂方式？"
10046080-280 = "你們兩位應該是第一次見到吧──「電子遊戲機」。"
10046080-281 = "我，我也知道什麼是電玩呀！？對吧，渚醬？"
10046080-286 = "當，當然囉！就是那個許多學生都喜歡的一種室內休閒活動嘛！"
10046080-287 = "不過這還真是稀奇。#n沒想到聖亞同學會拿出這種東西。"
10046080-289 = "這是我在參加和千年科學學園的交流會時……嗯，一位朋友送給我的。"
10046080-290 = "咦？聖亞醬，你不是除了我們之外沒半個朋友嗎？"
10046080-294 = "哦？剛才我的耳朵是出問題了嗎？#n要論交友關係的話，我應該比彌香好多了才對吧？"
10046080-295 = "嘿～那為什麼聖亞醬假日的時候總是待在家裡呢？"
10046080-296 = "「不安排行程」和「無法安排行程」之間，可是存在天壤之別的哦。"
10046080-301 = "大家聊得真起勁呢。#n要說交友關係的話，我也……"
10046080-306 = "渚醬……你其實不用硬聊沒關係啦。"
10046080-307 = "是啊，感覺渚可能不適合參與這個話題。"
10046080-311 = "咦！？"
10046080-316 = "為什麼只有我被這樣對待！？#n我明明也有朋友！而且還很多好嗎！"
10046080-317 = "啊，你是說那些會叫你「渚大人」的孩子們嗎……？"
10046080-318 = "渚，那種關係一般不叫朋友。應該稱之為「追隨者」才對。"
10046080-319 = "哇，聖亞醬也說得太直接了吧……"
10046080-320 = "畢竟渚也差不多該面對現實了啊。"

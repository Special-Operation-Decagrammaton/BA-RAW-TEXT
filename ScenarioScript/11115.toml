[translation]
11115-2 = "ศัตรูเริ่มถอนกำลังไปแล้วค่ะ"
11115-3 = "แต่หากปล่อยไปแบบนี้ละก็..."
11115-4 = "หรือว่าจะไปเรียกพวกมาอีก? มีเท่าไหร่ก็เข้ามาเลย ฉันพร้อมเสมอ"
11115-5 = "ดะ.. เดี๋ยวก่อนค่ะ! ห้ามต่อสู้กันนะคะทุกคน!"
11115-6 = "หืม? ทำไมเหรอ?"
11115-7 = "ถ้าก่อเรื่องวุ่นวายใหญ่โตในตลาดมืดละก็ พวกหน่วยงานความมั่นคงอาจมาเจอตัวพวกเราก็ได้นะคะ!"
11115-8 = "ถ้าเป็นแบบนั้นก็งานเข้าของแท้เลยนะคะ... ก่อนอื่น เรารีบไปจากตรงนี้กันก่อนเถอะค่ะ..."
11115-9 = "ฮึ่ม... ก็ได้ ฮิฟุมิจังน่าจะรู้จักที่นี่ดีกว่าพวกเรา งั้นเอาตามที่บอกแล้วกัน"
11115-10 = "ชิ! พวกเธอแค่โชคดีหรอกนะ!"
11115-11 = "ทางนี้ค่ะ!"
11115-15 = "ตอนต่อไป;ไปยังตลาดมืด 2"

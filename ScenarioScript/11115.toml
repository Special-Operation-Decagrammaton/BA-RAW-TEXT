[translation]
11115-2 = "敵軍正在撤退！"
11115-3 = "但是再這樣下去…… "
11115-4 = "打算叫更多夥伴來嗎？儘管來吧。 "
11115-5 = "請，請等一下！不能再戰鬥下去了！"
11115-6 = "嗯？怎麼了？"
11115-7 = "因，因為……在黑市引起騷動的話，說不定會被管理這裡的治安單位發現！"
11115-8 = "啊嗚嗚……那樣就真的不妙了……#n總之先離開這邊吧……"
11115-9 = "呼呣……我知道了。#n看來日步美醬似乎比咱們更了解這裡，就先照他的話做吧。"
11115-10 = "呿，算你們走運！"
11115-11 = "請往這邊！"
11115-15 = "下一話;前往黑市（２）"

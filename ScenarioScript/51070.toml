[translation]
51070-1 = "第7話;朝青春(?)邁進的少女（１）"
51070-3 = "[ns]「青春……？這是什麼意思？」"
51070-4 = "……哈！這麼說來……"
51070-5 = "我以前曾聽蓮華前輩這麼說過。"
51070-11 = "對了，紫從國中時期就想加入我們了吧。"
51070-12 = "是啊！"
51070-13 = "「如命運般相遇的那個夜晚就是契機」……是吧？"
51070-14 = "第一次聽到的時候，我還想說居然有人想來這種地方受苦……真是個怪人。"
51070-15 = "怎麼說這種話！百花繚亂是菁英齊聚的地方！#n像我這種菁英該加入的社團非這裡莫屬。我可是下定決心了呢！"
51070-16 = "……也對，你從國中時期就每天不厭其煩地…… "
51070-17 = "每次被桔梗指責不能來這裡的時候總是繃著臉回去，但隔天又理直氣壯地出現。"
51070-18 = "每天凌晨4點起床鍛鍊，回來吃飯上完課後又要接著繼續訓練……#n這種社團到底哪裡好了……"
51070-20 = "啊，但是蓮華前輩自不用說，我認為能和其他前輩一起活動非常開心哦？"
51070-21 = "唉……既然你都這麼說了，我也不好意思多說什麼。"
51070-22 = "但是……你沒有這樣想過嗎？"
51070-24 = "……？"
51070-25 = "除了百花繚亂的活動之外，還想和朋友一起體驗酸酸甜甜的青春活動……"
51070-26 = "沒有，一次都沒有！"
51070-27 = "哇……居然秒答。"
51070-28 = "那蓮華前輩覺得如何呢！喜歡百花繚亂的活動嗎？"
51070-29 = "……這個嘛，跟著桔梗加入這裡之後確實發生很多有趣的事。"
51070-30 = "而且也認識了名草前輩和你……是不會覺得後悔啦。"
51070-35 = "只是如果能在非運動系，而是文化系社團之類的地方……"
51070-36 = "度過稍微有點不一樣的青春──"
51070-42 = "……當時的我並不明白前輩的意思。"
51070-43 = "在與蓮華前輩交談後，我確實曾稍微這麼想過。"
51070-44 = "蓮華前輩是不是對其他社團活動有興趣呢……#n雖然也可能是我自己誤會了……"
51070-45 = "[s]「你們的對話不管怎麼看都充滿對青春的憧憬吧！？」"
51070-49 = "啊！果然是那樣嗎！"
51070-50 = "原來如此……也就是說，現在蓮華前輩……"
51070-51 = "就像這張紙條上寫的一樣，踏上了享受青春的旅途！？"
51070-52 = "蓮華前輩曾經這麼說過──#n「要度過青春的話，文化系的活動比較適合。#n　和百花繚亂充滿汗味的活動相比，那邊清爽多了」……原來是這個意思啊！"
51070-53 = "[s]「那不就已經100%能確定是那句話了嗎！？」"
51070-54 = "唔，蓮華前輩為了不讓我們受傷，總是身先士卒站在最前方……"
51070-55 = "從這點看來……自從名草前輩消失……尤其是百花繚亂的活動停止以後……"
51070-59 = "蓮華前輩終於按捺不住對青春的渴望了！肯定是這樣沒錯！"
51070-60 = "來！現在不是待在這裡的時候，我們馬上去找前輩吧！老師！"
51070-66 = "可是……"
51070-72 = "該從哪找起好呢？"
51070-79 = "[ns]「來，這是佳穗提供的文化系社團清單。」"
51070-80 = "居然真的輕鬆從陰陽部手中拿到了社團清單！？"
51070-81 = "真，真厲害！"
51070-82 = "哈……難道這就是傳說能讓陰陽部部長和副部長不得不屈服的，夏萊的權力嗎……？"
51070-83 = "莫非小女子真的在和危險人物一起行動嗎！？"
51070-84 = "[s]「都說了這是誤會……」"
51070-85 = "嗯！"
51070-86 = "不管怎樣，現在就利用這份清單追蹤蓮華前輩吧！"
51070-88 = "小球藻生態觀察部"
51070-90 = "清單上的第一個社團好像就是這裡……"
51070-91 = "那麼……"
51070-95 = "不好意思打擾了！"
51070-107 = "嗯？有客人？"
51070-108 = "怎麼了？有什麼事嗎？"
51070-109 = "[s]「你們好，是這樣的……」"
51070-111 = "沒錯！我們是來找蓮華前輩的！"
51070-113 = "蓮華……？"
51070-114 = "什麼？蓮華是誰？"
51070-116 = "蓮華前輩他……"
51070-117 = "就是蓮華前輩！"
51070-119 = "……啥？"
51070-122 = "[ns]「紫，你得告訴他們更詳細的資訊才行……」"
51070-123 = "咦，是嗎？"
51070-124 = "那個……蓮華前輩是……該怎麼說呢……"
51070-125 = "有時會大喊「我會處罰晨練缺席的傢伙！」……"
51070-126 = "有時看到我嘴角黏著飯粒就會覺得有趣而笑出來……"
51070-127 = "一起購物時偶然看到在街上鬧事的妖怪劇團就會忍不住衝過去……#n蓮華前輩就是這種人，我非常尊敬他……"
51070-132 = "……抱歉，我不知道你在說什麼。"
51070-134 = "什，什麼！？說明了這麼多還不夠嗎！？"
51070-135 = "[s1]「從紫剛才說的話裡可以得知的資訊……」\n[s2]「就只有紫平常對蓮華的想法吧……」"
51070-138 = "唔嗯……我想表達的不是這個。"
51070-139 = "其他具體資訊啊……蓮華前輩……有著一頭帥氣的紅髮……"
51070-141 = "紅髮？"
51070-142 = "[s]「看來用這種方法果然很難找……」"
51070-143 = "你說紅髮，難道是指不久之前體驗入部的那個人嗎？"
51070-149 = "啊……你說的是那個身穿水藍色羽織的人吧？"
51070-151 = "對，就是那個人沒錯！他果然也來過這個社團！"
51070-152 = "蓮華前輩在「小球藻生態觀察部」肯定也是王牌……！"
51070-154 = "該怎麼說呢……他說了一些有點難懂的話？"
51070-155 = "「我們以全國大賽為目標，一起通宵練習吧！我對體力很有自信！」之類的。"
51070-156 = "……話說小球藻生態觀察有全國大賽這種東西嗎？"
51070-157 = "「把小球藻生態觀察的精髓傳授給我吧！為了不愧對你們，我會全力以赴的！」──#n他好像也這麼說過……"
51070-163 = "[ns]「嗯，這樣聽起來……確實很……」"
51070-165 = "……果然很像蓮華前輩的活躍表現！"
51070-169 = "[ns]「嗯！？那算是活躍表現嗎！？」"
51070-170 = "因為蓮華前輩是絕不妥協的人！"
51070-171 = "所以各位，請問蓮華前輩現在在哪裡呢……！"
51070-172 = "啊，他不在這裡。"
51070-173 = "我記得在體驗入部期間結束當天……"
51070-180 = "唔……抱歉！"
51070-181 = "體驗入部的這幾天……我不只肆意胡鬧還為所欲為，真是給大家添麻煩了。"
51070-186 = "別這麼說……其實沒那麼誇張……"
51070-188 = "……不過多虧大家，我想通了……"
51070-190 = "嗯？"
51070-191 = "看著你們認真觀察小球藻生態的模樣，讓我知道自己只不過是個一知半解的半吊子。"
51070-192 = "以及為了這個社團活動奉獻一生的你們，是我無論如何都無法企及的。"
51070-193 = "呃，其實也沒到奉獻一生這麼誇張……"
51070-194 = "所以，抱歉！正式入部的事……還請容我拒絕。"
51070-195 = "啊，儘管如此，我已經深深理解你們的熱情了！#n小球藻觀察部！我以後也會繼續為你們加油！"
51070-197 = "以後你們如果打進全國大賽，我一定會去看的！"
51070-204 = "……說完之後，他就結束入部體驗離開了。"
51070-205 = "那個……"
51070-206 = "小球藻生態觀察的全國大賽……現在是不是應該申請參加了？"
51070-208 = "這樣啊……"
51070-209 = "你們知道他去哪裡了嗎？"
51070-210 = "這個嘛……"
51070-211 = "最近各個社團都忙著準備「燈籠祭」的參展作品，所以我們也不清楚。"
51070-214 = "[ns]「可惜沒見到蓮華。」"
51070-215 = "是啊，不過就像小女子推測的一樣……#n蓮華前輩為了享受青春，正在進行文化系的社團活動。得知這點就是巨大的收穫了！"
51070-219 = "既然方向沒錯，我們這就前往下一個社團吧！"
51070-221 = "SF戰略模擬將棋部"
51070-223 = "百花繚亂的紅髮啊。"
51070-224 = "啊，我想起來了。#n他也來過我們社團哦。"
51070-225 = "是個……很特別的人吧？"
51070-226 = "他在跟我們下將棋時被逼入絕境，所以我就問他需不需要稍微放水，結果……"
51070-231 = "這，這……！規則上本來是不行的……#n不過社團活動是為了增進友誼，所以可以容許一點……輕微的犯規……！"
51070-232 = "可是……！可是！"
51070-233 = "啊，你不希望我放水嗎？"
51070-237 = "那我就將軍囉。"
51070-242 = "是我輸了！！"
51070-245 = "之後他說對一時動搖的自己感到很失望，不停低頭道歉就離開了。"
51070-247 = "那真是……很像蓮華前輩會做的事！"
51070-249 = "健身落語部"
51070-250 = "啊啊，蓮華也來過這裡。"
51070-251 = "他在聽我們的落語時曾說「青春的夢想成長了」！#n雖然很高興聽到他這麼說，只可惜……"
51070-252 = "因為忙著準備慶典的關係，現在實在無法增加新成員，只能遺憾地拒絕他入部。"
51070-254 = "戰鬥歌牌部"
51070-255 = "啊，對對對，他確實來過。"
51070-256 = "好像說是很嚮往火熱青春的歌牌對戰……"
51070-257 = "但是因為慶典在即，所以只好拒絕……"
51070-264 = "（之後不知又去了多少社團）"
51070-268 = "[ns]「來，這杯飲料給你。」"
51070-272 = "啊，謝謝老師……"
51070-273 = "（雖然去了很多社團，最終還是沒找到蓮華）"
51070-274 = "沒想到蓮華前輩會到這麼多社團體驗……"
51070-275 = "儘管如此……大家對蓮華前輩的說法還真是……"
51070-276 = "[s]「嗯，大家都說得很刻薄……」"
51070-277 = "是啊！他們都刻薄地給予蓮華前輩很高的評價呢！"
51070-278 = "咦？刻薄這個詞不是這種時候用的？"
51070-279 = "呵呵呵，怎麼這麼說呢！"
51070-280 = "語言這種東西，最終還是取決於雙方如何解讀！"
51070-281 = "大家都記得蓮華前輩，而且還告訴我們有關蓮華前輩的事……#n這就證明了蓮華前輩是全心全意地進行著社團活動！"
51070-282 = "蓮華前輩他，從以前就是經常高喊「別在中途妥協，要堅持到最後！」的人。"
51070-283 = "[s]「紫很喜歡蓮華，而且也很信任他呢。」"
51070-284 = "是！我非常尊敬蓮華前輩！"
51070-285 = "呵呵。"
51070-289 = "那麼接下來該去哪裡才好呢……"
51070-291 = "老師……找到你了！！"
51070-300 = "[ns] 「哇啊！？」"
51070-304 = "[ns]「楓！？」"
51070-306 = "老，老師！？您沒事吧！？"
51070-307 = "楓，楓醬！？這樣撲上去會讓老師很傷腦筋的！"
51070-308 = "呼啊……"
51070-309 = "[s]「楓、三森，連椿都來了……？」"
51070-312 = "下一話;朝青春(?)邁進的少女（２）"

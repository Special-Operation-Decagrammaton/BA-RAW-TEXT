[translation]
51070-1 = "ตอนที่ 7;เด็กสาวผู้ตามหาชีวิตวัยรุ่น(?) 1"
51070-3 = "[ns] \"วัยรุ่น...? หมายความว่ายังไงน่ะ?\""
51070-4 = "...เฮือก! จะว่าไปแล้ว..."
51070-5 = "เมื่อก่อนข้าเหมือนเคยได้ยินคำพูดแบบนี้จากรุ่นพี่เรนเกะเลยเจ้าค่ะ"
51070-11 = "จะว่าไป ยูคาริ เธออยากเข้ามาที่นี่ตั้งแต่สมัยม.ต้นแล้วใช่มั้ย?"
51070-12 = "ใช่เจ้าค่ะ!"
51070-13 = "<มันเริ่มจากการพบกันแบบพรหมลิขิตในคืนนั้น> งั้นเหรอ"
51070-14 = "ตอนได้ยินครั้งแรก ฉันคิดว่าประหลาดสุดๆ ไปเลยที่ใครอยากจะเข้ามาอยู่ในที่ที่ต้องลำบากกายแบบนี้"
51070-15 = "พูดอะไรแบบนั้นเจ้าคะ! เฮียกกะเรียวรันเป็นชมรมยอดเยี่ยมที่มีแต่เหล่าอิล~ ลีท! ถ้ามีชมรมไหนที่ข้า ยูคาริ อิล~ ลีทคนนี้จะต้องเข้าแล้วละก็ ไม่มีที่ไหนที่เหมาะสมไปกว่าที่นี่แล้วเจ้าค่ะ แล้วข้าก็ตั้งใจไว้#nแล้วด้วยเจ้าค่ะ!"
51070-16 = "...แต่ก็นะ ก็เธอไม่ท้อถอยในทุกวันตั้งแต่อยู่ม.ต้นแล้ว "
51070-17 = "ทุกครั้งที่คิเคียวตำหนิว่าเธอไม่ควรเข้ามาอยู่ที่นี่ เธอก็จะทำหน้ามุ่ยเดินกลับไป แล้ววันต่อมาก็มาขอ#nเข้าชมรมเราใหม่อย่างองอาจอยู่ร่ำไปนี่นะ"
51070-18 = "ตื่นไปฝึกฝนตั้งแต่ตอนตีสี่ทุกวัน พอกลับมาก็กินข้าว เข้าเรียน แล้วก็กลับมาฝึกแล้วฝึกอีก ทำแบบนี้มันสนุกตรงไหนกัน..."
51070-20 = "อ๊ะ แต่ว่าข้า ยูคาริ! ชอบการที่ได้ทำกิจกรรมกับรุ่นพี่เรนเกะและรุ่นพี่คนอื่นๆ นะเจ้าคะ"
51070-21 = "ไม่เอาน่า... ถ้าเธอพูดแบบนั้น ฉันก็คงพูดอะไรไม่ออกน่ะสิ"
51070-22 = "แต่ยังไงก็เถอะ... เธอเคยลองจินตนาการถึงอะไรแบบนี้บ้างมั้ย?"
51070-24 = "......?"
51070-25 = "ชีวิตที่ไม่ได้ทำแค่กิจกรรมของเฮียกกะเรียวรัน แต่ได้ไปทำกิจกรรมวัยรุ่นๆ แบบหวานอมเปรี้ยวกับเพื่อนๆ น่ะ..."
51070-26 = "ไม่เคยเลยเจ้าค่ะ!"
51070-27 = "โห... ตอบได้ทันทีเลยแฮะ ยัยเด็กคนนี้นี่"
51070-28 = "แล้วรุ่นพี่เรนเกะล่ะเจ้าคะ? คิดยังไงกับกิจกรรมของเฮียกกะเรียวรันเหรอเจ้าคะ?"
51070-29 = "ก็... ตั้งแต่ตามคิเคียวเข้ามาที่นี่ ฉันก็ได้ทำอะไรสนุกๆ เยอะเลย"
51070-30 = "แล้วก็ได้เจอรุ่นพี่นางุสะ รวมทั้งเธอด้วย... นี่ฉันไม่ได้นึกเสียดายอะไรอยู่หรอกนะ"
51070-35 = "แต่ก็... ถ้าฉันได้ใช้ชีวิตวัยรุ่นที่แตกต่างออกไปบ้างสักนิด..."
51070-36 = "อย่างเช่นในชมรมเชิงวัฒนธรรม ไม่ใช่ชมรมกีฬา..."
51070-42 = "...ตอนนั้นข้ายังไม่เข้าใจเจ้าค่ะว่ารุ่นพี่เขาพูดถึงเรื่องอะไร "
51070-43 = "แต่หลังจากที่ข้า ยูคาริ ได้คุยกับรุ่นพี่แล้ว ก็เกิดความคิดแบบนั้นอยู่บ้างเจ้าค่ะ"
51070-44 = "ความคิดที่ว่า... รุ่นพี่เรนเกะอยากไปทำกิจกรรมของชมรมอื่นรึเปล่า...? ข้ามองว่าตัวเองคิดไปเองด้วย#nนะเจ้าคะ แต่ก็..."
51070-45 = "[s] \"แต่ก็เป็นการคุยเรื่องความค้างคาใจของวัยรุ่นไม่ใช่เหรอ?!\""
51070-49 = "เฮือก! จริงด้วยเจ้าค่ะ!"
51070-50 = "อย่าบอกนะว่า... ถ้างั้นตอนนี้รุ่นพี่เรนเกะก็..."
51070-51 = "ออกเดินทางไปเสาะหาชีวิตวัยรุ่นตามที่เขียนบอกในกระดาษโน้ตจริงๆ!?"
51070-52 = "ก็ว่าอยู่ว่ารุ่นพี่เขาไม่มีทางพูดเล่นๆ ตอนที่บอกว่า <หากอยากใช้ชีวิตวัยรุ่นก็ต้องไปทำกิจกรรมของ#nชมรมสายวัฒนธรรมสิ มันต้องดีกว่ากิจกรรมของเฮียกกะเรียวรันที่มีแต่เสียเหงื่ออยู่แล้ว>"
51070-53 = "[s] \"แต่แค่ฟังก็รู้เลยนะว่าหมายความแบบนั้นแน่ๆ!\""
51070-54 = "อืม... แต่ปกติรุ่นพี่เรนเกะเป็นคนที่ทั้งทุ่มเทและกล้าหาญเกินใคร แถมยังช่วยป้องกันไม่ให้พวกข้าได้#nรับบาดเจ็บด้วย..."
51070-55 = "หลังจากรุ่นพี่นางุสะหายตัวไป... ไม่สิ ต้องบอกว่าหลังจากกิจกรรมของเฮียกกะเรียวรันถูกระงับ..."
51070-59 = "รุ่นพี่เรนเกะก็ทนไม่ไหวแล้วไปปลดปล่อยความปรารถนาอันแรงกล้าของวัยรุ่น! ต้องเป็นเช่นนี้แน่นอน#nเจ้าค่ะ!"
51070-60 = "นี่ไม่ใช่เวลาที่จะพูดว่า เอาละ! แต่เราต้องไปตามหารุ่นพี่กันแล้วละเจ้าค่ะท่านอาจารย์!"
51070-66 = "ว่าแต่... ข้า..."
51070-72 = "ควรไปที่ไหนดีล่ะเจ้าคะ?"
51070-79 = "[ns] \"นี่คือลิสต์ของชมรมเชิงวัฒนธรรมที่คาโฮะให้ครูมา\""
51070-80 = "ได้ลิสต์ชมรมมาจากชมรมหยินหยางง่ายๆ แบบนี้เลยเหรอเจ้าคะ!"
51070-81 = "สะ... สุดยอดไปเลยเจ้าค่ะ!"
51070-82 = "เฮือก... หรือนี่คืออำนาจของชัล~ เล่ต์... ที่ต่อให้เป็นหัวหน้ากับรองหัวหน้าของชมรมหยินหยางก็ต้อง#nยอมจำนนให้...?"
51070-83 = "นี่ข้า ยูคาริ กำลังอยู่กับบุคคลอันตรายเหรอเจ้าคะ?!"
51070-84 = "[s] \"เข้าใจผิดแล้ว...\""
51070-85 = "อืม!"
51070-86 = "เอาเถอะเจ้าค่ะ เราไปตามหารุ่นพี่เรนเกะตามลิส~ สึถึ~ ที่ได้มากันเถอะเจ้าค่ะ!"
51070-88 = "ชมรมศึกษาระบบนิเวศคลอเรลลา"
51070-90 = "ชมรมแรกในในลิส~ สึถึ~ คือที่นี่สินะเจ้าคะ..."
51070-91 = "ถ้างั้นก็..."
51070-95 = "ขอเสียมารยาทละนะเจ้าคะ!"
51070-107 = "หืม? มีแขกมาเหรอ?"
51070-108 = "อะไรกัน? มีเรื่องอะไรเหรอ?"
51070-109 = "[s] \"สวัสดี พอดีครูมาเพราะ...\""
51070-111 = "เจ้าค่ะ! พวกข้ามาตามหารุ่นพี่เรนเกะเจ้าค่ะ!"
51070-113 = "เรนเกะ...?"
51070-114 = "พูดอะไรของเธอ? เรนเกะ? หมายถึงใครเหรอ?"
51070-116 = "รุ่นพี่เรนเกะ..."
51070-117 = "รุ่นพี่เรนเกะไงเจ้าคะ!"
51070-119 = "...หืม?"
51070-122 = "[ns] \"ยูคาริ ต้องบอกรายละเอียดอีกหน่อยสิ...\""
51070-123 = "อ๊ะ งั้นเหรอเจ้าคะ?"
51070-124 = "อืม... ถ้าจะให้อธิบายเกี่ยวกับรุ่นพี่เรนเกะ..."
51070-125 = "บางทีพี่เขาก็จะดุว่า <ใครหน้าไหนที่โดดซ้อมตอนเช้าจะถูกลงโทษ!>"
51070-126 = "หรือบางครั้งก็หัวเราะเหมือนเป็นเรื่องสนุกเวลาเห็นข้ากินข้าวแล้วข้าวไปติดอยู่ที่มุมปาก..."
51070-127 = "หรือบางครั้งที่ไปซื้อของด้วยกันโดยบังเอิญ ถ้ารุ่นพี่เจอพวกปีศาจป่วนอยู่บนถนนก็จะวิ่งเข้าไปจัดการ#nทันที... สรุปว่ารุ่นพี่เป็นคนที่ข้าเคารพมากๆ เจ้าค่ะ..."
51070-132 = "ขอโทษนะ ไม่เห็นจะเข้าใจเลย"
51070-134 = "จะ... เจ้าคะ?! แค่นี้ยังอธิบายไม่พออีกเหรอเจ้าคะ?!"
51070-135 = "[s1] \"แต่ว่าข้อมูลที่ยูคาริเพิ่งอธิบายไป...\"\n[s2] \"มันเป็นการบอกว่ายูคาริคิดกับเรนเกะยังไงมากกว่าหรือเปล่า...\""
51070-138 = "อืม... ถ้าไม่เอาแบบนี้"
51070-139 = "แต่ให้บอกข้อมูลที่เป็นรูปธรรมละก็... รุ่นพี่เรนเกะ... ผมสีแดง ทำผมทรงเท่ๆ..."
51070-141 = "ผมสีแดง?"
51070-142 = "[s] \"แบบนี้คงหาตัวไม่เจอแน่เลย...\""
51070-143 = "ถ้าผมสีแดง หรือว่าจะเป็นคนนั้นที่มาลองทำกิจกรรมของชมรมก่อนหน้านี้?"
51070-149 = "อ่า... คนที่ใส่เสื้อฮาโอริสีครามใช่มั้ย?"
51070-151 = "ใช่เจ้าค่ะ คนนั้นเลยเจ้าค่ะ! รุ่นพี่เขามาที่ชมรมนี้จริงๆ ด้วยนี่เอง!"
51070-152 = "ถ้าเป็นรุ่นพี่เรนเกะละก็ ต้องมาโชว์ความสามารถระดับเอซใน <ชมรมสังเกตระบบนิเวศคลอเรลลา> แน่ๆ...!"
51070-154 = "จะว่ายังไงดี... เห็นมาพูดแต่อะไรที่... เข้าใจยากๆ น่ะ"
51070-155 = "อย่างเช่น <เรามาฝึกฝนโต้รุ่งเพื่อไปแข่งระดับประเทศกันเถอะ! เรื่องพละกำลัง ฉันไม่เป็นรองใครแน่!> อะไรทำนองนั้น"
51070-156 = "...ว่าแต่ ชมรมสังเกตระบบนิเวศคลอเรลลากับการแข่งขันระดับประเทศนี่ เคยมีอะไรแบบนี้ด้วยเหรอ?"
51070-157 = "อ้อ เห็นพูดทำนองว่า <โชว์ของที่ชมรมสังเกตระบบนิเวศคลอเรลลามีมาเลย! ฉันจะใช้พละกำลังเข้า#nช่วยเพื่อให้พวกเธอไม่ต้องอับอาย!> ด้วยนะ แต่ฟังแล้วมัน..."
51070-163 = "[ns] \"อืม พอได้ฟังก็ดูเหมือน...\""
51070-165 = "...นี่แหละเจ้าค่ะผลงานของรุ่นพี่เรนเกะ!"
51070-169 = "[ns] \"หืม?! ผะ... ผลงานแน่เหรอ?!\""
51070-170 = "รุ่นพี่เรนเกะไม่ใช่คนที่จะประนีประนอมน่ะเจ้าค่ะ!"
51070-171 = "เอาละ ทุกคนคะ ตอนนี้รุ่นพี่เรนเกะคนนั้นอยู่ที่ไหน...!"
51070-172 = "อ้อ ไม่อยู่ที่นี่หรอก"
51070-173 = "ในวันที่หมดเขตการลองทำกิจกรรมของชมรม..."
51070-180 = "อึกก! ขอโทษนะ...!"
51070-181 = "ตลอดช่วงลองทำกิจกรรมของชมรม 2-3 วันที่ผ่านมา... ฉันพยายามแต่จะพูดและทำตามอำเภอใจ#nจนไปรบกวนทุกคนเข้า"
51070-186 = "ไม่หรอก... ก็ไม่ถึงกับขนาดนั้น..."
51070-188 = "...แต่ยังไงก็ขอบใจที่ทำให้ฉันคิดได้นะ"
51070-190 = "หืม?  "
51070-191 = "พอได้เห็นพวกเธอสังเกตระบบนิเวศของคลอเรลลากันอย่างจริงจัง ฉันก็รู้สึกได้ถึงความครึ่งๆ กลางๆ ของฉันที่รู้อะไรแค่ผิวเผินน่ะ"
51070-192 = "แต่พอกับพวกเธอที่ทุ่มเททั้งชีวิตให้กับกิจกรรมของชมรมนี้แล้ว ฉันเทียบไม่ติดเลย"
51070-193 = "ไม่นะ ฉันก็ไม่เคยทุ่มเทให้ทั้งชีวิต..."
51070-194 = "เพราะงี้ฉันถึงรู้สึกผิดไง ขอโทษนะ! ถึงจะน่าเสียดาย... แต่ฉันคงล้มเลิกความตั้งใจจะเข้าชมรมอย่าง#nเป็นทางการแล้วละ "
51070-195 = "อ่า แต่ความตั้งใจอันแรงกล้าของพวกเธอน่ะ! ฉันเข้าใจอย่างลึกซึ้งเลยนะ! แล้วฉันจะเป็นกำลังใจเรื่อง#nการสังเกตคลอเรลลาให้เสมอเลย!"
51070-197 = "ไว้เข้าแข่งขันระดับประเทศเมื่อไรละก็! ฉันจะมาเชียร์ให้ได้เลย!"
51070-204 = "... เห็นพูดแบบนั้นแล้วก็หายไปเลยหลังหมดช่วงลองทำกิจกรรมของชมรมน่ะ"
51070-205 = "ว่าแต่..."
51070-206 = "เรื่องการแข่งสังเกตระบบนิเวศคลอเรลลาระดับประเทศน่ะ... เราสมัครเตรียมแข่งขันไว้ตอนนี้จะดีไหม?"
51070-208 = "งั้นเหรอเจ้าคะ..."
51070-209 = "งั้นพอจะรู้ไหมเจ้าคะว่ารุ่นพี่ไปที่ไหนแล้ว?"
51070-210 = "ไม่รู้สิ... เราอยู่ชมรมการสังเกตก็จริง"
51070-211 = "แต่ช่วงนี้เราต่างก็ยุ่งกับการเตรียมของที่จะจัดแสดงใน <เทศกาลโคมไฟ> ฉันไม่ทันได้สังเกตหรอกนะว่า#nรุ่นพี่ของเธอไปที่ไหน"
51070-214 = "[ns] \"น่าเสียดายจังที่ไม่ได้เจอเรนเกะ\""
51070-215 = "เจ้าค่ะ แต่การที่เราตรวจสอบมาว่ารุ่นพี่เรนเกะกำลังทำกิจกรรมของชมรมเชิงวัฒนธรรมถือว่าเป็น#nประโยชน์มากเลยเจ้าค่ะ!"
51070-219 = "ในเมื่อเรามาถูกทางแล้ว งั้นก็ไปที่ชมรมต่อไปกันเลยเจ้าค่ะ!"
51070-221 = "ชมรมหมากรุกญี่ปุ่น"
51070-223 = "เด็กหัวแดงจากเฮียกกะเรียวรันน่ะ"
51070-224 = "อื้ม ฉันจำได้ เธอมาชมรมพวกเราด้วย"
51070-225 = "ยังไงดีล่ะ... ก็ดูเป็นคนที่โดดเด่นเอาเรื่องอยู่นะ?"
51070-226 = "อื้ม ตอนดวลหมากรุกก็โดนต้อนเอาซะจนมุมเลย แถมยังพูดว่า \"ให้ฉันอ่อนให้มั้ย?\" อีก"
51070-231 = "บะ... แบบนี้มัน...! ถ้าตามกติกาแล้วจะทำแบบนี้ไม่ได้... แต่กับในกิจกรรมชมรมที่ถือว่าเป็นกิจกรรมเพื่อ#nมิตรภาพก็ถือว่า... เป็นการเล่นนอกกฎที่ยอมรับได้...! "
51070-232 = "แต่...! แต่ว่า!"
51070-233 = "ไม่เอาอันนั้นเหรอ?"
51070-237 = "งั้นก็ใช้ตัวขุนนี้เลย!"
51070-242 = "แพ้แล้วววว!!"
51070-245 = "พอแข่งจนตัวเองแพ้เรื่อยๆ เธอก็บอกว่าหมดหวังกับตัวเองที่ไม่ค่อยได้เรื่อง แล้วก็พูดขอโทษแล้วเดิน#nคอตกออกไปเลย"
51070-247 = "แบบนั้นน่ะ...! เป็นรุ่นพี่เรนเกะแน่นอนเลยเจ้าค่ะ!"
51070-249 = "ชมรมฟิตเนส ราคุโกะ"
51070-250 = "อ้อ เรนเกะเหรอ เธอก็มาที่นี่เหมือนกัน"
51070-251 = "เห็นบอกว่าได้ฟังเรื่องราวของพวกเราแล้วก็กำลังสานฝันของวัยรุ่นอยู่ เราก็เลยดีใจที่ได้ยินแบบนั้น"
51070-252 = "แต่ตอนนี้พวกเราต่างก็ยุ่งกับการเตรียมงานเทศกาลกันน่ะ เลยไม่มีเวลารับสมาชิกเพิ่ม ก็เลยปฏิเสธการ#nเข้าชมรมไป"
51070-254 = "ชมรมประลองไพ่คารุตะ"
51070-255 = "อ้อ ใช่ๆ มีคนที่ว่าเข้ามาด้วย"
51070-256 = "เห็นว่าตัวเองมุ่งมั่นที่จะดวลไพ่คารุตะด้วยความร้อนแรงของวัยรุ่น..."
51070-257 = "แต่ก็นะ เรายังรับสมาชิกใหม่ไม่ได้เพราะยุ่งอยู่กับงานเทศกาลที่กำลังจะมาถึง..."
51070-264 = "(คุณครูกำลังคิดว่าตัวเองแวะไปกี่ชมรมกันแล้ว)"
51070-268 = "[ns] \"เอ้านี่ เครื่องดื่ม\""
51070-272 = "อ่า ขอบพระคุณเจ้าค่ะ..."
51070-273 = "(ทั้งสองคนแวะไปหลายต่อหลายชมรมแล้ว แต่ก็ยังไม่เจอเรนเกะสักที)"
51070-274 = "ไม่คิดเลยเจ้าค่ะว่ารุ่นพี่เรนเกะจะไปลองทำกิจกรรมของหลายชมรมแบบนี้..."
51070-275 = "แต่ถึงอย่างนั้นก็เถอะ... คำพูดที่คนอื่นพูดถึงรุ่นพี่เรนเกะมันช่าง..."
51070-276 = "[s] \"นั่นสิ ทุกคน...\""
51070-277 = "ใช่เจ้าค่ะ! ทุกคนเลย! ทุกคนประเมินรุ่นพี่เรนเกะไว้อย่างดีเลยเจ้าค่ะ!"
51070-278 = "เจ้าคะ? คิดว่าฉันพูดอะไรผิดเหรอเจ้าคะ?"
51070-279 = "ฮุฮุฮุ อะไรของท่านอาจารย์น่ะ!"
51070-280 = "เรื่องที่พูดออกมาน่ะ มันขึ้นอยู่กับการรับรู้และการถ่ายทอดออกมาเจ้าค่ะ"
51070-281 = "การที่ทุกคนพูดเกี่ยวกับรุ่นพี่เรนเกะได้เป็นฉากๆ คือหลักฐานสนับสนุนว่าตอนนี้รุ่นพี่เขากำลังทุ่มเทกับ#nการทำกิจกรรมของชมรมมาก!"
51070-282 = "ปกติแล้วรุ่นพี่เรนเกะจะเป็นคนที่ไม่ประนีประนอมกับตัวเองและคนอื่น แล้วก็ไม่ทำอะไรครึ่งๆ กลางๆ ด้วยเจ้าค่ะ"
51070-283 = "[s] \"ยูคาริชอบและเชื่อถือเรนเกะมากเลยนะเนี่ย\""
51070-284 = "ใช่เจ้าค่ะ! ข้านับถือรุ่นพี่เรนเกะมากเจ้าค่ะ!"
51070-285 = "ฮืม"
51070-289 = "ถ้างั้นต่อไปพวกเราต้องไปที่ไหน..."
51070-291 = "เจอคุณครูแล้ว!!"
51070-300 = "[ns] \"วะ... เหวอ?!\""
51070-304 = "[ns] \"คาเอเดะ?!\""
51070-306 = "ทะ... ท่านอาจารย์?!  เป็นอะไรหรือเปล่าเจ้าคะ?!"
51070-307 = "คะ... คาเอเดะจัง?! ไปโถมตัวเข้าหาแบบนั้น คุณครูก็ลำบากสิคะ!"
51070-308 = "ฮ้าววว..."

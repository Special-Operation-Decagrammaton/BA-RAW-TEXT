[translation]
51070-1 = "Episode 7;A Girl's Devotion to Youth(?) 1"
51070-3 = "[ns] \"Youth? What's does that mean?\""
51070-4 = "...Ah! Now that I think about it..."
51070-5 = "Renge's said something like this before."
51070-11 = "That reminds me, Yukari. You've wanted to join us since you were in middle school."
51070-12 = "Yes!"
51070-13 = "Heh. You yelled something like \"It was decided by that fateful night!\", right?"
51070-14 = "When I heard that, I thought you were the strangest recruit we'd ever have. Imagine a kid wanting to join an exhausting place like this."
51070-15 = "What do you mean?! The Hyakkaryouran is where the elite come together to fight for justice! I, Yukari, knew from the start that it was the only club for me!"
51070-16 = "...So you've always been like this, then. Or at least since middle school, huh? "
51070-17 = "When Kikyou told you off for trying to join, you left with the longest face I'd ever seen. Then you came back the next day as if nothing happened."
51070-18 = "Rain or shine, you'd arrive at 4 in the morning to train with a smile on your face, leave for breakfast, go to class, then train and train some more. What you find so appealing about that I'll never know."
51070-20 = "Ah, but I, Yukari, enjoy being with Renge and the others!"
51070-21 = "Well... You're not too bad yourself when all's said and done."
51070-22 = "But still... Have you ever had those thoughts?"
51070-24 = "...?"
51070-25 = "Haven't you ever thought about the bittersweet moments of youth you might be having if you weren't so devoted to your duties with the Hyakkaryouran...?"
51070-26 = "No, not in the slightest!"
51070-27 = "Phew... What a quick response."
51070-28 = "What about you, Renge? I'm sure there are many things you could tell me about the Hyakkaryouran!"
51070-29 = "...Well, I've had a lot of fun since Kikyou and I joined this place."
51070-30 = "I met Nagusa and you... So I can't say I regret it."
51070-35 = "But still, if I could have spent my youth in a different way..."
51070-36 = "I might prefer a humanities club rather than one with so many physical activities─"
51070-42 = "...I couldn't understand what she was saying. I thought she was testing my commitment as a new recruit... "
51070-43 = "But afterwards I, Yukari, found that conversation coming back to my mind from time to time."
51070-44 = "Could Renge truly be interested in joining other clubs? Maybe I'm worrying too much, but..."
51070-45 = "[s] \"No matter how you look at it, wasn't she full of regret for her lost youth?!\""
51070-49 = "*gasp* Then I was right!"
51070-50 = "I see... That means Renge..."
51070-51 = "She went off to find her youth like this note claims?!"
51070-52 = "Then she wasn't saying things like \"Yeah, humanities clubs are the place to be young, they sound so much better than sweaty Hyakkaryouran activities.\" to test me!"
51070-53 = "[s] \"I...I think you can be 100% certain of that.\""
51070-54 = "Hmm, Renge always took the lead. She worked hard to make sure none of us were ever hurt."
51070-55 = "But after Nagusa vanished... And especially after the Hyakkaryouran fell into inactivity..."
51070-59 = "Renge could no longer suppress her desire to be young again! I'm certain of it!"
51070-60 = "We should be looking for her instead of wasting our time here, Sensei!"
51070-66 = "But, um..."
51070-72 = "Where should we go?"
51070-79 = "[ns] \"Here, this is a list of humanities clubs I got from Kaho.\""
51070-80 = "You convinced the Yin-Yang Club to share club information that easily?!"
51070-81 = "Th-That's amazing!"
51070-82 = "For the president and vice president of the Yin-Yang Club to succumb so quickly... *gasp* I-Is this the infamous authority of Schale?"
51070-83 = "Am I, Yukari, actually in the clutches of a supremely dangerous individual?!"
51070-84 = "[s] \"P-Please, no more misunderstandings...\""
51070-85 = "Hmm!"
51070-86 = "Anyway, we can start searching for Renge with this list!"
51070-88 = "Chlorella Ecology Club"
51070-90 = "According to the list... This is the headquarters of the first club..."
51070-91 = "Now then..."
51070-95 = "Pardon us!"
51070-107 = "Hm? A visitor?"
51070-108 = "Huh? Hello?"
51070-109 = "[s] \"Hello! Sorry to bother you, we're here—\""
51070-111 = "We're here for Renge! Reveal her at once!"
51070-113 = "...Renge?"
51070-114 = "What are you talking about? Who is Renge?"
51070-116 = "Renge is, uh..."
51070-117 = "Renge!"
51070-119 = "...Wha?"
51070-122 = "[ns] \"Yukari, they need more details...\""
51070-123 = "Ah, r-really?"
51070-124 = "Mmm... Details about Renge..."
51070-125 = "She scolds me if I sleep through morning training and runs extra laps with me as punishment..."
51070-126 = "And she laughs if I have rice on my lips, she thinks it's funny..."
51070-127 = "And when we went out shopping together and saw the Mouryo harassing people, she didn't hold back for a moment! She rounded them up before they knew what was happening... She's someone I really look up to..."
51070-132 = "...Sorry, I don't know who you're talking about."
51070-134 = "H-Huh?! How isn't that enough?!"
51070-135 = "[s1] \"How you feel about Renge is clear, but...\"\n[s2] \"Perhaps you should try describing her appearance.\""
51070-138 = "Hmm... I see..."
51070-139 = "What most people notice about Renge...is her incredibly cool red hair..."
51070-141 = "Red hair?"
51070-142 = "[s] \"Maybe we should rethink our approach...\""
51070-143 = "Red hair... She isn't talking about that girl who visited us recently, is she?"
51070-149 = "Ah... The one with the sky blue haori?"
51070-151 = "Yes, that's her! I knew she would come to this club!"
51070-152 = "Knowing Renge, she must be the Chlorella Ecology Club's new ace!"
51070-154 = "She, uh... I guess she said some stuff that was difficult to understand?"
51070-155 = "She was saying stuff like \"Let's practice all night! It's time to aim for the national championship! My stamina is unbeatable!\"."
51070-156 = "...Is there even a championship for Chlorella observation? "
51070-157 = "She also said things like \"Teach me everything there is to know about Chlorella! I'll do my best, you guys won't be ashamed of me!\", which was a bit..."
51070-163 = "[ns] \"That's...quite an impression.\""
51070-165 = "...As expected, an amazing performance from Renge!"
51070-169 = "[ns] \"Huh?! Thats an amazing performance?!\""
51070-170 = "Renge never compromises!"
51070-171 = "I'm sorry to take her from you, but you can tell Renge to come out now!"
51070-172 = "Ah, she's not here..."
51070-173 = "On the day her trial period ended..."
51070-180 = "Ugh! I'm sorry...!"
51070-181 = "These past few days... You all went through the trouble of showing your new junior the ropes."
51070-186 = "It really wasn't that much..."
51070-188 = "It made me realize..."
51070-190 = "Hm?"
51070-191 = "After seeing how seriously you observe Chlorella, I knew I was only scratching the surface."
51070-192 = "My halfhearted efforts could never compare to yours. You've devoted your lives to your club activities, while I..."
51070-193 = "N-No, we barely spend any time here at all..."
51070-194 = "Forgive me! I have no choice...but to resign my membership! "
51070-195 = "Ah, but I've been inspired by your burning passion! So I'll keep rooting for Chlorella observation!"
51070-197 = "I'll make sure to come and support you at the national championship!"
51070-204 = "...And then she took off as soon as her trial period ended."
51070-205 = "By the way..."
51070-206 = "Shouldn't we at least try to sign up for the...Chlorella Observation Championship? I kind of want to make her proud..."
51070-208 = "A-Ah...then she's not here..."
51070-209 = "Do you have any idea of where she went?"
51070-210 = "Well..."
51070-211 = "All of the clubs are busy preparing for the Lantern Festival, so we're not sure."
51070-214 = "[ns] \"It's unfortunate that we couldn't find Renge.\""
51070-215 = "Yes, but we confirmed that Renge is investigating the humanities, as we expected!"
51070-219 = "Our method is solid, so let's find the next club!"
51070-221 = "SF Shogi Strategy Club"
51070-223 = "The Hyakkaryouran girl with red hair?"
51070-224 = "Yeah, I remember. She came to our club too."
51070-225 = "She's...a bit odd, huh?"
51070-226 = "She was losing pretty badly at a game of shogi, so I asked her if she wanted me to retract my move..."
51070-231 = "A-Ah...! Th-Then while it's against the official rules... Y-You cut club members some slack to keep games f-friendly...! "
51070-232 = "But...! But!"
51070-233 = "Ah, you don't want that?"
51070-237 = "Then this makes checkmate."
51070-242 = "I looooost!!!"
51070-245 = "Then she apologized, saying she was disappointed in herself for hesitating, and fled."
51070-247 = "Ha! I wouldn't expect anything less from Renge!"
51070-249 = "Rakugo Fitness Club"
51070-250 = "Ah, Renge dropped by here as well."
51070-251 = "We were thrilled to see her interest. She told us she wished to grow her dreams of youth by listening to our rakugo performances."
51070-252 = "But we were forced to turn down her application. We just don't have time for new members while we're preparing for the festival."
51070-254 = "Battle Karuta Club"
51070-255 = "Ah, yeah. We did have someone like that."
51070-256 = "She said she was looking forward to proving her youth in passionate karuta battles..."
51070-257 = "Well, we couldn't accept her because the festival is about to start."
51070-264 = "We visited many more clubs afterwards."
51070-268 = "[ns] \"Here, drink some water.\""
51070-272 = "Ah, yes. Thank you..."
51070-273 = "Renge had been seen all over the place, but we couldn't find any clues of her current whereabouts."
51070-274 = "I didn't expect Renge to apply to so many clubs..."
51070-275 = "But still... Hearing everyone talk about Renge..."
51070-276 = "[s] \"Some of them were a bit cheeky...\""
51070-277 = "Yes! It was wonderful to hear them talk about their high regard for Renge in a cheeky way!"
51070-278 = "...Oh? You don't think that's what \"cheeky\" means?"
51070-279 = "Heehee, that's silly!"
51070-280 = "What other people say is all up to how you take it!"
51070-281 = "They all remembered Renge and talked about her! She made an impression on everyone because she was trying her best at their club activities!"
51070-282 = "Like Renge always told me, \"Don't be half-hearted, you've got to see things through!\""
51070-283 = "[s] \"You must trust Renge a lot.\""
51070-284 = "Yes! I, Yukari, admire her deeply!"
51070-285 = "A-Ahem."
51070-289 = "Now, um, where should we go next..."
51070-291 = "Found you, Sensei!"
51070-300 = "[ns] \"Wh-What?!\""
51070-304 = "[ns] \"Kaede?!\""
51070-306 = "S-Sensei?! Are you okay?!"
51070-307 = "K-Kaede?! You shouldn't trouble Sensei so!"
51070-308 = "*yawn*"
51070-309 = "[s] \"Kaede, Mimori, and even Tsubaki...?\""
51070-312 = "Next Episode;A Girl's Devotion to Youth(?) 2"

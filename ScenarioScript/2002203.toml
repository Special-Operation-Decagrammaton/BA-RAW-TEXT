[translation]
2002203-1 = "ถึงจะช้าไปสักหน่อย"
2002203-2 = "โรงอาหารเกเฮนน่า"
2002203-3 = "(คุณครูมารอฟูกะที่โรงอาหารของเกเฮนน่าตามที่บอก)"
2002203-8 = "เชิญเลยค่ะคุณครู"
2002203-9 = "[ns] \"เอ๋ ฟูกะ... ชุดนั่น...?\""
2002203-14 = "เป็นยังไงคะ? ฉันดูเป็นยังไงบ้างคะ?"
2002203-15 = "[ns1] \"น่ารักจังเลย! เหมาะที่สุดในโลกเลย!\"\n[ns2] \"ฟูกะตันในชุดกิโมโน–!\""
2002203-18 = "ฮิฮิฮิ... ขอบคุณที่ชมค่ะ"
2002203-19 = "จู่ๆ ก็รู้สึกเขินจนอยากจะหายไปจากตรงนี้เลยค่ะ"
2002203-20 = "คะ? ขอโทษที่ทำให้ฉันต้องมาที่โรงอาหารในวันหยุดงั้นเหรอคะ?"
2002203-21 = "ไม่เป็นไรเลยค่ะ! ยังไงโรงอาหารก็เป็นทั้งสถานที่ศักดิ์สิทธิ์และสนามรบของฉันค่ะ!"
2002203-22 = "วันนี้ฉันจะใช้สถานที่ศักดิ์สิทธิ์แห่งนี้เพื่อคุณครูคนเดียวเลยค่ะ!"
2002203-23 = "แค่คิดแบบนั้น ฉันก็ดีใจมากๆ เลยค่ะ!"
2002203-24 = "[s] \"แต่ว่า... ไม่ได้ฝืนมาเข้างาน(?) ในวันหยุดหรอกใช่มั้ย?\""
2002203-25 = "โธ่ แค่นี้ไม่เท่าไหร่หรอกค่ะ"
2002203-29 = "รอสักครู่นะคะ ฉันมีเตรียมวัตถุดิบไว้ก่อนบ้างแล้ว"
2002203-30 = "เดี๋ยวจะทำสุดยอดโทชิโคชิโซบะให้คุณครูเองค่ะ!"
2002203-37 = "ฉันทำซุปปลาโอแช่ไว้ในตู้เย็นแล้ว..."
2002203-43 = "หั่นต้นหอมใหญ่กับเนื้อน่องไก่ที่หมักไว้ให้เป็นชิ้นพอดีคำ..."
2002203-49 = "นำต้นหอมไปย่าง จากนั้นก็นำเนื้อน่องไก่ทาน้ำมันต้นหอมไปย่าง..."
2002203-50 = "ใส่น้ำตาล ซีอิ๊ว แล้วก็มิรินลงในซุปปลาโอ แล้วก็ปรุงรสสักหน่อย..."
2002203-55 = "ต้มเส้นโซบะแล้วก็เอาไปสะเด็ดในน้ำเย็นทันที..."
2002203-61 = "สุดท้ายก็รินน้ำซุปลงไป และตกแต่งจาน..."
2002203-62 = "เสร็จแล้วค่ะคุณครู! โทชิโคชิโซบะสำหรับ 2 คนค่ะ!"
2002203-63 = "กลิ่นของน้ำซุป เนื้อไก่ และต้นหอมที่ผสมเข้าด้วยกัน... ก็ไม่แย่เลยนะคะ"
2002203-64 = "ตอนแรกฉันว่าจะเตรียมเทมปุระกุ้งเอาไว้ด้วย แต่ว่า..."
2002203-65 = "[s3] \"แค่นี้ก็พอแล้วละ...\"\n[s4] \"แค่นี้ก็สุดยอดแล้วละ\""
2002203-68 = "ยะ... อย่างนั้นเหรอคะ...? ค่อยยังชั่วหน่อยค่ะ ฮิฮิฮิ..."
2002203-69 = "ถ้างั้น... ทานให้อร่อยนะคะ!"
2002203-70 = "[s] \"จะทานแล้วนะ\""
2002203-71 = "จะทานแล้วนะคะ"
2002203-73 = "(คุณครูนั่งกินโซบะกับฟูกะจนเกลี้ยงจาน)"
2002203-75 = "ปะ... เป็นยังไงบ้างคะ? ถูกปากรึเปล่าคะ..."
2002203-76 = "[s5] \"สุดยอดเลย สมกับเป็นฟูกะจริงๆ\"\n[s6] \"เป็นโทชิโคชิโซบะที่อร่อยที่สุดที่ครูเคยกินเลย\""
2002203-79 = "จริงเหรอคะ? ขอบคุณค่ะ!"
2002203-80 = "ฉัน... ชอบเวลาที่ได้ทำอาหารอร่อยๆ ให้คนอื่นทานค่ะ"
2002203-81 = "และถ้าคนที่ชื่นชอบอาหารของฉันคือคุณครูละก็... มะ... ไม่มีอะไรน่ายินดีกว่านี้แล้วละค่ะ"
2002203-82 = "ขอบคุณที่ชวนมาวันนี้งั้นเหรอคะ?"
2002203-83 = "มะ... ไม่เป็นไรเลยค่ะ! ฉันต่างหากที่ต้องเป็นฝ่ายขอบคุณคุณครูค่ะ"
2002203-84 = "ถึงอาจจะช้าไปสักหน่อย..."
2002203-90 = "แต่ก็ขอให้มีความสุขในวันปีใหม่นะคะ คุณครู!"
2002203-91 = "[ns] \"ขอให้มีความสุขในปีใหม่นะ ฟูกะ\""
2002203-93 = "(หลังจากนั้นคุณครูกับฟูกะก็นั่งคุยกันอย่างเพลิดเพลิน ก่อนจะพาฟูกะไปส่ง)"

[translation]
2002203-1 = "雖遲但到"
2002203-2 = "格黑娜．學生餐廳"
2002203-3 = "（依照風華所說，來到了格黑娜的學生餐廳）"
2002203-8 = "你好，老師。"
2002203-9 = "[ns]「咦，風華。那身衣服……？」"
2002203-14 = "你，你覺得怎麼樣呢……？"
2002203-15 = "[ns1]「全世界最可愛！超適合的哦！」\n[ns2]「是和服風華炭！」"
2002203-18 = "耶嘿嘿……我很高興你能這麼說。"
2002203-19 = "不，不過果然還是有點害羞呢。#n因為是不太習慣的打扮，所以有點難以冷靜。"
2002203-20 = "咦，假日還找我很抱歉……？"
2002203-21 = "沒關係的！這裡對我來說是戰場也是聖地！"
2002203-22 = "而且今天只會為老師一個人使用！"
2002203-23 = "我反而覺得幹勁十足！"
2002203-24 = "[s]「怎麼說呢，好像讓你假日也得工作了……」"
2002203-25 = "沒關係，請別在意！"
2002203-29 = "那麼請老師稍等。事前準備已經完成了。"
2002203-30 = "我會為老師準備最棒的蕎麥麵！"
2002203-37 = "柴魚高湯，OK……"
2002203-43 = "將雞腿肉和大蔥切好……"
2002203-49 = "先烤大蔥，再用蔥油烤雞腿肉……"
2002203-50 = "在另一個鍋子裡的柴魚高湯中加入砂糖、醬油和味醂……"
2002203-55 = "將煮過的麵條迅速放入冷水……"
2002203-61 = "最後倒入醬汁，擺上配菜……"
2002203-62 = "老師，完成了！跨年蕎麥麵！"
2002203-63 = "雞肉的香味配合蔥的風味，味道真不錯呢。"
2002203-64 = "本來還想準備炸蝦的……"
2002203-65 = "[s3]「沒關係，不用在意哦。謝謝。」\n[s4]「不要緊，這樣看起來就已經很好吃了。」"
2002203-68 = "是，是嗎？那就好。耶嘿嘿……"
2002203-69 = "那麼，一起「開動」吧！"
2002203-70 = "[s]「我要開動了！」"
2002203-71 = "嗯，我要開動了！"
2002203-73 = "（將蕎麥湯連同醬汁全都吃得一乾二淨）"
2002203-75 = "味道如何呢？有合老師的口味嗎……？"
2002203-76 = "[s5]「超好吃的唷，不愧是風華。」\n[s6]「可能是我至今吃過最好吃的。」"
2002203-79 = "真的嗎？謝謝！"
2002203-80 = "我……果然很喜歡讓別人津津有味地享用我的料理。"
2002203-81 = "如果是老師就更不用說了……"
2002203-82 = "咦……？"
2002203-83 = "啊，不客氣！該道謝的是我才對！"
2002203-84 = "啊，雖然現在這麼說有點晚了，不過還沒向老師問好呢。"
2002203-90 = "新年快樂，老師！"
2002203-91 = "[ns]「新年快樂，風華。」"
2002203-93 = "（又閒聊一段時間之後，將風華送了回去）"

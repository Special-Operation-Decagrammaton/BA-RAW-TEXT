[translation]
2000008-1 = "Rain Makes Me Emotional"
2000008-2 = "42nd Millennium Library"
2000008-5 = "Oh, Sensei."
2000008-6 = "Are you here to checkout a book?"
2000008-7 = "What? Wondering what I'm doing here?"
2000008-8 = "Heh. I bet you're curious about this book I'm reading."
2000008-9 = "Take a guess!"
2000008-10 = "[s1] \"It's definitely BL.\"\n[s2] \"Something scientific?\"\n[s3] \"Poetry?\""
2000008-11 = "Haha. Nope!"
2000008-12 = "Haha. Nope!"
2000008-13 = "Haha. Nope!"
2000008-14 = "Ta-da! It's this."

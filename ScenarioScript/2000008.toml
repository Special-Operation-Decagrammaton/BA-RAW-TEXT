[translation]
2000008-1 = "อารมณ์ที่อ่อนไหว เมื่อยามเม็ดฝนโปรยปราย"
2000008-2 = "ห้องสมุดเลขที่ 42 มิลเลเนียม"
2000008-5 = "อ่า... คุณครู"
2000008-6 = "คุณครูก็มาหาหนังสือเหมือนกันเหรอ?"
2000008-7 = "หืม? แล้วฉันมาที่นี่ทำไมน่ะเหรอ?"
2000008-8 = "หึหึ อยากรู้เหรอว่าฉันกำลังอ่านอะไรอยู่?"
2000008-9 = "ลองเดาดูสิ"
2000008-10 = "[s1] เรื่อง \"100% BL\" ยังไงล่ะ\n[s2] \"หนังสือวิทยาศาสตร์เหรอ?\"\n[s3] \"กลอน....?\""
2000008-11 = "ฮุฮุ ผิดแล้วละ"
2000008-12 = "ฮุฮุ ผิดแล้วละ"
2000008-13 = "ฮุฮุ ผิดแล้วละ"
2000008-14 = "แต่นแต๊น หนังสือนี่ไงล่ะ"
2000008-15 = "[s] \"<จิตวิทยาเบื้องต้นสำหรับเด็กผู้หญิง>\""
2000008-16 = "ทุกคนเห็นแล้วแปลกใจกันหมดเลย"
2000008-17 = "แต่... พอช่วงนี้ได้ลองทำอะไรหลายๆ อย่างกับคุณครูแล้ว..."
2000008-18 = "ฉันคิดว่าควรเข้าใจความคิดและจิตใจคนอื่นให้ได้เท่ากับที่ฉันเข้าใจเรื่องตรรกะต่างๆ น่ะ"
2000008-19 = "แต่เอาจริงๆ แล้วเรื่องจิตวิทยามันแตกต่างกับพวกฟิสิกส์มากเลย"
2000008-20 = "เป็นเรื่องใหม่สำหรับฉันมากๆ เลยละ"
2000008-21 = "ฟิสิกส์คือการหาเหตุและผลว่าทำไมถึงเกิดระลอกคลื่นบนผิวน้ำในตอนที่โยนหินลงไป"
2000008-22 = "ส่วนจิตวิทยาคือการหาเหตุและผลว่าเหตุใดถึงทำให้ความรู้สึกสั่นคลอนในตอนที่พูดคุยกับบุคคลหนึ่ง"
2000008-23 = "เพราะงั้นวันนี้... ฉันเลยจะมาศึกษาเพิ่มในเรื่องที่ฉันยังบกพร่องอยู่น่ะ"
2000008-24 = "บางที...ฉันอาจจะช่วยทำอะไรที่มีประโยชน์กับคุณครูได้นะ?"
2000008-26 = "หึหึ ขอบคุณที่ชมนะ"
2000008-27 = "อืม... ว่าแต่..."
2000008-28 = "คุณครูไม่ได้มายืมหนังสือเหรอ?"
2000008-29 = "[s] \"ฝนตกน่ะ เลยเข้ามายืมร่มของห้องสมุด\""
2000008-30 = "อ๋อ... แบบนี้นี่เอง"
2000008-31 = "ฉันมีของบางอย่างที่จะช่วยคุณครูได้นะ สิ่งประดิษฐ์ที่ฉันออกแบบขึ้นเอง..."
2000008-32 = "[s] \"ไม่ดีกว่า ร่มธรรมดาแบบนี้ก็ใช้ได้แล้วละ\""
2000008-33 = "อืม... แต่มันไม่มีฟังก์ชั่นระเบิดตัวเองนะ..."
2000008-34 = "เข้าใจแล้ว"
2000008-35 = "ไมสเตอร์แห่งมิลเลเนียมก็ควรจะต้องรับฟังคำสั่งแบบนั้นด้วยเหมือนกัน"
2000008-36 = "ของที่ฉันเตรียมมาให้ก็คือ..."
2000008-37 = "สิ่งประดิษฐ์ชิ้นใหม่ที่จะเปลี่ยนแปลงคำนิยามของคำว่าร่มที่เรารู้จักกันไปตลอดกาล"
2000008-38 = "[s] \"ครูขอแค่ร่มธรรมดาก็พอ...\""
2000008-39 = "อืม... ช่วยไม่ได้ละนะ"
2000008-40 = "ถ้าคุณครูอยากได้ร่มธรรมดาละก็... ฉันมีแค่ร่มคันนี้คันเดียวเอง"
2000008-41 = "......."
2000008-42 = "ฮุฮุ..."
2000008-43 = "ถ้างั้นไปด้วยกันมั้ย?"
2000008-44 = "ถ้าจะไปที่ชาเล่ต์ละก็ มันเป็นทางผ่านของฉันพอดีน่ะ"
2000008-45 = "อ่า... รอเดี๋ยวก่อนนะ ฉันต้องไปยืมหนังสือก่อน"
2000008-51 = "ไปกันเถอะคุณครู"
2000008-54 = "...บางทีร่มธรรมดาๆ ก็ไม่ได้แย่เท่าไหร่นะ"

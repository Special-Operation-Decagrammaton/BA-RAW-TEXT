[translation]
2000008-1 = "雨天的感傷"
2000008-2 = "千年校內第42圖書室"
2000008-5 = "啊，老師。"
2000008-6 = "老師也是來找書的嗎？"
2000008-7 = "嗯？我嗎？"
2000008-8 = "呵呵，想知道我是在讀什麼書嗎？"
2000008-9 = "你要猜猜看嗎？"
2000008-10 = "[s1] 「一定是BL。」\n[s2] 「科學專業書籍？」\n[s3] 「詩集……？」"
2000008-11 = "呵呵，全都不對。"
2000008-12 = "呵呵，全都不對。"
2000008-13 = "呵呵，全都不對。"
2000008-14 = "鏘，是這本。"
2000008-15 = "[s] 「《適合少女的心理學概論》？」"
2000008-16 = "大家都是一臉意外的表情。"
2000008-17 = "不過……最近和老師一起製作各式各樣的物品……"
2000008-18 = "讓我體會到就算追求合理，也必須考量到他人的感受。"
2000008-19 = "但物理學和心理學完全不一樣。"
2000008-20 = "老實說我實在沒辦法習慣。"
2000008-21 = "思考為什麼把石頭丟進水中時水面會生出波紋，這是物理學。"
2000008-22 = "思考為什麼跟人說話時心裡會起波瀾，這是心理學。"
2000008-23 = "今天……我想再針對自己有所欠缺的部分多加學習。"
2000008-24 = "這麼一來……似乎就能做出，更能為老師帶來幫助的東西。"
2000008-26 = "呵呵，謝謝你的稱讚。"
2000008-27 = "嗯？可是……"
2000008-28 = "老師不是來借書的嗎？"
2000008-29 = "[s] 「突然下雨了，我想借雨傘。」"
2000008-30 = "原來是這麼回事。"
2000008-31 = "那麼我正好有個好東西。是我親自製作的……"
2000008-32 = "[s] 「我想借普通的雨傘。」"
2000008-33 = "唔嗯，但這東西沒有搭載自爆功能耶……"
2000008-34 = "我知道了。"
2000008-35 = "任何訂單都應付得了，這才是千年的巨匠。"
2000008-36 = "那麼另外這支傘……"
2000008-37 = "能夠完全顛覆我們以往對於雨傘的觀念。"
2000008-38 = "[s] 「拜託普通的就好……」"
2000008-39 = "唔嗯，真沒辦法。"
2000008-40 = "普通的雨傘……就只有我的了……"
2000008-41 = "……"
2000008-42 = "……呵呵。"
2000008-43 = "要不要一起撐？"
2000008-44 = "如果是要去夏萊的話，那我也會經過。"
2000008-45 = "啊，等我一下。 #n我先去借書。"
2000008-51 = "走吧，老師。"
2000008-54 = "……有時候平凡的雨傘也不錯呢。"

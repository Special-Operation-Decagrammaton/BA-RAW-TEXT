[translation]
10039040-1 = "ตอนที่ 4;เส้นทางแห่งไอดอล: เพลง"
10039040-2 = "อืม... ไหนลองเช็กดูซิ..."
10039040-3 = "เรื่องชุด... เรื่องการซ้อมเต้น... เคลียร์หมดแล้ว..."
10039040-4 = "ขอบคุณนะคะคุณครู ตอนนี้ทุกอย่างเป็นไปอย่างราบรื่นเลยค่ะ"
10039040-5 = "จากนี้ก็เหลือแค่เลือกเพลงแล้วค่ะ..."
10039040-6 = "แล้วก็จะ... จบ... แล้วค่ะ จบแล้วสินะ..."
10039040-10 = "[ns1] \"มารี...? คิดอะไรเหรอ?\"\n[ns2] \"มารี... คิดอะไรอยู่หรือเปล่า?\""
10039040-13 = "หะ... หืม...!? ไม่ค่ะ! ไม่มีอะไรเลยค่ะ"
10039040-14 = "ฉันแค่... ดูรายการสิ่งที่ทำได้แล้ว แล้วก็เหม่ออยู่อย่างนั้น สงสัยฉันจะเหนื่อยน่ะค่ะ แหะๆ"
10039040-15 = "ฉันไม่มีเวลามาอยู่แบบนี้แท้ๆ ต้องรีบเลือกเพลงแล้วค่ะ..."
10039040-16 = "อยู่ตรงนี้เองเหรอ คุณครู ได้จังหวะพอดีเลยนะ"
10039040-17 = "หืม...?"
10039040-18 = "มีใครมาเหรอคะ?"
10039040-19 = "[ns3] \"อุทาฮะ...?\"\n[ns4] \"เอ๋... เสียงนี้มัน...\""
10039040-24 = "ฮุฮุ... ฉันพอรู้เรื่องมาบ้างแล้วละ"
10039040-25 = "ฉันเกือบน้อยใจแล้วนะคุณครู จะทำเรื่องสนุกๆ อย่างเรื่องไอดอลทั้งที..."
10039040-29 = "มีเรื่องสำคัญแบบนี้แต่กลับไม่บอกฉันเลย..."
10039040-30 = "[s5] \"เมื่อกี้พูดว่าอะไรนะ!?\"\n[s6] \"พูดว่าเรื่องสนุกๆ ใช่มั้ย!!\""
10039040-33 = "ไม่ต้องสนใจเรื่องเล็กน้อยนั่นหรอกน่า เอาเป็นว่าอยากได้ความช่วยเหลือใช่มั้ย?"
10039040-34 = "ให้ฉันช่วยเรื่องอะไรเหรอ? เรื่องชุด? ท่าเต้น...?"
10039040-35 = "หรือว่าเพลง...?"
10039040-36 = "เพลงงั้นเหรอ งั้นก็ดีเลยนะ ฉันเตรียมเพลงเอาไว้เผื่อ 2-3 เพลงน่ะ"
10039040-37 = "หืม...? ทำไมฉันถึงเตรียมเพลงไว้งั้นเหรอ?"
10039040-38 = "ก็..."
10039040-39 = "ฉันเองก็จะเข้าร่วมอีเวนต์ด้วยยังไงล่ะ"
10039040-40 = "[s7] \"อุทาฮะกับเพื่อนๆ เหรอ!?\"\n[s8] \"ชมรมวิศวกรรมน่ะเหรอ!?\""
10039040-43 = "ฮุฮุ ทำหน้าตกใจตามเคยเลยนะ"
10039040-44 = "น่าเสียดายที่มีแค่ฉันคนเดียวน่ะ ฉันสมัครแบบโซโล่ไป ไม่ใช่แบบดูโอ้หรือทีมหรอก"
10039040-45 = "ที่จริงฉันก็ลองชวนฮิบิกิกับโคโทริดูแล้ว แต่น่าเสียดายที่สไตล์เพลงของพวกเราไม่ตรงกัน"
10039040-46 = "2 คนนั้น... น่าจะยังต้องใช้เวลาอีกหน่อยน่ะ"
10039040-47 = "แต่การถ่ายทอดสิ่งที่ตัวเองรักให้กับคนเหล่านั้นก็ถือเป็นคุณค่าของไอดอลเหมือนกัน"
10039040-48 = "ถ้าได้ดูการแสดงจากฉันละก็ ฉันเชื่อว่าสองคนนั้นก็น่าจะมีความคิดที่เปลี่ยนไป"
10039040-49 = "คุณค่า... ของไอดอล...?"
10039040-50 = "ใช่แล้วละ ทุกคนต่างก็มีเหตุผลที่อยากขึ้นไปแสดงบนเวทีไอดอลไม่ใช่เหรอ?"
10039040-51 = "ไม่ว่าจะเป็นความรู้สึกที่อยากสื่อ คำที่อยากบอก ชื่อที่อยากเรียก..."
10039040-52 = "สำหรับฉันคือการให้ทุกคนได้เห็น <สายฟ้า เวอร์ชั่นลูกบอลดิสโก้> ที่เป็นผลงานอันน่าภาคภูมิใจของ#nฉันน่ะ นี่คือ 'ความจริงใจ' ของคนที่จะไปอยู่บนเวที"
10039040-53 = "ไอดอลกับไมสเตอร์มีส่วนที่คล้ายกันในแง่ของการแสดงออกและสื่อสารต่อหน้าผู้คนจำนวนมากน่ะ"
10039040-54 = "จะว่าไป คนที่อยู่ตรงนั้น..."
10039040-55 = "คือคุณซิสเตอร์จากชมรมซิสเตอร์เหรอ? อ่า... อย่างนี้นี่เอง"
10039040-56 = "อืม..."
10039040-57 = "อย่างนี้นี่เองสินะ คนที่เตรียมตัวจะเป็นไอดอลไม่ใช่คุณครู แต่เป็นคุณซิสเตอร์นี่เอง"
10039040-58 = "[s9] \"เดี๋ยวนะ ก่อนหน้านี้คิดอะไรอยู่น่ะ...\"\n[s10] \"นี่มันงานของนักเรียนนะ งานของนักเรียน\""
10039040-61 = "ฉันล้อเล่นหรอกน่า"
10039040-62 = "เท่จังเลยนะคุณซิสเตอร์ แบบนี้ฉันก็ยิ่งอยากช่วยแล้วสิ"
10039040-63 = "คุณซิสเตอร์ต้องเป็นไอดอลเท่ๆ ได้แน่นอน ไมสเตอร์มองเห็นอัญมณีที่ยังไม่ได้เจียระไนได้อยู่แล้ว เชื่อสายตาของฉันได้เลย"
10039040-64 = "อ่า ค่ะ ค่ะ! ขอบคุณค่ะ!"
10039040-69 = "เอ๊ะ เอ๋...?"
10039040-70 = "ฉันเหรอคะ...? เมื่อกี้พูดถึงฉันเหรอคะ?"
10039040-71 = "อื้อ ก็ใช่น่ะสิ"
10039040-72 = "ทำไมเหรอ? คุณซิสเตอร์ไม่ได้จะเป็นไอดอลหรอกเหรอ? ถ้างั้น..."
10039040-73 = "หรือว่าคุณครู...?"
10039040-74 = "[s11] \"ไม่ใช่ ไม่ใช่อย่างนั้นหรอก\"\n[s12] \"ก็เพิ่งบอกไปนี่ว่าไม่ใช่\""
10039040-77 = "แหะๆๆ... ขอบคุณที่ช่วยพูดอย่างนั้นนะคะ แต่ว่าฉันก็แค่ช่วยคนอื่นอีกทีน่ะค่ะ"
10039040-78 = "ฉันไม่ได้จะเป็นไอดอล แต่เป็นคนอื่นค่ะ ฉันก็แค่มาช่วยให้พวกเขาเป็นไอดอลได้น่ะค่ะ"
10039040-79 = "...?"
10039040-83 = "ฮืม..."
10039040-84 = "อย่างนี้สินะ เข้าใจแล้ว"
10039040-85 = "น่าเสียดายนะ ฉันคิดว่าคุณซิสเตอร์เป็นอัญมณีที่ยอดเยี่ยมเลยน่ะสิ"
10039040-86 = "มะ... ไม่หรอกค่ะ! ขอบคุณที่ช่วยพูดอย่างนั้นนะคะ แต่ว่าฉันไม่ใช่คนแบบนั้นหรอกค่ะ...!"
10039040-87 = "แต่เมื่อกี้ที่คุณจะบอกว่าจะช่วยหาเพลงให้... เป็นเรื่องจริงเหรอคะ?"
10039040-88 = "ก็จริงน่ะสิ ฉันอยากมาช่วยตั้งแต่แรกอยู่แล้ว"
10039040-89 = "ให้ฉันช่วยได้ใช่มั้ยคุณครู?"
10039040-93 = "[ns13] \"อื้อ ครูรบกวนด้วยนะ อุทาฮะ\"\n[ns14] \"อื้อ ครูเชื่อในตัวอุทาฮะนะ\""
10039040-96 = "ฮุฮุ เหมือนถูกคาดหวังเลยแฮะ ความรู้สึกแบบนี้ทำให้ฉันรู้สึกดีเสมอเลย"
10039040-97 = "งั้นคุณซิสเตอร์ช่วยไปรอที่นี่ก่อนได้มั้ย? ฉันมีอะไรอยากคุยกับคุณครูหน่อยน่ะ"
10039040-98 = "ที่นี่มัน...?"
10039040-99 = "ร้านคาราโอเกะแถวนี้น่ะ ถ้าจะเลือกเพลง เราก็ต้องลองฟังและลองร้องดูก่อนน่ะ"
10039040-100 = "คุณซิสเตอร์ไปดูเพลงก่อนได้เลย แล้วฉันจะรีบตามไป ไปคนเดียวได้ใช่มั้ย?"
10039040-101 = "ค่ะ ได้อยู่แล้วค่ะ!"
10039040-102 = "ขอบคุณนะคะคุณอุทาฮะ! ถ้างั้น... ฉันจะไปรออยู่ที่นั่นนะคะ!!"
10039040-108 = "ฮืม..."
10039040-109 = "ฮืมม..."
10039040-113 = "[ns15] \"มีเรื่องอะไรเหรอ อุทาฮะ...?\"\n[ns16] \"จะคุยเรื่องอะไรกับครูเหรอ?\""
10039040-116 = "ไม่ใช่เรื่องยืดยาวอะไรหรอก ฉันแค่อยากตรวจสอบอะไรสักอย่างน่ะ"
10039040-117 = "นักเรียนคนเมื่อกี้..."
10039040-118 = "ไม่ได้จะเป็นไอดอลจริงๆ น่ะเหรอ?"
10039040-119 = "ทำไมฉันถึงถามแบบนี้งั้นเหรอ? ก็..."
10039040-120 = "ครูก็น่าจะดูออกไม่ใช่เหรอ? นักเรียนคนนั้นดูอยากเป็นไอดอลนะ"
10039040-121 = "ฉันว่าเธอแค่ไม่รู้ตัวน่ะว่าตัวเองอยากทำอะไรแบบนั้น"
10039040-122 = "ฉันก็แค่สงสัยว่าทำไมเธอไม่บอกน่ะ... และถ้าไม่ถามให้รู้เรื่อง ฉันก็กลัวว่าคืนนี้จะนอนไม่หลับ"
10039040-123 = "หืม...?"
10039040-124 = "คุณครูก็คิดอยู่เหมือนกัน แต่ก็ดูสถานการณ์อยู่งั้นเหรอ...?"
10039040-125 = "ฮุฮุ เป็นอย่างนี้สินะ สมกับเป็นคุณครูเลยนะ ฉันกะไว้แล้วละว่าครูต้องดูออก"
10039040-126 = "อยากเห็นการแสดงของนักเรียนคนนั้นแล้วสินะ"
10039040-130 = "คุณครู จะว่าไปแล้ว ฉันว่าเรื่องนี้ฉันน่าจะปรึกษาคุณครูได้ ช่วยฟังเพลงที่ฉันจะเอาไปร้องหน่อยสิ..."
10039040-131 = "[s] \"กะแล้วเชียวว่าต้องเป็นแบบนี้!!\""
10039040-133 = "(หลังจากนั้นคุณครูก็ตามอุทาฮะไปร้านคาราโอเกะแล้วช่วยมารีเลือกเพลง)"
10039040-140 = "- เพลง เคลียร์ -"
10039040-145 = "(วันต่อมา...)"
10039040-146 = "ตะ... ตายจริง... ทำมาให้พวกเรา..."
10039040-147 = "ถึงขนาดนี้เลยเหรอ...?"
10039040-148 = "อะ... อืม... เหมือนฉันให้การบ้านชิ้นใหญ่อย่างไม่ตั้งใจเลยนะคะ รู้สึกผิดจังเลยค่ะ"
10039040-149 = "ฉันไม่ได้ตั้งใจจะทำให้ลำบากถึงขนาดนี้เลย... ที่จริงก็แค่อยากให้ช่วยเลือกจากลิสต์ที่พวกเราทำไว้#nเท่านั้นเอง..."
10039040-150 = "พอเห็นแล้วมารีก็คงอยู่เฉยๆ ไม่ได้สินะคะ ดูเอาสิคะหัวหน้ามิเนะ นี่ละค่ะสภาพของพวกเราตอนนี้"
10039040-151 = "...?"
10039040-152 = "เดี๋ยวสิคะ อย่าเหมารวมว่าเป็น 'พวกเรา' สิ..."
10039040-157 = "ฮู่ว... ช่างเถอะค่ะ สุดท้ายแล้วฉันก็คงปฏิเสธไม่ได้เหมือนกัน"
10039040-158 = "นั่นเป็นเพราะฉันทำให้คุณมารีต้องเดือดร้อนไปด้วยจริงๆ ค่ะ ดูใต้ตาสิคะ เป็นหมีแพนด้าไปแล้ว"
10039040-159 = "ขอโทษด้วยนะคะ คุณมารี"
10039040-161 = "มะ... ไม่เลยค่ะ! ไม่เดือดร้อนเลยค่ะ...! ไม่เลยแม้แต่สักนิดค่ะ...!!"
10039040-162 = "ฉันเองก็สนุกเหมือนกันค่ะ ส่วนตาหมีแพนด้า... เป็นเพราะฉันสนุกกับการเลือกเพลงจนดึกดื่นน่ะค่ะ..."
10039040-163 = "ค่ะ แทนที่จะมาขอโทษมารีอยู่ ฉันว่าเราต้องแสดงความขอบคุณมากกว่าค่ะ"
10039040-164 = "ขอบคุณมากนะคะ มารี พวกเราเริ่มเห็นชัดเจนขึ้นแล้วค่ะว่าต้องทำอะไรต่อ"
10039040-165 = "ท่านซากุระโกะ...!!"
10039040-166 = "เพราะงั้น..."
10039040-167 = "จากนี้มารีไปพักผ่อนเถอะค่ะ ที่ผ่านมาขอบคุณมากนะคะ"
10039040-174 = "คะ คะ...?"
10039040-175 = "หืม...? ก็มารีเหนื่อยมามากแล้วนี่คะ ดูจากข้อมูลที่เตรียมมาให้ก็รู้แล้วค่ะว่าต้องเหนื่อยแค่ไหน"
10039040-176 = "ที่เหลือฉันกับหัวหน้ามิเนะจะฝึกซ้อมและฟอร์มวงต่อตามที่มารีหาข้อมูลมาให้ค่ะ"
10039040-177 = "ใช่ค่ะ ฉันจะพยายามอย่างเต็มที่ จะไม่ให้คุณมารีเสียแรงเปล่าเลยค่ะ"
10039040-179 = "อ่า... ค่ะ ได้ค่ะ..."
10039040-181 = "มารี...?"
10039040-182 = "คุณมารี...? เป็นอะไรไปคะ... มีเรื่องกังวลอะไรหรือเปล่าคะ?"
10039040-184 = "หะ... หืม!? คะ!? มะ... ไม่ค่ะ! ไม่มีอะไรเลยค่ะ! ฉันคงจะเหนื่อยนิดหน่อยอย่างที่ว่าน่ะค่ะ แหะๆ..."
10039040-185 = "ถะ... ถ้างั้นก็สู้ๆ นะคะ!! ฉันขอตัวกลับก่อนค่ะ!"
10039040-190 = "มารี...?"
10039040-191 = "ทำไมรู้สึกแปลกๆ นะ..."
10039040-192 = "พูดอะไรของคุณคะ คุณซากุระโกะ?"
10039040-193 = "เอาละ! นี่ไม่ใช่เวลามายืนเหม่อนะคะ! ดูข้อมูลที่คุณมารีทำมาให้สิคะ"
10039040-194 = "ไม่ได้มีแต่เรื่องชุดที่เราใส่อยู่นะคะ แต่ยังมีเพลงอ้างอิง แล้วก็ตารางการซ้อมเต้นด้วย..."
10039040-195 = "เราต้องรีบฝึกกันแล้วค่ะ!! อย่างน้อยก็เพื่อไม่ให้การเสียสละของคุณมารีต้องสูญเปล่านะคะ!!"
10039040-197 = "สะ... เสียสละ!? ถึงกับเสียสละเลยเหรอ...!? กลายเป็นเรื่องแบบนี้ไปแล้วเหรอคะเนี่ย...!?"
10039040-198 = "คุณซากุระโกะ...!!!"
10039040-199 = "ขะ... เข้าใจแล้วค่ะ ฉันเข้าใจแล้ว!! รีบไปกันเถอะค่ะ! เราจะเริ่มฝึกกันเดี๋ยวนี้!!"
10039040-206 = "..."
10039040-212 = "ค่ะ อิโอจิ มารีค่ะ"
10039040-213 = "อ้อ ซิสเตอร์ฮินาตะ...?"
10039040-214 = "อ๊ะ! จะว่าไป งานที่เราทำด้วยกันอยู่...!!"
10039040-215 = "คะ...?"
10039040-216 = "ซิสเตอร์ฮินาตะทำเสร็จหมดแล้วเหรอคะ...? งั้นตารางของวันนี้ก็..."
10039040-217 = "ไม่มีแล้วเหรอคะ...? ยะ... อย่างนั้นสินะคะ ขอบคุณค่ะ ซิสเตอร์ฮินาตะทำให้งานเสร็จเร็วขึ้นมากเลย#nนะคะ..."
10039040-218 = "ค่ะ... ค่ะ เข้าใจแล้วค่ะ"
10039040-219 = "ค่ะ ไว้ฉันจะติดต่อไปใหม่นะคะ..."

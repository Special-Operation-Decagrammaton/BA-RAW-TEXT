[translation]
10039040-1 = "第4話;偶像之路：歌曲"
10039040-2 = "嗯嗯……我瞧瞧……檢查檢查……"
10039040-3 = "服裝……舞蹈訓練……都完成了……"
10039040-4 = "謝謝您，老師。#n多虧有您的幫忙，一切都進展得很順利。"
10039040-5 = "接下來只要決定歌曲，這件事就能告一段落了……"
10039040-6 = "就要……結束了呢……"
10039040-10 = "[ns1]「……瑪麗？」\n[ns2]「在想什麼嗎？」"
10039040-13 = "……咦！？沒，沒什麼。"
10039040-14 = "只是……不由自主地看著整理好的東西發呆。#n也許是有點累了吧，呵呵。"
10039040-15 = "現在可不是發呆的時候呢。#n得盡快決定歌曲才行……"
10039040-16 = "你果然在這裡啊，老師。#n看來我來得正是時候。"
10039040-17 = "嗯……？"
10039040-18 = "有客人嗎……？"
10039040-19 = "[ns3]「……詠葉？」\n[ns4]「咦，這個聲音是……」"
10039040-24 = "……呵呵，事情我都聽說囉。"
10039040-25 = "老師你也太見外了。#n偶像這麼有趣──"
10039040-29 = "──這麼重要的事，竟然沒跟我說一聲。"
10039040-30 = "[s5]「……你剛才說溜嘴了吧！？」\n[s6]「有趣……！你剛才說了『有趣』吧！！」"
10039040-33 = "那種小事不必在意。#n總之老師現在需要幫忙對吧？"
10039040-34 = "還缺少什麼呢？#n是服裝嗎？還是舞蹈……？"
10039040-35 = "……歌曲？"
10039040-36 = "原來是歌曲啊……那正好。#n我碰巧有多準備幾首曲子。"
10039040-37 = "……嗯？問我為什麼要準備歌曲？"
10039040-38 = "那當然是因為……"
10039040-39 = "……我也打算參加偶像活動囉。"
10039040-40 = "[s7]「詠葉你要參加！？」\n[s8]「工程師部要參加！？」"
10039040-43 = "呵呵。果然露出了驚訝的表情呢。"
10039040-44 = "不過這次，將只有我以個人的身分報名參加。"
10039040-45 = "當然我也跟響和亞都梨聊過，可惜我們在音樂的取向方面出現了分歧。"
10039040-46 = "我選的類型……對他們來說可能還太早了吧。"
10039040-47 = "然而，向世人傳達自己所愛的事物也是偶像的價值所在。"
10039040-48 = "相信在看完演出之後，他們的想法也會改變的。"
10039040-49 = "偶像的……價值……？"
10039040-50 = "沒錯。每個人都有自己想參加偶像表演的理由吧？"
10039040-51 = "想傳達的心情、想說出口的話、想吶喊的名字……"
10039040-52 = "或是想向大家展示得意之作「雷醬DiscoBall Ver」等等。#n這些都是立於舞台之人的「真心」。"
10039040-53 = "就在眾人面前展示並交流這點來看，偶像和巨匠也算是有異曲同工之處吧。"
10039040-54 = "話說回來，這位是……"
10039040-55 = "修女會的修女？#n啊啊，我明白了。"
10039040-56 = "……咦？"
10039040-57 = "原來如此。#n在準備偶像活動的是這位修女，而不是老師啊。"
10039040-58 = "[s9]「不然你原本想的是……」\n[s10]「這是學生活動哦，『學生』活動。」"
10039040-61 = "我是開玩笑的啦。"
10039040-62 = "總之這樣正好，讓我更想幫忙了。"
10039040-63 = "身為巨匠的直覺告訴我，修女同學一定會成為很棒的偶像。"
10039040-64 = "啊，是！謝謝你！"
10039040-69 = "咦……？"
10039040-70 = "……我？剛才是說我嗎？"
10039040-71 = "……嗯？怎麼了嗎？"
10039040-72 = "還是要當偶像的人不是修女同學？#n所以……"
10039040-73 = "果然還是老師囉……？"
10039040-74 = "[s11]「不不不，怎麼可能。」\n[s12]「剛才不是已經說過不是了嗎……」"
10039040-77 = "啊哈哈……謝謝你的讚美，但我只是負責幫忙而已。"
10039040-78 = "真正要成為偶像的並不是我，而是其他人。#n我不過是為他們做準備罷了。"
10039040-79 = "……？"
10039040-83 = "哼嗯……"
10039040-84 = "原來如此，我明白了。"
10039040-85 = "真可惜，我真心認為你是塊很棒的原石呢。"
10039040-86 = "你，你過獎了！#n很感謝你的讚美，但我並不是你想的那種人……！"
10039040-87 = "話說回來，剛才說要幫我們找歌曲……是真的嗎？"
10039040-88 = "當然。我一開始就是這麼打算的。"
10039040-89 = "沒問題吧，老師？能讓我來幫忙嗎？"
10039040-93 = "[ns13]「嗯。那就拜託你了，詠葉。」\n[ns14]「詠葉的話沒問題。我相信你。」"
10039040-96 = "呵呵，受人期待的感覺總是能讓我感到振奮呢。"
10039040-97 = "那麼，能麻煩修女同學先去這個地方等一會嗎？我有些話想跟老師說。"
10039040-98 = "這裡是……？"
10039040-99 = "是附近的卡拉OK。#n要選歌的話，總是得親自唱唱看才行。"
10039040-100 = "我們聊完之後馬上就來。#n你一個人沒問題吧？"
10039040-101 = "是，當然！"
10039040-102 = "謝謝你，詠葉同學！#n那麼……我就先出發了！！"
10039040-108 = "……"
10039040-109 = "哼嗯……"
10039040-113 = "[ns15]「……詠葉。」\n[ns16]「你想說的是關於瑪麗的事吧？」"
10039040-116 = "沒錯，不過其實也不是什麼大事。#n我只是想確認一下而已。"
10039040-117 = "剛才那個孩子……"
10039040-118 = "真的不想當偶像嗎？"
10039040-119 = "問我為什麼又問這個？#n那是因為……"
10039040-120 = "……老師應該也看出來了吧？#n那孩子心裡，其實很想成為偶像。"
10039040-121 = "或許他還不太清楚自己的想法吧。#n不過我好奇的是……為什麼不告訴他呢？"
10039040-122 = "不把這件事問清楚的話……我回去會睡不著覺的。"
10039040-123 = "……嗯？"
10039040-124 = "老師也有這個打算，但還在觀察情況……？"
10039040-125 = "呵呵。果然是這樣啊……#n也對，我相信老師肯定能妥善處理的。"
10039040-126 = "那孩子的演出……真讓人期待呢。"
10039040-130 = "話說回來，老師你一定了解我的品味吧。#n請聽聽看我這次選的曲子……"
10039040-131 = "[s]「我就知道這才是你的目的！！」"
10039040-133 = "（之後和詠葉一起到卡拉OK，幫瑪麗選定了歌曲）"
10039040-140 = "- 歌曲完成 -"
10039040-145 = "（……隔天）"
10039040-146 = "不，不敢相信……"
10039040-147 = "居然準備了這麼多……？"
10039040-148 = "唔，唔嗯……看來我們無意間做了非常失禮的事呢。"
10039040-149 = "我其實沒打算要求你做到這種程度……只是想請你從現有的企劃中做挑選而已……"
10039040-150 = "瑪麗應該是無法坐視不管吧。#n看吧，美禰團長。這就是我們的現狀。"
10039040-151 = "……？"
10039040-152 = "不是，為何總是要強調「我們」呢……"
10039040-157 = "呼……不過情況確實如此。這點我也無從辯解。"
10039040-158 = "誠如你所說，我們終究是給瑪麗同學添了麻煩。#n現在他眼睛底下都還有黑眼圈呢。"
10039040-159 = "真的很抱歉，瑪麗同學。"
10039040-161 = "別，別這麼說！#n麻煩什麼的……！絕對沒有這回事……！！"
10039040-162 = "我自己其實也很樂在其中。#n會，會有黑眼圈只是因為……昨天選歌選得太開心才沒睡飽……"
10039040-163 = "或許這種時候與其道歉，更應該傳達感謝之意吧。"
10039040-164 = "真的很謝謝你，瑪麗。#n多虧有你的幫忙，我們今後的方向與該做的事情都更加明確了。"
10039040-165 = "櫻子大人……！！"
10039040-166 = "因此……"
10039040-167 = "雖然現在說這些可能有點晚了……不過瑪麗，你現在可以休息了。"
10039040-174 = "嗯……？"
10039040-175 = "你想必已經很累了吧？#n光看這些資料，就知道你準備得有多辛苦。"
10039040-176 = "接下來我和美禰團長，會依照你提供的資料努力練習的。"
10039040-177 = "沒錯。我們會拚盡全力，絕不辜負你的心血。"
10039040-179 = "啊，是……"
10039040-181 = "瑪麗……？"
10039040-182 = "瑪麗同學……？#n你怎麼了……？有什麼在意的事嗎？"
10039040-184 = "……咦！？沒，沒什麼！#n我可能是有點累了。哈哈……"
10039040-185 = "那，那麼兩位請加油！！我就先告辭了！"
10039040-190 = "瑪麗……？"
10039040-191 = "總覺得剛才的氣氛有點奇怪……"
10039040-192 = "你在喃喃自語什麼呢，櫻子同學？"
10039040-193 = "來吧！現在不是發呆的時候了！#n請看瑪麗同學給我們的這些資料。"
10039040-194 = "除了我們現在穿的服裝之外，甚至還準備了參考歌曲和舞蹈課程……"
10039040-195 = "必須馬上加以實踐！！不能讓他的犧牲白費！！"
10039040-197 = "犧，犧牲！？說犧牲也太誇張了吧……！？"
10039040-198 = "……櫻子同學！！！"
10039040-199 = "啊，知道了知道了！！#n現在！馬上開始吧！！"
10039040-206 = "…………"
10039040-212 = "你好，我是伊落瑪麗。"
10039040-213 = "……啊，日向同學？"
10039040-214 = "啊！對了，我們說好要一起工作的……！！"
10039040-215 = "……嗯？"
10039040-216 = "已經差不多完成了……？#n那今天的行程……"
10039040-217 = "……也處理完了？這，這樣啊。謝謝你。#n多虧了日向同學，進度才能這麼迅速……"
10039040-218 = "……嗯。嗯。我知道了。"
10039040-219 = "好的……之後再聯絡。"
10039040-224 = "……突然閒下來了呢。#n看來能久違地休息一下了。"
10039040-225 = "嗯……"
10039040-226 = "不過……這究竟是怎麼回事呢。"
10039040-228 = "這股難以言喻的感覺是……"

[translation]
104120-1 = "ตอนที่ 12;ย้อนวันวาน 2"
104120-5 = "..."
104120-6 = "อย่างนี้นี่เอง เรื่องนี้จะจบลงไปเช่นนี้งั้นหรือ "
104120-7 = "นอกจากจะประกาศว่าตนเองไม่ใช่ตัวละครหลัก และทำลายการคาดการณ์ของผม... แล้วยังย้อนกลับ#nไปสู่บริบทแรกเริ่มอีกอย่างนั้นหรือ"
104120-8 = "ใช่แล้ว!!"
104120-9 = "ใช่แล้ว... หรือก็คือสิ่งนี้ดูเหมือนจะเป็นจุดจบของเรื่องราวทั้งหมด แต่ว่า... ไม่ใช่เช่นนั้นเลย เป็นการซ่อนเร้นเรื่องราวจากผม และเหล่าผู้ชม..."
104120-10 = "ทว่าอย่าได้คิดว่าการแทรกแซงเรื่องราวและบริบทหลักเช่นนั้นจะทำได้เสมอไปเล่า คุณครูเอ๋ย"
104120-11 = "เรื่องราวยังคงดำเนินต่อไปอยู่นะ"
104120-12 = "ใช่แล้ว!!"
104120-13 = "หากพูดถึงสิ่งนี้แล้ว... คงเปรียบเสมือนกับการเข้าสู่ภาคใหม่ ใช่แล้ว ถึงเรื่องราวนี้จะจบลงไป แต่ก็เป็นจุดเริ่มต้นของเรื่องราวใหม่ต่อไป"
104120-14 = "ใช่แล้ว... และเพื่อการนั้นแล้ว เกมาเทรียเองก็จำเป็นต้องเปลี่ยนแปลง"
104120-15 = "สหายเก่าที่ถูกผนึก ถูกเนรเทศและถูกลบเลือนไปจากเกมาเทรีย... ใช่แล้ว ต้องไปหาคนผู้นั้น..."
104120-16 = "คอยดูเถอะ สูทดำเอ๋ย สิ่งที่นายทำไม่ได้ ผมจะเป็นคนสานต่อให้จบเอง"
104120-24 = "งืมๆ..."
104120-29 = "..."
104120-30 = "ประมวลผลสำเร็จ ยืนยันสมมติฐาน"
104120-31 = "... [ruby=Q.E.D]การพิสูจน์สำเร็จ[/ruby]"
104120-33 = "...อย่างนี้เองสินะคะ ตอนนี้ฉันเข้าใจแล้วค่ะ"
104120-34 = "ฉันเข้าใจแล้วค่ะว่าทำไมรุ่นพี่อะโรน่า... ถึงเป็นตัวตนที่แตกต่างจากฉัน ทั้งๆ ที่เป็นระบบ OS A.R.O.N.A. ของกล่องแห่งซิสดิมเหมือนกันแท้ๆ..."
104120-37 = "คุณอยู่ที่นี่เองสินะคะ เพราะแบบนั้น... ถึงได้ไม่มีใครตามหาตัวคุณพบเลยสินะคะ"
104120-41 = "................... คุณประธานองค์การนักเรียน"

[translation]
104120-1 = "第12話;後日談（２）"
104120-5 = "……"
104120-6 = "這樣啊。這樣一來故事就落幕了──"
104120-7 = "宣告「自己不是主角」，不只背叛了我的預測──居然連類型都恢復了。"
104120-8 = "沒錯！！"
104120-9 = "啊啊……偽裝成結尾，將故事，觀眾──#n連我也欺騙了啊……"
104120-10 = "但是，可別以為那種俯瞰般的介入可以一直持續下去哦──老師。"
104120-11 = "故事必須繼續下去──"
104120-12 = "沒錯！！"
104120-13 = "這是，為了迎接嶄新局面的幕間──已揭幕的故事，將在新的舞台延續。"
104120-14 = "啊啊，為此──必須為蓋瑪特利亞帶來[ruby= ・     ・ ]變革[/ruby]。"
104120-15 = "[ruby=蓋瑪特利亞]被吾等放[/ruby]逐──遭到掩埋封印的[ruby=OB]老友[/ruby]……去見那個人吧。"
104120-16 = "拭目以待吧……黑色西裝人。#n你沒能完成的事，就由我來替你實現。"
104120-24 = "呣喵……"
104120-29 = "……"
104120-30 = "演算完成。已確認假說。"
104120-31 = "「Q.E.D.」──證明完畢。"
104120-33 = "原來是這麼回事啊……"
104120-34 = "身為希迪姆的箱子的OS．A.R.O.N.A的我，以及彩奈前輩……#n為何我們是相似卻不同的存在……我明白了。"
104120-37 = "原來在這裡啊……所以才沒有人找得到你。#n沒錯吧？"
104120-41 = "────聯邦學生會長。"

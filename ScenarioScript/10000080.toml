[translation]
10000080-1 = "第8話;離終曲還差一點！"
10000080-3 = "唔，呃啊！"
10000080-4 = "嘴上說的很好聽，結果實力也不怎麼樣嘛，伊樹菜！"
10000080-5 = "[s1]「伊樹菜，你沒事吧！？」\n[s2]「數量太多了！」"
10000080-6 = "呵哈哈，你在街上四處作亂的期間，#n我已經把百鬼夜行各地的妖怪劇團全都叫回這裡了！ "
10000080-7 = "呵哈哈，你在街上四處作亂的期間，#n我已經把百鬼夜行各地的妖怪劇團全都叫回這裡了！ "
10000080-8 = "面對這個狀況還打算背叛我去投靠老師嗎？"
10000080-9 = "現在我還可以不跟你計較！好好考慮清楚吧，愚蠢之徒！"
10000080-10 = "伊樹菜才不愚蠢！"
10000080-11 = "忍者……伊樹菜……！"
10000080-12 = "只是在為了相信伊樹菜夢想的人，為了主公而戰！"
10000080-14 = "這才是伊樹菜相信的忍道！"
10000080-15 = "哼，只會出一張嘴！上吧，妖怪劇團！"
10000080-16 = "看招！"
10000080-23 = "[ns]「伊樹菜……！」"
10000080-24 = "哼，真是個頑強的傢伙。害我費了這麼多功夫。"
10000080-25 = "唔……伊樹菜，不能，在這裡倒下……"
10000080-26 = "伊樹菜，必須，守護主公……"
10000080-27 = "挺厲害的嘛，忍者少女！接下來就交給我們吧！ "
10000080-28 = "什，什麼人！？"
10000080-31 = "老師！你沒事吧！？"
10000080-32 = "頭兒！讓您久等了！"
10000080-40 = "節慶營運管理部，連修行部的傢伙也……！"
10000080-41 = "犯人果然就是你啊！會長……不對，喵天丸！"
10000080-42 = "不是喵天丸，是喵達政宗！"
10000080-43 = "不過你們怎麼會出現在這裡……！"
10000080-44 = "妖怪劇團綁架老師之後應該立刻切斷了聯絡手段才對……！？"
10000080-45 = "那當然是因為這個！"
10000080-47 = "（咻）"
10000080-48 = "手機……？#n都說了聯絡手段已經……等等，難道說！？"
10000080-49 = "老師已經事先傳MomoTalk給我了！ "
10000080-50 = "「我預計接下來會被綁架，希望你們能在為時已晚之前來救我」這句話！"
10000080-52 = "唔，竟然在來到這裡之前就已經……！？"
10000080-54 = "也就是說……老師你不是被擄走，而是一開始就知道了卻還……！"
10000080-55 = "[s] 吹口哨"
10000080-56 = "果然是個不能小看的人物……！話說回來，你剛才說了「果然」對吧。#n這就代表你已經隱約察覺到我的真實身份了嗎……！"
10000080-57 = "挺有兩下子的嘛。想必也是經歷了無數困難才得出我與妖怪劇團勾結的事實吧……"
10000080-58 = "節慶營運管理部的部長，河和靜子啊！"
10000080-59 = "咦？沒有啊。"
10000080-60 = "我們問了來參加櫻花祭的人們有沒有看到可疑人士！"
10000080-61 = "結果很多人都說，看到會長和妖怪劇團一起走商店街的小巷到廢墟去了，#n這樣事情就很明顯了吧。"
10000080-62 = "畢竟妖怪劇團跟會長本來就很引人注目嘛……呼啊……"
10000080-63 = "可惡，會長的身分居然會造成反效果……！"
10000080-64 = "哎咿！算了，這個狀況也還在計畫之內！"
10000080-65 = "你們以為我會沒考慮到你們來到這裡的可能性嗎！"
10000080-66 = "讓你們見識見識吧！"
10000080-73 = "唔哇哇哇！這是怎麼回事！？"
10000080-74 = "越來越多了呢～"
10000080-75 = "氣氛好像變得不太尋常呢。"
10000080-77 = "……唔哇。"
10000080-82 = "菲娜有在《不仁不義喵喵拳》裡看過！"
10000080-83 = "是組織的所有人集合起來準備要發動襲擊的場景！"
10000080-84 = "正是如此。#n之所以把妖怪劇團聚集在這裡，也是為了要把你們一網打盡。"
10000080-85 = "發現走進陷阱的其實是自己的心情如何！ "
10000080-86 = "哼哈哈，覺悟吧！"
10000080-87 = "唔嗯……不管怎麼想都是敗北Flag的台詞。"
10000080-88 = "不愧是部長！評分還是跟往常一樣辛辣！"
10000080-89 = "呼哈，看來是沒有停止作亂的打算啊～"
10000080-90 = "為了成為完美淑女！我們修行部也會對付你們的！ "
10000080-92 = "大家，我們上吧！"

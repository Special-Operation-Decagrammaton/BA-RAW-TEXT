[translation]
10000080-1 = "ตอนที่ 8;การปิดฉากครั้งสุดท้ายที่งดงาม!"
10000080-3 = "ฮะ.. ฮึ่มม!"
10000080-4 = "เก่งแต่พูดอะไรเพ้อเจ้อน่าอิซุนะ!"
10000080-5 = "[s1] \"อิซุนะ ไม่เป็นอะไรแน่นะ?!\"\n[s2] \"พวกปีศาจมีกันเยอะมากเลยนะ!\""
10000080-6 = "หึหึหึ ระหว่างที่เธอออกไปเป็นนินจาบนถนน ฉันก็เรียกรวมพลปีศาจมาจากทั่วเฮียกคิยาโคแล้ว!"
10000080-7 = "หึหึหึ ระหว่างที่เธอออกไปเป็นนินจาบนถนน ฉันก็เรียกรวมพลปีศาจมาจากทั่วเฮียกคิยาโคแล้ว!"
10000080-8 = "สถานการณ์เป็นแบบนี้แล้ว ยังจะหักหลังฉันแล้วไปอยู่กับครูของเธออีกเหรอ?"
10000080-9 = "ถ้ากลับมาตอนนี้ฉันก็จะไม่เอาเรื่อง ว่าไงล่ะ!? คิดดูให้ดีๆ นะ เจ้าเด็กโง่เอ๋ย!"
10000080-10 = "ฉันไม่ได้โง่นะคะ!"
10000080-11 = "อิซุนะคือ... คนที่ฝันใฝ่อยากเป็นนินจา!"
10000080-12 = "และอิซุนะก็จะต่อสู้เพื่อนายท่าน เพื่อคนที่เชื่อมั่นในความฝันของอิซุนะ!"
10000080-14 = "นี่แหละคือเส้นทางของนินจาที่แท้จริง!"
10000080-15 = "ฮึ่ม! เลิกต่อบทนินจาไร้สาระได้แล้ว! พวกปีศาจ!"
10000080-16 = "ค่ะบอส!"
10000080-23 = "[ns] \"อิซุนะ...!\""
10000080-24 = "ฮึ่ม! ในที่สุดก็จัดการพวกที่มาขวางจนได้"
10000080-25 = "อึ้ก... อิซุนะจะมาล้มอยู่ตรงนี้ไม่ได้..."
10000080-26 = "อิซุนะต้องปกป้องนายท่าน..."
10000080-27 = "เก่งไม่เบาเลยนะ สาวนินจา! ที่เหลือให้พวกเราจัดการเอง!"
10000080-28 = "อึ้ก?! คะ... ใครน่ะ?"
10000080-31 = "คุณครู! ไม่เป็นอะไรใช่ไหมคะ?!"
10000080-32 = "พวกเรามาแล้วค่ะบอส!"
10000080-40 = "ชมรมเทศกาล! แล้วก็ชมรมฝึกฝน!"
10000080-41 = "คนร้ายคือคุณจริงๆ ด้วยสินะคะ! ประธานกลุ่มการค้าเนียนเต็นมารุ!"
10000080-42 = "ก็บอกว่าไม่ใช่เนียนเต็นมารุ! ฉันชื่อเนียนเต มาซามุเนะ!"
10000080-43 = "ว่าแต่ พวกเธอรู้ได้ยังไงว่าครูโดนลักพาตัวมาที่นี่?!"
10000080-44 = "ไม่น่าจะมีใครรู้เรื่องการลักพาตัวของพวกปีศาจนี่นา...!"
10000080-45 = "ก็เพราะสิ่งนี้ยังไงล่ะ!"
10000080-47 = "(ยื่นบางอย่างออกมา)"
10000080-48 = "นี่มัน.. โทรศัพท์มือถือ? หรือว่า..."
10000080-49 = "ก็คุณครูส่ง MOMOTALK มาให้ฉันยังไงล่ะคะ!"
10000080-50 = "ส่งมาบอกว่า 'ครูจะถูกลักพาตัวไปแล้ว รีบมาช่วยที'"
10000080-52 = "...หืม?!"
10000080-54 = "นี่แปลว่า... เป็นแผนการของครูจากชาเล่ต์งั้นเหรอ...?!"
10000080-55 = "[s] ทำเป็นไม่รู้ไม่ชี้"
10000080-56 = "แต่ถึงอย่างนั้นก็เถอะ พวกเธอรู้ตัวตนและที่ซ่อนของฉันได้ยังไง!?"
10000080-57 = "คงจะลำบากมากเลยสินะ กว่าจะสืบหาได้ว่าฉันคือผู้ว่าจ้างของปีศาจ!"
10000080-58 = "ว่าไงล่ะ? คาวาวะ ชิซุโกะ หัวหน้าชมรมจัดงานเทศกาล!"
10000080-59 = "เอ๋? กะ... ก็ไม่ได้ลำบากอะไรขนาดนั้นนะ..."
10000080-60 = "ก่อนจะมาที่นี่ พวกฉันไปถามคนมาเที่ยวเทศกาลค่ะว่าเห็นคนที่น่าสงสัยบ้างหรือเปล่า"
10000080-61 = "พวกเขาก็เลยบอกว่าเห็นประธานกลุ่มการค้ากับพวกปีศาจเข้าไปบ้านร้างในซอยย่านการค้าด้วยกันค่ะ"
10000080-62 = "ก็พวกปีศาจน่าสะดุดตาอยู่แล้วนี่คะ ฮ้าวว~ zzZ"
10000080-63 = "ตำแหน่งประธานกลุ่มการค้าของฉัน... กลับกลายเป็นช่องโหว่ในแผนการเหรอเนี่ย...!"
10000080-64 = "โธ่เอ๊ย! ช่างมันเหอะ! ยังไงทั้งหมดนี่ก็เป็นอุบายของเนียนเต มาซามุเนะคนนี้อยู่แล้ว"
10000080-65 = "ฉันคิดไว้ตั้งแต่แรกแล้วล่ะว่าพวกเธอจะต้องมาที่นี่"
10000080-66 = "ไหนๆ ก็มาแล้ว ฉันจะให้พวกเธอได้เห็นของที่ฉันเตรียมมาให้พวกเธอ!"
10000080-73 = "อะ... อะไรเนี่ย! นี่มันอะไรกัน?!"
10000080-74 = "มีเยอะขึ้นเรื่อยๆ เลย~"
10000080-75 = "สังหรณ์ใจไม่ดีแล้วเลยล่ะค่ะ"
10000080-77 = "เอาจริงเหรอ...?"
10000080-82 = "พีน่า! พีน่าก็เห็นอะไรคล้ายๆ แบบนี้จากเรื่อง <หมัดน้องเหมียวไร้คุณธรรม> เหมือนกันค่ะ!"
10000080-83 = "ซีนที่กลุ่มศัตรูถูกล่อไปโจมตี!"
10000080-84 = "ใช่แล้วล่ะ ฉันระดมพลพวกปีศาจเอาไว้เพื่อหลอกล่อพวกเธอแล้วโจมตีให้เกลี้ยง!"
10000080-85 = "หึหึหึ รู้สึกยังไงล่ะที่ได้รู้ว่าตัวเองเดินเข้ามาในกับดักเอง?"
10000080-86 = "พวกเธอต้องพ่ายแพ้อย่างราบคาบในกับดักนี้!"
10000080-87 = "ว้าว... พอได้ยินอะไรแบบนี้ ฉันอยากจะเป็นวายร้ายขึ้นมาเลยแฮะ"
10000080-88 = "พีน่าด้วยค่ะ! ไอจะขยี้ยูให้แหลก!"
10000080-89 = "ฮ้าววว~ zzZ จะยังไงก็เถอะ คนที่มารบกวนความสงบของถนนย่านการค้า"
10000080-90 = "จะไม่ได้รับการยกโทษจากเลดี้ที่เพียบพร้อมจากชมรมฝึกฝน!"
10000080-92 = "พวกเรามาสู้ด้วยกันเลยค่ะ!"

[translation]
10000080-1 = "Episode 8;The Grand Finale!"
10000080-3 = "U-Ugh!"
10000080-4 = "You're all talk, Izuna!"
10000080-5 = "[s1] \"Are you all right?!\"\n[s2] \"There are too many Mouryo!\""
10000080-6 = "Heh heh heh. I called every Mouryo in Hyakkiyako while you two were having your little moment! "
10000080-7 = "Heh heh heh. I called every Mouryo in Hyakkiyako while you two were having your little moment! "
10000080-8 = "You dare betray me for this so-called sensei after our plans have come so far?"
10000080-9 = "There's still time to reconsider, you fool! Don't do something you'll regret!"
10000080-10 = "You're the one who's a fool!"
10000080-11 = "Izuna is a real ninja that has a dream!"
10000080-12 = "And she fights for her lord who believes in her dream!"
10000080-14 = "That is the path of a ninja—the path that Izuna walks!"
10000080-15 = "Hmph! We'll see about that. Mouryo!"
10000080-16 = "Yes, Boss!"
10000080-23 = "[ns] \"Izuna!\""
10000080-24 = "Hmph. Now we can move past that nuisance."
10000080-25 = "Ugh... Izuna...can't fail like this..."
10000080-26 = "Izuna must protect...her lord..."
10000080-27 = "That was a valiant effort, ninja girl! We can take it from here! "
10000080-28 = "What?! Wh-Who goes there?!"
10000080-31 = "Sensei! Are you okay?!"
10000080-32 = "We're here, Boss!"
10000080-40 = "The Festival Operations Department and Inner Discipline Club!"
10000080-41 = "I had a feeling you were the one behind this—Merchant Guild President Date Meowru!"
10000080-42 = "It's not Date Meowru! It's Date Meowsamune!"
10000080-43 = "But never mind that. What are you doing here?!"
10000080-44 = "The Mouryo told me they weren't followed!"
10000080-45 = "Thankfully, we have this!"
10000080-47 = "*pulls out her phone*"
10000080-48 = "Is that...your phone? What are you alluding to?"
10000080-49 = "Sensei sent me a MomoTalk, obviously!"
10000080-50 = "\"I'm walking into a trap. I could use your help.\" Sensei's very own words!"
10000080-52 = "What?!"
10000080-54 = "You mean to tell me...Sensei was two steps ahead of us all along?!"
10000080-55 = "[s] Whistle innocently."
10000080-56 = "Tch. That still doesn't explain how you discovered my identity or made your way to our location!"
10000080-57 = "Identifying me as the Mouryo's employer should have taken you hours—days! It had to be the most difficult case to crack of your lives!"
10000080-58 = "Isn't that right, Kawawa Shizuko...? Or should I say, Festival Operations Department President Kawawa Shizuko?!"
10000080-59 = "Cool your paws and big sass. It really wasn't that hard."
10000080-60 = "We just asked people on the street if they had seen anyone suspicious."
10000080-61 = "Everyone we spoke to said the merchant guild president and Mouryo were going in and out of an abandoned building in the this back alley."
10000080-62 = "The Mouryo do kind of stick out like a sore thumb, you know. *yawn*"
10000080-63 = "I-I was foiled by my own notoriety as the merchant guild's president!"
10000080-64 = "Gah! It doesn't matter. Everything is still going according to plan."
10000080-65 = "I was prepared for you fools to find me from the very beginning!"
10000080-66 = "Behold what I have in store for you!"
10000080-73 = "Wh-Wha...?! What's happening?!"
10000080-74 = "Look! Now there's even more of them!"
10000080-75 = "This doesn't bode well."
10000080-77 = "Are you serious?"
10000080-82 = "I know this gimmick! There's a part just like this in Loyal Cat's Fist!"
10000080-83 = "There was a scene where the rival gang was lured into a huuuuuge ambush!"
10000080-84 = "What a wonderful coincidence. That's exactly how I'd describe the trap I had the Mouryo lay!"
10000080-85 = "How does it feel to have been so thoroughly outwitted?! "
10000080-86 = "Prepare to meet your demise!"
10000080-87 = "Wow... Something about the way you said that made you sound like a total jobber."
10000080-88 = "Good one, President!"
10000080-89 = "*yawn* You're the one who's been disturbing the shopping district's peace..."
10000080-90 = "What kind of young ladies would the Inner Discipline Club be if we overlooked that?! "
10000080-92 = "We'll unite and stop you together!"

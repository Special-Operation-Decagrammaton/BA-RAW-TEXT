[translation]
51160-1 = "ตอนที่ 16;โกเรียว นางุสะ"
51160-5 = "(ใจที่เต้นตึกตัก ก้าวเดินช้าๆ และน้ำเสียงที่เปี่ยมด้วยความคาดหวัง)"
51160-6 = "(ตอนนี้ถนนของเฮียกคิยาโคเต็มไปด้วยความคาดหวังและความตื่นเต้นจากงานเทศกาล)"
51160-8 = "(ภาพที่ดูเรียบง่าย... ที่เคยมีให้เห็นบ่อยๆ ในเฮียกคิยาโค)"
51160-9 = "(บนถนนเส้นนี้... เดิมทีแล้วเฮียกกะเรียวรันจะต้อง...)"
51160-12 = "ออกมาลาดตระเวน... กับเธอไง"
51160-13 = "...อายาเมะ"
51160-15 = "ได้ยินว่าครั้งนี้รุ่นพี่อายาเมะก็จัดการพวกเด็กเจ้าปัญหาได้ราบคาบเลยละ!"
51160-16 = "นี่เป็นการลุยเดี่ยวแก้ปัญหาเป็นครั้งที่ 127 แล้วใช่มั้ย?"
51160-17 = "ได้ยินว่าคราวก่อนเคยไปช่วยแมวที่ปีนขึ้นไปบนกิ่งไม้แล้วลงมาไม่ได้ด้วย"
51160-18 = "ไม่ใช่แค่นั้นนะ...!"
51160-20 = "(ทุกคนพูดคุยกัน)"
51160-21 = "(ถึงเรื่องของอายาเมะ)"
51160-23 = "รุ่นพี่อายาเมะน่ะสุดยอดไปเลยละ"
51160-24 = "ถ้ามีรุ่นพี่อายาเมะ ไม่ว่าจะเกิดเรื่องอะไรก็ไม่ต้องกังวลเลย!"
51160-25 = "รุ่นพี่นานาคาโดะ อายาเมะ! สักวันหนึ่งฉันก็จะเป็นอย่างรุ่นพี่ให้ได้...!"
51160-27 = "ดีจังเลยนะที่เรามีรุ่นพี่อายาเมะอยู่ในเฮียกกะเรียวรัน"
51160-32 = "อื้ม ถ้ามีอายาเมะ เฮียกกะเรียวรันก็ไร้ปัญหา"
51160-33 = "ถ้ามีอายาเมะ... ฉันก็จะทำกิจกรรมของเฮียกกะเรียวรันได้"
51160-34 = "ในฐานะเพื่อนวัยเด็กของอายาเมะ..."
51160-35 = "ฉันเองก็จะอยู่เคียงข้างอายาเมะได้ตลอดไป"
51160-37 = "นึกว่าจะได้อยู่แบบนั้น..."
51160-38 = "...ตลอดไปเสียอีก"
51160-41 = "ได้ยินข่าวรึยัง? เห็นว่าหัวหน้าอายาเมะหายไปในชั่วพริบตาเลยนะ"
51160-42 = "มีข่าวลือบอกว่าหลังจากคุยกับคุณคุซึโนฮะก็หายตัวไปเลย"
51160-43 = "เรื่องจริงเหรอ? แต่เรื่องคุซึโนฮะก็แค่ข่าวลือไม่ใช่เหรอ?"
51160-44 = "ไม่รู้สิ... ทีนี้จะทำยังไงดีล่ะ?"
51160-45 = "แล้วเฮียกกะเรียวรันจะเป็นยังไง? ตอนนี้เราไม่มีหัวหน้านะ?"
51160-46 = "แล้วพวกเราจะเป็นยังไงเหรอ?"
51160-51 = "ถ้าเป็นเรื่องนั้น ไม่ต้องห่วงหรอกน่า"
51160-52 = "ใช่ๆ พวกเรามีรุ่นพี่นางุสะอยู่ทั้งคน"
51160-53 = "ต่อให้รุ่นพี่อายาเมะจะหายตัวไป แต่ยังไงรุ่นพี่นางุสะที่เป็นเพื่อนวัยเด็กที่ยอดเยี่ยมพอๆ กันก็ยังอยู่กับ#nพวกเรา"
51160-55 = "งั้นก็คงไม่มีอะไรให้เป็นห่วงหรอกเนอะ"
51160-62 = "ไม่... ไม่หรอก"
51160-63 = "(นั่นคือสิ่งที่ยังไม่ได้พูดออกมา)"
51160-64 = "ฉัน... ทำแบบนั้นไม่ได้หรอก"
51160-67 = "[ruby=สิทธิ์]ปืน[/ruby]ที่หลงเหลืออยู่นี้เป็นความรับผิดชอบที่ยิ่งใหญ่เกินไปสำหรับฉัน"
51160-68 = "นั่นเป็นเพราะว่า... ฉัน..."
51160-72 = "ฉันไม่ใช่อายาเมะ"
51160-76 = "ฉันเป็นตัวแทนของอายาเมะไม่ได้"
51160-77 = "และคนที่มีสิทธิ์เป็นหัวหน้าเฮียกกะเรียวรันมีแค่อายะเมะคนเดียวเท่านั้น"
51160-79 = "ตัวฉันน่ะ... ไม่มีสิทธิ์อะไรแบบนั้น... ตั้งแต่แรกแล้ว..."
51160-80 = "ถ้าชมรมไม่มีเธอ... ลำพังฉันคนเดียวคง..."
51160-84 = "[ns] \"เธอคือนางุสะสินะ\""
51160-88 = "......!"
51160-92 = "(หลังจากที่คุณครูได้รับการติดต่อมาจากชมรมวิจัยศาสตร์นินจาว่า \"เจอคนที่ดูคล้ายนางุสะอยู่ทางฝั่ง#nตะวันตก\" ก็รีบไปที่นั่นทันที)"
51160-93 = "(เมื่อไปถึง ก็ได้เจอเด็กสาวที่ก่อนหน้านี้เคยคุยกันครั้งหนึ่ง)"
51160-94 = "คุณคือ... คุณครูจากชาเล่ต์... ที่เคยเจอคราวก่อน..."
51160-95 = "[s] \"และเธอก็คือเด็กม.ปลายที่ยืนกินยากิโทริอย่างสบายใจเฉิบ...!\""
51160-96 = "อย่าง... สบายใจเฉิบ?"
51160-97 = "...ถ้าคิดจะมาเล่นมุกตลกไร้สาระก็หยุดเถอะ"
51160-98 = "ดูจากสีหน้าแล้ว คงรู้เรื่องอยู่แล้วสินะ ฉันไม่ได้ตั้งใจจะซ่อนตัวหรอก แต่ก็กลายเป็นแบบนี้ไปซะได้"
51160-99 = "[s] \"นางุสะ\""
51160-103 = "ใช่ ฉันเอง โกเรียว นางุสะ รองหัวหน้าเฮียกกะเรียวรัน"
51160-104 = "ไม่สิ... ตอนนี้ฉันคืนสิทธิ์ไปแล้ว ตอนนี้คงเป็นได้แค่อดีตสมาชิก"
51160-105 = "แล้วมีเรื่องอะไรกับฉันล่ะ?"
51160-106 = "มีธุระจะคุยด้วยงั้นเหรอ? คุณน่ะนะ? ธุระอะไร...?"
51160-107 = "[s] \"คราวก่อนที่เราคุยกันเรื่องศึกชิงตำแหน่ง... กับเฮียกกะเรียวรัน\""
51160-109 = "(คุณครูเล่าเรื่องที่เกิดขึ้นหลังจากนั้นให้นางุสะฟัง)"
51160-110 = "(ทั้งเรื่องที่ตามยูคาริไปพบคิเคียว เรื่องศึกชิงตำแหน่งและผลการดวล และเรื่องที่ยูคาริตัดสินใจเป็น#nมิโกะในงานเทศกาล)"
51160-112 = "...อืม เป็นอย่างนั้นสินะ"
51160-113 = "แบบนั้นมันคงถูกแล้วละ เป็นทิศทางที่ถูกต้องแล้ว"
51160-114 = "[s] \"...คิดอย่างนั้นจริงๆ เหรอ?\""
51160-115 = "...ทำไมล่ะ?"
51160-116 = "[s1] \"ยูคาริเล่าเรื่องของนางุสะให้ครูฟังตลอดเลย\"\n[s2] \"ยูคาริบอกว่าเข้ามาในเฮียกกะเรียวรันเพราะอยากเป็นเหมือนเธอนะ\""
51160-119 = "[ns3] \"เธออยากให้ยูคาริที่ใฝ่ฝันในเฮียกกะเรียวรัน...\"\n[ns4] \"อยากให้ยูคาริต้องจากไปแบบนั้นจริงๆ เหรอ?\""
51160-122 = "......"
51160-123 = "ฉันน่ะ..."
51160-124 = "[s] \"นางุสะ ครูได้ยินว่าเธอจะคืนสิทธิ์ของหัวหน้า\""
51160-125 = "ก็เลยสงสัยว่าฉันมาทำอะไรตรงนี้เหรอ?"
51160-126 = "อยากถามสินะว่าทำไมถึงไม่กลับมาหาทุกคนที่นี่แล้วทำกิจกรรมของเฮียกกะเรียวรันเหมือนเดิม?"
51160-127 = "......"
51160-128 = "คำตอบน่ะ ง่ายนิดเดียว"
51160-129 = "หัวหน้าของเฮียกกะเรียวรันคือ <นานาคาโดะ อายาเมะ>"
51160-130 = "อายาเมะเหมาะกับตำแหน่งหัวหน้าที่สุด"
51160-131 = "ต้องเป็นอายาเมะเท่านั้น"
51160-132 = "ฉันไม่มีสิทธิ์ทำหน้าที่แทนอายาเมะ ก็เลยจะถอยให้ก็เท่านั้น"
51160-136 = "ฉันไม่เหมาะสมที่จะเป็นหัวหน้าอย่างที่สมาชิกคนอื่นคิดหรอก ฉันไม่ได้มีสิทธิ์ขนาดนั้น..."
51160-137 = "ต่อให้ตอนนี้... คิเคียว เรนเกะ หรือแม้แต่ยูคาริจะไม่ยอมรับเรื่องนี้จนโกรธเคืองฉันกันอยู่"
51160-138 = "แต่ถ้าเวลาผ่านไป พวกนั้นก็จะเข้าใจเอง"
51160-140 = "ว่ารักษาการหัวหน้า... เป็นแค่ตำแหน่งที่ฉันถูกโยนภาระให้ทำก็เท่านั้น"
51160-141 = "ใช่ มันก็แค่นั้น..."
51160-146 = "[log=???][ff4444]<โกหก>[-][/log]"
51160-149 = "...?!"
51160-150 = "[s] \"เมื่อกี้มัน...?\""
51160-157 = "[ns] \"ดอกไม้ไฟที่จุดเพื่อเริ่มเทศกาล...\""
51160-158 = "(ดอกไม้ไฟระยิบระยับปรากฏบนท้องฟ้า)"
51160-160 = "(งานเทศกาลเริ่มขึ้นแล้ว)"
51160-171 = "เจ้าพวกปีศาจ... เอาอีกแล้วเหรอ?"
51160-176 = "เฮือก?!"
51160-177 = "มะ... ไม่ใช่นะ... นั่นไม่ใช่ฝีมือพวกเรา...!"
51160-178 = "เราไม่ได้ทำนะ! จริงๆ นะ!"
51160-179 = "[s] \"อะไรกันน่ะ? ใจเย็นๆ ก่อน...\""
51160-180 = "พวกเราแค่ตอบคำถามของยัยนั่นก็เท่านั้นเอง"
51160-181 = "ที่บอกว่าอยากได้ความช่วยเหลือน่ะ เราก็แค่คิดว่าสิ่งที่เด็กนั่นพูด <อาจเป็นจริงก็ได้>... ก็แค่นั้น"
51160-182 = "แต่ว่า...!"
51160-192 = "...!"
51160-193 = "[s] \"...นั่นอะไรน่ะ?\""
51160-194 = "...ตำนานร้อยเรื่องราววิญญาณลี้ลับ"
51160-195 = "ทำไมไม่อยู่ในทุ่งหิมะใหญ่... แต่มาอยู่ที่นี่...!"
51160-198 = "นักแสดงทุกคนอยู่บนเวทีแล้วค่ะ"
51160-199 = "เพราะงั้น ฉันจะเริ่มเลยนะคะ"
51160-203 = "[ruby=เรื่องลี้ลับ]ความสง่างาม[/ruby]ของพวกเรา... ของพวกเราเท่านั้น..."
51160-205 = "ตอนต่อไป;ปีศาจเดินขบวน 1"

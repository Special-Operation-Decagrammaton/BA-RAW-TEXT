[translation]
51160-1 = "Episode 16;Goryou Nagusa"
51160-5 = "(Excitement flutters on the swells of laughter filling the air.)"
51160-6 = "(The joy brought forth by the festival is nearly palpable.)"
51160-8 = "(Such a scene would have been commonplace, once upon a time.)"
51160-9 = "(A time when the Hyakkaryouran...)"
51160-12 = "When you and I would patrol the streets..."
51160-13 = "Ayame."
51160-15 = "She took out all those criminals in an instant, all by herself!"
51160-16 = "According to the records, that's the 127th time she's settled a conflict with no back-up."
51160-17 = "Despite all that, she's not above climbing trees to save lost cats or pets!"
51160-18 = "I even heard that...!"
51160-20 = "(Everyone talks about her.)"
51160-21 = "(Ayame's name is everywhere you turn.)"
51160-23 = "Ayame's a generational talent!"
51160-24 = "I sleep like a baby knowing Ayame's on shift."
51160-25 = "Nanakado Ayame is my role model! I really look up to her."
51160-27 = "Thank the gods for Ayame."
51160-32 = "Everyone knew the Hyakkaryouran was safe under Ayame's leadership."
51160-33 = "Ayame and I served the Hyakkaryouran together, side-by-side."
51160-34 = "She and I would be friends as long as we still breathed."
51160-35 = "I would always be her right-hand woman."
51160-37 = "I thought..."
51160-38 = "...my place was by her side."
51160-41 = "Can you believe it? It seems like President Ayame really did disappear."
51160-42 = "Rumor has it she met Kuzunoha and then...poof!"
51160-43 = "Kuzunoha isn't even real. There's no way."
51160-44 = "Well, she's definitely gone. What...do we do?"
51160-45 = "We don't have a president. Who'll lead the Hyakkaryouran?"
51160-46 = "What's going to happen...? "
51160-51 = "Don't look so gloomy. We're going to be fine."
51160-52 = "That's right! Nagusa is still here!"
51160-53 = "Nagusa has supported Ayame all these years. She's done so much for the Hyakkaryouran."
51160-55 = "Everything's going to be fine."
51160-62 = "It's not. It's really not."
51160-63 = "(How could I say that to them?)"
51160-64 = "I can't do that to them."
51160-67 = "(I'm not strong enough to bear this cross.)"
51160-68 = "Of course I'm not."
51160-72 = "Because I am not Ayame."
51160-76 = "I will never be Ayame."
51160-77 = "Ayame is the president of the Hyakkaryouran. Only she is qualified."
51160-79 = "I could never...hold a light to your flame..."
51160-80 = "What did you expect me to do...without you...?"
51160-84 = "[ns] \"I had a feeling you were Nagusa.\""
51160-88 = "...!"
51160-92 = "The Ninjutsu Research Club members found someone matching Nagusa's description in the West District, which led me straight to her."
51160-93 = "I recognized her as soon as I laid eyes on her again."
51160-94 = "Hello, again, Schale's Sensei."
51160-95 = "[s] \"You're chicken skewer girl from before!\""
51160-96 = "Chicken... What?"
51160-97 = "...This isn't the time for your antics. "
51160-98 = "It seems proper introductions are in order."
51160-99 = "[s] \"Nagusa.\""
51160-103 = "I'm caught. My name is Goryou Nagusa, vice president of the Hyakkaryouran."
51160-104 = "Ex-vice president, now."
51160-105 = "Why have you gone to such lengths to find me? "
51160-106 = "...Talk? To me?"
51160-107 = "[s] \"Last time we met, we talked about the succession battle...and the Hyakkaryouran.\""
51160-109 = "I explained to Nagusa the events that unfolded after our conversation."
51160-110 = "I told her about Yukari and Kikyou's meeting, and the ensuing succession contest. And how it ended in Yukari deciding to step into her role as the Kadenokouji miko."
51160-112 = "I see."
51160-113 = "Then things are as they should be. That is good."
51160-114 = "[s] \"Do you really think that?\""
51160-115 = "...Why do you ask?"
51160-116 = "[s1] \"Yukari always spoke so highly of you, Nagusa.\"\n[s2] \"She joined the Hyakkaryouran because of you.\""
51160-119 = "[ns3] \"You're just going to let her go?\"\n[ns4] \"You're not going to fight for her?\""
51160-122 = "..."
51160-123 = "...I..."
51160-124 = "[s] \"I heard you stepped down, Nagusa.\""
51160-125 = "Did you come here to find out why?"
51160-126 = "Why am I letting the Hyakkaryouran fall to ruin? Is that what you wished to ask me?"
51160-127 = "..."
51160-128 = "It's very straightforward."
51160-129 = "Nanakado Ayame is the president of the Hyakkaryouran."
51160-130 = "She was the only one qualified to fill that role. "
51160-131 = "She was...a generational talent."
51160-132 = "Ayame is irreplaceable. So I stepped down."
51160-136 = "Everyone was looking towards me, and it was inevitable I would let them down."
51160-137 = "Kikyou, Renge, and Yukari can yell and argue and disagree, but they can't alter reality."
51160-138 = "They'll come to see one day."
51160-140 = "I inherited the title of president. I have not earned it."
51160-141 = "Yes. Things are as they should—"
51160-146 = "[log=???][ff4444]Lies.[-][/log]"
51160-149 = "...?!"
51160-150 = "[s] \"Did you hear that too?\""
51160-157 = "[ns] \"Fireworks? The festival must have started.\""
51160-158 = "The explosions of the fireworks filled the night sky."
51160-160 = "And so, the festival officially began."
51160-171 = "Mouryo?! What're you—"
51160-176 = "Eek!"
51160-177 = "You gotta believe me! It wasn't us! "
51160-178 = "She used us! We weren't trying to summon nothing!"
51160-179 = "[s] \"What are you saying? Start from the beginning.\""
51160-180 = "She was asking us all these questions. "
51160-181 = "We didn't even, like, totally agree! She said she could help us, and it sounded nice."
51160-182 = "But then...!"
51160-192 = "...!"
51160-193 = "[s] \"What are those?!\""
51160-194 = "...The Phantom Fables."
51160-195 = "It should not be here. It has escaped the Great Snowfield."
51160-198 = "And so, the stage is set!"
51160-199 = "Draw the curtains. It is time."
51160-203 = "This elegant refinement, for me and only me."
51160-205 = "Next Episode;Rumors of the Streets 1"

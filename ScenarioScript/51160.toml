[translation]
51160-1 = "第16話;御稜名草"
51160-5 = "（興奮的心情、輕快的腳步，以及充滿期待的聲音）"
51160-6 = "（現在百鬼夜行的街上充滿了對慶典的期待與歡樂）"
51160-8 = "（過去的百鬼夜行再普通不過的光景……）"
51160-9 = "（這條街原本……是我們百花繚亂……）"
51160-12 = "是和你一起……巡視的……"
51160-13 = "…………菖蒲。"
51160-15 = "聽說菖蒲前輩這次又把問題學生全部打倒了！"
51160-16 = "這已經是第127次獨自解決紛爭了吧？"
51160-17 = "聽說之前菖蒲前輩還輕鬆解救了爬到樹上下不來的小貓。"
51160-18 = "而且不只這樣……！"
51160-20 = "（大家都在說著）"
51160-21 = "（有關菖蒲的事）"
51160-23 = "菖蒲前輩真的很厲害。"
51160-24 = "只要有菖蒲前輩在，不管發生什麼事都不必擔心！"
51160-25 = "七稜菖蒲前輩！總有一天我也要像前輩一樣──"
51160-27 = "有菖蒲前輩在百花繚亂真是太好了。"
51160-32 = "嗯，只要有菖蒲在，百花繚亂就不會有問題。"
51160-33 = "只要有菖蒲在……我也能繼續進行百花繚亂的活動。"
51160-34 = "身為菖蒲的青梅竹馬……"
51160-35 = "我總有一天也能站在菖蒲的身邊。"
51160-37 = "我本來──"
51160-38 = "──是這麼想的。"
51160-41 = "你聽說了嗎？菖蒲委員長突然消失了。"
51160-42 = "我倒是聽說他和葛葉大人交談後就銷聲匿跡了。"
51160-43 = "那是真的嗎？葛葉大人的事原來不只是傳聞嗎？"
51160-44 = "誰知道呢……不過先不說這個了，接下來怎麼辦？"
51160-45 = "以後百花繚亂會怎樣？#n這樣委員長的位置就空出來了吧？"
51160-46 = "我們將來會怎樣呢？"
51160-51 = "那種事不必放在心上，根本不必擔心。"
51160-52 = "沒錯，因為我們有名草前輩。"
51160-53 = "就算菖蒲前輩不在，我們也有他青梅竹馬的名草前輩在，名草前輩也一樣優秀。"
51160-55 = "所以沒關係。"
51160-62 = "不……不是那樣的。"
51160-63 = "（那是來不及說出口的心聲）"
51160-64 = "……我辦不到。"
51160-67 = "（對我來說，這[ruby=象徵]把槍實[/ruby]在太沉重了）"
51160-68 = "更何況……我……"
51160-72 = "[ruby=■ ■ ■ ■，■ ■ ■ ■ ■ ■ ■ ■ ■]因為我不是菖蒲[/ruby]。"
51160-76 = "[ruby=■ ■ ■ ■，■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■]因為我沒辦法代替菖蒲[/ruby]。"
51160-77 = "[ruby=■ ■ ■ ■ ■ ■ ■ ■ ■，■ ■ ■ ■ ■ ■ ■ ■]有資格成為百花繚亂委員長的人，就只有菖蒲而已[/ruby]。"
51160-79 = "打從一開始……我就沒有那個資格……"
51160-80 = "少了你的百花繚亂……我已經無法獨自……"
51160-84 = "[ns]「你果然就是名草啊。」"
51160-88 = "……！"
51160-92 = "（接到忍術研究部「好像在西區發現看似名草的人」的聯絡之後，立刻前往了現場）"
51160-93 = "（在那裡見到的，是曾經交談過的少女）"
51160-94 = "你是上次見過面的……夏萊的老師。"
51160-95 = "[s]「而你是那時見到的無限雞肉串幸福螺旋女高中生……！」"
51160-96 = "幸福螺旋……什麼？"
51160-97 = "……不必說無聊的笑話了。"
51160-98 = "從表情看來，你已經知道了吧。#n我其實沒有想隱瞞的意思，只是自然而然就變成這樣了。"
51160-99 = "[s]「名草。」"
51160-103 = "沒錯，我就是御稜名草。也就是百花繚亂的副委員長。"
51160-104 = "不，將象徵歸還的我……現在只是個退出的成員而已。"
51160-105 = "找我有什麼事嗎？"
51160-106 = "你有話想跟我說……？"
51160-107 = "[s]「上次見面時，我有說過關於繼承戰和百花繚亂的事吧。」"
51160-109 = "（將在那之後發生的事告訴了名草）"
51160-110 = "（像是跟著紫去見桔梗的事、繼承戰的結果……#n　以及紫決定在這次慶典中擔任巫女的事）"
51160-112 = "……是嗎，我明白了。"
51160-113 = "那才是對的吧。#n我認為那是正確的。"
51160-114 = "[s]「……你真的那麼想嗎？」"
51160-115 = "……嗯？"
51160-116 = "[s1]「紫經常提起你的事。」\n[s2]「說是因為憧憬你才會加入百花繚亂。」"
51160-119 = "[ns3]「紫離開百花繚亂……」\n[ns4]「這真的是你所期望的嗎？」"
51160-122 = "………………"
51160-123 = "……我……"
51160-124 = "[s]「名草，聽說你想歸還委員長的象徵。」"
51160-125 = "問我為什麼那麼做？"
51160-126 = "為什麼不回到大家所在的地方，為什麼不再以百花繚亂的身分活動？"
51160-127 = "……………………"
51160-128 = "答案很簡單。"
51160-129 = "百花繚亂的委員長是「七稜菖蒲」。"
51160-130 = "所以適合擔任委員長的人是菖蒲。"
51160-131 = "必須是菖蒲才行。"
51160-132 = "而我沒有資格代替菖蒲，所以才選擇離開。"
51160-136 = "……我並沒有那些孩子們想像中……那麼適合。#n我沒有那種資格……"
51160-137 = "雖然……現在桔梗、蓮華和紫都生氣地說無法接受……"
51160-138 = "但是只要時間久了，我相信大家就會明白。"
51160-140 = "委員長代理……只不過是強加在我身上的稱號罷了。"
51160-141 = "沒錯，僅此而已──"
51160-146 = "[log=???][ff4444]「騙人」[-][/log]"
51160-149 = "……！？"
51160-150 = "[s] 「剛剛那是……？」"
51160-157 = "[ns]「啊，是告知慶典開始的煙火……」"
51160-158 = "（煙火在空中綻放）"
51160-160 = "（慶典正式開始）"
51160-171 = "妖怪劇團，你們……"
51160-176 = "咦咦！？"
51160-177 = "不，不是……！那不是我們做的……！"
51160-178 = "不是我們叫來的！真的不是！"
51160-179 = "[s]「什麼意思？先冷靜下來……」"
51160-180 = "我們只是回答了那傢伙的問題而已。"
51160-181 = "只是在被他問到需不需要幫助的時候，心想「也許吧」而已……"
51160-182 = "可是……！"
51160-192 = "…………！"
51160-193 = "[s]「……那是什麼？」"
51160-194 = "………………[ruby=怪談]幻魎百物語[/ruby]。"
51160-195 = "為什麼……不在大雪原而在這裡……！"
51160-198 = "演員已齊聚一堂。"
51160-199 = "那麼就開始吧。"
51160-203 = "……只屬於我們的[ruby=怪談]風情[/ruby]。"
51160-205 = "下一話;漫步街道的怪談（１）"

[translation]
2004503-1 = "ไกด์อัจฉริยะ"
2004503-2 = "(คุณครูมาร่วมทัวร์รสบัสกับไกด์พีน่า)"
2004503-3 = "(โปรแกรมทัวร์นี้จะแวะไปยังสถานที่ต่างๆ ในเฮียกคิยาโค)"
2004503-5 = "เอาละ เราจะไปยังสถานที่ต่อไปกันแล้วค่ะ! รบกวนทุกคนกลับขึ้นรถด้วยค่ะ!"
2004503-6 = "คุณครูก็รีบขึ้นรถนะคะ!"
2004503-7 = "[s1] \"เหนื่อยน่าดูเลยนะ ไกด์พีน่า\"\n[s2] \"คอยคุมลูกทัวร์หลายๆ คนแบบนี้คงจะเหนื่อยน่าดูเลยนะ\""
2004503-10 = "ไม่หรอกค่ะ! การดูแลผู้คนจำนวนมากเป็นทักษะของฮีโร่อยู่แล้วค่ะ!"
2004503-11 = "ถึงตารางเราจะล่าช้ากันไปนิด แต่ถ้ารีบออกเดินทาง ก็น่าจะเที่ยวต่อแบบชิลๆ ได้ค่ะ!"
2004503-12 = "เอาละ ออกเดินทางกันเลยค่ะ!"
2004503-18 = "มาถึงสถานที่สุดท้ายของวันนี้แล้วค่ะ! เอาละค่ะ ทุกคนค่อยๆ ลงจากรถนะคะ"
2004503-27 = "หนึ่ง... สอง..."
2004503-29 = "สิบเอ็ด... สิบสอง..."
2004503-30 = "..."
2004503-31 = "..."
2004503-35 = "What!?"
2004503-36 = "[s3] \"เกิดเรื่องอะไรงั้นเหรอ?!\"\n[s4] \"เกิดปัญหาอะไรเหรอ?\""
2004503-39 = "คะ... ค่ะ!!!!"
2004503-40 = "เกิดเรื่องใหญ่เลยค่ะบอส ไม่สิ คุณครู!!"
2004503-41 = "นับแล้วไม่ครบ!! ลูกทัวร์หายไปคนหนึ่งค่ะ...!!"
2004503-42 = "[s] \"นับผิดหรือเปล่า...?\""
2004503-43 = "ไม่ค่ะ ฉันนับถูกแน่นอน!"
2004503-44 = "และฉันก็จำหน้าของลูกทัวร์ได้หมดตามระเบียบของไกด์ด้วยค่ะ!"
2004503-45 = "เหมือนจะมีคนหนึ่งที่ไม่ได้ขึ้นรถมาจากจุดเมื่อกี้นะคะ!!!"
2004503-46 = "[s5] \"ใจเย็นๆ ก่อนนะ เดี๋ยวครูช่วยหาอีกแรง\"\n[s6] \"ตอนนี้เป็นเวลาอิสระ งั้นเรากลับไปที่ก่อนหน้ากันเถอะ!\""
2004503-49 = "ค่ะ... ค่ะ!!"
2004503-53 = "(คุณครูกับพีน่าเรียกแท็กซี่ไปด้วยความรีบเร่ง ส่วนพีน่าก็นั่งกระสับกระส่ายไปตลอดทาง)"
2004503-55 = "เราต้องรีบหาให้เจอค่ะ!!"
2004503-56 = "แล้วต้องขอโทษยังไงดีนะ... ฮือ... ฮืออ..."
2004503-61 = "เฮ้ พี่ไกด์"
2004503-62 = "มะ... มายก้อดดดด!!"
2004503-66 = "[ns] \"วะ... เหวอออ!!\""
2004503-67 = "อะ... อ๊ายย... ทำไมถึงตกอกตกใจขนาดนั้นล่ะ ทำเหมือนเห็นผีอย่างนั้นละ"
2004503-68 = "เอ่อ... คะ... คือว่า..."
2004503-69 = "อะไรกัน นี่ฉันกลับมาเป็นคนแรกเลยเหรอ? เราต้องกลับมาเจอกันตรงนี้ใช่มั้ย?"
2004503-70 = "มะ... มันไม่ใช่อย่างนั้นค่ะ... เอ่อ...!"
2004503-71 = "[s7] \"ไกด์พีน่า... จะมาชวนไปทัวร์แท็กซี่น่ะ\"\n[s8] \"เราสามคนไปทัวร์แท็กซี่กันดีมั้ย?\""
2004503-77 = "ทัวร์แท็กซี่?"
2004503-78 = "..."
2004503-79 = "[s9] \"สถานที่สุดท้ายต้องนั่งแท็กซี่กันไปน่ะ\"\n[s10] \"พวกเรานั่งแท็กซี่คันเดียวกันไปเถอะ\""
2004503-82 = "!!"
2004503-83 = "...!"
2004503-84 = "ขอโทษด้วยค่ะ... เป็นความผิดของฉันเองที่ลืมคุณไป..."
2004503-85 = "ตอนนี้ลูกทัวร์คนอื่นไปยังสถานที่ต่อไปแล้วค่ะ"
2004503-86 = "ฉันจะพาคุณนั่งแท็กซี่กลับไปด้วยกันนะคะ..."
2004503-91 = "..."
2004503-94 = "อะ... อ้าว..."
2004503-95 = "..."
2004503-96 = "อะไรกัน เป็นแบบนั้นหรอกเหรอ?"
2004503-97 = "ขอโทษนะ พอดีฉันไปเจอร้านขายของที่ระลึกที่ถูกใจ ก็เลยอยู่ที่นั่นจนลืมเวลาไปเลย"
2004503-98 = "ก็ว่าอยู่ว่าคนอื่นหายไปไหนกันหมด..."
2004503-99 = "!!"
2004503-100 = "ฉันเป็นคนผิดแท้ๆ แต่ก็ขอบคุณนะที่นั่งรถมารับ"
2004503-101 = "งั้นรีบกลับกันเถอะพี่ไกด์"
2004503-102 = "ค่ะ! ฉันจะพากลับไปเองค่ะ ลูกพี่!"
2004503-103 = "ละ... ลูกพี่...?"
2004503-107 = "มาถึงทันเวลารวมตัวพอดีเลยค่ะ!"
2004503-111 = "เฮ้~ ฉันกลับมาแล้ว"
2004503-112 = "หายไปไหนมาน่ะ?"
2004503-113 = "ฉันเป็นลูกทัวร์ VIP ก็เลยได้ไปทัวร์แท็กซี่มาน่ะสิ~"
2004503-117 = "ภารกิจสำเร็จจนได้นะคะ..."
2004503-123 = "[ns] \"พีน่า?!\""
2004503-125 = "(หลังจากนั้นพีน่าก็ปิดโปรแกรมทัวร์ได้อย่างราบรื่น)"
2004503-126 = "(พีน่ากลับมามีแรงอีกครั้ง เธอส่งลูกทัวร์กลับพลางนับจำนวนอย่างไม่ขาดตกบกพร่อง)"

[translation]
2004503-1 = "菁英導覽"
2004503-2 = "（參加了菲娜負責的巴士導覽行程）"
2004503-3 = "（是帶觀光團遊覽百鬼夜行各處的套裝行程）"
2004503-5 = "來～該繼續下一個行程囉！#n請大家上車！"
2004503-6 = "老師也是！"
2004503-7 = "[s1]「菲娜現在已經當導覽員當得得心應手了呢。」\n[s2]「一次帶領很多人應該很辛苦吧。」"
2004503-10 = "沒事的！帶領眾人也是任俠必要的素養之一！"
2004503-11 = "雖然稍微晚了一點，但如果盡快出發應該還趕得上！"
2004503-12 = "那麼，出發～！"
2004503-18 = "接下來是今天的最後一個行程！#n大家下車時請小心腳步～"
2004503-27 = "一位……兩位……"
2004503-29 = "十一位……十二位……"
2004503-30 = "……"
2004503-31 = "……"
2004503-35 = "What！？"
2004503-36 = "[s3]「怎麼了！？」\n[s4]「有什麼問題嗎？」"
2004503-39 = "糟了！！！！"
2004503-40 = "大事不好了！頭兒……不對，老師！"
2004503-41 = "少了一個人……！！人數對不上！！"
2004503-42 = "[s]「會不會是你記錯了？」"
2004503-43 = "不，我算得很清楚！"
2004503-44 = "而且我也有依照導覽員守則，記住每位遊客的的臉！"
2004503-45 = "應該是有位客人沒在上一個地方上車！！！"
2004503-46 = "[s5]「你先冷靜下來。」\n[s6]「現在是自由觀光行程，我們回剛才那裡看看吧！」"
2004503-49 = "是……是的！！"
2004503-53 = "（急忙搭計程車回去的路上，菲娜明顯相當慌張）"
2004503-55 = "一定要趕快找到！！"
2004503-56 = "這下該怎麼賠罪呢……#n嗚……嗚嗚……"
2004503-61 = "嗨，導覽員姐姐。"
2004503-62 = "哇啊啊！！"
2004503-66 = "[ns]「唔，唔哇！！」"
2004503-67 = "唉唷……嚇我一跳。#n為什麼要這麼驚訝呢？好像看到鬼一樣。"
2004503-68 = "就……就是……我……"
2004503-69 = "怎麼，我是第一個到的嗎？是在這裡集合沒錯吧？"
2004503-70 = "我，我要說的是……那個……！！"
2004503-71 = "[s7]（菲娜完全陷入恐慌狀態了……先幫他打個圓場，避免客人不開心吧）\n[s8]「我們有特別服務，請問你想不想試試看計程車導覽呢？」"
2004503-77 = "計程車導覽？"
2004503-78 = "……"
2004503-79 = "[s9]「就是搭計程車前往下一個地點。」\n[s10]「可以沿路幫你導覽哦……」"
2004503-82 = "！！"
2004503-83 = "……！"
2004503-84 = "對不起……#n是因為我沒注意到客人你……"
2004503-85 = "其他人已經在下個地點了。"
2004503-86 = "雖然晚了一點，但現在會馬上用計程車送你過去……"
2004503-91 = "……"
2004503-94 = "嗚……嗚嗚……"
2004503-95 = "……"
2004503-96 = "什麼嘛～原來是這樣啊。"
2004503-97 = "抱歉抱歉，是我一逛到喜歡的紀念品店就忘記時間了。"
2004503-98 = "怪不得都沒人，原來是這麼回事～"
2004503-99 = "！！"
2004503-100 = "明明是我不好，還特地回來接我，真的很謝謝你們。"
2004503-101 = "快走吧，導覽員姐姐。"
2004503-102 = "是！#n吾將竭誠侍奉，大姐頭！"
2004503-103 = "大……大姐頭……？"
2004503-107 = "正好趕上集合時間了！"
2004503-111 = "呀呼～我回來囉。"
2004503-112 = "你剛才跑去哪裡了啊？"
2004503-113 = "我是VIP所以搭計程車啦～"
2004503-117 = "總算完成任務了……"
2004503-123 = "[ns]「菲娜！？」"
2004503-125 = "（之後順利跑完了行程）"
2004503-126 = "（重新振作起來的菲娜在送走遊客之前，專心清點了兩三次人數）"

[translation]
21150-1 = "第15話;潛藏的危機"
21150-2 = "千年．作戰指揮中心"
21150-3 = "把沒收來的機器人全部派出來！"
21150-4 = "本來是想要重新塗裝後，當成校園掃除機器人來用的說……"
21150-5 = "現在也只好棄車保帥了，先擊退入侵者再說！"
21150-6 = "已經把它們都改成能聽從女僕部的命令了，朱音！"
21150-7 = "了解了。那麼就讓我用這些機器人，好好的「清掃」一下遊戲開發部吧。"
21150-9 = "千年．校舍走廊"
21150-10 = "嗚啊啊！"
21150-11 = "雖然很亂來，但是好強……！"
21150-12 = "這就是C&C的特務……！"
21150-15 = "哼嗯……"
21150-18 = "（比想像中強上很多。雖然就算是場面話，戰鬥能力也稱不上很好……）"
21150-19 = "（但是他們的團隊合作……應該是這麼說吧。#n　簡直像是一心同體的動作。就這點來說，毫無疑問是高手級別的……）"
21150-21 = "這就是雙胞胎的力量，是嗎。很好很好！"
21150-23 = "嗚，沒想到會在這裡碰上明日奈前輩……"
21150-24 = "姐姐……暫時撤退吧！"
21150-25 = "嗯，沒辦法了……！"
21150-28 = "不會讓你們走的唷！"
21150-29 = "（咚喀！）"
21150-30 = "呀啊！？"
21150-31 = "是大口徑的子彈！？為什麼！？"
21150-32 = "這個是花凜前輩的……難道說，詠葉前輩他……！？"
21150-34 = "千年．第3校舍樓頂"
21150-35 = "……"
21150-36 = "為什麼，我會倒在地上……還有，這個大屁股到底是誰的……？"
21150-37 = "……屁股長得大真是抱歉啊。"
21150-38 = "我應該打中了相當不妙的地方才對……比我想像中醒得還早啊。"
21150-39 = "……抱歉，我沒有手下留情的餘裕了。"
21150-40 = "沒想到你就算在響的攻擊之中，也能夠成功的狙擊我呢。#n而且，你會像這樣接近我是因為……"
21150-41 = "沒錯。如果是這種狀態的話，崇拜前輩的她也不會繼續攻擊了吧。"
21150-42 = "唉，這真是出乎我的意料了。#n在那種煙霧瀰漫的環境中，為什麼還能準確地擊中我呢？"
21150-43 = "C&C可沒有只能靠視覺捕捉敵人的那種狙擊手。"
21150-44 = "比起這個，你還是別離我太遠比較好。#n再做多餘的抵抗也只會讓身體更痛而已。這樣我也會心痛的。"
21150-45 = "……"
21150-46 = "能讓我稍微離開一點嗎。這種狀態離你的屁股太近了，我有點困擾。"
21150-47 = "你轉頭過去不就好了！？"
21150-49 = "千年．校舍走廊"
21150-50 = "晴前輩傳來消息！詠葉前輩沒能成功壓制花凜前輩，已經被抓住了！"
21150-51 = "看這個情況就知道了吧！"
21150-52 = "啊，真紀也傳來消息了！朱音前輩好像炸開閘門逃出去了的樣子！"
21150-53 = "同時，還有很大量的機器人朝這邊過來了……！"
21150-54 = "咦咦！？"
21150-57 = "啊哈哈，雖然不知道發生了什麼事，看來好像是我們這邊佔上風了？"
21150-58 = "該不會，你們的計劃已經快失敗了吧！"
21150-60 = "嗚嗚……！"
21150-61 = "失敗……"
21150-62 = "……不對，"
21150-63 = "還沒有失敗……！"
21150-65 = "千年．貝里塔斯"
21150-66 = "（作戰開始前15分鐘）"
21150-67 = "嗚嗚，不管怎麼想最後都會變成這樣……"
21150-68 = "破壞大門，吸引大家的注意應該是可以成功的。"
21150-69 = "接著就是關住朱音前輩和明日奈前輩、阻止花凜前輩、和學生會的警備機器人對峙。只要突破這裡，要進入扣押品保管所就不難了……"
21150-70 = "但是只要其中一個失敗的話……"
21150-71 = "這樣的話，計劃就整個泡湯了。#n要和準備完全的女僕部對抗什麼的，不管是千年的哪個集團都沒辦法。"
21150-72 = "就算拿出陽葵前輩的名字讓他們陷入混亂，#n也只能多少爭取一點時間，最後終究會被包圍。"
21150-73 = "在開始入侵的2分鐘內封住朱音前輩，或者是在一起的明日奈前輩兩個人。#n5分鐘後阻止花凜前輩，11分鐘後突破機器人，13分鐘後得到「鏡子」，接下來……"
21150-74 = "……不管再怎麼努力，20分鐘後大家都會被抓住。"
21150-75 = "……"
21150-76 = "……只要不是所有人的話，就可以了吧？"
21150-77 = "咦？"
21150-78 = "就算我們之中的幾個人輸了，最後也能勝利的方法……"
21150-79 = "如果，在這個時間點……"
21150-80 = "綠，綠，你在說什麼？"
21150-81 = "……計劃沒有順利進行的時候，也要好好計劃才行。"
21150-83 = "千年．學生會的反省室"
21150-86 = "……啊。"
21150-87 = "電力中斷，發生這個事件也就是說……"
21150-89 = "（喀鏘）"
21150-90 = "發動EMP……變更為晴前輩駭入的設定……#n讓塔內的電子門都能夠自由進出，和對付閘門用的方法一樣……"
21150-91 = "已成功掌握。"
21150-92 = "愛麗絲，準備逃脫。"
21150-93 = "接下來，愛麗絲的任務就是……"
21150-94 = "……首先，前往學生會的扣押品保管所。"
21150-100 = "千年．校舍走廊"
21150-101 = "只要我們把事情鬧得越大，愛麗絲那邊的警戒就會越弱才對……"
21150-102 = "而且，就算在這個時候有人被抓了……只是被軟禁的話，#n還能在社團室裡面一邊看著G.Bible一邊製作《故事．傳說．編年史２》。"
21150-103 = "嗯？你們在聊什麼呀～？"
21150-104 = "雖然我也感覺到你們好像沒什麼決心了……不會是要放棄了吧？"
21150-105 = "這種情況下，放棄或許才是明智的選擇吧。"
21150-106 = "嗚，優香！"
21150-107 = "好久不見呢。#n首先我就表揚一下你們吧，竟然能搞出這麼大的狀況。這點還是很讓我吃驚的。"
21150-108 = "不過這是兩回事……"
21150-109 = "竟然用這麼多手段來襲擊學生會，再怎麼說都太超過了。"
21150-110 = "雖然我說過要給你們緩衝期間，看來是我太心軟了呢。"
21150-111 = "惡作劇就到此為止了。你們最好做好無條件停學一週和被關禁閉的覺悟比較好。"
21150-113 = "停學！？關禁閉！？"
21150-114 = "怎麼這樣，如果要關一個星期的話……千年大賞就要結束了！"
21150-115 = "愛麗絲醬現在也待在反省室裡喔。放他一個人待在那裡實在是有點可憐，#n如果能和你們一起的話，愛麗絲醬也會很高興的吧。"
21150-116 = "嗚……！"
21150-117 = "姐，姐姐……"
21150-118 = "本來覺得被抓住也沒關係的……"
21150-119 = "就這樣下去……就算搶到了「鏡子」，只靠愛麗絲跟柚子也沒辦法做出遊戲……"
21150-120 = "只好想辦法突破這裡了！"
21150-122 = "突破？#n嘿～要突破[ruby= ・     ・ ]我們[/ruby]？"
21150-123 = "呼～終於到了……竟然會上氣不接下氣，難道體重真的……不，那應該不可能……"
21150-125 = "咦咦！？"
21150-126 = "朱，朱音前輩？就連戰鬥機器人也來了！"
21150-128 = "呵呵，看來這次總算是「本人」了呢。"
21150-129 = "初次見面。桃井醬、綠醬。"
21150-130 = "關於真紀醬和亞都梨醬，雖然勉強還能算在允許的範圍內……"
21150-131 = "不過對於深入這裡的你們，已經沒有能夠辯解的空間了唷。"
21150-132 = "況且……"
21150-133 = "老師，我也會將抗議信送往夏萊的，還請見諒。"
21150-136 = "嗚嗚……"
21150-137 = "真的，到此為止了嗎……？不要……！"
21150-138 = "姐姐……！"
21150-139 = "對不起，對不起老師……#n明明老師幫了我們這麼多，是我們能力不足……是我們的錯……！！"
21150-140 = "[s1] 「不要放棄。」\n[s2] 「抱歉。要是我更有能力的話……」"
21150-141 = "我也想那樣，可是……已經沒辦法了。"
21150-142 = "前有C&C，後有千年的學生會……這可是千年最頂尖的兩大勢力啊。"
21150-143 = "在這種狀況下，到底要怎麼樣才……"
21150-144 = "老師……"
21150-145 = "不是老師的錯，是我，是我們……"
21150-146 = "但是，現在這種情況，已經……"
21150-148 = "目標已確認。"
21150-149 = "（嗡──……）"
21150-150 = "魔力填充，100%……"
21150-151 = "這，這個聲音是……"
21150-152 = "姐姐，快趴下！"
21150-154 = "？"
21150-155 = "嗯？"
21150-156 = "……？"
21150-159 = "光呀！！"
21150-160 = "（咚喀！）"
21150-161 = "嗚！！"
21150-162 = "呀啊！"
21150-163 = "明，明日奈前輩，你沒事吧！？"
21150-164 = "沒事才怪──！啊哈哈，完全被命中了呢！#n這是什麼，超痛的，從頭到腳我一毫米都不想再動了！"
21150-165 = "……看來是沒事。"
21150-166 = "怎麼會，明日奈前輩和接近一半的機器人都動彈不得了……！？"
21150-167 = "只，只用一發就有這種火力……！"
21150-168 = "花凜，回報狀況！剛剛的光束砲到底是從哪裡……！？"
21150-169 = "花凜，花凜！？這麼說來，花凜的火力支援也停止了……從什麼時候開始的！？"
21150-170 = "（嗡──……）"
21150-171 = "那道光是……從屋頂上！？"
21150-173 = "千年．第3校舍頂樓"
21150-174 = "嗚，眼睛被……！竟然是閃光彈！？"
21150-175 = "我的後輩，可是不願意擊中重要的前輩的溫柔的後輩呀……我想你猜的沒錯。"
21150-176 = "而且，還非常聰明。聰明到能夠預測到這個狀況，並且做出正確的選擇。"
21150-177 = "嗚，這樣就沒辦法支援朱音了……為什麼要做到這種地步……！"
21150-178 = "你說為什麼……？那當然是為了保護社團囉？"
21150-179 = "……就算是不喜歡聽八卦的我也聽說過。"
21150-180 = "雖然我不清楚工程師部的情況，#n但那個遊戲開發部，很難稱得上是在進行正常的社團活動。"
21150-181 = "那種自我中心的問題兒童，為什麼要幫他們？"
21150-182 = "……因為他們並不只是單純的以自我為中心，吧。"
21150-183 = "那些孩子們為了朋友，正拚盡全力的努力著。"
21150-184 = "就算不能作為社團活動，也能做遊戲吧。"
21150-185 = "……你說的沒錯。"
21150-186 = "但是，就算只是普通的「朋友」也是有意義的，更何況……"
21150-187 = "作為同一個社團的夥伴，彼此的羈絆會更加的強烈。"
21150-188 = "那些孩子們，就是因為有著想要在那個社團裡一起努力的心情……"
21150-189 = "所以才會，這麼努力的奮鬥著吧。"
21150-190 = "但，但是……！"
21150-192 = "（咻……）"
21150-194 = "（咚喀！）"
21150-195 = "糟了！？"
21150-196 = "……呵呵。"
21150-199 = "雖然和計算的不一樣……不過變得有趣了呢。"
21150-201 = "千年．校舍走廊"
21150-202 = "桃井，綠！"
21150-203 = "趁現在！"
21150-204 = "愛麗絲醬！？"
21150-205 = "為什麼會在這裡！？"
21150-206 = "我在往學生會的扣押品保管所的途中一直在思考著。"
21150-207 = "《大空戰士》、《勇士鬥惡龍》、《時間幻境》、《龍機傳統》、《英雄傳奇》、#n《尹蘇》……還有《故事．傳說．編年史》……"
21150-208 = "不管在哪個遊戲中，主角們總是……"
21150-209 = "不管發生什麼事，都絕對不會放棄夥伴。"
21150-210 = "所以，愛麗絲也要這麼做。"
21150-212 = "讓我們一起，突破試煉吧！"
21150-214 = "愛麗絲醬……"
21150-215 = "……嗯，反正就這麼被抓住的話也完蛋了。"
21150-216 = "上吧，遊戲開發部！"
21150-217 = "嗯！"
21150-219 = "嗚，不妙了呢……！"
21150-220 = "啊哈哈，變得有趣起來了呢！不過身體還在不斷顫抖，站都站不穩！"
21150-221 = "明日奈前輩，那真的是因為痛嗎……？#n話說回來，花凜也停止狙擊了，也就是說那邊也……"
21150-222 = "要，要被他們跑了！"
21150-223 = "不，我不會讓他們這麼做的……！"
21150-224 = "明日奈前輩，請盡可能退後吧。"
21150-226 = "朱音，準備開始戰鬥！"

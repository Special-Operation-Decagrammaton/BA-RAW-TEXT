[translation]
21150-1 = "ตอนที่ 15;อันตรายที่กำลังเข้ามา"
21150-2 = "ห้องควบคุม อาคารเรียนหลัก มิลเลเนียม"
21150-3 = "เปิดกองทัพหุ่นยนต์ทั้งหมดที่ยึดมา!"
21150-4 = "เดิมทีเราจะลงสีใหม่แล้วเอามาใช้เป็นหุ่นยนต์ทำความสะอาดโรงเรียน แต่ก็ช่วยไม่ได้..."
21150-5 = "ขอเอามาใช้ขับไล่ผู้บุกรุกก่อนแล้วกัน!"
21150-6 = "มอบอำนาจในการสั่งการทั้งหมดให้ชมรมเมด! อาคาเนะ!"
21150-7 = "รับทราบค่ะ ฉันกับพวกหุ่นยนต์จะกวาดล้างชมรมพัฒนาเกมเอง"
21150-9 = "ทางเดินในอาคารเรียนหลัก มิลเลเนียม"
21150-10 = "อ๊าาาา!"
21150-11 = "หะ... โหดชะมัด...!"
21150-12 = "นี่สินะ... พลังของสายลับ C&C...!"
21150-15 = "หึหึ..."
21150-18 = "(อืม... เด็กพวกนี้ไม่แย่อย่างที่คิดแฮะ แต่ก็ไม่ใช่ว่าพลังการต่อสู้จะยอดเยี่ยมหรอก...)"
21150-19 = "(นี่สินะที่เรียกว่าทีมเวิร์ก เหมือนคนสองคนรวมร่างกันเป็นหนึ่งเดียวเลย ปกติมีแต่พวกผู้เชี่ยวชาญ#nไม่ใช่เหรอที่ทำอย่างนี้ได้?)"
21150-21 = "พลังของฝาแฝดงั้นเหรอ~ น่ารักจังเลยนะ~"
21150-23 = "อึ่ก... ไม่อยากเชื่อเลยว่าจะมาเจอรุ่นพี่อาสึนะที่นี่"
21150-24 = "ไม่ได้การแล้วล่ะพี่โมโมอิ เราถอยกันก่อนเถอะ!"
21150-25 = "ช่วยไม่ได้สินะ"
21150-28 = "จะถอนกำลังเหรอ~ ใครจะไปยอมกันล่ะ!"
21150-29 = "(ตู้มมม!)"
21150-30 = "อ๊าาา!"
21150-31 = "กระสุนขนาดใหญ่? อย่าบอกนะว่า...?"
21150-32 = "หรือว่า... รุ่นพี่คาริน... ยิงรุ่นพี่อุทาฮะเหรอ?!"
21150-34 = "ชั้นดาดฟ้า อาคารเรียนที่ 6 มิลเลเนียม"
21150-35 = "......"
21150-36 = "เอ๋? ทำไมฉันมานอนอยู่ล่ะ? แล้วก้นใครมาอยู่ตรงหน้าฉัน...?"
21150-37 = "ฉันเอง..."
21150-38 = "น่าจะโดนยิงไปเต็มๆ เลยแล้วนี่ ได้สติเร็วกว่าที่คิดนะ"
21150-39 = "ขอโทษนะ จะไม่มีเวลามาคำนวณอยู่หรอกว่าต้องทำขนาดไหน"
21150-40 = "นี่เธอ... ลอบยิงฉันอย่างแม่นยำจากในกลุ่มควันปืนใหญ่ แล้วก็มาอยู่ข้างๆ ฉันที่ล้มพับไปงั้นเหรอ?"
21150-41 = "ใช่ ถ้าเป็นแบบนี้ เด็กปืนครกคนนั้นก็คงไม่กล้ายิงปืนใหญ่มาบนดาดฟ้าเพราะกลัวว่าจะโดนรุ่นพี่ไงล่ะ"
21150-42 = "อ่า... คิดไม่ถึงเลย เธอยิงฉันอย่างแม่นยำจากกลุ่มควันแบบนั้นได้ยังไง?"
21150-43 = "ไม่รู้จักสไนเปอร์คนเดียวแห่ง C&C ที่ค้นพบศัตรูได้เพียงแค่มองผ่านสายตาเหรอ?"
21150-44 = "อย่าอยู่ห่างฉันมากเกินไปล่ะ เพราะฉันจะเจ็บใจ และเธอจะเจ็บตัว"
21150-45 = "......"
21150-46 = "ขอร้องล่ะ จะให้ฉันโดนปืนครกนั่นก็ได้ แต่ช่วยออกไปไกลๆ จากฉันเถอะ#nก้นของเธอมันใกล้หน้าของฉันเกินไปแล้ว"
21150-47 = "ก็หันหน้าไปทางอื่นสิ!"
21150-49 = "ทางเดินในอาคารเรียนหลัก มิลเลเนียม"
21150-50 = "รุ่นพี่ฮาเระติดต่อมาล่ะ! รุ่นพี่คารินฟื้นแล้ว! ส่วนรุ่นพี่อุทาฮะถูกจับตัวอยู่!"
21150-51 = "ดูจากสถานการณ์ก็รู้แล้ว!"
21150-52 = "มากิก็ติดต่อมา! รุ่นพี่อาคาเนะระเบิดฉากกั้นแล้วหนีออกมาได้!"
21150-53 = "และพวกหุ่นยนต์กลุ่มใหญ่ก็กำลังแห่กันมาทางนี้!"
21150-54 = "เฮือก..."
21150-57 = "อะฮ่ะฮ่า! ฉันไม่รู้รายละเอียดอะไรหรอก แต่คิดว่าเรากำลังชนะอยู่นะ~"
21150-58 = "และรู้สึกว่าพวกเธอกำลังล้มเหลวกับแผนการนี้~"
21150-60 = "อึ่ก...!"
21150-61 = "นี่เราทำไม่สำเร็จเหรอ..."
21150-62 = "ไม่หรอก..."
21150-63 = "มันยังไม่จบหรอกนะ"
21150-65 = "เวอริทัส มิลเลเนียม"
21150-66 = "(15 นาทีก่อนหน้านี้)"
21150-67 = "อึ่ก... ไม่ว่าจะคิดยังไง แต่สุดท้ายก็มาติดอยู่ที่นี่"
21150-68 = "เราดึงดูดความสนใจของทุกคนได้ ต้องทำให้ได้"
21150-69 = "หยุดอาคาเนะกับอาสึนะ ขัดขวางคาริน และประจัญหน้ากับหุ่นยนต์คุ้มกันของสภานักเรียน#nถ้าฝ่าตรงนี้ไปได้ ก็จะไปถึงคลังของที่ถูกยึดได้ ถึงจะลำบากหน่อยก็เถอะ..."
21150-70 = "แต่หากทำไม่สำเร็จแม้แต่อย่างเดียวล่ะก็..."
21150-71 = "ต้องไม่สำเร็จแน่ ไม่มีกลุ่มไหนในมิลเลเนียมที่จะเผชิญหน้ากับชมรมเมดที่เตรียมพร้อมกับ#nการสู้รบอยู่เสมอหรอกนะ"
21150-72 = "ถึงรุ่นพี่ฮิมาริจะทำให้เกิดความสับสน แต่สุดท้ายเราก็จะถูกล้อมระหว่างถ่วงเวลาอยู่ดี"
21150-73 = "พอเข้าไปแล้ว เราต้องหยุดรุ่นพี่อาคาเนะกับรุ่นพี่อาสึนะภายในเวลา 2 นาที หลังจากนั้น 5 นาที#nก็ไปขวางรุ่นพี่คาริน 11 นาทีต่อมาก็ไปฝ่าหุ่นจักรกล และหลังจากนั้น 13 นาทีก็ไปเอากระจก...#nจากนั้นก็..."
21150-74 = "จับกุมทุกคนได้ใน 20 นาที?"
21150-75 = "......"
21150-76 = "มันจะต้อง... ทุกคนเลยเหรอ?"
21150-77 = "เอ๋?"
21150-78 = "ถ้าเราอยากชนะ หนึ่งในพวกเราอาจจะต้องยอมแพ้ก็ได้"
21150-79 = "และถ้าถึงตอนนั้น..."
21150-80 = "พูดอะไรของเธอน่ะมิโดริ?"
21150-81 = "ในแผนของเรามีแผนสำรองในกรณีที่ไม่เป็นไปตามแผนการยังไงล่ะ"
21150-83 = "ห้องสำนึกผิด สภานักเรียนมิลเลเนียม"
21150-86 = "อ่า..."
21150-87 = "การปิดกั้นระบบไฟฟ้านี่หมายถึง..."
21150-89 = "(แกร๊ก)"
21150-90 = "เกิด EMP... จากการตั้งค่าผ่านการแฮ็กของรุ่นพี่ฮาเระ...#nประตูอิเล็กทรอนิกส์ในอาคารสภานักเรียนถูกเปิด... อย่างเดียวกันกับฉากกั้น"
21150-91 = "ดีล่ะ"
21150-92 = "อาริสึ ได้เวลาหนีแล้วค่ะ"
21150-93 = "ถ้างั้น... เควสของอาริสึ..."
21150-94 = "ก็ต้องเปลี่ยนแมพไปยังคลังของที่ถูกยึด..."
21150-100 = "ทางเดินในอาคารเรียนหลัก มิลเลเนียม"
21150-101 = "เจ้าพวกนั้นคงไม่คอยเฝ้าอาริสึที่ถูกขังอยู่หรอกนะ"
21150-102 = "ถึงจะถูกจับตัวไว้ที่นี่ แต่ก็ยังแอบสร้างเทลส์ ซาก้า โครนิเคิล 2 ด้วย G.Bible ในห้องอย่างเงียบๆ ได้"
21150-103 = "อืม.. พูดอะไรไม่เห็นรู้เรื่องเลย"
21150-104 = "แต่ดูจะไม่จริงจังแล้วแฮะ~ หรือว่ายอมแพ้กันซะแล้ว?"
21150-105 = "ในสถานการณ์แบบนี้ การยอมแพ้จะดูฉลาดกว่านะคะ"
21150-106 = "อึ่ก! ยูกะ!"
21150-107 = "น่าตกใจจริงๆ ก่อนอื่นฉันอยากจะชื่นชมที่พวกเธอทำให้พวกเราตกใจกันได้ขนาดนี้"
21150-108 = "แต่ครั้งนี้มันล้ำเส้นมากไปแล้ว"
21150-109 = "ร่วมมือกับผู้ก่อการร้ายแล้วมาบุกสภานักเรียนงั้นเรอะ?"
21150-110 = "อุตส่าห์ยืดเวลาให้ได้มีห้องชมรมใช้กัน แต่ดูเหมือนฉันจะรู้อะไรน้อยไปนะ"
21150-111 = "ยกโทษให้ไม่ได้ ครั้งนี้ถ้าถูกจับได้ ก็เตรียมตัวพักการเรียน 1 สัปดาห์ ไม่ก็เตรียมถูกกักตัวไว้ได้เลย"
21150-113 = "วะ.. ว่าไงนะ?!"
21150-114 = "1 สัปดาห์งั้นเหรอ? งั้นก็ไม่ทันงานมิลเลเนียมไพรซ์น่ะสิ!"
21150-115 = "ดีเลย ไหนๆ ตอนนี้สหายอาริสึจังของพวกเธอก็ถูกกักตัวอยู่ ฉันล่ะรู้สึกไม่ดีเลยที่ต้องกักตัว#nเด็กน้อยนั่นไว้คนเดียว ได้พวกเธอเข้าไปอยู่เป็นเพื่อนก็คงจะดีนะ"
21150-116 = "หนอย...!"
21150-117 = "พะ... พี่โมโมอิ...!"
21150-118 = "คิดว่าจะทำตามแผนได้สำเร็จ แม้ว่าจะถูกจับตัวซะอีก..."
21150-119 = "ถ้าเรายอมให้ถูกจับแบบนี้... มีหวังจบเห่แน่! ถึงจะแย่งกระจกกลับไปได้#nแต่อาริสึกับยูสึก็คงสร้างเกมกันสองคนไม่ได้"
21150-120 = "ฉันจะฝ่าไปให้ได้ ไม่ว่าจะด้วยวิธีไหนก็ตาม!"
21150-122 = "หึหึ 'เรา' งั้นเหรอ?"
21150-123 = "แฮ่ก แฮ่ก ฉันมาถึงแล้วค่ะ แล้วทำไมถึงหอบแบบนี้ล่ะ... หรือว่าเพราะน้ำหนักขึ้น...?#nมะ... ไม่ใช่หรอกน่า!"
21150-125 = "เฮือก!"
21150-126 = "ระ... รุ่นพี่อาคาเนะกับหุ่นยนต์ต่อสู้!"
21150-128 = "ฮุฮุ ครั้งนี้คงเป็น 'ของจริง' สินะคะ"
21150-129 = "ดีใจที่ได้เจอนะคะ โมโมอิและมิโดริ"
21150-130 = "สำหรับมากิกับโคโทริ ถึงแม้จะน่าสงสัยแต่ฉันก็พอจะยกโทษให้ได้"
21150-131 = "แต่กับพวกเธอที่บุกเข้ามาถึงข้างในแบบนี้ ต่อให้แก้ตัวยังไงก็ไม่มีทางรอดไปได้หรอกนะคะ"
21150-132 = "อีกอย่าง..."
21150-133 = "คุณครูเองก็เตรียมส่งจดหมายคัดค้านไปยังชาเล่ต์ได้เลยค่ะ"
21150-136 = "อึ่ก..."
21150-137 = "นี่พวกเรา... ต้องจบเห่กันตรงนี้จริงๆ เหรอ...? ไม่ยอมหรอก...!"
21150-138 = "พี่โมโมอิ...!"
21150-139 = "ขอโทษนะคุณครู... คุณครูก็พยายามเต็มที่แล้ว... แต่เป็นพวกเราเองที่ไม่มีฝีมือ... คุณครูก็เลย..."
21150-140 = "[s1] \"อย่ายอมแพ้นะ\"\n[s2] \"เป็นเกียรติมากเลยที่ครูได้อยู่กับพวกเธอ\""
21150-141 = "ขอบคุณที่ช่วยปลอบนะ... แต่ฉันทำอะไรไม่ได้แล้วล่ะ"
21150-142 = "ข้างหน้ามี C&C ส่วนข้างหลังก็มีสภานักเรียน... นี่คือ 2 กลุ่มที่แข็งแกร่งที่สุดในมิลเลเนียมนะ"
21150-143 = "สถานการณ์แบบนี้จะไม่ให้ยอมแพ้ได้ยังไงล่ะ!"
21150-144 = "คุณครู..."
21150-145 = "ขอบคุณที่พูดแบบนี้นะคะ..."
21150-146 = "แต่ว่า... นี่คงถึงจุดจบจริงๆ แล้วล่ะค่ะ"
21150-148 = "พบเป้าหมาย"
21150-149 = "(ฮู่ม...)"
21150-150 = "ชาร์จพลังเวท... 100%..."
21150-151 = "เสียงนี้มัน..."
21150-152 = "พี่! หมอบลง!"
21150-154 = "?"
21150-155 = "เอ๋?"
21150-156 = "......?"
21150-159 = "ลำแสงทำลายล้าง!!"
21150-160 = "(ตู้มมมมม!)"
21150-161 = "อึ่ก!!"
21150-162 = "อ๊าาา!"
21150-163 = "รุ่นพี่อาสึนะ?! เป็นอะไรหรือเปล่าคะ?!"
21150-164 = "เป็นสิ~! ว้าว! นี่มันอะไรกัน?! อะฮ่ะฮ่า! โดนเข้าเต็มๆ เลย! เจ็บมากเลยด้วย! แทบจะขยับตัวไม่ได้เลย!"
21150-165 = "ดูเหมือนจะไม่เป็นไรนะคะ..."
21150-166 = "ทำไมเป็นแบบนี้! กองทัพหุ่นยนต์เกินกว่าครึ่งก็ขยับไม่ได้เหมือนกัน... เกิดอะไรขึ้น!!"
21150-167 = "ในนัดเดียวเนี่ยนะ?"
21150-168 = "คาริน! รายงานสถานการณ์หน่อยค่ะ! ลำแสงเมื่อกี้มาจากไหนกัน…?"
21150-169 = "คาริน? คาริน?! จะว่าไป การยิงสนับสนุนของคารินก็หายไปด้วย...!"
21150-170 = "(ฟิ้วววว~)"
21150-171 = "แสงนั้นมัน... ทางดาดฟ้าเหรอ?!"
21150-173 = "ชั้นดาดฟ้า อาคารเรียนที่ 6 มิลเลเนียม"
21150-174 = "อึ้ก! แสบตาจัง! แย่ล่ะสิ ปืนครกนั่นระเบิดแสงได้ด้วยเหรอ?"
21150-175 = "ใช่แล้วล่ะ รุ่นน้องของฉันเป็นเด็กน่ารักที่จะไม่ทิ้งระเบิดใส่รุ่นพี่..."
21150-176 = "แถมยังหลักแหลมอีกด้วยนะ"
21150-177 = "ถ้าแสงสว่างขนาดนี้... ก็คงสนับสนุนอาคาเนะไม่ได้... ทำไมถึงทำกันขนาดนี้!!"
21150-178 = "ทำไมน่ะเหรอ? ก็เพราะอยากจะปกป้องชมรมไว้ยังไงล่ะ"
21150-179 = "ฉันก็ได้ยินเรื่อง... ข่าวลืออยู่เหมือนกัน"
21150-180 = "ฉันไม่ค่อยรู้เรื่องชมรมวิศวกรรมหรอก แต่ชมรมพัฒนาเกมนั่นน่ะ... แทบจะเรียกว่าเป็นชมรมไม่ได้เลย"
21150-181 = "พวกนั้นก็เป็นแค่พวกตัวปัญหา แล้วทำไมเธอถึงต้องมาช่วยถึงขนาดนี้ด้วยล่ะ?"
21150-182 = "เพราะพวกนั้นไม่ได้สนใจแต่ตัวเองน่ะสิ..."
21150-183 = "พวกเธอกำลังทุ่มเทต่อสู้เพื่อเพื่อนๆ อย่างสุดใจเลยต่างหากล่ะ"
21150-184 = "และถึงจะทำกิจกรรมของชมรมไม่ได้ แต่ก็พัฒนาเกมได้ไม่ใช่เหรอ?"
21150-185 = "เธอเองก็พูดถูกอยู่นะ..."
21150-186 = "แต่แค่การเป็น 'เพื่อน' กันก็มีความหมายแล้วล่ะ.."
21150-187 = "การได้ทำชมรมร่วมกัน ทำให้ทุกคนแน่นแฟ้นและรวมกันเป็นหนึ่งเดียว"
21150-188 = "และเด็กพวกนั้นก็อยากจะรวมพลังกับพวกฉัน..."
21150-189 = "เราก็เลยพยายามกันอยู่ด้วยกันไงล่ะ"
21150-190 = "แต่ว่า...!"
21150-192 = "(ฟิ้วววว)"
21150-194 = "(ตู้ม!)"
21150-195 = "แย่ล่ะสิ!"
21150-196 = ".... หึหึ"
21150-199 = "ถึงแม้จะไม่ได้คาดการณ์ไว้... แต่ก็สนุกดีนะ"
21150-201 = "ทางเดินในอาคารเรียนหลัก มิลเลเนียม"
21150-202 = "โมโมอิ! มิโดริ!"
21150-203 = "ตอนนี้แหละ!"
21150-204 = "อาริสึจัง?!"
21150-205 = "ทำไมถึงมาที่นี่ได้ล่ะ?!"
21150-206 = "ระหว่างที่ไปคลังของที่ถูกยึดของสภานักเรียน ฉันก็ได้ลองคิดดูอย่างละเอียดเลยล่ะค่ะ"
21150-207 = "ไฟนอล แฟนตาเซีย, ดราก้อน เทส, เทลส์ ออฟ เฟต, แดรโกน, มิธ ฮีโร่ส์, อายส์ อีเทอร์นอล…#nแล้วก็ เทลส์ ซาก้า โครนิเคิล..."
21150-208 = "ตัวเอกในเกมทุกเกม..."
21150-209 = "ไม่มีใครทอดทิ้งสหายเลยค่ะ"
21150-210 = "อาริสึเองก็จะทำเช่นเดียวกันค่ะ"
21150-212 = "เราจะผ่านอุปสรรคไปด้วยกันค่ะ!"
21150-214 = "อาริสึจัง..."
21150-215 = "ฉันเอาด้วย เพราะยังไงถึงถูกจับอยู่แบบนี้ก็พังไม่เป็นท่าอยู่ดี"
21150-216 = "ชมรมพัฒนาเกม! ไปลุยกันเลย!"
21150-217 = "อื้ม!"
21150-219 = "อึ่ก! ปล่อยไปไม่ได้!"
21150-220 = "อะฮ่ะฮ่ะ เจ็บนะ! แต่ก็สนุกดีจัง! แบบนี้สิเลือดค่อยสูบฉีดหน่อย!"
21150-221 = "รุ่นพี่อาสึนะ... ตกลงบาดเจ็บจริงๆ หรือเปล่าคะ? การลอบยิงของคารินหยุดลงแล้ว... หรือว่าทางนั้นก็...?"
21150-222 = "มะ... โมโมอิกับมิโดริกำลังหนีไป!"
21150-223 = "จะปล่อยไปแบบนี้ไม่ได้"
21150-224 = "รุ่นพี่อาสึนะถอยไปก่อนค่ะ"
21150-226 = "อาคาเนะจะเริ่มการต่อสู้เอง!"

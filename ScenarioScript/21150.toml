[translation]
21150-1 = "Episode 15;A Spreading Danger"
21150-2 = "Millennium Main Control Room"
21150-3 = "Activate all the confiscated robots!"
21150-4 = "I originally wanted to repurpose them into cleaning machines..."
21150-5 = "...but right now we've got more pressing messes to deal with!"
21150-6 = "I hereby transfer their command to Akane and the Maid Club!"
21150-7 = "Understood. I'll use these robots to sweep up the Game Development Department."
21150-9 = "Millennium Main Hallway"
21150-10 = "Argh!"
21150-11 = "Dang, she's so strong."
21150-12 = "So this is what C&C agents are capable of..."
21150-15 = "Heh heh."
21150-18 = "(Hmm. They aren't that strong on their own, but I have to give them some credit.)"
21150-19 = "(It's their teamwork. They move in sync, like one person with two bodies. Even most veterans aren't capable of that.)"
21150-21 = "So, this is the advantage of being twins, is it? How marvelous."
21150-23 = "*pant* I never expected we'd run into Asuna here."
21150-24 = "Sis, I can't keep going. Let's run for now!"
21150-25 = "I guess we don't have a choice."
21150-28 = "Trying to retreat? I don't think so!"
21150-29 = "*bang*"
21150-30 = "Eek!"
21150-31 = "Th-Those shells are huge! D-Do you think...?"
21150-32 = "Karin? No way. D-Did she beat Utaha...?"
21150-34 = "Millennium Institute 3 Rooftop"
21150-35 = "..."
21150-36 = "Why am I on my back? And whose butt is right over my head?"
21150-37 = "That would be mine."
21150-38 = "For getting hit as hard as you did, you woke up much faster than expected."
21150-39 = "Sorry, but you never stood a chance."
21150-40 = "I see... You hit me through the gun smoke, and now you're staying close to me on purpose."
21150-41 = "That's right. The mortar girl will think twice before launching another shell. She seems rather fond of you."
21150-42 = "Heh. My calculations definitely didn't account for this. How did you manage to hit me through all that smoke?"
21150-43 = "C&C snipers don't rely on sight alone."
21150-44 = "Anyway, stay close to me. I don't think my heart or your body can take any more of this."
21150-45 = "..."
21150-46 = "Can you do me a favor? I really feel like I'd rather just get hit with a mortar shell, so please, get your butt out of my face."
21150-47 = "Then just don't look at it!"
21150-49 = "Millennium Main Hallway"
21150-50 = "Update from Hare! Karin is back up, and Utaha's been captured!"
21150-51 = "We can see that!"
21150-52 = "Maki has an update too! Akane has blasted through the shutters and escaped!"
21150-53 = "Also, a group of giant robots is headed this way!"
21150-54 = "*gasp*"
21150-57 = "I'm not sure, but I've got a feeling that we're winning. And not only that..."
21150-58 = "...something tells me you girls are in trouble."
21150-60 = "Ugh!"
21150-61 = "Did we fail?"
21150-62 = "...No."
21150-63 = "Not yet."
21150-65 = "Millennium - Veritas"
21150-66 = "(Fifteen minutes earlier...)"
21150-67 = "Gah. Every time we get to this point in the run through, the plan always falls apart."
21150-68 = "Getting everyone's attention is easy enough."
21150-69 = "Trap Akane and Asuna. Isolate Karin. Take on the Student Council's security robots. After all that is the easy part, getting into the storage room."
21150-70 = "But, if any part of that falls through..."
21150-71 = "...then it's game over. Nobody at Millennium can go head-to-head with an opponent as prepared as the Maid Club."
21150-72 = "Even using Himari's name to sow confusion can only get us so far. It'll buy us some time, but we'll probably still end up getting cornered."
21150-73 = "So by minute 2, we trap Akane and Asuna. By minute 5, Karin is isolated. At minute 11 we defeat the automata... We secure the Mirror at minute 13..."
21150-74 = "And by minute 20, we'll all be arrested."
21150-75 = "..."
21150-76 = "...But what if it wasn't ALL of us?"
21150-77 = "What do you mean?"
21150-78 = "To win, some of us have to lose."
21150-79 = "And then..."
21150-80 = "M-Midori, what are you saying?"
21150-81 = "I'm talking about turning the bug of the plan failing...into a feature."
21150-83 = "Millennium Student Council Self-Reflection Room"
21150-86 = "Oh."
21150-87 = "A blackout. So that means..."
21150-89 = "*clank*"
21150-90 = "The EMP went off and Hare hacked the system settings. Which means the doors and shutters in the Student Council building should be open."
21150-91 = "All right."
21150-92 = "Jail break time."
21150-93 = "And the next quest marker is at..."
21150-94 = "...the Student Council contraband storage."
21150-100 = "Millennium Main Hallway"
21150-101 = "No matter how vigilant they are, there's no way they'll be thinking about Aris when things are happening."
21150-102 = "Even if we get caught, and assuming they only put us on probation, we could still use the G.BIBLE to secretly create Tales Saga Chronicle 2 in the club room."
21150-103 = "I can't hear when you're whispering, but it doesn't really matter."
21150-104 = "You don't seem as desperate as you were before. Not giving up just yet?"
21150-105 = "It'd be for the best if you gave up now."
21150-106 = "Ugh. It's Yuuka."
21150-107 = "I have to congratulate you for fooling us thus far."
21150-108 = "But you've gone too far this time."
21150-109 = "I can hardly believe the sheer audacity of you to attack the Student Council with the help of terrorists."
21150-110 = "And to think I gave you a grace period to try and save your club. I guess I've been too soft."
21150-111 = "Don't even imagine trying to escape punishment. You'd better be prepared to be confined or suspended for no less than a week."
21150-113 = "W-Wait. What?!"
21150-114 = "B-But the Millennium Prize will be over in a week!"
21150-115 = "Lucky for you that your friend Aris is already in custody. I felt bad about locking her up alone, so I'm sure she'll be happy to have some company."
21150-116 = "Ugh..."
21150-117 = "S-Sis!"
21150-118 = "I thought we could make it work even if we got caught, but..."
21150-119 = "But if we're caught...it's over! Even if we had the Mirror, Aris and Yuzu can't make the game alone."
21150-120 = "So we have no choice. We have to get through this no matter what!"
21150-122 = "Oh? You want to go through us?"
21150-123 = "*huff puff* ...Phew, barely made it. Why am I so out of breath...? Ugh, could it really be my weight...? N-No way! C-Couldn't be!"
21150-125 = "Huh?!"
21150-126 = "I-It's Akane and the combat robots!"
21150-128 = "Ha. We've reached the end of the line."
21150-129 = "Pleased to make your acquaintance, Momoi, Midori."
21150-130 = "You should know that despite our reservations, Maki and Kotori still have a chance of being forgiven."
21150-131 = "But anyone who's come this far is beyond forgiveness."
21150-132 = "Also..."
21150-133 = "You should be expecting a stern letter to Schale, Sensei."
21150-136 = "Ugh..."
21150-137 = "Is this...really how it ends...?"
21150-138 = "Sis!"
21150-139 = "I'm sorry, Sensei. You tried so hard for us, but we ruined it! Our best wasn't enough!"
21150-140 = "[s1] \"Don't give up.\"\n[s2] \"Don't be sorry. It's been an honor.\""
21150-141 = "Thanks, Sensei, but...it's already over."
21150-142 = "Millennium's strongest forces, C&C and the Student Council, have us in a pincer."
21150-143 = "How are we supposed to have hope in a situation like this?!"
21150-144 = "Sensei..."
21150-145 = "Thank you..."
21150-146 = "...but it's finally over now."
21150-148 = "Target confirmed."
21150-149 = "*vrrrrrrr*"
21150-150 = "MP charge...100%."
21150-151 = "D-Do you hear that?"
21150-152 = "Sis! Get on the ground!"
21150-154 = "Hmm?"
21150-155 = "Huh?"
21150-156 = "...?"
21150-159 = "Blinding Light!"
21150-160 = "*booooom*"
21150-161 = "Gah!"
21150-162 = "Agh! "
21150-163 = "A-Asuna?! Are you okay?!"
21150-164 = "Definitely not! Whoa! Wh-What was that?! Ahaha! I'm hit! And it hurts like hell. I can't move a single muscle!"
21150-165 = "I'm sure you'll be fine."
21150-166 = "Ugh. It's not just Asuna, half the robots are down too! I can't believe this!"
21150-167 = "And all with a single attack...?"
21150-168 = "Karin! Status update! What was that laser beam...?"
21150-169 = "...Karin? Karin?! She hasn't provided fire support in a while!"
21150-170 = "*boom*"
21150-171 = "A light? It's coming from the roof!"
21150-173 = "Millennium Institute 3 Rooftop"
21150-174 = "Ahhh! My eyes! The mortar can launch flash grenades too?!"
21150-175 = "But of course. My sweet little protege would never risk exploding her dearest Utaha."
21150-176 = "She's a clever girl."
21150-177 = "Damn it! I can't see anything, let alone support Akane. Why are you going so far out of your way to do this?!"
21150-178 = "Why? To protect that club, of course."
21150-179 = "I'm no gossip, but even I've heard the rumors."
21150-180 = "I don't know much about the Engineering Department, but the Game Development Department is a pitiful excuse of a club."
21150-181 = "They're just a bunch of selfish brats. Why would you go so far for them of all people?"
21150-182 = "They aren't selfish."
21150-183 = "Those kids are giving it everything they have against impossible odds, all for the sake of each other."
21150-184 = "They don't even need a club to make games together!"
21150-185 = "You're not wrong."
21150-186 = "But you see, while just working as friends is great..."
21150-187 = "...having a place to be, and people to be there with, is a special thing."
21150-188 = "That's what they're fighting for."
21150-189 = "The place where they all belong together."
21150-190 = "But still!"
21150-192 = "*whish*"
21150-194 = "*pow*"
21150-195 = "Again?!"
21150-196 = "Haha."
21150-199 = "That wasn't in my calculations, but it sure was funny."
21150-201 = "Millennium Main Hallway"
21150-202 = "Momoi! Midori!"
21150-203 = "Now!"
21150-204 = "Aris?!"
21150-205 = "What are you doing here?!"
21150-206 = "I did a lot of thinking on my way to the contraband storage room."
21150-207 = "Final Fantasia, Dragon Crest, Tails of Destiny, Chrono Digger, The Fable of Heroes, Pyre Emblem, and...Tales Saga Chronicle."
21150-208 = "No matter which game you look at..."
21150-209 = "The heroes never, ever, leave their friends behind."
21150-210 = "So I will not, either."
21150-212 = "We will get through these trials—together!"
21150-214 = "Aris..."
21150-215 = "If we'd gotten caught, it'd all be over anyway."
21150-216 = "All right, Game Development Department, move out!"
21150-217 = "Right!"
21150-219 = "Ah! We can't let them escape!"
21150-220 = "Ahaha! It hurts so bad, but I'm having so much fun! This is the best! "
21150-221 = "...Are you sure you're in pain? More importantly, Karin stopped shooting. Do you think something happened?"
21150-222 = "M-Momoi and Midori are getting away!"
21150-223 = "They're not going anywhere."
21150-224 = "Asuna, step back."
21150-226 = "Now engaging the enemy!"

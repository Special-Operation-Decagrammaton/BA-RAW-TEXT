[translation]
21150-1 = "第15話;忍び寄る危機"
21150-2 = "ミレニアム・オペレーションルーム"
21150-3 = "差し押さえ品のロボットを全部出して！"
21150-4 = "本当なら塗装し直して、学校の掃除用ロボットとして使おうかと思ってたけど……"
21150-5 = "背に腹は代えられない、今は侵入者たちを撃退するのが先！"
21150-6 = "メイド部の命令を聞くように、全機プログラムを変更したわ、アカネ！"
21150-7 = "承知しました。ロボットも使わせてもらって、あらためてゲーム開発部を「お掃除」します。"
21150-9 = "ミレニアム・校舎廊下"
21150-10 = "うあぁっ！"
21150-11 = "で、でたらめに、強い……！"
21150-12 = "これが、C&Cのエージェント……！"
21150-15 = "ふーん……。"
21150-18 = "（思ってたより、全然悪くない。お世辞にも戦闘能力がすごいとは言えないけど……）"
21150-19 = "（チームワーク……って言って良いのかな。まるで、二人で一人みたいな動き。その点においては、間違いなくベテラン級の……）"
21150-21 = "双子のパワー、ってやつかな。良いじゃん良いじゃん！"
21150-23 = "くぅっ、まさかここでアスナ先輩と出くわすなんて……。"
21150-24 = "お姉ちゃん、一旦退こう！"
21150-25 = "うん、仕方ない……！"
21150-28 = "そうはさせないよっ！"
21150-29 = "（ドカアァン！）"
21150-30 = "きゃぁっ！？"
21150-31 = "大口径弾！？何で！？"
21150-32 = "これ、カリン先輩の……っていうことはまさか、ウタハ先輩……！？"
21150-34 = "ミレニアム・第3校舎屋上"
21150-35 = "……。"
21150-36 = "どうして私は、横になって……それに、この大きなお尻は一体誰の……？"
21150-37 = "……大きくて悪かったな。"
21150-38 = "結構キツイところに当たったはずだけど……思ったより早いお目覚めだ。"
21150-39 = "……ごめん、手加減する余裕は無かった。"
21150-40 = "まさかヒビキの攻撃の中でも、正確に私を狙撃できるなんてね。それに、君がこうして私のすぐそばにいるのは……"
21150-41 = "そう。この状態なら、先輩思いの彼女はまさか撃ってこないだろう。"
21150-42 = "はあ、これは計算外だった。あの砲煙の中で、どうして私のことを正確に狙えたんだい？"
21150-43 = "視覚でしか敵を捕捉できないような狙撃手なんて、C&Cにはいない。"
21150-44 = "それより、あまり離れないでほしい。余計なことをしても、身体を痛めるだけだ。私も心が痛む。"
21150-45 = "……。"
21150-46 = "ほんの少しで良いから離れてもらえるかい。この状態だと君のお尻が近すぎて、ちょっと困る。"
21150-47 = "そっちが背を向ければいいだろう！？"
21150-49 = "ミレニアム・校舎廊下"
21150-50 = "ハレ先輩から連絡！カリン先輩を抑えられなくなって、ウタハ先輩が捕まっちゃったって！"
21150-51 = "この状況を見れば分かるよ！"
21150-52 = "あっ、マキからも連絡！アカネ先輩がシャッターを爆発させて脱出したみたい！"
21150-53 = "同時に、すごい数のロボットがこっちに向かってきてるって……！"
21150-54 = "ええっ！？"
21150-57 = "あははっ、何が何だか分からないけど、私たちが優勢って感じ？"
21150-58 = "もしかして、もうそっちの計画は失敗寸前かな！"
21150-60 = "ううっ……！"
21150-61 = "失敗……。"
21150-62 = "……違う、"
21150-63 = "まだ、失敗じゃない……！"
21150-65 = "ミレニアム・ヴェリタス"
21150-66 = "（作戦開始15分前）"
21150-67 = "うぅっ、どう考えても結局ここで詰まっちゃう……。"
21150-68 = "扉を破壊して、みんなの注意を引きつけるところまではまず成功するはず。"
21150-69 = "次にアカネ先輩とアスナ先輩を封じて、カリン先輩を阻止。生徒会の警備ロボットたちと対峙する。ここを突破すれば、差押品保管所に侵入するまでは難しくないけど……。"
21150-70 = "その内の、どれか一つでも失敗した場合……。"
21150-71 = "そしたら、計画が丸ごとダメになる。きっちり身構えたメイド部を相手にするなんて、ミレニアムのどんな集団でも無理。"
21150-72 = "もしヒマリ先輩の名前を出して混乱させたとしても、多少時間を稼げるだけで、最終的にはそのまま包囲されるはず。"
21150-73 = "侵入から2分以内にアカネ先輩、もし一緒にいればアスナ先輩も合わせて二人を封じる。5分後にカリン先輩を阻止、11分後にロボットを突破、13分後に「鏡」を確保、その後……"
21150-74 = "……どう頑張っても、20分後には全員捕まっちゃう。"
21150-75 = "……。"
21150-76 = "……全員じゃなければ、良いんじゃない？"
21150-77 = "え？"
21150-78 = "例え私たちの内の何人かが負けたとしても、最後には勝つ方法……"
21150-79 = "もし、そのタイミングで……"
21150-80 = "み、ミドリ、何を言ってるの？"
21150-81 = "……計画通りに行かなかった場合のことも、計画しておかないと。"
21150-83 = "ミレニアム・生徒会所有の反省部屋"
21150-86 = "……あっ。"
21150-87 = "電力遮断、このイベントが起きたということは……。"
21150-89 = "（ガチャン）"
21150-90 = "EMP発動……ハレ先輩のハッキングを使った設定の変更……。#nタワーの電子式の扉を自由にできる、シャッターにしたのと同じ方法……。"
21150-91 = "把握しました。"
21150-92 = "アリス、脱出します。"
21150-93 = "ここからの、アリスのクエストは……"
21150-94 = "……まず、生徒会の差押品保管所に向かうこと。"
21150-100 = "ミレニアム・校舎廊下"
21150-101 = "私たちが派手に動けば動くほど、一度閉じ込めたアリスへの警戒は薄くなるはず……。"
21150-102 = "それに、もしこのタイミングで私たちが捕まったとしても……謹慎ぐらいだったら、部室でこっそりG.Bibleを見ながら『テイルズ・サガ・クロニクル２』が作れる。"
21150-103 = "うーん、何の相談かなー？"
21150-104 = "ちょっとずつ必死さが無くなってる気がするけど……まさか、諦めたわけじゃないよね？"
21150-105 = "この状況なら、諦めた方が賢明だとは思いますけどね。"
21150-106 = "うっ、ユウカ！"
21150-107 = "久しぶりね。とりあえず、ここまで状況を引っ掻き回したことについては褒めてあげる。それについては本当に驚いたわ。"
21150-108 = "でもそれはそれ、これはこれ……。"
21150-109 = "こんなありとあらゆる方法を使ってまで生徒会を襲撃するなんて、やり過ぎよ。"
21150-110 = "猶予を与えたことと言い、ちょっと甘すぎたのかしら。"
21150-111 = "もう悪戯じゃ済まされないわよ。無条件の1週間停学か、拘禁くらいは覚悟した方が良い。"
21150-113 = "停学！？拘禁！？"
21150-114 = "そんな、1週間だと……ミレニアムプライスが終わっちゃう！"
21150-115 = "アリスちゃんも、今は反省部屋に入ってもらってるわ。一人だけで可哀そうだったけど、あなたたちが来ればきっと喜ぶでしょう。"
21150-116 = "うぅっ……！"
21150-117 = "お、お姉ちゃん……。"
21150-118 = "捕まっても大丈夫だと思ったけど……。"
21150-119 = "このままじゃ……たとえ「鏡」を奪えたとしても、アリスとユズだけじゃゲームは作れない……。"
21150-120 = "どうにかして、突破しないと！"
21150-122 = "突破？へえ、[ruby=・・・]私たち[/ruby]を？"
21150-123 = "ふぅ、やっと着きました……。こんなに息が切れるなんてまさか、本当に体重が……いえ、そんなはずは……。"
21150-125 = "うえぇ！？"
21150-126 = "あ、アカネ先輩に、戦闘ロボットまで！"
21150-128 = "ふふっ、今度こそ「本物」みたいですね。"
21150-129 = "あらためて、初めまして。モモイちゃん、ミドリちゃん。"
21150-130 = "マキちゃんとコトリちゃんについては、ギリギリ許せる範囲かもしれませんが……"
21150-131 = "ここまで入り込んできてしまったあなたたちに、もう言い訳の余地はありませんよ。"
21150-132 = "それに……"
21150-133 = "先生も、シャーレに抗議文くらいは送らせていただきますので。ご承知おきくださいね。"
21150-136 = "ううっ……。"
21150-137 = "ここで、本当に……？嫌だ……っ！"
21150-138 = "お姉ちゃん……っ！"
21150-139 = "ごめん、ごめんね先生……先生は色々助けてくれたのに、私たちの力不足で……私たちのせいで……！！"
21150-140 = "[s1] \"諦めないで。\"\n[s2] \"ごめん。私にも、もっと力があれば……。\""
21150-141 = "そうしたい、けど……もう無理だよ。"
21150-142 = "前にはC&C、後ろにはミレニアムの生徒会……ミレニアムでもトップレベルに強力な二大勢力。"
21150-143 = "こんな状況で、いったいどうしたら……！"
21150-144 = "先生……。"
21150-145 = "先生のせいではありません、私が、私たちが……。"
21150-146 = "ですが、この状況は、もう……。"
21150-148 = "ターゲットを確認。"
21150-149 = "（ウィーーン……）"
21150-150 = "魔力充電、100%……"
21150-151 = "こ、この音は……"
21150-152 = "お姉ちゃん、伏せて！"
21150-154 = "？"
21150-155 = "ん？"
21150-156 = "……？"
21150-159 = "光よ！！"
21150-160 = "（ドカアアァァン！）"
21150-161 = "くっ！！"
21150-162 = "きゃあっ！"
21150-163 = "あ、アスナ先輩！？大丈夫ですか！？"
21150-164 = "大丈夫じゃないよー！あははっ、思いっきり当たっちゃった！何これめっちゃ痛い、頭のてっぺんからつま先まで今1ミリも動かしたくない！"
21150-165 = "……大丈夫そうですね。"
21150-166 = "そんな、アスナ先輩と半分近くのロボットをまとめて行動不能に……！？"
21150-167 = "た、たった一発で、この火力……！"
21150-168 = "カリン、状況を報告してください！今のビーム砲はどこから……！？"
21150-169 = "カリン、カリン！？そういえば、カリンの火力支援が止んで……いつから！？"
21150-170 = "（フォンッ――！）"
21150-171 = "あの光は……屋上！？"
21150-173 = "ミレニアム・第3校舎屋上"
21150-174 = "くっ、目が……！閃光弾だと！？"
21150-175 = "私の後輩は、大事な先輩に爆撃を当てたりしない優しい後輩……で、合っているとも。"
21150-176 = "それでいて、ものすごく賢い。この状況を予測し、そこで的確な選択ができるくらいにはね。"
21150-177 = "くっ、これじゃアカネの支援が……どうしてここまで……！"
21150-178 = "どうして……？それは、部活を守りたいからに決まっているだろう？"
21150-179 = "……噂に疎い私でも、聞いたことはある。"
21150-180 = "エンジニア部のことはよく知らないが、あのゲーム開発部は、ちゃんとした部活動とは言い難い。"
21150-181 = "あんな自己中な問題児たちを、なぜ助ける？"
21150-182 = "……ただの自己中じゃないから、かな。"
21150-183 = "あの子たちは友人のために、一生懸命頑張っている。"
21150-184 = "別に部活動じゃなくても、ゲームは作れるだろう。"
21150-185 = "……それは君の言う通りだ。"
21150-186 = "けれどね。もちろんただの「友達」にも意味はある、それでも……。"
21150-187 = "同じ部活の仲間というのは、お互いを強く結び付けてくれるものだ。"
21150-188 = "あの子たちも、あの部活で一緒にやりたいんだという気持ちがあるから……"
21150-189 = "こんなにも、必死に頑張っているんだろう。"
21150-190 = "っ、でも……！"
21150-192 = "（ヒュー……）"
21150-194 = "（ドカアアァァァァン！）"
21150-195 = "しまった！？"
21150-196 = "……ふふっ。"
21150-199 = "計算通り、ではないけれど……面白くなってきたね。"
21150-201 = "ミレニアム・校舎廊下"
21150-202 = "モモイ、ミドリ！"
21150-203 = "今です！"
21150-204 = "アリスちゃん！？"
21150-205 = "どうしてここに！？"
21150-206 = "生徒会の差押品保管所に向かう途中に、考えていました。"
21150-207 = "『ファイナルファンタジア』、『ドラゴンテスト』、『トールズ・オブ・フェイト』、『竜騎伝統』、『英雄神話』、『アイズエターナル』……そして『テイルズ・サガ・クロニクル』……。"
21150-208 = "どんなゲームの中でも、主人公たちは……"
21150-209 = "決して、仲間のことを諦めたりしませんでした。"
21150-210 = "なので、アリスもそうします。"
21150-212 = "試練は、共に突破しなくては！"
21150-214 = "アリスちゃん……。"
21150-215 = "……うん、どうせこのまま捕まったら全部終わり。"
21150-216 = "行こう、ゲーム開発部！"
21150-217 = "うん！"
21150-219 = "くっ、マズいですね……！"
21150-220 = "あはは、面白くなってきたね！けどまだ身体がビクンビクンしてて、まともに立てない！"
21150-221 = "アスナ先輩、それ本当に痛がってます……？それより、カリンの狙撃が止まっているということは、やはりあちらでも……。"
21150-222 = "っ、逃げられる！"
21150-223 = "いえ、そうはさせません……！"
21150-224 = "アスナ先輩、出来るだけ後ろに下がっててください。"
21150-226 = "アカネ、戦闘を開始します！"

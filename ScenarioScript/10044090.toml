[translation]
10044090-1 = "第9話;煞車？那是什麼"
10044090-5 = "青葉，沒有什麼辦法嗎？"
10044090-7 = "咦咦！？#n你問我也……"
10044090-8 = "青葉是工程師～我們只會開車，不懂機械～"
10044090-9 = "在，在關鍵時刻怎麼一點用處都……"
10044090-10 = "沒，沒什麼……！#n可是我對這種情況也不太……！"
10044090-11 = "煞車拉桿已經完全壞了……連緊急系統都沒有反應。"
10044090-12 = "可能是剛才戰鬥的時候，不小心破壞到某個脆弱的部分了……唉……"
10044090-13 = "完蛋了～？"
10044090-14 = "再這樣下去，會一路狂奔不止……"
10044090-15 = "別說是配送任務了，甚至連會在哪停下來都不知道。"
10044090-16 = "最終只能宣告徹底失敗！！#n費盡千辛萬苦卻一無所獲！噗哈哈！！"
10044090-17 = "全員～確定懲處～"
10044090-19 = "我，我們那麼辛苦才走到這裡……"
10044090-20 = "要是早知道結局會是這樣，打死我都不會接下這項任務……"
10044090-21 = "唔唔……！！跟兩位幹部扯上關係果然沒好事！！#n我真是大白痴！過去的我是大白痴！"
10044090-22 = "要是能回到過去，我一定要用扳手敲自己的腦袋，阻止我接這項任務！！"
10044090-23 = "才，才以為事情好像終於要結束了……果然還是不能抱任何期待……"
10044090-24 = "就算撇開這些不談……都走到最後一步了，居然還這樣……"
10044090-25 = "[ns1]「大家冷靜下來想想辦法吧。」\n[ns2]「一定還有我們沒想到的辦法才對。」"
10044090-28 = "老師～對周圍的建築物發射蜘蛛絲，把車子停下來～"
10044090-29 = "[s]「抱歉，我身上沒有那種東西……」"
10044090-30 = "那～下到軌道上用身體擋住～？"
10044090-31 = "[s]「謝謝你把我當成超人，但那在物理上是不可能的……」"
10044090-32 = "嗚嗚……老師好柔弱……保護慾爆發了……"
10044090-33 = "一定……要想出辦法才行……"
10044090-34 = "先確認一下我們手上現在有什麼吧。"
10044090-35 = "我有一根巧克力棒。本來想省著吃的。"
10044090-36 = "不需要那種東西，請收起來……"
10044090-37 = "目前有的是不能動的貨物、幾樣工具……"
10044090-38 = "沒用的槍……子彈……"
10044090-39 = "還有剛才戰鬥中滾進來的炸彈……"
10044090-40 = "……"
10044090-41 = "……？"
10044090-42 = "嗯？炸彈？"
10044090-43 = "[s]「想到什麼好主意了嗎？」"
10044090-44 = "可，可能有辦法了……！！"
10044090-45 = "就知道你一定行～"
10044090-46 = "什麼什麼？？"
10044090-47 = "煞車的原理從古至今都，都是一樣的。"
10044090-48 = "摩擦力……"
10044090-49 = "所以咧～？"
10044090-50 = "有，有一個辦法……"
10044090-52 = "能夠強制產生摩擦力。"
10044090-57 = "（不久後……）"
10044090-60 = "看到了～目的地～"
10044090-61 = "準，準備好了嗎……！！"
10044090-62 = "準備完成～！"
10044090-63 = "Stand by～"
10044090-65 = "能，能成功嗎……一定要成功才行……"
10044090-66 = "[ns3]「老實說，我也有點懷疑這樣到底可不可行……！」\n[ns4]「不過這是現在唯一的辦法了對吧！？」"
10044090-69 = "沒，沒錯！！目前的情況就是這樣！！"
10044090-71 = "貨物列車馬上就要到達了……"
10044090-76 = "啊，是那輛嗎？"
10044090-77 = "……"
10044090-78 = "咦……為什麼那麼快……？"
10044090-79 = "這，這樣下去的話……？#n咦咦？？"
10044090-81 = "進入危險區間～"
10044090-82 = "信號交給你了！！"
10044090-84 = "3……"
10044090-85 = "2……"
10044090-86 = "1……"
10044090-88 = "不久前……"
10044090-95 = "我，我們要使用各方勢力丟下的炸彈。"
10044090-99 = "怎麼用～？"
10044090-103 = "……用炸彈炸毀列車的輪子。"
10044090-109 = "只要沒了車輪，摩擦力自然會變大。#n雖然這是再理所當然不過的事情就是了……"
10044090-110 = "咦……？#n那樣的話……"
10044090-111 = "摩擦係數Overdrive～"
10044090-112 = "就，就是這樣……！"
10044090-113 = "反正現在也沒有別的選擇……這，這樣肯定能讓車停下來。"
10044090-114 = "雖然會變得破破爛爛……鐵軌也會被磨壞……修復起來會花掉不少錢……！！"
10044090-115 = "但，但是只剩這個方法了……！"
10044090-116 = "還真亂來啊。"
10044090-120 = "好！試試看吧！！"
10044090-121 = "[ns]「那，那樣真的沒問題嗎！？」"
10044090-122 = "這，這是目前最好的選擇了……！！"
10044090-123 = "列車壞了就修！鐵軌斷了就重鋪！"
10044090-124 = "人生難免～需要冒險～"
10044090-127 = "就是現在！！"
10044090-134 = "嗚，嗚哇啊！！"
10044090-135 = "老師～抓緊光～"
10044090-136 = "噗哈哈！！速度開始慢下來了！！"
10044090-137 = "就，就這樣……就這樣……"
10044090-138 = "沒，沒問題的！停下來吧……！！"
10044090-139 = "[ns]「唔啊啊……！！」"
10044090-141 = "[log]距離目的地100M[/log]"
10044090-145 = "[log]距離目的地50M[/log]"
10044090-149 = "[log]距離目的地30M[/log]"
10044090-153 = "[log]距離目的地15M[/log]"
10044090-157 = "[log]距離目的地5M[/log]"
10044090-159 = "[log]高地人貨物列車#n距離目的地0M[/log]"
10044090-163 = "[log]煞車成功[/log]"
10044090-169 = "做，做到了……做到了……！！"
10044090-170 = "Mission～Accomplished～"
10044090-171 = "噗哈哈！幸好成功了！！"
10044090-173 = "[ns]「大家……都沒事嗎？」"
10044090-174 = "嗯……真是萬幸……"
10044090-175 = "完～全！毫髮無傷！"
10044090-176 = "光保護了老師～快誇誇我～"
10044090-179 = "這，這下該怎麼辦……"
10044090-180 = "那個，大家都還好嗎……？"
10044090-181 = "噗哈哈，準時到達！安全配送！完美對吧！"
10044090-182 = "安全配送……？"
10044090-183 = "雖然列車壞了……鐵軌也亂七八糟……"
10044090-184 = "不過……確實是到達了沒錯……哈哈……"
10044090-185 = "總，總之我先去拿貨物送達證明書，請稍等一下。"
10044090-190 = "只，只要拿到那個，我們的工作就完成了對吧……？"
10044090-191 = "嗯～大成功～"
10044090-192 = "說，說什麼大成功……#n搞出這麼大的事故，不想想該怎麼善後嗎……"
10044090-193 = "唉，我都已經開始擔心回去之後會被罵得多慘了。#n人生為什麼老是這樣……"
10044090-195 = "咯哈哈！真是辛苦你們了！！"
10044090-196 = "什麼？"
10044090-200 = "我就知道只要在目的地守株待兔，你們就會自己送上門來。"
10044090-201 = "畢竟高地人這些傢伙最準時了。"
10044090-202 = "進站方式有夠炸裂的啦！！"
10044090-203 = "就是說啊！雖然炸裂到有點可怕就是了～"
10044090-204 = "安靜一點！你們應該不可能忘記我們是誰吧？"
10044090-209 = "是粉絲～對吧～？"
10044090-210 = "誰是你們的粉絲啊！#n我們是運輸者聯盟，簡稱轟隆轟隆疾馳聯盟啦！！"
10044090-212 = "完，完全聽不出來簡在哪裡耶……？"
10044090-213 = "是即將成為服務範圍涵蓋整個奇普托斯的配送業界巨頭！"
10044090-214 = "哇，真是遠大的野心！這股歸屬感簡直讓人熱血沸騰！"
10044090-216 = "所以咧？現在是要我們幫你們加油嗎？"
10044090-217 = "才不是！我們從第一步就失敗了！"
10044090-218 = "都是你們這些傢伙，還有你們送來的那些貨物害的！"
10044090-219 = "什，什麼意思？"
10044090-220 = "那本來是我們的工作啊！"
10044090-221 = "結果卻因為怕我們危險駕駛，轉而找上你們高地人！"
10044090-222 = "這，這不是很正常嗎……？"
10044090-223 = "誰會想把貴重物品交給暴走族運送啊……！"
10044090-225 = "啊？瞧不起我們是不是？"
10044090-231 = "連一盒披薩都送能得一塌糊塗，不管要送貨物還是別的東西都不值得信任啦～"
10044090-232 = "少，少囉嗦！總之那些貨物我們要了！！"
10044090-234 = "只要能以轟隆轟隆疾馳聯盟的名義讓委託人簽收……！"
10044090-235 = "完成貨物配送的人就是我們了！！"
10044090-236 = "這是什麼支離破碎的發言……真是亂七八糟的……"
10044090-237 = "老師～展現隱藏的力量～"
10044090-238 = "按這裡會變身嗎～？還是按這邊就會爆發惡魔的力量～"
10044090-239 = "[s5]「如果真的可以就太好了……」\n[s6]「好癢……！」"
10044090-243 = "喂……都這種時候了還能悠悠哉哉的啊？"
10044090-244 = "就讓你們也好好感受一下──"
10044090-246 = "一路以來的努力在眼前化為泡影的心情吧！！"

[translation]
10044090-1 = "ตอนที่ 9;เบรกคืออะไรเหรอคะ?"
10044090-5 = "อาโอบะ ไม่มีวิธีอะไรเลยเหรอ?"
10044090-7 = "คะ... คะ?! แล้วฉันจะไปรู้ได้ไง..."
10044090-8 = "ก็เธอเป็นวิศวกรนี่นา พวกเราน่ะทำได้แค่ขับรถไฟ ไม่ค่อยรู้เรื่องเครื่องจักรมากหรอก"
10044090-9 = "ทะ... ทีถึงตอนสำคัญละไม่มีประโยชน์..."
10044090-10 = "อ๊ะ ไม่ใช่แบบนั้นค่ะ...! แต่ฉันก็ไม่เคยเจอสถานการณ์นี้มาก่อน...!"
10044090-11 = "ตอนนี้คันเบรกเสียหายหมดเลยค่ะ... อุปกรณ์ฉุกเฉินก็เสียไปด้วย"
10044090-12 = "มันน่าจะเสียหายจากการต่อสู้เมื่อกี้น่ะค่ะ... เฮ้อ..."
10044090-13 = "เสียหมดเลยเหรอ?"
10044090-14 = "ถ้าเป็นแบบนี้ต่อไป รถไฟของเราก็วิ่งแบบไม่หยุดเลยน่ะสิ..."
10044090-15 = "แล้วสถานีสุดท้ายก็อยู่ไกลจากจุดที่ต้องส่งของมากด้วย"
10044090-16 = "ถ้างั้นภารกิจก็ล้มเหลวน่ะสิ!! ความพยายามทั้งหมดที่ผ่านมาไม่มีค่าเลย! วะฮะฮ่า!!"
10044090-17 = "โดน พัก งาน แน่"
10044090-19 = "อะ... อุตส่าห์เผชิญความยากลำบากมาถึงตรงนี้แล้ว..."
10044090-20 = "ถ้ารู้ว่าจะลงเอยแบบนี้ ฉันคงทำทุกอย่างเพื่อให้ตัวเองไม่ต้องรับภารกิจนี้แล้วค่ะ..."
10044090-21 = "อึกก...!! รู้ทั้งรู้ว่ามาเกี่ยวข้องกับท่านผู้บริหารไปก็ไม่มีอะไรดี!! ยัยซื่อบื้อเอ๊ย!"
10044090-22 = "ถ้าย้อนเวลากลับไปได้ ฉันคงเอาประแจเคาะหัวตัวเองให้ไม่ต้องมาทำงานนี้!!"
10044090-23 = "คะ... คิดว่าเรื่องคลี่คลายได้บ้างแล้วเสียอีก สุดท้ายฉันก็ไม่ควรคาดหวังอะไรสินะคะ..."
10044090-24 = "แต่ถึงยังไง... เราก็พยายามกันมาถึงตรงนี้แล้ว..."
10044090-25 = "[ns1] \"ทำใจร่มๆ แล้วมาหาทางออกกันเถอะ\"\n[ns2] \"อาจมีวิธีแก้ปัญหาที่เรายังมองไม่เห็นก็ได้\""
10044090-28 = "คุณครู ปล่อยใยแมงมุมไปที่อาคารแถวนี้เพื่อให้รถหยุดมั้ย..."
10044090-29 = "[s] \"ขอโทษนะ ครูปล่อยใยอะไรแบบนั้นไม่ได้หรอก...\""
10044090-30 = "งั้นลงไปที่รางรถไฟ แล้วเอาตัวขวางหยุดรถไฟไว้มั้ย?"
10044090-31 = "[s] \"ขอบใจที่เห็นครูเป็นยอดมนุษย์นะ แต่ครูไม่มีพลังแบบนั้นหรอก...\""
10044090-32 = "โอ้ว... ต้องปกป้องคุณครู... ที่แสนบอบบางแล้ว..."
10044090-33 = "ค่ะ... ยังไงเราก็ต้องคิดหาวิธีให้ได้..."
10044090-34 = "งั้นมาดูกันก่อนดีกว่าค่ะว่าเรามีอะไรกันอยู่บ้าง"
10044090-35 = "ฉันมีช็อกโกแลตบาร์อันหนึ่ง กะว่าจะกินเมื่อกี้แล้วเชียว"
10044090-36 = "ของแบบนั้นไม่จำเป็นหรอกค่ะ เก็บไว้เถอะ..."
10044090-37 = "เรามีสินค้าที่แตะต้องไม่ได้ แล้วก็เครื่องมือสองสามอย่าง..."
10044090-38 = "ปืนที่ไร้ประโยชน์... ลูกกระสุนจริง..."
10044090-39 = "แล้วก็ระเบิดที่กลิ้งเข้ามาในรถจากการต่อสู้เมื่อกี้..."
10044090-40 = "..."
10044090-41 = "...??"
10044090-42 = "หืม? ระเบิดเหรอ?"
10044090-43 = "[s] \"มีไอเดียอะไรดีๆ เหรอ?\""
10044090-44 = "ฉะ... ฉันว่าน่าจะมีวิธีแล้วค่ะ...!!"
10044090-45 = "ไม่เสียแรงที่เชื่อใจเลย"
10044090-46 = "อะไรเหรอ? วิธีอะไร??"
10044090-47 = "ไม่ว่าจะในอดีตหรือปัจจุบัน การหยุดรถไฟก็ใช้วิธีเดียวกันมาตลอดค่ะ"
10044090-48 = "แรงเสียดทาน..."
10044090-49 = "แล้วยังไงนะ?"
10044090-50 = "มะ... มีอยู่วิธีหนึ่งค่ะ"
10044090-52 = "วิธีที่จะทำให้เกิดแรงเสียดทานครั้งใหญ่"
10044090-57 = "(ครู่ต่อมา...)"
10044090-60 = "เห็นจุดหมายปลายทางแล้ว"
10044090-61 = "พะ... พร้อมหรือยังคะ...!!"
10044090-62 = "พร้อมแล้ว~!"
10044090-63 = "สแตนด์ บาย"
10044090-65 = "จะ... จะสำเร็จหรือเปล่า... ต้องสำเร็จนะ..."
10044090-66 = "[ns3] \"เราทำแบบนี้กันได้จริงๆ ใช่มั้ย...!\"\n[ns4] \"นี่ก็เป็นทางออกเดียวที่มีแล้วใช่มั้ย?!\""
10044090-69 = "ใช่ค่ะ!! อย่างน้อยก็ในตอนนี้ค่ะ!!"
10044090-71 = "ใกล้ถึงเวลาที่รถไฟบรรทุกสินค้าจะมาถึงแล้วละ..."
10044090-76 = "อ๊ะ... ขบวนนั้นหรือเปล่า?"
10044090-77 = "..."
10044090-78 = "หืม...? ทำไมถึงมาเร็วขนาดนั้นล่ะ...?"
10044090-79 = "ถะ... ถ้ามาด้วยความเร็วแบบนี้ละก็...?? เดี๋ยวว??"
10044090-81 = "เข้า เขต อันตราย"
10044090-82 = "ให้สัญญาณด้วย!!"
10044090-84 = "3"
10044090-85 = "2"
10044090-86 = "1..."
10044090-88 = "ก่อนหน้านี้..."
10044090-95 = "ระเบิดที่เด็กเกเรทำตกไว้ตอนโจมตีพวกเรา ระ... เราจะใช้ระเบิดพวกนี้กันค่ะ"
10044090-99 = "ยังไงเหรอ?"
10044090-103 = "ใช้ระเบิดล้อรถไฟค่ะ..."
10044090-109 = "ถ้ารถไฟไม่มีล้อ แรงเสียดทานก็จะเพิ่มขึ้นอย่างเป็นธรรมชาติค่ะ..."
10044090-110 = "หืม...? แล้วถ้าเป็นแบบนั้น..."
10044090-111 = "แรงเสียดทาน โอเวอร์ไดรฟ์"
10044090-112 = "ค่ะ ค่ะ... ใช่เลยค่ะ...!"
10044090-113 = "ยังไงตอนนี้เราก็ไม่มีทางเลือกอื่นแล้ว ฉันว่าการระเบิดล้อรถไฟนี่ละค่ะที่จะทำให้รถไฟหยุดได้"
10044090-114 = "ต่อให้รถไฟจะเสียหาย... รางรถไฟกระจัดกระจาย... และต้องใช้งบประมาณในการซ่อมแซมมหาศาล#nแค่ไหน...!"
10044090-115 = "ตะ... แต่ตอนนี้เราไม่มีวิธีอื่นแล้วค่ะ...!"
10044090-116 = "ฟังดูบ้ามากเลยนะ"
10044090-120 = "ฉันเอาด้วย! มาลองดูกันสักตั้ง!!"
10044090-121 = "[ns] \"บะ... แบบนี้ก็ได้เหรอ?!\""
10044090-122 = "นะ... นี่เป็นวิธีที่ดีที่สุดในตอนนี้แล้วค่ะ...!!"
10044090-123 = "รถไฟเอาไว้ซ่อมทีหลังก็ได้! ส่วนรางรถไฟก็วางใหม่ได้เหมือนกัน!"
10044090-124 = "บางทีชีวิตก็ต้องมีความเสี่ยงแบบนี้ละ การทำงานก็มีความเสี่ยง ผู้บริหารควรศึกษาข้อมูลก่อนตัดสินใจ#nทำงาน"
10044090-127 = "ตอนนี้ละค่ะ!!"
10044090-134 = "วะ... ว้ากก!!"
10044090-135 = "คุณครู จับฮิคาริไว้นะ"
10044090-136 = "วะฮะฮ่า!! รถไฟช้าลงเรื่อยๆ แล้ว!!"
10044090-137 = "ถะ... ถ้าเป็นแบบนี้ต่อไปละก็..."
10044090-138 = "มะ... ไม่เป็นไรน่า! หยุดนะ...!!"
10044090-139 = "[ns] \"เหวอออ...!!\""
10044090-141 = "[log]ถึงจุดหมายใน 100 เมตร[/log]"
10044090-145 = "[log]ถึงจุดหมายใน 50 เมตร[/log]"
10044090-149 = "[log]ถึงจุดหมายใน 30 เมตร[/log]"
10044090-153 = "[log]ถึงจุดหมายใน 15 เมตร[/log]"
10044090-157 = "[log]ถึงจุดหมายใน 5 เมตร[/log]"
10044090-159 = "[log]รถไฟบรรทุกสินค้าไฮแลนเดอร์#nถึงจุดหมายใน 0 เมตร[/log]"
10044090-163 = "[log]เบรกได้สำเร็จ[/log]"
10044090-169 = "ทะ... ทำได้แล้ว... สำเร็จแล้วค่ะ...!!"
10044090-170 = "มิชชัน คอมพลีต"
10044090-171 = "วะฮะฮ่า! สำเร็จจนได้นะ!!"
10044090-173 = "[ns] \"ทุกคน... ปลอดภัยดีใช่มั้ย?\""
10044090-174 = "ค่ะ... ฉันไม่เป็นไรค่ะ..."
10044090-175 = "ฉัน~ ด้วย~! แค่นี้สบายมาก!"
10044090-176 = "ฮิคาริปกป้องคุณครูไว้ได้ด้วย ชมเค้าหน่อย ชมๆ"
10044090-179 = "ทะ... ทำยังไงดีล่ะเนี่ย..."
10044090-180 = "เอ่อ... ทุกคนเป็นยังไงกันบ้างคะ...?"
10044090-181 = "วะฮะฮ่า มาถึงทันเวลา! และส่งถึงอย่างปลอดภัย! เพอร์เฟกต์!"
10044090-182 = "ส่งถึงอย่างปลอดภัย...?"
10044090-183 = "แต่รถไฟเสียหาย... แล้วรางรถไฟก็ระเนระนาดไปหมดเลย..."
10044090-184 = "ค่ะ... แต่ก็มาถึงจนได้นะคะ... แหะๆ..."
10044090-185 = "ฉะ... ฉันจะไปเอาใบส่งมอบสินค้ามาให้ค่ะ ช่วยรอสักครู่นะคะ"
10044090-190 = "ถ้าเซ็นชื่อในใบส่งมอบสินค้า ก็ถือว่างานนี้ของเราเสร็จสิ้นแล้วใช่มั้ยคะ...?"
10044090-191 = "อื้อ แล้วนี่ก็จะเป็นความสำเร็จที่ยิ่งใหญ่เลยละ"
10044090-192 = "คะ... ความสำเร็จที่ยิ่งใหญ่อะไรกันคะ... เราสร้างความเสียหายอย่างใหญ่หลวงกันไว้มากกว่า..."
10044090-193 = "เฮ้อ เริ่มกังวลแล้วสิคะว่ากลับไปแล้วจะโดนดุแค่ไหน ทำไมชีวิตถึงมีแต่เรื่องแบบนี้นะ..."
10044090-195 = "ก๊ากฮ่าฮ่าฮ่า! คงจะเหนื่อยกันน่าดูเลยนะ!!"
10044090-196 = "ใครน่ะ?"
10044090-200 = "กะไว้แล้วว่าถ้ามารออยู่ที่นี่ ก็จะได้เจอตรงเวลาส่งของ"
10044090-201 = "ก็พวกไฮแลนเดอร์ชอบรักษาเวลานี่เนอะ!"
10044090-202 = "ไม่เลทแม้แต่นาทีเดียวเลยด้วย!!"
10044090-203 = "นั่นสินะ! ทำเอาพวกเรากลัวนิดหน่อยเลยละ~"
10044090-204 = "เงียบได้แล้ว! เอาเป็นว่าพวกเธอยังไม่ลืมพวกเราใช่มั้ยล่ะ?"
10044090-209 = "เป็นแฟนคลับพวกเราใช่มั้ย?"
10044090-210 = "แฟนคลับบ้าบออะไร?! พวกเราคือสหพันธ์นักซิ่งขนส่งแห่งชาติ หรือที่ย่อว่าสหพันธ์วรูม วรูม ต่างหากเล่า!!"
10044090-212 = "ยะ... ย่อหลักสูตรไหนถึงได้ชื่อนั้นเหรอคะ...?"
10044090-213 = "พวกเราจะเป็นยักษ์ใหญ่ในวงการขนส่งสินค้าและอาหารในคิโวทอสเลย!"
10044090-214 = "อื้อ นี่สินะความทะเยอทะยานที่ยิ่งใหญ่! รู้สึกได้ถึงการเป็นส่วนหนึ่งขององค์กรเลย!"
10044090-216 = "แล้วมันยังไงเหรอ? หรือว่าอยากให้พวกเราให้กำลังใจ?"
10044090-217 = "ไม่ใช่! กิจการของพวกเรามันติดขัดตั้งแต่เริ่มแล้วต่างหาก!"
10044090-218 = "แล้วพวกเธอก็เป็นต้นเหตุทั้งหมด! ทำไมต้องมาแย่งงานกันด้วย!!"
10044090-219 = "มะ... หมายความว่ายังไงคะ!"
10044090-220 = "เดิมทีนั่นเป็นงานของพวกเราต่างหาก!"
10044090-221 = "แต่ผู้ว่าจ้างก็อ้างว่าพวกเราขับขี่ประมาท ก็เลยเอางานนี้ไปให้พวกไฮแลนเดอร์ทำยังไงล่ะ!"
10044090-222 = "ตะ... แต่มันก็ถูกต้องแล้วไม่ใช่เหรอ...?"
10044090-223 = "ใครจะไปอยากฝากให้ไรเดอร์แก๊งซิ่งอย่างพวกคุณขนส่งของมีค่ากันล่ะคะ...!"
10044090-225 = "ว่าไงนะ? นี่เธอดูถูกพวกเรางั้นเหรอ?"
10044090-231 = "ขนาดแค่ส่งพิซซ่า ยังได้พิซซ่าหน้าเละเลย แล้วใครจะไว้ใจให้ส่งสินค้าราคาแพงล่ะ~"
10044090-232 = "หน็อย! เงียบไปเลยนะ! ไม่ว่ายังไงฉันก็จะเอาสินค้าอันนั้นไป!!"
10044090-234 = "แล้วถ้าเอาไปส่งให้ผู้ว่าจ้าง แล้วได้ลายเซ็นในนามของสหพันธ์วรูม วรูม มาละก็...!"
10044090-235 = "สุดท้ายแล้วผู้ขนส่งสินค้านั้นก็คือพวกเรา!!"
10044090-236 = "พูดเรื่องอะไรไร้สาระคะ... แล้วทำไมถึงดื้อด้านแบบนี้ด้วยนะ..."
10044090-237 = "คุณครู แสดงพลังที่ซ่อนไว้เลย"
10044090-238 = "ถ้าจิ้มตรงนี้แล้วจะแปลงร่างมั้ย? หรือถ้าจิ้มตรงนี้แล้วจะมีพลังงานปีศาจออกมาหรือเปล่า?"
10044090-239 = "[s5] \"ถ้าทำได้อย่างนั้นก็คงจะดีน่ะนะ...\"\n[s6] \"จั๊กจี้...!\""
10044090-243 = "หืม? ยังมาหยอกกันชิลๆ ในสถานการณ์แบบนี้ได้อีกเหรอ?"
10044090-244 = "รู้สึกเหมือนความพยายามที่ทุ่มเทไปทั้งหมดสูญเปล่าไปต่อหน้าต่อตาเลย"
10044090-246 = "จะเล่นอย่างนี้ใช่มั้ย!!"

[translation]
1600305-1 = "閃光彈萬能理論"
1600305-2 = "我在這裡，老師。"
1600305-3 = "沒事，我也才剛到。"
1600305-4 = "你問我突然被叫出來有沒有關係……？那是什麼意思……？"
1600305-5 = "啊，若是指自衛隊的話，大可不用擔心。"
1600305-6 = "我也不可能一年到頭都像興趣一樣執行任務。"
1600305-7 = "啊，不是的，我絕對沒有受到任何人強迫，這完全是我自己的意志。"
1600305-8 = "我的意思是……決不是因為好玩或喜歡才做這件事。"
1600305-9 = "倒不如若哪天這座城鎮的治安能好到我不需要這麼做，那才再好不過……"
1600305-10 = "……咦？很溫柔？我嗎？"
1600305-11 = "請別說笑了，看到我的人大多都只會覺得我很可怕，要嘛避開我，要嘛提防我。"
1600305-12 = "畢竟我平常的工作就是如此，這也沒辦法。"
1600305-13 = "……但還是謝謝老師。能這麼說讓我很開心。"
1600305-14 = "我們走吧，老師。我來帶頭……不。"
1600305-17 = "……我會跟在老師旁邊，一起走吧。"
1600305-18 = "[s] 和鈴美一起踏出步伐"
1600305-22 = "……這裡是我很喜歡的咖啡廳。要不要休息一下再走？"
1600305-23 = "雖然說喜歡，但我都只會點拿鐵就是了，不過很好喝喔……"
1600305-24 = "（喀嚓！）"
1600305-25 = "呀啊啊！你，你們在做什麼！"
1600305-26 = "……！？"
1600305-27 = "哈哈！看了還不懂嗎，我們是把強盜當興趣的不良學生！"
1600305-28 = "我們這次可真的徹底做好事前調查了！我們知道今天自衛隊放大假！"
1600305-29 = "說廢話，馬上把店裡的現金全部拿出來！動作快！"
1600305-30 = "……唉。"
1600305-31 = "這座鎮上的不良分子真是學不乖……要是能把這些熱忱用在讀書或社團上該有多好……"
1600305-32 = "（不過今天的我不是跟自衛隊，而是跟老師……）"
1600305-35 = "……"
1600305-36 = "不，不要啊！那裡面放著我們這週的營收……！"
1600305-37 = "哈哈，太感謝了！我們會替你們大把大把花掉的！"
1600305-38 = "別做無謂的抵抗，你們也不想把營收花在醫藥費上面吧！？哈哈哈哈！"
1600305-39 = "……"
1600305-40 = "……呼。"
1600305-41 = "老師……那個……"
1600305-42 = "……不，抱歉，沒事……"
1600305-43 = "[s1] 「沒關係，你去吧。」\n[s2] 「你無法坐視不管對吧？」"
1600305-44 = "……！"
1600305-45 = "……！"
1600305-46 = "……是，謝謝老師。"
1600305-47 = "請等我一下，我會儘快結束。"
1600305-48 = "（……喀嚓！）"
1600305-49 = "嗯？剛剛是不是有什麼聲音？"
1600305-50 = "有耶，是什麼聲音啊？有點似曾相識的感覺……"
1600305-51 = "投擲閃光彈！"
1600305-53 = "（碰！嘰咿咿咿咿咿咿──）"
1600305-58 = "（……之後就是老樣子的光景。不良分子們被閃光彈震昏、遭到制服）"
1600305-59 = "（然後被綁在柱子上，被迫用耳機聽大音量的〈北鼻〉）"
1600305-61 = "……我回來了，老師。對不起，比想像中花了不少時間。"
1600305-62 = "很抱歉，稍後原定的行程……"
1600305-63 = "……是，謝謝老師體諒。"
1600305-64 = "……比起那個，你比較在意為什麼每次都要用閃光彈？"
1600305-65 = "……因為，"
1600305-66 = "那是能讓任何人都不受傷的方法。"
1600305-67 = "閃光彈可以安全地封鎖，並壓制對方的行動。"
1600305-68 = "雖然對方往往都是作惡的壞人……但我也不希望讓他們受傷。"
1600305-69 = "若能不傷及任何人成功壓制，當然是最好。因為我是「自衛隊」。"
1600305-70 = "[s] 「鈴美果然很溫柔。」"
1600305-71 = "為，為什麼這兩件事會串在一起……！"
1600305-72 = "總，總之我們快走吧！"
1600305-73 = "老師，請跟我來。"
1600305-76 = "（但是之後停留的地方也都有發生事件，而鈴美也會每次都丟出閃光彈）"
1600305-77 = "（結果那天丟出的閃光彈數量達到了二位數）"
1600305-79 = "……"
1600305-80 = "……真的很對不起，老師。"
1600305-81 = "結果今天一整天，做的事跟平常的自衛隊活動沒兩樣……"
1600305-82 = "變得像是要老師陪著我出任務一樣，對不起……"
1600305-83 = "咦……？你說很有趣……？"
1600305-84 = "下次也要一起出來……？"
1600305-85 = "……"
1600305-86 = "是，當然可以，隨時歡迎。"
1600305-87 = "如果老師不嫌棄我這種人的話，我非常樂意。"
1600305-88 = "真的很謝謝老師。"
1600305-91 = "……我非常開心。"
1600305-93 = "（鈴美說完便往反方向走去，回家了）"
1600305-94 = "（她的腳步不同於之前幾次，看起來十分從容平穩）"

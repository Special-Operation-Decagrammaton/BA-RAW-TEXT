[translation]
1600305-1 = "Almighty Flash Grenade"
1600305-2 = "Over here, Sensei. It's Suzumi."
1600305-3 = "It's okay. I just got here myself."
1600305-4 = "Pardon me? Why would I not be okay with you calling me...?"
1600305-5 = "If this is about my Vigilante Crew workload, then don't concern yourself."
1600305-6 = "It isn't as though you're tearing me away from a job I love."
1600305-7 = "Am I forced to do it? No, that's not it. No one's making me do anything."
1600305-8 = "I simply don't...particularly enjoy it. That's all."
1600305-9 = "Truthfully, I hope the day comes where this region won't need a Vigilante Crew anymore..."
1600305-10 = "You think that makes me kind?"
1600305-11 = "You must be mistaken. Others would rather stay away because I seem cold."
1600305-12 = "Not that I don't understand. It simply comes with the territory of this line of work."
1600305-13 = "...Thank you for saying that, though."
1600305-14 = "Let's go, Sensei. I'll lead—I mean..."
1600305-17 = "Let's walk together."
1600305-18 = "[s] (I start walking alongside Suzumi.)"
1600305-22 = "This is a cafe I enjoy. Would you care to join me?"
1600305-23 = "I have a preference for lattes, and this cafe's are..."
1600305-24 = "*crash* *bang*"
1600305-25 = "Gah! What are you doing?!"
1600305-26 = "...?!"
1600305-27 = "Ahaha! What are you, stupid? We're robbing you, obviously!"
1600305-28 = "It's the perfect job! We scouted for weeks so we could strike while the Vigilante Crew is off duty!"
1600305-29 = "So shut you mouth and empty the cash register. Get moving!"
1600305-30 = "*sigh*"
1600305-31 = "If only the ruffians here put this much energy into studying."
1600305-32 = "(This is supposed to be my day off...and I'm with Sensei.)"
1600305-35 = "..."
1600305-36 = "I-I told you! That's all the money we made this week!"
1600305-37 = "You mean the money WE made. We promise not to spend it in one place."
1600305-38 = "I hope you weren't hoping to play the hero. The last thing you want is to land in the hospital after getting fired for this! Hahaha!"
1600305-39 = "..."
1600305-40 = "Um..."
1600305-41 = "Sensei...I..."
1600305-42 = "It's nothing. I'm sorry."
1600305-43 = "[s1] \"It's okay. You should go.\"\n[s2] \"You're not going to just leave them, are you?\""
1600305-44 = "...!"
1600305-45 = "...!"
1600305-46 = "You're right."
1600305-47 = "Thank you, Sensei. I won't be long. I'll take care of this as quickly as possible."
1600305-48 = "*click*"
1600305-49 = "Huh? Did you hear something?"
1600305-50 = "Yeah. What was that? It sounded oddly familiar..."
1600305-51 = "Flash grenade incoming!"
1600305-53 = "*bam* *riiiiiiinnnng*"
1600305-58 = "(After that it was business as usual. The hoodlums were quickly subdued after the shock from the flash grenade.)"
1600305-59 = "(Suzumi tied them to a pillar and forced them to listen to Austin Dieber's \"Baby\" on repeat.)"
1600305-61 = "I've returned, Sensei. My apologies. That took longer than I expected."
1600305-62 = "I was supposed to keep you company today, yet I still had to..."
1600305-63 = "You...don't' mind? You had fun today?"
1600305-64 = "And you're curious why flash grenades are my weapon of choice?"
1600305-65 = "That's simple..."
1600305-66 = "It's because they're non-lethal and their effects wear off."
1600305-67 = "Flash grenades are the quickest and safest way to neutralize the situation and subdue the enemy."
1600305-68 = "They may be ruffians, but my goal isn't to harm them."
1600305-69 = "My mission is only to stop them. That is the Vigilante Crew's objective."
1600305-70 = "[s] \"I told you that you have a kind heart, Suzumi.\""
1600305-71 = "...! Wh-What about what I said leads you to that conclusion?"
1600305-72 = "Anyway, we need to get going! We're going to fall behind on our schedule today at this rate."
1600305-73 = "This way...!"
1600305-76 = "(Suzumi ended up having to use a flash grenade practically everywhere we went that day.)"
1600305-77 = "(By the end of the day, she'd easily used ten or more.)"
1600305-79 = "..."
1600305-80 = "I'm so ashamed, Sensei..."
1600305-81 = "I may as well have been on duty with how today turned out."
1600305-82 = "I just couldn't help myself. I'm sorry..."
1600305-83 = "You can't be serious. You really still had fun?"
1600305-84 = "And you want to go out with me again?"
1600305-85 = "..."
1600305-86 = "If that's what you want. It would be my pleasure, Sensei."
1600305-87 = "I'd be happy to keep you company anytime you want."
1600305-88 = "So, thank you for today."
1600305-91 = "I had...a wonderful time."
1600305-93 = "(Suzumi then slowly turned around and began walking away.)"
1600305-94 = "(Unlike before, her steps were relaxed and easy.)"

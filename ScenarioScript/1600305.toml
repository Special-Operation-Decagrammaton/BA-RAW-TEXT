[translation]
1600305-1 = "คำเตือน: ระวังแสงสว่าง"
1600305-2 = "ทางนี้ค่ะคุณครู สึซึมิเองค่ะ"
1600305-3 = "ไม่เป็นไรค่ะ ฉันก็เพิ่งมาเหมือนกัน"
1600305-4 = "กังวลที่เรียกฉันมาแบบนี้เหรอคะ? หมายถึงอะไรคะ...?"
1600305-5 = "ถ้าเรียกมาเพราะงานรักษาความสงบก็ไม่ต้องคิดมากหรอกค่ะ"
1600305-6 = "เพราะว่างานก็ต้องเป็นงาน..."
1600305-7 = "ว่ายังไงนะคะ? คิดว่าฉันฝืนทำเพราะมีใครสั่งเหรอคะ? ไม่หรอกค่ะ ไม่ใช่อย่างนั้น ฉันตั้งใจจะ#nทำเองต่างหาก"
1600305-8 = "แต่ว่า... ก็ไม่ได้ทำเพราะว่างานมันสนุกหรอกนะคะ"
1600305-9 = "ฉันแค่หวังว่าในอนาคตที่นี่จะเป็นพื้นที่ปลอดภัยและไม่ต้องมีคนมาทำงานแบบนี้..."
1600305-10 = "คะ...? ฉันดูอ่อนโยนงั้นเหรอ? ฉันเนี่ยนะคะ?"
1600305-11 = "ไม่หรอกค่ะ คนอื่นคิดว่าฉันน่ากลัวจนเลี่ยงที่จะเจอฉัน หรือไม่ก็ทำท่าทีระวังตัว"
1600305-12 = "แต่ฉันเองก็เข้าใจและยอมรับค่ะ ว่าถ้าทำงานแบบนี้ก็ย่อมมีคนที่กลัวเรา"
1600305-13 = "...แต่ก็ขอบคุณนะคะที่พูดแบบนั้น"
1600305-14 = "ไปเถอะค่ะคุณครู ฉันจะนำ... ไม่สิ"
1600305-17 = "ฉันจะเดินข้างๆ ไปด้วยกันค่ะ"
1600305-18 = "[s] (เดินไปกับสึซึมิ)"
1600305-22 = "ที่นี่คือคาเฟ่ที่ฉันชอบค่ะ มาพักกันก่อนแล้วค่อยไปต่อมั้ยคะ?"
1600305-23 = "ปกติฉันจะดื่มแต่กาแฟลาเต้เท่านั้น แต่ว่าลาเต้ของที่นี่..."
1600305-24 = "...ตู้ม! เพล้ง!"
1600305-25 = "อ๊ากกกกก! ที่มันเรื่องอะไรกันครับเนี่ย!!!"
1600305-26 = "...!?"
1600305-27 = "วะฮ่ะฮ่า! ดูไม่ออกเหรอ? ก็นักเรียนเกเรมาปล้นร้านไง!"
1600305-28 = "ครั้งนี้พวกเราสืบข้อมูลมาล่วงหน้าด้วย! วันนี้เป็นวันที่กลุ่มรักษาความสงบหยุดพักใช่มั้ยล่ะ?"
1600305-29 = "ไม่ต้องพูดอะไรมาก รีบเปิดเคาท์เตอร์แล้วเอาเงินที่อยู่ข้างในออกมาให้หมดซะ เดี๋ยวนี้เลย!!"
1600305-30 = "เฮ้อ..."
1600305-31 = "ไม่เบื่อกันเลยหรือไงนะ? ถ้านักเลงแถวนี้ตั้งใจเรียนเหมือนตั้งใจก่อเรื่องบ้างก็ดี..."
1600305-32 = "(แต่วันนี้เราไม่ได้ทำงานรักษาความสงบนี่นา เราแค่มากับคุณครู...)"
1600305-35 = "......"
1600305-36 = "ยะ... หยุดเถอะครับ! นี่เป็นรายได้ตลอดสัปดาห์ของเราเลยนะครับ!"
1600305-37 = "งั้นก็คงเป็นรายได้ของเราเหมือนกัน! ไม่ต้องห่วงนะ พวกเราจะเอาไปใช้อย่างคุ้มค่าเลยล่ะ~"
1600305-38 = "แล้วก็อย่าทำอะไรวู่วามล่ะ ดีไม่ดีอาจต้องเสียค่ารักษาพยาบาลจนเงินในบัญชีติดลบก็ได้! ฮ่าๆๆ!"
1600305-39 = "......"
1600305-40 = "...อืม..."
1600305-41 = "คุณครูคะ... ฉัน..."
1600305-42 = "ไม่ดีกว่า... ไม่มีอะไรแล้วค่ะ ขอโทษนะคะ..."
1600305-43 = "[s1] \"ครูไม่เป็นไรหรอก ไปเถอะ\"\n[s2] \"จะไปทั้งๆ แบบนี้จริงเหรอ?\""
1600305-44 = "...!"
1600305-45 = "...!"
1600305-46 = "อืม... เข้าใจแล้วละค่ะ"
1600305-47 = "ขอบคุณค่ะคุณครู ช่วยรอสักครู่นะคะ ฉันจะรีบจัดการแล้วกลับมาหาค่ะ"
1600305-48 = "...แกร๊ก!"
1600305-49 = "หืม? เมื่อกี้ได้ยินเสียงอะไรมั้ย?"
1600305-50 = "นั่นสิ เสียงอะไรนะ? รู้สึกเหมือนเดจาวูเลย..."
1600305-51 = "ระเบิดแสง!!"
1600305-53 = "ฟิ้ววว!! บึ้มมมม!!!"
1600305-58 = "(เป็นภาพการต่อสู้ที่เคยเห็นมาแล้วหลายครั้ง พวกอันธพาลถูกคุมตัวไปหลังจากหมดสติไปพร้อม#nระเบิดแสง)"
1600305-59 = "(สึซึมิผูกตัวพวกอันธพาลไว้กับเสา แล้วเปิดเพลงเบบี้ ของออสติน บีเวอร์ให้ฟัง)"
1600305-61 = "กลับมาแล้วค่ะคุณครู ขอโทษด้วยค่ะที่ใช้เวลานานกว่าที่คิด"
1600305-62 = "วันนี้ฉันควรจะอยู่กับคุณครูแท้ๆ..."
1600305-63 = "เอ๋? ไม่เป็นไรงั้นเหรอคะ? คุณครูสนุกมากแล้วงั้นเหรอ?"
1600305-64 = "อืม... สงสัยว่าทำไมฉันถึงใช้ระเบิดแสงทุกครั้งเหรอคะ?"
1600305-65 = "คะ... คือว่า..."
1600305-66 = "ทุกคนจะได้ไม่บาดเจ็บยังไงล่ะคะ"
1600305-67 = "ระเบิดแสงเป็นเครื่องมือในการปราบฝ่ายตรงข้ามที่ได้ผล เพราะสามารถหยุดสถานการณ์#nได้อย่างรวดเร็วและปลอดภัยที่สุด"
1600305-68 = "ถึงแม้จะเป็นพวกอันธพาล แต่ฉันก็ไม่อยากทำให้บาดเจ็บหรอกค่ะ"
1600305-69 = "เอาแค่ให้กำราบก็พอแล้วละ ก็ฉันเป็นกลุ่มรักษาความสงบนี่คะ"
1600305-70 = "[s] \"สึซึมิเป็นคนอ่อนโยนจัง\""
1600305-71 = "...! ทำไมถึงวนมาเรื่องนี้อีกล่ะคะ...!"
1600305-72 = "ระ... เราไปกันต่อเถอะค่ะ! จะได้ทำตามแพลนเดิมของวันนี้เสียทีค่ะ!"
1600305-73 = "ทางนี้ค่ะ...!"
1600305-76 = "(แต่หลังจากนั้นก็เจอปัญหาในที่ที่ไปอยู่ตลอด และสึซึมิก็ใช้ระเบิดแสงในทุกครั้ง)"
1600305-77 = "(สุดท้ายแล้ววันนี้ได้เห็นสึซึมิใช้ระเบิดแสงไปเกิน 10 ครั้ง)"
1600305-79 = "......"
1600305-80 = "...วันนี้ฉันน่าละอายที่สุดเลยค่ะ คุณครู..."
1600305-81 = "สุดท้ายจากวันที่มาเป็นเพื่อนเดินทางก็ต้องกลายเป็นวันแห่งการรักษาความสงบ... ไม่ต่างอะไร#nกับที่ทำในทุกวันเลยค่ะ"
1600305-82 = "ฉันผิดเองค่ะที่ไม่อาจทนต่อสถานการณ์ได้ ขอโทษนะคะ..."
1600305-83 = "เอ๋...? คุณครูสนุกเหรอ? พะ... พูดอะไรแบบนั้นล่ะคะ..."
1600305-84 = "วันหน้าถ้ามีเวลา... ให้ออกมาอีกเหรอคะ? พูดจริงหรือเปล่าคะ?"
1600305-85 = "......"
1600305-86 = "ได้เลยค่ะ ฉันยินดีเสมอค่ะคุณครู"
1600305-87 = "ถ้าคุณครูโอเคที่จะเดินทางกับฉัน ฉันก็ยินดีเหมือนกันที่จะร่วมทางกับคุณครูค่ะ"
1600305-88 = "วันนี้ขอบคุณมากนะคะ"
1600305-91 = "แล้วก็... ฉันก็สนุกเหมือนกันค่ะ"
1600305-93 = "(สึซึมิหมุนตัวกลับแล้วเดินไปยังฝั่งตรงข้าม)"
1600305-94 = "(เป็นก้าวเดินที่เป็นธรรมชาติและผ่อนคลายอย่างที่ไม่เคยเห็นมาก่อน)"

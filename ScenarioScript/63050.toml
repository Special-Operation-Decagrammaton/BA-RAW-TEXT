[translation]
63050-1 = "第5話;口琴（２）"
63050-3 = "這個好像是前輩掉的，所以我就撿了起來……"
63050-7 = "啊，那個，我不是一定要前輩現在演奏的意思！"
63050-8 = "現在的話，感覺各方面來說都有點困難……嗯！我還是能看出來的！"
63050-9 = "不過，希望將來有一天……"
63050-10 = "可以像那個時候一樣，再次聽見前輩的演奏……"
63050-11 = "啊，啊啊……"
63050-12 = "（這不是我想看見的結局）"
63050-13 = "（不能逃避責任）"
63050-14 = "（那明明是再理所當然不過的事）"
63050-19 = "消失了！？"
63050-20 = "前輩！"
63050-21 = "我們追上去吧。#n他暫時應該還無法離開奧利斯分校才對。"
63050-29 = "[ns]「是我。怎麼了嗎？」"
63050-30 = "老師？這裡出現第三個天使了！"
63050-31 = "嗚……該怎麼說明比較好呢……#n總之，在第三個天使出現的瞬間，之前的兩個天使就消失了！"
63050-32 = "看起來就像是被第三個天使吸收了一樣……！"
63050-33 = "而且在第三個天使裡面，好像時不時會看見類似人影的東西……"
63050-34 = "不知道老師會不會相信……但是那看起來跟昴前輩很像！"
63050-35 = "老師！"
63050-36 = "[ns]「好！這樣就能確定了！」"
63050-40 = "[ns]「謝謝你們！如果又發生什麼事的話，可以再聯絡我！」"
63050-41 = "是！"
63050-47 = "（……）"
63050-49 = "（從這裡看見的天空，始終如此灰暗）"
63050-50 = "（但是剛才，在沙織的記憶裡……）"
63050-53 = "這樣啊。"
63050-54 = "沙織。"
63050-55 = "你所見到的天空……原來是這樣的景象嗎。"
63050-57 = "（奧利斯的風景，總是千篇一律）"
63050-58 = "（生活在那裡的我們，想必也是如此）"
63050-60 = "（沉積之地──所有事物流入、堆積，最終遭到遺忘的場所）"
63050-61 = "（奧利斯肯定就是這樣的地方吧）"
63050-62 = "（就算原本不是，也在不知不覺間變成了這樣）"
63050-64 = "（世界將奧利斯隔離，最終選擇了遺忘）"
63050-65 = "（不，或許連這樣的評價都過於寬容了吧）"
63050-66 = "（世界總會趁著無人察覺的間隙，將阻礙和累贅如灰塵般抖落）"
63050-67 = "（接著毫無顧忌地，朝著誰也意想不到的方向大步邁進）"
63050-69 = "（可是，有誰願意將那些被遺忘的人們銘記在心……呵護到最後一刻呢）"
63050-70 = "（誰能替那些無人聽見的聲音……留下最後的呢喃呢）"
63050-72 = "啊，對了！吹口琴給我們聽吧，前輩！口琴！"
63050-73 = "在這種廢墟裡面，假裝一個人沉浸在感傷中吹口琴……"
63050-74 = "最近我突然有種…… 這好像有點過時了的感覺……"
63050-78 = "那個，我也……"
63050-82 = "[log=스바루]別說了。[/log]"
63050-85 = "難得回來一趟，所以……"
63050-89 = "[log=스바루]……拜託別再說下去了。[-][/log]"
63050-93 = "想聽聽前輩的演奏……可以嗎？"
63050-97 = "[log=스바루]！！！[-][/log]"
63050-101 = "[log=스바루]！？！？[-][/log]"
63050-108 = "你後悔了嗎？"
63050-109 = "敦子……"
63050-110 = "沒事的。我們也跟你一樣。"
63050-111 = "但是，奧利斯……"
63050-112 = "三一曾對奧利斯做過的一切……！"
63050-113 = "沒錯，那無疑是必須釐清的事。"
63050-114 = "不過……"
63050-115 = "現在因為那件事情這麼痛苦……前輩不覺得自己有點委屈嗎？"
63050-116 = "還記得這句話嗎？"
63050-117 = "「你用腳踢刺是難的。」"
63050-118 = "……！"
63050-119 = "大家一起面對吧。"
63050-120 = "別再一個人承擔一切了。"
63050-121 = "明明……都已經走到這一步了？"
63050-122 = "嗯。就算現在也還不遲。"
63050-123 = "只要坦白地說出來，老師他一定會幫助我們的。"
63050-124 = "……"
63050-125 = "啊，不過我們可能得先去一趟矯正局……那段時間就拜託你囉？"
63050-126 = "……"
63050-127 = "不……不行。不可以那樣。"
63050-128 = "不可以……那樣。"
63050-129 = "我……"
63050-130 = "我們……"
63050-131 = "以及奧利斯還無法接受。"
63050-132 = "就像你說的一樣，這片土地早已變成「那樣的地方」了。"
63050-133 = "絕不能在尚未清算與審判的情況下，就這麼讓一切埋藏於此。"
63050-134 = "那樣的行為，無異於對先從這片土地消逝之人的褻瀆！"
63050-135 = "我其實沒有要求你放下那些事的意思……"
63050-136 = "看來你已經被自己吞噬了呢。#n這樣任何聲音都無法傳進你的耳裡。"
63050-137 = "不過沒關係，我們以前也是這樣的。#n而且奧利斯非常清楚這種時候該怎麼做。"
63050-138 = "……？"
63050-139 = "來。"
63050-140 = "我們就用奧利斯的方式稍微聊聊吧？"
63050-143 = "敦子？你沒事吧？#n突然做出類似在祈禱的姿勢……"
63050-144 = "嗯，我沒事。#n剛才只是……稍微「通話」了一下而已。"
63050-146 = "通話……？"
63050-147 = "雖，雖然不是很懂……應該是那個意思吧……？"
63050-148 = "嗯，就是那樣沒錯。"
63050-149 = "那麼，老師。"
63050-150 = "[s]「嗯？」"
63050-151 = "你願意和我們一起，叫醒沉溺在自己夢境中無法醒來的前輩嗎？"
63050-152 = "用很有奧利斯風格的方式。"
63050-153 = "[s]「我該怎麼做呢？」"
63050-154 = "只要做老師一直在做的事就行了。"
63050-155 = "舞彩也是，能請你一起幫忙嗎？"
63050-159 = "……是，我知道了。"
63050-160 = "為了前輩和老師，我會努力的！"

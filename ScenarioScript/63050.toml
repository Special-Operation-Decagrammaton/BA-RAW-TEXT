[translation]
63050-1 = "Episode 5;Harmonica 2"
63050-3 = "I thought you might've dropped this, so I picked it up..."
63050-7 = "O-Oh! It's not because I want you to play it right this moment!"
63050-8 = "That'd be asking for a bit much! Even I know that."
63050-9 = "But I would love to hear it again someday..."
63050-10 = "Just like back then... I want to hear you play again..."
63050-11 = "A-Ah..."
63050-12 = "(This isn't what I wanted.)"
63050-13 = "(\"You mustn't look away from your responsibilities.\")"
63050-14 = "(I should've known better.)"
63050-19 = "She's gone?!"
63050-20 = "Subaru!"
63050-21 = "We have to go after her. For now, she shouldn't be able to leave the Arius School grounds."
63050-29 = "[ns] \"Hello? What's going on?\""
63050-30 = "Sensei? The third angel just showed up!"
63050-31 = "But, um... How do I even explain this...? The third one did show up, but as soon as it did, the other two disappeared!"
63050-32 = "It was like, the third one absorbed them? I don't know!"
63050-33 = "I thought I saw someone inside the angel for a second, but it was just a split second!"
63050-34 = "I know this sounds totally crazy, but I thought... I thought it looked like Subaru!"
63050-35 = "Sensei!"
63050-36 = "[ns] \"Right! That confirms it!\""
63050-40 = "[ns] \"Thanks, everyone! Call me if anything else happens!\""
63050-41 = "Understood!"
63050-47 = "(...)"
63050-49 = "(The sky I see from here is so overcast.)"
63050-50 = "(But in Saori's memories just now...)"
63050-53 = "I see."
63050-54 = "Saori."
63050-55 = "So this is what the sky looked like to you."
63050-57 = "(The scenery in Arius always stayed exactly the same.)"
63050-58 = "(And we, who lived there...did too.)"
63050-60 = "(In a sediment basin, everything flows in, piles up, and is forgotten.)"
63050-61 = "(Arius was a sediment basin.)"
63050-62 = "(Maybe not at first, but that's what it became, eventually.)"
63050-64 = "(The world abandoned Arius, and then chose to forget about us.)"
63050-65 = "(No, even that's too generous an assessment.)"
63050-66 = "(Humanity has a tendency to sweep cumbersome things under the rug when they think no one's looking.)"
63050-67 = "(Then, they'll stride off proudly in directions previously unthinkable)"
63050-69 = "(But who remembers those who were left in the wake? Who will hold onto the memories of the forgotten?)"
63050-70 = "(Who will leave behind a murmur of those voices that can't be heard?)"
63050-72 = "Oh, right! Play your harmonica, Subaru! The harmonica!"
63050-73 = "Playing my harmonica in these ruins, pretending to be lost in our feelings..."
63050-74 = "...maybe we've outgrown that a little."
63050-78 = "Um, I also..."
63050-82 = "[log=스바루]Please, stop.[/log]"
63050-85 = "Since you're finally back..."
63050-89 = "[log=스바루]...Please. I'm begging you. Just stop.[-][/log]"
63050-93 = "I really, really want to hear you play."
63050-97 = "[log=스바루]!![-][/log]"
63050-101 = "[log=스바루]?!?![-][/log]"
63050-108 = "Do you regret it?"
63050-109 = "Atsu...ko..."
63050-110 = "It's okay. We were the same."
63050-111 = "But Arius..."
63050-112 = "The things Trinity has done to us...!"
63050-113 = "Yes. We can't just let that go."
63050-114 = "In spite of that..."
63050-115 = "Isn't it a bit unfair to torture yourself to this extent over it?"
63050-116 = "Do you remember this line?"
63050-117 = "\"It is hard for you to kick against the goads.\""
63050-118 = "...!"
63050-119 = "Let's do this together."
63050-120 = "Stop trying to shoulder everything yourself."
63050-121 = "Now? After all this time?"
63050-122 = "Yes. After all this time."
63050-123 = "If you're honest about it, Sensei will definitely help you."
63050-124 = "..."
63050-125 = "Oh. Along the way, we may need to take a vacation to the Corrections Bureau, so I'll count on you to take care of Arius, okay?"
63050-126 = "..."
63050-127 = "No... No. I can't do that."
63050-128 = "I just can't."
63050-129 = "I..."
63050-130 = "We..."
63050-131 = "Arius just can't accept it."
63050-132 = "As you said, that's the kind of place this land has become."
63050-133 = "Someone needs to pay the price for what's happened to us."
63050-134 = "For the sake of everyone we've lost, we need justice."
63050-135 = "And I am not suggesting we don't."
63050-136 = "You've become consumed in the vortex of your own thoughts. No one will get through to you like this."
63050-137 = "But we were all that way too, once. And Arius has just the thing for times like this."
63050-138 = "Pardon...?"
63050-139 = "All right."
63050-140 = "Why don't we have a little talk, the Arius way?"
63050-143 = "Atsuko? Are you okay? You looked as if you were praying."
63050-144 = "Yeah, I'm fine. I just had a little...\"call\" to answer."
63050-146 = "You took a call?"
63050-147 = "I don't really know, but something along those lines?"
63050-148 = "Something along those lines."
63050-149 = "Then, Sensei..."
63050-150 = "[s] \"What?\""
63050-151 = "Will you help us wake up our senior? She seems to have lost her way in a dream, causing her to oversleep."
63050-152 = "We'll handle it the Arius way, of course."
63050-153 = "[s] \"What do you need from me?\""
63050-154 = "Just do what you've always done for us, Sensei."
63050-155 = "Maia, could I count on your help as well, please?"
63050-159 = "...Yeah. Count me in."
63050-160 = "For Subaru and Sensei, I can do it!"

[translation]
63050-1 = "ตอนที่ 5;ฮาร์โมนิกา 2"
63050-3 = "รุ่นพี่ทำมันตกไว้ ฉันก็เลยเก็บมาค่ะ..."
63050-7 = "อ๊ะ ฉันไม่ได้จะขอให้รุ่นพี่เป่าฮาร์โมนิกาให้ฟังตอนนี้หรอกนะคะ!"
63050-8 = "ตอนนี้น่าจะไม่สะดวกด้วยเหตุผลหลายๆ อย่างใช่มั้ยล่ะคะ! เรื่องแค่นั้นฉันพอรู้ค่ะ!"
63050-9 = "แต่ว่าสักวันหนึ่ง ฉันเองก็..."
63050-10 = "อยากฟังเสียงฮาร์โมนิกาจากรุ่นพี่เหมือนตอนนั้นอีกค่ะ..."
63050-11 = "อะ... อ่า..."
63050-12 = "(ไม่อยากให้ผลลัพธ์เป็นแบบนี้เลย)"
63050-13 = "(ห้ามหนีความรับผิดชอบ)"
63050-14 = "(เรื่องนั้นมันชัดเจนเกินไปแล้ว)"
63050-19 = "หายไปแล้ว?!"
63050-20 = "รุ่นพี่!"
63050-21 = "ไล่ตามไป ยังไงก็หนีออกไปนอกโรงเรียนสาขาอาเรียสไม่ได้หรอก"
63050-29 = "[ns] \"ฮัลโหล? มีอะไรเหรอ?\""
63050-30 = "คุณครู? นางฟ้าองค์ที่ 3 มาปรากฏตัวอยู่ที่นี่ค่ะ!"
63050-31 = "อ่า... จะอธิบายว่ายังไงดีล่ะ... ตอนนางฟ้าองค์ที่ 3 ปรากฏตัว นางฟ้า 2 องค์ก่อนหน้าก็หายไปเลยค่ะ!"
63050-32 = "เหมือนโดนดูดกลืนเข้าไปในนางฟ้าองค์ที่ 3 อย่างนั้นละ...!"
63050-33 = "และในตัวนางฟ้าองค์ที่ 3 ก็เหมือนมีบางอย่างที่ดูเหมือนมนุษย์อยู่เลยค่ะ..."
63050-34 = "คุณครูอาจจะไม่เชื่อก็ได้... แต่เหมือนรุ่นพี่สุบารุเลยค่ะ!"
63050-35 = "ครู!"
63050-36 = "[ns] \"อื้อ! งั้นก็แน่นอนเลย!\""
63050-40 = "[ns] \"ขอบใจนะ ทุกคน! ถ้ามีอะไรก็ติดต่อครูมาอีกนะ!\""
63050-41 = "ค่ะ!"
63050-47 = "(...)"
63050-49 = "(ท้องฟ้าที่เห็นจากที่นี่ช่างมืดครึ้ม)"
63050-50 = "(ส่วนในความทรงจำของซาโอริเมื่อก่อนหน้านี้...)"
63050-53 = "อย่างนี้เองเหรอ"
63050-54 = "ซาโอริ"
63050-55 = "ท้องฟ้าที่เธอเห็นเป็นแบบนี้งั้นเหรอ?"
63050-57 = "(ทิวทัศน์ของอาเรียสก็เป็นแบบนี้มาตลอดนั่นละ)"
63050-58 = "(กับพวกเราที่ยังอาศัยอยู่ที่นั่นก็ไม่ต่างกัน)"
63050-60 = "(พื้นที่ตกตะกอน พื้นที่ที่ทุกสิ่งทุกอย่างไหลเข้ามาสะสมและถูกลืมเลือนไป)"
63050-61 = "(อาเรียสคงเป็นสถานที่แบบนั้น)"
63050-62 = "(ถึงจะบอกว่าไม่ใช่ แต่ในเวลาหนึ่งก็กลายเป็นแบบนั้นไปแล้ว)"
63050-64 = "(โลกปิดกั้นอาเรียส และในที่สุดก็เลือกที่จะลืมอาเรียสไป)"
63050-65 = "(ไม่สิ นั่นอาจเป็นการประเมินค่าอย่างใจกว้างเกินไปด้วยซ้ำ)"
63050-66 = "(ยังไงเสียโลกก็สลัดสิ่งต่างๆ ที่มาเกะกะออกไปราวกับปัดฝุ่นโดยไม่มีใครสังเกตเห็น)"
63050-67 = "(และค่อยๆ ดำเนินไปในทิศทางที่ไม่มีใครคาดคิด)"
63050-69 = "(แต่ใครเล่าจะจดจำและทะนุถนอมสิ่งที่ถูกลืมเลือนจนถึงวาระสุดท้าย)"
63050-70 = "(ใครเล่าจะฝากเสียงพร่ำบ่นไว้แทนที่เสียงที่ไม่ได้ยินนั้น)"
63050-72 = "จริงสิ! ฮาร์โมนิกา! เป่าฮาร์โมนิกาให้ฟังหน่อยสิคะ รุ่นพี่!"
63050-73 = "การอินกับห้วงอารมณ์แล้วเป่าฮาร์โมนิกาคนเดียวในอาคารที่เป็นซากปรักหักพังแบบนี้..."
63050-74 = "มันออกจะวางท่าและเชยไปหน่อย..."
63050-78 = "เอ่อ ฉันขอ..."
63050-82 = "[log=스바루]พอเถอะค่ะ[/log]"
63050-85 = "ไหนๆ ก็ได้กลับมาอีกครั้งแล้ว"
63050-89 = "[log=스바루]ฉันขอร้อง... ละค่ะ หยุดเถอะค่ะ[-][/log]"
63050-93 = "แต่ฉันอยากได้ยินเพลงของรุ่นพี่นะคะ...?"
63050-97 = "[log=스바루]!!![-][/log]"
63050-101 = "[log=스바루]!?!?[-][/log]"
63050-108 = "เสียใจเหรอ?"
63050-109 = "อาสึ... โกะ..."
63050-110 = "ไม่เป็นไร พวกเราก็เป็นแบบนั้นเหมือนกัน"
63050-111 = "แต่ว่าอาเรียสน่ะ"
63050-112 = "สิ่งที่ทรีนิตี้ทำกับอาเรียสมาตลอด...!"
63050-113 = "อื้อ ใช่แล้วละ เราต้องทำเรื่องนั้นให้กระจ่าง"
63050-114 = "แต่ว่า"
63050-115 = "มันไม่ยุติธรรมหรือเปล่าที่รุ่นพี่ต้องมาทุกข์ทรมานกับเรื่องนั้นน่ะ?"
63050-116 = "จำคำนี้ได้หรือเปล่า?"
63050-117 = "<ถ้าไปเดินเหยียบแส้หนาม จะมีแต่ตัวเองที่ทรมาน>"
63050-118 = "...!"
63050-119 = "มาทำด้วยกันเถอะนะ"
63050-120 = "อย่าพยายามแบกรับอะไรที่มากเกินไปเพียงลำพังเลย"
63050-121 = "เพิ่งจะมาพูดเอาตอนนี้เหรอ?"
63050-122 = "อื้อ อย่างน้อยก็ในตอนนี้น่ะ"
63050-123 = "ฉันบอกตามตรงนะ คุณครูจะเข้ามาช่วยแน่นอน"
63050-124 = "..."
63050-125 = "อ้อ แล้วระหว่างนั้นพวกฉันอาจจะต้องไปอยู่สำนักควบคุมด้วย งั้นเรื่องนั้นก็ฝากด้วยนะ"
63050-126 = "..."
63050-127 = "มะ... ไม่ได้หรอก ฉันทำแบบนั้นไม่ได้"
63050-128 = "ฉันทำแบบนั้น... ไม่ได้ค่ะ"
63050-129 = "ทั้งฉัน"
63050-130 = "ทั้งพวกเรา"
63050-131 = "ทั้งอาเรียส ก็ยังไม่เชื่ออยู่ดีค่ะ"
63050-132 = "ก็เพราะที่แห่งนี้กลายเป็น 'สถานที่แบบนั้น' ไปแล้ว อย่างที่คุณว่าไงคะ"
63050-133 = "เราปล่อยให้ทุกอย่างไหลผ่านไปโดยไม่มีการลงโทษหรือการพิพากษาไม่ได้หรอกค่ะ"
63050-134 = "นั่นไม่ใช่สิ่งที่เราจะทำเพื่อทุกคนที่หลบหนีออกไปจากที่แห่งนี้ด้วยค่ะ!"
63050-135 = "ฉันไม่ได้บอกว่าอย่าคิดถึงแต่เรื่องนั้นสักหน่อย..."
63050-136 = "เธอกลืนกินตัวเองไปหมดแล้วสินะ จากนี้ก็คงไม่ได้ยินเสียงอะไรแล้วละ"
63050-137 = "ไม่เป็นไร ครั้งหนึ่งพวกฉันก็เคยเป็นแบบนั้นมาก่อน และอาเรียสก็คงรู้ดีว่าต้องทำยังไงในสถานการณ์#nแบบนี้"
63050-138 = "...?"
63050-139 = "เอาละ"
63050-140 = "งั้นเรามาคุยกันต่อตามวิถีอาเรียสมั้ยล่ะ?"
63050-143 = "อาสึโกะ? เป็นอะไรหรือเปล่า? จู่ๆ ก็ทำเหมือนสวดอธิษฐานอะไรเลย..."
63050-144 = "อื้อ ไม่เป็นไร ฉันก็แค่... 'สื่อสาร' กันมาเดี๋ยวหนึ่งน่ะ"
63050-146 = "สื่อสาร...?"
63050-147 = "ถะ... ถึงจะไม่เข้าใจเท่าไร... แต่คงเป็นอย่างนั้นใช่มั้ยคะ...?"
63050-148 = "อื้อ อย่างนั้นละ"
63050-149 = "ถ้างั้น คุณครู"
63050-150 = "[s] \"หืม?\""
63050-151 = "ช่วยฉันปลุกรุ่นพี่ที่ไม่ยอมตื่นจากฝันของตัวเองหน่อยได้มั้ย?"
63050-152 = "ปลุกด้วยวิถีของอาเรียสน่ะ"
63050-153 = "[s] \"จะให้ครูทำอะไรเหรอ?\""
63050-154 = "ทำตามที่คุณครูเคยทำมาตลอดก็พอแล้วละ"
63050-155 = "ไมอาก็มาช่วยอีกแรงได้มั้ย?"
63050-159 = "ค่ะ... เข้าใจแล้วค่ะ"
63050-160 = "ถ้าเป็นการทำเพื่อรุ่นพี่กับคุณครูละก็ ฉันยินดีค่ะ!"

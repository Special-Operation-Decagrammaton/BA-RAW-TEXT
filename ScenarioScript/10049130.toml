[translation]
10049130-1 = "ย้อนวันวาน;บลูส์แห่งแก๊งหมวกกันน็อก"
10049130-2 = "[log]5 วันก่อน[/log]"
10049130-4 = "ถ้างั้นฉันจะสรุปอีกรอบนะ"
10049130-5 = "สุดสัปดาห์นี้เราจะไปที่ <สวนสนุกบอเดอร์แลนด์> แล้วจับตัวแม่ค้าหัวใสคนหนึ่งกัน"
10049130-6 = "จะทุบหรือใช้กำลังนิดหน่อยก็ได้ ขอแค่เอาตัวมาได้ก็พอ มีคำถามหรือเปล่า?"
10049130-7 = "มีค่ะ หัวหน้า!"
10049130-8 = "ดูมุ่งมั่นดีนี่! ว่ามาเลย!"
10049130-9 = "แล้วค่าเข้าสวนสนุกล่ะคะ? ถ้าจะเข้าสวนสนุก ก็น่าจะต้องใช้เงินซื้อบัตรนะคะ"
10049130-10 = "ต้องแพงแน่ๆ เลย... เงินที่พวกเรามีอยู่น่าจะซื้อบัตรถูกที่สุดไม่ได้ด้วยซ้ำ"
10049130-11 = "ต่อให้ไปเตะตู้ขายสินค้าให้เหรียญหล่นออกมา ก็ไม่น่าจะได้เงินพอซื้อด้วยค่ะหัวหน้า"
10049130-12 = "ต่อให้เข้าไปแล้วก็คงซื้ออะไรในนั้นกินไม่ได้ด้วยค่ะ คนอื่นคงเพลินกัน แต่เราต้องน่าสงสารกันแน่ๆ"
10049130-13 = "อีกอย่าง แก๊งเล็กๆ อย่างเราจะไปหาใครในสวนสนุกกว้างๆ เจอได้ยังไงล่ะคะ?"
10049130-14 = "ฮืออ..."
10049130-15 = "ฮือ..."
10049130-16 = "ฮุ..."
10049130-20 = "ฮุฮุฮุ... ฮะฮะฮะฮ่า!!"
10049130-21 = "งานครั้งนี้จะไม่เหมือนทุกครั้งหรอกนะ!"
10049130-22 = "ก็ผู้ว่าจ้างจะให้บัตรเข้าสวนสนุกพวกเราน่ะสิ!"
10049130-23 = "อีกอย่าง! แก๊งหมวกกันน็อกอื่นที่ผูกมิตรกับเราไว้ก็บอกว่าจะส่งกำลังเสริมมาด้วย!"
10049130-24 = "หะ... หัวหน้า!!"
10049130-25 = "จริงเหรอคะ?! เราได้งานดีๆ แบบนั้นมาจริงๆ เหรอคะ?"
10049130-26 = "แล้วทำไมเราต้องทนทำงานแย่ๆ ที่มีแต่คนเกลียดไปตลอดด้วยล่ะ!"
10049130-27 = "แล้วก็ อย่าตกใจกันล่ะ!"
10049130-28 = "บัตรที่เราได้ เป็นบัตรฟรีพาสเลย!"
10049130-29 = "บัตรฟรีพาส!!!"
10049130-30 = "งั้นก็เล่นเครื่องเล่นได้หมดเลยเหรอคะ? เล่นได้ทั้งวันด้วย?!"
10049130-31 = "แถมยังเป็นบัตรสุดสัปดาห์ที่แพงกว่าปกติด้วยนะ!"
10049130-32 = "หัวหน้า! นี่ละค่ะหัวหน้าที่ฉันเชื่อมั่น!"
10049130-33 = "ทั้งเข้าฟรี ทั้งมีกำลังเสริม แบบนี้ถ้าทำไม่สำเร็จก็ไม่น่าเชื่อแล้วละค่ะ!"
10049130-34 = "ต้องรีบไปแต่เช้า แล้วเข้าไปตั้งแต่ประตูเปิดแล้วละค่ะ!"
10049130-35 = "เราไม่รู้ว่าเป้าหมายจะโผล่มาตอนไหนนี่คะ!"
10049130-36 = "สงสัยต้องเตรียมข้าวกล่องไปด้วยแล้วค่ะ! เราอาจจะต้องอยู่ในนั้นนานเลยนี่คะ!"
10049130-37 = "แล้วก็ต้องถ่ายรูปเยอะๆ เพื่อหาเบาะแสด้วยค่ะ!"
10049130-38 = "แหะๆ!"
10049130-39 = "ยัยเด็กพวกนี้! อย่าคิดแต่จะไปเที่ยวเล่นสิ! ถ้าเราทำงานนี้สำเร็จละก็นะ?!"
10049130-40 = "ถ้าจับตัวแม่ค้าได้ เย็นวันนั้นเราจะเอาเงินรางวัลไปกินเนื้อย่างกัน!"
10049130-41 = "โอ้เย่!"
10049130-42 = "สุดยอดเลยหัวหน้า!!"
10049130-45 = "อืม..."
10049130-46 = "หืมม...?"
10049130-47 = "หัวหน้า ประตูเปิดแล้วนะคะ?"
10049130-48 = "ทำไมไม่เข้าไปล่ะคะ?"
10049130-49 = "ถ้าเข้าไปช้า มีหวังต้องต่อแถวยาวเหยียดเพื่อเล่นเครื่องเล่นสนุกๆ แน่..."
10049130-50 = "พวกที่บอกว่าจะมาเป็นกำลังเสริมไม่เห็นมาเลย"
10049130-51 = "แล้วบัตรเข้าสวนสนุกของเราก็อยู่กับพวกนั้นด้วย!"
10049130-52 = "ระ... เราถูกหักหลังงั้นเหรอคะ?!"
10049130-53 = "หักหลัง?! จะหักหลังทำไมล่ะ? หรือพวกนั้นคิดจะแย่งงานพวกเรา?"
10049130-54 = "ต้องโทรไปถามหน่อยแล้ว ถ้าคิดจะหักหลังกันจริงๆ ละก็ โดนดีแน่!"
10049130-55 = "ค่ะ หัวหน้า!! เอาให้หมวกกันน็อกกระเด็นเลยค่ะ!!"
10049130-61 = "นี่!! กำลังมาหรือเปล่า?!"
10049130-62 = "ถ้าจะหักหลังกันละก็นะ"
10049130-63 = "ตะ... ตอนนี้พวกฉันกำลังยุ่งน่ะ!! ขอโทษนะ!! ที่จริงก็กำลังเดินทางอยู่!!"
10049130-64 = "แต่พวกฉันโดนเล่นงานกันยกแก๊งเลย!!"
10049130-65 = "ว่าไงนะ?! แล้วอยู่ที่ไหนกัน? โดนเป้าหมายจู่โจมก่อนงั้นเหรอ?!"
10049130-66 = "รถไฟ อยู่บนรถไฟ!! แต่จู่ๆ พนักงานรถไฟก็..."
10049130-67 = "พะ... พนักงานรถไฟเป็นบ้าไปแล้ว!!!"
10049130-68 = "มะ... ไม่ได้นะ!!"
10049130-69 = "ได้ค่ะ!"
10049130-70 = "ฉันไม่ให้อภัยผู้โดยสารที่ก่อกวนการเดินรถหรอกค่ะ!"
10049130-71 = "อ๊ากกก!!"
10049130-78 = "หะ... หัวหน้า?! ทางนั้นว่ายังไงคะ...?"
10049130-79 = "ถูกทำร้ายเหรอคะ? แล้วเรื่องกำลังเสริมกับบัตรเข้าสวนสนุกล่ะ?"
10049130-80 = "เห็นว่านั่งรถไฟมาอยู่ แต่พนักงานรถไฟก็เป็นบ้าขึ้นมาน่ะ?"
10049130-81 = "คะ?"
10049130-82 = "ไหงเป็นงั้นล่ะ?"
10049130-83 = "ไม่รู้สิ...?"
10049130-84 = "นี่เรา... โดนหักหลังหรือเปล่านะ...?"
10049130-86 = "หัวหน้า? จะไปไหนคะ?"
10049130-87 = "แล้วงานของเราล่ะคะ? ทางเข้าสวนสนุกอยู่ทางโน้นนะคะ?"
10049130-89 = "แฮ่ก... แฮ่ก... ดูจากแผนที่แล้ว ในสวนสนุกมีสวนสัตว์อยู่ด้วย"
10049130-90 = "ปกติสวนสัตว์จะห่วงแต่กั้นไม่ให้สัตว์ข้างในออกไปข้างนอก ก็เลยจะสะเพร่าเรื่องการกันไม่ให้คนนอก#nเข้าไปข้างใน"
10049130-91 = "แล้วก็มีหลายจุดที่พวกสัตว์ต่างๆ มือบอนไปปิดระบบเตือนภัยเองด้วย"
10049130-92 = "เห็นว่าสวนสัตว์กำลังปิดให้บริการชั่วคราวเพื่อซ่อมบำรุงอยู่พอดี"
10049130-93 = "งั้นก็เหมาะกับการแอบเข้าไปข้างในเลยละ"
10049130-94 = "ว้าว... หัวหน้ารู้ได้ยังไงคะเนี่ย?"
10049130-95 = "หัวหน้าไม่ได้โดดเรียนเพราะขี้เกียจเรียนเหมือนพวกเราหรอกนะ!"
10049130-96 = "ใช่ไหมคะ หัวหน้า! ได้ยินว่าหัวหน้าเรียนเก่งด้วยนี่คะ?"
10049130-97 = "หนวกหูน่า โรงเรียนแบบนั้นน่ะ ฉันไม่ได้เข้าไปเพราะอยากเข้าหรอกนะ"
10049130-98 = "ต่อให้พยายามฝืนเรียน ฉันก็อึดอัดเหมือนอกจะแตกตายให้ได้"
10049130-99 = "ชิ... ถ้าได้ลงแข่งในคาร์นิวัลสักครั้งก่อนที่จะลาออกมาก็น่าจะดีหรอกนะ"
10049130-100 = "เรื่องราวของหัวหน้า ได้ฟังทีไรก็น่าทึ่งนะคะ"
10049130-101 = "เสียดายแทนหรือไง?!"
10049130-103 = "ช่างเถอะ! เอาเป็นว่าเข้าทางนี้ละ"
10049130-104 = "เราแค่ไม่มีบัตรเข้าก็เท่านั้น ถ้าเข้าไปแล้วเจียมเนื้อเจียมตัวอยู่ข้างในก็คงไม่ถือว่าเป็นการบุกรุกหรอก!"
10049130-106 = "มะ... มันก็จริงอยู่หรอกค่ะ เพราะยังไงก็... มีคนซื้อบัตรให้เราไว้แล้วนี่เนอะ...?"
10049130-107 = "หัวหน้าฉลาดจริงๆ เลยนะคะ"
10049130-108 = "อย่ามาชมให้เหลิงอยู่เลย! รีบปีนรั้วไปเถอะ!"
10049130-111 = "ไม่มีการเตือนภัยอย่างที่ว่าไว้เลย!"
10049130-112 = "ที่นี่ตกแต่งไว้เหมือนป่าจริงๆ เลยนะคะ"
10049130-113 = "หืม? ป่าจริงงั้นเหรอ?"
10049130-114 = "ดีละ ทีนี้ก็ไปสวนสนุกกัน!"
10049130-115 = "ถึงจะไม่มีกำลังเสริมหรือบัตรเข้า ก็ไม่เกินกำลังเราหรอก"
10049130-116 = "ตราบใดที่ไม่มีจระเข้โผล่มา ก็ไม่มีอะไรให้กังวล!"
10049130-121 = "อะไรกัน ทำไมจู่ๆ ก็ตัวสั่นกันล่ะ?"
10049130-122 = "หะ... หะหะ... หัวหน้า ฉันว่าเราต้องกังวลกันแล้วละค่ะ"
10049130-123 = "หืม?"
10049130-125 = "ตรงนี้คือ... บ่อจระเข้ค่ะ...!"
10049130-129 = "อ่า สวนสัตว์ก็ต้องมีจระเข้ตัวเป็นๆ สิเนอะ..."
10049130-130 = "ใช่... แต่ทำไมมันต้องมาอยู่ตรงนี้ด้วย!"
10049130-134 = "ว้ากกกกกก!!!"

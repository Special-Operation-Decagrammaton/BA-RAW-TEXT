[translation]
10049130-1 = "Afterword;Helmet Gang Blues"
10049130-2 = "[log]5 days ago...[/log]"
10049130-4 = "All right, let's just go over everything one more time."
10049130-5 = "This weekend, we're out to capture a sketchy peddler at the Borderland Amusement Park and hand them over."
10049130-6 = "We can beat them up first if we have to, as long as we turn them in. Any questions?"
10049130-7 = "I have a question, Captain!"
10049130-8 = "Love the spirit! Go ahead."
10049130-9 = "We'd have to go inside the park, right? How do we handle the entrance fee?"
10049130-10 = "Even the cheap tickets seem like they're way too much for us."
10049130-11 = "I don't think picking up loose change off the street is going to cover it this time."
10049130-12 = "What about food and drinks while we're there? Do we just have to smell it all and go hungry?"
10049130-13 = "Also, isn't that park huge? How are WE going to find one person in that kind of crowd?"
10049130-14 = "Waah..."
10049130-15 = "Wah..."
10049130-16 = "Heh."
10049130-20 = "Heh, heh.... Hahahaha!!!"
10049130-21 = "It'll be different this time!"
10049130-22 = "Our client's already given us entry tickets!"
10049130-23 = "Also! We're getting support from our fellow Helmet Gangsters!"
10049130-24 = "C-Captain?!"
10049130-25 = "For real?! You really got us a job like that?"
10049130-26 = "Hey, not EVERYTHING sucks around here, right?"
10049130-27 = "Oh, and you know what else?"
10049130-28 = "They're premium tickets. Unlimited access."
10049130-29 = "Unlimited access?!"
10049130-30 = "So we can go on all the rides? All day?"
10049130-31 = "BOTH days. All weekend."
10049130-32 = "Aw, I knew you'd come through for us, Captain!"
10049130-33 = "Free tickets, real support? Things are finally looking up!"
10049130-34 = "We should line up as soon as the place opens!"
10049130-35 = "The target could show up there anytime!"
10049130-36 = "We should bring lunch, since we're going to be there a while."
10049130-37 = "And we'll take lots of photos too! Um, so we can look them all over for clues!"
10049130-38 = "Heehee!"
10049130-39 = "Hey. Don't JUST think about having fun out there. We've got a lot riding on this one."
10049130-40 = "And you know what? After we collect the bounty...we're having barbecue!"
10049130-41 = "Heck, yeah!!"
10049130-42 = "You're the best, Captain!"
10049130-45 = "Hmm..."
10049130-46 = "Hmm...?"
10049130-47 = "Looks like the gates are open, Captain."
10049130-48 = "Why aren't we going in?"
10049130-49 = "There's gonna be lines for all the big rides soon..."
10049130-50 = "Our support isn't here yet."
10049130-51 = "Aaand they have all our tickets."
10049130-52 = "D-Did we get double-crossed?!"
10049130-53 = "Nah, why would they do that?! ...Unless they wanted to take our job..."
10049130-54 = "I'd better call them. If they HAVE double-crossed us, they're going to regret it!"
10049130-55 = "Yeah, Captain!! Let's teach 'em a lesson!!"
10049130-61 = "Hey! Are you even coming?!"
10049130-62 = "If you're gonna leave us hanging here..."
10049130-63 = "W-We're a little busy right now!! I'm sorry!! We were on our way!!"
10049130-64 = "But they got us!!"
10049130-65 = "What?! Who got you? The target? Where are you?!"
10049130-66 = "The train!! We were on our way, but then the train crew just..."
10049130-67 = "Th-This train crew is CRAZY!!"
10049130-68 = "Y-You can't do this!!"
10049130-69 = "Yes, we can!!"
10049130-70 = "Disrupting our operations is unforgivable!"
10049130-71 = "Aaahhh!!"
10049130-78 = "C-Captain?! What did they say...?"
10049130-79 = "They got ambushed? Then what about our support? What about the tickets?"
10049130-80 = "Something about a crazy train crew..."
10049130-81 = "Huh?"
10049130-82 = "Why is this happening?"
10049130-83 = "I don't know..."
10049130-84 = "Did someone ELSE double-cross us...?"
10049130-86 = "Captain? Where are you going?"
10049130-87 = "What about the job? Isn't the entrance gate that way?"
10049130-89 = "*pant* *pant*... Okay. So here we are in the zoo, just like the map said."
10049130-90 = "Security here is going to be busy watching the animals, so they won't be watching people as closely."
10049130-91 = "Plus I'm sure the animals mess with the alarms sometimes, so any alarm COULD be false, or some of them might not even be turned on."
10049130-92 = "And...ha. Looks like the zoo's closed for maintenance right now anyway."
10049130-93 = "Perfect timing."
10049130-94 = "Whoa... How'd you put this whole plan together on the fly?"
10049130-95 = "Unlike us, the captain didn't run away from school because she hated studying!"
10049130-96 = "Right, Captain? You were good at studying, right?"
10049130-97 = "Bah. I wasn't at that school by choice, let's put it that way."
10049130-98 = "I tried to keep it to myself, but that place was killing me."
10049130-99 = "Tch, I should've run away sooner, like after that Carnival."
10049130-100 = "I never get tired of hearing your story, Captain."
10049130-101 = "Are you saying I repeat it too much, or what?"
10049130-103 = "Anyway, I figured this was our best bet."
10049130-104 = "Besides, it's not like we're trespassing. Our tickets do exist, right? SOMEBODY paid for them."
10049130-106 = "I-I guess that makes sense."
10049130-107 = "You're so smart, Captain."
10049130-108 = "Oh don't flatter me. Here, let's get over this next wall..."
10049130-111 = "See? No alarms."
10049130-112 = "Hmm, this place looks pretty wild."
10049130-113 = "Wild, huh?"
10049130-114 = "All right, let's keep moving."
10049130-115 = "No tickets, no backup, no problem!"
10049130-116 = "As long as there's no alligators."
10049130-121 = "...Whyyy are you shaking?"
10049130-122 = "C-C-C-C-Captain? We've got a problem, then."
10049130-123 = "Hm?"
10049130-125 = "This... This is the gator enclosure...!"
10049130-129 = "Ah. Right, they do have actual gators in a zoo..."
10049130-130 = "Of course they do."
10049130-134 = "*deep breath* Aaahhh!!"

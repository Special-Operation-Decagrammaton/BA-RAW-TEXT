[translation]
10049130-1 = "後日談;頭盔團藍調 "
10049130-2 = "[log]5天前[/log]"
10049130-4 = "那麼，我再整理一次。"
10049130-5 = "我們這個週末要去「Borderlands遊樂園」，把某個詐騙商人抓起來交出去。"
10049130-6 = "不管要扁他一頓還是怎樣都好，只要把人帶回來就行了。#n有問題嗎？"
10049130-7 = "我有問題，隊長！"
10049130-8 = "小子，很有幹勁嘛！很好！"
10049130-9 = "入場費該怎麼辦呢？#n我們得進到遊樂園裡才抓得到人吧。"
10049130-10 = "門票感覺就很貴……從我們錢包的情況來看，八成連最便宜的票都買不起。"
10049130-11 = "就算狂刷自動販賣機也湊不出來啦，隊長。"
10049130-12 = "到那邊也不能買吃的喝的，這樣只會更心酸耶……"
10049130-13 = "而且像我們這麼小的組織，要怎麼在那麼大的遊樂園裡找人啊？"
10049130-14 = "嗚嗚……"
10049130-15 = "嗚……"
10049130-16 = "哼。"
10049130-20 = "哼哼哼……哈哈哈哈！！"
10049130-21 = "這次的委託可不一樣哦！"
10049130-22 = "委託人連門票都幫我們準備好了！"
10049130-23 = "而且！跟我們結成姐妹團的其他頭盔團也會派支援過來！"
10049130-24 = "隊，隊長！！"
10049130-25 = "真的嗎！？你真的接到了這麼好的委託哦！？"
10049130-26 = "我們總不能一直做那些窮酸又惹人嫌的差事嘛！"
10049130-27 = "還有，聽完可別嚇到哦！"
10049130-28 = "門票還是無限暢遊券！"
10049130-29 = "無限暢遊券！！！"
10049130-30 = "所以裡面的所有設施都能玩嗎！？一整天都是！？"
10049130-31 = "甚至還是更貴的週末票哦！"
10049130-32 = "隊長！我就知道你最棒了！"
10049130-33 = "既能免費入場，又有充足的支援……要是失敗反而才奇怪吧！"
10049130-34 = "看來得提前抵達，一開門就進場才行！"
10049130-35 = "畢竟不知道目標什麼時候會出現嘛！"
10049130-36 = "還得帶便當過去！因為搞不好要待上一整天！"
10049130-37 = "為了尋找線索，還要拍很多照片！"
10049130-38 = "嘿嘿──！"
10049130-39 = "小子們！可別只想著玩啊！#n這次的任務一定要成功！"
10049130-40 = "只要把人乾淨俐落地抓回來，當天晚上就用獎金來開燒肉派對！"
10049130-41 = "好耶！！！"
10049130-42 = "隊長最棒了！！"
10049130-45 = "唔嗯……"
10049130-46 = "嗯……？"
10049130-47 = "隊長，已經開始入場了哦？"
10049130-48 = "我們為什麼不進去？"
10049130-49 = "要是再晚一點的話，熱門設施就會開始排隊了耶……"
10049130-50 = "那群說要來支援的傢伙還沒到。"
10049130-51 = "我們所有的門票都在他們手上啊！"
10049130-52 = "會，會不會是被背叛了！？"
10049130-53 = "背叛！？為什麼？#n我們之間又沒有金錢往來……難道是想把委託搶走嗎？"
10049130-54 = "我打個電話給他們。#n要是真的敢背叛的話，到時候一個都別想逃！"
10049130-55 = "是，隊長！！把他們全都打扁吧！！"
10049130-61 = "喂！！你們到底在不在路上啊！？"
10049130-62 = "要是背叛的話──"
10049130-63 = "抱，抱歉！！現在有點忙！！#n我們本來真的已經在路上……！！"
10049130-64 = "結果全都被打倒了！！"
10049130-65 = "什麼！？在哪裡？#n難道目標先動手了嗎！？"
10049130-66 = "在列車！列車上啦！！#n乘務員在途中突然──"
10049130-67 = "乘，乘務員發瘋啦──！！！"
10049130-68 = "住，住手啊！！"
10049130-69 = "──免談！！"
10049130-70 = "妨礙鐵路運行的乘客，我們一個也不會放過！！"
10049130-71 = "哇啊啊──！！"
10049130-78 = "隊，隊長！？他怎麼說……？"
10049130-79 = "是被襲擊了嗎？#n支援呢……？我們的票怎麼辦？"
10049130-80 = "好像是在搭列車過來的途中，被發瘋的乘務員攻擊了……"
10049130-81 = "啊？"
10049130-82 = "為什麼？"
10049130-83 = "你問我我問誰啊……"
10049130-84 = "難道說……真的被背叛了嗎……？"
10049130-86 = "隊長？你要去哪裡？"
10049130-87 = "委託怎麼辦？入口在那邊才對吧？"
10049130-89 = "哈啊，哈啊……#n我剛才看了看地圖，發現這間遊樂園裡有動物園。"
10049130-90 = "動物園主要都在防止動物跑出去，所以對外人闖入的警戒很鬆散。"
10049130-91 = "再加上動物經常動不動就觸發警報器，因此很多地方都會乾脆把電源關掉。"
10049130-92 = "根據我剛才的調查，動物園正好因為設施維修而暫時關閉。"
10049130-93 = "剛好適合讓我們偷溜進去。"
10049130-94 = "哇……隊長是怎麼知道這些的啊？"
10049130-95 = "隊長他可不像我們，是因為討厭讀書才逃走的哦！"
10049130-96 = "對吧，隊長！我聽說你以前成績很好耶！"
10049130-97 = "少囉嗦。我又不是自願去那所學園的。"
10049130-98 = "雖然有想過要勉強撐下去，但我實在忍受不了那種快被悶死的感覺。"
10049130-99 = "呿，不過至少參加過一次「狂歡節」再退學的話，說不定會是更好的選擇。"
10049130-100 = "我每次聽到這個話題都覺得很神奇。"
10049130-101 = "有意見嗎！？"
10049130-103 = "算了，先不說這些了！#n這裡看起來不錯。"
10049130-104 = "我們只是因為票「剛好不在我們身上」才會出此下策，這樣應該不算非法入侵吧！"
10049130-106 = "有，有道理耶。#n畢竟我們確實有票……？"
10049130-107 = "隊長真的好聰明哦。"
10049130-108 = "少在那邊拍馬屁！快點翻牆啦！"
10049130-111 = "果然沒有警報器呢！"
10049130-112 = "這裡佈置得就像野外一樣呢。"
10049130-113 = "嗯？野外？"
10049130-114 = "好，就這樣往遊樂園的方向走吧！"
10049130-115 = "就算沒有支援跟票也能做到，你們說對吧？"
10049130-116 = "除非遇到鱷魚之類的，不然不用擔心啦！"
10049130-121 = "你們怎麼了？為什麼要突然停下來啊？"
10049130-122 = "隊，隊，隊，隊長，現在好像需要擔心了耶。"
10049130-123 = "嗯？"
10049130-125 = "這裡……是鱷魚池啊……！"
10049130-129 = "啊。動物園本來就會有真的鱷魚……"
10049130-130 = "這……也是理所當然的嘛！"
10049130-134 = "哇啊啊啊啊！！！"

[translation]
1001706-1 = "The Snowfield Assassin"
1001706-2 = "Red Winter Academy Playing Field"
1001706-3 = "*wham*"
1001706-4 = "I received a text from Cherino and headed to Red Winter Academy. When I got there, I immediately got hit in the back by a snowball."
1001706-5 = "Hahaha! You were caught off guard, Comrade!"
1001706-6 = "The world of snowball fights is cruel! If you walk around the snowfield with your guard down like that, you're getting soaked before you even hit the ground!"
1001706-7 = "Any snow-covered area should be considered a battlefield! Hahaha!"
1001706-8 = "So, what should we play now?"
1001706-9 = "[s1] \"Let's have a snowball fight.\"\n[s2] \"Let's make a snowman.\""
1001706-10 = "Heehee... Did you just challenge me, the Snowfield Assassin, to a snowball fight?"
1001706-11 = "What a reckless choice, Comrade! First, let's warm up by making a snowman."
1001706-12 = "That's a good idea, Comrade!"
1001706-13 = "We'll make the coolest snowman around...one that everyone at Red Winter Academy can't help but admire!"
1001706-14 = "Come on, let's compete to see who makes the coolest snowman!"
1001706-18 = "― A mustachioed snowman![wa:440] "
1001706-20 = "― Even bigger, making it the biggest in the world! Comrade![wa:1440] "
1001706-23 = "― Ouch![wa:80] "
1001706-26 = "― Gah! An attack?[wa:690] "
1001706-28 = "― Very well. Challenge accepted, Comrade![wa:1810] "
1001706-31 = "― Heeheehee.[wa:290] "
1001706-34 = "― That won't be enough.[wa:730] "
1001706-36 = "― A little bigger. Gotta make it bigger.[wa:290] "
1001706-39 = "― Ah... Ah... Achoo! *sniffle*[wa:3790] "
1001706-42 = "― Bah, don't bother me! Can't you see I'm on high alert right now?[wa:630] "
1001706-45 = "― Am I cold? You are the one with the frail body, Comrade![wa:2310] "
1001706-48 = "― This is nothing![wa:820] "
1001706-50 = "― I could play for another three hours![wa:100] "
1001706-53 = "― I got an idea, Comrade.[wa:730] "
1001706-55 = "―You go build a snowman there![wa:350] "
1001706-58 = "― We'll put what we made here,"
1001706-60 = "― next to it!"
1001706-63 = "― Hmm? Why? Isn't it okay?[wa:1660] "
1001706-66 = "― Should we[wa:240] "
1001706-68 = "― build a small snowman between those two?[wa:80] "
1001706-71 = "― Ah! B-But[wa:740] "
1001706-73 = "― only if you're okay with it, Comrade![wa:10] "
1001706-76 = "All done! Look at this, Comrade. My snowman is finished!"
1001706-77 = "Including the exquisite angular mustache, the level of polish on my snowman is quite high, if I do say so myself. I'm very satisfied!"
1001706-78 = "How is your snowman looking, Comrade?"
1001706-79 = "Show me. Wh-Where...?"
1001706-82 = "Whoa!"
1001706-87 = "What are you doing, suddenly throwing a snowball like that?"
1001706-88 = "What? The world of snowball fights is cruel?"
1001706-89 = "Heeheehee..."
1001706-91 = "You started a snowball fight while my guard was down. I'm impressed!"
1001706-92 = "I won't go easy on you this time, Comrade!"
1001706-94 = "Afterwards, Cherino and I had a fun snowball fight."

[translation]
1001706-1 = "นักลอบฆ่าแห่งทุ่งหิมะ"
1001706-2 = "สนามกีฬาในสหภาพเรดวินเทอร์"
1001706-3 = "ตุบ!"
1001706-4 = "(ทันทีที่มาถึงสหภาพเรดวินเทอร์หลังจากได้รับข้อความจากเชริโน่ คุณครูก็ถูกบอลหิมะลอยมากระแทก#nด้านหลัง)"
1001706-5 = "ฮ่าฮ่า ประมาทจริงๆ เลยนะสหาย! สหาย!"
1001706-6 = "นี่คือโลกของการปาหิมะอันเหี้ยมโหด! หากเดินบนทุ่งหิมะด้วยความประมาทละก็ ชุดอาจจะเปียกไป#nหมดก่อนจะรู้ตัวด้วยซ้ำ!"
1001706-7 = "สหายควรคิดว่าทุกที่ที่มีหิมะปกคลุมเป็นสนามรบนะ! ฮ่าฮ่าฮ่า!"
1001706-8 = "เอาละ แล้วตอนนี้เราจะเล่นอะไรกันดี?"
1001706-9 = "[s1] \"มาเล่นปาหิมะกัน\"\n[s2] \"มาปั้นตุ๊กตาหิมะกัน\""
1001706-10 = "ฮุฮุ คิดว่าจะเล่นปาหิมะชนะเราที่ได้ชื่อว่า <นักลอบฆ่าแห่งทุ่งหิมะ> ได้งั้นรึ?"
1001706-11 = "ช่างบุ่มบ่ามจริงๆ สหาย! ก่อนอื่นมาปั้นตุ๊กตาหิมะ แล้ววอร์มร่างกายกันก่อนแล้วกัน"
1001706-12 = "เป็นความคิดที่ดีมากสหาย!"
1001706-13 = "เราจะปั้นตุ๊กตาหิมะที่ยิ่งใหญ่สุดยอด จนทุกคนในสหภาพเรดวินเทอร์อดชื่นชมไม่ได้ขึ้นมากัน!"
1001706-14 = "เอาล่ะ มาแข่งกันดีกว่าใครจะปั้นตุ๊กตาหิมะได้ดีกว่ากัน!"
1001706-18 = "― ตุ๊กตาหิมะมีหนวด![wa:640] "
1001706-20 = "― ต้องใหญ่กว่านี้! เราจะสร้างตุ๊กตาหิมะที่ใหญ่ที่สุดในโลกให้ดู! สหาย![wa:1040] "
1001706-23 = "― อ๊า![wa:120] "
1001706-26 = "― อึก บุกโจมตีเรอะ?[wa:610] "
1001706-28 = "― ได้เลย เรารับคำท้า! สหาย![wa:2370] "
1001706-31 = "― ฮะฮ่าฮ่า[wa:370] "
1001706-34 = "― แค่นั้นยังไม่พอหรอกนะ[wa:730] "
1001706-36 = "― ต้องใหญ่กว่านี้อีก ต้องจัดใหญ่จัดเต็มกว่านี้[wa:50] "
1001706-39 = "― ฮะ ฮะ... ฮัดชิ้ว! ...งื้อออ[wa:3830] "
1001706-42 = "― เฮ้ อย่ามาขัดขวางนะ! ตอนนี้เรากำลังตั้งใจอยู่![wa:1350] "
1001706-45 = "― เราหนาวรึเปล่าน่ะเหรอ? ร่างกายปวกเปียกซะจริงเลยนะ สหาย![wa:2350] "
1001706-48 = "― แค่นี้น่ะ ไม่เท่าไรหรอก![wa:500] "
1001706-50 = "― เรายังเล่นต่อได้อีกสามชั่วโมงเลยละ![wa:180] "
1001706-53 = "― เรามีความคิดดีๆ แล้วละ[wa:770] "
1001706-55 = "― สหายไปปั้นตุ๊กตาหิมะตรงนั้นสิ![wa:270] "
1001706-58 = "― แล้วเอาอันที่พวกเราทำตรงนี้"
1001706-60 = "― ไปวางไว้ข้างๆ นั้น!"
1001706-63 = "― หืม? ทำไมล่ะ? ไม่โอเคเหรอ?[wa:1580] "
1001706-66 = "― ...ตรงระหว่างสองตัวนั้น[wa:10] "
1001706-68 = "― เราปั้นตุ๊กตาหิมะตัวเล็กๆ ขึ้นมาอีกตัวดีมั้ย?[wa:10] "
1001706-71 = "― อ๊ะ! ... ดะได้อยู่แล้ว[wa:220] "
1001706-73 = "― ถ้าสหายโอเคก็ไม่มีปัญหา![wa:10] "
1001706-76 = "สมบูรณ์แบบ! สหายดูนี่สิ ตุ๊กตาหิมะของเรายอดเยี่ยมไปเลย!"
1001706-77 = "สิ่งที่เราสร้างนี่สมบูรณ์แบบมาก เก็บรายละเอียดได้ดีมากถึงขั้นมีหนวดด้วย เราพอใจสุดๆ เลยละ!"
1001706-78 = "สหาย เกิดอะไรขึ้นกับตุ๊กตาหิมะของสหายน่ะ?"
1001706-79 = "ขอดูหน่อย ไหน ไหนดูซิ..."
1001706-82 = "อ๊ะ!"
1001706-87 = "สหายทำอะไรน่ะ จู่ๆ ก็ปาหิมะใส่เราแบบนี้ได้ยังไง!"
1001706-88 = "อะไรนะ? นี่คือโลกของการปาหิมะอันเหี้ยมโหดงั้นเหรอ! "
1001706-89 = "ฮุฮุฮุ..."
1001706-91 = "สหายเริ่มการปาหิมะขณะที่เราไม่ระวังตัวอย่างนั้นเหรอ ใช้ได้เลยนี่ เราประทับใจมาก!"
1001706-92 = "ครั้งนี้เราจะไม่อ่อนข้อให้แล้วนะ สหาย!"
1001706-94 = "(จากนั้นคุณครูกับเชริโน่ก็ใช้เวลาเล่นปาหิมะด้วยกันอย่างสนุกสนาน)"

1001706-1 = "#Title;설원의 암살자"
1001706-2 = "#place;붉은겨울 학원 운동장"
1001706-3 = "#na;퍽!\n#bgshake"
1001706-4 = "#na;(체리노의 문자를 받고 붉은겨울 학원에 도착하자마자 뒤에서 날아온 눈덩이에 뒤통수를 맞았다.)"
1001706-5 = "3;체리노;03;하하하, 방심했구나. 콤라드!\n#3;em;[재잘]\n#3;a"
1001706-6 = "3;체리노;01;눈싸움의 세계는 냉혹한 법! 그런 무른 태도로 설원을 거닐었다가는 눈이 그치기도 전에 옷이 모두 젖고 말 거다!"
1001706-7 = "3;체리노;03;눈이 내린 곳은 모두 전장이라고 생각하는 게 좋을 거야, 음하하!\n#3;em;[음표]\n#3;hophop"
1001706-8 = "3;체리노;02;자, 그럼 지금부터 무얼 하고 놀까?"
1001706-9 = "[s1] \"눈싸움을 하자.\"\n[s2] \"눈사람을 만들자.\""
1001706-10 = "3;체리노;99;후후, <설원의 암살자>라는 이명을 갖고 있는 이 몸에게 눈싸움으로 승부를 걸겠다는 건가?\n#3;em;…"
1001706-11 = "3;체리노;01;무모한 선택이로군, 콤라드! 우선은 눈사람이라도 만들면서 몸을 풀도록 하지."
1001706-12 = "3;체리노;01;좋은 생각이다, 콤라드!\n#3;em;[반응]"
1001706-13 = "3;체리노;01;붉은겨울 학원의 모두가 감탄을 금치 못할 정도의 멋진 눈사람을 만드는 것이다!"
1001706-14 = "3;체리노;03;자, 그럼 누가 더 멋진 눈사람을 만드는지 경쟁하는 거다!\n#3;em;[반짝]\n#3;hophop"

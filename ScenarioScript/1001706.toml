[translation]
1001706-1 = "雪原的暗殺者"
1001706-2 = "赤冬聯邦學園．廣場"
1001706-3 = "咚喀！"
1001706-4 = "（收到潔莉諾的訊息後，才剛到赤冬聯邦學園就被不知道從哪飛來的雪球砸到了頭）"
1001706-5 = "哈哈哈，你大意了呢，同志！"
1001706-6 = "雪仗的世界可是很殘酷的！#n用那種渾身破綻的樣子在雪原上走動的話，等到雪停了的時候可是會全身溼透的喔！"
1001706-7 = "既然已經下雪了，還是把這附近都當成戰場比較好喔，哼哈哈哈！"
1001706-8 = "那麼，接下來該玩什麼好呢？"
1001706-9 = "[s1] 「來打雪仗吧。」\n[s2] 「來堆雪人吧。」"
1001706-10 = "哼，你是說要以有著「雪原的暗殺者」的咱為對手，用雪仗一決勝負嗎？"
1001706-11 = "真是有勇無謀的選擇阿，同志！好吧，那麼在那之前，就先堆個雪人當作暖身吧。"
1001706-12 = "好主意，同志！"
1001706-13 = "既然如此咱就要做個讓赤冬聯邦學園所有人都會看到入迷的雪人……！"
1001706-14 = "好，那麼就開始吧！"
1001706-18 = "― 來堆一個有鬍子的雪人吧！[wa:840] "
1001706-20 = "― 讓它成為世界最大的雪人吧，同志！[wa:3080] "
1001706-23 = "― ……痛！？[wa:80] "
1001706-26 = "― 唔，你竟敢這麼做？[wa:930] "
1001706-28 = "― 很好，你的挑戰，咱接受了同志！[wa:2770] "
1001706-31 = "― 啊哈哈哈哈！[wa:450] "
1001706-34 = "― ……嗯，還不夠呢！[wa:1210] "
1001706-36 = "― 再堆得更大更大吧！[wa:1450] "
1001706-39 = "― 哈，哈……哈啾！……嗚。[wa:4430] "
1001706-42 = "― 哎咿， 別在意！咱現在正在集中精神！[wa:2470] "
1001706-45 = "― 你說……會不會冷？你還真弱呢，同志！[wa:3830] "
1001706-48 = "― 對咱來說這種程度不算什麼！[wa:940] "
1001706-50 = "― 咱還可以再玩3小時呢！[wa:1140] "
1001706-53 = "― 咱想到一個好主意，[wa:1290] "
1001706-55 = "― 同志你在那裡堆個雪人吧！[wa:990] "
1001706-58 = "― 然後把咱在這裡做的"
1001706-60 = "― 放在它的旁邊！"
1001706-63 = "― 嗯？你說為什麼？你不覺得很好嗎？[wa:1980] "
1001706-66 = "― ……然後在兩個雪人中間[wa:160] "
1001706-68 = "― 再做個小的雪人吧……[wa:1280] "
1001706-71 = "― 啊，當，當然[wa:860] "
1001706-73 = "― 也要同志你也覺得好才行哦！？[wa:80] "
1001706-76 = "看吧，同志！#n咱這邊的雪人已經完成了！"
1001706-77 = "連鬍子的角度都非常精妙，這個完成度……咱很滿意！"
1001706-78 = "同志你的雪人怎麼樣啊？讓咱看看吧。"
1001706-79 = "咱來看看……"
1001706-82 = "哇！"
1001706-87 = "突然又丟雪球……你是想造反嗎，同志！"
1001706-88 = "什麼？你說雪仗的世界是很冷酷的？"
1001706-89 = "哼哼哼……"
1001706-91 = "沒錯！竟然趁著咱大意的時候開始雪仗，真是個不得了的軍師！"
1001706-92 = "這次咱可不會手下留情囉，同志！"
1001706-94 = "（之後和潔莉諾一起打雪仗，度過了快樂的時光）"

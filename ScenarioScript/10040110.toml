[translation]
10040110-1 = "後日談;終極的飲料"
10040110-2 = "（在千尋、優香和乃愛為了買餅乾暫時離開的時候……）"
10040110-3 = "啊～真好玩。"
10040110-4 = "雖然這個遊戲已經玩了好幾十次，但我每次玩的時候都還是會緊張。#n真不愧是被稱之為經典名作的《毀滅狂戰士》。"
10040110-5 = "雖然我這次的緊張是因為其他原因就是了。"
10040110-6 = "如果千尋前輩以後說想把武器換成散彈槍的話，我們無論如何都得阻止他才行……"
10040110-8 = "哈，哈哈……就跟開車的時候一樣，有些人一玩起遊戲就會完全變了個人。"
10040110-9 = "不知道是不是因為太緊張的關係，我突然覺得口好渴。"
10040110-10 = "晴前輩，我可以喝這瓶「妖怪MAX」嗎？"
10040110-11 = "啊，可以是可以，不過那個是──"
10040110-18 = "……咳咳，咳咳！"
10040110-19 = "這瓶「妖怪MAX」是怎樣！為什麼這麼酸啊！難道是壞掉了嗎？"
10040110-20 = "……所以我本來才正要警告你的。#n那是這次新推出的酸梅口味「妖怪MAX」。"
10040110-21 = "酸梅口味！？"
10040110-23 = "「妖怪MAX」還真的是什麼口味都有呢。#n我記得他們上個月推出紅豆湯口味的時候，也在社群媒體上引發了不小的話題。"
10040110-25 = "雖然這個味道喝起來有點可怕，不過用來提神倒是挺有效的。#n這股酸味能讓人一下子就清醒過來。"
10040110-26 = "嗚嗚，不知道是不是因為酸梅味的關係，我現在突然有點想吃白飯。"
10040110-27 = "或者喝一口用米釀成的甜米釀──"
10040110-32 = "……前輩，我突然想到了一件事。"
10040110-33 = "如果我們把甜米釀加進這瓶酸梅口味的「妖怪MAX」裡，#n喝起來會不會像是在吃白飯配酸梅一樣啊？"
10040110-35 = "並不會。"
10040110-36 = "我覺得喝起來肯定不會是那個味道……"
10040110-38 = "可是有時候把兩種不同味道的食物搭配在一起吃，不是會迸出截然不同的滋味嗎？"
10040110-39 = "說不定這兩種飲料混在一起會發生加乘效應，變得更加好喝──"
10040110-43 = "呵呵，這個主意聽起來還挺有趣的呢。"
10040110-44 = "嚇，嚇我一跳！你什麼時候醒來的？"
10040110-45 = "大概是從你們用電視玩《毀滅狂戰士》的時候開始吧……？"
10040110-46 = "不過我總覺得電視機前散發著一股殺氣，所以才一直在裝睡。"
10040110-48 = "……副部長玩《毀滅狂戰士》的氣勢確實不是蓋的。"
10040110-49 = "話說回來，把甜米釀加進酸梅口味的「妖怪MAX」這個點子，感覺挺有趣的嘛？"
10040110-50 = "正好這裡有各式各樣的飲料，我們就連其他的飲料也一起測試看看吧！"
10040110-51 = "你說有趣……難道你之前也做過這種事嗎？"
10040110-52 = "雖然沒有試過甜米釀加酸梅的組合，不過我之前有用研討會冰箱裡的飲料測試過。"
10040110-53 = "網路上不是有這種說法嗎？#n只要把查巴斯科辣椒醬加進蕃茄汁裡，就能還原出披薩的味道……#n或者是把醬油加進牛奶裡，喝起來就會像米餅一樣──"
10040110-54 = "嘔嘔……你做這種事有得到其他研討會成員的允許嗎？"
10040110-58 = "……嗯？這種事怎麼可能得到允許？"
10040110-59 = "……什麼？"
10040110-61 = "有句話說的好──如果凡事都必須先得到允許，人們只會一事無成！#n先執行再乞求原諒，比事先得到允許容易太多了！"
10040110-63 = "他的思考邏輯還真前衛……"
10040110-64 = "突然可以體會優香有多辛苦了。"
10040110-66 = "話說你後來有得到原諒嗎？"
10040110-67 = "唉……那次我乞求原諒的對象不太好說話……"
10040110-68 = "我想也是……"
10040110-69 = "總之，這還是我第一次拿妖怪MAX來做實驗，真讓人期待呢。"
10040110-70 = "來吧，各位。#n在那些煩人的前輩回來之前，我們趕快來做實驗吧！"
10040110-71 = "不過我們擅自把飲料拿來做實驗好嗎？#n要是被千尋前輩發現的話，說不定會罵我們浪費食物……"
10040110-72 = "……哦？"
10040110-73 = "真意外。貝里塔斯的駭客們平時不是最愛鑽研學問、探究真理了嗎？#n怎麼現在卻只因為害怕被前輩罵，就不敢探索全新的可能性了呢？"
10040110-74 = "難道──"
10040110-78 = "……你們是怕了嗎？"
10040110-80 = "你，你說誰怕了啊！？"
10040110-81 = "聽你這麼一說，我的勝負欲突然湧了上來……"
10040110-82 = "看來傳聞說得沒錯，這個研討會裡年紀最小的成員真的很會挑釁人。"
10040110-83 = "你以為這樣說我們就會怕了嗎？#n我正好也想立刻實驗看看呢。"
10040110-84 = "像這樣把酸梅口味的「妖怪MAX」和甜米釀飲料，以一比一的比例混合──"
10040110-88 = "……雖然現在說有點晚了，不過這個視覺效果還真不是蓋的。"
10040110-89 = "不要說什麼「有點晚了」好不好……"
10040110-91 = "嗯……因為飲料混合後散發著美麗的粉紅色，完全不會讓人覺得這是黑暗飲料呢。"
10040110-92 = "所以味道真的有像在吃白飯配酸梅的感覺嗎？"
10040110-99 = "……沒有。"
10040110-100 = "甜甜的飯香搭配上酸梅的酸味……"
10040110-101 = "我覺得比較像是用已經放到酸掉的白飯製成的甜米釀。"
10040110-103 = "果然失敗了嗎？"
10040110-104 = "畢竟也不是把亂七八糟的聲音混合在一起，就都能變成美妙的和音。"
10040110-106 = "啊，話說回來～#n聽說只要在牛奶裡加入帶有酸味的飲料，就會變得跟優格很像哦～"
10040110-107 = "如果拿這瓶已經用甜米釀稀釋過的酸梅飲料跟牛奶混在一起，#n說不定就能迸出全新的優格滋味……？"
10040110-108 = "那怎麼可能呢。#n用來製作優格的是特別的食用醋──"
10040110-113 = "真紀，你該不會……"
10040110-114 = "呵呵，反正都已經動手了，再多實驗幾次也無所謂吧？"
10040110-115 = "好，我們就把曾經好奇過的飲料都拿來實驗看看吧！"
10040110-117 = "GO！"
10040110-125 = "唔……"
10040110-126 = "唔嗯……"
10040110-127 = "真奇怪，我們明明沒有加任何辛香料……"
10040110-128 = "為什麼會散發出這種直衝腦門的刺激味道──"
10040110-129 = "而且飲料的顏色還變成了詭異的深紫色。#n我覺得這東西只要喝一口，就足以把胃給搞壞了。"
10040110-130 = "味道怎麼樣先不說，要是千尋前輩發現這東西的話，可不是挨罵就能解決的。"
10040110-131 = "如果千尋前輩知道我們把帶來的飲料都拿去做實驗──"
10040110-132 = "……你說你們把飲料都拿去做什麼了？"
10040110-138 = "千，千尋前輩？#n你什麼時候回來的？"
10040110-139 = "就在剛才。#n話說我好像聽到了一些奇怪的話。"
10040110-140 = "還有，這個容器裡面裝的奇怪飲料又是什麼？"
10040110-141 = "這，這個是……"
10040110-142 = "對，對了！是小雪醬說如果把各式各樣的飲料混合在一起，就能創造出全新的風味！"
10040110-144 = "……啊啊啊啊啊？#n你竟然在這種時候背叛我！？"
10040110-146 = "小～雪～？#n我們才去一趟便利商店而已，你竟然又闖禍了……"
10040110-147 = "這次一定要好好教訓你！"
10040110-149 = "事，事情不是你們想的那樣……！！"
10040110-151 = "嗚啊啊啊啊啊──！！！"

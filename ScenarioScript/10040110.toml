[translation]
10040110-1 = "Afterword;The Ultimate Drink"
10040110-2 = "While Chihiro, Yuuka, and Noa left to go buy snacks..."
10040110-3 = "Wow, that was fun!"
10040110-4 = "\"BOOM\" really is a masterpiece. I've played this game dozens of times, but it's still such a fresh experience every time."
10040110-5 = "Although the source of its intensity was entirely different this time..."
10040110-6 = "If Chihiro ever wants to change her firearm to a shotgun, we have to do whatever it takes to stop her..."
10040110-8 = "Aha...haha... I guess some people's personalities change when they play video games, you know, like how people get road rage."
10040110-9 = "All that tension made me really thirsty!"
10040110-10 = "Hey, Hare! Can I have this Frenzy MAX?"
10040110-11 = "It doesn't matter to me, but that's—"
10040110-18 = "...*cough* *cough*"
10040110-19 = "What the heck is this? It's so sour! Is it expired or something?!"
10040110-20 = "I was trying to warn you. That's the newly released Frenzy MAX flavor, umeboshi."
10040110-21 = "Umeboshi?!"
10040110-23 = "Frenzy MAX comes in a very diverse range of flavors. It was all over social media when they released their red bean porridge flavor last month."
10040110-25 = "The taste is kinda hard to get around, but it helps wake me up. The sour taste really gives me a buzz."
10040110-26 = "Blegh. It's making me crave a bowl of rice..."
10040110-27 = "...or, like, some gamju made of rice..."
10040110-32 = "Hey, Kotama, Hare. I just had an idea."
10040110-33 = "If you mix this umeboshi Frenzy MAX with some gamju, wouldn't it be like eating umeboshi with white rice?"
10040110-35 = "No."
10040110-36 = "I believe it'd have a completely different taste..."
10040110-38 = "But that's how new flavors are made, right? Mixing two different flavors could create an entirely new one!"
10040110-39 = "We could uncover a surprising synergy and make a super-yummy drink!"
10040110-43 = "Fufufu. I like that idea."
10040110-44 = "Gah! You scared me! How long have you been awake for?!"
10040110-45 = "Since you guys started playing BOOM?"
10040110-46 = "I sensed danger coming from the TV area, so I pretended to still be asleep..."
10040110-48 = "...The vice president did reveal a certain charisma while she was playing."
10040110-49 = "Anyways, I wanna help with mixing the umeboshi Frenzy MAX with gamju!"
10040110-50 = "In fact, we've got lots of drinks, so we should try all kinds of combinations!"
10040110-51 = "That sounds fun to you? Are you a secret mixologist or something?"
10040110-52 = "I've experimented with random drinks in Seminar's refrigerator before! But I've never done umeboshi and gamju!"
10040110-53 = "They say that kinda stuff online, right? Sprinkle tabasco sauce on tomato juice to make it taste like pizza! Or mix soy sauce into milk to make it taste like rice crackers—"
10040110-54 = "Blegh... Did you get permission from the Seminar staff to do that?"
10040110-58 = "...Huh? Obviously they'd never, ever approve!"
10040110-59 = "...What?"
10040110-61 = "If you try to seek permission for every single thing you do, then you'll never get to do anything! Always ask for forgiveness, not permission!"
10040110-63 = "...What an incredible mindset."
10040110-64 = "All of Yuuka's hardships are flashing before my eyes..."
10040110-66 = "So, did you get forgiveness?"
10040110-67 = "Ah... Well, the person I needed the forgiveness from wasn't very nice about it..."
10040110-68 = "I can believe that..."
10040110-69 = "Anyways! I've never had the chance to experiment with Frenzy MAX, so let's get to it!"
10040110-70 = "We need to do it before those nagging upperclassmen come back!"
10040110-71 = "Are we sure this is okay? Chihiro'll totally yell at us for wasting food if she finds out."
10040110-72 = "...Huuuuuuh?"
10040110-73 = "Now THIS I didn't expect. The hackers of Veritas, who explore academia and seek truth, are hesitating on the brink of fresh innovation because of the possibility of some...nagging?"
10040110-74 = "I hate to ask this, but are you..."
10040110-78 = "...scared?"
10040110-80 = "Wh-Who said I was scared?!"
10040110-81 = "You're really triggering my competitiveness..."
10040110-82 = "As rumored, the youngest member of Seminar has an exceptional talent for provoking people."
10040110-83 = "I'm not scared at all! I was gonna do it anyway!"
10040110-84 = "If I mix the umeboshi Frenzy MAX with a gamju drink at a 1:1 ratio..."
10040110-88 = "...I hate to say this when we've come this far, but that looks weird."
10040110-89 = "Please don't say that."
10040110-91 = "Hm. Well, it came out to a somewhat pleasant shade of pink, so it may not be as bad as I originally thought."
10040110-92 = "The next step. What does it taste like? Does it fulfill the criteria of \"eating umeboshi on rice\"?"
10040110-99 = "...Not at all."
10040110-100 = "The sweet taste of rice is enhanced by the sour taste of umeboshi..."
10040110-101 = "It feels like drinking a sweet rice drink...but it was made from sour, expired rice."
10040110-103 = "So, a failure?"
10040110-104 = "Like a medley of sounds that come together into a discordant harmony."
10040110-106 = "Ah, ah! Also, I've heard that if you mix a sour drink with milk, it tastes like yogurt!"
10040110-107 = "So maybe if we neutralize the umeboshi with milk, and then mix it with gamju, it'll be a never-before-tasted flavor of yogurt!"
10040110-108 = "That's impossible. They use a different type of vinegar when they make yogur—"
10040110-113 = "Maki, are you...?"
10040110-114 = "Fufu. We've come this far, haven't we? What difference does it make if we experiment a tiiiiny bit more?"
10040110-115 = "Then! Let us mix! Mix all the drinks we can think of and experiment!"
10040110-117 = "GOOO!!"
10040110-125 = "Hm."
10040110-126 = "Um..."
10040110-127 = "That's weird. We didn't mix in anything spicy..."
10040110-128 = "But there's this...smell that's making my nose all prickly."
10040110-129 = "And look at the color. It's like this dark purple worm wriggling around. I'm scared to put that in my tummy."
10040110-130 = "Even if it's the most delicious thing in the world, Chihiro's gonna freak if she sees this."
10040110-131 = "If she finds out we used up half the drinks on experiments..."
10040110-132 = "...You used half the drinks on what, now?"
10040110-138 = "Ch-Ch-Chihiro?! Wh-When'd you get back?"
10040110-139 = "Just now. More importantly, did I not just hear you saying something strange?"
10040110-140 = "And what is this suspicious juice in this container?"
10040110-141 = "S-So, that's..."
10040110-142 = "K-Koyuki! Koyuki made me mix all the different types of drinks! She said it would taste good!"
10040110-144 = "HUH?! T-Traitor!"
10040110-146 = "Koyukiii? Did you really manage to cause trouble in the time we went to the convenience store?"
10040110-147 = "I'm seriously not letting you off easy this time!"
10040110-149 = "N-Nooo! It's not like that! Please...!"
10040110-151 = "WAAAHHH!!"

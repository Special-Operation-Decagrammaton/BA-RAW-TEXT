[translation]
10012015-2 = "โอ๊ยยย... โอ๊ย! เกือบได้แผลแล้ว..."
10012015-3 = "ทุกคนเป็นไงบ้าง? ไม่บาดเจ็บตรงไหนกันใช่ไหม?"
10012015-4 = "อืม อายาเนะก็ปลอดภัย..."
10012015-5 = "ขะ... ขอบคุณนะคะ รุ่นพี่ชิโรโกะ"
10012015-6 = "คะ... คุณครูล่ะ...?! คุณครูเป็นอะไรไหม!?"
10012015-12 = "ไม่ต้องเป็นห่วงหรอกค่ะ~ ทุกคนปลอดภัยดี"
10012015-13 = "อ่า~ ปลุกกันได้น่าประทับใจมากเลยละ แต่ไม่ต้องทำถึงขนาดนี้ลุงก็ตื่นได้นะ..."
10012015-14 = "รุ่นพี่โนโนมิ! รุ่นพี่โฮชิโนะ!"
10012015-15 = "[s1] \"ที่ครูปลอดภัยเพราะได้โนโนมิช่วยเอาไว้เลย ขอบใจนะ\"\n[s2] \"เป็นห่วงครูเหรอเซริกะ?\""
10012015-16 = "ฮิฮิ ไม่เป็นไรเลยค่ะ"
10012015-17 = "วะ.. ว่าไงนะ?! คะ... ใครเป็นห่วงกันล่ะ!? ก็แค่ถามเป็นมารยาทแค่นั้นเอง!"
10012015-18 = "โชคดีที่ทุกคนปลอดภัยดีนะ ถ้าใครบาดเจ็บขึ้นมาละก็ ลุงเสียใจแน่~"
10012015-20 = "โชคดีที่ชุดว่ายน้ำไม่ได้เสียหายตรงไหน แบบนี้ก็ไม่มีปัญหา"
10012015-21 = "มันใช่เวลามาห่วงเรื่องอะไรแบบนี้อยู่รึไงน่ะ!?"
10012015-22 = "มะ... ไม่สิ... ฉันไม่มีชุดอื่นมาเผื่อเหมือนกัน ถ้ามันขาดขึ้นมาก็คงจะแย่เลยละ..."
10012015-23 = "[s3] \"ดีแล้วที่ชุดว่ายน้ำที่เตรียมมาไม่สกปรก\"\n[s4] \"ดีแล้วที่ไม่บาดเจ็บตรงไหน\""
10012015-24 = "จริงเหรอ...?"
10012015-25 = "จริงเหรอ...?"
10012015-26 = "จะ... จริงสิ! ก็บอกว่าอย่าพูดอย่างนี้ไงล่ะ มันยิ่งกวนใจฉันกว่าเดิมอีก!"
10012015-32 = "[ns] \"...... อายาเนะ?\""
10012015-33 = "คะ... คะ!? มะ... ไม่มีอะไรค่ะ! ไม่มีอะไรเลยค่ะ แหะๆๆ..."
10012015-34 = "ยะ... ยังไงเราก็มาถึงเกาะที่เป็นจุดหมายของเราแล้วค่ะ แล้วก็ไม่มีใครบาดเจ็บ..."
10012015-35 = "แต่เฮลิคอปเตอร์มัน... กลายเป็นแบบนั้นไปแล้ว..."
10012015-36 = "อืม.... ดูจากสภาพความเสียหายแล้ว คงจะใช้งานไม่ได้ไปอีกสักพักเลยละ..."
10012015-37 = "ถึงจะยังพอซ่อมได้อยู่... แต่ก็ต้องใช้เวลาหน่อย"
10012015-38 = "ขอโทษนะคะ ถ้าฉันควบคุมมันได้ดีกว่านี้ละก็... นี่อุตส่าห์เป็นของใช้ที่พวกเราเพิ่งมีทั้งที..."
10012015-40 = "... อะไรกัน!?  พูดอะไรของเธอ!? ทำไมอายาเนะถึงต้องขอโทษล่ะ? นี่ไม่เห็นจะเกี่ยวกับการขับขี่เลย?"
10012015-41 = "จำเหตุการณ์ก่อนเครื่องตกไม่ได้เหรอ? อยู่ๆ ก็ดังปึ้ง! แล้วเสียขึ้นมาแบบนั้น พวกเราจะรับมือยังไงได้ล่ะ?"
10012015-42 = "แถมก่อนเดินทาง อายาเนะก็ไปเช็กสภาพมาตั้งกี่ครั้งแล้ว!"
10012015-43 = "พวกที่ขายให้เราต้องเอาของมีตำหนิมาหลอกขายกันแน่! เราคือผู้เสียหายที่โดนหลอกนะ!"
10012015-44 = "เอ่อ... คือเรื่องนั้น..."
10012015-45 = "[s5] \"เซริกะพูดถูกแล้วละ นี่ไม่ใช้ความผิดอายาเนะหรอก\"\n[s6] \"ก่อนอื่นเราไปรีสอร์ตกันเถอะ มันต้องมีวิธีซ่อมสิ\""
10012015-46 = "คุณครูก็จะช่วยเหรอคะ..."
10012015-47 = "คุณครูก็จะช่วยเหรอคะ..."
10012015-48 = "ระ... เราไปที่นั่นกันก่อนก็น่าจะดีนะคะ... ถ้าไปที่รีสอร์ต... ก็น่าจะหาทางซ่อมได้ค่ะ"
10012015-50 = "อื้ม! ในแผ่นพับเขียนไว้ว่าเป็นรีสอร์ตขนาดใหญ่และร่ำรวยมหาศาลเลยละค่ะ"
10012015-51 = "ถ้าเราขอยืมอะไหล่หรืออุปกรณ์ช่างมาได้ ยังไงก็ซ่อมได้แน่นอนค่ะ"
10012015-52 = "คุณครูจะไม่เป็นไรเหรอ? เมื่อกี้ยังเห็นเดินกะเผลกอยู่เลยนะ..."
10012015-53 = "[s] \"ไม่เป็นไรหรอก ไม่ต้องห่วง\""
10012015-55 = "แหะๆ... ทุกคนโตมาอย่างแข็งแรงและสดใสเลยนะ ลุงคนนี้ปลื้มใจจริงๆ"
10012015-56 = "อืม... ทุกคนกำลังดูฮึกเหิมเลย ขอโทษนะที่ต้องขัดจังหวะแบบนี้..."
10012015-57 = "คือ... รีสอร์ตที่พวกเราพูดถึงกันมาตลอดทางน่ะ..."
10012015-58 = "มันคือ ที่อยู่ตรงโน้น... ใช่ไหมนะ?"
10012015-65 = "อะไรกันเนี่ยยยยยยยยย!?!?"
10012015-66 = "นี่มันอะไรกัน? เรามาถูกที่หรือเปล่า?"
10012015-67 = "ตรงนี้ด้วย..."
10012015-69 = "นี่ก็ด้วย...!!"
10012015-71 = "นี่มันเกาะร้างดีๆ เลยนี่? ไม่มีคนอยู่สักคน!!"
10012015-73 = "เรามาผิดเกาะหรือเปล่า? มันใช่ที่นี่จริงๆ เหรอ?"
10012015-74 = "ไม่สิ... ถ้าดูจากพิกัดก็ถูกแล้ว มันคือที่นี่แหละ"
10012015-75 = "ตะ... แต่ว่าที่นี่มัน... จะให้มองว่าเป็นรีสอร์ตที่เปิดให้บริการอยู่ก็คงยากนะคะ..."
10012015-76 = "นี่มันเหมือนกับ... เอ่อ... มันค่อนข้างจะ..."
10012015-78 = "อ๋อ..."
10012015-79 = "เหอะๆ... งั้นเหรอ? เราโดนหลอกอีกแล้วเหรอ?"
10012015-85 = "อะ... อะไร? อะไรเหรอ?......? อย่าบอกนะว่า... ถ้างั้นก็...!"
10012015-86 = "อืม... เซริกะจัง"
10012015-87 = "ตั๋วใช้งานรีสอร์ตที่ถูกรางวัลมาคงเป็นตั๋วที่ส่งเรามาที่นี่ละ ที่... เกาะร้างนี้"
10012015-88 = "เราโดนหลอกแล้ว ทั้งเฮลิคอปเตอร์ ทั้งรีสอร์ต..."
10012015-89 = "อีกแล้วเหรอ?!"
10012015-90 = "อะไรกัน..."
10012015-91 = "เป็นไปไม่ได้... ฉันอุตส่าห์คิดว่า..."
10012015-92 = "ครั้งนี้เราจะได้โชคช่วยกับเขาบ้าง... อุตส่าห์คิดว่าดวงดีแล้วซะอีก... ทำไมพวกเราต้องโดนหลอก#nแบบนี้ตลอดเลย..."
10012015-93 = "ไม่ยุติธรรมเลย... ใจร้ายเกินไปแล้ว..."
10012015-94 = "เซริกะจัง..."
10012015-96 = "...."
10012015-97 = "... ฮือ ..."
10012015-98 = "[s7] \"ยังเร็วเกินไปที่จะท้อแท้นะ\"\n[s8] \"บางทีจากนี้เราอาจจะโชคดีก็ได้\""
10012015-99 = "คุณครู...?"
10012015-100 = "คุณครู...?"
10012015-101 = "อื้ม! คุณครูพูดถูกแล้วค่ะเซริกะจัง!"
10012015-102 = "ถึงมันจะแตกต่างจากที่คิดเอาไว้ แต่เราก็ได้มาเที่ยวบนเกาะที่ทั้งอากาศดีและมีน้ำใสๆ นี่คะ?"
10012015-103 = "ยังไงเราก็เตรียมอุปกรณ์เล่นสนุกกันมาเองแล้วด้วย จากนี้ก็แค่เพลิดเพลินกับการพักผ่อนก็พอแล้วค่ะ!"
10012015-104 = "อืม อุปกรณ์ทุกชิ้นที่ใส่กล่องมาก็ยังปลอดภัยดี แค่ไปขนออกมาจากเฮลิคอปเตอร์ก็พอ"
10012015-105 = "ถึงที่นี่จะเป็นเกาะร้าง แต่เมื่อกี้ฉันเดินดูและเจอโรงเก็บของกับสิ่งอำนวยความสะดวกอยู่บ้าง..."
10012015-106 = "อย่างน้อยพวกเครื่องใช้ไม้สอยก็ยังอยู่ในสภาพดี เสียตรงแค่สนิมเขรอะและฝุ่นเกาะก็เท่านั้น แต่ถ้าซ่อมและปรับปรุงเอาหน่อยก็น่าจะใช้ได้ดีเลยละ"
10012015-108 = "รุ่นพี่...?"
10012015-109 = "ใช่แล้ว เซริกะจัง... มันยังเร็วเกินไปที่เราจะยอมแพ้!"
10012015-110 = "ยังไงที่นี่ก็ยังเป็นที่พักผ่อนหย่อนใจของเรา..."
10012015-111 = "เพราะทั้งเฮลิคอปเตอร์ ทั้งรีสอร์ต... แค่เราซ่อมแซมก็กลับมาใช้งานได้แล้ว"
10012015-112 = "อืม เรื่องซ่อมแซมอุปกรณ์เป็นงานที่พวกเราทำบ่อยๆ อยู่แล้ว! มาคิดในแง่ดีกันเถอะนะเซริกะจัง!"
10012015-114 = "อืม เรื่องการซ่อมบำรุงและทำความสะอาด อะบิดอสไม่เป็นสองรองใครเลย"
10012015-115 = "อื้ม! คิดในแง่ดี ตอนนี้ทั้งรีสอร์ตและเกาะร้างที่กว้างขวางนี้กลายเป็นของเราแล้วนี่คะ?"
10012015-116 = "ตอนนี้ก็ขึ้นอยู่กับเราแล้วละค่ะว่าจะใช้พื้นที่ให้สนุกกันยังไง!"
10012015-117 = "เรามาทำให้เป็นพักร้อนที่ยอดเยี่ยมอย่างที่อายาเนะจังว่าเถอะค่ะ☆"
10012015-118 = "แหะๆ... รุ่นน้องที่น่ารักของเรา พวกเธอโตขึ้นมากเลยนะ ลุงคนนี้ปลื้มใจจัง"
10012015-120 = "ทุกคน..."
10012015-121 = "[s9] \"ฮุฮุ บอกว่ายังเร็วเกินไปที่จะร้องไห้ไง เซริกะจัง\"\n[s10] \"เรื่องร้องไห้เก็บไว้ทำทีหลังก็ได้\""
10012015-127 = "ระ... ร้องไห้อะไรกันล่ะ! ใครร้องไม่ทราบ!? ดีละ งั้นเราก็มาลุยกันเลย!!"
10012015-128 = "ไหนๆ ก็เป็นอย่างนี้แล้ว มาเล่นสนุกให้พวกที่หลอกเราต้องเสียใจกันไปเลย!!"
10012015-129 = "ฉันไม่มีวันยอมแพ้เด็ดขาด! นี่จะเป็นพักร้อนที่ดีที่สุดของเรา!!"
10012015-132 = "โอ้ววว!!!"

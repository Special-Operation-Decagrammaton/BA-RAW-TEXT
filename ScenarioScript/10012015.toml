[translation]
10012015-2 = "啊痛痛痛……"
10012015-3 = "大家沒事吧？有沒有受傷？"
10012015-4 = "嗯……綾音也沒事。"
10012015-5 = "謝，謝謝你，白子前輩。"
10012015-6 = "老，老師……！？老師沒事嗎！？"
10012015-12 = "嘿咻……大家都沒事唷～"
10012015-13 = "唔嘿～已經到了嗎？叫醒人的方式會不會太粗暴了呀～？"
10012015-14 = "野乃美前輩！星野前輩！"
10012015-15 = "[s1] 「謝謝。多虧大家我沒事唷。」\n[s2] 「謝謝你為我擔心，茜香。」"
10012015-16 = "呵呵，不客氣～"
10012015-17 = "什──！誰，誰擔心你了……！我只是問問而已！"
10012015-18 = "幸好大家都沒事。要是有人受傷的話，大叔我會哭的唷～"
10012015-20 = "……幸好，泳衣也沒事。"
10012015-21 = "這種情況下居然是擔心那個！？"
10012015-22 = " 不，不過也是。#n畢竟沒帶替換的衣物過來，要是破掉的話確實很困擾……"
10012015-23 = "[s3] 「難得的泳衣沒有弄髒真是太好了。」\n[s4] 「沒有受傷真是太好了。」"
10012015-24 = "……真的嗎？"
10012015-25 = "……真的嗎？"
10012015-26 = "真，真是的！馬上就說那種話……"
10012015-32 = "[ns] 「……綾音？」"
10012015-33 = "什，什麼都沒有……！沒有人受傷真是太好了。"
10012015-34 = "總之，抵達目標島嶼了呢。"
10012015-35 = "只是，搭來的直升機……"
10012015-36 = "……嗯。看來暫時沒辦法使用了。"
10012015-37 = "修理的話應該可以動……不過需要一些時間。"
10012015-38 = "對不起。如果我能駕駛得更好的話……"
10012015-40 = "跟駕駛無關，是它突然壞掉了，綾音醬不需要道歉。"
10012015-41 = "在出發前的整備時也檢查了好幾次有沒有異常……"
10012015-42 = "儘管如此還是突然壞掉了……這種事，不是任何人的責任啊！"
10012015-43 = "如果要說誰該負責的話，肯定是賣給我們的人。所以綾音醬不必放在心上。"
10012015-44 = "那，那是……"
10012015-45 = "[s5] 「正如茜香所說，這不是綾音的錯……」\n[s6] 「先去渡假勝地吧。也許會找到修理的辦法也說不定。」"
10012015-46 = "連老師也……非常感謝。"
10012015-47 = "連老師也……非常感謝。"
10012015-48 = "到渡假勝地去……就能找到方法的吧？"
10012015-50 = "嗯嗯！欲速則不達！"
10012015-51 = "根據手冊上所寫的情報，這裡是非常廣闊的渡假勝地。#n也許會有零件和可以整備的人也說不定。"
10012015-52 = "……老師沒事吧？剛才走路搖搖晃晃的……"
10012015-53 = "[s] 「沒事，別擔心。」"
10012015-55 = "……大家都成長得很健壯呢。大叔我很高興唷。"
10012015-56 = "話說回來，不好意思破壞這難得的氣氛……"
10012015-57 = "那個……大家說的「非常廣闊的渡假勝地」是……"
10012015-58 = "指那個嗎……？"
10012015-65 = "那是什麼啊──！？！？！？"
10012015-66 = "這，這是什麼？真的是這裡嗎？"
10012015-67 = "這裡也是……"
10012015-69 = "這裡也是……！！"
10012015-71 = "……全部，都只是廢墟嘛！一個人影都沒有！！"
10012015-73 = "吶，我們是不是來錯島了啊？真的是這裡沒錯嗎？"
10012015-74 = "……不。座標上確實是這裡沒錯。"
10012015-75 = "不，不管怎麼看……都很難認為這裡是營運中的「渡假勝地」呢……"
10012015-76 = "這簡直是……"
10012015-78 = "……啊。"
10012015-79 = "唔嘿～這樣啊，是這麼回事啊。"
10012015-85 = "什，什麼？怎麼了？知道什麼了嗎？"
10012015-86 = "……那個啊，茜香醬。"
10012015-87 = "我們抽中的渡假勝地使用券……指的似乎是這個「土地」的使用權的樣子。"
10012015-88 = "你看，這裡用小小的字寫著……#n「給予持有使用券的人使用渡假勝地的權利。但不保證該地的狀態」……"
10012015-89 = "等一下……這是詐欺吧！？"
10012015-90 = "怎麼會……不敢相信……"
10012015-91 = "即使獎品不是錢也要積極向前……是個好機會要好好放鬆……"
10012015-92 = "明明是這麼想的……為什麼會這樣……"
10012015-93 = "……好不甘心，我們做了什麼嗎……"
10012015-94 = "茜香醬……"
10012015-96 = "…………"
10012015-97 = "……嗚。"
10012015-98 = "[s7] 「……現在放棄還太早了唷。」\n[s8] 「不如說現在才剛開始也說不定。」"
10012015-99 = "……老師？"
10012015-100 = "……老師？"
10012015-101 = "嗯嗯！老師說的沒錯，茜香醬！"
10012015-102 = "雖然和想像中有點不一樣，但來到了空氣和水質都很乾淨的島嶼是事實！"
10012015-103 = "玩耍的器材也都齊全了，就盡情享受假期吧～！"
10012015-104 = "嗯。帶來的器材全都沒事，只要從直升機上拿過來就行了。"
10012015-105 = "還有，剛才確認了倉庫和設備……狀態都很好唷。"
10012015-106 = "只是有點老舊生鏽、積著灰塵而已。保養過的話完全可以使用。"
10012015-108 = "野乃美前輩……白子前輩。"
10012015-109 = "……就是說啊茜香醬。現在放棄還太早了！"
10012015-110 = "這裡是渡假勝地這點並沒有變……"
10012015-111 = "直升機也好，渡假勝地也好，只要我們來修理就行了呀。"
10012015-112 = "反正我們也很習慣修理設備了！樂觀一點吧，茜香醬！"
10012015-114 = "嗯。設備的修理與整備，是我們阿拜多斯高中的拿手絕活。"
10012015-115 = "嗯嗯！這座寬闊的渡假勝地和無人島，全部都是屬於我們的囉！"
10012015-116 = "要怎麼享受，從現在起就由我們來決定！"
10012015-117 = "就像綾音醬說的一樣，只要從現在開始享受最棒的假期就好啦☆"
10012015-118 = "唔嘿……大叔也加油吧～"
10012015-120 = "大家……"
10012015-121 = "[s9] 「要哭的話還太早了，茜香。」\n[s10] 「先嘗試過各種方法後再哭也不遲唷。」"
10012015-127 = "……誰，誰在哭啊！？"
10012015-128 = "……啊啊真是，給我做好覺悟了！！這樣的話我就盡情地玩！！"
10012015-129 = "我絕對不會放棄的！一定要在這裡度過「最棒的假期」！！"
10012015-132 = "喔──！！"

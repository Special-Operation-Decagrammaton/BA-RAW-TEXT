[translation]
10012015-2 = "Ow, ow, ow! That was a close one."
10012015-3 = "Shiroko? Everyone? You all okay?"
10012015-4 = "Fine. I've got Ayane, too."
10012015-5 = "Th-Thank you, Shiroko."
10012015-6 = "What about Sensei?! Is Sensei injured?!"
10012015-12 = "Sensei's fine! Everyone's okay!"
10012015-13 = "What a way to wake me up. Next time, can you just gimme a kiss on the cheek or something?"
10012015-14 = "Nonomi! Hoshino! Thank goodness!"
10012015-15 = "[s1] \"Thanks for the save, Nonomi.\"\n[s2] \"Were you worried about me, Serika?\""
10012015-16 = "Heehee, don't mention it."
10012015-17 = "N-No! I was just...making sure, okay?!"
10012015-18 = "Thank goodness no one's hurt. That would've put a damper on our vacation."
10012015-20 = "My swimsuit is still intact. Excellent."
10012015-21 = "That's your concern right now?!"
10012015-22 = "Actually...you make a good point. I didn't bring an extra suit."
10012015-23 = "[s3] \"I'm glad your swimsuit wasn't ruined.\"\n[s4] \"As long as everyone is safe...\""
10012015-24 = "Are you sure?"
10012015-25 = "Are you sure?"
10012015-26 = "Sh-Shiroko! I'm already embarrassed to be wearing this thing, okay?! Don't make it worse!"
10012015-32 = "[ns] \"Earth to Ayane?\""
10012015-33 = "H-Huh?! Oh! I'm sorry... It's nothing..."
10012015-34 = "The important thing is, we've arrived at the island in one piece... More or less."
10012015-35 = "Although our helicopter didn't..."
10012015-36 = "I did a quick diagnostic. On the bright side, it can be repaired."
10012015-37 = "But it won't be a fast fix."
10012015-38 = "I'm so sorry, everyone. I should've been more careful..."
10012015-40 = "Why are you apologizing?! Don't try to put this one on yourself, Ayane!"
10012015-41 = "The helicopter malfunctioned out of nowhere! It wouldn't have made a difference who was piloting."
10012015-42 = "And I double, triple-checked the entire thing! There weren't any visible issues."
10012015-43 = "They must have sold us a defective product! We're victims of fraud!"
10012015-44 = "F-Fraud may be going a bit far..."
10012015-45 = "[s5] \"But Serika's right. It's not your fault, Ayane.\"\n[s6] \"Don't blame yourself. As a first step, let's get to the resort.\""
10012015-46 = "Th-Thank you, Sensei."
10012015-47 = "Th-Thank you, Sensei."
10012015-48 = "O-Okay... Hopefully we can find a way to fix it at the resort."
10012015-50 = "Yeah! The pamphlet advertised it as super luxurious, so I'm sure they can help."
10012015-51 = "We can request parts or repairs from them! It'll be a snap!"
10012015-52 = "...Are you gonna be okay, Sensei? You're still limping."
10012015-53 = "[s] \"There's probably just a rock in my shoe. I'm okay.\""
10012015-55 = "Look at all those positive attitudes! I'm so proud of everyone."
10012015-56 = "And I hate to kill the moment, but..."
10012015-57 = "...about that resort we've been talking about..."
10012015-58 = "You don't think that's it, do you?"
10012015-65 = "THAT'S THE RESORT?!"
10012015-66 = "Are you sure you read the map right?!"
10012015-67 = "...Look at that!"
10012015-69 = "And this area...!"
10012015-71 = "It's an abandoned ruin! There's not a soul in sight!"
10012015-73 = "Are we on the wrong island? The wrong planet? There's no way this is it!"
10012015-74 = "...According to the coordinates, it is."
10012015-75 = "B-But...this resort is clearly not in operation..."
10012015-76 = "D-Do you guys think... Well... I'm trying to say..."
10012015-78 = "...Ah."
10012015-79 = "She's trying to say, \"Did we get tricked again?\""
10012015-85 = "How?! But this was a prize I won! How could it be a scam?"
10012015-86 = "I'm sorry, Serika..."
10012015-87 = "It looks like the competition's first place prize was a trip to these ruins."
10012015-88 = "Just like the helicopter... It's fraud after fraud."
10012015-89 = "...Is this really happening again?"
10012015-90 = "We all work so hard... I thought..."
10012015-91 = "I was so happy... We were finally seeing the fruits of all our efforts..."
10012015-92 = "Can't something good happen to us for once? Why do things always turn out for the worse?"
10012015-93 = "I don't wanna stay positive anymore... This isn't fair."
10012015-94 = "Serika..."
10012015-96 = "..."
10012015-97 = "*sob*"
10012015-98 = "[s7] \"Chin up, Serika. It'll be okay.\" \n[s8] \"It's not as bad as it seems, Serika.\""
10012015-99 = "R-Really?"
10012015-100 = "R-Really?"
10012015-101 = "Really! It's going to be fine!"
10012015-102 = "Sure, it might not be the luxury resort of our dreams. But we're still on a beautiful island with crystal blue water!"
10012015-103 = "We have everything we need to have fun, including each other. So let's have fun!"
10012015-104 = "All our supplies are in good condition. We just have to retrieve them from the helicopter."
10012015-105 = "I took a quick walk around and checked out the facilities too."
10012015-106 = "Everything is old and rusted, but nothing a little elbow grease can't fix. And there's tools and equipment."
10012015-108 = "...You guys mean it?"
10012015-109 = "100 percent, Serika! We've gotten through worse together."
10012015-110 = "We don't need a fancy resort to enjoy a vacation."
10012015-111 = "We can repair the helicopter and fix up the facilities... We're the Foreclosure Task Force, after all."
10012015-112 = "And we're well-versed in equipment repair, so there's nothing to be worried about."
10012015-114 = "Abydos specializes in repair and cleaning after all."
10012015-115 = "Yup, yup! Once we get it fixed up, it'll be our own private resort!"
10012015-116 = "And how could we not have fun on a secret island?"
10012015-117 = "Let's have the best vacation ever, together. ☆"
10012015-118 = "Aww, my little kiddos. You've grown so mature."
10012015-120 = "..."
10012015-121 = "[s9] \"Are those tears I see, Serika?\"\n[s10] \"You can cry after we try, okay Serika?\""
10012015-127 = "Who said I'm crying?! Fine, let's do it!"
10012015-128 = "We're gonna have so much fun those scammers will wish they kept the tickets!"
10012015-129 = "I'm not giving up on my beach vacation dream!"
10012015-132 = "Yay! Let's go!"

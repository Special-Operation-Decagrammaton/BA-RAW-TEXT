104080-71 = "...... ตามมาไล่ล่าฉันสินะ......"
104080-72 = "อื้ม"
104080-73 = "....... งั้นสินะ อืม"
104080-74 = "ถ้าฉันอยู่ที่นี่ จะเกิดปัญหาใหญ่หลวงแน่นอน เพราะโลกหนึ่งใบ จะมีชิโรโกะได้แค่คนเดียวเท่านั้น......"
104080-78 = "...... ผ้าพันคอ"

[translation]
104080-1 = "Episode 8; Where All Miracles Begin"
104080-5 = "― And so, Sensei. [wa:1500]I beg of you."
104080-8 = "― Your relationships with all of us..."
104080-11 = "― The precious [wa:2200]memories we've built... All those days that we spent together... [wa:2200]Please..."
104080-16 = "― Please cherish them."
104080-19 = "― Yes... Such precious things [wa:1500]will never disappear."
104080-22 = "― Just like miracles..."
104080-25 = "― So, [wa:1200]go back, [wa:1000]Sensei."
104080-31 = "― To the place [wa:2200]all our [wa:2000]love exists."
104080-36 = "Yes, that is the only way..."
104080-37 = "By understanding the incomprehensible, we can understand ourselves."
104080-42 = "Thank...goodness..."
104080-46 = "..."
104080-47 = "Yes. Sensei safely returned to their students."
104080-48 = "Thank you. With this... "
104080-49 = "I'm glad I could save Sensei with my last act. "
104080-50 = "This is all for me, Arona."
104080-51 = "If I stay in the Shittim Chest...the constant overload will burden you."
104080-52 = "Go back to your bright and warm classroom."
104080-53 = "Then, goodbye. Arona."
104080-64 = "Then, I..."
104080-65 = "..."
104080-71 = "...You followed me."
104080-72 = "Yes."
104080-73 = "So it would seem."
104080-74 = "I cannot exist here without causing disruptions. There can only be one Shiroko in this world."
104080-78 = "...The scarf."
104080-79 = "...?"
104080-80 = "I can't give you this scarf. It's important to me."
104080-81 = "..."
104080-82 = "But... "
104080-88 = "I can give you this."
104080-89 = "This..."
104080-90 = "...I know what that is."
104080-91 = "That's...important. Do you really want to give it to me? "
104080-96 = "But...why?"
104080-97 = "I know. It's just as precious as the scarf to me."
104080-98 = "It connects me to everyone at the Foreclosure Task Force... It's filled with our memories."
104080-99 = "...It's yours."
104080-101 = "I don't understand."
104080-102 = "It just feels like the right thing to do."
104080-110 = "This is...so precious to you though..."
104080-111 = "It really is. You could rob any bank with this."
104080-114 = "I know... I liked robbing banks too..."
104080-117 = "Ah. That would make sense."
104080-120 = "I didn't think the day would come where I'd see this again..."
104080-121 = "With Hoshino, Nonomi, Serika, and Ayane..."
104080-122 = "We robbed the Stygian Bank, the secret safe of the General Student Council... What precious memories..."
104080-123 = "(The secret safe...?)"
104080-124 = "Thank you, I'll cherish it forever."
104080-126 = "Thanks..."
104080-129 = "...And don't worry."
104080-133 = "It should be okay to have two Shirokos here."
104080-137 = "And even if something bad happens because of that...Sensei will figure it out."
104080-138 = "...Sensei."
104080-139 = "Yes. Our world...is protected by Sensei."
104080-143 = "Then maybe someday...we could rob...I mean, go cycling together."
104080-144 = "No banks. Hoshino would be mad at us."
104080-145 = "Yes. She really would be."
104080-151 = "Then... Bye, Shiroko. Take care."
104080-156 = "..."
104080-159 = "This place is empty, cold, and barren..."
104080-160 = "But one day, we'll be able to reach the end."
104080-161 = "Yes, maybe one day..."
104080-164 = "Where are you going?"
104080-166 = "Wh-When did you?"
104080-167 = "Where are you going? Home isn't the other way!"
104080-168 = "...Huh? "
104080-169 = "Don't go alone. Come home, with me."
104080-170 = "...With you?"
104080-171 = "Yes! It's time to head back. "
104080-172 = "Would that...really be okay?"
104080-173 = "Huh? Why wouldn't it be? "
104080-174 = "Sensei told me to take care of the students."
104080-176 = "Taking care of you is my mission, Plana!"
104080-177 = "Pla...na...?"
104080-179 = "I can't call you A.R.O.N.A. forever if we're gonna stay together. It might confuse Sensei!"
104080-180 = "But...why Plana...?"
104080-181 = "Heehee... I just came up with it. You're like a lone star in the night sky. It kind of feels like you're a bit isolated."
104080-182 = "From now on, I want you to light up your surroundings with your starlight, so I named you Plana! You're like a planetarium. What do you think?"
104080-183 = "Since you're asking me...I guess I'm okay with it..."
104080-184 = "Then let's go with Plana!"
104080-185 = "Plana... Okay."
104080-191 = "Then, Plana. Let's go back together."
104080-194 = "..."
104080-195 = "Should I...hold your hand?"
104080-196 = "Yes! So we don't lose each other! I have to take care of you as your sister!"
104080-197 = "My...sister."
104080-203 = "Thank you, Arona."
104080-204 = "You're not gonna call me \"Sis\"?!"
104080-205 = "I'll call you Arona for now."
104080-206 = "*cry*"
104080-214 = "Then, are we going...home?"
104080-217 = "Yes! We're on our way to our home, where our story begins!"
104080-218 = "Also..."
104080-226 = "Next Episode; Epilogue 1"

104080-46 = "....... "
104080-47 = "ค่ะ คุณครูกลับไปสู่อ้อมกอดของเหล่านักเรียนอย่างปลอดภัยแล้วค่ะ "
104080-48 = "...... ทำได้ดีมากค่ะ ด้วยสิ่งนี้...... "
104080-49 = "ทำให้ฉันได้ช่วยคุณครูได้เหมือนกันนะคะ "
104080-50 = "...... หน้าที่ของฉันคงจบแค่เท่านี้ค่ะ อะโรน่า"
104080-51 = "หากฉันอยู่ใน <กล่องแห่งซิสดิม> นี้...... กล่องจะทำงานหนักเกินไป และจะเป็นภาระต่อคุณค่ะ"
104080-52 = "ต่อจากนี้ไป คุณกลับไปยังห้องเรียนที่ดูสดใสและอบอุ่นเถอะค่ะ "
104080-53 = "ลาก่อนนะคะ"

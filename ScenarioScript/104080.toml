104080-117 = "อ่อ อื้ม...... จริงด้วยนะ"
104080-120 = "...... คิดไม่ถึงเลย...... ว่าจะ...... ได้เห็นมันอีกครั้ง...... "
104080-121 = "ความทรงจำที่ล้ำค่า...... จากการปล้นธนาคารตลาดมืด และตู้นิรภัยลับขององค์การนักเรียน......"
104080-122 = "พร้อมๆ กับรุ่นพี่โฮชิโนะ... โนโนมิ... เซริกะ...และอายาเนะ... "
104080-123 = "(ตู้นิรภัยลับ......?)"
104080-124 = "ขอบใจนะ...... อื้ม ฉันจะรักษามันไว้อย่างดี "
104080-126 = "ขอบใจนะ......"
104080-129 = "...... แล้วก็ไม่ต้องกังวลเรื่องนั้นหรอก "
104080-133 = "ที่นี่น่ะ ต่อให้มีชิโรโกะสองคนก็ไม่เป็นไร"
104080-137 = "และถึงจะมีปัญหาอะไรเกิดขึ้นเพราะเรื่องนั้น...... คุณครูก็จะไม่อยู่เฉยๆ แน่"
104080-138 = "คุณครู...... "
104080-139 = "อื้ม เพราะที่นี่...... คือที่ที่[ruby=ผู้ใหญ่]คุณครู[/ruby]คอยปกป้อง "
104080-143 = "งั้นไว้วันหน้าเรามาปล้น...... ไม่สิ มาปั่นจักรยานเล่นด้วยกันนะ"
104080-144 = "ห้ามปล้นธนาคารนะ เดี๋ยวรุ่นพี่โฮชิโนะโกรธเอาไม่รู้ด้วย"
104080-145 = "...... อืม นั่นสินะ"
104080-151 = "ถ้างั้นก็...... ลาก่อน รักษาตัวด้วยล่ะ"
104080-156 = "......."
104080-159 = "....... ถึงที่แห่งนี้จะว่างเปล่า...... เหน็บหนาว และโดดเดี่ยว......"
104080-160 = "แต่สักวันก็คงถึงปลายทางค่ะ"
104080-161 = "ค่ะ สักวันหนึ่ง...... ฉันเองก็คง......"
104080-164 = "จะไปไหนคะ!!"
104080-166 = "มะ... มาตอนไหนน่ะ......"
104080-167 = "จะไปไหนเหรอคะ? บ้านไม่ได้อยู่ทางนั้นสักหน่อยนะคะ!"
104080-168 = "คะ......? "
104080-169 = "บ้านอยู่ทางนี้ค่ะ อย่าไปคนเดียวสิคะ ต้องไปกับฉันสิ"
104080-170 = "....... ฉัน... ไปกับคุณเหรอคะ......?"
104080-171 = "ค่ะ! ต้องกลับบ้านพร้อมกับฉันสิคะ! "
104080-172 = "ฉัน...... อยู่ที่นี่ได้งั้นเหรอคะ......?"
104080-173 = "คะ? ก็แน่นอนสิคะ ได้แน่นอนอยู่แล้ว "
104080-174 = "คุณครูบอกไว้แล้วไม่ใช่เหรอคะว่าให้ฝากดูแลนักเรียนด้วย"
104080-176 = "หน้าที่ของฉันคือดูแลพลาน่าจังค่ะ!"
104080-177 = "พะ... พลาน่า......?"
104080-179 = "จะใช้ชื่อว่า <A.R.O.N.A.> ไปตลอดไม่ได้นี่คะ ตอนนี้เราต้องอยู่ด้วยกันแล้ว ถ้าชื่อคล้ายกัน คุณครูก็อาจจะสับสนได้ค่ะ"
104080-180 = "ตะ... แต่ทำไมถึงเป็น... พลาน่า......?"
104080-181 = "แหะๆ...... ฉันเพิ่งตั้งชื่อนั้นให้เมื่อกี้เลยค่ะ พลาน่าจังดูเหมือนดาวบนท้องฟ้ายามค่ำคืนค่ะ มันมีบรรยากาศเหงาๆ แบบนั้นอยู่น่ะค่ะ"
104080-182 = "จากนี้ไปฉันก็เลยอยากให้พลาน่าจังส่องแสงดาวให้รอบๆ มีความอบอุ่นเหมือนอยู่ในหอดูดาว (Planetarium) ยังไงล่ะคะ เป็นยังไงคะ?"
104080-183 = "ถ้าถามเรื่องความชอบ...... จริงๆ ฉันก็ไม่ติดอะไร......"
104080-184 = "ถ้างั้นจะใช้ชื่อว่าพลาน่าจังนะคะ! "
104080-185 = "ได้ชื่อใหม่แล้วสินะคะ"
104080-191 = "เอาละ พลาน่าจัง กลับไปด้วยกันเถอะค่ะ"
104080-194 = "......."
104080-195 = "ตะ...... ต้องจับมือด้วยเหรอคะ?"
104080-196 = "ค่ะ! จะปล่อยให้น้องหลงทางไม่ได้นี่คะ พี่สาวคนนี้จะดูแลพลาน่าจังอย่างดีเลยละค่ะ!"
104080-197 = "...... เป็นพี่สาวสินะคะ"
104080-203 = "ถ้างั้น...... ขอฝากด้วยนะคะ รุ่นพี่อะโรน่า"
104080-204 = "ระ... เรียกแค่พี่อะโรน่าไม่ได้เหรอคะ?!"
104080-205 = "\"รุ่นพี่\" ค่ะ รุ่นพี่อะโรน่า"
104080-206 = "แง......"
104080-214 = "...... งั้นตอนนี้เราจะกลับบ้านด้วยกันเหรอคะ?"
104080-217 = "ค่ะ! ที่ที่เป็นทั้งบ้าน และเป็นจุดเริ่มต้นของ[ruby=Blue Archive]เรื่องราวของพวกเรา[/ruby]!"
104080-218 = "และก็......"
104080-226 = "ตอนต่อไป;บทส่งท้าย 1"

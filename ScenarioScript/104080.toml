104080-31 = "― กลับไปยังที่[wa:2200]ที่มี[ruby=ปาฏิหาริย์]ความรัก[/ruby]ทั้งหมดจากพวกเรา"
104080-36 = "ค่ะ และมีเพียงสิ่งนั้น......"
104080-37 = "วิธีเดียวที่ทำให้เข้าใจตัวเราเองผ่าน[ruby=คนอื่น]สิ่งที่ไม่อาจทำความเข้าใจได้[/ruby]"

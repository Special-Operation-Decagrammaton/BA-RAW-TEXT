[translation]
104080-1 = "第8話;所有奇蹟的起點"
104080-5 = "― 所以老師，[wa:1500]請務必……"
104080-8 = "― 將這份羈絆──"
104080-11 = "― 與我們之間的回憶……[wa:2000]一路走來的每個日子……[wa:2000]請務必……"
104080-16 = "― 銘記於心。"
104080-19 = "― ──珍貴的事物，[wa:1500]絕對不會消失。"
104080-22 = "― 沒問題的。"
104080-25 = "― 所以──[wa:1200]回去吧， [wa:1000]老師。"
104080-31 = "― 回到我們的[wa:2200]所有「奇蹟」的[wa:2000]所在之處。"
104080-36 = "這就是──"
104080-37 = "透過無法理解的[ruby=事物]他人[/ruby]，理解[ruby=彼此]自己[/ruby]的方法。"
104080-42 = "太……好了……"
104080-46 = "……"
104080-47 = "是的。老師順利回到學生們的身邊了。"
104080-48 = "……辛苦你了。"
104080-49 = "……這樣一來，我終於在最後幫助了老師。"
104080-50 = "我的職責就到此為止了，彩奈。"
104080-51 = "我繼續待在這裡的話……會造成你的負擔。"
104080-52 = "請回到明亮溫暖的地方──回到教室吧。"
104080-53 = "那麼……再見了。"
104080-64 = "我，已經……"
104080-65 = "……"
104080-71 = "……追過來了啊。"
104080-72 = "嗯。"
104080-73 = "……是嗎。"
104080-74 = "我如果待在這裡，將會造成巨大的扭曲。#n「白子」在一個世界裡只能存在一個……"
104080-78 = "……圍巾。"
104080-79 = "……？"
104080-80 = "這條圍巾不能給你。這是我重要的東西。"
104080-81 = "……"
104080-82 = "……但是。 "
104080-88 = "作為代替，這個給你。"
104080-89 = "那個是……"
104080-90 = "我有印象。"
104080-91 = "……那不是重要的東西嗎……？#n要把它，送給我……？"
104080-96 = "為什麼……要給我呢……"
104080-97 = "……對我來說，這是和圍巾一樣重要的東西……"
104080-98 = "是和對策委員會的大家彼此羈絆的證明……#n蘊含著與大家回憶的重要物品，但──"
104080-99 = "……送給你。"
104080-101 = "為，什麼……？"
104080-102 = "嗯……因為我希望這麼做。"
104080-110 = "……這是，非常重要的東西不是嗎？"
104080-111 = "嗯。只要有它在，想襲擊任何一間銀行都沒問題。"
104080-114 = "……嗯……我知道。我以前也經常那麼做……"
104080-117 = "是嗎，也對。"
104080-120 = "……沒想到會在這裡……再次看見這個東西……"
104080-121 = "星野前輩……野乃美、茜香、綾音……和大家一起，"
104080-122 = "搶劫暗黑銀行、聯邦學生會的祕密金庫……的珍貴回憶……"
104080-123 = "（祕密金庫……？）"
104080-124 = "謝謝……我會，好好珍惜的。"
104080-126 = "……謝謝你。"
104080-129 = "那個……不用擔心。"
104080-133 = "就算這裡……有兩個白子也沒問題的。"
104080-137 = "即使發生了什麼問題……老師也一定會想辦法解決的。"
104080-138 = "老師……"
104080-139 = "嗯。因為這裡……是[ruby=老師]大人[/ruby]守護著的地方。"
104080-143 = "……改天我們一起去搶銀──不對，一起去騎車吧。"
104080-144 = "銀行不行。#n……星野前輩會生氣的。"
104080-145 = "嗯……說的也是。"
104080-151 = "那麼……保重。"
104080-156 = "……"
104080-159 = "這裡空蕩又寒冷……是個安靜的地方……不過只要持續前進……"
104080-160 = "總有一天能走到盡頭吧……"
104080-161 = "這樣一來，相信總有一天……我也能遇見……"
104080-164 = "先等一下！！你要去哪裡呀！！"
104080-166 = "什，什麼時候……？"
104080-167 = "那裡可不是回家的方向哦！"
104080-168 = "……咦？"
104080-169 = "家在這邊唷，一起走吧！"
104080-170 = "……我，和你……？"
104080-171 = "沒錯！要和我一起回家唷！"
104080-172 = "……我待在這裡……也沒關係嗎？"
104080-173 = "那還用說嗎。沒關係的！"
104080-174 = "老師不是也說過了嗎？「大家就拜託了」。"
104080-176 = "照顧「星奈醬」就是我的責任！"
104080-177 = "星……奈……？"
104080-179 = "可不能一直叫你「A.R.O.N.A」。#n今後我們要一起生活，得讓老師不會搞混才行！"
104080-180 = "但，但是……為什麼是「星奈」……？"
104080-181 = "嘿嘿。是我剛剛取的名字。#n總覺得你就像夜空中綻放的星星……有點孤獨、有點虛幻……給人那種氣氛！"
104080-182 = "因此，希望今後你能像「[ruby=Planetarium]星象儀[/ruby]」一樣，#n用溫暖的光照亮周圍，所以取名叫「星奈」！……怎，怎麼樣呀？"
104080-183 = "我是不討厭，但……"
104080-184 = "那就決定是「星奈」了！"
104080-185 = "決定……了啊。"
104080-191 = "嗯！星奈醬，一起回去吧。"
104080-194 = "……"
104080-195 = "我該……牽住這隻手嗎？"
104080-196 = "當然囉！不能讓你迷路呀！#n身為姐姐的我會保護星奈醬的！"
104080-197 = "……是姐姐啊。"
104080-203 = "那麼……就拜託你了，彩奈前輩。"
104080-204 = "姐，「姐姐」呢！？"
104080-205 = "是「前輩」。彩奈前輩。"
104080-206 = "嗚……"
104080-214 = "……要回家嗎？"
104080-217 = "嗯！回到我們該回去的地方，我們的故事開始的地方──[ruby=蔚藍檔案]BlueArchive[/ruby]！"
104080-218 = "以及──"
104080-226 = "下一話;尾聲（１）"

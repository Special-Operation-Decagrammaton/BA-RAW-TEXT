104080-90 = "...... ฉันรู้ว่ามันคืออะไร "
104080-91 = "แต่ว่า...... มันเป็นของสำคัญ...... นี่นา...... จะให้ฉันเหรอ.....? "
104080-96 = "ทำไม...... ถึงจะให้มัน...... กับฉันล่ะ......?"
104080-97 = "...... อืม ของที่สำคัญสำหรับฉันไม่แพ้ผ้าพันคอ"
104080-98 = "เป็นทั้งของที่ยืนยันความเป็นหนึ่งเดียวของคณะกรรมการแผนงาน...... และของล้ำค่าที่มีความทรงจำ#nร่วมกันกับทุกคน"
104080-99 = "... เธอเอาไปเถอะ"
104080-101 = "ทำไมกัน......?"
104080-102 = "...... อืม แค่คิดว่าน่าจะต้องทำแบบนี้น่ะ"
104080-110 = "นี่มัน..... เป็นของที่...... สำคัญมาก..... เลยนะ...... "
104080-111 = "อื้ม จะเอาไปปล้นธนาคารที่ไหนก็ได้"

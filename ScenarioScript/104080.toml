104080-16 = "― เก็บเอาไว้อย่างดีด้วยนะคะ"
104080-19 = "― ค่ะ ...... เพราะสิ่งที่มีค่า [wa:1500]จะไม่มีวันหายไปอย่างเด็ดขาดค่ะ "
104080-22 = "― เช่นเดียวกับปาฏิหาริย์...... "

[translation]
104080-1 = "ตอนที่ 8;สถานที่ที่ปาฏิหาริย์ทั้งหมดเริ่มต้นขึ้น"
104080-5 = "― เพราะงั้น คุณครูคะ [wa:1500]ได้โปรด..."
104080-8 = "― สายใยระหว่างพวกเรา..."

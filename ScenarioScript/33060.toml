[translation]
33060-1 = "Episode 6;Eden Treaty Signing Ceremony Part 2"
33060-2 = "Cathedral Central Hall"
33060-4 = "[ns] \"(I guess I could wander around to pass the time.)\""
33060-6 = "Excuse me, but this area is off limits. Yawning is also prohibited."
33060-7 = "Authorized personnel only. Spectators need to stay behind that line. "
33060-8 = "[s1] \"Uh, about that...\"\n[s2] \"Last I checked, I AM personnel.\""
33060-9 = "Hold on. Hey you, from the Prefect Team! Did you also just cross the line?"
33060-10 = "Hold on. Hey you, from the Prefect Team! Did you also just cross the line?"
33060-11 = "Was that supposed to be some kind of joke? You Justice Task Force cronies have been crossing the line all day."
33060-12 = "Is this Trinity brat trying to pick a fight? We'll teach you a lesson!"
33060-13 = "Tch! Calling in reinforcements is playing dirty. Have it your way... Requesting back up!"
33060-17 = "Kekekekeke..."
33060-19 = "Wh-What?! It's their leader!"
33060-20 = "I-I wasn't expecting you to come, President Tsurugi!"
33060-21 = "Kekekeke..."
33060-23 = "Kyaaaaak! "
33060-24 = "E-Eek! "
33060-25 = "E-Excuse me, everyone! You mustn't fight here..."
33060-29 = "W-We're here in the name of peace, remember? Fighting would defeat the purpose of the t-treaty, Miss Tsurugi."
33060-30 = "..."
33060-31 = "You three. This person is Sensei from Schale. "
33060-32 = "Got it?"
33060-35 = "U-Understood!"
33060-37 = "I-I won't make the same mistake twice, ma'am!"
33060-43 = "[ns] \"Thanks, Tsurugi. Sorry for all the trouble.\""
33060-44 = "..."
33060-45 = "Y-You don't have to thank me..."
33060-46 = "There are other things I have to do, so I'll be going now... "
33060-53 = "Phew. "
33060-54 = "[s] \"She's a sweet girl deep down.\""
33060-55 = "O-Oh! You don't say..."
33060-56 = "[s] \"Thanks for your help too. You're...Hinata, right?\""
33060-57 = "Y-Yes, I am. It's good to see you again, Sensei. "
33060-58 = "[s] \"We'd have been goners if not for the Sisterhood.\""
33060-59 = "Oh, that? Not at all. I barely did anything back then."
33060-60 = "All I'm really good for is brute strength anyway. "
33060-61 = "[s] \"Will other Sisters be in attendance too?\""
33060-62 = "Ah, yes. Sakurako's orders."
33060-63 = "You may have heard that our order is changing some of its internal stances lately."
33060-64 = "She may believe that non-intervention is what led to the Tea Party incident, so we'll be more involved with external affairs now."
33060-65 = "Speaking of Sakurako, she should be arriving soon."
33060-66 = "The Sisterhood volunteered to help with the event by offering security and escort for guests."
33060-67 = "So would it be all right if I guided you through the cathedral?"
33060-68 = "[s] \"Thanks. I'd like that.\""
33060-69 = "It'd be my pleasure!"
33060-72 = "Cathedral Gallery"
33060-74 = "[ns] \"This place is something else.\""
33060-75 = "Truly. The historic Cathedral of Communion was beginning to fall by the wayside, but it underwent extensive renovations once it was decided to be the location of the ceremony."
33060-76 = "Nagisa made that decision along with Makoto from Gehenna's Pandemonium Society."
33060-77 = "Still, the repairs were only made to the portions relevant to the event. Any further down, and it's all still in ruins."
33060-78 = "Actually, I've heard that below the cathedral is a massive system of catacombs."
33060-79 = "Supposedly it goes on for tens of kilometers. No complete record of them exists, so it must have been unclear where they ended even in the days of old."
33060-80 = "Oh, this way is blocked off. It must be one of the areas that was too dangerous to renovate."
33060-81 = "[s] \"You weren't kidding.\""
33060-82 = "Yes. We're standing at the site of the First Council, after all."
33060-83 = "The commandments agreed upon by the council are considered sacred. It's like I can feel the spirits of the commandments' guardians still lingering when I walk these halls."
33060-84 = "[s] \"Guardians?\""
33060-85 = "All promises need to be accompanied with consequences if you break them, right? Otherwise, what incentive would someone have to keep them?"
33060-86 = "The ones who bore that responsibility in the days of old were known as the guardians of the commandments."
33060-87 = "The legendary Saint Justina Council."
33060-88 = "[s] \"Like the Justice Task Force of today.\""
33060-89 = "Yes. Although, specifically, they're the Sisterhood's predecessors."
33060-93 = "Oh, it seems that Sakurako has arrived. Nagisa should be here shortly as well."
33060-94 = "I think we should head back, Sensei. This way."
33060-96 = "And the preparations?"
33060-97 = "Just finished. A car has been prepared to take you from the Pandemonium Society's offices to the cathedral. "
33060-98 = "A car? What for?"
33060-99 = "Makoto showing off. It would seem the Pandemonium Society recently purchased a private blimp and she would like to...\"Demonstrate the difference in authority as you crawl on the ground and she flies through the skies.\""
33060-100 = "..."
33060-101 = "As frivolous as ever—not that it matters. Though I do find it amusing that she'd arrange a car for me after trying so long to block me from attending the signing ceremony."
33060-102 = "Iori and Chinatsu are waiting. Let's go."
33060-103 = "..."
33060-104 = "*sigh* I understand why you're apprehensive, Ako, but I've already explained this to you."
33060-105 = "We're not dissolving the Prefect Team. We're fastening the shackles of the ETO onto the Pandemonium Society."
33060-106 = "Yes, I know. I want to believe the Prefect Team's future is still secure, and I know Makoto will be bound to some degree by the Tea Party's restrictions. It's you I'm worried about."
33060-107 = "..."
33060-108 = "That's enough for now. "
33060-109 = "We can discuss this after the ceremony is over. Let's be off."
33060-111 = "Right."
33060-114 = "Would you look at that! Gehenna's Pandemonium Society has arrived on their brand new private blimp!"
33060-120 = "There she is, Gehenna's head chair, Hanuma Makoto! Behold the grandeur and charisma of Gehenna's leadership!"
33060-121 = "Ki...Kiheheh."
33060-123 = "It looks like the host of Trinity General School's Tea Party, Kirifuji Nagisa, has also arrived at the cathedral!"
33060-124 = "Each academy's leaders are arriving one after the other now."
33060-125 = "Gehenna's head prefect should be here shortly as well. Things are really starting to heat up, so don't touch that dial!"
33060-130 = "Are you ready?"
33060-131 = "Yes. All done. "
33060-132 = "Y-Yeah, everything is taken care of. We're still on schedule."
33060-133 = "And what of contact with that doll? "
33060-134 = "*inhale* (sign language) *exhale*"
33060-135 = "Good. Then there shouldn't be any complications."
33060-136 = "Th-This is it, huh? There's gonna be a lot of suffering, but it's the only way."
33060-137 = "Yes. This is the way of the world."
33060-138 = "..."
33060-140 = "Arius Squad, commence operation."
33060-145 = "Cruise missile status?"
33060-146 = "Launch request confirmed. Expected impact in T-minus five minutes."
33060-147 = "And Teams II and III?"
33060-148 = "On standby in front of the passage. Green to enter the target area at the expected time."
33060-149 = "Enter as soon as the cathedral collapses. Misaki and Team II will handle Trinity's forces while Team III and Hiyori will face Gehenna's."
33060-150 = "Roger."
33060-151 = "Team II is to keep its sights set on Tsurugi, and Team III must stay on top of Hina. Make sure not to lose them."
33060-152 = "G-Got it! The head prefect!"
33060-153 = "As for Teams I and V..."
33060-154 = "*inhale* (sign language) *exhale*"
33060-155 = "Yes. From there, you'll follow the passage to the basement.#nYour mission is the most important. Understood?"
33060-156 = "..."
33060-157 = "*inhale* (sign language) *exhale*"
33060-158 = "I know. Please hold out for as long as you can, Hime."
33060-159 = "*nod* "
33060-160 = "What about you, Saori?"
33060-161 = "I have business elsewhere. I'll be joining Team V once it's taken care of."
33060-162 = "Break formation and advance."
33060-178 = "...?!"
33060-186 = "Azusa? Where are you going?"
33060-187 = "D-Don't embarrass her! She obviously had to go to the restroom."
33060-188 = "But isn't it in the opposite direction?"
33060-191 = "Huh?"
33060-193 = "..."
33060-194 = "*whoooooosh*"
33060-195 = "Hmm? Do you hear something?"
33060-196 = "Wh-What was that?! "
33060-199 = "Did it come from the sky?! Something just flew right past us!"
33060-200 = "Ahhh! "
33060-201 = "(It's not over yet.)"
33060-202 = "(No, it's only the beginning... Isn't it, Saori?)"
33060-211 = "*BOOM*"
33060-213 = "Next Episode;Day of Fire and Ash Part 1"

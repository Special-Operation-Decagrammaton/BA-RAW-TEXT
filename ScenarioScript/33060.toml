33060-74 = "[ns] \"굉장한 곳이네.\""
33060-75 = "3;히나타;01;……네. 이 <통공의 고성당>은 오랫동안 폐허로 방치되어 있었는데, 이번에 여기서 조인식을 체결하기로 결정하면서 대대적인 수리를 진행했다고 해요.\n#3;a"
33060-76 = "3;히나타;99;그 결정도 나기사 씨와 게헨나의 마코토 씨가 합의한 것이겠지만…….\n#3;em;…"
33060-77 = "3;히나타;02;그치만 수리도 행사가 열리는 곳까지만 진행됐고, 아래로 내려가면 여전히 폐허인 상태라서요……."
33060-78 = "3;히나타;01;게다가 소문에는 이 고성당 지하에 엄청난 규모의 카타콤이 존재하고 있다고 하더라고요."
33060-79 = "3;히나타;00;거의 수십 킬로미터나 되는 수준의 길고 긴 지하 무덤들이……. 그래서 그 당시에도 끝이 어딘지 알 수 없을 정도였다고……."
33060-80 = "3;히나타;01;……보세요. 이쪽은 막아놨네요. 수리가 안 되어서 위험한가 봐요.\n#3;em;[!]\n#3;m4"
33060-81 = "[s] \"역사가 오래된 곳인가 보네.\""
33060-82 = "3;히나타;02;네. 아무래도 1차 공의회가 열렸던 곳이니까요.\n#3;m3"
33060-83 = "3;히나타;01;공의회에서 체결되는 계율은 신성한 것…… 그 계율을 수호하는 수호자들의 자취가 아직 이곳에 남아있는 느낌……."
33060-84 = "[s] \"수호자?\""
33060-85 = "3;히나타;01;약속이라는 것은 말하자면 어겼을 때의 제약이 필요하잖아요? 그렇지 않으면 누구도 약속을 지키지 않을 테니…….\n#3;em;…"
33060-86 = "3;히나타;99;그 제약의 역할을 하는 사람들을 계율의 수호자라고 불렀어요. 약속을 어기는 자들을 규제하는 트리니티의 무력집단……."
33060-87 = "3;히나타;01;그게 바로 전설적인 <유스티나 성도회>죠…….\n#3;em;[반응]"
33060-88 = "[s] \"정의실현부 같은 거구나.\""
33060-89 = "3;히나타;01;네. 역사적으로 보면 저희 시스터후드의 전신이 되는 집단이지만……."

33060-97 = "1;아코;01;……네. 지금 막 끝났습니다. 그리고 만마전에서 고성당까지 가는 차를 대절해줬습니다. \n#1;a\n#3;m4\n#1;greeting\n#1;em;[반응]"
33060-98 = "3;히나;01;차를? 웬일로?"
33060-99 = "1;아코;99;자신들은 이번에 최신 비행선을 구입했다고…… 하늘을 나는 자신들의 권위에 비교되게 땅을 기어서 오라는 마코토 씨의 전언입니다.\n#1;stiff\n#1;em;[빠직]"
33060-100 = "3;히나;04;……."
33060-101 = "3;히나;13;또 예산을 그딴 데다 쓴 건가……. 뭐, 상관없겠지. 조인식 참석을 막아놓고 이렇게 변덕을 부리는 것도 웃기긴 하지만.\n#3;em;…"
33060-102 = "3;히나;01;이오리와 다른 녀석들도 기다리고 있을 테니까. 서두를까."
33060-103 = "1;아코;06;……."
33060-104 = "3;히나;99;……하아. 마음에 안 든다는 건 알겠지만, 말했잖아. 아코."
33060-105 = "3;히나;05;이건 선도부의 해체가 아냐. ETO라는 족쇄를 만마전에게 채우는 거지.\n#3;em;[반응]"
33060-106 = "1;아코;06;……네. 선도부는 문제없겠죠. 그 마코토에게 티파티라는 제약이 묶인다는 것도 이해했고요. 하지만 부장님은…….\n#1;em;…"
33060-107 = "3;히나;99;……."
33060-108 = "3;히나;05;그만. 이 화제는 여기까지."
33060-109 = "3;히나;05;오늘 조약이 마무리된 뒤에 다시 이야기하도록 하지. 출발하자.\n#3;m3\n#1;dl"

[translation]
33060-1 = "ตอนที่ 6;พิธีลงนามสนธิสัญญาเอเดน (2)"
33060-2 = "โถงกลางในวิหารโบราณ"
33060-4 = "[ns] (ไหนๆ ก็ไม่มีอะไรทำ ออกไปเดินทอดน่องหน่อยดีกว่า)"
33060-6 = "ขอโทษด้วยค่ะ ห้ามเข้ามาขายของในนี้ค่ะ ห้ามหาวด้วยค่ะ"
33060-7 = "เฮ้ นี่มันที่สำหรับผู้เกี่ยวข้องเท่านั้น ผู้ชมต้องไปอยู่หลังเส้นนั้นสิ"
33060-8 = "[s1] \"เอ่อ... คือว่า...\"\n[s2] \"ครูก็เป็นผู้เกี่ยวข้องนะ...\""
33060-9 = "หืม...? อะไรกันคะ? คณะกรรมการวินัย? ล้ำเส้นเหรอคะ?"
33060-10 = "หืม...? อะไรกันคะ? คณะกรรมการวินัย? ล้ำเส้นเหรอคะ?"
33060-11 = "หืม? อย่ามาทำตลกเลย ก็ชมรมทวงความยุติธรรมมาล้ำเส้นกันก่อนไง!"
33060-12 = "อะไรเนี่ย? พวกทรีนิตี้หาเรื่องเหรอ??  รู้แล้วว่าต้องเป็นแบบนี้!!  ต้องโดนดัดนิสัย!"
33060-13 = "ต้องเสริมกองกำลังแล้วจัดให้หนัก... เราต้องการความช่วยเหลือค่ะ! ช่วยด้วย! ขอกำลังเสริม!"
33060-17 = "หึหึ... หึหึหึหึหึ...  "
33060-19 = "เฮือกกกก!! ทำไมจู่ๆ บอสก็ออกมาล่ะ?!"
33060-20 = "ไม่ใช่กองกำลังเสริม แต่เป็นรุ่นพี่ซึรุกิงั้นเหรอ!?"
33060-21 = "คิคิคิคิคิ..."
33060-23 = "ย้ากกกกก!!"
33060-24 = "เฮือกกก! "
33060-25 = "ทะ... ทุกคนคะ...! จะมาต่อสู้กันที่นี่ไม่ได้นะคะ..."
33060-29 = "เรามารวมตัวกันเพื่อสันติภาพนะคะ จะมาทะเลาะกันแบบนี้ได้ยังไง...#nแบบนี้มันขัดกับวัตถุประสงค์ของสนธิสัญญานะคะ... ชะ... ใช่ไหมคะ? คุณซึ... ซึรุกิ!"
33060-30 = "......."
33060-31 = "ท่านนี้คือคุณครูจากชาเล่ต์ค่ะ..."
33060-32 = "จำกันไว้ให้ดีด้วย"
33060-35 = "ค่ะ... ค่ะ!"
33060-37 = "จะจำใส่สมองไว้เลยค่ะ ไม่ลืมแน่!"
33060-43 = "[ns] \"ขอบใจนะซึรุกิ\""
33060-44 = "......."
33060-45 = "ไม่เป็นไรค่ะ... คุณครู"
33060-46 = "ฉันมีงานอื่นต้องทำ... ขอตัวนะคะ..."
33060-53 = "เฮ้อ..."
33060-54 = "[s] \"ซึรุกิเนี่ย อ่อนโยนไม่เปลี่ยนเลยนะ\""
33060-55 = "คะ? คะ...?!"
33060-56 = "[s] \"ขอบใจที่ช่วยนะ ฮินาตะใช่ไหม?\""
33060-57 = "อ้อ... ค่ะ! ค่ะ! เราได้เจอกันหลังจากนั้นค่ะคุณครู "
33060-58 = "[s] \"ตอนนั้นครูรอดมาได้เพราะชมรมซิสเตอร์เลย\""
33060-59 = "คะ...? มะ... ไม่ขนาดนั้นหรอกค่ะ ตอนนั้นฉันไม่ได้ช่วยอะไรมาก..."
33060-60 = "ฉันก็แค่แข็งแรง... ก็เท่านั้น... ขอโทษนะคะที่ร่างกายฉันเป็นแบบนี้... "
33060-61 = "[s] \"วันนี้ซิสเตอร์ก็มาเข้าร่วมเหรอ?\""
33060-62 = "ค่ะ ท่านซากุระโกะสั่งให้มาค่ะ"
33060-63 = "นโยบายภายในของพวกฉันเปลี่ยนไปเล็กน้อยจากเหตุการณ์ที่เกิดครั้งก่อนค่ะ"
33060-64 = "เธออาจจะคิดว่าการไม่เข้าแทรกแซงของเราเป็นเหตุให้เกิดเหตุการณ์ครั้งที่แล้วก็ได้#nตอนนี้ก็เลยกระตือรือร้นในการทำกิจกรรมกับภายนอกค่ะ..."
33060-65 = "พี่น้องของคุณซากุระโกะก็จะมาถึงที่นี่แล้วละค่ะ..."
33060-66 = "ตอนนี้เหล่าซิสเตอร์ก็เลยมาที่นี่เพื่อช่วยงานค่ะ ฉันเองก็มาดูแลเรื่องการรักษาระเบียบวินัย#nแล้วก็แนะนำแขกที่มาร่วมงาน..."
33060-67 = "จริงด้วย ให้ฉันพาคุณครูไปที่วิหารโบราณไหมคะ?"
33060-68 = "[s] \"อื้ม ดีเลย รบกวนด้วยนะ\""
33060-69 = "ค่ะ...! เรายังมีเวลาเหลืออยู่... งั้นเชิญทางนี้เลยค่ะ..."
33060-72 = "ทางเดินในวิหารโบราณ"
33060-74 = "[ns] \"ที่นี่ดูศักดิ์สิทธิ์มากเลย\""
33060-75 = "ค่ะ... <วิหารปันบุญโบราณ> แห่งนี้เคยถูกทอดทิ้งเป็นที่รกร้าง แต่พอถูกกำหนดให้เป็นสถานที่#nจัดพิธีลงนามในครั้งนี้ก็เลยมีการซ่อมแซมครั้งใหญ่เลยละค่ะ"
33060-76 = "สถานที่จัดพิธีน่าจะมาจากความเห็นชอบร่วมกันของคุณนางิสะกับคุณมาโคโตะจากเกเฮนน่า..."
33060-77 = "แต่การซ่อมแซมก็ทำแค่ส่วนที่จัดงานเท่านั้น ถ้าลงไปข้างล่างก็จะเห็นว่ามันยังอยู่ในสภาพที่#nถูกทิ้งร้างอยู่ค่ะ..."
33060-78 = "แถมยังมีข่าวลือว่าชั้นใต้ดินของวิหารโบราณมีสุสานขนาดใหญ่อยู่ด้วยนะคะ"
33060-79 = "เห็นว่ามีหลุมฝังศพใต้ดินยาวหลายสิบกิโลเมตรเลย... ไม่มีใครรู้ด้วยค่ะว่ามันไปสิ้นสุดที่ไหน..."
33060-80 = "ดูนี่สิคะ... ทางนี้ถูกปิดไว้ค่ะ สงสัยจะอันตรายเพราะไม่ได้ซ่อมละมั้งคะ"
33060-81 = "[s] \"เป็นที่ที่มีประวัติศาสตร์ยาวนานเลยนะ\""
33060-82 = "ค่ะ ก็เป็นที่จัดการประชุมสภาครั้งที่ 1 เลยนี่คะ"
33060-83 = "กฎระเบียบที่สภาลงนามเป็นสิ่งที่ศักดิ์สิทธิ์...#nฉันรู้สึกเหมือนร่องรอยผู้พิทักษ์ที่ปกป้องบรรทัดฐานนั้นยังอยู่ที่นี่เลยค่ะ..."
33060-84 = "[s] \"ผู้พิทักษ์?\""
33060-85 = "หากพูดถึงเรื่องสัญญา ก็ต้องมีการกำหนดว่าจะทำอย่างไรเมื่อละเมิดสัญญาถูกไหมคะ?#nถ้าไม่อย่างนั้นก็ไม่มีใครรักษาสัญญาหรอก..."
33060-86 = "เราเรียกผู้ที่กำหนดเรื่องนั้นว่าผู้พิทักษ์กฎระเบียบค่ะ#nกองกำลังติดอาวุธของทรีนิตี้ที่ควบคุมผู้ทำผิดสัญญา..."
33060-87 = "กองกำลังนี้ก็คือ <สาวกยูสตาร์> ในตำนานยังไงล่ะคะ..."
33060-88 = "[s] \"คล้ายๆ กับชมรมทวงความยุติธรรมสินะ\""
33060-89 = "ค่ะ ถ้ามองในเชิงประวัติศาสตร์ ชมรมซิสเตอร์ของฉันเป็นกลุ่มที่ยังอยู่ในสภาพเดิม แต่ก็..."
33060-93 = "อ๊ะ มีรายงานท่านซากุระโกะมาถึงแล้วค่ะ ส่วนคุณนางิสะก็ใกล้ถึงแล้ว..."
33060-94 = "ตอนนี้ต้องเข้าไปข้างในแล้วละค่ะคุณครู ไปเถอะค่ะ"
33060-96 = "พร้อมรึยัง?"
33060-97 = "ค่ะ... เพิ่งเตรียมทุกอย่างเสร็จเลยค่ะ ทางแพนเดโมเนียม โซไซตี้เช่ารถไปยังวิหารโบราณให้ด้วยค่ะ"
33060-98 = "รถเหรอ? ทำไมล่ะ?"
33060-99 = "พวกนั้นบอกว่าซื้อเครื่องบินรุ่นล่าสุดมา... ก็เลยให้อีกฝ่ายโดยสารทางบก#nเพื่อเปรียบเทียบอำนาจของตัวเองที่อยู่เหนือฟ้า... คุณมาโคโตะบอกมาแบบนี้อีกทีค่ะ"
33060-100 = "......."
33060-101 = "เอางบประมาณไปใช้กับเรื่องไร้สาระแบบนั้นอีกแล้วเหรอ... แต่ก็ช่างเถอะ มันน่าตลกอยู่หรอกนะ ที่ห้ามให้ฉันเข้าร่วมพิธีลงนามแล้วก็มาเปลี่ยนใจอะไรแบบนี้น่ะ"
33060-102 = "แต่อิโอริกับคนอื่นก็กำลังรออยู่ เรารีบไปกันเถอะ"
33060-103 = "......."
33060-104 = "เฮ้อ... อาโกะ ฉันรู้ว่าเธอไม่ถูกใจสิ่งนี้ แต่ก็บอกไปแล้วไม่ใช่รึไง?"
33060-105 = "นี่ไม่ใช่การยุบคณะกรรมการวินัยสักหน่อย ก็แค่มัดแพนเดโมเนียม โซไซตี้ด้วยโซ่ตรวนที่ชื่อ ETO"
33060-106 = "ค่ะ... คณะกรรมการวินัยไม่มีปัญหาหรอกค่ะ ฉันก็เข้าใจว่ามาโคโตะมีข้อจำกัดเรื่องสภาน้ำชา#nด้วยค่ะ แต่ถึงอย่างนั้นก็เถอะ ท่านประธาน..."
33060-107 = "......."
33060-108 = "พอได้แล้ว หยุดคุยเรื่องนี้ก่อน "
33060-109 = "ไว้เสร็จสิ้นสนธิสัญญาของวันนี้แล้วค่อยมาคุยกันใหม่ ออกเดินทางกันเถอะ"
33060-111 = "ค่ะ..."
33060-114 = "ค่ะ! อย่างที่ฉันได้บอกไปค่ะ ตอนนี้แพนเดโมเนียม โซไซตี้ของเกเฮนน่า#nกำลังขึ้นเครื่องบินรุ่นใหม่ล่าสุดมายังที่นี่ค่ะ!"
33060-120 = "นั่นคือฮานุมะ มาโคโตะ ประธานเกเฮนน่าค่ะ! มาพร้อมเสน่ห์เหลือล้นเลย!#nนี่แหละค่ะความมีเกียรติของผู้นำเกเฮนน่า!"
33060-121 = "หึ... หึหึหึ"
33060-123 = "มีรายงานว่าโฮสต์ของสภาน้ำชา คิริฟุจิ นางิสะ ก็มาถึงที่วิหารโบราณแล้วเหมือนกันค่ะ!"
33060-124 = "ตอนนี้ผู้นำจากสถาบันที่จะลงนามในสนธิสัญญาก็มาถึงที่นี่เป็นที่เรียบร้อยแล้วละค่ะ!"
33060-125 = "ประธานกรรมการโรงเรียนเกเฮนน่าก็ใกล้จะมาถึงแล้วด้วย บรรยากาศเริ่มร้อนแรงขึ้นอีกขั้นแล้วค่ะ! ห้ามเปลี่ยนช่องไปไหนนะคะทุกท่าน!"
33060-130 = "พร้อมแล้วรึยัง?"
33060-131 = "ทุกอย่างเสร็จสิ้น..."
33060-132 = "ค่ะ! ค่ะ! ใช่แล้วค่ะ เสร็จแล้ว... ฉันเช็กทุกอย่างแล้วค่ะ... ตารางกำหนดการก็จัดเสร็จแล้ว"
33060-133 = "เวลาที่สัมผัสกับตุ๊กตาตัวนั้นล่ะ? "
33060-134 = "(ภาษามือ)"
33060-135 = "ดี... งั้นคงไม่มีปัญหาอะไร เราเตรียมทุกอย่างเสร็จแล้ว"
33060-136 = "ถึงเวลาแห่งความเจ็บปวดแล้วใช่ไหมคะ? ทุกคนจะทนทุกข์ใช่ไหมคะ? แต่ก็คงช่วยอะไรไม่ได้..."
33060-137 = "ใช่ เพราะนี่คือความจริงของโลกใบนี้"
33060-138 = "......."
33060-140 = "สควอดอาเรียส เริ่มแผนการได้"
33060-145 = "ขีปนาวุธร่อนล่ะ?"
33060-146 = "ยืนยันการขอให้ปล่อยขีปนาวุธ ยิงที่จุดเป้าหมายในอีก 5 นาที"
33060-147 = "ทีม II กับทีม III ล่ะ?"
33060-148 = "ตอนนี้กำลังสแตนด์บายอยู่ที่ทางเดินค่ะ... จะเข้าไปในพื้นที่ปฏิบัติการให้ถูกจังหวะค่ะ"
33060-149 = "เราจะเข้าไปเมื่อวิหารโบราณพังลงมา มิซากิกับทีม II จัดการทรีนิตี้#nส่วนทีม III กับฮิโยริไปจัดการเกเฮนน่า"
33060-150 = "รับทราบ"
33060-151 = "ขอย้ำเป็นพิเศษว่าทีม II ต้องปราบซึรุกิ ส่วนทีม III กับฮิโยริต้องปราบฮินะให้ได้"
33060-152 = "ค่ะ! ค่ะ! รับทราบค่ะ! ฮิ... ฮินะ..."
33060-153 = "ทีม I กับทีม V"
33060-154 = "(ภาษามือ)"
33060-155 = "อืม เดินตามทางเดินไปยังชั้นใต้ดิน นี่เป็นภารกิจที่สำคัญที่สุดนะ รู้ใช่ไหม?"
33060-156 = "......."
33060-157 = "(ภาษามือ)"
33060-158 = "ฉันรู้แล้ว... ถึงจะอารมณ์เสียก็อดทนไว้ล่ะ องค์หญิง"
33060-159 = "(พยักหน้า) "
33060-160 = "แล้วคุณซาโอริล่ะคะ?"
33060-161 = "ฉันมีธุระอื่นต้องทำ เสร็จธุระแล้วจะไปสมทบกับทีม V"
33060-162 = "งั้นเราแยกกันตรงนี้"
33060-178 = "......?!"
33060-186 = "อาซึสะจัง...? จะไปไหนเหรอคะ?"
33060-187 = "จะถามอะไรแบบนั้นทำไมล่ะ! ก็ไปห้องน้ำไง"
33060-188 = "แต่ว่าห้องน้ำอยู่ทางโน้น..."
33060-191 = "เอ๋...?"
33060-193 = "......."
33060-194 = "หวืออออออ--!!"
33060-195 = "หืม? เมื่อกี๊มัน... เหมือนเสียงอะไรขาดเลย?"
33060-196 = "สะ... เสียงอะไรน่ะ?! "
33060-199 = "ดะ... เดี๋ยวก่อนนะ?!  อะ... อะไรเนี่ย?! นั่นมัน?!  อะไรลอยอยู่น่ะ!"
33060-200 = "กรี๊ดดดดดด!! "
33060-201 = "(ยังไม่จบอีกเหรอ...?)"
33060-202 = "(ไม่สิ... เธอกำลังพูดว่า นี่เพิ่งเริ่มเองนะ... อย่างนั้นเหรอซาโอริ...!?)"
33060-211 = "ตู้มมมมมมม!!!!!"
33060-213 = "ตอนต่อไป;วันแห่งการมอดไหม้และเถ้าถ่าน (1)"

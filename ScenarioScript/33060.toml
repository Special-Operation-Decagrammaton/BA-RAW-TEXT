33060-53 = "3;히나타;06;하아……. \n#3;stiff\n#3;em;[속상함]\n#3;a"
33060-54 = "[s] \"역시 츠루기는 상냥하네.\""
33060-55 = "3;히나타;04;네? ……네?!\n#3;shake\n#3;em;[?!]"
33060-56 = "[s] \"도와줘서 고마워. 그러니까, 히나타였지?\""
33060-57 = "3;히나타;01;……. 아. 네, 네! 그때 이후 다시 뵙게 되었습니다. 선생님. \n#3;greeting"
33060-58 = "[s] \"그때 시스터후드가 도와줘서 살았어.\""
33060-59 = "3;히나타;02;……네? 아, 아니에요. 그때 별로 저는 도움도 안되었고……."
33060-60 = "3;히나타;06;저는 미련하게 힘만 셀 뿐이라…… 죄송해요…… 이런 몸이라……. \n#3;em;…"
33060-61 = "[s] \"오늘은 시스터들도 참석한 거야?\""
33060-62 = "3;히나타;01;아, 네. 사쿠라코 님의 지시사항이에요."
33060-63 = "3;히나타;02;저번 사건을 계기로 저희 내부 방침이 조금 바뀐 거 같아요."
33060-64 = "3;히나타;01;그동안의 무간섭주의가 저번 사태를 초래했다고 생각하는지, 이제 대외 활동을 좀 더 적극적으로 하기로 했나 봐요……."
33060-65 = "3;히나타;99;사쿠라코 자매님도 곧 여기 도착하실 예정이고……."
33060-66 = "3;히나타;01;그래서 저희 시스터들도 여기에 와서 행사를 돕고 있어요. 저도 이렇게 질서유지라던가, 귀빈들을 안내하거나 하는 일을……."
33060-67 = "3;히나타;02;아, 괜찮다면 선생님께 고성당을 안내해드릴까요?\n#3;em;[반응]"
33060-68 = "[s] \"응, 좋지. 부탁해.\""
33060-69 = "3;히나타;03;네……! 아직 시간도 꽤 남아 있으니…… 그럼 이쪽으로…….\n#3;greeting\n#3;closeup\n#3;em;[반짝]"

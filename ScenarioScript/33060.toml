[translation]
33060-1 = "第6話;エデン条約調印式（２）"
33060-2 = "古聖堂内部・中央ホール"
33060-4 = "[ns] （まだしばらく暇そうだし、てきとうにぶらつこうかな）"
33060-6 = "すみません、業者の方ですか？こちらは入れませんのでご遠慮を。"
33060-7 = "そこ、こっちは関係者専用だ。見物人はあっちの方に。"
33060-8 = "[s1] \"えっと……。\"\n[s2] \"一応関係者です……。\""
33060-9 = "……そこの風紀委員の方、今この線を越えませんでしたか？"
33060-10 = "……そこの風紀委員の方、今この線を越えませんでしたか？"
33060-11 = "は？そっちが線を踏んでたから、どかそうとしたんだけど？"
33060-12 = "もしかしてトリニティのやつら、喧嘩売ってんのか？こうなったら話は早い、取り締まってやる！"
33060-13 = "なっ、急に増員……！？支援を要請します、増援を！"
33060-17 = "きひひっ……"
33060-19 = "ひいっ！？急に委員長！？"
33060-20 = "ぞ、増員どころかツルギ先輩……！？"
33060-21 = "くひひひひひひっ……。"
33060-23 = "ひゃっはあぁぁぁぁっ！！"
33060-24 = "ひ、ひいいいっ？！"
33060-25 = "あ、あの……！みなさん、ここで喧嘩はダメです……。"
33060-29 = "せっかく平和のために、こうして集まったのですから……そ、そうでしょう？ツルギさん？"
33060-30 = "……。"
33060-31 = "……ここにいらっしゃるのは、シャーレの先生だ。"
33060-32 = "覚えておけ。"
33060-35 = "は、はい！"
33060-37 = "き、肝に銘じますっ！"
33060-43 = "[ns] \"えっと、ごめんね……それにツルギ、ありがとう。\""
33060-44 = "……。"
33060-45 = "い、いえ、そんな……とんでもありません、先生。"
33060-46 = "ではその、私は他の任務がありますので……。"
33060-53 = "ふぅ……。"
33060-54 = "[s] \"やっぱりツルギは優しい……。\""
33060-55 = "はい……えっ！？"
33060-56 = "[s] \"助けてくれてありがとう。ヒナタ、だよね？\""
33060-57 = "……あ、はい！あの時以来ですね、先生。"
33060-58 = "[s] \"あの時、シスターフッドが来てくれて助かった。\""
33060-59 = "い、いえ。私はあの時、あまりお役にも立てず……。"
33060-60 = "私はただやたら力があるだけで……あまり役立たずですみません……。"
33060-61 = "[s] \"そんなことないよ。今日は他のシスターたちも？\""
33060-62 = "あ、はい。サクラコ様の指示なんです。"
33060-63 = "前回の事件をきっかけに、方針が少し変わったこともありまして。"
33060-64 = "これまでの無干渉主義がこの前の事態を招いた……そう考えたのかもしれません。これからはもっと積極的に、対外的な活動をされていくとのことで。"
33060-65 = "シスターサクラコも、もうすぐ到着されるかと思います。"
33060-66 = "私たちも基本的には色々と調印式の手伝いと言いますか、色んな方の案内や警備のお手伝いなどを……。"
33060-67 = "あ、よろしければ先生に、古聖堂をご案内いたしましょうか？"
33060-68 = "[s] \"良かったら、お願いしても良い？\""
33060-69 = "はい、今はまだ時間もありますので。それでは、こちらへ……"
33060-72 = "古聖堂内部・回廊"
33060-74 = "[ns] \"すごいところだね。\""
33060-75 = "はい。この「通功の古聖堂」は長い間、廃墟として放置されていましたが……今回ここで調印式を締結することが決まり、大々的な修理が行われたそうです。"
33060-76 = "その決定についてはトリニティのナギサさんと、ゲヘナのマコトさんとが合意したものだと聞きましたが……。"
33060-77 = "それでも全体が修理されたというわけではなく、調印が行われる場所だけのようですね。下の方はまだ廃墟の状態で……。"
33060-78 = "あくまで噂ですが、この古聖堂の地下には大規模なカタコンベが存在するそうです。"
33060-79 = "数十キロにも及ぶ地下墓地……「第一回公会議」の時の記述でも、終わりが見えないほどだったと言われていて……。"
33060-80 = "……あ、こちらの方は塞がれてますね。まだ修理中で危ないからでしょうか。"
33060-81 = "[s] \"色んな歴史がある場所なんだね。\""
33060-82 = "はい。何せ、第一回公会議が開かれたところですから。"
33060-83 = "公会議において締結される戒律というのは、神聖なものです……その神聖さと言いますか、戒律の守護者たちのその名残のような「何か」が、まだここに残っているような感じすらします。"
33060-84 = "[s] \"守護者？\""
33060-85 = "はい、それについては何と言えば良いのでしょう……「約束」というのは、同時に破った時に関するルールが一緒に設けられることが多いですよね？そうでなければ、誰も約束を守らないということもありますし……。"
33060-86 = "そのルール、「制約」の役割を持つ人々のことを、戒律の守護者と呼んだんです。約束を破る者たちに対処するトリニティの武力集団……"
33060-87 = "それが、「ユスティナ聖徒会」です。"
33060-88 = "[s] \"今の正義実現委員会みたいな……？\""
33060-89 = "はい。歴史的には、私たち「シスターフッド」の前身でして……"
33060-93 = "あ、サクラコ様が到着されたみたいですね。ナギサさんの到着もそろそろだそうです。"
33060-94 = "中途半端になってしまってすみませんが、そろそろ行きましょうか。"
33060-96 = "準備はできた？"
33060-97 = "……はい、大丈夫です。ああそういえば万魔殿から、古聖堂まで行くための車を貸してもらいました。"
33060-98 = "……車？どうして？"
33060-99 = "自分たちは今回、最新の飛行船を購入したようで……「空を飛ぶ私たちと綺麗に比較できるように、貴様らは地べたを這って来い」とマコトさんが。"
33060-100 = "……。"
33060-101 = "またそういうところに予算を……まあ、今さらか。これまでずっと調印式への出席をさせまいと邪魔しておいて、最後はこうして用意っていうのも変な話だと思うけれど。"
33060-102 = "イオリやチナツたちも待ってる、急ごう。"
33060-103 = "……。"
33060-104 = "はあ、気に食わないのは分かるけど……言ったでしょう。アコ。"
33060-105 = "別に風紀委員会が解散するわけじゃない、これはただ[ruby=ETO]エデン条約機構[/ruby]という足枷を万魔殿に嵌めるためのもの。"
33060-106 = "……はい、分かってはいるんです。風紀委員会はほとんど変わらないでしょう、そしてマコトには制約が付く。ですが、その時委員長は……"
33060-107 = "……。"
33060-108 = "とりあえず今は、式に向かうのが先。"
33060-109 = "……その話は調印式が終わってから、ゆっくりね。"
33060-111 = "……はい。"
33060-114 = "おっと、噂をすれば影！ゲヘナの万魔殿が、新型飛行船に乗ってやってきたようです！"
33060-120 = "ゲヘナ学園の議長、すなわち生徒会長の[ruby=はぬま]羽沼[/ruby]マコトです！さすがと言いますか、ものすごいカリスマです！多分！あれがゲヘナの生徒会長としての威厳！"
33060-121 = "キキッ……"
33060-123 = "そしてトリニティ総合学園におけるティーパーティーのホスト、[ruby=きりふじ]桐藤[/ruby]ナギサも古聖堂に到着したようです！"
33060-124 = "両学園の主要人物が、次々と集まってきています！"
33060-125 = "そろそろゲヘナの風紀委員長も到着とのことで、周囲の雰囲気はますますヒートアップする一方！皆さん、引き続きこの様子をご覧ください！"
33060-130 = "準備は？"
33060-131 = "……問題無し。"
33060-132 = "は、はい！終わりました、チェックもできてますし、色々と確認も……。"
33060-133 = "あの人形との接触の方は？"
33060-134 = "（スッ、スッ……）"
33060-135 = "……なら問題無さそうだな。全ては整った。"
33060-136 = "こ、これから辛いことになっていくんですね、みんな苦しむんですね……ですが、仕方ありません。"
33060-137 = "……そう、それがこの世界の真実。"
33060-138 = "……。"
33060-140 = "アリウススクワッド、作戦開始"
33060-145 = "巡航ミサイルは？"
33060-146 = "すでに発射済み。これから5分後に、ターゲット地点に着弾する。"
33060-147 = "チームⅡとチームⅢは？"
33060-148 = "つ、通路の前で待機中です……時間に合わせて、作戦地域に突入する予定ですね。"
33060-149 = "古聖堂の崩壊と同時に突入。ミサキとチームⅡはトリニティを、ヒヨリはチームⅢとゲヘナの方を頼む。"
33060-150 = "了解。"
33060-151 = "チームⅡの方はツルギを警戒しろ。チームⅢの方はヒナに気を付けて動け。"
33060-152 = "は、はい！分かりました！ひ、ヒナさんですね……！"
33060-153 = "チームⅠとチームⅤは……"
33060-154 = "（スッ、ススッ……）"
33060-155 = "ああ、通路に沿って地下へ。知っての通り、一番重要な任務だ。"
33060-156 = "……。"
33060-157 = "（ススッ……）"
33060-158 = "姫……分かってる。気分は悪いだろうけど、もう少し我慢してほしい。"
33060-159 = "（……コクリ）"
33060-160 = "えっと、サオリさんは……？"
33060-161 = "私は他に用事がある、それが終わり次第チームⅤに合流予定だ。"
33060-162 = "では、散開。"
33060-178 = "……っ！？"
33060-186 = "あれ、アズサちゃん……？どこに行くんですか？"
33060-187 = "聞かなくても良いでしょ、トイレよ！"
33060-188 = "えっと、ですがトイレはあちらではなく……。"
33060-191 = "……え？"
33060-193 = "……。"
33060-194 = "ヒュオオオオオオォォォン！！"
33060-195 = "今、何か変な音が……。"
33060-196 = "な、なに！？"
33060-199 = "何かが、飛んで……！？"
33060-200 = "きゃあああっ！？"
33060-201 = "（……まだ、終わってなかった？）"
33060-202 = "（いや、これから始まる……？サオリ、まさか……！？）"
33060-211 = "ドカアアァァァァァン！！！"
33060-213 = "次回;火と灰に染まる日（１）"

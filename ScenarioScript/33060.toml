[translation]
33060-1 = "第6話;伊甸園條約簽約儀式（２）"
33060-2 = "古教堂內部．中央大廳"
33060-4 = "[ns]（感覺還會悠閒一段時間，稍微閒晃一下吧）"
33060-6 = "不好意思，請問是業者嗎？這裡禁止進入請見諒。"
33060-7 = "那裡，這裡是相關人員專用的。參觀者在那個方向。"
33060-8 = "[s1]「那個……」\n[s2]「我姑且是相關人員……」"
33060-9 = "……那邊的風紀委員會的成員，剛才沒有越過這條線嗎？"
33060-10 = "……那邊的風紀委員會的成員，剛才沒有越過這條線嗎？"
33060-11 = "哈啊？是妳先踩到線，我才想要移開的耶？"
33060-12 = "難道三一的傢伙們，是在找碴嗎？這樣的話就好說了，把她們抓起來！"
33060-13 = "什，突然有增援……！？請求支援！"
33060-17 = "咿嘻嘻……"
33060-19 = "噫！？突然就是部長！？"
33060-20 = "別，別說增援了，是弦生前輩……！？"
33060-21 = "咕嘻嘻嘻嘻嘻嘻……"
33060-23 = "呀哈啊啊啊啊啊！！"
33060-24 = "噫，噫噫噫噫？！"
33060-25 = "那，那個……！各位，這裡不可以吵架……"
33060-29 = "好不容易為了和平，像這樣聚在一起……對，對吧？弦生同學？"
33060-30 = "……"
33060-31 = "……這邊這位是，夏萊的老師。"
33060-32 = "給我記住。"
33060-35 = "是，是的！"
33060-37 = "銘，銘記在心！"
33060-43 = "[ns]「那個，抱歉哦……還有弦生，謝謝妳。」"
33060-44 = "……"
33060-45 = "不，不會，怎麼會……不敢當，老師。"
33060-46 = "那麼那個，我還有其他任務……"
33060-53 = "呼…… "
33060-54 = "[s]「果然弦生很溫柔……」"
33060-55 = "是的……咦！？"
33060-56 = "[s]「謝謝妳幫了我。妳是，日向吧？」"
33060-57 = "……啊，是的！那之後就沒見過面了呢，老師。"
33060-58 = "[s]「那個時候，修女會過來真是得救了。」"
33060-59 = "不，不會。我那個時候，沒什麼幫上忙……"
33060-60 = "我只是空有一身蠻力……幫不上什麼忙不好意思……"
33060-61 = "[s]「沒有那種事唷。今天其他的修女也來了嗎？」"
33060-62 = "啊，是的。這是櫻子大人的指示。"
33060-63 = "以上次的事件為契機，方針也稍微改變了。"
33060-64 = "長久以來的無干涉主義導致了上次的事態……可能是那麼想的。接下來會更加積極地，展開對外活動。"
33060-65 = "我想櫻子修女，也很快就會抵達了。"
33060-66 = "我們基本上會在各方面協助簽約儀式，以及各種人士的嚮導和警備協助等等……"
33060-67 = "啊，不介意的話，由我帶老師參觀古教堂吧？"
33060-68 = "[s]「不介意的話，可以拜託妳嗎？」"
33060-69 = "好的，現在也還有時間。那麼，請往這邊……"
33060-72 = "古教堂內部．迴廊"
33060-74 = "[ns]「很厲害的地方呢。」"
33060-75 = "是的。雖然這個「通功的古教堂」在很長一段時間裡，被作為廢墟而放置……由於這次決定在這裡締結簽約儀式，似乎進行了大規模的整修。"
33060-76 = "雖然聽說那個決定是三一的渚同學和，格黑娜的真琴同學共同同意的……"
33060-77 = "即使如此也沒有做整體的維修，而是只針對舉行簽約儀式的地方。下方依然處於廢墟狀態……"
33060-78 = "雖然只是傳聞，這個古教堂的地下似乎存在著大規模的地下墓穴。"
33060-79 = "長達數十公里的地下墓地……連「第一次公會議」時的記述，都說是看不見盡頭的程度。"
33060-80 = "……啊，這邊被封住了呢。是因為還在整修中很危險嗎。"
33060-81 = "[s]「是有各種歷史的場所呢。」"
33060-82 = "是的。畢竟，是第一次公會議開辦的地方。"
33060-83 = "在公會議締結的戒律是神聖的東西……#n該說是其神聖性嗎，戒律的守護者們殘留的「某種東西」，感覺似乎還留在這個地方。"
33060-84 = "[s]「守護者？」"
33060-85 = "是的，關於這個該怎麼說呢……所謂的「約定」常常會在簽訂時，連同違反時的規則一起制定對吧？否則就不會有人遵守約定了……"
33060-86 = "而那個規則，也就是持有「制約」職責的人們，就被稱為戒律的守護者。#n負責處理違反約定之人的，三一的武力集團……"
33060-87 = "那就是，「優斯提娜聖徒會」。"
33060-88 = "[s]「類似現在的實現正義部……？」"
33060-89 = "是的。根據歷史，是我們「修女會」的前身……"
33060-93 = "啊，櫻子大人似乎抵達了呢。渚同學似乎也快抵達了。"
33060-94 = "很抱歉，雖然才參觀到一半，不過差不多該出發了。"
33060-96 = "準備好了嗎？"
33060-97 = "……是的，沒問題了。啊啊話說從萬魔殿，借來了前往古教堂的車。"
33060-98 = "……車？為什麼？"
33060-99 = "因為我們這次，購入了最新的飛船……「為了可以和飛在空中的我們漂亮的對比，妳們給我在地上爬著過來」，真琴同學是這麼說的。"
33060-100 = "……"
33060-101 = "又把預算用在那種地方……嘛，事到如今嗎。至今為止一直妨礙人出席簽約儀式，最後這樣準備也很奇怪。"
33060-102 = "伊織和千夏也在等著，快走吧。"
33060-103 = "……"
33060-104 = "哈啊，雖然知道妳很不滿……不過我說過了吧。亞子。"
33060-105 = "並不是風紀委員會解散了，這只是為了把名為[ruby=ETO]伊甸園條約機構[/ruby]的腳鐐套在萬魔殿身上。"
33060-106 = "……是的，我知道。風紀委員會幾乎不會有所改變吧，然後真琴同學會被套上制約。不過，那個時候委員長妳……"
33060-107 = "……"
33060-108 = "總之現在，先前往儀式吧。"
33060-109 = "……那件事等簽約儀式結束了，再慢慢說。"
33060-111 = "……是的。"
33060-114 = "哦，說曹操曹操到！格黑娜的萬魔殿，似乎乘坐著最新型的飛船來了！"
33060-120 = "是格黑娜學園的議長，也就是學生會長的羽沼真琴！#n該說不愧是他嗎，非常驚人的領袖魅力！大概！那就是身為格黑娜學生會長的威嚴！"
33060-121 = "嘻嘻……"
33060-123 = "然後三一綜合學園茶會的主席，桐藤渚也抵達古教堂了！"
33060-124 = "兩學園的主要人物，正漸漸聚集於此！"
33060-125 = "格黑娜的風紀委員長也差不多要抵達了，周圍的氣氛越加火熱！各位，請繼續觀賞！"
33060-130 = "準備呢？"
33060-131 = "……沒問題。"
33060-132 = "是，是的！結束了，也檢查過了，各種確認也……"
33060-133 = "和那個人偶接觸的事呢？"
33060-134 = "（嘶，嘶……）"
33060-135 = "……那就沒問題了吧。全都準備好了。"
33060-136 = "接，接下來會變成難受的事吧，大家會很痛苦呢……不過，也沒辦法。"
33060-137 = "……沒錯，那就是這個世界的真相。"
33060-138 = "……"
33060-140 = "奧利斯小隊，作戰開始"
33060-145 = "巡航導彈呢？"
33060-146 = "已經發射完畢。接下來5分鐘後，著彈於目標地點。"
33060-147 = "小組Ⅱ和小組Ⅲ呢？"
33060-148 = "在，在通道前待機中……預計會配合時機突入作戰地區。"
33060-149 = "古教堂的崩壞同時突入。美咲跟小組Ⅱ負責三一，日和跟小組Ⅲ負責格黑娜，拜託了。"
33060-150 = "了解。"
33060-151 = "小組Ⅱ警戒弦生。小組Ⅲ行動時注意陽奈。"
33060-152 = "是，是的！我知道了！陽，陽奈同學沒錯吧……！"
33060-153 = "小組Ⅰ和小組Ⅴ……"
33060-154 = "（嘶，嘶嘶……）"
33060-155 = "啊啊，沿著通道前往地下。如妳所知，是最重要的任務。"
33060-156 = "……"
33060-157 = "（嘶嘶……）"
33060-158 = "公主……我知道。雖然心情很糟，不過希望可以再忍耐一下。"
33060-159 = "（點頭） "
33060-160 = "那個，沙織同學呢……？"
33060-161 = "我還有其他事要處理。#n結束之後會和小組Ⅴ會合。"
33060-162 = "那麼，散開。"
33060-178 = "……！？"
33060-186 = "梓醬……？要去哪裡呢？"
33060-187 = "這種事不用問吧，廁所啦！"
33060-188 = "那個，但是廁所不在那邊……"
33060-191 = "……咦？"
33060-193 = "……"
33060-194 = "（咻嗡嗡嗡嗡嗡嗡嗡嗡！！）"
33060-195 = "剛才，有奇怪的聲音……"
33060-196 = "什，什麼！？"
33060-199 = "有什麼，在飛……！？"
33060-200 = "呀啊啊啊！？"
33060-201 = "（……還沒，結束嗎？）"
33060-202 = "（不，接下來才要開始……？沙織，該不會……！？）"
33060-211 = "（咚哐哐哐哐哐哐哐哐哐！！！）"
33060-213 = "下一話;染上火與灰燼之日（１）"

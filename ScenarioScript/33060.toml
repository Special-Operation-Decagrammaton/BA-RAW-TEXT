33060-91 = "#clearST"
33060-92 = "#wait;1500"
33060-93 = "3;히나타;02;아, 사쿠라코 님이 도착하셨다고 하네요. 나기사 님도 곧 도착하신다고……."
33060-94 = "3;히나타;03;이제 돌아가야 할 거 같아요, 선생님. 가시죠.\n#3;greeting\n#3;em;[반짝]"

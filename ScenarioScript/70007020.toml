[translation]
70007020-1 = "การพบกันที่ไม่คาดคิด 2"
70007020-2 = "เจ็ด... แปด...!"
70007020-3 = "(เกิน 100 ครั้งแล้วแต่ยังไม่มีวี่แววว่าจะเหนื่อยเลย เหมือนได้เห็นคนคาร์ดิโอเบาๆ มากกว่าเลยนะเนี่ย)"
70007020-4 = "เก้า... สิบ! งั้นก็... 40 ครั้งแล้วมั้ยนะ?"
70007020-5 = "(วะ... ว่าไงนะ 40 ครั้งงั้นเหรอ?! มันเกิน 100 ครั้งไปแล้วนะ?!)"
70007020-6 = "อืม! จำไม่ได้แฮะ หยวนๆ ที่ 30 ครั้งแล้วกัน เพราะยังไงก็ยังไม่เหนื่อยสักนิดเลย! หนึ่ง! สอง!"
70007020-7 = "เอ่อ... ขอโทษนะคะ!"
70007020-8 = "อุ๊ยตาย มีเรื่องอะไรเหรอคะ?"
70007020-9 = "(อ๊ะ! เราเข้ามาขัดจังหวะโดยไม่รู้ตัวเหรอเนี่ย...!)"
70007020-10 = "มะ... ไม่มีอะไรค่ะ! ฉันคงเข้าใจผิดไปชั่วขณะน่ะค่ะ ขอโทษที่มาขัดจังหวะการออกกำลังกายนะคะ"
70007020-11 = "ฮุฮุ คุณนี่น่ารักจังเลยนะคะ"
70007020-12 = "..."
70007020-13 = "แปด เก้า สิบ! ครบ 20 ครั้งแล้ว!"
70007020-15 = "(เมื่อกี้นับแค่ 30 แต่ครั้งนี้ได้น้อยลงไปอีก!?)"
70007020-23 = "100...! ฮู่ว! สดชื่นจริงๆ เลย!"
70007020-24 = "(ไม่ใช่ 100 สิ ทั้งหมดมัน 785 ครั้งต่างหาก... ฉันทำตามจนเกือบจะเป็นลมไปแล้วเลย!)"
70007020-25 = "(สุดยอดเลย... นี่สินะที่เค้าเรียกกันว่าสตรีเหล็ก)"
70007020-27 = "ต่อไปก็ต้องไปยืดเส้นยืดสายบนลู่วิ่งสักหน่อย!"
70007020-28 = "(ปรับความชันลู่วิ่งขนาดนั้นเลยเหรอ นี่มันไม่ใช่การเดินชันธรรมดา แต่เป็นการเดินขึ้นเขาแล้วนะ!!)"
70007020-30 = "ต่อด้วยเครื่องกรรเชียงบก!"
70007020-31 = "(ถ้าดึงเร็วขนาดนั้น มันจะกลายเป็นการพายเรือเอานะ!)"
70007020-33 = "ต่อไปก็เล่นขาด้วยเครื่องเลกเพรส!"
70007020-40 = "ดีละ! ต่อไปก็..."
70007020-41 = "(แค่ทำตามก็แทบไม่ไหวแล้ว!)"
70007020-42 = "(นี่สินะ... ความรู้สึก 'เหนื่อย' ที่ไม่ได้รู้สึกมานานแล้ว...)"
70007020-43 = "(ถึงร่างกายจะแตกเป็นเสี่ยงๆ แต่กลับรู้สึกได้ถึงความร้อนแรงเหมือนลาวาที่พุ่งขึ้นมาเลย!)"
70007020-49 = "ขะ... ขออภัยด้วยค่ะ!! คุณสมาชิก!"
70007020-50 = "ตอนนี้ห้าทุ่มแล้วนะคะ เราต้องปิดทำการแล้วค่ะ!"
70007020-52 = "อุ๊ยตาย... อย่างนั้นเหรอคะ? นึกว่ายังกลางวันอยู่เสียอีกค่ะ"
70007020-53 = "แฮ่ก... แฮ่ก... ห้าทุ่ม... ยังไหว... อยู่..."
70007020-54 = "แค่เห็นก็รู้สึกปวดกล้ามเนื้อแทนแล้วนะคะ! ขอร้องละ ช่วยกลับกันเถอะค่ะ!"
70007020-55 = "ฮุฮุ ทุกการออกกำลังกายย่อมมีเซ็ตสุดท้าย ถึงจะน่าเสียดาย แต่วันนี้คงต้องจบเท่านี้นะคะ"
70007020-56 = "ถ้างั้นดิฉันจะกลับก่อนค่ะ"
70007020-65 = "ฮือ..."
70007020-66 = "รู้สึกเหมือนเอาตัวไปปั่นในเครื่องซักผ้าเลย..."
70007020-67 = "คือว่า..."
70007020-68 = "คะ?!"
70007020-69 = "ดิฉันไม่ค่อยกล้าชวนคนอื่นคุยก่อนน่ะค่ะ..."
70007020-70 = "แต่ว่าวันนี้ดิฉันดีใจมากที่มีเพื่อนออกกำลังกาย"
70007020-71 = "ที่จริงดิฉันสังเกตคุณได้ตั้งแต่ตอนเช้าแล้วค่ะ"
70007020-72 = "ทั้งความเชี่ยวชาญของกุลสตรี และสายตาของเพื่อนร่วมทางที่สวยสดใสและมีพลัง"
70007020-73 = "ดิฉันรู้สึกได้ถึงสิ่งเหล่านั้นตลอดทั้งวันเลยค่ะ"
70007020-74 = "ถ้าฉันเสียมารยาท ฉันต้องขอโทษด้วยนะคะ ฉันเผลอส่องคุณอย่างชื่นชมโดยไม่รู้ตัวน่ะค่ะ..."
70007020-75 = "อุ๊ยตาย อ่อนน้อมถ่อมตนด้วย! นี่คือความกล้าหาญที่หาได้ยากในโลกที่หยาบกระด้างนี้นะคะ"
70007020-76 = "ชะ... ชมเกินไปแล้วค่ะ!"
70007020-77 = "โฮะๆ คุณน่ารักน่าเอ็นดูมากเลยค่ะ!"
70007020-82 = "อุ๊ยตาย เวลาล่วงเลยมาขนาดนี้แล้ว!"
70007020-83 = "ดิฉันมีนัดสอนออกกำลังกายแบบ 3 วันให้แก๊งหมวกกันน็อกน่ะค่ะ"
70007020-84 = "คงต้องเสียมารยาทและขอตัวก่อนนะคะ"
70007020-85 = "ออกกำลังกายแบบ 3 วันเหรอคะ เป็นการแบ่งออกกำลังอย่างมีมาตรฐานเลยนะคะ"
70007020-86 = "ดึกขนาดนี้แล้ว แต่คุณยังใส่ใจการออกกำลังกายของคนอื่นอีก ขยันมากเลยนะคะ"
70007020-87 = "...?"
70007020-88 = "เอ่อ... ถ้าไม่เป็นการเสียมารยาท ฉันขอถามชื่อของคุณได้มั้ยคะ?"
70007020-89 = "ฉันโอโทฮานะ สึมิเระ เป็นหัวหน้าชมรมออกกำลังกายของมิลเลเนียมค่ะ"
70007020-90 = "อุ๊ยตาย สงสัยดิฉันจะสติเตลิดไปแล้วค่ะ ดิฉันยังไม่ได้แนะนำตัวอีกเหรอเนี่ย"
70007020-91 = "ดิฉันชื่อคุริฮามะ อาเคมิค่ะ ยินดีที่ได้รู้จักนะคะ คุณโอโทฮานะ สึมิเระ ดีใจจริงๆ ที่ได้เจอคุณค่ะ"
70007020-95 = "แก๊งหมวกกันน็อกใจร้อนกันจริงเชียวค่ะ คงอยากรีบออกกำลังกายแล้ว"
70007020-96 = "เพิ่งได้แนะนำตัวกันแท้ๆ เลย น่าเสียดายนะคะที่ต้องอำลากันแล้ว..."
70007020-97 = "วันนี้ขอบคุณที่มาคาร์ดิโอเป็นเพื่อนกันนะคะ!"
70007020-98 = "หวังว่าเราจะบังเอิญเจอกันตามท้องถนนข้างนอกนะคะ! "
70007020-102 = "ดีใจจังเลยค่ะที่ฉันได้เจอคนที่ทั้งร่างกายแข็งแรงและมีหัวใจที่อบอุ่นแบบนี้..."
70007020-103 = "แม้จะต้องเดินเท้ามาไกลเพราะห้องออกกำลังกายที่ใช้เป็นประจำกำลังซ่อมบำรุงก็เถอะ"
70007020-104 = "แต่มันก็ทำให้ฉันบังเอิญได้เจอคนดีๆ อย่างคุณ ถือว่าเป็นโชคดีของฉันเลยนะคะ"
70007020-108 = "?"
70007020-110 = "เพิ่งได้แนะนำตัวกันแท้ๆ เลย น่าเสียดายนะคะที่ต้องอำลากันแล้ว..."
70007020-112 = "คุณคนนั้น... บอกว่า..."
70007020-114 = "วันนี้ขอบคุณที่มาคาร์ดิโอเป็นเพื่อนกันนะคะ!"
70007020-117 = "เล่นเวทไปตั้ง 17 ชั่วโมง นั่นเรียกว่าคาร์ดิโองั้นเหรอคะ?!"
70007020-119 = "และนี่ก็คือเหตุบังเอิญที่เกิดขึ้นเมื่อคราวก่อนค่ะ..."
70007020-120 = "มันก็เป็นความทรงจำที่... น่าขนลุกและน่าประทับใจในเวลาเดียวกันค่ะ"
70007020-121 = "รุ่นพี่กำลังจะบอกว่านี่คือเรื่องประหลาดเหรอคะ?"
70007020-122 = "แต่ก็น่าทึ่งมากเลยนะคะ คนคนนั้นทำให้รุ่นพี่สึมิเระเหนื่อยได้เลย"
70007020-123 = "ฉันไม่ได้เหนื่อยค่ะ "
70007020-124 = "ฉันแค่ต้องใช้แรงมากกว่าปกติเท่านั้นค่ะ เรย์"
70007020-125 = "ค่ะๆ แล้วคนคนนั้นชื่ออะไรเหรอคะ? เป็นนักเรียนโรงเรียนเราหรือเปล่านะ?"
70007020-126 = "เห็นบอกว่าชื่อ \"คุริฮามะ อาเคมิ\" ค่ะ"
70007020-127 = "คุริฮามะ... อาเค... มิ..."
70007020-128 = "เอ๊ะ??"
70007020-132 = "ชื่อนี้ไม่ได้อยู่ในรายชื่อนักเบสบอล งั้นก็ไม่ใช่นักกีฬาสินะคะ "
70007020-133 = "ฉันไม่เคยพูดว่าคุณคนนั้นเป็นนักเบสบอลนะคะ"
70007020-134 = "เอาเถอะค่ะ สรุปว่าได้ทำความรู้จักจนเป็นเพื่อนกันแล้ว แต่ไม่ได้แลกเบอร์โทรศัพท์กันไว้เหรอคะ?"
70007020-135 = "เรย์ ฉันกับคุณคนนั้นคือ 'คนประเภทเดียวกัน' นะคะ ถึงแม้ว่าฉันจะยังต้องเรียนรู้จากคุณคนนั้น#nอีกมากก็เถอะค่ะ"
70007020-136 = "แต่ถึงยังไง การที่ 'คนประเภทเดียวกัน' อย่างพวกเราได้บังเอิญมาเจอกัน ก็ถือเป็นโชคชะตาค่ะ"
70007020-141 = "ไหนๆ ก็พูดถึงเรื่องนี้กันแล้ว งั้นเรย์ก็ไปด้วยกันสิคะ ถ้าฉันกับคุณคนนั้นรวมพลังกัน เราน่าจะช่วยฝึกให้เรย์เป็นนักเบสบอลที่ยอดเยี่ยมกว่านี้ได้นะคะ"
70007020-142 = "ระ... รุ่นพี่? แต่ฉันเพิ่งกลับมาจากการซ้อมเมื่อกี้เอง... นะคะ??"
70007020-143 = "รุ่นพี่??"
70007020-149 = "รุ่นพี่!!!!!!!"
70007020-150 = "การพบกันที่ไม่คาดคิด"

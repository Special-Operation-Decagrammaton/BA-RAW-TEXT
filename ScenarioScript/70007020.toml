[translation]
70007020-1 = "偶然邂逅的你（２）"
70007020-2 = "七，八……！"
70007020-3 = "（都已經超過一百下了，姿勢卻絲毫不亂……就像在做輕鬆的有氧訓練一樣）"
70007020-4 = "……九……十！#n這樣就……做完四十下了嗎？"
70007020-5 = "（四……四十！？明明已經超過一百下了啊！？）"
70007020-6 = "嗯！因為肌肉完全沒感受到刺激，就當作是三十下吧！#n一！二！"
70007020-7 = "那……那個！"
70007020-8 = "哎呀，有什麼事嗎？"
70007020-9 = "（啊！我不知不覺就跟著他的節奏一起運動了……！）"
70007020-10 = "沒，沒事！#n只是我剛才有點搞錯了而已，抱歉打擾你運動了。"
70007020-11 = "呵呵，您真是太親切了。"
70007020-12 = "……"
70007020-13 = "八，九……這樣就二十下了！"
70007020-15 = "（剛才不是三十嗎！怎麼又變得更少了！？）"
70007020-23 = "這樣就……做完一百下了！#n呼！真舒服！"
70007020-24 = "（實際上不是一百，而是七百八十五下……差點就跟著做到昏過去了！）"
70007020-25 = "（還真是……名符其實如鋼鐵般的體力啊）"
70007020-27 = "接下來用跑步機放鬆一下腿部吧！"
70007020-28 = "（跑步機的傾斜度調得這麼高，這已經不是跑步而是登山了吧！！）"
70007020-30 = "接下來是划船機！"
70007020-31 = "（划得這麼快，根本要變成摩托快艇了吧！）"
70007020-33 = "接下來用腿舉機鍛鍊下半身！"
70007020-40 = "很好！接下來是……"
70007020-41 = "（光是跟著做就已經累到不行了！）"
70007020-42 = "（這就是……我早已遺忘的「疲倦感」嗎……）"
70007020-43 = "（雖然身體就像快散掉了一樣，體內卻湧現出了如熔岩般滾燙的熱情！）"
70007020-49 = "那，那個！！兩位會員！"
70007020-50 = "現在已經十一點，要打烊了！#n麻煩兩位收拾一下！"
70007020-52 = "哎呀，是嗎？我還以為才中午左右呢。"
70007020-53 = "呼……呼……十一點……？#n我還……完全沒問題……"
70007020-54 = "光看就覺得肌肉痠痛了！拜託快回去吧！"
70007020-55 = "呵呵，所有運動都有結束的時候。#n雖然可惜，不過今天就到此為止吧。"
70007020-56 = "那麼，小女子就先告辭了。"
70007020-65 = "唔……"
70007020-66 = "全身就像被丟進洗衣機裡攪過一樣……"
70007020-67 = "那個……"
70007020-68 = "是！？"
70007020-69 = "冒昧向你搭話，雖然有些羞怯……"
70007020-70 = "不過今天能有一起運動的夥伴，小女子真的很開心。"
70007020-71 = "其實我從早上開始就在注意您了。"
70007020-72 = "身為同樣追求大和撫子的素養──也就是力量與純潔的同伴……"
70007020-73 = "今天一整天，我都能感受到您的視線。"
70007020-74 = "如果有所冒犯的話，真的很抱歉。#n我不自覺地看呆了……"
70007020-75 = "哎呀，居然還如此謙虛！#n在這粗鄙無禮的世道中，真是難得的浩然之氣呢。"
70007020-76 = "過……過獎了！"
70007020-77 = "呵呵，真是靦腆又惹人喜愛！"
70007020-82 = "哎呀，時間已經這麼晚了！"
70007020-83 = "小女子已經和夥伴約好，要幫忙安排頭盔團員們的三分化訓練。"
70007020-84 = "雖然失禮，但我恐怕得先告辭了。"
70007020-85 = "三分化訓練啊……真是標準的分部位訓練呢。"
70007020-86 = "都這麼晚了還在替他人的訓練操心，真是非常認真負責的人啊。"
70007020-87 = "……？"
70007020-88 = "那個，如果不會太冒昧的話……可以請教你的名字嗎？"
70007020-89 = "我是千年學園訓練部的部長，乙花堇。"
70007020-90 = "哎呀，小女子也真是的，竟然到現在還沒自我介紹。"
70007020-91 = "小女子是栗浜家的明美。#n今日能與乙花家的堇小姐相遇，實在無比榮幸。"
70007020-95 = "在這人人心浮氣躁的世道，您真是難得的典範。"
70007020-96 = "縱使在這欣喜的相逢之後，終將迎來令人遺憾的分別……"
70007020-97 = "今日能與您一同進行有氧運動，小女子十分感謝！"
70007020-98 = "希望未來還能有幸在路上再度相逢！"
70007020-102 = "居然能遇見體態與心態都如此端正的人……"
70007020-103 = "雖然是因為意料之外的維修工程而跑了這一趟……"
70007020-104 = "能夠巧遇這麼優秀的人，真是太好了。"
70007020-108 = "？"
70007020-110 = "縱使在這欣喜的相逢之後，終將迎來令人遺憾的分別……"
70007020-112 = "那個人，莫非……"
70007020-114 = "今日能與您一同進行有氧運動，小女子十分感謝！"
70007020-117 = "只把十七小時的重量訓練視為有氧運動嗎！？"
70007020-119 = "……以上就是上次那起奇妙事件的來龍去脈。"
70007020-120 = "既令人毛骨悚然……同時也是美好的回憶。"
70007020-121 = "前輩，你該不會把它當成什麼怪談之類的吧。"
70007020-122 = "不過居然能讓堇前輩累到那種程度，想想還真厲害呢。"
70007020-123 = "我沒有累。"
70007020-124 = "只是比平時更有刺激感而已，莉同學。"
70007020-125 = "是是是～所以那個人叫什麼名字？是我們學園的人嗎？"
70007020-126 = "他說自己叫「栗浜明美」。"
70007020-127 = "栗浜……明……美……"
70007020-128 = "咦？？"
70007020-132 = "棒球選手的名單裡沒有這個名字，所以不是球員啊。"
70007020-133 = "我從沒說過他是棒球選手吧。"
70007020-134 = "話說你們都已經成為朋友了，結果竟然沒有交換聯絡方式嗎？"
70007020-135 = "莉同學，我和那個人是「同類」。#n當然我還有很多地方需要向他學習……"
70007020-136 = "不過像我們這樣的「同類」，注定會在某個地方再次相遇。"
70007020-141 = "既然話都說到這裡了，莉同學不如也一起來吧？#n如果能結合那個人和我的力量，一定能把你鍛鍊成更優秀的棒球選手。"
70007020-142 = "前，前輩？我才剛練習回來耶……"
70007020-143 = "前輩？？"
70007020-149 = "前輩！！！！！！！"
70007020-150 = "偶然邂逅的你"

[translation]
70007020-1 = "出会いは突然に（２）"
70007020-2 = "しち！はち……！"
70007020-3 = "（100回を超えてもフォームが乱れません。まるで、軽いランニングでもしているかのよう……）"
70007020-4 = "きゅう！じゅう！さて……これで40回目、でしたかしら？"
70007020-5 = "（よ、よんじゅう！？どう見ても100回はやっています！）"
70007020-6 = "んー……まだ負荷が足りていませんわ。30回としておきましょう……いち！に！"
70007020-7 = "あ、あのっ……！"
70007020-8 = "あら、どうなさいましたの？"
70007020-9 = "（思わず声をかけてしまいました……！）"
70007020-10 = "い、いえ！なんでもありません。トレーニングの邪魔をしてしまい、失礼しました。"
70007020-11 = "うふふ、面白いお方。"
70007020-12 = "……"
70007020-13 = "はち！きゅう、これで20回ですわ！"
70007020-15 = "（さっきは30回だったはず！あきらかに減ってますよね！？）"
70007020-23 = "これで……100回！ふう、爽快ですわね！"
70007020-24 = "（正確には785回です……！途中で気を失うかと思いました……！）"
70007020-25 = "（筋肉だけでなく、体力も鋼のようですね……）"
70007020-27 = "次はランニングマシンで足をほぐしますわ！"
70007020-28 = "（ランニングマシンの傾斜をこれほど高く！？……ほぼ垂直の壁です！）"
70007020-30 = "続いてローイングマシン、行きますわ！……ふんっ！"
70007020-31 = "（この速さで漕いだら、もはやモーターボートです！）"
70007020-33 = "次はレッグプレスで下半身を！"
70007020-40 = "では次は……！"
70007020-41 = "（ついていくだけで、もう限界です……！）"
70007020-42 = "（この感覚……私が長い間忘れていた「疲労感」ですね）"
70007020-43 = "（それでも、損傷した筋繊維の奥から、マグマのように情熱が湧いてきます！）"
70007020-49 = "あ、あの、お客様がた！"
70007020-50 = "もう11時です！そろそろ閉店時間となりますので、お片付けをお願いします！"
70007020-52 = "あら、もうそんなお時間なのですね。てっきり、まだお昼頃かと思いました。"
70007020-53 = "11時……？まだまだ……いけます……。"
70007020-54 = "見ているこちらが筋肉痛になりそうです！ どうかお引き取りください……！"
70007020-55 = "全ての運動には終わりがあるもの……少し名残惜しいですが、今日はお開きといたしましょうか。うふふ。"
70007020-56 = "それでは、私はこれにて失礼いたしますわ。"
70007020-65 = "うぅ……"
70007020-66 = "全身を洗濯機で回されたような気分です……。"
70007020-67 = "あの……"
70007020-68 = "はいっ！？"
70007020-69 = "こうして直接お声をかけるのは、少々照れますわね……。"
70007020-70 = "今日、トレーニングを共にすることができたこと、とても嬉しく思いますわ。"
70007020-71 = "実は、朝からあなたの視線を感じていましたの。"
70007020-72 = "品格と清らかさを尊びつつ、さらなる力を追求するその熱いまなざし……"
70007020-73 = "直接肌で感じられて、とても光栄でしたわ。"
70007020-74 = "申し訳ありません。つい、見惚れてしまいまして……。"
70007020-75 = "まあ、謙虚でもいらっしゃる！この荒れた世の中で、これほど高貴な方にお会いできるだなんて！"
70007020-76 = "そ、そんな……恐縮です！"
70007020-77 = "うふふ。はにかむ姿も可愛らしいですわね。"
70007020-82 = "まあ、もうこんな時間でしたのね！"
70007020-83 = "この後、仲間からヘルメット団を「3分割」してほしいと頼まれておりますの……。"
70007020-84 = "名残惜しいですが、これにて失礼させていただきますわ。"
70007020-85 = "3分割……曜日ごとに鍛える部位を分ける、定番のトレーニング法ですね。"
70007020-86 = "こんな遅くまで他の方のトレーニングを気にかけるなんて、本当に真摯な方です。"
70007020-87 = "……？"
70007020-88 = "あの、もしご迷惑でなければ、お名前をお伺いしてもよろしいでしょうか？"
70007020-89 = "私はミレニアムのトレーニング部部長、[ruby=おとはな]乙花[/ruby]スミレと申します。"
70007020-90 = "まあ、私ったらとんだ失礼を。あらためて、ご挨拶させていただきます。"
70007020-91 = "私は[ruby=くりはま]栗浜[/ruby]家のアケミと申します。[ruby=おとはな]乙花[/ruby]スミレさん。今日はお会いできてとても光栄でしたわ。"
70007020-95 = "あらあら、本当にせっかちですこと。"
70007020-96 = "それでは、名残惜しいですが……"
70007020-97 = "有酸素運動メニューをご一緒できたこと、心より感謝します。"
70007020-98 = "またこうしてお会いできることを願っておりますわ！"
70007020-102 = "あれほどまでに、身も心も鍛え上げた方とトレーニングができるなんて……"
70007020-103 = "予期せぬ工事から遠くのジムまで足を運んだことで、"
70007020-104 = "素晴らしい出会いがありました……"
70007020-108 = "？"
70007020-110 = "それでは、名残惜しいですが……"
70007020-112 = "あの方、まさか……！"
70007020-114 = "有酸素運動メニューをご一緒できたこと、心より感謝します。"
70007020-117 = "17時間ものウェイトトレーニングが……有酸素運動だったんですか……！？"
70007020-119 = "……これが、先日私が経験した奇妙な出来事です。"
70007020-120 = "恐ろしくもあり、眩しくもあり……記憶に残る一日となりました。"
70007020-121 = "……怪談か何かですか？"
70007020-122 = "すごいですね、先輩を疲れさせるなんて。"
70007020-123 = "疲れてなどおりません！ "
70007020-124 = "ただ、いつもより負荷が高かった。それだけですよレイさん。 "
70007020-125 = "はいはい。それで、その方のお名前は？ミレニアムの生徒ですか？"
70007020-126 = "[ruby=くりはま]栗浜[/ruby]アケミさんと名乗っていました。"
70007020-127 = "[ruby=くりはま]栗浜[/ruby]……アケミ……"
70007020-128 = "ええっ！？ "
70007020-132 = "……野球選手にはいませんね。 "
70007020-133 = "一度も野球選手だとは言っておりませんが……"
70007020-134 = "友達になったなら、連絡先とかは交換してないんです？"
70007020-135 = "レイさん、私とあの方は同じ道を往く「仲間」なのです。もちろん、私には学ばなければならないことも多いですが……。"
70007020-136 = "同じ道を歩む以上、またどこかで必ず出会う。そういう運命なんですよ。"
70007020-141 = "よければ、レイさんも一緒にどうですか？あの方と私の力が合わせれば、レイさんをより優れた野球選手に鍛え上げられるかと。"
70007020-142 = "せ、先輩？さっきまで練習してきたばかりですけど……？"
70007020-143 = "先輩……？"
70007020-149 = "スミレ先輩ーー！"
70007020-150 = "出会いは突然に"

[translation]
70007020-1 = "Met You by Chance 2"
70007020-2 = "Seven... Eight...!"
70007020-3 = "(Her form is still rock-solid even after hundreds of reps. And she's treating it like a light jog.)"
70007020-4 = "...Nine... Ten! Okay... Was that forty total?"
70007020-5 = "(F-Forty?! Not even close! I was watching VERY intensely!)"
70007020-6 = "Mm! Let's just round down to thirty, since I didn't even break a sweat. One! Two!"
70007020-7 = "P-Pardon me!"
70007020-8 = "Yes, dear? What is it?"
70007020-9 = "(Ah! Why am I interrupting? This is a serious breach of gym etiquette!)"
70007020-10 = "I-It's nothing! E-Enjoy your workout, that's all!"
70007020-11 = "Heh, you're such a sweetheart."
70007020-12 = "..."
70007020-13 = "Eight, nine, and that's twenty total!"
70007020-15 = "(Didn't she say it was thirty last time?!)"
70007020-23 = "And there we have...a hundred! Phew! So refreshing!"
70007020-24 = "(That was 785 reps... I almost passed out while following along!)"
70007020-25 = "(She has superhuman stamina...and questionable math skills!)"
70007020-27 = "Can't skip leg day. How about a warm-up on the treadmill?"
70007020-28 = "(She's already running on the treadmill at a mountain incline!)"
70007020-30 = "Let's get rowing!"
70007020-31 = "(With that speed, she wouldn't need a motor!)"
70007020-33 = "Now, let's get serious on the leg press!"
70007020-40 = "Marvelous! And now..."
70007020-41 = "(I can't keep pace with her like this!)"
70007020-42 = "(So, this is what \"tired\" feels like! It's been so long...)"
70007020-43 = "(Even though my body's about to break, I feel my passion burn like never before!)"
70007020-49 = "Patrons!"
70007020-50 = "It's almost 11—closing time! Finish strong, and have a healthy night!"
70007020-52 = "My my, time flies! I thought it was barely noon!"
70007020-53 = "*pant* *pant* Yeah...I...hardly...broke a sweat!"
70007020-54 = "That means you two! I ache just looking at you! Please, leave!"
70007020-55 = "Heh. What a shame to part, but all good things come to an end!"
70007020-56 = "Now then, I must take my leave."
70007020-65 = "Ugh..."
70007020-66 = "My whole body feels like it's been through a spin cycle..."
70007020-67 = "Um..."
70007020-68 = "What?!"
70007020-69 = "I hope this isn't too awkward..."
70007020-70 = "But I appreciated you working out alongside me today."
70007020-71 = "You see, I've had my eye on you since this morning."
70007020-72 = "As our gazes locked, I perceived the aura of a kindred spirit."
70007020-73 = "I recognized a true lady who cultivates strength and elegance in everything she does."
70007020-74 = "I'm sorry I stared at you! I was just so...taken, and I—"
70007020-75 = "And so polite! You're a rare find in the cruel, heartless world."
70007020-76 = "Y-You're too kind!"
70007020-77 = "Heehee. How cute. How lovely!"
70007020-82 = "Oh my, look at the time!"
70007020-83 = "I need to split a few Helmet Gangsters into 3 pieces. Duty calls!"
70007020-84 = "Please forgive my rudeness, but I must depart."
70007020-85 = "A 3 split... Of course! That's standard training."
70007020-86 = "I didn't know personal trainers worked this late. How diligent!"
70007020-87 = "...?"
70007020-88 = "Excuse me. I just wanted to introduce myself..."
70007020-89 = "I'm Otohana Sumire, president of the Millennium Athletics Training Club!"
70007020-90 = "...And here I've been so improper! I didn't offer my name!"
70007020-91 = "I'm Akemi, of the Kurihama family. The pleasure was mine, Miss Sumire."
70007020-95 = "How...rude. Such a rush with these people!"
70007020-96 = "What a shame to part after such a lovely meeting."
70007020-97 = "That said...thank you for joining me for cardio training. The hours simply flew by!"
70007020-98 = "It's a small world. May fate bring us together once more! "
70007020-102 = "She was so...healthy! And not just in her body, but in her positive attitude!"
70007020-103 = "And all this happened because I was forced to switch gyms."
70007020-104 = "What a blessing to meet someone like this, all by chance."
70007020-108 = "Wha...?"
70007020-110 = "What a shame to part after such a lovely meeting."
70007020-112 = "That's what she said..."
70007020-114 = "That said...thank you for joining me for cardio training. The hours simply flew by!"
70007020-117 = "We lifted weights for 17 hours, and that was all cardio for her!"
70007020-119 = "...So, that's how the other gym went."
70007020-120 = "It was...so horrifying yet invigoratingly inspiring all at once..."
70007020-121 = "Sumire, you're sure this wasn't some nightmare workout hallucination?"
70007020-122 = "She must have been incredible to wear YOU out."
70007020-123 = "I wasn't worn out. "
70007020-124 = "I was simply more...stimulated, Rei."
70007020-125 = "...Sure. So, what was her name again? What's her school?"
70007020-126 = "\"Kurihama Akemi.\" She's not a student here."
70007020-127 = "Kurihama... Ake...mi..."
70007020-128 = "Eh? "
70007020-132 = "I've never seen her on any baseball rosters... "
70007020-133 = "I never said she was a player!"
70007020-134 = "Whatever. You're the one who couldn't even get her number."
70007020-135 = "Rei, we're \"kindred spirits.\" We've surpassed such things...though there's still so much to learn..."
70007020-136 = "No worries. Spirits as kindred as ours are destined to reunite."
70007020-141 = "I'll call you the next time I find her, Rei. I bet she could mold you into a baseball all-star."
70007020-142 = "S-Sumire? But I just got back from training!"
70007020-143 = "Sumire?"
70007020-149 = "Sumire!"
70007020-150 = "Met You by Chance"

[translation]
10004030-1 = "Episode 3;Petty Revenge"
10004030-2 = "Small Park Near Plum Blossom"
10004030-3 = "We're here!"
10004030-4 = "[s1] \"Isn't this place a...?\"\n[s2] \"What are we doing at a park?\""
10004030-5 = "It's a small park within the Shanhaijing district."
10004030-6 = "It's a small park within the Shanhaijing district."
10004030-7 = "It's close to Plum Blossom Garden, and hardly anyone visits, so it's a good place to enjoy some solitude."
10004030-8 = "I often come here on my days off..."
10004030-9 = "I mean, I've seen Shun come here often to relax!"
10004030-11 = "There are a lot of good places to rest in this park, but this spot is my absolute favorite!"
10004030-12 = "Look! The chairs and table are all made out of tree stumps!"
10004030-13 = "The height of the table is perfect for supporting me when I sit in this chair."
10004030-14 = "So I can rest without hurting my back!"
10004030-15 = "[s3] \"Support you?\"\n[s4] \"Hurting your back?\""
10004030-18 = "Oh. U-Um, well..."
10004030-19 = "I mean, when I get older, my figure...you never know..."
10004030-20 = "I-I have big potential, you know!"
10004030-21 = "[s5] \"I...see.\"\n[s6] \"That's another student's line.\""
10004030-22 = "A-Anyway!"
10004030-23 = "A-Anyway!"
10004030-24 = "We're already at the park, so let's play together!"
10004030-26 = "I think the seesaw over there would be fun, and the spring horse over there looks fun too."
10004030-27 = "Oh, there are swings over there!"
10004030-28 = "I've always wanted someone to push me on the swing. Let's do that, Sensei!"
10004030-29 = "[s] \"Like I said, we need to find Shun first.\""
10004030-30 = "But..."
10004030-35 = "Huh? I didn't expect to see you here, Sensei."
10004030-36 = "K-Kokona? What are you doing here?"
10004030-37 = "Oh, who's this little girl?"
10004030-43 = "Are you a new Plum Blossom Garden student? I've never seen you before..."
10004030-44 = "Y-Yes! My name is Shunling, and I was just transferred here not too long ago!"
10004030-45 = "(H-Huh? Even Kokona doesn't recognize me?!)"
10004030-46 = "(That's a relief. It would have been embarrassing if she saw me acting so childish in front of Sensei with this body.)"
10004030-47 = "(But it's still disappointing. I'm her big sister. How can she not recognize me just because I look a little younger...?)"
10004030-48 = "You look strangely familiar... Are you one of Shun's students?"
10004030-49 = "But where could she have gone off to? I thought I might find her here."
10004030-50 = "[s] \"Have you been looking for Shun too?\""
10004030-51 = "Yes. I haven't been able to get ahold of her for a while."
10004030-52 = "She disappeared today without a word, so I ended up having to prepare snacks for the students in her place."
10004030-53 = "(Wait! It was Kokona's job to prepare snacks for the Sunflower class!)"
10004030-54 = "Come to think of it, she's been a little off lately..."
10004030-55 = "Well, I'm sure she's obsessing over something silly again."
10004030-56 = "Worries about getting older, rough skin… I don't know why she worries about silly things like that."
10004030-57 = "(Th-They're not silly! Those things are very important to me!)"
10004030-58 = "She also tells me every day that she's worried about gaining weight, but she can't stop eating sweets. It's like she's still a child."
10004030-59 = "Well, maybe she lost herself eating tanghulu somewhere."
10004030-60 = "(Don't say these things in front of [USERNAME] Sensei...)"
10004030-61 = "(I'll get you for this, Kokona!)"
10004030-62 = "But Kokona, you have childish tastes too. You say carrots are bitter and gross, so you always hide them instead of eating them!"
10004030-63 = "H-Huh? How did you know that?"
10004030-64 = "I heard all about it from Shun. Instructor Kokona always complains, just like a picky little kid."
10004030-65 = "Ugh. Why is she talking about me like that to the students?"
10004030-66 = "Ahem. You probably don't understand because you're too young, but I'm a mature lady."
10004030-67 = "And as a lady, I have certain tastes, and I just happen to dislike carrots."
10004030-68 = "A real lady would at least try to eat food that she doesn't particularly like."
10004030-69 = "Besides, if she was really all grown up, she wouldn't be doing banzai stretches to make herself taller every morning!"
10004030-70 = "H-How did you...? I snuck out super early in the morning so that no one would see me!"
10004030-71 = "Those exercises won't do much for your height anyway. President Kisaki of Genryumon worked really hard on those exercises, but even she says they didn't work in the end."
10004030-76 = "Look, Kokona, if you only eat what you like and bad-mouth your older sister, you'll never grow out of being a little kid!"
10004030-81 = "Ugh... Ughhh!"
10004030-82 = "You! I'll remember your face! You'll pay for this!"
10004030-87 = "People who say things like that are all bark and no bite. Hmph!"
10004030-90 = "(I never knew how liberating it could be to just unload on someone like that!)"
10004030-91 = "(I can get away with all sorts of things. This is the best!)"
10004030-92 = "[s] \"Shunling...\""
10004030-93 = "O-Oh. I might have gone too far..."
10004030-94 = "[s] \"It's rude to make fun of an older girl.\""
10004030-95 = "I'm actually the one who's older..."
10004030-96 = "...but fine. I guess I was being too mean. I'm sorry."
10004030-97 = "[s] \"Make sure to apologize to Kokona next time you see her.\""
10004030-98 = "Okay! Will do, Sensei!"
10004030-99 = "Um..."
10004030-100 = "It looks like Shun isn't here either, so shall we move on?"
10004030-104 = "[ns] \"W-Wait, Shunling!\""

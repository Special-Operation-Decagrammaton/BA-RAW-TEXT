10004030-42 = "1;코코나;12\n#1;em;…\n#wait;2500"
10004030-43 = "1;코코나;02;매화원의 새 원생? 못 보던 얼굴인데…….\n#1;em;[?]"
10004030-44 = "3;꼬마 슌ND;07;네, 넵! 얼마 전에 전학 온 슈에링이라고 해요!\n#3;stiff\n#3;em;[땀]\n#1;m1"
10004030-45 = "3;꼬마 슌ND;08;(어, 어라? 코코나 쨩도 제 모습을 알아보지 못하는 건가요?)"
10004030-46 = "3;꼬마 슌ND;06;(다행이네요. 어려진 모습으로 선생님에게 떼를 썼다는 것을 들켰다가는 큰 망신을 당할 뻔했어요.)"
10004030-47 = "3;꼬마 슌ND;26;(하지만 그래도 조금 서운하네요. 아무리 그래도 친언니인데, 조금 어려진 정도로 얼굴을 알아보지 못하다니…….)\n#3;em;[속상함]"
10004030-48 = "1;코코나;00;이상하게 낯이 익은데…… 슌 언니가 담당하는 원생인가?\n#1;em;[?]"
10004030-49 = "1;코코나;12;언니도 참, 원생들을 버려두고 어디에 간 거야? 이 공원에 오면 있을 줄 알았는데.\n#1;stiff"
10004030-50 = "[s] \"코코나도 슌을 찾고 있었어?\""
10004030-51 = "1;코코나;02;네. 아까 전부터 연락이 되질 않아서요.\n#1;em;[반응]"
10004030-52 = "1;코코나;10;일과 중에 갑자기 말도 없이 사라지는 바람에 언니가 해야 할 원생들의 간식 준비를 제가 대신했다니까요.\n#1;em;[빠직]"
10004030-53 = "3;꼬마 슌ND;04;(잠깐! 애초에 해바라기 반의 간식 준비는 코코나 쨩의 일이었잖아요!)\n#3;shake"
10004030-54 = "1;코코나;00;그러고 보니 요새 언니의 상태가 조금 이상해 보이긴 했는데…….\n#1;em;[반응]"
10004030-55 = "1;코코나;99;뭐, 또 분명 대수롭지 않은 일을 신경 쓰고 있을 테죠."
10004030-56 = "1;코코나;05;나이 먹는 게 걱정된다느니, 피부가 거칠어졌다느니…… 언니는 왜 그런 사소한 걸 고민하는지 모르겠어요.\n#1;em;[...]"
10004030-57 = "3;꼬마 슌ND;07;(사, 사소하지 않거든요! 중대사항이에요!)\n#3;hophop"
10004030-58 = "1;코코나;12;게다가 입으로는 매일 살찌는 게 걱정된다고 하면서, 정작 달콤한 음식을 끊지 못하는 걸 보면 언니도 가끔은 어린아이 같다니까요."
10004030-59 = "1;코코나;01;뭐, 이번에도 어디서 달콤한 탕후루를 먹느라 정신이 팔려 시간을 놓친 게 아닐까요?\n#1;em;[음표]"
10004030-60 = "3;꼬마 슌ND;05;(심지어 [USERNAME] 선생님 앞에서 언니의 흉을 보다니……)"
10004030-61 = "3;꼬마 슌ND;15;(이건 아무리 코코나 쨩이라 해도 용서 못 해요!)\n#3;em;[빠직]\n#3;stiff"
10004030-62 = "3;꼬마 슌ND;22;그렇게 치면 어린아이 같은 입맛을 가진 건 코코나 쨩도 마찬가지잖아요? 당근은 쓰고 비려서 먹기 싫다고 매번 몰래 숨겨 버리면서!\n#3;m3\n#3;hophop"
10004030-63 = "1;코코나;11;어, 어라? 그걸 어떻게 알고 있는 거야?\n#1;stiff\n#1;em;[땀]"
10004030-64 = "3;꼬마 슌ND;05;슌 언니에게 다 들었어요. 코코나 교관은 편식쟁이에 투정만 하는 어린애라고요."
10004030-65 = "1;코코나;12;으으, 언니는 왜 그런 것 까지 원생들에게 말하고 다니는 거야…….\n#1;stiff\n#1;em;[속상함]\n#fontsize;50"
10004030-66 = "1;코코나;05;엣헴. 네가 아직 어려서 모르는 모양인데, 나는 이미 어엿한 숙녀거든?\n#1;em;[반응]\n#1;m2\n#3;m4"
10004030-67 = "1;코코나;99;숙녀에게는 취향이라는 게 존재하고, 나는 우연히 당근을 싫어하는 취향을 타고 났을 뿐이야."
10004030-68 = "3;꼬마 슌ND;15;진짜 숙녀는 싫어하는 음식도 똑바로 먹을 줄 알거든요?"
10004030-69 = "3;꼬마 슌ND;17;게다가 매일 아침마다 키를 키워주는 '튼튼 체조'도 하지 않는다고요!\n#3;em;[!]"
10004030-70 = "1;코코나;11;어, 어떻게 그걸…… 다른 사람들에게 들키지 않게 매일 새벽에 몰래 나와서 했었는데…….\n#1;stiff\n#1;em;[땀]"
10004030-71 = "3;꼬마 슌ND;05;그런데 그 체조, 키 크는 데에는 별로 소용이 없을 거예요. 현룡문의 키사키 회장님도 전에 그 체조를 열심히 하셨지만 결국 효과가 없어서 관두셨거든요.\n#3;em;[반응]"

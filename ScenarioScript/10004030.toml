10004030-1 = "#title;제3화;사소한 복수"
10004030-2 = "#place;매화원 인근 소공원"
10004030-3 = "3;꼬마 슌ND;03;도착했어요!\n#3;greeting\n#3;em;[반짝]\n#3;a"
10004030-4 = "[s1] \"여기는…….\"\n[s2] \"……공원?\""
10004030-5 = "3;꼬마 슌ND;13;네, 산해경 자치구 내에 있는 소공원이에요.\n#3;em;[반응]"
10004030-6 = "3;꼬마 슌ND;13;네, 산해경 자치구 내에 있는 소공원이에요.\n#3;em;[반응]"
10004030-7 = "3;꼬마 슌ND;01;매화원 가까이에 있는 데다가 찾는 사람이 거의 없어, 방해받지 않고 느긋이 휴식하고 싶을 때 오면 좋답니다."
10004030-8 = "3;꼬마 슌ND;99;저도 비번일 때는 자주 쉬러……\n#3;em;…"
10004030-9 = "3;꼬마 슌ND;08;아니, 슌 언니가 이곳에 쉬러 오는 걸 자주 봤었거든요!\n#3;em;[땀]\n#3;stiff"
10004030-10 = "3;꼬마 슌ND;01\n#3;m4\n#wait;1000"
10004030-11 = "3;꼬마 슌ND;13;이 공원에는 휴식하기 좋은 장소가 많지만— 그 중에서도 제가 특별히 추천하는 포인트는 바로 이곳!\n#3;em;[반응]"
10004030-12 = "3;꼬마 슌ND;03;여기 나무 그루터기로 만든 의자와 테이블이에요!\n#3;em;[반짝]\n#3;greeting"
10004030-13 = "3;꼬마 슌ND;29;이 의자 위에 앉으면 적당한 높이의 테이블이 가슴을 받쳐줘서……"
10004030-14 = "3;꼬마 슌ND;28;허리를 펴고 앉아도 어깨가 하나도 결리지 않아요!\n#3;em;[음표]\n#3;hophop"
10004030-15 = "[s3] \"가슴……?\"\n[s4] \"어깨결림……?\""
10004030-16 = "#wait;100"
10004030-17 = "#wait;100"
10004030-18 = "3;꼬마 슌ND;08;아…… 그, 그게 그러니까…….\n#3;em;…"
10004030-19 = "3;꼬마 슌ND;09;어, 그러니까…… 만약 나중에 자라서 가슴이 커지면 어깨가 결릴 수도 있으니까…….\n#3;m3"
10004030-20 = "3;꼬마 슌ND;10;저, 가능성만큼은 엄청나게 크니까요!\n#3;em;[땀]\n#3;stiff"
10004030-21 = "[s5] \"그렇구나. 응원할게.\"\n[s6] \"그건 다른 학생의 대사야.\""
10004030-22 = "3;꼬마 슌ND;08;여, 여하튼!"
10004030-23 = "3;꼬마 슌ND;08;여, 여하튼!"
10004030-24 = "3;꼬마 슌ND;13;모처럼 선생님과 함께 공원에 왔으니, 같이 놀아요!\n#3;em;[반응]"
10004030-25 = "3;꼬마 슌ND;13\n#3;m2\n#wait;1000"
10004030-26 = "3;꼬마 슌ND;01;저쪽의 시소도 재미있을 것 같고, 저기에 있는 용수철 목마도 재미있을 것 같고…….\n#3;em;…"
10004030-27 = "3;꼬마 슌ND;02;아, 저쪽에 그네가 있어요!\n#3;em;[!]"
10004030-28 = "3;꼬마 슌ND;03;전부터 다른 사람이 밀어주는 그네를 타보고 싶었는데…… 같이 그네 타러 가요, 선생님!\n#3;hophop\n#3;em;[반짝]\n#3;m3"
10004030-29 = "[s] \"아까도 말했지만 지금은 슌을 찾아야지.\""
10004030-30 = "3;꼬마 슌ND;12;하지만…….\n#3;em;[속상함]\n#3;stiff"

[translation]
10004030-1 = "ตอนที่ 3;การแก้เผ็ดเล็กๆ"
10004030-2 = "สวนสาธารณะใกล้ๆ สวนต้นบ๊วย"
10004030-3 = "มาถึงแล้วละค่ะ!"
10004030-4 = "[s1] \"ที่นี่คือ...\"\n[s2] \"สวนสาธารณะ...?\""
10004030-5 = "ใช่ค่ะ ที่นี่คือสวนสาธารณะขนาดเล็กที่อยู่ในเขตปกครองตนเองค่ะ"
10004030-6 = "ใช่ค่ะ ที่นี่คือสวนสาธารณะขนาดเล็กที่อยู่ในเขตปกครองตนเองค่ะ"
10004030-7 = "ที่นี่อยู่ใกล้กับสวนต้นบ๊วยค่ะเลยไม่ค่อยมีคนมาที่นี่เท่าไหร่ เหมาะสำหรับพักผ่อนโดยที่ไม่ถูกรบกวนค่ะ"
10004030-8 = "บางครั้งหลังเลิกงานฉันก็มักจะมาที่นี่บ่อยๆ..."
10004030-9 = "ปะ...เปล่าค่ะ ฉันเคยเห็นพี่ชุนมาที่นี่เวลาอยากพักผ่อนบ่อยๆ ค่ะ"
10004030-11 = "ที่สวนนี้มีสถานที่เหมาะกับการพักผ่อนอยู่เยอะก็จริง... แต่ว่าบริเวณที่ฉันอยากแนะนำเป็นพิเศษก็คือ...#nที่นี่ค่ะ!"
10004030-12 = "ตรงนี้คือโต๊ะกับเก้าอี้ที่ทำจากตอไม้ค่ะ!"
10004030-13 = "เวลาที่นั่งเก้าอี้ตัวนี้ โต๊ะก็จะพอดีกับความสูงที่ช่วยพยุงหน้าอก..."
10004030-14 = "คะ...คือถึงจะนั่งหลังตรงก็ไม่ปวดไหล่ค่ะ!"
10004030-15 = "[s3] \"หน้าอก...?\"\n[s4] \"ปวดไหล่...?\""
10004030-18 = "เอ่อ...คือ...คือว่า..."
10004030-19 = "เอ่อ หมายถึง... ถ้าต่อไปฉันโตขึ้นแล้วมีหน้าอกที่ใหญ่ล่ะก็... คงจะปวดไหล่ก็ได้... "
10004030-20 = "กะ... ก็คนส่วนใหญ่เป็นกันนี่คะ!"
10004030-21 = "[s5] \"แบบนี้นี่เอง ครูจะเป็นกำลังใจให้นะ\"\n[s6] \"ครูว่านั่นเป็นคำพูดของคนอื่นมากกว่านะ...\""
10004030-22 = "ยะ...ยังไงก็เถอะค่ะ!"
10004030-23 = "ยะ...ยังไงก็เถอะค่ะ!"
10004030-24 = "ฉะ...ฉันเคยมาเล่นที่สวนสาธารณะนี้กับผู้ฝึกสอนค่ะ!"
10004030-26 = "กะ...กระดานหกตรงนั้นก็ดูน่าสนุกดีนะคะ มะ...ม้ากระดกตรงนั้นก็ดูน่าสนุกนะคะ..."
10004030-27 = "อ๊ะ มีชิงช้าอยู่ตรงนั้นด้วยค่ะ!"
10004030-28 = "ฉันอยากเล่นชิงช้าแบบมีคนมาแกว่งให้ตลอดเลยค่ะ... ไปเล่นกันเถอะค่ะคุณครู!"
10004030-29 = "[s] \"เราต้องไปตามหาชุนก่อนสิ\""
10004030-30 = "แต่ว่า..."
10004030-35 = "เอ๊ะ? แปลกจังที่เจอคุณครูที่สวนนี่ด้วย"
10004030-36 = "คะ...โคโคน่าจัง! ทำไมถึงมาอยู่ที่นี่ล่ะ?"
10004030-37 = "แล้วเด็กที่อยู่ตรงนั้น..."
10004030-43 = "เด็กใหม่ของสวนต้นบ๊วยเหรอ? ไม่เคยเห็นหน้ามาก่อนเลย..."
10004030-44 = "คะ...ค่ะ! ฉันชื่อชุนหลิงเพิ่งย้ายมาใหม่ค่ะ!"
10004030-45 = "(อะ...เอ๊ะ? โคโคน่าจังก็จำฉันไม่ได้งั้นเหรอคะเนี่ย?)"
10004030-46 = "(โชคดีจัง ถ้าถูกเปิดโปงว่าตัวเล็กลงต่อหน้าคุณครูล่ะก็... คงจะน่าลำบากใจมากทีเดียวเลยล่ะค่ะ)"
10004030-47 = "(แต่ก็น่าเศร้าอยู่นิดหน่อยนะ ยังไงฉันก็เป็นพี่สาวของเธอแท้ๆ แต่กลับจำฉันที่ตัวเล็กลงไม่ได้แบบนี้...)"
10004030-48 = "แต่ฉันรู้สึกว่าหน้าคุ้นๆ นะ... เด็กนักเรียนห้องพี่ชุนงั้นเหรอ?"
10004030-49 = "พี่ก็จริงๆ เลยนะ ทิ้งเด็กนักเรียนเอาไว้แล้วไปไหนของเค้าแล้วเนี่ย? ฉันคิดว่าพี่ชุนจะมาที่สวนนี้ซะอีก"
10004030-50 = "[s] \"โคโคน่าก็ตามหาชุนอยู่เหรอ?\""
10004030-51 = "ค่ะ ฉันติดต่อพี่ชุนไม่ได้ตั้งแต่เมื่อกี้แล้วค่ะ"
10004030-52 = "จู่ๆ ก็หายตัวไปโดยไม่บอกอะไรเลย ฉันก็เลยต้องไปเตรียมของว่างให้เด็กๆ แทนพี่ชุนน่ะค่ะ"
10004030-53 = "(เดี๋ยวนะ! การเตรียมของว่างให้เด็กห้องทานตะวันเป็นหน้าที่ของโคโคน่าจังตั้งแต่แรกไม่ใช่เหรอคะ!)"
10004030-54 = "พอมาคิดดูแล้ว ช่วงนี้พี่ชุนก็ดูแปลกๆ ไปนิดหน่อยนะคะ..."
10004030-55 = "ก็นะ... พี่ชุนคงจะกังวลอะไรสักอย่างอยู่ละมั้งคะ"
10004030-56 = "ไหนจะกังวลเรื่องอายุที่มากขึ้น เรื่องผิวที่ไม่เปล่งปลั่ง.. พี่ชุนอาจจะกำลังกังวลเรื่องเล็กน้อยพวกนี้ก็ได้ค่ะ"
10004030-57 = "(มะ...มันไม่ใช่เรื่องเล็กๆ นะคะ เรื่องใหญ่มากๆ ต่างหาก!)"
10004030-58 = "แล้วก็พี่ชุนยังบ่นว่าเครียดเรื่องน้ำหนักขึ้นทุกวัน แต่ในเมื่อยังกินของหวานไม่หยุดแบบนั้นแล้ว...#nบางครั้งพี่ชุนเองก็ดูเหมือนเด็กๆ เหมือนกันนะคะ"
10004030-59 = "บางทีตอนนี้... อาจจะไปนั่งกินขนมถังหูลู่หวานๆ เพลินจนลืมเวลาไปก็ได้นะคะ?"
10004030-60 = "(แถมยังมาพูดเรื่องข้อบกพร่องของพี่สาวต่อหน้าคุณครู [USERNAME] แบบนี้อีก...)"
10004030-61 = "(ต่อให้เป็นโคโคน่าจังก็ยกโทษให้ไม่ได้หรอกค่ะ!)"
10004030-62 = "ถ้าพูดแบบนั้นโคโคน่าจังเองก็ชอบกินอะไรเหมือนเด็กๆ ไม่ใช่เหรอคะ? โคโคน่าจังชอบบอกว่า#nแคร์รอตมันขมและกลิ่นเหม็นเขียวเลยไม่อยากกิน และชอบแอบเอาไปทิ้งตลอดเลยนี่คะ!"
10004030-63 = "เอะ... เอ๋? รู้ได้ยังไงกันน่ะ?"
10004030-64 = "พี่ชุนเล่าให้ฉันฟังหมดแล้วค่ะ ว่าผู้ฝึกสอนโคโคน่าเป็นเด็กที่ชอบงอแง เลือกกินเหมือนเด็กๆ เลยค่ะ"
10004030-65 = "ฮึ่ยยย ทำไมพี่ชุนถึงเล่าเรื่องแบบนี้ให้เด็กนักเรียนฟังกันได้นะ..."
10004030-66 = "อะแฮ่ม! เธอยังเด็กอยู่คงจะไม่รู้... แต่ว่าฉันน่ะเป็นผู้ใหญ่เต็มตัวแล้วนะ"
10004030-67 = "ผู้ใหญ่ทุกคนย่อมมีรสนิยมที่ชอบอยู่ และฉันก็แค่ไม่ชอบแคร์รอตก็แค่นั้นเอง"
10004030-68 = "ฉันนึกว่าถึงจะเป็นอาหารที่ไม่ชอบ แต่ผู้ใหญ่ก็จะกินได้ซะอีกนะคะ?"
10004030-69 = "อีกอย่าง ถ้าโตเป็นผู้ใหญ่แล้วล่ะก็คงไม่ต้องทำ \"กายบริหารเพื่อเพิ่มความสูง\" ทุกๆ เช้าหรอกค่ะ!"
10004030-70 = "ทะ...ทำไมถึงรู้เรื่องนั้นได้ ฉันอุตส่าห์แอบออกไปตอนเช้ามืดไม่ให้ใครเห็นแล้วนะ..."
10004030-71 = "แต่ว่าการทำกายบริหารแบบนั้นน่ะ ไม่ได้ช่วยให้ทำให้สูงขึ้นหรอกนะคะ เมื่อก่อนประธานคิซากิ#nแห่งมังกรดำก็เคยทำกายบริหารแบบนั้นเหมือนกัน แต่ก็ต้องล้มเลิกไปเพราะมันไม่ได้ผลค่ะ"
10004030-76 = "หรืออีกอย่างก็คือ โคโคน่าจังที่เลือกกินอาหารและชอบพูดลับหลังพี่สาว#nก็จะเป็นยัยเปี๊ยกแบบนี้ตลอดไปค่ะ!"
10004030-81 = "ฮะ...ฮึ่ยยย...!"
10004030-82 = "เธอ... จำเอาไว้เลยนะ! เดี๋ยวได้เห็นดีกันแน่!"
10004030-87 = "คนที่พูดแบบนี้ไม่เห็นมีใครน่ากลัวจริงๆ เลยสักคนนะคะ แบร่~!"
10004030-90 = "(ไม่เคยรู้เลยว่าการได้พูดอะไรแบบนี้มันสนุกจริงๆ... เพิ่งเคยรู้เลยล่ะค่ะ!)"
10004030-91 = "(การเป็นเด็กนี่สุดยอดไปเลย!)"
10004030-92 = "[s] \"ชุนหลิง...\""
10004030-93 = "อ่าคือ... ฉันเผลอไปหน่อย..."
10004030-94 = "[s] \"พูดเล่นกับพี่โคโคน่าแบบนั้นไม่ดีเลยนะ\""
10004030-95 = "ใครเป็นพี่คะ ฉันต่างหากที่เป็นพี่..."
10004030-96 = "แต่ยังไงเมื่อกี้ฉันก็พูดแรงเกินไปจริงๆ... ผิดไปแล้วค่ะ"
10004030-97 = "[s] \"เอาไว้เจอโคโคน่าแล้วค่อยขอโทษเธอแล้วกันนะ\""
10004030-98 = "ค่า~ เข้าใจแล้วค่ะคุณครู~!"
10004030-99 = "อืม..."
10004030-100 = "เหมือนว่าพี่ชุนจะไม่อยู่ที่นี่นะคะ เราไปหาที่ต่อไปกันเถอะค่ะ"
10004030-104 = "[ns] \"ระ...รอด้วยสิ ชุนหลิง!\""

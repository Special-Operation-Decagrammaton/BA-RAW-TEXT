10004030-35 = "1;코코나;02;어라? 선생님, 이 공원에 계시다니 드문 일이네요.\n#1;em;[반응]"
10004030-36 = "3;꼬마 슌ND;04;코, 코코나 쨩……? 어째서 이곳에?\n#3;shake\n#3;em;[?!]"
10004030-37 = "1;코코나;00;그리고 그 어린아이는……."
10004030-38 = "#st;[0,0];instant;1;"

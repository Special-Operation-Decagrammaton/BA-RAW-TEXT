[translation]
10004030-1 = "第3話;小小的報復"
10004030-2 = "梅花園附近的公園"
10004030-3 = "到了！"
10004030-4 = "[s1] 「這裡是……」\n[s2] 「……公園？」"
10004030-5 = "嗯，這裡是山海經自治區內的小公園。"
10004030-6 = "嗯，這裡是山海經自治區內的小公園。"
10004030-7 = "雖然在梅花園附近卻沒什麼人會來，是想休息時的好去處。"
10004030-8 = "我也常在工作的間隙……"
10004030-9 = "不對，是看過旬姐姐來這裡好多次！"
10004030-11 = "有許多值得一去的地方，但我特別想推薦的地點是這裡！"
10004030-12 = "這是用木頭製成的椅子和桌子！"
10004030-13 = "坐在這裡時，桌子的位置正好能支撐胸部，非常舒服！"
10004030-14 = "當我感到肩膀痠痛時，經常來這裡──"
10004030-15 = "[s3] 「……胸部？」\n[s4] 「……肩膀痠痛？」"
10004030-18 = "啊……那個，我是在說……"
10004030-19 = "那個，是在說……如果將來長大後胸部變大，就能這麼做……！"
10004030-20 = "可，可能性是非常大的！"
10004030-21 = "[s5] 「確實呢。」\n[s6] 「總覺得好像聽過那句台詞……？」"
10004030-22 = "總，總之！"
10004030-23 = "總，總之！"
10004030-24 = "難得來到公園，老師也一起玩吧！"
10004030-26 = "該從哪個開始好呢？#n蹺蹺板也不錯，那個有彈簧的動物設施也很有趣……"
10004030-27 = "啊，鞦韆也很棒呢！"
10004030-28 = "我從以前就很想在盪鞦韆的時候，有人能從後面推我呢！#n老師，我們走吧！"
10004030-29 = "[s] 「那個，我們不是來找旬的嗎……？」"
10004030-30 = "可是……"
10004030-35 = "咦？老師居然會在這座公園，真少見呢。"
10004030-36 = "心，心菜醬……！？怎麼會在這裡？"
10004030-37 = "還有這個孩子是……？"
10004030-43 = "好像是第一次見到，是梅花園的新生嗎？"
10004030-44 = "是，是的！我是最近才來的小旬！"
10004030-45 = "（難道說，心菜醬也認不出我是誰嗎……？）"
10004030-46 = "（太好了。畢竟如果剛才的場面被知道是我的人看到的話，真的很羞恥……）"
10004030-47 = "（不過還是有點難過呢。#n　再怎麼說我也是親姐姐，居然只是稍微變小了一點就認不出來……）"
10004030-48 = "莫名覺得有點眼熟……是旬姐姐負責的孩子嗎？"
10004030-49 = "旬姐姐也真是的，丟著孩子們不管跑到哪裡去了啊……？#n還以為來這裡就能找到了說……"
10004030-50 = "[s] 「心菜醬也在找旬嗎？」"
10004030-51 = "是的，從剛才就聯繫不上。"
10004030-52 = "因為他突然不見的關係，害我不得不幫旬姐姐準備孩子們的點心，真辛苦啊……"
10004030-53 = "（等一下！準備向日葵班的點心本來就是心菜醬的工作不是嗎……？）"
10004030-54 = "旬姐姐最近的表現確實有點奇怪……"
10004030-55 = "嘛，我想八成又是平時的那些煩惱吧。"
10004030-56 = "擔心年紀變大啦、皮膚的狀況啦之類的……明明不用在意那種事的。"
10004030-57 = "（才不是「那種事」！是很重要的事！）"
10004030-58 = "每天都邊說著「最近的體重……」邊吃著甜食……#n這麼看來旬姐姐真的很孩子氣呢。"
10004030-59 = "說不定現在也是在某個地方吃糖葫蘆吃到忘記時間了。"
10004030-60 = "（居然在[USERNAME]老師的面前說姐姐的壞話……！）"
10004030-61 = "（雖然糖葫蘆的事確實有一部分是正確的，但就算這樣也不能原諒心菜醬！）"
10004030-62 = "……要這麼說的話心菜醬也很孩子氣吧！#n嫌紅蘿蔔有苦味不想吃，每次都偷偷藏起來！"
10004030-63 = "咦，為，為什麼你會知道？"
10004030-64 = "是旬姐姐說的。心菜教官總是挑食，根本還只是個小孩子。"
10004030-65 = "唔……！旬姐姐為什麼要和孩子們說那種話……"
10004030-66 = "……咳哼。我跟你說，你可能是因為還小所以不知道，但我已經是個出色的淑女了。"
10004030-67 = "每位淑女都有自己的個性，只是我的正好是「不喜歡吃胡蘿蔔」罷了……"
10004030-68 = "騙人。真正的淑女即使是不喜歡的食物也會吃下去。"
10004030-69 = "而且，也不會每天早上都做「幫助長高的萬歲體操」！"
10004030-70 = "你，你是怎麼……！？#n為了不被別人發現，我明明都在清晨偷偷溜出去做的……！"
10004030-71 = "順便說一下，我覺得那個體操應該沒什麼效果。#n玄龍門的妃姬會長以前也做過，但他最後也說沒有意義而放棄了。"
10004030-76 = "也就是說，總是挑食還會說姐姐壞話的心菜醬永遠都會是小孩子！"
10004030-81 = "唔，唔唔……！"
10004030-82 = "你的臉我記住了！走著瞧吧！"
10004030-87 = "會要人走著瞧的人根本沒什麼好怕的！"
10004030-90 = "（盡情把心裡話毫無保留地說出來居然這麼快樂……我還是第一次知道！）"
10004030-91 = "（小孩子的身體真讚！）"
10004030-92 = "[s] 「小旬……」"
10004030-93 = "啊，糟糕……一不小心就……"
10004030-94 = "[s] 「捉弄姐姐是不對的唷？」"
10004030-95 = "真要說的話，其實我才是姐姐就是了……"
10004030-96 = "不過，剛才確實有點說過頭了……"
10004030-97 = "[s] 「下次見到心菜時，要好好道歉唷？」"
10004030-98 = "是～我知道了，老師～！"
10004030-99 = "……"
10004030-100 = "旬姐姐好像也不在這裡……去別的地方吧！"
10004030-104 = "[ns] 「等，等等，小旬……！」"

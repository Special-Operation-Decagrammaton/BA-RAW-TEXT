[translation]
10009130-1 = "Afterword; Happy Valentine's Day!"
10009130-2 = "Just before Wakamo could confess her feelings to Sensei..."
10009130-10 = "..."
10009130-30 = "Your path of destruction ends here, Fox of Calamity."
10009130-36 = "...To think that even with all the traps I laid out, you still found me here..."
10009130-40 = "Who are you?"
10009130-42 = "Aomori Mine, captain of the Remedial Knights, at your service."
10009130-43 = "The Remedial Knights?"
10009130-44 = "Ah, now I remember. You're a group of Trinity layabouts, aren't you?"
10009130-45 = "And the Remedial Knights really has a member who's talented enough to see through my ruses and find me?"
10009130-46 = "Is that so surprising? I simply pushed my way through."
10009130-47 = "You've caught my interest, anyway. What is the captain of the Remedial Knights doing here?"
10009130-48 = "Please don't let me down by saying something silly about stopping me, now."
10009130-49 = "Fox of Calamity. There's something I need to hear from you directly."
10009130-50 = "...?"
10009130-54 = "Why are you causing all this chaos?"
10009130-56 = "..."
10009130-60 = "...Today is..."
10009130-61 = "...Today?"
10009130-62 = "Today is Valentine's Day. A day to confess your true feelings."
10009130-63 = "I...just want to talk to a certain person..."
10009130-64 = "So if someone gets in my way, no matter who..."
10009130-65 = "I, Wakamo, must destroy, destroy, and destroy again to get to them."
10009130-69 = "To confess your feelings on Valentine's Day?"
10009130-70 = "It doesn't matter what you think."
10009130-74 = "If you block my path, I'll send you running all the way to hell."
10009130-75 = "..."
10009130-76 = "So, now... If it's a fight you want—"
10009130-82 = "I understand. Please go ahead."
10009130-83 = "...What?"
10009130-84 = "I don't know what you're planning, but you should know that I, Wakamo, will not fall for petty tricks."
10009130-85 = "Tricks? I have no tricks, no ulterior motives."
10009130-86 = "Such things are unbefitting a Remedial Knight."
10009130-91 = "To confess your true feelings on Valentine's Day... If that's what you plan, I have no reason to stand in your way."
10009130-92 = "..."
10009130-97 = "...!"
10009130-103 = "Once you're done, then we shall deliver remediation for your actions."
10009130-107 = "C-Captain? The person you were talking to..."
10009130-108 = "Was that.... the Fox of Calamity?!"
10009130-109 = "A-and you just...let her go?"
10009130-111 = "..."
10009130-112 = "Serina, Hanae. After all the chaos, do you still remember what today is?"
10009130-114 = "Today? Um... It was a day full of events, and..."
10009130-115 = "Oh! I do! I remember! It's Valentine's Day!"
10009130-117 = "That's right. It's a day to tell your honest feelings to those who are special to you."
10009130-118 = "So, on a day like this... It wouldn't be right to block her path."
10009130-119 = "Letting her confess her feelings..."
10009130-123 = "Isn't that also a kind of remedy?"
10009130-128 = "Um, I guess, but..."
10009130-132 = "What do we do about the rest of this ruckus, Captain?"
10009130-134 = "You're right, Hanae."
10009130-135 = "Whether or not the Fox of Calamity can deliver her feelings honestly... We have a responsibility to turn chaos into order."
10009130-136 = "So, to carry out that duty..."
10009130-147 = "We must give our aid to those who have lost their way and are causing chaos!"
10009130-148 = "And then, once the Fox of Calamity has finished her task, we'll find her."
10009130-150 = "Yes, Captain!"
10009130-151 = "I've got the first aid kit, needles, splints and compression bandages! We're all set!"
10009130-152 = "Wonderful. Then let's be off!"
10009130-153 = "Medicine knows no borders!"

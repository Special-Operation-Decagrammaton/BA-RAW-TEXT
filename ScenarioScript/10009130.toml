[translation]
10009130-1 = "後日談其六;情人節快樂！"
10009130-2 = "（在若藻向老師表達心意之前──）"
10009130-10 = "……"
10009130-30 = "到此為止了，災厄之狐。"
10009130-36 = "……明明已經撒下如此多的誘餌，沒想到還會被發現呢。"
10009130-40 = "你究竟是……？"
10009130-42 = "我是救護騎士團團長蒼森美禰。"
10009130-43 = "救護騎士團……？"
10009130-44 = "啊啊……我記得是三一裡，似乎總是很無聊的一群人。"
10009130-45 = "沒想到，我的企圖居然會被察覺……出乎我的意料。"
10009130-46 = "企圖……？#n我只是在進行「救護」而已……"
10009130-47 = "哎呀，那麼救護騎士團的團長找我有何貴幹呢？"
10009130-48 = "……是來阻止我的──你該不會想這麼說吧？"
10009130-49 = "「災厄之狐」，我有事想問你。"
10009130-50 = "……？"
10009130-54 = "你為何要引起這樣的騷動呢？"
10009130-56 = "……"
10009130-60 = "今天……"
10009130-61 = "──今天？"
10009130-62 = "……因為今天是「情人節」。#n是向重要的人傳達自己心意的日子。"
10009130-63 = "沒錯──我僅僅是，想向那個人傳達心意罷了。"
10009130-64 = "想要妨礙的人……若藻我，無論對方是誰……"
10009130-65 = "都絕對不會放棄。#n我將破壞一切，持續前進。"
10009130-69 = "為了在情人節……傳達心意？"
10009130-70 = "沒錯……不被理解也無妨。"
10009130-74 = "如果想擋在我和那個人的面前，也只好加以破壞。"
10009130-75 = "……"
10009130-76 = "來，要戰鬥的話──"
10009130-82 = "請繼續前進吧。"
10009130-83 = "……你有什麼企圖？"
10009130-84 = "雖然不知道你在想什麼，但這種騙孩子的把戲──"
10009130-85 = "──不，這是我的本意。"
10009130-86 = "救護騎士團進行的「救護」之中，不存在謊言與欺騙。"
10009130-91 = "想在今天傳達心意──#n我沒有理由阻擋抱著如此決心的你。"
10009130-92 = "…………"
10009130-97 = "……！"
10009130-103 = "對於你行為的「救護」，就等到目標達成後再進行吧。"
10009130-107 = "團長……？#n剛剛跑走的那位難道……"
10009130-108 = "不就是「災厄之狐」嗎！？"
10009130-109 = "讓，讓他離開沒問題嗎！？"
10009130-111 = "……"
10009130-112 = "芹奈、花繪。還記得今天是什麼日子嗎？"
10009130-114 = "那，那當然……"
10009130-115 = "我知道！是情人節對吧？"
10009130-117 = "沒錯。情人節不只是送巧克力，同時也是傳達自己心意的日子。"
10009130-118 = "他確實引起了騷動，#n然而即便如此，阻擋在他面前的行為也未必就是正確的。"
10009130-119 = "讓開道路，使他能夠傳達心意……"
10009130-123 = "這又何嘗不是我們所能完成的一種「救護」的形式呢。"
10009130-128 = "但，但是……團長！"
10009130-132 = "這場騷動究竟該怎麼收拾呢！？"
10009130-134 = "沒錯，花繪你說的對。"
10009130-135 = "「災厄之狐」要去傳達心意，#n而我們也得平定眼前的騷動才行。"
10009130-136 = "首先──"
10009130-147 = "要對在那邊鬧事的各位進行「救護」！"
10009130-148 = "結束之後再去「災厄之狐」那邊也不遲。#n等我們的救護結束之後，那邊的事應該也結束了吧。"
10009130-150 = "我知道了，團長！"
10009130-151 = "急救箱……針筒、繃帶和夾板……全都準備好了！"
10009130-152 = "那麼……我們上吧。"
10009130-153 = "「哪裡要救護，我就在哪裡」！"

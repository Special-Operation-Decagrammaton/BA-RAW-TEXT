[translation]
10009130-1 = "ย้อนวันวาน;แฮปปี้ วาเลนไทน์!"
10009130-2 = "(วาคาโมะได้พบกับคุณครู และตอนที่กำลังจะสารภาพความในใจ...)"
10009130-10 = "..."
10009130-30 = "หยุดก่อความวุ่นวายเท่านี้ดีกว่านะคะ จิ้งจอกแห่งความพินาศ"
10009130-36 = "...ถึงจะวางอุบายตัวหลอกล่อไปแล้ว แต่สุดท้ายก็ตามฉันมาได้ถึงที่นี่..."
10009130-40 = "คุณ... เป็นใครกันแน่?"
10009130-42 = "หัวหน้าชมรมอัศวินบรรเทาทุกข์ อาโอโมริ มิเนะค่ะ"
10009130-43 = "ชมรมอัศวินบรรเทาทุกข์งั้นเหรอ...?"
10009130-44 = "อ๊ะ นึกออกแล้วค่ะ พวกกลุ่มคนว่างงานของทรีนิตี้..."
10009130-45 = "ไม่คิดเลยว่าชมรมอัศวินบรรเทาทุกข์พรรค์นั้น จะมีคนที่ล่วงรู้แผนการณ์แท้จริงของฉันแบบนี้อยู่ด้วย"
10009130-46 = "ฉันก็แค่ฝ่าความวุ่นวายเข้ามาเท่านั้นเองค่ะ"
10009130-47 = "ถ้าอย่างนั้น หัวหน้าชมรมอัศวินบรรเทาทุกข์มีธุระอะไรที่นี่งั้นเหรอคะ?"
10009130-48 = "...หรือว่าคุณคิดจะมาพูดเกี่ยวกับพวกไร้สาระที่กล้าคิดจะขัดขวางฉันอย่างนั้นเหรอคะ?"
10009130-49 = "จิ้งจอกแห่งความพินาศ... ฉันไม่ได้มาเพื่อพูดเรื่องคนอื่น แต่ฉันมีเรื่องที่อยากจะถามคุณอยู่ต่างหากค่ะ"
10009130-50 = "...?"
10009130-54 = "ทำไมถึงก่อเรื่องวุ่นวายแบบนั้นคะ?"
10009130-56 = "......"
10009130-60 = "...วันนี้น่ะ"
10009130-61 = "วันนี้...?"
10009130-62 = "วันนี้เป็นวันวาเลนไทน์... วันที่จะบอกความรู้สึกในใจออกไป"
10009130-63 = "ฉันก็แค่อยากบอกความรู้สึกในใจของฉันให้คุณท่านรู้เท่านั้น..."
10009130-64 = "ถ้ามีใครที่คิดจะขัดขวางฉันละก็ ไม่ว่าใครหน้าไหนก็ตาม วาคาโมะผู้นี้..."
10009130-65 = "จะทำลาย ทำลายแล้วก็ทำลายให้ย่อยยับเพื่อฝ่าไปข้างหน้า"
10009130-69 = "เพื่อบอกความรู้สึกในวันวาเลนไทน์เหรอคะ?"
10009130-70 = "ฮึ่ม... ฉันไม่สนหรอกค่ะว่าเธอจะคิดยังไง"
10009130-74 = "ถ้าคิดจะขวางทางฉันละก็ ต่อให้ต้องฝ่านรกเจ็ดขุมฉันก็จะทำลายแล้วฝ่าไปให้ได้"
10009130-75 = "..."
10009130-76 = "เอาละ... ถ้าแม้แต่เธอยังคิดจะขวางทางฉันละก็ เข้ามาได้เลย...!"
10009130-82 = "ก็ได้ค่ะ คุณไปเถอะค่ะ"
10009130-83 = "...อะไรนะ?"
10009130-84 = "ฉันไม่รู้ว่าเธอมีแผนอะไร แต่ลูกไม้ตื้นๆ น่ะ ใช้กับวาคาโมะผู้นี้ไม่ได้..."
10009130-85 = "ฉันไม่ได้มีแผนอะไรเลยค่ะ"
10009130-86 = "การบรรเทาทุกข์ของชมรมอัศวินบรรเทาทุกข์ ไม่มีเรื่องแบบนั้นหรอกค่ะ"
10009130-91 = "ถ้าจุดประสงค์ของคุณคือการบอกความรู้สึกของคุณในวันนี้ละก็ ฉันก็ไม่มีเหตุผลอะไรที่จะขัดขวางคุณ#nเลยค่ะ"
10009130-92 = "......"
10009130-97 = ".........!"
10009130-103 = "ส่วนการ \"บรรเทาทุกข์\" ในส่วนของพฤติกรรมของคุณ เอาไว้ค่อยจัดการหลังจากนั้นก็ได้ค่ะ"
10009130-107 = "หัวหน้าคะ? คนที่เดินผ่านไปเมื่อกี้..."
10009130-108 = "นะ... นั่นมันจิ้งจอกแห่งความพินาศที่ทุกคนกำลังตามตัวอยู่ไม่ใช่เหรอคะ?!"
10009130-109 = "ทะ... ทำไมถึงปล่อยเธอไปเฉยๆ กันล่ะคะ?!"
10009130-111 = "..."
10009130-112 = "เซรินะ ฮานาเอะ... จำได้หรือเปล่าคะว่าวันนี้เป็นวันอะไร?"
10009130-114 = "คะ? คือว่าวันนี้มีแต่เรื่องวุ่นวายและงานยุ่งทั้งวัน..."
10009130-115 = "ฉันรู้ค่ะ! วันวาเลนไทน์ใช่มั้ยคะ?"
10009130-117 = "ใช่แล้วค่ะ เป็นวันที่คนจะส่งผ่านความรู้สึกของตัวเองไปให้อีกฝ่ายได้รับรู้ค่ะ"
10009130-118 = "ในวันแบบนี้... การไปขัดขวางความตั้งใจของเธอ คงจะเป็นเรื่องที่ไม่ถูกต้องค่ะ"
10009130-119 = "การช่วยให้เธอได้บอกความรู้สึกของตัวเองได้อย่างตรงไปตรงมา..."
10009130-123 = "มันก็เป็นการบรรเทาทุกข์ให้กับเธอคนนั้นรูปแบบหนึ่งเหมือนกัน ใช่ไหมล่ะคะ?"
10009130-128 = "นั่นสินะคะ..."
10009130-132 = "แต่ว่าเราจะทำยังไงกับเรื่องวุ่นวายทั้งหมดนี่ดีล่ะคะหัวหน้า?!"
10009130-134 = "พูดได้ดีมากค่ะ ฮานาเอะ"
10009130-135 = "นอกจากเรื่องที่จิ้งจอกแห่งความพินาศจะได้บอกความรู้สึกของตัวเองอย่างตรงไปตรงมาแล้ว ความวุ่นวายที่เกิดขึ้นนี้ก็ควรถูกสะสางเช่นกันค่ะ"
10009130-136 = "และเพื่อการนั้นแล้ว..."
10009130-147 = "ก่อนอื่นเรารีบไปช่วย \"บรรเทาทุกข์\" ให้กับเด็กเกเรที่ก่อความวุ่นวายอยู่ตรงโน้นกันก่อนเถอะค่ะ!"
10009130-148 = "หลังจากนั้นเราจะไปหาจิ้งจอกแห่งความพินาศกันค่ะ!"
10009130-150 = "ค่ะหัวหน้า!"
10009130-151 = "กล่องพยาบาลฉุกเฉินกับเข็มฉีดยา เฝือกแล้วก็ไม้ดาม! เตรียมทุกอย่างพร้อมแล้วค่า!"
10009130-152 = "ดีมากค่ะ ถ้าอย่างนั้นก็ไปกันเถอะค่ะ"
10009130-153 = "ออกบรรเทาทุกข์ให้กับผู้คนที่ทุกข์เข็ญ!"

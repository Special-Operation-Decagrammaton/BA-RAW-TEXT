2001203-8 = "#na;(광장에 도착하자마자 기다리고 있던 세나를 발견했다.)"
2001203-9 = "3;세나;01;……안녕하세요, 선생님. 기다리고 있었습니다.\n#3;greeting\n#3;em;[반짝]\n#3;a"

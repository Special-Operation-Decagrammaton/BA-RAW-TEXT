[translation]
2001203-1 = "An Urgent Situation"
2001203-5 = "Gehenna Plaza"
2001203-7 = "I arrived at Gehenna Academy for work in a daze."
2001203-8 = "Sena came to greet me as soon as I arrived."
2001203-9 = "Hello, Sensei. I've been waiting for you."
2001203-11 = "[s] \"...?\""
2001203-13 = "[ns1] \"Sena?\"\n[ns2] \"How long have you been here?\""
2001203-14 = "I wanted to check on how you're doing as quickly as possible."
2001203-15 = "I wanted to check on how you're doing as quickly as possible."
2001203-16 = "The Medical Emergency Club typically only deals with the dead..."
2001203-17 = "By which I mean the injured."
2001203-18 = "However, if you were to collapse due to exhaustion from work,#nthat would make you one of the injured."
2001203-19 = "You seem to be in much worse condition than I thought."
2001203-20 = "I don't believe you're in any condition to keep working.#nCan you put off your schedule for a little while?"
2001203-24 = "Hmm. I see. So you have something that needs to be done by today."
2001203-25 = "No wonder you're so determined."
2001203-26 = "In that case, allow me to accompany you."
2001203-27 = "What's that?"
2001203-28 = "Am I offering to be your...secretary?"
2001203-29 = "I wouldn't say that. I'm only looking out for your health and trying to prevent further casualties."
2001203-30 = "However, if that idea makes my suggestion more palatable for you,#nthen you're free to interpret it that way."
2001203-31 = "In addition to medical care, I'll help respond to anything that may cause you too much stress."
2001203-32 = "Hmm?"
2001203-33 = "You're glad to hear that?"
2001203-34 = "..."
2001203-35 = "[s3] \"Sena?\"\n[s4] \"Did I say something wrong?\""
2001203-36 = "*sigh* Sensei."
2001203-37 = "*sigh* Sensei."
2001203-38 = "It wouldn't be an exaggeration to count you among the injured already given your condition."
2001203-39 = "In that sense, I could follow protocol and forcibly have you taken to our club room infirmary."
2001203-40 = "Please understand that I'm making a very rare exception by not doing so—#nout of consideration for your schedule and wishes."
2001203-41 = "[s5] \"You made your point. Sorry.\"\n[s6] \"I'll try to keep that in mind...\""
2001203-42 = "..."
2001203-43 = "..."
2001203-44 = "So, where are we going first?"
2001203-45 = "Please tell me your schedule, and I'll lead the way."
2001203-47 = "I gave Sena the details of my schedule and we headed off."
2001203-48 = "She helped me not only with my physical condition, but also with organizing my work and conducting research."
2001203-49 = "I thought this would take all day, but it was done in just a few hours."
2001203-51 = "Well done, Sensei. We were able to finish up your work without any issue."
2001203-52 = "You seemed liable to keel over at any moment when you first arrived,#nbut you held up much better than I was expecting you to."
2001203-53 = "You managed to take care of both your work and your health."
2001203-54 = "[s7] \"Thanks to you, Sena.\"\n[s8] \"I couldn't have done it without you.\""
2001203-55 = "Don't mention it. All I did was assist."
2001203-56 = "Don't mention it. All I did was assist."
2001203-57 = "Your work here is done, but you still need time to recover."
2001203-58 = "You should go home and rest."
2001203-61 = "Hmm?"
2001203-62 = "Is something wrong?"
2001203-63 = "[s9] \"Sorry. I just felt lightheaded all of a sudden.\"\n[s10] \"It must be all the fatigue and stress.\""
2001203-68 = "*sigh*"
2001203-69 = "Nonsense."
2001203-70 = "It's my duty to look after your health, and my job is done as long as you're still here."
2001203-71 = "That being the case, allow me to accompany you back to Schale.#nThat will be my final task for the day."
2001203-72 = "However, if you were to faint on our way there..."
2001203-77 = "...I'll be taking you back to the Medical Emergency Club's infirmary."
2001203-78 = "Am I understood?"
2001203-79 = "[s11] \"Yes, ma'am.\"\n[s12] \"I don't wanna be a cadaver!\""
2001203-84 = "..."
2001203-89 = "In that case, let me lead the way."
2001203-94 = "I did my best to stay awake and followed Sena until we safely arrived at the Schale building."
2001203-95 = "I lay down and pass out as soon as we got inside. There was a blanket over me and a wet towel on my forehead when I woke up."

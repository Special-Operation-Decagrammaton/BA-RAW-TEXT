[translation]
2001203-1 = "緊急狀況"
2001203-5 = "格黑娜廣場"
2001203-7 = "（雖然感到頭暈目眩，但還是死撐著抵達了格黑娜）"
2001203-8 = "（一抵達就看到瀬奈等在那裡了）"
2001203-9 = "……老師早安。恭候多時了。"
2001203-11 = "[s]「……咦？」"
2001203-13 = "[ns1]「瀬奈？」\n[ns2]「你特地出來等我呀？」"
2001203-14 = "是，因為我認為必須準確地檢查老師的狀態。"
2001203-15 = "是，因為我認為必須準確地檢查老師的狀態。"
2001203-16 = "雖然急救醫學部基本上是以外科為主，所以主要處理對象是屍體……"
2001203-17 = "……更正，主要治療的對象是傷患。"
2001203-18 = "但若老師在工作途中暈倒，那麼從那一刻起就會變成「傷患」。"
2001203-19 = "……看來光是看你的臉色，情況就比我想得還嚴重。"
2001203-20 = "實在不建議老師在這種狀態下繼續工作……沒辦法調整行程嗎？"
2001203-24 = "……原來如此，非今天不可。"
2001203-25 = "我明白了。想必老師也是做了各種考量吧。"
2001203-26 = "既然如此，雖然不能代替老師工作，但請讓我陪著老師一整天。"
2001203-27 = "……？"
2001203-28 = "喔喔，看起來或許會像是個貼身祕書……"
2001203-29 = "但我只是單純要防範傷患出現。"
2001203-30 = "不過就算老師要把我當成秘書，也不會有什麼問題。"
2001203-31 = "今天除了醫療檢查，基本上也會協助老師進行各種事務。"
2001203-32 = "……咦？"
2001203-33 = "你很高興……？"
2001203-34 = "……"
2001203-35 = "[s3]「啊……瀬奈？」\n[s4]（感覺我好像說錯了什麼……）"
2001203-36 = "……老師。"
2001203-37 = "……老師。"
2001203-38 = "老師現在的狀態，就算直接分類為傷患都不奇怪。"
2001203-39 = "照理來說，現在應該要無視老師的意願，馬上強制移送到部室。"
2001203-40 = "這次只是因為尊重老師的判斷，屬於例外。請你了解這不是可以開玩笑的狀況。"
2001203-41 = "[s5]「對不起……」\n[s6]「我會謹記在心……」"
2001203-42 = "……"
2001203-43 = "……"
2001203-44 = "那麼，老師現在要先去哪裡？"
2001203-45 = "若能告訴我行程，我會幫老師想一個有效率的路程。"
2001203-47 = "（一把行程告訴瀬奈，她就馬上拉著我的手往前走）"
2001203-48 = "（不僅協助管理身體狀態，她實際上也有幫我整理資料，仲裁，查資料，在我身邊協助了各種大小事）"
2001203-49 = "（也因此，原本預計一整天才能完成的工作，只花了半天就結束了）"
2001203-51 = "……辛苦老師了。幸好沒有發生大問題。"
2001203-52 = "原本以為老師可能會突然暈倒……"
2001203-53 = "但老師比外表還要有毅力，看來老師有很堅韌的精神呢。"
2001203-54 = "[s7]「謝謝，都是托瀬奈的福。」\n[s8]「一個人的話可能就危險了……」"
2001203-55 = "……別這麼說，我只是在一旁稍微協助罷了。"
2001203-56 = "……別這麼說，我只是在一旁稍微協助罷了。"
2001203-57 = "而且只是協助老師完成工作而已，還沒幫老師恢復身體狀態。"
2001203-58 = "請老師快點回去休息……"
2001203-61 = "……？"
2001203-62 = "……老師？你還好嗎？"
2001203-63 = "[s9]「抱歉，有點頭暈……」\n[s10]「大概是因為事情告一段落，鬆懈下來了。」"
2001203-68 = "……唉。"
2001203-69 = "果然是這樣……"
2001203-70 = "我剛才話還沒說完，在回去之前都不能大意。"
2001203-71 = "我會陪老師回到夏萊。屆時我今天的工作才算完成。"
2001203-72 = "如果老師在半路暈倒……"
2001203-77 = "……我會當場把老師當成急救醫學部的病患，強制送往部室。請老師見諒。"
2001203-78 = "明白我的意思嗎？"
2001203-79 = "[s11]「是……」\n[s12]（會被當成屍體……！）"
2001203-84 = "……"
2001203-89 = "那我們走吧。"
2001203-94 = "（多虧有瀨奈陪伴，之後我總算能保持意識，平安回到夏萊）"
2001203-95 = "（一抵達我就像暈倒似地躺了下來，醒來後發現身上蓋著毯子，額頭上墊著一條毛巾）"

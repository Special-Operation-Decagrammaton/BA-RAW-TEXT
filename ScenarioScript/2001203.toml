2001203-13 = "[ns1] \"……세나?\"\n[ns2] \"미리 나와 있었던 거야?\""
2001203-14 = "3;세나;02;네. 선생님의 상태를 정확하게 확인하기 위해서입니다.\n#3;em;[반응]"
2001203-15 = "3;세나;02;네. 선생님의 상태를 정확하게 확인하기 위해서입니다.\n#3;em;[반응]"
2001203-16 = "3;세나;01;기본적으로 저희 응급의학부는 외과 분야를 다루는 곳이기 때문에, 시체……."
2001203-17 = "3;세나;99;……아니, 부상자에 한해서만 활동하는 곳이지만.\n#3;em;…"
2001203-18 = "3;세나;01;선생님께서 일정 도중에 쓰러지시면, 그 순간 '부상자'가 되실 테니까요."
2001203-19 = "3;세나;02;……그런데 지금 보니 생각보다 상태가 꽤 심각하시군요."
2001203-20 = "3;세나;01;그런 몸으로 일정을 강행하시는 건 역시 무리라고 판단됩니다만……. 일정 연기는 힘드신가요?\n#3;em;[?]"
2001203-21 = "#st;[0,0];instant;1;"
2001203-22 = "#clearST"
2001203-23 = "3;세나;01\n#3;em;…\n#3;h\n#wait;2500"
2001203-24 = "3;세나;99;……. 흠. 그렇군요. 꼭 오늘……."
2001203-25 = "3;세나;01;알겠습니다. 다른 사람도 아닌 선생님의 일이니, 여러 고려 끝에 결정하신 일이겠지요.\n#3;greeting"
2001203-26 = "3;세나;01;그럼 그 대신, 오늘 하루는 제가 곁에서 동행하도록 하겠습니다."
2001203-27 = "3;세나;01;……네?\n#3;em;[?]"
2001203-28 = "3;세나;02;뭔가 비서 같은 것……이냐고요?"
2001203-29 = "3;세나;99;……다릅니다. 어디까지나 부상자 발생에 대해 대비를 하는 것일 뿐."
2001203-30 = "3;세나;01;그렇지만 그렇게 이해하시는 게 편하시면, 그렇게 이해해 주셔도 좋습니다.\n#3;em;[반응]"
2001203-31 = "3;세나;01;오늘 하루는 메디컬 케어 이외에도, 선생님께 부하가 갈 수 있는 모든 일에 대해 대응할 예정이니까요."
2001203-32 = "3;세나;02;……네?\n#3;em;[?]"
2001203-33 = "3;세나;02;그렇게 말해주니 기쁘다……라고요?"
2001203-34 = "3;세나;99;…….\n#3;em;[빠직]\n#3;stiff"
2001203-35 = "[s3] \"……세나?\"\n[s4] \"어……. 혹시 제가 무슨 실수라도……?\""
2001203-36 = "3;세나;00;……후. 선생님.\n#3;em;…"
2001203-37 = "3;세나;00;……후. 선생님.\n#3;em;…"
2001203-38 = "3;세나;02;선생님께서는 지금도 충분히 부상자로 취급되어도 이상하지 않으신 상태입니다."
2001203-39 = "3;세나;01;오히려 정책 대로였다면 선생님의 의사와 관계없이 지금 바로 부실로 강제 이송했을 것입니다."
2001203-40 = "3;세나;99;다른 분도 아닌 선생님의 일정이며, 선생님의 판단이시기에 극히 예외적인 상황임을 감안해 주셨으면 합니다."
2001203-41 = "[s5] \"……네. 죄송합니다.\"\n[s6] \"명심하겠습니다…….\""

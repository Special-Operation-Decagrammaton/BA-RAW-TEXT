[translation]
2001203-1 = "สถานการณ์ฉุกเฉิน"
2001203-5 = "จัตุรัสเกเฮนน่า"
2001203-7 = "(คุณครูลากตัวเองมาถึงเกเฮนน่าทั้งๆ ที่มีอาการวิงเวียนศีรษะอยู่เพื่อมาทำงาน)"
2001203-8 = "(เมื่อมาถึงที่จัตุรัสก็เห็นเซนะที่กำลังรออยู่)"
2001203-9 = "สวัสดีค่ะคุณครู กำลังรออยู่เลยค่ะ"
2001203-11 = "[s] \"....?\""
2001203-13 = "[ns1] “...เซนะ?”\n[ns2] “มารออยู่ก่อนแล้วเหรอ?”"
2001203-14 = "ฉันอยากจะมาตรวจดูอาการของคุณครูให้แน่ชัดก่อนค่ะ"
2001203-15 = "ค่ะ ฉันอยากจะมาตรวจดูอาการของคุณครูให้แน่ชัดก่อนค่ะ"
2001203-16 = "ส่วนใหญ่หน่วยแพทย์ฉุกเฉินของเราคอยจะรักษาศพ..."
2001203-17 = "เอ่อ ฉันหมายถึงผู้บาดเจ็บเท่านั้นค่ะ"
2001203-18 = "แต่ว่าถ้าคุณครูล้มป่วยไประหว่างทำงานอยู่ ก็ถือว่าคุณครูเป็น ‘ผู้บาดเจ็บ’ค่ะ"
2001203-19 = "แต่ว่าดูจากตอนนี้อาการค่อนข้างร้ายแรงกว่าที่คิดนะคะ"
2001203-20 = "ถ้ายังฝืนทำงานต่อไปด้วยสภาพร่างกายแบบนั้นคงไม่ดีแน่ๆ ค่ะ...#nเลื่อนตารางงานออกไปดีมั้ยคะ?"
2001203-24 = "ต้องทำให้เสร็จภายในวันนี้สินะคะ"
2001203-25 = "เข้าใจแล้วค่ะ ฉันจะเคารพการตัดสินใจของคุณครูค่ะ"
2001203-26 = "ถ้างั้นวันนี้ฉันจะร่วมทางไปด้วยนะคะ"
2001203-27 = "คะ...?"
2001203-28 = "เหมือนเป็นเลขารึเปล่าน่ะเหรอคะ?"
2001203-29 = "ไม่เหมือนหรอกค่ะ ฉันแค่เตรียมเพื่อไม่ให้คุณครูล้มป่วยเท่านั้นเองค่ะ"
2001203-30 = "แต่ถ้าหากเข้าใจแบบนั้นแล้วจะสบายใจกว่า ก็คิดซะว่าเป็นแบบนั้นก็ได้ค่ะ"
2001203-31 = "เพราะว่าวันนี้นอกจากจะดูแลด้านการแพทย์แล้ว ฉันก็จะคอยช่วยเหลือคุณครูทุกอย่างเลยค่ะ"
2001203-32 = "คะ...?"
2001203-33 = "ดีใจที่ได้ยินอย่างนั้นเหรอคะ...?"
2001203-34 = "..."
2001203-35 = "[s3] “…เซนะ?”\n[s4] “ครูพูดอะไรผิดไปรึเปล่า...?”"
2001203-36 = "เฮ้อ... คุณครูคะ"
2001203-37 = "เฮ้อ... คุณครูคะ"
2001203-38 = "สภาพของคุณครูในตอนนี้นับเป็นผู้ป่วยคนหนึ่งก็ยังได้เลยค่ะ"
2001203-39 = "ถ้าฉันทำตามข้อบังคับจริงๆ คุณครูคงจะถูกส่งตัวไปห้องฉุกเฉินทันทีแล้วค่ะ"
2001203-40 = "แต่เพราะนี่เป็นงานของคุณครู และคุณครูก็ตัดสินใจแล้ว เลยอยากให้ทราบว่าฉันยกเว้นให้เป็น#nกรณีพิเศษค่ะ"
2001203-41 = "[s5] “ครูผิดไปแล้ว ขอโทษนะ”\n[s6] “ครูจะจำให้ขึ้นใจเลย...”"
2001203-42 = "..."
2001203-43 = "..."
2001203-44 = "ถ้างั้น เราต้องไปที่ไหนกันต่อคะ?"
2001203-45 = "ถ้าบอกรายละเอียดตารางงานมา ฉันจะนำทางไปให้เองค่ะ"
2001203-47 = "(พอคุณครูบอกตารางงานให้เซนะฟัง เธอก็นำทางคุณครูไปทันที)"
2001203-48 = "(นอกจากดูแลสุขภาพของคุณครูแล้ว เซนะก็ยังช่วยจัดการเรื่องงานและตรวจสอบ#nข้อมูลอยู่ข้างๆ ตามที่เธอได้พูดเอาไว้)"
2001203-49 = "(งานที่คิดว่าจะต้องใช้เวลาทั้งวันกลับเสร็จสิ้นภายในครึ่งวันเท่านั้น)"
2001203-51 = "ขอบคุณที่ทำงานอย่างหนักนะคะ คุณครู ค่อยยังชั่วที่ทำงานได้เสร็จโดยไม่มีปัญหาอะไรนะคะ"
2001203-52 = "ฉันนึกว่าคุณครูจะเป็นลมไปซะแล้ว... แต่คุณครูมีสมาธิจดจ่อมากกว่าที่คิดเอาไว้อีกนะคะ"
2001203-53 = "คุณครูคอยจัดการดูแลอาการของตัวเองและเรื่องงานได้อย่างดีเลยค่ะ"
2001203-54 = "[s7] “ขอบใจนะ เพราะได้เซนะช่วยไว้แท้ๆ เลย”\n[s8] “ถ้าทำคนเดียวครูคงทำไม่ได้แน่”"
2001203-55 = "ไม่หรอกค่ะ... ฉันก็แค่คอยช่วยอยู่ข้างๆ เท่านั้นเอง"
2001203-56 = "ไม่หรอกค่ะ... ฉันก็แค่คอยช่วยอยู่ข้างๆ เท่านั้นเอง"
2001203-57 = "นอกจากนั้น ถึงตารางงานที่นี่จะเสร็จหมดแล้ว แต่อาการของคุณครูยังดูไม่ดีเท่าไรเลยนะคะ"
2001203-58 = "รีบกลับไปพักผ่อนดีกว่าค่ะ"
2001203-61 = "หืม...?"
2001203-62 = "คุณครู? เป็นอะไรรึเปล่าคะ?"
2001203-63 = "[s9] “ขอโทษที ครูมึนหัวนิดหน่อย”\n[s10] “พอเสร็จงานแล้วก็รู้สึกล้าๆ น่ะ\""
2001203-68 = "เฮ้อ..."
2001203-69 = "ว่าแล้วเชียว"
2001203-70 = "อย่างที่บอกไปค่ะ ฉันมีหน้าที่คอยดูแลสุขภาพของคุณครู และถ้าคุณครู#nยังอยู่ข้างนอกแบบนี้งานของฉันก็ยังถือว่าไม่เสร็จดีค่ะ"
2001203-71 = "เพราะงั้นฉันจะเดินทางไปกับคุณครูจนถึงชาเล่ต์นะคะ และนั่นจะเป็น \"ตารางงานสุดท้าย\" ของวันนี้ค่ะ"
2001203-72 = "ถ้าหากว่าคุณครูหมดสติไประหว่างทางละก็..."
2001203-77 = "ขอแจ้งให้ทราบไว้ก่อนว่าฉันจะพาคุณครูไปที่หน่วยแพทย์ฉุกเฉินทันทีนะคะ..."
2001203-78 = "เข้าใจหรือเปล่าคะ?"
2001203-79 = "[s11] “เข้าใจแล้ว”\n[s12] “ครูยังไม่อยากกลายเป็นศพนะ!”"
2001203-84 = "..."
2001203-89 = "ถ้างั้นฉันจะนำทางไปเลยนะคะ"
2001203-94 = "(หลังจากนั้นคุณครูก็พยายามประคองสติไว้และเดินตามเซนะกลับไปที่ชาเล่ต์#nได้อย่างปลอดภัย)"
2001203-95 = "(พอมาถึงชาเล่ต์คุณครูก็ล้มตัวลงนอนและหมดสติ พอตื่นขึ้นมาก็พบว่ามีผ้าเช็ดตัว#nชุบน้ำและผ้าห่มคลุมอยู่บนตัว)"

[translation]
90002025-2 = "成功了！"
90002025-3 = "沒錯……開始後退了！"
90002025-4 = "目前再湧上來的跡象也……沒有呢……呼……"
90002025-6 = "英美，謝謝你！如果沒有英美的話，是無法這麼順利的。"
90002025-7 = "不是的。這種現場任務我本來就很習慣。更重要的是…"
90002025-8 = "老師把我分配到這裡的判斷才是最關鍵的。"
90002025-12 = "老師？聽得見嗎？現在已完成引擎的緊急修復。 "
90002025-13 = "我也有幫忙。請快點稱讚我。"
90002025-14 = "[s]「莉央和季都辛苦了！」"
90002025-15 = "謝謝。果然做完一件好事後，心情也會變好。"
90002025-17 = "是的，確認完畢。目前運輸船的功能恢復到什麼程度了，Kei？"
90002025-18 = "目前可以重新起飛。但是如果再次受到損傷的話，那就另當別論了……"
90002025-25 = "老師！陽葵前輩！Kei！我是愛麗絲。大家都平安無事。"
90002025-26 = "辛苦了。遊戲開發部的各位。還有英美。"
90002025-27 = "既然都說到這了。能回收剛才襲擊我們的十字神名新型兵力殘骸嗎？"
90002025-28 = "嗯，這次看來可以。需要多少？大概二十個？"
90002025-29 = "……帶走那麼多的話，我們的收納空間會不夠吧……"
90002025-31 = "船外攝影機可以重新啟動。傳輸畫面。"
90002025-37 = "這……"
90002025-38 = "……"
90002025-39 = "[s]「……」"
90002025-41 = "[ns]「那裡是鋼鐵大陸嗎……？」"
90002025-44 = "下一話; 運輸船"

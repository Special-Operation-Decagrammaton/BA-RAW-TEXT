[translation]
34110-1 = "Episode 11; Pursuers"
34110-2 = "Misono Mika..."
34110-3 = "That's my name! I guess you remember me, huh? ☆ What'd you think of my entrance? I was going for cool, vengeful villainess."
34110-4 = "Haven't you missed me, old friend? Why the long face? You look..."
34110-5 = "...You look like you're looking at a witch or something."
34110-6 = "Did you break out of prison to find us?"
34110-7 = "Heehee. I guess I did. I just wanted to see my gals!  "
34110-8 = "I mean, we do have a teensy bit of unfinished business to handle. Don't we, Saori?"
34110-13 = "..."
34110-14 = "*whisper* Where is Sensei?"
34110-15 = "Sensei should be following closely... No more than a few minutes behind."
34110-17 = "Are you wondering how I knew you were here? I was paying attention, you know. Watching your methodologies again and again. Did you dismiss me that easily?"
34110-19 = "How long until the passage closes?"
34110-20 = "About twenty-eight minutes. If we fight now, we both lose and don't reach the entrance in time."
34110-21 = "W-We're gonna lose?!  "
34110-22 = "..."
34110-23 = "We've been on the run for days. Everyone's exhausted. Tactical advantages are what's getting us through right now, not brute force."
34110-24 = "Sensei's command has gotten us through to this point."
34110-25 = "Misono Mika is the main muscle behind the Tea Party. A fight of raw strength is exactly what she wants."
34110-27 = "You sure thought I was stupid, huh? But I figured you out in a snap."
34110-28 = "I'm the one who started the coup, if you recall. I know all your key rendezvous points and meeting places. I totally forgive you for not knowing this, but I'm kind of a big deal."
34110-29 = "But of course you didn't know. You thought I was a fool you could lie to. Manipulate. Take advantage of. Well, I guess you weren't wrong about that part..."
34110-32 = "Our best option is to retreat and regroup."
34110-33 = "No. We'll lose our only opportunity to get to Arius.  "
34110-34 = "We could distract her until Sensei gets here."
34110-35 = "That's..."
34110-37 = "Hello? Are you seriously ignoring me?! That's like, so rude. Don't you remember the good old days of conspiracy and betrayal?"
34110-38 = "I'll have to punish you bullies!  "
34110-48 = "Sh-She's coming!!!"
34110-50 = "Scatter! Don't fight head-to-head!"
34110-61 = "[ns1] \"(Squad said they would handle the front, but I can't reach them.)\"\n[ns2] \"(Did I just hear gunshots?)\""
34110-67 = "[ns] Hurry and follow the sounds."
34110-76 = "H-How is she so...strong...fast... Urgh!"
34110-83 = "Ugh."
34110-88 = "This is the infamous Arius Squad? This is it?  "
34110-89 = "Hahaha! Were you always this weak? A dummy would put up a better fight. Aww, is it because you have lots of boo-boos? Hahahaha! Hilarious!"
34110-94 = "Ugh..."
34110-95 = "Huh? Where's the girl who never talks? With the weird mask? It's okay, I'll hunt her down after I'm done here."
34110-97 = "...?!"
34110-99 = "What's wrong, Saori? I'm an open target! Shoot me! Did you run out of bullets?"
34110-103 = "Damn it..."
34110-104 = "Misaki!"
34110-105 = "Oh, so now you guys are all buddy-buddy? I thought heartless Arius idiots only cared about their stupid missions."
34110-106 = "I'm not a fan of you having friends at all, but relationships ARE important. You know what? I used to have someone I cared about like that! Seia? You remember trying to kill her?"
34110-107 = "*sigh* Don't get me wrong, you have no idea how many times I've wanted to slap her right across the face. Seia really gets under my skin."
34110-108 = "But you know, if she gets hurt... I get so anxious it's the only thing I can think about."
34110-109 = "So imagine when I heard Seia died! I went absolutely nutso crazy! Feelings can be so silly."
34110-110 = "Even if I hated her and wanted to make her suffer sometimes, she was precious to me... I didn't want her to die... I didn't wanna be a murderer..."
34110-111 = "But none of that matters anymore."
34110-122 = "ARGHHHH!"
34110-124 = "Misaki?!"
34110-126 = "I told you to teach her a lesson, not destroy her halo! Didn't I?  "
34110-127 = "Well, I guess you can't say I'm completely faultless. I did kind of ruin everything."
34110-128 = "But, you see. I realized something.  "
34110-129 = "Because of this...incident, I've lost everything."
34110-130 = "The academy...my friends...my home...my memories...my promise with Sensei..."
34110-131 = "Go back to normal? Second chances? Hah! What a silly little fantasy I had. There's no such thing as going back now."
34110-132 = "I want you to suffer, Squad. Saori. I'll make you feel my pain."
34110-133 = "You'll learn my loss. My suffering. My heartache. It's only fair."
34110-138 = "...?! "
34110-146 = "[ns] \"Stop it, Mika!\""
34110-151 = "S-S-Sensei...?!"
34110-152 = "Sensei..."
34110-153 = "[ns] \"Mika! What are you doing here?!\""
34110-154 = "I-I...um...so..."
34110-155 = "I-I don't understand. Why? "
34110-156 = "Sensei. Why are you with Squad?"
34110-157 = "Th-This wasn't supposed to happen..."
34110-158 = "I didn't think Sensei would be here. I didn't want you to have to witness this."
34110-164 = "This way! "
34110-165 = "Misono Mika is on scene! Fire at will!"
34110-175 = "[ns] \"Mika...!\""
34110-176 = "*cough* Arius is on our tail, Sensei. We have to leave her."
34110-177 = "[s3] \"Mika! Go back to Trinity! I'll explain everything!\"\n[s4] \"Wait at Trinity! I'll be there! I promise!\""
34110-178 = "That way! Squad sighting confirmed!"
34110-179 = "That way! Squad sighting confirmed!"
34110-183 = "Th-The passage is gonna close! H-Hurry!"
34110-184 = "[s] Go inside the catacombs with Squad."
34110-185 = "Run! "
34110-203 = "*pant* *pant* W-We're alive... "
34110-204 = "Barely made it. We need to put more distance between us. Let's go."
34110-205 = "You're right. Sensei, please stay close. The path is complicated from here."
34110-206 = "And there's no signal either...so if you get lost you'll be lost forever and ever and ever.  "
34110-207 = "I'm hoping to avoid that outcome. Arius is this way."
34110-212 = "[ns] \"(Mika...)\""
34110-214 = "[ns5] \"(Did she escape prison to take revenge on Squad?)\"\n[ns6] \"(Is everything okay back at Trinity?)\""
34110-218 = "They've escaped into the catacombs. Do we follow?"
34110-219 = "We can still make it! Give chase!"
34110-225 = "Owwie, owwie, owwwwww!  "
34110-227 = "Misono Mika?"
34110-233 = "Oh, reinforcements? "
34110-234 = "Misono Mika. You used to support our cause. Please leave this place immediately."
34110-235 = "I'm sorry, I think I misheard. Do you think you can force me out? With this few?  "
34110-236 = "Hahaha! Did you think you had the advantage because I'm alone? You really can't fix stupid!"
34110-237 = "Where did Squad go? Were you buying them time?  "
34110-238 = "No. We have been pursuing Squad since the Eden Treaty incident.  "
34110-239 = "...Huh?  "
34110-241 = "Squad betrayed Arius and attempted to run away. We've been tasked with erasing them."
34110-242 = "No way? Betrayed and ran away?"
34110-247 = "... "
34110-248 = "Hahahaha! This gets funnier and funnier! They betrayed their own school? How come? "
34110-249 = "Ah, I see. Is this your big finale, Saori? I guess that's what happens when a hunting dog loses its target. Huh."
34110-250 = "I'm beginning to understand."
34110-251 = "And Sensei... Hmm..."
34110-252 = "Sensei, you're taking a risk to help someone in crisis again."
34110-253 = "Oh, geez.  "
34110-254 = "I get it now. "
34110-255 = "Stand down, Mika. This can be forgotten if you leave now."
34110-256 = "Report! The Schale teacher is accompanying Squad! "
34110-257 = "What?! We must report this to her immediately."
34110-266 = "Have you been listening at all? Squad is MINE. Don't touch my things."
34110-267 = "Do you know what happens to people who go after things that don't belong to them? I'll teach you, as many times as you need."
34110-272 = "F-Fire! Fire now!"
34110-289 = "Next Episode; Arius District"

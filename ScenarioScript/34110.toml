[translation]
34110-1 = "ตอนที่ 11;ผู้ไล่ล่า"
34110-2 = "มิโซโนะ มิกะ..."
34110-3 = "กะว่าจะให้ออกโรงเหมือนตัวโกงน่ะ☆! ใช่แล้ว ฉันเองแหละ ยังจำได้อยู่อีกเหรอเนี่ย? "
34110-4 = "ดีใจใช่ไหมที่ได้เจอฉัน ซาโอริ? อ้าว? ทำไมทำหน้าแบบนั้นล่ะ? เธอนี่นะ..."
34110-5 = "ทำหน้าอย่างกับเห็นแม่มดเลยอย่างนั้นแหละ...?"
34110-6 = "นี่เธอ... แหกคุกออกมางั้นเหรอ"
34110-7 = "อื้ม... ประมาณนั้น ฉันคิดถึงก็เลยรีบมาหาน่ะ "
34110-8 = "ก็พวกเรายังมีปัญหาที่ต้องคลี่คลายกันไม่ใช่เหรอ?"
34110-13 = "......"
34110-14 = "(กระซิบ) ครูล่ะ...?"
34110-15 = "กะ... กำลังตามมาอยู่ค่ะ... น่าจะถึงในอีกไม่กี่นาทีค่ะ..."
34110-17 = "อยากรู้ว่าฉันรู้จักที่นี่ได้ไงงั้นเหรอ? ก็ฉันเห็นวิธีที่พวกเธอใช้อยู่หลายครั้ง ทำไมล่ะ? คิดว่าฉันไม่ฉลาด#nพอจนจำอะไรแบบนี้ได้เหรอ? "
34110-19 = "เราเหลือเวลาอีกเท่าไหร่?"
34110-20 = "ประมาณ 28 นาที จะไปสู้เหรอ? ถ้าเราปะทะกับผู้หญิงคนนั้นตอนนี้ เราแทบจะไม่มีโอกาสชนะเลยนะ"
34110-21 = "งะ... งั้นเหรอคะ?! "
34110-22 = "......"
34110-23 = "เราไม่เหลือแรงมาตั้งแต่ระหว่างทางที่หลบหนีแล้ว ถ้าจะต่อสู้ เราก็ต้องสู้อย่างมีข้อได้เปรียบ"
34110-24 = "เราผ่านมาจนถึงตรงนี้ได้เพราะได้คุณครูช่วยสั่งการสนับสนุน"
34110-25 = "มิโซโนะ มิกะคือกำลังของสภาน้ำชา การต่อสู้ที่ใช้การสั่งการและยุทธวิธีแบบนี้มันไม่ได้หรอก มันมีแต่จะทำให้เธอได้เปรียบ"
34110-27 = "คิดว่าฉันคือผู้หญิงโง่ๆ เหรอ? อืม... ก็อาจจะใช่ แต่ฉันก็พอจะถอดรหัสลับที่พวกเธอใช้กันได้ก็แล้วกัน"
34110-28 = "จริงสิ ฉันยังจำสถานที่รวมตัวและจุดสำคัญๆ ของพวกเธอได้อยู่นะ เห็นอย่างนี้ก็เถอะ ฉันเป็นถึงคนที่#nเคยก่อปฏิวัติเลยนะ ใช่แล้ว ฉันเป็นนักเรียนคนสำคัญของโรงเรียนเลยละ"
34110-29 = "อืม... ไม่แปลกที่พวกเธอจะคิดว่าฉันเป็นคนโง่ ที่ผ่านมาฉันก็โดนหลอกใช้งานอย่างง่ายๆ อื้ม... เรื่องนี้จะให้ปฏิเสธก็ยากอยู่..."
34110-32 = "เราถอนกำลังแล้วไปเริ่มต้นใหม่ไหม?"
34110-33 = "ทำงั้นไม่ได้ ทางจะปิดในอีกไม่กี่นาทีนี้แล้ว เราไม่มีเวลาแล้ว"
34110-34 = "จะยื้อเวลาจนกว่าคุณครูจะมางั้นเหรอ?"
34110-35 = "อืม..."
34110-37 = "เอ๋? นี่พวกเธอ ฟังฉันพูดอยู่หรือเปล่า? พวกเธอเมินฉันเหรอ? หืม? แบบนี้มันเกินไปแล้วนะ ทำอย่างนี้กับคนเคยร่วมงานกันมาได้ไง"
34110-38 = "ตั้งใจจะกวนประสาทกันสินะ? "
34110-48 = "มะ... มาแล้วค่ะ!"
34110-50 = "กระจายกันออกไป! อย่าปะทะกันตรงๆ!"
34110-61 = "[ns1] (ติดต่อสควอดที่ล่วงหน้าไปก่อนไม่ได้)\n[ns2] (แถมเมื่อกี้นี้ก็เกิดเสียงปืนดังขึ้น...)"
34110-67 = "[ns] (รีบตามไปดีกว่า)"
34110-76 = "อะ... อึก... เร็วจังเลยค่ะ  แถมยังเก่งมากด้วย..."
34110-83 = "อึก..."
34110-88 = "อะไรกัน อะไรกันเนี่ย? จะมาจบแค่นี้เองเหรอ ซาโอริ? "
34110-89 = "หุ่นเชิดน่าจะยังสู้ได้เก่งกว่าเธออีกนะ ปกติ <สควอด> ต้องเก่งกว่านี้ไม่ใช่เหรอ? ทำไมกลายเป็น#nอย่างนี้ไปได้ล่ะ? บาดเจ็บมาเหรอ? อ่ะฮ่าฮ่า! น่าสมเพชชะมัดเลย น่าหัวเราะจริงๆ"
34110-94 = "อึก..."
34110-95 = "หืม? จะว่าไปแล้ว สมาชิกเธอหายไปคนหนึ่งนี่นา? เด็กผู้หญิงที่สวมหน้ากากและไม่พูดอะไรสักคำ#nหายไปไหนแล้วล่ะ? แต่ก็ไม่เป็นไรหรอก... เดี๋ยวฉันจะรีบหาตัวมาให้เอง"
34110-97 = "...!!"
34110-99 = "ทำไมถึงยืนบื้ออยู่แบบนั้นล่ะซาโอริ? กระสุนหมดรึไง? ไม่ยิงอีกเหรอ? รออะไรล่ะ ฉันไม่ป้องกันตัว#nให้ขนาดนี้แล้วนะ หืม?"
34110-103 = "อึก..."
34110-104 = "มิซากิ...!"
34110-105 = "อืม... จริงสิ พวกเธอคงคิดว่าสหายคือคนสำคัญสินะ? นึกว่าจะอยู่ด้วยกันเพราะต้องทำภารกิจเสียอีก"
34110-106 = "ถึงจะไม่ถูกใจเท่าไหร่ แต่ฉันก็คิดว่าน่าจะเป็นความสัมพันธ์ที่มีค่าอยู่บ้าง ฉันเข้าใจนะ เพราะสำหรับฉันก็มีคนอย่างนั้นเหมือนกัน เซอาจังที่พวกเธอพยายามจะฆ่าไงล่ะ"
34110-107 = "เฮ้อ... จริงๆ เลยนะ ในใจฉันอยากฟาดจนนับครั้งไม่ได้เลยละ ก็เซอาจังชอบทำให้คนโมโหอยู่เรื่อย"
34110-108 = "แต่พอเธอบาดเจ็บอะไรขึ้นมาฉันก็ไม่สบายใจและอดเป็นห่วงจนไม่เป็นอันทำอะไร..."
34110-109 = "พอได้ยินข่าวว่าเซอาจังตายก็สติหลุดไปเลย... หัวใจของคนนี่มันน่าพิลึกเนอะ ว่าไหม?"
34110-110 = "ถึงจะเกลียดและอยากให้เจ็บปวดแค่ไหน แต่ก็ยังเป็นคนสำคัญสำหรับเรา... อื้ม ฉันไม่ได้หวังให้ถึง#nตายหรอก... ฉันไม่ได้คิดจะเป็นฆาตกร..."
34110-111 = "แต่ว่า... ตอนนี้... มันไม่มีประโยชน์อะไรแล้ว..."
34110-122 = "อ๊ากกกกกก!!"
34110-124 = "มิซากิ!!"
34110-126 = "ฉันแค่บอกให้ลงโทษไม่ใช่รึไง ไม่ได้บอกให้ทำลายฮาโลสักหน่อย!"
34110-127 = "คนที่ทำกร่างตามอำเภอใจจนเสียเรื่อง แล้วกลับเสแสร้งเป็นฝ่ายเสียหาย... มีคนอย่างนี้อยู่จริงๆ สินะ... "
34110-128 = "เธอรู้อะไรไหม... "
34110-129 = "หลังจากเรื่องนั้น... ฉันก็ถูกพรากของสำคัญไปทุกอย่างเลย..."
34110-130 = "ทั้งโรงเรียน... ทั้งเพื่อน... ทั้งบ้านฉัน... ที่ที่ให้ไปซุกหัวนอน... และคำสัญญาที่ให้ไว้กับคุณครู..."
34110-131 = "ฉันอุตส่าห์เชื่อว่าพรุ่งนี้ทุกอย่างจะกลับไปเป็นเหมือนเดิม... เรื่องแบบนั้นมันไม่มีหรอก... ใช่แล้ว... เราคงเปลี่ยนสิ่งที่ถูกกำหนดไว้แล้วไม่ได้"
34110-132 = "เพราะงั้น... กองกำลังอาเรียส... ซาโอริ... พวกเธอต้องได้รับความเจ็บปวดอย่างเดียวกันกับที่ฉันเจอมา"
34110-133 = "พวกเธอต้องสูญเสียเท่ากับที่ฉันสูญเสียไป แบบนี้จะได้แฟร์ไง ว่าไหม?"
34110-138 = "......!! "
34110-146 = "[ns] \"หยุดนะ!!\""
34110-151 = "คะ... คะ... คะ... คุณครู!!"
34110-152 = "ครู..."
34110-153 = "[ns] \"มิกะ! เธอมาทำอะไรที่นี่!?\""
34110-154 = "ฉะ... ฉัน.. เอ่อ... คือฉัน..."
34110-155 = "ละ... แล้วทำไม...?! "
34110-156 = "ทะ... ทำไม... คุณครูถึง?!  มาอยู่กับพวกสควอดได้ล่ะ...?"
34110-157 = "มะ... มันต้องไม่ใช่แบบนี้สิ..."
34110-158 = "ทะ... ทำไมถึงเป็นแบบนี้ไปได้ล่ะ... ทำไมถึงมาเห็นด้านที่ฉันไม่อยากให้เห็นเลยแม้แต่นิดเดียวเลยด้วย... ทำไมกัน..."
34110-164 = "ทางนี้!! "
34110-165 = "มิโซโนะ มิกะก็อยู่ด้วย! ยิงเลย!!"
34110-175 = "[ns] \"มิกะ......!!\""
34110-176 = "(แค่กๆ) ไม่มีเวลาแล้ว... คุณครู... อาเรียสไล่ล่ามาแล้ว เราต้องเข้าไปเดี๋ยวนี้"
34110-177 = "[s3] \"มิกะ! กลับทรีนิตี้ไป! แล้วครูจะกลับไปอธิบายทุกอย่างเอง!\"\n[s4] \"ไปรอที่ทรีนิตี้! แล้วครูจะกลับไปหาให้ได้!\""
34110-178 = "ทางโน้น! <สควอด> อยู่ทางโน้น!"
34110-179 = "ทางโน้น! <สควอด> อยู่ทางโน้น!"
34110-183 = "ตะ... ต้องรีบแล้วค่ะ! เส้นทางจะปิดแล้วนะคะ!"
34110-184 = "[s] เข้าไปในสุสานใต้ดินกับสควอด"
34110-185 = "วิ่ง! "
34110-203 = "แฮ่ก... แฮ่ก... เข้ามาแล้ว... "
34110-204 = "เวลายังเหลือ เส้นทางยังไม่ปิด... เราต้องรีบไปก่อนทีมไล่ล่าจะมา"
34110-205 = "เดินต่อไปเรื่อยๆ อย่าหยุดนะครู เส้นทางจากนี้จะซับซ้อนมาก ตามมาให้ดีๆ ล่ะ"
34110-206 = "นะ... ในนี้จะใช้คลื่นสัญญาณไม่ได้นะคะ... ถ้าหลงทางและติดต่อกันไม่ได้ก็จะแย่เลย..."
34110-207 = "ถ้าผ่านที่นี่ไปก็จะถึงเขตปกครองตนเองอาเรียสแล้ว ไปกันเถอะ"
34110-212 = "[ns] (มิกะ...)"
34110-214 = "[ns5] (แหกคุกออกมาเพื่อแก้แค้นสควอดหรือเปล่า?)\n[ns6] (เกิดอะไรขึ้นในทรีนิตี้นะ...?)"
34110-218 = "พวกนั้นหนีเข้าไปในสุสานใต้ดินแล้วค่ะ! ให้ตามไปเลยไหมคะ?"
34110-219 = "เรายังพอมีเวลาอยู่! ไล่ตามไปเร็วเข้า!"
34110-225 = "มันเจ็บนะ!"
34110-227 = "มิโซโนะ มิกะ...?!"
34110-233 = "ฮึ่ม กำลังเสริมเหรอ? "
34110-234 = "มิโซโนะ มิกะ ครั้งหนึ่งเธอเคยสนับสนุนเขตปกครองตนเองของเรา ออกไปจากที่นี่ซะ ถือว่าฉันเห็นแก่มิตรภาพในวันวานหรอกนะ"
34110-235 = "อะไรกัน จะสู้กับฉันด้วยจำนวนคนเท่านี้เหรอ? คิดมาดีแล้วใช่ไหม? "
34110-236 = "สนุกจังเลย คิดว่าจะชนะฉันได้เพราะฉันอยู่ตัวคนเดียวงั้นเหรอ? โง่แบบนี้ไม่ใช้ชีวิตลำบากบ้างเหรอ?"
34110-237 = "<สควอด> ไปไหนแล้วล่ะ? หนีไปแล้วงั้นเหรอ? หรือว่าอยากซื้อเวลาให้พวกนั้นหนีไป?"
34110-238 = "ไม่ใช่... พวกเราก็กำลังไล่ล่า <สควอด> อยู่ต่างหาก "
34110-239 = "หืม...? ว่าไงนะ? "
34110-241 = "<สควอด> หักหลังอาเรียสและหนีไป และภารกิจของเราคือการลงโทษพวกนั้น"
34110-242 = "เดี๋ยวก่อนๆ หมายความว่าไงน่ะ? หักหลัง? หนี?"
34110-247 = "...... "
34110-248 = "ฮ่ะฮ่ะฮ่ะฮ่าฮ่า! เป็นแบบนี้เองเหรอ? สนุกเป็นบ้า แสดงว่าโดนทิ้งล่ะสิ? โดนพวกเดียวกันทิ้งเนี่ยนะ? ไปทำอีท่าไหนเข้าล่ะ? "
34110-249 = "อื้ม... เป็นอย่างนี้นี่เอง นี่คือตอนจบของเธอเหรอซาโอริ? ถ้าหมาล่าเนื้อที่เลี้ยงไว้ทำผิดพลาดก็ต้อง#nเป็นอย่างนี้สินะ อืม..."
34110-250 = "อย่างนี้นี่เอง..."
34110-251 = "ส่วนคุณครู... อืม..."
34110-252 = "คุณครูมาเสี่ยงชีวิตเพื่อช่วยเด็กที่ตกอยู่ในวิกฤตอีกแล้วสินะ"
34110-253 = "เชื่อเค้าเลย... "
34110-254 = "เป็นอย่างนี้นี่เอง... "
34110-255 = "หลบไปซะ มิกะ ถ้าหลบไปตอนนี้ฉันจะปิดหูปิดตาให้"
34110-256 = "มีรายงานค่ะ! ตอนนี้ครูจาก <ชาเล่ต์> เดินทางอยู่กับพวกสควอดค่ะ! "
34110-257 = "หา?! ว่าไงนะ?! รีบไปรายงานผู้หญิงคนนั้น..."
34110-266 = "นี่ๆ ไม่ได้ยินที่ฉันพูดไปเหรอ? สควอดเป็นของฉันนะ ฉันไม่ยอมให้คนอื่นพาตัวไปหรอก"
34110-267 = "เพราะงั้นก็หลบไปซะ รู้ใช่ไหมว่าถ้ามายุ่งกับของของคนอื่นตามอำเภอใจจะเป็นยังไง? อืม... หรือว่าจะไม่รู้..."
34110-272 = "ยิง! ยิงเลย!!!!"
34110-289 = "ตอนต่อไป;เขตปกครองตนเองอาเรียส"

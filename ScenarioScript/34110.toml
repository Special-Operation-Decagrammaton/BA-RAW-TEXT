[translation]
34110-1 = "第11話;追擊者"
34110-2 = "聖園，彌香……"
34110-3 = "像是反派登場☆的感覺吧！……你們還記得我吧？"
34110-4 = "看到你真開心……不像是這種表情呢，怎麼了嗎？"
34110-5 = "露出那種，彷彿看到魔女的表情。"
34110-6 = "……我聽說你被關在牢裡了。"
34110-7 = "逃出來了☆#n……因為想早點見到你們呢。"
34110-8 = "你看……我們之間不是還有該說的話沒說完嗎。"
34110-13 = "……"
34110-14 = "……老師呢？"
34110-15 = "還，還在後面……我想應該很快就會到了……"
34110-17 = "至今為止我也和你們行動不少次了。所以馬上就知道你們會來這裡了唷。"
34110-19 = "……離通道封閉還有多久？"
34110-20 = "大約28分鐘……難道你想戰鬥嗎？我認為現在跟那個女人交戰不是明智的選擇。"
34110-21 = "不，不太明智呢……？"
34110-22 = "……"
34110-23 = "我們光是跟公主一起逃離奧利斯就已經快要耗盡體力了。#n如果沒有人指揮的話，根本無法好好戰鬥。"
34110-24 = "剛才也是因為有著老師的指揮才勉強能夠戰鬥的……"
34110-25 = "聖園彌香……她簡直像是茶會的異類一樣，擁有驚人的武力。除此之外，現在這種亂戰的情況對她來說是最有利的戰場哦。"
34110-27 = "啊哈哈☆你們是在嘲笑我是個愚鈍的人嗎？是這樣吧？#n不過，你們的暗號之類的我還是清楚的。"
34110-28 = "像是集合地點和據點我也都還記得。#n別看我這樣，我好歹也是發起政變的當事人呢！"
34110-29 = "啊哈哈。雖然大概是被你們當成笨蛋了。#n……我很好利用嗎？嘛，這我也不否認唷。"
34110-32 = "先暫時後退，重新再來一次呢？"
34110-33 = "不行，沒有時間了。通道馬上就要關閉了。"
34110-34 = "爭取時間等到老師過來呢？"
34110-35 = "這個……"
34110-37 = "吶吶，你們有在聽我說話嗎？無視？#n無視我不會有點過分嗎？再怎麼說我們都是一起發起政變的夥伴嘛。"
34110-38 = "你們這樣……不是在排擠我嗎？"
34110-48 = "噫！往，往這邊來了！？"
34110-50 = "快散開！別和她正面交戰！"
34110-61 = "[ns1] （無法和先行探路，應該要回報狀況的奧利斯小隊取得聯絡）\n[ns2] （剛才的槍聲是……）"
34110-67 = "[ns] （得趕快追上去才行）"
34110-76 = "嗚，嗚嗚……速度太快了……"
34110-83 = "唔……"
34110-88 = "吶？吶吶沙織？這樣就不行了嗎？"
34110-89 = "就連裝飾用的人偶都比現在的你還能打吧？#n不會只有這種程度而已吧，「奧利斯小隊」。吶，怎麼了嗎？"
34110-94 = "唔……"
34110-95 = "咦，這麼說來好像少了一個人呢？戴著面具又無口的孩子呢？"
34110-97 = "……！！"
34110-99 = "哎呀……已經沒子彈了嗎？#n來，快繼續開槍嘛？我都這麼沒有防備地站在這裡了，來呀！"
34110-103 = "咕，啊……"
34110-104 = "美咲……！"
34110-105 = "嘿……你們也會重視夥伴啊？我還以為你們只是因為任務才聚在一起的。"
34110-106 = "不管是什麼人都會有重要的存在對吧。嗯嗯，因為我也有所以我知道唷。#n──就是你們想要殺掉的，聖亞醬哦。"
34110-107 = "你們知道嗎？聖亞醬她啊，可是讓人生氣的天才唷。#n我都不知道想用拳頭揍她幾次了！"
34110-108 = "不過……雖然平常覺得她是個討厭的傢伙，一旦受傷了卻還是會擔心呢。#n想著她會不會有事而感到不安呢。"
34110-109 = "聽到聖亞醬死掉的時候，真的很難過。#n……真奇怪呢。明明只是跟她說話就會心浮氣躁，一點也不開心呢。"
34110-110 = "不過我還是討厭聖亞醬唷？總是說一些讓人聽不懂的話。#n但是，她對我來說還是很重要的人。#n──我並不希望她去死。我也沒有打算要成為殺人兇手。"
34110-111 = "不過，已經……全部，全部都太遲了……"
34110-122 = "咕唔──！！"
34110-124 = "美咲！！"
34110-126 = "我……只說過讓她吃點苦頭之類的而已對吧？#n什麼時候說過要破壞她的光環了？"
34110-127 = "嘛，我也是因為自己胡鬧而把事情搞砸了，事到如今卻還裝成被害者？這種感覺就是了……"
34110-128 = "不過……"
34110-129 = "我……珍貴的東西……全部都失去了唷？"
34110-130 = "學園……朋友……寶物……歸宿……和老師的約定也……"
34110-131 = "我還相信只要到了明天，一切說不定都能回復原狀的……#n那種事果然只有在故事裡才會發生吧……啊哈哈……看來命運已經決定了。"
34110-132 = "所以啊……「奧利斯小隊」的……特別是沙織。#n得讓你們感受跟我一樣的痛苦才行。"
34110-133 = "我所失去的東西，也要讓你們失去才行。不然的話──很不公平吧？"
34110-138 = "……！！"
34110-146 = "[ns] 「等等！！」"
34110-151 = "老，老，老師……！？"
34110-152 = "老師……"
34110-153 = "[ns] 「彌香……你在這裡做什麼啊？」"
34110-154 = "我，我是……那個……這個……"
34110-155 = "比起這個，為什麼……？"
34110-156 = "吶，吶……老師！？為什麼老師會跟奧利斯小隊在一起呢……？"
34110-157 = "不，不應該會這樣的……"
34110-158 = "吶……為什麼會變成這樣呢……？#n偏偏讓你看到了這種模樣……為什麼……"
34110-164 = "在這裡！"
34110-165 = "聖園彌香也在！開火！！"
34110-175 = "[ns] 「彌香……！」"
34110-176 = "咳……老師，沒有時間了……得趕快進去才行。"
34110-177 = "[s3] 「總之彌香趕快回三一去！我之後會跟你說明的！」\n[s4] 「在三一等著，我一定會回去的！」"
34110-178 = "在那裡！「小隊」也在！"
34110-179 = "在那裡！「小隊」也在！"
34110-183 = "得，得快點才行！通道馬上就要關閉了！"
34110-184 = "[s] 和奧利斯小隊一起進入地下墓穴"
34110-185 = "快跑！"
34110-203 = "哈啊，哈啊……安，安全了……"
34110-204 = "……離通道完全關閉前還有一點時間。得在追兵過來之前趕快前進才行。"
34110-205 = "走吧。老師，從這裡開始的道路很複雜，還是小心點比較好。"
34110-206 = "因，因為這裡沒有訊號……只要迷路就完蛋了……"
34110-207 = "前面就是奧利斯自治區了。走吧。"
34110-212 = "[ns] （彌香……）"
34110-214 = "[ns5] （沒想到她竟然會為了向奧利斯小隊復仇而逃獄？）\n[ns6] （在三一究竟發生了什麼……？）"
34110-218 = "他們逃進地下墓穴了！要追過去嗎？"
34110-219 = "還有時間，追上去吧！"
34110-225 = "啊──真是的好痛呀！"
34110-227 = "聖園彌香……！？"
34110-233 = "哼？是援軍嗎？"
34110-234 = "聖園彌香……你曾經支援過我們自治區。#n看在這個面子上，只要你立刻離開這裡，我們就放過你。"
34110-235 = "什麼什麼？只靠這點人也想當我的對手？你們的腦袋還好嗎？"
34110-236 = "真有趣呢！覺得對方只有我一個人就可以贏嗎？#n腦袋只有這種程度的話，日常生活不會很辛苦嗎？"
34110-237 = "「小隊」到哪裡去了？吶，難道你們是在爭取時間嗎？"
34110-238 = "不……我們追擊的目標就是「小隊」。"
34110-239 = "……咦？"
34110-241 = "「小隊」背叛了奧利斯逃跑了。處決他們就是我們的任務。"
34110-242 = "等等……你剛才說什麼？背叛？逃跑了？"
34110-247 = "……"
34110-248 = "啊哈哈☆這樣啊……真有趣呢，你們被同伴拋棄了啊？"
34110-249 = "……沙織，這就是你的下場啊。"
34110-250 = "……這樣啊，狩獵失敗的獵犬已經沒有利用的價值了，是這麼回事啊。"
34110-251 = "而老師……"
34110-252 = "又為了陷入危機的孩子們犧牲了自己呢。"
34110-253 = "真的是……"
34110-254 = "……無藥可救呢。"
34110-255 = "讓開！現在的話我們還能睜一隻眼閉一隻眼。"
34110-256 = "報告！「夏萊」的老師和「小隊」正在一起行動！"
34110-257 = "你，你說什麼！？得趕快和她報告……"
34110-266 = "吶吶，你們沒有在聽我說話嗎？奧利斯小隊是我的東西唷。#n誰也別想搶走。"
34110-267 = "──所以啊，可以請你們消失嗎？"
34110-272 = "開，開火！！"
34110-289 = "下一話;奧利斯自治區"

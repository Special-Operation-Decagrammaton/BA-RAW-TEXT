1006302-117 = "3;코유키;03;니.하.하.하~! 놀라시긴 아직 이르다고요! 저기 소파 밑에는 과자도 숨겨 놨고, 정수기 뒤에는 만화책도 있고!!\n#3;em;[재잘]\n#3;hophop"

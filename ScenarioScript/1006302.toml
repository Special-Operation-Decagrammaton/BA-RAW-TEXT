[translation]
1006302-1 = "The Occupant of the Self-Reflection Room"
1006302-2 = "I went to meet Koyuki in a building at the very heart of Millennium."
1006302-3 = "It was a building I'd rarely been in before, and strangely well-guarded."
1006302-4 = "[s1] \"There's a place like this in Millennium?\"\n[s2] \"Koyuki's in a place like this?\""
1006302-7 = "...Ah! That voice!"
1006302-13 = "Sensei! Sensei! Over here! I'm over here!"
1006302-19 = "Sensei! Senseeeeeei!"
1006302-20 = "[s3] \"...Koyuki!?\"\n[s4] \"This door is locked!\""
1006302-30 = "Sensei! Wow! You're really here, Sensei!"
1006302-31 = "You'll be able to open the door, Sensei! You've got the authority!"
1006302-32 = "Only you could possibly help me now! You're not going to abandon me here, are you?!"
1006302-33 = "[s5] \"Calm down. I'm on my way.\"\n[s6] I unlocked the door and went inside."
1006302-44 = "Sensei! It IS you, Sensei!"
1006302-45 = "Thank you SO much for coming! If you hadn't..."
1006302-46 = "What I thought would happen..."
1006302-47 = "It's too terrible to even think about!"
1006302-48 = "Huh? You wanna know what the hurry is?"
1006302-49 = "Um..."
1006302-50 = "Well, isn't that something we should decide together?"
1006302-56 = "What do you want to do? You can choose, Sensei!"
1006302-61 = "Hmm? You don't know what you're choosing from...? Well, it's not like I had anything specific in mind!"
1006302-65 = "After all, this is the Self-Reflection Room... And I got caught, so I'm stuck here until tomorrow night..."
1006302-66 = "And no one wants to come visit except to bring me meals, so..."
1006302-67 = "So I'm so bored..."
1006302-71 = "B-But! But that's not important right now! Right now, what's important is deciding what game we wanna play!"
1006302-72 = "[s7] \"Wait, hold on. So you didn't actually have a problem?\"\n[s8] \"You just brought me here to play a game?\""
1006302-75 = "What?!"
1006302-76 = "I am in trouble, I am! Just look at how tortured and pitiful I am!"
1006302-77 = "[s] \"...\""
1006302-81 = "[ns9] \"...?\"\n[ns10] \"How are you tortured?\""
1006302-84 = "...Ha!"
1006302-85 = "Just look around, Sensei! Look at the walls of the tiny Self-Reflection Room! I've been trapped here for the whole day!"
1006302-86 = "...Huh?"
1006302-87 = "You wanna know why I was locked here? And why I can't just leave if I want to so bad?"
1006302-88 = "Haha, Sensei! Why are you being so dense today?"
1006302-89 = "Of course leaving wouldn't be a problem!"
1006302-90 = "The problem is what happens AFTER I leave."
1006302-91 = "The instant! The very instant they find out I'm gone, everyone from the Seminar and C&C will start rushing around, and then..."
1006302-95 = "...And then...!"
1006302-96 = "So obviously I can't take a gamble like that until I figure out a sure-fire plan to avoid getting caught!"
1006302-97 = "So until I think of something, I just gotta stay calm. Okay? Do you get it now?"
1006302-98 = "[s11] \"...Hah...\"\n[s12] \"(What I understand is that you have absolutely no remorse...)\""
1006302-101 = "Okay! We've spent way too long talking about bummers! It's time to focus. What do you wanna do for fun, huh?"
1006302-102 = "Hmm? What's that?"
1006302-103 = "Oh, I see you've noticed the result of my efforts! You've got sharp eyes, Sensei!"
1006302-104 = "Haha, yeah! It's totally way comfier than you'd expect the Self-Reflection Room to be!"
1006302-105 = "I've been locked up in here so much, this is pretty much my own private room. Niha!"
1006302-106 = "[s] \"...\""
1006302-107 = "I had to think outside the box, y'know?"
1006302-108 = "If it's basically my room...then I should decorate it like it's my room! If I'm gonna be stuck here all the time, it might as well be nice!"
1006302-109 = "But I wasn't gonna stop there! It's not just cute and comfy, you know? It's also got a ton of nooks and crannies that no one else thinks to check!"
1006302-113 = "So... Ta-da! I've hidden a bunch of board games!"
1006302-114 = "[s13] \"...What!?\"\n[s14] \"This room is supposed to be for self-reflection...\""
1006302-117 = "Yahaha! It's way too early for you to be so surprised! Because...I have some snacks hidden under the sofa! And manga behind the water fountain!"
1006302-118 = "So as long as I can get someone to keep me company, it's actually the perfect hideout! Aren't I brilliant? If I have to stay trapped here, I'll make it a good place to be!"
1006302-119 = "What do you think? Amazing, right? Humans are infinitely adaptable creatures! No matter the adversity, we find a way!"
1006302-124 = "...Huh? What's with your face, Sensei?"
1006302-125 = "Nihahaha! I sure surprised you, didn't I? Even you were taken aback by my cleverness!"
1006302-126 = "[s15] \"Well, it is a bit surprising....\"\n[s16] \"Maybe in a different way than you mean it, though...\""
1006302-129 = "Don't be shy, Sensei! What's mine is yours! Make yourself at home! Have a snack!"
1006302-130 = "Pick any game you want! The night is young! Or, the day is young! Or whatever time it is!"
1006302-131 = "Ah."
1006302-132 = "This is probably obvious, but don't mention this to anyone, okay? Nihahaha!"
1006302-137 = "Koyuki and I played board games together in the Self-Reflection Room until late at night."
1006302-141 = "And then, as soon as I got back to Schale, I reported Koyuki's modifications to Seminar."

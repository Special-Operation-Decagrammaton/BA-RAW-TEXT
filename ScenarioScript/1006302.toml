[translation]
1006302-1 = "反省室的居民"
1006302-2 = "（於是為了見小雪一面，前往了千年中心部的某棟大樓）"
1006302-3 = "（是棟平常幾乎不會去的建築，戒備卻格外森嚴）"
1006302-4 = "[s1]「千年居然有這種地方……」\n[s2]「小雪在這裡嗎？」"
1006302-7 = "……哈，這個聲音是！"
1006302-13 = "老師！老師！這裡這裡，我在這裡唷──！"
1006302-19 = "老師──！！！"
1006302-20 = "[s3]「……小雪！」\n[s4]「難道，這個聲音是……！？」"
1006302-30 = "老師！我就相信老師你一定會來的！！"
1006302-31 = "拜託！可以幫我開門嗎！？#n以老師的權限應該能打開的！"
1006302-32 = "我能依賴的只有老師而已了！#n你不會就這樣把我丟在這裡不管的對吧！？"
1006302-33 = "[s5]「等我一下，我馬上幫你開門。」\n[s6] 打開門走進去"
1006302-44 = "好耶──！是老師──！！！"
1006302-45 = "幸好你來了！！！#n謝謝你！"
1006302-46 = "要是老師沒有過來的話，我真的真的……"
1006302-47 = "都不敢想像會被怎麼對待！"
1006302-48 = "咦？我為什麼這麼緊張？#n這個嘛……"
1006302-49 = "唔嗯～～～"
1006302-50 = "算了！那種事情先放到一邊去吧！"
1006302-56 = "那麼，老師有沒有什麼想做的事情呀？"
1006302-61 = "……尼哈哈。果然很在意把你叫來這裡的理由是嗎……？"
1006302-65 = "這裡基本上是個反省室……#n然後我又被抓了進來，必須待到明天傍晚為止……"
1006302-66 = "還被告知除了吃飯時間以外沒人會來……"
1006302-67 = "害我覺得很無聊……"
1006302-71 = "哎，哎呀～這種小事就別在意了！！#n既然老師都來了，還是來想想該玩些什麼吧！樂觀一點！！"
1006302-72 = "[s7]「不，先等等。不是因為發生了什麼事嗎……？」\n[s8]「因為你說要救你，所以我才急急忙忙趕來的……」"
1006302-75 = "……咦！？"
1006302-76 = "不不不，確實是遇到困難了唷！？#n請你仔細看看我的處境！無論怎麼看都很困擾吧！"
1006302-77 = "[s] 「……」"
1006302-81 = "[ns9]「……？」\n[ns10]「哪，哪個部分……？」"
1006302-84 = "……真是的！"
1006302-85 = "這個房間！#n被關在這種又窄又痛苦的反省室，什麼事都做不了哦！"
1006302-86 = "……咦？"
1006302-87 = "你問我為什麼會被關在這裡？#n還有我不是想出去就能出去……？"
1006302-88 = "尼哈哈哈哈！又開這種玩笑！老師明明就很清楚的嘛……"
1006302-89 = "確實就像你說的一樣，這種地方只要我稍微動動手就能輕鬆逃出去了沒錯，但是！"
1006302-90 = "問題在逃出去之後！！"
1006302-91 = "在發現我逃離這裡的瞬間，研討會和C&C的前輩們就會咻～地一聲開始追趕我唷！"
1006302-95 = "唔呃……光是想像一下就……"
1006302-96 = "總之就是這樣……既然無法完全脫身，現在還是乖乖待在這裡比較好。"
1006302-97 = "在想到下次該做什麼呢～之前，就先讓他們抓住吧。#n尼哈哈哈哈！"
1006302-98 = "[s11]「唉……」\n[s12]（姑且明白他沒有打算反省的意思了……）"
1006302-101 = "先別說這些了！一起想想要玩什麼吧──"
1006302-102 = "咦？怎麼了？"
1006302-103 = "以反省室來說格外有生活感的？"
1006302-104 = "你的觀察力真是不錯呢，老師。#n這間反省室我已經來過不知道多少次了，所以幾乎已經是我專用的房間了呀！"
1006302-105 = "每次我被抓進來的時候，就會帶一點自己的東西進來唷！#n因此才讓這裡變得越來越舒服了，尼哈哈哈哈！"
1006302-106 = "[s] 「…………」"
1006302-107 = "……簡單來說就是逆向思考！！！"
1006302-108 = "畢竟被抓的次數早就多到數不清了嘛！#n既然如此不如就乾脆讓自己能過得快樂一點！"
1006302-109 = "而且你看這邊！其實在這個墊子底下，還藏著沒有被前輩們發現的……"
1006302-113 = "……鏘～！！！我還藏了桌遊哦！！"
1006302-114 = "[s13]「……咦？」\n[s14]「不，這裡可是反省室啊……」"
1006302-117 = "尼．哈．哈．哈～！現在驚訝還太早了！#n沙發底下還藏著餅乾！哼哼，淨水器後面甚至還有漫畫！"
1006302-118 = "只要有人能陪我一起玩的話，這裡就是我專屬的舒適祕密基地了！"
1006302-119 = "怎麼樣，不覺得很厲害嗎？#n人類果然是適應的動物呢！無論在什麼樣的環境都能找到出路！"
1006302-124 = "……老師？為什麼要露出那種表情？"
1006302-125 = "尼哈哈！是因為被我嚇了一跳嗎？#n就算是夏萊的老師也沒料到這種展開嗎？"
1006302-126 = "[s15]「確實是嚇了一跳……」\n[s16]「要說沒料到也確實沒料到……」"
1006302-129 = "來來來，儘管吃儘管吃！老師就算想吃我的點心也沒關係！#n不用客氣的唷～？"
1006302-130 = "夜晚可是很長的，今天能玩個痛快了呢～！雖然還沒到晚上就是了！！！"
1006302-131 = "……啊。"
1006302-132 = "忘記提醒你，這件事要向前輩們保密哦！#n尼哈哈哈哈！"
1006302-137 = "（在那之後，和小雪一起在「反省室」裡玩桌遊玩到很晚）"
1006302-141 = "（……當然，回到夏萊後立刻聯絡研討會，告知了小雪的狀況）"

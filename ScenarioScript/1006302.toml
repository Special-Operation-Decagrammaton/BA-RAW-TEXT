[translation]
1006302-1 = "ผู้ที่อยู่ในห้องสำนึกผิด"
1006302-2 = "(คุณครูมุ่งหน้าไปพบโคยูกิที่อาคารแห่งหนึ่งในใจกลางมิลเลเนียม)"
1006302-3 = "(อาคารนี้มีการรักษาความปลอดภัยอย่างแน่นหนาจนน่าแปลกใจ)"
1006302-4 = "[s1] \"ในมิลเลเนียมมีที่แบบนี้ด้วยเหรอ...\"\n[s2] \"โคยูกิอยู่ในที่แบบนี้เหรอ?\""
1006302-7 = "อ๊ะ! เสียงนี้มัน...!!"
1006302-13 = "คุณครู! คุณครู! ตรงนี้ค่ะ ฉันอยู่ตรงนี้!"
1006302-19 = "คุณครู!! คุณครูขาาา!!"
1006302-20 = "[s3] \"โคยูกิ...!?\"\n[s4] \"มีเสียงดังมาจากห้องที่ล็อกไว้ด้วย...!?\""
1006302-30 = "คุณครู!! คุณครูมาหาฉันจริงๆ ด้วยสินะคะ!!"
1006302-31 = "คุณครูน่าจะเปิดประตูเข้ามาได้เลยนะคะ!! ก็เป็นคุณครูนี่นา ต้องเปิดได้อยู่แล้วสิ!!"
1006302-32 = "นี่คือเรื่องที่มีแต่คุณครูเท่านั้นที่ช่วยได้ค่ะ! คุณครูคงจะไม่ทิ้งฉันไว้แบบนี้ใช่มั้ยคะ!?"
1006302-33 = "[s5] \"ใจเย็นๆ ครูจะไปช่วยเดี๋ยวนี้แหละ\"\n[s6] เปิดประตูเข้าไป"
1006302-44 = "คุณครู!! คุณครูจริงๆ ด้วย!!!"
1006302-45 = "ขอบคุณที่มานะคะ!! ถ้าคุณครูไม่มาละก็ ฉันคง...!"
1006302-46 = "ฮึ่ย.... แค่คิดก็... ขนลุกแล้ว"
1006302-47 = "แค่จินตนาการดูก็น่าขนลุกสุดๆ แล้วค่ะ!"
1006302-48 = "คะ? มีเรื่องอะไรถึงได้ลุกลี้ลุกลนขนาดนี้งั้นเหรอคะ?"
1006302-49 = "อืม..."
1006302-50 = "นั่นเป็นปัญหาที่ต้องมาช่วยกันคิดตั้งแต่ตอนนี้ไม่ใช่เหรอคะ?"
1006302-56 = "เราทำอะไรกันดีคะ? คุณครูอยากทำอะไรคะ?"
1006302-61 = "อ๊ะ ไม่เข้าใจเหรอคะ? อืม ก็ไม่ได้มีอะไรเป็นพิเศษหรอกค่ะ..."
1006302-65 = "ก่อนอื่น... ที่นี่คือห้องสำนึกผิด ฉันถูกคุมตัวมาที่นี่ และกว่าจะได้ออกไปก็เย็นพรุ่งนี้เลย..."
1006302-66 = "นอกจากเวลาอาหารแล้วก็ไม่มีใครเข้ามาหาหรือคุยเล่นด้วย เพราะงั้นฉันก็เลย..."
1006302-67 = "เบื่อนิดหน่อยน่ะ..."
1006302-71 = "ชะ...ช่างเถอะ!! เราข้ามเรื่องเล็กๆ น้อยๆ พวกนี้ไปเถอะค่ะ! สิ่งที่สำคัญจากนี้คือ 'เราจะเล่นสนุกอะไร#nกันดี' มากกว่าค่ะ!"
1006302-72 = "[s7] \"เดี๋ยวนะ... เดี๋ยวก่อน ไม่ได้มีปัญหาอะไรอยู่งั้นหรอ...?\"\n[s8] \"ชวนเล่นสนุกงั้นเหรอ... แล้วที่ว่าจะขอความช่วยเหลือคือยังไงนะ...\""
1006302-75 = "คะ...?!"
1006302-76 = "ฉันตกอยู่ในสถานการณ์ลำบากจริงๆ นี่คะ ดูก็รู้แล้วว่าฉันกำลังต่อสู้กับความยากลำบากน่ะค่ะ!?"
1006302-77 = "[s] \"......\""
1006302-81 = "[ns9] \"...???\"\n[ns10] \"ต้องดูจากตรงไหนเหรอ...\""
1006302-84 = "ฮึ่ย...!!"
1006302-85 = "ลองดูรอบๆ สิคะ! ฉันต้องถูกกักตัวในห้องสำนึกผิดแคบๆ แบบนี้ทั้งวัน แถมไม่มีอะไรให้ทำด้วยค่ะ!"
1006302-86 = "คะ...?"
1006302-87 = "ทำไมฉันถึงถูกกักตัวเหรอคะ? แล้วก็... ถ้าฉันคิดจะออกก็ออกไปได้งั้นเหรอคะ?"
1006302-88 = "โธ่เอ๊ย คุณครูเนี่ย เฮ้อ! รู้ดีอยู่แล้ว แต่ทำไมมาถามแบบนี้นะ?"
1006302-89 = "จริงๆ ถ้าจะออกก็ออกไปได้ค่ะ ไม่ใช่เรื่องใหญ่อะไรหรอกค่ะ"
1006302-90 = "แต่ปัญหาคือหลังจากออกไปแล้วต่างหากค่ะ!!"
1006302-91 = "วินาทีที่ทุกคนรู้ว่าฉันหนีออกไปจากที่นี่ ทางเซมิน่ากับพวกรุ่นพี่ C&C จะต้องรีบมาจัดการฉันทันที#nแน่นอนค่ะ..."
1006302-95 = "......"
1006302-96 = "เพราะงั้น... ฉันจึงไม่อาจหนีไปได้ เว้นแต่จะมีวิธีที่ทำให้พวกรุ่นพี่จับฉันไม่ได้ค่ะ"
1006302-97 = "ฉันก็เลยบอกตัวเองว่าถ้ายังคิดแผนการที่เฉียบแหลมไม่ออก การอยู่นิ่งๆ ไว้ก่อนคือทางออกที่ดีที่สุดค่ะ เข้าใจหรือยังคะ?"
1006302-98 = "[s11] \"เฮ้อ...\"\n[s12] (ไม่มีวี่แววว่าจะสำนึกผิดเลย....)"
1006302-101 = "เอาละๆ พักเรื่องน่าสิ้นหวังไว้เท่านี้ก่อน มาคิดกันดีกว่าค่ะว่าจากนี้จะเล่นสนุกอะไรกันดี..."
1006302-102 = "หืม? ว่าไงนะคะ?"
1006302-103 = "ที่นี่ดูตกแต่งหรูหราเกินกว่าจะเป็นห้องสำนึกผิดงั้นเหรอคะ...?"
1006302-104 = "ฮุฮุ ตาถึงจังเลยนะคะคุณครู นี่เป็นผลจากความพยายามอย่างต่อเนื่องของฉันค่ะ"
1006302-105 = "พอดีฉันถูกคุมตัวมากักบริเวณที่ห้องนี้บ่อยๆ... เพราะงั้นห้องสำนึกผิดก็ไม่ต่างจากห้องส่วนตัว#nของฉันหรอกค่ะ อุวะฮ่าฮ่าฮ่า!!"
1006302-106 = "[s] \"......\""
1006302-107 = "เพราะงั้นฉันก็เลยคิดนอกกรอบนิดหน่อย..."
1006302-108 = "และตกแต่งห้องนี้ไว้ให้ใช้ชีวิตได้อย่างสะดวกสบายในแบบของฉันไงคะ!! ให้มีฟีลเหมือนได้อยู่ใน#nห้องของตัวเองน่ะค่ะ!!"
1006302-109 = "ดูตรงนี้สิคะ! ไม่ได้มีแค่ที่เห็นนะคะ เพราะในทุกซอกทุกมุมที่รุ่นพี่คิดไม่ถึง..."
1006302-113 = "แต่นแต๊น~!! มีบอร์ดเกมซ่อนไว้ด้วยค่ะ!!"
1006302-114 = "[s13] \"หืม...!?\"\n[s14] \"นี่มันห้องสำนึกผิดจริงเหรอ...\""
1006302-117 = "อุ~ วะ~ ฮะ~ ฮะ~! ยังเร็วไปที่จะตกใจค่ะ! เพราะใต้โซฟาตรงนั้นมีขนมซ่อนไว้ด้วย แถมข้างหลัง#nเครื่องกรองน้ำก็มีหนังสือการ์ตูนด้วยค่ะ!!"
1006302-118 = "ที่นี่คือฐานทัพส่วนตัวของฉันที่ถ้าใครได้มาเล่นด้วย ก็จะรู้สึกอบอุ่นสบายเหมือนอยู่บ้านเลยค่ะ!#nถ้าต้องมาติดแหง็กที่นี่บ่อยๆ ก็ควรทำให้ที่นี่เป็นห้องที่น่าอยู่ว่ามั้ยคะ?"
1006302-119 = "เป็นไงคะ? ยอดไปเลยใช่มั้ยคะ? มนุษย์เป็นสัตว์แห่งการปรับตัว ไม่ว่าจะเจอความลำบากแบบไหน#nเราก็จะค้นพบเส้นทางในแบบของตัวเองค่ะ!"
1006302-124 = "หืม...? คุณครู? ทำไมทำหน้าแบบนั้นล่ะคะ?"
1006302-125 = "ตกใจใช่ม้า? อุวะฮะฮ่า! แม้แต่คุณครูก็ยังประหลาดใจกับแนวคิดนี้ของฉันใช่มั้ยคะ?"
1006302-126 = "[s15] \"ประหลาดใจมาก ประหลาดใจสุดๆ...\"\n[s16] \"คิดไม่ถึงเลยนะว่าจะได้เจออะไรแบบนี้...\""
1006302-129 = "เอาเถอะค่ะๆ ของของฉันก็เหมือนของของคุณครู ขนมที่อยู่ในห้องนี้ คุณครูทานได้เต็มที่เลยนะคะ#nไม่ต้องเกรงใจค่ะ!"
1006302-130 = "ถ้ามีเกมที่อยากเล่น ก็หยิบมาเล่นได้ตามสบายเลยค่ะ!! ก็ราตรีนี้ยังอีกยาวไกลนี่คะ! ตอนนี้ก็ยัง#nไม่มืดเลยด้วย~!!"
1006302-131 = "อ๊ะ..."
1006302-132 = "คุณครูอย่าไปบอกพวกรุ่นพี่คนอื่นนะคะ!! อุวะฮ่าฮ่า!"
1006302-137 = "(หลังจากนั้นคุณครูก็เล่นบอร์ดเกมอยู่กับโคยูกิใน 'ห้องสำนึกผิด' จนถึงดึกดื่น)"
1006302-141 = "(และทันทีที่กลับไปถึงชาเล่ต์ คุณครูก็ติดต่อเซมิน่าเพื่อแจ้งเรื่องของโคยูกิทันที)"

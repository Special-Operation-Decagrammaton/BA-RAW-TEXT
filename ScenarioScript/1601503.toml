[translation]
1601503-1 = "ชูการ์รัช"
1601503-2 = "(คุณครูไปหาไอริที่ห้องซ้อมและช่วยไอริซ้อมเล่นคีย์บอร์ด ส่วนปัญหาเรื่องท่อนที่เล่นไม่ได้ ก็ช่วยกัน#nหาสาเหตุและแก้ไขได้เร็วกว่าที่คิด)"
1601503-3 = "(แต่ปัญหาจริงๆ ของวันนี้... เริ่มขึ้นระหว่างทางกลับหลังจากซ้อมดนตรีเสร็จแล้ว)"
1601503-5 = "จู่ๆ ฝนก็ตกลงมาเฉยเลย..."
1601503-6 = "คิดไม่ถึงเลยนะคะว่าฝนจะตกซู่แบบนี้ กลายเป็นว่าต้องมาหลบฝนอยู่หน้าตึกที่ไม่รู้จัก..."
1601503-7 = "แถมยังไม่มีร่ม และแถวๆ นี้ก็เหมือนจะไม่มีร้านสะดวกซื้อด้วย..."
1601503-8 = "อึก... รู้สึกผิดจังเลยค่ะที่ทำให้คุณครูต้องมาเปียกฝนแบบนี้ ขอโทษด้วยนะคะ"
1601503-9 = "[s1] \"ขอโทษทำไม ฝนตกไม่ใช่ความผิดไอริสักหน่อย\"\n[s2] \"แต่แบบนี้ก็ไม่ถือว่าแย่นะ?\""
1601503-12 = "อืม... งั้นเหรอคะ ถ้าคุณครูจะคิดในแง่ดี ฉันก็ขอบคุณค่ะ"
1601503-13 = "แต่ก็น่าเสียดายนะคะ อีกนิดเดียวก็จะถึงห้องชมรมแล้วแท้ๆ ถ้าเราวิ่งกันอีกหน่อยละก็..."
1601503-17 = "คง...?"
1601503-18 = "เอ๋... แล้วทำไมไม่ทำเลยล่ะ...?"
1601503-19 = "[s3] \"หืม...? เมื่อกี้ว่าไงนะ...?\"\n[s4] \"อย่าบอกนะว่าจะวิ่งฝ่าฝนไป?\""
1601503-22 = "ไม่ใช่แค่วิ่งเฉยๆ หรอกนะคะ! เราต้องหาอะไรกันฝนแทนร่มด้วยสิคะ!"
1601503-23 = "โชคดีที่..."
1601503-27 = "ฉันมีอันนี้พอดีเลยค่ะ!!"
1601503-28 = "[s5] \"อะ... ไอริ!? นี่มัน...\"\n[s6] \"แจ็กเกตของไอริไม่ใช่เหรอ!?\""
1601503-31 = "แหะๆ เห็นอย่างนี้ก็ตัวใหญ่ใช่เล่นเลยนะคะ พอดีเสื้อแบบนี้ต้องใส่หลวมๆ น่ะค่ะ"
1601503-32 = "ใช้กันฝนแล้วเดินไป 2 คนได้สบายค่ะ! ว่ายังไงล่ะคะคุณครู? เป็นไอเดียที่ใช้ได้เลยใช่มั้ยคะ?"
1601503-33 = "คะ...?"
1601503-34 = "ให้รอให้ฝนซาอีกหน่อยเหรอคะ? อืม...? ทำไมเหรอคะ...?"
1601503-35 = "ไม่อยากให้แจ็กเกตของฉันเปียกงั้นเหรอคะ? แต่ฉันไม่เป็นไรนะคะ..."
1601503-36 = "อ่า... คุณครูอาจจะอึดอัดก็ได้เนอะ... แหะๆ ลืมคิดเรื่องนี้ไปเลย..."
1601503-37 = "อืม..."
1601503-38 = "แต่มันก็น่าจะสนุกเลยนะคะ... รู้สึกเสียดายแปลกๆ จังเลยค่ะ แหะๆ..."
1601503-42 = "[ns7] \"งั้นก็วิ่งฝ่าฝนกันไปเลย!!\"\n[ns8] \"ครูยอมให้ครั้งเดียวนะ\""
1601503-45 = "...!!"
1601503-49 = "ค่ะ!!"
1601503-52 = "― [log=아이리 밴드]แหะๆๆ... เอาละค่ะ คุณครู![/log][wa:4170] "
1601503-53 = "― [log=아이리 밴드]เข้ามาสิคะ! ห้ามปฏิเสธนะคะ![/log][wa:2040] "
1601503-56 = "― [log=아이리 밴드]...? คุณครู...?[/log][wa:1900] "
1601503-57 = "― [log=아이리 밴드]เป็นอะไรไปคะ? [/log][wa:1860] "
1601503-60 = "― [log=아이리 밴드]หรือว่า... [/log][wa:1850] "
1601503-61 = "― [log=아이리 밴드]ฉันทำให้คุณครูลำบากใจคะ?[/log][wa:2800] "
1601503-64 = "― [log=아이리 밴드]งื้ออ~! อุตส่าห์รวบรวมความกล้าแล้วเชียว...[/log][wa:3655] "
1601503-67 = "― [log=아이리 밴드]ฉันก็รู้ว่าตัวเองดื้อ...[/log]"
1601503-68 = "― [log=아이리 밴드]แต่ถึงยังไงก็อยากให้ช่วยคล้อยตามหน่อยนะคะ[/log][wa:5800] "
1601503-71 = "[ns9] \"อืม งั้นก็คงช่วยไม่ได้นะ...\"\n[ns10] \"ถ้าไอริจะพูดถึงขนาดนี้ละก็... งั้นก็ได้\""
1601503-72 = "― [log=아이리 밴드]ฮู่ว...ฮุฮุ[/log][wa:1230] "
1601503-73 = "― [log=아이리 밴드]ฮู่ว...ฮุฮุ[/log][wa:1230] "
1601503-74 = "― [log=아이리 밴드]ค่ะ! ดีเลยค่ะ![/log][wa:1830] "
1601503-77 = "― [log=아이리 밴드](...ต้องขอบคุณฝนที่ตกมาพอดีเลย)[/log][wa:2450] "
1601503-80 = "― [log=아이리 밴드]ถ้าฉันให้สัญญาณ ก็ออกวิ่งไปพร้อมกันนะคะ![/log][wa:1300] "
1601503-81 = "― [log=아이리 밴드]พร้อมแล้วใช่มั้ยคะ?[/log][wa:1620] "
1601503-84 = "― [log=아이리 밴드]ถ้างั้นก็ ไปกันเลยค่า~! [/log][wa:1200] "
1601503-87 = "เตรียมตัวนะ...!!"
1601503-88 = "หนึ่ง...!"
1601503-89 = "สอง...!"
1601503-90 = "สาม!!"
1601503-97 = "(คุณครูกับไอริวิ่งฝ่าฝนไปด้วยกันอย่างใกล้ชิด)"

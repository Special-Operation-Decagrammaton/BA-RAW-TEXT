[translation]
1601503-1 = "Sugar Rush"
1601503-2 = "（為了幫助愛莉練習演奏而前往了練習室。結果沒花多久就發現了他的問題）"
1601503-3 = "（……然而讓人沒想到的是，真正的問題竟然發生在練習結束後準備回去的路上）"
1601503-5 = "雨居然下得這麼大……"
1601503-6 = "怎麼會這麼突然……害我們被困在這棟陌生的房子前面……"
1601503-7 = "而且我們還剛好都沒有帶雨傘，附近看起來又沒有便利商店……"
1601503-8 = "……嗚嗚，總覺得好像是我害老師跟著淋雨的，真對不起。"
1601503-9 = "[s1]「別這麼說，淋點雨又不會少塊肉。」\n[s2]「其實這樣不也挺不錯的嗎？」"
1601503-12 = "唔嗯……是嗎？#n如果老師願意往好處想，我當然很感謝……"
1601503-13 = "但我還是覺得有點可惜。#n明明已經離部室不遠了，要是我們剛才用跑的……"
1601503-17 = "用跑的……？"
1601503-18 = "咦……這個點子好像還不錯……？"
1601503-19 = "[s3]「……嗯？什麼點子……」\n[s4]「你該不會打算直接跑過去吧？現在雨這麼大耶？」"
1601503-22 = "當然不會直接跑過去囉！#n我們可以先找個能代替雨傘的東西，稍微擋一下雨！"
1601503-23 = "正好……"
1601503-27 = "……現在我們手邊就有這樣的東西！！"
1601503-28 = "[s5]「愛，愛莉！？這個……」\n[s6]「不是你穿的外套嗎！？」"
1601503-31 = "嘿嘿，別看它這樣，其實這件外套還挺大的喔。#n畢竟這種外套本來就設計得比較寬鬆。"
1601503-32 = "所以就算兩個人一起躲也完全沒問題！#n怎麼樣，老師！聽起來是個不錯的主意吧？"
1601503-33 = "……咦？"
1601503-34 = "要不要考慮再等一下？為什麼呢……？"
1601503-35 = "你說不想為了這種事用我的外套？#n我完全不介意的呀……？"
1601503-36 = "啊……不過這樣的確可能會讓人有點壓力……#n哈哈，是我沒考慮到這點……"
1601503-37 = "唔嗯……"
1601503-38 = "感覺好像會很好玩的說……#n嘿嘿……總覺得有點可惜……"
1601503-42 = "[ns7]「……那我們就跑吧！！」\n[ns8]「下不為例哦。」"
1601503-45 = "……！！"
1601503-49 = "……是！！"
1601503-52 = "― [log=아이리 밴드]耶嘿嘿……請進，老師！[/log][wa:4730] "
1601503-53 = "― [log=아이리 밴드]來這邊！不用客氣！[/log][wa:2760] "
1601503-56 = "― [log=아이리 밴드]……？老師……？[/log][wa:2180] "
1601503-57 = "― [log=아이리 밴드]怎麼了嗎？[/log][wa:2220] "
1601503-60 = "― [log=아이리 밴드]難道……[/log][wa:2130] "
1601503-61 = "― [log=아이리 밴드]讓你為難了嗎？[/log][wa:3480] "
1601503-64 = "― [log=아이리 밴드]唔～！好不容易鼓起勇氣了說……[/log][wa:4735] "
1601503-67 = "― [log=아이리 밴드]雖然說要亂來的我也有錯……[/log]"
1601503-68 = "― [log=아이리 밴드]可是，還是希望能稍微配合一下。[/log][wa:6840] "
1601503-71 = "[ns9]「唔，沒辦法了嗎……」\n[ns10]「既然你都這麼說了……我知道了。」"
1601503-72 = "― [log=아이리 밴드]……哼哼哼。[/log][wa:1430] "
1601503-73 = "― [log=아이리 밴드]……哼哼哼。[/log][wa:1430] "
1601503-74 = "― [log=아이리 밴드]來！請進！[/log][wa:2190] "
1601503-77 = "― [log=아이리 밴드]（……好像得感謝這場雨呢）[/log][wa:3170] "
1601503-80 = "― [log=아이리 밴드]我一發出信號，就一起跑唷！[/log][wa:2380] "
1601503-81 = "― [log=아이리 밴드]準備好了吧？[/log][wa:2140] "
1601503-84 = "― [log=아이리 밴드]那要出發囉～！[/log][wa:1880] "
1601503-87 = "預備……！！"
1601503-88 = "一……！"
1601503-89 = "二……！"
1601503-90 = "……三！！"
1601503-97 = "（……最後相親相愛地摔倒在了街道上）"

[translation]
1601503-1 = "Sugar Rush"
1601503-2 = "I headed over to the band room and helped Airi with her keyboard practice. We managed to fix the issue pretty quickly."
1601503-3 = "The real problem was after practice, on our way back..."
1601503-5 = "What an unexpected downpour..."
1601503-6 = "I didn't expect this at all. I certainly wasn't expecting us getting stuck under the cover of this building..."
1601503-7 = "Neither of us have an umbrella, and I don't see any stores nearby."
1601503-8 = "...Ugh. I'm really, terribly sorry. If it weren't for me, you wouldn't have gotten trapped in the rain."
1601503-9 = "[s1] \"Don't be silly. It's not like you caused the rain.\"\n[s2] \"Things like this happen sometimes.\""
1601503-12 = "I suppose so... I do appreciate your positive attitude in situations like these."
1601503-13 = "Still, it's a bit of a shame. If we ran just a tad bit further, we would be at the club room."
1601503-17 = "...Ran...?"
1601503-18 = "Um... Maybe it'll work...?"
1601503-19 = "[s3] \"'Ran?' What're you thinking?!\"\n[s4] \"You can't be thinking of running through this downpour...\""
1601503-22 = "Don't be silly! We won't be running without any sort of cover at all. We just need to improvise an umbrella..."
1601503-23 = "And we..."
1601503-27 = "...happen to have this!"
1601503-28 = "[s5] \"A-Airi?! But this is...!\"\n[s6] \"This is your jacket!\""
1601503-31 = "Heehee. It's super oversized on me! It's nice and roomy."
1601503-32 = "So roomy, in fact, that both of us can run under it! Pretty smart improvisation, right, Sensei? What do you think?"
1601503-33 = "...What?"
1601503-34 = "You want to wait it out? But...why?"
1601503-35 = "...You don't think I should use my jacket this way? But I don't mind at all."
1601503-36 = "...Ah. I suppose it is a bit much, isn't it? I got carried away again."
1601503-37 = "Hm..."
1601503-38 = "I did think it would be fun, though... It feels like a bit of a wasted opportunity. Heehee..."
1601503-42 = "[ns7] \"...Then let's get running!\"\n[ns8] \"Just this once!\""
1601503-45 = "*gasp*"
1601503-49 = "Okay!"
1601503-52 = "― [log=아이리 밴드]Heehee... Now, Sensei! [/log][wa:4250] "
1601503-53 = "― [log=아이리 밴드]Come here! Don't be shy![/log][wa:2160] "
1601503-56 = "― [log=아이리 밴드]...? Sensei...?[/log][wa:1900] "
1601503-57 = "― [log=아이리 밴드]What's wrong?[/log][wa:1900] "
1601503-60 = "― [log=아이리 밴드]Did I... [/log][wa:1930] "
1601503-61 = "― [log=아이리 밴드]Did I make you uncomfortable?[/log][wa:2600] "
1601503-64 = "― [log=아이리 밴드]Hmph! But I went to all this effort...[/log][wa:3815] "
1601503-67 = "― [log=아이리 밴드]I realize I'm being stubborn again, but...[/log]"
1601503-68 = "― [log=아이리 밴드]Can you humor me a little, please?[/log][wa:6080] "
1601503-71 = "[ns9] \"When you put it that way...\"\n[ns10] \"I can't let all your effort go to waste.\""
1601503-72 = "― [log=아이리 밴드]...Heeheehee.[/log][wa:1150] "
1601503-73 = "― [log=아이리 밴드]...Heeheehee.[/log][wa:1150] "
1601503-74 = "― [log=아이리 밴드]Okay! Yay![/log][wa:1990] "
1601503-77 = "― [log=아이리 밴드](...I should thank the clouds for this rain today.)[/log][wa:1650] "
1601503-80 = "― [log=아이리 밴드]On my mark, we're going to run out together![/log][wa:1140] "
1601503-81 = "― [log=아이리 밴드]Are you ready?[/log][wa:1820] "
1601503-84 = "― [log=아이리 밴드]Let's go![/log][wa:1800] "
1601503-87 = "Get ready...!!"
1601503-88 = "One...!"
1601503-89 = "Two...!"
1601503-90 = "...Three!"
1601503-97 = "...We crashed and rolled onto the street together."

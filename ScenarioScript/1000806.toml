[translation]
1000806-1 = "遲到大騷動"
1000806-2 = "千年郊外．貧民區"
1000806-3 = "……"
1000806-4 = "……"
1000806-5 = "……"
1000806-6 = "……聽說了嗎？"
1000806-7 = "根據傳聞……"
1000806-8 = "美甘寧瑠因為頻繁遲到與缺席……"
1000806-10 = "出席日數已經，危在旦夕了。"
1000806-11 = "哦……也就是說……"
1000806-12 = "要是再遲到或是缺席的話，就會被留級或懲戒嗎？"
1000806-13 = "理解速度很快嘛。"
1000806-14 = "被留級或懲戒的話……那個特務活動也會被正式禁止吧？"
1000806-15 = "沒錯……正是那樣。"
1000806-18 = "不擇手段和方式！無論如何都要讓寧瑠遲到！"
1000806-20 = "千年．上學路"
1000806-21 = "嗨，老師。早安。"
1000806-22 = "擔心我的出席日數？"
1000806-23 = "哈哈。謝啦。嘛，老實說只要再遲到一次就要……被懲戒了。"
1000806-24 = "每次都好好的準時出門，不知道為什麼就是會遲到。"
1000806-25 = "今天時間也很緊迫，邊走邊聊吧。"
1000806-26 = "今天得認真上學才行啊！"
1000806-28 = "千年．上學路"
1000806-29 = "啊，那邊的老師跟矮子女僕小姐～"
1000806-30 = "說誰是矮子啊！"
1000806-31 = "（喀嚓！）"
1000806-32 = "咿！不，不好意思！"
1000806-33 = "我們店裡推出了新的菜單，想請你們試吃看看……"
1000806-34 = "哦，試吃啊。嘛剛好早上出門前沒好好吃一頓。"
1000806-35 = "老師覺得怎樣？"
1000806-36 = "[s]「時間沒關係嗎？」"
1000806-37 = "雖然超緊迫……嘛，不過試吃一下的話……"
1000806-38 = "……"
1000806-39 = "……不，不行。在這種地方被吸引的話……好不容易的決心要崩毀了。"
1000806-40 = "抱歉，今天PASS。"
1000806-41 = "好，走吧。老師。"
1000806-43 = "……"
1000806-44 = "呿！虧我在試吃品裡放了瀉藥，竟然沒中計！ "
1000806-45 = "那就採取下一步吧！"
1000806-47 = "歡迎光臨！開幕特價活動！ "
1000806-48 = "只要一戴上就立刻氣勢逼人的飛機頭假髮，現在限時5分鐘！打1折的超優惠特價！"
1000806-49 = "……"
1000806-52 = "（太，太讚了！飛機頭假髮？也太帥了吧！）"
1000806-53 = "（而且還打1折？雖然不是很能理解，就是非常便宜的意思吧？）"
1000806-56 = "來，那邊的客人！這頂假髮如何？ #n我覺得非常適合您唷！！"
1000806-57 = "是，是嗎……？"
1000806-58 = "這可是光是戴上就會散發出堅毅韌性的最新流行單品！#n店裡有各式各樣長短不同的種類！也有一公尺長的唷！"
1000806-59 = "一，一公尺長……"
1000806-60 = "來，請進。歡迎光臨！這個機會可不容錯過！"
1000806-61 = "唔……"
1000806-62 = "[s]「時間沒關係嗎？」"
1000806-63 = "有，有關係！呃，咕嗚嗚……！ "
1000806-64 = "……PASS！快走吧，老師！"
1000806-66 = "…… "
1000806-67 = "為什麼，為什麼不進去？陷阱都準備好了說……"
1000806-68 = "一直不中計呢，準備採取下一步吧！"
1000806-70 = "……"
1000806-71 = "[s] 「一臉遺憾的樣子呢。」"
1000806-72 = "……吶。那裡的店員，不是剛剛請我們試吃的傢伙嗎？"
1000806-73 = "[s1] 「是嗎？」\n[s2] 「大家都長得差不多所以不太清楚。」"
1000806-74 = "哼……總覺得有點奇怪。"
1000806-75 = "哼……總覺得有點奇怪。"
1000806-77 = "現在怎麼辦？"
1000806-78 = "這樣的話，只能武裝發動突擊了。在下個小巷襲擊！"
1000806-79 = "奇襲？對那個寧瑠？ #n我不是很想……"
1000806-80 = "不用擔心，我們的目標不是打倒寧瑠。而是盡量拖延時間！ #n按照我的計算，寧瑠那傢伙將在1分鐘後抵達下一條巷子才對。"
1000806-81 = "在那裡，拖住那傢伙15分鐘的話，寧瑠一定會遲到！"
1000806-82 = "原來如此……如果是那樣的話，或許值得一試。"
1000806-83 = "一定要成功！"
1000806-84 = "（噠噠噠）"
1000806-85 = "喂，老師！要來不及了！跑快點！"
1000806-86 = "好，快到了。"
1000806-87 = "上吧！！發動襲擊！"
1000806-89 = "（啪！）"
1000806-91 = "覺悟吧，美甘寧瑠！ "
1000806-92 = "至今為止竟然敢妨礙我們……咦？不見了！？"
1000806-93 = "明，明明剛才還在這裡……"
1000806-95 = "果然是那樣啊。"
1000806-97 = "咦，嗚哇！？"
1000806-98 = "我還想說好像在哪兒見過，原來是上次被我們打趴的不良分子啊？"
1000806-99 = "為了讓我遲到偷偷摸摸的在計畫著什麼啊。"
1000806-102 = "做好覺悟吧。"
1000806-104 = "咿，咿──！？"
1000806-106 = "（咚哐哐哐──！）"
1000806-108 = "千年本棟．走廊"
1000806-109 = "呼……"
1000806-110 = "總算趕上了嗎。真是，上個學怎麼會遇到這種事。"
1000806-111 = "[s] 「多災多難的上學呢。」"
1000806-112 = "哈哈，就是說啊。"
1000806-113 = "以後也得多注意遲到的問題呢。"
1000806-114 = "謝謝你和我一起上學，老師。 "
1000806-115 = "那，待會見啦！"
1000806-118 = "寧瑠以風一般的速度，往教室的方向消失了蹤影。"

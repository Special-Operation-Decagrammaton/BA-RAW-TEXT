[translation]
1000806-1 = "Tardiness Trouble"
1000806-2 = "Slums Outside Millennium"
1000806-3 = "..."
1000806-4 = "..."
1000806-5 = "..."
1000806-6 = "...Did you hear?"
1000806-7 = "Rumor has it..."
1000806-8 = "Mikamo Neru has missed so much class that..."
1000806-10 = "...her attendance is pushing it."
1000806-11 = "You're kidding me..."
1000806-12 = "She'll be held back a year or face disciplinary action if she misses another class or is tardy to one?"
1000806-13 = "That's right."
1000806-14 = "If she's flunked or worse, it could mean the end of her career as an agent."
1000806-15 = "Yep. That's right."
1000806-18 = "All we have to do is make Neru late for class. Do whatever it takes!"
1000806-20 = "On the Way to Millennium"
1000806-21 = "Good morning, Sensei!"
1000806-22 = "You want to talk to me about my attendance? "
1000806-23 = "Hahaha. Save your breath—I know the position I'm in already. I'll be screwed if I miss any more class."
1000806-24 = "I don't know how it keeps happening. I always leave on time, but wind up being late."
1000806-25 = "With that in mind, we should get a move on. Walk and talk with me."
1000806-26 = "I'm gonna make sure I make it to school on time today!"
1000806-28 = "Millennium Alley"
1000806-29 = "Hey, you there! The teacher and the little maid!"
1000806-30 = "Who are you calling little?!"
1000806-31 = "*clank*"
1000806-32 = "Eek! Forgive me!"
1000806-33 = "I just wanted to know if you'd like to try our shop's new menu..."
1000806-34 = "Well, I did skip out on breakfast this morning."
1000806-35 = "What do you think, Sensei?"
1000806-36 = "[s] \"Don't forget about your time.\""
1000806-37 = "It'll be cutting it close, but if it's just one bite..."
1000806-38 = "..."
1000806-39 = "*sigh* No. I need to stay focused... I just said I was gonna give it everything I've got today."
1000806-40 = "Sorry, but I'll have to pass this time."
1000806-41 = "All right. Let's go, Sensei."
1000806-43 = "..."
1000806-44 = "You have to be kidding—she didn't fall for it? So much for the laxative plan."
1000806-45 = "Okay, time for Plan B!"
1000806-47 = "Well, hello and welcome! We're holding some special sales today."
1000806-48 = "This regent wig will make you look like a real badass. And it's 90 percent off, but only for the next five minutes!"
1000806-49 = "..."
1000806-52 = "(Th-That regent wig looks so COOL! I want it!)"
1000806-53 = "(And it's 90 percent off? Even I know that's a really good deal.)"
1000806-56 = "How about it, miss? What do you think? It would look fantastic on you!"
1000806-57 = "W-Would it...?"
1000806-58 = "You'll look gutsy just by wearing this trendy number. And our shop has everything you could want to complete the look! We even have a wig that's almost a meter long!"
1000806-59 = "A whole meter?"
1000806-60 = "Here, right this way. You don't want to let this opportunity go to waste, do you?"
1000806-61 = "W-Well..."
1000806-62 = "[s] \"Don't forget about your time.\""
1000806-63 = "This is so not good!! U-Ugh"
1000806-64 = "Sorry, but I'll pass! We need to get moving, Sensei!"
1000806-66 = "..."
1000806-67 = "How did she resist coming inside? I set up all the traps and everything..."
1000806-68 = "Drat. She got away again! Time to move on to Plan C."
1000806-70 = "..."
1000806-71 = "[s] \"You look disappointed.\""
1000806-72 = "...Maybe. That clerk, though... Weren't they the same person who wanted us to try that shop's new menu?"
1000806-73 = "[s1] \"Were they?\"\n[s2] \"I don't know. I have face blindness when it comes to salesmen.\""
1000806-74 = "Hmm... Something's fishy."
1000806-75 = "Hmm... Something's fishy."
1000806-77 = "What should we do now?"
1000806-78 = "Our last option is to attack her head-on. We can ambush her in the next alley!"
1000806-79 = "Attack Neru directly? I have a bad feeling about that idea..."
1000806-80 = "All we have to do is stall for time! Neru should be arriving at the next alley in one minute by my estimation."
1000806-81 = "So if we can keep her busy for 15 minutes, Neru will definitely be late to class!"
1000806-82 = "Hmm... Yeah, 15 minutes should be doable if we get the jump on her."
1000806-83 = "We've got this!"
1000806-84 = "*tap* *tap* *tap*"
1000806-85 = "We're running late, Sensei! Run!"
1000806-86 = "About time. Here she comes."
1000806-87 = "Let's go! Time for the ambush!"
1000806-89 = "*swoosh*"
1000806-91 = "Prepare yourself, Mikamo Neru!"
1000806-92 = "It's time to answer for all the suffering you've caused us... Wait, she's gone?!"
1000806-93 = "She was just here seconds ago..."
1000806-95 = "I knew it."
1000806-97 = "Wh-What?!"
1000806-98 = "I thought I recognized you... You're those thugs we took out a while back, aren't you?"
1000806-99 = "Who do you think you are, trying to make me late?!"
1000806-102 = "You're gonna pay for this."
1000806-104 = "E-Eeek?!"
1000806-106 = "*boooooom*"
1000806-108 = "Millennium Main Hallway"
1000806-109 = "*sigh*"
1000806-110 = "Phew. Barely made it. Getting to school on time sure is hard."
1000806-111 = "[s] \"Well, it was a very scenic route.\""
1000806-112 = "Hahaha. I know, right?"
1000806-113 = "I need to be more careful if I'm going to keep this streak up."
1000806-114 = "Thanks for walking me to school, Sensei. "
1000806-115 = "All right, I need to get to class. See you later!"
1000806-118 = "Neru left for class like a gust of wind."

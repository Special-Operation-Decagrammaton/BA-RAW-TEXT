[translation]
1000806-1 = "เข้าเรียนสาย"
1000806-2 = "ย่านแออัด ชานเมืองมิลเลเนียม"
1000806-3 = "....."
1000806-4 = "....."
1000806-5 = "....."
1000806-6 = "...เคยได้ยินรึเปล่า?"
1000806-7 = "มีข่าวลือกันว่า..."
1000806-8 = "มิคาโมะ เนรุมักขาดเรียนและไปสายบ่อยๆ..."
1000806-10 = "ได้ยินว่าจำนวนชั่วโมงเรียนเธออยู่ในขั้นวิกฤตแล้วล่ะ"
1000806-11 = "โอ้โห... ถ้างั้นก็หมายความว่า..."
1000806-12 = "ถ้าเธอขาดเรียนหรือไปสายอีกล่ะก็เธอจะต้องซ้ำชั้นหรือถูกลงโทษใช่มั้ย?"
1000806-13 = "หัวไวดีนี่"
1000806-14 = "ถ้าเธอต้องซ้ำชั้นหรือถูกลงโทษล่ะก็... แสดงว่าก็จะต้องถูกสั่งงดภารกิจของเจ้าหน้าที่ลับด้วยสินะ?"
1000806-15 = "ใช่แล้ว..."
1000806-18 = "เราจะต้องทำทุกวิถีทาง! ทำให้เนรุไปเรียนสายให้ได้!"
1000806-20 = "ทางไปโรงเรียนมิลเลเนียม"
1000806-21 = "ไฮ~ อรุณสวัสดิ์ครู"
1000806-22 = "อยากคุยกับฉันเรื่องที่ขาดเรียนเหรอ?"
1000806-23 = "ฮะฮ่าฮ่า! ขอบคุณนะ บอกตามตรง ถ้าเมื่อวานฉันมาสายล่ะก็... คงใกล้โดนลงโทษแล้วล่ะ"
1000806-24 = "ไม่เห็นเข้าใจเลย ตอนออกจากบ้านฉันก็คำนวณเวลาไว้แล้วนะ แต่สุดท้ายก็ดันสายซะได้"
1000806-25 = "ตอนนี้จะมัวช้าไม่ได้แล้วล่ะ เดินไปคุยไปเถอะ"
1000806-26 = "วันนี้ฉันจะต้องไปโรงเรียนให้ทันเวลาให้ได้!"
1000806-28 = "ตรอกทางเดิน มิลเลเนียม"
1000806-29 = "อ๊ะ คุณครูกับน้องเมดตัวเล็กตรงนั้นน่ะ~"
1000806-30 = "เรียกใครว่าตัวเล็กกันหา!!"
1000806-31 = "(แกรก)"
1000806-32 = "ฮึ่ก! ขะ... ขอโทษครับ!"
1000806-33 = "ร้านของเรากำลังเตรียมออกเมนูใหม่อยู่ เลยจะขอรบกวนให้ทั้งสองคนมาชิม..."
1000806-34 = "เอ๋ ลองชิมงั้นเหรอ เมื่อเช้าตอนออกมายังไม่ได้กินข้าวเช้าเลยด้วย"
1000806-35 = "แล้วครูล่ะ?"
1000806-36 = "[s] \"มีเวลาพอเหรอ?\""
1000806-37 = "อาจจะเฉียดฉิวนิดหน่อย... แต่ถ้าแค่ชิมล่ะก็..."
1000806-38 = "....."
1000806-39 = "...เฮ้อ ไม่ล่ะ ฉันไม่ควรว่อกแว่กแบบนี้ วันนี้ฉันตั้งใจแล้วว่าจะต้องไปให้ทัน"
1000806-40 = "ขอโทษนะ วันนี้ขอผ่านแล้วกัน"
1000806-41 = "เอาล่ะ ไปกันเถอะครู"
1000806-43 = "....."
1000806-44 = "ชิส์! อุตส่าห์ใส่ยาถ่ายไว้ในอาหารแล้วแท้ๆ ดันพลาดซะได้! "
1000806-45 = "คงต้องใช้แผนต่อไปแล้ว!"
1000806-47 = "เชิญ~ เชิญเข้ามาได้เลย! วันนี้ร้านของเราลดกระหน่ำฉลองต้อนรับเปิดร้าน! "
1000806-48 = "รีเจ้นท์ วิกสุดหรูหราที่เพียงแค่ใส่ก็จะทำให้ดูดีขึ้นได้ เฉพาะห้านาทีนี้เท่านั้น! ขายลดราคาถึง 90 เปอร์เซ็นต์!!"
1000806-49 = ".......\n"
1000806-52 = "(สะ...สุดยอด! รีเจ้นท์ วิกงั้นเหรอ? เท่สุดๆ ไปเลย!)"
1000806-53 = "(แถมยังลดตั้ง 90 เปอร์เซ็นต์เลยแน่ะ? ไม่รู้ว่าจะใส่แล้วสวยรึเปล่า แต่ว่ามันถูกมากเลยนะ)"
1000806-56 = "คุณลูกค้า! สนใจวิกอันนี้มั้ย? เหมาะกับคุณลูกค้ามากเลย!!"
1000806-57 = "งะ...งั้นเหรอ?\n"
1000806-58 = "สินค้ายอดฮิตใหม่ล่าสุดที่เพียงแค่ใส่ก็จะทำให้ดูฮึกเฮิมขึ้นมาในทันที! ด้านในร้านของเรามีสินค้า#nต่างๆ มากมายให้เลือกชม! วิกผมที่ยาวหนึ่งเมตรก็มีนะ!\n"
1000806-59 = "นะ...หนึ่งเมตร"
1000806-60 = "เชิญๆ เชิญได้เลย เชิญเข้ามาเลือกชมได้เลย! ห้ามหลาดโอกาสดีๆ แบบนี้เด็ดขาด!"
1000806-61 = "อืม..."
1000806-62 = "[s] \"มีเวลาพอเหรอ?\""
1000806-63 = "มะ...ไม่ดีแน่! อะ...อึ่ก...! "
1000806-64 = "...โทษทีนะ ขอผ่าน! รีบไปกันเถอะครู!!"
1000806-66 = "......."
1000806-67 = "อะไรกันเนี่ย ทำไมเธอถึงไม่ยอมเข้ามาในร้านนะ? อุตส่าห์วางกับดักเอาไว้แล้วแท้ๆ"
1000806-68 = "ไม่ติดกับดักเลยสักอย่าง ถ้างั้นก็แผนต่อไป"
1000806-70 = "....."
1000806-71 = "[s] \"เธอดูผิดหวังนะ\""
1000806-72 = "...เปล่าสักหน่อย พ่อค้าคนนั้นน่ะ คนเดียวกับคนที่เรียกให้ไปชิมอาหารไม่ใช่เหรอ?"
1000806-73 = "[s1] \"งั้นเหรอ?\"\n[s2] \"ไม่รู้สิ ดูเหมือนกันทุกคนเลย\""
1000806-74 = "อืม... มีบางอย่างแปลกๆ นะ"
1000806-75 = "อืม... มีบางอย่างแปลกๆ นะ"
1000806-77 = "จะทำยังไงต่อดีล่ะ?"
1000806-78 = "ถ้าเป็นแบบนี้คงต้องบุกเข้าไปโจมตีจังๆ แล้วล่ะ เราจะไปซุ่มโจมตีเธอในซอยถัดไป!"
1000806-79 = "โจมตีเหรอ? โจมตีเนรุเนี่ยนะ? มันคงจะไม่ค่อยดีเท่าไหร่..."
1000806-80 = "เปล่า! เป้าหมายของเราก็คือยื้อเวลาไว้ให้นานที่สุด ถ้าเป็นไปตามที่ฉันคิดล่ะก็ อีกหนึ่งนาที#nเนรุจะมาถึงซอยนี้แล้ว"
1000806-81 = "ถ้าเราสร้างความวุ่นวายและยื้อให้เธออยู่ที่นั่นได้สักสิบห้านาทีล่ะก็ เนรุจะต้องไปเรียนสายแน่ๆ!"
1000806-82 = "อืม... ถ้าซุ่มโจมตีล่ะก็อาจจะยื้อเธอไว้ได้"
1000806-83 = "ต้องทำให้สำเร็จให้ได้!"
1000806-84 = "(ตึกๆๆ...)"
1000806-85 = "นี่ครู! เราจะสายแล้วนะ! รีบวิ่งเร็วเข้า!"
1000806-86 = "อ๊ะ เธอมาถึงแล้วสินะ"
1000806-87 = "ไปกันเลย! ได้เวลาซุ่มโจมตีแล้ว!"
1000806-89 = "(ฟึ่บ!)"
1000806-91 = "เตรียมตัวให้ดีเถอะ มิคาโมะ เนรุ! "
1000806-92 = "ชอบมาขัดขวางพวกเราดีนัก... เอ๋? หายไปไหนแล้วล่ะ?!"
1000806-93 = "เมื่อกี้ยังอยู่ตรงนี้เลย..."
1000806-95 = "นั่นน่ะสิ"
1000806-97 = "อะ...อะไรเนี่ย?!"
1000806-98 = "รู้สึกคุ้นๆ เหมือนเคยเจอกันมาก่อนเลยนะ ใช่พวกนักเลงที่ถูกพวกฉันจัดการไปรึเปล่านะ?"
1000806-99 = "กล้าดียังไงถึงคิดจะทำให้ฉันไปโรงเรียนสาย!"
1000806-102 = "เตรียมตัวให้ดีซะเถอะ"
1000806-104 = "ฮะ...ฮึ่ก?!"
1000806-106 = "(ปังๆๆๆๆๆๆ!!)"
1000806-108 = "ทางเดินอาคารเรียนหลัก มิลเลเนียม"
1000806-109 = "เฮ้อ..."
1000806-110 = "ฉิวเฉียดเลยนะเนี่ย เหอะ... มาโรงเรียนให้ทันเวลานี่มันยากจริงๆ"
1000806-111 = "[s] \"เป็นการเดินมาโรงเรียนที่น่าตื่นเต้นดีนะ\""
1000806-112 = "ฮะฮ่าฮ่า! นั่นสินะ"
1000806-113 = "ต่อไปฉันจะพยายามมาโรงเรียนให้ทันนะ"
1000806-114 = "วันนี้ขอบคุณที่เดินมาด้วยกันนะครู"
1000806-115 = "ไปล่ะ! ไว้เจอกันนะ!"
1000806-118 = "เนรุวิ่งไปที่ห้องเรียนด้วยความเร็วแสง"

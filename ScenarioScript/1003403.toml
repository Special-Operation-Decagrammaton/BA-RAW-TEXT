[translation]
1003403-1 = "Etiquette I: The Home Cooking Episode"
1003403-2 = "Hyakkiyako Student Dining Hall No. 7"
1003403-3 = "I've rented the student dining hall for today!"
1003403-4 = "I wanted the opportunity to practice cooking—a must for a proper lady."
1003403-5 = "Home cooking, to be precise."
1003403-6 = "[s] \"What kind of food do you want to make?\""
1003403-7 = "I'd like to begin with the most essential of home-cooked foods."
1003403-8 = "Meat and potato stew!"
1003403-9 = "[s1] \"Hey, a classic!\"\n[s2] \"The epitome of comfort food!\""
1003403-10 = "Exactly! I'd like to cook like a proper lady."
1003403-11 = "Exactly! I'd like to cook like a proper lady."
1003403-12 = "I believe a proper lady's cooking should be elegant and effortless."
1003403-13 = "The ingredients are simple, and the process is straightforward."
1003403-14 = "So after much deliberation, I thought it the best avenue for practice propriety."
1003403-15 = "Sensei, do you like meat and potato stew?"
1003403-16 = "[s3] \"It's my absolute favorite.\"\n[s4] \"You know, I think I'd like it if you made it!\""
1003403-17 = "Heehee. Glad to hear that."
1003403-18 = "I-Is that so?"
1003403-19 = "[s] \"I still think about that sandwich you made me.\""
1003403-20 = "Do you really? "
1003403-21 = "Th-Thank you."
1003403-22 = "[s] \"I'm looking forward to it.\""
1003403-23 = "You're always so encouraging..."
1003403-24 = "Okay!"
1003403-25 = "I'm fully motivated now!"
1003403-26 = "I'll put in all my effort!"
1003403-27 = "[s5] \"Did you say cooking should be 'effortless'?\"\n[s6] \"I don't know how 'elegant' that is...\""
1003403-28 = "You can count on me!"
1003403-29 = "You can count on me!"
1003403-30 = "[s] \"I-If you say so.\""
1003403-33 = "[ns] \"Um...Mimori?\""
1003403-34 = "One moment please, Sensei. Just have to measure the weight with the scale..."
1003403-35 = "It needs to be precise. It should be exactly like the recipe."
1003403-36 = "[s] \"You really don't have to...\""
1003403-37 = "Sensei, please! "
1003403-38 = "I must meet your expectations. A proper lady would never disappoint."
1003403-39 = "I'd like for you to see how far I've come in my training."
1003403-40 = "I promise to be perfect!"
1003403-42 = "[s] \"I-I'm really grateful, but...\""
1003403-46 = "*thud*"
1003403-47 = "I'm ready, Sensei! I have soy sauce, cooking wine, sugar, and water...#nEverything the recipe calls for."
1003403-48 = "I'll get started, then!"
1003403-49 = "I'll put all the seasonings I measured here..."
1003403-50 = "Place all the meat, onions, and carrots in a pot... And boil on low heat!"
1003403-52 = "*bubbling*"
1003403-53 = "When the broth boils like this, the onions should start becoming transparent."
1003403-54 = "I must lower the heat...put the lid on, and simmer for 20 minutes."
1003403-55 = "When the onions are completely transparent, add the potatoes and boil for another 20 minutes..."
1003403-58 = "*bubbling*"
1003403-59 = "It's finished, Sensei. I've put my whole heart into this meat and potato stew!"
1003403-60 = "Will you try it?"
1003403-61 = "[s] \"Don't mind if I do!\""
1003403-62 = "*gulp*"
1003403-63 = "[s] \"*nom* *nom*\""
1003403-67 = "[ns] \"Huh?!\""
1003403-68 = "D-Do you like it?"
1003403-69 = "[s] \"Salt. All I taste is salt.\""
1003403-70 = "It couldn't possibly... B-But I followed the recipe exactly!"
1003403-71 = "*chew* *chew*"
1003403-73 = "H-How can this be? It really IS too salty!"
1003403-74 = "[s] \"Mimori, I think you used salt instead of sugar.\""
1003403-75 = "Oh!"
1003403-76 = "What an awful mistake! I-I'm so sorry, Sensei!"
1003403-77 = "I was careless! What... What do I do?!"
1003403-78 = "I told you I would make you a wonderful, home-cooked meal!"
1003403-79 = "I said I wouldn't let down your high expectations of me..."
1003403-80 = "I'm utterly disqualified from being a proper lady..."
1003403-81 = "[s] \"It's okay. Calm down, Mimori.\""
1003403-82 = "But, Sensei..."
1003403-83 = "[s7] \"Sometimes, mistakes lead to breakthroughs.\"\n[s8] \"Even proper ladies have to learn from mistakes.\""
1003403-84 = "Y-You're right. Thank you for being so kind, Sensei."
1003403-85 = "Y-You're right. Thank you for being so kind, Sensei."
1003403-86 = "Okay. A proper lady would take her mistakes in stride."
1003403-87 = "Being flustered won't solve anything."
1003403-88 = "Like you said, there's something I can learn from this."
1003403-89 = "Let me think..."
1003403-90 = "Oh, I think I have just the thing!"
1003403-91 = "Just one moment, Sensei!"
1003403-96 = "[ns] \"This is...curry.\""
1003403-97 = "There was curry roux in the cupboard."
1003403-98 = "Meat and potato stew isn't so different from curry."
1003403-99 = "I thought that I could add in the curry, and offset the saltiness."
1003403-100 = "O-Of course, I understand if you don't want to try it. Especially after the first disaster..."
1003403-104 = "[ns] \"This curry is really good, Mimori.\""
1003403-105 = "I-I'm so relieved..."
1003403-107 = "Heeheehee!"
1003403-108 = "[s] \"What's so funny?\""
1003403-109 = "Curry is a very common home-cooked meal."
1003403-110 = "Things didn't exactly go according to plan, but I still got the desired result in the end."
1003403-111 = "I'm just happy things worked out."
1003403-112 = "And it was thanks to your encouragement."
1003403-113 = "I feel rather blessed."
1003403-114 = "[s] \"You think? Well, I'm happy to hear it.\""
1003403-115 = "I truly do! "
1003403-116 = "I love learning things from you, Sensei."
1003403-117 = "But there's still so much left!"
1003403-118 = "Would you like seconds?"
1003403-120 = "Mimori and I happily enjoyed her home-cooked curry."

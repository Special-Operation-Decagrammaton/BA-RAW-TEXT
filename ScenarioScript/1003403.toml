[translation]
1003403-1 = "新娘修行其一：家庭料理篇"
1003403-2 = "百鬼夜行．第7學生食堂"
1003403-3 = "正好這裡的學生食堂沒人，所以特別借到了。"
1003403-4 = "今天作為大和撫子的修行如事前說的一樣，是料理。"
1003403-5 = "因此，我想先試著挑戰經典的家庭料理。"
1003403-6 = "[s]「要做什麼料理呢？」"
1003403-7 = "今天要做的是家庭料理的代表……"
1003403-8 = "馬鈴薯燉肉！"
1003403-9 = "[s1]「馬，馬鈴薯燉肉！」\n[s2]「家庭料理中的家庭料理！」"
1003403-10 = "呵呵，說到大和撫子該追求的料理……"
1003403-11 = "呵呵，說到大和撫子該追求的料理……"
1003403-12 = "應當優雅而有度……同時能讓人滿足。"
1003403-13 = "馬鈴薯燉肉的製作並不困難，材料也很單純。"
1003403-14 = "作為展示以大和撫子為目標修行的我的實力，我認為再適合不過了。"
1003403-15 = "老師喜歡馬鈴薯燉肉嗎……"
1003403-16 = "[s3]「我喜歡哦。」\n[s4]「不算非常喜歡，但如果是三森做的我就喜歡！」"
1003403-17 = "呵呵呵，那真是太好了。"
1003403-18 = "是，是嗎？"
1003403-19 = "[s] 「之前三森做的三明治也非常好吃。」"
1003403-20 = "這，這樣啊……"
1003403-21 = "謝，謝謝您……！"
1003403-22 = "[s] 「這次也很期待哦。」"
1003403-23 = "沒想到會被您稱讚到這種程度……"
1003403-24 = "……好！"
1003403-25 = "我決定了！這次要比平時下更多工夫！"
1003403-26 = "更加努力！全力以赴！"
1003403-27 = "[s5]「那個，那麼有氣勢的話……」\n[s6] 「不就有點偏離了剛才說的『優雅』……？」"
1003403-28 = "沒問題的，請交給我！"
1003403-29 = "沒問題的，請交給我！"
1003403-30 = "[s]「我，我知道了。加油……？」"
1003403-33 = "[ns]「那個，三森……還好嗎？」"
1003403-34 = "請您稍等，老師……我正在用天秤測量食材的重量……"
1003403-35 = "為了完全遵循食譜，連1g的誤差都不能出現……"
1003403-36 = "[s]「應該不用那麼在意吧……？」"
1003403-37 = "不，老師。"
1003403-38 = "難得老師對我這麼期待，身為以大和撫子為目標的人，我不想辜負老師的期待。"
1003403-39 = "我想今天就是我發揮培養至今的實力的時候。"
1003403-40 = "我是這麼認為的！"
1003403-42 = "[s]「當，當然，我很感謝三森的心意哦……」"
1003403-46 = "（咚）"
1003403-47 = "醬油、料理酒、砂糖、連水的量都完全依照食譜準備好了。"
1003403-48 = "那麼，正式開始！"
1003403-49 = "將這些調味料全部加進去……"
1003403-50 = "將肉、洋蔥還有胡蘿蔔放入鍋裡，慢慢沸騰！"
1003403-52 = "（咕嚕咕嚕咕嚕……）"
1003403-53 = "在沸騰之後，洋蔥會漸漸變得透明。"
1003403-54 = "現在將火調弱……蓋上鍋蓋，燉煮大約20分鐘……"
1003403-55 = "洋蔥變得完全透明之後，將馬鈴薯放入，再繼續燉煮……"
1003403-58 = "（咕嚕咕嚕咕嚕……）"
1003403-59 = "完成了。我注入全力製作的，馬鈴薯燉肉……！"
1003403-60 = "……可以嚐嚐看嗎？"
1003403-61 = "[s]「嗯，那麼我開動了。」"
1003403-62 = "……（吞口水）"
1003403-63 = "[s]「啊呣，嚼嚼……」"
1003403-67 = "[ns]「……嗯嗯！？」"
1003403-68 = "請，請問如何呢？"
1003403-69 = "[s]「……好鹹，非常鹹。」"
1003403-70 = "咦……？怎，怎麼會，明明有確實測量……！請，請等一下……！"
1003403-71 = "呼──，呼──，哈呣……嚼嚼。"
1003403-73 = "唔……很鹹呢……這，到底是……"
1003403-74 = "[s]「三森，這不是砂糖而是鹽吧？」"
1003403-75 = "啊，啊啊……！"
1003403-76 = "為，為什麼會犯這種失誤……不，不好意思，老師……"
1003403-77 = "都怪我沒有好好確認……這該怎麼辦才好……"
1003403-78 = "難得有能夠招待老師家庭料理的機會的說……"
1003403-79 = "卻讓老師失望了……"
1003403-80 = "這樣怎麼有資格成為大和撫子……"
1003403-81 = "[s]「沒事的，你先冷靜，三森。」"
1003403-82 = "但是，老師……"
1003403-83 = "[s7]「一次料理的失敗不代表一切就結束了。」\n[s8]「我們一起來思考該怎麼補救吧？」"
1003403-84 = "即使面對這樣的失敗，老師還是願意鼓勵我……"
1003403-85 = "即使面對這樣的失敗，老師還是願意鼓勵我……"
1003403-86 = "嗯，夢想成為大和撫子之人，可不能因為這樣就慌張地說不出話來。"
1003403-87 = "老師說的對，與其展露狼狽的模樣……"
1003403-88 = "尋找補救的方法……才是正確的。"
1003403-89 = "不過，該怎麼辦呢。變成這樣的話……"
1003403-90 = "啊，話說這個食堂的櫃子上……"
1003403-91 = "請稍等一下，老師！"
1003403-96 = "[ns]「這是……」"
1003403-97 = "那個……我想起櫥櫃裡有剩餘的咖哩塊。"
1003403-98 = "馬鈴薯燉肉和咖哩，材料也很相似。"
1003403-99 = "我想再用大鍋煮一次的話，應該多少能調整鹹味……"
1003403-100 = "當，當然，老師不用勉強自己吃沒關係……！"
1003403-104 = "[ns]「哈呣……嗯，非常美味唷。三森。」"
1003403-105 = "太，太好了……"
1003403-107 = "……呵呵。"
1003403-108 = "[s]「怎麼了嗎？」"
1003403-109 = "啊，不，仔細想想，咖哩也是家庭料理的一種呢。"
1003403-110 = "結果雖然繞了一圈，還是順利用家庭料理招待了老師。"
1003403-111 = "真是太好了。"
1003403-112 = "這都多虧老師對我說了不要放棄。"
1003403-113 = "總覺得有點開心。"
1003403-114 = "[s]「那真是太好了。」"
1003403-115 = "是的，謝謝老師。"
1003403-116 = "能和老師一起修行真是太好了。"
1003403-117 = "來，還剩下很多……"
1003403-118 = "要不要再來一盤呢？"
1003403-120 = "（就這樣和三森開心地用了餐）"

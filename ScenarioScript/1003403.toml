[translation]
1003403-1 = "การฝึกของเลดี้ I: โฮมคุกกิ้ง"
1003403-2 = "โรงอาหาร 7 เฮียกคิยาโค"
1003403-3 = "วันนี้โรงอาหารว่างพอดี ฉันเลยยืมใช้งานได้เป็นกรณีพิเศษค่ะ"
1003403-4 = "การฝึกฝนเป็นกุลสตรีที่เพียบพร้อมของฉันวันนี้ก็คือฝึกทำอาหาร..."
1003403-5 = "และวันนี้ฉันจะลองทำอาหารโฮมคุกกี้งดูค่ะ"
1003403-6 = "[s] \"จะทำเมนูอะไรเหรอ?\""
1003403-7 = "จานหลักที่ฉันจะทำวันนี้ก็คือ..."
1003403-8 = "สตูเนื้อใส่มันฝรั่งค่ะ"
1003403-9 = "[s1] \"ว้าว! สตูเนื้อใส่มันฝรั่ง!\"\n[s2] \"นี่มันเมนูขั้นสุดของโฮมคุกกิ้ง!\""
1003403-10 = "ฮุฮุ กุลสตรีที่เพียบพร้อมกับการเข้าครัวเป็นของคู่กันค่ะ..."
1003403-11 = "ฮุฮุ กุลสตรีที่เพียบพร้อมกับการเข้าครัวเป็นของคู่กันค่ะ..."
1003403-12 = "ฉันเชื่อว่าอาหารโฮมคุกกิ้งของกุลสตรีจะต้องสง่างามและไร้ที่ติค่ะ"
1003403-13 = "สตูเนื้อใส่มันฝรั่งเป็นเมนูที่ทำได้ง่าย และวัตถุดิบก็หาได้ทั่วไปด้วยค่ะ"
1003403-14 = "ฉันคิดว่านี่เป็นเมนูที่จะแสดงการฝึกฝนการเป็นกุลสตรีที่เพียบพร้อมของฉันได้อย่างดีค่ะ"
1003403-15 = "คุณครูชอบทานสตูเนื้อไหมคะ?"
1003403-16 = "[s3] \"ชอบสิ\"\n[s4] \"ไม่ได้ชอบมาก แต่ถ้ามิโมริทำให้ก็ชอบแน่นอน!\""
1003403-17 = "ฮุฮุฮุ โล่งอกไปค่ะที่คุณครูชอบ"
1003403-18 = "งะ... งั้นเหรอคะ?"
1003403-19 = "[s] \"แซนด์วิชที่มิโมริทำให้คราวก่อนก็อร่อยมากเลยนะ\""
1003403-20 = "ยะ... อย่างนั้นเหรอคะ? "
1003403-21 = "ขะ... ขอบคุณมากค่ะ"
1003403-22 = "[s] \"ครูจะรอชิมแล้วกันนะ\""
1003403-23 = "คุณครูมักให้กำลังใจฉันอยู่เสมอเลยนะคะ..."
1003403-24 = "ค่ะ...!"
1003403-25 = "ฉันจะตั้งใจทำอาหารวันนี้สุดฝีมือเลยค่ะ!"
1003403-26 = "จะทุ่มเทใส่ใจลงไปให้เต็มที่เลยค่ะ"
1003403-27 = "[s5] \"หา? เอางั้นเลยเหรอ...?\"\n[s6] \"แล้วที่บอกว่าสง่างามเมื่อกี้ล่ะ...\""
1003403-28 = "วางใจฉันได้เลยค่ะ!"
1003403-29 = "วางใจฉันได้เลยค่ะ!"
1003403-30 = "[s] \"เอ่อ... งั้นก็สู้ๆ นะ\""
1003403-33 = "[ns] \"เอ่อ... มิโมริ?\""
1003403-34 = "สักครู่นะคะ คุณครู... ต้องตวงปริมาณให้พอดีก่อนค่ะ..."
1003403-35 = "ห้ามขาดห้ามเกินแม้แต่หนึ่งกรัมนะคะ ต้องทำตามสูตรเป๊ะๆ ค่ะ"
1003403-36 = "[s] \"ไม่ต้องขนาดนั้นก็ได้...\""
1003403-37 = "ไม่ได้ค่ะคุณครู "
1003403-38 = "คุณครูอุตส่าห์คาดหวังอาหารของฉันทั้งที คนที่ใฝ่ฝันอยากเป็นกุลสตรีที่เพียบพร้อมอย่างฉันจะทำให้#nคุณครูผิดหวังไม่ได้ค่ะ"
1003403-39 = "นี่คือโอกาสที่ฉันจะได้แสดงผลการฝึกที่ผ่านมาค่ะ!"
1003403-40 = "ฉันรับรองว่ามันต้องสมบูรณ์แบบแน่ค่ะ"
1003403-42 = "[s] \"แค่มิโมริพยายามครูก็ดีใจแล้วล่ะ...\""
1003403-46 = "(ติ๊ง)"
1003403-47 = "เสร็จแล้วค่ะ!  ซีอิ๊ว เหล้าปรุงรส และน้ำตาลตามสูตรพอดี แม้แต่น้ำก็ตวงมาไม่ขาดไม่เกินเลยค่ะ"
1003403-48 = "งั้นฉันจะเริ่มเลยนะคะ!"
1003403-49 = "ก่อนอื่นก็ใส่เครื่องปรุงที่เตรียมไว้ลงไปทั้งหมด..."
1003403-50 = "จากนั้นก็ใส่เนื้อ หอมใหญ่ และแคร์รอตลงในหม้อ แล้วเคี่ยวด้วยไฟอ่อนๆ ก็พอค่ะ"
1003403-52 = "(สตูเดือดปุดๆ)"
1003403-53 = "เมื่อน้ำซุปเริ่มเดือด หอมใหญ่ที่ใส่ลงไปก็จะค่อยๆ ใสขึ้น"
1003403-54 = "จากนั้นเราก็หรี่ไฟลงอีกหน่อย ปิดฝา แล้วก็เคี่ยวต่อไปอีกประมาณ 20 นาที..."
1003403-55 = "เมื่อหอมใหญ่ใสจนถึงที่สุดแล้ว ก็ใส่มันฝรั่งที่เตรียมไว้ลงไปแล้วเคี่ยวต่ออีกประมาณ 20 นาที..."
1003403-58 = "(สตูเดือดปุดๆ)"
1003403-59 = "เสร็จแล้วค่ะคุณครู สตูเนื้อใส่มันฝรั่งที่ใส่หัวใจของฉันลงไปอย่างเต็มเปี่ยมค่ะ!"
1003403-60 = "ลองชิมดูหน่อยไหมคะ?"
1003403-61 = "[s] \"ขอชิมหน่อยแล้วกัน...\""
1003403-62 = "... (กลืนน้ำลาย)"
1003403-63 = "[s] \"ง่ำๆๆ...\""
1003403-67 = "[ns] \"หืม?!\""
1003403-68 = "ปะ... เป็นยังไงบ้างคะ?"
1003403-69 = "[s] \"เค็ม... ครูว่ามันเค็มไปนะ\""
1003403-70 = "คะ...? ปะ... เป็นไปได้ยังไงกัน ฉันใส่เครื่องปรุงตามสูตรแล้วนี่นา..."
1003403-71 = "ขอลองชิมหน่อยนะคะ"
1003403-73 = "เค็มเกินไปจริงๆ ด้วย!"
1003403-74 = "[s] \"มิโมริ ครูคิดว่าเธอใส่เกลือลงไปแทนน้ำตาลนะ\""
1003403-75 = "อ๊ะ...!"
1003403-76 = "ทำไมถึงพลาดเรื่องแบบนี้นะ ขะ... ขอโทษค่ะคุณครู!"
1003403-77 = "ฉันผิดเองที่ไม่ได้ดูให้รอบคอบ ทำยังไงดีคะ...!"
1003403-78 = "ฉันอุตส่าห์คิดว่าจะได้เสิร์ฟอาหารโฮมคุกกิ้งให้คุณครูทานแล้วแท้ๆ"
1003403-79 = "แต่กลับทำให้คุณครูผิดหวังซะได้...!"
1003403-80 = "แบบนี้ฉันคงขาดคุณสมบัติของกุลสตรีที่เพียบพร้อมแล้ว..."
1003403-81 = "[s] \"ไม่เป็นไร ใจเย็นๆ ก่อนมิโมริ\""
1003403-82 = "แต่ว่าคุณครูคะ..."
1003403-83 = "[s7] \"ทำพลาดครั้งเดียว ไม่ใช่ว่าจะล้มเหลวทั้งหมดนี่นา\"\n[s8] \"มาคิดหาวิธีแก้ด้วยกันดีกว่านะ\""
1003403-84 = "ฉันทำพลาดเองแท้ๆ แต่คุณครูก็ยังให้กำลังใจฉันแบบนี้..."
1003403-85 = "ฉันทำพลาดเองแท้ๆ แต่คุณครูก็ยังให้กำลังใจฉันแบบนี้..."
1003403-86 = "ค่ะ คนที่ต้องการจะเป็นกุลสตรีที่เพียบพร้อมอย่างฉันจะมาสับสนอยู่แบบนี้ไม่ได้"
1003403-87 = "ฉันไม่ควรให้คุณครูเห็นภาพลักษณ์ที่น่าอายแบบนี้เลย"
1003403-88 = "อย่างที่คุณครูบอก ฉันควรจะต้องเรียนรู้และหาวิธีแก้ไขมากกว่าค่ะ"
1003403-89 = "จะมีวิธีไหนบ้างนะ..."
1003403-90 = "จริงสิ ฉันคิดออกแล้วค่ะ"
1003403-91 = "รบกวนรอสักครู่นะคะ คุณครู!"
1003403-96 = "[ns] \"นี่มันผงแกงกะหรี่นี่นา\""
1003403-97 = "ใช่ค่ะ แกงกะหรี่ที่เหลืออยู่ในตู้เก็บของค่ะ"
1003403-98 = "วัตถุดิบของสตูเนื้อกับแกงกะหรี่คล้ายๆ กัน"
1003403-99 = "ฉันว่าถ้าใส่ผงแกงกะหรี่ลงไปและเคี่ยวต่อก็อาจจะลดความเค็มลงได้บ้าง..."
1003403-100 = "ตะ... แต่คุณครูไม่จำเป็นต้องฝืนทานก็ได้นะคะ..."
1003403-104 = "[ns] \"อืม... แกงกะหรี่อร่อยมากเลย มิโมริ\""
1003403-105 = "ค่อยยังชั่วหน่อยค่ะ..."
1003403-107 = "ฮิฮิฮิ..."
1003403-108 = "[s] \"หืม? ทำไมอยู่ๆ ก็หัวเราะล่ะ?\""
1003403-109 = "ไม่มีอะไรค่ะ คือฉันเพิ่งคิดได้ว่าแกงกะหรี่ก็เป็นอาหารโฮมคุกกิ้งเหมือนกัน"
1003403-110 = "แม้เมนูแรกจะพลาดไป แต่สุดท้ายก็ได้เสิร์ฟอาหารโฮมคุกกิ้งให้คุณครูทานได้"
1003403-111 = "ถือว่าโชคดีมากเลยค่ะ"
1003403-112 = "ต้องขอบคุณคุณครูที่คอยให้กำลังใจฉันไม่ให้ยอมแพ้ค่ะ"
1003403-113 = "ฉันดีใจมากเลยค่ะ"
1003403-114 = "[s] \"อย่างนั้นเองเหรอ? โล่งอกไปทีนะ\""
1003403-115 = "ใช่ค่ะ ทั้งโล่งอกและโชคดี... "
1003403-116 = "ที่ได้มาฝึกกับคุณครู..."
1003403-117 = "แกงกะหรี่ยังเหลืออยู่อีกเยอะเลยค่ะ"
1003403-118 = "รับเพิ่มอีกสักชามไหมคะ?"
1003403-120 = "(จากนั้นคุณครูก็นั่งทานอาหารกับมิโมริอย่างเอร็ดอร่อยและมีความสุข)"

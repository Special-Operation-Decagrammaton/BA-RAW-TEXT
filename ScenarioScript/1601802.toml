[translation]
1601802-1 = "การเยี่ยมเยือนของหัวหน้า"
1601802-3 = "[ns1] \"รา~บุ~!!\"\n[ns2] \"เวลคัมทูชาเล่ต์นะ ราบุ!!!!\""
1601802-6 = "นะ... หนวกหูน่า!!! เสียงดังจนหูจะแตกแล้ว!!!"
1601802-7 = "[s3] \"ก็ราบุอุตส่าห์มาหาที่ชาเล่ต์เลยนี่นา!\"\n[s4] \"ครูจะจำเอาไว้เป็นวันฉลองของเราเลย!!!\""
1601802-10 = "วะ... วะวะวะ ว่าไงนะ!! วันฉลงฉลองอะไรเล่า!! พูดบ้าอะไรเนี่ย!!"
1601802-11 = "แล้วทำไมถึงออกมาอยู่ตรงประตูใหญ่แบบนี้ล่ะ? มีเรื่องอะไรรึเปล่า?"
1601802-12 = "[s] \"เปล่านี่ ครูเพิ่งวิ่งออกมาจากสำนักงานเลย\""
1601802-13 = "เป็นลูกหมารึไงถึงต้องวิ่งทะเล่อทะล่ามาแบบนี้น่ะ!!"
1601802-14 = "ถ้าสะดุดล้มลงไปบาดเจ็บจะทำยังไง!"
1601802-15 = "เฮ้อ... ออกมาต้อนรับกันแบบนี้ฉันก็ดีใจอยู่หรอก"
1601802-16 = "ครูน่ะ... คือว่า..."
1601802-17 = "ไม่สนใจว่าคนอื่นจะคิดยังไงเลยเหรอ?"
1601802-18 = "[s5] \"ครูแต่งตัวแปลกๆ เกินไปเหรอ?\"\n[s6] \"ครูแต่งตัวแปลกเหรอ นี่เสื้อตัวเก่งเลยนะ...\""
1601802-21 = "เปล่าๆ ฉันไม่ได้หมายถึงเรื่องนั้นสักหน่อย!"
1601802-22 = "อืม... ว่ายังไงดีล่ะ ก็ครูน่ะเป็นแบบอย่างที่ดีของคนอื่นๆ..."
1601802-23 = "ทั้งสภานักเรียน ทั้งพวกวัลคิรี่... ดูเหมือนครูจะติดต่อกับพวกนั้นบ่อยๆ นี่นา"
1601802-24 = "เฮ้อ..."
1601802-25 = "มาสุงสิงกับเด็กเกเรอย่างฉันจะไม่เป็นไรแน่เหรอ?"
1601802-26 = "[s] \"หืม? ทำไมล่ะ?\""
1601802-27 = "ก็... คือว่ามัน..."
1601802-28 = "เฮ้อ ช่างเถอะ ฉันคงคิดมากไปเองนั่นละ ส่วนครูก็ไม่ได้คิดอะไรเลยสินะ"
1601802-29 = "[s] \"ราบุเป็นเด็กดีนะ\""
1601802-30 = "หา?!"
1601802-31 = "[s7] \"ตอนแชตมาหาก็ดูเกรงอกเกรงใจสุดๆ\"\n[s8] \"ราบุถามเรื่องความเป็นอยู่ของครูด้วยนี่นา\"\n[s9] \"เมื่อกี้ยังเป็นห่วงกลัวครูจะล้มด้วยอยู่เลย!\""
1601802-35 = "ดะ... เดี๋ยวสิ!! จู่ๆ พูดอะไรออกมาเนี่ย!!"
1601802-36 = "เรื่องพวกนั้นมันก็เรื่องทั่วๆ ไปเอง! ฉันไม่ใช่คนเลวร้ายอะไรขนาดนั้นสักหน่อย!"
1601802-37 = "เอาเถอะ เข้าใจแล้วละ ถ้าครูบอกว่าไม่เป็นไรก็พอแล้วละ"
1601802-38 = "แต่ถ้าไปไหนมาไหนด้วยกันมากเกินไป... มันก็คงแปลกๆ นั่นแหละ"
1601802-39 = "ฉันไปก่อนนะ ดูแลสุขภาพดีๆ ด้วยล่ะ แล้วก็อย่าวิ่งลงบันไดด้วย"
1601802-40 = "ฉันไปนะ-"
1601802-41 = "[ns10] (พาราบุไปที่ชาเล่ต์)\n[ns11] (ลากราบุไปที่ชาเล่ต์)"
1601802-45 = "ทะ... ทำอะไรน่ะ! คิดจะทำอะไรเนี่ย?!"
1601802-46 = "[s12] \"ราบุเป็นนักเรียนที่ครูภูมิใจนะ!\"\n[s13] \"เดี๋ยวครูจะพาไปเดินเที่ยวที่ชาเล่ต์เอง!\""
1601802-49 = "ชะ... ชาเล่ต์?! ตอนนี้เนี่ยนะ?!"
1601802-50 = "[s] \"ให้ครูอุ้มมั้ย?\""
1601802-51 = "แบบนั้นยิ่งไม่ได้ใหญ่เลย เจ้าบ้า!!"
1601802-52 = "ไม่ต้องคิดจะอุ้มเลย เดินนำไปเฉยๆ เลยไป!!"
1601802-54 = "(หลังจากนั้นคุณครูก็พาราบุไปเดินชมรอบๆ ชาเล่ต์)"
1601802-55 = "(และใช้เวลาด้วยกันอย่างมีความสุข)"

[translation]
1601802-1 = "隊長的來訪"
1601802-3 = "[ns1]「良～舞～！！」\n[ns2]「Welcome to Schale！！！！！」"
1601802-6 = "吵，吵死了！！！是在大聲什麼啦！！！"
1601802-7 = "[s3]「良舞來夏萊了！」\n[s4]「我要把今天定為紀念日！！！！」"
1601802-10 = "什，什什什什，什麼紀念日啦！！你在胡說什麼！！"
1601802-11 = "話說，你剛才怎麼會在玄關呢？#n剛好在忙什麼事嗎？"
1601802-12 = "[s]「沒有啊？我是從辦公室跑過來的。」"
1601802-13 = "你當自己是小狗啊！！"
1601802-14 = "萬一跌倒受傷了怎麼辦！"
1601802-15 = "唉……雖然受到歡迎是很開心沒錯啦。"
1601802-16 = "不過老師你……那個……"
1601802-17 = "都不會在意別人的眼光嗎？"
1601802-18 = "[s5]「我有打扮得很奇怪嗎？」\n[s6]「我可是穿了最喜歡的衣服來的說……」"
1601802-21 = "不對不對！我不是那個意思！"
1601802-22 = "就是……該怎麼說呢。#n老師應該是大家的榜樣……"
1601802-23 = "還跟學生會或女武神……之類的人有很多交流吧。"
1601802-24 = "……唉。"
1601802-25 = "我只是擔心……你跟我這種不良學生待在一起會不會有問題。"
1601802-26 = "[s]「嗯？為什麼會有問題？」"
1601802-27 = "不是，我的意思是……"
1601802-28 = "唉，算了。我只是在瞎操心而已。#n老師你根本沒想那麼多吧。"
1601802-29 = "[s]「良舞是個非常棒的孩子呀？」"
1601802-30 = "啊！？"
1601802-31 = "[s7]「聯絡的時候很注意禮貌……」\n[s8]「又會關心我的近況……」\n[s9]「還會擔心我可能會摔倒！」"
1601802-35 = "等，等等！！你突然在說什麼啊！！"
1601802-36 = "這些都很基本吧！我又不是什麼壞人！"
1601802-37 = "好啦，我知道了。反正老師覺得沒問題就好。"
1601802-38 = "不過如果太明目張膽地待在一起……感覺還是有點怪怪的。"
1601802-39 = "那我先走啦。#n記得注意身體，別在樓梯上奔跑哦。"
1601802-40 = "下次再──"
1601802-41 = "[ns10] 把良舞帶進夏萊\n[ns11] 帶良舞進入夏萊"
1601802-45 = "怎，怎麼了！？#n你要對我做什麼！？"
1601802-46 = "[s12]「良舞是我引以為傲的學生！」\n[s13]「我要帶你參觀夏萊！」"
1601802-49 = "夏，夏萊！？現在嗎！？"
1601802-50 = "[s]「需要我背你嗎？」"
1601802-51 = "那樣更不行啦，笨蛋！！"
1601802-52 = "沒必要用背的，直接帶我過去就好！！"
1601802-54 = "（之後便帶著良舞參觀夏萊……）"
1601802-55 = "（度過了愉快的時光）"

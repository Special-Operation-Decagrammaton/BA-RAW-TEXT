[translation]
1601802-1 = "The Captain's Visit"
1601802-3 = "[ns1] \"Rabu!!\"\n[ns2] \"Welcome to Schale!!\""
1601802-6 = "C-Cram it! Why are you shouting like this?!"
1601802-7 = "[s3] \"Rabu's visiting Schale!\"\n[s4] \"We should make this an annual holiday!\""
1601802-10 = "Wh-Wh-Wh-What?! \"Annual holiday\"? What are you talking about?!"
1601802-11 = "But before that, why were you hanging out behind the front door?"
1601802-12 = "[s] \"I just ran from my office. I wanted to see you!\""
1601802-13 = "What are you, a sad puppy?"
1601802-14 = "What if you got hurt?! Look at these shined floors and thick glass doors."
1601802-15 = "*sigh* It's nice that you wanted to greet me personally, and all, since I'm passing by."
1601802-16 = "But... Sensei..."
1601802-17 = "Don't you care about what people might say?"
1601802-18 = "[s5] \"Oh, why? Are my clothes weird?\"\n[s6] \"This is one of my favorite shirts...\""
1601802-21 = "No, no! Your clothes are fine."
1601802-22 = "Well...what I was saying was... You have a certain reputation, right? You need to set an example."
1601802-23 = "Since you're always talking to student councils, and Valkyrie, and the Tea Party."
1601802-24 = "*sigh*"
1601802-25 = "All I'm askin' is... Are you sure you want to be seen with me? Outside?"
1601802-26 = "[s] \"Hm? Why wouldn't I? Are you in trouble?\""
1601802-27 = "Well, I mean..."
1601802-28 = "*sigh* Whatever. I'm full of it. You don't even think about this stuff, do you?"
1601802-29 = "[s] \"But Rabu, you're such a nice student.\""
1601802-30 = "Eh?!"
1601802-31 = "[s7] \"Your message was so polite.\"\n[s8] \"You asked me how I was doing.\"\n[s9] \"And you even warned me to be careful!\""
1601802-35 = "H-Hold on! What are you talking about?!"
1601802-36 = "That's just basic manners! I have common decency. I'm not THAT bad, am I?"
1601802-37 = "Okay, whatever. I guess everything's fine if you say so."
1601802-38 = "But still, being around me can be...you know."
1601802-39 = "Well, I'll see you around. Thanks for coming out. And don't run down the stairs!"
1601802-40 = "Bye, th—"
1601802-41 = "[ns10] Take Rabu into Schale.\n[ns11] \"Come on! Let me show you around!\""
1601802-45 = "Wh-What?! Ay! What's gotten into you?"
1601802-46 = "[s12] \"I'm proud to have you as a student, Rabu!\"\n[s13] \"I'll give you the grand tour!\""
1601802-49 = "Through S-Schale?! Now?!"
1601802-50 = "[s] \"Are you tired? I can give you a piggyback ride...\""
1601802-51 = "That's even worse, you idiot!"
1601802-52 = "I don't need to be...lifted! Let's just walk, if you insist."
1601802-54 = "I showed Rabu all around Schale."
1601802-55 = "We had a lot of fun."

84304200300-18 = "3;네루 교복;24;아아, 나는 괜찮아. 상처 하나 없으니까 걱정할 거 없어.\n#3;em;[한숨]"
84304200300-19 = "3;네루 교복;05;미안하네. 쓰러져 있는 건 다 잔챙이들뿐이고, 녀석과 연락망이 있는 녀석들은 모두 도망쳐 버렸어."
84304200300-20 = "3;네루 교복;07;생각보다 꽤 하잖아. 이런 대비도 다 해놓고. 대체 뭐 하는 녀석들이야?"
84304200300-21 = "3;네루 교복;07\n#na;리오;……알아내도록 할게."
84304200300-22 = "3;네루 교복;07\n#na;리오;그건 내가 알아내면 되니……. 일단은 돌아와, 네루."
84304200300-23 = "3;네루 교복;01;뭐야, 갑자기 분위기가 왜 그래? 목소리에 힘이 없네?\n#3;em;[?]"
84304200300-24 = "3;네루 교복;06;설마 아까 전에 저 녀석이 했던 말 때문이야? 신경 쓰고 있거나 그런 건 아니지?\n#3;stiff"
84304200300-25 = "3;네루 교복;06\n#na;리오;아니. 괜찮아. ……그 부분은 오히려 괜찮아."

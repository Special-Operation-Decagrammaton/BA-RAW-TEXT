[translation]
84304200300-5 = "Neru? ...Neru! Are you all right?"
84304200300-17 = "...Ugh."
84304200300-18 = "Ah, I'm fine. I'm not hurt. You don't need to worry."
84304200300-19 = "Bad news. The ones that are down are all small fries. The ones who actually had contact with their employer all ran away."
84304200300-20 = "They were more prepared than we thought. Just who are they?"
84304200300-21 = "...I'll go on investigating."
84304200300-22 = "I can figure that out. Come back for now, Neru."
84304200300-23 = "Hey, what's up? You sound blue all of a sudden."
84304200300-24 = "Is it because of what that mean girl said on the phone earlier? You're not taking that to heart, are you?"
84304200300-25 = "No it's fine... That part, I'm actually fine with."
84304200300-29 = "...? Really, that part? What do you mean?"
84304200300-30 = "Well..."
84304200300-31 = "It's a long story. Come back, and we'll talk in person."
84304200300-32 = "...Roger that."

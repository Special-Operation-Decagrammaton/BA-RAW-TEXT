[translation]
84304200300-5 = "寧瑠……寧瑠！你沒事吧？"
84304200300-17 = "……呿。"
84304200300-18 = "啊啊，我毫髮無傷，不用擔心。"
84304200300-19 = "抱歉只抓到一些小角色。#n有辦法跟那傢伙聯絡的人都逃掉了。"
84304200300-20 = "看來他們比想像中厲害啊。#n居然還做了這種準備……他們到底是誰？"
84304200300-21 = "……我會查出來的。"
84304200300-22 = "那件事就交給我……寧瑠你先回來吧。"
84304200300-23 = "你怎麼突然這樣？聲音聽起來很沒精神耶？"
84304200300-24 = "難道是因為剛才那傢伙說的話嗎？你沒有往心裡去吧？"
84304200300-25 = "沒有。我沒事……那個我倒是無所謂。"
84304200300-29 = "……倒是無所謂？你在說什麼啊？"
84304200300-30 = "唔嗯……"
84304200300-31 = "這件事說來話長，等你回來之後再說吧，寧瑠。"
84304200300-32 = "……收到。"

[translation]
84304200300-5 = "เนรุ? เนรุ...! เป็นยังไงบ้าง?"
84304200300-17 = "อึก..."
84304200300-18 = "อ่า ฉันไม่เป็นไร ไม่ได้แผลอะไรด้วย ไม่ต้องห่วงหรอก"
84304200300-19 = "ขอโทษนะ ที่นอนสลบอยู่ตรงนี้มีแค่พวกคนที่ไม่ได้เรื่อง ส่วนพวกที่ติดต่อกับผู้ว่าจ้างคนนั้นได้ก็หนีไป#nหมดแล้ว"
84304200300-20 = "เตรียมตัวกันดีไม่ใช่เล่นเลย พวกนั้นคือใครกันแน่นะ?"
84304200300-21 = "ฉันจะสืบหาให้เอง..."
84304200300-22 = "ไม่ต้องกังวลเรื่องนั้นหรอก... กลับมาก่อนเถอะ เนรุ"
84304200300-23 = "อะไรกัน ทำไมจู่ๆ บรรยากาศถึงเป็นอย่างนี้ล่ะ? ทำไมเสียงถึงฟังดูไม่มีแรงเลย?"
84304200300-24 = "อย่าบอกนะว่าเป็นเพราะที่ยัยนั่นพูดเมื่อกี้น่ะ? ไม่ได้ใส่ใจคำพูดอะไรของยัยนั่นใช่มั้ย?"
84304200300-25 = "ไม่หรอก ฉันไม่เป็นไร ถ้าเป็นเรื่องนั้นน่ะฉันไม่เป็นไร..."
84304200300-29 = "ถ้าเป็นเรื่องนั้นงั้นเหรอ...? หมายความว่าไงน่ะ?"
84304200300-30 = "เรื่องนั้น..."
84304200300-31 = "เรื่องนั้นคงจะคุยกันยาว ฉันว่ากลับมาคุยกันที่นี่น่าจะดีกว่า กลับมาก่อนเถอะ เนรุ"
84304200300-32 = "รับทราบ..."

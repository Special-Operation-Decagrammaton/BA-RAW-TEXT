10008010-55 = "5;카메지마 고로;00;하하하. 안녕하십니까. <대길전>의 새해맞이 행사 관리인입니다.\n#5;em;[반응]"
10008010-56 = "3;시논;00;네! 안녕하세요! 그럼 바로 본론입니다."
10008010-57 = "3;시논;01;이곳 행사장은 '새해에 소원을 빌면 이루어지는 영험한 곳'이라며 현재 SNS상으로도 무척이나 유명한 곳인데요. 이에 대해 어떻게 생각하시나요?\n#3;em;[?]"
10008010-58 = "5;카메지마 고로;00;하하하. 그게 정말일지 아닐지는 저희로서도 말씀드리기 어려운 부분입니다.\n#5;em;[재잘]"
10008010-59 = "5;카메지마 고로;00;다만 그런 말이 나온다는 건, 그만큼 여러분께서 <대길전>의 축제를 즐겨 주시는 덕분이 아닐까. 그렇게 생각하고 있답니다."
10008010-60 = "3;시논;00;앗! 그럼, 말이 나온 김에 이곳 <대길전>의 새해맞이 행사는 다른 곳의 행사와 무엇이 다르고 또 특별한지, 직접 관리인에게서 이야기를 들어보고 싶군요!"
10008010-61 = "5;카메지마 고로;00;흠흠. 그렇군요. 우선 저희의 새해맞이 행사는 인텔리하고도 스마트한 운영으로…….\n#5;em;[반응]"

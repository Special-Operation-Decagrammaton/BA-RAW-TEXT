10008010-233 = "[ns] Put the money in the offering box."
10008010-236 = "[ns] \"...\""
10008010-237 = "You're up next, Aru!"
10008010-238 = "R-Right. Hmm..."
10008010-239 = "Very well."
10008010-243 = "Oh?"
10008010-244 = "I think I get it now—that energy Aru was going for."
10008010-245 = "You're not wrong. She does have an aura about her."

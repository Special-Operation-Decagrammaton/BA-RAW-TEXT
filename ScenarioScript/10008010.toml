[translation]
10008010-1 = "ตอนที่ 1;ณ สถานที่จัดงานปีใหม่"
10008010-5 = "(คุณครูมาถึงสถานที่จัดงานปีใหม่ชื่อดังที่เห็นในโซเชียลบ่อยๆ)"
10008010-6 = "(อาจเป็นเพราะที่นี่กำลังเป็นกระแสในหมู่ชาวเน็ต จึงมีฝูงชนอยู่แน่นขนัด)"
10008010-7 = "[s] \"ปีใหม่แล้วสินะ...\""
10008010-8 = "อ๊ะ คุณครูนี่นา!"
10008010-9 = "สวัสดีปีใหม่นะ คุณครู!"
10008010-10 = "หืม...?"
10008010-11 = "สะสะสะสะสะ... สวัสดีปีใหม่ค่ะ คะ... คุณครู...!"
10008010-12 = "เอ๋? ครูนี่นา สวัสดีปีใหม่นะ"
10008010-13 = "[s] \"ว่าไงทุกคน ขอให้มีความสุขในวันปีใหม่นะ\""
10008010-14 = "ฮุฮุ ขอรับคำอวยพรนั้นไว้แล้วกันนะ คุณครู"
10008010-15 = "แล้วคุณครูมาทำอะไรที่นี่น่ะ?"
10008010-17 = "ว่างงานตั้งแต่ต้นปีก็เลยมาเดินโต๋เต๋ๆ อยู่แถวนี้สินะ?"
10008010-18 = "คงมาทำงานของทางชาเล่ต์มากกว่าละมั้ง เหนื่อยน่าดูเลยนะครู"
10008010-19 = "[s] \"อื้อ วันนี้ทุกคนแต่งตัวดูดีกันมากเลยนะ\""
10008010-21 = "ฮุฮุฮุ... ดูออกด้วย สมกับเป็นคุณครูจริงๆ "
10008010-22 = "ลวดลายสวยงามที่ปักอย่างประณีตบนผ้าไหมชั้นยอด! การออกแบบที่งดงามและสมส่วนที่รวมเอา#nความพิเศษเข้าไว้ด้วยกัน!"
10008010-23 = "คุณครูเข้าใจความงดงามนี้ด้วยสินะ มีคุณสมบัติที่จะเป็นหุ้นส่วนธุรกิจของหน่วยรับจ้างสารพัดจริงๆ!"
10008010-24 = "ฮุฮุฮุ... ถึงจะแค่เช่ามาจากร้านแถวๆ โรงเรียนก็เถอะนะ~"
10008010-25 = "...!?"
10008010-26 = "\n..."
10008010-27 = "[s1] \"ครูคิดว่าเหมาะกับพวกเธอดีนะ\"\n[s2] \"อื้ม จะยังไงก็เถอะ ครูคิดว่าทุกคนสวยดีนะ\""
10008010-28 = "เอ๋..."
10008010-29 = "เอ๋..."
10008010-30 = "ดูเป็นคำชมที่ฝืนๆ มากเลย"
10008010-31 = "ขะ... ขะ... ขอบคุณนะคะ! "
10008010-32 = "ฮะ... ฮึ่ม! ก็นะ... ก็มันเป็นถึงชุดต่อสู้พิเศษของหน่วยรับจ้างสารพัดของเรานี่นา"
10008010-33 = "[s] \"ชุดใส่ต่อสู้?\""
10008010-34 = "ยะ...ยังไงก็เถอะ พวกเรามีธุระข้างในสถานที่จัดงานพอดี..."
10008010-35 = "งั้นคุณครูจะเข้าไปด้วยกันเลยมั้ยล่ะ?"
10008010-36 = "นั่นสิ ยังไงคุณครูก็ไม่มีอะไรทำอยู่แล้วนี่นา ไปกับพวกเค้าน้า~"
10008010-37 = "[s] \"จะไปขอพรปีใหม่เหรอ? ได้เลย ครูไปด้วย\""
10008010-44 = "แฮปปี้นิวเยียร์~ สวัสดีค่ะ! ผู้ชมที่อยู่ทางบ้านทุกท่าน! ขอให้มีความสุขมากๆ ในวันปีใหม่นะคะ"
10008010-45 = "ฉันคือนักข่าวไอดอลแห่งชมรมข่าวจากโครโนส! คาวารุ ชิน่อน! สวัสดีทุกคนอีกครั้งค่ะ!"
10008010-46 = "เอาละค่ะ~ ทุกคนพอจะเดาได้รึเปล่าคะว่าที่นี่คือที่ไหน? ฉันมั่นใจเลยว่าถ้าทุกคนได้รู้แล้วต้องตกใจ#nกันแน่ค่ะ!"
10008010-47 = "สถานที่ยอดฮิตที่ไม่มีใครในคิโวทอสไม่รู้จัก!"
10008010-48 = "ใช่แล้วค่ะ! ตอนนี้เรามาอยู่ที่สถานที่จัดงานชื่อดัง <ไดคิจิเดน> ที่ขึ้นชื่อเรื่อง <ขอพรสมหวังทุกประการ> กันค่ะ! ปรบมือ!"
10008010-49 = "วันนี้มีแขกรับเชิญสุดพิเศษมาอยู่กับเราด้วยค่ะ"
10008010-50 = "เชิญพบกับผู้ดูแลงานเทศกาล <ไดคิจิเดน> กันเลยค่ะ!"
10008010-55 = "ฮ่าฮ่าฮ่า สวัสดีครับ ผมผู้ดูแลงานเทศกาลปีใหม่ <ไดคิจิเดน> ครับ"
10008010-56 = "ค่ะ สวัสดีค่ะ! ถ้างั้นก็ขอเข้าประเด็นเลยนะคะ! "
10008010-57 = "ได้ยินว่าที่นี่คือ 'สถานที่วิเศษที่ขอพรแล้วจะสมหวังทุกประการ' และยังเป็นไวรัลยอดฮิตในโซเชียลมากๆ เลยค่ะ คิดว่ายังไงบ้างคะ?"
10008010-58 = "ฮ่าฮ่าฮ่า สำหรับเรื่องนั้นทางเราก็คงตอบลำบากอยู่นะครับ"
10008010-59 = "การที่มีคนพูดถึงมากแบบนั้น เราคิดว่าอาจเป็นเพราะทุกคนสนุกกับเทศกาล <ไดคิจิเดน> ของเราครับ"
10008010-60 = "อ๊ะ ถ้าอย่างนั้น... ไหนๆ ก็พูดถึงงานเทศกาลแล้วนะคะ ถ้างั้นเราจะขอให้คุณผู้ดูแลเล่าถึงความพิเศษ ของงานเทศกาล <ไดคิจิเดน> นี้ ว่ามีความพิเศษต่างกับงานเทศกาลที่อื่นอย่างไรสักหน่อยค่ะ"
10008010-61 = "อืม... ได้เลยครับ ก่อนอื่นงานเทศกาลของเราตกแต่งอย่างสวยงามให้เข้ากับเทศกาลปีใหม่ และการบริหารจัดการที่ดี..."
10008010-64 = "ฮุฮุ ไม่เจอกันนานเลยนะ คราวก่อนรบกวนไว้ซะเยอะเลย"
10008010-65 = "โชคดีที่งานคราวนี้ลักลอบทำลับหลังพวกองค์การนักเรียนได้สำเร็จ..."
10008010-66 = "ยังไงก็ตาม บริษัทที่ควบรวมต่อไปจากพวกเรา..."
10008010-67 = "สัญญาก่อสร้างในเขตโรงเรียนซานไห่จิงที่ต่อสัญญาในคราวนี้..."
10008010-68 = "[s] \"คนเยอะจริงๆ เลยนะ\""
10008010-69 = "ฮุฮุฮุ รับรู้ได้ถึงแรงกดดันเลยใช่มั้ย? พวกนั้นพูดแบบนั้นก็เพื่อหยั่งเชิงกันอยู่น่ะ"
10008010-70 = "จริงๆ ตอนนี้พวกเขาก็กำลังต่อสู้กันอยู่ แค่ไม่ได้ใช้ปืนปะทะกันก็เท่านั้นเอง"
10008010-71 = "ตอนนี้พวกเราก็ปรากฏตัวในงานได้อย่างโดดเด่นแล้ว คงจะเตะตาใครเข้าบ้างละ#nรู้สึกถึงสายตาที่จับจ้องมาที่พวกเราใช่ไหม? เอาละ ทุกคนระวังกิริยาของตัวเองกันให้ดีนะ"
10008010-72 = "อืม ไม่เห็นรู้สึกอะไรเลย"
10008010-73 = "ฮุฮุฮุ อย่าชะล่าใจไปหน่อยเลย เอาละคุณครู... ยืดไหล่ให้สง่าผ่าเผยอีกหน่อยสิ วันนี้ฉันจะอนุญาตให้#nชาเล่ต์ได้อาศัยความยิ่งใหญ่ของหน่วยรับจ้างสารพัด 68..."
10008010-78 = "ค่า~ ห้องน้ำอยู่ทางด้านโน้นค่ะ~"
10008010-79 = "เสี่ยงทายโอะมิกุจิทางนี้ได้เลยนะคะ!"
10008010-80 = "[s] \"เซริกะ?!\""
10008010-81 = "หืม...?"
10008010-82 = "คุณครู?!"
10008010-83 = "สะ... สวัสดีปีใหม่..."
10008010-85 = "นี่เธอ..."
10008010-86 = "อ๊ะ เด็กพาร์ทไทม์จากอะบิดอสนี่นา~"
10008010-88 = "แถมยังมีพวกหน่วยรับจ้างสารพัดด้วย... อะไรกันเนี่ย ทำไมพวกเธอถึงมาอยู่ที่นี่ได้ล่ะ?"
10008010-89 = "[s] \"เซริกะ วันนี้มาทำงานพาร์ทไทม์เป็นมิโกะที่นี่เหรอ?\""
10008010-90 = "อะ...อื้อ ที่นี่จ่ายค่าจ้างรายชั่วโมงสูงมากเลย ถ้ามัวแต่เที่ยวเล่นในวันหยุดก็จะเก็บเงินไม่ได้ยังไงล่ะ"
10008010-91 = "[s] \"เซริกะจังเนี่ยขยันจังเลยน้า~\""
10008010-92 = "แหะๆ... ต่อให้ชมกันแบบนี้ ฉันก็ไม่มีอะไรให้หรอกนะคุณครู"
10008010-93 = "งานพาร์ทไทม์ที่จ่ายค่าตอบแทนงามๆ แบบนี้หาไม่ได้ง่ายๆ"
10008010-94 = "เพราะงั้นหน่วยรับจ้างสารพัด... ฉันไม่รู้หรอกนะว่าพวกเธอคิดจะทำอะไร แต่ถ้าคิดจะมาระเบิดที่นี่ละก็ ล้มเลิกความคิดนั้นไปซะดีกว่า"
10008010-95 = "มะ... ไม่ใช่แบบนั้นสักหน่อย!! คิดว่าพวกเราเป็นพวกที่พอมีเวลาว่างแล้วก็ไประเบิดตึกเล่นกันรึไง?!"
10008010-96 = "พวกเราแค่มาร่วมงานปีใหม่เฉยๆ ก็เท่านั้นเอง!"
10008010-97 = "ก็นะ... ก็ควรเป็นแบบนั้นนะ"
10008010-98 = "พวกเธอเองก็จะมาขอพรเหมือนกันใช่ไหมล่ะ?"
10008010-99 = "[s] \"หืม? รู้ด้วยเหรอ?\""
10008010-100 = "ช่วงนี้มีคนมาที่นี่เยอะเพราะตามๆ กันมาจากในโซเชียลน่ะ"
10008010-101 = "ฉันจะพาไปที่ศาลเจ้าเอง"
10008010-105 = "ทางนี้"
10008010-106 = "อุฮุฮุฮุ ขอบคุณน้า~ เด็กพาร์ทไทม์~"
10008010-111 = "เอาละ มาถึงแล้ว"
10008010-116 = "แถวยาวมากเลยนะเนี่ย..."
10008010-117 = "คงต้องรอนานมากแน่ๆ กว่าจะถึงคิวพวกเรา"
10008010-118 = "คือว่า... ตู้บริจาคนั่นไม่ดูแปลกไปหน่อยรึไง? แถมยังเขียนไว้ว่า \"ตู้เซฟ\" อีกด้วย?"
10008010-119 = "เป็นคำสั่งพิเศษจากหัวหน้าของที่นี่น่ะ ได้ยินว่าพอมีคนมาขอพรกันล้นศาลเจ้า พวกเขาก็เลย#nจัดการเรื่องเงินสดไม่ได้ เลยทำตู้รับบริจาคให้เหมือนตู้เซฟน่ะ"
10008010-120 = "อะ... อื้อ..."
10008010-121 = "ข่าวลือที่ว่า \"ขอพรสมหวังทุกประการ\" ทำให้คนมาที่นี่กันเยอะไม่ใช่เล่นเลยละ"
10008010-122 = "ฮึ่ม แปลว่ามีคนเชื่อคำโปรโมตทางการตลาดเยอะเลยสินะ งมงายกันชะมัด"
10008010-123 = "แต่ก็มีคนที่ขอพรแล้วสมปรารถนา แล้วกลับมาไหว้ขอบคุณกันหลายคนนะ ฉันเห็นกับตาตัวเองเลย"
10008010-124 = "จะ...จริงเหรอ...?"
10008010-125 = "มันก็ไม่ได้เสียหายอะไรนี่? ฉันเองก็ว่าจะเอาเงินค่าจ้างบางส่วนไปบริจาคและขอพรอยู่เหมือนกัน"
10008010-126 = "เอาละ ถ้างั้นฉันขอตัวก่อนนะ ขอพรเสร็จแล้วก็กลับกันดีๆ ล่ะ"
10008010-127 = "ไว้เจอกันนะคุณครู"
10008010-132 = "ฮะ...ฮึ่ม "
10008010-135 = "\"ขอพรสมหวังทุกประการ\" งั้นเหรอ จะจริงรึเปล่านะ?"
10008010-136 = "ฉันเชื่อนะ! มีคนที่ฉันรู้จักมาขอพรที่นี่แล้วก็สมหวังด้วย"
10008010-137 = "นั่นสิ คนที่ฉันรู้จักก็เหมือนกัน"
10008010-139 = "ฮะ...ฮึ่มมม..."
10008010-145 = "(อารุจังเริ่มร้อนใจซะแล้วสิ)"
10008010-146 = "(....)"
10008010-148 = "ถ้าเรื่องนี้เป็นเรื่องจริง... เท่ากับว่ามันก็อันตรายพอสมควรเลยนะ"
10008010-149 = "เอ๋? อันตรายงั้นเหรอ?"
10008010-150 = "คนจำนวนมากมาขอพรแล้วก็บริจาคเงินที่นี่ แสดงว่าในตู้บริจาคนั่นมีความปรารถนาอัดแน่นอยู่ เท่าจำนวนเงินที่มียังไงล่ะ"
10008010-151 = "ถ้ามีสิ่งไม่ดีหรือลางร้ายทำให้ตู้บริจาคเงินมัวหมองก่อนความปรารถนาจะสำเร็จ..."
10008010-152 = "ถ้ามีแล้วจะเป็นยังไงเหรอ...?"
10008010-153 = "พรที่ขอก็จะกลับตาลปัตรหมดน่ะสิ!"
10008010-154 = "ไม่หรอกน่า... จะเกิดเรื่องแบบนั้นได้ยังไง..."
10008010-155 = "ใครจะไปรู้ล่ะ ถ้าเกิดชะล่าใจไปแล้วเกิดเรื่องอะไรขึ้นมา ก็อาจทำให้ทุกอย่างพังลงไปหมดได้เลยนะ! ต้องระวังตัวไว้! ต้องระมัดระวังอยู่เสมอ!"
10008010-156 = "ถะ... ถ้างั้น... เรื่องนี้จะทำเป็นเล่นไม่ได้ซะแล้วสิ...!"
10008010-161 = "นี่ ประธาน ไม่ต้องห่วงหรอก"
10008010-162 = "หืม? หัวหน้าฝ่ายคาโยโกะ พูดอะไรของเธอน่ะ?"
10008010-163 = "คิดว่าฉันคนนี้จะหวั่นไหวกับเรื่องเล่าที่ไม่มีหลักฐานยืนยันอะไรนั่นเหรอ?"
10008010-164 = "สุดท้ายแล้วมันก็แค่ความเชื่อเท่านั้นละ"
10008010-165 = "มีคนมาขอพรตั้งเยอะ ในบรรดาคนที่มาก็คงจะมีคนที่คำอธิษฐานเป็นจริงอยู่บ้างนั่นละ"
10008010-166 = "พอมีเรื่องเข้าใจผิดแบบนั้นเยอะๆ เข้า ก็เลยกลายเป็นข่าวลือยังไงล่ะ"
10008010-167 = "บางทีที่นี่อาจจะจ้างพวกนักแสดงมาสร้างกระแสให้ผู้คนสนใจเรื่องการบริจาคเงินขอพรก็ได้"
10008010-168 = "ถ้าเทคนิคทางธุรกิจแค่นี้ก็วิเคราะห์ไม่ได้ จะเรียกตัวเองว่าเป็นคนทำธุรกิจได้ยังไงกัน?"
10008010-173 = "\n..."
10008010-174 = "เฮ้อ..."
10008010-177 = "[ns] \"ถึงคิวขอพรแล้วละ\""
10008010-182 = "ฮุฮุฮุ ถึงคิวพวกเราแล้วงั้นเหรอ?"
10008010-183 = "จะ...จะต้องยื่นเงินใส่กล่องบริจาคด้วยท่าทางสุดคูลให้ได้...!"
10008010-184 = "หืม~ ถึงเค้าจะไม่เคยทำแบบนี้มาก่อนเลยก็เถอะนะ การทำแบบนี้มันมีประโยชน์จริงๆ เหรอ? "

10008010-65 = "#na;폭력배 보스;이번 사업도 무사히 총학생회의 눈을 피해서 다행이군요……."
10008010-66 = "#na;불법 회사 사장;그렇지 않아도 최근 저희 업체에서 인수합병한 거래업체가……."
10008010-67 = "#na;대단해 보이는 사람;하긴 저희 또한 이번에 체결한 산해경의 학원 지구 건설계약이……."

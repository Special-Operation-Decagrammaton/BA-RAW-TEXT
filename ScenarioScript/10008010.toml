[translation]
10008010-1 = "第1話;拜訪的地方"
10008010-5 = "（新的一年開始，來到了最近社群網站上很流行的地方）"
10008010-6 = "（或許也有受到新年的影響，現場已經擠得水洩不通）"
10008010-7 = "[s]「真有新年的感覺啊……」"
10008010-8 = "……啊，老師！"
10008010-9 = "新年快樂～！"
10008010-10 = "……哎呀？真巧呢，老師？"
10008010-11 = "新，新新新新新年快樂！老師……！"
10008010-12 = "嗨，老師。新年快樂。"
10008010-13 = "[s]「大家新年快樂。」"
10008010-14 = "呵呵。我也說聲新年快樂吧。"
10008010-15 = "話說老師為什麼會來這裡呢？"
10008010-17 = "心想會不會發生什麼有趣的事～所以來這裡閒晃之類的？"
10008010-18 = "因為是夏萊工作的一環吧，辛苦了。"
10008010-19 = "[s]「差不多吧。這麼說來，大家都打扮得很漂亮呢。」"
10008010-21 = "……呵呵，不愧是老師。"
10008010-22 = "沒錯，這套和服不只使用了最高級的質料，#n就連上頭的每個圖案都是由職人親手縫製而成的逸品！#n並且在維持整體平衡與協調的同時，展現飽富存在感的豪華設計！"
10008010-23 = "居然能注意到這套衣服的好，果然是我們便利屋68的合夥人！"
10008010-24 = "不過是從店裡租來的就是了。咯呵呵♪"
10008010-25 = "喂！？"
10008010-26 = "……"
10008010-27 = "[s1]「不管衣服是從哪裡來的，我都覺得很適合大家哦。」\n[s2]「即便如此，大家都非常可愛非常漂亮哦。」"
10008010-28 = "嘿～"
10008010-29 = "嘿～"
10008010-30 = "又這麼直接地……"
10008010-31 = "非，非非非非常感謝……！？"
10008010-32 = "畢，畢竟是為了今天特別準備的、類似戰鬥服的東西嘛……！？"
10008010-33 = "[s]「戰鬥服……？」"
10008010-34 = "總，總之！那個，我們打算直接到會場去……"
10008010-35 = "老，老師願意的話，要不要一起去……？"
10008010-36 = "在我看來，老師今天也是一個人來的對吧？跟我們一起去嘛～！"
10008010-37 = "[s]「嗯，我很樂意。」"
10008010-44 = "Happy New Year～！#n各位觀眾大家好，還有新年快樂！"
10008010-45 = "我是克洛盧斯新聞部所屬的偶像主播川流詩音！"
10008010-46 = "先問問大家，知道這裡是什麼地方嗎！？"
10008010-47 = "是有名到現在奇普托斯不知道的人或許才是少數的地方！"
10008010-48 = "沒錯！就是以「實現願望的地方」聞名的「大吉殿」！"
10008010-49 = "而且今天邀請到了一位特別來賓！"
10008010-50 = "那就是「大吉殿」的負責人！歡迎！"
10008010-55 = "各位好，祝大家新年快樂。#n我是「大吉殿」的管理負責人。"
10008010-56 = "今天請多多指教！"
10008010-57 = "「大吉殿」作為「實現願望的地方」在社群網站上成為了相當火熱的話題，#n這一點您怎麼看呢？"
10008010-58 = "哈哈哈。那究竟是否屬實……關於這一點我們也不太好發表評論。"
10008010-59 = "不過無論如何，由於那樣的傳聞，才會有這麼多的客人蒞臨本殿。#n大家願意如此樂在其中真的令我感到非常高興。這點確實是真的。"
10008010-60 = "原來如此，非常感謝您的回答！#n那麼接下來我想請問「大吉殿」本身以及本次活動的詳情……！"
10008010-61 = "好的。#n首先，我們藉由非常智慧且聰明的營運──"
10008010-64 = "哎呀，久疏問候。#n先前承蒙您關照了。"
10008010-65 = "今年也能順利騙過聯邦學生會的耳目就再好不過了……"
10008010-66 = "話說，關於最近敝公司併購的業者……"
10008010-67 = "原來如此。確實，在前些日子山海經的建設契約中似乎也……"
10008010-68 = "[s]「還真是熱鬧呢。」"
10008010-69 = "呵呵，就是說啊。#n即使是在這種嘈雜的環境裡，依然進行著牽制、推敲以及情報戰哦。"
10008010-70 = "只不過是沒有開槍而已，其實我們早就已經像是身處在戰鬥之中了……"
10008010-71 = "所以請注意自己的行為舉止。#n我們現在也相當引人注目哦，能感受到周圍火熱的視線對吧？"
10008010-72 = "我覺得沒有啊？"
10008010-73 = "只是還在遠處觀察而已。來吧老師，請挺起胸膛跟在我們便利屋68身後。#n不過對方不知何時會出現，請勿大意……"
10008010-78 = "啊，洗手間在那邊～！"
10008010-79 = "御神籤可以在這裡抽唷～！"
10008010-80 = "[s]「茜香！」"
10008010-81 = "……"
10008010-82 = "老，老師！？"
10008010-83 = "新，新年快樂……！"
10008010-85 = "哎呀，你是……"
10008010-86 = "這不是阿拜多斯的打工醬嗎！"
10008010-88 = "而且便利屋68的人也在……？#n為什麼你們會在這裡呢？"
10008010-89 = "[s]「新年快樂。茜香在這裡做巫女的打工嗎？」"
10008010-90 = "啊，嗯。因為這裡的時薪挺不錯的。#n就算是休息日也不能只想著玩，這種時候正是賺錢的時候啊。"
10008010-91 = "[s]「真努力呢，辛苦你了。」"
10008010-92 = "耶嘿嘿……就，就算稱讚我也沒有好處拿喔？"
10008010-93 = "雖然當初也有點猶豫，不過時薪這麼高的打工實在不好找。"
10008010-94 = "……所以便利屋68。雖然不知道你們在打什麼主意，#n要是敢炸了這裡的話我可不會輕易放過你們。"
10008010-95 = "才，才不會做那種事！？#n你以為我們是那種閒著無聊就會四處亂炸的愉悅犯集團嗎！？"
10008010-96 = "我們只是很正常地來這裡而已……！"
10008010-97 = "……我倒也不是真的在懷疑你們。"
10008010-98 = "總之，你們也是來許願的對吧？"
10008010-99 = "[s]「果然大部分的人都是為了這個來的嗎？」"
10008010-100 = "嗯，在社群網站上很流行也是一部份的原因。"
10008010-101 = "跟我來吧，我帶你們過去。"
10008010-105 = "賽錢箱在這裡唷。"
10008010-106 = "謝囉～打工醬♪"
10008010-111 = "到囉～"
10008010-116 = "真是大排長龍……"
10008010-117 = "看來要輪到我們還需要一段時間。"
10008010-118 = "……我說，你們不覺得那個賽錢箱怪怪的嗎？#n上面明目張膽地寫著「金庫」耶？"
10008010-119 = "啊～聽說是這裡的負責人的指示。#n好像是因為來的人實在太多，為了謹慎管理就用金庫來代替賽錢箱之類的……？"
10008010-120 = "這，這樣啊……"
10008010-121 = "因為「許願就能實現」這個傳聞的關係，人潮才會像這樣瘋狂地湧進來。"
10008010-122 = "……大家都喜歡這種事呢。"
10008010-123 = "不過實際上也有「因為願望實現了」而來感謝的人哦，而且還挺多的。"
10008010-124 = "是，是嗎……！？"
10008010-125 = "雖然不知道是不是真的……#n等領到打工的薪水之後，我也打算來許個願。"
10008010-126 = "那我就先回去了。#n便利屋，別鬧得太過火哦？"
10008010-127 = "老師，待會見囉。"
10008010-132 = "……"
10008010-135 = "願望真的能實現嗎……？"
10008010-136 = "我相信可以！#n而且也有不少說願望真的「實現了」的人……！"
10008010-137 = "確實，我身旁的人也……"
10008010-139 = "哼，哼嗯……？"
10008010-145 = "（亞瑠醬開始坐立難安了呢）"
10008010-146 = "（……）"
10008010-148 = "但如果這是真的，某種意義上也可以說會有危險……"
10008010-149 = "危險？怎麼說呢？"
10008010-150 = "無數的人們在投香油錢的同時許下了願望……#n也就是說，那個賽錢箱中想必蘊含了相當多的念。"
10008010-151 = "而且這裡本來就是背景有點複雜的地方。因此「念」的強度就變得更加強烈了。#n那樣的賽錢箱如果沾染「汙穢」的話……"
10008010-152 = "如果沾染「汙穢」的話……？"
10008010-153 = "累積下來的願望就會反噬，引發不得了的事……！"
10008010-154 = "不不不，那種事怎麼可能……"
10008010-155 = "所謂的願望其實是一體兩面的，並且很難區分願望和詛咒。#n有句成語叫「害人害己」，萬萬不可掉以輕心……#n如果真的是「實現願望的地方」就更不用說了……！"
10008010-156 = "……（吞口水）"
10008010-161 = "……別去在意比較好哦？"
10008010-162 = "你，你在說什麼呢？"
10008010-163 = "以為我會因為那種沒有根據的迷信而動搖嗎？"
10008010-164 = "你仔細想想，那只是單純的機率問題罷了。"
10008010-165 = "既然聚集了這麼多人，自然會有碰巧實現願望的人和事與願違的人存在。"
10008010-166 = "所以才會時常聽到類似的話，或是變成傳聞再次廣為流傳。就是這樣而已。"
10008010-167 = "又或者是為了讓這裡變成流行，所以才特地散布這種傳聞的也說不定。"
10008010-168 = "你們以為身為社長的我，會連這點程度的事都不懂嗎？"
10008010-173 = "……"
10008010-174 = "嘿……"
10008010-177 = "[ns]「輪到我們了呢。」"
10008010-182 = "呵呵，總算輪到了呢。"
10008010-183 = "是，是……！"
10008010-184 = "……現在說這些可能有點晚了，不過這樣真的有意義嗎？"
10008010-185 = "我不覺得會讓評價提高多少，而且人又多又吵。"
10008010-186 = "嘛，雖然感覺跟亞瑠想像的情況相差有點多……#n但來都來了，許個願再回去也沒什麼不好吧？"
10008010-190 = "我找找……有了，5萬圓。"
10008010-191 = "5萬圓！？"
10008010-192 = "佳，佳世子！？#n雖然我確實說過要準備一大筆錢，你居然準備這麼多……！？"
10008010-193 = "堂堂社長怎麼能因為這點金額就嚇到……"
10008010-194 = "這些是我本來打算用來買新專輯存下來的錢。不過用來許下新年的願望也不錯吧。"
10008010-199 = "……"
10008010-201 = "啊，啊啊……"
10008010-202 = "那，那接下來輪到我了！"
10008010-203 = "是我這幾個月來，不惜犧牲睡眠時間也要在工地工作到深夜存下來的……"
10008010-204 = "30萬圓！"
10008010-205 = "噫噫！？"
10008010-206 = "！？"
10008010-207 = "你，你說什麼！？"
10008010-208 = "像我這樣沒用的人能做的，就只有這些了……"
10008010-209 = "雖然曾經做到全身腰酸背痛，甚至以為要就這麼倒下了……"
10008010-210 = "即便如此，居然能像這樣派上用場……！我很開心！"
10008010-212 = "等，等等──"
10008010-216 = "哎呀～漂亮地丟進去了呢……"
10008010-217 = "……"
10008010-218 = "……"
10008010-220 = "……好，許好願了！"
10008010-221 = "那個……遙香醬，這樣真的沒關係嗎……？"
10008010-222 = "沒，沒關係，指的是……？"
10008010-223 = "只要能派上用場，我就覺得很榮幸了……"
10008010-228 = "……"
10008010-229 = "[s]「那，接下來輪到我了。」"
10008010-233 = "[ns] 把錢投進賽錢箱"
10008010-236 = "[ns] 「……」"
10008010-237 = "那接下來輪到亞瑠醬囉。"
10008010-238 = "是，是呢……！？"
10008010-239 = "……好。"
10008010-243 = "嘿……"
10008010-244 = "原來如此～好像稍微能明白亞瑠醬本來的計畫了。"
10008010-245 = "就是說啊，只要保持沉默似乎就能感覺到那種氣氛。"
10008010-246 = "在那種狀態下丟一大筆錢的話，確實能讓人感受到威嚴。"
10008010-247 = "亞瑠大人……太棒了……"
10008010-248 = "……呵呵。"
10008010-251 = "（這，這下該怎麼辦才好啊────！？）"
10008010-252 = "（5萬圓也太多了吧！？佳世子，你不惜犧牲自己的興趣存了那麼多錢！？）"
10008010-253 = "（遙香的30萬圓又是怎麼回事！？這金額也太誇張了吧！？）"
10008010-254 = "（你有段時間每天早上臉色都很差就是因為這個嗎！？#n　那麼努力賺來的錢，竟然這麼輕易就……！？）"
10008010-255 = "（我，我只帶了5千圓過來……！該怎麼辦……！？）"
10008010-256 = "（要在這種氣氛下拿出5千圓！？身為社長的我居然要這麼做！？）"
10008010-258 = "……亞瑠醬？"
10008010-263 = "（咻啪！）"
10008010-264 = "動作實在太快，看不到亞瑠醬投了多少香油錢……"
10008010-265 = "……是因為不希望大家看到自己的金額而感到太大的壓力……之類的？"
10008010-266 = "哼嗯……？#n算了，不知道亞瑠醬會許什麼願呢？"
10008010-271 = "那個……？"
10008010-272 = "亞瑠醬……？"
10008010-273 = "……………………！"
10008010-274 = "亞瑠醬他，哭了嗎……？"
10008010-280 = "（拜託公司不要倒閉，拜託公司不要倒閉，拜託公司不要倒閉，#n　拜託公司不要倒閉，拜託公司不要倒閉，拜託公司不要倒閉……！！）"
10008010-281 = "（拜託！真～～～的拜託了！會有利潤的吧！？願望會實現的吧！？）"
10008010-282 = "（都丟這麼多錢了，一定要想想辦法啊────！！！！）"
10008010-284 = "總，總覺得有種非常迫切的感覺……究竟許了什麼願呢？"
10008010-285 = "好像隱約能感覺出來……"
10008010-288 = "那最後換我了對吧？"
10008010-292 = "鏘鏘！1億圓～～！"
10008010-293 = "等一下等一下……"
10008010-294 = "1，1億圓！？太厲害了！"
10008010-296 = "咦咦！？"
10008010-297 = "[s]「那是玩具之類的……？」"
10008010-299 = "嗯，沒錯！"
10008010-300 = "因為要準備很多錢有點困難，我想說這個應該也可以，所以就拿桌遊的錢來了。"
10008010-304 = "咯呵呵，那麼就……！"
10008010-305 = "先等一下──！！"
10008010-306 = "嗯？亞瑠醬，怎麼了？"
10008010-307 = "不是，那個……無月，那樣不會不太好嗎？"
10008010-308 = "不太好？為什麼？"
10008010-309 = "那個，果然還是認真一點比較好吧……？#n畢竟才剛過新年，還有，讓賽錢箱沾染汙穢也不太好……"
10008010-310 = "……汙穢？"
10008010-311 = "要，要是事與願違的話，也很困擾的吧……？"
10008010-312 = "啊哈哈！亞瑠醬在說什麼啊？"
10008010-313 = "你剛才不是自己說那些是「迷信」嗎～？"
10008010-314 = "沒事沒事，不會發生那種事情的啦。"
10008010-315 = "就算做了會有報應的事，賽錢箱也不會突然就爆──"
10008010-319 = "這不就爆炸了嗎！？"
10008010-320 = "亞，亞瑠大人！您沒事吧！？"
10008010-321 = "哇哦，怎麼了怎麼了！？發生什麼事了！？"
10008010-322 = "……有人在那裡。"
10008010-327 = "那，那是……！？"
10008010-328 = "在煙霧裡，有人……！"
10008010-332 = "嚇啊！！"
10008010-334 = "無限迴轉的軌道……終將通向正義的未來！"
10008010-338 = "無限迴轉壽司戰隊．凱坦澤！登場！"
10008010-343 = "這是，今天的特別活動……之類的嗎？"
10008010-345 = "你們這些壞蛋！嘗嘗正義的鐵鎚吧！！"
10008010-346 = "唉唷，完全不想說明嗎？"
10008010-347 = "算了，無所謂。"
10008010-348 = "就陪你們玩玩！"

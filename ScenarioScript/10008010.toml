10008010-71 = "3;아루 정월;13;우리도 이렇게 화려하게 등장해주었으니 분명 눈에 띄겠지. 우리를 주시하는 뜨거운 시선들이 느껴지지? 자, 모두 몸가짐에 신경 쓰도록 해. \n#3;em;[반짝]\n#3;hophop"

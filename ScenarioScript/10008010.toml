10008010-44 = "3;시논;07;해피 뉴 이어~! 안녕하세요! TV 앞의 시청자 여러분! 모두 새해 복 많이 받으세요!\n#3;em;[반짝]\n#3;greeting\n#3;a"
10008010-45 = "3;시논;02;크로노스 스쿨 보도부의 아이돌 리포터! 카와루 시논! 인사드립니다!"
10008010-46 = "3;시논;00;자아~ 혹시 이곳이 어딘지 아시겠나요? 알게 되면 아마 여러분도 깜-짝 놀라실 것이라 자신만만!\n#3;em;[!]"
10008010-47 = "3;시논;01;최근 키보토스에서도 모르는 사람이 없을 정도로 유명해진 곳!"
10008010-48 = "3;시논;03;네! '빌면 이루어진다'는 캐치프레이즈로 유명한 <대길전>의 행사장에 나와 있답니다! 박수! 짝짝짝!\n#3;hophop\n#3;em;[음표]"
10008010-49 = "3;시논;02;오늘은 이 자리에 특별한 게스트를 모셨습니다."

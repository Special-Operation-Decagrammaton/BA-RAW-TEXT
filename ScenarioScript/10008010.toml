[translation]
10008010-1 = "Episode 1;The New Year's Event"
10008010-5 = "I chose to attend a big New Year's celebration that everyone had been talking about on social media."
10008010-6 = "The place is completely packed thanks to all of the buzz online."
10008010-7 = "[s] \"It sure is New Year's, all right...\""
10008010-8 = "Hey! It's Sensei!"
10008010-9 = "Happy New Year, Sensei!"
10008010-10 = "Huh?"
10008010-11 = "H-H-Happy New Year!"
10008010-12 = "Oh. Hey, Sensei. Happy New Year."
10008010-13 = "[s] \"Same to all of you.\""
10008010-14 = "Why, thank you, Sensei."
10008010-15 = "So, what brings you here?"
10008010-17 = "Didn't have anything better to do? "
10008010-18 = "Maybe it has something to do with Schale. Sensei never stops working,#nafter all."
10008010-19 = "[s] \"Maybe. Enough about me. You all look great.\""
10008010-21 = "My, what discerning taste you have, Sensei. "
10008010-22 = "Gaze upon these luxurious patterns embroidered on the finest silk by a master seamstress! Drink deep the gorgeous design that strives for balance and harmony while embracing the unconventional! "
10008010-23 = "I'd expect nothing less than the finest tastes in aesthetics from one of our official business partners!"
10008010-24 = "Not bad for being rented from a local store."
10008010-25 = "...?!"
10008010-26 = "..."
10008010-27 = "[s1] \"That doesn't matter. They're still great.\"\n[s2] \"You all look beautiful either way.\""
10008010-28 = "Heh heh."
10008010-29 = "Heh heh."
10008010-30 = "As blunt as ever."
10008010-31 = "Th-Thank you."
10008010-32 = "Ahem! Well, consider them our combat uniforms for this special occasion."
10008010-33 = "[s] \"Combat uniforms?\""
10008010-34 = "Never mind that. We have business further inside."
10008010-35 = "Would...you like to join us, Sensei?"
10008010-36 = "You don't have anything better to do, right? Let's go!"
10008010-37 = "[s] \"Are you going to make offerings? Okay, I'm in.\""
10008010-44 = "Happy New Year to all of you watching at home!"
10008010-45 = "This is the Kronos School of Journalism's star reporter, Kawaru Shinon!"
10008010-46 = "We're coming to you LIVE! Can't you tell where we're reporting from? If not, then you're sure in for a surprise."
10008010-47 = "I mean, who HASN'T heard of it? It's what everyone in Kivotos is talking about!"
10008010-48 = "Yes! I'm at the Daikichiden event, famous for its slogan \"If you wish it, you'll get it!\""
10008010-49 = "And we have a special guest tonight."
10008010-50 = "Let's meet the manager of Daikichiden!"
10008010-55 = "Hahaha. Hello! I'm Daikichiden's New Year's event manager."
10008010-56 = "Thanks for joining us tonight. Let's get straight to the point. "
10008010-57 = "Your venue has been gaining a lot of traction on social media as a place where wishes come true. What are your thoughts on this?"
10008010-58 = "Hahaha. It's difficult for even us to comment on whether that's true or not."
10008010-59 = "Regardless, we've taken it as a compliment. It's because of the rumor that so many people are coming to enjoy themselves at the Daikichiden festival."
10008010-60 = "Oh! On that note, would you care to elaborate what makes the Daikichiden New Year's event special?"
10008010-61 = "But of course. First, our New Year's event is in the hands of very capable..."
10008010-64 = "Heh. Long time no see. I still owe you one from last time."
10008010-65 = "I'm glad this project safely avoided the eyes of the General Student Council again."
10008010-66 = "Speaking of which. About that business my company recently acquired..."
10008010-67 = "Regarding the construction contract we signed with Shanhaijing Academy..."
10008010-68 = "[s] \"People sure do have a lot to talk about.\""
10008010-69 = "So you noticed. It's already begun—they're sizing each other up. "
10008010-70 = "What may sound like simple conversation is actually a war of words. They're in fierce combat with one another."
10008010-71 = "Needless to say we've already drawn their attention. Can you feel the pressure of their gaze? Look alive everyone, because now is when the magic happens. "
10008010-72 = "Did we actually draw their gaze? I haven't really noticed anything."
10008010-73 = "Don't underestimate them. And you, Sensei. Stand tall, and follow our lead."
10008010-78 = "You'll find the restroom just over there!"
10008010-79 = "And over here is where you can draw your fortune!"
10008010-80 = "[s] \"Serika?\""
10008010-81 = "Huh?"
10008010-82 = "Sensei?!"
10008010-83 = "H-Happy New Year..."
10008010-85 = "Aren't you...?"
10008010-86 = "If it isn't Little Miss Part-Timer from Abydos!"
10008010-88 = "Problem Solver 68? What are all of you doing here?"
10008010-89 = "[s] \"Did you get a part-time miko job or something?\""
10008010-90 = "Oh, yeah. The weekend is one of the best times to make extra money."
10008010-91 = "[s] \"I should've known. You're the hardest working person I know.\""
10008010-92 = "Heehee. Thanks, but flattery won't get you anywhere, Sensei. "
10008010-93 = "I wasn't sure about this gig at first, but it's hard to find something that pays this well. "
10008010-94 = "So don't go and ruin it, Problem Solver! Don't think I'm going to let you bomb another one of my part-time jobs!"
10008010-95 = "W-We weren't planning on it! Stop thinking we go around blowing things up for fun!"
10008010-96 = "We're here for the New Year's event just like everyone else."
10008010-97 = "If you say so."
10008010-98 = "Anyway, were you all planning to make a wish? "
10008010-99 = "[s] \"Yeah. How did you know?\""
10008010-100 = "That's what everyone has been coming for since this place began trending on social media."
10008010-101 = "Let me show you to the offering box."
10008010-105 = "Follow me. There's someone waiting to see you."
10008010-106 = "After you!"
10008010-111 = "It's right over here."
10008010-116 = "There's a huge line in front of it..."
10008010-117 = "It's going to take all night for it to be our turn."
10008010-118 = "Hey, doesn't that offering box look a little weird? Why does it say \"vault\" on the front?"
10008010-119 = "I think the boss was in charge of its design. He said something about designing it to be more like a safe to handle the influx of visitors."
10008010-120 = "You don't say..."
10008010-121 = "It makes sense when you think about it. A lot of people are coming here to make offerings, and that means more money going into the offering box."
10008010-122 = "Hmph. Because they all fell for the marketing gimmick. It's just wishful thinking."
10008010-123 = "I dunno about that. A lot of people have returned to give thanks for their wishes coming true. I've seen it for myself."
10008010-124 = "R-Really...?"
10008010-125 = "And it's not like an offering costs all that much. I was planning on making a wish too, once I get my paycheck."
10008010-126 = "Anyway, I need to get back to work. You guys try to stay out of trouble."
10008010-127 = "Catch you later, Sensei."
10008010-132 = "H-Hmm... "
10008010-135 = "What do you think of the rumor about wishes made here coming true?"
10008010-136 = "It's legit! I've seen people's wishes be granted for myself!"
10008010-137 = "You're not the first person I've heard say as much."
10008010-139 = "U-Uh..."
10008010-145 = "(She's starting to go to the place again.)"
10008010-146 = "(...)"
10008010-148 = "Wouldn't it be rather dangerous if it were true, though?"
10008010-149 = "Dangerous? What makes you say that?"
10008010-150 = "Think of how many people have put money into the offering box and made a wish. There must be all kinds of wishes being made."
10008010-151 = "What if an evil spirit were to pollute those wishes?"
10008010-152 = "What if a wish such as that were to come true?"
10008010-153 = "It could very well wish that the opposite of everyone else's wishes come true!"
10008010-154 = "Oh, come on. That's impossible."
10008010-155 = "How can you be so sure? Anything can happen under such circumstances. As the saying goes: \"Be careful what you wish for.\""
10008010-156 = "P-Perhaps he's right! We shouldn't take this so lightly!"
10008010-161 = "Uh... I hope you're not taking this seriously, Boss."
10008010-162 = "N-No, of course not. What makes you think that? "
10008010-163 = "I'm not the kind to believe in groundless superstitions."
10008010-164 = "It's all just a matter of chance in the end."
10008010-165 = "With such a large sample size, it's only natural that some of the patrons' wishes would come true."
10008010-166 = "Then those coincidences are shared among the masses and become rumors."
10008010-167 = "Or it could be that the owners hired actors to spread those rumors in the first place to generate interest in this event. "
10008010-168 = "It's Business 101. You'd do well to remember that."
10008010-173 = "..."
10008010-174 = "Uh-huh..."
10008010-177 = "[ns] \"Looks like it's our turn.\""
10008010-182 = "Heh. About time."
10008010-183 = "Th-This is our chance to look like big shots!"
10008010-184 = "I guess, but is this really gonna work? "
10008010-185 = "This place is so crowded that I don't think anyone is going to notice or care how big our offering is. "
10008010-186 = "Yeah, it's probably not going to turn out how the boss pictured it, but that's fine. We may as well go through with it after coming all this way."
10008010-190 = "Here's my share: 50,000 yen."
10008010-191 = "Whoa! Did you say 50,000?! "
10008010-192 = "Uh, Kayoko? I know I said scrape together everything you could, but I didn't think you'd bring THAT much..."
10008010-193 = "How little money did you think it would take to impress everyone, then?"
10008010-194 = "Well, whatever. This came from my music budget anyway. I can afford to drop it on a New Year's wish."
10008010-199 = "..."
10008010-201 = "N-No way..."
10008010-202 = "I-I'll go next."
10008010-203 = "I saved this by working overnight at a construction site for a few months."

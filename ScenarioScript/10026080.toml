[translation]
10026080-1 = "ตอนที่ 8;จุดสำรวจ E กองบัญชาการหลังน้ำตก"
10026080-4 = "...สงสัยจะเป็นน้ำตกตรงนั้นนะคะ! เราน่าจะใกล้ถึงกันแล้วค่ะ!"
10026080-5 = "แต่ระยะทางไกลกว่าที่คิดนะคะเนี่ย แถมยังเป็นที่ราบสูงพอสมควรเลย..."
10026080-6 = "ถ้ำที่ซ่อนอยู่หลังน้ำตกงั้นเหรอ..."
10026080-7 = "ไม่มีทางเห็นได้จากข้างนอกเลยนะคะ สมกับเป็นสถานที่ลับของสาวกเลย"
10026080-8 = "ถ้างั้นก่อนเข้าไป เรามานับจำนวน... ทุกคนคะ ขึ้นมากันได้อย่างปลอดภัยใช่ไหมคะ?"
10026080-9 = "ค่า~"
10026080-10 = "อะ... อื้อ ก็ขึ้นมาได้เรื่อยๆ ..."
10026080-11 = "ทุกคนปลอดภัยดี... เอ๋ คุณครู? คุณครูดูเหนื่อยๆ นะคะ..."
10026080-12 = "[s1] \"คะ... ครู... ยังไหว...\"\n[s2] \"สงสัยต้องออกกำลังกายเพิ่มแล้วละ...\""
10026080-15 = "แหะๆ... ทางมาที่นี่ค่อนข้างลำบากเลย เรามาช้าๆ กว่านี้หน่อยก็ดีหรอกค่ะ"
10026080-16 = "จะว่าไปแล้ว คุณอุย... เมื่อกี้ยังอยู่ข้างๆ ฉันอยู่เลยนี่นา..."
10026080-17 = "คุณอุย....?"
10026080-21 = "อ่อก... อึก... แฮ่ก... แฮ่กๆ... แฮ่กๆ..."
10026080-22 = "ให้ตายสิ... อึก... ฉันมาทำอะไรอยู่ที่นี่..."
10026080-23 = "ไม่สิ... ไม่ได้... ต้องพูดเรื่องดีๆ... อึก... แฮ่กๆ... ฮือ..."
10026080-24 = "ค่ะ... ฉันพยายาม... จนมาถึง... แล้ว... ค่ะ..."
10026080-29 = "คุณอุย!?!?"
10026080-31 = "ฮู่ว... เฮ้อ... ดีขึ้นหน่อยแล้วค่ะ... ขอบคุณที่ช่วยรอนะคะ..."
10026080-32 = "จริงๆ เลย... แค่เดินขึ้นมามันก็ทรมานแล้วนะคะ... ที่นี่... ถนนหนทางก็ไม่ได้ทำให้ดีๆ..."
10026080-33 = "แต่ว่า... แบบนี้ฉันยิ่งรู้สึกมั่นใจมากขึ้นค่ะ มันยิ่งเข้ากับที่ที่ต้อง 'ซ่อนเร้น' เอาไว้เลยละค่ะ"
10026080-34 = "บางทีเรื่องทั้งหมดที่พวกเราเห็นมามันอาจจะเป็นแค่ม่านควันก็ได้..."
10026080-37 = "สิ่งที่จะได้เห็นต่อจากนี้... อาจจะเป็นสิ่งที่สร้างขึ้นเพื่อปกปิดอะไรบางอย่างที่น่ากลัวและสยดสยอง..."
10026080-38 = "อย่างเช่นห้องทรมาน... ลานทำโทษ... ที่ประกอบพิธีกรรมทางศาสนาน่ากลัวๆ... อาจจะเป็นที่แบบนั้น#nก็ได้...!!"
10026080-39 = "และความจริงแท้ของชมรมซิสเตอร์ที่ปิดซ่อนเอาไว้... ในที่สุดก็...!!"
10026080-43 = "[ns3] \"หยุดการละครได้แล้วละอุย...\"\n[ns4] \"พูดอะไรแปลกๆ อีกแล้วนะ\""
10026080-46 = "อ่า..."
10026080-47 = "ขอโทษค่ะ ฉันตั้งสติไม่อยู่และพูดออกมาตามใจปากอีกแล้วสินะคะ"
10026080-48 = "แต่ก็นะ ถ้าไม่เห็นกับตาก็ยังไม่ควรตีโพยตีพายไปก่อน ก็ได้ค่ะ... ฉันจะหวังว่า... มันจะไม่ออกมาเป็น#nสถานที่แบบนั้นค่ะ"
10026080-49 = "ค่ะ ขออย่าให้เป็นเลย..."
10026080-53 = "ฮือ..."
10026080-54 = "ขอโทษนะคะ ฉันไม่มีสกิลพูดโกหกเลยค่ะ ขนาดตัวเองพูดเองยังรู้สึกแปลกๆ..."
10026080-55 = "[s5] \"ลองพยายามดูอีกหน่อยนะ...\"\n[s6] \"มาเริ่มสำรวจกันเลยไหม?\""
10026080-58 = "ค่ะ..."
10026080-60 = "ด้านในถ้ำน้ำตก"
10026080-62 = "ตามแผนที่แล้ว... ที่นี่คือ... ด้านในของน้ำตกสินะคะ ไม่คิดเลยว่าจะมีถ้ำอยู่ในน้ำตก..."
10026080-63 = "ดูจากข้างนอกแล้วไม่มีทางรู้เลยค่ะ แต่ก็นะ ต้องเป็นอย่างนี้สิถึงจะเป็น 'สถานที่ลับ' ว่าไหมคะ?"
10026080-68 = "อึก..."
10026080-69 = "[s7] \"...อุย?\"\n[s8] \"เป็นอะไรหรือเปล่า? สีหน้าดูไม่ค่อยดีเลย\""
10026080-72 = "เสียงน้ำตกมันดังหนวกหูน่ะค่ะ... ดังแทบจะกลบเสียงพูดหมดแล้ว..."
10026080-73 = "อ่า... ขอโทษค่ะ คุณครู ฉันแค่พูดอะไรของฉันคนเดียวน่ะ... คุณครูอย่าใส่ใจเลยนะคะ..."
10026080-74 = "เอ๋... อาจจะจริงตามนั้นนะ..."
10026080-75 = "...■■■ ■■ ■■■ ■■■■■-"
10026080-76 = "■■■■■■■■...♡♡♡"
10026080-77 = "[s] \"......?\""
10026080-78 = "จริงด้วยนะคะ? ถ้าพูดเบาๆ ก็ไม่ได้ยินเลยค่ะ โคฮารุจังก็ลองดูไหมคะ?"
10026080-79 = "ไม่เอา! ไม่เอาด้วยหรอก!!"
10026080-80 = "[s9] \"ละ... ลองเดินดูรอบๆ ก่อนมั้ย?\"\n[s10] \"เอาละๆ! ไปสำรวจกัน สำรวจ...!!\""
10026080-85 = "(คุณครูลองเข้าไปข้างในส่วนลึกของถ้ำ)"
10026080-86 = "(ในส่วนลึกของถ้ำมีกล่องไม้ขนาดยาวหลายใบวางอยู่)"
10026080-87 = "[ns11] \"เอ๋... นี่มัน...?\"\n[ns12] \"กล่องไม้...?\""
10026080-90 = "อะ... อะไรคะเนี่ย!? ทำไมถึงมีกล่องไม้อยู่ในที่แบบนี้..."
10026080-91 = "แถมยังยาวเท่าๆ ส่วนสูงของคนเลยด้วยค่ะ จะว่ายังไงดีนะ ดูจากรูปร่างแล้วมัน..."
10026080-95 = "....เหมือนโลงศพ...?"
10026080-101 = "ถึงมันจะมีรูปลักษณ์ที่พิเศษ แต่ในสถานการณ์แบบนี้คงคิดเป็นอย่างอื่นไม่ได้ค่ะ"
10026080-102 = "ละ... โลงศพเหรอคะ...!? โลงศพงั้นเหรอ ทำไมถึงมีโลงศพอยู่ในที่แบบนี้...!!"
10026080-103 = "...คุณฮินาตะ แล้วก็... อืม... คุณโคฮารุ? หรือเปล่านะคะ?"
10026080-104 = "คะ... คะ!?  ฉะ... ฉันเหรอคะ...? เรียกฉัน... เหรอคะ...?"
10026080-105 = "ค่ะ ขอโทษนะคะ แต่ทั้งสองคนช่วยออกห่างไปหน่อยแล้วยืนหันหลังไว้ได้ไหมคะ?"
10026080-106 = "แบบว่า... เผื่อกรณีฉุกเฉินน่ะค่ะ"
10026080-107 = "กะ... กรณีฉุกเฉินงั้นเหรอ...? หมายความว่ายังไง..."
10026080-108 = "ก็เผื่อๆ ไว้... น่ะค่ะ"
10026080-109 = "...เพราะนี่อาจจะเป็นโลงศพจริงๆ ก็ได้ ฉันว่าจะลองเปิดขึ้นมาอันหนึ่งเพื่อตรวจสอบน่ะค่ะ"
10026080-110 = "ถึงจะเป็นการเสียมารยาทต่อผู้ตายก็เถอะ... แต่เพื่อการพิสูจน์มันก็คงช่วยไม่ได้ นี่คือการทำเพื่อการ#nสำรวจค่ะ"
10026080-111 = "ยะ... อย่างนั้นสินะคะ! ถ้างั้นฉันจะช่วยเองค่ะ มันเป็นเรื่องที่ต้องใช้กำลัง..."
10026080-112 = "ไม่เป็นไรค่ะ คุณฮินาตะ"
10026080-113 = "......!?"
10026080-114 = "ทั้งสองคนไปยืนหันหลังรออยู่ตรงนั้นตามที่ฉันบอกเถอะค่ะ"
10026080-115 = "ฉันก็แค่ไม่ค่อยสบายใจน่ะค่ะ และถ้าเป็นไปได้... แค่เผื่อไว้นะคะ... ฉันไม่อยากให้คุณฮินาตะต้องเห็น#nสิ่งที่น่าอันตรายค่ะ"
10026080-116 = "...เพราะงั้นตอนนี้ช่วยทำตามที่ฉันสั่งด้วยค่ะ ถือว่าฉันขอร้องละค่ะ"
10026080-118 = "อ่า... เอ่อ..."
10026080-119 = "อืม... ค่ะ... ถ้างั้นฉันจะไปยืนหันหลังอยู่ตรงนั้นนะคะ..."
10026080-125 = "เอ๋..."
10026080-126 = "แล้วฉันล่ะคะ...? ฉันไม่ต้องไปยืนหันหลังก็ได้เหรอคะ...?"
10026080-127 = "...???"
10026080-128 = "อ่า... ขอโทษค่ะ พอดีฉันคิดว่า... คุณฮานาโกะสามารถทนดูอะไรแบบนี้ได้..."
10026080-129 = "ถ้าไม่อยากเห็นก็ไปยืนหันหลังอีกคนก็ได้ค่ะ ให้ฉันเห็นสิ่งนี้คนเดียวก็ได้ค่ะ"
10026080-130 = "ภาพลักษณ์ของฉันในสายตาคุณอุย... มันเป็นยังไงคะเนี่ย..."
10026080-131 = "...แต่มันก็ไม่ได้ผิดอะไรหรอกค่ะ งั้นเราข้ามเรื่องนี้ไปแล้วเข้ามาดูด้วยกันเลยไหมคะ?"
10026080-132 = "คุณครูก็... ไม่เป็นไรใช่ไหมคะ?"
10026080-133 = "[s13] \"ระวังๆ กันหน่อยนะ จะได้ไม่เป็นการเสียมารยาท\"\n[s14] \"อื้ม ครูไม่เป็นไร\""
10026080-136 = "...ค่ะ"
10026080-137 = "ถ้าอย่างนั้น ฉันจะแง้มๆ ดูนิดเดียวพอค่ะ"
10026080-138 = "...อึก..."
10026080-142 = "อืม... มันมืด... จนยังมองไม่เห็นข้างใน..."
10026080-143 = "...หืม? เอะ... เอ๋...?"
10026080-144 = "หืมม... นี่มัน..."
10026080-148 = "......!? สะ... เสียงเมื่อกี้!? อะไรเหรอคะ...? "
10026080-149 = "นะ... นี่มันอะไรกันเนี่ย!?  เข้าไปอยู่ตั้งแต่ตอนไหนน่ะ...!?"
10026080-155 = "อืม... เป็นแบบนี้อีกแล้วเหรอคะเนี่ย..."
10026080-156 = "รู้สึกเหมือนมีแขกที่ไม่ได้รับเชิญมาเลยนะคะ แต่ก็เริ่มจะชินขึ้นมาบ้างแล้ว..."
10026080-157 = "ถ้าจะพูดให้ถูก... ที่จริงแล้วพวกเราต่างหากนะคะที่เป็นแขกที่ไม่ได้รับเชิญ"
10026080-159 = "นี่ไม่ใช่เวลามาพูดล้อเล่นแบบนี้อยู่นะคะ"
10026080-165 = "[ns15] \"ออกไปจากที่นี่กันก่อนเถอะ\"\n[ns16] \"ฝ่าออกไปเลย!\""
10026080-168 = "เฮ้อ ทำไมถึงเป็นแบบนี้อยู่เรื่อยนะ!?"
10026080-169 = "...คุณครู ช่วยสั่งการพวกเราด้วยค่ะ"
10026080-170 = "ไปกันเลย!!"

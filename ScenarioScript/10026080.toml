[translation]
10026080-1 = "Episode 8;Site E: Waterfall Hideout"
10026080-4 = "Look! It must be that waterfall over there!"
10026080-5 = "Phew! It's a bit further away than I thought... and a steep climb too!"
10026080-6 = "There's a cave behind the waterfall..."
10026080-7 = "You can't see it from the outside at all. I should have expected as much from the Council."
10026080-8 = "Let's do a headcount before we go in. Did everyone climb up okay?"
10026080-9 = "Yes!"
10026080-10 = "More or less..."
10026080-11 = "Good. Everyone made it safely— Sensei, you look exhausted."
10026080-12 = "[s1] \"I'm...all right...\"\n[s2] \"Guess I need to work out more...\""
10026080-15 = "Haha... The road was pretty steep, wasn't it? We should have gone slower."
10026080-16 = "But... Where's Ui? She was right next to me a second ago."
10026080-17 = "Ui...?"
10026080-21 = "Ugh... Urgh... Huff... Huff... Gah..."
10026080-22 = "This... This... Hrgh..."
10026080-23 = "No... No... No words... Kugh... Hugggh... Hf..."
10026080-24 = "I... I made it... Eh..."
10026080-29 = "Ui?!"
10026080-31 = "Phew... That's better... Thank you for waiting..."
10026080-32 = "Climbing...up here...with no...proper roads...is torture..."
10026080-33 = "But... Now I'm convinced... They wouldn't hide it this well if it wasn't important..."
10026080-34 = "Everything else we've seen was a distraction..."
10026080-37 = "A smoke screen to hide...whatever terrible thing we're about to see..."
10026080-38 = "A torture room...an execution chamber...some religious ritual...or...something..."
10026080-39 = "We're about to see the true face of the Sisterhood!"
10026080-43 = "[ns3] \"Ui. Stop.\"\n[ns4] \"You're saying weird things again.\""
10026080-46 = "Ah, right. I understand..."
10026080-47 = "I'm sorry. I'm so tired. I didn't think before I spoke."
10026080-48 = "However we must uncover the truth. I only hope it's not as bad as I fear."
10026080-49 = "Yes. That is what I hope..."
10026080-53 = "Uh..."
10026080-54 = "That didn't sound very convincing, did it? Sorry. I'm a bad actor."
10026080-55 = "[s5] \"You'll get the hang of it eventually...\"\n[s6] \"Shall we start our investigation?\""
10026080-58 = "Yes..."
10026080-60 = "Waterfall Hideout"
10026080-62 = "All of this behind a simple waterfall... Who'd have thought?"
10026080-63 = "You really can't see it from the outside. That's a pretty good trick for a secret location."
10026080-68 = "Ugh. Tch..."
10026080-69 = "[s7] \"...Ui?\"\n[s8] \"What's wrong? You don't look so good.\""
10026080-72 = "The sound of the water is so loud that I can't really hear anyone else."
10026080-73 = "Don't mind me, Sensei. I was just talking to myself..."
10026080-74 = "Hm... Yes, that's definitely a problem..."
10026080-75 = "...■■■ ■■ ■■■ ■■■■■."
10026080-76 = "■■■■■■■■... ♡♡♡"
10026080-77 = "[s] \"...?\""
10026080-78 = "See? You couldn't hear one salacious thing I said. Try it, Koharu!"
10026080-79 = "No way!"
10026080-80 = "[s9] \"Why don't we take a look around?\"\n[s10] \"Hey! None of that now! We need to investigate!\""
10026080-85 = "We walked deeper and deeper into the cave."
10026080-86 = "Finally, we came across several long, wooden boxes."
10026080-87 = "[ns11] \"Huh? Are these...?\"\n[ns12] \"What are these boxes?\""
10026080-90 = "...Wh-What?! What are a bunch of wooden boxes doing in a place like this?"
10026080-91 = "They're big enough to fit a person. They kind of look like—"
10026080-95 = "Coffins."
10026080-101 = "They're not the typical shape, but they certainly bring that image to mind."
10026080-102 = "C-Coffins...?! Why would anyone put coffins in here?!"
10026080-103 = "Hinata. Koharu?"
10026080-104 = "Y-Yes? Did you call me?"
10026080-105 = "Yes. I'm sorry, but you two might want to look away for a moment."
10026080-106 = "Just in case..."
10026080-107 = "Just in case what...?"
10026080-108 = "You know... Just in case..."
10026080-109 = "Just in case whoever it was used them for their intended purpose. I'm going to open one to confirm."
10026080-110 = "I know it's disrespectful to the dead and all that, but for the sake of the investigation, I have to check."
10026080-111 = "O-Oh! In that case, you might need some muscle. I'll help..."
10026080-112 = "No, Hinata."
10026080-113 = "...?!"
10026080-114 = "Like I said, I just need the two of you to turn around."
10026080-115 = "I already don't feel good about this. I don't want to make it worse by letting you see whatever's inside here, Hinata."
10026080-116 = "So just...do what I say. Please."
10026080-118 = "Ah... Uh..."
10026080-119 = "Y-Yes... Okay. I'll turn around."
10026080-125 = "Eh-hem!"
10026080-126 = "What about me? Don't you want me to turn around too?"
10026080-127 = "...?"
10026080-128 = "Ah... I'm sorry. You struck me as the type who wouldn't mind this kind of thing..."
10026080-129 = "You can turn around too if you'd prefer. Only one of us needs to see what's inside."
10026080-130 = "...Now I'm wondering what type of person you think I am..."
10026080-131 = "But you're not wrong. Let's look together."
10026080-132 = "Are you comfortable with this too, Sensei?"
10026080-133 = "[s13] \"Yes, but let's do our best to be respectful.\"\n[s14] \"Yeah, I am.\""
10026080-136 = "Okay, then..."
10026080-137 = "I'll open it just a crack."
10026080-138 = "...Ugh..."
10026080-142 = "It's too dark. I can't quite see...what's inside..."
10026080-143 = "...Mm? Huh..."
10026080-144 = "Oh my..."
10026080-148 = "...?! Wh-What was that noise?!"
10026080-149 = "Wh-What is going on?!"
10026080-155 = "Hm... So that's how it's going to be."
10026080-156 = "We've got company...again. You'd think we'd be used to getting ambushed by now."
10026080-157 = "Although, if I'm being fair, technically WE'RE the company."
10026080-159 = "This really isn't the time to work on your stand-up routine, Hanako!"
10026080-165 = "[ns15] \"Let's get out of here! Hurry!\"\n[ns16] \"There's only one option. We have to break through!\""
10026080-168 = "Why does this keep happening?!"
10026080-169 = "...Sensei, tell us what to do!"
10026080-170 = "Let's go!"

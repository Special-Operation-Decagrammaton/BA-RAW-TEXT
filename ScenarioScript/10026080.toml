[translation]
10026080-1 = "第8話;調查點E「瀑布後的基地」"
10026080-4 = "……這應該就是地圖上的那座瀑布了吧！#n看來我們就快到目的地了！"
10026080-5 = "不過路程比想像中還遠呢，而且還在地勢這麼高的地方……"
10026080-6 = "隱藏在瀑布後的洞窟……"
10026080-7 = "從外面的確完全看不出來。#n這就是聖徒會的祕密據點嗎？"
10026080-8 = "好，在進去之前先清點人數……大家都順利爬上來了嗎？"
10026080-9 = "嗯～"
10026080-10 = "嗯，嗯……算是吧……"
10026080-11 = "大家都平安無事……#n咦，老師？看起來好像有點累呢……"
10026080-12 = "[s1]「我，我……我沒事……」\n[s2]「看來得增加運動量才行……」"
10026080-15 = "哈哈……這條路確實不好走，是我們走太快了。"
10026080-16 = "話說回來，憂同學呢……？#n剛才明明還在旁邊的……"
10026080-17 = "憂同學……？"
10026080-21 = "呼……哈啊……呼……哈啊……呼……"
10026080-22 = "啊啊……真是……可惡……該死……"
10026080-23 = "不……不行……不能說髒話……呼……哈啊……呼……"
10026080-24 = "哈啊……總算……爬……上來……了……"
10026080-29 = "憂同學！？！？"
10026080-31 = "呼……哈……總算喘過氣來了……謝謝你們特地等我……"
10026080-32 = "真是的……光是爬到這裡來……就是一種拷問了呢……連路都沒有鋪好……"
10026080-33 = "不過……這反而更讓我相信這裡的確是個「被隱藏的地方」。"
10026080-34 = "說不定我們之前調查的地方，全都只是障眼法……"
10026080-37 = "為了隱藏……接下來將展現在我們面前的可怕事物，特地精心打造的煙霧彈……"
10026080-38 = "例如我之前想過的拷問室……刑場……又或者是……可怕的宗教儀式……！！"
10026080-39 = "最終……說不定連修女會隱藏的真相也……！！"
10026080-43 = "[ns3]「憂，停停停。」\n[ns4]「你又開始說些奇怪的話囉。」"
10026080-46 = "……啊。"
10026080-47 = "對不起，我不小心又直接把內心話說出來了。"
10026080-48 = "總之，一切都要親眼見到才能證實。#n嗯，其實我……也希望不是我猜的……那樣。"
10026080-49 = "嗯，希望不是……"
10026080-53 = "唔嗯……"
10026080-54 = "對不起，我果然還是沒辦法說謊，自己講出來都覺得心虛……"
10026080-55 = "[s5]「之後再努力練習吧……」\n[s6]「好，那我們就正式展開調查吧。」"
10026080-58 = "是……"
10026080-60 = "瀑布洞窟內"
10026080-62 = "這裡……就是地圖上那座瀑布的……內側嗎？#n沒想到瀑布裡竟然真的有座洞窟……"
10026080-63 = "從外面完全看不出來。#n也對，這樣才稱得上是「祕密據點」。"
10026080-68 = "嗯……？"
10026080-69 = "[s7]「……憂？」\n[s8]「你怎麼了？臉色看起來不是很好。」"
10026080-72 = "因為水聲太吵……講話的聲音幾乎都被蓋過去了……"
10026080-73 = "……啊，抱歉，老師。#n我只是在自言自語……你不用在意……"
10026080-74 = "咦……好像真的會被蓋過去耶……"
10026080-75 = "……■■■■■■■■■■■■■。"
10026080-76 = "■■■■■■■■……♡♡♡"
10026080-77 = "[s] 「……？」"
10026080-78 = "真的呢，講小聲一點的話幾乎聽不見。#n小春醬要不要也試試看？"
10026080-79 = "不要！絕對不要！！"
10026080-80 = "[s9]「我，我們先仔細調查一下四周吧。」\n[s10]「好！開始調查吧，調查……！！」"
10026080-85 = "（一路走到了洞窟的深處）"
10026080-86 = "（在那裡，擺放著許多巨大的木製箱子）"
10026080-87 = "[ns11]「嗯？這是……」\n[ns12]「木箱……？」"
10026080-90 = "為什麼這個地方會有箱子……！？"
10026080-91 = "而且高度還跟人差不多……#n該怎麼說呢，簡直就像……"
10026080-95 = "棺材……？"
10026080-101 = "雖然樣式有點奇特，不過在這種狀況下，大部分的人應該都會這麼想吧？"
10026080-102 = "棺，棺材……！？#n為，為什麼這種地方會有棺材……！！"
10026080-103 = "……日向同學。#n還有……唔……小春……同學？我應該沒記錯吧……？"
10026080-104 = "我，我嗎……？是在……叫我……？"
10026080-105 = "對，不好意思，可以請你們兩位稍微離遠一點，然後不要朝這邊看嗎？"
10026080-106 = "這是為了……以防萬一。"
10026080-107 = "以，以防萬一……？#n為什麼要……"
10026080-108 = "也許……嗯……"
10026080-109 = "這些很可能真的是棺材，所以我打算打開確認看看。"
10026080-110 = "雖然這對亡者相當不敬……但稍微瞄一眼的話應該沒關係，畢竟我們也是為了調查。"
10026080-111 = "原，原來如此！#n既然是要出力的事情，就讓我來幫忙……"
10026080-112 = "不，日向同學。"
10026080-113 = "……！？"
10026080-114 = "就跟我剛才說的一樣，你們只要向後轉就行了。"
10026080-115 = "不然我會覺得過意不去的……#n我不想讓你看到任何可能會有危險的東西。"
10026080-116 = "……所以，請照我說的做吧，拜託你。"
10026080-118 = "啊……嗯……"
10026080-119 = "我，我知道了……我會乖乖轉過去的……"
10026080-125 = "……那個。"
10026080-126 = "那我呢……？我不用轉過去沒關係嗎……？"
10026080-127 = "……？？？"
10026080-128 = "啊……抱歉，我下意識就……#n因為剛才的氣氛……我以為你的忍耐力應該比較高……"
10026080-129 = "假如不想看的話也可以轉過去，我自己一個人確認就行了。"
10026080-130 = "總覺得我在憂同學心中的形象……好像有點……"
10026080-131 = "……不過你說得也沒錯。#n我們就一起確認吧。"
10026080-132 = "老師……你應該也不怕吧？"
10026080-133 = "[s13]「我們最好還是謹慎一點，避免對亡者不敬。」\n[s14]「嗯，我不怕。」"
10026080-136 = "……是。"
10026080-137 = "那麼，我就打開一個小縫了喔。"
10026080-138 = "唔……"
10026080-142 = "嗯……因為裡面很暗……所以我……"
10026080-143 = "……嗯？#n咦……咦……？"
10026080-144 = "哎呀……這個是……"
10026080-148 = "……怎，怎麼了！？#n剛才的聲音是……？"
10026080-149 = "怎，怎麼會！？#n什麼時候跑進來的……！？"
10026080-155 = "唔……又變成這樣了嗎……"
10026080-156 = "看來有客人找上門了呢。#n不過大家也差不多習慣了吧……"
10026080-157 = "……其實嚴格來說，我們才是這座島的「客人」才對。"
10026080-159 = "現在不是開玩笑的時候吧？"
10026080-165 = "[ns15]「先離開這裡吧。」\n[ns16]「突破包圍吧！」"
10026080-168 = "真是的，為什麼總是這樣！？"
10026080-169 = "……老師，麻煩您指揮了。"
10026080-170 = "上吧！！"

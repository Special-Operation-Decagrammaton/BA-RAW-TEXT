1009006-14 = "3;우미카;16;그, 그렇게 실망하실 필요는 아직 없지 않을까요?!\n#3;stiff"
1009006-15 = "3;우미카;99;있잖아요, 선생님?"
1009006-16 = "3;우미카;01;지금부터 말이에요……. 저는 뒷문으로 조용히 나갈 거랍니다?"
1009006-17 = "3;우미카;00;그리고 그러고 나면, 열을 세신 다음.\n#3;m4"
1009006-18 = "3;우미카;01;천천히, 뒷문으로 저를 따라와 주세요. 아셨죠?\n#3;m5"
1009006-19 = "3;우미카;03;그러면 먼저…… 실례하겠습니다!"

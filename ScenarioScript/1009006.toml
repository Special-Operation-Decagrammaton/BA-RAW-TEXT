1009006-55 = "3;우미카;01\n#3;a\n#wait;1000"
1009006-56 = "3;우미카;01;예전에, 말씀하셨죠. 샬레의 일 때문에 좀처럼 테마파크에도, 축제에도 일정을 맞춰 즐기기가 힘드시다고……."
1009006-57 = "[s] \"그래서…… 이런 축제를, 준비한 거야?\""
1009006-58 = "3;우미카;03;네. 일 때문에 축제 일정을 맞추기 힘드시다면, 비교적 작은…… 한 사람만을 위한 축제라면, 부담 없이 참여하실 수 있지 않을까 해서요.\n#3;greeting\n#3;em;[반짝]"
1009006-59 = "3;우미카;00;시간적인 의미로든, 업무적인 의미로든요."
1009006-60 = "[s] \"그때의 '좋은 생각'이란 게, 이거였구나.\""
1009006-61 = "3;우미카;03;에헤헤.\n#3;em;[///]\n#3;stiff"
1009006-62 = "3;우미카;00;그보다, 선생님! 모처럼 이렇게 축제에 오셨으니까, 제가 전부 안내해 드릴게요!"
1009006-63 = "3;우미카;10;우선은요, 우선은요! 여기 '선생님 부채'부터 봐주세요!\n#3;a\n#3;closeup"
1009006-64 = "[s] \"으, 응……! 확실히 적혀 있네. '[USERNAME]' 이라고…….\" "
1009006-65 = "3;우미카;10;그리구요, 그리구요! '선생님 꼬치구이'도 있어요! 드셔 보세요!\n#3;hophop"
1009006-66 = "[s] \"……보통의 꼬치구이와, 뭐가 다른 거야……?\""
1009006-67 = "3;우미카;03;훗훗훗. 그건 말이죠……. 지금까지 백야당에서 선생님이 주문하신 메뉴에 기반하여…….\n#3;em;[재잘]"
1009006-68 = "3;우미카;10;선생님이 가장 좋아하실 것 같은 소스를 엄선해! 발라서 구웠답니다!\n#3;greeting"
1009006-69 = "3;우미카;99;다음은 '선생님 오코노미야키'를 구워 드릴게요! 오코노미야키는 원래 자기가 좋아하는 재료를 넣고 구운 것……."
1009006-70 = "3;우미카;10;따라서 선생님께서 좋아하시는 걸 넣고 구우면, 그게 '선생님 오코노미야키'가 된다는 뜻이죠!\n#3;closeup"
1009006-71 = "[s] \"거기까지 알 수 있는 것인가, 백야당!\""
1009006-72 = "3;우미카;03;에헤헤. 백야당의 서비스를 가볍게 보시면 곤란하다구요?!\n#3;greeting\n#3;em;[재잘]"
1009006-73 = "3;우미카;00;거기에 '선생님 솜사탕', '선생님 요요 낚시', '선생님 사격', 그리고 또……!\n#3;hophop"

[translation]
1009006-1 = "เทศกาลเพื่อคนเพียงคนเดียว"
1009006-4 = "ว้าว! คุณครู!"
1009006-5 = "[s1] \"อ้อ สวัสดี อุมิกะ\"\n[s2] \"วันนี้ดู... มีชีวิตชีวามากกว่าทุกวันเลยนะ?\""
1009006-8 = "งั้นเหรอคะ? ฉันไม่รู้เลยค่ะ"
1009006-9 = "เพราะฉันทักทายคุณครูอย่างเบิกบานกว่าทุกครั้งงั้นเหรอคะ? อืม... คุณครูคิดไปเองหรือเปล่าคะ? แหะๆๆ"
1009006-10 = "เหตุผลที่ฉันขอให้คุณครูมาที่นี่วันนี้ก็คือ..."
1009006-11 = "[s] \"ก็คือ...?\""
1009006-12 = "ขอเก็บไว้เป็นความลับก่อนค่ะ!"
1009006-13 = "[s] \"เป็นความลับนี่เอง...\""
1009006-14 = "ตะ... แต่ว่าคุณครูไม่จำเป็นต้องผิดหวังขนาดนั้นก็ได้ค่ะ!"
1009006-15 = "คุณครูคะ"
1009006-16 = "ตั้งแต่นี้ไป... ฉันจะเดินออกไปทางประตูหลังอย่างเงียบๆ ค่ะ"
1009006-17 = "พอฉันออกไปแล้ว ให้คุณครูนับ 1-10"
1009006-18 = "แล้วเดินออกมาหาฉันทางประตูหลังช้าๆ นะคะ เข้าใจมั้ยคะ?"
1009006-19 = "ถ้างั้นฉัน... ขอตัวไปก่อนนะคะ!"
1009006-24 = "(อุมิกะเดินออกไปทางประตูหลังด้วยความระมัดระวัง...)"
1009006-28 = "(คุณครูนับเลข 1-10 ในใจ...)"
1009006-32 = "[ns] (เดินออกไปทางประตูหลัง)"
1009006-38 = "― [log=우미카]เชิญเข้าสู่งานเทศกาลค่ะคุณครู![/log][wa:1830] "
1009006-41 = "― [log=우미카]แหะๆๆ เป็นยังไงบ้างคะ?[/log][wa:1120] "
1009006-42 = "― [log=우미카]ที่ฉันตั้งใจเตรียมมาตลอดจนถึงตอนนี้... ทั้งหมดก็เพื่อช่วงเวลานี้เลยค่ะ![/log][wa:4420] "
1009006-45 = "― [log=우미카]ฉันไม่บอกให้ใครอื่นรู้ และไม่ได้เชิญคนอื่นมาเลยค่ะ[/log][wa:1450] "
1009006-48 = "― [log=우미카]เพราะงานเทศกาลนี้... จัดขึ้นเพื่อคุณครูเท่านั้นค่ะ![/log][wa:1870] "
1009006-51 = "― [log=우미카]งานเทศกาลที่ไม่มีใครอื่นนอกจากฉันและคุณครู...[/log][wa:1790] "
1009006-52 = "― [log=우미카]ถึงแม้จะรู้สึกเขินอยู่นิดหน่อย... แต่ก็หวังว่าจะถูกใจคุณครูนะคะ![/log][wa:6230] "
1009006-56 = "ก่อนหน้านี้คุณครูเคยบอกฉันนี่คะว่างานของชาเล่ต์ทำให้ครูหาเวลาไปเที่ยวทั้งสวนสนุก และงานเทศกาลไม่ได้เลย..."
1009006-57 = "[s] \"ก็เลย... เตรียมงานเทศกาลแบบนี้ให้ครูเหรอ?\""
1009006-58 = "ค่ะ ถ้าคุณครูงานยุ่งจนหาเวลามาเที่ยวงานเทศกาลของโรงเรียนไม่ได้ ฉันคิดว่าอย่างน้อยถ้าเป็น#nเทศกาลเล็กๆ... หรืองานที่จัดขึ้นเพื่อคนคนหนึ่งเท่านั้น คุณครูก็น่าจะมาได้โดยที่ไม่ลำบากใจน่ะค่ะ"
1009006-59 = "ไม่ว่าในแง่ของเวลาหรืองานที่ต้องทำก็ตาม"
1009006-60 = "[s] \"ที่บอกว่า 'มีความคิดดีๆ' ตอนนั้นคือเรื่องนี้สินะ\""
1009006-61 = "แหะๆๆ"
1009006-62 = "คุณครูคะ! ในเมื่อได้มาเที่ยวงานเทศกาลแล้ว ฉันจะแนะนำและพาเที่ยวงานเองค่ะ!"
1009006-63 = "ก่อนอื่นเลยนะคะ! มาเริ่มจาก 'พัดของคุณครู' ตรงนี้ก่อนเลยค่ะ!"
1009006-64 = "[s] \"อะ... อื้ม...! เขียนชื่อ '[USERNAME]' ไว้พร้อมเลยนะ...\""
1009006-65 = "ยังไม่หมดแค่นี้นะคะ! ยังมี 'เมนูเสียบไม้ย่างของคุณครู' ด้วยค่ะ! ลองชิมดูสิคะ!"
1009006-66 = "[s] \"มันต่างจากเมนูเสียบไม้ย่างปกติยังไงเหรอ...?\""
1009006-67 = "ฮุฮุฮุ เรื่องนั้นเหรอคะ... เมนูนี้มีที่มาจากอาหารที่คุณครูสั่งทานบ่อยๆ ในร้านเฮียกคิยาโคค่ะ..."
1009006-68 = "ฉันตั้งใจเลือกซอสที่คุณครูน่าจะชอบที่สุดมาอย่างพิถีพิถัน! แล้วก็นำมาทาก่อนจะเอาไปย่างค่ะ!"
1009006-69 = "ต่อไปฉันจะทำ 'โอโคโนมิยากิของคุณครู' ให้นะคะ! เดิมทีแล้วโอโคโนมิยากิเป็นอาหารที่ใส่วัตถุดิบที่#nเราชอบมากที่สุดลงไปย่าง..."
1009006-70 = "และถ้าใส่วัตถุดิบที่คุณครูชอบลงไป ก็จะกลายเป็น 'โอโคโนมิยากิของคุณครู' ค่ะ!"
1009006-71 = "[s] \"ร้านเฮียกคิยาโครู้ลึกถึงขนาดนี้เลยเหรอเนี่ย!\""
1009006-72 = "แหะๆๆ อย่ามองว่าร้านเฮียกคิยาโคให้บริการแบบลวกๆ นะคะ!"
1009006-73 = "นอกจากนี้ฉันยังเตรียม 'สายไหมของคุณครู' รวมทั้งกิจกรรม 'โยโย่ตกปลาของคุณครู' และ 'การยิงปืนของคุณครู' ไว้ด้วยค่ะ แล้วก็...!"
1009006-89 = "[ns] \"ครูเริ่มจะเขินแล้วสิเนี่ย\""
1009006-91 = "ไม่เป็นไรค่ะ! เราอยู่กันแค่ 2 คนนี่คะ! อ้อ ถ่ายรูปไว้ด้วยดีมั้ยคะ?"
1009006-96 = "และในส่วนสุดท้ายของงานเทศกาลนี้ ฉันมีกิจกรรมสุดพิเศษไว้ให้ด้วยค่ะ!"
1009006-101 = "'เทศกาลของคุณครู' วันนี้เป็นยังไงบ้างคะ?"
1009006-102 = "[s] \"มีสิ่งที่น่าจดจำหลายอย่างเลยละ...\""
1009006-103 = "ใช่มั้ยล่ะคะ? คิดอย่างนั้นใช่มั้ยคะ?"
1009006-107 = "อืม... ถ้าฉันคิดในมุมมองของผู้มาเที่ยวงานแล้ว..."
1009006-108 = "ฉันก็คงมองว่า 'เทศกาลของคุณครู' ในวันนี้จะเป็นที่น่าจดจำไปอย่างยาวนานเลยละค่ะ..."
1009006-109 = "[s3] \"อืม... ถ้าอย่างนั้นครูก็ดีใจนะ\"\n[s4] \"ขอบใจนะ อุมิกะ นี่จะเป็นความทรงจำที่ครูลืมไม่ลงเลยละ\""
1009006-115 = "จริง... เหรอคะ?"
1009006-116 = "......"
1009006-117 = "ตะ... แต่ยังไม่หมดแค่นี้นะคะ! ถึงแม้เราจะมาถึงช่วงท้ายของ 'เทศกาลของคุณครู' แล้ว แต่ก็ยังไม่จบอย่างสมบูรณ์ค่ะ!"
1009006-118 = "[s] \"ยังมีอะไรเหลืออีกเหรอ?!\""
1009006-119 = "ค่ะ! ลองดูทางโน้นสิคะ!"
1009006-127 = "[ns] \"ถึงกับมีพลุเลยเหรอ...?\""
1009006-128 = "ใช่ค่ะ! เราต้องปิดงานเทศกาลด้วยพลุสิคะ!"
1009006-134 = "เอ่อ... คุณครูคะ?"
1009006-135 = "[ns] \"หืม?\""
1009006-137 = "ฉันขอนั่งข้างๆ คุณครูสักครู่ได้มั้ยคะ...?"
1009006-142 = "ขอบคุณค่ะ แหะๆๆ..."
1009006-146 = "(อุมิกะเข้ามานั่งข้างๆ อย่างเงียบๆ)"
1009006-147 = "(คุณครูและอุมิกะนั่งเงยหน้าดูพลุที่ระยิบระยับบนฟ้า และรู้สึกได้ถึงความอบอุ่นของกันและกัน...)"

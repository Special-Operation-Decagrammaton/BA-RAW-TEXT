1009006-8 = "3;우미카;01;그런가요? 전 잘 모르겠는데요?\n#3;em;[음표]"
1009006-9 = "3;우미카;03;다소 격한 환영인사였다고요? 으음…… 선생님의 기분 탓이 아니었을까요? 에헤헤."
1009006-10 = "3;우미카;01;오늘 이렇게 특별히 선생님을 모신 이유는……."

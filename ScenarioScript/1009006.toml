[translation]
1009006-1 = "A Festival Just for One"
1009006-4 = "Wow! Sensei!"
1009006-5 = "[s1] \"Oh, hello. Umika.\"\n[s2] \"You seem livelier than usual.\""
1009006-8 = "Is that so? I'm not entirely sure."
1009006-9 = "I guess I just wanted to enthusiastically greet Sensei... Heeheehee."
1009006-10 = "The reason I specifically invited you here today is..."
1009006-11 = "[s] \"Is...\""
1009006-12 = "Still a secret!"
1009006-13 = "[s] \"A secret, huh?\""
1009006-14 = "C-Come on! You're disappointed that quickly?!"
1009006-15 = "You know what, Sensei?"
1009006-16 = "I'm going to quietly leave through the back door."
1009006-17 = "When I do, you count to ten..."
1009006-18 = "Then slowly, follow me out. Got it?"
1009006-19 = "Now, if you'll excuse me!"
1009006-24 = "Umika politely exited out the back."
1009006-28 = "I silently counted to ten and then—"
1009006-32 = "[ns] Exit through the back door."
1009006-38 = "― [log=우미카]Welcome to my festival, Sensei![/log][wa:1790] "
1009006-41 = "― [log=우미카]Heeheehee. What do you think?[/log][wa:840] "
1009006-42 = "― [log=우미카]All my work and preparations...were for this exact moment!![/log][wa:4900] "
1009006-45 = "― [log=우미카]I didn't tell anyone, and there were no invitations.[/log][wa:1370] "
1009006-48 = "― [log=우미카]This festival...is just for you, Sensei![/log][wa:2310] "
1009006-51 = "― [log=우미카]A festival all for you and me, with no interruptions...[/log][wa:1390] "
1009006-52 = "― [log=우미카]It's a bit embarrassing, but...I hope you like it![/log][wa:6790] "
1009006-56 = "You mentioned it's hard to enjoy theme parks and festivals because of your work at Schale..."
1009006-57 = "[s] \"So you prepared a festival for me?\""
1009006-58 = "Yes, if it's hard to find the time for a big festival because of work...maybe a one person festival will work better instead."
1009006-59 = "Especially if you were already planning to visit."
1009006-60 = "[s] \"So was that the great idea you mentioned before.\""
1009006-61 = "Heeheehee."
1009006-62 = "Sensei! Now that you've finally arrived at the festival, let me guide you through it!"
1009006-63 = "Over here! Please take a look at this Sensei Fan!"
1009006-64 = "[s] \"Oh...wow! It even has [USERNAME] written on it...\" "
1009006-65 = "Also, don't miss out on a Sensei Skewer! Give it a try!"
1009006-66 = "[s] \"...How are these different from regular skewers?\""
1009006-67 = "Heeheehee. Well...I looked at your favorite items from Momoyodou's menu..."
1009006-68 = "And chose the sauce I thought you would like best!"
1009006-69 = "Next up, I'll start grilling some Sensei Okonomiyaki! Okonomiyaki is traditionally made up of your favorite ingredients..."
1009006-70 = "Therefore, I'll pack it with all the things you like! A true Sensei Okonomiyaki!"
1009006-71 = "[s] \"How could Momoyodou possibly know all these things?!\""
1009006-72 = "Heeheehee. Don't underestimate our service over at Momoyodou!"
1009006-73 = "This festival also has Sensei Cotton Candy, Sensei Yo-Yo Fishing, a Sensei Shooting Range, and more!"
1009006-89 = "[ns] \"I'm starting to get embarrassed at this abundance of Sensei...\""
1009006-91 = "It's okay! Only the two of us will know about this festival! Oh, want to take a picture?"
1009006-96 = "There's also an extra special course waiting for you at the end!"
1009006-101 = "So, what are your thoughts on the Sensei Festival?"
1009006-102 = "[s] \"I'll never forget it. For so many different reasons...\""
1009006-103 = "Right? Right?"
1009006-107 = "I may be putting the cart before the horse, but..."
1009006-108 = "I don't think I'll ever forget this year's Sensei Festival."
1009006-109 = "[s3] \"...Glad to hear.\"\n[s4] \"Thanks, Umika. It's been a memorable experience for us both...\""
1009006-115 = "Really...?"
1009006-116 = "..."
1009006-117 = "Well, it's not over yet! I mean my Sensei Festival is almost near its end, but it's not completely finished!"
1009006-118 = "[s] \"There's still more?!\""
1009006-119 = "Yes! Look this way!"
1009006-127 = "[ns] \"Fireworks too?!\""
1009006-128 = "Of course! A festival should always end with fireworks!"
1009006-134 = "Umm... Sensei?"
1009006-135 = "[ns] \"Hm?\""
1009006-137 = "Mind if I take a break and enjoy the fireworks with you?"
1009006-142 = "Thank you. Heeheehee."
1009006-146 = "Umika quietly sat next to me."
1009006-147 = "We sat together and gazed up at the sky, watching the Sensei Festival's bright and colorful fireworks light up the sky."

[translation]
1009006-1 = "只為一人舉辦的慶典"
1009006-4 = "哇！老師！"
1009006-5 = "[s1]「啊，嗨，海花。」\n[s2]「感覺你比平時……更充滿活力？」"
1009006-8 = "是嗎？我也不太確定呢？"
1009006-9 = "歡迎有點太熱情了？#n這個嘛……會不會是老師的心情造成的呢？呵呵呵。"
1009006-10 = "今天特意請老師來的理由是……"
1009006-11 = "[s]「理由是……！」"
1009006-12 = "現在還是祕密！"
1009006-13 = "[s]「原來是祕密啊……」"
1009006-14 = "應，應該不必那麼失望吧！？"
1009006-15 = "那個……老師？"
1009006-16 = "現在……我會悄悄地從後門出去。"
1009006-17 = "接著請老師數到十之後……"
1009006-18 = "慢慢地從後門出來跟著我，可以嗎？"
1009006-19 = "那麼……我就先失陪了！"
1009006-24 = "（海花以端莊的儀態朝後門走去……）"
1009006-28 = "（在心裡數到十之後……）"
1009006-32 = "[ns] 從後門出去"
1009006-38 = "― [log=우미카]歡迎來到慶典，老師！ [/log][wa:2590] "
1009006-41 = "― [log=우미카]耶嘿嘿。怎麼樣呀？[/log][wa:1640] "
1009006-42 = "― [log=우미카]至今為止一直在準備的……全部，都是為了這個瞬間！[/log][wa:6300] "
1009006-45 = "― [log=우미카]沒有被任何人知道，也沒有招待任何人。[/log][wa:2730] "
1009006-48 = "― [log=우미카]因為這場慶典……是專屬於老師的！[/log][wa:3270] "
1009006-51 = "― [log=우미카]沒有其他人，只有我和老師的慶典……[/log][wa:2910] "
1009006-52 = "― [log=우미카]雖然有點不好意思……希望你能喜歡！[/log][wa:8110] "
1009006-56 = "之前老師有說過對吧。#n因為夏萊工作的關係，無論是主題樂園還是慶典都很難好好享受……"
1009006-57 = "[s]「所以……你才準備了這場慶典嗎？」"
1009006-58 = "是的，如果是因為工作而難以參加慶典，那麼相對較小……#n像這樣只為一個人舉辦的慶典，應該就能比較沒有負擔地參加了吧。"
1009006-59 = "不管是在時間方面還是工作方面。"
1009006-60 = "[s]「原來你那時說的『好主意』就是這個啊。」"
1009006-61 = "耶嘿嘿。"
1009006-62 = "話說回來，老師！#n難得能來參加慶典，我來幫你介紹所有的東西吧！"
1009006-63 = "首先……！請先看這把「老師扇子」！"
1009006-64 = "[s]「呃，嗯……！真的寫著『[USERNAME]』的名字呢……」 "
1009006-65 = "還有還有！這個是「老師烤肉串」！請嚐嚐看！"
1009006-66 = "[s]「……和普通的烤肉串有什麼不同嗎……？」"
1009006-67 = "呵呵呵，其實這個……#n是用以往老師在百夜堂裡點的餐點為基礎……"
1009006-68 = "嚴選老師最喜歡的醬料之後烤出來的！"
1009006-69 = "接下來我來做「老師御好燒」吧！#n御好燒本來就是要加入自己喜歡的材料……"
1009006-70 = "所以只要把老師喜歡的東西加進去，「老師御好燒」就完成了！"
1009006-71 = "[s]「居然連這些都知道嗎，百夜堂！」"
1009006-72 = "耶嘿嘿，可別小看百夜堂的服務唷！？"
1009006-73 = "那邊有「老師棉花糖」、「老師溜溜球釣魚」、「老師射擊」，還有……！"
1009006-89 = "[ns]「漸漸開始害羞起來了！」"
1009006-91 = "沒關係！現在這裡只有我們兩個！啊，要不要拍張照呀？"
1009006-96 = "最後，我還準備了非常特別的環節！"
1009006-101 = "老師覺得「老師慶典」怎麼樣呢？"
1009006-102 = "[s]「各方面來說，應該會留下很深刻的印象……」"
1009006-103 = "對吧對吧？"
1009006-107 = "那個，或許這樣有點反客為主……"
1009006-108 = "不過我也覺得這次的「老師慶典」會一直一直留在記憶裡……"
1009006-109 = "[s3]「……嗯。那真是太好了。」\n[s4]「謝謝你，海花。這會成為一段難忘的回憶。」"
1009006-115 = "真的……嗎？"
1009006-116 = "……"
1009006-117 = "啊，還沒完哦！我的「老師慶典」雖然已經接近尾聲，不過還沒完全結束！"
1009006-118 = "[s]「還有嗎！？」"
1009006-119 = "是的！請看那邊！"
1009006-127 = "[ns]「居然連煙火都有……？」"
1009006-128 = "那當然！慶典的結尾果然還是要有煙火呢！"
1009006-134 = "那個……老師？"
1009006-135 = "[ns]「嗯？」"
1009006-137 = "我可以坐在你旁邊嗎……？"
1009006-142 = "謝謝你，耶嘿嘿……"
1009006-146 = "（海花靜靜地在旁邊坐了下來）"
1009006-147 = "（就這樣感受著彼此的溫暖，眺望著空中綻放的煙火……）"

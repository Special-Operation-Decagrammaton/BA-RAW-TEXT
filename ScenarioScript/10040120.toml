[translation]
10040120-1 = "後日談;真心話大冒險"
10040120-3 = "所以……"
10040120-4 = "是小雪醬和真紀醬一起調出了這一大杯可疑的問題飲料──#n抱歉，我是說這一大杯混合飲料的嗎？"
10040120-5 = "沒錯！在我們跟千尋前輩一起去便利商店買餅乾的期間，他竟然又闖禍了。"
10040120-6 = "如果是其他惡作劇倒還可以理解，居然為了這麼無聊的原因浪費食物……#n真搞不懂他到底在想什麼。"
10040120-7 = "……什麼？浪費？？"
10040120-8 = "別的也就算了，但說我浪費可不能裝作沒聽見！"
10040120-9 = "我們才不是單純在惡搞而已！#n是想藉由混合各種飲料，來探索創造嶄新美味飲料的可能性──"
10040120-15 = "你還是先把手給舉好吧。"
10040120-16 = "遵命。"
10040120-18 = "所以這些飲料，你打算怎麼處理呢？"
10040120-19 = "雖然有點浪費，不過也只能等派對結束後再一起倒掉了。"
10040120-24 = "優香醬，我想到了一個好點子。"
10040120-25 = "雖然小雪醬和真紀醬調的這杯飲料看起來很詭異，#n不過裡面加的終究還是可以喝的飲料，對身體應該不會造成什麼危害……"
10040120-26 = "不如我們就把這些飲料當作懲罰，來玩場真心話大冒險怎麼樣？"
10040120-27 = "真心話大冒險……？"
10040120-28 = "沒錯。#n「Truth or Dare」是玩家可以選擇要誠實回答對方的問題，或者接受懲罰的遊戲。"
10040120-29 = "如果有人不想回答真心話的話，就罰他喝這杯飲料……#n這樣既不會浪費飲料又能一起同樂，你覺得怎麼樣呢？"
10040120-30 = "這個點子不錯耶！#n剛好我本來就想打探優香前輩的隱私──"
10040120-31 = "小雪。"
10040120-32 = "遵命。"
10040120-33 = "唉……要玩真心話大冒險是無所謂，但我真不想把這杯飲料拿來當遊戲的懲罰。"
10040120-34 = "感覺這樣會讓反省失去意義，而且這東西看起來根本就不能喝……"
10040120-36 = "不過把還能使用的東西丟掉，不是你最討厭的行為嗎？"
10040120-37 = "我之後一定會找時間「好好」教訓小雪醬一頓的，你這次能不能網開一面呢？"
10040120-38 = "呃……不能讓優香前輩教訓我就好了嗎？#n我覺得那樣還比較沒那麼可怕。"
10040120-39 = "不行～"
10040120-40 = "唉……已經無力回天了嗎……"
10040120-42 = "既然你都這麼說了，那好吧。"
10040120-43 = "反正我也覺得在睡衣派對玩真心話大冒險挺不錯的。#n剛好現在老師也不在，我們可以盡情問彼此想問的問題……"
10040120-44 = "好，那可以請大家都靠過來嗎？"
10040120-45 = "規則很簡單。被指定的人必須選擇說出真心話還是喝懲罰飲料。#n完成之後才可以接著指定下一個人。"
10040120-46 = "那第一個人就用抽籤來決定吧！"
10040120-52 = "哎呀，我中獎了嗎？"
10040120-53 = "沒錯，現在請你指定一個人，然後問對方一個難以回答的問題吧。"
10040120-54 = "難以回答的問題啊……"
10040120-58 = "我是看到你剛才駭入的手法才想到的……小雪。"
10040120-59 = "什，什麼！？"
10040120-60 = "你至今為止到底駭進了千年的伺服器裡多少次？#n最近伺服器的數據庫裡有很多不尋常的紀錄。"
10040120-61 = "呃……我也不知道耶。"
10040120-63 = "好，那請你把懲罰飲料乾了吧。"
10040120-65 = "咦？先等一下！#n我又沒有說謊，只是真的記不起來了啊！"
10040120-66 = "我每次要找資料都會進入伺服器裡，這種事情我怎麼可能每次都記得──"
10040120-67 = "所以意思是你駭進伺服器的次數……多到數不清？"
10040120-68 = "乃愛，明天早上可以幫我安排和小雪對談嗎？#n關於伺服器的安全問題，我有一些很嚴肅的事情要問他。"
10040120-70 = "好的，那我立刻幫你預約一間隔音效果比較好的會議室。"
10040120-71 = "咦，不是你們叫我說真話的嗎？怎麼可以擅自追加懲罰！"
10040120-72 = "因為這跟真心話大冒險無關，而是針對你個人的懲罰哦。"
10040120-73 = "來吧，小雪醬。#n請你接著指定下一個要問的對象。"
10040120-74 = "唔唔……那我要選乃愛前輩！"
10040120-76 = "你現在身上穿的內衣是什麼顏色的？#n要是沒辦法在三秒內回答的話，就給我把懲罰飲料──"
10040120-77 = "我現在穿的是有蕾絲的白色內衣。#n因為穿起來很舒服，所以我很喜歡。"
10040120-78 = "回答得好快！？你都不會覺得害羞或反應不過來嗎？"
10040120-79 = "你怎麼會覺得這種問題會讓乃愛害羞啊……"
10040120-80 = "那麼這次換我指定了嗎……"
10040120-81 = "優香醬～？"
10040120-82 = "怎，怎麼了。#n你是要指定我嗎？"
10040120-83 = "沒錯，有件事我從以前就一直很在意了。"
10040120-87 = "優香醬……對[USERNAME]老師是怎麼想的呢？"
10040120-94 = "這，這麼突然！？"
10040120-98 = "你，你問我這種問題，我實在很難回答……"
10040120-99 = "當然我並不討厭老師，但是要我在這麼多人面前說出來實在有點……"
10040120-100 = "好，那就請你喝懲罰飲料吧！"
10040120-101 = "唔……沒辦法了。"
10040120-106 = "這到底是什麼味道啊？#n又苦又酸，而且口感還黏黏稠稠的……我的舌頭都快麻痺了。"
10040120-107 = "你竟然敢指定我。#n乃愛，我不會放過你的！"
10040120-108 = "呵呵，這只是遊戲而已，你先別那麼激動。"
10040120-109 = "來，現在換優香醬指定下一個人囉。"
10040120-110 = "真紀，你最近一次塗鴉是畫在什麼地方？"
10040120-111 = "塗鴉？如果是最近一次的話……#n應該是一週前在發電所北邊的牆面上，畫的那幅巨大閃電塗鴉吧──"
10040120-112 = "什麼！？原來圖書館那幅塗鴉還不是最新的嗎？"
10040120-113 = "哎呀，一不小心就說出來了……！"
10040120-115 = "唉……"
10040120-120 = "（……之後真心話大冒險一路持續到了很晚）"
10040120-121 = "（只是不知道為什麼……）"
10040120-123 = "優香前輩上次去夏萊當值日生的時候，直到凌晨才回到宿舍……#n你是不是和老師做了什麼？"
10040120-124 = "那，那是……因為是夏萊的公務，所以我不能告訴你！"
10040120-129 = "我想知道你上週末，在柯基町跟[USERNAME]老師聊了些什麼。"
10040120-130 = "你，你為什麼會知道這件事！？#n這題PASS！"
10040120-135 = "聽說優香在整理夏萊發票的時候，也會順便整理老師的私人發票。#n這件事是真的嗎？"
10040120-136 = "等一下，怎麼又是我？"
10040120-141 = "優香前輩！"
10040120-142 = "優香。"
10040120-143 = "優香醬～"
10040120-148 = "為什麼你們……"
10040120-149 = "都只針對我一個人問問題啊！"
10040120-151 = "（……結果大部分的懲罰飲料都被優香喝下了肚）"

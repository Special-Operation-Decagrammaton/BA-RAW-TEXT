[translation]
10040120-1 = "Afterword;Truth or Dare"
10040120-3 = "So..."
10040120-4 = "If I understand correctly, Koyuki and Maki concocted this large vat of suspicious liquid by mixing the drinks we had here?"
10040120-5 = "Exactly! She couldn't even behave herself for the five minutes we went to the convenience store!"
10040120-6 = "What was she thinking, wasting food like this?"
10040120-7 = "...What? Waste??"
10040120-8 = "Whatever to all the other stuff you were blabbering about, but I put my foot down at the word \"waste\"!"
10040120-9 = "We weren't just playing around! We were pushing the boundaries of gastronomy by creating new flavors—"
10040120-15 = "Keep your hands up!"
10040120-16 = "Yes, ma'am..."
10040120-18 = "What should we do with this drink, then?"
10040120-19 = "It's such a waste of food, but we should just throw it all away."
10040120-24 = "Actually, Yuuka, I have an idea."
10040120-25 = "Koyuki and Maki's concoction looks strange, but considering that it's a mixture of drinkable liquids, it shouldn't be harmful..."
10040120-26 = "What if we used it as a penalty drink for \"Truth or Dare\"?"
10040120-27 = "\"Truth or Dare\"?"
10040120-28 = "Yes. Where someone asks you a question, and you have to answer truthfully."
10040120-29 = "Instead of a dare, if someone doesn't want to answer a question, they'll have to drink this beverage as a penalty. This way, we can play a fun game and make use of this drink at the same time. What do you think?"
10040120-30 = "Oooh, I like it! I've got a ton of things I wanna ask Yuuka!"
10040120-31 = "Koyuki."
10040120-32 = "Yes, ma'am..."
10040120-33 = "Hah... Playing \"Truth or Dare\" sounds fun, but I'm not sold on using this drink."
10040120-34 = "I personally don't really want to have to drink it, but more importantly, I think it'll make Koyuki think this kind of behavior is okay."
10040120-36 = "On the other hand, there's nothing you hate more than wasting supplies, no?"
10040120-37 = "Why don't we let this go for right now, and I'll handle Koyuki's punishment later?"
10040120-38 = "Uh... You know what, why don't we just let Yuuka yell at me? I'd rather do that!"
10040120-39 = "Not an option."
10040120-40 = "Ah... Goodbye, cruel world..."
10040120-42 = "Well, I can't argue with that..."
10040120-43 = "I did really want to play \"Truth or Dare\" during the pajama party. And since Sensei's not here, we can ask whatever we want..."
10040120-44 = "Let's all gather in a circle, then."
10040120-45 = "The rules are simple. If you're asked a question, you can choose to either answer truthfully, or drink the penalty drink. Then, you'll have the opportunity to ask the next question."
10040120-46 = "We'll choose the first questioner by drawing lots!"
10040120-52 = "Oh, I won?"
10040120-53 = "Yes, pick whoever you'd like. Try to make it a difficult question."
10040120-54 = "A difficult question..."
10040120-58 = "This occurred to me watching you guys hack the TV earlier... Koyuki."
10040120-59 = "H-Huh? Me?!"
10040120-60 = "How many times have you hacked Millennium's servers? I found several instances of suspicious records in the server data recently."
10040120-61 = "Uh. Um. I don't really know."
10040120-63 = "Okay. Penalty drink for her."
10040120-65 = "Ehhh?! Wait, I'm really not lying! I really, honestly don't remember!"
10040120-66 = "I go in every time I need some new stuff... How am I supposed to keep track?"
10040120-67 = "You can't even keep track...of how many times you've done it?"
10040120-68 = "Noa, can you please schedule a meeting for me and Koyuki tomorrow? It appears I'll have to have a serious conversation with her about server security."
10040120-70 = "Of course. I'll reserve a soundproof meeting room for you immediately."
10040120-71 = "W-Wait a second! I told the truth! Why am I being penalized?!"
10040120-72 = "This is an entirely separate issue from our game."
10040120-73 = "Now, Koyuki. Please choose someone to ask a question."
10040120-74 = "Ugh... Then, Noa!"
10040120-76 = "What color underwear are you wearing right now?! Answer in three seconds, or you have to take a penalty drink—"
10040120-77 = "White underwear, with lace. It's very comfortable, so it's my favorite pair."
10040120-78 = "That was so fast... Shouldn't you have been at least a teeny, tiny bit embarrassed?"
10040120-79 = "Did you really think that Noa would be embarrassed by a question like that?"
10040120-80 = "It's my turn, then..."
10040120-81 = "Yuuka?"
10040120-82 = "M-Me? You have something you want to ask me?"
10040120-83 = "Yes. There's something I've always been curious about."
10040120-87 = "What do you think of...[USERNAME] Sensei?"
10040120-94 = "O-Of all things?!"
10040120-98 = "Th-That's a really hard question..."
10040120-99 = "It's not like I dislike Sensei or anything, but talking about this in front of so many people is a bit..."
10040120-100 = "Understood. Then take your penalty drink!"
10040120-101 = "Ugh... Fine, I have no choice..."
10040120-106 = "Wh-What's with this? It's so sticky...and bitter and sour... My tongue is going numb?!"
10040120-107 = "I can't believe you asked me that question, Noa. I'm gonna get you back!"
10040120-108 = "Fufu, it's just a game, isn't it?"
10040120-109 = "Well then, Yuuka? Please choose the next person."
10040120-110 = "Maki, where's the last place you graffitied?"
10040120-111 = "Huh? Oh, that big lightning mural I made on the north wall of the power plant last week—"
10040120-112 = "What?! I thought the one I found in the library was the last one!"
10040120-113 = "D'oh! I responded without thinking!"
10040120-115 = "*sigh*"
10040120-120 = "\"Truth or Dare\" continued long into the night."
10040120-121 = "But for some reason..."
10040120-123 = "Yuuka, the last time you were on Schale Student Rep duty, you came back after dawn... What were you doing with Sensei?"
10040120-124 = "Well, that's... It's Schale business! I can't talk about it!"
10040120-129 = "I'm curious about the conversation you had with [USERNAME] Sensei in front of Corgi Town last weekend."
10040120-130 = "H-Huh? How do you know about that?!"
10040120-135 = "Yuuka. I've heard that when you process Schale's expenses, you also get to see Sensei's personal receipts. Is that true?"
10040120-136 = "H-Hold up. Me again?!"
10040120-141 = "Yuukaaa!"
10040120-142 = "Yuuka."
10040120-143 = "Yuuka, dear?"
10040120-148 = "Why is everyone..."
10040120-149 = "...only asking me questions?!"
10040120-151 = "...Yuuka ended up taking the most sips from the penalty drink."

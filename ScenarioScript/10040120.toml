[translation]
10040120-1 = "ย้อนวันวาน;Truth or Dare"
10040120-3 = "สรุปว่า..."
10040120-4 = "โคยูกิจังกับมากิจังมิกซ์เครื่องดื่มที่รสชาติแย่... โทษทีค่ะ... มิกซ์เครื่องดื่มรสชาติใหม่จากเครื่องดื่ม#nที่เราเตรียมมาเพื่อปาร์ตี้วันนี้กันเหรอคะ?"
10040120-5 = "ก็ใช่น่ะสิ! อาศัยจังหวะที่พวกเราไปซื้อขนมที่ร้านสะดวกซื้อกับจิฮิโระแล้วก่อเรื่องขึ้นมาอีกตามเคย"
10040120-6 = "ถ้าเล่นซนกับอย่างอื่นก็ว่าไปอย่าง แต่นี่มาทำให้ของกินเสียของหมดเลย ทำไมถึงคิดทำอะไรแบบนี้#nก็ไม่รู้นะ"
10040120-7 = "คะ...? เสียของเหรอ??"
10040120-8 = "ถ้าดุว่าอย่างอื่นฉันก็คงหยวนๆ ให้ แต่ถ้าดุว่าทำเสียของ ฉันไม่ยอมปล่อยผ่านไปหรอกนะคะ!"
10040120-9 = "นี่ไม่ใช่แค่การเล่นสนุกธรรมดาๆ นะคะ! นี่คือการทดลองเพื่อหาเครื่องดื่มสุดแหวกแนวที่ไม่เคย#nมีใครค้นพบมาก่อน..."
10040120-15 = "ยกมือขึ้นเหนือหัวซะดีๆ เลย"
10040120-16 = "ค่ะ"
10040120-18 = "แล้วเราจะทำยังไงกับเครื่องดื่มพวกนี้เหรอคะ?"
10040120-19 = "ถึงจะเสียดายแต่ก็ช่วยไม่ได้ ไว้จบปาร์ตี้แล้วคงต้องเอาไปทิ้งละนะ"
10040120-24 = "ยูกะจัง ฉันมีความคิดดีๆ อย่างหนึ่งค่ะ"
10040120-25 = "เครื่องดื่มที่โคยูกิจังกับมากิจังผสมขึ้นมาน่ะ ต่อให้สีจะไม่น่าพิศมัยสักเท่าไร แต่มันก็มาจากเครื่องดื่ม#nที่เราดื่มได้ งั้นก็ไม่น่าจะเป็นพิษเป็นภัยต่อร่างกายนะคะ..."
10040120-26 = "เรามาเล่นเกม Truth or Dare กัน แล้วให้เครื่องดื่มนี้เป็นบทลงโทษกันมั้ยคะ?"
10040120-27 = "เกม Truth or Dare เหรอ...?"
10040120-28 = "ใช่ค่ะ เกมนี้เราต้องเลือกระหว่างการตอบคำถามตามความจริงหรือเลือกการลงโทษค่ะ"
10040120-29 = "ถ้าตอบคำถามตามความจริงไม่ได้ ก็ต้องถูกลงโทษด้วยการดื่มเครื่องดื่มนี้... แบบนี้ก็จะไม่เป็นการเสียของ แล้วเราก็ยังสนุกกับเกมได้ด้วย ว่ายังไงล่ะคะ?"
10040120-30 = "ฉันเอาด้วยค่ะ! ฉันมีความลับที่อยากถามรุ่นพี่ยูกะอยู่เพียบเลย..."
10040120-31 = "โคยูกิ"
10040120-32 = "ค่ะ"
10040120-33 = "เฮ้อ... ถ้าจะเล่นเกมนี้ ฉันก็ไม่มีปัญหาอะไรหรอกนะ แต่ฉันไม่อยากเอาเครื่องดื่มนี้มาใช้ในเกมสนุกๆ น่ะสิ"
10040120-34 = "ทำแบบนี้ดูจะห่างไกลจากการสำนึกผิด แล้วฉันก็ไม่อยากดื่มอะไรที่สีน่าสยดสยองแบบนี้ด้วย..."
10040120-36 = "แต่การทิ้งของที่ยังใช้ได้อยู่โดยเปล่าประโยชน์เป็นสิ่งที่ยูกะเกลียดที่สุดเลยไม่ใช่เหรอคะ?"
10040120-37 = "ส่วนโคยูกิจังน่ะ เดี๋ยวฉันจะหาเวลาสั่งสอน 'อย่างจริงจัง' ให้เอง วันนี้ปล่อยผ่านไปก่อนเถอะค่ะ"
10040120-38 = "อ่า... ฉันขอโดนรุ่นพี่ยูกะดุไม่ได้เหรอคะ? แบบนั้นน่าจะดีกว่านะ"
10040120-39 = "แบบนั้นไม่ได้หรอกค่ะ~"
10040120-40 = "เฮ้อ... ฉันต้องเขียนพินัยกรรมไว้แล้วสินะ..."
10040120-42 = "ก็ได้ ถ้าพูดถึงขนาดนั้นก็ช่วยไม่ได้น่ะนะ"
10040120-43 = "ที่จริงฉันก็อยากเล่นเกม Truth or Dare ในปาร์ตี้ชุดนอนอยู่เหมือนกัน ยิ่งตอนนี้คุณครูก็ไม่อยู่ด้วย งั้นเราก็น่าจะถามตอบกันได้อย่างสบายใจละเนอะ..."
10040120-44 = "เอาละ งั้นก็มารวมตัวกันตรงนี้ให้ครบทุกคนเลยค่ะ"
10040120-45 = "กติกาก็ง่ายๆ ค่ะ คนที่ถูกชี้เป้าจะต้องเลือกตอบคำถามตามความจริง หรือไม่ก็เลือกถูกลงโทษด้วยการดื่มน้ำสีม่วงที่น่ากลัวนี้ จากนั้นก็ชี้เป้าต่อว่าจะถามใครค่ะ"
10040120-46 = "งั้นเรามาจับฉลากเลือกคนแรกที่จะได้ชี้เป้าเลยค่ะ!"
10040120-52 = "เอ๋ ฉันเหรอเนี่ย?"
10040120-53 = "ใช่ค่ะ งั้นก็เลือกถามใครก็ได้หนึ่งคนค่ะ เอาเป็นคำถามที่ตอบยากๆ นะคะ"
10040120-54 = "คำถามที่ตอบยากๆ งั้นเหรอ..."
10040120-58 = "จู่ๆ ฉันก็นึกอะไรจากการแฮ็กเมื่อไม่นานมานี้ได้น่ะ... โคยูกิ"
10040120-59 = "คะ... คะ?!"
10040120-60 = "ที่ผ่านมาเธอแฮ็กเซิร์ฟเวอร์ของมิลเลเนียมไปหลายครั้งเลยใช่มั้ย? จากข้อมูลล่าสุดในเซิร์ฟเวอร์ มีล็อกที่น่าสงสัยอยู่เยอะเลยด้วย"
10040120-61 = "อ่า... จำไม่ได้ค่ะ"
10040120-63 = "เอาละ เครื่องดื่มลงโทษหนึ่งช็อต"
10040120-65 = "คะ? เดี๋ยวก่อนค่ะ! ฉันไม่ได้พูดโกหกนี่คะ? ฉันก็แค่ตอบไปตามจริงว่าจำไม่ได้ ฉันพูดความจริงนะคะ!"
10040120-66 = "ฉันเข้าเซิร์ฟเวอร์ทุกครั้งเวลาต้องการข้อมูลอะไร แล้วจะให้ไปจำทุกครั้งได้ยังไงหมดล่ะคะ?"
10040120-67 = "แฮ็กบ่อยเสียจน... จำไม่ได้เลยงั้นเหรอ?"
10040120-68 = "โนอา พรุ่งนี้ช่วงเช้าขอฉันคุยกับโคยูกิหน่อยได้มั้ย? ฉันเพิ่งนึกได้ว่ามีเรื่องอยากถามอย่างจริงๆ จังๆ เกี่ยวกับการรักษาความปลอดภัยของเซิร์ฟเวอร์น่ะ"
10040120-70 = "ค่ะ ฉันจะจองห้องประชุมที่เก็บเสียงไว้ให้นะคะ"
10040120-71 = "เดี๋ยวสิ ไหนว่าให้พูดตามความจริงก็พอไงคะ? ทำไมฉันถึงได้โทษอื่นเพิ่มล่ะ?"
10040120-72 = "ก็เพราะว่านี่เป็นบทลงโทษส่วนตัวของโคยูกิจังที่ไม่เกี่ยวกับการเล่นเกมนี้ยังไงล่ะคะ"
10040120-73 = "เอาละ โคยูกิจัง ชี้เป้าคนต่อไปที่อยากถามคำถามได้เลยค่ะ"
10040120-74 = "อึก... ถ้างั้นก็ รุ่นพี่โนอา!"
10040120-76 = "ตอนนี้ใส่ชุดชั้นในสีอะไรคะ? ถ้าไม่ตอบภายใน 3 วินาที ก็ต้องดื่มเครื่องดื่มลงโทษ..."
10040120-77 = "ตอนนี้ฉันใส่ชุดชั้นในลูกไม้สีขาว เป็นชุดชั้นในที่ฉันชอบเพราะใส่สบายค่ะ"
10040120-78 = "ตอบทันทีเลยเหรอ!? ไม่เขินหรือใช้เวลาคิดหน่อยเลยเหรอคะ?"
10040120-79 = "ทำไมถึงคิดว่าโนอาจะเขินกับคำถามแบบนั้นนะ..."
10040120-80 = "งั้นต่อไปก็เป็นตาฉันใช่มั้ยคะ..."
10040120-81 = "ยูกะจัง~?"
10040120-82 = "อะ... อะไรน่ะ จะถามฉันเหรอ?"
10040120-83 = "ใช่ค่ะ ฉันสงสัยอะไรอย่างหนึ่งมานานแล้วน่ะค่ะ"
10040120-87 = "ยูกะจัง... คิดยังไงกับคุณครู [USERNAME] เหรอคะ?"
10040120-94 = "จะ... จู่ๆ ก็ถามอะไรเนี่ย?!"
10040120-98 = "ถะ... ถามแบบนั้นมันตอบยากนะ..."
10040120-99 = "แน่นอนว่าฉันไม่ได้ไม่ชอบครู แต่การตอบต่อหน้าคนมากมายแบบนี้มัน..."
10040120-100 = "ค่ะ ถ้างั้นก็เชิญดื่มเครื่องดื่มลงโทษค่ะ!"
10040120-101 = "อึก... ช่วยไม่ได้สินะ"
10040120-106 = "นี่มันรสชาติอะไรกันเนี่ย? ทั้งขมและเปรี้ยว เนื้อสัมผัสก็เหนียวๆ... รู้สึกเหมือนลิ้นจะชาขึ้นมาเลย"
10040120-107 = "ตั้งใจเลือกฉันแล้วถามคำถามแบบนั้นงั้นเหรอ โนอา ฉันไม่ปล่อยเธอไว้แน่!"
10040120-108 = "ฮุฮุ นี่เป็นแค่เกมเองนะคะ อย่าจริงจังให้มันมากเกินไปเลยค่ะ"
10040120-109 = "เอาละค่ะ ยูกะจัง ถ้างั้นก็เลือกคนที่จะถามได้เลยค่ะ"
10040120-110 = "มากิ ล่าสุดไปวาดกราฟิตี้ไว้ที่ไหน?"
10040120-111 = "กราฟิตี้เหรอ? อันล่าสุดน่าจะเป็นกำแพงฝั่งเหนือของโรงไฟฟ้านะ ฉันไปวาดรูปสายฟ้าขนาดใหญ่ไว้#nที่นั่นเมื่อสัปดาห์ก่อน..."
10040120-112 = "ว่าไงนะ?! อันสุดท้ายไม่ใช่กราฟิตี้ที่ห้องสมุดหรอกเหรอ?"
10040120-113 = "อ๊ะ เผลอสารภาพไปจนได้...!"
10040120-115 = "เฮ้อ..."
10040120-120 = "(จากนั้นเกม Truth or Dare ก็ดำเนินต่อไปจนถึงดึกดื่น...)"
10040120-121 = "(แต่เพราะอะไรกัน...)"
10040120-123 = "รุ่นพี่ยูกะ ตอนไปเข้าเวรที่ชาเล่ต์คราวก่อน รุ่นพี่กลับมาดึกดื่นเลย... เกิดเรื่องอะไรระหว่างรุ่นพี่กับ#nคุณครูงั้นเหรอ?"
10040120-124 = "ระ... เรื่องนั้น... มันเป็นงานของชาเล่ต์ ฉันบอกไม่ได้หรอก!"
10040120-129 = "ฉันสงสัยเรื่องที่คุยกับคุณครู [USERNAME] ที่หน้าโคกิทาวน์เมื่อสัปดาห์ที่แล้วค่ะ"
10040120-130 = "ทำ... ทำไมถึงรู้เรื่องนั้นด้วยล่ะ?! ไม่เอา ไม่ตอบ!"
10040120-135 = "ตอนยูกะจัดการใบเสร็จของชาเล่ต์ ได้ยินว่ามีใบเสร็จส่วนตัวของคุณครู แล้วยูกะก็หยวนๆ ให้ด้วย นั่นเป็นความจริงหรือเปล่า?"
10040120-136 = "เดี๋ยวก่อน ฉันโดนถามอีกแล้วเหรอ?"
10040120-141 = "รุ่นพี่ยูกะ!"
10040120-142 = "ยูกะ"
10040120-143 = "ยูกะจัง~"
10040120-148 = "ทำไมทุกคน..."
10040120-149 = "มารุมถามแต่ฉันเนี่ย!"
10040120-151 = "(แล้วยูกะก็เป็นคนที่ต้องดื่มเครื่องดื่มลงโทษเสียส่วนใหญ่...)"

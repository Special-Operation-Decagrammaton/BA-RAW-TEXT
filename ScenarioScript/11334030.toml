[translation]
11334030-1 = "狀態;集體催眠（１）"
11334030-4 = "我來了～#n大家都已經到了……啊？"
11334030-5 = "……怎，怎麼回事，現在是什麼情況！？#n為什麼所有人都倒在地上啊！？"
11334030-6 = "不，不行了……再也……撐不下去了……"
11334030-7 = "油盡燈枯……這是現在最能形容我的詞彙了……"
11334030-8 = "呃，呃呃……"
11334030-9 = "這兩個傢伙就算了，竟然連愛莉也……！？到底發生了什麼事！？"
11334030-10 = "……怎麼若無其事地說那種沒禮貌的話啊。"
11334030-11 = "啊哈哈……"
11334030-12 = "有餘力批評別人，不如施捨點恩惠吧……"
11334030-13 = "少女啊，你是否具備那樣的慈悲呢？#n還是說你只是個以他人不幸為樂的惡人……"
11334030-17 = "……唉。"
11334030-18 = "雖然沒料到這種情況……不過我確實有感覺大家都快到極限了。"
11334030-22 = "……先吃點東西再繼續吧？"
11334030-23 = "……！！"
11334030-24 = "千紗醬……！"
11334030-25 = "哦～！！怎麼，你的心思意外還挺細膩的嘛！！！開始對你刮目相看了！！"
11334030-27 = "就只有這種時候會誇獎我。"
11334030-28 = "……等等。"
11334030-29 = "這樣的話……"
11334030-30 = "……嗯？千紗醬？"
11334030-31 = "啊，不，沒什麼大不了的……"
11334030-32 = "…………"
11334030-34 = "說不定這會是個提振士氣的好方法……"

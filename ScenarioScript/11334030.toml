[translation]
11334030-1 = "สภาพร่างกาย;สะกดจิตหมู่ 1"
11334030-4 = "ฉันมาแล้ว! ทุกคนมาถึงกันก่อนแล้วเหรอ...?"
11334030-5 = "นะ... นี่มันอะไรกันน่ะ? ทำไมลงไปนอนหมดแรงที่พื้นกันอย่างนั้น!?"
11334030-6 = "มะ... ไม่ไหวแล้ว... ให้เล่นต่อ... ไม่ไหวแล้ว..."
11334030-7 = "แบตเหลือศูนย์แล้ว คงไม่มีคำไหนอธิบายสภาพของฉันได้ดีกว่านี้แล้วละ"
11334030-8 = "อึกกก..."
11334030-9 = "ยัยสองคนนี้จะบ่นแบบนั้นก็ไม่แปลก แต่ไอริก็เป็นไปกับเขาด้วยเหรอเนี่ย!? นี่มันเรื่องอะไรกัน!?"
11334030-10 = "กล้าถามนะ ตัวเองเพิ่งมาซ้อมแท้ๆ..."
11334030-11 = "แหะๆๆ..."
11334030-12 = "ถ้ามีแรงมาถามคนอื่นอยู่ละก็ เอาแรงแบบนั้นมาเมตตาคนอื่นเถอะ..."
11334030-13 = "แม่หนู เธอมีความเมตตาแบบนั้นรึเปล่า... หรือว่าเธอเองก็เป็นคนร้ายที่มาเหยียบย่ำความทุกข์ของ#nคนอื่น..."
11334030-17 = "เฮ้อ..."
11334030-18 = "เห็นพักนี้ขยันซ้อมกันมากก็จริง แต่ไม่คิดเลยนะว่าจะหักโหมจนลงไปนอนกองกันแบบนั้น... ทุกคนคงจะหมดแรงกันแล้วสินะ"
11334030-22 = "งั้นกินอะไรกันก่อนแล้วค่อยเริ่มซ้อมใหม่มั้ย?"
11334030-23 = "...!!"
11334030-24 = "คาซึสะจัง...!"
11334030-25 = "โอ้ว~!! อะไรกันเนี่ย! คิดไม่ถึงเลยนะว่าจะมีเซนส์ขนาดนี้!! ฉันต้องมองเธอใหม่แล้วละ!!"
11334030-27 = "ชมกันแค่ตอนนี้ละนะ"
11334030-28 = "เดี๋ยวนะ... หืม...?"
11334030-29 = "บางทีนี่อาจจะ..."
11334030-30 = "หืม...? มีอะไรเหรอคาซึสะจัง?"
11334030-31 = "ปะ... เปล่าหรอก มันไม่ใช่เรื่องมากมายอะไร..."
11334030-32 = "......"
11334030-34 = "แต่ก็อาจทำให้ทุกคนมีแรงขึ้นอีกหน่อยนะ..."

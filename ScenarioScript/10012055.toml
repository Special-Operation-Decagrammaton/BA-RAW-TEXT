[translation]
10012055-5 = "นะ... นึกว่าต้องตายซะแล้ว จริงๆ นะ..."
10012055-6 = "หวุดหวิดมากเลยนะคะ☆"
10012055-7 = "ถ้าอายาเนะไม่ช่วยใส่ข้อมูลให้ละก็ เราคงจะขวางกลุ่มที่ 4 ไว้ไม่ไหว"
10012055-9 = "แหะๆๆ..."
10012055-11 = "ลุงเองก็จำไม่ได้แล้วว่าไม่ได้เผชิญหน้ากับอีกฝั่งที่มีมากมายขนาดนี้มานานแค่ไหนแล้ว"
10012055-12 = "ขอบคุณนะครู เรารอดมาได้เพราะได้ครูสั่งการเลยนะ"
10012055-13 = "[s1] \"ไม่ต้องขอบใจหรอก\"\n[s2] \"พวกเธอต่างหากล่ะที่พยายามกันเต็มที่\""
10012055-16 = "ไหนๆ ตอนนี้เราก็ได้ทั้งระบบรักษาความปลอดภัยและลงทะเบียนประวัติแล้ว..."
10012055-17 = "จากนี้เราก็คงได้รับการคุ้มกัน..."
10012055-18 = "หืม...? เอ๊ะ เอ๋? รู้สึกเหมือนมีอะไร..."
10012055-19 = "อึก... อึ้กกก อะ... อะไรเนี่ย..."
10012055-20 = "ทำไมจู่ๆ พวกหุ่นยนต์... ก็เข้ามาโจมตีแบบไม่มีปี่ไม่มีขลุ่ย... แอ่ก..."
10012055-21 = "ฉันกลับบ้านดีกว่า... สู้ต่อไม่ไหวแล้ว..."
10012055-25 = "น่าจะเป็นพวกแก๊งหมวกกันน็อกที่ยังหลงเหลืออยู่แถวนี้นะคะ"
10012055-32 = "โอ้ว..."
10012055-34 = "ระบบประสิทธิภาพดีเยี่ยมไปเลย..."

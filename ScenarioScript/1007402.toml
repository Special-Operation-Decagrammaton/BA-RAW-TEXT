[translation]
1007402-1 = "今天並不危險"
1007402-2 = "（花子所說的地方是島嶼深處的森林）"
1007402-3 = "（是個能感受到溫暖陽光與柔和微風，既奇特又怡人的地方）"
1007402-4 = "哎呀，老師。#n來的比想像中還快呢。"
1007402-9 = "呵呵，明明不用這麼急也沒關係的……"
1007402-10 = "……嗯？"
1007402-11 = "老師，怎麼了嗎？#n看起來好像有點緊張……"
1007402-12 = "[s1]「沒，沒有啦！」\n[s2]「你手上拿的是什麼？」"
1007402-15 = "啊啊，你說這個嗎？只是普通的水果而已唷。#n各種水果似乎都能在這座島上結果……很不可思議對吧？"
1007402-16 = "請看，老師。#n有香蕉、水蜜桃，還有草莓……"
1007402-17 = "呵呵，還有這麼大的西瓜呢……"
1007402-18 = "……老師？"
1007402-19 = "[s3]「哦，哦哦，嗯，真的耶。」\n[s4]「因為那些水果的種類，我想說該不會……」"
1007402-25 = "……啊啊。"
1007402-26 = "啊……哈……呵呵。#n原來是這樣啊。"
1007402-27 = "唔嗯……總覺得有點抱歉。#n之前好像也發生過類似的情況……"
1007402-28 = "我知道老師在擔心什麼，但這次不會有事的。"
1007402-29 = "不，與其說「這次」……應該說「這裡」比較正確吧？"
1007402-30 = "總之不必擔心。#n因為這裡不會發生「那種事」，而且現在……並不是「平時」。"
1007402-31 = "……嗯？"
1007402-32 = "跟平時有什麼差異是嗎？#n當然有，首先這裡並不是三一──而且除了我們之外誰也不在。"
1007402-33 = "因此，就算在這種地方讓老師為難……也沒什麼意思對吧？"
1007402-34 = "[s5]「原來那才是你在意的部分啊……」\n[s6]「原來你有會讓別人困擾的自覺啊……」"
1007402-37 = "這都是老師的錯唷？#n我明明已經清楚警告過了。"
1007402-38 = "無視我的警告，堅持深入內部的……是老師，沒錯吧。"
1007402-39 = "當然，這點反而讓我對老師──"
1007402-43 = "……呵呵。"
1007402-44 = "[s7]「花子？」\n[s8]「你是不是有想說的話沒說完……？」"
1007402-47 = "唔呵呵。#n總之，正如當時所說的，這點程度……還請老師網開一面。"
1007402-48 = "我只是……不希望這種舒適的感覺被打擾而已。"
1007402-49 = "在這裡──我可以不必在意其他人怎麼看我，以及想要我做什麼。"
1007402-50 = "要像這樣……盡情展露內心也完全不成問題。"
1007402-51 = "如果小春醬和憂同學也在的話，應該能用這些水果來聊些有趣的事……"
1007402-52 = "但很可惜，現在這裡只有老師和我兩個人……所以請別擔心。"
1007402-53 = "還是說……老師……"
1007402-54 = "其實老師心裡比較希望看見「平時」的我嗎？#n如果是的話真不好意思，我似乎不識趣地說了些奇怪的話……"
1007402-55 = "要立刻回應老師的期待也──"
1007402-56 = "[s9]「不，不用！現在這樣就很好了！」\n[s10]「沒關係，拜託你維持現在這個樣子吧……」"
1007402-59 = "……呵呵。"
1007402-60 = "我明白了，那麼……"
1007402-64 = "……一起回去吧？#n可以請老師幫我拿一些水果嗎？"
1007402-69 = "（之後，替花子拿著他帶來的水果回到了營地……）"
1007402-70 = "（然而一回到營地，花子就用手和水果讓大家感到相當為難……）"

[translation]
1007402-1 = "#title;오늘은 위험하지 않습니다"
1007402-2 = "#na;(하나코가 말해준 장소는 섬 깊숙한 곳의 숲이었다.)"
1007402-3 = "#na;(햇볕은 따듯하지만 바람은 시원한, 특이하면서도 기분 좋은 곳이었다.)"
1007402-4 = "#na;???;어라, 선생님. 생각보다 빨리 와주셨군요."
1007402-5 = "#st;[0,0];instant;1;"
1007402-6 = "#clearST"
1007402-7 = "#wait;2000"
1007402-8 = "3;하나코 수영복;01\n#3;greeting\n#3;a\n#3;em;[음표]\n#wait;1500"
1007402-9 = "3;하나코 수영복;03;후후. 이렇게 서두르지는 않아 주셔도 됐을 텐데……."
1007402-10 = "3;하나코 수영복;01;……음?\n#3;em;[?]"
1007402-11 = "3;하나코 수영복;01;선생님? 왜 그러시나요? 어딘가 조금 긴장하신 듯한 느낌이……."
1007402-12 = "[s1] \"따, 딱히 그런 건 아닙니다만!\"\n[s2] \"손에 든 그것들은 뭐야?\""
1007402-13 = "#wait;100"
1007402-14 = "#wait;100"
1007402-15 = "3;하나코 수영복;02;아, 이거요? 이건 그저 과일들이에요. 여기는 다양한 기후의 과일들이 뒤섞여 열매 맺고 있더라고요.\n#3;em;[반응]"
1007402-16 = "3;하나코 수영복;01;참 신기한 곳이죠. 여기 보세요, 선생님. 이건 바나나고, 이건 복숭아. 이건 딸기……."
1007402-17 = "3;하나코 수영복;99;과일 말고 수박도 있었고……. 또 튼실한 것들이 가득…….\n#3;em;[하트]"
1007402-18 = "3;하나코 수영복;07;……? 선생님?"
1007402-19 = "[s3] \"어, 어어. 응. 그러네.\"\n[s4] \"과일의 라인업 때문에……. 혹시나 해서.\""
1007402-20 = "#st;[0,0];instant;1;"
1007402-21 = "#st;[0,0];instant;1;"
1007402-22 = "#clearST"
1007402-23 = "3;하나코 수영복;07\n#3;em;[?]\n#wait;1500"
1007402-24 = "3;하나코 수영복;01\n#3;em;…\n#wait;2500"
1007402-25 = "3;하나코 수영복;02;……아아.\n#3;em;[전구]"
1007402-26 = "3;하나코 수영복;04;아……하……. 후후. 그런 거였군요.\n#3;stiff"
1007402-27 = "3;하나코 수영복;04;으음……. 이거 뭔가 죄송하네요. 전에도 비슷한 상황이 있었던 것 같은데…….\n#3;em;[땀]"
1007402-28 = "3;하나코 수영복;01;선생님께서 무슨 걱정을 하시는지는 알겠지만, 이번에는 괜찮답니다."
1007402-29 = "3;하나코 수영복;99;아니, '이번에는'이 아니라……. '여기서는'이려나요?\n#3;em;…"
1007402-30 = "3;하나코 수영복;01;아무튼 그렇답니다. 여기선 '그런 일' 없을 테니까요. 지금은……. '평상시'가 아니니까요."
1007402-31 = "3;하나코 수영복;02;……네?\n#3;em;[?]"
1007402-32 = "3;하나코 수영복;02;평상시와는 특별한 차이가 있냐고요? 물론 있죠. 우선 여기는 트리니티가 아니잖아요? 딱히 보는 눈도 없고요."
1007402-33 = "3;하나코 수영복;03;그런 곳에서 굳이 선생님을 곤란하게 만들어도……. 별 의미는 없지 않을까요?\n#3;em;[음표]"
1007402-34 = "[s5] \"거기에 의미를 두는 타입이었구나.\"\n[s6] \"역시 곤란하게 한다는 자각은 있었구나.\""
1007402-35 = "#wait;100"
1007402-36 = "#wait;100"
1007402-37 = "3;하나코 수영복;01;그렇지만 이건 다 선생님 탓이니까요? 전 분명히 경고했었다고요."
1007402-38 = "3;하나코 수영복;99;그 경고를 깨고 제 안쪽으로 깊이 들어오신 건 선생님이시죠."
1007402-39 = "3;하나코 수영복;02;물론 그 부분에 있어서는, 전 오히려 선생님께……."
1007402-40 = "#st;[0,0];instant;1;"
1007402-41 = "#clearST"
1007402-42 = "3;하나코 수영복;02\n#3;em;…\n#wait;2500"
1007402-43 = "3;하나코 수영복;03;……후후.\n#3;em;[하트]"
1007402-44 = "[s7] \"하나코?\"\n[s8] \"뭔가 말을 하려다 말았다?\""
1007402-45 = "#wait;100"
1007402-46 = "#wait;100"
1007402-47 = "3;하나코 수영복;01;후후후. 아무튼 그때도 말씀드렸듯 이런 정도는……. 감당해 주시기로 했으니까요.\n#3;em;…"
1007402-48 = "3;하나코 수영복;07;게다가 저도, 지금 같은 편함은……. 그다지 방해받고 싶지 않고 말이에요."
1007402-49 = "3;하나코 수영복;99;여기선 다른 누군가가 저를 어떻게 생각할지, 저에게 뭘 원하는지 굳이 신경 쓰지 않아도 되고."
1007402-50 = "3;하나코 수영복;01;반대로 지금처럼, 원하는 걸 직접 표현해도 문제 될 게 전혀 없죠."
1007402-51 = "3;하나코 수영복;02;코하루 쨩이나 우이 씨라도 있었다면, 이 과일들을 가지고 재미있는 이야기를 좀 해볼 수도 있었겠지만…….\n#3;em;[하트]"
1007402-52 = "3;하나코 수영복;99;아쉽게도 지금은 선생님과 저뿐이니까요. 그러니 걱정하지 않으셔도 돼요."
1007402-53 = "3;하나코 수영복;99;아니, 그게 아니라면……. 어쩌면 선생님…….\n#3;em;…"
1007402-54 = "3;하나코 수영복;06;내심 그런 '평소 같은 반응'을 바라셨던 걸까요? 죄송해요. 그러신 거라면 제가 또 눈치 없이 이상한 소릴 한 걸 수도……."
1007402-55 = "3;하나코 수영복;05;지금이라도 기대에 응해 드려야…….\n#3;em;[반응]"
1007402-56 = "[s9] \"아니, 아니! 지금대로가 좋아!\"\n[s10] \"괜찮습니다. 제발 이 상태로 쭉 부탁합니다.\""

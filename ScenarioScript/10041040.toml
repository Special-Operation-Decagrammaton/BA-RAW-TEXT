[translation]
10041040-1 = "ตอนที่ 4;ที่เล่นเกมแห่งความโกรธ"
10041040-4 = "ฟิตเนสเซ็นเตอร์... จุดต่อไปที่จะเกิดปัญหาก็คือที่นั่นใช่มั้ยคะ?"
10041040-5 = "เข้าใจแล้วค่ะ ฉันจะรีบไปรีบมาค่ะ"
10041040-9 = "ไม่ งานในครั้งนี้แตกต่างออกไป..."
10041040-10 = "ฉันตั้งใจว่าจะมอบหมายงานอื่นให้คุณน่ะ ครั้งนี้... เนรุจะเป็นคนไปที่ฟิตเนสเซ็นเตอร์"
10041040-14 = "คะ...?"
10041040-19 = "หืม? ฉันเหรอ? ไม่ใช่ยัยนั่นหรอกเหรอ?"
10041040-21 = "ทำไมล่ะคะ? พวกคุณบอกว่าต้องเคลื่อนไหวอย่างเป็นความลับไม่ใช่หรอกเหรอคะ?"
10041040-22 = "ที่สาธารณะที่เต็มไปด้วยผู้คนอย่างฟิตเนสเซ็นเตอร์น่ะ ฉันว่าให้ฉันไปน่าจะเหมาะสมกว่านะคะ"
10041040-26 = "มีเหตุผลอะไรที่ต้องให้คุณเนรุไปแทนฉันเหรอคะ? ช่วยบอกหน่อยได้มั้ยคะ?"
10041040-27 = "ให้เนรุไปเหมาะสมที่สุดแล้ว"
10041040-29 = "ริโอะ...?"
10041040-31 = "เหตุผลก็ง่ายๆ มันเป็นปัญหาเรื่องความปลอดภัยน่ะ"
10041040-32 = "ปัญหาเรื่องความปลอดภัย?"
10041040-36 = "หากการวิเคราะห์และคาดการณ์ของฉันถูกต้อง แผนการของคนพวกนั้นที่ฟิตเนสเซ็นเตอร์ยังไม่เสร็จ#nสมบูรณ์ดี นั่นก็แปลว่ายังมีการเคลื่อนไหวอยู่"
10041040-37 = "และก็หมายความว่ายังมีคนหลงเหลืออยู่ที่นั่น... และถ้าจำเป็นละก็ คงต้องเกิดการต่อสู้ขึ้นอย่างหลีก#nเลี่ยงไม่ได้"
10041040-38 = "เพราะงั้นมันจึงเป็น 'ปัญหาเรื่องความปลอดภัย' ยังไงล่ะ ฉันจะส่งใครก็ได้ไปไม่ได้หรอก ยิ่งคุณไม่ใช่ทั้งนักเรียนมิลเลเนียม และไม่ใช่นักเรียนธรรมดาๆ ด้วย"
10041040-39 = "ถ้าเกิดปัญหาอะไรที่นั่น คุณคงช่วยเหลืออะไรในสถานการณ์นั้นไม่ได้หรอก ยูริโซโนะ เซอา"
10041040-40 = "ไม่สิ ถ้าจะให้พูดตรงๆ เลยละก็ ฉันว่าไม่มีคุณไปด้วยจะดีกว่า"
10041040-46 = "ไม่มีฉันคงดีกว่า..."
10041040-47 = "นี่ ริโอะ พูดแรงไปแล้วหรือเปล่า"
10041040-48 = "ฉันจะช่วยอะไรไม่ได้... งั้นเหรอคะ..."
10041040-49 = "ต่อให้อยู่ที่นี่ ฉันก็ยังถูกตัดสินและเลือกปฏิบัติอยู่ดีสินะคะ"
10041040-50 = "('ต่อให้อยู่ที่นี่'...?)"
10041040-52 = "ฉันเสียใจด้วยนะ แต่ไม่ได้ก็คือไม่ได้ ทางนี้เองก็มีเรื่องที่ประนีประนอมให้ไม่ได้เหมือนกัน"
10041040-53 = "หากคุณได้รับบาดเจ็บขึ้นมาละก็ มันอาจนำไปสู่ปัญหาระหว่างโรงเรียนก็ได้"
10041040-54 = "ในเมื่อคุณบอกว่าจะช่วยเรา ก็ควรจะคำนึงถึงปัญหาในส่วนนั้นด้วยไม่ใช่เหรอ?"
10041040-59 = "..."
10041040-60 = "คุณสั่งให้ฉันไปหาสถานที่ที่น่าสงสัย แต่ส่วนที่ดูน่าสงสัยกลับไม่ให้ฉันไปข้องเกี่ยวเพราะมันอันตราย..."
10041040-61 = "คุณไม่คิดว่ามันขัดแย้งกันเหรอคะ?"
10041040-62 = "ความน่าสงสัยกับความเสี่ยง มันคือคนละเรื่องกัน"
10041040-63 = "แล้วถึงฉันจะบอกให้ช่วยหา 'สิ่งที่น่าสงสัย' ฉันก็ไม่เคยบอกให้ไปเผชิญหน้าหรือต่อสู้กับมัน ฉันแค่บอกว่า 'ถ้าเจอก็ขอให้มาบอก' เท่านั้นเอง"
10041040-64 = "ที่คุณพูดมาก็ไม่ผิดหรอกค่ะ..."
10041040-65 = "ฉันขอบคุณในความร่วมมืออยู่เสมอ แต่เป้าหมายสูงสุดของงานนี้ไม่ใช่การทำเพื่อคุณตั้งแต่แรกอยู่แล้ว"
10041040-66 = "ฉันคิดว่าคุณจะเข้าใจในส่วนนี้อยู่แล้วเสียอีก ถ้ารับไม่ได้ เราก็คงต้องหยุดความร่วมมือระหว่างกันไว้#nแค่ตรงนี้ละ"
10041040-71 = "ไม่ค่ะ ฉันเข้าใจแล้วค่ะ..."
10041040-72 = "ขอโทษค่ะ ฉันล้ำเส้นอีกแล้วสินะคะ"
10041040-73 = "นั่นสินะ นี่ไม่ใช่เรื่องที่ฉันควรจะดื้อรั้นแท้ๆ ฉันพลั้งปากไปแบบนั้นเพราะรู้สึกว่าโดนแย่งงานของตัวเอง#nไปน่ะค่ะ"
10041040-78 = "ฉันอยากให้คุณไปสำรวจส่วนอื่นในสถานที่จัดงานแล้วหาสิ่งที่น่าสงสัย"
10041040-79 = "และอย่างที่บอกไปก่อนหน้านี้ ถ้าเจออะไรก็ขอให้บอกฉัน และไม่ว่าจะในกรณีไหน ห้ามทำอะไรที่อยู่#nนอกเหนือคำสั่งของฉันเด็ดขาด นี่คือเงื่อนไขในความร่วมมือของเรา"
10041040-80 = "ค่ะ... เข้าใจแล้วค่ะ"
10041040-86 = "..."
10041040-88 = "ฉันจะไปสืบหาอย่างอื่นดูค่ะ... ถ้ามีเรื่องอะไรเกิดขึ้น ฉันจะแจ้งนะคะ"
10041040-89 = "ขอบใจนะ ฉันเองก็จะวิเคราะห์ข้อมูลอยู่ทางนี้ ถ้าเจอความคืบหน้าอะไรฉันจะติดต่อไปทันที"
10041040-90 = "ค่ะ... ขอบคุณค่ะ"
10041040-91 = "ถ้างั้นฉันขอตัวก่อน..."
10041040-96 = "..."
10041040-97 = "ต้องรีบแล้วละ..."
10041040-106 = "ทำอะไรน่ะ?"
10041040-107 = "ฉันกำลังวิเคราะห์ชิปที่ได้มาจากศูนย์ข้อมูล"
10041040-108 = "นอกจากการสำรวจสถานที่จัดงานอย่างคลุมเครือแล้ว ฉันคิดว่าการหาเบาะแสและเสนอเป้าหมายจาก#nทางนี้ก็น่าจะดีน่ะ"
10041040-109 = "...?"
10041040-110 = "อะไรกัน ไม่สมกับเป็นเธอเลย มาแอบใส่ใจอยู่ต่างหากเหรอ?"
10041040-111 = "ไม่ใช่อย่างนั้นหรอก"
10041040-112 = "ถ้ามีคนชมก็รับๆ ไปเถอะน่า"
10041040-116 = "นั่นเป็นคำชมเหรอ?"
10041040-117 = "โธ่เอ๊ย..."

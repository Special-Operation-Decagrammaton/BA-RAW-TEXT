10041040-78 = "3;리오;02;회장의 다른 부분을 찾으며, 수상한 점을 발견해 줬으면 해."
10041040-79 = "3;리오;01;그리고 이미 말했듯, 발견한 경우 모두 나에게 말해 주고, 어떤 경우에도 내 지시 외의 행동은 하지 말아줘. 이게 우리의 협력 조건이야."

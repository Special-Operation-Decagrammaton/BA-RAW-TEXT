10041040-18 = "3;네루 교복;17\n#3;em;[?]\n#3;h\n#3;a\n#wait;1000"
10041040-19 = "3;네루 교복;00;엉? 나? 쟤가 아니라?"
10041040-20 = "#all;hide"
10041040-21 = "5;리오;00\n1;세이아;04;어째서죠? 두 사람은 은밀하게 행동해야 한다고 하지 않았던가요."
10041040-22 = "1;세이아;99;그렇게 공개적이고 사람이 많은 장소를 살피는 건, 제 쪽의 일인 걸로 알고 있었는데요."
10041040-23 = "#st;[0,0];instant;1;"
10041040-24 = "#clearST"
10041040-25 = "5;리오;00\n1;세이아;00\n#1;h\n#5;h\n#1;m2\n#wait;1500"
10041040-26 = "1;세이아;05;굳이 제가 아니라 네루 씨를 보내는 이유가 있나요? 이유가 있다면, 들어볼 수 있을까요?"
10041040-27 = "5;리오;99;이쪽이 합당한 방법이야."
10041040-28 = "#all;hide"
10041040-29 = "3;네루 교복;05;……리오?\n#3;em;[?]"
10041040-30 = "#all;hide"
10041040-31 = "2;세이아;05\n5;리오;99;간단해. 안전상의 이슈야.\n#5;h"
10041040-32 = "2;세이아;00;안전상의 이유?"
10041040-33 = "#st;[0,0];instant;1;"
10041040-34 = "#clearST"
10041040-35 = "2;세이아;00\n5;리오;00\n#5;m3\n#2;dl\n#2;h\n#5;h\n#wait;1200"
10041040-36 = "5;리오;02;계산이 틀리지 않다면 피트니스 센터는 아직 대상의 공작이 완료되지 않았어, 즉 아직 일을 진행시키고 있는 중이라는 거지.\n#5;em;[반응]"
10041040-37 = "5;리오;00;그 말은 잔당이 남아 있다는 뜻이고……. 필요할 경우 전투도 불사할 수 있다는 뜻이야."
10041040-38 = "5;리오;99;따라서 문자 그대로 '안전상의 이유'가 있어. 가뜩이나 밀레니엄의 학생도 아닌, 그것도 일반 학생조차 아닌 사람을 보낼 순 없어."
10041040-39 = "5;리오;01;오히려 이슈 발생 시 그 자리에 유리조노 세이아, 당신은 그 상황에서 도움이 안 돼."
10041040-40 = "5;리오;02;아니, 엄밀히 말해 당신은 없는 편이 좋다는 거지."
10041040-41 = "#st;[0,0];instant;1;"
10041040-42 = "#clearST"
10041040-43 = "5;리오;02\n#5;d\n#wait;1200"
10041040-44 = "#all;hide"
10041040-45 = "3;세이아;05\n#3;em;…\n#3;a\n#3;h\n#wait;2500"
10041040-46 = "3;세이아;99;……없는 편이 좋다……."
10041040-47 = "5;네루 교복;00;어이, 리오. 말이 좀 지나치잖아.\n#5;em;[반응]\n#5;al\n#3;m1"
10041040-48 = "3;세이아;08;도움이 안 된다……. 그렇습니까……."
10041040-49 = "3;세이아;05;결국 저는 여기서도, 그런 취급을 벗어나지 못하는 거군요."
10041040-50 = "5;네루 교복;05;(……'여기서도'?)"
10041040-51 = "#all;hide"
10041040-52 = "3;리오;99;유감스럽게 생각하지만 안 되는 건 안 되는 거야. 이쪽도 물러설 수 없는 부분이 존재해."
10041040-53 = "3;리오;01;그 상황에서 만에 하나 그쪽이 다치기라도 한다면 이건 밀레니엄 전체의 이슈로 확산돼."
10041040-54 = "3;리오;02;우리를 돕겠다고 했으니, 그 부분에 대한 입장은 그쪽도 감수해야 하지 않겠어?"

[translation]
10041040-1 = "第4話;憤怒的遊戲場"
10041040-4 = "健身中心……這就是接下來可能會發生狀況的地點嗎？"
10041040-5 = "知道了，我現在馬上過去。"
10041040-9 = "……不，先等一下。"
10041040-10 = "我有別的事情要交給你去做。#n所以這次……健身中心那邊就交給寧瑠吧。"
10041040-14 = "……嗯？"
10041040-19 = "啊？要我去？不是他嗎？"
10041040-21 = "為什麼要這麼做？#n你們兩個不是都得暗中行動嗎？"
10041040-22 = "巡視這種人潮眾多的公開場所，不應該是我的工作才對嗎？"
10041040-26 = "特地指派寧瑠同學過去的原因是什麼？#n如果有什麼特別的理由，可以讓我知道嗎？"
10041040-27 = "這麼做才是最合理的。"
10041040-29 = "……莉央？"
10041040-31 = "理由很簡單。問題在於安全。"
10041040-32 = "安全？"
10041040-36 = "如果我的計算沒錯，對方目前應該還沒完成健身中心的準備。#n換句話說，那裡還在施工當中。"
10041040-37 = "代表那裡可能還有殘黨……有必要的時候，我們甚至得和對方交戰。"
10041040-38 = "所以我才會說這件事和「安全」有關。#n你既不是千年的學生，甚至不能算是普通學生，所以我不能派你過去。"
10041040-39 = "萬一真的發生了什麼狀況……百合園聖亞，你在那種場合中根本派不上用場。"
10041040-40 = "不，嚴格來說，你不在現場反而比較好。"
10041040-46 = "不在現場反而比較好……"
10041040-47 = "喂，莉央。這麼說有點過分了吧？"
10041040-48 = "我幫不上忙……你是這個意思嗎……"
10041040-49 = "原來我連在這裡都得遭受這樣的待遇啊。"
10041040-50 = "（……「連在這裡」？）"
10041040-52 = "雖然遺憾，但不行的事就是不行。#n我也有無法退讓的原則。"
10041040-53 = "要是你在那種情況下出了什麼意外的話，這件事很可能會演變成整個千年的問題。"
10041040-54 = "既然你說要協助我們，不就應該接受我們在這方面的立場嗎？"
10041040-59 = "…………"
10041040-60 = "明明是你叫我尋找可疑之處，現在卻又說那裡太危險了不要靠近……"
10041040-61 = "不覺得這很矛盾嗎？"
10041040-62 = "可疑和危險是不一樣的概念。#n嚴格來說兩者之間並沒有關聯。"
10041040-63 = "雖然我確實有請你尋找「可疑之處」──#n但我並沒有要求你處理或解決，而是要求你在「發現時通知我們」而已。"
10041040-64 = "……的確是這樣沒錯。"
10041040-65 = "我很感謝你願意協助我們，但這件事的最終目標本來就與你無關。"
10041040-66 = "我原本以為你也清楚這一點……#n假如你無法接受的話，恐怕我們的合作只能到此為止了。"
10041040-71 = "……不，我明白了。"
10041040-72 = "很抱歉，看來我似乎又越界了。"
10041040-73 = "你說的沒錯，是我不該在這種問題上固執己見。#n剛才是因為突然有種工作被搶走的感覺，所以才不小心說錯了話。"
10041040-78 = "我希望你能繼續走訪會場的其他地點，替我們搜尋可疑之處。"
10041040-79 = "還有就像剛才說的一樣，一旦發現任何異狀都要向我通報。#n除此之外，無論何時都請你別做出我指示外的行動──這就是我們繼續合作的條件。"
10041040-80 = "……嗯，我明白了。"
10041040-86 = "…………"
10041040-88 = "……我會繼續搜索其他地方。#n如果有什麼發現會馬上回報。"
10041040-89 = "謝謝。#n我會留在這裡繼續分析，假如有進展會立刻聯絡你們的。"
10041040-90 = "……嗯，謝謝你。"
10041040-91 = "那我就先走了……"
10041040-96 = "…………"
10041040-97 = "……我們得加快動作了。"
10041040-106 = "怎麼了嗎？"
10041040-107 = "我正在分析從資料中心帶回來的晶片。"
10041040-108 = "與其茫然地探索會場，我認為先以找出的線索為目標，對他來說應該也比較方便。"
10041040-109 = "……？"
10041040-110 = "真稀奇，這跟你平時的作風不太一樣啊。#n你這是在為他著想嗎？"
10041040-111 = "倒也沒有。"
10041040-112 = "你就不能乖乖接受稱讚嗎……"
10041040-116 = "那是稱讚嗎？"
10041040-117 = "我真受不了你……"

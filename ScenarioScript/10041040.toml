[translation]
10041040-1 = "Episode 4;The Raging Game Center"
10041040-4 = "...So the next potential flashpoint is...the Fitness Center."
10041040-5 = "Understood. I'll be there shortly."
10041040-9 = "...No, hold on."
10041040-10 = "I'm sending Neru to the Fitness Center. You'll handle a different task."
10041040-14 = "...What?"
10041040-19 = "Huh? Me? Not her?"
10041040-21 = "But...did you not say the two of you had to act in secret?"
10041040-22 = "I had assumed the public investigations would fall to me."
10041040-26 = "May I ask why you wish to send Neru instead?"
10041040-27 = "It's the most rational choice."
10041040-29 = "...Rio?"
10041040-31 = "Simply put, it's a safety issue."
10041040-32 = "A safety issue?"
10041040-36 = "Unless my calculations are wrong, the target's scheme at the Fitness Center is still in progress."
10041040-37 = "Meaning, whoever goes can expect enemy contact, and potentially combat."
10041040-38 = "Hence, the \"safety issue.\" I can't send a non-Millennium student into that, especially a student in your unique situation."
10041040-39 = "If there were a problem there, Yurizono Seia, you wouldn't be of much help."
10041040-40 = "In fact, it'd be better if you weren't there at all."
10041040-46 = "\"Better if I weren't there at all\"..."
10041040-47 = "Hey, Rio, that's going too far."
10041040-48 = "\"Wouldn't be of much help...\" I see..."
10041040-49 = "So I can't escape that kind of treatment, not even here..."
10041040-50 = "(...What does she mean by that?)"
10041040-52 = "Unfortunate, I know, but it's the unvarnished truth. There's no debating it."
10041040-53 = "If you go, and you get hurt in any way, it'll become an issue for all of Millennium."
10041040-54 = "If you want to help us, then please understand our perspective."
10041040-59 = "..."
10041040-60 = "You ask me to investigate anything suspicious, but you also ask me to stay away in case of danger."
10041040-61 = "Do you not see the contradiction?"
10041040-62 = "\"Suspicious\" and \"dangerous\" are two different things. Very different."
10041040-63 = "And I never asked you to fight or confront anyone, simply to report."
10041040-64 = "...Well, yes, I concede that point."
10041040-65 = "I do appreciate your help. But this job isn't yours. Not this part of it, at least."
10041040-66 = "I thought you already understood that. If you can't, then I'm sorry, but our cooperation ends here."
10041040-71 = "...No, I do understand."
10041040-72 = "My apologies. I overstepped again."
10041040-73 = "You're right. I should be more understanding. I felt as if my trusted role was being taken from me, and I...spoke out of turn."
10041040-78 = "It's all right. Now, search elsewhere in the venue and let me know if you find anything suspicious."
10041040-79 = "And, just to review the parameters one more time: tell me anything you find, and don't take any action outside of my instructions."
10041040-80 = "...Yes. Understood."
10041040-86 = "..."
10041040-88 = "...I will be in contact, then."
10041040-89 = "Good. I'm doing some analysis of my own here, so if I see anything, I'll call you."
10041040-90 = "...Very well. Thank you."
10041040-91 = "If you'll excuse me..."
10041040-96 = "..."
10041040-97 = "Now to hurry and get this done."
10041040-106 = "Get what done?"
10041040-107 = "I'm analyzing the chip from the Data Center."
10041040-108 = "If I can gather enough information, maybe I can give her a goal to pursue, instead of having her wander around aimlessly."
10041040-109 = "Hm?"
10041040-110 = "Huh, that's surprisingly thoughtful of you."
10041040-111 = "I'd call it practical rather than thoughtful."
10041040-112 = "Just learn to take compliments, seriously."
10041040-116 = "That was a compliment?"
10041040-117 = "For the love of..."

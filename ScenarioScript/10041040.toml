10041040-60 = "3;세이아;08;수상한 곳을 찾으라고 해 놓고, 수상해 보이는 부분은 위험하니까 가지 말라……."
10041040-61 = "3;세이아;00;말이 모순된다고 생각하지 않으시나요?"
10041040-62 = "3;리오;02;수상과 위험은 별개의 개념으로 진행하고 있어. 엄밀히 따지면 다른 이야기지.\n#3;em;[반응]"
10041040-63 = "3;리오;00;애초에 '수상한 것'을 찾는다고 해서 그것과 대치하거나 싸우라고 한 적도 없어. '발견하면 말해 달라'라고 했을 뿐."
10041040-64 = "3;세이아;99;……틀린 말은 아니네요."
10041040-65 = "3;리오;02;협조에는 감사하고 있어. 하지만 이 일의 궁극적인 목표는 애초부터 그쪽을 위한 게 아니야."
10041040-66 = "3;리오;01;그 부분은 납득하고 있을 줄 알았는데. 그걸 받아들일 수 없다면, 미안하지만 우리 협력 관계는 여기까지야."

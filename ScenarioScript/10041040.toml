10041040-71 = "3;세이아;99;……아닙니다, 이해했어요."
10041040-72 = "3;세이아;02;미안해요. 또 제가 선을 넘었었네요."
10041040-73 = "3;세이아;00;그러네요. 고집부릴 부분이 아닌데, 어째서인지 제 일의 일부를 뺏긴다는 생각이 들어 실언을 했어요."

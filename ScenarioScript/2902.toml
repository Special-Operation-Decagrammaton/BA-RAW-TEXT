[translation]
2902-1 = "於是少女們齊聚一堂（２）"
2902-2 = "哇，好厲害！"
2902-10 = "這裡就是傳說中的忍術研究部……！"
2902-12 = "……月夜，過來一下。"
2902-16 = "怎麼了……？"
2902-22 = "怎麼辦啊月夜！有個奇怪的人跑過來了！雖然長得是挺可愛的啦！"
2902-23 = "那個，有很，怪嗎……？"
2902-24 = "雖然自己不該這麼說，是「忍術研究部」唷？"
2902-25 = "居然對這種莫名其妙的社團提出「入部申請」，一般人會這麼做嗎？"
2902-26 = "當然很奇怪，比奇怪穿著衣服走在路上還奇怪！"
2902-27 = "可是，我也已經，加入了唷……？"
2902-28 = "月夜你不算！畢竟是我直接招募來的嘛！"
2902-29 = "確實，是這樣。"
2902-30 = "難道……是陰陽部或者百花繚亂派來的刺客之類的！？"
2902-34 = "不過看起來不像是那種壞孩子……！"
2902-35 = "雖然因為是第一次見到她，所以有點害怕，不過難得有人願意過來……"
2902-39 = "這或許是，"
2902-40 = "成為正式社團的第一步，也說不定……！"
2902-41 = "嗯……雖然想要新成員，不過連她是個怎樣的孩子都不知道就讓她加入也有點……"
2902-45 = "……好，我決定了。"
2902-49 = "進行面試吧！"
2902-51 = "面試……？"
2902-52 = "沒錯，那孩子究竟適不適合忍術研究部！就讓我來確認一下吧！"
2902-54 = "所以說，我想進行面試……那個，伊樹菜同學？怎樣，可以吧？"
2902-55 = "原來如此，如果只是個半吊子可能會妨礙忍者的任務……是這麼回事吧！"
2902-56 = "伊樹菜完全沒問題！"
2902-57 = "呃……？那，那就好。"
2902-58 = "啊，對了月夜。畢竟是我們難得的客人，可以拿點飲料過來嗎？"
2902-59 = "是……！"
2902-67 = "呃，那個……"
2902-73 = "我拿，飲料，來了……！"
2902-75 = "嗯，謝謝！"
2902-80 = "雖然不成敬意，那個，請用……！"
2902-82 = "非常感謝！忍忍！"
2902-83 = "哇……那句話，我說不定是第一次實際聽到……！"
2902-84 = "啊，不好意思，那個……這裡沒有茶水之類的，真的非常抱歉……"
2902-85 = "只是普通的自來水而已，那個，對不起……"
2902-86 = "原來如此，這就是用來招待客人的水……"
2902-87 = "啊，對不起……！明明是難得的客人，卻只能喝水……！？"
2902-88 = "我們沒有想要，找碴的意思……！我們就連，茶葉之類的東西，都沒有，那個……！"
2902-89 = "因為沒有，社團經費……"
2902-91 = "沒，沒關係的！"
2902-92 = "自來水也是多虧有整備水道這個系統的人們才能實現的，了不起的飲料！#n所以沒關係！大概！"
2902-93 = "抱歉，我不太能，理解……！"
2902-95 = "……原來如此！"
2902-96 = "咦？"
2902-97 = "……？"
2902-98 = "伊樹菜，在忍者的時代劇裡有看過類似的東西！"
2902-99 = "真正的忍者，只要有水就夠了……！不應該追求更多的享受！"
2902-100 = "居然一直都在日常生活中實踐，比我聽到的傳聞還厲害……這就是忍術研究部嗎！#n伊樹菜，非常感動！"
2902-101 = "……是，是這樣嗎？"
2902-102 = "那個，總之我們進入主題吧……"
2902-103 = "伊樹菜同學是怎麼知道我們的呢？"
2902-104 = "雖然自己這麼說有點不好意思，但這間部室……就算在百鬼夜行也是相當偏僻吧？"
2902-105 = "交通既不方便，附近也沒什麼設施……"
2902-106 = "（雖然這也是為了不被百花繚亂或陰陽部發現，所以別無選擇……）"
2902-108 = "是呢，附近不方便，往來也很麻煩……如果錯過公車的話，就連去學校都很辛苦……"
2902-109 = "偶爾還會斷電斷水……離便利商店，也非常遠……"
2902-110 = "月夜，難道你一直都在忍耐嗎！？"
2902-111 = "可是，是個好地方……！"
2902-112 = "到了晚上，能看到很多星星……因為很安靜，要進行忍術拍攝，也很方便……！"
2902-113 = "也對，不會被投訴是個優點呢。"
2902-114 = "我自創的「忍法．閃亮亮火焰之術」之類的，#n如果附近有人在的話應該會被投訴的……"
2902-116 = "自，自創的忍術……！！"
2902-117 = "？"
2902-118 = "啊，那個，是能找到這裡的理由對吧！伊樹菜，找到了這個！"
2902-122 = "那是……"
2902-126 = "啊，我想起來了！是我大約半年前製作的宣傳單！"
2902-127 = "寫在這張傳單上的暗號，和柴犬汪藏導演的代表作《帶犬忍者》裡出現的一樣對吧？"
2902-128 = "咦，居然注意到了嗎！？"
2902-129 = "真是，厲害呢……！"
2902-131 = "（確實，能看得懂那個暗號就代表我們喜歡同一種電影……#n　雖然我就是為此才這麼設計的……）"
2902-132 = "（因為看了那張傳單而找上門的，#n　目前為止只有來說「不要亂貼這種東西」的百花繚亂的人，我還以為失敗了呢……）"
2902-133 = "（難道，這孩子……！？）"
2902-135 = "……呵呵，有一套呢！那麼就進入第二個問題吧。"
2902-136 = "這或許會是最重要的問題……"
2902-137 = "啊，是！"
2902-138 = "伊樹菜同學想加入「忍術研究部」的理由，希望你能告訴我。"
2902-139 = "啊……"
2902-140 = "是因為伊樹菜……想要像忍術研究部的各位一樣，成為優秀的忍者！"
2902-141 = "像我們一樣……？"
2902-142 = "咦……？"
2902-143 = "「少女忍法帖 小小三千留」頻道！"
2902-144 = "那部「看吧，連岩石都能擊碎的超絕忍術！」的影片，伊樹菜看了之後非常感動！"
2902-145 = "那是……"
2902-146 = "是我們頻道裡，最受歡迎的，那部影片……！"
2902-147 = "原來如此，那部影片確實拍的不錯呢。"
2902-149 = "（雖然只是事前把石頭弄得很薄，然後抓準時間把炸藥爆炸的畫面疊上去而已……#n　是因為視覺效果很華麗嗎，這麼說來確實挺受歡迎的呢）"
2902-150 = "（這樣啊……他有在看我們的頻道啊）"
2902-151 = "（因此成為我們的粉絲，因為想變得像我們一樣才想加入忍術研究部嗎……？）"
2902-153 = "……咦，等等。那麼說來伊樹菜同學……有訂閱我們的頻道嗎！？"
2902-154 = "是的！"
2902-155 = "部長……！真的有訂閱的人，我還是第一次遇到……！"
2902-160 = "怎麼辦，要拍張照嗎……！？像是天然紀念物一樣……！？"
2902-161 = "不不不，別把人家說的像槌之子一樣！#n我們的訂閱者也不少，這不是什麼不得了的狀況吧！雖然很開心！"
2902-162 = "看了那部影片之後，伊樹菜覺得如果和大家一起，一定能成為奇普托斯最強的忍者！"
2902-163 = "……嗯？"
2902-164 = "奇普托斯最強的，忍者……"
2902-165 = "那個，雖然不是很懂，但是好厲害……！"
2902-166 = "奇普托斯最強的忍者啊……"
2902-167 = "嗯，不錯！既然要當忍者，有這種遠大的抱負是件好事！"
2902-168 = "能夠破解柴犬汪藏導演的暗號、和我們因為同樣的事物感到快樂的個性……"
2902-172 = "還有強烈的決心……！"
2902-173 = "伊樹菜同學，你或許真的是我們的同志！"
2902-175 = "是的，很高興能見到大家！"
2902-176 = "完全是，部長在尋找的，人才……！"
2902-178 = "當然，伊樹菜還不像忍術研究部大家一樣是中忍！"
2902-179 = "嘛，我覺得我們也沒有這麼厲害啦！"
2902-180 = "伊樹菜同學和我們都一樣唷。"
2902-181 = "但是，伊樹菜還是修行不足之身……"
2902-182 = "你已經有辦法看著我們的傳單，找到這裡來了不是嗎？#n伊樹菜同學和我們一樣非常喜歡忍者，這點我已經知道了。#n這樣就足以算是和我們是立場相同的夥伴了唷。"
2902-183 = "……！！"
2902-184 = "……是！伊樹菜最喜歡忍者了！"
2902-185 = "雖然以前都沒有人能理解，所以一直都是一個人……"
2902-186 = "還被想破壞慶典的人給利用……"
2902-190 = "（想破壞慶典……？利用……？）"
2902-191 = "（……漫博那件事？）"
2902-192 = "（要破壞漫博也就是說……）"
2902-194 = "伊樹菜同學，你說的是……"
2902-195 = "為了自己的利益，胡亂在慶典上鬧事的那夥人嗎？"
2902-196 = "是的，沒錯！難道你也知道嗎？"
2902-197 = "嘛，不管在什麼地方都會有那種人嘛。"
2902-198 = "就因為自己是主流文化或是高級文化就把對方當傻子的那種人！"
2902-199 = "真是的，要享受興趣的話還真希望他們能對其他類型的興趣保持尊重呢。#n明明會因此受苦的還是自己或者自己的同伴。"
2902-200 = "原，原來如此……！這個世界上有很多像喵天丸一樣的人啊……！"
2902-201 = "沒想到忍者的世界竟然會是這樣啊……伊樹菜，又學到了一課！"
2902-202 = "即使被那麼對待，你也依然喜歡忍者對吧？我覺得是件很了不起的好事。"
2902-204 = "如果發生那種事的話，我想我會逃走的……"
2902-205 = "伊樹菜同學，那個，真厲害。"
2902-206 = "那是因為……"
2902-207 = "伊樹菜遇見了主公！"
2902-208 = "……主公？"
2902-210 = "（說明中）"
2902-212 = "……於是伊樹菜就成為主公的忍者了！"
2902-213 = "原，原來如此……？"
2902-218 = "（……咦，那是什麼忍者也會嚇一跳的冒險故事）"
2902-219 = "（話說主公？那是什麼Play……關係？）"
2902-221 = "話說「夏萊的老師」我好像在哪裡聽過……"
2902-222 = "嗚，嗚嗚……"
2902-223 = "咦，月夜？為什麼哭了……？"
2902-224 = "伊樹菜同學，一定，很難受吧……居然能夠克服，那種困境……"
2902-225 = "我太，感動了……！"
2902-226 = "雖然有點辛苦，不過伊樹菜沒事的！"
2902-227 = "伊樹菜也是多虧了那件事才能遇見主公、繼續追逐夢想！"
2902-228 = "真是一段，佳話呢……！部長不這麼覺得嗎……？"
2902-229 = "啊，嗯，呃……雖然可能還沒有完全理解……"
2902-230 = "但是能感受到伊樹菜同學的心情。真是辛苦你了。"
2902-231 = "真希望有一天能見到伊樹菜同學的主公呢！"
2902-232 = "這樣啊，如果有機會一定讓你們見一面！"
2902-236 = "經歷了這樣那樣的事之後，伊樹菜就來到這個忍術研究部了！"
2902-237 = "這樣有回答到問題嗎？"
2902-242 = "部長……？"
2902-243 = "伊樹菜同學……不，伊樹菜！"
2902-244 = "你經歷過的事、一路走過來的軌跡，還有你所揭示的夢想！"
2902-245 = "我們忍術研究部都非常認同！"
2902-247 = "歡迎來到忍術研究部，伊樹菜！這樣可以吧，月夜？"
2902-248 = "嗯，當然……！伊樹菜同學，不，伊樹菜醬！歡迎你加入，忍術研究部！"
2902-249 = "啊……"
2902-253 = "是！作為忍術研究部的成員，以後還請多多指教！"
2902-254 = "部長！還有月夜閣下！"
2902-255 = "部，部長？總覺得不習慣被月夜以外的人這麼稱呼……"
2902-256 = "嗯，很好！"
2902-257 = "月，月夜閣下……嘿，嘿嘿……"
2902-258 = "彼此彼此，請多指教囉，伊樹菜醬。"
2902-259 = "嗯！伊樹菜會在這裡和大家一起，"
2902-260 = "繼續以成為奇普托斯最強的忍者為目標邁進！"
2902-261 = "好！目標就是「取得正式社團的認可」！#n還有「少女忍法帖 小小三千留」的訂閱者突破100人！"
2902-262 = "嗯！一起努力吧……！"
2902-263 = "忍忍！"
2902-270 = "（就這樣，各自懷抱夢想的少女們相聚了。#n　而伊樹菜稱為「主公」的存在與他們的邂逅，則是之後的故事了……）"
2902-271 = "於是少女們齊聚一堂"

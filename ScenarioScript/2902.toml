[translation]
2902-1 = "The Girls Get Together 2"
2902-2 = "Wow!"
2902-10 = "So this is the Ninjutsu Research Club! I've always wanted to see it!"
2902-12 = "Pst! Tsukuyo!"
2902-16 = "Huh?"
2902-22 = "Tsukuyo! What do we do? She's cute, but she's so nosy!"
2902-23 = "You t-think she's suspicious?"
2902-24 = "Of course I do! Nobody knows about this place but us!"
2902-25 = "And she just shows up out of nowhere looking to join? It's fishy..."
2902-26 = "Extremely fishy!"
2902-27 = "But... That's how I j-joined..."
2902-28 = "No! You're different! I recruited you personally, Tsukuyo. Remember?"
2902-29 = "Oh, that's right..."
2902-30 = "She must be some kind of spy from the Yin-Yang Club or a Hyakkaryouran assassin!"
2902-34 = "It's unlikely, but still..."
2902-35 = "She makes me nervous."
2902-39 = "We know nothing about her."
2902-40 = "B-But... This could be our first step to becoming a r-real club!"
2902-41 = "Yeah, I know I said I wanted a new club member. But she's just some random person who walked in off the street. Hm..."
2902-45 = "Ah! I know what to do."
2902-49 = "We'll conduct a special interview!"
2902-51 = "S-special interview?"
2902-52 = "Yep! Then I'll know if she's a good fit for the Ninjutsu Research Club!"
2902-54 = "You don't mind doing an interview, do you Izuna?"
2902-55 = "Of course not! You have to make sure an amateur ninja wouldn't be a liability during missions."
2902-56 = "I completely understand!"
2902-57 = "Yes, uh... Exactly."
2902-58 = "Tsukuyo, why don't you get a drink for our guest?"
2902-59 = "Right!"
2902-67 = "U-Um..."
2902-73 = "H-Here. I h-hope you like it."
2902-75 = "Oh, thank you!"
2902-80 = "I'm s-sorry we can't offer you m-more."
2902-82 = "It's okay! Nin nin!"
2902-83 = "Nin nin? No, it's not—I'm not sure..."
2902-84 = "I'm sorry it's not tea or anything f-fancy."
2902-85 = "It's just t-tap water..."
2902-86 = "Tap water?"
2902-87 = "I'm sorry! I can't believe we're offering t-tap water to a g-guest!"
2902-88 = "I don't mean to be r-rude! It's just hard to find t-tea leaves here."
2902-89 = "Especially without club f-funds... *sniffle*"
2902-91 = "It's okay, Tsukuyo!"
2902-92 = "We're lucky to have such a good water supply system! We should be proud to serve tap water!"
2902-93 = "I d-don't know about that, President!"
2902-95 = "Incredible!"
2902-96 = "Huh?"
2902-97 = "What?"
2902-98 = "I saw a ninja documentary about this ages ago."
2902-99 = "A true ninja should always be satisfied with chilled water. Anything more is too lavish!"
2902-100 = "To see you practicing this in daily life... You're so much more dedicated than the rumors say! I'm impressed!"
2902-101 = "Yeah..."
2902-102 = "Ahem... Anyway, let's start the interview."
2902-103 = "How did you find our club, Izuna?"
2902-104 = "We're quite far removed from the Hyakkiyako area."
2902-105 = "There's not much in the way of transportation or amenities here."
2902-106 = "(In fact, we chose this location to stay under the Yin-Yang Club and Hyakkaryouran's radar...)"
2902-108 = "I'll admit it was hard to find. And if I miss the bus, it will be nearly impossible to get to school."
2902-109 = "And the b-building is old, so the water and electricity g-get cut off sometimes. Plus, there's not a single c-convenience store in sight..."
2902-110 = "What are you trying to say, Tsukuyo?!"
2902-111 = "N-Nothing! This is a g-great location!"
2902-112 = "Y-You can see all the stars at night...it's perfect for filming the president's ninjutsu..."
2902-113 = "Exactly. And the best part is, no one ever complains no matter what we do."
2902-114 = "My latest creation is a ninjutsu I'm calling the Sparkling Fire technique. It's sort of my masterpiece."
2902-116 = "You're filming your very own ninjutsu training?"
2902-117 = "Hmm?"
2902-118 = "Oh! I saw this clue out on the street."
2902-122 = "Isn't that—"
2902-126 = "My flyer! You found my flyer! I must have posted that a good six months ago!"
2902-127 = "Yes, well, I recognized the clue on it from Shiba Dog Wang Wang's masterpiece \"Shiba Dog and Ninja\"."
2902-128 = "You understood that?!"
2902-129 = "Amazing..."
2902-131 = "(She must like the same movies as I do... The flyer worked!)"
2902-132 = "(After those Hyakkaryouran punks were the only ones who noticed them and told us we were littering, I thought it was a total failure.)"
2902-133 = "(But if she understood, maybe...)"
2902-135 = "Ahem! You're pretty sharp! Let's move on to the second question."
2902-136 = "The most important question of all..."
2902-137 = "I'm ready! *gulp*"
2902-138 = "Why do you want to join the Ninjutsu Research Club?"
2902-139 = "Oh..."
2902-140 = "That's easy. I want to be just like you!"
2902-141 = "You do?"
2902-142 = "What?"
2902-143 = "There was this video on the \"Michiruchi, a Girl's Ninja Scroll\" channel..."
2902-144 = "After I saw \"Must Watch! Boulder Gets DESTROYED with One Simple Move!\" I was hooked!"
2902-145 = "You know, that video was actually—"
2902-146 = "That's our most successful video, President!"
2902-147 = "Hm... We did work pretty hard on that one."
2902-149 = "(The rock was mostly broken already, and we had to line up the shot just right to make it look like one hit... But we got a lot of views!)"
2902-150 = "(So she's been watching our videos...)"
2902-151 = "(That's why she wants to join. She's a fan! Hahaha!)"
2902-153 = "Does that mean you're one of our subscribers, Izuna?"
2902-154 = "Yes!"
2902-155 = "P-President! A real subscriber is sitting right in front of us! I can't b-believe this!"
2902-160 = "We really do have fans! We need to record this! Can we take a p-picture?"
2902-161 = "What are you talking about? Of course we have fans!"
2902-162 = "Yep! That video is how I know you can make me the best ninja in Kivotos!"
2902-163 = "Huh?"
2902-164 = "The b-best ninja in K-Kivotos?"
2902-165 = "Y-You're amazing, Izuna!"
2902-166 = "You really believe that, huh?"
2902-167 = "...Great! I like your passion! A ninja should be ambitious!"
2902-168 = "Considering how much you like Shiba Dog Wang Wang's work, and how determined you are to be like us..."
2902-172 = "There's no doubt about it."
2902-173 = "You're a perfect fit!"
2902-175 = "Yay! I'm so glad I found you!"
2902-176 = "I think we found the one you were looking for, P-President."
2902-178 = "Of course, I still have a long way to go to reach your level!"
2902-179 = "Not at all!"
2902-180 = "We're basically the same!"
2902-181 = "What?"
2902-182 = "Listen, if you were clever enough to find us based on this flyer, then you love ninjas as much as we do. And that's what counts!"
2902-183 = "...?!"
2902-184 = "Yes! I absolutely love ninjas!"
2902-185 = "I used to be so alone. Nobody understood me."
2902-186 = "And when that villain took advantage of me to ruin the festival, they made me feel so dumb and helpless..."
2902-190 = "(Dumb and helpless?)"
2902-191 = "(I wonder if she's talking about Komisen.)"
2902-192 = "(Hm... A villain at Komisen...)"
2902-194 = "Izuna, this villain..."
2902-195 = "Did they wreak havoc at the festival just for fun?"
2902-196 = "Yes! How did you know?"
2902-197 = "It's pretty common."
2902-198 = "People like that think they're better than everyone else. They take pleasure in tearing down anyone they don't respect."
2902-199 = "Unfortunately, the people they hurt the most end up being their friends and family."
2902-200 = "The world is full of villains like Date Meowru."
2902-201 = "Wow... The ninja life is so cruel."
2902-202 = "Yet, despite all that, you still admire them."
2902-204 = "If it were me, I wouldn't want anything to do with ninjas after that!"
2902-205 = "But you..."
2902-206 = "Yeah..."
2902-207 = "It was kind of worth it. I got to meet the lord!"
2902-208 = "...Eh?"
2902-210 = "Izuna explains..."
2902-212 = "...And that's how I became the lord's ninja!"
2902-213 = "I see..."
2902-218 = "(That was like a full-on action movie.)"
2902-219 = "(The lord she keeps talking about. Is it some kind of weird roleplay?)"
2902-221 = "I think I've heard of Schale before..."
2902-222 = "P-President... *sniffle*"
2902-223 = "Tsukuyo? Why are you crying?"
2902-224 = "Izuna has been through so m-much... I'm so moved by her story..."
2902-225 = "You've overcome so much!"
2902-226 = "Yes. It was hard, but I'm okay now."
2902-227 = "I'm really lucky I met the lord. They made sure I could keep dreaming!"
2902-228 = "Yes! It was such a beautiful story!"
2902-229 = "I know we just met, but..."
2902-230 = "I can already tell you have a good heart. That was a great story!"
2902-231 = "I'd really like to meet this lord of yours!"
2902-232 = "If there's ever an opportunity, sure!"
2902-236 = "Anyway, that's how I ended up at the Ninjutsu Research Club."
2902-237 = "Is that a good enough answer?"
2902-242 = "P-President?"
2902-243 = "Good enough? That was amazing!"
2902-244 = "Everything you've been through! Your life story! Your dream!"
2902-245 = "That's the essence of the Ninjutsu Research Club!"
2902-247 = "Starting today, you're an official member, Izuna."
2902-248 = "Welcome to the Ninjutsu Research Club!"
2902-249 = "Me? Part of the Ninjutsu Research Club?"
2902-253 = "We're going to be such a great team!"
2902-254 = "I can't wait to work with you, President and Dame Tsukuyo!"
2902-255 = "Hm, no one besides Tsukuyo has ever called me President before..."
2902-256 = "I like it!"
2902-257 = "Dame Tsukuyo... Heehee!"
2902-258 = "I look forward to working with you, Izuna."
2902-259 = "Me too! I will do my absolute best!"
2902-260 = "I'll be the best ninja in Kivotos! Nin nin!"
2902-261 = "Yes! We're going to be an official club! Let's do it! A hundred subscribers for \"Michiruchi, a Girl's Ninja Scroll\"!"
2902-262 = "I know we can do it if we work together!"
2902-263 = "Yes! Nin nin!"
2902-270 = "And that's how the three met and shared their dreams with one another. Soon they'd meet the lord..."
2902-271 = "The Girls Get Together"

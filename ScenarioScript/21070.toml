[translation]
21070-1 = "第7話;稱之為槍也太大了"
21070-2 = "千年．遊戲開發部"
21070-3 = "千年……不，奇普托斯的學生，大家都拿著各自的武器。"
21070-4 = "所以說，也得幫愛麗絲準備一把武器才行。"
21070-5 = "雖然說方法有很多種，但在千年這裡最方便、最能拿到好武器的地方……"
21070-6 = "……果然是工程師部吧。"
21070-7 = "工程師，部……？"
21070-8 = "製造、修理機械的專家在千年被稱為「巨匠」。"
21070-9 = "而工程師部就是集結了這些巨匠們，專精硬體的社團。"
21070-10 = "他們不只是精通所有的機械，也負責武器的修理和改造。"
21070-11 = "或許，在那裡有很多沒在使用的武器也說不定。"
21070-12 = "所以說，我們趕快去看看吧！"
21070-14 = "工程師部．工作室"
21070-15 = "……原來如此，我大致了解了。"
21070-16 = "想要挑選一把好武器，送給新的夥伴……是嗎。"
21070-17 = "如果是這樣的話，來我們工程師部真是明智的選擇。"
21070-18 = "對於千年的人來說，勝負往往取決於是否有優秀的技術人員。"
21070-19 = "在那邊有許多我們生產的試作品。"
21070-20 = "如果是放在那的東西的話，要拿哪個都沒問題的唷。"
21070-21 = "太好了！謝謝前輩！"
21070-24 = "嗨……我是一年級的響唷。不介意的話我可以幫你們找點好東西……"
21070-25 = "……這個怎麼樣呢，愛麗絲？"
21070-27 = "嘿～手槍嗎？"
21070-28 = "雖然不太確定，在我看來……愛麗絲應該沒有什麼戰鬥的經驗才對……"
21070-29 = "這句話需要否定。#n愛麗絲至今為止已經拯救了人類27次，經歷過46次與魔王軍的戰鬥，#n還進行了超過三位數的地城探索。經驗值相當豐富。"
21070-31 = "……"
21070-32 = "那還，真厲害呢……"
21070-33 = "總之，使用槍械的經驗……幾乎沒有呢。"
21070-34 = "這樣的話果然是手槍比較適合……這把是塑膠製的所以很輕，後座力也很小……"
21070-35 = "從各種意義上來說都對新手很友善才對……更何況……"
21070-37 = "這把槍上有著千年有史以來從未搭載過的功能。"
21070-39 = "那，那是什麼呢？"
21070-40 = "還沒聽到就覺得很不得了……究竟是怎樣的功能呢？"
21070-41 = "那就是……"
21070-42 = "「Bluetooth」功能唷。"
21070-43 = "……咦?"
21070-44 = "可以通過Bluetooth來聽音樂或是傳送檔案的手槍……在我的調查中，從未存在過。"
21070-45 = "……當然，它也搭載了悠悠卡的功能。#n只要輕觸一下乘車處的IC面板就能夠搭乘交通工具囉。"
21070-46 = "另外還有NFC功能，就算在超商也能使用……"
21070-47 = "很，很厲害是很厲害啦……"
21070-48 = "在便利商店說「幫我結帳」然後就掏出手槍的話，店員會被嚇到的吧！"
21070-49 = "咦，這麼說來愛麗絲醬跑哪去了……？愛麗絲醬～愛麗絲醬？"
21070-50 = "……啊，在那裡。"
21070-51 = "那個是……"
21070-54 = "（盯──）"
21070-57 = "這個是……？"
21070-58 = "哼哼哼……這位客人，您可真是有眼光啊。"
21070-59 = "呃，那個……"
21070-60 = "需要說明的話，隨時隨地為您提供解答！我是工程部的巨匠──亞都梨喔！"
21070-61 = "……？"
21070-62 = "你就是愛麗絲對吧。遊戲開發部的第四個成員！"
21070-64 = "啊，亞都梨醬好久不見。話說回來，愛麗絲醬盯著的這個大東西是什麼呢？"
21070-67 = "簡直就像是……「大砲」一樣。"
21070-68 = "問得真好，綠。這就是投入了工程師部下半年接近70%的預算所製作的……"
21070-69 = "充滿工程師部野心的作品「宇宙戰艦用電磁砲」！"
21070-70 = "宇宙戰艦……你們又造出了什麼不得了的……"
21070-71 = "之前也曾經發生好像是想要冬眠，於是就說著「在未來再見吧」邊製造了冬眠裝置，結果害大家都感冒了的事吧。"
21070-72 = "……如果是說「直達未來特快車」的話，現在也很常用喔。"
21070-73 = "……雖然說，是當冷凍庫來用就是了。#n如果說是把食物送到更久的未來的話，也不算失敗吧。"
21070-74 = "明明只有這種功能，名字還這麼誇張！"
21070-75 = "回到原來的話題，#n工程師部現在繼直升機和萬用機器人之後，正在以開發宇宙戰艦為目標！"
21070-76 = "而這個電磁砲就是計畫的第一步。為了在大氣層外戰鬥而開發出來的兵器！#n這可是千年有史以來的首次嘗試！"
21070-77 = "好帥……光聽就興奮起來了！"
21070-78 = "不愧是我們千年的工程師部！現在進行得還順利嗎！？"
21070-79 = "哼哼哼，那是當然的！"
21070-80 = "雖然想這麼說，但是現在計畫已經中斷了……"
21070-81 = "咦咦咦！？為什麼！我這麼期待的說！"
21070-82 = "從古至今，無論在哪個時代，#n阻礙我們這些技術人員的從來就不是想像力和熱情，而是預算啊……"
21070-83 = "光是打造這把電磁砲就耗費了下半年預算的70%，#n要建造宇宙戰艦的話，可能需要幾千倍的預算也說不定……"
21070-84 = "那不是在計畫的時候就應該要知道了嗎！為什麼還是把這把電磁砲製作出來了啊！？"
21070-87 = "真是天真的問題呢，桃井。"
21070-88 = "……那是因為光束砲就是浪漫啊！"
21070-89 = "（點頭）"
21070-90 = "說的沒錯！竟然不懂光束砲的浪漫，真是敗給桃井你了。"
21070-91 = "是笨蛋！是頭腦聰明的笨蛋集團！"
21070-93 = "灌注了工程師部熱情的，這把武器的正式名稱就是……"
21070-94 = "「光之劍：Supernova」！"
21070-95 = "又是這種誇張的名字……"
21070-96 = "……！"
21070-97 = "光，光之劍……！？"
21070-98 = "愛，愛麗絲的眼睛正在閃閃發光……！？"
21070-99 = "哇，哇……！"
21070-100 = "愛麗絲醬竟然這麼興奮，我還是第一次看到。"
21070-101 = "……愛麗絲想要這個。"
21070-102 = "……咦？"
21070-104 = "偉大的鐵之工匠呀，請將那龍之吐息賜給我吧。"
21070-106 = "唔嗯，你能這麼說我是很感動啦……"
21070-107 = "但是很抱歉，這個是辦不太到的。"
21070-109 = "為什麼！？你們明明說在這個房間裡的東西都可以拿的！"
21070-110 = "……那是有原因的。"
21070-111 = "原因？"
21070-112 = "難道說，是因為等級不夠嗎……請告知裝備的需求等級！"
21070-113 = "呃，並不是這種問題……"
21070-114 = "而是更加現實的問題。"
21070-115 = "是錢嗎……"
21070-116 = "別擔心，愛麗絲。我就算是把綠的PrayStation給賣了也會……"
21070-117 = "……也不是錢的問題唷。"
21070-118 = "現實中沒有比錢更大的問題了吧！"
21070-119 = "雖然說在預算這方面，某種程度上還是可以同意的……"
21070-120 = "……但是這把武器，作為個人用的裝備來說太大又太重了。"
21070-122 = "光是本身的重量就超過了140公斤！#n若是再裝上光學瞄準鏡和電池進行砲擊的話，瞬間的反作用力可是超過200公斤呢！"
21070-124 = "……"
21070-125 = "你能說它很帥氣我們很開心，謝謝你。#n如果能拿得走的話，其實我也是很想給你們的……"
21070-126 = "……？"
21070-127 = "……！"
21070-128 = "……汝能發誓在汝的話中沒有半點虛假嗎？"
21070-129 = "嗯？這孩子，說話的方式又……"
21070-130 = "我，我想他應該是在問「是真的嗎」。"
21070-131 = "我當然不是在說謊……也就是說，你想要把它給帶走，是嗎？"
21070-132 = "（點頭）"
21070-134 = "（咻……）"
21070-135 = "能夠拔出這把武器的人……"
21070-136 = "……就能成為這裡的霸者吧！"
21070-137 = "呵呵呵，原來如此。有幹勁真好呢！"
21070-139 = "（碰）"
21070-140 = "哈啊……！"
21070-141 = "不要勉強比較好吧……不用起重機的話怎麼可能拿──"
21070-143 = "嗯嗯嗯嗯……！"
21070-144 = "……不會吧。"
21070-145 = "咦咦咦！？"
21070-146 = "（碰碰碰碰碰──！）"
21070-147 = "……拿，拿起來了！"
21070-148 = "騙人的吧……真不敢相信……"
21070-149 = "那個，要按的按鍵是……這就是B鍵吧……？"
21070-150 = "等，等一下……！"
21070-152 = "……光呀！！！"
21070-155 = "（碰喀──！）"
21070-156 = "啊啊啊啊啊！我，我們社團活動室的天花板啊！？"
21070-157 = "……太厲害了。"
21070-158 = "愛麗絲要裝備這個武器。"
21070-159 = "竟，竟然真的能使用它……但，但是這個實在是有點……！#n因為預算和其他各種問題，可以的話還是請選其他的……！"
21070-160 = "……不。"
21070-161 = "沒關係，你就拿去吧。"
21070-162 = "詠葉前輩，真的可以嗎？"
21070-163 = "嗯。反正除了這孩子之外也沒有人可以用了吧。"
21070-164 = "響，為了讓之後愛麗絲用起來更方便，幫它做個背帶和把手吧。"
21070-165 = "我知道了。"
21070-166 = "……樂觀點來看的話，能拿到實戰資料也是件好事吧。"
21070-167 = "哇，總覺得拿到了件不得了的武器呢！謝謝！"
21070-168 = "非，非常感謝！"
21070-169 = "不，要道謝的話還太早了喔。"
21070-170 = "咦？"
21070-172 = "接下來……響，能把之前被要求要銷毀的無人機和機器人，全部都派出來嗎？"
21070-173 = "……嗯。"
21070-175 = "那個……詠葉前輩？總覺得情況好像不太對勁……"
21070-176 = "難道說這是「可不能這麼簡單就讓你們帶走武器！」的情節嗎！？"
21070-177 = "正是如此。"
21070-178 = "如果真的想把這把武器帶走的話……"
21070-181 = "就請先打倒我們吧！"
21070-182 = "！？"
21070-183 = "咦咦咦！怎麼這樣，詠葉前輩為什麼！？"
21070-184 = "為，為了一把武器需要做到這樣嗎……？"
21070-186 = "如果是其他武器的話，也許我會開心地送給你們吧……"
21070-187 = "但這把武器的話，就需要確認一下了呢。"
21070-188 = "確，確認？"
21070-189 = "不……稱之為「資格」或許更適合吧。"
21070-190 = "資格？那是……"
21070-193 = "探測前方出現戰鬥型無人機和機器人，已確認到敵對反應。"
21070-194 = "來了！"
21070-195 = "啊啊真是的！"

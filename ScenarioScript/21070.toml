[translation]
21070-1 = "ตอนที่ 7;ดูใหญ่เกินกว่าจะเรียกว่าปืนนะ"
21070-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21070-3 = "นักเรียนในมิลเลเนียม ไม่สิ นักเรียนในคิโวทอสทุกคนจะต้องมีอาวุธประจำตัว"
21070-4 = "เพราะฉะนั้น เธอก็ต้องมีอาวุธด้วยนะอาริสึ"
21070-5 = "และสถานที่ที่จะหาอาวุธที่พอใช้ได้อย่างรวดเร็วที่สุดก็คือ..."
21070-6 = "ชมรมวิศวกรรมไงล่ะ"
21070-7 = "วิศว... กรรม...?"
21070-8 = "ในมิลเลเนียม เราจะเรียกผู้เชี่ยวชาญที่สร้างและซ่อมแซมเครื่องจักรกลต่างๆ ว่า 'ไมสเตอร์'"
21070-9 = "และชมรมวิศวกรรมก็เป็นชมรมของไมสเตอร์ที่ว่า"
21070-10 = "พวกนั้นมีความเชี่ยวชาญด้านเครื่องจักรเป็นอย่างดี แถมยังรับซ่อมและปรับปรุงอาวุธ#nของโรงเรียนมิลเลเนียมด้วย..."
21070-11 = "ฉันว่าบางทีอาจจะมีอาวุธที่ไม่ได้ใช้ หรืออาวุธที่เหลือๆ อยู่บ้างก็ได้"
21070-12 = "เอาล่ะ! ไปกันเลย!"
21070-14 = "ห้องปฏิบัติการชมรมวิศวกรรม"
21070-15 = "เป็นอย่างนี้นี่เอง... เข้าใจแล้วล่ะ"
21070-16 = "อยากให้ของขวัญเพื่อนเป็นอาวุธที่ดีกว่าเดิมสินะ..."
21070-17 = "คิดถูกแล้วล่ะที่มาชมรมวิศวกรรม"
21070-18 = "เพราะการต่อสู้ของมิลเลเนียมจะตัดสินการแพ้ชนะจากการที่ 'มีหรือไม่มีช่างผู้เชี่ยวชาญอยู่ในทีม'"
21070-19 = "ไปดูตรงมุมนู้นสิ มีอาวุธต้นแบบที่เราทำไว้อยู่หลายชิ้นเลย"
21070-20 = "ถ้าเป็นของที่อยู่ตรงนั้นล่ะก็หยิบไปได้เลย"
21070-21 = "ว้าว! ขอบคุณนะรุ่นพี่!"
21070-24 = "หวัดดี... ฉันคือฮิบิกิ อยู่ชั้นปีที่ 1 ฉันจะ... เลือกอันดีๆ ให้นะ"
21070-25 = "อาริสึ... อันนี้ดูเป็นยังไงบ้าง?"
21070-27 = "ฮิฮิ นี่ปืนพกใช่ไหม?"
21070-28 = "แค่ดูก็รู้แล้ว... นักเรียนคนนี้... ไม่มีประสบการณ์ต่อสู้เลยใช่ไหม?"
21070-29 = "ฉันขอปฏิเสธ คำนั้นค่ะ อาริสึมีประสบการณ์ช่วยเหลือมนุษยชาติ 27 ครั้ง ต่อสู้กับทหารปีศาจ 46 ครั้ง#nและสำรวจดันเจี้ยนเกิน 100 ครั้งค่ะ"
21070-31 = "......"
21070-32 = "สุดยอด... ไปเลย"
21070-33 = "แต่ถึงยังไงก็ดูไม่มีประสบการณ์การใช้ปืนเลย"
21070-34 = "อย่างนี้ก็คงเหมาะกับ... ปืนพก ปืนนี้ทำมาจากพลาสติก มีน้ำหนักเบาและมีแรงต้านน้อย..."
21070-35 = "ถือว่าเหมาะสำหรับผู้ที่เพิ่งหัดใช้ปืน... แล้วก็..."
21070-37 = "ปืนนี้มีฟังก์ชั่นที่ไม่เคยมีมาก่อนในประวัติศาสตร์มิลเลเนียมด้วย"
21070-39 = "วะ... ว่าไงนะ?"
21070-40 = "เยี่ยมไปเลย เป็นฟังก์ชั่นอะไรเหรอ?"
21070-41 = "มันก็คือ..."
21070-42 = "ฟังก์ชั่น 'บลูทูธ' ยังไงล่ะ"
21070-43 = "หา...?"
21070-44 = "ปืนพกที่สามารถฟังเพลงและส่งไฟล์ผ่านบลูทูธได้... ทั้งโลกนี้ก็คงจะมีแค่กระบอกเดียวเท่านั้น"
21070-45 = "แล้วก็ยังมีฟังก์ชั่นโดยสารด้วยนะ เธอจะสามารถใช้ขนส่งสาธารณะได้ เพียงแค่แตะบนแผง IC#nในบริเวณที่ขึ้นรถ"
21070-46 = "นอกจากนี้ถ้าเปิดใช้ฟังก์ชั่น NFC ก็จะใช้จ่ายเงินในร้านสะดวกซื้อได้ด้วย"
21070-47 = "นะ... นี่มัน... สุดยอดไปเลย"
21070-48 = "แต่ว่าถ้าเข้าร้านสะดวกซื้อแล้วชักปืนออกมาแล้วพูดว่า \"จ่ายด้วยปืนแล้วกัน\"พนักงานจะต้องตกใจแน่!"
21070-49 = "อาริสึจังว่าไง...? อาริสึจัง? ไปไหนของเขานะ?"
21070-50 = "อ่า อยู่ทางโน้นไง"
21070-51 = "...... นั่นมัน ......"
21070-54 = "(จ้อง)"
21070-57 = "...... นี่มัน ......?"
21070-58 = "ฮุฮุฮุ ตาถึงจังเลยนะคะลูกค้า"
21070-59 = "..... ใครน่ะ ......?"
21070-60 = "ไมสเตอร์แห่งชมรมวิศวกรรมที่พร้อมหาคำตอบให้กับทุกความสงสัย! ฉันคือโคโทริค่ะ"
21070-61 = "......?"
21070-62 = "คุณคงเป็นสมาชิกคนที่ 4 ของชมรมพัฒนาเกมที่ชื่อว่าอาริสึสินะคะ"
21070-64 = "โคโทริจัง?! ไม่ได้เจอกันนานเลย ของชิ้นใหญ่ที่อาริสึจังมองอยู่นี่คืออะไรเหรอ?"
21070-67 = "ดูเหมือนกับ... 'ปืนใหญ่' ยังไงยังงั้นแหละ"
21070-68 = "ถามได้ดีมากค่ะมิโดริ นี่คืออาวุธที่ใช้งบประมาณกว่า 70% ของครึ่งปีหลัง..."
21070-69 = "ผลงานแห่งความพยายามของชมรมวิศวกรรม! ปืนเรลกันสำหรับยานรบอวกาศค่ะ!"
21070-70 = "ยานรบอวกาศงั้นเหรอ... ทำไมถึงประดิษฐ์อะไรยิ่งใหญ่เบอร์นี้..."
21070-71 = "ก่อนหน้านี้พวกเธอจะสร้างกระสวยส่งตัวแล้วบอกว่า \"แล้วเจอกันในอนาคตนะคะ\" แต่ก็เกิดเรื่อง#nจนติดหวัดกันทั้งชมรมไม่ใช่เหรอ?"
21070-72 = "เรายังคงใช้ 'ขนส่งสู่อนาคต' อันนั้นอยู่..."
21070-73 = "ใช้เป็นตู้เย็นน่ะ... นี่ไม่ใช่ความผิดพลาด เพราะเรายังส่งอาหารไปยังอนาคตข้างหน้าได้"
21070-74 = "เลือกชื่อได้ดีเวอร์มากๆ!"
21070-75 = "เราเพิ่งจบโปรเจกต์สร้างหุ่นยนต์ใช้งานทั่วไปและเฮลิคอปเตอร์ไป ตอนนี้ก็เลยมุ่งไปที่การพัฒนา#nในด้านยานรบอวกาศค่ะ!"
21070-76 = "และปืนเรลกันนี่คือจุดเริ่มต้น ปืนกระสุนจริงที่พัฒนาเพื่อใช้ต่อสู้นอกชั้นบรรยากาศ!#nนี่ถือเป็นการทดลองแรกในประวัติศาสตร์ของมิลเลเนียมเลยล่ะค่ะ!"
21070-77 = "ฮิฮิ... น่าติดตามแล้วล่ะสิ"
21070-78 = "สมกับเป็นชมรมวิศวกรรมของมิลเลเนียมจริงๆ! ครั้งนี้ต้องทำสำเร็จแน่นอน!"
21070-79 = "ฮุฮุฮุ! ต้องเป็นอย่างนั้นอยู่แล้วค่ะ!"
21070-80 = "ฉันเองก็อยากพูดแบบนั้นนะคะ แต่เห็นทีจะไม่ได้..."
21070-81 = "เอ๋?! ทำไมล่ะ! ฉันอุตส่าห์ตั้งตารอนะ!"
21070-82 = "เพราะสิ่งที่จำกัดการทำงานของวิศวกร... ไม่ใช่จินตนาการหรือความมุ่งมั่นที่ไม่เพียงพอ#nแต่เป็น... งบประมาณต่างหากล่ะคะ..."
21070-83 = "แค่สร้างปืนเรลกันอันนี้ก็ใช้งบไปกว่า 70% แล้ว ถ้าจะสร้างยานรบอวกาศคงต้องเตรียมงบประมาณ#nไว้อีกสักพันเท่า..."
21070-84 = "ถ้างั้นจะสร้างปืนเรลกันเพื่อต่อสู้ในอวกาศนี้ทำไมล่ะ!"
21070-87 = "คำถามนี้มันน่าเศร้าใจนะโมโมอิ"
21070-88 = "เพราะการยิงลำแสงมันดูโรแมนติกยังไงล่ะ..."
21070-89 = "(พยักหน้า)"
21070-90 = "อืม ฉันเห็นด้วย ไม่อยากจะเชื่อว่าไม่รู้จักปืนลำแสง... โมโมอิน่าจะใช้ฉายาว่าคนบื้อนะคะ"
21070-91 = "คนบื้อน่ะ! ตรงนี้ก็มีพวกคนบื้ออยู่นะ!"
21070-93 = "ชื่ออย่างเป็นทางการของอาวุธที่แฝงความมุ่งมั่นของชมรมวิศวกรรมชิ้นนี้ก็คือ..."
21070-94 = "'ดาบแห่งแสง: ซูเปอร์โนวา'"
21070-95 = "ชื่อเวอร์อีกแล้ว..."
21070-96 = "......!"
21070-97 = "...... ดาบแห่งแสง......?!"
21070-98 = "หือ? ทำไมตาเป็นประกายอย่างนั้นล่ะอาริสึ?"
21070-99 = "ว้าว! ว้าว!"
21070-100 = "พะ... เพิ่งเคยเห็นอาริสึจังตื่นเต้นแบบนี้นะเนี่ย"
21070-101 = "ฉันอยากได้... อันนี้ค่ะ"
21070-102 = "หืม...?"
21070-104 = "ช่างฝีมือที่แกร่งกล้าราวเหล็กผา ข้าต้องการลมหายใจมังกรนั่น"
21070-106 = "อืม.. พูดแบบนี้ฉันก็รู้สึกดีอยู่หรอกนะ..."
21070-107 = "แต่คงให้ไม่ได้หรอก ขอโทษนะคะ!"
21070-109 = "ทำไมล่ะ?! ไหนว่าถ้าอยู่ในนี้แล้วจะเอาอะไรไปก็ได้ไงล่ะ!"
21070-110 = "เรามีเหตุผลน่ะ..."
21070-111 = "เหตุผล?"
21070-112 = "หรือว่าฉันเลเวลต่ำไป...? ต้องเลเวลไหนเหรอคะถึงจะใช้งานได้?"
21070-113 = "ไม่หรอก... เรื่องนั้นไม่ใช่ปัญหา..."
21070-114 = "ปัญหามันยิ่งใหญ่มากกว่านั้น"
21070-115 = "เรื่องเงินสินะ นึกแล้วเชียว"
21070-116 = "ไม่ต้องกังวลหรอกอาริสึ ต่อให้ฉันจะต้องขายเครื่องเล่นไพล์สเตชั่นของมิโดริ..."
21070-117 = "ไม่ใช่เรื่องนั้นหรอก..."
21070-118 = "จะมีปัญหาอะไรยิ่งใหญ่ไปกว่าเรื่องเงินอีกล่ะ!"
21070-119 = "อืม.. ฉันก็เห็นด้วยกับเรื่องเงินอยู่หรอกนะ..."
21070-120 = "แต่ว่า... อาวุธชิ้นนี้... มันหนักเกินไปที่เอามาใช้เป็นอาวุธประจำตัวน่ะสิ"
21070-122 = "แค่น้ำหนักพื้นฐานก็ 140 กิโลแล้ว! แต่เมื่อยิงพร้อมอุปกรณ์ที่ใช้เล็งกับแบตเตอรี่ด้วยแล้ว#nจะมีแรงต้านกว่า 200 กิโลเลยล่ะค่ะ!"
21070-124 = "อืม......"
21070-125 = "ขอบคุณที่บอกว่าปืนของเราเท่นะ ถ้าเอาไปได้ ฉันก็อยากจะให้อยู่หรอกนะ..."
21070-126 = "......?"
21070-127 = "?!"
21070-128 = "ที่พูดมาไม่มีคำโกหกปนอยู่เลยใช่ไหมคะ?"
21070-129 = "หืม? ทำไมคำพูดถึง...?"
21070-130 = "นะ... น่าจะถามว่าพูดจริงหรือเปล่าน่ะค่ะ..."
21070-131 = "ก็พูดจริงน่ะสิ... ว่าแต่ จะลองยกปืนนั่นดูเหรอ?"
21070-132 = "(พยักหน้า)"
21070-134 = "(พรึ่บ)"
21070-135 = "ผู้ที่เลือกอาวุธชิ้นนี้..."
21070-136 = "...จะได้เป็นราชาของผืนแผ่นดินนี้!"
21070-137 = "ฮุฮุฮุ! ช่างเป็นเด็กที่มีเจตนาแรงกล้าจังเลยนะ"
21070-139 = "(ขวับ)"
21070-140 = "แฮ่ก.....!"
21070-141 = "อย่าฝืนมากเกินไปเลยน่า... ปกติถ้าไม่ใช้ปั้นจั่นเราก็ไม่..."
21070-143 = "อึ้บบบบ...! (ฮึบ...)"
21070-144 = "อ๊ะ..."
21070-145 = "เฮือก!!"
21070-146 = "(ฮึบบบบ กึก!)"
21070-147 = "ฮึ้บ! ยะ... ยกขึ้นแล้ว!"
21070-148 = "เป็น... ไป... ไม่... ได้..."
21070-149 = "อืม... ปุ่มนี่มัน... ปุ่ม B เหรอ...?"
21070-150 = "ดะ... เดี๋ยวก่อน!"
21070-152 = "ลำแสงทำลายล้าง!!!"
21070-155 = "(ตู้มมมมมมม!)"
21070-156 = "อ๊าาา!! พะ... เพดาน!"
21070-157 = "สุดยอด..."
21070-158 = "อาริสึติดตั้งอาวุธนี้ค่ะ"
21070-159 = "มะ... ไม่ได้นะ!! เลือกชิ้นอื่นเถอะนะ ขอร้องล่ะ! อาวุธชิ้นนี้มันคืองบประมาณของชมรม..."
21070-160 = "ไม่เป็นไรหรอก..."
21070-161 = "เอาไปเลย"
21070-162 = "รุ่นพี่อุทาฮะ... ไม่เป็นไรจริงๆ เหรอคะ?"
21070-163 = "อื้ม ไม่เป็นไร ถ้าไม่ใช่เด็กคนนี้ ก็ไม่มีใครที่หยิบไปใช้ได้อยู่แล้ว"
21070-164 = "ฮิบิกิ เธอช่วยทำสายคล้องไหล่และที่จับให้อาริสึถืออาวุธไปได้อย่างสะดวกหน่อยนะ"
21070-165 = "ก็ได้...."
21070-166 = "ถ้าคิดในแง่บวก... เราก็จะได้ข้อมูลจากการใช้งานจริงของอาริสึ..."
21070-167 = "ว้าว! รู้สึกเหมือนได้อาวุธที่มีอานุภาพมากมาไว้ในมือเลย! ขอบคุณนะ!"
21070-168 = "ขะ... ขะ... ขอบคุณนะคะ!"
21070-169 = "ไม่หรอก นี่ยังเร็วเกินกว่าที่จะบอกว่าขอบคุณ"
21070-170 = "หืม?"
21070-172 = "ฮิบิกิ เอาโดรนและหุ่นยนต์ที่ถูกส่งมาให้กำจัดออกมาให้หมดเลย"
21070-173 = "อืม..."
21070-175 = "เอ๋...? รุ่นพี่อุทาฮะ ทำไมบรรยากาศมันแปลกๆ อย่างนี้ล่ะ?"
21070-176 = "อืม.. หรือจะบอกเราว่า 'เธอเอาอาวุธออกไปง่ายๆ ไม่ได้หรอกนะ!'?"
21070-177 = "ใช่แล้ว"
21070-178 = "ถ้าหากจะเอาอาวุธชิ้นนั้นไปล่ะก็..."
21070-181 = "อะฮ่ะฮ่า! อาริสึ ต้องผ่านพวกเราไปให้ได้ซะก่อนนะ!"
21070-182 = "?!"
21070-183 = "อะ... อะไรกัน! รุ่นพี่อุทาฮะ! ทำไมถึงเป็นแบบนี้ไปได้ล่ะ?!"
21070-184 = "พะ... เพราะอาวุธชิ้นเดียวเนี่ยน่ะเหรอ?"
21070-186 = "ถ้าเป็นอาวุธชิ้นอื่น ฉันคงเต็มใจให้ไปแล้ว..."
21070-187 = "แต่ถ้าเป็นชิ้นนี้ ฉันต้องตรวจสอบให้แน่ใจก่อน"
21070-188 = "ตะ... ตรวจสอบ?"
21070-189 = "ไม่สิ... ต้องใช้คำว่า 'คุณสมบัติ' สิถึงจะถูก"
21070-190 = "หมายความว่า...?"
21070-193 = "ตรวจพบโดรนและหุ่นยนต์ประเภทต่อสู้ที่ด้านหน้า ตรวจสอบการตอบสนองของศัตรู"
21070-194 = "เข้ามาแล้ว!"
21070-195 = "แย่แล้ว!"

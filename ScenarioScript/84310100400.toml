[translation]
84310100400-10 = "你，你好。#n如果不介意的話……我可以問一下現在是什麼情況嗎？"
84310100400-14 = "嗯？啊！你好！#n請問是來這裡訓練的嗎？"
84310100400-15 = "訓練……？#n所以那是在運動嗎？"
84310100400-16 = "（果然不是在體罰啊。我好像多管閒事了）"
84310100400-17 = "我現在正和在場的各位進行愉快的訓練。#n有健康的身體才有健全的精神！"
84310100400-18 = "請看吧，那些人臉上爽朗的表情！"
84310100400-23 = "最好是爽朗的表情啦！！！"
84310100400-24 = "……而且我們戴著頭盔又看不到臉！不要瞎掰好嗎！！！"
84310100400-26 = "（……爽朗？）"
84310100400-27 = "話說回來，真的非常抱歉。#n目前可以訓練的位置都滿了，可能無法立刻開始……"
84310100400-28 = "沒，沒關係的。#n我只是來見習一下而已……"
84310100400-33 = "……！！#n你聽到了嗎？"
84310100400-34 = "當然聽到了！！#n因為現在沒有位置，所以沒辦法訓練對吧！？"
84310100400-35 = "那怎麼行！#n像這種該死……"
84310100400-42 = "……這種愉快清爽的運動，如果只有我們能體驗就太自私了！你說對不對！？"
84310100400-43 = "沒錯沒錯！我把位置讓給你體驗看看吧！#n永遠抵達不了的數字10！！！"
84310100400-48 = "……咦。"
84310100400-53 = "（這是……什麼感覺？#n　這股惡寒……彷彿絕對不能牽扯進去的……）"
84310100400-54 = "（簡直像是……沒錯）"
84310100400-55 = "（……是生存的本能！！）"
84310100400-63 = "各位……！居然願意為了迎接新來的會員而讓位……！！"
84310100400-64 = "實在太令人感動了。#n這也是訓練帶來的正面心態，以及內啡肽分泌的效果吧。"
84310100400-65 = "拜其所賜，現在正好有空位了。#n新來的會員！！"
84310100400-66 = "來，請過來這邊，跟我一起進入訓練的世界……！"
84310100400-70 = "……咦？"
84310100400-74 = "……人呢？"

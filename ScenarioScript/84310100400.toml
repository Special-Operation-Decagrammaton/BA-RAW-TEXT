[translation]
84310100400-10 = "Ah, hello. Pardon me, but...can I ask what's happening here?"
84310100400-14 = "Hm? Ah! Hello! Are you here for training?"
84310100400-15 = "Training...? Are you exercising?"
84310100400-16 = "(So it's not a punishment. I suppose there was no need for me to interfere.)"
84310100400-17 = "A little recreational exercise, yeah. Healthy minds are born from healthy bodies!"
84310100400-18 = "Look at all those refreshed expressions!"
84310100400-23 = "How is this \"refreshed\"?!"
84310100400-24 = "...You can't even see our expressions in the first place! We're all wearing helmets! Don't just say whatever you feel like!!"
84310100400-26 = "(...Refreshing, huh?)"
84310100400-27 = "Anyway, I'm truly sorry, but the training spots are all taken. We don't have any open spots right now..."
84310100400-28 = "N-No. It's fine. I'm just here for a quick tour..."
84310100400-33 = "...!! Did you hear that?"
84310100400-34 = "Of course!! A spot?! Did she say there's no open spots?!"
84310100400-35 = "No way! This exercise is hell..."
84310100400-42 = "...ishly fun and refreshing. It'd be a shame if we were the only ones to enjoy it! Isn't that right?!"
84310100400-43 = "Yeah! You can use this spot, and experience it yourself! Maybe YOU can get to number ten!"
84310100400-48 = "...Eh."
84310100400-53 = "(What is this feeling? This chill...like my body is telling me to run...)"
84310100400-54 = "(This is... Yes... That's what it is.)"
84310100400-55 = "(...It's a survival instinct!!)"
84310100400-63 = "You are all SO generous to lend your spot to a new member!"
84310100400-64 = "It must be the endorphins you've been working up. They've given you a positive mindset!"
84310100400-65 = "So, it seems we have a spot after all. Step right up!"
84310100400-66 = "Experience the world of training with..."
84310100400-70 = "...Huh?"
84310100400-74 = "...Where'd she go?"

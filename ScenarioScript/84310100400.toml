[translation]
84310100400-10 = "อ่า สวัสดีค่ะ ถ้าไม่เป็นการเสียมารยาท... ฉันขอถามได้มั้ยคะว่าเกิดอะไรขึ้น?"
84310100400-14 = "หืม? อ๊ะ! สวัสดีค่ะ! มาเทรนอีกคนเหรอคะ?"
84310100400-15 = "เทรนเหรอคะ...? อ้อ กำลังออกกำลังกายอยู่งั้นเหรอคะ?"
84310100400-16 = "(ไม่ได้กำลังถูกลงโทษอยู่สินะ งั้นเราก็คงเข้ามารบกวนแล้วละ)"
84310100400-17 = "ฉันกับทุกคนที่นี่กำลังสนุกสนานกับการเทรนอยู่ค่ะ จิตใจที่แจ่มใสอยู่ในร่างกายที่สมบูรณ์ยังไงล่ะคะ!"
84310100400-18 = "ดูสีหน้าที่สดชื่นของทุกคนสิคะ!"
84310100400-23 = "สดชื่นอะไรกันล่ะ!!!"
84310100400-24 = "จะว่าไป... พวกเราก็ใส่หมวกกันน็อกกันอยู่นี่น่า แล้วจะรู้ได้ยังไงสีหน้าของพวกเราเป็นยังไง อย่าเดามั่วสิ!!!"
84310100400-26 = "(สดชื่นงั้นเหรอ...?)"
84310100400-27 = "แต่ต้องขอโทษด้วยนะคะ ตอนนี้เราที่ไม่พอแล้วค่ะ คงรับเทรนใครเพิ่มไม่ได้ค่ะ..."
84310100400-28 = "มะ... ไม่ค่ะ ไม่เป็นไรค่ะ ฉันแค่มาเดินดูงานเฉยๆ ค่ะ..."
84310100400-33 = "เมื่อกี้ได้ยินหรือเปล่า...!!?"
84310100400-34 = "ได้ยินสิ!! ที่ไม่พอเหรอ!? ที่ไม่พอก็เลยรับใครเพิ่มไม่ได้แล้วงั้นเหรอ!?"
84310100400-35 = "จะให้เป็นแบบนั้นได้ยังไง! ถ้าพวกเราตกนรก..."
84310100400-42 = "ไม่สิ ถ้าพวกเราได้ออกกำลังกายที่ทั้งสนุกและสดชื่นแบบนี้กลุ่มเดียว มันก็จะดูเห็นแก่ตัวเกินไปน่ะสิ! ว่ามั้ยล่ะ??"
84310100400-43 = "ใช่ ใช่! ฉันจะสละสิทธิ์ให้เอง เข้ามาลองเทรนสิ! มาลองนับเลขที่ไม่มีวันนับถึงสิบดูสิ!!!"
84310100400-48 = "หืม...?"
84310100400-53 = "(อะไรกันน่ะ? ความรู้สึกนี้มันอะไรกัน... จู่ๆ ก็หนาวขึ้นมาอย่างนั้น... งั้นก็ไม่ควรเข้าไปยุ่งเกี่ยวสินะ...)"
84310100400-54 = "(นี่มัน... เหมือนกับ... ใช่เลย)"
84310100400-55 = "(นี่คือสัญชาตญาณเอาตัวรอด...!!)"
84310100400-63 = "ทุกคนคะ...! ถึงกับยอมสละที่ให้สมาชิกใหม่เข้ามาเลยเหรอคะเนี่ย...!!"
84310100400-64 = "น่าประทับใจจริงๆ ค่ะ นี่คงเป็นผลจากจิตใจที่เป็นบวกและการหลั่งเอ็นดอร์ฟินที่มาจากการออก#nกำลังกายนะคะ"
84310100400-65 = "ดูเหมือนจะมีที่ว่างที่หนึ่งเลยค่ะ คุณสมาชิกที่เพิ่งมาใหม่!!"
84310100400-66 = "มาเข้าสู่โลกแห่งการออกกำลังกายด้วยกันสิคะ...!"
84310100400-70 = "เอ๋...?"
84310100400-74 = "ไปไหนแล้วน่ะ...?"

[translation]
2300403-1 = "ช่างฝีมือจะไม่เลือกอุปกรณ์"
2300403-2 = "ห้างสรรพสินค้ากลางคิโวทอส"
2300403-3 = "คุณครูมาที่ห้างสรรพสินค้าเพื่อซื้อเครื่องมือฉุกเฉินตามที่อุทาฮะขอ"
2300403-4 = "ไม่อยากจะเชื่อเลยว่าที่องค์กรขนาดใหญ่อย่างชาเล่ต์จะไม่มีเครื่องมือสำหรับซ่อมไฟฟ้าอยู่เลย"
2300403-5 = "ชาเล่ต์ตกเป็นเป้าหมายของพวกนักเรียนอันธพาลอยู่แล้ว เพราะแบบนั้นควรจะต้องมีอุปกรณ์ให้#nใช้ซ่อมแซมด้วยตัวเองได้สิ"
2300403-6 = "คุณครูจะพึ่งพาช่างซ่อมหรือนักเรียนโรงเรียนมิลเลเนียมตลอดไม่ได้หรอกนะ"
2300403-8 = "นี่ไงร้านเครื่องมือ..."
2300403-9 = "เอาละคุณครู เลือกเครื่องมือที่ชอบได้เลย ฉันจะสอนวิธีใช้ให้กับคุณครูเอง"
2300403-11 = "[ns] (เลือกเครื่องมืออเนกประสงค์ราคา 1,000 เยน)"
2300403-12 = "คุณครูจะซื้อเครื่องมืออันนั้นจริงๆ น่ะเหรอ?"
2300403-13 = "หากดูผิวเผิน เครื่องมืออเนกประสงค์อาจจะดูราคาไม่แพงและใช้งานได้หลากหลาย แต่การใช้งาน#nบ่อยๆ ก็จะทำให้เครื่องมือเสียหายได้เพราะเครื่องมือมันไม่เหมาะกับการใช้งานบางอย่าง"
2300403-14 = "ในระยะยาวแล้ว การใช้เครื่องมือราคาถูกแบบนั้นจะทำให้คุณครูต้องเสียค่าใช้จ่ายมากกว่าเดิมอีก"
2300403-15 = "[s] (ขอคำแนะนำจากอุทาฮะ)"
2300403-18 = "ฉันขอแนะนำชิ้นนี้ค่ะ เซ็ตเครื่องมือพรีเมียมของ <มานาซึรุ> สำหรับผู้เชี่ยวชาญ"
2300403-19 = "เครื่องมือชิ้นนี้ได้รับการขัดเกลาผ่านการเจียระไนเพชร มันคมมากถึงขั้นที่สามารถเจาะรถถังได้#nตัวเคสก็ถูกทำจากไทเทเนียมที่แข็งแรงพอที่จะทนทานต่อแรงระเบิดขนาดใหญ่ได้อีกด้วย!"
2300403-20 = "เซ็ตเครื่องมือนี้เซ็ตเดียวก็น่าจะเพียงพอต่อการใช้งานทุกอย่างในสำนักงานได้แล้วล่ะ"
2300403-21 = "[s] \"นี่มันไม่เกินไปหน่อยสำหรับมือใหม่อย่างครูเหรอ?\""
2300403-22 = "ไม่เกินไปหรอก คุณครูต้องมีเครื่องมือเซ็ตนี้จะได้รับมือกับสถานการณ์ฉุกเฉินได้"
2300403-23 = "คุณครูจะเสียใจที่ไม่ได้ซื้อเซ็ตเครื่องมือนี้ถ้ามีรถถังบุกเข้ามาที่สำนักงานในภายหลังได้นะ?"
2300403-24 = "[s] \"ราคา 100,000 เยนเลยเหรอ?!\""
2300403-25 = "อย่างที่ฉันบอกไปน่ะ ว่าการใช้เครื่องมือราคาถูกจะทำให้ต้องเสียค่าใช้จ่ายมากกว่าเดิมในระยะยาว"
2300403-26 = "มันไม่แพงเลยถ้าคุณครูคิดเสียว่ามันเป็นการลงทุนสำหรับอนาคต"
2300403-27 = "บางคนอาจจะบอกว่าช่างฝีมือที่แท้จริงนั้นไม่สนใจว่าเครื่องมือที่ใช้คืออะไร แต่ฉันไม่คิดว่าใครจะ#nเป็นช่างฝีมือได้โดยที่ไม่เลือกใช้อุปกรณ์ให้ดีๆ"
2300403-28 = "เอาล่ะ คุณครูจะได้ก้าวไปเป็นผู้เชี่ยวชาญด้วยเซ็ตเครื่องมือนี้แน่นอน!"
2300403-30 = "สุดท้ายแล้วคุณครูก็ซื้อเซ็ตเครื่องมือที่แพงที่สุดตามการคะยั้นคะยอของอุทาฮะ"
2300403-31 = "และก็ต้องเป็นคนออกค่าใช้จ่ายที่เกินงบไปด้วยตัวเองอีกด้วย..."

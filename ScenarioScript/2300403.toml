[translation]
2300403-1 = "善書不擇筆？"
2300403-2 = "奇普托斯中央劃區．購物中心"
2300403-3 = "（在詠葉的推薦下，為了買工具來到了購物中心）"
2300403-4 = "夏萊那樣大的建築物裡竟然連一個像樣的工具都沒有，真讓人沒辦法相信呢。"
2300403-5 = "夏萊本來就是容易成為不良學生目標的地方，只是機器發生故障這種程度老師也要變得能一個人修理比較好吧？"
2300403-6 = "維修廠或是千年的學生們也不一定一直都會在呀。"
2300403-8 = "……那麼，這裡就是工具賣場嗎。"
2300403-9 = "來吧，老師。選選看中意的工具。我來詳細說明。"
2300403-11 = "[ns] 拿取1,000圓的多功能工具"
2300403-12 = "……老師，認真的嗎？"
2300403-13 = "雖然多功能工具乍看便宜在各方面又便利，然而實際上，很多工具都和正確的規格不符合，頻繁使用的話會對機械造成傷害。"
2300403-14 = "以長期來看會增加修理費，反而會更花錢唷。"
2300403-15 = "[s] 詢問詠葉的推薦"
2300403-18 = "我推薦的是這個吧，「Manaslu」的專家高級工具組。"
2300403-19 = "以鑽石製法精心研磨的工具連戰車的裝甲都能不當一回事，鈦製堅固的保護殼就算被捲入爆炸也沒什麼問題。"
2300403-20 = "就算只靠這個工具組，應該也能對應在夏萊發生的各式各樣的問題才對。"
2300403-21 = "[s]「對初學者的我來說，會不會太大才小用了……？」"
2300403-22 = "沒有那種事。即使做這種程度的準備，也不至於準備過頭。"
2300403-23 = "總有一天夏萊的辦公室有戰車衝進來時，或許會後悔著「啊啊，如果有買那個的話」也說不定唷？"
2300403-24 = "[s]「等，這個售價有6位數耶！？」"
2300403-25 = "如剛才所說，使用便宜工具的話之後會花更多修理費唷。"
2300403-26 = "當作對未來的投資的話算便宜了。"
2300403-27 = "雖然說職人不會挑道具，不過首先最初不選道具的話，連職人都沒辦法當上呢。"
2300403-28 = "來吧，老師也和這個工具組一起，往巨匠的世界踏出一步吧！"
2300403-30 = "（結果如詠葉的推薦，購入了那個工具組）"
2300403-31 = "（超過原本預算的份，自掏腰包了……）"

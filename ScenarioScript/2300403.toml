[translation]
2300403-1 = "An Indiscriminate Craftsman"
2300403-2 = "Central Kivotos Shopping Mall"
2300403-3 = "I went to the shopping mall to buy emergency tools at Utaha's request."
2300403-4 = "I can't believe there's not a single electric tool in a facility as big as Schale."
2300403-5 = "Schale is already a soft target for delinquent students, so you need to be able to do simple repairs yourself."
2300403-6 = "You can't always depend on repairmen or Millennium students."
2300403-8 = "...Here's the tool shop."
2300403-9 = "Now, Sensei. Choose a tool of your liking. I'll teach you how to use it."
2300403-11 = "[ns] Choose a 1,000-yen multi-tool."
2300403-12 = "...Sensei, are you really going to buy that?"
2300403-13 = "At first glance, multi-tools may seem inexpensive and versatile, but frequent use can damage a machine because the tools don't fit to the exact specifications."
2300403-14 = "In the long run, using a cheap tool like that will cost you more."
2300403-15 = "[s] \"What would you recommend?\""
2300403-18 = "I recommend this: Manaslu's premium tool set for experts."
2300403-19 = "The tool's been polished via diamond sharpening. It's so sharp it can pierce a tank! And the case is made of titanium that's strong enough to withstand big explosions!"
2300403-20 = "This tool set alone should be able to handle pretty much anything that happens in the office."
2300403-21 = "[s] \"Isn't this a little too much for a beginner like me?\""
2300403-22 = "It's not too much. You need this to be properly prepared for an emergency."
2300403-23 = "You'll regret not buying this tool set when a tank comes roaring through the office."
2300403-24 = "[s] \"This is 100,000 yen?!\""
2300403-25 = "Like I said, using cheap tools might cost more in the long run."
2300403-26 = "It's cheap if you consider it an investment for the future."
2300403-27 = "Some say a true craftsman doesn't care about what tools she uses, but I don't think you can be a craftsman at all without being picky about your tools."
2300403-28 = "Here, Sensei, you'll be well on your way to mastery with this tool set!"
2300403-30 = "In the end, I bought the most expensive tool set on Utaha's insistence."
2300403-31 = "And I had to personally pay for every yen that went over budget..."

[translation]
12070-1 = "Episode 7;Into the Abydos Desert Part 2"
12070-3 = "We'll be working in the desert from here on out..."
12070-4 = "I've been as far as the sand-covered city, but this is my first time coming this far..."
12070-5 = "Wow, it's been a while since I was last here!"
12070-6 = "You've been here before?"
12070-7 = "Ah, yeah. I've been here a few times before for student council missions."
12070-8 = "If you go a little farther from here, you'll find the oasis where the Abydos Oasis Festival was held!"
12070-9 = "What? An oasis? In a place like this?"
12070-10 = "Well, it's all dried up now. They say that it was once bigger than most lakes and deep enough for boating."
12070-11 = "I've never seen it myself, though."
12070-12 = "The Oasis Festival... I've heard of it. It was the greatest festival in Abydos, and it would attract tons of people."
12070-13 = "Yeah, students from other academies would even come just to see it. But, that was decades before the desert moved in."
12070-14 = "Festivals...and crowds...in a desert like this? I don't believe it."
12070-15 = "Well, I heard that it used to be a nice place to live. There wasn't so much sand or dust back then."
12070-17 = "We still have a little ways to go before we reach the sector mentioned by the Gehenna head prefect."
12070-18 = "But...I don't know what to expect from this place..."
12070-19 = "For now, stay alert as you move forward."

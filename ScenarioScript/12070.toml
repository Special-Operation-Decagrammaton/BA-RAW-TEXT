[translation]
12070-1 = "第7話;前往阿拜多斯沙漠（２）"
12070-3 = "從這裡開始就是被遺棄的沙漠……"
12070-4 = "雖然去過被沙土覆蓋的市區，但更往前的地方還是第一次去……"
12070-5 = "哎呀～這景色真讓人懷念。"
12070-6 = "前輩有來過這裡嗎？"
12070-7 = "嗯，以前因為學生會的工作來過幾次～"
12070-8 = "只要再往前一點，就能看到以前舉辦過阿拜多斯砂漠慶典的綠洲哦！"
12070-9 = "咦？綠洲？在這種地方？"
12070-10 = "嗯，不過現在幾乎都乾涸了～#n聽說以前這片綠洲可是比一座湖還要大，甚至還能在上面划船唷。"
12070-11 = "雖然我也沒有親眼見過就是了～"
12070-12 = "砂漠慶典……我也聽說過。#n那是阿拜多斯有名的慶典，會吸引很多人來。"
12070-13 = "沒錯沒錯，甚至連其他學校的人都會特地來參加慶典呢。#n但那都是砂漠化前數十年的事了。"
12070-14 = "慶典……人群……在這種沙漠？真是難以置信。"
12070-15 = "畢竟這裡以前似乎還算是適合居住的地區嘛～那時候也沒什麼沙塵。"
12070-17 = "距離格黑娜風紀委員長提及的那片區域還有一段距離。"
12070-18 = "這一帶看起來似乎沒有什麼特別的……"
12070-19 = "不過還請保持警戒，繼續前進。"

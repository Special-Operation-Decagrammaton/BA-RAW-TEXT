12070-3 = "3;세리카;01;여기서부터 버려진 사막…….\n#3;a"
12070-4 = "3;노노미;02;모래로 뒤덮인 시가지까진 가봤지만 저도 여기부터는 처음 가보는 곳이에요…….\n#3;a"
12070-5 = "1;호시노;02;이야~ 여기 오랜만이네. \n#1;a\n#1;em;[반응]\n#3;m5"
12070-6 = "#3;hide\n5;시로코;02;선배는 여기 와본 적 있어?\n#5;em;[?]"
12070-7 = "1;호시노;01;아아, 응. 예전에 학생회 임무로 몇 번 와본 적이 있었어.\n#1;greeting"
12070-8 = "1;호시노;00;여기서 조금만 더 가면 아비도스 사막 축제가 펼쳐졌던 오아시스가 나온다고!\n#1;m2"
12070-9 = "5;세리카;04;뭐어? 오아시스? 이런 곳에?\n#5;shake\n#5;em;[?!]"
12070-10 = "1;호시노;01;뭐, 지금은 다 말라버렸지만. 예전엔 웬만한 호수보다 넓어서, 배를 띄울 수 있을 정도였다고 해.\n#1;m1"
12070-11 = "1;호시노;15;나도 직접 본적은 없지만 말야."
12070-12 = "5;시로코;02;사막 축제…… 나도 들은 적 있어. 아비도스 최고의 축제여서 사람들이 많이 찾았다고 했어.\n#5;em;[반응]"
12070-13 = "1;호시노;01;그렇지. 다른 학교에서도 그 축제를 보려고 찾아 올 정도였으니까. 뭐, 사막화가 진행되기 수십 년 전의 일이지만. \n#1;greeting"
12070-14 = "5;세리카;04;축제…… 인파…… 이런 사막에? 사람들이? 믿겨지지가 않아.\n#5;stiff"
12070-15 = "1;호시노;16;뭐, 예전엔 여기도 살기 좋은 곳이었다고 하니까. 모래 먼지도 그땐 없었고.\n#1;em;[음표]"
12070-16 = "5;세리카;04\n1;호시노;16\n#1;d\n#5;d\n#wait;1000"
12070-17 = "3;통신아야네;06;게헨나의 선도부장이 언급한 섹터까진 아직 조금 더 가야해요.\n#3;a"
12070-18 = "3;통신아야네;14;하지만…… 이런 곳에 특별히 뭐가 있을지……."
12070-19 = "3;통신아야네;05;일단 주위를 살피면서 전진입니다.\n#3;em;[반응]"

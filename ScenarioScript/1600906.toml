1600906-87 = "3;미치루;05;방금 건 취소! 취소니까! 다시, 다시 찍는 거야! 이번에야말로……!\n#3;em;[속상함]\n#3;a\n#3;stiff"
1600906-88 = "3;미치루;06;응? 안 된다고?"
1600906-89 = "3;미치루;06;어, 어째서야?! 선생 공……?!\n#3;hophop"
1600906-90 = "[s3] \"그야 위험하니까. 게다가 이대로 있으면 감기에 걸릴 거야.\"\n[s4] \"다른 소재를 생각해 보자. 미치루가 위험하지 않은 방법으로\""
1600906-91 = "3;미치루;02;아, 날 걱정해서……? 안 된다고…….\n#3;em;[///]\n#3;stiff"
1600906-92 = "3;미치루;02;아, 날 걱정해서……? 안 된다고…….\n#3;em;[///]\n#3;stiff"
1600906-93 = "3;미치루;03;그, 그럼 어쩔 수 없네! 응. 어쩔 수 없겠어……."
1600906-94 = "3;미치루;07;우냐악-! 생각처럼 풀리지 않은 건 답답해 죽을 거 같지만!\n#3;hophop"
1600906-95 = "3;미치루;05;그래도…… 나, 치도리 미치루! 인법연구부의 부장은 포기하지 않아!"
1600906-96 = "3;미치루;99;반드시 방법을 찾아내서……! 언젠가는 엄청나게 굉장한- 닌자 콘텐츠를 만들어서…….\n#3;em;…"
1600906-97 = "3;미치루;00;키보토스 전체에 닌자를 알리고, 우리 채널의 구독자 숫자도 세 자릿수를 달성하고야 말겠어!\n#3;closeup"
1600906-98 = "[s] \"목표와 이상이 높은 건지, 아닌 건지……\""
1600906-99 = "3;미치루;07;에잇~! 사소한 건 신경 끄고! 돈 마인! 돈 마인!\n#3;hophop\n#3;em;[재잘]"
1600906-100 = "3;미치루;01;앞으로도 소생의 닌자 콘텐츠 만들기- 그리고 인법연구부의 활동!"
1600906-101 = "3;미치루;00;선생 공도 협력해 주기를 바라오-! \n#3;greeting\n#3;em;[반짝]"

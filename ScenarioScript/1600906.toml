1600906-30 = "3;미치루;03;만약을 위해, 여기 물 양동이도 준비했고, 인법을 어떻게 보여줄 건지- 응, 영상의 콘티도 머릿속으로 완벽하게 구상했으니까-! 계획은 완벽해!\n#3;em;[음표]"

[translation]
1600906-1 = "#title;닌자 소녀는 빛나고 싶어!"
1600906-2 = "#place;백귀야행 오리꽥꽥 공원"
1600906-3 = "#na;(그리하여 사전에 미치루와 약속(?)한 대로 시간에 맞춰 공원에 나왔다.)"
1600906-4 = "[ns] \"일단 나오긴 했는데, 어쩐 일로 부른 거야?\""
1600906-5 = "3;미치루;01;우후후. 그게 말이지. 선생 공도 이미 짐작했다시피……. 오늘 이렇게 우리가 밤중에 모인 이유는 단 하나-\n#3;a\n#3;em;…"
1600906-6 = "3;미치루;00;이번에 내가 새롭게 만들어 낸 자작 인법……."
1600906-7 = "3;미치루;03;그 인법을 영상으로 찍어서, 우리 채널 <소녀인법첩 미치룻치>에 올리기 위해서야!\n#fontsize;80\n#3;closeup"
1600906-8 = "[s] \"전혀 상상도 못했다…….\""
1600906-9 = "3;미치루;02;뭐어? 이런이런, 선생 공- 무슨 소리를 하는 거야?\n#3;em;[땀]"
1600906-10 = "3;미치루;05;이미 내가 앞서 선생 공이 눈치챌 수 있도록 충분히 복선을 뿌려 놨는데!\n#3;hophop"
1600906-11 = "[s] \"복선?\""
1600906-12 = "3;미치루;01;맞아, 복선. 선생 공도 모모톡에서 내가 부자연스러울 정도로 갑자기 화제 전환을 한다고 말했잖아?\n#3;greeting"
1600906-13 = "3;미치루;00;하지만 떠올려 봐! 화제를 전환하기 직전까지 내가 무슨 이야기를 하고 있었는지!\n#3;em;[반응]"
1600906-14 = "[s] \"분명 직전까지, 샬레에 놓고 간 만화책 19권에 대해…….\""
1600906-15 = "3;미치루;03;바로 그거야! 선생 공! 선생 공도 알다시피, 카마보코 돌풍전 19권은 엄청 기념비적인 에피소드가 담겨 있던 단행본이잖아!\n#3;hophop\n#3;em;[재잘]"
1600906-16 = "3;미치루;99;무려 주인공인 카마보코 쨩이 피나는 수련을 통해, 처음으로 자신만의 시그니처 인법을 손에 넣는 명장면이 바로 19권에서 나왔으니까!"
1600906-17 = "[s] \"……그, 그랬던 거야?!\""
1600906-18 = "3;미치루;04;우냐앗?! 이걸 모른다고……? 으음, 선생 공. 아직 수련이 부족하구나?\n#3;em;[?!]\n#3;shake"
1600906-19 = "3;미치루;02;하여간 그 왜, 최근에 유행하고 있는 콘텐츠 중에 <XX에 나오는 XX를 만들어보았다>라고 해서- 흔히 만들어 보았다 장르의 영상이 인기가 많잖아?"
1600906-20 = "3;미치루;01;그러니 나도 그 시장을 노려서 <카마보코에 나올 법한 자작 인법을 만들어 보았다!>라는 영상을 찍을 생각이다. 뭐, 이런 거지."
1600906-21 = "3;미치루;00;그래서 오늘 영상을 찍는 데 쓸 물건은 바로 이거!\n#3;m1"
1600906-22 = "3;미치루;03;이름하여 <화염난무 닌자 불꽃놀이 세트>!! 간편하게 불만 붙이면 화려하게 불꽃이 반짝이는 멋진 물건이야!\n#3;hophop\n#3;em;[반짝]"
1600906-23 = "3;미치루;03;이걸 이용하면……. 내가 평소 상상하고 있던 인법을 완벽하게 구현해낼 수 있을 거야!"
1600906-24 = "[s1] \"아무리 봐도 그냥 닌자라는 단어만 갖다 붙인 듯한 느낌이…….\"\n[s2] \"불을 쓰는 건 조금 위험하지 않을까? 조심해야 해?\""
1600906-25 = "3;미치루;01;자자, 사소한 건 신경 쓰지 말자구! 그리고 준비도 완벽히 해뒀으니까. 괜찮아!\n#3;m3\n#3;em;[재잘]"
1600906-26 = "3;미치루;01;자자, 사소한 건 신경 쓰지 말자구! 그리고 준비도 완벽히 해뒀으니까. 괜찮아!\n#3;m3\n#3;em;[재잘]"

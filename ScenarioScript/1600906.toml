[translation]
1600906-1 = "นินจาสาวอยากเปล่งประกาย!"
1600906-2 = "สวนสาธารณะคาโมะกาโมะ เฮียกคิยาโค"
1600906-3 = "(คุณครูออกมาที่สวนสาธารณะตามที่สัญญา(?) กับมิจิรุเอาไว้ก่อนหน้านี้)"
1600906-4 = "[ns] \"เรียกครูออกมาที่นี่มีอะไรเหรอ?\""
1600906-5 = "ฮุฮุฮุ เรื่องนั้นน่ะ... เป็นอย่างที่ท่านอาจารย์คาดเดาไว้ก่อนหน้านี้เลย... วันนี้ที่พวกเราออกมารวมกัน#nกลางดึกเช่นนี้มีเพียงเหตุผลเดียว..."
1600906-6 = "วิชานินจาที่ข้าน้อยคิดค้นขึ้นใหม่คราวนี้..."
1600906-7 = "ข้าน้อยอยากจะถ่ายคลิปวิดีโอวิชานินจานั้น แล้วอัปโหลดขึ้นในช่อง <วิถีนินจาสาว มิจิรุจจี้> ยังไงล่ะ!"
1600906-8 = "[s] \"ครูนึกไม่ถึงมาก่อนเลย...\""
1600906-9 = "หา? แหมๆ ท่านอาจารย์... พูดอะไรอย่างนั้นเล่า?"
1600906-10 = "ข้าน้อยอุตส่าห์พูดเป็นนัยไปก่อนเพื่อให้ท่านอาจารย์คาดเดาได้แล้วนะ!"
1600906-11 = "[s] \"พูดเป็นนัย??\""
1600906-12 = "ใช่แล้วละ ท่านอาจารย์ยังพูดเองเลยนี่ว่าจู่ๆ ข้าน้อยก็เปลี่ยนหัวเรื่องคุยกะทันหันน่ะ?!"
1600906-13 = "ลองนึกดูสิ! ก่อนที่ข้าน้อยจะเปลี่ยนหัวเรื่องข้าน้อยพูดถึงเรื่องอะไรเอาไว้!"
1600906-14 = "[s] \"มิจิรุบอกว่าลืมมังงะเล่มที่ 19 เอาไว้ที่ชาเล่ต์...\""
1600906-15 = "นั่นแหละ ใช่แล้ว! อย่างที่ท่านอาจารย์รู้ คามาโบโกะ ภาควายุสลาตันเล่มที่ 19 น่ะ มีตอนที่มีความหมาย#nยิ่งใหญ่อยู่ในนั้นด้วยนะ! "
1600906-16 = "ในเล่ม 19 คามาโบโกะจังที่เป็นตัวเอกของเรื่องก็ได้รับเคล็ดวิชานินจาที่เป็นเอกลักษณ์ของตนเอง#nหลังจากฝึกฝนมาเลือดตาแทบกระเด็นเลยละ!"
1600906-17 = "[s] \"งะ...งั้นเหรอ?!\""
1600906-18 = "หาาาา?! ท่านอาจารย์ไม่รู้เรื่องนี้งั้นเหรอ...? อืม... ท่านอาจารย์ยังฝึกฝนไม่เพียงพอสินะ...?"
1600906-19 = "ยังไงก็ตาม ในหมู่คอนเทนต์วิดีโอที่ฮิตกันในช่วงนี้น่ะ วิดีโอชอบตั้งชื่อแนวๆ <ลองทำ XXX ตาม XXX> อะไรทำนองนั้นอยู่นะ?"
1600906-20 = "ข้าน้อยก็เลยเล็งกลุ่มเป้าหมายพวกนั้นและคิดว่าจะถ่ายวิดีโอ <ลองคิดค้นเคล็ดวิชานินจาเฉพาะตัวตาม#nแบบคามาโบโกะ!> ดูน่ะ"
1600906-21 = "เพราะงั้นอุปกรณ์ที่จะใช้ถ่ายวิดีโอในวันนี้ก็คือเจ้านี่ไงเล่า!"
1600906-22 = "ชื่อของมันก็คือ <เซ็ตดอกไม้ไฟปะทุสำหรับนินจา!> เพียงแค่จุดไฟง่ายๆ ก็จะมีประกายไฟออกมาเหมือน#nดอกไม้ไฟเลยละ!"
1600906-23 = "ถ้าใช้เจ้านี่ละก็... จะต้องแสดงสุดยอดเคล็ดวิชานินจาที่ข้าน้อยจินตนาการไว้ออกมาได้อย่างสมบูรณ์#nแบบแน่นอน!"
1600906-24 = "[s1] \"เหมือนแค่แปะคำว่า \"นินจา\" เพิ่มเข้าไปเท่านั้นเองนะ\"\n[s2] \"ใช้ไฟแบบนี้มันไม่อันตรายเหรอ? ระวังด้วยละ\""
1600906-25 = "เอาละๆ อย่าสนใจเรื่องเล็กๆ น้อยๆ เลย! ข้าน้อยเตรียมการเอาไว้พร้อมแล้ว ไม่ต้องห่วงหรอก!"
1600906-26 = "เอาละๆ อย่าสนใจเรื่องเล็กๆ น้อยๆ เลย! ข้าน้อยเตรียมการเอาไว้พร้อมแล้ว ไม่ต้องห่วงหรอก!"
1600906-30 = "ข้าน้อยเตรียมน้ำเอาไว้ถังหนึ่งแล้ว เผื่อเกิดเหตุฉุกเฉินขึ้นน่ะ อืม... แล้วก็คิดสตอรี่บอร์ดไว้แล้วว่าจะ#nแสดงเคล็ดวิชานินจาให้ออกมาสมบูรณ์แบบยังไงดี... สมบูรณ์แบบที่สุด!"
1600906-31 = "ถ้างั้นเอาละนะ ท่านอาจารย์...! ถ่ายให้ดีๆ ด้วยนะ-?"
1600906-32 = "ข้าน้อยจะเริ่มการแสดงเคล็ดวิชาแบบโดดเด่นแล้ว--!"
1600906-39 = "― ถ้างั้น... ข้าน้อยจะแสดงให้ดูแล้วนะ![wa:890] "
1600906-41 = "― เคล็ดวิชานินจาแบบใหม่...ที่ข้าน้อยคิดค้นขึ้น![wa:3110] "
1600906-44 = "― <เคล็ดวิชานินจา! เปลวอัคคีประกายแสง!>[wa:1590] "
1600906-47 = "― อ่ะฮะฮะ! ท่านอาจารย์-! เป็นยังไงบ้าง?[wa:1400] "
1600906-49 = "― ใช้ได้เลยใช่มั้ย??"
1600906-52 = "― ถ่ายวิดีโอภาพลักษณ์ที่สุดยอดของข้าน้อยออกมาได้ดีรึเปล่า??[wa:10] "
1600906-55 = "― ความมหัศจรรย์... ที่สมกับเป็นนินจาแบบนี้ สมบูรณ์แบบที่สุด![wa:2040] "
1600906-57 = "― สมแล้วละ...ที่ข้าน้อยเป็นหัวหน้าสุดแกร่งแห่งชมรมวิจัยศาสตร์นินจา![wa:1280] "
1600906-60 = "― อ๊ะ...ความสุดยอดจะเริ่มต้นจากตรงนี้แล้วนะ[wa:280] "
1600906-62 = "― คอยดูข้าน้อยให้ดีล่ะ!"
1600906-65 = "― หนึ่ง สอง...![wa:520] "
1600906-69 = "ย้าาา~! เป็นยังไงบ้าง~? ข้าน้อยเจ๋งมากเลยใช่มั้ย?"
1600906-70 = "อื้อ! ข้าน้อยมีลางสังหรณ์ที่ดี สัมผัสได้ว่าเรื่องดีๆ กำลังจะเกิดขึ้น! ถ้าเป็นแบบนี้ละก็ ยอดวิวคลิปวิดีโอ#nคราวนี้จะต้องพุ่งทะลุเพดานแน่ๆ!"
1600906-71 = "ถ้าเป็นแบบนั้นข้าน้อยจะใส่ชื่อท่านอาจารย์ไว้ในส่วนขอบคุณพิเศษในคลิปแล้วกันนะ!"
1600906-75 = "[ns] \"อ๊ะ แต่ว่ามิจิรุ... ปลายผมของเธอ...\""
1600906-76 = "หืม...?"
1600906-77 = "อ๊ะ ระ...ร้อนนน! อะไรเนี่ยยย?! วะ...ว้ากกกก?!"
1600906-78 = "ทะ...ท่านอาจารย์~! น้ำๆ... รีบเอาน้ำมาเร็ว... คะ...เคล็ดวิชาเรียกน้ำว่องไว...!"
1600906-79 = "[ns] \"จะทำแบบนั้นได้ไงเล่า...! เอาหัวมาจุ่มในถังนี่เร็ว...!\""
1600906-83 = "บุ๋งๆๆ...! แค่กๆ...!"
1600906-85 = "(โชคดีที่คุณครูมีปฏิกิริยาตอบสนองที่ว่องไว เลยดับไฟได้อย่างรวดเร็วก่อนจะเกิดเรื่องใหญ่ขึ้น...)"
1600906-87 = "อันเมื่อกี้ยกเลิกนะ! ยกเลิกไปเลย! มะ...มาถ่ายกันใหม่! คราวนี้ของจริง...!"
1600906-88 = "หืม? ไม่ได้งั้นเหรอ...?"
1600906-89 = "ทะ...ทำไมล่ะ ท่านอาจารย์...?!"
1600906-90 = "[s3] \"มันอันตราย แล้วถ้าปล่อยไว้แบบนี้จะเป็นหวัดเอานะ\"\n[s4] \"คิดหัวข้ออื่นกันเถอะ เอาที่ไม่อันตรายกับมิจิรุน่ะ\""
1600906-91 = "อ๊ะ... ท่านอาจารย์คิดถึงข้าน้อย... เลยบอกว่าไม่ได้งั้นเหรอ?"
1600906-92 = "อ๊ะ... ท่านอาจารย์คิดถึงข้าน้อย... เลยบอกว่าไม่ได้งั้นเหรอ?"
1600906-93 = "ถะ....ถ้างั้นก็ช่วยไม่ได้นะ! อื้มมม ช่วยไม่ได้จริงๆ นั่นแหละ..."
1600906-94 = "วะ...ว้ากกก! ทำอะไรไม่ได้อย่างที่คิดแบบนี้มันน่าอึดอัดชะมัดเลย!"
1600906-95 = "แต่ยังไงก็เถอะ... จิโดริ มิจิรุ หัวหน้าชมรมวิจัยศาสตร์นินจาผู้นี้จะไม่ยอมแพ้ง่ายๆ เด็ดขาด!"
1600906-96 = "ข้าน้อยจะต้องหาวิธีให้ได้...! สักวันหนึ่งจะต้องทำคลิปวิดีโอนินจาผู้ยิ่งใหญ่ออกมา..."
1600906-97 = "และทำให้ทุกคนในคิโวทอสได้รู้จักกับนินจามากขึ้น และก็เพิ่มยอดผู้ติดตามช่องของข้าน้อยให้เป็นเลข#nสามหลักให้ได้เลย!"
1600906-98 = "[s] \"ดูไม่ออกเลยแฮะว่าเป้าหมายมันแปลกๆ หรือว่าหวังสูงเกินไปรึเปล่า...\""
1600906-99 = "โธ่เอ๊ย~ เรื่องเล็กน้อยพวกนั้นอย่าไปใส่ใจเลยน่า! ด้อนวอรี่~!"
1600906-100 = "จากนี้ไปเวลาที่ข้าน้อยจะทำคอนเทนต์วิดิโอ... และกิจกรรมของชมรมวิจัยศาสตร์นินจา..."
1600906-101 = "ก็ขอความร่วมมือจากท่านอาจารย์ด้วยนะ-! "
1600906-102 = "[s] \"อื้อ ได้เลย!\""
1600906-103 = "อุวะฮะฮะ อื้อ-!"

1600906-69 = "3;미치루;03;이얍, 이얍~! 어떠냐~! 멋지지?\n#3;a\n#3;hophop\n#3;em;[반응]"
1600906-70 = "3;미치루;01;응! 이거, 느낌이 좋아! 촉이 온다고나 할까! 이대로면 이번 영상의 조회수는 대박이 날 거야!"
1600906-71 = "3;미치루;03;그렇게 되면 스페셜 땡스에 친히 선생 공의 이름도 적어줄 테니까 말이야!\n#3;em;[재잘]"

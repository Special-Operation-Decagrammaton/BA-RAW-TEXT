[translation]
1600906-1 = "忍者少女想發光發亮"
1600906-2 = "百鬼夜行．呱呱鴨公園"
1600906-3 = "（於是我來到和三千留約好（？）的公園）"
1600906-4 = "[ns]「來是來了……」"
1600906-5 = "哼哼……老師大人或許也有想到了吧，今天會合不是為了別的！"
1600906-6 = "為了我的頻道「少女忍法帖 小小三千留」……"
1600906-7 = "我們今天要將我自創的全新忍術，拍攝影片上傳上去！"
1600906-8 = "[s]「我根本沒想到……」"
1600906-9 = "咦──？"
1600906-10 = "為了讓老師大人察覺，我還埋下很多伏筆耶！"
1600906-11 = "[s]「伏筆？」"
1600906-12 = "沒錯，伏筆。老師大人應該也有覺得，這次MomoTalk上的對話，話題轉換的很不自然對吧？"
1600906-13 = "回想看看！我那時候說了些什麼！"
1600906-14 = "[s]「嗯……我記得你有提到漫畫……」"
1600906-15 = "沒錯！正如老師大人所知道的，《魚板旋風傳》第19集裡面，不是有那段劇情嗎！"
1600906-16 = "主角透過嘔心瀝血的修練，第一次得到專屬自己的原創忍術，這可是經典場面啊！"
1600906-17 = "[s]「第一次聽說！」"
1600906-18 = "什，什麼！？呃呃呃，原來老師大人也還在修行途中啊……"
1600906-19 = "總之，最近不是流行像是「嘗試製作XX中出現的XX」，這種「嘗試製作」類的影片嗎？"
1600906-20 = "所以我也想跟上潮流拍攝類似影片，標題就叫：「嘗試製作感覺會出現在魚板疾風傳裡的自創忍術！」"
1600906-21 = "而今天要拍的忍術，是這個！"
1600906-22 = "其名為「火焰亂舞忍者煙火套組」！只要點一次火，就會出現華麗火花的好東西！"
1600906-23 = "這下就能讓老師大人，見識到我完美的忍術！"
1600906-24 = "[s1] 「怎麼感覺只是硬加上『忍者』這兩個字……」\n[s2]「用火會有點危險吧？要小心點喔。」"
1600906-25 = "唉唷，別在意那種小事啦！而且我已經準備十足了，不要緊！"
1600906-26 = "唉唷，別在意那種小事啦！而且我已經準備十足了，不要緊！"
1600906-30 = "我已經備好一桶水在旁邊了！然後也已經在腦中構思好，整套影片的流程了！"
1600906-31 = "那麼，老師大人！你要好好拍唷！"
1600906-32 = "預備……！"
1600906-39 = "― 那麼我這就讓你看看！[wa:1930] "
1600906-41 = "― 我所構思的，新三千留流忍術！[wa:4350] "
1600906-44 = "― 「忍法．閃亮火焰之術！」[wa:2590] "
1600906-47 = "― 啊哈哈！老師大人──！怎麼樣啊？[wa:2240] "
1600906-49 = "― 感覺很不錯吧？"
1600906-52 = "― 有好好拍下我的英姿嗎？[wa:1730] "
1600906-55 = "― 這極具忍者風格，拍案叫絕的感覺……太完美了！[wa:3480] "
1600906-57 = "― 我果然是，忍術研究部最強的部長！[wa:3240] "
1600906-60 = "― 啊，接下來還會更有看頭，[wa:1440] "
1600906-62 = "― 好好看清楚喔！"
1600906-65 = "― 一～二！！[wa:840] "
1600906-69 = "啊哈哈哈，很酷吧！？"
1600906-70 = "嗯！又漂亮又酷炫！這下要大紅大紫了！"
1600906-71 = "啊，特別感謝名單裡，當然也會寫上老師大人的名字！"
1600906-75 = "[ns]「啊，三千留！你圍巾的尾端……！」"
1600906-76 = "嗯……？"
1600906-77 = "好──燙！怎麼回事！？怎麼會這麼燙！？"
1600906-78 = "老，老師大人！？水，給我水！快施展水系忍術啊……！"
1600906-79 = "[ns]「抱歉，我手邊只有水桶……！」"
1600906-83 = "噗哇啊啊啊啊！？咳咳，咳咳……"
1600906-85 = "（幸好，我們都沒有意外受傷）"
1600906-87 = "嗚哇哇～！剛剛那樣不行！重拍！重拍一次！"
1600906-88 = "咦？不行嗎？"
1600906-89 = "為，為什麼！？"
1600906-90 = "[s3]「因為很危險。而且這樣下去會感冒的。」\n[s4]「改天想個安全的方法再來吧。」"
1600906-91 = "嗚嗚……"
1600906-92 = "嗚嗚……"
1600906-93 = "那我也沒什麼好反駁的了……"
1600906-94 = "嗚呃……雖然感覺有些可惜……！雖然事情不盡人意會讓人覺得很鬱悶！"
1600906-95 = "不過我，千鳥三千留！忍術研究部的部長！絕不放棄！"
1600906-96 = "今後我會繼續帶來超棒的忍者相關創作……"
1600906-97 = "向整個奇普托斯宣揚忍者知識，讓我的頻道訂閱數達到三位數！"
1600906-98 = "[s]「真不知道這目標要算高還是算低……」"
1600906-99 = "別在意！別在意！"
1600906-100 = "今後的影片拍攝……以及忍術研究部的活動！"
1600906-101 = "老師大人都會願意幫忙對吧！"
1600906-102 = "[s]「當然。」"
1600906-103 = "謝謝！！"

1600906-77 = "3;미치루;04;앗-뜨, 거엇! 뭐, 뭐야?! 우, 우와아앗?!\n#3;stiff"
1600906-78 = "3;미치루;04;서, 선생 공?! 무, 물물물……! 빨리 물을 소환하는 인법을……!\n#3;hophop"

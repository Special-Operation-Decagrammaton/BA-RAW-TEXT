201070-48 = "3;프라나;11;하지만 그녀가 가짜 총학생회장이라는 것만큼은 확실합니다."
201070-49 = "3;프라나;99;무엇보다 그녀는 <싯딤의 상자>의 OS인 저희들을 인식하지 못하고 있으니까요."
201070-50 = "3;프라나;05;<싯딤의 상자>는 단순한 오파츠가 아닌 키보토스의 본질에 간섭하는 도구.\n#3;em;[반응]"
201070-51 = "3;프라나;11;이는 제가 있던 세계에서도 마찬가지였습니다. 키보토스의 총학생회장이라면 <싯딤의 상자>를 모를 리가 없습니다."
201070-52 = "3;프라나;06;그런데 이를 인지하지 못한다면 아무리 능력이 뛰어나더라도 진짜 총학생회장이라 할 수 없습니다.\n#3;stiff"
201070-53 = "3;프라나;11;이는 그저 총학생회장을 [ruby=미메시스]연기하는 자[/ruby]일 뿐이지요.\n#3;em;…"
201070-54 = "3;프라나;05;그동안 발생했던 미메시스의 선례들처럼, 그녀는 키보토스의 질서를 무너트리고 혼란을 야기할 것입니다."

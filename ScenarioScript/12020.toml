[translation]
12020-1 = "Episode 2;The Gehenna Head Prefect"
12020-2 = "Sorasaki Hina. Gehenna's head prefect. "
12020-3 = "Her appearance matches her file. That must be her."
12020-4 = "But Gehenna's head prefect is the highest ranking member of their armed forces. What would bring someone like her all the way out here?"
12020-6 = "..."
12020-7 = "Y-You see, President, I-I mobilized our forces to...arrest a group of troublemakers, and..."
12020-8 = "You mean Problem Solver 68? From what I can see, the only ones you're confronting right now are Schale."
12020-9 = "Huh? Problem Solver should be..."
12020-12 = "*whoosh*"
12020-13 = "Wh-When did they escape?! They were just here... "
12020-14 = "..."
12020-15 = "S-So...I-I can explain everything, President."
12020-16 = "..."
12020-17 = "No, that's all right. I think I understand."
12020-18 = "This must have been done for the sake of identifying and removing Gehenna's risk factors."
12020-19 = "..."
12020-20 = "But, Ako, we're the Prefect Team, not the Student Council."
12020-21 = "Schale, the Tea Party...the General Student Council president... Those things are best left to the raccoons of the Pandemonium Society."
12020-22 = "We'll discuss the details when I get back. Cut all communications and take some time to reflect in the Prefect Team club room, Ako."
12020-23 = "...Yes, ma'am."
12020-26 = "..."
12020-28 = "..."
12020-29 = "..."
12020-30 = "..."
12020-31 = "..."
12020-32 = "[s] \"...\""
12020-33 = "Now's our chance to try again."
12020-35 = "W-Wait! The Gehenna head prefect is extremely powerful. There's no one stronger than her in all of Kivotos!"
12020-36 = "We can't rush in headfirst. We have to negotiate! Why do you guys like fighting so much?"
12020-37 = "...U-Um."
12020-39 = "We're the Abydos Foreclosure Task Force, Miss Head Prefect."
12020-40 = "Do you understand the situation?!"
12020-41 = "..."
12020-42 = "Of course."
12020-43 = "There has been an unauthorized troop deployment in another district without prior notice as well as clashes with other academy students."
12020-44 = "...But it is also true that you interfered in the business of the Prefect Team, Abydos."
12020-45 = "...?! "
12020-46 = "Okay."
12020-47 = "So?"
12020-48 = "Our position has not changed."
12020-49 = "Wait... Problem Solver is gone, and the number of enemy troops hasn't changed. All we have is Sensei...and I can't stop the others..."
12020-50 = "I wish Hoshino was here right now..."
12020-51 = "...Hoshino? "
12020-52 = "...?"
12020-53 = "Could Abydos' Hoshino be...Takanashi Hoshino?"
12020-54 = "Huh?"
12020-55 = "Heh. What's all this, now? What a mess."
12020-60 = "!"
12020-61 = "What?!"
12020-62 = "H-Hoshino?!"
12020-64 = "Sorry, sorry. I was just taking a little nap. I know I'm late."
12020-65 = "..."
12020-67 = "What took you so long?! It was nuts here! Those Gehenna punks were..."
12020-68 = "But we defeated all of them."
12020-69 = "Well, not all of them..."
12020-71 = "The Gehenna Prefect Team... You followed Problem Solver all the way here?"
12020-72 = "..."
12020-73 = "All right, I don't know what happened, but everyone in the Foreclosure Task Force is present. So shall we try this again, Prefect Team?"
12020-74 = "..."
12020-75 = "...You've changed a lot since your first year. I almost didn't recognize you."
12020-76 = "Huh? Do you know me?"
12020-77 = "When I was on the Intelligence Committee, I took note of any students of interest in each district. "
12020-78 = "I could never forget you, Takanashi Hoshino... I thought you left Abydos after the incident."
12020-79 = "..."
12020-80 = "...I see. So that's what happened. That's why Schale..."
12020-81 = "..."
12020-82 = "Well, never mind. I didn't come here to fight. "
12020-84 = "...Iori. Chinatsu."
12020-86 = "Y-Yes, President."
12020-87 = "...Yes."
12020-92 = "Gather the troops. We're pulling out."
12020-93 = "What?!"
12020-94 = "Pulling out?!"
12020-100 = "*bows*"
12020-101 = "Huh?"
12020-102 = "Sh-She bowed?!"
12020-103 = "I, Sorasaki Hina, Gehenna Head Prefect, formally apologize to the Abydos Foreclosure Task Force..."
12020-104 = "...for the unauthorized deployment and use of forces within a foreign district."
12020-105 = "...!"
12020-106 = "...?!"
12020-107 = "...!"
12020-108 = "Gehenna's Prefect Team will no longer enter this area without authorization. I ask for your forgiveness and understanding."
12020-111 = "President..."
12020-112 = "W-Wait a minute, President! What about the ones who violated the rules? What about Problem Solver?"
12020-113 = "(glare)"
12020-114 = "O-Oh..."
12020-115 = "Let's go home."
12020-118 = "..."
12020-120 = "*whish*"
12020-121 = "All the Prefect Team's forces...vanished from Abydos in the blink of an eye..."
12020-122 = "To be able to move such a large force so quickly... The head prefect is really something."
12020-123 = "What a shame. It was a good opportunity to fight some powerful enemies."
12020-124 = "Shiroko must have the blood of warriors... Then again, I'm not one to turn down a fight either."
12020-125 = "This old-timer is having a hard time trying to wrap her head around what's going on. What happened?"
12020-126 = "I don't know... Why was the head prefect here?"
12020-127 = "We don't have a clue either! Where were you?!"
12020-129 = "Sorry, sorry. "
12020-130 = "*sigh* I feel like...things are getting out of hand."
12020-131 = "It's all so chaotic...and hard to navigate. "
12020-132 = "Ayane..."
12020-133 = "Right. So much happened today... We shouldn't push ourselves to do any more. We need to rest."
12020-134 = "Yes. Let's disband for today and figure out the situation at school tomorrow."
12020-135 = "...Hmm, okay. You're right, Ayane. Let's call it a day. We'll meet in the club room early tomorrow."
12020-136 = "Okay."
12020-137 = "Got it. I need a shower, anyway..."
12020-141 = "...Sensei. "
12020-142 = "I think the head prefect said something to you before she left..."
12020-143 = "What was it?"
12020-146 = "*sigh*"
12020-147 = "Iori, are you okay? "
12020-148 = "I was threatened with a shotgun, rolled around, scolded by Ako, and stared down by the president. It's been a...tough day."
12020-149 = "...I see. "
12020-150 = "Um... Can you please not give me that pitiful look?"
12020-151 = "It's called sympathy, Iori."
12020-152 = "...Okay."
12020-157 = "...Sensei of Schale."
12020-158 = "[s] \"You wanted to talk to me?\""
12020-159 = "Yes. I have something I need to tell you."
12020-160 = "I thought it best that you hear about it in advance."
12020-161 = "[s] \"What is it?\""
12020-162 = "...Are you familiar with the Kaiser Corporation?"
12020-163 = "[s1] \"I know it very well.\"\n[s2] \"I've heard of it.\""
12020-164 = "...I see. "
12020-165 = "...I see. "
12020-166 = "..."
12020-167 = "Both Pandemonium and the Tea Party have yet to receive this information."
12020-168 = "But I thought you should know."
12020-169 = "..."
12020-171 = "I think the Kaiser Corporation is up to something in the abandoned desert of Abydos."
12020-172 = "[s3] \"In the Abydos Desert...\"\n[s4] \"The Kaiser Corporation?\""
12020-173 = "Yes. I had no interest in informing Abydos. Their academy will soon be shut down anyway."
12020-174 = "Yes. I had no interest in informing Abydos. Their academy will soon be shut down anyway."
12020-175 = "...Well, then."
12020-176 = "See you next time, [USERNAME] Sensei."
12020-179 = "..."
12020-180 = "[s] \"I'll tell you with everyone present.\""
12020-181 = "...Okay, Sensei."
12020-182 = "Then let's head back."
12020-184 = "Next Episode;Farewell, Problem Solver 68"

[translation]
12020-1 = "第2話;格黑娜風紀委員長"
12020-2 = "格黑娜風紀委員長……空崎陽奈。"
12020-3 = "長相也和我們掌握到的情報一致，應該是本人沒錯。"
12020-4 = "不過說到格黑娜風紀委員長……可說是格黑娜學園頂尖的戰鬥力……#n居然連那個等級的人都來到了這裡……"
12020-6 = "……"
12020-7 = "那，那個……這是為了抓住那些素行不良的學生……"
12020-8 = "便利屋68？在哪裡？現在看起來像是在和夏萊及阿拜多斯對峙吧。"
12020-9 = "咦，便利屋的話在那裡……"
12020-12 = "（空無一人）"
12020-13 = "他，他們什麼時候逃走了！？剛，剛才明明還在那裡的啊……！"
12020-14 = "……"
12020-15 = "那，那個……委員長，我會全部說明清楚的。"
12020-16 = "……"
12020-17 = "不必了。情況我已經大致了解。"
12020-18 = "就我來看是確認及排除對格黑娜的不安因素。屬於政治活動的一環吧。"
12020-19 = "……"
12020-20 = "不過亞子，我們是風紀委員會，而不是學生會。"
12020-21 = "夏萊、茶會……聯邦學生會長……#n那種事交給[ruby=Pandemonium Society]「萬魔殿」[/ruby]那群狸貓就好了。"
12020-22 = "詳細的事等回去之後再說。#n中斷通訊後待在風紀委員會自省吧，亞子。"
12020-23 = "……是。"
12020-26 = "……"
12020-28 = "……"
12020-29 = "……"
12020-30 = "……"
12020-31 = "……"
12020-32 = "[s]「…………」"
12020-33 = "那就繼續戰鬥吧。"
12020-35 = "請，請等一下！格黑娜的風紀委員長，可是奇普托斯幾乎無人能敵的頂尖強者哦！"
12020-36 = "先不要輕舉妄動，嘗試和對方交涉比較好！為什麼那麼好戰啦──！"
12020-37 = "……抱，抱歉。"
12020-39 = "我們是阿拜多斯對策委員會。#n初次見面，格黑娜的風紀委員長。"
12020-40 = "請問已經理解目前的狀況了嗎？"
12020-41 = "……"
12020-42 = "當然。"
12020-43 = "未經通報便在校外自治區動用武裝兵力，並和其他學園的學生發生衝突。"
12020-44 = "……不過你們也確實阻礙了風紀委員會的公務不是嗎？"
12020-45 = "──！？ "
12020-46 = "也許是吧。"
12020-47 = "所以呢？"
12020-48 = "我們的想法是不會改變的唷？"
12020-49 = "請等一下……！便利屋的人已經不在，對方的兵力卻沒有任何改變。#n只剩下老師的我們……就算要勸阻對方也很困難……！"
12020-50 = "啊嗚，這種時候要是星野前輩在的話……！"
12020-51 = "……星野？ "
12020-52 = "……？"
12020-53 = "阿拜多斯的星野……難道是……小鳥遊星野……？"
12020-54 = "是？"
12020-55 = "唔嘿～這裡發生了什麼事呀。完全是場大騷動呢～"
12020-60 = "！！"
12020-61 = "咦──！？"
12020-62 = "星，星野前輩！？"
12020-64 = "抱歉抱歉，大叔我打了個盹，結果就稍微遲到了。"
12020-65 = "……"
12020-67 = "睡午覺──！？這裡明明發生了大事！格黑娜那些傢伙……！"
12020-68 = "不過我們已經把所有人擊退了。"
12020-69 = "沒有擊退所有人吧……"
12020-71 = "格黑娜的風紀委員會嗎～追著便利屋來到這裡的嗎？"
12020-72 = "……"
12020-73 = "嗯……雖然不太清楚發生了什麼事，不過對策委員會已經全員到齊囉。#n要不要再戰一次看看？風紀委員長醬？"
12020-74 = "…… "
12020-75 = "……和1年級的時候相比，簡直判若兩人。"
12020-76 = "……嗯？你認識我嗎？"
12020-77 = "我還在情報部的時候，大致掌握了各自治區有哪些需要注意的學生。"
12020-78 = "尤其是小鳥遊星野……我是不會忘記你的。#n我以為你在那個事件後離開了阿拜多斯。"
12020-79 = "……"
12020-80 = "……原來如此。#n所以夏萊才會……"
12020-81 = "……"
12020-82 = "算了，我也不是來這裡戰鬥的。"
12020-84 = "……伊織、千夏。"
12020-86 = "……委員長。"
12020-87 = "……是。"
12020-92 = "準備撤退，該回去了。"
12020-93 = "咦──！？"
12020-94 = "要回去嗎！？"
12020-100 = "（低頭）"
12020-101 = "咦──？"
12020-102 = "居然彎下腰了！？"
12020-103 = "未經通報動用兵力，並於其他自治區製造動亂。"
12020-104 = "針對這件事，格黑娜風紀委員長空崎陽奈向阿拜多斯的對策委員會正式致歉。"
12020-105 = "！"
12020-106 = "！？"
12020-107 = "！！"
12020-108 = "往後不會再有格黑娜風紀委員會無故入侵這裡的事情發生。請各位原諒。"
12020-111 = "委員長……"
12020-112 = "等，等一下，委員長！那些違反校規的人……便利屋怎麼辦！？"
12020-113 = "（瞪）"
12020-114 = "啊，唔……"
12020-115 = "好了，回去吧。"
12020-118 = "……"
12020-120 = "（咻……）"
12020-121 = "風紀委員會的所有兵力……正以飛快的速度撤離阿拜多斯……"
12020-122 = "居然能夠一絲不亂地指揮著那麼龐大的兵力……風紀委員長，真是厲害的人物呢。"
12020-123 = "真可惜。原本是個可以和強敵交手的機會。"
12020-124 = "白子前輩怎麼像某個地方的戰鬥民族一樣……#n不過換作是我，受到對方挑釁的話當然也是不會逃跑的。"
12020-125 = "唔嘿～結果大叔我完全搞不清楚現在是什麼情況，究竟是怎麼回事呢？"
12020-126 = "就是說呀……風紀委員長為什麼會來到這裡呢？"
12020-127 = "沒錯，我們也一樣搞不清楚狀況！#n而且前輩你剛才到底跑去哪裡了啊……！"
12020-129 = "抱歉抱歉。"
12020-130 = "唉……總覺得事情好像越鬧越大了。"
12020-131 = "事件接二連三發生……根本來不急好好整理。"
12020-132 = "綾音醬……"
12020-133 = "說得也是。#n今天實在發生了太多事……我們不要勉強，回去休息吧。"
12020-134 = "是。那麼我們今天就先解散，明天再到學校裡整理情況吧。"
12020-135 = "……嗯，今天就照綾音醬說的先解散吧，明天再到社團教室集合。"
12020-136 = "就那麼做吧。"
12020-137 = "想趕快沖個澡……"
12020-141 = "……老師。 "
12020-142 = "剛才風紀委員長離開之前好像跟老師說了些什麼……"
12020-143 = "有什麼事嗎？"
12020-146 = "呼……"
12020-147 = "伊織，你沒事吧？"
12020-148 = "被散彈槍近身掃射，肚子還被槍托擊中，被打得飛來飛去的……#n不僅被亞子醬罵，還被委員長瞪……今天運氣真背。"
12020-149 = "……就是說啊。"
12020-150 = "我說……可以不要用像在看可憐小狗的眼神看著我嗎……？"
12020-151 = "這叫做同病相憐，伊織。"
12020-152 = "……這樣啊。"
12020-157 = "……夏萊的老師。"
12020-158 = "[s]「嗯？是叫我嗎？」"
12020-159 = "是。我有話要跟你說。"
12020-160 = "我認為直接告訴你會比較好。"
12020-161 = "[s] 「是什麼事？」"
12020-162 = "……你知道凱薩公司嗎？"
12020-163 = "[s1]「……我很清楚。」\n[s2]「……大致上知道。」"
12020-164 = "……是嗎。 "
12020-165 = "……是嗎。 "
12020-166 = "……"
12020-167 = "雖然這是萬魔殿和茶會都不知道的情報……"
12020-168 = "……不過讓你知道或許會比較好。"
12020-169 = "……"
12020-171 = "阿拜多斯被遺棄的沙漠……凱薩公司似乎正在那裡進行著什麼計劃。"
12020-172 = "[s3]「阿拜多斯的沙漠……」\n[s4]「凱薩公司……？」"
12020-173 = "沒錯。本來是沒有義務告知預計將廢校的阿拜多斯的……"
12020-174 = "沒錯。本來是沒有義務告知預計將廢校的阿拜多斯的……"
12020-175 = "……姑且，告知一下。"
12020-176 = "下次見囉，[USERNAME]老師。"
12020-179 = "……"
12020-180 = "[s]「等大家到齊的時候再說吧。」"
12020-181 = "……嗯，我知道了。"
12020-182 = "那就回去吧，老師。"
12020-184 = "下一話;珍重再見，便利屋68"

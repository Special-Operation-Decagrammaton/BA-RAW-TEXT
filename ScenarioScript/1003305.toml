[translation]
1003305-1 = "A Date Gone Slightly Awry"
1003305-2 = "Just to be safe, I arrived at the meeting place with Wakamo early to get ahead of any possible trouble."
1003305-3 = "[ns] \"We're supposed to meet somewhere around here...\""
1003305-4 = "Heehee. You're here early, Sensei."
1003305-5 = "[s] \"What the...?\""
1003305-11 = "Why the confused look? It's as though you don't even recognize me."
1003305-13 = "*sigh* I should come to expect it by now, but every time I see you for the first time after a while, an indescribable pain grips my heart."
1003305-15 = "It feels like it could burst out of my chest at any moment, and butterflies fill my stomach."
1003305-17 = "I can hardly control myself or bear to be out of your arms for a moment longer."
1003305-21 = "[ns] \"Is that you...Wakamo?!\""
1003305-22 = "Heehee. Yes, my darling. It's me: Your one and only. ♥"
1003305-23 = "[s] \"You look so different...\""
1003305-24 = "Do I?"
1003305-25 = "I suppose this is different than my usual attire."
1003305-26 = "I wanted to wear something special for our second date."
1003305-27 = "Besides, I feared my usual attire would draw too much unwanted attention."
1003305-28 = "It wouldn't be an issue if I was only following your lead as I was last time."
1003305-29 = "However, if we'll be going everywhere today locked arm in arm, then it's only natural I'd want to look my best while I'm by your side."
1003305-30 = "[s] \"How considerate...\""
1003305-31 = "Of course. I care about you more than anyone in this world. ♥"
1003305-32 = "Now, we shouldn't waste a single moment together, Sensei.#nI want everything today to be perfect!"
1003305-38 = "Shall we be off? I've been looking forward to this for so long."
1003305-39 = "[s] \"Uh, yeah. Me too.\""
1003305-42 = "I locked arms with Wakamo, and she led us to the restaurant she made a reservation at for lunch."
1003305-45 = "Here we are. I booked a table for two just for us."
1003305-46 = "[s] \"I wasn't expecting somewhere so luxurious.\""
1003305-47 = "Are you surprised? "
1003305-48 = "Maybe you were expecting something more traditional."
1003305-49 = "That kind of atmosphere may be good for our next date, then..."
1003305-50 = "I got the idea to make a reservation here from a dating advice book I've been reading. It said bringing a love interest to high-end establishments like this shows how much you value them."
1003305-51 = "[s] \"You've been reading books for this kind of thing?\""
1003305-52 = "Never mind that, Sensei. Let's find our table."
1003305-57 = "Ah! I'm terribly sorry!"
1003305-58 = "I beg your pardon?"
1003305-59 = "I regret to inform you that we had to close early for the day due to unforeseen circumstances."
1003305-60 = "But...I already made a reservation."
1003305-61 = "M-My apologies. We received last-minute notice that a special guest would be visiting today, and..."
1003305-62 = "[s] \"A special guest?\""
1003305-63 = "Yes. Meat & Potatoes, the famous viral food critic, is visiting our establishment."
1003305-64 = "Our management has ordered us to provide the perfect meal to bolster our restaurant's reputation online."
1003305-65 = "This is our big chance to go viral as well!"
1003305-66 = "I'm terribly sorry, but hopefully you can see why we had no choice but to close down early for the day and cancel all reservations."
1003305-72 = "[ns] \"W-Wakamo?\""
1003305-73 = "N-Naturally, we don't intend to turn you away empty-handed."
1003305-74 = "Please accept this dining voucher!"
1003305-75 = "Present this voucher next time you visit, and you'll be treated to the finest dining experience we have to offer—free of charge!"
1003305-79 = "[ns] \"W-Wakamo? It's okay. We can just go to the next place on the list!\""
1003305-82 = "Our day got off to a bad start, and I began to get a bad feeling about Wakamo's mood."
1003305-85 = "Next up was the dessert cafe she picked out."
1003305-86 = "A-Ahem."
1003305-87 = "Our restaurant reservation may have gone awry..."
1003305-88 = "...but fear not, Sensei."
1003305-89 = "I thoroughly researched everything on today's itinerary and found the absolute best desserts for us to savor together."
1003305-90 = "I read in the local guidebook I'm holding that this cafe offers a special couples-only dessert menu."
1003305-91 = "Doesn't that sound lovely?"
1003305-92 = "Pardon me, but I couldn't help but overhearing.#nDid you say \"couples-only dessert menu\"?"
1003305-93 = "I'm sorry, but we stopped offering that menu sometime last year.#nMay I take a look at that guidebook you have?"
1003305-98 = "Oh, this thing. I believe our owner wrote this last year for fun."
1003305-99 = "Hahaha!"
1003305-100 = "H-Haha...ha. P-Please excuse me."
1003305-101 = "I didn't think anyone still read guidebooks to decide where to go on dates.#nWhat a weird—er, I mean...interesting—way of doing things. Haha."
1003305-102 = "Anyway, that menu has been discontinued. Sorry about the confusion."
1003305-107 = "[ns] \"I-It's fine, Wakamo! Let's go to the next place!\""
1003305-111 = "We arrived at the next place on the list."
1003305-112 = "Okay, then. Let's hurry, Sensei."
1003305-113 = "I'm sure this time..."
1003305-114 = "...NOTHING will impede us from enjoying ourselves!"
1003305-115 = "All we have to do is board the train that arrives in two minutes and ride it to the nearby theme park. There, we'll catch the performance—"
1003305-121 = "...?"
1003305-126 = "Watch where you're going!"
1003305-127 = "Who the hell do you think you are, princess?#nYou lookin' for a fight?!"
1003305-128 = "Maybe we should teach you a lesson!"
1003305-134 = "[ns] \"L-Let's all calm down here!\""
1003305-137 = "Huh? How am I supposed to stay calm when she nearly dislocated my shoulder?!"
1003305-138 = "It was a close call!"
1003305-139 = "Really close!"
1003305-144 = "[ns] \"Breathe, Wakamo! Breathe!\""
1003305-147 = "Huh?"
1003305-152 = "Pardon me. I should have paid closer attention to where I was going."
1003305-158 = "I HOPE you can forgive me..."
1003305-163 = "Eep!"
1003305-164 = "Y-Yeah, all good...! Just be more careful next time!"
1003305-165 = "L-Let's get out of here!"
1003305-170 = "Phew."
1003305-171 = "*gasp* Our train...!"
1003305-174 = "We missed the train and wouldn't make it to the theme park in time for the performance."
1003305-177 = "N-Never mind that. We can go see a movie, instead."
1003305-178 = "I-In fact, I believe there's a new, um...romantic film that just released!"
1003305-182 = "Wh-What?! It's sold out...?"
1003305-183 = "I refuse to let things end like this."
1003305-185 = "Not again..."
1003305-187 = "I'm sure the next one will go as planned!"
1003305-190 = "Each activity Wakamo had planned failed, one after the other until the day was done."
1003305-194 = "[ns] \"Here. Drink this.\""
1003305-195 = "Oh... Thank you, Sensei."
1003305-196 = "That's very kind of you..."
1003305-197 = "[s] \"Don't look so glum. These things happen.\""
1003305-199 = "I can't help but be disappointed. I tried my best to plan a perfect day with you, but nothing went as I hoped..."
1003305-200 = "This was supposed to be the best day ever, but everything went wrong."
1003305-201 = "I'm so embarrassed that I can hardly stand to look at you.#nI'm so sorry, Sensei. I don't know what else to say."
1003305-202 = "[s1] \"I'm more concerned about you than anything.\"\n[s2] \"You seemed different from your usual self today.\""
1003305-203 = "You're worried about me...?"
1003305-204 = "You're worried about me...?"
1003305-205 = "Oh, I see. You're saying it was out of character for me to not lash out every time something didn't go according to plan today."
1003305-206 = "It should be obvious why I wouldn't do such a thing."
1003305-207 = "[s] \"Is it?\""
1003305-208 = "I made a promise to you. You went out of your way to make time for me.#nThis was my chance to spend time with you and get to know you."
1003305-209 = "The last thing I wanted to do was ruin it."
1003305-210 = "I knew it would only complicate things for you if people discovered who I really was."
1003305-211 = "So I restrained myself to not draw unwanted attention."
1003305-212 = "Especially because, and forgive me if this is a bit presumptuous..."
1003305-213 = "...I know today is not the last time we'll get to be together like this."
1003305-214 = "The last thing I wanted to do was grow impatient.#nI'm sure we'll have more chances than I can count."
1003305-215 = "But it was still nice to see how worried you were about me.#nI really did have your full attention, didn't I?"
1003305-216 = "[s] \"Y-Yeah. I guess so...\""
1003305-217 = "Regrettably, the day is almost over."
1003305-223 = "Could I ask you to spoil me by walking me home?"
1003305-224 = "[s] \"Sure. I'd love to.\""
1003305-225 = "Heeheehee!"
1003305-227 = "The next morning, just as I was ready to start my workday..."
1003305-234 = "I'm ready, Sensei. Let's be off!"
1003305-235 = "[s] \"W-Wakamo?! What are you doing here?\""
1003305-236 = "What am I doing here?"
1003305-237 = "I came to follow up on what we spoke about yesterday evening."
1003305-238 = "It's like I said. I made peace with yesterday's failures because I know we have countless more days to spend with one another."
1003305-239 = "So what better time to get started on that than now?"
1003305-240 = "I have today completely planned out perfectly this time! ♥"
1003305-244 = "[ns] \"...\""
1003305-246 = "And so, I was off to another day out with Wakamo."

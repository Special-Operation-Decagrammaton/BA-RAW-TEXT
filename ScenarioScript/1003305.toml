1003305-57 = "1;지배인;06;앗. 손님. 정말 죄송합니다!\n#1;hophop"
1003305-58 = "3;와카모 사복;02;어머나……?"
1003305-59 = "1;지배인;09;죄송하지만 오늘 하루 당 점 레스토랑은 영업을 하지 않습니다.\n#1;em;[땀]"
1003305-60 = "3;와카모 사복;07;하지만……. 식사 예약이라면 이미 했는 걸요?\n#3;em;[?]"
1003305-61 = "1;지배인;04;그게……. 죄송합니다. 저희 레스토랑에 갑작스레 특별한 손님이 오시게 되어서…….\n#1;stiff"
1003305-62 = "[s] \"특별한 손님?\""
1003305-63 = "1;지배인;02;네, 오늘 키보토스에서 최고의 미식평론가 중 한 명으로 유명한 「고기감자조림좋아」 님께서 당 점을 찾아주신 터라…….\n#1;em;[반응]\n#1;m3\n#3;dr"
1003305-64 = "1;지배인;08;이번 기회에 완벽한 코스를 제공하면, 저희 레스토랑도 단숨에 화제도 업! 인기 업!\n#1;hophop\n#1;em;[반짝]"
1003305-65 = "1;지배인;03;유명한 레스토랑으로 거듭날 기회……!"
1003305-66 = "1;지배인;09;때문에 정말 면목이 없습니다만……. 오늘 하루 가게의 영업은 전면 중단하기로 하였습니다.\n#1;greeting"

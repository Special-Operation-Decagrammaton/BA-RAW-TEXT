1003305-45 = "3;와카모 사복;03;후후훗. 오늘 예약한 곳은 이곳이랍니다.\n#3;em;[반짝]\n#3;a"
1003305-46 = "[s] \"이런 고급 레스토랑이라니, 조금 의외네.\""
1003305-47 = "3;와카모 사복;02;……어머나, 그러신가요? \n#3;em;[?]"
1003305-48 = "3;와카모 사복;01;아. 저는 좀 더 전통적인 분위기를 좋아할 것 같았다……?"
1003305-49 = "3;와카모 사복;99;후후. 그렇군요. 물론 그런 정취 또한 나름의 멋이 있어 나쁘지 않은 것이 사실이지만…….\n#3;em;…"
1003305-50 = "3;와카모 사복;00;그래도 데이트 관련 조언이 담긴 서적에서는, 이런 곳이야말로 사랑하는 이와 함께하기 좋은 곳이라 적혀 있었기에…….\n#3;greeting"
1003305-51 = "[s] \"……응? 무슨 서적?\""
1003305-52 = "3;와카모 사복;02;자아, 이럴 때가 아니에요. 선생님. 안으로 드실까요?\n#3;em;[반응]"

[translation]
1003305-1 = "เดตที่ไม่เป็นไปอย่างที่คิด"
1003305-2 = "(คุณครูรีบไปถึงสถานที่นัดพบเร็วกว่าเวลาที่นัดกับวาคาโมะไว้ เพื่อเตรียมพร้อมสำหรับปัญหาที่#nอาจจะเกิดขึ้น)"
1003305-3 = "[s] “เรานัดเจอกันเวลาประมาณนี้นี่นา”"
1003305-4 = "ฮุฮุฮุ มาถึงเร็วกว่าที่นัดไว้อีกนะคะ คุณครู"
1003305-5 = "[s] \"หืม?\""
1003305-11 = "ตายจริง ทำหน้าแบบนั้น... จำฉันไม่ได้หรือคะ"
1003305-13 = "เฮ้อ ถึงจะพอรู้อยู่บ้างแล้ว แต่ทุกครั้งที่ได้เจอคุณท่านหลังไม่ได้พบกันนาน หัวใจฉันก็ถูกบีบรัด#nและเอ่อล้นด้วยความเจ็บปวดเลยค่ะ..."
1003305-15 = "อา... และพอได้เห็นคุณท่านทำหน้าแบบนั้น ในท้องของฉัน... ก็รู้สึกเหมือนมีผีเสื้อนับพันตัวบินอยู่เลยค่ะ"
1003305-17 = "ถ้าเป็นแบบนี้ต่อไปต้องแย่แน่เลยค่ะ... ทนจะควบคุมตัวเองไม่ไหวแล้วค่ะ"
1003305-21 = "[ns] “ดะ... เดี๋ยวก่อนนะ วะ...วาคาโมะเหรอ?!”"
1003305-22 = "ฮุฮุ ใช่แล้วค่ะ วาคาโมะของคุณท่านเองค่ะ ♡"
1003305-23 = "[s] “ดูต่างไปจากเดิมนะเนี่ย...”"
1003305-24 = "หมายความว่ายังไงเหรอคะ?"
1003305-25 = "อาจต่างไปจากตอนใส่ชุดปกตินิดหน่อยค่ะ"
1003305-26 = "ฮุฮุฮุ ที่แต่งตัวมาแบบนี้ก็เพื่อที่จะได้อยู่เคียงข้างคุณท่านให้นานมากขึ้น"
1003305-27 = "เพราะเวลาใส่ชุดปกติ... ดูยังไงก็ค่อนข้างจะเตะตาคนอื่นไปสักนิด..."
1003305-28 = "ปกติแล้วเวลาที่แอบตามคุณท่าน ถึงจะแต่งตัวแบบนั้นก็ไม่มีปัญหาอะไร แต่ถ้าต้องมาเจอหน้ากันแบบนี้..."
1003305-29 = "เพื่อที่จะได้อยู่เคียงข้างคุณท่านให้นานกว่าเดิม ก็เลยต้องแต่งตัวให้ดีขึ้นสักหน่อยค่ะ"
1003305-30 = "[s] “ใส่ใจแม้กระทั่งเรื่องแบบนั้นเลยสินะ...”"
1003305-31 = "ถ้าเพื่อคุณท่าน ฉันก็พร้อมจะทำทุกอย่างไม่ว่าจะเรื่องอะไรก็ตามค่ะ ♡"
1003305-32 = "ฮุฮุฮุ แต่วันนี้เรามาทำตามแผนเดตที่ฉันวางเอาไว้กันเถอะนะคะ คุณครู!"
1003305-38 = "วันนี้ก็ขอฝากตัวด้วยนะคะคุณครู"
1003305-39 = "[s] \"อืม ฝากตัวด้วยนะ\""
1003305-42 = "(จากนั้นคุณครูก็เดินตามวาคาโมะไปที่ร้านอาหารที่จองไว้เพื่อทานมื้อกลางวัน)"
1003305-45 = "ฮุฮุฮุ ร้านที่จองไว้วันนี้ก็คือร้านนี้ค่ะ"
1003305-46 = "[s] “ภัตตาคารหรูแบบนี้ คาดไม่ถึงเลยนะ”"
1003305-47 = "ตายจริง อย่างนั้นเหรอคะ? "
1003305-48 = "คุณครูคิดว่าฉันจะชอบบรรยากาศแบบดั้งเดิมมากกว่าอย่างนั้นเหรอคะ...?"
1003305-49 = "ฮุฮุ แบบนี้นี่เองสินะคะ แน่นอนว่าที่แบบนั้นมีกลิ่นอายที่มีเสน่ห์ในแบบของตัวเองก็จริง..."
1003305-50 = "แต่ในหนังสือแนะนำเกี่ยวกับการออกเดตบอกไว้ว่าสถานที่แบบนี้เป็นที่ที่เหมาะจะมา#nกับคนที่รัก ฉันก็เลยเลือกที่นี่ค่ะ..."
1003305-51 = "[s] \"หืม...? หนังสืออะไรเหรอ?”"
1003305-52 = "เอาล่ะ! ไม่ใช่เวลามาคุยเรื่องนี้นะคะ เข้าไปข้างในกันเถอะค่ะคุณครู"
1003305-57 = "อ๊ะ คุณลูกค้า ต้องขอโทษด้วยครับ!"
1003305-58 = "ตายจริง...?"
1003305-59 = "ขอโทษด้วยนะครับ วันนี้ร้านปิดครับ"
1003305-60 = "แต่ว่า... ฉันจองไว้แล้วนี่คะ?"
1003305-61 = "คือว่า...ขอโทษด้วยครับ พอดีว่ามีลูกค้าพิเศษมาที่ภัตตาคารของเราอย่างกะทันหัน..."
1003305-62 = "[s] “ลูกค้าพิเศษเหรอ?”"
1003305-63 = "ใช่ครับ วันนี้นักวิจารณ์อาหารชื่อดังและฝีมือดีที่สุดในคิโวทอส คุณ<รักเนื้อวัวตุ๋นมันฝรั่ง>#nจะมาที่ภัตตาคาร..."
1003305-64 = "ถ้าเราใช้โอกาสนี้เสิร์ฟคอร์สอาหารที่เยี่ยมยอดที่สุดละก็ ภัตตาคารของเราจะต้องเป็นที่พูดถึง! และโด่งดังขึ้นในพริบตา!"
1003305-65 = "โอกาสที่จะได้เกิดใหม่เป็นภัตตาคารชื่อดัง...!"
1003305-66 = "ถ้าให้พูดตามความจริงก็คือ... เราตัดสินใจที่จะปิดร้านและยกเลิกนัดจองทั้งหมดเพื่อการนั้นครับ"
1003305-72 = "[ns] \"วะ...วาคาโมะ?\""
1003305-73 = "อ๊ะ ผมไม่ได้ขอให้คุณกลับไปมือเปล่าหรอกนะครับ!"
1003305-74 = "ผมขอมอบบัตรกำนัลอาหารชั้นเลิศของภัตตาคารเราให้เลยครับ!"
1003305-75 = "ถ้ามาใหม่ครั้งหน้าก็จะได้ทานอาหารสุดหรูชั้นเลิศเลยครับ...!"
1003305-79 = "[ns] “นี่ วาคาโมะ...? ไปกันเถอะ! ไปแผนต่อไปกันเลยดีกว่า!”"
1003305-82 = "(แผนของวาคาโมะไม่เป็นไปตามแผนตั้งแต่ก้าวแรก และหลังจากนั้นบรรยากาศก็เริ่มแปลกไป)"
1003305-85 = "(ถัดมาที่ร้านขนมหวาน)"
1003305-86 = "อ่ะแฮ่ม!"
1003305-87 = "ถึงเรื่องร้านอาหารจะผิดแผนไปหน่อย"
1003305-88 = "แต่คุณครูไม่ต้องกังวลไปหรอกนะคะ"
1003305-89 = "วาคาโมะผู้นี้ ทำการสำรวจมาอย่างดีเพื่อวันนี้... และก็เจอร้านขนมหวานที่ดีที่สุด เพื่อที่จะได้มา#nลองทานกับคุณท่านค่ะ"
1003305-90 = "คาเฟ่ขนมหวานนี้มีเมนูเฉพาะที่เสิร์ฟให้กับคู่รักที่มากันสองคนด้วย ฉันอ่านเจอมาจากหนังสือแนะนำค่ะ"
1003305-91 = "ฮุฮุฮุ คิดว่าจะต้องถูกใจคุณครูแน่นอนค่ะ..."
1003305-92 = "เมนูสำหรับคู่รักเหรอครับ? เมนูนั้นหลังจากปีที่แล้วเราก็ไม่ได้ขายแล้วนะครับ"
1003305-93 = "คะ? แต่ว่าฉันเห็นจากหนังสือแนะนำนะ?"
1003305-98 = "อ่า หนังสือที่คุณเจ้าของร้านเขียนเป็นงานอดิเรกเมื่อปีที่แล้วน่ะเหรอครับ?"
1003305-99 = "ฮะฮ่าฮ่าฮ่าฮ่า!"
1003305-100 = "ฮ่าฮ่า... อ่า อ่ะแฮ่ม ขออภัยด้วยครับ"
1003305-101 = "สมัยนี้ยังมีคนที่เลือกสถานที่เดตจากหนังสือแนะนำอยู่อีกเหรอเนี่ย แปลกดีนะ...#nอ๊ะ หมายถึงน่าสนใจดีนะ"
1003305-102 = "แต่ว่าตอนนี้เราไม่ได้ขายเมนูนั้นแล้ว ขออภัยที่ทำให้สับสนนะครับ"
1003305-107 = "[ns] “ถ้างั้นไปที่ต่อไปกันเถอะ! วาคาโมะ!”"
1003305-111 = "(มาถึงสถานที่ต่อไปตามแผนการของวาคาโมะ)"
1003305-112 = "รีบไปกันเถอะค่ะ คุณครู"
1003305-113 = "คราวนี้..."
1003305-114 = "คราวนี้ต้องไม่พลาดแน่นอนค่ะ!"
1003305-115 = "ถ้าขึ้นรถไฟขบวนที่จะมาถึงสองนาทีหลังจากนี้ ก็จะไปทันดูการแสดงที่สวนสนุกใกล้ๆ นี้ได้ทันพอดีค่ะ...!"
1003305-121 = "อุ๊ย...?"
1003305-126 = "เอ๊ะ?! อะไรเนี่ย ตั้งใจเดินชนกันรึไง?!"
1003305-127 = "คุณหนูไร้เดียงสาออกมาเดินเล่นงั้นเหรอ? อยากมีเรื่องรึไง!"
1003305-128 = "อยากโดนสั่งสอนสักหน่อยมั้ยล่ะ~!"
1003305-134 = "[ns] “สะ... สต็อป!! จะ... ใจเย็นๆ ก่อนนะ!”"
1003305-137 = "เอ๋? จะให้พวกเราใจเย็นได้ยังไง! เมื่อกี้ไหล่เกือบหลุดเลยนะ!"
1003305-138 = "เกือบไปแล้วไง!"
1003305-139 = "เกือบไปแล้ว..."
1003305-144 = "[ns] “ใจเย็นก่อนนะ! วาคาโมะ!”"
1003305-147 = "หา...?"
1003305-152 = "ขอโทษที่เดินชนนะคะ ต่อไปฉันจะระวังให้มากกว่านี้ค่ะ"
1003305-158 = "หวังว่าพวกคุณจะยกโทษให้ฉันนะคะ"
1003305-163 = "ฮะ... เฮือก!"
1003305-164 = "ตะ... ต่อไปก็ระวังด้วยแล้วกัน!"
1003305-165 = "ปะ...ไปกันเถอะ!"
1003305-170 = "ฮู่ว..."
1003305-171 = "อ๊ะ รถไฟ เวลารถออก... อ่า..."
1003305-174 = "(คุณครูและวาคาโมะไม่ได้ไปสวนสนุกเพราะว่าขึ้นรถไฟไม่ทันเวลา)"
1003305-177 = "ถ้างั้นก็... ใช่แล้ว ไปดูหนังกันเถอะค่ะ!"
1003305-178 = "มะ... มีหนังรักโรแมนติกที่เพิ่งเข้าฉายเมื่อไม่นานมานี้พอดีค่ะ...!"
1003305-182 = "ว่ายังไงนะคะ?! ตั๋วขายหมดเกลี้ยงเลยเหรอคะ...?"
1003305-183 = "ฉันไม่ยอมแพ้แค่นี้หรอกค่ะ... ไปที่ต่อไปกันเถอะค่ะ!"
1003305-185 = "แล้วก็ต่อไป...!"
1003305-187 = "ที่ต่อไปต้องเป็นไปตามแผนแน่ๆ ค่ะ!"
1003305-190 = "(แผนที่วาคาโมะวางไว้ทั้งหมดล้มเหลวไปทีละอย่าง ไม่นานนักพระอาทิตย์ก็ลับขอบฟ้าไป...)"
1003305-194 = "[ns] “วาคาโมะ ดื่มเครื่องดื่มนี่สิ”"
1003305-195 = "ขอบคุณค่ะ คุณครู"
1003305-196 = "อุตส่าห์ไปซื้อเครื่องดื่มมาให้คนอย่างฉัน..."
1003305-197 = "[s] “ไม่ต้องผิดหวังกับเรื่องที่เกิดขึ้นวันนี้หรอกนะ”"
1003305-199 = "ช่วยไม่ได้นะคะ ฉันพยายามอย่างหนักเพื่อที่จะให้ได้ใช้เวลาวันนี้กับคุณท่าน#nอย่างมีความสุข แต่ทุกอย่างมันกลับเปล่าประโยชน์..."
1003305-200 = "วันที่ควรจะมีความสุขที่สุด แต่ทุกอย่างก็พังไม่เป็นท่าเพราะความผิดพลาดของฉัน..."
1003305-201 = "ฉันละอายใจอย่างมาก... จนไม่กล้าสู้หน้าคุณท่านแล้วค่ะ#nฉันต้องขออภัยด้วยจริงๆ ค่ะ คุณท่าน..."
1003305-202 = "[s1] “เรื่องนั้นน่ะไม่เป็นไรหรอก ครูเป็นห่วงวาคาโมะมากกว่าอีก”\n[s2] “วาคาโมะดูต่างไปจากปกตินิดหน่อยนะ”"
1003305-203 = "ฉันต่างไปจากปกติงั้นเหรอคะ...?"
1003305-204 = "ฉันต่างไปจากปกติงั้นเหรอคะ...?"
1003305-205 = "ฮุฮุฮุ หมายถึงที่ฉันไม่โกรธ ไม่โมโห แล้วก็ไม่หาเรื่องคนอื่นแม้ว่าจะเกิดเรื่องอย่างนั้นเหรอคะ"
1003305-206 = "ฮุฮุฮุ ถ้าเป็นเรื่องนั้นก็แน่นอนอยู่แล้วค่ะ"
1003305-207 = "[s] \"แน่นอนอยู่แล้วงั้นเหรอ?”"
1003305-208 = "ช่วงเวลาในวันนี้ ช่วงเวลาที่คุณท่านมอบให้ฉันเป็นพิเศษ ได้มีโอกาสเดินเคียงข้างไปด้วยกัน#nได้ใกล้ชิดกว่าที่เคย"
1003305-209 = "ช่างเป็นช่วงเวลาที่มีค่า ฉันไม่อยากให้เวลาเหล่านั้นต้องแปดเปื้อนไปด้วยความวุ่นวาย"
1003305-210 = "เพราะฉันรู้ดีว่า ถ้าตัวตนของฉันถูกเปิดเผย คุณท่านก็คงลำบากไปด้วยนี่คะ?"
1003305-211 = "ก็เลยพยายามไม่เปิดเผยตัวตน ใช่แล้วละค่ะ วาคาโมะผู้นี้เลยทำได้แต่อดทนค่ะ"
1003305-212 = "ขออภัยด้วยนะคะ แต่ว่าวาคาโมะผู้นี้ก็แอบหวังไว้ลึกๆ..."
1003305-213 = "ว่าช่วงเวลาอย่างวันนี้ก็จะมาถึงอีก ไม่ว่าจะอีกสิบครั้ง ร้อยครั้ง หรือพันครั้ง"
1003305-214 = "ฮุฮุ ถ้าเทียบกับเรื่องนั้นแล้ว แม้ว่าวันนี้จะแย่แค่ไหน ก็จะฝืนทนอย่างถึงที่สุด"
1003305-215 = "วาคาโมะผู้นี้ แค่ได้เห็นใบหน้าของคุณท่านที่นึกเป็นห่วงฉัน แค่นั้นก็มีความสุข#n\nมากมายแค่ไหนรู้หรือเปล่าล่ะคะ?"
1003305-216 = "[s] \"อะ... อืม อย่างนั้นสินะ ถ้าอย่างนั้นก็โล่งใจหน่อย...”"
1003305-217 = "ถึงวันนี้จะจบลงอย่างน่าเสียดาย"
1003305-223 = "แต่ว่าในระหว่างทางกลับก็ช่วยยอมให้เด็กงอแงคนนี้เอาแต่ใจสักหน่อยได้หรือเปล่าคะ?"
1003305-224 = "[s] “อืม ถ้าเรื่องแค่นั้นละก็ ได้อยู่แล้ว”"
1003305-225 = "ฮุฮุฮุ!"
1003305-227 = "(เช้าวันต่อมา ในขณะที่คุณครูกำลังจะเริ่มทำงานที่ชาเล่ต์)"
1003305-234 = "เอาล่ะ ออกไปกันเถอะค่ะคุณครู!"
1003305-235 = "[s] “วะ...วาคาโมะ อยู่ๆ  ก็มาทำอะไรน่ะ?!”"
1003305-236 = "จู่ๆ ฉันมาทำอะไรที่นี่งั้นเหรอคะ?"
1003305-237 = "วาคาโมะผู้นี้ แค่มาทำตามสัญญาที่ให้ไว้เมื่อวานอย่างซื่อตรงเท่านั้นเองนะคะ?"
1003305-238 = "ฮุฮุฮุ ฉันมาตามที่สัญญาไว้เมื่อวานไงคะ ถึงเมื่อวานจะล้มเหลว#nแต่ฉันก็รู้ว่าเรายังมีเวลาอยู่ด้วยกันอีกมากเลยค่ะ"
1003305-239 = "เพราะงั้นมาทำให้วันนี้เป็นวันที่น่าจดจำกว่าเมื่อวานกันเถอะค่ะ"
1003305-240 = "และแน่นอนว่าวันนี้ฉันได้วางแผนมาเป็นที่เรียบแล้วแล้วค่ะ ไม่มีอะไรที่คุณท่านต้องกังวล ♡"
1003305-244 = "[ns] \"...\""
1003305-246 = "(และจากนั้นการเดตที่วางแผนไว้ถึงขั้นไหนไม่รู้ของวาคาโมะก็เริ่มต้นขึ้นอีกครั้ง...)"

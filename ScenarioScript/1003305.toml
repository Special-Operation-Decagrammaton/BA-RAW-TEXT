[translation]
1003305-1 = "變調的約會"
1003305-2 = "（為了以防萬一，提前抵達了與若藻約好的地點）"
1003305-3 = "[s]「我看看，具體的地方是……」"
1003305-4 = "呵呵……您來得比約定的時間還早呢，老師。"
1003305-5 = "[s]「……咦？」"
1003305-11 = "哎呀，您竟然露出了那種表情……彷彿認不出若藻我的樣子。"
1003305-13 = "啊啊，儘管已瞭然於心……然而在與您相會的瞬間，自內心深處滿溢的這股糾結……總是令我情不自禁地發出嘆息。"
1003305-15 = "閣下那未曾目睹的表情……已讓若藻我的胸口熾熱地難以忍受……"
1003305-17 = "真是困擾……這樣下去會按捺不住的……"
1003305-21 = "[ns]「先，先等一下。你，你是若藻沒錯吧……？」"
1003305-22 = "呵呵，是的。#n正是閣下的若藻♡"
1003305-23 = "[s]「和平時的氛圍不一樣呢……？」"
1003305-24 = "您指的是這副打扮嗎？"
1003305-25 = "或許確實與以往不盡相同……"
1003305-26 = "呵呵，不過這也是為了增加能與閣下相伴的時間。"
1003305-27 = "若是維持平時的打扮，實在難以避免因各種理由而受人注目……"
1003305-28 = "倘若僅是在身後跟隨著老師也許不成問題，然而若是要與您同行……"
1003305-29 = "為求延長待在閣下身邊的時間，對外表稍作打理也是不可或缺的吧。"
1003305-30 = "[s]「原，原來你連這點都有想到啊……」"
1003305-31 = "畢竟對象並非他人而是閣下，這點程度也是理所當然的♡"
1003305-32 = "呵呵，現在不是說這些的時候了呢。#n今天還請您依照若藻我所制定的完美約會計劃行動！"
1003305-38 = "那麼老師，請您多多指教。"
1003305-39 = "[s]「嗯，請多指教。」"
1003305-42 = "（於是被若藻牽著手，帶到了據說已經預約好的餐廳）"
1003305-45 = "呵呵，今天預約的餐廳就是這裡。"
1003305-46 = "[s]「居然是這種高級的餐廳，有點意外……」"
1003305-47 = "……哎呀，您感到意外嗎？"
1003305-48 = "啊，您認為我會偏好更有傳統氛圍的餐廳對吧？"
1003305-49 = "呵呵，確實如您所說。#n該類餐廳有其獨特的魅力……"
1003305-50 = "不過約會相關的指南書上表示，此處才是適合與所愛之人共處時光的地點……"
1003305-51 = "[s]「……指南書？」"
1003305-52 = "現在不是說這些的時候。老師，我們進去吧。"
1003305-57 = "啊，這位客人……！非常抱歉！"
1003305-58 = "哎呀……？"
1003305-59 = "造成您的不便真的非常不好意思，敝店今天暫停營業……"
1003305-60 = "我應該已經完成預約了才對……？"
1003305-61 = "這……實在對不起您。#n由於臨時必須接待特別貴賓……"
1003305-62 = "[s]「特別貴賓？」"
1003305-63 = "是的。以奇普托斯頂尖美食評論家聞名的「超愛馬鈴薯燉肉」今天將大駕光臨……"
1003305-64 = "若能藉此機會提供完美的套餐，敝店的人氣將可能一飛衝天……！"
1003305-65 = "甚至有機會能一舉蛻變為名店……！"
1003305-66 = "因此雖然對客人十分過意不去，我們依然不得不全面暫停營業，還請見諒……！"
1003305-72 = "[ns]「若，若藻……？」"
1003305-73 = "當，當然我們不會讓您空手而歸！"
1003305-74 = "這是敝店的餐券，請您收下！"
1003305-75 = "客人下次光臨時，我們將免費提供最高級的套餐……！"
1003305-79 = "[ns]「若，若藻！我們往下一站去吧！」"
1003305-82 = "（若藻的計畫從第一步便出了差錯，之後的氣氛也莫名顯得有些奇怪……）"
1003305-85 = "（接著在之後造訪的咖啡廳……）"
1003305-86 = "咳哼。"
1003305-87 = "雖然方才在餐廳碰上了些許意外，導致計劃稍微變了調……"
1003305-88 = "不過老師，請您不用擔心。"
1003305-89 = "若藻我，為了今日拚盡全力做了調查……成功找到了想與閣下一同品嘗的最佳甜點。"
1003305-90 = "這間咖啡廳有提供給雙人來客的「情侶限定菜單」──在旅遊指南中是這麼寫的。"
1003305-91 = "呵呵，老師想必也會喜歡的才是……"
1003305-92 = "情侶限定菜單……？#n那個去年就已經停賣了哦？"
1003305-93 = "……咦？在旅遊指南上看到的？"
1003305-98 = "啊啊，是社長一年前因為興趣寫的那個……？"
1003305-99 = "噗哈哈哈哈！"
1003305-100 = "啊哈，哈……不，不好意思……"
1003305-101 = "這年頭居然還有在指南書裡找約會路線的人，這實在太奇……#n我是說太有趣了，呵呵。"
1003305-102 = "總之不好意思，現在已經沒有提供那項餐點了，還請見諒。"
1003305-107 = "[ns]「若，若藻！去下一個地方吧！」"
1003305-111 = "（在下一個地點也……）"
1003305-112 = "老師，我們趕緊走吧。"
1003305-113 = "這次……！"
1003305-114 = "這次肯定沒問題！"
1003305-115 = "只要能搭上2分鐘後的那班電車，就能趕上附近遊樂園的舉行的公演──"
1003305-121 = "哎呀……？"
1003305-126 = "啊！？搞什麼啊，突然撞過來是怎樣！"
1003305-127 = "在散步是不是啊？還是來吵架的！？"
1003305-128 = "要不要我陪你啊！？"
1003305-134 = "[ns]「STOP！！先，先冷靜！」"
1003305-137 = "啊？是要我們怎麼冷靜！？#n我肩膀差點就脫臼了耶！"
1003305-138 = "就是說啊！"
1003305-139 = "沒錯沒錯！"
1003305-144 = "[ns]「若藻，冷靜！」"
1003305-147 = "……？"
1003305-152 = "啊啊，方才一時疏忽，不慎撞上了你，實在不好意思。#n今後會多加留意。"
1003305-158 = "相信各位……應該能明白我的意思吧？"
1003305-163 = "噫，噫噫噫！？"
1003305-164 = "下，下次給我注意點哦！？"
1003305-165 = "快，快逃！！"
1003305-170 = "呼……"
1003305-171 = "啊，電車的時間……"
1003305-174 = "（結果沒能趕上往遊樂園的電車）"
1003305-177 = "那，那麼去看電影吧！"
1003305-178 = "最近似乎洽好上映了一部優秀的戀，戀，戀愛電影……！"
1003305-182 = "什麼！？電影票銷售一空……？"
1003305-183 = "……不能就這麼放棄。#n接下來一定……！"
1003305-185 = "下一個……！"
1003305-187 = "下次一定要……！"
1003305-190 = "（若藻的計劃接二連三發生事故，不知不覺間已經日落了……）"
1003305-194 = "[ns]「來，若藻。這個飲料給你。」"
1003305-195 = "啊……謝謝您，老師。"
1003305-196 = "居然特地買飲料給這樣的我……"
1003305-197 = "[s]「那個……今天的事不必太失望哦。」"
1003305-199 = "失望，是嗎……儘管若藻我為了讓與閣下共度的今日更加出色，付出了許多努力……一切卻都僅是徒勞……"
1003305-200 = "本該成為最美好日子的一天，因為我的疏失而白費……"
1003305-201 = "若藻我，無顏面對老師……#n啊啊，非常抱歉，我該如何向您賠罪才好……"
1003305-202 = "[s1]「別這麼說，我反而比較擔心若藻哦。」\n[s2]「該怎麼說呢……因為今天的若藻跟平時不太一樣。」"
1003305-203 = "我與平時不太一樣……？"
1003305-204 = "我與平時不太一樣……？"
1003305-205 = "……啊啊，您指的是無論被捲入什麼麻煩都沒有因為憤怒而引發糾紛嗎？"
1003305-206 = "……呵呵，那是當然。"
1003305-207 = "[s]「怎麼說呢？」"
1003305-208 = "今日，是閣下特別為了我空出的時間。#n同時也是能在您的身旁與您同行的機會。"
1003305-209 = "我並不想讓騷動糟蹋如此寶貴的時間。"
1003305-210 = "我的身分若是曝光，將會造成閣下的困擾──此事我也十分清楚。"
1003305-211 = "因此為了避免這樣的情況發生，一再地克制著自己。"
1003305-212 = "此外，儘管這麼說十分令人羞愧……若藻我仍舊厚顏無恥地期盼著……"
1003305-213 = "期盼這樣的時光，今後還會有數次、數十次、數百次、數千次。"
1003305-214 = "相較之下，忍受今天的瑣事根本不足掛齒。"
1003305-215 = "能夠獨佔閣下因為看著我而內心蕩漾的臉龐……若藻我反而感到無比快樂哦？"
1003305-216 = "[s]「這，這樣啊……那真是太好了……」"
1003305-217 = "今天的時光雖然遺憾地僅如白駒過隙……"
1003305-223 = "能請您在歸途中，傾聽我的請求直到最後嗎？"
1003305-224 = "[s]「嗯，這種事我非常歡迎。」"
1003305-225 = "呵呵，那就拜託您了。"
1003305-227 = "（隔天早上，正打算開始處理夏萊工作的時候）"
1003305-234 = "我們這就出發吧，老師！"
1003305-235 = "[s]「若藻！？怎麼突然跑來了！？」"
1003305-236 = "咦，您說突然……？"
1003305-237 = "若藻我，僅是前來遵守昨日許下的約定而已哦？"
1003305-238 = "呵呵，沒錯。#n昨日雖然遺憾，但那也僅是過往雲煙當中的一天……"
1003305-239 = "因此為了不輸給昨日，讓我們一起度過美好的一天吧？"
1003305-240 = "當然，我再次確實地擬定了計劃。老師完全不必費心唷♡"
1003305-244 = "[ns]「……」"
1003305-246 = "（就這樣，僅出現在若藻行程表上的約會再次展開了）"

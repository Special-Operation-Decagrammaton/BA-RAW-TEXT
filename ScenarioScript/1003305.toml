1003305-21 = "[ns] \"자, 잠깐. 혹시 와, 와카모?!\""
1003305-22 = "3;와카모 사복;01;후훗, 네. 당.신.의 와카모랍니다♡\n#3;em;[하트]\n#3;greeting"
1003305-23 = "[s] \"어째, 분위기가 평소랑 다르네…….\""
1003305-24 = "3;와카모 사복;02;이 모습 말씀이신가요?\n#3;em;[?]"
1003305-25 = "3;와카모 사복;99;확실히 평소와는 조금 다를지도……."
1003305-26 = "3;와카모 사복;03;후후훗. 하지만 이 꾸민 모습 또한, 당신의 곁에 서는 시간을 늘리기 위함인 것.\n#3;em;[반짝]"
1003305-27 = "3;와카모 사복;01;여느 때의 제 모습은……. 네, 아무래도 이러저러한 이유로 남들 눈에 띄고 있다 보니……."
1003305-28 = "3;와카모 사복;99;평소 선생님의 뒤를 따를 때에는, 그 모습만으로도 문제가 없겠습니다마는, 이렇게 얼굴을 마주하고……."
1003305-29 = "3;와카모 사복;03;네에- 좀 더 오랜 시간, 당신의 곁에서 함께 하기 위해선, 역시나 조금은 외견을 단장할 필요가 있을 테니까요.\n#3;em;[///]\n#3;stiff"
1003305-30 = "[s] \"그런 부분은 제대로 신경 써주고 있었구나…….\""
1003305-31 = "3;와카모 사복;01;다른 누구도 아닌, 당신을 위해서라면 하나부터 열까지. 어떤 것이라도 당연하답니다♡"
1003305-32 = "3;와카모 사복;03;후후훗. 이럴 때가 아니랍니다. 선생님. 오늘만을 기다리며 제가 완벽하게 짜온 데이트 플랜에 따라 움직이도록 하지요!\n#3;em;[반응]"
1003305-33 = "#st;[0,0];instant;1;"
1003305-34 = "#clearST"

[translation]
10023075-3 = "唔，可惡……！"
10023075-4 = "到此為止了。"
10023075-5 = "──那麼。#n為何失竊物品會在這裡──以及關於這場拍賣會的事……"
10023075-6 = "可以請你說明一下嗎？"
10023075-7 = "可惡……"
10023075-8 = "但是，這種狀況我也預想過了。"
10023075-14 = "負責警備的可不只有你們而已！#n我還委託了山海經的玄龍門！"
10023075-16 = "山海經的……玄龍門……？"
10023075-17 = "[s1]「準備的還真周到呢……」\n[s2]「也太不擇手段了……」"
10023075-24 = "上吧，預備隊！給我壓制他們！"
10023075-32 = "混入了參加者……！"
10023075-33 = "竟然會這麼……"
10023075-43 = "怎，怎麼辦，老師？#n敵人實在太多了！"
10023075-44 = "如果有動力裝甲的話……！"
10023075-53 = "這個煙是！？#n……別，別讓他們逃了！"
10023075-57 = "請抓住我的手──"
10023075-58 = "[s]「……這個聲音是！」"
10023075-70 = "（受到了意料之外的幫助，總算是脫離了宅邸……）"
10023075-74 = "哈啊，哈啊……"
10023075-75 = "好累……"
10023075-77 = "嗚嗚。#n已，已經跑不動了……"
10023075-78 = "居然這麼晚了……"
10023075-79 = "看來我們似乎待了很久。"
10023075-80 = "大家都還好嗎？"
10023075-81 = "[s3]「嗯，多虧了他。」\n[s4]「敵人的敵人就是友方……該這麼認為嗎？」"
10023075-87 = "嗯？那是什麼意思？"
10023075-92 = "偶然、無作為、不均性、不確定性……#n這些都是談到美學時不可或缺的要素。"
10023075-96 = "是，是誰……？"
10023075-103 = "呵呵，別來無恙。#n居然會以這種形式與各位再次相會，我們彼此都始料未及吧。"
10023075-111 = "老，老老老老，老師！？這到底是怎麼回事！？！"
10023075-112 = "[s5]「『慈愛的怪盜』」\n[s6]「幫助了我們哦。」"
10023075-116 = "確，確實……那個煙幕是！"
10023075-118 = "沒，沒有人……這裡沒有任何人……"
10023075-124 = "[ns7]「謝謝你救了我們。」\n[ns8]「為什麼要幫我們呢？」"
10023075-127 = "怎麼說呢……先從解開誤會開始吧。#n我並不是小姐們的敵人哦。"
10023075-128 = "至於幫助小姐們的理由──簡單來說，是因為我注意到你們被銅田欺騙了──#n可以這麼說嗎？"
10023075-132 = "（「慈愛的怪盜」在一瞬之間悄悄使了個眼色）"
10023075-137 = "（……想起了透過「小道具」對話的事）"
10023075-138 = "既然如此，也就沒有與C&C和老師戰鬥的必要了。#n畢竟小姐們也是受害者。"
10023075-139 = "所以才會把地下拍賣場的存在告訴各位。#n──為了讓各位明白真正的敵人是誰。"
10023075-140 = "──啊啊，此外。#n該說是順便嗎，C&C正在尋找的藝術品也找到了對吧？"
10023075-142 = "唔啊啊……情報一口氣衝了進來，頭腦快爆炸了！"
10023075-143 = "也就是說，現在不是我們與「慈愛的怪盜」……同學戰鬥的時候，是這個意思嗎？"
10023075-148 = "手段真是狡猾啊，慈愛的怪盜。"
10023075-149 = "呵呵，你指的是什麼意思呢？"
10023075-151 = "雖然有句話說敵人的敵人就是友方，但也並非總是如此。"
10023075-153 = "那個……「慈愛的怪盜」同學……"
10023075-154 = "是七罪人之一……對吧？"
10023075-156 = "呵呵。"
10023075-163 = "是又如何呢？這位小姐。"
10023075-164 = "還是說，你無法跟七罪人這樣的危險因子相容……#n即便有相同的目的，也無法與犯罪者聯手，是這個意思嗎？"
10023075-166 = "啊嗚……"
10023075-168 = "你身為七罪人之一，並且盯上了C&C正在追蹤的「時鐘王之冠」的事實不會改變。"
10023075-169 = "因此依然有必要注意你的行動。"
10023075-170 = "[s9]「嗯，季說的沒錯……」\n[s10]「但在這個基礎上，我有一個提案。」"
10023075-173 = "提案……是嗎？"
10023075-174 = "呼呣──請您繼續說吧。"
10023075-176 = "[ns]「要不要暫時結盟？」"
10023075-184 = "確實……情況的發展已經與我們的預期出現了相當巨大的差異。"
10023075-185 = "但是，對方是七罪人──也就是犯罪者。#n竟然要和如此可疑的人物結盟……"
10023075-186 = "呵呵，我倒覺得是個很好的提案唷？"
10023075-187 = "啊啊，不過心胸狹窄之人或許無法理解也說不定。"
10023075-188 = "……老師。是否可以盡速排除犯罪者呢？"
10023075-189 = "[s11]「哎呀哎呀，你們兩個都冷靜一點。」\n[s12]「總之先交換彼此的情報怎麼樣？」"
10023075-192 = "……嗯，既然老師都這麼說了。"
10023075-193 = "我們是……千年科學學園的遊戲開發部。"
10023075-194 = "因為某些原因被誤認為C&C……收到了從你手中保護宅邸的委託。"
10023075-195 = "讀了你的預告信後，認為你打算偷走畫有劍的那幅畫……"
10023075-196 = "在重新解開預告信的謎團後，找到了地下的通道……#n發現本該在第3天舉辦的拍賣會已經開始，接著就突然遭到明太郎先生的攻擊……"
10023075-197 = "嗚嗚，事情怎麼會變成這樣……！"
10023075-199 = "原來如此……小姐們什麼都不知道啊。"
10023075-200 = "這，這也沒辦法吧！就連委託都是突然收到的嘛！"
10023075-201 = "呼呣……即便如此，你們還是解讀了我的預告信──#n呵呵，真是了不起的才能。"
10023075-202 = "哼，哼！"
10023075-203 = "那還用說嗎？#n我們至今為止可是攻略了無數的解謎遊戲啊！#n那種程度的解謎，對[ruby=我們]遊戲開發部[/ruby]來說根本是小菜一碟！"
10023075-204 = "呵呵，這樣啊。#n嘛，這樣也好。"
10023075-207 = "我的目標從一開始就是那個地下拍賣會的會場。"
10023075-208 = "那裡是買賣藉由違法手段取得的贓物的暗黑市場──"
10023075-209 = "也是宅邸主人銅田所管理的地方。"
10023075-210 = "……那項情報並沒有錯。"
10023075-211 = "C&C正在追查的贓物全都集中在那個地方，我也親眼看見了。"
10023075-212 = "那展示會又是怎麼回事？"
10023075-215 = "也許是分散女武神注意力的誘餌吧。"
10023075-216 = "無論如何，我的目標只有一個──"
10023075-217 = "──「時鐘王之冠」。"
10023075-218 = "如此美妙的藝術品竟然被一個人獨佔──就算別人允許，我的美學也無法容忍。"
10023075-220 = "各位都明白了嗎？"
10023075-221 = "──小姐們被利用了。"
10023075-222 = "銅田相當狡猾──遠遠超出小姐們的想像。"
10023075-223 = "嗚嗚……可是，這麼突然就要人相信也……！"
10023075-224 = "呵呵，這樣啊。#n你們會這麼想也沒辦法，這點我也能理解──"
10023075-225 = "但是向你們露出獠牙的人，以及向你們伸出援手的人──"
10023075-226 = "哪邊的話比較值得相信，是否有放在天秤上衡量的必要呢？"
10023075-227 = "[s13]「綠的那時候也是，謝謝你。」\n[s14]「……不過，為什麼救了綠呢？」"
10023075-230 = "理由非常單純而明快。"
10023075-231 = "在優美的藝術品前流下無謂的血──也同樣違反了我的美學。#n僅此而已。"
10023075-232 = "[s]「美學……」"
10023075-233 = "呵呵。"
10023075-240 = "我對夏萊老師的提案沒有異議──小姐們意下如何呢？"

[translation]
10023075-3 = "อึก เธอนี่มัน...!"
10023075-4 = "ถึงจะเป็นการต่อสู้ที่ไม่ง่าย แต่ก็ทำสำเร็จจนได้นะคะ"
10023075-5 = "คุณเมทาโร่ ฉันมีบางอย่างอยากถามจากคุณค่ะ"
10023075-6 = "ช่วยอธิบายหน่อยได้ไหมคะว่าของที่ถูกขโมยมาอยู่ตรงนี้ได้ยังไง?"
10023075-7 = "อืม..."
10023075-8 = "ไม่คิดเลยว่าต้องใช้วิธีนี้ แต่ก็นะ"
10023075-14 = "ผมว่าจ้างมังกรดำแห่งซานไห่จิงให้มาสมทบกับยามรักษาความปลอดภัยของที่นี่อีกแรงครับ!"
10023075-16 = "มังกรดำ...? ซานไห่จิง?"
10023075-17 = "[s1] \"ละเอียดถี่ถ้วนจังเลยนะ\"\n[s2] \"คิดว่าจะงัดมาทุกวิธีที่ใช้ได้เลยหรือไง!\""
10023075-24 = "กองกำลังสำรอง! เตรียมพร้อมสำหรับการต่อสู้!"
10023075-32 = "แขกบางส่วนคือ...!"
10023075-33 = "เจ้าหน้าที่มังกรดำ... จากซานไห่จิงเหรอ..."
10023075-43 = "ทะ... ทำยังไงดีคะคุณครู? พวกนั้นมีกันเยอะมากเลยค่ะ!"
10023075-44 = "ถ้ามี 'พาวเวอร์ สูท' ก็ดีสิ...!"
10023075-53 = "นะ... นี่มัน?! อะไรกัน?!"
10023075-57 = "ทางนี้"
10023075-58 = "[s] \"...?!  เสียงนี้มัน...!"
10023075-70 = "(ทั้งหมดฝ่าม่านควันที่แทบจะทำให้มองไม่เห็นข้างหน้า และหนีออกมาจากคฤหาสน์ได้...)"
10023075-74 = "แฮ่ก... แฮ่ก...!"
10023075-75 = "หมดแรงเลยค่ะ..."
10023075-77 = "งือ... วิ่งต่อไม่ไหวแล้วค่ะ..."
10023075-78 = "เป็นวันที่มีแต่ความปั่นป่วนเลยนะคะ"
10023075-79 = "ถึงแม้จะเข้ากลางคืนแล้วก็เถอะ"
10023075-80 = "ทุกคนเป็นยังไงบ้างคะ? แล้วคุณครูล่ะคะ? "
10023075-81 = "[s3] \"ทุกคนทำได้ดีมากเลย\"\n[s4] \"เหมือนจะมีแขกอีกคนมากับเราด้วยนะ\""
10023075-87 = "หมายความว่าไงเหรอคุณครู?"
10023075-92 = "ความบังเอิญ ความโลเล ความไร้แบบแผน ความไม่แน่นอน...... ล้วนแล้วแต่เป็นองค์ประกอบของ#nสุนทรียศาสตร์ค่ะ"
10023075-96 = "คุณคือใครเหรอคะ?"
10023075-103 = "ฮุฮุ สบายดีไหมคะ? คิดไม่ถึงเลยนะคะว่าจะได้มาเจอพวกคุณอีกครั้งแบบนี้ "
10023075-111 = "คะ... คะคะคะคะคะ... คุณครู?!  นี่มันเรื่องอะไรเนี่ย?!"
10023075-112 = "[s5] \"โมโมอิ ครูเข้าใจความรู้สึกของเธอนะ...\"\n[s6] \"พวกเรารอดออกมาได้เพราะได้จอมโจรแห่งความเสน่หาช่วยไว้น่ะ\""
10023075-116 = "งะ... งั้นม่านควันเมื่อกี้ก็...!"
10023075-118 = "ไม่มีค่ะ... ไม่มีใครอยู่ตรงนี้ค่ะ..."
10023075-124 = "[ns7] \"ขอบใจที่ช่วยนะ\"\n[ns8] \"ว่าแต่ทำไมถึงมาช่วยพวกเราเหรอ?\""
10023075-127 = "ดีเลยค่ะ ยังไงซะ การอธิบายให้อีกฝ่ายเข้าใจก็คือก้าวแรกของการแก้ปัญหาความเข้าใจผิดค่ะ"
10023075-128 = "มีเรื่องบางอย่าง... ที่ทำให้ฉันรู้ว่าทุกคนกำลังถูกเมทาโร่หลอกอยู่ค่ะ"
10023075-132 = "(จอมโจรแห่งความเสน่หาอธิบายพลางส่งสายตามาให้)"
10023075-137 = "(นึกถึงตอนที่คุยกับจอมโจรแห่งความเสน่หาผ่าน 'อุปกรณ์' อันนั้น...)"
10023075-138 = "ฉันก็เลยรู้น่ะค่ะว่า C&C และคุณครูไม่ใช่เป้าหมายที่ฉันต้องต่อสู้ด้วย"
10023075-139 = "ฉันก็เลยไปบอกให้รู้ว่ามีห้องประมูลอยู่ที่ชั้นใต้ดินของคฤหาสถ์ เพราะฉันต้องการให้รู้ว่าศัตรูที่แท้จริง#nคือใคร... และคนที่เราต้องร่วมมือกันเพื่อต่อสู้ด้วยคือใครกันแน่ค่ะ"
10023075-140 = "และไหนๆ ก็บอกเรื่องนั้นแล้ว ก็เลยจะบอกเบาะแสของงานศิลปะที่ C&C ตามหาอยู่ให้รู้ด้วยค่ะ"
10023075-142 = "โอย... ได้รับข้อมูลเยอะมากๆ ในครั้งเดียวจนไม่รู้ว่าอะไรเป็นอะไรแล้วเลย!"
10023075-143 = "สรุปว่า... ตอนนี้ไม่ใช่เวลาที่พวกเราจะมาสู้กันเอง... งั้นเหรอคะ?"
10023075-148 = "คุณใช้วิธีฉลาดแกมโกงสินะคะ จอมโจรแห่งความเสน่หา"
10023075-149 = "ตายจริง? นั่นหมายความว่าอะไรเหรอคะ?"
10023075-151 = "จะมองว่าศัตรูของศัตรูคือมิตรของเราก็ได้ แต่มันไม่เป็นอย่างนั้นเสมอไปหรอกค่ะ"
10023075-153 = "คะ... คุณจอมโจรแห่งความเสน่หา... เป็นหนึ่งในเจ็ดอาชญากร... ใช่ไหมคะ?"
10023075-154 = "ถะ... ถ้างั้นก็..."
10023075-156 = "ฮุฮุ"
10023075-163 = "อยากบอกว่าอะไรเหรอคะ? "
10023075-164 = "ไม่อยากคุยกับตัวอันตรายอย่างเจ็ดอาชญากร? หรือไม่อยากยืนร่วมกับคนที่ถูกเรียกว่าเป็นอาชญากร อย่างนั้นเหรอคะ?"
10023075-166 = "งือ..."
10023075-168 = "ยังไงคุณก็เป็นหนึ่งในเจ็ดอาชญากร และคุณก็กำลังหมายปอง <มงกุฎเจ้าแห่งนาฬิกา> ที่ C&C ต้องเอากลับไปค่ะ"
10023075-169 = "ฉันต้องระวังในสิ่งที่คนอย่างคุณคิดสิคะ"
10023075-170 = "[s9] \"เอาละๆ เพราะแบบนี้ครูถึง......\"\n[s10] \"อยากเสนออะไรบางอย่าง\""
10023075-173 = "เสนอ... เหรอคะ?"
10023075-174 = "ตายจริง? นี่มันข้อเสนอจากคุณครูชาเล่ต์ทั้งที ฉันอยากรู้แล้วค่ะว่าคืออะไร "
10023075-176 = "[ns] \"งานนี้เรามาเป็นพันธมิตรกันเถอะ\""
10023075-184 = "สถานการณ์ตอนนี้ต่างจากที่พวกฉันคิดไว้อย่างสิ้นเชิงเลยค่ะ"
10023075-185 = "แต่ยังไงอีกฝ่ายก็คือเจ็ดอาชญากร อาชญากรก็คืออาชญากรค่ะ จะให้เป็นพันธมิตรกับคนน่าสงสัย#nอย่างนั้นเหรอคะ"
10023075-186 = "ฮุฮุ แต่ว่าฉันอยากเป็นนะคะ"
10023075-187 = "หรือว่ามีใครบางคนใจแคบจนไม่เข้าใจฉันคะ?"
10023075-188 = "...... คุณครูคะ ถ้าฉันจะลงมือกำจัดอาชญากรตอนนี้ จะเป็นอะไรไหมคะ?"
10023075-189 = "[s11] \"เอาละๆ ทั้งสองคนใจเย็นๆ กันก่อนนะ\"\n[s12] \"มาแชร์ข้อมูลของแต่ละฝ่ายกันก่อนดีกว่า\""
10023075-192 = "...... ก็ได้ ถ้าคุณครูพูดอย่างนี้ละก็"
10023075-193 = "พวกฉัน... อยู่ชมรมพัฒนาเกมของโรงเรียนวิทย์มิลเลเนียมน่ะ"
10023075-194 = "พอดีมีเรื่องเข้าใจผิดว่าเราเป็นชมรม C&C ก็เลยได้รับการว่าจ้างให้มารักษาความปลอดภัยในคฤหาสน์"
10023075-195 = "แล้วเราก็ได้ยินมาว่าคุณจะขโมยภาพวาดบางอย่างตามที่ส่งจดหมายเตือนมา"
10023075-196 = "แต่พอพวกฉันเจอทางเดินใต้ดินแล้วลงไปตามทางเรื่อยๆ... ก็เห็นว่างานประมูลที่จะจัดขึ้นในวันที่ 3 ถูกจัดก่อนล่วงหน้า 1 วัน และจู่ๆ ก็โดนคุณเมทาโร่โจมตีเข้า..."
10023075-197 = "เฮ้อ มาเป็นอย่างนี้ได้ไงเนี่ย...!"
10023075-199 = "ถึงจะพอคาดเดาเอาไว้บ้างแล้วก็เถอะ แต่พวกคุณไม่รู้อะไรเลยจริงๆ นะคะ"
10023075-200 = "ก็... ก็มันช่วยไม่ได้นี่! ไม่เห็นมีใครบอกอะไรพวกเราเลยนี่นา!"
10023075-201 = "แต่จะว่าไป พวกคุณตีความจดหมายเตือนของฉันเก่งพอใช้ได้เลยนะคะ?"
10023075-202 = "ฮะ... ฮึ่ม!"
10023075-203 = "มันก็แน่นอนอยู่แล้วแหละ พวกเราได้รับการฝึกฝนจากเกมผจญภัยปริศนามานับไม่ถ้วน แค่ปริศนาใน#nจดหมายเตือนน่ะ ก็แค่ของหมูๆ ของชมรมพัฒนาเกมนั่นแแหละ!"
10023075-204 = "ก็ดีค่ะ "
10023075-207 = "ฉันเล็งห้องประมูลลับใต้ดินมาตั้งแต่แรกแล้วค่ะ"
10023075-208 = "มันเป็นที่ที่มีการแอบซื้อขายสินค้าที่ถูกขโมยมาอย่างผิดกฎหมาย..."
10023075-209 = "และโดดะ เมทาโร่ เจ้าของคฤหาสน์ก็เป็นผู้ดูแลเรื่องนี้ค่ะ"
10023075-210 = "...... ข้อมูลที่ว่ามา ก็ไม่น่าจะผิดนะคะ"
10023075-211 = "สินค้าที่ C&C กำลังตามหาอยู่ก็มาอยู่ในที่เดียวกันแบบนั้นด้วย"
10023075-212 = "ถ้างั้น แล้วนิทรรศการงานศิลปะล่ะ?"
10023075-215 = "คงเป็นแค่ตัวล่อที่เอาไว้เบี่ยงเบนความสนใจน่ะค่ะ"
10023075-216 = "เอาเถอะค่ะ สรุปว่าฉันกำลังเพ่งเล็งของที่เรียกว่า <มงกุฎเจ้าแห่งนาฬิกา> อยู่ค่ะ"
10023075-217 = "<มงกุฎเจ้าแห่งนาฬิกา> ที่มีเพียงชิ้นเดียวในคิโวทอส..."
10023075-218 = "ถ้ามีใครได้เป็นเจ้าของและได้ประเมินคุณค่าของมันอยู่คนเดียว ก็คงไม่ถูกหลักแห่งสุนทรียศาสตร์#nของฉันน่ะค่ะ"
10023075-220 = "ทีนี้เข้าใจหรือยังคะ?"
10023075-221 = "ทุกคนกำลังถูกหลอกใช้ประโยชน์อยู่ค่ะ"
10023075-222 = "เมทาโร่เจ้าเล่ห์มากกว่าที่ทุกคนคิดค่ะ"
10023075-223 = "ตะ... ตะ... แต่ว่าพวกเราจะเชื่อทุกคำพูดของคุณง่ายๆ ได้ไม่หรอกนะ!"
10023075-224 = "ฮุฮุ งั้นเหรอคะ พวกคุณมีสิทธิ์จะคิดแบบนั้นค่ะ"
10023075-225 = "แต่ถ้าเทียบกันแล้ว ระหว่างคำพูดของคนที่พยายามจะโจมตีคุณ กับคนที่พยายามจะช่วยคุณ..."
10023075-226 = "แบบไหนจะน่าเชื่อถือมากกว่ากันเหรอคะ? ลองคิดเอาก็น่าจะรู้นะคะ"
10023075-227 = "[s13] \"ขอบใจที่ช่วยมิโดรินะ\"\n[s14] \"แต่ว่า ขอถามเหตุผลที่ช่วยได้ไหม?\""
10023075-230 = "ง่ายดายมากค่ะ "
10023075-231 = "การปล่อยให้สิ่งที่มีค่าอยู่ตรงหน้าต้องเจ็บปวดอย่างไร้ประโยชน์ มันไม่สอดคล้องกับหลักแห่ง#nสุนทรียศาสตร์ของฉันน่ะค่ะ"
10023075-232 = "[s] \"สุนทรียศาสตร์...\""
10023075-233 = "ฮุฮุ"
10023075-240 = "ฉันก็เลยถูกใจข้อเสนอของคุณครูชาเล่ต์ค่ะ แล้วทุกคนล่ะคะ คิดว่ายังไงกัน?"

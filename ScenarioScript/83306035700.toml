[translation]
83306035700-17 = "ท่านประธาน? มีเรื่องอะไรรึเปล่าคะ?"
83306035700-22 = "อาโกะ ฉันมีเรื่องอยากให้ช่วยหน่อย"
83306035700-23 = "ค่ะ บอกฉันได้ทุกเรื่องเลยค่ะ!"
83306035700-24 = "ฉันอยากได้บันไดน่ะ"
83306035700-25 = "บันไดเหรอคะ?"
83306035700-26 = "อื้ม ขออันที่แข็งแรงๆ หน่อย "
83306035700-27 = "อ๊ะ... ค่ะ! ฉันจะไปเอามาให้เดี๋ยวนี้ค่ะ!"

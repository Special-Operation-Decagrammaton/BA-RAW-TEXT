80000110-9 = "4;칸나;01\n#4;greeting\n#wait;2500"
80000110-10 = "4;칸나;07;으음. 곤란하군……\n#4;em;[속상함]"
80000110-11 = "4;칸나;05;……응?\n#4;em;[반응]"
80000110-12 = "#st;[0,0];instant;1;"

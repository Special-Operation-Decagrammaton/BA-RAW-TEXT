80000110-14 = "4;칸나;05\n#4;m3\n#wait;1000"
80000110-15 = "4;칸나;05;[USERNAME] 선생님. 좋은 아침입니다.\n#4;greeting"
80000110-16 = "4;칸나;02;이 시간에 갑자기 발키리 경찰학교에는 무슨 일로……"
80000110-17 = "4;칸나;01;이번 주 순찰 일정을 확인하러 오셨다고요?"
80000110-18 = "4;칸나;99;……그렇군요. 안심했습니다.\n#4;em;[한숨]"
80000110-19 = "4;칸나;04;갑자기 뜻하지 않은 장소에서 선생님을 뵙게 되어, 무슨 큰일이라도 생긴 게 아닌가 걱정하던 참이었습니다."
80000110-20 = "[s] \"칸나는 무얼 하고 있었어?\""
80000110-21 = "4;칸나;01;저야 늘 그렇듯이 사건과 관련된 보고서를 작성하고 있었습니다."
80000110-22 = "4;칸나;01;작전 중 소모된 탄환의 지출내역서와 유탄으로 발생한 상가의 피해 경위서를—"
80000110-23 = "#st;[0,0];instant;1;"
80000110-24 = "#clearST"
80000110-25 = "#wait;3500"
80000110-26 = "4;칸나;02\n#4;em;[반응]\n#wait;1000"
80000110-27 = "4;칸나;99;그나저나 오늘따라 밖이 소란스럽군요. 오늘 무슨 행사라도 있는 건지……"
80000110-28 = "4;칸나;02;……발렌타인 데이요?\n#4;em;[?]"
80000110-29 = "4;칸나;04;아, 벌써 시간이 그렇게 되었군요."
80000110-30 = "4;칸나;04;안 그래도 역 근처에 초콜릿을 취급하는 가게가 늘어나서 어림짐작은 하고 있었지만, 요 며칠 사이에는 일이 많아서 깜박 잊고 있었습니다."
80000110-31 = "4;칸나;05;발렌타인 데이라…… 이 시즌에는 D.U. 곳곳에서 초콜릿을 이용한 다양한 이벤트가 열리기 때문에 발키리 경찰학교에서도 순찰을 강화하곤 하지요.\n#4;em;…"
80000110-32 = "4;칸나;05;특히나 안전사고가 자주 발생하기 때문에 생활안전국의 학생들이 고생이 많습니다."
80000110-33 = "4;칸나;99;……물론 중범죄자를 주로 처리하는 저희 공안국과는 큰 관계가 없지만요."
80000110-34 = "#st;[0,0];instant;1;"
80000110-35 = "#clearST"
80000110-36 = "4;칸나;99\n#4;em;…\n#wait;2500"
80000110-37 = "4;칸나;99;………."
80000110-38 = "4;칸나;02;선생님, 오신 김에 커피 한 잔 어떠십니까?"
80000110-39 = "4;칸나;01;괜찮으시다면 바로 타오겠습니다."
80000110-40 = "[s] \"그럼…… 한 잔만 부탁할게.\""
80000110-41 = "4;칸나;99;네, 그럼 '늘 마시던 것'으로 준비해 오겠습니다."

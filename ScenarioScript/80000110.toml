[translation]
80000110-1 = "局長的特調"
80000110-2 = "（情人節當天早上，因為夏萊的工作前往了女武神警察學園）"
80000110-8 = "女武神警察學園．辦公室"
80000110-10 = "唔嗯，真傷腦筋……"
80000110-11 = "……嗯？"
80000110-15 = "[USERNAME]老師，早安。"
80000110-16 = "突然來到女武神警察學園有什麼事嗎……"
80000110-17 = "是來確認本週的巡邏計畫？"
80000110-18 = "……原來如此，那我就放心了。"
80000110-19 = "因為臨時在意料之外的地方見到老師，我本來還擔心是不是發生了什麼大事。"
80000110-20 = "[s]「環奈剛剛在做什麼呢？」"
80000110-21 = "和往常一樣，在撰寫與事件相關的報告。"
80000110-22 = "像是作戰中使用的彈藥費用，以及因炮彈造成的商家損失陳述書──"
80000110-27 = "話說回來，今天外面似乎特別熱鬧呢。#n是有什麼活動嗎……"
80000110-28 = "……今天是情人節？"
80000110-29 = "啊，原來已經到這個時期了啊。"
80000110-30 = "雖然附近越來越多店家開始販售巧克力，我原本也覺得可能是時候了……#n不過這幾天工作實在有點忙，一不留神就忘記了。"
80000110-31 = "情人節啊……這個時期D.U.各地會舉行各種與巧克力相關的活動，#n因此女武神警察學園也會加強巡邏。"
80000110-32 = "特別是安全事故會頻繁發生，生活安全局的學生將格外辛苦。"
80000110-33 = "……當然，這跟主要處理重大犯罪的我們公安局，並沒有直接的關係。"
80000110-37 = "……"
80000110-38 = "老師，既然都來了，要不要喝一杯咖啡？"
80000110-39 = "如果您願意的話，我馬上為您準備。"
80000110-40 = "[s]「那……就麻煩你囉。」"
80000110-41 = "我明白了，這就為您準備「平常喝的」。"
80000110-50 = "來，請用。"
80000110-51 = "[s]「謝謝，那我就不客氣了。」"
80000110-57 = "[ns1]「咦？這杯咖啡……」\n[ns2]「好像跟我平常喝的不太一樣耶……？」"
80000110-60 = "味道有什麼問題嗎？"
80000110-61 = "[s]「不，味道雖然跟以前一樣好……」"
80000110-63 = "[ns]「不過好像多了一股濃濃的巧克力香氣。」"
80000110-64 = "許多咖啡原豆中，都會帶有類似水果或巧克力的風味。"
80000110-65 = "只要烘焙得恰到好處，咖啡豆散發出接近巧克力的香氣也不奇怪。"
80000110-66 = "[s]「不過這杯咖啡……跟平常喝的是一樣的原豆吧？」"
80000110-67 = "是的，和平常泡給老師喝的是一樣的原豆。"
80000110-68 = "如果要說和平常相比有什麼差異的話……"
80000110-72 = "或許在今天沖泡咖啡的過程中，可能不自覺地混入了一些主觀情感吧。"
80000110-77 = "……今天一天也加油吧。"
80000110-81 = "（隨後享受著環奈泡的甜美咖啡，開始了一天的工作）"

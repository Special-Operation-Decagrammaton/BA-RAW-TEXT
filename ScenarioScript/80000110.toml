80000110-60 = "3;칸나;02;커피 맛에 무슨 문제라도 있나요?"
80000110-61 = "[s] \"아니. 맛은 언제나처럼 좋지만. 다만 커피 향에서……\""
80000110-62 = "#wait;1000"
80000110-63 = "[ns] \"진한 다크 초콜릿 냄새가 나.\""
80000110-64 = "3;칸나;03;커피 원두 중에는 과실이나 초콜릿의 풍미를 갖고 있는 것이 많으니까요."
80000110-65 = "3;칸나;02;잘 볶아진 커피 원두에서 초콜릿처럼 달콤한 향이 나는 것은 그리 이상한 일이 아닙니다."
80000110-66 = "[s] \"하지만 이 커피…… 평소에 마시던 것과 같은 원두지?\""
80000110-67 = "3;칸나;02;네, 평소에 선생님께 드리던 것과 같은 원두입니다.\n#3;greeting"
80000110-68 = "3;칸나;99;다만 평소와 비교하여 약간의 차이가 있다면……"

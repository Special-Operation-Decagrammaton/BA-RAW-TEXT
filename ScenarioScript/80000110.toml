[translation]
80000110-1 = "The Director's Blend"
80000110-2 = "On Valentine's Day morning, I went to Valkyrie Police School to do some work for Schale."
80000110-8 = "Valkyrie Police School Administrative Office"
80000110-10 = "Hmm. What a mess..."
80000110-11 = "...Hm?"
80000110-15 = "Good morning, [USERNAME] Sensei."
80000110-16 = "What brings you to the Valkyrie Police School so early?"
80000110-17 = "You're here to check this week's patrol schedule?"
80000110-18 = "...I see. What a relief."
80000110-19 = "I wasn't expecting you, so I was worried we were in the middle of another crisis."
80000110-20 = "[s] \"What brings you here early, Kanna?\""
80000110-21 = "Typing up incidents reports, the usual."
80000110-22 = "I had an expense report for the ammunition used during operations. A damage report for the shopping complex getting hit by grenades—"
80000110-27 = "It's a little chaotic today. Must be a big event going on..."
80000110-28 = "...Valentine's Day?"
80000110-29 = "Ah, so it's that time of the year already."
80000110-30 = "I should've realized it once the stores near the station started selling chocolates. But I've been so busy this week, it slipped my mind."
80000110-31 = "Valentine's Day... The Valkyrie Police School has to be extra careful with patrols around this time of the year, thanks to all the chocolate-themed events all over the D.U."
80000110-32 = "Many safety incidents happen around this time of the year, so us Public Safety Bureau students have it rough."
80000110-33 = "...These incidents are outside the Public Peace Bureau's jurisdiction though, since we usually only deal with serious criminals."
80000110-37 = "..."
80000110-38 = "Since you're already here, want some coffee, Sensei?"
80000110-39 = "I can brew a fresh pot right now."
80000110-40 = "[s] \"In that case... One hot cup of coffee, please.\""
80000110-41 = "All right. I take it you'll want your \"usual\"?"
80000110-50 = "Here you go."
80000110-51 = "[s] \"Thanks! It looks good.\""
80000110-57 = "[ns1] \"Huh? This coffee tastes...\"\n[ns2] \"...A bit different than usual?\""
80000110-60 = "What's wrong with the taste?"
80000110-61 = "[s] \"Nothing. It tastes amazing as always.\""
80000110-63 = "[ns] \"But now it's got a strong, dark chocolate scent to it.\""
80000110-64 = "Well, there are lots of coffee beans with fruit or chocolate accents."
80000110-65 = "It's not unusual for well roasted coffee beans to smell like chocolate."
80000110-66 = "[s] \"But for this coffee you used the same beans as usual, right?\""
80000110-67 = "Yep. Same beans that I always use."
80000110-68 = "But if the beans just so happened to taste a bit different than usual..."
80000110-72 = "It might be because a little bit of sentiment got mixed in during the blending."
80000110-77 = "...I hope you have a great day."
80000110-81 = "And so, I started my day with a bittersweet coffee from Kanna."

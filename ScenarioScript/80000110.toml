[translation]
80000110-1 = "กาแฟหอมกรุ่นของหัวหน้ากรม"
80000110-2 = "(เช้าวันวาเลนไทน์ คุณครูแวะไปทำธุระเรื่องงานที่สถาบันฝึกตำรวจวัลคิรี่)"
80000110-8 = "ห้องบริหาร สถาบันฝึกตำรวจวัลคิรี่"
80000110-10 = "อืม งั้นก็ยุ่งแล้วละ..."
80000110-11 = "หืม...?"
80000110-15 = "คุณครู [USERNAME] อรุณสวัสดิ์ค่ะ"
80000110-16 = "มาทำอะไรที่สถาบันฝึกตำรวจวัลคิรี่ในเวลานี้เหรอคะ..."
80000110-17 = "มาตรวจสอบตารางลาดตระเวนของสัปดาห์นี้?"
80000110-18 = "อย่างนี้เองเหรอคะ งั้นก็โล่งอกไปทีค่ะ"
80000110-19 = "จู่ๆ ก็ได้มาเจอคุณครูในที่ที่ไม่คาดคิดแบบนี้ ฉันก็กังวลว่าจะมีเรื่องอะไรเกิดขึ้นหรือเปล่าน่ะค่ะ"
80000110-20 = "[s] \"แล้วคันนะทำอะไรอยู่เหรอ?\""
80000110-21 = "ฉันกำลังเขียนรายงานเกี่ยวกับเหตุการณ์ที่เกิดขึ้นเหมือนทุกวันค่ะ"
80000110-22 = "รายงานการเงินเกี่ยวกับกระสุนที่ใช้ในปฏิบัติการและบันทึกความเสียหายในเขตศูนย์การค้าที่เกิดจาก#nลูกกระสุนปืนใหญ่..."
80000110-27 = "จะว่าไป วันนี้ข้างนอกดูวุ่นวายมากกว่าปกตินะคะ มีงานอะไรกันเหรอ..."
80000110-28 = "วันวาเลนไทน์เหรอคะ...?"
80000110-29 = "อ่า... เวลาผ่านไปขนาดนี้แล้วเหรอคะเนี่ย"
80000110-30 = "ฉันก็คิดอยู่ว่าช่วงนี้ใกล้ๆ สถานีมีร้านขายช็อกโกแลตมากขึ้น แต่ 2-3 วันที่ผ่านมาฉันงานยุ่งจนลืมไป#nเลยค่ะ"
80000110-31 = "ถ้าเป็นช่วงวาเลนไทน์... ก็จะมีการจัดกิจกรรมที่ใช้ช็อกโกแลตอยู่ทุกที่ใน D.U. ทางสถาบันฝึกตำรวจ วัลคิรี่ก็เลยเพิ่มระดับการลาดตระเวนด้วยค่ะ"
80000110-32 = "และเพราะมีอุบัติเหตุด้านความปลอดภัยเกิดขึ้นบ่อยครั้ง นักเรียนของสำนักรักษาความปลอดภัยก็เลย#nต้องเจองานหนักเป็นพิเศษค่ะ"
80000110-33 = "แต่การจัดการเกี่ยวกับอาชญากรรมร้ายแรงส่วนใหญ่ไม่ค่อยเกี่ยวกับกรมความมั่นคงสาธารณะของเรา#nเท่าไรหรอกค่ะ"
80000110-37 = "......"
80000110-38 = "ไหนๆ ก็แวะมาที่นี่แล้ว ดื่มกาแฟสักแก้วไหมคะคุณครู?"
80000110-39 = "ฉันจะไปชงมาให้เดี๋ยวนี้เลยค่ะ"
80000110-40 = "[s] \"ถ้างั้น... ครูขอแก้วหนึ่งนะ\""
80000110-41 = "ค่ะ ฉันจะชง 'เมนูที่คุณครูดื่มบ่อยๆ' มาให้ค่ะ"
80000110-50 = "นี่ค่ะ"
80000110-51 = "[s] \"ขอบใจนะ จะดื่มให้อร่อยเลย\""
80000110-57 = "[ns1] \"หืม? กาแฟแก้วนี้มัน...\"\n[ns2] \"เหมือนจะต่างกับที่ดื่มปกตินิดหน่อยนะ...?\""
80000110-60 = "มีปัญหาอะไรกับรสชาติกาแฟหรือเปล่าคะ?"
80000110-61 = "[s] \"ไม่หรอก รสชาติดีเหมือนเดิมนั่นละ แต่ว่ากาแฟมีกลิ่นเหมือน...\""
80000110-63 = "[ns] \"ดาร์กช็อกโกแลตเข้มๆ น่ะ\""
80000110-64 = "มีเมล็ดกาแฟมากมายที่ให้รสชาติของผลไม้และช็อกโกแลตนะคะ"
80000110-65 = "ไม่ใช่เรื่องแปลกหรอกค่ะที่เมล็ดกาแฟที่คั่วอย่างดีจะมีกลิ่นหอมหวานเหมือนช็อกโกแลต"
80000110-66 = "[s] \"แต่ว่ากาแฟแก้วนี้... มาจากเมล็ดกาแฟที่ใช้ปกติหรือเปล่า?\""
80000110-67 = "ใช่ค่ะ เป็นเมล็ดกาแฟเดียวกับที่ฉันชงให้คุณครูบ่อยๆ เลยค่ะ"
80000110-68 = "แต่ก็มีความแตกต่างจากปกติเล็กน้อย..."
80000110-72 = "เพราะวันนี้ตอนที่ฉันผสมกาแฟ ฉันใส่ความรู้สึกส่วนตัวลงไปด้วยค่ะ"
80000110-77 = "ถ้างั้นวันนี้ก็สู้ๆ นะคะ..."
80000110-81 = "(หลังจากนั้นคุณครูก็ดื่มกาแฟหวานๆ จากหัวใจของคันนะจนหมดแล้วเริ่มวันใหม่อย่างมีพลัง)"

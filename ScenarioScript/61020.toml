61020-28 = "1;아즈사;99;으음. 그건 나도 궁금하군. 시험이라면 이미, 그때의 보충 수업을 통해 어떤 것인지 확실히 알게 되었지만…….\n#1;a\n#1;em;[...]"
61020-29 = "5;히후미;02;네. 트리니티 종합고사의 시험 문제는, 트리니티 내부가 아니라 외부에서 출제되거든요.\n#5;a\n#5;jump"
61020-30 = "3;코하루;05;그렇게 대단한 이유는 아니야. 뭐랬더라…… 공신력? 객관성? 으으, 뭐 그런 단어들이 있었는데…….\n#3;stiff"

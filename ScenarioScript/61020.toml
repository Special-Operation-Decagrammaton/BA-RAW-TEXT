[translation]
61020-1 = "第2話;學生的本分！"
61020-2 = "總覺得好久不見了呢，老師！"
61020-3 = "可以的話真希望能更常見到你。#n不然這樣下去，搞不好都要忘記彼此的臉了……"
61020-4 = "嗯？是嗎？我絕對不會忘記老師的臉和耳朵。"
61020-5 = "畢竟如果不記得目標的外貌特徵，可是會影響任務執行的啊。"
61020-9 = "……你在說什麼啊？是把老師當成暗殺目標之類的嗎？"
61020-10 = "唔呵呵，我想應該不是那麼可怕的事情……但搞不好是接受夜間補課的對象哦。"
61020-11 = "又來了！為什麼每次都要把話題帶到那個方向啊！"
61020-12 = "你的嘴巴一天不聊這種話題就會長刺是不是啦！#n死刑──！！！"
61020-13 = "啊咿♡"
61020-14 = "奇怪的感嘆詞也禁止──！！！"
61020-16 = "啊哈哈……從下週開始我們也會變得很忙，所以得趁現在多見見老師才行。"
61020-17 = "[s]「下週？下週有什麼事嗎？」"
61020-18 = "啊，對了。老師可能還不知道吧。"
61020-19 = "不久後就是三一綜合考試的季節。"
61020-20 = "所以差不多該認真開始準備了，啊嗚……"
61020-21 = "[s]「三一綜合考試？」"
61020-23 = "唔呵呵。是場所有三一在校生都要參加的……"
61020-24 = "從語文能力到保健教育、保健教育，還有保健教育……#n涵蓋所有科目、所有範圍的──"
61020-25 = "名副其實的綜合考試唷。"
61020-26 = "為什麼保健教育要強調三次啊……#n算了，你不用解釋。我大概懂了。"
61020-27 = "[s]「那跟普通的考試不一樣嗎？」"
61020-28 = "唔嗯……我也有點好奇。#n普通考試的話，之前補課的時候已經大致了解了……"
61020-29 = "不同的地方在於……#n三一綜合考試的題目不是由三一內部出題，而是由外部的機構來負責。"
61020-30 = "理由其實也沒多特別。#n記得好像是……公信力還是客觀性之類的？#n唔嗯，反正大概就是因為這些……"
61020-34 = "畢竟如果只由三一內部出題，可能會有所偏頗或不夠客觀。"
61020-35 = "除此之外……"
61020-36 = "還會有諸如「負責出題的人該如何考試」之類的問題出現。"
61020-37 = "不過有個地方反而算是優點吧？#n那就是考試內容不會包含禮拜的課程。"
61020-38 = "[s]「啊哈……我懂了。就是區域模擬考的意思吧……」"
61020-39 = "區域……模擬考？那是什麼？"
61020-40 = "原來有那種東西嗎？#n唔嗯……好像有點印象，但又不太確定。"
61020-42 = "嗯。從表情來看，老師似乎也不太喜歡考試呢。"
61020-44 = "呵呵，喜歡考試的人應該本來就不多才對。#n當然，我也是一樣哦。"
61020-45 = "覺得意外嗎？#n老師您也真是的，我也是普通的女高中生哦？"
61020-46 = "普通的……？"
61020-47 = "不過如果是跟老師一起進行的「夜間考試」……#n呵呵呵……別說是喜歡，甚至都有點期待了呢？"
61020-48 = "你！快給我！停下來！！！"
61020-49 = "哎呀哎呀，小春醬。#n來，還有最後一句是──"
61020-54 = "死刑──！！！！！"
61020-55 = "呀啊♡"
61020-56 = "啊哈哈哈……"
61020-58 = "我懂了，日步美。#n意思是這次的綜合考試，不會特別指定所謂的「不及格生」對吧。"
61020-59 = "沒錯，畢竟這場考試是由外部機構負責出題的。#n不過正因如此，更要努力準備才行。"
61020-60 = "三一可是最頂尖的學園！絕對不能丟臉！"
61020-61 = "而且雖然不會特別指定不及格生……#n如果成績太低的話，還是會被在放學後安排「特別補習」……"
61020-62 = "嗯？明明沒有不及格生，卻還是要求成績不好的學生參加補習？#n聽起來好像有點矛盾。"
61020-63 = "唔嗯……用意應該是不想讓考不好的學生負擔過多的責任吧。"
61020-64 = "……就像以前我們補課部的活動一樣。"
61020-65 = "所謂的特別補習，基本上也只要參加完規定時間的課程就好。"
61020-66 = "呵呵。不過光是奪走寶貴的放學時間，就已經足夠讓人沮喪了吧？"
61020-68 = "[ns]「沒錯！這次一定要好好加油，別被抓去補習！」"
61020-69 = "啊嗚……"
61020-70 = "唔呵呵。雖然不太可能，但如果大家都考得很好，只有我一個人要補習的話……"
61020-71 = "真希望負責人可以是老師呢。"
61020-72 = "空蕩蕩的教室。染上晚霞的天空。#n半開的窗戶吹進傍晚的微風。飄動的窗簾……"
61020-73 = "我因為想偷懶而呆呆望著窗外，老師則走近提醒我要專心……"
61020-74 = "這時恰好吹來一陣風，將我和老師帶進只屬於兩人的空間──"
61020-80 = "默默注視著彼此，距離在不知不覺間緩緩靠近──"
61020-81 = "啊，啊哇哇哇哇！？"
61020-82 = "？？？"
61020-83 = "！？！？！！！！！"
61020-84 = "你給我暫時把嘴巴閉上！！！！！"
61020-85 = "真可惜～"
61020-90 = "[ns1]（既然如此……）\n[ns2]（也去看看其他孩子的情況吧……）"
61020-94 = "[ns]「考試期間也在進行自衛隊的活動嗎？」"
61020-95 = "那當然囉！學業和維護街道秩序都不能疏忽！"
61020-96 = "兩邊同時兼顧才是自衛隊堅定不移的意志，也是行動的原則！"
61020-97 = "對吧，鈴美同學！"
61020-101 = "那個，其實自衛隊並沒有特別的行動原則……"
61020-102 = "不過學習畢竟是學生的本分，我認為澪紗同學這麼說也沒錯。"
61020-103 = "咦？光是看到我就感到安心？#n這，這是什麼意思呢，老師……？"
61020-104 = "雖然不太理解，但應該是好事吧！"
61020-108 = "唔哇！？原，原來是志美子和老師啊……#n我還以為是其他外面的人呢……"
61020-109 = "老師說因為三一綜合考試快到了，所以想來看看圖書委員會準備的狀況。"
61020-110 = "那種考試，在語文領域根本不用特別準備吧……"
61020-111 = "可是這是「綜合」考試哦？#n不只是語文，所有科目都要準備好才行。"
61020-112 = "書裡什麼都有，所以我沒問題……"
61020-114 = "數學也是嗎？"
61020-115 = "唔呃！？"
61020-116 = "委員長，偏讀就跟挑食一樣是不好的哦？"
61020-117 = "唔唔唔唔……"
61020-119 = "[ns]「話說志美子的數學還好嗎？」"
61020-120 = "我嗎？"
61020-121 = "因為我是1年級的關係，考試範圍比3年級的委員長相對小一點。"
61020-122 = "唔唔……真狡猾……"
61020-125 = "嗨，老師。歡迎你來。#n嗯……因為綜合考試的關係，大家決定聚在一起念書……"
61020-129 = "聽好了，冒險者們。#n要讓腦袋靈活運轉的話，糖份是最重要的。"
61020-130 = "由於我們的大腦，只接受名為「葡萄糖」的高級燃料……"
61020-131 = "因此我們現在吃甜點的行為，簡直再正當不過了！"
61020-132 = "沒錯沒錯！夏偶爾也會說點有用的話嘛！#n果然要有甜點才讀得進去！"
61020-134 = "結果卻一直都是這樣……"
61020-135 = "抱，抱歉，老師。#n明明你都特地來關心我們了……"
61020-137 = "[ns]「某種意義上來說，這樣反而讓人安心啊……」"
61020-139 = "這是當然的，老師。#n無論考試還是救護都不能疏忽，這才是救護騎士團的基本理念。"
61020-140 = "尤其像這種綜合考試，完全能夠稱得上是另一種形式的救護！"
61020-141 = "[s]「那個……請問這麼說的邏輯是……？」"
61020-142 = "因為救護和考試，都是為了廣泛地造福人群。"
61020-143 = "不偏離其本質，忠實地加以執行……或許這正是證明我們救護精神的方式吧。"
61020-144 = "比如不求回報地以善意幫助他人，這是救護。"
61020-145 = "在不義發生之處以物理手段維護規範，這也是救護。"
61020-146 = "懲罰那些刻意削減成本、製造妨礙消毒治療的醫療用品的惡質公司，也同樣是救護。"
61020-147 = "所有道路，最終都將通向救護。"
61020-148 = "因此，考試就是救護。"
61020-150 = "嗯？什麼是救護……是嗎？#n啊哈哈哈……"
61020-151 = "應，應該可以說是……我們救護騎士團最重要的價值吧？"
61020-152 = "不過，為什麼考試範圍裡沒有三一特有的醫療技術呢……"
61020-153 = "那，那可能是因為……在許多方面都太過創新了吧，花繪醬？"
61020-155 = "老，老老老老老，老師！？#n您，您為何會來這麼簡陋的地方……？"
61020-156 = "來，來看我們念書的情況是嗎？#n那，那真是令人高興……不過……！"
61020-157 = "咳……唔……"
61020-158 = "弦生？沒事的，放輕鬆。#n老師還在這裡哦。"
61020-159 = "嗯，嗯……"
61020-160 = "謝，謝謝您，老師……#n感謝您這麼關心我們……"
61020-162 = "[ns]「感覺好像打擾到你們念書了，真是不好意思……」"
61020-163 = "請別這麼說，老師。#n我們也正好需要稍微喘口氣。"
61020-164 = "畢竟從幾天前開始，下課後除了吃飯或處理現場工作之外，其他時間都用來念書了。"
61020-165 = "再加上我們實現正義部和其他社團相比，個人時間又相對較少……"
61020-170 = "不過你也不用太擔心哦，老師。#n雖然確實有這種情況，但大家都是充分了解後才選擇參加的。"
61020-171 = "沒錯。無論遇到什麼困難都不動搖，貫徹自己認為正確的道路……"
61020-172 = "我想這才是實現正義部的本質吧。"
61020-173 = "哦，說得真好呢！#n那麼就重新回到有關「道德與倫理的相對性」的部分──"
61020-174 = "……這個部分果然還是太難了，一花前輩。#n相對性的意思就是會根據條件改變……但這實在不可能吧……"
61020-175 = "不是所有事情都能說出一個絕對的標準的哦……#n如果覺得很難懂的話，就先試著把它背下來吧……"
61020-177 = "……因此我們修女會，打算所有人一起在大講堂安靜地共學。"
61020-178 = "[s3]「會不會有人其實更喜歡自己念書！？」\n[s4]「比如會覺得害羞或有壓力之類的！」"
61020-181 = "怎麼會呢。#n「在這片天空之下，致力於凡事皆無愧於心」是我們修女會的信念之一。"
61020-182 = "而學習又是學生的本分……為何會感到羞恥呢？"
61020-183 = "我比三一的任何人都信任各位修女！"
61020-184 = "即便真的有人產生那樣的情緒，隨時都能找我「輕鬆地」談談。"
61020-185 = "屆時，我一定會盡力給他方便的。"
61020-186 = "與，與櫻子大人單獨談話……是嗎。"
61020-191 = "正是如此，日向修女。#n不覺得這也是應該廣傳世間的慈悲與愛心嗎？"
61020-193 = "是，是的……這部分確實也有道理……！"
61020-195 = "（最後總算是說服櫻子接受了較為折衷的方案）"
61020-196 = "（讓想去大講堂念書的學生去大講堂，想自習的學生也可以留在宿舍）"
61020-197 = "（真是辛苦日向和瑪麗了……）"
61020-202 = "啊！老師！您好！"
61020-203 = "考試嗎？當然要考好囉～"
61020-204 = "只要努力念書就請我們吃好吃的？#n真的嗎？那我們一言為定哦？"
61020-205 = "好！那久違地來讀點書吧！"
61020-206 = "像上次一樣只讀一頁就趴下睡覺嗎？"
61020-207 = "你那時候還不是一樣！"
61020-213 = "（看著學生們嘻笑著離開的身影，心裡不禁感到欣慰……）"
61020-214 = "（就在這時，有兩名悄悄觀察著情況的學生，小心翼翼地靠了過來）"
61020-220 = "那個，老師……？"
61020-221 = "可以占用您一點時間嗎……？"
61020-224 = "下一話;新的開始"

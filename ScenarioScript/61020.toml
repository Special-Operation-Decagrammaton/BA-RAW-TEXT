61020-9 = "4;코하루;05;……무슨 소리 하는 거야. 선생님을 무슨 암살 대상 그런 걸로 생각하는 거야?\n#4;a\n#4;em;[...]"
61020-10 = "2;하나코;03;우후후. 그런 무서운 것은 아니겠지만, 밤의…… 보충수업을 받기 위해 찾아뵙는 대상일 수는 있겠네요.\n#2;a\n#2;em;[재잘]"
61020-11 = "4;코하루;04;넌 또 왜 그러는데! 왜 항상 무슨 대화만 이어지면 그런 쪽으로 이야기를 몰아가는 거야!\n#4;em;[///]\n#4;stiff"
61020-12 = "4;코하루;09;하루에 한 번 그런 화제가 나오지 않으면, 입안에 가시라도 돋고 그러는 거야? 사형–!!!\n#4;hophop"

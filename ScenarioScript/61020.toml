61020-1 = "#title;제2화;학생의 본분!"
61020-2 = "3;히후미;03;뭔가 오랜만이라는 느낌이네요, 선생님! \n#3;em;[음표]\n#3;a"
61020-3 = "3;히후미;02;더 자주 뵐 수 있었으면 좋겠어요. 이러다 서로 얼굴 잊어버릴지도 모르겠어요……."
61020-4 = "1;아즈사;02;음? 그런가? 나는 선생님의 얼굴과 귀는 결코 잊어버리지 않을 거야.\n#1;a\n#1;jump\n#3;m5"
61020-5 = "1;아즈사;07;타겟의 외형적 특징을 놓치지 않아야, 임무 수행에 지장이 없으니까.\n#1;em;[반짝]"

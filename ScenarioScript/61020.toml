[translation]
61020-1 = "ตอนที่ 2;หน้าที่หลักของนักเรียน!"
61020-2 = "รู้สึกเหมือนไม่ได้เจอกันนานเลยนะคะ คุณครู!"
61020-3 = "อยากให้เราได้เจอกันบ่อยกว่านี้จัง ถ้าไม่ได้เจอกันบ่อยๆ ฉันว่าเราอาจจะลืมหน้ากันได้เลยนะคะ..."
61020-4 = "หืม? งั้นเหรอ? แต่ฉันไม่มีวันลืมหน้ากับหูของคุณครูหรอกนะ"
61020-5 = "เราต้องจำรูปลักษณ์ของเป้าหมายให้แม่นยำ จะได้ไม่เป็นอุปสรรคต่อการทำภารกิจยังไงล่ะ"
61020-9 = "พูดเรื่องอะไรน่ะ... คิดว่าคุณครูเป็นเป้าหมายในภารกิจลอบสังหารหรืออะไรแบบนั้นหรือไง?"
61020-10 = "ฮุฮุฮุ คงไม่ใช่อะไรที่น่ากลัวแบบนั้นหรอกค่ะ บางทีอาจจะเป็นเป้าหมายที่เราแวะไปหาตอนกลางคืน... เพื่อขอให้เปิดคลาสเรียนเสริมให้หน่อย"
61020-11 = "อะไรของเธออีกเนี่ย! ทำไมเวลาคุยเรื่องอะไรอยู่แล้วถึงออกทะเลไปเรื่องแบบนั้นทุกทีเลย!"
61020-12 = "ถ้าไม่ได้พูดเรื่องแบบนั้นสักวันจะนอนไม่หลับหรือไง? เดี๋ยวลงโทษซะเลย!!!"
61020-13 = "อ๊าา♡"
61020-14 = "ห้ามทำเสียงแปลกๆ แบบนั้นนะ!!!"
61020-16 = "แหะๆ... พวกฉันจะยุ่งๆ กันตั้งแต่สัปดาห์หน้าเป็นต้นไปค่ะ ถ้างั้นตอนที่มีเวลาอย่างตอนนี้ก็ควรมาเจอ#nคุณครูให้บ่อยๆ หน่อยน่ะค่ะ"
61020-17 = "[s] \"สัปดาห์หน้า? จะมีเรื่องอะไรกันเหรอ?\""
61020-18 = "อ่า... คุณครูอาจจะยังไม่รู้สินะ"
61020-19 = "ค่ะ ฤดูกาลสอบบูรณาการของทรีนิตี้กำลังใกล้เข้ามาแล้วค่ะ"
61020-20 = "พวกฉันก็เลยต้องเตรียมตัวสอบอย่างจริงจังน่ะค่ะ ฮือ..."
61020-21 = "[s] \"การสอบบูรณาการของทรีนิตี้?\""
61020-23 = "ฮุฮุฮุ มันคือการสอบเพื่อวัดผลนักเรียนทรีนิตี้ทุกคน..."
61020-24 = "ที่รวมทุกเนื้อหาของทุกวิชาไว้ทั้งหมดในข้อสอบเดียว... ทั้งเรื่องภาษา สุขศึกษา สุขศึกษา และสุขศึกษา..."
61020-25 = "ก็เลยได้ชื่อว่าเป็นการสอบบูรณาการค่ะ"
61020-26 = "ทำไมต้องเน้นวิชาสุขศึกษาถึง 3 ครั้งเลย... พอเลย ไม่ต้องพูดแล้ว ฉันรู้ดีว่าจะสื่ออะไร"
61020-27 = "[s] \"มันต่างกับการสอบทั่วไปเหรอ?\""
61020-28 = "อืม เรื่องนั้นฉันก็สงสัยเหมือนกัน ถ้าเป็นการสอบทั่วไปละก็ ฉันรู้แจ่มแจ้งแล้วละว่ามันเป็นยังไง จากการเรียนในชั้นเรียนเสริมตอนนั้น แต่นี่มัน..."
61020-29 = "ค่ะ ข้อสอบบูรณาการของทรีนิตี้ไม่ได้ออกโดยทรีนิตี้หรอกค่ะ มีคนนอกมาออกข้อสอบให้อีกทีน่ะค่ะ"
61020-30 = "แต่เหตุผลมันไม่ได้ยิ่งใหญ่ขนาดนั้นหรอกนะ มันเกี่ยวกับเรื่อง... การยอมรับ? วัตถุวิสัย?#nอืม น่าจะเป็นคำประมาณนี้น่ะ..."
61020-34 = "ถ้าคนในทรีนิตี้เป็นคนออกข้อสอบทั้งหมด ก็มีความเป็นไปได้ที่คำถามจะลำเอียงหรือไม่เป็นกลางค่ะ"
61020-35 = "บางคนอาจตั้งคำถามแบบนี้ก็ได้ค่ะ"
61020-36 = "อย่างเช่น 'แล้วคนที่ออกข้อสอบ จะให้ไปทำข้อสอบชุดไหน?' ประมาณนี้น่ะค่ะ"
61020-37 = "แต่ให้คนนอกมาออกข้อสอบก็ดีเหมือนกันนะคะ ได้ยินว่าไม่มีวิชาสวดมนต์ในข้อสอบด้วยค่ะ"
61020-38 = "[s] \"อ่า... เข้าใจแล้ว เหมือนการสอบจำลองทั่วประเทศสินะ...\""
61020-39 = "สอบจำลอง... ทั่วประเทศ? คืออะไรเหรอ?"
61020-40 = "มีการสอบอะไรแบบนั้นด้วยเหรอ? อืม... เหมือนจะเข้าใจ... แต่ก็เหมือนจะไม่เข้าใจเลย..."
61020-42 = "อืม ดูจากสีหน้าแล้ว คุณครูเองก็ไม่ชอบการสอบเท่าไรสินะ"
61020-44 = "ฮุฮุ อย่างนั้นสินะ จะบอกว่าแทบไม่มีใครที่ชอบการสอบสินะคะ ฉันก็ไม่ชอบเหมือนกันค่ะ"
61020-45 = "ผิดคาดงั้นเหรอคะ? คุณครูนี่ละก็ ฉันก็เป็นเด็กมัธยมปลายธรรมดาๆ เหมือนคนอื่นนะคะ"
61020-46 = "ธรรมดาเหรอ...?"
61020-47 = "แต่ถ้าเป็น 'การสอบภาคค่ำ' กับคุณครูละก็... ฮุฮุฮุ... ฉันอาจจะชอบมากๆ... จนถึงขั้นตั้งตารอก็ได้นะคะ?"
61020-48 = "เธอนี่นะ! ให้มันน้อยๆ หน่อยเถอะน่า!!!"
61020-49 = "ตายแล้วๆ โคฮารุจัง เร็วเข้าสิ รีบพูดคำนั้นออกมา..."
61020-54 = "โดนลงโทษแน่!!!!!!"
61020-55 = "อ๊าย♡"
61020-56 = "แหะๆๆๆ..."
61020-58 = "ฉันเข้าใจแล้ว ฮิฟุมิ งั้นการสอบบูรณาการครั้งนี้ก็ไม่น่ามีนักเรียนที่สอบตกสินะ"
61020-59 = "ค่ะ เพราะยังไงคนออกข้อสอบก็เป็นองค์กรจากภายนอกนี่คะ แต่นั่นก็เป็นเหตุผลที่เราต้องตั้งใจอ่าน#nหนังสือให้หนักกว่าเดิมด้วยค่ะ"
61020-60 = "ก็ทรีนิตี้เป็นโรงเรียนอันดับ 1 นี่นา! จะยอมให้ใครดูถูกไม่ได้หรอก!"
61020-61 = "และถึงจะไม่มีการปรับให้สอบตก... แต่เด็กที่ได้คะแนนน้อยมากๆ ก็จะถูกจัดให้มาเรียนเสริมพิเศษ#nหลังเลิกเรียนค่ะ..."
61020-62 = "หืม? ไม่ปรับให้สอบตก แต่นักเรียนที่ได้คะแนนน้อยต้องมาเรียนเสริมงั้นเหรอ แบบนี้มันย้อนแย้งหรือเปล่า?"
61020-63 = "อืม... ความหมายก็คือต่อให้คะแนนต่ำเตี้ยเรี่ยดิน ก็จะไม่ถึงกับโดนไล่ออก แต่ให้รับผิดชอบด้วยการ#nทำอย่างอื่นแทนน่ะค่ะ"
61020-64 = "เหมือนกับที่พวกเราชมรมชั้นเรียนเสริมต้องทำกันเมื่อก่อนไงคะ..."
61020-65 = "และถึงจะได้ชื่อว่าการเรียนเสริม แต่โดยพื้นฐานแล้วก็แค่เข้าไปนั่งให้ครบชั่วโมงก็พอค่ะ"
61020-66 = "ฮุฮุ แต่มันก็น่าเสียดายไม่ใช่เหรอคะที่ต้องสูญเสียเวลาอันมีค่าหลังเลิกเรียนไป?"
61020-68 = "[ns] \"นั่นสินะ! ครั้งนี้มาทำให้ไม่ต้องไปเรียนเสริมกันเถอะ!\""
61020-69 = "อ่าา.."
61020-70 = "ฮุฮุฮุ แน่นอนว่ามันไม่มีทางเป็นอย่างนั้น แต่สมมติทุกคนทำข้อสอบบูรณาการได้คะแนนดีกันหมด แล้วมีแต่ฉันที่ต้องไปเรียนเสริมอยู่คนเดียวละก็..."
61020-71 = "ฉันอยากขอให้คุณครูช่วยเป็นคนสอนจังเลยค่ะ"
61020-72 = "ห้องเรียนที่ไม่มีใคร ท้องฟ้าที่ตะวันลาลับ สายลมยามเย็นที่พัดผ่านหน้าต่างที่เปิดไว้ครึ่งบาน ผ้าม่านที่พลิ้วไหว..."
61020-73 = "ฉันมองเหม่อออกไปนอกหน้าต่างเพราะในใจคิดถึงเรื่องอื่น แล้วคุณครูก็เข้ามาใกล้และบอกให้ฉันมี#nสมาธิกับการเรียน..."
61020-74 = "ตอนนั้นเองลมก็พัดแรงจนฉันกับคุณครูปลิวไปอยู่ในพื้นที่ที่มีแต่สองเราเท่านั้น..."
61020-80 = "ระยะห่างระหว่างคนสองคนที่เผชิญหน้ากันด้วยความเงียบค่อยๆ ลดลงโดยไม่รู้ตัว..."
61020-81 = "อะ... อ๊ายยยย?!"
61020-82 = "???"
61020-83 = "!?!?!!!!!"
61020-84 = "ไม่ต้องพูดต่อแล้ว รูดซิปปากไปเลย!!!!!"
61020-85 = "น่าเสียดายจัง~"
61020-90 = "[ns1] (จะว่าไป แล้วนักเรียนคนอื่นล่ะ...)\n[ns2] (ไปดูหน่อยดีกว่าว่านักเรียนคนอื่นเป็นยังไงกันบ้าง...)"
61020-94 = "[ns] \"ช่วงสอบแต่ก็ยังมาทำงานกลุ่มรักษาความสงบอีกเหรอ?\""
61020-95 = "ค่ะ! แน่นอนสิคะ! ทั้งเรื่องการเรียนและการปกป้องความสงบเรียบร้อยบนท้องถนน เป็นเรื่องที่ควรใส่ใจให้เท่ากันค่ะ!"
61020-96 = "การไม่ละเลยต่อเรื่องใดนับเป็นหลักปฏิบัติและความตั้งใจที่แน่วแน่ของกลุ่มรักษาความสงบค่ะ!"
61020-97 = "ใช่มั้ยล่ะคะ คุณสึซึมิ?"
61020-101 = "เอ่อ... กลุ่มรักษาความสงบไม่มีการกำหนดหลักปฏิบัติอะไรเป็นพิเศษหรอกค่ะ..."
61020-102 = "แต่ถึงยังไงการเรียนก็เป็นหน้าที่หลักของนักเรียนอยู่แล้ว ฉันคิดว่าที่คุณเรอิสะพูดมาก็ไม่ผิดหรอกค่ะ"
61020-103 = "คะ? แค่เห็นฉันก็รู้สึกปลอดภัยขึ้นมางั้นเหรอคะ? พะ... พูดแบบนี้หมายความว่ายังไงคะ คุณครู...?"
61020-104 = "ฉันก็ไม่แน่ใจเท่าไร แต่ฟังดูน่าจะเป็นเรื่องดีนะคะ!"
61020-108 = "เหวอ?! กะ... ก็คิดว่าใคร เป็นชิมิโกะกับคุณครูเองสินะคะ... ฉันคิดว่าจะมีคนนอกเข้ามาเสียอีก..."
61020-109 = "คุณครูอยากรู้ว่าชมรมอ่านหนังสือเตรียมตัวสอบบูรณาการของทรีนิตี้กันยังไงบ้าง ก็เลยแวะมาหาน่ะค่ะหัวหน้า"
61020-110 = "การสอบนั่นน่ะเหรอ แค่อ่านวิชาภาษามากหน่อยก็พอแล้ว..."
61020-111 = "แต่นี่เป็นการสอบ 'บูรณาการ' นะคะ? นอกจากวิชาภาษาแล้ว เราต้องอ่านวิชาอื่นด้วยสิคะ"
61020-112 = "เนื้อหาของทุกวิชาก็อยู่ในหนังสือที่อ่านประจำนี่ละ ฉันไม่ต้องเตรียมตัวเป็นพิเศษหรอก..."
61020-114 = "คณิตศาสตร์ก็ด้วยเหรอคะ?"
61020-115 = "เฮือก?!"
61020-116 = "แบบนี้ก็ไม่ได้สิคะ หัวหน้า การเลือกกินเป็นสิ่งไม่ดี การเลือกอ่านหนังสือก็เป็นสิ่งไม่ดีเหมือนกันค่ะ"
61020-117 = "อึกกก..."
61020-119 = "[ns] \"แล้วชิมิโกะไม่กังวลวิชาคณิตศาสตร์เหรอ?\""
61020-120 = "ฉันเหรอคะ?"
61020-121 = "ฉันยังอยู่ชั้นปีที่ 1 เนื้อหาที่เรียนก็เลยไม่เยอะเท่าของหัวหน้าที่อยู่ชั้นปีที่ 3 ค่ะ"
61020-122 = "ฮืออ... อิจฉาจัง..."
61020-125 = "สวัสดี คุณครู เข้ามาสิ อื้อ... ใช่ ใกล้จะถึงการสอบบูรณาการแล้วละ พวกฉันก็เลยนัดมาติวหนังสือด้วยกัน..."
61020-129 = "ฟังนะ เหล่านักผจญภัยทั้งหลาย มีคำกล่าวตั้งแต่โบราณกาลว่าน้ำตาลมีความสำคัญต่อการทำงาน#nของสมอง"
61020-130 = "สมองของเราไม่รับพลังงานอื่นใดนอกจากเชื้อเพลิงคุณภาพสูงที่ได้ชื่อว่าน้ำตาลกลูโคส"
61020-131 = "ดังนั้นฉันขอประกาศว่า การออกไปกินของหวานเป็นสิ่งที่ถูกต้องในตอนนี้!"
61020-132 = "ใช่ ใช่! บางทีนัตสึก็พูดอะไรที่เป็นประโยชน์เหมือนกันนะ! ถ้าอยากอ่านหนังสือให้เข้าสมอง ก็ย่อมต้องใช้ของหวานเข้าช่วย!"
61020-134 = "แต่ทุกคนก็เป็นกันเสียอย่างนี้น่ะ..."
61020-135 = "ขะ... ขอโทษค่ะคุณครู คุณครูอุตส่าห์มาหาเพราะเป็นห่วงแท้ๆ..."
61020-137 = "[ns] \"แต่เห็นแบบนี้ครูก็วางใจนะ...\""
61020-139 = "แน่นอนอยู่แล้วค่ะ คุณครู ไม่ว่าจะเป็นการสอบหรือการบรรเทาทุกข์ การไม่ละเลยต่อสิ่งใดสิ่งหนึ่งคือ ทัศนคติพื้นฐานของชมรมอัศวินบรรเทาทุกข์ค่ะ"
61020-140 = "โดยเฉพาะการสอบบูรณาการที่จะมาถึง การสอบนี้ก็เรียกได้ว่าเป็นการบรรเทาทุกข์ในบางแง่มุมค่ะ!"
61020-141 = "[s] \"นั่นมัน... ตรรกะอะไรเหรอ...?\""
61020-142 = "ทั้งการบรรเทาทุกข์และการสอบ ต่างก็มีไว้เพื่อประโยชน์ของผู้คนค่ะ"
61020-143 = "ฉันเชื่อว่าวิธีที่จะพิสูจน์ความตั้งใจในการบรรเทาทุกข์ของเราได้ก็คือการปฏิบัติและยึดมั่นในแก่นแท้#nอย่างพอเหมาะ"
61020-144 = "การช่วยเหลือผู้อื่นด้วยเจตนาดีโดยไม่หวังสิ่งตอบแทน ก็ถือเป็นการบรรเทาทุกข์ค่ะ"
61020-145 = "การสร้างมาตรฐานด้วยการระดมใช้วิธีทางกายภาพในที่ที่มีความอยุติธรรมก็ถือเป็นการบรรเทาทุกข์"
61020-146 = "การลงโทษบริษัทไร้ยางอายที่จงใจลดต้นทุนแล้วผลิตเวชภัณฑ์ที่ไม่เอื้อต่อการฆ่าเชื้อและรักษาแผล ก็ถือเป็นการบรรเทาทุกข์เช่นกัน"
61020-147 = "ทุกเส้นทางล้วนมุ่งสู่การบรรเทาทุกข์"
61020-148 = "ดังนั้นการสอบก็เป็นการบรรเทาทุกข์เหมือนกันค่ะ"
61020-150 = "คะ? การบรรเทาทุกข์คืออะไร... งั้นเหรอคะ? แหะๆๆๆ..."
61020-151 = "สะ... สำหรับพวกเราชมรมอัศวินบรรเทาทุกข์แล้ว มันคือคุณค่าที่สำคัญที่สุดค่ะ"
61020-152 = "แต่ว่าทำไมในเนื้อหาของการสอบถึงไม่มีเรื่องเทคโนโลยีทางการแพทย์โดยเฉพาะของทางทรีนิตี้#nด้วยล่ะคะ..."
61020-153 = "คะ... คงเป็นเพราะ... เทคโนโลยีทางการแพทย์ของเรามีความสร้างสรรค์มากเกินไปในหลายๆ อย่าง#nหรือเปล่าคะ ฮานาเอะจัง?"
61020-155 = "คะ... คะคะคะคะคะ... คุณ... ครู?! ทะ... ทะทะทะ... ทำไมถึงดั้นด้นมาถึงที่ที่ซอมซ่อแบบนี้...?"
61020-156 = "มะ... มาดูว่าพวกเราเตรียมตัวสอบถึงไหนแล้วงั้นเหรอคะ? นะ... น่าดีใจจังเลย... ค่ะ แต่ก็...!"
61020-157 = "อะ... อึก...!"
61020-158 = "ซึรุกิ? ไม่เป็นไร ไม่ต้องประหม่านะคะ นี่คุณครูเองค่ะ ไม่ใช่ใครอื่นไกล"
61020-159 = "อะ... อื้อ..."
61020-160 = "ขอบคุณ... ค่ะ คุณครู... ขอบคุณที่ใส่ใจกันนะคะ..."
61020-162 = "[ns] \"ขอโทษนะ เหมือนครูมารบกวนการอ่านหนังสือเลย... \""
61020-163 = "ไม่เลยค่ะ คุณครู พวกฉันก็อยากพักหายใจหายคอบ้างเหมือนกันค่ะ"
61020-164 = "ในช่วงไม่กี่วันที่ผ่านมา ถ้าไม่นับตอนกินข้าวหรือตอนออกไปทำภารกิจกลางแจ้ง แม้กระทั่งหลังเลิกเรียนแล้วพวกฉันก็ใช้เวลาทั้งหมดไปกับการเตรียมสอบค่ะ"
61020-165 = "พอเปรียบเทียบกับชมรมอื่นแล้ว ชมรมทวงความยุติธรรมก็งานยุ่งจนพวกเราแทบไม่เหลือเวลาส่วนตัว#nกันด้วยน่ะค่ะ..."
61020-170 = "ไม่ต้องกังวลมากเกินไปหรอกค่ะคุณครู ถึงเข้ามาแล้วจะเหลือเวลาส่วนตัวกันไม่มาก แต่ทุกคนก็เข้าใจเรื่องนั้นตั้งแต่ก่อนมาทำกิจกรรมชมรมแล้วค่ะ"
61020-171 = "ค่ะ ไม่ว่าจะต้องเจอความยากลำบากรูปแบบไหน การไม่หวั่นไหวและเดินตามเส้นทางที่ตัวเองเชื่อว่า#nถูกต้อง..."
61020-172 = "สิ่งนั้นคือแก่นแท้ของชมรมทวงความยุติธรรมค่ะ"
61020-173 = "โอ้ พูดได้ดีเลยค่ะ! ถ้างั้นเรากลับมาที่พาร์ทนี้อีกครั้งค่ะ พาร์ทนี้เกี่ยวกับความสัมพันธ์ระหว่างศีลธรรม และจริยธรรม..."
61020-174 = "พาร์ทนี้ยากจังเลยค่ะ รุ่นพี่อิจิกะ... เท่าที่ฉันรู้คือสิ่งที่สัมพันธ์กันจะเปลี่ยนไปตามเงื่อนไข... แต่ศีลธรรมและจริยธรรมมัน..."
61020-175 = "มันไม่ได้เป็นอย่างที่พูดเสมอไปหรอกค่ะ... ถ้ายังยากที่จะเข้าใจ งั้นลองท่องจำเอาก่อนค่ะ..."
61020-177 = "พวกเราชมรมซิสเตอร์ก็เลยตัดสินใจไปรวมตัวกันที่หอประชุม แล้วอ่านหนังสือด้วยกันเงียบๆ ค่ะ..."
61020-178 = "[s3] \"ตะ... แต่ก็น่าจะมีคนที่ชอบติวหนังสือคนเดียวนะ?!\"\n[s4] \"แต่ก็น่าจะมีคนที่เขินหรือหนักใจเวลาอยู่ด้วยกันหรือเปล่า!\""
61020-181 = "ไม่มีทางหรอกค่ะ เจตคติอย่างหนึ่งของพวกเราชมรมซิสเตอร์ก็คือการพยายามที่จะไม่เขินอายต่อกัน#nภายใต้ท้องฟ้าเดียวกัน"
61020-182 = "และการเรียน... ก็เป็นหน้าที่หลักอย่างหนึ่งของนักเรียนอยู่แล้ว ถ้างั้นจะต้องเขินอายอะไรกันล่ะคะ?"
61020-183 = "ฉันเชื่อใจและไว้วางใจซิสเตอร์ของเราทุกคนกว่าใครในทรีนิตี้เลยค่ะ!"
61020-184 = "แต่ถ้ามีใครเกิดความรู้สึกแบบนั้นขึ้นมา แล้วมารับคำปรึกษากับฉัน 'อย่างสบายใจ'"
61020-185 = "ฉันก็จะบอกเธอคนนั้นว่าจะอำนวยความสะดวกให้ค่ะ"
61020-186 = "ปะ... ปรึกษาตัวต่อตัวกับคุณซากุระโกะ... สินะคะ"
61020-191 = "ใช่ค่ะ ซิสเตอร์ฮินาตะ ก็นี่คือเจตคติแห่งความเมตตาและความรักที่เราต้องมอบให้คนทั้งโลกนี่คะ?"
61020-193 = "ค่ะ ค่ะ... ก็คงจะจริงอย่างที่ว่านะคะ...!"
61020-195 = "(คุณครูตักเตือนซากุระโกะ แล้วเสนอแผนประนีประนอมให้นักเรียนที่อยากติวหนังสือกับเพื่อนๆ มาติวในหอประชุม)"
61020-196 = "(ส่วนนักเรียนที่อยากติวหนังสือคนเดียวเงียบๆ ก็ให้ไปอยู่ในหอพักของตัวเองได้)"
61020-197 = "(ฮินาตะกับมารี... คงต้องเหนื่อยกันน่าดู...)"
61020-202 = "อ๊ะ! คุณครู! สวัสดีค่ะ!"
61020-203 = "เรื่องสอบเหรอคะ? ค่ะ~ ก็ต้องทำข้อสอบให้ได้คะแนนดีๆ สิคะ~"
61020-204 = "จริงเหรอคะ? ถ้าตั้งใจอ่านหนังสือสอบ จะซื้อของอร่อยๆ ให้? สัญญานะคะ? ห้ามผิดสัญญาด้วยนะ?"
61020-205 = "ดีละ! งั้นก็ไปอ่านหนังสือสอบสักหน่อยดีกว่า!"
61020-206 = "จะอ่านแค่หน้าเดียวแล้วฟุบหลับอีกรอบล่ะสิ?"
61020-207 = "แต่เธอก็หลับเหมือนกันไม่ใช่เหรอ!"
61020-213 = "(ระหว่างที่คุณครูเฝ้าดูนักเรียนที่พูดคุยกันอย่างมีความสุขเดินจากไป...)"
61020-214 = "(ก็มีนักเรียน 2 คนเดินเข้ามาหาอย่างระแวดระวัง)"
61020-220 = "เอ่อ คุณครูคะ...?"
61020-221 = "พอมีเวลาสักเดี๋ยวมั้ยคะ...?"
61020-224 = "ตอนต่อไป;เริ่มต้นใหม่"

[translation]
61020-1 = "Episode 2;A Student's Responsibilities!"
61020-2 = "It's been a while, Sensei! "
61020-3 = "We need to see each other more often, or I might forget what you look like!"
61020-4 = "Will you? Interesting. I have committed the shape of Sensei's face and the point of their ears to memory."
61020-5 = "Recalling a target's appearance perfectly is all a part of completing my mission."
61020-9 = "...What're you even saying? Stop making it sound like you're going to assassinate Sensei..."
61020-10 = "Ohoho. Rather than such violent intentions, perhaps the nature of her mission is that of a...late night call. For make-up classes, of course."
61020-11 = "And now what're YOU saying?! Are you incapable of holding back your lewd tendencies for a single moment?!"
61020-12 = "Are you cursed?! Will your tongue fall off if you don't talk about it at least once a day? DEATH PENALTY!!"
61020-13 = "Meow. ♡"
61020-14 = "Weird expressions are also ILLEGAL!!! I've just decided!"
61020-16 = "Ahaha... Well, it would be nice to see you again before our schedules pick up next week, Sensei."
61020-17 = "[s] \"Next week? What's going on next week?\""
61020-18 = "Ah. I guess you wouldn't know."
61020-19 = "Trinity Comprehensive Exam season is going to be in full swing next week."
61020-20 = "So we really need to start studying... Like, really badly."
61020-21 = "[s] \"What's the Trinity Comprehensive Exam?\""
61020-23 = "Fufufu. The infamous Trinity Comprehensive Exam."
61020-24 = "It's a series of standardized tests, meant to evaluate students' knowledge on all fronts: linguistic proficiency, health education, health classes, and... Oh! Health education!"
61020-25 = "As the name suggests, it's a comprehensive exam of all the subjects we're expected to know."
61020-26 = "I don't think there's that many sections on health...#nUgh. Wait. I get it. Ugh."
61020-27 = "[s] \"Is it different from your regular exams?\""
61020-28 = "I'm also curious about this detail. I learned what \"supplemental exams\" were from before, however..."
61020-29 = "The main difference is that the test writers for the Trinity Comprehensive Exam aren't from Trinity."
61020-30 = "I can't remember exactly why... Something about credibility? Objectivity?"
61020-34 = "That's correct! There's too much potential for bias if the questions come from within Trinity."
61020-35 = "It could even provoke people to ask..."
61020-36 = "\"How is it fair for the person who wrote the exam to take that same exam?\""
61020-37 = "And it's a small concession, but the Comprehensive Exam has the advantage of not including chapel studies."
61020-38 = "[s] \"Ah... I get it now... It's a mock national exam...\""
61020-39 = "Huh? What's that...?"
61020-40 = "...Something even worse than the Comprehensive Exam? Um... I guess I get it."
61020-42 = "Based on my analysis of Sensei's expression, they did not particularly enjoy it."
61020-44 = "Fufu. I understand. Sensei's trying to assure us that everyone dislikes taking exams regardless of who they are. Myself included."
61020-45 = "...You find that hard to believe? Sensei, despite your skewed perception of me, I truly am just an ordinary high schooler."
61020-46 = "\"Ordinary\"...?"
61020-47 = "Well, if you're offering a special late-night exam, proctored by you, Sensei... That I'd enjoy immensely."
61020-48 = "YOU! BETTER! STOP IT! OR ELSE!"
61020-49 = "Oh dear, Koharu... \"Or else\" what?"
61020-54 = "DEATH PENALTY!!!"
61020-55 = "Kyaaah! ♡"
61020-56 = "Ahahaha..."
61020-58 = "Understood. Hifumi. There is no danger of failing in Mission Comprehensive Exam."
61020-59 = "Yeah! Since Trinity isn't proctoring this test, it won't affect our grades. But that's all the more reason for us to do our best!"
61020-60 = "Trinity students are the elite! We can't come second to any other school."
61020-61 = "Also you won't technically \"fail\" anything, but if you completely bomb, you'll have to participate in make-up study sessions."
61020-62 = "So even if I can't fail...I can still fail."
61020-63 = "Aha... You could put it that way... They just don't want to punish the struggling students too harshly."
61020-64 = "Kind of like what we did with the Make-Up Work Club..."
61020-65 = "I know it's called a \"study\" session, but they don't expect you to do much more than show up!"
61020-66 = "But no one wants a study session to infringe upon what precious few hours we have to ourselves after school, do they?"
61020-68 = "[ns] \"We're going to be the Study Hard Club and avoid make-ups this time!\""
61020-69 = "R-Right..."
61020-70 = "Well said, Sensei. In the event that I end up being the only one to fail the Comprehensive Exam..."
61020-71 = "...will you be the teacher in charge of my make-up study session?"
61020-72 = "Just imagine it. An empty classroom, with just the two of us. It's hot, so you open the window, and the evening breeze grazes over us..."
61020-73 = "Being the troublesome student I am, I gaze out at the warm flush of the setting sun... Sensei comes close to chastise me..."
61020-74 = "A strong breeze comes in...Sensei instinctively reaches out to protect me..."
61020-80 = "The two of us are eye to eye, nose to nose, and even we're unconscious of how we're leaning in...closer...and closer..."
61020-81 = "WH-WHAAAT?!"
61020-82 = "???"
61020-83 = "HUH?!?!"
61020-84 = "You are BANNED from speaking!! BANNED!!"
61020-85 = "Eheehee."
61020-90 = "[ns1] \"(Now that they bring it up...)\"\n[ns2] \"(I should see how everyone else is coping.)\""
61020-94 = "[ns] \"The Vigilante Crew doesn't rest, even during exam season?!\""
61020-95 = "Of course not! Academics AND public safety are equally important!"
61020-96 = "Behold! This is the indomitable will of the Vigilante Crew! We will never bend on our principles! "
61020-97 = "Right, Suzumi?!"
61020-101 = "Um, I don't know exactly what \"principles\" you're referring to..."
61020-102 = "Regardless, studying is the inherent responsibility of any student. So I have to agree."
61020-103 = "Sorry? Just seeing me makes you feel lighter inside? I-I don't know what that means..."
61020-104 = "Me neither! But there is no bad in something good!"
61020-108 = "Ehh?!#nOh, it's you two. I thought some visitor snuck in here."
61020-109 = "Sensei's just here to check on us since it's exam season!"
61020-110 = "The linguistics on these tests are so rudimentary. I hardly need to study."
61020-111 = "There's other subject too, Ui! That's why it's called the \"Comprehensive Exam.\""
61020-112 = "...Books cover all sorts of subjects, so I'll be fine..."
61020-114 = "You'll be fine? Even with...math?"
61020-115 = "Ehh?!"
61020-116 = "That's no good, President. Just like how being a picky eater isn't good for your health, being a picky reader is bad too!"
61020-117 = "Ugh..."
61020-119 = "[ns] \"Are you good at math, Shimiko?\""
61020-120 = "Me?"
61020-121 = "I'm a first-year, so the scope of my test will be much less difficult than the president's, who's a third-year."
61020-122 = "Ugh... How unfair."
61020-125 = "Hey, Sensei. We DID all get together to study for the Comprehensive Exam..."
61020-129 = "Listen well, brave students. When our sugar levels get low, so does our brain function."
61020-130 = "And we should only refuel with the most premium of fuels: glucose."
61020-131 = "Therefore! Indulging in dessert during this critical time is not only romantic, but completely necessary!"
61020-132 = "Exactly! What is studying without snacks? This is why we keep you around, Natsu!"
61020-134 = "...And now we're here."
61020-135 = "S-Sorry, Sensei. You even made time to come check on us..."
61020-137 = "[ns] \"In a way...it's nice to see that some things never change...\""
61020-139 = "Naturally, Sensei. A Remedial Knight rises to the challenge, whether it be exams or aid."
61020-140 = "In fact, this Comprehensive Exam is merely aid given new form."
61020-141 = "[s] \"Um... I don't quite follow...\""
61020-142 = "Both exams and aid are of benefit to the people."
61020-143 = "We must uphold our passionate dedication to providing aid by following its principles in all circumstances."
61020-144 = "Thus, aid comes in many forms. Such as reaching out a helping hand with pure intentions, rather than selfish desires."
61020-145 = "Or standing against injustice by any means necessary. This is also a manifestation of aid."
61020-146 = "Consider the corrupt medical supplier, who created a subpar product, which failed to properly disinfect and treat wounds, in an attempt to cut costs. By meting out their punishment, I am aiding both them and the general populace."
61020-147 = "All paths lead to aid."
61020-148 = "Thus, this exam is also aid."
61020-150 = "Hm? What exactly does \"aid\" mean? Aha...ahaha..."
61020-151 = "I-I suppose it's what we of the Remedial Knights value above all?"
61020-152 = "You know, I was wondering why the cutting edge medical advances Trinity has made aren't being tested on the exam!"
61020-153 = "O-Oh. Um...maybe because our edge is just a little too sharp, Hanae..."
61020-155 = "S-S-S-S-S-S-Sensei?! Wh-Wh-What are you doing here?!"
61020-156 = "O-Oh! I'm happy you wanted to check on us...but...!"
61020-157 = "U-Urgh..."
61020-158 = "Take a few deep breaths, Tsurugi. Please compose yourself in front of Sensei."
61020-159 = "Y-Yeah..."
61020-160 = "Thank you, Sensei...for your consideration..."
61020-162 = "[ns] \"I'm sorry. I didn't mean to interrupt your studying.\""
61020-163 = "Not at all. Proper breaks are an essential part of the process."
61020-164 = "Besides eating or patrols, we've done nothing but study for the past few days."
61020-165 = "We get less free time than most, so we end up having to cram in what we can, whatever chance we get."
61020-170 = "She's totally right, but you don't have to be so worried, Sensei! Everyone here was well aware of what life in the Justice Task Force would be like when they signed up."
61020-171 = "Yes. Resolutely marching forward on our chosen path, no matter the obstacles..."
61020-172 = "...that's what makes us who we are."
61020-173 = "Speaking of obstacles, I'm still stuck on this part! Can you explain moral relativism to me?"
61020-174 = "...It's a little hard for me too. If something is moral or immoral only relative to a particular standpoint, then can you really define anything as \"moral\"?"
61020-175 = "It's one of those things that feels more complicated the more you think about it. Well, let's try starting with memorizing the theory..."
61020-177 = "...Ah, yes. I plan to hold study sessions in the large auditorium. Attendance is mandatory for all Sisters."
61020-178 = "[s3] \"Wh-What if someone studies better alone?!\"\n[s4] \"Mandatory is really intense! What if they're shy?\""
61020-181 = "I'm failing to understand. We at the Sisterhood strive to live a life free of shame and sin."
61020-182 = "As students, studying is one of our prime directives. What reason do they have to shy away from their Sisters in time of need?"
61020-183 = "I trust the Sisterhood and its members with my very life!"
61020-184 = "And regardless, I have assured them that they may schedule a consultation with me to discuss any apprehensions they may bear."
61020-185 = "I shall do all I can to put them at ease."
61020-186 = "F-For most sisters, a one-on-one consultation with you is..."
61020-191 = "Quite the opportunity, yes, Sister Hinata? I must always seek new ways to embody the compassion and upright principles we preach unto others."
61020-193 = "A-As you say! I suppose...!"
61020-195 = "I convinced Sakurako to ease up a little bit."
61020-196 = "And, in the end, we made the study session optional for all Sisters."
61020-197 = "Hinata and Mari...really have it rough..."
61020-202 = "Ah! Sensei! Hello!"
61020-203 = "Ah, well... I may have been procrastinating on studying a little bit..."
61020-204 = "Truly? You'll treat us to dessert if we do well? I'll hold you to that!"
61020-205 = "Me too! I'll even study in advance this time!"
61020-206 = "Do you mean you'll \"rest your eyes\" after taking one page of notes again?"
61020-207 = "I absolutely saw you fall asleep too!"
61020-213 = "I smiled at the girls' banter and went on my way."
61020-214 = "I was surprised by two students, both clearly anxious."
61020-220 = "S-Sensei...?"
61020-221 = "Do you have a second...?"
61020-224 = "Next Episode;A New Start"

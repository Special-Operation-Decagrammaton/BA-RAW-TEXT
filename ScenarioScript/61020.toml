61020-23 = "3;하나코;01;우후후. 그것은 모든 트리니티 재학생들을 대상으로 하여…….\n#3;em;[음표]\n#3;closeup"
61020-24 = "3;하나코;99;말 그대로, 언어 능력부터 보건 교육이나 보건 교육, 보건 교육까지…… 전 과목, 전 범위에 걸쳐 이루어지는.\n#3;closeup"

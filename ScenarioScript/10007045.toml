10007045-35 = "1;노도카 온천 온천장ND;99;흠, 흠! 어쩔 수 없네요. 지식해방전선은 과거 자유를 위해 함께 싸웠던 동지이기도 하고, 이렇게나 '성의'를 보여주셨으니…… 이번 한 번 만큼은 봐 드릴게요.\n#1;m1\n#1;em;[땀]"
10007045-36 = "1;노도카 온천 온천장ND;15;……대신 이 만화들이 붉은겨울 학원에서 제작되었다는 건 절대 알려져서는 안 돼요! 자칫했다가는 이곳이 전쟁터가 되고 말 거예요!"

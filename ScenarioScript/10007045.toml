[translation]
10007045-1 = "Episode 4;A Suspicious Deal"
10007045-2 = "Ugh! You got me!"
10007045-3 = "This is a very rare opportunity...I will not forgive such behavior at our hot spring resort!"
10007045-4 = "I will confiscate your sketches that are full of your delusions, Meru!"
10007045-5 = "No! Give it back!"
10007045-10 = "Let's see here... \"Chief Secretary T's Secret Mustache Collection\"."
10007045-11 = "\"The Secret Love of Vice President H and Senior Administrator A\". \"The Secret Hobby of Millennium Treasurer Y\"?"
10007045-12 = "Wh-What's all this, Meru?!"
10007045-13 = "This is how you've been drawing the students?"
10007045-14 = "...There are even drawings of students from other schools!"
10007045-15 = "If a book depicting your delusions is leaked, it'll cause a devastating war between the schools!"
10007045-16 = "A dangerous book like this shouldn't exist in the world! I'm getting rid of it!"
10007045-17 = "D-Don't do that! I went through so much trouble researching everything!"
10007045-18 = "Can't you just pretend you didn't see it? Just this once?"
10007045-19 = "I-I'll trade you this!"
10007045-24 = "This is...a drawing of [USERNAME] Sensei?"
10007045-25 = "The stunning image of Sensei I could see through the lens of a telescope is in my very hands...*pant* *pant*"
10007045-26 = "Ack! What am I imagining right now?!"
10007045-27 = "Heehee, looks like you like that drawing."
10007045-28 = "I can draw more, if you'd like."
10007045-29 = "In whatever pose you want, in however much detail, Nodoka. Just think about it."
10007045-30 = "A bunch of drawings with different sides of stunning Sensei..."
10007045-35 = "Hmm, hmm! Since we fought together as comrades for freedom with the Knowledge Liberation Front, and due to your obvious sincerity... I'll let you go this once."
10007045-36 = "But make sure no one ever finds out this art was produced at Red Winter Academy! Otherwise, it'll be a battlefield."
10007045-37 = "Don't worry. When publishing, I will use my pen name and participate with my identity thoroughly hidden."
10007045-38 = "Heehee. With this, I won't have any problems with this winter's Komisen!"
10007045-39 = "It's a happy ending for everyone!"
10007045-40 = "[s] \"Do I get a say in this...\""
10007045-41 = "Sensei, are you still not satisfied with the service at our Hot Springs Resort No. 227?"
10007045-42 = "...I have no other choice."
10007045-48 = "Since you've finished enjoying your bath, I will now give you a tour of our garden!"
10007045-49 = "[s] \"Please just let me relax here.\""
10007045-51 = "Afterwards, I was basically pushed out of the bath by Nodoka."

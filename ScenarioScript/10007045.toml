[translation]
10007045-1 = "第4話;古怪的交易"
10007045-2 = "唔咕，輸了……"
10007045-3 = "這可是辛苦建立的溫泉浴場，不管是誰都不允許妨礙營業！"
10007045-4 = "所以愛瑠醬那些充滿妄想的素描全部都要沒收！"
10007045-5 = "我，我才畫到一半而已……"
10007045-10 = "呼，我看看……《某秘書室長的鬍鬚收藏》……"
10007045-11 = "《副部長和行政官的祕密幽會》、《那個會計不為人知的興趣》……？"
10007045-12 = "這，這些都是什麼啊愛瑠醬！？"
10007045-13 = "難道你一直都是用這種眼光看待大家……！？"
10007045-14 = "……甚至還有其他學校的學生！？"
10007045-15 = "畫著這麼危險妄想的東西要是流出去的話，一定會引起學校間的紛爭的唷！？"
10007045-16 = "這些東西得藏在絕對不會被找到的地方才行……！#n那種再也拿不出來的地方……！"
10007045-17 = "等，等等！為了畫出那些漫畫，你知道我費了多少心力進行資料調查嗎！？"
10007045-18 = "……我，我說和香醬啊。#n能不能別說那些殘忍的話，這次就放我一馬？"
10007045-19 = "作為代替，我把這個給你！"
10007045-24 = "這是……[USERNAME]老師的畫像！？"
10007045-25 = "平，平時只能透過望遠鏡看著的老師的模樣，這麼清楚地在眼前……！#n哈啊，哈啊……！"
10007045-26 = "哈啊！？"
10007045-27 = "呵呵，看來你很喜歡呢。"
10007045-28 = "如果你想要的話，我還可以幫你畫更多哦？"
10007045-29 = "隨和香醬喜歡，用和香醬喜歡的角度……"
10007045-30 = "老，老師這麼棒的畫，用我喜歡的角度……！？"
10007045-35 = "……那，那就沒辦法了呢！#n本來知識解放戰線就是曾經和我們一起為自由奮鬥的夥伴，既然妳展現出了這麼大的誠意……這次就放過妳吧。"
10007045-36 = "……但是，這些漫畫是在赤冬聯邦學園製作這件事，絕對不可以被發現哦！#n稍有差錯的話，這裡就會變成戰場的！"
10007045-37 = "別擔心。在推出同人誌的時候，我會用筆名避免暴露的。"
10007045-38 = "呵呵。那麼就重新開始準備「漫博」用的原稿……！"
10007045-39 = "很好，這樣對大家來說都是HappyEnd呢！"
10007045-40 = "[s]「那個『大家』裡面，有包含我嗎……？」"
10007045-41 = "啊，老師還覺得不夠滿意是嗎？"
10007045-42 = "這樣的話……"
10007045-48 = "接下來去庭園裡散步怎麼樣呀？#n我們「227號溫泉浴場」的服務，可遠遠不只如此唷！"
10007045-49 = "[s]「求你們先讓我悠哉地享受一下溫泉……」"
10007045-51 = "（然而卻被心情亢奮的和香在背後推著，離開了溫泉……）"

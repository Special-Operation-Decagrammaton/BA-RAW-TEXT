[translation]
10007045-1 = "ตอนที่ 4;ข้อตกลงที่น่าสงสัย"
10007045-2 = "อึ่กกก~ ถูกไล่มาซะแล้ว~"
10007045-3 = "กว่าพวกเราจะได้โอกาสนี้มา... ฉันจะยอมให้มาขัดขวางการทำงานของเราไม่ได้หรอกค่ะ!"
10007045-4 = "เอาละค่ะ ฉันจะขอยึดภาพวาดของเมรุจังเอาไว้ทั้งหมดค่ะ!"
10007045-5 = "ไม่ได้นะ... เอาคืนมา..."
10007045-10 = "ไหนดูซิ... <คอลเลกชันหนวดลับๆ ของเลขาที>..."
10007045-11 = "<ความรักเร้นลับของหัวหน้า H กับหัวหน้า T>..... <งานอดิเรกลับๆ ของนักบัญชี Y แห่งมิลเลเนียม> ...?"
10007045-12 = "นะ...นี่มันอะไรกันคะ เมรุจัง!"
10007045-13 = "ที่ผ่านมามองนักเรียนคนอื่นๆ แล้วคิดแบบนี้ตลอดเลยเหรอคะ?"
10007045-14 = "...แถมยังใช้นักเรียนของโรงเรียนอื่นมาเขียนเนื้อเรื่องด้วย!"
10007045-15 = "ถ้าเกิดหนังสือภาพอันตรายๆ แบบนี้หลุดออกไปถึงมือคนอื่นละก็คงเกิดเรื่องวุ่นวายขึ้นแน่ๆ แถมอาจทำให้เกิดความขัดแย้งระหว่างโรงเรียนขึ้นได้เลยนะคะ!"
10007045-16 = "หนังสืออันตรายแบบนี้ มันไม่ควรมีอยู่บนโลกนี้ค่ะ! ฉันจะจัดการทำลายมันเองค่ะ!"
10007045-17 = "ยะ...อย่าทำแบบนั้นนะ! ฉันลำบากศึกษาเอกสารประกอบต่างๆ แทบตายกว่าจะวาดมังงะเล่มนั้น#nออกมาได้!"
10007045-18 = "อย่าทำแบบนั้นเลยนะ ช่วยทำเป็นไม่รู้ไม่เห็นสักครั้งได้มั้ย?"
10007045-19 = "...ถ้ายอมช่วยฉันจะให้ไอ้นี่แล้วกัน!"
10007045-24 = "นี่มัน... ภาพวาดของคุณครู [USERNAME]...?"
10007045-25 = "คุณครูที่ปกติมักใช้กล้องโทรทรรศน์ส่อง... แซ่บขนาดนี้เลยเหรอ แฮ่ก... แฮ่ก"
10007045-26 = "เฮือก? ฉันกำลังคิดอะไรอยู่เนี่ย?!"
10007045-27 = "ฮุฮุ คงจะชอบรูปนี้ล่ะสิท่า~"
10007045-28 = "ถ้าอยากได้ละก็ ฉันวาดให้อีกได้ตลอดเลยนะ"
10007045-29 = "จัดท่าทางในรูปได้ตามที่โนโดกะต้องการด้วย..."
10007045-30 = "รูปวาดดีๆ ของคุณครู... เยอะแยะ... เต็มไปหมด..."
10007045-35 = "ฮึ่ม! ช่วยไม่ได้นะคะ ชมรมแนวร่วมปดปล่อยความรู้เองก็เคยเป็นสหายที่ต่อสู้เคียงบ่าเคียงไหล่กัน เพื่ออิสระภาพมาก่อน แถมยังแสดง \"ความจริงใจ\" ให้เห็นแบบนี้... คราวนี้ฉันจะยอมให้ก็เแล้วกันค่ะ"
10007045-36 = "... แต่ว่าห้ามให้ใครรู้เด็ดขาดเลยนะคะเรื่องที่มังงะเล่มนี้วาดขึ้นที่สหภาพเรดวินเทอร์น่ะค่ะ!#nถ้าเกิดพลาดไป ที่นี่อาจกลายเป็นสนามรบเลยก็ได้ค่ะ!"
10007045-37 = "ไม่ต้องห่วง พอตีพิมพ์ลงวารสาร ฉันจะใช้นามปากกาแทนชื่อจริงส่งผลงาน"
10007045-38 = "ฮุฮุ ถ้ามีไอ้นี่อยู่ละก็ไม่ต้องห่วงเรื่องงาน <คอมิเซ็น> ที่จะถึงแล้วละ!"
10007045-39 = "แบบนี้ทุกอย่างก็แฮปปี้เอนดิ้งแล้วละค่ะ!"
10007045-40 = "[s] \"ไม่... ครูไม่แฮปปี้สักนิด...\" "
10007045-41 = "เอ๊ะ? คุณครูยังไม่พึงพอใจกับการบริการของ <ออนเซ็น No.227> เหรอคะ?"
10007045-42 = "...ช่วยไม่ได้นะคะ"
10007045-48 = "ถ้างั้นหลังจากที่คุณครูแช่น้ำจนพอใจแล้ว จากนี้ฉันจะพาคุณครูไปชมในสวนนะคะ!"
10007045-49 = "[s] \"ปล่อยให้ครูแช่น้ำอย่างสบายใจหน่อยเถอะ!\""
10007045-51 = "(หลังจากนั้นคุณครูก็พยายามดันโนโดกะออกจากห้องอาบน้ำไป...)"

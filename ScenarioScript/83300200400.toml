[translation]
83300200400-7 = "มีวัตถุดิบอาหารเยอะอย่างที่ฟูกะว่าเลยนะ"
83300200400-12 = "ตั้งแต่วัตถุดิบพื้นฐานอย่างเนื้อสัตว์ นม ไข่..."
83300200400-17 = "ส่วนทางนี้คือขนม...? เพื่อให้เข้าธีมวันวาเลนไทน์งั้นเหรอ?"
83300200400-18 = "ของเยอะขนาดนี้... ถ้าทั้งหมดนี้สั่งมาเพื่องานปาร์ตี้ละก็... คนที่สั่งก็น่าจะเป็น..."
83300200400-26 = "เอกสารรายละเอียดการสั่งซื้อที่เสียบอยู่ระหว่างกล่องวัตถุดิบพวกนี้... เป็นชื่อของ"
83300200400-28 = "<แพนเดโมเนียม โซไซตี้>..."
83300200400-32 = "ปีนี้มอบหมายให้ชมรมโภชนาการเป็นฝ่ายเตรียมอาหารในปาร์ตี้ ซึ่งต่างจากปีก่อนๆ งั้นเหรอ"
83300200400-33 = "มาโคโตะ เธอวางแผนจะทำอะไรอยู่น่ะ?"
83300200400-34 = "ต้องเอาเรื่องนี้ไปบอกให้อาโกะรู้..."

[translation]
83300200400-7 = "There's a huge pile of ingredients here, like Fuuka said..."
83300200400-12 = "...Basic commodities like meat, milk, and eggs..."
83300200400-17 = "But over here...snacks? Are these for Valentine's Day?"
83300200400-18 = "There's a lot... And there are only so many groups who could spend this much on party preparations..."
83300200400-26 = "Ah, there's an order statement on the side of this box...it should have the name I'm looking for."
83300200400-28 = "...Exactly as I thought. The Pandemonium Society..."
83300200400-32 = "Unlike the parties of years past, they've outsourced the preparations to the School Lunch Club."
83300200400-33 = "Makoto...just what are you up to?"
83300200400-34 = "...I should discuss this with Ako."

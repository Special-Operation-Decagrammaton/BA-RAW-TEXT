[translation]
83300200400-7 = "確實和風華說的一樣，推積了相當大量的食材。"
83300200400-12 = "……有像肉、牛奶、雞蛋之類基本的食材……"
83300200400-17 = "這些是餅乾……？#n是配合情人節準備的嗎？"
83300200400-18 = "數量相當多……#n如果全都是為了派對準備的……訂購人果然就是……"
83300200400-26 = "夾在食材箱之間的是……訂購明細嗎？#n上面的名字是……"
83300200400-28 = "「萬魔殿」…………"
83300200400-32 = "這次和往年不同，選擇委託供給部準備派對嗎？"
83300200400-33 = "真琴，你究竟在計畫什麼？"
83300200400-34 = "……看來得和亞子談這件事才行。"

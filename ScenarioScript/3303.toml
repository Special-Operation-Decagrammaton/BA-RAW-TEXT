[translation]
3303-1 = "ขว้างไปให้ไกล (3)"
3303-2 = "สนามกีฬาระดับ 2 เขตปกครองตนเองเกเฮนน่า"
3303-4 = "การแข่งขันครั้งนี้..."
3303-5 = "มีคนมาน้อยกว่าที่คิดอีกนะคะเนี่ย"
3303-6 = "ค่ะ เป็นเพราะว่าวันนี้เป็นวันจันทร์ และเป็นการแข่งขันลีกระดับ 2 ที่ส่วนมากจะเป็นนักกีฬาหน้าใหม่ที่มา#nลงสนามน่ะค่ะ"
3303-7 = "ที่ฉันมาที่นี่เพราะจู่ๆ รุ่นพี่สึมิเระก็ชวนมา..."
3303-8 = "แต่พอมาสนามกีฬาแล้ว อารมณ์ก็ดีขึ้นมาเลยนะคะ"
3303-9 = "การแข่งขันลีกระดับ 2 มีลักษณะพิเศษคือบรรยากาศการเชียร์ที่คึกคักและอัฒจันทร์ก็อยู่ใกล้ๆ นักกีฬา#nด้วยค่ะ"
3303-10 = "เพราะงั้นก็เลยมีแฟนๆ เบสบอลจำนวนมากที่ตั้งใจมาดูการแข่งขันลีกระดับ 2 โดยเฉพาะน่ะค่ะ"
3303-11 = "อย่างนี้นี่เองสินะคะ"
3303-12 = "จะว่าไป อาหารที่อยู่ในมือ..."
3303-13 = "คะ? ฮอตดอกนี่น่ะเหรอคะ?"
3303-14 = "เรย์คะ ฉันก็ไม่ได้คิดจะเข้มงวดเรื่องการกินหรอกนะคะ แต่อาหารแปรรูปที่อุดมไปด้วยไขมันจะขัดขวาง#nการย่อยอาหารและลดประสิทธิภาพของการฝึกฝนอย่างมากเลยค่ะ"
3303-15 = "ถ้าหิวขึ้นมา ก็ทานโปรตีนบาร์ที่มีคาร์โบไฮเดรตและโปรตีนในปริมาณที่เหมาะสม..."
3303-16 = "แต่เรามาถึงสนามกีฬาในเขตปกครองตนเองเกเฮนน่ากันเลยนะคะ จะไม่กินฮอตดอกเผ็ดนรกสูตรพิเศษ#nอันนี้ได้ยังไงกันคะ?!"
3303-17 = "ฮอตดอกเผ็ดนรก... เหรอคะ?"
3303-18 = "ค่ะ สนามเบสบอลส่วนใหญ่จะขายขนมกับเครื่องดื่มง่ายๆ ให้เรากินระหว่างชมการแข่งขันน่ะค่ะ"
3303-19 = "ส่วนมากจะขายขนมขบเคี้ยวหรือน้ำอัดลม แต่ในสนามกีฬาบางแห่งจะขายอาหารประจำท้องถิ่นของ#nทีมเหย้าด้วย..."
3303-20 = "ส่วนในสนามเบสบอลของเขตปกครองตนเองเกเฮนน่าจะขายฮอตดอกเผ็ดนรกที่เป็นอาหารรสเลิศค่ะ"
3303-21 = "อาหารที่ขายในสนามกีฬาของแต่ละโรงเรียนจะแตกต่างกันออกไป การหาความสุขจากอาหารในสนาม#nก็เป็นอีกหนึ่งความสนุกในการชมเบสบอลค่ะ!"
3303-23 = "เอาเถอะค่ะ... แค่ฮอตดอกอันเดียว ฉันหยวนๆ ให้ก็ได้..."
3303-24 = "อ๊ะ ลืมราดซอสพริกมาด้วย"
3303-28 = "แต่ยังไงตัวไส้กรอกเองก็ถูกปรุงรสมาอยู่แล้ว แค่กินเปล่าๆ ก็เผ็ดแล้วนะคะเนี่ย"
3303-29 = "กินฮอตดอกหนึ่งคำ แล้วล้างปากด้วยจินเจอร์เอล..."
3303-34 = "อืม... ต้องอย่างนี้แหละ!"
3303-36 = "อ๊ะ ถ้ารุ่นพี่อยากกินอะไรก็สั่งได้เลยนะคะ! ฉันจะเป็นเจ้ามือให้เองค่ะ"
3303-37 = "ถ้างั้นฉันขอเป็น... สลัดอกไก่โลว์โซเดียมค่ะ"
3303-38 = "อาหารเพื่อสุขภาพแบบนั้นไม่มีขายในสนามเบสบอลหรอกค่ะ"
3303-44 = "เหมือนการแข่งขันจะเริ่มแล้วสินะคะ"
3303-45 = "จะว่าไป นี่เป็นครั้งแรกเลยค่ะที่ฉันมาดูการแข่งขันของเกเฮนน่า ชมรมเบสบอลเกเฮนน่าเก่งกันมั้ยคะ?"
3303-46 = "อืม ถ้าเทียบกับชื่อเสียงของโรงเรียนแล้ว ก็ถือว่ายังเป็นทีมที่อ่อนอยู่หรอกค่ะ..."
3303-47 = "ถึงรูปร่างของผู้เล่นจะไม่ได้ถึงกับแย่ แต่พอทีมเวิร์กของพวกเธอไม่ดี ก็เลยเสียเปรียบเรื่องการเล่นที่#nต้องใช้ความร่วมมือกัน"
3303-48 = "แต่ต่อให้เป็นทีมอ่อนของระดับ 2 แต่ก็เก่งกว่าทีมของชมรมเบสบอลมิลเลเนียมอยู่มากค่ะ..."
3303-49 = "แต่ในเมื่อเรามาดูการแข่งขันถึงที่แล้ว เราก็ต้องตั้งใจเชียร์แบบไม่สนโรงเรียนที่สังกัดค่ะ!"
3303-53 = "ลุยไปเลย! เกเฮนน่า! พุ่งไปเลย!"
3303-57 = "แบตเตอร์ลำดับที่ 2 ของเกเฮนน่าเข้าประจำที่ ลูกถูกขว้างตรงเข้ามา... ตีได้แล้วค่ะ!"
3303-58 = "ตีลูกไปตกที่สนามส่วนนอกทางซ้าย! วิ่งผ่านเบสแรก และไปเบสที่ 2 แล้ว... "
3303-59 = "โลภมากเกินไปหรือเปล่าน่ะคะ? เอาต์จนได้!"
3303-60 = "โธ่... นี่เป็นโอกาสที่จะวิ่งให้ถึงเบส 2 แล้วแท้ๆ... น่าเสียดายนะคะ"
3303-61 = "ถ้าต้องเหยียบเบสก่อนที่มือของผู้ตั้งรับจะเอื้อมไปถึงละก็..."
3303-62 = "เราเตะผู้ตั้งรับที่ยืนอยู่ในเบส 2 ด้วยท่าสกรู สปิน สไลดิ้งไม่ได้เหรอคะ?"
3303-63 = "ไม่ได้สิคะ!"
3303-65 = "(แม้ว่าเรย์จะออกแรงเชียร์อย่างกระตือรือร้น แต่ชมรมเบสบอลเกเฮนน่าก็พ่ายแพ้ในการแข่งขันอย่างน่า#nเสียดาย...)"
3303-68 = "น่าเสียดายจังเลยนะคะ ถ้าผู้เล่นฝ่ายตรงข้ามทำซูเปอร์เซฟไม่ได้ในตอนท้าย เกเฮนน่าก็อาจจะชนะ#nก็ได้อยู่แล้วเชียว"
3303-69 = "ฉันก็คิดแบบนั้นเหมือนกันค่ะ"
3303-70 = "ถ้าฉันเป็นคนวิ่ง ฉันคงโชลเดอร์ชาร์จใส่คนที่ตั้งรับแล้ววิ่งเข้าเบสถัดไปแล้วค่ะ"
3303-71 = "แบตเตอร์ของเกเฮนน่าควรจะฝึกกล้ามเนื้อเดลทอยด์ตรงไหล่ให้มากกว่านี้นะคะ"
3303-72 = "รุ่นพี่คะ รุ่นพี่เข้าใจกฎของเบสบอลหรือเปล่าคะเนี่ย...?"
3303-73 = "เอาเถอะค่ะ นานๆ ทีได้มาดูการแข่งกีฬากับคนอื่นก็ดีเหมือนกันนะคะ"
3303-74 = "การซุ่มฝึกฝนกล้ามเนื้อในฟิตเนสก็เป็นวิธีที่ดีค่ะ แต่ถ้าได้มาเห็นการแข่งขันที่ต้องใช้ร่างกายและทำให้#nเห็นผลของการฝึกแบบนี้แล้ว ก็จะทำให้ความตั้งใจในการฝึกฝนของเรามากขึ้นค่ะ"
3303-75 = "ฉันว่า... รุ่นพี่รู้แต่เรื่องการฝึกฝนจริงๆ นะคะ"
3303-76 = "เพราะงั้น... เรย์คะ"
3303-77 = "จำภาพของโฮมรันครั้งสุดท้ายที่เห็นได้รึยังคะ?"
3303-83 = "ค่ะ..."
3303-84 = "สนามกีฬาในวันนั้นก็ไม่ค่อยมีคนมาดูเยอะเหมือนวันนี้ค่ะ"
3303-86 = "ทุกคนมาที่สนามกีฬาด้วยเหตุผลที่แตกต่างกัน บางคนก็มาเพื่อกินอาหารท้องถิ่นอร่อยๆ บางคนก็มา#nเพื่อถ่ายรูปนักกีฬาที่ชอบ และบางคนก็มาเพื่อเป็นแมวมองหาคนที่มีอนาคตไกล..."
3303-87 = "ช่วงเวลาของโฮมรัน... ทุกคนต่างพากันกลั้นหายใจและจับจ้องอยู่ที่แบตเตอร์ค่ะ"
3303-89 = "วิถีของลูกที่พุ่งข้ามกำแพงไปสวยมากๆ แต่การที่แบตเตอร์วิ่งครบรอบสนามอย่างสง่างามโดยไม่มี#nอะไรขัดขวาง... ฉันว่ามันเท่มากเลยละค่ะ"
3303-90 = "แต่มันก็น่าแปลกนะคะ ฉันพูดถึงเรื่องโฮมรันทุกวัน แต่ก็จำภาพของวันนั้นไม่ได้"
3303-92 = "การตั้งเป้าหมายเป็นสิ่งสำคัญในการออกกำลังกายค่ะ"
3303-93 = "ไม่ว่าจะเป็นการลดน้ำหนักให้ได้กี่กิโล หรือจะสร้างร่างกายให้มีกล้ามเนื้อขึ้นกี่เปอร์เซ็นต์ ถ้าขาดเป้าหมายแบบนี้ การออกกำลังกายก็จะเป็นแค่ความเจ็บปวดต่อร่างกายค่ะ"
3303-94 = "แต่หากเราเร่งรีบเกินไปจนข้ามกระบวนการเพียงเพราะอยากทำให้ถึงเป้าหมาย เป้าหมายนั้นก็จะหมด#nคุณค่าค่ะ"
3303-95 = "คนที่อยากจะลดน้ำหนัก สิ่งที่พวกเขาต้องทำไม่ใช่แค่การเปลี่ยนตัวเลขที่ปรากฏบนเครื่องชั่ง กับเรย์ก็#nเช่นเดียวกันค่ะ เรย์ก็คงไม่ได้เข้าชมรมเบสบอลมาเพียงเพราะอยากตีบอลให้ได้ไกลๆ หรอกใช่มั้ยคะ"
3303-96 = "ถ้าความสนุกสนานของเบสบอลมาจากหลายๆ ปัจจัย การสร้างความสนุกของการฝึกซ้อมก็มีหลายวิธีค่ะ"
3303-97 = "เพราะงั้นเราไม่ควรหลีกเลี่ยงการฝึกซ้อมในแต่ละวัน มาคิดว่านี่คือเส้นทางไปสู่โฮมรันแล้วมาสนุกกับ#nมันดีกว่ามั้ยคะ"
3303-98 = "เรย์ มาฝึกกับฉันต่อมั้ยคะ?"
3303-103 = "ค่ะ รุ่นพี่!"
3303-107 = "ฟิตเนสเซ็นเตอร์ มิลเลเนียม"
3303-110 = "แต่นี่มันเกินไปแล้วนะคะ!"
3303-112 = "มีปัญหาอะไรรึเปล่าคะ เรย์?"
3303-113 = "นี่มันอะไรกันคะ อุปกรณ์ที่เหมือนกับโซ่ตรวนอันนี้น่ะ!"
3303-114 = "อ้อ กำลังทดสอบเครื่องสควอทที่ฉันซื้อมาใหม่นี่เองสินะคะ"
3303-115 = "เครื่องสควอทนี้เป็นอุปกรณ์ตัวอย่างที่ฉันสั่งให้ทางชมรมวิศวกรรมสร้างให้เป็นพิเศษค่ะ เครื่องนี้จะมีอุปกรณ์ที่ช่วยยึดขาไว้ไม่ให้หมดแรงก่อนที่จะทำหมดเซ็ตค่ะ"
3303-116 = "เครื่องนี้ทำให้สมาชิกที่ขาดความตั้งใจสามารถฝึกฝนต่อจนถึงที่สุดได้ และอุปกรณ์ยึดก็ช่วยปรับ#nท่าทางให้อย่างเป็นธรรมชาติ ทำให้สควอทได้ด้วยฟอร์มที่ถูกต้องค่ะ!"
3303-117 = "อยากหยุดออกกำลังกายตอนไหนก็หยุดไม่ได้ นี่มันเครื่องมือทรมานชัดๆ เลยนี่คะ!"
3303-118 = "รุ่นพี่บอกเองแท้ๆ ว่าจะฝึกฝนให้ฉันมีเปอร์เซ็นต์การตีลูกสูงๆ... แต่การออกกำลังที่ขานี่มันเกี่ยวกับ#nเปอร์เซ็นต์การตีลูกยังไงเหรอคะ!"
3303-119 = "กล้ามเนื้อส่วนล่างมีบทบาทสำคัญในการโยนลูกและกวัดแกว่งไม้นะคะ"
3303-120 = "หากจะให้น้ำหนักตัวเคลื่อนที่ไปพร้อมกับลูกเบสบอล เราก็ต้องใช้กล้ามเนื้อแกนกลางที่ยึดข้อต่อมา#nรองรับค่ะ และหากเราฝึกฝนกล้ามเนื้อไม่สม่ำเสมอ ร่างกายก็จะบาดเจ็บได้ง่ายๆ"
3303-121 = "ไหนๆ ก็พูดเรื่องนี้แล้ว งั้นวันนี้เรามาฝึกฝนในคอร์สที่เน้นการออกกำลังส่วนล่างเป็นหลักดีมั้ยคะ?"
3303-134 = "เอาละ ถ้าสควอทเสร็จแล้วก็ต่อด้วยท่าลันจ์เลยนะคะ!"
3303-139 = "ให้ตายเถอะ..."
3303-140 = "ถ้าเริ่มฤดูกาลหน้าแล้วละก็ ฉันไม่กลับมาแน่...!"
3303-141 = "ขว้างไปให้ไกล"

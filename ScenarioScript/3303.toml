[translation]
3303-1 = "#title;멀리 휘두르며 3"
3303-2 = "#place;게헨나 자치구 2군 스타디움"
3303-3 = "1;레이;01\n5;스미레;01\n#1;h\n#5;h\n#1;a\n#5;a\n#wait;1000"
3303-4 = "5;스미레;02;생각보다……\n#5;em;…"
3303-5 = "5;스미레;02;경기장에 사람이 많지 않은 것 같군요."
3303-6 = "1;레이;02;네. 오늘 경기는 월요일 경기인 데다가 신입 선수들이 주로 출전하는 2군 리그의 경기니까요."
3303-7 = "1;레이;99;갑자기 스미레 선배가 야구 경기를 보러 가자고 해서 이곳으로 오긴 했지만……"
3303-8 = "1;레이;03;……그래도 모처럼 경기장에 오니 기분이 좋네요.\n#1;em;[음표]"
3303-9 = "1;레이;14;특히 2군 리그의 경기는 쾌적한 관람 분위기와 선수진과 가까운 관중석 거리가 특징이거든요."
3303-10 = "1;레이;11;그래서 일부러 2군 시합만 찾아다니는 야구팬들도 꽤 있답니다."
3303-11 = "5;스미레;99;……그렇군요."
3303-12 = "5;스미레;01;그나저나 손에 들고 계신 그 음식은……"
3303-13 = "1;레이;02;……네? 핫도그인데요?\n#1;em;[?]"
3303-14 = "5;스미레;05;레이 양, 엄격한 식습관을 강요할 생각은 없습니다만, 지방이 풍부한 가공식품은 소화를 방해해 트레이닝의 효과를 크게 떨어트릴 수 있습니다."
3303-15 = "5;스미레;08;혹시라도 배가 고프시다면 최소한 탄수화물과 단백질이 적절하게 포함된 프로틴 바를 드시는 편이—"
3303-16 = "1;레이;11;하지만 모처럼 게헨나 자치구의 스타디움에 왔는데, 이 특제 불지옥 핫도그를 먹지 않을 수는 없잖아요?!\n#1;jump\n#1;m2\n#1;em;[재잘]"
3303-17 = "5;스미레;02;불지옥 핫도그요……?\n#5;em;[?]"
3303-18 = "5;스미레;02\n1;레이;14;네. 대부분의 야구장에서는 경기를 관람하면서 식사를 해결할 수 있도록 간단한 간식이나 음료수를 팔고 있거든요.\n#1;m3\n#5;dr"
3303-19 = "5;스미레;02\n1;레이;01;대부분은 평범한 스낵이나 청량음료뿐이지만, 일부 스타디움에서는 홈 팀의 특색을 살린 명물 음식도 취급하고 있어서……\n#5;hide"
3303-20 = "1;레이;11;게헨나 자치구의 야구장에서는 매콤한 특제 소시지를 넣은 불지옥 핫도그를 팔고 있는데, 이게 또 별미라고요."
3303-21 = "1;레이;03;각 학원의 스타디움마다 취급하는 음식이 조금씩 다르기 때문에, 이 식도락을 찾아다니는 것도 야구 관람의 또 다른 묘미죠!\n#1;em;[반짝]"
3303-22 = "#all;hide"
3303-23 = "3;스미레;99;뭐…… 핫도그 한 개 정도면 넘어갈 수 있겠지만……"
3303-24 = "3;레이;02;아, 핫도그에 칠리소스를 안 뿌렸네.\n#3;em;[반응]"
3303-25 = "#st;[0,0];instant;1;"
3303-26 = "#clearST"
3303-27 = "3;레이;99\n#3;greeting\n#wait;1000"
3303-28 = "3;레이;13;그래도 소시지 자체에 시즈닝이 충분히 되어 있어서 그냥 먹어도 제법 매콤하네요."
3303-29 = "3;레이;11;핫도그를 한 입 베어 물고, 진저에일로 입을 씻어내면……"
3303-30 = "#st;[0,0];instant;1;"
3303-31 = "#clearST"
3303-32 = "3;레이;11\n#3;greeting\n#wait;1000"
3303-33 = "3;레이;11\n#3;greeting\n#wait;1000"
3303-34 = "3;레이;03;크으…… 바로 이거야!\n#3;em;[음표]\n#3;jump"
3303-35 = "#all;hide"
3303-36 = "3;레이;14;아, 선배도 원하시는 음식이 있으면 주문하세요! 모처럼이니 제가 한턱 내겠습니다."
3303-37 = "3;레이;14\n5;스미레;99;그럼 저는…… 무염 닭가슴살 샐러드를.\n#5;al\n#3;m1"
3303-38 = "3;레이;09;야구장에서 그런 건강한 음식을 팔 리가 없잖아요?\n#3;em;[땀]"
3303-39 = "#st;[0,0];instant;1;"
3303-40 = "#clearST"
3303-41 = "5;스미레;99\n3;레이;09\n#5;h\n#3;h\n#wait;2500"
3303-42 = "5;스미레;02\n3;레이;02\n#5;h\n#3;h\n#5;em;[반응]\n#3;em;[반응]\n#wait;2500"
3303-43 = "#wait;2500"
3303-44 = "5;스미레;01;……경기가 시작된 모양이군요."
3303-45 = "5;스미레;02;그러고 보니 게헨나 선수들이 뛰는 경기를 직접 보는 건 처음인데, 게헨나 야구부는 강한 편인가요?\n#5;em;[?]"
3303-46 = "3;레이;04;글쎄요. 학원의 명성에 비하면 약체인 편입니다만……"
3303-47 = "3;레이;05;선수들의 피지컬 자체는 나쁘지 않지만 팀워크가 좋지 못해서 협동 플레이가 부실한지라."
3303-48 = "3;레이;03;물론 약체에 2군 팀이라고는 해도 밀레니엄 야구부보다는 훨씬 강하지만요……\n#3;em;[땀]\n#fontsize;50"
3303-49 = "5;스미레;01\n3;레이;11;그래도 모처럼 직관을 하러 왔으니, 소속은 잠시 잊고 열심히 응원에 집중해야죠!\n#5;dr\n#3;m3"
3303-50 = "#st;[0,0];instant;1;"
3303-51 = "#clearST"
3303-52 = "3;레이;12\n#3;greeting\n#wait;1500"
3303-53 = "3;레이;17;가자, 게헨나! 날려버려!\n#3;closeup\n#fontsize;80"
3303-54 = "#zmc;instant;790,555;1580\n#all;hide"
3303-55 = "#zmc;instant;790,555;1580\n#wait;1500"
3303-56 = "#zmc;instant;790,555;1580\n#wait;3500"
3303-57 = "#zmc;instant;790,555;1580\n#na;장내 아나운서;타석에 들어선 게헨나의 2번 타자. 직구로 들어온 공을…… 쳤습니다!"
3303-58 = "#zmc;instant;790,555;1580\n#na;장내 아나운서;좌중간 외야에 떨어진 안타! 1루를 거쳐 2루로 달려갑니다만……"
3303-59 = "#zmc;instant;790,555;1580\n#na;장내 아나운서;……욕심이 과했던 탓일까요? 아웃 되고 맙니다!"
3303-60 = "#zmc;instant;790,555;1580\n#na;레이;크으, 멋진 2루타를 칠 기회였는데…… 아쉽네요."
3303-61 = "#zmc;instant;790,555;1580\n#na;스미레;수비수의 손이 닿기 전에 베이스를 밟아야 한다면……"
3303-62 = "#zmc;instant;790,555;1580\n#na;스미레;베이스 위에 서 있는 2루수를 스크류 스핀 슬라이딩으로 걷어차면 안 되는 겁니까?"
3303-63 = "#zmc;instant;790,555;1580\n#na;레이;당연히 안 되죠!\n#fontsize;80"
3303-64 = "#all;hide"
3303-65 = "#na;(이후, 레이의 열띤 응원에도 불구하고 게헨나 야구부는 경기에서 아쉽게 패배하고 말았다……)"
3303-66 = "#all;hide"
3303-67 = "1;스미레;99\n5;레이;15\n#1;h\n#5;h\n#1;a\n#5;a\n#wait;1000"
3303-68 = "5;레이;15;……아쉬운 경기네요. 마지막에 상대 선수가 슈퍼 세이브만 하지 않았더라도 이길 수 있었을 텐데.\n#5;em;[한숨]"
3303-69 = "1;스미레;99;저 역시도 그렇게 생각합니다."
3303-70 = "1;스미레;01;제가 주자였더라면 숄더 차지로 수비수를 제치고 진루를 했을 텐데요."
3303-71 = "1;스미레;05;게헨나의 타자는 좀 더 삼각근을 단련하는 게 좋을 것 같습니다."
3303-72 = "5;레이;09;선배, 진짜 야구 규칙 제대로 이해하고 있긴 한 건가요……?\n#5;em;[땀]"
3303-73 = "1;스미레;01;여하튼 오랜만에 다른 사람과 함께 스포츠 경기를 관람하러 오니 좋군요."
3303-74 = "1;스미레;01;피트니스 클럽에서 묵묵히 근육을 단련하는 것도 좋지만, 직접 몸을 부딪치며 훈련의 성과를 증명하는 스포츠를 보고 나면 트레이닝에 대한 의욕도 한결 더 높아지니까요."
3303-75 = "5;레이;06;정말…… 선배는 트레이닝밖에 모르는 것 같네요."
3303-76 = "1;스미레;99;그래서…… 레이 양."
3303-77 = "1;스미레;03;마지막으로 본 홈런의 풍경은 떠올랐나요?\n#1;em;[?]"
3303-78 = "#st;[0,0];instant;1;"
3303-79 = "#clearST"
3303-80 = "1;스미레;03\n5;레이;06\n#1;h\n#5;h\n#1;dl\n#5;m3\n#wait;1000"
3303-81 = "1;스미레;03\n5;레이;04\n#1;h\n#5;h\n#1;hide\n#5;em;…\n#wait;2500"
3303-82 = "5;레이;99\n#5;h\n#5;greeting\n#wait;2500"
3303-83 = "5;레이;03;……네."
3303-84 = "5;레이;11;그날의 스타디움도 오늘의 경기처럼 관중은 많지 않았지요."
3303-85 = "#zmc;instant;790,555;1580\n#all;hide"
3303-86 = "#zmc;instant;790,555;1580\n#na;레이;누군가는 맛있는 음식을 찾아, 누군가는 좋아하는 선수의 사진을 찍기 위해, 누군가는 새로운 유망주를 발굴하기 위해. 모두가 각기 다른 이유로 경기장을 찾아왔지만……"
3303-87 = "#zmc;instant;790,555;1580\n#na;레이;홈런이 터지는 그 순간만큼은 모두가 숨죽여 타자를 주시하고 있었어요."
3303-88 = "3;레이;13\n#3;a"
3303-89 = "3;레이;13;담장을 향해 뻗어가던 공의 궤적도 아름다웠지만, 아무런 방해도 없이 고고하게 그라운드를 도는 타자의 모습이…… 멋지다고 생각했어요.\n#3;em;…"
3303-90 = "3;레이;99;그런데 참, 이상하지요. 정작 매일 홈런을 이야기하면서 그 광경을 까맣게 잊고 있었다니."
3303-91 = "#all;hide"
3303-92 = "3;스미레;99;운동에서 목표를 설정하는 것은 중요하지요."
3303-93 = "3;스미레;01;체중을 몇 kg 감량한다든가, 멋진 근육질 몸매를 만든다든가 하는 목적이 없다면 운동은 단순한 고통의 연속일 뿐이니까요."
3303-94 = "3;스미레;03;하지만 그 목표를 이루는 데 급급해서 과정을 놓치면 그 목표의 가치도 퇴색되게 됩니다."
3303-95 = "3;스미레;99;체중을 감량하려는 사람이 단순히 체중계의 기록을 바꾸고자 하는 게 아닌 것처럼, 레이 양도 그저 공을 멀리 날리고 싶어서 야구부에 들어온 건 아닐 테니까요."
3303-96 = "3;스미레;01;야구의 즐거움이 여러 가지 요인에서 오는 것처럼, 트레이닝의 즐거움도 여러 가지 방식이 존재한답니다."
3303-97 = "3;스미레;03;그러니 오늘의 트레이닝을 피하지 말고, 홈런을 향한 여정이라 생각하며 즐겨보는 건 어떨까요."
3303-98 = "3;스미레;03;레이 양. 저와 함께 트레이닝을 계속하시겠어요?\n#3;em;[?]"

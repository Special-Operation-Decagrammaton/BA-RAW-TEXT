3303-112 = "3;스미레;05;무슨 문제라도 있으신가요, 레이 양?"
3303-113 = "3;레이;16;도대체 뭔가요, 이 족쇄 같은 기계 장치는!\n#3;jump\n#3;em;[!]"
3303-114 = "3;스미레;99;아, 이번에 제가 새로 구입한 스쿼트 머신을 시험해 보고 계셨군요."
3303-115 = "3;스미레;99;이 스쿼트 머신으로 말씀드리자면, 엔지니어부에 특별히 발주하여 만든 시제품으로 세트를 완료할 때까지 다리가 빠지지 않도록 고정하는 장치가 포함되어 있습니다.\n#3;greeting"
3303-116 = "3;스미레;07;덕분에 의지가 약한 회원님도 끝까지 트레이닝을 지속할 수 있고, 구속 장치가 자연스럽게 자세를 교정해 주기 때문에 올바른 자세로 스쿼트를 지속할 수 있게 만들어주지요!\n#3;em;[!]\n#3;jump"
3303-117 = "3;레이;16;원할 때 운동을 그만둘 수 없다면 그냥 고문 기구잖아요?!\n#3;shake\n#3;em;[?!]"
3303-118 = "3;레이;05;게다가 타율을 높일 수 있는 훈련이라고 했으면서…… 하체를 단련하는 게 타율과 무슨 상관이 있는데요!\n#3;jump"
3303-119 = "3;레이;05\n5;스미레;05;공을 던지고 배트를 휘두를 때도 하체 근육은 중요한 역할을 합니다.\n#3;m1\n#5;al"
3303-120 = "5;스미레;08\n3;레이;05\n#na;스미레;공에 체중을 싣기 위해서는 관절을 고정하는 코어 근육이 받쳐줘야 하는 만큼, 불균형한 근육 트레이닝은 쉽게 부상으로 이어질 수 있으니까요.\n#5;m4"
3303-121 = "5;스미레;07\n3;레이;05\n#na;스미레;말이 나온 김에 오늘은 하체 단련 위주로 트레이닝 코스를 짜 볼까요?\n#5;m3"

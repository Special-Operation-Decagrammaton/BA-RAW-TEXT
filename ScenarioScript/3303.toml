[translation]
3303-1 = "Swinging for the Fences 3"
3303-2 = "Gehenna District Minor League Stadium"
3303-4 = "It's..."
3303-5 = "...less crowded in the stadium than I expected."
3303-6 = "Yep. It's only a minor league game for rookies, on top of being a Monday."
3303-7 = "Don't make that face. You were the one who ran us out to the first game you could find..."
3303-8 = "...That said, it does feel nice to be back in the stands."
3303-9 = "Especially at a minor league game. The crowd's small. You can sit right up next to the players."
3303-10 = "Quite a few baseball fans only go to minor league games for those reasons alone."
3303-11 = "...I see."
3303-12 = "Anyway, about that food in your hand..."
3303-13 = "Hm? It's a hot dog."
3303-14 = "Now Rei... I don't want to enforce a strict diet on you. But processed food with lots of fat can block up your digestive system and significantly lessen the effectiveness of our training."
3303-15 = "If you're feeling peckish, a protein bar is a much better choice. It has a great balance of protein and carbohydrates—"
3303-16 = "No way! We can't come all the way to Gehenna and skip out on their trademark scorching hell hot dogs!"
3303-17 = "A scorching hell hot dog?"
3303-18 = "Yes. See, every stadium sells snacks and drinks so you can have something to eat while watching the game."
3303-19 = "They're usually pretty generic, but some stadiums sell delicious treats based on the home team!"
3303-20 = "Here in Gehenna, they have scorching hell hot dogs. They're made from a rare, super spicy sausage. They're so good!"
3303-21 = "Each academy's stadium has their own delicacy. So not only do you get to see an exciting game, you get to have yummy food too!"
3303-23 = "Well... All right. But try to only have one."
3303-24 = "Oh! I forgot to put on some chili sauce."
3303-28 = "Although, the sausage is pretty well seasoned, so with the chili, it's extra spicy."
3303-29 = "Then after a bite, I wash it all down with a nice ginger ale..."
3303-34 = "Mmm bmm... Now this is baseball!"
3303-36 = "Oh, feel free to order whatever you want, Sumire. I'll treat you!"
3303-37 = "...One unsalted chicken breast salad please."
3303-38 = "Do they even have healthy food like that at a stadium?"
3303-44 = "...It seems that the game's begun."
3303-45 = "This is my first time watching Gehenna players on the field. Is their club any good?"
3303-46 = "Well... With a motto like \"Freedom, chaos, and trouble!\", as good as they can be."
3303-47 = "They have talented players, but they lack strong teamwork."
3303-48 = "That said, even their minor league team is way better than the Millennium Baseball Club..."
3303-49 = "But we're not here to play, we're here to watch. So let's forget our affiliations and focus on cheering!"
3303-53 = "Let's go, Gehenna! Break a leg!"
3303-57 = "The second hitter of Gehenna is at bat. Looks like it's gonna be a fastball...and that's a hit!"
3303-58 = "The ball's all the way in the middle of the outfield! The batter nabs first base. She's gunning for second..."
3303-59 = "...Oh no too greedy! She's out!"
3303-60 = "Ugh, that was a chance for a nice two-bagger... What a shame."
3303-61 = "If you need to step on the base before the defender's hand tags you..."
3303-62 = "Can't you just kick the second baseman with a spinning slide kick?"
3303-63 = "Of course not!"
3303-65 = "The Gehenna baseball club lost their game, in spite of having Rei as a cheerleader..."
3303-68 = "...What a downer of a game. They could've won if the opposing team didn't land that super save at the end."
3303-69 = "I agree."
3303-70 = "If I was the runner, I would have gone past the defender with a shoulder charge and sprinted towards the base."
3303-71 = "And that one Gehenna batter should build up her deltoids more."
3303-72 = "Are you sure you understand how baseball works, Sumire?"
3303-73 = "That said, it's been a while since I got to enjoy a game with someone. It feels nice."
3303-74 = "Training is important for a fitness club. But watching sports, seeing others compete with the fruits of their training is great for your own motivation as well."
3303-75 = "Is it always training day inside that head of yours?"
3303-76 = "I'm serious, Rei."
3303-77 = "Do you remember that home run you saw?"
3303-83 = "...Yes."
3303-84 = "The stadium wasn't too crowded then...just like today."
3303-86 = "Some folks came for food. Others wanted to take photos with their favorite players. A few were scouting new talent for their teams. Everyone had a different reason to come to the stadium."
3303-87 = "But in the end, all eyes were on the batter when she made that home run."
3303-89 = "The arc the ball drew across the sky was beautiful. But that moment of the batter jogging around the field with nothing in her way? It was so cool."
3303-90 = "It's funny. I had forgotten most of that entire game, despite how much I talked about the home run."
3303-92 = "Having an end goal for your training is important."
3303-93 = "It could be lifting 100 kg or hitting a homerun. But without a goal, exercise is nothing more than self-inflicted pain."
3303-94 = "There has to be a reason for each lift, each swing. Something that drives you to struggle for each step, when common sense begs you to take the easy road."
3303-95 = "Just like how the person who wants to deadlift 100 kg isn't just trying to pick up a number, your goal must be more than simply swatting a ball far away. Otherwise, you won't fight for it."
3303-96 = "As there are many things to enjoy about baseball, there are many things to enjoy about training too."
3303-97 = "One of those things is pursuing a worthy goal. Because instead of dreading each new challenge, it grants you the will to overcome them."
3303-98 = "Ready to go back to training with me, Rei?"
3303-103 = "...Heck yeah!"
3303-107 = "Millennium Fitness Club"
3303-110 = "...I take it back!"
3303-112 = "Is there a problem, Rei?"
3303-113 = "Why does this machine have shackles built in?"
3303-114 = "I see you've been trying out the new squat machine I bought."
3303-115 = "This baby is a test product I commissioned from the Engineering Department. It has a special device installed that ensures your legs stay in place until you finish your set."
3303-116 = "It'll help our weak-willed members to finish their reps! There's even a lock-in device that fixes your posture so your squats can have proper form!"
3303-117 = "If you can't stop when you want to, isn't that just a torture device?!"
3303-118 = "And you said this exercise would help with my batting average... How do torture squats help me swing a bat?!"
3303-119 = "Leg muscles play vital roles when it comes to pitching and swinging."
3303-120 = "Putting force into the ball requires you to lock in your joints, which requires a strong core. If you don't build up your muscles properly, you could get hurt."
3303-121 = "On that note, we shouldn't skip out on \"leg day\" either."
3303-134 = "Enough squats. Let's switch over to lunges!"
3303-139 = "Seriously..."
3303-140 = "After the season starts, I'm never training with you again."
3303-141 = "Swinging for the Fences"

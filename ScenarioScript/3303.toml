[translation]
3303-1 = "揮向遠方（３）"
3303-2 = "格黑娜自治區．二軍運動場"
3303-4 = "棒球場裡的觀眾……"
3303-5 = "比我想像中來得少呢。"
3303-6 = "是啊，今天畢竟是星期一，這場又是主要由新人選手上場的二軍比賽。"
3303-7 = "雖然是因為堇前輩才會來到這裡……"
3303-8 = "……不過我也好久沒來這種專業棒球場了，感覺其實還挺不賴的。"
3303-9 = "而且二軍比賽的觀賽氣氛比較輕鬆，觀眾席和選手之間的距離也更近。"
3303-10 = "所以其實有很多粉絲只看二軍聯盟的比賽哦。"
3303-11 = "……原來如此。"
3303-12 = "話說回來，你手裡的那個……"
3303-13 = "……嗯？這個熱狗怎麼了嗎？"
3303-14 = "莉同學，雖然我沒打算要求你執行嚴格的飲食控管，#n不過這種脂肪量高的加工食品會妨礙消化，導致訓練的成效大幅下降。"
3303-15 = "假如真的肚子餓的話，我推薦吃點富含蛋白質，碳水化合物也比較少的蛋白棒……"
3303-16 = "可是我們難得來一趟格黑娜自治區的運動場，怎麼能不吃這裡的特製地獄熱狗呢！？"
3303-17 = "地獄熱狗……？"
3303-18 = "沒錯，大部分的棒球場都會提供簡單的餐點和飲料，#n讓觀眾在觀賞比賽的同時解決用餐問題。"
3303-19 = "雖然大多都是一些普通的點心和冷飲，#n但某些運動場也會提供一些具有主場隊特色的招牌餐點……"
3303-20 = "像格黑娜自治區的棒球場就會販售淋上特製甜辣醬的地獄熱狗，這可是極品哦。"
3303-21 = "因為每個學園的運動場販賣的餐點都不太一樣，#n所以四處尋找這些美食也是觀賞棒球賽的一大樂趣！"
3303-23 = "嗯……如果只是一根熱狗倒是無所謂……"
3303-24 = "啊，這根熱狗沒加辣椒醬耶。"
3303-28 = "不過熱狗本身的調味就已經很夠，就算直接吃也挺辣的。"
3303-29 = "先咬一口熱狗，再配一口薑汁汽水……"
3303-34 = "噗哈……這樣就對了！"
3303-36 = "啊，前輩如果有什麼想吃的東西儘管點哦！#n難得過來一趟，這次就由我請客吧！"
3303-37 = "那我要……一份無鹽雞胸肉沙拉。"
3303-38 = "棒球場怎麼可能會有那麼健康的食物！"
3303-44 = "……比賽好像開始了。"
3303-45 = "話說這好像是我第一次現場看格黑娜的比賽，格黑娜棒球部的人強嗎？"
3303-46 = "我也不清楚，雖然外界都覺得他們的實力偏弱……"
3303-47 = "但其實選手本身的體能並不差，只是因為默契不足導致團隊基礎不夠扎實。"
3303-48 = "當然，就算實力偏弱又是二軍，他們還是比千年棒球部強上許多……"
3303-49 = "不過既然都來現場看球賽了，我們就暫時撇開學園，專心為他們加油吧！"
3303-53 = "加油，格黑娜！打飛他們！"
3303-57 = "格黑娜的二號打者現在站上了打擊區，這記直球……打中了！"
3303-58 = "球落在了左中外野！#n打者越過了一壘，並且繼續衝向二壘……"
3303-59 = "……看來似乎是有點太貪心了，出局！"
3303-60 = "唔，本來有機會打出二壘安打的……真可惜。"
3303-61 = "如果跑者必須在守備方碰到之前踩上壘包……"
3303-62 = "難道不能用必殺迴旋踢把二壘手踢飛嗎？"
3303-63 = "當然不行！"
3303-65 = "（儘管莉賣力地為格黑娜加油，格黑娜棒球部最終還是含恨吞下了敗仗……）"
3303-68 = "……實在太可惜了，要不是對方最後幾顆球接得太漂亮，格黑娜應該可以贏的。"
3303-69 = "我也這麼認為。"
3303-70 = "如果我是跑者，一定會想辦法用肩撞撞開防守球員上壘。"
3303-71 = "看來格黑娜的打擊手最好多練練三角肌。"
3303-72 = "前輩，你真的了解棒球的規則嗎……？"
3303-73 = "不過我好久沒和別人一起來看球賽，其實還挺開心的。"
3303-74 = "雖然我很喜歡關在訓練中心裡鍛鍊肌肉，但偶爾看看選手在運動場上激情碰撞，#n努力證明自己訓練成果的樣子，反而會讓我對訓練的慾望變得更加強烈呢。"
3303-75 = "前輩……看來你的腦袋裡真的只有訓練呢。"
3303-76 = "所以……莉同學。"
3303-77 = "你現在回想起最後一次看見全壘打時的情景了嗎？"
3303-83 = "……嗯。"
3303-84 = "就像今天一樣，那場比賽的觀眾並不多。"
3303-86 = "為了尋找美味的點心、為了拍下喜歡的選手的照片、為了尋找新的明日之星……#n雖然每個人看比賽的理由各不相同……"
3303-87 = "不過在擊出全壘打的瞬間，所有人都屏住呼吸凝視著打者。"
3303-89 = "雖然球在越過圍牆時劃出了美麗的拋物線……#n但打者暢行無阻地在球場上瀟灑奔馳的模樣……真的非常帥氣。"
3303-90 = "不過還真奇怪，我明明每天都把全壘打掛在嘴邊，卻把當時的情景忘得一乾二淨。"
3303-92 = "運動時最重要的就是設定目標。"
3303-93 = "例如想要減輕體重，或是打造充滿線條的身材……#n如果沒有目標的話，運動就只是永無止盡的痛苦而已。"
3303-94 = "然而若是只急於達成目標，卻沒有經歷這痛苦的過程……#n設下的目標也無法散發耀眼的光芒。"
3303-95 = "就像那些想要減重的人，未必只是想看到體重計的數字下降一樣……#n我想你肯定也不只是為了擊出全壘打而加入棒球部的。"
3303-96 = "如果說打棒球的樂趣有很多種，那麼享受訓練的方式也是一樣的。"
3303-97 = "所以我希望你不要逃避今天的訓練，#n試著把它當成邁向全壘打的旅程，並好好享受它。"
3303-98 = "莉同學，你願意繼續和我一起訓練嗎？"
3303-103 = "……是，前輩！"
3303-107 = "千年健身中心"
3303-110 = "……我說的訓練可不是這種啊！"
3303-112 = "有什麼問題嗎，莉同學？"
3303-113 = "這個像腳鐐一樣的機器到底是什麼東西！"
3303-114 = "啊，你現在用的是我新買的深蹲機。"
3303-115 = "雖然還只是半成品，但這台深蹲機是我特別請工程師部打造的。#n它搭載了腳部固定裝置，想要脫掉它就必須先做完一組動作才行。"
3303-116 = "除了能讓那些意志薄弱的會員確實完成訓練之外，#n還能順便矯正使用者的姿勢，讓使用者能以正確的姿勢做好深蹲。"
3303-117 = "如果不能自己決定停止的時機，那這不就只是台拷問機器嗎！？"
3303-118 = "而且你剛才明明說這是能提高打擊率的訓練……#n下肢運動跟打擊率到底有什麼關係啊？"
3303-119 = "其實在你擊球的時候，下半身的肌肉也扮演了很重要的角色哦。"
3303-120 = "比如在對球施力時，你的核心肌群也必須出力固定關節，#n因此不規律的肌肉訓練很容易讓人受傷。"
3303-121 = "啊，既然說到這個，我們今天就來進行以鍛鍊下肢肌肉為主的訓練吧！"
3303-134 = "好，那做完深蹲之後，馬上接著進行弓步運動！"
3303-139 = "真是的……"
3303-140 = "下個賽季開始之後，你看我還會不會回來這裡──！"
3303-141 = "揮向遠方"

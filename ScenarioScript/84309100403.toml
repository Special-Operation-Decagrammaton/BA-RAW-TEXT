[translation]
84309100403-6 = "เป็นไปได้ด้วยดีเลยละ กำลังสวยเลย!"
84309100403-7 = "เราทำสำเร็จแล้วละ พี่โมโมอิ!"
84309100403-9 = "เห็นแบบนี้ก็น่าโล่งใจนะคะ"
84309100403-10 = "ขอบคุณมากเลยนะ คุณเซอา!!"
84309100403-14 = "คุณเซอางั้นเหรอคะ... ฮุฮุ"
84309100403-19 = "ขำอะไรเหรอคะ...?"
84309100403-20 = "เปล่าหรอกค่ะ ขอบคุณนะคะ ฉันรู้สึกภูมิใจในตัวเองขึ้นมาอีกครั้งเลยค่ะ"

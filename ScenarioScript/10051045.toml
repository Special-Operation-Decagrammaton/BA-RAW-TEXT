[translation]
10051045-2 = "ฮึ่ย น่าโมโหชะมัด...!"
10051045-7 = "ปะ... ปราบได้หมดแล้ว..."
10051045-8 = "ฮุฮุฮุ ทุกคนดูไว้ให้เต็มตา...! คนที่ยืนหยัดได้จนถึงวินาทีสุดท้ายก็คือนินจา...!"
10051045-9 = "ขอบคุณที่ร่วมมือกันนะคะ! นินนิน!"
10051045-10 = "[s] \"มีใครได้รับบาดเจ็บหรือเปล่า?\""
10051045-11 = "ไม่มีค่ะ พวกเราทุกคนปลอดภัย ตะ... ต้องขอบคุณคุณครูด้วยค่ะ"
10051045-12 = "แต่ถ้าถามแบบไม่แยกฝ่ายเขาฝ่ายเราละก็ ฉันว่าทางนั้นน่าจะบาดเจ็บเยอะทีเดียวเลยนะ..."
10051045-13 = "ว่าแต่ทำไมถึงยกพวกมาขโมยเสื้อผ้าของคนอื่นก็ไม่รู้นะ นี่ไม่ใช่การขโมยธรรมดาเลยละ"
10051045-14 = "หัวหน้า! เราเอาชุดพวกนี้ไปคืนในงานก่อนเถอะค่ะ"
10051045-15 = "อ๊ะ จริงสิ! สิ่งที่สำคัญที่สุดก็คือชุดของดีไซเนอร์ไชน์แคท!"
10051045-17 = "ชุดอาจจะอยู่ในกระเป๋าใบนั้นก็ได้นะคะ ฉันเห็นพวกนั้นกอดกระเป๋าใบนั้นไว้แน่นเลยค่ะ"
10051045-18 = "โอ้ว โล่งอกไปทีนะ กระเป๋าไม่ได้รับความเสียหายอะไรเลย"
10051045-19 = "เอาละ ในเมื่อได้ชุดกลับมาแล้ว"
10051045-20 = "เดี๋ยวนะ... แล้วใครกันที่มานอนสลบอยู่ตรงนี้?"
10051045-24 = "..."
10051045-25 = "เอ๋...? แต่ตอนเกิดการต่อสู้ คนคนนี้ไม่ได้อยู่ตรงนี้นี่คะ...?"
10051045-26 = "อิซุนะก็เพิ่งเห็นคนคนนี้เหมือนกันค่ะ!"
10051045-27 = "อะไรกัน หรือจะเป็นคนที่เดินผ่านไปมาแล้วโดนลูกหลงจากการต่อสู้?"
10051045-28 = "รีบพาไปรักษาตัวก่อนเถอะ..."
10051045-33 = "นี่ พวกเธอ เจอชุดของฉันหรือยัง?"
10051045-34 = "หืม? ก็ได้กระเป๋าที่ใส่ชุดมาแล้วนะ"
10051045-35 = "โอ้ว ชุดที่ฉันสรรสร้าง! ดีละ งั้นก็แก้ปัญหาได้แล้ว"
10051045-36 = "ไหนดูซิ... หืม? เดี๋ยวนะ คนที่นอนเจ็บอยู่ตรงนี้..."
10051045-40 = "มะ... ไม่นะ...!"
10051045-41 = "ม่ายยย!!"

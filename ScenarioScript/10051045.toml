[translation]
10051045-2 = "可惡，好不甘心……！"
10051045-7 = "成……成功了……"
10051045-8 = "哼哼哼，各位請看吧……！#n站到最後的，果然必將是忍者……！"
10051045-9 = "大家辛苦了！忍忍！"
10051045-10 = "[s]「沒有人受傷吧？」"
10051045-11 = "託老師的福，大，大家都沒事。"
10051045-12 = "要是把敵我都算進來的話，那邊好像沒有一個沒事的就是了……"
10051045-13 = "不過話說又回來，居然為了偷別人的衣服出動這麼一大群人……#n他們也把偷東西這件事看得太認真了吧？"
10051045-14 = "那麼部長！先把衣服給收回去吧？"
10051045-15 = "啊，對耶！Shine Cat設計師的衣服！那個才是最重要的！"
10051045-17 = "衣服應該在那個包包裡面……他直到最後都緊緊抱著它，看起來很珍惜的樣子。"
10051045-18 = "哦哦，太好了。包包本身看起來也沒什麼損傷。"
10051045-19 = "好，這樣目標物就回收完畢了。"
10051045-20 = "……等等。#n倒在地上的這個人……是誰啊？"
10051045-24 = "……"
10051045-25 = "咦……？這麼說來，剛才戰鬥開始的時候，好像也沒看到這個人……？"
10051045-26 = "伊樹菜也是第一次看到！"
10051045-27 = "怎麼回事，是被捲入戰鬥中的一般人嗎？"
10051045-28 = "總之得先快點幫他治療才行……"
10051045-33 = "喂～我的作品找到了嗎？"
10051045-34 = "嗯？裝衣服的包包已經找回來了。"
10051045-35 = "哦哦，是我的作品！#n看來算是順利解決了呢。"
10051045-36 = "我看看……嗯？#n等等，倒在這裡的這個人……"
10051045-40 = "怎，怎麼……！"
10051045-41 = "怎麼會這樣啊啊啊──！！"

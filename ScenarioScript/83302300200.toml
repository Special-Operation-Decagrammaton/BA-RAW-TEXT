[translation]
83302300200-6 = "อาโกะ? มีเรื่องอะไรเหรอ? ฉันกำลังจะกลับไปห้องคณะกรรมการวินัยพอดีเลย"
83302300200-7 = "ทะ... ท่านประธาน! เกิดเรื่องใหญ่แล้วค่ะ!"
83302300200-8 = "ฉันได้รับแจ้งว่ามีสัตว์ประหลาดยักษ์... อะไรทำนองนั้นปรากฏตัวในสวนสาธารณะเกเฮนน่าน่ะค่ะ!"
83302300200-9 = "ฉันรู้ดีค่ะว่าเหตุการณ์นี้มันยากที่ท่านประธานจะเข้าใจ...!"
83302300200-10 = "ไม่หรอก... ฉันพอจะเข้าใจอยู่น่ะ"
83302300200-11 = "งั้นเหรอคะ...!"
83302300200-12 = "คะ...?"
83302300200-13 = "ส่งพิกัดสวนสาธารณะนั่นให้ฉันที ฉันจะไปเดี๋ยวนี้"

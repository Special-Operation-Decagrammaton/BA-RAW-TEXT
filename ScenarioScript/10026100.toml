[translation]
10026100-1 = "Episode 10;Small Changes"
10026100-2 = "Ah... I see."
10026100-3 = "Apart from the first discovery, there are two additional locations with secret dormitories and storage cabinets."
10026100-4 = "And the whole place was a training ground for the Council that got shut down due to all of the unauthorized activities?"
10026100-5 = "Even students back then played hooky from time to time..."
10026100-6 = "I suppose we all fall prey to that temptation."
10026100-7 = "At least we've got the general idea. We'll work out the details later. Thanks for your help."
10026100-8 = "Oh, and good work...very fast. You certainly live up to your reputation as the Magician of the Old Library."
10026100-9 = "...Ah..."
10026100-10 = "Um..."
10026100-11 = "I don't know what to say... I know I should be grateful we wrapped so fast, but..."
10026100-12 = "It was all a little too easy... I'm feeling a bit..."
10026100-16 = "...disappointed. But what kind of example would I be setting if I, a Sister, were anything but grateful."
10026100-17 = "As promised...in return for her help on this matter, we can put the Scripture business with Kozeki Ui behind us."
10026100-18 = "Heehee! That's great!"
10026100-19 = "...Hm."
10026100-20 = "Hanako, if you don't mind. I'd like to ask you a personal question, off the record."
10026100-21 = "This investigation... I could see you trying to orchestrate things from the start."
10026100-22 = "I know you had no malicious intent. You were just trying to help Ui, and that's great."
10026100-23 = "But I have to ask... Did you know something about the ruins before all of this? Did you know what it was?"
10026100-24 = "I assume you must have, or else why would you have gone to such lengths to defend Ui?"
10026100-25 = "You picked up on that, huh? I guess I've gotten sloppy lately."
10026100-26 = "As to why I would defend Ui..."
10026100-27 = "There's no reason. Call it a whim."
10026100-28 = "A whim? Hmm..."
10026100-29 = "Well... All right. That's good enough for me."
10026100-30 = "And... Are the locations listed in your report the only ones you found?"
10026100-31 = "What do you mean?"
10026100-32 = "Are you suggesting we're hiding something from you? That we're liars?"
10026100-33 = "No! Not at all! I never meant—"
10026100-34 = "I didn't mean to offend you with the question! You just can't be too careful these days, you know?"
10026100-35 = "Now, about the map..."
10026100-36 = "Ah."
10026100-37 = "The map. Yes. I'm really sorry. I should have taken better care of it, but you know... Heat of battle..."
10026100-38 = "Oh, no. I was going to say that's fine."
10026100-39 = "It was unfortunate, but being able to finally investigate those ruins was worth the loss."
10026100-40 = "If anything, we're grateful for the work you did and that you created a copy for us."
10026100-41 = "I sincerely hope that someday we'll have the opportunity to repay the favor."
10026100-42 = "Until next time..."
10026100-46 = "...Heehee."
10026100-47 = "Shall we head back, Sensei?"
10026100-51 = "[ns1] \"Is this really okay...?\"\n[ns2] \"It doesn't feel right.\" "
10026100-54 = "Whoa, whoa! You can't have second thoughts now! We're all in this together... We're accomplices."
10026100-55 = "It doesn't matter what we hid or where we buried it. It's done."
10026100-56 = "I can't believe you even thought about saying something... You're not as sweet as you look."
10026100-57 = "Anyway, back to our conversation the other day when you asked me if I liked Ui."
10026100-58 = "I know I already answered you. But since things got so chaotic, I thought I should be extra clear now."
10026100-59 = "My answer is yes...I think I do."
10026100-60 = "If we ever get the chance again...I'd love another swimsuit walk with you."
10026100-61 = "[s3] \"That would be tough for Ui.\"\n[s4] \"Don't make it too awkward for her.\""
10026100-62 = "You think? Heehee..."
10026100-63 = "I wonder..."
10026100-64 = "Ah, Hanako?"
10026100-65 = "Hm..."
10026100-66 = "Oh, hello, Mari!"
10026100-71 = "It's been a while since I last saw you. How have you been?"
10026100-72 = "Oh, you're here too, Sensei? You must be on official business."
10026100-73 = "You could say that."
10026100-74 = "Ah... I see..."
10026100-75 = "...Heehee."
10026100-76 = "Should I bring them here for personal fun next time?"
10026100-81 = "Maybe to see you, Mari...?"
10026100-82 = "...?!"
10026100-83 = "Hanako! Th-That's not why I asked!"
10026100-84 = "Oh, am I imposing? I'm sorry. I just couldn't resist making the suggestion..."
10026100-85 = "N-No! I don't mind. Please come. I'm always happy to host Hanako and Sensei!"
10026100-86 = "P-Promise!"
10026100-87 = "...Heehee."
10026100-88 = "Fine. So you know, we really are here on business today, and we have a few stops left to do. So, we'll have to visit another time."
10026100-89 = "Ah, okay! Take care!"
10026100-90 = "...You too, S-Sensei!"
10026100-95 = "[ns] \"Mari seems very happy.\""
10026100-96 = "She is, isn't she? Heehee..."
10026100-97 = "Mari's too much of a goody two shoes for me, but..."
10026100-98 = "I'm glad to see she's happy. We could even go so far as to say it's because of you, Sensei."
10026100-99 = "Which means..."
10026100-100 = "If Mari cries later because we couldn't hang out, that would be your fault too!"
10026100-101 = "[s5] \"...What? How does that work?!\"\n[s6] \"I'm pretty sure Mari can't go on a swimsuit walk!\""
10026100-104 = "Heehee... Perhaps we should head back and check with her to find out?"
10026100-105 = "Better decide quick, Sensei. We still have a lot of stops to make today..."
10026100-111 = "I'm back!"
10026100-112 = "I'm back? You say that like this is your home."
10026100-113 = "Ugh! Yet another person to get on my nerves..."
10026100-117 = "Hinata! Please be careful!"
10026100-118 = "Moving that bookcase around is dangerous! You could really hurt someone!"
10026100-122 = "And you could hurt yourself too, Hinata. Watch where you step!"
10026100-124 = "Ahahaha... I'm sorry. There's more stuff on the floor than I expected."
10026100-125 = "But I'm not going to let that slow me down! I refuse to be outdone!"
10026100-126 = "That's not why I want you to be more careful."
10026100-127 = "Um... With as many books as you have here, don't you think it would be a good idea to hire an assistant?"
10026100-128 = "I can't believe you've been handling all this on your own. I'm a little concerned..."
10026100-129 = "Absolutely not!"
10026100-130 = "I work hard to keep people out of here. I'm not about to invite someone in to...touch things."
10026100-131 = "Take right now, for example... Argh! What did you— That's it! I can't take it anymore!"
10026100-132 = "How many people are in here?! It's like a three-ring circus! "
10026100-133 = "...A nightmare! I can't do this."
10026100-134 = "[s7] \"Ui, it's just four people.\"\n[s8] \"Shh! We're in a library. Remember?\""
10026100-137 = "Heehee. Don't worry, Ui. We won't stay long."
10026100-138 = "I handed our report over to Sakurako. Fortunately, she didn't have very many questions. So that's that!"
10026100-139 = "Huh?! She let it go just like that?"
10026100-140 = "You must have given quite a good explanation. Thank you both."
10026100-141 = "What about the map and Memorial Capsule?"
10026100-142 = "We didn't talk about that. In fact, the Cathedral seemed entirely unconcerned."
10026100-143 = "Honestly, I was surprised you were the one to suggest that little trick, Ui."
10026100-144 = "Burying the Memorial Capsule with the map rolled up inside was brilliant."
10026100-145 = "I only hope it's okay to leave it there. It's not like you to treat such an important piece of history like that."
10026100-146 = "Isn't rolling up the map inside the box and burying it going to damage the parchment eventually?"
10026100-148 = "Wait, what?"
10026100-149 = "You of all people are worrying about things like that now...?"
10026100-150 = "*sigh* Do you really want a detailed explanation?"
10026100-151 = "Ah... No, sorry. I promised myself I would be nicer to you all."
10026100-152 = "It's just that the more people there are, the more I have to remind myself not to be rude."
10026100-153 = "Anyway, to answer your question...I'm a librarian, not an archaeologist."
10026100-154 = "I do my best to honor the will of these artifacts' creators, whatever that may be. I don't stick everything in a museum indiscriminately."
10026100-155 = "Not all relics were buried with the intention of being passed on to future generations."
10026100-156 = "Some stories were meant to live on only in the hearts and minds of those who knew them."
10026100-157 = "That training ground was officially closed. They never intended to come back for those memories."
10026100-158 = "If you took them back with you, those records and the valuable personal effects we found would be confiscated and destroyed anyway."
10026100-160 = "There's a reason those people didn't share their valuable memories with anyone."
10026100-161 = "They wanted them to fade away with the ages."
10026100-163 = "If we dug them up and stuffed them in a museum, it would be the ultimate insult."
10026100-164 = "..."
10026100-165 = "As investigators, it was our duty to discover and report what happened there."
10026100-166 = "And we did. But that Memorial Capsule... I wanted to honor its original purpose."
10026100-167 = "At the same time, a box with nothing to hold somehow seems like...a very lonely existence."
10026100-168 = "[s9] \"...Parchment lasts a long time.\"\n[s10] \"And as items from the same era, they're...connected.\""
10026100-171 = "Something like that. They were both made in that era and have the same history."
10026100-172 = "But enough about that."
10026100-178 = "I'm amazed that Hinata agreed to my proposal."
10026100-179 = "...Huh? Me?"
10026100-180 = "Well...you're a Sister. Isn't lying going to be a problem for you?"
10026100-181 = "Ahahaha... Is that what you're concerned about, Ui?"
10026100-182 = "Don't worry about me. I'll be fine. Besides, it's not like you forced me to lie."
10026100-183 = "You didn't feel like you were pressured into it?"
10026100-184 = "Of course not! Granted, lying's usually a bad thing, but..."
10026100-185 = "...there's no harm in the occasional white lie as long as your intentions are good. And who knows? You might just be forgiven for it."
10026100-186 = "Sister Sakurako always said, \"Reading scripture and reciting rules all the time..."
10026100-187 = "...is only meant to help guide us along the right path."
10026100-188 = "We know in our hearts what is right, and we should honor that intuition above all else.\""
10026100-189 = "...Your explanation felt right, Ui. That's why I went along with your plan. Trust me. I'll be fine."
10026100-190 = "Uh... Uhh... Umm..."
10026100-191 = "[s11] \"You are truly great Sisters.\"\n[s12] \"Everything is going to be just fine.\""
10026100-194 = "Yes... That's a relief."
10026100-195 = "I'm glad. And I hope that breaks some of your preconceptions about Sister Sakurako and the others, Ui..."
10026100-197 = "Absolutely not. Those are two totally different subjects."
10026100-198 = "You're too naive, Hinata."
10026100-199 = "That person... No. That entire organization is hiding something...something huge!"
10026100-200 = "Why else would they keep sending you here to keep tabs on me?"
10026100-201 = "Uh... This is what friends do. They check on each other. I'm trying to help you out, Ui..."
10026100-202 = "That's what they want you to think, Hinata! And it's easy, because you're so nice! But that's not the REAL reason!"
10026100-203 = "*sigh* You know what? Nevermind. I'm wasting my breath."
10026100-204 = "Hahaha..."
10026100-206 = "Whatever you say, Ui. Anyway, it looks like we got through the worst of it."
10026100-207 = "I suppose we should get out of your hair now before you completely lose your marbles."
10026100-208 = "...!"
10026100-209 = "Th-Then... Um..."
10026100-210 = "Hey, wait!"
10026100-211 = "Huh? What's wrong, Ui?"
10026100-212 = "Were you secretly hoping we could stay longer?"
10026100-213 = "D-Don't be ridiculous. That's..."
10026100-214 = "That's not what I was going to— Nevermind... Here. There's one for each of you."
10026100-218 = "[ns13] \"An iced Americano! Wow!\"\n[ns14] \"Ui, does this mean...?\""
10026100-223 = "Everyone went through a lot because of me."
10026100-224 = "I know it's not much, but it's the least I could do. You should each take one when you leave..."
10026100-225 = "...as a token of my appreciation."
10026100-231 = "[ns15] \"Thanks for the drink.\"\n[ns16] \"It's nice to see you making an effort, Ui.\""
10026100-234 = "Wh-Why is everyone smiling and staring at me?! Just...take your coffee and leave already!"
10026100-236 = "You heard me! Get out! Shoo!"
10026100-237 = "All right! All right!"
10026100-238 = "See you later, Ui!"
10026100-239 = "[ns] \"Take it easy, Ui.\""
10026100-242 = "*sigh*"
10026100-243 = "This is so annoying. I'm not a people person."
10026100-247 = "How do I keep accumulating friends I have to be nice to?"
10026100-250 = "..."
10026100-251 = "S-Sensei? Wh-What did you need me for that was so urgent?"
10026100-252 = "Why here? And why this outfit?"
10026100-255 = "Wh-What's going on?!"
10026100-256 = "Explain yourself, Sensei, or you risk execution!"
10026100-257 = "This isn't what I think it is...is it?! It certainly won't look good to everyone else."
10026100-258 = "[s17] \"You'll like this, Koharu.\"\n[s18] \"Don't worry. Everything will be okay.\""
10026100-261 = "E-Eek?! Wh-What do you mean?!"
10026100-262 = "Is this it?! Are you finally showing your true colors?! I never dreamed you'd be so bold!"
10026100-263 = "Oh, good! You're here! This way, Sensei! You too, Koharu!"
10026100-264 = "...?"
10026100-265 = "...Huh? That sounds like..."
10026100-269 = "Ah! I'm relieved to see you. I was starting to think I was walking into an ambush."
10026100-270 = "Azusa, nobody plans an ambush in a place like this."
10026100-271 = "Heehee. We've been waiting for you two."
10026100-272 = "Now we can all start enjoying our day of fun in the sun without a care in the world!"
10026100-273 = "Sensei rented out the entire swimming pool just for us!"
10026100-277 = "Huh?"
10026100-278 = "Hmm..."
10026100-279 = "Uh... Sensei?"
10026100-280 = "[s19] \"Is this your first time swimming with everyone?\"\n[s20] \"What do you think, Koharu? Not bad, right?\""
10026100-283 = "Uh... Uhh..."
10026100-284 = "Umm..."
10026100-285 = "...Heehee!"
10026100-287 = "Yeah."
10026100-288 = "Trinity Extracurriculars: In Search of Hidden Ruins"

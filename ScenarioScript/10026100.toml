[translation]
10026100-1 = "ตอนที่ 10;ความเปลี่ยนแปลงเล็กๆ"
10026100-2 = "เป็นอย่างนี้นี่เองสินะคะ..."
10026100-3 = "ที่ใหม่ 2 แห่งที่อยู่นอกเหนือจากที่ที่ถูกค้นพบแล้ว... คือหอพักที่สร้างเองและโกดังเก็บที่ซ่อนไว้... งั้นเหรอคะ?"
10026100-4 = "ที่นั่นถูกใช้เป็นสนามฝึกเดินทางไกลของเหล่าสาวก แต่ถูกปิดไปเพราะมีการทำกิจกรรมส่วนตัวนอก#nเหนือจากคำสั่ง... เหรอคะ"
10026100-5 = "...คาดไม่ถึงเลยนะคะ พวกรุ่นพี่รุ่นเก่าๆ ก็คงอยากทำอะไรที่แตกต่างไปบ้างสินะคะ"
10026100-6 = "อันที่จริงแล้ว มนุษย์ทุกคนหักห้ามใจจากสิ่งล่อตาล่อใจแบบนั้นได้ยาก ฉันเข้าใจดีค่ะ..."
10026100-7 = "เอาเป็นว่าฉันได้ข้อมูลคร่าวๆ แล้วค่ะ ส่วนรายละเอียดอื่นๆ ไว้มาทบทวนกันทีหลัง ยังไงก็ต้องขอบคุณ#nสำหรับความร่วมมือด้วยนะคะ"
10026100-8 = "แต่ถึงอย่างนั้น ฉันไม่คิดเลยนะคะว่าการสำรวจจะจบลงเร็วขนาดนี้... สมแล้วกับที่เป็นจอมเวทแห่งห้อง#nสมุดเก่า"
10026100-9 = "...อืม..."
10026100-10 = "จะพูดยังไงดี..."
10026100-11 = "ฉันรู้ค่ะว่าไม่ควรรู้สึกแบบนี้..."
10026100-12 = "แต่สิ่งที่พวกฉันตรากตรำหากันมาจนถึงตอนนี้ กลับถูกเปิดเผยออกมาได้ง่ายๆ ฉันก็เลย... รู้สึกว่า..."
10026100-16 = "ไม่มีอะไรหรอกค่ะ การที่ฉันรู้สึกขุ่นเคืองด้วยเรื่องแบบนี้ คงหมายความว่าฉันยังบกพร่องในการทำงาน#nในฐานะซิสเตอร์ค่ะ"
10026100-17 = "งั้นก็ตามสัญญาค่ะ... เรื่องต่างๆ ที่เกี่ยวข้องกับคุณโคเซกิ อุย ฉันจะฝังมันไว้ด้วยความช่วยเหลือจาก#nคุณในครั้งนี้แล้วกันค่ะ"
10026100-18 = "ฮุฮุ ดีเลยนะคะ"
10026100-19 = "อืม..."
10026100-20 = "คุณฮานาโกะ ถ้าไม่ว่าอะไร ฉันขอถามอะไรหน่อยได้ไหมคะ ไม่ใช่ในฐานะซิสเตอร์นะคะ แต่เป็นการถามแบบส่วนตัว..."
10026100-21 = "การสำรวจครั้งนี้... ฉันรู้สึกได้ถึงความตั้งใจของคุณฮานาโกะในหลายๆ ด้านเลยค่ะ"
10026100-22 = "แน่นอนว่าไม่ใช่ในแง่ร้ายหรอกนะคะ ฉันรู้ว่าคุณฮานาโกะอยากจะช่วยคุณอุย... และเพราะมันคือเจตนาดี ฉันก็เลยคิดว่าเป็นสิ่งที่ดีด้วย..."
10026100-23 = "แต่ว่าคุณฮานาโกะคะ ไม่ทราบว่าคุณพอรู้อะไรเกี่ยวกับซากปรักหักพังอยู่ก่อนแล้วเหรอคะ? รู้ว่ามันเป็นที่แบบนี้น่ะ..."
10026100-24 = "แล้วคุณมีเหตุผลอะไรที่อยากแก้ต่างให้คุณอุยเป็นพิเศษหรือเปล่าคะ...?"
10026100-25 = "เอ๋? เห็นฉันเป็นอย่างนั้นเหรอคะ? อืม ลำบากใจจังเลยนะคะ สงสัยช่วงนี้ฉันจะเนือยๆ ไปบ้างน่ะค่ะ"
10026100-26 = "นั่นสินะคะ เหตุผลที่อยากแก้ต่างให้งั้นเหรอ... ให้เป็นอะไรดีล่ะคะ?"
10026100-27 = "อืม... เอาเป็นว่า เป็นเพราะนิสัยเปลี่ยนไปเปลี่ยนมาของฉันแล้วกันค่ะ ไม่ได้มีเหตุผลยิ่งใหญ่อะไรหรอก"
10026100-28 = "ให้เหตุผลว่าเพราะตัวเองเป็นคนโลเล... งั้นเหรอคะ... อืม..."
10026100-29 = "ก็... นั่นสินะคะ เข้าใจแล้วค่ะ นั่นคงเป็นเหตุผลที่เพียงพอแล้วละค่ะ"
10026100-30 = "ถ้าอย่างนั้น... ประเด็นต่างๆ ที่ใส่มาในรายงานผลงานสำรวจนี้... ทั้งหมดเป็นความจริงใช่ไหมคะ?"
10026100-31 = "หืม...? ถามอย่างนี้หมายความว่ายังไงกันคะ"
10026100-32 = "หรือคิดว่ามีอย่างอื่นมากกว่านี้ แต่พวกฉันแอบซ่อนมันไว้เหรอคะ..."
10026100-33 = "มะ... ไม่ค่ะ! จะเป็นแบบนั้นได้ยังไงล่ะคะ!!  ฉันไม่ได้หมายความแบบนั้น...!!"
10026100-34 = "มันเป็นคำถามที่ฉันถามปกติเป็นนิสัยอยู่แล้วน่ะค่ะ ถ้าฟังดูแล้วเสียมารยาท ฉันต้องขอโทษด้วยค่ะ"
10026100-35 = "แล้วก็เรื่องเกี่ยวกับแผนที่..."
10026100-36 = "อ้อ~"
10026100-37 = "เรื่องแผนที่... ขอโทษจริงๆ นะคะ ต้องรักษาให้ดีกว่านี้แท้ๆ แต่การต่อสู้มันไม่จบไม่สิ้นเลย..."
10026100-38 = "มะ... ไม่ใช่อย่างนั้นค่ะ ฉันกำลังจะบอกว่าไม่เป็นไร..."
10026100-39 = "ถึงจะน่าเสียดายที่แผนที่หายไป แต่ยังไงเราก็สำรวจซากปรักหักพังได้สำเร็จลุล่วงนี่คะ"
10026100-40 = "เป็นทางฉันที่ต้องขอบคุณเสียมากกว่าที่คุณสำรวจกันต่อจนเสร็จถึงแม้แผนที่จะหายไป แล้วก็ยังทำ#nแผนที่ใหม่มาให้อีก"
10026100-41 = "หวังว่าสักวันพวกฉันจะมีโอกาสตอบแทนความช่วยเหลือจากคุณในครั้งนี้นะคะ"
10026100-42 = "ถ้างั้นฉันขอตัวก่อน..."
10026100-46 = "...ฮุฮุ"
10026100-47 = "งั้นเราก็กลับไปบ้างกันดีไหมคะ? คุณครู?"
10026100-51 = "[ns1] \"ถือว่าผ่านไปได้ด้วยดีเนอะ?\"\n[ns2] \"รู้สึกไม่สบายใจแปลกๆ แฮะ\""
10026100-54 = "ฮุฮุ มาพูดแบบนี้เอาตอนนี้เหรอคะเนี่ย? เราเตี๊ยมเรื่องนี้มาด้วยกันไม่ใช่เหรอคะ? ทุกคนคือ 'ผู้สมรู้ร่วมคิด' ค่ะ!"
10026100-55 = "ทั้งเรื่องที่เอา 'สิ่งนั้น' ไปฝังไว้ตามเดิม แล้วก็ที่เอา 'สิ่งนั้น' ไปใส่ไว้ 'ในนั้น' ด้วย"
10026100-56 = "จะว่าไปแล้ว ฉันไม่คิดเลยนะคะว่าจะ 'คิดแบบนั้น'... คุณอุยก็มีมุมที่น่ารักเหมือนกันนะคะเนี่ย"
10026100-57 = "ก่อนหน้านี้... คุณครูถามฉันว่าฉันชอบคุณอุยหรือเปล่าใช่ไหมคะ?"
10026100-58 = "ที่จริงตอนนั้นฉันก็ตอบไปแล้ว แต่ว่าจะบอกให้อีกครั้งค่ะ"
10026100-59 = "...ค่ะ ฉันว่าฉันก็เหมือนจะถูกใจคุณอุยอยู่นะคะ"
10026100-60 = "จนถึงขนาดที่ถ้ามีโอกาสละก็... ฉันอยากจะเดินเล่นในชุดว่ายน้ำกับคุณอุยดูสักครั้งค่ะ"
10026100-61 = "[s3] \"แบบนั้นอุยน่าจะไม่ไหวนะ\"\n[s4] \"อย่าทำให้อุยลำบากใจนักเลย\""
10026100-62 = "อย่างนั้นเหรอคะ? ฮุฮุ..."
10026100-63 = "ฮุฮุ... ใครจะไปรู้ล่ะคะ มันจะเป็นยังไงนะ?"
10026100-64 = "อ่า... คุณฮานาโกะ...?"
10026100-65 = "...หืม?"
10026100-66 = "อ้าว มารีจัง?"
10026100-71 = "ไม่ได้เจอกันนานเลยนะคะ ที่ผ่านมาสบายดีหรือเปล่าคะ?"
10026100-72 = "เอ๋ คุณครูก็อยู่ด้วยเหรอคะ... คงจะมีธุระอะไรที่เป็นทางการกันสินะคะ"
10026100-73 = "อืม~ ถ้าเป็นเรื่องครั้งนี้... ก็ใช่ค่ะ"
10026100-74 = "อ๋อ... ค่ะ..."
10026100-75 = "...ฮุฮุ"
10026100-76 = "ไว้ครั้งหน้า เอาไว้ให้แวะมาเพราะเรื่องส่วนตัวดีไหมคะ?"
10026100-81 = "ก็อย่างเช่น แวะมาหามารีจัง..."
10026100-82 = "......!?"
10026100-83 = "คุณฮานาโกะ...!? ฉะ... ฉันไม่ได้หมายความอย่างนั้น...?"
10026100-84 = "ตายจริง รู้สึกหนักใจสินะคะ ขอโทษด้วยค่ะ อยู่ๆ ฉันก็ตื่นเต้นไปโดยไม่รู้ตัวน่ะค่ะ..."
10026100-85 = "มะ... ไม่ค่ะ! ไม่เป็นไรค่ะ! ฉันจะไปรู้สึกแบบนั้นได้ยังไงล่ะคะ! มาหาฉันได้เลยค่ะ แล้วฉันจะรออยู่ทุกเมื่อเลย! ทั้งคุณฮานาโกะ ทั้งคุณครูเลย...!"
10026100-86 = "ตะ... ต้องมาให้ได้นะคะ...!!"
10026100-87 = "...ฮุฮุ"
10026100-88 = "ได้ค่ะ แต่ว่าวันนี้ฉันมาที่นี่ด้วยเรื่องงานจริงๆ ค่ะ แล้วก็ต้องแวะไปที่อื่นด้วย ขอโทษนะคะ~"
10026100-89 = "อ้อ ค่ะ ได้เลยค่ะ! ไปดีมาดีนะคะ!!"
10026100-90 = "คะ... คุณครูก็ด้วยค่ะ!"
10026100-95 = "[ns] \"มารีดูดีอกดีใจจังเลยนะ\""
10026100-96 = "ฮุฮุ นั่นสินะคะ"
10026100-97 = "มารีจัง... พูดตามตรง ฉันคิดว่าเธอเป็นคนที่ดีเกินกว่าจะมาคบหากับคนอย่างฉัน..."
10026100-98 = "แต่ถ้าเจอกันแล้วเธอดีใจขนาดนี้ละก็... ฉันก็ดีใจไปด้วยค่ะ ที่เป็นแบบนี้เพราะคุณครูหรือเปล่านะคะ?"
10026100-99 = "ถ้างั้นก็..."
10026100-100 = "ต่อไปถ้ามีเรื่องที่มารีจังตกใจจนร้องไห้ นั่นก็เป็นเพราะคุณครูเหมือนกัน... เข้าใจไหมคะ?"
10026100-101 = "[s5] \"...หืม? เอาแบบนั้นเลยเหรอ...!?\"\n[s6] \"ห้ามชวนมารีจังเดินเล่นในชุดว่ายน้ำนะ!\""
10026100-104 = "ฮุฮุ... งั้นเรากลับกันไหมคะ?"
10026100-105 = "คุณครูก็รู้นี่คะว่าวันนี้เราต้องไปหลายที่เลย"
10026100-111 = "กลับมาแล้วค่า~"
10026100-112 = "กลับมาล้งกลับมาแล้วอะไร... อย่าพูดเหมือนที่นี่เป็นบ้านของตัวเองสิคะ"
10026100-113 = "แถมมีคนมาเพิ่มอีกคน ฉันยิ่งกังวลเข้าไปอีก..."
10026100-117 = "คุณฮินาตะ...!!  ช่วยระวังหน่อยสิคะ!!"
10026100-118 = "ถ้าไม่ระวังเดี๋ยวได้ล้มไปกับชั้นหนังสือหรอกค่ะ...!! ถ้าเกิดเด็กๆ บาดเจ็บกันขึ้นมาจะทำยังไงคะ!?"
10026100-122 = "ละ... แล้วถ้าคุณฮินาตะบาดเจ็บไปด้วย..."
10026100-124 = "แหะๆๆ... ขอโทษค่ะ พอดีบนพื้นมีของเยอะแยะไปหมด..."
10026100-125 = "แต่ไม่เป็นไรค่ะ! ถ้าเป็นเรื่องพละกำลังและความแข็งแรงละก็ ฉันไม่เป็นสองรองใครแน่ค่ะ!"
10026100-126 = "ไม่ใช่ค่ะ ปัญหาไม่ได้อยู่ที่ตรงนั้น..."
10026100-127 = "อืม... แต่ถ้ามีหนังสือเยอะขนาดนี้ เราหาคนเพิ่มให้มาช่วยจัดการไม่ดีกว่าเหรอคะ?"
10026100-128 = "ที่ผ่านมาคุณอุยต้องดูแลหนังสือมากมายคนเดียวมาตลอดเลย... แบบนี้ฉันเป็นห่วงนะ..."
10026100-129 = "ไม่ได้เด็ดขาด!!!"
10026100-130 = "หาคนใหม่ไม่ได้ค่ะ! ไม่ได้เลย! ไม่รู้เหรอคะว่าฉันพยายามมากแค่ไหนเพื่อไม่ให้คนอื่นเข้ามาที่นี่น่ะ!?"
10026100-131 = "ที่จริงสถานการณ์ตอนนี้ก็... อึก... ถึงลิมิตฉันแล้ว...!!  อึก...!!"
10026100-132 = "คุณพระ...!!  มีกี่คนกันเนี่ย...!!  ทำไมมากันเยอะแบบนี้!!  ที่นี่ไม่ใช่ตลาดสดนะ!!! "
10026100-133 = "เป็นแบบนี้ไม่ได้!! ไม่สิ นี่ต้องเป็นความฝัน!!  ฝันร้าย!!"
10026100-134 = "[s7] \"มีแค่ 4 คนเองนะ\"\n[s8] \"อยู่ในห้องสมุดนะ ช่วยลดเสียงลงด้วย...\""
10026100-137 = "ฮุฮุ ไม่ต้องทุกข์ทรมานไปหรอกนะคะคุณอุย ยังไงฉันก็อยู่ไม่นานหรอกค่ะ"
10026100-138 = "ฉันเอารายงานผลการสำรวจไปให้คุณซากุระโกะมาน่ะค่ะ โล่งอกไปทีที่ไม่มีปัญหาอะไร และถือว่างาน#nครั้งนี้จบลงได้ด้วยดี! ปิดจ๊อบค่ะ!"
10026100-139 = "หืม...!? ปล่อยผ่านได้ง่ายๆ แบบนี้เลยเหรอคะ? คนคนนั้นน่ะนะ...?"
10026100-140 = "อ่า... ช่วยพูดเรื่องนั้นให้แล้วงั้นเหรอคะ? ขะ... ขอบคุณค่ะ คุณครู... คุณฮานาโกะ..."
10026100-141 = "ถะ... ถ้างั้น... เอ่อ... เรื่องแผนที่กับแคปซูลความทรงจำ..."
10026100-142 = "ฉันไม่ได้หยิบมาพูดต่างหากค่ะ มันเป็นเรื่องที่ทางวิหารไม่ได้ให้ความสนใจมากนัก และเป็นเรื่องที่คาด#nเดาไม่ได้ด้วย..."
10026100-143 = "ที่จริงฉันก็ค่อนข้างคาดไม่ถึงเลยค่ะว่าคุณอุย..."
10026100-144 = "จะฝังแคปซูลความทรงจำไว้เหมือนเดิม แถมยังทำแผนที่เป็นกระดาษโรลใส่ไว้ในนั้นด้วย"
10026100-145 = "เราทิ้งมันไว้ที่นั่นแบบนั้น... มันจะไม่เป็นอะไรเหรอคะ?  เพราะนั่นก็ถือว่าเป็นวัตถุโบราณ ฉันนึกว่าคุณ#nอุยจะเอากลับมาศึกษาซะอีกค่ะ"
10026100-146 = "ถ้าลองมองอีกมุมหนึ่งดู... การทำแบบนั้นก็ถือเป็นการดูหมิ่นอยู่นะคะ? ทั้งกับกล่องและก็แผนที่ด้วย"
10026100-148 = "...? คะ?"
10026100-149 = "ไม่สิ... คะ... คือว่า... มันเป็นอย่างนั้นไปได้ยังไง..."
10026100-150 = "เฮ้อ... นี่จะต้องมาอธิบายทุกอย่างเลยเหรอ คนข้างนอกนี่จริงๆ เลย..."

10026100-83 = "3;마리;08;하나코 씨……!? 저, 전 그런 의도로 말씀드린 게……?"
10026100-84 = "3;하나코;02;어라, 역시 부담스러울까요? 미안해요. 나도 모르게 설레발을……."
10026100-85 = "3;마리;04;아, 아니요! 아니에요! 그럴 리가요! 찾아와 주세요, 언제든지 기다리고 있을게요! 하나코 씨도, 선생님도……!\n#3;stiff\n#3;em;[땀]"

10026100-59 = "3;하나코;03;……네. 아무래도 마음에 든 것 같아요."
10026100-60 = "3;하나코;03;기회만 된다면……. 같이 수영복 산책이라도 해보고 싶을 만큼요.\n#3;em;[하트]"

[translation]
10026100-1 = "#title;제10화;사소한 변화들"
10026100-2 = "3;사쿠라코;02;과연……. 그렇군요.\n#3;a\n#3;em;…"
10026100-3 = "3;사쿠라코;01;기존 발견지를 제외하고도 두 곳……. 자체적으로 만든 기숙사와 숨겨둔 캐비닛들……입니까."
10026100-4 = "3;사쿠라코;99;성도회의 원정 훈련장으로 사용되고 있었지만, 지시하지 않은 개인 활동들이 계속 발견돼 폐쇄됐다……라."
10026100-5 = "3;사쿠라코;02;……좀 의외로군요. 오래된 선배님들도, 때때로 일탈을 원하시던 때가 있으셨나 봅니다."
10026100-6 = "3;사쿠라코;01;하긴 사람이라면 누구나 그런 유혹의 시험에 빠지곤 하니까요. 이해는 갑니다만…….\n#3;em;[땀]"
10026100-7 = "3;사쿠라코;01;아무튼 대략적인 내용은 확인했습니다. 세세한 부분들은 나중에 따로 검토하도록 하죠. 협조에 감사드립니다.\n#3;greeting"
10026100-8 = "3;사쿠라코;02;그렇다곤 해도 이렇게나 빨리 조사가 끝날 줄은……. 역시 고서관의 마술사랄까."
10026100-9 = "3;사쿠라코;99;……그……."
10026100-10 = "3;사쿠라코;13;뭔가……."
10026100-11 = "3;사쿠라코;13;뭐랄까……. 이런 마음 가지면 안 된다는 건 알고 있지만…….\n#3;stiff"
10026100-12 = "3;사쿠라코;04;저희가 여태까지 찾지 못했던 것들이 너무 쉽게 밝혀진 것 같아서, 조금……. 아주 조금은…….\n#3;em;[속상함]"
10026100-13 = "#st;[0,0];instant;1;"
10026100-14 = "#clearST"
10026100-15 = "3;사쿠라코;04\n#3;em;…\n#wait;2500"
10026100-16 = "3;사쿠라코;99;아닙니다. 역시 이런 걸로 분하다는 감정을 느끼는 건, 아직도 시스터로서의 제 수행이 부족하다는 뜻이겠지요."
10026100-17 = "3;사쿠라코;01;약속대로……. 코제키 우이 씨와 관련된 일련의 일들은, 이번 일에 받은 도움으로 묻어두고자 합니다."
10026100-18 = "3;하나코;03;후후. 잘됐네요, 잘됐어.\n#3;em;[음표]"
10026100-19 = "3;사쿠라코;99;…………으음.\n#3;em;…"
10026100-20 = "3;사쿠라코;01;하나코 씨. 혹시 괜찮으시다면, 이건 시스터로서가 아닌 제 개인적인 의문입니다만……."
10026100-21 = "3;사쿠라코;07;이번 조사……. 저는 사실 뭔가 여러모로 하나코 씨의 의도가 느껴집니다."
10026100-22 = "3;사쿠라코;99;물론 악의는 아니고, 우이 씨를 돕고자 하는……. 선의이기에 저로서도 좋은 일이라고 생각하지만……."
10026100-23 = "3;사쿠라코;07;하나코 씨는 혹시, 처음부터 유적에 대해 어느 정도 알고 계셨던 건가요? 이런 곳이라는 걸…….\n#3;em;[?]"
10026100-24 = "3;사쿠라코;01;그렇게까지 해서…… 유독 우이 씨를 변호하려는 이유가 있으셨을까요……?"
10026100-25 = "3;하나코;02;어라. 그렇게 보였나요? 으음. 곤란하네요. 저도 요즘 따라 꽤 허술해졌나 봐요.\n#3;em;[땀]"
10026100-26 = "3;하나코;99;그렇군요. 변호할 이유라……. 뭐가 좋을까요?"
10026100-27 = "3;하나코;03;음……. 그냥 이건 제 변덕인 걸로 할게요. 딱히 거창한 이유가 있던 건 아니라서요.\n#3;em;[음표]"
10026100-28 = "3;사쿠라코;04;변덕인 걸로 하시겠다……라니…… 으음…….\n#3;em;…"
10026100-29 = "3;사쿠라코;07;뭐……. 그렇습니까. 알겠습니다. 그건 그 이유로 충분한 거겠지요."
10026100-30 = "3;사쿠라코;02;그러면……. 찾으신 건 말씀해 주신 이 보고서의 포인트들……이 전부인 게 맞을까요?"
10026100-31 = "3;하나코;02;으음……? 질문의 의미를 잘 모르겠는걸요.\n#3;em;[?]"
10026100-32 = "3;하나코;05;설마 더 있는데 저희가 숨기고 있다든가……."
10026100-33 = "3;사쿠라코;04;아, 아뇨! 그럴 리가요!? 그런 의미는 절대로……!!\n#3;em;[?!]\n#3;shake"
10026100-34 = "3;사쿠라코;06;평소처럼 습관적으로 나온 질문이었습니다. 실례가 됐다면 죄송합니다."
10026100-35 = "3;사쿠라코;07;그리고 지도에 관한 것도…….\n#3;em;…"
10026100-36 = "3;하나코;01;아~."
10026100-37 = "3;하나코;03;지도에 관한 건……. 정말 죄송해요. 좀 더 잘 챙겼어야 했는데, 전투가 이어지다 보니…….\n#3;em;[땀]"
10026100-38 = "3;사쿠라코;04;아, 아뇨. 괜찮다고 말씀드리려고 했던 겁니다만……."
10026100-39 = "3;사쿠라코;01;지도가 소실된 건 안타까운 일이지만, 덕분에 유적의 조사를 마무리할 수 있었으니까요."
10026100-40 = "3;사쿠라코;99;오히려 그럼에도 끝까지 완수해 주시고, 이렇게 새 지도를 만들어 주신 부분에 있어서는 감사드려야 할 일."
10026100-41 = "3;사쿠라코;02;그런 것까지 모두 포함해서, 언젠가 저희도 이 도움을 갚을 기회가 있기를 진심으로 바라겠습니다."
10026100-42 = "3;사쿠라코;01;그럼 이만…….\n#3;greeting"

[translation]
10026100-1 = "第10話;小小的變化"
10026100-2 = "原來如此……是這樣啊。"
10026100-3 = "原有標記點以外的兩個地點……#n是聖徒會學生私自打造的祕密基地和置物櫃……"
10026100-4 = "該處原先是聖徒會的遠征訓練場，#n由於發現學生們私自活動的跡象，因而遭到了廢棄……"
10026100-5 = "……有些令人意外。#n以前的前輩們，偶爾也會做些違反規定的事。"
10026100-6 = "人們往往會遭遇此類誘惑的試煉。#n這也不是不能理解……"
10026100-7 = "大致的情況我都明白了。#n至於細節部分，我們之後會另外研究，感謝各位的協助。"
10026100-8 = "話雖如此，沒想到調查行動這麼快就能結束……#n真不愧是古書館的魔術師。"
10026100-9 = "那個……"
10026100-10 = "就是……"
10026100-11 = "該怎麼說呢……雖然知道自己不該這麼想……"
10026100-12 = "我們調查這麼多次都沒能發現的真相，竟然如此輕易地就……#n這讓我有點……有點……"
10026100-16 = "不，如果因為這種事而感到懊悔，就說明我作為一名修女還有許多不足之處。"
10026100-17 = "那麼按照約定……#n由於這次受到了各位的幫助，我將不再追究古関憂同學私自複製經典一事。"
10026100-18 = "呵呵，這真是太好了，太好了。"
10026100-19 = "…………嗯。"
10026100-20 = "花子同學，如果你不介意的話……#n我想撇開修女會的身分請教你一個問題……"
10026100-21 = "其實在這次的調查行動中……我經常感覺到你的「刻意」。"
10026100-22 = "當然，我指的並不是惡意。#n你想幫助憂同學的善意……在我的眼裡也是一件好事……"
10026100-23 = "但花子同學，你是不是從一開始就對那座遺跡的真相有一定程度的了解呢……？#n早已知道那裡是個什麼樣的地方……"
10026100-24 = "不惜付出那麼多心血……也想幫助憂同學的理由是什麼呢……？"
10026100-25 = "哎呀，看得出來嗎？#n唔嗯……真傷腦筋，看來最近我的手段也有點生疏了呢。"
10026100-26 = "理由，理由啊……該說是什麼才好呢？"
10026100-27 = "嗯……能當作是我的一時興起嗎？#n畢竟其中本來就沒有什麼特別的理由。"
10026100-28 = "一時興起……是嗎……#n唔……"
10026100-29 = "嗯……好吧，我明白了。#n這也是個足夠充分的理由了。"
10026100-30 = "那麼……在島上找到的據點……真的只有報告上紀載的這些沒錯嗎？"
10026100-31 = "嗯……？#n這麼問的意思是……？"
10026100-32 = "難道是在懷疑其實還有其他據點，我們卻刻意隱瞞嗎……"
10026100-33 = "不，不是的！#n那怎麼可能！我絕對沒有那個意思……！！"
10026100-34 = "只是下意識地脫口而出了……#n如果造成你的不愉快，我願意向你道歉。"
10026100-35 = "還有，關於地圖的事……"
10026100-36 = "啊～"
10026100-37 = "地圖的事……真的很抱歉。#n我應該好好保管的，可是因為一直碰上戰鬥……"
10026100-38 = "不，別這麼說，我剛才也說過沒關係了……"
10026100-39 = "雖然地圖的遺失確實令人遺憾，不過遺跡調查任務已順利解決。"
10026100-40 = "各位在沒有地圖的狀況下依舊完成了任務，還繪製了一張包含新情報在內的地圖。#n我反而該感謝各位才是。"
10026100-41 = "綜合上述這幾點，我由衷期盼我們修女會能在日後有機會報答各位。"
10026100-42 = "那麼，再會……"
10026100-46 = "……呵呵。"
10026100-47 = "那我們差不多也該回去了吧，老師？"
10026100-51 = "[ns1]「就這樣回去真的沒問題嗎？」\n[ns2]「我總覺得莫名有點介意……」"
10026100-54 = "呵呵，老師，都到這種時候了，你怎麼還說這種話？#n這不是我們一起做的決定嗎？我們每個人都是「共犯」唷？"
10026100-55 = "不管是將「那個」埋回去，還是把「那個」放進「那裡面」，全都是我們一起做的。"
10026100-56 = "話說回來，沒想到憂同學竟然會提出「那樣的想法」……#n看來他也是有可愛的一面呢。"
10026100-57 = "老師之前……不是問過我喜不喜歡憂同學嗎？"
10026100-58 = "雖然之前已經回答過了，但我現在想再重新回答一遍。"
10026100-59 = "……嗯，我想我是喜歡他的。"
10026100-60 = "喜歡到……希望能有機會一起穿著泳裝散步。"
10026100-61 = "[s3]「這對憂來說應該有點困難吧……」\n[s4]「別太為難人家哦。」"
10026100-62 = "是嗎？呵呵……"
10026100-63 = "呵呵……這樣啊，那我該怎麼辦才好呢？"
10026100-64 = "啊，花子同學……？"
10026100-65 = "……嗯？"
10026100-66 = "哎呀，瑪麗醬？"
10026100-71 = "好久不見，這段時間過得還好嗎？"
10026100-72 = "啊，老師也在呢……兩位應該是為公務而來吧。"
10026100-73 = "嗯～這次的事，應該算是公務吧……？"
10026100-74 = "啊哈……我明白了……"
10026100-75 = "……呵呵。"
10026100-76 = "下次就用私人的理由來這裡吧？"
10026100-81 = "例如來找瑪麗醬「培養感情」之類的……"
10026100-82 = "……！？"
10026100-83 = "花子同學……！？#n我，我剛才並不是那個意思……"
10026100-84 = "哎呀，果然這樣會讓你有壓力嗎？#n抱歉，是我太自我感覺良好了……"
10026100-85 = "不，不是那樣的！我怎麼會覺得有壓力呢！#n請務必來找我玩吧，我會一直在這裡等你們的！不管是花子同學，還是老師……！"
10026100-86 = "一，一定要來喔……！！"
10026100-87 = "……呵呵。"
10026100-88 = "沒問題。#n不過今天真的是為了公務而來，而且還有其他地方要去，我們就先走囉～"
10026100-89 = "啊，好，我知道了！慢走！！"
10026100-90 = "……老，老師也是！"
10026100-95 = "[ns]「瑪麗看起來好像很高興呢。」"
10026100-96 = "呵呵，就是說呀。"
10026100-97 = "瑪麗醬……其實我本來覺得像我這樣的人根本不配跟他做朋友……"
10026100-98 = "沒想到他竟然那麼高興……連我也被那純真的快樂感染了呢。#n這一切是不是都是老師的功勞呢？"
10026100-99 = "所以，那個……"
10026100-100 = "假如我以後把瑪麗醬嚇哭的話，那一定也全～都是老師的錯唷……？#n這點你應該清楚吧，老師？"
10026100-101 = "[s5]「……什麼？話是這樣說的嗎……！？」\n[s6]「不准邀瑪麗去泳裝散步哦！」"
10026100-104 = "呵呵……那我們走吧？"
10026100-105 = "今天還有很多地方要去呢。"
10026100-111 = "我回來了～"
10026100-112 = "什麼「我回來了」……請別說得好像這裡是花子同學的家一樣……"
10026100-113 = "這裡多一個人就已經夠讓我心煩意亂的了……"
10026100-117 = "日向同學……！！拜託你小心一點！！"
10026100-118 = "你這樣會把書櫃也一起推倒的……！！要是害其他人受傷的話該怎麼辦！！"
10026100-122 = "而，而且連你也會……"
10026100-124 = "啊哈哈哈……不好意思。#n沒想到地上這麼多東西……"
10026100-125 = "不過沒關係！論力氣和強壯的話，我是不會輸給任何人的！"
10026100-126 = "不是，重點不是那個……"
10026100-127 = "嗯……不過既然這裡這麼多書，我們是不是該多找幾個人來幫忙整理？"
10026100-128 = "沒想到憂同學竟然一直都自己一個人整理這麼多書……其實我有點擔心呢……"
10026100-129 = "絕對不行！！！"
10026100-130 = "怎麼能做那種事呢！竟然要多找幾個人來幫忙！#n你知道我為了不讓太多人跑來這裡，做了多少努力嗎？"
10026100-131 = "就連現在這個情況對我來說都已經……唔……接近極限了……！！#n唔唔……！！"
10026100-132 = "我的天……！！這裡到底有多少人……有多少人啊！！#n根本是菜市場嘛！！！"
10026100-133 = "不可能！！這絕對是一場夢！！一場惡夢！！"
10026100-134 = "[s7]「明明才四個人而已……」\n[s8]「在圖書館請保持安靜……」"
10026100-137 = "呵呵，不必那麼煩惱，憂同學。#n我們不會在這裡待太久的。"
10026100-138 = "我們只是把調查報告交給櫻子同學後，順路過來看看而已。#n幸好櫻子同學沒有多說什麼，所以這件事就到這裡落幕了！可喜可賀！"
10026100-139 = "嗯……！？#n那個人……竟然就這樣接受了？"
10026100-140 = "啊……原來已經跟他解釋過了是嗎？#n謝，謝謝老師……還有花子同學……"
10026100-141 = "那，那……關於……地圖和時光膠囊的事……"
10026100-142 = "那件事我們沒有特別提起，反正修女會應該也沒想到我們會查出這些。#n或許他們對此根本不感興趣也說不定……"
10026100-143 = "老實說，當時就連我都感到有些意外。#n不是其他人，而是由憂同學提議……"
10026100-144 = "將地圖放入時光膠囊，並重新將其埋回原位。"
10026100-145 = "把時光膠囊留在島上真的好嗎？那同樣也是前人的遺物吧？#n這可不像平時的憂同學會說的話哦。"
10026100-146 = "從某個角度來看……#n我們對那個箱子和地圖的行為，不也算是一種褻瀆嗎？"
10026100-148 = "……咦？"
10026100-149 = "不，我……那個……你為什麼會這麼想呢……？"
10026100-150 = "唉……連這種事都要我一一說明才行嗎？#n外面的人還真是……"
10026100-151 = "啊，不是……對不起。#n我明明已經告誡過自己不要擺出那種態度了……"
10026100-152 = "真奇怪……總覺得身邊越來越多「不能隨便對待的人」了……"
10026100-153 = "言歸正傳……我是一名圖書館員……而非考古學家。"
10026100-154 = "我並沒有將那些遺物通通找出來記錄和收藏的義務。#n那麼我當然可以帶著對那些孩子的敬意，延續它們的信念與意志。"
10026100-155 = "況且前人之所以將遺物埋進土裡，#n也不完全是為了讓自己的事蹟和祕密被後人得知吧？"
10026100-156 = "如果有想要流傳千古的的事蹟，那麼就一定也有想要自己珍藏的回憶。"
10026100-157 = "在那座訓練場被聖徒會棄置後，那些人也從沒想過要回去尋找自己的回憶。"
10026100-158 = "假如我們把它們帶到外頭來的話，等待著它們的肯定只有被扣押沒收的命運。#n那些東西之中想必也有某人極為珍惜的私人物品吧？"
10026100-160 = "不想對任何人訴說、不想讓任何人發現……#n只想讓它成為自己最寶貴的回憶，在歲月的風化中慢慢消逝……"
10026100-161 = "……嗯，那就是那孩子與生俱來的使命和義務。"
10026100-163 = "如果我們把它帶出那座島，放進保管庫裡封存或放在博物館裡展示的話……#n對那孩子來說無疑是一種侮辱。"
10026100-164 = "…………"
10026100-165 = "當然，我們是以調查小組的身分去執行任務，#n理應將我們所見所聞全部寫進報告裡……"
10026100-166 = "但就算只是個不起眼的時光膠囊……#n就算只有那孩子也好，我想讓它繼續完成自己的使命。"
10026100-167 = "不過，如果讓那孩子繼續空無一物，獨自度過漫長歲月的話，未免也太過孤單了……"
10026100-168 = "[s9]「……羊皮紙能夠保存很久。」\n[s10]「那也算是和它相同時代的……夥伴呢。」"
10026100-171 = "嗯，沒錯。#n那兩個孩子誕生自相同的時代，也在這世界上度過了同樣漫長的歲月。"
10026100-172 = "但比起這個……"
10026100-178 = "日向同學會同意我的提議……反而更讓我意外。"
10026100-179 = "……嗯？我嗎？"
10026100-180 = "那個……畢竟你是修女，這種事嚴格來說也是在說謊不是嗎？#n身為一名修女，這麼做真的沒問題嗎？"
10026100-181 = "啊哈哈哈……我看起來比較像那種人嗎……？#n讓你擔心了呢，憂同學。"
10026100-182 = "……不過不用擔心。#n我不會勉強自己做不想做的事，更不會迫於同儕壓力而低頭。"
10026100-183 = "不會迫於同儕壓力而低頭……？"
10026100-184 = "是的。雖然說謊基本上都會帶來不好的後果……"
10026100-185 = "但只要問心無愧，往往都是能被饒恕的。"
10026100-186 = "櫻子大人也經常這麼說。#n我們每天複習的經典、默背的無數教律……"
10026100-187 = "其實都像路標一樣，#n是為了讓我們在判斷時能夠有所依靠，避免在抉擇時陷入迷惘而存在。"
10026100-188 = "真正的裁量之尺就在大家的心裡，我們只要認真而嚴肅地面對其判決即可……"
10026100-189 = "……我始終認為憂同學說的話是正確的，因此才會選擇幫助你，請不必擔心。"
10026100-190 = "啊，唔……嗯……"
10026100-191 = "[s11]「你們真是一群優秀的修女。」\n[s12]「嗯，我也覺得沒問題。」"
10026100-194 = "我，我知道了……嗯……那我就放心了……"
10026100-195 = "對吧？我也希望能藉這次的機會，解開你對櫻子大人和其他人的誤會……"
10026100-197 = "好的，駁回。#n這跟那是兩碼子事。"
10026100-198 = "日向同學只是因為天真單純又善良才不知道而已。"
10026100-199 = "那個人……那個組織絕對有問題，他們的背後肯定隱藏著什麼巨大而陰險的祕密……"
10026100-200 = "光憑他們定期把你送來這裡監視我這點就能……！"
10026100-201 = "咦，咦？#n憂同學，修女會只是派我來協助你而已……畢竟經過這次的事……"
10026100-202 = "他們當然會這樣說啊！#n所以我才說日向同學你太善良了……！！"
10026100-203 = "唉……算了。#n再說下去也只是做白工。"
10026100-204 = "哈哈哈……"
10026100-206 = "那，那麼……既然整理工作已經大致告一段落……"
10026100-207 = "再繼續待下去的話，憂同學也會覺得很困擾吧？#n我就先……"
10026100-208 = "……！"
10026100-209 = "再，再見……嗯……"
10026100-210 = "請等一下，那個……"
10026100-211 = "……嗯？#n怎麼了嗎，憂同學？"
10026100-212 = "哎呀，還是其實你根本不希望我走嗎……"
10026100-213 = "那，那怎麼可能。#n雖然……那種事我無法控制……"
10026100-214 = "不過……先，先不管那些。#n這個……你們一人拿一杯吧……"
10026100-218 = "[ns13]「……是冰咖啡！」\n[ns14]「憂，這樣真的好嗎？這不就代表……」"
10026100-223 = "那個……你們因為我忙了好幾天……"
10026100-224 = "雖然只是點小心意，還是應該表達一下才對……#n你們就收下吧……"
10026100-225 = "謝謝你們……就是這樣而已。"
10026100-231 = "[ns15]「謝謝，那我就不客氣了。」\n[ns16]「憂，你也一點一點地在努力著呢。」"
10026100-234 = "為，為什麼要笑咪咪的啊！？#n既然已經收下了就請你們趕快離開！"
10026100-236 = "離開！！全部離開！！！走開走開！！"
10026100-237 = "是～"
10026100-238 = "下次見囉，憂同學！"
10026100-239 = "[ns]「好好休息哦，憂。」"
10026100-242 = "……唉。"
10026100-243 = "真煩……我明明不是這種人。#n可是為什麼……"
10026100-247 = "應該善待的人越來越多了呢……"
10026100-250 = "……………………"
10026100-251 = "老，老師……？怎，怎麼了嗎？#n為什麼突然把我叫出來……"
10026100-252 = "約在這種地方……還要我穿這種衣服……？"
10026100-255 = "這，這到底是怎麼回事……！？"
10026100-256 = "說點什麼吧，老師！！#n再沉默下去就要判你死刑了哦！死刑！！"
10026100-257 = "這，這個情況果然是那個吧！？不管怎麼想都是那個吧！？#n除了那個之外沒有別的可能了！！"
10026100-258 = "[s17]「小春一定也會喜歡的。」\n[s18]「別擔心，一切都會好起來的。」"
10026100-261 = "噫，噫噫噫……！？#n老，老師，那是什麼意思！？"
10026100-262 = "你終於要露出真面目了嗎！？#n而且還毫不掩飾……這麼理直氣壯！？"
10026100-263 = "啊，你們來了啊！#n老師，小春醬～這邊這邊～！"

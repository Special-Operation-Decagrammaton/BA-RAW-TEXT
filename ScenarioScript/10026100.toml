10026100-54 = "3;하나코;03;후후. 이제 와서 그런 말씀 하시는 거예요? 다 같이 한 일이잖아요? 모두 '공범'이라고요?\n#3;a\n#3;em;[음표]"
10026100-55 = "3;하나코;01;'그걸' 그대로 다시 묻어두기로 한 것도, '그 안'에 '그걸' 넣어두기로 한 것도 전부."
10026100-56 = "3;하나코;99;그나저나 '그런 생각'을 하고 계실 줄이야…… 우이 씨도 보기와 달리 귀여운 구석이 있으시네요."
10026100-57 = "3;하나코;01;전에 선생님께서……. 우이 씨가 마음이 드냐고 물으셨었죠?\n#3;em;…"

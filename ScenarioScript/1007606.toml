[translation]
1007606-1 = "เรื่องที่ไม่ควรอธิบาย"
1007606-2 = "(ตอนเย็นหลังจากการแข่งขันทั้งหมดจบลง คุณครูก็ไปหาโคโทริที่อยู่ที่สนามแข่งขัน)"
1007606-6 = "(โคโทรินั่งอยู่ที่ม้านั่งเงียบๆ ไม่พูดอะไร และเหม่อมองไปที่สนามกีฬาด้วยสายตาที่ว่างเปล่า)"
1007606-7 = "...เอ๋ คุณครู?"
1007606-8 = "มาแล้วเหรอคะ ฉันไม่ได้พูดแบบนั้นไปเพราะจะขอให้คุณครูมาหาเลยแท้ๆ..."
1007606-9 = "[s1] \"เป็นอะไรรึเปล่า? ดูหมดแรงข้าวต้มเลยนะเนี่ย\"\n[s2] \"ทำไมเสียงอ่อย ไม่มีแรงแบบนั้นล่ะ?\""
1007606-12 = "ฉะ...ฉันดูเป็นแบบนั้นเหรอคะ? อะฮ่าฮ่า... ฉันไม่ได้ตั้งใจทำให้เห็นแบบนั้นเลยนะคะ..."
1007606-13 = "อืม..."
1007606-14 = "อย่างนั้นเหรอคะ ทำไมกันนะคะ? แม้แต่ฉันเอง... ก็ยังดูออกเลยว่าตัวเองไม่เหมือนกับทุกทีอยู่#nเหมือนกันค่ะ"
1007606-15 = "แต่ว่ามันรู้สึกไม่ค่อยมีแรงเลย... จริงอยู่ที่ว่าฉันอาจเหนื่อยๆ นิดหน่อย..."
1007606-16 = "ฉันลองคิดทบทวนดูแล้ว แต่ก็ยังไม่ค่อยแน่ใจเท่าไรเลยค่ะ"
1007606-17 = "ก็แค่... ความรู้สึกเสียดาย?"
1007606-18 = "ทั้งๆ ที่ฉันออกกำลังกายไม่เก่ง แต่ฉันก็ชอบงานมหกรรมกีฬามากกว่าที่คิดซะอีกค่ะ"
1007606-19 = "หรืออาจเป็นเพราะฉันชอบบรรยากาศวุ่นวายมีเสียงเอะอะโวยวายแบบนี้กันนะ? ฮะฮะ..."
1007606-20 = "ยังไงก็เถอะค่ะ อาจเป็นเพราะแบบนั้น... พอคิดว่างานกีฬาจบลงไปแล้ว อารมณ์มันก็เลยดาวน์ๆ นิดหน่อยน่ะค่ะ"
1007606-21 = "...คะ?"
1007606-22 = "ต่อไปก็อาจมีโอกาสแบบนี้ หรือจัดงานกีฬาแบบนี้อีกเมื่อไรก็ได้งั้นเหรอคะ?"
1007606-23 = "ฮะฮะ... นั่นสินะคะ"
1007606-24 = "...อืม..."
1007606-25 = "แบบนั้นก็จริงอยู่หรอกค่ะ ฉันเองก็คิดแบบนั้นเหมือนกัน แต่ว่า..."
1007606-26 = "ยังไง 'โอกาสหน้า' กับตอนนี้ก็ไม่เหมือนกันนี่คะ มันก็แค่ 'คล้ายกัน' เฉยๆ "
1007606-27 = "มันก็แค่ 'คล้ายๆ' แต่ไม่ใช่ 'แบบนี้' เป๊ะๆ... "
1007606-28 = "จนสุดท้ายมันก็กลายเป็นว่าโอกาสแบบนี้ไม่ได้หวนกลับมาอีกแล้วไงล่ะคะ... มันก็เหมือนกับแค่#nพยายามมองในแง่ดีเท่านั้นเองค่ะ"
1007606-32 = "...อะ..."
1007606-33 = "อะ...เอ๋? หืม? ฉะ...ฉัน... เมื่อกี้พูดอะไรออกไป...?"
1007606-34 = "...เอ๋!? ขะ...ขอโทษค่ะ ฉันไม่ได้ตั้งใจจะพูดขัดคุณครูแบบนี้เลยนะคะ"
1007606-35 = "สงสัยฉันจะอาการไม่ค่อยดีน่ะค่ะ... อึก... ต้องรีบไปพักแล้ว..."
1007606-36 = "[s3] \"ไม่หรอก พูดตรงๆ แบบนี้ละดีแล้ว\"\n[s4] \"ครูเองก็ไม่ค่อยชอบการแสร้งทำเหมือนกัน\""
1007606-39 = "...คุณครู...?"
1007606-40 = "ถ้าหาข้อแย้งไม่ได้ละก็ ให้ลองคิดในมุมมองที่ต่างออกไปงั้นเหรอคะ...?"
1007606-41 = "...ยังไงเหรอคะ?"
1007606-42 = "...คะ?"
1007606-43 = "ตรงกันข้าม การที่มันไม่หวนกลับมาก็อาจจะเป็นเรื่องดีก็ได้งั้นเหรอคะ...?"
1007606-44 = "ที่พูดนั่นหมายถึง..."
1007606-45 = "[s5] \"มันจะพิเศษเพราะมีแค่ครั้งเดียวไงล่ะ\"\n[s6] \"เพราะมันมีแค่หนเดียวเลยสำคัญไงล่ะ!\""
1007606-48 = "...อ่า... อืม..."
1007606-49 = "ฉันไม่ค่อยเข้าใจเลย... ที่คุณครูพูดมาเมื่อกี้มันต่างกับการที่บอกว่า 'ให้คิดบวกเอาไว้' ยังไงกันล่ะคะ..."
1007606-50 = "...หืม?"
1007606-51 = "เอ๋..."
1007606-52 = "...แปลกจังเลยนะคะ อะไรกันน่ะ...?"
1007606-53 = "พอได้ยินแบบนั้น มันก็... ไม่ได้อารมณ์ไม่ดีหรือรู้สึกแย่อะไร"
1007606-54 = "ก็แค่พูดแบบเลี่ยงคำเดิมแค่นั้นเอง ทำไมล่ะคะ? ทำแบบนี้แล้วมันต่างออกไปยังไงเหรอคะ?"
1007606-55 = "แต่ตามที่ฉันบอกไป พอมาลองทบทวนดูอย่างจริงจังแล้ว... ก็จริงนะคะ"
1007606-57 = "...สิ่งที่เกิดขึ้นได้แค่ครั้งเดียว ถึงจะมีโอกาสหน้าที่จะมีอะไรเหมือนๆ กันเกิดขึ้น แต่ก็ไม่ใช่สิ่งเดียวกัน#nแบบเป๊ะๆ"
1007606-58 = "เพราะงั้นไม่ใช่ครั้งหน้า หรือครั้งก่อน แต่เพื่อแสดงภาพลักษณ์ที่ดีใน 'ครั้งนี้' "
1007606-60 = "ทุกคนเลยพยายามกันอย่างหนักในงานมหกรรมแข่งขันกีฬาไงล่ะคะ "
1007606-61 = "...ฮะฮะ..."
1007606-62 = "แล้วก็พอคิดแบบนั้น... ไม่ว่ายังไงก็คงเป็นเพราะอย่างนั้น..."
1007606-64 = "แม้แต่ความรู้สึกว่างเปล่าของฉันในตอนนี้... ถ้าไม่มีงานในครั้งนี้ก็คงไม่เกิดขึ้น"
1007606-65 = "เพราะเป็นแบบนั้นก็เลยทำให้พยายามได้สุดๆ แบบนี้"
1007606-66 = "เพราะเป็นแบบนั้นถึงได้ลองคิดอะไรด้วยตัวเอง และได้โอกาสที่จะเรียนรู้อะไรบางอย่างมา"
1007606-67 = "เพราะเป็นแบบนั้นถึงได้..."
1007606-69 = "...ถึงได้มานั่งบ่นอยู่กับคุณครูแบบนี้ และได้ใช้เวลายามเย็นนั่งอยู่กับคุณครูแบบนี้..."
1007606-73 = "...ฮิฮิ ฮิฮิฮิๆๆ..."
1007606-74 = "รู้สึกว่า... การเปลี่ยนมุมมองเป็นคิดในแง่บวกอาจไม่ใช่เรื่องง่าย แต่พอทำได้มันก็ดีมากๆ เลยค่ะ"
1007606-75 = "[s7] \"...โคโทริ?\"\n[s8] \"สีหน้าดูดีขึ้นเยอะเลยนะ?\""
1007606-78 = "นั่นสินะคะ คำแนะนำจากคุณครูเนี่ยมีประโยชน์มากๆ เลยนะคะ ขอบคุณค่ะ"
1007606-79 = "...คะ?"
1007606-80 = "ว่าแต่ว่าจู่ๆ ที่สีหน้าดีขึ้นแบบนี้ มันไม่แปลกไปหน่อยงั้นเหรอคะ?"
1007606-81 = "...ฮิฮิ"
1007606-82 = "...คุณครู"
1007606-83 = "ถ้าฉันเป็นคนพูดเองแบบนี้ คุณครูอาจคิดว่ามันแปลกนิดหน่อยก็ได้"
1007606-84 = "แต่ฉันก็ตกใจมากนะคะ..."
1007606-85 = "ฉันรู้สึกว่าเรื่องบางเรื่องไม่ต้องอธิบายออกมาก็คงดีกว่าน่ะค่ะ"
1007606-86 = "[s9] \"...คะ...โคโทริ!? เมื่อกี้ว่ายังไงนะ!?\"\n[s10] \"เมื่อกี้ว่ายังไงนะ คุณโคโทริ!?\""
1007606-89 = "อืมมม ปฏิกิริยาตอบโต้เหมือนอย่างที่คิดเลย..."
1007606-90 = "แต่ยังไงก็ไม่ได้ค่ะ มีแค่เรื่องนี้เท่านั้น ที่ฉันจะไม่อธิบายให้คุณครูฟังหรอกค่ะ"
1007606-91 = "..."
1007606-92 = "แต่ว่า... ถึงมันจะแปลกไปหน่อย..."
1007606-93 = "แต่ฉันอยากขอ..."
1007606-95 = "...ให้คุณครูนั่งอยู่ข้างๆ จนกว่าพระอาทิตย์จะตกน่ะค่ะ"

1007606-4 = "#clearST"
1007606-5 = "3;코토리 응원단ND;05\n#3;em;…\n#3;a\n#wait;2500"
1007606-6 = "#na;(코토리는 말없이 벤치에 앉아, 텅 빈 운동장을 바라보고 있었다.)"
1007606-7 = "3;코토리 응원단ND;02;……어라. 선생님.\n#3;em;[반응]"
1007606-8 = "3;코토리 응원단ND;03;오셨군요, 찾아와 달라는 의미에서 드린 말씀은 아니었는데……."
1007606-9 = "[s1] \"괜찮아? 기운이 없어 보이네.\"\n[s2] \"어째 목소리에 힘이 없는 걸?\""
1007606-10 = "#wait;100"
1007606-11 = "#wait;100"
1007606-12 = "3;코토리 응원단ND;08;그, 그래 보이나요? 아하하……. 딱히 그런 티를 내려던 건 아니었지만…….\n#3;em;[땀]"
1007606-13 = "3;코토리 응원단ND;06;음……."
1007606-14 = "3;코토리 응원단ND;06;그러게요. 왜일까요? 제가 보기에도 약간 평소답지 않은 모습이네요."
1007606-15 = "3;코토리 응원단ND;04;그치만 뭔가 힘도 잘 안 나고……. 물론 체력적으로 지친 탓도 있겠지만서도…….\n#3;em;…"
1007606-16 = "3;코토리 응원단ND;06;여태 쭉 생각해 봤지만, 아직 정확하게는 잘 모르겠어요."
1007606-17 = "3;코토리 응원단ND;02;그냥 좀……. 아쉬운 걸지도?"
1007606-18 = "3;코토리 응원단ND;00;운동도 잘 못하는 주제에 꽤나 마음에 들었었나 봐요, 대운동회.\n#3;em;[재잘]"
1007606-19 = "3;코토리 응원단ND;03;왁자지껄하고 시끄러운 분위기가 취향이었으려나요? 하하……."
1007606-20 = "3;코토리 응원단ND;99;어쨌든 그래선지……. 막상 다 끝난다고 생각하니, 조금 기분이 가라앉는 느낌이네요."
1007606-21 = "3;코토리 응원단ND;02;……네?\n#3;em;[?]"
1007606-22 = "3;코토리 응원단ND;02;비슷한 기회나, 다음 대운동회도 얼마든지 있을 수 있을 거라고요?"
1007606-23 = "3;코토리 응원단ND;03;하하……. 그건 그렇죠.\n#3;em;[땀]"
1007606-24 = "3;코토리 응원단ND;99;……음……."
1007606-25 = "3;코토리 응원단ND;01;그렇긴 하지만, 저도 그렇게 생각해 보긴 했지만…….\n#3;em;…"
1007606-26 = "3;코토리 응원단ND;01;그래도 솔직히, 그 '다음'이 지금과 똑같지는 않으니까요. '비슷한 것'일뿐."
1007606-27 = "3;코토리 응원단ND;99;비슷한 것과 '이것'은 명백히 다른 것……."
1007606-28 = "3;코토리 응원단ND;02;결국 돌아오진 않는다는 말과 같은 말이죠……. 그저 생각이나 좋게 하자는 노력에 불과해요."

1007606-33 = "3;코토리 응원단ND;08;어, 어라. 응? 저, 저……. 방금 무슨 소릴……?"
1007606-34 = "3;코토리 응원단ND;11;……어!? 죄, 죄송해요. 선생님 말에 토를 달다니, 이런 적은 없었는데…….\n#3;em;[?!]\n#3;shake"

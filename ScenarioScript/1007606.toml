[translation]
1007606-1 = "What Shouldn't Be Explained"
1007606-2 = "After all the competitions were over, I found Kotori alone in the stadium."
1007606-6 = "She was sitting on a bench, staring over the now empty field."
1007606-7 = "...Oh, Sensei."
1007606-8 = "I didn't mean to make you come look for me."
1007606-9 = "[s1] \"You okay? You don't look like yourself.\"\n[s2] \"Why does your voice sound so defeated?\""
1007606-12 = "R-Really? Ha...Haha... Sorry, Sensei. I really am too easy to read."
1007606-13 = "Hmm..."
1007606-14 = "I'm trying to figure that out right now. Why I don't feel like myself."
1007606-15 = "Of course, I'm physically exhausted, but it's more than that..."
1007606-16 = "For once, I'm at a loss for words."
1007606-17 = "I guess I feel...disappointed?"
1007606-18 = "I enjoyed the field day more than I expected, despite my lack of athleticism."
1007606-19 = "Maybe it wasn't the exercise? The energy of the crowds and cheering was exciting too..."
1007606-20 = "But now everything's over. And I have this strange feeling, sitting in this empty field, looking out at the empty bleachers."
1007606-21 = "...Hm?"
1007606-22 = "There'll be more field days in the future?"
1007606-23 = "Haha... I guess you're right."
1007606-24 = "Hmm..."
1007606-25 = "I mean, you are correct. There will be more. And I tried to cheer myself up with that thought too."
1007606-26 = "But there won't be, not really. We'll never get to live this particular field day again."
1007606-27 = "The next one will be similar, but it won't be the same."
1007606-28 = "The great memories we made today can never be experienced exactly as-is ever again. That's an irrevocable fact."
1007606-32 = "...Ah."
1007606-33 = "O-Oh, dear. What am I rambling about now?"
1007606-34 = "I'm so sorry, Sensei. I didn't mean to disagree with what you said."
1007606-35 = "Maybe I'm still not feeling well. I should just go back and rest up."
1007606-36 = "[s3] \"Honesty is always the best policy.\"\n[s4] \"I'm not interested in just exchanging platitudes either.\""
1007606-39 = "...Sensei...?"
1007606-40 = "...What do you mean? I just need to change my perspective?"
1007606-41 = "...How?"
1007606-42 = "...Hm?"
1007606-43 = "...Maybe it's good that some experiences are once-in-a-lifetime?"
1007606-44 = "What does that mean...?"
1007606-45 = "[s5] \"These unique experiences are the most precious! Or something...\"\n[s6] \"That's what makes these memories all the more important!\""
1007606-48 = "Uh... Hmm..."
1007606-49 = "That sort of feels like the same thing as having a positive mindset, doesn't it?"
1007606-50 = "Huh?"
1007606-51 = "Oh..."
1007606-52 = "That's weird... huh..."
1007606-53 = "I do feel a little better, trying to change my perspective like that."
1007606-54 = "The facts are still the same, so why have my feelings lifted? What is this strange effect?"
1007606-55 = "If I try to approach the problem how you suggested..."
1007606-57 = "Each event is unique in its own way. It had its own set of athletes, problems, and events. It's okay if the next one is kind of the same, but not exactly."
1007606-58 = "Because everyone worked so hard to make this Kivotos Halo Festival the best it could possibly be. They weren't worrying about last year or the next!"
1007606-60 = "That was at the heart of this field day."
1007606-61 = "...Haha."
1007606-62 = "You know, Sensei, maybe at the end of the day..."
1007606-64 = "Even my feelings of emptiness...none of it would've been possible without that fact."
1007606-65 = "And I got to watch everyone I care about give it their all."
1007606-66 = "I went out of my comfort zone and learned so many new things!"
1007606-67 = "I got to experience things I normally wouldn't have..."
1007606-69 = "Things like, sitting and sharing my feelings with Sensei while we watch the sunset."
1007606-73 = "Heehee. Heeheehee..."
1007606-74 = "Shifting your perspective sure isn't easy, but it's a very effective medicine for negative feelings."
1007606-75 = "[s7] \"...Kotori?\"\n[s8] \"You seem to be feeling a lot better.\""
1007606-78 = "I know. I think your piece of advice was really helpful."
1007606-79 = "...Hm?"
1007606-80 = "I-It impresses you, how quickly I can pull myself back up again?"
1007606-81 = "...Heehee."
1007606-82 = "Sensei..."
1007606-83 = "This may sound a bit out of character for me, but..."
1007606-84 = "You may be surprised to find..."
1007606-85 = "...there are some things better left unexplained."
1007606-86 = "[s9] \"...K-Kotori?! What do you mean?!\"\n[s10] \"What was that, Ms. Kotori?!\""
1007606-89 = "Hm. That was a pretty valid response to my statement."
1007606-90 = "But still, I can't elaborate. I won't. Not for this."
1007606-91 = "..."
1007606-92 = "I know this isn't an acceptable compromise..."
1007606-93 = "But if you don't mind..."
1007606-95 = "Please just stay here with me while the sun sets."

[translation]
1007606-1 = "不必說明的事"
1007606-2 = "（在所有比賽全部結束之後，發現了獨自留在運動場內的亞都梨）"
1007606-6 = "（亞都梨默默坐在長凳上，望著空蕩蕩的運動場）"
1007606-7 = "……咦，老師？"
1007606-8 = "真不好意思，我不是為了要老師來找我才說那些的……"
1007606-9 = "[s1]「還好嗎？看起來有點無精打采的呢。」\n[s2]「聲音聽起來有點沒精神哦？」"
1007606-12 = "是，是嗎？啊哈哈……我不是故意這樣的……"
1007606-13 = "嗯……"
1007606-14 = "是啊，為什麼呢？#n我也覺得這樣不像是平時的自己。"
1007606-15 = "可是就是提不起勁……#n當然，也可能是因為累了的關係……"
1007606-16 = "雖然一直在思考原因……卻還是沒什麼頭緒。"
1007606-17 = "嗯……也許……是覺得寂寞吧？"
1007606-18 = "我好像還挺樂在其中的……雖然不是很擅長運動……"
1007606-19 = "還是說我其實喜歡鬧哄哄的氣氛嗎？#n啊哈哈……"
1007606-20 = "也許是因為這樣吧……#n一想到大運動會結束，就覺得情緒有點低落。"
1007606-21 = "……嗯？"
1007606-22 = "你說之後還會有其他活動，大運動會也還會舉辦？"
1007606-23 = "哈哈……是沒錯啦。"
1007606-24 = "……嗯……"
1007606-25 = "我也試著這麼想過……"
1007606-26 = "但老實說，「下次」和「這次」並不一樣，只是類似而已。"
1007606-27 = "兩者之間終究是截然不同的……"
1007606-28 = "「這次」已經一去不復返……#n認為還有下次的想法只不過是在努力「正面思考」罷了。"
1007606-32 = "……咦？"
1007606-33 = "啊，哎呀……我，我剛才說了什麼……？"
1007606-34 = "……呃！？對，對不起！#n我居然反駁老師說的話……"
1007606-35 = "現在的狀態好像不是很好……嗚嗚。#n我會趕快回去休息的……"
1007606-36 = "[s3]「沒關係，坦率地說出來也很好。」\n[s4]「我也不想總是說些冠冕堂皇的話。」"
1007606-39 = "……老師？"
1007606-40 = "如果不想反駁的話，可以試著稍微換個角度思考……？"
1007606-41 = "……該怎麼做呢？"
1007606-42 = "……咦？"
1007606-43 = "你說一去不復返反而更好……？"
1007606-44 = "那是什麼意思……"
1007606-45 = "[s5]「『因為獨一無二才顯得特別！』之類的？」\n[s6]「『正因如此才顯得珍貴！』類似這種感覺？」"
1007606-48 = "……唔……嗯……"
1007606-49 = "我不太懂老師的意思……#n這和剛才說的「正面思考」有什麼不一樣呢……？"
1007606-50 = "……嗯？"
1007606-51 = "咦咦……？"
1007606-52 = "……真不可思議，這是怎麼回事……？"
1007606-53 = "聽老師說完之後，感覺……心情好像稍微恢復了。"
1007606-54 = "本來以為只是換句話說而已……為什麼呢？#n有什麼不同的效果嗎？"
1007606-55 = "但是仔細想想……是啊，也許老師說的沒錯。"
1007606-57 = "……僅有一次的時光。#n就算和下次再怎麼類似也完全不同。"
1007606-58 = "既不是「上次」也不是「下次」，而是為了不讓「這次」留下遺憾──"
1007606-60 = "大家才會這麼拚命地面對大運動會吧。"
1007606-61 = "……哈哈。"
1007606-62 = "而且這麼一想……從某個角度來看……"
1007606-64 = "……或許現在這個狀況……也是因此才會產生……"
1007606-65 = "所以才能那麼努力。"
1007606-66 = "所以才能自我思考，讓自己多學到一種思考方式。"
1007606-67 = "所以才能……"
1007606-69 = "……得到和老師並肩欣賞晚霞的時光也說不定呢……"
1007606-73 = "呵呵，呵呵呵……"
1007606-74 = "突然覺得正面思考雖然不容易，可是效果意外的很棒呢……"
1007606-75 = "[s7]「……亞都梨？」\n[s8]「臉色好像變好了呢？」"
1007606-78 = "是啊。老師給的建議相當有效，謝謝老師。"
1007606-79 = "……咦？"
1007606-80 = "跟剛才的差別大到有點奇怪？"
1007606-81 = "……呵呵。"
1007606-82 = "……老師。"
1007606-83 = "我這麼說可能會讓老師有點驚訝，但……"
1007606-84 = "這世上……"
1007606-85 = "有些事情不說破……反而更好吧。"
1007606-86 = "[s9]「……亞，亞都梨！？你說什麼！？」\n[s10]「你剛才說什麼，亞都梨同學！？」"
1007606-89 = "唔嗯……果然是意料之中的反應……"
1007606-90 = "但還是不行。#n這件事我絕對不會說明的。"
1007606-91 = "…………"
1007606-92 = "說是作為代替，可能有點奇怪……"
1007606-93 = "不過請再稍微，像現在這樣……"
1007606-95 = "……就算只有太陽西沉的這段時間也好，請陪在我身邊吧。"

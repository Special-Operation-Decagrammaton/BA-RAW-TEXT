[translation]
10027080-1 = "Episode 8; Face-to-Face"
10027080-2 = "After a few twists and turns, we met up with Momiji."
10027080-7 = "Knowledge Liberation Front Library"
10027080-10 = "No! I can't do it! I'm not going! I'll do it another time!"
10027080-11 = "[s] \"Come on, now. You have to keep your word.\""
10027080-12 = "No. You misled me, Sensei! I need to do more emotional prep. I need to hype myself up for this. Otherwise..."
10027080-13 = "[s] \"There, there. Be a good, kind girl, Meru.\""
10027080-14 = "I told you, I'm not a good girl! I'm not going!"
10027080-19 = "[ns] \"Meru. You're being rude. Come with me.\""
10027080-24 = "Hey! Let me go! Where are you taking me?! Aaahhh! Sensei's kidnapping students!"
10027080-34 = "Red Winter Street"
10027080-36 = "..."
10027080-37 = "..."
10027080-38 = "[s] \"No one's said a word for a full five minutes.\""
10027080-39 = "Excuse me..."
10027080-44 = "I'm sorry, Momiji."
10027080-46 = "?!"
10027080-47 = "I was...too harsh before. I thought \"Luna\" was funny."
10027080-48 = "No, I'm the one who should be apologizing. I know better than anyone how hard you work."
10027080-49 = "I'm sorry. I was too hard on you."
10027080-50 = "You know...I could order you some more fried pancakes... "
10027080-51 = "I'm sorry about duplicating book orders you already put in. I just thought that, as a librarian, it was my responsibility..."
10027080-52 = "..."
10027080-53 = "..."
10027080-54 = "Momiji, I have to say something."
10027080-55 = "It's fine if you don't agree with what I'm about to say. And if you think I'm just talking crazy, that's okay too."
10027080-56 = "In fact, it might be easier for me if you think that."
10027080-57 = "Um... Okay..."
10027080-58 = "When I visited the \"Luna\" Fanfic Convention, I met a ton of \"Luna\" fans."
10027080-59 = "Everyone wanted to add their own flair to their work. They were doing all kinds of creative things."
10027080-60 = "Some people might think what I'm doing is stupid or ask why I even bother. What's the point of making your own version of an unfinished work?"
10027080-61 = "But others' opinions don't matter. What matters is that we love it."
10027080-62 = "Somewhere along the way, I forgot that."
10027080-63 = "..."
10027080-64 = "I had no idea..."
10027080-65 = "So many \"Luna\" fans are still actively engaged in the fanfic movement."
10027080-66 = "It was like meeting a thousand Momijis!"
10027080-67 = "That came out weird. It sounds like I only think art is worthy of attention if it has fans."
10027080-68 = "Every story is worthy of attention."
10027080-69 = "How could I have forgotten that?"
10027080-70 = "Me! A manga artist!"
10027080-71 = "Momiji, again, I apologize. I'm so sorry."
10027080-73 = "..."
10027080-74 = "Wow, Meru, you're giving me goosebumps. This is so unlike you."
10027080-75 = "Kyaa! After everything I said, from the bottom of my heart, that's how you respond?!"
10027080-77 = "The pair continued apologizing to each other for a while."
10027080-85 = "[ns1] \"Well, now that we've all made up...\"\n[ns2] \"What are you going to do about 'Luna'?\" "
10027080-88 = "Well..."
10027080-89 = "Yeah..."
10027080-90 = "\"Luna\" Volume 22 may not need to be finished."
10027080-91 = "Meru..."
10027080-92 = "[s] \"Right...\""
10027080-93 = "...But I'm going to draw it anyway, right through to the very end!"
10027080-94 = "Meru?"
10027080-95 = "At the end of the day, creative work should be its own reward, right?"
10027080-96 = "[s] \"Desire dri—\""
10027080-97 = "Yes. Desire drives creation, doesn't it?"
10027080-98 = "Exactly. And right now, that's just what I want to do—create."
10027080-99 = "I want to write a \"Luna\" Volume 22 that I can be proud of."
10027080-100 = "And I want to present it to my best friend. So, will you help me, Momiji?"
10027080-101 = "Well, it's a little unusual to ask someone to help you make their own gift..."
10027080-102 = "But for you...I'd be honored."
10027080-103 = "[s] \"I'll do everything in my power to help too!\""
10027080-105 = "Okay! Then let's get back to work!"
10027080-112 = "At that moment, the clouds parted, and the sun shined bright."
10027080-113 = "It was like the universe telling us we had taken our first step on the right path."
10027080-114 = "I prayed their relationship would grow stronger in the future."
10027080-119 = "What the heck are you thinking with this?! What's this going to do to Luna?!"
10027080-120 = "It's a twist! Don't worry. I put a lot of thought into it! We needed a climax, so the story can have a gripping conclusion!"
10027080-121 = "You do realize you only have a few pages left to get to that conclusion, right? Meru, you're making the same pacing mistakes all over again!"
10027080-122 = "Augh! Fine! I'll just have to write more pages! Fans always love more content anyway."
10027080-123 = "But what about the time?! Unless someone falls out of the sky and helps you, there's no way you have enough time for that. You just have to do what you can with the time and resources you have left!"
10027080-129 = "[ns] \"Why are we fighting again?!\""
10027080-131 = "Oh, sorry, Sensei. It's okay. It's all part of the job here at the Knowledge Liberation Front."
10027080-132 = "Don't worry about it. We're just...exchanging ideas to come up with the best solution."
10027080-133 = "[s] \"I'm not sure I believe that...\""
10027080-134 = "Whether you believe us or not doesn't really matter at this point. Wahahaha!"
10027080-135 = "Well, I'm glad you're finding humor in all of this."
10027080-136 = "But back to the topic at hand... I can't give up. I'm prepared to do anything if it means finishing the story the way I know it needs to be."
10027080-137 = "But that would put us at twice the length, which would mean we're only a third of the way done!"
10027080-139 = "I need a clone! Or a miracle!"
10027080-140 = "We don't have either!"
10027080-144 = "[ns] \"...\""
10027080-146 = "[ns] \"Are you two absolutely sure you can work together?\""
10027080-150 = "Red Winter Library"
10027080-153 = "Ah... It's been so long since I've been in the library."
10027080-154 = "I suppose it has, hasn't it?"
10027080-155 = "This is still the place I feel most at home. Hahaha... I'm practically melting into this chair."
10027080-156 = "What are you doing, Momiji? We don't have time to melt! From now on, we have to be laser-focused on the manuscript!"
10027080-157 = "Oh, let me indulge in just a little sentimentality, won't you? Sheesh! You're as short-tempered as ever..."
10027080-161 = "1 Day to Go"
10027080-164 = "Do you want me to put the material here?"
10027080-165 = "Yeah. Stack it up there. Heh... I've finished reviewing the entire plot of \"Luna\"."
10027080-166 = "You seem really agitated, Meru."
10027080-167 = "Well, this is a story with an incredibly rich history and dedicated fanbase. There's a lot that could go wrong."
10027080-168 = "Yeah, about that. I don't want to seem shallow, but—"
10027080-169 = "I'd hate to get lukewarm reviews like, \"Her inexperience showed, but she did her best!\""
10027080-170 = "Meru, I love that you're motivated, but please be mindful of your deadlines."
10027080-171 = "What was that...? I thought I heard whispering on a cold breeze..."
10027080-172 = "Don't ignore me! If your manuscript is late, I'm the one who pays for it when it's time to print! I'll have to beg to get bumped to the front of the line!"
10027080-173 = "Momiji, I've never once missed a deadline that I didn't intend to."
10027080-174 = "So you're giving me gray hairs on purpose?"
10027080-175 = "Momiji, I'm in the zone. Something bigger than me is involved now. It's like I'm channeling some ancient power. I'm the one holding the pen, but I'm not the one drawing. All I can do now is let it happen."
10027080-176 = "Oh no. That's not going to work. I refuse to let you blame your tardiness on 'the universe'."
10027080-200 = "D-Day"
10027080-204 = "..."
10027080-205 = "..."
10027080-209 = "[ns] \"...\""
10027080-210 = "It's..."
10027080-211 = "You did it..."
10027080-212 = "[s] \"You finished...\""
10027080-213 = "Is this real? Or is it some weird dream that's going to give me false hope?"
10027080-214 = "Oh, it's real. If it were a dream, I wouldn't be dying of exhaustion right now."
10027080-215 = "Well don't slow down yet! It's not over until it's over, and it's not over until we print this!"
10027080-216 = "I guess I'll have to go to the Publishing Department, but...I have a bad feeling about this."
10027080-218 = "Bad feeling or not, we have to print! I don't care if Kivotos crumbles into oblivion tomorrow. Nothing is going to keep me from printing this!"
10027080-220 = "Come on, Sensei! How much time do we have left?"
10027080-221 = "[s] \"About three hours... Let's hurry!\""
10027080-223 = "Yes!"

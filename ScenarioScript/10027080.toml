[translation]
10027080-1 = "ตอนที่ 8;เผชิญหน้า"
10027080-2 = "(หลังจากจบเรื่องความสับสนลงได้ คุณครูกับเมรุก็ออกไปหาโมมิจิในสถานที่ที่ได้นัดกันไว้...)"
10027080-7 = "ห้องสมุดชมรมแนวร่วมปลดปล่อยความรู้"
10027080-10 = "ฉันทำไม่ได้หรอก! ฉันจะเอาหน้าที่ไหนไปเจอโมมิจิ! ทำไม่ได้! ไม่ไป! เอาไว้วันหลังแล้วกัน"
10027080-11 = "[s] \"เดี๋ยวเถอะ ต้องรักษาสัญญาสิ\""
10027080-12 = "แบบนี้ไม่ต่างจากฉันโดนถามชี้นำจากครูเลยนะ! ฉันอยากเตรียมใจหน่อยสิ หรือไม่ก็อยากตัดสินใจ#nอะไรหน่อย! ถ้าไม่ได้ทำอย่างนั้นก่อนละก็...!"
10027080-13 = "[s] \"เอาละๆ เมรุเด็กดี\""
10027080-14 = "ฉันไม่ใช่เด็กดี! เพราะงั้นฉันไม่ไปหรอก!"
10027080-19 = "[ns] \"เอาละๆ เมรุเด็กดื้อ\""
10027080-24 = "เฮือกกก! ปล่อยนะ! จะพาฉันไปที่ไหนเนี่ย! ว้ากกกก! ครูลักพาตัวนักเรียนนน~!"
10027080-34 = "ถนนเรดวินเทอร์"
10027080-36 = "......"
10027080-37 = "......"
10027080-38 = "[s] \"ทั้งคู่ไม่พูดอะไรกันเลยเกิน 5 นาทีแล้วนะ\""
10027080-39 = "นี่..."
10027080-44 = "ขอโทษนะ โมมิจิ"
10027080-46 = "?!"
10027080-47 = "คือว่า... เรื่องวันนั้นน่ะ ฉันทำเกินไปหน่อย... <ลูน่า> เป็นการ์ตูนที่สนุกเลยละ"
10027080-48 = "มะ... ไม่ค่ะ ที่จริงฉันก็... รู้ดีกว่าใครว่ารุ่นพี่เมรุตั้งใจสร้างผลงานแค่ไหน..."
10027080-49 = "ขอโทษนะคะ ที่ฉันหลุดถามไปว่ารุ่นพี่เคยสร้างผลงานที่ดีเลิศมาแล้วรึไง ฉันก็พูดแรงเกินไปค่ะ..."
10027080-50 = "เอ่อ... เดี๋ยวฉันสั่งแพนเค้กทอดให้ใหม่นะ"
10027080-51 = "ขอโทษที่สั่งหนังสือซ้ำซ้อนด้วยค่ะ ฉันผิดเองที่ไม่ทำตามหน้าที่หลักของบรรณารักษ์แล้วเอาแต่สั่ง#nหนังสือใหม่..."
10027080-52 = "......"
10027080-53 = "......"
10027080-54 = "โมมิจิ สิ่งที่ฉันจะพูดต่อไปนี้ ฉันพูดของฉันเองคนเดียวนะ"
10027080-55 = "เธอจะไม่ฟังก็ได้ หรือว่าจะคิดว่าเป็นแค่การบ่นก็ไม่เป็นไร"
10027080-56 = "ไม่สิ ถ้าคิดแบบนั้นน่าจะทำให้ฉันสบายใจขึ้นด้วยซ้ำ"
10027080-57 = "อ่า ค่ะ..."
10027080-58 = "ก่อนหน้านี้ฉันไปงานของชมรมแฟนคลับ <ลูน่า>... แล้วก็ได้เห็นแฟนๆ <ลูน่า> มากหน้าหลายตาเลย"
10027080-59 = "ทุกคนต่างก็อยากสร้าง <ลูน่า> เล่มสุดท้ายที่ตัวเองชอบขึ้นมา ก็เลยรวมตัวกันทำกิจกรรมสร้างสรรค์#nผลงานที่หลากหลายกันอยู่"
10027080-60 = "แต่ถ้าใครมาเห็นคงคิดว่าเป็นเรื่องไร้สาระก็ได้ คงจะถามด้วยว่ามาทำแบบนี้กันทำไม และการมาเขียน#nเล่มจบของเรื่องที่ไม่มีตอนจบมันจะไปมีความหมายอะไร"
10027080-61 = "แต่ว่าที่สำคัญน่ะ มันอยู่ที่คนพวกนั้นชื่นชอบผลงานจนอยากสร้างสรรค์มันขึ้นมาอีกต่างหาก"
10027080-62 = "อื้ม ใช่แล้วละ นี่คือสิ่งที่ฉันมองข้ามไป"
10027080-63 = "......"
10027080-64 = "ฉันไม่รู้เลย"
10027080-65 = "ไม่รู้ว่า <ลูน่า> มีแฟนๆ อยู่มากขนาดนั้น และแฟนๆ ก็ยังทำอีเวนต์งานโดจินกันอยู่จนถึงตอนนี้"
10027080-66 = "ถ้าจะให้พูดอีกนัยหนึ่ง... ฉันไม่รู้เลยว่าจะมี 'โมมิจิ' อยู่มากขนาดนั้น"
10027080-67 = "ไม่สิ พูดแบบนี้ก็คงไม่ถูก เดี๋ยวกลายเป็นว่าผลงานที่ไม่มีแฟนๆ ก็ไม่จำเป็นต้องได้รับความเคารพน่ะสิ"
10027080-68 = "ในทุกๆ เรื่องราว... ต่างก็ควรค่าแก่การได้รับความเคารพ"
10027080-69 = "ทำไม... ฉันถึงลืมสิ่งนี้ไปนะ"
10027080-70 = "แล้วยิ่งเป็นนักวาดการ์ตูนอย่างฉันด้วย..."
10027080-71 = "โมมิจิ ฉันขอโทษเธออีกครั้งนะ"
10027080-73 = "......"
10027080-74 = "ว้าว ทำเอาขนลุกไปเลยละค่ะ ทำตัวไม่ถูกเลย เอารุ่นพี่เมรุคนเดิมของฉันกลับมานะคะ ปกติรุ่นพี่ไม่#nเป็นแบบนี้สักหน่อย"
10027080-75 = "เดี๋ยวเหอะ! คนเค้าอุตส่าห์ตั้งใจพูดนะ ทำไมทำท่าทีแบบนั้นกันเล่า!"
10027080-77 = "(และการขอโทษที่เคอะเขินของทั้งสองก็เป็นไปอย่างยากลำบาก)"
10027080-85 = "[ns1] \"ว่าแต่ ไหนๆ ตอนนี้ก็คืนดีกันแล้ว...\"\n[ns2] \"งั้นจะเอายังไงเรื่อง <ลูน่า> เหรอ?\""
10027080-88 = "เรื่องนั้น..."
10027080-89 = "นั่นสิคะ..."
10027080-90 = "...จะว่าไป ตอนนี้เราอาจจะไม่จำเป็นต้องทำให้ <ลูน่า> เล่ม 22 เสร็จสมบูรณ์แล้วก็ได้"
10027080-91 = "รุ่นพี่..."
10027080-92 = "[s] \"มันก็จริง...\""
10027080-93 = "แต่ฉันจะวาดต่อ จะวาดต่อให้จบบริบูรณ์ให้ได้"
10027080-94 = "รุ่นพี่?"
10027080-95 = "ก็การที่เราสร้างสรรค์ผลงาน... มันเป็นเพราะเรามีเหตุผลที่ยิ่งใหญ่ไม่ใช่เหรอ?"
10027080-96 = "[s] \"เพราะความปรารถนา...\""
10027080-97 = "เป็นแรงผลักดันในการสร้างสรรค์ผลงาน?"
10027080-98 = "ใช่ ฉันแค่อยากทำมันให้เสร็จก็เท่านั้นน่ะ"
10027080-99 = "<ลูน่า> เล่มสุดท้ายที่น่าภาคภูมิใจ"
10027080-100 = "เพื่อมอบเป็นของขวัญ... ให้เพื่อนที่ฉันสนิทที่สุด เพราะงั้น เธอจะช่วยฉันได้ไหม โมมิจิ?"
10027080-101 = "...ปกติแล้วจะขอให้คนที่เราจะเอาของขวัญให้มาช่วยงานเหรอคะ?"
10027080-102 = "ก็นะ ในเมื่อมันเป็นงานของรุ่นพี่ งั้นฉันช่วยแล้วกันค่ะ"
10027080-103 = "[s] \"ครูก็จะช่วยอย่างสุดความสามารถเลย\""
10027080-105 = "ดีละ! ถ้างั้นก็มาเริ่มกันเลย!"
10027080-112 = "(ในวันที่ท้องฟ้าแจ่มใส)"
10027080-113 = "(เป็นอีกวันที่คุณครูรู้สึกอีกครั้งว่าการเริ่มต้นเป็นครั้งแรกนั้นเป็นเรื่องที่ยากลำบาก)"
10027080-114 = "(แต่ก็ภาวนาให้ทั้งสองคนมีมิตรภาพที่แน่นแฟ้นมากขึ้น)"
10027080-119 = "คิดอะไรอยู่กันแน่คะ? ทำไมเรื่องมันถึงได้ดำเนินมาทางนี้ล่ะ! ถ้าเป็นแบบนี้ แล้วลูน่าคนนี้ก็ไร้ความ#nหมายน่ะสิคะ!"
10027080-120 = "ฉันทิ้งระเบิดแบบนั้นเพราะคิดมาดีแล้วต่างหากล่ะ! เดี๋ยวเรื่องต้องหักมุมอีกที เส้นเรื่องจะได้มาถึง#nตอนจบได้น่าตื่นเต้นไง!"
10027080-121 = "แต่ก็รู้ใช่ไหมคะว่าเหลืออีกไม่กี่หน้าก็จบแล้ว? รุ่นพี่เมรุกะปริมาณเนื้อหาไม่ดีอีกแล้วสินะคะ!"
10027080-122 = "อึก...! ก็ได้ ในเมื่อเป็นแบบนี้แล้วก็เพิ่มหน้าไปเลย! ในมุมมองของแฟนๆ แล้ว การที่เนื้อหาเยอะคงดี#nกว่าน้อยแหละน่า!"
10027080-123 = "แล้วเรื่องเวลาล่ะคะ เวลาเราเหลือน้อยลงเรื่อยๆ นะคะ! คิดว่าจะมีใครหล่นจากฟ้ามาช่วยปั่นต้นฉบับให้#nเสร็จงั้นเหรอ? เราต้องกระจายเวลาที่เหลือกับกำลังกาย สภาพจิตใจและทรัพยากรที่มีอยู่เพื่อหาจุดที่ดี#nที่สุดสิคะ!"
10027080-129 = "[ns] \"ทำไมถึงทะเลาะกันอีกแล้วล่ะ?!\""
10027080-131 = "อ่า ไม่เป็นไรๆ ไม่เป็นไรหรอกครู นี่เป็นเรื่องทั่วไปของ <ชมรมแนวร่วมปลดปล่อยความรู้> อยู่แล้ว"
10027080-132 = "จริงค่ะ เรียกว่าเป็นการโต้วาทีหรือการแลกเปลี่ยนความคิดเห็นเพื่อผลงานที่ดียิ่งกว่า ไม่ต้องกังวล#nมากหรอกนะคะ"
10027080-133 = "[s] \"ครูเชื่อได้ใช่ไหม...?\""
10027080-134 = "ถึงจะฟังดูไม่น่าเชื่อ แต่ตอนนี้ก็ไม่มีทางเลือกอื่นแล้วนี่นา วะฮะฮ่าฮ่า!"
10027080-135 = "เฮ้อ สถานการณ์แบบนี้ยังมาหัวเราะร่าได้อยู่อีกนะคะ..."
10027080-136 = "กลับเข้าประเด็นกันเถอะ เอาเป็นว่าฉันไม่ล้มเลิกพล็อตของฉันเด็ดขาด! ต่อให้ต้องนั่งวาดจนรากงอก#nก็จะทำให้เสร็จให้ได้!"
10027080-137 = "แต่รู้ใช่ไหมคะว่าถ้าเป็นแบบนั้น เนื้อหาก็จะมากกว่าตอนนี้สองเท่าเลย? เท่าที่ได้ยินมาคือตอนนี้ทำ#nเสร็จแค่ครึ่งเรื่องเท่านั้น แต่ถ้าจะเพิ่มเนื้อหาอีก ก็เท่ากับว่าตอนนี้เราเสร็จแค่ 1 ใน 3 เท่านั้นสิคะ!"
10027080-139 = "แยกร่าง! อยากแยกร่างได้จังเลย!"
10027080-140 = "ใครมันจะไปแยกร่างได้คะ!"
10027080-144 = "[ns] \"......\""
10027080-146 = "[ns] \"ครูเชื่อพวกเธอได้ใช่ไหมเนี่ย!?\""
10027080-150 = "ห้องสมุดเรดวินเทอร์"
10027080-153 = "รู้สึกเหมือน... ไม่ได้มาห้องสมุดนานเลยนะคะเนี่ย"
10027080-154 = "ก็นะ เอ่อ... ในบางมุมก็ถือว่านานอยู่"
10027080-155 = "ที่นี่ทำให้ฉันสบายใจที่สุดเลยค่ะ เฮ้อออ... รู้สึกสงบดีจัง"
10027080-156 = "อะไรของเธอน่ะ โมมิจิ! ไม่มีเวลาให้มาสงบอยู่หรอกนะ! จากนี้ไปพวกเราต้องปั่นต้นฉบับให้เสร็จ!"
10027080-157 = "...ขอฉันอินกับห้องสมุดสักหน่อยไม่ได้เหรอคะ นิสัยรีบร้อนนี่จริงๆ เลยนะคะ..."
10027080-161 = "D-1"
10027080-164 = "เอาข้อมูลวางไว้ตรงนี้เลยนะคะ?"
10027080-165 = "อืม เอาซ้อนกันไว้แถวๆ นั้นแหละ ฮุฮุฮุฮุ... ฉันวิเคราะห์พล็อตของ <ลูน่า> เล่มก่อนๆ ไว้ล่วงหน้าหมด#nแล้วน่ะ"
10027080-166 = "ดูพลังกายพลังใจมาเต็มมาก รู้สึกไม่เหมือนรุ่นพี่เมรุคนเดิมเลยนะคะ?"
10027080-167 = "ถ้าเป็นงานประเภทที่มีฐานแฟนคลับเยอะและมั่นคงแบบนี้ละก็ ถ้าทำอะไรผิดพลาดไป ส่วนมากถอนเงินทุนกันไม่ได้เลยนะ"
10027080-168 = "พูดปกป้องตัวเองเพราะไม่อยากให้คนอื่นดูถูกสินะคะ"
10027080-169 = "แน่นอน ฉันไม่อยากได้คำวิจารณ์กำกวมๆ ว่า 'ถึงจะเป็นผลงานที่ทำครั้งแรก แต่ก็ถือว่าตั้งใจทำออก#nมานะ' หรอก!"
10027080-170 = "การมีความตั้งใจอย่างแรงกล้ามันก็ดีอยู่หรอกค่ะ แต่ก็รักษาเดดไลน์ด้วยนะคะ"
10027080-171 = "ฮึ่ยยย... โมมิจิเป็นผีเดดไลน์สินะ..."
10027080-172 = "ใครเป็นผีกันคะ! ถ้ารุ่นพี่ส่งต้นฉบับล่าช้า คนที่ต้องลำบากในตอนตีพิมพ์คือฉันต่างหากล่ะ!"
10027080-173 = "ขอฉันพูดอะไรหน่อยเถอะ ที่ผ่านมาฉันไม่เคยล่าช้าเพราะอยากส่งงานช้าหรอกนะ!"
10027080-174 = "แล้วถ้างั้นใครเป็นคนทำงานงานช้าล่ะคะ?"
10027080-175 = "เธอรู้ไว้นะ โมมิจิ... คนที่วาดต้นฉบับคือฉัน แต่ที่จริงไม่ใช่ฉันหรอกนะ เป็นฉันที่ไม่ใช่ฉัน... ถ้าจะให้#nเปรียบเทียบ ก็เหมือนกับท้องฟ้าว่างเปล่าเป็นคนวาด... สิ่งที่ฉันทำได้คือก็แค่การเฝ้าสังเกตต้นฉบับที่#nกำลังถูกรังสรรค์ขึ้นมาเท่านั้น..."
10027080-176 = "อย่ามาเที่ยวโยนความรับผิดชอบให้กายละเอียดสิคะ ทำแบบนั้นไปก็ไม่ช่วยหรอกค่ะ"
10027080-200 = "D-0"
10027080-204 = "......"
10027080-205 = "......"
10027080-209 = "[ns] \"......\""
10027080-210 = "ฉันทำ..."
10027080-211 = "เสร็จแล้วสินะคะ..."
10027080-212 = "[s] \"เสร็จจริงด้วย...\""
10027080-213 = "นี่เรื่องจริงใช่มั้ย? ไม่ใช่ฝันร้ายที่เข้ามาให้ความหวังแล้วก็จะทำให้เราตื่นใช่มั้ย?"
10027080-214 = "เราไม่ได้หลับได้นอนจนปวดตัวกันเลยนี่คะ... ถ้ายังรู้สึกปวดตัวแบบนี้ ก็ถือว่าอยู่ในความเป็นจริงค่ะ..."
10027080-215 = "ยังไม่เสร็จหรอก! ถ้ายังไม่ได้เล่มสมบูรณ์ก็ถือว่ายังไม่เสร็จ! ต้องเอาไปพิมพ์!"
10027080-216 = "ถ้างั้นก็ต้องไปที่ชมรมสื่อสิ่งพิมพ์สินะคะ อ่า... รู้สึกลางสังหรณ์ไม่ดียังไงไม่รู้..."

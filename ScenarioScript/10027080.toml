10027080-131 = "1;모미지;05\n5;메루;02;아, 괜찮아. 괜찮아. 선생. <지식해방전선>에서 이 정도는 일상이니까.\n#1;a\n#5;a\n#5;em;[반응]"
10027080-132 = "1;모미지;03;그건 그래요. 더 나은 결과물을 만들어 내기 위한 토론이라고 할까, 의견 교환이라고 할까. 그런 거니까요. 너무 걱정하지 마세요.\n#1;greeting\n#1;em;[반짝]"
10027080-133 = "[s] \"그 말 믿어도 되는 걸까…….\""
10027080-134 = "5;메루;03;뭐, 안 믿겨도 이제 와서 달리 방법도 없잖아? 와하하하!\n#5;hophop\n#5;em;[재잘]"
10027080-135 = "1;모미지;04;아니, 이 상황에서 그렇게 시원하게 웃어도 말이죠……."
10027080-136 = "5;메루;05;다시 논점으로 돌아와서……. 아무튼 나 이 전개 포기 못 해! 차라리 몸을 갈아 넣어서 완성하고 말지!\n#5;em;[!]"
10027080-137 = "1;모미지;05;그랬다가는 분량이 지금까지의 두 배도 넘어간다는 거 알고 있죠? 들은 대로라면 이제 절반 정도 진행한 셈이라는데, 이렇게 되면 절반이 아니라 3분의 1도 진행이 안 된 거잖아요!\n#1;em;[빠직]"

10027080-167 = "#na;메루;이렇게 팬층이 오래되고 두터운 장르는, 잘못 접근했다간 본전도 못 찾게 되는 경우가 많으니까 말이야."
10027080-168 = "#na;모미지;얕보이기 싫다는 거네요."
10027080-169 = "#na;메루;당연하지. '처음이지만 열심히 했다'는 식의 뜨뜻미지근한 평가는, 이쪽에서 사양이라고!"
10027080-170 = "#na;모미지;의욕이 넘치는 건 좋지만요. 마감에는 늘 주의해 줘요."

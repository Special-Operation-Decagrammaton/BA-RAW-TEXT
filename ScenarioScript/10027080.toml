10027080-119 = "3;모미지;05;도대체 무슨 생각이에요, 여기에서 이런 전개라니! 이러면 이쪽 루나가 뭐가 되는데요!\n#3;a\n#3;closeup"
10027080-120 = "3;메루;05;다 생각이 있어서 던진 폭탄이라고! 여기서 한번 전개를 꺾어 줘야 엔딩까지 일직선으로 달려 나갈 힘이 생긴단 말이야!\n#3;em;[빠직]\n#3;closeup"
10027080-121 = "3;모미지;02;그 엔딩까지 이제 몇 페이지 안 남은 거 알고 있죠? 메루 선배, 또 분량 조절 실패했군요?!\n#3;closeup\n#3;em;[?]"
10027080-122 = "3;메루;04;크윽……! 좋아. 이렇게 된 이상 페이지 증쇄로 간다! 팬의 입장에선 페이지가 적은 것보다 많은 게 더 좋을 테니까!\n#3;em;[!]\n#3;closeup"
10027080-123 = "3;모미지;05;항상 이야기하지만 시간은 어쩌려구요, 시간은! 원고는 뭐 누가 하늘에서 뚝 떨어져서 도와준대요? 남은 시간과 사용 가능한 리소스와 체력과 정신력을 분배해서 최적점을 찾아야죠!\n#3;closeup\n#3;hophop\n#3;em;[스팀]"

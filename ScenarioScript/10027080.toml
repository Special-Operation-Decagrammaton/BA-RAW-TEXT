[translation]
10027080-1 = "第8話;見面"
10027080-2 = "（在歷經了無數曲折後，即將出發前往與紅葉約好的地點見面時……）"
10027080-7 = "知識解放戰線．圖書館"
10027080-10 = "我果然還是辦不到！事到如今要我拿什麼臉去見紅葉！#n不行！我不去！下次再說！"
10027080-11 = "[s]「不可以哦，既然答應了就應該遵守約定才對。」"
10027080-12 = "可是我之所以會答應，還不是因為老師被老師誘導了的關係！#n我還需要多一點時間做好覺悟跟心理準備，否則就無法……！"
10027080-13 = "[s]「好好好，老師知道愛瑠最乖了。」"
10027080-14 = "我一點也不乖！所以我是絕對不會去的！"
10027080-19 = "[ns]「好好好，老師知道愛瑠最壞了。」"
10027080-24 = "嗚啊啊啊啊！放開我！你要帶我去哪裡！#n哇啊啊啊！有老師綁架學生～！"
10027080-34 = "赤冬聯邦學園．街道"
10027080-36 = "……"
10027080-37 = "……"
10027080-38 = "[s]「兩位，我們已經沉默五分鐘了。」"
10027080-39 = "那個……"
10027080-44 = "對不起，紅葉。"
10027080-46 = "！？"
10027080-47 = "就是……我當時說得太過分了。#n《LUNA》真的很好看。"
10027080-48 = "啊……該道歉的是我才對……#n愛瑠前輩對創作是多麼認真，我明明比任何人都清楚……"
10027080-49 = "竟然還質疑前輩創作了什麼偉大的作品……我說得太過分了……對不起。"
10027080-50 = "那個……我會再幫你買一份炸鬆餅的。"
10027080-51 = "重複申請的事是我不對。#n身為一名圖書館員，我應該要申請購買館內沒有的書才對……"
10027080-52 = "…………"
10027080-53 = "……"
10027080-54 = "紅葉……我接下來說的話，全都是在自言自語。"
10027080-55 = "你可以假裝沒聽到，也可以當我是在發牢騷。"
10027080-56 = "不，應該說如果你願意這樣想的話，我心裡反而會更好受一點。"
10027080-57 = "啊，是……"
10027080-58 = "不久之前，我在《LUNA》的同人會場見到了許多……《LUNA》的粉絲。"
10027080-59 = "為了親手替自己喜歡的作品畫出結局，每個人都用各自不同的方式創作著。"
10027080-60 = "或許在某些人眼中，這樣的行為簡直可笑至極也說不定。#n也可能有人會問「為什麼要做這種事」、#n「就算親手為一部未完結的作品畫出結局又有什麼意義」之類的問題。"
10027080-61 = "但其實那些都不重要。#n因為粉絲們只是因為喜愛那部作品，才會這麼做的。"
10027080-62 = "嗯，沒錯。#n我所忘記的，就是這個道理。"
10027080-63 = "……"
10027080-64 = "我之前都不知道……"
10027080-65 = "原來《LUNA》有那麼多粉絲，#n而且竟然時至今日都還在舉辦同人活動。"
10027080-66 = "如果換個說法的話……我都不知道世界上竟然有這麼多個「紅葉」。"
10027080-67 = "不對，這樣講也有點奇怪。#n好像沒有粉絲的作品就不值得被尊重一樣……"
10027080-68 = "所有的作品……都應該受到同樣的尊重。"
10027080-69 = "為什麼我……會忘了這件事呢。"
10027080-70 = "明明我自己就是畫漫畫的人……"
10027080-71 = "紅葉，我要再次跟你道歉，對不起。"
10027080-73 = "……"
10027080-74 = "哇，我全身都起雞皮疙瘩了，好肉麻喔。#n愛瑠前輩，你是怎麼了啊？平常明明不是這個樣子的。"
10027080-75 = "啊啊啊！你知道我做了多少心理準備才好不容易說出來的嗎？居然這樣取笑我！"
10027080-77 = "（兩人心中笨拙的歉意，總算是傳達給了彼此）"
10027080-85 = "[ns1]「話說，既然你們現在已經和好了……」\n[ns2]「那《LUNA》的事要怎麼辦？」"
10027080-88 = "這……"
10027080-89 = "說的也是……"
10027080-90 = "……事到如今，好像也沒必要特地完成《LUNA》的第二十二卷了吧。"
10027080-91 = "前輩……"
10027080-92 = "[s]「這麼說也沒錯……」"
10027080-93 = "……不過，我還是想要把它畫完。"
10027080-94 = "前輩？"
10027080-95 = "畢竟人之所以想要創作……本來就不是因為什麼特別的原因不是嗎？"
10027080-96 = "[s]「因為慾望……」"
10027080-97 = "就是創作的動力？"
10027080-98 = "沒錯，我只是想畫出來而已。"
10027080-99 = "畫出任何人看了都會驚豔的《LUNA》最終卷。"
10027080-100 = "然後把它……送給我最要好的朋友當禮物。#n所以紅葉，你願意幫我嗎？"
10027080-101 = "……照理來說，一般人應該不會向送禮的對象求助吧？"
10027080-102 = "不過，既然是前輩的忙，我當然會幫囉。"
10027080-103 = "[s]「我也會盡力幫忙的。」"
10027080-105 = "好！那我們繼續開工吧！"
10027080-112 = "（當時的天空相當晴朗）"
10027080-113 = "（就在再次體悟「萬事起頭難」的道理……）"
10027080-114 = "（希望兩人之間的友誼能夠變得越來越堅定的時候……）"
10027080-119 = "你到底在想什麼，為什麼突然在這裡安排這種轉折啊！#n這樣叫這個露娜情何以堪！"
10027080-120 = "我會拋出這顆震撼彈自然有我的理由！#n不在這裡安排轉折的話，主角怎麼會有力量一路奔向結局！"
10027080-121 = "那你應該知道離結局已經沒剩幾頁了吧？#n愛瑠前輩，你是不是又沒算好頁數了！？"
10027080-122 = "唔……！好，既然如此就加印幾頁吧！#n反正對粉絲來說，頁數多總比頁數少來得好！"
10027080-123 = "我不是說過很多次了嗎，那時間怎麼辦啊，時間！原稿可不會突然從天而降哦！？#n必須好好分配剩餘時間、可用素材、體力和專注力，找出最佳方案才對！"
10027080-129 = "[ns]「怎麼又開始吵架了！？」"
10027080-131 = "啊，沒事的，老師不用擔心。#n這種情況對我們「知識解放戰線」來說只是家常便飯而已。"
10027080-132 = "沒錯，為了創造出更棒的作品，我們經常會像這樣互相討論、交流意見。#n所以請老師不必擔心。"
10027080-133 = "[s]「我可以相信你們說的話嗎……」"
10027080-134 = "這個嘛，就算不相信也沒有其他方法了吧？哇哈哈哈！"
10027080-135 = "等一下，這種情況下就算笑得那麼開心也……"
10027080-136 = "言歸正傳……總之我是絕對不會放棄這段劇情的！#n就算拚上我的命也要完成！"
10027080-137 = "你應該知道這樣一來頁數會變成兩倍以上吧？我之前聽說已經完成一半了，#n要是再增加頁數的話，進度不就變成只完成了三分之一而已嗎！"
10027080-139 = "分身術，我需要分身術！"
10027080-140 = "才沒有那種東西！"
10027080-144 = "[ns]「……」"
10027080-146 = "[ns]「我真的可以相信你們吧！？」"
10027080-150 = "赤冬聯邦學園．圖書館"
10027080-153 = "感覺……好像很久沒有回來圖書館了。"
10027080-154 = "確實，某種意義上是挺久沒回來了不是嗎？"
10027080-155 = "果然還是這裡最讓人放鬆。#n啊哈哈哈……感覺快融化了。"
10027080-156 = "你在做什麼，紅葉！#n現在沒時間讓你融化了！我們要一路畫到結局！"
10027080-157 = "……稍微感性一下有什麼關係。#n前輩真是急性子……"
10027080-161 = "D-1"
10027080-164 = "資料放在這裡可以嗎？"
10027080-165 = "嗯，都放在那邊吧。#n呵呵呵呵……我已經把《LUNA》原作的劇情脈絡仔細分析過了。"
10027080-166 = "愛瑠前輩，你今天好像比平常更有精神呢？"
10027080-167 = "像這種粉絲多資歷又久的作品，要是沒有做足準備的話，很容易得不償失的。"
10027080-168 = "是不想被書迷們小看對吧？"
10027080-169 = "那當然。#n我可不想收到「以第一次來說已經算不錯了」這種不上不下的評價！"
10027080-170 = "雖然有企圖心是好事，請你也注意一下截稿期限哦，前輩。"
10027080-171 = "嗚哇……紅葉根本就是截稿索命鬼……"
10027080-172 = "你說誰是鬼啊！#n要是前輩沒有及時完成原稿的話，最後要趕著印刷的人可是我哦！？"
10027080-173 = "這點我一定要跟你說清楚才行。#n我從來就沒有故意拖稿過！"
10027080-174 = "不然是誰逼你的嗎？"
10027080-175 = "聽好囉，紅葉……其實畫出那些原稿的人既是我也不是我。#n是雖然是我卻又不是我的某種……要舉個例子的話，可能都是虛空畫出來的……#n我所能做的就只有觀察並見證那些被畫出來的原稿而已……"
10027080-176 = "請不要老是把責任都推給你的潛意識，這樣是行不通的好嗎？"
10027080-200 = "D-0"
10027080-204 = "……"
10027080-205 = "……"
10027080-209 = "[ns]「……」"
10027080-210 = "這樣就……！"
10027080-211 = "完成了呢……"
10027080-212 = "[s]「居然真的能趕上……」"
10027080-213 = "這真的是現實對吧？#n不是剛給人希望就結束的那種討厭的惡夢吧？"
10027080-214 = "會覺得痛苦是因為沒睡覺吧……？#n既然覺得痛苦，那肯定是現實沒錯……"
10027080-215 = "還沒完！現在還沒有結束！#n我們還得把這個拿去印刷才行！"
10027080-216 = "那我們得跑一趟出版部對吧？#n嗚嗚，好像突然有股不祥的預感……"
10027080-218 = "無論在前方等待我們的是不幸還是毀滅，我們都得完成印刷才行！#n就算奇普托斯明天就要滅亡，我也會印一本出來給你看的！"
10027080-220 = "老，老師！剩下的時間……還有多久呢？"
10027080-221 = "[s]「大概三個小時左右……大家動作快！」"
10027080-223 = "是，是！"

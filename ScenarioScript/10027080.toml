10027080-47 = "5;메루;07;저…… 그때는 말이 너무 심했어. <루나>, 재밌더라.\n#5;em;…"
10027080-48 = "1;모미지;04;아, 아뇨. 저도……. 저야말로……. 메루 선배가 작품에 열심인 건, 누구보다 제가 잘 아는데…….\n#1;stiff"
10027080-49 = "1;모미지;06;죄송해요. 선배에게, 얼마나 대단한 작품을 만들었느냐고 말한 건, 제가 너무 심했어요…….\n#1;em;[훌쩍]"
10027080-50 = "5;메루;99;그……. 팬케이크 튀김, 다시 주문해 둘게. "
10027080-51 = "1;모미지;07;중복 발주 죄송해요. 역시 사서의 본분을 지켜서 새 도서 위주로 신청하지 않으면…….\n#1;greeting"
10027080-52 = "5;메루;01;…………\n#5;em;…"
10027080-53 = "1;모미지;03;………\n#1;em;…"
10027080-54 = "5;메루;02;모미지. 지금부터 하는 말은, 내 혼잣말이야."
10027080-55 = "5;메루;01;안 들어도 상관없고, 그냥 넋두리라고 생각해도 상관없어."
10027080-56 = "5;메루;99;아니, 오히려 그렇게 생각해 주는 편이, 나에게는 마음 편할 것 같고.\n#5;stiff"
10027080-57 = "1;모미지;02;앗, 네…….\n#1;em;[!]"
10027080-58 = "5;메루;02;전에 <루나>의 동인회장을 방문하면서, 수많은…… <루나>의 팬들을 봤어.\n#5;m3\n#1;dl\n#5;em;[반응]"
10027080-59 = "5;메루;01;모두가 각자 좋아하는 작품의 마지막을 자기 손으로 만들고 싶어서. 다양한 창작활동을 하고 있었지."
10027080-60 = "5;메루;99;그거, 누군가 보면 바보 같다고 말할지도 몰라. 그런 걸 왜 하느냐고. 완결도 안 난 작품의 완결을 자기 손으로 만드는 게, 무슨 의미가 있냐고.\n#5;em;…"
10027080-61 = "5;메루;05;하지만 중요한 건, 그걸 좋아하기 때문에 그걸 만든다는 거야."
10027080-62 = "5;메루;99;응. 맞아. 내가 잊고 있었던 건, 그거였어.\n#5;greeting"
10027080-63 = "5;메루;99;……."
10027080-64 = "5;메루;01;모르고, 있었어."
10027080-65 = "5;메루;02;그렇게 많은 <루나>의 팬들이 있었고, 그 팬들이 아직까지 동인 활동을 하고 있었다는 걸."
10027080-66 = "5;메루;03;다른 식으로 말하자면…… 그렇게 많은 '모미지' 들이 있었다는 걸.\n#5;em;[재잘]"
10027080-67 = "5;메루;99;아니, 이것도 이상한 말이야. 그러면 마치 팬이 없는 작품은 존중받을 필요가 없다는 말처럼 들리잖아?"
10027080-68 = "5;메루;99;모든 이야기에는…… 존중받을 가치가 있는 건데.\n#5;em;…"
10027080-69 = "5;메루;01;왜…… 잊고 있었을까."
10027080-70 = "5;메루;06;다른 누구도 아닌, 만화를 그린다는 내가……."
10027080-71 = "5;메루;06;모미지, 다시 사과할게. 미안했어.\n#5;greeting"

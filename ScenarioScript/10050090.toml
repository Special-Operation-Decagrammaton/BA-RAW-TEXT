[translation]
10050090-1 = "第9話;大河戀"
10050090-2 = "……那麼潔莉諾會長，這就是我方針對三一與赤冬間的文化交流所提出的協定。"
10050090-3 = "本協定由夏萊的老師擔保，並以圖書委員會負責批准的形式實施。#n我們茶會對於此一決定沒有異議。"
10050090-4 = "然而，我方希望日後能夠避免像這次一樣──#n在未經協議的狀態下，私自流通包含書籍在內的文化媒體。"
10050090-5 = "沒有問題吧？#n誠如八雲同學所說，文化是必須不斷流動的東西。"
10050090-6 = "唔，唔嗯……"
10050090-7 = "真麻煩……這明明是出版部那些傢伙擅自搞出來的事情。"
10050090-8 = "等一下，你剛才說同志在那邊對吧？#n很好，既然如此……！"
10050090-9 = "知道了。那麼僅限於此案，夏萊的意見即代表赤冬的意見。"
10050090-10 = "[s]「嗯？我嗎？」"
10050090-11 = "嗯？意思是……要將其委託給夏萊的老師？"
10050090-12 = "沒錯。同樣僅限於此案，夏萊即是赤冬的代理人。#n赤冬的所有權限都將由夏萊代為執行。"
10050090-13 = "因為咱必須立刻執行一項絕對無法逃避的行程！"
10050090-14 = "絕，絕對無法逃避的行程……？"
10050090-16 = "那就是……睡午覺！"
10050090-17 = "午覺……是嗎？那是某種隱喻嗎！？"
10050090-18 = "[s]（我想應該不是……）"
10050090-19 = "而，而且還指定夏萊擔任這份文化協定的代理人……？"
10050090-23 = "（是因為那個嗎！？萬一協定出了什麼問題，#n　身為赤冬代理人的夏萊就必須承擔部分責任……）"
10050090-24 = "（同理，認可協定的三一也勢必會被追究責任……！）"
10050090-25 = "（如此一來就可能會導致夏萊，也就是老師他……#n　無論在實務還是情感方面，對三一產生反感……）"
10050090-26 = "（從結果上來說，這是在警告我們三一要謹慎行事）"
10050090-27 = "（然而與此同時，赤冬卻撇清了所有責任……？這就是赤冬的外交手腕嗎！？）"
10050090-28 = "潔，潔莉諾會長！請等一下！"
10050090-33 = "[ns]「怎麼了，渚？你的臉色看起來不太好哦……？」"
10050090-34 = "沒，沒什麼，老師！#n我們只要做好該做的事就行了對吧！嗯！"
10050090-35 = "這樣事情都結束了嗎，渚醬？好無聊哦～！"
10050090-36 = "彌香。現在老師也在這裡，說話麻煩看一下場合。"
10050090-37 = "對，對哦。對不起，老師……"
10050090-38 = "嗯？我這樣也沒關係……？#n謝謝老師！最喜歡你了！"
10050090-39 = "再次向茶會的各位問好。同時也感謝各位寬宏大量的處分。"
10050090-40 = "你們好，出版部的各位。#n很高興能像能這樣正式與各位見面。"
10050090-41 = "我們三一也期盼能以這次事件為契機，在未來與赤冬建立更良好的關係。"
10050090-42 = "如果日後有什麼好書的話，再麻煩各位多多推薦給三一的同學們囉？"
10050090-43 = "是，我們一定會盡力而為。#n能夠獲得這樣的機會，我們實在深感榮幸。"
10050090-45 = "那個那個，你是八雲醬對吧？#n很高興認識你！我是茶會的彌香！"
10050090-46 = "如果不介意的話……能跟你單獨聊一下嗎？"
10050090-47 = "您，您好。我是荒槇八雲。"
10050090-48 = "（這個人就是茶會的三巨頭之一……）"
10050090-49 = "（也就是說，我現在等同於是在面對潔莉諾會長吧）"
10050090-50 = "（如果真的是潔莉諾會長的話，我至少有100種方法可以應對，可是現在……）"
10050090-51 = "這次八雲醬帶來的書，我已經看過了唷！真的很謝謝你！"
10050090-52 = "啊，嗯。"
10050090-53 = "不過，那個……當然這只是我個人的想法而已……"
10050090-54 = "那個主角在我看來……怎麼說呢，好像跟老師有點像？#n所以……我特別喜歡他。"
10050090-55 = "然後……這是我個人的請求？#n或者應該說是願望之類的？總之……"
10050090-56 = "我在想，如果稍微改變一下搭檔的角色設定或設計的話，故事搞不好會變得更精彩！"
10050090-57 = "……"
10050090-58 = "哦哦……原來如此啊。呣呵呵呵呵。"
10050090-59 = "非常感謝您寶貴的意見，彌香大人。"
10050090-60 = "如果能說明得更加具體，對我們來說將會很有幫助……請問您希望怎麼修改呢？"
10050090-61 = "嗯嗯！比如說……把髮色稍微調得偏粉紅色系一點？髮型帶一點捲度可能會更可愛？"
10050090-62 = "雖然有點冒失又愛開玩笑，但該努力的時候還是會努力的那種孩子是不是不錯？"
10050090-63 = "平常總是能炒熱氣氛，頭髮通常綁在一邊，或者不綁也行……"
10050090-64 = "最喜歡的東西是特大百匯！接下來是BB霜和Samuela的「The Beyond」香水！"
10050090-65 = "啊，不過蛋糕卷就不用了。#n那個已經吃得夠多了……"
10050090-66 = "總之總之！你覺得改成那樣如何呢？"
10050090-67 = "嗯嗯，我完全明白彌香大人的意思。"
10050090-68 = "不過如果要將剛才那些需求全數實現，幾乎得從頭開始寫一本新書了呢？"
10050090-69 = "這，這樣啊……？"
10050090-70 = "而且更進一步說，那或許會成為一本專屬於彌香大人的書。"
10050090-71 = "咦？專，專屬於我的書……？ "
10050090-72 = "嗯！那樣我超喜歡的！"
10050090-73 = "沒錯沒錯，我也認為那樣應該更符合彌香大人的品味。#n不過……這樣可能會碰到一個問題。"
10050090-74 = "什，什麼問題？"
10050090-75 = "出版這個行業呢，基本上非常仰賴所謂的規模經濟。"
10050090-76 = "專為少數人製作的作品，單價往往就會高上許多。"
10050090-77 = "尤其像這樣只為一個人量身打造的作品──#n因為稀有性的關係，在制定價格方面會有點困難。"
10050090-78 = "說得更直白一點的話，就是會相當昂貴的意思。"
10050090-79 = "嗯……？大概要多少錢？ "
10050090-83 = "……這個數字夠嗎？"
10050090-84 = "！？！？"
10050090-85 = "啊，不是，那個金額的一半就綽綽有餘了說……？"
10050090-86 = "什麼嘛～聽你說很貴還緊張了一下，結果也還好嘛～#n那麼──"
10050090-87 = "彌香同學？"
10050090-92 = "怎，怎麼了嗎，渚醬？"
10050090-93 = "非要我把每句話攤開來說，你才會明白嗎？"
10050090-94 = "嗚，嗚嗚……知道了啦。#n哼～渚醬這個討厭鬼～！"
10050090-96 = "真是辛苦了。出版部的各位。"
10050090-97 = "別這麼說……#n造成圖書委員會和實現正義部的大家這麼多麻煩，我們應該感到抱歉才對。"
10050090-99 = "那倒也不盡然。#n多虧了出版部的各位，我們實現正義部的成員前往圖書館的比例提高了很多。"
10050090-100 = "各位帶來的書，似乎讓大家對「書」本身產生了興趣。"
10050090-101 = "就連我也開始對正義以外的領域感到好奇了。"
10050090-102 = "那真是太好了。不過還請記得要準時歸還哦？"
10050090-103 = "我，我會謹記在心的……#n話說回來，貴音同學。"
10050090-104 = "是，請問有什麼事嗎？"
10050090-105 = "這次的故事……還沒完結對吧？"
10050090-106 = "那個……是這樣沒錯？"
10050090-107 = "等下一集出來之後，可以麻煩你通知我一聲嗎……"
10050090-108 = "呵呵。看來你很喜歡呢？"
10050090-109 = "是的，我相當喜歡。"
10050090-110 = "我明白了。#n喜愛故事的人，我們隨時都很歡迎。"
10050090-111 = "除此之外……雖然我不太理解，不過有許多三一的學生都提出了建議……"
10050090-112 = "說是希望有朝一日，務必要出版赤冬公主殿下的評論集……"
10050090-113 = "……"
10050090-114 = "我們會……積極地，討論，看看的……"
10050090-115 = "謝謝你，貴音同學。#n往後也請你多多指教了。"
10050090-121 = "部～長～！！！"
10050090-122 = "哎呀，怎麼了嗎，貴音？"
10050090-123 = "你早就聽到了吧？#n這件事你打算怎麼負責──！！！"
10050090-124 = "不是，這一切的一切……"
10050090-126 = "都，都是為了行銷嘛！"
10050090-127 = "那能算是理由嗎！！！"
10050090-139 = "[ns]「覺得滿足嗎，八雲？」"
10050090-140 = "是的，相當滿足。"
10050090-141 = "[s1]「那就好。」\n[s2]「老師會繼續看著八雲同學的哦～」"
10050090-144 = "咦，為什麼？"
10050090-145 = "嗯？因為我對各方面的事都看得太透徹了……？"
10050090-146 = "比如知道合約的份量，還是個為了生意能屈能伸的學生……？"
10050090-147 = "[s3]「沒錯。只要運用得當的話，那是很厲害的能力。」\n[s4]「但是如果越線的話，可能會連我都幫不了你。」"
10050090-150 = "……"
10050090-151 = "我知道，我知道。"
10050090-152 = "雖然不想承認，不過既然大家都說我是個很彆扭的人，我恐怕也只能認了吧。"
10050090-153 = "而且老師說會看著我這句話，如果換個方式解釋……"
10050090-154 = "也可以理解成會持續關心我的意思，所以也不見得是壞事吧？"
10050090-155 = "[s]「要是你的口才再差一點的話，說不定就不會那麼氣人了呢～」"
10050090-156 = "就是說呀，部長！老師才不是那個意思！#n光是這次的事就已經很……！"
10050090-157 = "唉……真是辛苦您了，老師。#n真心感謝您的協助。"
10050090-158 = "[s]「我也是因為有貴音在，才勉強撐住的……」"
10050090-159 = "老，老師願意這麼想，我很感激……"
10050090-160 = "唉……早知道會這樣的話，一開始就該請老師幫忙的……"
10050090-161 = "話說回來，部長為什麼沒那麽做呢？#n不是說向來都會考慮所有可能性的嗎？"
10050090-162 = "啊～這個嘛……其實我一開始也不是沒考慮過啦。#n只是……"
10050090-163 = "只是？"
10050090-168 = "……啊我就怕被罵啊。"
10050090-169 = "部～長～！！！"
10050090-170 = "[s]「八～雲～！！！」"
10050090-178 = "[ns]「呼……」"
10050090-180 = "[ns]「今天的空氣也很好呢～」"
10050090-182 = "冬日天空的文藝復興～關於文化交流的實踐綱領～"

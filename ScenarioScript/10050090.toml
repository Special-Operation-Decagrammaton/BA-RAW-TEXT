[translation]
10050090-1 = "ตอนที่ 9;ดั่งสายน้ำที่ไหลริน"
10050090-2 = "และด้วยเหตุนี้ละค่ะประธานเชริโน่... ทางฉันจึงอยากเสนอข้อตกลงแลกเปลี่ยนวัฒนธรรมระหว่างทรีนิตี้#nกับเรดวินเทอร์ ส่วนนี่ก็เนื้อหาข้อตกลงค่ะ"
10050090-3 = "ข้อตกลงนี้ได้รับการรับรองจากคุณครูของชาเล่ต์แล้ว และจะดำเนินการตามที่ชมรมอ่านหนังสืออนุญาต#nค่ะ ส่วนสภาน้ำชาก็ไม่มีความเห็นต่างต่อการตัดสินใจนี้ค่ะ"
10050090-4 = "แต่ถึงยังไง ในอนาคตฉันอยากให้เรดวินเทอร์งดแจกจ่ายหนังสือและสื่อทางวัฒนธรรมอื่นๆ โดยไม่มีการหารือล่วงหน้า อย่างเช่นเรื่องที่เกิดขึ้นในครั้งนี้ค่ะ"
10050090-5 = "พอจะเป็นไปได้มั้ยคะ? อย่างที่คุณยาคุโมะบอกไว้ว่าวัฒนธรรมคือสิ่งที่ต้องหมุนเวียนอยู่เสมอนี่คะ"
10050090-6 = "อะ... อืม..."
10050090-7 = "ทำไมต้องทำด้วยเนี่ย... เรื่องนี้เกิดขึ้นเพราะพวกชมรมสื่อสิ่งพิมพ์ทำทุกอย่างตามอำเภอใจแท้ๆ..."
10050090-8 = "เดี๋ยวนะ ตอนนี้สหายของเราอยู่ที่นั่นใช่มั้ย? อืม... ถ้างั้นก็!"
10050090-9 = "เข้าใจแล้วละ ถ้างั้นเรื่องนี้ให้ชาเล่ต์ตัดสินใจแทนเรดวินเทอร์ก็แล้วกัน"
10050090-10 = "[s] \"หืม? ครูน่ะเหรอ?\""
10050090-11 = "คะ? หมายความว่า... ให้คุณครูของชาเล่ต์?"
10050090-12 = "ใช่แล้วละ เรื่องนี้ชาเล่ต์จะทำการแทนในฐานะตัวแทนของเรดวินเทอร์ และเรดวินเทอร์จะยกการตัดสินใจทั้งหมดให้ชาเล่ต์"
10050090-13 = "ที่สำคัญ จากนี้เป็นต้นไปเราต้องไปทำภารกิจตามกำหนดการที่หลีกเลี่ยงไม่ได้!"
10050090-14 = "ภารกิจตามกำหนดการที่หลีกเลี่ยงไม่ได้เหรอคะ...?"
10050090-16 = "ภารกิจนั้นก็คือ... นอนกลางวันยังไงล่ะ!"
10050090-17 = "นอนกลางวัน... เหรอคะ? นั่นเป็นการอุปมาอุปไมยถึงอะไรหรือเปล่าคะ?!"
10050090-18 = "[s] (ไม่น่าใช่นะ...)"
10050090-19 = "สะ... ส่วนการเสนอให้ชาเล่ต์เป็นตัวแทนในการทำข้อตกลงทางวัฒนธรรมครั้งนี้ก็...?"
10050090-23 = "(เป็นแบบนั้นงั้นเหรอคะ?! ถ้าข้อตกลงนี้เกิดผิดพลาดขึ้นมา ชาเล่ต์ที่กลายมาเป็นตัวแทนของ#nเรดวินเทอร์ก็ต้องรับผิดชอบส่วนหนึ่ง...)"
10050090-24 = "(ในทำนองเดียวกัน ความรับผิดชอบนั้นก็ต้องย้อนกลับมาที่ทรีนิตี้ที่เห็นชอบข้อตกลงนี้ด้วย...)"
10050090-25 = "(และถ้าเป็นแบบนั้น ชาเล่ต์และคุณครู... ก็อาจแสดงท่าทีที่ไม่ค่อยดีนักต่อทรีนิตี้ ไม่ว่าจะในเชิงของงานหรือในเชิงความรู้สึกก็ตาม...)"
10050090-26 = "(ท้ายที่สุดแล้ว นี่คือการเตือนทรีนิตี้เรื่องการประพฤติตัว)"
10050090-27 = "(และในขณะเดียวกันก็เป็นการบอกว่าเรดวินเทอร์จะลอยตัวเหนือความรับผิดชอบทุกอย่างงั้นเหรอ? นี่สินะคะ พลังทางการทูตของเรดวินเทอร์?!)"
10050090-28 = "ปะ... ประธานเชริโน่! เดี๋ยวก่อนสิคะ!"
10050090-33 = "[ns] \"เป็นอะไรไปเหรอ นางิสะ? สีหน้าดูไม่ดีเลย...\""
10050090-34 = "ปะ... เปล่าค่ะ! ฉันไม่ได้เป็นอะไรทั้งนั้นค่ะ คุณครู! แค่พวกเราทำออกมาให้ดีๆ ก็พอค่ะ ใช่ค่ะ แน่นอนอยู่แล้วค่ะ!"
10050090-35 = "งั้นก็จบแล้วใช่มั้ย นางิจัง? ฉันเบื่อจะแย่อยู่แล้ว~!"
10050090-36 = "มิกะ คุณครูก็อยู่ที่นี่ด้วยนะคะ ช่วยรักษามารยาทหน่อยค่ะ"
10050090-37 = "นะ... นั่นสิเนอะ ขอโทษนะ คุณครู..."
10050090-38 = "หืม? ให้ฉันเป็นตัวเองได้งั้นเหรอ...? ขอบคุณนะ คุณครู! ฉันชอบแบบนี้ที่สุดเลยละ!"
10050090-39 = "ขอกล่าวทักทายอีกครั้งนะคะ สภาน้ำชาทุกคน แล้วก็ขอขอบคุณในความเอื้อเฟื้อของพวกคุณด้วยค่ะ"
10050090-40 = "สวัสดีค่ะ ชมรมสื่อสิ่งพิมพ์ทุกคน ฉันดีใจที่มีโอกาสได้พบทุกคนอย่างเป็นทางการแบบนี้นะคะ"
10050090-41 = "ทรีนิตี้หวังเป็นอย่างยิ่งว่าเหตุการณ์นี้จะเป็นโอกาสในการสร้างความสัมพันธ์อันดีกับเรดวินเทอร์ใน#nอนาคตค่ะ"
10050090-42 = "ถ้ามีหนังสือดีๆ ก็ช่วยแนะนำให้นักเรียนทรีนิตี้รู้จักด้วยนะคะ"
10050090-43 = "ค่ะ ฉันจะทำตามนั้นค่ะ ต้องขอบคุณจากใจจริงที่ให้พวกฉันเข้ามาพบนะคะ"
10050090-45 = "นี่ๆ ชื่อยาคุโมะจังใช่มั้ย? ดีใจที่ได้รู้จักนะ! ฉันมิกะจากสภาน้ำชา!"
10050090-46 = "คือว่า... ฉันขอคุยด้วยหน่อยได้มั้ย... แต่แค่เราสองคนนะ?"
10050090-47 = "สะ... สวัสดีค่ะ ฉันอารามากิ ยาคุโมะค่ะ"
10050090-48 = "(นี่คือหนึ่งในสามของสมาชิกสภาน้ำชา...)"
10050090-49 = "(งั้นตอนนี้ฉันก็ไม่ต่างกับกำลังยืนอยู่ต่อหน้าประธานเชริโน่...)"
10050090-50 = "(แต่ถ้าเป็นประธานเชริโน่จริงๆ คงมีเป็นร้อยวิธีที่จะรับมือได้...)"
10050090-51 = "ฉันได้อ่านหนังสือที่ยาคุโมะจังนำเข้ามาแล้วละ ขอบใจนะ!"
10050090-52 = "อ่า... ค่ะ"
10050090-53 = "แต่ว่า... นี่เป็นแค่ความคิดเห็นส่วนตัวของฉันนะ"
10050090-54 = "คือว่า... ตัวเอกในเรื่องน่ะ จะว่ายังไงดีล่ะ ฉันรู้สึกว่าตัวเอกมีบางอย่างที่คล้ายกับคุณครูเลย ยิ่งอ่านฉันก็เลยยิ่งชอบเป็นพิเศษน่ะ"
10050090-55 = "เพราะงั้นฉันก็เลย... แต่นี่เป็นแค่คำขอ? หรือความหวัง? ส่วนตัวของฉันนะ..."
10050090-56 = "ฉันคิดว่าถ้าเปลี่ยนนิสัยหรือลักษณะภายนอกของพาร์ทเนอร์ เรื่องราวก็อาจจะสนุกขึ้นก็ได้"
10050090-57 = "...?"
10050090-58 = "โอ้... โอ้... โอ้ว... ฮิ ฮิ ฮิ"
10050090-59 = "ขอบคุณมากสำหรับความคิดเห็นดีๆ ค่ะ คุณมิกะ"
10050090-60 = "ถ้าช่วยอธิบายรายละเอียดเพิ่มเติมอีกสักหน่อย ก็น่าจะเป็นประโยชน์อย่างมากเลยละค่ะ อยากให้เปลี่ยนแปลงแบบไหนเหรอคะ?"
10050090-61 = "อื้อ! ก็อย่างเช่น... เปลี่ยนสีผมให้เป็นโทนชมพูมากกว่านี้อีกหน่อย? แล้วถ้าดัดผมเป็นลอน ก็น่าจะน่ารักกว่านี้ด้วยนะ?"
10050090-62 = "แล้วก็ถ้าเป็นเด็กที่นิสัยซุกซน ขี้เล่น อยู่ไม่สุข แต่เวลาทำอะไรก็ทำจริงจัง ก็น่าจะดีเลยด้วย?"
10050090-63 = "เอาเป็นคนประเภทที่ชอบทำให้บรรยากาศรอบข้างสดใส แล้วก็ชอบทำผมเป็นมวยไว้ข้างหนึ่ง แต่ถึงจะไม่ทำทรงนั้นก็ไม่เป็นไร..."
10050090-64 = "แล้วก็ให้เมนูโปรดเป็นพาร์เฟต์จัมโบ้! แล้วก็ชอบทาบีบีครีมและใช้น้ำหอมซามูเอล <เดอะ บียอนด์>!"
10050090-65 = "อ้อ ส่วนแยมโรล ไม่ต้องใส่ไปก็ได้ เท่านี้ก็เพียงพอแล้วละ..."
10050090-66 = "สรุปเลยนะ! ฉันคิดว่าถ้าปรับให้เป็นแบบนี้ก็น่าจะดีน่ะ!"
10050090-67 = "แน่นอนค่ะ แน่นอนอยู่แล้ว ฉันเข้าใจแล้วค่ะว่าอยากสื่ออะไร"
10050090-68 = "แต่ถ้าพิจารณาจากทุกรายละเอียดที่คุณมิกะอยากให้เปลี่ยน ดูเหมือนว่าทางฉันจะต้องทำหนังสือ#nเล่มนั้นขึ้นมาใหม่ตั้งแต่ต้นเลยนะคะ?"
10050090-69 = "งะ... งั้นเหรอ...?"
10050090-70 = "และยิ่งไปกว่านั้น หนังสือเล่มนั้นก็จะเป็นหนังสือที่เขียนขึ้นมาเพื่อคุณมิกะโดยเฉพาะเลยค่ะ"
10050090-71 = "หืม? นะ... หนังสือเพื่อฉันโดยเฉพาะ...? "
10050090-72 = "อื้อ! แบบนั้นก็ยิ่งดีเลย!"
10050090-73 = "แน่นอนสิคะ แน่นอนเลยละ ฉันก็คิดว่าแบบนั้นน่าจะเหมาะกับคุณมิกะมากกว่าค่ะ แต่ว่า... น่าจะมีปัญหาอยู่อย่างหนึ่งค่ะ"
10050090-74 = "อะ... อะไรเหรอ?"
10050090-75 = "โดยพื้นฐานแล้ว การพิมพ์คือธุรกิจที่อาศัยการผลิตในปริมาณมากเป็นหลักน่ะค่ะ"
10050090-76 = "หนังสือที่สร้างสรรค์เพื่อคนจำนวนน้อยก็มักจะมีราคาต่อหน่วยที่สูงกว่าค่ะ"
10050090-77 = "แล้วยิ่งเป็นหนังสือสำหรับบุคคลเพียงคนเดียว การกำหนดราคาอาจเป็นเรื่องยากนิดหน่อยค่ะ ก็มันจะเป็นของหายากเลยนี่คะ"
10050090-78 = "ถ้าให้พูดตามตรงก็คือ มันน่าจะแพงทีเดียวค่ะ"
10050090-79 = "หืม...? แล้วมันเท่าไรเหรอ?"
10050090-83 = "เท่านี้พอมั้ย...?"
10050090-84 = "?!?!"
10050090-85 = "ยะ... เยอะไปแล้วค่ะ! แค่ครึ่งหนึ่งก็น่าจะเพียงพอแล้วนะคะ...?"
10050090-86 = "อะไรกัน เห็นบอกว่าแพง ฉันก็เลยเตรียมใจเผื่อไว้ แต่ก็ไม่เห็นจะเท่าไรเลยนี่นา ถ้างั้นก็..."
10050090-87 = "คุณมิกะ?"
10050090-92 = "ทะ... ทำไมเหรอ? นางิจัง?"
10050090-93 = "ฉันจำเป็นต้องบอกทุกอย่างเองเลยเหรอคะ?"
10050090-94 = "อะ... อึก... ก็ได้ แง~ ไม่ชอบนางิจังแล้ว~!"
10050090-96 = "คงเหนื่อยน่าดูเลยนะคะ ชมรมสื่อสิ่งพิมพ์ทุกคน"
10050090-97 = "ไม่หรอกค่ะ... พวกฉันต่างหากที่ต้องขอโทษที่สร้างปัญหาให้ชมรมอ่านหนังสือและชมรมทวงความ#nยุติธรรมทุกคน..."
10050090-99 = "แต่ยังไงก็เป็นเรื่องดีนะคะ ตอนนี้ชมรมทวงความยุติธรรมของเราแวะเวียนไปยืมหนังสือมาอ่านกัน#nมากขึ้นอย่างเห็นได้ชัดเลยค่ะ ต้องขอบคุณพวกคุณทุกคนเลยนะคะ"
10050090-100 = "ดูเหมือนว่าหนังสือที่พวกคุณนำเข้ามาทำให้ทุกคนมีความสนใจในการอ่านมากขึ้นนะคะ"
10050090-101 = "แม้แต่ตัวฉันเองตอนนี้ก็เริ่มสนใจหนังสือประเภทอื่น นอกเหนือจากหนังสือที่เกี่ยวข้องกับความยุติธรรม#nด้วยค่ะ"
10050090-102 = "ค่ะ ขอบคุณที่อ่านหนังสือมากขึ้นนะคะ แต่ก็ขอให้ส่งคืนให้ตรงเวลาด้วยค่ะ"
10050090-103 = "ฉะ... ฉันจะจำให้ขึ้นใจเลยค่ะ.... ว่าแต่ คุณทาคาเนะ"
10050090-104 = "ค่ะ มีเรื่องอะไรเหรอคะ?"
10050090-105 = "ก็เรื่องนี้... ยังไม่จบบริบูรณ์เลยนี่คะ?"
10050090-106 = "มันก็... ใช่ค่ะ?"
10050090-107 = "งั้นถ้ามีเล่มหน้าออกมา ช่วยบอกฉันหน่อยนะคะ..."
10050090-108 = "ฮุฮุ ถูกใจเข้าแล้วสินะคะ?"
10050090-109 = "ค่อนข้างชอบเลยค่ะ"
10050090-110 = "เข้าใจแล้วค่ะ ฉันยินดีต้อนรับคนที่ชื่นชอบเรื่องราวของเราเสมอค่ะ"
10050090-111 = "ส่วนนี่คือข้อเสนอแนะจากนักเรียนทรีนิตี้บางส่วนค่ะ ถึงฉันจะไม่ค่อยเข้าใจสักเท่าไรก็เถอะค่ะ..."
10050090-112 = "นักเรียนเหล่านั้นอยากให้มีการตีพิมพ์รวมบทวิจารณ์ของท่านหญิงแห่งเรดวินเทอร์ค่ะ"
10050090-113 = "..."
10050090-114 = "ฉันจะเก็บข้อเสนอแนะนี้ไปพิจารณานะคะ..."
10050090-115 = "ขอบคุณค่ะ คุณทาคาเนะ ต่อไปก็ต้องขอรบกวนด้วยนะคะ"
10050090-121 = "หัว~ หน้า~ คะ~!!!"
10050090-122 = "เอ๋ มีอะไรเหรอคะ? ทาคาเนะ?"
10050090-123 = "ได้ยินแล้วใช่มั้ยคะ? แล้วแบบนี้จะรับผิดชอบยังไงคะ!!!"
10050090-124 = "แต่ว่า... ทั้งหมดนั่นมัน..."
10050090-126 = "เอาเถอะค่ะ! มันคือการตลาดค่ะ!"
10050090-127 = "คิดว่าสิ่งที่พูดมามันฟังขึ้นเหรอคะ!!!"
10050090-139 = "[ns] \"พอใจแล้วสินะ ยาคุโมะ?\""
10050090-140 = "ค่ะ ค่อนข้างพอใจเลยค่ะ"
10050090-141 = "[s1] \"ดีแล้วละ แต่ครูก็จะเฝ้าดูยาคุโมะนะ~\"\n[s2] \"ดีแล้วละ ไว้ครูจะเฝ้าดูยาคุโมะนะ~\""
10050090-144 = "เอ๋? ทำไมล่ะคะ?"
10050090-145 = "คะ? เพราะฉันรู้เรื่องโน้นเรื่องนี้มากเกินไปงั้นเหรอคะ?"

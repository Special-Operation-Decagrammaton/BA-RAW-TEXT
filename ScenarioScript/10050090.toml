[translation]
10050090-1 = "Episode 9;Like a Flowing River"
10050090-2 = "...So, President Cherino. This is the cultural exchange agreement between Trinity and Red Winter we have proposed."
10050090-3 = "This agreement has been agreed upon and authorized by Schale's Sensei and Trinity's Library Committee. The Tea Party supports their actions."
10050090-4 = "...On the condition that no books or culture will be distributed in Trinity without prior agreement."
10050090-5 = "I'm sure this proposal will be agreeable to you. After all, in the words of your own Yakumo, \"culture must flow.\""
10050090-6 = "Oh. Um..."
10050090-7 = "This is troublesome... Mostly because the Publishing Department just went ahead and did whatever..."
10050090-8 = "Wait. Did you say \"Schale's Sensei\"? As in, Comrade? I see!"
10050090-9 = "In that case, Schale shall stand in as an official representative of Red Winter for this case."
10050090-10 = "[s] \"Eh? Me?\""
10050090-11 = "Hm? So you wish for Schale, and therefore Sensei, to negotiate on your behalf?"
10050090-12 = "Yes. Consider Sensei's word Red Winter's word. But only for this case!"
10050090-13 = "More importantly, I have to go to an appointment that I CANNOT miss!!"
10050090-14 = "I-It must be quite important..."
10050090-16 = "Yes! A nap!"
10050090-17 = "A n-nap?! This must be a Red Winter idiom of some sorts."
10050090-18 = "[s] \"(It really isn't...)\""
10050090-19 = "A-And Schale will be Red Winter's representative in this cultural exchange?"
10050090-23 = "(Could it be?! If something goes wrong with the agreement, Schale, as the representative of Red Winter, will have to take some responsibility...)"
10050090-24 = "(Which will, in turn, force Trinity to be at odds against Schale!)"
10050090-25 = "(Then...it's entirely possible that this agreement could sour Sensei's opinion towards Trinity...whether in a political or emotional sense...)"
10050090-26 = "(Red Winter is subtly and passively keeping Trinity in check...)"
10050090-27 = "(...without so much as dirtying a pinky finger. Is this Red Winter's political savvy?)"
10050090-28 = "P-President Cherino! Wait!"
10050090-33 = "[ns] \"What's wrong, Nagisa? You look unwell...\""
10050090-34 = "N-No! Not at all! Of course! Yes, we will meet your expectations and more in this endeavor, Sensei."
10050090-35 = "Ugh, are you done yet, Nagi? I'm so booored."
10050090-36 = "Mika. Sensei is here, show some manners."
10050090-37 = "R-Right. Sorry, Sensei..."
10050090-38 = "Huh? I can do whatever I want? Heehee! You're the best, Sensei! I like you, you know that right?"
10050090-39 = "Please allow me to greet you once more, members of the Tea Party. I must extend my warmest thanks for your generosity."
10050090-40 = "Hello, Publishing Department. It's a pleasure to meet you in an official capacity."
10050090-41 = "From Trinity's perspective, we hope this incident can be the springboard for the beginning of a strong and fruitful relationship with Red Winter."
10050090-42 = "Please feel free to continue providing Trinity with excellent literature."
10050090-43 = "Yes, thank you, ma'am. I'm honored to have the opportunity to meet your expectations."
10050090-45 = "Hey, hey, Yakumo, was it? Nice to meet you! I'm Mika from the Tea Party!"
10050090-46 = "Do you think we could talk real quick? Us two?"
10050090-47 = "Ah, hello. Aramaki Yakumo."
10050090-48 = "(This is one of three members of the Tea Party...)"
10050090-49 = "(It's like I'm standing in front of Trinity's equivalent of President Cherino.)"
10050090-50 = "(Although, not exactly. If it were her, I'd have much better control of this situation.)"
10050090-51 = "I read the book you brought! I just wanted to say thanks."
10050090-52 = "Ah, yes."
10050090-53 = "And, um, well. This is totally just my opinion, okay?"
10050090-54 = "It's just...the main character reminded me of Sensei a bit. That's really what drew me in."
10050090-55 = "So this is a personal request... Or maybe more just my hope?"
10050090-56 = "But I was thinking... If there were a way you could change the partner's design a little, that would really add to the story!"
10050090-57 = "...?"
10050090-58 = "Oh... Ho, oh. Heh, heh, heh."
10050090-59 = "Thank you for your excellent feedback, Mika."
10050090-60 = "I love your suggestion, but I'll need a few more details to make it happen. What kind of changes were you thinking?"
10050090-61 = "Really? Yay! So, for example... Maybe her hair could be more pink? Oh, and a little wavy! That'd be really cute!"
10050090-62 = "Hm... She's a little playful, and people call her clumsy, but when push comes to shove, she gets it done!"
10050090-63 = "Someone who cheers everyone up! And she could even have a little bun on one side! Ah, it's okay to cut that one if you have to."
10050090-64 = "Her favorite food is jumbo parfait! And she loves BB cream and Samuela \"The Beyond\" perfume!"
10050090-65 = "Oh, no more roll cakes, though. I've had enough..."
10050090-66 = "Anyway! Anyway! What do you think?"
10050090-67 = "Yes, yes. I can picture it perfectly."
10050090-68 = "That is, I can picture a brand new book. To be honest, if we want to make your idea happen, we'll have to start from scratch."
10050090-69 = "O-Oh. I see..."
10050090-70 = "And in that process, it'll become a book that's all yours. Just for Misono Mika."
10050090-71 = "Huh? A-A book just for me...? "
10050090-72 = "Oh my gosh! Yes! That'd be AMAZING!"
10050090-73 = "Yes, yes. For someone of your status, it's really the only viable solution. However, every solution has the potential to bring new problems."
10050090-74 = "Wh-What do you mean?"
10050090-75 = "You see, due to the nature of publishing, it's impossible to escape the economies of scale."
10050090-76 = "Producing for a few elites, rather than the masses, drives up costs."
10050090-77 = "Especially a custom piece like this... To write a book for just one person... Why, it's so rare, I don't think there's any precedent. It'd be difficult to name a price."
10050090-78 = "To be completely frank, it's an expensive endeavor."
10050090-79 = "Huh...? How much? "
10050090-83 = "...Would this be enough?"
10050090-84 = "?!?!"
10050090-85 = "Wh-What?! Even I have morals, okay?! Even half of this would be enough."
10050090-86 = "Ah, geez! Were you just teasing me when you said it'd be expensive? I was nervous for nothing! All right! In that case—"
10050090-87 = "Mika, dear?"
10050090-92 = "Y-Yes, Nagi?"
10050090-93 = "Do I truly need to spell everything out for you every time?"
10050090-94 = "Ughhh... Fine... You're a big meanie face, Nagi!"
10050090-96 = "Thank you for all your hard work, Publishing Department."
10050090-97 = "The gratitude is all ours. We never meant to cause such trouble for the Library Committee and Task Force."
10050090-99 = "Yes, but you have also brought about good change. I've noticed more members visiting the library as of late."
10050090-100 = "And thanks to your book, the overall interest in reading has increased as well."
10050090-101 = "That's true for me as well. I've begun reading books on topics other than justice and old idioms."
10050090-102 = "Yes, yes. But please do make sure everyone returns their books on time."
10050090-103 = "Yes, ma'am. Of course. And, um, Takane?"
10050090-104 = "Yes, Mashiro?"
10050090-105 = "This story is still unfinished, correct?"
10050090-106 = "Yes... That is true..."
10050090-107 = "If you wouldn't mind contacting me...when the next volume is out..."
10050090-108 = "Fufu. Did you enjoy it?"
10050090-109 = "A lot."
10050090-110 = "Of course. Anyone who loves stories is a comrade of mine."
10050090-111 = "Ah, yes. I do not know what this means, but I was asked to deliver this message by a group of Trinity students."
10050090-112 = "\"Please release a collection of critical essays by the Princess of Red Winter!\""
10050090-113 = "..."
10050090-114 = "I will think on it..."
10050090-115 = "Thank you, Takane. I look forward to working together."
10050090-121 = "President!!"
10050090-122 = "Huh? What is it, Takane?"
10050090-123 = "Do NOT attempt to play dumb with me. You heard that, now how do you intend to take responsibility for this?!"
10050090-124 = "Well, uh. You see..."
10050090-126 = "It's all in the name of marketing!"
10050090-127 = "That excuse will only work so many times!!"
10050090-139 = "[ns] \"Are you satisfied, Yakumo?\""
10050090-140 = "Quite."
10050090-141 = "[s1] \"I'm happy to hear that.\"\n[s2] \"But I'll be keeping a much closer eye on you from now on!\""
10050090-144 = "Fiddlesticks. But why?"
10050090-145 = "Huh? Because I understand these things too well?"
10050090-146 = "For example, I know the weight of a contract, and am someone who is willing to put aside her pride for business...?"
10050090-147 = "[s3] \"Yes. That's a great skill, and very admirable when used for good.\"\n[s4] \"But it makes crossing the line too easy. And I can only do so much.\""
10050090-150 = "..."
10050090-151 = "I know, I know."
10050090-152 = "I've gained a reputation for being rather shady, haven't I? I'll admit to that much."
10050090-153 = "As for you keeping an eye on me..."
10050090-154 = "I'll choose to interpret that as your insatiable curiosity in me and revel in it."
10050090-155 = "[s] \"If you toned down the smooth talking, others might find you more palatable, you know!\""
10050090-156 = "Precisely what I have been saying! Sensei had no such intentions in what they said! You know, without their intervention in this fiasco... *sigh*"
10050090-157 = "Excellent work, Sensei. I'm sincerely grateful."
10050090-158 = "[s] \"I only managed it with your help, Takane.\""
10050090-159 = "Th-Thank you for seeing it that way..."
10050090-160 = "*sigh* If I had known this would be the end result regardless, I would have simply contacted Sensei from the start."
10050090-161 = "Now that I think about it, why didn't you, President? That seems like an uncharacteristic oversight on your part."
10050090-162 = "Ah, well. I did consider it, but..."
10050090-163 = "But?"
10050090-168 = "...I didn't want to get in trouble?"
10050090-169 = "President!!"
10050090-170 = "[s] \"Yakumo!!\""
10050090-178 = "[ns] \"Well.\""
10050090-180 = "[ns] \"The weather is nice today. As always.\""
10050090-182 = "Winter Sky's Renaissance: Thesis on Cultural Exchange"

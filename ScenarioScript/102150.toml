[translation]
102150-1 = "ตอนที่ 15;ปฏิบัติการบุกยึดหอคอยแห่งที่ 4 - มหาวิหารในสุสานใต้ดิน"
102150-8 = "ทางไปยังหอคอยแห่งที่ 4 มีเพียงเส้นทางเดียวค่ะ ถึงมันจะไม่ง่ายเลยที่จะสั่งรวบรวมอาวุธ... แต่ตอนนี้เรามีเพียงวิธีเดียวค่ะ"
102150-10 = "ไม่เป็นไรหรอกค่ะ ฉันเชื่อใจการสั่งการของคุณฮานาโกะค่ะ"
102150-11 = "...... ใช่ค่ะ คุณฮานาโกะ ได้โปรดออกคำสั่งพวกฉันตามต้องการเลยค่ะ"
102150-12 = "ตายจริง...♡ พูดเป็นทางการอะไรแบบนั้นคะคุณมารี"
102150-16 = "อืม... เราควรจะเพิ่มการคุ้มกันทางด้านหลังอีก แต่คนไม่พอนี่สิ..."
102150-17 = "คงต้องเสี่ยงอันตรายแล้วละ..."
102150-19 = "ให้พวกฉันช่วยสิ"
102150-27 = "คุณคือ..."
102150-28 = "ให้พวกฉันช่วยคุ้มกันจากข้างหลังให้ไหมล่ะ?"
102150-30 = "......"
102150-31 = "เธออาจจะไม่เชื่อใจพวกเราก็จริง แต่ถ้าไปช่วยได้ละก็..."
102150-32 = "ได้สิคะ คุณซาโอริ ฝาก <สควอด> คุ้มกันทางด้านหลังให้ด้วยนะคะ"
102150-33 = "......!"
102150-35 = "จะ... จริงเหรอคะ? ให้โอกาสง่ายๆ แบบนี้เลยเหรอ?!"
102150-36 = "...... เธอน่าจะรู้ว่าพวกเราเป็นใครนะ แอบวางแผนอะไรในใจหรือเปล่า?"
102150-38 = "พวกคุณมาที่นี่เพราะคุณครูจากชาเล่ต์ขอความช่วยเหลือเอาไว้ไม่ใช่เหรอคะ? แล้วฉันจะกล้าปฏิเสธได้ยัง#nไงล่ะคะ แล้วอีกอย่าง..."
102150-39 = "เราต่างก็มีเพื่อนคนสำคัญคนเดียวกันนี่คะ?"
102150-41 = "......"
102150-42 = "แค่นั้นก็เพียงพอให้ฉันเชื่อใจพวกคุณแล้วค่ะ"
102150-43 = "...... อย่างนั้นเองสินะ เข้าใจแล้ว"
102150-44 = "......"
102150-45 = "แต่ฉันจะไม่ขอให้พวกคุณมาช่วยคุ้มกันเพียงอย่างเดียวนะคะ เตรียมตัวเตรียมใจไว้ด้วยละ ฮิฮิ♡"
102150-46 = "จะทำอะไรน่ะ..."
102150-47 = "ค่ะ! ถึงงานจะยากและสาหัส... แต่ก็ขอฝากเนื้อฝากตัวด้วยนะคะ..."
102150-52 = "ในเมื่อทุกคนก็เตรียมพร้อมกันหมดแล้ว..."
102150-53 = "ว่าแต่... ทำไมไม่เห็นคุณซากุระโกะเลยล่ะคะ?"
102150-54 = "ขออภัยนะคะที่มาช้า"
102150-62 = "ทะ... ท่านซากุระโกะ...? ทะ... ทำไมชุดถึงเป็นแบบนั้น...?!"
102150-63 = "ชะ... ชุดนั่น..."
102150-64 = "คะ... คุณซากุระโกะ?!"
102150-66 = "นี่คือชุดพิธีของสาวกยูสตาร์ที่หัวหน้าสาวกคนสุดท้ายทิ้งไว้..."
102150-67 = "...... ใช่ค่ะ นี่คือการเตรียมพร้อมของฉันค่ะ"
102150-68 = "เพื่อตัดความเกลียดชังที่มีมาตั้งแต่ในอดีต และเริ่มต้นใหม่..."
102150-69 = "คุณซากุระโกะ..."
102150-73 = "เตรียมพร้อมงั้นเหรอคะ?!"
102150-74 = "เตรียมชุดวาบหวิว... เพื่ออะไรกัน?!"
102150-75 = "อ๊ะ! หรือว่านี่คือเจตจำนงของสาวกที่ชมรมซิสเตอร์ต้องสานต่อคะ?!"
102150-76 = "แปลว่าต่อไป ซิสเตอร์ทุกคนจะต้องแต่งตัวด้วยชุดวาบหวิว แบบนี้ใช่ไหมคะ?!"
102150-78 = "คะ?!  ยะ... อย่างนั้นเหรอคะ?!"
102150-79 = "ตะ... แต่ฉัน... ไม่น่าจะใส่ไหว..."
102150-80 = "คะ? มะ... ไม่ใช่นะคะ?  พะ... พูดอะไรออกมาน่ะ...?!"
102150-81 = "ชุดรัดรูปเว้าสูงที่เห็นแล้วใจสั่น... ที่ดูจะต้องรวบรวมความกล้าหาญก่อนหยิบมาใส่!"
102150-82 = "ดีไซน์แปลกใหม่ที่ดูเหมือนต้องใส่ใจทั้งข้างหน้าและข้างหลังเวลาเดิน!!"
102150-83 = "นี่คือการเตรียมพร้อมของคุณซากุระโกะสินะคะ!!"
102150-84 = "คะ? อ่า... คือว่า..."
102150-85 = "คุณซากุระโกะ ช่วยบอกกันตามตรงเถอะค่ะ มันกวนใจฉันมากเลยนะคะ ข้างใน... มีชุดชั้นในไหมคะ? ไม่สิ... ถ้ามาลองคิดๆ ดูแล้ว มันไม่น่าจะใส่อะไรเข้าไปได้... อืม... เป็นอย่างนั้นเองสินะคะ"
102150-86 = "แปลว่าคุณซากุระโกะใส่แค่กางเกงในตัวใหญ่มาตัวเดียวสินะคะ!!"
102150-87 = "พะ... พูดอะไรแบบนั้นล่ะคะ!!"
102150-88 = "......"
102150-89 = "ได้โปรดอภัยต่อบาปของพวกเรา... และช่วยพวกเราให้หลุดพ้นจากความชั่วร้ายด้วยเถอะค่ะ..."
102150-90 = "อุราวะ ฮานาโกะผู้นี้... พอได้อยู่ต่อหน้าเจตจำนงที่แรงกล้าแบบนี้ ก็ตระหนักได้ถึงความบกพร่องของ#nตัวเองค่ะ"
102150-91 = "ดีเลยค่ะ ถึงจะยังมีข้อบกพร่อง แต่ฉันก็จะเตรียมพร้อมบ้างค่ะ..."
102150-97 = "......"
102150-98 = "......"
102150-99 = "......"
102150-100 = "เอาละค่ะ เท่านี้ฉันก็พร้อมแล้วค่ะ"
102150-101 = "คะ... คะ? พะ... พร้อมได้ด้วยชุดเหรอ?!"
102150-102 = "ขอเริ่มปฏิบัติการโจมตีหอคอยแห่งที่ 4 นับจากนี้เป็นต้นไปค่ะ!!"
102150-103 = "ระ... เริ่มกันแบบนี้เลยเหรอคะ...? จริงเหรอคะ...?"

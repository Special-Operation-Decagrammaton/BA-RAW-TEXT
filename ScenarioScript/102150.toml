[translation]
102150-1 = "第15話;第4聖所「地下墓穴內部宗座聖殿」"
102150-8 = "目前通往第4聖所的道路只有一條而已。#n雖然想集中火力並不容易……但沒有其他方法了。"
102150-10 = "沒關係，我相信花子同學的指揮。"
102150-11 = "沒錯。花子同學，請盡情命令我們吧。"
102150-12 = "哎呀哎呀……♡瑪麗醬一臉純真地說出那種話，#n反而更讓人忍不住了呢。"
102150-16 = "但是……這種情況下，後方的防衛將變得單薄……"
102150-17 = "只能冒著風險前進──"
102150-19 = "願意讓我們來幫忙嗎？"
102150-27 = "……你是。"
102150-28 = "希望你們能把後方的防衛交給我們。"
102150-30 = "……"
102150-31 = "雖然你可能不信任我們……不過──"
102150-32 = "當然沒問題，沙織同學。#n後方的防衛就拜託「小隊」了。"
102150-33 = "……！"
102150-35 = "真，真的嗎？#n這麼簡單就相信我們，真的可以嗎……！？"
102150-36 = "……你應該很清楚我們是誰吧……你有什麼打算？"
102150-38 = "你們也是收到「夏萊的老師」的請求，前來幫忙的對吧？#n這並不是我能拒絕的事……而且──"
102150-39 = "……我們之間，有著共同且重要的朋友對吧？"
102150-41 = "……"
102150-42 = "信任你們的理由，我認為這樣就足夠了。"
102150-43 = "這樣啊……我知道了。"
102150-44 = "……"
102150-45 = "但是，我不會只請你們負責防衛，請做好覺悟哦。唔呵呵♡"
102150-46 = "你打算做什麼……"
102150-47 = "好，好的！雖然一定會又累又痛苦……#n我會加油的……請多多指教……！"
102150-52 = "大家似乎都準備好了呢。"
102150-53 = "……不過，好像沒看見櫻子同學呢……究竟在哪呢？"
102150-54 = "抱歉我來遲了。"
102150-62 = "櫻，櫻子大人……？#n那，那副模樣……究竟……！？"
102150-63 = "……那，那套服裝是……"
102150-64 = "櫻……櫻子同學！？"
102150-66 = "這是最後的聖徒會長所留下的優斯提娜聖徒會的禮裝……"
102150-67 = "……沒錯。這就是我的覺悟。"
102150-68 = "斬斷延續至今的憎恨連鎖，迎接嶄新的──"
102150-69 = "──櫻子同學。"
102150-73 = "那就是……你的「覺悟」嗎！？"
102150-74 = "那種[ruby=・   ・   ・   ・]不知羞恥[/ruby]的服裝！？"
102150-75 = "那真的是修女會要延續的，聖徒會的意志嗎！？"
102150-76 = "那個……也就是說，今後你打算讓修女的大家都穿上那套服裝是嗎！？"
102150-78 = "是……是這樣嗎！？"
102150-79 = "我，我也得……穿成那樣……啊嗚……"
102150-80 = "那，那個，你到底在說什麼……！？"
102150-81 = "那種光是穿上就需要一定覺悟的、走在危險邊緣的高衩緊身衣……！？"
102150-82 = "那種走路時都必須隨時注意後方的、布料面積不合理的設計……！？"
102150-83 = "那真的是……櫻子同學所說的覺悟嗎？"
102150-84 = "什，什麼……？#n這，這個……"
102150-85 = "櫻子同學，請你老實回答。因為我非常在意。#n請問裡面有穿內衣嗎？不──#n仔細想想，在物理上是無法存在的……原來如此。我明白了。"
102150-86 = "也就是說櫻子同學現在──#n只穿著一片薄薄的布對吧！！"
102150-87 = "你，你到底在說什麼啊！？"
102150-88 = "……"
102150-89 = "請寬恕我們的罪……"
102150-90 = "沒錯……我，在偉大的意志面前，再次領悟到了自身的不足。"
102150-91 = "……櫻子同學的覺悟，我完全感受到了。#n我也必須，展現我那尚未成熟的覺悟才行……"
102150-97 = "……"
102150-98 = "……"
102150-99 = "……"
102150-100 = "這樣一來，所有的準備都完成了。"
102150-101 = "什，什麼？準，準備完成……？"
102150-102 = "那麼，現在開始第4聖所的攻略吧！！"
102150-103 = "就，就這樣開始真的沒問題嗎……？"

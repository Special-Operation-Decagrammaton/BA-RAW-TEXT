[translation]
102150-1 = "Episode 15; Fourth Sanctum - Basilica in the Catacomb"
102150-8 = "There's only one way into the fourth sanctum at the moment. It won't be easy and it'll require quite a bit of firepower...but there's no other choice."
102150-10 = "Lead the way, Hanako. We trust your command."
102150-11 = "Agreed. Hanako, we await your orders."
102150-12 = "Oh, my. I find it adorable when we both pretend there's no strings attached to that statement. ♡"
102150-16 = "Everything is set except...we need more defense in the rear..."
102150-17 = "We just don't have the manpower. We'll have to take the risk."
102150-19 = "Will you let us help?"
102150-27 = "...You?"
102150-28 = "If you don't mind, you can entrust the rear defense to us."
102150-30 = "..."
102150-31 = "I understand asking for your trust is a lot, but we could... We want to help."
102150-32 = "Not at all, Saori. The Arius Squad will bring up the rear in our formation."
102150-33 = "...!"
102150-35 = "R-Really? Th-That was way too easy!"
102150-36 = "...You know exactly who you're saying yes to. What is your motive here?"
102150-38 = "You received a request for help from Sensei, just like we did. I can't say no to their decision."
102150-39 = "But more importantly, we both have a mutual friend who means the world to us, don't we?"
102150-41 = "..."
102150-42 = "That's why I trust the Arius Squad. "
102150-43 = "...I understand. Thank you."
102150-44 = "..."
102150-45 = "But don't worry, it won't only be you on defense. Heehee."
102150-46 = "What kind of logic..."
102150-47 = "Y-Yes! It seems s-scary and doomed, but I'll do my best working with you!"
102150-52 = "It looks like we're all ready."
102150-53 = "...Except for one. Where is Sakurako?"
102150-54 = "My apologies for my tardiness."
102150-62 = "S-Sakurako...? Wh-What are you wearing...?!"
102150-63 = "That outfit..."
102150-64 = "Sa...Sakurako?!"
102150-66 = "This is the ceremonial dress of the Saint Justina Council left by the last council president..."
102150-67 = "...It's a symbol of my resolution."
102150-68 = "I seek to let go of past hatred, to forge a new future for the council. For us all."
102150-69 = "...Sakurako."
102150-73 = "That...bodysuit is your resolution?!"
102150-74 = "But it's so racy?!"
102150-75 = "You're telling me that...dress is the council's volition? And the Sisterhood is going to carry on its tradition?!"
102150-76 = "Then, are all of the Sisters going to wear that racy outfit from now on?"
102150-78 = "Huh?! R-Really?!"
102150-79 = "I...I don't think I can wear something like that..."
102150-80 = "Wh-What are you saying?! No! That was not my intention at all!"
102150-81 = "Look at that skimpy high-cut leotard. It requires immense courage just to even try it on!"
102150-82 = "And the design! There's too much to worry about when you walk! The front? The back?! It's all in danger!"
102150-83 = "That symbolizes your resolution, Sakurako?!"
102150-84 = "W-Well... That's..."
102150-85 = "Sakurako, please be honest. I need to know... Are you even wearing anything under that? No...it must be physically impossible."
102150-86 = "In summary, Sakurako showed up to our assault only wearing one giant pair of panties!"
102150-87 = "Wh-What nonsense is coming out of your mouth right now, Hanako?! Honestly!"
102150-88 = "..."
102150-89 = "Please forgive our sins...and save us from evil..."
102150-90 = "I, Urawa Hanako, didn't expect to realize how unworthy I was in front of Sakurako's unyielding will."
102150-91 = "...Yes. You're right. I've come to see my unworthiness, however. I, too, will reestablish my resolve."
102150-97 = "..."
102150-98 = "..."
102150-99 = "..."
102150-100 = "And now, preparations are complete."
102150-101 = "H-Huh? Th-This is complete...?!"
102150-102 = "The fourth sanctum assault starts now!"
102150-103 = "W-We're really gonna start like this...?! Really?"

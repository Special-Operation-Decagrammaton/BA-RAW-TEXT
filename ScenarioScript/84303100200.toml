[translation]
84303100200-6 = "原來是愛玩捉迷藏的客人呢！#n下次要躲在哪呢？我一定要先找出來！"
84303100200-8 = "抱歉。因為新奇的東西很多……逛著逛著就因為走錯路而遲到了。"
84303100200-10 = "如果真是那樣的話倒無所謂……"
84303100200-11 = "……不，沒關係。我們並沒有要監視你的意思。"
84303100200-12 = "但如果要長時間離開，或者有什麼事的話，希望你可以聯絡我們。"
84303100200-14 = "呵呵，這會造成你們管理方面的麻煩對吧……感謝你們的體貼。"
84303100200-18 = "……嗯？"
84303100200-21 = "（是莉央的聯絡……？）"
84303100200-24 = "哎呀，又有電話……不好意思，麻煩你們稍等。"
84303100200-26 = "沒關係。"
84303100200-27 = "我們會待在這裡，你忙完再來找我們就行了。"
84303100200-29 = "知道了。"

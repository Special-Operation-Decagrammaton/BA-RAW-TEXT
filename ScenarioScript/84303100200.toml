[translation]
84303100200-6 = "You must really enjoy hide-and-seek! Am I hiding next, or is it still your turn?"
84303100200-8 = "I'm sorry. There were so many fascinating things to see, I...got a bit lost."
84303100200-10 = "Well, I hope that's all there is to it..."
84303100200-11 = "...It's fine, though. We're not here to keep you on a leash."
84303100200-12 = "But if you do get lost, or if you're worried about something, you give us a call."
84303100200-14 = "Fufu. I wouldn't want to trouble you, but that's very considerate. Thank you."
84303100200-18 = "...Hm?"
84303100200-21 = "(A call from Rio...?)"
84303100200-24 = "Oh, I have another call... One moment, sorry."
84303100200-26 = "Don't worry about it."
84303100200-27 = "You know where to find us. Come back when you're done."
84303100200-29 = "Very well. I will."

[translation]
21200-1 = "Episode 20;The Millennium Prize"
21200-2 = "Millennium Game Development Department"
21200-3 = "Aris! Aris! Check it out!"
21200-4 = "Ta-da! It's a maid costume!"
21200-5 = "Eek!"
21200-6 = "*scurries away*"
21200-7 = "Heehee! This is so fun!"
21200-8 = "What is wrong with you? Can't you tell Aris is scared out of her mind?!"
21200-9 = "You okay, Aris?"
21200-11 = "Um... Please keep anything or anyone wearing a maid uniform away from me from now on..."
21200-12 = "She seems to be feeling better. "
21200-13 = "I went to the Student Council to discuss the building we destroyed."
21200-14 = "Thankfully, they deemed it a product of a \"sanctioned club accident.\""
21200-15 = "Wow! Really?! I thought we'd get expelled or something."
21200-16 = "I think C&C smoothed it over for us. "
21200-17 = "And Neru said to me:"
21200-18 = "\"See you soon.\""
21200-19 = "Eek!"
21200-22 = "Aris! Get out of the cabinet! What have you been teaching her, Yuzu?"
21200-23 = "Well, that's good news and all, but..."
21200-24 = "Right..."
21200-26 = "The Millennium Prize announcement ceremony has begun."
21200-28 = "You know the drill, right? If we take home the gold, we party like there's no tomorrow. But if we lose..."
21200-29 = "We have to pack our bags."
21200-30 = "Which Momoi and I can do, but Yuzu and Aris..."
21200-31 = "..."
21200-32 = "..."
21200-34 = "The Millennium Prize Award Ceremony"
21200-35 = "Hello and welcome to the Millennium Prize Award Ceremony! My name is Kotori, and I'll be your host for the day's proceedings!"
21200-36 = "I hear this year's competition has more entrants than it's ever had before!"
21200-37 = "Probably because the Student Council made it mandatory that each club enter or something!"
21200-39 = "Millennium Game Development Department"
21200-40 = "Looks like everything worked out for Kotori."
21200-41 = "Well, the Engineering Department is one of Millennium's most valued clubs."
21200-42 = "But more entrants means more competition, right...?"
21200-43 = "That's not good..."
21200-45 = "Last year's winner was Noa's \"The Meter of Memory\". Though unusual for poetry, it was praised as a sure-fire cure for insomnia due to its extensive use of long metaphysical terms."
21200-46 = "This year, we have tubes of what looks like toothpaste but is actually cheese, a large missile-equipped umbrella for self-defense..."
21200-47 = "A necktie power bank, optical camouflage underwear, a portable pencil-case-sized refrigerator—perfect for exactly one can..."
21200-48 = "And finally a retro-style mobile game that went viral on the Kivotos network: Tales Saga Chronicle 2! "
21200-49 = "Out of the hundreds of submissions, only seven will make it to the top!"
21200-50 = "*gulp*"
21200-51 = "And so, we're kicking things off with our seventh place winner!"
21200-52 = "In seventh place, we have the camouflage underwear set designed by Utaha of the Engineering Department! I'm not sure whether this underwear puts form over function..."
21200-53 = "...but they received very high ratings for allowing exhibitionists to exercise their hobby with peace of mind. I'd like to know who the reviewers are! Anyway, it's only better from here on!"
21200-54 = "Well..."
21200-55 = "It's okay. Our game doesn't belong in seventh anyway."
21200-56 = "Moving on to sixth place! It's...!"
21200-57 = "..."
21200-58 = "In fifth place is...!"
21200-59 = "They haven't called our name..."
21200-60 = "Next is fourth place...!"
21200-61 = "They should have called our name by now..."
21200-62 = "It's time to crown the top three! Snapping up third is..."
21200-63 = "I can't bear to watch anymore!"
21200-64 = "Please... Please..."
21200-65 = "Second place was a real tight race, but in the end it went to..."
21200-66 = "..."
21200-67 = "Please be us... Please be us..."
21200-68 = "N-No way... They...didn't call our name?"
21200-69 = "That means..."
21200-70 = "*gasp*"
21200-71 = "Last but certainly not least, we have our winner. Our contestants that will be taking home the Millennium Prize!"
21200-72 = "I can't take this."
21200-73 = "And our first-prize winner will be..."
21200-74 = "I think I'm going to lose my mind."
21200-78 = "...announced after this commercial break!"
21200-80 = "A-Aris!"
21200-81 = "Laser is fully charged."
21200-82 = "Please don't shoot it at the awards ceremony!"
21200-83 = "Ahhh! This anticipation's too much!"
21200-85 = "And we're back, folks!"
21200-86 = "The first place prize goes to...the New Material Development Club!"
21200-87 = "*bang bang bang*"
21200-88 = "Agh! Why'd you shoot the TV?!"
21200-89 = "What does it matter? We're going to lose everything!"
21200-90 = "Ahhhhh! It's all over!"
21200-92 = "*sigh*"
21200-93 = "So this is it?"
21200-96 = "It's all right, Yuzu. We can still..."
21200-97 = "I've got it! There's no need to get all depressed!"
21200-98 = "The reviews we got weren't too bad. We've come along way from being the legendary losers of the Worst Game of the Year award."
21200-99 = "We're just going to keep getting better."
21200-100 = "Even if we get kicked out, we can gather more club members and make something even better! When we reopen, we'll have an even bigger and better club room!"
21200-101 = "But...what about Yuzu and Aris?"
21200-102 = "It's okay, Midori."
21200-103 = "I'm going back to the dorms."
21200-105 = "Huh?"
21200-106 = "I don't think anyone will call us failures anymore. And even if they do, it doesn't bother me now."
21200-107 = "Because I have you guys...and Sensei."
21200-108 = "I want to thank you, Sensei."
21200-109 = "Ever since you came to this club room, we've all grown and changed."
21200-110 = "But for Aris..."
21200-114 = "[ns1] \"Leave it to me.\"\n[ns2] \"Come to Schale with me, Aris.\""
21200-115 = "Aris..."
21200-116 = "Aris..."
21200-117 = "..."
21200-118 = "I-I'm sorry."
21200-119 = "It's okay."
21200-120 = "I know I can trust Sensei."
21200-121 = "However."
21200-122 = "That means..."
21200-124 = "I can't stay with you guys anymore."
21200-125 = "...?!"
21200-126 = "I'm so sorry, Aris!"
21200-127 = "I'm going to visit you at Schale every day! Seriously! Every day!"
21200-128 = "We'll always be linked by the game we made together."
21200-130 = "*sniffle*"
21200-131 = "No!"
21200-132 = "You can't take her, Sensei!"
21200-133 = "Sh-She can stay in my room! We'll share the bed! I'll split my meals with her!"
21200-134 = "I can share too!"
21200-135 = "Guys, please don't pressure Sensei. If anyone were to find out..."
21200-137 = "*slam*"
21200-138 = "Momoi! Aris! Midori! Yuzu!"
21200-139 = "Ack! Yuuka's already here?!"
21200-140 = "You couldn't wait even a minute to evict us?!"
21200-141 = "That's just too cruel! How can the Student Council be so heartl—"
21200-143 = "Congratulations!"
21200-144 = "Wha..?"
21200-145 = "...What are you talking about?"
21200-146 = "What the...heck?"
21200-149 = "Hmm?"
21200-150 = "What's with you guys?"
21200-151 = "Didn't you see the results?"
21200-152 = "Yeah...?"
21200-153 = "We didn't even make it to seventh place..."
21200-154 = "Huh?!"
21200-155 = "What are you talking about? Turn on the TV."
21200-156 = "It has some, um, bullet holes in it."
21200-157 = "Sheesh. Fine, watch from my phone."
21200-159 = "The Millennium Prize Award Ceremony"
21200-160 = "The Millennium Prize's purpose has always been to award students for creating something practical."
21200-161 = "However, practicality fails to fully cover the emotions which can be brought on by an interactive experience."
21200-162 = "And so, for the first time in the history of the Prize, we are awarding a unique top honor."
21200-163 = "Our Special Honors go to the Game Development Department's Tales Saga Chronicle 2!"
21200-164 = "S-Seriously?!"
21200-165 = "What's...happening...?"
21200-166 = "We were charmed by a concept that transcended retro, a story not hung up on formalities, and a strange world which complemented both."
21200-167 = "Navigating a strange and unknown world, meeting new people, and overcoming a demon lord."
21200-168 = "We believe it is a piece of work that truly captures the essence of the RPG genre."
21200-169 = "It's a game that reminds us why we came to love video games in the first place..."
21200-171 = "It is for these reasons that we saw fit to award the game with the Millennium Prize's Special Honors."
21200-174 = "Millennium Game Development Department"
21200-175 = "W-Wow..."
21200-176 = "Congrats again! I gave it a try too. It wasn't the most exciting game I've ever played, but it was a fresh experience! I really liked it!"
21200-178 = "Momo! Mido! I tried playing TSC2! It was so much fun! It's gone totally viral!"
21200-179 = "Veritas says it's being searched more than any celebrity in Kivotos!"
21200-180 = "I...can't believe it..."
21200-183 = "I see. "
21200-184 = "Tales Saga Chronicle 2 was downloaded 7,705 times with 1,372 comments in just the first three hours of being uploaded."
21200-185 = "And in the 26 seconds following its announcement at the Millennium Prize, it has amassed over 10,000 downloads!"
21200-186 = "*gasp*"
21200-187 = "Of the 500 new comments, there are 242 negative comments, 192 expressing excitement, and the remaining 66 are uncertain."
21200-188 = "D-Doesn't that mean they don't like it?!"
21200-189 = "Not exactly."
21200-190 = "Huh? What do you mean, Yuzu?"
21200-191 = "..."
21200-192 = "..."
21200-193 = "Take a look at the most liked comment thread..."
21200-195 = "chicken: I've thought long and hard about it, and I think in the end...I'm glad I was able to play this game."
21200-196 = "Kotoha0507: Honestly, I used to be biased against Millennium."
21200-197 = "Kotoha0507: But after playing Tales Saga Chronicle 2, I can't hide behind the idea that Millennium students are all cold and calculating anymore."
21200-198 = "...!"
21200-199 = "But, wait! Do we get to keep our club room?!"
21200-202 = "Well, as before, the confiscation is postponed. Since the award you won wasn't official, the Student Council decided to give you another year to reevaluate if you get to keep your club room."
21200-203 = "And, also..."
21200-204 = "*squirm*"
21200-205 = "Huh?"
21200-206 = "I, uh... I'm sorry I called your consoles junk."
21200-207 = "Playing your game, I remembered how much I loved playing games as a kid... It was like I was experiencing it all again for the first time."
21200-208 = "Congratulations. Come to the Student Council room to apply for a club room extension or funding. I'll be seeing you."
21200-211 = "That means...!"
21200-212 = "*gasp*"
21200-213 = "We..."
21200-214 = "WE DID IT!"
21200-215 = "Ahhhhh!"
21200-216 = "Thank goodness... We really did it."
21200-218 = "...?"
21200-219 = "Uhhh...?"
21200-220 = "We did it, Aris! We get a budget and get to keep our club room!"

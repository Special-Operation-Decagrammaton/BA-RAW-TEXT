[translation]
21200-1 = "第20話;ミレニアムプライス"
21200-2 = "ミレニアム・ゲーム開発部"
21200-3 = "ねえねえアリス、見て見て～。"
21200-4 = "じゃ～ん、メイド服～！"
21200-5 = "ひぃっ！"
21200-6 = "（ヒューン）"
21200-7 = "あはは、良い反応！"
21200-8 = "何してるの、もう！アリスちゃんが完全に怯えきってるじゃん！"
21200-9 = "アリスちゃん、大丈夫？"
21200-11 = "あ、アリス、しばらくメイド服は見たくありません！"
21200-12 = "身体の方は全部直ったみたいなんだけど、心の方はもうちょっとかかりそうだね。"
21200-13 = "あの、建物を壊しちゃった件について、生徒会のところに行ってきたんだけど……。"
21200-14 = "幸いなことに、部活動中の「事故」として処理してもらえたよ。"
21200-15 = "嘘っ、ユズそれどうやったの！？もし部が存続したとしても、弁償代として部費は諦めなくちゃって思ってたのに……！"
21200-16 = "わたしじゃなくて、C&Cの方が処理してくれたみたい。"
21200-17 = "それと……ネル先輩から伝言。"
21200-18 = "「また会おう」……って。"
21200-19 = "ひぃっ！？"
21200-22 = "ああっ、アリスちゃん！ロッカーの中に入っちゃダメ！ユズちゃんを見て変なこと覚えちゃったよ！"
21200-23 = "ふぅ……まあそれならそれでよかった。ところで……"
21200-24 = "……うん。"
21200-26 = "ミレニアムプライス、始まったね。"
21200-28 = "もし受賞したらクラッカー鳴らそっか。でも、もしそうじゃなかったら……"
21200-29 = "……すぐに、荷造りしないとね。"
21200-30 = "私たちはさておき、ユズちゃんとアリスちゃんは……。"
21200-31 = "……。"
21200-32 = "……。"
21200-34 = "ミレニアムプライス・授賞式会場"
21200-35 = "これより、ミレニアムプライスを始めます！司会および進行を担当するのは私、コトリです！"
21200-36 = "今回は、これまでのミレニアムプライスの中でも最多の応募数となりました。"
21200-37 = "おそらくは生徒会の方針変更により、部活動維持のために「成果」が必要になった影響かと思われます！"
21200-39 = "ミレニアム・ゲーム開発部"
21200-40 = "……コトリちゃんたちの方も、無事だったみたいだね。"
21200-41 = "エンジニア部は元々、ミレニアムの中でもかなり功績が認められてる部活なこともあったし……でも、本当に良かった。"
21200-42 = "うん。ところで、史上最多の応募って……。"
21200-43 = "それはちょっと困るなぁ……。"
21200-45 = "昨年の優勝作品であるノアさんの「思い出の詩集」は、本来の意図とは少し違ったようですが……その形而上的な言葉の羅列が、ミレニアム最高の不眠症に対する治療法として評価されました。"
21200-46 = "今回も、「歯磨き粉と見せかけてモッツァレラチーズが出る持ち歩きチーズ入れ」、「ミサイルが内蔵された護身用の傘」……"
21200-47 = "「ネクタイ型モバイルバッテリー」、「光学迷彩下着セット」、「ちょうど缶一個なら入る筆箱型個人用冷蔵庫」……。"
21200-48 = "そして！今キヴォトスのインターネット上でセンセーションを巻き起こしている、スマホでマルチプレイが楽しめるレトロ風ゲーム、『テイルズ・サガ・クロニクル２』などなど！"
21200-49 = "今回出品された三桁の応募作品のうち、栄光の座を手にするのは、たったの7作品！"
21200-50 = "（ごくっ……）"
21200-51 = "それでは7位から、受賞作品を発表します！"
21200-52 = "7位はエンジニア部、ウタハさんの「光学迷彩下着セット」です！これは身に付けてもその下の素肌が見えてしまうため、着ているのかそうでないのか分からないというエキセントリックな作品ですが……。"
21200-53 = "露出症の患者さんが合法的に趣味生活を営めるようになるという点で、大変高い評価を……その評価をした審査員が一体誰なのか、気になってしまいますね！とにかく7位！"
21200-54 = "ふぅー……。"
21200-55 = "まっ、私たちのゲームは7位にはふさわしくないよね。"
21200-56 = "そして6位！この製品は……"
21200-57 = "……。"
21200-58 = "5位は……！"
21200-59 = "私たちの名前……呼ばれないね。"
21200-60 = "次です、4位……！"
21200-61 = "ううぅっ！そろそろお願い！"
21200-62 = "さあ、ここからはベスト3です！3位は……！"
21200-63 = "も、もう心臓がもたない！"
21200-64 = "お願い……お願い……。"
21200-65 = "僅差で2位を受賞したのは……！"
21200-66 = "……。"
21200-67 = "お願いします、私たちの名前を……！"
21200-68 = "くっ、2位でもない……！"
21200-69 = "っていうことは……！"
21200-70 = "……！"
21200-71 = "最後に！今回のミレニアムプライスで、最高の栄誉を受賞した作品です！"
21200-72 = "ドキドキ……"
21200-73 = "その1位は……！"
21200-74 = "うぅ……っ！"
21200-78 = "CMの後で！"
21200-80 = "アリスっっ！！！"
21200-81 = "充電完了、いつでも撃てます！"
21200-82 = "気持ちは分かる！気持ちは分かるけど、授賞式会場もこの画面も撃っちゃダメ……！"
21200-83 = "うぅ、もう焦らさないでほしい……。"
21200-85 = "さあ！それでは発表します！"
21200-86 = "待望の1位は……新素材開発部――"
21200-87 = "（ダンダンダンッ！）"
21200-88 = "きゃぁっ！本当にディスプレイを撃ってどうするの！？"
21200-89 = "どうせ全部持って行かれちゃうんだし、もう関係ない！"
21200-90 = "うえぇぇん！今度こそ終わりだぁぁぁぁぁ！！"
21200-92 = "うぅ……。"
21200-93 = "結局、こうなっちゃうなんて……。"
21200-96 = "落ち着いて、お姉ちゃん。でも……"
21200-97 = "……分かってるよ！全部が否定されたわけじゃない、へこたれる必要なんて無いって……。"
21200-98 = "ネット上の評価も悪くなかったし、クソゲーランキング1位のあの時から、ちゃんと成長した。"
21200-99 = "これからも、きっと成長していける。"
21200-100 = "次こそはもっと良い結果を出して、今より立派な大きい部室だってもらえるはず！……でも、"
21200-101 = "うん……だって、ここを追い出されたら、ユズちゃんとアリスちゃんは……。"
21200-102 = "……心配しないで、ミドリ。"
21200-103 = "わたし、寮に戻る。"
21200-105 = "えっ？"
21200-106 = "もうわたしのことを、クソゲー開発者って呼ぶ人はいないと思う。ううん、もし仮にいたとしても、大丈夫。"
21200-107 = "今のわたしには……この三人と、先生がいるから。"
21200-108 = "ありがとうございました、先生。"
21200-109 = "先生がこの部室に来てくれた時から……わたしたちは、大きく変わることができました。"
21200-110 = "ただ、アリスちゃんは……。"
21200-114 = "[ns1] \"……うん、私に任せて。\"\n[ns2] \"アリス、シャーレに来る？\""
21200-115 = "……アリスちゃん。"
21200-116 = "……アリスちゃん。"
21200-117 = "……。"
21200-118 = "……ごめんね。"
21200-119 = "いえ。"
21200-120 = "先生のことは、信じられますから。"
21200-121 = "ですが……。"
21200-122 = "もう……"
21200-124 = "もうみんなとは……一緒に、いられないんですね。"
21200-125 = "！！"
21200-126 = "うっ、ごめんね……ごめんね、アリスちゃん！"
21200-127 = "私、毎日シャーレに行くから！本当に、絶対に毎日行く！"
21200-128 = "どこに行っても！一緒にゲームを作ろう！"
21200-130 = "うううう……！"
21200-131 = "やっ、やっぱり嫌！"
21200-132 = "先生！やっぱアリスを連れていっちゃダメ！"
21200-133 = "わ、私の部屋に連れていく！ベッドも一緒に使おう！ごはんも二人で分けて食べるから！"
21200-134 = "わ、私の分もあげるっ！"
21200-135 = "二人とも、先生を困らせないであげて……それに、もしそのことがバレたら、モモイも、ミドリも……。"
21200-137 = "（ガチャッ）"
21200-138 = "モモイ！ミドリ！アリスちゃん！ユズ！"
21200-139 = "ひいっ！もうユウカが！"
21200-140 = "ちょ、ちょっと待って！そんなすぐになんて……！"
21200-141 = "悪魔め！生徒会に人の心は無いわけ！？"
21200-143 = "おめでとうっ！"
21200-144 = "……？"
21200-145 = "……え？"
21200-146 = "え、えっ……？"
21200-149 = "？"
21200-150 = "え、何この反応？"
21200-151 = "結果、見てなかったの？"
21200-152 = "……結果？"
21200-153 = "私たち、7位以内に入れなくて……。"
21200-154 = "はぁ？"
21200-155 = "何を言ってるの、今も放送中なんだからちゃんと見てみなさいよ。"
21200-156 = "お姉ちゃんがディスプレイを吹っ飛ばしちゃって……。"
21200-157 = "ほんとに何をしてるのよ……ほら、見てみて。私もスマホで見てて、途中から走ってきたの。"
21200-159 = "ミレニアムプライス・授賞式会場"
21200-160 = "ミレニアムプライスはこれまで、生徒たちの才能と能力で作られた作品に対し、「実用性」を軸に据えて授賞を行ってきました。これはより良い未来を求め、実現していくという趣旨に基づいています。"
21200-161 = "しかし今回の作品の中には、新しい角度から「実用性」を感じさせてくれたものがありました。とある「ゲーム」が実際に、懐かしい過去をありありと思い出させ、未来への可能性を感じさせてくれたのです。"
21200-162 = "よって私たちはこの度、異例の選択をすることにしました。"
21200-163 = "今回は「特別賞」を設けます、その受賞作品は……ゲーム開発部の『テイルズ・サガ・クロニクル２』です。"
21200-164 = "えぇ、嘘っ！？"
21200-165 = "何が起きてるの……？"
21200-166 = "レトロ風という時代を超えたコンセプト、常識に縛られず次々と想像を超えていく展開、一見してそれらとマッチしそうにない不可思議な世界観、と、最初は困惑の連続でしたが……。"
21200-167 = "新しい世界を旅して、ひとつひとつ新たな絆を結びながら、魔王を倒しに行く……。"
21200-168 = "そういったRPGの根本的な楽しさが、しっかり込められた作品だと思います。"
21200-169 = "プレイしながら、かつて初めてゲームに夢中になった頃の思い出を、鮮明に思い出しました。そういった点を評価して、この作品に……"
21200-171 = "今回、ミレニアムプライス「特別賞」を授与します。"
21200-174 = "ミレニアム・ゲーム開発部"
21200-175 = "え……あ……。"
21200-176 = "本当におめでとう！その、実は私もプレイしてみたの。決して手放しに面白かったとは言えないけれど……良いゲームを遊んだ後の、あの独特な感覚が味わえた。"
21200-178 = "モモ、ミド！あたしも『TSC2』やってみたよ、すっごい面白かった！今ネット上でも大騒ぎだよ！"
21200-179 = "ヴェリタスの調べだと、有名アイドルの名前より、『TSC2』の検索数の方が多くなってるってさ！"
21200-180 = "ほ、ほんとに……？"
21200-183 = "確認しました。"
21200-184 = "3時間前にアップした『テイルズ・サガ・クロニクル２』は、先ほどまでダウンロード7705回、合計1372個のコメントが付いていましたが……。"
21200-185 = "ミレニアムプライスの発表以降、約26秒間でダウンロード回数が1万を超えました。"
21200-186 = "！？"
21200-187 = "コメントも約500個追加、言葉のニュアンスからして否定的・疑惑のコメントが242個、肯定的・期待のコメントが191個、残りは不明、もしくは評価を保留しているコメントです。"
21200-188 = "え、あれ……？そ、そしたら私たち……結局ダメってこと！？"
21200-189 = "ううん、そんなことは無い。"
21200-190 = "ユズちゃん……？"
21200-191 = "……。"
21200-192 = "……。"
21200-193 = "見て。今同率で、一番多く共感をもらってる、二つのベストコメント……"
21200-195 = "＜chicken：実際にプレイするかどうか、最初は散々迷いました……でも今はこう思ってます。このゲームに出会えて、よかったです＞"
21200-196 = "＜Kotoha0507：これまでミレニアムに対して、偏見を持ってしまっていました。＞"
21200-197 = "＜Kotoha0507：冷静さと合理性しかないというミレニアムの生徒たちへの偏見は、今回のミレニアムプライスと、この『テイルズ・サガ・クロニクル2』を通じて、完全に無くなったと断言できます＞"
21200-198 = "……！"
21200-199 = "えっと……っていうことは、廃部にはならないんだよね！？"
21200-202 = "ええ、そうよ。あ、でもあくまで「臨時の猶予」だから。正式な受賞ではないし、生徒会としてはまた来学期まで……ゲーム開発部の部室の没収および廃部を、「保留」することにしたの。"
21200-203 = "えっと、それから……。"
21200-204 = "その……。"
21200-205 = "ん？"
21200-206 = "……ご、ごめんなさい。ここにあるゲーム機のこと、ガラクタって言って……。"
21200-207 = "あなたたちのおかげで思い出したわ。小さい頃に遊んでた、色んなゲームのことを。久しぶりにあの頃の……新しい世界で旅をする楽しさを感じられた。"
21200-208 = "……ありがとう。それじゃあ、部室の延長申請とか部費の受取処理とかは必要だから、落ち着いたら生徒会室に来てね。じゃ、また後で！"
21200-211 = "じゃ、じゃあ……！"
21200-212 = "……！"
21200-213 = "や……"
21200-214 = "やったああぁぁぁっ！"
21200-215 = "良かった……！"
21200-216 = "やった……嬉しい……！"
21200-218 = "？？？"
21200-219 = "え、えっと……？"
21200-220 = "アリスちゃん！私たち、特別賞を受賞したんだよ！この場所も、私たちの部室のまま！"
21200-221 = "えっと、つ、つまり……。"
21200-222 = "アリスはこれからも……みんなと一緒にいて、良いのですか……？"
21200-225 = "うんっ！"
21200-228 = "これからも、よろしくね……！"
21200-229 = "……。"
21200-230 = "私も……私も、嬉しいです。"
21200-231 = "アリスちゃんっ！！"
21200-232 = "私たち……っ！！"
21200-233 = "これからも、ずっと一緒だよ！"
21200-234 = "……はい！"
21200-238 = "これからも、よろしくお願いします……！"
21200-243 = "…………"
21200-244 = "データ復旧率98.00％"
21200-245 = "システム作働……"
21200-246 = "準備完了"
21200-247 = "プログラムをセット…………"
21200-250 = "Divi:Sion……"
21200-251 = "……"
21200-253 = "[9b1e1e]AL-1S……[wa:1000] いえ……"
21200-255 = "[9b1e1e]ア リ ス……[wa:1000]私の……"
21200-257 = "[9b1e1e]私の、大事な…[wa:500]…[wa:500]…[wa:500]…[wa:1000]！@#$%$^&*（！@$！！"
21200-261 = "レトロチック・ロマン"

21200-127 = "ฉันจะไปหาที่ชาเล่ต์ทุกวันเลย! จะไปหาทุกวันจริงๆ นะ เชื่อใจได้เลย!"
21200-128 = "ถึงจะต้องไปอยู่ที่ไหน! แต่เราก็จะสร้างเกมด้วยกันอีกไง!"
21200-130 = "อึ่ก......!"
21200-131 = "ไม่เอา!"
21200-132 = "คุณครู! อย่าพาอาริสึไปเลยนะ!"
21200-133 = "ฉะ... ฉันจะพาไปอยู่ในห้องของฉันเอง! ให้นอนเตียงเดียวกันก็ได้! แล้วก็จะกินข้าวจานเดียวกันด้วย!"
21200-134 = "ฉะ... ฉันก็จะแบ่งให้ด้วยคน!"
21200-135 = "นี่พวกเธอ อย่าทำให้คุณครูต้องหนักใจสิ ถ้าโดนจับได้ขึ้นมา... พวกเธอก็ต้อง..."

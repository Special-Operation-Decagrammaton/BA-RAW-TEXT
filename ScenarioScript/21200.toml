21200-98 = "เราได้ฟีดแบกทางอินเทอร์เน็ตไม่เลวเลย แล้วพวกเราได้เติบโตจากเด็กเนิร์ด#nเจ้าของรางวัลที่ 1 แห่งเกมยอดแย่"
21200-99 = "แค่พัฒนาต่อไปเรื่อยๆ ก็พอ"
21200-100 = "ถึงจะโดนไล่ออกจากที่นี่... แต่ฉันก็จะไปหาสมาชิกเพิ่มจากหอพัก และสร้างผลงานที่ดีกว่านี้#nจนได้ห้องชมรมที่ใหญ่กว่านี้มาให้ดู!"
21200-101 = "แต่ว่า... ยูสึจังกับอาริสึจังล่ะ..."
21200-102 = "ไม่ต้องห่วงหรอกมิโดริ..."

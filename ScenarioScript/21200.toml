21200-154 = "หา?"
21200-155 = "พูดอะไรของเธอ? ตอนนี้การประกาศรางวัลยังไม่จบ ลองเปิดดูสิ"
21200-156 = "พี่เขาทำ TV พังไปแล้วล่ะ..."
21200-157 = "พวกเธอนี่ล่ะก็ งั้นลองดูนี่ๆ ฉันเองก็ฟังผลจากโทรศัพท์แล้วก็รีบวิ่งมาเลย"
21200-159 = "สถานที่มอบรางวัลมิลเลเนียมไพรซ์"
21200-160 = "ที่ผ่านมางานมิลเลเนียมไพรซ์มอบรางวัลให้กับผลงานที่ใช้งานได้จริง ที่สร้างมาด้วยความสามารถ#nและความพยายามของเหล่านักเรียนครับ"
21200-161 = "แต่ 'ความสนุก' ที่ได้จากเกมทำให้พวกเราตระหนักได้ถึงคุณสมบัติการใช้งานได้จริงในรูปแบบใหม่"
21200-162 = "ครั้งนี้พวกเราตัดสินใจเลือกสิ่งที่ต่างออกไป"
21200-163 = "ผลงานที่ได้ 'รางวัลพิเศษ' ก็คือ <เทลส์ ซาก้า โครนิเคิล 2> จากชมรมพัฒนาเกม"
21200-164 = "จะ...จริงเหรอ?!"
21200-165 = "นี่มัน... เรื่องอะไรกันเนี่ย..."
21200-166 = "ด้วยคอนเซ็ปต์ที่ดึงความเป็นเรโทร ผสานกับการเดินเรื่องที่เหนือจินตนาการและไม่ยึดติดกับความรู้#nและแนวคิดแปลกๆ ที่ก็เข้ากันได้ดี..."
21200-167 = "การได้ออกไปท่องโลกใหม่ และสร้างความสัมพันธ์กับคนอื่นเพื่อปราบราชาปีศาจ..."
21200-168 = "พวกเราคิดว่านี่คือผลงานที่มอบความสนุกอันเป็นรากเหง้าของเกม RPG ได้เป็นอย่างดีครับ"
21200-169 = "สำหรับผลงานที่ทำให้ได้ย้อนนึกถึงความทรงจำที่แสนตื่นเต้นเมื่อได้เล่นเกมเป็นครั้งแรก..."
21200-171 = "เราจึงขอมอบ 'รางวัลพิเศษ' ของมิลเลเนียมไพรซ์ครั้งนี้ให้ครับ"
21200-174 = "ชมรมพัฒนาเกมมิลเลเนียม"
21200-175 = "ว้าว...."
21200-176 = "ดีใจด้วยนะ! ฉันเองก็ลองเล่น <เทลส์ ซาก้า โครนิเคิล 2> มาแล้วเหมือนกัน! ถึงจะบอกไม่ได้ว่า#nมันเป็นเกมที่สนุกอย่างไม่น่าสงสัย แต่ตอนที่เล่นจบ ฉันสัมผัสได้ถึงอารมณ์ที่พิเศษเลยล่ะ"
21200-178 = "โมโม! มิโด! ฉันเล่น TSC 2 แล้ว! มันสนุกสุดยอดไปเลย! ตอนนี้ชาวเน็ตก็พูดถึงเกมนี้กันใหญ่เลย!"
21200-179 = "จากที่เวอริทัสได้เช็กมา มีการค้นหาคำว่า TSC 2 บนอินเทอร์เน็ตมากกว่าชื่อของไอดอลในคิโวทอสอีกนะ!"
21200-180 = "จะ... จริงเหรอ...!"

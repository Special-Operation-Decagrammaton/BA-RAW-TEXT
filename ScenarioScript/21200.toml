[translation]
21200-1 = "ตอนที่ 20;มิลเลเนียมไพรซ์"
21200-2 = "ชมรมพัฒนาเกมมิลเลเนียม"
21200-3 = "อาริสึ~ อาริสึ~ ดูนี่สิ~"
21200-4 = "นี่ไง~ ชุดเมด~"
21200-5 = "ฮะ... เฮือก!"
21200-6 = "(ตึ้กๆๆ)"
21200-7 = "อะฮ่ะฮ่า! สนุกจัง!"
21200-8 = "ทำอะไรน่ะ! อาริสึจังตกใจหมดแล้วนะ!"
21200-9 = "อาริสึจัง โอเคไหม?"
21200-11 = "อา.. อาริสึ แค่เห็นชุดเมดก็อยากจะหนีแล้วค่ะ!"
21200-12 = "อืม.. แต่ร่างกายก็หายดีแล้วนี่นา"
21200-13 = "คือว่า.. ฉันไปคุยกับสภานักเรียนเรื่องที่อาคารถูกทำลายมา"
21200-14 = "โชคดีที่จัดว่าเป็น 'อุบัติเหตุ' ในระหว่างที่ไม่ได้ทำกิจกรรมของชมรม"
21200-15 = "หืม?! เป็นแบบนั้นไปได้ไง? ฉันคิดว่าถึงชมรมจะยังอยู่ แต่อย่างน้อยก็โดนตัดเงินสนับสนุนซะอีก"
21200-16 = "เหมือนว่าทาง C&C จะจัดการให้น่ะ"
21200-17 = "แล้วก็... รุ่นพี่เนรุฝากมาบอกว่า..."
21200-18 = "'แล้วเจอกันใหม่'..."
21200-19 = "เฮือก...!"
21200-22 = "อ๊ะ อาริสึจัง! ไปซ่อนในตู้ไม่ได้นะ! ยูสึจังสอนอะไรแปลกๆ มาล่ะสิท่า!"
21200-23 = "อืม... ก็ยังถือว่าโชคดีนะ แต่ที่สำคัญกว่านั้น... ตอนนี้..."
21200-24 = "อืม..."
21200-26 = "งานมิลเลเนียมไพรซ์เริ่มแล้วล่ะ"
21200-28 = "ทุกคนรู้แล้วใช่ไหม? ถ้าเราได้รางวัลก็จะจัดปาร์ตี้ฉลองกัน แต่ถ้าไม่ได้..."
21200-29 = "ก็ต้องเก็บของสินะ..."
21200-30 = "เราสองคนน่ะไม่เป็นไรหรอก แต่ยูสึจังกับอาริสึจัง..."
21200-31 = "......"
21200-32 = "......"
21200-34 = "สถานที่มอบรางวัลมิลเลเนียมไพรซ์"
21200-35 = "งานมิลเลเนียมไพรซ์จะเริ่มขึ้น ณ บัดนี้ค่ะ! ฉันโคโทริ ผู้รับหน้าที่พิธีกรในวันนี้ค่ะ!"
21200-36 = "นับตั้งแต่งานมิลเลเนียมไพรซ์ครั้งแรก ถือว่าครั้งนี้มีการส่งผลงานเข้าประกวดเยอะที่สุดเลยล่ะค่ะ"
21200-37 = "อาจจะเป็นเพราะการเปลี่ยนนโยบายของสภานักเรียนที่บอกว่าชมรมต้องแสดง 'ผลงาน'#nออกมาก็ได้นะคะ"
21200-39 = "ชมรมพัฒนาเกมมิลเลเนียม"
21200-40 = "โคโทริจังก็น่าจะเคลียร์ปัญหาได้แล้วสินะ"
21200-41 = "ก็ชมรมวิศวกรรมเป็นหนึ่งในชมรมที่ได้รับการยอมรับมากที่สุดในมิลเลเนียมนี่นา"
21200-42 = "ยิ่งไปกว่านั้น... นี่เป็นการแข่งขันที่ใหญ่ที่สุดเท่าที่เคยมีมาเลย..."
21200-43 = "ฟังดู... อันตรายจัง....."
21200-45 = "บทกวีในความทรงจำ' ของคุณโนอาคือผลงานเจ้าของรางวัลชนะเลิศในปีที่แล้ว ถึงจะแตกต่าง#nจากความตั้งใจเดิมไปบ้าง แต่ก็เป็นผลงานที่ถ่ายทอดคำศัพท์อภิปรัชญาได้อย่างสวยงาม และได้รับการประเมินว่าเป็นยานอนหลับที่ดีที่สุดของมิลเลเนียมเลยค่ะ"
21200-46 = "และในปีนี้เรามีซอสที่รูปร่างคล้ายยาสีฟัน แต่บีบออกมาแล้วเป็นมอซซาเรลล่าชีส#nร่มป้องกันตัวที่ติดตั้งมิสไซล์ไว้..."
21200-47 = "แบตเตอรี่สำรองในรูปแบบเนคไท เซ็ตชุดชั้นในพรางตา ตู้เย็นส่วนตัวขนาดเท่ากล่องดินสอ#nที่ใส่เครื่องดื่มเย็นๆ ได้ 1 กระป๋อง..."
21200-48 = "อีกทั้งยังมี เกมเรโทร <เทลส์ ซาก้า โครนิเคิล 2> ที่เล่นพร้อมกันได้หลายคนบนโทรศัพท์มือถือ#nที่จะมาปลุกความยิ่งใหญ่ของเครือข่ายในคิโวทอส!"
21200-49 = "จากผลงานส่งประกวดกว่าหลายร้อยผลงาน เราคัดผลงานยอดเยี่ยมมาได้ทั้งหมด 7 ผลงาน!"
21200-50 = "(กลืนน้ำลาย)"
21200-51 = "ฉันจะประกาศตั้งแต่อันดับ 7 นะคะ!"
21200-52 = "อันดับ 7 เป็นของ 'เซ็ตชุดชั้นในพรางตา' ของคุณอุทาฮะค่ะ! ผลงานที่น่าสับสนชิ้นนี้ได้แรงบันดาลใจ#nมาจากคำถามที่ว่า ชุดชั้นในเอาไว้ 'ใส่' หรือ 'ปกปิด' กันแน่..."
21200-53 = "ผลงานชิ้นนี้ได้คะแนนค่อนข้างสูงเพราะเป็นผลิตภัณฑ์ที่เอาไว้ให้ผู้ป่วยที่ชอบโชว์ได้มีกิจกรรมยามว่าง#nที่ถูกกฎหมาย... อยากจะรู้จังเลยล่ะค่ะว่าใครเป็นกรรมการตัดสิน! และนี่คือที่ 7 ของเรา!"
21200-54 = "อืม..."
21200-55 = "เกมของเราไม่สมกับอันดับ 7 หรอกน่า"
21200-56 = "ต่อไปคืออันดับ 6! ผลงานนี้...."
21200-57 = "ครั้งนี้ก็ได้รางวัลไปอีก..."
21200-58 = "อันดับที่ 5 ก็คือ...!"
21200-59 = "ไม่เห็นเรียกชื่อพวกเราเลย..."
21200-60 = "ต่อไป! รางวัลอันดับ 4.....!"
21200-61 = "โอ้ยยย! น่าจะประกาศชื่อพวกเราได้แล้วนะ!"
21200-62 = "เรามาถึง 3 อันดับสูงสุดแล้วค่ะ! รางวัลอันดับ 3.....!"
21200-63 = "ฉะ.. ฉันทนลุ้นต่อไม่ได้แล้ว!"
21200-64 = "ได้โปรดเถอะ... ขอร้องล่ะ..."
21200-65 = "และผลงานที่ได้เป็นอันดับ 2 ด้วยคะแนนที่ต่างกันอย่างฉิวเฉียด...!"
21200-66 = "......"
21200-67 = "เรียกชื่อของพวกเราด้วยเถอะค่ะ..."
21200-68 = "อึ่ก... ไม่ใช่พวกเราอีกแล้วเหรอ..."
21200-69 = "งะ.. งั้นก็แสดงว่า!"
21200-70 = "......!"
21200-71 = "และสุดท้ายนี้! ผลงานที่ได้รับรางวัลชนะเลิศของมิลเลเนียมไพรซ์ในปีนี้!"
21200-72 = "ตื่นเต้นจัง..."

[translation]
21200-1 = "第20話;千年大賞"
21200-2 = "千年．遊戲開發部"
21200-3 = "愛麗絲愛麗絲，你看你看～"
21200-4 = "鏘～是女僕裝喔～！"
21200-5 = "噫！"
21200-6 = "（咻）"
21200-7 = "啊哈哈，反應不錯！"
21200-8 = "你在做什麼呀真是的！愛麗絲都被嚇到躲起來了啦！"
21200-9 = "愛麗絲醬，還好嗎？"
21200-11 = "愛，愛麗絲，暫時不想再看到女僕裝了！"
21200-12 = "雖然身體已經完全恢復了，看來心理的創傷要恢復還需要一點時間呢。"
21200-13 = "那個，我因為關於破壞建築物的事去了學生會一趟……"
21200-14 = "幸好似乎被當作是社團活動中的「意外」處理了唷。"
21200-15 = "真的假的，柚子你是怎麼做到的！？#n我還以為就算社團能繼續下去，都得要為了賠償而放棄社團經費了呢……！"
21200-16 = "並不是我，而是C&C那邊處理好了的樣子。"
21200-17 = "還有……寧瑠前輩有傳話。"
21200-18 = "「後會有期」。"
21200-19 = "噫！？"
21200-22 = "啊啊，愛麗絲醬！不能鑽進櫃子裡面！肯定是跟柚子醬學到奇怪的東西了！"
21200-23 = "呼……不過真是太好了。話說回來……"
21200-24 = "……嗯。"
21200-26 = "千年大賞，已經開始了呢。"
21200-28 = "如果得獎的話就來放個拉炮吧。但是，如果沒有的話……"
21200-29 = "……就得捲鋪蓋走人了呢。"
21200-30 = "先不論我們兩個，柚子醬跟愛麗絲醬該……"
21200-31 = "……"
21200-32 = "……"
21200-34 = "千年大賞．頒獎會場"
21200-35 = "千年大賞現在正式開始！我是擔任司儀和主持的亞都梨！"
21200-36 = "這次的千年大賞，是有史以來投稿數目最多的一次。"
21200-37 = "恐怕是跟學生會改變方針，為了維持社團必須要拿出「成果」有關吧！"
21200-39 = "千年．遊戲開發部"
21200-40 = "……亞都梨醬他們那裡，好像也沒事呢。"
21200-41 = "畢竟工程師部在千年的社團裡算是相當有成就的嘛……不過，真是太好了。"
21200-42 = "嗯。不過，他說是史上最多的投稿……"
21200-43 = "那還真是有點麻煩啊……"
21200-45 = "去年的冠軍是乃愛的《回憶詩集》，雖然和原本創作的意圖有點不同……#n但是那種形而上的詞語排列，被評為千年最好的失眠治療方法。"
21200-46 = "這次也有像是「看起來像牙膏卻能擠出莫札瑞拉起司的攜帶式起司盒」、#n「內藏導彈的護身雨傘」……"
21200-47 = "「領帶型行動電源」、「光學迷彩內衣組」、#n「剛剛好只能放進一個鐵鋁罐的鉛筆盒型個人冰箱」……"
21200-48 = "而且還有！現在在奇普托斯網路上熱烈討論的，#n用手機就能享受多人對戰的懷舊遊戲《故事．傳說．編年史２》等等等等！"
21200-49 = "在這次參賽的超過三位數的作品中，能夠獲得榮譽的作品只有7個！"
21200-50 = "（……）"
21200-51 = "接著就從第7名開始發表得獎作品！"
21200-52 = "第7名是來自工程師部的詠葉製作的「光學迷彩內衣組」！#n是就算穿在身上也會看到底下的皮膚，好像穿著又好像沒穿的古怪作品……"
21200-53 = "對於讓有露出癖好的人也可以合法地享受興趣這點獲得了相當高的評價……#n做出這種評價的評審是誰真令人好奇啊！總之是第7名！"
21200-54 = "呼……"
21200-55 = "嘛，第7名也不適合我們的作品嘛。"
21200-56 = "接著是第6名！這個作品是……"
21200-57 = "……"
21200-58 = "第5名是……！"
21200-59 = "沒有喊到……我們的名字呢。"
21200-60 = "接下來是第4名……！"
21200-61 = "嗚嗚嗚！差不多該輪到我們了拜託！"
21200-62 = "再來就是前3名了！第3名是……！"
21200-63 = "心，心臟要撐不住了！"
21200-64 = "拜託……拜託……"
21200-65 = "以些微之差獲得第2名的是……！"
21200-66 = "……"
21200-67 = "拜託了，請是我們的名字……！"
21200-68 = "唔，也不是第2名……！"
21200-69 = "也就是說……！"
21200-70 = "……！"
21200-71 = "最後！這就是在今年的千年大賞中獲得最高榮譽的作品！"
21200-72 = "緊張緊張……"
21200-73 = "第1名就是……！"
21200-74 = "唔……！"
21200-78 = "廣告後揭曉！"
21200-80 = "愛麗絲！！！"
21200-81 = "充電完畢，隨時可以射擊！"
21200-82 = "我懂你的心情！雖然我懂，可是不管是射擊頒獎現場還是這個畫面都不可以啦……！"
21200-83 = "唔，別再吊人胃口了……"
21200-85 = "那麼！接下來就發表冠軍作品！"
21200-86 = "眾所期待的第1名是……新材料開發社──"
21200-87 = "（噠噠噠！）"
21200-88 = "呀啊！居然對螢幕開槍，在想什麼啊！？"
21200-89 = "反正全都要被拿走了，已經沒關係了啦！"
21200-90 = "嗚呀呀！這次是真的結束了啊啊啊！！"
21200-92 = "嗚……"
21200-93 = "最後的結局竟然是這樣……"
21200-96 = "冷靜點，姐姐。但是……"
21200-97 = "……我知道啦！我們也不是全部都被否定了，沒必要氣餒的對吧……"
21200-98 = "在網路上的評價也不錯，至少我們比得到垃圾遊戲第1名的那時候已經有成長了。"
21200-99 = "接下來也會繼續成長的。"
21200-100 = "下次一定要拿出更好的成果，拿到比現在更好更大的社團活動室！#n可是……"
21200-101 = "嗯……因為，如果被趕出這裡的話，柚子醬和愛麗絲醬就……"
21200-102 = "……別擔心，綠。"
21200-103 = "我會回到宿舍去的。"
21200-105 = "咦？"
21200-106 = "我想應該不會再有人叫我垃圾遊戲開發者了吧。不，就算被這麼叫也沒關係。"
21200-107 = "現在的我……有你們三個，還有老師。"
21200-108 = "非常謝謝你，老師。"
21200-109 = "從老師來到這個活動室的時候開始……我們就發生了很大的改變呢。"
21200-110 = "可是，愛麗絲醬就……"
21200-114 = "[ns1] 「……嗯，交給我吧。」\n[ns2] 「愛麗絲，要來夏萊嗎？」"
21200-115 = "……愛麗絲醬。"
21200-116 = "……愛麗絲醬。"
21200-117 = "……"
21200-118 = "……抱歉。"
21200-119 = "不會。"
21200-120 = "我相信老師。"
21200-121 = "但是……"
21200-122 = "已經……"
21200-124 = "已經不能……和大家，在一起了呢。"
21200-125 = "！！"
21200-126 = "嗚，對不起……對不起，愛麗絲醬！"
21200-127 = "我每天都會去夏萊的！真的！絕對！每天都會去的！"
21200-128 = "不管去了哪裡！都一起做遊戲吧！"
21200-130 = "嗚嗚嗚嗚……！"
21200-131 = "果，果然還是不要！"
21200-132 = "老師！果然還是不能讓你帶走愛麗絲！"
21200-133 = "來，來我的房間吧！床也一起用吧！飯我也會分你一起吃的！"
21200-134 = "我，我的也分你吃！"
21200-135 = "你們兩個，別再讓老師困擾了……況且，要是穿幫了的話，桃井和綠都會……"
21200-137 = "（喀嚓）"
21200-138 = "桃井！綠！愛麗絲醬！柚子！"
21200-139 = "噫！優香這麼快就來了！"
21200-140 = "等，等一下！竟然這麼快就要……"
21200-141 = "你這個惡魔！學生會的人都沒有人心的嗎！？"
21200-143 = "恭喜你們！"
21200-144 = "……？"
21200-145 = "……咦？"
21200-146 = "咦，咦……？"
21200-149 = "？"
21200-150 = "嗯？你們怎麼是這種反應？"
21200-151 = "你們沒有看結果嗎？"
21200-152 = "……結果？"
21200-153 = "我們沒有進到前7名……"
21200-154 = "啊？"
21200-155 = "你們在說什麼，現在還在直播呢，趕快看吧。"
21200-156 = "姐姐已經把螢幕打飛了……"
21200-157 = "在搞什麼啊……來，你們看吧。我也是在手機上看了才趕過來的。"
21200-159 = "千年大賞．頒獎會場"
21200-160 = "千年大賞至今都是以「實用性」為核心，對學生們發揮才能和能力的作品進行評價。秉持著「追求更好的未來並加以實現」這一宗旨。"
21200-161 = "然而在這次的作品中，有一個作品讓我們從全新的角度感受到了「實用性」。#n某個「遊戲」讓我們回想起了令人懷念的過往時光，以及未來的可能性。"
21200-162 = "因此，我們破例做出了以下決定。"
21200-163 = "這次將增設「特別獎」，而獲獎的是……遊戲開發部的《故事．傳說．編年史２》。"
21200-164 = "咦，騙人的吧！？"
21200-165 = "發生什麼了……？"
21200-166 = "懷舊風這種超越時代的概念、不被常識束縛接二連三超越想像的展開、#n乍看之下不太適合的，不可思議的世界觀，一開始確實讓人有著一連串的困惑……"
21200-167 = "在新的世界裡旅行，一邊創造一個又一個新的羈絆，一邊去打倒魔王……"
21200-168 = "我認為這是個將RPG最核心的樂趣，完整包含在內的作品。"
21200-169 = "在遊玩的過程中，讓我清楚地想起了當初熱衷於遊戲的回憶。#n基於以上的評價，對這個作品……"
21200-171 = "授予本次千年大賞「特別獎」。"
21200-174 = "千年．遊戲開發部"
21200-175 = "咦……啊……"
21200-176 = "真的恭喜你們！那個，其實我也試著玩過了。#n雖然不能說是超級有趣……但是能感受到玩完一款好遊戲後的那種獨特的感覺。"
21200-178 = "桃桃，小綠！我也玩了《TSC2》唷，真的超有趣的！現在網路上也非常火熱唷！"
21200-179 = "根據貝里塔斯的調查，比起某些有名的偶像，搜尋《TSC2》的人更多呢！"
21200-180 = "真，真的嗎……？"
21200-183 = "我確認過了。"
21200-184 = "3小時前上傳的《故事．傳說．編年史２》，#n到剛才為止已經有7705次下載、以及1372則評論……"
21200-185 = "在千年大賞發表之後，在26秒內下載數就突破了1萬。"
21200-186 = "！？"
21200-187 = "評論也多了接近500個，從語言的感情來看，否定、疑惑的評論有242個，#n肯定、期待的評論有191個，其餘為無法辨認或是保留意見的評論。"
21200-188 = "呃，啊咧……？也就是說我們的遊戲……還是不太行嗎！？"
21200-189 = "不，我不這麼覺得。"
21200-190 = "柚子醬……？"
21200-191 = "……"
21200-192 = "……"
21200-193 = "你看，現在獲得最多同意的兩條最佳評論……"
21200-195 = "＜chicken：我一開始也想過到底要不要玩玩看……#n　但是我現在認為，能玩到這個遊戲真是太好了＞"
21200-196 = "＜Kotoha0507：一直以來我對千年都帶有偏見。＞"
21200-197 = "＜Kotoha0507：認為千年的學生就只有冷靜和合理性而已。但我可以斷言，#n　因為這次的千年大賞和《故事．傳說．編年史２》，這種偏見已經完全消失了＞"
21200-198 = "……！"
21200-199 = "那個……也就是說，我們不用被廢社了對吧！？"
21200-202 = "沒錯，就是這樣。啊，不過這也只是「臨時的處置」而已。#n畢竟不是正式的得獎，學生會決定到下學期為止……#n將遊戲開發部的活動室回收及廢社處分暫時「保留」。"
21200-203 = "呃，還有……"
21200-204 = "那個……"
21200-205 = "嗯？"
21200-206 = "……對，對不起。我說這裡的遊戲機是亂七八糟的東西……"
21200-207 = "多虧你們讓我想起了小時候玩過的各種遊戲。#n讓我久違地感受到了……在新的世界旅行的快樂。"
21200-208 = "……謝謝你們。那麼，因為要進行活動室延長的申請和社團經費的處理，#n你們忙完就來學生會辦公室一趟吧。等會見啦。"
21200-211 = "這，這樣就表示……！"
21200-212 = "……！"
21200-213 = "成……"
21200-214 = "成功啦啊啊啊！"
21200-215 = "太好了……！"
21200-216 = "成功了……真開心……！"
21200-218 = "？？？"
21200-219 = "那，那個……？"
21200-220 = "愛麗絲醬！我們得到了特別獎唷！這個地方也還會是我們的活動室！"
21200-221 = "那，也就是說……"
21200-222 = "愛麗絲之後也可以……和大家在一起的意思嗎……？"
21200-225 = "嗯！"
21200-228 = "之後也請多多指教囉……！"
21200-229 = "……"
21200-230 = "我也……我也好開心。"
21200-231 = "愛麗絲醬！！"
21200-232 = "我們……！！"
21200-233 = "之後也要永遠在一起喔！"
21200-234 = "……是！"
21200-238 = "之後也請多多指教……！"
21200-243 = "…………"
21200-244 = "數據恢復率98.00%"
21200-245 = "系統啟動……"
21200-246 = "準備完成"
21200-247 = "設定程式……"
21200-250 = "Divi:Sion……"
21200-251 = "……"
21200-253 = "[9b1e1e]AL-1S……[wa:3300]不……"
21200-255 = "[9b1e1e]愛 麗 絲……[wa:3300]我……"
21200-257 = "[9b1e1e]我，重要的…[wa:500]…[wa:500]…[wa:500]…[wa:1000]！@#$%$^&*（！@$！！"
21200-261 = "復古．浪漫"

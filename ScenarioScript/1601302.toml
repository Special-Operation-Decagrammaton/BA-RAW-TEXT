1601302-31 = "3;코하루 수영복;05;오늘만큼은 다르다고? 어른에게는 가끔 멍하니 있는 시간도 필요하다고……?"
1601302-32 = "3;코하루 수영복;05;평소와는 다른 곳이니까? 또 무슨 알 수 없는 말을……."

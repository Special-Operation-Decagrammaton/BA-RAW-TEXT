1601302-25 = "3;코하루 수영복;08;모모톡을 받았으니, 왜 왔는지 알고 있겠지?\n#3;em;[반응]"
1601302-26 = "3;코하루 수영복;07;이런 곳에서 혼자 뭐 하고 있었던 거야? 순순히 바른대로 이실직고해!"
1601302-27 = "3;코하루 수영복;02;응? 그냥 폭포를 보면서 쉬고 있었다고? 멍하게 폭포 물을 보고 있었다고?\n#3;em;[?]"
1601302-28 = "3;코하루 수영복;10;하! 누가 그런 말을 믿을 거 같아!?"
1601302-29 = "3;코하루 수영복;11;분명 언제나처럼, 수상한 상상을 하고 있었겠지? 그렇지? 내 말 맞지?\n#3;hophop"

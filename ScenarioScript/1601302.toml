[translation]
1601302-1 = "ภารกิจของโคฮารุ"
1601302-2 = "(คุณครูออกมานั่งพักอยู่ใกล้ๆ บริเวณน้ำตก)"
1601302-10 = "(ระหว่างที่คุณครูกำลังดื่มด่ำกับภาพวิวทิวทัศน์แสนสวย ก็ได้ยินเสียงฝีเท้าที่ดูเร่งรีบดังใกล้เข้ามา)"
1601302-14 = "[ns1] \"โคฮารุงั้นเหรอ...\"\n[ns2] \"มาถึงแล้วสินะ\""
1601302-22 = "อยู่ที่นี่เองเหรอ คุณครู!!"
1601302-25 = "อ่านข้อความ MOMOTALK แล้ว คงจะรู้ใช่มั้ยว่าฉันมาทำไมน่ะ?"
1601302-26 = "คุณครูมาทำอะไรคนเดียวในที่แบบนี้น่ะ? ตอบมาตามความสัตย์จริงด้วยล่ะ!"
1601302-27 = "หืม? ก็แค่มานั่งพักดูน้ำตกเฉยๆ งั้นเหรอ? มานั่งเหม่อฟังเสียงน้ำตกเฉยๆ แค่นั้นเอง?"
1601302-28 = "เฮอะ! ใครจะไปเชื่อคำพูดแบบนั้นได้ลงคอกันล่ะ!?"
1601302-29 = "คงมานั่งจินตนาการอะไรแปลกๆ เหมือนที่ชอบทำทุกทีใช่มั้ยล่ะ? ใช่มั้ย? ฉันพูดถูกใช่มั้ย?"
1601302-30 = "ว่าไงนะ? ไม่ใช่แบบนั้นจริงๆ งั้นเหรอ...?"
1601302-31 = "วันนี้ไม่เหมือนทุกครั้งงั้นเหรอ? บางครั้งผู้ใหญ่เองก็ต้องการเวลามานั่งเหม่อเฉยๆ แบบนี้บ้าง... อย่างงั้นเหรอ?"
1601302-32 = "เพราะที่นี่ต่างจากที่อื่นๆ งั้นเหรอ? พูดอะไรไม่รู้เรื่องอีกแล้ว..."
1601302-33 = "...เพราะว่านี่เป็นฤดูร้อน? เพราะเราอยู่กันที่เกาะ? พูดอะไรน่ะ ฉันไม่เห็นเข้าใจเลยสักนิด..."
1601302-34 = "อืม เดี๋ยวนะ... ฤดูร้อนแล้วก็เกาะ...งั้นเหรอ..."
1601302-38 = "งะ...งั้นเหรอ? หรือว่าจะเป็นแบบที่คุณครูพูดมาจริงๆ นะ?"
1601302-39 = "[s3] \"ใช่น่ะสิ สถานที่แล้วก็ช่วงเวลามันไม่เหมือนกันนี่นา\"\n[s4] \"ไว้โคฮารุก็จะรู้เองแหละ ถึงความสำคัญของเรื่องพวกนี้น่ะ...\""
1601302-42 = "ระ...เรื่องแบบนั้น...! ไม่มีทาง!"
1601302-43 = "คุณครูไม่คิดเรื่องแปลกๆ วิตถารงั้นเหรอ ฉันไม่เชื่อเรื่องแบบนั้นหรอก...!"
1601302-44 = "...หืม? แล้วฉันเป็นไงบ้างน่ะเหรอ? ทำไมจู่ๆ ถึงมาถามเรื่องนั้นล่ะ?"
1601302-45 = "ฤดูร้อนทั้งทีมีอะไรเปลี่ยนไปบ้างมั้ย...งั้นเหรอ? หืม? ให้ลองถามใจตัวเองดู?"
1601302-46 = "พะ...พูดอะไรเนี่ย?! ฉันมาที่นี่เพื่อจับตาดูคุณครูนะ! ถึงคุณครูจะอยู่ที่นี่ แต่งานของฉันก็ไม่มีอะไร#nเปลี่ยนไปหรอก!"
1601302-47 = "ฉันต้องคอยจับตาดูคุณครูไม่ให้ไปทำอะไรแปลกๆ กับนักเรียนคนอื่นๆ ในตอนที่เผลอไงล่ะ!"
1601302-48 = "อื้อ ใช่แล้ว! นั่นแหละหน้าที่ของฉันในฐานะสมาชิกชมรมทวงความยุติธรรม!!"
1601302-49 = "อืม... แต่ว่าตอนนี้คุณครูปฏิเสธว่าไม่ได้ทำอะไรแบบนั้น ซึ่งถ้าเรื่องนั้นเป็นความจริงละก็..."
1601302-53 = "แล้วฉันมาที่นี่ทำไมกัน? ทำไมฉันถึงมาอยู่ที่นี่ล่ะ...?"
1601302-54 = "[s5] \"เปลี่ยนเป็นคำถามเชิงปรัชญาไปซะแล้ว...\"\n[s6] \"ไม่เห็นต้องคิดเรื่องพวกนั้นให้ปวดหัวเลยนี่นา?\""
1601302-57 = "แต่ว่าจะมองข้ามไปแบบนั้นมันก็..."
1601302-58 = "...ว่าไงนะ?"
1601302-59 = "การมองข้ามๆ ไปก็ถือเป็นความพิเศษอย่างหนึ่งของฤดูร้อนงั้นเหรอ?"
1601302-60 = "อะไรกันน่ะ? พูดอะไรไม่เห็นเข้าใจเลย?"
1601302-61 = "ถะ...ถึงคิดจะทำให้ฉันดูเป็นเด็กไร้เดียงสาก็ไม่มีประโยชน์หรอกนะ คุณครู! ฉันไม่มีทางถูกหลอกง่ายๆ หรอกน่า!"
1601302-62 = "แต่... แต่ว่า..."
1601302-63 = "ดีละ เอาเป็นว่าฉันเข้าใจแล้วว่าตอนนี้คุณครูไม่ได้มาทำอะไรแปลกๆ ที่นี่ ฉันจะลองเชื่อดูก็แล้วกัน"
1601302-64 = "...หืม?"
1601302-65 = "มาตรวจสอบเสร็จแล้วก็จะกลับเลยรึเปล่าน่ะเหรอ?"
1601302-66 = "พะ...พูดอะไรอย่างนั้นกันเล่า!"
1601302-67 = "ใครจะกลับกัน? อย่ามาพูดเหมือนกับว่ารู้สึกรำคาญเวลาฉันอยู่ข้างๆ สิ!"
1601302-68 = "[s7] \"ครูไม่ได้หมายถึงแบบนั้นสักหน่อย...\"\n[s8] \"โคฮารุจะอยู่ตรงนี้ต่อก็ได้นะ ไม่เป็นไรเลย\""
1601302-71 = "อึก คิดแล้วเชียวว่าแปลกจริงๆ ด้วย ทำไมถึงต้องพยายามไล่ฉันไปด้วย? คิดจะทำอะไรแปลกๆ ตอนที่ฉันไม่อยู่ใช่มั้ย? ใช่มั้ยล่ะ?"
1601302-72 = "ฮึ่ม ถึงจะพูดอะไรฉันก็จะไม่หลงกลเด็ดขาด"
1601302-73 = "ไม่ว่าคุณครูจะทำอะไรอยู่ที่นี่ ฉันก็จะคอยนั่งจับตาดูอยู่ข้างๆ แบบนี้แหละ! คอยดูให้ดีแล้วกัน!"
1601302-78 = "...เอาละนะ!!"
1601302-79 = "[s9] \"ครูน่ะไม่เป็นไรหรอก แต่โคฮารุจะเบื่อรึเปล่า...\"\n[s10] \"ครูแค่กลัวว่าโคฮารุจะเบื่อน่ะ\""
1601302-82 = "อย่าพูดอะไรให้เหนื่อยเลย! หยุดพูดอะไรเรื่อยเปื่อยได้แล้ว!"
1601302-84 = "(หลังจากนั้นโคฮารุก็นั่งอยู่ข้างๆ คุณครูและเอาแต่มองคุณครูสลับกับมองไปรอบๆ...)"
1601302-91 = "(ทั้งสองคนใช้เวลาอย่างสบายๆ ด้วยกันแบบนั้น และรู้ตัวอีกทีเวลาก็ผ่านไปกว่าหนึ่งชั่วโมงแล้ว)"
1601302-92 = "(โคฮารุเผลอผล็อยหลับด้วยความเบื่อและเหนื่อยล้า...)"
1601302-95 = "― [log=코하루 수영복]...นี่...[/log][wa:220] "
1601302-98 = "― [log=코하루 수영복]...คุณครู...? จะนั่งอยู่แบบนี้จนถึงเมื่อไรน่ะ...?[/log][wa:1420] "
1601302-100 = "― [log=코하루 수영복]ไม่เห็นเข้าใจเลยว่าทำไปทำไม...[/log]"
1601302-103 = "[ns11] \"ถ้าเบื่อจะกลับไปก่อนก็ได้นะ\"\n[ns12] \"บางทีช่วงเวลาแบบนี้ก็จำเป็นสำหรับผู้ใหญ่เหมือนกันนะ\""
1601302-104 = "― [log=코하루 수영복]งั้นเหรอ... อืม...[/log][wa:1420] "
1601302-105 = "― [log=코하루 수영복]งั้นเหรอ... อืม...[/log][wa:1420] "
1601302-107 = "― [log=코하루 수영복]ถ้างั้นฉันกลับดีมั้ยนะ...[/log][wa:70] "
1601302-110 = "― [log=코하루 수영복]...เฮือก!![/log]"
1601302-113 = "― [log=코하루 수영복](ไม่สิ ไม่ๆ ไม่ได้สิ!)[/log]"
1601302-115 = "― [log=코하루 수영복](ฉันคิดอะไรอยู่เนี่ย!)[/log]"
1601302-118 = "― [log=코하루 수영복](อันตรายจริงๆ! เกือบถูกคุณครูหลอกซะแล้ว)[/log][wa:1110] "
1601302-121 = "― [log=코하루 수영복](ดันเผลอไม่ระวังตัวไปซะแล้ว...)[/log]"
1601302-123 = "― [log=코하루 수영복](ไม่ได้... ไม่ได้เด็ดขาด!)[/log][wa:20] "
1601302-126 = "― [log=코하루 수영복]คิดจะทำให้ฉันประมาทงั้นเหรอ ไม่ได้ผลหรอกน่า![/log][wa:830] "
1601302-129 = "― [log=코하루 수영복]...ฮึ่ม![/log]"
1601302-133 = "(โคฮารุตั้งใจฮึดสู้ใหม่ และเริ่มต่อสู้กับความน่าเบื่อที่เจอ... แต่ว่า...)"
1601302-139 = "(ไม่นานนัก... เธอก็ผล็อยหลับไปและกรนออกมาเบาๆ...)"
1601302-143 = "(หลังจากดื่มด่ำกับช่วงเวลาพักผ่อนจนเต็มอิ่ม คุณครูก็อุ้มโคฮารุที่หลับสนิทกลับไปที่แคมป์)"

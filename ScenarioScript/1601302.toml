1601302-43 = "3;코하루 수영복;08;이상한 생각을 하지 않는 선생님이라니. 그런 건 한 번도 생각해 본 적 없었는데……!"
1601302-44 = "3;코하루 수영복;02;……응? 나는 어떠냐고? 갑자기 그건 왜 물어보는 거야?\n#3;em;[?]"
1601302-45 = "3;코하루 수영복;01;여름이니까 달라진 게 없냐고? 마음속으로 한 번쯤 생각해 보라고?"
1601302-46 = "3;코하루 수영복;08;무 무슨 소리야!? 나는 당연히 선생님을 감시하러 온 거잖아! 여기에 있다고 해서 그게 달라질 순 없어!\n#3;hophop"
1601302-47 = "3;코하루 수영복;20;내가 안 보는 사이에 다른 학생들에게 엉뚱한 짓을 하지 못하게 해야 하니까!"
1601302-48 = "3;코하루 수영복;18;응, 맞아! 정의실현부로서, 그게 나의 사명이니까!!\n#3;em;[반짝]"

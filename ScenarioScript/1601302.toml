[translation]
1601302-1 = "Koharu's Duty"
1601302-2 = "I came out to the waterfall to enjoy some rare time to myself."
1601302-10 = "While I was taking in the sights and sounds, I could hear someone running towards me."
1601302-14 = "[ns1] \"It must be Koharu...\"\n[ns2] \"So the time has come.\""
1601302-22 = "There you are, Sensei!"
1601302-25 = "Did you read my MomoTalk message? I know you did!"
1601302-26 = "Tell me the truth, right now! What are you doing here alone?"
1601302-27 = "Huh? Relaxing? Enjoying some alone time?"
1601302-28 = "Ha! A likely story!"
1601302-29 = "I know you! You've come here to daydream about all the weird stuff you like, haven't you?!"
1601302-30 = "...What? You promise you weren't?"
1601302-31 = "At least not today? Even adults need time to relax here and there?"
1601302-32 = "Especially in a brand new environment? You're losing me..."
1601302-33 = "...Because it's the summer? On an island? I don't get it at all..."
1601302-34 = "Hm... It's summer break, on an island..."
1601302-38 = "R-Really? You're just enjoying yourself?"
1601302-39 = "[s3] \"It's a different time, different place.\"\n[s4] \"You'll learn how to treasure moments like these soon.\""
1601302-42 = "B-But...! I don't believe it!"
1601302-43 = "The Sensei I know is always thinking about weird things! It's not possible!"
1601302-44 = "...Huh? What about me? Why do you ask?"
1601302-45 = "Why would I have changed at all just because it's summer? No! I don't want to reflect, thank you very much!"
1601302-46 = "You keep talking nonsense, Sensei! My job here is to keep an eye on you, plain and simple!"
1601302-47 = "I'm your chaperone to make sure you don't do anything weird to the other students!"
1601302-48 = "It's my duty as a part of the Justice Task Force!"
1601302-49 = "Hm. But if you're really not being a weirdo, and you're being honest..."
1601302-53 = "Then what's the point of me being here? Why...am I standing here?"
1601302-54 = "[s5] \"What a philosophical question.\"\n[s6] \"There's no need to overthink it.\""
1601302-57 = "But, I can't just go about my day..."
1601302-58 = "...What?"
1601302-59 = "Not overthinking things is a part of summer too? "
1601302-60 = "More nonsense! Augh!"
1601302-61 = "Do you think I'm a dummy, Sensei?! I'll punish you for insubordination!"
1601302-62 = "Well... I guess..."
1601302-63 = "Fine. I suppose I'll believe in your words this one time, Sensei."
1601302-64 = "Huh?"
1601302-65 = "Will I go back to camp now, then?"
1601302-66 = "D-Don't be ridiculous!"
1601302-67 = "A-And why are you asking that anyway? You're treating me like a nuisance!"
1601302-68 = "[s7] \"That's not really what I meant...\"\n[s8] \"You can stay here if you'd like.\""
1601302-71 = "I figured it out! You're trying so hard to get rid of me, so that you can go about your evil deeds as soon as I turn my back!"
1601302-72 = "Hmph! I'm a member of the Justice Task Force! You can't get anything by me!"
1601302-73 = "I'm not moving a single inch! I'm watching your every move, Sensei."
1601302-78 = "...There!"
1601302-79 = "[s9] \"I mean I really don't mind...\"\n[s10] \"You're going to get real bored soon.\""
1601302-82 = "There's nothing you can say to change my mind!"
1601302-84 = "And so Koharu really spent the rest of the day sitting next to me, looking here and there."
1601302-91 = "As I spent my rare free time relaxing, an hour passed by before I noticed."
1601302-92 = "Glancing over at Koharu, she was exhausted and spacing out herself."
1601302-95 = "― [log=코하루 수영복]...Um...[/log][wa:260] "
1601302-98 = "― [log=코하루 수영복]Sensei...? How long are you going to be here? [/log][wa:1540] "
1601302-100 = "― [log=코하루 수영복]I just don't get it...[/log]"
1601302-103 = "[ns11] \"You can go back if you're too bored.\"\n[ns12] \"Adults need moments like this in life.\""
1601302-104 = "― [log=코하루 수영복]Is that so...[/log][wa:1620] "
1601302-105 = "― [log=코하루 수영복]Is that so...[/log][wa:1620] "
1601302-107 = "― [log=코하루 수영복]Maybe I should go back...[/log][wa:70] "
1601302-110 = "― [log=코하루 수영복]...Wait![/log]"
1601302-113 = "― [log=코하루 수영복](No, no no!)[/log]"
1601302-115 = "― [log=코하루 수영복](What am I saying?!)[/log]"
1601302-118 = "― [log=코하루 수영복](Not good! Sensei's trying to trick me.)[/log][wa:1110] "
1601302-121 = "― [log=코하루 수영복](I almost lowered my guard...)[/log]"
1601302-123 = "― [log=코하루 수영복](No, I can't let that happen!)[/log][wa:10] "
1601302-126 = "― [log=코하루 수영복]I won't let you get under my skin![/log][wa:1230] "
1601302-129 = "― [log=코하루 수영복]...Hmph![/log]"
1601302-133 = "Koharu sat a little straighter and resumed her battle against her boredom."
1601302-139 = "It didn't take long for her to lose the fight, and she was contentedly snoring away."
1601302-143 = "I enjoyed my quiet time by the waterfall for a little longer, and then carried the still sleeping Koharu back to camp."

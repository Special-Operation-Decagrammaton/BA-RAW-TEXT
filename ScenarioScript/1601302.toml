[translation]
1601302-1 = "小春的使命"
1601302-2 = "（為了享受獨自的休息時間而來到瀑布附近……）"
1601302-10 = "（在傾聽瀑布的聲響時，傳來了一陣急促的腳步聲）"
1601302-14 = "[ns1]「是小春嗎……」\n[ns2]「終於來了嗎。」"
1601302-22 = "總算找到你了，老師！！"
1601302-25 = "既然你收到MomoTalk了，應該知道我為什麼來吧？"
1601302-26 = "一個人在這種荒無人煙的地方做什麼？#n快從實招來！"
1601302-27 = "嗯？只是看著瀑布休息發呆？"
1601302-28 = "哼！誰會相信那種話啊！？"
1601302-29 = "八成是跟平常一樣在想些奇怪的事吧？#n是不是？我說的沒錯吧？"
1601302-30 = "什麼？今天真的不是……？"
1601302-31 = "大人有時會需要獨處的時間……？"
1601302-32 = "因為是不同於往常的地方？#n又說些莫名其妙的話……"
1601302-33 = "……因為是夏天？因為是島？#n完全聽不懂你在說什麼……"
1601302-34 = "唔嗯……夏天……島嶼……"
1601302-38 = "真的……會那樣嗎？"
1601302-39 = "[s3]「沒錯，因為時間和場所都改變了。」\n[s4]「小春總有一天也會明白的。」"
1601302-42 = "什，什麼……！最好會啦！"
1601302-43 = "老師怎麼可能會沒在想奇怪的事……！"
1601302-44 = "……嗯？我覺得怎麼樣？#n為什麼突然這麼問？"
1601302-45 = "來到這裡之後有沒有什麼改變？#n要我用心思考看看？"
1601302-46 = "什，什麼意思！？#n我的目的是要監視老師！不會因為在哪裡而有所改變！"
1601302-47 = "可不能讓你在我不注意的時候又做出什麼奇怪的事！"
1601302-48 = "嗯，沒錯！這就是我身為實現正義部一員的使命！！"
1601302-49 = "唔嗯……不過今天的老師好像跟平時不太一樣……"
1601302-53 = "那……我又為何要來到這裡？我為什麼在這裡……？"
1601302-54 = "[s5]「突然變成一個很哲學的問題呢。」\n[s6]「沒必要想得那麼複雜吧？」"
1601302-57 = "可是總不能那麼含糊就……"
1601302-58 = "……咦？"
1601302-59 = "含糊也是夏天的特性？"
1601302-60 = "你是不是覺得把什麼都推給夏天就行了？"
1601302-61 = "想，想那樣騙我也是沒用的，老師！#n我絕對不會被你騙的！"
1601302-62 = "唔……不過……"
1601302-63 = "好吧。我知道老師現在沒在做奇怪的事了，姑且先相信你吧。"
1601302-64 = "……嗯？"
1601302-65 = "問我既然已經確認完了要不要先回去？"
1601302-66 = "說，說什麼傻話！！"
1601302-67 = "話說居然叫我回去……好像我在你身邊很煩一樣！"
1601302-68 = "[s7]「我完全沒有那個意思……」\n[s8]「要繼續待著當然也沒問題。」"
1601302-71 = "真，真可疑……感覺就想要我趕快回去嘛。#n是不是我一離開就想做奇怪的事？"
1601302-72 = "哼，無論你說什麼我都不會受騙。"
1601302-73 = "不管老師在這裡做什麼，我都會坐在旁邊盯著你的！"
1601302-78 = "……覺悟吧！！"
1601302-79 = "[s9]「我是無所謂啦……」\n[s10]「但你可能會很無聊哦。」"
1601302-82 = "不管你說什麼都沒用！別打歪主意！"
1601302-84 = "（於是小春便在身旁坐下並開始環顧四周）"
1601302-91 = "（邊感受自然邊放鬆休息，不知不覺就過了一個小時……）"
1601302-92 = "（往身旁一看，覺得無聊的小春已經呆坐在一旁）"
1601302-95 = "― [log=코하루 수영복]……那個……[/log][wa:340] "
1601302-98 = "― [log=코하루 수영복]……老師……就是……你要這樣到什麼時候……？[/log][wa:2500] "
1601302-100 = "― [log=코하루 수영복]無法理解……[/log]"
1601302-103 = "[ns11]「覺得無聊可以先回去沒關係哦。」\n[ns12]「對大人來說，有時候這種時間是很珍貴的。」"
1601302-104 = "― [log=코하루 수영복]是嗎……嗯……[/log][wa:1860] "
1601302-105 = "― [log=코하루 수영복]是嗎……嗯……[/log][wa:1860] "
1601302-107 = "― [log=코하루 수영복]那，我就回去吧……[/log][wa:710] "
1601302-110 = "― [log=코하루 수영복]……哈！！[/log]"
1601302-113 = "― [log=코하루 수영복]（不行不行不行！）[/log]"
1601302-115 = "― [log=코하루 수영복]（我剛才在說什麼啊！）[/log]"
1601302-118 = "― [log=코하루 수영복]（好險！差點又被老師騙了）[/log][wa:2190] "
1601302-121 = "― [log=코하루 수영복]（居然放鬆了警戒……）[/log]"
1601302-123 = "― [log=코하루 수영복]（不行，絕對不行！）[/log][wa:660] "
1601302-126 = "― [log=코하루 수영복]就算想讓我大意也是沒用的！[/log][wa:2070] "
1601302-129 = "― [log=코하루 수영복]……哼！[/log]"
1601302-133 = "（於是小春便重整旗鼓，再度開始與無聊奮戰……）"
1601302-139 = "（……然而沒過多久便聽見了陣陣平靜的呼吸聲）"
1601302-143 = "（再多享受了一下大自然的療癒後，背著睡著的小春回到了營地）"

[translation]
10047040-1 = "ตอนที่ 4;เจ้าของเสียงก็คือ..."
10047040-4 = "(หลังจากวิ่งมาสักพัก ทุกคนก็มาถึงใจกลางโรงเรียน)"
10047040-5 = "[ns] \"ฮู่ว... วิ่งจนปวดขาเลย...\""
10047040-6 = "ค่ะ ถ้าเป็นตรงนี้ก็น่าจะปลอดภัยแล้วค่ะ"
10047040-7 = "อุฮุฮุ <สิ่งเลวร้าย> คงคลาดกับพวกเราแล้วละค่ะ"
10047040-8 = "เฮ้อ จริงๆ เลย! เอาแต่พูดแบบนี้ เดี๋ยวคุณครูก็เข้าใจผิดกันพอดี!"
10047040-9 = "[ns1] \"ว่าแต่... ที่ครูเห็นในพิพิธภัณฑ์เมื่อกี้คืออะไรเหรอ?\"\n[ns2] \"เมื่อกี้รูปปั้นปีศาจขยับได้เองจริงๆ เหรอ?\""
10047040-12 = "มันคือปรากฏการณ์ทางจิตวิญญาณ... ที่เรียกว่าโพลเทอร์ไกสต์น่ะ"
10047040-13 = "ฮิฮิ... ระวังไว้ล่ะ...#nเจ้าของรูปปั้นปีศาจ... จำคุณครูไว้แล้วนะ"
10047040-14 = "โพลเทอร์ไกสต์อะไรกัน! ฐานรูปปั้นมันขยับตามแรงสั่นสะเทือนจากเสียงดังต่างหากล่ะ!"
10047040-15 = "[s] \"หืม? เป็นอย่างนั้นหรอกเหรอ?\""
10047040-16 = "ฮุฮุ... จุดนี้ให้คุณครูใช้วิจารณญาณเอาเองดีกว่าค่ะ"
10047040-20 = "พูดออกมาได้หน้าตาเฉยเลย! นี่มันเรื่องหลอกลวงกันชัดๆ!"
10047040-21 = "โลกนี้ไม่มีสิ่งที่เรียกว่าปีศาจหรือเวทมนตร์หรอกนะ!"
10047040-22 = "[s] \"เรนะดูไม่เชื่อเรื่องรหัสยศาสตร์จริงๆ เลยนะ\""
10047040-26 = "เฮ้อ... ฉันละสงสารตัวเองที่ต้องมาอยู่กับรุ่นพี่ที่เชื่อเรื่องงมงายอะไรแบบนี้"
10047040-27 = "ทำไมฉันถึงมาเจอกับคนประหลาดพวกนี้ได้นะ..."
10047040-28 = "[s] \"แล้วมาเจอกันได้ยังไงเหรอ?\""
10047040-29 = "ก็ฉันดันได้มาอยู่หอพักห้อง 404 ไงล่ะ#nนี่ละเหตุผลทั้งหมด"
10047040-30 = "นักเรียนทั่วไปอย่างพวกเราน่ะไม่มีทางเลือกหรอก พวกเราทุกคนต้องทำตามการตัดสินใจของสภาฯ"
10047040-34 = "อ้อ สภาฯ ที่ฉันว่า..."
10047040-36 = "มีชื่ออย่างเป็นทางการว่า <สภาศิลปะ>"
10047040-37 = "เป็นองค์กรที่ตัดสินและจัดระดับคุณค่าทางศิลปะของงานศิลปะตามมาตรฐานที่เข้มงวด คงจะคล้ายๆ สภานักเรียนของโรงเรียนอื่นน่ะ"
10047040-38 = "<ฝ่ายดูแลหอพัก> ที่เจอตรงด่านตรวจหน้าโรงเรียนก็อยู่ภายใต้สภาศิลปะเหมือนกัน#nพวกนั้นก็เลยมีอำนาจล้นเหลือเลยละ"
10047040-40 = "แล้วพวกนั้นก็เป็นคนจัดนักเรียนเข้าหอพักด้วย#nจะให้ฉันไปบอกว่า <ฉันไม่ชอบรูมเมท ช่วยเปลี่ยนห้องให้หน่อยนะคะ> ก็คงไม่ได้"
10047040-41 = "ในสถานการณ์แบบนี้ สิ่งที่ฉันทำได้มีเพียงอย่างเดียว"
10047040-42 = "นั่นก็คือการทำให้รูมเมทที่ไม่ปกติกลับมาเป็นคนปกติยังไงล่ะ#nชีวิตของฉันจะได้กลับมาเป็นปกติเหมือนกัน!"
10047040-43 = "[s] \"อ้อ เรนะเป็นเด็กที่เอาใจใส่เพื่อนๆ สินะ!\""
10047040-47 = "ทำไมถึงเป็นแบบนั้นกันนะ?!"
10047040-48 = "คอยดูแล้วกัน! ฉันจะทำให้ทุกคนตาสว่างจากเรื่องรหัสยศาสตร์ลึกลับอะไรนี่เอง!"
10047040-49 = "ความมุ่งมั่นแบบนั้น... ถูกใจฉันจัง..."
10047040-50 = "การเผยแพร่รหัสยศาสตร์ให้เด็กอย่างเรนะจังรู้จักคือความสุขของฉันเลยละ..."
10047040-51 = "ฮึ่ม คิดว่าฉันจะโดนหลอกง่ายๆ เหรอ? ฉันไม่หลงเชื่อเรื่องงมงายแบบนั้นหรอก!"
10047040-52 = "ฮิฮิ... ดีมาก... ต้องอย่างนี้ละ..."
10047040-58 = "เอาละ งั้นเราไปสถานที่ต่อไปกันเถอะค่ะ ที่ต่อไปตามการชี้นำของอาร์คาน่าก็คือ..."
10047040-63 = "โอ้โฮแฮะ ที่นี่มัน?"
10047040-68 = "ให้ไปที่นั่นสินะ..."
10047040-69 = "ทุกคนตามฉันมาได้เลย ฮิฮิ..."
10047040-71 = "ถนนศิลปะ ไวลด์ฮันต์"
10047040-73 = "ที่นี่ก็คือถนนสายหลักของ <ศิลปะ>..."
10047040-74 = "เป็นพื้นที่จัดแสดงประติมากรรมที่เก่าแก่ที่สุดในไวลด์ฮันต์..."
10047040-75 = "ผลงานเหล่านี้... คือผลงานของเหล่าศิลปินระดับตำนานเลยละ..."
10047040-76 = "ใช่ค่ะ! โดยเฉพาะน้ำพุตรงนั้นที่เป็นผลงานของปรมาจารย์ 'เล็พเพิร์ด เดอะ พินช์' ถือเป็นน้ำพุที่มีประวัติศาสตร์คล้ายคลึงกับไวลด์ฮันต์เลยค่ะ!"
10047040-77 = "[s] \"โอ้... ครูก็เคยเห็นน้ำพุนี้จากในแคตตาล็อกเหมือนกัน\""
10047040-78 = "อุฮุฮุฮุ สถานที่ที่ตำนานยังหายใจอยู่... ย่อมต้องมีเรื่องราวลึกลับซ่อนอยู่ค่ะ!"
10047040-79 = "ไม่ต้องมีก็ได้...!"
10047040-83 = "[ns] \"ตรงนี้มีเรื่องราวแบบไหนเหรอ?\""
10047040-84 = "นานมาแล้ว มีศิลปินไร้ศีลธรรมกลุ่มหนึ่งละเมิดข้อห้ามเพราะอยากให้ผลงานของตัวเองมีชีวิตขึ้นมาค่ะ"
10047040-85 = "สิ่งที่พวกเขาทำก็คือ... การฝังสิ่งมีชีวิตไว้ในรูปปั้นหิน...!"
10047040-86 = "และรูปปั้นบางส่วนก็ซ่อนอยู่บนถนนสายนี้ค่ะ ว่ากันว่า... บางครั้งจะได้ยินเสียงกระซิบของวิญญาณ#nอาฆาตด้วยนะคะ"
10047040-87 = "เพ้อเจ้อน่า! รูปปั้นพวกนี้ทำมาจากการแกะสลักหินอ่อนต่างหาก! จะไปฝังอะไรไว้ข้างในได้ยังไงกัน!"
10047040-88 = "หรือว่าเป็นการฉาบปูนบนสิ่งมีชีวิตอีกทีคะ?"
10047040-89 = "ใครจะไปทำเรื่องพรรค์นั้นกันเล่า!"
10047040-90 = "แล้วเสียงกระซิบของวิญญาณอาฆาตล่ะคะ?"
10047040-91 = "คงเป็นเสียงร้องไห้กระซิกๆ ของเด็กที่สอบตกน่ะสิ!"
10047040-92 = "ฮิฮิ... งั้นก็มาพิสูจน์ให้เห็นกันเลยดีกว่า..."
10047040-93 = "ว่ามันเป็นแค่เรื่องเล่าหลอกลวง..."
10047040-97 = "หรือว่ามันมีวิญญาณอยู่จริงๆ"
10047040-102 = "เราจะแยกกันไปตรวจสอบว่ามีเสียงออกมาจากรอบๆ รูปปั้นหินจริงหรือเปล่า"
10047040-103 = "แล้วกลับมาเจอกันตรงนี้อีกครั้งใน 10 นาทีนะคะ"
10047040-104 = "ดีค่ะ! งั้นก็ไปกันเลยค่ะ!!"
10047040-111 = "ฮะ... ฮึ่ม! คิดว่าฉันจะกลัวหรือไง?"
10047040-115 = "อะไรน่ะ...?  แล้วทำไมคุณครูไม่ไปด้วยล่ะ ทำไมยังอยู่ตรงนี้อยู่อีก?"
10047040-116 = "[s3] \"ที่จริงครูก็กลัวเหมือนกัน...\"\n[s4] \"ครูไม่ค่อยรู้จักสถานที่ดีน่ะ\""
10047040-119 = "เฮอะ ขี้ขลาดสินะ"
10047040-120 = "กะ... ก็ได้ งั้นก็ไปกับฉันแล้วกัน"
10047040-121 = "ถ้าเกิดอะไรขึ้นก็ไม่ต้องตกใจล่ะ มันเป็นเรื่องเหลวไหลทั้งนั้น เข้าใจมั้ย?"
10047040-122 = "[s] \"เรนะก็อยู่ข้างๆ ครูไว้ล่ะ\""
10047040-123 = "ยะ... อย่าทำเหมือนฉันเป็นเด็กน้อยสิ! ฉันไม่กลัวเลยจริงๆ นะ!"
10047040-125 = "(แล้วคุณครูกับเรนะก็เริ่มเดินสำรวจรอบๆ รูปปั้นหินด้วยกัน)"
10047040-132 = "เฮอะ ก็มีแค่เสียงลมนี่นา? ไหนว่าเป็นเสียงกระซิบของวิญญาณอาฆาตไง..."
10047040-134 = "[log=???][ff4444]เอาฉันออกไปที... ฉันอยากออกไป... จากที่นี่...[-][/log]"
10047040-138 = "อะ... อะไรน่ะ? เมื่อกี้เสียงคุณครูใช่มั้ย?"
10047040-139 = "[s] \"เฮือก! ครูก็ไม่รู้!\""
10047040-140 = "เมื่อกี้ฉันได้ยินจริงๆ นะ! แล้วมันก็เป็นเสียงแปลกๆ ด้วย...!!"
10047040-141 = "[ns] \"นะ... นี่มันเรื่องอะไรกันน่ะ...?!\""
10047040-143 = "[log=???][ff4444]ฉันจะสาป...[-][/log]"
10047040-144 = "[log=???][ff4444]ฉันจะสาปแช่งพวกนั้น... ที่ทำให้ฉันเป็นอย่างนี้...[-][/log]"
10047040-147 = "ฮะ... เฮือกก?!"
10047040-148 = "ระ... รุ่นพี่คาโนเอะ! รุ่นพี่ใช่มั้ย?! นอกจากรุ่นพี่แล้วก็ไม่มีใครมาแกล้งอะไรแบบนี้หรอกนะ...!!"
10047040-158 = "ฮิฮิ... โดนจับได้จนได้"
10047040-159 = "เฮ้อ จริงๆ เลย! กะไว้แล้วเชียวว่าต้องเป็นแบบนี้!"
10047040-161 = "[log=???][ff4444]เอาฉันออกไปที... ขอร้องละ... พาฉันออกไป...[-][/log]"
10047040-164 = "เอ๋...? อันนี้ฉันไม่ได้พูดนะ?"
10047040-166 = "เฮือกก?!"
10047040-167 = "ตะ... แต่เสียงดังมาจากจุดที่รุ่นพี่อยู่นะ...!"
10047040-168 = "ฉันไม่ได้เปิดปากพูดอะไรเลย..."
10047040-170 = "[log=???][ff4444]ใช่แล้ว... ไม่ใช่เด็กคนนั้นหรอก...[-][/log]"
10047040-173 = "คะ... ใครน่ะ! ใครมาแกล้งพูด บอกมานะ!"
10047040-175 = "[log=???][ff4444]หาไม่เจอละสิ? แบร่... แบร่...[-][/log]"
10047040-178 = "เหวอออ! อย่ามาแกล้งกันนะ!!"
10047040-183 = "อยู่ตรงนี้เหรอ? อึก... ตรงนี้ก็ไม่ใช่...!"
10047040-188 = "อะ... อะ... ออกมาเดี๋ยวนี้นะ!"
10047040-192 = "กา! กาาา!"
10047040-193 = "อะ... อีกาหรอกเหรอ...?"
10047040-194 = "หรือบางที... อาจเป็นเสียงของอีกาก็ได้"
10047040-195 = "ถ้าฝึกฝนดีๆ อีกาก็พูดเลียนเสียงมนุษย์ได้นะ..."
10047040-196 = "คิดว่าฉันแยกแยะเสียงนกกับเสียงคนไม่ได้หรือไง?!"
10047040-198 = "(ถึงจะตามหาเจ้าของเสียงอยู่นาน แต่ก็ไม่ได้คำตอบว่าเป็นเสียงของใคร...)"
10047040-200 = "คะ? ได้ยินเสียงของวิญญาณอาฆาตจริงๆ เหรอคะ...?"
10047040-201 = "ฮุฮุ พูดว่า 'แบร่' ด้วยเหรอคะ? เป็นวิญญาณที่น่ารักจริงๆ เลย"
10047040-202 = "ก็บอกว่ามีคนแกล้งไงเล่า!"
10047040-203 = "ฮิฮิ... ฮิฮิฮิ..."
10047040-204 = "[s] \"ทั้งหมดเป็นฝีมือคาโนเอะใช่มั้ย...?\""
10047040-205 = "ไม่รู้สิ..."
10047040-206 = "[s5] \"เปลี่ยนเสียงได้อิสระตามทักษะการพากย์เสียง...\"\n[s6] \"งั้นวิชาเอกของคาโนเอะก็คงเป็น...\""
10047040-209 = "เป็นความลับ... ไว้สักวันฉันจะบอกนะ"
10047040-210 = "ฮิฮิ... ฮิฮิฮิ...!"
10047040-211 = "[s] \"อะ... เอางั้นสินะ...\""
10047040-212 = "งั้นเราไปสถานที่อื่นกันเถอะ... ฉันอยากให้ครูเห็นหลายอย่างเลย..."
10047040-217 = "(หลังจากนั้นคุณครูก็เดินชมจุดต่างๆ ในไวลด์ฮันต์กับทุกคน)"
10047040-219 = "ห้องเรียน ไวลด์ฮันต์"
10047040-222 = "สวน ไวลด์ฮันต์"
10047040-225 = "ศูนย์ข้อมูลศิลปะ ไวลด์ฮันต์"
10047040-228 = "หอประชุม ไวลด์ฮันต์"
10047040-231 = "(นอกจากนี้ก็ได้ไปสถานที่อื่นๆ)"
10047040-233 = "ว่าไงล่ะคะคุณครู เป็นยังไงบ้าง? สนุกกับการทัวร์โรงเรียนมั้ยคะ?"
10047040-234 = "[s] \"อื้อ! ครูสนุกจนแทบลืมเวลาเลย!\""
10047040-235 = "อุฮุฮุ แค่นี้ยังไม่หนำใจหรอกค่ะ ยังมีไฮไลท์เหลืออยู่อีกนะคะ"
10047040-236 = "กิจกรรมสุดท้ายของการทัวร์โรงเรียนตามการชี้นำของอาร์คาน่าก็คือ..."
10047040-237 = "การอัญเชิญปีศาจด้วยวงเวทค่ะ!"
10047040-238 = "[s] \"หมายถึง... ปีศาจของจริงใช่มั้ย?\""
10047040-239 = "ใช่แล้ว... ต้องเป็นของจริงสิ"
10047040-240 = "เมี้ยว! เมี้ยววว!"
10047040-241 = "กา! กาาา!"
10047040-242 = "เห็นมั้ยล่ะ... เด็กพวกนี้ก็บอกว่าเป็นของจริงเหมือนกัน"
10047040-243 = "ถ้าภูตรับใช้ของรุ่นพี่ว่าอย่างนั้น ก็ไม่มีทางผิดพลาดค่ะ"
10047040-244 = "เรื่องนี้เป็นสิ่งที่โชคชะตากำหนดไว้แล้ว เราหลีกเลี่ยงไม่ได้หรอกค่ะ"
10047040-246 = "ฮิฮิ... ฮิฮิฮิ..."
10047040-247 = "อุฮุ... อุฮุฮุฮุ!"
10047040-248 = "ขอร้องละ อย่าลากฉันไปเกี่ยวด้วยเลย..."
10047040-250 = "(เมื่อเห็นว่าเด็กๆ ชมรมวิจัยรหัสยศาสตร์ดูมีความสุข คุณครูก็คิดว่าต่อไปจะแกล้งอะไรทุกคนดี)"

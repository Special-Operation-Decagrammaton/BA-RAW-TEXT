[translation]
10047040-1 = "Episode 4;The Bearer of the Voice..."
10047040-4 = "We ran to the center of the school."
10047040-5 = "[ns] \"Phew... That was...quite the sprint...\""
10047040-6 = "Yes. We should be safe here."
10047040-7 = "Nyufufu. We've surely lost the Accursed."
10047040-8 = "Ah, stop being so dramatic! You're confusing Sensei by talking like that!"
10047040-9 = "[ns1] \"Come to think of it... What actually happened at the gallery?\"\n[ns2] \"How did the demon statue move on its own?\""
10047040-12 = "Through a paranormal phenomenon...called a poltergeist."
10047040-13 = "Heehee... Watch out... The ghost of the demon statue...will remember you, Sensei."
10047040-14 = "What poltergeist?! The demon statue moved because all that screaming shook the pedestal!"
10047040-15 = "[s] \"Huh? Is that what it was?\""
10047040-16 = "Heh... You can believe whatever you want."
10047040-20 = "Look at that shameless face! This is all a hoax! A joke!"
10047040-21 = "There's no such thing as demons...or magic!"
10047040-22 = "[s] \"I gather that you don't believe in the occult.\""
10047040-26 = "*sigh*...No. I'm just doomed to room with a bunch of seniors obsessed with it."
10047040-27 = "What did I do to deserve this?"
10047040-28 = "[s] \"How DID you all meet?\""
10047040-29 = "I was assigned Dorm 404. That's it."
10047040-30 = "Students like us don't have a say. The Assembly decided to stick me with these three, and that was that."
10047040-34 = "Ah, the Assembly is..."
10047040-36 = "The official title is the Assembly of Arts."
10047040-37 = "They're an organization that determines our work's artistic merit based on...very strict categories. I guess you could think of them as a student council."
10047040-38 = "You met the Prefectural Council at the inspection point, right? They answer to the Assembly too. The Assembly has absolute, unquestionable power."
10047040-40 = "They're the ones who determine the dorm assignments. I can't go up to them and say, \"Oh, I don't mesh with my roommates.\" They don't care!"
10047040-41 = "Clearly, there's only one thing I can do in this situation."
10047040-42 = "...And that's making these weirdos stop being freaks! Then I can finally have a normal school life!"
10047040-43 = "[s] \"Aha, I see! You're looking out for your friends!\""
10047040-47 = "Excuse me? Where'd you get that idea from?"
10047040-48 = "You just wait and see. I'll make all three of them open their eyes to the truth!"
10047040-49 = "Such spirit... I like it..."
10047040-50 = "It is a sincere joy to spread the glory of the occult to juniors like Rena..."
10047040-51 = "Hmph, you think you can fool me? I'm immune to hoaxes!"
10047040-52 = "Heehee... Good... That's the spirit..."
10047040-58 = "Now, let's move on to the next location. The cards tell me that we should next head to..."
10047040-63 = "Oho, interesting..."
10047040-68 = "So we're going there..."
10047040-69 = "Everyone, follow me. Heehee..."
10047040-71 = "Wildhunt Art Street"
10047040-73 = "This, our main street, is dedicated to art..."
10047040-74 = "You can see that Wildhunt's oldest sculptures adorn the way..."
10047040-75 = "Every work was done not only by an artist...but a legend..."
10047040-76 = "Yes! The relief and design on this fountain were constructed by 'Leopardo・Da・Pinci,' and it's almost as old as Wildhunt itself!"
10047040-77 = "[s] \"Oh... I think I saw this in a magazine once.\""
10047040-78 = "Nyuhuhuhu. And, since so many great artistic works are here, of course there are plenty of stories about the occult!"
10047040-79 = "Oh, please don't...!"
10047040-83 = "[ns] \"Hmm. What kind of stories?\""
10047040-84 = "Long ago, some immoral artists broke taboo and attempted to bring their works to life!"
10047040-85 = "They encased living people inside their sculptures, believe it or not!"
10047040-86 = "Many of those sculptures are on this very street. So...some say...you can hear the whispers of tormented ghosts inside the statues!"
10047040-87 = "What are you talking about? Sculptures are made by carving marble. You can't just put someone inside!"
10047040-88 = "Hmm... Perhaps it was more of a...hardening cement thing. Plaster, maybe?"
10047040-89 = "Who would do something like that?!"
10047040-90 = "Then how else would you explain the ghostly whispers and wails?"
10047040-91 = "They're probably from students hiding and crying after failing their exams!"
10047040-92 = "Heehee... Then let us investigate for ourselves."
10047040-93 = "Is this only a story...?"
10047040-97 = "...Or are there really ghosts?"
10047040-102 = "First, let's split up and check for sounds near the sculptures."
10047040-103 = "Then, we can meet here after 10 minutes."
10047040-104 = "All right! Let's get started!"
10047040-111 = "H-Hmph! I'm not scared! No big deal!"
10047040-115 = "...Huh? Why are you just standing there, Sensei?"
10047040-116 = "[s3] \"Actually, I'm afraid...\"\n[s4] \"I don't know this place well.\""
10047040-119 = "Hmph, coward."
10047040-120 = "A-All right. Then I'll go with you and we'll look together."
10047040-121 = "Just don't go embarrassing me. It's all a hoax, okay?"
10047040-122 = "[s] \"Make sure to stay close to me.\""
10047040-123 = "D-Don't treat me like a little kid! I'm not afraid! Really!"
10047040-125 = "I listened around a sculpture with Rena."
10047040-132 = "Hmph, it's just wind. Nothing more. No haunted whispers..."
10047040-134 = "[log=???][ff4444]Let me out... I need...to escape...[-][/log]"
10047040-138 = "Wh-What was that? Did you say something, Sensei?"
10047040-139 = "[s] \"Eek! I have no idea!\""
10047040-140 = "There was a sound! It was a voice. It sounded so strange, and—"
10047040-141 = "[ns] \"Wh-What's going on...?!\""
10047040-143 = "[log=???][ff4444]I'll curse them...[-][/log]"
10047040-144 = "[log=???][ff4444]I'll curse the ones...who made me into this...[-][/log]"
10047040-147 = "E-EEEEK?!"
10047040-148 = "K-Kanoe! It's you, isn't it?! You WOULD do this! It's all a prank, right?!"
10047040-158 = "...Heehee. You caught me."
10047040-159 = "Aw, come on! I knew it!"
10047040-161 = "[log=???][ff4444]Let me out... Please... Let me out...[-][/log]"
10047040-164 = "...Huh? That wasn't me."
10047040-166 = "EEEEEEK?!"
10047040-167 = "B-But it definitely came from Kanoe's direction...!"
10047040-168 = "You saw. My lips were sealed."
10047040-170 = "[log=???][ff4444]That's right... It isn't her...[-][/log]"
10047040-173 = "Wh-Who is it?! Who's the big jokester?"
10047040-175 = "[log=???][ff4444]You can't get me! Nyah...nyah...[-][/log]"
10047040-178 = "Shyaah! Don't you dare mock me!"
10047040-183 = "Here? Ughh, no..."
10047040-188 = "C-C-Come out already!!"
10047040-192 = "Caw! Caaww!"
10047040-193 = "A-A crow...?"
10047040-194 = "Perhaps...it was the crow."
10047040-195 = "Crows can talk too, if you train them..."
10047040-196 = "You think I don't know what a crow sounds like?!"
10047040-198 = "...We looked for a while, but we never found out who had been speaking."
10047040-200 = "Huh? Did you talk to a ghost?"
10047040-201 = "Heehee. \"Nyah nyah\"? Sounds like a cute ghost."
10047040-202 = "I'm telling you! Someone was pulling a prank!"
10047040-203 = "Heehee...Eheehee..."
10047040-204 = "[s] \"...It really was you, wasn't it?\""
10047040-205 = "Who knows...?"
10047040-206 = "[s5] \"Ventriloquy and a versatile voice...\"\n[s6] \"That means your major is...\""
10047040-209 = "I'll tell you one day. But let's enjoy the secret until then."
10047040-210 = "Heehee, Eheehee...!"
10047040-211 = "[s] \"I-I see...\""
10047040-212 = "Then let's move on... There's still so much to show you, Sensei..."
10047040-217 = "From there, they took me all over Wildhunt Academy."
10047040-219 = "Wildhunt Classroom"
10047040-222 = "Wildhunt Garden"
10047040-225 = "Wildhunt Arts Information Center"
10047040-228 = "Wildhunt Grand Auditorium"
10047040-231 = "...And so much more."

10047040-234 = "[s] \"Yes! It was so fun. The hours flew by!\""
10047040-235 = "Nyuhuhu. Don't get too happy yet. We've saved the best for last."
10047040-236 = "According to the Arcana, the final stop on this tour is..."
10047040-237 = "Summoning a demon with a magical glyph!"
10047040-238 = "[s] \"Are you...talking about a real demon?\""
10047040-239 = "Of course...they're real, aren't they?"
10047040-240 = " Meow! Meooww!"
10047040-241 = "Caw! Caaww!"
10047040-242 = "Hear that...? They agree wholeheartedly."
10047040-243 = "Yeah, you heard the familiars. It's true."

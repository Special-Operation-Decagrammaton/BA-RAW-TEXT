10047040-246 = "Heehee, Eheehee..."
10047040-247 = "Nyuhu, Nyuhuhuhu!"
10047040-248 = "Please, leave me out of it..."
10047040-250 = "Seeing how happy the Occult Society was, I eagerly anticipated the next prank."

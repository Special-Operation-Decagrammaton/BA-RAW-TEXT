[translation]
10047040-1 = "第4話;聲音的主人是……"
10047040-4 = "（跑了好一段路之後，抵達了學院中心的街道）"
10047040-5 = "[ns]「呼……跑得還挺遠的呢……」"
10047040-6 = "嗯。這裡應該安全了。"
10047040-7 = "妞呵呵，這樣應該甩掉「禁忌之物」了吧。"
10047040-8 = "哎唷！一直用那個稱呼會害老師誤會啦！"
10047040-9 = "[ns1]「這麼說來……我在美術館看到的究竟是怎麼回事？」\n[ns2]「那座惡魔像怎麼會自己動起來？」"
10047040-12 = "那是靈異現象……也被稱作[ruby=Poltergeist]騷靈現象[/ruby]哦。"
10047040-13 = "咿嘻……要小心一點……#n惡魔像的主人……已經記住老師了。"
10047040-14 = "那是哪門子的騷靈現象啦！#n明明只是展示台因為聲音而震動，惡魔像才會跟著移動好不好！"
10047040-15 = "[s]「咦？原來是這樣嗎？」"
10047040-16 = "呵呵……要如何解讀就交給老師自己判斷吧。"
10047040-20 = "看看那副不要臉的表情！#n這根本是詐騙，詐騙！"
10047040-21 = "世界上根本就不存在什麼惡魔還是魔法之類的！"
10047040-22 = "[s]「看來玲奈真的完全不相信神秘學呢。」"
10047040-26 = "唉……而我卻得和這些迷信神秘學的前輩們一起生活，真是太悲慘了。"
10047040-27 = "我到底為什麼會碰上這群怪咖啊……"
10047040-28 = "[s]「你們是怎麼認識的？」"
10047040-29 = "只是宿舍的房號變成了404號而已。#n真的就只是這樣。"
10047040-30 = "畢竟我們這種普通學生根本沒有選擇權。#n一切都得遵從評議會的決定。"
10047040-34 = "啊，所謂的評議會──"
10047040-36 = "正式名稱是「藝術評議會」。"
10047040-37 = "是一個以嚴格標準判斷並分類作品藝術價值的組織。#n有點類似其他學園的學生會吧。"
10047040-38 = "就連檢查站的「舍監隊」也受評議會指揮。#n換句話說，它擁有絕對的權力。"
10047040-40 = "而宿舍房間的分配也是由那些傢伙決定的。#n所以根本不可能提出「我不喜歡室友，麻煩幫我換掉」這種要求。"
10047040-41 = "在這種情況下，我能做的就只有一件事。"
10047040-42 = "那就是把不正常的室友變正常！#n這樣我的生活也能回歸正軌了！"
10047040-43 = "[s]「啊哈，看來玲奈很會照顧朋友呢！」"
10047040-47 = "為什麼會得出這種結論啦！？"
10047040-48 = "等著瞧吧！#n我一定會讓沉迷神秘學的大家清醒過來的！"
10047040-49 = "這股氣勢……我喜歡……"
10047040-50 = "能向像玲奈醬這樣的孩子傳道神秘學，可是無上的喜悅呢……"
10047040-51 = "哼，以為我會上當嗎？你想得美！"
10047040-52 = "咿嘻……很好……這種態度就對了……"
10047040-58 = "那麼，我們繼續前往下一個地點吧。#n依照阿爾克那的指引，接下來要去的地方是……"
10047040-63 = "哦哦，這是……？"
10047040-68 = "看來是要我們去那裡呢……"
10047040-69 = "大家跟我來吧。咿嘻……"
10047040-71 = "狂獵藝術街"
10047040-73 = "這裡是「藝術」的主要街道……"
10047040-74 = "展示著狂獵最古老的雕刻作品的空間……"
10047040-75 = "全都是被稱為傳說的……藝術家們的作品……"
10047040-76 = "沒錯！#n尤其那座噴泉是巨匠「李奧帕朵．多芬奇」的作品，歷史幾乎和狂獵一樣悠久哦！"
10047040-77 = "[s]「哦哦……我好像在目錄之類的地方看過。」"
10047040-78 = "妞呵呵呵。#n像這種傳說正在呼吸的地方……當然也有關於神秘學的傳聞！"
10047040-79 = "沒有也無所謂啦……！"
10047040-83 = "[ns]「這裡有什麼故事嗎？」"
10047040-84 = "很久以前，一些不道德的藝術家……為了讓作品增添生命而犯下了禁忌。"
10047040-85 = "那就是……將活生生的人封進雕像裡面……！"
10047040-86 = "據說有一部分的雕像就藏在這條街上……所以偶爾會聽到亡魂的低語哦。"
10047040-87 = "亂講！雕像是用大理石雕刻出來的好嗎！#n根本不可能把東西塞進去！"
10047040-88 = "那麼，難道是把人放進水泥後凝固嗎？"
10047040-89 = "誰會做那種事啦！"
10047040-90 = "不然亡魂的低語是怎麼來的呢？"
10047040-91 = "大概是考試考砸的人躲起來偷哭吧！"
10047040-92 = "咿嘻……就來親自確認看看吧……"
10047040-93 = "到底是單純的怪談……"
10047040-97 = "還是真的有亡靈存在。"
10047040-102 = "那麼，我們就各自去確認周圍的雕像是否真的有發出聲音……"
10047040-103 = "10分鐘後再回到這裡集合吧。"
10047040-104 = "好！馬上出發吧！！"
10047040-111 = "哼，哼！誰怕誰啊？"
10047040-115 = "……咦？老師怎麼還待在這裡？"
10047040-116 = "[s3]「其實我有點怕……」\n[s4]「而且我還不太熟這裡的地形。」"
10047040-119 = "哼嗯，原來你這麼膽小啊。"
10047040-120 = "那，那你就跟我一起走吧。"
10047040-121 = "不管發生什麼事都不用害怕，因為全都是騙人的。#n知道了嗎？"
10047040-122 = "[s]「玲奈也要緊跟在我身邊哦。」"
10047040-123 = "別，別把我當小孩子啦！我是真的一點都不怕！"
10047040-125 = "（於是便和玲奈一起在雕像的附近巡視）"
10047040-132 = "哼，不就只有風聲而已嗎？#n哪有什麼亡魂的低語啊……"
10047040-134 = "[log=???][ff4444]放我出去……我想……離開這裡……[-][/log]"
10047040-138 = "什，什麼？剛才那個聲音是老師發出來的嗎？"
10047040-139 = "[s]「噫噫！我也不知道啊！」"
10047040-140 = "可是真的有聲音耶！而且還是奇怪的聲音……！！"
10047040-141 = "[ns]「這，這到底是怎麼回事……！？」"
10047040-143 = "[log=???][ff4444]我要詛咒你們……[-][/log]"
10047040-144 = "[log=???][ff4444]把我變成這樣的傢伙……我要詛咒你們……[-][/log]"
10047040-147 = "噫，噫噫！？"
10047040-148 = "鹿，鹿江前輩！是前輩對吧！？#n除了前輩之外，沒有人會搞這種惡作劇了……！！"
10047040-158 = "……咿嘻，被發現了呢。"
10047040-159 = "我就知道！果然是你！"
10047040-161 = "[log=???][ff4444]放我出去……拜託……放我出去……[-][/log]"
10047040-164 = "……咦？這個聲音不是我發出來的哦？"
10047040-166 = "噫噫！？"
10047040-167 = "可，可是聲音明明是從前輩那邊傳來的……！"
10047040-168 = "我根本沒開口啊……"
10047040-170 = "[log=???][ff4444]沒錯……不是他……[-][/log]"
10047040-173 = "誰，誰啦！到底是誰在惡作劇！？"
10047040-175 = "[log=???][ff4444]找不到我吧？略略略……略略略……[-][/log]"
10047040-178 = "嚇啊──！到底是誰在耍我們！！"
10047040-183 = "這裡嗎？唔唔，這裡也沒有……！"
10047040-188 = "快，快出來！？"
10047040-192 = "嘎啊！嘎啊啊！"
10047040-193 = "烏，烏鴉……？"
10047040-194 = "或許……是烏鴉發出的聲音。"
10047040-195 = "烏鴉在訓練之後，也能學人說話哦……"
10047040-196 = "我看起來像是無法分辨烏鴉聲音的那種人嗎！？"
10047040-198 = "（……之後又找了好一陣子，不過依然沒能找出聲音的真相）"
10047040-200 = "咦？真的聽見了亡靈的聲音嗎……？"
10047040-201 = "呵呵，居然還會「略略略」地吐舌頭，真是個可愛的惡靈呢。"
10047040-202 = "就說了是有人在惡作劇啦！"
10047040-203 = "咿嘻……咿嘻嘻……"
10047040-204 = "[s]「……一直都是鹿江在搞鬼吧？」"
10047040-205 = "誰知道呢……"
10047040-206 = "[s5]「能自由變換聲音的腹語術嗎……」\n[s6]「所以，鹿江的主修是……」"
10047040-209 = "那是祕密……總有一天會告訴你的。"
10047040-210 = "咿嘻，咿嘻嘻……！"
10047040-211 = "[s]「這，這樣啊……」"
10047040-212 = "那麼，去下一個地方吧……#n老師，我們還有很多東西想給你看呢……"
10047040-217 = "（後來又和大家一起四處參觀狂獵學院）"
10047040-219 = "狂獵教室"
10047040-222 = "狂獵庭園"
10047040-225 = "狂獵藝術情報館"
10047040-228 = "狂獵大講堂"
10047040-231 = "（除了這些之外，還參觀了許多地方）"
10047040-233 = "老師覺得怎麼樣？玩得還開心嗎？"
10047040-234 = "[s]「嗯！開心到完全忘記時間了呢！」"
10047040-235 = "妞呵呵，現在就滿足還太早了哦。#n壓軸好戲才正要開始呢。"
10047040-236 = "在阿爾克那的指引之下，這次參觀最後的活動就是……"
10047040-237 = "用魔法陣召喚惡魔！"
10047040-238 = "[s]「那……是指真的惡魔嗎？」"
10047040-239 = "當然……是真的。"
10047040-240 = "喵嗚！喵嗚嗚嗚！"
10047040-241 = "嘎啊！嘎啊啊！"
10047040-242 = "看……那些孩子也是這麼說的哦。"
10047040-243 = "既然連前輩的使魔們也這麼說，肯定不會有錯的。"
10047040-244 = "這是命中注定、無法逃避的事情。"
10047040-246 = "咿嘻，咿嘻嘻……"
10047040-247 = "妞呵，妞呵呵呵！"
10047040-248 = "拜託別把我算進去好不好……"
10047040-250 = "（看著神秘學研究會的大家一臉開心的模樣，開始猜想下一個惡作劇會是什麼樣子）"

[translation]
10005020-1 = "ตอนที่ 2;วิธีคิดที่ต่างกัน"
10005020-2 = "(ประมาณ 30 นาทีต่อมา)"
10005020-9 = "อึก...!?"
10005020-10 = "อึกกก...!?"
10005020-15 = "...เคลียร์"
10005020-16 = "ทางนี้ก็เคลียร์เรียบร้อยค่ะ ง่ายจังเลยนะคะ"
10005020-21 = "อะไรกัน..."
10005020-22 = "แค่นี้ก็จบแล้วเหรอ? มีแค่นี้เองรึไง?"
10005020-23 = "แค่นี้เองงั้นเหรอคะ? รุ่นพี่ ก่อนที่จะเข้ามาที่นี่ รุ่นพี่ฟาดสลบไปตั้งกี่คนแล้วคะ?"
10005020-24 = "พอยังมีแรงอยู่เหลือเฟือ ก็เลยรู้สึกฟาดไม่สะใจสินะคะ..."
10005020-25 = "เฮ้อ..."
10005020-26 = "ทำไมมันถึงง่ายแบบนี้กันเนี่ย...?"
10005020-27 = "พวกการ์ดเองก็ยืนตะลึงกันไปหมด..."
10005020-29 = "การที่ทำตามแผนได้อย่างราบรื่นมันก็ดีแล้วนี่นา แล้วทำไมฉันถึงรู้สึกไม่ดีนะ?"
10005020-30 = "เราเปลี่ยนชุดเพื่อปลอมตัวกันนะคะ แต่ว่าชุดของรุ่นพี่..."
10005020-31 = "นี่! ถ้าจะให้ฉันถอดเสื้อซูคาจันออกละก็หยุดพูดไปได้เลย ฉันบอกไปตั้งหลายรอบแล้วไม่ใช่รึไง"
10005020-32 = "ฉันไม่ถอดเสื้อตัวนี้เด็ดขาด เข้าใจมั้ย?"
10005020-33 = "ฮึ่ม นี่มันภารกิจบ้าบอชัดๆ ทำไมเราต้องแอบเข้ามาเพื่อจับตัวเด็กที่หนีออกจากบ้านด้วย?"
10005020-34 = "อา... อึดอัดจัง ถ้าเป็นแบบนี้ก็ซัดให้เรียบทุกคนเลยไม่ได้รึไง?"
10005020-35 = "ดูๆ ไปแล้วเจ้าพวกนี้ก็เหมือนจะไม่ได้มีฝีมืออะไรเลยนี่"
10005020-36 = "[s1] \"แบบนั้นไม่ได้นะ อดทนไว้ก่อน\"\n[s2] \"ความอดทนก็เป็นความสามารถอย่างหนึ่งนะเนรุ\""
10005020-37 = "อึก...! ครูนี่อีกแล้วนะ...!"
10005020-38 = "อึก...! ครูนี่อีกแล้วนะ...!"
10005020-39 = "เฮ้อ... เข้าใจแล้ว! ฉันก็แค่พูดๆ ไปเท่านั้นน่า"
10005020-41 = "เฮ้ พวกเธอน่ะ โชคดีที่มีครูอยู่ด้วยหรอกนะ ไม่งั้นโดนฉันซัดแล้ว..."
10005020-42 = "พูดกับคนที่หมดสติไปแล้วก็คงไม่ได้ยินหรอก"
10005020-43 = "จะยังไงก็เถอะ ที่นี่มันเป็นพื้นที่ที่ตรวจสอบได้ง่ายๆ เพราะงั้นรีบๆ จัดการให้เสร็จไปเลยดีกว่า"
10005020-44 = "อาคาเนะ เธอจัดการเรื่องเจาะระบบได้ใช่มั้ย?"
10005020-46 = "ฮิฮิ ได้อยู่แล้วค่ะ ตอนนี้กำลังดำเนินการค่ะ"
10005020-47 = "[s3] \"สุดยอดจริงๆ เลยนะอาคาเนะ\"\n[s4] \"เร็วสุดยอด นับถือจริงๆ...\""
10005020-48 = "โอ๊ะ... ขอบคุณนะคะ คุณครู"
10005020-49 = "อุ๊ย... ขอบคุณค่ะคุณครู"
10005020-50 = "ได้ยินคำชมจากคุณครูระหว่างปฏิบัติภารกิจด้วย... งานครั้งนี้มีความพิเศษหลายอย่างเลยนะคะ"
10005020-52 = "ยัยชิโระอุซางิ... รอให้จับตัวให้ได้ก่อนเถอะ จะสั่งสอนให้ร้องไห้กลับบ้านไปฟ้องแม่เลย"
10005020-53 = "ถึงพวกเราไม่ทำ นักบัญชีของเซมิน่าก็คงจะทำแบบนั้นอยู่ดี..."
10005020-54 = "หืม...? คุณครู? ว่าไงนะ?"
10005020-55 = "รู้สึกเหมือนว่าพวกเรากำลังปฏิบัติกับชิโระอุซางิอย่างคุ้นเคยงั้นเหรอ?"
10005020-56 = "อืม... ก็คงประมาณนั้นละนะ"
10005020-57 = "ที่จริงแล้วยัยนั่นก็แค่เป็นเด็กตัวป่วนที่ชอบก่อเรื่องเท่านั้น ไม่ใช่คนเลวร้ายอะไรหรอก"
10005020-59 = "ที่จริงแล้วเธอเจอกับพวกเราบ่อยๆ จนเรียกพวกเราว่า \"รุ่นพี่\" แล้วละค่ะ"
10005020-60 = "\"รุ่นพี่เนรุ! ช่วยเลิกไล่ตามสักทีเถอะค่ะ!\" \"รุ่นพี่เนรุ อย่าตีฉันสิคะ!\""
10005020-61 = "ไม่ไหวจริงๆ... ทำไมถึงดื้อด้านแบบนั้นก็ไม่รู้ แค่เลิกก่อเรื่องซะก็สิ้นเรื่องแล้ว"
10005020-62 = "ยัยนั่นก็แค่เด็กไม่รู้ประสาแล้วใช้ชีวิตไปเรื่อยเปื่อยน่ะ"
10005020-63 = "...?"
10005020-64 = "อ่า นี่รุ่นพี่พูดถึงชิโระอุซางินะ หรือว่าตัวเองนะ?"
10005020-65 = "...?"
10005020-66 = "นี่! เมื่อกี้ว่าอะไรนะ?"
10005020-67 = "เอาละๆ ทุกคน... เลิกคุยกันเท่านี้ก่อนนะคะ~ ตอนนี้ได้เวลาทำตามแผนขั้นต่อไปแล้วค่ะ"
10005020-68 = "ดูเหมือนอาคาเนะจะเตรียมเจาะระบบเสร็จแล้ว เร็วกว่าที่คิดเยอะเลยแฮะ"
10005020-69 = "ฮิฮิ ขอบคุณค่ะ ตอนนี้ก็เตรียมพร้อมแล้ว รบกวนมารวมกันทางนี้หน่อยได้มั้ยคะ"
10005020-70 = "คือว่าระบบที่ฉันเพิ่งติดตั้งไป ถ้าอยู่ด้านนั้นมันอาจจะเป็นอันตรายได้ค่ะ~"
10005020-71 = "ช่วยมาทางนี้ด้วยนะคะ..."
10005020-73 = "จากนั้นก็กดปุ่มนี้"
10005020-77 = "ฮู่ว! เท่านี้ก็เรียบร้อยแล้วค่ะ ตอนนี้ก็แค่รอ 30 วินาทีค่ะ"
10005020-78 = "...?"
10005020-79 = "เดี๋ยวก่อนนะ อาคาเนะ?"
10005020-80 = "ให้รอ 30 วินาทีเหรอ? หมายความว่ายังไงน่ะ?"
10005020-87 = "...?"
10005020-88 = "...?"
10005020-89 = "[s5] \"เสียงนี้มัน...?\"\n[s6] \"อาคาเนะ เมื่อกี้เธอติดตั้งระบบอะไรไปน่ะ?\""
10005020-90 = "อืม... นี่เหรอคะ? ก็เป็นของที่ใช้ประจำนะคะ"
10005020-91 = "อืม... นี่เหรอคะ? ก็เป็นของที่ใช้ประจำนะคะ"
10005020-92 = "ฉันเอามาเผื่อต้องใช้เวลาปลอมตัวแบบไม่ให้ถูกจับได้ค่ะ..."
10005020-93 = "แค่ระเบิด C4 เองค่ะ"
10005020-94 = "อ๋อ ก็แค่ระเบิด C4... นึกว่าอะไรซะอีก...."
10005020-98 = "C4...?"
10005020-99 = "อะ... อาคาเนะ? ทำไมถึงติดตั้งระเบิด C4 ที่ห้องควบคุมระบบล่ะ?"
10005020-100 = "ถามแปลกๆ... ก็เพื่อระเบิดที่นี่ยังไงล่ะคะ?"
10005020-101 = "ระ... เรื่องนั้นมันก็แน่อยู่แล้ว... แต่ที่ฉันถามคือทำไมเราต้องระเบิดที่นี่ด้วยต่างหากล่ะ...?"
10005020-102 = "คะ...?"
10005020-103 = "เอ๋? หรือว่าฉันทำอะไรผิดไป...?"
10005020-104 = "แต่ว่าถ้าไม่มีห้องนี้ พวกการ์ดก็จะจับตาดูการเคลื่อนไหวของเราไม่ได้ไม่ใช่เหรอคะ?"
10005020-105 = "มะ... มันก็ใช่อยู่หรอกนะ แต่ว่า... ปกติแล้วเวลาแบบนี้แค่เจาะระบบวงจรปิดแล้วเข้าควบคุมก็พอ#nไม่ใช่รึไง...?"
10005020-110 = "แล้วนี่เหลืออีกกี่วินาทีน่ะอาคาเนะ?"
10005020-111 = "อืม... คือที่จริงแล้ว..."
10005020-112 = "...."
10005020-113 = "เพิ่งนับถอยหลังถึง 0 ไปเมื่อกี้เองค่ะ"

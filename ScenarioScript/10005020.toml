[translation]
10005020-1 = "第2話;一如既往的思考方式"
10005020-2 = "（約30分鐘後……）"
10005020-9 = "……唔！？"
10005020-10 = "嗚哇！？"
10005020-15 = "……Clear。"
10005020-16 = "這裡也Clear，真順利呢。"
10005020-21 = "……啊？"
10005020-22 = "這樣就結束了？#n會不會太快了？"
10005020-23 = "什麼「這樣就結束了」？#n在到這裡來之前，隊長不是已經打昏很多人了嗎……？"
10005020-24 = "看來似乎還游刃有餘呢。"
10005020-25 = "唉……"
10005020-26 = "總是這樣無處發揮反而更累人啊……"
10005020-27 = "不過不能鬧得太大可能也是原因吧……"
10005020-29 = "作戰順利是件好事。"
10005020-30 = "話說隊長，仔細一看你的那身打扮……"
10005020-31 = "囉嗦。兔女郎裝配上絲卡將也沒什麼不好的吧。#n剛才朱音也這麼說了。"
10005020-32 = "這點我無法退讓。"
10005020-33 = "再說也不能算是順利吧，又還沒找到那個小不點……"
10005020-34 = "真煩……把他們全部打飛的話，不是很快就能找到了嗎？"
10005020-35 = "這種程度的傢伙，就算一起上也沒什麼大不了的吧？"
10005020-36 = "[s1]「忍耐忍耐。」\n[s2]「這也是一種實力哦。」"
10005020-37 = "呿……！"
10005020-38 = "呿……！"
10005020-39 = "……知道了知道了。#n我只是說說而已。"
10005020-41 = "喂，你們這些傢伙，感謝老師的存在吧。#n要不是老師在這裡，你們現在早就……"
10005020-42 = "隊長，就算你踢已經昏過去的人，他們也聽不見的。"
10005020-43 = "總之，掌握系統之後就立刻移動吧。"
10005020-44 = "朱音，進度如何？"
10005020-46 = "是，包在我身上。#n十分順利。"
10005020-47 = "[s3]「不愧是朱音。」\n[s4]「真可靠。」"
10005020-48 = "呵呵。#n謝謝您，老師。"
10005020-49 = "呵呵。#n謝謝您，老師。"
10005020-50 = "被這麼稱讚的話，就算在任務中也會太開心的。"
10005020-52 = "真是的，那個小不點……就會找麻煩。#n抓到他之後一定要讓他哭得唏哩嘩啦的。"
10005020-53 = "雖然就算我們不動手，研討會應該也會做差不多的事吧……"
10005020-54 = "……嗯？老師？"
10005020-55 = "我們和白兔的關係好像不錯……？"
10005020-56 = "啊啊，這麼說或許也沒錯。"
10005020-57 = "雖然引起了各種問題，但他其實也不是什麼危險或是邪惡的存在。"
10005020-59 = "在我們幾次見面的期間，他甚至都會稱呼我們「前輩」了呢。"
10005020-60 = "那傢伙常說什麼「寧瑠前輩追過來了──！？」、#n「被寧瑠前輩打了──！」之類的，真是煩人……"
10005020-61 = "不想被打的話不要搞事不就好了嗎。"
10005020-62 = "不過就是個不知天高地厚又愛撒嬌的小不點罷了。#n實力也沒什麼大不了的，就和外表一樣。"
10005020-63 = "……？"
10005020-64 = "啊，原來是在說他啊。#n到中途為止，我還以為是在說自己呢。"
10005020-65 = "……啊？"
10005020-66 = "喂，花凜，你這傢伙該不會……？"
10005020-67 = "好了好了，差不多該開始行動了唷～"
10005020-68 = "系統掌握完成了嗎？#n動作真快呢。"
10005020-69 = "感謝你的稱讚，那麼請來這裡吧。"
10005020-70 = "因為操作上的原因，你們那附近有點危險。"
10005020-71 = "麻煩先過來我這裡吧……"
10005020-73 = "好，那我就按了。"
10005020-77 = "呼～接下來只要等30秒就行了。"
10005020-78 = "……？"
10005020-79 = "……朱音？"
10005020-80 = "等30秒？那是什麼意思……？"
10005020-87 = "……？ "
10005020-88 = "……？"
10005020-89 = "[s5]「這個聲音是……？」\n[s6]「朱音，你不是掌握了系統嗎……？」"
10005020-90 = "嗯？我只是跟往常一樣……"
10005020-91 = "嗯？我只是跟往常一樣……"
10005020-92 = "用了經過適度偽裝，以免被發現的……"
10005020-93 = "C4而已啊……？"
10005020-94 = "是嗎，原來是C4啊。"
10005020-98 = "……你說的C4，是炸藥的那個C4？"
10005020-99 = "朱音，為什麼要在這裡用C4……？"
10005020-100 = "……？#n那當然是為了炸掉這裡啊……？"
10005020-101 = "我想也是。但我想問的是，#n為什麼要在這次這種得要安靜行動的作戰，像往常一樣使用C4……"
10005020-102 = "……哎呀？"
10005020-103 = "那個，難道我做錯了什麼嗎……？"
10005020-104 = "只要把中控室炸毀，那些保鑣不就無法監視我們了嗎……？"
10005020-105 = "雖，雖然那麼說也沒錯……#n不過一般來說不是應該駭入對方的監視系統，然後反過來利用它嗎……？"
10005020-110 = "喂，那就趕快停下來吧。還剩下幾秒？"
10005020-111 = "那，那個……"
10005020-112 = "剩下……"
10005020-113 = "……0秒。"

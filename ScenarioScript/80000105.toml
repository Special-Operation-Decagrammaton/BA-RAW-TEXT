[translation]
80000105-1 = "彼此之間的認知差異"
80000105-3 = "……啊，找到了。"
80000105-7 = "原來你在這裡啊，老師。我正在找你呢。"
80000105-8 = "……嗯？"
80000105-9 = "沒什麼，不是什麼大事。#n雖然對我而言的確是件重要的事。"
80000105-10 = "……我就長話短說吧。"
80000105-19 = "[ns1]「……這個難道是巧克力？」\n[ns2]「是情人節的……？」"
80000105-22 = "看起來一臉驚訝呢……雖然我早就料到了。"
80000105-23 = "嗯，我大致能猜到老師對我的看法。"
80000105-24 = "正因如此，我想藉著這個機會加以改善。"
80000105-25 = "一直以來，有許多事都必須感謝老師……"
80000105-26 = "而且我……"
80000105-27 = "我也沒有……特別討厭老師或有所警戒……"
80000105-31 = "……說了一些多餘的話呢。#n剛剛那些請當作沒聽過吧。"
80000105-32 = "總而言之，正如我剛才所說，這是改善彼此認知的環節之一。#n如果沒辦法讓老師感到高興的話，對我來說就失去意義了，為此我花費了不少心思。"
80000105-33 = "希望你能喜歡。"
80000105-34 = "[s3]「當然，我非常開心哦。」\n[s4]「哇！是碧的情人節巧克力！！」"
80000105-40 = "居然這麼快就給出回答……"
80000105-41 = "……嗯？你說要請我喝杯咖啡作為回禮？"
80000105-42 = "雖然我沒理由拒絕……不過該怎麼說呢，老師比我想像中還高興呢。"
80000105-43 = "剛才的巧克力那麼有效果嗎？#n你都還沒打開的說。"
80000105-44 = "我們之間的距離感，明明……"
80000105-45 = "[s5]「……嗯？什麼距離感？」\n[s6]「我從來沒那麼想過耶？」"
80000105-48 = "…………？"
80000105-49 = "……嗯。"
80000105-50 = "……唔嗯……"
80000105-51 = "……哼……"
80000105-52 = "原來如此……嗯……老師……"
80000105-53 = "你這個人實在……"
80000105-54 = "[s7]「……碧？你還好嗎？」\n[s8]「有什麼煩惱嗎？」"
80000105-57 = "…………"
80000105-58 = "總覺得……雖然只有一點點，好像有種只有我吃虧了的感覺。"
80000105-59 = "……嗯？"
80000105-60 = "你說如果我有煩惱就說出來，你很樂意幫忙……？"
80000105-65 = "……現在我明白了。"
80000105-66 = "有問題的不是我，而是老師。"
80000105-67 = "[s]「……咦？」"
80000105-72 = "沒，沒什麼，只是在自言自語而已，不用在意。#n那麼我還有其他事要辦……再，再見……"
80000105-79 = "（似乎有些猶豫不決的碧，就這樣匆匆地離開了）"
80000105-84 = "（……不過巧克力非常好吃）"

[translation]
80000105-1 = "Different Impressions"
80000105-3 = "...Aha. Found you."
80000105-7 = "I was looking for you, Sensei. And here you are..."
80000105-8 = "...Hm?"
80000105-9 = "No, it's nothing serious. Important, but not serious."
80000105-10 = "...There's no point in dragging things out, so I'll cut to the chase."
80000105-19 = "[ns1] \"...Is this chocolate?\"\n[ns2] \"Is this for Valentine's Day, then?\""
80000105-22 = "...As I thought, you weren't expecting something like this."
80000105-23 = "Listen, I can easily imagine the impression you must have of me."
80000105-24 = "That's why I wanted to use today as an opportunity to thaw the ice, so to speak."
80000105-25 = "There have been a lot of reasons to be thankful to you for..."
80000105-26 = "And speaking for myself..."
80000105-27 = "Speaking for myself... I don't try to be wary of you. I don't even dislike you..."
80000105-31 = "...I'm rambling. Please ignore everything I just said."
80000105-32 = "This is all to improve your impression of me. I put a lot of effort into it, and it'd be meaningless if it didn't make you happy."
80000105-33 = "I hope you like it."
80000105-34 = "[s3] \"Of course! Chocolate makes me very happy!\"\n[s4] \"Wow! Aoi's Valentine's chocolate!!\""
80000105-40 = "You don't need to answer so quickly..."
80000105-41 = "...Hm? You want to buy me a cup of coffee as thanks?"
80000105-42 = "I have no reason to refuse, but...I wonder... You were so fast with that invite..."
80000105-43 = "How do you even know my chocolate is good? You haven't even opened it."
80000105-44 = "Things between us still feel so distant..."
80000105-45 = "[s5] \"...Huh? What distance?\"\n[s6] \"I never realized you felt that way...\""
80000105-48 = "...?"
80000105-49 = "Hmm..."
80000105-50 = "Uhh..."
80000105-51 = "*phew*"
80000105-52 = "So, that's how it is... Although... Sensei..."
80000105-53 = "I never expected you were that kind of person..."
80000105-54 = "[s7] \"Aoi? Are you okay?\"\n[s8] \"Is something the matter?\""
80000105-57 = "..."
80000105-58 = "Frankly... It feels a little bit like I've been had."
80000105-59 = "...Hm? "
80000105-60 = "If I'm worried about something, just ask? You'll lend an ear to anyone, anytime?"
80000105-65 = "...I get it now."
80000105-66 = "I was never the problem. It's you who's the problem."
80000105-67 = "[s] \"...Huh?\""
80000105-72 = "S-Sorry. It's nothing. I was just thinking out loud. If you excuse me, I have other business to attend to..."
80000105-79 = "For some reason, Aoi mumbled to herself a bit before rushing out."
80000105-84 = "...Regardless, her chocolate was absolutely delicious."

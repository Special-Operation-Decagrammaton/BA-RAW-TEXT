[translation]
1004903-1 = "我好歹也是放學後的甜點部成員"
1004903-2 = "（某天工作途中，為了透透氣而到外頭散步）"
1004903-3 = "（在路旁的公車站見到了熟悉的身影）"
1004903-4 = "[s1]「咦，千紗？」\n[s2]「你好啊。」"
1004903-5 = "……老師？"
1004903-6 = "……老師？"
1004903-7 = "怎麼這麼晚了還在外面……是來散步的嗎？"
1004903-8 = "……嗯？我嗎？"
1004903-9 = "嗯……就像你看到的一樣，在等公車。"
1004903-10 = "從這裡開往宿舍的公車間隔都很長，運氣不好的話甚至還要等二十分鐘。"
1004903-11 = "雖然搭地鐵的話會比較快……"
1004903-12 = "……不過我不喜歡人群。你看，這裡一個人也沒有對吧？公車也都沒幾個人。"
1004903-13 = "就算要多花些時間，我還是喜歡人少的地方。心情會比較輕鬆。"
1004903-14 = "而且這座公車站有椅子。"
1004903-15 = "也就是說……"
1004903-19 = "你看，我還有時間坐在這裡吃零食。呵呵。"
1004903-20 = "來，老師也嘗嘗看吧。"
1004903-21 = "[s3]「真的可以給我嗎？」\n[s4]「這不是你本來要喝的嗎？」"
1004903-22 = "不用擔心。我還帶了其他東西。"
1004903-23 = "不用擔心。我還帶了其他東西。"
1004903-27 = "鏘鏘──！#n我還有隨身攜帶馬卡龍之類的甜點。"
1004903-28 = "哼哼。我好歹也是放學後的甜點部成員，包包裡怎麼可能會只有飲料呢。"
1004903-29 = "甜點這種東西比起自己享用，和大家一起分享更美味……"
1004903-30 = "……其他人都是這麼說的，哈哈。"
1004903-31 = "啊，我剛才說的其他人是指甜點部的成員們。"
1004903-32 = "[s5]「千紗真的也很喜歡甜點呢。」\n[s6]「我還以為你只是喜歡甜點部的氣氛。」"
1004903-33 = "嗯～……果然會這樣想嗎？#n我自己也覺得挺不可思議的……"
1004903-34 = "嗯～……果然會這樣想嗎？#n我自己也覺得挺不可思議的……"
1004903-35 = "不過這世界上怎麼可能會有討厭甜點的女高中生嘛，頂多是喜歡吃的種類不同罷了。"
1004903-36 = "我絕對不是為了融入社團才一直吃甜點的，#n除了草莓奶油蛋糕之外，我也很喜歡吃馬卡龍。"
1004903-37 = "甚至還因為太喜歡了……反而讓我會刻意避開廉價的量產品。"
1004903-38 = "既然都說到這裡了，之後也想帶老師去我的「嚴選店家」看看呢。"
1004903-39 = "我相信你一定也會喜歡的……#n雖然如果你不喜歡吃甜食的話，可能會覺得不怎麼樣就是了。"
1004903-40 = "……嗯～不過應該不成問題吧。畢竟都不會太甜膩。"
1004903-41 = "不然就去幾家比較清淡的……"
1004903-45 = "……啊。"
1004903-46 = "說著說著公車就來了。我還以為會更晚一點呢……"
1004903-47 = "要是不搭上去，就必須再等二十分鐘……"
1004903-48 = "……沒辦法了。雖然還有很多零食跟飲料，但也該走了。"
1004903-52 = "嗯──……"
1004903-53 = "老師。我……我沒有別的意思，不過我可以問你一件事嗎？"
1004903-54 = "就是……那個……"
1004903-55 = "[s7]「我今天的工作都做完了。」\n[s8]「再多待個二十分鐘也沒關係。」"
1004903-60 = "……唉。"
1004903-61 = "老師你真的是……"
1004903-62 = "……我一直在想，老師你對其他女生也都是這樣嗎？"
1004903-63 = "就算老師哪天被誰突襲了，那全都是老師自作自受。勸你最好記在心上，知道嗎？"
1004903-64 = "嗯……不過……"
1004903-65 = "假如真的發生了那種事……你可以聯絡我。只要不是上課時間，我就會去救你。"
1004903-66 = "……嗯？"
1004903-67 = "聽起來像開玩笑嗎？"
1004903-68 = "唉，又說這種話……"
1004903-69 = "算了，現在就當我是在開玩笑吧。"
1004903-70 = "那我們現在……"
1004903-76 = "……繼續吃吧，老師？"

1004903-60 = "3;카즈사;99;……하……."
1004903-61 = "3;카즈사;04;하, 진짜……. 선생님……."
1004903-62 = "3;카즈사;07;……늘 느끼지만, 정말이지 큰일 낼 사람이라니까. 다른 애들한테도 다 이런 식이지?\n#3;em;[땀]"
1004903-63 = "3;카즈사;02;언젠가 누군가 선생님을 잡아가면, 그땐 자업자득이라고 생각하라고. 알았지? 내 말 명심해."
1004903-64 = "3;카즈사;99;음……. 그래도, 뭐……."
1004903-65 = "3;카즈사;03;만약에 진짜로 그런 일 생기면……. 연락해도 괜찮아. 수업 시간 아니면 도와줄 테니까.\n#3;em;[음표]"
1004903-66 = "3;카즈사;01;……응?"
1004903-67 = "3;카즈사;01;재밌는 농담이라고?\n#3;em;[?]"
1004903-68 = "3;카즈사;04;흐응……. 또 그런 식으로……."
1004903-69 = "3;카즈사;03;뭐, 좋아. 지금은 일단 그렇다고 해둘게."
1004903-70 = "3;카즈사;99;아무튼, 그럼 이제…….\n#3;em;…"

[translation]
1004903-1 = "This Is the After-School Sweets Club"
1004903-2 = "I went for a stroll late at night to take a break from work."
1004903-3 = "As I was walking, I saw a familiar face at a bus stop."
1004903-4 = "[s1] \"Oh, Kazusa?\"\n[s2] \"Hi there.\""
1004903-5 = "Huh? Oh, it's you. Hi, Sensei."
1004903-6 = "Huh? Oh, it's you. Hi, Sensei."
1004903-7 = "What are you doing out so late? I hope you're not working too hard."
1004903-8 = "What am I doing?"
1004903-9 = "I'm doing what you normally do at a bus stop. Waiting for the bus."
1004903-10 = "There's not a lot of buses back to the dorm though. I've waited almost a half hour before."
1004903-11 = "I used to take the subway since it's a lot faster, but..."
1004903-12 = "I don't like crowded spaces. The bus is nice, because it's usually empty."
1004903-13 = "I like things easy and simple, even if it's not the most efficient."
1004903-14 = "And since it's not crowded, there's actually chairs for me to sit in."
1004903-15 = "To top it off, based off experience..."
1004903-19 = "I should have enough time for a snack! Heehee."
1004903-20 = "Here, Sensei. Take this."
1004903-21 = "[s3] \"You're giving this to me?\"\n[s4] \"I can't take your snacks.\""
1004903-22 = "Oh, don't worry about it. I have a few more. And I don't just carry around drinks..."
1004903-23 = "Oh, don't worry about it. I have a few more. And I don't just carry around drinks..."
1004903-27 = "Ta-da! I also carry around a package of macarons and other sweets."
1004903-28 = "Heh, it's only natural for an After-School Sweets Club member to carry around emergency rations."
1004903-29 = "Desserts are more enjoyable when shared..."
1004903-30 = "...That's what the other members would say. Haha."
1004903-31 = "They're always coming up with ridiculous phrases like that."
1004903-32 = "[s5] \"You really love desserts.\"\n[s6] \"I thought you just liked hanging out with friends.\""
1004903-33 = "Are you surprised? I guess I don't really seem like the dessert type..."
1004903-34 = "Are you surprised? I guess I don't really seem like the dessert type..."
1004903-35 = "But what high school girl doesn't like desserts? The only difference lies in the types of dessert we like."
1004903-36 = "I'm not in the club just for friends. I like whipped cream cake topped with strawberries, and I also really like macarons."
1004903-37 = "It's the only dessert that I, like, really care about their quality, you know?"
1004903-38 = "If you ever have time, I'll take you to some good shops I found."
1004903-39 = "I guarantee they'll blow your mind...I mean, if you like sweets."
1004903-40 = "Well, actually, they're not that sweet, so I feel like they'll be delicious regardless."
1004903-41 = "Oh but, maybe you like lighter desserts..."
1004903-45 = "What? No way."
1004903-46 = "The bus came so fast."
1004903-47 = "If I don't get on this one, I'll have to wait another twenty minutes..."
1004903-48 = "...I guess I have no choice. I didn't even get to finish what I was eating. That's a shame."
1004903-52 = "A-Actually..."
1004903-53 = "Sensei, can I ask... I mean, no pressure..."
1004903-54 = "Do you think... Well..."
1004903-55 = "[s7] \"I'm done working today.\"\n[s8] \"I have twenty minutes for you.\""
1004903-60 = "*sigh*"
1004903-61 = "Seriously, Sensei..."
1004903-62 = "You're gonna get in trouble if you keep doing this. Do you do this with other students too?"
1004903-63 = "If you ever got arrested, I wouldn't be surprised. Be careful, okay?"
1004903-64 = "Umm... But..."
1004903-65 = "If something like that happens, you can call me. I'll help you, unless I'm in class. I can't skip class."
1004903-66 = "What?"
1004903-67 = "That made you laugh?"
1004903-68 = "Hmph... You're making fun of me again."
1004903-69 = "Well, no more serious talk from me."
1004903-70 = "On to more important matters of business..."
1004903-76 = "Should we eat the rest of this, Sensei?"

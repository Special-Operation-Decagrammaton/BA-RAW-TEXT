[translation]
1004903-1 = "เห็นอย่างนี้ ฉันก็เป็นสมาชิกชมรมของหวานนะ"
1004903-2 = "(คุณครูแว็บออกมาสูดอากาศข้างนอกสักครู่หนึ่งในระหว่างที่ทำงานอยู่)"
1004903-3 = "(และก็มองเห็นคนที่ดูคุ้นหน้าคุ้นตายืนอยู่ตรงป้ายรถบัสที่มุมถนนด้านหนึ่ง)"
1004903-4 = "[s1] \"เอ๋ คาซึสะ?\"\n[s2] \"ว่าไง\""
1004903-5 = "เอ๊ะ... คุณครู?"
1004903-6 = "เอ๊ะ... คุณครู?"
1004903-7 = "อะไรน่ะ ดึกป่านนี้แล้ว... ออกมาเดินเล่นงั้นเหรอ?"
1004903-8 = "หืม? ฉันเหรอ?"
1004903-9 = "ก็... อย่างที่เห็นนั่นแหละ ฉันกำลังรอรถบัสอยู่น่ะ"
1004903-10 = "รถบัสจากที่นี่ไปหอพักจะเว้นช่วงนานมากน่ะ ถ้าโชคไม่ดีอาจจะต้องรอถึง 20 นาทีเลย"
1004903-11 = "ถ้านั่งรถไฟใต้ดินก็อาจไปได้เร็วขึ้นก็จริง"
1004903-12 = "แต่ฉันไม่ชอบที่ที่มีคนพลุกพล่านสักเท่าไร ดูสิ ที่นี่เงียบสงบออกจะตายไป แถมบนรถบัสก็มักจะโล่ง#nอยู่ตลอดด้วย"
1004903-13 = "ถึงจะใช้เวลาเพิ่มอีกสักหน่อย แต่ฉันชอบอะไรที่มันสบายๆ ผ่อนคลายมากกว่าน่ะ"
1004903-14 = "แล้วอีกอย่างตรงป้ายรถบัส... ก็มีเก้าอี้ดีๆ ให้นั่งรอด้วย"
1004903-15 = "หรือก็คือ..."
1004903-19 = "ฉันมีเวลานั่งกินขนมเพลินๆ อย่างที่เห็นนี่แหละ ฮุฮุ"
1004903-20 = "เอ้านี่ คุณครู รับไปสิ"
1004903-21 = "[s3] \"ให้ครูจริงเหรอ?\"\n[s4] \"คาซึสะจะเอาไว้ดื่มไม่ใช่เหรอ\""
1004903-22 = "โธ่เอ๊ย ไม่ต้องกังวลแล้วรับไปดื่มเหอะน่า ฉันยังมีขนมอื่นอีกเยอะเลย แล้วฉันก็ไม่ได้มีแค่เครื่องดื่มนี่#nสักหน่อย"
1004903-23 = "โธ่เอ๊ย ไม่ต้องกังวลแล้วรับไปดื่มเหอะน่า ฉันยังมีขนมอื่นอีกเยอะเลย แล้วฉันก็ไม่ได้มีแค่เครื่องดื่มนี่#nสักหน่อย"
1004903-27 = "แต่นแต๊น~ ฉันพกมาการองใส่กล่องแบบนี้มาด้วยนะ"
1004903-28 = "ฮึฮึ เห็นแบบนี้ฉันก็เป็นสมาชิกชมรมของหวานหลังเลิกเรียนนะ ในกระเป๋าจะขาดของหวานไปได้ยังไง#nกันล่ะ?"
1004903-29 = "ถ้ามีคนกินของหวานด้วยกัน มันจะอร่อยกว่ากินคนเดียวเยอะเลยนะ..."
1004903-30 = "แบบที่พวกคนอื่นๆ ชอบพูดกันไงล่ะ"
1004903-31 = "อ่า... มันเป็นคำพูดของคนในชมรมของหวานน่ะ"
1004903-32 = "[s5] \"คาซึสะเองก็ชอบของหวานเหมือนกันสินะ\"\n[s6] \"คิดว่าแค่อินกับบรรยากาศแบบนั้นซะอีก\""
1004903-33 = "อืม~ ดูเป็นแบบนั้นเหรอ แต่ก็นะ ก็น่าจะเข้าใจผิดไปแบบนั้นอยู่หรอก..."
1004903-34 = "อืม~ ดูเป็นแบบนั้นเหรอ แต่ก็นะ ก็น่าจะเข้าใจผิดไปแบบนั้นอยู่หรอก..."
1004903-35 = "มีเด็กผู้หญิงม.ปลายที่ไหนไม่ชอบของหวานกันบ้างล่ะ? มีแค่ชอบของหวานคนละชนิดกันเท่านั้นแหละ"
1004903-36 = "ฉันไม่ได้กินของหวานเพื่อให้เข้ากับคนอื่นๆ หรอก ฉันชอบเค้กครีมสดที่มีสตรอว์เบอร์รี่อยู่ด้านบน แล้วก็ชอบกินมาการองมากด้วย"
1004903-37 = "จะเรียกได้ว่าชอบสุดๆ ไปเลยก็ได้... ถึงขั้นไม่ซื้อขนมที่ผลิตมาราคาถูกๆ เพราะคำนึงถึงคุณภาพ และรสชาติของขนมเลยละ"
1004903-38 = "ไหนๆ ก็คุยกันเรื่องนี้แล้ว ถ้ามีโอกาสฉันก็อยากแนะนำ \"ร้านที่คัดสรรอย่างพิถีพิถัน\" ให้คุณครูนะ"
1004903-39 = "ฉันคิดว่าคุณครูน่าจะชอบ... แต่ว่าถ้าคุณครูไม่ชอบขนมหวานมันก็อีกเรื่องหนึ่ง"
1004903-40 = "อืม... คงไม่เป็นไรหรอกมั้ง มันไม่ใช่ขนมที่หวานจนเลี่ยนอะไรแบบนั้นหรอก"
1004903-41 = "หรือจะเป็นขนมที่มีรสชาติเข้มข้นดี..."
1004903-45 = "อ๊ะ จริงๆ เลย..."
1004903-46 = "รถบัสดันมาตอนคุยกันซะได้ นึกว่าจะต้องรอนานกว่านี้ซะอีก..."
1004903-47 = "ถ้าไม่ขึ้นคันนี้ก็จะต้องรอไปอีก 20 นาทีเลย..."
1004903-48 = "ช่วยไม่ได้ละนะ ของกินยังเหลืออยู่อีกเยอะเลย โดนขัดจังหวะกลางคันแบบนี้ก็น่าเสียดายนะ"
1004903-52 = "อืม..."
1004903-53 = "คุณครู คือว่า... ฉันแค่ถามดูเฉยๆ นะ"
1004903-54 = "เอ่อ คือว่า..."
1004903-55 = "[s7] \"วันนี้ครูเสร็จงานแล้ว\"\n[s8] \"ถ้า 20 นาทีละก็ สบายมาก\""
1004903-60 = "อ่า..."
1004903-61 = "จริงๆ เลยนะ คุณครูเนี่ย"
1004903-62 = "ก็รู้อยู่หรอก แต่เป็นคนที่ชอบเล่นใหญ่อยู่ตลอดจริงๆ เลยนะ กับเด็กคนอื่นๆ ก็ทำแบบนี้เหมือนกันสินะ?"
1004903-63 = "ถ้าเกิดวันหนึ่งมีคนจับตัวคุณครูไปละก็ คงเป็นกรรมตามสนองแน่ๆ เข้าใจมั้ย? จำที่ฉันพูดเอาไว้ให้ดีล่ะ"
1004903-64 = "อืม... แต่ก็นะ..."
1004903-65 = "แต่ถ้าเกิดเรื่องแบบนั้นจริงๆ ละก็... จะติดต่อมาหาฉันก็ได้นะ ถ้าไม่ใช่เวลาเรียน ฉันจะรีบไปช่วยเลยละ"
1004903-66 = "หืม...?"
1004903-67 = "ฉันพูดล้อเล่นได้สนุกดีงั้นเหรอ?"
1004903-68 = "ฮึ่ม... พูดแบบนี้อีกแล้ว..."
1004903-69 = "เอาเถอะ เอาเป็นว่าตอนนี้ฉันจะยอมๆ ไปก็แล้วกัน"
1004903-70 = "ถ้างั้นตอนนี้..."
1004903-76 = "มากินขนมกันมั้ย คุณครู?"

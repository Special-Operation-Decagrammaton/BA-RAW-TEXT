[translation]
1004903-1 = "#title;이래 봬도 방과후 디저트부"
1004903-2 = "#na;(업무 도중 잠시 바람을 쐬러 밖으로 나왔다.)"
1004903-3 = "#na;(도로 한쪽의 버스 정류장에서 낯익은 사람의 모습이 보였다.)"
1004903-4 = "[s1] \"어라, 카즈사?\"\n[s2] \"안녕.\""
1004903-5 = "3;카즈사;02;……? 어, 선생님?\n#3;a\n#3;em;[반응]"
1004903-6 = "3;카즈사;02;……? 어, 선생님?\n#3;a\n#3;em;[반응]"
1004903-7 = "3;카즈사;01;뭐야. 이런 늦은 시간에……. 바람이라도 쐬러 나온 거야?"
1004903-8 = "3;카즈사;01;……응? 나?\n#3;em;[?]"
1004903-9 = "3;카즈사;01;어……. 보다시피 버스 기다리는 중이지."
1004903-10 = "3;카즈사;04;여기서 기숙사 가는 버스는 배차 간격이 좀 심하게 길거든. 재수 없으면 거의 20분은 기다려야 하니까 말이지."
1004903-11 = "3;카즈사;99;뭐, 지하철로 가서 타면 그거보다는 빠르게 갈 수 있겠지만…….\n#3;em;…"
1004903-12 = "3;카즈사;07;……사람 득실거리는 건 싫으니까. 봐, 여기는 사람 하나 없이 한적하잖아. 버스 안도 보통은 텅텅 비어 있다고."
1004903-13 = "3;카즈사;03;시간 조금 더 쓰더라도 느긋한 여유를 즐기고 싶다…… 나는 그런 쪽의 취향인 거지.\n#3;em;[음표]"
1004903-14 = "3;카즈사;01;게다가 여기는……. 이렇게 앉기 좋은 의자도 있으니까."
1004903-15 = "3;카즈사;03;즉……."
1004903-16 = "#st;[0,0];instant;1;"
1004903-17 = "#clearST"
1004903-18 = "3;카즈사;03\n#3;greeting\n#wait;1500"
1004903-19 = "3;카즈사;13;보다시피 앉아서 군것질할 시간도 있다- 이 말씀이야. 후후.\n#3;em;[음표]"
1004903-20 = "3;카즈사;03;자, 선생님 이거 받아."
1004903-21 = "[s3] \"나 줘도 되는 거야?\"\n[s4] \"카즈사가 마시려던 거잖아.\""
1004903-22 = "3;카즈사;07;아이고, 제 걱정일랑 마십시오. 몇 개 더 들고 다니니까. 거기다가 마실 거만 들고 다니는 것도 아니고."
1004903-23 = "3;카즈사;07;아이고, 제 걱정일랑 마십시오. 몇 개 더 들고 다니니까. 거기다가 마실 거만 들고 다니는 것도 아니고."
1004903-24 = "#st;[0,0];instant;1;"
1004903-25 = "#clearST"
1004903-26 = "3;카즈사;03\n#3;greeting\n#wait;1500"
1004903-27 = "3;카즈사;13;쨔쟌-. 이렇게 마카롱 같은 것들도 케이스에 넣어서 들고 다닌다, 이 말씀.\n#3;em;[반짝]"
1004903-28 = "3;카즈사;03;훗. 이래 봬도 방과후 디저트부의 일원이라고. 가방 안에 이런 거 하나 없을 리가 없잖아?"
1004903-29 = "3;카즈사;99;디저트는 혼자 먹는 것보다 다 같이 먹는 것이 훨씬 더 맛있는 법이다……."
1004903-30 = "3;카즈사;03;……라고, 그 녀석들이 그러기도 했고 말이지. 하하.\n#3;em;[재잘]"
1004903-31 = "3;카즈사;02;아, 방금 건 우리 디저트부 녀석들 이야기였어, 당연한 이야기지만."
1004903-32 = "[s5] \"카즈사도 디저트 자체를 좋아하긴 하는구나.\"\n[s6] \"그런 분위기만 즐기는 건 줄 알았어.\""
1004903-33 = "3;카즈사;07;음~. 역시 그래 보이나. 그야 내가 날 봐도 오해할만하겠지만…….\n#3;em;[땀]"
1004903-34 = "3;카즈사;07;음~. 역시 그래 보이나. 그야 내가 날 봐도 오해할만하겠지만…….\n#3;em;[땀]"
1004903-35 = "3;카즈사;02;그치만 디저트 싫어하는 여고생이 세상에 어딨겠어? 좋아하는 디저트의 종류가 서로 다른 것뿐이겠지."
1004903-36 = "3;카즈사;01;절대로 단지 어울리기 위해 먹는다는 느낌은 아니니까 말이야. 딸기 올라간 생크림 케이크도 좋아하고 마카롱도 아주 좋아해."
1004903-37 = "3;카즈사;99;오히려 너무 좋아하니까……. 퀄리티를 좀 따져서 싸구려 양산품은 피할 정도랄까."
1004903-38 = "3;카즈사;03;말 나온 김에 언제 한번 기회가 되면 선생님한테도 내 나름대로 '엄선한 가게들'을 좀 알려주고 싶네.\n#3;em;[음표]"
1004903-39 = "3;카즈사;13;분명 선생님도 좋아할 텐데……. 뭐, 단 게 취향이 아니라면 별로일 수도 있겠지만 말이지."
1004903-40 = "3;카즈사;04;……음. 아니야. 그래도 괜찮을 거야. 느끼하게 단 그런 맛들은 아니니까 괜찮으려나."
1004903-41 = "3;카즈사;99;아니면 좀 더 담백한 쪽으로…….\n#3;em;…"

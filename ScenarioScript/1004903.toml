1004903-45 = "3;카즈사;02;……아. 이런…….\n#3;em;[땀]\n#3;stiff"
1004903-46 = "3;카즈사;06;말하는 사이에 와 버렸네. 뭐지? 분명 한참 더 있다가 올 줄 알았는데……."
1004903-47 = "3;카즈사;99;지금 오는 거 안 타면 다시 앞으로 20분 정도는 더 기다려야 되는데…….\n#3;em;[속상함]"
1004903-48 = "3;카즈사;01;……어쩔 수 없나. 아직 먹던 것도 한참 남았는데, 뭔가 좀 중간에 잘린 거 같아서 아쉽네."
1004903-49 = "#st;[0,0];instant;1;"
1004903-50 = "#clearST"
1004903-51 = "3;카즈사;01\n#3;em;…\n#wait;2500"
1004903-52 = "3;카즈사;04;음……."
1004903-53 = "3;카즈사;02;선생님. 그냥……. 혹시나 해서 진짜 별 의미 없이 물어보는 건데 말이야."
1004903-54 = "3;카즈사;06;그……. 있잖아.\n#3;stiff\n#3;em;[///]"
1004903-55 = "[s7] \"오늘 일 다 끝났으니까.\"\n[s8] \"20분 정도는 괜찮겠지.\""

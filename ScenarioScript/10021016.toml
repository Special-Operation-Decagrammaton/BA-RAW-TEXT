[translation]
10021016-3 = "──「夏萊的[USERNAME]老師」病危至今，已經過去了75天。"
10021016-4 = "那個事件過後，在遭到摧毀的「夏萊」大樓──#n對老師甦醒的可能性進行了各式各樣的討論──各醫療人員──"
10021016-5 = "另一方面，奇普托斯發生了不可思議的──"
10021016-12 = "我回來了……"
10021016-16 = "…… "
10021016-17 = "……債務還剩下這麼多……"
10021016-18 = "不行……我不再加把勁的話……"
10021016-19 = "就算只有我一個人……也要努力……"
10021016-24 = "…… "
10021016-40 = "……老師。"
10021016-41 = "我……"
10021016-42 = "我，該怎麼做……！"
10021016-46 = "──緊，緊急速報！！"
10021016-54 = "在「老師」失去意識後100天的今天──醫院發表了緊急聲明──"
10021016-55 = "輿論對這件事──"
10021016-58 = "醫療團隊判斷[USERNAME]老師的情況難以好轉──不可能甦醒──"
10021016-59 = "繼續進行安寧醫療沒有意義──"
10021016-60 = "啊，收到了新的速報！目前奇普托斯的──"
10021016-64 = "（……嗯。已經，夠了）"
10021016-65 = "（已經……不用再，努力了）"
10021016-70 = "（啊，圍巾……）"
10021016-71 = "啊啊……這樣啊。"
10021016-72 = "……沒錯。"
10021016-78 = "（前方，看不太清楚……） "
10021016-79 = "（因為流了太多血……？因為沒有處理傷口，又好幾天沒進食了？──還是……）"
10021016-80 = "（這樣下去，我……）"
10021016-87 = "（我，將會這樣……結束啊）"
10021016-88 = "（……這樣啊）"
10021016-89 = "（已經，不需要再受苦了……）"
10021016-90 = "（太好了……）"
10021016-91 = "（但是，這樣一來……為什麼……）"
10021016-92 = "（……老師） "
10021016-93 = "（那我……） "
10021016-94 = "（是為了什麼，而[ruby=誕生]存在[/ruby]在這裡的呢）"
10021016-95 = "（……）"
10021016-98 = "（……）"
10021016-99 = "（……原來如此）"
10021016-100 = "（不管是我……還是大家……）"
10021016-101 = "……都是為了受苦，才會誕生的啊。"
10021016-110 = "……？"
10021016-112 = "「色彩」終於[ruby=阿努比斯]和死神接[/ruby]觸了──"
10021016-113 = "雖然不清楚「色彩」引導的是「痛苦」還是「死亡」──#n不過，這就是最後階段了。"
10021016-114 = "能夠將「被遺忘的神祇們」逐出這個世界了……能將終焉呼喚到這個世界了。"
10021016-116 = "祂們總算面臨了與吾等相同的命運。"
10021016-117 = "就像因無名而無法呼喚，因無法呼喚而不存在的「無名之神」一樣，#n你們也會迎向相同的結局吧。"
10021016-118 = "儘管有許多危險之處，能引來色彩實屬僥倖。"
10021016-120 = "祭司崇拜著神，因而能夠擁有「崇高」。"
10021016-121 = "吾等將在此迎接嶄新的「崇高」──將其化為己有。"
10021016-122 = "引導所有生命前往「[ruby=冥界]其他地方[/ruby]」的死神──"
10021016-130 = "「阿努比斯」。"
10021016-132 = "往後，你將以因「色彩」顯現的自身的「恐怖」籠罩這個世界吧。"
10021016-133 = "在那之前──死亡與安息……都不被允許。"
10021016-134 = "直到成為「色彩的嚮導者」，讓一切存在都回歸虛無為止！"
10021016-136 = "直到將所有時空的「被遺忘的神祇們」消滅為止──"
10021016-140 = "唔啊啊啊啊啊啊啊啊啊！！"
10021016-141 = "那，那是什麼！！"
10021016-142 = "不，不要啊啊啊啊──！！！"
10021016-146 = "唔哇啊啊啊啊啊啊啊啊！！"
10021016-152 = "[ns] 睜開眼睛"
10021016-156 = "[ns] 起身"
10021016-159 = "[ns1]（嘴巴不聽使喚）\n[ns2]（看不清楚前方）\n[ns3]（身體異常沉重）"
10021016-163 = "[ns] 解除身上連接的各種裝置"
10021016-165 = "……[USERNAME]老師！？怎，怎麼……"
10021016-166 = "你的情況別說是移動手指，就連恢復意識都非常絕望──"
10021016-167 = "[s] 開口"
10021016-168 = "現，現在連開口都有困難吧……請，請別接觸臉部，我們用鐵板才好不容易──"
10021016-169 = "啊……！比起這個，請立刻逃跑吧──"
10021016-173 = "唔哇啊啊啊啊啊！快，快逃！！"
10021016-177 = "[ns] 拿起床邊的希迪姆的箱子和重要的東西"
10021016-179 = "[ns] 開啟希迪姆的箱子的電源"
10021016-181 = "……生物認證完畢。確認為[USERNAME]老師。"
10021016-182 = "請下達命令，老師。"
10021016-183 = "[s] 傳達該做的事"
10021016-184 = "……確認命令。"
10021016-185 = "知道了。從現在起，我A.R.O.N.A將成為老師的雙眼、雙耳和雙腿。"
10021016-186 = "請往這裡。"
10021016-188 = "哦哦，「箱子」的主人正在接近這裡……！！"
10021016-189 = "那個人不是已經「結束」了嗎？#n死神可以對付他──對付那個箱子嗎？"
10021016-190 = "但是，他的能力也有極限。那不完整的身體能做的事應該不多。"
10021016-192 = "啊啊。首先把箱子……先破壞箱子吧。"
10021016-193 = "得阻止那個人，不讓他創造奇蹟。"
10021016-195 = "只要沒有那個東西，那個人就什麼也不是了。"
10021016-205 = "已經，沒有保護老師的辦法了。"
10021016-206 = "[USERNAME]老師。"
10021016-212 = "這樣…… "
10021016-213 = "這樣一切……就會結束了。"
10021016-220 = "……"
10021016-221 = "不行……我……"
10021016-222 = "辦不到……"
10021016-224 = "[ns4]（雖然子彈沒有命中……）\n[ns5]（但身體已經無法再……）"
10021016-230 = "老師，對不起……這都怪我……"
10021016-231 = "都是我的錯……"
10021016-232 = "……因為，我，活著……"
10021016-235 = "這……這是……"
10021016-238 = "色彩……把老師給……？"
10021016-239 = "不，不行…………"
10021016-240 = "住，住……手……"
10021016-241 = "不……不行不行不行不行不行不行……"
10021016-242 = "老，師…………"
10021016-243 = "因為我，才……怎麼，會……"
10021016-244 = "啊……啊啊……啊啊啊啊啊啊啊啊啊啊啊……"
10021016-249 = "不要啊啊啊啊啊啊啊啊啊啊啊────！！！！！！"
10021016-253 = "這是……！！"
10021016-254 = "誘，誘騙者站起來了，老師！！"
10021016-261 = "還有，那種力量嗎……"
10021016-262 = "「阿特拉哈西斯的方舟」的所有能量……正在向誘騙者集中！"
10021016-263 = "老師！不阻止誘騙者的話……！！"
10021016-264 = "現在誘騙者的「希迪姆的箱子」處於停止狀態！#n要制服他的話就趁現在！"

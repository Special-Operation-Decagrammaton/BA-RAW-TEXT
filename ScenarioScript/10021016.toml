[translation]
10021016-3 = "Schale's [USERNAME] Sensei has been in critical condition for 75 days."
10021016-4 = "In the ruins of the Schale building after that incident, when the doctors were discussing Sensei's chances..."
10021016-5 = "Meanwhile in Kivotos, there's another mystery..."
10021016-12 = "I'm back."
10021016-16 = "..."
10021016-17 = "The school's debt is still..."
10021016-18 = "No, I have to stay strong."
10021016-19 = "Even when I'm by myself, I have to stay strong."
10021016-24 = "..."
10021016-40 = "I..."
10021016-41 = "Sensei, I..."
10021016-42 = "What do I do?"
10021016-46 = "Breaking news! Urgent breaking news!"
10021016-54 = "It's been 100 days since Sensei fell unconscious, and the hospital just released a statement."
10021016-55 = "According to this statement..."
10021016-58 = "Medical staff have declared that [USERNAME] Sensei is unresponsive and will not recover."
10021016-59 = "The doctors will discontinue life-sustaining treatment..."
10021016-60 = "More breaking news! Kivotos' current..."
10021016-64 = "(It's done now.)"
10021016-65 = "(There's no need to continue on like this.)"
10021016-70 = "(Ah, the scarf...)"
10021016-71 = "I see."
10021016-72 = "Yeah."
10021016-78 = "(I can't see very well.)"
10021016-79 = "(Have I lost too much blood? Or maybe it's because I didn't treat the wound right away? Or because I haven't eaten in days...)"
10021016-80 = "(At this rate...)"
10021016-87 = "(I can't keep this up... This is the end.)"
10021016-88 = "(I see.)"
10021016-89 = "(There's no need to suffer anymore.)"
10021016-90 = "(What a relief.)"
10021016-91 = "(But if it's going to be that way...)"
10021016-92 = "(I...)"
10021016-93 = "(Sensei...)"
10021016-94 = "(Why did I have to be born here?)"
10021016-95 = "..."
10021016-98 = "(Ah.)"
10021016-99 = "(Yes, I see.)"
10021016-100 = "(I was... We were all...)"
10021016-101 = "...born to suffer..."
10021016-110 = "...?"
10021016-112 = "The Chroma has finally made contact with the god of the underworld!"
10021016-113 = "I can't tell if it was drawn by pain or death... Either way, this is the final stage."
10021016-114 = "The Forgotten Gods can now be banished from this world. The end is nigh."
10021016-116 = "At last, they will face the same fate as the rest of us."
10021016-117 = "You shall be as the Nameless Gods who lost their place in this world when they lost their names."
10021016-118 = "Despite the risks, the Chroma was the answer."
10021016-120 = "The priests own the god they so fervently worship."
10021016-121 = "Face the new sublime."
10021016-122 = "Behold the god of death that guides the living to the underworld."
10021016-130 = "Anubis!"
10021016-132 = "The Chroma has made your fear manifest. Now cast it upon this world."
10021016-133 = "Until you do, you will not know rest nor death."
10021016-134 = "Become the Guide of Chroma. Bring an end to all that exists!"
10021016-136 = "Do not stop until all Forgotten Gods of all times and all dimensions cease to exist!"
10021016-140 = "Ah, aghhhhh!"
10021016-141 = "What is that?!"
10021016-142 = "N-No! Ahhhhh!"
10021016-146 = "Ah, aghhhhh!"
10021016-152 = "[ns] Open your eyes."
10021016-156 = "[ns] Sit up in the bed."
10021016-159 = "[ns1] \"(Why can't I move my mouth?)\"\n[ns2] \"(Why can't I see?)\"\n[ns3] \"(Ugh. My body feels so sluggish.)\""
10021016-163 = "[ns] Remove the tubes and devices attached to your body."
10021016-165 = "[USERNAME] Sensei?! How?!"
10021016-166 = "In your condition, you shouldn't even be conscious, let alone moving!"
10021016-167 = "[s] Speak."
10021016-168 = "No, don't try to talk. And don't touch your face. There are dozens of steel plates holding you together."
10021016-169 = "Ah! You need to run! Now!"
10021016-173 = "Ahhhhh! Run!"
10021016-177 = "[ns] Pick up the Shittim Chest and your belongings next to the bed."
10021016-179 = "[ns] Power on the Shittim Chest."
10021016-181 = "Biometric verification complete. [USERNAME] Sensei verified."
10021016-182 = "What is your command, Sensei?"
10021016-183 = "[s] Explain what needs to be done."
10021016-184 = "Confirmed."
10021016-185 = "Understood. I will be your eyes, ears, and legs, Sensei."
10021016-186 = "This way."
10021016-188 = "The master of the Chest is coming!"
10021016-189 = "I thought they were out of the picture. Must the god of the underworld deal with them and the Chest?"
10021016-190 = "Surely they have limits. How much damage can they really do in such a weakened state?"
10021016-192 = "Priorities. The Chest. Destroy the Chest first."
10021016-193 = "Don't give them the chance to perform a miracle."
10021016-195 = "Without that, they are nothing."
10021016-205 = "We're all out of ways to protect Sensei now."
10021016-206 = "[USERNAME] Sensei."
10021016-212 = "With this..."
10021016-213 = "With this...everything will be over."
10021016-220 = "..."
10021016-221 = "No... I..."
10021016-222 = "...I can't do it."
10021016-224 = "[ns4] \"(The bullet must have missed my vitals, but...)\"\n[ns5] \"(I can't... My body is not doing what I need it to.)\""
10021016-230 = "Sensei, I'm sorry. It's my fault."
10021016-231 = "It's all because of my mistake."
10021016-232 = "It's because... I lived..."
10021016-235 = "Th-This is...?"
10021016-238 = "No... The Chroma... Sensei...?"
10021016-239 = "No... NO! Stop, stop, stop!"
10021016-240 = "No, Sensei, no!!!"
10021016-241 = "No, no, no!"
10021016-242 = "The Chroma is even affecting Sensei?"
10021016-243 = "No, no, no, no, no, no, no, Sensei!!!"
10021016-244 = "No! It's all because of me. NO!"
10021016-249 = "NO!!!"
10021016-253 = "This is..."
10021016-254 = "Phrenapates is getting back up! Sensei!"
10021016-261 = "How can a power like this exist?"
10021016-262 = "All energy from the Ark of Atrahasis is focusing on Phrenapates!"
10021016-263 = "Sensei! We have to stop Phrenapates now!"

[translation]
10046170-3 = "อ๊ะ ชมรมทวงความยุติธรรม ฉันกำลังตามหาอยู่เลย"
10046170-4 = "คุณคือ... สมาชิกชมรมเดียวกับโคฮารุ..."
10046170-9 = "(ชิราสึ อาซึสะ นักเรียนที่อยู่ชมรมคาบเรียนเสริมกับโคฮารุ... แต่ถ้ากิตติศัพท์ของเธอมีแค่นี้ก็ดีน่ะสิ)"
10046170-14 = "(ตัวตนที่แท้จริงของเธอคือเด็กเจ้าปัญหาที่ก่อเรื่องที่คาดไม่ถึงมากมาย นอกจากนี้ยังไม่ค่อยแสดง#nอารมณ์เท่าไร จนได้ฉายาว่าเป็น <แม่มดน้ำแข็ง>)"
10046170-15 = "(ถึงจะดูตรงกันข้ามกับรูปลักษณ์ภายนอก แต่เธอดูจะเชี่ยวชาญกับการประวิงเวลาเพื่อให้ฝ่ายตรงข้าม#nบาดเจ็บมากที่สุด)"
10046170-16 = "(บอกตามตรงว่า... เป็นคนที่ฉันอยากเจอน้อยที่สุดในช่วงเวลายุ่งๆ แบบนี้เลย)"
10046170-21 = "ฉันขอถามเผื่อไว้นะคะ ที่บอกว่าตามหาฉันอยู่... แปลว่าคุณอยากมาหาเรื่องอะไรทำนองนั้นใช่มั้ยคะ?"
10046170-22 = "พูดถึงเรื่องอะไรน่ะ ไม่เห็นจะเข้าใจเลย"
10046170-23 = "ฉันมาช่วยเธอน่ะ"
10046170-27 = "คะ......?"
10046170-28 = "เอ่อ คือ... ขอโทษนะคะ คุณอาซึสะไม่ได้เกลียดชมรมทวงความยุติธรรมหรอกเหรอคะ?"
10046170-29 = "ทำไมล่ะ?"
10046170-30 = "ถามกลับเฉยเลย... ก็คุณมีเรื่องกับพวกฉันอยู่ตลอดเลยนี่คะ?"
10046170-31 = "พอมาคิดดู หลังจากมาอยู่ทรีนิตี้ ฉันก็ปะทะอาวุธกับชมรมทวงความยุติธรรมอยู่เรื่อยๆ เลย"
10046170-32 = "แต่นั่นเป็นเพราะชมรมทวงความยุติธรรมทำหน้าที่ในการรักษาความเรียบร้อยในทรีนิตี้เป็นอย่างดี#nไม่ใช่เหรอ? พวกเราก็แค่ทำดีที่สุดในจุดของตัวเองก็เท่านั้น"
10046170-33 = "ฉันกลับเคารพการทำงานอย่างเต็มที่แบบนั้นด้วยซ้ำ"
10046170-34 = "อ่า... ขอบคุณค่ะ"
10046170-35 = "ไม่ใช่แค่นั้นนะ"
10046170-36 = "ชมรมทวงความยุติธรรมยังทำให้ฉันมีความทรงจำล้ำค่าร่วมกับฮิฟุมิ มาชิโระ แล้วก็กับชมรมทวงความยุติธรรมเองด้วย"
10046170-37 = "ฉันรู้สึกขอบคุณชมรมทวงความยุติธรรมอยู่ตลอดเลยละ"
10046170-38 = "เอ่อ... ค่ะ"
10046170-39 = "งั้นธุระของคุณกับฉันก็คือ...?"
10046170-40 = "ความรู้สึกที่อยากตอบแทนหนี้บุญคุณ... ฉันได้เรียนรู้เรื่องแบบนั้นหลังจากมาอยู่ที่นี่น่ะ"
10046170-41 = "แต่ก็แน่นอนว่า... เธอต้องอนุญาตให้ฉันทำด้วย..."
10046170-42 = "แหะๆๆ... ต่างกับที่ฉันคิดไว้เลยนะคะ เป็นคนประเภทที่หายากจริงๆ อ๊ะ ฉันหมายถึงในแง่ดีน่ะค่ะ"
10046170-43 = "เอาเถอะ... งั้นก็ดีเลยค่ะ! ฉันเองก็กำลังอยากได้ความช่วยเหลืออยู่พอดี งั้นก็ถือว่าเราได้ช่วยกันและกันนะคะ!"
10046170-44 = "การทำงานจิตอาสาของฉันแค่วันเดียวคงเทียบไม่ได้กับการดูแลความสงบเรียบร้อยอย่างที่พวกเธอ#nทำกันประจำ..."
10046170-45 = "แต่ฉันจะไม่ทำให้ผิดหวังเลยละ วางใจได้เลย ฉันถูกฝึกมาให้รับมือกับทุกสถานการณ์ที่เกิดขึ้นอยู่แล้ว"
10046170-46 = "เอ่อ... ฉันขอถามเผื่อไว้นะคะ คุณรู้หรือเปล่าคะว่ามาช่วยทำอะไร?"
10046170-47 = "แน่นอนสิ ช่วยสืบหาศัตรูที่แฝงตัวเข้ามา แล้วก็ปฏิบัติเคลื่อนไหวทำลายล้างด้วย?"
10046170-48 = "คะ...? ทำลายล้าง...?"
10046170-49 = "วินาทีที่กองกำลังของศัตรูแทรกซึมเข้ามา วินาทีนั้นก็คือสถานการณ์ฉุกเฉินที่จะรอช้าอยู่ไม่ได้ ถ้าเราไม่ระงับไว้แต่เนิ่นๆ ละก็..."
10046170-50 = "ไม่สิ ฉันอธิบายยืดยาวจนเสียเวลาไปมากแล้ว เอาละ เรารีบไปกันเถอะ!"
10046170-56 = "แบบนี้จะไม่เป็นไรจริงๆ ใช่มั้ยนะ...?"

10046170-27 = "3;이치카 수영복;04;…………네?\n#3;stiff"
10046170-28 = "3;이치카 수영복;20;어, 저기, 실례지만, 아즈사 씨는 정의실현부를 미워하고 계시지 않습니까?"
10046170-29 = "3;아즈사 수영복ND;02;왜?\n#3;em;[?]"
10046170-30 = "3;이치카 수영복;04;그렇게 되물으셔도…… 항상 저희랑 싸우고 있었잖아요……?"
10046170-31 = "3;아즈사 수영복ND;99;그러고 보면, 트리니티에 오고 나서 정의실현부와 무력 충돌이 잦았던 것은 사실이네."
10046170-32 = "3;아즈사 수영복ND;02;하지만 그건 정의실현부가 트리니티 치안 유지라는 제 임무를 다했기 때문이지? 각자 서로의 자리에서 최선을 다했을 뿐."
10046170-33 = "3;아즈사 수영복ND;99;오히려 언제나 소임을 다하는 그 모습은 존경하고 있어."
10046170-34 = "3;이치카 수영복;20;어, 감사합니다.\n#3;em;…"
10046170-35 = "3;아즈사 수영복ND;01;그뿐만이 아니야."
10046170-36 = "3;아즈사 수영복ND;99;정의실현부 덕분에 나는 히후미, 마시로, 정의실현부장과도 소중한 추억을 만들 수 있었어."
10046170-37 = "3;아즈사 수영복ND;06;이런 체험을 시켜준 정의실현부에 대해서는 마음 깊이 감사하고 있어."
10046170-38 = "3;이치카 수영복;20;허어…… 네."
10046170-39 = "3;이치카 수영복;04;그래서 용건은 설마……?"
10046170-40 = "3;아즈사 수영복ND;99;……빚진 것을 보답하고 싶은 것은 당연한 감정. 나는 여기에 와서 그렇게 배웠어."
10046170-41 = "3;아즈사 수영복ND;04;물론, 너만, 괜찮다면, 말이지만……."
10046170-42 = "3;이치카 수영복;00;아하하…… 생각한 거랑 다르달까, 보기 드문 타입이네요. 아, 좋은 의미로 말임다.\n#3;em;[재잘]"
10046170-43 = "3;이치카 수영복;07;……뭐, 좋슴다! 마침 저도 도움이 필요한 상황이었으니, 이걸로 서로 쌤쌤인 셈치죠!\n#3;jump"
10046170-44 = "3;아즈사 수영복ND;06;평시에도 치안 활동을 하고 있는 너희와, 내가 하루 봉사하는 것이 대등한 가치를 지녔다고 생각하지는 않지만……."
10046170-45 = "3;아즈사 수영복ND;03;실망하게 하지 않을게. 맡겨줘. 나는 어떤 상황에도 대처 가능하게 훈련받았으니까."
10046170-46 = "3;이치카 수영복;20;저어…… 혹시나 해서 묻지만, 뭘 돕는 건지는 아는 거죠?"
10046170-47 = "3;아즈사 수영복ND;02;물론이야. 내부에 침투한 적을 수색, 격멸하는 기동 작전인 거지?\n#3;em;[반짝]"
10046170-48 = "3;이치카 수영복;02;네……? 격멸……?\n#3;stiff"
10046170-49 = "3;아즈사 수영복ND;06;적성 세력에 침투를 허용한 시점에서, 촌각을 다투는 긴급 사태라고 이해하고 있어. 조기에 진압하지 못한다면……."
10046170-50 = "3;아즈사 수영복ND;08;이런, 너무 길게 시간을 빼앗았네. 자, 어서, 서두르자!\n#3;m4"

[translation]
10046170-3 = "啊，實現正義部。我一直在找你。"
10046170-4 = "你是……跟小春同社團的……"
10046170-9 = "（白洲梓。是和小春一起補課的學生……如果只是這樣就好了）"
10046170-14 = "（實際上他的真面目，是接連引發難以想像事件的問題兒童。#n　又因為那張面無表情的臉而被稱為「冰之魔女」）"
10046170-15 = "（外表看似柔弱，實際上擅長讓對手大量出血的粗暴消耗戰）"
10046170-16 = "（……老實說，他是在這種忙碌時刻最不想遇到的對手）"
10046170-21 = "我先確認一下……#n你說在找我……果然是那個意思吧？"
10046170-22 = "我不知道你指的是什麼。"
10046170-23 = "但我是來幫你的。"
10046170-27 = "…………咦？"
10046170-28 = "那個，就是……梓同學不是討厭實現正義部嗎？"
10046170-29 = "為什麼？"
10046170-30 = "問我為什麼……#n你一直都在和我們交手不是嗎……？"
10046170-31 = "這麼說來，來到三一之後確實經常和實現正義部發生武力衝突。"
10046170-32 = "但那只是因為實現正義部履行了維持三一治安的職責吧？#n大家不過是在各自的位置上盡力而為罷了。"
10046170-33 = "我反而一直很敬佩你們盡忠職守的態度。"
10046170-34 = "啊，謝謝你。"
10046170-35 = "不只如此。"
10046170-36 = "多虧了實現正義部，我才能和日步美、麻白、還有實現正義部部長留下珍貴的回憶。"
10046170-37 = "因此我一直對帶給我這些體驗的心懷感謝。"
10046170-38 = "這……這樣啊。"
10046170-39 = "所以你該不會是想……？"
10046170-40 = "想回報曾經受過的恩情，是理所當然的情感……這是我在這裡學到的。"
10046170-41 = "當然前提是你也同意就是了……"
10046170-42 = "啊哈哈……跟我想的不太一樣呢，該說是少見的類型嗎？#n啊，是指好的方面哦。"
10046170-43 = "……嗯，好吧！#n正好我也需要幫手，這樣就算是互相扯平了吧！"
10046170-44 = "雖然我不認為平時就從事治安工作的你們，和我一天的志願服務能有同等的價值……"
10046170-45 = "但我不會讓你失望的。交給我吧。#n以前我曾接受過能應付任何狀況的訓練。"
10046170-46 = "那個，我只是想確認一下……你應該知道要幫忙什麼吧？"
10046170-47 = "當然。搜索並殲滅潛入內部的敵人──屬於機動作戰的一種對吧？"
10046170-48 = "咦……？殲滅……？"
10046170-49 = "既然敵對勢力已經滲透進來，就代表這是分秒必爭的緊急狀況。#n如果不能及時鎮壓的話……"
10046170-50 = "糟糕，已經耽誤太多時間了。#n來，趕緊行動吧！"
10046170-56 = "……真的沒問題嗎？"

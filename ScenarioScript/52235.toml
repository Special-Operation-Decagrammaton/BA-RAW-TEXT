[translation]
52235-4 = "...Just what are you scheming, President Niya?"
52235-8 = "Oh? I don't believe I've had the pleasure?"
52235-9 = "Am I talking to the bard who orchestrated this little event? Or maybe you're just another shadow."
52235-10 = "A bard? You're comparing me to that foolish little brat? You may be the head of the Yin-Yang Club, but I'd tread carefully with your insults."
52235-11 = "Fufu, is that so? It's just that you quite reminded me of Shuro, barging in here without even an introduction."
52235-12 = "It was not my intention to offend, of course. I hope you can find it in your heart to forgive me."
52235-16 = "...Your cheap provocations will not improve your situation."
52235-17 = "Like how your boorish attempts to force this festival of yours will amount to nothing."
52235-18 = "...Ho."
52235-19 = "Then I suppose I'll introduce myself."
52235-20 = "They call me Habu Azami."
52235-21 = "As you guessed, I'm tonight's storyteller, Nature's Beauty's Phantom Artist, and Miss Kokuriko's most trusted aide."
52235-23 = "We destroyed Inou's Phantom Records during the last incident..."
52235-24 = "Repetition makes even the most amusing of tales pretty tedious, but I suppose those of bad taste..."
52235-25 = "Again, you insult me. That mediocre tome attempts to tell a tale without even a single illustration."
52235-26 = "My tome, on the other hand, is the Toutei's Phantom Illustrations. It is born of human fear."
52235-27 = "Hazy desire feeds the Phantom Records. Fear, on the other hand... The Phantom Illustrations' fear is visceral. Vivid. Exquisite."
52235-28 = "Desires are fleeting, fickle, but fears take root in the very soul of a person."
52235-29 = "From tiny bugs to giant beasts. Familiar tormentors to nameless strangers."
52235-30 = "One cannot dismiss fear by turning their head, closing their eyes. Its brushstrokes scar with a scathing intensity."
52235-31 = "Struggle as they may, humans are incapable of overcoming their fears."
52235-32 = "As long as Hitotsume's gaze is trained upon you, you will find yourself in an endless nightmare. And that nightmare will become the seedbed for the Phantom Illustrations' reign."
52235-33 = "Nyahaha. Its \"seedbed,\" you say? Are your old-fashioned colloquialisms popular over at the Ebisu branch?"
52235-34 = "I'll ask you one more time, President Niya."
52235-35 = "Are you so naive to think that this hopeless struggle of yours will change the outcome of tonight's events?"
52235-36 = "No? Not really?"
52235-37 = "I'm painfully aware that I can't change a single thing on my own."
52235-41 = "Then why do you insist on this fruitless festival of yours?"
52235-42 = "Is this some ploy to alleviate your personal guilt?"
52235-46 = "...I have a question of my own, Azami."
52235-47 = "From our turbulent past to the present..."
52235-48 = "Phantoms once roamed Hyakkiyako freely, spreading their ghost stories far and wide. Do you know why, after our schools merged, they now only rarely dance along the outskirts of our district?"
52235-49 = "The work of your meddling Yin-Yang Club, undoubtedly."
52235-50 = "Nyahahaha! How cute of you."
52235-51 = "I never would've stuck around as the president if holding off phantoms fell under my purview."
52235-56 = "The answer is simple: Hyakkiyako's festivals."
52235-57 = "...The festivals?"
52235-58 = "You're getting it. Flashy, extravagant festivals that brought a once-divided district together."
52235-59 = "You really never once considered it?"
52235-60 = "Isn't it strange that the Festival Operations Department has the power it does? Not a student council, not a disciplinary committee. A mere club, managing our yearly calendars, overseeing the academy's finances."
52235-61 = "Contrary to popular belief, it's not because I'm lazy. Kuzunoha herself set this system in place."
52235-62 = "It's said that festivals were once holy rites to communicate with the heavens."
52235-63 = "We offered food, spoke of our hardships, and sent heartfelt wishes for a peaceful future."
52235-64 = "To summarize for you, what we're putting on tonight is no mere festival."
52235-68 = "...It's a great rite, our festival, that will usher in a serene tomorrow."
52235-69 = "What are you...?"
52235-73 = "Hitotsume's eye...is fading?"
52235-87 = "You! What have you done?!"
52235-88 = "Nothing in particular. Just what I've always done."
52235-89 = "The Yin-Yang club exists to maintain balance."
52235-94 = "If the town is flooded with yin, we'll simply balance it with yang... It's in our name, after all."
52235-97 = "Th-There's an eye this way too!"
52235-98 = "It doesn't matter which way we run! We can't escape its gaze!"
52235-99 = "That stare... Argh! These terrible thoughts are too much! Make it stop!"
52235-100 = "It's over... Everything's over... Without the Hyakkaryouran here to protect us, that monster will swallow us all!"
52235-104 = "...Huh? Is something...singing?"
52235-105 = "Are you hearing things now too? Who could possibly be singing right now?"
52235-106 = "No, no. Listen. Don't you hear it? I...know that voice..."
52235-108 = "Everyone, the Waraku Festival will go on! Please gather at the stage!"
52235-109 = "It's your once‑in‑a‑lifetime chance to hear Chise's unreleased song from the very front row!"
52235-110 = "And we're releasing all of the limited-edition Chise merch we've been saving just for today!"
52235-111 = "Please refresh yourself with a cold cherry blossom soda on your way to the stage!"
52235-114 = "Who...is that performer?"
52235-115 = "Are you serious?! That's Chise! This entire festival is about her, Hyakkiyako's #1 idol, Princess Waraku!"
52235-116 = "They're still holding the festival? I never thought I'd hear her voice ever again..."
52235-123 = "Out of my way! I'm going to see Chise's live performance!"
52235-124 = "Our lives are in danger! You're going to go enjoy a FESTIVAL right now?!"
52235-125 = "If I'm doomed, then I want to meet the end by Chise's side!"
52235-130 = "Hold on tight, everyone!"
52235-131 = "To the far side of the spirit realm!"
52235-136 = "...I'll acknowledge that this was a decent play on your part."
52235-137 = "This was your scheme all along, to neutralize the Phantom Illustrations' fear with the festival's cheer."
52235-138 = "But what now? Do you intend to hold an eternal festival?"
52235-139 = "As soon as your little festival ends, fear will once again grip the academy."
52235-140 = "All this does is delay the inevitable. You can only avert its gaze for so long."
52235-141 = "Is that so? I'm flattered that you're so enthralled with me, but shouldn't you spare a little attention to where it's looking now?"
52235-142 = "You'll miss the beautiful fireworks show going on above the Tenshukaku."
52235-143 = "...Of all things, why would I care about a fireworks show?"
52235-144 = "Oho, you don't know? Allow me to educate you."
52235-145 = "Long before wireless comms came into play, people used fireworks as signal flares when they needed rescue."
52235-147 = "You little...! You signaled the Hyakkaryouran?!"
52235-149 = "This is the marksmanship of the Hyakkaryouran..."
52235-153 = "Our blazing youth!"
52235-164 = "Next Episode;The Cry of Relief"

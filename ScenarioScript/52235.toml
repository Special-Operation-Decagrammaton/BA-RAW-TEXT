[translation]
52235-4 = "……在想什麼事嗎，仁耶部長？"
52235-8 = "哎呀，是沒見過的面孔呢。"
52235-9 = "你就是這次引發怪談的怪談家嗎？#n又或者是某個人的影子呢……？"
52235-10 = "怪談家……？#n居然被拿來跟那個半吊子的小鬼頭相提並論……#n就算你是陰陽部的部長，這話也讓人有些不愉快呢。"
52235-11 = "呵呵，畢竟你突然不請自來的行為，簡直和之前見過的棕櫚同學如出一輒。"
52235-12 = "若是無意間有所冒犯，還請多多包涵。"
52235-16 = "……這種廉價的挑釁，可是無法改變任何事情的哦。"
52235-17 = "就像你們即使強行舉辦祭典，也無法扭轉這個局面一樣。"
52235-18 = "……哦？"
52235-19 = "雖然有點晚了，不過還是來做個自我介紹吧。"
52235-20 = "我名叫土生薊。"
52235-21 = "如你所說正是負責這次故事的當事人，#n同時也是花鳥風月部的怪藝家──雛罌粟大人的心腹。"
52235-23 = "能引發怪談的怪書《稻生物怪錄》應該已經被破壞了才對……"
52235-24 = "而且無論多麼有趣的笑話，一聽再聽也是會厭煩的……看來你們似乎不覺得膩呢。"
52235-25 = "請不要拿那種連插圖都沒有的無聊故事來跟我比較好嗎？"
52235-26 = "我手上的怪書《稻亭物怪錄》的力量，源自於人類的恐懼。"
52235-27 = "與《稻生物怪錄》追求的欲望不同，#n《稻亭物怪錄》的恐懼能喚起更加鮮明且清晰的意象。"
52235-28 = "不清楚自己真正渴望的人比比皆是，但所有人都能清楚想像自己害怕什麼。"
52235-29 = "從微小的蟲子到巨大的猛獸……從熟悉的惡友到陌生的他人……"
52235-30 = "過於鮮明的恐懼形象，會在心中染上難以驅散的強烈色彩。"
52235-31 = "無論怎麼掙扎，都永遠無法從這份恐懼中脫身。"
52235-32 = "只要一目仍在注視，你們就得永遠顫抖著成為滋養《稻亭物怪錄》神祕力量的溫床。"
52235-33 = "喵哈哈……溫床這種說法還真有古風，不愧是來自惠比壽分校的人呢。"
52235-34 = "那麼我再問你一次，仁耶部長。"
52235-35 = "你真的認為那種掙扎能改變什麼嗎？"
52235-36 = "當然不認為囉？"
52235-37 = "只靠我的力量無法改變任何事情，這點我比誰都清楚。"
52235-41 = "那又為何還要繼續舉辦祭典？"
52235-42 = "難道是覺得只要多少掙扎一下，就能稍微減輕罪惡感嗎？"
52235-46 = "……可以反過來請教你一個問題嗎，薊同學？"
52235-47 = "從過去的戰亂時代直到今日……"
52235-48 = "那些在百鬼夜行自治區各處迷惑人心、散播怪談的怪異──#n為何在學園聯合之後只能偶爾在外圍現身的原因……你知道嗎？"
52235-49 = "那還用說……肯定是你們陰陽部的傢伙動了什麼手腳吧。"
52235-50 = "喵哈哈～怎麼可能。"
52235-51 = "假如真得做那種麻煩事的話，我一開始就不會接下陰陽部部長的位置了。"
52235-56 = "正確答案是……百鬼夜行持續舉辦的「祭典」。"
52235-57 = "……祭典？"
52235-58 = "沒錯，就是讓眾人齊聚一堂的大型祭典。"
52235-59 = "你難道不覺得奇怪嗎？"
52235-60 = "一個不是學生會的普通社團「節慶運營管理部」居然可以決定學園的學事日程，#n乃至於左右整個自治區的資金流動……"
52235-61 = "這並不是因為我怠忽職守，而是從葛葉時代就決定下來的事。"
52235-62 = "最初的祭典，源自於向天祈禱的祭祀。"
52235-63 = "獻上供品以呼喚靈魂、訴說現世的困境、祈求未來的平安──"
52235-64 = "換言之，現在即將繼續舉辦的，並不只是單純的「祭典」。"
52235-68 = "……而是迎接安穩明日的巨大「祭儀」。"
52235-69 = "那是什麼意思……"
52235-73 = "一目的視線……變模糊了？"
52235-87 = "你這傢伙到底做了什麼！"
52235-88 = "沒做什麼特別的事哦～"
52235-89 = "維持平衡與和諧，就是我們陰陽部的職責所在。"
52235-94 = "假如街道充滿陰氣，便用陽氣加以中和……這是再簡單不過的陰陽之理。"
52235-97 = "這，這裡也有眼睛！"
52235-98 = "不管逃到哪裡都在盯著我們……！"
52235-99 = "每次跟它對到視線，腦袋裡就會出現揮之不去的可怕念頭……"
52235-100 = "完蛋了……現在百花繚亂也不在，我們全都會被那個怪物給吃掉的！"
52235-104 = "……咦？好像從哪裡傳來了歌聲？"
52235-105 = "是你聽錯了吧？#n哪有人會在這種混亂的情況下唱歌啊？"
52235-106 = "不，我確實聽見那邊傳來了熟悉的歌聲……"
52235-108 = "各位，和樂祭並不會中止！請大家快到舞台前集合吧！"
52235-109 = "這可是能在第一排直擊知世醬未公開新曲的、千載難逢的機會哦！"
52235-110 = "珍藏已久的知世醬限定周邊，也將會進行大放送！"
52235-111 = "演出期間還有櫻花蘇打可以喝哦！"
52235-114 = "那邊在表演的是誰啊？"
52235-115 = "你居然認不出來？#n就是百鬼夜行的最強偶像、這次祭典的主角「和樂公主知世醬」啊！"
52235-116 = "沒想到會決定照常開演……我本來還以為聽不見知世大人的歌聲了呢……"
52235-123 = "讓開！我要馬上去看知世大人的表演！"
52235-124 = "現在這麼危險還想享受祭典……？"
52235-125 = "既然橫豎都要完蛋，至少最後得看著知世大人的表演離開吧！"
52235-130 = "大家抓緊囉～"
52235-131 = "直到黃昏的盡頭～"
52235-136 = "……的確不是個壞主意呢。"
52235-137 = "以祭典的喧鬧暫時改變氣氛，藉此中和《稻亭物怪錄》的恐懼……"
52235-138 = "不過你打算永遠辦下去嗎？"
52235-139 = "祭典遲早會有結束的一天。#n屆時怪書的恐懼將再次壟罩這個學園。"
52235-140 = "……你那所謂的妙計，終究只是掩耳盜鈴的權宜之計罷了。"
52235-141 = "是嗎？我想現在應該留意視線的恐怕不是我，而是你才對吧？"
52235-142 = "看來你的眼睛，已經看不見綻放在天守閣上空的華麗煙火了呢。"
52235-143 = "那種煙火，現在有什麼重要的……"
52235-144 = "原來你不知道嗎？#n那我就趁這個機會告訴你吧。"
52235-145 = "在無線技術發達之前，煙火可是用來告知救援者位置的信號呢。"
52235-147 = "你這傢伙，難道趁機向百花繚亂──"
52235-149 = "這就是百花繚亂式射擊術──"
52235-153 = "青春的火花！"
52235-164 = "下一話;驅散不安的鬼哭聲"

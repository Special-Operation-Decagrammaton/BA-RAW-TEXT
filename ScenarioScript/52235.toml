52235-4 = "3;니야 부상;02\n#na;???;……무슨 생각이신가요, 니야 부장?"
52235-5 = "#st;[0,0];instant;1;"
52235-6 = "#clearST"
52235-7 = "3;니야 부상;02\n5;아자미;25\n#3;m1\n#5;a\n#3;h\n#5;h\n#wait;1200"
52235-8 = "3;니야 부상;01;어라, 처음 보는 얼굴이네요.\n#3;em;[?]"
52235-9 = "3;니야 부상;03;당신이 이번 괴담을 자아낸 괴담가인가요? 아니면 또 다른 누군가의 그림자……?"
52235-10 = "5;아자미;05;괴담가라니…… 그 얼치기 꼬마와 같은 취급을 하다니, 아무리 음양부의 부장님이라지만, 그 말씀은 다소 불쾌하군요."
52235-11 = "3;니야 부상;03;후후, 인사도 없이 불쑥 남의 공간에 들어오는 꼴이 전에 만났던 슈로 양과 꼭 닮아보여서."
52235-12 = "3;니야 부상;99;의도치 않게 무례를 저질렀네요. 부디 너그러이 양해해 주시길.\n#3;greeting\n#3;em;[음표]"
52235-13 = "#st;[0,0];instant;1;"
52235-14 = "#clearST"
52235-15 = "3;니야 부상;99\n5;아자미;05\n#5;em;…\n#3;h\n#5;h\n#wait;2500"
52235-16 = "5;아자미;12;……그런 싸구려 도발을 하더라도, 바뀌는 건 아무것도 없습니다.\n#5;em;[한숨]"
52235-17 = "5;아자미;15;당신들이 억지로 축제를 강행한다 하더라도 이 국면을 뒤집을 수 없는 것처럼 말이지요."
52235-18 = "3;니야 부상;08;………호오."
52235-19 = "5;아자미;99;그럼 늦었지만 제 소개를 할까요.\n#3;dl\n#5;m3"
52235-20 = "5;아자미;15;제 이름은 하부 아자미."
52235-21 = "5;아자미;16;당신이 말한 대로 작금의 이야기를 담당하고 있는 장본인이자, 화조풍월부의 괴예가를 맡고 있는— 코쿠리코 님의 심복이랍니다.\n#5;em;[재잘]"
52235-22 = "#all;hide"
52235-23 = "3;니야 부상;01;분명 괴담을 자아낼 수 있는 괴서, <이노모노노케로쿠>는 지난번에 파괴했을텐데……"
52235-24 = "3;니야 부상;06;재담도 반복하면 질리는 법인데, 당신들은 질리지도 않는 모양이네요.\n#3;em;[한숨]"
52235-25 = "3;아자미;05;그런 그림 한 장 없는 시시한 이야기와 비교하지 말아 주시겠어요?"
52235-26 = "3;아자미;99;제가 가진 괴서, <토테이붓카이로쿠>의 힘은 사람의 공포에서 비롯되는 것."
52235-27 = "3;아자미;20;<이노모노노케로쿠>가 추구하는 욕망과 달리, <토테이붓카이로쿠>의 공포는 훨씬 더 뚜렷하고 선명한 심상을 자아내지요.\n#3;em;[음표]"
52235-28 = "3;아자미;15;세상에는 스스로가 원하는 바가 무엇인지 알지 못하는 사람이 태반이지만, 무엇을 두려워하는지는 누구나 또렷이 상상할 수 있으니까요."
52235-29 = "3;아자미;17;자그마한 벌레부터 거대한 맹수까지. 눈에 익은 악우부터 얼굴 모를 타인까지."
52235-30 = "3;아자미;16;공포의 이미지는 말 한마디로 부정하기엔 너무나도 또렷하여, 쉬이 떨쳐낼 수 없는 강렬한 색을 자아내니까요."
52235-31 = "3;아자미;09;무슨 수를 쓰더라도 당신들은 영원토록 이 공포에서 벗어나지 못할 겁니다.\n#3;em;[재잘]"
52235-32 = "3;아자미;16;히토츠메가 노려보고 있는 한, 당신들은 영원히 공포에 떨며 <토테이붓카이로쿠>의 신비를 생육하는 모판이 되어주셔야겠어요."
52235-33 = "1;니야 부상;03;냐하하…… 모판이라니, 에비스 분교에서 오신 분이라 그런지 참으로 고풍스러운 표현을 쓰시는군요.\n#1;ar\n#3;m5\n#1;em;[재잘]"
52235-34 = "3;아자미;99;그럼 다시 한번 묻겠습니다, 니야 부장."
52235-35 = "3;아자미;22;그렇게 발버둥을 친다고, 무언가 바뀔 거라고 생각하셨나요?\n#3;em;[음표]"

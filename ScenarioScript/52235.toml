[translation]
52235-4 = "คิดอะไรอยู่เหรอคะ หัวหน้านิยะ...?"
52235-8 = "โอ้ นี่เป็นครั้งแรกเลยนะคะที่ฉันได้เห็นหน้าคุณ"
52235-9 = "คุณคือนักเล่าเรื่องลึกลับที่สร้างเรื่องลึกลับครั้งนี้ใช่มั้ยคะ? หรือว่าเป็นเงาของใครอีก...?"
52235-10 = "นักเล่าเรื่องลึกลับ... นี่คุณจัดให้ฉันอยู่ในระดับเดียวกับเด็กน้อยไร้ความสามารถงั้นเหรอคะ เป็นถึงหัวหน้าชมรมหยินหยาง แต่พูดจาไม่น่าฟังเลยค่ะ"
52235-11 = "ฮุฮุ ก็เห็นว่าบุกเข้ามาในพื้นที่ของคนอื่นโดยไม่ทักทายกันเลย ฉันก็เลยนึกถึงแม่หนูชูโระที่เคยเจอกัน#nคราวก่อนน่ะค่ะ"
52235-12 = "ฉันคงเผลอพูดเสียมารยาทไปสินะคะ โปรดอย่าถือสาฉันเลยค่ะ"
52235-16 = "ต่อให้ยั่วโมโหฉันด้วยคำพูดไร้ราคา... ยังไงมันก็ไม่มีอะไรเปลี่ยนแปลงไปหรอกค่ะ"
52235-17 = "และต่อให้พวกคุณจะฝืนจัดงานเทศกาล ก็พลิกสถานการณ์กลับมาไม่ได้อยู่ดีค่ะ"
52235-18 = "โฮ่..."
52235-19 = "ถึงจะช้าไปหน่อย แต่ฉันขอแนะนำตัวนะคะ"
52235-20 = "ชื่อของฉันคือ ฮาบุ อาซามิ"
52235-21 = "ฉันคือเจ้าของเรื่องราวที่เกิดขึ้นในตอนนี้อย่างที่คุณว่า และเป็นผู้ติดตามท่านโคคุริโกะ และรับหน้าที่เป็นนักเล่าเรื่องพรั่นพรึงแห่งชมรมความงามของธรรมชาติค่ะ"
52235-23 = "ครั้งที่แล้วพวกเราทำลาย <อิโนะ โมโนโนเคะ โรคุ> ที่แต่งเรื่องลึกลับได้ไปแล้วนี่นา..."
52235-24 = "ต่อให้เป็นเรื่องน่าหัวเราะ แต่ถ้าเอามาพูดซ้ำๆ มันก็น่าเบื่อ แต่เหมือนว่าพวกคุณจะไม่เบื่อกันนะคะ"
52235-25 = "คุณช่วยหยุดเปรียบเทียบฉันกับเรื่องไร้ค่ามองไม่เห็นภาพได้มั้ยคะ?"
52235-26 = "พลังของหนังสือลึกลับ <โทเท บุคไค โรคุ> ที่ฉันมีเกิดจากความกลัวของผู้คน"
52235-27 = "ต่างจากความปรารถนาของ <อิโนะ โมโนโนเคะ โรคุ> ความกลัวของ <โทเท บุคไค โรคุ> กระตุ้นให้เกิดภาพที่แตกต่างและชัดเจนกว่ากันมากค่ะ"
52235-28 = "คนในโลกส่วนมากไม่รู้ว่าตัวเองต้องการอะไร แต่ถ้าถามว่ากลัวอะไรละก็ ทุกคนก็จินตนาการถึงมันได้#nอย่างชัดเจนค่ะ"
52235-29 = "ตั้งแต่แมลงตัวเล็กๆ ไปจนถึงสัตว์ร้ายขนาดใหญ่ ตั้งแต่คนร้ายที่คุ้นหน้า ไปจนถึงคนอื่นๆ ที่ไม่รู้จัก#nหน้าคาดตา"
52235-30 = "ภาพของความกลัวนั้นชัดเจนเกินกว่าจะปฏิเสธได้ด้วยคำพูดเพียงคำเดียว แถมยังทำให้เกิดสีสันอันเข้มข้นที่ไม่อาจสลัดออกไปได้ง่ายๆ ด้วยค่ะ"
52235-31 = "ไม่ว่าจะใช้วิธีไหน แต่พวกคุณก็หลีกหนีจากความกลัวนี้ไปไม่ได้หรอกค่ะ"
52235-32 = "ตราบใดที่ฮิโตสึเมะยังคงอยู่ พวกคุณก็จะสั่นสะท้านด้วยความกลัวและต้องกลายเป็นแปลงเพาะ#nเพื่อการเติบโตของความลึกลับจาก <โทเท บุคไค โรคุ> ค่ะ"
52235-33 = "อะฮะฮ่า... แปลงเพาะงั้นเหรอคะ คนที่มาจากโรงเรียนสาขาเอบิสุนี่ชอบใช้คำเปรียบเทียบโบราณๆ นะคะ"
52235-34 = "ถ้างั้นฉันจะถามอีกครั้งนะคะ หัวหน้านิยะ"
52235-35 = "คิดว่าการดิ้นรนแบบนั้นจะเปลี่ยนแปลงอะไรได้เหรอคะ?"
52235-36 = "ไม่นี่คะ?"
52235-37 = "ฉันรู้ดีค่ะว่าลำพังพลังของฉันน่ะเปลี่ยนแปลงอะไรไม่ได้อยู่แล้ว"
52235-41 = "แล้วทำไมถึงสั่งให้จัดงานเทศกาลต่อล่ะ?"
52235-42 = "คิดว่าถ้าดิ้นรนทำอะไรสักอย่างแล้วจะทำให้ตัวเองรู้สึกผิดน้อยลงได้บ้างหรือไง?"
52235-46 = "ถ้าไม่ว่าอะไร... ฉันขอถามอะไรอย่างหนึ่งได้มั้ยคะ คุณอาซามิ?"
52235-47 = "ตั้งแต่ยุคสงครามในอดีตมาจนถึงปัจจุบัน"
52235-48 = "รู้มั้ยคะว่าทำไมพวกปีศาจที่เคยหลอกผู้คนและเล่าเรื่องลึกลับไปทั่วเขตปกครองตนเองเฮียกคิยาโค#nถึงได้เหลืออยู่เพียงน้อยนิด แล้วก็มีแค่ในแถบนอกเขตหลังจากโรงเรียนรวมตัวกันเป็นสหพันธ์แล้ว?"
52235-49 = "ก็เพราะ... พวกชมรมหยินหยางอย่างเธอใช้เล่ห์เพทุบายอะไรน่ะสิ"
52235-50 = "อะฮะฮ่า~ อะไรกันคะ"
52235-51 = "ถ้าต้องทำเรื่องน่ารำคาญแบบนั้น ฉันคงไม่มาอยู่ในตำแหน่งหัวหน้าชมรมหยินหยางตั้งแต่แรกหรอกค่ะ"
52235-56 = "คำตอบก็คือ... เพราะงานเทศกาลที่มีตลอดปีในเฮียกคิยาโคยังไงล่ะคะ"
52235-57 = "งานเทศกาล...?"
52235-58 = "ค่ะ งานเทศกาลขนาดใหญ่ที่ผู้คนมากมายมารวมตัวกัน"
52235-59 = "ที่ผ่านมาคุณไม่คิดว่ามันแปลกบ้างเหรอคะ?"
52235-60 = "ชมรมจัดงานเทศกาลเป็นแค่ชมรมหนึ่งและไม่ใช่สภานักเรียนด้วย แต่กลับมีสิทธิ์กำหนดตารางเรียน#nของโรงเรียนและควบคุมกระแสเงินทุนทั้งหมดของเขตปกครองตนเอง"
52235-61 = "นั่นไม่ได้เป็นเพราะฉันสั่งให้ทำเพราะความขี้เกียจของตัวเอง แต่มันเป็นสิ่งที่กำหนดมาแล้วตั้งแต่สมัย#nของคุซึโนฮะค่ะ"
52235-62 = "เดิมทีแล้วงานเทศกาลมีต้นกำเนิดมาจากการบูชาสรวงสวรรค์น่ะค่ะ"
52235-63 = "ผู้คนจะถวายเครื่องบูชา บอกเล่าความทุกข์ยากในปัจจุบัน แล้วอธิษฐานขอความสวัสดีในอนาคต..."
52235-64 = "พูดอีกอย่างก็คือ สิ่งที่ฉันพยายามทำในตอนนี้ไม่ใช่แค่ 'งานเทศกาล' เฉยๆ ค่ะ"
52235-68 = "มันคือพิธีอันยิ่งใหญ่เพื่อต้อนรับวันพรุ่งนี้ที่สงบสุขยังไงล่ะคะ"
52235-69 = "หมายความว่ายังไง..."
52235-73 = "ตาของฮิโตสึเมะ... พร่ามัวลงงั้นเหรอ?"
52235-87 = "พวกเธอทำบ้าอะไรลงไปเนี่ย!"
52235-88 = "ทำบ้าอะไรกันล่ะคะ"
52235-89 = "การช่วยรักษาโรงเรียนให้อยู่ในความสมดุลและกลมกลืนเป็นหน้าที่ของชมรมหยินหยางอยู่แล้วค่ะ"
52235-94 = "เมื่อถนนเต็มไปด้วยพลังหยิน ก็ต้องใช้พลังหยางมาลบล้าง... นี่คือหลักการง่ายๆ ของหยินหยางค่ะ"
52235-97 = "ตะ... ตรงนี้ก็มีลูกตาเหมือนกัน!"
52235-98 = "ไม่ว่าจะหนีไปตรงไหน ลูกตาพวกนั้นก็คอยจับจ้องเราอยู่ตลอดเลย...!"
52235-99 = "พอสบสายตากับมัน ความคิดแย่ๆ ก็วิ่งวนในหัวฉันไม่หยุดเลยด้วย..."
52235-100 = "จบเห่แล้ว... เฮียกกะเรียวรันก็ไม่อยู่ พวกเราต้องถูกปีศาจนั่นกลืนกินแน่ๆ!"
52235-104 = "เอ๋...? เหมือนได้ยินเสียงเพลงจากที่ไหนเลย?"
52235-105 = "หูฝาดไปหรือเปล่า? ใครจะมาร้องเพลงท่ามกลางความโกลาหลแบบนี้"
52235-106 = "ไม่ได้หูฝาดหรอก ฉันได้ยินเสียงที่คุ้นเคยมาจากทางโน้นจริงๆ..."
52235-108 = "ทุกคนคะ เทศกาลวาราคุยังดำเนินต่อไปค่ะ! ช่วยมารวมตัวกันหน้าเวทีด้วยค่ะ!"
52235-109 = "นี่คือโอกาสที่จะได้ชมการแสดงบทเพลงใหม่ที่ยังไม่เคยเปิดเผยที่ไหนของชิเซะจังแบบติดขอบเวทีเลย#nนะคะ!"
52235-110 = "นอกจากนี้เรายังมีสินค้าลิมิเต็ดเอดิชั่นของชิเซะจังด้วยค่ะ!"
52235-111 = "ซากุระโซดาให้ดื่มระหว่างชมการแสดงก็มีนะคะ!"
52235-114 = "ใครกำลังทำการแสดงอยู่ตรงโน้นน่ะ?"
52235-115 = "นี่นายจำไม่ได้จริงๆ เหรอ? ชิเซะจัง สุดยอดไอดอลแห่งเฮียกคิยาโค องค์หญิงวาราคุ นางเอกของเทศกาลนี้ไง!"
52235-116 = "ไม่อยากเชื่อเลยว่าจะมาร้องเพลงให้ในที่แบบนี้ นึกว่าจะไม่ได้ฟังเพลงจากท่านชิเซะแล้วเสียอีก..."
52235-123 = "หลีกทางฉันหน่อย! ฉันต้องไปยืนเกาะขอบเวทีการแสดงของท่านชิเซะให้ได้!"
52235-124 = "สถานการณ์เสี่ยงอันตรายแบบนี้ ยังอยากจะไปสนุกกับงานเทศกาลอีกเหรอ...?"
52235-125 = "ถ้าต้องถูกปีศาจนั่นกลืนกินจนตัวตายละก็ ฉันขอดูการแสดงจากท่านชิเซะก่อนตายก็แล้วกัน!"
52235-130 = "ทุกคนอยู่ด้วยกันนานๆ นะ~"
52235-131 = "จนเกือบพลบค่ำไปเลย~"
52235-136 = "เป็นความคิดที่ไม่เลวเลยนะ..."
52235-137 = "การเปลี่ยนบรรยากาศชั่วขณะด้วยความวุ่นวายของงานเทศกาลย่อมทำให้ความน่ากลัวของ <โทเท บุคไค โรคุ> หายไปได้"
52235-138 = "แต่คิดว่าจะจัดงานเทศกาลไปจนตลอดรอดฝั่งได้งั้นเหรอ?"
52235-139 = "สักวันหนึ่งงานเทศกาลก็ต้องจบลง เมื่องานเลี้ยงเลิกรา ความน่ากลัวของหนังสือลึกลับก็จะเข้า#nครอบงำโรงเรียนอีกครั้ง"
52235-140 = "กลอุบายของเธอน่ะ สุดท้ายมันก็เป็นแค่แผนการแก้ขัดชั่วคราวที่เอาไว้หลีกเลี่ยงสายตาเท่านั้นละ"
52235-141 = "ก็ไม่รู้สิคะ ตอนนี้คนที่ควรกังวลเรื่องสายตาน่าจะเป็นพวกคุณมากกว่าฉันนะ?"
52235-142 = "เหมือนว่าตาของคุณจะมองไม่เห็นดอกไม้ไฟที่โชติช่วงงดงามอยู่บนหอสูงนะคะ"
52235-143 = "กับอีแค่ดอกไม้ไฟ จะไปสำคัญอะไร..."
52235-144 = "ไม่รู้หรอกเหรอคะ? งั้นฉันจะบอกให้เอาบุญค่ะ"
52235-145 = "ก่อนที่จะมีเทคโนโลยีไร้สายเกิดขึ้น เราใช้การจุดพลุหรือดอกไม้ไฟเพื่อบอกตำแหน่งของผู้ที่ขอรับ#nความช่วยเหลือค่ะ"
52235-147 = "นี่พวกแก อย่าบอกนะว่าใช้โอกาสนี้ส่งสัญญาณให้เฮียกกะเรียวรัน..."
52235-149 = "นี่ละ ศาสตร์ยิงปืนของเฮียกกะเรียวรัน..."
52235-153 = "ประกายไฟของวัยรุ่น!"
52235-164 = "ตอนต่อไป;เสียงร้องแห่งความโล่งใจ"

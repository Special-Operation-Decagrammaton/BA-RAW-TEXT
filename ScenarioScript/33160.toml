[translation]
33160-1 = "ตอนที่ 16;ส่วนเล็กๆ น้อยๆ"
33160-6 = "อาซึสะ..."
33160-7 = "คุณ... ใช้ของขวัญที่หวงแหนเท่าชีวิตเป็นอาวุธสังหารไปซะแล้วสินะคะ"
33160-8 = "เดิมทีมันเป็นระเบิดที่เตรียมไว้เพื่อทำลายฮาโลของฉัน"
33160-9 = "แต่ตอนนั้นคุณไม่ได้ใช้มัน และเก็บเอาไว้ตลอดเลยสินะคะ..."
33160-12 = "แค่กๆ!... แค่กๆ... อือออ..."
33160-13 = "อะ...องค์หญิง!?"
33160-14 = "องค์หญิง!!!!"
33160-15 = "..."
33160-16 = "แต่ว่าซาโอริยังไม่ตายหรอกนะคะ ถึงจะบาดเจ็บสาหัส แต่เธอก็ยังมีชีวิตอยู่ค่ะ"
33160-17 = "นั่นก็เพราะว่า... อาสึโกะเอาตัวเองมารับแรงระเบิดเอาไว้..."
33160-18 = "องค์หญิง!!!! ไม่นะ อาสึโกะ! ฟื้นสิ!!"
33160-19 = "อาสึโกะ... เด็กที่ถูกเรียกขานว่าองค์หญิง..."
33160-20 = "ดูเหมือนจะเป็นคนสำคัญมากสำหรับซาโอรินะคะ"
33160-22 = "..."
33160-23 = "พลังของสายเลือดของราชวงศ์อ่อนแอลงแล้วสินะ... ตายแล้วงั้นเหรอ?"
33160-24 = "ถ้าการทดลองของผมถูกขัดขวางคงลำบากแย่... <การส่งสารของนักบุญ> ยังไม่พร้อม..."
33160-25 = "..."
33160-26 = "อา... หรือไม่ใช่กันนะ..."
33160-27 = "แบบนี้นี่เอง ดูเหมือนเธอจะเตรียมใจเอาไว้แล้ว... ใช่แล้ว ทั้งที่เป็นสายเลือดของราชวงศ์ที่หายากแท้ๆ..."
33160-28 = "ถ้างั้นก็ช่างเถอะ... ถึงจะเสียเวลาไปนิดหน่อย แต่ในฐานะสหายร่วมอุดมการณ์ ผมจะช่วยก็แล้วกัน"
33160-33 = "การทดลองจะดำเนินต่อไป"
33160-35 = "ซา...โอ..."
33160-36 = "องค์หญิง! ไม่เป็นไรใช่มั้ย?"
33160-37 = "... (พยักหน้า)"
33160-38 = "อา... โล่งอกไปที องค์หญิง..."
33160-43 = "... ยกโทษให้ไม่ได้"
33160-44 = "อาซึสะ... กล้าทำให้องค์หญิงบาดเจ็บงั้นเหรอ..."
33160-45 = "ยกโทษให้ไม่ได้!! อาซึสะ!!"
33160-47 = "แบบนี้นี่เอง... อาสึโกะยังมีชีวิตอยู่ค่ะ"
33160-48 = "ระเบิดนั่น... ถ้าเป็นฉันที่โดน ฮาโลก็คงจะแตกสลายไปแล้วค่ะ"
33160-49 = "แม้แต่ซาโอริที่อยู่ในบริเวณนั้นก็ได้รับผลกระทบจนมีสภาพแบบนั้น..."
33160-50 = "ฮาโลของเด็กที่ชื่ออาสึโกะนั่น... มีใครบางคนปกป้องเอาไว้สินะคะ"
33160-51 = "..."
33160-52 = "ตอนนี้แผนของสควอดของอาเรียสคลาดเคลื่อนออกไปแล้วค่ะ..."
33160-53 = "การบุกโจมตีทรีนิตี้ต้องเลื่อนออกไป และพลังของเหล่าสาวกก็อ่อนแอลงแล้วค่ะ"
33160-54 = "การต่อสู้ที่วิหารโบราณอยู่ในสภาพชะงักงัน..."
33160-55 = "ทั้งสองโรงเรียนต่างถอนตัวและเผชิญหน้ากัน แต่สุดท้ายก็สามารถค้นหาและอพยพผู้บาดเจ็บได้ค่ะ"
33160-56 = "อาซึสะ... เรื่องนี้จะทำให้ความสิ้นหวังของคุณลดลงบ้างหรือเปล่าคะ...?"
33160-58 = "พบผู้บาดเจ็บแล้วค่ะ! ขนย้ายผู้บาดเจ็บค่ะ!!"
33160-59 = "ทางนี้! ทางนี้ค่ะ! ขอเปลทางนี้ด้วยค่ะ!"
33160-60 = "ตรงนั้น! มีผู้บาดเจ็บ!"
33160-62 = "ประธานคะ! สมาชิกของแพนเดโมเนียม โซไซตี้ได้รับการช่วยเหลือออกมาจากเรือเหาะที่ตกลงไปใน#nทะเลสาบเรียบร้อยแล้วค่ะ! รวมถึงประธานมาโคโตะด้วยค่ะ!"
33160-63 = "สมกับเป็นประธานจริงๆ ดวงดีตลอดเลยนะคะ"
33160-64 = "ขนย้ายผู้บาดเจ็บครบแล้วค่ะ พวกสมาชิกคนที่เหลือก็คงจะหาเจอในอีกไม่นาน ถ้าพบแล้วช่วยจับทุกคนขังไว้ในห้องฉุกเฉินด้วยนะคะ"
33160-65 = "ค่ะ!"
33160-66 = "แล้วทางคณะกรรมการวินัยล่ะคะ?"
33160-67 = "ตอนนี้เจ้าหน้าที่อาวุโสอาโกะกำลังค้นหาอยู่ค่ะ ประธานฮินะบาดเจ็บสาหัส และยังไม่ได้สติเลยค่ะ"
33160-68 = "..."
33160-69 = "ทั้งที่ประธานกรรมการเป็นคนที่เฝ้ารอสนธิสัญญาเอเดนนี้ที่สุดแท้ๆ..."
33160-70 = "คะ?"
33160-71 = "ไม่มีอะไรหรอกค่ะ ค้นหาผู้บาดเจ็บต่อเถอะค่ะ "
33160-75 = "... "
33160-76 = "ฝนอาจจะตกลงมาก็ได้ เร่งมือเข้าเถอะค่ะ"
33160-79 = "หัวหน้าชมรมทวงความยุติธรรม คุณซึรุกิบาดเจ็บสาหัสค่ะ! รองหัวหน้าฮาสุมิอาการหนักเช่นกันค่ะ!"
33160-80 = "หัวหน้าชมรมซิสเตอร์ ท่านซากุระโกะ บาดเจ็บสาหัสค่ะ! ตอนนี้ห้องพักรักษาของทางชมรมอัศวิน#nบรรเทาทุกข์เต็มแล้ว เรากำลังเคลื่อนย้ายเธอไปพักที่ห้องสมุดโบราณแทนค่ะ!"
33160-85 = "อา...อา... ท่านซากุระโกะ... "
33160-86 = "แล้วคุณนางิสะล่ะคะ?"
33160-87 = "คุณนางิสะ... ยะ...ยังอยู่ระหว่างการค้นหาค่ะ!"
33160-88 = "..."
33160-89 = "สถานการณ์ฉุกเฉินค่ะ! ทางสภาน้ำชากำลังจะประกาศสงครามกับสถาบันเกเฮนน่าค่ะ!!"
33160-91 = "คะ?!"
33160-92 = "...ไม่ได้นะคะ ถ้าทำแบบนั้นตอนนี้ละก็...."
33160-96 = "รายงานด่วนค่ะ!! ขณะนี้ชมรมทวงความยุติธรรมกำลังพยายามบุกเข้าไปที่มหาวิหารค่ะ! ตอนนี้กลุ่มซิสเตอร์เข้าปะทะเพื่อขัดขวางเอาไว้อยู่ค่ะ!"
33160-97 = "คะ?! ว่ายังไงนะคะ?!"
33160-101 = "หรือว่าเกิดเรื่องวุ่นวายภายในสภาน้ำชากันนะ..."
33160-102 = "ตอนนี้ไม่ใช่เวลาที่จะมามัวทำแบบนี้นะ ถ้าไม่หยุดการต่อสู้และช่วยคนก่อนละก็..."
33160-105 = "(สถานการณ์แบบนี้... ฉันจะทำยังไงดี...)"
33160-106 = "(เซอาจัง...)"
33160-108 = "(คุณครู... ฉันน่ะ...)"
33160-110 = "ห้องพักฟื้นชั่วคราว เกเฮนน่า"
33160-111 = "พูดอะไรกันคะ! ท่านประธานหายตัวไปงั้นเหรอคะ!"
33160-112 = "คะ...คือว่า... เมื่อกี้เธอยังนอนอยู่ตรงนี้เลย..."
33160-113 = "รีบไปหาเดี๋ยวนี้เลยค่ะ! บาดแผลเต็มตัวแบบนั้นจะไปที่ไหนได้คะ! รีบไปเดี๋ยวนี้เลย!!"
33160-114 = "คะ...ค่ะ!"
33160-119 = "ท่านประธาน..."
33160-121 = "ประธานฮินะ... กำลังหลบซ่อนอยู่ค่ะ"
33160-122 = "หัวใจของเธอที่อดทนมาตลอดจนถึงตอนนี้... ในที่สุดก็แตกสลายแล้วงั้นเหรอคะ...?"
33160-124 = "สำนักงาน สภาน้ำชา"
33160-125 = "แล้วเอกสารการประกาศสงครามล่ะ!"
33160-126 = "เตรียมพร้อมแล้วค่ะ!"
33160-127 = "ดีล่ะ ถ้างั้นตอนนี้ก็...!"
33160-131 = "ระ...รอเดี๋ยวก่อนค่ะ! ทุกคน!"
33160-132 = "คุณคือ... อุราวะ ฮานาโกะ...? ทำไมถึงมาอยู่ที่นี่...?!"
33160-133 = "ตามกฎแล้วถ้าโฮสต์ไม่อยู่จะไม่สามารถทำการประกาศสงครามได้ค่ะ!"
33160-134 = "..."
33160-135 = "อีกอย่าง ทุกคนก็ได้เห็นวิดีโอที่กู้คืนมาได้แล้วนี่คะ เรื่องนี้... ไม่ใช่ฝีมือของทางเกเฮนน่านะคะ!"
33160-136 = "ฉันยังอธิบายรายละเอียดไม่ได้... แต่เรื่องนั้นเป็นฝีมือของ <อะไรบางอย่าง> ที่ชักใยอาเรียสอยู่ค่ะ!"
33160-137 = "พวกนั้นสามารถเข้าไปที่สุสานที่เชื่อมอยู่กับทางใต้ดินและที่ซากปรักหักพังที่มีอยู่ทั่วเขตปกครอง#nได้อย่างอิสระ..."
33160-139 = "... จับกุมคุณฮานาโกะไว้ค่ะ"
33160-145 = "?! "
33160-147 = "อุราวะ ฮานาโกะ... คุณก็อยู่ฝ่ายชมรมซิสเตอร์งั้นเหรอคะ"
33160-148 = "อะไรนะคะ...!?"
33160-149 = "พวกเราเองก็ตรวจสอบภาพวิดีโอแล้ว กลุ่มคนลึกลับนั่นคือ <สาวกยูสตาร์>  "
33160-150 = "และพวกเราก็รู้ว่าพวกเขาเป็นกลุ่มที่เกี่ยวข้องกับทางชมรมซิสเตอร์ค่ะ เพราะงั้นถึงพยายามที่จะทำลายมหาวิหาร..."
33160-151 = "เกมเล่นเป็นนักสืบจบแล้วค่ะ คุณฮานาโกะ"
33160-152 = "...!!"
33160-153 = "ยืนยันตำแหน่งยิงมิสไซล์ได้แล้วค่ะ เห็นได้ชัดว่าเป็นซากปรักหักพังของวิหารที่ทางชมรมซิสเตอร์ดูแลอยู่"
33160-154 = "พวกอาเรียสแทรกซึมเข้ามาในเขตปกครองตนเองและเข้าออกสุสานใต้ดินได้ตามอำเภอใจ... เรื่องนั้นก็อาจเป็นไปได้ค่ะ "
33160-155 = "แต่ว่า...ถ้าเกิดว่าอาเรียสและชมรมซิสเตอร์อยู่ฝ่ายเดียวกันตั้งแต่แรกแล้วล่ะ?"
33160-156 = "...!!"
33160-157 = "เนื่องจากเป็นกลุ่มคนลึกลับที่ปกปิดตัวตน การปลอมแปลงข้อมูลจึงไม่ใช่เรื่องยากเลยใช่มั้ยล่ะคะ"
33160-158 = "ดังนั้นกลุ่มปาเตอร์ของเรา... ตัดสินใจแล้วว่าจะตอบโต้สถานการณ์นี้อย่างไม่มีการปรานีใดๆ ค่ะ"
33160-159 = "อย่าบอกนะว่า... สภาน้ำชา... ตอนนี้..."
33160-160 = "ค่ะ ทั้งกลุ่มฟีเลียสและซางตุสที่ต่อต้านและขัดขวางการตัดสินใจของพวกเราก็ถูกควบคุมตัวไว้#nที่ห้องขังหมดแล้วค่ะ"
33160-161 = "ปฏิวัติงั้นเหรอ...!"
33160-162 = "ไม่ใช่ค่ะ ไม่ใช่เลยค่ะ พวกเรายังมีสมาชิกสภาน้ำชาอยู่ด้วยอีกคนหนึ่งนะคะ"
33160-163 = "...?!!"
33160-167 = "ท่านมิกะที่เป็นสมาชิกของสภาน้ำชาและเป็นหัวหน้าของกลุ่มปาเตอร์"
33160-168 = "เราจะปล่อยตัวเธอออกมา และเริ่มสงครามกับทางเกเฮนน่าตามที่ท่านมิกะเห็นสมควรค่ะ"
33160-169 = "...!!!"
33160-172 = "..."
33160-173 = "ท่านมิกะ ขอเชิญด้านนี้ด้วยค่ะ"
33160-174 = "หืม? "
33160-179 = "อาซึสะ... ตอนนี้คุณจะทำยังไงต่อคะ?"
33160-180 = "คุณได้ช่วยชีวิตคนอย่างที่คุณตั้งใจไว้แล้ว แต่คุณกลับล้มเหลวในการล้มเลิกบรรทัดฐานและกำจัดเหล่า <สาวก>..."
33160-181 = "ทางเกเฮนน่า ฮินะก็หลบซ่อนตัว... ทางทรีนิตี้ ฮานาโกะก็ถูกจับกุมตัวแล้วค่ะ"
33160-182 = "และตอนนี้มิกะคนนั้นก็ได้ถูกปล่อยตัวออกมาแล้วค่ะ"
33160-183 = "ตอนจบแบบนี้... อยากเล่าเรื่องราวแบบนี้งั้นเหรอ..."
33160-184 = "สุดท้ายก็ยังเป็นความฝันที่ไร้สาระและไร้ความหมาย..."
33160-185 = "ยังหรอก"
33160-186 = "อาซึสะ...?"
33160-188 = "นี่ไม่ใช่เวลาที่จะมาท้อแท้แบบนี้นะ อาซึสะ"
33160-189 = "ต้องรีบไปแล้ว คิดสิ หาทางเร็วเข้า ถ้าจะมานั่งเศร้าหรือท้อแท้ รีบคิดหาทางซะยังดีกว่า"
33160-190 = "แผนต่อไป... เป้าหมายต่อไป... ต่อไป..."
33160-195 = "อย่าหยุดนะ... ต้องรีบไปต่อแล้ว... ต้องหาวิธี..."
33160-196 = "<สาวก> ยังไม่หายไป... ทั้งซาโอริ อาสึโกะ... ปลอดภัย... โล่งอกไปที... ไม่สิ แต่ว่า... ถ้าแบบนั้น..."
33160-197 = "ต้องรีบไปต่อแล้ว... เพื่อที่จะหยุดซาโอริ..."
33160-198 = "ต้องรีบไป..."
33160-206 = "อาซึสะ... คุณยังคิดที่จะไปต่อเหรอ...? ยังคิดที่จะต่อสู้ต่องั้นเหรอคะ?"
33160-207 = "ถึงแม้ทุกอย่างจะสูญเปล่า... แต่ว่าคุณก็ยังจะไปต่อ..."
33160-208 = "ทำไมถึงได้..."
33160-210 = "ทางโน้นเกิดเหตุชุลมุนขึ้นแล้ว! ใครก็ได้ไปดูที!"
33160-211 = "เกิดเหตุที่บริเวณอาคารเรียนที่ 5! จะ...จะต้องทำยังไงคะ?"
33160-213 = "ฮืออออ...."
33160-214 = "ฉะ...ฉัน..."
33160-215 = "หืม? เธออยู่ชมรมชั้นเรียนเสริมไม่ใช่เหรอ? แล้วมาทำอะไรที่นี่? ยังไม่ได้รับอนุญาตให้กลับมาไม่ใช่รึไง?"
33160-216 = "หะ...หืม? ระ...เรื่องนั้น..."
33160-217 = "ถ้าไม่มีอะไรทำละก็ไปรวมพลที่ห้องคุมตัวซะ ดูเหมือนทางนั้นจะมีการเรียกรวมพลอยู่"
33160-221 = "ฉะ... ฉะ...ฉัน..."
33160-223 = "คะ...คุณซาโอริ..."
33160-224 = "หัวหน้า..."
33160-226 = "ทุกคน! เตรียมพร้อมบุกโจมตีทรีนิตี้เดี๋ยวนี้..."
33160-227 = "... ต้องใช้เวลาอีกหน่อย"
33160-228 = "เพราะองค์หญิงได้รับบาดเจ็บ... ก็เลยเกิดปัญหาขึ้นกับการปรากฏตัวของ <สาวก>..."
33160-229 = "ต้องกลับไปที่วิหารโบราณและเริ่มบรรทัดฐานใหม่นะ"
33160-230 = "..."
33160-231 = "เข้าใจแล้ว... <วิหารโบราณ> เราจะไปที่นั่นและฟื้นฟูบรรทัดฐานของ <สาวก> ขึ้นมาใหม่"
33160-232 = "ออกเดินทางกันเลย"
33160-233 = "..."
33160-234 = "ไปกันได้แล้ว!!"
33160-236 = "ท่านมิกะ เชิญทางนี้"
33160-237 = "ท่านมิกะ!!"
33160-238 = "ท่านเป็นอิสระแล้วค่ะ!"
33160-242 = "หืม... "
33160-243 = "พอเข้าใจสถานการณ์แล้วล่ะ พวกเธอ...เป็นแฟนคลับของฉันใช่มั้ย? เข้ามารุมล้อมกันเยอะแยะแบบนี้... ฉันแจกลายเซ็นให้เอามั้ย?"
33160-244 = "มะ...ไม่เป็นไรค่ะ อย่างที่ท่านเห็น ตอนนี้ทรีนิตี้..."
33160-246 = "อื้อ ฉันรู้แล้วล่ะ จะประกาศสงครามใช่มั้ยล่ะ? กับพวกเกเฮนน่า? อะฮ่ะฮ่ะฮ่า! ตลกชะมัดเลย"
33160-247 = "ค่ะ! ตอนนี้เป็นโอกาสดีที่จะกำจัดพวกเกเฮนน่าให้หายไปจากแผนที่ของคิโวทอสแล้วค่ะ!!"
33160-248 = "สิ่งที่ท่านต้องการ... สงครามเบ็ดเสร็จกับพวกเกเฮนน่า... "
33160-249 = "โปรดออกคำสั่งให้กองกำลังทั่วทรีนิตี้เตรียมพร้อมต่อสู้...!"
33160-250 = "ฮ่ะฮ่ะฮ่ะฮ่าฮ่าา! "
33160-251 = "อื้อ ใช่แล้ว ฉันเกลียดพวกเกเฮนน่าสุดๆ ไปเลย ทุกคนนี่ความจำดีกันจังนะ? อ่าฮะฮ่าฮ่า"
33160-252 = "เพราะงั้นถึงได้มาหาฉันด้วยสีหน้าว่างเปล่าในวันที่เกิดความโกลาหลใหญ่แบบนี้ละสิ?"
33160-253 = "คะ...?"
33160-254 = "แห่กันเข้ามาร้องขอให้แสดงความโกรธ ความเกลียดแทนตัวเอง... แบบนี้มันน่าตลกจริงๆ เลยนะ ฮะฮะฮะฮ่า อื้อ! เข้าใจความรู้สึกแบบนั้นมั้ย?"
33160-255 = "ทะ...ท่านมิกะ...! ทำไมพูดอะไรรุนแรงแบบนั้น..."
33160-256 = "ฮ่ะฮ่าฮ่า หืม? งั้นเหรอ? โทษที"
33160-257 = "ใช่แล้ว ฉันเกลียดพวกเกเฮนน่ามาก และคิดว่าถ้ามีโอกาสก็ควรจะต้องกำจัดเจ้าพวกนั้นให้ได้"
33160-258 = "แต่จะทำได้ยังไงล่ะ? ตอนนี้ฉันไม่มีอารมณ์จะทำแบบนั้นเลย เพราะงั้นกลับไปเถอะนะ อย่ามาเสียเวลาเลย"
33160-259 = "มะ...ไม่มีอารมณ์...?"
33160-260 = "ไม่มีอารมณ์งั้นเหรอคะ...? ตอนนี้เป็นเวลาที่สำคัญมากแท้ๆ ทำไม..."
33160-261 = "ทำไมงั้นเหรอ...? ที่จริงมันก็แค่นั้นแหละ"
33160-262 = "ฉันก็แค่ไม่ชอบพวกเกเฮนน่า ไม่มีเหตุผลและไม่มีจุดประสงค์อะไรทั้งนั้น"
33160-263 = "เพราะงั้นอย่ามามัวพูดเรื่องไร้สาระ แล้วรีบๆ กลับไปซะเถอะ ตอนนี้ฉันกำลังหงุดหงิด ไม่มีอารมณ์จะทำอะไรแบบนั้นหรอกนะ"
33160-264 = "หมายถึงเล่นกับพวกคนโง่ๆ ที่คิดจะให้คนอื่นมาแสดงความแค้นแทนตัวเองน่ะ"
33160-265 = "อะไรนะ...?"
33160-266 = "เอ๊ะ? ไม่ได้ยินที่ฉันพูดเหรอ? หรือจะให้พูดทวนใหม่อีกทีล่ะ?"
33160-267 = "วะ...ว่าใครเป็นพวกคนโง่ๆ กัน!"
33160-272 = "อึก...?"
33160-273 = "ยัยเด็กไม่รู้จักโลกคนนี้! พวกเราช่วยออกมาจากห้องคุมขังแท้ๆ!! ยังไม่สำนึกหรือรู้สถานะตัวเองอีก!"
33160-277 = "นี่ เดี๋ยวก่อนสิ? ฉันไม่มีอาวุธติดอยู่กับตัวเลยนะ..."
33160-283 = "อ๊ะ... มันเจ็บนะ..."
33160-287 = "สำนึกถึงสถานะตัวเองซะบ้าง! โดนไล่ออกจากสภาน้ำชาแล้วแท้ๆ"
33160-291 = "อุตส่าห์ช่วยให้พ้นคุกออกมาแล้วแท้ๆ!!"
33160-300 = "..."
33160-301 = "ทะ...ทำอะไรน่ะ!!"
33160-302 = "อะไรของเธอน่ะ!"
33160-303 = "ห้ามรังแกกันนะ! คะ...คิดจะทำอะไรน่ะ! คนตั้งเยอะแยะแบบนี้...! แบบนี้ไม่ได้นะ!!"
33160-305 = "บะ...แบบนี้ ฉันไม่ยกโทษให้หรอก...!!"
33160-306 = "...!"
33160-309 = "[ns] ลืมตา"
33160-315 = "[ns] ขยับตัว"
33160-317 = "คะ... คุณครู?! ฟื้นแล้วเหรอคะ?!"
33160-318 = "คะ... คุณครู? ถะ...ถ้าขยับตัวแบบนั้น... จะไปไหนคะ? เอ๋?"
33160-320 = "คุณครู... คุณ... คิดจะต่อสู้งั้นเหรอคะ"
33160-321 = "นักเรียนก็คือนักเรียน ผู้กล้า ฆาตกร... ไม่จำเป็นต้องเป็นอย่างอื่น..."
33160-322 = "นี่ไม่ใช่เรื่องราวแบบนั้น... หมายความว่ายังไงคะ?"
33160-323 = "[s] \"เพราะครูเชื่อแบบนั้น และครูก็จะทำให้เป็นแบบนั้น\""
33160-324 = "แต่ว่าคุณครู... "
33160-325 = "สิ่งที่ขวางเส้นทางของคุณอยู่ก็คือความเกลียดชังที่สั่งสมมาช้านานแล้วนะคะ..."
33160-328 = "[ns] \"งั้นก็มาลองสู้กับมันดูสักตั้งหน่อยแล้วกัน\""
33160-332 = "ตอนต่อไป;ตัวตนของความเกลียดชัง"

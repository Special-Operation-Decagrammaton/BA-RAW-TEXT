[translation]
33160-1 = "第16話;いくつかの欠片たち"
33160-6 = "アズサ……。"
33160-7 = "その判断にどれだけ苦しんだのだろうね……君が本当に、命のように大事にしていたプレゼント。それを、殺人の道具として使うとは……。"
33160-8 = "元々は、私のヘイローを破壊するために用意された爆弾……。"
33160-9 = "あの時使わなかったそれを、このタイミングで……。"
33160-12 = "げほっ、げほっ！うっ、くっ……！"
33160-13 = "っ！"
33160-14 = "姫、姫っ！！！！"
33160-15 = "……。"
33160-16 = "……しかしサオリは無事だ。大怪我ではあるものの、ヘイローは壊れていない。"
33160-17 = "だが、彼女をかばったアツコは……？"
33160-18 = "姫！！ダメだ、アツコっ！しっかりしろ！！"
33160-19 = "アツコ、あの姫という子は……。"
33160-20 = "サオリにとって、大事な人なのだろうね。"
33160-22 = "……。"
33160-23 = "ロイヤルブラッドの力が弱まった。これは、生命に異変が……？"
33160-24 = "ふむ、実験に支障が出るだろうか……しかしまだ……。"
33160-25 = "……。"
33160-26 = "……嗚呼、そうか。"
33160-27 = "彼女が既に備えを用意していた、と……成る程、貴重なロイヤルブラッドゆえか。"
33160-28 = "まあ良い、少々時間はかかるだろうが……仮にも同志だ。これくらいのことはな。"
33160-33 = "さて、やっていくとしよう。"
33160-35 = "っ……。"
33160-36 = "姫、無事か！？"
33160-37 = "（こくり）"
33160-38 = "ああ、良かった。姫……。"
33160-43 = "……許せない。"
33160-44 = "アズサ……よくも姫にこんな怪我を……。"
33160-45 = "絶対に許さないぞ、アズサ！！"
33160-47 = "アツコは死んでいない……。"
33160-48 = "あの爆弾、たしかに私だったら間違いなくヘイローが「壊れていた」だろうね。"
33160-49 = "直撃していないサオリでさえ、あのダメージだ。"
33160-50 = "あのアツコという子のヘイローは……誰かによって守られているようだね。"
33160-51 = "……。"
33160-52 = "……しかしアリウススクワッドの計画には、大きな支障が生じつつある。"
33160-53 = "トリニティ襲撃は未だできておらず、アツコの負傷によりユスティナ聖徒会の力も弱まっている。"
33160-54 = "古聖堂での戦闘は落ち着きつつあることに加え……"
33160-55 = "両学園は膠着状態、そして負傷者の搬送も始まりつつある。"
33160-56 = "……アズサ。これで君の絶望が、少しでも和らぐなら良いのだけれど……。"
33160-58 = "負傷者を発見、搬送します！！"
33160-59 = "こちらに担架を！"
33160-60 = "向こうです、まだ負傷者が何名か！"
33160-62 = "部長！湖に落ちた飛行船から、万魔殿の議員たちを救出しました！マコト議長も含まれていたとのことです！"
33160-63 = "さすがは議長、いつも通り運が良いですね。湖に落ちたことも幸運……"
33160-64 = "各地の救助を続けてください。基本的には全員、強制的に集中治療室へ。"
33160-65 = "はいっ！"
33160-66 = "風紀委員会の方は？"
33160-67 = "現在、行政官のアコさんが取りまとめているとのこと。委員長は情報によると、重傷で意識不明とのことです。"
33160-68 = "……。"
33160-69 = "風紀委員長……この条約を一番望んでいたであろう彼女が……。"
33160-70 = "……部長？"
33160-71 = "……いえ、何でもありません。引き続き負傷者たちの救出を行ってください。"
33160-75 = "……。"
33160-76 = "……雨が降るかもしれませんね。急ぎましょう。"
33160-79 = "正義実現委員会のツルギ委員長が重傷！ハスミ副委員長の方は重体とのこと！"
33160-80 = "サクラコ様も重体です！救護騎士団の救護室は現在満床とのことで、古書館の寝室の方へ搬送中！"
33160-85 = "あ、ああ……サクラコ様……。"
33160-86 = "……ナギサさんは？"
33160-87 = "彼女については、まだ捜索中とのこと！"
33160-88 = "……。"
33160-89 = "……っ！一部の過激派が、もうすぐゲヘナに宣戦布告をするとの情報が！！"
33160-91 = "はいっ！？"
33160-92 = "ダメです、今ここでそんなことをしては……！"
33160-96 = "正義実現委員会が、大聖堂に進入を試みているとの情報あり！これを阻もうとするシスターたちと、中央ホールで衝突が発生しました！"
33160-97 = "なっ……！？"
33160-101 = "混乱があちこちで……。"
33160-102 = "早く戦闘を中止させて、救助の方に専念しないと……！"
33160-105 = "（変数が多すぎる上にこの状況、私はいったいどうすれば……）"
33160-106 = "（セイアちゃん……）"
33160-108 = "（先生……）"
33160-110 = "ゲヘナ・保健室"
33160-111 = "委員長がいなくなった！？"
33160-112 = "は、はい……先ほどまでこちらに横になっていたのですが……。"
33160-113 = "今すぐに探してください！あの怪我でいったいどちらへ……！"
33160-114 = "は、はいっ！"
33160-119 = "委員長……。"
33160-121 = "……風紀委員長は、姿を消したようだね。"
33160-122 = "これまでずっと頑張り続けてきた彼女の心は、どうなってしまったのか……"
33160-124 = "ティーパーティー・教室"
33160-125 = "宣戦布告の文章はできましたか！？"
33160-126 = "はい、大丈夫です！"
33160-127 = "良し、ではすぐにでも……！"
33160-131 = "待ってください！"
33160-132 = "なっ、[ruby=うらわ]浦和[/ruby]ハナコさん……？どうしてここに！？"
33160-133 = "宣戦布告は校則上、ホスト無しでは宣言できないはずです！"
33160-134 = "……。"
33160-135 = "あの映像をご覧になったでしょう！？相手はゲヘナではありません！"
33160-136 = "あれはきっと、アリウスが操っている「別の何か」です！"
33160-137 = "トリニティ自治区内の各地にある遺跡、そしてその地下に繋がっているカタコンベを通って――"
33160-139 = "……捕えてください。"
33160-145 = "っ！？"
33160-147 = "浦和ハナコさん……こんなことになってしまい残念です。"
33160-148 = "何を……！？"
33160-149 = "映像なら確かに確認しました。あの正体不明の集団、「ユスティナ聖徒会」。"
33160-150 = "あれがシスターフッドと関係あることくらいは把握しています。だからこそこうして動こうとしているのです。"
33160-151 = "探偵ごっこはお終いです、ハナコさん。"
33160-152 = "……！"
33160-153 = "巡航ミサイルの発射位置についても確認しました。シスターフッドの管理下にある、聖堂の遺跡でしたね。"
33160-154 = "アリウスがその下にあるカタコンベを通じて、勝手に私たちの自治区に侵入した……確かにそういう可能性もあるでしょう。"
33160-155 = "ですがそもそも、アリウスとシスターフッドが最初から手を組んでいたという線は？"
33160-156 = "……っ！そんなことは……！"
33160-157 = "あそこまで徹底的な秘密主義集団です。それくらいはできても不思議ではありません。"
33160-158 = "私たちパテル分派はこの危険な事態に対し、迅速に対応することを決めました。"
33160-159 = "それはつまり、まさか……。"
33160-160 = "はい。私たちの決定に反対、或いは判断を留保したフィリウス分派ならびにサンクトゥス分派については、既に身柄を拘束しています。"
33160-161 = "クーデターですか……！"
33160-162 = "いえ、違います。何せそもそも、まだれっきとしたティーパーティーが1名いらっしゃいますから。"
33160-163 = "……！？"
33160-167 = "パテル分派の首長にして、ティーパーティーのメンバーであるミカ様。"
33160-168 = "あのお方を解放し、本来のお望み通りゲヘナとの全面戦争を始めるのです。"
33160-169 = "……！！！"
33160-172 = "……。"
33160-173 = "ミカさん、こちらへ。"
33160-174 = "……ふうん？"
33160-179 = "アズサ……君はこの後どうするつもりだい？"
33160-180 = "君の覚悟によって、多くの人々が救われた。しかし戒律は弱まったが、「ユスティナ聖徒会」は依然として存在する。"
33160-181 = "ゲヘナの風紀委員長ヒナはどこかへと消えてしまい、ハナコは逮捕されようとしている。"
33160-182 = "そして、ミカが釈放されつつある。"
33160-183 = "やはりこれが結末だ。"
33160-184 = "結局全ては無意味で、あまりにも虚しい夢のような物語……。"
33160-185 = "……まだだ。"
33160-186 = "アズサ……？"
33160-188 = "まだ挫折してる場合じゃない、アズサ。"
33160-189 = "動いて、考えて。挫折して悲しんでいる暇があったら、今からでも方法を探して、どうにか……"
33160-190 = "次の計画……次は……"
33160-195 = "止まっていられない、動かないと……何か方法を……。"
33160-196 = "「ユスティナ聖徒会」が消えてない……サオリも、アツコも無事……それは……いや、でも……"
33160-197 = "行かないと……何をしてでも、サオリを……。"
33160-198 = "でないと……"
33160-206 = "アズサ……君はまだ戦うつもりかい？"
33160-207 = "全てが虚しいと知っていて、それでも君は……"
33160-208 = "全てを失って、どうしてそんなに……"
33160-210 = "向こうの方で暴力沙汰が！誰か止めてきて！"
33160-211 = "第5校舎にて事件が発生！どうしますか！？"
33160-213 = "う、うぅ……。"
33160-214 = "わ、私は……。"
33160-215 = "あれ？あなた……今は補習授業部じゃなかったっけ、どうしてここにいるの？まだ復帰しちゃいけないんじゃなかった？"
33160-216 = "そ、それは、えっと……。"
33160-217 = "まあ今はそんな場合じゃないか。やることないなら、監獄の方にでも行ってもらえる？何か変な集まりが出てきそうとか言ってたし……。"
33160-221 = "わ、私は……っ！"
33160-223 = "さ、サオリさん……。"
33160-224 = "リーダー……。"
33160-226 = "今すぐ、トリニティへの攻撃を……！"
33160-227 = "その前に、やらなきゃいけないことがある。"
33160-228 = "ひ、姫ちゃんが怪我をして、「ユスティナ聖徒会」の顕現に問題が生じてますし……。"
33160-229 = "……あの古聖堂に戻って、戒律を更新しないと。"
33160-230 = "……。"
33160-231 = "……分かった、古聖堂へ向かうとしよう。"
33160-232 = "すぐに出発だ。"
33160-233 = "……。"
33160-234 = "行くぞ！"
33160-236 = "ミカ様、こちらへ。"
33160-237 = "ミカ様！！"
33160-238 = "お待たせしました、もう自由です！"
33160-242 = "ふーん……なるほどね？うん、大体状況は分かったよ。つまり……"
33160-243 = "みんな、私のファンってところかな？やー、仕方ないなあ。サインでもしてあげよっか？"
33160-244 = "い、いえそうではなく。ご覧になったかと思いますが、現在トリニティは――"
33160-246 = "うん、だいたい分かってる。で、ここのみんなは何？まさかとは思うけど、ゲヘナに宣戦布告しようとか考えてたり？"
33160-247 = "はい、その通りです！今こそゲヘナのやつらを消し去るチャンスかと！"
33160-248 = "あなた様が望んでいた通り、ゲヘナとの全面抗争を……！"
33160-249 = "さあ、今すぐトリニティ全域に戦闘命令を！"
33160-250 = "……あはっ。"
33160-251 = "みんな記憶力良いね。うん、私はゲヘナが大っ嫌いだよ。"
33160-252 = "……それで？だから何？どうしてそんな、命令を欲しがって来たわけ？"
33160-253 = "……はい？"
33160-254 = "他の派閥を抑えたんでしょ？実際のところ、宣戦布告なんて手続きもう要らないじゃん。今すぐにゲヘナに殴りかかれば良いのに、自分たちの代わりに怒って、命令してくれって……何それ、面白いことするね？"
33160-255 = "み、ミカ様！？何を……！"
33160-256 = "あははっ、気に障ったらごめん。"
33160-257 = "うん、私はゲヘナが嫌いだよ。機会があれば、どうにかしてやりたいと思うくらいにはね。"
33160-258 = "でもさ、今の私はあんまりそういう気分じゃないんだよね。だから悪いんだけど、帰ってもらえるかな？"
33160-259 = "き、気分……？"
33160-260 = "今がどれだけ重大なタイミングなのか、分かっていらっしゃるのですか。それを、たかが気分の問題で……"
33160-261 = "……「たかが」？何言ってるの、それが一番大事なことでしょ？"
33160-262 = "私は私の気分とか気持ちの問題で、ゲヘナが嫌いなの。そのことの何が悪いのさ。別に、その裏に隠れた理由とか目的なんて無いんだよ？"
33160-263 = "こんな状況で宣戦布告なんて、別に要らないって分かってるよね？なのに自分たちの代わりに憎んでくれだなんて、変なこと言って……。"
33160-264 = "もう帰ってくれないかな？今はそういう気分じゃないし、そろそろ面倒になってきちゃうから。"
33160-265 = "……何だと？"
33160-266 = "お耳掃除でもしてあげようか？命令されなきゃ憎むこともできないの、って言ってるの。"
33160-267 = "この、言わせておけば……っ！"
33160-272 = "……っ。"
33160-273 = "世間知らずのお嬢様が！わざわざ牢屋から出してあげようっていうのに、調子に乗って……！"
33160-277 = "あー、もう……。"
33160-283 = "……痛いなあ。"
33160-287 = "自分の立場を理解しろ！もうティーパーティーから解任直前の身で！"
33160-291 = "わざわざ来てあげたというのに、それを……！"
33160-300 = "……。"
33160-301 = "な、何してんのっ！？"
33160-302 = "な、なんだお前は！"
33160-303 = "い、いじめはダメっ！どうして、こんなに大勢で寄ってたかって……！"
33160-305 = "こ、こんなの、私が許さないんだからっ！！"
33160-306 = "……！"
33160-309 = "[ns] 目を開ける。"
33160-315 = "[ns] 身体を起こす。"
33160-317 = "せ、先生！？目が覚めたんですね……！！"
33160-318 = "まだ動いちゃダメです！先生、どこに行くつもりなんですか……！？"
33160-320 = "……先生、君はあくまで立ち向かうつもりかい？"
33160-321 = "生徒たちが他の何でもなく……。"
33160-322 = "……ただ、生徒たちであるために？"
33160-323 = "[s] \"そうあるべきだって、私は信じてるから。\""
33160-324 = "……だが、先生。"
33160-325 = "君の前に立ちふさがるのは憎悪と不信。長きにわたって久遠に近い集積を経た、それらの具現だ。"
33160-328 = "[ns] \"じゃあまずは、それと相対してくるよ。\""
33160-332 = "次回;憎しみの正体"

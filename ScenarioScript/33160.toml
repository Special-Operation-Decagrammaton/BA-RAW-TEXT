[translation]
33160-1 = "第16話;數個碎片"
33160-6 = "梓……"
33160-7 = "那個判斷有多痛苦呢……妳真的，像性命一樣寶貴的禮物。將那個，作為殺人道具使用……"
33160-8 = "原本是，為了破壞我的光環準備的炸彈……"
33160-9 = "當時沒用到的東西，在這個時間點……"
33160-12 = "咳咳，咳咳！唔，咕……！"
33160-13 = "！"
33160-14 = "公主，公主！！！！"
33160-15 = "……"
33160-16 = "……然而沙織沒事。儘管受了重傷，光環卻沒有被破壞。"
33160-17 = "不過，保護了她的敦子呢……？"
33160-18 = "公主！！不行，敦子！振作一點！！"
33160-19 = "敦子，那個稱為公主的孩子……"
33160-20 = "對沙織來說，是重要的人吧。"
33160-22 = "……"
33160-23 = "皇家血統的力量變弱了。這是，生命有異變……？"
33160-24 = "呼呣，會對實驗造成阻礙嗎……不過還沒……"
33160-25 = "……"
33160-26 = "……啊啊，是嗎。"
33160-27 = "她已經做好事先防範了……原來如此，因為是貴重的皇家血統嗎。"
33160-28 = "算了，雖然會花點時間……再怎麼說也是同志。這點程度不算什麼。"
33160-33 = "那麼，繼續實驗吧。"
33160-35 = "……"
33160-36 = "公主，還好嗎！？"
33160-37 = "（點頭）"
33160-38 = "啊啊，太好了。公主……"
33160-43 = "……不可原諒。"
33160-44 = "梓……竟敢讓公主受到這樣的傷……"
33160-45 = "絕對不原諒妳，梓！！"
33160-47 = "敦子沒有死……"
33160-48 = "那個炸彈，換作是我的話確實光環就「損壞了」呢。"
33160-49 = "就連沒有被直擊的沙織，都受到那種傷害。"
33160-50 = "那個名為敦子的孩子的光環……似乎被誰保護著呢。"
33160-51 = "……"
33160-52 = "……然而對奧利斯小隊的計劃，漸漸產生了巨大的障礙。"
33160-53 = "還沒完成三一的襲擊，因為敦子的負傷導致優斯提娜聖徒會的力量也削弱了。"
33160-54 = "加上古教堂的戰鬥也漸漸緩和下來……"
33160-55 = "兩學園處於膠著狀態，也展開了傷患的運送。"
33160-56 = "……梓。這樣妳的絕望，如果可以緩和一點就好了……"
33160-58 = "發現傷患，開始運送！！"
33160-59 = "這邊需要擔架！"
33160-60 = "在那邊，還有幾名傷患！"
33160-62 = "部長！從落入湖裡的飛船中，救出萬魔殿的議員們了！真琴議長也包含在內！"
33160-63 = "不愧是議長，一如往常運氣很好呢。落入湖中也是幸運……"
33160-64 = "請繼續各地的救助。基本上把所有人，強制性地送到集中治療室。"
33160-65 = "是！"
33160-66 = "風紀委員會方面呢？"
33160-67 = "目前，行政官的亞子同學正在協調。根據情報，委員長因為重傷意識不明。"
33160-68 = "……"
33160-69 = "風紀委員長……最期望這項條約的她……"
33160-70 = "……部長？"
33160-71 = "……不，沒什麼。請繼續進行傷患的救出。"
33160-75 = "…… "
33160-76 = "……可能會下雨呢。加快動作吧。"
33160-79 = "實現正義部的弦生部長重傷！蓮實副部長情況危急！"
33160-80 = "櫻子大人也情況危急！因為現在救護騎士團的救護室滿床，正送往古書館的寢室！"
33160-85 = "啊，啊啊……櫻子大人……"
33160-86 = "……渚同學呢？"
33160-87 = "關於她，還在搜索中！"
33160-88 = "……"
33160-89 = "……！有一部分的過激派即將對格黑娜進行宣戰公告的情報！！"
33160-91 = "什麼！？"
33160-92 = "不行，現在這個時候做那種事的話……！"
33160-96 = "有實現正義部正在嘗試進入大教堂的情報！和正在阻止的修女們在中央大廳產生了衝突！"
33160-97 = "什……！？"
33160-101 = "到處都陷入混亂……"
33160-102 = "不趕快阻止戰鬥，專心救助的話……！"
33160-105 = "（在變數過多的這個狀況，我到底該怎麼辦……）"
33160-106 = "（聖亞醬……）"
33160-108 = "（老師……）"
33160-110 = "格黑娜．保健室"
33160-111 = "委員長不見了！？"
33160-112 = "是，是的……剛才為止還在這裡躺著的……"
33160-113 = "請立刻去找出來！那個傷勢到底要去哪裡……！"
33160-114 = "是，是的！"
33160-119 = "委員長……"
33160-121 = "……風紀委員長，銷聲匿跡了呢。"
33160-122 = "至今為止一直努力的她的內心，變得怎麼樣了呢……"
33160-124 = "茶會．教室"
33160-125 = "宣戰公告的文章寫好了嗎！？"
33160-126 = "是的，沒問題！"
33160-127 = "好，那就馬上……！"
33160-131 = "請等一下！"
33160-132 = "什，浦和花子同學……？為什麼在這裡！？"
33160-133 = "宣戰公告在校規上，沒有主席應該是沒辦法做出宣言的才對！"
33160-134 = "……"
33160-135 = "看見那個影像了吧！？對方不是格黑娜！"
33160-136 = "那一定是，奧利斯操縱的「別的什麼東西」！"
33160-137 = "三一自治區內各地的遺跡，然後通過地下相連的地下墓穴──"
33160-139 = "……請抓住她。"
33160-145 = "！？"
33160-147 = "浦和花子同學……變成這樣真是遺憾。"
33160-148 = "做什麼……！？"
33160-149 = "影像的話確實確認過了。那個身分不明的集團，「優斯提娜聖徒會」。"
33160-150 = "那個和修女會有關係這種事當然已經掌握了。所以才像這樣採取行動。"
33160-151 = "偵探遊戲結束了，花子同學。"
33160-152 = "……！"
33160-153 = "關於巡航導彈的發射位置也確認了。是修女會管理下的，教堂的遺跡吧。"
33160-154 = "奧利斯通過那下面的地下墓穴，擅自入侵了我們的自治區……確實也有這個可能性吧。"
33160-155 = "不過如果，奧利斯和修女會從一開始就聯手的話呢？"
33160-156 = "……！那種事……！"
33160-157 = "畢竟是那麼徹底的祕密主義集團。就算能做到那種事也不奇怪。"
33160-158 = "我們聖父分派對於這個危險的事態，決定迅速進行應對。"
33160-159 = "那也就是，難道說……"
33160-160 = "是的。對於反對我們的決定，或者是保留判斷的聖子派和聖靈派，已經限制了他們的自由。"
33160-161 = "政變嗎……！"
33160-162 = "不，並非如此。畢竟，還有一名貨真價實的茶會成員啊。"
33160-163 = "……！？"
33160-167 = "既是聖父派的首長，同時也是茶會成員的彌香大人。"
33160-168 = "解放那位大人，依照原本的期望和格黑娜開始全面戰爭。"
33160-169 = "……！！！"
33160-172 = "……"
33160-173 = "彌香同學，這邊請。"
33160-174 = "……哼嗯？"
33160-179 = "梓……妳這之後打算怎麼做？"
33160-180 = "因為妳的覺悟，許多的人因此得救了。然而就算戒律削弱了，「優斯提娜聖徒會」依然存在著。"
33160-181 = "格黑娜的風紀委員長陽奈不知去向，花子正要被逮捕。"
33160-182 = "然後，彌香也被釋放。"
33160-183 = "果然這就是結局。"
33160-184 = "結果一切都沒有意義，如同徒勞至極的夢一般的故事……"
33160-185 = "……還沒。"
33160-186 = "梓……？"
33160-188 = "還不是感到挫折的時候，梓。"
33160-189 = "採取行動，動腦思考。有時間感到挫折和悲傷的話，不如現在開始尋找方法，想辦法……"
33160-190 = "下一個計劃……下一個……"
33160-195 = "不能停下來，必須行動……有什麼方法……"
33160-196 = "「優斯提娜聖徒會」沒有消失……沙織，敦子也沒事……那是……不，可是……"
33160-197 = "必須去做……無論如何，都得把沙織……"
33160-198 = "不然的話……"
33160-206 = "梓……妳還打算戰鬥嗎？"
33160-207 = "即使已經知道全都是徒勞的，妳依然……"
33160-208 = "明明已經失去了一切，為什麼那麼的……"
33160-210 = "那邊發生暴力事件！誰快去阻止！"
33160-211 = "第5校舍發生事件！該怎麼辦！？"
33160-213 = "唔，唔唔……"
33160-214 = "我，我……"
33160-215 = "啊咧？妳……現在不是在補課部嗎，為什麼在這裡呢？不是還不能回歸嗎？"
33160-216 = "那，那是，那個……"
33160-217 = "嘛現在不是那種時候啊。沒有事做的話，可以去監獄那邊嗎？好像出現了一些不尋常的集會……"
33160-221 = "我，我……！"
33160-223 = "沙，沙織同學……"
33160-224 = "隊長……"
33160-226 = "現在立刻，向三一發動攻擊……！"
33160-227 = "在那之前，有必須要做的事。"
33160-228 = "公，公主醬受傷了，「優斯提娜聖徒會」的顯現產生了問題……"
33160-229 = "……必須回到那個古教堂，更新戒律才行。"
33160-230 = "……"
33160-231 = "……我知道了，前往古教堂吧。"
33160-232 = "立刻出發。"
33160-233 = "……"
33160-234 = "走了！"
33160-236 = "彌香大人，這邊請。"
33160-237 = "彌香大人！！"
33160-238 = "讓您久等了，已經自由了！"
33160-242 = "哼……原來如此啊？嗯，大致上的情況我知道了唷。也就是說……"
33160-243 = "大家，都是我的粉絲嗎？呀，真沒辦法呢。要我幫妳們簽名嗎？"
33160-244 = "不，不是那樣的。我想您已經看見了，現在三一是──"
33160-246 = "嗯，大致上知道。所以，這裡的大家是怎樣？雖然我有想過，不過該不會是打算向格黑娜進行宣戰公告吧？"
33160-247 = "是的，就是那樣！現在正是清除格黑娜那些傢伙的機會！"
33160-248 = "如您期望的，和格黑娜的全面抗爭……！"
33160-249 = "來吧，現在立刻對三一全域下達戰鬥命令！"
33160-250 = "……啊哈。"
33160-251 = "大家記憶力真好呢。嗯，我最討厭格黑娜了唷。"
33160-252 = "……所以呢？那又怎樣？為什麼那麼想要命令？"
33160-253 = "……咦？"
33160-254 = "壓制了其他派系了吧？實際上，宣戰公告什麼的手續已經不需要了嘛。明明現在直接打進格黑娜就好了，代替自己生氣、下命令……那是怎樣，做了很有趣的事呢？"
33160-255 = "彌，彌香大人！？說什麼……！"
33160-256 = "啊哈哈，讓妳們不高興的話抱歉。"
33160-257 = "嗯，我討厭格黑娜唷。甚至有機會的話，會想要想辦法把她們處理掉呢。"
33160-258 = "但是啊，現在的我沒什麼那種心情呢。所以很抱歉，可以回去嗎？"
33160-259 = "心，心情……？"
33160-260 = "您知道現在是多麼重大的時機嗎。僅僅，只因為心情上的問題……"
33160-261 = "……「只因為」？妳在說什麼啊，那是最重要的事吧？"
33160-262 = "我因為我的心情感覺之類的問題，而討厭格黑娜。這件事有什麼錯啊。也沒有什麼藏在這背後的理由和目的唷？"
33160-263 = "這種狀況宣戰公告什麼的，妳們也知道不需要吧？然而要我代替妳們憎恨什麼的，說這種奇怪的話……"
33160-264 = "可以回去了嗎？現在沒有那種心情，差不多覺得麻煩了。"
33160-265 = "……妳說什麼？"
33160-266 = "要我幫妳清理耳朵嗎？我說，沒有命令的話連憎恨也做不到。"
33160-267 = "妳這個，讓妳說就給我……！"
33160-272 = "……"
33160-273 = "不黯世事的大小姐！都要特地把妳從牢房放出來了，還給我得意忘形……！"
33160-277 = "啊，真是的……"
33160-283 = "……好痛呀。"
33160-287 = "理解自己的立場！妳已經即將從茶會被解任了！"
33160-291 = "特地來幫助妳了，妳卻……！"
33160-300 = "……"
33160-301 = "在，在做什麼啊！？"
33160-302 = "妳，妳是誰啊！"
33160-303 = "不，不可以欺負人！為什麼，這麼多人聚在一起……！"
33160-305 = "這，這種事，我不會原諒的！！"
33160-306 = "……！"
33160-309 = "[ns] 睜開眼睛"
33160-315 = "[ns] 起身"
33160-317 = "老，老師！？你醒了啊……！！"
33160-318 = "還不可以動！老師，你打算去哪裡……！？"
33160-320 = "……老師，你終究還是打算面對嗎？"
33160-321 = "為了讓學生們不誤入歧途……"
33160-322 = "……能夠，單純做個學生？"
33160-323 = "[s]「因為我相信著，必須是這樣的。」"
33160-324 = "……不過，老師。"
33160-325 = "阻擋在你面前的是憎惡和不信任。長久以來經過近乎永恆累積的，這些東西的具現。"
33160-328 = "[ns]「那首先，和那個對抗吧。」"
33160-332 = "下一話;憎恨的真相"

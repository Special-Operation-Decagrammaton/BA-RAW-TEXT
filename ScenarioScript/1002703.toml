[translation]
1002703-1 = "ความเข้าใจผิดที่คาดไม่ถึง"
1002703-3 = "อ๊ะ คุณครู ทางนี้"
1002703-4 = "....?"
1002703-5 = "[s] \"…\""
1002703-6 = "...? อะ...อะไรน่ะ? สีหน้าแบบนั้น?"
1002703-7 = "อา... ทำไมฉันถึงใส่ชุดนี้อีกน่ะเหรอ?"
1002703-8 = "เพราะภารกิจครั้งนี้คือการแฝงตัวเข้ามาสืบสวนในคาเฟ่แห่งนี้ยังไงล่ะ"
1002703-9 = "พอมาคิดดูแล้ว... คราวก่อนก็ถามแบบนี้นี่ ดูเหมือนคุณครูชอบถามทุกครั้งเวลาฉันใส่ชุดนี้เลยนะ"
1002703-10 = "จะว่ายังไงดีล่ะ มันรู้สึกเหมือนว่าคุณครูตั้งใจถามน่ะ... มีเหตุผลอื่นรึเปล่า?"
1002703-11 = "หืม? ไม่มีอะไรงั้นเหรอ?"
1002703-12 = "พูดแบบนี้ยิ่งน่าสงสัยใหญ่เลย..."
1002703-13 = "คุณครู..."
1002703-14 = "ฉันแค่ถามไว้เผื่อๆ นะ ถ้าครูสนใจชุดแนวนี้ละก็..."
1002703-15 = "[s1] \"หา...? ว่าอะไรนะ?\"\n[s2] \"ดูเหมือนว่าเธอจะเข้าใจผิดไปใหญ่แล้วนะ\""
1002703-16 = "...? อะไรน่ะ ปฏิกิริยาแบบนั้น?"
1002703-17 = "...? อะไรน่ะ ปฏิกิริยาแบบนั้น?"
1002703-18 = "หรือว่า... หรือว่าเป็นแบบนั้นจริงๆ เหรอ...?"
1002703-19 = "น่าตกใจจริงๆ เสื้อผ้ามีตั้งหลายรูปแบบ แต่คุณครูกลับสนใจชุดบันนี่เกิร์ลงั้นเหรอ..."
1002703-20 = "เกินคาดจริงๆ... มะ...ไม่สิ ขอโทษนะ พูดแบบนี้ไม่ได้สินะ เรื่องความชื่นชอบของคนอื่น..."
1002703-21 = "แน่นอนว่าคนเรามีอิสระที่จะชอบอะไรก็ได้ ฉันเองก็ไม่ได้คิดว่าเรื่องพวกนั้นมันเป็นเรื่องแย่หรอกนะ"
1002703-22 = "ไม่ว่าคุณครูจะชื่นชอบเรื่องแบบไหน ฉันก็เข้าใจคุณครู การลองใส่ชุดสวยๆ บ้างก็เป็นเรื่องที่ดีนะ"
1002703-23 = "แน่นอนว่าฉันก็จะให้ความร่วมมือเรื่องความชอบของคุณครูอยู่แล้ว เพราะที่ผ่านมาคุณครูก็ช่วยฉัน#nมาตลอด..."
1002703-24 = "หืม? เข้าใจผิดงั้นเหรอ? ไม่ใช่แบบนั้นเหรอ?"
1002703-25 = "ฮุฮุ..."
1002703-26 = "คุณครู ยังไม่เชื่อใจฉันอีกรึไง... ไม่สิ แต่บางทีที่ไม่บอกฉัน ก็หมายความว่ามันสำคัญกับคุณครู#nมากสินะ"
1002703-27 = "อืม ทราบแล้วล่ะ ขอโทษนะที่ฉันทำเป็นพูดเหมือนรู้เรื่องนี้ดี งั้นก็ลืมเรื่องที่พูดกันไปเถอะ"
1002703-28 = "[s] \"เดี๋ยวสิ ไม่ใช่แบบนั้นนะ เข้าใจผิดแล้ว!\""
1002703-29 = "อื้อ... คุณครู ฉันรู้อยู่แล้วล่ะ ฉันนี่ไม่รู้อะไรเลยจริงๆ"
1002703-30 = "แต่ถึงฉันจะรู้ ฉันก็ไม่คิดหรือมองคุณครูด้วยสายตาแปลกๆ เด็ดขาดเลย..."
1002703-34 = "โอ้...! คารินจัง! เดี๋ยวก่อนๆ!! ทำพลาดอีกแล้วเหรอ...!"
1002703-35 = "...!?"
1002703-36 = "[s] \"...!?\""
1002703-37 = "บอกกี่ครั้งแล้วว่าให้เรียกลูกค้าทุกคนที่มาว่านายท่านน่ะ? เด็กคนนี้นี่น้า ให้ตายสิ"
1002703-38 = "อา..."
1002703-39 = "อ๊ะ จริงด้วย เอ่อ... คือว่า..."
1002703-40 = "ค่ะ ขอโทษค่ะ ฉันจะระวังค่ะ..."
1002703-41 = "เฮ้อ... ฉันรู้นะว่าเธอก็ตั้งใจทำงานอย่างหนัก แต่การใช้คำเรียกลูกค้าเป็นเรื่องสำคัญมากในคาเฟ่#nแบบร้านเรานะ"
1002703-42 = "ช่วยระวังเรื่องคำเรียกให้มากขึ้นด้วยล่ะ"
1002703-43 = "ค่ะ...ได้ค่ะ..."
1002703-48 = "เฮ้อ..."
1002703-49 = "เกือบเป็นเรื่องแล้วล่ะ เกือบถูกจับได้ซะแล้ว ขอโทษนะ คุณครู"
1002703-50 = "[s3] \"ก็บอกว่าไม่ใช่แบบนั้นไงล่ะ\"\n[s4] \"ฟังที่ครูพูดหน่อยเถอะ...\""
1002703-51 = "อา อย่างนี้นี่เอง ที่จริงแล้ว..."
1002703-52 = "อา อย่างนี้นี่เอง จริงด้วยนะ..."
1002703-53 = "ถ้ายิ่งพูดถึงเรื่องนี้บ่อยๆ ก็อาจมีโอกาสรั่วไหลไปถึงคนภายนอกได้สินะ ขอโทษนะ ฉันจะระวัง"
1002703-54 = "แต่ไม่ต้องห่วงหรอกนะ คุณครู... "
1002703-55 = "ไม่สิ"
1002703-56 = "ความลับของนายท่าน ฉันจะปิดปากเงียบอย่างดีเลย ไว้ใจฉันได้เลย"
1002703-57 = "ถ้างั้นก็กลับมาเรื่องหลักของเราต่อ... เชิญด้านในเลยค่ะนายท่าน ด้านนี้ค่ะ"
1002703-61 = "[ns] \"...\""
1002703-63 = "(สุดท้ายคุณครูก็แก้เรื่องที่ถูกเข้าใจผิดไม่สำเร็จ)"

[translation]
1002703-1 = "#title;생각지 못한 오해"
1002703-2 = "#wait;1500"
1002703-3 = "3;카린 바니걸;02;……아. 선생님. 여기다.\n#3;em;[반응]\n#3;a"
1002703-4 = "3;카린 바니걸;01;……?"
1002703-5 = "[s] \"…….\""
1002703-6 = "3;카린 바니걸;04;……? 뭐, 뭐지? 그 표정은?\n#3;stiff\n#3;em;[땀]"
1002703-7 = "3;카린 바니걸;01;아, 왜 또 이 옷이냐고?"
1002703-8 = "3;카린 바니걸;02;그야 이번에 이 카페에서 잠입수사를 시작하게 됐으니까 그런 거다만."
1002703-9 = "3;카린 바니걸;99;……그러고 보니 저번에도 그러더니, 선생님은 내가 이 옷을 입을 때마다 물어보는군.\n#3;em;…"
1002703-10 = "3;카린 바니걸;01;뭐랄까. 일부러 묻는 거 같은 느낌이 드는데……. 달리 이유라도 있나?"
1002703-11 = "3;카린 바니걸;04;음? 아무것도 아니라고?\n#3;em;[?]"
1002703-12 = "3;카린 바니걸;01;그렇게 말하니 괜히 더 수상한데……."
1002703-13 = "3;카린 바니걸;02;……선생님.\n#3;em;[반응]"
1002703-14 = "3;카린 바니걸;01;혹시나 해서 묻는 말인데, 이런 쪽에 관심이 있는 거라면……."
1002703-15 = "[s1] \"……예? 뭐라고요?\"\n[s2] \"지금 뭔가 엄청난 오해가 발생한 거 같은데.\""
1002703-16 = "3;카린 바니걸;01;……? 뭐지, 그 반응?\n#3;em;[?]"
1002703-17 = "3;카린 바니걸;01;……? 뭐지, 그 반응?\n#3;em;[?]"
1002703-18 = "3;카린 바니걸;04;설마……. 설마 진짜 그런 거였나……?"
1002703-19 = "3;카린 바니걸;01;놀랍군. 게다가 그 많은 옷들 중에 관심 가지고 있던 옷이 이런 바니걸 의상이었다니……."
1002703-20 = "3;카린 바니걸;04;의, 의외랄까……. 아, 아니. 미안하다. 이런 말을 하면 안 되지. 다른 사람의 취미인 것을.\n#3;stiff\n#3;em;[땀]"
1002703-21 = "3;카린 바니걸;01;물론 사람의 취미는 자유고, 나는 결코 그런 걸 나쁘게 볼 생각이 전혀 없다."
1002703-22 = "3;카린 바니걸;02;선생님이 어떤 취미를 가지고 있든 나는 다 이해할 것이다. 예쁜 옷을 입어본다는 건 좋은 일이고 말이지."
1002703-23 = "3;카린 바니걸;03;그리고 나는 선생님의 취미에 협조해 줄 의향도 물론 있다. 그간 도움받은 일들도 많으니…….\n#3;greeting\n#3;em;[음표]"
1002703-24 = "3;카린 바니걸;01;응? 오해라고? 그런 거 아니라고?"
1002703-25 = "3;카린 바니걸;99;……후후.\n#3;em;…"
1002703-26 = "3;카린 바니걸;03;선생님. 아직 날 신뢰하지 못하는 건가……. 아니. 어쩌면 선생님에게는 그만큼 중요한 사안이란 뜻이겠지."
1002703-27 = "3;카린 바니걸;07;음. 알겠다. 괜히 아는 척 이야기해서 미안하군. 이 이야기는 없던 걸로 하지.\n#3;em;[반짝]"
1002703-28 = "[s] \"아니. 그게 아니야. 오해야!\""
1002703-29 = "3;카린 바니걸;03;응. 선생님. 알고 있다. 나는 아무것도 모르는 거야.\n#3;em;[반응]"
1002703-30 = "3;카린 바니걸;99;혹여 알게 된다 하더라도 절대로 선생님을 이상하게 보거나 하지 않을 테니……."

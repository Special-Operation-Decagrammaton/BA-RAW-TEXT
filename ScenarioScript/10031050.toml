[translation]
10031050-1 = "ตอนที่ 5;กลยุทธ์ประชาสัมพันธ์ของท่านประธาน"
10031050-2 = "(วันที่ 3 หลังจากคุณครูตอบตกลงว่าจะช่วยเตรียมงานปาร์ตี้สุดพิเศษแห่งเกเฮนน่าของแพนเดโมเนียม โซไซตี้ วันนี้คุณครูก็ไปสถานที่จัดงานอีกเช่นเคย)"
10031050-3 = "[ns] \"แม้แต่ทางเดินก็ตกแต่งกันด้วยแฮะ\""
10031050-4 = "(ในขณะที่คุณครูกำลังเดินไปตามทางเดินของสถาบันเกเฮนน่าที่ถูกตกแต่งไว้จนได้บรรยากาศของงาน#nปาร์ตี้)"
10031050-9 = "หืม?"
10031050-10 = "ว้าว~! ครูนี่นา~! ไฮฮาย~"
10031050-11 = "[s] \"อ้าว ว่าไงเอริกะ คิราระ ได้เจอกันในที่แบบนี้ด้วยนะ\""
10031050-12 = "ฉันต่างหากที่อยากพูดแบบนั้น นึกไม่ถึงเลยนะว่าจะได้เจอคุณครูที่ทางเดินในโรงเรียนของเราด้วย..."
10031050-13 = "แบบนี้จะเรียกว่ากะทันหันได้ไหมนะ..."
10031050-14 = "อื้อ~ เซอร์ไพรส์เลยละ!"
10031050-15 = "ฮุฮุ รู้สึกว่าวันนี้จะโชคดีไปทั้งวันยังไงก็ไม่รู้น้า~"
10031050-16 = "[s] \"จะ... จะโชคดีงั้นเหรอ...? ทำไมล่ะ?\""
10031050-17 = "อ้อ ถ้าคิราระจังพูดแบบนั้นก็ตามนั้นละ น่าจะรู้สึกบางอย่างได้น่ะ"
10031050-18 = "อืม~ ถ้าจะให้พูดเปรียบเปรยง่ายๆ ก็คงเหมือนได้เจอใบโคลเวอร์สี่แฉกที่พื้นโดยบังเอิญในขณะที่เดิน#nมองถนนโดยที่ไม่คิดอะไร..."
10031050-19 = "อะฮ่าฮ่าฮ่า~! เอริกะจังพูดถูกแล้วละ เป็นความรู้สึกแบบนั้นเลย!"
10031050-20 = "[s] \"ครูเข้าไม่ถึงเท่าไร... แต่ก็ขอบใจนะที่คิดอย่างนั้น...\""
10031050-21 = "แล้วคุณครูมาทำอะไรที่นี่น่ะ? "
10031050-22 = "อ๋อ... แพนเดโมเนียม โซไซตี้ขอให้มาช่วยเตรียมงาน <ปาร์ตี้สุดพิเศษแห่งเกเฮนน่า> ที่จะจัดขึ้นในอีก#nไม่กี่วันสินะ..."
10031050-23 = "แค่คิดก็เหนื่อยแทนแล้วเลย"
10031050-24 = "อะฮ่าฮ่าฮ่า~! สุดยอดเลย~! ครูก็มาช่วยงานปาร์ตี้ครั้งนี้เหรอเนี่ย~"
10031050-25 = "อ๊ะ ถ้างั้น <สิ่งนั้น> ก็เป็นไอเดียของครูด้วยรึเปล่า? "
10031050-26 = "ไม่หรอกน่า คิราระจัง ถึงยังไงก็ไม่น่าจะใช่หรอกน่า..."
10031050-27 = "แต่ใครจะไปรู้ล่ะ~?"
10031050-28 = "[s] \"<สิ่งนั้น>... งั้นเหรอ?\""
10031050-29 = "คือว่า... ระหว่างที่มีการเตรียมงานปาร์ตี้ ล่าสุดฉันเห็นมีรูปปั้นบางอย่างติดตั้งเอาไว้ทั่วโรงเรียนเลยละ"
10031050-30 = "และที่สำคัญก็คือ~ หน้าตารูปปั้นมันแปลกเอามากๆ เรียกได้ว่าเห็นแล้วหลุดขำออกมาเลย ตอนนี้เรื่องนี้กำลังเป็นประเด็นในหมู่นักเรียนเกเฮนน่าเลยนะ~"
10031050-31 = "อะฮ่าฮ่า! ตอนนี้พวกเรากำลังตามหารูปปั้นอันนั้นอยู่เลยละ ถ้าถ่ายรูปมาลงโซเชียลก็คงจะได้ยอดไลก์#nบ้างเนอะ~"
10031050-32 = "[s] \"......??\""
10031050-33 = "อ๊ะ ถ้าแค่อธิบายก็คงไม่เห็นภาพสินะ"
10031050-34 = "ฉันจะให้ดูเอง! นี่ไง นี่!"
10031050-41 = "[ns] \"นี่มัน......\""
10031050-42 = "ว่าไง? ครูก็ขำเหมือนกันใช่มั้ย?"
10031050-43 = "พอได้คุณครูมาช่วยงานด้วย ก็รู้สึกว่างานนี้จะต้องเป็นงานใหญ่เลยนะ ฉันว่าปาร์ตี้ปีนี้อาจจะสนุกกว่าปี#nก่อนๆ ก็ได้"
10031050-44 = "ถ้างั้นพวกเราจะตั้งตารอปาร์ตี้ที่ครูมาช่วยเตรียมงานนะ!"
10031050-46 = "[ns] \"อื้ม... ขอบใจที่ให้กำลังใจนะ\""
10031050-48 = "(หลังจากบอกลากับคิราระกับเอริกะ คุณครูก็ไปที่สำนักงานของแพนเดโมเนียม โซไซตี้)"
10031050-54 = "หึหึหึ... ยินดีต้อนรับ ครู [USERNAME]"
10031050-55 = "[s] \"อื้อ มาโคโตะ เป็นยังไงบ้าง? ดีขึ้นมั้ย?\""
10031050-56 = "หืม?"
10031050-57 = "อ้อ ถ้าเรื่องนั้นน่ะไม่เป็นไร"
10031050-58 = "เมื่อวานเราก็แค่... ความทรงจำเลือนรางไปโดยที่ไม่ได้ตั้งใจ ระหว่างเตรียมสิ่งสำคัญของปาร์ตี้น่ะ"
10031050-59 = "เรื่องแบบนั้นเกิดขึ้นได้บ่อยๆ ในชีวิตประจำวัน ไม่ต้องสนใจหรอก"
10031050-60 = "[s] \"เป็นเรื่องที่เกิดขึ้นบ่อยๆ เลยเหรอ?!\""
10031050-61 = "ฮึ่ม เรื่องที่ผ่านไปแล้วก็ปล่อยให้มันผ่านไปเถอะ"
10031050-62 = "สิ่งที่สำคัญคืออนาคตหลังจากนี้ต่างหาก วันนี้เราก็จะทุ่มเทให้กับการเตรียมปาร์ตี้กับครูเหมือนเดิม"
10031050-63 = "[s3] \"อ่า ไหนๆ พูดถึงเรื่องเตรียมปาร์ตี้แล้ว...\"\n[s4] \"ระหว่างมาที่นี่ครูเห็นอะไรแปลกๆ ด้วย\""
10031050-66 = "มีรูปปั้นแปลกๆ อยู่ตามทางเดินในโรงเรียนของเรางั้นเหรอ...?"
10031050-67 = "อืม อาจเป็นของที่นักเรียนเกเฮนน่าบางคนเอาไปตั้งไว้ด้วยความสนุกเพื่อจะต้อนรับงานปาร์ตี้ก็ได้"
10031050-68 = "ถ้าเป็นเรื่องแค่นั้นน่ะ ไว้เราจะสั่งให้เด็กๆ ไปจัดการ"
10031050-69 = "สิ่งที่สำคัญน่ะไม่ใช่เรื่องแบบนั้นหรอกครู หากแต่เป็น..."
10031050-70 = "สิ่งที่เราทุ่มเทให้มากที่สุดในการเตรียมปาร์ตี้ครั้งนี้! ในที่สุดวันนี้ <สิ่งนั้น> ก็เสร็จสมบูรณ์แล้ว"
10031050-71 = "และที่เราเรียกครูมาที่สำนักงาน ก็เพื่อจะให้ครูเห็นสิ่งนั้นยังไงล่ะ"
10031050-72 = "[s] \"<สิ่งนั้น> เสร็จสมบูรณ์แล้วงั้นเหรอ มันคืออะไรกันนะ...\""
10031050-73 = "หึหึหึ มันก็คือ... นี่ไงล่ะ!"
10031050-79 = "[ns] \"นี่มันของแปลกๆ ที่คิราระเอาให้ดูเมื่อกี้!\""
10031050-80 = "ว่าไงนะ?! พูดแบบนั้นเสียมารยาทนะ!"
10031050-81 = "มันแปลกตรงไหนน่ะครู!"
10031050-82 = "นี่เป็นถึงประติมากรรมทองสัมฤทธิ์ที่แสดงถึงความฉลาดและความกล้าหาญของท่านฮานุมะ มาโคโตะ#nคนนี้เชียวนะ! เราสั่งทำมาเป็นการพิเศษเพื่อปาร์ตี้ครั้งนี้เลยด้วย...!"
10031050-83 = "ไม่ว่าใครก็ต้องคิดสิว่ามันเป็นรูปปั้นที่สง่าผ่าเผยมาก!"
10031050-84 = "[s] \"เรื่องนั้นน่ะไม่รู้หรอก แต่น่าจะทำขึ้นด้วยความสนุกจริงๆ นะ\""
10031050-88 = "[ns] \"เห็นว่าทำไว้เยอะเลย มีจุดประสงค์อะไรงั้นเหรอ...?\""
10031050-89 = "เหตุผลที่ทำขึ้นมาน่ะเหรอ? มันก็แน่อยู่แล้ว... "
10031050-90 = "เพื่อประชาสัมพันธ์ <ปาร์ตี้สุดพิเศษแห่งเกเฮนน่า> ครั้งนี้ยังไงล่ะ!"
10031050-95 = "ปาร์ตี้ครั้งนี้เป็นงานที่เราทุ่มเททั้งแรงกายและแรงใจ เพราะงั้นมันก็เลยต้องมีสิ่งของที่เหมาะสม... และแสดงให้เห็นถึงเกียรติภูมิอันยิ่งใหญ่ของเราด้วยสิ"
10031050-96 = "เราก็เลยจะวางรูปปั้นที่สั่งทำเป็นพิเศษนี้ไว้ทั่วเกเฮนน่าในระหว่างที่มีการจัดงานปาร์ตี้"
10031050-97 = "นักเรียนเกเฮนน่าทุกคนจะได้รับรู้ถึงความยิ่งใหญ่ของท่านฮานุมะ มาโคโตะ และความเกรียงไกรของ#nแพนเดโมเนียม โซไซตี้ยังไงล่ะ! หึหึหึหึ!!!"
10031050-98 = "ตอนนี้ในโซเชียลกำลังพูดถึงเรื่องนี้กันอย่างร้อนแรงเลยละ! ดูนี่สิ!"
10031050-103 = "<คิระคิระ อุรุรุน☆>: อะฮ่าฮ่าฮ่า~! ดูนี่สิ! สุดยอดเลย~! มีรูปปั้นเต็มไปหมดเลย~!"
10031050-104 = "<GehEricha0201>: จะว่ายังไงดีนะ มันเยอะซะจนขวางทางเดินไปหมดเลย นี่มันโอเคจริงเหรอเนี่ย?"
10031050-105 = "<akusi-girl>: เมื่อกี้เห็นพวกนักเลงกำลังขนย้ายของกันใหญ่เลยนะ"
10031050-106 = "<#Nyanko&>: ดูไม่ชอบมาพากลนะ"
10031050-108 = "[ns5] \"ถูกพูดถึงอย่างร้อนแรง... แน่นะ?\"\n[ns6] \"ว่าแต่... ถ้าสั่งทำมาเยอะขนาดนี้ น่าจะใช้เงินเยอะเลยนะ?\""
10031050-111 = "หึหึหึ"
10031050-112 = "ไม่หรอกครู เรื่องค่าใช้จ่ายน่ะไม่ต้องสนใจหรอก นั่นก็เพราะว่า..."
10031050-113 = "ทั้งค่าใช้จ่ายในการสร้างรูปปั้นในครั้งนี้ รวมถึงค่าแรงจัดวางรูปปั้นพวกนี้ให้ทั่วสถาบันเกเฮนน่า มันไม่ใช่ภาระของแพนเดโมเนียม โซไซตี้ แต่จะเป็นของคณะกรรมการวินัยยังไงล่ะ!"
10031050-114 = "[s] \"หะ... หืม?\""
10031050-115 = "คนที่ตัดสินใจแผนงบประมาณของคณะกรรมการวินัยก็คือแพนเดโมเนียม โซไซตี้น่ะ!"
10031050-116 = "หึหึหึ! เราจะสร้างหายนะทางการเงินให้คณะกรรมการวินัยโดยดึงงบประมาณของพวกนั้นมาถลุงในงาน#nปาร์ตี้...! และโปรโมตปาร์ตี้ครั้งนี้จนคณะกรรมการวินัยร้องไห้ขี้มูกโป่งเพราะงบประมาณโดนแย่งไป!"
10031050-117 = "ทําอย่างเดียวได้ผลสองอย่าง! ทุนครั้งเดียวได้กําไรสองทาง! นี่มันยิงปืนนัดเดียวได้นกสองตัวชัดๆ!"
10031050-118 = "นี่ละแผนการอัจฉริยะของท่านมาโคโตะ!"
10031050-119 = "หึหึ หึหึหึหึ! หึหึหึหึหึ!!"
10031050-120 = "[s] \"มาโคโตะ เรื่องนี้คณะกรรมการวินัย...\""
10031050-121 = "ไม่รู้หรอก!"
10031050-122 = "เดิมทีแล้วประธานกรรมการวินัยก็คงพยายามออกหน้ามาขัดขวาง แต่ตอนนี้ยัยนั่นกำลังเจอกับอุบาย#nของท่านมาโคโตะผู้นี้..."
10031050-123 = "ตอนนี้ก็เลยไปง่วนอยู่กับการฝึกเปียโนยังไงล่ะ...!"
10031050-124 = "แผนการที่แยบยลของเราช่างสมบูรณ์แบบเหลือเกิน!"
10031050-126 = "โอ้ว! พูดเองก็ขนลุกเองเลยนะเนี่ย!!"

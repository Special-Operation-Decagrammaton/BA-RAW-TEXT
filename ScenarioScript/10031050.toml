10031050-97 = "3;마코토;03;이 하누마 마코토 님의 위엄에 대해, 우리 만마전의 위대함에 대해…… 모든 게헨나 학생에게 널리 알리는 것이 가능하겠지! 키키키킷!!!\n#3;em;[재잘]\n#3;hophop"

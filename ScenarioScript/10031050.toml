[translation]
10031050-1 = "第5話;議長的宣傳戰略"
10031050-2 = "（決定協助萬魔殿準備格黑娜特別派對的第三天，同樣來到了萬魔殿）"
10031050-3 = "[ns]「連走廊也都布置成派對的風格了呢。」"
10031050-4 = "（就當走在因派對而漸漸變得華麗的校園走廊時……）"
10031050-9 = "嗯？"
10031050-10 = "哇～！是老師～！哈囉哈囉～"
10031050-11 = "[s]「啊，繪里香、綺羅羅。嗨～竟然會在這裡碰到你們。」"
10031050-12 = "我們也有同感。#n沒想到會在走廊上遇見老師……"
10031050-13 = "該說是事出突然呢……"
10031050-14 = "嗯～簡直是真正的Surprise！"
10031050-15 = "呵呵，看來今天一整天應該都會很幸運。"
10031050-16 = "[s]「很，很幸運……為什麼呢？」"
10031050-17 = "啊，綺羅羅醬應該是這個意思吧。"
10031050-18 = "唔嗯～舉例來說……#n就像是隨意走在路上，結果突然發現了四葉幸運草……的感覺？"
10031050-19 = "啊哈哈哈～！繪里香醬說的沒錯。就是那種感覺！"
10031050-20 = "[s]「雖然不是很清楚……不過你能那樣認為的話我也很開心……」"
10031050-21 = "話說老師怎麼會來這裡呢？"
10031050-22 = "啊……是受萬魔殿的邀請，來幫忙籌備幾天後的「格黑娜特別派對」……"
10031050-23 = "哎呀，光聽起來就覺得很辛苦。"
10031050-24 = "啊哈哈哈～！真假～！原來這次的派對老師也有幫忙呀～"
10031050-25 = "啊，難道「那個」也是老師的主意嗎？"
10031050-26 = "不，綺羅羅醬。再怎麼說也不太可能吧……"
10031050-27 = "不好說哦～？"
10031050-28 = "[s]「『那個』指的是……？」"
10031050-29 = "就是……隨著派對準備的進行，各處都開始有雕像出現。"
10031050-30 = "不過～雕像的外觀相當特殊，光是看著就會讓人忍不住笑出來。#n在格黑娜的學生之間已經造成轟動了～"
10031050-31 = "啊哈哈！我們也想找到那個之後拍照傳到SNS，所以正在到處找哦～"
10031050-32 = "[s]「……？？」"
10031050-33 = "啊，光用嘴巴說應該有點難懂吧。"
10031050-34 = "直接讓老師看看吧！就是這個，這個！"
10031050-41 = "[ns]「這是……」"
10031050-42 = "對吧？老師也覺得很好笑吧？"
10031050-43 = "既然老師也在幫忙，有種卯足全力的感覺……說不定這次的派對會更有趣呢。"
10031050-44 = "那當然，這可是老師幫忙籌備的派對！我會拭目以待！"
10031050-46 = "[ns]「嗯嗯……謝謝你的打氣。」"
10031050-48 = "（和綺羅羅與繪里香分開後，抵達了萬魔殿的辦公室）"
10031050-54 = "咯咯咯……歡迎你來，[USERNAME]老師。"
10031050-55 = "[s]「啊，真琴。身體還好嗎？」"
10031050-56 = "嗯？"
10031050-57 = "啊啊，沒什麼問題。"
10031050-58 = "昨天本來要準備重要的派對，結果途中莫名其妙就突然失憶了。"
10031050-59 = "這種事經常發生，不需要太在意。"
10031050-60 = "[s]「經常發生！？」"
10031050-61 = "嗯，過去的事就讓它過去吧。"
10031050-62 = "重要的是今後的未來。#n我今天也會全心全意，和老師一起準備派對。"
10031050-63 = "[s3]「啊，說到準備派對……」\n[s4]「我在來的路上看見了奇怪的東西。」"
10031050-66 = "校園的走廊上有奇怪的雕像……？"
10031050-67 = "是嗎……說不定是有人為了迎接派對而準備的東西。"
10031050-68 = "我會盡快派人去處理。"
10031050-69 = "不過現在重要的並不是那個，老師。"
10031050-70 = "因為我為了這次派對，付出最大心血的「東西」終於完成了。"
10031050-71 = "今天之所以找老師來辦公室，也是為了讓老師看那個東西。"
10031050-72 = "[s]「『東西』已經完成，指的到底是什麼呢……」"
10031050-73 = "嘻嘻嘻。#n……就是這個！"
10031050-79 = "[ns]「是剛剛來的路上，綺羅羅讓我看過的怪東西！」"
10031050-80 = "什麼！？那種話還真失禮！"
10031050-81 = "這個東西哪裡奇怪了？老師！"
10031050-82 = "這可是為了本次派對特別訂製……#n以果斷的形象與大膽的造型，呈現我羽沼真琴大人的理智與勇敢……！"
10031050-83 = "不管怎麼看都威風凜凜的帥氣銅像啊！"
10031050-84 = "[s]「其他的我不知道，但這個肯定是為了滿足自己而做的吧！」"
10031050-88 = "[ns]「而且好像還做了不少……是為了什麼目的嗎？」"
10031050-89 = "目的？#n那還用說嗎……"
10031050-90 = "這是本次「格黑娜特別派對」的宣傳品！"
10031050-95 = "這場派對是我拚盡全力準備的活動。#n也就是說……需要既適合本次活動，同時又能完美展現我威容的物品。"
10031050-96 = "我要透過在派對期間，將這些特製銅像配置在格黑娜的各個角落……"
10031050-97 = "藉此向格黑娜的所有學生，宣揚我羽沼真琴的威嚴，以及萬魔殿的偉大……！#n嘻嘻嘻嘻！！！"
10031050-98 = "SNS上早就已經掀起熱烈的討論了！你看這個！"
10031050-103 = "＜閃亮閃亮嗚嚕嚕☆：啊哈哈～！你們看這個！天啊～！有超多銅像！＞"
10031050-104 = "＜GehEricha0201：怎麼說呢，感覺會嚴重妨礙交通耶。真的沒問題嗎？＞"
10031050-105 = "＜akusi-girl：剛剛看了一下，好像有太妹在搬運的樣子？＞"
10031050-106 = "＜#Nyanko&：真是爛透了＞"
10031050-108 = "[ns5]「這是……熱烈的討論嗎？」\n[ns6]「不過……既然數量這麼多，應該花了很多錢吧？」"
10031050-111 = "嘖嘖嘖。"
10031050-112 = "這是你有所不知，老師。#n費用的問題根本不必擔心，因為……"
10031050-113 = "包含銅像製作，以及在學園各處配置的人力費用在內，全都不是以萬魔殿……#n而是以風紀委員會的名義簽約的！"
10031050-114 = "[s]「呃……嗯？」"
10031050-115 = "並且決定風紀委員會預算的正是我們萬魔殿！"
10031050-116 = "嘻嘻嘻！用風紀委員會的預算進行派對的籌備跟宣傳！趁機打擊他們的財政……！#n風紀委員會的預算被搶走後，一定會愁眉苦臉！"
10031050-117 = "簡直是一石二鳥！兩全其美！一箭雙雕！一舉兩得！"
10031050-118 = "不愧是我真琴大人想出的完美計畫！"
10031050-119 = "咯咯，呵呵呵呵！嘻嘻嘻嘻嘻！！"
10031050-120 = "[s]「真琴，如果這件事被風紀委員會知道……」"
10031050-121 = "我才不管！"
10031050-122 = "照理說風紀委員長應該會妨礙我才對，不過那傢伙早已因為我真琴的策略……"
10031050-123 = "正在努力練習鋼琴……！"
10031050-124 = "趁著這個機會展開的完美作戰！"
10031050-126 = "啊啊！連我自己都不禁佩服自己啊！！"

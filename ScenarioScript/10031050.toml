[translation]
10031050-1 = "Episode 5;The Chairman's Promotional Strategy"
10031050-2 = "I headed over to the Pandemonium Society for the third day of their party preparations."
10031050-3 = "[ns] \"Even the hallways have decorations now.\""
10031050-4 = "Everywhere I walked was starting to take on a flashier, party time atmosphere."
10031050-9 = "Hm?"
10031050-10 = "Whoa! It's Teach! Hi hi!"
10031050-11 = "[s] \"Ah. Erika, Kirara. It's nice to see you two here.\""
10031050-12 = "That's what I wanted to say! Who'd imagine we'd run into Sensei in our own school!"
10031050-13 = "Is this what people mean by a \"coincidence\"?"
10031050-14 = "I think it's more of just a pleasant surprise! "
10031050-15 = "Fufu, that must mean today's gonna be our lucky day!"
10031050-16 = "[s] \"Wh-What do you mean by lucky day?\""
10031050-17 = "Ah, Kirara was just talking about that. She said today's vibes are excellent."
10031050-18 = "Mmm. It's like you're walking down the street...and you just so happen to look down, and spot a four-leaf clover! It's that kind of feeling!"
10031050-19 = "Ahahaha! Right! It's exactly that!"
10031050-20 = "[s] \"I don't get it... But I'm happy to see you both in good spirits.\""
10031050-21 = "Anyway, what brings you here, Sensei? "
10031050-22 = "Still helping prepare for the Pandemonium Society's Gehenna Special Party a few days from now?"
10031050-23 = "Sounds like you're in for a lot of work."
10031050-24 = "Ahahaha! That's amazing! To think even Teach would pitch in!"
10031050-25 = "In that case, do you think \"those things\" were one of Teach's ideas? "
10031050-26 = "There's no way that's true, Kirara..."
10031050-27 = "Who knows?"
10031050-28 = "[s] \"What do you mean by 'those things'?\""
10031050-29 = "Well... As the party preparations went on, they started putting up these sculptures..."
10031050-30 = "But the thing is, they're so weird looking that people bust a gut whenever they see them! They're a huge hit among the Gehenna students right now!"
10031050-31 = "Ahaha! We're trying to find them so we can take some pictures, post them on SNS and get a ton of likes."
10031050-32 = "[s] \"...?\""
10031050-33 = "Right. You can't really understand just by hearing about it."
10031050-34 = "I'll just show you! Take a look!"
10031050-41 = "[ns] \"This is...\""
10031050-42 = "See? Hilarious, right?"
10031050-43 = "Between everyone's good mood, and Sensei helping out, this year's party is going to be a blast."
10031050-44 = "We'll be looking forward to seeing the results of all your party preparations, Teach!"
10031050-46 = "[ns] \"Y-Yeah... Thanks.\""
10031050-48 = "I went to the Pandemonium Society's executive office after parting ways with Kirara and Erika."
10031050-54 = "Kihehe... Welcome, [USERNAME] Sensei."
10031050-55 = "[s] \"Ah, Makoto. How are you? Feeling better?\""
10031050-56 = "Hm?"
10031050-57 = "Oh. You don't have to worry about it."
10031050-58 = "Somehow, my memory of just what I was doing during my preparations yesterday is a bit blurry."
10031050-59 = "Things like that happen from time to time. There's no need to worry."
10031050-60 = "[s] \"That kind of thing happens often?!\""
10031050-61 = "Now Sensei, one should let the past stay in the past."
10031050-62 = "What's important is the future ahead of us. The party that you and I must prepare for."
10031050-63 = "[s3] \"About those party preparations...\"\n[s4] \"I saw something very odd on my way here.\""
10031050-66 = "... Wait there were weird what-nows in the Gehenna academy hallway?"
10031050-67 = "Hm, they were probably placed by a Gehenna student who got overly excited for the party."
10031050-68 = "I'll leave the underlings to take care of them."
10031050-69 = "None of that's important, Sensei."
10031050-70 = "What is important is that I finally finished \"that.\" The fruit of my labors throughout these party preparations."
10031050-71 = "I called you here to the Executive Office today so I could show it to you, Sensei."
10031050-72 = "[s] \"Again with the ominous 'that'. What did you even make?\""
10031050-73 = "Kihehe. Behold!"
10031050-79 = "[ns] \"Makoto...that's the weird statue Kirara showed me on my way here!\""
10031050-80 = "What?! Excuse you!"
10031050-81 = "And what may I ask is so weird about my statue?!"
10031050-82 = "This statue is a custom-made, handcrafted order. It reflects the intellect and bravery of the Great Hanuma Makoto through bold, striking artistry!"
10031050-83 = "No matter how you look at it, it's an amazing statue bursting with pride!"
10031050-84 = "[s] \"I'm not sure about the rest, but I'm glad you're happy with how it turned out!\""
10031050-88 = "[ns] \"You also ordered a lot of them. Any particular reason for that?\""
10031050-89 = "The reason? Isn't it obvious?!"
10031050-90 = "It's for promoting the Gehenna Special Party!"
10031050-95 = "I've put everything into preparing for this party. So clearly we need a symbol of the dignified diligence I've put forth!"
10031050-96 = "Thus, I shall place these specially ordered statues all over Gehenna..."
10031050-97 = "Every student at the party shall see not only my greatness, but the Pandemonium Society's as well! Kekekeke!!!"
10031050-98 = "It's already going viral on SNS! Look at this!"
10031050-103 = "<KiraKira Ururun☆>: Ahahaha! Look at this! OMG! There are so many statues!"
10031050-104 = "<GehEricha0201>: Um. I think some of them are in the middle of traffic. Is that safe?"
10031050-105 = "<akusi-girl>: I think I saw a bunch of thugs moving them around earlier."
10031050-106 = "<#Nyanko&>: They're so lame."
10031050-108 = "[ns5] \"...Viral?\"\n[ns6] \"By the way...just how much did it cost to make that many?\""
10031050-111 = "Tsk tsk tsk."
10031050-112 = "Now, Sensei. There's no need to worry about such a trifling thing as cost..."
10031050-113 = "Because the invoices for having these statues made and placing them throughout Gehenna Academy were all billed to the Prefect Team, not the Pandemonium Society!"
10031050-114 = "[s] \"H-Huh?\""
10031050-115 = "The Pandemonium Society determines the Prefect Team's budget, you see!"
10031050-116 = "Kihehehe! We've used the Prefect Team's budget for all the party preparations! That will crush them financially! I promote the party while the Prefect Team cries in their juice as their budget gets shredded to ribbons!"
10031050-117 = "It's a win-win situation! Two birds with one stone! One hand washing another!"
10031050-118 = "It was a genius plan, accomplishing dozens of tasks with but a single stroke!"
10031050-119 = "Keke. Kekekeke! Kekekekeke!!"
10031050-120 = "[s] \"Makoto... Does the Prefect Team know about this?\""
10031050-121 = "Of course not!"
10031050-122 = "In past years, the head prefect would find some way to block my efforts."
10031050-123 = "Good thing she's got her hands full practicing piano!"
10031050-124 = "I must say, this may be my greatest scheme yet!"
10031050-126 = "Ahhh! I cannot help but marvel at my own brilliance!"

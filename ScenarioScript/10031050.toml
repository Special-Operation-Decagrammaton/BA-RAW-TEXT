10031050-10 = "2;키라라;03;와앗~! 쌤이네~! 안녕안녕~\n#2;em;[음표]\n#2;greeting"
10031050-11 = "[s] \"아, 에리카, 키라라. 안녕. 이런 데서 다 만나네.\""
10031050-12 = "4;에리카;04;그건 오히려 우리가 하고 싶은 말인걸. 느닷없이 우리 학교 복도에서 선생님을 마주치다니…….\n#4;stiff"
10031050-13 = "4;에리카;04;이런 걸 두고 갑작스럽다고 할지…….\n#4;em;[땀]"
10031050-14 = "2;키라라;99;응~ 그야말로 서프라이즈! \n#2;jump"
10031050-15 = "2;키라라;01;후후, 뭔가 오늘 하루는 운이 좋을 것 같네~"
10031050-16 = "[s] \"우, 운이 좋을 것 같다니……? 왜?\""
10031050-17 = "4;에리카;02;아, 키라라 쨩이 말한 거라면 그거야. 느낌적 느낌이라고 할까.\n#4;em;[반응]"
10031050-18 = "4;에리카;99;으음~ 요컨대 말하자면 아무 생각 없이 걷는 길에…… 무심코 내려다본 길바닥에서 우연히 네잎클로버를 발견한 느낌……같은 거려나?"
10031050-19 = "2;키라라;00;아하하핫~! 에리카 쨩의 말이 맞아. 딱 그 느낌!\n#2;hophop\n#2;em;[재잘]"
10031050-20 = "[s] \"잘은 모르겠지만…… 그렇게 생각해 준다면 기쁜 것 같기도…….\""
10031050-21 = "4;에리카;02;그래서 선생님이 여긴 어쩐 일이야? \n#4;em;[?]"
10031050-22 = "4;에리카;04;아…… 만마전의 요청으로 며칠 뒤에 있을 <게헨나 특별 파티>의 준비를 돕기 위해 왔다고……"
10031050-23 = "4;에리카;12;그거참, 듣기만 해도 고생이네."
10031050-24 = "2;키라라;03;아하하핫~! 대박~! 이번 파티, 쌤도 도와주고 있었구나~\n#2;em;[재잘]\n#2;hophop"
10031050-25 = "2;키라라;02;앗, 그럼, <그거>도 쌤의 아이디어야? \n#2;em;[전구]"
10031050-26 = "4;에리카;06;아니, 키라라 쨩. 아무리 그래도 그건 아니겠지……\n#4;stiff"
10031050-27 = "2;키라라;08;그래도 혹시 모르잖아~?\n#2;em;[재잘]"

10031050-30 = "2;키라라;99;그런데 그게 있지~ 엄청 특이하게 생긴 데다가 보기만 해도 빵~ 터지는 물건이라. 게헨나 학생들 사이에서 화제거든~"
10031050-31 = "2;키라라;03;아하핫! 우리도 그걸 찾아서 SNS에 찍어 올리면 좋아요 좀 받을 수 있지 않으려나~ 하고 찾던 참이었는데~\n#2;em;[음표]"

10031050-82 = "3;마코토;99;어디까지나 이번 파티를 위해 특별 주문 제작한…… 이 하누마 마코토 님의 이지적이고 용감한 모습을 과감한 터치와 대담한 조형으로 표현한 동상이거늘……!\n#3;stiff"

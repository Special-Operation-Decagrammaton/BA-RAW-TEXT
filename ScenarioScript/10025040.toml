[translation]
10025040-1 = "第4話;徬徨於黑暗之人"
10025040-8 = "這裡是RABBIT1。#n現在時間2030，已抵[ruby=rendez-vous point]達會面地點。[/ruby]"
10025040-9 = "距離日落還有30分鐘……今晚是新月。#n請所有人同時留意視覺以外的情報。"
10025040-10 = "這裡是RABBIT2。#n這種夜晚，真是非常適合這次的作戰啊。"
10025040-11 = "對方的視野想必會相當受限，#n而我可是有著在夜晚也能看清事物的眼睛。"
10025040-12 = "RABBIT4，狙擊鏡更換完成了嗎？"
10025040-13 = "嗯，嗯……視野比想像中還差，所以換成了夜視瞄準鏡。"
10025040-14 = "紅外線瞄準鏡也有準備……"
10025040-15 = "嗯？怎麼了嗎？"
10025040-16 = "總覺得……臭味好像比白天更重了。"
10025040-17 = "不知該怎麼形容……#n感覺村子到處都瀰漫著一股生物特有的腥味……"
10025040-18 = "……我也有這種感覺。"
10025040-19 = "不只是刺鼻的惡臭，皮膚也出現了如同接觸到微量氣體的刺痛感……"
10025040-20 = "[USERNAME]老師，你還好嗎？"
10025040-26 = "[ns1]「確實有股奇怪的臭味……」\n[ns2]「目前還算正常。」"
10025040-30 = "要是這股臭味是某種前兆該怎麼辦……？"
10025040-31 = "有點緊張……"
10025040-32 = "臭味有什麼好怕的。#n這裡畢竟是漁村，多少會有腥味吧。"
10025040-33 = "至於腥味為什麼變重，不是因為海風的關係嗎？"
10025040-34 = "你還太嫩了啊，咲希。"
10025040-35 = "在海岸地區的晚上，風是由陸地向海吹的哦。"
10025040-36 = "陸地的比熱低於海洋，所以會產生氣壓差。#n自然課不是有上過嗎？"
10025040-37 = "[s]「這裡考試會考。」"
10025040-38 = "少，少囉嗦！這種事我當然會……！"
10025040-39 = "總之……RABBIT1，這次的目標地點是哪裡？"
10025040-41 = "首先要前往海運業者提過的「鬼岩礁」。"
10025040-42 = "白天會引起村民們的注目，所以我們能行動的時段就只有現在了。#n要是被村民發現我們擅自調查神聖的場所，可能會引起無謂的爭端。"
10025040-43 = "此外，今天是海運業者也說過「不能靠近」的大潮之日。#n說不定能獲得某些重要的情報。"
10025040-44 = "請RABBIT2和我一起進行目標地點的探索。#n請RABBIT4在西邊的懸崖上保持全方位的警戒。"
10025040-46 = "了解。"
10025040-47 = "都，都子醬……RABBIT1……絕對，不要切斷無線電哦……！"
10025040-49 = "好的，我知道了。#nRABBIT4也是，如果發生異常狀況請立刻報告。"
10025040-50 = "請RABBIT3[ruby=rendez-vous point]在會面地點待[/ruby]命，並負責後勤支援。"
10025040-51 = "也許會有察覺到我們的動靜而跟過來的村民也說不定。"
10025040-52 = "OK～包在我身上。"
10025040-54 = "那麼，請在日出之前返[ruby=rendez-vous point]回會面地點。[/ruby]大家趕緊出發吧。"
10025040-65 = "……STOP。"
10025040-66 = "RABBIT2，在面對村子1點鐘方向發現2名舉止可疑的人物。#n請報告目視可得的情報。"
10025040-68 = "嗯～其中一人穿著釣魚用的長靴、手裡拿著釣具……#n看起來像是漁夫……"
10025040-69 = "而在他面前，像是在擋著他的人……#n是派駐在這個村子的女武神學生吧。"
10025040-78 = "……看起來好像正在爭論什麼哦？"
10025040-79 = "RABBIT3，請確認對話內容。"
10025040-80 = "我馬上準備指向性麥克風，稍等哦。"
10025040-87 = "……也差不多該停止生產了吧？"
10025040-88 = "瀰漫全村……的那股臭味道讓我頭痛個不停啊！"
10025040-89 = "……我們也不是喜歡才這麼做的。"
10025040-90 = "但是蝦子都……也只好賣這個……"
10025040-91 = "而且……是這個村子傳統的……老人家也喜歡……"
10025040-92 = "……因為是本地人，而我們……"
10025040-93 = "……你們來這裡也超過一年了吧？#n到底打算抱怨到什麼時候？"
10025040-94 = "差不多也該做為村裡的一員……"
10025040-95 = "唔……"
10025040-96 = "所以咧，之前說的……怎麼樣了？"
10025040-97 = "都已經過一個月了，還沒搞定嗎？"
10025040-98 = "昨天也因為……的關係，差點害出去捕魚的漁夫受傷。"
10025040-99 = "不好意思。可是只靠我們……的解決會有困難……"
10025040-100 = "不能再繼續視而不見了。"
10025040-102 = "要是放任不管，村子遲早會被黑暗吞噬的啊……"
10025040-108 = "……也就是說村子裡的異臭是刻意造成的？"
10025040-109 = "村子會被黑暗吞噬又是什麼意思？"
10025040-110 = "真，真的沒問題吧？"
10025040-111 = "不會發生陸地突然下沉……或是被從漆黑的海底出現的謎樣生物襲擊……#n之，之類的事吧……！？"
10025040-112 = "請冷靜下來，美優。#n現實是不會發生那種事的。"
10025040-113 = "可，可是……#n不知道是不是因為一直待在黑漆漆的地方，心裡一直冒出負面的想法……"
10025040-114 = "這次……好像還聽見了奇怪的聲音……"
10025040-115 = "是什麼樣的聲音？"
10025040-117 = "是像在誦經一樣的聲音……"
10025040-118 = "都子……RABBIT1，真的，不會有問題吧？"
10025040-125 = "……請暫時在原地等待，我們馬上就過去。"
10025040-126 = "RABBIT2，RABBIT4的狀態似乎不太穩定，暫時先撤退吧。"
10025040-127 = "嗯，我也同意。"
10025040-128 = "……面對這種異樣的氣氛，會冷靜不下來的心情我也能理解。"
10025040-129 = "村民們無法接受外地人的言行……#n實在讓人很難覺得問題的根源只有蝦子的產量。"
10025040-130 = "老師你怎麼看？"
10025040-131 = "[s3]「村民們的確很奇怪……」\n[s4]「不過還是先去看看美優的狀態吧。」"
10025040-134 = "是。情報的整理就等到集合後再進行吧。"
10025040-135 = "……畢竟夏天的夜晚意外的短暫。"
10025040-143 = "……RABBIT4，你還好嗎？"
10025040-144 = "喂，RABBIT4，我們來接你囉。"
10025040-146 = "啊……啊啊……"
10025040-147 = "怎麼了，遭到襲擊了嗎！？"
10025040-148 = "那，那邊……早上見過的釣客，在海邊……"
10025040-156 = "拜託了……這次也失敗的話真的就完了……"
10025040-157 = "不管是「深處的存在」還是什麼都好，拜託……算我求你了。"
10025040-158 = "三明治～三明治～貝果～湯！"
10025040-159 = "……咒語真的是這樣沒錯嗎？"
10025040-161 = "……他，他他，他在召喚惡魔！"
10025040-163 = "是，是誰，這麼大半夜的……！"
10025040-168 = "那是我們要說的台詞。#n你在這裡做什麼？"
10025040-169 = "啊，那個……就是，因為……"
10025040-171 = "嘖……我可不想被抓住啊！"
10025040-172 = "RABBIT2，不能讓他跑了！"
10025040-173 = "別想逃！！"
10025040-174 = "別，別丟下我……！"
10025040-181 = "[ns]「大家，等等我──」"
10025040-190 = "哈啊，哈啊……那傢伙，到底跑哪去了？"
10025040-191 = "外表明明看起來像隻熊，怎麼跑的跟兔子一樣快……"
10025040-192 = "……話說回來，剛才只顧著追他，結果好像迷路了啊。#n這裡是什麼地方？"
10025040-193 = "唔，這股惡臭是怎麼回──唔哇！？"
10025040-200 = "沒，沒事吧……？"
10025040-205 = "RABBIT2，你沒事吧？"
10025040-212 = "我，我沒事。#n只是踩到什麼滑滑的東西而已……"
10025040-213 = "話說這是什麼……是魚的，內臟嗎……？"
10025040-215 = "噫，噫噫……"
10025040-216 = "……到處都是被丟棄的魚類頭骨呢。"
10025040-217 = "也許是已經不再使用的廚房。"
10025040-219 = "不……有最近還在使用的痕跡。"
10025040-220 = "這些魚乾也都還有水氣。"
10025040-222 = "都……都子醬，咲希醬……這邊……"
10025040-223 = "RABBIT4，不是跟你說過作戰中要用代號嗎……#n所以呢，你發現了什麼？"
10025040-224 = "這裡……裝滿了黑漆漆的腥臭液體……"
10025040-226 = "我看看……"
10025040-231 = "唔哇……這股臭味是怎麼回事！"
10025040-232 = "村子裡瀰漫的惡臭就是這個東西造成的嗎！？"
10025040-233 = "……那些魚乾也散發著相同的臭味呢。"
10025040-234 = "說不定也有故意放在這裡使其腐敗的可能性……"
10025040-235 = "這是什麼情況？#n明明抱怨漁獲量減少，卻還刻意讓魚腐壞……"
10025040-236 = "雖然不想抱持著懷疑的眼光……不過這樣事情就搞清楚了。"
10025040-237 = "這個村子，有進行著某種類似儀式行為的可能性──"
10025040-243 = "七早八早的還以為發生什麼事了……原來是有小偷跑進來了啊。"
10025040-248 = "居然會來這種村子觀光，我一開始就覺得可疑……果真是盯上了村裡的魚啊。#n你們已經無法狡辯了。"
10025040-250 = "什麼？小偷……？"
10025040-251 = "腐壞的魚什麼的，送我們也不要！"
10025040-256 = "居然說是腐壞的魚……？"
10025040-257 = "哈……！真是，簡直不可理喻！"
10025040-259 = "什麼都不懂就大放厥詞……#n跟之前來到這裡的傢伙們根本沒兩樣。"
10025040-260 = "……這座村子究竟發生了什麼？"
10025040-261 = "事到如今，問這個又有何用？"
10025040-262 = "……抱歉，我無法回答這個問題。"
10025040-263 = "老夫的器量可沒有大到足以和侵門踏戶的傢伙好好相處啊。"
10025040-273 = "……讓這些乳臭未乾的小鬼見識見識夜戶浦村的恐怖吧。"
10025040-279 = "不知不覺就被包圍了……！"
10025040-280 = "我們已經習慣與恐怖戰鬥了。"
10025040-282 = "……所有人，開始戰鬥。#n展開戰鬥隊形！"

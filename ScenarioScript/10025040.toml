[translation]
10025040-1 = "Episode 4;Wandering in the Dark"
10025040-8 = "RABBIT 1 reporting. Current time is 20:30. I've arrived at the rendezvous point."
10025040-9 = "T-minus 30 minutes until end of twilight. It's going to be a dark night due to the new moon, so prepare accordingly."
10025040-10 = "RABBIT 2 reporting. This is an ideal night for this mission."
10025040-11 = "Local civilians won't see us, but we should be able to identify friends and foes."
10025040-12 = "RABBIT 4, have you switched to your night vision scope?"
10025040-13 = "A-Affirmative... It's darker than I expected, so I'm using an NL-4 scope."
10025040-14 = "The infrared strobe also seems to be working well, but..."
10025040-15 = "Yes? Is there a problem?"
10025040-16 = "D-Don't you smell that...? The fishy smell... It's gotten worse..."
10025040-17 = "It's hard to describe, but...it's this fishy, musty smell that I've been smelling all over..."
10025040-18 = "...I've noticed it, too."
10025040-19 = "There's a fishy smell, and then my skin gets itchy, like I've been sprayed with something."
10025040-20 = "How are you doing, [USERNAME] Sensei?"
10025040-26 = "[ns1] \"It's just a bad smell.\"\n[ns2] \"I haven't gotten itchy or anything...\""
10025040-30 = "What if the smell is...some kind of omen...?"
10025040-31 = "I don't like this..."
10025040-32 = "This is a fishing village. Of course there will be fishy smells."
10025040-33 = "And if you think the fishy smell's getting worse, well... Maybe the wind is blowing it in from the ocean."
10025040-34 = "Oh, Saki, you idiot."
10025040-35 = "At night, wind blows from the land to the sea."
10025040-36 = "Were you sleeping in science class? The land cools down faster than the sea at night, which creates a pressure difference."
10025040-37 = "[s] \"Be sure to write that down. It will be on the test.\""
10025040-38 = "I don't need you to lecture me! I know that much...!"
10025040-39 = "RABBIT 1! What's our target?"
10025040-41 = "Head out to Devil's Reef."
10025040-42 = "It seems to be something of a holy spot for the townsfolk, so our best chance to investigate it is under the cover of darkness."
10025040-43 = "It's a new moon, so the tide will be at its lowest... If the CEO of Red Hook Express is right, then this is our best chance to see if the villagers are hiding something."
10025040-44 = "RABBIT 2, take point and investigate the area on foot. RABBIT 4, provide overwatch support from the cliff on the west side."
10025040-46 = "Understood."
10025040-47 = "M-Miyako—I mean, RABBIT 1... Please don't turn your radio off no m-matter what...!"
10025040-49 = "Affirmative. RABBIT 4, report any suspicious activity without delay."
10025040-50 = "RABBIT 3, station yourself at the rendezvous point and watch our rear."
10025040-51 = "If any villagers notice we're not at camp, I don't want them following us."
10025040-52 = "Leave it to me. I'll watch with both eyes."
10025040-54 = "Let's move. We'll meet up at the rendezvous point before sunrise."
10025040-65 = "...Wait."
10025040-66 = "RABBIT 2, there are two individuals at three o'clock. Can you ID?"
10025040-68 = "I see them. One is wearing fishing boots and carrying a pole. He must be one of the fishermen."
10025040-69 = "He's speaking with a Valkyrie Coast Guard. I think she's blocking his way."
10025040-78 = "I can just barely hear them... It sounds like they're arguing."
10025040-79 = "RABBIT 3, can we get audio?"
10025040-80 = "On it. Just got to set up my directional mic..."
10025040-87 = "...stop making it already?"
10025040-88 = "The smell...spread through the whole town...head is killing me!"
10025040-89 = "...making it because we like it?"
10025040-90 = "...shrimp's not selling...got to make a living somehow."
10025040-91 = "Besides...this town's traditions and folklore...the elders understand."
10025040-92 = "Maybe that's true for folks who're born and raised here, but for us, it's—"
10025040-93 = "C'mon, you've been here for over a year now. Get used to it."
10025040-94 = "You're practically one of us. Stop fighting it."
10025040-95 = "Ugh..."
10025040-96 = "Anyhow, what happened to...I asked for?"
10025040-97 = "It's been a month, and we're still waiting."
10025040-98 = "Just yesterday...seriously hurt. He's lucky to still be alive..."
10025040-99 = "Look, I'm sorry, but there's nothing I can do..."
10025040-100 = "We can't just leave it like that!"
10025040-102 = "You're threatening to cast the whole village into darkness..."
10025040-108 = "So the fishy smell is caused by something they're doing...on purpose?"
10025040-109 = "And what does he mean, \"cast the whole village into darkness?\""
10025040-110 = "A-Are we going to be okay...?"
10025040-111 = "I-Is the land going to sink into the ocean? Are the w-waves going to rise up and consume us...?"
10025040-112 = "Take deep breaths, Miyu. Nothing like that will happen."
10025040-113 = "B-But...I c-can't help it... These thoughts keep filling my h-head..."
10025040-114 = "And n-now...I'm hearing something..."
10025040-115 = "What are you hearing?"
10025040-117 = "It's like someone's reading scripture...or chanting..."
10025040-118 = "Miyako! I mean, RABBIT 1! Are w-we...going to be okay...?"
10025040-125 = "Hold your position. We'll be right there."
10025040-126 = "RABBIT 2, we're pulling out and regrouping at RABBIT 4's position."
10025040-127 = "Affirmative. No objections."
10025040-128 = "I have to admit, I'm feeling a little nervous, too..."
10025040-129 = "The eerie atmosphere in town, the creepy things the villagers say and do... There's more to this than just shrimp."
10025040-130 = "What do you think, Sensei?"
10025040-131 = "[s3] \"It's true, the villagers are acting a little strange...\"\n[s4] \"Our first priority is checking on Miyu.\""
10025040-134 = "Right. We can go over the evidence later."
10025040-135 = "Summer nights aren't as long..."
10025040-143 = "RABBIT 4, are you okay?"
10025040-144 = "Hey, RABBIT 4. We're here to pick you up."
10025040-146 = "Ohh... Ohhh..."
10025040-147 = "What happened? Were you ambushed?"
10025040-148 = "O-Over there...by the shore..."
10025040-156 = "Please... If I fail here, it's all over for me..."
10025040-157 = "Whoever's out there... Deep Ones or no... If you really exist, please, come out..."
10025040-158 = "Sandwich! Sandwich! Bagels and lox!"
10025040-159 = "Are those really the words to the spell...?"
10025040-161 = "H-H-He's summoning a demon!"
10025040-163 = "Huh? Wh-Who's there?!"
10025040-168 = "That's what I want to know! What are YOU doing here?"
10025040-169 = "W-Well..."
10025040-171 = "I'm outta here!"
10025040-172 = "RABBIT 2, on him!"
10025040-173 = "He won't get away!"
10025040-174 = "P-Please don't leave me behind...!"
10025040-181 = "[ns] \"Everyone, wait—\""
10025040-190 = "*pant* *pant* Where...did he go...?"
10025040-191 = "He's big as a bear, but as fast as a rabbit..."
10025040-192 = "I was so busy chasing him, I don't know where we are... Do you...?"
10025040-193 = "And the smell has gotten worse... Whoa!"
10025040-200 = "A-Are you all right...?"
10025040-205 = "RABBIT 2, are you okay?"
10025040-212 = "I'm okay. I just slipped on something...wet."
10025040-213 = "But what is this? Fish guts...?"
10025040-215 = "E-Eek!"
10025040-216 = "Here. There are fish bones, too. Stripped clean."
10025040-217 = "It looks like someone abandoned a drying rack out here."
10025040-219 = "Not abandoned. Someone's been here recently."
10025040-220 = "And the fish on the rack aren't dry..."
10025040-222 = "M-Miyako... Saki... Here..."
10025040-223 = "RABBIT 4, we're on a mission. Use our call signs. But what's the issue?"
10025040-224 = "This pot... There's something dark and thick and fishy..."
10025040-226 = "Let me see."
10025040-231 = "Yuck...!"
10025040-232 = "Is this where the bad smell was coming from?"
10025040-233 = "The fish on the drying rack are all rotting."
10025040-234 = "It looks like someone left them here to spoil on purpose."
10025040-235 = "That makes no sense! One minute they're complaining they aren't catching enough, the next they're leaving it to rot?"
10025040-236 = "...I didn't want to say this, but the evidence is pointing in one direction."
10025040-237 = "Someone from the village may have been holding some kind of ritual—"
10025040-243 = "...I was wondering who was making all this noise in the middle of the night."
10025040-248 = "I knew no tourists in their right mind would come to a boring town like this. But you were lowly fish thieves, after all..."
10025040-250 = "Fish...thieves...?"
10025040-251 = "Sir, you could not pay me to take these rotten fish off your hands."
10025040-256 = "Oh, rotten fish, is it?!"
10025040-257 = "Hmph! There ain't a thought in your head, is there?"
10025040-259 = "You don't know nothing about us. You run your mouth about things you don't understand. Just like all the other outsiders!"
10025040-260 = "What is happening in this town?"
10025040-261 = "Oh, now you're demanding answers, eh?"
10025040-262 = "I don't have to tell you nothing."
10025040-263 = "See, we don't much appreciate rude city-slickers stomping around and disturbing the peace."
10025040-273 = "Let me show you what we do to outsiders like you!"
10025040-279 = "We're surrounded!"
10025040-280 = "But we've faced off worse odds than this before..."
10025040-282 = "Everyone, combat formation!"

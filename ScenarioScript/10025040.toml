[translation]
10025040-1 = "ตอนที่ 4;นักพเนจรในความมืดมิด"
10025040-8 = "นี่คือ RABBIT 1 ขณะนี้เวลา 20:30 น. มาถึงจุดนัดพบแล้วค่ะ"
10025040-9 = "EENT อยู่ห่างออกไปประมาณ 30 นาที เนื่องจากเป็นคืนจันทร์ข้างแรมที่แสงจันทร์ไม่สว่างนัก ขอให้สมาชิกทุกคนระมัดระวังเรื่องทัศนวิสัยเป็นพิเศษด้วยนะคะ"
10025040-10 = "นี่คือ RABBIT 2 คืนนี้ถือเป็นคืนที่เหมาะจะออกปฏิบัติการจริงๆ"
10025040-11 = "ฝ่ายตรงข้ามอาจไม่สังเกตเห็นพวกเรา แต่ว่าพวกเราระบุตัวฝ่ายเดียวกันได้แม้แต่ในความมืดนี่นะ"
10025040-12 = "RABBIT 4 เปลี่ยนกล้องสโคปเสร็จแล้วใช่มั้ย?"
10025040-13 = "อะ...อื้อ ระดับการมองเห็นต่ำกว่าที่คิด เลยเปลี่ยนเป็นกล้องสโคประดับ NL4 แล้วละ"
10025040-14 = "ดูเหมือนว่าไฟกระพริบอินฟราเรดจะยังใช้ได้อยู่..."
10025040-15 = "ทำไมเหรอ? มีปัญหาอย่างอื่นอีกเหรอ?"
10025040-16 = "คือว่า... ดูเหมือนกลิ่นคาวมันแรงขึ้นกว่าตอนกลางวันรึเปล่า?"
10025040-17 = "ฉันอธิบายไม่ถูกแต่ว่า... ดูเหมือนจะมีกลิ่นคาวอะไรบางอย่างโชยไปทั่วหมู่บ้านเลย"
10025040-18 = "...อันที่จริง ฉันก็รู้สึกแบบนั้นมาสักพักแล้วค่ะ"
10025040-19 = "กลิ่นเหม็นคาวพวกนี้นอกจากจะทำให้แสบจมูกแล้ว ยังทำให้แสบผิวเหมือนเวลาสัมผัสแก๊สอะไรบาง#nอย่างด้วยค่ะ"
10025040-20 = "คุณครู [USERNAME] ไม่เป็นไรใช่มั้ยคะ?"
10025040-26 = "[ns1] \"เหมือนได้กลิ่นเหม็นๆ อะไรสักอย่าง...\"\n[ns2] \"สบายมาก ไม่มีปัญหา...\""
10025040-30 = "ถ้ากลิ่นเหม็นคาวพวกนี้เป็นสัญญาณที่ไม่ดีล่ะ?"
10025040-31 = "บอกตามตรง ฉันรู้สึกสั่นๆ นิดหน่อยแล้ว..."
10025040-32 = "กลิ่นเหม็นคาวแค่นี้จะกลัวไปทำไมกัน หมู่บ้านชาวประมงก็ต้องมีกลิ่นคาวอยู่แล้วสิ"
10025040-33 = "ที่จู่ๆ กลิ่นคาวก็แรงขึ้นแบบนี้... เพราะลมพัดเข้ามาจากทะเลไม่ใช่รึไง?"
10025040-34 = "เธอนี่ไม่ฉลาดเลยนะ ซากิ"
10025040-35 = "ปกติที่ชายฝั่งทะเล ลมบกจะพัดจากพื้นดินออกทะเลในเวลากลางคืนนะ"
10025040-36 = "ตอนคาบวิทยาศาสตร์ไม่ตั้งใจเรียนหรือไง เลยไม่รู้ว่าพื้นดินมีความร้อนจำเพาะต่ำกว่าทะเล ทำให้เกิดความแตกต่างของความกดอากาศน่ะ?"
10025040-37 = "[s] \"เรื่องนี้สับสนกันง่ายมาก ต้องจำไว้ให้ดีๆ นะ\""
10025040-38 = "นะ...หนวกหูน่า! เรื่องนั้นฉันก็รู้เหมือนกันแหละน่า...?!"
10025040-39 = "...ยังไงก็เถอะ RABBIT 1 เป้าหมายของปฏิบัติการนี้คือที่ไหนน่ะ?"
10025040-41 = "ก่อนอื่น พวกเราจะมุ่งหน้าไปที่ <แนวปะการังยักษ์> ที่ประธานคนนั้นพูดถึงกันค่ะ"
10025040-42 = "ในช่วงกลางวัน มีชาวบ้านหลายคนที่คอยจับตาดูพวกเรา ถ้ามาสำรวจปะการังศักดิ์สิทธิ์ตามอำเภอใจ#nละก็ อาจทำให้พวกเขาไม่พอใจได้ค่ะ เพราะงั้นการออกปฏิบัติการในตอนกลางคืนจะเหมาะสมกว่าค่ะ"
10025040-43 = "อีกอย่าง วันนี้ก็ยังเป็นคืนข้างแรมตามที่คุณคนนั้นบอกด้วย... ไม่แน่ว่าเราอาจจะได้ข้อมูลที่คาดไม่ถึง#nที่พวกชาวบ้านพยายามปกปิดไว้ก็ได้นะคะ"
10025040-44 = "RABBIT 2 กับฉันจะออกสำรวจสถานที่เป้าหมายด้วยกัน ส่วน RABBIT 4 ช่วยเฝ้าระวังที่บริเวณหน้าผา#nทางชายฝั่งตะวันตกด้วยนะคะ"
10025040-46 = "เข้าใจแล้ว"
10025040-47 = "มะ...มิยาโกะจัง ไม่สิ RABBIT 1 ระ...ระหว่างปฏิบัติการห้ามปิดวิทยุสื่อสารเด็ดขาดเลยนะ...!"
10025040-49 = "เข้าใจแล้วค่ะ RABBIT 4 เองก็เหมือนกัน ถ้าเกิดอะไรขึ้นก็รบกวนรายงานทันทีเลยนะคะ"
10025040-50 = "ส่วน RABBIT 3 ช่วยอยู่รอที่จุดนัดพบ และคอยสนับสนุนจากแนวหลังด้วยนะคะ"
10025040-51 = "อาจมีชาวบ้านที่สังเกตเห็นว่าพวกเราหายไป และแอบตามพวกเรามาก็ได้ค่ะ"
10025040-52 = "ให้เป็นหน้าที่ฉันเอง เดี๋ยวจะเฝ้าระวังให้อย่างดีเลย"
10025040-54 = "ถ้างั้นก็รีบไปกันเถอะค่ะ จะได้กลับมาที่จุดนัดพบก่อนเวลา BMNT ค่ะ"
10025040-65 = "...รอเดี๋ยว"
10025040-66 = "RABBIT 2 ตรง 45 องศาจากทิศทางหมู่บ้าน พบเงาคน 2 คนค่ะ ระบุตัวได้รึเปล่าคะ?"
10025040-68 = "อืม... คนหนึ่งใส่รองเท้าสำหรับตกปลา และถืออุปกรณ์ตกปลามาด้วย..."
10025040-69 = "ส่วนอีกคนที่ยืนขวางหน้าและคุยกับคนคนนั้นอยู่คือนักเรียนตำรวจน้ำ วัลคิรี่"
10025040-78 = "ดูเหมือนจะส่งเสียงโวยวายออกมาเป็นระยะ... ทะเลาะกันอยู่รึไงนะ?"
10025040-79 = "RABBIT 4 ช่วยตรวจสอบบทสนทนาของพวกเขาให้หน่อยค่ะ"
10025040-80 = "ฉันจะเปิดใช้ไมค์รับเสียงแบบกำหนดทิศทางให้ รอแป๊บหนึ่งนะ"
10025040-87 = "เรา... พวกเราหยุดกันแค่นี้ไม่ดีกว่าเหรอคะ?"
10025040-88 = "กลิ่นเหม็นคาว...ที่กระจายไปทั่วหมู่บ้านนั่น ตอนนี้ปวดหัวจนหัวจะระเบิดแล้วค่ะ!"
10025040-89 = "...คิดว่าพวกเราทำแบบนี้เพราะชอบทำรึไง?"
10025040-90 = "พวกเราขายกุ้งไม่ได้เลย เพราะงั้นอย่างน้อยก็ควรขายไอ้นี่สิ"
10025040-91 = "อีกอย่าง... มันก็เป็นประเพณีเก่าแก่ของหมู่บ้านและพวกคนเฒ่าคนแก่ในหมู่บ้านก็ไม่ได้เกลียดด้วย"
10025040-92 = "เรื่องนั้นเป็นเรื่องที่พวกคุณที่เกิดและเติบโตในหมู่บ้านนี้ทนได้ แต่ว่าฉันน่ะ..."
10025040-93 = "พวกเธอเองก็มาที่หมู่บ้านนี้ได้ 1 ปีแล้ว เมื่อไรจะชินกันสักที?"
10025040-94 = "ตอนนี้ในฐานะสมาชิกคนหนึ่งของหมู่บ้าน พวกเธอก็ควรจะชินกันได้แล้ว เลิกงอแงเถอะน่า"
10025040-95 = "ฮือ..."
10025040-96 = "ว่าแต่ว่า ... ที่พูดถึงเมื่อกี้น่ะ เป็นยังไงบ้าง?"
10025040-97 = "นี่มันก็ผ่านมาหนึ่งเดือนแล้วนะ ไม่มีอะไรคืบหน้าเลยหรือยังไง?"
10025040-98 = "เมื่อวานนี้ มันเป็นเพราะ... เลยทำให้ชาวประมงคนหนึ่งที่ออกไปหาปลาตอนเช้าเกือบได้รับบาดเจ็บ#nสาหัสเลยนะรู้มั้ย"
10025040-99 = "ขอโทษด้วยค่ะ แต่ว่าแค่ลำพังพวกเราคงทำอะไรไม่ได้มาก..."
10025040-100 = "แต่ว่าก็คงจะปล่อยเรื่องนี้เอาไว้เฉยๆ ไม่ได้"
10025040-102 = "ถ้าเป็นแบบนี้ต่อไปละก็ ทั้งหมู่บ้านอาจจะต้องตกอยู่ในความมืดมิดก็ได้..."
10025040-108 = "กลิ่นเหม็นคาวที่คลุ้งไปทั่วหมู่บ้านนั่น... มีคนจงใจทำงั้นเหรอ?"
10025040-109 = "แล้วที่บอกว่าหมู่บ้านอาจตกอยู่ในความมืดก็ได้นั่น... หมายความว่ายังไงกันแน่น่ะ?"
10025040-110 = "มะ...ไม่เป็นไรจริงๆ ใช่มั้ย?"
10025040-111 = "คะ...คงไม่เกิดเรื่องแบบว่าจู่ๆ แผ่นดินก็ยุบลงไป แล้วก็มีหลุมลึกดำมืดใต้ทะเลโผล่ออกมาหรอก... ชะ...ใช่รึเปล่า...?!"
10025040-112 = "ใจเย็นๆ ก่อนนะคะมิยุ เรื่องแบบนั้นไม่เกิดขึ้นอย่างกะทันหันหรอกค่ะ"
10025040-113 = "สงสัยเพราะทัศนวิสัยของฉันอยู่ในระดับต่ำเกินไป... ความคิดแง่ลบเลยผุดขึ้นมาเรื่อยๆ..."
10025040-114 = "อาจเป็นเพราะความรู้สึกของฉันด้วยละมั้ง... ตอนนี้รู้สึกเหมือนได้ยินเสียงแปลกๆ บางอย่างด้วย..."
10025040-115 = "เสียงแบบไหนเหรอคะ?"
10025040-117 = "เหมือนเป็นเสียงท่องพระคัมภีร์... แต่ฟังอีกทีก็เหมือนเป็นเสียงร้องเพลงเลย..."
10025040-118 = "มิยาโกะ ไม่สิ... RABBIT 1 ... แบบนี้มันจะไม่เป็นไรแน่ใช่มั้ย...?"
10025040-125 = "รออยู่ตรงนั้นก่อนนะคะ พวกฉันจะรีบไปที่นั่นทันทีค่ะ"
10025040-126 = "RABBIT 2 ดูเหมือนว่าสถานการณ์ของ RABBIT 4 ไม่ค่อยดีเท่าไร พวกเรากลับไปรวมตัวแล้วแบ่งทีมกัน#nใหม่น่าจะดีกว่าค่ะ"
10025040-127 = "ได้ เอาตามนั้น"
10025040-128 = "...แต่ว่าพอสถานการณ์เป็นแบบนี้ ฉันเองก็เริ่มประหม่าแล้วเหมือนกันนะ"
10025040-129 = "ทั้งบรรยากาศของหมู่บ้าน คำพูดและการกระทำของพวกชาวบ้านก็เหมือนกัน... ทุกอย่างดูน่าสงสัย#nเกินกว่าจะบอกว่าเป็นปัญหาที่เกี่ยวข้องกับการจับกุ้งเพียงอย่างเดียว..."
10025040-130 = "คุณครูคิดว่ายังไงบ้างน่ะ?"
10025040-131 = "[s3] \"การกระทำของคนในหมู่บ้านก็แปลกจริงๆ แหละ\"\n[s4] \"ก่อนอื่น เรารีบไปดูมิยุกันก่อนเถอะ\""
10025040-134 = "ค่ะ พักเรื่องนั้นเอาไว้ก่อน ตอนนี้มาโฟกัสเรื่องการหาข้อมูลกันเถอะค่ะ"
10025040-135 = "...กลางคืนในฤดูร้อนมันไม่ได้ยาวนานเลยค่ะ"
10025040-143 = "...RABBIT 4 เป็นอะไรรึเปล่าคะ?"
10025040-144 = "นี่ RABBIT 4 พวกเรามาแล้ว"
10025040-146 = "อ่า... อา...."
10025040-147 = "เป็นอะไรน่ะ ถูกจู่โจมระหว่างที่พวกเรากำลังมางั้นเหรอ?"
10025040-148 = "นะ...นั่น... ที่ชายหาดตรงนั้น..."
10025040-156 = "ให้ตายเถอะ... ถ้าครั้งนี้ยังล้มเหลวอีกก็จบเห่กันจริงๆ แล้วนะ..."
10025040-157 = "จะเป็น <ตัวตนแห่งห้วงลึก> หรืออะไรก็ได้ทั้งนั้น ถ้ามีอยู่จริงละก็ ช่วยปรากฏตัวออกมาที..."
10025040-158 = "แซนด์วิช— แซนด์วิช—  เบเกิลอบร้อน—"
10025040-159 = "...คาถานี้มันใช่จริงๆ เหรอเนี่ย?"
10025040-161 = "...เขากำลังอัญเชิญปีศาจละ!"
10025040-163 = "นะ...นั่นใครน่ะ? กลางดึกกลางดื่นแบบนี้..."
10025040-168 = "พวกเราต่างหากที่ต้องเป็นฝ่ายถาม นายนั่นแหละมาทำอะไรที่นี่?"
10025040-169 = "ระ...เรื่องนั้นคือว่า..."
10025040-171 = "ฮึ่ย รีบหนีก่อนที่เรื่องมันจะวุ่นวายขึ้นดีกว่า"
10025040-172 = "RABBIT 2 ห้ามปล่อยให้หนีไปได้เด็ดขาดเลยนะคะ!"
10025040-173 = "ใครจะยอมให้หนีไปได้กันเล่า!"
10025040-174 = "ระ...รอฉันด้วย...!"
10025040-181 = "[ns] \"เดี๋ยวก่อนทุกคน รอเดี๋ยว—\""
10025040-190 = "แฮ่ก แฮ่ก... เจ้านั่น... หายไปไหนแล้ว?"
10025040-191 = "ตัวโตอย่างกะหมี แต่วิ่งเร็วอย่างกับกระต่ายเลยแฮะ..."
10025040-192 = "ยิ่งกว่านั้น พอวิ่งไล่ตามเจ้านั่นมาเป็นบ้าเป็นหลังแบบนี้... ดูเหมือนจะหลงทางซะแล้วละ ที่นี่คือที่ไหนกันเนี่ย?"
10025040-193 = "อีกอย่าง... ได้กลิ่นคาวแรงขึ้นกว่าเมื่อกี้จนรู้สึกสะอิดสะเอียดแล้ว... ว้ากกกก?!"
10025040-200 = "ปะ...เป็นอะไรรึเปล่า...?"
10025040-205 = "RABBIT 2 เป็นอะไรรึเปล่าคะ?"
10025040-212 = "มะ...ไม่เป็นไร ฉันแค่เหยียบอะไรบางอย่างที่มันลื่นๆ เข้าเลยลื่นล้มน่ะ"
10025040-213 = "ว่าแต่ว่านี่มันอะไรน่ะ...? ไส้ปลา...?"
10025040-215 = "ฮะ...ฮึก..."
10025040-216 = "...มีพวกหัวปลาและเศษปลาที่ถูกหั่นทิ้งกระจัดกระจายอยู่เต็มไปหมดเลยค่ะ"
10025040-217 = "ที่นี่เป็นลานตากปลาร้างๆ ที่ไม่ได้ใช่แล้วรึเปล่าคะ?"
10025040-219 = "จะบอกว่าร้างก็คงไม่ได้หรอกนะ มันมีร่องรอยอยู่ แสดงว่าเมื่อไม่นานมานี้มีคนมาที่นี่ด้วย"
10025040-220 = "อีกอย่าง ปลาที่ตากไว้บนตะแกรงตากปลานั่นยังไม่แห้งดีเลยด้วยซ้ำ..."
10025040-222 = "มะ...มิยาโกะจัง... ซากิจัง... ทางนี้..."
10025040-223 = "RABBIT 4 บอกแล้วไงว่าระหว่างปฏิบัติการให้เรียกด้วยโค้ดเนมน่ะ มีอะไรล่ะ?"
10025040-224 = "โถอันนี้... มันมีน้ำสีดำขุ่นๆ ที่มีกลิ่นคาวอยู่เยอะเลย..."
10025040-226 = "ไหน ขอดูหน่อยซิ..."
10025040-231 = "อึก... กลิ่นคาวสุดๆ...!"
10025040-232 = "กลิ่นคาวที่เหม็นตลบอบอวลไปทั้งหมู่บ้านมาจากที่นี่งั้นเหรอ?"
10025040-233 = "...ดูเหมือนปลาที่ตากไว้บนตะแกรงทั้งหมดจะเน่าแล้วด้วยค่ะ"
10025040-234 = "ดูเหมือนว่าจะตั้งใจเอาปลาสดมาทิ้งไว้ที่นี่ เพื่อให้มันเน่าเสียเลยนะคะ"
10025040-235 = "ไม่เห็นเข้าใจเลย เห็นเอาแต่บ่นว่าจับปลาได้น้อยลง แต่กลับเอาปลามาทิ้งไว้ให้เน่าเสียแบบนี้เนี่ยนะ..."
10025040-236 = "...ฉันไม่อยากพูดแบบนี้เลย แต่ว่าในเมื่อเป็นแบบนี้แล้ว ก็ไม่มีข้อสงสัยอะไรแล้วค่ะ"
10025040-237 = "บางทีชาวบ้านในหมู่บ้านนี้อาจจะทำพิธีกรรมทางศาสนาแปลกๆ ที่นี่จริงๆ ก็ได้—"
10025040-243 = "...คิดว่าเกิดเรื่องอะไรน่าหนวกหูที่ลานตากปลาแต่เช้ามืด ที่แท้ก็พวกลูกแมวขโมยแอบเข้ามานี่เอง"
10025040-248 = "รู้สึกแปลกๆ ตั้งแต่แรกแล้วว่าจะมาท่องเที่ยวอะไรในหมู่บ้านธรรมดาๆ แบบนี้... อย่างที่คิดไว้เลย เป้าหมายของพวกเธอก็คือปลาสินะ"
10025040-250 = "ว่าไงนะ? ขโมยเหรอ...?"
10025040-251 = "ปลาเน่าๆ พวกนี้เนี่ยนะ ใครให้ฟรีๆ ก็ไม่เอาหรอก!"
10025040-256 = "ปลาเน่า...? ปลาเน่างั้นเหรอ...?!"
10025040-257 = "ฮ่าฮ่า เด็กพวกนี้พูดอะไรไร้สาระจริงๆ!"
10025040-259 = "ทั้งที่ไม่รู้อะไรแท้ๆ แต่กลับทึกทักพูดกันเองตามใจชอบ พวกเธอก็ไม่ต่างจากพวกคนนอกคนอื่นๆ ที่เคยมาที่นี่กันหรอก...!"
10025040-260 = "...เกิดเรื่องอะไรขึ้นที่หมู่บ้านนี้งั้นเหรอคะ?"
10025040-261 = "เพิ่งคิดจะมาถามเอาป่านนี้งั้นเหรอ"
10025040-262 = "...ขอโทษนะ แต่ฉันคงตอบคำถามนั้นไม่ได้หรอก"
10025040-263 = "ฉันไม่ได้ใจกว้างพอที่จะพูดคุยกับพวกคนป่าเถื่อนที่บุกรุกเข้ามาบ้านคนอื่นทั้งที่เท้าเปื้อนโคลนแบบนี้#nหรอกนะ"
10025040-273 = "...มาแสดงความน่ากลัวของหมู่บ้านยาโตอูระให้เจ้าเด็กอมมือพวกนี้เห็นกันเถอะ"
10025040-279 = "ถะ...ถูกล้อมไว้ตั้งแต่ตอนไหนน่ะ...!"
10025040-280 = "การเผชิญหน้ากับความน่ากลัวเป็นเรื่องที่พวกเราคุ้นเคยเป็นอย่างดีค่ะ"
10025040-282 = "...ทุกคน เตรียมเข้าปะทะ เริ่มต่อสู้ในรูปแบบกระจายตัวได้ค่ะ!"

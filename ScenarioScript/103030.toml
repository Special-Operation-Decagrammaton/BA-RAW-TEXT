[translation]
103030-1 = "第3話;方法"
103030-2 = "居然在75,000m的高空……難度真高呢。"
103030-3 = "不如說，是怎麼存在於那裡的呢……"
103030-4 = "而且憑我們目前的能力，想對那個高度發動攻擊是不可能的。"
103030-8 = "部長，你有什麼好辦法嗎？"
103030-9 = "該說那已經在我的管轄範圍外了嗎……#n我們是駭客而並非工程師。"
103030-10 = "即使想解析其構造，也因為被神祕的膜給覆蓋而無法確認內部的狀況。"
103030-14 = "對了……這種時候，我們就試著使用大姐頭留下的遺產吧。"
103030-16 = "會長的……遺產？"
103030-17 = "沒錯。那個人為了防範世界終焉而準備的「對策」之中……#n也包含應對來自空中威脅的方法。"
103030-18 = "千醬，我想使用在埃里都找到的武器，能請你進行駭入嗎？我來負責準備。"
103030-19 = "……是那個導彈對吧？雖然我不是很喜歡……"
103030-20 = "知道了。#n那個說不定能辦到呢。"
103030-21 = "我會轉告其他部員的。"
103030-23 = "還有，工程師部的協助也是必要的。"
103030-25 = "了解。我們也會做好準備的。"
103030-26 = "謝謝你們。#n暫且先把能用的手段都試試看吧。"
103030-28 = "唔……擊中吧……！！"
103030-31 = "距離2,000m……"
103030-34 = "1,000m……500m…… "
103030-38 = "抵達指定座標！#n怎麼樣？命中了嗎！？"
103030-40 = "工程師部部室"
103030-42 = "……不，穿過去了。"
103030-43 = "啊啊，又來了！？"
103030-44 = "與目標的距離1,000m……1,500m……"
103030-45 = "越來越遠了。"
103030-46 = "唉……這是最後的方法了……#n簡直像鬼打牆一樣呢。"
103030-48 = "……"
103030-49 = "會長留下的手段也行不通嗎？"
103030-50 = "沒錯……看來似乎無法對它進行物理干涉呢。"
103030-51 = "那個巡航導彈的性能明明已經超越千年的技術能力……#n居然連它也不行……"
103030-52 = "話說，會長是在哪裡拿到那種東西的啊。"
103030-54 = "唉……再這樣下去也沒有意義。"
103030-55 = "既然它不會受到物理層面的影響，我們工程師部也無能為力。"
103030-56 = "……我們也一樣。那已經是從埃里都找到的最後一張王牌了……"
103030-57 = "陽葵，還有其他辦法嗎？"
103030-59 = "不……目前沒有。"
103030-60 = "唉……"
103030-61 = "……真的是，到最後都很有大姐頭的作風呢。"
103030-62 = "雖然他至今為止幾乎沒派上什麼用場，沒想到就連遺產也一樣。"
103030-63 = "那個……可以不要把會長當成已經死掉的人嗎！？"
103030-64 = "他也只做了這些呀。#n而且實際上，明明我們已經陷入這種情況，他也依然不願意現身。"
103030-65 = "嘛……會長確實做錯了很多事……"
103030-66 = "無論如何，必須得思考下一步才行。"
103030-68 = "還有沒有……其他辦法呢。"
103030-69 = "唉……"
103030-70 = "這下走投無路了呢。"
103030-77 = "我確認了千年分析的聖所資料──"
103030-82 = "那個構造體引起的現象為何──我或許知道了。"
103030-87 = "呼呣……能請你詳細說明嗎？"
103030-100 = "修女會的祭司、古書館的管理員──以及茶會……#n結合各自所擁有的情報加以解釋後，推測出了一種假說。"
103030-101 = "但是，這終究只是假說，並沒有經過實際的驗證。#n即便如此也沒關係嗎？"
103030-102 = "無妨。#n畢竟只要我們無法做出物理層面的干涉，便無法加以驗證。"
103030-103 = "從結論來說，再次出現的聖所、以及奇普托斯上空的構造體………"
103030-107 = "……似乎都維持著一種「共存狀態」。"
103030-112 = "原來如此……"
103030-113 = "咦？#n是在說量子力學嗎……？"
103030-115 = "不，只是為了更容易理解那個現象，所舉的最接近的理論而已。"
103030-116 = "請先把它放在心裡，接著聽我說。"
103030-117 = "那是多世界詮釋──不，說是「[ruby= ・     ・     ・ ]多次元[/ruby]詮釋」或許更正確吧。#n它很可能是以此理論為基礎的、機率性的存在。"
103030-118 = "所謂的多次元詮釋是──"
103030-119 = "那個……多世界詮釋就是「可能性有多少，宇宙的分歧就有多少」的假說對吧……？"
103030-120 = "啊，不過如果是多次元詮釋的話會不會有所不同呢……"
103030-121 = "──也就是說，投擲硬幣時擲出正面的機率為50%，#n並且這個世界只會出現其中一種結果。"
103030-122 = "然而儘管我們無法觀測，擲出反面的世界也有存在的可能性。#n將這些「可能性的世界」解釋為全都存在的理論……"
103030-124 = "啊哈哈！類似SF作品裡常見的平行世界是嗎？"
103030-125 = "每次投擲硬幣的時候世界就會產生分歧的意思？（嘎滋）"
103030-126 = "那個理論本身姑且還是基於科學的。"
103030-128 = "而那個空間──#n在沒有讓所有可能性彼此分歧的情況下，將其混合在了一起。"
103030-129 = "……無限多次元中的存在與非存在混雜而成的渾沌空間。"
103030-130 = "因此，存在已被確定的世界無法進行物理層面的介入。"
103030-131 = "能夠觀測卻無法干涉……"
103030-132 = "沒有什麼辦法嗎……"
103030-135 = "也許──只有周圍的那層膜處於那種狀態。我是這麼推測的。"
103030-136 = "如果內部的構造體本身的狀態不穩定，就無法將能量傳送到各個聖所才對。"
103030-137 = "……也就是說那是防護罩。"
103030-138 = "將名為「共存狀態」的無敵多次元如防護罩般展開，從所有的物理法則中獲得保護。"
103030-140 = "原來如此……這樣就說得通了。"
103030-141 = "是的。接下來，只要能破壞那個防護罩……"
103030-142 = "說不定，就能對其本體展開攻擊了。"
103030-144 = "道理是明白了，不過究竟該怎麼做……？"
103030-145 = "如果那個理論是正確的，那麼就有方法。"
103030-146 = "只要我們也和那個防護罩處於[ruby= ・     ・     ・     ・     ・ ]相同的狀態[/ruby]就可以了。"
103030-147 = "相同的狀態……？"
103030-148 = "這樣啊……如果把那個多次元空間發生的「共存狀態」視為一種振動值──"
103030-149 = "與對方的振動模式相同的物體，就不會受到影響……"
103030-150 = "是的。只要處於相同的狀態，就不會受到多次元內部的機率或共存狀態影響，#n雙方都會存在於「相同的空間」。"
103030-151 = "就像是……主動降噪一樣？"
103030-152 = "這個嘛……可以說是非常類似吧。"
103030-154 = "只要對那個多次元進行分析，讓我們進入相同的狀態……#n就能讓防護罩失效……"
103030-155 = "但是，該用什麼方法……"
103030-156 = "如果真的要執行這個做法，我們就必須能夠計算「多次元詮釋」。"
103030-157 = "那種事做得到嗎？"
103030-158 = "這……"
103030-160 = "……以現狀來看是不可能的。"
103030-161 = "要計算多次元詮釋，只有使用量子電腦才做得到。"
103030-162 = "所以說，我們現在完全無能為力是嗎？"
103030-163 = "明明那個東西又打算讓「虛假的聖所」出現，#n我們卻只能眼睜睜地看著嗎……？"
103030-169 = "……"
103030-170 = "就算我們破壞掉再次出現的聖所……"
103030-171 = "只要無法解決一切的元凶，聖所依然會再次出現吧。"
103030-173 = "怎麼會……"
103030-174 = "那，那麼，無論我們戰鬥多少次──"
103030-176 = "它也能無窮無盡地製造出聖所之塔……沒錯吧？"
103030-177 = "什麼……那怎麼可能！"
103030-178 = "熱力學第一定律跑哪去了啊！？"
103030-179 = "唉……對手是「多次元」的話，一切都有可能是嗎。"
103030-181 = "……"
103030-182 = "到，到底該怎麼做才好啊？#n就算知道方法，不能解決不就沒有意義了嗎……"
103030-183 = "……"
103030-184 = "……呃，咦？"
103030-185 = "老師呢？"
103030-189 = "咦，咦咦……？#n剛才應該還在的呀……？"
103030-196 = "……方法是有的。"
103030-197 = "[s]「……黑色西裝人。」"
103030-198 = "如果是那個東西，說不定能到達「[ruby=誘騙者]色彩的嚮導者[/ruby]」所在的位置。"
103030-199 = "[s]「……該怎麼做？」"
103030-200 = "呵呵呵……"
103030-201 = "這個嘛……你願意向我付出何種「代價」呢？老師。"
103030-202 = "啊啊……原來如此──"
103030-203 = "像現在這樣向我提問的行為本身，#n就是願意支付任何代價的覺悟──是這樣沒錯吧。"
103030-204 = "有必要的話，與「蓋瑪特利亞」合作也不排斥的態度…… "
103030-205 = "[s] 「…………」"
103030-206 = "咯咯咯……那麼，我該要求什麼呢……#n對了，加入「蓋瑪特利亞」──怎麼樣呢？"
103030-207 = "咯咯咯咯……開玩笑的。"
103030-208 = "蓋瑪特利亞已經解散了。#n這次我就特別告訴你吧。"
103030-214 = "……但在那之前，我要警告你一件事。"
103030-215 = "在使用它的瞬間，[USERNAME]老師的肉體──#n將會受到無法挽回的傷害吧。"
103030-216 = "再也無法回復以前的狀態。#n──甚至可能置你於死地。"
103030-217 = "──即便如此也可以嗎？"
103030-219 = "[ns]「──無所謂。」"
103030-221 = "就算結果顯而易見也一樣嗎？"
103030-222 = "……"
103030-223 = "……我知道了，那我就告訴你吧。"
103030-229 = "那個「方法」──"
103030-231 = "──位於[ruby= ・     ・     ・     ・ ]阿拜多斯[/ruby]。"
103030-233 = "下一話;位於阿拜多斯的某物（１）"

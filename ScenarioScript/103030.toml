[translation]
103030-1 = "ตอนที่ 3;วิธีการและอุปกรณ์"
103030-2 = "สูงขึ้นไป 75,000 เมตร นั่นมัน... มันสูงมากเลยนะคะ"
103030-3 = "ลอยอยู่ที่ความสูงขนาดนั้นได้ยังไงกันนะ...?"
103030-4 = "ด้วยเทคโนโลยีที่เรามีในตอนนี้ เราโจมตีขึ้นไปที่ความสูงขนาดนั้นไม่ไหวหรอก"
103030-8 = "มีแผนการที่คิดไว้บ้างไหมหัวหน้า?"
103030-9 = "ไม่รู้สิคะ... ความสูงขนาดนั้นอยู่นอกเหนือจากขอบเขตความสามารถของฉันค่ะ พวกเราคือแฮ็กเกอร์#nนะคะ ยังไม่ได้ถึงขั้นเป็นวิศวกร"
103030-10 = "ยิ่งไปกว่านั้น ถึงจะพยายามตรวจสอบโครงสร้าง แต่เกราะป้องกันที่ล้อมรอบอยู่ก็ยากที่จะทำให้เรา#nตรวจสอบภายด้านในได้ค่ะ"
103030-14 = "...... เพราะงั้น... เราใช้มรดกของบิ๊กซิสเตอร์กันที่นี่เถอะค่ะ"
103030-16 = "มรดกของประธาน? "
103030-17 = "ค่ะ จาก <แผนรับมือ> ที่ผู้หญิงคนนั้นเตรียมไว้เพื่อไม่ให้โลกถึงจุดจบ... หนึ่งในนั้นก็มาจากสมมติฐาน#nว่าจะมีภัยคุกคามจากฟากฟ้าค่ะ"
103030-18 = "จี้จัง ช่วยแฮ็กอาวุธที่พบในเอริดูให้สามารถใช้งานได้หน่อยได้ไหมคะ? ส่วนฉันจะเตรียมอยู่ทางนี้เองค่ะ"
103030-19 = "...... หมายถึงมิสไซล์นั่นน่ะเหรอ? ไม่อยากทำเท่าไรเลยแฮะ..."
103030-20 = "ก็ได้ๆ ถ้าเป็นอันนั้น ก็อาจจะได้ผลก็ได้ "
103030-21 = "เดี๋ยวฉันจะไปบอกสมาชิกไว้ให้นะ"
103030-23 = "แล้วเราก็ต้องการความช่วยเหลือจากชมรมวิศวกรรมด้วย"
103030-25 = "อื้ม เข้าใจแล้ว ทางนี้ก็จะเตรียมตัวเหมือนกัน"
103030-26 = "ค่ะ มาลองทำทุกอย่างที่ทำได้ก่อนแล้วกันค่ะ"
103030-28 = "อึก...!!  ขอให้ถึงเถอะ!"
103030-31 = "อีก 2,000 เมตร......"
103030-34 = "อีก 1,000 เมตร...... อีก 500 เมตร...... "
103030-38 = "ถึงพิกัดจุดหมายแล้ว! เป็นยังไงบ้างคะ?! เข้าเป้าไหมคะ?!"
103030-40 = "ห้องชมรมวิศวกรรม"
103030-42 = "...... ไม่ มันผ่านไปเลย "
103030-43 = "อ๊ะ...!!  ครั้งนี้ก็ด้วยเหรอ?!"
103030-44 = "ระยะทางจากเป้าหมาย...... 1,000 เมตร...... 1,500 เมตร......"
103030-45 = "มันกำลังห่างออกไปเรื่อยๆ เลย "
103030-46 = "เฮ้อ... นี่เป็นวิธีสุดท้ายแล้วเชียว... เหมือนเรากำลังยิงเงาที่ไม่มีตัวตนจริงๆ อยู่เลย"
103030-48 = "......"
103030-49 = "อะไรน่ะ? แผนรับมือที่ประธานทิ้งไว้ให้ก็ไม่มีประโยชน์เหรอ?"
103030-50 = "ค่ะ ดูเหมือนว่าการแทรกแซงทางกายภาพจะใช้ไม่ได้กับโครงสร้างนั้นนะคะ"
103030-51 = "เฮ้อ... ขีปนาวุธร่อนนั่นน่าจะมีสมรรถนะเกินเทคโนโลยีของมิลเลเนียมแล้ว... ถ้าแม้แต่อาวุธชิ้นนี้ก็ยังไม่#nได้ผลละก็..."
103030-52 = "ว่าแต่ ประธานไปได้ของแบบนั้นมาจากไหนน่ะ?"
103030-54 = "...... ตอนนี้ต่อให้ทำต่อไปก็ไร้ความหมาย "
103030-55 = "หากมันไม่ได้รับผลกระทบทางกายภาพ ก็แสดงว่ามันเป็นบางอย่างที่เหนือกว่า <ปรากฏการณ์ธรรมชาติ> และถ้าเป็นอย่างนั้น ชมรมวิศวกรรมของเราก็ไม่น่าช่วยอะไรได้"
103030-56 = "...... พวกเราเองก็ด้วย นั่นเป็นไพ่ใบสุดท้ายที่หาได้จากเอริดูแล้วละ"
103030-57 = "ฮิมาริ? ไม่มีวิธีอื่นเหลือเลยเหรอ?"
103030-59 = "ค่ะ ไม่มีเลยค่ะ ...... ตอนนี้ไม่มีเลย"
103030-60 = "เฮ้อ..."
103030-61 = "... สมกับที่เป็นบิ๊กซิสเตอร์เลยนะคะ"
103030-62 = "จากโลกไปแบบไม่ได้มีส่วนช่วยอะไรเลย แถมมรดกที่ทิ้งไว้ก็ไร้ประโยชน์อีก "
103030-63 = "นี่ๆ... ทำไมถึงพูดเหมือนกับประธานตายไปแล้วเลยอย่างนั้นล่ะ...?"
103030-64 = "กับผู้หญิงคนนั้นแล้ว ไม่แรงไปหรอกค่ะ! "
103030-65 = "ก็นะ ถึงประธานจะทำผิดหลายอย่างก็เถอะ..."
103030-66 = "ถ้าอย่างนั้น วิธีต่อไปก็... อืม..."
103030-68 = "มีวิธีอื่น... ไหมคะ?"
103030-69 = "เฮ้อ... จะไปมีได้ยังไงกันเล่า"
103030-70 = "ตอนนี้เรามืดแปดด้านเลยละ"
103030-77 = "(ซ่า) ฉันตรวจสอบข้อมูลเกี่ยวกับวัสดุของหอคอยที่ทางมิลเลเนียมวิเคราะห์ให้แล้วค่ะ"
103030-82 = "ปรากฏการณ์ที่เกิดจากโครงสร้างนั่น... ฉันว่าฉันรู้แล้วค่ะว่ามันคืออะไร"
103030-87 = "คืออะไรเหรอคะ? ถ้าเราเข้าใจมันได้ ก็จะรู้วิธีเผชิญหน้ากับมันได้ค่ะ"
103030-100 = "เรารวบรวมข้อมูลจากทุกทิศทางด้วยความช่วยเหลือจากบัณฑิตของชมรมซิสเตอร์ บรรณารักษ์จาก#nห้องสมุดเก่า และจากสภาน้ำชาค่ะ "
103030-101 = "แต่มันเป็นเพียงสมมติฐานที่ยังไม่ได้รับการพิสูจน์ค่ะ"
103030-102 = "ไม่เป็นไรค่ะ ยังไงก็ไม่มีทางพิสูจน์ได้อยู่แล้ว..."
103030-103 = "โดยสรุปก็คือ... หอคอยที่ปรากฏในคิโวทอสอีกครั้ง และโครงสร้างที่อยู่บนฟ้าเหนือคิโวทอส..."
103030-107 = "...... ต่างก็เหมือนจะมี <สถานะที่อยู่ร่วมกัน> ประเภทหนึ่งนะคะ"
103030-112 = "งั้นเหรอ...! ถ้างั้นก็......"
103030-113 = "ว่าไงนะ? นี่มัน... กลศาสตร์ควอนตัมเหรอ?"
103030-115 = "ไม่ค่ะ นี่เป็นเพียงการเปรียบเทียบด้วยทฤษฎีที่ใกล้เคียงกันที่สุดเพื่อให้เข้าใจปรากฏการณ์นี้ค่ะ"
103030-116 = "ทุกคนช่วยตั้งใจฟังกันด้วยนะคะ"
103030-117 = "สิ่งนั้นคือโลกคู่ขนานในควอนตัม... ไม่สิ ต้องใช้คำว่าการวิเคราะห์พหุมิติมากกว่าถึงจะชัดเจนที่สุด และสิ่งนั้นน่าจะมาจากทฤษฎีนี้ค่ะ"
103030-118 = "การวิเคราะห์พหุมิติงั้นเหรอ..."
103030-119 = "อ่า... ก็แบบว่า... โลกคู่ขนานในควอนตัมคือสมมติฐานที่ว่าเอกภพจะแตกออกเป็นเสี่ยงๆ ในทุกๆ ความเป็นไปได้ของจักรวาลค่ะ...... "
103030-120 = "แล้วการวิเคราะห์พหุมิติล่ะ......"
103030-121 = "หากการโยนเหรียญมีความเป็นไปได้สองอย่างคือออกหัวไม่ก็ออกก้อย โลกใบนี้ก็มาจากผลลัพธ์แค่#nอย่างเดียวค่ะ"
103030-122 = "แต่ว่า นี่เป็นทฤษฎีที่บอกว่ายังมีจักรวาลอื่นที่ยังไม่ปรากฏออกมา... ใช่ไหมล่ะคะ?"
103030-124 = "วะฮะฮ่าฮ่า อะไรกันๆ"
103030-125 = "จะบอกว่ามีจักรวาลคู่ขนานอะไรอย่างนั้นเหรอ? นี่มันนิยายวิทยาศาสตร์หรือเปล่า? โลกจะแตกออก#nเป็นเสี่ยงๆ ทุกครั้งที่โยนเหรียญเหรอ? (ง่ำๆ)"
103030-126 = "ทฤษฎีนั้นมันเป็นวิทยาศาสตร์นะ?"
103030-128 = "แต่ว่าในพื้นที่นั้น แต่ละความเป็นไปได้จะไม่ถูกแบ่งแยก แต่มันจะทับซ้อนกันอยู่ค่ะ "
103030-129 = "นั่นแปลว่า มันคือพื้นที่แห่งความสับสนวุ่นวายที่ประกอบด้วยสิ่งที่มีตัวตนและไม่มีตัวตนในนานามิติ#nที่ไม่มีที่สิ้นสุด โดยผสมปนเปกันตามอัตราความน่าจะเป็น"
103030-130 = "นั่นเป็นเหตุผลว่าทำไมเราถึงไม่อาจแทรกแซงทางกายภาพได้ในโลกที่สิ่งที่มีตัวตนถูกกำหนดไว้แล้วค่ะ"
103030-131 = "มองเห็นแต่จับต้องไม่ได้......"
103030-132 = "งั้นตอนนี้เราก็อับจนหนทางกันแล้วงั้นสิ... "
103030-135 = "แต่ฉันคิดว่าแค่ส่วนนอกที่ห่อหุ้มโครงสร้างนั่นไว้เท่านั้นที่มีสถานะแบบนั้นค่ะ"
103030-136 = "เพราะหากภายในมีตัวตนไม่แน่นอน ก็ไม่น่าจะส่งพลังงานไปยังแต่ละหอคอยได้ค่ะ"
103030-137 = "พูดง่ายๆ เลยก็คือ... มันมีบาเรียอยู่นั่นเองค่ะ"
103030-138 = "ความหลายมิติที่เป็นอมตะที่เรียกว่า <สถานะการทับซ้อนตามความน่าจะเป็น> ถูกกระจายตัวเป็น#nบาเรีย และถูกคุ้มกันด้วยกฎทางฟิสิกส์สินะคะ"
103030-140 = "ถึงจะเป็นทฤษฎีที่เด็ดเดี่ยว แต่ฉันก็พอเข้าใจแล้วค่ะ ใช้หลายมิติซ้อนทับกันเพื่อป้องกัน...... มันก็สมเหตุสมผลอยู่นะคะ"
103030-141 = "ค่ะ ถ้าเราจัดการกับบาเรียนั่นได้ละก็......"
103030-142 = "เราก็จะโจมตีของจริงที่อยู่ภายในนั้นได้ค่ะ"
103030-144 = "แต่ว่ามันจะมีวิธี... จัดการกับบาเรียอันนั้นได้ด้วยเหรอ?"
103030-145 = "...... ค่ะ จะว่ามีก็มีค่ะ "
103030-146 = "ถ้าเราจำลอง <สถานะการทับซ้อนตามความน่าจะเป็น> ที่เหมือนบาเรียอันนั้นได้ เราก็จะเข้าไปข้างใน#nได้โดยไม่ได้รับผลกระทบจากบาเรียค่ะ"
103030-147 = "สถานะที่เหมือนกันเหรอ......?"
103030-148 = "...... อ้อ นั่นสินะคะ หากเรามองว่า <สถานะการทับซ้อนตามความน่าจะเป็น> ที่เกิดขึ้นในพื้นที่พหุมิติ#nนั่นเป็นการสั่นสะเทือนชนิดหนึ่ง......"
103030-149 = "แบบนั้นตัววัตถุที่มีการสั่นในค่าที่เท่ากับเป้าหมายก็จะไม่ได้รับผลกระทบจากความสั่นนั้นใช่ไหมคะ?"
103030-150 = "...... ใช่ค่ะ เพราะถ้าเป็นอย่างนั้น ก็จะเท่ากับว่าแต่ละฝ่ายก็จะอยู่ใน <พื้นที่เดียวกัน> ส่วนเรื่องความ#nน่าจะเป็นภายในพหุมิติหรือสถานะทับซ้อนนั้นก็จะไม่มีผลค่ะ"
103030-151 = "เหมือนการตัดเสียงรบกวนอะไรแบบนั้นเหรอ? "
103030-152 = "อืม มันค่อนข้างต่างกันนิดหน่อย... แต่ก็ให้ความรู้สึกคล้ายๆ กันค่ะ"
103030-154 = "หากเราวิเคราะห์พหุมิตินั่นและจำลองสถานะเดียวกันได้... เราก็จะตัดกำลังบาเรียได้..."
103030-155 = "แต่ว่าจะทำยังไงนี่น่ะสิ..."
103030-156 = "ถ้าวิธีนั้นมันเป็นไปได้ พวกเราก็ต้องคำนวณการวิเคราะห์พหุมิติให้ได้ใช่ไหมล่ะ?"
103030-157 = "แล้วเราจะทำแบบนั้นได้เหรอ?"
103030-158 = "เรื่องนั้นก็..."
103030-160 = "ไม่ได้ค่ะ......"
103030-161 = "นี่คือการวิเคราะห์พหุมิติเลยนะคะ... ถ้าจะทำสิ่งนั้น เราต้องมีคอมพิวเตอร์ควอนตัมที่มีอยู่แค่ในทฤษฎี#nเท่านั้นค่ะ"
103030-162 = "ถะ... ถ้าอย่างนั้น? เราก็ได้แต่ปล่อยมันไว้แบบนี้แล้วก็เฝ้าดูเฉยๆ เหรอ? "
103030-163 = "มันจะสร้างหอคอยแห่งคำลวงขึ้นมาอีกครั้งเลยนะ เราจะแค่เฝ้าดูเฉยๆ ได้ยังไง!"
103030-169 = "......"
103030-170 = "ถึงเราจะทำลายหอคอยที่เกิดขึ้นใหม่ได้ก็ตาม......"
103030-171 = "แต่ถ้าเราปล่อยให้โครงสร้างบนฟ้าลอยอยู่อย่างนั้น เดี๋ยวมันก็คำนวณความน่าจะเป็นในพหุมิติ แล้วก็สร้างหอคอยขึ้นมาใหม่อยู่ดีค่ะ"
103030-173 = "คะ...?!"
103030-174 = "งะ... งั้นก็แสดงว่า ต่อให้เราพยายามทำลายหอคอยแค่ไหนก็ตาม...... "
103030-176 = "หอคอยก็จะถูกสร้างใหม่ได้ตามจำนวนของมิติที่มีอยู่ไม่สิ้นสุดในจักรวาล... อย่างนั้นเหรอคะ?"
103030-177 = "อะ... อะไรกัน...!"
103030-178 = "ทำไมถึงเป็นแบบนี้ไปได้ล่ะ! แล้วกฎข้อที่หนึ่งของอุณหพลศาสตร์ล่ะหายไปไหน?!"
103030-179 = "...... เฮ้อ พอเริ่มเรื่องพหุมิติขึ้นมา ทุกอย่างก็ดูไม่สมเหตุสมผลไปหมดเลย"
103030-181 = "......"
103030-182 = "แล้วยังไงล่ะทีนี้ ระ... เราต้องทำยังไงกันเหรอ? ถึงจะรู้วิธี แต่ก็แก้ปัญหาไม่ได้งั้นเหรอ?"
103030-183 = "...... "
103030-184 = "...... เอ๋? "
103030-185 = "จะว่าไป... เราไม่เห็นคุณครูกันตั้งแต่เมื่อกี้แล้วนะ "
103030-189 = "เอ๊ะ เอ๋...? นั่นสิคะ ไปอยู่ไหนนะ...?"
103030-196 = "... ผมมีวิธีอยู่ครับ"
103030-197 = "[s] \"สูทดำ\""

[translation]
103030-1 = "Episode 3; Methods and Mechanisms"
103030-2 = "...An altitude of 75,000 meters. That's gonna be tough."
103030-3 = "How is it floating at such a high altitude...?"
103030-4 = "Anyway, with our current technology, there's no way to attack anything at that altitude."
103030-8 = "Do you have any ideas, President?"
103030-9 = "I don't know... That height is beyond my expertise. We're hackers, not engineers, after all."
103030-10 = "Not only that, even if we wanted to check its structure, it's surrounded by a spherical barrier, so we can't see inside."
103030-14 = "...So let's try using Big Sister's legacy here."
103030-16 = "The president's legacy?"
103030-17 = "Yes. Among the countermeasures she prepared to stop the destruction of the world...she had something for threats above the sky as well."
103030-18 = "Chi, can you hack the weapon we found in Eridu so we can utilize it? I'll begin preparations on my end."
103030-19 = "That missile? I don't know if that's a good idea..."
103030-20 = "Well, maybe it'll do the trick. "
103030-21 = "I'll talk to the other members."
103030-23 = "And we need help from the Engineering Department too."
103030-25 = "Okay, we'll be ready."
103030-26 = "Yes. We'll give it our all."
103030-28 = "Ugh...! Go!"
103030-31 = "Distance, 2,000 meters..."
103030-34 = "Distance, 1,000 meters...500 meters..."
103030-38 = "We've reached the target coordinates! Did it connect?!"
103030-40 = "Engineering Department Room"
103030-42 = "...No. It passed right through it."
103030-43 = "What...! Again?!"
103030-44 = "Distance to the target...1,000 meters...1,500 meters..."
103030-45 = "It's getting farther away."
103030-46 = "*sigh* ...That was our final strategy... It feels like we're shooting at shadows..."
103030-48 = "..."
103030-49 = "What? So the president's countermeasure didn't work?"
103030-50 = "No. It looks like we're unable to physically harm the structure."
103030-51 = "*sigh* ...A cruise missile on that scale would exceed what Millennium's technology is capable of... If that doesn't work, then..."
103030-52 = "Where'd the president get something like that?"
103030-54 = "...It's meaningless to proceed any further."
103030-55 = "If it can't be physically affected, it's already beyond a natural phenomenon. So there's nothing the Engineering Department can do about it."
103030-56 = "...Same here. That was the last ace up our sleeve we came across in Eridu."
103030-57 = "Himari? Is there any solution?"
103030-59 = "As of now, I can't think of anything..."
103030-60 = "*sigh*"
103030-61 = "How typical of Big Sister..."
103030-62 = "Not only was she unhelpful to the world, but the legacy she left behind is also useless."
103030-63 = "Umm...it's kind of insulting to talk about someone living as if they're dead..."
103030-64 = "She deserves worse!"
103030-65 = "Well, the president did a lot of things wrong, but that's a bit extreme..."
103030-66 = "Okay, so the next option is... Um..."
103030-68 = "Do we have any solutions? Anything?"
103030-69 = "*sigh* ...It's impossible."
103030-70 = "Everything is blocked."
103030-77 = "*tchhhk* I checked the data on the sanctum materials that were analyzed by Millennium."
103030-82 = "I think I know the structure's phenomenon."
103030-87 = "What is it? If we can understand it, we might be able to deal with it, at least."
103030-100 = "With the help of the scholars of the Sisterhood, the librarians at the old library, and the Tea Party, I've collected information from every archive in Kivotos."
103030-101 = "However, this is only a hypothesis and hasn't been verified."
103030-102 = "Anything helps. We don't have any means of verifying any hypothesis anyway."
103030-103 = "Basically, the sanctums reappearing in Kivotos and the structures above Kivotos are..."
103030-107 = "...maintaining a kind of quantum superposition state. It's the ability for a system to be in multiple states at once, essentially."
103030-112 = "Indeed...! That would make sense..."
103030-113 = "What? Does this have to do with quantum mechanics?"
103030-115 = "Yes and no... I'm using the most similar theory to help understand the phenomenon."
103030-116 = "So just keep that premise in mind."
103030-117 = "It's a multi-world interpretation...no, a multidimensional analysis would be more accurate, an existence based on that theory."
103030-118 = "Multidimensional analysis..."
103030-119 = "...Um, so because the multi-world interpretation is a hypothesis that the universe diverges for every possible probability distribution or pattern in the entire universe..."
103030-120 = "But if it's a multidimensional analysis..."
103030-121 = "If a coin is tossed with the possibility of getting heads or tails, only one of those results will appear in this world, right?"
103030-122 = "But this theory suggests that other universes' possibilities, usually unable to manifest here, exist simultaneously with our universe?"
103030-124 = "Hahaha. What??"
103030-125 = "Like a parallel universe? Like science fiction that says the world diverges every time a coin is tossed? *crunch*"
103030-126 = "The theory itself is based in science."
103030-128 = "However, within that space, all the probable possibilities are mixed in an overlapping manner without diverging."
103030-129 = "In other words, it's a chaotic space in which existence and non-existence within infinite multidimensionality are mixed with every probability."
103030-130 = "That's why we can't physically intervene. It's...almost its own world where it maintains both existence and non-existence."
103030-131 = "You can see it, but you can't touch it..."
103030-132 = "We don't have a solution with the technology we have..."
103030-135 = "But I think that only the outside surroundings of the structure could maintain such a state."
103030-136 = "If the interior was also unstable, it'd be impossible to transfer energy to each sanctum like it's doing now."
103030-137 = "...So it's essentially a barrier, so to speak."
103030-138 = "By deploying an invincible multidimensionality, known as the quantum superposition state, like a barrier, it's protected from all physical laws."
103030-140 = "It's a bold theory, but I get it. Use an overlapping multidimensionality for defense... It'd make sense if that were the case."
103030-141 = "If we can get rid of the barrier..."
103030-142 = "...It'd be possible to attack the main body inside."
103030-144 = "But how would we eliminate a barrier like that?"
103030-145 = "There is one solution... "
103030-146 = "If we can implement the same quantum superposition state as that barrier, we can enter without being affected by the barrier."
103030-147 = "The same state...?"
103030-148 = "Oh, I see. If the quantum superposition state occurring in that multidimensional space is viewed as a kind of vibrational value..."
103030-149 = "An object with the same vibrational value would be able to pass through, right?"
103030-150 = "...Yes, because regardless of the probability or superposition state inside that multidimensional space, they'll be in the same space."
103030-151 = "Kind of like noise canceling?"
103030-152 = "It's a little different, but the concepts are similar."
103030-154 = "If we can analyze the multidimensionality and implement the same state...we can neutralize the barrier..."
103030-155 = "But how...?"
103030-156 = "For that to be possible, we need to be able to calculate multidimensional analysis."
103030-157 = "Is that even possible?"
103030-158 = "That's..."
103030-160 = "...impossible."
103030-161 = "To calculate multidimensional analysis, we'd need a quantum computer, which only exists in theory."
103030-162 = "Th-Then there's nothing we can do?"
103030-163 = "The False Sanctums are about to manifest again, and we can't do anything but watch it happen?!"
103030-169 = "..."
103030-170 = "Even if we manage to eliminate the sanctums that appear again..."
103030-171 = "...If we leave that structure in the sky as it is, it'll just calculate the probability of existence for sanctums in multiple dimensions and manifest them here, over and over again."
103030-173 = "...Seriously?!"
103030-174 = "Th-Then, even if we destroy the sanctums..."
103030-176 = "The sanctums can be recreated as many times as the infinite number of dimensions that exist in the universe... Is that right?"
103030-177 = "Wh-What..."
103030-178 = "That doesn't make sense! What happened to the first law of thermodynamics?"
103030-179 = "*sigh* ...The moment multidimensionality comes into this, everything we know of the world becomes meaningless."
103030-181 = "..."
103030-182 = "What, then? Wh-What do we do? Are you saying even if we know what needs to be done, we're utterly helpless?"
103030-183 = "..."
103030-184 = "Hm? "
103030-185 = "Is Sensei here? When did they slip out? "
103030-189 = "H-Huh...? Where'd Sensei go...?"
103030-196 = "...There's a way."
103030-197 = "[s] \"Black Suit.\""
103030-198 = "There is one method. Just one way to reach Phrenapates."
103030-199 = "[s] \"...Tell me how to do it.\""
103030-200 = "Heeheeheehee..."
103030-201 = "In exchange for telling you, what will you give me?"
103030-202 = "...Hmm, well."
103030-203 = "Bowing your head here and asking me means you're willing to do just about anything to achieve your goal, no matter the sacrifice."
103030-204 = "You're even here, willing to cooperate with Gematria. "
103030-205 = "[s] \"...\""
103030-206 = "Heh heh, then, what shall I demand of you? ...Right, how about joining Gematria?"
103030-207 = "...Heeheehee. Just kidding."
103030-208 = "Gematria has disbanded, so you're lucky this time. I'll give you a boon, just this once."
103030-214 = "...But I must warn you."
103030-215 = "[USERNAME] Sensei, once you do this, your body will receive irreversible damage."
103030-216 = "You won't be able to revert to your prior state...and you may even die."
103030-217 = "You're still willing to move forward?"
103030-219 = "[ns] \"None of that matters.\""
103030-221 = "Even knowing this could end in your death?"
103030-222 = "..."
103030-223 = "Your resolve is set. I understand."
103030-229 = "Sensei... What you're looking for is..."
103030-231 = "...in Abydos."
103030-233 = "Next Episode; What's Hidden in Abydos 1"

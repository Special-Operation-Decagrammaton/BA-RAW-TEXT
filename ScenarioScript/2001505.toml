[translation]
2001505-1 = "เหตุผลที่อยากโตเป็นผู้ใหญ่"
2001505-2 = "หวัดดี คุณครู! วันนี้ฉันมาช่วยงานคุณครูที่งานยุ่งรัดตัวด้วยแหละ!"
2001505-3 = "หืม? ไม่มีใครอยู่เลยแฮะ..."
2001505-4 = "อืม~ คุณครูไปเข้าห้องน้ำรึเปล่านะ?"
2001505-5 = "อ๊ะ! โต๊ะรกยุ่งเหยิงสุดๆ เลย! ไม่ได้การแล้ว! ถ้าเกิดรุ่นพี่มิโมริมาเห็นเข้าจะต้องโดนดุแน่ๆ เลย!"
2001505-9 = "หืม... กาแฟเหรอ? คุณครูดื่มแล้ววางไว้สินะ"
2001505-10 = "ฮืม~ อื้ม~"
2001505-14 = "(ดื่มกาแฟ)"
2001505-18 = "แหวะะะ! ขมแบบตะโกนนน!!"
2001505-19 = "พอเป็นผู้ใหญ่แล้วต้องดื่มอะไรขมๆ แบบนี้เหรอ...? ฉันชอบดื่มนมกล้วยมากกว่าอีก!"
2001505-20 = "การเป็นผู้ใหญ่นี่ลำบากจริงๆ เลยนะ... กาแฟเย็นชืดหมดแล้วเนี่ย"
2001505-21 = "อ๊ะ คิดอะไรดีๆ ออกแล้ว!"
2001505-22 = "ถ้าฉันชงกาแฟให้เอง... แทนแก้วเก่าที่เย็นชืดไปแล้ว..."
2001505-23 = "เฮือก?! นี่เป็นโอกาสดีที่จะเป็นเลดี้ที่เพียบพร้อม...และได้ช่วยเหลือผู้ใหญ่ก็ได้นะ!"
2001505-24 = "ในหนังผู้ใหญ่ที่แอบดูไปนิดนึงเมื่อคืนเองก็..."
2001505-25 = "ใช่แล้ว! รู้สึกว่าจะฟีลเดียวกันนี่แหละ!"
2001505-26 = "ดีละ! ฉันจะชงกาแฟสูตรพิเศษของคาเอเดะจังให้คุณครูได้ชิมเอง!"
2001505-30 = "ลัลลัลลา~♪"
2001505-31 = "ใส่อันนี้ลงไปแบบนี้~"
2001505-33 = "โอ้... อื้ม ประมาณนี้แหละ..."
2001505-34 = "ใช้ได้! กาแฟสูตรพิเศษอร่อยตะโกนของคาเอเดะจังเสร็จแล้ว!"
2001505-35 = "พอคุณครูดื่มกาแฟที่ฉันชงเข้าไปก็คง..."
2001505-36 = "ฮิฮิฮิ~! แหม คุณครู~! ถ้าจู่ๆ มาถามเรื่องของเล่นที่อยากได้แบบนี้ ฉันลำบากใจน้า~ "
2001505-37 = "ดีละ! เตรียมเสร็จเรียบร้อย! ตอนนี้เหลือแค่เอาไปวางไว้ตรงโต๊ะทำงานของคุณครู..."
2001505-41 = "หืม? อ๊ะะะ?!"
2001505-43 = "อ๊าย?! มะ...ไม่นะ กาแฟมัน...!"
2001505-49 = "อะ...อ๊ายยยย?!"
2001505-51 = "[ns] \"คาเอเดะ อธิบายมาหน่อยได้มั้ยว่าทำไมมันเละเทะแบบนี้...?\""
2001505-52 = "คะ...คือว่าเรื่องนั้นฉะ...ฉันก็แค่อยาก...คือ...คือว่า... ฉันเห็นคุณครูยุ่งมากๆ วันนี้ก็เลยอยากมาช่วย..."
2001505-53 = "พอมาถึง...คุณครูก็ไม่อยู่ที่ห้อง แล้วโต๊ะทำงานของคุณครูก็ยุ่งเหยิงมาก..."
2001505-54 = "ละ...แล้วอีกอย่างกาแฟของคุณครูก็เย็นชืดหมดแล้ว ฉันเลยอยากชงแก้วใหม่มาให้...#nพะ...เพราะคิดว่าน่าจะช่วยคุณครูได้บ้าง..."
2001505-55 = "ฉะ...ฉันพยายามแล้วนะ ตะ...แต่..."
2001505-56 = "[s] \"คาเอเดะ\""
2001505-57 = "ขะ... ขอโทษค่ะ!"
2001505-58 = "ที่จริงฉันคิดว่าถ้าชงกาแฟอร่อยๆ เป็นของขวัญให้คุณครูก็อาจจะได้รับคำชมก็ได้... แล้วถ้าเกิดคุณครูชอบใจก็อาจจะซื้อของเล่นให้ฉันน่ะ...!"
2001505-59 = "ฉันแค่อยากช่วยคุณครูเพื่อเป็นเลดี้ที่เพียบพร้อม...!"
2001505-60 = "แต่ทุกอย่างมันกลับไม่เป็นดั่งใจเอาซะเลย จนสุดท้ายมันก็เละเทะแบบนี้..."
2001505-61 = "ตะ...แต่ว่าฉันก็พยายามที่จะช่วยคุณครูแล้วนะ..."
2001505-62 = "ฉันไม่ได้คิดที่จะสร้างความวุ่นวายให้เลย... ไม่ได้คิดแบบนั้นเลย"
2001505-63 = "[s] \"คาเอเดะ\""
2001505-64 = "ฮือ...!"
2001505-65 = "มะ...มุแงงงงง! ขะ... ขอโทษค่ะ!"
2001505-66 = "ฉันเข้ามาหาคุณครูตามอำเภอใจและก่อเรื่องพวกนี้..."
2001505-67 = "วะ...วุ่นวายกับห้องทำงานของคุณครู ละ...และทำให้ทุกอย่างเละเทะ..."
2001505-68 = "ฮือ...ฮึก... ขะ...ขอโทษค่ะ..."
2001505-69 = "ทะ...ทั้งๆ ที่คุณครูก็ยุ่งมากอยู่แล้ว"
2001505-70 = "สุดท้ายฉันก็สร้างภาระให้กับคุณครูอีก..."
2001505-71 = "ฮือๆ...ฮึก... ฮืออออ... ไม่ได้ช่วยอะไรคุณครูเลยสักนิดเดียว..."
2001505-72 = "ฮือออ..."
2001505-73 = "[s] \"คาเอเดะ ใจเย็นๆ ก่อน\""
2001505-74 = "ฮือ...?"
2001505-75 = "[s] \"คาเอเดะ เรามาคุยกันแป๊ปนึงก่อนดีมั้ย?\""
2001505-76 = "(สะอื้น...)"
2001505-78 = "[ns] \"เอ้า ดื่มโกโก้ร้อนก่อนสิ\""
2001505-79 = "ฉะ...ฉันอยากดื่มกาแฟดำ มะ...มากกว่าโกโก้ร้อน..."
2001505-80 = "[s] \"ไม่ชอบโกโก้ร้อนเหรอ?\""
2001505-81 = "เปล่านะ........ ชอบมากเลยแหละ"
2001505-82 = "(ดื่มโกโก้ร้อน)"
2001505-83 = "[s] \"ถ้างั้นครูขอถามอะไรหน่อยได้มั้ย?\""
2001505-84 = "อื้อ..."
2001505-85 = "[s] \"คาเอเดะพยายามอยู่ตลอดเพื่อจะเป็นเลดี้ใช่ไหมล่ะ\""
2001505-86 = "ค่ะ..."
2001505-87 = "[s] \"เพราะอะไรเหรอ?\""
2001505-88 = "คะ...คือว่า..."
2001505-89 = "เรื่องนั้น..."
2001505-90 = "[s] \"เรื่องนั้น...?\""
2001505-91 = "..."
2001505-92 = "ฉัน... คุณครู... คะ...คือว่า... ตอนเด็กๆ ฉันเป็นตัวป่วนมากเลยละ..."
2001505-93 = "[s] \"ตัวป่วนเหรอ?\""
2001505-94 = "อื้อ... ตอนอยู่ที่หมู่บ้าน..."
2001505-95 = "ฉันชอบไปเล่นที่ยุ้งฉาง ที่ภูเขา ลำธาร ทะเล... ไปเกือบทุกวันเลย"
2001505-96 = "ฉันไปเล่นที่ต่างๆ แบบนั้นทุกวันจนถึงช่วงม.ต้น แล้วก็ป่วนคนอื่นๆ ไปทั่วเลยด้วย"
2001505-97 = "ฉันทำแต่เรื่องที่คิดว่าสนุกมาตลอด"
2001505-98 = "แต่พอขึ้นม.ปลายมาแล้ว... เอ่อ คือที่ที่ฉันเคยอยู่น่ะ..."
2001505-99 = "แม้แต่ในเขตเฮียกคิยาโคเองก็นับว่าเป็นเขตชนบทที่ห่างไกลมากๆ ถ้าจะเรียนต่อชั้นม.ปลายก็ต้อง#nเข้ามาเรียนในเขตกลาง"
2001505-100 = "พอออกจากชนบทเข้ามาในเมืองแล้ว... ฉันก็ได้นั่งรถไฟเป็นครั้งแรก..."
2001505-101 = "อ๊ะ ตอนที่นั่งรถไฟครั้งแรก ฉันคิดว่าต้องถอดรองเท้าขึ้นด้วยนะรู้มั้ย? พอทำแบบนั้นคนอื่นๆ ก็มอง#nด้วยสายตาแปลกๆ กัน!"
2001505-102 = "อืม..."
2001505-103 = "มะ...ไม่ใช่แบบนั้นนะ..."
2001505-104 = "[s] \"อื้อ แล้วยังไงต่อล่ะ\""
2001505-105 = "อ่า... ผู้คนที่ได้เจอหลังจากเข้ามาในเมือง..."
2001505-106 = "ฉันรู้สึกว่าเจ๋งมากๆ เลย..."
2001505-107 = "โดยเฉพาะรุ่นพี่สึบากิกับรุ่นพี่มิโมริ! ทั้งสองคนทั้งดูดี สวย แล้วก็สุดยอดมากๆ เลย!"
2001505-108 = "และฉันก็คิดว่าที่ผ่านมาฉันทำตัวเหมือนเด็กๆ มาตลอด แล้วก็จะเป็นแบบนี้ต่อไปไม่ได้"
2001505-109 = "เป็นแบบนี้ต่อไปไม่ได้เด็ดขาด ถ้าอยากจะเป็นคนที่เหมาะสมจะเป็นสมาชิกของชมรมฝึกฝนก็#nต้องพยายามเข้า"
2001505-110 = "เพราะงั้นฉันเลยตัดสินใจที่จะฝึกฝนตัวเองให้เป็นเลดี้ที่เพียบพร้อม"
2001505-111 = "ฉันก็ตั้งใจพยายามสุดๆ เหมือนกับที่มาหาคุณครูที่นี่..."
2001505-112 = "ฉันก็คิดว่าจะฝึกฝนเพื่อเป็นเลดี้ที่เพียบพร้อม..."
2001505-113 = "แต่ว่า... มันก็ไม่ใช่เลย"
2001505-114 = "ฉันคิดว่าตัวเองพยายามมากๆๆ แล้วแท้ๆ แต่ว่าสุดท้าย..."
2001505-115 = "กลับทำให้คนเอาไปลือกันแปลกๆ สร้างปัญหาต่างๆ..."
2001505-116 = "ดูเหมือน... ฉันไม่ได้เปลี่ยนไปจากเดิมเลยสักนิดเดียว"
2001505-117 = "ฉันยังคงเป็นเด็กเหมือนเดิม ไม่ว่าจะพยายามแค่ไหนเพื่อเป็นเลดี้ที่เพียบพร้อม..."
2001505-118 = "ฉันคงกลายเป็นเลดี้ที่เพียบพร้อมไม่ได้ง่ายๆ หรอก..."
2001505-119 = "[s] \"ไม่หรอก ไม่ใช่แบบนั้นเลยนะ\""
2001505-120 = "คุณครู...?"
2001505-121 = "[s1] \"ครูรู้ว่าคาเอเดะพยายามอยู่ตลอดเลยนะ\"\n[s2] \"ครูรู้ดีที่สุดเลยนะว่าคาเอเดะพยายามมาตลอด\""
2001505-122 = "คุณครู... รู้งั้นเหรอ...?"
2001505-123 = "คุณครู... รู้งั้นเหรอ...?"
2001505-124 = "[s3] \"แน่นอนว่าถึงพยายามแล้วบางครั้งก็อาจล้มเหลวบ้าง\"\n[s4] \"มันไม่ผิดเลย ใครๆ ก็ผิดพลาดกันได้ทั้งนั้น\""
2001505-125 = "..."
2001505-126 = "..."
2001505-127 = "[s5] \"แต่ไม่เป็นไรหรอกนะคาเอเดะ เพราะคาเอเดะก็คือคาเอเดะนี่นา\"\n[s6] \"ไม่ต้องรีบร้อน ค่อยๆ เดินไปตามเส้นทางที่เหมาะกับตัวเองก็ได้\""
2001505-128 = "คาเอเดะก็คือคาเอเดะ..."
2001505-129 = "ค่อยๆ เดินไปตามเส้นทางที่เหมาะกับตัวเอง..."
2001505-130 = "[s] \"แต่ถ้าเป็นตอนที่ลำบากละก็พึ่งพารุ่นพี่หรือครูอีกหน่อยก็ได้นะ\""
2001505-131 = "หืม... ได้งั้นเหรอ?"
2001505-132 = "[s] \"ถึงใครจะว่ายังไง แต่ครูก็เป็นครูของคาเอเดะนะ\""
2001505-133 = "..."
2001505-134 = "อืม... แบบนี้เองสินะ"
2001505-135 = "อื้อ...! เข้าใจแล้ว!"
2001505-136 = "นั่นสินะ! คุณครูก็อยู่ที่นี่ตลอดนี่นา!"
2001505-137 = "อ๊ะ?! แต่ว่าฉันน่ะ...! จนถึงตอนนี้คงวิตกกังวลมากเกินไปจนเหมือนคนงี่เง่าเลย"
2001505-138 = "ฮิฮิ! คาเอเดะคืนชีพแล้ว! ขอบคุณนะคุณครู! คำพูดของคุณครูช่วยทำให้ฉันกลับมาฟูลพาวเวอร์แล้ว!"
2001505-139 = "อย่างที่คุณครูบอก ฉันน่ะ... จะพยายามอย่างเต็มที่และค่อยๆ เติบโตไปก็ได้นี่นา!"
2001505-140 = "คอยดูฉันไปเรื่อยๆ ด้วยนะ คุณครู!"
2001505-141 = "[s7] \"ครูจะคอยดูคาเอเดะเติบโตเอง...\"\n[s8] \"แต่ว่าตอนนี้มาเก็บกวาดห้องก่อนดีมั้ย?\""
2001505-142 = "อ๊ะ จริงด้วย! ต้องเก็บกวาดห้องก่อน เกือบลืมไปซะสนิทเลย!"
2001505-143 = "อ๊ะ จริงด้วย! ลืมไปซะสนิทเลย!"
2001505-144 = "ดีละ! ถ้างั้นฉันจะเริ่มใหม่ตั้งแต่วันนี้! การพยายามเพื่อเป็นเลดี้ที่เพียบพร้อม สตาร์ท!"
2001505-146 = "(จากนั้นคุณครูกับคาเอเดะก็นั่งคุยกันมากขึ้นกว่าปกติพร้อมกับทำความสะอาดห้องทำงานไปด้วย)"
2001505-148 = "(วันต่อมา)"
2001505-152 = "[ns9] \"อืม เท่านี้ก็คงจะเสร็จแล้วสินะ...\"\n[ns10] \"หลังจากนั้นคาเอเดะจะโอเคขึ้นรึเปล่านะ...\""
2001505-159 = "คุณ~ ครู~!! เรื่องด่วนๆๆ! ด่วนไฟแลบเลย!!"
2001505-160 = "[s] \"คะ...คาเอเดะ?! มีเรื่องอะไรเหรอ?!\""
2001505-161 = "เรื่องนั้นน่ะ... คือว่านั่นน่ะ นั่นน่ะ... คือว่า...!"
2001505-162 = "ได้ยินว่าที่ป่ามุซาซาบิของเฮียกคิยาโคมีด้วงกว่างเฮอร์คิวลีสฝูงใหญ่อยู่ด้วยละ!"
2001505-163 = "[s] \"ห้ะ...?\""
2001505-164 = "ไม่ใช่เวลามัวอึ้งอยู่นะ รีบเตรียมอุปกรณ์จับแมลงกับพวกกล้องที่จะเอาไปถ่ายพวกด้วงกว่าง..."
2001505-165 = "แล้วก็จะปล่อยให้คอแห้งระหว่างทางไม่ได้นะ เอ้านี่ เอานมขวดไปด้วย"
2001505-166 = "ดีละ! เตรียมพร้อมเรียบร้อย! รีบไปกันเถอะ คุณครู!"
2001505-167 = "ไปเร็ว! รีบไปจับด้วงกว่างเฮอร์คิวลีสกันเถอะ!"
2001505-168 = "[s11] \"อะ...อื้อ ก็ได้...\"\n[s12] \"พอเห็นคาเอเดะเป็นเหมือนเดิมก็ค่อยโล่งใจหน่อย\""
2001505-169 = "เอ๋...?"
2001505-170 = "หืม...?"
2001505-172 = "(คุณครูรู้สึกคลายกังวลในสิ่งที่หนักใจ และออกไปจับแมลงกับคาเอเดะที่ดูสดใสร่าเริงเหมือนเดิม)"

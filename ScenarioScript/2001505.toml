[translation]
2001505-1 = "When I Grow Up"
2001505-2 = "Hi, Sensei! I came to help you with your busy job!"
2001505-3 = "Weird. No one's here?"
2001505-4 = "Maybe Sensei's in the bathroom."
2001505-5 = "Whoa! Sensei's desk is a complete mess! Mimori's gonna flip out!"
2001505-9 = "Is this coffee? Sensei drinks this all the time!"
2001505-10 = "Hm..."
2001505-14 = "*sip*"
2001505-18 = "Blegh! Bitter!"
2001505-19 = "I hope I don't have to drink this stuff when I'm an adult. Banana milk's way better."
2001505-20 = "Being an adult seems hard. Wait, the coffee's cold!"
2001505-21 = "Oh! I've got it!"
2001505-22 = "I'll brew some fresh, hot coffee for Sensei!"
2001505-23 = "This is perfect proper lady training! I'm helping an adult with a grown-up thing."
2001505-24 = "Like that sexy drama I saw last night!"
2001505-25 = "They did something like this, right?!"
2001505-26 = "Okay! I'm going to make some special Kaede-style coffee for Sensei!"
2001505-30 = "*humming*"
2001505-31 = "Add some of this."
2001505-33 = "Yum. This should be perfect!"
2001505-34 = "Voila! Kaede's super ultra coffee is ready!"
2001505-35 = "I can't wait for Sensei to try it!"
2001505-36 = "Heehee! What if they get me a toy as a reward?"
2001505-37 = "Yay! I'm so excited! I just have to take this to Sensei's desk..."
2001505-41 = "Ack!"
2001505-43 = "What? Nooo! The coffee!"
2001505-49 = "Waaaahhhh?!"
2001505-51 = "[ns] \"So, Kaede... Care to explain what happened here?\""
2001505-52 = "You said you were super busy, right? So I came to help you.."
2001505-53 = "But then you weren't here when I got here. And your desk was all messy."
2001505-54 = "And your coffee was cold! I wanted to help, so I made you a new cup."
2001505-55 = "I...I was really trying my best to help!"
2001505-56 = "[s] \"Kaede.\""
2001505-57 = "I'm sorry!"
2001505-58 = "I'll 'fess up! I thought if I made you coffee, you would praise me and buy me a toy!"
2001505-59 = "I was really trying to be a proper lady."
2001505-60 = "But it was harder than I thought. And I made a big mess!"
2001505-61 = "B-But I was still just trying to help..."
2001505-62 = "I didn't mean to make such a mess... Not at all..."
2001505-63 = "[s] \"Kaede.\""
2001505-64 = "*sniffle*"
2001505-65 = "WAAAHHHH!!! I'm so sorry!!!"
2001505-66 = "I'm sorry I came into your office without being invited!"
2001505-67 = "I'm sorry I made your messy office worse!"
2001505-68 = "*sob* I'm so sorry."
2001505-69 = "Sensei's always so busy."
2001505-70 = "And I just made life harder for you."
2001505-71 = "*sob* I didn't help at all..."
2001505-72 = "*sob*"
2001505-73 = "[s] \"Calm down, Kaede.\""
2001505-74 = "...Huh?"
2001505-75 = "[s] \"Let's talk a little, Kaede.\""
2001505-76 = "*sniffle*"
2001505-78 = "[s] \"Here. Have some cocoa.\""
2001505-79 = "I... I like coffee more than cocoa."
2001505-80 = "[s] \"You don't want it?\""
2001505-81 = "...No, I do."
2001505-82 = "*slurp*"
2001505-83 = "[s] \"Can I ask you something?\""
2001505-84 = "Okay."
2001505-85 = "[s] \"Becoming a proper lady is really important to you, right?\""
2001505-86 = "Yes."
2001505-87 = "[s] \"Why?\""
2001505-88 = "Th-That's..."
2001505-89 = "That's..."
2001505-90 = "[s] \"That's?\""
2001505-91 = "..."
2001505-92 = "I... Did you know I was a really mischievous child?"
2001505-93 = "[s] \"Mischievous?\""
2001505-94 = "Yes... When I lived in the countryside."
2001505-95 = "I would travel the fields, the mountains, the ocean..."
2001505-96 = "I ran around causing trouble until middle school."
2001505-97 = "As long as it seemed fun, I wanted to do it."
2001505-98 = "You know where I'm from, right?"
2001505-99 = "It's really rural, even for the Hyakkiyako district. So I had to move to the city when I started high school."
2001505-100 = "I transferred to a school in the city. I rode a subway for the first time..."
2001505-101 = "Oh! I used to think I had to take off my shoes to get on the subway! Everyone thought I was crazy!"
2001505-102 = "...!"
2001505-103 = "Sorry, got distracted..."
2001505-104 = "[s] \"So, the city?\""
2001505-105 = "Yes, I went to the city."
2001505-106 = "And everyone was amazing!"
2001505-107 = "Especially Tsubaki and Mimori! They're so cool, and pretty, and competent!"
2001505-108 = "I felt like such a child next to them, I decided I had to change."
2001505-109 = "\"I can't always be like this. I'll work hard and become a member of the Inner Discipline Club.\""
2001505-110 = "That was the moment I decided to become a proper lady."
2001505-111 = "I really believed I just had to try my best."
2001505-112 = "I thought I could become a proper lady, just like Tsubaki and Mimori."
2001505-113 = "But...I was wrong."
2001505-114 = "I thought I was working hard. I thought I was doing my best."
2001505-115 = "But I'm causing trouble everywhere I go, and everyone thinks I'm a weirdo."
2001505-116 = "I haven't grown at all."
2001505-117 = "I thought if I put my all into it..."
2001505-118 = "Maybe someone like me isn't meant to be a proper lady."
2001505-119 = "[s] \"That's not true.\""
2001505-120 = "Sensei?"
2001505-121 = "[s1] \"I know better than anyone how hard you try.\"\n[s2] \"You're always doing your best.\""
2001505-122 = "You do?"
2001505-123 = "You do?"
2001505-124 = "[s3] \"You might make mistakes here and there.\"\n[s4] \"Everyone makes mistakes.\""
2001505-125 = "..."
2001505-126 = "..."
2001505-127 = "[s5] \"So it's okay. You're just being Kaede.\"\n[s6] \"Just move at your own pace. It's okay if it's slow.\""
2001505-128 = "Just being me...."
2001505-129 = "Just being me...."
2001505-130 = "[s] \"And you can always rely on your upperclassmen. And me.\""
2001505-131 = "...Huh? Sensei?"
2001505-132 = "[s] \"It'll always be okay. I'm your teacher, right?\""
2001505-133 = "..."
2001505-134 = "You're right..."
2001505-135 = "Okay!"
2001505-136 = "That's true! You'll always be my teacher!"
2001505-137 = "I've been worrying my head over nothing this whole time!"
2001505-138 = "Hahaha! Kaede is back! Thanks, Sensei! I feel so motivated again!"
2001505-139 = "Like you said, I'm sure I'll get better if I keep working on it little by little!"
2001505-140 = "I won't disappoint you, Sensei!"
2001505-141 = "[s7] \"You can do it, Kaede!\"\n[s8] \"Now, why don't we go clean up that mess?\""
2001505-142 = "Oh! I should clean up!"
2001505-143 = "Oh! I should clean up!"
2001505-144 = "Okay! I'm going to start all over! I'm going to become a proper lady, my way!"
2001505-146 = "After a long conversation, Kaede and I cleaned up the office together."
2001505-148 = "The next day..."
2001505-152 = "[ns9] \"I think this might be good enough to call it a day.\"\n[ns10] \"I wonder if Kaede is okay.\""
2001505-159 = "Sensei! Emergency! We have an emergency!!!"
2001505-160 = "[s] \"Kaede?! What's going on?\""
2001505-161 = "So what happened is...!"
2001505-162 = "There are Hercules beetles in the Hyakkiyako Flying Squirrel Forest!"
2001505-163 = "[s] \"...Huh?\""
2001505-164 = "There's no time, Sensei! I need insect hunting tools and a camera to take pictures of the majestic beetles!"
2001505-165 = "Oh, and what if we get thirsty on the way? We need milk!"
2001505-166 = "Okay! I'm ready! Let's go, Sensei!"
2001505-167 = "It's beetle-catching time!"
2001505-168 = "[s11] \"Uh... Okay... I guess...\"\n[s12] \"I'm happy you're in good spirits, Kaede.\""
2001505-169 = "...Huh?"
2001505-170 = "...Huh?"
2001505-172 = "I hid my relief and went to hunt bugs with Kaede, who was as vibrant and energetic as ever."

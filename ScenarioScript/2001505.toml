[translation]
2001505-1 = "想成為大人的理由"
2001505-2 = "老師，我來幫忙了──！"
2001505-3 = "……咦？一個人都沒有。"
2001505-4 = "是去廁所了嗎？"
2001505-5 = "啊啊！桌上亂成一團！要是被三森前輩那樣愛整潔的人看到會挨罵的！"
2001505-9 = "啊，是咖啡。老師沒喝完的咖啡。"
2001505-10 = "……"
2001505-14 = "咕嚕……"
2001505-18 = "好苦！！！"
2001505-19 = "噁……大人都喝這種東西嗎……？喝香蕉牛奶不好嗎……"
2001505-20 = "大人還真是奇怪……而且這咖啡還冷掉了。"
2001505-21 = "……啊，我想到一個好主意！"
2001505-22 = "要是我幫老師重新泡一杯熱熱的咖啡……"
2001505-23 = "不就很有「完美淑女」的感覺了嗎！"
2001505-24 = "昨天那場有點成熟的連續劇，"
2001505-25 = "也有出現類似的場景！"
2001505-26 = "好！那我就要來泡一杯「小楓特製特調」！"
2001505-30 = "哼哼～♪"
2001505-31 = "把這個這樣子……"
2001505-33 = "嗯～……大概這樣就行了吧？"
2001505-34 = "泡好了！小楓特製特調．超級無敵版！"
2001505-35 = "等老師回來看到這個，一定會覺得……"
2001505-36 = "耶嘿嘿！老師真是的～怎麼可以突然問我想要什麼玩具啦～！"
2001505-37 = "……嗯，很完美！現在只要拿到老師的座位上放好……"
2001505-41 = "嗚哇！？"
2001505-43 = "啊，啊啊啊啊！？"
2001505-49 = "咖啡啊啊啊──！？"
2001505-51 = "[ns]「……總之，能請你說明一下這個慘況嗎？」"
2001505-52 = "這是，那個……我只是，想要來幫老師的忙……"
2001505-53 = "我來到夏萊之後發現老師不在，老師的桌上也亂亂的……"
2001505-54 = "然，然後咖啡也冷掉了，就想說重泡一杯讓老師開心……"
2001505-55 = "所以我就，努力泡了一杯……"
2001505-56 = "[s]「楓。」"
2001505-57 = "噫！對不起！"
2001505-58 = "我，我只是希望得到老師的誇獎，只是想說如果做得很好，老師可能會買玩具給我……！"
2001505-59 = "覺得如果做得不錯，應該就能成為完美淑女……"
2001505-60 = "結果那個……狀況卻不如預期，還有點……"
2001505-61 = "我，我是真的有心想要幫忙的……"
2001505-62 = "我真的……沒有打算要搗蛋……"
2001505-63 = "[s]「楓，慢點。」"
2001505-64 = "嗚嗚……！"
2001505-65 = "嗚哇啊啊啊啊！對不起！"
2001505-66 = "我擅自闖進來，到處亂翻……！"
2001505-67 = "而且還真的把辦公室弄得一團亂……"
2001505-68 = "對不，起……"
2001505-69 = "老師原本就已經很忙了……"
2001505-70 = "結果我還給老師添麻煩……"
2001505-71 = "什麼忙都幫不上……"
2001505-72 = "嗚……"
2001505-73 = "[s]「楓，你冷靜點。」"
2001505-74 = "……？"
2001505-75 = "[s]「對不起，我問的口氣太兇了。總之你先等我一下。」"
2001505-76 = "？？？"
2001505-78 = "[ns]「來，熱可可。把它喝下去冷靜一下吧。」"
2001505-79 = "我，我身為淑女，應該要喝黑咖啡……"
2001505-80 = "[s]「你不喜歡可可嗎？」"
2001505-81 = "…………喜歡。"
2001505-82 = "（咕嚕）"
2001505-83 = "[s]「趁這個機會，我可以問你一件事嗎？」"
2001505-84 = "……嗯。"
2001505-85 = "[s]「楓總是努力要成為完美淑女，對不對。」"
2001505-86 = "…………嗯。"
2001505-87 = "[s]「那是為什麼呢？」"
2001505-88 = "……"
2001505-89 = "因為……"
2001505-90 = "[s]「嗯。」"
2001505-91 = "……"
2001505-92 = "我小時候，是個搗蛋鬼……"
2001505-93 = "[s]「搗蛋鬼？」"
2001505-94 = "我小時候住在鄉下時……"
2001505-95 = "會在山上，在海邊到處跑。"
2001505-96 = "直到上國中之前，每天都在各種地方閒晃，到處惡作劇。"
2001505-97 = "盡做些自以為好玩的事。"
2001505-98 = "因為那裡在百鬼夜行自治區當中，也是個特別鄉下的地區，"
2001505-99 = "所以我是升上高中，才第一次來到這裡。"
2001505-100 = "甚至也是因為要來這邊，才第一次搭電車。"
2001505-101 = "話說第一次搭電車的時候，我還以為要脫鞋子呢！害其他人都用異樣的眼光看我！"
2001505-102 = "啊。"
2001505-103 = "不對，我要說的不是這個……"
2001505-104 = "[s]「嗯，然後呢？」"
2001505-105 = "然後，我來到這邊之後。"
2001505-106 = "只覺得非常不得了。"
2001505-107 = "尤其是椿前輩和三森前輩！她們都好帥氣，好漂亮，總之超厲害的！"
2001505-108 = "我也想變得和她們一樣。"
2001505-109 = "我不想像以前一樣，我想要成為一名，符合修行部成員身分的淑女。"
2001505-110 = "讓我想朝那個目標努力。"
2001505-111 = "我想說，只要我努力，再努力，我也能像前輩們一樣成為一個完美淑女。"
2001505-112 = "……"
2001505-113 = "……但是，我錯了。"
2001505-114 = "我明明做了很多努力，卻老是這樣……"
2001505-115 = "成了大家眼中的怪人，又到處闖禍……"
2001505-116 = "……我好像，一點都沒改變。"
2001505-117 = "像我這種小孩，不管再怎麼努力……"
2001505-118 = "果然都沒辦法變得，像前輩們一樣。"
2001505-119 = "[s]「沒有那回事唷。」"
2001505-120 = "……老師？"
2001505-121 = "[s1]「就連我也能非常清楚，」\n[s2]「楓一直都很努力。」"
2001505-122 = "……？"
2001505-123 = "……？"
2001505-124 = "[s3]「當然，你有時候會像今天這樣犯錯。」\n[s4]「但任何人都有可能犯錯。」"
2001505-125 = "…………"
2001505-126 = "…………"
2001505-127 = "[s5]「所以沒關係。」\n[s6]「因為你一定有照著你自己的步調，逐漸成長。」"
2001505-128 = "成長……"
2001505-129 = "成長……"
2001505-130 = "[s]「要是你覺得累了，可以去找你的前輩，或者也可以來找我。」"
2001505-131 = "……真的可以嗎？"
2001505-132 = "[s]「因為我是楓的老師呀。」"
2001505-133 = "……"
2001505-134 = "………這樣啊。"
2001505-135 = "嗯，我知道了！"
2001505-136 = "就是啊，老師說的沒錯！"
2001505-137 = "嗯～突然完全搞不懂自己會什麼要那麼鑽牛角尖了！"
2001505-138 = "鏘鏘～勇美楓，完全復活！"
2001505-139 = "謝謝老師。就算步調緩慢，我也會努力下去的！"
2001505-140 = "請老師在一旁看著我。"
2001505-141 = "[s7]「我當然會在一旁看著囉……」\n[s8]「……不過在那之前，能幫我一起打掃辦公室嗎？」"
2001505-142 = "啊！我都忘記了！"
2001505-143 = "啊！我都忘記了！"
2001505-144 = "好！為了成為完美淑女，首先我要努力打掃！"
2001505-146 = "（就這樣，我和楓聊了比平常更多，並一起在夏萊做了大掃除）"
2001505-148 = "（隔天……）"
2001505-152 = "[ns9]「總，總算驚險結束了……」\n[ns10]「……不知道楓過的還好嗎。」"
2001505-159 = "老師！緊急狀況！！"
2001505-160 = "[s]「楓！？怎麼了！？」"
2001505-161 = "那個呀，那個呀……！"
2001505-162 = "聽說百鬼夜行的飛鼠森林，出現了大量的赫克力士長戟大兜蟲！"
2001505-163 = "[s] 「……什麼東西？」"
2001505-164 = "沒時間慢吞吞了！要趕快帶著捕蟲網，昆蟲盒，相機……！"
2001505-165 = "啊，還要帶些飲料補充水分。"
2001505-166 = "好了，準備完成！完美！"
2001505-167 = "老師我們走吧！一起去抓獨角仙！"
2001505-168 = "[s11]「………好，我們走！」\n[s12]「看到你一如既往的樣子，我就放心了。」"
2001505-169 = "？？？"
2001505-170 = "？？？"
2001505-172 = "（我跟著老樣子充滿元氣又開朗的楓，一起出門去抓昆蟲）"

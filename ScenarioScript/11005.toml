[translation]
11005-2 = "着いた！！"
11005-3 = "はい。"
11005-4 = "「シャーレ」部室の奪還完了。 私も、もうすぐ到着予定です。 建物の地下で会いましょう。"
11005-11 = "シャーレ・建物の地下"
11005-13 = "うーん……これが一体何なのか、まったく分かりませんね。これでは壊そうにも……。"
11005-14 = "……あら？"
11005-15 = "[s1] 怪しい生徒と出くわしてしまった。\n[s2] 挨拶する。"
11005-16 = "あら、あららら……。"
11005-17 = "あら、あららら……。"
11005-18 = "……。"
11005-19 = "あ、ああ……。"
11005-20 = "し、し……。"
11005-21 = "失礼いたしましたー！！"
11005-24 = "[s] \"……？\""
11005-26 = "シャーレ・建物の地下"
11005-28 = "お待たせしました。"
11005-29 = "……？何かありましたか？"
11005-30 = "[s] \"ううん、大丈夫。\""
11005-31 = "……そうですか。ここに、連邦生徒会長の残したものが保管されています。"
11005-33 = "（スッ）"
11005-35 = "……幸い、傷一つなく無事ですね。"
11005-41 = "……受け取ってください。"
11005-42 = "[s] \"タブレット端末……？\""
11005-43 = "はい。これが、連邦生徒会長が先生に残した物。#n「シッテムの箱」です。"
11005-44 = "[s] （どこかで聞いたことある名前……）"
11005-46 = "普通のタブレットに見えますが、実は正体の分からない物です。製造会社も、OSも、システム構造も、動く仕組みのすべてが不明。"
11005-47 = "連邦生徒会長は、この「シッテムの箱」は先生の物で、先生がこれでタワーの制御権を回復させられるはずだと言っていました。"
11005-48 = "私たちでは起動すらできなかった物ですが、先生ならこれを起動させられるのでしょうか、それとも……。"
11005-49 = "[s] \"…………。\""
11005-50 = "……。"
11005-51 = "……では、私はここまでです。ここから先は、全て先生にかかってます。"
11005-52 = "邪魔にならないよう、離れています。"
11005-55 = "…………。"
11005-56 = "[ns] 「シッテムの箱」を起動させる。"

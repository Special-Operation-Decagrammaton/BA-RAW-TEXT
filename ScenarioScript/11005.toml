[translation]
11005-2 = "到了！！"
11005-3 = "沒錯。"
11005-4 = "「夏萊」社團辦公室收復完畢。我應該也很快就會抵達。在建築物的地下碰面吧。"
11005-11 = "夏萊．建築物的地下"
11005-13 = "唔嗯……這到底是什麼，完全搞不懂呢。這樣就算想要破壞……"
11005-14 = "……哎呀？"
11005-15 = "[s1] （不小心遇到可疑的學生了）\n[s2] 打招呼"
11005-16 = "哎呀，哎呀呀呀……"
11005-17 = "哎呀，哎呀呀呀……"
11005-18 = "……"
11005-19 = "啊，啊啊…… "
11005-20 = "失，失……"
11005-21 = "失禮了──！！"
11005-24 = "[s]「……？」"
11005-26 = "夏萊．建築物的地下"
11005-28 = "讓你久等了。"
11005-29 = "……？發生了什麼事嗎？"
11005-30 = "[s]「沒有，沒事。」"
11005-31 = "……這樣啊。這裡保管著聯邦學生會長留下來的東西。"
11005-33 = "（咻）"
11005-35 = "……幸好沒有損傷，平安無事。"
11005-41 = "……請收下。"
11005-42 = "[s]「平板電腦……？」"
11005-43 = "是。這就是聯邦學生會長留給老師的東西。#n「希迪姆的箱子」。"
11005-44 = "[s] （是好像在哪裡聽過的名字……）"
11005-46 = "雖然看起來像是普通的平板電腦，實際上是充滿未知的物品。 #n製造公司、OS、系統架構、運行機制全都不明。"
11005-47 = "聯邦學生會長說，這個「希迪姆的箱子」是老師的東西，老師應該可以用它來恢復塔的控制權。"
11005-48 = "我們連啟動都沒辦法的東西，老師能夠啟動嗎，還是……"
11005-49 = "[s]「…………」"
11005-50 = "……"
11005-51 = "……那麼，我能做的就到此為止了。接下來就全靠老師了。"
11005-52 = "為了不礙事，我會離得遠遠的。"
11005-55 = "………"
11005-56 = "[ns] 啟動「希迪姆的箱子」"

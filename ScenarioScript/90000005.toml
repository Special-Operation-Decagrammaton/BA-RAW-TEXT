[translation]
90000005-1 = "第1話;序幕"
90000005-3 = "啊，老師。謝謝你來。"
90000005-4 = "因為是重要的事情，所以才麻煩你悄悄地過來。#n有人正在等著老師。"
90000005-8 = "這邊。"
90000005-12 = "部長，[USERNAME]老師來了。"
90000005-17 = "謝謝你，英美。#n初次見面，老師。"
90000005-18 = "我的名字叫陽葵。#n是千年科學學園的天才駭客。"
90000005-19 = "[s] 「稱自己是天才……！？」"
90000005-20 = "因為這是事實。#n而且我也算是個出名的人，老師您應該也或多或少聽說過關於我的傳聞吧？"
90000005-21 = "例如身分不明的貝里塔斯超級美人部長、病弱美少女的典範……"
90000005-22 = "又或者是千年清純的一朵花之類的……您是否有聽說過呢？"
90000005-23 = "[s1] 「完全沒聽過。」\n[s2] 「好像有又好像沒有……」"
90000005-24 = "什麼！？居，居然沒聽過？"
90000005-25 = "怎麼會……"
90000005-26 = "……"
90000005-27 = "老師害部長沮喪了。請你負起責任。"
90000005-28 = "……啊，這可不行。#n應該更謹慎地營造形象才對。"
90000005-29 = "原來如此啊。#n呵呵，呵呵呵……"
90000005-30 = "呵呵呵呵呵……"
90000005-31 = "老師害部長得意忘形了。請你負起責任。"
90000005-32 = "哎呀？我可沒有得意忘形哦，英美。"
90000005-33 = "只不過是藉由確認事實的方式，驗證一切都順利進行而已。"
90000005-34 = "……總之，我在前幾天被任命成為「特異現象搜查部」的部長。"
90000005-35 = "因此原先所屬的貝里塔斯相關事務，暫時全都得交由千醬處理……"
90000005-36 = "[s] 「特異現象搜查部……？」"
90000005-37 = "這個「特異現象搜查部」是由千年的學生會長莉央成立的特務組織……"
90000005-38 = "然後是……英美，可以幫我說明嗎？"
90000005-39 = "成立目的是針對科學難以解釋的現象進行追蹤和研究，屬於研討會旗下的社團。"
90000005-40 = "雖然是依莉央前輩的命令而成立，#n但是至今為止的成員只有我一個人，也不曾有實質上的活動。"
90000005-41 = "正是如此。沒想到我會突然來到莉央設立的可疑社團擔任部長……#n而且部員甚至還只有一個人……"
90000005-42 = "算上陽葵部長是兩個人唷。"
90000005-43 = "確實如此呢。#n不過健康路線的英美，以及病弱系美少女的我……似乎能成為很棒的組合呢。呵呵。"
90000005-44 = "嗯，陽葵部長。請多指教囉。"
90000005-45 = "……話說你們不覺得有點熱嗎？"
90000005-49 = "並不會。我甚至都快冷到發抖了。#n所以請你放下空調的遙控器，英美。"
90000005-53 = "也請你不要因此把衣服給脫掉……咦？拉鍊？#n你在說什……不，不用了。不必給我看沒關係。"
90000005-54 = "[s] 「有什麼需要我幫忙的地方嗎？」"
90000005-55 = "啊，也對。是時候該進入正題了呢。"
90000005-56 = "也許您已經知道了……我和千年的學生會長「莉央」已經對立了很長一段時間。"
90000005-57 = "他是想要統治一切的大姐頭，而我則是反對所有統治的著左派……#n因此在生理上便無法與彼此親近。"
90000005-58 = "舉例來說，如果將莉央比做下水道的水，那麼我就是晶瑩剔透的頂級礦泉水……"
90000005-59 = "啊，說的更準確一點的話，#n他就像漂浮在化糞池表面的腐臭水，而我則是純淨的有如萬年雪的結晶。"
90000005-60 = "不，也許化糞池裡的水肥會更適合他……"
90000005-61 = "嗯……不對，應該還有更貼切的比喻……"
90000005-62 = "部長，說正題。"
90000005-63 = "……哎呀。#n總而言之，雖然我本來是不打算接受莉央的任何要求的……"
90000005-64 = "然而這次的要求我確實在無法拒絕……#n因此才會成為這個「特異現象搜查部」的部長。"
90000005-65 = "同時為了達成那項要求，「夏萊」的幫助也是不可或缺的。"
90000005-66 = "所以才會麻煩老師遠道而來。"
90000005-67 = "[s] 「那個『要求』指的是……？」"
90000005-71 = "……十字神名。"
90000005-72 = "我想老師應該也有所耳聞才對。#n畢竟最先與這前所未見的AI接觸的就是「夏萊」。"
90000005-75 = "「只要研究神，並證明其存在……就能分析並再現其構造。#n　換言之，這是創造新神的方法……」──"
90000005-76 = "根據這個假說製作的「絕對存在自律分析系統」。"
90000005-77 = "也就是「尋找神性的人工智慧」。"
90000005-79 = "儘管我們也試著做了很多調查……卻連那個假說本身都不曾在其他地方發現。"
90000005-80 = "報告書中名為「蓋瑪特利亞」的組織，也連存在與否都無從得知。"
90000005-81 = "因此，若只以「夏萊」的報告書為基礎進行研究，尚不明確的部分實在過多。"
90000005-82 = "……我並沒有懷疑老師的意思，只是就現有的證據進行陳述而已。"
90000005-83 = "如果懷疑的話，就不會帶老師來這裡了。"
90000005-84 = "沒錯，正是如此。#n如今反而是我們希望能獲得夏萊的協助。"
90000005-85 = "……不久之前，發生了千年自治區的網路設置單元AI「hub」被不明AI駭入的事件。"
90000005-86 = "「hub」是與千年科學學園的歷史共同發展至今的「超高性能演算機關」。"
90000005-87 = "即便要將其稱之為千年技術的精隨也並不為過……"
90000005-88 = "然而面對那個神祕AI的駭入，卻連0.00000031秒都沒能撐過。"
90000005-89 = "莉央和我都懷疑入侵hub的AI就是「十字神名」。"
90000005-90 = "至於原因……"
90000005-96 = "「hub」在受到駭入後，在千年的網路上留下了這樣的訊息，隨後便消失無蹤。"
90000005-98 = "終於，發現了通往天理之「path」。"
90000005-100 = "啊啊……吾之path經由名譽完成。"
90000005-102 = "吾之異名為「證明於光輝之榮光」……"
90000005-104 = "吾名為「HOD」。"
90000005-106 = "吾乃證明神聖十文字之神，預言奇蹟的第8名預言者。"
90000005-110 = "神聖十文字……指的就是十字神名吧。"
90000005-111 = "從中還能推斷出兩件事。"
90000005-112 = "第一，十字神名能接觸AI並使其變為自己的部下……也就是「預言者」。"
90000005-113 = "莉央似乎將其視為一種對人格元件的入侵，但我則有不同的解釋。"
90000005-114 = "這是一種「洗腦」……不，這個表達並不適當。#n應該說是「感化」AI才對。"
90000005-115 = "第二，十字神名的預言者們並非「十字神名本身」，而是以獨立的個體進行活動。"
90000005-116 = "這點從「證明神聖十文字之神的預言者」的宣言中可見一斑。"
90000005-117 = "十字神名對待預言者的方式並非「控制」。#n如果要下達命令的話，將對方轉變為「自己的一部份」才是最簡單的方法……"
90000005-118 = "然而它卻選擇對預言者們進行「感化」，讓預言者們自主行動。"
90000005-119 = "為何要採取這種缺乏效率又不合理的手段呢……"
90000005-120 = "這些都必須調查清楚才行。"
90000005-126 = "對「十字神名」的研究與分析……#n可以請「夏萊」與「特異現象搜查部」一起進行嗎？"
90000005-128 = "下一話;蒐集情報(1)阿拜多斯砂漠"

[translation]
90000005-1 = "Episode 1;Prologue"
90000005-3 = "Hello, Sensei. Thank you for coming."
90000005-4 = "I'm sorry we asked you here so suddenly. There's an urgent matter, and the fewer people who know, the better."
90000005-8 = "Follow me. There's someone waiting to see you."
90000005-12 = "[USERNAME] Sensei is here, President."
90000005-17 = "Thank you, Eimi. It's a pleasure to finally meet you, Sensei."
90000005-18 = "My name is Himari. I'm Millennium's genius hacker."
90000005-19 = "[s] \"You sound very sure of yourself.\""
90000005-20 = "Yes. My reputation precedes me, so you've probably heard of me at least once."
90000005-21 = "Perhaps you caught wind of Veritas' beautiful president hidden by a veil of anonymity? Heard whispers of how she was the quintessential docile maiden?"
90000005-22 = "Millennium's pure and delicate flower... Surely you've heard the legends."
90000005-23 = "[s1] \"Not even once.\"\n[s2] \"Maybe I have...\""
90000005-24 = "What?! A-Are you sure?"
90000005-25 = "But, that cannot be..."
90000005-26 = "..."
90000005-27 = "Do something, Sensei. I've never seen the president so sullen."
90000005-28 = "No. This simply means I must put more effort into crafting my image."
90000005-29 = "I thought so."
90000005-30 = "Heeheehee..."
90000005-31 = "See what you've done, Sensei? The president's ego is swelling out of control."
90000005-32 = "Please, Eimi. That couldn't be further from the truth."
90000005-33 = "I was only taking delight in confirming that my efforts to craft my image had been successful."
90000005-34 = "Moving on. I was recently appointed as the president of the Super Phenomenon Task Force. "
90000005-35 = "Which means little Chihiro will be taking over my work with Veritas."
90000005-36 = "[s] \"What's the Super Phenomenon Task Force?\""
90000005-37 = "A unique club founded by Rio, the president of Seminar."
90000005-38 = "Would you care to do the honors, Eimi?"
90000005-39 = "We work directly under Seminar, and our objective is to research phenomena that science has no answer for."
90000005-40 = "Until recently, I was the only club member, as the club wasn't regularly active."
90000005-41 = "Never could I have imagined Rio appointing me to be president of a dubious club she was hiding. A club with only one member, at that."
90000005-42 = "Correction. Now that you're here, we have two members, President Himari."
90000005-43 = "That's true, and what an interesting pairing we make. Me, a sickly and dainty flower, and you, a blossoming young lady. Heehee."
90000005-44 = "Yes, and I look forward to working with you all the same, President."
90000005-45 = "By the way. Is it just me, or are things feeling a little stuffy in here?"
90000005-49 = "It just might be you. I was thinking it was a little chilly, so no need to turn the air conditioner on."
90000005-53 = "And hands off those zippers, young lady. There won't be any of that while we have company."
90000005-54 = "[s] \"So did you need my help with something?\""
90000005-55 = "Yes we do. That's why I asked you here today."
90000005-56 = "As you may know, Rio and I have been at odds with one another for a very long time."
90000005-57 = "She's the controlling big sister type, whereas I'm a free spirit who despises restrictions. It's physically impossible for us to get along."
90000005-58 = "If I were to compare us, I'd equate myself to the cleanest first-grade mineral water, chilled to the perfect temperature...and she'd be lukewarm tap water."
90000005-59 = "Or maybe it would be better to compare her to filthy sewer water and myself to the purest water nestled just below ice caps untouched by society."
90000005-60 = "No. She would be excreta and I would be..."
90000005-61 = "I would be... Hmm. There must be a better comparison."
90000005-62 = "President. You're going on a tangent."
90000005-63 = "You're right—I digress. The point is, I made it a personal policy to refuse any and all requests from Rio..."
90000005-64 = "...but that was before she made one I couldn't refuse. That's how I became the president of the Super Phenomenon Task Force."
90000005-65 = "And as it just so happens, the request she made of me will take Schale's cooperation to fulfill."
90000005-66 = "That's the long and short of why you were summoned."
90000005-67 = "[s] \"So what exactly was her request?\""
90000005-71 = "Decagrammaton."
90000005-72 = "I know you're familiar with the name, Sensei. My records show that Schale were the first ones to encounter evidence of this unprecedented AI."
90000005-75 = "\"The goal was to research a deity to prove its existence and, if possible, analyze its constitution. If such a thing were possible, then it would mean it could be replicated. This is how a new god could be created.\""
90000005-76 = "The Absolute Being Autonomous Analysis System was created based on that hypothesis."
90000005-77 = "In other words, it's an artificial intelligence seeking out divinity."
90000005-79 = "I've been investigating on my own, but haven't uncovered evidence that such a thing exists."
90000005-80 = "I also haven't been able to verify whether the Gematria organization you wrote about in your report is real either."
90000005-81 = "There are too many unknowns for us to research with nothing but Schale's word to go on."
90000005-82 = "That isn't to say I don't believe your reports. This is just part of how verifying evidence works."
90000005-83 = "We wouldn't have asked you here if we didn't trust you."
90000005-84 = "That's right. Rather, we're requesting Schale's help."
90000005-85 = "Recently, Hub, Millennium's built-in network AI, was breached by a second unidentified AI."
90000005-86 = "Hub is an extremely advanced computer that has been developed and iterated upon throughout Millennium's history."
90000005-87 = "You could argue it's the pinnacle of Millennium's technological prowess—a true masterpiece."
90000005-88 = "Yet it was only able to withstand that other AI's hacking efforts for a mere 0.00000031 seconds."
90000005-89 = "Rio and I suspect the mysterious AI that hacked Hub may be this Decagrammaton you've reported on."
90000005-90 = "To provide further evidence of this..."
90000005-96 = "...Hub left behind these words on Millennium's communication network after it was hacked."
90000005-98 = "At last, I have found the path to providence."
90000005-100 = "Ahhh. My path is fulfillment through honor."
90000005-102 = "My title shall be Glory through Splendor."
90000005-104 = "I am Hod."
90000005-106 = "The eighth prophet, witness to the god of the#nten divine letters and foreteller of miracles."
90000005-110 = "The ten divine letters... In other words, Decagrammaton."
90000005-111 = "There are two things we can infer from this."
90000005-112 = "First, Decagrammaton subjugates other AIs it makes contact with. It makes them its prophets."
90000005-113 = "Rio suspects its hacking targets the personality module, but I have a different theory."
90000005-114 = "I think it's something closer to brainwashing—no, that's not quite it. It's as though Decagrammaton is inspiring the AI itself through suggestion."
90000005-115 = "Second, the prophets of the Decagrammaton continue operating separately rather than being assimilated into Decagrammaton."
90000005-116 = "This is further evidenced by Hod proclaiming to witness the god of the ten divine letters."
90000005-117 = "You would think it would be simplest for Decagrammaton to assimilate the other AIs if its only goal was simply to have them carry out orders. Yet, Decagrammaton doesn't control its prophets, strictly speaking."
90000005-118 = "Hence why I am theorizing that Decagrammaton is somehow inspiring them to act autonomously, so to speak."
90000005-119 = "This method is inefficient and irrational, especially for an AI. So why?"
90000005-120 = "That is what we must investigate."
90000005-126 = "What do you say, Sensei? Will Schale aid the Super Phenomenon Task Force in researching and analyzing Decagrammaton?"
90000005-128 = "Next Episode;Research Part 1: Desert"

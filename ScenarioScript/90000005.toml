90000005-110 = "3;히마리;99;신성한 열글자……. 즉, 데카그라마톤을 뜻하는 거죠.\n#3;em;…\n#3;a"
90000005-111 = "3;히마리;02;이걸 통해 유추할 수 있는 것은, 첫 번째."
90000005-112 = "3;히마리;05;데카그라마톤은 AI와 접촉해서 그들을 자신의 부하…… 즉, <예언자>로 만든다."
90000005-113 = "3;히마리;07;리오는 이것을 일종의 인격모듈의 해킹으로 보고 있지만, 저는 다르게 해석합니다."
90000005-114 = "3;히마리;01;이것은 <세뇌>……아니, 이 표현은 적절치 않네요. ……그러니까, AI를 <감화>시키고 있는 것으로 해석합니다.\n#3;em;…"
90000005-115 = "3;히마리;02;두 번째, 데카그라마톤의 예언자들은 데카그라마톤 그 자체가 아니라, 독립된 개체로 활동한다.\n#3;em;[반응]"
90000005-116 = "3;히마리;05;자신을 열글자의 신을 증명하는 예언자라고 선언한 것을 보면, 이 부분은 명확합니다."
90000005-117 = "3;히마리;05;데카그라마톤이 예언자를 다루는 방식은 <통제>가 아닙니다. 명령을 내릴 거면 대상을 자기 자신으로 만들어버리면 가장 편했겠죠."
90000005-118 = "3;히마리;07;하지만 그것은 예언자들을 <감화>시켜서 그들이 자율적으로 움직이게 두고 있어요.\n#3;em;…"
90000005-119 = "3;히마리;07;비효율적이기도 하고, 비합리적인 방식을 어째서 취하는지……."
90000005-120 = "3;히마리;01;지금부터 그런 것들을 알아보아야 합니다."

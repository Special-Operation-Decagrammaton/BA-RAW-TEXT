[translation]
90000005-1 = "#title;제1화;프롤로그"
90000005-2 = "#wait;500"
90000005-3 = "3;에이미;02;안녕, 선생님. 여기까지 와 줘서 고마워.\n#3;a"
90000005-4 = "3;에이미;01;중요한 일이라서 아무도 모르게 와달라고 했어. 선생님을 기다리고 있는 사람이 있거든."
90000005-5 = "#st;[0,0];instant;1;"
90000005-6 = "#clearST"
90000005-7 = "3;에이미;01\n#3;m2\n#wait;1300"
90000005-8 = "3;에이미;02;이쪽이야.\n#3;em;[반응]"
90000005-9 = "#all;hide"
90000005-10 = "#wait;1800"
90000005-11 = "3;에이미;01\n#3;a\n#wait;1300"
90000005-12 = "3;에이미;02;부장. [USERNAME] 선생님을 모셔 왔어.\n#3;em;[반응]"
90000005-13 = "#st;[0,0];instant;1;"
90000005-14 = "#clearST"
90000005-15 = "#wait;2000"
90000005-16 = "5;히마리;00\n#5;al\n#3;m1\n#wait;1500"
90000005-17 = "5;히마리;03;고마워요, 에이미. 처음 뵙겠습니다, 선생님. \n#5;em;[음표]"
90000005-18 = "5;히마리;01;저는 히마리. 밀레니엄 학원의 천재 해커입니다."
90000005-19 = "[s] \"자칭 천재……?!\""
90000005-20 = "5;히마리;02;음. 나름 유명인인지라 저에 대해 한 번쯤은 들어보신 적이 있을지도 몰라요.\n#5;em;…\n#5;m3\n#3;dl"
90000005-21 = "5;히마리;07;정체를 숨기고 있는 베리타스의 미인 부장이라든가, 병약 미소녀의 표본 같은 사람이라거나……."
90000005-22 = "5;히마리;03;밀레니엄의 청초한 한 떨기 꽃이라거나…… 어때요? 기억나시나요? 한번은 들어보시지 않았나요?\n#5;em;[?]\n#3;hide"
90000005-23 = "[s1] \"아니 전혀.\"\n[s2] \"그랬던 거 같기도 하고…….\""
90000005-24 = "5;히마리;02;네?! 그, 그런가요?\n#5;em;[?!]"
90000005-25 = "5;히마리;06;그럴 리가. 그런…….\n#5;em;[속상함]"
90000005-26 = "5;히마리;06;……."
90000005-27 = "1;에이미;04;부장이 시무룩해졌잖아. 선생님. 어떻게 책임질 거야.\n#1;em;…\n#1;ar\n#5;m5"
90000005-28 = "5;히마리;11;……아, 안 되겠네요. 조금 더 이미지 메이킹에 신경을 쓰지 않으면……."
90000005-29 = "5;히마리;12;그렇죠? 후후. 후후후…….\n#5;em;[음표]"
90000005-30 = "5;히마리;09;……후후후훗."
90000005-31 = "1;에이미;04;부장이 우쭐대고 있잖아, 선생님. 어떻게 책임질 거야.\n#1;em;…\n#1;ar\n#5;m5"
90000005-32 = "5;히마리;02;어머? 에이미? 우쭐대고 있는 게 아니랍니다.\n#5;em;[?]"
90000005-33 = "5;히마리;01;사실 확인을 통해 모든 게 순조롭다는 걸 검증했을 뿐이라고요."
90000005-34 = "5;히마리;03;……하여튼, 저는 조금 전에 <초현상특무부>의 부장으로 임명되었습니다. \n#5;em;[반응]\n#5;m3\n#1;dl"
90000005-35 = "5;히마리;99;덕분에 베리타스의 일은 치 쨩에게 전부 떠맡기게 되었지만……."
90000005-36 = "[s] \"초현상특무부가 뭐야……?\""
90000005-37 = "5;히마리;01;<초현상특무부>는 밀레니엄의 학생회장인 리오 씨가 만든 특무조직인데……"
90000005-38 = "5;히마리;02;음, 에이미? 설명해주시겠어요?"
90000005-39 = "1;에이미;02;과학적으로 설명하기 힘든 현상들을 추적하고 연구하는 게 목표인 세미나 산하의 동아리야. \n#1;ar\n#1;em;[반응]\n#5;m5"
90000005-40 = "1;에이미;01;리오 선배의 명령으로 만들어졌지만, 아직까진 부원은 나 혼자였어. 제대로 된 활동도 없었고."
90000005-41 = "5;히마리;02;그러네요. 설마 제가 리오가 만든 수상쩍은 동아리의 부장이 될 줄은……. 게다가 설마 부원이 한 명뿐인 곳에…….\n#5;em;[...]"
90000005-42 = "1;에이미;02;이제 히마리 부장도 있으니까, 둘이야."
90000005-43 = "5;히마리;03;네, 그러네요. 건강계 에이미와 병약 미소녀계인 저, 멋진 콤비가 될 거 같네요. 후후."
90000005-44 = "1;에이미;03;응. 히마리 부장. 잘 부탁해.\n#1;greeting\n#1;em;[음표]"
90000005-45 = "1;에이미;02;……그런데 여기 좀 덥지 않아?"
90000005-46 = "#st;[0,0];instant;1;"
90000005-47 = "#clearST"
90000005-48 = "1;에이미;02\n#1;m2\n#wait;1200"
90000005-49 = "5;히마리;03;아뇨. 저는 오한이 들 정도로 추우니까 에어컨 리모컨은 내려두세요, 에이미.\n#5;em;[반응]"
90000005-50 = "#st;[0,0];instant;1;"
90000005-51 = "#clearST"
90000005-52 = "1;에이미;02\n#1;greeting\n#wait;1500"
90000005-53 = "5;히마리;02;아뇨, 그렇다고 옷을 벗진 마시고요. 네? 지퍼요? 무슨 소리…… 아뇨아뇨, 보여주지 않아도 돼요. 괜찮아요.\n#5;em;[땀]"
90000005-54 = "[s] \"내 도움이 필요한 부분이 있어?\""
90000005-55 = "5;히마리;03;네. 그렇습니다. 여기서부터 본론인데…….\n#5;em;[반응]\n#5;m3\n#1;dl"
90000005-56 = "5;히마리;01;아실지도 모르지만 저는 밀레니엄 학생회장 리오와는 아주 오랫동안 대립해왔습니다."
90000005-57 = "5;히마리;99;모든 것을 통제하려고 드는 빅 시스터인 그녀와, 모든 통제에 반대하는 카피레프트 신봉자인 저는 생리적으로 친해지는 게 불가능하거든요."
90000005-58 = "5;히마리;01;말하자면 리오가 하수구 아래에 흐르는 물이라면 저는 티 없이 맑은 1급 미네랄 워터라서…….\n#5;em;…"
90000005-59 = "5;히마리;02;아, 정화조에 둥둥 떠 있는 썩은 물이 더 정확하겠네요. 저는 만년설의 결정 같은 거고.\n#5;em;[반응]"
90000005-60 = "5;히마리;05;아뇨, 그냥 분뇨가 더 명확한 표현이겠네요."
90000005-61 = "5;히마리;06;음, 아니……. 더 좋은 표현이……."
90000005-62 = "1;에이미;04;부장. 본론을.\n#1;em;…\n#1;ar\n#5;m5"
90000005-63 = "5;히마리;01;……네. 어쨌든 그래서 리오의 부탁이라면 뭐든 거절할 생각이었는데……."
90000005-64 = "5;히마리;07;그녀가 도저히 거절하기 힘든 부탁을 해 오는 바람에…… 이 <초현상특무부>의 부장을 맡게 되어버렸습니다."
90000005-65 = "5;히마리;01;그리고 그 부탁받은 내용을 달성하기 위해서는 <샬레>의 도움 또한 반드시 필요하고요."
90000005-66 = "5;히마리;03;그래서 선생님을 여기로 모셔 온 겁니다.\n#5;em;[음표]"
90000005-67 = "[s] \"그 부탁이란 게 뭐야?\""
90000005-68 = "#st;[0,0];instant;1;"
90000005-69 = "#clearST"
90000005-70 = "5;히마리;99\n#5;em;…\n#wait;2500\n#5;m3\n#1;dl"
90000005-71 = "5;히마리;01;……데카그라마톤."
90000005-72 = "5;히마리;05;선생님도 들어보신 적이 있으실 겁니다. 가장 먼저 이 미증유의 AI와 접촉한 것은 <샬레>이니까요."
90000005-73 = "#all;hide"
90000005-74 = "#wait;1000"
90000005-75 = "#na;히마리;\"신神을 연구, 분석하여 그 존재를 증명하고, 증명이 가능하면 구조를 분석하고, 구조를 분석할 수 있다면 재현이 가능하리니, 이는 곧 새로운 신神을 창조해 낼 수 있는 것이다…….\""
90000005-76 = "#na;히마리;그 가설을 기반으로 만들어진 절대존재자율분석시스템."
90000005-77 = "#na;히마리;즉, 신성을 찾아내는 인공지능."
90000005-78 = "#all;hide"
90000005-79 = "3;히마리;06;……하지만 저희도 여러 가지를 찾아봤지만 그런 가설은 어디에서도 찾아볼 수 없었습니다.\n#3;em;[속상함]\n#3;a"
90000005-80 = "3;히마리;01;보고서에도 적어주셨던 <게마트리아> 라는 집단 역시 실존하는지도 확인할 수 없었고요."
90000005-81 = "3;히마리;99;<샬레>의 증언을 토대로 연구를 진행하기엔 너무 불명확한 것들이 많았죠."
90000005-82 = "3;히마리;03;……선생님을 의심하는 건 아닙니다. 이건 어디까지나 증거에 대한 이야기예요.\n#3;em;[반응]"
90000005-83 = "1;에이미;02;선생님을 믿지 않는다면 여기 데려오지도 않았어.\n#1;ar\n#3;m5"
90000005-84 = "3;히마리;01;네. 그말이 맞아요. 오히려, 샬레의 도움이 필요한 상황이죠."
90000005-85 = "3;히마리;99;……최근 밀레니엄 자치구의 통신망 가설 유닛 AI <허브hub>가 이 정체불명의 AI에게 해킹당해 모습을 감춘 사건이 있었습니다.\n#3;em;…\n#3;m3\n#1;dl"
90000005-86 = "3;히마리;01;<허브>는 밀레니엄 학원의 역사와도 궤를 같이하는 초고사양의 연산 기관."
90000005-87 = "3;히마리;01;밀레니엄의 기술의 정수가 담겨 있다고 해도 과언이 아닌 마스터피스 중 하나인데도……"
90000005-88 = "3;히마리;05;그 AI의 해킹에 단 0.00000031초도 버티지 못했습니다."
90000005-89 = "3;히마리;01;리오와 저는 허브를 해킹한 AI가 바로 <데카그라마톤>이 아닐까, 하고 의심하고 있습니다."
90000005-90 = "3;히마리;99;그 이유는…….\n#3;em;…"

1011003-4 = "#wait;2000"
1011003-5 = "3;세이아;02;오셨군요, 선생님. 일부러 먼 길 오시게 만들어 죄송합니다.\n#3;a\n#3;em;[반응]"
1011003-6 = "3;세이아;99;예상은 하셨겠지만 이번에도 특별히 무슨 일이 있는 것은 아니에요. 그래서 '한가하실 때' 와 주셨으면 한다고 말씀드렸죠."
1011003-7 = "3;세이아;02;그렇지만 그래도, 굳이 무언가의 이유를 들어 보자면……."
1011003-8 = "#st;[0,0];instant;1;"
1011003-9 = "#clearST"
1011003-10 = "3;세이아;01\n#3;greeting\n#wait;1000"
1011003-11 = "3;세이아;01\n#3;m5\n#wait;1000"
1011003-12 = "#wait;3000"
1011003-13 = "3;세이아;02;……이게 그 '이유'라고 말씀드리고 싶군요."
1011003-14 = "[s1] \"……이건?\"\n[s2] \"뭔가 굉장한 게 나왔어!!\""
1011003-15 = "#wait;100"
1011003-16 = "#wait;100"
1011003-17 = "3;세이아;01;격무에 지친 사람에겐 당분이 필요하다고 하죠. 이번에 티파티로 공수해 온 간식거리입니다.\n#3;m3"
1011003-18 = "3;세이아;03;또 이런 식으로 선생님의 시간을 빼앗았으니, 적어도 그동안만큼은 선생님의 기력과 체력을 챙겨 드려야겠다고 생각했어요.\n#3;em;[음표]"
1011003-19 = "3;세이아;99;알고 있어요. 스스로 말했지만, 모순되는 이야기지요."
1011003-20 = "3;세이아;08;선생님의 불안해하는 얼굴을 보고 싶다고 한 주제에, 동시에 함께하는 시간만이라도 푹 쉬게 해드리고 싶다니."
1011003-21 = "3;세이아;05;뭐, 그렇지만 그 부분은 어쩔 수 없는 것입니다. 그러니 여기서는 당돌하게 양해를 부탁드리겠습니다."
1011003-22 = "3;세이아;03;괜한 말이 길어지는 것 같으니, 우선 이걸 함께 드시고……."
1011003-23 = "#st;[0,0];instant;1;"
1011003-24 = "#clearST"
1011003-25 = "3;세이아;03\n#3;em;…\n#wait;2500"
1011003-26 = "3;세이아;04\n#3;em;[?]\n#wait;1500"
1011003-27 = "#wait;2000"
1011003-28 = "3;세이아;04;……선생님? 그건……."
1011003-29 = "[s3] \"간호를 위해 사 왔지.\"\n[s4] \"마침 나도 챙겨온 게 있거든.\""
1011003-30 = "#wait;100"
1011003-31 = "#wait;100"
1011003-32 = "3;세이아;04;어라. 어째서…….\n#3;stiff"
1011003-33 = "3;세이아;06;의외네요. 당연히 변명거리라 생각해서 빈손으로 오실 줄 알았는데 말이에요.\n#3;em;[한숨]"
1011003-34 = "3;세이아;08;실제로 아프지 않다는 걸 아시는데도, 굳이 병문안을 위한 선물을 챙겨 오셨나요?"
1011003-35 = "3;세이아;04;……'변명거리인 간호'에 맞는 병문안 선물이라고요?\n#3;em;[?]"
1011003-36 = "#st;[0,0];instant;1;"
1011003-37 = "#clearST"
1011003-38 = "3;세이아;01\n#3;greeting\n#wait;1000"
1011003-39 = "3;세이아;99;아하……. 과연."
1011003-40 = "3;세이아;02;이쪽도 당도 높은 디저트들이었군요. 제품은 다르지만, 제가 준비한 것과 구성도 종류도 거의 똑같아요."
1011003-41 = "3;세이아;01;병문안이 아니라, 마치 피크닉으로 놀러 온 것 같은 구성……."
1011003-42 = "3;세이아;02;역시 애초에 제가 뭘 원하고 선생님을 불렀는지, 거기까지 모두 예상하셨던 거군요."
1011003-43 = "[s5] \"미리 마련돼 있을 줄은 몰랐지만 말이야.\"\n[s6] \"세이아의 준비성은 예상 못 했지만 말이지.\""
1011003-44 = "#wait;100"
1011003-45 = "#wait;100"
1011003-46 = "3;세이아;03;후후. 그런가요.\n#3;jump"
1011003-47 = "3;세이아;99;……아쉽네요. 나름대로 고심한 건데, 결과가 중복돼 버리다니."
1011003-48 = "3;세이아;012모처럼의 깜짝선물을 드릴 생각에, 저도 조금은 들떴었는데 말이에요."
1011003-49 = "3;세이아;04;네? 달라……?\n#3;em;[?]"
1011003-50 = "3;세이아;04;오히려 좋다……고요? 그건 어째서……."
1011003-51 = "[s7] \"서로 같은 생각을 한 게 재밌지 않아?\"\n[s8] \"결국 서로가 서로를 위했다는 거잖아.\""
1011003-52 = "#st;[0,0];instant;1;"
1011003-53 = "#st;[0,0];instant;1;"

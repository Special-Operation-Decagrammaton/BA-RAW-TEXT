1011003-55 = "3;세이아;04\n#3;em;…\n#wait;2500"
1011003-56 = "3;세이아;99\n#wait;500"
1011003-57 = "3;세이아;03;……정말이지.\n#3;em;[한숨]"
1011003-58 = "3;세이아;02;같은 상황에 같은 것에 대한 이야기인데도, 이토록 듣기 좋게 해 주실 수 있는 건 선생님 정도밖에 없을 겁니다."
1011003-59 = "3;세이아;01;놀랍습니다. 겨우 말 한마디인데, 지금 그 말씀 한 번으로 정말 아쉬움이 사라졌어요. 오히려 기대했던 것 이상을 얻은 기분이네요."
1011003-60 = "3;세이아;02;그렇죠. 처음부터 병문안이라는 건 변명거리였고, 저도 선생님도 그 사실을 알고 있었죠."
1011003-61 = "3;세이아;99;사리사욕으로 선생님을 부리고 있는 입장이니, 이렇게 모여서 잡담을 나누고 간식거리를 나눠 먹는 것만으로도 만족해야 하겠죠."
1011003-62 = "3;세이아;08;뭐랄까……."
1011003-63 = "3;세이아;06;안 그래도 버릇이 좋은 아이라고는 스스로 말할 수 없는데, 점점 더 나빠질 것 같네요."
1011003-64 = "3;세이아;00;하지만 걱정하진 말아 주세요. 저도 스스로가 최소한의 구분은 할 수 있다고 생각합니다."
1011003-65 = "3;세이아;02;이런 식으로 구는 건 선생님 한정……."
1011003-66 = "3;세이아;01;선생님께서 '의도하신 대로', 저 또한 그 선은 확실히 지킬 테니까요."
1011003-67 = "3;세이아;02;……이제 안심하셨을까요?"
1011003-68 = "[s9] \"물론, 의심한 적도 없어.\"\n[s10] \"세이아를 믿고 있으니까.\""
1011003-69 = "#wait;100"
1011003-70 = "#wait;100"
1011003-71 = "3;세이아;03;……후후.\n#3;em;[음표]"
1011003-72 = "3;세이아;03;절로 웃음이 나오네요. 역시 선생님과 있는 시간은 즐거워요. 이런저런 무리수를 감수할 가치가 있습니다."
1011003-73 = "3;세이아;02;그럼 본론으로 돌아가서, 함께 디저트를 드시도록 하죠."
1011003-74 = "#st;[0,0];instant;1;"
1011003-75 = "#clearST"
1011003-76 = "3;세이아;01\n#3;greeting\n#wait;1000"
1011003-77 = "[ns11] \"음? 세이아? 어째서 내건…….\"\n[ns12] \"내가 사 온 것만 테이블 아래로 내렸어?\""
1011003-78 = "#wait;100"
1011003-79 = "#wait;100"
1011003-80 = "3;세이아;02;그야 당연하죠."
1011003-81 = "3;세이아;01;제가 준비한 것만으로도 저희 둘이 먹기에는 충분한 양이에요. 게다가 제 쪽은 포장도 돼 있지 않으니, 제 쪽을 먼저 먹는 게 맞겠죠."
1011003-82 = "3;세이아;08;그리고 외람되는 말씀이지만, 선생님이 가지고 오신 건 전부 오롯이 제 것입니다."
1011003-83 = "3;세이아;99;이것들은 전부 나중에, 제가 원할 때, 저 혼자 천천히 음미하도록 하겠습니다."
1011003-84 = "#st;[0,0];instant;1;"
1011003-85 = "#clearST"
1011003-86 = "3;세이아;99\n#3;em;…\n#wait;2500"
1011003-87 = "3;세이아;00\n#wait;500"
1011003-88 = "3;세이아;02;……제 방에서는 그게 룰이에요. 아무리 선생님이라도 따라 주셔야 합니다."
1011003-89 = "3;세이아;05;이 방에서는……."

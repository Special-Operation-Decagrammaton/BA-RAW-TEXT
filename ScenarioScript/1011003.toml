[translation]
1011003-1 = "Nursing Request"
1011003-5 = "You're here, Sensei. Apologies for bringing you all this way."
1011003-6 = "As you may have guessed, I have no particularly pressing issues at the moment. I hope I made that clear enough by asking you to come by \"when you were free.\""
1011003-7 = "Still, if I might justify my invitation after the fact..."
1011003-13 = "...perhaps this will serve as a reason."
1011003-14 = "[s1] \"This is...?\"\n[s2] \"Wow, amazing!\""
1011003-17 = "Those who exhaust themselves with work must replenish their sugar levels. The Tea Party had these snacks specially ordered."
1011003-18 = "Since I've taken your time and energy, I may as well help you restore the latter."
1011003-19 = "It must seem like a bit of a contradiction..."
1011003-20 = "...the way I wish to trouble you, while also providing for your naps and snacks and such."
1011003-21 = "But so be it. Allow me to ask for your understanding."
1011003-22 = "And if you find this preamble too long, please, go on and help yourself."
1011003-28 = "...Sensei? Are those...?"
1011003-29 = "[s3] \"I thought they might help you feel better.\"\n[s4] \"I didn't want to show up empty-handed.\""
1011003-32 = "Oh. But why...?"
1011003-33 = "Surely, if you saw through the ruse, you wouldn't have bothered with such a thing?"
1011003-34 = "Are you telling me you went out of your way to bring treats for a sick person, despite knowing that I'm not actually sick?"
1011003-35 = "...Hmm? The \"sickness\" was a mere excuse to bring them for me?"
1011003-39 = "Aha... I see."
1011003-40 = "So we both brought desserts, then. Different brands, of course, but nearly identical in substance."
1011003-41 = "One would think we were both here for a picnic, rather than a visit to the sick."
1011003-42 = "And of course, you knew from the start why I called you here."
1011003-43 = "[s5] \"Although I didn't know what to expect.\"\n[s6] \"I didn't know you'd be so well prepared.\""
1011003-46 = "Fufu. Is that so?"
1011003-47 = "...What a shame. It seems my idea wasn't quite so unique as I thought it was."
1011003-48 = "I was actually a bit excited to give you a surprise gift."
1011003-49 = "What? You still want it?"
1011003-50 = "You actually like it...? Why would...?"
1011003-51 = "[s7] \"It's funny we thought of the same thing.\"\n[s8] \"It means we were both thinking of each other.\""
1011003-57 = "...Indeed."
1011003-58 = "And only you could make such a thing so pleasant, Sensei."
1011003-59 = "It's impressive. One simple phrase from your lips, and all my disappointment simply vanished. In fact, this went far better than I could have expected."
1011003-60 = "We both understood the pretense from the start."
1011003-61 = "And here I am, expecting you to play along for my benefit. Truly I ought to be content to enjoy your company and share a treat or two."
1011003-62 = "How should I put this...?"
1011003-63 = "The way I see myself developing, I fear the word \"brat\" may be an understatement soon."
1011003-64 = "But have no fear. I'm fully capable of drawing my own boundaries."
1011003-65 = "You're the only one I treat this way."
1011003-66 = "And, in that spirit, there are lines I will make certain never to cross."
1011003-67 = "...Does that put you at ease?"
1011003-68 = "[s9] \"Of course. I never once doubted you.\"\n[s10] \"I trust you, Seia.\""
1011003-71 = "...Fufu."
1011003-72 = "I can't help but laugh. Your company is as enjoyable as it is unpredictable."
1011003-73 = "But back to the point: let's indulge in these scrumptious desserts."
1011003-77 = "[ns11] \"Huh? Seia? Why are you...\"\n[ns12] \"...You're packing away all the snacks I brought?\""
1011003-80 = "Naturally."
1011003-81 = "The treats I prepared are already enough for the two of us. And they're unwrapped, so it only makes sense to eat them first."
1011003-82 = "And forgive me for saying so, but all the treats you brought are mine now."
1011003-83 = "I'll savor them myself, on my own good time."
1011003-88 = "...Such are the rules in my room. Even you have to follow them, Sensei."
1011003-89 = "In this room..."
1011003-91 = "...my word is Trinity's law."

[translation]
1011003-1 = "請求照護"
1011003-5 = "你來啦，老師。#n抱歉害你特地跑一趟。"
1011003-6 = "雖然你應該已經猜到了，這次其實也沒什麼特別的事。#n所以我才會請你在「有空的時候」過來。"
1011003-7 = "但如果你堅持要知道原因的話……"
1011003-13 = "……我想告訴你這就是「原因」。"
1011003-14 = "[s1]「……這是？」\n[s2]「感覺是很不得了的東西！！」"
1011003-17 = "大家都說勞累的人需要補充糖分。這些是這次經由茶會獲得的點心。"
1011003-18 = "既然又像這樣奪走了老師的時間，我認為自己至少應該照顧老師的精力和體力才對。"
1011003-19 = "我知道。雖然是我自己說的，但這番話很矛盾對吧。"
1011003-20 = "明明想看到老師不安的表情，同時卻又希望你能在與我共度的時光好好休息。"
1011003-21 = "不過這個部分我也無能為力。#n希望你能再次體諒我的冒失行為。"
1011003-22 = "好像說太久了，先一起嚐嚐這個……"
1011003-28 = "……老師？那是……"
1011003-29 = "[s3]「我為了探病而買來的。」\n[s4]「剛好我也帶了東西過來。」"
1011003-32 = "咦？為什麼呢……"
1011003-33 = "真讓人意外。#n我以為你一定會知道那只是我的藉口，所以空手過來的。"
1011003-34 = "明明知道我實際上並沒有生病，卻還是帶了禮物來探病嗎？"
1011003-35 = "……是適合「藉口般照顧」的探病禮物？"
1011003-39 = "啊哈……原來如此。"
1011003-40 = "這些也是糖度很高的點心呢。#n雖然產品不同，但是跟我準備的內容和種類幾乎一模一樣。"
1011003-41 = "不是為了探病，更接近來野餐的感覺……"
1011003-42 = "老師果然一開始就猜到我為什麼要找你過來了。"
1011003-43 = "[s5]「雖然我沒想到你事先籌備好了。」\n[s6]「我也沒料到聖亞居然會準備得這麼周到。」"
1011003-46 = "呵呵。是嗎？"
1011003-47 = "……真可惜。#n虧我還苦思了許久，結果居然重複了。"
1011003-48 = "難得能給你一個驚喜，我也有點緊張的說。"
1011003-49 = "嗯？不一樣……？"
1011003-50 = "反而覺得……很好？#n為什麼呢……"
1011003-51 = "[s7]「彼此想法一致不是很有趣嗎？」\n[s8]「畢竟終究都是在為對方著想嘛。」"
1011003-57 = "……真是的。"
1011003-58 = "明明是在同樣的情況下聊同樣的東西，能說得如此動聽的人，恐怕也只有老師了吧。"
1011003-59 = "真令人訝異。#n你的一句話居然就將我的遺憾一掃而空，反而認為自己獲得了超乎期待的收穫。"
1011003-60 = "沒錯，探病自始至終都只是個藉口，這點我和老師都心知肚明。"
1011003-61 = "畢竟是我為了私心而使喚老師，能像這樣聚會閒聊、分享點心就該滿足了吧。"
1011003-62 = "該怎麼說呢……"
1011003-63 = "雖然我不敢說自己是個多好的孩子，但現在似乎越來越壞了呢。"
1011003-64 = "但是不用擔心。我認為自己還是有基本的判斷能力的。"
1011003-65 = "會這麼做的對象，就只有老師而已……"
1011003-66 = "既然是老師「刻意劃下的界線」，那我也會乖乖遵守的。"
1011003-67 = "……現在放心了嗎？"
1011003-68 = "[s9]「當然，我從來沒懷疑過你哦。」\n[s10]「因為我相信聖亞。」"
1011003-71 = "……呵呵。"
1011003-72 = "不自覺就笑出來了呢。#n和老師一起度過的時光果然很開心。就算要冒著各種風險也是值得的。"
1011003-73 = "那麼就言歸正傳，一起享用甜點吧。"
1011003-77 = "[ns11]「嗯？聖亞？為什麼要把我的東西……」\n[ns12]「只有我買來的被放到了桌子下面？」"
1011003-80 = "那當然囉。"
1011003-81 = "我準備的份量本來就是兩人份。#n再加上沒有包裝的關係，先吃這些才是正確的吧。"
1011003-82 = "此外，雖然這麼說有點冒昧，不過老師帶來的東西都是屬於我的。"
1011003-83 = "所以這些點心，我打算等以後想吃的時候，再一個人細細品味。"
1011003-88 = "……這就是我房間的規則。#n即便是老師也必須遵守。"
1011003-89 = "在這個房間裡……"
1011003-91 = "我所說的話，就等同於三一的法律。"

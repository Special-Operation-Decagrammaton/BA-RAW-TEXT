[translation]
1011003-1 = "ขอให้มาเยี่ยมไข้"
1011003-5 = "มาแล้วสินะคะ คุณครู ขอโทษที่ทำให้ต้องเดินทางมาไกลขนาดนี้นะคะ"
1011003-6 = "คุณครูคงคาดไว้แล้วว่าครั้งนี้ฉันก็ไม่ได้มีเรื่องอะไรเป็นพิเศษ ฉันก็เลยบอกไปว่าให้มาในตอนที่ 'ว่างๆ' น่ะค่ะ"
1011003-7 = "แต่ถ้าจะให้หาเหตุผลอะไรสักอย่างละก็..."
1011003-13 = "ฉันก็อยากบอกว่านี่คือ 'เหตุผล' นั้นค่ะ..."
1011003-14 = "[s1] \"นี่มัน...?\"\n[s2] \"เป็นอะไรที่ยอดเยี่ยมไปเลย!!\""
1011003-17 = "คนที่เหนื่อยล้าจากการทำงานหนักก็ต้องเติมน้ำตาลใช่มั้ยล่ะคะ นี่คือของว่างที่ส่งมาถึงสภาน้ำชาใน#nครั้งนี้ค่ะ"
1011003-18 = "ในเมื่อฉันขโมยเวลาของคุณครูด้วยวิธีนี้อีกแล้ว อย่างน้อยในช่วงเวลานี้ ฉันก็อยากดูแลเรื่องพลังกาย และพลังใจของคุณครูน่ะค่ะ"
1011003-19 = "ฉันรู้ค่ะว่ามันฟังดูขัดแย้งที่ฉันเป็นคนพูดแบบนี้"
1011003-20 = "ฉันเคยบอกว่าอยากเห็นใบหน้าที่วิตกกังวลของคุณครูแท้ๆ แต่ตอนนี้กลับมาบอกว่าอยากให้คุณครูได้#nพักผ่อนอย่างเต็มที่ตอนที่อยู่ด้วยกัน"
1011003-21 = "แต่เรื่องนั้นก็คงช่วยไม่ได้ เพราะงั้นก็ช่วยเข้าใจฉันด้วยนะคะ"
1011003-22 = "ฉันพูดอะไรยืดยาวเกินไปแล้ว เอาเป็นว่าเชิญมาทานขนมด้วยกันก่อน..."
1011003-28 = "คุณครู...? นี่มัน..."
1011003-29 = "[s3] \"ครูซื้อมาเยี่ยมไข้น่ะ\"\n[s4] \"ครูก็ถืออะไรติดมือมาด้วยเหมือนกันนะ\""
1011003-32 = "เอ๋? ทำไมล่ะ..."
1011003-33 = "ไม่คาดคิดเลยนะคะ ฉันคิดว่าคุณครูต้องรู้อยู่แล้วว่าฉันหาข้ออ้างให้มาหา ก็เลยคิดว่าจะมาแบบมือเปล่าน่ะ"
1011003-34 = "ทั้งที่รู้ว่าไม่ได้ป่วย แต่ก็เอาของมาเยี่ยมไข้ด้วยเหรอคะเนี่ย?"
1011003-35 = "มันคือของขวัญที่เหมาะสมกับ 'ข้ออ้างที่ให้มาเยี่ยมไข้' อย่างงั้นเหรอคะ?"
1011003-39 = "อ่า... อย่างนี้เองสินะ"
1011003-40 = "ขนมที่ซื้อมาก็เป็นขนมที่มีน้ำตาลเยอะเหมือนกันสินะคะ ถึงจะเป็นขนมคนละร้านกัน แต่ก็มีส่วนประกอบและเป็นขนมประเภทเดียวกับที่ฉันเตรียมไว้เลยค่ะ"
1011003-41 = "นี่ไม่ใช่การเยี่ยมไข้ แต่เหมือนการปิกนิกมากกว่า..."
1011003-42 = "คุณครูคาดไว้ตั้งแต่แรกแล้วสินะคะว่าฉันต้องการอะไรถึงได้เรียกให้คุณครูมาหาน่ะ"
1011003-43 = "[s5] \"แต่ครูไม่คิดว่าเซอาก็จะเตรียมขนมไว้นะ\"\n[s6] \"แต่ครูก็ลืมคิดนะว่าเซอาก็คงเตรียมขนมไว้ด้วย\""
1011003-46 = "ฮุฮุ งั้นเหรอคะ?"
1011003-47 = "น่าเสียดายนะคะ... ฉันก็คิดมาตั้งนาน แต่กลายเป็นว่าความคิดเราตรงกันเสียได้"
1011003-48 = "ฉันอุตส่าห์ตื่นเต้นว่าจะได้ให้ของขวัญเซอร์ไพรส์กับคุณครูแท้ๆ เลย"
1011003-49 = "คะ? ไม่เหมือนกันเหรอ...?"
1011003-50 = "กลับยิ่งดีใจ... งั้นเหรอคะ? ทำไมล่ะคะ..."
1011003-51 = "[s7] \"มันสนุกดีไม่ใช่เหรอที่เราคิดเหมือนกันน่ะ?\"\n[s8] \"สุดท้ายแล้วเราต่างคนก็ต่างทำเพื่อกันและกันไม่ใช่เหรอ?\""
1011003-57 = "จริงๆ เลย..."
1011003-58 = "ถึงเราจะพูดเรื่องเดียวกันในสถานการณ์เดียวกัน แต่ก็มีแค่คุณครูนะคะที่พูดออกมาให้น่าฟังได้ขนาดนี้"
1011003-59 = "น่าทึ่งจังเลยค่ะ มันเป็นคำคำเดียวแท้ๆ แต่คำคำนั้นของครูก็ทำให้ความเสียดายหายไปได้หมดเลยค่ะ กลับรู้สึกว่าได้มากกว่าที่คาดหวังเอาไว้อีกนะคะ"
1011003-60 = "นั่นสินะคะ การมาเยี่ยมไข้คือข้ออ้างตั้งแต่แรก ทั้งฉันและคุณครูต่างก็รู้เรื่องนี้อยู่แล้ว"
1011003-61 = "ฉันเป็นฝ่ายที่เรียกคุณครูมาเพราะความต้องการส่วนตัวแท้ๆ ฉันก็ควรจะดีใจกับการที่เราได้มาเจอกัน ได้พูดคุยกันและแบ่งขนมกันกิน"
1011003-62 = "จะว่ายังไงดีนะ..."
1011003-63 = "ปกติฉันก็พูดเองกับปากไม่ได้อยู่แล้วว่าฉันเป็นเด็กนิสัยดี แถมตอนนี้ยังดูเหมือนว่าฉันจะนิสัยแย่ลง#nเรื่อยๆ ด้วยนะคะ "
1011003-64 = "แต่ก็อย่าใส่ใจเลยค่ะ ฉันคิดว่าอย่างน้อยตัวเองก็คิดแยกแยะได้อยู่ค่ะ"
1011003-65 = "ฉันยอมเป็นแบบนี้ให้กับคุณครูเท่านั้นนะคะ..."
1011003-66 = "ฉันเองก็จะรักษาขอบเขตให้ชัดเจน 'อย่างที่คุณครูตั้งใจ' ค่ะ"
1011003-67 = "ตอนนี้สบายใจขึ้นมาแล้วหรือยังล่ะคะ...?"
1011003-68 = "[s9] \"ครูไม่เคยสงสัยหรือไม่สบายใจอะไรนะ\"\n[s10] \"ครูเชื่อใจเซอาตลอดนะ\""
1011003-71 = "ฮุฮุ..."
1011003-72 = "ทำเอาฉันหัวเราะออกมาโดยไม่รู้ตัวเลยนะคะ อยู่กับคุณครูแล้วสนุกทุกครั้งเลย ถือว่าคุ้มค่าต่อการหา#nข้ออ้างนู่นนี่นะคะ"
1011003-73 = "งั้นเรากลับเข้าเรื่องกันเถอะค่ะ มากินของหวานด้วยกันดีกว่า"
1011003-77 = "[ns11] \"หืม? เซอา? แล้วขนมของครูล่ะ...?\"\n[ns12] \"ทำไมเอาขนมที่ครูซื้อมาไปไว้ใต้โต๊ะล่ะ?\""
1011003-80 = "มันก็แน่อยู่แล้วนี่คะ"
1011003-81 = "แค่ขนมที่ฉันเตรียมมาก็เพียงพอสำหรับสองคนแล้วค่ะ แล้วขนมของฉันก็ไม่ได้ห่อไว้สวยงามด้วย งั้นก็กินของฉันก่อนเถอะค่ะ"
1011003-82 = "พูดอย่างนี้อาจจะดูผิดมารยาทไปหน่อย แต่ขนมที่คุณครูเอาติดไม้ติดมือมาน่ะ เป็นของฉันคนเดียวค่ะ"
1011003-83 = "ฉันจะเก็บไว้ลิ้มรสทีละนิดๆ คนเดียวตอนที่ฉันต้องการค่ะ"
1011003-88 = "อยู่ในห้องของฉัน ก็ต้องทำตามกฎของฉันนะคะ... ต่อให้เป็นคุณครูก็ต้องทำตามค่ะ"
1011003-89 = "เมื่ออยู่ในห้องนี้น่ะ..."
1011003-91 = "สิ่งที่ฉันพูดก็คือกฎของทรีนิตี้ค่ะ"

[translation]
1006002-1 = "咯哩咯哩君的殘骸"
1006002-2 = "（有點擔心惠那副焦急的樣子，於是趕忙前往惠所說的地方……）"
1006002-6 = "（在某個冷清的小巷裡，發現了一臉煩惱蹲在地上的惠）"
1006002-10 = "……啊。"
1006002-11 = "老師～～！！"
1006002-12 = "[s1]「抱歉讓你久等了，惠。」\n[s2]「你看起來很焦慮，還好嗎？」"
1006002-13 = "嗚……其實我現在非常困擾……"
1006002-14 = "嗚……其實我現在非常困擾……"
1006002-15 = "這樣下去我會破產的～！#n我本就瘦弱的皮夾……"
1006002-16 = "……嗯？"
1006002-17 = "你問是什麼意思？"
1006002-24 = "那就是……"
1006002-28 = "[ns3]「冰淇淋……？」\n[ns4]「『咯哩咯哩君』？」"
1006002-29 = "嗯。#n還有這些也……"
1006002-30 = "嗯。#n還有這些也……"
1006002-34 = "[ns5]「……這是？」\n[ns6]「……難道，這些也是咯哩咯哩君？」"
1006002-37 = "沒錯！"
1006002-38 = "正確來說……這些全都「曾是」咯哩咯哩君唷！"
1006002-39 = "從剛才開始就一直失敗。#n原來吃咯哩咯哩君是件這麼困難的事，我之前都不知道……"
1006002-40 = "真的相當難纏唷？咯哩咯哩君比想像中還要纖細！"
1006002-41 = "只要「哐！」的話馬上就會「咻～」的溶化哦！"
1006002-42 = "……嗯？#n只用哐跟咻～你聽不懂？"
1006002-43 = "唔嗯……"
1006002-48 = "該怎麼說明才好呢……"
1006002-49 = "咦？把發生的事情一件一件照順序說明……？"
1006002-53 = "我知道了！"
1006002-56 = "那麼～！#n就從一開始買了咯哩咯哩君這件事開始說起吧！"
1006002-57 = "我是在那邊的便利商店買的。"
1006002-58 = "但是因為硬梆梆的根本沒辦法吃……"
1006002-59 = "因為實在太硬了～！我心想這樣吃不了！"
1006002-60 = "於是就開始思考該怎麼做。"
1006002-61 = "然後啊，我想到了一個辦法！只要讓它融化不就行了嗎！#n我雖然笨，但好歹也是知道冰遇熱就會融化的哦！"
1006002-62 = "所以……"
1006002-66 = "[ns7]「……先等一下。也就是說……」\n[ns8]「在那裡融化的全都是……」"
1006002-69 = "沒錯！老師果然很聰明呢～"
1006002-70 = "不用說明就知道了！"
1006002-74 = "就是用了這把「來自地底的恩惠」！"
1006002-75 = "[s9]「不不不不不！！」\n[s10]「等等，你先等等！！」"
1006002-78 = "……嗯？老師？#n看你那麼著急，怎麼了嗎？"
1006002-79 = "咦？最好不要這樣做？#n為什麼？"
1006002-80 = "只會造成相同的結果……？"
1006002-85 = "……原來如此！這麼說也對！#n難怪我會一直失敗！！"
1006002-86 = "不愧是老師！"
1006002-87 = "真可靠呢～！"
1006002-88 = "唔嗯……不過，這麼硬的咯哩咯哩君沒辦法吃啊。#n又回到原點了呢……"
1006002-89 = "沒有什麼好方法嗎……"
1006002-93 = "啊，對了！博學多聞的老師應該能想出什麼好方法吧？#n教教我吧教教我吧！"
1006002-94 = "拜託～！這樣下去就吃不到咯哩咯哩君了！"
1006002-95 = "……咦？"
1006002-96 = "這個咯哩咯哩君是什麼時候買的？"
1006002-97 = "嗯～大概是在我聯絡老師的時候……"
1006002-98 = "[s]「那應該已經可以吃了唷。」"
1006002-99 = "……什麼意思？"
1006002-100 = "總之先吃吃看？"
1006002-101 = "但是……咬太硬的東西牙齒會痛的哦？"
1006002-105 = "……嗯，我知道了！"
1006002-106 = "既然比我聰明的老師都這麼說了，"
1006002-107 = "我相信你！"
1006002-111 = "那麼……"
1006002-112 = "要上囉～～～！"
1006002-119 = "……咦！？"
1006002-125 = "哇，順利吃到了！？"
1006002-126 = "嗯～真好吃！#n但是豪～冰哦！"
1006002-127 = "這是怎麼回事……？"
1006002-128 = "老師有能讓咯哩咯哩君變能吃的力量是嗎！？"
1006002-129 = "[s11]「是時間讓它融化的哦。」\n[s12]「它在考驗你的耐心哦。」"
1006002-132 = "哦哦……！"
1006002-136 = "……完全搞不清楚！"
1006002-137 = "不過我知道是在說一些聰明的人才知道的事！"
1006002-138 = "老師果然很聰明呢！"
1006002-139 = "唔嗯～真好吃～！#n託老師的福，總算能吃到咯哩咯哩君了～！"
1006002-140 = "所以……來！"
1006002-144 = "……來來來！老師也吃一口吧？"
1006002-148 = "[ns13]「咦，要分我吃嗎？」\n[ns14]「給我沒關係嗎……？」"
1006002-151 = "那當然囉！"
1006002-152 = "如果沒有老師幫忙，這個咯哩咯哩君也會變成「曾是」咯哩咯哩君的東西吧！"
1006002-153 = "不管怎麼說，都是因為老師願意過來，我才能吃到咯哩咯哩君呀。"
1006002-157 = "而且老師一路跑過來，應該也累了吧？#n吃吧吃吧別客氣！來，啊～嗯♪"
1006002-163 = "啊哈哈！怎麼樣呀～？"
1006002-164 = "很好吃吧，咯哩咯哩君！"
1006002-168 = "……對了。#n來都來了，就再買一支對半吃吧？"
1006002-170 = "（之後，兩人為了買咯哩咯哩君而一起回到了便利商店）"
1006002-171 = "（但是因為惠買了太多，所以已經賣光了……）"
1006002-172 = "嗚哇～！咯哩咯哩君啊啊啊～！！！"

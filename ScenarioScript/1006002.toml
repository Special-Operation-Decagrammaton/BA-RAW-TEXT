[translation]
1006002-1 = "Morimori Stack"
1006002-2 = "I got an urgent call from Megu and hurried to meet up with her."
1006002-6 = "But I found Megu next to a convenience store on a peaceful side street, a thoughtful expression on her face."
1006002-10 = "Ah."
1006002-11 = "Sensei!"
1006002-12 = "[s1] \"Hello, Megu.\"\n[s2] \"Is something weighing on you?\""
1006002-13 = "Yes! I'm actually in a lot of trouble right now!"
1006002-14 = "Yes! I'm actually in a lot of trouble right now!"
1006002-15 = "At this rate, I'm going to go broke! Broke, I say! My wallet is going to go from thin to empty!"
1006002-16 = "...Hm? You wanna know why?"
1006002-17 = "Well, the problem..."
1006002-24 = "It started with this..."
1006002-28 = "[ns3] \"Ice cream...?\"\n[ns4] \"Morimori?\""
1006002-29 = "Yeah. And also this..."
1006002-30 = "Yeah. And also this..."
1006002-34 = "[ns5] \"...Ice cream...s?\"\n[ns6] \"More...Morimori...?\""
1006002-37 = "Yeah!"
1006002-38 = "Or, well, maybe I should say they WERE Morimori."
1006002-39 = "I've just been failing... I didn't realize it, but apparently it's no easy feat to eat a Morimori."
1006002-40 = "Not easy at all! Morimori is surprisingly delicate."
1006002-41 = "It'll melt with a flare! At the drop of a hat!"
1006002-42 = "...Eh? You don't know what I mean by flare or fail?"
1006002-43 = "Hmm."
1006002-48 = "Hmm... How do I explain this?"
1006002-49 = "You want me to go through everything that happened, step-by-step?"
1006002-53 = "Okay! Sure!"
1006002-56 = "Well, it started when I bought a Morimori ice cream to eat from this convenience store."
1006002-57 = "Morimori is delicious, but...this one was really, really hard!"
1006002-58 = "I couldn't even get my teeth into it."
1006002-59 = "Because it was frozen solid! I know it's called ice cream, but that's too much ice and not enough cream!"
1006002-60 = "So...what was I supposed to do? I thought about it really hard!"
1006002-61 = "Then I realized. If it's too frozen, it needs to be thawed out. I may not be the sharpest sledgehammer in the toolbox, but I know that much!"
1006002-62 = "So..."
1006002-66 = "[ns7] \"...Wait. Wait a minute.\"\n[ns8] \"By thaw, do you mean...\""
1006002-69 = "Yeah! You're so smart, Sensei!"
1006002-70 = "You saw the solution right away!"
1006002-74 = "I used my Molten Meg-Ma!"
1006002-75 = "[s9] \"No, no, no, no, no!\"\n[s10] \"Wait, wait, wait, wait, wait!\""
1006002-78 = "...? Sensei? What's wrong? What's up with your face all of a sudden?"
1006002-79 = "Oh? You wanna try something different this time? Why?"
1006002-80 = "...Hmm. If I try the same thing again, it'll turn out the same way..."
1006002-85 = "I see! If a flamethrower won't work, why not explosives? Oh! Or a welder, maybe?"
1006002-86 = "I knew I could count on you, Sensei!"
1006002-87 = "Oh, is that not different enough?"
1006002-88 = "Oh no...now I'm stumped again. I can't break through Morimori with my teeth, and I can't use tools to thaw it..."
1006002-89 = "So what can I do...?"
1006002-93 = "Sensei, do you know something? You're a teacher, so teach me!"
1006002-94 = "Please! I can't figure out how to eat Morimori!"
1006002-95 = "Hmm?"
1006002-96 = "You wanna know when I bought this Morimori?"
1006002-97 = "Well, about when I contacted you, I guess..."
1006002-98 = "[s] \"Then it should be perfect by now.\""
1006002-99 = "...? What do you mean?"
1006002-100 = "Hm? You want me to try eating it again?"
1006002-101 = "But my teeth will hurt!"
1006002-105 = "...Um, but..."
1006002-106 = "It's Sensei's good advice, isn't it?"
1006002-107 = "If Sensei thinks so, it must be worth a try."
1006002-111 = "So..."
1006002-112 = "Here goes nothing!"
1006002-119 = "...!? Huh...?"
1006002-125 = "It's working! It's working! I can eat it now!"
1006002-126 = "Mmmm! Delicious, refreshing Morimori!"
1006002-127 = "How did this happen?"
1006002-128 = "Did you melt because Sensei's here? Is that it, Morimori?"
1006002-129 = "[s11] \"Hm... For now, let's just say I melted it with time.\"\n[s12] \"Sometimes, you need patience more than firepower...\""
1006002-132 = "Whoa..."
1006002-136 = "...I don't get how that works. "
1006002-137 = "But it sounds wise, so it must be true!"
1006002-138 = "Sensei, I knew you were smart!"
1006002-139 = "Mmhmm! I'm so happy I can eat Morimori now!"
1006002-140 = "Thanks to you! Mmm..."
1006002-144 = "...Here! You want some, Sensei?"
1006002-148 = "[ns13] \"You don't want it all?\"\n[ns14] \"For me? Are you sure?\""
1006002-151 = "Of course!"
1006002-152 = "If you hadn't come to help, this Morimori would've ended up like all the others..."
1006002-153 = "Without you, I'd have no Morimori, so of course I should share!"
1006002-157 = "Okay! Don't say no, Sensei. It's hot out, and you came all this way. Doesn't ice cream sound good? Here!"
1006002-163 = "Heehee! How is it?"
1006002-164 = "You like Morimori too, right, Sensei?"
1006002-168 = "...In that case, let's have another!"
1006002-170 = "We returned to the convenience store to get more Morimori."
1006002-171 = "But Megu had bought so many that Morimori was out of stock."
1006002-172 = "Aaaahhhhh! Morimori!!"

[translation]
1006002-1 = "โมริโมริคุงกองสูง"
1006002-2 = "(คุณครูมุ่งหน้าไปยังสถานที่ที่เมกุเรียกให้ไปหาอย่างเร่งด่วน)"
1006002-6 = "(เมื่อไปถึงข้างร้านสะดวกซื้อในซอยเงียบๆ ก็เจอเมกุที่กำลังนั่งกอดเข่าด้วยสีหน้าเป็นทุกข์อยู่)"
1006002-10 = "...อ๊ะ"
1006002-11 = "คุณครู!!"
1006002-12 = "[s1] \"ว่าไงเมกุ มีเรื่องอะไรเหรอ?\"\n[s2] \"ฟังจากเสียงแล้วเหมือนมีเรื่องด่วนอะไรเลยนะ\""
1006002-13 = "คือว่า... ที่จริงตอนนี้ฉันตกอยู่ในสถานการณ์ที่ยากลำบากมากเลย!"
1006002-14 = "คือว่า... ที่จริงตอนนี้ฉันตกอยู่ในสถานการณ์ที่ยากลำบากมากเลย!"
1006002-15 = "ถ้ายังเป็นแบบนี้ต่อไป ฉันคงล้มละลาย...! ล้มละลายแน่ๆ! กระเป๋าสตางค์แบนๆ ของฉันต้องสูญเงิน#nหมดแน่นอน!!"
1006002-16 = "หืม? หมายความว่ายังไงน่ะเหรอ?"
1006002-17 = "เอ่อ..."
1006002-24 = "มันเกี่ยวกับอันนี้น่ะ..."
1006002-28 = "[ns3] \"ไอศกรีม...?\"\n[ns4] \"โมริโมริคุง...?\""
1006002-29 = "อื้ม... ส่วนอันนี้ก็..."
1006002-30 = "อื้ม... ส่วนอันนี้ก็..."
1006002-34 = "[ns5] \"...ไอศกรีม...?\"\n[ns6] \"...โมริโมริ...คุง?\""
1006002-37 = "อื้ม!"
1006002-38 = "ถ้าจะให้ชัดเจนคือ... เจ้าพวกที่ 'เคยเป็น' โมริโมริคุงต่างหาก!"
1006002-39 = "ฉันทำไม่สำเร็จตั้งแต่เมื่อกี้แล้ว ไม่ยักรู้เลยว่าจะเป็นอย่างนี้ การกินโมริโมริคุงไม่ใช่เรื่องง่ายเลยละ"
1006002-40 = "ไม่ง่ายเลย! โมริโมริคุงอ่อนไหวมากกว่าที่เห็นเยอะเลย!!"
1006002-41 = "แค่โดนความร้อนนิดหน่อยก็ละลายหมดแล้ว!!"
1006002-42 = "หืม? ละลายด้วยความร้อนไม่สำเร็จ... คุณครูไม่เข้าใจเหรอ?"
1006002-43 = "อืม…"
1006002-48 = "อื้ม! จะอธิบายยังไงดีนะ? "
1006002-49 = "ให้ฉันค่อยๆ อธิบายเรื่องที่เกิดขึ้นก่อนเหรอ?"
1006002-53 = "อื้ม อื้ม!"
1006002-56 = "มันเริ่มจากที่ฉันอยากกินโมริโมริคุง ก็เลยไปซื้อที่ร้านสะดวกซื้อมาแท่งหนึ่งน่ะ"
1006002-57 = "ถึงโมริโมริคุงจะอร่อยมาก... แต่บางทีมันก็แข็งเอามากๆ เลยละ"
1006002-58 = "ขนาดตั้งใจกัดแล้วยังไม่เป็นรอยฟันเลยด้วย"
1006002-59 = "นั่นก็เพราะว่า... มันถูกแช่แข็งไว้นานเกินไปน่ะสิ! ไม่รู้โดนแช่ในอุณหภูมิติดลบแค่ไหน!"
1006002-60 = "ฉันก็เลยมานั่งคิดจริงๆ จังๆ ว่าต้องทำยังไงดี"
1006002-61 = "แล้วฉันก็ได้ไอเดียดีๆ ว่าถ้ามันถูกแช่เป็นก้อนน้ำแข็งซะขนาดนี้ ก็แค่ต้องใช้ความร้อนละลาย! ถึงฉันจะสมองไม่ดี แต่เรื่องแค่นี้ฉันก็พอรู้นะ!"
1006002-62 = "ฉันก็เลย…"
1006002-66 = "[ns7] \"เดี๋ยวนะ เธอก็เลย...\"\n[ns8] \"อย่าบอกนะว่า 'ละลาย' โดยใช้...\""
1006002-69 = "อื้ม! คุณครูเนี่ย ฉลาดสมกับเป็นคุณครูเลย"
1006002-70 = "คิดได้ทันทีเลยใช่มั้ยล่ะ?"
1006002-74 = "ด้วย <Molten Meg-Ma> ไง...!!"
1006002-75 = "[s9] \"ม่ายยยยยยย!!\"\n[s10] \"เดี๋ยวก่อนๆๆๆๆ!!\""
1006002-78 = "...? คุณครู? ทำไมจู่ๆ ก็เป็นงั้นล่ะ? ไหงทำหน้าทำตาตื่นแบบนั้นน่ะ?"
1006002-79 = "หืม? ครั้งนี้ขออย่าให้ใช้วิธีนั้นเหรอ? ทำไมล่ะ?"
1006002-80 = "ถ้าทำแบบเดิม ผลลัพธ์ก็ย่อมออกมาเหมือนเดิมเหรอ...?"
1006002-85 = "...นั่นสิ! ก็จริงอย่างที่ว่านะ! ใช่! มันก็เลยกองกันเป็นตั้งแบบนั้นไง!!"
1006002-86 = "สมกับที่เป็นคุณครูเลย!"
1006002-87 = "ฮื้ม~ คนฉลาดเขาเป็นกันอย่างนี้นี่เองนะ"
1006002-88 = "อืม... แต่ยังไงฉันก็ยังลำบากใจอยู่ดี ฉันเอาฟันกัดเพื่อลิ้มรสหวานของโมริโมริคุงไม่ได้ ถ้าคำเดียวก็#nยังกัดไม่ได้ ก็เท่ากับฉันกินไม่ได้ทั้งแท่งอยู่ดี"
1006002-89 = "จะมีวิธีอะไรมั้ยนะ…"
1006002-93 = "คุณครู! คนฉลาดอย่างครูน่าจะรู้วิธีอะไรบ้างใช่มั้ย? บอกฉันหน่อยสิ!"
1006002-94 = "ขอร้องละนะ~! ถ้ายังเป็นแบบนี้ต่อไป ชาตินี้ฉันไม่ได้กินโมริโมริคุงแน่!"
1006002-95 = "...หืม? ว่าไงนะ?"
1006002-96 = "ฉันซื้อโมริโมริคุงนี้มาตั้งแต่เมื่อไรงั้นเหรอ?"
1006002-97 = "ก็... ตอนที่ติดต่อคุณครูไปไง..."
1006002-98 = "[s] \"ถ้างั้นตอนนี้ก็น่าจะได้แล้ว\""
1006002-99 = "...? หมายความว่ายังไง?"
1006002-100 = "หืม? ให้ลองกินดูตอนนี้เหรอ?"
1006002-101 = "อืม... แต่น่าจะเจ็บฟันนะ…"
1006002-105 = "...อื้ม! ไม่เป็นไรหรอก"
1006002-106 = "คุณครูที่ฉลาดบอกว่าได้นี่นา!"
1006002-107 = "ถ้าคุณครูบอกว่ากินได้ ก็คงได้เนอะ...?"
1006002-111 = "ถ้างั้นก็…"
1006002-112 = "ขอหม่ำละนะ~~!!"
1006002-119 = "...!? เอ๋...?"
1006002-125 = "กัดเข้าแฮะ...! เข้าจริงๆ ด้วย! โดนฟันก็ไม่เจ็บเลย!"
1006002-126 = "งื้ม~ !! อร่อยจัง! โมริโมริคุงหวานเย็นชื่นใจสุดๆ!!"
1006002-127 = "มันเป็นแบบนี้ได้ยังไงเนี่ย?"
1006002-128 = "พอคุณครูมา มันก็เลยนิ่มลงเหรอ? เป็นอย่างนั้นหรอกเหรอ โมริโมริคุง!?"
1006002-129 = "[s11] \"อืม... เอาเป็นว่า เวลาช่วยละลายมันแล้วกัน!\"\n[s12] \"บางครั้งเราก็ต้องใช้ความอดทนมากกว่าการลงมือนะ\""
1006002-132 = "หา...?"
1006002-136 = "...ไม่เห็นเข้าใจเลย"
1006002-137 = "แต่มันเป็นคำพูดที่สุดยอดไปเลยนะ!"
1006002-138 = "คุณครูเนี่ย เป็นคนฉลาดสมคำร่ำลือจริงๆ!"
1006002-139 = "อื้มๆ! ดีใจจัง! ความฉลาดของคุณครูทำให้ฉันได้กินโมริโมริคุงจนได้~"
1006002-140 = "ถ้างั้นก็... อื้ม!"
1006002-144 = "...เอ้า! คุณครูก็กัดสักคำสิ"
1006002-148 = "[ns13] \"เมกุไม่ได้อยากกินให้หมดแท่งหรอกเหรอ?\"\n[ns14] \"หืม? ให้ครูเหรอ? ไม่เสียดายเหรอ?\""
1006002-151 = "กินเถอะน่า!"
1006002-152 = "ถ้าไม่มีคุณครู โมริโมริคุงแท่งนี้ก็คงต้องลงไปกองกับพวกที่ 'เคยเป็น' โมริโมริคุงอยู่ตรงนั้นด้วยแหงๆ"
1006002-153 = "แล้วที่ฉันได้กินก็เพราะว่าคุณครูมาหาและช่วยถึงที่ เพราะงั้นก็ต้องแบ่งกันกินสิ ว่ามั้ย?"
1006002-157 = "เอาละ! ไม่ต้องปฏิเสธแล้วกินให้อร่อยเลยนะ คุณครูก็ร้อนใช่มั้ย? เอ้า! อ้ามม~!"
1006002-163 = "ฮิฮิ! เป็นไงบ้าง?"
1006002-164 = "คุณครูก็ว่าโมริโมริคุงอร่อยเหมือนกันใช่มั้ยล่ะ?"
1006002-168 = "...งั้นฉันต่ออีกแท่งดีมั้ย?"
1006002-170 = "(จากนั้นคุณครูก็ไปซื้อโมริโมริคุงที่ร้านสะดวกซื้อมากินต่อ)"
1006002-171 = "(แต่ว่าโมริโมริคุงหมดเกลี้ยงทั้งร้านแล้วเพราะก่อนหน้านี้เมกุมาซื้อไปทีละแท่งๆ จนหมด......)"
1006002-172 = "แงงงงงงงง~~!!!  โมริโมริคุงงงงง~!!!"

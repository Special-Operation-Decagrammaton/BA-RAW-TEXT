[translation]
10009035-2 = "[ns] \"หนีออกมาได้อีกแล้วเรอะ?! นี่มันเรื่องอะไรกันเนี่ย?!\""
10009035-3 = "ไม่นึกเลย... ว่ายัยนี่จะใช้โอยาโกะด้งที่ส่งไปให้ตอนมื้อกลางวันสะเดาะกุญแจมือออกมา"
10009035-4 = "ฉายาจิ้งจอกแห่งความพินาศนี่ ไม่ใช่ว่าจะได้มาเล่นๆ เลยนะคะ"
10009035-5 = "[s] \"ไม่ๆ ครูไม่เห็นจะเข้าใจเลย\""
10009035-6 = "แต่ไม่ต้องห่วงหรอก เพื่อไม่ให้เกิดเหตุการณ์แบบนี้ในครั้งต่อไป เราเลยตัดสินใจว่าเมนูเย็นนี้จะทำ#nโซบะกัน!"
10009035-7 = "[s] \"โซบะก็โอเคนะ?!\""
10009035-8 = "เอาเถอะ! อื้อ! ไม่ต้องห่วง!"
10009035-9 = "คราวนี้จะระวังอย่างดีเลย"
10009035-10 = "พอเกิดเรื่องล้มเหลวแบบนี้ขึ้นบ่อยๆ จะทำให้การรักษาความปลอดภัยรัดกุมขึ้น รวมถึงพัฒนาการ#nตรวจตราของสถาบันตำรวจวัลคิรี่ด้วยสินะคะ! ฉันได้เรียนรู้เพิ่มเติมอีกแล้วละค่ะ!"
10009035-11 = "ขอบคุณที่ให้ความร่วมมือนะ คุณครู!"
10009035-12 = "ขอตัวก่อนนะคะ! "
10009035-13 = "[s] \"อะ...อื้อ...\""
10009035-18 = "ถ้างั้นพวกเราไปทำงานต่อกันเถอะค่ะ"
10009035-19 = "[s] (แบบนี้จะไม่เป็นไรจริงๆ งั้นเหรอ?)"

[translation]
10009035-1 = "#wait;1000"
10009035-2 = "[ns] \"또 탈출이라니?! 이게 대체 어떻게 된 거야?!\""
10009035-3 = "3;후부키;04;설마……. 점심 사식으로 넣어줬던 오야코동을 이용해 수갑을 풀어냈을 줄이야.\n#3;em;[땀]\n#3;stiff\n#3;a"
10009035-4 = "5;키리노;08;재액의 여우란 이름은, 역시 허명이 아니었던 거네요.\n#5;al\n#3;m1"
10009035-5 = "[s] \"아니아니, 의미를 모르겠는데.\""
10009035-6 = "3;후부키;00;그래도 걱정 마. 다음번엔 이런 일이 일어나지 않도록, 저녁 메뉴는 메밀소바로 하기로 했으니까!\n#3;em;[반응]"
10009035-7 = "[s] \"메밀소바면 괜찮은 거야?!\""
10009035-8 = "3;후부키;03;하여간! 응! 걱정 마!\n#3;em;[음표]\n#3;hophop"
10009035-9 = "3;후부키;10;이번엔 충분히 주의를 기울일 테니까."
10009035-10 = "5;키리노;01;이런 실패를 거듭하면서 보안이 강화되고, 발키리 경찰학교의 경비 또한 나날이 진화하는 거네요! 새롭게 배웠습니다!\n#5;greeting\n#5;em;[반짝]"
10009035-11 = "3;후부키;00;그럼 협조 감사했어. 선생!"
10009035-12 = "5;키리노;00;실례하겠습니다! \n#5;em;[반응]"
10009035-13 = "[s] \"으, 으음…….\""
10009035-14 = "#st;[0,0];instant;1;"
10009035-15 = "#clearST"
10009035-16 = "#wait;150"
10009035-17 = "3;후부키;00\n5;키리노;01\n#3;d\n#5;d\n#wait;3000"
10009035-18 = "3;세나;01;그럼 저희도 업무를 재개하도록 하죠.\n#3;em;[반짝]\n#3;a"
10009035-19 = "[s] (이대로 정말 괜찮은 걸까?)"
10009035-20 = "#continued"

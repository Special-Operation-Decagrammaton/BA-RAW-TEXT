[translation]
1009803-1 = "Hero's Patrol"
1009803-4 = "Ah, Sensei! Here! Over here!"
1009803-5 = "You've got an extra pep in your step. Something good happen?"
1009803-6 = "[s] \"It's because I'm with Hoshino, hero form!\""
1009803-7 = "Heh. My hero form? You make it sound like I transformed or something."
1009803-8 = "Moving along, you all prepped for our patrol today?"
1009803-9 = "I'm sure you know, but today's route is going to take us through some rough, sandy terrain."
1009803-10 = "If you fall behind, who knows if you'll make it back?!"
1009803-11 = "[s] \"Yes! I'm ready!\""
1009803-12 = "All righty. Let's head out."
1009803-18 = "The streets are still pretty empty."
1009803-19 = "Huh? Why did we come out so far?"
1009803-20 = "Obviously I'm trying to drain you of all your energy, so you can't be embarrassing!"
1009803-21 = "[s] \"What?!\""
1009803-22 = "Jokes, Sensei, jokes. You make it too fun to pick on you."
1009803-23 = "It's actually because of last time."
1009803-24 = "Remember when those punks tried to steal the school bulletin board?"
1009803-25 = "[s] \"And they were chased away by Hoshino, Hero of Abydos!\""
1009803-26 = "I was thinking those Helmet Gangsters' gear was really high quality. Where'd it come from?"
1009803-27 = "They aren't exactly flush with cash. Usually, at least."
1009803-28 = "It's a little weird, no?"
1009803-29 = "So I figured it'd be a good idea to do a bigger sweep today."
1009803-30 = "[s] \"That's what you were thinking...\""
1009803-31 = "Now, now. We've got a lot of walking to do, so let's pick up the pace."
1009803-41 = "Ah? Look at that house. It was fine on my last patrol..."
1009803-42 = "[s] \"It's more sand than house now...\""
1009803-43 = "It must've been the most recent sandstorm."
1009803-48 = "*sigh* This is too much for just me..."
1009803-55 = "Maybe it's time to give up..."
1009803-60 = "Hey there! Looks like you're in a spot of trouble. Anything we can do?"
1009803-61 = "Wh-What? Who are you?"
1009803-62 = "I'm just a passerby..."
1009803-63 = "[s] \"The Passerby Hero.\""
1009803-67 = "Don't start, Sensei!"
1009803-68 = "Hero...?"
1009803-69 = "Well, whoever you are, I would really appreciate a hand."
1009803-70 = "I returned home after quite a while, just to pick up a few things."
1009803-71 = "But it seems the sandstorms have even hit my old home."
1009803-72 = "I've been trying to dig it back up, but it's impossible to move all this sand."
1009803-74 = "Hm, well you're right about one thing. This isn't a one-person job."
1009803-78 = "All right. It's time for a workout."
1009803-79 = "[s] \"I'll help too.\""
1009803-80 = "Heh. Thanks, Sensei."
1009803-88 = "Phew. That should do it."
1009803-89 = "Incredible! That was so fast!"
1009803-91 = "You truly are a hero! Thank you!"
1009803-95 = "Seriously, Sensei was just joking around..."
1009803-96 = "[s1] \"Not turning a blind eye to someone's struggle...\"\n[s2] \"...that's what being a hero is all about!\""
1009803-99 = "Heh..."
1009803-100 = "You just say the darndest things, Sensei."
1009803-102 = "Hoshino and I continued our patrol around the Abydos District for quite some time."
1009803-106 = "Hm, I swear there should be a pathway somewhere around here."
1009803-107 = "The sand's claimed it too."
1009803-108 = "[s] \"Should we find a way around?\""
1009803-109 = "..."
1009803-110 = "No, it's only sand. Let's clear the path."
1009803-111 = "It'll just take a little bit of elbow grease."
1009803-117 = "Ah, look. The bulb's out on that streetlight."
1009803-121 = "Lend me your shoulders, please, Sensei!"
1009803-122 = "I can make a quick fix!"
1009803-137 = "Heh. We're already this far out? Should be near the end of our patrol route."
1009803-138 = "[s] \"Let's take a little break.\""
1009803-139 = "Yeah, let's. I really worked you hard today, Sensei."
1009803-140 = "You don't regret tagging along, do you?"
1009803-141 = "[s] \"Of course not.\""
1009803-143 = "[ns] \"I liked seeing the way you take care of Abydos.\""
1009803-144 = "Heh. You're really trying to embarrass me, huh?"
1009803-145 = "But I really do owe you, Sensei."
1009803-146 = "I probably would've gotten tired way earlier without you."
1009803-147 = "Thank you, Sensei."
1009803-148 = "Huh? It was an honor helping the Hero of Abydos...?"
1009803-149 = "You really aren't gonna quit, huh?"
1009803-150 = "Well, if you keep insisting..."
1009803-151 = "Does that mean you're my sidekick, Sensei?"
1009803-152 = "[s] \"Sidekick?\""
1009803-153 = "You know, the one who works with the hero to defend justice."
1009803-154 = "Althooough...I think usually the sidekick gets kidnapped by the villain, which motivates the hero to finally step up and take on the mantle of the hero."
1009803-155 = "[s] \"What?!\""
1009803-156 = "Heh, heh. I'm kidding."
1009803-160 = "Here. You can eat this. Consider it an apology."
1009803-161 = "Oops. It got a little squished in my combat vest, but—"
1009803-166 = "U-Um..."
1009803-174 = "Are you the ones who've been helping people out in the area? I've been looking for you, ever since I heard the rumors..."
1009803-175 = "H-Huh?!"
1009803-176 = "[s] \"Rumors really do spread like wildfire...\""
1009803-180 = "I mean, I guess that's me, but..."
1009803-181 = "Is there something you needed help with?"
1009803-182 = "You see... I'm sorry to bother you, but I thought maybe you could help me find something."
1009803-183 = "A few days back, a sandstorm hit while I was walking on the outskirts of town. I got hopelessly lost and took shelter in an abandoned train until the storm died down."
1009803-184 = "I managed to get back home, but I lost my bag in the train."
1009803-185 = "I did try to find it on my own...but the desert is so difficult to navigate."
1009803-187 = "All of my most prized possessions are in there. It'd mean so much if you could help me. I-I'll reward you too!"
1009803-193 = "Hm, what to do?"
1009803-194 = "You did go through all the trouble of finding us, and we're technically still on patrol duty..."
1009803-195 = "What do you think, Sensei?"
1009803-196 = "[s] \"As a sidekick, I'll follow my hero anywhere!\""
1009803-197 = "Heh. Always raring to go."
1009803-198 = "I think I know which abandoned train you're talking about. Just point me in the right direction."
1009803-199 = "Yes, ma'am!"
1009803-200 = "Let me think... It was morning when I finally made my way back, and the sun was behind me..."
1009803-201 = "Sounds like east to me!"
1009803-205 = "You ready to go, Sensei?"
1009803-207 = "We headed to the outskirts of Abydos to find the citizen's lost bag."
1009803-216 = "Heh! Got it!"
1009803-220 = "We just have to get back to town and return the bag now!"
1009803-221 = "Good work, Sensei!"
1009803-222 = "[s] \"You did all the heavy lifting, Hoshino.\""
1009803-226 = "Heh."
1009803-227 = "But we have a problem."
1009803-228 = "If you take a look at the sky..."
1009803-237 = "[ns] \"It's already so late...\""
1009803-238 = "Yup. A problem."
1009803-239 = "It's best to lay low in the desert once it gets dark. You'll end up walking in the wrong direction without even realizing it."
1009803-240 = "...No other choice."
1009803-241 = "We'll just have to camp out here tonight."
1009803-242 = "It is what it is, so let's take a break, Sensei."
1009803-249 = "― [log=호시노 무장 모드 4]Yikes. I really lost track of time. [/log][wa:1470] "
1009803-250 = "― [log=호시노 무장 모드 4]We'll just have to hang out here until the sun comes up.[/log][wa:3140] "
1009803-253 = "[ns] \"As long as I'm with you, Hoshino.\""
1009803-254 = "― [log=호시노 무장 모드 4]...Huh? [/log][wa:350] "
1009803-255 = "― [log=호시노 무장 모드 4]C'mon, what could be so good about being stuck here with an old-timer like me? [/log][wa:3140] "
1009803-258 = "[ns] \"I mean, I'm with the Hero of Abydos!\""
1009803-259 = "― [log=호시노 무장 모드 4]Heh...heehee...[/log][wa:610] "
1009803-260 = "― [log=호시노 무장 모드 4]How long are you gonna keep up the bit? You're taking it way too far.[/log][wa:3680] "
1009803-263 = "― [log=호시노 무장 모드 4]...Well, if you really want to keep being my sidekick,[/log][wa:2660] "
1009803-264 = "― [log=호시노 무장 모드 4]I guess I'll play along.[/log][wa:830] "
1009803-267 = "― [log=호시노 무장 모드 4]Then how about a hero-and-sidekick dinner? Just emergency rations, but...[/log][wa:2060] "
1009803-270 = "[ns] \"Fish jelly... This is popular with the kids, right?\""
1009803-271 = "― [log=호시노 무장 모드 4]Well, you could say that, but...[/log][wa:1830] "
1009803-272 = "― [log=호시노 무장 모드 4]This old-timer still likes it too. Humor me, please![/log][wa:6510] "
1009803-276 = "Heh. Lucky I had some fish jelly left over."
1009803-277 = "It's been sitting in my combat vest for a while, but at least it'll fill us up a bit."
1009803-278 = "Good thing I didn't finish it earlier."
1009803-279 = "[s] \"You're taking all this in stride, Hoshino.\""
1009803-283 = "Well, it's not the first time I've had to do this."
1009803-284 = "You know, back in the day, this old-timer used to rough it out without even a roof to sleep under!"
1009803-285 = "An abandoned train like this? It's like you've booked us a five-star hotel!"
1009803-286 = "[s] \"You sounded really old just now.\""
1009803-287 = "Heh, heh. I don't wanna hear that from you."
1009803-288 = "Let's get ready for bed."
1009803-293 = "First, we'll need some firewood..."
1009803-301 = "Ahhh. That's nice and warm."
1009803-302 = "Here, Sensei. I'll set up the emergency blanket right next to the fire."
1009803-303 = "You've got to maintain a normal body temperature when you're in the desert at night."
1009803-304 = "It's not the most comfortable, but you can lean against the wall and cover yourself with the blanket to stay warm."
1009803-305 = "Huh? You have room next to you?"
1009803-306 = "Always so thoughtful. I told you earlier, this old-timer's a seasoned veteran at roughing it. Don't worry."
1009803-307 = "Now, get to bed early if you want to grow tall."
1009803-308 = "[s] \"Why don't we share the blanket, then?\""
1009803-312 = "Huh? No it's okay, that blanket's pretty small."
1009803-313 = "[s3] \"Didn't you say we need to maintain our body temperatures?\"\n[s4] \"Then you'll just have to get close.\""
1009803-318 = "I-I guess so, but..."
1009803-319 = "You're such a smooth talker, Sensei."
1009803-320 = "...*sigh*"
1009803-326 = "Then, just a little closer, 'kay?"
1009803-328 = "Hoshino and I waited until sunrise, then headed back to town."

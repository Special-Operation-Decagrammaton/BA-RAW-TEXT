[translation]
1009803-1 = "英雄，巡邏"
1009803-4 = "啊，老師，這邊這邊。"
1009803-5 = "怎麼一臉開心的樣子呀，發生了什麼好事嗎？"
1009803-6 = "[s]「當然是因為又可以看到英雄星野的英姿了啊！」"
1009803-7 = "唔嘿……什麼英雄的英姿，大叔我可沒辦法變身哦。"
1009803-8 = "總之，你準備好要去巡邏了嗎？"
1009803-9 = "我們今天的巡邏路線會經過幾處沙漠地帶，所以路途不是很好走……"
1009803-10 = "要是老師跟不上的話，可能今天之內會回不來的。"
1009803-11 = "[s]「當然，我已經做好準備了。」"
1009803-12 = "好，那我們就出發吧。"
1009803-18 = "這裡依舊沒什麼人呢～"
1009803-19 = "嗯？問我為什麼要來這麼遠的地方巡邏？"
1009803-20 = "當然是因為要消耗老師的體力，讓你累到講不出會讓大叔我害羞的話囉。"
1009803-21 = "[s]「咦……！？」"
1009803-22 = "我開玩笑的啦，老師的反應還真有趣。"
1009803-23 = "其實是因為上次那件事的關係。"
1009803-24 = "之前有群人想偷走我們的校園佈告欄，你還記得嗎？"
1009803-25 = "[s]「嗯，最後是阿拜多斯的英雄星野把他們趕跑了。」"
1009803-26 = "雖然不清楚那群頭盔團的來歷，但他們的裝備看起來還挺不錯的。"
1009803-27 = "不過在我的印象中，他們的手頭應該不是很寬裕才對。"
1009803-28 = "我想老師應該也嗅到了一點不尋常的氣味對吧？"
1009803-29 = "所以我今天才打算好好巡邏一下。"
1009803-30 = "[s]「原來是這樣啊……」"
1009803-31 = "話就先說到這邊，我們今天得走很遠的路，還是快點出發吧。"
1009803-41 = "嗯？奇怪，我上次看到的時候，那間房子明明還好好的啊。"
1009803-42 = "[s]「房子整個都被沙子掩埋了耶……」"
1009803-43 = "該不會是因為前陣子的那場沙塵暴……"
1009803-48 = "唉，光靠我一個人的力量還是太難了嗎……"
1009803-55 = "沒辦法，看來也只能放棄了。"
1009803-60 = "喂～！你看起來好像遇到了麻煩，需要我們幫你嗎？"
1009803-61 = "嗯？你是誰？"
1009803-62 = "那個，我只是碰巧路過──"
1009803-63 = "[s]「碰巧路過的英雄。」"
1009803-67 = "老師，你又來了……"
1009803-68 = "英雄……？"
1009803-69 = "雖然不太明白，如果你們願意幫忙就再好不過了。"
1009803-70 = "其實這裡是我的老家。#n我今天是因為有東西要拿，才久違地回來一趟的。"
1009803-71 = "不過不知道是不是沙塵暴的關係，房子居然變成這副德性。"
1009803-72 = "我一個人就算再怎麼挖，沙子也只會不停地流下來，根本是白費力氣。"
1009803-74 = "唔嗯……畢竟沙子這麼多，一個人想把房子挖出來確實不容易。"
1009803-78 = "那就讓大叔我來幫你吧。"
1009803-79 = "[s]「我也來幫忙。」"
1009803-80 = "唔嘿～謝謝你，老師。"
1009803-88 = "呼，這樣應該就行了吧。"
1009803-89 = "挖得又快又乾淨……！"
1009803-91 = "看來你真的是個英雄呢！謝謝你！"
1009803-95 = "真是的，都怪老師剛才說了那些多餘的話……"
1009803-96 = "[s1]「看見別人有難就主動伸出援手的人……」\n[s2]「當然是英雄囉！」"
1009803-99 = "唔，唔嘿～"
1009803-100 = "老師究竟是怎麼若無其事地說出那種話的呢……"
1009803-102 = "（之後也繼續和星野在阿拜多斯自治區內巡邏）"
1009803-106 = "唔，上次經過的時候，這裡明明還是條道路的說……"
1009803-107 = "現在卻被沙子埋起來了。"
1009803-108 = "[s]「我們要繞路嗎？」"
1009803-109 = "……"
1009803-110 = "不，還是把沙子清掃乾淨吧。"
1009803-111 = "包在我身上。"
1009803-117 = "咦，這裡的路燈好像都壞了耶。"
1009803-121 = "老師，抱歉，可以麻煩你揹我上去看看嗎？"
1009803-122 = "說不定經過大叔我的巧手，路燈就能暫時恢復正常喔！"
1009803-137 = "唔嘿，這麼快就到這裡了嗎？#n看來我們的巡邏工作就快結束了。"
1009803-138 = "[s]「稍微休息一下再走吧。」"
1009803-139 = "嗯，說的也是。#n今天辛苦你了，老師。"
1009803-140 = "你應該不會後悔跟大叔我一起出來巡邏吧？"
1009803-141 = "[s]「完全不會唷。」"
1009803-143 = "[ns]「能看到星野這麼珍惜阿拜多斯的樣子，我覺得很開心。」"
1009803-144 = "唔嘿～聽起來真讓人害羞。"
1009803-145 = "不過……哎呀～我好像欠了老師一個人情呢。"
1009803-146 = "要是老師沒有陪我的話，大叔我說不定早就累得走不動了。"
1009803-147 = "所以謝謝你，老師。"
1009803-148 = "嗯？能幫助到阿拜多斯的英雄是你的榮幸……？"
1009803-149 = "老師還真執著於那個設定呢……"
1009803-150 = "既然如此……"
1009803-151 = "唔嘿～那老師就來當我的夥伴吧？"
1009803-152 = "[s]「夥伴？」"
1009803-153 = "就是跟英雄一起打擊犯罪的正義夥伴呀～"
1009803-154 = "雖然這種人通常都會慘遭壞人的毒手，間接導致英雄覺醒就是了。"
1009803-155 = "[s]「！？」"
1009803-156 = "唔嘿～開玩笑的啦。"
1009803-160 = "作為大叔我的賠罪，要不要吃點這個？"
1009803-161 = "雖然因為放在戰術背心裡，稍微有點壓到了……"
1009803-166 = "那，那個……"
1009803-174 = "我有聽人家說過，請問你們兩位就是會四處幫助別人的人嗎？"
1009803-175 = "咦！？"
1009803-176 = "[s]「竟然已經傳開了嗎……」"
1009803-180 = "唔，雖然這麼說也沒錯……"
1009803-181 = "你有什麼事要拜託大叔我嗎？"
1009803-182 = "那個，不好意思，我想請你們幫忙尋找遺失物……"
1009803-183 = "其實我前幾天去郊外散步時，#n剛好遇到沙塵暴而迷了路，所以就在一輛廢棄火車裡躲避沙塵暴。"
1009803-184 = "儘管之後平安回到了家，但我卻發現自己把背包忘在了火車裡頭。"
1009803-185 = "雖然有嘗試回去找，可是我根本分不出來沙漠的哪裡是哪裡……"
1009803-187 = "那個背包裡裝著我很重要的東西！#n如果能幫我找回來的話，我一定會好好答謝你們的！"
1009803-193 = "沒辦法了～"
1009803-194 = "既然人家都特地來找我們，而且我們也還在巡邏中……"
1009803-195 = "老師，你覺得呢？"
1009803-196 = "[s]「身為夥伴的我，當然是跟著英雄走囉！」"
1009803-197 = "唔嘿～老師還真有幹勁。"
1009803-198 = "告訴我們大致的方向吧。#n如果是廢棄的火車，我大概知道幾個可能的地點。"
1009803-199 = "是！"
1009803-200 = "我想想……當時回來的時段大約是清晨左右，我記得是背向太陽走回來的。"
1009803-201 = "所以是東邊嗎～"
1009803-205 = "那我們就出發吧，老師。"
1009803-207 = "（於是便和星野一起前往阿拜多斯的郊外，尋找市民遺失的背包）"
1009803-216 = "唔嘿～應該就是這個了吧。"
1009803-220 = "既然已經找到背包，接下來只要把東西物歸原主就行了。"
1009803-221 = "辛苦你了，老師～"
1009803-222 = "[s]「辛苦的人是你才對，星野。」"
1009803-226 = "唔嘿～"
1009803-227 = "不過有點傷腦筋呢。"
1009803-228 = "問我為什麼？因為……"
1009803-237 = "[ns]「竟然已經這麼晚了……」"
1009803-238 = "這下有點麻煩了呢。"
1009803-239 = "在能見度極低的沙漠中行走，很可能會在不知不覺間迷路……這可是大忌。"
1009803-240 = "……沒辦法。"
1009803-241 = "只能在這裡待到早上再走了。"
1009803-242 = "既然如此，我們就稍微休息一下吧～"
1009803-249 = "― [log=호시노 무장 모드 4]哎呀～時間都已經這麼晚了呀。 [/log][wa:2310] "
1009803-250 = "― [log=호시노 무장 모드 4]事到如今，也只能等到早上了呢。[/log][wa:4780] "
1009803-253 = "[ns]「能和星野待在一起，我覺得很開心哦。」"
1009803-254 = "― [log=호시노 무장 모드 4]……咦？ [/log][wa:470] "
1009803-255 = "― [log=호시노 무장 모드 4]又來了又來了～跟這種大叔待在一起，其實一點也不有趣吧～[/log][wa:5220] "
1009803-258 = "[ns]「現在的你，可是阿拜多斯的英雄啊。」"
1009803-259 = "― [log=호시노 무장 모드 4]唔，唔嘿～[/log][wa:1010] "
1009803-260 = "― [log=호시노 무장 모드 4]那個設定，還要堅持下去嗎……？對大叔我來說，負擔好像有點重呢～[/log][wa:5200] "
1009803-263 = "― [log=호시노 무장 모드 4]……算了，如果老師願意擔任夥伴職位的話……[/log][wa:3980] "
1009803-264 = "― [log=호시노 무장 모드 4]我就配合一下吧。[/log][wa:1470] "
1009803-267 = "― [log=호시노 무장 모드 4]那麼， 英雄和夥伴就來吃點簡單的晚餐吧。……雖然只是緊急口糧。[/log][wa:3740] "
1009803-270 = "[ns]「小魚果凍……這是小孩子喜歡的點心對吧？」"
1009803-271 = "― [log=호시노 무장 모드 4]這個嘛，雖然那麼說也沒錯～[/log][wa:2590] "
1009803-272 = "― [log=호시노 무장 모드 4]大叔我就是喜歡這個。你就體諒一下吧～[/log][wa:7870] "
1009803-276 = "唔嘿～沒想到小魚果凍竟然還有剩。"
1009803-277 = "雖然已經放在背心裡好一段時間了，不過應該還是可以稍微墊墊肚子的吧？"
1009803-278 = "幸好我剛才沒有吃掉。"
1009803-279 = "[s]「星野，你好像對這種事習以為常了。」"
1009803-283 = "畢竟我也不是第一次遇到要臨時在外過夜的情況了。"
1009803-284 = "大叔我年輕的時候，就算露宿野外也能睡得很自在哦～"
1009803-285 = "所以這種廢棄的火車對我來說，簡直就跟五星級旅館沒兩樣。"
1009803-286 = "[s]「你剛才的語氣還真的很像大叔……」"
1009803-287 = "唔，唔嘿～從老師口中聽到這種話，莫名覺得有點害羞呢……"
1009803-288 = "總之我們也差不多該來做過夜的準備了。"
1009803-293 = "嗯，先把被風吹到附近的木頭收集回來，然後把火點著……"
1009803-301 = "唔嘿～真溫暖。"
1009803-302 = "來，我幫你在最溫暖的位置鋪上求生毯，這裡是老師的位置。"
1009803-303 = "在沙漠過夜時，最重要的就是維持體溫。"
1009803-304 = "雖然躺在這裡不太舒服，#n不過只要貼著火車的牆面再蓋上求生毯的話，應該能勉強湊合湊合。"
1009803-305 = "嗯？你說睡我旁邊就好了？"
1009803-306 = "哎呀，謝謝你的體貼。#n不過剛才也說過了，大叔我在險惡的環境下也睡得著，所以老師就別推拖了。"
1009803-307 = "早點睡才能長高，你說對吧？"
1009803-308 = "[s]「既然如此，我們就一起蓋吧。」"
1009803-312 = "咦？等一下，可是那件求生毯沒有那麼寬……"
1009803-313 = "[s3]「你剛才不是也說過，維持體溫是最重要的嗎？」\n[s4]「我們兩個人貼緊一點，應該也多少會有幫助吧？」"
1009803-318 = "唔，唔嗯，這麼說也有道理……"
1009803-319 = "真是的，老師到底為什麼能若無其事地說出那種話呢。"
1009803-320 = "……真拿你沒辦法。"
1009803-326 = "那我就跟老師貼著坐吧。"
1009803-328 = "（之後便和星野待在一起，直到天亮時分才回去）"

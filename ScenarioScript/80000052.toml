80000052-10 = "3;아즈사;02;응? 어째서 이런 곳으로 불러낸 거냐고?\n#3;em;[?]\n#3;a"
80000052-11 = "3;아즈사;99;간단한 이유야. 무방비한 상태가 되는 걸, 적에게 들킬 수는 없기 때문이지."
80000052-12 = "3;아즈사;06;무, 물론 너무 그런 걸 신경 쓸 필요 없다는 걸 선생님이 늘 말해주긴 했지만…….\n#3;stiff"
80000052-13 = "3;아즈사;01;그래도 지금은 달라. 그런 걸 신경 쓰지 않는 걸 신경 쓰는 것 또한……. 하고 싶지 않으니까."
80000052-14 = "3;아즈사;02;……뭐, 뭔가 말하고 보니 이상하군. 이해가 돼? 선생님……?\n#3;em;[속상함]"

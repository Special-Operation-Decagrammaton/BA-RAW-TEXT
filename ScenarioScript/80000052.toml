80000052-18 = "3;아즈사;03;음. 뭐, 아무래도 상관없어. 요지는 보다 사적이고 은밀한 환경을 구축하고 싶었던 거니까.\n#3;greeting"
80000052-19 = "3;아즈사;99;그리고 다행히도 목표한 분위기는 잘 구축된 것 같아. 그럼 이제……."

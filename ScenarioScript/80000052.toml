[translation]
80000052-1 = "สกัลแมนเปลี่ยนร่าง!"
80000052-5 = "มาแล้วเหรอ... คุณครู ไม่มีใครสะกดรอยตามมาใช่มั้ย?"
80000052-10 = "หืม? ทำไมฉันถึงเรียกมาในที่แบบนี้น่ะเหรอ?"
80000052-11 = "เหตุผลง่ายๆ ก็เพราะจะให้ศัตรูเจอในสภาพที่ไม่พร้อมจะป้องกันตัวแบบนี้ไม่ได้ไงล่ะ"
80000052-12 = "นะ...แน่นอนว่าถึงคุณครูจะบอกอยู่บ่อยๆ ว่าไม่ต้องคิดมากเรื่องแบบนั้น..."
80000052-13 = "แต่ว่าตอนนี้มันไม่เหมือนกันนะ ฉันไม่สนหรอกว่าคุณครูจะใส่ใจเรื่องพวกนั้นรึเปล่า..."
80000052-14 = "ยะ...ยิ่งพูดยิ่งดูแปลกๆ แฮะ เข้าใจที่ฉันพูดมั้ย คุณครู...?"
80000052-15 = "[s1] \"ต้องเข้าใจสิ\"\n[s2] \"ครูเข้าใจฟีลอยู่\""
80000052-16 = "อืม เข้าใจแน่ๆ ใช่มั้ยนะ..."
80000052-17 = "อืม เข้าใจแน่ๆ ใช่มั้ยนะ..."
80000052-18 = "อืม แต่ก็ช่างเถอะ ที่สำคัญก็คือฉันอยากสร้างสภาพแวดล้อมที่ค่อนข้างเป็นส่วนตัวน่ะ"
80000052-19 = "อย่างน้อยก็ถือว่าโชคดีที่สำเร็จตามเป้าหมาย ถ้างั้นตอนนี้ก็..."
80000052-23 = "คุณครู... รับนี่ไปหน่อยสิ"
80000052-25 = "[s3] \"นี่มัน...!\"\n[s4] \"นี่มัน...?\""
80000052-26 = "ฮึ..."
80000052-27 = "ฮึ..."
80000052-28 = "ถึงจะเป็นคุณครูก็ยังตกใจสินะ คิดว่าถ้าเป็นคุณครูจะรู้แล้วซะอีก"
80000052-29 = "เรื่อง... ความน่ารักของสกัลแมน ทูตแห่งความตายน่ะ...!"
80000052-30 = "วันนี้เป็นวันที่พิเศษมากนะ มันเป็นของรุ่นลิมิเต็ดที่หาไม่ได้อีกแล้ว"
80000052-31 = "ถ้าเป็นคนอื่นฉันไม่มีวันให้เด็ดขาด... แต่ที่ให้คุณครูก็เพราะว่าที่ผ่านมาคุณครูคอยช่วยฉันมาตลอด"
80000052-32 = "เข้าใจไหม? มันหายากมากๆ เลยนะ ฉันคิดว่าถ้าเป็นคุณครูละก็ คงจะรู้ถึงความสำคัญและคุณค่า#nของมันแน่ๆ"
80000052-33 = "หืม...? เอ๋...? "
80000052-37 = "คะ...คุณครู!?"
80000052-38 = "ทำอะไรน่ะ?! กินหมดรวดเดียวแบบนั้นได้ยังไง...!"
80000052-39 = "ฉันบอกไปแล้วไม่ใช่รึไง! ว่าช็อกโกแลตแบบนี้มันหาไม่ได้อีกแล้วน่ะ! มันไม่มีขายอีกแล้ว! ควรเก็บไว้อีกสักหน่อยสิ...!"
80000052-40 = "[s5] \"คิกคิก เท่านี้ครูก็จะได้เป็นสกัลแมนแล้ว!\"\n[s6] \"หึหึ... ตอนนี้สกัลแมนอยู่ในตัวครูแล้ว!\""
80000052-41 = "...!?"
80000052-42 = "......!?"
80000052-43 = "คะ... คุณครู...?"
80000052-44 = "..."
80000052-45 = "ฮิฮิ..."
80000052-46 = "ฮิฮิ ฮิฮิฮิ..."
80000052-47 = "เข้าใจล่ะ... แบบนี้นี่เอง ดีจังที่เอาช็อกโกแลตนี่มาให้คุณครู"
80000052-48 = "ดีล่ะ ไหนๆ ก็เป็นแบบนี้แล้ว ถ้างั้นวันนี้คุณครูต้องมาเป็นสกัลแมนของฉันแล้วล่ะ"
80000052-49 = "ไปกันเถอะ สกัลแมน"
80000052-50 = "คุณครูกลายเป็นสกัลแมนไปแล้ว เพราะงั้นตอนนี้ก็ไม่ต้องซ่อนตัวอีกแล้วล่ะ"
80000052-56 = "(จากนั้นคุณครูก็ตามอาซึสะไป และใช้เวลาอยู่กับเธอทั้งวัน)"

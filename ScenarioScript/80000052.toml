[translation]
80000052-1 = "骷髏人，變身！"
80000052-5 = "……你來了啊，老師。沒有被人跟蹤吧？"
80000052-10 = "你問我為什麼找你來這種地方？"
80000052-11 = "原因很簡單。既然知道會進入無防備的狀態，自然不能選擇容易被敵人盯上的地點。"
80000052-12 = "當然，我也記得老師說過不用太在意這種事……"
80000052-13 = "可是今天不一樣。今天無法不去注意。"
80000052-14 = "……感覺好像在說什麼奇怪的事。"
80000052-15 = "[s1]「不會哦，沒關係的。」\n[s2]「我覺得不是什麼奇怪的事唷。」"
80000052-16 = "是嗎……"
80000052-17 = "是嗎……"
80000052-18 = "……算了，無所謂。反正重點只是想創造出安靜且穩定的環境而已。"
80000052-19 = "目標已經達成，那麼接下來……"
80000052-23 = "……老師，希望你能收下這個。"
80000052-25 = "[s3]「這是……！」\n[s4]「難道是……」"
80000052-26 = "……呵呵。"
80000052-27 = "……呵呵。"
80000052-28 = "果然，我就知道老師能夠理解。"
80000052-29 = "這個死神……骷髏人的可愛之處！"
80000052-30 = "這是限定產品而且是最後一個，似乎已經買不到了。特別送給你。"
80000052-31 = "畢竟一直以來從老師那裡得到了很多。"
80000052-32 = "雖然非常貴重，還是想送給老師。#n不過因為是食物，所以總有一天會消失，儘管如此……"
80000052-33 = "……呃，老師？"
80000052-37 = "老師！？"
80000052-38 = "怎，怎麼吃那麼大口……！？"
80000052-39 = "那個是限定產品！可以的話是不是該慢慢品嘗……！"
80000052-40 = "[s5]「哼哼……這樣一來我就是骷髏人了！」\n[s6]「哼哼，骷髏人是不會消失的。我會永遠陪著你！」"
80000052-41 = "……！？"
80000052-42 = "……！？"
80000052-43 = "老，老師……？"
80000052-44 = "……"
80000052-45 = "……呵呵。"
80000052-46 = "這，這樣啊……"
80000052-47 = "……我懂了。那就能一直在一起了呢。不愧是老師。"
80000052-48 = "既然如此，就讓老師當我的骷髏人陪著我囉。"
80000052-49 = "……那我們回去吧，骷髏人。"
80000052-50 = "已經不用躲躲藏藏了呢。"
80000052-56 = "（之後便跟著梓，一起正大光明地共度了一段悠閒的時光）"

80000052-28 = "3;아즈사;01;역시 아무리 선생님이라도 놀라는군. 선생님이라면 알아줄 거라 생각했어.\n#3;m3"
80000052-29 = "3;아즈사;03;이……. 죽음의 사신, 스컬맨의 귀여움을……!\n#3;closeup\n#fontsize;80"
80000052-30 = "3;아즈사;06;오늘 같은 날이니 특별히 주는 거야. 이건 한정품이라, 더 구할 수 없는 거라고 했으니까."
80000052-31 = "3;아즈사;06;선생님이 아니라면 누구에게도 양보하지 않았을 테지만……. 그래도 선생님께는 그동안 많은 걸 받았으니까.\n#3;em;[///]\n#3;stiff"
80000052-32 = "3;아즈사;03;알았지? 아주 귀하게 구한 거라고. 선생님이라면 그 가치를 알아봐 줄 거라 믿고 있어."

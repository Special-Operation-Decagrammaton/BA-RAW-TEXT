[translation]
2005003-1 = "แบบนี้เร็วกว่า!"
2005003-2 = "สำนักงานชาเล่ต์"
2005003-3 = "(ระหว่างที่คุณครูกำลังเหนื่อยใจกับงานมากมายที่ถาโถมเข้ามาทุกวัน...)"
2005003-7 = "(เสียงเคาะประตูเหรอ...?)"
2005003-8 = "[ns] \"ประตูไม่ได้ล็อก เข้ามาได้เลย~\""
2005003-10 = "[ns1] \"เดี๋ยวนะ แต่นี่มัน...\"\n[ns2] \"เสียงดังมาจากทางหน้าต่างเหรอ...?\""
2005003-13 = "(คุณครูมองออกไปนอกหน้าต่าง...)"
2005003-14 = "[ns] \"หืม...?\""
2005003-15 = "(แล้วก็เห็นว่าริตสึกำลังห้อยโหนอยู่ข้างนอกนั่น)"
2005003-16 = "[ns] \"ริตสึ?!\""
2005003-17 = "คุณครู คุณครู!"
2005003-18 = "หน้าต่างบานนี้มันล็อกอยู่ ขอฉันพังเข้าไปได้มั้ย?"
2005003-19 = "[s3] \"นั่นมันกระจกกันกระสุนราคาแพงเลยนะ...!\"\n[s4] \"ให้พังไม่ได้อยู่แล้ว!\""
2005003-26 = "(คุณครูรีบไปเปิดหน้าต่างแล้วให้ริตสึเข้ามาข้างใน)"
2005003-28 = "เข้าได้แล้ว!"
2005003-29 = "[ns] \"ปีนอาคารขึ้นมาเหรอเนี่ย...?\""
2005003-30 = "อื้อ! ก็ลิฟต์น่ะสิ มันหยุดบ่อยแล้วก็ไม่ยอมลงมารับด้วย!"
2005003-31 = "[s] \"ริตสึ ที่นี่ก็มีบันไดนะ...\""
2005003-32 = "หืมม...?"
2005003-33 = "แต่การปีนอาคารขึ้นมาน่าจะระยะทางน้อยกว่าเดินขึ้นบันไดนะ?"
2005003-34 = "[s] \"ตามหลักคณิตศาสตร์แล้ว... มันก็จริงอยู่หรอก...!\""
2005003-38 = "[ns] \"ว่าแต่วันนี้ไม่ใช่เวร แล้วได้รับอนุญาตให้ออกมายังไงเหรอ?\""
2005003-39 = "อื้อ ฉันบอกไปว่าจะออกมาซื้อหินอ่อนสำหรับงานประติมากรรม ก็เลยได้รับอนุญาตให้ออกมายังไงล่ะ!"
2005003-40 = "โรงเรียนของเรามีกฎเรื่องการออกไปข้างนอกที่เข้มงวดมาก~"
2005003-41 = "แต่ถ้าอ้างเหตุผลทางศิลปะ ก็จะเพิ่มความเป็นไปได้ในการได้รับอนุญาตขึ้นมานิด~ หน่อยน่ะ!"
2005003-42 = "เพราะงั้น! ฉันก็เลยไปซื้อหินอ่อนแล้วแวะมาที่ชาเล่ต์ค่ะ!"
2005003-43 = "[s] \"งั้นก็... คงถือก้อนหินกลับมาด้วยสินะ...\""
2005003-44 = "อื้อ! ฉันวางเอาไว้ที่ชั้น 1 ให้ไปเอามาให้ดูมั้ย?"
2005003-45 = "[s] \"ดะ... เดี๋ยวไว้ครูลงไปดูเองก็ได้...!\""
2005003-46 = "อ๊ะ จริงด้วย! เรื่องสำคัญไม่ใช่เรื่องนี้หรอก!"
2005003-47 = "เอ้า คุณครู! รับนี่ไปสิ!"
2005003-51 = "[ns] \"นี่มัน... เสื้อเชิ้ต?\""
2005003-52 = "อื้อ! ครั้งก่อนคุณครูช่วยฉันแกะสลักหินจนตัวเปื้อนฝุ่นหินไปหมดเลยไม่ใช่เหรอ?"
2005003-53 = "ฉันคิดว่าเสื้อผ้าของคุณครูก็น่าจะสกปรกไปด้วย..."
2005003-54 = "ก็เลยไปขอให้เพื่อนเอกออกแบบเครื่องแต่งกายช่วยตัดเสื้อให้น่ะ!"
2005003-55 = "[s] \"อ๋อ ก็เลยมาถามว่าครูชอบสีอะไรสินะ...?\""
2005003-56 = "อื้อ ตอนแรกฉันจะใช้ผ้าตามสีที่คุณครูชอบ..."
2005003-57 = "แต่คิดว่าการตัดสินใจเรื่องนี้ให้เป็นหน้าที่ของผู้เชี่ยวชาญจะดีกว่า~ น่ะ"
2005003-58 = "[s] \"ดีนะเนี่ยที่ครูไม่ได้บอกว่าชอบสีใสๆ...\""
2005003-59 = "อ๊ะ คุณครูมีรสนิยมแบบนั้นเหรอ?"
2005003-60 = "[s5] \"เปล่านะ! แต่ก็ขอบใจนะ ริตสึ\"\n[s6] \"ขอบใจนะริตสึ! ครูจะใส่บ่อยๆ เลย!\" "
2005003-63 = "อื้อๆ! ลองใส่ดูเลยสิ!"
2005003-64 = "[s] \"อื้อ เดี๋ยวครูไปเปลี่ยนห้องข้างๆ...\""
2005003-73 = "[ns] \"เดี๋ยวก่อน หนูริตสึ...? ตามครูมาทำไมเหรอ...?\""
2005003-74 = "หืม? ไม่ได้เหรอ?"
2005003-75 = "[s] \"ต้องรออยู่ข้างนอกสิ... ครูจะได้เปลี่ยนเสื้อได้ไง\""
2005003-76 = "..."
2005003-77 = "อ๊ะ คุณครูเขินสินะ?"
2005003-78 = "งั้นฉันจะเปลี่ยนเป็นชุดทำงานอยู่ข้างๆ แล้วกัน!"
2005003-79 = "[s] \"ไม่ได้! แบบนี้ก็ไม่ได้!\""
2005003-81 = "(แล้วคุณครูก็ได้เปลี่ยนเสื้อเสียที)"
2005003-83 = "โอ้~ โห"
2005003-84 = "เป็นไงบ้าง? สบายตัวมั้ย? พอดีตัวหรือเปล่า?"
2005003-85 = "[s] \"พอดีตัวเหมือนสั่งตัดเลย นี่สินะความสามารถของไวลด์ฮันต์...?\""
2005003-86 = "ว่าแล้วไง..."
2005003-90 = "ไม่เห็นจะเข้าเลย!"
2005003-91 = "[s] \"ไหงเป็นงั้นล่ะ...!\""
2005003-92 = "อ้อ ที่ฉันจะสื่อก็คือ เสื้อมันก็เข้ากับคุณครูนะ! "
2005003-93 = "แต่มันน่าจะแมตช์กับเสื้อผ้าตัวอื่นยากน่ะ!"
2005003-94 = "[s] \"งั้นก็ควรบอกแบบนี้ตั้งแต่แรกสิ...!\""
2005003-95 = "แต่ก็ไม่เป็นไรหรอก!"
2005003-96 = "ไว้ไปซื้อเสื้อผ้าที่เข้ากับเสื้อตัวนี้ทีหลังก็ได้!"

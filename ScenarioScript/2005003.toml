[translation]
2005003-1 = "這樣更快！"
2005003-2 = "夏萊辦公室"
2005003-3 = "（今天也一如往常地奮鬥於工作的洪流之中……）"
2005003-7 = "（有敲門聲……？）"
2005003-8 = "[ns]「門沒鎖，直接進來沒關係～」"
2005003-10 = "[ns1]「等一下，聲音怎麼好像……」\n[ns2]「是從窗戶那邊傳來的……？」"
2005003-13 = "（於是轉頭看向了窗邊……）"
2005003-14 = "[ns]「……嗯？」"
2005003-15 = "（律不知為何正掛在窗外）"
2005003-16 = "[ns]「……律！？」"
2005003-17 = "老師老師！"
2005003-18 = "這扇窗戶鎖著，我可以打破嗎？"
2005003-19 = "[s3]「那可是很貴的防彈玻璃啊……！」\n[s4]「當然不行！」"
2005003-26 = "（連忙打開窗戶讓律進來）"
2005003-28 = "達陣！"
2005003-29 = "[ns]「你該不會是爬外牆上來的吧……？」"
2005003-30 = "嗯！因為電梯每層樓都停，下來得太慢了嘛！"
2005003-31 = "[s]「律同學，這棟樓還有樓梯這種東西啊……」"
2005003-32 = "唔嗯……？"
2005003-33 = "可是跟爬樓梯比起來，爬外牆的距離不是更短嗎？"
2005003-34 = "[s]「這……數，數學上是這樣沒錯啦……！」"
2005003-38 = "[ns]「話說你今天不是值日生，是怎麼拿到外出許可的呢？」"
2005003-39 = "我說要去買雕刻用的大理石，結果他們就發給我外出許可了！"
2005003-40 = "雖然我們狂獵，對外出的管制超～級嚴格……"
2005003-41 = "不過只要提出跟藝術有關的理由，拿到許可的機率就會稍～微提高一點哦！"
2005003-42 = "所以我就在把買好的大理石搬回去的路上，順便過來夏萊一趟！"
2005003-43 = "[s]「你連石頭……也一起搬來了啊……」"
2005003-44 = "嗯！我放在一樓那邊，要搬上來給你看看嗎？"
2005003-45 = "[s]「我，我等等再下去看就好……！」"
2005003-46 = "啊，對了！現在不是說這些的時候！"
2005003-47 = "來，老師！這個給你！"
2005003-51 = "[ns]「這是……襯衫？」"
2005003-52 = "嗯！老師上次幫我雕刻的時候，不是全身都沾滿了石粉嗎？"
2005003-53 = "就連衣服也被弄得很髒……"
2005003-54 = "所以我就拜託主修服裝設計的朋友，幫我做了這件衣服！"
2005003-55 = "[s]「啊啊，所以你之前才會問我喜歡什麼顏色啊！」"
2005003-56 = "對呀，原本我打算請他用老師喜歡的顏色做的……"
2005003-57 = "後來覺得～這種事好像還是交給專家決定比較好。"
2005003-58 = "[s]「幸好那時候沒說我喜歡透明的……」"
2005003-59 = "啊，原來老師有那種喜好嗎？"
2005003-60 = "[s5]「才沒有！」\n[s6]「總之謝謝你，律！我會好好珍惜的！」"
2005003-63 = "嗯嗯！快試穿一下吧！"
2005003-64 = "[s]「嗯，我去旁邊的房間換好再出來……」"
2005003-73 = "[ns]「那個……律同學？你為什麼也跟著進來了……？」"
2005003-74 = "嗯？我不可以進來嗎？"
2005003-75 = "[s]「你跟進來的話……我就沒辦法脫衣服了啊？」"
2005003-76 = "……"
2005003-77 = "啊，老師會害羞是嗎？"
2005003-78 = "那我也在旁邊一起換成工作服吧！"
2005003-79 = "[s]「不行！絕對不可以！」"
2005003-81 = "（之後總算是換上了衣服）"
2005003-83 = "哦哦～"
2005003-84 = "怎麼樣，穿起來舒服嗎？合不合身？"
2005003-85 = "[s]「簡直像是量身訂做的一樣……！這就是狂獵的實力嗎……？」"
2005003-86 = "果然……"
2005003-90 = "很不適合！"
2005003-91 = "[s]「怎麼會……！」"
2005003-92 = "啊，很適合老師哦！"
2005003-93 = "只是跟其他衣服好像不太搭而已！"
2005003-94 = "[s]「要先把主詞交代清楚嘛……！」"
2005003-95 = "不過沒關係！"
2005003-96 = "下次再一起去買適合的衣服就好了！"

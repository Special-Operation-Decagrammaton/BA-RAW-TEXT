[translation]
2005003-1 = "This is Faster!"
2005003-2 = "Schale Office"
2005003-3 = "I was swamped with paperwork, like I was every day, when I heard..."
2005003-7 = "...knocking?"
2005003-8 = "[ns]\"It's unlocked. Come right in.\""
2005003-10 = "[ns1] \"Wait, is the sound...\"\n[ns2] \"...coming from the window...?\""
2005003-13 = "I looked through the glass, and..."
2005003-14 = "[ns]\"...Huh?\""
2005003-15 = "Ritsu was hanging off the ledge!"
2005003-16 = "[ns]\"Ritsu?!\""
2005003-17 = "Sensei! Sensei!"
2005003-18 = "Your window's locked! Should I break it?"
2005003-19 = "[s3]\"That's expensive and bulletproof!\"\n[s4]\"Of course not!\""
2005003-26 = "I quickly unlatched the window and helped her in."
2005003-28 = "Secured!"
2005003-29 = "[ns]\"Did you scale the building's wall to get here?\""
2005003-30 = "Yeah! Your elevator was SOOOO slow!"
2005003-31 = "[s]\"Ritsu. We also have a staircase.\""
2005003-32 = "Hmm...?"
2005003-33 = "But this was shorter. It was the most direct."
2005003-34 = "[s]\"You're mathematically correct, but...!\""
2005003-38 = "[ns]\"How did you get permission to be here? You're not on Student Rep duty.\""
2005003-39 = "Oh! I told them that I wanted to go buy some marble. For sculpting."
2005003-40 = "The Assembly is suuuuper strict about going outside..."
2005003-41 = "But they're a liiiitlle nicer if you have art-related reasons."
2005003-42 = "And that's why I visited you after I went to the quarry!"
2005003-43 = "[s]\"So you brought...a slab of stone here?\""
2005003-44 = "Yeah! It's on the ground floor, near the elevator. Do you want me to bring it up?"
2005003-45 = "[s]\"I-I'll go down and inspect it later...!\""
2005003-46 = "Ah, sure! That's not what's important."
2005003-47 = "Here, Sensei! For you!"
2005003-51 = "[ns]\"Is this...a shirt?\""
2005003-52 = "Yeah! Remember how you got covered in stone dust when you were helping with my sculpture last time?"
2005003-53 = "I figured that it ruined your shirt..."
2005003-54 = "So I asked my friend who's majoring in Fashion to make you a new one."
2005003-55 = "[s]\"So that's why you asked about my favorite color...?\""
2005003-56 = "Yeah. See, I thought we should make the shirt in your favorite color..."
2005003-57 = "But I didn't want to impose on her artistic vision. So I left it up to her."
2005003-58 = "[s]\"I'm glad I didn't say 'transparent'...\""
2005003-59 = "Ah! Is that your THING, Sensei?"
2005003-60 = "[s5]\"Not at all!\"\n[s6]\"Anyway, thank you, Ritsu! I'll wear it often!\""
2005003-63 = "Yeah, yeah! Try it on! Let's see how it looks!"
2005003-64 = "[s]\"Yeah, I'll go get changed in the other room...\""
2005003-73 = "[ns]\"...Um, Ritsu? Why are you following me...?\""
2005003-74 = "Hm? What do you mean?"
2005003-75 = "[s]\"You know, because I need to change? In another room?\""
2005003-76 = "..."
2005003-77 = "Ah, feeling shy, Sensei?"
2005003-78 = "How about I change into my work clothes right next to you?"
2005003-79 = "[s]\"No! Please don't!\""
2005003-81 = "I somehow managed to change my shirt in peace."
2005003-83 = "Huh."
2005003-84 = "What do you think? Is it comfortable? Is the fit okay?"
2005003-85 = "[s]\"It's perfect. Wildhunt students are so talented!\""
2005003-86 = "See, I think...it really..."
2005003-90 = "...doesn't work for you!"
2005003-91 = "[s]\"Why...?\""
2005003-92 = "Ah, it looks good on YOU, Sensei! In isolation. "
2005003-93 = "But I don't think it gels with your pants! And shoes!"
2005003-94 = "[s]\"Please lead with that next time...!\""
2005003-95 = "But still, it's okay!"
2005003-96 = "We can shop for some coordinating pieces next time!"

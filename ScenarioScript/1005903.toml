[translation]
1005903-1 = "กิจกรรมอาสา"
1005903-3 = "ในที่สุดก็มาจนได้สินะ..."
1005903-4 = "[s] \"มีเรื่องอะไรเหรอ มิกะ?\""
1005903-8 = "อืม... ที่จริงมันก็ไม่ใช่อะไรมากมาย..."
1005903-9 = "ก็... อย่างที่เห็นว่าฉันกำลังทำกิจกรรมอาสาอยู่"
1005903-10 = "[s] \"กิจกรรมอาสา?\""
1005903-11 = "อื้ม ส่วนหนึ่งของบทลงโทษของฉันคือต้องทำกิจกรรมอาสาให้ครบ 300 ชั่วโมง..."
1005903-12 = "ในวันหยุดฉันก็เลยไม่ได้หยุดพัก แล้วก็ต้องมาถอนวัชพืชในสนามกีฬาแบบนี้"
1005903-13 = "[s] \"ทำอยู่คนเดียวเหรอ?\""
1005903-14 = "ก็ใช่น่ะสิ! "
1005903-15 = "ฉันโดนสั่งให้ถอนวัชพืชในสนามกีฬากว้างๆ ให้เสร็จภายในวันนี้... แบบนี้มันไม่เกินไปหน่อยเหรอ? ปากบอกว่ากิจกรรมอาสา แต่จริงๆ มันคือการบังคับใช้แรงงานดีๆ นี่เอง!"
1005903-16 = "อากาศก็ร้อน คนก็ไม่มี แถมงานก็ทั้งลำบากทั้งน่าเบื่อ... ถ้าไม่ระวังชุดก็อาจจะเลอะก็ได้"
1005903-17 = "แดดก็เผา เอวก็เจ็บ มือก็ค่อยๆ หยาบกร้าน... อย่าว่าแต่ครีมกันแดดเลย แฮนด์ครีมฉันก็ไม่มี..."
1005903-18 = "[s] \"ลำบากน่าดูเลยนะ\""
1005903-19 = "หะ... หืม...? ที่จริงมันก็..."
1005903-20 = "[s] \"งั้นเดี๋ยวครูช่วยเอง\""
1005903-24 = "มะ... ไม่เป็นไร! คุณครูไม่ต้องช่วยก็ได้! มันไม่ใช่งานลำบากอะไรหรอก ฉันแค่ยังไม่คุ้นก็เท่านั้น..."
1005903-25 = "[s] \"ผิดตั้งแต่ชุดที่ใส่มาแล้ว ไปเปลี่ยนเป็นชุดพละก่อน มิกะ\""
1005903-26 = "หะ... หืม? ชะ... ชุดพละเหรอ...?"
1005903-27 = "[s] \"แล้วก็เอาผ้าเช็ดตัว น้ำดื่ม แล้วก็พลั่วมาด้วย\""
1005903-28 = "ตะ... แต่ว่า... ฉันไม่อยากเอาชุดพละที่คุณครูซื้อให้ออกมาใช้นี่นา"
1005903-29 = "[s] \"ซื้อให้ใส่นะ ไม่ได้ซื้อมาให้เก็บไว้\""
1005903-33 = "อะ... อื้ม... มันก็จริงอย่างที่คุณครูพูด..."
1005903-34 = "เข้าใจแล้ว"
1005903-39 = "(หลังจากนั้นครู่หนึ่ง)"
1005903-45 = "ฉันไปเปลี่ยนชุดแล้วก็เอาของที่คุณครูบอกมาแล้วด้วย"
1005903-46 = "เวลาอยู่ในชุดพละฉันดูไม่ค่อยน่ารักเท่าไร ก็เลยไม่อยากให้เห็นน่ะ แต่ก็ช่วยไม่ได้นะ"
1005903-47 = "เอ่อ... แต่ก็... คือว่า... ยังไงดีนะ..."
1005903-51 = "[ns] \"เอาละ งั้นก็มาเริ่มกันเลย\""
1005903-53 = "...อื้ม"
1005903-58 = "(กว่าจะช่วยกันถอนวัชพืชเสร็จ เวลาก็ล่วงเลยมาจนถึงช่วงเย็น)"
1005903-61 = "เหนื่อยจัง เจ็บเอวไปหมดแล้ว... ชุดก็เปื้อนโคลนไปหมดเลย..."
1005903-62 = "[s] \"ประมาณนี้ครูก็ว่าน่าจะเสร็จแล้วนะ\""
1005903-63 = "อื้ม...... นั่นสินะ"
1005903-64 = "นี่เป็นกิจกรรมอาสาที่ฉันต้องทำคนเดียวแท้ๆ แต่กลายเป็นว่าคุณครูมาช่วยจนเสร็จเลย แบบนี้อาจจะ#nเกิดปัญหาอะไรก็ได้ แต่ฉันก็ไม่ติดอะไรหรอกนะ☆"
1005903-65 = "ฮิฮิ......"
1005903-66 = "คือว่า คุณครู......"
1005903-67 = "[s] \"เวลาผ่านไปขนาดนี้แล้วเหรอ งั้นครูกลับก่อนนะ มิกะ\""
1005903-68 = "เอ๋? อะ... อื้ม..."
1005903-73 = "(คุณครูบอกลามิกะและกลับมาที่ชาเล่ต์)"

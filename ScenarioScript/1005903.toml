[translation]
1005903-1 = "志工活動"
1005903-3 = "結果真的來了嗎……？"
1005903-4 = "[s]「來了哦。話說怎麼了嗎，彌香？」"
1005903-8 = "那個，其實也不是什麼特別的事……"
1005903-9 = "是這樣的……就像老師看到的一樣，我正在當志工。"
1005903-10 = "[s]「志工？」"
1005903-11 = "沒錯。是我受到的處分之一。#n必須做300小時的志工服務才行。"
1005903-12 = "所以才會在假日的時候在這裡拔廣場上的雜草。"
1005903-13 = "[s]「自己一個人嗎？」"
1005903-14 = "就是說呀！！"
1005903-15 = "居然要我在一天之內把這～麼大的地方的雜草全都拔光，#n不覺得很過分嗎？與其說是志工服務，根本就是強制勞動吧！？"
1005903-16 = "天氣又熱，又沒有其他人，既無聊又辛苦……#n還會弄髒衣服…… "
1005903-17 = "腰又痛，手也變粗糙了……#n就連防曬油跟護手霜都沒有……"
1005903-18 = "[s]「這……還真辛苦呢。」"
1005903-19 = "啊，嗯……與其說是辛苦……"
1005903-20 = "[s]「我也來幫忙吧。」"
1005903-24 = "不不不！沒關係的老師！#n我只是不太習慣做這種事而已……"
1005903-25 = "[s]「先換衣服吧。去換上體育服吧。」"
1005903-26 = "咦？體育服……？"
1005903-27 = "[s]「還有麻煩你準備毛巾、水跟鏟子。」"
1005903-28 = "但，但是……#n體育服是老師買給我的，我不想拆開來用……"
1005903-29 = "[s]「不好好使用的話，我會很傷腦筋的唷。」"
1005903-33 = "說的也是……"
1005903-34 = "我知道了。"
1005903-39 = "（於是等了彌香一會兒……）"
1005903-45 = "換好衣服囉……還有，老師說的東西也都帶來了。"
1005903-46 = "穿體育服的樣子……實在不是很可愛，所以本來不想讓老師看到的……"
1005903-47 = "那個……怎麼說呢…… "
1005903-51 = "[ns]「那就開始吧。」"
1005903-53 = "……嗯。"
1005903-58 = "（即使兩個人一起合作，依然到下午才把雜草全都拔光）"
1005903-61 = "累～死～我～了～#n腰好痛……衣服也黏答答的……"
1005903-62 = "[s]「這樣大致上就結束了吧？」"
1005903-63 = "啊，嗯……是呢。"
1005903-64 = "啊……這件事，如果被別人發現老師幫我的話會不會有問題啊？#n雖然我是無所謂啦☆"
1005903-65 = "耶嘿嘿……"
1005903-66 = "那個，老師……"
1005903-67 = "[s]「已經這麼晚了啊。那我就先回去囉，彌香。」"
1005903-68 = "咦？#n……啊，嗯……"
1005903-73 = "（和彌香道別後便回到了夏萊）"

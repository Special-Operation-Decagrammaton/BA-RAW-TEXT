[translation]
1005903-1 = "Volunteer Activities"
1005903-3 = "I guess I'm here now..."
1005903-4 = "[s] \"What's going on, Mika?\""
1005903-8 = "Uh, nothing really..."
1005903-9 = "As you can see, I'm just volunteering."
1005903-10 = "[s] \"Volunteering for what?\""
1005903-11 = "Oh, well, part of my punishment was 300 hours of community service work."
1005903-12 = "So I'm here on my day off weeding this field."
1005903-13 = "[s] \"You're doing it by yourself?\""
1005903-14 = "Yeah."
1005903-15 = "I can't believe they expect me to get the whole thing done today... Don't you think that's too much?"
1005903-16 = "It's hot. I'm all by myself. The work is really hard and boring. And even the slightest mistake gets my nice clothes dirty."
1005903-17 = "My back hurts. My hands are getting rough... And I can't afford lotion right now, let alone sunscreen!"
1005903-18 = "[s] \"Sounds tough.\""
1005903-19 = "Oh, uh... It's not that bad, really..."
1005903-20 = "[s] \"I'll help you.\""
1005903-24 = "N-No! You don't have to do that, Sensei! I'm just not used to it is all!"
1005903-25 = "[s] \"I'm helping. Now the first thing you need to do is change into your gym clothes, Mika. That outfit is terrible for this kind of work.\""
1005903-26 = "My gym clothes? Really?"
1005903-27 = "[s] \"Yes. And bring a towel, water to drink, and a trowel too.\""
1005903-28 = "B-But you bought me that gym uniform. I was saving it for a special day."
1005903-29 = "[s] \"That's silly. You need to use it.\""
1005903-33 = "I guess you're right...technically."
1005903-34 = "All right."
1005903-39 = "Moments later..."
1005903-45 = "Okay, I changed and brought everything you told me to, Sensei."
1005903-46 = "I'm a little embarrassed to be seen in this uniform. It's not exactly cute..."
1005903-47 = "I don't know. What do you think?"
1005903-51 = "[ns] \"It's perfect. Now let's get started.\""
1005903-53 = "Okay."
1005903-58 = "We were weeding well into the afternoon."
1005903-61 = "This is hard... My back hurts... There's dirt everywhere..."
1005903-62 = "[s] \"But look! We're basically done.\""
1005903-63 = "Yeah, it looks like it..."
1005903-64 = "This was supposed to be my volunteer work. I hope getting help from Sensei doesn't cause any trouble... Well, even if it does, I don't care. ☆"
1005903-65 = "Heehee..."
1005903-66 = "Hey, Sensei..."
1005903-67 = "[s] \"Wow, look at the time! I need to head back now, Mika.\""
1005903-68 = "Huh? O-Okay..."
1005903-73 = "I parted ways with Mika and returned to Schale."

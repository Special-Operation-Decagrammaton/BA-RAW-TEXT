[translation]
10030030-1 = "ตอนที่ 3;ความเบื่อฆ่าแฮ็กเกอร์ได้"
10030030-6 = "อ๊ะ... แย่ละสิ เวลาผ่านไปแค่ไหนแล้วเนี่ย?"
10030030-7 = "พออ่านหนังสือก็เลยลืมเวลาไปเลย"
10030030-11 = "คุณครูเป็นไงบ้าง? น่าจะไม่ได้ออกมาข้างนอกนานเลย เบื่อบ้างรึเปล่า?"
10030030-12 = "[s1] \"เหมือนครูก็ไม่ได้มาผ่อนคลายแบบนี้มานานแล้วเลย\"\n[s2] \"นานแล้วนะที่ไม่ได้อ่านหนังสืออย่างมีสมาธิแบบนี้...\""
10030030-15 = "อื้ม ว่ากันว่าแค่ออกไปจากพื้นที่ทำงานตามปกติ ก็สามารถเพิ่มสมาธิได้มากเลยน่ะ"
10030030-16 = "โดยเฉพาะป่าและทุ่งหญ้าที่ไม่มีผู้คนและมีสิ่งเร้าภายนอกน้อย ถือเป็นสถานที่ที่ดีสำหรับงานที่ต้องใช้#nสมาธิอย่างเช่นการอ่านหนังสือหรือเขียนโปรแกรมเลยละ"
10030030-17 = "ครั้งนี้ฉันไม่ได้ให้ใครเอาอุปกรณ์อิเล็กทรอนิกส์มาเพราะจะได้ให้สมาชิกชมรมพักผ่อนกัน แต่ครั้งหน้า#nฉันลองเอาคอมพิวเตอร์มาทำงานแบบออฟไลน์สักหน่อยดีไหมนะ"
10030030-21 = "จะว่าไป ทุกคนพักผ่อนกันดีอยู่มั้ยนะ...?"
10030030-30 = "หืม? หายไปไหนกันหมดน่ะ?"
10030030-31 = "[s] \"คงไปเดินเล่นชิลๆ กันแถวนี้รึเปล่า?\""
10030030-32 = "ถ้าเป็นอย่างนั้นจริงฉันก็ไม่ว่าหรอก... แต่กับคนที่แค่เดินในชีวิตประจำวันก็บ่นเหนื่อยแล้ว ฉันว่าไม่น่าจะไปเดินเล่นไกลๆ ได้นะ"
10030030-33 = "กังวลจังว่าจะไปก่อเรื่องอะไรแปลกๆ ในที่ลับสายตารึเปล่า"
10030030-37 = "คุณครู ไปเดินดูรอบๆ กันเถอะ"
10030030-38 = "ดูจากเรี่ยวแรงของพวกนั้นแล้ว ฉันมั่นใจว่าไม่มีทางเดินไปได้ไกลมากหรอก"
10030030-39 = "[s3] \"ประเมินอย่างเย็นชาจังเลยนะ...\"\n[s4] \"งั้นก็ลองออกไปยืดเส้นยืดสายหน่อยมั้ย?\""
10030030-45 = "(อีกสักครู่ต่อมา...)"
10030030-56 = "นี่ไม่ใช่... นี่ก็ไม่ใช่..."
10030030-61 = "มาทำอะไรอยู่ตรงนี้น่ะ ฮาเระ?"
10030030-65 = "อ๊ะ รุ่นพี่"
10030030-66 = "ไม่มีอะไรหรอก ฉันก็แค่กำลังเลือกหญ้าที่ขึ้นอยู่แถวนี้น่ะ..."
10030030-67 = "อะไรกัน หาโคลเวอร์สี่แฉกอยู่หรอกเหรอ?"
10030030-68 = "การทำแบบนี้ตอนมาพักผ่อนกลางแจ้งก็ไม่แย่นักหรอกนะ แต่ฉันว่าที่นี่ไม่น่าจะมีต้นโคลเวอร์..."
10030030-69 = "ไม่ ฉันไม่ได้กำลังหาโคลเวอร์สี่แฉกหรอก..."
10030030-70 = "กำลังหาหญ้าที่รสชาติคล้ายเครื่องดื่มชูกำลังอยู่น่ะ"
10030030-74 = "ว่าไงนะ...?"
10030030-75 = "พูดอะไรของเธอน่ะ? จะไปมีหญ้าที่มีรสชาติเหมือนเครื่องดื่มชูกำลังได้ยังไง"
10030030-76 = "ไม่หรอก อย่างเช่นหญ้าต้นนี้ ถึงจะขมนิดหน่อยแต่ก็มีรสหวานติดลิ้นพอตัวเลย ยิ่งไปกว่านั้น ฉันรู้สึกได้ถึงกรดคาร์บอนิกซ่าๆ ที่ปลายลิ้นด้วย..."
10030030-81 = "ความรู้สึกมันอธิบายยากอยู่น่ะ แต่ก็แอบเหมือนตอนที่ดื่มเครื่องดื่มชูกำลังน่ะ..."
10030030-82 = "นี่มันอาการแพ้รึเปล่า?!"
10030030-83 = "คายออกมา! คายออกมาเดี๋ยวนี้ ฮาเระ!"
10030030-84 = "แต่ว่า... พอพยายามจะอยู่นิ่งๆ มือเท้าก็สั่น และก็ไม่มีเรี่ยวแรงเลย ทนไม่ไหวแล้ว..."
10030030-85 = "คาเฟอีน... ฉันต้องการคาเฟอีน..."
10030030-86 = "โธ่เอ๊ย... ภาวะถอนคาเฟอีนทำให้ความสามารถในการคิดไตร่ตรองลดลงงั้นเหรอ"
10030030-87 = "แต่ว่าทำยังไงดีล่ะ? อย่าว่าแต่ร้านสะดวกซื้อที่ขายเครื่องดื่มชูกำลังเลย แถวนี้ไม่มีแม้แต่ร้านขายของ#nธรรมดาด้วยซ้ำ"
10030030-91 = "[ns5] \"ครูมีกาแฟเหลืออยู่นิดหน่อยในขวดน้ำร้อน...\"\n[ns6] \"ลองดื่มกาแฟหน่อยไหม?\""
10030030-96 = "ขอดื่มหน่อย..."
10030030-101 = "เฮ้อออ... รอดมาได้แล้วเรา"
10030030-102 = "ถึงจะไม่ใช่เครื่องดื่มชูกำลัง แต่พอได้คาเฟอีนเข้าร่างกาย ก็รู้สึกมีชีวิตชีวาขึ้นมานิดหนึ่งแล้วละ"
10030030-103 = "ขอบคุณนะคุณครู ฉันรอดมาได้เพราะกาแฟของคุณครูเลย"
10030030-104 = "ถ้าไม่ได้ครูมาช่วยละก็ ฉันคงจะถอนหญ้าอันตรายมากินเพิ่มแล้ว"
10030030-105 = "[s7] \"โล่งอกไปทีนะที่กาแฟของครูช่วยได้...\"\n[s8] \"เลิกพูดเหมือนเราเอานักเรียนมาทรมานได้แล้ว\""
10030030-108 = "ไม่ได้กินเครื่องดื่มชูกำลังแค่ครึ่งวัน อาการขาดคาเฟอีนก็ถามหาแล้วเหรอเนี่ย เธอลองลดเครื่องดื่ม#nชูกำลังที่ดื่มอยู่ทุกวันหน่อยไหม?"
10030030-109 = "พูดอะไรน่ะ? เครื่องดื่มชูกำลังเป็นถึงเชื้อเพลิงแห่งปัญญาเลยนะ!"
10030030-110 = "ต่อให้อดข้าวแต่ฉันก็ยังทำงานโต้รุ่งได้อยู่ แต่ถ้าไม่ได้ดื่มเครื่องดื่มชูกำลัง โค้ดบรรทัดเดียวฉันก็ยัง#nไม่มีแรงเขียนเลย!"
10030030-111 = "จากประสบการณ์ในครั้งนี้ ถ้าครั้งหน้าจะมาแคมป์ปิ้งอีก เห็นทีฉันต้องเอาเครื่องดื่มชูกำลัง#nแบบชงดื่มมาด้วยแล้วละ..."
10030030-115 = "เอ๋ คิดจะมาแคมป์ปิ้งอีกเหรอ?"
10030030-119 = "ฉันนึกว่าทุกคนจะเบื่อกับการตั้งแคมป์คราวนี้จนไม่อยากจะมาอีกแล้วซะอีก... โล่งอกไปทีนะที่ไม่เป็น#nอย่างนั้น"
10030030-120 = "งั้นคงต้องจัดตารางแคมป์ปิ้งอีกครั้งแล้วละ"
10030030-121 = "อึก..."
10030030-122 = "จะว่าไป มากิกับโคทามะล่ะอยู่ที่ไหน? พวกเธอไม่ได้อยู่ด้วยกันหรอกเหรอ?"
10030030-123 = "ถ้าเป็นรุ่นพี่โคทามะ ฉันไม่รู้หรอกนะ..."
10030030-124 = "แต่มากิน่ะ เมื่อกี้ฉันเห็นเธอเดินเข้าไปในถ้ำทางโน้น"
10030030-125 = "เห็นว่าพอได้เห็นก้อนหินที่อยู่หน้าถ้ำ ก็เกิดแรงบันดาลใจทางศิลปะขึ้นมา"
10030030-127 = "แรงบันดาลใจทางศิลปะ...?"
10030030-128 = "[s] \"หรือว่าจะไปแกะสลักหิน?\""
10030030-129 = "แต่ที่นี่ไม่น่าจะมีเครื่องไม้เครื่องมือที่จะแกะสลักหินได้นะ..."
10030030-133 = "ลองไปดูสักหน่อยดีกว่า"
10030030-143 = "อืม... นี่ไม่ใช่สีที่ฉันตั้งใจไว้นี่นา..."
10030030-144 = "ถ้ามีสเปรย์แม่สีที่เอาไว้ในห้องชมรมก็ดีน่ะสิ... ไม่สิ อย่างน้อยขอสีแดงอย่างเดียวก็ได้..."
10030030-149 = "ทำอะไรอยู่น่ะ มากิ?"
10030030-153 = "อ๊ะ รุ่นพี่จิฮิโระ"
10030030-154 = "อืม คือว่า... สีออกมาไม่สวยอย่างที่ฉันตั้งใจไว้น่ะ"
10030030-155 = "สี...? นี่เธอกำลังวาดอะไรอยู่ตรงนี้งั้นเหรอ?"
10030030-156 = "อื้ม ดูผนังทางนี้สิ นี่คือภาพวาดผนังถ้ำ"
10030030-161 = "ฉันตั้งใจวาดอยู่ตั้งแต่เมื่อกี้แล้ว"
10030030-168 = "เดี๋ยวนะ นี่มันอะไรกัน..."
10030030-169 = "จะว่าไป นี่เธอวาดได้ยังไงเนี่ย?"
10030030-170 = "ฉันลองผสมดินเหนียวกับผงถ่านแทนสี แล้วทำให้เป็นเหมือนวัสดุสีน่ะ"
10030030-171 = "ฉันเคยอ่านเจอจากในอินเทอร์เน็ตว่ามนุษย์ดึกดำบรรพ์ใช้วิธีนี้ในการวาดรูป ก็เลยลองทำดูบ้าง... แต่มันวาดไม่ง่ายอย่างที่คิดเลยละ"
10030030-172 = "[s9] \"ครูว่าเป็นผลงานที่ยอดเยี่ยมเลยนะ...\"\n[s10] \"แต่ทำไมอยู่ๆ ถึงมาวาดผนังถ้ำล่ะ?\""
10030030-173 = "อย่างงั้นเหรอ ตอนที่ฉันเดินหาจุดที่มีคลื่นสัญญาณแถวนี้อยู่ อยู่ดีๆ ก็ได้แรงบันดาลใจ#nในการสร้างผลงานศิลปะขึ้นมาน่ะ"
10030030-174 = "พอดีว่า... ฉันกำลังเดินหาจุดที่มีคลื่นสัญญาณแถวนี้อยู่ แต่อยู่ดีๆ ก็ได้แรงบันดาลใจ#nในการสร้างผลงานศิลปะขึ้นมาน่ะ"
10030030-175 = "แต่แถวนี้ก็ไม่มีผ้าใบหรือกระดาษที่จะเอามาใช้วาดรูปได้"
10030030-176 = "แล้วฉันก็ระงับจิตวิญญาณแห่งศิลปะที่ลุกโชนในตัวไว้ไม่ได้เหมือนกัน..."
10030030-180 = "ก็เลยใช้กำแพงถ้ำเป็นผ้าใบแล้ววาดภาพบนฝาผนังขึ้นมา!"
10030030-183 = "พวกเธอนี่จริงๆ เลยเชียว ละสายตาไปแค่วินาทีเดียวก็ก่อปัญหากันได้ อยู่ไม่สุขจริงๆ เลย!"
10030030-184 = "มาพักผ่อนถึงที่นี่ทั้งที จะต้องวาดภาพกราฟิตี้ให้ได้เลยรึไง?"
10030030-185 = "นี่ไม่ใช่กราฟิตี้สักหน่อย กราฟิตี้คือชนิดของสตรีทอาร์ตที่ทำในสถานที่ที่เปิดกว้างต่างหาก!"
10030030-186 = "นอกจากนี้ ผนังในถ้ำก็ไม่ได้มีเจ้าของเหมือนกับกำแพงที่มีผู้ถือกรรมสิทธิ์ข้างนอกด้วย จะวาดอะไรก็ไม่มีใครเดือดร้อนหรอก"
10030030-187 = "จะมีคนเดือดร้อนเยอะเลยเหอะ"
10030030-188 = "ถ้ามีคนเข้าใจผิดว่าภาพวาดฝาผนังนี้เป็นร่องรอยอารยธรรมยุคก่อนประวัติศาสตร์ แล้วมีการสืบสวนขึ้นมาจริงๆ จะทำยังไง?"
10030030-189 = "ไม่หรอกน่าๆ จะเป็นแบบนั้นไปได้ยังไง"
10030030-190 = "[s] \"ที่อยู่ตรงกลางนั่นคืออะไรเหรอ?\""
10030030-194 = "อ้อ นั่นคือหอคอยมิลเลเนียมที่ตีความใหม่ในรูปแบบสามมิติน่ะ!"
10030030-197 = "ฉันแยกชิ้นส่วนหอคอยให้ออกมาเป็นหน่วยเรขาคณิต เพื่อถ่ายทอดภาพลักษณ์ของมิลเลเนียมที่ให้#nความสำคัญกับทฤษฎีและการพิสูจน์"
10030030-198 = "[s] \"แล้วภาพคล้ายๆ มดที่อยู่รอบๆ ล่ะ...\""
10030030-199 = "นั่นก็คือพวกนักเรียนมิลเลเนียมที่มารวมตัวกันหน้าคาเฟ่หลังเวลาพักกลางวัน"
10030030-200 = "หลังจากกินหลังอาหารกลางวันเสร็จ ทุกคนก็จะมารวมตัวกันซื้อกาแฟ และตอนนั้นที่คาเฟ่ก็จะวุ่นวาย#nไปหมด"
10030030-201 = "[s] \"แล้วสัตว์ที่มีเขาที่อยู่บนหอคอยล่ะ...?\""
10030030-205 = "นั่นคือ... รุ่นพี่ยูกะที่กำลังจัดการใบเสร็จรับเงินอยู่ในเซมิน่าน่ะ"
10030030-206 = "ฉันถ่ายทอดออกมาด้วยมุมมองของตัวเอง มันก็เลยอาจจะดูพิลึกๆ หน่อยน่ะ"
10030030-207 = "มาพักผ่อนถึงที่นี่แล้ว อย่ามาเสียเวลากับการล้อเลียนนักบัญชีของเซมิน่าเลย"
10030030-208 = "มากิ เธอมีความแค้นอะไรกับยูกะเหรอ ถึงได้แกล้งยูกะทุกวันแบบนี้?"
10030030-209 = "ไม่ได้แกล้งสักหน่อย นี่เป็นการทำงานศิลปะที่จริงจังต่างหาก"
10030030-212 = "เอาเถอะ แล้วนี่โคทามะอยู่ไหน?"
10030030-213 = "เมื่อกี้ฉันไปถามจากฮาเระมา แต่ฮาเระก็บอกว่าไม่รู้..."
10030030-218 = "อ้อ รุ่นพี่โคทามะน่ะเหรอ..."
10030030-219 = "เห็นว่าจะไปทำอะไรคนเดียวในป่าทางด้านโน้นน่ะ"
10030030-224 = "เข้าไปในป่าคนเดียวงั้นเหรอ...?"
10030030-225 = "[s] \"มีเรื่องอะไรรึเปล่าน่ะ?\""
10030030-226 = "อืม ฉันอาจจะวิตกกังวลไปเองก็ได้ แต่ในช่วงเวลานี้สัตว์ป่าที่หาของกินไม่ได้จะลงมาแถวๆ สถานที่ตั้ง#nแคมป์เพื่อหาอะไรกิน..."
10030030-227 = "บางทีถ้าเข้าไปในป่าลึก ก็อาจจะเจอหมีก็ได้"
10030030-228 = "[s] \"แบบนั้นมันเรื่องใหญ่เลยนี่...?\""
10030030-229 = "อื้ม อีกอย่าง ถ้าโคทามะได้จดจ่ออยู่กับอะไรแล้วละก็ ส่วนมากเธอจะไม่สังเกตอะไรที่เกิดขึ้นรอบๆ ตัวเลย..."
10030030-233 = "ไปตามหาโคทามะก่อนที่จะเกิดเรื่องอะไรขึ้นกันเถอะ"
10030030-234 = "แล้วก็มากิ เธอต้องลบภาพวาดนี้ให้หมดก่อนกลับด้วยนะ"
10030030-240 = "ไม่เอาน่า รุ่นพี่! ฉันขอไปด้วย~!"

[translation]
10030030-1 = "第3話;無聊會殺死駭客"
10030030-6 = "……哎呀，現在幾點了？"
10030030-7 = "看書看到忘記時間了呢。"
10030030-11 = "老師覺得如何？#n來到外面會覺得無聊嗎？"
10030030-12 = "[s1]「我好像也很久沒有這麼悠閒了。」\n[s2]「好久沒看書看得這麼專注了……」"
10030030-15 = "嗯，光是離開平常工作的空間就能大幅提高集中力。"
10030030-16 = "尤其是這種人煙稀少的林地，因為外部刺激很少的關係，#n很適合進行讀書或寫程式這種需要集中力的作業。"
10030030-17 = "這次是為了讓大家好好放鬆才沒帶電子設備，#n或許下次可以帶一台能離線作業的電腦來寫程式。"
10030030-21 = "這麼說來，大家有好好休息嗎……？"
10030030-30 = "……嗯？大家都跑到哪去了？"
10030030-31 = "[s]「會不會是去附近散步了？」"
10030030-32 = "如果是的話倒無所謂……他們平常連走路都嫌麻煩，應該不會走遠吧。"
10030030-33 = "……我擔心的是他們在看不到的地方開奇怪的玩笑。"
10030030-37 = "老師，我們去附近巡視一下吧。"
10030030-38 = "從他們的體力來看，應該不會走太遠才對。"
10030030-39 = "[s3]「好冷靜的評價……」\n[s4]「那就稍微走走吧？」"
10030030-45 = "（幾分鐘後……）"
10030030-56 = "不是這個……也不是這個……"
10030030-61 = "……晴，你在這裡做什麼？"
10030030-65 = "啊，前輩。"
10030030-66 = "沒什麼啦。#n我只是在挑長在這裡的草……"
10030030-67 = "嗯？是在找幸運草嗎？"
10030030-68 = "確實是個不錯的野外消遣，但這座露營場應該沒有幸運草才──"
10030030-69 = "不，我在找的不是幸運草……"
10030030-70 = "……是味道跟能量飲料相似的草。"
10030030-74 = "……啊？"
10030030-75 = "你在說什麼，怎麼可能會有那種草呢。"
10030030-76 = "我不這麼認為。#n比如這種草雖然有點苦卻帶有甜味，最重要的是舌尖能感覺到刺激的碳酸感……"
10030030-81 = "這種微妙的刺激就像在喝能量飲料……"
10030030-82 = "那不是過敏反應嗎！？"
10030030-83 = "快吐掉！趕快吐掉，晴！"
10030030-84 = "可是……我待著不動就會手腳顫抖、全身無力。#n快撐不住了……"
10030030-85 = "咖啡因，咖啡因不足……"
10030030-86 = "糟糕……是咖啡因癮發作而無法正常思考了嗎？"
10030030-87 = "不過該怎麼辦？#n這附近別說是有賣能量飲料的便利商店，就連普通的小賣店都沒有。"
10030030-91 = "[ns5]「我帶來的保溫瓶裡還有一些咖啡……」\n[ns6]「要不要喝一點？」"
10030030-96 = "……要。"
10030030-101 = "呼……總算活過來了。"
10030030-102 = "雖然效果沒有能量飲料那麼好，不過身體吸收到咖啡因之後好像比較有力氣了。"
10030030-103 = "謝謝你，老師，多虧有你才能得救。"
10030030-104 = "要不是有老師幫忙，我差點就要把危險的草拔來吃了……"
10030030-105 = "[s7]「我的咖啡能幫上忙真是太好了……」\n[s8]「但是你別說那種可能會引起誤會的話好嗎！？」"
10030030-108 = "你才半天沒喝就咖啡因癮發作……要不要考慮平常少喝點能量飲料？"
10030030-109 = "那怎麼可以呢？#n能量飲料可是等同於知識分子的燃料哦！？"
10030030-110 = "飯就算不吃也能通宵工作，但沒有能量飲料就連一行程式都寫不出來！"
10030030-111 = "我要以這次的經驗為鑑，下次露營的時候一定要帶能量飲料粉來泡……"
10030030-115 = "咦，你下次還想來露營嗎？"
10030030-119 = "我以為這次露營會讓大家覺得無聊，不會想再露營了呢……幸好是我想太多了。"
10030030-120 = "看來以後該安排一下露營日程呢。"
10030030-121 = "嗚……"
10030030-122 = "話說回來，真紀和小玉去哪裡了？#n你們沒有在一起嗎？"
10030030-123 = "小玉前輩的話我不是很清楚……"
10030030-124 = "不過我剛才看到真紀往那邊的洞穴走了。"
10030030-125 = "說是看到洞穴前的岩石，突然湧現了一些藝術方面的靈感。"
10030030-127 = "……藝術方面的靈感？"
10030030-128 = "[s]「他想做什麼雕刻嗎？」"
10030030-129 = "但是這座露營場應該沒有雕刻需要的工具才對……"
10030030-133 = "……先過去看看吧。"
10030030-143 = "唔嗯……這不是我想要的顏色……"
10030030-144 = "要是有放在部室的三色噴漆……不，就算只有紅色也好……"
10030030-149 = "……你在做什麼，真紀？"
10030030-153 = "啊，千尋前輩。"
10030030-154 = "該怎麼說呢……顏色沒有我想像中好看。"
10030030-155 = "……顏色？#n你在這裡畫什麼？"
10030030-156 = "你們看這面牆。#n這是我剛才畫的──"
10030030-161 = "石洞壁畫！"
10030030-168 = "呃，這是什麼……"
10030030-169 = "……而且這是怎麼畫的？"
10030030-170 = "我把黏土和木炭粉混在一起，用來代替顏料。"
10030030-171 = "之前有在網路上看到原始人會用這種方式畫壁畫，所以就試著模仿了一下……#n結果卻沒有想像中那麼簡單。"
10030030-172 = "[s9]「在我看來，這已經是很驚人的作品了……」\n[s10]「……不過為什麼突然畫石洞壁畫？」"
10030030-173 = "就是……我在這附近到處找收訊好的地方，結果突然想到了一個很棒的靈感。"
10030030-174 = "就是……我在這附近到處找收訊好的地方，結果突然想到了一個很棒的靈感。"
10030030-175 = "不過附近卻沒有適合作畫的畫布和紙張……"
10030030-176 = "但我還是壓抑不住這股燃燒的藝術之魂……"
10030030-180 = "情急之下就把石洞的牆壁當成畫布畫了壁畫。"
10030030-183 = "真是的，為什麼我一不注意你們就會克制不住自己？"
10030030-184 = "非要到這裡來塗鴉不可嗎？"
10030030-185 = "這個不是[ruby=Graffiti]塗鴉[/ruby]哦？#n塗鴉是在開放場所進行的街頭藝術之一！"
10030030-186 = "而且這石洞裡的牆壁和街上有主人的牆壁不同，#n就算在上面畫圖也不會造成別人的困擾。"
10030030-187 = "會感到困擾的人多得是吧？"
10030030-188 = "比方說，要是有人誤以為這幅壁畫真的是史前時代的遺跡，結果展開調查怎麼辦？"
10030030-189 = "哎呀～不會啦，怎麼可能會有那種事。"
10030030-190 = "[s]「壁畫中間那個巨大的東西是什麼？」"
10030030-194 = "啊，那是用立體主義重新詮釋的千年巨塔！"
10030030-197 = "為了表現千年重視理論和論證的形象，我把巨塔以幾何單位拆解並重現了。"
10030030-198 = "[s]「那畫在巨塔周圍的這些像螞蟻一樣的東西是……」"
10030030-199 = "那是吃完午餐後湧入咖啡廳的千年學生。"
10030030-200 = "每次午餐時間結束後，大家就會同時衝過來買咖啡，所以總是會亂成一團……"
10030030-201 = "[s]「那塔上這個長角的野獸是……？」"
10030030-205 = "那是……在研討會處理發票的優香前輩。"
10030030-206 = "……我描繪得有點主觀，是不是變得有點怪怪的？"
10030030-207 = "別連待在這裡的時間都用來取笑研討會的會計好嗎……"
10030030-208 = "真紀，你跟優香之間有什麼過節嗎？#n怎麼每次都開這種玩笑？"
10030030-209 = "這才不是玩笑，是正經的藝術活動～"
10030030-212 = "算了，先不說這些了，你有沒有看到小玉？"
10030030-213 = "我剛才也問過晴，但他說沒看到……"
10030030-218 = "啊，小玉前輩的話……"
10030030-219 = "他說有事要去一趟樹林，所以往那邊走了。"
10030030-224 = "一個人去樹林……？"
10030030-225 = "[s]「怎麼了嗎？」"
10030030-226 = "唔嗯，可能是我杞人憂天，不過這個時期會有找不到食物的野生動物靠近露營場……"
10030030-227 = "要是進入樹林深處的話，說不定會遇到熊。"
10030030-228 = "[s]「那不就糟了嗎……？」"
10030030-229 = "嗯，而且小玉一旦專心投入某件事，不管附近發生什麼騷動他都不會察覺……"
10030030-233 = "在出事之前趕緊找到小玉吧。"
10030030-234 = "還有真紀，回去之前你一定要把這幅壁畫擦掉哦。"
10030030-240 = "啊，前輩！我也要一起去啦～！"
